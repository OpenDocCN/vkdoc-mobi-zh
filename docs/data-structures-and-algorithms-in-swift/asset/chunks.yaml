  raw: '## Updating a Value in a Hash Table


    To update a value in a hash table, we need to create a mutating function to be
    able to update the properties of a hash table structure. In Swift structures are
    value types, and the properties of value types cannot be modified; to modify them,
    we have to use the **mutating** keyword in the instance method. Then we calculate
    the index and iterate through the buckets array with the enumerated() method and
    update the value with new one and return oldValue. Using the `enumerated()` method
    is very helpful in this case because it iterates over each of the elements while
    also telling the elements’ positions in the array. If the element does not exist
    in the array, we add it to the array by appending it and returning nil.


    ```

    mutating func updateValue(_ value: V, forKey key: K) -> V? {

    var itemIndex: Int

    itemIndex = self.index(for: key)

    for (i, element) in buckets[itemIndex].enumerated() {

    if element.key == key {

    let oldValue = element.value

    buckets[itemIndex][i].value = value

    return oldValue

    }

    }

    buckets[itemIndex].append(HashElement(key: key, value: value))

    return nil

    }

    ```


    ## Removing a Value from a Hash Table


    Here again we create a mutating function, and based on the calculated index, we
    iterate over buckets array and find the values using the if condition and remove
    it based on the index that we get from the `enumerated()` method.


    ```

    mutating func removeValue(for key: K) -> V? {

    let index = self.index(for: key)

    for (i, element) in buckets[index].enumerated() {

    if element.key == key {

    buckets[index].remove(at: i)

    return element.value

    }

    }

    return nil

    }

    ```


    ## Summary


    In this chapter, you have learned about the general structure of hash table, how
    to create them in Swift, and how to use retrieve, update, and delete elements
    from the hash table. In the following chapter, you will learn about the data structure
    type of tree.


    # 8. Trees


    A tree is a nonlinear data structure with hierarchical relationships between its
    elements; it is basically reversed from a real-life tree. There are many types
    of trees, and they come in various shapes and sizes. In this chapter, you will
    learn the basics of using and implementing a tree. A tree consists of nodes and
    the topmost node is called the root. Each node holds the data and also reference
    to its child nodes, and if a node does not have a child node, it is called a leaf.
    Figure [8-1](#490882_1_En_8_Chapter.xhtml#Fig1) shows a three-level diagram of
    a tree. The root is level 0, and as you move down the depth of the tree, the level
    increases by 1.


    ![../images/490882_1_En_8_Chapter/490882_1_En_8_Fig1_HTML.png](images/490882_1_En_8_Chapter/490882_1_En_8_Fig1_HTML.png)


    Figure 8-1


    Three levels of a tree


    The total number of children in a node is called degree. The nodes that have the
    same parent are siblings and they are connected with an edge.


    The main applications of the trees include


    *   Manipulate hierarchical data


    *   Make information easy to search


    *   Manipulate sorted lists of data


    *   As a workflow for compositing digital images for visual effects


    *   Router algorithms


    *   Form of a multistage decision-making


    ## Creation


    As previously mentioned, a tree is made up of nodes and a node has a value associated
    with it. Additionally, each node needs to have a list of children and it is handy
    for each node to have a link to its parent node as well. Each node has one parent
    but can have multiple children; that is why for child nodes an array will be declared.


    ```

    class Node {

    var data: T

    weak var parent: Node?

    var children: [Node] = []

    init(data: T) {

    self.data = data

    }

    }

    ```


    So what we have done here is to set the data of the node in the init() method,
    and as a node can have multiple children, children array is declared which is
    made up of nodes. We have set the reference of parent node to weak var to prevent
    strong cycles which can cause memory leaks.


    Finally, as our tree type is a generic type, we need a method for printing the
    tree. By adding the following code inside the Node class, we can define the printing
    method:


    ```

    func printNodeData() -> [String] {

    return ["\(self.data)"] + self.children.flatMap{$0.printNodeData()}.map{"    "+$0}

    }

    func printTree() {

    let text = printNodeData().joined(separator: "\n")

    print(text)

    }

    ```


    We convert the data to a string by enclosing it in `"\()"` and we use standard
    flatMap and map methods to print the node data properly.


    ### Insertion


    We will declare the `add(child:)` method to handle insertion to our tree.


    ```

    func add(child: Node) {

    children.append(child)

    child.parent = self

    }

    ```


    We append the children array which is made up of nodes, and set child parent.
    To understand how this addition method works, let us write the following code
    in the playground outside our class:


    ```

    let drinks = Node(data: "Drinks")

    let type1 = Node(data: "Cold")

    let type2 = Node(data: "Hot")

    drinks.add(child: type1)

    drinks.add(child: type2)

    type2.add(child: Node(data: "Latte"))

    type1.add(child: Node(data: "Cola"))

    type1.add(child: Node(data: "Fanta"))

    drinks.printTree()

    ```


    The output will be


    ```

    Drink

    Cold

    Cola

    Fanta

    Hot

    Latte

    ```


    Hierarchical structures are natural candidates for tree structures, so here we
    have defined six different nodes and organized them in a logical hierarchy. This
    arrangement corresponds to the structure shown in Figure [8-2](#490882_1_En_8_Chapter.xhtml#Fig2).


    ![../images/490882_1_En_8_Chapter/490882_1_En_8_Fig2_HTML.png](images/490882_1_En_8_Chapter/490882_1_En_8_Fig2_HTML.png)


    Figure 8-2


    Sample tree


    ### Searching Data


    Add the following method inside the Node class for the search algorithm of the
    tree data structure that we declared. This method searches for a value in the
    tree, and if the data exist in the tree, it returns the node associated with the
    value; otherwise the return is nil. If the data is found in the current node,
    we return self which is the current node. The next line of the code loops through
    the children array and every time we call each child’s search method which will
    recursively iterate through all the children, and if any of the nodes have a match,
    it will return the node. Finally, we return nil if no data is matched.


    ```

    func search(element: T) -> Node? {

    if element == self.data {

    return self

    }

    for child in children {

    if let result = child.search(element: element) {

    return result

    }

    }

    return nil

    }

    ```


    Let’s try this using the playground outside our class.


    ```

    let latte = drinks.search(element: "Latte")

    if let result = latte {

    result.printTree()

    }

    ```


    The output will be


    ```

    Latte

    ```


    As previously mentioned, when you do a search inside a tree, an iteration through
    children will be done. This iteration is different from the normal ones, which
    is a bit complicated.


    There are different types of tree data structure and some of them will be discussed
    in the next chapters.


    *   Trie


    *   Binary tree


    *   Red`–`black tree


    *   R tree


    ## Conclusion


    In this chapter, you have learned about the general structure of a tree, how to
    implement it in Swift, and how to declare, search, and add methods for it. In
    the following chapters, you will learn more about the different types of tree
    data structure.


    # 9. Trie Data Structure


    In this chapter, we will review Trie (pronounced as try) data structures and how
    to implement it using Swift. A Trie is a tree-based data structure that organizes
    information in a hierarchy. While most of the other structures are designed to
    manipulate generic data, Trie is often used with Strings `–` it is used for storing
    words in a way which enables fast lookups. Since Trie stores characters at each
    node, it is very efficient for prefix matching in the English language.'
  trans: "\n# 更新哈希表中的值\n\n要更新哈希表中的值，我们需要创建一个可修改的函数，以便能够修改哈希表结构的属性。在 Swift 中，结构体是值类型，值类型的属性不能被修改；要修改它们，我们必须在实例方法中使用\
    \ `mutating` 关键字。然后我们计算索引，使用 `enumerated()` 方法遍历 buckets 数组，用新值替换旧值并返回 `oldValue`。在这种情况下使用\
    \ `enumerated()` 方法非常有用，因为它可以在遍历每个元素的同时，告诉我们元素在数组中的位置。如果元素在数组中不存在，我们就将其追加到数组末尾，并返回\
    \ `nil`。\n\n```swift\nmutating func updateValue(_ value: V, forKey key: K) ->\
