    return nil

    }

    }

    ```


    首先，我们检查 `head` 是否为 `nil`；如果是，我们**返回** `nil`——这就是第一个 **if** 语句的作用。然后，下一个 **if**
    检查列表是否只包含一个节点；我们在 `defer` `{}` 中移除该节点。我们继续搜索下一个节点，直到 `curr.next` 为 `nil`，以找到列表中的最后一个节点；由于当前节点是最后一个节点，因此通过将
    `prev.next` 设置为 nil，我们断开了最后一个节点与列表的连接。

