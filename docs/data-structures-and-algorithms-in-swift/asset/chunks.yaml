    \nFigure 17-2  \nBinary search example\n\n## Graph Search Algorithms (GSA)\n\n\
    It is obvious that graph search algorithms are used in graph data structures.\
    \ GSA searches through the nodes of a graph to find our target.\n\n### Breadth-First\
    \ Search (BFS) vs. Depth-First Search (DFS)\n\n| Breadth-First Search (BFS) |\
    \ Depth-First Search (DFS) |\n| --- | --- |\n| Uses queue data structure | Uses\
    \ stack data structure |\n| We reach a vertex with minimum number of edges from\
    \ a source vertex. | We might reach a vertex with more edges from a source. |\n\
    | It is useful when vertices are closer to the given source. | It is useful when\
    \ vertices are away from the source. |\n| It considers neighbors first; this is\
    \ why it is not suitable for decision-making trees used in games and puzzles.\
    \ | It is useful for decision-making trees because we make a decision and then\
