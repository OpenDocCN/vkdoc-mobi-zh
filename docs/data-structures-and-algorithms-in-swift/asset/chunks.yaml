- fmt: "### Merge Sort\n\nIt is quicker for larger lists because unlike insertion\
    \ and bubble sort it does not loop through the list. Space complexity is always\
    \ `O(n)` as you have to store the elements somewhere. Additional space complexity\
    \ can be `O(n)` in an implementation using arrays and `O(1)` in linked list implementations.\
    \ In practice implementations using lists need additional space for list pointers,\
    \ so unless you already have the list in memory, it shouldn’t matter.\n\n| **Merge\
    \ Sort** | Best Case | Worst Case |\n| Time Complexity | `O(n)` (`O(n logn)`)\
    \ | `O(n logn)` |\n| Space Complexity | `O(1)` | `O(n)` |\n\n### Quick Sort\n\n\
    As mentioned before, quick sort uses divide and conquer like merge sort and it\
    \ is a recursive algorithm. Its worst-case running time is as bad as selection\
    \ sort and insertion sort. On the other hand, its average-case running time is\
    \ as good as the merge sort. So the question is, why do we need it when it is\
    \ at least as good as merge sort? That’s because the constant factor hidden in\
    \ the Big O notation for quick sort is quite good. In practice, quick sort outperforms\
    \ merge sort, and it significantly outperforms selection sort and insertion sort.\
    \ The selection of a pivot element plays an important role for quick sort’s efficiency.\n\
    \n| **Quick Sort** | Best Case | Worst Case |\n| Time Complexity | `O(n logn)`\
    \ | `O(n²)` |\n| Space Complexity | `O(logn)` | `O(n)` |\n\n## Search Algorithms\n\
    \nSearching algorithms are designed to check for an element or retrieve an element\
    \ from any data structure where it is stored.\n\n### Linear Search vs. Binary\
    \ Search\n\nA linear search scans one element at a time and the time for searching\
    \ keeps increasing as the number of elements are increased.\n\n| **Linear Search**\
    \ | Best Case | Worst Case |\n| Time Complexity | `O(1)` | `O(n)` |\n| Space Complexity\
    \ | `O(1)` | `O(1)` |\n\nA binary search cuts down the search to half, and based\
    \ on the middle element, it continues to search either the left or right side\
    \ of the middle element in the given list.\n\n| **Binary Search** | Best Case\
    \ | Worst Case |\n| Time Complexity | `O(1)` | `O(logn)` |\n| Space Complexity\
    \ | `O(1)` | `O(1)` |\n\n**Differences**\n\n- Binary search requires the data\
    \ to be sorted, but linear search does not.\n- Binary search accesses data randomly,\
    \ whereas linear search accesses data sequentially.\n- Binary search performs\
    \ ordering comparisons, whereas linear search performs equality comparisons.\n\
    \nA linear search searching for 7 is shown in Figure [17-1](#490882_1_En_17_Chapter.xhtml#Fig1).\n\
    \n![../images/490882_1_En_17_Chapter/490882_1_En_17_Fig1_HTML.png](images/490882_1_En_17_Chapter/490882_1_En_17_Fig1_HTML.png)\n\
    \nFigure 17-1  \nLinear search example\n\nA binary search searching for 7 is shown\
