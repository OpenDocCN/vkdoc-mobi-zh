    the pivot number. In our case it stops at 6 because it is greater than 5\. Then
    the right marker starts to move to the left, and this time when it reaches a number
    that is less than the pivot number, in our case, it stops at 3 which is less than
    5\. When both the left and right markers have stopped, the markers’ numbers are
    swapped; here we swap 3 with 6.


