    To check for an element or retrieve an element from any data structure, searching
    algorithms are used. The performance of these algorithms is evaluated on how fast
    they can find a solution, and in most cases, this depends on the data structure
    being searched. Some data structures are specially designed to make search algorithms
    faster or more efficient.


    Based on the mechanism of searching, search algorithms are classified into two
    categories:


    *   Sequential search: Linear search

    *   Interval search: Binary search'
