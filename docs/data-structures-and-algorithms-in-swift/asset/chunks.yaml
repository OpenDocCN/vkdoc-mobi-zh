    ## Conclusion


    In this chapter, you have learned about graph algorithms and strategies behind
    them. You mastered about breadth-first search, depth-first search, and Dijkstra’s
    algorithms and their advantages and disadvantages. By now you should have a good
    understanding of how to implement these algorithms and which one to choose based
    on the requirements.


    # 17. Choosing the Best Algorithm


    We have learned different types of algorithms such as sorting, searching, and
    graph algorithms, and there are likely to be many possible algorithms which perform
    the same task. The question is, if we want to search for a value in the list,
    which type of searching algorithm do we have to choose? By analyzing various algorithms,
    we will study this question in this chapter.


    There are many ways of comparing algorithms, but in this chapter, we will focus
    on time complexity and space complexity.


    *   Time complexity: Required time for accomplishing the task


    *   Space complexity: Required memory for accomplishing the task


    We will examine the different types of algorithms that we explained in this book.


    ## Sorting Algorithms


    We have learned that sorting algorithms order the values in the list from smallest
    to largest, and there are many sorting algorithms that are available in computer
    science. To choose the one which perfectly matches our program, we have to possess
    deep knowledge about how they perform in different situations.


    ### Bubble Sort


    It is very useful when the list is very nearly sorted `–` if only two elements
    are out of place. Bubble sort’s space requirement is at a minimum because the
    elements are swapped in place without using additional temporary storage.


    | **Bubble Sort** | Best Case | Worst Case |

    | Time Complexity | O(n) | O(n²) |

    | Space Complexity | O(1) | O(1) |


    ### Selection Sort


    It is similar to bubble sort that performs well on a small list and its space
    requirement is at a minimum. The best, average, and worst case time complexity
    is O(n²) which is independent of distribution of data.


    | **Selection Sort** | Best Case | Worst Case |

    | Time Complexity | O(n²) | O(n²) |

    | Space Complexity | O(1) | O(1) |


    ### Insertion Sort


    It is quite efficient when used on a small array of data. Quadratic runtime O(n²)
    can upgrade to a respectable O(n∗k), where k is the steps it needs to tread back
    up the array to swap the previous element with the current one. If the list is
    partially sorted, it can perform even better than quick sort.


    | **Insertion Sort** | Best Case | Worst Case |

    | Time Complexity | O(n) | O(n²) |

    | Space Complexity | O(1) | O(n) |'
