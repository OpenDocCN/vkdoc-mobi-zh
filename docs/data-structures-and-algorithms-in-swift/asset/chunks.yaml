  raw: '## Linear Search


    Every element is checked sequentially for a searched value. When there are a lot
    of data, the number of comparisons increases, and it takes more time. The time
    complexity for linear search is O(n).


    Let’s look at following list (Figure [15-1](#490882_1_En_15_Chapter.xhtml#Fig1)).


    ![../images/490882_1_En_15_Chapter/490882_1_En_15_Fig1_HTML.png](images/490882_1_En_15_Chapter/490882_1_En_15_Fig1_HTML.png)


    Figure 15-1


    List


    Let’s try searching for number 7\. First, we examine the leftmost number in the
    array. We compare it with 5, and if it matches, the search ends. If it does not
    match, we examine the next number to the right. We repeat the comparison until
    7 is found. When we found 7, the search ends here (Figure [15-2](#490882_1_En_15_Chapter.xhtml#Fig2)).


    ![../images/490882_1_En_15_Chapter/490882_1_En_15_Fig2_HTML.png](images/490882_1_En_15_Chapter/490882_1_En_15_Fig2_HTML.png)


    Figure 15-2


    Linear search


    The primary advantage of linear search is its simplicity: conceptually, it’s extraordinarily
    easy to understand, and implementation-wise, it’s also very straightforward. From
    an operational standpoint, linear search is also very resource efficient `–` it
    does not require copying/partitioning of the array being search `–` and thus it
    is memory efficient. It also operates equally well on both unsorted and sorted
    data.


    The primary disadvantage of linear search is that it has a very poor O(n) general
    efficiency. That is, the performance of the algorithm scales linearly with the
    size of the input. For the general case, linear search thus is considerably slower
    than many other search algorithms.


    In certain cases, where additional information about the current contents of the
    list being searched are known, linear search can perform as good or better than
    many other types of search algorithms. For instance, if you can assume that the
    list you have is a FIFO or LIFO, and you know that the item you are looking for
    is either almost always recently added or almost always at the end of the list,
    then a tailored linear search can provide a very good performance.


    ### Implementation


    The linear search function is created using generics to make it compatible for
    all data types.


    ```

    func linearSeacrh(_ inputArray: [inputType], searchValue: inputType) -> String
    {

    let n = inputArray.count

    for i in 0..<n {

    if inputArray[i] == searchValue {

    return "The element is found at index \(i) "

    }

    }

    return "The element is not found"

    }

    ```


    First we take the length of the array and loop through it to search for the value,
    and when it is found, we return its index in the array. As you can see, the implementation
    is very easy to execute.


    For example:


    ```

    var testArray = [1,2,3,4,5,6]

    print(linearSeacrh(testArray, searchValue: 6))

    ```


    The output will be


    ```

    The element is found at index 5

    ```


    ## Binary Search


    Binary search is an algorithm for searching through the elements of a presorted
    array. It searches a sorted array by repeatedly dividing the search interval in
    half. First, it compares the searched value to the middle element of the array,
    and if the value of the search key is less than the item in the middle of the
    interval, it narrows the interval to the lower half. Otherwise, it narrows to
    the upper half and repeatedly checks until the value is found or the interval
    is empty. The worst-case time complexity for binary search is O(logN).


    Binary search is faster than linear search except for small arrays, but the array
    must be sorted first to be able to apply binary search. It can be used to solve
    a wide range of problems, such as finding the smallest or next largest element
    in the array.


    Let’s look at the following list and use binary search for finding an element
    (Figure [15-3](#490882_1_En_15_Chapter.xhtml#Fig3)).


    ![../images/490882_1_En_15_Chapter/490882_1_En_15_Fig3_HTML.png](images/490882_1_En_15_Chapter/490882_1_En_15_Fig3_HTML.png)


    Figure 15-3


    Sorted list


    Let’s try searching for number 6 (Figure [15-4](#490882_1_En_15_Chapter.xhtml#Fig4)).


    ![../images/490882_1_En_15_Chapter/490882_1_En_15_Fig4_HTML.png](images/490882_1_En_15_Chapter/490882_1_En_15_Fig4_HTML.png)


    Figure 15-4


    Binary search


    First, we look at the number in the center of the array. In our case, it is 5
    and we compare 5 to number 6 that we are searching for. And we see that 5 is less
    than 6, which means that number 6 is located at the right of 5 because we are
    looking into a pre-ordered array. So we remove the numbers that are no longer
    needed.


    In the remaining numbers, again we look at the number in the center of the remaining
    array and this time it is 7\. We compare 7 to 6 and it is greater than 6, which
    means that the number that we are looking for is located at the left of 7\. Again
    we remove the numbers that we do not need.


    In the remaining numbers, we look at the number in the center and this time it
    is 6 and 6 is equal to 6, so we found the number that we were looking for.


    The main advantage of binary search is that it is one of the fastest ways to search
    for an item, and the worst-case performance is O(logN). However, it requires the
    elements to be sorted.


    ### Implementation


    ```

    func binarySearch(inputArray:Array, searchValue: inputType) -> Int? {

    var lowerIndex = 0

    var upperIndex = inputArray.count - 1

    while (true) {

    let currentIndex = (lowerIndex + upperIndex)/2

    if(inputArray[currentIndex] == searchValue) {

    return currentIndex

    } else if (lowerIndex > upperIndex) {

    return nil

    } else {

    if (inputArray[currentIndex] > searchValue) {

    upperIndex = currentIndex - 1

    } else {

    lowerIndex = currentIndex + 1

    }

    }

    }

    }

    ```


    First, we define the lower and upper indexes and loop through it to search for
    the value, by dividing the current list into two until the searched value is reached.


    For example:


    ```

    var testArray = [1,2,3,4,5,6,7,9,10];

    if let searchIndex = binarySearch(inputArray: testArray,searchValue: 5) {

    print("The element is found at index: \(searchIndex)")

    }

    ```


    The output will be


    ```

    The element is found at index: 4

    ```


    ## Conclusion


    In this chapter, you have learned about search algorithms and strategies behind
    them. You mastered about linear search and binary search and their advantages
    and disadvantages. By now you should have a good understanding of how to implement
    these algorithms and which one to choose based on the requirements. In the next
    chapter, we are going to learn about graph algorithms such as breadth-first search,
    depth-first search, and Dijkstra’s algorithm.


    # 16. Graph Algorithms


    It is obvious that the main purpose of many algorithms relates with operations
    on data, and the data structure plays an important role in choosing an algorithm.
    In this chapter, we will discuss nonlinear data structures such as graphs.


    Graphs are nonlinear data structure which consist of nodes and edges. The basic
    structure of a graph is shown in Figure [16-1](#490882_1_En_16_Chapter.xhtml#Fig1).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig1_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig1_HTML.png)


    Figure 16-1


    Graph data structure


    In the preceding graph, the set of nodes N = {A,B,D,E,K,J} and the set of edges
    E = {AB,AK, BK,BE,KJ,DJ}.


    Graphs can be directed and undirected and the edges of graphs can have weights.


    ## Directed Graphs


    This type of graph is restrictive to traverse, as an edge may only permit traversal
    in one direction (Figure [16-2](#490882_1_En_16_Chapter.xhtml#Fig2)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig2_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig2_HTML.png)


    Figure 16-2


    Directed graph


    It can be easily seen from this diagram that


    *   There is a route from A to B


    *   There is no direct route from A to D


    *   There is a round trip route between B and D


    *   There is no way to get from B to A'
