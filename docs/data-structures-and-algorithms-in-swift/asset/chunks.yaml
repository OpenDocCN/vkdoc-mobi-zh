    let drinks = Node(data: \"Drinks\")\nlet type1 = Node(data: \"Cold\")\nlet type2\
    \ = Node(data: \"Hot\")\ndrinks.add(child: type1)\ndrinks.add(child: type2)\n\
    type2.add(child: Node(data: \"Latte\"))\ntype1.add(child: Node(data: \"Cola\"\
    ))\ntype1.add(child: Node(data: \"Fanta\"))\ndrinks.printTree()\n```\n\nThe output\
    \ will be:\n\n```\nDrink\nCold\nCola\nFanta\nHot\nLatte\n```\n\nHierarchical structures\
    \ are natural candidates for tree structures, so here we have defined six different\
    \ nodes and organized them in a logical hierarchy. This arrangement corresponds\
    \ to the structure shown in Figure 8-2.\n\n![../images/490882_1_En_8_Chapter/490882_1_En_8_Fig2_HTML.png](images/490882_1_En_8_Chapter/490882_1_En_8_Fig2_HTML.png)\n\
    \nFigure 8-2 — Sample tree\n\n### Searching Data\n\nAdd the following method inside\
    \ the `Node` class for the search algorithm of the tree data structure that we\
    \ declared. This method searches for a value in the tree, and if the data exist\
    \ in the tree, it returns the node associated with the value; otherwise the return\
    \ is `nil`. If the data is found in the current node, we return `self` which is\
    \ the current node. The next line of the code loops through the children array\
