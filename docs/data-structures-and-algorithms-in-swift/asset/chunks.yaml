    calculated results are less, so B and C are updated to the new values (Figure
    [16-20](#490882_1_En_16_Chapter.xhtml#Fig20)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig20_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig20_HTML.png)


    Figure 16-20


    Dijkstra’s algorithm, Step 2


    Step 3: At this stage, we need to choose the next point to move to, and the one
    with the lowest cost is chosen which is B in this case. This means that A → B
    is the shortest path from the starting point to B. Taking the path determined
    to be the shortest, we move to point B and there are three candidates in this
    point, so C, D, and E are added as the new candidates. Using the cost calculation
    method, we calculate the cost of each candidate (Figure [16-21](#490882_1_En_16_Chapter.xhtml#Fig21)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig21_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig21_HTML.png)


    Figure 16-21


    Dijkstra’s algorithm, Step 3


    *   B → C : 2 + 6 = 8, which is greater than C’s current value of 5, so no update
    is made.


    *   B → D : 2 + 1 = 3, which is less than D’s current value of infinity, so the
    value is updated.


    *   B → E : 2 + 3 = 5, which is less than E’s current value of infinity, so the
    value is updated.


    Step 4: Here again we choose the point with the lowest cost which is D. At this
    point we have determined that the chosen A → B → D is the shortest path from starting
    point A to D, so we move to point D. There is one candidate in this point, so
    E is added as the new candidate and the cost of E is calculated (Figure [16-22](#490882_1_En_16_Chapter.xhtml#Fig22)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig22_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig22_HTML.png)


    Figure 16-22


    Dijkstra’s algorithm, Step 4


    *   D → E : 3 + 4 = 7, which is greater than E’s current value of 5, so no update
    is made.


    Step 5: The cost to E from D is not the lowest cost, the cost of point C is lower
    than E and it is minimum with a value of 5, and that is why our next move is C.
    There is one candidate in this point, so F is added as the new candidate and the
    cost of F is calculated (Figure [16-23](#490882_1_En_16_Chapter.xhtml#Fig23)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig23_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig23_HTML.png)


    Figure 16-23


    Dijkstra’s algorithm, Step 5


    *   C → F : 5 + 8 = 13, which is less than F’s current value of infinity, so the
    value is updated.


    Step 6: The cost of F is greater than the cost of E, so the lowest cost point
    is E with a value of 5\. We move to E and there is only one candidate from this
    point which is G; it is added as the new candidate and the cost is calculated
    (Figure [16-24](#490882_1_En_16_Chapter.xhtml#Fig24)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig24_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig24_HTML.png)


    Figure 16-24


    Dijkstra’s algorithm, Step 6


    *   E → G : 5 + 9 = 14, which is less than G’s current value of infinity, so the
    value is updated.


    Step 7: The cost of F is lower than G. We move to F and there is only one candidate
    from this point which is G; it is added as the new candidate and the cost is calculated
    (Figure [16-25](#490882_1_En_16_Chapter.xhtml#Fig25)).


    *   F → G : 13 + 7 = 20, which is greater than G’s current value of 14, no update
    is made.


    This means that E → G is better than F → G path and finally we reach our goal,
    and the beast way is A → B → E → G with the cost of 14.


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig25_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig25_HTML.png)


    Figure 16-25


    Dijkstra’s algorithm, Step 7


    As you can see, Dijkstra’s algorithm efficiently searches for the shortest path
    by devising which point to choose next.


    Advantages


    *   It is used in maps.


    *   Distance between the location refers to the edges.


    *   It is used in telephone network.


    Disadvantages


    *   It does blind search which is a waste of time.


    *   It cannot handle negative edges.'
  trans: "\n### 实现\n\n首先，我们将创建一个树节点，它包含值和子节点。由于 Swift 要求为类手动创建 `init` 方法，因此这里也包含了该方法。然后我们添加\
    \ `addChild` 函数来为指定节点分配子节点。\n\n```swift\npublic class DFNode {\n    public var\
    \ value: inputType\n    public var children: [DFNode] = []\n    public init(_\
    \ value: inputType) {\n        self.value = value\n    }\n    public func addChild(_\
    \ child: DFNode) {\n        children.append(child)\n    }\n}\n```\n\n我们在深度优先搜索（DFS）中使用该树节点。为此，我们在树节点类内部创建另一个函数，该函数对下一个节点使用递归过程。\n\
    \n```swift\npublic func depthFirstSearch(visit: (DFNode) -> Void) {\n    visit(self)\n\
    \    children.forEach {\n        $0.depthFirstSearch(visit: visit)\n    }\n}\n\
    ```\n\n例如：\n\n首先，我们创建一个树节点并为其添加子节点；然后我们将使用 `depthFirstSearch` 函数来演示其工作原理。\n\n\
    ```swift\nlet nodeA = DFNode(\"A\")\nlet nodeB = DFNode(\"B\")\nlet nodeC = DFNode(\"\
    C\")\nlet nodeD = DFNode(\"D\")\nlet nodeE = DFNode(\"E\")\nlet nodeF = DFNode(\"\
    F\")\nlet nodeG = DFNode(\"G\")\nnodeA.addChild(nodeB)\nnodeA.addChild(nodeC)\n\
    nodeB.addChild(nodeE)\nnodeB.addChild(nodeF)\nnodeE.addChild(nodeG)\n```\n\n我们在此创建的树如图\
    \ 16-17 所示。\n\n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig17_HTML.png](img/490882_1_En_16_Fig17_HTML.png)\n\
    \n图 16-17\n\nDFS 示例\n\n如果我们对此树运行 `depthFirstSearch` 方法，输出将为\n\n```swift\nnodeA.depthFirstSearch\
    \ {\n    print($0.value)\n}\n```\n\n输出：\n\n```\nA\nB\nE\nG\nF\nC\n```\n\n可以很容易地看出，我们以深度优先搜索（DFS）风格搜索图，即在访问其他子节点之前先深入探索更深的节点。\n\
    \n## 迪杰斯特拉算法\n\n迪杰斯特拉算法是一种用于寻找图中两点之间最短路径的算法。它由计算机科学家艾兹格·W·迪杰斯特拉于 1956 年提出。\n\n\
    让我们看看它的实际运行过程；假设我们有一个如图 16-18 所示的图数据结构，并且我们想要找到从 A 到 G 的最短路径。\n\n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig18_HTML.png](img/490882_1_En_16_Fig18_HTML.png)\n\
    \n图 16-18\n\n用于迪杰斯特拉算法的图\n\n从图中可以很容易看出每条路径都有相应的开销。在**步骤 1** 中，起点被设为 0，所有其他点被设为无穷大。我们从第一个点开始搜索未探索的点，一旦找到这些点，它们就成为移动到下一个点的候选点（图\
    \ 16-19）。\n\n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig19_HTML.png](img/490882_1_En_16_Fig19_HTML.png)\n\
    \n图 16-19\n\n迪杰斯特拉算法，步骤 1\n\n**步骤 2**：在此阶段，点 B 和 C 是我们的候选点，每个点的开销根据当前点的开销加上移动到候选点的开销来计算。在我们的例子中，A\
    \ 的开销为 0，移动到 B 的开销为 2；B 的开销将为 0+2 = 2。类似地，移动到 C 的开销将为 0+5=5。因此，如果计算出的开销小于当前值，则该点的开销将更新为新值。由于\
    \ B 和 C 的当前开销是无穷大，计算出的结果更小，因此 B 和 C 被更新为新值（图 16-20）。\n\n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig20_HTML.png](img/490882_1_En_16_Fig20_HTML.png)\n\
    \n图 16-20\n\n迪杰斯特拉算法，步骤 2\n\n**步骤 3**：在此阶段，我们需要选择下一个要移动的点，并选择开销最低的那个点，在本例中是 B。这意味着\
    \ `A → B` 是从起始点到 B 的最短路径。沿着确定为最短的路径，我们移动到点 B，该点有三个候选点，因此 C、D 和 E 被添加为新的候选点。使用开销计算方法，我们计算每个候选点的开销（图\
    \ 16-21）。\n\n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig21_HTML.png](img/490882_1_En_16_Fig21_HTML.png)\n\
    \n图 16-21\n\n迪杰斯特拉算法，步骤 3\n\n*   `B → C` : 2 + 6 = 8，这大于 C 的当前值 5，因此不进行更新。\n*\
    \   `B → D` : 2 + 1 = 3，这小于 D 的当前值无穷大，因此该值被更新。\n*   `B → E` : 2 + 3 = 5，这小于 E\
    \ 的当前值无穷大，因此该值被更新。\n\n**步骤 4**：这里我们再次选择开销最低的点，即 D。此时我们已经确定所选路径 `A → B → D` 是从起点\
    \ A 到 D 的最短路径，因此我们移动到点 D。该点有一个候选点，因此 E 被添加为新的候选点，并计算 E 的开销（图 16-22）。\n\n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig22_HTML.png](img/490882_1_En_16_Fig22_HTML.png)\n\
    \n图 16-22\n\n迪杰斯特拉算法，步骤 4\n\n*   `D → E` : 3 + 4 = 7，这大于 E 的当前值 5，因此不进行更新。\n\n\
    **步骤 5**：从 D 到 E 的开销并非最低。点 C 的开销低于 E，并且其最小值为 5，因此我们下一步将移动到 C。该点有一个候选点，因此 F 被添加为新的候选点，并计算\
    \ F 的开销（图 16-23）。\n\n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig23_HTML.png](img/490882_1_En_16_Fig23_HTML.png)\n\
    \n图 16-23\n\n迪杰斯特拉算法，步骤 5\n\n*   `C → F` : 5 + 8 = 13，这小于 F 的当前值无穷大，因此该值被更新。\n\
    \n**步骤 6**：F 的开销大于 E 的开销，因此开销最低的点是 E，其值为 5。我们移动到 E，并且该点只有一个候选点 G；它被添加为新的候选点并计算开销（图\
    \ 16-24）。\n\n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig24_HTML.png](img/490882_1_En_16_Fig24_HTML.png)\n\
    \n图 16-24\n\n迪杰斯特拉算法，步骤 6\n\n*   `E → G` : 5 + 9 = 14，这小于 G 的当前值无穷大，因此该值被更新。\n\
    \n**步骤 7**：F 的开销低于 G。我们移动到 F，并且该点只有一个候选点 G；它被添加为新的候选点并计算开销（图 16-25）。\n\n*   `F\
    \ → G` : 13 + 7 = 20，这大于 G 的当前值 14，因此不进行更新。\n\n这意味着 `E → G` 路径优于 `F → G` 路径，最终我们达到了目标，最佳路径是\
    \ `A → B → E → G`，总开销为 14。\n\n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig25_HTML.png](img/490882_1_En_16_Fig25_HTML.png)\n\
    \n图 16-25\n\n迪杰斯特拉算法，步骤 7\n\n如您所见，迪杰斯特拉算法通过巧妙选择下一步要探索哪个点，高效地搜索最短路径。\n\n**优点**\n\
    \n*   应用于地图导航。\n*   位置之间的距离通过边来表示。\n*   应用于电话网络。\n\n**缺点**\n\n*   执行盲目搜索，浪费时间。\n\
    *   无法处理负权边。\n"
- fmt: "### Implementation\n\nFirst, we will create the `GraphNode` and `Connection`\
    \ classes. The `GraphNode` class has two properties: `visited`, which shows whether\
    \ the node is visited, and `connections` array, which is the connection to other\
    \ nodes. The `Connection` class has also two properties: `toNode`, the node that\
    \ will be connected, and `cost`, the cost of moving from the current node to the\
    \ connected node. Take into account that the cost must be a positive number.\n\
    \n```\nclass GraphNode {\n    var visited = false\n    var connections: [Connection]\
    \ = []\n}\n\nclass Connection {\n    public let toNode: GraphNode\n    public\
    \ let cost: Int\n\n    public init(to node: GraphNode, cost: Int) {\n        assert(cost\
    \ >= 0, \"Cost has to be equal or greater than zero\")\n        self.toNode =\
    \ node\n        self.cost = cost\n    }\n}\n```\n\nThen we need to create another\
    \ class for the path. The purpose of this class is to keep track of paths that\
    \ we have already visited and how we got there, and it will be used to describe\
    \ the shortest path for our goal.\n\n```\nclass Path {\n    public let cumulativeCost:\
    \ Int\n    public let node: GraphNode\n    public let previousPath: Path?\n\n\
    \    init(to node: GraphNode, via connection: Connection? = nil, previousPath\
    \ path: Path? = nil) {\n        if let previousPath = path, let viaConnection\
    \ = connection {\n            self.cumulativeCost = viaConnection.cost + previousPath.cumulativeCost\n\
    \        } else {\n            self.cumulativeCost = 0\n        }\n        self.node\
    \ = node\n        self.previousPath = path\n    }\n}\n```\n\nHere we declared\
    \ another property called `cumulativeCost` to keep track of the cost for reaching\
    \ to the current point. This is the sum of all the connections cost that we have\
    \ travelled from the source node to this node.\n\n### Algorithm\n\nFirstly, we\
    \ define the path collection which consists of nodes that can reach from the nodes\
    \ that we have visited so far. Initially it is empty; then we append it with paths\
    \ to source the node. After appending the paths, the first step that we are going\
    \ to do is to extract the cheapest path from the path collection and check if\
    \ the node has not been visited yet, and then we proceed to the next step. Then\
    \ we check whether we reach our destination, and if so, we return the cheapest\
    \ path in the path collection (`return cheapestPathInPathCollection`). If we do\
    \ not reach our destination, we mark the current node as visited (`cheapestPathInPathCollection.node.visited\
    \ = true`). Then inside the `for` loop, we add new candidates which are reachable\
    \ from the current node. In this way, Dijkstra's algorithm finds the cheapest\
    \ way to our destination.\n\n```\nfunc dijskastraShortestPath(source: GraphNode,\
    \ destination: GraphNode) -> Path? {\n    var pathCollection: [Path] = [] {\n\
    \        didSet {\n            pathCollection.sort { return $0.cumulativeCost\
    \ < $1.cumulativeCost }\n        }\n    }\n    pathCollection.append(Path(to:\
    \ source))\n\n    while !pathCollection.isEmpty {\n        let cheapestPathInPathCollection\
    \ = pathCollection.removeFirst()\n        guard !cheapestPathInPathCollection.node.visited\
    \ else { continue }\n        if cheapestPathInPathCollection.node === destination\
    \ {\n            return cheapestPathInPathCollection\n        }\n        cheapestPathInPathCollection.node.visited\
    \ = true\n        for connection in cheapestPathInPathCollection.node.connections\
    \ where !connection.toNode.visited {\n            pathCollection.append(Path(to:\
    \ connection.toNode, via: connection, previousPath: cheapestPathInPathCollection))\n\
    \        }\n    }\n    return nil\n}\n```\n\nFor example:\n\nLet's create the\
    \ preceding illustrated graph and find the cheapest way to our goal to find the\
    \ shortest path to point G from point A.\n\n**Step 1:** Create the custom class\
    \ which conforms to our `GraphNode` class.\n\n```\nclass sampleGraphNode: GraphNode\
    \ {\n    let name: String\n    init(name: String) {\n        self.name = name\n\
    \        super.init()\n    }\n}\n```\n\n**Step 2:** Create nodes based on `sampleGraphNode`.\n\
    \n```\nlet nodeA = sampleGraphNode(name: \"A\")\nlet nodeB = sampleGraphNode(name:\
    \ \"B\")\nlet nodeC = sampleGraphNode(name: \"C\")\nlet nodeD = sampleGraphNode(name:\
    \ \"D\")\nlet nodeE = sampleGraphNode(name: \"E\")\nlet nodeF = sampleGraphNode(name:\
    \ \"F\")\nlet nodeG = sampleGraphNode(name: \"G\")\n```\n\n**Step 3:** Create\
    \ connection between these nodes and assign cost to these paths.\n\n```\nnodeA.connections.append(Connection(to:\
    \ nodeB, cost: 2))\nnodeA.connections.append(Connection(to: nodeC, cost: 5))\n\
    nodeB.connections.append(Connection(to: nodeC, cost: 6))\nnodeB.connections.append(Connection(to:\
    \ nodeD, cost: 1))\nnodeB.connections.append(Connection(to: nodeE, cost: 3))\n\
    nodeC.connections.append(Connection(to: nodeF, cost: 8))\nnodeD.connections.append(Connection(to:\
    \ nodeE, cost: 4))\nnodeE.connections.append(Connection(to: nodeG, cost: 9))\n\
    nodeF.connections.append(Connection(to: nodeG, cost: 7))\n```\n\n**Step 4:** Set\
    \ beginning and destination nodes and call Dijkstra's algorithm to find the shortest\
    \ path.\n\n```\nlet sourceNode = nodeA\nlet destinationNode = nodeG\nvar path\
    \ = dijskastraShortestPath(source: sourceNode, destination: destinationNode)\n\
    if let succession: [String] = path?.array.reversed().compactMap({ $0 as? sampleGraphNode}).map({$0.name})\
    \ {\n    print(\"Quickest path: \\(succession)\")\n} else {\n    print(\"No path\
    \ between \\(sourceNode.name) & \\(destinationNode.name)\")\n}\n```\n\nThe output\
    \ will be:\n\n```\nQuickest path: [\"A\", \"B\", \"E\", \"G\"]\n```\n\n## Conclusion\n\
    \nIn this chapter, you have learned about graph algorithms and strategies behind\
    \ them. You mastered about breadth-first search, depth-first search, and Dijkstra's\
    \ algorithms and their advantages and disadvantages. By now you should have a\
    \ good understanding of how to implement these algorithms and which one to choose\
    \ based on the requirements.\n\n# 17. Choosing the Best Algorithm\n\nWe have learned\
    \ different types of algorithms such as sorting, searching, and graph algorithms,\
    \ and there are likely to be many possible algorithms which perform the same task.\
    \ The question is, if we want to search for a value in the list, which type of\
    \ searching algorithm do we have to choose? By analyzing various algorithms, we\
    \ will study this question in this chapter.\n\nThere are many ways of comparing\
    \ algorithms, but in this chapter, we will focus on time complexity and space\
    \ complexity.\n\n- Time complexity: Required time for accomplishing the task\n\
    - Space complexity: Required memory for accomplishing the task\n\nWe will examine\
    \ the different types of algorithms that we explained in this book.\n\n### Sorting\
    \ Algorithms\n\nWe have learned that sorting algorithms order the values in the\
    \ list from smallest to largest, and there are many sorting algorithms that are\
    \ available in computer science. To choose the one which perfectly matches our\
    \ program, we have to possess deep knowledge about how they perform in different\
    \ situations.\n\n#### Bubble Sort\n\nIt is very useful when the list is very nearly\
    \ sorted – if only two elements are out of place. Bubble sort's space requirement\
    \ is at a minimum because the elements are swapped in place without using additional\
    \ temporary storage.\n\n| **Bubble Sort** | Best Case | Worst Case |\n|-----------------|-----------|------------|\n\
    | Time Complexity | O(n) | O(n²) |\n| Space Complexity | O(1) | O(1) |\n\n####\
    \ Selection Sort\n\nIt is similar to bubble sort that performs well on a small\
    \ list and its space requirement is at a minimum. The best, average, and worst\
    \ case time complexity is O(n²) which is independent of distribution of data.\n\
    \n| **Selection Sort** | Best Case | Worst Case |\n|-------------------|-----------|------------|\n\
    | Time Complexity | O(n²) | O(n²) |\n| Space Complexity | O(1) | O(1) |\n\n####\
    \ Insertion Sort\n\nIt is quite efficient when used on a small array of data.\
    \ Quadratic runtime O(n²) can upgrade to a respectable O(n∗k), where k is the\
    \ steps it needs to tread back up the array to swap the previous element with\
    \ the current one. If the list is partially sorted, it can perform even better\
    \ than quick sort.\n\n| **Insertion Sort** | Best Case | Worst Case |\n|-------------------|-----------|------------|\n\
    | Time Complexity | O(n) | O(n²) |\n| Space Complexity | O(1) | O(n) |"
  raw: '### Implementation


    First, we will create the Graph Node and Connection classes. The Graph Node class
    has two properties: visited, which shows whether the node is visited, and connections
    array, which is the connection to other nodes. The Connection class has also two
    properties: toNode, the node that will be connected, and cost, the cost of moving
    from the current node to the connected node. Take into account that the cost must
    be a positive number.


    ```

    class GraphNode {

    var visited = false

    var connections: [Connection] = []

    }

    class Connection {

    public let toNode: GraphNode

    public let cost: Int

    public init(to node: GraphNode, cost: Int) {

    assert(cost >= 0, "Cost has to be equal or greater than zero")

    self.toNode = node

    self.cost = cost

    }

    }

    ```


    Then we need to create another class for the path. The purpose of this class is
    to keep track of paths that we have already visited and how we got there, and
    it will be used to describe the shortest path for our goal.


    ```

    class Path {

    public let cumulativeCost: Int

    public let node: GraphNode

    public let previousPath: Path?

    init(to node: GraphNode, via connection: Connection? = nil, previousPath path:
    Path? = nil) {

    if let previousPath = path, let viaConnection = connection {

    self.cumulativeCost = viaConnection.cost + previousPath.cumulativeCost

    } else {

    self.cumulativeCost = 0

    }

    self.node = node

    self.previousPath = path

    }

    }

    ```


    Here we declared another property called cumulativeCost to keep track of the cost
    for reaching to the current point. This is the sum of all the connections cost
    that we have travelled from the source node to this node.


    ### Algorithm


    Firstly, we define the path collection which consists of nodes that can reach
    from the nodes that we have visited so far. Initially it is empty; then we append
    it with paths to source the node. After appending the paths, the first step that
    we are going to do is to extract the cheapest path from the path collection and
    check if the node has not been visited yet, and then we proceed to the next step.
    Then we check whether we reach our destination, and if so, we return the cheapest
    path in the path collection (**return** `cheapestPathInPathCollection`). If we
    do not reach our destination, we mark the current node as visited (`cheapestPathInPathCollection.node.visited
    = true`). Then inside the **for** `loop,` we add new candidates which are reachable
    from the current node. In this way, Dijkstra’s algorithm finds the cheapest way
    to our destination.


    ```

    func dijskastraShortestPath(source: GraphNode, destination: GraphNode) -> Path?
    {

    var pathCollection: [Path] = [] {

    didSet {

    pathCollection.sort { return $0.cumulativeCost < $1.cumulativeCost }

    }

    }

    pathCollection.append(Path(to: source))

    while !pathCollection.isEmpty {

    let cheapestPathInPathCollection = pathCollection.removeFirst()

    guard !cheapestPathInPathCollection.node.visited else { continue }

    if cheapestPathInPathCollection.node === destination {

    return cheapestPathInPathCollection

    }

    cheapestPathInPathCollection.node.visited = true

    for connection in cheapestPathInPathCollection.node.connections where !connection.toNode.visited
    {

    pathCollection.append(Path(to: connection.toNode, via: connection, previousPath:
