    \ value that we are searching for is not located in this path. Thus, we will continue\
    \ to the next point that is reachable from A. We move to C, and H is added as\
    \ the new candidate (Figure [16-15](#490882_1_En_16_Chapter.xhtml#Fig15)).\n\n\
    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig15_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig15_HTML.png)\n\
    \n**Figure 16-15**  \nDFS, Step 4\n\nAnd in the next stage, we move to H. When\
    \ we reach here, G is added as the new candidate, and in the next step we move\
    \ there. Finally, our goal is reached, so the search is ended here (Figure [16-16](#490882_1_En_16_Chapter.xhtml#Fig16)).\n\
    \n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig16_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig16_HTML.png)\n\
    \n**Figure 16-16**  \nDFS, Step 5\n\nAs you can see, the depth-first search is\
    \ unique in how it searches by digging more into a particular path. We have a\
    \ Binary Search Tree, as we start at the root: node with value A. Step 2 visits\
    \ the first child (from left to right), which is the node with value B. Then,\
    \ as this node has children too, we have to visit them first (again, from left\
    \ to right): so in Step 3, we are visiting the node with value E. The search process\
    \ continues until it reaches the goal.\n\n**Advantages**\n\n- Memory requirement\
    \ is linear.\n- Less time and space complexity.\n- Solution can be found without\
    \ much more search.\n\n**Disadvantages**\n\n- Solution is not guaranteed.\n- It\
    \ might be trapped in searching useless path."
  raw: '### Implementation


    In order to create a BFS algorithm, the following information must be included
    in the structure that will be declared:


    *   Node value


    *   The list of neighbors


    *   Visit status


    So let’s create a node class with these mentioned conditions.


    ```

    public class BFSNode {

    public var nodeValue:T

    public var nodeNeighbors:[BFSNode]

    public var visitedNode:Bool

    public init(value:T, neighbors:[BFSNode], visited:Bool) {

    self.nodeValue = value

    self.nodeNeighbors = neighbors

    self.visitedNode = visited

    }

    public func addNeighbor(node: BFSNode) {

    self.nodeNeighbors.append(node)

    node.nodeNeighbors.append(self)

    }

    }

    ```


    We also declared a method called addNeighbor to connect nodes.


    To keep track of neighbors and visit status, we need additional data structure,
    a queue which is a FIFO data structure. When we start the search process with
    BFS, we will append queue by adding all neighbors to it, and as we visit them,
    they will be popped out one by one and marked as visited.


    Let’s add the following method to our BFSNode class:


    ```

    public static func breadthFirstSearch(first:BFSNode) {

    var queue:[BFSNode] = []

    queue.append(first)

    while queue.isEmpty == false {

    if let node = queue.first {

    print(node.nodeValue)

    node.visitedNode = true

    for child in node.nodeNeighbors {

    if child.visitedNode == false {

    queue.append(child)

    }

    }

    queue.removeFirst()

    }

    }

    }

    ```


    First we initialize a queue that is composed of BFSNode and then append it with
    the first element. Then, inside the loop, we start visiting nodes in the queue,
    and as we visit the nodes, we mark them as visited and add not visited nodes to
    the queue. Finally, the processed nodes are removed and keep working with the
    rest of the queue.


    For example:


    ```

    let nodeA = BFSNode(value: "A", neighbors: [], visited: false)

    let nodeB = BFSNode(value: "B", neighbors: [], visited: false)

    let nodeC = BFSNode(value: "C", neighbors: [], visited: false)

    let nodeD = BFSNode(value: "D", neighbors: [], visited: false)

    let nodeE = BFSNode(value: "E", neighbors: [], visited: false)

    let nodeF = BFSNode(value: "F", neighbors: [], visited: false)

    nodeA.addNeighbor(node: nodeB)

    nodeC.addNeighbor(node: nodeB)

    nodeD.addNeighbor(node: nodeB)

    nodeE.addNeighbor(node: nodeB)

    nodeF.addNeighbor(node: nodeD)

    BFSNode.breadthFirstSearch(first: nodeA)

    ```


    The output will be


    ```

    A

    B

    C

    D

    E

    F

    ```


    It can be easily seen that we search the graph in BFS style, by visiting each
    level’s child before going deeper.


    ## Depth-First Search (DFS)


    Depth-first search (DFS) is a recursive algorithm that explores a branch as far
    as possible until it reaches the end. When it reaches the end of the branch, it
    moves a step back and explores the next available branch until it finds the value
    that we are looking for. To avoid visiting a node more than once, a Boolean value
    is used for tracking.


    Let’s look at the following example:


    Our goal is to find G by using DFS (Figure [16-11](#490882_1_En_16_Chapter.xhtml#Fig11)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig11_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig11_HTML.png)


    Figure 16-11


    We’re going to look for G using a depth-first search


    The beginning point is A; from this point, B, C, and D are reachable and they
    will be considered as candidates for the next point to move to (Figure [16-12](#490882_1_En_16_Chapter.xhtml#Fig12)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig12_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig12_HTML.png)


    Figure 16-12


    DFS, Step 1


    Then we select one point among the candidates and the basis for selection is whichever
    one was added as a candidate last. For the points that became candidates at the
    same time, it does not matter which one is selected. We start to select from the
    left side; in our case, it is B and we move to the selected point. Points E and
    F are reachable from point B, so they are added as new candidates for the next
    move (Figure [16-13](#490882_1_En_16_Chapter.xhtml#Fig13)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig13_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig13_HTML.png)


    Figure 16-13


    DFS, Step 2


    Here again we have two new candidates which are added at the same time, so we
    select the one which is on the left which is E and we move to the selected point
    and the reachable point K is added as the new candidate. Please notice that in
    depth-first search we are not going back to the point which is reachable from
    A as in breadth-first search; here we continue until the end of reachable points
    (Figure [16-14](#490882_1_En_16_Chapter.xhtml#Fig14)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig14_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig14_HTML.png)


    Figure 16-14


    DFS, Step 3


    The next point that we will go is K, and from here there is no point that can
    be reached. So we continue to the next point that is reachable from B, and here
    again there is no point to go and the value that we are searching for is not located
    in this path. Thus, we will continue to the next point that is reachable from
    A. We move to C, and H is added as the new candidate (Figure [16-15](#490882_1_En_16_Chapter.xhtml#Fig15)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig15_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig15_HTML.png)


    Figure 16-15


    DFS, Step 4


    And in the next stage, we move to H. When we reach here, G is added as the new
    candidate, and in the next step we move there. Finally, our goal is reached, so
    the search is ended here (Figure [16-16](#490882_1_En_16_Chapter.xhtml#Fig16)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig16_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig16_HTML.png)


    Figure 16-16


    DSF, Step 5


    As you can see, the depth-first search is unique in how it searches by digging
    more into a particular path. We have Binary Search Tree, as we start at the root:
    node with value A. Step 2 visits the first child (from left to right), which is
    the node with value B. Then, as this node has children too, we have to visit them
    first (again, from left to right): so in Step 3, we are visiting the node with
    value E. The search process continues until it reaches the goal.


    Advantages


    *   Memory requirement is linear.


    *   Less time and space complexity.


    *   Solution can be found without much more search.


    Disadvantages


    *   Solution is not guaranteed.


    *   It might be trapped in searching useless path.'
  trans: "\n### 实现\n\n为了创建 BFS 算法，声明的结构中必须包含以下信息：\n\n- 节点值\n- 邻居列表\n- 访问状态\n\n因此，我们根据上述条件创建一个节点类。\n\
    \n```swift\npublic class BFSNode {\n    public var nodeValue: T\n    public var\
    \ nodeNeighbors: [BFSNode]\n    public var visitedNode: Bool\n    public init(value:\
    \ T, neighbors: [BFSNode], visited: Bool) {\n        self.nodeValue = value\n\
    \        self.nodeNeighbors = neighbors\n        self.visitedNode = visited\n\
    \    }\n    public func addNeighbor(node: BFSNode) {\n        self.nodeNeighbors.append(node)\n\
    \        node.nodeNeighbors.append(self)\n    }\n}\n```\n\n我们还声明了一个名为 `addNeighbor`\
    \ 的方法来连接节点。\n\n为了追踪邻居和访问状态，我们需要一个额外的数据结构——一个队列，它是一种先进先出（FIFO）的数据结构。当我们用 BFS 开始搜索过程时，我们将所有邻居添加到队列中，并在访问它们时，将它们逐一弹出并标记为已访问。\n\
    \n让我们向 `BFSNode` 类添加以下方法：\n\n```swift\npublic static func breadthFirstSearch(first:\
    \ BFSNode) {\n    var queue: [BFSNode] = []\n    queue.append(first)\n    while\
    \ queue.isEmpty == false {\n        if let node = queue.first {\n            print(node.nodeValue)\n\
    \            node.visitedNode = true\n            for child in node.nodeNeighbors\
    \ {\n                if child.visitedNode == false {\n                    queue.append(child)\n\
    \                }\n            }\n            queue.removeFirst()\n        }\n\
    \    }\n}\n```\n\n首先，我们初始化一个由 `BFSNode` 组成的队列，然后将第一个元素添加进去。然后，在循环内部，我们开始访问队列中的节点，并在访问节点时将其标记为已访问，同时将未访问的节点加入队列。最后，处理过的节点被移除，我们继续处理队列中的剩余元素。\n\
    \n例如：\n\n```swift\nlet nodeA = BFSNode(value: \"A\", neighbors: [], visited: false)\n\
    let nodeB = BFSNode(value: \"B\", neighbors: [], visited: false)\nlet nodeC =\
    \ BFSNode(value: \"C\", neighbors: [], visited: false)\nlet nodeD = BFSNode(value:\
    \ \"D\", neighbors: [], visited: false)\nlet nodeE = BFSNode(value: \"E\", neighbors:\
    \ [], visited: false)\nlet nodeF = BFSNode(value: \"F\", neighbors: [], visited:\
    \ false)\nnodeA.addNeighbor(node: nodeB)\nnodeC.addNeighbor(node: nodeB)\nnodeD.addNeighbor(node:\
    \ nodeB)\nnodeE.addNeighbor(node: nodeB)\nnodeF.addNeighbor(node: nodeD)\nBFSNode.breadthFirstSearch(first:\
    \ nodeA)\n```\n\n输出将会是：\n\n```\nA\nB\nC\nD\nE\nF\n```\n\n可以很容易地看出，我们以 BFS 方式搜索图，即在深入之前先访问每一层的子节点。\n\
    \n## 深度优先搜索 (DFS)\n\n深度优先搜索（DFS）是一种递归算法，它会尽可能深入地探索一个分支，直到抵达终点。当它到达分支的终点时，会后退一步，探索下一个可用的分支，直到找到我们要寻找的值。为了避免多次访问同一个节点，会使用一个布尔值来进行追踪。\n\
    \n让我们看下面的例子：\n\n我们的目标是使用 DFS 找到 G（图 16-11）。\n\n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig11_HTML.png](img/490882_1_En_16_Fig11_HTML.png)\n\
    \n**图 16-11**  \n我们将使用深度优先搜索寻找 G\n\n起点是 A；从该点出发，B、C 和 D 都是可达的，它们将被视为下一步移动的候选点（图\
    \ 16-12）。\n\n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig12_HTML.png](img/490882_1_En_16_Fig12_HTML.png)\n\
    \n**图 16-12**  \nDFS，步骤 1\n\n然后我们在候选点中选择一个，选择依据是最后被添加为候选点的那个。对于同时成为候选点的那些点，选择哪一个无关紧要。我们从左侧开始选择；在我们的例子中是\
    \ B，然后我们移动到选中的点。从点 B 可以到达点 E 和 F，因此它们被添加为下一步移动的新候选点（图 16-13）。\n\n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig13_HTML.png](img/490882_1_En_16_Fig13_HTML.png)\n\
    \n**图 16-13**  \nDFS，步骤 2\n\n这里我们又有了两个同时添加的新候选点，因此我们选择左侧的那个，即 E，然后移动到选中的点，并将可达的点\
    \ K 添加为新候选点。请注意，在深度优先搜索中，我们不会像广度优先搜索那样返回从 A 可达的点；在这里，我们会一直深入直到可达点的尽头（图 16-14）。\n\
    \n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig14_HTML.png](img/490882_1_En_16_Fig14_HTML.png)\n\
    \n**图 16-14**  \nDFS，步骤 3\n\n我们接下来要去的点是 K，从这里无法到达任何点。因此，我们继续前往从 B 可达的下一个点，这里同样没有点可以前往，并且我们要寻找的值也不在此路径中。于是，我们继续前往从\
    \ A 可达的下一个点。我们移动到 C，并将 H 添加为新候选点（图 16-15）。\n\n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig15_HTML.png](img/490882_1_En_16_Fig15_HTML.png)\n\
    \n**图 16-15**  \nDFS，步骤 4\n\n在下一阶段，我们移动到 H。当我们到达这里时，G 被添加为新候选点，在下一步我们移动到那里。终于，我们的目标达成了，因此搜索在此结束（图\
    \ 16-16）。\n\n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig16_HTML.png](img/490882_1_En_16_Fig16_HTML.png)\n\
    \n**图 16-16**  \nDFS，步骤 5\n\n如您所见，深度优先搜索的独特之处在于它通过深入挖掘一条特定路径来进行搜索。我们有一个二叉搜索树，从根节点（值为\
    \ A 的节点）开始。步骤 2 访问第一个子节点（从左到右），即值为 B 的节点。然后，由于该节点也有子节点，我们必须先访问它们（同样从左到右）：因此在步骤\
    \ 3 中，我们访问值为 E 的节点。搜索过程持续进行，直到达到目标。\n\n**优点**\n\n- 内存需求是线性的。\n- 时间和空间复杂度较低。\n\
    - 无需过多搜索即可找到解决方案。\n\n**缺点**\n\n- 不保证一定能找到解决方案。\n- 可能陷入对无用路径的搜索。\n"
- fmt: "### Implementation\n\nFirst we will create a Tree Node which consists of value\
    \ and children. The `init` method is also included here because Swift requires\
    \ to create `init` method manually for classes. Then we add the `addChild` function\
    \ to assign a child to a given node.\n\n```swift\npublic class DFNode {\n    public\
    \ var value: inputType\n    public var children: [DFNode] = []\n    public init(_\
    \ value: inputType) {\n        self.value = value\n    }\n    public func addChild(_\
    \ child: DFNode) {\n        children.append(child)\n    }\n}\n```\n\nWe use the\
    \ Tree Node inside the DFS. To do so we create another function inside the Tree\
    \ Node class which uses recursion process in the next node.\n\n```swift\npublic\
    \ func depthFirstSearch(visit: (DFNode) -> Void) {\n    visit(self)\n    children.forEach\
    \ {\n        $0.depthFirstSearch(visit: visit)\n    }\n}\n```\n\nFor example:\n\
    \nFirstly, we create a tree node and add children to it; then we will use the\
    \ `depthFirstSearch` function to show how it works.\n\n```swift\nlet nodeA = DFNode(\"\
    A\")\nlet nodeB = DFNode(\"B\")\nlet nodeC = DFNode(\"C\")\nlet nodeD = DFNode(\"\
    D\")\nlet nodeE = DFNode(\"E\")\nlet nodeF = DFNode(\"F\")\nlet nodeG = DFNode(\"\
    G\")\nnodeA.addChild(nodeB)\nnodeA.addChild(nodeC)\nnodeB.addChild(nodeE)\nnodeB.addChild(nodeF)\n\
    nodeE.addChild(nodeG)\n```\n\nThe tree that we created here is visually shown\
    \ in Figure [16-17](#490882_1_En_16_Chapter.xhtml#Fig17).\n\n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig17_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig17_HTML.png)\n\
    \nFigure 16-17\n\nDFS example\n\nIf we run the `depthFirstSearch` method for this\
    \ tree, the output will be\n\n```swift\nnodeA.depthFirstSearch {\n    print($0.value)\n\
    }\n```\n\nOutput:\n\n```\nA\nB\nE\nG\nF\nC\n```\n\nIt can be easily seen that\
    \ we search the graph in DFS style, by visiting deeper before going to other children.\n\
    \n## Dijkstra’s Algorithm\n\nDijkstra’s algorithm is an algorithm that finds the\
    \ shortest path between points in a graph. It is developed by a computer scientist\
    \ Edsger W. Dijkstra in 1956.\n\nLet’s look at it in action; imagine that we have\
    \ a graph data structure as shown in Figure [16-18](#490882_1_En_16_Chapter.xhtml#Fig18),\
    \ and we want to find the shortest path from A to G.\n\n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig18_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig18_HTML.png)\n\
    \nFigure 16-18\n\nGraph for Dijkstra’s algorithm\n\nIt can be easily seen from\
    \ the graph that the cost is available for all paths. In Step 1, the starting\
    \ point is set to 0 and all other points are set to infinity. We start from the\
    \ first point and search for unexplored points, and once these points are found,\
    \ they become candidates for moving to the next (Figure [16-19](#490882_1_En_16_Chapter.xhtml#Fig19)).\n\
    \n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig19_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig19_HTML.png)\n\
    \nFigure 16-19\n\nDijkstra’s algorithm, Step 1\n\nStep 2: At this stage, points\
    \ B and C are our candidates, and the cost for each point is calculated based\
    \ on the current point’s cost plus the cost of moving to a candidate point. In\
    \ our case the cost of A is 0 and moving to B is 2; the cost of B will be 0+2\
    \ = 2. Similarly, the cost of moving to C will be 0+5=5. So if the calculated\
    \ cost is less than the current value, the point’s cost is updated to the new\
    \ value. Since the current costs of B and C are infinity, the calculated results\
    \ are less, so B and C are updated to the new values (Figure [16-20](#490882_1_En_16_Chapter.xhtml#Fig20)).\n\
    \n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig20_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig20_HTML.png)\n\
    \nFigure 16-20\n\nDijkstra’s algorithm, Step 2\n\nStep 3: At this stage, we need\
    \ to choose the next point to move to, and the one with the lowest cost is chosen\
    \ which is B in this case. This means that `A → B` is the shortest path from the\
    \ starting point to B. Taking the path determined to be the shortest, we move\
    \ to point B and there are three candidates in this point, so C, D, and E are\
    \ added as the new candidates. Using the cost calculation method, we calculate\
    \ the cost of each candidate (Figure [16-21](#490882_1_En_16_Chapter.xhtml#Fig21)).\n\
    \n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig21_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig21_HTML.png)\n\
    \nFigure 16-21\n\nDijkstra’s algorithm, Step 3\n\n*   `B → C` : 2 + 6 = 8, which\
    \ is greater than C’s current value of 5, so no update is made.\n*   `B → D` :\
    \ 2 + 1 = 3, which is less than D’s current value of infinity, so the value is\
    \ updated.\n*   `B → E` : 2 + 3 = 5, which is less than E’s current value of infinity,\
    \ so the value is updated.\n\nStep 4: Here again we choose the point with the\
    \ lowest cost which is D. At this point we have determined that the chosen `A\
    \ → B → D` is the shortest path from starting point A to D, so we move to point\
    \ D. There is one candidate in this point, so E is added as the new candidate\
    \ and the cost of E is calculated (Figure [16-22](#490882_1_En_16_Chapter.xhtml#Fig22)).\n\
    \n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig22_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig22_HTML.png)\n\
    \nFigure 16-22\n\nDijkstra’s algorithm, Step 4\n\n*   `D → E` : 3 + 4 = 7, which\
    \ is greater than E’s current value of 5, so no update is made.\n\nStep 5: The\
    \ cost to E from D is not the lowest cost, the cost of point C is lower than E\
    \ and it is minimum with a value of 5, and that is why our next move is C. There\
    \ is one candidate in this point, so F is added as the new candidate and the cost\
    \ of F is calculated (Figure [16-23](#490882_1_En_16_Chapter.xhtml#Fig23)).\n\n\
    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig23_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig23_HTML.png)\n\
    \nFigure 16-23\n\nDijkstra’s algorithm, Step 5\n\n*   `C → F` : 5 + 8 = 13, which\
    \ is less than F’s current value of infinity, so the value is updated.\n\nStep\
    \ 6: The cost of F is greater than the cost of E, so the lowest cost point is\
    \ E with a value of 5. We move to E and there is only one candidate from this\
    \ point which is G; it is added as the new candidate and the cost is calculated\
    \ (Figure [16-24](#490882_1_En_16_Chapter.xhtml#Fig24)).\n\n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig24_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig24_HTML.png)\n\
    \nFigure 16-24\n\nDijkstra’s algorithm, Step 6\n\n*   `E → G` : 5 + 9 = 14, which\
    \ is less than G’s current value of infinity, so the value is updated.\n\nStep\
    \ 7: The cost of F is lower than G. We move to F and there is only one candidate\
    \ from this point which is G; it is added as the new candidate and the cost is\
    \ calculated (Figure [16-25](#490882_1_En_16_Chapter.xhtml#Fig25)).\n\n*   `F\
    \ → G` : 13 + 7 = 20, which is greater than G’s current value of 14, no update\
    \ is made.\n\nThis means that `E → G` is better than `F → G` path and finally\
    \ we reach our goal, and the best way is `A → B → E → G` with the cost of 14.\n\
    \n![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig25_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig25_HTML.png)\n\
    \nFigure 16-25\n\nDijkstra’s algorithm, Step 7\n\nAs you can see, Dijkstra’s algorithm\
    \ efficiently searches for the shortest path by devising which point to choose\
    \ next.\n\n**Advantages**\n\n*   It is used in maps.\n*   Distance between the\
    \ location refers to the edges.\n*   It is used in telephone network.\n\n**Disadvantages**\n\
    \n*   It does blind search which is a waste of time.\n*   It cannot handle negative\
    \ edges."
