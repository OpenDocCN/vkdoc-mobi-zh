  raw: '### First


    This property is used to access the first element of a dictionary.


    ```

    let myDictionary : [Int: String] = [1: "One", 2: "Two", 3: "Three"]

    print(myDictionary.first)

    ```


    The output will be


    ```

    Optional((key: 2, value: "Two"))

    ```


    ### Count


    It returns the total number of elements in a dictionary.


    ```

    print(myDictionary.count)

    ```


    The output will be


    ```


    ```


    ### Keys


    It returns all the keys inside a dictionary.


    ```

    let dictKeys  = Array(myDictionary.keys)

    print(dictKeys)

    ```


    The output will be


    ```

    [1,2,3]

    ```


    ## Conclusion


    In this chapter, you have learned about the structure of dictionaries and how
    to access, add, remove, and modify elements in it. The built-in properties and
    functions provided by the Swift programming language are also covered.


    # 3. Sets


    It is an unordered collection (meaning you won''t get the elements in the same
    order as you defined) of unique, non-nil elements. It must conform to the **Hashable**
    protocol . This means it has to provide a `hashValue` property. This is important
    because sets are unordered and `hashValue` is used to access the elements of the
    sets.


    Access time is more efficient than arrays. When searching for an element inside
    an array, the worst scenario is **O(n)**, where n is the size of the array, but
    in a set, it is always constant **O(1)**. Unlike other collection types while
    declaring sets, a set type must be specified.


    ```

    //Full syntax declaration

    var intSet = Set()

    //Initialize a set from an array literal

    var stringSet: Set = ["One", "Two", "Three"]

    ```


    ## Accessing, Adding, and Removing an Element of a Set


    ## Accessing an Element


    As previously mentioned, sets are unordered and do not have indexes, so it is
    not possible to access elements of a set using **subscript** `syntax` as arrays.
    It can be accessed through using the set’s own methods and properties or using
    for`–`in loops.


    ```

    // Accessing an element

    for num in stringSet {

    print(num)

    }

    ```


    The output will be


    ```

    Two

    One

    Three

    ```


    For ordered iteration, the following method can be used:


    ```

    //Ordered iteration

    for num in stringSet.sorted() {

    print(num)

    }

    ```


    To check if an element exists in a set, `contains(_:)` method can be used.


    ```

    // Check if the element exists

    if stringSet.contains("One") {

    print("Element found")

    } else {

    print("Element not found")

    }

    ```


    The output will be


    ```

    Element found

    ```


    ## Adding an Element


    Using the `insert()` method , a new element can be added to a set.


    ```

    //Insert a new element

    stringSet.insert("Four")

    print(stringSet)

    ```


    The output will be


    ```

    ["Four", "One", "Two", "Three"]

    ```


    ## Removing Elements


    There are several methods that can be used to remove the elements from a set.


    *   `remove(_:) –` To remove an element when you have an instance of it


    *   `remove(at:) –` To remove the element when you know the index


    *   `removeFirst() –` To remove the first element and starting index


    *   `removeAll() or removeAll(keepCapacity) –` To remove all elements


    ```

    //Remove an element

    stringSet.remove("Four")

    //Remove an element in an index

    if let idx = stringSet.firstIndex(of: "One") {

    stringSet.remove(at: idx)

    }

    // Remove first

    stringSet.removeFirst()

    //Remove all

    stringSet.removeAll()

    ```


    ## Set Operations


    One of the main advantages of using sets is you can perform two types of set operations
    `–` comparison operations and membership and equality operations. These are similar
    to the set operations in Math.


    ### Comparison Operations


    There are four methods for performing comparison operations in Swift: union, intersection,
    subtracting, and symmetric difference. Let’s review them now.


    #### Union


    The union of two sets is the set of all values from both sets (Figure [3-1](#490882_1_En_3_Chapter.xhtml#Fig1)).


    ![../images/490882_1_En_3_Chapter/490882_1_En_3_Fig1_HTML.png](images/490882_1_En_3_Chapter/490882_1_En_3_Fig1_HTML.png)


    Figure 3-1


    Union of two sets


    The `union(_:)` and `formUnion(_:)` methods are used to unite two sets which create
    a new set with all values from both sets. The second function deletes all elements
    from the first set (**A**) and inserts the union of **A** and **B**, which means
    that you cannot use this function when you declare set with as constant set with
    **let** keyword; to use the `formUnion(_:)` method, first set **A** must be declared
    with **var** keyword.


    ```

    //Union

    let A: Set = [1, 3, 5, 7]

    let B: Set = [0, 2, 4, 6]

    print(A.union(B))

    ```


    The output will be


    ```

    [3, 6, 2, 0, 7, 5, 1, 4]

    ```


    #### Intersection


    The intersection of two sets is the set with elements only common to both (Figure
    [3-2](#490882_1_En_3_Chapter.xhtml#Fig2)).


    ![../images/490882_1_En_3_Chapter/490882_1_En_3_Fig2_HTML.png](images/490882_1_En_3_Chapter/490882_1_En_3_Fig2_HTML.png)


    Figure 3-2


    Intersection of two sets


    The `intersection(_:)` and `formIntersection(_:)` methods are used to intersect
    two sets which creates a new set from the common elements of both sets. The second
    function deletes all elements from the first set (**A**) and inserts the intersection
    of **A** and **B**, which means that you cannot use this function when you declare
    set with as constant set with **let** keyword; to use the `formIntersection(_:)`
    method, first set **A** must be declared as a variable using the **var** keyword.


    ```

    //Intersection

    let A: Set = [1, 2, 3, 4, 5]

    let B: Set = [0, 2, 4, 6, 8]

    print(A.intersection(B))

    ```


    The output will be


    ```

    [2, 4]

    ```


    #### Subtracting


    The subtracting of two sets is the set that contains all elements from the first
    set except the ones which belong to the second set (Figure [3-3](#490882_1_En_3_Chapter.xhtml#Fig3)).


    ![../images/490882_1_En_3_Chapter/490882_1_En_3_Fig3_HTML.png](images/490882_1_En_3_Chapter/490882_1_En_3_Fig3_HTML.png)


    Figure 3-3


    Subtracting two sets


    The `subtracting(_:)` and `subtract(_:)` methods are used for subtracting of two
    sets. `subtract(_:)` deletes all elements from the first set (**A**) and inserts
    the subtraction of **A** and **B**, which means that you cannot use this function
    when you declare set with as constant set with **let** keyword; to use this method,
    first set **A** must be declared as a variable using the **var** keyword.


    ```

    //Subtracting

    var A: Set = [1, 3, 5, 7, 9]

    let B: Set = [0, 3, 7, 6, 8]

    print(A.subtracting(B))

    ```


    The output will be


    ```

    [1, 5, 9]

    ```


    #### Symmetric Difference


    The symmetric difference of two sets is the set that contains all elements from
    both sets except the common ones (Figure [3-4](#490882_1_En_3_Chapter.xhtml#Fig4)).


    ![../images/490882_1_En_3_Chapter/490882_1_En_3_Fig4_HTML.png](images/490882_1_En_3_Chapter/490882_1_En_3_Fig4_HTML.png)


    Figure 3-4


    Symmetric difference of two sets


    The `symmetricDifference(_:)` and `formSymmetricDifference(_:)` methods are used
    for the symmetric difference of two sets. The same principles apply here to use
    the second function; first, the set must be declared as a variable, and this method,
    (`formSymmetricDifference(_:)` ), deletes all elements from the first set (A)
    and inserts the symmetric difference of both sets.


    ```

    //Symmetric difference

    var A: Set = [1, 2, 3, 4, 5]

    var B: Set = [0, 2, 4, 6, 8]

    print(A.symmetricDifference(B))

    ```


    The output will be


    ```

    [5, 1, 6, 3, 0, 8]

    ```


    ## Membership and Equality Operations


    ### Set Equality


    Two sets are said to be equal if they contain precisely the same values and the
    order of values does not matter.


    ```

    //Set equality

    let A: Set = [2, 4, 6, 8, 10]

    let B: Set = [0, 3, 7, 6, 8]

    let C: Set = [10, 8, 4, 2, 6]

    if A == B {

    print("A and B are equal")

    } else {

    print("A and B are different")

    }

    if A == C {

    print("A and C are equal")

    } else {

    print("A and C are different")

    }

    ```


    The output will be


    ```

    A and B are different

    A and C are equal

    ```'
  trans: "\n### First\n\n该属性用于访问字典的第一个元素。\n\n```\nlet myDictionary : [Int: String]\
    \ = [1: \"One\", 2: \"Two\", 3: \"Three\"]\nprint(myDictionary.first)\n```\n\n\
    输出结果为：\n\n```\nOptional((key: 2, value: \"Two\"))\n```\n\n### Count\n\n返回字典中元素的总数。\n\
    \n```\nprint(myDictionary.count)\n```\n\n输出结果为：\n\n```\n3\n```\n\n### Keys\n\n\
    返回字典中的所有键。\n\n```\nlet dictKeys  = Array(myDictionary.keys)\nprint(dictKeys)\n\
    ```\n\n输出结果为：\n\n```\n[1, 2, 3]\n```\n\n## 结论\n\n在本章中，你已经学习了字典的结构以及如何访问、添加、删除和修改其中的元素。同时，也涵盖了\
    \ Swift 编程语言提供的内置属性和方法。\n\n# 3. 集合\n\n集合是一种无序集合（意味着你不会按照定义时的顺序获取元素），其中包含唯一的、非`nil`元素。它必须遵循`Hashable`协议，这意味着它必须提供一个`hashValue`属性。这一点很重要，因为集合是无序的，而`hashValue`用于访问集合中的元素。\n\
    \n集合的访问时间比数组更高效。在数组中查找一个元素时，最坏情况是`O(n)`，其中`n`是数组的大小；而在集合中，查找时间恒定为`O(1)`。与其他集合类型不同，声明集合时必须指定集合类型。\n\
    \n```\n// 完整语法声明\nvar intSet = Set<Int>()\n// 使用数组字面量初始化集合\nvar stringSet: Set\
    \ = [\"One\", \"Two\", \"Three\"]\n```\n\n## 访问、添加和删除集合中的元素\n\n### 访问元素\n\n如前所述，集合是无序的且没有索引，因此无法像数组那样使用下标语法来访问集合中的元素。可以通过集合自身的方法和属性，或者使用`for`-`in`循环来访问元素。\n\
    \n```\n// 访问元素\nfor num in stringSet {\n    print(num)\n}\n```\n\n输出结果为：\n\n```\n\
    Two\nOne\nThree\n```\n\n若要按顺序遍历，可以使用以下方法：\n\n```\n// 有序遍历\nfor num in stringSet.sorted()\
    \ {\n    print(num)\n}\n```\n\n要检查集合中是否存在某个元素，可以使用`contains(_:)`方法。\n\n```\n//\
    \ 检查元素是否存在\nif stringSet.contains(\"One\") {\n    print(\"找到元素\")\n} else {\n\
    \    print(\"未找到元素\")\n}\n```\n\n输出结果为：\n\n```\n找到元素\n```\n\n### 添加元素\n\n使用`insert()`方法可以向集合中添加新元素。\n\
    \n```\n// 插入新元素\nstringSet.insert(\"Four\")\nprint(stringSet)\n```\n\n输出结果为：\n\
    \n```\n[\"Four\", \"One\", \"Two\", \"Three\"]\n```\n\n### 删除元素\n\n有以下几种方法可用于删除集合中的元素。\n\
    \n- `remove(_:)` – 当你知道要删除的元素实例时\n- `remove(at:)` – 当你知道要删除的索引时\n- `removeFirst()`\
    \ – 删除第一个元素（起始索引）\n- `removeAll()` 或 `removeAll(keepingCapacity:)` – 删除所有元素\n\n\
    ```\n// 删除元素\nstringSet.remove(\"Four\")\n// 删除索引处的元素\nif let idx = stringSet.firstIndex(of:\
    \ \"One\") {\n    stringSet.remove(at: idx)\n}\n// 删除第一个元素\nstringSet.removeFirst()\n\
    // 删除所有元素\nstringSet.removeAll()\n```\n\n## 集合运算\n\n使用集合的主要优势之一是可以执行两类集合运算——比较运算以及成员关系和相等性运算。这些运算与数学中的集合运算类似。\n\
    \n### 比较运算\n\n在 Swift 中，有四种方法可执行比较运算：`union`（并集）、`intersection`（交集）、`subtracting`（差集）和`symmetricDifference`（对称差集）。现在一起来了解一下它们。\n\
    \n#### 并集\n\n两个集合的并集包含两个集合中的所有值（图 3-1）。\n\n![../images/490882_1_En_3_Chapter/490882_1_En_3_Fig1_HTML.png](img/490882_1_En_3_Fig1_HTML.png)\n\
    \n`union(_:)`和`formUnion(_:)`方法用于合并两个集合，创建一个包含两个集合所有值的新集合。第二个函数会删除第一个集合（A）中的所有元素，并插入\
    \ A 和 B 的并集，这意味着当使用`let`关键字将集合声明为常量时，不能使用此函数；要使用`formUnion(_:)`方法，第一个集合 A 必须使用`var`关键字声明。\n\
    \n```\n// 并集\nlet A: Set = [1, 3, 5, 7]\nlet B: Set = [0, 2, 4, 6]\nprint(A.union(B))\n\
    ```\n\n输出结果为：\n\n```\n[3, 6, 2, 0, 7, 5, 1, 4]\n```\n\n#### 交集\n\n两个集合的交集是仅包含两个集合共有元素的集合（图\
    \ 3-2）。\n\n![../images/490882_1_En_3_Chapter/490882_1_En_3_Fig2_HTML.png](img/490882_1_En_3_Fig2_HTML.png)\n\
    \n`intersection(_:)`和`formIntersection(_:)`方法用于求两个集合的交集，创建一个包含两个集合共有元素的新集合。第二个函数会删除第一个集合（A）中的所有元素，并插入\
    \ A 和 B 的交集，这意味着当使用`let`关键字将集合声明为常量时，不能使用此函数；要使用`formIntersection(_:)`方法，第一个集合\
    \ A 必须使用`var`关键字声明为变量。\n\n```\n// 交集\nlet A: Set = [1, 2, 3, 4, 5]\nlet B: Set\
    \ = [0, 2, 4, 6, 8]\nprint(A.intersection(B))\n```\n\n输出结果为：\n\n```\n[2, 4]\n\
    ```\n\n#### 差集\n\n两个集合的差集包含第一个集合中所有不属于第二个集合的元素（图 3-3）。\n\n![../images/490882_1_En_3_Chapter/490882_1_En_3_Fig3_HTML.png](img/490882_1_En_3_Fig3_HTML.png)\n\
    \n`subtracting(_:)`和`subtract(_:)`方法用于两个集合的差集运算。`subtract(_:)`会删除第一个集合（A）中的所有元素，并插入\
    \ A 与 B 的差集，这意味着当使用`let`关键字将集合声明为常量时，不能使用此函数；要使用此方法，第一个集合 A 必须使用`var`关键字声明为变量。\n\
    \n```\n// 差集\nvar A: Set = [1, 3, 5, 7, 9]\nlet B: Set = [0, 3, 7, 6, 8]\nprint(A.subtracting(B))\n\
    ```\n\n输出结果为：\n\n```\n[1, 5, 9]\n```\n\n#### 对称差集\n\n两个集合的对称差集包含两个集合中所有不共有的元素（图\
    \ 3-4）。\n\n![../images/490882_1_En_3_Chapter/490882_1_En_3_Fig4_HTML.png](img/490882_1_En_3_Fig4_HTML.png)\n\
    \n`symmetricDifference(_:)`和`formSymmetricDifference(_:)`方法用于求两个集合的对称差集。这里适用相同的原则：要使用第二个函数，第一个集合必须声明为变量，并且此方法（`formSymmetricDifference(_:)`）会删除第一个集合（A）中的所有元素，并插入两个集合的对称差集。\n\
    \n```\n// 对称差集\nvar A: Set = [1, 2, 3, 4, 5]\nvar B: Set = [0, 2, 4, 6, 8]\nprint(A.symmetricDifference(B))\n\
    ```\n\n输出结果为：\n\n```\n[5, 1, 6, 3, 0, 8]\n```\n\n## 成员关系和相等性运算\n\n### 集合相等\n\n\
    如果两个集合包含完全相同的值，则认为它们相等，值的顺序无关紧要。\n\n```\n// 集合相等\nlet A: Set = [2, 4, 6, 8, 10]\n\
    let B: Set = [0, 3, 7, 6, 8]\nlet C: Set = [10, 8, 4, 2, 6]\n\nif A == B {\n \
    \   print(\"A 和 B 相等\")\n} else {\n    print(\"A 和 B 不相等\")\n}\n\nif A == C {\n\
    \    print(\"A 和 C 相等\")\n} else {\n    print(\"A 和 C 不相等\")\n}\n```\n\n输出结果为：\n\
    \n```\nA 和 B 不相等\nA 和 C 相等\n```\n"
- fmt: "### Set Membership\n\nUsing the set membership methods, the relationship between\
    \ the two sets can be identified.\n\n- `isSubset(of:)` – Use this method to determine\
    \ if all of the values of a set are contained in a specified set.\n- `isStrictSubset(of:)`\
    \ – Use this method to determine if a set is a subset, but not equal to the specified\
    \ set.\n- `isSuperset(of:)` – Use this method to determine if a set contains all\
    \ of the values of the specified set.\n- `isStrictSuperset(of:)` – Use this method\
    \ to determine if a set is a superset, but not equal to the specified set.\n-\
    \ `isDisjoint(with:)` – Use this method to determine if the two have the same\
    \ values in common.\n\n```\n//Set membership\nlet A: Set = [2, 4, 6, 8, 10]\n\
    let B: Set = [0, 4, 2, 6, 7, 9, 10, 8]\nprint(\"isSubset:\", A.isSubset(of: B))\n\
    print(\"isSuperset:\", B.isSuperset(of: A))\nprint(\"isStrictSubset:\", A.isStrictSubset(of:\
    \ B))\nprint(\"isDisjointWith:\", A.isDisjoint(with: B))\n```\n\nThe output will\
    \ be\n\n```\nisSubset: true\nisSuperset: true\nisStrictSubset: true\nisDisjointWith:\
    \ false\n```\n\n`isSubset` returns `true` because set B contains all the elements\
    \ in A.\n\n`isSuperset` returns `true` because set B contains all of the values\
    \ of A.\n\n`isStrictSubset` returns `true` because set B contains all the element\
    \ in A and both sets are not equal.\n\n`isDisjointWith` returns `false` because\
    \ sets A and B have some values in common.\n\n## Conclusion\n\nIn this chapter,\
    \ you have learned about the general structure of sets, how to declare them in\
    \ Swift, and how to select, add, and remove elements and set operations such as\
    \ union, intersection, subtracting, and symmetric difference. In the following\
    \ chapter, you will learn about the data structure type of Stack.\n\n# 4. Stacks\n\
    \nA stack is a last in first out (LIFO) data structure. The structure of a stack\
    \ can be imagined as a pile of objects stacked vertically (Figure 4-1). When extracting\
    \ these objects, the last added to the stack is the first one removed. Stacks\
    \ are similar to arrays but with limited control.\n\n![../images/490882_1_En_4_Chapter/490882_1_En_4_Fig1_HTML.png](images/490882_1_En_4_Chapter/490882_1_En_4_Fig1_HTML.png)\n\
    \nFigure 4-1 Stack structure\n\nThere are three methods that stacks implement.\
    \ By using `push()` method, a new element can be added to the top of the stack,\
    \ `pop()` method to remove an element from the top, and `peek()` method to return\
    \ the top element from the stack without removing it (Figure 4-2).\n\n![../images/490882_1_En_4_Chapter/490882_1_En_4_Fig2_HTML.png](images/490882_1_En_4_Chapter/490882_1_En_4_Fig2_HTML.png)\n\
    \nFigure 4-2 Stack’s three methods\n\n## Using Swift with Stacks\n\nThere are\
    \ many applications that use stacks such as Undo/Redo stacks in Excel or Word,\
    \ reversing a word, back/forward on browsers, backtracking algorithms, parenthesis\
    \ checking, and so on.\n\nLet’s continue to implement it using Swift. By using\
    \ Swift Generics, we provide flexibility to the stack so that we can store any\
    \ type. First, we create a `Stack` structure and declare the private array type\
    \ of Swift Generics with an empty array. This `items` array will be used to hold\
    \ our Stack’s values.\n\n```\nimport Foundation\npublic struct Stack {\n    private\
    \ var items: [T] = []\n}\n```\n\nThen we will continue to write three methods\
    \ that are required in Stacks. First we will create the `push()` function.\n\n\
    ```\nimport Foundation\npublic struct Stack {\n    private var items: [T] = []\n\
    \    //Push method\n    mutating func push(element: T) {\n        items.append(element)\n\
    \    }\n}\n```\n\nBasically, what we are doing here is to append `items` by adding\
    \ an element to the top of the array. The `mutating` keyword is used to allow\
    \ the method to modify the data contained in the structure. Notice that a push\
    \ operation puts the new element at the end of the array, not at the beginning.\
    \ Inserting at the beginning of an array is expensive, an `O(n)` operation, because\
    \ it requires all existing array elements to be shifted in memory. Adding at the\
    \ end is `O(1)`; it always takes the same amount of time, regardless of the size\
    \ of the array.\n\nThen we will write the `pop()` method which is responsible\
    \ to extract the data from the Stack.\n\n```\nimport Foundation\npublic struct\
    \ Stack {\n    private var items: [T] = []\n    //Push method\n    mutating func\
    \ push(element: T) {\n        items.append(element)\n    }\n    //Pop method\n\
    \    mutating func pop() -> T? {\n        return items.popLast()\n    }\n}\n```\n\
    \nThe arrays provide a `popLast()` method to remove the topmost element from the\
    \ array and it returns optional, and this differs `popLast()` from `removeLast()`,\
    \ so this is why we declared the return type as an optional `T?`.\n\nThe only\
    \ method that is left is the `peek()` function. It returns the top element of\
    \ the Stack.\n\n```\nimport Foundation\npublic struct Stack {\n    private var\
    \ items: [T] = []\n    //Push method\n    mutating func push(element: T) {\n \
    \       items.append(element)\n    }\n    //Pop method\n    mutating func pop()\
    \ -> T? {\n        return items.popLast()\n    }\n    //Peek method\n    func\
    \ peek() -> T? {\n        return items.last\n    }\n}\n```\n\n## Stack Structures\n\
    \nLet’s take a look at the examples of how we can use our stack structure.\n\n\
    ```\nvar customStack = Stack()\n//Using push method\ncustomStack.push(element:\
    \ 4)\nprint(customStack)\ncustomStack.push(element: 8)\nprint(customStack)\ncustomStack.push(element:\
    \ 12)\nprint(customStack)\n//Using peek method\nprint(customStack.peek()!)\n//Using\
    \ pop method\nvar x = customStack.pop()\nprint(x!)\nx = customStack.pop()\nprint(x!)\n\
    ```\n\nThe output will be\n\n```\nStack(items: [4])\nStack(items: [4, 8])\nStack(items:\
    \ [4, 8, 12])\n```\n\nBasically, we are creating `customStack` using the `Stack`\
    \ structure with integer type and using the `push()` method inserting new elements\
    \ at the top of the Stack. Every time after insertion, we print the Stack to the\
    \ console to see the order of the elements that are inserted into the stack, and\
    \ it is clear that it inserts at the top. Then we use the `peek()` method and\
    \ print the value to the console; it can be easily seen that the top last element\
    \ of the array is returned. Finally, we use the `pop()` method to remove the top\
    \ value and return it, and it is obvious that when you run it a second time, it\
    \ will return the next element as the top one is removed.\n\n## Stack Extensions\n\
    \nWe can add extensions to the Stack to extend its behavior and functionality.\
    \ There are many extensions such as `CustomStringConvertible`, `ExpressibleByArrayLiteral`,\
    \ `IteratorProtocol`, `Sequence` protocol, and so on that can be added to the\
    \ stack for more functionalities. By adding `CustomStringConvertible` protocol,\
    \ we can change the printout as the way we want.\n\n```\nextension Stack: CustomStringConvertible\
    \ {\n    public var description: String {\n        return items.description\n\
    \    }\n}\n```\n\n## Conclusion\n\nIn this chapter, you have learned about the\
    \ general structure of Stacks, how to create them in Swift, and how to use push,\
    \ pop, and peek methods and stack extensions. In the following chapter, you will\
    \ learn about the data structure type of queue."
  raw: '### Set Membership


    Using the set membership methods, the relationship between the two sets can be
    identified.


    `isSubset(of:)` `–` Use this method to determine if all of the values of a set
    are contained in a specified set.


    `isStrictSubset(of:)` `–` Use this method to determine if a set is a subset, but
    not equal to the specified set.


    `isSuperset(of:)` `–` Use this method to determine if a set contains all of the
    values of the specified set.


    `isStrictSuperset(of:)` `–` Use this method to determine if a set is a superset,
    but not equal to the specified set.


    `isDisjoint(with:)` `–` Use this method to determine if the two have the same
    values in common.


    ```

    //Set membership

    let A: Set = [2, 4, 6, 8, 10]

    let B: Set = [0, 4, 2, 6, 7, 9, 10, 8]

    print("isSubset:", A.isSubset(of: B))

    print("isSuperset:", B.isSuperset(of: A))

    print("isStrictSubset:", A.isStrictSubset(of: B))

    print("isDisjointWith:", A.isDisjoint(with: B))

    ```


    The output will be


    ```

    isSubset: true

    isSuperset: true

    isStrictSubset: true

    isDisjointWith: false

    ```


    `isSubset` returns `true` because set **B** contains all the elements in **A**.


    `isSuperset` returns `true` because set **B** contains all of the values of **A**.


    `isStrictSubset` returns `true` because set **B** contains all the element in
    **A** and both sets are not equal.


    `isDisjointWith` returns `false` because sets **A** and **B** have some values
    in common.


    ## Conclusion


    In this chapter, you have learned about the general structure of sets, how to
    declare them in Swift, and how to select, add, and remove elements and set operations
    such as union, intersection, subtracting, and symmetric difference. In the following
    chapter, you will learn about the data structure type of Stack.


    # 4. Stacks


    A stack is a **last in first out (LIFO)** data structure. The structure of a stack
    can be imagined as a pile of objects stacked vertically (Figure [4-1](#490882_1_En_4_Chapter.xhtml#Fig1)).
    When extracting these objects, the last added to the stack is the first one removed.
    Stacks are similar to arrays but with limited control.


    ![../images/490882_1_En_4_Chapter/490882_1_En_4_Fig1_HTML.png](images/490882_1_En_4_Chapter/490882_1_En_4_Fig1_HTML.png)


    Figure 4-1


    Stack structure


    There are three methods that stacks implement. By using `push()` method, a new
    element can be added to the top of the stack, `pop()` method to remove an element
    from the top, and `peek()` method to return the top element from the stack without
    removing it (Figure [4-2](#490882_1_En_4_Chapter.xhtml#Fig2)).


    ![../images/490882_1_En_4_Chapter/490882_1_En_4_Fig2_HTML.png](images/490882_1_En_4_Chapter/490882_1_En_4_Fig2_HTML.png)


    Figure 4-2


    Stack’s three methods


    ## Using Swift with Stacks


    There are many applications that use stacks such as Undo/Redo stacks in Excel
    or Word, reversing a word, back/forward on browsers, backtracking algorithms,
    parenthesis checking, and so on.


    Let’s continue to implement it using Swift. By using Swift Generics, we provide
    flexibility to the stack so that we can store any type. First, we create a Stack
    structure and declare the private array type of Swift Generics with an empty array.
    This items array will be used to hold our Stack’s values.


    ```

    import Foundation

    public struct Stack {

    private var items: [T] = []

    }

    ```


    Then we will continue to write three methods that are required in Stacks. First
    we will create the `push()` function .


    ```

    import Foundation

    public struct Stack {

    private var items: [T] = []

    //Push method

    mutating func push(element: T) {

    items.append(element)

    }

    }

    ```


    Basically, what we are doing here is to append `items` by adding an element to
    the top of the array. The `mutating` keyword is used to allow the method to modify
    the data contained in the structure. Notice that a push operation puts the new
    element at the end of the array, not at the beginning. Inserting at the beginning
    of an array is expensive, an **O(n)** operation, because it requires all existing
    array elements to be shifted in memory. Adding at the end is **O(1)**; it always
    takes the same amount of time, regardless of the size of the array.


    Then we will write the `pop()` method which is responsible to extract the data
    from the Stack.


    ```

    import Foundation

    public struct Stack {

    private var items: [T] = []

    //Push method

    mutating func push(element: T) {

    items.append(element)

    }

    //Pop method

    mutating func pop() -> T? {

    return items.popLast()

    }

    }

    ```


    The arrays provide a `popLast()` method to remove the topmost element from the
    array and it returns optional, and this differs `popLast()` from `removeLast()`,
    so this is why we declared the return type as an optional **T**`?`.


    The only method that is left is the `peek()` function . It returns the top element
    of the Stack.


    ```

    import Foundation

    public struct Stack {

    private var items: [T] = []

    //Push method

    mutating func push(element: T) {

    items.append(element)

    }

    //Pop method

    mutating func pop() -> T? {

    return items.popLast()

    }

    //Peek method

    func peek() -> T? {

    return items.last

    }

    }

    ```


    ## Stack Structures


    Let’s take a look at the examples of how we can use our stack structure.


    ```

    var customStack = Stack()

    //Using push method

    customStack.push(element: 4)

    print(customStack)

    customStack.push(element: 8)

    print(customStack)

    customStack.push(element: 12)

    print(customStack)

    //Using peek method

    print(customStack.peek()!)

    //Using pop method

    var x = customStack.pop()

    print(x!)

    x = customStack.pop()

    print(x!)

    ```


    The output will be


    ```

    Stack(items: [4])

    Stack(items: [4, 8])

    Stack(items: [4, 8, 12])


    ```


    Basically, we are creating `customStack` using the Stack structure with integer
    type and using the `push()` method inserting new elements at the top of the Stack.
    Every time after insertion, we print the Stack to the console to see the order
    of the elements that are inserted into the stack, and it is clear that it inserts
    at the top. Then we use the `peek()` method and print the value to the console;
    it can be easily seen that the top last element of the array is returned. Finally,
    we use the `pop()` method to remove the top value and return it, and it is obvious
    that when you run it a second time, it will return the next element as the top
    one is removed.


    ## Stack Extensions


    We can add extensions to the Stack to extend its behavior and functionality. There
    are many extensions such as **CustomStringConvertible**, **ExpressibleByArrayLiteral**,
    **IteratorProtocol**, **Sequence** protocol, and so on that can be added to the
    stack for more functionalities. By adding **CustomStringConvertible** protocol,
    we can change the printout as the way we want.


    ```

    extension Stack: CustomStringConvertible {

    public var description: String {

    return items.description

    }

    }

    ```


    ## Conclusion


    In this chapter, you have learned about the general structure of Stacks, how to
    create them in Swift, and how to use push, pop, and peek methods and stack extensions.
    In the following chapter, you will learn about the data structure type of queue.'
