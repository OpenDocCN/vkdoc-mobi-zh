    isStrictSubset: true\nisDisjointWith: false\n```\n\n`isSubset` 返回 `true`，因为集合\
    \ B 包含了 A 中的所有元素。\n\n`isSuperset` 返回 `true`，因为集合 B 包含了 A 的所有值。\n\n`isStrictSubset`\
    \ 返回 `true`，因为集合 B 包含了 A 中的所有元素，并且两个集合不相等。\n\n`isDisjointWith` 返回 `false`，因为集合\
    \ A 和 B 有一些共同的值。\n\n## 总结\n\n在本章中，您学习了集合的一般结构、如何在 Swift 中声明它们，以及如何选择、添加和移除元素，以及诸如并集、交集、差集和对称差集等集合操作。在下一章中，您将学习栈的数据结构类型。\n\
    \n# 4. 栈\n\n栈是一种后进先出 (LIFO) 的数据结构。栈的结构可以想象成一堆垂直堆叠的物体（图 4-1）。在提取这些物体时，最后添加到栈中的物体最先被移除。栈与数组类似，但控制能力有限。\n\
    \n![../images/490882_1_En_4_Chapter/490882_1_En_4_Fig1_HTML.png](img/490882_1_En_4_Fig1_HTML.png)\n\
    \n图 4-1 栈结构\n\n栈实现了三种方法。通过使用 `push()` 方法，可以在栈顶添加一个新元素；使用 `pop()` 方法从栈顶移除一个元素；使用\
    \ `peek()` 方法返回栈顶元素而不将其移除（图 4-2）。\n\n![../images/490882_1_En_4_Chapter/490882_1_En_4_Fig2_HTML.png](img/490882_1_En_4_Fig2_HTML.png)\n\
    \n图 4-2 栈的三种方法\n\n## 在 Swift 中使用栈\n\n有许多应用程序使用栈，例如 Excel 或 Word 中的撤销/重做栈、单词反转、浏览器中的后退/前进、回溯算法、括号检查等等。\n\
    \n让我们继续使用 Swift 来实现它。通过使用 Swift 泛型，我们为栈提供了灵活性，以便我们可以存储任何类型。首先，我们创建一个 `Stack` 结构体，并声明一个使用\
    \ Swift 泛型且初始化为空数组的私有数组类型。这个 `items` 数组将用于保存我们栈的值。\n\n```\nimport Foundation\n\
    public struct Stack {\n    private var items: [T] = []\n}\n```\n\n然后我们将继续编写栈所需的三种方法。首先，我们将创建\
    \ `push()` 函数。\n\n```\nimport Foundation\npublic struct Stack {\n    private var\
    \ items: [T] = []\n    //Push 方法\n    mutating func push(element: T) {\n     \
    \   items.append(element)\n    }\n}\n```\n\n基本上，我们在这里所做的是通过向数组顶部添加一个元素来追加 `items`。`mutating`\
    \ 关键字用于允许该方法修改结构体中包含的数据。请注意，压栈操作将新元素放在数组的末尾，而不是开头。在数组的开头插入是一个昂贵的 `O(n)` 操作，因为它需要将所有现有的数组元素在内存中移动。在末尾添加是\
    \ `O(1)` 操作；无论数组大小如何，它总是花费相同的时间。\n\n然后，我们将编写 `pop()` 方法，该方法负责从栈中提取数据。\n\n```\n\
    import Foundation\npublic struct Stack {\n    private var items: [T] = []\n  \
    \  //Push 方法\n    mutating func push(element: T) {\n        items.append(element)\n\
    \    }\n    //Pop 方法\n    mutating func pop() -> T? {\n        return items.popLast()\n\
    \    }\n}\n```\n\n数组提供了一个 `popLast()` 方法来移除数组中最顶部的元素，并且它返回一个可选值，这与 `removeLast()`\
    \ 不同，这就是为什么我们将返回类型声明为可选的 `T?` 的原因。\n\n剩下的唯一方法是 `peek()` 函数。它返回栈的顶部元素。\n\n```\n\
    import Foundation\npublic struct Stack {\n    private var items: [T] = []\n  \
    \  //Push 方法\n    mutating func push(element: T) {\n        items.append(element)\n\
    \    }\n    //Pop 方法\n    mutating func pop() -> T? {\n        return items.popLast()\n\
    \    }\n    //Peek 方法\n    func peek() -> T? {\n        return items.last\n  \
    \  }\n}\n```\n\n## 栈结构\n\n让我们看一个如何使用我们的栈结构的示例。\n\n```\nvar customStack = Stack()\n\
    //使用 push 方法\ncustomStack.push(element: 4)\nprint(customStack)\ncustomStack.push(element:\
    \ 8)\nprint(customStack)\ncustomStack.push(element: 12)\nprint(customStack)\n\
    //使用 peek 方法\nprint(customStack.peek()!)\n//使用 pop 方法\nvar x = customStack.pop()\n\
    print(x!)\nx = customStack.pop()\nprint(x!)\n```\n\n输出结果将是\n\n```\nStack(items:\
    \ [4])\nStack(items: [4, 8])\nStack(items: [4, 8, 12])\n```\n\n基本上，我们使用整数类型的 `Stack`\
    \ 结构体创建了 `customStack`，并使用 `push()` 方法在栈顶插入新元素。每次插入后，我们都会将栈打印到控制台，以查看插入到栈中的元素的顺序，很明显它是从顶部插入的。然后我们使用\
    \ `peek()` 方法并将值打印到控制台；可以很容易地看出，返回的是数组的最后一个元素，即顶部元素。最后，我们使用 `pop()` 方法移除顶部的值并返回它，很明显，当您第二次运行它时，由于顶部的元素已被移除，它将返回下一个元素。\n\
    \n## 栈扩展\n\n我们可以为栈添加扩展以扩展其行为和功能。有许多扩展，例如 `CustomStringConvertible`、`ExpressibleByArrayLiteral`、`IteratorProtocol`、`Sequence`\
    \ 协议等，可以添加到栈中以获得更多功能。通过添加 `CustomStringConvertible` 协议，我们可以根据需要更改打印输出。\n\n```\n\
    extension Stack: CustomStringConvertible {\n    public var description: String\
    \ {\n        return items.description\n    }\n}\n```\n\n## 总结\n\n在本章中，您学习了栈的一般结构、如何在\
    \ Swift 中创建它们，以及如何使用 push、pop 和 peek 方法以及栈扩展。在下一章中，您将学习队列的数据结构类型。\n"
- fmt: "# 5. Queue\n\nA queue is a first in first out (FIFO) data structure which\
    \ means first come first serve. It is also known as “waiting lines,” and as the\
    \ name suggests, it can be easily imagined as a group of people waiting in a line\
    \ (Figure [5-1](#490882_1_En_5_Chapter.xhtml#Fig1)).\n\n![../images/490882_1_En_5_Chapter/490882_1_En_5_Fig1_HTML.jpg](images/490882_1_En_5_Chapter/490882_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1\n\nTypical queue structure\n\nWhen a new person comes, he stands\
    \ at the end of the line conveniently adding data to a queue; the data is placed\
    \ at the end. The term `enqueue` is used to refer to the act of adding an element\
    \ to a queue. When extracting data from a queue, the data that has been in the\
    \ queue the longest is removed first – the term `dequeue` refers to the act of\
    \ extracting data from a queue (Figure [5-2](#490882_1_En_5_Chapter.xhtml#Fig2)).\n\
    \n![../images/490882_1_En_5_Chapter/490882_1_En_5_Fig2_HTML.png](images/490882_1_En_5_Chapter/490882_1_En_5_Fig2_HTML.png)\n\
    \nFigure 5-2\n\nEnqueue/dequeue example\n\nThere are several methods that queues\
    \ implement.\n\n*   `enqueue()` – Add an element at the end of the queue\n*  \
    \ `dequeue()` – Remove and return the first element from the queue\n*   `peek()`\
    \ – Return the first element from the queue, but not remove it\n*   `count` –\
    \ Return the number of elements in the queue\n*   `clear()` – Reset the queue\
    \ to an empty state\n*   `isEmpty()` – Return true if the queue is empty\n*  \
    \ `isFull()` – Return true if the queue if full\n\nQueue, as the name suggests,\
    \ is used whenever we need to manage any group of objects in an order in which\
    \ the first one coming in also gets out first, while the others wait for their\
    \ turn, like in the following scenarios:\n\n1.  Point of sale system of a restaurant.\
    \ It is obvious that the orders must be processed in the order they were received.\
    \ As an order is received, it writes to the back of the queue and reads orders\
    \ from the front of the queue by cooks’ device. This allows cooks to cook meals\
    \ in the order they received.\n2.  Serving requests on a single shared resource,\
    \ like a printer, CPU task scheduling, and so on.\n3.  In a real-life scenario,\
    \ call center phone systems use queues to hold people calling them in an order,\
    \ until a service representative is free.\n4.  Handling of interrupts in real-time\
    \ systems. The interrupts are handled in the same order as they arrive.\n5.  Buffers\
    \ on MP3 players and portable CD players and iPod playlist. Playlist for jukebox\
    \ – add songs to the end, and play from the front of the list.\n6.  When programming\
    \ a real-time system that can be interrupted (e.g., by a mouse click or wireless\
    \ connection), it is necessary to attend to the interrupts immediately before\
    \ proceeding with the current activity. If the interrupts should be handled in\
    \ the same order they arrive, then a FIFO queue is the appropriate data structure.\n\
    \n## Implementation\n\nBy using Swift Generics, we provide flexibility to the\
    \ queue so that we can store any type. First, we will create a queue structure\
    \ and declare the private array type of Swift Generics with an empty array of\
    \ `T` type.\n\n```\nimport Foundation\npublic struct Queue {\n    private var\
    \ data: [T] = []\n}\n```\n\nThen we will add the `enqueue()` method which appends\
