- fmt: "# Space Complexity\n\nWhen talking about the efficiency of an algorithm, time\
    \ is not the only thing that needs to be considered, the amount of memory that\
    \ is required also matters. It is a parallel concept to time complexity. If we\
    \ need to create an array size of `n`, `O(n)` space will be required. Stack space\
    \ in recursive calls are also counted. For instance, the following code would\
    \ take `O(n)` time and `O(n)` space complexity ; each call takes up the actual\
    \ memory:\n\n```\nfunc sum(n: Int) -> Int {\nif n <= 0 {\nreturn 0\n}\nreturn\
    \ n + sum(n: n-1)\n}\n```\n\nEach call adds a level to the stack and takes up\
    \ the actual memory:\n\n```\n1   sum(3)\n2     → sum(2)\n3         → sum(1)\n\
    4             → sum(0)\n```\n\nOn the other hand, there are some cases that `n`\
    \ calls do not take `O(n)` space:\n\n```\nfunc pairSumSequence(n: Int) -> Int\
    \ {\nvar sum = 0\nfor i in 0...n {\nsum += pairSum(a: i, b: i+1)\n}\nreturn sum\n\
    }\nfunc pairSum(a: Int, b: Int) -> Int {\nreturn a + b\n}\n```\n\nDue to the fact\
    \ that `n` calls to `pairSum` function do not exist simultaneously on the call\
    \ stack, we only need `O(1)` space.\n\n## Drop the Constants and Nondominant Terms\n\
    \nThere is a possibility that `O(N)` code is faster than `O(1)` code for specific\
    \ inputs. Big O just describes the rate of increase. So for this reason, we drop\
    \ the constant which means that `O(2N)` is actually `O(N)`.\n\n*   `O(2N)` → `O(N)`\n\
    \nAs we can drop constants, it is possible to drop nondominant terms.\n\n*   `O(N²+N)`\
    \ → `O(N²)`\n\n*   `O(N+logN)` → `O(N)`\n\n*   `O(2∗2^N + 1000N^(100))` → `O(2^N)`\n\
    \nSometimes we might have a sum in the runtime, for example, `O(B²+A)` cannot\
    \ be eliminated without the knowledge of `A` or `B`.\n\nThe following graph depicts\
    \ the rate of increase for some common Big O times (Figure [13-3](#490882_1_En_13_Chapter.xhtml#Fig3)).\n\
    \n![../images/490882_1_En_13_Chapter/490882_1_En_13_Fig3_HTML.png](images/490882_1_En_13_Chapter/490882_1_En_13_Fig3_HTML.png)\n\
    \nFigure 13-3\n\nRate of increase for common Big O times\n\nAs you can see, `O(x²)`\
    \ is much worse than `O(x)`. There are a lot of runtimes that are worse than `O(x!)`\
    \ such as `O(x^x)` or `O(2^x ∗ x!)`.\n\n## How to Calculate Complexities?\n\n\
    It is obvious that based on the code structure used in an algorithm, the complexity\
    \ differs. Let’s take a look at some code samples and their complexity.\n\n* \
    \  **If**`–`**else**: Inside this kind of blocks, normally we have two pieces\
    \ of code `–` the code under **if** condition and the code under **else** condition.\
    \ Here we take the worst-case condition. So, if the block `if` is `O(n)` and the\
    \ block `else` is `O(1)`, then the complexity for the entire block will be `O(n)`.\n\
    \n    ```\n    var myArray = [1,2,3,4,5]\n    if myArray.count > 0 {\n    for\
    \ i in myArray {\n    print(i)\n    }\n    } else {\n    print(\"The array is\
    \ empty\")\n    }\n    ```\n\n    From this code block, it can be easily seen\
    \ that the complexity of **if** statement is `O(n)` and the complexity of **else**\
    \ statement is `O(1)`. However, the complexity for the entire code is `O(n)`,\
    \ because we always take into account the worst-case scenario.\n\n*   **Loops**:\
    \ Inside the `loop` , the statements repeat themselves `n` times. If our code\
    \ takes `O(m)` complexity to execute, inside `n` times repeated loop, it will\
    \ be `n∗O(m)` or `O(n∗m)`.\n\n    ```\n    for i in myArray {\n    print(i)\n\
    \    }\n    ```\n\n    The number of loops will be 5 and the execution for the\
    \ code inside the loop is `O(1)`, so the combined execution will be `O(5)`.\n\n\
    *   **Nested** `loops` : If we have a loop inside another loop, the complexity\
    \ will grow exponentially, which means that if complexity for a simple loop is\
    \ `O(n)`, the addition of another loop inside this loop will make the complexity\
    \ `O(n²)`.\n\n    ```\n    for i in myArray {\n    print(i)\n    for a in myArray\
    \ {\n    print(i+a)\n    }\n    }\n    ```\n\n    Here the complexity for the\
    \ first loop is `O(5)`, because the array count is 5, so the nested loop also\
    \ executed with the same complexity 5 times, and this means both will be `O(5²)`.\n\
    \n## Add vs. Multiply\n\nOne of the main confusion is to find out when to add\
    \ runtimes and when to multiply them.\n\n*   Adding runtimes `–` If an algorithm\
    \ is in the form of “do this then when all done, do that”\n\n*   Multiplication\
    \ `–` If an algorithm is in the form “do this for each time you do that”\n\nOn\
    \ the left side, the runtime is `O(A+B)`; this is because each runtime is run\
    \ separately: first `A` is run and then `B` is run. Thus we add them together.\n\
    \nOn the right side, we run `B` for each element of `A`, which means that we need\
    \ to multiply the runtimes.\n\n| Add the Runtimes: `O(A+B)` | Multiply the Runtimes:\
    \ `O(A*B)` |\n| --- | --- |\n| **for** `a` **in** `arrayA {`   `print(a)``}`**for**\
    \ `b` **in** `arrayB {`   `print(b)``}` | **for** `a` **in** `arrayA {`   **for**\
    \ `b` **in** `arrayB {`      `print(\"\\(a) + \\(b)\")``}``}` |\n\n## Amortized\
    \ Time\n\nWith an `ArrayList` or a dynamically resizing array, you won’t run out\
    \ of space since its capacity grows as you add elements. When the array hits the\
    \ capacity, the `ArrayList` creates a new array with double capacity and copy\
    \ all elements to the new array. So if the array contains `N` element, the runtime\
    \ of adding elements will take `O(N)` time. We know that this does not happen\
    \ very often and majority of the time adding will be `O(1)`, and the amortized\
    \ time takes into account both cases.\n\nAs we add elements, we double the capacity\
    \ when the size of array is a power of 2. The capacity becomes 1,2,4,8,16 … `X`.\
    \ If we look at the sum of these capacities from the right to the left, it starts\
    \ with `X` and halves until it gets 1.\n\n`X+X/2+X/4+X/8+…+1` and this is roughly\
    \ `2X`, and if we remove the constant, it becomes `O(X)`. Therefore, `X` adds\
    \ take `O(X)` time, and the amortized time for each adding is `O(1)`.\n\n### Log\
    \ N Runtimes\n\nIf we look at the binary search as an example, in which we are\
    \ looking for `x` in an `N`-element sorted array. First, we compare `x` to the\
    \ midpoint `–` if it is equal, we return; if `x < middle` then we search on the\
    \ left and if `x > middle`, we search on the right.\n\n```\nsearch 9 within [1,5,8,9,11,13,15,19,21]\n\
    compare 9 to 11 → smaller\nsearch 9 within [1,5,8,9]\ncompare 9 to 8 → bigger\n\
    search 9 within [9]\ncompare 9 to 9\nreturn\n```\n\nWe start with `N`-element\
    \ array search; then after single step, we are down to `N/2` elements and one\
    \ more step down to `N/2` elements. So the total time is a matter of how many\
    \ steps we can take until `N` becomes 1.\n\n```\nN = 16\nN = 8 /* divide by 2\
    \ */\nN = 4 /* divide by 2 */\nN = 2 /* divide by 2 */\nN = 1 /* divide by 2 */\n\
    ```\n\nSo how many times can we multiply 1 by 2 to get `N`? `2^k = N` → `log[2]N\
    \ = k`\n\nThus where the number of elements in the problem space gets halved each\
    \ time, that will likely be a `O(log N)` runtime.\n\n### Recursive Runtimes\n\n\
    What is the runtime of this code?\n\n```\nfunc f (n : Int) -> Int {\nif n <= 1\
    \ {\nreturn 1\n}\nreturn f(n: n-1) + f(n: n-1)\n}\n```\n\nRather than assumptions,\
    \ let us look through the code. Suppose we have `f(4)` and this calls `f(3)` twice\
    \ and each of those calls of `f(3)` calls `f(2)`, until we get down to `f(1)`\
    \ (Figure [13-4](#490882_1_En_13_Chapter.xhtml#Fig4)).\n\n![../images/490882_1_En_13_Chapter/490882_1_En_13_Fig4_HTML.png](images/490882_1_En_13_Chapter/490882_1_En_13_Fig4_HTML.png)\n\
    \nFigure 13-4\n\nRecursive runtimes\n\nThe tree will have depth `N` and each node\
    \ has two children. Therefore, each level will have twice as many calls as the\
    \ one shown in the figure. More generically it can be expressed as `2⁰+2¹+2²+2³+…+2^(N-1)`.\
    \ Thus, when you have a recursive function that makes multiple calls, the runtime\
    \ will often look like `O(branches^(dept))`, but in our case, it is `O(2^N)`.\n\
    \n## Conclusion\n\nIn this chapter, you have learned about algorithm efficiency\
    \ and how to measure it. We have identified the complexity of different codes.\
    \ The time and space complexity have been explained and different types of complexities\
    \ have been shown. In the next chapter, we are going to discuss the sorting algorithms."
  raw: "## Space Complexity\n\nWhen talking about the efficiency of an algorithm,\
    \ time is not the only thing that needs to be considered, the amount of memory\
    \ that is required also matters. It is a parallel concept to time complexity.\
    \ If we need to create an array size of n, O(n) space will be required. Stack\
    \ space in recursive calls are also counted. For instance, the following code\
    \ would take O(n) time and O(n) space complexity ; each call takes up the actual\
    \ memory:\n\n```\nfunc sum(n: Int) -> Int {\nif n <= 0 {\nreturn 0\n}\nreturn\
    \ n + sum(n: n-1)\n}\n```\n\nEach call adds a level to the stack and takes up\
    \ the actual memory:\n\n```\n1   sum(3)\n2     → sum(2)\n3         → sum(1)\n\
    4             → sum(0)\n```\n\nOn the other hand, there are some cases that n\
    \ calls do not take O(n) space:\n\n```\nfunc pairSumSequence(n: Int) -> Int {\n\
    var sum = 0\nfor i in 0...n {\nsum += pairSum(a: i, b: i+1)\n}\nreturn sum\n}\n\
    func pairSum(a: Int, b: Int) -> Int {\nreturn a + b\n}\n```\n\nDue to the fact\
    \ that n calls to pairSum function do not exist simultaneously on the call stack,\
    \ we only need O(1) space.\n\n## Drop the Constants and Nondominant Terms\n\n\
    There is a possibility that O(N) code is faster than O(1) code for specific inputs.\
    \ Big O just describes the rate of increase. So for this reason, we drop the constant\
    \ which means that O(2N) is actually O(N).\n\n*   O(2N) → O(N)\n\nAs we can drop\
    \ constants, it is possible to drop nondominant terms.\n\n*   O(N²+N) → O(N²)\n\
    \n*   O(N+logN) → O(N)\n\n*   O(2∗2^N + 1000N^(100)) → O(2^N)\n\nSometimes we\
    \ might have a sum in the runtime, for example, O(B²+A) cannot be eliminated without\
    \ the knowledge of A or B.\n\nThe following graph depicts the rate of increase\
    \ for some common Big O times (Figure [13-3](#490882_1_En_13_Chapter.xhtml#Fig3)).\n\
    \n![../images/490882_1_En_13_Chapter/490882_1_En_13_Fig3_HTML.png](images/490882_1_En_13_Chapter/490882_1_En_13_Fig3_HTML.png)\n\
    \nFigure 13-3\n\nRate of increase for common Big O times\n\nAs you can see, O(x²)\
    \ is much worse than O(x). There are a lot of runtimes that are worse than O(x!)\
    \ such as O(x^x) or O(2^x ∗ x!).\n\n## How to Calculate Complexities?\n\nIt is\
    \ obvious that based on the code structure used in an algorithm, the complexity\
    \ differs. Let’s take a look at some code samples and their complexity.\n\n* \
    \  **If**`–`**else**: Inside this kind of blocks, normally we have two pieces\
    \ of code `–` the code under **if** condition and the code under **else** condition.\
    \ Here we take the worst-case condition. So, if the block if is O(n) and the block\
    \ else is O(1), then the complexity for the entire block will be O(n).\n\n   \
    \ ```\n    var myArray = [1,2,3,4,5]\n    if myArray.count > 0 {\n    for i in\
    \ myArray {\n    print(i)\n    }\n    } else {\n    print(\"The array is empty\"\
    )\n    }\n    ```\n\n    From this code block, it can be easily seen that the\
    \ complexity of **if** statement is O(n) and the complexity of **else** statement\
    \ is O(1). However, the complexity for the entire code is O(n), because we always\
    \ take into account the worst-case scenario.\n\n*   **Loops**: Inside the `loop`\
    \ , the statements repeat themselves n times. If our code takes O(m) complexity\
    \ to execute, inside n times repeated loop, it will be n∗O(m) or O(n∗m).\n\n \
    \   ```\n    for i in myArray {\n    print(i)\n    }\n    ```\n\n    The number\
    \ of loops will be 5 and the execution for the code inside the loop is O(1), so\
    \ the combined execution will be O(5).\n\n*   **Nested** `loops` : If we have\
    \ a loop inside another loop, the complexity will grow exponentially, which means\
    \ that if complexity for a simple loop is O(n), the addition of another loop inside\
    \ this loop will make the complexity O(n²).\n\n    ```\n    for i in myArray {\n\
    \    print(i)\n    for a in myArray {\n    print(i+a)\n    }\n    }\n    ```\n\
    \n    Here the complexity for the first loop is O(5), because the array count\
    \ is 5, so the nested loop also executed with the same complexity 5 times, and\
    \ this means both will be O(5²).\n\n## Add vs. Multiply\n\nOne of the main confusion\
    \ is to find out when to add runtimes and when to multiply them.\n\n*   Adding\
    \ runtimes `–` If an algorithm is in the form of “do this then when all done,\
    \ do that”\n\n*   Multiplication `–` If an algorithm is in the form “do this for\
    \ each time you do that”\n\nOn the left side, the runtime is O(A+B); this is because\
    \ each runtime is run separately: first A is run and then B is run. Thus we add\
    \ them together.\n\nOn the right side, we run B for each element of A, which means\
    \ that we need to multiply the runtimes.\n\n| Add the Runtimes: O(A+B) | Multiply\
    \ the Runtimes: O(A*B) |\n| --- | --- |\n| **for** `a` **in** `arrayA {`   `print(a)``}`**for**\
    \ `b` **in** `arrayB {`   `print(b)``}` | **for** `a` **in** `arrayA {`   **for**\
    \ `b` **in** `arrayB {`      `print(\"\\(a) + \\(b)\")``}``}` |\n\n## Amortized\
    \ Time\n\nWith an ArrayList or a dynamically resizing array, you won’t run out\
    \ of space since its capacity grows as you add elements. When the array hits the\
    \ capacity, the ArrayList creates a new array with double capacity and copy all\
    \ elements to the new array. So if the array contains N element, the runtime of\
    \ adding elements will take O(N) time. We know that this does not happen very\
    \ often and majority of the time adding will be O(1), and the amortized time takes\
    \ into account both cases.\n\nAs we add elements, we double the capacity when\
    \ the size of array is a power of 2\\. The capacity becomes 1,2,4,8,16 … X. If\
    \ we look at the sum of these capacities from the right to the left, it starts\
    \ with X and halves until it gets 1.\n\nX+X/2+X/4+X/8+…+1 and this is roughly\
    \ 2X, and if we remove the constant, it becomes O(X). Therefore, X adds take O(X)\
    \ time, and the amortized time for each adding is O(1).\n\n### Log N Runtimes\n\
    \nIf we look at the binary search as an example, in which we are looking for x\
    \ in an N-element sorted array. First, we compare x to the midpoint `–` if it\
    \ is equal, we return; if x<middle then=\"\" we=\"\" search=\"\" on=\"\" the=\"\
    \" left=\"\" and=\"\" if=\"\" x=\"\">middle, we search on the right.</middle>\n\
    \n```\nsearch 9 within [1,5,8,9,11,13,15,19,21]\ncompare 9 to 11 → smaller\nsearch\
    \ 9 within [1,5,8,9]\ncompare 9 to 8 → bigger\nsearch 9 within [9]\ncompare 9\
    \ to 9\nreturn\n```\n\nWe start with N-element array search; then after single\
    \ step, we are down to N/2 elements and one more step down to N/2 elements. So\
    \ the total time is a matter of how many steps we can take until N becomes 1.\n\
    \n```\nN = 16\nN = 8 /* divide by 2 */\nN = 4 /* divide by 2 */\nN = 2 /* divide\
    \ by 2 */\nN = 1 /* divide by 2 */\n```\n\nSo how many times can we multiply 1\
    \ by 2 to get N? 2^k = N → log[2]N = k\n\nThus where the number of elements in\
    \ the problem space gets halved each time, that will likely be a O(log N) runtime.\n\
    \n### Recursive Runtimes\n\nWhat is the runtime of this code?\n\n```\nfunc f (n\
    \ : Int) -> Int {\nif n <= 1 {\nreturn 1\n}\nreturn f(n: n-1) + f(n: n-1)\n}\n\
    ```\n\nRather than assumptions, let us look through the code. Suppose we have\
    \ f(4) and this calls f(3) twice and each of those calls of f(3) calls f(2), until\
    \ we get down to f(1) (Figure [13-4](#490882_1_En_13_Chapter.xhtml#Fig4)).\n\n\
    ![../images/490882_1_En_13_Chapter/490882_1_En_13_Fig4_HTML.png](images/490882_1_En_13_Chapter/490882_1_En_13_Fig4_HTML.png)\n\
    \nFigure 13-4\n\nRecursive runtimes\n\nThe tree will have depth N and each node\
    \ has two children. Therefore, each level will have twice as many calls as the\
    \ one shown in the figure. More generically it can be expressed as 2⁰+2¹+2²+2³+…+2^(N-1).\
    \ Thus, when you have a recursive function that makes multiple calls, the runtime\
    \ will often look like O(branches^(dept)), but in our case, it is O(2^N).\n\n\
    ## Conclusion\n\nIn this chapter, you have learned about algorithm efficiency\
    \ and how to measure it. We have identified the complexity of different codes.\
    \ The time and space complexity have been explained and different types of complexities\
    \ have been shown. In the next chapter, we are going to discuss the sorting algorithms."
  trans: "\n# 空间复杂度\n\n在讨论算法效率时，时间并非唯一需要考虑的因素，所需的内存量同样重要。这是与时间复杂度并行的一个概念。如果我们需要创建一个大小为\
    \ `n` 的数组，则需要 `O(n)` 的空间。递归调用中的栈空间也会被计入。例如，以下代码将具有 `O(n)` 时间复杂度和 `O(n)` 空间复杂度；每次调用都会占用实际内存：\n\
    \n```\nfunc sum(n: Int) -> Int {\nif n <= 0 {\nreturn 0\n}\nreturn n + sum(n:\
    \ n-1)\n}\n```\n\n每次调用都会向调用栈添加一层，并占用实际内存：\n\n```\n1   sum(3)\n2     → sum(2)\n\
    3         → sum(1)\n4             → sum(0)\n```\n\n另一方面，在某些情况下，`n` 次调用并不会占用 `O(n)`\
    \ 空间：\n\n```\nfunc pairSumSequence(n: Int) -> Int {\nvar sum = 0\nfor i in 0...n\
    \ {\nsum += pairSum(a: i, b: i+1)\n}\nreturn sum\n}\nfunc pairSum(a: Int, b: Int)\
    \ -> Int {\nreturn a + b\n}\n```\n\n由于 `n` 次对 `pairSum` 函数的调用并**没有同时**存在于调用栈中，我们只需要\
    \ `O(1)` 的空间。\n\n## 忽略常数项与非主导项\n\n对于特定输入，`O(N)` 代码有可能比 `O(1)` 代码运行得更快。大 O 表示法仅仅描述了增长速率。因此，我们通常会忽略常数，这意味着\
    \ `O(2N)` 实际上就是 `O(N)`。\n\n*   `O(2N)` → `O(N)`\n\n既然可以忽略常数，那么同样也可以忽略非主导项。\n\n\
    *   `O(N²+N)` → `O(N²)`\n\n*   `O(N+logN)` → `O(N)`\n\n*   `O(2∗2^N + 1000N¹⁰⁰)`\
    \ → `O(2^N)`\n\n某些情况下，运行时间中可能存在求和项，例如 `O(B²+A)` 就不能在未明确 `A` 或 `B` 的情况下被简化。\n\n\
    下图展示了一些常见大 O 时间复杂度的增长速率（图 13-3）。\n\n![../images/490882_1_En_13_Chapter/490882_1_En_13_Fig3_HTML.png](img/490882_1_En_13_Fig3_HTML.png)\n\
    \n图 13-3\n\n常见大 O 时间复杂度的增长速率\n\n如图所示，`O(x²)` 远比 `O(x)` 糟糕。还有许多运行时间比 `O(x!)` 更差，例如\
    \ `O(x^x)` 或 `O(2^x ∗ x!)`。\n\n## 如何计算复杂度？\n\n很明显，由于算法中使用的代码结构不同，其复杂度也不同。让我们看一些代码示例及其复杂度。\n\
    \n*   **If**`–`**else**：在这种类型的代码块中，通常有两段代码 —— `if` 条件下的代码和 `else` 条件下的代码。这里我们考虑最坏情况。因此，如果\
    \ `if` 块是 `O(n)` 而 `else` 块是 `O(1)`，那么整个块的复杂度将是 `O(n)`。\n\n    ```\n    var myArray\
    \ = [1,2,3,4,5]\n    if myArray.count > 0 {\n    for i in myArray {\n    print(i)\n\
    \    }\n    } else {\n    print(\"The array is empty\")\n    }\n    ```\n\n  \
    \  从这个代码块可以很容易地看出，**if** 语句的复杂度是 `O(n)`，**else** 语句的复杂度是 `O(1)`。然而，整个代码的复杂度是 `O(n)`，因为我们总是考虑最坏情况。\n\
    \n*   **循环**：在 `循环` 内部，语句会重复执行 `n` 次。如果我们的代码执行一次需要 `O(m)` 复杂度，那么在重复 `n` 次的循环内部，其复杂度将是\
    \ `n∗O(m)` 或 `O(n∗m)`。\n\n    ```\n    for i in myArray {\n    print(i)\n    }\n\
    \    ```\n\n    循环次数将是 5 次，并且循环内部代码的执行复杂度是 `O(1)`，因此合并执行的复杂度是 `O(5)`。\n\n*   **嵌套**\
    \ `循环`：如果一个循环内部包含另一个循环，复杂度将呈指数级增长，这意味着如果简单循环的复杂度是 `O(n)`，那么在这个循环内部再添加一个循环将使复杂度变为\
    \ `O(n²)`。\n\n    ```\n    for i in myArray {\n    print(i)\n    for a in myArray\
    \ {\n    print(i+a)\n    }\n    }\n    ```\n\n    这里第一个循环的复杂度是 `O(5)`，因为数组计数是\
    \ 5，所以嵌套循环也以相同的复杂度执行了 5 次，这意味着两者的复杂度都是 `O(5²)`。\n\n## 加法 vs. 乘法\n\n主要的困惑之一是确定何时对运行时间进行加法，何时进行乘法。\n\
    \n*   运行时间相加 —— 如果一个算法的形式是“先做这个，做完之后，再做那个”\n*   运行时间相乘 —— 如果一个算法的形式是“每做一次那个，就做一次这个”\n\
    \n在左侧，运行时间是 `O(A+B)`；这是因为每个运行时间都是分别执行的：先运行 `A`，然后运行 `B`。因此我们将它们相加。\n\n在右侧，对于 `A`\
    \ 的每一个元素，我们都运行一次 `B`，这意味着我们需要将运行时间相乘。\n\n| 运行时间相加：`O(A+B)` | 运行时间相乘：`O(A*B)` |\n\
    | --- | --- |\n| **for** `a` **in** `arrayA {`   `print(a)``}`**for** `b` **in**\
    \ `arrayB {`   `print(b)``}` | **for** `a` **in** `arrayA {`   **for** `b` **in**\
    \ `arrayB {`      `print(\"\\(a) + \\(b)\")``}``}` |\n\n## 平摊时间\n\n使用 `ArrayList`\
    \ 或动态调整大小的数组时，你不会遇到空间不足的问题，因为其容量会随着添加元素而增长。当数组达到容量上限时，`ArrayList` 会创建一个容量翻倍的新数组，并将所有元素复制到新数组中。因此，如果数组包含\
    \ `N` 个元素，添加元素的运行时间将是 `O(N)`。我们知道这种情况不会经常发生，大多数情况下添加操作是 `O(1)`，而平摊时间将两种情况都考虑在内。\n\
    \n随着我们添加元素，当数组的大小是 2 的幂时，我们会将容量翻倍。容量变为 1，2，4，8，16 …… `X`。如果我们从右向左看这些容量的总和，它从 `X`\
    \ 开始，每次减半，直到变为 1。\n\n`X+X/2+X/4+X/8+…+1` 这个和大约是 `2X`，如果我们移除常数，它就变成了 `O(X)`。因此，`X`\
    \ 次添加操作需要 `O(X)` 时间，而每次添加操作的平摊时间是 `O(1)`。\n\n### 对数时间运行时间\n\n以二分查找为例，我们在一个包含 `N`\
    \ 个元素的有序数组中查找 `x`。首先，我们将 `x` 与中间值进行比较 —— 如果相等，则返回；如果 `x < middle`，则在左侧搜索；如果 `x\
    \ > middle`，则在右侧搜索。\n\n```\nsearch 9 within [1,5,8,9,11,13,15,19,21]\ncompare\
    \ 9 to 11 → smaller\nsearch 9 within [1,5,8,9]\ncompare 9 to 8 → bigger\nsearch\
    \ 9 within [9]\ncompare 9 to 9\nreturn\n```\n\n我们从包含 `N` 个元素的数组开始搜索；经过一步后，问题规模降为\
    \ `N/2`个元素；再经过一步，降为 `N/2` 个元素。所以总时间取决于我们需要多少步才能将 `N` 降到 1。\n\n```\nN = 16\nN =\
    \ 8 /* 除以 2 */\nN = 4 /* 除以 2 */\nN = 2 /* 除以 2 */\nN = 1 /* 除以 2 */\n```\n\n\
    那么，我们需要将 1 乘以 2 多少次才能得到 `N`？`2^k = N` → `log[2]N = k`\n\n因此，当问题空间中的元素数量每次减半时，其运行时间很可能是\
    \ `O(log N)`。\n\n### 递归运行时间\n\n这段代码的运行时间是多少？\n\n```\nfunc f (n : Int) -> Int {\n\
    if n <= 1 {\nreturn 1\n}\nreturn f(n: n-1) + f(n: n-1)\n}\n```\n\n不要依赖猜测，让我们来审视这段代码。假设我们有\
    \ `f(4)`，它会调用 `f(3)` 两次，而每次 `f(3)` 的调用又会调用 `f(2)`，直到我们降到 `f(1)`（图 13-4）。\n\n![../images/490882_1_En_13_Chapter/490882_1_En_13_Fig4_HTML.png](img/490882_1_En_13_Fig4_HTML.png)\n\
    \n图 13-4\n\n递归运行时间\n\n递归树的深度为 `N`，并且每个节点有两个子节点。因此，每一层的调用次数将是图中所示的两倍。更一般地，可以表示为\
    \ `2⁰+2¹+2²+2³+…+2^(N-1)`。因此，当一个递归函数进行多次调用时，运行时间通常看起来像 `O(分支数^(深度))`，但在我们的例子中，它是\
    \ `O(2^N)`。\n\n## 结论\n\n在本章中，你学习了算法效率以及如何衡量它。我们识别了不同代码的复杂度。我们解释了时间和空间复杂度，并展示了不同类型的复杂度。在下一章中，我们将讨论排序算法。\n"
- fmt: "# 14. Sorting Algorithms\n\nUntil now we have covered different data structures\
    \ and their performance. In this chapter, we will start learning about algorithms,\
    \ which are the essential ways of processing data. The main functionality of algorithms\
    \ is taking data as an input, processing it, and returning it as output.\n\nIn\
    \ this chapter we will look at sorting algorithms which sort the data. The goal\
    \ with sorting is to move from disarray to order. A sorting algorithm is made\
    \ up of a series of instructions that takes lists as input, performs an operation\
    \ on them, and outputs a sorted list. There are different types of sorting algorithms,\
    \ but here we will discuss the following:\n\n- Bubble sort\n- Selection sort\n\
    - Insertion sort\n- Merge sort\n- Quick sort\n\n## Bubble Sort\n\nBubble sort\
    \ is an algorithm used to sort a sequence of numbers. It is used by starting at\
    \ the beginning of a sequence and comparing the first couple elements. The elements\
    \ are only swapped if the first element has a greater value than the second element.\
    \ This process of comparing the adjacent elements continues throughout the array\
    \ until the end has been reached and iterates again from the 0th index until the\
    \ array has been sorted. It is a comparison-based algorithm that compares each\
    \ pair of elements in an array and swaps them if they are out of order until the\
    \ entire array is sorted. Refer to Figure 14-1. To sort this set of elements using\
    \ the bubble sort algorithm, first, we compare 5 with 9 at the left end of the\
    \ sequence. In this case, 5 is smaller than 9, which means that the numbers won’t\
    \ get swapped.\n\n![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig1_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig1_HTML.png)\n\
    \nFigure 14-1 – Bubble sort comparison 1\n\nAfter the comparison is finished,\
    \ the scales move one position to the right and the numbers are compared once\
    \ again. This time 9 is greater than 3, so the numbers will be swapped, and the\
    \ scale moves one position to the right (Figure 14-2).\n\n![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig2_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig2_HTML.png)\n\
    \nFigure 14-2 – Bubble sort comparison 2\n\nThis operation is repeated until the\
    \ scales reach the left end of the sequence. When the scales have reached the\
    \ left end of the sequence, in one round of operation, the smallest value in the\
    \ sequence has moved to the left edge and the number on the left edge is considered\
    \ fully sorted. And the scales are moved back to the right edge, so the same operation\
    \ is repeated until all of the numbers are fully sorted.\n\nThe bubble sort is\
    \ very useful where we know the data is very nearly sorted. For example, if only\
    \ two elements are out of place, then in one pass, bubble sort will finish sorting\
    \ it, and in the second pass, it will see everything is sorted and then exit,\
    \ which means that it takes only two passes of the array.\n\nThe primary advantage\
    \ of the bubble sort is that it is popular and easy to implement. Furthermore,\
    \ in the bubble sort, elements are swapped in place without using additional temporary\
    \ storage, so the space requirement is at a minimum.\n\nThe main disadvantage\
    \ of the bubble sort is the fact that it does not deal well with a list containing\
    \ a huge number of items. This is because the bubble sort requires n-squared processing\
    \ steps for every `n` number of elements to be sorted. As such, the bubble sort\
    \ is mostly suitable for academic teaching but not for real-life applications.\n\
    \n### Implementation\n\nOpen up Xcode and create new playground file to get started\
    \ for this chapter. Create the following function inside it:\n\n```\npublic func\
    \ bubbleSort(_ inputArray: inout [inputType]) {\n    for endofArray in (1..<inputArray.count).reversed()\
    \ {\n        var swapped = false\n        for currentIndex in 0..<endofArray {\n\
    \            if inputArray[currentIndex] > inputArray[currentIndex + 1] {\n  \
    \              inputArray.swapAt(currentIndex, currentIndex+1)\n             \
    \   swapped = true\n            }\n        }\n        if !swapped {\n        \
    \    return\n        }\n    }\n}\n```\n\nInside the first loop with a single pass,\
    \ the largest value goes to the end of the collection and then every pass needs\
    \ to compare one less value than in the previous pass, so each time the array\
    \ is shortened by one. The second loop compares the adjacent values, and if the\
    \ current value is greater than the next value, it swaps them using the `swapAt`\
    \ function.\n\nLet’s take a look at the following array:\n\n```\nvar testArray\
    \ = [9, 2, 6, 4, 5]\nprint(\"Initial array: \\(testArray)\")\nbubbleSort(&testArray)\n\
    print(\"Sorted array: \\(testArray)\")\n```\n\nThe output will be:\n\n```\nInitial\
    \ array: [9, 2, 6, 4, 5]\nSorted array: [2, 4, 5, 6, 9]\n```\n\n## Selection Sort\n\
    \nSelection sort is another sorting algorithm that is used to sort a sequence\
    \ of numbers. Using a linear search, the smallest value in the sequence is located,\
    \ and this value swaps with the leftmost number and it is considered fully sorted.\
    \ If the smallest value happens to already be in the leftmost position, no operation\
    \ is carried out. Then the same operations are repeated until all of the numbers\
    \ are fully sorted.\n\nLet’s assume that we have the following list of numbers\
    \ (Figure 14-3).\n\n![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig3_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig3_HTML.png)\n\
    \nFigure 14-3 – Unsorted list for selection sort\n\nThe selection sort works by\
    \ repeatedly going through the list of items, each time selecting the lowest unsorted\
    \ value and placing it in the correct position in the sequence as shown in Figure\
    \ 14-4.\n\n![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig4_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig4_HTML.png)\n\
    \nFigure 14-4 – Example of performing a selection sort\n\n1. In this case, the\
    \ lowest value is 3. It is swapped with 4 and 3 is considered sorted.\n2. The\
    \ next lowest value is 4 and we see that it is already in the right place.\n3.\
    \ The last lowest value is 6 and it is swapped with 8.\n\nThe main advantage of\
    \ the selection sort is that it performs well on a small list. Furthermore, because\
    \ it is an in-place sorting algorithm, no additional temporary storage is required\
    \ beyond what is needed to hold the original list.\n\nThe primary disadvantage\
    \ of the selection sort is its poor efficiency when dealing with a huge list of\
    \ items. Similar to the bubble sort, the selection sort requires n-squared number\
    \ of steps for sorting `n` elements. Additionally, its performance is easily influenced\
    \ by the initial ordering of the items before the sorting process. Because of\
    \ this, the selection sort is only suitable for a list of few elements that are\
    \ in random order.\n\n### Implementation\n\nLet’s create a `selectionSort` function\
    \ as shown in the following code:\n\n```\npublic func selectionSort(_ inputArray:\
    \ inout [inputType]) {\n    for currentIndex in 0..<(inputArray.count - 1) {\n\
    \        var lowestValueIndex = currentIndex\n        for nextIndex in (currentIndex\
    \ + 1)..<inputArray.count {\n            if inputArray[lowestValueIndex] > inputArray[nextIndex]\
    \ {\n                lowestValueIndex = nextIndex\n            }\n        }\n\
    \        if lowestValueIndex != currentIndex {\n            inputArray.swapAt(lowestValueIndex,\
    \ currentIndex)\n        }\n    }\n}\n```\n\nInside the `selectionSort` function,\
    \ we loop through all elements in the collection, except the last one. If all\
    \ elements are sorted, there is no need to sort the last one. In the next loop,\
    \ we find the lowest value in the list, and if that element is not the current\
    \ element, we swap them.\n\nLet’s take a look at the following array:\n\n```\n\
    var testArray = [9, 2, 6, 4, 5, 10, 8]\nprint(\"Initial array: \\(testArray)\"\
    )\nselectionSort(&testArray)\nprint(\"Sorted array: \\(testArray)\")\n```\n\n\
    The output will be:\n\n```\nInitial array: [9, 2, 6, 4, 5, 10, 8]\nSorted array:\
    \ [2, 4, 5, 6, 8, 9, 10]\n```\n\nIt can be easily seen that selection sort performs\
    \ better than bubble sort."
  raw: '# 14. Sorting Algorithms


    Until now we have covered different data structures and their performance. In
    this chapter, we will start learning about algorithms, which are the essential
    ways of processing data. The main functionality of algorithms is taking data as
    an input, processing it, and returning it as output.


    In this chapter we will look at sorting algorithms which sort the data. The goal
    with sorting is to move from disarray to order. A sorting algorithm is made up
    of a series of instructions that takes lists as input, performs an operation on
    them, and outputs a sorted list. There are different types of sorting algorithms,
    but here we will discuss the following:


    *   Bubble sort


    *   Selection sort


    *   Insertion sort


    *   Merge sort


    *   Quick sort


    ## Bubble Sort


    Bubble sort is an algorithm used to sort a sequence of numbers. It is used by
    starting at the beginning of a sequence and comparing the first couple elements.
    The elements are only swapped if the first element has a greater value than the
    second element. This process of comparing the adjacent elements continues throughout
    the array until the end has been reached and iterates again from the 0th index
    until the array has been sorted. It is a comparison-based algorithm that compares
    each pair of elements in an array and swaps them if they are out of order until
    the entire array is sorted. Refer to Figure [14-1](#490882_1_En_14_Chapter.xhtml#Fig1).
    To sort this set of elements using the bubble sort algorithm, first, we compare
    5 with 9 at the left end of the sequence. In this case, 5 is smaller than 9, which
    means that the numbers won’t get swapped.


    ![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig1_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig1_HTML.png)


    Figure 14-1


    Bubble sort comparison 1


    After the comparison is finished, the scales move one position to the right and
    the numbers are compared once again. This time 9 is greater than 3, so the numbers
    will be swapped, and the scale moves one position to the right (Figure [14-2](#490882_1_En_14_Chapter.xhtml#Fig2)).


    ![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig2_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig2_HTML.png)


    Figure 14-2


    Bubble sort comparison 2


    This operation is repeated until the scales reach the left end of the sequence.
    When the scales have reached the left end of the sequence, in one round of operation,
    the smallest value in the sequence has moved to the left edge and the number on
    the left edge is considered fully sorted. And the scales are moved back to the
    right edge, so the same operation is repeated until all of the numbers are fully
    sorted.


    The bubble sort is very useful where we know the data is very nearly sorted. For
    example, if only two elements are out of place, then in one pass, bubble sort
    will finish sorting it, and in the second pass, it will see everything is sorted
    and then exit, which means that it takes only two passes of the array.


    The primary advantage of the bubble sort is that it is popular and easy to implement.
    Furthermore, in the bubble sort, elements are swapped in place without using additional
    temporary storage, so the space requirement is at a minimum.


    The main disadvantage of the bubble sort is the fact that it does not deal well
    with a list containing a huge number of items. This is because the bubble sort
    requires n-squared processing steps for every n number of elements to be sorted.
    As such, the bubble sort is mostly suitable for academic teaching but not for
    real-life applications.


    ### Implementation


    Open up Xcode and create new playground file to get started for this chapter.
    Create the following function inside it:


    ```

    public func bubbleSort(_ inputArray: inout [inputType]) {

    for endofArray in (1.. inputArray[currentIndex + 1] {

    inputArray.swapAt(currentIndex, currentIndex+1)

    swapped = true

    }

    }

    if !swapped {

    return

    }

    }

    }

    ```


    Inside the first loop with a single pass, the largest value goes to the end of
    the collection and then every pass needs to compare one less value than in the
    previous pass, so each time the array is shortened by one. The second loop compares
    the adjacent values, and if the current value is greater than the next value,
    it swaps them using the swapAt function.


    Let’s take a look at the following array:


    ```

    var testArray = [9, 2, 6, 4, 5]

    print("Initial array: \(testArray)")

    bubbleSort(&testArray)

    print("Sorted array: \(testArray)")

    ```


    The output will be


    ```

    Initial array: [9, 2, 6, 4, 5]

    Sorted array: [2, 4, 5, 6, 9]

    ```


    ## Selection Sort


    Selection sort is another sorting algorithm that is used to sort a sequence of
    numbers. Using a linear search, the smallest value in the sequence is located,
    and this value swaps with the leftmost number and it is considered fully sorted.
    If the smallest value happens to already be in the leftmost position, no operation
    is carried out. Then the same operations are repeated until all of the numbers
    are fully sorted.


    Let’s assume that we have the following list of numbers (Figure [14-3](#490882_1_En_14_Chapter.xhtml#Fig3)).


    ![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig3_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig3_HTML.png)


    Figure 14-3


    Unsorted list for selection sort


    The selection sort works by repeatedly going through the list of items, each time
    selecting the lowest unsorted value and placing it in the correct position in
    the sequence as shown in Figure [14-4](#490882_1_En_14_Chapter.xhtml#Fig4).


    ![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig4_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig4_HTML.png)


    Figure 14-4


    Example of performing a selection sort


    1.  In this case, the lowest value is 3\. It is swapped with 4 and 3 is considered
    sorted.


    2.  The next lowest value is 4 and we see that it is already in the right place.


    3.  The last lowest value is 6 and it is swapped with 8.


    The main advantage of the selection sort is that it performs well on a small list.
    Furthermore, because it is an in-place sorting algorithm, no additional temporary
    storage is required beyond what is needed to hold the original list.


    The primary disadvantage of the selection sort is its poor efficiency when dealing
    with a huge list of items. Similar to the bubble sort, the selection sort requires
    n-squared number of steps for sorting n elements. Additionally, its performance
    is easily influenced by the initial ordering of the items before the sorting process.
    Because of this, the selection sort is only suitable for a list of few elements
    that are in random order.


    ### Implementation


    Let’s create a selectionSort function as shown in the following code:


    ```

    public func selectionSort(_ inputArray: inout [inputType]) {

    for  currentIndex in 0.. inputArray[nextIndex] {

    lowestValueIndex = nextIndex

    }

    }

    if lowestValueIndex != currentIndex {

    inputArray.swapAt(lowestValueIndex, currentIndex)

    }

    }

    }

    ```


    Inside the selectionSort function, we loop through all elements in the collection,
    except the last one. If all elements are sorted, there is no need to sort the
    last one. In the next loop, we find the lowest value in the list, and if that
    element is not the current element, we swap them.


    Let’s take a look at the following array:


    ```

    var testArray = [9, 2, 6, 4, 5, 10, 8]

    print("Initial array: \(testArray)")

    selectionSort(&testArray)

    print("Sorted array: \(testArray)")

    ```


    The output will be


    ```

    Initial array: [9, 2, 6, 4, 5, 10, 8]

    Sorted array: [2, 4, 5, 6, 8, 9, 10]

    ```


    It can be easily seen that selection sort performs better than bubble sort.'
  trans: "\n# 14. 排序算法\n\n到目前为止，我们已经学习了各种不同的数据结构及其性能表现。在本章中，我们将开始学习算法，这些算法是处理数据的核心方式。算法的主要功能是将数据作为输入，对其进行处理，然后将其作为输出返回。\n\
    \n本章我们将重点学习用于数据排序的排序算法。排序的目标是从无序走向有序。排序算法由一系列指令组成，这些指令以列表为输入，对其执行操作，并输出一个已排序的列表。排序算法有多种类型，但这里我们将讨论以下几种：\n\
    \n-   冒泡排序\n-   选择排序\n-   插入排序\n-   归并排序\n-   快速排序\n\n## 冒泡排序\n\n冒泡排序是一种用于对数字序列进行排序的算法。其使用方法是从序列的开头开始，比较前两个元素。只有当第一个元素的值大于第二个元素时，这两个元素才会被交换。这种比较相邻元素的过程会一直持续到数组末尾，然后从第\
    \ 0 个索引开始再次迭代，直到整个数组排序完成。它是一种基于比较的算法，会比较数组中的每一对元素，如果它们顺序不对则进行交换，直到整个数组有序。请参考图\
    \ 14-1。要使用冒泡排序算法对这组元素进行排序，首先，我们在序列左端比较 5 和 9。在这种情况下，5 小于 9，这意味着这两个数字不会被交换。\n\n\
    ![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig1_HTML.png](img/490882_1_En_14_Fig1_HTML.png)\n\
    \n图 14-1 – 冒泡排序比较 1\n\n比较结束后，标尺向右移动一个位置，再次比较这两个数字。这次 9 大于 3，因此这两个数字会被交换，然后标尺再向右移动一个位置（图\
    \ 14-2）。\n\n![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig2_HTML.png](img/490882_1_En_14_Fig2_HTML.png)\n\
    \n图 14-2 – 冒泡排序比较 2\n\n此操作重复进行，直到标尺到达序列的左端。当标尺到达序列左端时，经过一轮操作，序列中的最小值已移动到左边缘，并且左边缘的这个数字被认为已完全排序。然后标尺移回右边缘，重复同样的操作，直到所有数字都完全排序。\n\
    \n当数据接近有序时，冒泡排序非常有用。例如，如果只有两个元素位置错乱，那么冒泡排序只需一轮即可完成排序，第二轮会发现所有元素都已排序并退出，这意味着只需要遍历数组两轮。\n\
    \n冒泡排序的主要优点是它很流行且易于实现。此外，在冒泡排序中，元素在原地进行交换，无需使用额外的临时存储空间，因此空间需求最小。\n\n冒泡排序的主要缺点是它不太擅长处理包含大量元素的列表。这是因为对于每`n`个需要排序的元素，冒泡排序需要\
    \ n 平方步的处理步骤。因此，冒泡排序主要适用于学术教学，而不适用于实际应用。\n\n### 实现\n\n打开 Xcode 并创建一个新的 playground\
    \ 文件开始本章的学习。在其中创建以下函数：\n\n```\npublic func bubbleSort(_ inputArray: inout [inputType])\
    \ {\n    for endofArray in (1..<inputArray.count).reversed() {\n        var swapped\
    \ = false\n        for currentIndex in 0..<endofArray {\n            if inputArray[currentIndex]\
    \ > inputArray[currentIndex + 1] {\n                inputArray.swapAt(currentIndex,\
    \ currentIndex+1)\n                swapped = true\n            }\n        }\n\
    \        if !swapped {\n            return\n        }\n    }\n}\n```\n\n在单轮遍历的内部第一个循环中，最大值会移动到集合的末尾，然后每一轮需要比较的元素都比上一轮少一个，因此每次数组都会缩短一个。第二个循环比较相邻的值，如果当前值大于下一个值，则使用`swapAt`函数交换它们。\n\
    \n让我们看看下面的数组：\n\n```\nvar testArray = [9, 2, 6, 4, 5]\nprint(\"Initial array:\
    \ \\(testArray)\")\nbubbleSort(&testArray)\nprint(\"Sorted array: \\(testArray)\"\
    )\n```\n\n输出将是：\n\n```\nInitial array: [9, 2, 6, 4, 5]\nSorted array: [2, 4, 5,\
    \ 6, 9]\n```\n\n## 选择排序\n\n选择排序是另一种用于对数字序列进行排序的算法。通过线性搜索，找到序列中的最小值，然后将该值与最左边的数字交换，并认为其已完全排序。如果最小值恰好已经在最左边的位置，则不执行任何操作。然后重复相同的操作，直到所有数字都完全排序。\n\
    \n假设我们有以下数字列表（图 14-3）。\n\n![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig3_HTML.png](img/490882_1_En_14_Fig3_HTML.png)\n\
    \n图 14-3 – 用于选择排序的未排序列表\n\n选择排序通过重复遍历列表中的元素来工作，每次选择最低的未排序值并将其放置在序列中的正确位置，如图 14-4\
    \ 所示。\n\n![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig4_HTML.png](img/490882_1_En_14_Fig4_HTML.png)\n\
    \n图 14-4 – 执行选择排序的示例\n\n1.  在这种情况下，最低值是 3。它与 4 交换，并且 3 被认为是已排序的。\n2.  下一个最低值是\
    \ 4，我们发现它已经在正确的位置。\n3.  最后一个最低值是 6，它与 8 交换。\n\n选择排序的主要优点是它在处理小列表时表现良好。此外，由于它是一种原地排序算法，除了保存原始列表所需的空间外，不需要额外的临时存储空间。\n\
    \n选择排序的主要缺点是在处理包含大量元素的列表时效率低下。与冒泡排序类似，选择排序对`n`个元素进行排序需要 n 平方步。此外，其性能很容易受到排序前元素初始顺序的影响。因此，选择排序仅适用于元素数量少且随机排列的列表。\n\
    \n### 实现\n\n让我们创建一个如以下代码所示的`selectionSort`函数：\n\n```\npublic func selectionSort(_\
    \ inputArray: inout [inputType]) {\n    for currentIndex in 0..<(inputArray.count\
    \ - 1) {\n        var lowestValueIndex = currentIndex\n        for nextIndex in\
    \ (currentIndex + 1)..<inputArray.count {\n            if inputArray[lowestValueIndex]\
    \ > inputArray[nextIndex] {\n                lowestValueIndex = nextIndex\n  \
    \          }\n        }\n        if lowestValueIndex != currentIndex {\n     \
    \       inputArray.swapAt(lowestValueIndex, currentIndex)\n        }\n    }\n\
    }\n```\n\n在`selectionSort`函数内部，我们遍历集合中除最后一个元素之外的所有元素。如果所有元素都已排序，则无需对最后一个元素进行排序。在下一个循环中，我们找到列表中的最小值，如果该元素不是当前元素，则交换它们。\n\
    \n让我们看看下面的数组：\n\n```\nvar testArray = [9, 2, 6, 4, 5, 10, 8]\nprint(\"Initial\
    \ array: \\(testArray)\")\nselectionSort(&testArray)\nprint(\"Sorted array: \\\
    (testArray)\")\n```\n\n输出将是：\n\n```\nInitial array: [9, 2, 6, 4, 5, 10, 8]\nSorted\
    \ array: [2, 4, 5, 6, 8, 9, 10]\n```\n\n很容易看出，选择排序的性能优于冒泡排序。\n"
- fmt: "# Insertion Sort\n\nInsertion sort is one of the most popular and simple sorting\
    \ algorithms. The average time complexity of insertion sort is `O(n²)`, which\
    \ means that it is very inefficient for sorting larger datasets. Insertion sort\
    \ can be used when the data is nearly sorted or when the dataset is small. In\
    \ the mentioned conditions, the time complexity can be reached to `O(n log(n))`.\n\
    \nIn insertion sort when we begin, the leftmost number is considered fully sorted.\
    \ Then from the remaining numbers, the leftmost number is taken out and compared\
    \ to the already sorted number to its left, and if the already sorted number is\
    \ larger, the two numbers swap. This operation repeats until either a number smaller\
    \ appears or the number reaches to the left edge.\n\nLet’s assume that we have\
    \ the following list of numbers (Figure [14-5](#490882_1_En_14_Chapter.xhtml#Fig5)).\n\
    \n![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig5_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig5_HTML.png)\n\
    \nFigure 14-5\nUnsorted list for insertion sort\n\nAs shown in Figure [14-6](#490882_1_En_14_Chapter.xhtml#Fig6),\
    \ In this case 6 is greater than 3, so the numbers swap. And the number reaches\
    \ to the left edge, so it stops there and considered fully sorted, and in our\
    \ case 3 is now fully sorted. Then again the leftmost number from the remaining\
    \ numbers is taken out and compared to the number to its left. Next, 6 is less\
    \ than 8, so the numbers will be not be swapped, and 6 is considered fully sorted.\
    \ Then 8 is taken out and compared with 4 and it is greater which means the numbers\
    \ will be swapped, and we compare 4 with 6 and we see that 6 is greater than 4,\
    \ so again the numbers will be swapped. When it reaches the number that is smaller,\
    \ it stops there and considered fully sorted. Finally, since all the numbers are\
    \ fully sorted, sorting is complete.\n\n![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig6_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig6_HTML.png)\n\
    \nFigure 14-6\nInsertion sort steps\n\nThe main advantage of the insertion sort\
    \ is its simplicity. It also exhibits good performance when dealing with a small\
    \ list. The insertion sort is an in-place sorting algorithm, so the space requirement\
    \ is minimal.\n\nThe disadvantage of the insertion sort is that it does not perform\
    \ as well as other better sorting algorithms. With n-squared steps required for\
    \ every n element to be sorted, the insertion sort does not deal well with a huge\
    \ list. Therefore, the insertion sort is particularly useful when sorting a list\
    \ of few items.\n\n## Implementation\n\nLet’s create an insertion sort function\
    \ as shown in the following code:\n\n```\npublic func insertionSort(_ inputArray:\
    \ inout [inputType]) {\n    for currentIndex in 1..<inputArray.count {\n     \
    \   for swap in (1...currentIndex).reversed() {\n            if inputArray[swap]\
    \ < inputArray[swap - 1] {\n                inputArray.swapAt(swap, swap-1)\n\
    \            } else {\n                break\n            }\n        }\n    }\n\
    }\n```\n\nWe know that the insertion sort requires iteration through the collection\
    \ from the left to right once and the first loop does so. Then in the next loop,\
    \ we swap elements as needed. As the elements reach its position, the inner loop\
    \ breaks and starts with the next element.\n\nLet’s take a look at the following\
    \ array:\n\n```\nvar testArray = [9, 2, 6, 4, 5, 10, 8, 12, 16, 11]\nprint(\"\
    Initial array: \\(testArray)\")\ninsertionSort(&testArray)\nprint(\"Sorted array:\
    \ \\(testArray)\")\n```\n\nThe output will be\n\n```\nInitial array: [9, 2, 6,\
    \ 4, 5, 10, 8, 12, 16, 11]\nSorted array: [2, 4, 5, 6, 8, 9, 10, 11, 12, 16]\n\
    ```\n\nThe insertion sort is useful when you have a list that is mostly sorted.\
    \ A card game would be a good example. When a player receives a new card, it is\
    \ added to their existing hand and the insertion can efficiently resort the list\
    \ of cards.\n\n# Merge Sort\n\nMerge sort is another sorting algorithm which has\
    \ a lower-order running time than the insertion sort. It is a divide-and-conquer\
    \ algorithm. Merge sort divides the sequence further and further into halves,\
    \ and when the division is complete, the next thing it will do is combine the\
    \ divided groups back. During the combination of divided groups, each group’s\
    \ number is arranged so that they are ordered from smallest to largest. When groups\
    \ with multiple numbers are combined, the first numbers are compared first.\n\n\
    Let’s assume that we have the following list of numbers (Figure [14-7](#490882_1_En_14_Chapter.xhtml#Fig7)).\n\
    \n![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig7_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig7_HTML.png)\n\
    \nFigure 14-7\nUnsorted list for merge sort\n\nThe division will be as shown in\
    \ Figure [14-8](#490882_1_En_14_Chapter.xhtml#Fig8).\n\n![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig8_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig8_HTML.png)\n\
    \nFigure 14-8\nMerge sort divide\n\nIt can be easily seen that in each step merge\
    \ sort divides the sequence into halves. After the division is finished, the combination\
    \ process starts, and while combining, the divided group elements are compared\
    \ to be arranged in order (Figure [14-9](#490882_1_En_14_Chapter.xhtml#Fig9)).\n\
    \n![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig9_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig9_HTML.png)\n\
    \nFigure 14-9\nMerge sort combine\n\n### Advantages\n\n*   It is quicker for larger\
    \ lists because unlike insertion and bubble sort, it does not loop through the\
    \ list.\n*   It has a consistent running time.\n\n### Disadvantages\n\n*   Slower\
    \ for smaller lists compared to other sorting algorithms.\n*   Even if the list\
    \ is sorted, it goes through all the steps.\n*   Uses more memory to store subelements.\n\
    \n## Implementation\n\nWe need another function to merge elements that we split.\n\
    \n```\npublic func mergeSort(_ inputArray: [inputType]) -> [inputType] {\n   \
    \ if inputArray.count < 2 {\n        return inputArray\n    }\n    let center\
    \ = (inputArray.count) / 2\n    return merge(mergeSort([inputType](inputArray[0..<center])),\
    \ rightList:\n    mergeSort([inputType](inputArray[center..<inputArray.count])))\n\
    }\n```\n\nHere again the type that is used in `mergeSort` function must conform\
    \ to the `Comparable` protocol, because we need to compare elements of the array.\
    \ First, we check the count of an array; if it is less than 2, then it is considered\
    \ sorted and the array itself is returned. Then we divide the list into two and\
    \ call `mergeSort` function recursively.\n\nMerge function:\n\n```\nprivate func\
    \ merge(_ leftList: [inputType], rightList: [inputType]) -> [inputType] {\n  \
    \  var leftIndex = 0\n    var rightIndex = 0\n    var tmpList = [inputType]()\n\
    \    tmpList.reserveCapacity(leftList.count + rightList.count)\n    \n    while\
    \ (leftIndex < leftList.count && rightIndex < rightList.count) {\n        if leftList[leftIndex]\
    \ < rightList[rightIndex] {\n            tmpList.append(leftList[leftIndex])\n\
    \            leftIndex += 1\n        } else if leftList[leftIndex] > rightList[rightIndex]\
    \ {\n            tmpList.append(rightList[rightIndex])\n            rightIndex\
    \ += 1\n        } else {\n            tmpList.append(leftList[leftIndex])\n  \
    \          tmpList.append(rightList[rightIndex])\n            leftIndex += 1\n\
    \            rightIndex += 1\n        }\n    }\n    \n    tmpList += [inputType](leftList[leftIndex..<leftList.count])\n\
    \    tmpList += [inputType](rightList[rightIndex..<rightList.count])\n    return\
    \ tmpList\n}\n```\n\nMerge function also conforms to `Comparable` protocol and\
    \ it takes two lists as parameters. First we create a temporary array and reserve\
    \ a capacity for it. Then by using the `while` loop, we loop through the lists\
    \ until either the left or right index is equal to their respective sequence count.\
    \ Then we start to compare the values from the left and right sequences; if the\
    \ `leftList` element is less than the `rightList`, we add it to the temporary\
    \ array and increment the `leftIndex`. If the `leftList` element is greater than\
    \ the `rightList`, then we add the `rightList` element to the temporary array\
    \ and increment the `rightIndex`; otherwise these elements are equal and we add\
    \ the right and left elements and increment both indexes.\n\nLet’s take a look\
    \ at the following array:\n\n```\nvar testArray = [9, 2, 6, 4, 5, 10, 8, 12, 16,\
    \ 11]\nprint(\"Initial array: \\(testArray)\")\nprint(mergeSort(testArray))\n\
    ```\n\nThe output will be\n\n```\nInitial array: [9, 2, 6, 4, 5, 10, 8, 12, 16,\
    \ 11]\nResult array: [2, 4, 5, 6, 8, 9, 10, 11, 12, 16]\n```"
  raw: '## Insertion Sort


    Insertion sort is one of the most popular and simple sorting algorithms. The average
    time complexity of insertion sort is O(n²), which means that it is very inefficient
    for sorting larger datasets. Insertion sort can be used when the data is nearly
    sorted or when the dataset is small. In the mentioned conditions, the time complexity
    can be reached to O(n log(n)).


    In insertion sort when we begin, the leftmost number is considered fully sorted.
    Then from the remaining numbers, the leftmost number is taken out and compared
    to the already sorted number to its left, and if the already sorted number is
    larger, the two numbers swap. This operation repeats until either a number smaller
    appears or the number reaches to the left edge.


    Let’s assume that we have the following list of numbers (Figure [14-5](#490882_1_En_14_Chapter.xhtml#Fig5)).


    ![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig5_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig5_HTML.png)


    Figure 14-5


    Unsorted list for insertion sort


    As shown in Figure [14-6](#490882_1_En_14_Chapter.xhtml#Fig6), In this case 6
    is greater than 3, so the numbers swap. And the number reaches to the left edge,
    so it stops there and considered fully sorted, and in our case 3 is now fully
    sorted. Then again the leftmost number from the remaining numbers is taken out
    and compared to the number to its left. Next, 6 is less than 8, so the numbers
    will be not be swapped, and 6 is considered fully sorted. Then 8 is taken out
    and compared with 4 and it is greater which means the numbers will be swapped,
    and we compare 4 with 6 and we see that 6 is greater than 4, so again the numbers
    will be swapped. When it reaches the number that is smaller, it stops there and
    considered fully sorted. Finally, since all the numbers are fully sorted, sorting
    is complete.


    ![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig6_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig6_HTML.png)


    Figure 14-6


    Insertion sort steps


    The main advantage of the insertion sort is its simplicity. It also exhibits good
    performance when dealing with a small list. The insertion sort is an in-place
    sorting algorithm, so the space requirement is minimal.


    The disadvantage of the insertion sort is that it does not perform as well as
    other better sorting algorithms. With n-squared steps required for every n element
    to be sorted, the insertion sort does not deal well with a huge list. Therefore,
    the insertion sort is particularly useful when sorting a list of few items.


    ### Implementation


    Let’s create an insertion sort function as shown in the following code:


    ```

    public func insertionSort(_ inputArray: inout [inputType]) {

    for currentIndex in 1..<inputArray.count {

    for swap in (1...currentIndex).reversed() {

    if inputArray[swap] < inputArray[swap - 1] {

    inputArray.swapAt(swap, swap-1)

    } else {

    break

    }

    }

    }

    }

    ```


    We know that the insertion sort requires iteration through the collection from
    the left to right once and the first loop does so. Then in the next loop, we swap
    elements as needed. As the elements reach its position, the inner loop breaks
    and starts with the next element.


    Let’s take a look at the following array:


    ```

    var testArray = [9, 2, 6, 4, 5, 10, 8, 12, 16, 11]

    print("Initial array: \(testArray)")

    insertionSort(&testArray)

    print("Sorted array: \(testArray)")

    ```


    The output will be


    ```

    Initial array: [9, 2, 6, 4, 5, 10, 8, 12, 16, 11]

    Sorted array: [2, 4, 5, 6, 8, 9, 10, 11, 12, 16]

    ```


    The insertion sort is useful when you have a list that is mostly sorted. A card
    game would be a good example. When a player receives a new card, it is added to
    their existing hand and the insertion can efficiently resort the list of cards.


    ## Merge Sort


    Merge sort is another sorting algorithm which has a lower-order running time than
    the insertion sort. It is a divide-and-conquer algorithm. Merge sort divides the
    sequence further and further into halves, and when the division is complete, the
    next thing it will do is combine the divided groups back. During the combination
    of divided groups, each group’s number is arranged so that they are ordered from
    smallest to largest. When groups with multiple numbers are combined, the first
    numbers are compared first.


    Let’s assume that we have the following list of numbers (Figure [14-7](#490882_1_En_14_Chapter.xhtml#Fig7)).


    ![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig7_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig7_HTML.png)


    Figure 14-7


    Unsorted list for merge sort


    The division will be as shown in Figure [14-8](#490882_1_En_14_Chapter.xhtml#Fig8).


    ![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig8_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig8_HTML.png)


    Figure 14-8


    Merge sort divide


    It can be easily seen that in each step merge sort divides the sequence into halves.
    After the division is finished, the combination process starts, and while combining,
    the divided group elements are compared to be arranged in order (Figure [14-9](#490882_1_En_14_Chapter.xhtml#Fig9)).


    ![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig9_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig9_HTML.png)


    Figure 14-9


    Merge sort combine


    Advantages


    *   It is quicker for larger lists because unlike insertion and bubble sort, it
    does not loop through the list.


    *   It has a consistent running time.


    Disadvantages


    *   Slower for smaller lists compared to other sorting algorithms.


    *   Even if the list is sorted, it goes through all the steps.


    *   Uses more memory to store subelements.


    ### Implementation


    We need another function to merge elements that we split.


    ```

    public func mergeSort(_ inputArray: [inputType]) -> [inputType] {

    if inputArray.count < 2 {

    return inputArray

    }

    let center = (inputArray.count) / 2

    return merge(mergeSort([inputType](inputArray[0..<center])), rightList:

    mergeSort([inputType](inputArray[center..<inputArray.count])))

    }

    ```


    Here again the type that is used in mergeSort function must conform to the Comparable
    protocol, because we need to compare elements of the array. First, we check the
    count of an array; if it is less than 2, then it is considered sorted and the
    array itself is returned. Then we divide the list into two and call mergeSort
    function recursively.


    Merge function:


    ```

    private func merge(_ leftList: [inputType], rightList: [inputType]) -> [inputType]
    {

    var leftIndex = 0

    var rightIndex = 0

    var tmpList = [inputType]()

    tmpList.reserveCapacity(leftList.count + rightList.count)

    while (leftIndex  rightList[rightIndex] {

    tmpList.append(rightList[rightIndex])

    rightIndex += 1

    } else {

    tmpList.append(leftList[leftIndex])

    tmpList.append(rightList[rightIndex])

    leftIndex += 1

    rightIndex += 1

    }

    }

    tmpList += [inputType](leftList[leftIndex..<leftList.count])

    tmpList += [inputType](rightList[rightIndex..<rightList.count])

    return tmpList

    }

    ```


    Merge function also conforms to Comparable protocol and it takes two lists as
    parameters. First we create a temporary array and reserve a capacity for it. Then
    by using the while loop, we loop through the lists until either the left or right
    index is equal to their respective sequence count. Then we start to compare the
    values from the left and right sequences; if the leftList element is less than
    the rightList, we add it to the temporary array and increment the leftIndex. If
    the leftList element is greater than the rightList, then we add the rightList
    element to the temporary array and increment the rightIndex; otherwise these elements
    are equal and we add the right and left elements and increment both indexes.


    Let’s take a look at the following array:


    ```

    var testArray = [9, 2, 6, 4, 5, 10, 8, 12, 16, 11]

    print("Initial array: \(testArray)")

    print(mergeSort(testArray))

    ```


    The output will be


    ```

    Initial array: [9, 2, 6, 4, 5, 10, 8, 12, 16, 11]

    Result array: [2, 4, 5, 6, 8, 9, 10, 11, 12, 16]

    ```'
  trans: "\n# 插入排序\n\n插入排序是最常用且最简单的排序算法之一。插入排序的平均时间复杂度为 `O(n²)`，这意味着对较大数据集进行排序时效率很低。当数据近乎有序或数据集较小时，可以使用插入排序。在上述条件下，时间复杂度可达到\
    \ `O(n log(n))`。\n\n在插入排序开始时，最左侧的数字被视为已完全排序。然后从剩余数字中取出最左侧的数字，与其左侧已排序的数字进行比较，如果已排序的数字更大，则两个数字交换位置。重复此操作，直到遇到更小的数字或该数字到达左边界。\n\
    \n假设我们有以下数字列表（图 14-5）。\n\n![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig5_HTML.png](img/490882_1_En_14_Fig5_HTML.png)\n\
    \n图 14-5\n待插入排序的未排序列表\n\n如图 14-6 所示，在此例中，6 大于 3，因此这两个数字交换位置。该数字到达左边界，因此停在那里并被视为已完全排序，在此例中\
    \ 3 已完全排序。然后再次取出剩余数字中最左侧的数字，与其左侧的数字进行比较。接下来，6 小于 8，因此数字不会交换，6 被视为已完全排序。然后取出 8\
    \ 并与 4 比较，发现 8 更大，这意味着数字将交换位置，然后将 4 与 6 比较，发现 6 大于 4，因此数字再次交换位置。当它遇到更小的数字时，就停在那里并被视为已完全排序。最后，由于所有数字都已完全排序，排序完成。\n\
    \n![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig6_HTML.png](img/490882_1_En_14_Fig6_HTML.png)\n\
    \n图 14-6\n插入排序步骤\n\n插入排序的主要优点是简单。处理小型列表时也具有良好的性能。插入排序是一种原地排序算法，因此空间需求极小。\n\n插入排序的缺点是性能不如其他更好的排序算法。对于需排序的每\
    \ n 个元素需要 n 平方步，因此插入排序处理大型列表时效果不佳。因此，插入排序在对少量元素进行排序时特别有用。\n\n## 实现\n\n让我们创建一个插入排序函数，如下代码所示：\n\
    \n```\npublic func insertionSort(_ inputArray: inout [inputType]) {\n    for currentIndex\
    \ in 1..<inputArray.count {\n        for swap in (1...currentIndex).reversed()\
    \ {\n            if inputArray[swap] < inputArray[swap - 1] {\n              \
    \  inputArray.swapAt(swap, swap-1)\n            } else {\n                break\n\
    \            }\n        }\n    }\n}\n```\n\n我们知道插入排序需要从左到右遍历集合一次，第一个循环正是如此。然后在下一个循环中，我们根据需要交换元素。当元素到达其位置时，内层循环中断并继续处理下一个元素。\n\
    \n让我们看看以下数组：\n\n```\nvar testArray = [9, 2, 6, 4, 5, 10, 8, 12, 16, 11]\nprint(\"\
    初始数组: \\(testArray)\")\ninsertionSort(&testArray)\nprint(\"排序后数组: \\(testArray)\"\
    )\n```\n\n输出将为\n\n```\n初始数组: [9, 2, 6, 4, 5, 10, 8, 12, 16, 11]\n排序后数组: [2, 4,\
    \ 5, 6, 8, 9, 10, 11, 12, 16]\n```\n\n当你拥有一个基本有序的列表时，插入排序非常有用。纸牌游戏就是一个很好的例子。当玩家收到一张新牌时，它会被添加到现有手牌中，插入排序可以高效地重新排序卡牌列表。\n\
    \n# 归并排序\n\n归并排序是另一种排序算法，其运行时间阶数低于插入排序。它是一种分治算法。归并排序将序列不断地分成两半，当分割完成后，下一步是将分组后的组重新合并。在合并分组组时，每个组中的数字会被重新排列，使其从小到大有序。当合并包含多个数字的组时，会先比较第一个数字。\n\
    \n假设我们有以下数字列表（图 14-7）。\n\n![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig7_HTML.png](img/490882_1_En_14_Fig7_HTML.png)\n\
    \n图 14-7\n待归并排序的未排序列表\n\n分割过程将如图 14-8 所示。\n\n![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig8_HTML.png](img/490882_1_En_14_Fig8_HTML.png)\n\
    \n图 14-8\n归并排序分割\n\n可以很容易地看出，在每一步中，归并排序都将序列分成两半。分割完成后，合并过程开始，在合并时，会对分组后的元素进行比较以按顺序排列（图\
    \ 14-9）。\n\n![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig9_HTML.png](img/490882_1_En_14_Fig9_HTML.png)\n\
    \n图 14-9\n归并排序合并\n\n### 优点\n\n*   对于较大的列表更快，因为与插入排序和冒泡排序不同，它不需要循环遍历列表。\n*   运行时间稳定。\n\
    \n### 缺点\n\n*   对于较小的列表，比其他排序算法慢。\n*   即使列表已排序，它也会执行所有步骤。\n*   使用更多内存来存储子元素。\n\
    \n## 实现\n\n我们需要另一个函数来合并拆分后的元素。\n\n```\npublic func mergeSort(_ inputArray: [inputType])\
    \ -> [inputType] {\n    if inputArray.count < 2 {\n        return inputArray\n\
    \    }\n    let center = (inputArray.count) / 2\n    return merge(mergeSort(inputType),\
    \ rightList:\n    mergeSort(inputType))\n}\n```\n\n同样，`mergeSort` 函数中使用的类型必须符合\
    \ `Comparable` 协议，因为我们需要比较数组的元素。首先检查数组的长度；如果小于 2，则视为已排序并返回数组本身。然后我们将列表分成两部分并递归调用\
    \ `mergeSort` 函数。\n\n合并函数：\n\n```\nprivate func merge(_ leftList: [inputType],\
    \ rightList: [inputType]) -> [inputType] {\n    var leftIndex = 0\n    var rightIndex\
    \ = 0\n    var tmpList = [inputType]()\n    tmpList.reserveCapacity(leftList.count\
    \ + rightList.count)\n    \n    while (leftIndex < leftList.count && rightIndex\
    \ < rightList.count) {\n        if leftList[leftIndex] < rightList[rightIndex]\
    \ {\n            tmpList.append(leftList[leftIndex])\n            leftIndex +=\
    \ 1\n        } else if leftList[leftIndex] > rightList[rightIndex] {\n       \
    \     tmpList.append(rightList[rightIndex])\n            rightIndex += 1\n   \
    \     } else {\n            tmpList.append(leftList[leftIndex])\n            tmpList.append(rightList[rightIndex])\n\
    \            leftIndex += 1\n            rightIndex += 1\n        }\n    }\n \
    \   \n    tmpList += inputType\n    tmpList += inputType\n    return tmpList\n\
    }\n```\n\n合并函数同样符合 `Comparable` 协议，它接受两个列表作为参数。首先创建一个临时数组并为其预留容量。然后使用 `while`\
    \ 循环遍历列表，直到左索引或右索引等于各自序列的计数。然后开始比较左右序列中的值；如果 `leftList` 元素小于 `rightList` 元素，则将其添加到临时数组并递增\
    \ `leftIndex`。如果 `leftList` 元素大于 `rightList` 元素，则将 `rightList` 元素添加到临时数组并递增 `rightIndex`；否则，这些元素相等，我们添加左和右元素，并同时递增两个索引。\n\
    \n让我们看看以下数组：\n\n```\nvar testArray = [9, 2, 6, 4, 5, 10, 8, 12, 16, 11]\nprint(\"\
    初始数组: \\(testArray)\")\nprint(mergeSort(testArray))\n```\n\n输出将为\n\n```\n初始数组:\
    \ [9, 2, 6, 4, 5, 10, 8, 12, 16, 11]\n结果数组: [2, 4, 5, 6, 8, 9, 10, 11, 12, 16]\n\
    ```\n"
- fmt: '# Quick Sort


    Quick sort is also a divide-and-conquer algorithm to sort the sequence. One of
    the main characteristics of quick sort is that it involves fewer comparisons and
    swaps compared to other algorithms, so it is able to sort quickly in many cases.
    The algorithm works by partitioning an initial array into sublists based on a
    pivot element. All elements in the first sublist are arranged to be smaller than
    the pivot, while all elements in the second sublist are arranged to be larger
    than the pivot. The same partitioning and arranging process is performed repeatedly
    on the resulting sublists until the whole list of items is sorted. The average
    running time is `O(n log n)`, due to its tight inner loop. In the worst-case scenario,
    its running time is `O(n²)`.


    Let’s assume that we have the following list of numbers (Figure [14-10](#490882_1_En_14_Chapter.xhtml#Fig10)).


    ![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig10_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig10_HTML.png)


    Figure 14-10 Unsorted list for quick sort


    The first operation in this unsorted list targets the entire sequence of numbers,
    and a number is chosen as a reference for sorting which is called pivot and it
    is chosen at random. This time, for convenience, let’s choose the rightmost number
    as the pivot, which is 5. The next thing that we are going to do is to place a
    left marker on the leftmost number and a right marker on the rightmost number.
    Quick sort uses these markers to repeatedly perform rounds of operation recursively.
    The left marker moves to the right and, in each step, compares the number with
    the pivot number and stops when it reaches a number that is greater or equal to
    the pivot number. In our case it stops at 6 because it is greater than 5. Then
    the right marker starts to move to the left, and this time when it reaches a number
    that is less than the pivot number, in our case, it stops at 3 which is less than
    5. When both the left and right markers have stopped, the markers’ numbers are
    swapped; here we swap 3 with 6.


    In this way the left marker acts to find numbers that are greater or equal to
    the pivot, and the right marker finds numbers less than the pivot, and by swapping
    these numbers, we can gather numbers that are less than the pivot on the left
    side of the sequence and numbers that are greater than or equal to the pivot on
    the right side.


    Like before, the left marker moves until it reaches a number that is greater than
    or equal to the pivot number, which is 6 in our case. And once again the right
    marker moves to the left and the movement stops when the right marker runs into
    the left marker. When both the left and right markers stop in the same position,
    that number is swapped with the pivot number. So the numbers that are occupied
    by both the left and right markers are considered fully sorted. This completes
    the first round of operations.


    With one round of operation, we were able to put the numbers smaller than the
    pivot to the left of the pivot number and the numbers larger than the pivot to
    the right of the pivot. The next round of operations will be performed recursively
    on both sequences created by the division as shown in Figure [14-11](#490882_1_En_14_Chapter.xhtml#Fig11).


    ![../images/490882_1_En_14_Chapter/490882_1_En_14_Fig11_HTML.png](images/490882_1_En_14_Chapter/490882_1_En_14_Fig11_HTML.png)


    Figure 14-11 Example of performing a quick sort


    The quick sort is regarded as the best sorting algorithm. This is because of its
    significant advantage in terms of efficiency because it is able to deal well with
    a huge list of items. Moreover, due to the fact that it sorts in a place, no additional
    storage is required as well.


    The slight disadvantage of quick sort is that its worst-case performance is similar
    to the average performances of the bubble, insertion, or selection sort.


    In general, the quick sort produces the most effective and widely used method
    of sorting a list of any item size.


    ## Implementation


    Here again we need another helper function for pivot number.


    ```

    func partition(_ inputArray: inout [inputType], lowIndex: Int, hiIndex: Int) ->
    Int {

    let pivot = inputArray[hiIndex]

    var i = lowIndex

    for j in lowIndex..<hiIndex {

    if inputArray[j] <= pivot {

    inputArray.swapAt(i, j)

    i += 1

    }

    }

    inputArray.swapAt(i, hiIndex)

    return i

    }

    ```


    The purpose of the `partition` function is to select the pivot number and to sort
    sublists. First, we choose the rightmost number as a pivot number and create new
    variable and assign `lowIndex` value to it. Then we iterate through our array
    comparing each element with the pivot number. If the current element is less than
    the pivot value, we swap it with the current position of `i`, which starts from
    `lowIndex`, and increment each when a swap occurs. By doing it repeatedly, we
    push the larger elements to the right and the smaller elements to the left. At
    the end, after the iteration is completed, we swap the `i` and `hi` elements,
    which moves our pivot element back in place and returns `i` value as pivot number.


    Quick sort function: It calls the `partition` function and recursively itself
    to sort subsequences of the array.


    ```

    func quickSort(_ inputArray: inout [inputType], lowIndex: Int, hiIndex: Int) {

    if lowIndex < hiIndex {

    let pivot = partition(&inputArray, lowIndex: lowIndex, hiIndex: hiIndex)

    quickSort(&inputArray, lowIndex: lowIndex, hiIndex: pivot - 1)

    quickSort(&inputArray, lowIndex: pivot + 1, hiIndex: hiIndex)

    }

    }

    ```


    ## Pivot Selection


    Selection of the rightmost number as the pivot number as we did here can have
    a negative impact on the performance. If the array is already sorted, it will
    produce the worst-case scenario `O(n²)`, and selection of random value does not
    guarantee that it will select the best value. So what is the best approach to
    select pivot number?


    The best approach is a median-of-three strategy. Here we take the median of the
    lowest, center, and highest numbers. To implement it, we need another helper function
    which helps us to get the median of the three values.


    ```

    private func getMedian(_ inputArray: inout [inputType], lowIndex: Int, hiIndex:
    Int) -> inputType {

    let center = lowIndex + (hiIndex - lowIndex) / 2

    if inputArray[lowIndex] > inputArray[center] {

    inputArray.swapAt(lowIndex, center)

    }

    if inputArray[lowIndex] > inputArray[hiIndex] {

    inputArray.swapAt(lowIndex, hiIndex)

    }

    if inputArray[center] > inputArray[hiIndex] {

    inputArray.swapAt(lowIndex, hiIndex)

    }

    inputArray.swapAt(center, hiIndex)

    return inputArray[hiIndex]

    }

    ```


    We can use this function inside the `partition` function to pass the median value
    for it.


    ## Conclusion


    In this chapter, you have learned about some sorting algorithms and strategies
    behind them. You mastered about bubble sort, selection sort, insertion sort, merge
    sort, and quick sort and their advantages and disadvantages. By now you should
    have a good understanding of how to implement these algorithms and which one to
    choose based on the requirements. In the next chapter, we are going to learn about
    search algorithms such as linear search and binary search.


