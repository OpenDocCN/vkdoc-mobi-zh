- fmt: '# 1. Arrays


    In this chapter, you will learn about arrays, their built-in properties, and how
    to retrieve, add, and remove elements from them.


    ## Introduction


    An array is simply a container that can hold multiple data (values) of any data
    type in an ordered list; this means that you get the elements in the same order
    as you defined the items in the array. Instead of declaring individual variables,
    such as `number0`, `number1`, and so on … until `number99`, you declare one array
    variable such as `numbers` and use `numbers[0]`, `numbers[1]`, and `numbers[99]`
    to represent individual variables.


    The simplest type of array is the linear array, which is also known as a one-dimensional
    array. In Swift, arrays are a zero-based index. A one-dimensional array can be
    written simply as shown in the following and elements can be accessed using `a[i]`,
    where `i` is an index between `0` and `n`:


    ![$$ a=\left[\begin{array}{c}{a}_0\\ {}{a}_1\\ {}\vdots \\ {}{a}_n\end{array}\right]
    $$](images/490882_1_En_1_Chapter/490882_1_En_1_Chapter_TeX_Equa.png)


    Another form of array is the multidimensional array which is a typical matrix:


    ![$$ a=\left[\begin{array}{ccc}{a}_{00}&amp; {a}_{01}&amp; {a}_{02}\\ {}{a}_{10}&amp;
    {a}_{11}&amp; {a}_{12}\end{array}\right] $$](images/490882_1_En_1_Chapter/490882_1_En_1_Chapter_TeX_Equb.png)


    ## Main Features of Arrays


    Each element can be accessed through its index, as shown in Figure 1-1.


    ![../images/490882_1_En_1_Chapter/490882_1_En_1_Fig1_HTML.png](images/490882_1_En_1_Chapter/490882_1_En_1_Fig1_HTML.png)


    **Figure 1-1** Element index


    Arrays reserve a specific capacity of memory for holding their contents, and when
    the capacity is full, the array allocates a larger region of memory for additional
    elements and copies its elements into the new storage. This is why adding elements
    to an array can be time consuming. The new storage size grows exponentially as
    compared to the old size, so as the array grows, reallocation occurs less and
    less often. The `capacity` property determines the total amount of elements the
    array can contain before exceeding and having to allocate new memory.


    As shown in Figure 1-2, we''re appending "Black" to the array that''s just about
    to exceed its capacity. The item doesn''t get added right away, but what happens
    is new memory is created elsewhere, all items are copied over, and finally the
    item is added to the array. This is called reallocation: allocating new storage
    at another region in memory. The array''s size increases exponentially. In Swift,
    this is called the geometric growth pattern.


    ![../images/490882_1_En_1_Chapter/490882_1_En_1_Fig2_HTML.png](images/490882_1_En_1_Chapter/490882_1_En_1_Fig2_HTML.png)


    **Figure 1-2** Reallocation


    As the elements are added to an array, the array will automatically resize when
    it runs out of capacity. It is more efficient to allocate additional reserve capacity
    at creation time if you know ahead of time an array will contain a large number
    of elements.


    ```

    var intArray = Array()

    //Shows the array capacity

    intArray.capacity

    intArray.reserveCapacity(500)

    intArray.capacity

    ```


    When you make a copy of an array, a separate physical copy is not made during
    the assignment. Swift implements a feature called copy on write, which means that
    the array elements are not copied until a mutating operation is performed.


    You can create arrays with the following syntaxes:


    ```

    //Create an array using full array syntax

    var intArray = Array()

    //Create an array using shorthand syntax

    intArray = [Int]()

    //Use array literal declaration

    var intLiteralArray: [Int] = [1, 2, 3]

    //Use shorthand literal declaration

    intLiteralArray = [1, 2, 3]

    // Create an array with a default value

    intLiteralArray = [Int](repeating: 2, count: 5)

    ```


    ## Retrieving Elements from an Array


    There are multiple ways to retrieve values from an array. We can retrieve using
    index or loop through using the `for`–`in` syntax.


    ```

    var myIntArray = [1,2,3,4,5]

    var aNumber = myIntArray[2]

    print(aNumber)

    //Output


    ```


    We can iterate through the elements in an array.


    ```

    for element in myIntArray {

    print(element)

    }

    //Output


    ```


    ## Adding Elements to an Array


    There are two ways of adding an element to an array. `Append` function can be
    used to add an element at the end of the array and `insert` function can be used
    to insert an element at a specific index in an existing array.


    ```

    myIntArray.append(11)

    print(myIntArray)

    //Output

    [1, 2, 3, 4, 5, 11]

    myIntArray.insert(12, at: 3)

    print(myIntArray)

    //Output

    [1, 2, 3, 12, 4, 5, 11]

    ```


    ## Removing Elements from an Array


    Similarly, there are four ways of removing elements from an array. By using `removeLast()`
    function, an element at the end of an array can be removed, `removeFirst()` to
    remove the first element, `remove(at:)` to remove an element at a specific index,
    and `removeAll()` to remove all elements.


    ```

    myIntArray.removeLast()

    myIntArray.removeFirst()

    myIntArray.remove(at: 1)

    myIntArray.removeAll()

    ```


    ## Built-in Functions and Properties


    In the remaining sections, we''ll discuss some built-in functions and properties
    of arrays.


    ### isEmpty


    This property determines if an array is empty or not. It returns `true` if an
    array does not contain any value, otherwise returns `false`.


    ```

    let myIntArray = [1, 3, 5, 6]

    print(myIntArray.isEmpty)

    ```


    When you run the program, the output will be


    ```

    false

    ```


    ### First and Last


    These properties are used to access the first and last elements of an array.


    ```

    print(myIntArray.first)

    print(myIntArray.last)

    ```


    When you run the program, the output will be


    ```

    Optional(1)

    Optional(6)

    ```


    As you can see, the output of these properties is optional. This means that if
    the array is empty the return will be `nil`.'
