- fmt: '### Reversed and Reverse


    `Reversed` function returns completely new collection with the elements of an
    array in reverse order. `Reverse` function reverses the collection itself.


    ```

    let reversedArray = Array(myIntArray.reversed())

    print(reversedArray)

    ```


    When you run the program, the output will be


    ```

    [6, 5, 3, 1]

    ```


    ### Count


    This property returns the total number of elements in an array.


    ```

    print(myIntArray.count)

    ```


    When you run the program, the output will be


    ```


    ```


    #### Important


    While using subscript syntax to access elements of an array in Swift, you must
    be sure the value lies in the index; otherwise, you will get a runtime crash.
    Let''s see this in the following example:


    ```

    print(myIntArray[-1])

    ```


    When you run the program, the output will be


    ```

    fatal error: Index out of range

    ```


    In the preceding program, there is no value in the index `-1`. So when you try
    to access the value in the index, you will get a runtime crash.


    To prevent this, first find the index of the element you are trying to remove.
    And then remove the element at the index as follows:


    ```

    var myIntArray = [1, 3, 5, 7]

    if let index = myIntArray.firstIndex(of: 5) {

    print("found index")

    let val =  myIntArray.remove(at: index)

    print(val)

    }

    ```


    When you run the program, the output will be


    ```

    found index


    ```


    ## Conclusion


    In this chapter, you have learned about the general structure of an array, how
    to declare it in Swift, and how to select, add, and remove elements. In the following
    chapter, you will learn about the data structure type of dictionaries.


    # 2. Dictionaries


    In this chapter, the dictionary type of data structures will be discussed. You
    will learn how to access, add, remove, and modify elements in a dictionary. Moreover,
    built-in properties and functions of dictionaries will be covered.


    ## Introduction


    A dictionary is another data type collection in Swift. This data structure takes
    its name from real-world dictionaries where you have words and their associated
    meaning; in programming, we use dictionaries to associate a key with its value,
    so any value can be identified as long as we know the key. If we look inside a
    real dictionary, we will find words and each word has accompanying explanation
    and meaning.


    `Miller : a person who owns or works in a corn mill`


    There is a similar concept in Swift, in which we can express the preceding dictionary
    entry like this where a key is a word from a real dictionary and the value is
    an accompanying explanation.


    ![../images/490882_1_En_2_Chapter/490882_1_En_2_Figa_HTML.jpg](images/490882_1_En_2_Chapter/490882_1_En_2_Figa_HTML.jpg)


    It is an unordered collection that holds multiple data as key/value pair. Each
    value is associated with a unique key that acts as an identifier for the value
    in the dictionary. A key is used to store and retrieve values from the dictionary.


    ```

    var myDict = ["Miller" : "a person who owns or works in a corn mill", "Programmer"
    : "a person who writes computer programs"]

    ```


    We can add more than one key to the dictionary as long as it conforms to the declaration
    of the dictionary. We can create dictionaries by explicitly stating how the data
    is structured in a dictionary. In this case we have the key `String` data type
    and the value is also a `String` data type. If we state the dictionary structure,
    the declaration will be like this:


    ```

    var myDict : [String : String] = ["Miller" : "a person who owns or works in a
    corn mill", "Programmer" : "a person who writes computer programs"]

    ```


    Suppose you may want to search the capital city of a country. In that case, you
    will create a dictionary with the key country and value capital city. Now, you
    get the capital city from the collection by searching with the key country. If
    we want to create a dictionary with different types of values, we need to declare
    a heterogeneous dictionary which conforms to the `Hashable` protocol. This type
    of dictionaries is useful when converting JSON payloads.


    ```

    var myDictionary = [AnyHashable: Any]()

    ```


    There are three ways of dictionary declaration:


    ```

    // 1St

    var myDictionary = Dictionary()

    // 2nd

    var myDictionary = [Int: String]()

    // 3rd

    var myDictionary:[Int: String] = [:]

    ```


    It is possible to create a dictionary from two arrays:


    ```

    let countryKeys = ["US", "UK", "AZ"]

    let countryValues = ["United States", "United Kingdom", "Azerbaijan"]

    let newDictionary = Dictionary(uniqueKeysWithValues: zip(countryKeys,countryValues))

    print(newDictionary)

    ```


    When you run the program, the output will be


    ```

    ["AZ": "Azerbaijan", "US": "United States", "UK": "United Kingdom"]

    ```


    ## Accessing Values in a Dictionary


    To access any value in a dictionary, you need to include the key of the value
    you want to access within square brackets immediately after the name of the dictionary.
