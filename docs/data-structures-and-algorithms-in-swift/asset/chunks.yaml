  raw: '## Why a Trie?


    A Trie is very useful for storing the English language, and it has the following
    advantages which might be a perfect substitute for a hash table data structure:


    *   Better worst-case time complexity.


    *   No key collisions.


    *   No hashing algorithm.


    *   It is alphabetically ordered.


    Additionally, if we use an array for dealing more than a thousand words, the complexity
    of searching for a particular word is O(k∗n), where k is the longest string and
    n is the number of words that needs to be checked. The trie structure solves this
    problem; as each node can represent a single character, it creates a word by tracing
    the collection of characters from a root to a node.


    ## How It Works


    As previously mentioned, a trie organizes the data in a hierarchy and the last
    node in each string is marked as a finalNode. Let’s build a sample dictionary
    to see how a trie works. Suppose we have four words: apple, apex, code, and comb.
    So our corresponding trie structure looks like Figure [9-1](#490882_1_En_9_Chapter.xhtml#Fig1).


    ![../images/490882_1_En_9_Chapter/490882_1_En_9_Fig1_HTML.png](images/490882_1_En_9_Chapter/490882_1_En_9_Fig1_HTML.png)


    Figure 9-1


    Sample Trie structure


    As you can see, multiple words can share the same letters, and the way that the
    trie structure organizes them improves the performance of this structure. To illustrate
    the performance advantages of the trie, consider the following example where we
    need to find the words with prefix CO. It is obvious that first we need to go
    to the node containing C and this excludes other branches of the trie from the
    search operation which makes our search faster. Then, we will find the words that
    have the next letter O and shift to this node and again exclude the others. Since
    this is the end of our prefix, the trie will return all branches of the O node.
    In our case, it will be code and comb. Suppose we have thousands of words in our
    trie, so the number of branches that we exclude is substantial and this makes
    less comparison and leads to faster search.


    ## Implementation


    The first thing we need to do is to create a TrieNode, as we did for the previous
    data structure. So open Xcode and create a new playground file called Trie.swift
    and insert the following code:


    ```

    public class TrieNode {

    var value: K?

    weak var parent: TrieNode?

    var children: [K: TrieNode] = [:]

    var isFinal = false

    init(value: K? = nil, parent: TrieNode? = nil) {

    self.value = value

    self.parent = parent

    }

    }

    ```


    First we create a value variable which is of type K that holds the data for the
    node. Due to the fact that the root of the trie does not have a key, we declare
    this variable as optional. Then, the parent node is declared with a weak reference
    to TrieNode; this is because of the remove method that we will create later. In
    the third line, we create children as a dictionary, because a node in a trie holds
    multiple branches. `isFinal` is an indicator for the end of a String.


    The next thing that we will do is to create a Trie itself. So let’s create a new
    class as shown in the following code:


    ```

    public class Trie {

    private let rootNode: TrieNode

    init() {

    rootNode = TrieNode()

    }

    }

    ```


    Here we declare a rootNode for our **Trie** using the **Character** type, because
    we are implementing a **Trie** for the English language, and inside init method,
    an empty **TrieNode** is initialized.


    ### Insert


    A Trie is efficient for inserting values because it always reuses the existing
    nodes. For example, code and comb are using the same nodes of C and O. To insert
    a new node into our Trie, create the following insert method inside the Trie class:


    ```

    func insert(word: String) {

    guard !word.isEmpty else { return }

    var curNode = rootNode

    let characters = Array(word.lowercased())

    var curIndex = 0

    while curIndex < characters.count {

    let character = characters[curIndex]

    if let child = curNode.children[character] {

    curNode = child

    } else {

    curNode.children[character] = TrieNode(value: character, parent: curNode)

    curNode = curNode.children[character]!

    }

    curIndex += 1

    if curIndex == characters.count {

    curNode.isFinal = true

    }

    }

    }

    ```


    Here, first we check if the string is empty, and if it is, there is nothing to
    insert. Then we create a reference to rootNode which will be used to create new
    nodes. Since each node contains one letter, we create an array of characters from
    the string that is passed as a parameter. We use `curIndex` variable to keep track
    of the iteration through a `characters` array. As it reaches the count of the
    `characters` array, the iteration stops. Inside the if condition, we check if
    the character that we are trying to insert exists within the children; if so,
    we move the `curNode` reference to the next node and there is no need for insertion.
    Otherwise, we add a `character` into the current `children` dictionary and the
    mode of the `curNode` reference to the new node.


    It is obvious that we need to indicate the end of the word as well and `isFinal`
    property of the node is responsible for this.


    ### Query


    This function is responsible to check if a given word exists in the Trie, and
    if so, it returns `true`; otherwise the return value will be `false`. It is very
    similar to the **Insert** method, but here instead of creating a node, we only
    check its existence and `isFinal` value must be set to true in order to return
    `true`. Let’s write the following code inside the **Trie** class and see how it
    works:


    ```

    func query(word: String) -> Bool {

    let characters = Array(word.lowercased())

    var node : TrieNode? = rootNode

    for character in characters {

    node = node?.children[character]

    if node == nil {

    return false

    }

    }

    return node!.isFinal

    }

    ```


    Here again, we create a characters array from the given word and iterate through
    it; if the `node` is `nil`, it means the searched `character` does not exist,
    so we return `false`; otherwise we will reach the end of the **String** and return
    `isFinal` value which is `true`.'
  trans: "\n# 为什么需要 Trie？\n\n`Trie`（字典树）在存储英语词汇时非常实用，它具有以下可能完美替代哈希表数据结构的优势：\n\n- 更好的最坏情况时间复杂度\n\
    - 无键冲突\n- 无需哈希算法\n- 按字母顺序排列\n\n此外，如果使用数组处理超过一千个单词，搜索特定单词的复杂度为 `O(k∗n)`，其中 `k`\
    \ 代表最长字符串，`n` 代表需要检查的单词数量。字典树结构解决了这个问题：由于每个节点可以表示单个字符，它通过从根节点到目标节点追踪字符集合的方式来构建单词。\n\
    \n# 工作原理\n\n如前所述，字典树按层级组织数据，每个字符串的最后一个节点被标记为 `finalNode`。让我们通过构建一个示例字典来了解字典树的工作方式。假设我们有四个单词：`apple`、`apex`、`code`\
    \ 和 `comb`，那么对应的字典树结构如图 9-1 所示。\n\n![../images/490882_1_En_9_Chapter/490882_1_En_9_Fig1_HTML.png](img/490882_1_En_9_Fig1_HTML.png)\n\
    \n图 9-1：字典树结构示例\n\n可以看到，多个单词可以共享相同的字母，字典树结构的组织方式提升了其性能。为了说明字典树的性能优势，请考虑以下示例：我们需要查找前缀为\
    \ `CO` 的单词。显然，首先需要进入包含 `C` 的节点，这排除了字典树的其他分支，使搜索速度更快。接着，找到下一个字母为 `O` 的单词并转移到该节点，再次排除其他分支。由于这是前缀的末尾，字典树将返回\
    \ `O` 节点的所有分支。在本例中，结果将是 `code` 和 `comb`。假设字典树中有数千个单词，那么被排除的分支数量非常可观，这减少了比较次数，从而实现了更快的搜索。\n\
    \n# 实现\n\n首先需要创建一个 `TrieNode`，就像之前为其他数据结构所做的那样。打开 Xcode 并创建一个名为 `Trie.swift` 的新\
    \ playground 文件，然后插入以下代码：\n\n```\npublic class TrieNode {\n    var value: K?\n\
    \    weak var parent: TrieNode?\n    var children: [K: TrieNode] = [:]\n    var\
    \ isFinal = false\n    init(value: K? = nil, parent: TrieNode? = nil) {\n    \
    \    self.value = value\n        self.parent = parent\n    }\n}\n```\n\n首先创建一个\
    \ `value` 变量，其类型为 `K`，用于保存节点的数据。由于字典树的根节点没有键，我们将此变量声明为可选类型。然后，`parent` 节点使用 `weak`\
    \ 引用声明为 `TrieNode` 类型；这是为了后续实现 `remove` 方法。第三行中，我们将 `children` 创建为字典类型，因为字典树中的节点可包含多个分支。`isFinal`\
    \ 用于标识字符串的结尾。\n\n接下来要创建 `Trie` 本身。按照以下代码所示创建一个新类：\n\n```\npublic class Trie {\n\
    \    private let rootNode: TrieNode\n    init() {\n        rootNode = TrieNode()\n\
    \    }\n}\n```\n\n这里我们使用 `Character` 类型为 `Trie` 声明了一个 `rootNode`，因为我们要为英语实现字典树。在\
    \ `init` 方法内部，初始化了一个空的 `TrieNode`。\n\n## 插入\n\n字典树在插入值方面非常高效，因为它总是重用现有节点。例如，`code`\
    \ 和 `comb` 共享相同的 `C` 和 `O` 节点。要为 `Trie` 插入新节点，请在 `Trie` 类中创建以下 `insert` 方法：\n\n\
    ```\nfunc insert(word: String) {\n    guard !word.isEmpty else { return }\n  \
    \  var curNode = rootNode\n    let characters = Array(word.lowercased())\n   \
    \ var curIndex = 0\n    while curIndex < characters.count {\n        let character\
    \ = characters[curIndex]\n        if let child = curNode.children[character] {\n\
    \            curNode = child\n        } else {\n            curNode.children[character]\
    \ = TrieNode(value: character, parent: curNode)\n            curNode = curNode.children[character]!\n\
    \        }\n        curIndex += 1\n        if curIndex == characters.count {\n\
    \            curNode.isFinal = true\n        }\n    }\n}\n```\n\n这里，首先检查字符串是否为空，如果为空则无需插入。然后创建一个指向\
    \ `rootNode` 的引用，用于创建新节点。由于每个节点包含一个字母，我们将传入的字符串转换为字符数组。使用 `curIndex` 变量跟踪对 `characters`\
    \ 数组的迭代过程。当它达到 `characters` 数组的长度时，迭代停止。在 `if` 条件中，我们检查要插入的字符是否已存在于 `children`\
    \ 中；如果是，则将 `curNode` 引用移动到下一个节点，无需进行插入。否则，将 `character` 添加到当前 `children` 字典中，并将\
    \ `curNode` 引用移动到新节点。\n\n显然还需要标记单词的结尾，节点的 `isFinal` 属性负责实现这一功能。\n\n## 查询\n\n此函数负责检查给定单词是否存在于\
    \ `Trie` 中，如果存在则返回 `true`，否则返回 `false`。它与**Insert**方法非常相似，但这里不再创建节点，而是仅检查节点的存在性，并且\
    \ `isFinal` 值必须为 `true` 才能返回 `true`。让我们将以下代码写入 `Trie` 类中，并观察其工作原理：\n\n```\nfunc\
    \ query(word: String) -> Bool {\n    let characters = Array(word.lowercased())\n\
    \    var node : TrieNode? = rootNode\n    for character in characters {\n    \
    \    node = node?.children[character]\n        if node == nil {\n            return\
    \ false\n        }\n    }\n    return node!.isFinal\n}\n```\n\n这里同样从给定单词创建 `characters`\
    \ 数组并进行遍历；如果 `node` 为 `nil`，则说明搜索的 `character` 不存在，返回 `false`；否则将到达字符串末尾，返回 `isFinal`\
    \ 的值（即 `true`）。\n"
- fmt: "### Remove\n\nThis method is similar to the query method, but we change the\
    \ `isFinal` value to false which removes the termination for the word, and as\
    \ there is no termination, this word cannot be accounted as a word in the Trie.\
    \ Let's write this code inside the `Trie` class:\n\n```\nfunc remove(word: String)\
    \ {\nlet characters = Array(word.lowercased())\nvar node : TrieNode? = rootNode\n\
    for character in characters {\nnode = node?.children[character]\nif node == nil\
    \ {\nreturn\n}\n}\nnode!.isFinal = false\n}\n```\n\nIn Figure 9-2 you will notice\
    \ that even though we delete the code string from the Trie, it still appears,\
    \ but only missing termination.\n\n![../images/490882_1_En_9_Chapter/490882_1_En_9_Fig2_HTML.png](images/490882_1_En_9_Chapter/490882_1_En_9_Fig2_HTML.png)\n\
    \nFigure 9-2: A Trie after removing of an element\n\nLet’s check our three methods\
    \ in a sample. First we create a Trie using our `Trie` class, and by using the\
    \ previously declared method, we insert, query, and remove values from it.\n\n\
    The first step is to declare a Trie data structure, and by using the `insert`\
    \ method, we insert nodes.\n\n```\nvar myTrie = Trie()\nmyTrie.insert(word: \"\
    code\")\n```\n\nHere, the insertion checks whether the letters of the \"code\"\
    \ exist in the node; if not, it creates new nodes for each of them (Figure 9-3).\n\
    \n![../images/490882_1_En_9_Chapter/490882_1_En_9_Fig3_HTML.png](images/490882_1_En_9_Chapter/490882_1_En_9_Fig3_HTML.png)\n\
    \nFigure 9-3: Step 1\n\nThen we insert the comb word into our Trie; here again\
    \ each letter will be checked and the missing ones will be inserted (Figure 9-4).\n\
    \n```\nmyTrie.insert(word: \"comb\")\n```\n\n![../images/490882_1_En_9_Chapter/490882_1_En_9_Fig4_HTML.png](images/490882_1_En_9_Chapter/490882_1_En_9_Fig4_HTML.png)\n\
    \nFigure 9-4: Adding comb\n\nThen by using the `query` method, we can check whether\
    \ the inserted words exist in the data structure or not.\n\n```\nprint(myTrie.query(word:\
    \ \"code\"))\nmyTrie.remove(word: \"code\")\nprint(myTrie.query(word: \"code\"\
    ))\n```\n\nThe output will be:\n\n```\ntrue\nfalse\n```\n\nThis means that when\
    \ we query the code first, it exists in the Trie, but the second time, it is missing\
    \ because we used the `remove` method to remove it.\n\n## Conclusion\n\nIn this\
    \ chapter, you have learned about the Trie data structure, which provides great\
    \ performance in regard to prefix matching. You also mastered how to insert, remove,\
    \ and query inside the Trie structure.\n\n# 10. Binary Tree\n\nIn the previous\
    \ chapter, you have learned about the basic tree structure where each node can\
    \ have unlimited children. Binary trees are tree data structures in which each\
    \ node has at most two children, often referred to as the left and right children.\
    \ In this chapter, you will learn the main properties of binary data structure\
    \ and how to implement it.\n\n## Binary Tree Primer\n\nThe basic structure of\
    \ a binary tree is shown in Figure 10-1.\n\n![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig1_HTML.png](images/490882_1_En_10_Chapter/490882_1_En_10_Fig1_HTML.png)\n\
    \nFigure 10-1: Basic binary tree\n\nBefore continuing to the properties and the\
    \ types of binary tree, let’s identify some terms related to it.\n\n- **Node depth**\
    \ – The number of edges from the node to the root node. A root depth is 0.\n-\
    \ **Node height** – The number of edges on the longest path from the node to a\
    \ leaf. Leaf height is 0.\n- **Tree height** – From the root node to the farthest\
    \ leaf.\n\n### Properties of Binary Tree\n\n1.  The maximum number of nodes at\
    \ level \"i\" of the binary tree is 2^(i-1).\n\n    The level in the root is 1\
    \ → 2^(1-1) = 1. Due to the fact that every node has at most two children, the\
    \ next level has twice the nodes, 2 * 2^(i-1).\n\n2.  If the height of the binary\
    \ tree is \"h\", the maximum number of nodes is 2^h - 1. The height of a tree\
    \ is the maximum number of nodes on the root to the leaf path.\n\n3.  The number\
    \ of leaf nodes is always one more than the nodes with two children in a binary\
    \ tree where every node has zero or two children.\n\n### Types of Binary Trees\n\
    \nBinary trees are a simple concept; they are easy to understand, easy to implement,\
    \ and work well and fast. There are several different types of binary trees:\n\
    \n1.  **Full binary tree** (Figure 10-2) – Each node has zero or two children,\
    \ but not one.\n\n![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig2_HTML.png](images/490882_1_En_10_Chapter/490882_1_En_10_Fig2_HTML.png)\n\
    \nFigure 10-2: Full binary tree\n\n2.  **Perfect binary tree** (Figure 10-3) –\
    \ All nodes have two children and the same depth.\n\n![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig3_HTML.png](images/490882_1_En_10_Chapter/490882_1_En_10_Fig3_HTML.png)\n\
    \nFigure 10-3: Perfect binary tree\n\n3.  **Complete binary tree** (Figure 10-4)\
    \ – All levels are completely filled except the last level, but in which the existing\
    \ nodes are in the left side of the tree.\n\n![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig4_HTML.png](images/490882_1_En_10_Chapter/490882_1_En_10_Fig4_HTML.png)\n\
    \nFigure 10-4: Complete binary tree\n\n4.  **Balanced binary tree** (Figure 10-5)\
    \ – Each leaf is \"not more than a certain distance\" from the root node than\
    \ any other leaf.\n\n![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig5_HTML.png](images/490882_1_En_10_Chapter/490882_1_En_10_Fig5_HTML.png)\n\
    \nFigure 10-5: Balanced binary tree\n\n## Implementation\n\nTo implement the binary\
    \ tree data structure, we need a node that must have at least the following elements:\n\
    \n- Key/value for data container\n- References to the left and right children\
    \ nodes\n- Reference to a parent node\n\nSo let’s define a class called `BTNode`\
    \ and add the following code in it:\n\n```\nclass BTNode {\nvar value: T\nvar\
    \ leftChild: BTNode?\nvar rightChild: BTNode?\ninit(_ value: T,_ leftChild: BTNode?,_\
    \ rightChild: BTNode?) {\nself.value = value\nself.rightChild = rightChild\nself.leftChild\
    \ = leftChild\n}\n}\n```\n\nHere we have made our class generic in order to allow\
    \ any kind of value type inside the value property. Our binary tree node has a\
    \ property called `value` to store key data. Additionally, it has two variables\
    \ to store the left and right children, and these are the minimum required properties\
    \ that we need to define the binary tree node.\n\n## Tree Traversal (Also Known\
    \ As Tree Search)\n\nTree traversals refer to the process of checking or updating\
    \ each node in a tree data structure once. They are classified by the visiting\
    \ order of nodes. Unlike linear data structures which can only be traversed in\
    \ a linear order, the tree data structures can be traversed in various ways. There\
    \ are three common ways to traverse them:\n\n- In-order\n- Pre-order\n- Post-order"
