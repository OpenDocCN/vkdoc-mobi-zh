    type1.add(child: Node(data: \"Cola\"))\ntype1.add(child: Node(data: \"Fanta\"\
    ))\ndrinks.printTree()\n```\n\n输出结果将是：\n\n```\nDrink\nCold\nCola\nFanta\nHot\n\
    Latte\n```\n\n层次结构是树结构的天然候选，因此我们在这里定义了六个不同的节点，并将它们组织成一个逻辑层次。这种排列对应于图 8-2 所示的结构。\n\
    \n![../images/490882_1_En_8_Chapter/490882_1_En_8_Fig2_HTML.png](img/490882_1_En_8_Fig2_HTML.png)\n\
    \n图 8-2 — 示例树\n\n### 搜索数据\n\n在 `Node` 类中添加以下方法，用于我们声明的树数据结构的搜索算法。此方法在树中搜索一个值，如果数据存在于树中，则返回与该值关联的节点；否则返回\
    \ `nil`。如果数据在当前节点中找到，我们返回 `self`，即当前节点。代码的下一行遍历 children 数组，每次调用每个子节点的搜索方法，该方法将递归地遍历所有子节点，如果任何节点匹配，它将返回该节点。最后，如果没有数据匹配，我们返回\
    \ `nil`。\n\n```swift\nfunc search(element: T) -> Node? {\n    if element == self.data\
    \ {\n        return self\n    }\n    for child in children {\n        if let result\
    \ = child.search(element: element) {\n            return result\n        }\n \
    \   }\n    return nil\n}\n```\n\n让我们在类定义外部的 playground 中尝试一下。\n\n```swift\nlet\
    \ latte = drinks.search(element: \"Latte\")\nif let result = latte {\n    result.printTree()\n\
    }\n```\n\n输出结果将是：\n\n```\nLatte\n```\n\n如前所述，当你在树中进行搜索时，会遍历子节点。这种遍历与普通的遍历不同，稍微有些复杂。\n\
    \n树数据结构有不同的类型，其中一些将在接下来的章节中讨论。\n\n- 字典树\n- 二叉树\n- 红黑树\n- R 树\n\n## 结论\n\n在本章中，你学习了树的一般结构、如何在\
    \ Swift 中实现它，以及如何为它声明、搜索和添加方法。在接下来的章节中，你将了解更多不同类型的树数据结构。\n\n# 9. 字典树数据结构\n\n在本章中，我们将回顾字典树（发音为\
    \ \"try\"）数据结构以及如何使用 Swift 实现它。字典树是一种基于树的数据结构，它以层次结构组织信息。虽然大多数其他结构被设计用于处理通用数据，但字典树通常用于字符串\
    \ —— 它用于以支持快速查找的方式存储单词。由于字典树在每个节点存储字符，因此它对于英语中的前缀匹配非常高效。\n"
- fmt: "# Why a Trie?\n\nA `Trie` is very useful for storing the English language,\
    \ and it has the following advantages which might be a perfect substitute for\
    \ a hash table data structure:\n\n- Better worst-case time complexity.\n- No key\
    \ collisions.\n- No hashing algorithm.\n- It is alphabetically ordered.\n\nAdditionally,\
    \ if we use an array for dealing more than a thousand words, the complexity of\
    \ searching for a particular word is `O(k∗n)`, where `k` is the longest string\
    \ and `n` is the number of words that needs to be checked. The trie structure\
    \ solves this problem; as each node can represent a single character, it creates\
    \ a word by tracing the collection of characters from a root to a node.\n\n# How\
    \ It Works\n\nAs previously mentioned, a trie organizes the data in a hierarchy\
    \ and the last node in each string is marked as a `finalNode`. Let’s build a sample\
    \ dictionary to see how a trie works. Suppose we have four words: `apple`, `apex`,\
    \ `code`, and `comb`. So our corresponding trie structure looks like Figure [9-1](#490882_1_En_9_Chapter.xhtml#Fig1).\n\
    \n![../images/490882_1_En_9_Chapter/490882_1_En_9_Fig1_HTML.png](images/490882_1_En_9_Chapter/490882_1_En_9_Fig1_HTML.png)\n\
    \nFigure 9-1: Sample Trie structure\n\nAs you can see, multiple words can share\
    \ the same letters, and the way that the trie structure organizes them improves\
    \ the performance of this structure. To illustrate the performance advantages\
    \ of the trie, consider the following example where we need to find the words\
    \ with prefix `CO`. It is obvious that first we need to go to the node containing\
    \ `C` and this excludes other branches of the trie from the search operation which\
    \ makes our search faster. Then, we will find the words that have the next letter\
    \ `O` and shift to this node and again exclude the others. Since this is the end\
    \ of our prefix, the trie will return all branches of the `O` node. In our case,\
    \ it will be `code` and `comb`. Suppose we have thousands of words in our trie,\
    \ so the number of branches that we exclude is substantial and this makes less\
    \ comparison and leads to faster search.\n\n# Implementation\n\nThe first thing\
    \ we need to do is to create a `TrieNode`, as we did for the previous data structure.\
    \ So open Xcode and create a new playground file called `Trie.swift` and insert\
    \ the following code:\n\n```\npublic class TrieNode {\n    var value: K?\n   \
    \ weak var parent: TrieNode?\n    var children: [K: TrieNode] = [:]\n    var isFinal\
    \ = false\n    init(value: K? = nil, parent: TrieNode? = nil) {\n        self.value\
    \ = value\n        self.parent = parent\n    }\n}\n```\n\nFirst we create a `value`\
    \ variable which is of type `K` that holds the data for the node. Due to the fact\
    \ that the root of the trie does not have a key, we declare this variable as optional.\
    \ Then, the `parent` node is declared with a `weak` reference to `TrieNode`; this\
    \ is because of the `remove` method that we will create later. In the third line,\
    \ we create `children` as a dictionary, because a node in a trie holds multiple\
    \ branches. `isFinal` is an indicator for the end of a `String`.\n\nThe next thing\
    \ that we will do is to create a `Trie` itself. So let’s create a new class as\
    \ shown in the following code:\n\n```\npublic class Trie {\n    private let rootNode:\
    \ TrieNode\n    init() {\n        rootNode = TrieNode()\n    }\n}\n```\n\nHere\
    \ we declare a `rootNode` for our `Trie` using the `Character` type, because we\
    \ are implementing a `Trie` for the English language, and inside `init` method,\
    \ an empty `TrieNode` is initialized.\n\n## Insert\n\nA `Trie` is efficient for\
    \ inserting values because it always reuses the existing nodes. For example, `code`\
    \ and `comb` are using the same nodes of `C` and `O`. To insert a new node into\
    \ our `Trie`, create the following `insert` method inside the `Trie` class:\n\n\
    ```\nfunc insert(word: String) {\n    guard !word.isEmpty else { return }\n  \
    \  var curNode = rootNode\n    let characters = Array(word.lowercased())\n   \
