    let t = BTNode(0,nil,nil)\nt.postorderTraversal(root)\n```\n\n输出结果将是：\n\n```\n\
    3  12  9  17  28  23  15\n```\n\n## 总结\n\n在本章中，您学习了二叉树数据结构及其不同类型。您还掌握了可以在二叉树上执行的不同类型的遍历算法。在下一章中，您将学习一种特殊的二叉树——二叉搜索树。\n\
    \n# 11. 二叉搜索树\n\n二叉搜索树（BST）是一种每个节点最多有两个子节点的二叉树，它便于快速执行搜索、插入和删除操作。每个操作的时间复杂度为 `O(log\
    \ n)`，远快于线性搜索。二叉搜索树的两个主要特征如下：\n\n- 左子节点的值必须小于其父节点的值。\n- 右子节点的值必须大于或等于其父节点的值。\n\
    \n图[11-1]展示了二叉搜索树的基本结构。\n\n![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig1_HTML.png](img/490882_1_En_11_Fig1_HTML.png)\n\
    \n**图 11-1** – 二叉搜索树的基本结构\n\n二叉搜索树的结构使其在搜索操作中更高效，因为在搜索过程的每一步，算法都基于两个假设：\n\n1.\
    \ 如果搜索值小于当前节点，则继续搜索左子树。\n2. 如果搜索值大于当前节点，则继续搜索右子树。\n\n这两个假设消除了不必要的搜索，并在每一步将搜索路径减少一半，这使其非常高效。\n\
    \n## 实现\n\n首先，我们需要创建 **Node** 和 **Binary Tree Search** 类，这里我们将使用上一章为二叉树创建的 `BTNode`\
    \ 类。\n\n```\nclass BTNode {\n    var value: T\n    var leftChild: BTNode?\n  \
    \  var rightChild: BTNode?\n    init(value: T, leftChild: BTNode? = nil, rightChild:\
    \ BTNode? = nil) {\n        self.value = value\n        self.leftChild = leftChild\n\
    \        self.rightChild = rightChild\n    }\n}\n```\n\n基于声明的树节点，我们将创建一个二叉搜索树类。\n\
    \n```\nclass BinarySearchTree {\n    private var rootNode: BTNode?\n}\n```\n\n\
    该类遵循 **Comparable** 协议以确保类型将使用比较运算符，并使用 **CustomStringConvertible** 协议来描述不同的数据类型。让我们继续为此类添加插入函数。\n"
- fmt: "# Insert\n\nInsertion to a BST follows the previously mentioned two assumptions;\
    \ we only need to find the location for the insertion and it is an `O(log n)`\
    \ operation. To illustrate the power of Binary Search Trees, let’s compare the\
    \ insertion performance of arrays against them. Assume we want to insert `0` to\
    \ an array. To insert a new element to the array, first we secure an additional\
    \ space at the end of the array, then the data is shifted one element at a time,\
    \ and then the element can be inserted (Figure [11-2](#490882_1_En_11_Chapter.xhtml#Fig2)).\n\
    \n![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig2_HTML.png](images/490882_1_En_11_Chapter/490882_1_En_11_Fig2_HTML.png)\n\
    \nFigure 11-2\n\nArray Insertion\n\nIn this example, an element of zero is inserted\
    \ in the front of the array, and all elements are shifted by one position which\
    \ means that the time complexity of insertion to the array is `O(n)`.\n\nContrary\
    \ to the arrays, the insertion to Binary Search Trees is faster. Based on the\
    \ mentioned assumptions, we only need three steps to find a location for an element\
    \ of zero as shown in Figure [11-3](#490882_1_En_11_Chapter.xhtml#Fig3), and the\
    \ time complexity for this process is `O(log n)`.\n\n![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig3_HTML.png](images/490882_1_En_11_Chapter/490882_1_En_11_Fig3_HTML.png)\n\
    \nFigure 11-3\n\nBST insertion sample\n\n```\nfunc insert(insertedValue : T) {\n\
    \    let inNode = BTNode(value: insertedValue)\n    if let rootNode = self.rootNode\
    \ {\n        self.insertNode(rootNode: rootNode, inNode: inNode)\n    } else {\n\
    \        self.rootNode = inNode\n    }\n}\nprivate func insertNode(rootNode: BTNode,\
    \ inNode: BTNode) {\n    if rootNode.value > inNode.value {\n        if let leftChild\
    \ = rootNode.leftChild {\n            self.insertNode(rootNode: leftChild, inNode:\
    \ inNode)\n        } else {\n            rootNode.leftChild = inNode\n       \
    \ }\n    } else {\n        if let rightChild = rootNode.rightChild {\n       \
    \     self.insertNode(rootNode: rightChild, inNode: inNode)\n        } else {\n\
    \            rootNode.rightChild = inNode\n        }\n    }\n}\n```\n\nTo make\
    \ our code more readable, I have created two separate functions and called `insertNode`\
    \ function inside the `insert` function; that is why the `insertNode` method is\
    \ private. Inside the `insertNode` function, first we compare the `rootNode` value\
    \ with the value of the node that will be inserted. If the `rootNode` value is\
    \ greater, we add a new node to the `leftChild` node; otherwise we add it to the\
    \ `rightChild` node. Inside the `insert` function, first we check if the `rootNode`\
    \ exists, and if it does, we call the `insertNode` method; otherwise we add a\
    \ new node as `rootNode`.\n\n# Search\n\nThe process of searching is similar to\
    \ the insertion, which conforms with the two mentioned assumptions. The only difference\
    \ is that when the node data gets matched with input data, it will return successfully;\
    \ otherwise invalid message will be returned. To make it clear, let’s compare\
    \ the search in an array within the BST. To find the element `28` in an array,\
    \ we need to compare the elements within the array one by one until we find it,\
    \ which is `O(n)` time complexity (Figure [11-4](#490882_1_En_11_Chapter.xhtml#Fig4)).\n\
    \n![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig4_HTML.png](images/490882_1_En_11_Chapter/490882_1_En_11_Fig4_HTML.png)\n\
    \nFigure 11-4\n\nArray search\n\nOn the other hand, this is not the case in the\
    \ BST. The two main assumptions of the BST allow us to make the search process\
    \ faster as shown in Figure [11-5](#490882_1_En_11_Chapter.xhtml#Fig5).\n\n![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig5_HTML.png](images/490882_1_En_11_Chapter/490882_1_En_11_Fig5_HTML.png)\n\
    \nFigure 11-5\n\nBST search sample\n\nFor each step in the BST, the search algorithm\
    \ makes two assumptions – if the value is less than the current node, it continues\
    \ to the left subtree; otherwise, it continues to the right subtree. This helps\
    \ to avoid unnecessary checks and makes the time complexity `O(log n)`.\n\n```\n\
    func searchValue(sValue: T) {\n    self.searchNode(rootNode: self.rootNode, searchValue:\
    \ sValue)\n}\nprivate func searchNode(rootNode: BTNode?, searchValue: T) {\n \
    \   guard let rootNode = rootNode else {\n        print(\"The node of \\(searchValue)\
    \ does not exist\")\n        return\n    }\n    print(\"Root Node \\(rootNode.value)\"\
    )\n    if searchValue > rootNode.value {\n        self.searchNode(rootNode: rootNode.rightChild,\
    \ searchValue: searchValue)\n    } else if searchValue < rootNode.value {\n  \
    \      self.searchNode(rootNode: rootNode.leftChild, searchValue: searchValue)\n\
    \    } else {\n        print(\"Node found: \\(rootNode.value)\")\n    }\n}\n```\n\
    \n## Example\n\nLet’s use `insert` and `search` functions in real example and\
    \ see how they work. We will call `insert` function inside the iteration to insert\
    \ values from `0` to `5`, and then using the `search` function, we will search\
    \ for number `4`.\n\n```\nvar binaryST = BinarySearchTree()\nfor i in 0..<5 {\n\
    \    binaryST.insert(insertedValue: i)\n}\nbinaryST.searchValue(sValue: 4)\n```\n\
    \nThe output will be:\n\n```\nRoot Node 0\nRoot Node 1\nRoot Node 2\nRoot Node\
    \ 3\nRoot Node 4\nNode found: 4\n```\n\n# Delete\n\nThere are some cases that\
    \ need to be taken into account when deleting an element from a Binary Search\
    \ Tree.\n\n## Deleting a Leaf\n\nTo delete a leaf from a Binary Search Tree, no\
    \ extra action is needed; we just remove the leaf node from the tree (Figure [11-6](#490882_1_En_11_Chapter.xhtml#Fig6)).\n\
    \n![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig6_HTML.png](images/490882_1_En_11_Chapter/490882_1_En_11_Fig6_HTML.png)\n\
    \nFigure 11-6\n\nBST deleting a leaf\n\n## Deleting a Node with One Child\n\n\
    To delete a node with one child, first a node is deleted and then the child node\
    \ needs to be reconnected to the rest of the tree (Figure [11-7](#490882_1_En_11_Chapter.xhtml#Fig7)).\n\
    \n![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig7_HTML.png](images/490882_1_En_11_Chapter/490882_1_En_11_Fig7_HTML.png)\n\
    \nFigure 11-7\n\nBST deleting a node with a child"
  raw: '## Insert


    Insertion to a BST follows the previously mentioned two assumptions; we only need
    to find the location for the insertion and it is an O(log n) operation. To illustrate
    the power of Binary Search Trees, let’s compare the insertion performance of arrays
    against them. Assume we want to insert 0 to an array. To insert a new element
    to the array, first we secure an additional space at the end of the array, then
    the data is shifted one element at a time, and then the element can be inserted
    (Figure [11-2](#490882_1_En_11_Chapter.xhtml#Fig2)).


    ![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig2_HTML.png](images/490882_1_En_11_Chapter/490882_1_En_11_Fig2_HTML.png)


    Figure 11-2


    Array Insertion


    In this example, an element of zero is inserted in the front of the array, and
    all elements are shifted by one position which means that the time complexity
    of insertion to the array is O(n).


    Contrary to the arrays, the insertion to Binary Search Trees is faster. Based
    on the mentioned assumptions, we only need three steps to find a location for
    an element of zero as shown in Figure [11-3](#490882_1_En_11_Chapter.xhtml#Fig3),
    and the time complexity for this process is O(log n).


    ![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig3_HTML.png](images/490882_1_En_11_Chapter/490882_1_En_11_Fig3_HTML.png)


    Figure 11-3


    BST insertion sample


    ```

    func insert(insertedValue : T) {

    let inNode = BTNode(value: insertedValue)

    if let rootNode = self.rootNode {

    self.insertNode(rootNode: rootNode, inNode: inNode)

    } else {

    self.rootNode = inNode

    }

    }

    private func insertNode(rootNode: BTNode, inNode: BTNode) {

    if rootNode.value > inNode.value {

    if let leftChild = rootNode.leftChild {

    self.insertNode(rootNode: leftChild, inNode: inNode)

    } else {

    rootNode.leftChild = inNode

    }

    } else {

    if let rightChild = rootNode.rightChild {

    self.insertNode(rootNode: rightChild, inNode: inNode)

    } else {

    rootNode.rightChild = inNode

    }

    }

    }

    ```


    To make our code more readable, I have created two separate functions and called
    `insertNode` function inside the `insert` function; that is why the `insertNode`
    method is private. Inside the insertNode function, first we compare the rootNode
    value with the value of the node that will be inserted. If the rootNode value
    is greater, we add a new node to the leftChild node; otherwise we add it to the
    rightChild node. Inside the insert function, first we check if the rootNode exists,
    and if it does, we call the insertNode method; otherwise we add a new node as
    rootNode.


    ## Search


    The process of searching is similar to the insertion, which conforms with the
    two mentioned assumptions. The only difference is that when the node data gets
    matched with input data, it will return successfully; otherwise invalid message
    will be returned. To make it clear, let’s compare the search in an array within
    the BST. To find the element 28 in an array, we need to compare the elements within
    the array one by one until we find it, which is O(n) time complexity (Figure [11-4](#490882_1_En_11_Chapter.xhtml#Fig4)).


    ![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig4_HTML.png](images/490882_1_En_11_Chapter/490882_1_En_11_Fig4_HTML.png)


    Figure 11-4


    Array search


    On the other hand, this is not the case in the BST. The two main assumptions of
    the BST allow us to make the search process faster as shown in Figure [11-5](#490882_1_En_11_Chapter.xhtml#Fig5).


    ![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig5_HTML.png](images/490882_1_En_11_Chapter/490882_1_En_11_Fig5_HTML.png)


    Figure 11-5


    BST search sample


    For each step in the BST, the search algorithm makes two assumptions `–` if the
    value is less than the current node, it continues to the left subtree; otherwise,
    it continues to the right subtree. This helps to avoid unnecessary checks and
    makes the time complexity O(log n).


    ```

    func searchValue(sValue: T) {

    self.searchNode(rootNode: self.rootNode, searchValue: sValue)

    }

    private func searchNode(rootNode: BTNode?, searchValue: T) {

    guard let rootNode = rootNode else {

    print("The node of \(searchValue) does not exist")

    return

    }

    print("Root Node \(rootNode.value)")

    if searchValue > rootNode.value {

    self.searchNode(rootNode: rootNode.rightChild, searchValue: searchValue)

    } else if searchValue < rootNode.value {

    self.searchNode(rootNode: rootNode.leftChild, searchValue: searchValue)

    } else {

    print("Node found: \(rootNode.value)")

    }

    }

    ```


    ### Example


    Let’s use insert and search functions in real example and see how they work. We
    will call insert function inside the iteration to insert values from 0 to 5, and
    then using the search function, we will search for number 4.


    ```

    var binaryST = BinarySearchTree()

    for i in 0..<5 {

    binaryST.insert(insertedValue: i) }

    binaryST.searchValue(sValue: 4)

    ```


    The output will be


    ```

    Root Node 0

    Root Node 1

    Root Node 2

    Root Node 3

    Root Node 4

    Node found: 4

    ```


    ## Delete


    There are some cases that need to be taken into account when deleting an element
    from a Binary Search Tree.


    ### Deleting a Leaf


    To delete a leaf from a Binary Search Tree, no extra action is needed; we just
    remove the leaf node from the tree (Figure [11-6](#490882_1_En_11_Chapter.xhtml#Fig6)).


    ![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig6_HTML.png](images/490882_1_En_11_Chapter/490882_1_En_11_Fig6_HTML.png)


    Figure 11-6


    BST deleting a leaf


    ### Deleting a Node with One Child


    To delete a node with one child, first a node is deleted and then the child node
    needs to be reconnected to the rest of the tree (Figure [11-7](#490882_1_En_11_Chapter.xhtml#Fig7)).


    ![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig7_HTML.png](images/490882_1_En_11_Chapter/490882_1_En_11_Fig7_HTML.png)


    Figure 11-7


    BST deleting a node with a child'
  trans: "\n# 插入\n\n向二叉搜索树（BST）中插入元素遵循前述的两条假设；我们只需找到插入的位置，这是一个`O(log n)`的操作。为了说明二叉搜索树的强大之处，让我们比较一下数组与二叉搜索树的插入性能。假设我们要向一个数组中插入`0`。要在数组中插入一个新元素，首先我们在数组末尾开辟一个额外空间，然后数据逐元素移位，最后才能插入该元素（图\
    \ 11-2）。\n\n![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig2_HTML.png](img/490882_1_En_11_Fig2_HTML.png)\n\
    \n图 11-2\n\n数组插入\n\n在这个例子中，元素零被插入到数组的前端，所有元素都移动了一个位置，这意味着向数组插入的时间复杂度是`O(n)`。\n\
    \n与数组相反，向二叉搜索树插入则更快。基于前述假设，我们只需要三步就能找到元素零的插入位置，如图 11-3 所示，这个过程的时间复杂度是`O(log n)`。\n\
    \n![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig3_HTML.png](img/490882_1_En_11_Fig3_HTML.png)\n\
    \n图 11-3\n\nBST 插入示例\n\n```\nfunc insert(insertedValue : T) {\n    let inNode\
    \ = BTNode(value: insertedValue)\n    if let rootNode = self.rootNode {\n    \
    \    self.insertNode(rootNode: rootNode, inNode: inNode)\n    } else {\n     \
    \   self.rootNode = inNode\n    }\n}\nprivate func insertNode(rootNode: BTNode,\
    \ inNode: BTNode) {\n    if rootNode.value > inNode.value {\n        if let leftChild\
    \ = rootNode.leftChild {\n            self.insertNode(rootNode: leftChild, inNode:\
    \ inNode)\n        } else {\n            rootNode.leftChild = inNode\n       \
    \ }\n    } else {\n        if let rightChild = rootNode.rightChild {\n       \
    \     self.insertNode(rootNode: rightChild, inNode: inNode)\n        } else {\n\
    \            rootNode.rightChild = inNode\n        }\n    }\n}\n```\n\n为了让代码更易读，我创建了两个独立的函数，并在`insert`函数内部调用了`insertNode`函数；这就是`insertNode`方法被设为私有的原因。在`insertNode`函数内部，我们首先比较`rootNode`的值与将要插入节点的值。如果`rootNode`的值更大，我们将新节点添加到`leftChild`节点；否则，将其添加到`rightChild`节点。在`insert`函数内部，我们首先检查`rootNode`是否存在，如果存在，则调用`insertNode`方法；否则，将新节点添加为`rootNode`。\n\
    \n# 搜索\n\n搜索的过程与插入类似，符合前述两条假设。唯一的区别是，当节点数据与输入数据匹配时，它返回成功；否则返回无效信息。为了说清楚，让我们比较在数组与\
    \ BST 中搜索的差异。要在数组中查找元素`28`，我们需要逐一比较数组中的元素直到找到它，这是`O(n)`的时间复杂度（图 11-4）。\n\n![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig4_HTML.png](img/490882_1_En_11_Fig4_HTML.png)\n\
    \n图 11-4\n\n数组搜索\n\n另一方面，BST 的情况则不同。BST 的两条主要假设使我们能够加快搜索过程，如图 11-5 所示。\n\n![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig5_HTML.png](img/490882_1_En_11_Fig5_HTML.png)\n\
    \n图 11-5\n\nBST 搜索示例\n\n在 BST 的每一步中，搜索算法都基于两个假设——如果值小于当前节点，则继续向左子树查找；否则，继续向右子树查找。这有助于避免不必要的检查，并使时间复杂度为`O(log\
    \ n)`。\n\n```\nfunc searchValue(sValue: T) {\n    self.searchNode(rootNode: self.rootNode,\
    \ searchValue: sValue)\n}\nprivate func searchNode(rootNode: BTNode?, searchValue:\
    \ T) {\n    guard let rootNode = rootNode else {\n        print(\"The node of\
    \ \\(searchValue) does not exist\")\n        return\n    }\n    print(\"Root Node\
    \ \\(rootNode.value)\")\n    if searchValue > rootNode.value {\n        self.searchNode(rootNode:\
    \ rootNode.rightChild, searchValue: searchValue)\n    } else if searchValue <\
    \ rootNode.value {\n        self.searchNode(rootNode: rootNode.leftChild, searchValue:\
    \ searchValue)\n    } else {\n        print(\"Node found: \\(rootNode.value)\"\
    )\n    }\n}\n```\n\n## 示例\n\n让我们在实际例子中使用`insert`和`search`函数，看看它们如何工作。我们将在循环中调用`insert`函数来插入从`0`到`5`的值，然后使用`search`函数搜索数字`4`。\n\
    \n```\nvar binaryST = BinarySearchTree()\nfor i in 0..<5 {\n    binaryST.insert(insertedValue:\
    \ i)\n}\nbinaryST.searchValue(sValue: 4)\n```\n\n输出将是：\n\n```\nRoot Node 0\nRoot\
    \ Node 1\nRoot Node 2\nRoot Node 3\nRoot Node 4\nNode found: 4\n```\n\n# 删除\n\n\
    从二叉搜索树中删除元素时，需要考虑几种情况。\n\n## 删除叶子节点\n\n删除二叉搜索树中的叶子节点不需要额外的操作；我们只需从树中移除该叶子节点即可（图\
    \ 11-6）。\n\n![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig6_HTML.png](img/490882_1_En_11_Fig6_HTML.png)\n\
    \n图 11-6\n\nBST 删除叶子节点\n\n## 删除只有一个子节点的节点\n\n要删除只有一个子节点的节点，首先删除该节点，然后需要将子节点重新连接到树的其余部分（图\
    \ 11-7）。\n\n![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig7_HTML.png](img/490882_1_En_11_Fig7_HTML.png)\n\
    \n图 11-7\n\nBST 删除带有一个子节点的节点\n"
- fmt: "### Deleting a Node with Two Children\n\nRemoving a node with two children\
    \ is not straightforward. Let’s imagine that we want to remove node 9 from the\
    \ tree in Figure 11-8.\n\n![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig8_HTML.png](images/490882_1_En_11_Chapter/490882_1_En_11_Fig8_HTML.png)\n\
    \n*Figure 11-8 – BST deleting a node with two children*\n\nWhen we delete node\
    \ 9, we have two child nodes to reconnect (3 and 12), but in the parent node (node\
    \ 15), we have only one place for a child node. To solve this problem, we will\
    \ take the smallest node from the right subtree, which is node 6 in our case,\
    \ and replace it with the removed node and then reconnect the subtrees to it (Figure\
    \ 11-9).\n\n![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig9_HTML.png](images/490882_1_En_11_Chapter/490882_1_En_11_Fig9_HTML.png)\n\
    \n*Figure 11-9 – BST deletion sample*\n\nBefore creating the remove function,\
    \ we need to declare the minimum variable in the Binary Tree Node (`BTNode`) to\
    \ find the minimum value when removing a node with two children. Add the following\
    \ code inside the Binary Search Tree class:\n\n```\nextension BTNode {\n    var\
    \ min: BTNode {\n        return leftChild?.min ?? self\n    }\n}\n\nfunc removeValue(sValue:\
    \ T) {\n    rootNode = removeNode(rNode: rootNode, value: sValue)\n}\n\nprivate\
    \ func removeNode(rNode: BTNode?, value: T) -> BTNode? {\n    guard let node =\
    \ rNode else {\n        return nil\n    }\n    if value == node.value {\n    \
    \    if node.leftChild == nil && node.rightChild == nil {\n            return\
    \ nil\n        }\n        if node.leftChild == nil {\n            return node.rightChild\n\
    \        }\n        if node.rightChild == nil {\n            return node.leftChild\n\
    \        }\n        node.value = node.rightChild!.min.value\n        node.rightChild\
    \ = removeNode(rNode: node.rightChild, value: node.value)\n    } else if value\
    \ < node.value {\n        node.leftChild = removeNode(rNode: node.leftChild, value:\
    \ value)\n    } else {\n        node.rightChild = removeNode(rNode: node.rightChild,\
    \ value: value)\n    }\n    return node\n}\n```\n\nInside `removeNode`, first\
    \ we check if the node that will be removed exists and then we continue to check\
    \ the preceding cases. First, the `if` condition checks if there are no children\
    \ and, if so, returns `nil`, which means that deletes the current node. The `if\
    \ node.leftChild == nil` and `if node.rightChild == nil` conditions check whether\
    \ the left or right children exist and, if yes, reconnect them with the tree,\
    \ and this is our case 2. Then we find the minimum value and reconnect it with\
    \ the tree.\n\nLet’s see how this works.\n\n```\nvar binaryST = BinarySearchTree()\n\
    for i in 0..<5 {\n    binaryST.insert(insertedValue: i)\n}\nbinaryST.searchValue(sValue:\
    \ 4)\nbinaryST.removeValue(sValue: 4)\nbinaryST.searchValue(sValue: 4)\n```\n\n\
    The output will be:\n\n```\nRoot Node 0\nRoot Node 1\nRoot Node 2\nRoot Node 3\n\
    Root Node 4\nNode found: 4\nRoot Node 0\nRoot Node 1\nRoot Node 2\nRoot Node 3\n\
    The node of 4 does not exist\n```\n\nAs you can see after calling the remove function\
    \ for 4, it does not exist in the tree anymore.\n\n## Conclusion\n\nIn this chapter,\
    \ you have learned about Binary Search Tree and how to implement various methods\
    \ such as search, insert, and remove. The Binary Search Tree is a very powerful\
    \ data structure when managing sorted data in terms of performance. In the next\
    \ chapter, you will learn another type of tree which is red–black tree.\n\n# 12.\
    \ Red–Black Tree\n\nA red–black tree (RBT) is a type of Binary Search Tree where\
    \ a new parameter – color for each node – has been defined (Figure 12-1). We learned\
    \ that after some insert and delete operations, the Binary Search Trees become\
    \ unbalanced which creates a linked list. Red–black trees solve this problem by\
    \ balancing elements. Each node has a color which can be black or red. Thus, when\
    \ declaring a node for the RBT, it must contain a key/value, a color, the reference\
    \ to a parent node, and the references for the children nodes. RBTs are very useful\
    \ for worst-case scenarios when processing search, insertion, and deletion operations.\n\
    \n### Properties of RBT\n\n![../images/490882_1_En_12_Chapter/490882_1_En_12_Fig1_HTML.png](images/490882_1_En_12_Chapter/490882_1_En_12_Fig1_HTML.png)\n\
    \n*Figure 12-1 – Example of a red–black tree*\n\n- Each node must have a color:\
    \ red or black.\n- The root node is always black.\n- Nil leaves are always black.\n\
    - If a node is red, its children must be black.\n- For each node, all simple paths\
    \ from the node to the descendant leaves contain the same number of black nodes.\n\
    \nFigure 12-1 shows the basic structure of red–black trees.\n\nA red–black tree\
    \ is a self-balancing tree – the limitations put on the node colors ensure that\
    \ any simple path from the root to a leaf is not more than twice as long as any\
    \ other such path. It helps in maintaining the self-balancing property of the\
    \ red–black tree.\n\n### Implementation\n\nTo implement the red–black tree data\
    \ structure, we need a node that must have at least the following elements:\n\n\
    - Key/value for data container\n- References to the left and right children nodes\n\
    - Reference to a parent node\n- Color variable\n\nSo let’s define a class called\
    \ `RBNode` and add the following code in it. We know that the color can be either\
    \ red or black; that is why before defining a class, let’s create an enum for\
    \ the color variable which consists of two colors – black and red.\n\n```\nprivate\
    \ enum RBNodeColor {\n    case red\n    case black\n}\n```\n\nAnd the `RBNode`\
    \ class will be:\n\n```\npublic class RBNode: Equatable {\n    var color: RBNodeColor\
    \ = .black\n    var key: T?\n    var leftChild: RBNode?\n    var rightChild: RBNode?\n\
    \    weak var parent: RBNode?\n\n    public init(key: T?, leftChild: RBNode?,\
    \ rightChild: RBNode?, parent: RBNode?) {\n        self.key = key\n        self.leftChild\
    \ = leftChild\n        self.rightChild = rightChild\n        self.parent = parent\n\
    \        self.leftChild?.parent = self\n        self.rightChild?.parent = self\n\
    \    }\n}\n\n//Equatable protocol\nextension RBNode {\n    static public func\
    \ == (lhs: RBNode, rhs: RBNode) -> Bool {\n        return lhs.key == rhs.key\n\
    \    }\n}\n```\n\nWe created the required variables and initialized them inside\
    \ the `init` method, and our class must conform to the `Comparable` and `Equatable`\
    \ protocols. The extension at the end is added for the `Equatable` protocol to\
    \ be conformed.\n\nThe next thing that we will do is to create a red–black tree\
    \ itself. So let’s create a new class as shown in the following, but before doing\
    \ so, we need to add a `convenience` initialization inside the `RBNode` class\
    \ to be able to initialize it with nil values. So add the following methods in\
    \ the `RBNode` class after the public `init` method:\n\n```\npublic convenience\
    \ init(key: T?) {\n    self.init(key: key, leftChild: RBNode(), rightChild: RBNode(),\
    \ parent: RBNode())\n}\n\n// For initializing the nullLeaf\npublic convenience\
    \ init() {\n    self.init(key: nil, leftChild: nil, rightChild: nil, parent: nil)\n\
    \    self.color = .black\n}\n```\n\nThen our `RedBlackTree` class will be like\
    \ this:\n\n```\npublic class RedBlackTree {\n    public typealias RBTreeNode =\
    \ RBNode\n    private var root: RBTreeNode\n    private var size = 0\n    let\
    \ nullLeaf = RBTreeNode()\n\n    public init() {\n        root = nullLeaf\n  \
    \  }\n}\n```\n\nHere we created a `typealias` to make our code more readable and\
    \ declared `root` and `nullLeaf` for the tree.\n\nThere are various operations\
    \ that can be performed on a red–black tree. There might be cases that the previously\
    \ mentioned red–black tree properties are violated by operations such as insertion\
    \ and deletion; in this case, the `rotation` operation is used to maintain the\
    \ properties."
  raw: '### Deleting a Node with Two Children


    Removing a node with two children is not straightforward. Let’s imagine that we
    want to remove node 9 from the tree in Figure [11-8](#490882_1_En_11_Chapter.xhtml#Fig8).


    ![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig8_HTML.png](images/490882_1_En_11_Chapter/490882_1_En_11_Fig8_HTML.png)


    Figure 11-8


    BST deleting a node with two children


    When we delete node 9, we have two child nodes to reconnect (3 and 12), but in
    the parent node (node 15), we have only one place for a child node. To solve this
    problem, we will take the smallest node in from the right subtree, which is node
    6 in our case, and replace it with the removed node and then reconnect the subtrees
    to it (Figure [11-9](#490882_1_En_11_Chapter.xhtml#Fig9)).


    ![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig9_HTML.png](images/490882_1_En_11_Chapter/490882_1_En_11_Fig9_HTML.png)


    Figure 11-9


    BST deletion sample


    Before creating the remove function, we need to declare the minimum variable in
    the Binary Tree Node (BTNode) to find the minimum value when removing a node with
    two children. Add the following code inside the Binary Search Tree class:


    ```

    extension BTNode {

    var min: BTNode {

    return leftChild?.min ?? self

    }

    }

    func removeValue(sValue: T) {

    rootNode = removeNode(rNode: rootNode, value: sValue)

    }

    private func removeNode(rNode: BTNode?, value : T) -> BTNode? {

    guard let node = rNode else {

    return nil

    }

    if value == node.value {

    if node.leftChild == nil && node.rightChild == nil {

    return nil

    }

    if node.leftChild == nil {

    return node.rightChild

    }

    if node.rightChild == nil {

    return node.leftChild

    }

    node.value = node.rightChild!.min.value

    node.rightChild = removeNode(rNode: node.rightChild, value: node.value)

    } else if value < node.value {

    node.leftChild = removeNode(rNode: node.leftChild, value: value)

    } else {

    node.rightChild = removeNode(rNode: node.rightChild, value: value)

    }

    return node

    }

    ```


    Inside removeNode, first we check if the node that will be removed exists and
    then we continue to check the preceding cases. First, the if condition checks
    if there are no children and, if so, returns nil, which means that deletes the
    current node. The if `node.leftChild == nil` and `if node.rightChild == nil` conditions
    check whether the left or right children exist and, if yes, reconnect them with
    the tree, and this is our case 2\. Then we find the minimum value and reconnect
    it with the tree.


    Let’s see how this works.


    ```

    var binaryST = BinarySearchTree()

    for i in 0..<5 {

    binaryST.insert(insertedValue: i) }

    binaryST.searchValue(sValue: 4)

    binaryST.removeValue(sValue: 4)

    binaryST.searchValue(sValue: 4)

    ```


    The output will be


    ```

    Root Node 0

    Root Node 1

    Root Node 2

    Root Node 3

    Root Node 4

    Node found: 4

    Root Node 0

    Root Node 1

    Root Node 2

    Root Node 3

    The node of 4 does not exist

    ```


    As you can see after calling the remove function for 4, it does not exist in the
    tree anymore.


    ## Conclusion


    In this chapter, you have learned about Binary Search Tree and how to implement
    various methods such as search, insert, and remove. The Binary Search Tree is
    a very powerful data structure when managing sorted data in terms of performance.
    In the next chapter, you will learn another type of tree which is red`–`black
    tree.


    # 12. Red–Black Tree


    A red`–`black tree (RBT) is a type of Binary Search Tree where a new parameter
    `–` color for each node `–` has been defined (Figure [12-1](#490882_1_En_12_Chapter.xhtml#Fig1)).
    We learned that after some insert and delete operations, the Binary Search Trees
    become unbalanced which creates a linked list. Red`–`black trees solve this problem
    by balancing elements. Each node has a color which can be black or red. Thus,
    when declaring a node for the RBT, it must contain a key/value, a color, the reference
    to a parent node, and the references for the children nodes. RBTs are very useful
    for worst-case scenarios when processing search, insertion, and deletion operations.


    Properties of RBT


    ![../images/490882_1_En_12_Chapter/490882_1_En_12_Fig1_HTML.png](images/490882_1_En_12_Chapter/490882_1_En_12_Fig1_HTML.png)


    Figure 12-1


    Example of a red`–`black tree


    *   Each node must have a color: red or black.


    *   The root node is always black.


    *   Nil leaves are always black.


    *   If a node is red node, the children must be black.


    *   For each node, all simple paths from the node to the descendant leaves contain
    the same number of black.


    Figure [12-1](#490882_1_En_12_Chapter.xhtml#Fig1) shows the basic structure of
    red`–`black trees.


    A Red`–`black tree is a self-balancing tree `–` the limitations put on the node
    colors ensure that any simple path from the root to a leaf is not more than twice
    as long as any other such path. It helps in maintaining the self-balancing property
    of the red`–`black tree.


    ## Implementation


    To implement the red`–`black tree data structure, we need a node that must have
    at least the following elements:


    *   Key/value for data container


    *   References to the left and right children nodes


    *   Reference to a parent node


    *   Color variable


    So let’s define a class called **RBNode** and add the following code in it. We
    know that the color can be either red or black; that is why before defining a
    class, let’s create enum for color variable which consists of two colors `–` black
    and red.


    ```

    private enum RBNodeColor {

    case red

    case black

    }

    ```


    And the RBNode class will be


    ```

    public class RBNode: Equatable {

    var color: RBNodeColor = .black

    var key: T?

    var leftChild: RBNode?

    var rightChild: RBNode?

    weak var parent: RBNode?

    public init(key: T?, leftChild: RBNode?, rightChild: RBNode?, parent: RBNode?)
    {

    self.key = key

    self.leftChild = leftChild

    self.rightChild = rightChild

    self.parent = parent

    self.leftChild?.parent = self

    self.rightChild?.parent = self

    }

    }

    //Equatable protocol

    extension RBNode {

    static public func == (lhs: RBNode, rhs: RBNode) -> Bool {

    return lhs.key == rhs.key

    }

    }

    ```


    We created the required variables and initialized them inside init method, and
    our class must conform to the **Comparable** and **Equatable** protocols . The
    extension at the end is added for **Equatable** protocol to be conformed.


    The next thing that we will do is to create a red`–`black tree itself. So let’s
    create a new class as shown in the following, but before doing so, we need to
    add **convenience** initialization inside the **RBNode** class to be able to initialize
    it with nil values. So add the following methods in **RBNode** class after public
    **init** method :


    ```

    public convenience init(key: T?) {

    self.init(key: key, leftChild: RBNode(), rightChild: RBNode(), parent: RBNode())

    }

    // For initializing the nullLeaf

    public convenience init() {

    self.init(key: nil, leftChild: nil, rightChild: nil, parent: nil)

    self.color = .black

    }

    ```


    Then our **RedBlackTree** class will be like this:


    ```

    public class RedBlackTree {

    public typealias RBTreeNode = RBNode

    private var root: RBTreeNode

    private var size = 0

    let nullLeaf = RBTreeNode()

    public init() {

    root = nullLeaf

    }

    }

    ```


    Here we created **typealias** to make our code more readable and declared `root`
    and `nullLeaf` for the tree.


    There are various operations that can be performed on a red`–`black tree. There
    might be cases that red`–`black tree properties that are previously mentioned
    are violated by the operations such as insertion and deletion, so in this case
    `rotation` operation is used to maintain the properties.'
  trans: "\n### 删除拥有两个子节点的节点\n\n删除一个拥有两个子节点的节点并非易事。假设我们要删除图 11-8 中树结构的节点 9。\n\n![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig8_HTML.png](img/490882_1_En_11_Fig8_HTML.png)\n\
    \n*图 11-8 – 二叉搜索树删除拥有两个子节点的节点*\n\n当我们删除节点 9 时，需要重新连接它的两个子节点（3 和 12），但在其父节点（节点\
    \ 15）中，我们只有一个子节点的位置。为了解决这个问题，我们会从右子树中取出最小的节点（在本例中是节点 6），用它替换被删除的节点，然后将两个子树重新连接到它上面（图\
    \ 11-9）。\n\n![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig9_HTML.png](img/490882_1_En_11_Fig9_HTML.png)\n\
    \n*图 11-9 – 二叉搜索树删除示例*\n\n在创建删除函数之前，我们需要在二叉树节点（`BTNode`）中声明一个 `min` 变量，以便在删除拥有两个子节点的节点时，能够找到其最小值。请在二叉搜索树类中添加以下代码：\n\
    \n```\nextension BTNode {\n    var min: BTNode {\n        return leftChild?.min\
    \ ?? self\n    }\n}\n\nfunc removeValue(sValue: T) {\n    rootNode = removeNode(rNode:\
    \ rootNode, value: sValue)\n}\n\nprivate func removeNode(rNode: BTNode?, value:\
    \ T) -> BTNode? {\n    guard let node = rNode else {\n        return nil\n   \
    \ }\n    if value == node.value {\n        if node.leftChild == nil && node.rightChild\
    \ == nil {\n            return nil\n        }\n        if node.leftChild == nil\
    \ {\n            return node.rightChild\n        }\n        if node.rightChild\
    \ == nil {\n            return node.leftChild\n        }\n        node.value =\
    \ node.rightChild!.min.value\n        node.rightChild = removeNode(rNode: node.rightChild,\
    \ value: node.value)\n    } else if value < node.value {\n        node.leftChild\
    \ = removeNode(rNode: node.leftChild, value: value)\n    } else {\n        node.rightChild\
    \ = removeNode(rNode: node.rightChild, value: value)\n    }\n    return node\n\
    }\n```\n\n在 `removeNode` 方法内部，我们首先检查待删除的节点是否存在，然后继续检查前面的各种情况。首先，`if` 条件检查该节点是否没有子节点，如果是则返回\
    \ `nil`，这意味着删除当前节点。`if node.leftChild == nil` 和 `if node.rightChild == nil` 条件用于检查左子节点或右子节点是否存在，如果存在则将它们重新连接到树上，这正是我们提到的第二种情况。接着，我们找到最小值并将其重新连接到树上。\n\
    \n让我们看看它是如何工作的。\n\n```\nvar binaryST = BinarySearchTree()\nfor i in 0..<5 {\n\
    \    binaryST.insert(insertedValue: i)\n}\nbinaryST.searchValue(sValue: 4)\nbinaryST.removeValue(sValue:\
    \ 4)\nbinaryST.searchValue(sValue: 4)\n```\n\n输出结果将是：\n\n```\nRoot Node 0\nRoot\
    \ Node 1\nRoot Node 2\nRoot Node 3\nRoot Node 4\nNode found: 4\nRoot Node 0\n\
    Root Node 1\nRoot Node 2\nRoot Node 3\nThe node of 4 does not exist\n```\n\n如你所见，在对节点\
    \ 4 调用删除函数后，它在树中已不复存在。\n\n## 本章小结\n\n在本章中，你学习了二叉搜索树，以及如何实现诸如搜索、插入和删除等多种方法。在处理有序数据时，二叉搜索树是一种性能非常强大的数据结构。在下一章中，你将学习另一种类型的树——红黑树。\n\
    \n# 12. 红黑树\n\n红黑树（RBT）是一种二叉搜索树，它为每个节点引入了新的参数——颜色（图 12-1）。我们知道，经过一些插入和删除操作后，二叉搜索树会变得不平衡，从而形成链表。红黑树通过平衡元素解决了这个问题。每个节点都有一个颜色，可以是黑色或红色。因此，在声明红黑树的节点时，它必须包含一个键/值、一个颜色、指向父节点的引用以及指向子节点的引用。红黑树在处理搜索、插入和删除操作的最坏情况时非常有用。\n\
    \n### 红黑树的属性\n\n![../images/490882_1_En_12_Chapter/490882_1_En_12_Fig1_HTML.png](img/490882_1_En_12_Fig1_HTML.png)\n\
    \n*图 12-1 – 红黑树示例*\n\n- 每个节点必须有一种颜色：红色或黑色。\n- 根节点始终为黑色。\n- 空叶子节点始终为黑色。\n- 如果一个节点是红色的，那么它的子节点必须是黑色的。\n\
    - 对于每个节点，从该节点到其所有后代叶子节点的简单路径上，黑色节点的数量相同。\n\n图 12-1 展示了红黑树的基本结构。\n\n红黑树是一种自平衡树——对节点颜色的限制确保了任何从根节点到叶子节点的简单路径的长度，都不会超过任何其他此类路径的两倍。这有助于维护红黑树的自平衡属性。\n\
    \n### 实现\n\n要实现红黑树这种数据结构，我们需要一个至少包含以下元素的节点：\n\n- 数据容器的键/值\n- 指向左子节点和右子节点的引用\n\
    - 指向父节点的引用\n- 颜色变量\n\n那么，让我们定义一个名为 `RBNode` 的类，并将以下代码添加进去。我们知道颜色只能是红色或黑色；因此在定义类之前，我们先为颜色变量创建一个枚举，它包含两种颜色：黑色和红色。\n\
    \n```\nprivate enum RBNodeColor {\n    case red\n    case black\n}\n```\n\n而 `RBNode`\
    \ 类将如下所示：\n\n```\npublic class RBNode: Equatable {\n    var color: RBNodeColor\
    \ = .black\n    var key: T?\n    var leftChild: RBNode?\n    var rightChild: RBNode?\n\
    \    weak var parent: RBNode?\n\n    public init(key: T?, leftChild: RBNode?,\
    \ rightChild: RBNode?, parent: RBNode?) {\n        self.key = key\n        self.leftChild\
    \ = leftChild\n        self.rightChild = rightChild\n        self.parent = parent\n\
    \        self.leftChild?.parent = self\n        self.rightChild?.parent = self\n\
    \    }\n}\n\n//Equatable 协议\nextension RBNode {\n    static public func == (lhs:\
    \ RBNode, rhs: RBNode) -> Bool {\n        return lhs.key == rhs.key\n    }\n}\n\
    ```\n\n我们创建了所需的变量并在 `init` 方法中进行了初始化，我们的类必须遵循 `Comparable` 和 `Equatable` 协议。末尾的扩展用于遵循\
    \ `Equatable` 协议。\n\n接下来我们要做的是创建红黑树本身。那么，让我们按如下所示创建一个新类，但在创建之前，我们需要在 `RBNode`\
    \ 类中添加一个 `convenience` 初始化方法，以便能够用 `nil` 值对其进行初始化。因此，请在 `RBNode` 类的 public `init`\
    \ 方法之后添加以下方法：\n\n```\npublic convenience init(key: T?) {\n    self.init(key: key,\
    \ leftChild: RBNode(), rightChild: RBNode(), parent: RBNode())\n}\n\n// 用于初始化空叶子节点\n\
    public convenience init() {\n    self.init(key: nil, leftChild: nil, rightChild:\
    \ nil, parent: nil)\n    self.color = .black\n}\n```\n\n然后，我们的 `RedBlackTree`\
    \ 类将如下所示：\n\n```\npublic class RedBlackTree {\n    public typealias RBTreeNode\
    \ = RBNode\n    private var root: RBTreeNode\n    private var size = 0\n    let\
    \ nullLeaf = RBTreeNode()\n\n    public init() {\n        root = nullLeaf\n  \
    \  }\n}\n```\n\n这里我们创建了一个 `typealias` 以使代码更易读，并为树声明了 `root` 和 `nullLeaf`。\n\n\
    可以对红黑树执行各种操作。可能存在这样的情况：插入和删除等操作违反了上述红黑树属性；在这种情况下，会采用旋转操作来维护这些属性。\n"
- fmt: '### Rotation


    In a rotation one subtree gets one level closer to the root and another subtree
    gets further from the root.


    There are two types of rotation:


    ![../images/490882_1_En_12_Chapter/490882_1_En_12_Fig3_HTML.png](images/490882_1_En_12_Chapter/490882_1_En_12_Fig3_HTML.png)


    Figure 12-3 – Visualization of a right rotation operation


    ![../images/490882_1_En_12_Chapter/490882_1_En_12_Fig2_HTML.png](images/490882_1_En_12_Chapter/490882_1_En_12_Fig2_HTML.png)


    Figure 12-2 – Visualization of a left rotation operation


    - Left rotation – shown in Figure 12-2

    - Right rotation – shown in Figure 12-3


    The following code shows how to implement the rotation method for a red–black
    tree. First, we need another enum for rotation direction, which might be right
    or left.


    ```

    private enum RotationDirection {

    case left

    case right

    }

    ```


    Then inside the `RBNode` class, we need a few variables to identify the node status
    whether it is `leafNode`, `leftNode`, `rightNode`, or `rootNode`. So let’s declare
    these variables inside the `RBNode` class.


    ```

    var isRootNode: Bool {

    return parent == nil

    }

    var isLeafNode: Bool {

    return rightChild == nil && leftChild == nil

    }

    var isNullLeaf: Bool {

    return key == nil && isLeafNode && color == .black

    }

    var isLeftNode: Bool {

    return parent?.leftChild === self

    }

    var isRightNode: Bool {

    return parent?.rightChild === self

    }

    ```


    `rootNode` is a node that does not have a parent value, so that is why `isRootNode`
    returns true when the parent is nil.


    `leafNode` is a node that does not have either children – right and left. Here
    `isLeafNode` returns true when both children are nil.


    `nullLeaf` is a node where the key is nil and its color is always black. Here
    `isNullLeaf` returns true when the key is null and it is leafNode and the color
    is black.


    `isLeftNode` returns true when a parent node’s left child node is identical with
    the current node. Note that it is not equal, and we use here identical operator
    (`===`). This means that they reference the same point in the memory. The same
    principles are accepted for `isRightNode` here.


    After declaring these variables in the `RBNode` class, we continue to create the
    rotate method inside the `RedBlackTree` class.


    ```

    private func rotate(node A: RBTreeNode, direction: RotationDirection) {

    var nodeB: RBTreeNode? = RBNode()

    //Step 1

    switch direction {

    case .left:

    nodeB = A.rightChild

    A.rightChild = nodeB?.leftChild

    A.rightChild?.parent = A

    case .right:

    nodeB = A.leftChild

    A.leftChild = nodeB?.rightChild

    A.leftChild?.parent = A

    }

    //Step 2

    nodeB?.parent = A.parent

    if A.isRootNode {

    if let node = nodeB {

    root = node

    }

    } else if A.isLeftNode {

    A.parent?.leftChild = nodeB

    } else if A.isRightNode {

    A.parent?.rightChild = nodeB

    }

    //Step 3

    switch direction {

    case .left:

    nodeB?.leftChild = A

    case .right:

    nodeB?.rightChild = A

    }

    A.parent = nodeB

    }

    ```


    For the explanation of this code, let’s take as an example the left rotation and
    visualize it step by step.


    We assume that the direction is equal to `.left`.


    Figure 12-4 illustrates the steps from the rotation method.


    ![../images/490882_1_En_12_Chapter/490882_1_En_12_Fig4_HTML.jpg](images/490882_1_En_12_Chapter/490882_1_En_12_Fig4_HTML.jpg)


    Figure 12-4 – Left rotation steps


    ### Insertion


    The insertion to a red–black tree is performed as a standard insertion to a Binary
    Search Tree. But the problem is after insertion the tree might not be a valid
    red–black tree anymore. So to tackle this problem, we create a `fixInsert` method.
    Before declaring this method, let’s add three variables such as `siblingNode`,
    `grandparentNode`, and `uncleNode` into the `RBNode` class. In Figure 12-5, these
    variables are shown visually.


    ![../images/490882_1_En_12_Chapter/490882_1_En_12_Fig5_HTML.png](images/490882_1_En_12_Chapter/490882_1_En_12_Fig5_HTML.png)


    Figure 12-5 – Relatives of a node


    As shown in the figure, the sibling of Node 1 is Node 4, the parent of Node 1
    is Node 3, the uncle of Node 1 is Node 12, and the grandparent of 1 is Node 9.


    Let’s copy the following variables inside the `RBNode` class:


    ```

    var grandparentNode: RBNode? {

    return parent?.parent

    }

    var siblingNode: RBNode? {

    if isLeftNode {

    return parent?.rightChild

    } else {

    return parent?.leftChild

    }

    }

    var uncleNode: RBNode? {

    return parent?.siblingNode

    }

    ```


    After declaring these variables inside the `RBNode` class, copy the following
    code inside the `RedBlackTree` class:


    ```

    private func fixInsert(node z: RBTreeNode) {

    if !z.isNullLeaf {

    guard let parentZ = z.parent else {

    return

    }

    //If both Z and its parent are red – violation of red–black tree property, so
    we need to fix it.

    if parentZ.color == .red {

    guard let uncle = z.uncleNode else {

    return

    }

    //Case 1: Uncle red – recolor and move z.

    if uncle.color == .red {

    parentZ.color = .black

    uncle.color = .black

    if let grandParentZ = parentZ.parent {

    grandParentZ.color = .red

    //Move z to the grandparent and check again.

    fixInsert(node: grandParentZ)

    }

    }

    } else {

    // Case 2: Uncle black

    var zNew = z

    //Case 2.1: z right node – rotate

    if parentZ.isLeftNode && z.isRightNode {

    zNew = parentZ

    rotate(node: zNew, direction: .left)

    } else if parentZ.isRightNode && z.isLeftNode {

    zNew = parentZ

    rotate(node: zNew, direction: .right)

    }

    //Case 2.2: z is left child – recolor + rotate

    zNew.parent?.color = .black

    if let grandparentZnew = zNew.grandparentNode {

    grandparentZnew.color = .red

    if z.isLeftNode {

    rotate(node: grandparentZnew, direction: .right)

    } else {

    rotate(node: grandparentZnew, direction: .left)

    }

    }

    }

    }

    root.color = .black

    }

    ```


    It can be seen that there are two cases here and the second case includes two
    types in itself.


    **Case 1:** `z`’s uncle is red.

    1. Change the color of the parent and uncle as black.

    2. Change the color of the grandparent as red.

    3. Call the `fixInsert` method for the grandparent of `z`.


    **Case 2:** `z`’s uncle is black – there can be two cases here.

    - **Case 2.1:** `z` is the right node – here, we move `z` upward, so `z`’s parent
    is the `newZ` and then we rotate around this `newZ`.

    - **Case 2.1:** `z` is the left child. In this case, we recolor `z.parent` to
    black and `z.grandparent` to red. Then we rotate around `z`’s grandparent.


    As previously mentioned, `fixInsert` function is a method to fix the red–black
    tree violations after inserting a new node to the tree. Thus, we need to declare
    the insert method, and this is identical to the insert operation as in a Binary
    Search Tree (for more information, check Chapter 11 “Binary Search Tree”).


    Here we will declare three methods: main `insert` method, `addAsLeftNode`, and
    `addAsRightNode`.


    ```

    private func addAsLeftNode(child: RBTreeNode, parent: RBTreeNode) {

    parent.leftChild = child

    child.parent = parent

    child.color = .red

    fixInsert(node: child)

    }

    private func addAsRightNode(child: RBTreeNode, parent: RBTreeNode) {

    parent.rightChild = child

    child.parent = parent

    child.color = .red

    fixInsert(node: child)

    }

    ```


    `addAsLeftNode` – Adds a child as a left node, sets the color to red, and fixes
    violation.


    `addAsRightNode` – Adds a child as a right node, sets the color to red, and fixes
    violation.


    Then we create the main insert method which will use the preceding declared methods.'
