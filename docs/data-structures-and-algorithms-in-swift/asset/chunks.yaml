    print(forcedValue)

    ```


    The output will be


    ```

    Three

    ```


    It is possible to iterate through a dictionary and return the key pair, which
    can be decomposed into named constants.


    ```

    for (key, value) in myDictionary {

    print("The value for \(key) is \(value)")

    }

    ```


    The output will be **key: 3**


    ```

    The value for 1 is One

    The value for 2 is Two

    The value for 3 is Three

