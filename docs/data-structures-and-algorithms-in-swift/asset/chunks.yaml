    ## Conclusion


    In this chapter, you have learned about red`–`black tree and its main properties.
    Furthermore, you mastered how to implement various methods such as rotation, insert,
    and remove. The red`–`black tree is very powerful for worst-case scenarios when
    processing search, insert, and delete operations.


    # 13. Big O


    To describe the efficiency of algorithms, Big O time language and metric is used.
    To make it clearer, let’s look at the following scenario. Imagine that we want
    to send a file to our friend as fast as possible, how should we send it?


    There are two options:


    *   Electronic transfer


    *   Physical delivery


    ## Time Complexity


    The concept of asymptotic runtime or Big O means time complexity . Which means
    we could describe the data transfer algorithm runtime as follows (Figure [13-1](#490882_1_En_13_Chapter.xhtml#Fig1)):


    ![../images/490882_1_En_13_Chapter/490882_1_En_13_Fig1_HTML.png](images/490882_1_En_13_Chapter/490882_1_En_13_Fig1_HTML.png)


    Figure 13-1


    Time complexity


    *   Electronic transfer: O(s), where s is the size of the file. This means that
    the time to transfer the file increases linearly with the size of the file.


    *   Physical delivery: O(1) `–` as the size increases, it will not take any longer.


    There are various types of runtime such as O(N), O(N²), and O(2^N). For instance,
    to paint an area of w meters wide and h meters high, the runtime could be described
    as O(wh). Some algorithms are faster when the input is small; however, they become
    slower when the input gets larger. It is very crucial that our programs run fast,
    because they are not executed in supercomputers, so if a mobile app users face
    slow performance from the app, they tend to quit and delete the app. Thus, proper
    algorithm must be chosen for our development.


    The runtime for any algorithm can be described in three different ways. As an
    example, let’s examine a quick sort algorithm. It takes a random number element
    as a pivot and swaps values in the array before elements greater than the pivot
    appear (Figure [13-2](#490882_1_En_13_Chapter.xhtml#Fig2)).


    ![../images/490882_1_En_13_Chapter/490882_1_En_13_Fig2_HTML.png](images/490882_1_En_13_Chapter/490882_1_En_13_Fig2_HTML.png)


    Figure 13-2


    Big O scenarios


    *   Best case: All elements are equal and pass over through an array happens once,
    O(N).


    *   Worst case: If we are unlucky, the pivot is repeatedly the biggest element
    in the array, O(N²).


    *   Expected case: Sometimes the pivot will be very high or very low, but it will
    not happen over and over again, O(N log N).


    To express these cases, there are different Big O notations for them.


    *   Big-Theta (Big-Θ): It is a complexity that is within the bounds of the worst
    and the best cases.


    *   Big O: It is a complexity that is going to be less or equal to the worst case.


    *   Big-Omega (Big-Ω): It is a complexity that is going to be at least more than
    the best case.'
