  trans: "\n### 归并排序\n\n对于较大的列表，它的速度更快，因为与插入排序和冒泡排序不同，它不会遍历整个列表。空间复杂度始终为 `O(n)`，因为必须将元素存储在某处。在使用数组的实现中，额外空间复杂度可以为\
    \ `O(n)`，而在链表实现中则为 `O(1)`。在实践中，使用列表的实现需要为列表指针提供额外空间，因此除非列表已存在于内存中，否则这一点并不重要。\n\
    \n| **归并排序** | 最佳情况 | 最坏情况 |\n| 时间复杂度 | `O(n)`（`O(n logn)`） | `O(n logn)` |\n\
    | 空间复杂度 | `O(1)` | `O(n)` |\n\n### 快速排序\n\n如前所述，快速排序与归并排序一样采用分治法，是一种递归算法。其最坏情况下的运行时间与选择排序和插入排序一样糟糕。另一方面，其平均情况下的运行时间与归并排序一样好。那么问题来了，既然它至少与归并排序一样好，为什么还需要它？这是因为隐藏在快速排序大\
    \ O 表示法中的常数因子相当小。在实践中，快速排序的性能优于归并排序，并且显著优于选择排序和插入排序。基准元素的选择对快速排序的效率起着重要作用。\n\n\
    | **快速排序** | 最佳情况 | 最坏情况 |\n| 时间复杂度 | `O(n logn)` | `O(n²)` |\n| 空间复杂度 | `O(logn)`\
    \ | `O(n)` |\n\n## 搜索算法\n\n搜索算法旨在从存储元素的数据结构中检查或检索一个元素。\n\n### 线性搜索与二分搜索\n\n线性搜索每次扫描一个元素，随着元素数量的增加，搜索时间也会不断增加。\n\
    \n| **线性搜索** | 最佳情况 | 最坏情况 |\n| 时间复杂度 | `O(1)` | `O(n)` |\n| 空间复杂度 | `O(1)` |\
    \ `O(1)` |\n\n二分搜索将搜索范围缩减为一半，并根据中间元素，继续在给定列表的中间元素左侧或右侧进行搜索。\n\n| **二分搜索** | 最佳情况\
    \ | 最坏情况 |\n| 时间复杂度 | `O(1)` | `O(logn)` |\n| 空间复杂度 | `O(1)` | `O(1)` |\n\n**区别**\n\
    \n- 二分搜索要求数据已排序，而线性搜索则不需要。\n- 二分搜索随机访问数据，而线性搜索顺序访问数据。\n- 二分搜索执行顺序比较，而线性搜索执行相等比较。\n\
    \n线性搜索搜索数字 7 的过程如图 17-1 所示。\n\n![../images/490882_1_En_17_Chapter/490882_1_En_17_Fig1_HTML.png](img/490882_1_En_17_Fig1_HTML.png)\n\
    \n图 17-1  \n线性搜索示例\n\n二分搜索搜索数字 7 的过程如图 17-2 所示。\n\n![../images/490882_1_En_17_Chapter/490882_1_En_17_Fig2_HTML.png](img/490882_1_En_17_Fig2_HTML.png)\n\
    \n图 17-2  \n二分搜索示例\n\n## 图搜索算法 (GSA)\n\n显然，图搜索算法用于图数据结构。GSA 会遍历图的节点以寻找目标。\n\n\
    ### 广度优先搜索 (BFS) 与深度优先搜索 (DFS)\n\n| 广度优先搜索 (BFS) | 深度优先搜索 (DFS) |\n| --- | ---\
    \ |\n| 使用队列数据结构 | 使用栈数据结构 |\n| 从源顶点出发，以最少的边数到达某个顶点。 | 从源出发，可能需要经过更多边才能到达某个顶点。\
    \ |\n| 当顶点距离给定源较近时，该算法较为有用。 | 当顶点距离源较远时，该算法较为有用。 |\n| 它优先考虑相邻节点；因此不适用于游戏和谜题中的决策树。\
    \ | 它适用于决策树，因为我们可以先做出一个决策，然后探索该决策下的所有路径。 |\n| 时间复杂度为 `O(V+N)`，其中 `V` 表示顶点数，`N`\
    \ 表示节点数。 | 时间复杂度为 `O(V+N)`，其中 `V` 表示顶点数，`N` 表示节点数。 |\n\n## 迪杰斯特拉算法\n\n在广度优先搜索中使用优先队列，就构成了迪杰斯特拉算法。通过优先队列，添加到队列中的每个任务都具有一个“优先级”，并根据其优先级水平在队列中插入相应位置。当你对图一无所知，且无法估计每个节点到目标的距离时，应使用迪杰斯特拉算法。\n"
