    \ 中创建哈希表，以及如何使用检索、更新和删除哈希表中的元素。在下一章中，你将学习树这种数据结构类型。\n\n# 8. 树\n\n树是一种非线性数据结构，其元素之间具有层次关系；它基本上与现实生活中的树是颠倒的。树有很多种类型，形状和大小各异。在本章中，你将学习使用和实现树的基础知识。树由节点组成，最顶层的节点称为根节点。每个节点都保存着数据以及对其子节点的引用，如果一个节点没有子节点，则称为叶子节点。图\
    \ 8-1 展示了一个三层结构的树形图。根节点是第 0 层，随着你向树的深度移动，层级每次增加 1。\n\n![../images/490882_1_En_8_Chapter/490882_1_En_8_Fig1_HTML.png](img/490882_1_En_8_Fig1_HTML.png)\n\
    \n图 8-1 — 树的三层结构\n\n一个节点拥有的子节点总数称为度。拥有相同父节点的节点称为兄弟节点，它们之间通过边相连。\n\n树的主要应用包括：\n\
    \n- 处理层次化数据\n- 使信息易于搜索\n- 处理排序的数据列表\n- 作为合成数字图像以产生视觉效果的工作流\n- 路由算法\n- 多阶段决策的形式\n\
    \n## 创建\n\n如前所述，树由节点组成，每个节点都有一个与之关联的值。此外，每个节点需要一个子节点列表，并且每个节点也方便地拥有指向其父节点的链接。每个节点有一个父节点，但可以有多个子节点；因此子节点将声明为一个数组。\n\
    \n```swift\nclass Node {\n    var data: T\n    weak var parent: Node?\n    var\
