    `LinkedList` 类中：


    ```

    public func removeLast() -> listType? {

    if let h = head {

    if h.next == nil {

    defer {

    head = nil

    tail = nil

    }

    return h.value

    }

    var prev = h

    var curr = h

    while let next = curr.next {

    prev = curr

    curr = next

    }

    prev.next = nil

