    a `DoublyLinkedList` class. We have declared the `nodeAt` function as a helper
    function to get an element for a given index.


    ```

    public class DoublyLinkedList {

    var head: DoubleNode?

    private var tail: DoubleNode?

    public var isEmpty: Bool {

    return head == nil

    }

    public func nodeAt(index: Int) -> DoubleNode? {

    if index >= 0 {

    var node = head

    var i = index

    while node != nil {

    if i == 0 { return node }

    i -= 1

    node = node!.next

    }

    }

    return nil

    }

    }

    ```


