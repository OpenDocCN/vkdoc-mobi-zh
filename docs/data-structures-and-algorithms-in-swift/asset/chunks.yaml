    self.value = value

    }

    }

    ```


    Then, we will define a bucket structure for using our table. As previously mentioned,
    buckets are a group of values, and as elements will be stored in a noncontiguous
    fashion, we must define the size for our collection. We use type aliases to provide
    new names for our hash element which makes our code more readable and clearer.
    Thus, in Swift it will be as shown here:


    ```

    class HashTable {

    typealias Bucket = [HashElement]

    var buckets: [Bucket]

    init(capacity: Int) {

