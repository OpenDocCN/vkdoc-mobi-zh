    \nFigure 9-3\n\nStep 1\n\nThen we insert the comb word into our Trie; here again\
    \ each letter will be checked and the missing ones will be inserted (Figure [9-4](#490882_1_En_9_Chapter.xhtml#Fig4)).\n\
    \n![../images/490882_1_En_9_Chapter/490882_1_En_9_Fig4_HTML.png](images/490882_1_En_9_Chapter/490882_1_En_9_Fig4_HTML.png)\n\
    \nFigure 9-4\n\nAdding comb\n\n```\nmyTrie.insert(word: \"comb\")\n```\n\nThen\
    \ by using the query method, we can check whether the inserted words exist in\
    \ the data structure or not.\n\n```\nprint(myTrie.query(word: \"code\"))\nmyTrie.remove(word:\
    \ \"code\")\nprint(myTrie.query(word: \"code\"))\n```\n\nThe output will be\n\n\
    ```\ntrue\nfalse\n```\n\nThis means that when we query the code first, it exists\
    \ in the **Trie**, but the second time, it is missing because we used the remove\
    \ method to remove it.\n\n## Conclusion\n\nIn this chapter, you have learned about\
    \ the Trie data structure, which provides great performance in regard to prefix\
    \ matching. You also mastered how to insert, remove, and query inside the Trie\
    \ structure.\n\n# 10. Binary Tree\n\nIn the previous chapter, you have learned\
    \ about the basic tree structure where each node can have unlimited children.\
    \ Binary trees are tree data structures in which each node has at most two children,\
    \ often referred to as the left and right children. In this chapter, you will\
    \ learn the main properties of binary data structure and how to implement it.\n\
    \n## Binary Tree Primer\n\nThe basic structure of a binary tree is shown in Figure\
    \ [10-1](#490882_1_En_10_Chapter.xhtml#Fig1).\n\n![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig1_HTML.png](images/490882_1_En_10_Chapter/490882_1_En_10_Fig1_HTML.png)\n\
    \nFigure 10-1\n\nBasic binary tree\n\nBefore continuing to the properties and\
    \ the types of binary tree, let’s identify some terms related to it.\n\nNode depth\
    \ – The number of edges from the node to the root node. A root depth is 0.\n\n\
    Node height – The number of edges on the longest oath from the node to a leaf.\
    \ Leaf height is 0.\n\nTree height – From the root node to the farthest leaf.\n\
    \n### Properties of Binary Tree\n\n1.  The maximum number of nodes at level “**i**”\
    \ of the binary tree is **2**^(**i-1**).\n\n    The level in the root is 1 → 2^(1-1)=1\\\
    . Due to the fact that every node has at most two children, the next level has\
    \ twice the nodes, 2*2^(i-1).\n\n2.  If the height of the binary tree is “h”,\
    \ the maximum number of nodes is 2^h-1\\. The height of a tree is the maximum\
    \ number of nodes on the root to the leaf path.\n\n3.  The number of leaf nodes\
    \ is always one more than the nodes with two children in a binary tree where every\
    \ node has zero or two children.\n\n### Types of Binary Trees\n\nBinary trees\
    \ are a simple concept; they are easy to understand, easy to implement, and work\
    \ well and fast. There are several different types of binary trees:\n\n1.  Full\
    \ binary tree (Figure [10-2](#490882_1_En_10_Chapter.xhtml#Fig2)) `–` Each node\
    \ has zero or two children, but not one.\n\n![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig2_HTML.png](images/490882_1_En_10_Chapter/490882_1_En_10_Fig2_HTML.png)\n\
    \nFigure 10-2\n\nFull binary tree\n\n1.  Perfect binary tree (Figure [10-3](#490882_1_En_10_Chapter.xhtml#Fig3))\
    \ `–` All nodes have two children and the same depth.\n\n![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig3_HTML.png](images/490882_1_En_10_Chapter/490882_1_En_10_Fig3_HTML.png)\n\
    \nFigure 10-3\n\nPerfect binary tree\n\n1.  Complete binary tree (Figure [10-4](#490882_1_En_10_Chapter.xhtml#Fig4))\
    \ `–` All levels are completely filled except the last level, but in which the\
    \ existing nodes are in the left side of the tree.\n\n![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig4_HTML.png](images/490882_1_En_10_Chapter/490882_1_En_10_Fig4_HTML.png)\n\
    \nFigure 10-4\n\nComplete binary tree\n\n![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig5_HTML.png](images/490882_1_En_10_Chapter/490882_1_En_10_Fig5_HTML.png)\n\
    \nFigure 10-5\n\nBalanced binary tree\n\n1.  Balanced binary tree (Figure [10-5](#490882_1_En_10_Chapter.xhtml#Fig5))\
    \ `–` Each leaf is “not more than a certain distance” from the root node than\
    \ any other leaf.\n\n## Implementation\n\nTo implement the binary tree data structure,\
    \ we need a node that must have at least the following elements:\n\n*   Key/value\
    \ for data container\n\n*   References to the left and right children nodes\n\n\
    *   Reference to a parent node\n\nSo let’s define a class called BTNode and add\
    \ the following code in it:\n\n```\nclass BTNode {\nvar value: T\nvar leftChild:\
    \ BTNode?\nvar rightChild: BTNode?\ninit(_ value: T,_ leftChild: BTNode?,_ rightChild:\
    \ BTNode?) {\nself.value = value\nself.rightChild = rightChild\nself.leftChild\
    \ = leftChild\n}\n}\n```\n\nHere we have made our class generic in order to allow\
    \ any kind of value type inside the value property. Our binary tree node has a\
    \ property called value to store key data. Additionally, it has two variables\
    \ to store the left and right children, and these are the minimum required properties\
    \ that we need to define the binary tree node.\n\n## Tree Traversal (Also Known\
    \ As Tree Search)\n\nTree traversals refer to the process of checking or updating\
    \ each node in a tree data structure once. They are classified by the visiting\
    \ order of nodes. Unlike linear data structures which can only be traversed in\
    \ a linear order, the tree data structures can be traversed in various ways. There\
    \ are three common ways to traverse them:\n\n*   In-order\n\n*   Pre-order\n\n\
    *   Post-order"
  trans: "\n### 移除\n\n此方法类似于查询方法，但我们将 `isFinal` 值改为 `false`，这会移除该单词的终止符，由于没有终止符，这个词就不能再被视为\
    \ Trie 中的一个单词。让我们在 `Trie` 类中编写此代码：\n\n```\nfunc remove(word: String) {\nlet characters\
    \ = Array(word.lowercased())\nvar node : TrieNode? = rootNode\nfor character in\
    \ characters {\nnode = node?.children[character]\nif node == nil {\nreturn\n}\n\
    }\nnode!.isFinal = false\n}\n```\n\n在图 9-2 中，你会注意到，尽管我们从 Trie 中删除了字符串代码，它仍然显示，但只是缺少了终止符。\n\
    \n![../images/490882_1_En_9_Chapter/490882_1_En_9_Fig2_HTML.png](img/490882_1_En_9_Fig2_HTML.png)\n\
    \n图 9-2：删除一个元素后的 Trie\n\n让我们通过一个示例来检验这三个方法。首先，使用 `Trie` 类创建一个 Trie，然后使用之前声明的方法，我们向其中插入、查询和移除值。\n\
    \n第一步是声明一个 Trie 数据结构，并使用 `insert` 方法插入节点。\n\n```\nvar myTrie = Trie()\nmyTrie.insert(word:\
    \ \"code\")\n```\n\n在这里，插入操作会检查 \"code\" 的字母是否存在于节点中；如果不存在，则分别为它们创建新节点（图 9-3）。\n\
    \n![../images/490882_1_En_9_Chapter/490882_1_En_9_Fig3_HTML.png](img/490882_1_En_9_Fig3_HTML.png)\n\
    \n图 9-3：步骤 1\n\n然后我们将 comb 这个词插入到 Trie 中；同样，每个字母都会被检查，缺失的字母将被插入（图 9-4）。\n\n```\n\
    myTrie.insert(word: \"comb\")\n```\n\n![../images/490882_1_En_9_Chapter/490882_1_En_9_Fig4_HTML.png](img/490882_1_En_9_Fig4_HTML.png)\n\
    \n图 9-4：添加 comb\n\n然后，通过使用 `query` 方法，我们可以检查插入的单词是否存在于数据结构中。\n\n```\nprint(myTrie.query(word:\
    \ \"code\"))\nmyTrie.remove(word: \"code\")\nprint(myTrie.query(word: \"code\"\
    ))\n```\n\n输出结果将是：\n\n```\ntrue\nfalse\n```\n\n这意味着，当我们第一次查询 \"code\" 时，它存在于 Trie\
    \ 中，但第二次查询时，它不见了，因为我们使用了 `remove` 方法将其移除了。\n\n## 结论\n\n在本章中，你学习了 Trie 数据结构，它在前缀匹配方面表现出色。你还掌握了如何在\
    \ Trie 结构中执行插入、移除和查询操作。\n\n# 10. 二叉树\n\n在上一章中，你学习了基本的树结构，其中每个节点可以有无限个子节点。二叉树是一种树数据结构，其中每个节点最多有两个子节点，通常称为左子节点和右子节点。在本章中，你将学习二叉树数据结构的主要属性以及如何实现它。\n\
    \n## 二叉树入门\n\n二叉树的基本结构如图 10-1 所示。\n\n![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig1_HTML.png](img/490882_1_En_10_Fig1_HTML.png)\n\
    \n图 10-1：基本二叉树\n\n在继续介绍二叉树的属性和类型之前，让我们先定义一些与之相关的术语。\n\n- **节点深度** – 从节点到根节点的边的数量。根节点的深度为\
    \ 0。\n- **节点高度** – 从节点到某个叶节点的最长路径上的边的数量。叶节点的高度为 0。\n- **树高度** – 从根节点到最远叶节点的距离。\n\
    \n### 二叉树的属性\n\n1.  二叉树第“i”层的最大节点数为 2^(i-1)。\n\n    根节点所在的层级为 1 → 2^(1-1) = 1。由于每个节点最多有两个子节点，下一层的节点数是上一层的两倍，即\
    \ 2 * 2^(i-1)。\n\n2.  如果二叉树的高度为“h”，则最大节点数为 2^h - 1。树的高度是从根到叶路径上的最大节点数。\n\n3. \
    \ 在一个每个节点都有零个或两个子节点的二叉树中，叶节点的数量总是比拥有两个子节点的节点数量多一个。\n\n### 二叉树的类型\n\n二叉树是一个简单的概念：它们易于理解，易于实现，并且工作高效、快速。有几种不同类型的二叉树：\n\
    \n1.  **满二叉树**（图 10-2）– 每个节点有零个或两个子节点，但不会只有一个。\n\n![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig2_HTML.png](img/490882_1_En_10_Fig2_HTML.png)\n\
    \n图 10-2：满二叉树\n\n2.  **完美二叉树**（图 10-3）– 所有节点都有两个子节点且深度相同。\n\n![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig3_HTML.png](img/490882_1_En_10_Fig3_HTML.png)\n\
    \n图 10-3：完美二叉树\n\n3.  **完全二叉树**（图 10-4）– 除最后一层外，所有层都被完全填满，但最后一层的已有节点都位于树的左侧。\n\
    \n![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig4_HTML.png](img/490882_1_En_10_Fig4_HTML.png)\n\
    \n图 10-4：完全二叉树\n\n4.  **平衡二叉树**（图 10-5）– 每个叶节点到根节点的距离与任何其他叶节点相比“不超过某个特定值”。\n\n\
    ![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig5_HTML.png](img/490882_1_En_10_Fig5_HTML.png)\n\
    \n图 10-5：平衡二叉树\n\n## 实现\n\n为了实现二叉树数据结构，我们需要一个节点，该节点必须至少包含以下元素：\n\n- 用于数据容器的键/值\n\
    - 对左子节点和右子节点的引用\n- 对父节点的引用\n\n因此，让我们定义一个名为 `BTNode` 的类，并在其中添加以下代码：\n\n```\nclass\
    \ BTNode {\nvar value: T\nvar leftChild: BTNode?\nvar rightChild: BTNode?\ninit(_\
    \ value: T,_ leftChild: BTNode?,_ rightChild: BTNode?) {\nself.value = value\n\
    self.rightChild = rightChild\nself.leftChild = leftChild\n}\n}\n```\n\n这里我们将类设为泛型，以允许\
    \ value 属性中包含任何类型的值。我们的二叉树节点有一个名为 `value` 的属性来存储键数据。此外，它还有两个变量来存储左子节点和右子节点，这是定义二叉树节点所需的最少属性。\n\
    \n## 树的遍历（又称树搜索）\n\n树的遍历是指对树数据结构中的每个节点访问或更新一次的过程。它们根据节点的访问顺序进行分类。与只能按线性顺序遍历的线性数据结构不同，树数据结构可以以多种方式遍历。有几种常见的遍历方式：\n\
    \n- 中序遍历\n- 前序遍历\n- 后序遍历\n"
- fmt: "### In-Order Traversal\n\nIn-order traversal (Figure [10-6]) first visits\
    \ the left child value, then the current node value and finally the right child\
    \ value. If our binary tree is ordered, in-order traversal visits the nodes in\
    \ ascending order.\n\n![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig6_HTML.png](images/490882_1_En_10_Chapter/490882_1_En_10_Fig6_HTML.png)\n\
    \n**Figure 10-6** – In-order traversal\n\nIt can be clearly seen that it prints\
    \ the nodes in ascending order.\n\nThe following function shows how to implement\
    \ the in-order traversal in Swift, so copy the following code to the `BTNode`\
    \ class:\n\n```\nfunc inorderTraversal(_ btNode: BTNode?) {\n    guard let _ =\
    \ btNode else { return }\n    self.inorderTraversal(btNode?.leftChild)\n    print(\"\
    \\(btNode!.value)\", terminator: \"  \")\n    self.inorderTraversal(btNode?.rightChild)\n\
    }\n```\n\nFirstly, we check if the current node is empty or nil, then we traverse\
    \ the subtree by recursively calling the in-order function and display the data.\
    \ When the left subtree traversal is finished, we traverse the right subtree by\
    \ calling recursively the in-order function.\n\nLet’s see in the preceding example\
    \ how it works. First, we create the tree node as previously shown and call the\
    \ `inorderTraversal` function based on the root parameter.\n\n```\nlet node3 =\
    \ BTNode(3,nil,nil)\nlet node12 = BTNode(12,nil,nil)\nlet node17 = BTNode(17,nil,nil)\n\
    let node28 = BTNode(28,nil,nil)\nlet node9 = BTNode(9,node3,node12)\nlet node23\
    \ = BTNode(23,node17,node28)\nlet root = BTNode(15,node9,node23)\nlet t = BTNode(0,nil,nil)\n\
    t.inorderTraversal(root)\n```\n\nThe output will be:\n\n```\n3  9  12  15  17\
    \  23  28\n```\n\n### Pre-Order Traversal\n\nPre-order traversal (Figure [10-7])\
    \ always starts from the current node, then continues to visit the left and right\
    \ children.\n\n![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig7_HTML.png](images/490882_1_En_10_Chapter/490882_1_En_10_Fig7_HTML.png)\n\
    \n**Figure 10-7** – Pre-order traversal\n\nLet’s create the pre-order traversal\
    \ function. Copy the following code into the `BTNode` class after the `inorderTraversal`\
    \ function. First, traversal visits the current node and then recursively visits\
    \ the left and right nodes.\n\n```\nfunc preorderTraversal(_ btNode: BTNode?)\
    \ {\n    guard let _ = btNode else { return }\n    print(\"\\(btNode!.value)\"\
    , terminator: \"  \")\n    self.preorderTraversal(btNode?.leftChild)\n    self.preorderTraversal(btNode?.rightChild)\n\
    }\n```\n\nLet’s run this function for the previously created tree.\n\n```\nlet\
    \ t = BTNode(0,nil,nil)\nt.preorderTraversal(root)\n```\n\nThe output will be:\n\
    \n```\n15  9  3  12  23  17  28\n```\n\n### Post-Order Traversal\n\nPost-order\
    \ traversal (Figure [10-8]) first visits the leftmost node, then the right node\
    \ and then its parent. After that it visits the previous parent with the same\
    \ rule.\n\n![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig8_HTML.png](images/490882_1_En_10_Chapter/490882_1_En_10_Fig8_HTML.png)\n\
    \n**Figure 10-8** – Post-order traversal\n\nLet’s create the post-order function\
    \ inside the `BTNode` class. Copy the following code inside the mentioned class\
    \ and we will run it for the same tree structure that we have created:\n\n```\n\
    func postorderTraversal(_ btNode: BTNode?) {\n    guard let _ = btNode else {\
    \ return }\n    self.postorderTraversal(btNode?.leftChild)\n    self.postorderTraversal(btNode?.rightChild)\n\
    \    print(\"\\(btNode!.value)\", terminator: \"  \")\n}\n```\n\nLet us run it:\n\
    \n```\nlet t = BTNode(0,nil,nil)\nt.postorderTraversal(root)\n```\n\nThe output\
    \ will be:\n\n```\n3  12  9  17  28  23  15\n```\n\n## Conclusion\n\nIn this chapter,\
    \ you have learned about the binary tree data structure and its different types.\
    \ You also mastered the different types of traversal algorithms that can be performed\
    \ on Binary Trees. In the next chapter, you will learn about a special kind of\
    \ binary tree, the Binary Search Tree.\n\n# 11. Binary Search Tree\n\nA Binary\
    \ Search Tree (BST) is a binary tree in which each node has at most two children,\
    \ and it facilitates fast search, insertion, and deletion operations. The time\
    \ complexity of each operation is `O(log n)`, which is considerably faster than\
    \ linear search. The two main characteristics of the Binary Search Trees are as\
    \ follows:\n\n- The value of the left node must be lesser than the value of its\
    \ parent.\n- The value of the right node must be greater than or equal to the\
    \ value of its parent.\n\nFigure [11-1] shows the basic structure of the Binary\
    \ Search Tree.\n\n![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig1_HTML.png](images/490882_1_En_11_Chapter/490882_1_En_11_Fig1_HTML.png)\n\
    \n**Figure 11-1** – Basic structure of the Binary Search Tree\n\nThe structure\
    \ of the Binary Search Tree makes it more efficient for searching operations,\
    \ because in each step of the search process, the algorithm makes two assumptions:\n\
    \n1. If the searched value is less than the current node, it continues to the\
    \ left subtree.\n2. If it is greater than the current node, it continues to the\
    \ right subtree.\n\nThese two assumptions eliminate unnecessary searches and reduce\
    \ the search path by half in each step, and this makes it very efficient.\n\n\
    ## Implementation\n\nFirstly, we need to create **Node** and **Binary Tree Search**\
    \ classes, and here we will use the `BTNode` class that we created in the previous\
    \ chapter for binary tree.\n\n```\nclass BTNode {\n    var value: T\n    var leftChild:\
    \ BTNode?\n    var rightChild: BTNode?\n    init(value: T, leftChild: BTNode?\
    \ = nil, rightChild: BTNode? = nil) {\n        self.value = value\n        self.leftChild\
    \ = leftChild\n        self.rightChild = rightChild\n    }\n}\n```\n\nBased on\
    \ the declared Tree Node, we will create a Binary Search Tree class.\n\n```\n\
    class BinarySearchTree {\n    private var rootNode: BTNode?\n}\n```\n\nThe class\
    \ conforms with the **Comparable** protocol to guarantee that the type will use\
    \ the comparison operators, and the **CustomStringConvertible** protocol is used\
    \ for the description of different data types. Let’s continue to add the insert\
    \ function to this class."
  raw: '### In-Order Traversal


    In-order traversal (Figure [10-6](#490882_1_En_10_Chapter.xhtml#Fig6)) first visits
    the left child value, then the current node value and finally the right child
    value. If our binary tree is ordered, in-order traversal visits the nodes in ascending
    order.


    ![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig6_HTML.png](images/490882_1_En_10_Chapter/490882_1_En_10_Fig6_HTML.png)


    Figure 10-6


    In-order traversal


    It can be clearly seen that it prints the nodes in ascending order.


    The following function shows how to implement the in-order traversal in Swift,
    so copy the following code to the BTNode class:


    ```

    func inorderTraversal(_ btNode: BTNode?) {

    guard let _ = btNode else { return }

    self.inorderTraversal(btNode?.leftChild)

    print("\(btNode!.value)", terminator: "  ")

    self.inorderTraversal(btNode?.rightChild)

    }

    ```


    Firstly, we check if the current node is empty or nil, then we traverse the subtree
    by recursively calling the in-order function and display the data. When the left
    subtree traversal is finished, we traverse the right subtree by calling recursively
    the in-order function.


    Let’s see in the preceding example how it works. First, we create the tree node
    as previously shown and call the `inorderTraversal` function based on the root
    parameter.


    ```

    let node3 = BTNode(3,nil,nil)

    let node12 = BTNode(12,nil,nil)

    let node17 = BTNode(17,nil,nil)

    let node28 = BTNode(28,nil,nil)

    let node9 = BTNode(9,node3,node12)

    let node23 = BTNode(23,node17,node28)

    let root = BTNode(15,node9,node23)

    let t = BTNode(0,nil,nil)

    t.inorderTraversal(root)

    ```


    The output will be


    ```

    3  9  12  15  17  23  28

    ```


    ### Pre-Order Traversal


    Pre-order traversal (Figure [10-7](#490882_1_En_10_Chapter.xhtml#Fig7)) always
    starts from the current node, then continue to visit the left and right children.


    ![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig7_HTML.png](images/490882_1_En_10_Chapter/490882_1_En_10_Fig7_HTML.png)


    Figure 10-7


    Pre-order traversal


    Let’s create the pre-order traversal function. Copy the following code into the
    BTNode class after the inorderTraversal function. First, traversal visits the
    current node and then recursively visits the left and right nodes.


    ```

    func preorderTraversal(_ btNode: BTNode?) {

    guard let _ = btNode else { return }

    print("\(btNode!.value)", terminator: "  ")

    self.preorderTraversal(btNode?.leftChild)

    self.preorderTraversal(btNode?.rightChild)

    }

    ```


    Let’s run this function for the previously created tree.


    ```

    let t = BTNode(0,nil,nil)

    t.preorderTraversal(root)

    ```


    The output will be


    ```

    15  9  3  12  23  17  28

    ```


    ### Post-Order Traversal


    Post-order traversal (Figure [10-8](#490882_1_En_10_Chapter.xhtml#Fig8)) first
    visits the leftmost node, then the right node and then its parent. After that
    it visits the previous parent with the same rule.


    ![../images/490882_1_En_10_Chapter/490882_1_En_10_Fig8_HTML.png](images/490882_1_En_10_Chapter/490882_1_En_10_Fig8_HTML.png)


    Figure 10-8


    Post-order traversal


    Let’s create the post-order function inside the BTNode class. Copy the following
    code inside the mentioned class and we will run it for the same tree structure
    that we have created:


    ```

    func postorderTraversal(_ btNode: BTNode?) {

    guard let _ = btNode else { return }

    self.postorderTraversal(btNode?.leftChild)

    self.postorderTraversal(btNode?.rightChild)

    print("\(btNode!.value)", terminator: "  ")

    }

    ```


    Let us run it:


    ```

    let t = BTNode(0,nil,nil)

    t.postorderTraversal(root)

    ```


    The output will be


    ```

    3  12  9  17  28  23  15

    ```


    ## Conclusion


    In this chapter, you have learned about the binary tree data structure and its
    different types. You also mastered the different types of traversal algorithms
    that can be performed on Binary Trees. In the next chapter, you will learn about
    a special kind of binary tree, the Binary Search Tree.


    # 11. Binary Search Tree


    A Binary Search Tree (BST) is a binary tree in which each node has at most two
    children, and it facilitates fast search, insertion, and deletion operations.
    The time complexity of each operation is O(log n), which is considerably faster
    than linear search. The two main characteristics of the Binary Search Trees are
    as follows:


    *   The value of the left node must be lesser than the value of its parent.


    *   The value of the right node must be greater than or equal to the value of
    its parent.


    Figure [11-1](#490882_1_En_11_Chapter.xhtml#Fig1) shows the basic structure of
    the Binary Search Tree.


    ![../images/490882_1_En_11_Chapter/490882_1_En_11_Fig1_HTML.png](images/490882_1_En_11_Chapter/490882_1_En_11_Fig1_HTML.png)


    Figure 11-1


    Basic structure of the Binary Search Tree


    The structure of the Binary Search Tree makes it more efficient for searching
    operations, because in each step of the search process, the algorithm makes two
    assumptions:


    1.  If the searched value is less than the current node, it continues to the left
    subtree.


    2.  If it is greater than the current node, it continues to the right subtree.


    These two assumptions eliminate unnecessary searches and reduce the search path
    by half in each step, and this makes it very efficient.


    ## Implementation


    Firstly, we need to create **Node** and **Binary Tree Search** classes, and here
    we will use the BTNode class that we created in the previous chapter for binary
    tree.


    ```

    class BTNode {

    var value: T

    var leftChild: BTNode?

    var rightChild: BTNode?

    init(value: T, leftChild: BTNode? = nil, rightChild: BTNode? = nil) {

    self.value = value

    self.leftChild = leftChild

    self.rightChild = rightChild

    }

    }

    ```


    Based on the declared Tree Node, we will create a Binary Search Tree class.


    ```

    class BinarySearchTree {

    private var rootNode: BTNode?

    }

    ```


    The class conforms with the **Comparable** protocol to guarantee that the type
    will use the comparison operators, and the **CustomStringConvertible** protocol
    is used for the description of different data types. Let’s continue to add the
    insert function to this class.'
