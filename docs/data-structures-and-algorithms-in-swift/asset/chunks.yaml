    pivot element. All elements in the first sublist are arranged to be smaller than
    the pivot, while all elements in the second sublist are arranged to be larger
    than the pivot. The same partitioning and arranging process is performed repeatedly
    on the resulting sublists until the whole list of items is sorted. The average
    running time is O(n log n), due to its tight inner loop. In the worst-case scenario,
    its running time is o(n²).


