    and a number is chosen as a reference for sorting which is called pivot and it
    is chosen at random. This time, for convenience, let’s choose the rightmost number
    as the pivot, which is 5\. The next thing that we are going to do is to place
    a left marker on the leftmost number and a right marker on the rightmost number.
