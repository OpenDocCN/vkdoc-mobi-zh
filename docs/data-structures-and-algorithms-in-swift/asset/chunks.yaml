- fmt: '## Undirected Graphs


    Undirected graphs can be thought of as a directed graph where all edges are bidirectional
    (Figure [16-3](#490882_1_En_16_Chapter.xhtml#Fig3)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig3_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig3_HTML.png)


    Figure 16-3 Undirected graph


    Here there are two routes back and forth and the weight of an edge applies to
    both ways.


    ## Weighted Graphs


    The cost of using each edge is associated with a weight that is assigned to the
    edge. This makes easy to choose the cheapest path between edges (Figure [16-4](#490882_1_En_16_Chapter.xhtml#Fig4)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig4_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig4_HTML.png)


    Figure 16-4 Weighted graph


    Graph search algorithms (GSA) are used in many applications such as finding the
    shortest path from source to target, in many games, in maps, and in route find
    applications. The main characteristics of the graph search are as follows:


    - These algorithms specify an order to search through the nodes of a graph.

    - We start at the source node and keep searching until we find the target node.

    - The frontier contains nodes that we''ve seen but haven''t explored yet.

    - In each iteration, we take a node off the frontier and add its neighbors to
    the frontier.


    There are many graph search algorithms, but here we will discuss only three of
    them: breadth-first search (BFS), depth-first search (DFS), and Dijkstra''s algorithm.


    ## Breadth-First Search (BFS)


    Breadth-first search is a graph traversal algorithm which starts from the root
    node and explores all the neighbor nodes, and then it selects the nearest node
    and explores all the rest of the nodes. It follows the same process for each of
    the nearest node until it reaches its goal.


    Let''s imagine that our goal in the following graph data structure is to find
    `G` using BFS (Figure [16-5](#490882_1_En_16_Chapter.xhtml#Fig5)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig5_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig5_HTML.png)


    Figure 16-5 Graph data structure


    The process starts with the search with `A` as the starting point. Points `B`,
    `C`, and `D` are reachable from `A`, and these are considered as candidates for
    the next point to move (Figure [16-6](#490882_1_En_16_Chapter.xhtml#Fig6)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig6_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig6_HTML.png)


    Figure 16-6 BFS, Step 1


    One point is selected from among the candidates. The basis for selection is whichever
    one was added as a candidate first. For points that became candidates at the same
    time, it does not matter which one is selected. In our case for convenience, we
    will select points from the left side. So we will start with `B` and we move to
    the selected point and find out that the searched point which is `G` is not located
    in this point. `E` and `F` are added candidates for the next move which are reachable
    from the current point `B` (Figure [16-7](#490882_1_En_16_Chapter.xhtml#Fig7)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig7_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig7_HTML.png)


    Figure 16-7 BFS, Step 2


    Then we continue to the next point that is reachable from point `A`, which is
    `C`. We move to the selected point and again `G` is not located here, so the point
    that is reachable from `C` is added as a new candidate for upcoming moves (Figure
    [16-8](#490882_1_En_16_Chapter.xhtml#Fig8)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig8_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig8_HTML.png)


    Figure 16-8 BFS, Step 3


    Then we continue to the next point which is `D` and again `G` is not located here
    and `I` and `J` are added as new candidates (Figure [16-9](#490882_1_En_16_Chapter.xhtml#Fig9)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig9_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig9_HTML.png)


    Figure 16-9 BFS, Step 4


    We see that all candidates from point `A` are finished and we could not find point
    `G`, so we again continue from the left side. So we move from point `B` to its
    candidates and the first candidate is `E` and we see that `G` is not in this location,
    and as a new candidate, we add `K` and continue to the next point (Figure [16-10](#490882_1_En_16_Chapter.xhtml#Fig10)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig10_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig10_HTML.png)


    Figure 16-10 BFS, Step 5


    The next point is `F`, and from `F`, there is no route, which means that the candidate
    is not added in this case and this route is finished. Then, we continue with the
    next point, from `C` we reach to `H` and it is clear that `H` is not the point
    that we are searching for and `G` is added as new candidate and we continue to
    point `D`. Here again, none of the candidates of `I` and `J` are the points that
    we are looking for and only `L` is added as new candidate. From this point, we
    again start from the left side, which is point `E`. We move to the next candidate
    and we reach the end of the line without finding `G`. Due to the fact that there
    is no route from point `F`, we continue to point `H`, and finally, when we move
    from `H`, we reach our goal, so the search ends here.


    As you can see, the breadth-first search is unique in how it searches broadly
    from those points closest to the starting point.


    **Advantages of BFS**


    - If there is a solution, it will be found out by BFS.

    - It will never get trapped in blind alley.

    - If there is more than one solution, the solution will be found with minimal
    steps.


    **Disadvantages of BFS**


    - Memory constraint.

    - If the solution is far away, it consumes more time.'
  raw: '## Undirected Graphs


    Undirected graphs can be thought of as a directed graph where all edges are bidirectional
    (Figure [16-3](#490882_1_En_16_Chapter.xhtml#Fig3)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig3_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig3_HTML.png)


    Figure 16-3


    Undirected graph


    Here there are two routes back and forth and the weight of an edge applies to
    both ways.


    ## Weighted Graphs


    The cost of using each edge is associated with a weight that is assigned to the
    edge. This makes easy to choose the cheapest path between edges (Figure [16-4](#490882_1_En_16_Chapter.xhtml#Fig4)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig4_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig4_HTML.png)


    Figure 16-4


    Weighted graph


    Graph search algorithms (GSA) are used in many applications such as finding the
    shortest path from source to target, in many games, in maps, and in route find
    applications. The main characteristics of the graph search are as follows:


    *   These algorithms specify an order to search through the nodes of a graph.


    *   We start at the source node and keep searching until we find the target node.


    *   The frontier contains nodes that we’ve seen but haven’t explored yet.


    *   In each iteration, we take a node off the frontier and add its neighbors to
    the frontier.


    There are many graph search algorithms, but here we will discuss only three of
    them: breadth-first search (BFS), depth-first search (DFS), and Dijkstra’s algorithm.


    ## Breadth-First Search (BFS)


    Breadth-first search is a graph traversal algorithm which starts from the root
    node and explores all the neighbor nodes, and then it selects the nearest node
    and explores all the rest of the nodes. It follows the same process for each of
    the nearest node until it reaches its goal.


    Let’s imagine that our goal in the following graph data structure is to find G
    using BFS (Figure [16-5](#490882_1_En_16_Chapter.xhtml#Fig5)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig5_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig5_HTML.png)


    Figure 16-5


    Graph data structure


    The process starts with the search with A as the starting point. Points B, C,
    and D are reachable from A, and these are considered as candidates for the next
    point to move (Figure [16-6](#490882_1_En_16_Chapter.xhtml#Fig6)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig6_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig6_HTML.png)


    Figure 16-6


    BFS, Step 1


    One point is selected from among the candidates. The basis for selection is whichever
    one was added as a candidate first. For points that became candidates at the same
    time, it does not matter which one is selected. In our case for convenience, we
    will select points from the left side. So we will start with B and we move to
    the selected point and find out that the searched point which is G is not located
    in this point. E and F are added candidates for the next move which are reachable
    from the current point B (Figure [16-7](#490882_1_En_16_Chapter.xhtml#Fig7)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig7_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig7_HTML.png)


    Figure 16-7


    BSF, Step 2


    Then we continue to the next point that is reachable from point A, which is C.
    We move to the selected point and again G is not located here, so the point that
    is reachable from C is added as a new candidate for upcoming moves (Figure [16-8](#490882_1_En_16_Chapter.xhtml#Fig8)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig8_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig8_HTML.png)


    Figure 16-8


    BSF, Step 3


    Then we continue to the next point which is D and again G is not located here
    and I and J are added as new candidates (Figure [16-9](#490882_1_En_16_Chapter.xhtml#Fig9)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig9_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig9_HTML.png)


    Figure 16-9


    BSF, Step 4


    We see that all candidates from point A are finished and we could not find point
    G, so we again continue from the left side. So we move from point B to its candidates
    and the first candidate is E and we see that G is not in this location, and as
    a new candidate, we add K and continue to the next point (Figure [16-10](#490882_1_En_16_Chapter.xhtml#Fig10)).


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig10_HTML.png](images/490882_1_En_16_Chapter/490882_1_En_16_Fig10_HTML.png)


    Figure 16-10


    BSF, Step 5


    The next point is F, and from F, there is no route, which means that the candidate
    is not added in this case and this route is finished. Then, we continue with the
    next point, from C we reach to H and it is clear that H is not the point that
    we are searching for and G is added as new candidate and we continue to point
    D.


    Here again, none of the candidates of I and J are the points that we are looking
    for and only L is added as new candidate. From this point, we again start from
    the left side, which is point E. We move to the next candidate and we reach the
    end of the line without finding G. Due to the fact that there is no route from
    point F, we continue to point H, and finally, when we move from H, we reach our
    goal, so the search ends here.


    As you can see, the breadth-first search is unique in how it searches broadly
    from those points closest to the starting point.


    Advantages of BFS


    *   If there is a solution, it will be found out by BFS.


    *   It will never get trapped in blind alley.


    *   If there is more than one solution, the solution will be found with minimal
    steps.


    Disadvantages of BFS


    *   Memory constraint.


    *   If the solution is far away, it consumes more time.'
  trans: '

    ## 无向图


    无向图可以看作是一种所有边都是双向的有向图（图 16-3）。


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig3_HTML.png](img/490882_1_En_16_Fig3_HTML.png)


    图 16-3 无向图


    这里存在两条往返路线，且边的权重对两个方向均适用。


    ## 加权图


    使用每条边的成本都与分配给该边的权重相关联。这使得在边之间选择成本最低的路径变得容易（图 16-4）。


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig4_HTML.png](img/490882_1_En_16_Fig4_HTML.png)


    图 16-4 加权图


    图搜索算法被用于许多应用，例如在众多游戏、地图以及路径查找应用中寻找从源点到目标点的最短路径。图搜索的主要特征如下：


    -   这些算法指定了搜索图中节点的顺序。

    -   我们从源节点开始，持续搜索直到找到目标节点。

    -   边界（frontier）包含我们已看到但尚未探索的节点。

    -   在每次迭代中，我们从边界中取出一个节点，并将其邻居节点添加到边界中。


    图搜索算法有很多，但这里我们只讨论其中三种：广度优先搜索、深度优先搜索和迪杰斯特拉算法。


    ## 广度优先搜索


    广度优先搜索是一种图遍历算法，它从根节点开始，探索所有邻居节点，然后选择最近的节点，并探索其余所有节点。它对每个最近的节点都遵循相同的过程，直到达到目标。


    假设在下面的图数据结构中，我们的目标是使用 BFS 找到 `G`（图 16-5）。


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig5_HTML.png](img/490882_1_En_16_Fig5_HTML.png)


    图 16-5 图数据结构


    搜索过程从以 `A` 为起点开始。从 `A` 可到达点 `B`、`C` 和 `D`，这些点被视为下一步移动的候选点（图 16-6）。


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig6_HTML.png](img/490882_1_En_16_Fig6_HTML.png)


    图 16-6 BFS，步骤 1


    从候选点中选择一个点。选择的依据是哪个点最先被添加为候选点。对于同时成为候选点的点，选择哪一个无关紧要。为了方便起见，在本例中我们将从左侧选择点。因此，我们从
    `B` 开始，移动到所选的点，发现要搜索的点 `G` 不在此处。从当前点 `B` 可到达的 `E` 和 `F` 被添加为下一步移动的候选点（图 16-7）。


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig7_HTML.png](img/490882_1_En_16_Fig7_HTML.png)


    图 16-7 BFS，步骤 2


    然后我们继续处理从点 `A` 可到达的下一个点，即 `C`。我们移动到所选的点，再次发现 `G` 不在此处，因此从 `C` 可到达的点被添加为后续移动的新候选点（图
    16-8）。


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig8_HTML.png](img/490882_1_En_16_Fig8_HTML.png)


    图 16-8 BFS，步骤 3


    然后我们继续处理下一个点 `D`，再次发现 `G` 不在此处，并且 `I` 和 `J` 被添加为新的候选点（图 16-9）。


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig9_HTML.png](img/490882_1_En_16_Fig9_HTML.png)


    图 16-9 BFS，步骤 4


    我们看到来自点 `A` 的所有候选点都已处理完毕，但未能找到点 `G`，因此我们再次从左侧继续。于是我们从点 `B` 移动到它的候选点，第一个候选点是 `E`，我们发现
    `G` 不在此位置，并添加 `K` 作为新候选点，然后继续到下一个点（图 16-10）。


    ![../images/490882_1_En_16_Chapter/490882_1_En_16_Fig10_HTML.png](img/490882_1_En_16_Fig10_HTML.png)


    图 16-10 BFS，步骤 5


    下一个点是 `F`，从 `F` 出发没有路径，这意味着在这种情况下没有添加候选点，此路线结束。然后，我们继续处理下一个点，从 `C` 到达 `H`，显然 `H`
    不是我们要搜索的点，并且 `G` 被添加为新的候选点。接着我们继续到点 `D`。在这里，`I` 和 `J` 这两个候选点都不是我们要找的点，只有 `L` 被添加为新的候选点。从这个点开始，我们再次从左侧开始，即点
    `E`。我们移动到下一个候选点，到达路径终点，但未找到 `G`。由于从点 `F` 没有路径，我们继续到点 `H`，最后，当我们从 `H` 移动时，我们达到了目标，因此搜索在此结束。


    如你所见，广度优先搜索的独特之处在于它如何广泛地搜索那些离起点最近的点。


    **BFS 的优点**


    -   如果存在解，BFS 一定能找到。

    -   它永远不会陷入死胡同。

    -   如果存在多个解，它会以最少的步数找到解。


    **BFS 的缺点**


    -   内存受限。

    -   如果解距离较远，会消耗更多时间。

