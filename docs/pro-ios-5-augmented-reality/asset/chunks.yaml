  trans: "\n# 排版后的文档\n\n回到 Xcode 项目中的 `FirstViewController.m` 文件。我们使用代码清单 5-8 中的代码来填充\
    \ `avAudioPlayerAction` 方法的剩余部分。\n\n**代码清单 5-8.** *完整的 avAudioPlayerAction 方法*\n\
    \n```\n- (void)avAudioPlayerAction {\n    NSError *setCategoryError = nil;\n \
    \       [[AVAudioSession sharedInstance] setCategory:AVAudioSessionCategoryAmbient\n\
    error:&setCategoryError];\n\n        NSString *backgroundMusicPath = [[NSBundle\
    \ mainBundle] pathForResource:@\"backgroundMusic\" ofType:@\"caf\"];\n       \
    \ NSURL *backgroundMusicURL = [NSURL fileURLWithPath:backgroundMusicPath];\n \
    \       NSError *error;\n\n        _audioPlayer = [[AVAudioPlayer alloc] initWithContentsOfURL:backgroundMusicURL\n\
    error:&error];\n[_audioPlayer play];\n}\n```\n\n关于如何结束这个方法，有很多不同的方式。我选择了最简单的一种，那就是直接播放文件。你可以将文件加入队列以便稍后播放，或者从委托方法开始指导如何处理该文件。\n\
    \n在你的 iPhone 模拟器上启动项目。现在，播放这两个文件。你会注意到 `AVAudioPlayer` 方法存在显著的延迟。\n\n## 播放位置音效\n\
    \n对于用户移动屏幕以获取不同视角的增强现实应用，偶尔播放位置音效可能会很有用。你也可以通过 cocos2D 实现位置音效。不过，我们不打算在本章中介绍这部分内容，而且因为还没有引入\
    \ cocos2D，我们将其留到第 7 章再进行讲解。\n\n## 通过振动提供用户反馈\n\n我们有一些非听觉选项可用于向用户提供反馈。最常用的是振动效果。实际上，这简单得令人沮丧。在你的\
    \ `FirstViewController` 类中创建一个名为 `vibrate` 的新方法。添加代码清单 5-9 中的代码。\n\n**代码清单 5-9.**\
    \ *完整的 vibrate 方法*\n\n```\n- (void)vibrate {\n  AudioServicesPlaySystemSound (kSystemSoundID_Vibrate);\n\
    }\n```\n\n就这样。在示例项目中，我创建了另一个按钮并关联了此方法，这样你就可以看到它在工作状态下的表现。如果你在运行它时遇到任何问题，请确保你的\
    \ iPhone 在“设置”面板中已将“振动”开启。\n\n## 录制声音\n\n在本章中，到目前为止，我们已经了解了支持的音频类型及其一些复杂性，以及在\
    \ iOS 应用中播放文件的几种方法。接下来，让我们花点时间来理解如何录制和保存在设备上获取的声音。\n\n我们将使用与之前播放音频示例中相同的 `AVFoundation`\
    \ 框架，但现在用于简单的音频录制。我们已经将框架添加到了项目中，所以不必担心这一步。如果你是从一个新项目开始，你需要像之前一样添加框架。\n\n### 初始化音频录制器\n\
    \n让应用程序准备录制音频的第一步是设置一个新的 `AVAudioRecorder` 对象。你可以手动创建这个对象及其设置，但 Apple 的文档和大多数在线教程都建议从其他\
    \ `init` 选项开始。\n\n在 Xcode 中打开 `SecondViewController.h` 并更新它，如代码清单 5-10 所示。\n\n\
    **代码清单 5-10.** *新的 SecondViewController.h 头文件*\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <AVFoundation/AVFoundation.h>\n\n@interface SecondViewController : UIViewController\
    \ <AVAudioRecorderDelegate,\nAVAudioPlayerDelegate>{\nAVAudioRecorder *_soundRecorder;\n\
    }\n\n- (IBAction)setupRecorder;\n- (IBAction)stopRecorder;\n- (IBAction)playAudioRecording;\n\
    \n@end\n```\n\n逐行查看代码，我们声明了一个 `AVAudioRecorder` 实例对象以及三个方法。在最终的应用程序中，你可能希望整合一些音频录制操作，或者利用委托方法，但我们在这里将它们分开以便参考。你可能注意到了另外两个在本章中已经见过几次的内容。我们正在导入\
    \ `AVFoundation` 头文件，并将此类指定为 `AVAudioRecorderDelegate` 和 `AVAudioPlayerDelegate`。\n\
    \n在 Xcode 中切换到 `SecondView.xib`，并将 `IBActions` 关联到几个新的 `UIButton`。我按照图 5-2 所示布置了我的屏幕。布局上有三个\
    \ `UIButton`。每个按钮都将连接到它们自己的 `IBAction`。\n\n我将 `setupRecorder` 关联到了**录制音频**按钮。接着，我将\
    \ `stopRecorder` 关联到了**停止音频**按钮。最后，我将 `playAudioRecording` 方法关联到了**播放录音**按钮。\n\
    \n接下来，我们必须在 `SecondViewController.m` 中实现这些方法。\n\n![图片](img/0502.jpg)\n\n**图 5-2.**\
    \ *这里我们看到的是用于测试音频录制的屏幕布局。*\n\n在 Xcode 中打开 `SecondViewController.m`。我们必须实现已经声明的方法。让我们从第一个方法\
    \ `setupRecorder` 开始。将代码清单 5-11 中的方法添加到你的实现文件中。\n\n**代码清单 5-11.** *setupRecorder\
    \ 方法*\n\n```\n- (void)setupRecorder {\n    NSString *filePath = [NSHomeDirectory()\n\
    stringByAppendingPathComponent:@\"Documents/recording.caf\"];\n    NSDictionary\
    \ *recordSettings = [[NSDictionary alloc] initWithObjectsAndKeys:\n          \
    \                          [NSNumber numberWithFloat: 44100.0],\nAVSampleRateKey,\n\
    \                                    [NSNumber numberWithInt: kAudioFormatAppleLossless],\n\
    AVFormatIDKey,\n                                    [NSNumber numberWithInt: 1],\
    \ AVNumberOfChannelsKey,\n                                    [NSNumber numberWithInt:\
    \ AVAudioQualityMax],\nAVEncoderAudioQualityKey,nil];\n\n    _soundRecorder =\
    \ [[AVAudioRecorder alloc] initWithURL:[NSURL\nfileURLWithPath:filePath]\n   \
    \                                                              settings:\nrecordSettings\
    \ error: nil];\n    _soundRecorder.delegate = self;\n    [_soundRecorder record];\n\
    }\n```\n\n这个方法首先声明了一个 `NSString` 来表示我们将要保存的文件的路径。接着，我们设置了 `NSDictionary` 对象，它保存了我们的\
    \ `AVAudioRecorder` 的设置。最后，我们将 `AVAudioRecorder` 的 `delegate` 设置为 `self`，并使用 `record`\
    \ 方法开始录制。\n\n在 `setupRecorder` 之后，复制代码清单 5-12 中的下一个方法。\n\n**代码清单 5-12.** *stopRecorder\
    \ 方法*\n\n```\n- (void)stopRecorder {\n    [_soundRecorder stop];\n}\n```\n\n这个方法不难理解。我们只是停止了录制。\n\
    \n现在，在我们完成最后一个方法之前，将代码清单 5-13 中的以下方法添加到 `stopRecorder` 下方。\n\n**代码清单 5-13.** *AVAudioRecorder\
    \ 的委托方法*\n"
- fmt: "```objc\n- (void)audioRecorderDidFinishRecording:(AVAudioRecorder *)recorder\n\
    \                         successfully:(BOOL)flag {\n    NSLog(@\"did finish recording\"\
    );\n}\n\n- (void)audioRecorderBeginInterruption:(AVAudioRecorder *)recorder {\n\
    \    NSLog(@\"recording was interrupted\");\n}\n\n- (void)audioRecorderEndInterruption:(AVAudioRecorder\
    \ *)recorder {\n    NSLog(@\"interruption ended... back to it\");\n}\n```\n\n\
    The `AVAudioRecorderDelegate` that we set up earlier defines a few methods for\
    \ interacting with the `AVAudioRecorder`. We're just logging in each of these\
    \ methods so that you can see when the events fire. The only one that will fire\
    \ in our set of actions is the `audioRecorderDidFinishRecording` method. The other\
    \ two will be fun to test. If you are testing on an iPhone, you can call yourself\
    \ in the middle of debugging the application; when it rings, the `audioRecorderBeginInterruption`\
    \ method will fire. As soon as you hang up the phone, the `audioRecorderEndInterruption`\
    \ method will fire. These events are part of the delegate interface.\n\nWe are\
    \ recording our audio session and storing it to the local file systems. The final\
    \ step is playing it back from local disk. Add the method shown in [Listing 5–14](#Chapter05.html#list_5_14),\
    \ after the three delegate methods we just defined.\n\n**Listing 5–14.** *Playing\
    \ Back the File*\n\n```objc\n- (void)playAudioRecording {\n    NSString * filePath\
    \ = [NSHomeDirectory() stringByAppendingPathComponent:\n                     \
    \      @\"Documents/recording.caf\"];\n    AVAudioPlayer *newPlayer = [[AVAudioPlayer\
    \ alloc] initWithContentsOfURL: [NSURL\n                                fileURLWithPath:filePath]\
    \ error: nil];\n    newPlayer.delegate = self;\n    [newPlayer play];\n}\n```\n\
    \nThis code should look familiar. Earlier in the chapter, we learned the same\
    \ process for playing audio. We're now ready to test the application. To do this\
    \ properly, you should be using a physical testing device and not the simulator.\
    \ Although most of it will function on the simulator, it's still better to test\
    \ sound recording from a real device.\n\nRun the application and switch to the\
    \ second tab. Start at the top and click the **Record Audio** button. Either talk\
    \ into the microphone or make sure you have enough background noise to get a real\
    \ sample recording. When you're done, click the **Stop Recording** button. In\
    \ the console, you should see the log message, “**did finish recording**”. Finally,\
    \ click **Play Recording** and you should hear your sound played back over the\
    \ speakers. Make sure your phone isn't force muted.\n\n### Summary\n\nIn this\
    \ chapter we learned about the different internals of iOS audio formats. We talked\
    \ about bit rates and file formats, as well as which are supported and preferred\
    \ in iOS. We also went through a few utilities that are available for use if you\
    \ need to test a file, or convert it to another format.\n\nIn the next chapter,\
    \ we're going to switch from audio to video, and start laying the groundwork for\
    \ augmented-reality programming. To this point, the chapters have covered fundamental\
    \ pieces of applications we'll be building. In the next chapter, we'll actually\
    \ start to see things that resemble augmented-reality applications.\n\n## Chapter\
    \ 6\n\n## Camera and Video Capture\n\nAugmented reality applications typically\
    \ share one common element: they are built on top of the live video feed.\n\n\
    In this chapter, we’ll start with basic concepts of using the camera, and quickly\
    \ move on to more advanced examples of video capture, and analyzing the video\
    \ frame by frame.\n\nIn the later chapters, we will be using these concepts to\
    \ build applications that overlay the video feed.\n\n### Quick Review\n\nIn [Chapter\
    \ 2](#Chapter02.html#ch2), we discussed the importance of checking for the presence\
    \ and the availability of a sensor or hardware component before trying to access\
    \ it in your code.\n\nYou can programmatically detect what camera is available\
    \ on your device using the `UIImagePickerController` class. There is a method\
    \ called `isSourceTypeAvailable` that we can use to determine whether the camera\
    \ we want to use is available. [Listing 6–1](#Chapter06.html#list_6_1) shows the\
    \ sample method we used in [Chapter 2](#Chapter02.html#ch2) to detect a camera\
    \ and use the front-facing camera when it is available.\n\n**Listing 6–1.** *Checking\
    \ for a Camera, Then a Front-Facing Camera*\n\n```objc\nBOOL cameraAvailable =\
    \ [UIImagePickerController\n                        isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera];\n\
    \    BOOL frontCameraAvailable = [UIImagePickerController\n                  \
    \               isSourceTypeAvailable:UIImagePickerControllerCameraDeviceFront];\n\
    \n    if (cameraAvailable) {\n        UIAlertView *alert = [[UIAlertView alloc]\
    \ initWithTitle:@\"Camera\"\n                                                \
    \        message:@\"Camera Available\"\n                                     \
    \                  delegate:self\n                                           \
    \   cancelButtonTitle:@\"OK\"\n                                              otherButtonTitles:nil,\
    \ nil];\n        [alert show];\n        [alert release];\n    } else {\n     \
    \   UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"Camera\"\n    \
    \                                                    message:@\"Camera NOT Available\"\
    \n                                                       delegate:self\n     \
    \                                         cancelButtonTitle:@\"OK\"\n        \
    \                                      otherButtonTitles:nil, nil];\n        [alert\
    \ show];\n        [alert release];\n    }\n\n    if (frontCameraAvailable) {\n\
    \        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"Camera\"\n\
    \                                                        message:@\"Front Camera\
    \ Available\"\n                                                       delegate:self\n\
    \                                              cancelButtonTitle:@\"OK\"\n   \
    \                                           otherButtonTitles:nil, nil];\n   \
    \     [alert show];\n        [alert release];\n    } else {\n        UIAlertView\
    \ *alert = [[UIAlertView alloc] initWithTitle:@\"Camera\"\n                  \
    \                                      message:@\"Front Camera NOT Available\"\
    \n                                                       delegate:self\n     \
    \                                         cancelButtonTitle:@\"OK\"\n        \
    \                                      otherButtonTitles:nil, nil];\n        [alert\
    \ show];\n        [alert release];\n    }\n```\n\nThis code block will demonstrate\
    \ the results in a quick `UIAlertView` pop-up. Actually, you’ll get two pop-ups\
    \ from this example. You can see in the first few lines of [Listing 6–1](#Chapter06.html#list_6_1)\
    \ where we are checking for the existence of `UIImagePickerControllerSourceTypeCamera`\
    \ to see whether the camera is available. We next check for the existence of the\
    \ front-facing camera using the `UIImagePickerControllerCameraDeviceFront` parameter.\
    \ The `isSourceTypeAvailable` method returns a `BOOL` value. We use that in our\
    \ `if`/`else` statements, and display the appropriate `UIAlertView` for each check.\n\
    \nYou will remember from [Chapter 2](#Chapter02.html#ch2) that the Xcode simulators\
    \ do not support camera or video capture. Because of this, you must execute all\
    \ examples in this chapter on a physical device.\n\nLet's start with capturing\
    \ a basic photo, before moving on to video."
