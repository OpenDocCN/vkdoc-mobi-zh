- fmt: '### Powered by String


    Let''s start with the Powered by String SDK. Open your browser to [`http://poweredbystring.com/developers/register`](http://poweredbystring.com/developers/register).
    You should be on the registration page; fill out the information requested.


    After you''ve registered and signed in, go to [`http://poweredbystring.com/licensing`](http://poweredbystring.com/licensing)
    and download the Demo version of the toolkit. You''ll be asked for some more information,
    then taken to a screen that looks like [Figure 9–1](#Chapter09.html#fig_9_1).


    ![Image](images/0901.jpg)


    **Figure 9–1.** *Go to the Powered by String download to get the Demo version.*


    Download the latest version of the SDK. On your local machine, unzip the archive
    and find the `OGL Tutorial` directory. Open the Xcode project and run it on a
    physical device. Open the `Marker1.png` file on your computer screen. After the
    application launches, direct the camera so the marker comes into focus. [Figure
    9–2](#Chapter09.html#fig_9_2) shows the result.


    ![Image](images/0902.jpg)


    **Figure 9–2.** *View the marker in the String SDK sample application.*


    This application is something we''ll dive into more in [Chapter 10](#Chapter10.html#ch10),
    so you don''t have to worry too much about the contents at the moment. However,
    if this is your first marker-based AR application, this might be pretty interesting.
    With just a few lines of code, String was able to load and capture the marker
    from our camera''s view.


    ### String''s Basic Workflow


    Again, we''ll be looking at a full tutorial for String in the next chapter, but
    here''s the basic steps required to implement an OpenGL AR application using String''s
    SDK.


    First, you need to add the `Libraries` and `Headers` folders from the source download
    (where you found the sample application). You will also need the `AVFoundation`,
    `CoreGraphics`, `CoreMedia`, and `CoreVideo` frameworks.


    One of the great things about the String SDK is that you can add it to any view
    controller (or even another class). You simply create an instance of the `StringOGL`
    class and implement the `StringOGLDelegate` protocol. This protocol only requires
    that you implement a `render` method.


    Before you initialize string, you should set up your `framebuffer`, `renderbuffer`,
    projection matrix, viewport, and other initial states as you normally would in
    an OpenGL application. Most of this is taken care of you in the OpenGL ES Game
    template provided by Xcode. The code you will add to initialize String will look
    something like [Listing 9–1](#Chapter09.html#list_9_1).


    **Listing 9–1.** *String Sample Initialization Code*


    ```

    stringOGL = [[StringOGL alloc] initWithDelegate: self context: myEAGLContext

    frameBuffer: myFrameBuffer leftHanded: NO];

    [stringOGL setProjectionMatrix: myProjectionMatrix viewport: myViewport

    orientation: [self interfaceOrientation] reorientIPhoneSplash: NO];

    ```


    String recommends you don''t allow your application to rotate. In some of our
    sample applications, we actually follow that same recommendation, even though
    not every toolkit requires or recommends this approach.


    Markers are required for String. In comparison, String has the least restrictive
    requirements for markers. Markers should be included in your main bundle as PNG
    files. Surprisingly, the smaller they are, the better they work. This has more
    to do with the loading time of the toolkit than the resolution of the marker,
    as you might expect. After you include your PNG files, you can load them, as shown
    in [Listing 9–2](#Chapter09.html#list_9_2).


    **Listing 9–2.** *Load String Markers*


    ```

    myMarkerID = [stringOGL loadImageMarker: @"MyMarker" ofType: @"png"];

    ```


    String performs very well with high contrast (near black on near white) markers
    and doesn''t require a high level of detail. Also, String can track countless
    markers at a time in the paid versions of the toolkit. The drawback with the marker-recognition
    algorithms from String is the lack of ability to track a partial marker. If it
    is at all obstructed or moves from the view, String loses the marker entirely.
    Also, String''s object ratio is set on a percentage scale from the marker. For
    example, String considers that all markers have a diagonal length of one unit.
    So, if you''d like your marker''s diagonal to have a length of five, you need
    to multiply the tracked position by five before projecting your image. These settings
    can be applied to normal OpenGL transforms.


    As I mentioned, there is only one required delegate method in the protocol. You
    need to implement the `render` method in your class. The suggested format for
    this method is shown in [Listing 9–3](#Chapter09.html#list_9_3).


    **Listing 9–3.** *Suggested Format for render Method*


    ```

    - (void)render

    {

    // Read data for markers that were detected this frame

    const int maxMarkerCount = 10;

    struct MarkerInfoMatrixBased markerInfo[10];

    !

    int markerCount = [stringOGL getMarkerInfoMatrixBased: markerInfo

    maxMarkerCount: maxMarkerCount];

    // Iterate through detected markers

    for (int i = 0; i < markerCount; i++)

    {

    // Draw appropriate content for this image marker

    }

    }

    ```


    Not much code is expected to get the framework to function. You simply track the
    markers, then iterate through the marker information. If you are using a license
    that tracks more than one marker, you might have different actions for each marker.
    You can tell which marker is being tracked using the `markerInfo` class.


    Each marker has a specific color, `imageID`, and `uniqueInstanceID`. The `uniqueInstanceID`
    is helpful if you have multiple markers that are identical. They can be tracked
    separately using this property.


    ### Extra Functionality


    String also provides some easy wrappers for useful functions you might need in
    your AR application. In some cases, like in our facial-recognition examples later
    in this book, we need direct access to the frame buffer. String actually "owns"
    the screen buffer delegate, so we need to request each frame from String using
    the `getCurrentVideoBuffer` method. The method is shown in [Listing 9–4](#Chapter09.html#list_9_4).


    **Listing 9–4.** *Get the Current Frame Buffer*


    ```

    - (void)getCurrentVideoBuffer: (unsigned *)buffer viewToVideoTextureTransform:

    (float *)viewToVideoTextureTransform;

    ```


    This method retrieves the current video texture and a matrix to transform coordinates
    from view space to texture space for OpenGL. We don''t actually require all that
    information for our other examples. If you decide you do want to track markers
    and analyze the frame buffer, you should call this method on each frame because
    the video stream is double buffered.


    The second useful function is String''s helpful method to provide snapshots of
    the screen buffer. This would be useful for e-mailing pictures of your application
    or posting them to Facebook, etc. [Listing 9–5](#Chapter09.html#list_9_5) shows
    this simple method.


    **Listing 9–5.** *Take a Snapshot of the Frame Buffer*


    ```

    - (void)takeSnapshotAndPause;

    ```


    This method is set up almost like an asynchronous callback method. You need to
    wait before you call the `resume` method until the `handleSnapshot` method (which
    you''ll also need to implement) has completed.


    ### Unity Integration


    Unity 3D isn''t something we''re covering in this book, but Apress has many titles
    available on the subject. Unity is a super-powerful 3D gaming engine that has
    native integration with String. If you''re interested in Unity, you can build
    an AR application with zero lines of code right from their starter projects.'
