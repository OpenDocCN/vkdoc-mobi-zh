    \ CV_ErrModeParent );\n\n    xmlPath    = [ [ NSBundle mainBundle ] pathForResource:\
    \ @\"haarcascade_frontalface_default\" ofType: @\"xml\" ];\n    image      = [\
    \ self createIplImage: cameraView.image ];\n    smallImage = cvCreateImage( cvSize(\
    \ image->width / scale, image->height / scale ),\nIPL_DEPTH_8U, 3 );\n\n    cvPyrDown(\
    \ image, smallImage, CV_GAUSSIAN_5x5 );\n\n    cascade = ( CvHaarClassifierCascade\
    \ * )cvLoad( [ xmlPath cStringUsingEncoding:\nNSASCIIStringEncoding ], NULL, NULL,\
    \ NULL );\n    storage = cvCreateMemStorage( 0 );\n    faces   = cvHaarDetectObjects(\
