    `@end`


    We made a few small changes here. In the `viewDidAppear` method, we present our
    modal AR controller. This allows us to reuse the code we are building in other
    applications without re-creating the base `UIViewController`s. In the `loadView`
    method, we allocate our new `arController` instance with the `UIImagePickerController`
    and HUD layer.


    We have one more step before we have our base project set up with a `UIImagePicker`
    (camera view) under our user interface. Open `AppDelegate.h` in Xcode. Update
    the header file as shown in [Listing 11–6](#Chapter11.html#list_11_6).


    **Listing 11–6.** *Updated AppDelegate.h*


