    there isn’t an appropriate build for the architecture of our devices and simulators.
    We used a static library for this example that needs to be updated. Let’s update
    that and try again.


    OpenCV has a lot of great open source build scripts. The version I have used the
    most was contributed by YoshimasaNiwa ([`https://github.com/niw`](https://github.com/niw)).
    We’ll be following this recommendation to fix our sample project. Download the
    OpenCV source for 2.2.0 from this URL: [`http://sourceforge.net/projects/opencvlibrary/files/opencv-unix/2.2/OpenCV-2.2.0.tar.bz2/download`](http://sourceforge.net/projects/opencvlibrary/files/opencv-unix/2.2/OpenCV-2.2.0.tar.bz2/download).


    **NOTE:** There may be new versions of OpenCV available. This routine should still
    work without issue. If you can’t find 2.2.0, try to use a newer version.


    Open the command line utility on your Mac. Navigate to the directory where you
    downloaded the archive. Run the command from [Listing 12–11](#Chapter12.html#list_12_11).


