    Update the `didFinishPickingImage` method, as shown in [Listing 12–23](#Chapter12.html#list_12_23).


    **Listing 12–23.** *Updated didFinishPickingImage Method*


    `- (void)imagePickerController:(UIImagePickerController *)picker`

    `didFinishPickingImage:(UIImage *)image editingInfo:(NSDictionary *)editingInfo
    {`

    `    [self dismissModalViewControllerAnimated:YES];`

    `    cameraView.image = image;`


    `    [self openCVFaceDetect];`

    `    //[self CIDetectorFaceDetect];`

    `    //[self FaceDotComFaceDetect];`

    `}`


    Run the project. You should see output similar to [Listing 12–24](#Chapter12.html#list_12_24)
    in your console. It does take a few seconds to print the output, so be patient.


    **Listing 12–24.** *Console Output*


    `2011-10-22 15:12:27.753 OpenCV-iPad[26058:10103] ==== Start non-chunk timestamp
    data`

    `(from "LogTimestamp") ====`

    `2011-10-22 15:12:27.754 OpenCV-iPad[26058:10103] * -[MainViewController`

    `openCVFaceDetect]:  76`

    `2011-10-22 15:12:27.754 OpenCV-iPad[26058:10103] * -[MainViewController`

    `openCVFaceDetect]: 163 -  664215125 nsec since last timestamp`

    `2011-10-22 15:12:27.755 OpenCV-iPad[26058:10103] ==== End timestamp data ====`


    It appears that it took 61231366 nanoseconds to process the image using OpenCV.
    Repeat the process for the other approaches. My results show that CIDetector took
    about 29 percent of the time of OpenCV. Plus, if you add some measurements to
    the applications launch time, you’ll notice that OpenCV takes drastically more
    time than the other approaches to start up.


    CIDetector only took 18 percent of the time of face.com. This, of course, is understandably
    due to the network callout and huge response returned and parsed using the native
    JSON serialization classes.


    Comparing OpenCV and face.com is interesting. OpenCV, which again takes full seconds
    longer on application startup, was about 35 percent faster than the full face.com
    transaction. In subsecond timing, that’s nearly indistinguishable to the user.


    ### Summary


    We learned a lot in this chapter. There are some paint points involved in the
    older approaches to facial recognition, like OpenCV. These libraries have been
    around for years and are missing some of the ease we take for granted in native
    Objective-C functions and macros. However, they are powerful libraries and have
    paved the way for the innovations we demonstrated in the newer approaches to facial
    recognition.


    We talked about the new iOS 5 `CIDetector` class and its ability to analyze the
    native `UIImage` object for facial patterns without the need to load Haar cascades
    or train the library with samples.


    Finally, we covered a non-native approach using a free REST API that has the capability
    of analyzing raw JPEG data. This approach also helped us introduce the native
    JSON parsing that is new to iOS 5.


    All of these approaches had their advantages and disadvantages. We took a quick
    look at the speed performance of the transactions using an iPad 2 and found that
    the new iOS 5 `CIDetector` classes outperform both the other approaches significantly.
    It is important to note that face.com does require a full network callout and
    response and almost kept up with the native approaches. Also, if you’re using
    a cross-platform application or you have additional capabilities on a web API,
    the face.com approach might lend itself to your needs better than a fully native
    approach.


    In [Chapter 13](#Chapter13.html#ch13), we’ll take a deeper look at the face.com
    approach. We’ll analyze the screen buffer and send a request to face.com every
    few seconds. We’ll use cocos2D to overlay some information on the screen about
    the response.


