    ### Recording Sound


    So far in this chapter, we''ve learned about the supported sound types and some
    of their intricacies, as well as a few approaches on how to play files in iOS
    applications. Next, let''s take some time to understand how to record and save
    sound that you gather from the device.


    We''re going to be using the same `AVFoundation` framework we used in our previous
    example of playing audio, but now for simple audio recording. We already added
    the framework to our project, so you won''t have to worry about that step. If
