    ```\n- (void)setupRecorder {\n    NSString *filePath = [NSHomeDirectory()\nstringByAppendingPathComponent:@\"\
    Documents/recording.caf\"];\n    NSDictionary *recordSettings = [[NSDictionary\
    \ alloc] initWithObjectsAndKeys:\n                                    [NSNumber\
    \ numberWithFloat: 44100.0],\nAVSampleRateKey,\n                             \
    \       [NSNumber numberWithInt: kAudioFormatAppleLossless],\nAVFormatIDKey,\n\
    \                                    [NSNumber numberWithInt: 1], AVNumberOfChannelsKey,\n\
    \                                    [NSNumber numberWithInt: AVAudioQualityMax],\n\
    AVEncoderAudioQualityKey,nil];\n\n    _soundRecorder = [[AVAudioRecorder alloc]\
    \ initWithURL:[NSURL\nfileURLWithPath:filePath]\n                            \
    \                                     settings:\nrecordSettings error: nil];\n\
    \    _soundRecorder.delegate = self;\n    [_soundRecorder record];\n}\n```\n\n\
    This method starts by declaring an `NSString` to represent the path of the file\
    \ we'll be saving. Next, we set up the `NSDictionary` object that holds the settings\
    \ for our `AVAudioRecorder`. Finally, we set the `delegate` of the `AVAudioRecorder`\
    \ to `self`, and start the recording using the `record` method.\n\nCopy the next\
    \ method from [Listing 5–12](#Chapter05.html#list_5_12) just after `setupRecorder`.\n\
    \n**Listing 5–12.** *stopRecorder Method*\n\n```\n- (void)stopRecorder {\n   \
    \ [_soundRecorder stop];\n}\n```\n\nThis method isn't too hard to follow. We're\
    \ just stopping the recording.\n\nNow, before we finish the last method, add the\
    \ following method from [Listing 5–13](#Chapter05.html#list_5_13) under `stopRecorder`.\n\
