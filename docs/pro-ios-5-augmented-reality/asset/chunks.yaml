    `}`


    `- (void)viewDidUnload`

    `{`

    `    [super viewDidUnload];`


    `    // Release any retained subviews of the main view.`

    `    // e.g. self.myOutlet = nil;`

    `}`


    `- (void)dealloc`

    `{`

    **`    [locationTextView release];  // release the UITextView`**

    **`locationTextView = nil; // good practice to set to nil after release`**

    `    [superdealloc];`

    `}`

    `@end`


    You might notice that I released the variable, then also set it equal to `nil`.
    In most cases, this is a good practice for memory management. This book isn''t
    focused on those topics, but we''ll point out some details appropriate to augmented
    reality and memory management as they come up. Augmented-reality applications
