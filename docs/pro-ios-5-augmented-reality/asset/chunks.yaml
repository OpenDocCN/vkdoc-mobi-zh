- fmt: "#### Corrected Heading\n\nWe’ve actually discussed this concept already in\
    \ the book. I’m not sure there’s a standard term for this, but remember back to\
    \ our magnetometer discussion in [Chapter 4](#Chapter04.html#ch4) where we discussed\
    \ orientation changes. Consider an iPhone in portrait view with a heading of north.\
    \ If you lay the iPhone on its side, and it is now in landscape right mode (for\
    \ example), you are still facing north, but the iPhone’s heading might mistakenly\
    \ think you have changed your heading to west.\n\nWhen the orientation changes\
    \ in an AR application (especially one built around location-based information),\
    \ you must take care to adjust your heading accordingly.\n\n### Building the Application\n\
    \nLet’s get started. Open Xcode and create a project called `Ch11` using the `Empty\
    \ Application` template. This template builds a simple application using a single\
    \ window.\n\n#### Credits\n\nThere are a lot of works on `github.com`, `stackoverflow.com`,\
    \ Apple’s developer forums, and other various online communities that discuss\
    \ location-based AR. There are toolkits like ARKit ([`https://github.com/zac/iphonearkit`](https://github.com/zac/iphonearkit)),\
    \ which has almost 100 different forked variations from contributors. The work\
    \ in this chapter is based on some of those variations. So, I would like to credit\
    \ Zac White and Niels Hansen, specifically, for providing a starting point upon\
    \ which we could build.\n\n#### Required Frameworks\n\nWe are building a location-based\
    \ application. As you might have guessed, we need to add the `CoreLocation` Framework\
    \ to the project. Make sure you have that included before you move ahead.\n\n\
    #### Adding the Facebook iOS SDK\n\nWhen we downloaded the SDK earlier, there\
    \ was an example application provided. Because we are now starting with a clean\
    \ application, we need to add the SDK back to this project.\n\nOpen the archived\
    \ SDK directory in Finder. Drag the `src` directory from the SDK to your Xcode\
    \ project. Make sure you select the option to copy resources to the project’s\
    \ directory. We will get back to this later in the chapter.\n\n#### And, We’re\
    \ Off!\n\nOkay, enough setup. Let’s get coding. Create a Group in your Xcode project\
    \ called `ARController`. We’ll separate the AR-specific code here so you can reuse\
    \ it in your own projects later.\n\nCreate a new class in the `ARController` Group\
    \ called `ARController.m`. Make sure this class subclasses `NSObject` and not\
    \ `UIViewController`. Open `ARController.h` in Xcode. Update the interface as\
    \ shown in [Listing 11–2](#Chapter11.html#list_11_2).\n\n**Listing 11–2.** *Updated\
    \ ARController.h*\n\n```\n#import <Foundation/Foundation.h>\n#import <CoreLocation/CoreLocation.h>\n\
    #import <UIKit/UIKit.h>\n\n@interface ARController : NSObject <UIAccelerometerDelegate,\
    \ CLLocationManagerDelegate>\n{\n\n}\n\n@property (nonatomic, retain) UIViewController\
    \ *rootViewController;\n@property (nonatomic, retain) UIImagePickerController\
    \ *pickerController;\n@property (nonatomic, retain) UIView *hudView;\n@property\
    \ (nonatomic, retain) CLLocationManager *locationManager;\n@property (nonatomic,\
    \ retain) UIAccelerometer *accelerometer;\n\n- (id)initWithViewController:(UIViewController\
    \ *)viewController;\n- (void)presentModalARControllerAnimated:(BOOL)animated;\n\
    \n@end\n```\n\nWe are setting up some properties here for later use. I’ll explain\
    \ each of these in detail in the implementation file. Switch over to `ARController.m`\
    \ and add the code from [Listing 11–3](#Chapter11.html#list_11_3).\n\n**Listing\
    \ 11–3.** *ARController.m*\n\n```\n#import \"ARController.h\"\n\n@implementation\
    \ ARController\n@synthesize rootViewController = _rootViewController;\n@synthesize\
    \ pickerController = _pickerController;\n@synthesize hudView = _hudView;\n@synthesize\
    \ locationManager = _locationManager;\n@synthesize accelerometer = _accelerometer;\n\
    \n- (id)initWithViewController:(UIViewController *)viewController {\n    self.rootViewController\
    \ = viewController;\n    CGRect screenBounds = [[UIScreen mainScreen] bounds];\n\
    \    self.hudView = [[UIView alloc] initWithFrame:screenBounds];\n    self.rootViewController.view\
    \ = self.hudView;\n\n    self.pickerController = [[[UIImagePickerController alloc]\
    \ init] autorelease];\n        self.pickerController.sourceType = UIImagePickerControllerSourceTypeCamera;\n\
    \        self.pickerController.cameraViewTransform = CGAffineTransformScale(\n\
    self.pickerController.cameraViewTransform, 1.13f,  1.13f);\n\n        self.pickerController.showsCameraControls\
    \ = NO;\n        self.pickerController.navigationBarHidden = YES;\n        self.pickerController.cameraOverlayView\
    \ = _hudView;\n\n        self.locationManager = [[CLLocationManager alloc] init];\n\
    \        self.locationManager.headingFilter = kCLHeadingFilterNone;\n        self.locationManager.desiredAccuracy\
    \ = kCLLocationAccuracyBest;\n        self.locationManager.delegate = self;\n\
    \        [self.locationManager startUpdatingHeading];\n        [self.locationManager\
    \ startUpdatingLocation];\n\n        _accelerometer = [UIAccelerometer sharedAccelerometer];\n\
    \        _accelerometer.updateInterval = 0.25;\n        _accelerometer.delegate\
    \ = self;\n\n    [[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(deviceOrientationDidChange:)\
    \ name:UIDeviceOrientationDidChangeNotification object:nil];\n    [[UIDevice currentDevice]\
    \ beginGeneratingDeviceOrientationNotifications];\n\n    return self;\n}\n\n-\
    \ (void)presentModalARControllerAnimated:(BOOL)animated {\n    [self.rootViewController\
    \ presentModalViewController:[self pickerController] animated:animated];\n   \
    \ _hudView.frame = _pickerController.view.bounds;\n}\n\n- (void)deviceOrientationDidChange:(NSNotification\
    \ *)notification {\n\n}\n\n@end\n```\n\nLet’s step through this section, before\
    \ we get too far ahead. First, we need to synthesize the properties we defined\
    \ in our implementation file. We have three methods so far in this class. First,\
    \ the `initWithViewController` method is used to add a `UIImagePicker` (much like\
    \ we did in [Chapter 7](#Chapter07.html#ch7)) to the view, and then overlay it\
    \ with a new type of HUD layer."
  raw: '#### Corrected Heading


    We''ve actually discussed this concept already in the book. I''m not sure there''s
    a standard term for this, but remember back to our magnetometer discussion in
    [Chapter 4](#Chapter04.html#ch4) where we discussed orientation changes. Consider
    an iPhone in portrait view with a heading of north. If you lay the iPhone on its
    side, and it is now in landscape right mode (for example), you are still facing
    north, but the iPhone''s heading might mistakenly think you have changed your
    heading to west.


    When the orientation changes in an AR application (especially one built around
    location-based information), you must take care to adjust your heading accordingly.


    ### Building the Application


    Let''s get started. Open Xcode and create a project called Ch11 using the `Empty
    Application` template. This template builds a simple application using a single
    window.


    #### Credits


    There are a lot of works on github.com, stackoverflow.com, Apple''s developer
    forums, and other various online communities that discuss location-based AR. There
    are toolkits like ARKit ([`https://github.com/zac/iphonearkit`](https://github.com/zac/iphonearkit)),
    which has almost 100 different forked variations from contributors. The work in
    this chapter is based on some of those variations. So, I would like to credit
    Zac White and Niels Hansen, specifically, for providing a starting point upon
    which we could build.


    #### Required Frameworks


    We are building a location-based application. As you might have guessed, we need
    to add the `CoreLocation` Framework to the project. Make sure you have that included
    before you move ahead.


    #### Adding the Facebook iOS SDK


    When we downloaded the SDK earlier, there was an example application provided.
    Because we are now starting with a clean application, we need to add the SDK back
    to this project.


    Open the archived SDK directory in Finder. Drag the `src` directory from the SDK
    to your Xcode project. Make sure you select the option to copy resources to the
    project''s directory. We will get back to this later in the chapter.


    #### And, We''re Off!


    Okay, enough setup. Let''s get coding. Create a Group in your Xcode project called
    `ARController`. We''ll separate the AR-specific code here so you can reuse it
    in your own projects later.


    Create a new class in the `ARController` Group called `ARController.m`. Make sure
    this class subclasses `NSObject` and not `UIViewController`. Open `ARController.h`
    in Xcode. Update the interface as shown in [Listing 11–2](#Chapter11.html#list_11_2).


    **Listing 11–2.** *Updated ARController.h*


    `#import <Foundation/Foundation.h>`

    `#import <CoreLocation/CoreLocation.h>`

    `#import <UIKit/UIKit.h>`


    `@interface ARController : NSObject <UIAccelerometerDelegate, CLLocationManagerDelegate>`

    `{`


    `}`


    `@property (nonatomic, retain) UIViewController *rootViewController;`

    `@property (nonatomic, retain) UIImagePickerController *pickerController;`

    `@property (nonatomic, retain) UIView *hudView;`

    `@property (nonatomic, retain) CLLocationManager *locationManager;`

    `@property (nonatomic, retain) UIAccelerometer *accelerometer;`


    `- (id)initWithViewController:(UIViewController *)viewController;`

    `- (void)presentModalARControllerAnimated:(BOOL)animated;`


    `@end`


    We are setting up some properties here for later use. I''ll explain each of these
    in detail in the implementation file. Switch over to `ARController.m` and add
    the code from [Listing 11–3](#Chapter11.html#list_11_3).


    **Listing 11–3.** *ARController.m*


    `#import "ARController.h"`


    `@implementation ARController`

    `@synthesize rootViewController = _rootViewController;`

    `@synthesize pickerController = _pickerController;`

    `@synthesize hudView = _hudView;`

    `@synthesize locationManager = _locationManager;`

    `@synthesize accelerometer = _accelerometer;`


    `- (id)initWithViewController:(UIViewController *)viewController {`

    `    self.rootViewController = viewController;`

    `    CGRect screenBounds = [[UIScreen mainScreen] bounds];`

    `    self.hudView = [[UIView alloc] initWithFrame:screenBounds];`

    `    self.rootViewController.view = self.hudView;`


    `    self.pickerController = [[[UIImagePickerController alloc] init] autorelease];`

    `        self.pickerController.sourceType = UIImagePickerControllerSourceTypeCamera;`

    `        self.pickerController.cameraViewTransform = CGAffineTransformScale(`

    `self.pickerController.cameraViewTransform, 1.13f,  1.13f);`


    `        self.pickerController.showsCameraControls = NO;`

    `        self.pickerController.navigationBarHidden = YES;`

