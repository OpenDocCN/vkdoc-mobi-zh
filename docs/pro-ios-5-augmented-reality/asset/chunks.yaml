    \ we need to import the required headers to set up our view. [Listing 10–12](#Chapter10.html#list_10_12)\
    \ shows the `import` statements that are required for this class.\n\n**Listing\
    \ 10–12.** *import Statements for ViewController*\n\n```\n#import \"StringOGL.h\"\
    \n#import <OpenGLES/EAGL.h>\n#import <OpenGLES/ES1/gl.h>\n#import <OpenGLES/ES1/glext.h>\n\
    #import <OpenGLES/ES2/gl.h>\n#import <OpenGLES/ES2/glext.h>\n```\n\nNext, we have\
    \ to nominate `ViewController` as a `StringOGLDelegate` class. While we do this,\
    \ let's also define our instance variables. Copy the code from [Listing 10–13](#Chapter10.html#list_10_13)\
    \ to the interface block.\n\n**Listing 10–13.** *Instance Variables*\n\n```\n\
    @interface ViewController : UIViewController <StringOGLDelegate> {\n    EAGLContext\
    \ *context;\n    StringOGL *stringOGL;\n    float projectionMatrix[16];\n    BOOL\
    \ animating;\n}\n```\n\nNext, define the methods shown in [Listing 10–14](#Chapter10.html#list_10_14).\n\
    \n**Listing 10–14.** *Instance Methods*\n\n```\n- (void)startAnimation;\n- (void)stopAnimation;\n\
    ```\n\nI'll explain these methods and what they do when we implement them later\
    \ in this chapter. Switch over to `ViewController.m`. The first method we need\
    \ to add creates a standard projection matrix for our 3D object. This method is\
    \ about as basic of a projection matrix as possible. It's modeled slightly after\
    \ the `glFrustum` specification. `glFrustum` describes a perspective matrix that\
    \ produces a perspective projection. This is done by multiplying the current matrix\
    \ by the `glFrustum` matrix and then replacing the current matrix with the resulting\
    \ matrix. Add the code from [Listing 10–15](#Chapter10.html#list_10_15), just\
    \ before the `didReceiveMemoryWarning` method.\n\n**Listing 10–15.** *Create the\
    \ Projection Matrix*\n\n```\n- (void)createProjectionMatrix: (float *)matrix verticalFOV:\
    \ (float)verticalFOV aspectRatio: (float)aspectRatio nearClip: (float)nearClip\
    \ farClip: (float)farClip\n{\n        memset(matrix, 0, sizeof(*matrix) * 16);\n\
    \n        float tan = tanf(verticalFOV * M_PI / 360.f);\n\n        matrix[0] =\
    \ 1.f / (tan * aspectRatio);\n        matrix[5] = 1.f / tan;\n        matrix[10]\
    \ = (farClip + nearClip) / (nearClip - farClip);\n        matrix[11] = -1.f;\n\
    \        matrix[14] = (2.f * farClip * nearClip) / (nearClip - farClip);\n}\n\
    ```\n\nI'll refer you again to the Apress publication on OpenGL programming for\
    \ iOS (*Pro OpenGL ES for iOS*) for more detail into what exactly is going on\
    \ with this method. However, as you read through this method, keep in mind that\
    \ depth buffer precision is affected by the values of `nearClip` and `farClip`.\
    \ As the ratio of `farClip` to `nearClip` increases, the depth buffer will be\
    \ less distinguishable between surfaces that are near each other in the view.\
    \ `nearClip` can never be set to zero because the multiplier approaches infinity\
    \ as `nearClip` approaches zero.\n\nWe defined two methods in our header that\
    \ we'll complete next. However, before we move on, import the `EAGLView` header\
    \ to `ViewController.h`. Then, add the code from [Listing 10–16](#Chapter10.html#list_10_16)\
    \ to the `ViewController`.\n\n**Listing 10–16.** *Animation Start and Stop Methods*\n\
    \n```\n- (void)startAnimation\n{\n    if (!animating) {\n        [stringOGL resume];\n\
    \        animating = TRUE;\n    }\n}\n\n- (void)stopAnimation\n{\n    if (animating)\
    \ {\n        [stringOGL pause];\n        animating = FALSE;\n    }\n}\n```\n\n\
    There is only one required method for a class that implements the `StringOGLDelegate`\
    \ protocol. That is the render method. This method handles the actions that the\
    \ String SDK will take after it recognizes a potential marker. Add the method\
    \ from [Listing 10–17](#Chapter10.html#list_10_17) to the `ViewController`.\n\n\
    **Listing 10–17.** *Render the 3D Objects*\n\n```\n- (void)render\n{\n    [(EAGLView\
    \ *)self.view setFramebuffer];\n\n    static const GLfloat squareVertices[] =\
    \ {\n        -0.33f, -0.33f,\n        0.33f, -0.33f,\n        -0.33f,  0.33f,\n\
    \        0.33f,  0.33f,\n    };\n\n    static const GLubyte squareColors[] = {\n\
    \        255, 255,   0, 255,\n        0,   255, 255, 255,\n        0,     0, \
    \  0,   0,\n        255,   0, 255, 255,\n    };\n\n        const int maxMarkerCount\
    \ = 10;\n        struct MarkerInfoMatrixBased markerInfo[10];\n\n        int markerCount\
    \ = [stringOGL getMarkerInfoMatrixBased: markerInfo maxMarkerCount: maxMarkerCount];\n\
    \    for (int i = 0; i < markerCount; i++)\n{\n        glMatrixMode(GL_PROJECTION);\n\
    \        glLoadMatrixf(projectionMatrix);\n\n        glMatrixMode(GL_MODELVIEW);\n\
    \        glLoadIdentity();\n        glMultMatrixf(markerInfo[i].transform);\n\n\
    \        glVertexPointer(2, GL_FLOAT, 0, squareVertices);\n        glEnableClientState(GL_VERTEX_ARRAY);\n\
    \        glColorPointer(4, GL_UNSIGNED_BYTE, 0, squareColors);\n        glEnableClientState(GL_COLOR_ARRAY);\n\
    \n        glDrawArrays(GL_TRIANGLE_STRIP, 0, 4);        \n\n    }\n}\n```\n\n\
    The method has a few purposes. First, we set up the vertices of our rendering\
    \ location, as well as the color. Next, we set a limit of how many markers the\
    \ String SDK will recognize. We have set this to 10. We create a `struct` to contact\
    \ the `MarkerInfo` as it gets recognized, and then we loop through the results\
    \ of the `getMarkerInfoMatrixBased` method. This method will use any of the image\
    \ files we have loaded in our project and will attempt to recognize them in our\
    \ camera view.\n\nIn the loop, we have our standard OpenGL code. This example\
    \ prints out a standard OpenGL cube, like we saw back in the iOS 4.3 templates.\
    \ Before we update our `viewDidLoad` method, change the class so it renders only\
    \ in portrait mode. Update the `shouldAutorotateToInterfaceOrientation` method\
    \ as shown in [Listing 10–18](#Chapter10.html#list_10_18).\n\n**Listing 10–18.**\
    \ *Allow for Only Portrait Orientation*\n\n```\nreturn (interfaceOrientation ==\
    \ UIInterfaceOrientationPortrait);\n```\n\nWe're almost done. But, before we test\
    \ the application we need to update the `viewDidLoad` method. Update the method\
    \ with the code in [Listing 10–19](#Chapter10.html#list_10_19).\n\n**Listing 10–19.**\
    \ *Updated viewDidLoad*\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    animating = NO;\n\n    EAGLContext *aContext = [[EAGLContext alloc] initWithAPI:kEAGLRenderingAPIOpenGLES1];\n\
    \n    if (!aContext)\n        NSLog(@\"Failed to create ES context\");\n    else\
    \ if (![EAGLContext setCurrentContext:aContext])\n        NSLog(@\"Failed to set\
    \ ES context current\");\n\n    context = aContext;\n\n    EAGLView *eaglView\
    \ = (EAGLView *)self.view;\n\n    [(EAGLView *)self.view setContext:context];\n\
    \    [(EAGLView *)self.view setFrameBuffer];\n\n    int viewport[4] = {0, 0, eaglView.framebufferWidth,\
    \ eaglView.framebufferHeight};\n    viewport[1] = (eaglView.framebufferHeight\
    \ - viewport[3]) / 2;\n\n    glViewport(viewport[0], viewport[1], viewport[2],\
    \ viewport[3]);\n\n    float aspectRatio = viewport[2] / (float)viewport[3];\n\
    \n    [self createProjectionMatrix: projectionMatrix verticalFOV: 47.22f aspectRatio:\
    \ aspectRatio nearClip: 0.1f farClip: 100.f];\n\n// Initialize String\nstringOGL\
    \ = [[StringOGL alloc] initWithDelegate: self context: aContext\nframeBuffer:[eaglView\
    \ defaultFramebuffer] leftHanded: NO];\n\n[stringOGL setProjectionMatrix:projectionMatrix\
    \ viewport:viewport orientation:[self interfaceOrientation] reorientIPhoneSplash:YES];\n\
    \n// Load image markers\n[stringOGL loadImageMarker: @\"bookcover\" ofType: @\"\
    png\"];\n\n}\n```\n\nThe first half of this method sets up our OpenGL context\
    \ using the methods we've already created in this chapter. The bold lines of code\
    \ are specific to the String SDK. First, we initialize String with `self` as the\
    \ `delegate` and crate the appropriate frame buffer. Next, we set up the projection\
    \ matrix. Finally, we load up the markers. If you have multiple markers, you can\
    \ add them all here."
  raw: '#### Creating the AR ViewController


    Open `ViewController.h` in Xcode. First, we need to import the required headers
    to set up our view. [Listing 10–12](#Chapter10.html#list_10_12) shows the `import`
    statements that are required for this class.


    **Listing 10–12.** *import Statements for ViewController*


    `#import "StringOGL.h"`

    `#import <OpenGLES/EAGL.h>`

    `#import <OpenGLES/ES1/gl.h>`

    `#import <OpenGLES/ES1/glext.h>`

    `#import <OpenGLES/ES2/gl.h>`

    `#import <OpenGLES/ES2/glext.h>`


    Next, we have to nominate `ViewController` as a `StringOGLDelegate` class. While
    we do this, let''s also define our instance variables. Copy the code from [Listing
    10–13](#Chapter10.html#list_10_13) to the interface block.


    **Listing 10–13.** *Instance Variables*


    `@interface ViewController : UIViewController <StringOGLDelegate> {`

    `    EAGLContext *context;`

    `    StringOGL *stringOGL;`

    `    float projectionMatrix[16];`

    `    BOOL animating;`

    `}`


    Next, define the methods shown in [Listing 10–14](#Chapter10.html#list_10_14).


    **Listing 10–14.** *Instance Methods*


    `- (void)startAnimation;`

    `- (void)stopAnimation;`


    I''ll explain these methods and what they do when we implement them later in this
    chapter. Switch over to `ViewController.m`. The first method we need to add creates
    a standard projection matrix for our 3D object. This method is about as basic
    of a projection matrix as possible. It''s modeled slightly after the `glFrustum`
    specification. `glFrustum` describes a perspective matrix that produces a perspective
    projection. This is done by multiplying the current matrix by the `glFrustum`
    matrix and then replacing the current matrix with the resulting matrix. Add the
    code from [Listing 10–15](#Chapter10.html#list_10_15), just before the `didReceiveMemoryWarning`
    method.


    **Listing 10–15.** *Create the Projection Matrix*


    `- (void)createProjectionMatrix: (float *)matrix verticalFOV: (float)verticalFOV
    aspectRatio: (float)aspectRatio nearClip: (float)nearClip farClip: (float)farClip`

    `{`

    `        memset(matrix, 0, sizeof(*matrix) * 16);`


    `        float tan = tanf(verticalFOV * M_PI / 360.f);`


    `        matrix[0] = 1.f / (tan * aspectRatio);`

    `        matrix[5] = 1.f / tan;`

    `        matrix[10] = (farClip + nearClip) / (nearClip - farClip);`

    `        matrix[11] = -1.f;`

    `        matrix[14] = (2.f * farClip * nearClip) / (nearClip - farClip);`

    `}`


    I''ll refer you again to the Apress publication on OpenGL programming for iOS
    (*Pro OpenGL ES for iOS*) for more detail into what exactly is going on with this
    method. However, as you read through this method, keep in mind that depth buffer
    precision is affected by the values of `nearClip` and `farClip`. As the ratio
    of `farClip` to `nearClip` increases, the depth buffer will be less distinguishable
    between surfaces that are near each other in the view. `nearClip` can never be
    set to zero because the multiplier approaches infinity as `nearClip` approaches
    zero.


    We defined two methods in our header that we''ll complete next. However, before
    we move on, import the `EAGLView` header to `ViewController.h`. Then, add the
    code from [Listing 10–16](#Chapter10.html#list_10_16) to the `ViewController`.


    **Listing 10–16.** *Animation Start and Stop Methods*


    `- (void)startAnimation`

    `{`

    `    if (!animating) {`

    `        [stringOGL resume];`

    `        animating = TRUE;`

    `    }`

    `}`


    `- (void)stopAnimation`

    `{`

    `    if (animating) {`

    `        [stringOGL pause];`

    `        animating = FALSE;`

    `    }`

    `}`


    There is only one required method for a class that implements the `StringOGLDelegate`
    protocol. That is the render method. This method handles the actions that the
    String SDK will take after it recognizes a potential marker. Add the method from
    [Listing 10–17](#Chapter10.html#list_10_17) to the `ViewController`.


    **Listing 10–17.** *Render the 3D Objects*


    `- (void)render`

    `{`

    `    [(EAGLView *)self.view setFramebuffer];`


    `    static const GLfloat squareVertices[] = {`

    `        -0.33f, -0.33f,`

    `        0.33f, -0.33f,`

    `        -0.33f,  0.33f,`

    `        0.33f,  0.33f,`

    `    };`


    `    static const GLubyte squareColors[] = {`

    `        255, 255,   0, 255,`

    `        0,   255, 255, 255,`

    `        0,     0,   0,   0,`

    `        255,   0, 255, 255,`

    `    };`


    `        const int maxMarkerCount = 10;`

    `        struct MarkerInfoMatrixBased markerInfo[10];`


    `        int markerCount = [stringOGL getMarkerInfoMatrixBased: markerInfo maxMarkerCount:
    maxMarkerCount];`

    `    for (int i = 0; i < markerCount; i++)`

    `{`

    `        glMatrixMode(GL_PROJECTION);`

    `        glLoadMatrixf(projectionMatrix);`


    `        glMatrixMode(GL_MODELVIEW);`

    `        glLoadIdentity();`

    `        glMultMatrixf(markerInfo[i].transform);`


    `        glVertexPointer(2, GL_FLOAT, 0, squareVertices);`

    `        glEnableClientState(GL_VERTEX_ARRAY);`

    `        glColorPointer(4, GL_UNSIGNED_BYTE, 0, squareColors);`

    `        glEnableClientState(GL_COLOR_ARRAY);`


    `        glDrawArrays(GL_TRIANGLE_STRIP, 0, 4);        `


    `    }`

    `}`


    The method has a few purposes. First, we set up the vertices of our rendering
    location, as well as the color. Next, we set a limit of how many markers the String
    SDK will recognize. We have set this to 10\. We create a `struct` to contact the
    `MarkerInfo` as it gets recognized, and then we loop through the results of the
    `getMarkerInfoMatrixBased` method. This method will use any of the image files
    we have loaded in our project and will attempt to recognize them in our camera
    view.


    In the loop, we have our standard OpenGL code. This example prints out a standard
    OpenGL cube, like we saw back in the iOS 4.3 templates. Before we update our `viewDidLoad`
    method, change the class so it renders only in portrait mode. Update the `shouldAutorotateToInterfaceOrientation`
    method as shown in [Listing 10–18](#Chapter10.html#list_10_18).


    **Listing 10–18.** *Allow for Only Portrait Orientation*


    `return (interfaceOrientation == UIInterfaceOrientationPortrait);`


    We''re almost done. But, before we test the application we need to update the
    `viewDidLoad` method. Update the method with the code in [Listing 10–19](#Chapter10.html#list_10_19).


    **Listing 10–19.** *Updated viewDidLoad*


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `    animating = NO;`


    `    EAGLContext *aContext = [[EAGLContext alloc] initWithAPI:kEAGLRenderingAPIOpenGLES1];`


    `    if (!aContext)`

    `        NSLog(@"Failed to create ES context");`

    `    else if (![EAGLContext setCurrentContext:aContext])`

    `        NSLog(@"Failed to set ES context current");`


    `    context = aContext;`


    `    EAGLView *eaglView = (EAGLView *)self.view;`


    `    [(EAGLView *)self.view setContext:context];`

    `    [(EAGLView *)self.view setFrameBuffer];`


    `    int viewport[4] = {0, 0, eaglView.framebufferWidth, eaglView.framebufferHeight};`

    `    viewport[1] = (eaglView.framebufferHeight - viewport[3]) / 2;`


    `    glViewport(viewport[0], viewport[1], viewport[2], viewport[3]);`


    `    float aspectRatio = viewport[2] / (float)viewport[3];`


    `    [self createProjectionMatrix: projectionMatrix verticalFOV: 47.22f aspectRatio:
    aspectRatio nearClip: 0.1f farClip: 100.f];`


    **`// Initialize String`**

    **`stringOGL = [[StringOGL alloc] initWithDelegate: self context: aContext`**

    **`frameBuffer:[eaglView defaultFramebuffer] leftHanded: NO];`**


    **`[stringOGL setProjectionMatrix:projectionMatrix viewport:viewport orientation:[self
    interfaceOrientation] reorientIPhoneSplash:YES];`**


    **`// Load image markers`**

    **`[stringOGL loadImageMarker: @"bookcover" ofType: @"png"];`**


    `}`


    The first half of this method sets up our OpenGL context using the methods we''ve
    already created in this chapter. The bold lines of code are specific to the String
    SDK. First, we initialize String with `self` as the `delegate` and crate the appropriate
    frame buffer. Next, we set up the projection matrix. Finally, we load up the markers.
    If you have multiple markers, you can add them all here.'
  trans: "\n#### 创建 AR 视图控制器\n\n在 Xcode 中打开 `ViewController.h`。首先，我们需要导入所需的头文件来设置视图。列表\
    \ 10–12 显示了该类所需的 `import` 语句。\n\n**列表 10–12.** *ViewController 的 import 语句*\n\n\
    ```\n#import \"StringOGL.h\"\n#import <OpenGLES/EAGL.h>\n#import <OpenGLES/ES1/gl.h>\n\
    #import <OpenGLES/ES1/glext.h>\n#import <OpenGLES/ES2/gl.h>\n#import <OpenGLES/ES2/glext.h>\n\
    ```\n\n接下来，我们必须将 `ViewController` 指定为 `StringOGLDelegate` 类。在这样做的同时，让我们也定义实例变量。将列表\
    \ 10–13 的代码复制到接口块中。\n\n**列表 10–13.** *实例变量*\n\n```\n@interface ViewController\
    \ : UIViewController <StringOGLDelegate> {\n    EAGLContext *context;\n    StringOGL\
    \ *stringOGL;\n    float projectionMatrix[16];\n    BOOL animating;\n}\n```\n\n\
    接下来，定义列表 10–14 中所示的方法。\n\n**列表 10–14.** *实例方法*\n\n```\n- (void)startAnimation;\n\
    - (void)stopAnimation;\n```\n\n我将在本章后面实现这些方法时解释它们及其作用。切换到 `ViewController.m`。我们需要添加的第一个方法是为我们的\
    \ 3D 对象创建一个标准投影矩阵。这个方法几乎是可能的最基本的投影矩阵。它稍微模仿了 `glFrustum` 规范。`glFrustum` 描述了一个产生透视投影的透视矩阵。这是通过将当前矩阵乘以\
    \ `glFrustum` 矩阵，然后用结果矩阵替换当前矩阵来完成的。在 `didReceiveMemoryWarning` 方法之前，添加列表 10–15\
    \ 中的代码。\n\n**列表 10–15.** *创建投影矩阵*\n\n```\n- (void)createProjectionMatrix: (float\
    \ *)matrix verticalFOV: (float)verticalFOV aspectRatio: (float)aspectRatio nearClip:\
    \ (float)nearClip farClip: (float)farClip\n{\n        memset(matrix, 0, sizeof(*matrix)\
    \ * 16);\n\n        float tan = tanf(verticalFOV * M_PI / 360.f);\n\n        matrix[0]\
    \ = 1.f / (tan * aspectRatio);\n        matrix[5] = 1.f / tan;\n        matrix[10]\
    \ = (farClip + nearClip) / (nearClip - farClip);\n        matrix[11] = -1.f;\n\
    \        matrix[14] = (2.f * farClip * nearClip) / (nearClip - farClip);\n}\n\
    ```\n\n关于此方法的具体细节，我再次推荐您参考 Apress 出版的 iOS OpenGL 编程书籍 (*Pro OpenGL ES for iOS*)。然而，在阅读此方法时，请记住深度缓冲区精度会受到\
    \ `nearClip` 和 `farClip` 值的影响。随着 `farClip` 与 `nearClip` 的比率增加，深度缓冲区对于视图中彼此接近的表面之间的区分度会降低。`nearClip`\
    \ 永远不能设置为零，因为当 `nearClip` 接近零时，乘数会接近无穷大。\n\n我们在头文件中定义了两个方法，接下来将完成它们。但是，在继续之前，将\
    \ `EAGLView` 头文件导入到 `ViewController.h` 中。然后，将列表 10–16 中的代码添加到 `ViewController`。\n\
    \n**列表 10–16.** *动画开始和停止方法*\n\n```\n- (void)startAnimation\n{\n    if (!animating)\
    \ {\n        [stringOGL resume];\n        animating = TRUE;\n    }\n}\n\n- (void)stopAnimation\n\
    {\n    if (animating) {\n        [stringOGL pause];\n        animating = FALSE;\n\
    \    }\n}\n```\n\n对于实现 `StringOGLDelegate` 协议的类，只有一个必需的方法，那就是渲染方法。此方法处理 String\
    \ SDK 在识别到潜在标记后将要执行的操作。将列表 10–17 中的方法添加到 `ViewController`。\n\n**列表 10–17.** *渲染\
    \ 3D 对象*\n\n```\n- (void)render\n{\n    [(EAGLView *)self.view setFramebuffer];\n\
    \n    static const GLfloat squareVertices[] = {\n        -0.33f, -0.33f,\n   \
    \     0.33f, -0.33f,\n        -0.33f,  0.33f,\n        0.33f,  0.33f,\n    };\n\
    \n    static const GLubyte squareColors[] = {\n        255, 255,   0, 255,\n \
    \       0,   255, 255, 255,\n        0,     0,   0,   0,\n        255,   0, 255,\
    \ 255,\n    };\n\n        const int maxMarkerCount = 10;\n        struct MarkerInfoMatrixBased\
    \ markerInfo[10];\n\n        int markerCount = [stringOGL getMarkerInfoMatrixBased:\
    \ markerInfo maxMarkerCount: maxMarkerCount];\n    for (int i = 0; i < markerCount;\
    \ i++)\n{\n        glMatrixMode(GL_PROJECTION);\n        glLoadMatrixf(projectionMatrix);\n\
    \n        glMatrixMode(GL_MODELVIEW);\n        glLoadIdentity();\n        glMultMatrixf(markerInfo[i].transform);\n\
    \n        glVertexPointer(2, GL_FLOAT, 0, squareVertices);\n        glEnableClientState(GL_VERTEX_ARRAY);\n\
    \        glColorPointer(4, GL_UNSIGNED_BYTE, 0, squareColors);\n        glEnableClientState(GL_COLOR_ARRAY);\n\
    \n        glDrawArrays(GL_TRIANGLE_STRIP, 0, 4);        \n\n    }\n}\n```\n\n\
    这个方法有几个用途。首先，我们设置渲染位置的顶点以及颜色。接下来，我们设置 String SDK 将识别的标记的数量限制。我们将其设置为 10。我们创建一个\
    \ `struct` 来在识别到 `MarkerInfo` 时与其联系，然后我们循环遍历 `getMarkerInfoMatrixBased` 方法的结果。此方法将使用我们项目中加载的任何图像文件，并尝试在摄像头视图中识别它们。\n\
    \n在循环中，我们有标准的 OpenGL 代码。此示例打印出一个标准的 OpenGL 立方体，就像我们在 iOS 4.3 模板中看到的那样。在更新我们的 `viewDidLoad`\
    \ 方法之前，更改类使其仅在竖屏模式下渲染。如列表 10–18 所示更新 `shouldAutorotateToInterfaceOrientation`\
    \ 方法。\n\n**列表 10–18.** *仅允许竖屏方向*\n\n```\nreturn (interfaceOrientation == UIInterfaceOrientationPortrait);\n\
    ```\n\n我们快完成了。但是，在测试应用程序之前，我们需要更新 `viewDidLoad` 方法。使用列表 10–19 中的代码更新该方法。\n\n**列表\
    \ 10–19.** *更新后的 viewDidLoad*\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    animating = NO;\n\n    EAGLContext *aContext = [[EAGLContext alloc] initWithAPI:kEAGLRenderingAPIOpenGLES1];\n\
    \n    if (!aContext)\n        NSLog(@\"Failed to create ES context\");\n    else\
    \ if (![EAGLContext setCurrentContext:aContext])\n        NSLog(@\"Failed to set\
    \ ES context current\");\n\n    context = aContext;\n\n    EAGLView *eaglView\
    \ = (EAGLView *)self.view;\n\n    [(EAGLView *)self.view setContext:context];\n\
    \    [(EAGLView *)self.view setFrameBuffer];\n\n    int viewport[4] = {0, 0, eaglView.framebufferWidth,\
    \ eaglView.framebufferHeight};\n    viewport[1] = (eaglView.framebufferHeight\
    \ - viewport[3]) / 2;\n\n    glViewport(viewport[0], viewport[1], viewport[2],\
    \ viewport[3]);\n\n    float aspectRatio = viewport[2] / (float)viewport[3];\n\
    \n    [self createProjectionMatrix: projectionMatrix verticalFOV: 47.22f aspectRatio:\
    \ aspectRatio nearClip: 0.1f farClip: 100.f];\n\n// Initialize String\nstringOGL\
    \ = [[StringOGL alloc] initWithDelegate: self context: aContext\nframeBuffer:[eaglView\
    \ defaultFramebuffer] leftHanded: NO];\n\n[stringOGL setProjectionMatrix:projectionMatrix\
    \ viewport:viewport orientation:[self interfaceOrientation] reorientIPhoneSplash:YES];\n\
    \n// Load image markers\n[stringOGL loadImageMarker: @\"bookcover\" ofType: @\"\
    png\"];\n\n}\n```\n\n此方法的前半部分使用我们在本章中已创建的方法设置 OpenGL 上下文。粗体代码行特定于 String SDK。首先，我们使用\
    \ `self` 作为 `delegate` 初始化 String，并创建适当的帧缓冲区。接下来，我们设置投影矩阵。最后，我们加载标记。如果您有多个标记，可以在此处全部添加。\n"
- fmt: "# 最终代码更新\n\n我们的最终代码更新涉及`viewWillAppear`和`viewWillDisappear`方法。按照[列表10–20](#Chapter10.html#list_10_20)所示更新它们。\n\
    \n**列表10–20.** *启动和停止动画*\n\n```objc\n- (void)viewWillAppear:(BOOL)animated\n{\n\
    \    [self startAnimation];\n\n    [super viewWillAppear:animated];\n}\n\n- (void)viewWillDisappear:(BOOL)animated\n\
    {\n    [self stopAnimation];\n\n    [super viewWillDisappear:animated];\n}\n```\n\
    \n`String`实际上不会启动，直到第一次调用`resume`方法。如果你还记得，我们在`startAnimation`包装器中引用了这个方法。这就是我们将其放在`viewWillAppear`方法中的原因。\n\
    \n在物理设备上运行项目。因为我们将其构建为通用程序，它应该可以在iPad或iPhone设备上正常运行。确保将相机对准书籍或屏幕上的图像。你将看到类似于[图10–3](#Chapter10.html#fig_10_3)的效果。\n\
    \n![Image](images/1003.jpg)\n\n**图10–3.** *查看我们的AR标记应用运行效果。*\n\n### 总结\n\n在[第9章](#Chapter09.html#ch9)中，我们讨论了市场上可用于构建增强现实应用的开发工具包。在大多数情况下，围绕对象识别重新发明轮子并不是资源的最佳利用方式。这些工具包的价值主张在于处理基础性工作，让你专注于应用中的业务层或功能。\n\
    \n在本章中，我们从单视图应用开始，构建了一个基于标记的增强现实应用，该应用由String的AR SDK驱动。我们只是浅尝了OpenGL和3D建模，但学到的知识足以为进一步开发更复杂的应用奠定基础。\n\
    \n在[第11章](#Chapter11.html#ch11)中，我们将转向社交媒体，构建一个基于地理坐标渲染社交数据的增强现实应用。\n\n# 第11章\n\
    \n# 构建社交AR应用\n\n在[第10章](#Chapter10.html#ch10)中，我们讨论了使用String SDK的基于标记的增强现实应用。由于手持设备识别标记需要处理能力，基于位置的AR应用比基于标记的AR应用出现得更早。\n\
    \n在本章中，我们将以更传统的方式审视AR应用，并构建一个更接近最初在AppStore和Android Market上引发革命的原生应用。\n\n我们将构建一个支持GPS的AR应用，用于查找附近的Facebook地点。\n\
    \n### 开始设置\n\n首先，我们需要确保已经为围绕Facebook Open Graph开发应用做好了准备。这个过程有几个步骤。它们主要包括：\n\n\
    *   创建一个Facebook应用\n*   克隆Facebook iOS SDK GitHub仓库\n*   为应用启用单点登录\n\n#### 创建Facebook应用\n\
    \n为Facebook创建应用可以为API和你的用户提供权限和数据的上下文。如果没有应用，你通过Open Graph API检索的内容将没有边界。Facebook应用允许你的用户决定他们将为你的应用授予何种访问权限。\n\
    \n访问[`https://developers.facebook.com/apps`](https://developers.facebook.com/apps)。如果你之前使用过Facebook\
    \ API，应该已经准备好创建新的Facebook应用了。在开发者仪表板的右上角有一个标有`Create New App`的按钮。点击此按钮并按照说明设置你的应用。我将我的应用命名为*kyleroche*。设置完成后，你应该会在应用仪表板上看到类似[图11–1](#Chapter11.html#fig_11_1)的内容。\n\
    \n![Image](images/1101.jpg)\n\n**图11–1.** *设置Facebook应用。*\n\n记下你的`App ID`和`App\
    \ Secret`。在设置Xcode项目时，你将需要你的`App ID`。\n\n#### 克隆Facebook iOS SDK\n\n使用浏览器访问[`https://github.com/facebook/facebook-ios-sdk`](https://github.com/facebook/facebook-ios-sdk)下载最新版本的Facebook\
    \ iOS SDK。将仓库克隆到本地机器。如果你感兴趣，可以运行一些示例应用。打开位于`samples`子目录中的Xcode项目。在Xcode中打开`DemoAppViewController.m`，找到[列表11–1](#Chapter11.html#list_11_1)中显示的代码段。\n\
    \n**列表11–1.** *设置你的Facebook App ID*\n\n```objc\n// Your Facebook APP Id must be\
    \ set before running this example\n// See http://www.facebook.com/developers/createapp.php\n\
    // Also, your application must bind to the fb[app_id]:// URL\n// scheme (substitute\
    \ [app_id] for your real Facebook app id).\nstatic NSString* kAppId = nil;\n```\n\
    \n确保将`nil`改为你的Facebook App ID。还有一步需要完成才能测试SDK提供的演示应用。打开应用的`.plist`文件，找到URL Schemes条目。该数组中的项目0需要设置为`fb[`*`你的应用ID`*`]`才能正常运行。当从原生iOS应用进行身份验证时，Facebook通过URL\
    \ Scheme验证本地应用的真实性。在iOS中，URL Scheme用于在上下文中启动其他原生应用。前缀（现在是你的应用ID）用于唯一标识该应用。例如，如果我的应用ID是123456，我会将URL\
    \ Scheme设置为`fb123456`，身份验证后，Facebook将验证原生应用是否绑定到URL Scheme`fb123456://[action]`。\n\
    \n此时，除非同一设备上安装了Facebook应用，否则该应用将无法运行。\n\n### 词汇课\n\n到目前为止，在本书中，我们已经为基于标记的增强现实和增强现实游戏场景构建了应用示例。我们还没有讨论与基于位置的AR的一些区别。在本节中，我们将讨论在本应用中会用到的一些新术语。\n\
    \n#### 方位角\n\n方位角（Azimuth）是一个源自阿拉伯语的词汇。其字面翻译是“方向”。方位角是一种用于球面坐标系的角度测量，例如在空间计算中。方位角是投影向量与定义明确的参考平面上的参考向量之间的角度。例如，考虑一个包含兴趣点的基于位置的应用。如果我们想知道需要面向哪个方向才能指向该兴趣点，我们可能会计算该点相对于北极的方位角。我们会（比喻性地）从当前位置画一个垂直于北极的平面，再从兴趣点画一个垂直于海平面（或我们位置下方的等位面）的平面。这两个平面之间的角度就是方位角。\n\
    \n俗话说，“一图胜千言”。请参见[图11–2](#Chapter11.html#fig_11_2)获取更详细的解释。\n\n![Image](images/1102.jpg)\n\
    \n**图11–2.** *计算方位角。该点与北极的方位角为80度。*\n\n在我们将要构建的示例应用中，我们将讨论用于计算从我们的视点到另一个GPS坐标视点的方位角的公式。但是，如果你等不及了，这里有一个例子：如果我们站在纬度φ[1]、经度零的位置，并且想找到从我们的视点到纬度φ[2]、经度L（向东为正）的Point\
    \ 2的方位角，公式如[图11–3](#Chapter11.html#fig_11_3)所示。\n\n![Image](images/1103.jpg)\n\
    \n**图11–3.** *这是一个计算方位角的公式示例。*"
  raw: 'Our final code update is with the `viewWillAppear` and `viewWillDisappear`
    methods. Update them as shown in [Listing 10–20](#Chapter10.html#list_10_20).


    **Listing 10–20.** *Start and Stop the Animation*


    `- (void)viewWillAppear:(BOOL)animated`

    `{`

    `    [self startAnimation];`


    `    [super viewWillAppear:animated];`

    `}`


    `- (void)viewWillDisappear:(BOOL)animated`

    `{`

    `    [self stopAnimation];`


    `    [super viewWillDisappear:animated];`

    `}`


    String will not actually start until the first `resume` method is called. If you
    remember, we referenced this method in our `startAnimation` wrapper. That''s why
    we''re placing this in our `viewWillAppear` method.


    Run the project on a physical device. Because we built this as a universal program,
    it should run fine on an iPad or iPhone device. Make sure you point your camera
    at the book or the image on your screen. You will see something similar to [Figure
    10–3](#Chapter10.html#fig_10_3).


    ![Image](images/1003.jpg)


    **Figure 10–3.** *View our AR marker application in action.*


    ### Summary


    In [Chapter 9](#Chapter09.html#ch9), we discussed a few of the toolkits available
    on the market for developers building augmented reality applications. In most
    cases, reinventing the wheel around object recognition isn''t the best use of
    your resources. The value proposition with these toolkits is to handle the foundational
    work and let you concentrate on the business layer or functionality in the app.


    In this chapter, we started with a single view application and built up a marker-based
    augmented reality application powered by String''s AR SDK. We barely scratched
    the surface on OpenGL and 3D modeling, but we learned enough to set the stage
    for more complex applications.


    In [Chapter 11](#Chapter11.html#ch11), we''ll be switching gears to social media
    and building an augmented reality application to render social data based on geographical
    coordinates.


    ## Chapter  11


    ## Building a Social AR Application


    In [Chapter 10](#Chapter10.html#ch10), we discussed marker-based augmented reality
    applications using the String SDK. Location-based AR applications have been available
    longer than marker-based AR applications due to the processing power required
    on a handheld device to recognize markers.


    In this chapter, we''ll take a more traditional look at AR applications, and build
    something closer to the original apps that started the revolution on the AppStore
    and Android Market.


    We are going to build a GPS-enabled AR application to find nearby Facebook places.


    ### Getting Set Up


    First, we need to make sure we are set up for developing an application around
    Facebook''s Open Graph. There are a few steps to this process. Basically, they
    are:


    *   Create a Facebook application

    *   Clone the Facebook iOS SDK GitHub repository

    *   Enable single sign-on for the application


    #### Creating a Facebook Application


    Creating an application for Facebook gives the API and your users context for
    permissions and data. Without an application, there would be no bounds for what
    you are retrieving via the Open Graph API. The Facebook application allows your
    users to decide what type of access they will give to your application.


    Visit [`https://developers.facebook.com/apps`](https://developers.facebook.com/apps).
    If you have worked with the Facebook APIs in the past, you should be all set up
    to create a new Facebook application. In the top right of the Developer''s Dashboard
    there is a button labeled `Create New App`. Click this button and follow the instructions
    to set up your application. I''ve named my application *kyleroche*. When you''re
    set up, you should see something like [Figure 11–1](#Chapter11.html#fig_11_1)
    on your app''s Dashboard.


    ![Image](images/1101.jpg)


    **Figure 11–1.** *Set up the Facebook application.*


    Take note of your `App ID` and `App Secret`. You will need your `App ID` when
    you set up your Xcode project.


    #### Cloning the Facebook iOS SDK


    Using your browser, visit [`https://github.com/facebook/facebook-ios-sdk`](https://github.com/facebook/facebook-ios-sdk)
    to download the latest version of the Facebook iOS SDK.  Clone the repository
    to your local machine. If you''re interested, you can run through some of the
    sample application. Open the Xcode project located in the sample subdirectory.
    Open `DemoAppViewController.m` in Xcode, and locate the section of code shown
    in [Listing 11–1](#Chapter11.html#list_11_1).


    **Listing 11–1.** *Set Your Facebook App ID*


    `// Your Facebook APP Id must be set before running this example`

    `// See http://www.facebook.com/developers/createapp.php`

    `// Also, your application must bind to the fb[app_id]:// URL`

    `// scheme (substitute [app_id] for your real Facebook app id).`

    `static NSString* kAppId = nil;`


    Make sure you change `nil` to your Facebook App ID. There is one more step you
    need to complete to test the demo application provided with the SDK. Open your
    application''s `.plist` file and find the entry for URL Schemes. Item 0, of that
    array, needs a value of `fb[`*`your app id`*`]` to run properly. When authenticating
    from a native iOS application, Facebook validates the local app''s authenticity
    by using a URL Scheme. In iOS, URL Schemes are used to launch other native applications
    in context. The prefix (now your app ID) is used to uniquely identify the application.
    For example, if my app ID was 123456 I would set my URL Scheme to fb123456, and
    after authentication, Facebook would verify that the native app binds to the URL
    Scheme `fb123456://[action]`.


    At this point, the application won''t function unless you have the Facebook application
    installed on the same device.


    ### Vocabulary Lesson


    So far in this book, we''ve built application examples for marker-based augmented
    reality and gaming scenarios for augmented reality. We haven''t yet discussed
    some of the differences with location-based AR. In this section, we''ll discuss
    a few new terms we''ll be using in this application.


    #### Azimuth


    Azimuth is a word from the Arabic language. Its literal translation is “direction.”
    Azimuth is an angular measurement used in spherical coordinate systems, such as
    is found in geospacial calculations. The azimuth is the angle between the projected
    vector and a reference vector on a well-defined reference plane. For example,
    consider a location-based application in which there is a point of interest. If
    we would like to know which direction we need to face to be pointing toward this
    point of interest, we might calculate the azimuth of that point from the North
    Pole. We would draw (figuratively) a perpendicular plane from our current position
    to the North Pole, and a second perpendicular plane from the point of interest
    through to sea level (or an equal plane under our position). The angle between
    the two planes is the azimuth.


    As they say, “a picture is worth a thousand words.” See [Figure 11–2](#Chapter11.html#fig_11_2)
    for a more detailed explanation.


    ![Image](images/1102.jpg)


    **Figure 11–2.** *Calculate the azimuth. Azimuth of the point and the North Pole
    is 80 degrees.*


    In the example application we''ll be building, we''ll discuss the formula used
    to calculate the azimuth from our viewpoint to a viewpoint at another GPS coordinate.
    However, if you just can''t wait that long, here''s an example: if we are standing
    at latitude φ[1], longitude zero and we want to find the azimuth from our viewpoint
    to Point 2 at latitude φ[2], longitude L (positive eastward), the formula is shown
    in [Figure 11–3](#Chapter11.html#fig_11_3).


    ![Image](images/1103.jpg)


    **Figure 11–3.** *Here is a formula example to find the azimuth.*'
