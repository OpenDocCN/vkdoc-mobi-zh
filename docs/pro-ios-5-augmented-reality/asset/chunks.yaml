    \n**图 13–12.** *Aodhan 很开心！*\n\n![Image](img/1313.jpg)\n\n**图 13–13.** *Avery\
    \ 很生气！*\n\n![Image](img/1314.jpg)\n\n**图 13–14.** *Avery 很惊讶！*\n\n我们要构建到应用程序中的最后一个功能是短信功能，用于在检测到愤怒或悲伤表情时通知客服人员。\n\
    \n请记住，如果你希望将此功能扩展用于实际目的，摄像头视野中可能不止一个人。你唯一需要做的调整是遍历 face.com 的 JSON 响应中返回的所有照片。我们硬编码了\
    \ `objectAtIndex:0`，只选取第一个被识别的人脸。因此，如果你想要分析人群，就需要进行这种调整。\n\n## 添加 Twilio 调用\n\n\
    Twilio 使用 REST 发起外呼或发送短信。我们使用短信的原因之一是它只需要 REST 调用。我们无需在 Web 服务器上托管任何代码。将代码清单 13–43\
    \ 中的方法添加到 `FaceDetectionLayer.m` 文件中。\n\n**代码清单 13–43.** *发送短信*\n\n```\n- (void)sendSMS\
    \ {\n    NSAutoreleasePool * pool = [[NSAutoreleasePool alloc] init];\n\n    NSLog(@\"\
    发送请求\");\n    NSString *accountSid = @\"在此处输入您的账户 SID\";\n    NSString *authToken\
    \ = @\"在此处输入您的 AuthToken\";\n    NSString *urlString = [NSString\nstringWithFormat:@\"\
    https://%@:%@@api.twilio.com/2010-04-01/Accounts/%@/SMS/Messages\",\naccountSid,\
    \ authToken, accountSid];\n\n    NSURL *url = [NSURL URLWithString:urlString];\n\
    \n    ASIFormDataRequest *request = [ASIFormDataRequest requestWithURL:url];\n\
    \    [request addPostValue:@\"在此处输入您的目标号码\" forKey:@\"To\"];\n    [request addPostValue:@\"\
    检测到愤怒表情\" forKey:@\"Body\"];\n    [request addPostValue:@\"有效的 Twilio 号码\" forKey:@\"\
    From\"];\n\n    [request startSynchronous];\n\n    NSError *error = [request error];\n\
    \    if (!error) {\n        NSString *response = [request responseString];\n \
    \       NSLog(@\"%@\",response);\n    } else {\n        NSLog(@\"发生错误 %d; %@\"\
    ,[error code], [request responseString]);\n    }\n\n    [pool drain];\n}\n```\n\
    \n这简单多了。正如你所见，Twilio 提供了一个非常简单的 API，可以快速为你的应用增加价值。你可以从 `facialRecognitionRequest`\
    \ 方法中引用这个新函数。只需将其包装在一个简单的检查中，以匹配“愤怒”心情，一切就准备就绪了。\n\n短信如图 13–15 所示。\n\n![Image](img/1315.jpg)\n\
    \n**图 13–15.** *短信已成功发送。*\n\n## 总结\n\n本章非常有趣。我们像第 7 章一样，从创建一个 HUD 层开始。经过一些实验后，我们意识到这并非必要。通过逐步操作，我们了解了\
    \ OpenGL 的多线程技术（这是 cocos2D 的基础）。\n\n我们扩展了示例，创建了 `AVCaptureSession` 并将 `UIImages`\
    \ 发送到 face.com 的 REST API。我们使用了两个不同的开源库来为演示添加功能。ASI-HTTP-Request 帮助我们以简短的代码封装了\
    \ REST 调用，而 SBJson 库则帮助我们解析来自 face.com 的响应。\n\n我们使用 cocos2D 在目标人脸叠加了一个精灵，并用一个标签显示了来自\
    \ face.com 的心情结果。最后，我们使用 Twilio 简单的 REST API 通过短信向客服人员发出通知，告知检测到了愤怒的表情。\n\n在将人脸识别示例用于自己的应用程序之前，你应该检查当地的隐私法律。在某些地区，捕获或存储面部模式可能构成隐私侵犯。\n\
    \n希望你从本书的示例中学到了很多。请查阅书末的补充材料，了解一些更有帮助的主题。如果对演示有任何疑问或反馈，欢迎在 Twitter 上联系我 @kylemroche，也可以在\
    \ GitHub 上与我交流。\n"
