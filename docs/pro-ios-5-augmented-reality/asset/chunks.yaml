    \n**注意：** 可能有更新版本的 OpenCV 可用。该例程应能正常使用。如果找不到 2.2.0 版本，请尝试使用较新版本。\n\n在 Mac 上打开命令行工具。导航到下载存档文件的目录。运行列表\
    \ 12–11 中的命令。\n\n**列表 12–11.** *解压 OpenCV*\n\n```\nKyle-Roches-MacBook-Pro-2:Downloads\
    \ kyleroche$ tar xjvf OpenCV-2.2.0.tar.bz2\nx OpenCV-2.2.0/.DS_Store\nx OpenCV-2.2.0/3rdparty/CMakeLists.txt\n\
    x OpenCV-2.2.0/3rdparty/ilmimf/LICENSE\nx OpenCV-2.2.0/3rdparty/ilmimf/README\n\
    …… 等等更多……\n```\n\n现在解压了库，我们需要打一个快速补丁，确保能为 iOS 构建。从 [`https://github.com/niw/iphone_opencv_test`](https://github.com/niw/iphone_opencv_test)\
    \ 下载补丁文件。为方便起见，我下载了整个 GitHub 仓库，并将 OpenCV 发行版移到该目录。运行列表 12–12 中的命令。\n\n**列表 12–12.**\
    \ *为 OpenCV 打补丁*\n\n```\nKyle-Roches-MacBook-Pro-2:OpenCV-2.2.0 kyleroche$ patch\
    \ -p1 < ../OpenCV-2.2.0.patch\npatching file CMakeLists.txt\npatching file modules/CMakeLists.txt\n\
    ```\n\n**注意：** 下一节中我们需要使用 cmake。如果尚未安装，可以从 Macports 或 Homebrew 获取。如果必须安装 cmake，可能需要启动后去喝杯咖啡，因为安装过程相当耗时。\n\
    \n现在有了打过补丁的 OpenCV 版本，我们可以为当前架构重新构建它。运行列表 12–13 中的命令。\n\n**列表 12–13.** *为模拟器构建\
    \ OpenCV 静态库*\n\n```\nKyle-Roches-MacBook-Pro-2:build_simulator kyleroche $ export\
    \ IPHONEOS_VERSION_MIN=\"4.0\"\nKyle-Roches-MacBook-Pro-2:build_simulator kyleroche$\
    \ ../opencv_cmake.sh Simulator\n../OpenCV-2.2.0\nKyle-Roches-MacBook-Pro-2:build_simulator\
    \ kyleroche$ make -j 4\nKyle-Roches-MacBook-Pro-2:build_simulator kyleroche$ make\
    \ install\n```\n\n你可以重复相同的过程为设备构建 OpenCV。只需将 `opencv_cmake.sh` 的参数改为 `Device`\
    \ 而非 `Simulator`（在列表 12–13 中用粗体显示）。\n\n好了，现在应该有一个新的构建目录，用来替换当前项目中无法正常工作的那个。打开\
    \ Xcode，从项目中删除**OpenCV**目录。添加新构建的目录，其中包含 `Simulator` 和 `Device`（如果你计划在设备上测试）的目标。\n\
    \n**注意：** 如果在模拟器上测试，需要将 Accelerate 框架添加到项目中。示例项目中未包含此框架。\n\n让我们再次尝试运行此项目。使用相机或从相册选择文件。你应该会看到类似图\
    \ 12–6 的结果。\n\n![Image](img/1206.jpg)\n\n**图 12–6.** *OpenCV 现在可以在 iPad 模拟器上正常工作。*\n\
    \n我们在相册的图片中找到了猫王（Elvis）。\n\n#### OpenCV 回顾\n\n事实证明 OpenCV 并不那么用户友好。虽然文档齐全，但主要的示例尚未适配\
    \ iOS 5，也未针对当前架构进行编译。OpenCV 功能强大，但需要大量工作才能运行起来。作为练习，请使用 `UILabel` 测量 OpenCV 分析图像所需的时间。你可以对比接下来两种方法的结果。\n"
- fmt: "### Using the CIDetector Class Approach\n\nThe `CIDetector` class is new to\
    \ iOS 5. At the release of iOS 5, only one detector was available, and that is\
    \ for facial recognition. Let’s take a look at the difference between using the\
    \ native class and using OpenCV.\n\nTo keep the comparisons as close to fair as\
    \ possible, let’s use the same application and add a few methods to analyze the\
    \ face using `CIDetector` instead of OpenCV.\n\nOpen the OpenCV-iPad project again,\
    \ and add the `CoreImage` framework to the project. We will need this to access\
    \ the `CIDetector` classes. Open `MainViewController.h` and update it, as shown\
    \ in [Listing 12–14](#Chapter12.html#list_12_14).\n\n**Listing 12–14.** *Updated\
    \ MainViewController.h*\n\n```\n#import <UIKit/UIKit.h>\n#import <CoreImage/CoreImage.h>\n\
    \n#define DETECT_IMAGE_MAX_SIZE  1024\n\n@interface MainViewController : UIViewController\
    \ <UINavigationControllerDelegate,\nUIImagePickerControllerDelegate, UIActionSheetDelegate,\
    \ UIPopoverControllerDelegate> {\n    UIImagePickerController *_imagePicker;\n\
    \    UIPopoverController *_imagePopover;\n}\n\n@property (nonatomic, retain) CIDetector\
    \ *detector;\n@property (retain, nonatomic) IBOutlet UIImageView *cameraView;\n\
    @property (retain, nonatomic) IBOutlet UILabel *timerLabel;\n@property (retain,\
    \ nonatomic) IBOutlet UIToolbar *toolbar;\n- (IBAction)cameraButtonClicked:(id)sender;\n\
    @end\n```\n\nWe’re going to need a property of the `CIDetector` type to analyze\
    \ the image. Switch over to `MainViewController.m` and synthesize the new detector\
    \ property. Next, add the declaration from [Listing 12–15](#Chapter12.html#list_12_15)\
    \ to the `Private` block, just under the `import` statements.\n\n**Listing 12–15.**\
    \ *Private Method Declaration for CIDetectorFaceDetect*\n\n```\n-(void) CIDetectorFaceDetect\
    \ {\n    NSLog(@\"CI Face Detect started\");\n    NSArray *arr = [self.detector\
    \ featuresInImage:[CIImage\nimageWithCGImage:[cameraView.image CGImage]]];\n \
    \   NSLog(@\"Set up Array\");\n    if([arr count]>0){\n        for(int i=0;i<[arr\
    \ count];i++){\n            NSLog(@\"%d Face found!\",i + 1);\n            CIFaceFeature\
    \ * feature = [arr objectAtIndex:i];\n            if(feature.hasLeftEyePosition){\n\
    \                NSLog(@\"Left eye position: (%f, %f)\",feature.leftEyePosition.x,feature.leftEyePosition.y);\n\
    \            }\n            if(feature.hasRightEyePosition){\n               \
    \ NSLog(@\"Right eye position: (%f, %f)\",feature.rightEyePosition.x,feature.rightEyePosition.y);\n\
    \            }\n            if(feature.hasMouthPosition){\n                NSLog(@\"\
    Mouth position: (%f, %f)\",feature.mouthPosition.x,feature.mouthPosition.y);\n\
    \            }\n\n        }\n    } else {\n        NSLog(@\"Nothing detected\"\
    );\n    }\n}\n```\n\nMake sure you synthesize and release the property in the\
    \ implementation. Finally, we need to update the `didFinishPickingImage` delegate\
    \ method, as shown in [Listing 12–16](#Chapter12.html#list_12_16).\n\n**Listing\
    \ 12–16.** *Updated didFinishPickingImage*\n\n```\n- (void)imagePickerController:(UIImagePickerController\
    \ *)picker\ndidFinishPickingImage:(UIImage *)image editingInfo:(NSDictionary *)editingInfo\
    \ {\n    [self dismissModalViewControllerAnimated:YES];\n    cameraView.image\
    \ = image;\n\n    //[self openCVFaceDetect];\n    [self CIDetectorFaceDetect];\n\
    }\n```\n\nAnd, that’s it. Very different than OpenCV, especially if you’re an\
    \ Objective-C coder who’s not that fond of a ton of C code in your projects. This\
    \ is pretty easy to follow. We call the `featuresInImage` instance method of the\
    \ `CIDetector` class to analyze the `UIImage`. There is no need to convert the\
    \ image to `IplImage` format, as we had to do with OpenCV. `CIDetector` can analyze\
    \ the image in the native `UIImage` format.\n\nRun the project on the simulator\
    \ or on your physical device. Watch the console and you should see something similar\
    \ to [Figure 12–7](#Chapter12.html#fig_12_7).\n\n![Image](images/1207.jpg)\n\n\
    **Figure 12–7.** *CIDetector is working on the iPad simulator.*\n\nYou can extend\
    \ this example to redraw a box around the image, if you want. You can tell a bit\
    \ about the x,y coordinates if you compare it to the photo of Elvis I’m using\
    \ for testing. You can see that the left eye is located at 183,341 and the right\
    \ eye position is 244,330. It is important to realize that the image is mirrored.\
    \ So, the right eye, on our right side when looking at the simulator, is to the\
    \ right and a bit lower than the eye on our left when looking at the simulator.\
    \ Given the angle of Elvis’ face, this looks fairly accurate.\n\n`CIDetector`\
    \ returns a `CIFaceFeature` object, which has some properties we’ve logged in\
    \ the console. Hopefully, we’ll see this class extended over time to add new features,\
    \ such as mood detection and more.\n\n#### CIDetector Review\n\nWith less than\
    \ 15 lines of actual code (discounting logging code) we were able to analyze a\
    \ photo for faces. There was no need to add third-party libraries or build any\
    \ static libraries manually. It simply worked with iOS 5.\n\nPlus, if you were\
    \ to attach this to a live camera view, you’d be able to see that it can keep\
    \ up with the speed of the camera buffer. As an exercise, if you did this after\
    \ OpenCV, use the `timerLabel` to compare performance between the two approaches\
    \ we’ve discussed so far.\n\n### Using the Face.com API Approach\n\nIn the previous\
    \ examples, we benefited from the speed and power of native processing. However,\
    \ we either sacrificed ease of setup or lack of information about the recognized\
    \ facial object.\n\nWouldn’t it be nice to have an easy way to detect not only\
    \ the face, but also its mood and any other useful information that can be derived\
    \ from the photo?\n\nFace.com uses a REST API to accomplish just that. The disadvantage,\
    \ for us mobile developers, is the need to always have a connection to the Internet.\
    \ But, these days, that might not be that big of a drawback.\n\n#### Faces.detect\
    \ API Call\n\nThis API call, from face.com, returns tags for detected faces in\
    \ one or more photos, with geometric information of the tag, eyes, nose, and mouth,\
    \ as well as various attributes such as gender, is wearing glasses, and is smiling.\n\
    \nPhotos can also be uploaded directly in the API request. A request that uploads\
    \ a photo must be formed as a MIME multipart message sent using POST data. Each\
    \ argument, including the raw image data, should be specified as a separate chunk\
    \ of form data.\n\nFollowing are a few things to note when using the face.com\
    \ API:\n\n*   All coordinates are provided in percent values to support any photo\
    \ scale. Photo height and width (vs. tag height/width) are provided in pixels.\
    \ Yaw, roll, and pitch are provided on the –90° to 90° scale.\n*   The maximum\
    \ width or height of a photo is 900 pixels. You may POST or send links to higher-size\
    \ photos, but those will be resized internally to improve performance.\n*   Every\
    \ tag we return contains a set of attributes. The most important of them is the\
    \ face attribute. It contains the confidence level of that tag being a face. As\
    \ shown in the developer tools demo, I recommend using tags with confidence greater\
    \ than 50 percent. Tags with lower confidence might also be a face, but have a\
    \ higher probability to be false-positive detection.\n\nTo compare the facial-recognition\
    \ algorithms, we’ll extend our example with a method that calls the face.com API.\
    \ We’ll be taking a look at this approach in [Chapter 13](#Chapter13.html#ch13)\
    \ in more detail."
  raw: '### Using the CIDetector Class Approach


    The `CIDetector` class is new to iOS 5\. At the release of iOS 5, only one detector
    was available, and that is for facial recognition. Let’s take a look at the difference
    between using the native class and using OpenCV.


    To keep the comparisons as close to fair as possible, let’s use the same application
    and add a few methods to analyze the face using `CIDetector` instead of OpenCV.


    Open the OpenCV-iPad project again, and add the `CoreImage` framework to the project.
    We will need this to access the `CIDetector` classes. Open `MainViewController.h`
    and update it, as shown in [Listing 12–14](#Chapter12.html#list_12_14).


    **Listing 12–14.** *Updated MainViewController.h*


    `#import <UIKit/UIKit.h>`

    **`#import <CoreImage/CoreImage.h>`**


    `#define DETECT_IMAGE_MAX_SIZE  1024`


    `@interface MainViewController : UIViewController <UINavigationControllerDelegate,`

    `UIImagePickerControllerDelegate, UIActionSheetDelegate, UIPopoverControllerDelegate>
    {`

    `    UIImagePickerController *_imagePicker;`

    `    UIPopoverController *_imagePopover;`

    `}`


    **`@property (nonatomic, retain) CIDetector *detector;`**

    `@property (retain, nonatomic) IBOutlet UIImageView *cameraView;`

    `@property (retain, nonatomic) IBOutlet UILabel *timerLabel;`

    `@property (retain, nonatomic) IBOutlet UIToolbar *toolbar;`

    `- (IBAction)cameraButtonClicked:(id)sender;`

    `@end`


    We’re going to need a property of the `CIDetector` type to analyze the image.
    Switch over to `MainViewController.m` and synthesize the new detector property.
    Next, add the declaration from [Listing 12–15](#Chapter12.html#list_12_15) to
    the `Private` block, just under the `import` statements.


    **Listing 12–15.** *Private Method Declaration for CIDetectorFaceDetect*


    `-(void) CIDetectorFaceDetect {`

    `    NSLog(@"CI Face Detect started");`

    `NSArray *arr =` **`[self.detector featuresInImage:[CIImage`

    `imageWithCGImage:[cameraView.image CGImage]]];`**

    `    NSLog(@"Set up Array");`

    `    if([arr count]>0){`

    `        for(int i=0;i<[arr count];i++){`

    `            NSLog(@"%d Face found!",i + 1);`

    `            CIFaceFeature * feature = [arr objectAtIndex:i];`

    `            if(feature.hasLeftEyePosition){`

    `                NSLog(@"Left eye position: (%f, %f)",feature.leftEyePosition.x,feature.leftEyePosition.y);`

    `            }`

    `            if(feature.hasRightEyePosition){`

    `                NSLog(@"Right eye position: (%f, %f)",feature.rightEyePosition.x,feature.rightEyePosition.y);`

    `            }`

    `            if(feature.hasMouthPosition){`

    `                NSLog(@"Mouth position: (%f, %f)",feature.mouthPosition.x,feature.mouthPosition.y);`

    `            }`


    `        }`

    `    } else {`

    `        NSLog(@"Nothing detected");`

    `    }`

    `}`


    Make sure you synthesize and release the property in the implementation. Finally,
    we need to update the `didFinishPickingImage` delegate method, as shown in [Listing
    12–16](#Chapter12.html#list_12_16).


    **Listing 12–16.** *Updated didFinishPickingImage*


    `- (void)imagePickerController:(UIImagePickerController *)picker`

    `didFinishPickingImage:(UIImage *)image editingInfo:(NSDictionary *)editingInfo
    {`

    `    [self dismissModalViewControllerAnimated:YES];`

    `    cameraView.image = image;`


    **`    //[self openCVFaceDetect];`

    `    [self CIDetectorFaceDetect];`**

    `}`


    And, that’s it. Very different than OpenCV, especially if you’re an Objective-C
    coder who’s not that fond of a ton of C code in your projects. This is pretty
    easy to follow. We call the `featuresInImage` instance method of the `CIDetector`
    class to analyze the `UIImage`. There is no need to convert the image to `IplImage`
    format, as we had to do with OpenCV. `CIDetector` can analyze the image in the
    native `UIImage` format.


    Run the project on the simulator or on your physical device. Watch the console
    and you should see something similar to [Figure 12–7](#Chapter12.html#fig_12_7).


    ![Image](images/1207.jpg)


    **Figure 12–7.** *CIDetector is working on the iPad simulator.*


    You can extend this example to redraw a box around the image, if you want. You
    can tell a bit about the x,y coordinates if you compare it to the photo of Elvis
    I’m using for testing. You can see that the left eye is located at 183,341 and
    the right eye position is 244,330\. It is important to realize that the image
    is mirrored. So, the right eye, on our right side when looking at the simulator,
    is to the right and a bit lower than the eye on our left when looking at the simulator.
    Given the angle of Elvis’ face, this looks fairly accurate.


    `CIDetector` returns a `CIFaceFeature` object, which has some properties we’ve
    logged in the console. Hopefully, we’ll see this class extended over time to add
    new features, such as mood detection and more.


    #### CIDetector Review


    With less than 15 lines of actual code (discounting logging code) we were able
    to analyze a photo for faces. There was no need to add third-party libraries or
    build any static libraries manually. It simply worked with iOS 5.


    Plus, if you were to attach this to a live camera view, you’d be able to see that
    it can keep up with the speed of the camera buffer. As an exercise, if you did
    this after OpenCV, use the `timerLabel` to compare performance between the two
    approaches we’ve discussed so far.


    ### Using the Face.com API Approach


    In the previous examples, we benefited from the speed and power of native processing.
    However, we either sacrificed ease of setup or lack of information about the recognized
    facial object.


    Wouldn’t it be nice to have an easy way to detect not only the face, but also
    its mood and any other useful information that can be derived from the photo?


    Face.com uses a REST API to accomplish just that. The disadvantage, for us mobile
    developers, is the need to always have a connection to the Internet. But, these
    days, that might not be that big of a drawback.


    #### Faces.detect API Call


    This API call, from face.com, returns tags for detected faces in one or more photos,
    with geometric information of the tag, eyes, nose, and mouth, as well as various
    attributes such as gender, is wearing glasses, and is smiling.


    Photos can also be uploaded directly in the API request. A request that uploads
    a photo must be formed as a MIME multipart message sent using POST data. Each
    argument, including the raw image data, should be specified as a separate chunk
    of form data.


    Following are a few things to note when using the face.com API:


    *   All coordinates are provided in percent values to support any photo scale.
    Photo height and width (vs. tag height/width) are provided in pixels. Yaw, roll,
    and pitch are provided on the –90° to 90° scale.

    *   The maximum width or height of a photo is 900 pixels. You may POST or send
    links to higher-size photos, but those will be resized internally to improve performance.

    *   Every tag we return contains a set of attributes. The most important of them
    is the face attribute. It contains the confidence level of that tag being a face.
    As shown in the developer tools demo, I recommend using tags with confidence greater
    than 50 percent. Tags with lower confidence might also be a face, but have a higher
    probability to be false-positive detection.


    To compare the facial-recognition algorithms, we’ll extend our example with a
    method that calls the face.com API. We’ll be taking a look at this approach in
    [Chapter 13](#Chapter13.html#ch13) in more detail.'
  trans: "\n### 使用 CIDetector 类方法\n\n`CIDetector` 类是 iOS 5 新增的。在 iOS 5 发布时，只有一种检测器可用，即用于面部识别。让我们看看使用原生类和使用\
    \ OpenCV 之间的区别。\n\n为了尽可能公平地进行比较，我们使用同一个应用程序，并添加一些方法，利用 `CIDetector` 替代 OpenCV\
    \ 来分析面部信息。\n\n再次打开 OpenCV-iPad 项目，并将 `CoreImage` 框架添加到项目中。我们需要它来访问 `CIDetector`\
    \ 类。打开 `MainViewController.h` 并按照代码清单 12-14 所示进行更新。\n\n**代码清单 12-14.** *更新后的 MainViewController.h*\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <CoreImage/CoreImage.h>\n\n#define DETECT_IMAGE_MAX_SIZE\
    \  1024\n\n@interface MainViewController : UIViewController <UINavigationControllerDelegate,\n\
    UIImagePickerControllerDelegate, UIActionSheetDelegate, UIPopoverControllerDelegate>\
    \ {\n    UIImagePickerController *_imagePicker;\n    UIPopoverController *_imagePopover;\n\
    }\n\n@property (nonatomic, retain) CIDetector *detector;\n@property (retain, nonatomic)\
    \ IBOutlet UIImageView *cameraView;\n@property (retain, nonatomic) IBOutlet UILabel\
    \ *timerLabel;\n@property (retain, nonatomic) IBOutlet UIToolbar *toolbar;\n-\
    \ (IBAction)cameraButtonClicked:(id)sender;\n@end\n```\n\n我们需要一个 `CIDetector`\
    \ 类型的属性来分析图像。切换到 `MainViewController.m` 并合成新的检测器属性。接着，在 `import` 语句下方的 `Private`\
    \ 块中添加代码清单 12-15 中的声明。\n\n**代码清单 12-15.** *CIDetectorFaceDetect 的私有方法声明*\n\n```\n\
    -(void) CIDetectorFaceDetect {\n    NSLog(@\"CI 面部检测开始\");\n    NSArray *arr =\
    \ [self.detector featuresInImage:[CIImage\nimageWithCGImage:[cameraView.image\
    \ CGImage]]];\n    NSLog(@\"设置数组\");\n    if([arr count]>0){\n        for(int\
    \ i=0;i<[arr count];i++){\n            NSLog(@\"发现第 %d 张脸！\",i + 1);\n       \
    \     CIFaceFeature * feature = [arr objectAtIndex:i];\n            if(feature.hasLeftEyePosition){\n\
    \                NSLog(@\"左眼位置: (%f, %f)\",feature.leftEyePosition.x,feature.leftEyePosition.y);\n\
    \            }\n            if(feature.hasRightEyePosition){\n               \
    \ NSLog(@\"右眼位置: (%f, %f)\",feature.rightEyePosition.x,feature.rightEyePosition.y);\n\
    \            }\n            if(feature.hasMouthPosition){\n                NSLog(@\"\
    嘴巴位置: (%f, %f)\",feature.mouthPosition.x,feature.mouthPosition.y);\n         \
    \   }\n\n        }\n    } else {\n        NSLog(@\"未检测到任何内容\");\n    }\n}\n```\n\
    \n确保在实现文件中合成并释放该属性。最后，我们需要更新 `didFinishPickingImage` 委托方法，如代码清单 12-16 所示。\n\n\
    **代码清单 12-16.** *更新后的 didFinishPickingImage*\n\n```\n- (void)imagePickerController:(UIImagePickerController\
    \ *)picker\ndidFinishPickingImage:(UIImage *)image editingInfo:(NSDictionary *)editingInfo\
    \ {\n    [self dismissModalViewControllerAnimated:YES];\n    cameraView.image\
    \ = image;\n\n    //[self openCVFaceDetect];\n    [self CIDetectorFaceDetect];\n\
    }\n```\n\n就是这样。这与 OpenCV 截然不同，尤其是当你是一位不喜欢在项目中混杂大量 C 代码的 Objective-C 开发者时。这个方法非常易于理解。我们调用\
    \ `CIDetector` 类的 `featuresInImage` 实例方法来分析 `UIImage`。无需像使用 OpenCV 那样将图像转换为 `IplImage`\
    \ 格式。`CIDetector` 可以直接分析原生 `UIImage` 格式的图像。\n\n在模拟器或实体设备上运行项目。观察控制台，你应该会看到类似图\
    \ 12-7 的输出。\n\n![Image](img/1207.jpg)\n\n**图 12-7.** *CIDetector 在 iPad 模拟器上运行。*\n\
    \n你可以扩展这个示例，在图像周围重新绘制一个框，如果你愿意的话。如果将坐标与我用于测试的埃尔维斯照片进行比较，你可以大致了解 x,y 坐标。你可以看到左眼位于\
    \ (183,341)，右眼位于 (244,330)。重要的是要意识到图像是镜像的。因此，在我们观看模拟器时位于右侧的右眼，其位置比我们观看模拟器时位于左侧的眼睛更靠右且略低。考虑到埃尔维斯脸部的角度，这个检测结果相当准确。\n\
    \n`CIDetector` 返回一个 `CIFaceFeature` 对象，这个对象具有一些我们在控制台中已记录下来的属性。希望随着时间的推移，我们能见证这个类不断扩展，增加诸如情绪检测等新功能。\n\
    \n#### CIDetector 回顾\n\n只需不到 15 行的实际代码（排除日志记录代码），我们就能分析照片中的人脸。无需添加第三方库或手动构建任何静态库。它能与\
    \ iOS 5 无缝协作。\n\n另外，如果你将这个功能连接到实时摄像头视图，你会看到它能够跟上摄像头缓冲区的速度。作为练习，如果是在学习 OpenCV 之后进行此操作，可以使用\
    \ `timerLabel` 来比较我们目前讨论的这两种方法的性能。\n\n### 使用 Face.com API 方法\n\n在前面的示例中，我们受益于原生处理的速度和强大功能。然而，我们要么牺牲了配置的简便性，要么缺少关于已识别面部对象的信息。\n\
    \n如果有一种简单的方法不仅能检测人脸，还能检测其情绪以及任何其他可以从照片中提取的有用信息，那该多好？\n\nFace.com 正是通过 REST API\
    \ 实现了这一点。对我们移动开发者来说，不利之处在于始终需要连接互联网。但如今，这可能并不算一个太大的缺点。\n\n#### Faces.detect API\
    \ 调用\n\n这个来自 face.com 的 API 调用，会返回一张或多张照片中检测到的人脸标签，其中包括标签、眼睛、鼻子和嘴巴的几何信息，以及性别、是否戴眼镜、是否微笑等多种属性。\n\
    \n照片也可以直接在 API 请求中上传。上传照片的请求必须构建为使用 POST 数据发送的 MIME 多部分消息。每个参数（包括原始图像数据）都应指定为表单数据的一个独立块。\n\
    \n使用 face.com API 时需要注意以下几点：\n\n*   所有坐标都以百分比值提供，以支持任何照片比例。照片的高度和宽度（相对于标签的高度/宽度）以像素为单位提供。偏航角、翻滚角和俯仰角以\
    \ -90° 到 90° 的范围提供。\n*   照片的最大宽度或高度为 900 像素。你可以 POST 或发送更高尺寸照片的链接，但这些照片会在内部调整大小以提高性能。\n\
    *   我们返回的每个标签都包含一组属性。其中最重要的是面部属性。它包含该标签是人脸的置信度水平。如开发者工具演示所示，我建议使用置信度超过 50% 的标签。置信度较低的标签可能也是人脸，但误检为阳性的概率更高。\n\
    \n为了比较面部识别算法，我们将用一个调用 face.com API 的方法来扩展我们的示例。我们将在第 13 章中更详细地探讨这种方法。\n"
- fmt: "#### Adding Face.com Support to Our Sample  \n\nOpen `OpenCV-iPad` in Xcode\
    \ again. Copy the following files from either the GitHub repository or the Source\
    \ Code/Download area of the Apress web site (`www.apress.com`). Alternatively,\
    \ you can download them yourself from `http://allseeing-i.com/ASIHTTPRequest`.\
    \ We’ll talk more about this library in [Chapter 13](#Chapter13.html#ch13). For\
    \ now, just copy these files into your project.  \n\n- `ASIHTTPRequestConfig.h`\
    \  \n- `ASIHTTPRequestDelegate.h`  \n- `ASIProgressDelegate.h`  \n- `ASICacheDelegate.h`\
    \  \n- `ASIHTTPRequest.h`  \n- `ASIHTTPRequest.m`  \n- `ASIDataCompressor.h` \
    \ \n- `ASIDataCompressor.m`  \n- `ASIDataDecompressor.h`  \n- `ASIDataDecompressor.m`\
    \  \n- `ASIFormDataRequest.h`  \n- `ASIInputStream.h`  \n- `ASIInputStream.m`\
    \  \n- `ASIFormDataRequest.m`  \n- `ASINetworkQueue.h`  \n- `ASINetworkQueue.m`\
    \  \n- `ASIDownloadCache.h`  \n- `ASIDownloadCache.m`  \n- `ASIAuthenticationDialog.h`\
    \  \n- `ASIAuthenticationDialog.m`  \n- `Reachability.h` (in the `External/Reachability`\
    \ folder)  \n- `Reachability.m` (in the `External/Reachability` folder)  \n\n\
    In addition, you need to add the `CFNetwork`, `SystemConfiguration`, `MobileCoreServices`,\
    \ and `libz.dylib` frameworks to the project. Make sure your project builds without\
    \ errors before you move forward.  \n\n#### Face.com API Key  \n\nOpen your browser\
    \ to [`http://www.face.com`](http://www.face.com). In the top right-hand corner,\
    \ there should be a link called **Developers**. Follow that link, then click the\
    \ gigantic **Get Started** image in the middle of the page. The sign-up process\
    \ for face.com is fairly noninvasive. It only requires you to provide your name,\
    \ e-mail, and a password. If you’re feeling more generous, give them the rest\
    \ of the information. Either way, prove you’re human by completing the CAPTCHA\
    \ and click **Signup**. Follow the instructions in your confirmation e-mail to\
    \ verify your account.  \n\nGo to the **API Keys** tab after you’re logged in.\
    \ Create a new application. It doesn’t matter what you name the application. I’ve\
    \ used `iOS AR Demo` for my application name. You will see a page similar to [Figure\
    \ 12–8](#Chapter12.html#fig_12_8).  \n\n![Image](images/1208.jpg)  \n\n**Figure\
    \ 12–8.** *Set up your face.com application.*  \n\nThere are two settings here\
    \ you will need when we start building the application. They are the **API Key**\
    \ and the **API Secret**.  \n\n#### Adding the Face.com Callout  \n\nOpen `MainViewController.h`\
    \ in Xcode. Import `ASIFormDataRequest.h` in your header. Switch over to `MainViewController.m`.\
    \ Declare a new private method called `FaceDotComFaceDetect` in the private block,\
    \ just after the `import` statements.  \n\nAdd the method from [Listing 12–17](#Chapter12.html#list_12_17).\
    \  \n\n**Listing 12–17.** *FaceDotComFaceDetect Method*  \n\n```objc\n- (void)FaceDotComFaceDetect\
    \ {  \n    NSAutoreleasePool * pool = [[NSAutoreleasePool alloc] init];  \n  \
    \  NSData * imageData = UIImageJPEGRepresentation(cameraView.image, 90);  \n\n\
    \    NSURL * url = [NSURL URLWithString:@\"http://api.face.com/faces/detect.json\"\
    ];  \n\n    ASIFormDataRequest *request = [ASIFormDataRequest requestWithURL:url];\
    \  \n    [request addPostValue:@\"\" forKey:@\"api_key\"];  \n    [request addPostValue:@\"\
    \" forKey:@\"api_secret\"];  \n    [request addPostValue:@\"all\" forKey:@\"attributes\"\
    ];  \n    [request addData:imageData withFileName:@\"image.jpg\" andContentType:@\"\
    image/jpeg\"  \n            forKey:@\"filename\"];  \n\n    [request startSynchronous];\
    \  \n\n    NSError *error = [request error];  \n    if (!error) {  \n        NSString\
    \ *response = [request responseString];  \n        NSDictionary *feed = [NSJSONSerialization\
    \ JSONObjectWithData:[request responseData]  \n                              \
    \                               options:kNilOptions  \n                      \
    \                                         error:&error];  \n\n        NSLog(@\"\
    RETURN: %@\", [feed allKeys]);  \n        NSLog(@\"%@\",response);  \n    } else\
    \ {  \n        NSLog(@\"An error occured %d\",[error code]);  \n    }  \n\n  \
    \  [pool drain];  \n}\n```\n\nBefore we step through this, make sure you substitute\
    \ the real values for your face.com credentials in the code shown in bold. We’ll\
    \ talk more about the second bolded section in a moment.  \n\nThe method is similar\
    \ to our other two approaches to facial recognition. First, we set up an `NSAutoreleasePool`\
    \ for memory management. Once again, we get the `UIImage` from the `cameraViewUIImageView`.\
    \ However, this time we set up an HTTP POST request for the face.com API. We add\
    \ the raw JPEG representation data to the POST body as a null parameter.  \n\n\
    Next, we analyze our response to make sure it didn’t throw an exception. If there’s\
    \ no error, we move on to serialize the JSON response and convert it into an `NSDictionary`.\
    \  \n\nThen, we simply print the response to the console. Update the `didFinishPickingImage`\
    \ method one last time to comment out our previous approaches and call our new\
    \ method. The updated method should read like [Listing 12–18](#Chapter12.html#list_12_18).\
    \  \n\n**Listing 12–18.** *Updated `didFinishPickingImage`*  \n\n```objc\n- (void)imagePickerController:(UIImagePickerController\
    \ *)picker  \ndidFinishPickingImage:(UIImage *)image editingInfo:(NSDictionary\
    \ *)editingInfo {  \n    [self dismissModalViewControllerAnimated:YES];  \n  \
    \  cameraView.image = image;  \n\n    //[self openCVFaceDetect];  \n    //[self\
    \ CIDetectorFaceDetect];  \n    [self FaceDotComFaceDetect];  \n}\n```\n\nBefore\
    \ we run the application, let’s discuss the second section of bolded code from\
    \ [Listing 12–17](#Chapter12.html#list_12_17). iOS 5 introduced native JSON support\
    \ for framework objects. You use the new `NSJSONSerialization` class to convert\
    \ JSON to Foundation objects and convert Foundation objects to JSON.  \n\nAn object\
    \ that may be converted to JSON must have the following properties:  \n\n- The\
    \ top-level object is an `NSArray` or `NSDictionary`.  \n- All objects are instances\
    \ of `NSString`, `NSNumber`, `NSArray`, `NSDictionary`, or `NSNull`.  \n- All\
    \ dictionary keys are instances of `NSString`.  \n- Numbers are not NaN or infinity.\
    \  \n\nOkay, run the project. I’m going to select the same Elvis image again to\
    \ keep things consistent. The console output from the new request is shown in\
    \ [Listing 12–19](#Chapter12.html#list_12_19).  \n\n**Listing 12–19.** *Console\
    \ Output from face.com Request*"
  raw: '#### Adding Face.com Support to Our Sample


    Open OpenCV-iPad in Xcode again. Copy the following files from either the GitHub
    repository or the Source Code/Download area of the Apress web site (`www.apress.com`).
    Alternatively, you can download them yourself from `http://allseeing-i.com/ASIHTTPRequest`.
    We’ll talk more about this library in [Chapter 13](#Chapter13.html#ch13). For
    now, just copy these files into your project.


    *   `ASIHTTPRequestConfig.h`

    *   `ASIHTTPRequestDelegate.h`

    *   `ASIProgressDelegate.h`

    *   `ASICacheDelegate.h`

    *   `ASIHTTPRequest.h`

    *   `ASIHTTPRequest.m`

    *   `ASIDataCompressor.h`

    *   `ASIDataCompressor.m`

    *   `ASIDataDecompressor.h`

    *   `ASIDataDecompressor.m`

    *   `ASIFormDataRequest.h`

    *   `ASIInputStream.h`

    *   `ASIInputStream.m`

    *   `ASIFormDataRequest.m`

    *   `ASINetworkQueue.h`

    *   `ASINetworkQueue.m`

    *   `ASIDownloadCache.h`

    *   `ASIDownloadCache.m`

    *   `ASIAuthenticationDialog.h`

    *   `ASIAuthenticationDialog.m`

    *   `Reachability.h` (in the `External/Reachability` folder)

    *   `Reachability.m` (in the `External/Reachability` folder)


    In addition, you need to add the CFNetwork, SystemConfiguration, MobileCoreServices,
    and the libz.dylib frameworks to the project. Make sure your project builds without
    errors before you move forward.


    #### Face.com API Key


    Open your browser to [`http://www.face.com`](http://www.face.com). In the top
    right-hand corner, there should be a link called **Developers**. Follow that link,
    then click the gigantic **Get Started** image in the middle of the page. The sign-up
    process for face.com is fairly noninvasive. It only requires you to provide your
    name, e-mail, and a password. If you’re feeling more generous, give them the rest
    of the information. Either way, prove you’re human by completing the CAPTCHA and
    click **Signup**. Follow the instructions in your confirmation e-mail to verify
    your account.


    Go to the **API Keys** tab after you’re logged in. Create a new application. It
    doesn’t matter what you name the application. I’ve used iOS AR Demo for my application
    name. You will see a page similar to [Figure 12–8](#Chapter12.html#fig_12_8).


    ![Image](images/1208.jpg)


    **Figure 12–8.** *Set up your face.com application.*


    There are two settings here you will need when we start building the application.
    They are the **API Key** and the **API Secret**.


    #### Adding the Face.com Callout


    Open `MainViewController.h` in Xcode. Import `ASIFormDataRequest.h` in your header.
    Switch over to `MainViewController.m`. Declare a new private method called `FaceDotComFaceDetect`
    in the private block, just after the `import` statements.


    Add the method from [Listing 12–17](#Chapter12.html#list_12_17).


    **Listing 12–17.** *FaceDotComFaceDetect Method*


    `- (void)FaceDotComFaceDetect {`

    `    NSAutoreleasePool * pool = [[NSAutoreleasePool alloc] init];`

    `    NSData * imageData = UIImageJPEGRepresentation(cameraView.image, 90);`


    `    NSURL * url = [NSURL URLWithString:@"http://api.face.com/faces/detect.json"];`


