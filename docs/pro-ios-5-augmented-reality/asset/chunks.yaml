    \ performSelectorOnMainThread:@selector(bumpAppStatus) withObject:nil\nwaitUntilDone:NO];\n\
    \n}\n```\n\n这些方法用于加载标记。当标记加载完成后，如加粗行所示，我们将应用状态切换到枚举中的下一项。我们引用但尚未实现的另一个选择器是 QCAR\
