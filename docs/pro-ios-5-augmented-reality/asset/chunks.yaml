  trans: "\n测试区域监控服务的最后一步是调用我们刚刚创建的 `startRegionMonitoring` 方法。在第 2 章中，我们讨论了如何在使用现有服务和支持的硬件之前对其进行检查。在本场景中，我们也应执行同样的操作。`CLLocationManager`\
    \ 提供了一种方法来检查区域监控服务是否可用以及该服务是否实际启用。请更新您的 `viewDidLoad:` 方法，如代码清单 3-17 所示。\n\n**代码清单\
