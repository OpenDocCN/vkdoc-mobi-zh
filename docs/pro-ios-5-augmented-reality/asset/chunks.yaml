    \ 中的方法。\n\n**Listing 9–18.** 视图控制器的外部方法\n\n```\n- (void)onCreate\n{\n    NSLog(@\"\
    EAGLView onCreate()\");\n    appStatus = APPSTATUS_UNINITED;\n    [self updateApplicationStatus:APPSTATUS_INIT_APP];\n\
    }\n\n- (void)onDestroy\n{\n    NSLog(@\"EAGLView onDestroy()\");\n\n    // Deinitialise\
    \ QCAR SDK\n    QCAR::deinit();\n}\n\n- (void)onResume\n{\n    NSLog(@\"EAGLView\
    \ onResume()\");\n    // QCAR-specific resume operation\n    QCAR::onResume();\n\
    \n    if (APPSTATUS_CAMERA_STOPPED == appStatus) {\n        [self updateApplicationStatus:APPSTATUS_CAMERA_RUNNING];\n\
    \    }\n}\n\n- (void)onPause\n{\n    NSLog(@\"EAGLView onPause()\");\n    // QCAR-specific\
    \ pause operation\n    QCAR::onPause();\n\n    if (APPSTATUS_CAMERA_RUNNING ==\
    \ appStatus) {\n        [self updateApplicationStatus:APPSTATUS_CAMERA_STOPPED];\n\
    \    }\n}\n```\n\n这些方法中的每一个都会在应用程序生命周期的不同时间点被调用。它们都不是很详细。每个方法都将状态更改为枚举中的特定值，并暂停、启动或恢复\
    \ `QCAR` SDK 操作。\n\n现在，当应用程序状态发生变化时，我们也需要处理这种情况。复制 [Listing 9–19](#Chapter09.html#list_9_19)\
    \ 中的方法来处理应用程序状态更改。\n\n**Listing 9–19.** 处理状态更新\n\n```\n- (void)updateApplicationStatus:(status)newStatus\n\
    {\n    if (newStatus != appStatus && APPSTATUS_ERROR != appStatus) {\n       \
    \ appStatus = newStatus;\n```"
