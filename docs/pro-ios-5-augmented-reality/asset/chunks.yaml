    \ width   = viewToDraw.bounds.size.width;\n            float height  = viewToDraw.bounds.size.height;\n\
    \n            viewToDraw.frame = CGRectMake(point.x - width / 2.0, point.y - (height\
    \ / 2.0), width, height);\n\n            if (!([viewToDraw superview])) {\n  \
    \              [_hudView addSubview:viewToDraw];\n                [_hudView sendSubviewToBack:viewToDraw];\n\
    \            }\n            totalDisplayed++;\n\n        } else {\n          \
    \  [viewToDraw removeFromSuperview];\n        }\n    }\n}\n```\n\n新的 `updateLocations`\
    \ 方法遍历 `_coordinates` 数组，并从 `pointForCoordinate` 方法中获取 `CGPoint` 对象。如果这些点位于视图范围内（由\
    \ `viewportContainsCoordinate` 方法验证），则将其布局在屏幕上。\n\n我们快完成了。在测试应用之前，我们需要添加位置和方向更新的方法处理程序。将列表\
    \ 11–34 中的方法复制到实现文件中。\n\n**列表 11–34.** *处理位置与方向*\n\n```objectivec\n- (void)locationManager:(CLLocationManager\
    \ *)manager didUpdateHeading:(CLHeading *)newHeading {\n    if (newHeading.headingAccuracy\
    \ > 0) {\n        _deviceHeading = newHeading;\n        [self updateCurrentCoordinate];\n\
    \    }\n}\n\n- (BOOL)locationManagerShouldDisplayHeadingCalibration:(CLLocationManager\
    \ *)manager {\n    return YES;\n}\n\n- (void)locationManager:(CLLocationManager\
    \ *)manager didUpdateToLocation:(CLLocation *)newLocation fromLocation:(CLLocation\
    \ *)oldLocation {\n    if (newLocation != oldLocation) {\n        [self updateCurrentLocation:newLocation];\n\
    \    }\n}\n\n- (void)locationManager:(CLLocationManager *)manager didFailWithError:(NSError\
    \ *)error {\n    [self.locationManager stopUpdatingLocation];\n}\n```\n\n这些方法应该相当容易理解。当我们收到更新的方向数据时，我们更新当前坐标。当我们收到位置变化时，我们更新位置信息。如果收到错误，我们停止位置管理器的更新。\n\
    \n在 `ARController.m` 文件中找到 `initWithViewController` 方法。添加列表 11–35 中的代码，为我们的属性设置一些初始值。\n\
    \n**列表 11–35.** *设置初始值*\n\n```objectivec\n_coordinates = [[NSMutableArray alloc]\
    \ init];\n_range = _hudView.bounds.size.width / 12;\n_deviceLocation = [[CLLocation\
    \ alloc] initWithLatitude:39.75 longitude:-104.86];\n```\n\n切换到 `RootViewController.m`\
    \ 文件。导入 `ARGeoCoordinate` 头文件。在 `loadView` 方法中，添加列表 11–36 中的代码。\n\n**列表 11–36.**\
    \ *使用我的位置进行初始化*\n\n```objectivec\n_arController = [[ARController alloc] initWithViewController:self];\n\
    \nARGeoCoordinate *tempCoordinate;\nCLLocation        *tempLocation;\n```\n"
- fmt: "`tempLocation = [[CLLocation alloc] initWithLatitude:39.550051 longitude:-105.782067];`\n\
