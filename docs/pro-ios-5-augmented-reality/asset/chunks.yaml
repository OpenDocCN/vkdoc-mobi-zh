    \ you run the project as is, you should see the correct overlay and mood label\
    \ on the screen after the request has been parsed. I got a bit of help from my\
    \ kids for this part. The results are shown in [Figure 13–12](#Chapter13.html#fig_13_12)\
    \ through [Figure 13–14](#Chapter13.html#fig_13_14).\n\nTake note of the mood\
    \ label change between expressions. Face.com did a great job recognizing the expression\
    \ between each request. Our program correctly moved the PNG file to the x,y coordinates\
    \ of the face, and now that we moved some logic back to the main thread, things\
    \ are looking good.\n\n![Image](images/1312.jpg)\n\n**Figure 13–12.** *Aodhan\
    \ is happy!*\n\n![Image](images/1313.jpg)\n\n**Figure 13–13.** *Avery is angry!*\n\
    \n![Image](images/1314.jpg)\n\n**Figure 13–14.** *Avery is surprised!*\n\nThe\
    \ last thing we are going to build into the application is SMS functionality to\
    \ notify customer service if an angry or sad face has been detected.\n\nKeep in\
    \ mind that if you wanted to extend this for a practical purpose, there may be\
    \ more than one person in the camera's view. The only adjustment you'd need to\
    \ make is to create a loop over all the returned photos from face.com's JSON response.\
    \ We are hard-coding `objectAtIndex:0` to only pick up the first face recognized.\
    \ So, if you wanted to analyze a crowd, that adjustment would be required.\n\n\
    ## Adding a Twilio Callout\n\nTwilio uses REST to initiate an outbound call or\
    \ SMS. One of the reasons we are using SMS is because it only requires the REST\
    \ callout. We don't have to host any code on a web server. Add the method from\
    \ [Listing 13–43](#Chapter13.html#list_13_43) to the `FaceDetectionLayer.m` file.\n\
    \n**Listing 13–43.** *Send the SMS*\n\n```\n- (void)sendSMS {\n    NSAutoreleasePool\
    \ * pool = [[NSAutoreleasePool alloc] init];\n\n    NSLog(@\"Sending request\"\
    );\n    NSString *accountSid = @\"Your Account SID Here\";\n    NSString *authToken\
    \ = @\"Your AuthToken Here\";\n    NSString *urlString = [NSString\nstringWithFormat:@\"\
    https://%@:%@@api.twilio.com/2010-04-01/Accounts/%@/SMS/Messages\",\naccountSid,\
    \ authToken, accountSid];\n\n    NSURL *url = [NSURL URLWithString:urlString];\n\
    \n    ASIFormDataRequest *request = [ASIFormDataRequest requestWithURL:url];\n\
    \    [request addPostValue:@\"Your TO Number Here\" forKey:@\"To\"];\n    [request\
    \ addPostValue:@\"Angry Face Detected\" forKey:@\"Body\"];\n    [request addPostValue:@\"\
    Valid Twilio Number\" forKey:@\"From\"];\n\n    [request startSynchronous];\n\n\
    \    NSError *error = [request error];\n    if (!error) {\n        NSString *response\
    \ = [request responseString];\n        NSLog(@\"%@\",response);\n    } else {\n\
    \        NSLog(@\"An error occured %d; %@\",[error code], [request responseString]);\n\
    \    }\n\n    [pool drain];\n}\n```\n\nThat was much simpler. Twilio has, as you've\
    \ just seen, a VERY simple API to add quick value to your application. You can\
    \ reference this new function from the `facialRecognitionRequest` method. Just\
    \ wrap it in a quick check to match the mood with \"angry\" and you should be\
