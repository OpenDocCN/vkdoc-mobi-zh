    Kyle Roche\" place:@\"Denver\"];`\n`[self.arController addCoordinate:tempCoordinate\
    \ animated:NO];`\n\nWe're finally ready to test this out. As with our other sample\
    \ applications, you can't use the simulator for testing. On your physical device,\
    \ you should see something similar to [Figure 11–7](#Chapter11.html#fig_11_7).\n\
    \n![Image](images/1107.jpg)\n\n**Figure 11–7.** *Here is what we have built so\
    \ far.*\n\n### Adding Social Context\n\nThe application is starting to come along.\
    \ We've already built the functionality to handle location and heading updates\
    \ and display some tags on the screen. Currently, we have hard-coded a single\
    \ location (for me) to debug the functionality. Let's add in the Facebook context\
    \ and pull the locations for some of our Facebook friends.\n\nIf you didn't skip\
    \ over that section in this chapter, you'll recall that the Facebook iOS SDK uses\
    \ URL Schemes to manage the oAuth callback in its native apps. We have already\
    \ copied the Facebook SDK to our project, so before we can use it we have to set\
    \ up our URL Schemes in our `.plist` file.\n\nIn Xcode, find `Ch11–Info.plist`\
    \ under the `Resources` Group.\n\n1.  Open the file and add a new row.\n2.  Set\
    \ the Key to `URL Types`.\n3.  Expand the new group. Add a new subrow.\n4.  Name\
    \ the Key `URL Schemes`.\n5.  Expand the new key. Set the value of Item 0 to `fb[appID]`,\
    \ where `appID` is your Facebook APP ID.\n\nWe already tested this process in\
    \ the Facebook demo app that was downloaded with the SDK.\n\nOpen `RootViewController.h`.\
    \ Update the interface file as shown in [Listing 11–37](#Chapter11.html#list_11_37).\n\
    \n**Listing 11–37.** *Add Facebook Connect to RootViewController*\n\n```\n#import\
    \ <UIKit/UIKit.h>\n#import \"FBConnect.h\"\n\n@class ARController;\n\n@interface\
    \ RootViewController : UIViewController <FBRequestDelegate, FBDialogDelegate,\n\
    FBSessionDelegate> {\nNSArray *_permissions;\n}\n\n@property (nonatomic, retain)\
    \ Facebook *facebook;\n@property (nonatomic, retain) ARController *arController;\n\
    \n@end\n```\n\nThe permissions array is actually not necessary. We could localize\
    \ that to the login method, but I'm following the code in the demo application\
    \ and documentation so you can more easily move this to future applications.\n\
    \nCheck your project to make sure it builds correctly. After the `import` statement,\
    \ you'll get a compiler error if you didn't include your Facebook SDK correctly.\n\
    \nSwitch over to `RootViewController.m`. Add the code from [Listing 11–38](#Chapter11.html#list_11_38),\
    \ just after your last `synthesize` statement. Obviously, replace this with your\
    \ own App ID.\n\n**Listing 11–38.** *Create Variable for FB App ID*\n\n```\n@synthesize\
    \ facebook = _facebook;\nstatic NSString* kAppId = @\"your app id\";\n```\n\n\
    At the end of the `loadView` method, add the code from [Listing 11–39](#Chapter11.html#list_11_39).\n\
    \n**Listing 11–39.** *Launch Facebook oAuth Dialog*\n\n```\n_permissions =  [[NSArray\
    \ arrayWithObjects:@\"read_stream\", @\"publish_stream\", @\"offline_access\"\
    , @\"friends_checkins\", nil] retain];\n_facebook = [[Facebook alloc] initWithAppId:kAppId\
    \ andDelegate:self];\n [_facebook authorize:_permissions];\n```\n\nThere are three\
    \ basic steps to authenticating to Facebook, as you can see. First, you set up\
    \ the list of permissions your application will require. Second, you init the\
    \ `facebook` class with the App ID and the delegate (in this case, we use `self`).\
    \ Next, you use the `authorize` instance method to launch the oAuth dialog in\
    \ a web browser. Remember, Facebook then calls your application back using the\
    \ URL Scheme we set up earlier.\n\nFacebook's platform is built around the Graph\
    \ API. It provides a simple and consistent mechanism to retrieve and update information\
    \ about the social graph of the user. The drawback for us, however, is that we\
    \ need to query a cross-section of data. Namely, we need a subset of our friends\
    \ and their last known check-in location. This is too complex for the standard\
    \ Graph API. So, we will be querying the Graph API through a more advanced medium\
    \ called FQL (Facebook Query Language). FQL exposes the data in the Graph API\
    \ through a SQL-like interface.\n\nTo demonstrate both a Graph API call and an\
    \ FQL call, we will be pulling our friends list from the standard Graph API, then\
    \ using FQL calls to pull the last check-in location for each friend. Let's get\
    \ started."
