  trans: '

    ### 基于 String 开发


    让我们从 Powered by String SDK 开始。打开浏览器，访问 [`http://poweredbystring.com/developers/register`](http://poweredbystring.com/developers/register)。你应该会看到注册页面，请填写所需信息。


    注册并登录后，转到 [`http://poweredbystring.com/licensing`](http://poweredbystring.com/licensing)
    下载该工具包的演示版。系统会要求你提供更多信息，然后你会进入一个类似图 9-1 的页面。


    ![Image](img/0901.jpg)


    **图 9–1.** *前往 Powered by String 下载页面获取演示版。*


    下载最新版本的 SDK。在本地机器上解压缩归档文件，找到 `OGL Tutorial` 目录。打开 Xcode 项目并在物理设备上运行。在电脑屏幕上打开 `Marker1.png`
    文件。应用启动后，将摄像头对准标记物使其进入焦点。图 9-2 展示了运行结果。


    ![Image](img/0902.jpg)


    **图 9–2.** *在 String SDK 示例应用中查看标记物。*


    我们将在第 10 章 中深入探讨这个应用，因此目前你不必过于担心其内容。但如果这是你第一个基于标记的增强现实应用，它可能会相当有趣。仅需几行代码，String
    就能从摄像头视野中加载并捕获标记物。


    ### String 的基本工作流程


    同样，我们将在下一章中介绍 String 的完整教程，但以下是使用 String SDK 实现 OpenGL AR 应用所需的基本步骤。


    首先，你需要从源代码下载文件（即你找到示例应用的位置）中添加 `Libraries` 和 `Headers` 文件夹。你还需要 `AVFoundation`、`CoreGraphics`、`CoreMedia`
    和 `CoreVideo` 框架。


    String SDK 的一大优点是它可以添加到任何视图控制器（甚至其他类）中。你只需创建一个 `StringOGL` 类的实例，并实现 `StringOGLDelegate`
    协议。该协议仅要求你实现一个 `render` 方法。


    在初始化 String 之前，你应该像在普通 OpenGL 应用中一样设置好 `framebuffer`、`renderbuffer`、投影矩阵、视口和其他初始状态。这些工作大多由
    Xcode 提供的 OpenGL ES 游戏模板为你处理。你将添加用于初始化 String 的代码，如代码清单 9-1 所示。


    **代码清单 9–1.** *String 示例初始化代码*


    ```

    stringOGL = [[StringOGL alloc] initWithDelegate: self context: myEAGLContext

    frameBuffer: myFrameBuffer leftHanded: NO];

    [stringOGL setProjectionMatrix: myProjectionMatrix viewport: myViewport

    orientation: [self interfaceOrientation] reorientIPhoneSplash: NO];

    ```


    String 建议你不要允许应用旋转。在我们的一些示例应用中，我们实际上也遵循了这一建议，尽管并非每个工具包都要求或推荐这样做。


    String 需要使用标记物。相比之下，String 对标记物的要求最为宽松。标记物应以 PNG 文件的形式包含在你的主包中。令人惊讶的是，标记物越小，效果越好。这主要与工具包的加载时间有关，而非你想象的标记物分辨率。包含
    PNG 文件后，你可以像代码清单 9-2 所示那样加载它们。


    **代码清单 9–2.** *加载 String 标记物*


    ```

    myMarkerID = [stringOGL loadImageMarker: @"MyMarker" ofType: @"png"];

    ```


    String 在高对比度（接近白色背景上的接近黑色）标记物上表现非常出色，并且不需要高细节水平。此外，在付费版本中，String 可以同时追踪无数个标记物。String
    标记物识别算法的缺点是无法追踪部分遮挡的标记物。如果标记物被任何遮挡或移出视野，String 将完全丢失该标记物。另外，String 的对象比例是基于标记物的百分比尺度设置的。例如，String
    认为所有标记物的对角线长度为一个单位。因此，如果你希望标记物的对角线长度为五，则需要在投影图像之前将追踪位置乘以五。这些设置可以应用于标准的 OpenGL
    变换。


    正如我所提到的，协议中只有一个必需的委托方法。你需要在你的类中实现 `render` 方法。代码清单 9-3 展示了该方法的推荐格式。


    **代码清单 9–3.** *render 方法的推荐格式*


    ```

    - (void)render

    {

    // 读取当前帧检测到的标记物的数据

    const int maxMarkerCount = 10;

    struct MarkerInfoMatrixBased markerInfo[10];

    !

    int markerCount = [stringOGL getMarkerInfoMatrixBased: markerInfo

    maxMarkerCount: maxMarkerCount];

    // 遍历检测到的标记物

    for (int i = 0; i < markerCount; i++)

    {

    // 为此图像标记物绘制相应的内容

    }

    }

    ```


    要让框架运行起来，所需编写的代码并不多。你只需追踪标记物，然后遍历标记物信息。如果你使用的许可支持追踪多个标记物，你可能需要为每个标记物设置不同的操作。你可以使用
    `markerInfo` 类来识别正在追踪的是哪个标记物。


    每个标记物都有特定的颜色、`imageID` 和 `uniqueInstanceID`。如果你有多个相同的标记物，`uniqueInstanceID` 会很有帮助。利用此属性可以分别追踪它们。


    ### 额外功能


    String 还为增强现实应用中可能需要的实用函数提供了一些简单的包装器。在某些情况下，例如本书后面的人脸识别示例中，我们需要直接访问帧缓冲区。String
    实际上“拥有”屏幕缓冲区的委托，因此我们需要使用 `getCurrentVideoBuffer` 方法从 String 请求每一帧。该方法如代码清单 9-4
    所示。


    **代码清单 9–4.** *获取当前帧缓冲区*


    ```

    - (void)getCurrentVideoBuffer: (unsigned *)buffer viewToVideoTextureTransform:

    (float *)viewToVideoTextureTransform;

    ```


    该方法会检索当前的视频纹理以及一个用于将坐标从视图空间转换到 OpenGL 纹理空间的矩阵。在我们的其他示例中，实际上并不需要所有这些信息。如果你决定要追踪标记物并分析帧缓冲区，则应在每一帧调用此方法，因为视频流是双缓冲的。


    第二个有用的功能是 String 提供的用于获取屏幕缓冲区快照的便捷方法。这对于通过电子邮件发送应用截图或发布到 Facebook 等操作非常有用。代码清单
    9-5 展示了这个简单的方法。


    **代码清单 9–5.** *获取帧缓冲区快照*


    ```

    - (void)takeSnapshotAndPause;

    ```


    此方法的设置几乎类似于异步回调方法。你需要等待，直到 `handleSnapshot` 方法（你还需要实现此方法）完成后再调用 `resume` 方法。


    ### Unity 集成


    Unity 3D 并非本书涉及的内容，但 Apress 有许多关于该主题的书籍。Unity 是一个非常强大的 3D 游戏引擎，它原生集成了 String。如果你对
    Unity 感兴趣，可以直接从他们的入门项目开始，用零行代码构建一个增强现实应用。

    '
- fmt: '# Advanced Shaders and OpenGL Features


    If you want to see an example of what you can build with `String`, visit their
    showcase on their web site or download the sample application from the App Store.


    `String` works very well with more advanced shaders and lighting effects. It handles
    the loading of the objects quickly and has a near-instant response to the marker''s
    presentation.


    [Figure 9–3](#Chapter09.html#fig_9_3) shows a screenshot from a demo application
    built using `String`. It loads a 3D lamp from a marker and allows the user to
    turn the light on and off using Open GL ES shading and lighting effects.


    ![Image](images/0903.jpg)


    **Figure 9–3.** *The demo String application loads a 3D lamp that can be turned
    off and on.*


    This demo project extends the `Cube` sample (notice the second tab in [Figure
    9–3](#Chapter09.html#fig_9_3)) and renders a different object for the `Lantern`
    tab. The source will be in the supplemental materials for this book on GitHub
    and available from the Source Code/Download area of the Apress web site ([`www.apress.com`](http://www.apress.com)).


    ## Qualcomm SDK


    Qualcomm released an AR SDK late summer of 2011, just before the launch of iOS
    5. The Qualcomm SDK is very different from the Powered by `String` SDK, which
    is one of the reasons I chose to cover these two frameworks.


    Visit Qualcomm''s web site, [`https://ar.qualcomm.at`](https://ar.qualcomm.at),
    and sign up for a free account. After you have signed up, you can switch from
    the `Android` to the `iOS` tab, as shown in [Figure 9–4](#Chapter09.html#fig_9_4),
    and download the QCAR SDK for Mac.


    ![Image](images/0904.jpg)


    **Figure 9–4.** *Download the QCAR SDK.*


    Unlike `String`, which is a static library and a set of files, QCAR actually provides
    an installer to keep the library separate from your code. This allows for you
    to more easily upgrade the SDK as changes are introduced.


    **NOTE:** You might have to upgrade Java before the installer will launch.


    Unzip the archive and launch the installer. You will see a screen like the one
    shown in [Figure 9–5](#Chapter09.html#fig_9_5).


    ![Image](images/0905.jpg)


    **Figure 9–5.** *Launch the installer.*


    Click `Next`. You should get a dialog asking you for a location to install the
    toolkit. I''ve moved mine to a directory where I have similar toolkits installed,
    but you can choose to keep the default location if you wish.


    Accept the license agreement and click `Next`. Click `Install` when you''re ready
    to proceed. When the library has been installed, click `Done` to exit the installer.


    The directory structure of the library is worth mentioning. There are a decent
    amount of very impressive demos included in the SDK. Check out [Table 9–2](#Chapter09.html#tab_9_2)
    for more information on what''s included and where you can find it in the installation
    directory.


    ![Image](images/t0902.jpg)


    ![Image](images/t0902a.jpg)


    Let''s start with the `Dominoes` application. There''s quite a bit of code and
    math behind this application, but it demonstrates all the functionality of the
    framework. Launch the project in Xcode and run it on a physical device.


    Make sure you either print or bring up on the screen the `stones.jpg` file from
    the `Media` subdirectory of the project. This is the marker for the application.
    Put the marker in the view of the camera. It will ask you to drag your finger
    around the screen slowly. As you do so, it builds out a set of dominoes.


    This is the amazing part. You can use the menu to enable a virtual button where
    you can flick over the dominoes in a mixed-reality space (your finger is in view
    of the camera while it is projecting the augmented scene).


    The running project is shown in [Figure 9–6](#Chapter09.html#fig_9_6).


    ![Image](images/0906.jpg)


    **Figure 9–6.** *Run the Dominoes demo.*


    You can see the green dot under domino #1 on the left. That''s the virtual button.
    If your user strikes that with his finger, the SDK will register that and handle
    the event. The event in this case, is to start the dominos falling in order.


    That''s a pretty amazing Hello World application, isn''t it? Let''s build something
    not so impressive from scratch so you can get used to the SDK.


    ## Building Our Own QCAR Demo


    Before we can start building from scratch, let''s create the marker for our application.
    Click on the `My Trackables` link from the Qualcomm site. Create a new project
    by clicking the `New Project` link. I''m naming my project `Apress`.


    You''ll be taken to a screen that resembles [Figure 9–7](#Chapter09.html#fig_9_7).


    ![Image](images/0907.jpg)


    **Figure 9–7.** *Use the New Project link to create a new project.*


    Click on the `Create a trackable` link. Name the trackable `Apress Trackable`
    and set the type to the single image type. Set the width to `100`.


    It''s important to note that the width does not correspond to the marker''s width
    nor does the marker get resized to this width. In the AR space around the marker,
    the 3D objects you''ll load into the scene have a relative size to the marker.
    Setting this to `100` sets the initial comparison for other objects. Your trackable
    should look like [Figure 9–8](#Chapter09.html#fig_9_8).


    ![Image](images/0908.jpg)


    **Figure 9–8.** *We''ve created a new trackable.*


    Now, Qualcomm expects a very different marker than `String`. Qualcomm prefers
    a high-resolution, high-detail marker to increase the number of points that it
    can track. The marker must have a large number of small details. Something like
    the river rock example that came with the tutorials would be best.


    Just to compare the images, I randomly searched Google Images for "Free high resolution
    wallpaper" and found what I thought were fairly high-detailed images.


    I ran a few of these through the Qualcomm trackable test. My results were typically
    something like [Figure 9–9](#Chapter09.html#fig_9_9).


    ![Image](images/0909.jpg)


    **Figure 9–9.** *The new trackable failed!*


    If you want to come up with your own image, keep experimenting. Make sure you
    find an image that has detail throughout most of the space. I reloaded the image
    called `stones.jpg`. It can be found in the `Media` subdirectory of the `Dominos`
    sample application. The results were much better, as you can see from [Figure
    9–10](#Chapter09.html#fig_9_10).


    ![Image](images/0910.jpg)


    **Figure 9–10.** *The next trackable was a success!*


    Save the trackable, by clicking the `Back` button, and you''ll be returned to
    the `My Trackables` page again. You''ll now have a new image in your list of trackables.
    Click on the image, and you''ll be taken to a screen where you can select the
    trackable and download it for use in our application. The screen will look something
    like [Figure 9–11](#Chapter09.html#fig_9_11).


    ![Image](images/0911.jpg)


    **Figure 9–11.** *Download the trackable.*


    Download the trackable using the link on the top of the selection window. Make
    sure you choose the SDK download and not the Unity version. The archive contains
    the following two files:


    * `config.xml`

    * `qcar-resources.dat`'
  raw: '#### Advanced Shaders and OpenGL Features


    If you want to see an example of what you can build with String, visit their showcase
    on their web site or download the sample application from the App Store.


    String works very well with more advanced shaders and lighting effects. It handles
    the loading of the objects quickly and has a near-instant response to the marker''s
    presentation.


    [Figure 9–3](#Chapter09.html#fig_9_3) shows a screenshot from a demo application
    built using String. It loads a 3D lamp from a marker and allows the user to turn
    the light on and off using Open GL ES shading and lighting effects.


    ![Image](images/0903.jpg)


    **Figure 9–3.** *The demo String application loads a 3D lamp that can be turned
    off and on.*


    This demo project extends the Cube sample (notice the second tab in [Figure 9–3](#Chapter09.html#fig_9_3))
    and renders a different object for the Lantern tab. The source will be in the
    supplemental materials for this book on GitHub and available from the Source Code/Download
    area of the Apress web site ([`www.apress.com`](http://www.apress.com)).


    ### Qualcomm SDK


    Qualcomm released an AR SDK late summer of 2011, just before the launch of iOS
    5\. The Qualcomm SDK is very different from the Powered by String SDK, which is
    one of the reasons I chose to cover these two frameworks.


    Visit Qualcomm''s web site, [`https://ar.qualcomm.at`](https://ar.qualcomm.at),
    and sign up for a free account. After you have signed up, you can switch from
    the **Android** to the **iOS** tab, as shown in [Figure 9–4](#Chapter09.html#fig_9_4),
    and download the QCAR SDK for Mac.


    ![Image](images/0904.jpg)


    **Figure 9–4.** *Download theQCAR SDK.*


    Unlike String, which is a static library and a set of files, QCAR actually provides
    an installer to keep the library separate from your code. This allows for you
    to more easily upgrade the SDK as changes are introduced.


    **NOTE:** You might have to upgrade Java before the installer will launch.


    Unzip the archive and launch the installer. You will see a screen like the one
    shown in [Figure 9–5](#Chapter09.html#fig_9_5).


    ![Image](images/0905.jpg)


    **Figure 9–5.** *Launch the installer.*


    Click **Next**. You should get a dialog asking you for a location to install the
    toolkit. I''ve moved mine to a directory where I have similar toolkits installed,
    but you can choose to keep the default location if you wish.


    Accept the license agreement and click **Next**. Click **Install** when you''re
    ready to proceed. When the library has been installed, click **Done** to exit
    the installer.


    The directory structure of the library is worth mentioning. There are a decent
    amount of very impressive demos included in the SDK. Check out [Table 9–2](#Chapter09.html#tab_9_2)
    for more information on what''s included and where you can find it in the installation
    directory.


    ![Image](images/t0902.jpg)


    ![Image](images/t0902a.jpg)


    Let''s start with the Dominoes application. There''s quite a bit of code and math
    behind this application, but it demonstrates all the functionality of the framework.
    Launch the project in Xcode and run it on a physical device.


    Make sure you either print or bring up on the screen the `stones.jpg` file from
    the `Media` subdirectory of the project. This is the marker for the application.
    Put the marker in the view of the camera. It will ask you to drag your finger
    around the screen slowly. As you do so, it builds out a set of dominoes.


    This is the amazing part. You can use the menu to enable a virtual button where
    you can flick over the dominoes in a mixed-reality space (your finger is in view
    of the camera while it is projecting the augmented scene).


    The running project is shown in [Figure 9–6](#Chapter09.html#fig_9_6).


    ![Image](images/0906.jpg)


    **Figure 9–6.** *Run the Dominoes demo.*


    You can see the green dot under domino #1 on the left. That''s the virtual button.
    If your user strikes that with his finger, the SDK will register that and handle
    the event. The event in this case, is to start the dominos falling in order.


    That''s a pretty amazing Hello World application, isn''t it? Let''s build something
    not so impressive from scratch so you can get used to the SDK.


    ### Building Our Own QCAR Demo


    Before we can start building from scratch, let''s create the marker for our application.
    Click on the **My Trackables** link from the Qualcomm site. Create a new project
    by clicking the **New Project** link. I''m naming my project Apress.


    You''ll be taken to a screen that resembles [Figure 9–7](#Chapter09.html#fig_9_7).


    ![Image](images/0907.jpg)


    **Figure 9–7.** *Use the New Project link to create a new project.*


    Click on the **Create a trackable** link. Name the trackable Apress Trackable
    and set the type to the single image type. Set the width to 100.


    It''s important to note that the width does not correspond to the marker''s width
    nor does the marker get resized to this width. In the AR space around the marker,
    the 3D objects you''ll load into the scene have a relative size to the marker.
    Setting this to 100 sets the initial comparison for other objects. Your trackable
    should look like [Figure 9–8](#Chapter09.html#fig_9_8).


    ![Image](images/0908.jpg)


    **Figure 9–8.** *We''ve created a new trackable.*


    Now, Qualcomm expects a very different marker than String. Qualcomm prefers a
    high-resolution, high-detail marker to increase the number of points that it can
    track. The marker must have a large number of small details. Something like the
    river rock example that came with the tutorials would be best.


    Just to compare the images, I randomly searched Google Images for “Free high resolution
    wallpaper” and found what I thought were fairly high-detailed images.


    I ran a few of these through the Qualcomm trackable test. My results were typically
    something like [Figure 9–9](#Chapter09.html#fig_9_9).


    ![Image](images/0909.jpg)


    **Figure 9–9.** *The new trackable failed!*


    If you want to come up with your own image, keep experimenting. Make sure you
    find an image that has detail throughout most of the space. I reloaded the image
    called `stones.jpg`. It can be found in the **Media** subdirectory of the Dominos
    sample application. The results were much better, as you can see from [Figure
    9–10](#Chapter09.html#fig_9_10).


    ![Image](images/0910.jpg)


    **Figure 9–10.** *The next trackable was a success!*


    Save the trackable, by clicking the **Back** button, and you''ll be returned the
    **My Trackables** page again. You''ll now have a new image in your list of trackables.
    Click on the image, and you''ll be taken to a screen where you can select the
    trackable and download it for use in our application. The screen will look something
    like [Figure 9–11](#Chapter09.html#fig_9_11).


    ![Image](images/0911.jpg)


    **Figure 9–11.** *Download the trackable.*


    Download the trackable using the link on the top of the selection window. Make
    sure you choose the SDK download and not the Unity version. The archive contains
    the following two files:


    *   `config.xml`

    *   `qcar-resources.dat`'
  trans: '

    # 高级着色器与 OpenGL 特性


    如果你想了解用 `String` 可以构建出怎样的应用示例，请访问其官网上的展示页面，或从 App Store 下载示例应用程序。


    `String` 能够很好地兼容更高级的着色器和光照效果。它能快速加载对象，并对标记的呈现做到近乎即时的响应。


    图 9–3 展示了使用 `String` 构建的演示应用截图。该应用从标记处加载了一个 3D 台灯，并允许用户通过 Open GL ES 着色和光照效果来开关灯光。


    ![图片](img/0903.jpg)


    **图 9–3.** *演示版 String 应用加载了一个可开关的 3D 台灯。*


    这个演示项目扩展了 `Cube` 示例（请注意图 9–3 中的第二个标签页），并为 `Lantern` 标签页渲染了一个不同的对象。源代码将在本书的 GitHub
    补充资料中提供，也可从 Apress 网站的源代码/下载区域获取（[`www.apress.com`](http://www.apress.com)）。


    ## Qualcomm SDK


    高通在 2011 年夏末，即 iOS 5 发布前夕，推出了一个 AR SDK。高通 SDK 与 Powered by `String` SDK 截然不同，这也是我选择介绍这两个框架的原因之一。


    访问高通的网站 [`https://ar.qualcomm.at`](https://ar.qualcomm.at)，注册一个免费账户。注册完成后，您可以如图
    图 9–4 所示，从 `Android` 标签页切换到 `iOS` 标签页，并下载适用于 Mac 的 QCAR SDK。


    ![图片](img/0904.jpg)


    **图 9–4.** *下载 QCAR SDK。*


    与 `String`（它是一个静态库加一组文件）不同，QCAR 实际上提供了一个安装程序，使库文件与您的代码保持分离。这样，当 SDK 更新时，您可以更轻松地进行升级。


    **注意：** 在安装程序启动之前，您可能需要升级 Java。


    解压归档文件并启动安装程序。您将看到一个类似图 9–5 所示的界面。


    ![图片](img/0905.jpg)


    **图 9–5.** *启动安装程序。*


    点击 `Next`。您应该会看到一个对话框，要求您选择工具包的安装位置。我已将其移动到我安装同类工具包的目录中，但如果您愿意，也可以选择默认位置。


    接受许可协议并点击 `Next`。准备好继续后，点击 `Install`。当库安装完成后，点击 `Done` 退出安装程序。


    值得提一下该库的目录结构。SDK 中包含了一些非常令人印象深刻的演示程序。请查看表 9–2，以了解包含的内容及其在安装目录中的位置。


    ![图片](img/t0902.jpg)


    ![图片](img/t0902a.jpg)


    我们先从 `Dominoes` 应用开始。这个应用背后有大量的代码和数学运算，但它展示了该框架的所有功能。在 Xcode 中启动该项目，并在物理设备上运行。


    确保您打印或屏幕上显示项目 `Media` 子目录中的 `stones.jpg` 文件。这是该应用的标记。将标记放在摄像头的视野内。应用会提示您缓慢地在屏幕上拖动手指。随着您的手指移动，它会构建出一组多米诺骨牌。


    这就是令人惊叹之处。您可以使用菜单启用一个虚拟按钮，然后在混合现实空间中拨弄多米诺骨牌（当摄像头投影增强场景时，您的手指会出现在摄像头视野中）。


    运行中的项目如图 9–6 所示。


    ![图片](img/0906.jpg)


    **图 9–6.** *运行 Dominoes 演示程序。*


    您可以看到左侧 1 号多米诺骨牌下方有一个绿点。那就是虚拟按钮。如果用户用手指击打它，SDK 会检测到并处理该事件。在本例中，事件是让多米诺骨牌按顺序倒下。


    这是一个非常了不起的 Hello World 应用程序，不是吗？让我们从头开始构建一个不那么令人印象深刻的应用，这样您就能熟悉 SDK 了。


    ## 构建我们自己的 QCAR 演示


    在我们从头开始构建之前，先为我们的应用创建一个标记。点击 Qualcomm 网站上的 `My Trackables` 链接。点击 `New Project`
    链接创建一个新项目。我将项目命名为 `Apress`。


    您将进入一个类似于图 9–7 所示的界面。


    ![图片](img/0907.jpg)


    **图 9–7.** *使用 New Project 链接创建新项目。*


    点击 `Create a trackable` 链接。将可追踪对象命名为 `Apress Trackable`，并将类型设置为单图像类型。将宽度设置为 `100`。


    需要注意的是，宽度并不对应标记的实际宽度，标记也不会被调整为这个宽度。在标记周围的 AR 空间中，您将加载到场景中的 3D 对象相对于标记有一个尺寸比例。将此值设为
    `100` 是为其他对象设定初始比较标准。您的可追踪对象应该看起来像图 9–8。


    ![图片](img/0908.jpg)


    **图 9–8.** *我们创建了一个新的可追踪对象。*


    现在，高通期望的标记与 `String` 截然不同。高通更倾向于使用高分辨率、细节丰富的标记，以增加其可追踪的特征点数量。标记必须包含大量微小的细节。类似教程中附带的河石示例那样的图片效果最佳。


    为了对比图片，我随机在谷歌图片中搜索了“免费高分辨率壁纸”，找到了一些我认为细节度很高的图片。


    我通过高通的追踪测试对其中几张进行了测试。结果通常类似图 9–9 所示。


    ![图片](img/0909.jpg)


    **图 9–9.** *新的可追踪对象失败了！*


    如果您想设计自己的图片，请继续尝试。确保找到一张在大部分区域内都有细节的图片。我重新加载了名为 `stones.jpg` 的图片。你可以在 `Dominos`
    示例应用的 `Media` 子目录中找到它。结果好了很多，如图 9–10 所示。


    ![图片](img/0910.jpg)


    **图 9–10.** *下一个可追踪对象成功了！*


    通过点击 `Back` 按钮保存可追踪对象，您将返回到 `My Trackables` 页面。现在，您的可追踪对象列表中会出现一张新图片。点击该图片，您将进入一个界面，您可以在其中选择该可追踪对象并下载它以供我们的应用使用。该界面看起来类似于图
    9–11。


    ![图片](img/0911.jpg)


    **图 9–11.** *下载可追踪对象。*


    使用选择窗口顶部的链接下载可追踪对象。请确保您选择的是 SDK 下载版本，而不是 Unity 版本。该归档文件包含以下两个文件：


    * `config.xml`

    * `qcar-resources.dat`

    '
- fmt: "### Creating the Xcode Project\n\nCreate a new project in Xcode. Use the Single\
    \ View application template. Name the project `Ch9`. Make sure you use Automatic\
    \ Reference Counting. My settings are shown in [Figure 9–12](#Chapter09.html#fig_9_12).\n\
    \n![Image](images/0912.jpg)\n\n**Figure 9–12.** *Set up the project settings.*\n\
    \nOpen Finder. Navigate to the location where you installed the QCAR SDK. There\
    \ is a subdirectory called `build`. Open that directory in Finder. Copy the contents\
    \ of this directory (`lib` and `include` folders) to the project’s directory.\n\
    \nOpen the **Build Settings** tab in your Xcode project settings page. Update\
    \ the Header Paths to include `$(SRCROOT)/Ch9/include`. Now, open Finder to the\
    \ project’s directory. Drag and drop the `lib` directory into the Xcode project.\
    \ Make sure you don’t select to copy the resources (because they already exist).\n\
    \nFrom the book’s source repository on GitHub or Apress (from the Source Code/Download\
    \ area at [`www.apress.com`](http://www.apress.com)) copy `GLProgram.h` and `GLProgram.m`\
    \ to the project. Jeff LaMarche originally wrote these files. They’ve been adapted\
    \ for iOS 5 automatic reference counting.\n\nCopy `Cube.h` from the source repository\
    \ also. This file, written by Qualcomm, is used to test OpenGL ES drawing.\n\n\
    Finally, copy the `SimpleLightShader.vsh` and `SimpleLightShader.fsh` files to\
    \ the project. Open the **Build Phases** tab and make sure both of these files\
    \ are copied as bundle resources as shown in [Figure 9–13](#Chapter09.html#fig_9_13).\n\
    \n![Image](images/0913.jpg)\n\n**Figure 9–13.** *Copy the bundle resources.*\n\
    \nWe need to add a few frameworks to our project. In Xcode add the following frameworks:\n\
    \n- `OpenGLES.framework`\n- `Security.framework`\n- `AVFoundation.framework`\n\
    - `CoreVideo.framework`\n- `CoreMedia.framework`\n- `SystemConfiguration.framework`\n\
    - `QuartzCore.framework`\n\nOkay, now we’re ready to add back our marker files.\
    \ Copy the two files you downloaded from the Qualcomm site to the project.\n\n\
    As we saw with String, it’s typically recommended to restrict dynamic reorientation\
    \ of the device in augmented reality applications, especially those that are using\
    \ third-party SDKs. Open the project’s **Summary** tab and make sure that the\
    \ application is only enabled for **Landscape Right** orientation.\n\n### EAGLView\n\
    \nCreate a new class that subclasses `UIView`. Name it `EAGLView`. Open `EAGLView.h`\
    \ in Xcode, and import the headers shown in [Listing 9–6](#Chapter09.html#list_9_6).\n\
    \n**Listing 9–6.** *import Statements*\n\n```objc\n#import <OpenGLES/EAGL.h>\n\
    #import <OpenGLES/ES1/gl.h>\n#import <OpenGLES/ES1/glext.h>\n#import <OpenGLES/ES2/gl.h>\n\
    #import <OpenGLES/ES2/glext.h>\n#import <QCAR/Tool.h>\n#import <QCAR/UIGLViewProtocol.h>\n\
    #import \"GLProgram.h\"\n```\n\nJust below the `import` statements, set up an\
    \ enumeration to track what state the application is currently running. Copy the\
    \ code from [Listing 9–7](#Chapter09.html#list_9_7).\n\n**Listing 9–7.** *Status\
    \ Enumeration*\n\n```objc\ntypedef enum _status {\n    APPSTATUS_UNINITED,\n \
    \   APPSTATUS_INIT_APP,\n    APPSTATUS_INIT_QCAR,\n    APPSTATUS_INIT_APP_AR,\n\
    \    APPSTATUS_INIT_TRACKER,\n    APPSTATUS_INITED,\n    APPSTATUS_CAMERA_STOPPED,\n\
    \    APPSTATUS_CAMERA_RUNNING,\n    APPSTATUS_ERROR\n} status;\n```\n\nBefore\
    \ we update the implementation block, rename `EAGLView.m` to `EAGLView.mm`. Qualcomm’s\
    \ SDK is C++ based, and we’ll need that extension to access the C++ classes.\n\
    \nUpdate the `interface` block, as shown in [Listing 9–8](#Chapter09.html#list_9_8).\n\
    \n**Listing 9–8.** *EAGLView Interface*\n\n```objc\n@interface EAGLView : UIView\
    \ <UIGLViewProtocol> {\n    EAGLContext *context;    \n    GLint framebufferWidth;\n\
    \    GLint framebufferHeight;\n\n    GLuint defaultFramebuffer;\n    GLuint colorRenderbuffer;\n\
    \    GLuint depthRenderbuffer;\n\n    QCAR::Matrix44F projectionMatrix;\n    CGRect\
    \ screenRect;\n    int QCARFlags;\n    status appStatus;\n    GLProgram *shader;\n\
    \    GLint shaderPositionAttribute, shaderNormalAttribute, shaderModelViewMatrixUniform,\
    \ shaderProjectionMatrixUniform, shaderColorUniform;\n}\n@end\n```\n\nHere, we\
    \ first set up an instance variable for our OpenGL context. We then set up some\
    \ variables for width and height of our frame buffer, and our default buffer handles.\
    \ Next, we set up the projection matrix to multiply our 3D coordinates. This is\
    \ the line that required the name change to `.mm`. You can swap it back if you\
    \ want to experiment. It’ll give you a build error.\n\nFinally, we hold some variables\
    \ for our screen size, QCAR flags, and the status of the application (from our\
    \ enumeration).\n\nDeclare the methods from [Listing 9–9](#Chapter09.html#list_9_9)\
    \ in the header.\n\n**Listing 9–9.** *New Method Declarations*\n\n```objc\n- (void)renderFrameQCAR;\n\
    - (void)onCreate;\n- (void)onDestroy;\n- (void)onResume;\n- (void)onPause;\n```\n\
    \nThe first method will be used to render the frames called by the QCAR SDK. The\
    \ view controller will call the others when the state of the application changes.\n\
    \nSwitch over to `EAGLView.mm` in Xcode, and add the `import` statements from\
    \ [Listing 9–10](#Chapter09.html#list_9_10).\n\n**Listing 9–10.** *New import\
    \ Statements*\n\n```objc\n#import <QuartzCore/QuartzCore.h>\n#import <QCAR/QCAR.h>\n\
    #import <QCAR/CameraDevice.h>\n#import <QCAR/Tracker.h>\n#import <QCAR/VideoBackgroundConfig.h>\n\
    #import <QCAR/Renderer.h>\n#import <QCAR/Tool.h>\n#import <QCAR/Trackable.h>\n\
    \n#import \"Cube.h\"\n```\n\nWe’re going to need pretty much everything the SDK\
    \ has to offer. So, that means lots of `import` statements here. You can already\
    \ see the difference in ease of use and time required between Qualcomm and String.\
    \ It’s worth the effort though if you need the more advanced tracking capabilities\
    \ of the QCAR SDK.\n\nAdd the following block of `Private` method declarations\
    \ from [Listing 9–11](#Chapter09.html#list_9_11) to the class.\n\n**Listing 9–11.**\
    \ *Private Methods*\n\n```objc\n@interface EAGLView (PrivateMethods)\n- (void)setFramebuffer;\n\
    - (BOOL)presentFramebuffer;\n- (void)createFramebuffer;\n- (void)deleteFramebuffer;\n\
    - (void)updateApplicationStatus:(status)newStatus;\n- (void)bumpAppStatus;\n-\
    \ (void)initApplication;\n- (void)initQCAR;\n- (void)initApplicationAR;\n- (void)loadTracker;\n\
    - (void)startCamera;\n- (void)stopCamera;\n- (void)configureVideoBackground;\n\
    - (void)initRendering;\n@end\n```"
  raw: '#### Creating the Xcode Project


    Create a new project in Xcode. Use the Single View application template. Name
    the project Ch9\. Make sure you use Automatic Reference Counting. My settings
    are shown in [Figure 9–12](#Chapter09.html#fig_9_12).


    ![Image](images/0912.jpg)


    **Figure 9–12.** *Set up the project settings.*


    Open Finder. Navigate to the location where you installed the QCAR SDK. There
    is a subdirectory called **build**. Open that directory in Finder. Copy the contents
    of this directory (lib and include folders) to the project''s directory.


    Open the **Build Settings** tab in your Xcode project settings page. Update the
    Header Paths to include **$(SRCROOT)/Ch9/include**. Now, open Finder to the project''s
    directory. Drag and drop the **lib** directory into the Xcode project. Make sure
    you don''t select to copy the resources (because they already exist).


    From the book''s source repository on GitHub or Apress (from the Source Code/Download
    area at [`www.apress.com`](http://www.apress.com)) copy `GLProgram.h` and `GLProgram.m`
    to the project. Jeff LaMarche originally wrote these files. They''ve been adapted
    for iOS 5 automatic reference counting.


    Copy `Cube.h` from the source repository also. This file, written by Qualcomm,
    is used to test OpenGL ES drawing.


    Finally, copy the `SimpleLightShader.vsh` and `SimpleLightShader.fsh` files to
    the project. Open the `Build Phases` tab and make sure both of these files are
    copied as bundle resources as shown in [Figure 9–13](#Chapter09.html#fig_9_13).


    ![Image](images/0913.jpg)


    **Figure 9–13.** *Copy the bundle resources.*


    We need to add a few frameworks to our project. In Xcode add the following frameworks:


    *   OpenGLES.framework

    *   Security.framework

    *   AVFoundation.framework

    *   CoreVideo.framework

    *   CoreMedia.framework

    *   SystemConfiguration.framework

    *   QuartzCore.framework


    Okay, now we''re ready to add back our marker files. Copy the two files you downloaded
    from the Qualcomm site to the project.


    As we saw with String, it''s typically recommended to restrict dynamic reorientation
    of the device in augmented reality applications, especially those that are using
    third-party SDKs. Open the project''s **Summary** tab and make sure that the application
    is only enabled for **Landscape Right** orientation.


    #### EAGLView


    Create a new class that subclasses `UIView`. Name it `EAGLView`. Open `EAGLView.h`
    in Xcode, and import the headers shown in [Listing 9–6](#Chapter09.html#list_9_6).


    **Listing 9–6.** *import Statements*


    `#import <OpenGLES/EAGL.h>`

    `#import <OpenGLES/ES1/gl.h>`

    `#import <OpenGLES/ES1/glext.h>`

    `#import <OpenGLES/ES2/gl.h>`

    `#import <OpenGLES/ES2/glext.h>`

    `#import <QCAR/Tool.h>`

    `#import <QCAR/UIGLViewProtocol.h>`

    `#import "GLProgram.h"`


    Just below the `import` statements, set up an enumeration to track what state
    the application is current running. Copy the code from [Listing 9–7](#Chapter09.html#list_9_7).


    **Listing 9–7.** *Status Enumeration*


    `typedef enum _status {`

    `    APPSTATUS_UNINITED,`

    `    APPSTATUS_INIT_APP,`

    `    APPSTATUS_INIT_QCAR,`

    `    APPSTATUS_INIT_APP_AR,`

    `    APPSTATUS_INIT_TRACKER,`

    `    APPSTATUS_INITED,`

    `    APPSTATUS_CAMERA_STOPPED,`

    `    APPSTATUS_CAMERA_RUNNING,`

    `    APPSTATUS_ERROR`

    `} status;`


    Before we update the implementation block, rename `EAGLView.m` to `EAGLView.mm`.
    Qualcomm''s SDK is C++ based, and we''ll need that extension to access the C++
    classes.


    Update the `interface` block, as shown in [Listing 9–8](#Chapter09.html#list_9_8).


    **Listing 9–8.** *EAGLView Interface*


    `@interface EAGLView : UIView <UIGLViewProtocol> {`

    `    EAGLContext *context;    `

    `    GLint framebufferWidth;`

    `    GLint framebufferHeight;`


    `    GLuint defaultFramebuffer;`

    `    GLuint colorRenderbuffer;`

    `    GLuint depthRenderbuffer;`


    `    QCAR::Matrix44F projectionMatrix;`

    `    CGRect screenRect;`

    `    int QCARFlags;`

    `    status appStatus;`

    `    GLProgram *shader;`

    `    GLint shaderPositionAttribute, shaderNormalAttribute, shaderModelViewMatrixUniform,
    shaderProjectionMatrixUniform, shaderColorUniform;`

    `}`

    `@end`


    Here, we first set up an instance variable for our OpenGL context. We then set
    up some variables for width and height of our frame buffer, and our default buffer
    handles. Next, we set up the projection matrix to multiply our 3D coordinates.
    This is the line that required the name change to `.mm`. You can swap it back
    if you want to experiment. It''ll give you a build error.


    Finally, we hold some variables for our screen size, QCAR flags, and the status
    of the application (from our enumeration).


    Declare the methods from [Listing 9–9](#Chapter09.html#list_9_9) in the header.


    **Listing 9–9.** *New Method Declarations*


    `- (void)renderFrameQCAR;`

    `- (void)onCreate;`

    `- (void)onDestroy;`

    `- (void)onResume;`

    `- (void)onPause;`


    The first method will be used render the frames called by the QCAR SDK. The view
    controller will call the others when the state of the application changes.


    Switch over to `EAGLView.mm` in Xcode, and add the `import` statements from [Listing
    9–10](#Chapter09.html#list_9_10).


    **Listing 9–10.** *New import Statements*


    `#import <QuartzCore/QuartzCore.h>`

    `#import <QCAR/QCAR.h>`

    `#import <QCAR/CameraDevice.h>`

    `#import <QCAR/Tracker.h>`

    `#import <QCAR/VideoBackgroundConfig.h>`

    `#import <QCAR/Renderer.h>`

    `#import <QCAR/Tool.h>`

    `#import <QCAR/Trackable.h>`


    `#import "Cube.h"`


    We''re going to need pretty much everything the SDK has to offer. So, that means
    lots of `import` statements here. You can already see the difference in ease of
    use and time required between Qualcomm and String. It''s worth the effort though
    if you need the more advanced tracking capabilities of the QCAR SDK.


    Add the following block of `Private` method declarations from [Listing 9–11](#Chapter09.html#list_9_11)
    to the class.


    **Listing 9–11.** *Private Methods*


    `@interface EAGLView (PrivateMethods)`

    `- (void)setFramebuffer;`

    `- (BOOL)presentFramebuffer;`

    `- (void)createFramebuffer;`

    `- (void)deleteFramebuffer;`

    `- (void)updateApplicationStatus:(status)newStatus;`

    `- (void)bumpAppStatus;`

    `- (void)initApplication;`

    `- (void)initQCAR;`

    `- (void)initApplicationAR;`

    `- (void)loadTracker;`

    `- (void)startCamera;`

    `- (void)stopCamera;`

    `- (void)configureVideoBackground;`

    `- (void)initRendering;`

    `@end`'
