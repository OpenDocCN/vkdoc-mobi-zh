    \n```objective-c\n- (void)initApplication\n{\n    screenRect = [[UIScreen mainScreen]\
    \ bounds];\n\n    NSLog(@\"屏幕矩形 %@\",screenRect);\n\n    QCAR::onSurfaceCreated();\n\
    \    QCAR::onSurfaceChanged(screenRect.size.height, screenRect.size.width);\n\
    }\n\n- (void)initQCAR\n{\n    QCAR::setInitParameters(QCARFlags);\n\n    int nPercentComplete\
    \ = 0;\n\n    do {\n        nPercentComplete = QCAR::init();\n    } while (0 <=\
    \ nPercentComplete && 100 > nPercentComplete);\n\n    NSLog(@\"QCAR::init 百分比:\
