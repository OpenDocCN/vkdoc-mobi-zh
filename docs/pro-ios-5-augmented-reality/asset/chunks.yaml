    Now, just before the `@end` of the header, add the code from [Listing 3–3](#Chapter03.html#list_3_3).


    **Listing 3–3.** *Add the Property to the Class*


    `@property (nonatomic, retain) IBOutletUITextView *locationTextView;`


    We will use this `UITextView` outlet to print out the information from the location
    services we will be reviewing. Before we can use this outlet, we have to `synthesize`
    it and release it in our `.m` file. Switch to `FirstViewController.m` in Xcode
    and add the lines from [Listing 3–4](#Chapter03.html#list_3_4) that are in bold.


    **Listing 3–4.** *Synthesize and Release the UILabel*


    `#import "FirstViewController.h"`


    `@implementation FirstViewController`

    **`@synthesize locationTextView; // synthesize *locationTextView`**


    `/*`

    `// Implement viewDidLoad to do additional setup after loading the view, typically
    from a nib.`

