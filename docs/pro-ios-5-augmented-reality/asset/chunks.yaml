  trans: "\n#### 修正后的标题\n\n实际上，我们已经在书中讨论过这个概念。我不确定是否有标准术语来定义它，但回想一下我们在第 4 章中关于磁力计的讨论，当时我们聊到了方向变化。假设一部\
    \ iPhone 处于竖屏模式且朝向正北。如果你将 iPhone 侧放，此时它变成了横屏右向模式（举例来说），虽然你仍然面向正北，但 iPhone 的朝向可能会错误地认为你已转向正西。\n\
    \n当 AR 应用（尤其是基于位置信息的应用）中的方向发生变化时，你必须注意相应地调整朝向。\n\n### 构建应用程序\n\n让我们开始吧。打开 Xcode\
    \ 并创建一个名为 `Ch11` 的项目，使用`空应用程序`模板。此模板将使用单个窗口构建一个简单的应用程序。\n\n#### 鸣谢\n\n`github.com`、`stackoverflow.com`、苹果开发者论坛以及其他各种在线社区上有很多关于基于位置的\
    \ AR 的讨论。有一些工具包，例如 ARKit（[`https://github.com/zac/iphonearkit`](https://github.com/zac/iphonearkit)），它拥有来自贡献者的近\
    \ 100 个不同分支变体。本章中的工作基于其中一些变体。因此，我要特别感谢 Zac White 和 Niels Hansen，他们为我们提供了可以在此基础上构建的起点。\n\
    \n#### 必需的框架\n\n我们正在构建一个基于位置的应用程序。你可能已经猜到，我们需要将`CoreLocation`框架添加到项目中。在继续之前，请确保已包含该框架。\n\
    \n#### 添加 Facebook iOS SDK\n\n我们之前下载 SDK 时，里面附带了示例应用程序。由于我们现在从一个干净的应用开始，我们需要将\
    \ SDK 重新添加到此项目中。\n\n在 Finder 中打开已归档的 SDK 目录。将 SDK 中的 `src` 目录拖入你的 Xcode 项目。确保选择了将资源复制到项目目录的选项。我们将在本章后面部分继续讨论这一点。\n\
    \n#### 好了，开始吧！\n\n好的，准备就绪。让我们开始编码。在你的 Xcode 项目中创建一个名为 `ARController` 的组。我们将把 AR\
    \ 特定的代码放在这里，以便你以后可以在自己的项目中复用它们。\n\n在 `ARController` 组中创建一个名为 `ARController.m`\
    \ 的新类。确保此类继承自 `NSObject` 而不是 `UIViewController`。在 Xcode 中打开 `ARController.h`。按照代码清单\
    \ 11–2 所示更新接口。\n\n**代码清单 11–2.** *更新后的 ARController.h*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import <CoreLocation/CoreLocation.h>\n#import <UIKit/UIKit.h>\n\n@interface ARController\
    \ : NSObject <UIAccelerometerDelegate, CLLocationManagerDelegate>\n{\n\n}\n\n\
    @property (nonatomic, retain) UIViewController *rootViewController;\n@property\
    \ (nonatomic, retain) UIImagePickerController *pickerController;\n@property (nonatomic,\
    \ retain) UIView *hudView;\n@property (nonatomic, retain) CLLocationManager *locationManager;\n\
    @property (nonatomic, retain) UIAccelerometer *accelerometer;\n\n- (id)initWithViewController:(UIViewController\
    \ *)viewController;\n- (void)presentModalARControllerAnimated:(BOOL)animated;\n\
    \n@end\n```\n\n我们正在为后续使用设置一些属性。我将在实现文件中详细解释每一个。切换到 `ARController.m` 并添加代码清单 11–3\
    \ 中的代码。\n\n**代码清单 11–3.** *ARController.m*\n\n```\n#import \"ARController.h\"\n\
    \n@implementation ARController\n@synthesize rootViewController = _rootViewController;\n\
    @synthesize pickerController = _pickerController;\n@synthesize hudView = _hudView;\n\
    @synthesize locationManager = _locationManager;\n@synthesize accelerometer = _accelerometer;\n\
    \n- (id)initWithViewController:(UIViewController *)viewController {\n    self.rootViewController\
    \ = viewController;\n    CGRect screenBounds = [[UIScreen mainScreen] bounds];\n\
    \    self.hudView = [[UIView alloc] initWithFrame:screenBounds];\n    self.rootViewController.view\
    \ = self.hudView;\n\n    self.pickerController = [[[UIImagePickerController alloc]\
    \ init] autorelease];\n        self.pickerController.sourceType = UIImagePickerControllerSourceTypeCamera;\n\
    \        self.pickerController.cameraViewTransform = CGAffineTransformScale(\n\
    self.pickerController.cameraViewTransform, 1.13f,  1.13f);\n\n        self.pickerController.showsCameraControls\
    \ = NO;\n        self.pickerController.navigationBarHidden = YES;\n        self.pickerController.cameraOverlayView\
    \ = _hudView;\n\n        self.locationManager = [[CLLocationManager alloc] init];\n\
    \        self.locationManager.headingFilter = kCLHeadingFilterNone;\n        self.locationManager.desiredAccuracy\
    \ = kCLLocationAccuracyBest;\n        self.locationManager.delegate = self;\n\
    \        [self.locationManager startUpdatingHeading];\n        [self.locationManager\
    \ startUpdatingLocation];\n\n        _accelerometer = [UIAccelerometer sharedAccelerometer];\n\
    \        _accelerometer.updateInterval = 0.25;\n        _accelerometer.delegate\
    \ = self;\n\n    [[NSNotificationCenter defaultCenter] addObserver:self selector:@selector(deviceOrientationDidChange:)\
    \ name:UIDeviceOrientationDidChangeNotification object:nil];\n    [[UIDevice currentDevice]\
    \ beginGeneratingDeviceOrientationNotifications];\n\n    return self;\n}\n\n-\
    \ (void)presentModalARControllerAnimated:(BOOL)animated {\n    [self.rootViewController\
    \ presentModalViewController:[self pickerController] animated:animated];\n   \
    \ _hudView.frame = _pickerController.view.bounds;\n}\n\n- (void)deviceOrientationDidChange:(NSNotification\
    \ *)notification {\n\n}\n\n@end\n```\n\n在我们深入之前，先逐步过一下这一部分。首先，我们需要在实现文件中合成我们定义的属性。到目前为止，这个类中有三个方法。首先，`initWithViewController`\
    \ 方法用于将一个 `UIImagePicker`（就像我们在第 7 章中所做的那样）添加到视图中，然后用一种新型的 HUD 层覆盖它。\n"
- fmt: "We then setup our location manager and accelerometer and start our update\
    \ services. This will look very similar to the code we created in [Chapter 4](#Chapter04.html#ch4)\
    \ when we were experimenting with iOS sensor programming. By itself, this class\
    \ isn't all that useful. Let's start building some new classes that leverage what\
    \ we have so far.\n\nCreate a new file in your Xcode project called `RootViewController`\
    \ that subclasses the `UIViewController` template. Make sure you uncheck the `With\
    \ XIB for user interface` option. Open `RootViewController.h` in Xcode and make\
    \ the changes reflected in [Listing 11–4](#Chapter11.html#list_11_4).\n\n**Listing\
    \ 11–4.** *Updated RootViewController.h*\n\n```\n#import <UIKit/UIKit.h>\n@class\
    \ ARController;\n\n@interface RootViewController : UIViewController {\n}\n\n@property\
    \ (nonatomic, retain) ARController *arController;\n@end\n```\n\nWe referenced\
    \ our `ARController` class and set up a new property of the same type. Switch\
    \ to `RootViewController.m` in Xcode. Update the class as shown in [Listing 11–5](#Chapter11.html#list_11_5).\n\
    \n**Listing 11–5.** *Updated RootViewController.m*\n\n```\n#import \"RootViewController.h\"\
    \n#import \"ARController.h\"\n\n@implementation RootViewController\n@synthesize\
    \ arController = _arController;\n\n- (id)initWithNibName:(NSString *)nibNameOrNil\
    \ bundle:(NSBundle *)nibBundleOrNil\n{\n    self = [super initWithNibName:nibNameOrNil\
    \ bundle:nibBundleOrNil];\nif (self) {\n        // Custom initialization\n   \
    \ }\n    return self;\n}\n\n- (void)didReceiveMemoryWarning\n{\n    // Releases\
    \ the view if it doesn't have a superview.\n    [super didReceiveMemoryWarning];\n\
    \n    // Release any cached data, images, etc that aren't in use.\n}\n\n#pragma\
    \ mark - View lifecycle\n\n// Implement loadView to create a view hierarchy programmatically,\
    \ without using a nib.\n- (void)loadView\n{\n_arController = [[ARController alloc]\
    \ initWithViewController:self];\n}\n\n- (void)viewDidAppear:(BOOL)animated {\n\
    [super viewDidAppear:animated];\n[self.arController presentModalARControllerAnimated:NO];\n\
    }\n\n- (void)viewWillAppear:(BOOL)animated {\n        [super viewWillAppear:animated];\n\
    }\n\n/*\n// Implement viewDidLoad to do additional setup after loading the view,\
    \ typically from a nib.\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n}\n\
    */\n\n- (void)viewDidUnload\n{\n    [super viewDidUnload];\n    // Release any\
    \ retained subviews of the main view.\n    // e.g. self.myOutlet = nil;\n}\n\n\
    - (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
    {\n    // Return YES for supported orientations\n        return YES;\n}\n\n@end\n\
    ```\n\nWe made a few small changes here. In the `viewDidAppear` method, we present\
    \ our modal AR controller. This allows us to reuse the code we are building in\
    \ other applications without re-creating the base `UIViewController`s. In the\
    \ `loadView` method, we allocate our new `arController` instance with the `UIImagePickerController`\
    \ and HUD layer.\n\nWe have one more step before we have our base project set\
    \ up with a `UIImagePicker` (camera view) under our user interface. Open `AppDelegate.h`\
    \ in Xcode. Update the header file as shown in [Listing 11–6](#Chapter11.html#list_11_6).\n\
    \n**Listing 11–6.** *Updated AppDelegate.h*\n\n```\n#import <UIKit/UIKit.h>\n\n\
    @class RootViewController;\n@interface AppDelegate : UIResponder <UIApplicationDelegate>\
    \ {\n\n}\n\n@property (strong, nonatomic) UIWindow *window;\n@property (nonatomic,\
    \ retain) RootViewController *rootViewController;\n@end\n```\n\nOpen `AppDelegate.m`\
    \ in Xcode. We will be overriding our `didFinishLaunchingWithOptions` method so\
    \ that we can add our `RootViewController` to the view stack. Update `AppDelegate.m`\
    \ with the changes reflected in [Listing 11–7](#Chapter11.html#list_11_7).\n\n\
    **Listing 11–7.** *Updated AppDelegate.m*\n\n```\n#import \"AppDelegate.h\"\n\
    #import \"RootViewController.h\"\n\n@implementation AppDelegate\n\n@synthesize\
    \ window = _window;\n@synthesize rootViewController = _rootViewController;\n\n\
    - (void)dealloc\n{\n    [_window release];\n    [super dealloc];\n}\n\n- (BOOL)application:(UIApplication\
    \ *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n\
    {\n    self.window = [[[UIWindow alloc] initWithFrame:[[UIScreen mainScreen] bounds]]\
    \ autorelease];\n    // Override point for customization after application launch.\n\
    _rootViewController = [[RootViewController alloc] init];\n[_window addSubview:_rootViewController.view];\n\
    \nself.window.backgroundColor = [UIColor clearColor];\n    [self.window makeKeyAndVisible];\n\
    \    return YES;\n}\n```\n\nAgain, this is nothing we haven't seen before. We\
    \ imported our new `RootViewController` class, synthesized the variable, and then\
    \ added it as a subview to our `UIWindow`.\n\nRun the application on a physical\
    \ device that allows for Core Location (iPhone or iPad). Since we're using the\
    \ camera, we won't be able to debug using the simulator. You should be prompted\
    \ by the location manager, as shown in [Figure 11–4](#Chapter11.html#fig_11_4),\
    \ to allow your current location to be shared with the application.\n\n![Image](images/1104.jpg)\n\
    \n**Figure 11–4.** *Allow location sharing through location manager permissions.*\n\
    \nAfter you accept the message, you will be taken to a full-screen camera view,\
    \ as shown in [Figure 11–5](#Chapter11.html#fig_11_5). Hopefully, you'll have\
    \ better scenery.\n\n![Image](images/1105.jpg)\n\n**Figure 11–5.** *Giving permission\
    \ for location sharing will bring up the camera view.*"
