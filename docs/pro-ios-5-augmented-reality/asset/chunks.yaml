    ## About the Author


    ![Image](images/kyle_roche.jpg) **Kyle Roche** has been focused on emerging technologies
    since 2000. During his time at Appirio, he led some of the world''s first and
    largest Google and [`Force.com`](http://Force.com) cloud platform migrations.
    He is the chief architect behind RingDNA ([`ringdma.com`](http://ringdna.com))
    and the co-founder of 2lemetry ([`2lemetry.com`](http://2lemetry.com)). Mobile
    applications and connected electronics (M2M) are the main focus of all of Kyle''s
    projects. Augmented reality and gaming frameworks play a large part in how these
    applications are visualized. Kyle studied mathematics and was on the wrestling
    team at the University of New Mexico. He currently lives in Denver, Colorado with
    his wife Jessica and their four children: Aodhan, Avery, Kelly, and Timmy. If
    there is ever free time outside of family life, Kyle spends it playing hockey
    or building iOS applications for local nonprofits. You can find him at [`kyleroche.com`](http://kyleroche.com).'
