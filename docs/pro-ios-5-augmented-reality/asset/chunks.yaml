- fmt: "#### Acceleration and Gyroscope\n\nThere are many use cases like virtual fitting\
    \ rooms or the post office example I referred to in Chapter 1 that leverage augmented-reality\
    \ features with a fixed-positional camera. However, in most mobile use cases,\
    \ the user will have the ability to move the device, change orientation, or move\
    \ around to interact with the application. To respond to the user's movement,\
    \ we'll need some combination of data from the gyroscope and accelerometer. Before\
    \ we start validating their existence on the device, let's spend a minute on the\
    \ difference between the two components.\n\nThe accelerometer measures across\
    \ three axes to gauge the orientation of a stationary platform relative to the\
    \ earth's surface. If the device is accelerating in only one particular direction,\
    \ it would be indistinguishable from the acceleration being provided by the earth's\
    \ gravitational pull. The trouble with this measurement alone is that it doesn't\
    \ provide enough information to maintain a particular orientation.\n\nThe gyroscope,\
    \ which was introduced in the iPhone 4, complements the accelerometer in that\
    \ it has the capability to measure rate of rotation around an axis. Using the\
    \ same example, the gyroscope could measure the constant state of rotation around\
    \ an axis and report when the rotation halts or changes. Typically, the gyroscope\
    \ works across six axes. The iPhone 4 ships with a three-axis gyroscope.\n\nIn\
    \ short, the gyroscope measures and maintains orientation, and the accelerometer\
    \ measures vibration. We'll see where and when to use these components in later\
    \ chapters. First, let's take a look at how to detect their existence in our own\
    \ applications.\n\nChecking for the existence of the gyroscope requires the addition\
    \ of another framework. In this case, we're going to need to add the Core Motion\
    \ Framework to our application. Link the framework to the application binary,\
    \ as we did with the previous frameworks in this chapter. Next, open the header\
    \ file in which you'd like to check for the existence of the gyroscope. Add the\
    \ code from [Listing 2–10](#Chapter02.html#list_2_10) to the header file under\
    \ the last `import` statement.\n\n**Listing 2–10.** *Import the Core Motion Framework*\n\
    \n```\n#import <CoreMotion/CoreMotion.h>\n```\n\nNext, add the code from [Listing\
    \ 2–11](#Chapter02.html#list_2_11) just above the `@end` in the header file to\
    \ declare our new helper method.\n\n**Listing 2–11.** *Declare Our Helper Method*\n\
    \n```\n- (BOOL) isGyroscopeAvailable;\n```\n\nNext, we're going to build our helper\
    \ function so we can reference it in an `if/else` statement just like we did for\
    \ our other hardware checks. Copy the code from [Listing 2–12](#Chapter02.html#list_2_12)\
    \ into the `.m` file for this class.\n\n**Listing 2–12.** *Our Helper Method Checks\
    \ Whether the Gyroscope Is Available*\n\n```\n- (BOOL) isGyroscopeAvailable\n\
    {\n#ifdef __IPHONE_4_0\n    CMMotionManager *motionManager = [[CMMotionManager\
    \ alloc] init];\n    BOOL gyroscopeAvailable = motionManager.gyroAvailable;\n\
    \    [motionManager release];\n    return gyroscopeAvailable;\n#else\n    return\
    \ NO;\n#endif\n}\n```\n\nWe are using the `gyroAvailable` property of the `CMMotionManager`\
    \ class to check for the existence of the gyroscope. Note that we are wrapping\
    \ this in a check for the `__IPHONE_4_0` macro. Because the gyroscope wasn't available\
    \ in versions prior to the iPhone 4, we don't need to check for it.\n\nFinally,\
    \ we need to call this new method in our `viewDidLoad` method alongside our other\
    \ validations. Add the code from [Listing 2–13](#Chapter02.html#list_2_13) just\
    \ below the check for the video camera.\n\n**Listing 2–13.** *Call the Gyroscope\
    \ Helper Method*\n\n```\nif ([self isGyroscopeAvailable]) {\n        UIAlertView\
    \ *alert = [[UIAlertView alloc] initWithTitle:@\"Gyroscope\"\n               \
    \                                         message:@\"Gyroscope Available\"\n \
    \                                                      delegate:self\n       \
    \                                       cancelButtonTitle:@\"OK\"\n          \
    \                                    otherButtonTitles:nil, nil];\n        [alert\
    \ show];\n        [alert release];\n    } else {\n        UIAlertView *alert =\
    \ [[UIAlertView alloc] initWithTitle:@\"Gyroscope\"\n                        \
    \                                message:@\"Gyroscope NOT Available\"\n      \
    \                                                 delegate:self\n            \
    \                                  cancelButtonTitle:@\"OK\"\n               \
    \                               otherButtonTitles:nil, nil];\n        [alert show];\n\
    \        [alert release];\n    }\n```\n\nAs you probably guessed by now, the gyroscope\
    \ isn't available on the simulator. So, if you want to test it out, you need to\
    \ deploy the application to your device.\n\n### Enforcing Hardware Requirements\n\
    \nIn your application, it's always important to check for the required hardware\
    \ before attempting to use it, but you could also stop the application from launching\
    \ if it doesn't meet your hardware requirements. Configuring your application's\
    \ `Info.plist` file does this for you. The `Info.plist` file is a standard component\
    \ of all the iOS templates. Xcode 4.2 templates generate this file under the `Supporting\
    \ Files` directory in your project. It will be named `ProjectName-Info.plist`,\
    \ where `ProjectName` is the name of your Xcode project.\n\nTo add hardware requirements\
    \ to your application, you first need to add another key to the `Info.plist` file.\
    \ If the file is open in Xcode, you can select **Add Row** from the right-click\
    \ context menu. Xcode 4.2 uses the description for selecting a new key, so look\
    \ for **Required device capabilities**. This key is an array of values corresponding\
    \ to the various hardware components of the iOS devices. For example, you can\
    \ add the `telephony` key to require the Phone application or the `front-facing-camera`\
    \ to require a front-facing camera on the device.\n\nUsing hardware requirements\
    \ can be touchy, and has some implications when submitting to the App Store. You\
    \ want to make sure that you require any components that you are going to use,\
    \ but not to the point where you restrict your device options. In the sample project\
    \ on GitHub (see the note at the beginning of this chapter), I added hardware\
    \ requirements for `wifi` and `still-camera` so you can have a working example.\n\
    \n[Table 2–2](#Chapter02.html#tab_2_2) lists the other various keys that are available\
    \ for the `UIRequiredDeviceCapabilities` key (e.g., **Required device capabilities**).\n\
    \n![Image](images/t0202.jpg)\n\n![Image](images/t0202a.jpg)\n\n### Summary\n\n\
    In this chapter, we reviewed the commonly used hardware components of an augmented-reality\
    \ application. We also walked through the steps necessary to detect this hardware\
    \ on a device and even restrict the application from launching if the prerequisites\
    \ aren't met. In the next few chapters, we'll be diving into how to use each of\
    \ these components and get information from the hardware. This will all build\
    \ up to us coding a fully functional augmented-reality application of our own.\n\
    \nIn the next chapter, we'll start with the views and layouts available to us\
    \ within iOS, and the ones that we'll be using for our sample applications.\n\n\
    ## Chapter 3\n\n## Using Location Services\n\nAlthough this book is essentially\
    \ about augmented reality, programming maps and location services make up a lot\
    \ of the fundamental aspects needed for a successful AR application. In this chapter,\
    \ we will look at the mapping capabilities of iOS and some advanced techniques\
    \ to integrate these services within your AR application.\n\nIf you were just\
    \ too excited to move ahead and skipped [Chapter 2](#Chapter02.html#ch2), I would\
    \ recommend that you go back and take a quick peek at the section called “Detecting\
    \ Location Capabilities.” It covers how to make sure location services are available\
    \ and how to prevent your app from attempting to access services that the user\
    \ might have disabled. If you're ready to dive in, let's get started."
  raw: '#### Acceleration and Gyroscope


    There are many use cases like virtual fitting rooms or the post office example
    I referred to in Chapter 1 that leverage augmented-reality features with a fixed-positional
    camera. However, in most mobile use cases, the user will have the ability to move
    the device, change orientation, or move around to interact with the application.
    To respond to the user''s movement, we''ll need some combination of data from
    the gyroscope and accelerometer. Before we start validating their existence on
    the device, let''s spend a minute on the difference between the two components.


    The accelerometer measures across three axes to gauge the orientation of a stationary
    platform relative to the earth''s surface. If the device is accelerating in only
    one particular direction, it would be indistinguishable from the acceleration
    being provided by the earth''s gravitational pull. The trouble with this measurement
    alone is that it doesn''t provide enough information to maintain a particular
    orientation.


    The gyroscope, which was introduced in the iPhone 4, complements the accelerometer
    in that it has the capability to measure rate of rotation around an axis. Using
    the same example, the gyroscope could measure the constant state of rotation around
    an axis and report when the rotation halts or changes. Typically, the gyroscope
    works across six axes. The iPhone 4 ships with a three-axis gyroscope.


    In short, the gyroscope measures and maintains orientation, and the accelerometer
    measures vibration. We''ll see where and when to use these components in later
    chapters. First, let''s take a look at how to detect their existence in our own
    applications.


    Checking for the existence of the gyroscope requires the addition of another framework.
    In this case, we''re going to need to add the Core Motion Framework to our application.
    Link the framework to the application binary, as we did with the previous frameworks
    in this chapter. Next, open the header file in which you''d like to check for
    the existence of the gyroscope. Add the code from [Listing 2–10](#Chapter02.html#list_2_10)
    to the header file under the last `import` statement.


    **Listing 2–10.** *Import the Core Motion Framework*


    `#import <CoreMotion/CoreMotion.h>`


    Next, add the code from [Listing 2–11](#Chapter02.html#list_2_11) just above the
    `@end` in the header file to declare our new helper method.


    **Listing 2–11.** *Declare Our Helper Method*


    `- (BOOL) isGyroscopeAvailable;`


    Next, we''re going to build our helper function so we can reference it in an `if/else`
    statement just like we did for our other hardware checks. Copy the code from [Listing
    2–12](#Chapter02.html#list_2_12) into the `.m` file for this class.


    **Listing 2–12.** *Our Helper Method Checks Whether the Gyroscope Is Available*


    `- (BOOL) isGyroscopeAvailable`

    `{`

    `#ifdef __IPHONE_4_0`

    `    CMMotionManager *motionManager = [[CMMotionManager alloc] init];`

    `    BOOL gyroscopeAvailable = motionManager.gyroAvailable;`

    `    [motionManager release];`

    `    return gyroscopeAvailable;`

    `#else`

    `    return NO;`

    `#endif`

    `}`


    We are using the `gyroAvailable` property of the `CMMotionManager` class to check
    for the existence of the gyroscope. Note that we are wrapping this in a check
    for the `__IPHONE_4_0` macro. Because the gyroscope wasn''t available in versions
    prior to the iPhone 4, we don''t need to check for it.


    Finally, we need to call this new method in our `viewDidLoad` method alongside
    our other validations. Add the code from [Listing 2–13](#Chapter02.html#list_2_13)
    just below the check for the video camera.


    **Listing 2–13.** *Call the Gyroscope Helper Method*


    `if ([self isGyroscopeAvailable]) {`

    `        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Gyroscope"`

    `                                                        message:@"Gyroscope Available"`

    `                                                       delegate:self`

    `                                              cancelButtonTitle:@"OK"`

    `                                              otherButtonTitles:nil, nil];`

    `        [alert show];`

    `        [alert release];`

    `    } else {`

    `        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Gyroscope"`

    `                                                        message:@"Gyroscope NOT
    Available"`

    `                                                       delegate:self`

    `                                              cancelButtonTitle:@"OK"`

    `                                              otherButtonTitles:nil, nil];`

    `        [alert show];`

    `        [alert release];`

    `    }`


    As you probably guessed by now, the gyroscope isn''t available on the simulator.
    So, if you want to test it out, you need to deploy the application to your device.


    ### Enforcing Hardware Requirements


    In your application, it''s always important to check for the required hardware
    before attempting to use it, but you could also stop the application from launching
    if it doesn''t meet your hardware requirements. Configuring your application''s
    `Info.plist` file does this for you. The `Info.plist` file is a standard component
    of all the iOS templates. Xcode 4.2 templates generate this file under the `Supporting
    Files` directory in your project. It will be named ProjectName `-Info.plist`,
    where `ProjectName` is the name of your Xcode project.


    To add hardware requirements to your application, you first need to add another
    key to the `Info.plist` file. If the file is open in Xcode, you can select **Add
    Row** from the right-click context menu. Xcode 4.2 uses the description for selecting
    a new key, so look for **Required device capabilities**. This key is an array
    of values corresponding to the various hardware components of the iOS devices.
    For example, you can add the `telephony` key to require the Phone application
    or the `front-facing-camera` to require a front-facing camera on the device.


    Using hardware requirements can be touchy, and has some implications when submitting
    to the App Store. You want to make sure that you require any components that you
    are going to use, but not to the point where you restrict your device options.
    In the sample project on GitHub (see the note at the beginning of this chapter),
    I added hardware requirements for `wifi` and `still-camera` so you can have a
    working example.


    [Table 2–2](#Chapter02.html#tab_2_2)  lists the other various keys that are available
    for the `UIRequiredDeviceCapabilities` key (e.g., **Required device capabilities**).


    ![Image](images/t0202.jpg)


    ![Image](images/t0202a.jpg)


    ### Summary


    In this chapter, we reviewed the commonly used hardware components of an augmented-reality
    application. We also walked through the steps necessary to detect this hardware
    on a device and even restrict the application from launching if the prerequisites
    aren''t met. In the next few chapters, we''ll be diving into how to use each of
    these components and get information from the hardware. This will all build up
    to us coding a fully functional augmented-reality application of our own.


    In the next chapter, we''ll start with the views and layouts available to us within
    iOS, and the ones that we''ll be using for our sample applications.


    ## Chapter  3


    ## Using Location Services


    Although this book is essentially about augmented reality, programming maps and
    location services make up a lot of the fundamental aspects needed for a successful
    AR application. In this chapter, we will look at the mapping capabilities of iOS
    and some advanced techniques to integrate these services within your AR application.


    If you were just too excited to move ahead and skipped [Chapter 2](#Chapter02.html#ch2),
    I would recommend that you go back and take a quick peek at the section called
    “Detecting Location Capabilities.” It covers how to make sure location services
    are available and how to prevent your app from attempting to access services that
    the user might have disabled. If you''re ready to dive in, let''s get started.'
  trans: "\n#### 加速度计与陀螺仪\n\n许多应用场景（如虚拟试衣间或我在第 1 章中提到的邮局示例）都利用了固定位置摄像头的增强现实功能。然而，在大多数移动应用场景中，用户将能够移动设备、改变方向或四处走动来与应用程序交互。为了响应用户的移动，我们需要结合使用陀螺仪和加速度计的数据。在开始验证它们是否存在于设备上之前，让我们花点时间来了解这两个组件之间的区别。\n\
    \n加速度计通过测量三个轴上的数据来评估静止平台相对于地球表面的方向。如果设备仅朝一个特定方向加速，则无法与地球引力产生的加速度区分开。仅凭这种测量方式的问题在于，它无法提供足够的信息来维持特定的方向。\n\
    \n陀螺仪最早出现在 iPhone 4 中，它对加速度计进行了补充，因为它能够测量绕某个轴的旋转速率。使用同样的例子，陀螺仪可以测量绕轴旋转的恒定状态，并在旋转停止或改变时进行报告。通常，陀螺仪可在六个轴上工作。iPhone\
    \ 4 配备的是三轴陀螺仪。\n\n简而言之，陀螺仪测量并维持方向，而加速度计测量振动。我们将在后面的章节中了解在何时何地使用这些组件。首先，让我们看看如何在自己的应用中检测它们的存在。\n\
    \n检测陀螺仪的存在需要添加另一个框架。在这种情况下，我们需要向应用程序添加 Core Motion 框架。将框架链接到应用程序二进制文件，就像我们在本章中对之前的框架所做的操作一样。接下来，打开你想要检测陀螺仪是否存在的头文件。在最后一个`import`语句下，将代码清单\
    \ 2-10 中的代码添加到头文件中。\n\n**代码清单 2-10.** *导入 Core Motion 框架*\n\n```\n#import <CoreMotion/CoreMotion.h>\n\
    ```\n\n接下来，在头文件的`@end`上方添加代码清单 2-11 中的代码，以声明我们新的辅助方法。\n\n**代码清单 2-11.** *声明辅助方法*\n\
    \n```\n- (BOOL) isGyroscopeAvailable;\n```\n\n接下来，我们将构建辅助函数，以便我们可以在`if/else`语句中引用它，就像我们对其他硬件检查所做的那样。将代码清单\
    \ 2-12 中的代码复制到该类的`.m`文件中。\n\n**代码清单 2-12.** *辅助方法检查陀螺仪是否可用*\n\n```\n- (BOOL) isGyroscopeAvailable\n\
    {\n#ifdef __IPHONE_4_0\n    CMMotionManager *motionManager = [[CMMotionManager\
    \ alloc] init];\n    BOOL gyroscopeAvailable = motionManager.gyroAvailable;\n\
    \    [motionManager release];\n    return gyroscopeAvailable;\n#else\n    return\
    \ NO;\n#endif\n}\n```\n\n我们使用`CMMotionManager`类的`gyroAvailable`属性来检查陀螺仪是否存在。请注意，我们将其包裹在对`__IPHONE_4_0`宏的检查中。由于陀螺仪在\
    \ iPhone 4 之前的版本中不可用，因此我们无需检查它。\n\n最后，我们需要在`viewDidLoad`方法中调用这个新方法，并将其与我们的其他验证放在一起。在检查摄像头的代码下方，添加代码清单\
    \ 2-13 中的代码。\n\n**代码清单 2-13.** *调用陀螺仪辅助方法*\n\n```\nif ([self isGyroscopeAvailable])\
    \ {\n        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"陀螺仪\"\n\
    \                                                        message:@\"陀螺仪可用\"\n\
    \                                                       delegate:self\n      \
    \                                        cancelButtonTitle:@\"确定\"\n         \
    \                                     otherButtonTitles:nil, nil];\n        [alert\
    \ show];\n        [alert release];\n    } else {\n        UIAlertView *alert =\
    \ [[UIAlertView alloc] initWithTitle:@\"陀螺仪\"\n                              \
    \                          message:@\"陀螺仪不可用\"\n                             \
    \                          delegate:self\n                                   \
    \           cancelButtonTitle:@\"确定\"\n                                      \
    \        otherButtonTitles:nil, nil];\n        [alert show];\n        [alert release];\n\
    \    }\n```\n\n你可能已经猜到了，模拟器上并不提供陀螺仪。所以，如果你想测试它，需要将应用程序部署到你的设备上。\n\n### 强制执行硬件要求\n\
    \n在你的应用中，在使用所需硬件之前检查其是否存在始终很重要，但如果你的应用不满足硬件要求，你也可以阻止它启动。配置应用的`Info.plist`文件即可实现这一点。`Info.plist`文件是所有\
    \ iOS 模板的标准组件。Xcode 4.2 模板会在项目中的`Supporting Files`目录下生成此文件。它将命名为`ProjectName-Info.plist`，其中`ProjectName`是你的\
    \ Xcode 项目名称。\n\n要为应用添加硬件要求，首先需要在`Info.plist`文件中添加另一个键。如果在 Xcode 中打开了该文件，你可以从右键上下文菜单中选择**添加行**。Xcode\
    \ 4.2 使用描述来选择新键，因此请查找**所需设备功能**。此键是一个值的数组，对应于 iOS 设备的各种硬件组件。例如，你可以添加`telephony`键来要求电话应用程序，或者添加`front-facing-camera`来要求设备具有前置摄像头。\n\
    \n使用硬件要求需要谨慎，并且在提交到 App Store 时会产生一些影响。你需要确保要求所有将要使用的组件，但不要限制你的设备选项。在 GitHub 上的示例项目中（参见本章开头的注释），我为`wifi`和`still-camera`添加了硬件要求，这样你就有了一个可运行的示例。\n\
    \n表 2-2 列出了`UIRequiredDeviceCapabilities`键（例如**所需设备功能**）可用的其他各种键。\n\n![图片](img/t0202.jpg)\n\
    \n![图片](img/t0202a.jpg)\n\n### 本章小结\n\n在本章中，我们回顾了增强现实应用程序中常用的硬件组件。我们还逐步介绍了在设备上检测这些硬件的必要步骤，甚至在先决条件不满足时限制应用程序启动的方法。在接下来的几章中，我们将深入探讨如何使用这些组件中的每一个，并从硬件获取信息。所有这些都将为我们编写一个功能齐全的增强现实应用程序奠定基础。\n\
    \n在下一章中，我们将从 iOS 中可用的视图和布局开始，以及我们将在示例应用程序中使用的那些视图和布局。\n\n## 第 3 章\n\n## 使用定位服务\n\
    \n尽管本书主要讨论增强现实，但地图和定位服务的编程构成了成功 AR 应用所需的许多基础方面。在本章中，我们将探讨 iOS 的地图功能以及一些将定位服务集成到\
    \ AR 应用中的高级技术。\n\n如果你过于兴奋地直接跳到本章而跳过了第 2 章，我建议你返回去快速浏览一下“检测定位功能”这一节。其中涵盖了如何确保定位服务可用，以及如何防止你的应用尝试访问用户可能已禁用的服务。如果你准备好深入学习了，那就让我们开始吧。\n"
- fmt: "### You Are Here\n\nLet's start with an example. First, open Xcode and create\
    \ a New Project. Select `Tab Bar Application` for your template and name your\
    \ project `iOS_AR_Ch3_LocationServices`. Make sure the Device Family is set to\
    \ `iPhone`. Everything we will cover in this chapter can easily be reused in your\
    \ iPad applications. So, to keep things simple, we'll be using only the iPhone\
    \ in this chapter.\n\nThis step is optional. I created a local Git repository\
    \ with this Xcode project. From my Terminal, I navigated to the new project's\
    \ directory and ran the commands shown in [Listing 3–1](#Chapter03.html#list_3_1).\
    \ The finished project for this chapter is available at `github.com/kyleroche`.\n\
    \n**Listing 3–1.** *Connect the Local Repository to GitHub*\n\n```\nKyle-Roches-MacBook-Pro-2:iOS_AR_Ch3_LocationServices\
    \ kyleroche$ git remote add origin git@github.com:kyleroche/iOS_AR_Ch3_LocationServices.git\n\
    Kyle-Roches-MacBook-Pro-2:iOS_AR_Ch3_LocationServices kyleroche$ git push -u origin\
    \ master\nCounting objects: 19, done.\nDelta compression using up to 8 threads.\n\
    Compressing objects: 100% (17/17), done.\nWriting objects: 100% (19/19), 10.78\
    \ KiB, done.\nTotal 19 (delta 5), reused 0 (delta 0)\nTo git@github.com:kyleroche/iOS_AR_Ch3_LocationServices.git\n\
    \ * [new branch]      master -> master\nBranch master set up to track remote branch\
    \ master from origin.\n```\n\nWe selected a Tab Bar Application, so we can continue\
    \ to build on the concepts in this chapter without overwriting them too extensively\
    \ as we progress. Let's start by opening the `FirstViewController.h` file in Xcode.\
    \ We're going to declare a few of the outlets we'll need to structure this demo.\
    \ Open the `FirstViewController.h` file in Xcode and add the code from [Listing\
    \ 3–2](#Chapter03.html#list_3_2) inside the `@interface` block.\n\n**Listing 3–2.**\
    \ *Declare the UITextView in the Interface*\n\n```\nUITextView *locationTextView;\n\
    ```\n\nNow, just before the `@end` of the header, add the code from [Listing 3–3](#Chapter03.html#list_3_3).\n\
    \n**Listing 3–3.** *Add the Property to the Class*\n\n```\n@property (nonatomic,\
    \ retain) IBOutletUITextView *locationTextView;\n```\n\nWe will use this `UITextView`\
    \ outlet to print out the information from the location services we will be reviewing.\
    \ Before we can use this outlet, we have to `synthesize` it and release it in\
    \ our `.m` file. Switch to `FirstViewController.m` in Xcode and add the lines\
    \ from [Listing 3–4](#Chapter03.html#list_3_4) that are in bold.\n\n**Listing\
    \ 3–4.** *Synthesize and Release the UILabel*\n\n````\n#import \"FirstViewController.h\"\
    \n\n@implementation FirstViewController\n@synthesize locationTextView; // synthesize\
    \ *locationTextView\n\n/*\n// Implement viewDidLoad to do additional setup after\
    \ loading the view, typically from a nib.\n- (void)viewDidLoad\n{\n\n    [superviewDidLoad];\n\
    }\n*/\n\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
    {\n    // Return YES for supported orientations\n    return (interfaceOrientation\
    \ == UIInterfaceOrientationPortrait);\n}\n\n- (void)didReceiveMemoryWarning\n\
    {\n    // Releases the view if it doesn't have a superview.\n    [super didReceiveMemoryWarning];\n\
    \n    // Release any cached data, images, etc. that aren't in use.\n}\n\n- (void)viewDidUnload\n\
    {\n    [super viewDidUnload];\n\n    // Release any retained subviews of the main\
    \ view.\n    // e.g. self.myOutlet = nil;\n}\n\n- (void)dealloc\n{\n    [locationTextView\
    \ release];  // release the UITextView\n    locationTextView = nil; // good practice\
    \ to set to nil after release\n    [superdealloc];\n}\n@end\n````\n\nYou might\
    \ notice that I released the variable, then also set it equal to `nil`. In most\
    \ cases, this is a good practice for memory management. This book isn't focused\
    \ on those topics, but we'll point out some details appropriate to augmented reality\
    \ and memory management as they come up. Augmented-reality applications use a\
    \ lot of delegates in classes, and memory management is an important aspect of\
    \ structuring AR applications correctly.\n\nNow that we've defined a `UITextView`\
    \ that we can use for textual updates, let's create the component in our XIB file.\
    \ Click `FirstView.xib` in the `Project Navigator` in Xcode to open the design\
    \ view. You should see something similar to that shown in [Figure 3–1](#Chapter03.html#fig_3_1).\n\
    \n![Image](images/0301.jpg)\n\n**Figure 3–1.** *Open the FirstView.xib in design\
    \ view.*\n\nYou'll notice there are already a few components on the layout. This\
    \ is why we choose to add a `UITextView`. We're going to simply use one of the\
    \ components that are already present. On the left side of the design window,\
    \ there is an icon of a translucent cube. While pressing the Ctrl key, click and\
    \ drag from that icon to the `UITextView` outlet on the iPhone screen. Refer to\
    \ [Figure 3–2](#Chapter03.html#fig_3_2) for reference.\n\n![Image](images/0302.jpg)\n\
    \n**Figure 3–2.** *Press Ctrl and drag from File's Owner icon to the UITextView.*\n\
    \nA context menu will appear when you release the mouse button over the `UITextView`.\
    \ You will see two outlets available for selection. They are:\n\n- `locationTextView`\
    \ (which we just created)\n- `View`\n\nSelect `locationTextView` from the list.\
    \ We have now wired the UI component to the `IBOutlet` in our `ViewController`\
    \ class. Return to the `FirstViewController.m` file in Xcode and uncomment the\
    \ `viewDidLoad` method. We're going to add some code to this method to start the\
    \ location services and update our `UITextView` element with the latest location\
    \ information."
