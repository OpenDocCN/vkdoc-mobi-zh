    2lemetry（[`2lemetry.com`](http://2lemetry.com)）的联合创始人。移动应用和联网电子设备（M2M）是凯尔所有项目的主要关注点。增强现实和游戏框架在这些应用的视觉呈现中扮演着重要角色。凯尔曾学习数学，并曾是新墨西哥大学摔跤队的一员。他目前与妻子杰西卡以及四个孩子——奥丹、艾弗里、凯莉和蒂米——居住在科罗拉多州丹佛市。如果在家庭生活之外有空闲时间，凯尔会用来打冰球或为当地非营利组织开发
    iOS 应用。你可以在[`kyleroche.com`](http://kyleroche.com)找到他。

