    **Figure 8–17** *Dude, I''m a pumpkin!*


    I''m not sure I like being a pumpkin. Earlier, we set the `ActionLayer` class
    to be touch enabled, but we never implemented the response methods. Declare a
    new private variable of the `CCParticleSystemQuad` class called `emitter` in the
    `ActionLayer.h` file. Open `ActionLayer.m` and add the methods from [Listing 8–41](#Chapter08.html#list_8_41).


    **Listing 8–41.** *Touch Methods*


    `- (void)registerWithTouchDispatcher {`

    `    [[CCTouchDispatcher sharedDispatcher] addTargetedDelegate:self priority:0
    swallowsTouches:YES];`

    `}`


    `- (BOOL)ccTouchBegan:(UITouch *)touch withEvent:(UIEvent *)event {`

    `    return YES;`

    `}`


    `- (void)ccTouchEnded:(UITouch *)touch withEvent:(UIEvent *)event {`

    `    CGPoint location = [self convertTouchToNodeSpace:touch];`

    `    if (CGRectContainsPoint(pumpkin.boundingBox, location)) {`

    `        pumpkin_count--;`


    **`emitter = [CCParticleSystemQuad particleWithFile:@"PumpkinExplosion.plist"];`**

    **`emitter.position = ccp(location.x, location.y);`**

    **`[self addChild:emitter z:1];`**


    `        if (pumpkin_count == 0) {`

    `            NSLog(@"You won");`

    `        }`

    `    }`

    `    //NSLog(@"Touch %@: ", NSStringFromCGPoint(location));`

    `}`


    Earlier in the chapter, we imported the Art directory from the sample project.
    I also created a particle effect using Particle Designer (from [`www.71squared.com`](http://www.71squared.com))
    to vaporize the pumpkins.


    When a pumpkin is vaporized, we want to subtract from the number of remaining
    pumpkins and change the pumpkin''s image (so we see each pumpkin once during the
    game).'
  trans: "\n### 南瓜登场\n\n我们只允许同时存在一个外星南瓜。基本规则是：第一个被检测到的人脸，就会不幸成为南瓜寄生的目标。\n\n为了实现这一机制，我们需要先在屏幕上添加一个南瓜，并将其设置为不可见状态。当我们检测到人脸时，将南瓜移动到人脸的坐标位置，并重新将其设置为不透明，这样它就会出现在摄像头画面中。\n\
    \n打开 `ActionLayer.h`。声明如代码清单 8-38 所示的私有变量。\n\n**代码清单 8-38.** *新的私有变量*\n\n```\n\
    CCSpriteBatchNode *pumpkinBatchNode;\nCCSprite *pumpkin;\nint pumpkin_count;\n\
    ```\n\n这些变量将用于初始化我们的南瓜图像。和之前一样，我们会使用 `CCSpriteBatchNode` 来管理图片。整数 `pumpkin_count`\
    \ 用于从 12 开始倒计数，这样我们就能知道还剩多少个外星南瓜需要消灭。切换到 `ActionLayer.m` 文件。按照代码清单 8-39 所示更新 `init`\
    \ 方法。\n\n**代码清单 8-39.** *新的 init 方法*\n\n```\n- (id)init {\n    if (self = [super\
    \ init]) {\n        //CGSize winSize = [CCDirector sharedDirector].winSize;\n\n\
    \        NSDictionary *detectorOptions = [NSDictionary dictionaryWithObjectsAndKeys:CIDetectorAccuracyLow,\
    \ CIDetectorAccuracy, nil];\n        self.detector = [CIDetector detectorOfType:CIDetectorTypeFace\
    \ context:nil options:detectorOptions];\n\n        pumpkinBatchNode = [CCSpriteBatchNode\
    \ batchNodeWithFile:@\"pumpkins.png\"];\n        [self addChild:pumpkinBatchNode];\n\
    \n        pumpkin = [CCSprite spriteWithSpriteFrameName:@\"pumpkin5.png\"];\n\
    \        pumpkin.position = ccp(0,0);\n        pumpkin.opacity = 0;\n        [self\
    \ addChild:pumpkin];\n\n        // 开始游戏\n        isProcessingRequest = NO;\n \
    \       pumpkin_count = 12;\n        [AppDelegate instance].actionLayer = self;\n\
    \        [AppDelegate instance].isPlaying = YES;\n\n        self.isTouchEnabled\
    \ = YES;\n    }\n    return self;\n}\n```\n\n这里，我们使用之前用过的精灵表初始化了 `CCSpriteBatchNode`。然后，通过精灵表中的\
    \ `pumpkin5.png` 帧初始化了 `pumpkin` 变量，将其作为一个新的 `CCSprite`。接着，我们将其设置为透明，并添加到场景中。\n\
    \n确保项目仍然能无报错地构建。目前还看不出什么新效果，所以把项目跑在设备上也没用。按照代码清单 8-40 所示，更新 `facialRecognitionRequest`\
    \ 方法。\n\n**代码清单 8-40.** *新的 facialRecognitionRequest 方法*\n\n```\n- (void)facialRecognitionRequest:(UIImage\
    \ *)image {\n    //NSLog(@\"Image is: %f by %f\", image.size.width, image.size.height);\n\
    \n    if (!isProcessingRequest) {\n        isProcessingRequest = YES;\n      \
    \  //NSLog(@\"Detecting Faces\");\n        NSArray *arr = [detector featuresInImage:[CIImage\
    \ imageWithCGImage:[image CGImage]]];\n\n        if ([arr count] > 0) {\n    \
    \        //NSLog(@\"Faces found.\");\n            for (int i = 0; i < 1; i++)\
    \ { //< [arr count]; i++) {\n                CIFaceFeature *feature = [arr objectAtIndex:i];\n\
    \                double xPosition = (feature.leftEyePosition.x + feature.rightEyePosition.x+feature.mouthPosition.x)/(3*image.size.width)\
    \ ;\n                double yPosition = (feature.leftEyePosition.y + feature.rightEyePosition.y+feature.mouthPosition.y)/(3*image.size.height);\n\
    \n                double dist = sqrt(pow((feature.leftEyePosition.x - feature.rightEyePosition.x),2)+pow((feature.leftEyePosition.y\
    \ - feature.rightEyePosition.y),2))/image.size.width;\n\n                yPosition\
    \ += dist;\n                CGSize size = [[CCDirector sharedDirector] winSize];\n\
    \                pumpkin.opacity = 255;\n                pumpkin.scale = 5*(size.width*dist)/256.0;\n\
    \n              [pumpkin setDisplayFrame:[[CCSpriteFrameCache sharedSpriteFrameCache]\n\
    spriteFrameByName:[NSString stringWithFormat:@\"pumpkin%d.png\", pumpkin_count\
    \ + 4]]];\n                CCMoveTo *moveAction = [CCMoveTo actionWithDuration:0\n\
    position:ccp((size.width * (xPosition)), (size.height * ((yPosition))))];\n  \
    \              [pumpkin runAction:moveAction];\n            }\n        } else\
    \ {\n            pumpkin.opacity = 0;\n        }    \n    }\n    isProcessingRequest\
    \ = NO;\n}\n```\n\n这是整款游戏中最关键的代码块，让我们逐步仔细分析。首先，我们检查当前是否正在处理请求。如果没有，则调用 `CIDetector`\
    \ 的方法来找出摄像头图像中的人脸。如果至少找到一张脸，我们再继续执行后续操作。\n\n在这里，我实际上硬编码了一个不超过一次迭代的循环。如果你想扩展这个游戏，这里也是一个可以改进的地方。可以用一个随机生成器来替换这个循环，从摄像头画面中随机选择一个目标，并随机分配一个南瓜。跟踪哪个用户的头上顶着哪个南瓜可能会需要大量的处理工作，但这会让游戏体验更丰富、更强大。\n\
    \n接着，我们会对 `CIDetector` 找到的眼睛的 X 和 Y 坐标进行三倍处理。这样做的目的是让南瓜更好地定位在实际显示的屏幕图像上方，而不是我们正在处理的比例较小的图像上。\n\
    \n我们使用经典的勾股定理计算距离，并将其除以屏幕的宽度。这有助于我们缩放图像，以便在你远离屏幕时，南瓜能贴合你的脸部。你可以在运行应用时亲自尝试一下。南瓜会随着你靠近或远离屏幕而相应地缩放。\n\
    \n最后，我们将 `opacity`（不透明度）重新设为 `255`（使其可见），并将精灵移动到检测到人脸的位置。我们使用了两个 cocos2D 宏来简化这一步。首先将精灵帧设置为`pumpkin_count`\
    \ 对应的图像（我们稍后会回看这一步），然后使用 `CCMoveTo` 动作将精灵移动到人脸所在的 X、Y 坐标位置。\n\n在实体设备上运行应用程序。从菜单选项中选择“新游戏”来开始游戏。你会看到类似于图\
    \ 8-17 的画面。\n\n![图片](img/0817.jpg)\n\n**图 8-17** *伙计，我变成南瓜了！*\n\n我不太确定我喜不喜欢变成南瓜。之前，我们将\
    \ `ActionLayer` 类设置为支持触摸，但我们从未实现过响应方法。在 `ActionLayer.h` 文件中声明一个名为 `emitter` 的\
    \ `CCParticleSystemQuad` 类新私有变量。打开 `ActionLayer.m`，添加代码清单 8-41 中的方法。\n\n**代码清单\
    \ 8-41.** *触摸方法*\n\n```\n- (void)registerWithTouchDispatcher {\n    [[CCTouchDispatcher\
    \ sharedDispatcher] addTargetedDelegate:self priority:0 swallowsTouches:YES];\n\
    }\n\n- (BOOL)ccTouchBegan:(UITouch *)touch withEvent:(UIEvent *)event {\n    return\
    \ YES;\n}\n\n- (void)ccTouchEnded:(UITouch *)touch withEvent:(UIEvent *)event\
    \ {\n    CGPoint location = [self convertTouchToNodeSpace:touch];\n    if (CGRectContainsPoint(pumpkin.boundingBox,\
    \ location)) {\n        pumpkin_count--;\n\n        emitter = [CCParticleSystemQuad\
    \ particleWithFile:@\"PumpkinExplosion.plist\"];\n        emitter.position = ccp(location.x,\
    \ location.y);\n        [self addChild:emitter z:1];\n\n        if (pumpkin_count\
    \ == 0) {\n            NSLog(@\"You won\");\n        }\n    }\n    //NSLog(@\"\
    Touch %@: \", NSStringFromCGPoint(location));\n}\n```\n\n在本章前面，我们已经从示例项目中导入了“Art”目录。我还使用\
    \ Particle Designer（来自 [`www.71squared.com`](http://www.71squared.com)）创建了一个粒子特效，用于南瓜的“蒸发”。\n\
    \n当一个南瓜被“蒸发”时，我们需要从剩余的南瓜数量中减一，并更换南瓜的图像（这样我们在游戏中每次看到的南瓜都不同）。\n"
- fmt: "\n我们在[清单8-41](#Chapter08.html#list_8_41)中添加的代码首先检查触摸位置。我们使用`convertTouchToNodeSpace`宏获取触摸事件的屏幕坐标。在某些cocos2D游戏中，“游戏世界”超出了屏幕的边界（例如，像《塞尔达传说》这样的瓦片地图游戏），因此我们需要将其转换为设备屏幕的坐标。接下来，我们检查触摸位置是否在我们南瓜的边界框内。如果是，我们设置粒子发射器（以添加蒸发效果），减少`pumpkin_count`，并刷新场景。如果你摧毁了足够多的南瓜，控制台将显示“You\
    \ won”消息。被蒸发的南瓜应具有类似于[图8-18](#Chapter08.html#fig_8_18)的效果。\n\n![Image](images/0818.jpg)\n\
    \n**图8-18** *现在，我是一个被蒸发的南瓜。*\n\n### 结束游戏\n\n永不结束的游戏毫无乐趣。我们在蒸发南瓜时已经减少了南瓜计数变量。让我们在游戏中添加一个场景来处理游戏结束状态，并在用户感兴趣时提供重新开始功能。\n\
    \n创建一个名为`EndLayer`的新类。确保它使用`CCNode`模板，并且是`CCLayer`的子类。在Xcode中打开`EndLayer.h`并更新头文件，如图8-42所示。\n\
    \n**清单8-42.** *更新后的EndLayer.h文件*\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n\n@interface EndLayer : CCLayer {\n\n}\n\n+(CCScene *)\
    \ scene;\n\n@end\n```\n\n看起来很熟悉吧？我们再次向新图层添加了静态的`CCScene`方法。切换到`EndLayer.m`。首先导入`ActionLayer.h`文件。然后，将[清单8-43](#Chapter08.html#list_8_43)中的方法添加到实现中。\n\
    \n**清单8-43.** *EndLayer.m中的新方法*\n\n```objectivec\n+(CCScene *) scene\n{\n    //\
    \ 'scene' is an autorelease object.\n    CCScene *scene = [CCScene node];\n\n\
    \    // 'layer' is an autorelease object.\n    EndLayer *layer = [EndLayer node];\n\
    \n    // add layer as a child to scene\n    [scene addChild: layer];\n\n    //\
    \ return the scene\n    return scene;\n}\n\n- (id)init {\n\n    if ((self = [super\
    \ init])) {\n\n        CGSize winSize = [CCDirector sharedDirector].winSize;\n\
    \n        CCLabelBMFont *titleLabel;\n        if (UI_USER_INTERFACE_IDIOM() ==\
    \ UIUserInterfaceIdiomPad) {\n            titleLabel = [CCLabelBMFont labelWithString:@\"\
    New Game\" fntFile:@\"Arial-hd.fnt\"];\n        } else {\n            titleLabel\
    \ = [CCLabelBMFont labelWithString:@\"New Game\" fntFile:@\"Arial.fnt\"];    \n\
    \        }\n\n        CCMenuItemLabel *newGameItem = [CCMenuItemLabel itemWithLabel:titleLabel\
    \ target:self selector:@selector(playTapped:)];\n        newGameItem.position\
    \ = ccp(winSize.width * 0.8, winSize.height * 0.3);\n\n        CCMenu *menu =\
    \ [CCMenu menuWithItems:newGameItem, nil];\n        menu.position = CGPointZero;\n\
    \n        [self addChild:menu];\n\n    }\n    return self;\n}\n\n- (void)playTapped:(id)sender\
    \ {\n    [[CCDirector sharedDirector] replaceScene:[CCTransitionRadialCCW transitionWithDuration:1.0\
    \ scene:[ActionLayer scene]]];\n}\n```\n\n`scene`和`init`方法应该没有意外。在`init`方法中，我们设置了另一个游戏菜单，允许用户重新开始游戏。在显示`EndLayer`场景之前，我们需要清除`ActionLayer`中的一些变量。返回到`ActionLayer.m`。首先导入`EndLayer.h`头文件。\n\
    \n找到[清单8-44](#Chapter08.html#list_8_44)所示的代码。将其替换为[清单8-45](#Chapter08.html#list_8_45)中的代码。\n\
    \n**清单8-44.** *找到这段代码……*\n\n```objectivec\nif (pumpkin_count == 0) {\n       \
    \     NSLog(@\"You won\");\n}\n```\n\n**清单8-45.** *替换为这段代码……*\n\n```objectivec\n\
    if (pumpkin_count == 0) {\n            NSLog(@\"You won\");\n            isProcessingRequest\
    \ = YES;\n            [AppDelegate instance].isPlaying = NO;\n            [[CCDirector\
    \ sharedDirector] replaceScene:[EndLayer scene]];\n}\n```\n\n当我们的`ActionLayer`类被初始化时，我们将`isProcessingRequest`设置为`YES`。我们还将`AppDelegate`的`isPlaying`布尔值设置为`NO`。在我们可以结束游戏并允许用户重新开始之前，我们必须重置我们的环境。处理完毕后，我们告诉`CCDirector`播放`EndLayer\
    \ scene`。\n\n在你摧毁了十几个南瓜后，你将看到一个重新开始菜单，如图8-19所示。\n\n![Image](images/0819.jpg)\n\
    \n**图8-19** *所有南瓜都被蒸发，并显示新游戏菜单。*\n\n如果你选择新游戏菜单，游戏将以其默认状态（剩余12个南瓜需要消灭）重新开始。\n\n\
    **注意：** 在将游戏带出去参加派对之前，你可能希望将其从前置摄像头切换为默认视频设备。同时，确保你换回旋转效果。`CIDetector`在处理非垂直图像时会有问题。此外，你可以从`MenuLayer`中移除调试绘制方法，使菜单看起来不那么像程序员风格。\n\
    \n### 总结\n\n这是一个非常有趣的章节。我们从一个默认的cocos2D chipmunk模板开始，构建了一个功能完整的游戏。我们首先让菜单对用户来说更有趣。我们拿了一个南瓜，并将其连接到一个弹簧约束上，这样我们就可以折腾它，而不会让它飞到屏幕外。\n\
    \n我们构建了游戏菜单，用来启动动作场景并开始接收面部识别请求。我们学习了精灵表单和批次节点，以及一些处理叠加效果的简单方法，如`CCMoveTo`和设置精灵的不透明度。\n\
    \n我们引入了`CIDetector`，我们将在[第12章](#Chapter12.html#ch12)中学习它，用于查找面部，以便将南瓜移动到正确的位置。最后，我们使用粒子效果来蒸发外星入侵者，并构建了一个结束游戏菜单。\n\
    \n正如我们在过去两章中看到的，cocos2D框架使得游戏开发比在OpenGL ES中从头构建这些功能要容易得多。\n\n在[第9章](#Chapter09.html#ch9)中，我们将介绍一些可用于增强现实项目的其他第三方框架和SDK。这些框架大多专注于基于位置的AR或基于标记的AR。我们将在[第13章](#Chapter13.html#ch13)中看到更多游戏风格的示例。\n\
    \n# 第9章\n\n## 第三方增强现实工具包\n\n在本书中，我们将介绍许多可用于帮助您进行AR开发的技术。将应用程序快速推向市场的关键部分是不重复造轮子。对于AR来说，即使这是一个新领域，这一点仍然成立。有一些工具包可供开发人员用于基于标记的应用程序、基于位置的应用程序，甚至3D绘图应用程序。\n\
    \n在本章中，我们将讨论其中的一些工具及其优缺点。在此过程中，我们还将构建一些示例应用程序。\n\n### 概览\n\n在本章中，我们将讨论表9-1中列出的工具包。\n\
    \n![Image](images/t0901.jpg)\n\n每个工具包都有其独特的优势，并且在某些情况下，与其他工具包相比，也存在一些缺点。我们将逐一讨论这些工具包，并查看一些示例。\n"
  raw: 'The code we added in [Listing 8–41](#Chapter08.html#list_8_41) starts by checking
    the touch location. We use the `convertTouchToNodeSpace` macro to get screen coordinates
    for the touch event. In some cocos2D games the “game world” exceeds the boundaries
    of the screen (e.g., tile map games like Legend of Zelda), so we need to convert
    this to the coordinates of the device''s screen. Next, we check to see if the
    touch location is within the bounding box of our pumpkin. If it is, we set up
    our particle emitter (to add the vaporize effect), we decrement our `pumpkin_count`,
    and we refresh the scene. If you blast enough pumpkins, your console will show
    the “You won” message. Vaporized pumpkins should have an effect similar to [Figure
    8–18](#Chapter08.html#fig_8_18).


    ![Image](images/0818.jpg)


    **Figure 8–18** *Now, I''m a vaporized Pumpkin.*


    ### Ending the Game


    Games are no fun if they never end. We are already decrementing the pumpkin count
    variable when we vaporize a pumpkin. Let''s add a scene to the game to handle
    the end game state and a restart if the user is interested.


    Create a new class called `EndLayer`. Make sure it uses the `CCNode` template
    and is a subclass of `CCLayer`. Open `EndLayer.h` in Xcode and update the header,
    as shown in Figure 8–42.


    **Listing 8–42.** *Updated EndLayer.h File*


    `#import <Foundation/Foundation.h>`

    `#import "cocos2d.h"`


    `@interface EndLayer : CCLayer {`


    `}`


    **`+(CCScene *) scene;`**


    `@end`


    Looks familiar, eh? We are, again, adding the static `CCScene` method to our new
    layer. Switch over to `EndLayer.m`. Start by importing the `ActionLayer.h` file.
    Then, add the methods from [Listing 8–43](#Chapter08.html#list_8_43) to the implementation.


    **Listing 8–43.** *New Methods in EndLayer.m*


    `+(CCScene *) scene`

    `{`

    `    // ''scene'' is an autorelease object.`

    `    CCScene *scene = [CCScene node];`


    `    // ''layer'' is an autorelease object.`

    `    EndLayer *layer = [EndLayer node];`


    `    // add layer as a child to scene`

    `    [scene addChild: layer];`


    `    // return the scene`

    `    return scene;`

    `}`


    `- (id)init {`


    `    if ((self = [super init])) {`


    `        CGSize winSize = [CCDirector sharedDirector].winSize;`


    `        CCLabelBMFont *titleLabel;`

    `        if (UI_USER_INTERFACE_IDIOM() == UIUserInterfaceIdiomPad) {`

    `            titleLabel = [CCLabelBMFont labelWithString:@"New Game" fntFile:@"Arial-hd.fnt"];`

    `        } else {`

    `            titleLabel = [CCLabelBMFont labelWithString:@"New Game" fntFile:@"Arial.fnt"];    `

    `        }`


    `        CCMenuItemLabel *newGameItem = [CCMenuItemLabel itemWithLabel:titleLabel
    target:self selector:@selector(playTapped:)];`

    `        newGameItem.position = ccp(winSize.width * 0.8, winSize.height * 0.3);`


    `        CCMenu *menu = [CCMenu menuWithItems:newGameItem, nil];`

    `        menu.position = CGPointZero;`


    `        [self addChild:menu];`


    `    }`

    `    return self;`

    `}`


    `- (void)playTapped:(id)sender {`

    `    [[CCDirector sharedDirector] replaceScene:[CCTransitionRadialCCW transitionWithDuration:1.0
    scene:[ActionLayer scene]]];`

    `}`


    The `scene` and `init` methods should contain no surprises. In the `init` method,
    we are setting up another game menu to allow the user to start the game over.
    Before we display the `EndLayer` scene, we need to clear some of our variables
    in our `ActionLayer`. Return to `ActionLayer.m`. Start by importing the `EndLayer.h`
    header.


    Find the code shown in [Listing 8–44](#Chapter08.html#list_8_44). Replace it with
    the code from [Listing 8–45](#Chapter08.html#list_8_45).


    **Listing 8–44.** *Find This Code . . .*


    `if (pumpkin_count == 0) {`

    `            NSLog(@"You won");`

    `}`


    **Listing 8–45.** *Replace with This . . .*


    `if (pumpkin_count == 0) {`

    `            NSLog(@"You won");`

    `            isProcessingRequest = YES;`

    `            [AppDelegate instance].isPlaying = NO;`

    `            [[CCDirector sharedDirector] replaceScene:[EndLayer scene]];`

    `}`


    When our `ActionLayer` class is initialized, we set `isProcessingRequest` to `YES`.
    We also set the `isPlaying` Boolean of our `AppDelegate` to `NO`. Before we can
    end the game and allow the user to restart it, we have to reset our environment.
    After that''s taken care of, we tell the `CCDirector` to play the `EndLayer scene`.


    After you vaporize the dozen pumpkins, you''ll be presented with a restart menu,
    as shown in [Figure 8–19](#Chapter08.html#fig_8_19).


    ![Image](images/0819.jpg)


    **Figure 8–19** *All pumpkins are vaporized, and a New Game menu is presented.*


    If you select the New Game menu, the game restarts in its default state (12 pumpkins
    left to kill).


    **NOTE:** Before you bring this game out to a party, you might want to switch
    it from the front-facing camera to the default video device. Also, make sure you
    swap back the rotation effect. `CIDetector` has trouble with nonvertical image
    processing. Also, you can remove the debug draw method from the `MenuLayer` to
    make the menu less coder-ish.


    ### Summary


    This was a really fun chapter. We started with a default cocos2D chipmunk template
    and built a fully functional game. We started by making the menu interesting for
    the user. We took a pumpkin and hooked him up to a spring constraint so we could
    abuse him without having him fly off the screen.


    We built out the game menu to launch the action scene and start taking in facial
    recognition requests. We learned about sprite sheets and batch nodes and some
    simple methods to handle overlays, like `CCMoveTo` and setting the opacity of
    a sprite.


    We introduced `CIDetector`, which we''ll learn about in [Chapter 12](#Chapter12.html#ch12),
    to find faces so we could move our pumpkins to the right place. We finished up
    with some particle effects to vaporize the alien intruders and we built an end
    game menu.


    The cocos2D framework, as we''ve seen in the last two chapters, makes game development
    so much easier than building these features from scratch in OpenGL ES.


    In [Chapter 9](#Chapter09.html#ch9), we''ll introduce some other third-party frameworks
    and SDKs that are available for augmented reality projects. Most of these frameworks
    concentrate on location-based AR or marker-based AR. We''ll see a bit more gaming
    flavor in [Chapter 13](#Chapter13.html#ch13).


    ## Chapter  9


    ## Third-Party Augmented Reality Toolkits


    In this book, we''re going to cover quite a few technologies that are available
    to help you with your AR development. A key part of bringing an application to
    market quickly is not reinventing the wheel. For AR, even though this is a new
    space, this still holds true. There are toolkits available to developers for marker-based
    applications, location-based applications, and even 3D drawing applications.


    In this chapter, we''ll discuss some of these tools and their strengths and weaknesses.
    Along the way, we''ll build a few sample applications as well.


    ### Overview


    In this chapter, we''re going to talk about the toolkits listed in [Table 9–1](#Chapter09.html#tab_9_1).


    ![Image](images/t0901.jpg)


    Each of these toolkits has a unique advantage and, in some cases, comes with some
    drawbacks in comparison to the other toolkits. We''ll talk about each of these
    and look at some samples as well.'
