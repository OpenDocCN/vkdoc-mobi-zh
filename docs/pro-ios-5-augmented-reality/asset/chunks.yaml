    to Wikipedia. Obviously, there are various theories as to why the traction hasn''t
    taken more market share. Among them are the basic concerns about privacy and security
    online, but there are equally as many theories on the lack of physical interaction
    accounting for an unknown product. In some cases, such as with clothing, you just
    need to see and feel what you''re buying.


    Sometime in late 2010, we started seeing multiple AR experiences penetrate the
    retail market. Growing up in the late ''70s, I recall Jane Jetson trying out new
    hairstyles with the push of a button, or Luke Skywalker listening to the brief
    about the approach methods for the Death Star over a holographic 3D display. This
    type of experience is now available for consumers. From trying on new clothing
    and accessories, to finding out where your grocer''s apples are grown, consider
    some of these recent examples:


    *   *Lego''s Digital Box:* An in-store kiosk by Lego lets a child hold up the
    box set he or she is considering in front of a camera on the kiosk, which then
    overlays the fully constructed set right on top of the box. The child can move
    it around, turn it over, and get a feel for whether this is the set they really
    want to put on their Christmas list.

    *   *Zugara:* Zugara uses its Magic Mirror, which lets an online shopper stand
    in front of a webcam and try on different clothing styles, without the aid of
    a mouse or keyboard. In addition to overlaying the clothes from the online catalog,
    Zugara overlays controls in the camera''s view so that the user can use gestures
    to interact with menu options or share their new outfit over their social network.

    *   *FoodTracer:* This project by Giuseppe Costana uses image recognition in AR
    to give grocery shoppers more information about the food they are buying. Simply
    wave a smartphone''s camera in front of the grocer''s shelf and information becomes
    available.


    There are obvious advantages and appeals to the interactive experience. However,
    also consider some of the supplemental values of AR. The back end of most of these
    applications lives on the cloud. Image-recognition algorithms and the camera''s
    interpretation itself are primarly running on the device, but advertising data,
    contextual information, location directories, and other dynamic content linked
    to the AR view can be loaded from the cloud and in a centralized location where
    updates are seamless and the applications can always remain current.


    #### Gaming and Location-Based AR


    Retail and in-store kiosks are not the only places that AR is becoming a trend.
    Social networks, location-based services, and gaming are leveraging AR as well.
    Imagine using your camera to interact with the real world in a gaming scenario.
    I recently saw a demo at a conference in which 3D models of zombies were rendered
    in the AR view of an iPhone and the user could shoot them by just tapping on the
    screen. It has spawned a secondary market for accessories like the iPhone gun,
    covered on [`www.augmentedplanet.com`](http://www.augmentedplanet.com). This rifle-sized
    accessory mounts your iPhone to the scope, so you can have a realistic experience
    of shooting 3D zombies in an AR fashion.


    In this book, we''ll cover the basics for creating your own AR game. We''ll look
    at various approaches to this project, including some available SDKs to speed
    your time to market.


    ### Getting Your House in Order


    There are a few steps you''ll need to take to make sure everything on your machine
    is ready to go for iOS programming. In this book, we''ll be using Xcode 4.2 only,
    and we''ll be storing all our projects on GitHub. Xcode shipped with native Git
    integration for source-code management, so we''ll be taking advantage of that
    to make things easier and save setup time.


    #### Signing Up for GitHub


    If you already have a GitHub account, you can skip this section. If not, you''re
    going to need one to download the assets and starting points for each chapter.
    Open a browser to [`www.github.com`](http://www.github.com) and click the big
    `Signup` button in the middle of the page, as shown in [Figure 1–3](#Chapter01.html#fig_1_3).


    ![Image](images/0103.jpg)


    **Figure 1–3.** *The Signup button is easy to find on GitHub.*


    For this book, we''re going to be accessing the Git repositories that I''ve already
    set up for each chapter; and, if you''re into sharing, we''ll be posting any variations
    back for fellow readers. With that in mind, we really only need the “Free for
    open source” account type. Click the **Create a free account** button and fill
    out your information.'
  trans: '

    #### 流行文化


    增强现实技术在广告、房地产、汽车行业，尤其是消费领域有着数百种应用。据维基百科统计，尽管数据显示超过半数的美国民众尝试过网购，但其收入仅占消费支出的 8%。显然，关于这项技术为何未能占据更大市场份额存在多种理论解释，其中既包括对在线隐私与安全的基本担忧，也不乏因缺乏实体互动体验而无法了解产品本身的观点。以服装为例，有些商品确实需要亲眼所见、亲手触摸才能决定购买。


    大约在 2010 年末，我们开始看到多种 AR 体验渗入零售市场。作为 70 年代末成长起来的一代人，我记得简·杰特森只需按下按钮就能尝试新发型，或者卢克·天行者通过全息
    3D 显示屏聆听关于死星接近方案的简报。如今这种体验已向消费者开放。从试穿新衣饰到查看杂货店苹果的产地，不妨看看以下近期案例：


    *   *乐高数字展示台：* 乐高推出的店内交互终端，让孩子将心仪的套装盒放在摄像头前，系统随即在盒子上叠加显示完整的组装模型。孩子可以旋转、翻转模型，感受这是否真是他们想列入圣诞愿望清单的套装。

    *   *Zugara：* Zugara 的"魔镜"让网购者无需鼠标键盘，只需站在摄像头前就能试穿不同款式的服装。除了叠加在线目录中的衣物，Zugara 还在摄像头画面中叠加控制界面，用户可通过手势操作菜单选项，或在社交网络分享新造型。

    *   *FoodTracer：* 朱塞佩·科斯塔纳的这个项目利用 AR 图像识别技术，为杂货购物者提供所购食品的更多信息。只需在货架前挥动智能手机摄像头，相关信息便会即刻呈现。


    互动体验的优势与吸引力显而易见。然而，还需考虑 AR 的一些附加价值：多数此类应用的后端都运行在云端。图像识别算法和摄像头解析功能主要在设备端运行，但广告数据、场景信息、位置目录以及与
    AR 视图关联的其他动态内容均可从云端加载——这些集中存储的内容可实现无缝更新，使应用始终保持最新状态。


    #### 游戏与基于位置的 AR


    零售和店内交互终端并非 AR 成为趋势的唯一领域。社交网络、基于位置的服务以及游戏领域也在利用 AR 技术。想象一下游戏场景中通过摄像头与真实世界互动的情景。最近在某场会议上，我看到一个演示：iPhone
    的 AR 视图中渲染出立体僵尸模型，用户只需轻点屏幕即可射击。这催生了如 iPhone 枪托等配件的二级市场，相关报道见[`www.augmentedplanet.com`](http://www.augmentedplanet.com)。这种步枪大小的配件可将
    iPhone 固定在瞄准镜上，让用户以 AR 方式获得逼真的 3D 僵尸射击体验。


    本书将介绍创建 AR 游戏的基础知识，包括加快产品上市速度的多种方案及可用 SDK。


    ### 准备工作就绪


    你需要完成若干步骤，确保设备为 iOS 编程做好准备。本书将仅使用 Xcode 4.2，所有项目都存放在 GitHub 上。由于 Xcode 已内置原生的
    Git 集成功能用于源代码管理，我们将利用这一特性简化操作并节省设置时间。


    #### 注册 GitHub 账号


    若已有 GitHub 账号可跳过本节。若无账号，则需要注册一个以获取各章节的素材和起始文件。打开浏览器访问[`www.github.com`](http://www.github.com)，点击页面中央的"注册"大按钮，如图
    1-3 所示。


    ![图片](img/0103.jpg)


    **图 1-3.** *GitHub 上的注册按钮清晰易见。*


    本书中，我们将访问我为各章节预先配置的 Git 仓库；如果你乐于分享，也可以将任何个性化版本上传供其他读者参考。因此，我们只需选择"开源项目免费"账户类型。点击**创建免费账户**按钮并填写信息即可。

    '
- fmt: '### Accessing GitHub from Your Machine


    If you''ve used GitHub before, you may skip this section, which is for users who
    have not yet created an SSH key for use with GitHub.


    There are a few ways to access GitHub''s remote repositories from your machine.
    We''ll be using SSH access, which means we''ll need to generate a token and post
    it to GitHub. Open Terminal (**Applications** ![Image](images/U001.jpg) **Utilities**
    ![Image](images/U001.jpg) **Terminal**) from your Mac. Take a look at [Listing
    1–1](#Chapter01.html#list_1_1). Follow this same pattern in your Terminal window.
    I''ll explain the steps next.


    **Listing 1–1.** *Create Your SSH Key on Your Mac*


    ```

    Kyle-Roches-MacBook-Pro-2:~ kyleroche$ cd ~/.ssh

    Kyle-Roches-MacBook-Pro-2:.ssh kyleroche$ ls

    known_hosts

    Kyle-Roches-MacBook-Pro-2:.ssh kyleroche$ ssh-keygen -t rsa -C "kyle@isidorey.com"

    Generating public/private rsa key pair.

    Enter file in which to save the key (/Users/kyleroche/.ssh/id_rsa):

    Enter passphrase (empty for no passphrase): [enter a passphrase here]

    Enter same passphrase again: [enter your passphrase again]

    Your identification has been saved in /Users/kyleroche/.ssh/id_rsa.

    Your public key has been saved in /Users/kyleroche/.ssh/id_rsa.pub.

    The key fingerprint is:

    26:9d:3a:82:fe:r9:gf:ba:39:30:6b:98:16:fe:3b:2c kyle@isidorey.com

    The key''s randomart image is:

    +--[ RSA 2048]----+

    |                 |

    |                 |

    |                 |

    | .     . . 4      |

    |. . . ..N        |

    |.  o ..+r        |

    | .. ...-|=.        |

    |  ..+.-E.o       |

    |   +.==oooo      |

    +-----------------+

    Kyle-Roches-MacBook-Pro-2:.ssh kyleroche$ ls

    id_rsa          id_rsa.pub          known_hosts

    ```


    The directory listing commands might have different results if you have existing
    keys already. In this case, you probably want to back up your key directory, just
    to be safe. First, we''re going to use the `ssh-keygen` utility to create a public/private
    rsa key pair. The utility will ask us for a passphrase. This is optional, but
    passphrases do increase security. Passwords, as most of us realize, aren''t all
    that secure on their own. Generating a key pair without a passphrase is equivalent
    to saving your passwords in a plain-text file on your machine. Anyone who gains
    access can now use your key. If you''re lazy and concerned about typing it in
    every time, don''t fret. Keychain (since we''re all on a Mac) will allow you to
    store it after the first time you use this key pair.


    So, we have a key pair. It''s stored in the newly created `id_rsa.pub` file you
    see in your directory listing. Open this file in your favorite plain-text editor
    and copy all of its contents. It''s important that you copy everything, even the
    headers.


    Return to GitHub, which should be open to your account in your browser. Open your
    **Account Settings** page from the top-left navigation menu. Then open the subtab
    on the left-hand side called **SSH Public Keys**. You should see something similar
    to [Figure 1–4](#Chapter01.html#fig_1_4).


    ![Image](images/0104.jpg)


    **Figure 1–4.** *Open the SSH Public Keys dialog on GitHub.*


    Find the **Add another public key** link in the middle of the page. That will
    open a dialog where you will paste the contents of the `id_rsa.pub` file we just
    created. That''s it! You''re now set up in GitHub and your machine can access
    your repositories using SSH.


    Because we''ll be using SSH access in this book, let''s quickly set up our default
    preferences before we move on.


    We need to configure our local Git client to use the credentials that we received
    when signing up for GitHub. First, run the following commands from [Listing 1–2](#Chapter01.html#list_1_2)
    in your Terminal window to set some global flags for Git. This, in combination
    with your SSH keys, will authenticate your Git client to the remote repository.


    **Listing 1–2.** *Create Your SSH Key on Your Mac*


    ```

    Kyle-Roches-MacBook-Pro-2: kyleroche$ git config --global user.name "Kyle Roche"

    Kyle-Roches-MacBook-Pro-2: kyleroche$ git config --global user.email "kyle@isidorey.com"

    ```


    ### Setting Up Xcode 4.2 and Your Developer Account


    If you have Xcode 4.2 already set up, you may skip this section.


    To publish an app to the App Store, you need Xcode and an Apple Developer account.
    We can take care of both of these steps at the same time. Open your browser to
    [`http://developer.apple.com/programs/register/`](http://developer.apple.com/programs/register/)
    and click the **Get Started** button in the header. There are a few paths to follow
    here. If you want to use an existing Apple ID, you can fill that in and continue
    along. See [Figure 1–5](#Chapter01.html#fig_1_5). Alternatively, you can create
    a new ID for iOS development. That might not seem reasonable, but there are a
    few pitfalls with using one account.


    ![Image](images/0105.jpg)


    **Figure 1–5.** *Use existing Apple ID or create a new one?*


    **NOTE:** Choosing whether to consolidate your Apple IDs or create a second one
    depends on your intent in regards to publishing your apps in the future. Apple
    has a restriction on which publishing type you can link to an account. There are
    two ways to publish applications: through the App Store and through Apple''s Enterprise
    Distribution program. An Apple ID cannot be tied to both publishing methods. Make
    sure you decide which ID will be responsible for which method of publishing, if
    you are going to cover both scenarios.


    If you just want to use your account to develop and debug, then use an existing
    account. It''s probably the simplest path. After you are registered, log in to
    the **iOSDev Center**. Find the link for **Downloads**. At the time of this writing,
    there are only two choices: **Download Xcode 4.2** and a series of links around
    iAd Producer 1.1. Download Xcode 4.2 to your machine. The download is fairly large.
    This is one of the drawbacks of Xcode. Each upgraded version, which have started
    coming more frequently since iOS, requires a new full download of the IDE.


    We now have our IDE and our source control strategy set up. Let''s connect the
    two and make sure we''re ready to get started.'
