    `azimuth:(double)azimuth;`

    `@end`


    We will eventually be pulling the Facebook places of some of our social network.
    We will overlay the coordinate with the name of the person and the name of the
    Facebook place. The other properties store the distance, inclination, and azimuth
    of the place we are tracking.


    The method we defined will be used to create a new coordinate instance with the
    specified properties.


    Switch to `ARCoordinate.m` and let''s finish the implementation of this class.
    Add the code from [Listing 11–15](#Chapter11.html#list_11_15) to `ARCoordinate.m`.


