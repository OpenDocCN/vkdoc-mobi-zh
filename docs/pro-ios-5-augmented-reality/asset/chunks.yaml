    \ the next level and work in the gyroscope to create a 360 degree first-person\
    \ augmented-reality shooter game.\n\n# Chapter 8"
  raw: '### Adding a HUD Layer


    In cocos2D games, the “world” is typically bigger than the view the device is
    currently rendering. Because of this, if you were to just render elements on the
    screen, it might appear slightly misaligned depending on where the scene''s focus
    is currently. HUD (heads-up display) layers are commonly used to solve this problem.
    A HUD layer, is another semitransparent layer that lies on top of our action layer
    in our scene. In gaming, we see this quite a bit for showing scores, or lives
    left, and so on.


    Let''s add a HUD layer to our current example to count the number of explosions
    the user has caused. Add a new Objective-C class to the project. The class should
    be a subclass of `NSObject`. Name the class `HUDLayer.mm`. The `.mm` extension
    is not a typo. Using `.mm` for files that have a mix of Objective-C and C++ is
    a recommended convention. It''s easier than telling the compiler to handle a single
    file differently and it lets future developers who read your code know that the
    implementation uses C++.


    Open `HUDLayer.h` and replace it with the code shown in [Listing 7–19](#Chapter07.html#list_7_19).


    **Listing 7–19.** *New HUDLayer.h*


    `#import "cocos2d.h"`

    `@interface HUDLayer : CCLayer {`

    `    CCLabelTTF *_counterLabel;`

    `}`

    `- (void)incrementCounter;`

    `@end`


    We changed the subclass to `CCLayer`, and created a private `CCLabelTTF` object
    to hold a label on the screen. We also created an instance method called `incrementCounter`.
    The touch event will call this method to let the HUD layer know that there has
    been a new touch, and to increment the counter the label is displaying.


    Switch to `HudLayer.mm` in Xcode. First, import the `HelloWorldLayer` header file.
    Next, we''re going to create a local variable to hold the value of the current
    count and create the `init` method for `HUDLayer`. Copy the code from [Listing
    7–20](#Chapter07.html#list_7_20) to `HUDLayer.mm`.


    **Listing 7–20.** *Init Method for HUDLayer.mm*


    `int counter = 0;`

    `- (id)init {`

    `    if ((self = [super init])) {`

    `        _counterLabel = [CCLabelTTF labelWithString:[NSString stringWithFormat:@"Explosions:
    %d", counter] fontName:@"Marker Felt" fontSize:24];`


    `        CGSize size = [[CCDirector sharedDirector] winSize];`


    `        _counterLabel.position =  ccp( size.width * 0.85 , size.height * 0.9
    );`


    `        [self addChild: _counterLabel z:10];`


    `   }`

    `   return self;`

    `}`


    The `init` method uses some of the code from our `HelloWorldLayer` class. We are
    simply creating a new label and adding it to the screen. In this case, we are
    adding it to the top right of the screen with a z-axis value of 10, so any of
    the explosions render behind the label.


    Implement the `incrementCounter` method by adding the code from [Listing 7–21](#Chapter07.html#list_7_21),
    just after the new `init` method.


    **Listing 7–21.** *TheincrementCounter Method*


    `- (void)incrementCounter {`

    `   counter++;`

    `    _counterLabel.string = [NSString stringWithFormat:@"Explosions: %d", counter];`

    `}`


    This method should be simple to follow. We are simply incrementing the counter,
    which will be stored in the HUD layer and not the game layer, and updating the
    label we''ve added to the view already.


    That''s it for the HUD layer. Now, we have to use it from our `HelloWorldLayer`
    layer. Switch to `HelloWorldLayer.h` in Xcode and start by importing the `HUDLayer.h`
    file. Next, declare a private variable called `*_hud` of type `HUDLayer`. Finally,
    we''re going to create a new method called `initWithHUD`. Your new `HelloWorldLayer.h`
    file should look like [Listing 7–22](#Chapter07.html#list_7_22).


    **Listing 7–22.** *New HelloWorldLayer.h*


    `#import "cocos2d.h"`

    `#import "CCTouchDispatcher.h"`

    **`#import "HUDLayer.h"`**


    `// HelloWorldLayer`

    `@interface HelloWorldLayer : CCLayer {`

    **`HUDLayer *_hud;`**

    `}`


    `// returns a CCScene that contains the HelloWorldLayer as the only child`

    `+(CCScene *) scene;`

    **`- (id)initWithHUD:(HUDLayer *)hud;`**

    `@end`


    Switch to `HelloWorldLayer.m` and change your static scene method to look like
    [Listing 7–23](#Chapter07.html#list_7_23).


    **Listing 7–23.** *New Scene Method*


    `+(CCScene *) scene`

    `{`

    `    CCScene *scene = [CCScene node];`


    **`    HUDLayer *hud = [HUDLayer node];`**

    **`    [scene addChild:hud z:1];`**


    `    // ''layer'' is an autorelease object.`

    `    //HelloWorldLayer *layer = [HelloWorldLayer node];`

    **`HelloWorldLayer *layer = [[[HelloWorldLayer alloc] initWithHUD:hud] autorelease];`**


    `    // add layer as a child to scene`

    `    [scene addChild: layer];`


    `    // return the scene`

    `    return scene;`

    `}`


    Let''s discuss the lines in bold. First, we''re declaring a new `HUDLayer` variable
    and adding it to the scene. We commented out the old `init` method and replaced
    it with a method called `initWithHUD` (we haven''t implemented this yet, but don''t
    worry, that''s next).


    Locate the `init` method in `HelloWorldLayer.m`. Change its signature from `init`
    to `initWithHUD:(HUDLayer *)hud`. Replace the method as shown in [Listing 7–24](#Chapter07.html#list_7_24).


    **Listing 7–24.** *Replace init Method with This Code Block*


    `-(id) initWithHUD:(HUDLayer *)hud`

    `{`

    `    // always call "super" init`

    `    // Apple recommends to re-assign "self" with the "super" return value`

    `    if( (self=[super init])) {`

    **`_hud = hud;`**

    `        // create and initialize a Label`

    `        CCLabelTTF *label = [CCLabelTTF labelWithString:@"Hello Augmented World"
    fontName:@"Marker Felt" fontSize:48];`


    `        // ask director the the window size`

    `        CGSize size = [[CCDirector sharedDirector] winSize];`


    `        // position the label on the center of the screen`

    `        label.position =  ccp( size.width /2 , size.height/2 );`


    `        // add the label as a child to this Layer`

    `        [self addChild: label];`


    `            self.isTouchEnabled = YES;`

    `            [[SimpleAudioEngine sharedEngine] preloadEffect:@"explosion.caf"];`

    `    }`

    `    return self;`

    `}`


    Other than the method signature, we added only one line to the method. We set
    the private variable `_hud` to the new `HUDLayer` object we created in the static
    scene method.


    There is one last thing to do before we test the application. Find the `ccTouchEnded`
    method and add the code from [Listing 7–25](#Chapter07.html#list_7_25), just above
    our `NSLog` statement.


    **Listing 7–25.** *Call HUDLayer''s incrementCounter Method*


    `[_hud incrementCounter];`


    That does it. Our new HUD layer should be loaded in our scene and should handle
    the incrementing of the current count label in the top right of the screen. Run
    the project on your device. The sound and particle effects should remain unchanged.
    However, you should see a label in the top showing the number of times you have
    touched the screen. Tap a few times; you should end up with something like [Figure
    7–8](#Chapter07.html#fig_7_8).


    ![Image](images/0708.jpg)


    **Figure 7–8.** *You can now see the HUD layer in the top right of the screen.*


    You can add more complicated HUD layers that handle user input on their own, such
    as buttons or selection options. We won''t be covering that in this book. For
    more information on cocos2D or advanced gaming topics, reference any of the cocos2D
    titles from Apress.


    ### Summary


    In this chapter, I introduced cocos2D. We set up the sample templates and took
    the Hello World project from just a label to a simple augmented-reality game.
    We scaled the camera view to match the aspect ratio of our device in landscape
    mode. Then, we set up event handlers for user touch events.


    Our simple game handles the touch events of the user, creates and starts a particle
    system for visual events, and even has explosion sound effects. We even built
    a separate HUD layer, independent of the gaming layer, to count metrics and display
    them to the user.


    In the next chapter, we''ll take augmented-reality gaming to the next level and
    work in the gyroscope to create a 360 degree first-person augmented-reality shooter
    game.


