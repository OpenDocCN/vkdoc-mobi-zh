    }\n\n@property (nonatomic, retain) UIAccelerometer *accelerometer;\n\n@property\
    \ (nonatomic, retain) IBOutlet UILabel *xLabel;\n@property (nonatomic, retain)\
    \ IBOutlet UILabel *yLabel;\n@property (nonatomic, retain) IBOutlet UILabel *zLabel;\n\
    \n@property (nonatomic, retain) IBOutlet UIProgressView *xProgressView;\n@property\
    \ (nonatomic, retain) IBOutlet UIProgressView *yProgressView;\n@property (nonatomic,\
    \ retain) IBOutlet UIProgressView *zProgressView;\n\n@end\n```\n\n让我们更新 `FirstViewController.m`\
    \ 文件，然后逐步了解新代码。在 Xcode 中切换到 `FirstViewController.m`，并添加代码清单 4-2 中的代码。\n\n**代码清单\
    \ 4-2.** *更新后的 FirstViewController.m*\n\n```\n// 在 @implementation 之后\n@synthesize\
    \ xLabel, yLabel, zLabel, xProgressView, yProgressView, zProgressView, accelerometer;\n\
    // 替换自动生成代码中的现有 dealloc 方法\n- (void)dealloc\n{\n    [xLabel release];\n    xLabel\
    \ = nil;\n    [yLabel release];\n    yLabel = nil;\n    [zLabel release];\n  \
    \  zLabel = nil;\n    [xProgressView release];\n    xProgressView = nil;\n   \
    \ [yProgressView release];\n    yProgressView = nil;\n    [zProgressView release];\n\
    \    zProgressView = nil;\n    [accelerometer release];\n    accelerometer = nil;\n\
    \    [super dealloc];\n}\n```\n\n从顶部开始，我们声明了一些 UI 元素，用于显示来自加速计的实时读数。我们将使用三个标签和三个进度条，每个对应加速计的一个轴。图\
    \ 4-1 展示了 X、Y 和 Z 坐标轴。\n\n![图示](img/0401.jpg)\n\n**图 4-1.** *加速计使用 X、Y 和 Z 坐标轴。*\n\
    \n在 Xcode 中打开 `FirstView.xib`。将标签和进度条元素添加到界面画布上。你应该会看到类似图 4-2 所示的内容。\n\n![图示](img/0402.jpg)\n\
    \n**图 4-2.** *为加速计读数设置 XIB 文件。*\n\n为简单起见，我们按水平顺序将这三组值分配给输出口。X 在顶部，Z 在底部。由于 Xcode\
    \ 4.2 对某些人来说还比较新，我们再回顾一下。要将输出口分配给头文件中的属性，请在按住 Ctrl 键的同时，从 **File's Owner** 图标拖拽到画布上的输出口。会弹出一个对话框，显示可分配的属性。选择相应的输出口。图\
    \ 4-3 展示了一个示例。\n\n![图示](img/0403.jpg)\n\n**图 4-3.** *将 IBOutlet 链接到 FirstViewController.h\
    \ 中的属性。*\n\n对每个 `UILabel` 输出口和 `UIProgressView` 组件重复此过程。\n\n我们通过 `UIAccelerometer`\
    \ 类访问加速计。这个类使用了与第 3 章定位服务相同的委托模式。这个类使用一个共享的 `UIAccelerometer` 单例，不能直接访问。因此，你会注意到在这些示例中处理内存的方式略有不同（更具体地说，是我们处理硬件消息订阅的方式）。\n\
    \n### UIAccelerometerDelegate 类\n\n在开始监控加速计的更新之前，我们必须将此类指定为 `UIAccelerometerDelegate`。相应地更新\
    \ `FirstViewController.h`。切换回 `FirstViewController.m`，并添加代码清单 4-3 中的方法。\n\n**代码清单\
    \ 4-3.** *UIAccelerometerDelegate 类的委托方法*\n\n```\n- (void)accelerometer:(UIAccelerometer\
    \ *)accelerometer didAccelerate:(UIAcceleration *)acceleration {\n    xLabel.text\
    \ = [NSString stringWithFormat:@\"%@%f\", @\"X: \", acceleration.x];\n    yLabel.text\
    \ = [NSString stringWithFormat:@\"%@%f\", @\"Y: \", acceleration.y];\n    zLabel.text\
    \ = [NSString stringWithFormat:@\"%@%f\", @\"Z: \", acceleration.z];\n\n    xProgressView.progress\
    \ = ABS(acceleration.x);\n    yProgressView.progress = ABS(acceleration.y);\n\
    \    zProgressView.progress = ABS(acceleration.z);\n}\n```\n\n每当加速计在其更新间隔内测量到新值时，就会调用委托类的\
    \ `didAccelerate` 方法。我们来看看代码。第一组方法为三个 `UILabel` 的 `text` 属性格式化一个 `NSString` 值。这个字符串值由每个特定轴的加速度值填充。第二段代码根据相同的值设置\
    \ `UIProgressView` 输出口的数值。你会注意到，我们还把值设置成了测量值的绝对值（`ABS`）。这是因为进度条无法显示负值。如果有负的测量值，你会从\
    \ `UILabel` 上看到。\n\n在运行项目之前，我们必须设置加速计的更新间隔并为其指定一个委托。正如我之前提到的，`UIAccelerometer`\
    \ 类是一个单例类。我们需要创建一个对 `sharedAccelerometer` 对象的引用来开始接收测量值。取消注释 `viewDidLoad` 方法并进行调整，如代码清单\
    \ 4-4 所示。\n\n**代码清单 4-4.** *新的 viewDidLoad 方法*\n\n```\n- (void)viewDidLoad\n{\n\
    \    accelerometer = [UIAccelerometer sharedAccelerometer];\n    accelerometer.updateInterval\
    \ = .5;\n    accelerometer.delegate = self;\n\n    [super viewDidLoad];\n}\n```\n\
    \n此方法中的第一行将我们的 `UIAccelerometer` 对象分配给 `sharedAccelerometer` 对象。接下来，你选择 `updateInterval`，单位是秒。我选择了\
    \ .5 秒（每秒两次）。你可以随意调整并测试响应时间。最后，将 `delegate` 设置为 `self`，这样我们就能接收测量值了。\n\n确保你已连接物理设备，并在\
    \ Xcode 的 Scheme 下拉菜单中选中它。在设备上运行项目。你应该会看到类似图 4-4 所示的内容。\n\n![图示](img/0404.jpg)\n\
    \n**图 4-4.** *获取 UIAccelerometer 的 X、Y 和 Z 测量值。*\n\n在测试应用程序时，尝试几种不同的场景。尝试向下用力甩动设备，观察轴上的快速变化。尝试将设备水平侧放，这会使\
    \ X 轴达到最大值（负值或正值取决于侧放方向）。接下来，将设备竖直放置。此时 Y 轴应达到满量程，而其他读数趋近于零。将设备平放，屏幕朝上。你应该会看到\
    \ Z 轴接近 1.0，而其他两个轴的测量值趋近于零。熟悉设备的方向。在本书后续内容中，我们需要将这些类型的读数整合到我们的应用程序中。\n"
- fmt: "### Shake Detection\n\nYou can use the accelerometer to measure action from\
    \ the user as well. Some popular iOS applications on the App Store, such as Facebook,\
    \ use shake detection for refresh actions. Other native apps, such as messaging,\
    \ use shake detection as a method for the user to cancel an action.\n\nReturn\
    \ to the `didAccelerate` delegate method of `FirstViewController.m` and add the\
    \ code from [Listing 4–5](#Chapter04.html#list_4_5) to the bottom of that method.\n\
    \n**Listing 4–5.** *Add to `didAccelerate` Delegate Method*\n\n```\ndouble const\
    \ kThreshold = 2.0; // 2Gs is typical to measure shaking\n    if (   ABS(acceleration.x)\
    \ > kThreshold\n        || ABS(acceleration.y) > kThreshold\n        || ABS(acceleration.z)\
    \ > kThreshold) {\n        // if shake is detected across any axis\n        NSLog(@\"\
    Shake Detected!\"); // Log it!\n    }\n```\n\nFirst, we are defining a constant\
    \ to serve as a threshold for shake detection. If any axis measures vibration\
    \ greater than 2Gs, the method will log our message to the console. Run the updated\
    \ project on your device and shake the device when the application starts. In\
    \ the Xcode console, you should see something similar to what is shown in [Figure\
    \ 4–5](#Chapter04.html#fig_4_5).\n\n![Image](images/0405.jpg)\n\n**Figure 4–5.**\
    \ *Detect a shake from the user.*\n\nIn [Chapter 5](#Chapter05.html#ch5), we'll\
    \ discuss sound and user feedback, and show you how to force the device to vibrate.\
    \ This chapter is focused on gathering sensor data.\n\n### Low-Pass Filtering\n\
    \nOne of the techniques we'll be using in the examples is called low-pass filtering.\
    \ Basically, as we receive accelerometer data, we remove everything except gravity\
    \ readings. This will help us keep the orientation of 3D objects we're putting\
    \ in the AR view. [Listing 4–6](#Chapter04.html#list_4_6) shows sample code that\
    \ sets up a low-pass filter.\n\nWe'll cover this subject in more detail when we\
    \ get to 3D objects and augmented reality.\n\n**Listing 4–6.** *Setting Up a Low-Pass\
    \ Filter*\n\n```\naccel[0] = acceleration.x * kFilteringFactor + accel[0] * (1.0\
    \ - kFilteringFactor);\naccel[1] = acceleration.y * kFilteringFactor + accel[1]\
    \ * (1.0 - kFilteringFactor);\naccel[2] = acceleration.z * kFilteringFactor +\
    \ accel[2] * (1.0 - kFilteringFactor);\n```\n\n### Using the Gyroscope\n\nThe\
    \ gyroscope is actually a bit easier to read. There's no need to set up a delegate\
    \ class or methods to handle updates. After you start the gyroscope, you can simply\
    \ request the measurements through the `CMMotionManager` class. This class acts\
    \ as a gateway to the device's hardware.\n\nLet's use the second tab in our demo\
    \ project to measure the gyroscope. Open Xcode, select `SecondView.xib` and set\
    \ up the canvas as shown in [Figure 4–6](#Chapter04.html#fig_4_6). We'll be visualizing\
    \ the gyroscope based on its three `attitude` attributes. These are `roll`, `pitch`,\
    \ and `yaw`.\n\n![Image](images/0406.jpg)\n\n**Figure 4–6.** *Set up the canvas\
    \ for monitoring the gyroscope.*\n\nBefore we start connecting these outlets,\
    \ we must add a new framework to our project. Interacting with the gyroscope requires\
    \ the Core Motion Framework. Add that to the project by selecting the project\
    \ name in your Xcode **Project Navigator** and adding the framework in the **Link\
    \ Binary With Libraries** section of the **Build Phases** tab of your application's\
    \ target. Open `SecondViewController.h` and add the properties we'll need to send\
    \ information to the `IBOutlet`s we just created. Use the code from [Listing 4–7](#Chapter04.html#list_4_7)\
    \ as a reference.\n\n**Listing 4–7.** *New `SecondViewController.h`*\n\n```\n\
    #import <UIKit/UIKit.h>\n#import <CoreMotion/CoreMotion.h>\n\n@interface SecondViewController\
    \ : UIViewController {\n    CMMotionManager *motionManager;\n\n    UILabel *rollLabel;\n\
    \    UILabel *pitchLabel;\n    UILabel *yawLabel;\n\n    UIProgressView *rollProgressView;\n\
    \    UIProgressView *pitchProgressView;\n    UIProgressView *yawProgressView;\n\
    \n}\n\n@property (nonatomic, retain) CMMotionManager *motionManager;\n\n@property\
    \ (nonatomic, retain) IBOutlet UILabel *rollLabel;\n@property (nonatomic, retain)\
    \ IBOutlet UILabel *pitchLabel;\n@property (nonatomic, retain) IBOutlet UILabel\
    \ *yawLabel;\n\n@property (nonatomic, retain) IBOutlet UIProgressView *rollProgressView;\n\
    @property (nonatomic, retain) IBOutlet UIProgressView *pitchProgressView;\n@property\
    \ (nonatomic, retain) IBOutlet UIProgressView *yawProgressView;\n\n- (IBAction)readGyroscope;\n\
    \n@end\n```\n\nLet's walk through this code quickly, before we get too far ahead.\
    \ From the top, you'll see our `import` statement for the Core Motion Framework,\
    \ which we just added to our application. Next, in the `interface` block, you'll\
    \ notice we aren't nominating this class as any sort of delegate, as we did with\
    \ the accelerometer. The gyroscope class acts as an interface gateway to the hardware\
    \ sensors. It doesn't report to a delegate method like the accelerometer class.\n\
    \nThe `UILabel` and `UIProgressBar` properties should come as no surprise. They\
    \ are the same as those used in our accelerometer example. However, we have a\
    \ new property in this sample. `CMMotionManager` is the class that we will be\
    \ using to interface to the gyroscope.\n\nFinally, we declare an `IBAction` method\
    \ for our button. Instead of sitting on a delegate method (as we did with the\
    \ accelerometer), we'll be manually invoking a method to query the current measurements\
    \ of the gyroscope.\n\nSwitch to `SecondViewController.m` in Xcode and `synthesize`\
    \ our new properties; don't forget to update your `dealloc` method to release\
    \ the properties and set them to `nil`, as shown in [Listing 4–8](#Chapter04.html#list_4_8).\n\
    \n**Listing 4–8.** *Synthesize and Release the New Properties*\n\n```\n// after\
    \ @implementation\n@synthesize motionManager;\n@synthesize rollLabel, rollProgressView,\
    \ pitchLabel, pitchProgressView, yawLabel, yawProgressView;\n\n// new dealloc\n\
    - (void)dealloc\n{\n    [motionManager release];\n    motionManager = nil;\n \
    \   [rollLabel release];\n    rollLabel = nil;\n    [rollProgressView release];\n\
    \    rollProgressView = nil;\n    [pitchLabel release];\n    pitchLabel = nil;\n\
    \    [pitchProgressView release];\n    pitchProgressView = nil;\n    [yawLabel\
    \ release];\n    yawLabel = nil;\n    [yawProgressView release];\n    yawProgressView\
    \ = nil;\n    [super dealloc];\n}\n```\n\nUncomment the `viewDidLoad` method and\
    \ update it, as shown in [Listing 4–9](#Chapter04.html#list_4_9).\n\n**Listing\
    \ 4–9.** *Uncomment and Update the `viewDidLoad` Method*\n\n```\n- (void)viewDidLoad\n\
    {\n    self.motionManager = [[[CMMotionManager alloc] init] autorelease];\n  \
    \  motionManager.deviceMotionUpdateInterval = 1.0/60.0;\n    if (motionManager.isDeviceMotionAvailable)\
    \ {\n        [motionManager startDeviceMotionUpdates];\n    }\n    [super viewDidLoad];\n\
    }\n```\n\nFirst, we set the `motionManager` property to a new instance of the\
    \ `CMMotionManager` class. Next, we set an interval for updates. Finally, we start\
    \ updates if the motion manager is available. If you recall from [Chapter 2](#Chapter02.html#ch2)\
    \ where we validated the availability of sensors, this will look familiar. If\
    \ you skipped [Chapter 2](#Chapter02.html#ch2), just be aware that it's good practice\
    \ to validate that the sensor is actually available before trying to access it."
  raw: '##### Shake Detection


    You can use the accelerometer to measure action from the user as well. Some popular
    iOS applications on the App Store, such as Facebook, use shake detection for refresh
    actions. Other native apps, such as messaging, use shake detection as a method
    for the user to cancel an action.


    Return to the `didAccelerate` delegate method of  `FirstViewController.m` and
    add the code from [Listing 4–5](#Chapter04.html#list_4_5) to the bottom of that
    method.


    **Listing 4–5.** *Add to didAccelerate Delegate Method*


    `double const kThreshold = 2.0; // 2Gs is typical to measure shaking`

    `    if (   ABS(acceleration.x) > kThreshold`

    `        || ABS(acceleration.y) > kThreshold`

    `        || ABS(acceleration.z) > kThreshold) {`

    `        // if shake is detected across any axis`

    `        NSLog(@"Shake Detected!"); // Log it!`

    `    }`


    First, we are defining a constant to serve as a threshold for shake detection.
    If any axis measures vibration greater than 2Gs, the method will log our message
    to the console. Run the updated project on your device and shake the device when
    the application starts. In the Xcode console, you should see something similar
    to what is shown in [Figure 4–5](#Chapter04.html#fig_4_5).


    ![Image](images/0405.jpg)


    **Figure 4–5.** *Detect a shake from the user.*


    In [Chapter 5](#Chapter05.html#ch5), we''ll discuss sound and user feedback, and
    show you how to force the device to vibrate. This chapter is focused on gathering
    sensor data.


    #### Low-Pass Filtering


    One of the techniques we''ll be using in the examples is called low-pass filtering.
    Basically, as we receive accelerometer data, we remove everything except gravity
    readings. This will help us keep the orientation of 3D objects we''re putting
    in the AR view. [Listing 4–6](#Chapter04.html#list_4_6) shows sample code that
    sets up a low-pass filter.


    We''ll cover this subject in more detail when we get to 3D objects and augmented
    reality.


    **Listing 4–6.** *Setting Up a Low-Pass Filter*


    `accel[0] = acceleration.x * kFilteringFactor + accel[0] * (1.0 - kFilteringFactor);`

    `accel[1] = acceleration.y * kFilteringFactor + accel[1] * (1.0 - kFilteringFactor);`

    `accel[2] = acceleration.z * kFilteringFactor + accel[2] * (1.0 - kFilteringFactor);`


    #### Using the Gyroscope


    The gyroscope is actually a bit easier to read. There''s no need to set up a delegate
    class or methods to handle updates. After you start the gyroscope, you can simply
    request the measurements through the `CMMotionManager` class. This class acts
    as a gateway to the device''s hardware.


    Let''s use the second tab in our demo project to measure the gyroscope. Open Xcode,
    select `SecondView.xib` and set up the canvas as shown in [Figure 4–6](#Chapter04.html#fig_4_6).
    We''ll be visualizing the gyroscope based on its three `attitude` attributes.
    These are `roll`, `pitch`, and `yaw`.


    ![Image](images/0406.jpg)


    **Figure 4–6.** *Set up the canvas for monitoring the gyroscope.*


    Before we start connecting these outlets, we must add a new framework to our project.
    Interacting with the gyroscope requires the Core Motion Framework. Add that to
    the project by selecting the project name in your Xcode **Project Navigator**
    and adding the framework in the **Link Binary With Libraries** section of the
    **Build Phases** tab of your application''s target. Open `SecondViewController.h`
    and add the properties we''ll need to send information to the `IBOutlet`s we just
    created. Use the code from [Listing 4–7](#Chapter04.html#list_4_7) as a reference.


    **Listing 4–7.** *New SecondViewController.h*


    `#import <UIKit/UIKit.h>`

    `#import <CoreMotion/CoreMotion.h>`


    `@interface SecondViewController : UIViewController {`

    `    CMMotionManager *motionManager;`


    `    UILabel *rollLabel;`

    `    UILabel *pitchLabel;`

    `    UILabel *yawLabel;`


    `    UIProgressView *rollProgressView;`

    `    UIProgressView *pitchProgressView;`

    `    UIProgressView *yawProgressView;`


    `}`


    `@property (nonatomic, retain) CMMotionManager *motionManager;`


    `@property (nonatomic, retain) IBOutlet UILabel *rollLabel;`

    `@property (nonatomic, retain) IBOutlet UILabel *pitchLabel;`

    `@property (nonatomic, retain) IBOutlet UILabel *yawLabel;`


    `@property (nonatomic, retain) IBOutlet UIProgressView *rollProgressView;`

    `@property (nonatomic, retain) IBOutlet UIProgressView *pitchProgressView;`

    `@property (nonatomic, retain) IBOutlet UIProgressView *yawProgressView;`


    `- (IBAction)readGyroscope;`


    `@end`


    Let''s walk through this code quickly, before we get too far ahead. From the top,
    you''ll see our `import` statement for the Core Motion Framework, which we just
    added to our application. Next, in the `interface` block, you''ll notice we aren''t
    nominating this class as any sort of delegate, as we did with the accelerometer.
    The gyroscope class acts as an interface gateway to the hardware sensors. It doesn''t
    report to a delegate method like the accelerometer class.


    The `UILabel` and `UIProgressBar` properties should come as no surprise. They
    are the same as those used in our accelerometer example. However, we have a new
    property in this sample. `CMMotionManager` is the class that we will be using
    to interface to the gyroscope.


    Finally, we declare an `IBAction` method for our button. Instead of sitting on
    a delegate method (as we did with the accelerometer), we''ll be manually invoking
    a method to query the current measurements of the gyroscope.


    Switch to `SecondViewController.m` in Xcode and `synthesize` our new properties;
    don''t forget to update your `dealloc` method to release the properties and set
    them to `nil`, as shown in [Listing 4–8](#Chapter04.html#list_4_8).


    **Listing 4–8.** *Synthesize and Release the New Properties*


    `// after @implementation`

    `@synthesize motionManager;`

    `@synthesize rollLabel, rollProgressView, pitchLabel, pitchProgressView, yawLabel,
    yawProgressView;`


    `// new dealloc`

    `- (void)dealloc`

    `{`

    `    [motionManager release];`

    `    motionManager = nil;`

    `    [rollLabel release];`

    `    rollLabel = nil;`

    `    [rollProgressView release];`

    `    rollProgressView = nil;`

    `    [pitchLabel release];`

    `    pitchLabel = nil;`

    `    [pitchProgressView release];`

    `    pitchProgressView = nil;`

    `    [yawLabel release];`

    `    yawLabel = nil;`

    `    [yawProgressView release];`

    `    yawProgressView = nil;`

    `    [super dealloc];`

    `}`


    Uncomment the `viewDidLoad` method and update it, as shown in [Listing 4–9](#Chapter04.html#list_4_9).


    **Listing 4–9.** *Uncomment and Update the viewDidLoad Method*


    `- (void)viewDidLoad`

    `{`

    `    self.motionManager = [[[CMMotionManager alloc] init] autorelease];`

    `    motionManager.`**`deviceMotionUpdateInterval`** `= 1.0/60.0;`

    `    if (motionManager.isDeviceMotionAvailable) {`

    `[motionManager` **`startDeviceMotionUpdates`**`];`

    `    }`

    `    [super viewDidLoad];`

    `}`


    First, we set the `motionManager` property to a new instance of the `CMMotionManager`
    class. Next, we set an interval for updates. Finally, we start updates if the
    motion manager is available. If you recall from [Chapter 2](#Chapter02.html#ch2)
    where we validated the availability of sensors, this will look familiar. If you
    skipped [Chapter 2](#Chapter02.html#ch2), just be aware that it''s good practice
    to validate that the sensor is actually available before trying to access it.'
  trans: "\n### 摇动检测\n\n你也可以使用加速度计来测量用户的动作。App Store 上一些流行的 iOS 应用（如 Facebook）会利用摇动检测实现刷新操作。而其他原生应用（如短信）则将摇动检测作为用户取消操作的一种方式。\n\
    \n返回到 `FirstViewController.m` 的 `didAccelerate` 委托方法中，将代码清单 4-5 中的代码添加至该方法底部。\n\
    \n**代码清单 4-5.** *添加到 `didAccelerate` 委托方法*\n\n```\ndouble const kThreshold = 2.0;\
    \ // 2Gs 是检测摇动的典型阈值\n    if (   ABS(acceleration.x) > kThreshold\n        || ABS(acceleration.y)\
    \ > kThreshold\n        || ABS(acceleration.z) > kThreshold) {\n        // 如果检测到任意轴有摇动\n\
    \        NSLog(@\"检测到摇动！\"); // 记录日志！\n    }\n```\n\n首先，我们定义一个常量作为摇动检测的阈值。如果任一轴测得的震动幅度超过\
    \ 2Gs，该方法将在控制台记录我们设定的消息。在设备上运行更新后的项目，并在应用启动时摇动设备。在 Xcode 控制台中，你应该能看到类似图 4-5 所示的内容。\n\
    \n![图片](img/0405.jpg)\n\n**图 4-5.** *检测用户的摇动操作。*\n\n在第 5 章中，我们将讨论声音和用户反馈，并展示如何使设备振动。本章主要聚焦于收集传感器数据。\n\
    \n### 低通滤波\n\n我们将在示例中使用的一种技术称为低通滤波。基本上，当接收到加速度计数据时，我们会过滤掉除重力读数之外的所有数据。这有助于我们在增强现实视图中保持三维物体的朝向。代码清单\
    \ 4-6 展示了设置低通滤波器的示例代码。\n\n我们将在讨论三维物体和增强现实时更详细地介绍这一主题。\n\n**代码清单 4-6.** *设置低通滤波器*\n\
    \n```\naccel[0] = acceleration.x * kFilteringFactor + accel[0] * (1.0 - kFilteringFactor);\n\
    accel[1] = acceleration.y * kFilteringFactor + accel[1] * (1.0 - kFilteringFactor);\n\
    accel[2] = acceleration.z * kFilteringFactor + accel[2] * (1.0 - kFilteringFactor);\n\
    ```\n\n### 使用陀螺仪\n\n实际上，读取陀螺仪的数据要稍微简单一些。无需设置委托类或委托方法来处理更新。启动陀螺仪后，你可以直接通过 `CMMotionManager`\
    \ 类请求测量数据。该类充当设备硬件的接口网关。\n\n现在，让我们使用演示项目中的第二个标签页来测量陀螺仪。打开 Xcode，选择 `SecondView.xib`，并按图\
    \ 4-6 所示设置画布。我们将根据陀螺仪的三个 `attitude` 属性（即 `roll`、`pitch` 和 `yaw`）进行可视化显示。\n\n![图片](img/0406.jpg)\n\
    \n**图 4-6.** *设置用于监测陀螺仪的画布。*\n\n在连接这些输出口之前，我们必须向项目添加一个新的框架。与陀螺仪交互需要使用 Core Motion\
    \ 框架。通过在你的 Xcode **项目导航器**中选择项目名称，并在应用目标的 **Build Phases** 标签页的 **Link Binary\
    \ With Libraries** 部分添加该框架，即可将其添加到项目中。打开 `SecondViewController.h`，并添加属性，用于将信息发送到我们刚刚创建的\
    \ `IBOutlet`。请参考代码清单 4-7 中的代码。\n\n**代码清单 4-7.** *新的 `SecondViewController.h`*\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <CoreMotion/CoreMotion.h>\n\n@interface\
    \ SecondViewController : UIViewController {\n    CMMotionManager *motionManager;\n\
    \n    UILabel *rollLabel;\n    UILabel *pitchLabel;\n    UILabel *yawLabel;\n\n\
    \    UIProgressView *rollProgressView;\n    UIProgressView *pitchProgressView;\n\
    \    UIProgressView *yawProgressView;\n\n}\n\n@property (nonatomic, retain) CMMotionManager\
    \ *motionManager;\n\n@property (nonatomic, retain) IBOutlet UILabel *rollLabel;\n\
    @property (nonatomic, retain) IBOutlet UILabel *pitchLabel;\n@property (nonatomic,\
    \ retain) IBOutlet UILabel *yawLabel;\n\n@property (nonatomic, retain) IBOutlet\
    \ UIProgressView *rollProgressView;\n@property (nonatomic, retain) IBOutlet UIProgressView\
    \ *pitchProgressView;\n@property (nonatomic, retain) IBOutlet UIProgressView *yawProgressView;\n\
    \n- (IBAction)readGyroscope;\n\n@end\n```\n\n在我们深入之前，快速过一下这段代码。从顶部开始，你会看到我们为刚刚添加到应用中的\
    \ Core Motion 框架添加的 `import` 语句。接下来，在 `interface` 块中，你会注意到我们并没有像处理加速度计那样将此类指定为任何委托。陀螺仪类充当硬件传感器的接口网关，它不像加速度计类那样向委托方法报告。\n\
    \n`UILabel` 和 `UIProgressBar` 属性应该不足为奇，它们与加速度计示例中使用的相同。不过，在这个示例中我们有一个新属性。`CMMotionManager`\
    \ 是我们将用来与陀螺仪交互的类。\n\n最后，我们为按钮声明了一个 `IBAction` 方法。我们不会像处理加速度计那样依赖委托方法，而是手动调用一个方法来查询陀螺仪的当前测量值。\n\
    \n在 Xcode 中切换到 `SecondViewController.m`，并 `synthesize` 我们的新属性；别忘了更新你的 `dealloc`\
    \ 方法以释放这些属性并将其设置为 `nil`，如代码清单 4-8 所示。\n\n**代码清单 4-8.** *合成并释放新属性*\n\n```\n// 在\
    \ @implementation 之后\n@synthesize motionManager;\n@synthesize rollLabel, rollProgressView,\
    \ pitchLabel, pitchProgressView, yawLabel, yawProgressView;\n\n// 新的 dealloc 方法\n\
    - (void)dealloc\n{\n    [motionManager release];\n    motionManager = nil;\n \
    \   [rollLabel release];\n    rollLabel = nil;\n    [rollProgressView release];\n\
    \    rollProgressView = nil;\n    [pitchLabel release];\n    pitchLabel = nil;\n\
    \    [pitchProgressView release];\n    pitchProgressView = nil;\n    [yawLabel\
    \ release];\n    yawLabel = nil;\n    [yawProgressView release];\n    yawProgressView\
    \ = nil;\n    [super dealloc];\n}\n```\n\n取消注释 `viewDidLoad` 方法并更新它，如代码清单 4-9\
    \ 所示。\n\n**代码清单 4-9.** *取消注释并更新 `viewDidLoad` 方法*\n\n```\n- (void)viewDidLoad\n\
    {\n    self.motionManager = [[[CMMotionManager alloc] init] autorelease];\n  \
    \  motionManager.deviceMotionUpdateInterval = 1.0/60.0;\n    if (motionManager.isDeviceMotionAvailable)\
    \ {\n        [motionManager startDeviceMotionUpdates];\n    }\n    [super viewDidLoad];\n\
    }\n```\n\n首先，我们将 `motionManager` 属性设置为 `CMMotionManager` 类的一个新实例。接着，我们设置更新的时间间隔。最后，如果运动管理器可用，我们就开始更新。如果你还记得第\
    \ 2 章中验证传感器可用性的内容，这里看起来会很熟悉。如果你跳过了第 2 章，只需注意，在尝试访问传感器之前先验证其是否可用是一种良好的实践。\n"
- fmt: "# Attitude\n\nBefore we update the UI with our values, let's just log them\
    \ to the console and make sure we're able to access the hardware successfully.\
    \ Add the `IBAction` method we declared in our header by copying the code from\
    \ [Listing 4–10](#Chapter04.html#list_4_10) to `SecondViewController.m`.\n\n**Listing\
    \ 4–10.** *Add the IBAction Method—readGyroscope*\n\n```\n- (void)readGyroscope\
    \ {\n    CMDeviceMotion *currentDeviceMotion = motionManager.deviceMotion;\n \
    \   CMAttitude *currentAttitude = currentDeviceMotion.attitude;\n\n    NSLog(@\"\
    Attitude: %@\", currentAttitude);\n}\n```\n\nThis method creates a `CMDeviceMotion`\
    \ object, and reads the `CMAttitude` value from the gyroscope. Switch to `SecondView.xib`\
    \ and set the `UIButton`'s `IBAction` to the `readGyroscope` method. The `CMAttitude`\
    \ reading has a collection of key parameters (see [Table 4–1](#Chapter04.html#tab_4_1))\
    \ that we'll be using in our sample applications later in the book.\n\n![Image](images/t0401.jpg)\n\
    \nRun the application on a physical device. Navigate to the second tab and click\
    \ the Test button. Rotate the device in different directions and continue to test\
    \ the values. In the Xcode console, you should see log output resembling [Listing\
    \ 4–11](#Chapter04.html#list_4_11).\n\n**Listing 4–11.** *NSLog Output from Logging\
    \ Attitude of Device*\n\n```\n2011-07-08 20:38:31.955 iOS_AR_Ch4_Sensors[6144:707]\
    \ Attitude: Pitch: -41.931169, Roll:\n-57.704060, Yaw: -177.801492 @ 0.000000\n\
    2011-07-08 20:38:33.572 iOS_AR_Ch4_Sensors[6144:707] Attitude: Pitch: -17.880685,\
    \ Roll:\n-62.436956, Yaw: 167.555800 @ 0.000000\n2011-07-08 20:38:49.238 iOS_AR_Ch4_Sensors[6144:707]\
    \ Attitude: Pitch: 28.940916, Roll:\n11.359928, Yaw: -45.087161 @ 0.000000\n```\n\
    \nThe `Attitude` is the combination of `Pitch`, `Roll`, and `Yaw` for the device.\
    \ If we were to access these properties individually, you would get the separate\
    \ values in radians. Typically, we'll have to convert these to degrees for basic\
    \ augmented-reality purposes, such as knowing the viewing angle and rotation of\
    \ the device. Add the code from [Listing 4–12](#Chapter04.html#list_4_12) to the\
    \ end of the `readGyroscope` method.\n\n**Listing 4–12.** *Add to End of readGyroscope\
    \ Method*\n\n```\n    rollLabel.text = [NSString stringWithFormat:@\"ROLL: %f\"\
    , currentAttitude.roll];\n    rollProgressView.progress = ABS(currentAttitude.roll);\n\
    \    pitchLabel.text = [NSString stringWithFormat:@\"PITCH: %f\", currentAttitude.pitch];\n\
    \    pitchProgressView.progress = ABS(currentAttitude.pitch);\n    yawLabel.text\
    \ = [NSString stringWithFormat:@\"YAW: %f\", currentAttitude.yaw];\n    yawProgressView.progress\
    \ = ABS(currentAttitude.yaw);\n```\n\nThe code block we just added should look\
    \ familiar. We are just setting the visible values in our UI elements for quick\
    \ debugging. Run the application. You should see something similar to what we\
    \ see in [Figure 4–7](#Chapter04.html#fig_4_7).\n\nYou can see that the values\
    \ that were shown in the Xcode console aren't exactly matching up with what we're\
    \ seeing on the screen. The formatting is the same but we're now looking at the\
    \ radian measurement for rotation on each individual axis.\n\nBefore we get to\
    \ our examples later in the book, we'll talk about a framework called cocos2D.\
    \ We'll be using the framework for animation and 2D gaming features. cocos2D provides\
    \ some very simple functions to convert radians to degrees.\n\n![Image](images/0407.jpg)\n\
    \n**Figure 4–7.** *Read gyro data from CMMotionManager.*\n\nThe motion manager\
    \ blends the accelerometer and gyroscope data together automatically. One of the\
    \ readings that is missing from this approach is the rate of rotation. Let's put\
    \ together a quick sample to demonstrate how to gather this metric and coordinate\
    \ it to an element in our UI. This will be a common task in augmented-reality\
    \ programming. In most cases, when the phone is rotated, you will want to keep\
    \ items that you've overlaid on the view in the correct orientation.\n\n# Rate\
    \ of Rotation\n\nOpen `SecondView.xib` in Xcode. Add a `UIImageView` object above\
    \ the content we already have on the view. Assign an image to the element that\
    \ is more horizontally oriented. The GitHub repository for this chapter has an\
    \ image of a fighter jet included, which you may use. Define the `UIImageView`\
    \ in your header file and synthesize/release the object in the implementation\
    \ file. Add the code from [Listing 4–13](#Chapter04.html#list_4_13) to the bottom\
    \ of the `readGyroscope` method.\n\n**Listing 4–13.** *Add to End of readGyroscope\
    \ Method*\n\n```\nfloat rotation;\n    float rate = motionManager.gyroData.rotationRate.z;\n\
    \        if (fabs(rate) > .2) {\n            float direction = rate > 0 ? 1 :\
    \ -1;\n            rotation += direction * M_PI/90.0;\nimageView.transform = CGAffineTransformMakeRotation(rotation);\n\
    \            NSLog(@\"Rotation: %f\", rotation);\n        }\n```\n\nThis method\
    \ will use the `gyroData` property of our motion manager to get the rotation rate\
    \ of the Z-axis. There is a new function in use now to rotate the image according\
    \ to the rotation of the Z-axis. We'll look more at various approaches to this\
    \ type of task in our in-depth examples later in the book. Of course, we haven't\
    \ started actually monitoring the gyroscope, so we need to set that up before\
    \ we'll see any useful results. Update your `viewDidLoad` method as shown in [Listing\
    \ 4–14](#Chapter04.html#list_4_14).\n\n**Listing 4–14.** *Updated viewDidLoad\
    \ Method*\n\n```\n- (void)viewDidLoad\n{\n    self.motionManager = [[[CMMotionManager\
    \ alloc] init] autorelease];\n    motionManager.deviceMotionUpdateInterval = 1.0/60.0;\n\
    \n    if (motionManager.isDeviceMotionAvailable) {\n        [motionManager startDeviceMotionUpdates];\n\
    \        [motionManager startGyroUpdates];\n    }\n    [super viewDidLoad];\n\
    }\n```\n\nBefore we get too far from this point, it is important to note that\
    \ this code does not stop listening to the gyroscope readings. It's important\
    \ to implement a routine to start and stop monitoring sensor readings appropriately.\n\
    \nGo ahead and run the project. You'll find it a bit difficult to test. We are\
    \ looking to validate that if we increase the rate of rotation significantly enough\
    \ respective to the Z-axis that the image will rotate to the same angle as the\
    \ Z-axis when we press the Test button. The main difficulty here is that we have\
    \ to press the button and move the device around at the same time, which results\
    \ in only minor changes in rate of rotation, as shown in [Figure 4–8](#Chapter04.html#fig_4_8).\n\
    \n![Image](images/0408.jpg)\n\n**Figure 4–8.** *Test the manual readings of gyro\
    \ data (notice a slight rolling effect of the image).*\n\nInstead of manually\
    \ retrieving the readings in response to the click of the button, we could use\
    \ the `NSTimer` class to set up an interval and call back to another method.\n\
    \nRefactor the code block from [Listing 4–13](#Chapter04.html#list_4_13) into\
    \ a new method, as shown in [Listing 4–15](#Chapter04.html#list_4_15).\n\n**Listing\
    \ 4–15.** *Refactored Code Showing New Method—doGyroUpdate*\n\n```\n-(void)doGyroUpdate\
    \ {\n    float rotation;\n    float rate = motionManager.gyroData.rotationRate.z;\n\
    \    if (fabs(rate) > .2) {\n       float direction = rate > 0 ? 1 : -1;\n   \
    \    rotation += direction * M_PI/90.0;\n       imageView.transform = CGAffineTransformMakeRotation(rotation);\n\
    \        NSLog(@\"Rotation: %f\", rotation);\n    }\n}\n```\n\nAfter you start\
    \ listening to gyro events, create an `NSTimer` to call our new method. First,\
    \ declare the `NSTimer` in your header. I'm calling mine `timer`. Create the timer\
    \ in the `viewDidLoad` method. Your code should look something like [Listing 4–16](#Chapter04.html#list_4_16).\
    \ Again, we're not really cleaning up after ourselves in this example because\
    \ our goal is to read the data. This application has no UI flow.\n\n**Listing\
    \ 4–16.** *Set Up the NSTimer*"
  raw: '##### Attitude


    Before we update the UI with our values, let''s just log them to the console and
    make sure we''re able to access the hardware successfully. Add the `IBAction`
    method we declared in our header by copying the code from [Listing 4–10](#Chapter04.html#list_4_10)
    to `SecondViewController.m`.


    **Listing 4–10.** *Add the IBAction Method—readGyroscope*


    `- (void)readGyroscope {`

    `    CMDeviceMotion *currentDeviceMotion = motionManager.deviceMotion;`

    `    CMAttitude *currentAttitude = currentDeviceMotion.`**`attitude`**`;`


    `    NSLog(@"Attitude: %@", currentAttitude);`

    `}`


    This method creates a `CMDeviceMotion` object, and reads the `CMAttitude` value
    from the gyroscope. Switch to `SecondView.xib` and set the `UIButton`''s`IBAction`
    to the `readGyroscope` method. The `CMAttitude` reading has a collection of key
    parameters (see [Table 4–1](#Chapter04.html#tab_4_1)) that we''ll be using in
    our sample applications later in the book.


    ![Image](images/t0401.jpg)


    Run the application on a physical device. Navigate to the second tab and click
    the Test button. Rotate the device in different directions and continue to test
    the values. In the Xcode console, you should see log output resembling [Listing
    4–11](#Chapter04.html#list_4_11).


    **Listing 4–11.** *NSLog Output from Logging Attitude of Device*


    `2011-07-08 20:38:31.955 iOS_AR_Ch4_Sensors[6144:707] Attitude: Pitch: -41.931169,
    Roll:`

    `-57.704060, Yaw: -177.801492 @ 0.000000`

    `2011-07-08 20:38:33.572 iOS_AR_Ch4_Sensors[6144:707] Attitude: Pitch: -17.880685,
    Roll:`

    `-62.436956, Yaw: 167.555800 @ 0.000000`

    `2011-07-08 20:38:49.238 iOS_AR_Ch4_Sensors[6144:707] Attitude: Pitch: 28.940916,
    Roll:`

    `11.359928, Yaw: -45.087161 @ 0.000000`


    The `Attitude` is the combination of `Pitch`, `Roll`, and `Yaw` for the device.
    If we were to access these properties individually, you would get the separate
    values in radians. Typically, we''ll have to convert these to degrees for basic
    augmented-reality purposes, such as knowing the viewing angle and rotation of
    the device. Add the code from [Listing 4–12](#Chapter04.html#list_4_12) to the
    end of the `readGyroscope` method.


    **Listing 4–12.** *Add to End of readGyroscope Method*


    `    rollLabel.text = [NSString stringWithFormat:@"ROLL: %f", currentAttitude.roll];`

    `    rollProgressView.progress = ABS(currentAttitude.roll);`

    `    pitchLabel.text = [NSString stringWithFormat:@"PITCH: %f", currentAttitude.pitch];`

    `    pitchProgressView.progress = ABS(currentAttitude.pitch);`

    `    yawLabel.text = [NSString stringWithFormat:@"YAW: %f", currentAttitude.yaw];`

    `    yawProgressView.progress = ABS(currentAttitude.yaw);  `


    The code block we just added should look familiar. We are just setting the visible
    values in our UI elements for quick debugging. Run the application. You should
    see something similar to what we see in [Figure 4–7](#Chapter04.html#fig_4_7).


    You can see that the values that were shown in the Xcode console aren''t exactly
    matching up with what we''re seeing on the screen. The formatting is the same
    but we''re now looking at the radian measurement for rotation on each individual
    axis.


    Before we get to our examples later in the book, we''ll talk about a framework
    called cocos2D. We''ll be using the framework for animation and 2D gaming features.
    cocos2D provides some very simple functions to convert radians to degrees.


    ![Image](images/0407.jpg)


    **Figure 4–7.** *Read gyro data from CMMotionManager.*


    The motion manager blends the accelerometer and gyroscope data together automatically.
    One of the readings that is missing from this approach is the rate of rotation.
    Let''s put together a quick sample to demonstrate how to gather this metric and
    coordinate it to an element in our UI. This will be a common task in augmented-reality
    programming. In most cases, when the phone is rotated, you will want to keep items
    that you''ve overlaid on the view in the correct orientation.


    ##### Rate of Rotation


    Open `SecondView.xib` in Xcode. Add a `UIImageView` object above the content we
    already have on the view. Assign an image to the element that is more horizontally
    oriented. The GitHub repository for this chapter has an image of a fighter jet
    included, which you may use. Define the `UIImageView` in your header file and
    synthesize/release the object in the implementation file. Add the code from [Listing
    4–13](#Chapter04.html#list_4_13) to the bottom of the `readGyroscope` method.


    **Listing 4–13.** *Add to End of readGyroscope Method*


    `float rotation;`

    `    float rate = motionManager.gyroData.rotationRate.z;`

    `        if (fabs(rate) > .2) {`

    `            float direction = rate > 0 ? 1 : -1;`

    `            rotation += direction * M_PI/90.0;`

    **`imageView.transform = CGAffineTransformMakeRotation(rotation);`**

    `            NSLog(@"Rotation: %f", rotation);`

    `        }`


    This method will use the `gyroData` property of our motion manager to get the
    rotation rate of the Z-axis. There is a new function in use now to rotate the
    image according to the rotation of the Z-axis. We''ll look more at various approaches
    to this type of task in our in-depth examples later in the book. Of course, we
    haven''t started actually monitoring the gyroscope, so we need to set that up
    before we''ll see any useful results. Update your `viewDidLoad` method as shown
    in [Listing 4–14](#Chapter04.html#list_4_14).


    **Listing 4–14.** *Updated viewDidLoad Method*


    `- (void)viewDidLoad`

    `{`

    `    self.motionManager = [[[CMMotionManager alloc] init] autorelease];`

    `    motionManager.deviceMotionUpdateInterval = 1.0/60.0;`


    `    if (motionManager.isDeviceMotionAvailable) {`

    `        [motionManager startDeviceMotionUpdates];`

    **`        [motionManager startGyroUpdates];`**

    `    }`

    `    [super viewDidLoad];`

    `}`


    Before we get too far from this point, it is important to note that this code
    does not stop listening to the gyroscope readings. It''s important to implement
    a routine to start and stop monitoring sensor readings appropriately.


    Go ahead and run the project. You''ll find it a bit difficult to test. We are
    looking to validate that if we increase the rate of rotation significantly enough
    respective to the Z-axis that the image will rotate to the same angle as the Z-axis
    when we press the Test button. The main difficulty here is that we have to press
    the button and move the device around at the same time, which results in only
    minor changes in rate of rotation, as shown in [Figure 4–8](#Chapter04.html#fig_4_8).


    ![Image](images/0408.jpg)


    **Figure 4–8.** *Test the manual readings of gyro data (notice a slight rolling
    effect of the image).*


    Instead of manually retrieving the readings in response to the click of the button,
    we could use the `NSTimer` class to set up an interval and call back to another
    method.


    Refactor the code block from [Listing 4–13](#Chapter04.html#list_4_13) into a
    new method, as shown in [Listing 4–15](#Chapter04.html#list_4_15).


    **Listing 4–15.** *Refactored Code Showing New Method—doGyroUpdate*


    `-(void)doGyroUpdate {`

    `    float rotation;`

    `    float rate = motionManager.gyroData.rotationRate.z;`

    `    if (fabs(rate) > .2) {`

    `       float direction = rate > 0 ? 1 : -1;`

    `       rotation += direction * M_PI/90.0;`

    `       imageView.transform = CGAffineTransformMakeRotation(rotation);`

    `        NSLog(@"Rotation: %f", rotation);`

    `    }`

    `}`


    After you start listening to gyro events, create an `NSTimer` to call our new
    method. First, declare the `NSTimer` in your header. I''m calling mine `timer`.
    Create the timer in the `viewDidLoad` method. Your code should look something
    like [Listing 4–16](#Chapter04.html#list_4_16). Again, we''re not really cleaning
    up after ourselves in this example because our goal is to read the data. This
    application has no UI flow.


    **Listing 4–16.** *Set Up the NSTimer*'
  trans: "\n# 姿态\n\n在用数值更新 UI 之前，我们先将其输出到控制台，确保能成功访问硬件。将代码清单 4–10 中的代码复制到`SecondViewController.m`，添加我们在头文件中声明的`IBAction`方法。\n\
    \n**代码清单 4–10.** *添加 IBAction 方法——readGyroscope*\n\n```\n- (void)readGyroscope\
    \ {\n    CMDeviceMotion *currentDeviceMotion = motionManager.deviceMotion;\n \
    \   CMAttitude *currentAttitude = currentDeviceMotion.attitude;\n\n    NSLog(@\"\
    Attitude: %@\", currentAttitude);\n}\n```\n\n该方法创建一个`CMDeviceMotion`对象，并从陀螺仪读取`CMAttitude`值。切换到`SecondView.xib`，将`UIButton`的`IBAction`设置为`readGyroscope`方法。`CMAttitude`读数包含一组关键参数（参见表\
    \ 4–1），我们将在本书后续的示例应用中使用这些参数。\n\n![图片](img/t0401.jpg)\n\n在实体设备上运行应用。切换到第二个标签页，点击\
    \ Test 按钮。沿不同方向旋转设备，持续测试这些数值。在 Xcode 控制台中，您应能看到类似代码清单 4–11 所示的日志输出。\n\n**代码清单\
    \ 4–11.** *记录设备姿态的 NSLog 输出*\n\n```\n2011-07-08 20:38:31.955 iOS_AR_Ch4_Sensors[6144:707]\
    \ Attitude: Pitch: -41.931169, Roll:\n-57.704060, Yaw: -177.801492 @ 0.000000\n\
    2011-07-08 20:38:33.572 iOS_AR_Ch4_Sensors[6144:707] Attitude: Pitch: -17.880685,\
