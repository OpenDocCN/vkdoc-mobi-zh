    You can achieve positional audio with cocos2D, as well. Instead of covering that
    in this chapter, and because we haven''t yet introduce cocos2D, we''re going to
    save that for [Chapter 7](#Chapter07.html#ch7).


    #### User Feedback Through Vibration


    There are a few nonaudible options we have available to use for providing the
    user with feedback. The most commonly used is the vibration effect. This is actually
