    method with the code from [Listing 13–42](#Chapter13.html#list_13_42).


    **Listing 13–42.** *Updated applicationDidFinishLaunching Method*


    `…`

    `// Removes the startup flicker`

    ` [self removeStartupFlicker];`

    `// Run the intro Scene`

    **`CCScene *scene = [CCScene node];`**

    **`_layer =[[[FaceDetectionLayer alloc] init] autorelease];`**

    **`[scene addChild:_layer];`**

    **`viewController.fdLayer = _layer;`**

    **`_layer.root = viewController;`**

    **` [[CCDirector sharedDirector] runWithScene: scene];`**


    `_timer = [NSTimer scheduledTimerWithTimeInterval:5.0 target:self selector:@selector(timerCallback)
    userInfo:nil repeats:YES];`

    `[self setupCaptureSession];`

    `}`


    Instead of running the `initWithHUD` method, we are using our new `init` method
    to instantiate our `FaceDetectionLayer`. The other difference in this code snippet
    is that we are setting the `viewController`’s (`RootViewController`) `fdLayer`
    property to our `FaceDetectionLayer`.


    If you run the project as is, you should see the correct overlay and mood label
    on the screen after the request has been parsed. I got a bit of help from my kids
    for this part. The results are shown in [Figure 13–12](#Chapter13.html#fig_13_12)
    through [Figure 13–14](#Chapter13.html#fig_13_14).


    Take note of the mood label change between expressions. Face.com did a great job
    recognizing the expression between each request. Our program correctly moved the
    PNG file to the x,y coordinates of the face, and now that we moved some logic
    back to the main thread, things are looking good.


    ![Image](images/1312.jpg)


    **Figure 13–12.** *Aodhan is happy!*


    ![Image](images/1313.jpg)


    **Figure 13–13.** *Avery is angry!*


    ![Image](images/1314.jpg)


    **Figure 13–14.** *Avery is surprised!*


    The last thing we are going to build into the application is SMS functionality
    to notify customer service if an angry or sad face has been detected.


    Keep in mind that if you wanted to extend this for a practical purpose, there
    may be more than one person in the camera’s view. The only adjustment you’d need
    to make is to create a loop over all the returned photos from face.com’s JSON
    response. We are hard-coding `objectAtIndex:0` to only pick up the first face
    recognized. So, if you wanted to analyze a crowd, that adjustment would be required.


    ### Adding a Twilio Callout


    Twilio uses REST to initiate an outbound call or SMS. One of the reasons we are
    using SMS is because it only requires the REST callout. We don’t have to host
    any code on a web server. Add the method from [Listing 13–43](#Chapter13.html#list_13_43)
    to the `FaceDetectionLayer.m` file.


    **Listing 13–43.** *Send the SMS*


    `- (void)sendSMS {`

    `    NSAutoreleasePool * pool = [[NSAutoreleasePool alloc] init];`


    `    NSLog(@"Sending request");`

    `    NSString *accountSid = @"`**`Your Account SID Here`**`";`

    `    NSString *authToken = @"`**`Your AuthToken Here`**`";`

    `    NSString *urlString = [NSString`

    `stringWithFormat:@"https://%@:%@@api.twilio.com/2010-04-01/Accounts/%@/SMS/Messages",`

    `accountSid, authToken, accountSid];`


    `    NSURL *url = [NSURL URLWithString:urlString];`


    `    ASIFormDataRequest *request = [ASIFormDataRequest requestWithURL:url];`

    `    [request addPostValue:@"`**`Your TO Number Here`**`" forKey:@"To"];`

    `    [request addPostValue:@"Angry Face Detected" forKey:@"Body"];`

    `    [request addPostValue:@"`**`Valid Twilio Number`**`" forKey:@"From"];`


    `    [request startSynchronous];`


    `    NSError *error = [request error];`

    `    if (!error) {`

    `        NSString *response = [request responseString];`

    `        NSLog(@"%@",response);`

    `    } else {`

    `        NSLog(@"An error occured %d; %@",[error code], [request responseString]);`

    `    }`


    `    [pool drain];`

    `}`


    That was much simpler. Twilio has, as you’ve just seen, a VERY simple API to add
    quick value to your application. You can reference this new function from the
    `facialRecognitionRequest` method. Just wrap it in a quick check to match the
    mood with “angry” and you should be all set.


    The SMS is shown in [Figure 13–15](#Chapter13.html#fig_13_15).


    ![Image](images/1315.jpg)


    **Figure 13–15.** *SMS was sent successfully.*


    ### Summary


    This chapter was a lot of fun. We started as we did in Chapter 7, and created
    a HUD layer. After some experimentation, we realized that wasn’t necessary. By
    following the step-by-step process, we learned about threading with OpenGL (which
    is the foundation for cocos2D).


    We extended our example to create an `AVCaptureSession` and send the `UIImages`
    to the face.com REST API. We used two different open source libraries to add functionality
    to our demo. ASI-HTTP-Request helped us wrap the REST callout in a short amount
    of code, and the SBJson library helped us parse the responses from face.com.


    We used cocos2D to overlay a sprite on the target’s face, and a label with the
    mood returned from face.com. Finally, we used Twilio’s simple REST API to alert
    customer service over SMS that an angry face was detected.


    Before using the facial recognition examples in your own applications, you should
    check your local privacy laws. In certain regions, capturing or storing facial
    patterns may be a privacy violation.


    I hope you learned a lot during the examples in this book. Please review the supplemental
    materials at the end of the book for some more helpful topics. Feel free to contact
    me on twitter @kylemroche, and on GitHub if you have any questions or feedback
    on the demonstrations.


