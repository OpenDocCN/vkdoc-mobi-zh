- fmt: "#### Adjusting the Default View\n\nOpen `AppDelegate.h` in Xcode. Add a `UIView`\
    \ to the interface as shown in [Listing 7–3](#Chapter07.html#list_7_3).\n\n**Listing\
    \ 7–3.** *Add a UIView for Our Camera Overlay*\n\n```\nUIView  *cameraView;\n\
    ```\n\nSwitch to `AppDelegate.m`, and let's get to work. First, we have to swap\
    \ the buffer to the 32-bit buffer. This should be a commented value in the cocos2D\
    \ template, as this is a common change for developers to make. Find the line that\
    \ looks like what is shown in [Listing 7–4](#Chapter07.html#list_7_4).\n\n**Listing\
    \ 7–4.** *Change the pixelFormat of the EAGLView*\n\n```\n//\n// Create the EAGLView\
    \ manually\n//  1. Create a RGB565 format. Alternative: RGBA8\n//  2. depth format\
    \ of 0 bit. Use 16 or 24 bit for 3d effects, like CCPageTurnTransition\n//\nEAGLView\
    \ *glView = [EAGLView viewWithFrame:[window bounds]\n                        \
    \       pixelFormat:kEAGLColorFormatRGB565        // kEAGLColorFormatRGBA8\n \
    \                              depthFormat:0];\n```\n\nYou can see that the comments\
    \ explain some of this. Because we cannot use the RGB565, 16-bit format for camera\
    \ view, swap the value for `pixelFormat` with the one that is in the comment.\
    \ Your code block should now look like [Listing 7–5](#Chapter07.html#list_7_5).\
    \ We will leave the `depthFormat` at 0, as we are not working in 3D just yet.\n\
    \n**Listing 7–5.** *Change the pixelFormat*\n\n```\nEAGLView *glView = [EAGLView\
    \ viewWithFrame:[window bounds]\n                               pixelFormat:kEAGLColorFormatRGBA8\
    \ depthFormat:0];\n```\n\nNext, we will be adding our newly declared `UIView`\
    \ to the screen in place of the boring black backdrop we had by default. Find\
    \ the section of code shown in [Listing 7–6](#Chapter07.html#list_7_6).\n\n**Listing\
    \ 7–6.** *Main View Receives a SubView*\n\n```\n// make the View Controller a\
    \ child of the main window\n[window addSubview: viewController.view];\n```\n\n\
    Just below this line, add the code from [Listing 7–7](#Chapter07.html#list_7_7).\
    \ I'll walk you through each line next.\n\n**Listing 7–7.** *Prepare Overlay View\
    \ for Camera*\n\n```\n[CCDirector sharedDirector].openGLView.backgroundColor =\
    \ [UIColor clearColor];\n[CCDirector sharedDirector].openGLView.opaque = NO;\n\
    \nglClearColor(0.0, 0.0, 0.0, 0.0);\n\ncameraView = [[UIView alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]];\ncameraView.opaque = NO;\ncameraView.backgroundColor=[UIColor\
    \ clearColor];\n[window addSubview:cameraView];\n```\n\nFirst, we are setting\
    \ the background color of the OpenGL view to `clearColor`. This will allow transparency\
    \ so we can still write objects and text to the screen on top of our camera view.\
    \ Next, we make sure this layer is not opaque (for the same purpose). We use the\
    \ `glClearColor` method to make sure our version of \"clear\" is actually clear.\
    \ You could adjust this a bit to make a hazy translucent layer instead of an invisible\
    \ layer, which is what we're building in this chapter. The second section looks\
    \ similar. We take our new `UIView`, stretch it to the bounds of the screen, and\
    \ make it transparent as well. Finally, we are adding our new `UIView` to the\
    \ window.\n\nIf you run the project again now, you won't see a visible difference.\
    \ We haven't added anything that makes an impact yet. Let's move on.\n\n#### Adding\
    \ the Camera View\n\nJust below the code we added from [Listing 7–7](#Chapter07.html#list_7_7),\
    \ we are going to add the code to create the `UIImagePicker` and display it in\
    \ camera mode. Some of this will be familiar from [Chapter 6](#Chapter06.html#ch6).\
    \ Add the code from [Listing 7–8](#Chapter07.html#list_7_8), just below the code\
    \ from [Listing 7–7](#Chapter07.html#list_7_7).\n\n**Listing 7–8.** *Create the\
    \ UIImagePicker and Add to the Screen*\n\n```\nUIImagePickerController *imagePicker;\n\
    \n@try {\n        imagePicker = [[[UIImagePickerController alloc] init] autorelease];\n\
    \        imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;\n \
    \       imagePicker.showsCameraControls = NO;\n        imagePicker.toolbarHidden\
    \ = YES;\n        imagePicker.navigationBarHidden = YES;\n        imagePicker.wantsFullScreenLayout\
    \ = YES;\n}\n@catch (NSException * e) {\n        [imagePicker release];\n    \
    \    imagePicker = nil;\n}\n@finally {\n        if(imagePicker) {\n          \
    \  [cameraView addSubview:[imagePicker view]];\n            [cameraView release];\n\
    \        }\n}\n\n[window bringSubviewToFront:viewController.view];\n```\n\nLet's\
    \ walk through this a bit, before we run the project. First, we create our `UIImagePicker`,\
    \ set it up, and make sure the source type is set to camera so we can see the\
    \ live video content. We hide the controls, the toolbar, and the navigation bar\
    \ so that we get a full view of the camera.\n\nThere is one last thing to do.\
    \ Switch to `HelloWorldLayer.m` and change the label's text and size, as shown\
    \ in [Listing 7–9](#Chapter07.html#list_7_9).\n\n**Listing 7–9.** *Change the\
    \ Label's Text*\n\n```\n// create and initialize a Label\nCCLabelTTF *label =\
    \ [CCLabelTTF labelWithString:@\"Hello Augmented World\" fontName:@\"Marker Felt\"\
    \ fontSize:48];\n```\n\nLike our examples in [Chapter 6](#Chapter06.html#ch6),\
    \ we'll have to run this on a real device because the simulator doesn't support\
    \ the camera classes. Launch the project on your device. You will notice something\
    \ is a bit off. Check out [Figure 7–4](#Chapter07.html#fig_7_4) to see what I\
    \ mean.\n\n![Image](images/0704.jpg)\n\n**Figure 7–4.** *Here is the camera view,\
    \ but with a bit missing.*\n\nThe camera didn't cover the whole screen! There's\
    \ a black bar on the edge that seems leftover from our template application. Wait,\
    \ we set `wantsFullScreenLayout` to `YES`. What happened?\n\n#### Scaling the\
    \ Camera View\n\nSo, why do we have this strange black bar occupying part of our\
    \ UI? It has to do with the difference in aspect ratio between the screen and\
    \ the camera (in landscape mode). Basically, the iPhone screen now has an aspect\
    \ ratio of 3:4, and the iPhone camera has an aspect ratio of 4:3. So, we need\
    \ to scale the camera image to match. This explains the black bar from [Figure\
    \ 7–4](#Chapter07.html#fig_7_4).\n\nTo fix this, we need to scale our `UIImagePicker`\
    \ to match the aspect ratio of the device. Return to `AppDelegate.m` in Xcode.\
    \ Find the section of code you added from [Listing 7–8](#Chapter07.html#list_7_8),\
    \ and add to it the bold lines from [Listing 7–10](#Chapter07.html#list_7_10).\n\
    \n**Listing 7–10.** *Scale the UIImagePickerController*\n\n```\n@try {\n     \
    \   imagePicker = [[[UIImagePickerController alloc] init] autorelease];\n    \
    \    imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;\n     \
    \   imagePicker.showsCameraControls = NO;\n        imagePicker.toolbarHidden =\
    \ YES;\n        imagePicker.navigationBarHidden = YES;\n        imagePicker.wantsFullScreenLayout\
    \ = YES;\n        imagePicker.cameraViewTransform = CGAffineTransformScale(imagePicker.cameraViewTransform,\
    \ 1.0, 1.3);\n}\n```\n\nRun the project again. You should see that we've successfully\
    \ removed the black bar and the camera is now occupying the full screen, as shown\
    \ in [Figure 7–5](#Chapter07.html#fig_7_5).\n\n![Image](images/0705.jpg)\n\n**Figure\
    \ 7–5.** *No more black bar!*\n\n### cocos2D Concepts\n\nLet's add a bit of flare\
    \ to our app. At the moment, it doesn't respond to touches or do anything interesting.\
    \ First, let's understand how a cocos2D application is set up."
