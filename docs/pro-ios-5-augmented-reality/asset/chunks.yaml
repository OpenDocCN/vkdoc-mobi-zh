  trans: "\n随后我们设置位置管理器和加速度计，并启动更新服务。这与我们在第 4 章尝试 iOS 传感器编程时创建的代码非常相似。仅凭这个类本身并非特别实用。现在开始构建一些能利用现有成果的新类。\n\
    \n在 Xcode 项目中创建一个名为`RootViewController`的新文件，使其继承`UIViewController`模板。确保取消勾选`With\
    \ XIB for user interface`选项。在 Xcode 中打开`RootViewController.h`，按照代码清单 11-4 所示进行修改。\n\
    \n**代码清单 11-4.** *更新后的 RootViewController.h*\n\n```\n#import <UIKit/UIKit.h>\n\
    @class ARController;\n\n@interface RootViewController : UIViewController {\n}\n\
    \n@property (nonatomic, retain) ARController *arController;\n@end\n```\n\n我们引用了`ARController`类，并设置了同类型的新属性。在\
    \ Xcode 中切换到`RootViewController.m`，按照代码清单 11-5 所示更新该类。\n\n**代码清单 11-5.** *更新后的\
    \ RootViewController.m*\n\n```\n#import \"RootViewController.h\"\n#import \"ARController.h\"\
    \n\n@implementation RootViewController\n@synthesize arController = _arController;\n\
    \n- (id)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil\n\
    {\n    self = [super initWithNibName:nibNameOrNil bundle:nibBundleOrNil];\nif\
    \ (self) {\n        // 自定义初始化\n    }\n    return self;\n}\n\n- (void)didReceiveMemoryWarning\n\
    {\n    // 如果视图没有父视图则释放它\n    [super didReceiveMemoryWarning];\n\n    // 释放所有未使用的缓存数据、图像等\n\
    }\n\n#pragma mark - 视图生命周期\n\n// 实现 loadView 以编程方式创建视图层次结构，而不使用 nib 文件\n- (void)loadView\n\
    {\n_arController = [[ARController alloc] initWithViewController:self];\n}\n\n\
    - (void)viewDidAppear:(BOOL)animated {\n[super viewDidAppear:animated];\n[self.arController\
    \ presentModalARControllerAnimated:NO];\n}\n\n- (void)viewWillAppear:(BOOL)animated\
    \ {\n        [super viewWillAppear:animated];\n}\n\n/*\n// 实现 viewDidLoad 以在加载视图后进行额外设置（通常从\
    \ nib 文件加载）\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n}\n*/\n\n- (void)viewDidUnload\n\
    {\n    [super viewDidUnload];\n    // 释放主视图的所有保留子视图\n    // 例如 self.myOutlet =\
    \ nil;\n}\n\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
    {\n    // 返回 YES 表示支持的方向\n        return YES;\n}\n\n@end\n```\n\n我们在这里做了几处小改动。在`viewDidAppear`方法中，我们呈现了模态\
    \ AR 控制器。这使得我们可以在其他应用中复用正在构建的代码，而无需重新创建基础`UIViewController`。在`loadView`方法中，我们用`UIImagePickerController`和\
    \ HUD 层分配了新的`arController`实例。\n\n在基础项目通过用户界面配置好`UIImagePicker`（相机视图）之前，还有一步操作。在\
    \ Xcode 中打开`AppDelegate.h`，按照代码清单 11-6 所示更新头文件。\n\n**代码清单 11-6.** *更新后的 AppDelegate.h*\n\
    \n```\n#import <UIKit/UIKit.h>\n\n@class RootViewController;\n@interface AppDelegate\
    \ : UIResponder <UIApplicationDelegate> {\n\n}\n\n@property (strong, nonatomic)\
    \ UIWindow *window;\n@property (nonatomic, retain) RootViewController *rootViewController;\n\
    @end\n```\n\n在 Xcode 中打开`AppDelegate.m`。我们将重写`didFinishLaunchingWithOptions`方法，以便将`RootViewController`添加到视图栈中。按照代码清单\
    \ 11-7 所示的修改更新`AppDelegate.m`。\n\n**代码清单 11-7.** *更新后的 AppDelegate.m*\n\n```\n\
    #import \"AppDelegate.h\"\n#import \"RootViewController.h\"\n\n@implementation\
    \ AppDelegate\n\n@synthesize window = _window;\n@synthesize rootViewController\
    \ = _rootViewController;\n\n- (void)dealloc\n{\n    [_window release];\n    [super\
    \ dealloc];\n}\n\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n{\n    self.window = [[[UIWindow alloc] initWithFrame:[[UIScreen\
    \ mainScreen] bounds]] autorelease];\n    // 应用启动后的自定义覆盖点\n_rootViewController\
    \ = [[RootViewController alloc] init];\n[_window addSubview:_rootViewController.view];\n\
    \nself.window.backgroundColor = [UIColor clearColor];\n    [self.window makeKeyAndVisible];\n\
    \    return YES;\n}\n```\n\n再次强调，这些都是我们熟悉的内容。我们导入了新的`RootViewController`类，合成了变量，并将其作为子视图添加到`UIWindow`中。\n\
    \n在支持 Core Location 的物理设备（iPhone 或 iPad）上运行该应用。由于我们使用了相机，无法使用模拟器进行调试。系统应会像图 11-4\
    \ 所示弹出位置管理器的提示，请求允许将您当前的位置共享给该应用。\n\n![图像](img/1104.jpg)\n\n**图 11-4.** *通过位置管理器权限允许位置共享。*\n\
    \n接受该提示后，您将进入全屏相机视图，如图 11-5 所示。希望您能拥有更优美的景色。\n\n![图像](img/1105.jpg)\n\n**图 11-5.**\
    \ *授予位置共享权限后将显示相机视图。*\n"
- fmt: "#### Listening for Sensor Updates\n\nWe have updates for heading and location\
    \ enabled, but we aren't doing anything with these yet. Nor are we responding\
    \ to change in the orientation of the device. In [Chapter 7](#Chapter07.html#ch7),\
    \ we discussed the conversion from radians to degrees, and how this is necessary\
    \ when calculating angles on the screen. Let's set up some convenience methods\
    \ for this purpose. Open `Ch11_Prefix.pch` and add the code from [Listing 11–8](#Chapter11.html#list_11_8).\n\
    \n**Listing 11–8.** *Degrees to Radians and Back Again*\n\n```\n#define degreesToRadians(x)\
    \ (M_PI * (x) / 180.0)\n#define radiansToDegrees(x) ((x) * 180.0/M_PI)\n```\n\n\
    Now that we have that out of the way, we need to define a few more variables.\
    \ Open `ARController.h` and add the variables from [Listing 11–9](#Chapter11.html#list_11_9).\n\
    \n**Listing 11–9.** *Updated ARController.h*\n\n```\n@property (nonatomic) UIDeviceOrientation\
    \ deviceOrientation;\n@property (nonatomic) double range;\n```\n\nSwitch to `ARController.m`\
    \ and synthesize the variables as shown in [Listing 11–10](#Chapter11.html#list_11_10).\n\
    \n**Listing 11–10.** *Synthesize the Properties*\n\n```\n@synthesize deviceOrientation\
    \ = _deviceOrientation;\n@synthesize range = _range;\n```\n\nWe now have a place\
    \ to store the current device orientation and the range of view. The `range` variable\
    \ will be used to store the angle of the view subtended by the screen. An example\
    \ of calculating a subtended angle is shown in [Figure 11–6](#Chapter11.html#fig_11_6).\
    \ At point A, the tree subtends an angle of 25 degrees. We will be calculating\
    \ an acceptable view by subtending the full width of the screen, assuming an approximate\
    \ 15-degree view window.\n\n![Image](images/1106.jpg)\n\n**Figure 11–6.** *Calculate\
    \ the acceptable view with a subtended angle.*\n\nIn `ARController.m`, update\
    \ the `deviceOrientationDidChange` method with the code shown in [Listing 11–11](#Chapter11.html#list_11_11).\n\
    \n**Listing 11–11.** *New deviceOrientationDidChange Method*\n\n```\n- (void)deviceOrientationDidChange:(NSNotification\
    \ *)notification {\n    UIDeviceOrientation orientation = [[UIDevice currentDevice]\
    \ orientation];\n    UIApplication *app = [UIApplication sharedApplication];\n\
    \n    if ( orientation != UIDeviceOrientationUnknown &&\n        orientation !=\
    \ UIDeviceOrientationFaceUp &&\n        orientation != UIDeviceOrientationFaceDown)\
    \ {\n\n                CGAffineTransform transform =\nCGAffineTransformMakeRotation(degreesToRadians(0));\n\
    \                CGRect bounds = [[UIScreen mainScreen] bounds];\n           \
    \     [app setStatusBarHidden:YES];\n                [app setStatusBarOrientation:UIInterfaceOrientationPortrait\
    \ animated:\nNO];\n\n                if (orientation == UIDeviceOrientationLandscapeLeft)\
    \ {\n                        transform                   =\nCGAffineTransformMakeRotation(degreesToRadians(90));\n\
    \                        bounds.size.width  = [[UIScreen mainScreen] bounds].size.height;\n\
    \                        bounds.size.height = [[UIScreen mainScreen] bounds].size.width;\n\
    \                        [app\nsetStatusBarOrientation:UIInterfaceOrientationLandscapeRight\
    \ animated: NO];\n\n                } else if (orientation == UIDeviceOrientationLandscapeRight)\
    \ {\n                        transform                   =\nCGAffineTransformMakeRotation(degreesToRadians(-90));\n\
    \                        bounds.size.width  = [[UIScreen mainScreen] bounds].size.height;\n\
    \                        bounds.size.height = [[UIScreen mainScreen] bounds].size.width;\n\
    \                        [app setStatusBarOrientation:UIInterfaceOrientationLandscapeLeft\n\
    animated: NO];\n\n                } else if (orientation == UIDeviceOrientationPortraitUpsideDown)\
    \ {\n                        transform =\nCGAffineTransformMakeRotation(degreesToRadians(180));\n\
    \                        [app setStatusBarOrientation:UIInterfaceOrientationPortraitUpsideDown\
    \ animated: NO];\n\n                }\n                _hudView.transform = transform;\n\
    \                _hudView.bounds = bounds;\n                _range = _hudView.bounds.size.width\
    \ / 12;\n\n        }\n        _deviceOrientation = orientation;\n}\n```\n\nLet's\
    \ step through this code from the top. First, we declare a few variables to reference\
    \ more of the global application. We set up a reference to the device's orientation,\
    \ as well as our `sharedApplication` singleton.\n\nWe next use the conversion\
    \ methods defined in our prefix file to swap from degrees to radians, and transform\
    \ the screen for rotations not Face Up or Face Down (we are ignoring unknown orientations\
    \ as well).\n\nFinally, we add the transform to our HUD layer, and set the `range`\
    \ of the screen. Remember, although the function for the `range` might look static,\
    \ it will have a different numerator depending on orientation and device.\n\n\
    Return to `ARController.h` and set up a few more variables to manage our location\
    \ updates and heading updates. Add the properties shown in [Listing 11–12](#Chapter11.html#list_11_12).\n\
    \n**Listing 11–12.** *Properties for Heading and Location*\n\n```\n@property (nonatomic,\
    \ retain) CLLocation *deviceLocation;\n@property (nonatomic, retain) CLHeading\
    \ *deviceHeading;\n```\n\nSynthesize the properties as shown in [Listing 11–13](#Chapter11.html#list_11_13).\n\
    \n**Listing 11–13.** *Synthesize the Properties*\n\n```\n@synthesize deviceHeading\
    \ = _deviceHeading;\n@synthesize deviceLocation = _deviceLocation;\n```\n\nWe'll\
    \ use these variables later in the example."
