- fmt: '# Building a Facial Recognition AR App


    In [Chapter 12](#Chapter12.html#ch12), we introduced a few ways to bring facial
    and object recognition to your applications. Some of the approaches are more difficult
    than others. In this chapter, we are going to pick one of those approaches and
    build out a fully functional AR application using facial recognition and some
    of the other technologies we''ve already discussed in the book.


    ## The Application''s Purpose


    Thinking of a specific purpose for this application was a bit difficult. I wasn''t
    trying to solve a really practical problem as much as trying to demonstrate some
    of the key concepts that we''ve learned in this book so far.


    Having said that, the premise of this application is customer service. Admittedly,
    it''s a bit overblown, but it will be fun nonetheless. For this project, picture
    an iPad mounted above a table in a restaurant or in the common area of a pub.
    We are going to analyze the mood of the person in the iPad''s camera and alert
    customer service if we find his/her mood to be angry.


    As a side note, we''re going to build this application based on what we''ve learned
    so far in the book. Unfortunately, the approaches we''ve learned up to this point
    aren''t going to work as we hope they will. I want to warn you of this ahead of
    time. When the app looks broken halfway through the chapter, that''s on purpose.
    It''s not something you did wrong! We will fix it and learn a bit about OpenGL
    and its dislike for threading along the way.


    ### Technology Used


    At first, we''ll just overlay some information about the user on the screen. This
    will be good practice for building a more complex HUD layer in cocos2D. We''ll
    extend this application to actually send an SMS (Short Message Service) to the
    customer service representative and report the incident.


    The core piece of technology we''ll be using is the `face.com` REST API. As we
    discussed in Chapter 12, the `face.com` API takes a JPEG image over a REST request
    and returns the `x,y` coordinates of the recognized face, as well as information
    about the person''s mood, glasses, and mouth position. It''s a very useful and
    quick API.


    ## Getting Set Up


    Let''s get the technology we need for the example application lined up. There
    are three main sign up processes you''ll have to endure to get to the fun stuff.


    ### Face.com


    Open your browser to [`www.face.com`](http://www.face.com). In the top right-hand
    corner, there should be a link called `Developers`. Follow that link, then click
    the gigantic `Get Started` image in the middle of the page. The sign-up process
    for `face.com` is fairly noninvasive. It only requires you to provide your name,
    e-mail, and a password. If you''re feeling more generous, give them the rest of
    the information. Either way, prove you''re human by completing the CAPTCHA and
    click `Signup`. Follow the instructions in your confirmation e-mail to verify
    your account.


    Go to the `API Keys` tab after you''re logged in. Create a new application by
    clicking the link that says `Click here to setup a new application.` It doesn''t
    matter what you name the application. I''ve used `iOS AR Demo` for my application
    name. You will see a page similar to [Figure 13–1](#Chapter13.html#fig_13_1).


    ![Image](images/1301.jpg)


    **Figure 13–1.** *Complete the `face.com` application page.*


    There are two settings here you will need when we start building the application.
    They are the `API Key` and the `API Secret`. That''s it for `face.com` for now.


    ### cocos2D


    If you don''t already have `cocos2D` visit [`www.cocos2d-iphone.org/download`](http://www.cocos2d-iphone.org/download)
    to download the latest stable build of `cocos2D` for iPhone, which at the time
    of this writing is `1.0.1`. We covered installing `cocos2D` in Xcode 4.2 back
    in Chapter 7, so if you''re the type that skips chapters you should flip back
    there now.


    ### Setting Up Our Twilio Account


    Twilio is a cloud communications platform that provides support for SMS, Voice,
    and even VOIP communications. This is an easy sign-up process as well. Visit [`www.twilio.com/try-twilio`](http://www.twilio.com/try-twilio)
    to set up your free trial.


    After you have your account set up, log in and you will see something like [Figure
    13–2](#Chapter13.html#fig_13_2) on the top of your Dashboard page.


    ![Image](images/1302.jpg)


    **Figure 13–2.** *Log in and go to your `Twilio` Dashboard page.*


    **NOTE:** Similar to `face.com`''s credentials, you''ll need to remember your
    `Account SID` and your `Auth Token` so you can access `Twilio`''s API in our demo
    application. Your `Account SID` is useless without your `Auth Token`. So, never
    share the `Auth Token`!


    ### Downloading the ASI-HTTP-Request Library


    There are a few libraries for handling HTTP requests from iOS. In fact, most of
    the features can be simply written from scratch. However, we''ll be sending the
    raw image data as part of a multipart form upload over HTTP. For this particular
    purpose, there is a third-party library that works very well.


    `ASI-HTTP-Request` is an open source library available on GitHub at `pokeb/asi-http-request`.
    I''ve forked the version I''m using for this example to `kyleroche/asi-http-request`
    in case you have any issues with a newer version. Store this somewhere on your
    local machine.


    ### JSON-Framework


    We are also going to need some help parsing JSON (JavaScript Object Notation)
    messages, as that is the preferred output of the `face.com` API (and works great
    for `Twilio` as well). Similar to `ASI-HTTP-Request`, there is an open source
    project on GitHub at `stig/json-framework` that I''ve forked to `kyleroche/json-framework`
    for reference. Store this somewhere on your local machine.'
