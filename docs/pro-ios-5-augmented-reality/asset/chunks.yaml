    Let''s walk through this a bit before moving forward. First, we set up our `CLLocationManager`
    instance. This should look familiar to what we did in [Chapter 3](#Chapter03.html#ch3).
    We set the `delegate` to `self`, as expected, but then we introduced a new attribute.
