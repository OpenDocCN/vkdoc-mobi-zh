- fmt: "### Project Structure\n\nLet’s create our project. Open Xcode and create a\
    \ new project using the cocso2D template, as shown in [Figure 13–3](#Chapter13.html#fig_13_3).\n\
    \n![Image](images/1303.jpg)\n\n**Figure 13–3.** *Create a new cocos2D project.*\n\
    \nName the project `Ch13`. If you need to reference the working source code, it\
    \ is available from [`https://github.com/kyleroche/Professional_iOS_AugmentedReality`](https://github.com/kyleroche/Professional_iOS_AugmentedReality)\
    \ or from [`www.apress.com`](http://www.apress.com).\n\nFirst, let’s make sure\
    \ we have all the references we need to run this application. Add the frameworks\
    \ and libraries shown in [Figure 13–4](#Chapter13.html#fig_13_4).\n\n![Image](images/1304.jpg)\n\
    \n**Figure 13–4.** *Add the required frameworks.*\n\nBefore you move ahead, you\
    \ should make sure your project still builds with no errors. cocos2D usually has\
    \ a few warning messages. You can disregard those if you see any (that are not\
    \ related to code we write).\n\nCreate a new Group in your Xcode project called\
    \ `HUD`. We will store the resources for the HUD overlay in this folder. Create\
    \ a new file in this group. Use the `CCNode` class template from the cocos2D collection.\
    \ Make sure the new file is using the `CCLayer` subclass. Name the file `HUDLayer.m`.\n\
    \nThere is a file in the GitHub repository (under the Ch13 directory) called `crosshair.png`.\
    \ Copy this file to your project. Typically, you should be putting this in the\
    \ Resources folder of your project. Make sure that when you do copy the file into\
    \ your project, you select `Copy items into destination group’s folder (if needed).`\
    \ The `crosshair.png` file is shown in [Figure 13–5](#Chapter13.html#fig_13_5).\
    \ We will be placing this on the x,y coordinates of the recognized face in our\
    \ camera view.\n\n![Image](images/1305.jpg)\n\n**Figure 13–5.** *Copy the `crosshair.png`\
    \ (for face overlay) to your project.*\n\nNext, we need to create a class to hold\
    \ the logic for our facial recognition routines. Let’s call this class `FaceDetectionLayer`.\
    \ Create another class using the `CCNode` template and make sure it also is a\
    \ subclass of `CCLayer`. This file should be named `FaceDetectionLayer.m`.\n\n\
    Now, because I’m a clean freak, I’m going to make a quick change to the default\
    \ setup and remove some more files we aren’t going to use. Remove `HelloWorldLayer.h`\
    \ and `HelloWorldLayer.m`. You can permanently delete the files when prompted.\n\
    \nOpen `FaceDetectionLayer.h` in Xcode, and let’s start building.\n\n### Setting\
    \ Up the Main Scene\n\nRemoving `HelloWorldLayer` was great for cleanup purposes,\
    \ but it left us without a main scene in our project. At this point, the project\
    \ won’t build. We have a reference to the `HelloWorldLayer` scene in our AppDelegate.\n\
    \nYou should have `FaceDetectionLayer.h` open in Xcode. Import the `HUDLayer.h`\
    \ header so we can reference that later in the project. Create a private variable\
    \ to reference the HUD layer class called `_hud`. Also, declare a static method\
    \ to return the `scene` object and create a new method called `initWithHUD` like\
    \ we did in the example from [Chapter 7](#Chapter07.html#ch7).\n\nYour new `FaceDetectionLayer.h`\
    \ file should look like [Listing 13–1](#Chapter13.html#list_13_1).\n\n**Listing\
    \ 13–1.** *Updated `FaceDetectionLayer.h`*\n\n`#import <Foundation/Foundation.h>`\n\
    `#import \"cocos2d.h\"`\n**`#import \"HUDLayer.h\"`**\n\n`@interface FaceDetectionLayer\
    \ : CCLayer {`\n**`HUDLayer *_hud;`**\n`}`\n\n**`+ (CCScene *)scene;`**\n**`-\
    \ (id)initWithHUD:(HUDLayer *)hud;`**\n\n`@end`\n\nSwitch to `FaceDetectionLayer.m`.\
    \ Add the method from [Listing 13–2](#Chapter13.html#list_13_2).\n\n**Listing\
    \ 13–2.** *Static Scene Method*\n\n```\n+ (CCScene *)scene {\n    CCScene *scene\
    \ = [CCScene node];\n\n    HUDLayer *hud = [HUDLayer node];\n    [scene addChild:hud\
    \ z:1];\n\n    FaceDetectionLayer *layer = [[[FaceDetectionLayer alloc] initWithHUD:hud]\
    \ autorelease];\n    [scene addChild:layer];\n\n    return scene;\n}\n```\n\n\
    This method should look familiar (unless you skipped Chapter 7). We are creating\
    \ a new scene for cocos2D. Then, we create an additional instance of the `HUDLayer`\
    \ with a `z` index greater than our main scene. This will allow for us to easily\
    \ overlay the camera view (which will handle face detection) with some useful\
    \ graphics like the crosshair PNG file or textual information about the target’s\
    \ mood (happy, sad, neutral).\n\nFinally, we call the `initWithHUD` method. Speaking\
    \ of which, we need to add that code as well. Add the method from [Listing 13–3](#Chapter13.html#list_13_3),\
    \ just after the static scene method.\n\n**Listing 13–3.** *`initWithHUD` Method*\n\
    \n```\n- (id)initWithHUD:(HUDLayer *)hud {\n    if (self = [super init]) {\n \
    \       _hud = hud;\n    }\n    return self;\n}\n```\n\nThis method simply takes\
    \ the place of the default `init` method the cocos2D template provides. We are\
    \ creating our own layer with the HUD instance instead of the base layer on its\
    \ own.\n\nThere is one last item to add to `FaceDetectionLayer.m`. It’s the `dealloc`\
    \ method. Add the method from [Listing 13–4](#Chapter13.html#list_13_4) to the\
    \ base of the implementation file.\n\n**Listing 13–4.** *`dealloc` Method*\n\n\
    ```\n- (void)dealloc {\n    [super dealloc];\n}\n```\n\nIf you try to build the\
    \ project now, you should still receive an error. It’ll be some sort of mach-o-link\
    \ error about the reference to `HelloWorldLayer` in your `AppDelegate` class.\
    \ Open `AppDelegate.m` in Xcode and change the `HelloWorldLayer` import statement\
    \ to now import `FaceDetectionLayer.h`.\n\nFind the code in [Listing 13–5](#Chapter13.html#list_13_5)\
    \ and replace it with the code in [Listing 13–6](#Chapter13.html#list_13_6).\n\
    \n**Listing 13–5.** *Find This . . .*\n\n```\n// Run the intro Scene\n[[CCDirector\
    \ sharedDirector] runWithScene: [HelloWorldLayer scene]];\n```\n\n**Listing 13–6.**\
    \ *Replace with This . . .*\n\n```\n// Run the intro Scene\n [[CCDirector sharedDirector]\
    \ runWithScene: [FaceDetectionLayer scene]];\n```\n\nYour project should be building\
    \ with no errors at this point. There is still absolutely no functionality here,\
    \ but we are at least ready to start moving forward.\n\nI should point out that\
    \ some of what we just added isn’t actually going to be needed in the end application.\
    \ This is the point in the project where a typical application might start off.\
    \ We have a `CCNode` class that has a static method for returning our main theme.\
    \ However, we need to do things a bit differently in this example. When we end\
    \ up removing some of the code we just added later on, this will make more sense."
  raw: '### Project Structure


    Let’s create our project. Open Xcode and create a new project using the cocso2D
    template, as shown in [Figure 13–3](#Chapter13.html#fig_13_3).


    ![Image](images/1303.jpg)


    **Figure 13–3.** *Create anew cocos2D project.*


    Name the project `Ch13`. If you need to reference the working source code, it
    is available from [`https://github.com/kyleroche/Professional_iOS_AugmentedReality`](https://github.com/kyleroche/Professional_iOS_AugmentedReality)
    or from [`www.apress.com`](http://www.apress.com).


    First, let’s make sure we have all the references we need to run this application.
    Add the frameworks and libraries shown in [Figure 13–4](#Chapter13.html#fig_13_4).


    ![Image](images/1304.jpg)


    **Figure 13–4.** *Add the required frameworks.*


    Before you move ahead, you should make sure your project still builds with no
    errors. cocos2D usually has a few warning messages. You can disregard those if
    you see any (that are not related to code we write).


    Create a new Group in your Xcode project called `HUD`. We will store the resources
    for the HUD overlay in this folder. Create a new file in this group. Use the `CCNode
    class` template from the cocos2D collection. Make sure the new file is using the
    `CCLayer` subclass. Name the file `HUDLayer.m`.


    There is a file in the GitHub repository (under the Ch13 directory) called `crosshair.png`.
    Copy this file to your project. Typically, you should be putting this in the Resources
    folder of your project. Make sure that when you do copy the file into your project,
    you select `Copy items into destination group’s folder (if needed).` The `crosshair.png`
    file is shown in [Figure 13–5](#Chapter13.html#fig_13_5). We will be placing this
    on the x,y coordinates of the recognized face in our camera view.


    ![Image](images/1305.jpg)


    **Figure 13–5.** *Copy thecrosshair.png (for face overlay) to your project.*


    Next, we need to create a class to hold the logic for our facial recognition routines.
    Let’s call this class`FaceDetectionLayer`. Create another class using the `CCNode`
    template and make sure it also is a subclass of `CCLayer`. This file should be
    named `FaceDetectionLayer.m`.


    Now, because I’m a clean freak, I’m going to make a quick change to the default
    setup and remove some more files we aren’t going to use. Remove `HelloWorldLayer.h`
    and `HelloWorldLayer.m`. You can permanently delete the files when prompted.


    Open `FaceDetectionLayer.h` in Xcode, and let’s start building.


    ### Setting Up the Main Scene


    Removing `HelloWorldLayer` was great for cleanup purposes, but it left us without
    a main scene in our project. At this point, the project won’t build. We have a
    reference to the `HelloWorldLayer` scene in our AppDelegate.


    You should have `FaceDetectionLayer.h` open in Xcode. Import the `HUDLayer.h`
    header so we can reference that later in the project. Create a private variable
    to reference the HUD layer class called `_hud`. Also, declare a static method
    to return the `scene` object and create a new method called `initWithHUD` like
    we did in the example from [Chapter 7](#Chapter07.html#ch7).


    Your new `FaceDetectionLayer.h` file should look like [Listing 13–1](#Chapter13.html#list_13_1).


    **Listing 13–1.** *Updated FaceDetectionLayer.h*


    `#import <Foundation/Foundation.h>`

    `#import "cocos2d.h"`

    **`#import "HUDLayer.h"`**


    `@interface FaceDetectionLayer : CCLayer {`

    **`HUDLayer *_hud;`**

    `}`


    **`+ (CCScene *)scene;`**

    **`- (id)initWithHUD:(HUDLayer *)hud;`**


    `@end`


    Switch to `FaceDetectionLayer.m`. Add the method from [Listing 13–2](#Chapter13.html#list_13_2).


    **Listing 13–2.** *Static Scene Method*


    `+ (CCScene *)scene {`

    `    CCScene *scene = [CCScene node];`


    `    HUDLayer *hud = [HUDLayer node];`

    `    [scene addChild:hud z:1];`


    `    FaceDetectionLayer *layer = [[[FaceDetectionLayer alloc] initWithHUD:hud]
    autorelease];`

    `    [scene addChild:layer];`


    `    return scene;`

    `}`


    This method should look familiar (unless you skipped Chapter 7). We are creating
    a new scene for cocos2D. Then, we create an additional instance of the `HUDLayer`
    with a `z` index greater than our main scene. This will allow for us to easily
    overlay the camera view (which will handle face detection) with some useful graphics
    like the crosshair PNG file or textual information about the target’s mood (happy,
    sad, neutral).


    Finally, we call the `initWithHUD` method. Speaking of which, we need to add that
    code as well. Add the method from [Listing 13–3](#Chapter13.html#list_13_3), just
    after the static scene method.


    **Listing 13–3.** *initWithHUD Method*


    `- (id)initWithHUD:(HUDLayer *)hud {`

    `    if (self = [super init]) {`

    `        _hud = hud;`

    `    }`

    `    return self;`

    `}`


    This method simply takes the place of the default `init` method the cocos2D template
    provides. We are creating our own layer with the HUD instance instead of the base
    layer on its own.


    There is one last item to add to `FaceDetectionLayer.m`. It’s the `dealloc` method.
    Add the method from [Listing 13–4](#Chapter13.html#list_13_4) to the base of the
    implementation file.


    **Listing 13–4.** *dealloc Method*


    `- (void)dealloc {`

    `    [super dealloc];`

    `}`


    If you try to build the project now, you should still receive an error. It’ll
    be some sort of mach-o-link error about the reference to `HelloWorldLayer` in
    your `AppDelegate` class. Open `AppDelegate.m` in Xcode and change the `HelloWorldLayerimport`
    statement to now import `FaceDetectionLayer.h`.


    Find the code in [Listing 13–5](#Chapter13.html#list_13_5) and replace it with
    the code in [Listing 13–6](#Chapter13.html#list_13_6).


    **Listing 13–5.** *Find This . . .*


    `// Run the intro Scene`

    `[[CCDirector sharedDirector] runWithScene: [HelloWorldLayer scene]];`


    **Listing 13–6.** *Replace with This . . .*


    `// Run the intro Scene`

    ` [[CCDirector sharedDirector] runWithScene: [`**`FaceDetectionLayer`** `scene]];`


    Your project should be building with no errors at this point. There is still absolutely
    no functionality here, but we are at least ready to start moving forward.


    I should point out that some of what we just added isn’t actually going to be
    needed in the end application. This is the point in the project where a typical
    application might start off. We have a `CCNode` class that has a static method
    for returning our main theme. However, we need to do things a bit differently
    in this example. When we end up removing some of the code we just added later
    on, this will make more sense.'
  trans: "\n### 项目结构\n\n我们来创建项目。打开 Xcode，并使用 cocos2D 模板创建一个新项目，如图 13-3 所示。\n\n![Image](img/1303.jpg)\n\
    \n**图 13-3.** *创建一个新的 cocos2D 项目。*\n\n将项目命名为 `Ch13`。如果需要参考可运行的源代码，可以从 [`https://github.com/kyleroche/Professional_iOS_AugmentedReality`](https://github.com/kyleroche/Professional_iOS_AugmentedReality)\
    \ 或 [`www.apress.com`](http://www.apress.com) 获取。\n\n首先，确保我们拥有运行此应用程序所需的所有引用。添加如图\
    \ 13-4 所示的框架和库。\n\n![Image](img/1304.jpg)\n\n**图 13-4.** *添加必需的框架。*\n\n在继续之前，你应该确保项目在构建时没有错误。cocos2D\
    \ 通常会有一些警告信息。如果看到任何警告（与我们所编写的代码无关的警告），可以忽略它们。\n\n在你的 Xcode 项目中创建一个名为 `HUD` 的新组。我们将把\
    \ HUD 叠加层的资源存储在这个文件夹中。在此组中创建一个新文件。使用 cocos2D 集合中的 `CCNode` 类模板。确保新文件使用 `CCLayer`\
    \ 子类。将文件命名为 `HUDLayer.m`。\n\n在 GitHub 仓库中（位于 Ch13 目录下）有一个名为 `crosshair.png` 的文件。将此文件复制到你的项目中。通常，你应该将其放在项目的\
    \ Resources 文件夹中。确保在将文件复制到项目时，选择了“`如果需要，将项目复制到目标组文件夹中`”。`crosshair.png` 文件如图 13-5\
    \ 所示。我们将把它放置在摄像头视图中被识别人脸的 x、y 坐标上。\n\n![Image](img/1305.jpg)\n\n**图 13-5.** *将\
    \ `crosshair.png`（用于人脸叠加）复制到你的项目中。*\n\n接下来，我们需要创建一个类来保存人脸识别例程的逻辑。将这个类命名为 `FaceDetectionLayer`。使用\
    \ `CCNode` 模板创建另一个类，并确保它也是 `CCLayer` 的子类。此文件应命名为 `FaceDetectionLayer.m`。\n\n现在，因为我有点洁癖，我要对默认设置做一个快速更改，删除一些我们不会用到的文件。删除\
    \ `HelloWorldLayer.h` 和 `HelloWorldLayer.m`。在提示时，可以永久删除这些文件。\n\n在 Xcode 中打开 `FaceDetectionLayer.h`，让我们开始构建。\n\
    \n### 设置主场景\n\n删除 `HelloWorldLayer` 对于清理工作很有帮助，但这导致我们的项目中没有主场景。此时，项目将无法构建。在 AppDelegate\
    \ 中，我们引用了 `HelloWorldLayer` 场景。\n\n你应该已经在 Xcode 中打开了 `FaceDetectionLayer.h`。导入\
    \ `HUDLayer.h` 头文件，以便稍后在项目中引用它。创建一个名为 `_hud` 的私有变量来引用 HUD 层类。同时，声明一个静态方法来返回 `scene`\
    \ 对象，并创建一个名为 `initWithHUD` 的新方法，就像我们在第 7 章的示例中所做的那样。\n\n新的 `FaceDetectionLayer.h`\
    \ 文件应如代码清单 13-1 所示。\n\n**代码清单 13-1.** *更新后的 `FaceDetectionLayer.h`*\n\n`#import\
    \ <Foundation/Foundation.h>`\n`#import \"cocos2d.h\"`\n**`#import \"HUDLayer.h\"\
    `**\n\n`@interface FaceDetectionLayer : CCLayer {`\n**`HUDLayer *_hud;`**\n`}`\n\
    \n**`+ (CCScene *)scene;`**\n**`- (id)initWithHUD:(HUDLayer *)hud;`**\n\n`@end`\n\
    \n切换到 `FaceDetectionLayer.m`。添加代码清单 13-2 中的方法。\n\n**代码清单 13-2.** *静态场景方法*\n\n\
    ```\n+ (CCScene *)scene {\n    CCScene *scene = [CCScene node];\n\n    HUDLayer\
    \ *hud = [HUDLayer node];\n    [scene addChild:hud z:1];\n\n    FaceDetectionLayer\
    \ *layer = [[[FaceDetectionLayer alloc] initWithHUD:hud] autorelease];\n    [scene\
    \ addChild:layer];\n\n    return scene;\n}\n```\n\n这个方法应该看起来很熟悉（除非你跳过了第 7 章）。我们正在为\
    \ cocos2D 创建一个新场景。然后，创建一个额外的 `HUDLayer` 实例，其 `z` 索引高于主场景。这将使我们能够轻松地在摄像头视图（将处理人脸检测）上叠加一些有用的图形，例如十字准线\
    \ PNG 文件或关于目标情绪（快乐、悲伤、中性）的文本信息。\n\n最后，我们调用 `initWithHUD` 方法。说到这个方法，我们也需要添加该代码。在静态场景方法之后，添加代码清单\
    \ 13-3 中的方法。\n\n**代码清单 13-3.** *`initWithHUD` 方法*\n\n```\n- (id)initWithHUD:(HUDLayer\
    \ *)hud {\n    if (self = [super init]) {\n        _hud = hud;\n    }\n    return\
    \ self;\n}\n```\n\n此方法仅替代 cocos2D 模板提供的默认 `init` 方法。我们使用 HUD 实例创建自己的层，而不是单独的基础层。\n\
    \n最后一项要添加到 `FaceDetectionLayer.m` 中的是 `dealloc` 方法。在实现文件的末尾添加代码清单 13-4 中的方法。\n\
    \n**代码清单 13-4.** *`dealloc` 方法*\n\n```\n- (void)dealloc {\n    [super dealloc];\n\
    }\n```\n\n如果现在尝试构建项目，你应该仍然会收到一个错误。它会是某种关于在 `AppDelegate` 类中引用 `HelloWorldLayer`\
    \ 的 mach-o 链接错误。在 Xcode 中打开 `AppDelegate.m`，将 `HelloWorldLayer` 的导入语句更改为导入 `FaceDetectionLayer.h`。\n\
    \n找到代码清单 13-5 中的代码，并将其替换为代码清单 13-6 中的代码。\n\n**代码清单 13-5.** *找到这段代码……*\n\n```\n\
    // 运行介绍场景\n[[CCDirector sharedDirector] runWithScene: [HelloWorldLayer scene]];\n\
    ```\n\n**代码清单 13-6.** *将其替换为……*\n\n```\n// 运行介绍场景\n [[CCDirector sharedDirector]\
    \ runWithScene: [FaceDetectionLayer scene]];\n```\n\n此时，你的项目应该可以无错误地构建了。这里仍然完全没有功能，但我们至少已经准备好开始向前推进了。\n\
    \n我应该指出，我们刚刚添加的一些内容实际上在最终应用程序中并不会被用到。这是项目中典型应用程序可能开始的地方。我们有一个 `CCNode` 类，它有一个用于返回主主题的静态方法。但是，在这个示例中，我们需要稍微以不同的方式处理事情。当我们稍后删除刚刚添加的一些代码时，这将更有意义。\n"
- fmt: "#### Enabling the Camera\n\nI’m sure you’re waiting to see the camera view,\
    \ so let’s get to it. Open `AppDelegate.h` in Xcode. Import the `AVFoundation`\
    \ header and the `FaceDetectionLayer` header. Next, nominate the `AppDelegate`\
    \ as an `AVCaptureVideoDataOutputSampleBufferDelegate`.\n\nWe also need to declare\
    \ a private `AVCaptureSession` variable called `_session` and create a `void`\
    \ method called `setupCaptureSession` that will be used to store the preferences\
    \ for our capture session.\n\nYour modified `AppDelegate.h` file should look like\
    \ [Listing 13–7](#Chapter13.html#list_13_7).\n\n**Listing 13–7.** *AppDelegate.h\
    \ After Updates*\n\n```\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n\
    #import \"FaceDetectionLayer.h\"\n\n@class RootViewController;\n\n@interface AppDelegate\
    \ : NSObject <UIApplicationDelegate,\nAVCaptureVideoDataOutputSampleBufferDelegate>\
    \ {\n    UIWindow           *window;\n    RootViewController *viewController;\n\
    \nAVCaptureSession *_session;\n}\n\n@property (nonatomic, retain) UIWindow *window;\n\
    - (void)setupCaptureSession;\n\n@end\n```\n\nSwitch over to `AppDelegate.m`. You\
    \ can now remove the reference to `FaceDetectionLayer`, as we have it on our header\
    \ file. Find the section of code shown in [Listing 13–8](#Chapter13.html#list_13_8).\
    \ Replace it with the code shown in [Listing 13–9](#Chapter13.html#list_13_9).\n\
    \n**Listing 13–8.** *Find This . . .*\n\n```\nEAGLView *glView = [EAGLView viewWithFrame:[window\
    \ bounds]\n                 pixelFormat:kEAGLColorFormatRGB565 // kEAGLColorFormatRGBA8\n\
    \        depthFormat:0\n                                                     \
    \   // GL_DEPTH_COMPONENT16_OES\n        ];\n```\n\n**Listing 13–9.** *Replace\
    \ with This . . .*\n\n```\nEAGLView *glView = [EAGLView viewWithFrame:[window\
    \ bounds]\n                 pixelFormat:kEAGLColorFormatRGBA8 // kEAGLColorFormatRGBA8\n\
    \        depthFormat:0\n                                                     \
    \  // GL_DEPTH_COMPONENT16_OES\n        ];\n```\n\nWe discussed this briefly in\
    \ [Chapter 7](#Chapter07.html#ch7) as well. We need to change the default `pixelFormat`\
    \ if we want to overlay our application layers on the camera instead of a static\
    \ background class.\n\nI’m going to add a small utility method here to make debugging\
    \ easier. If you’re testing this in a crowd somewhere or have plenty of test subjects\
    \ to which to point your iPad camera, you can skip this step. Otherwise, the lone\
    \ wolf coder might benefit from using the front-facing camera for this example.\
    \ Add the code from [Listing 13–10](#Chapter13.html#list_13_10) above the `dealloc`\
    \ method.\n\n**Listing 13–10.** *Check for Front-Facing Camera*\n\n```\n-(AVCaptureDevice\
    \ *)frontFacingCameraIfAvailable\n{\n    NSArray *videoDevices = [AVCaptureDevice\
    \ devicesWithMediaType:AVMediaTypeVideo];\n    AVCaptureDevice *captureDevice\
    \ = nil;\n    for (AVCaptureDevice *device in videoDevices)\n    {\n        if\
    \ (device.position == AVCaptureDevicePositionFront)\n        {\n            captureDevice\
    \ = device;\n            break;\n        }\n    }\n\n    if ( ! captureDevice)\n\
    \    {\n        captureDevice = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
    \    }\n\n    return captureDevice;\n}\n```\n\nThis method simply checks for the\
    \ front-facing camera and returns a reference to it, if it exists. If it does\
    \ not exist, it returns the rear-facing camera. We will use this method when setting\
    \ the capture device.\n\nIn the header file, we declared a method called `setupCaptureSession`.\
    \ Let’s create that now. Add the method from [Listing 13–11](#Chapter13.html#list_13_11)\
    \ just below the `frontFacingCameraIfAvailable` method we just added.\n\n**Listing\
    \ 13–11.** *Set Up the CaptureSession*\n\n```\n- (void)setupCaptureSession\n{\n\
    \    NSError *error = nil;\n\n    // Create the session.\n    _session = [[AVCaptureSession\
    \ alloc] init];\n\n    // Configure the session to produce lower resolution video\
    \ frames, if your\n    // processing algorithm can cope. We'll specify medium\
    \ quality for the\n    // chosen device.\n    _session.sessionPreset = AVCaptureSessionPresetMedium;\n\
    \n    // Find a suitable AVCaptureDevice.\n    AVCaptureDevice *device = [self\
    \ frontFacingCameraIfAvailable];/*[AVCaptureDevice\n\ndefaultDeviceWithMediaType:AVMediaTypeVideo];*/\n\
    \n    // Create a device input with the device and add it to the session.\n  \
    \  AVCaptureDeviceInput *input = [AVCaptureDeviceInput deviceInputWithDevice:device\n\
    \                                                                        error:&error];\n\
    \    if (!input) {\n        // Handling the error appropriately.\n    }\n    [_session\
    \ addInput:input];\n\n    // Create a VideoDataOutput and add it to the session.\n\
    \    AVCaptureVideoDataOutput *output = [[AVCaptureVideoDataOutput alloc] init];\n\
    \    [_session addOutput:output];\n\n    // Configure your output.\n    dispatch_queue_t\
    \ queue = dispatch_queue_create(\"chapter13\", NULL);\n    [output setSampleBufferDelegate:self\
    \ queue:queue];\n    dispatch_release(queue);\n\n    // Specify the pixel format.\n\
    \    output.videoSettings =\n    [NSDictionary dictionaryWithObject:\n     [NSNumber\
    \ numberWithInt:kCVPixelFormatType_32BGRA]\n                                forKey:(id)kCVPixelBufferPixelFormatTypeKey];\n\
    \n    // If you wish to cap the frame rate to a known value, such as 15 fps, set\n\
    \    // minFrameDuration.\n\n    //output.minFrameDuration = CMTimeMake(1, 15);\n\
    \n    // Start the session running to start the flow of data.\n    [_session startRunning];\n\
    }\n```\n\nSome of this code is straight from the Apple developer’s documentation.\
    \ Let’s walk through it from the top. After we set up a placeholder for any unforeseen\
    \ errors, we create a new instance of `AVCaptureSession`. As we discussed in Chapter\
    \ 6, this class is used for capturing video frames from the camera. It’s a bit\
    \ more flexible than displaying the `UIImagePicker` to the user.\n\nNext, we use\
    \ the utility method we created earlier to detect whether there is a front-facing\
    \ camera available. If you don’t have one, or you actually are testing this app\
    \ in a crowd, I left the default option in the code comments for you to use. Using\
    \ our camera device, we set up the `AVCaptureDeviceInput` object and add the input\
    \ to our `AVCaptureSession`.\n\nWe are also going to use the video output in this\
    \ example. So, we next allocate a new `AVCaptureVideoDataOutput` object and add\
    \ that to our `AVCaptureSession`.\n\nThis next step is new for us. We need to\
    \ set up a `dispatch_queue_t` ivar to hold our queued up video frames. We aren’t\
    \ discussing GCD (Grand Central Dispatch) in this example, but it would be interesting\
    \ to extend this chapter to use GCD instead of the normal `dispatch_queue_t` ivar\
    \ we have set up.\n\nFinally, we set the `pixelFormat` of our `AVCaptureVideoDataOutput`\
    \ instance, and then we can finally start the capture session.\n\nSo, I think\
    \ we’re caught up. Find the last line of the `applicationDidFinishLaunching` method\
    \ and add the code from [Listing 3-12](#Chapter13.html#list_3_12).\n\n**Listing\
    \ 13–12.** *Call Our New Method*\n\n```\n[self setupCaptureSession];\n```\n\n\
    If you run the application now, you’ll just see the black screen. This is because\
    \ our background was never set to transparent. Find the line of code shown in\
    \ [Listing 13–13](#Chapter13.html#list_13_13). It’s located in the middle of the\
    \ `applicationDidFinishLaunching` method.\n\n**Listing 13–13.** *Find This Section\
    \ . . .*\n\n```\n// make the View Controller a child of the main window\n [window\
    \ addSubview: viewController.view];\n```"
  raw: '#### Enabling the Camera


    I’m sure you’re waiting to see the camera view, so let’s get to it. Open `AppDelegate.h`
    in Xcode. Import the `AVFoundation` header and the `FaceDetectionLayer` header.
    Next, nominate the `AppDelegate` as an `AVCaptureVideoDataOutputSampleBufferDelegate`.


    We also need to declare a private `AVCaptureSession` variable called `_session`
    and create a `void` method called `setupCaptureSession` that will be used to store
    the preferences for our capture session.


    Your modified `AppDelegate.h` file should look like [Listing 13–7](#Chapter13.html#list_13_7).


    **Listing 13–7.** *AppDelegate.h After Updates*


    `#import <UIKit/UIKit.h>`

    **`#import <AVFoundation/AVFoundation.h>`**

    **`#import "FaceDetectionLayer.h"`**


    `@class RootViewController;`


    `@interface AppDelegate : NSObject <UIApplicationDelegate,`

    **`AVCaptureVideoDataOutputSampleBufferDelegate`**`> {`

    `    UIWindow           *window;`

    `    RootViewController *viewController;`


    **`AVCaptureSession *_session;`**

    `}`


    `@property (nonatomic, retain) UIWindow *window;`

    **`- (void)setupCaptureSession;`**


    `@end`


    Switch over to `AppDelegate.m`. You can now remove the reference to `FaceDetectionLayer`,
    as we have it on our header file. Find the section of code shown in [Listing 13–8](#Chapter13.html#list_13_8).
    Replace it with the code shown in [Listing 13–9](#Chapter13.html#list_13_9).


    **Listing 13–8.** *Find This . . .*


    `EAGLView *glView = [EAGLView viewWithFrame:[window bounds]`

    `                 pixelFormat:kEAGLColorFormatRGB565 // kEAGLColorFormatRGBA8`

    `        depthFormat:0`

    `                                                        // GL_DEPTH_COMPONENT16_OES`

    `        ];`


    **Listing 13–9.** *Replace with This . . .*


    `EAGLView *glView = [EAGLView viewWithFrame:[window bounds]`

    `                 pixelFormat:`**`kEAGLColorFormatRGBA8`** `// kEAGLColorFormatRGBA8`

    `        depthFormat:0`

    `                                                       // GL_DEPTH_COMPONENT16_OES`

    `        ];`


    We discussed this briefly in [Chapter 7](#Chapter07.html#ch7) as well. We need
    to change the default `pixelFormat` if we want to overlay our application layers
    on the camera instead of a static background class.


    I’m going to add a small utility method here to make debugging easier. If you’re
    testing this in a crowd somewhere or have plenty of test subjects to which to
    point your iPad camera, you can skip this step. Otherwise, the lone wolf coder
    might benefit from using the front-facing camera for this example. Add the code
    from [Listing 13–10](#Chapter13.html#list_13_10) above the `dealloc` method.


    **Listing 13–10.** *Check for Front-Facing Camera*


    `-(AVCaptureDevice *)frontFacingCameraIfAvailable`

    `{`

    `    NSArray *videoDevices = [AVCaptureDevice devicesWithMediaType:AVMediaTypeVideo];`

    `    AVCaptureDevice *captureDevice = nil;`

    `    for (AVCaptureDevice *device in videoDevices)`

    `    {`

    `        if (device.position == AVCaptureDevicePositionFront)`

    `        {`

    `            captureDevice = device;`

    `            break;`

    `        }`

    `    }`


    `    if ( ! captureDevice)`

    `    {`

    `        captureDevice = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];`

    `    }`


    `    return captureDevice;`

    `}`


    This method simply checks for the front-facing camera and returns a reference
    to it, if it exists. If it does not exist, it returns the rear-facing camera.
    We will use this method when setting the capture device.


    In the header file, we declared a method called `setupCaptureSession`. Let’s create
    that now. Add the method from [Listing 13–11](#Chapter13.html#list_13_11) just
    below the `frontFacingCameraIfAvailable` method we just added.


    **Listing 13–11.** *Set Up the CaptureSession*


    `- (void)setupCaptureSession`

    `{`

    `    NSError *error = nil;`


    `    // Create the session.`

    `    _session = [[AVCaptureSession alloc] init];`


    `    // Configure the session to produce lower resolution video frames, if your`

    `    // processing algorithm can cope. We''ll specify medium quality for the`

    `    // chosen device.`

    `    _session.sessionPreset = AVCaptureSessionPresetMedium;`


    `    // Find a suitable AVCaptureDevice.`

    `    AVCaptureDevice *device = [self frontFacingCameraIfAvailable];/*[AVCaptureDevice`


    `defaultDeviceWithMediaType:AVMediaTypeVideo];*/`


    `    // Create a device input with the device and add it to the session.`

    `    AVCaptureDeviceInput *input = [AVCaptureDeviceInput deviceInputWithDevice:device`

    `                                                                        error:&error];`

    `    if (!input) {`

    `        // Handling the error appropriately.`

    `    }`

    `    [_session addInput:input];`


    `    // Create a VideoDataOutput and add it to the session.`

    `    AVCaptureVideoDataOutput *output = [[AVCaptureVideoDataOutput alloc] init];`

    `    [_session addOutput:output];`


    `    // Configure your output.`

    `    dispatch_queue_t queue = dispatch_queue_create("chapter13", NULL);`

    `    [output setSampleBufferDelegate:self queue:queue];`

    `    dispatch_release(queue);`


    `    // Specify the pixel format.`

    `    output.videoSettings =`

    `    [NSDictionary dictionaryWithObject:`

    `     [NSNumber numberWithInt:kCVPixelFormatType_32BGRA]`

    `                                forKey:(id)kCVPixelBufferPixelFormatTypeKey];`


    `    // If you wish to cap the frame rate to a known value, such as 15 fps, set`

    `    // minFrameDuration.`


    `    //output.minFrameDuration = CMTimeMake(1, 15);`


    `    // Start the session running to start the flow of data.`

    `    [_session startRunning];`

    `}`


    Some of this code is straight from the Apple developer’s documentation. Let’s
    walk through it from the top. After we set up a placeholder for any unforeseen
    errors, we create a new instance of `AVCaptureSession`. As we discussed in Chapter
    6, this class is used for capturing video frames from the camera. It’s a bit more
    flexible than displaying the `UIImagePicker` to the user.


    Next, we use the utility method we created earlier to detect whether there is
    a front-facing camera available. If you don’t have one, or you actually are testing
    this app in a crowd, I left the default option in the code comments for you to
    use. Using our camera device, we set up the `AVCaptureDeviceInput` object and
    add the input to our `AVCaptureSession`.


    We are also going to use the video output in this example. So, we next allocate
    a new `AVCaptureVideoDataOutput` object and add that to our `AVCaptureSession`.


    This next step is new for us. We need to set up a `dispatch_queue_t`ivar to hold
    our queued up video frames. We aren’t discussing GCD (Grand Central Dispatch)
    in this example, but it would be interesting to extend this chapter to use GCD
    instead of the normal `dispatch_queue_t`ivar we have set up.


    Finally, we set the `pixelFormat` of our `AVCaptureVideoDataOutput` instance,
    and then we can finally start the capture session.


    So, I think we’re caught up. Find the last line of the `applicationDidFinishLaunching`
    method and add the code from [Listing 3-12](#Chapter13.html#list_3_12).


    **Listing 13–12.** *Call Our New Method*


    `[self setupCaptureSession];`


    If you run the application now, you’ll just see the black screen. This is because
    our background was never set to transparent. Find the line of code shown in [Listing
    13–13](#Chapter13.html#list_13_13). It’s located in the middle of the `applicationDidFinishLaunching`
    method.


    **Listing 13–13.** *Find This Section . . .*


    `// make the View Controller a child of the main window`

    ` [window addSubview: viewController.view];`'
  trans: "\n#### 启用摄像头\n\n我确信你正期待着查看摄像头视图，那么我们就开始吧。在 Xcode 中打开 `AppDelegate.h`。导入\
    \ `AVFoundation` 头文件和 `FaceDetectionLayer` 头文件。接着，将 `AppDelegate` 声明为遵守 `AVCaptureVideoDataOutputSampleBufferDelegate`\
    \ 协议。\n\n我们还需要声明一个名为 `_session` 的私有 `AVCaptureSession` 变量，并创建一个名为 `setupCaptureSession`\
    \ 的 `void` 方法，用于存储我们采集会话的偏好设置。\n\n修改后的 `AppDelegate.h` 文件应如代码清单 13-7 所示。\n\n**代码清单\
    \ 13-7.** *更新后的 AppDelegate.h*\n\n```\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n\
    #import \"FaceDetectionLayer.h\"\n\n@class RootViewController;\n\n@interface AppDelegate\
    \ : NSObject <UIApplicationDelegate,\nAVCaptureVideoDataOutputSampleBufferDelegate>\
    \ {\n    UIWindow           *window;\n    RootViewController *viewController;\n\
    \nAVCaptureSession *_session;\n}\n\n@property (nonatomic, retain) UIWindow *window;\n\
    - (void)setupCaptureSession;\n\n@end\n```\n\n切换到 `AppDelegate.m`。现在可以移除对 `FaceDetectionLayer`\
    \ 的引用了，因为我们已在头文件中包含了它。找到代码清单 13-8 中所示的代码段，并用代码清单 13-9 中的代码替换它。\n\n**代码清单 13-8.**\
    \ *找到这段代码 . . .*\n\n```\nEAGLView *glView = [EAGLView viewWithFrame:[window bounds]\n\
    \                 pixelFormat:kEAGLColorFormatRGB565 // kEAGLColorFormatRGBA8\n\
    \        depthFormat:0\n                                                     \
    \   // GL_DEPTH_COMPONENT16_OES\n        ];\n```\n\n**代码清单 13-9.** *替换为这段代码 .\
    \ . .*\n\n```\nEAGLView *glView = [EAGLView viewWithFrame:[window bounds]\n  \
    \               pixelFormat:kEAGLColorFormatRGBA8 // kEAGLColorFormatRGBA8\n \
    \       depthFormat:0\n                                                      \
    \ // GL_DEPTH_COMPONENT16_OES\n        ];\n```\n\n我们在第 7 章中也简要讨论过这一点。如果希望将应用图层覆盖在摄像头上而不是静态背景上，就需要更改默认的\
    \ `pixelFormat`。\n\n我准备在这里添加一个实用方法，以便简化调试过程。如果你在人群中测试，或者有大量测试对象可供 iPad 摄像头对准，可以跳过此步骤。否则，对于独狼式开发者来说，在此示例中使用前置摄像头或许会很有帮助。在\
    \ `dealloc` 方法上方添加代码清单 13-10 中的代码。\n\n**代码清单 13-10.** *检查前置摄像头*\n\n```\n-(AVCaptureDevice\
    \ *)frontFacingCameraIfAvailable\n{\n    NSArray *videoDevices = [AVCaptureDevice\
    \ devicesWithMediaType:AVMediaTypeVideo];\n    AVCaptureDevice *captureDevice\
    \ = nil;\n    for (AVCaptureDevice *device in videoDevices)\n    {\n        if\
    \ (device.position == AVCaptureDevicePositionFront)\n        {\n            captureDevice\
    \ = device;\n            break;\n        }\n    }\n\n    if ( ! captureDevice)\n\
    \    {\n        captureDevice = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
    \    }\n\n    return captureDevice;\n}\n```\n\n此方法仅检查前置摄像头，如果存在则返回其引用。如果不存在，则返回后置摄像头。我们在设置采集设备时将用到此方法。\n\
    \n在头文件中，我们声明了一个名为 `setupCaptureSession` 的方法。现在就来创建它。在刚添加的 `frontFacingCameraIfAvailable`\
    \ 方法下方，添加代码清单 13-11 中的方法。\n\n**代码清单 13-11.** *设置采集会话*\n\n```\n- (void)setupCaptureSession\n\
    {\n    NSError *error = nil;\n\n    // 创建会话。\n    _session = [[AVCaptureSession\
    \ alloc] init];\n\n    // 如果处理算法能够应对，则将会话配置为生成较低分辨率的视频帧。\n    // 我们将为所选设备指定中等质量。\n\
    \    _session.sessionPreset = AVCaptureSessionPresetMedium;\n\n    // 查找合适的 AVCaptureDevice。\n\
    \    AVCaptureDevice *device = [self frontFacingCameraIfAvailable];/*[AVCaptureDevice\n\
    \ndefaultDeviceWithMediaType:AVMediaTypeVideo];*/\n\n    // 使用该设备创建设备输入并将其添加到会话中。\n\
    \    AVCaptureDeviceInput *input = [AVCaptureDeviceInput deviceInputWithDevice:device\n\
    \                                                                        error:&error];\n\
    \    if (!input) {\n        // 妥善处理错误。\n    }\n    [_session addInput:input];\n\
    \n    // 创建一个 VideoDataOutput 并将其添加到会话中。\n    AVCaptureVideoDataOutput *output\
    \ = [[AVCaptureVideoDataOutput alloc] init];\n    [_session addOutput:output];\n\
    \n    // 配置输出。\n    dispatch_queue_t queue = dispatch_queue_create(\"chapter13\"\
    , NULL);\n    [output setSampleBufferDelegate:self queue:queue];\n    dispatch_release(queue);\n\
    \n    // 指定像素格式。\n    output.videoSettings =\n    [NSDictionary dictionaryWithObject:\n\
    \     [NSNumber numberWithInt:kCVPixelFormatType_32BGRA]\n                   \
    \             forKey:(id)kCVPixelBufferPixelFormatTypeKey];\n\n    // 若希望将帧率限制到一个已知值，例如\
    \ 15 fps，请设置\n    // minFrameDuration。\n\n    //output.minFrameDuration = CMTimeMake(1,\
    \ 15);\n\n    // 启动会话运行以开始数据流。\n    [_session startRunning];\n}\n```\n\n其中部分代码直接来自苹果开发者文档。我们从顶部开始逐步说明。在设置好一个用于存放任何不可预见错误的占位符之后，我们创建了一个\
    \ `AVCaptureSession` 的新实例。正如我们在第 6 章中讨论的，该类用于从摄像头采集视频帧。它比向用户显示 `UIImagePicker`\
    \ 更灵活一些。\n\n接着，我们使用之前创建的实用方法来检测是否有前置摄像头可用。如果你没有前置摄像头，或者你确实在人群中测试此应用，我在代码注释中留下了默认选项供你使用。利用我们的摄像头设备，我们设置了\
    \ `AVCaptureDeviceInput` 对象，并将该输入添加到我们的 `AVCaptureSession` 中。\n\n在这个示例中，我们还将使用视频输出。因此，接下来我们分配了一个新的\
    \ `AVCaptureVideoDataOutput` 对象，并将其添加到 `AVCaptureSession` 中。\n\n下一步对我们来说是新的。我们需要设置一个\
    \ `dispatch_queue_t` 实例变量来存放我们排队等待的视频帧。在此示例中我们不讨论 GCD（Grand Central Dispatch），但扩展本章内容以使用\
    \ GCD 来代替我们设置的普通 `dispatch_queue_t` 实例变量会很有趣。\n\n最后，我们设置了 `AVCaptureVideoDataOutput`\
    \ 实例的 `pixelFormat`，然后就可以启动采集会话了。\n\n所以，我想我们已经同步了。找到 `applicationDidFinishLaunching`\
    \ 方法的最后一行，并添加代码清单 3-12 中的代码。\n\n**代码清单 13–12.** *调用我们的新方法*\n\n```\n[self setupCaptureSession];\n\
