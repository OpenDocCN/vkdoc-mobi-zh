    \n请记住，这是一个 iPad 应用程序。iPad 要求`UIImagePickerController`显示在`UIPopoverController`中，而不是`ModalViewController`中。这与\
    \ iPhone 或 iPod touch 不同，因此如果您不是在 iPad 上测试，请确保在一个模态对话框中启动所有的`UIImagePickerController`，而不是在`UIPopoverController`中。\n\
    \n用户选择图像后，`UIImagePickerController`类（正如您可能从第 6 章回忆的那样）会调用其`didFinishPickingImage`委托方法。我们将使用代码清单\
    \ 12-5 中的代码来处理该方法。\n\n**代码清单 12–5.** *`UIImagePickerController` 委托方法*\n\n```\n\
    - (void)imagePickerController:(UIImagePickerController *)picker\ndidFinishPickingImage:(UIImage\
    \ *)image editingInfo:(NSDictionary *)editingInfo {\n    [self dismissModalViewControllerAnimated:YES];\n\
    \    cameraView.image = image;\n}\n```\n\n您的应用程序现在应该可以在模拟器或物理设备上进行测试。运行应用程序。点击工具栏中的摄像头按钮，您将看到一个`UIActionSheet`，如图\
    \ 12–4 所示。\n\n如果您在模拟器上运行，请确保选择**Library**或**Photo Album**。您将看到一个类似于图 12–5 的弹出窗口。如果您选择**Camera**视图，您将看到摄像头全屏显示。\n\
    \n![Image](img/1204.jpg)\n\n**图 12–4.** *从`UIActionSheet`中选择摄像头源。*\n\n![Image](img/1205.jpg)\n\
    \n**图 12–5.** *`UIPopoverController`在 iPad 上显示`UIImagePickerController`。*\n\n\
    #### Haar 级联\n\n在我们对 OpenCV 进行操作之前，需要向项目中添加几个 Haar 级联。Haar 级联是一组用于物体识别的组织化的分类器级联或数字图像特征。其名称来源于最早用于人脸检测系统的\
    \ Haar 小波。\n\n在 Haar 小波出现之前，图像识别分析每个像素 RGB 值的强度，这需要相当多的时间和计算资源。Haar 级联用于分析检测窗口的相邻矩形区域，并对这些区域的像素强度进行求和，以便相互比较，而不是逐像素比较。Viola\
    \ 和 Jones 在 2001 年发表的论文《使用简单特征的增强级联进行快速物体检测》（已在 2001 年计算机视觉与模式识别会议上被接受）中记录了这种方法。^(1)\n\
    \n如果您想进一步研究这个主题，该算法背后的数学原理有详尽的文档记录。我们将使用 OpenCV 源代码发行版中自带的 Haar 级联。您可以在[`http://opencv.willowgarage.com/wiki/`](http://opencv.willowgarage.com/wiki/)找到该发行版。如果您不想再下载另一个版本的\
    \ OpenCV（准确地说，这是原始版本），您可以只需从本书在 GitHub 上的示例代码或 Apress 网站（[`www.apress.com`](http://www.apress.com)）的源代码/下载区域复制这些文件。\n\
    \n找到您将要使用的级联目录，并将它们拖放到您的 Xcode 项目中。确保选择了按需复制资源的选项。\n\n**注意：** 如果您已经为 iOS 5 编译了自己的\
    \ OpenCV 发行版，可以跳过下一节。将您编译好的库添加到项目中，一切就绪。\n\n切换到`MainViewController.m`。在`import`语句之后，添加代码清单\
    \ 12-6 中的代码。\n\n**代码清单 12–6.** *私有方法*\n\n```\n@interface MainViewController (Private)\n\
    - (IplImage *)createIplImage:(UIImage *)image;\n- (void)openCVFaceDetect;\n@end\n\
    ```\n\n我们只是声明了几个将用于分析图像的私有方法。现在让我们实现这些方法，然后我们逐步讲解它们。\n\n__________\n\n¹ 你可以在[`http://research.microsoft.com/enus/um/people/viola/Pubs/Detect/violaJones_CVPR2001.pdf`](http://research.microsoft.com/enus/um/people/viola/Pubs/Detect/violaJones_CVPR2001.pdf)找到整篇论文。\n\
    \n首先，将代码清单 12-7 中的方法添加到实现中。正如我之前提到的，这两个实用方法来自 eosgarden 示例项目。它们按原样在 iOS 5 上无法工作，但我们稍后会修复这个问题。\n\
    \n**代码清单 12–7.** *`createIplImage` 方法*\n\n```\n- ( IplImage * )createIplImage:\
    \ ( UIImage * )image\n{\n    CGImageRef      imageRef;\n    CGColorSpaceRef colorSpaceRef;\n\
    \    CGContextRef    context;\n    IplImage      * iplImage;\n    IplImage   \
    \   * returnImage;\n\n    imageRef      = image.CGImage;\n    colorSpaceRef =\
    \ CGColorSpaceCreateDeviceRGB();\n    iplImage      = cvCreateImage( cvSize( image.size.width,\
    \ image.size.height ),\nIPL_DEPTH_8U, 4 );\n    context       = CGBitmapContextCreate\n\
    \    (\n     iplImage->imageData,\n     iplImage->width,\n     iplImage->height,\n\
    \     iplImage->depth,\n     iplImage->widthStep,\n     colorSpaceRef,\n     kCGImageAlphaPremultipliedLast\
    \ | kCGBitmapByteOrderDefault\n     );\n\n    CGContextDrawImage( context, CGRectMake(\
    \ 0, 0, image.size.width, image.size.height\n), imageRef );\n    CGContextRelease(\
    \ context );\n    CGColorSpaceRelease( colorSpaceRef );\n\n    returnImage = cvCreateImage(\
    \ cvGetSize( iplImage ), IPL_DEPTH_8U, 3 );\n\n    cvCvtColor( iplImage, returnImage,\
    \ CV_RGBA2BGR );\n    cvReleaseImage( &iplImage );\n\n    return returnImage;\n\
    }\n```"
- fmt: "# OpenCV 与 iOS 图像处理\n\n当我们从相机或相册获取所选图像后，会将其存储在`UIImageView`中。由于OpenCV无法直接使用`UIImage`格式，因此需要将图像转换为它能处理的格式。OpenCV使用名为`IplImage`的格式，该格式属于Intel图像处理库（Intel\
    \ Image Processing Library）的一部分。对于本演示而言，我们只需了解这些基本信息即可。互联网上提供了许多类似的辅助函数，例如来自`eosgarden`的函数。\n\
    \n我们的转换方法将在OpenCV处理块内部调用，该方法接收`UIImage`并绘制一个具有相同表示的新`IplImage`。其尺寸和颜色将足够接近，使我们仍能使用x,y坐标在检测到的每张人脸周围叠加一个半透明矩形。\n\
    \n接下来，将[列表12–8](#Chapter12.html#list_12_8)中的方法复制到实现部分。\n\n**列表12–8.** `openCVFaceDetect`方法\n\
    \n```\n- ( void )openCVFaceDetect\n{\n    NSInteger                 i;\n    NSUInteger\
    \                scale;\n    NSAutoreleasePool       * pool;\n    IplImage   \
    \             * image;\n    IplImage                * smallImage;\n    NSString\
    \                * xmlPath;\n    CvHaarClassifierCascade * cascade;\n    CvMemStorage\
    \            * storage;\n    CvSeq                   * faces;\n    UIAlertView\
    \             * alert;\n    CGImageRef                imageRef;\n    CGColorSpaceRef\
    \           colorSpaceRef;\n    CGContextRef              context;\n    CvRect\
    \                    rect;\n    CGRect                    faceRect;\n\n    pool\
    \  = [ [ NSAutoreleasePool alloc ] init ];\n    scale = 2;\n\n    cvSetErrMode(\
    \ CV_ErrModeParent );\n\n    xmlPath    = [ [ NSBundle mainBundle ] pathForResource:\
    \ @\"haarcascade_frontalface_default\" ofType: @\"xml\" ];\n    image      = [\
    \ self createIplImage: cameraView.image ];\n    smallImage = cvCreateImage( cvSize(\
    \ image->width / scale, image->height / scale ),\nIPL_DEPTH_8U, 3 );\n\n    cvPyrDown(\
    \ image, smallImage, CV_GAUSSIAN_5x5 );\n\n    cascade = ( CvHaarClassifierCascade\
    \ * )cvLoad( [ xmlPath cStringUsingEncoding:\nNSASCIIStringEncoding ], NULL, NULL,\
    \ NULL );\n    storage = cvCreateMemStorage( 0 );\n    faces   = cvHaarDetectObjects(\
    \ smallImage, cascade, storage, ( float )1.2, 2,\nCV_HAAR_DO_CANNY_PRUNING, cvSize(\
    \ 20, 20 ) );\n\n    cvReleaseImage( &smallImage );\n\n    imageRef      = cameraView.image.CGImage;\n\
    \    colorSpaceRef = CGColorSpaceCreateDeviceRGB();\n    context       = CGBitmapContextCreate\n\
    \    (\n     NULL,\n     cameraView.image.size.width,\n     cameraView.image.size.height,\n\
    \     8,\n     cameraView.image.size.width * 4,\n     colorSpaceRef,\n     kCGImageAlphaPremultipliedLast\
    \ | kCGBitmapByteOrderDefault\n     );\n\n    CGContextDrawImage\n    (\n    \
    \ context,\n     CGRectMake( 0, 0, cameraView.image.size.width, cameraView.image.size.height\
    \ ),\n     imageRef\n     );\n\n    CGContextSetLineWidth( context, 1 );\n   \
    \ CGContextSetRGBStrokeColor( context, ( CGFloat )0, ( CGFloat )0, ( CGFloat )0,\
    \ (\nCGFloat )0.5 );\n    CGContextSetRGBFillColor( context, ( CGFloat )1, ( CGFloat\
    \ )1, ( CGFloat )1, (\nCGFloat )0.5 );\n\n    if( faces->total == 0 )\n    {\n\
    \        alert = [ [ UIAlertView alloc ] initWithTitle: @\"No faces\" message:\
    \ @\"No faces\nwere detected in the picture. Please try with another one.\" delegate:\
    \ NULL\ncancelButtonTitle: @\"OK\" otherButtonTitles: nil ];\n\n        [ alert\
    \ show ];\n        [ alert release ];\n    }\n    else\n    {\n        for( i\
    \ = 0; i < faces->total; i++ )\n        {\n            rect     = *( CvRect *\
    \ )cvGetSeqElem( faces, i );\n            faceRect = CGContextConvertRectToDeviceSpace(\
    \ context, CGRectMake( rect.x *\nscale, rect.y * scale, rect.width * scale, rect.height\
    \ * scale ) );\n\n            CGContextFillRect( context, faceRect );\n      \
    \      CGContextStrokeRect( context, faceRect );\n        }\n\n        cameraView.image\
    \ = [ UIImage imageWithCGImage: CGBitmapContextCreateImage(\ncontext ) ];\n  \
    \  }\n```"
