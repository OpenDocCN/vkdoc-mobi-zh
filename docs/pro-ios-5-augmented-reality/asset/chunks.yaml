    Before we step through this, make sure you substitute the real values for your
    face.com credentials in the code shown in bold. We’ll talk more about the second
    bolded section in a moment.


    The method is similar to our other two approaches to facial recognition. First,
    we set up an `NSAutoreleasePool` for memory management. Once again, we get the
    `UIImage` from the `cameraViewUIImageView`. However, this time we set up an HTTP
    POST request for the face.com API. We add the raw JPEG representation data to
    the POST body as a null parameter.


    Next, we analyze our response to make sure it didn’t throw an exception. If there’s
    no error, we move on to serialize the JSON response and convert it into an `NSDictionary`.


    Then, we simply print the response to the console. Update the `didFinishPickingImage`
    method one last time to comment out our previous approaches and call our new method.
    The updated method should read like [Listing 12–18](#Chapter12.html#list_12_18).


    **Listing 12–18.** *Updated didFinishPickingImage*


    `- (void)imagePickerController:(UIImagePickerController *)picker`

    `didFinishPickingImage:(UIImage *)image editingInfo:(NSDictionary *)editingInfo
    {`

    `    [self dismissModalViewControllerAnimated:YES];`

    `    cameraView.image = image;`


    `    //[self openCVFaceDetect];`

    `    //[self CIDetectorFaceDetect];`

    **`[self FaceDotComFaceDetect];`**

    `}`


    Before we run the application, let’s discuss the second section of bolded code
    from [Listing 12–17](#Chapter12.html#list_12_17). iOS 5 introduced native JSON
    support for framework objects. You use the new `NSJSONSerialization` class to
    convert JSON to Foundation objects and convert Foundation objects to JSON.


    An object that may be converted to JSON must have the following properties:


    *   The top-level object is an `NSArray` or `NSDictionary`.

    *   All objects are instances of `NSString`, `NSNumber`, `NSArray`, `NSDictionary`,
    or `NSNull`.

    *   All dictionary keys are instances of `NSString`.

    *   Numbers are not NaN or infinity.


    Okay, run the project. I’m going to select the same Elvis image again to keep
    things consistent. The console output from the new request is shown in [Listing
    12–19](#Chapter12.html#list_12_19).


