    \ Facebook 地点。我们将把坐标与人员名字以及 Facebook 地点名称叠加在一起。其他属性则存储我们正在追踪的地点的距离、倾斜角和方位角。\n\n\
    我们定义的方法将用于创建一个具有指定属性的新坐标实例。\n\n切换到 `ARCoordinate.m` 并完成这个类的实现。将 代码清单 11–15 中的代码添加到\
    \ `ARCoordinate.m` 中。\n\n**代码清单 11–15.** `ARCoordinate.m`\n\n```\n#import \"ARCoordinate.h\"\
    \n\n@implementation ARCoordinate\n\n@synthesize name = _name;\n@synthesize place\
    \ = _place;\n@synthesize distance = _distance;\n@synthesize inclination = _inclination;\n\
