  trans: "\n# 添加 HUD 层\n\n在 cocos2D 游戏中，“世界”通常比设备当前渲染的视图要大。因此，如果你只是将元素渲染到屏幕上，根据场景当前的焦点位置，它们可能会出现轻微的对齐偏差。HUD（平视显示器）层通常用于解决这个问题。HUD\
    \ 层是在我们场景的动作层之上的另一个半透明层。在游戏中，我们经常看到它用于显示分数、剩余生命等。\n\n让我们为当前示例添加一个 HUD 层，用于统计用户引发的爆炸次数。向项目中添加一个新的\
    \ Objective-C 类。该类应该是 `NSObject` 的子类。将类命名为 `HUDLayer.mm`。`.mm` 扩展名并非笔误。对于混合了 Objective-C\
    \ 和 C++ 的文件，使用 `.mm` 是一种推荐的约定。这比告诉编译器单独处理某个文件要简单，并且能让将来阅读你代码的开发者知道该实现使用了 C++。\n\
    \n打开 `HUDLayer.h`，用 代码清单 7-19 中所示的代码替换其内容。\n\n**代码清单 7-19.** *新的 HUDLayer.h*\n\
    \n```\n#import \"cocos2d.h\"\n@interface HUDLayer : CCLayer {\n    CCLabelTTF\
    \ *_counterLabel;\n}\n- (void)incrementCounter;\n@end\n```\n\n我们将子类改为 `CCLayer`，并创建了一个私有的\
    \ `CCLabelTTF` 对象，用于在屏幕上保存一个标签。我们还创建了一个名为 `incrementCounter` 的实例方法。触摸事件将调用此方法，以通知\
    \ HUD 层发生了新的触摸，并递增标签显示的计数。\n\n在 Xcode 中切换到 `HudLayer.mm`。首先，导入 `HelloWorldLayer`\
    \ 头文件。接下来，我们将创建一个局部变量来保存当前计数的值，并为 `HUDLayer` 创建 `init` 方法。将代码清单 7-20 中的代码复制到 `HUDLayer.mm`\
    \ 中。\n\n**代码清单 7-20.** *HUDLayer.mm 的 Init 方法*\n\n```\nint counter = 0;\n- (id)init\
    \ {\n    if ((self = [super init])) {\n        _counterLabel = [CCLabelTTF labelWithString:[NSString\
    \ stringWithFormat:@\"Explosions: %d\", counter] fontName:@\"Marker Felt\" fontSize:24];\n\
    \n        CGSize size = [[CCDirector sharedDirector] winSize];\n\n        _counterLabel.position\
    \ =  ccp( size.width * 0.85 , size.height * 0.9 );\n\n        [self addChild:\
    \ _counterLabel z:10];\n   }\n   return self;\n}\n```\n\n`init` 方法使用了我们 `HelloWorldLayer`\
    \ 类中的一些代码。我们只是简单地创建了一个新的标签并将其添加到屏幕上。在这里，我们将其添加到屏幕的右上角，z 轴值为 10，这样所有的爆炸效果都会渲染在标签之后。\n\
    \n通过在新 `init` 方法之后添加代码清单 7-21 中的代码来实现 `incrementCounter` 方法。\n\n**代码清单 7-21.**\
    \ *`incrementCounter` 方法*\n\n```\n- (void)incrementCounter {\n   counter++;\n\
    \    _counterLabel.string = [NSString stringWithFormat:@\"Explosions: %d\", counter];\n\
    }\n```\n\n这个方法应该很容易理解。我们只是递增计数器（该计数器将存储在 HUD 层中，而非游戏层），并更新我们已经添加到视图中的标签。\n\n关于\
