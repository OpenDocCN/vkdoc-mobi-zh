  raw: '#### Creating the NSTimer


    Open `AppDelegate.h` in Xcode. Create a private variable of type `FaceDetectionLayer`
    called `_layer`, and another private variable of type `NSTimer` called `_timer`.
    The changes we made to the header are shown in [Listing 13–21](#Chapter13.html#list_13_21).


    **Listing 13–21.** *Changes to AppDelegate.h*


    `@interface AppDelegate : NSObject <UIApplicationDelegate,`

    `AVCaptureVideoDataOutputSampleBufferDelegate> {`

    `    …`


    **`FaceDetectionLayer *_layer;`**

    **`NSTimer *_timer;`**

    `}`

    `…`


    Switch over to `AppDelegate.m`. Find the line shown in [Listing 13–22](#Chapter13.html#list_13_22).


    **Listing 13–22.** *Find This Line in AppDelegate.m . . .*


    `[[CCDirector sharedDirector] runWithScene: [FaceDetectionLayer scene]];`


    This line used the `CCDirector` singleton to launch a default `FaceDetectionLayer`
    scene. We have a static method in `FaceDetectionLayer` that we are using to create
    our scene. That method launches the scene with the `HUDLayer`. To keep from managing
    too many instances or creating another set of singleton classes, we’re going to
    move some of our functionality from the static `scene` method to our `AppDelegate`.


    Replace the line from [Listing 13–22](#Chapter13.html#list_13_22) with the code
    from [Listing 13–23](#Chapter13.html#list_13_23).


    **Listing 13–23.** *Launch the FaceDetectionLayer in a Different Way*


    `CCScene *scene = [CCScene node];`

    `HUDLayer *hud = [HUDLayer node];`

    `[scene addChild:hud z:1];`

    `_layer = [[[FaceDetectionLayer alloc] initWithHUD:hud] autorelease];`

    ` [scene addChild:_layer];`


    ` [[CCDirector sharedDirector] runWithScene: scene];`


    This code was taken from our static `scene` method in the `FaceDetectionLayer`
    class. If you run the application now, it should look just about the same. You
    will see the camera view, oriented correctly, taking up the full screen.


    Add the method from [Listing 13–24](#Chapter13.html#list_13_24) to `AppDelegate.m`.


    **Listing 13–24.** *Add the Background Method*


    `-(void)backgroundRequest:(UIImage * ) image{`

    `    NSAutoreleasePool * pool = [[NSAutoreleasePool alloc] init];`


    `    UIInterfaceOrientation orient =  [UIApplication sharedApplication].statusBarOrientation;`

    `    UIImage * rotatedImage = image;`

    `    switch (orient) {`

    `        case UIInterfaceOrientationPortrait:`

    `            NSLog(@"Device orientation portrait");`

    `            break;`

    `        case UIInterfaceOrientationPortraitUpsideDown:`

    `            NSLog(@"Device orientation portrait upside down");`

    `            break;`

    `        case UIInterfaceOrientationLandscapeLeft:`

    `            rotatedImage = [self rotateImage:image orientation: UIImageOrientationRight];`

    `            NSLog(@"Device orientation landscape left");`

    `            break;`

    `        case UIInterfaceOrientationLandscapeRight:`

    `            rotatedImage = [self rotateImage:image orientation: UIImageOrientationLeft];`

    `            NSLog(@"Device orientation landscape right");`

    `            break;`

    `    };`


    **`    [_layer facialRecognitionRequest:rotatedImage];`**


    `    [pool drain];`

    `}`


    This method will be the caller for the `facialRecognitionRequest` method we created
    earlier in our `FaceDetectionLayer` class. We are, again, using an `NSAutoReleasePool`
    to manage the automatic release of objects from memory. Next, we check the orientation
    of the device. Again, I’m using Landscape Right for all my testing, but this method
    should suffice to reorient the image properly for other orientations. Basically,
    we have to do this so that we send face.com the image right side up. If we send
    the image in sideways or upside down, face.com won’t be able to recognize the
    faces in the picture.


    When we’re done rotating the image, we send the updated image object to the `FaceDetectionLayer`’s`facialRecognitionRequest`
    method. Okay, let’s create the timer callback, and then we’ll create our `NSTimer`.
    The callback will be the event that is fired each time the timer expires (I didn’t
    mean for that to rhyme, it’s just the way it is). This should be a simple method.
    We simply need to call our new `backgroundRequest` method every few seconds on
    a new thread. Copy the method from [Listing 13–25](#Chapter13.html#list_13_25)
    just above the `backgroundRequest` method.


    **Listing 13–25.** *Timer Callback Method*


    `-(void) timerCallback {`

    `    [NSThread detachNewThreadSelector:@selector(backgroundRequest:) toTarget:self
    withObject:_imageView.image];`

    `}`


    We are simply detaching a new thread to run the `backgroundRequest` method and
    assigning the `delegate` to `self`.


    So, the last step to this process is to start the timer. In the last line of the
    `applicationDidFinishLaunching` method, we start our `AVCaptureSession`. Just
    before that line, add the code from [Listing 13–26](#Chapter13.html#list_13_26).


    **Listing 13–26.** *Start a Five-Second Timer*


    `_timer = [NSTimer` **`scheduledTimerWithTimeInterval:5.0`** `target:self`

    `selector:@selector(timerCallback) userInfo:nil repeats:YES];`


    The code in bold shows you where to reset the timing in between executions. If
    you are running a very slow Internet connection, you might need to increase this
    setting.


    If you run this project now, and let it run for a few seconds, you should see
    something like [Figure 13–9](#Chapter13.html#fig_13_9) in your debug console.


    ![Image](images/1309.jpg)


    **Figure 13–9.** *The output shows thelooping execution of face.com request.*


    #### Parsing the Output


    Next, we need to parse the output from face.com. To do this, we’re going to use
    the JSON-Framework library we downloaded from GitHub earlier in the chapter.


    Find the directory where you unzipped the downloaded files. There is a subdirectory
    called `Classes`. Open that directory. As with the ASI-HTTP-Request library, organization
    in Xcode is a bit of a preference. I created a `Group` in my Xcode project called
    `JSON`, but this is not necessary. Copy all the files from the `Classes` directory
    into the Xcode project. Make sure you check the option to **Copy items into destination
    group’s folder (if needed)**.


    Open `FaceDetectionLayer.h` in Xcode and import the `SBJson.h` header. Switch
    over to `FaceDetectionLayer.m` and find the lines of code shown in [Listing 13–27](#Chapter13.html#list_13_27).


    **Listing 13–27.** *Find This Section…*


    `if (!error) {`

    `            NSString *response = [request responseString];`


    After the code in [Listing 13–27](#Chapter13.html#list_13_27), we’re going to
    be adding the logic to parse the JSON response. Before we get started, let’s take
    another look at the response from face.com. The sample reply from my execution
    is shown in [Listing 13–28](#Chapter13.html#list_13_28).


    **Listing 13–28.** *Sample Reply from face.com*'
  trans: "\n#### 创建 `NSTimer`\n\n在 Xcode 中打开 `AppDelegate.h`。创建一个类型为 `FaceDetectionLayer`\
    \ 的私有变量 `_layer`，以及另一个类型为 `NSTimer` 的私有变量 `_timer`。我们对头文件所做的更改如代码清单 13-21 所示。\n\
    \n**代码清单 13-21.** *对 `AppDelegate.h` 的更改*\n\n```\n@interface AppDelegate : NSObject\
    \ <UIApplicationDelegate,\nAVCaptureVideoDataOutputSampleBufferDelegate> {\n \
    \   …\nFaceDetectionLayer *_layer;\nNSTimer *_timer;\n}\n…\n```\n\n切换到 `AppDelegate.m`。找到代码清单\
    \ 13-22 中所示的那一行。\n\n**代码清单 13-22.** *在 `AppDelegate.m` 中找到这一行……*\n\n```\n[[CCDirector\
    \ sharedDirector] runWithScene: [FaceDetectionLayer scene]];\n```\n\n这一行使用了 `CCDirector`\
    \ 单例来启动一个默认的 `FaceDetectionLayer` 场景。我们在 `FaceDetectionLayer` 中有一个静态方法，用于创建场景。该方法会连同\
    \ `HUDLayer` 一起启动场景。为了避免管理太多实例或创建另一组单例类，我们将把部分功能从静态的 `scene` 方法移到 `AppDelegate`\
    \ 中。\n\n用代码清单 13-23 中的代码替换代码清单 13-22 中的那一行。\n\n**代码清单 13-23.** *以不同方式启动 `FaceDetectionLayer`*\n\
    \n```\nCCScene *scene = [CCScene node];\nHUDLayer *hud = [HUDLayer node];\n[scene\
    \ addChild:hud z:1];\n_layer = [[[FaceDetectionLayer alloc] initWithHUD:hud] autorelease];\n\
    \ [scene addChild:_layer];\n\n [[CCDirector sharedDirector] runWithScene: scene];\n\
    ```\n\n这段代码取自 `FaceDetectionLayer` 类中的静态 `scene` 方法。如果现在运行应用程序，它看起来应该和之前差不多。你会看到相机视图，方向正确，并且占满整个屏幕。\n\
    \n将代码清单 13-24 中的方法添加到 `AppDelegate.m` 中。\n\n**代码清单 13-24.** *添加后台方法*\n\n```\n\
    -(void)backgroundRequest:(UIImage * ) image{\n    NSAutoreleasePool * pool = [[NSAutoreleasePool\
    \ alloc] init];\n\n    UIInterfaceOrientation orient =  [UIApplication sharedApplication].statusBarOrientation;\n\
    \    UIImage * rotatedImage = image;\n    switch (orient) {\n        case UIInterfaceOrientationPortrait:\n\
    \            NSLog(@\"设备方向为竖屏\");\n            break;\n        case UIInterfaceOrientationPortraitUpsideDown:\n\
    \            NSLog(@\"设备方向为倒竖屏\");\n            break;\n        case UIInterfaceOrientationLandscapeLeft:\n\
    \            rotatedImage = [self rotateImage:image orientation: UIImageOrientationRight];\n\
    \            NSLog(@\"设备方向为左横屏\");\n            break;\n        case UIInterfaceOrientationLandscapeRight:\n\
    \            rotatedImage = [self rotateImage:image orientation: UIImageOrientationLeft];\n\
    \            NSLog(@\"设备方向为右横屏\");\n            break;\n    };\n\n    [_layer\
    \ facialRecognitionRequest:rotatedImage];\n\n    [pool drain];\n}\n```\n\n这个方法将是我们之前在\
    \ `FaceDetectionLayer` 类中创建的 `facialRecognitionRequest` 方法的调用者。我们再次使用 `NSAutoReleasePool`\
    \ 来管理对象从内存中的自动释放。接着，我们检查设备的方向。同样，我所有测试都使用横向右方向，但这个方法应该足以正确地重新调整图像以适配其他方向。基本上，我们必须这样做，以便将正立的图像发送给\
    \ face.com。如果我们发送侧向或倒立的图像，face.com 将无法识别图片中的人脸。\n\n完成图像旋转后，我们将更新后的图像对象发送给 `FaceDetectionLayer`\
    \ 的 `facialRecognitionRequest` 方法。好了，让我们创建定时器回调，然后再创建我们的 `NSTimer`。回调将是每次定时器超时时触发的事件（我并非有意押韵，只是事实如此）。这应该是一个简单的方法。我们只需每隔几秒在新线程上调用新的\
    \ `backgroundRequest` 方法。将代码清单 13-25 中的方法复制到 `backgroundRequest` 方法上方。\n\n**代码清单\
    \ 13-25.** *定时器回调方法*\n\n```\n-(void) timerCallback {\n    [NSThread detachNewThreadSelector:@selector(backgroundRequest:)\
    \ toTarget:self withObject:_imageView.image];\n}\n```\n\n我们只是分离一个新线程来运行 `backgroundRequest`\
    \ 方法，并将 `delegate` 分配给 `self`。\n\n因此，此过程的最后一步是启动定时器。在 `applicationDidFinishLaunching`\
    \ 方法的最后一行，我们启动了 `AVCaptureSession`。就在那一行之前，添加代码清单 13-26 中的代码。\n\n**代码清单 13-26.**\
    \ *启动一个五秒定时器*\n\n```\n_timer = [NSTimer scheduledTimerWithTimeInterval:5.0 target:self\n\
    selector:@selector(timerCallback) userInfo:nil repeats:YES];\n```\n\n粗体代码指示了在两次执行之间重置计时应在何处进行。如果你的网络连接速度非常慢，可能需要增加此设置。\n\
    \n如果你现在运行这个项目，并让它运行几秒钟，你应该会在调试控制台中看到类似图 13-9 的内容。\n\n![Image](img/1309.jpg)\n\n\
    **图 13-9.** *输出显示了 face.com 请求的循环执行情况。*\n\n#### 解析输出\n\n接下来，我们需要解析来自 face.com\
    \ 的输出。为此，我们将使用本章早些时候从 GitHub 下载的 JSON-Framework 库。\n\n找到你解压下载文件的目录。其中有一个名为 `Classes`\
    \ 的子目录。打开该目录。与 ASI-HTTP-Request 库一样，Xcode 中的组织方式取决于个人偏好。我在 Xcode 项目中创建了一个名为 `JSON`\
    \ 的 `Group`，但这并非必需。将 `Classes` 目录中的所有文件复制到 Xcode 项目中。确保勾选**将项目复制到目标组的文件夹中（如果需要）**选项。\n\
    \n在 Xcode 中打开 `FaceDetectionLayer.h` 并导入 `SBJson.h` 头文件。切换到 `FaceDetectionLayer.m`，找到代码清单\
    \ 13-27 中所示的代码行。\n\n**代码清单 13-27.** *找到这一部分……*\n\n```\nif (!error) {\n       \
    \     NSString *response = [request responseString];\n```\n\n在代码清单 13-27 中的代码之后，我们将添加逻辑来解析\
    \ JSON 响应。在开始之前，让我们再看一下来自 face.com 的响应。我执行后得到的示例回复如代码清单 13-28 所示。\n\n**代码清单 13-28.**\
    \ *来自 face.com 的示例回复*\n"
