    element with the latest location information.'
  trans: "\n### 您现在的位置\n\n我们先从一个示例开始。首先，打开 Xcode 并创建一个新项目。选择 `Tab Bar Application`\
    \ 作为模板，并将项目命名为 `iOS_AR_Ch3_LocationServices`。确保设备系列设置为 `iPhone`。本章介绍的所有内容都可以轻松复用到你的\
    \ iPad 应用中。因此，为简单起见，本章仅使用 iPhone 进行演示。\n\n此步骤为可选项。我为这个 Xcode 项目创建了一个本地 Git 仓库。在终端中，我导航到新项目的目录，并运行了清单\
    \ 3–1 中所示的命令。本章的完成项目可在 `github.com/kyleroche` 获取。\n\n**清单 3–1.** *将本地仓库连接到 GitHub*\n\
    \n```\nKyle-Roches-MacBook-Pro-2:iOS_AR_Ch3_LocationServices kyleroche$ git remote\
    \ add origin git@github.com:kyleroche/iOS_AR_Ch3_LocationServices.git\nKyle-Roches-MacBook-Pro-2:iOS_AR_Ch3_LocationServices\
    \ kyleroche$ git push -u origin master\nCounting objects: 19, done.\nDelta compression\
    \ using up to 8 threads.\nCompressing objects: 100% (17/17), done.\nWriting objects:\
    \ 100% (19/19), 10.78 KiB, done.\nTotal 19 (delta 5), reused 0 (delta 0)\nTo git@github.com:kyleroche/iOS_AR_Ch3_LocationServices.git\n\
    \ * [new branch]      master -> master\nBranch master set up to track remote branch\
    \ master from origin.\n```\n\n我们选择了标签栏应用，这样我们可以继续构建本章中的概念，而不会在后续过程中过度覆盖它们。首先，在\
    \ Xcode 中打开 `FirstViewController.h` 文件。我们将声明构建此演示所需的一些插座变量。在 Xcode 中打开 `FirstViewController.h`\
    \ 文件，并在 `@interface` 代码块中添加清单 3–2 中的代码。\n\n**清单 3–2.** *在接口中声明 UITextView*\n\n\
    ```\nUITextView *locationTextView;\n```\n\n现在，在头文件的 `@end` 之前，添加清单 3–3 中的代码。\n\
    \n**清单 3–3.** *将属性添加到类中*\n\n```\n@property (nonatomic, retain) IBOutletUITextView\
    \ *locationTextView;\n```\n\n我们将使用这个 `UITextView` 插座变量来打印将要审查的位置服务信息。在使用此插座变量之前，我们必须在\
    \ `.m` 文件中对其进行 `synthesize`（合成）和释放。切换到 Xcode 中的 `FirstViewController.m`，并添加清单\
    \ 3–4 中加粗的行。\n\n**清单 3–4.** *合成并释放 UILabel*\n\n````\n#import \"FirstViewController.h\"\
    \n\n@implementation FirstViewController\n@synthesize locationTextView; // 合成 *locationTextView\n\
    \n/*\n// Implement viewDidLoad to do additional setup after loading the view,\
    \ typically from a nib.\n- (void)viewDidLoad\n{\n\n    [superviewDidLoad];\n}\n\
    */\n\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
    {\n    // Return YES for supported orientations\n    return (interfaceOrientation\
    \ == UIInterfaceOrientationPortrait);\n}\n\n- (void)didReceiveMemoryWarning\n\
    {\n    // Releases the view if it doesn't have a superview.\n    [super didReceiveMemoryWarning];\n\
    \n    // Release any cached data, images, etc. that aren't in use.\n}\n\n- (void)viewDidUnload\n\
    {\n    [super viewDidUnload];\n\n    // Release any retained subviews of the main\
    \ view.\n    // e.g. self.myOutlet = nil;\n}\n\n- (void)dealloc\n{\n    [locationTextView\
    \ release];  // 释放 UITextView\n    locationTextView = nil; // 释放后设置为 nil 是良好实践\n\
    \    [superdealloc];\n}\n@end\n````\n\n你可能注意到我释放了变量，然后又将其设置为 `nil`。在大多数情况下，这是内存管理的好习惯。本书不侧重于这些主题，但我们会在适当的时候指出一些与增强现实和内存管理相关的细节。增强现实应用在类中使用了大量代理，而内存管理是正确构建\
    \ AR 应用结构的一个重要方面。\n\n既然我们已经定义了一个可用于文本更新的 `UITextView`，接下来我们在 XIB 文件中创建该组件。在 Xcode\
    \ 的 `Project Navigator` 中点击 `FirstView.xib` 以打开设计视图。你应该能看到类似于图 3–1 所示的内容。\n\n\
    ![Image](img/0301.jpg)\n\n**图 3–1.** *在设计视图中打开 FirstView.xib。*\n\n你会注意到布局中已经有一些组件了。这就是我们选择添加\
    \ `UITextView` 的原因。我们将直接使用已存在的某个组件。在设计窗口的左侧，有一个半透明立方体的图标。按住 Ctrl 键，从该图标点击并拖动到\
    \ iPhone 屏幕上的 `UITextView` 插座变量上。请参考图 3–2。\n\n![Image](img/0302.jpg)\n\n**图 3–2.**\
    \ *按住 Ctrl 键并从 File's Owner 图标拖动到 UITextView。*\n\n当你在 `UITextView` 上释放鼠标按钮时，会弹出一个上下文菜单。你会看到有两个插座变量可供选择。它们是：\n\
    \n- `locationTextView`（我们刚刚创建的）\n- `View`\n\n从列表中选择 `locationTextView`。现在，我们已经将\
    \ UI 组件连接到了 `ViewController` 类中的 `IBOutlet`。返回 Xcode 中的 `FirstViewController.m`\
    \ 文件，并取消注释 `viewDidLoad` 方法。我们将向此方法添加一些代码，以启动位置服务，并用最新的位置信息更新我们的 `UITextView`\
    \ 元素。\n"
- fmt: "### Standard Location Service\n\nThere are two services we can start to monitor\
    \ location changes. Let's first look at the Standard Location Service. This is\
    \ the more common way to get the user's current location because it works on all\
    \ iOS devices. The Standard Location Service can be configured to specify the\
    \ desired level of accuracy of the location data and the distance that must be\
    \ traveled before reporting a new location. This service, when started, figures\
    \ out which radios to enable and then proceeds to start reporting location to\
    \ the defined service delegate.\n\nBefore we can start the Standard Location Service,\
    \ we need to add the Core Location Framework to our project. If you didn't skip\
    \ [Chapter 2](#Chapter02.html#ch2), you might find this to be redundant. In Xcode,\
    \ click on the name of the project in the **Project Navigator** and then navigate\
    \ to the **Build Phases** tab. Expand the section titled **Link Binary With Libraries**\
    \ and add the Core Location Framework to the project. See [Figure 3–3](#Chapter03.html#fig_3_3)\
    \ for reference.\n\n![Image](images/0303.jpg)\n\n**Figure 3–3.** *Add the Core\
    \ Location Framework to the project.*\n\nReturn to the `FirstViewController.h`\
    \ file. Import the Core Location Framework to the header file and declare that\
    \ this class conforms to the `CLLocationManagerDelegate` protocol. Your header\
    \ file should now look like [Listing 3–5](#Chapter03.html#list_3_5).\n\n**Listing\
    \ 3–5.** *New Header File for FirstViewController*\n\n```objc\n#import <UIKit/UIKit.h>\n\
    #import <CoreLocation/CoreLocation.h>\n\n@interface FirstViewController : UIViewController\
    \ <CLLocationManagerDelegate> {\n    UITextView *locationTextView;\n}\n\n@property\
    \ (nonatomic, retain) IBOutlet UITextView *locationTextView;\n@end\n```\n\nThe\
    \ `CLLocationManagerDelegate` protocol sends information to its delegate's `locationManager:didUpdateToLocation:fromLocation:`\
    \ method. If there's an error calling this method, the delegate will call the\
    \ `locationManager:didFailWithError:` method. Switch back to the `FirstViewController.m`\
    \ file. Add the method shown in [Listing 3–6](#Chapter03.html#list_3_6) to your\
    \ class.\n\n**Listing 3–6.** *Delegate Method for `CLLocationManagerDelegate`*\n\
    \n```objc\n- (void)locationManager:(CLLocationManager *)manager didUpdateToLocation:(CLLocation\
    \ *)newLocation\n         fromLocation:(CLLocation *)oldLocation\n{\n      locationTextView.text\
    \ = [NSString stringWithFormat:@\"latitude %+.6f, longitude %+.6f\\n\",\n    \
    \        newLocation.coordinate.latitude,\n            newLocation.coordinate.longitude];\n\
    }\n```\n\nThere's not a whole lot going on in this method. Basically, we are setting\
    \ the text of our `UITextView` to a string containing our new latitude and longitude\
    \ coordinates. The `CLLocation` reference named `newLocation` passes these coordinates\
    \ to us. We use its coordinate property to find the latitude and longitude of\
    \ our new location.\n\nApple recommends that we check the timestamp of this new\
    \ location because the Standard Location Service sometimes has a lag in delivery\
    \ to the delegate method. For our demonstration, this isn't necessary; however,\
    \ for reference, you could extend our method to first check for timing of the\
    \ location update event, as shown in [Listing 3–7](#Chapter03.html#list_3_7).\n\
    \n**Listing 3–7.** *Check for Timing of the Location Update First (Variation of\
    \ [Listing 3–5](#Chapter03.html#list_3_5))*\n\n```objc\n- (void)locationManager:(CLLocationManager\
    \ *)manager\n    didUpdateToLocation:(CLLocation *)newLocation\n           fromLocation:(CLLocation\
    \ *)oldLocation\n{\n    NSDate* eventDate = newLocation.timestamp;\n    NSTimeInterval\
    \ howRecent = [eventDate timeIntervalSinceNow];\n    if (abs(howRecent) < 15.0)\n\
    \    {\n        locationTextView.text = [NSString stringWithFormat:@\"latitude\
    \ %+.6f, longitude %+.6f\\n\",\n               newLocation.coordinate.latitude,\n\
    \               newLocation.coordinate.longitude];\n    } else {\n         locationTextView.text\
    \ = @\"Update was old\";\n        // you'd probably just do nothing here and ignore\
    \ the event\n    }\n}\n```\n\nSo our listener is in place to receive location\
    \ updates. Let's go ahead and start the service. Switch to the header file (`FirstViewController.h`)\
    \ and add the following code from [Listing 3–8](#Chapter03.html#list_3_8) just\
    \ above the `@end`.\n\n**Listing 3–8.** *Declare the Method to Start the Location\
    \ Service*\n\n```objc\n- (void)startStandardUpdates;\n```\n\nNow switch back to\
    \ the `.m` file and add the method from [Listing 3–9](#Chapter03.html#list_3_9).\n\
    \n**Listing 3–9.** *The `startStandardUpdates` Method*\n\n```objc\n- (void)startStandardUpdates\n\
    {\n    CLLocationManager *locationManager = [[CLLocationManager alloc] init];\n\
    \    locationManager.delegate = self;\n    locationManager.desiredAccuracy = kCLLocationAccuracyKilometer;\n\
    \    locationManager.distanceFilter = 500;\n\n    [locationManager startUpdatingLocation];\n\
    }\n```\n\nThere are a few important aspects to this method. First, after we declare\
    \ our `CLLocationManager` object, we set the delegate to `self`. This would throw\
    \ a warning if we hadn't declared this class as a `CLLocationManagerDelegate`\
    \ back in [Listing 3–5](#Chapter03.html#list_3_5). Next, we set a few configuration\
    \ options so the Standard Location Service knows when we want to receive updates.\
    \ We set our desired accuracy to kilometers and tell the location manager to update\
    \ its delegate when a change of more than 500 kilometers has been detected.\n\n\
    Finally, add the code marked in bold from [Listing 3–10](#Chapter03.html#list_3_10)\
    \ to start the service in your `viewDidLoad:` method, right before `[super viewDidLoad];`.\n\
    \n**Listing 3–10.** *New `viewDidLoad` Method*\n\n```objc\n- (void)viewDidLoad\n\
    {\n    [self startStandardUpdates];\n    [super viewDidLoad];\n}\n```\n\nWe're\
    \ now ready to test our demo program. In the top left of Xcode there is a drop-down\
    \ menu called `Scheme`. Make sure you have your iPhone 4.3 simulator selected\
    \ and click the `Run` button to the far left. The simulator will launch and will\
    \ automatically open to our demo application.\n\nYou should immediately be presented\
    \ with a modal dialog like the one shown in [Figure 3–4](#Chapter03.html#fig_3_4),\
    \ asking permissions to check your location.\n\n![Image](images/0304.jpg)\n\n\
    **Figure 3–4.** *Allow your application to use Location Services to determine\
    \ your location.*\n\nIf you want to keep this dialog from reappearing, select\
    \ `Don't ask me again`. Either way, make sure you click **OK** or the demo app\
    \ won't function properly. [Figure 3–5](#Chapter03.html#fig_3_5) illustrates the\
    \ running application. You can see that the `UITextView` is now populated with\
    \ the string we built that includes our latitude and longitude.\n\n![Image](images/0305.jpg)\n\
    \n**Figure 3–5.** *Run the demonstration on the iPhone simulator.*"
  raw: '#### Standard Location Service


    There are two services we can start to monitor location changes. Let''s first
    look at the Standard Location Service. This is the more common way to get the
    user''s current location because it works on all iOS devices. The Standard Location
    Service can be configured to specify the desired level of accuracy of the location
    data and the distance that must be traveled before reporting a new location. This
    service, when started, figures out which radios to enable and then proceeds to
    start reporting location to the defined service delegate.


    Before we can start the Standard Location Service, we need to add the Core Location
    Framework to our project. If you didn''t skip [Chapter 2](#Chapter02.html#ch2),
    you might find this to be redundant. In Xcode, click on the name of the project
    in the **Project Navigator** and then navigate to the **Build Phases** tab. Expand
    the section titled **Link Binary With Libraries** and add the Core Location Framework
    to the project. See [Figure 3–3](#Chapter03.html#fig_3_3) for reference.


    ![Image](images/0303.jpg)


    **Figure 3–3.** *Add the Core Location Framework to the project.*


    Return to the `FirstViewController.h` file. Import the Core Location Framework
    to the header file and declare that this class conforms to the `CLLocationManagerDelegate`
    protocol. Your header file should now look like [Listing 3–5](#Chapter03.html#list_3_5).


    **Listing 3–5.** *New Header File for FirstViewController*


    `#import <UIKit/UIKit.h>`

    `#import <CoreLocation/CoreLocation.h>`


    `@interface FirstViewController : UIViewController <CLLocationManagerDelegate>
    {`

    `    UITextView *locationTextView;`

    `}`


    `@property (nonatomic, retain) IBOutletUITextView *locationTextView;`

    `@end`


    The `CLLocationManagerDelegate` protocol sends information to its delegate''s
    `locationManager:didUpdateToLocation:fromLocation:` method. If there''s an error
    calling this method, the delegate will call the `locationManager:didFailWithError:`
    method. Switch back to the `FirstViewController.m` file. Add the method shown
    in [Listing 3–6](#Chapter03.html#list_3_6) to your class.


    **Listing 3–6.** *Delegate Method for CLLocationManagerDelegate*


    `- (void)locationManager:(CLLocationManager *)manager didUpdateToLocation:(CLLocation
    *)newLocation`

    `         fromLocation:(CLLocation *)oldLocation`

    `{`

    `      locationTextView.text = [NSString stringWithFormat:@"latitude %+.6f, longitude
    %+.6f\n",`

    `            newLocation.coordinate.latitude,`

    `            newLocation.coordinate.longitude];`

    `}`


    There''s not a whole lot going on in this method. Basically, we are setting the
    text of our `UITextView` to a string containing our new latitude and longitude
    coordinates. The `CLLocation` reference named `newLocation` passes these coordinates
    to us. We use its coordinate property to find the latitude and longitude of our
    new location.


    Apple recommends that we check the timestamp of this new location because the
    Standard Location Service sometimes has a lag in delivery to the delegate method.
    For our demonstration, this isn''t necessary; however, for reference, you could
    extend our method to first check for timing of the location update event, as shown
    in [Listing 3–7](#Chapter03.html#list_3_7).


    **Listing 3–7.** *Check for Timing of the Location Update First (Variation of
    [Listing 3–5](#Chapter03.html#list_3_5))*


    `- (void)locationManager:(CLLocationManager *)manager`

    `    didUpdateToLocation:(CLLocation *)newLocation`

    `           fromLocation:(CLLocation *)oldLocation`

    `{`

    **`NSDate* eventDate = newLocation.timestamp;`**

    **`NSTimeInterval howRecent = [eventDate timeIntervalSinceNow];`**

    **`if (abs(howRecent) < 15.0)`**

    `    {`

    `        locationTextView.text = [NSString stringWithFormat:@"latitude %+.6f,
    longitude %+.6f\n",`

    `               newLocation.coordinate.latitude,`

    `               newLocation.coordinate.longitude];`

    `    } else {`

    `         locationTextView.text = @"Update was old";`

    **`        // you''d probably just do nothing here and ignore the event`**

    `    }`

    `}`


    So our listener is in place to receive location updates. Let''s go ahead and start
    the service. Switch to the header file (`FirstViewController.h`) and add the following
    code from [Listing 3–8](#Chapter03.html#list_3_8) just above the `@end`.


    **Listing 3–8.** *Declare the Method to Start the Location Service*


    `- (void)startStandardUpdates;`


    Now switch back to the `.m` file and add the method from [Listing 3–9](#Chapter03.html#list_3_9).


    **Listing 3–9.** *The startStandardUpdatesMethod*


    `- (void)startStandardUpdates`

    `{`

    `    CLLocationManager *locationManager = [[CLLocationManager alloc] init];`

    `    locationManager.delegate = self;`

    `    locationManager.desiredAccuracy = kCLLocationAccuracyKilometer;`

    `    locationManager.distanceFilter = 500;`


    `    [locationManagerstartUpdatingLocation];`

    `}`


    There are a few important aspects to this method. First, after we declare our
    `CLLocationManager` object, we set the delegate to `self`. This would throw a
    warning if we hadn''t declared this class as a `CLLocationManagerDelegate` back
    in [Listing 3–5](#Chapter03.html#list_3_5). Next, we set a few configuration options
    so the Standard Location Service knows when we want to receive updates. We set
    our desired accuracy to kilometers and tell the location manager to update its
    delegate when a change of more than 500 kilometers has been detected.


    Finally, add the code marked in bold from [Listing 3–10](#Chapter03.html#list_3_10)to
    start the service in your `viewDidLoad:` method, right before `[super viewDidLoad];`.


    **Listing 3–10.** *New viewDidLoadMethod*


    `- (void)viewDidLoad`

    `{`

    **`    [self startStandardUpdates];`**

    **`    [superviewDidLoad];`**

    `}`


    We''re now ready to test our demo program. In the top left of Xcode there is a
    drop-down menu called `Scheme`. Make sure you have your iPhone 4.3 simulator selected
    and click the `Run` button to the far left. The simulator will launch and will
    automatically open to our demo application.


    You should immediately be presented with a modal dialog like the one shown in
    [Figure 3–4](#Chapter03.html#fig_3_4), asking permissions to check your location.


    ![Image](images/0304.jpg)


    **Figure 3–4.** *Allow your application to use Location Services to determine
    your location.*


    If you want to keep this dialog from reappearing, select `Don''t ask me again`.
    Either way, make sure you click **OK** or the demo app won''t function properly.
    [Figure 3–5](#Chapter03.html#fig_3_5) illustrates the running application. You
    can see that the `UITextView` is now populated with the string we built that includes
    our latitude and longitude.


    ![Image](images/0305.jpg)


    **Figure 3–5.** *Run the demonstration on the iPhone simulator.*'
  trans: "\n### 标准定位服务\n\n我们可以启动两种服务来监听位置变化。首先来看标准定位服务。这是获取用户当前位置的较常见方式，因为它适用于所有 iOS\
    \ 设备。标准定位服务可以配置为指定位置数据所需的精确度，以及报告新位置前必须移动的距离。该服务启动后，会确定开启哪些无线电模块，随后开始向指定的服务代理报告位置。\n\
    \n在启动标准定位服务之前，我们需要将 Core Location 框架添加到项目中。如果你没有跳过第 2 章，可能会觉得这一步多余。在 Xcode 中，点击**项目导航器**中的项目名称，然后转到**构建阶段**标签页。展开**链接二进制文件与库**部分，将\
    \ Core Location 框架添加到项目中。请参考图 3–3。\n\n![图片](img/0303.jpg)\n\n**图 3–3.** *将 Core\
    \ Location 框架添加到项目中。*\n\n返回到 `FirstViewController.h` 文件。将 Core Location 框架导入头文件，并声明该类遵循\
    \ `CLLocationManagerDelegate` 协议。你的头文件现在应如代码清单 3–5 所示。\n\n**代码清单 3–5.** *FirstViewController\
    \ 的新头文件*\n\n```objc\n#import <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\
    \n@interface FirstViewController : UIViewController <CLLocationManagerDelegate>\
    \ {\n    UITextView *locationTextView;\n}\n\n@property (nonatomic, retain) IBOutlet\
    \ UITextView *locationTextView;\n@end\n```\n\n`CLLocationManagerDelegate` 协议将信息发送给其代理的\
    \ `locationManager:didUpdateToLocation:fromLocation:` 方法。如果调用此方法时出现错误，代理将调用 `locationManager:didFailWithError:`\
    \ 方法。切换回 `FirstViewController.m` 文件。将代码清单 3–6 所示的方法添加到你的类中。\n\n**代码清单 3–6.** *`CLLocationManagerDelegate`\
    \ 的代理方法*\n\n```objc\n- (void)locationManager:(CLLocationManager *)manager didUpdateToLocation:(CLLocation\
    \ *)newLocation\n         fromLocation:(CLLocation *)oldLocation\n{\n      locationTextView.text\
    \ = [NSString stringWithFormat:@\"latitude %+.6f, longitude %+.6f\\n\",\n    \
    \        newLocation.coordinate.latitude,\n            newLocation.coordinate.longitude];\n\
    }\n```\n\n这个方法做的事情并不多。基本上，我们将 `UITextView` 的文本设置为包含新经纬度坐标的字符串。名为 `newLocation`\
    \ 的 `CLLocation` 引用将这些坐标传递给我们。我们使用其 `coordinate` 属性来查找新位置的纬度和经度。\n\nApple 建议我们检查新位置的时间戳，因为标准定位服务有时向代理方法传递数据会有延迟。在我们的演示中，这并非必需；不过，作为参考，你可以扩展我们的方法，先检查位置更新事件的时间，如代码清单\
    \ 3–7 所示。\n\n**代码清单 3–7.** *首先检查位置更新的时间（代码清单 3–5 的变体）*\n\n```objc\n- (void)locationManager:(CLLocationManager\
    \ *)manager\n    didUpdateToLocation:(CLLocation *)newLocation\n           fromLocation:(CLLocation\
    \ *)oldLocation\n{\n    NSDate* eventDate = newLocation.timestamp;\n    NSTimeInterval\
    \ howRecent = [eventDate timeIntervalSinceNow];\n    if (abs(howRecent) < 15.0)\n\
    \    {\n        locationTextView.text = [NSString stringWithFormat:@\"latitude\
    \ %+.6f, longitude %+.6f\\n\",\n               newLocation.coordinate.latitude,\n\
    \               newLocation.coordinate.longitude];\n    } else {\n         locationTextView.text\
    \ = @\"Update was old\";\n        // 你很可能在此处什么都不做，忽略该事件\n    }\n}\n```\n\n现在我们的监听器已就位，可以接收位置更新了。让我们继续启动服务。切换到头文件（`FirstViewController.h`），在\
    \ `@end` 之前添加代码清单 3–8 中的代码。\n\n**代码清单 3–8.** *声明启动定位服务的方法*\n\n```objc\n- (void)startStandardUpdates;\n\
    ```\n\n现在切换回 `.m` 文件，添加代码清单 3–9 中的方法。\n\n**代码清单 3–9.** *`startStandardUpdates`\
    \ 方法*\n\n```objc\n- (void)startStandardUpdates\n{\n    CLLocationManager *locationManager\
    \ = [[CLLocationManager alloc] init];\n    locationManager.delegate = self;\n\
    \    locationManager.desiredAccuracy = kCLLocationAccuracyKilometer;\n    locationManager.distanceFilter\
    \ = 500;\n\n    [locationManager startUpdatingLocation];\n}\n```\n\n这个方法有几个重要方面。首先，在声明\
    \ `CLLocationManager` 对象后，我们将代理设置为 `self`。如果我们之前在代码清单 3–5 中没有声明该类为 `CLLocationManagerDelegate`，这会产生一个警告。接下来，我们设置一些配置选项，以便标准定位服务知道我们何时想要接收更新。我们将期望精度设置为千米级别，并告诉位置管理器在检测到超过\
    \ 500 千米的变化时才更新代理。\n\n最后，从代码清单 3–10 中添加以粗体标记的代码，在 `viewDidLoad:` 方法中，在 `[super\
    \ viewDidLoad];` 之前启动服务。\n\n**代码清单 3–10.** *新的 `viewDidLoad` 方法*\n\n```objc\n\
    - (void)viewDidLoad\n{\n    [self startStandardUpdates];\n    [super viewDidLoad];\n\
    }\n```\n\n现在我们可以测试演示程序了。在 Xcode 左上角有一个名为 `Scheme` 的下拉菜单。确保你选择了 iPhone 4.3 模拟器，然后点击最左侧的\
    \ `Run` 按钮。模拟器将启动，并自动打开我们的演示应用程序。\n\n你应该会立刻看到一个如图 3–4 所示的模态对话框，请求允许检查你的位置。\n\n\
    ![图片](img/0304.jpg)\n\n**图 3–4.** *允许你的应用程序使用定位服务来确定你的位置。*\n\n如果你不希望此对话框再次出现，请选择“不再询问”。无论如何，请确保点击**确定**，否则演示程序将无法正常运行。图\
    \ 3–5 展示了运行中的应用程序。你可以看到 `UITextView` 现在已填充了我们构建的包含经纬度的字符串。\n\n![图片](img/0305.jpg)\n\
    \n**图 3–5.** *在 iPhone 模拟器上运行演示程序。*\n"
- fmt: "# 重大位置变化（Significant-Change Location）服务\n\n到目前为止一直在使用的“标准位置服务”是获取设备位置最常见的方式。然而，在\
    \ iOS 4.0 之后，如果你愿意牺牲精度以换取省电，可以使用“重大位置变化服务”。对于大多数应用而言，重大位置变化服务的精度已经足够。该服务使用设备的蜂窝无线电（而非\
    \ GPS 无线电）来确定位置，这使得设备能够更激进地管理功耗。重大位置变化服务还能够唤醒已挂起的应用，以便传送新的坐标。\n\n一旦你确定了最适合应用需求的位置服务，编码上的差异就相当小了。将[代码清单\
    \ 3–11](#Chapter03.html#list_3_11) 中的方法添加到 `FirstViewController.m` 中，以启动重大位置变化服务。\n\
    \n**代码清单 3–11.** 启动重大位置变化服务\n\n```\n- (void)startSignificantChangeUpdates\n{\n\
    \    CLLocationManager *locationManager = [[CLLocationManager alloc] init];\n\
    \    locationManager.delegate = self;\n    [locationManager startMonitoringSignificantLocationChanges];\n\
    }\n```\n\n因为我们指定了该类作为 `CLLocationManagerDelegate`，并且将 `CLLocationManager` 的 `delegate`\
    \ 属性设置为 `self`，运行此方法（而非我们在[代码清单 3–9](#Chapter03.html#list_3_9) 中添加的方法）在模拟器中应该会产生相同的屏幕（至少我们是这么认为的）。将[代码清单\
    \ 3–12](#Chapter03.html#list_3_12) 中的代码添加到头文件中，并按照[代码清单 3–13](#Chapter03.html#list_3_13)\
    \ 所示修改 `viewDidLoad` 方法。\n\n**代码清单 3–12.** 在 `FirstViewController.h` 中声明新方法\n\n\
    ```\n- (void)startSignificantChangeUpdates;\n```\n\n**代码清单 3–13.** 新的 `viewDidLoad`\
    \ 方法调用重大位置变化服务\n\n```\n- (void)viewDidLoad\n{\n    // [self startStandardUpdates];\n\
    \    [self startSignificantChangeUpdates];\n    [super viewDidLoad];\n}\n```\n\
    \n如果你启动模拟器并运行新版本，你会发现有些不同。具体来说，什么都不会发生。`UITextView` 从未更新。如果你将此应用部署到物理设备上，结果将会随着你的位置变化而改变。暂时不必为此担心。在下一节“地理区域监控”中，我将介绍一种在模拟器中测试位置的新方法。\n\
    \n# 地理区域监控（Geographic Region Monitoring）服务\n\n在某些情况下，监控精确位置并不能完全解决问题。相反，我们只想了解是否（或何时）靠近某个特定的坐标。iOS\
    \ 提供了一套用于区域监控服务的特性。在大多数方面，它的工作方式与其他位置服务类似。它提供了一些需要处理的关键委托方法，以便对区域变化做出恰当的响应。我们将使用\
    \ `didEnterRegion:` 和 `didExitRegion:` 这两个委托方法来演示其功能。\n\n本示例中的代码在物理设备上可以正常工作。但是，为了在模拟器上演示，我将展示如何在运行\
    \ Xcode 4.2 测试版的 iOS 5 模拟器上进行操作。Xcode 4.2 引入了一种在调试器中模拟位置变化的方法，这将很好地演示我们的功能。首先，将[代码清单\
    \ 3–14](#Chapter03.html#list_3_14) 中的方法添加到 `FirstViewController.m` 中。\n\n**代码清单\
    \ 3–14.** 在 `FirstViewController.m` 中添加新方法\n\n```\n- (void)startRegionMonitoring\n\
    {\n    NSLog(@\"Starting region monitoring\");\n    CLLocationManager *locationManager\
    \ = [[CLLocationManager alloc] init];\n    locationManager.delegate = self;\n\n\
    \    CLLocationCoordinate2D coord = CLLocationCoordinate2DMake(37.787359, -122.408227);\n\
    \    CLRegion *region = [[CLRegion alloc] initCircularRegionWithCenter:coord\n\
    \                    radius:1000.0 identifier:@\"San Francisco\"];\n\n    [locationManager\
    \ startMonitoringForRegion:region\n            desiredAccuracy:kCLLocationAccuracyKilometer];\n\
    }\n```\n\n这段代码与我们之前跟踪位置的其他方法看起来非常相似，除了最后一行启动了区域监控服务之外。我们使用旧金山的 GPS 坐标创建了一个 `CLLocationCoordinate2D`。我选择旧金山的原因是，它是\
    \ Xcode 4.2 测试版中预加载的 GPS 坐标之一，如[图 3–6](#Chapter03.html#fig_3_6) 所示。\n\n不要忘记在头文件中声明你的新方法。将[代码清单\
    \ 3–15](#Chapter03.html#list_3_15) 中的代码添加到 `FirstViewController.h` 中，紧贴 `@end`\
    \ 的上方。\n\n**代码清单 3–15.** 在 `FirstViewController.h` 中声明新方法\n\n```\n- (void)startRegionMonitoring;\n\
    ```\n\n![Image](images/0306.jpg)\n\n**图 3–6.** 在 Xcode 4.2 测试版中选择预加载的 GPS 坐标。\n\
    \n既然区域监控服务已经启动，我们需要处理当用户进入或离开我们正在监控的区域时所调用的委托方法。将[代码清单 3–16](#Chapter03.html#list_3_16)\
    \ 中的方法添加到 `FirstViewController.m` 中。\n\n**代码清单 3–16.** 在 `FirstViewController.m`\
