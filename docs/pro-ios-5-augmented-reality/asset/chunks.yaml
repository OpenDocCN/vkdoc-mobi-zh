    `x OpenCV-2.2.0/.DS_Store`

    `x OpenCV-2.2.0/3rdparty/CMakeLists.txt`

    `x OpenCV-2.2.0/3rdparty/ilmimf/LICENSE`

    `x OpenCV-2.2.0/3rdparty/ilmimf/README`

    `….. on and on and on…..`


    Now that we’ve extracted the library, we need to apply a quick patch to make sure
    we can build this for iOS. Download the patch files from [`https://github.com/niw/iphone_opencv_test`](https://github.com/niw/iphone_opencv_test).
    To make things easier, I downloaded the whole GitHub repository and moved my OpenCV
    distribution to that directory. Run the commands shown in [Listing 12–12](#Chapter12.html#list_12_12).


    **Listing 12–12.** *Patch OpenCV*


    `Kyle-Roches-MacBook-Pro-2:OpenCV-2.2.0 kyleroche$ patch -p1 < ../OpenCV-2.2.0.patch`

    `patching file CMakeLists.txt`

    `patching file modules/CMakeLists.txt`


    **NOTE:** We are going to need cmake for this next section. If you don’t have
    that installed, you can get it from Macports or Homebrew. If you do have to install
    cmake, you might want to start it and go get some coffee. It takes quite a while.


    Now that we have a patched version of OpenCV, we can rebuild it for our current
    architecture. Run the commands shown in [Listing 12–13](#Chapter12.html#list_12_13).


    **Listing 12–13.** *Build OpenCV Static Library for the Simulator*


    `Kyle-Roches-MacBook-Pro-2:build_simulator kyleroche $ export IPHONEOS_VERSION_MIN="4.0"`

    `Kyle-Roches-MacBook-Pro-2:build_simulator kyleroche$ ../opencv_cmake.sh` **`Simulator`**

    `../OpenCV-2.2.0`

    `Kyle-Roches-MacBook-Pro-2:build_simulator kyleroche$ make -j 4`

    `Kyle-Roches-MacBook-Pro-2:build_simulator kyleroche$ make install`


    You can repeat the same process to build OpenCV for the device. Use `Device` instead
    of `Simulator` as your argument to `opencv_cmake.sh` (shown in bold in [Listing
    12–13](#Chapter12.html#list_12_13)).


    Okay, we should have a new build directory to replace the one that isn’t working
