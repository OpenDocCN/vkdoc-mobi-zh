    \        break;\n    default:\n        [NSException raise:NSInternalInconsistencyException\n\
    \                    format:@\"Invalid image orientation\"];\n}\nUIGraphicsBeginImageContext(bounds.size);\n\
    CGContextRef context = UIGraphicsGetCurrentContext();\nif (orient == UIImageOrientationRight\
    \ || orient == UIImageOrientationLeft) {\n    CGContextScaleCTM(context, -scaleRatio,\
    \ scaleRatio);\n    CGContextTranslateCTM(context, -height, 0);\n} else {\n  \
    \  CGContextScaleCTM(context, scaleRatio, -scaleRatio);\n    CGContextTranslateCTM(context,\
    \ 0, -height);\n}\nCGContextConcatCTM(context, transform);\nCGContextDrawImage(UIGraphicsGetCurrentContext(),\
    \ CGRectMake(0, 0, width, height), imgRef);\nUIImage *imageCopy = UIGraphicsGetImageFromCurrentImageContext();\n\
    UIGraphicsEndImageContext();\n\nreturn imageCopy;\n}\n```\n\nWe saw pieces of\
    \ this method back in [Chapter 7](#Chapter07.html#ch7). Basically, we are checking\
    \ the device’s rotation, then reorienting and rescaling the image accordingly.\
    \ Adjust the `setImageToView` method as shown in [Listing 13–18](#Chapter13.html#list_13_18).\n\
    \n**Listing 13–18.** *Updated setImageToView Method*\n\n```objective-c\n-(void)setImageToView:(UIImage*)image\
    \ {\n    UIImage * capturedImage = [self rotateImage:image orientation:UIImageOrientationLeftMirrored\
    \ ];\n    _imageView.image = capturedImage;\n    _settingImage = NO;\n}\n```\n\
    \nInstead of just setting the `UIImage`, this method gets passed. We are first\
    \ rotating it properly using the utility method we just created. Then we set the\
    \ returned (and adjusted) `UIImage` back to the caller.\n\nRun the project again.\
    \ You will see much better results. The screenshot of my iPad is shown in [Figure\
    \ 13–7](#Chapter13.html#fig_13_7).\n\n![Image](images/1307.jpg)\n\n**Figure 13–7.**\
    \ *We’re NOT sideways!![Image](images/smile.jpg)*\n\nSo, the world is right side\
    \ up again. Next, what do we do with this image now that we have captured it and\
    \ oriented it correctly? Remember, the goal here is to send the image from the\
    \ camera buffer to face.com and get back the coordinates of any faces found in\
    \ the picture.\n\nWe have to decide on an approach to this feature. There are\
    \ a number of ways to tackle it, each with its own set of advantages and drawbacks.\
    \ First, let’s review the face.com API and required parameters so we can make\
    \ a decision on how we want to handle sending the image.\n\n### Face.com API\n\
    \nThe face.com API is a surprisingly straightforward REST API that takes a multipart\
    \ form upload with the raw data of the image you want to analyze in the body of\
    \ the request.\n\nWe’re going to be using only one call from the face.com API.\
    \ The `faces.detect` call returns tags for detected faces in one or more photos,\
    \ with geometric information of the tag, eyes, nose, and mouth, as well as various\
    \ attributes such as gender, is wearing glasses, and is smiling.\n\nThe usage\
    \ notes on the call (from the online documentation) include the following:\n\n\
    * All coordinates are provided in percent values to support any photo scale. Photo\
    \ height and width (vs. tag height/width) are provided in pixels. Yaw, roll, and\
    \ pitch are provided on the –90 degrees to 90 degrees scale.\n* The maximum width\
    \ or height of a photo is 900 pixels. You may POST or send links to higher-size\
    \ photos, but those will be resized internally to improve performance.\n* Every\
    \ tag returned contains a set of attributes. The most important of them is the\
    \ face attribute. It contains the confidence level of that tag being a face. Yada,\
    \ yada, don’t use tags with less than 50 percent confidence.\n* Face detection\
    \ is a prerequisite step in adding training-set data for a user to the recognition\
    \ index. (We won’t be doing this.)\n\nThe API is also rate limited. At the time\
    \ of this writing, the limit was 5,000 requests per minute from the same application.\
    \ So, I think we’ll be fine for this example.\n\nThe REST URL for this call is\
    \ `http://api.face.com/faces/detect.[format]`. For us, we will be setting the\
    \ format equal to JSON. The input parameters for the POST request are described\
    \ in [Table 13–1](#Chapter13.html#tab_13_1).\n\n![Image](images/t1301.jpg)\n\n\
    ![Image](images/t1301a.jpg)\n\nIf you look through the parameter list, this call\
    \ actually turns out to be fairly simple. Our options are to upload the image\
    \ somewhere and send a reference URL so face.com can fetch it and analyze it,\
    \ or we can post the raw image data directly in the POST request. Without actually\
    \ testing this theory, I’d imagine that uploading it somewhere else, then having\
    \ face.com download it and analyze it is far less efficient than uploading it\
    \ directly in the POST request. So, let’s go that route.\n\nNow that we have an\
    \ approach, let’s figure out timing. We already have the `UIImage` object, which\
    \ we could convert to JPEG and attach to the POST request as it comes in, but\
    \ that could easily lead to requests running on top of themselves and a bunch\
    \ of unnecessary CPU time. I’m going to recommend we use an `NSTimer` to grab\
    \ the screen image periodically; then send it on a background thread to face.com\
    \ for analyzing. When it’s returned, we’ll draw on the HUD layer to provide information\
    \ on the attributes found, and we’ll fade into the background until the next request\
    \ is sent."
