  trans: "#### 为示例添加 Face.com 支持  \n\n在 Xcode 中再次打开 `OpenCV-iPad` 项目。从 GitHub 仓库或\
    \ Apress 网站（`www.apress.com`）的“源代码/下载”区域复制以下文件。你也可以从 `http://allseeing-i.com/ASIHTTPRequest`\
    \ 自行下载这些文件。我们将在第 13 章中详细讨论这个库。目前只需将这些文件复制到项目中即可。  \n\n- `ASIHTTPRequestConfig.h`\
    \  \n- `ASIHTTPRequestDelegate.h`  \n- `ASIProgressDelegate.h`  \n- `ASICacheDelegate.h`\
    \  \n- `ASIHTTPRequest.h`  \n- `ASIHTTPRequest.m`  \n- `ASIDataCompressor.h` \
    \ \n- `ASIDataCompressor.m`  \n- `ASIDataDecompressor.h`  \n- `ASIDataDecompressor.m`\
    \  \n- `ASIFormDataRequest.h`  \n- `ASIInputStream.h`  \n- `ASIInputStream.m`\
    \  \n- `ASIFormDataRequest.m`  \n- `ASINetworkQueue.h`  \n- `ASINetworkQueue.m`\
    \  \n- `ASIDownloadCache.h`  \n- `ASIDownloadCache.m`  \n- `ASIAuthenticationDialog.h`\
    \  \n- `ASIAuthenticationDialog.m`  \n- `Reachability.h`（位于 `External/Reachability`\
    \ 文件夹中）  \n- `Reachability.m`（位于 `External/Reachability` 文件夹中）  \n\n此外，你需要将 `CFNetwork`、`SystemConfiguration`、`MobileCoreServices`\
    \ 和 `libz.dylib` 框架添加到项目中。在继续之前，请确保项目能够无错误地构建。  \n\n#### Face.com API 密钥  \n\n\
    在浏览器中打开 [`http://www.face.com`](http://www.face.com)。右上角应该有一个名为 **开发者** 的链接。点击该链接后，再点击页面中央巨大的\
    \ **开始使用** 图片。face.com 的注册流程相当简单，只需提供姓名、电子邮件和密码即可。如果你愿意，还可以填写其余信息。无论如何，完成验证码以证明你是人类，然后点击\
    \ **注册**。按照确认邮件中的说明验证你的账户。  \n\n登录后，转到 **API 密钥** 选项卡。创建一个新的应用程序。应用程序的名称无关紧要，我使用了\
    \ `iOS AR Demo` 作为应用程序名。你将看到一个类似于图 12-8 的页面。  \n\n![图片](img/1208.jpg)  \n\n**图\
    \ 12-8.** *设置你的 face.com 应用程序。*  \n\n这里有两个设置项，在开始构建应用程序时会用到：**API 密钥** 和 **API\
    \ 密钥密文**。  \n\n#### 添加 Face.com 调用  \n\n在 Xcode 中打开 `MainViewController.h`。在头文件中导入\
    \ `ASIFormDataRequest.h`。切换到 `MainViewController.m`。在私有块的 `import` 语句之后，声明一个名为\
    \ `FaceDotComFaceDetect` 的私有方法。  \n\n添加代码清单 12-17 中的方法。  \n\n**代码清单 12-17.** *FaceDotComFaceDetect\
    \ 方法*  \n\n```objc\n- (void)FaceDotComFaceDetect {  \n    NSAutoreleasePool *\
    \ pool = [[NSAutoreleasePool alloc] init];  \n    NSData * imageData = UIImageJPEGRepresentation(cameraView.image,\
    \ 90);  \n\n    NSURL * url = [NSURL URLWithString:@\"http://api.face.com/faces/detect.json\"\
    ];  \n\n    ASIFormDataRequest *request = [ASIFormDataRequest requestWithURL:url];\
    \  \n    [request addPostValue:@\"\" forKey:@\"api_key\"];  \n    [request addPostValue:@\"\
    \" forKey:@\"api_secret\"];  \n    [request addPostValue:@\"all\" forKey:@\"attributes\"\
    ];  \n    [request addData:imageData withFileName:@\"image.jpg\" andContentType:@\"\
    image/jpeg\"  \n            forKey:@\"filename\"];  \n\n    [request startSynchronous];\
    \  \n\n    NSError *error = [request error];  \n    if (!error) {  \n        NSString\
    \ *response = [request responseString];  \n        NSDictionary *feed = [NSJSONSerialization\
    \ JSONObjectWithData:[request responseData]  \n                              \
    \                               options:kNilOptions  \n                      \
    \                                         error:&error];  \n\n        NSLog(@\"\
    RETURN: %@\", [feed allKeys]);  \n        NSLog(@\"%@\",response);  \n    } else\
    \ {  \n        NSLog(@\"An error occured %d\",[error code]);  \n    }  \n\n  \
    \  [pool drain];  \n}\n```\n\n在逐步分析之前，请确保将代码中**加粗显示**的 face.com 凭据替换为实际值。稍后我们将讨论第二个加粗部分。\
    \  \n\n该方法与我们之前用于面部识别的另外两种方法类似。首先，我们为内存管理设置了一个 `NSAutoreleasePool`。接着，我们从 `cameraViewUIImageView`\
    \ 获取 `UIImage`。不过，这次我们为 face.com API 设置了一个 HTTP POST 请求。我们将原始 JPEG 数据作为空参数添加到\
    \ POST 请求体中。  \n\n然后，我们分析响应以确保未抛出异常。如果没有错误，我们将 JSON 响应序列化并转换为 `NSDictionary`。\
    \  \n\n最后，我们只需将响应打印到控制台。最后一次更新 `didFinishPickingImage` 方法，注释掉之前的方法，并调用我们的新方法。更新后的方法应如代码清单\
    \ 12-18 所示。  \n\n**代码清单 12-18.** *更新后的 `didFinishPickingImage`*  \n\n```objc\n\
    - (void)imagePickerController:(UIImagePickerController *)picker  \ndidFinishPickingImage:(UIImage\
    \ *)image editingInfo:(NSDictionary *)editingInfo {  \n    [self dismissModalViewControllerAnimated:YES];\
    \  \n    cameraView.image = image;  \n\n    //[self openCVFaceDetect];  \n   \
    \ //[self CIDetectorFaceDetect];  \n    [self FaceDotComFaceDetect];  \n}\n```\n\
    \n在运行应用程序之前，我们先讨论一下代码清单 12-17 中的第二个加粗代码段。iOS 5 引入了对框架对象的原生 JSON 支持。你可以使用新的 `NSJSONSerialization`\
    \ 类将 JSON 转换为 Foundation 对象，或将 Foundation 对象转换为 JSON。  \n\n可转换为 JSON 的对象必须满足以下属性：\
    \  \n\n- 顶层对象是 `NSArray` 或 `NSDictionary`。  \n- 所有对象都是 `NSString`、`NSNumber`、`NSArray`、`NSDictionary`\
    \ 或 `NSNull` 的实例。  \n- 所有字典键都是 `NSString` 的实例。  \n- 数字不能是 NaN 或无穷大。  \n\n好了，运行项目。为了保持一致性，我再次选择同一张埃尔维斯图片。新请求的控制台输出如代码清单\
    \ 12-19 所示。  \n\n**代码清单 12-19.** *face.com 请求的控制台输出*"
