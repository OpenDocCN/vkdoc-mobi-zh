    \n### 总结\n\n恭喜！这是一个非常复杂的示例。我们基于现有的开源项目（即`ARKit`）进行了构建，并将其扩展为一个功能完整的社交 AR 应用。得益于\
    \ Zac、Neil 和 Alasdair 的工作，我们为应用程序的搭建打下了良好的基础。\n\n我们扩展了设置，以处理自定义应用程序视图和注释。我们通过代码改变了它们的外观，并用一个`UIButton`扩展了它们，以实现交互功能。\n\
    \n在通过 Facebook iOS SDK 将示例连接到 Facebook 之后，我们能够使用 Graph API 拉取好友列表，并为他们最近的签到位置添加坐标。\n\
    \n我们为 AR 视图中每个签到点添加了一个带模板的按钮，这样你就知道如何将帖子分享回用户的墙上了。\n\n本章内容非常有趣。我期待未来在 GitHub 上进一步扩展这个示例。同时也希望看到大家提交的\
    \ GitHub 改进版本。为 AR 增加社交背景有着无限的可能性。\n\n在第 12 章中，我们将讨论人脸识别的方法和技术。我们将研究在 AR 应用中识别人脸的三种方式。然后，在第\
    \ 13 章中，我们将选择一种方法，并将其转化为一个完整的应用示例。\n\n## 第 12 章\n\n## 人脸识别技术\n\n增强现实应用编程中最令人印象深刻的技术之一就是人脸识别。无论是能识别友方与已知威胁的安全应用，还是在人群中扫描你的\
    \ Facebook 好友的社交应用，亦或是允许你试戴太阳镜或预览不同发型的零售应用，面部 AR 技术都令人惊叹。\n\n传统上，人脸识别编程的挑战在于机器实时处理图像所需的资源量。这自然使其很难应用于移动设备。这就是为什么我们看到大多数面部识别算法是通过浏览器或可安装程序运行的原因。\n\
    \n随着 iOS 以及更新版本移动设备的出现，这种情况已经改变。iPad 2 拥有足够强大的处理能力，来应对面部识别应用对 CPU 较高强度的要求。\n\n\
    在本章中，我们将讨论在 iOS 移动环境中进行人脸识别的一些较新的方法。\n\n### 人脸识别的选择\n\n为应用添加人脸识别功能有多种方法。我们将介绍其中的三种。第一种方法历史最悠久，并且关于该主题的资料也最为丰富。这种方法被称为“开源计算机视觉库”（OpenCV）。\n\
    \n#### OpenCV\n\nOpenCV 最初由英特尔开发，并于 2006 年左右发布到开源社区。它获得了 Willow Garden 公司的企业支持，并且在撰写本书时仍在积极开发中。\n\
    \nOpenCV 的原始代码库是 C 语言，这使得它易于移植到大多数平台。从 C#到 Java，都有对应的移植版本。当然，也有针对 iOS 的移植版本。\n\
    \nOpenCV 是我们本章将要讨论的主题中最复杂、最先进的。由于其历史悠久且基于 C 语言，它最不“对开发者友好”。然而，与其他方法相比，它的优势在于网上有大量的示例和教程。在撰写本书时，我在网上找不到另外两种方法的示例。\n\
    \n#### iOS 5 CIDetector 类\n\niOS 5 在 CoreImage 框架下引入了一组用于人脸检测的新类。我们将使用`CIDetector`和`CIFeature`类来在实时摄像头视图中定位人脸。\n\
    \n`CIDetector`类是 iOS 5 的一部分。该类使用一组预定义的检测器来查找图像中的特征。iOS 5 为面部识别定义了一个单一的检测器。可以推测，这个类的结构设计是为了将来能扩展到其他常见的物体映射。\n\
    \n正如我们将要讨论的，设置检测器时可用的选项并不多。基本上，你可以设置检测类型（目前唯一可用的类型是`CIDetectorTypeFace`），以及设置检测精度（高或低）。\n\
    \n不过我要提一下，使用`CIDetector`的速度明显快于 OpenCV。\n\n#### Face.com\n\n可以将其视为“第三方 API 方法”。随着互联网连接的普及速度如此之快，我们能够探索以前不可能实现的方案。像\
    \ face.com 这样的平台提供免费的 REST API，用于处理图像中的人脸检测。\n\n在本章中，我将介绍该 API 及其一些功能，然后在第 13\
    \ 章中我们将进一步深入这种方法，并构建一个功能完整的应用。"
- fmt: "### Using the OpenCV Approach\n\nLet's get started with an OpenCV example.\
    \ Before we can create the Xcode project, we need to download and install the\
    \ library. Point your browser to [`http://www.eosgarden.com/en/opensource/opencv-ios/download/`](http://www.eosgarden.com/en/opensource/opencv-ios/download/).\
    \ This is a compiled distribution of OpenCV built for iOS. Its source can be found\
    \ at [`https://github.com/macmade/OpenCV-iOS`](https://github.com/macmade/OpenCV-iOS),\
    \ should you be interested in rebuilding the binary.\n\nFor this example, we'll\
    \ be using the precompiled distribution from eosgarden for iPad. Download the\
    \ files labeled **iPad**. Navigate to the downloaded directory in Finder and open\
    \ the archive. We're going to build right on top of this distribution for the\
    \ example.\n\nLet's first examine the file structure of the download. If you expand\
    \ the main subdirectories of the downloaded project, you'll see something similar\
    \ to [Figure 12–1](#Chapter12.html#fig_12_1).\n\n![Image](images/1201.jpg)\n\n\
    **Figure 12–1.** *Download and expand the directories of the OpenCV-iPad example\
    \ application.*\n\nThe main files to take note of are under the **OpenCV** directory.\
    \ If you were to download and build your own distribution, you would only have\
    \ the files under the **src** and **patch** directories. The **lib** and **bin**\
    \ directories are precompiled distributions for both the iOS simulator and the\
    \ iOS physical device family.\n\n#### Capturing the Image for Testing\n\nOpen\
    \ `MainViewController.xib` in interface builder. There isn't much going on with\
    \ this file so far. If you launch the application, it would simply display the\
    \ title and link labels shown in [Figure 12–2](#Chapter12.html#fig_12_2).\n\n\
    ![Image](images/1202.jpg)\n\n**Figure 12–2.** *Launching the application displays\
    \ the `MainViewController` default state.*\n\nIn [Chapter 13](#Chapter13.html#ch13),\
    \ we're going to discuss analyzing the live camera feed for facial recognition.\
    \ To introduce some of the technologies available for facial recognition, we're\
    \ going to use static camera images to make things a bit easier to measure in\
    \ regards to performance and ease of use.\n\nAdjust `MainViewController` as shown\
    \ in [Figure 12–3](#Chapter12.html#fig_12_3). We are adding a Toolbar, a `UIImageView`,\
    \ a `UILabel`, and a Bar Button Item (with the camera identifier) to the view.\n\
    \nCreate a property called `toolbar` for the `UIToolbar` in `MainViewController.h`.\
    \ Also, link an `IBAction` method called `cameraButtonClicked` to the Bar Button\
    \ Item. In addition, the `UIImageView` is linked to a property called `cameraView`,\
    \ and the Timer Label (in the bottom right) is linked to a property called `timerLabel`.\
    \ I created the `UIImageView` with dimensions of 600 × 800 to match the iPad camera's\
    \ aspect ratio, so we don't have to rescale the images to display them. In [Chapter\
    \ 13](#Chapter13.html#ch13), we'll discuss scaling the camera view on the fly\
    \ to display the raw camera feed in the correct aspect ratio.\n\n![Image](images/1203.jpg)\n\
    \n**Figure 12–3.** *Adjust the `MainViewController` layout.*\n\nWhile you still\
    \ have `MainViewController.h` open in Xcode, declare a `UIImagePickerController`\
    \ ivar called `_imagePicker`. In addition, nominate the class as a `UINavigationControllerDelegate`,\
    \ `UIImagePickerControllerDelegate`, `UIPopoverControllerDelegate`, and a `UIActionSheetDelegate`.\n\
    \nLastly, create an ivar called `_imagePopover` of the `UIPopoverController` class.\
    \ We will use this to hold the pop-ups for the photo library or saved photo applications.\n\
    \nYour new `MainViewController.h` should read like [Listing 12–1](#Chapter12.html#list_12_1).\n\
    \n**Listing 12–1.** *New `MainViewController.h`*\n\n```\n#import <UIKit/UIKit.h>\n\
    @interface MainViewController : UIViewController <UINavigationControllerDelegate,\n\
    UIImagePickerControllerDelegate, UIActionSheetDelegate, UIPopoverControllerDelegate>\
    \ {\n    UIImagePickerController *_imagePicker;\n    UIPopoverController *_imagePopover;\n\
    }\n\n@property (retain, nonatomic) IBOutlet UIImageView *cameraView;\n@property\
    \ (retain, nonatomic) IBOutlet UILabel *timerLabel;\n@property (retain, nonatomic)\
    \ IBOutlet UIToolbar *toolbar;\n- (IBAction)cameraButtonClicked:(id)sender;\n\
    @end\n```\n\nSwitch over to `MainViewController.m`. If you linked the `IBOutlet`s\
    \ using interface builder, you won't have to add any synthesize or release statements\
    \ to the implementation. You should release `_imagePicker` in your implementation's\
    \ `dealloc` method, either way.\n\n**NOTE:** This class contains two methods derived\
    \ from [`https://github.com/macmade/facedetect`](https://github.com/macmade/facedetect).\
    \ The source on GitHub and from Apress ([`www.apress.com`](http://www.apress.com))\
    \ has the appropriate license text in the headers.\n\nFind the `viewDidLoad` method\
    \ and update it, as shown in [Listing 12–2](#Chapter12.html#list_12_2).\n\n**Listing\
    \ 12–2.** *New `viewDidLoad` in `MainViewController.h`*\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // Do any additional setup after loading the\
    \ view from its nib.\n    _imagePicker = [[UIImagePickerController alloc] init];\n\
    \    _imagePicker.delegate = self;\n}\n```\n\nWe need to make sure that our`UIImagePickerController`\
    \ is allocated before we attempt to present it in a modal view, or we will end\
    \ up with an error caused by displaying a nil `ViewController`. Next, we simply\
    \ set the `delegate` to `self` so we can handle the `didFinishPickingImage` delegate\
    \ method in our class."
  raw: '### Using the OpenCV Approach


    Let’s get started with an OpenCV example. Before we can create the Xcode project,
    we need to download and install the library. Point your browser to [`http://www.eosgarden.com/en/opensource/opencv-ios/download/`](http://www.eosgarden.com/en/opensource/opencv-ios/download/).
    This is a compiled distribution of OpenCV built for iOS. Its source can be found
    at [`https://github.com/macmade/OpenCV-iOS`](https://github.com/macmade/OpenCV-iOS),
    should you be interested in rebuilding the binary.


    For this example, we’ll be using the precompiled distribution from eosgarden for
    iPad. Download the files labeled **iPad**. Navigate to the downloaded directory
    in Finder and open the archive. We’re going to build right on top of this distribution
    for the example.


    Let’s first examine the file structure of the download. If you expand the main
    subdirectories of the downloaded project, you’ll see something similar to [Figure
    12–1](#Chapter12.html#fig_12_1).


    ![Image](images/1201.jpg)


    **Figure 12–1.** *Download and expand the directories of the OpenCV-iPad example
    application.*


    The main files to take note of are under the **OpenCV** directory. If you were
    to download and build your own distribution, you would only have the files under
    the **src** and **patch** directories. The **lib** and **bin** directories are
    precompiled distributions for both the iOS simulator and the iOS physical device
    family.


    #### Capturing the Image for Testing


    Open `MainViewController.xib` in interface builder. There isn’t much going on
    with this file so far. If you launch the application, it would simply display
    the title and link labels shown in [Figure 12–2](#Chapter12.html#fig_12_2).


    ![Image](images/1202.jpg)


    **Figure 12–2.** *Launching the application displays the MainViewController default
    state.*


    In [Chapter 13](#Chapter13.html#ch13), we’re going to discuss analyzing the live
    camera feed for facial recognition. To introduce some of the technologies available
    for facial recognition, we’re going to use static camera images to make things
    a bit easier to measure in regards to performance and ease of use.


    Adjust `MainViewController` as shown in [Figure 12–3](#Chapter12.html#fig_12_3).
    We are adding a Toolbar, a `UIImageView`, a `UILabel`, and a Bar Button Item (with
    the camera identifier) to the view.


    Create a property called `toolbar` for the `UIToolbar` in `MainViewController.h`.
    Also, link an `IBAction` method called `cameraButtonClicked` to the Bar Button
    Item. In addition, the `UIImageView` is linked to a property called `cameraView`,and
    the Timer Label (in the bottom right) is linked to a property called `timerLabel`.
    I created the `UIImageView` with dimensions of 600 × 800 to match the iPad camera’s
    aspect ratio, so we don’t have to rescale the images to display them. In [Chapter
    13](#Chapter13.html#ch13), we’ll discuss scaling the camera view on the fly to
    display the raw camera feed in the correct aspect ratio.


    ![Image](images/1203.jpg)


    **Figure 12–3.** *Adjust the MainViewController layout.*


    While you still have `MainViewController.h` open in Xcode, declare a `UIImagePickerController`
    ivar called `_imagePicker`. In addition, nominate the class as a `UINavigationControllerDelegate`,
    `UIImagePickerControllerDelegate`, `UIPopoverControllerDelegate`, and a `UIActionSheetDelegate`.


    Lastly, create an ivar called `_imagePopover` of the `UIPopoverController` class.
    We will use this to hold the pop-ups for the photo library or saved photo applications.


    Your new `MainViewController.h` should read like [Listing 12–1](#Chapter12.html#list_12_1).


    **Listing 12–1.** *New MainViewController.h*


    `#import <UIKit/UIKit.h>`

    `@interface MainViewController : UIViewController <UINavigationControllerDelegate,`

    `UIImagePickerControllerDelegate, UIActionSheetDelegate, UIPopoverControllerDelegate>
    {`

    `    UIImagePickerController *_imagePicker;`

    `    UIPopoverController *_imagePopover;`

    `}`


    `@property (retain, nonatomic) IBOutlet UIImageView *cameraView;`

    `@property (retain, nonatomic) IBOutlet UILabel *timerLabel;`

    `@property (retain, nonatomic) IBOutlet UIToolbar *toolbar;`

    `- (IBAction)cameraButtonClicked:(id)sender;`

    `@end`


    Switch over to `MainViewController.m`. If you linked the `IBOutlet`s using interface
    builder, you won’t have to add any synthesize or release statements to the implementation.
    You should release `_imagePicker` in your implementation’s `dealloc` method, either
    way.


    **NOTE:** This class contains two methods derived from [`https://github.com/macmade/facedetect`](https://github.com/macmade/facedetect).
    The source on GitHub and from Apress ([`www.apress.com`](http://www.apress.com))
    has the appropriate license text in the headers.


    Find the `viewDidLoad` method and update it, as shown in [Listing 12–2](#Chapter12.html#list_12_2).


    **Listing 12–2.** *New viewDidLoad in MainViewController.h*


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`

    `    // Do any additional setup after loading the view from its nib.`

    `    _imagePicker = [[UIImagePickerController alloc] init];`

    `    _imagePicker.delegate = self;`

    `}`


    We need to make sure that our`UIImagePickerController` is allocated before we
    attempt to present it in a modal view, or we will end up with an error caused
    by displaying a nil `ViewController`. Next, we simply set the `delegate` to `self`
    so we can handle the `didFinishPickingImage` delegate method in our class.'
  trans: "\n### 使用 OpenCV 方法\n\n让我们从一个 OpenCV 示例开始。在创建 Xcode 项目之前，我们需要下载并安装该库。请将浏览器指向\
    \ [`http://www.eosgarden.com/en/opensource/opencv-ios/download/`](http://www.eosgarden.com/en/opensource/opencv-ios/download/)。这是为\
    \ iOS 构建的 OpenCV 编译分发版。其源代码可以在 [`https://github.com/macmade/OpenCV-iOS`](https://github.com/macmade/OpenCV-iOS)\
    \ 找到，如果您有兴趣重新构建二进制文件的话。\n\n在这个示例中，我们将使用来自 eosgarden 的 iPad 预编译分发版。下载标记为 **iPad**\
    \ 的文件。在 Finder 中导航到下载目录并打开存档。我们将直接在此分发版的基础上构建示例。\n\n首先，检查下载文件的目录结构。展开下载项目的主要子目录后，您会看到类似\
    \ 图 12-1 的内容。\n\n![图片](img/1201.jpg)\n\n**图 12-1.** *下载并展开 OpenCV-iPad 示例应用程序的目录。*\n\
    \n需要注意的主要文件位于 **OpenCV** 目录下。如果您要下载并构建自己的分发版，则只需 **src** 和 **patch** 目录下的文件。**lib**\
    \ 和 **bin** 目录是分别为 iOS 模拟器和 iOS 物理设备系列提供的预编译分发版。\n\n#### 捕获用于测试的图像\n\n在界面生成器中打开`MainViewController.xib`。目前这个文件还没有什么内容。如果您启动应用程序，它只会显示\
    \ 图 12-2 中所示的标题和链接标签。\n\n![图片](img/1202.jpg)\n\n**图 12-2.** *启动应用程序会显示`MainViewController`的默认状态。*\n\
    \n在第 13 章中，我们将讨论分析实时摄像头画面以进行面部识别。为了介绍一些可用于面部识别的技术，我们将使用静态摄像头图像，以便在性能和易用性方面更容易衡量。\n\
    \n按照 图 12-3 所示调整`MainViewController`。我们正在向视图中添加一个工具栏、一个`UIImageView`、一个`UILabel`和一个条形按钮项（带有相机标识符）。\n\
    \n在`MainViewController.h`中为`UIToolbar`创建一个名为`toolbar`的属性。同时，将一个名为`cameraButtonClicked`的`IBAction`方法链接到条形按钮项。此外，将`UIImageView`链接到一个名为`cameraView`的属性，并将计时器标签（右下角）链接到一个名为`timerLabel`的属性。我创建的`UIImageView`尺寸为\
    \ 600 × 800，以匹配 iPad 摄像头的宽高比，这样我们就不必重新缩放图像来显示它们。在第 13 章中，我们将讨论如何动态缩放摄像头视图，以正确的宽高比显示原始摄像头画面。\n\
    \n![图片](img/1203.jpg)\n\n**图 12-3.** *调整`MainViewController`布局。*\n\n当您在 Xcode\
    \ 中仍打开`MainViewController.h`时，声明一个名为`_imagePicker`的`UIImagePickerController` ivar。此外，将该类指定为`UINavigationControllerDelegate`、`UIImagePickerControllerDelegate`、`UIPopoverControllerDelegate`和`UIActionSheetDelegate`。\n\
    \n最后，创建一个`UIPopoverController`类的 ivar，名为`_imagePopover`。我们将用它来存放照片库或已保存照片应用程序的弹出窗口。\n\
    \n您的新`MainViewController.h`应该如代码清单 12-1 所示。\n\n**代码清单 12-1.** *新`MainViewController.h`*\n\
    \n```\n#import <UIKit/UIKit.h>\n@interface MainViewController : UIViewController\
    \ <UINavigationControllerDelegate,\nUIImagePickerControllerDelegate, UIActionSheetDelegate,\
    \ UIPopoverControllerDelegate> {\n    UIImagePickerController *_imagePicker;\n\
    \    UIPopoverController *_imagePopover;\n}\n\n@property (retain, nonatomic) IBOutlet\
    \ UIImageView *cameraView;\n@property (retain, nonatomic) IBOutlet UILabel *timerLabel;\n\
    @property (retain, nonatomic) IBOutlet UIToolbar *toolbar;\n- (IBAction)cameraButtonClicked:(id)sender;\n\
    @end\n```\n\n切换到`MainViewController.m`。如果您使用界面生成器链接了`IBOutlet`，则无需在实现中添加任何 synthesize\
    \ 或 release 语句。无论哪种方式，您都应在实现的`dealloc`方法中释放`_imagePicker`。\n\n**注意:** 本类包含两个源自\
    \ [`https://github.com/macmade/facedetect`](https://github.com/macmade/facedetect)\
    \ 的方法。GitHub 和 Apress ([`www.apress.com`](http://www.apress.com)) 上的源代码在头文件中包含相应的许可文本。\n\
    \n找到`viewDidLoad`方法，并按代码清单 12-2 所示更新它。\n\n**代码清单 12-2.** *`MainViewController.h`\
    \ 中的新`viewDidLoad`*\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
    \    // 在此添加从 nib 加载视图后的任何额外设置。\n    _imagePicker = [[UIImagePickerController\
    \ alloc] init];\n    _imagePicker.delegate = self;\n}\n```\n\n我们需要确保在尝试以模态视图呈现`UIImagePickerController`之前先分配它，否则会因为显示一个\
    \ nil 的`ViewController`而导致错误。接下来，我们只需将`delegate`设置为`self`，以便在我们的类中处理`didFinishPickingImage`委托方法。\n"
- fmt: "找到接口构建器为咱们声明的`cameraButtonClicked`方法，添加[代码清单12-3](#Chapter12.html#list_12_3)中所示的代码。\n\
    \n**代码清单 12–3.** *更新后的`cameraButtonClicked`方法*\n\n```\n- (IBAction)cameraButtonClicked:(id)sender\
    \ {\n    UIActionSheet *_sheet = [[UIActionSheet alloc] initWithTitle:@\"Choose\
    \ Source\"\ndelegate:self cancelButtonTitle:@\"Cancel\" destructiveButtonTitle:nil\n\
    otherButtonTitles:@\"Camera\", @\"Library\", @\"Photo Album\", nil];\n    [_sheet\
    \ showInView:self.view];\n    [_sheet release];\n}\n```\n\n此方法仅将控制权转交给`UIActionSheet`。我们将在`UIActionSheet`的委托方法中处理用户的选择。接下来实现它。将[代码清单12-4](#Chapter12.html#list_12_4)所示的方法添加到实现中。\n\
    \n**代码清单 12–4.** *`UIActionSheet` 委托方法*\n\n```\n- (void)actionSheet:(UIActionSheet\
    \ *)actionSheet\nclickedButtonAtIndex:(NSInteger)buttonIndex {\n    if (buttonIndex\
    \ == 0) {\n        _imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;\n\
    \        [self presentModalViewController:_imagePicker animated:YES];\n      \
    \  return;\n    } else if (buttonIndex == 1) {\n        _imagePicker.sourceType\
    \ = UIImagePickerControllerSourceTypePhotoLibrary;\n    } else {\n        _imagePicker.sourceType\
    \ = UIImagePickerControllerSourceTypeSavedPhotosAlbum;\n    }\n// only for iPad\n\
    \    _imagePopover = [[UIPopoverController alloc] initWithContentViewController:_imagePicker];\n\
    \    _imagePopover.delegate = self;\n    [_imagePopover presentPopoverFromRect:toolbar.frame\n\
    \                                   inView:self.view\n                 permittedArrowDirections:UIPopoverArrowDirectionAny\n\
    \                                 animated:YES];\n    [_imagePicker release];\n\
    }\n```\n\n此方法为`UIImagePickerController`提供了三种不同的源选择。我们可以简单地默认显示摄像头，但如果您想在模拟器上测试此应用程序，您需要能够将源类型更改为相册或照片图库。\n\
    \n请记住，这是一个 iPad 应用程序。iPad 要求`UIImagePickerController`显示在`UIPopoverController`中，而不是`ModalViewController`中。这与\
    \ iPhone 或 iPod touch 不同，因此如果您不是在 iPad 上测试，请确保在一个模态对话框中启动所有的`UIImagePickerController`，而不是在`UIPopoverController`中。\n\
    \n用户选择图像后，`UIImagePickerController`类（正如您可能从[第6章](#Chapter06.html#ch6)回忆的那样）会调用其`didFinishPickingImage`委托方法。我们将使用[代码清单12-5](#Chapter12.html#list_12_5)中的代码来处理该方法。\n\
    \n**代码清单 12–5.** *`UIImagePickerController` 委托方法*\n\n```\n- (void)imagePickerController:(UIImagePickerController\
    \ *)picker\ndidFinishPickingImage:(UIImage *)image editingInfo:(NSDictionary *)editingInfo\
    \ {\n    [self dismissModalViewControllerAnimated:YES];\n    cameraView.image\
    \ = image;\n}\n```\n\n您的应用程序现在应该可以在模拟器或物理设备上进行测试。运行应用程序。点击工具栏中的摄像头按钮，您将看到一个`UIActionSheet`，如图[12–4](#Chapter12.html#fig_12_4)所示。\n\
    \n如果您在模拟器上运行，请确保选择**Library**或**Photo Album**。您将看到一个类似于[图12–5](#Chapter12.html#fig_12_5)的弹出窗口。如果您选择**Camera**视图，您将看到摄像头全屏显示。\n\
    \n![Image](images/1204.jpg)\n\n**图 12–4.** *从`UIActionSheet`中选择摄像头源。*\n\n![Image](images/1205.jpg)\n\
    \n**图 12–5.** *`UIPopoverController`在 iPad 上显示`UIImagePickerController`。*\n\n\
    #### Haar 级联\n\n在我们对 OpenCV 进行操作之前，需要向项目中添加几个 Haar 级联。Haar 级联是一组用于物体识别的组织化的分类器级联或数字图像特征。其名称来源于最早用于人脸检测系统的\
    \ Haar 小波。\n\n在 Haar 小波出现之前，图像识别分析每个像素 RGB 值的强度，这需要相当多的时间和计算资源。Haar 级联用于分析检测窗口的相邻矩形区域，并对这些区域的像素强度进行求和，以便相互比较，而不是逐像素比较。Viola\
    \ 和 Jones 在 2001 年发表的论文《使用简单特征的增强级联进行快速物体检测》（已在 2001 年计算机视觉与模式识别会议上被接受）中记录了这种方法。^([1](#Chapter12.html#CHP-12-FN-1))\n\
    \n如果您想进一步研究这个主题，该算法背后的数学原理有详尽的文档记录。我们将使用 OpenCV 源代码发行版中自带的 Haar 级联。您可以在[`http://opencv.willowgarage.com/wiki/`](http://opencv.willowgarage.com/wiki/)找到该发行版。如果您不想再下载另一个版本的\
    \ OpenCV（准确地说，这是原始版本），您可以只需从本书在 GitHub 上的示例代码或 Apress 网站（[`www.apress.com`](http://www.apress.com)）的源代码/下载区域复制这些文件。\n\
    \n找到您将要使用的级联目录，并将它们拖放到您的 Xcode 项目中。确保选择了按需复制资源的选项。\n\n**注意：** 如果您已经为 iOS 5 编译了自己的\
    \ OpenCV 发行版，可以跳过下一节。将您编译好的库添加到项目中，一切就绪。\n\n切换到`MainViewController.m`。在`import`语句之后，添加[代码清单12-6](#Chapter12.html#list_12_6)中的代码。\n\
    \n**代码清单 12–6.** *私有方法*\n\n```\n@interface MainViewController (Private)\n- (IplImage\
    \ *)createIplImage:(UIImage *)image;\n- (void)openCVFaceDetect;\n@end\n```\n\n\
    我们只是声明了几个将用于分析图像的私有方法。现在让我们实现这些方法，然后我们逐步讲解它们。\n\n__________\n\n¹ 你可以在[`http://research.microsoft.com/enus/um/people/viola/Pubs/Detect/violaJones_CVPR2001.pdf`](http://research.microsoft.com/enus/um/people/viola/Pubs/Detect/violaJones_CVPR2001.pdf)找到整篇论文。\n\
    \n首先，将[代码清单12-7](#Chapter12.html#list_12_7)中的方法添加到实现中。正如我之前提到的，这两个实用方法来自 eosgarden\
    \ 示例项目。它们按原样在 iOS 5 上无法工作，但我们稍后会修复这个问题。\n\n**代码清单 12–7.** *`createIplImage` 方法*\n\
    \n```\n- ( IplImage * )createIplImage: ( UIImage * )image\n{\n    CGImageRef \
    \     imageRef;\n    CGColorSpaceRef colorSpaceRef;\n    CGContextRef    context;\n\
    \    IplImage      * iplImage;\n    IplImage      * returnImage;\n\n    imageRef\
    \      = image.CGImage;\n    colorSpaceRef = CGColorSpaceCreateDeviceRGB();\n\
    \    iplImage      = cvCreateImage( cvSize( image.size.width, image.size.height\
    \ ),\nIPL_DEPTH_8U, 4 );\n    context       = CGBitmapContextCreate\n    (\n \
    \    iplImage->imageData,\n     iplImage->width,\n     iplImage->height,\n   \
    \  iplImage->depth,\n     iplImage->widthStep,\n     colorSpaceRef,\n     kCGImageAlphaPremultipliedLast\
    \ | kCGBitmapByteOrderDefault\n     );\n\n    CGContextDrawImage( context, CGRectMake(\
    \ 0, 0, image.size.width, image.size.height\n), imageRef );\n    CGContextRelease(\
    \ context );\n    CGColorSpaceRelease( colorSpaceRef );\n\n    returnImage = cvCreateImage(\
    \ cvGetSize( iplImage ), IPL_DEPTH_8U, 3 );\n\n    cvCvtColor( iplImage, returnImage,\
    \ CV_RGBA2BGR );\n    cvReleaseImage( &iplImage );\n\n    return returnImage;\n\
    }\n```"
  raw: 'Locate the `cameraButtonClicked` method that interface builder declared for
    us. Add the code shown in [Listing 12–3](#Chapter12.html#list_12_3).


    **Listing 12–3.** *Updated cameraButtonClicked Method*


    `- (IBAction)cameraButtonClicked:(id)sender {`

    `    UIActionSheet *_sheet = [[UIActionSheet alloc] initWithTitle:@"Choose Source"`

    `delegate:self cancelButtonTitle:@"Cancel" destructiveButtonTitle:nil`

    `otherButtonTitles:@"Camera", @"Library", @"Photo Album", nil];`

    `    [_sheet showInView:self.view];`

    `    [_sheet release];`

    `}`


    This method simply forwards control to a `UIActionSheet`. We will handle the user’s
    choice in the `UIActionSheet`’s delegate methods. Let’s implement that next. Add
    the method shown in [Listing 12–4](#Chapter12.html#list_12_4) to the implementation.


    **Listing 12–4.** *UIActionSheet Delegate Methods*


    `- (void)actionSheet:(UIActionSheet *)actionSheet`

    `clickedButtonAtIndex:(NSInteger)buttonIndex {`

    `    if (buttonIndex == 0) {`

    `        _imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;`

    `        [self presentModalViewController:_imagePicker animated:YES];`

    `        return;`

    `    } else if (buttonIndex == 1) {`

    `        _imagePicker.sourceType = UIImagePickerControllerSourceTypePhotoLibrary;`

    `    } else {`

    `        _imagePicker.sourceType = UIImagePickerControllerSourceTypeSavedPhotosAlbum;`

    `    }`

    `// only for iPad`

    `    _imagePopover = [[UIPopoverController alloc] initWithContentViewController:_imagePicker];`

    `    _imagePopover.delegate = self;`

    `    [_imagePopover presentPopoverFromRect:toolbar.frame`

    `                                   inView:self.view`

    `                 permittedArrowDirections:UIPopoverArrowDirectionAny`

    `                                 animated:YES];`

    `    [_imagePicker release];`

    `}`


    This method presents the three different source choices for the `UIImagePickerController`.
    We could simply show the camera by default, but if you would like to test this
    application on the simulator, you’ll need the option to change the source type
    to the photo library or photo album application.


    Remember, this is an iPad application. The iPad requires that `UIImagePickerController`sare
    displayed in `UIPopoverController`s, not `ModalViewController`s. This differs
    from the iPhone or iPod touch, so if you are not testing on an iPad, make sure
    you launch all the `UIImagePickerController`s in a modal dialog and not a `UIPopoverController`.


    After the user selects and image, the `UIImagePickerController` class (as you
    probably remember from [Chapter 6](#Chapter06.html#ch6)) calls its `didFinishPickingImage`
    delegate method. We will handle that method with the code from [Listing 12–5](#Chapter12.html#list_12_5).


    **Listing 12–5.** *UIImagePickerController Delegate Method*


    `- (void)imagePickerController:(UIImagePickerController *)picker`

    `didFinishPickingImage:(UIImage *)image editingInfo:(NSDictionary *)editingInfo
    {`

    `    [self dismissModalViewControllerAnimated:YES];`

    `    cameraView.image = image;`

    `}`


    Your application should be at a point where it can be tested on either the simulator
    or on a physical device. Run the application. Click on the camera button in the
    toolbar, and you’ll be presented with a `UIActionSheet`, as shown in [Figure 12–4](#Chapter12.html#fig_12_4).


    If you are running on the simulator, be sure to choose either **Library** or **Photo
    Album**. You will see a pop-up similar to [Figure 12–5](#Chapter12.html#fig_12_5).
    If you choose the **Camera** view, you’ll see the camera display in full screen.


    ![Image](images/1204.jpg)


    **Figure 12–4.** *Pick the camera source from the UIActionSheet.*


    ![Image](images/1205.jpg)


    **Figure 12–5.** *UIPopoverController displays UIImagePickerController on the
    iPad.*


    #### Haar Cascades


    Before we can do anything with OpenCV, we need to add a few Haar cascades to our
    project. Haar cascades are a set of organized classifier cascades or digital image
    features used for object recognition. The name originates from Haar wavelets,
    which were used in the first facial-detection system.


    Before Haar wavelets, image recognition analyzed the intensity of each pixel’s
    RGB values, which took a considerable amount of time and computing resources.
    A Haar cascade is used to analyze adjacent rectangular regions of a detection
    window and to sum up the pixel intensity of these regions so they can be compared
    to each other, instead of comparing pixel by pixel. This approach was documented
    by Viola and Jones in the 2001 publication “Rapid Object Detection using Boosted
    Cascade of Simple Features,” Accepted Conference on Computer Vision and Pattern
    Recognition 2001.^([1](#Chapter12.html#CHP-12-FN-1))


    The math behind the algorithm is well documented if you’d like to research this
    subject further. We will be using the supplied Haar cascades that came with the
    source distribution of OpenCV. You can find the distribution on [`http://opencv.willowgarage.com/wiki/`](http://opencv.willowgarage.com/wiki/).
    If you’d rather not download yet another version of OpenCV (this is the original,
    to be accurate), you can just copy the files from this book’s example code on
    GitHub or from the Source Code/Download area of the Apress web site ([`www.apress.com`](http://www.apress.com)).


    Find the directory of cascades you’ll be using, and drag and drop them into your
    Xcode project. Make sure you select the option to copy resources as needed.


    **NOTE:** If you compiled your own distribution of OpenCV for iOS 5, you can skip
    this next section. Add your compiled library to the project, and you should be
    all set.


    Switch over to `MainViewController.m`. Just after the `import` statements, add
    the code from [Listing 12–6](#Chapter12.html#list_12_6).


    **Listing 12–6.** *Private Methods*


    `@interface MainViewController (Private)`

    `- (IplImage *)createIplImage:(UIImage *)image;`

    `- (void)openCVFaceDetect;`

    `@end`


    We’re simply declaring a few private methods that we’ll be using to analyze the
    image. Let’s implement these methods now, then we’ll walk through them step by
    step.


    __________


    ¹ You can find the entire paper at [`http://research.microsoft.com/enus/um/people/viola/Pubs/Detect/violaJones_CVPR2001.pdf`](http://research.microsoft.com/enus/um/people/viola/Pubs/Detect/violaJones_CVPR2001.pdf).


    First, add the method from [Listing 12–7](#Chapter12.html#list_12_7) to the implementation.
    As I mentioned earlier, these next two utility methods are from the eosgarden
    sample project. They won’t work on iOS 5 as distributed, but we’ll fix that in
    a moment.


    **Listing 12–7.** *createIplImage Method*


    `- ( IplImage * )createIplImage: ( UIImage * )image`

    `{`

    `    CGImageRef      imageRef;`

    `    CGColorSpaceRef colorSpaceRef;`

    `    CGContextRef    context;`

    `    IplImage      * iplImage;`

    `    IplImage      * returnImage;`


    `    imageRef      = image.CGImage;`

    `    colorSpaceRef = CGColorSpaceCreateDeviceRGB();`

    `    iplImage      = cvCreateImage( cvSize( image.size.width, image.size.height
    ),`

    `IPL_DEPTH_8U, 4 );`

    `    context       = CGBitmapContextCreate`

    `    (`

    `     iplImage->imageData,`

    `     iplImage->width,`

    `     iplImage->height,`

    `     iplImage->depth,`

    `     iplImage->widthStep,`

    `     colorSpaceRef,`

    `     kCGImageAlphaPremultipliedLast | kCGBitmapByteOrderDefault`

    `     );`


    `    CGContextDrawImage( context, CGRectMake( 0, 0, image.size.width, image.size.height`

    `), imageRef );`

    `    CGContextRelease( context );`

    `    CGColorSpaceRelease( colorSpaceRef );`


    `    returnImage = cvCreateImage( cvGetSize( iplImage ), IPL_DEPTH_8U, 3 );`


    `    cvCvtColor( iplImage, returnImage, CV_RGBA2BGR );`

    `    cvReleaseImage( &iplImage );`


    `    return returnImage;`

    `}`'
