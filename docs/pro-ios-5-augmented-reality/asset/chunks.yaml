    and `Device` (if you plan on testing on a device).


    **NOTE:** If you’re testing on the simulator, you’ll need to add the Accelerate
    framework to your project. This wasn’t included in the sample project.


    Let’s try to run this project again. Either use your camera or select a file from
    the library. You should see something similar to [Figure 12–6](#Chapter12.html#fig_12_6).


    ![Image](images/1206.jpg)


    **Figure 12–6.** *OpenCV is now working on the iPad simulator.*


    We found Elvis in the picture from the photo library.


