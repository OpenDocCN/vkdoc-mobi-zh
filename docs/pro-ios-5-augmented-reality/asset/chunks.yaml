    }

    ```


    ### Summary


    In this chapter, we learned about the core concepts of the video camera and its
    features on iOS devices. We started with basic photos. We set up a `UIImageViewController`
    object to capture pictures selected by the user. Next, we learned how to save
    and convert those pictures to the local file system. Finally, we sent the file
    over e-mail as an attachment. Along the way, we introduced storyboarding, which
    is new to iOS 5.


    Next, we introduced video capture. This will be the main component of most of
    the remaining chapters in the book. We learned how to remove the camera controls
    and use a video preview that occupies the full-screen layout. In addition, we
    set up a video capture session so we could analyze the frames for purposes of
    marker or facial-recognition applications.


    In the next chapter, we''ll introduce cocos2D, which is a great framework for
    building games. I''ll show you how to use cocos2D and the concepts from this chapter
    to build a foundation for your first augmented reality game.


    ## Chapter 7


    ## Using cocos2D for AR


    We''ve already talked about the different use cases for augmented-reality applications.
    Other than the presentation of location-based information, gaming applications
    take a big percentage of the augmented-reality market space.


    In this chapter, I''m going to introduce cocos2D for iPhone. cocos2D for iPhone
    is a framework for building 2D games and graphically interactive applications.
    It is based on the cocos2D framework, which you can read more about at [`www.cocos2d.org`](http://www.cocos2d.org).


    ### Overview


    It is the open sourced cocos2D framework that provides the basis for cocos2D for
    iPhone. The original project was written in Python. Obviously, this wasn''t all
    that useful for iOS programmers. cocos2D for iPhone is a port of this framework
    to Objective-C.


    cocos2D has a few key characteristics, such as its ease of use, its speed and
    flexibility, and that it is open source. cocos2D happens to be one of the open
    source projects with great community support and adoption. The last, and most
    important, characteristic of cocos2D (if you''re going to release an app, that
    is) is that it''s approved for use on the App Store.'
