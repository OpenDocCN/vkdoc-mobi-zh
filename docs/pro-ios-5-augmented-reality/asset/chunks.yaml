    \ Basically, you insert function calls to the `LogTimestamp` macro at the beginning\
    \ and the end of the methods you’d like to measure. It measures the time to the\
    \ nanosecond, so you can record exactly how long each method in your project is\
    \ taking.\n\nReturn to `MainViewController.m` and import the new class we just\
    \ created. At the top and bottom of each of our facial-recognition methods, add\
    \ the code from [Listing 12–22](#Chapter12.html#list_12_22).\n\n**Listing 12–22.**\
    \ *`LogTimestamp` Macro*\n\n```\nLogTimestamp;\n```\n\nUpdate the `didFinishPickingImage`\
    \ method, as shown in [Listing 12–23](#Chapter12.html#list_12_23).\n\n**Listing\
    \ 12–23.** *Updated `didFinishPickingImage` Method*\n\n```objc\n- (void)imagePickerController:(UIImagePickerController\
    \ *)picker\ndidFinishPickingImage:(UIImage *)image editingInfo:(NSDictionary *)editingInfo\
    \ {\n    [self dismissModalViewControllerAnimated:YES];\n    cameraView.image\
    \ = image;\n\n    [self openCVFaceDetect];\n    //[self CIDetectorFaceDetect];\n\
    \    //[self FaceDotComFaceDetect];\n}\n```\n\nRun the project. You should see\
    \ output similar to [Listing 12–24](#Chapter12.html#list_12_24) in your console.\
    \ It does take a few seconds to print the output, so be patient.\n\n**Listing\
    \ 12–24.** *Console Output*\n\n```\n2011-10-22 15:12:27.753 OpenCV-iPad[26058:10103]\
    \ ==== Start non-chunk timestamp data\n(from \"LogTimestamp\") ====\n2011-10-22\
    \ 15:12:27.754 OpenCV-iPad[26058:10103] * -[MainViewController\nopenCVFaceDetect]:\
    \  76\n2011-10-22 15:12:27.754 OpenCV-iPad[26058:10103] * -[MainViewController\n\
    openCVFaceDetect]: 163 -  664215125 nsec since last timestamp\n2011-10-22 15:12:27.755\
    \ OpenCV-iPad[26058:10103] ==== End timestamp data ====\n```\n\nIt appears that\
    \ it took 61231366 nanoseconds to process the image using OpenCV. Repeat the process\
    \ for the other approaches. My results show that `CIDetector` took about 29 percent\
    \ of the time of OpenCV. Plus, if you add some measurements to the applications\
    \ launch time, you’ll notice that OpenCV takes drastically more time than the\
    \ other approaches to start up.\n\n`CIDetector` only took 18 percent of the time\
    \ of face.com. This, of course, is understandably due to the network callout and\
    \ huge response returned and parsed using the native JSON serialization classes.\n\
    \nComparing OpenCV and face.com is interesting. OpenCV, which again takes full\
    \ seconds longer on application startup, was about 35 percent faster than the\
    \ full face.com transaction. In subsecond timing, that’s nearly indistinguishable\
    \ to the user.\n\n### Summary\n\nWe learned a lot in this chapter. There are some\
    \ paint points involved in the older approaches to facial recognition, like OpenCV.\
    \ These libraries have been around for years and are missing some of the ease\
    \ we take for granted in native Objective-C functions and macros. However, they\
    \ are powerful libraries and have paved the way for the innovations we demonstrated\
    \ in the newer approaches to facial recognition.\n\nWe talked about the new iOS\
    \ 5 `CIDetector` class and its ability to analyze the native `UIImage` object\
    \ for facial patterns without the need to load Haar cascades or train the library\
    \ with samples.\n\nFinally, we covered a non-native approach using a free REST\
    \ API that has the capability of analyzing raw JPEG data. This approach also helped\
    \ us introduce the native JSON parsing that is new to iOS 5.\n\nAll of these approaches\
    \ had their advantages and disadvantages. We took a quick look at the speed performance\
    \ of the transactions using an iPad 2 and found that the new iOS 5 `CIDetector`\
    \ classes outperform both the other approaches significantly. It is important\
    \ to note that face.com does require a full network callout and response and almost\
    \ kept up with the native approaches. Also, if you’re using a cross-platform application\
    \ or you have additional capabilities on a web API, the face.com approach might\
    \ lend itself to your needs better than a fully native approach.\n\nIn [Chapter\
    \ 13](#Chapter13.html#ch13), we’ll take a deeper look at the face.com approach.\
    \ We’ll analyze the screen buffer and send a request to face.com every few seconds.\
    \ We’ll use `cocos2D` to overlay some information on the screen about the response.\n\
