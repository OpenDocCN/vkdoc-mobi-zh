    \n    // Configure the video background\n    QCAR::VideoBackgroundConfig config;\n\
    \    config.mEnabled = true;\n    config.mSynchronous = true;\n    config.mPosition.data[0]\
    \ = 0.0f;\n    config.mPosition.data[1] = 0.0f;\n\n    // Compare aspect ratios\
    \ of video and screen. If they are different\n    // we use the full screen size\
    \ while maintaining the video's aspect\n    // ratio, which naturally entails\
    \ some cropping of the video.\n    // Note: screenRect is portrait but videoMode\
    \ is always landscape,\n    // which is why \"width\" and \"height\" appear to\
    \ be reversed.\n    float arVideo = (float)videoMode.mWidth / (float)videoMode.mHeight;\n\
    \    float arScreen = screenRect.size.height / screenRect.size.width;\n\n    if\
    \ (arVideo > arScreen)\n    {\n        // Video mode is wider than the screen.\
    \ We'll crop the left and right edges of\nthe video\n        config.mSize.data[0]\
    \ = (int)screenRect.size.width * arVideo;\n        config.mSize.data[1] = (int)screenRect.size.width;\n\
    \    }\n    else\n    {\n        // Video mode is taller than the screen. We'll\
    \ crop the top and bottom edges of the video.\n        // Also used when aspect\
    \ ratios match (no cropping).\n        config.mSize.data[0] = (int)screenRect.size.height;\n\
    \        config.mSize.data[1] = (int)screenRect.size.height / arVideo;\n    }\n\
    \n    // Set the config\n    QCAR::Renderer::getInstance().setVideoBackgroundConfig(config);\n\
    }\n```\n\n此方法直接从一个示例中复制而来。Qualcomm 将视频设置为与屏幕匹配，然后绘制摄像头所见的画面作为我们的背景。\n\n接下来，为 OpenGL\
    \ 的光照设置加载着色器。从代码清单 9-24 中复制该方法。\n\n**代码清单 9-24.** *加载测试着色器*\n\n```\n-(void)loadShaders\
    \ {\n    // Loading shaders for light only\n\n    shader = [[GLProgram alloc]\
    \ initWithVertexShaderFilename:@\"SimpleLightShader\"\nfragmentShaderFilename:@\"\
    SimpleLightShader\"];\n    [shader addAttribute:@\"a_position\"];\n    [shader\
    \ addAttribute:@\"a_texCoord\"];\n    [shader addAttribute:@\"a_normal\"];\n\n\
    \    if (![shader link])\n    {\n        // Compilation failed\n        NSLog(@\"\
    light shader link failed\");\n        NSString *progLog = [shader programLog];\n\
    \        NSLog(@\"Program Log: %@\", progLog);\n        NSString *fragLog = [shader\
    \ fragmentShaderLog];\n        NSLog(@\"Frag Log: %@\", fragLog);\n        NSString\
    \ *vertLog = [shader vertexShaderLog];\n        NSLog(@\"Vert Log: %@\", vertLog);\n\
    \        shader = nil;\n    } else {\n        NSLog(@\"Light Shader compiled successfuly!\"\
    );\n    }\n\n    shaderPositionAttribute = [shader attributeIndex:@\"a_position\"\
    ];\n    shaderNormalAttribute   = [shader attributeIndex:@\"a_normal\"];\n   \
    \ shaderColorUniform = [shader uniformIndex:@\"a_color\"];\n    shaderModelViewMatrixUniform\
    \ = [shader uniformIndex:@\"modelViewMatrix\"];\n    shaderProjectionMatrixUniform\
    \ = [shader uniformIndex:@\"projectionMatrix\"];\n}\n```\n\n在将 `EAGLView` 类接入替换应用程序的\
    \ `UIView` 之前，我们还有两个任务需要完成。我们需要初始化 OpenGL 渲染，然后渲染帧。你可以在代码清单 9-25 中找到这两个方法。\n\n\
    **代码清单 9-25.** *初始化 OpenGL 渲染并渲染帧*\n\n```\n- (void)initRendering\n{\n    // Define\
    \ the clear colour\n    glClearColor(0.0f, 0.0f, 0.0f, QCAR::requiresAlpha() ?\
    \ 0.0f : 1.0f);\n\n    [self loadShaders];\n}\n\n- (void)renderFrameQCAR\n{\n\
    \    [self setFramebuffer];\n\n    // Clear colour and depth buffers\n    glClear(GL_COLOR_BUFFER_BIT\
    \ | GL_DEPTH_BUFFER_BIT);\n\n    QCAR::State state = QCAR::Renderer::getInstance().begin();\n\
    \n    glEnable(GL_DEPTH_TEST);\n    glEnable(GL_CULL_FACE);\n\n    for (int i\
    \ = 0; i < state.getNumActiveTrackables(); ++i) {\n        // Get the trackable\n\
    \        const QCAR::Trackable* trackable = state.getActiveTrackable(i);\n   \
    \     QCAR::Matrix44F modelViewMatrix = QCAR::Tool::convertPose2GLMatrix(trackable-\n\
    >getPose());\n\n        [shader use];\n\n        float Sash_Kd [] = {0.589414,0.042139,0.042139};\n\
    \        // Set the sampler texture unit to 0\n        glUniformMatrix4fv(shaderProjectionMatrixUniform,\
    \ 1, 0, &projectionMatrix.data[0]);\n        glUniformMatrix4fv(shaderModelViewMatrixUniform,\
    \ 1, 0, &modelViewMatrix.data[0]);\n        glUniform3fv(shaderColorUniform, 1,\
    \ Sash_Kd);\n\n        glVertexAttribPointer(shaderPositionAttribute, 3, GL_FLOAT,\
    \ GL_FALSE, 0, (const\nGLvoid*)&cubeVertices[0]);\n        glVertexAttribPointer(shaderNormalAttribute,\
    \ 3, GL_FLOAT, GL_FALSE, 0, (const\nGLvoid*)&cubeNormals[0]);\n\n        glEnableVertexAttribArray(shaderPositionAttribute);\n\
    \        glEnableVertexAttribArray(shaderNormalAttribute);\n\n        glDrawElements(GL_TRIANGLES,\
    \ NUM_CUBE_INDEX, GL_UNSIGNED_SHORT, (const GLvoid*)&cubeIndices[0]);\n    }\n\
    \n    glDisable(GL_DEPTH_TEST);\n    glDisable(GL_CULL_FACE);\n\n    QCAR::Renderer::getInstance().end();\n\
    \    [self presentFramebuffer];\n\n}\n```\n\n第一个方法加载着色器并定义一个清除颜色，供我们在图层中引用。OpenGL\
    \ 渲染初始化完成后，我们就可以绘制 QCAR 帧了。\n\n在此方法中，我们遍历已找到的可追踪物体数组，这与我们在 String SDK 中所做的十分相似，然后在可追踪物体正上方的\
    \ 3D 空间中渲染立方体。你可以将此代码块替换为任何 OpenGL 渲染例程。\n"
- fmt: "### Redirecting the `UIView`\n\nChange the name of `ViewController.m` to `ViewController.mm`.\
    \ We did this same thing with our `EAGLView` class earlier. We are going to require\
    \ access to the C++ functions of the Qualcomm SDK, so this name is required for\
    \ the compiler.\n\nOpen `ViewController.mm`. Import the `EAGLView.h` header. Update\
    \ the `viewDidLoad` method, as shown in [Listing 9–26](#Chapter09.html#list_9_26).\n\
    \n**Listing 9–26.** *New `viewDidLoad`*\n\n```objectivec\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n\n    EAGLView * eaglview = (EAGLView*) self.view;\n\
    \    [eaglview onCreate];\n    // Do any additional setup after loading the view,\
    \ typically from a nib.\n}\n```\n\nWe create a new instance of the `EAGLView`\
    \ and alert the class that it was created. Update the `viewWillAppear` and `viewWillDisappear`\
    \ methods, as shown in [Listing 9–27](#Chapter09.html#list_9_27).\n\n**Listing\
    \ 9–27.** *New `viewWillAppear` and `viewWillDisappear`*\n\n```objectivec\n- (void)viewWillAppear:(BOOL)animated\n\
    {\n    [super viewWillAppear:animated];\n    EAGLView * eaglview = (EAGLView*)\
    \ self.view;\n    [eaglview onResume];\n}\n\n- (void)viewWillDisappear:(BOOL)animated\n\
    {\n    [super viewWillDisappear:animated];\n    EAGLView * eaglview = (EAGLView*)\
    \ self.view;\n    [eaglview onPause];\n}\n```\n\nPhew! We made it. Okay, we need\
    \ a few more things to make sure our class is actually used. Open either (or both)\
    \ of the storyboards and update the class of the `UIView` in the background to\
    \ `EAGLView`, as shown in [Figure 9–14](#Chapter09.html#fig_9_14).\n\n![Image](images/0914.jpg)\n\
    \n**Figure 9–14.** *Update the class of the `UIView` to `EAGLView`.*\n\nOkay,\
    \ you may run the project now. Don't forget to print the marker or bring it up\
    \ on your screen. If you just loaded the configuration files from the book's source\
    \ code repository, you can find the marker in the Qualcomm downloaded directory\
    \ under `/Samples/Dominos/media`.\n\nThe application should launch in a single\
    \ view showing a full-screen camera. Point the camera to the marker and you'll\
    \ see something similar to [Figure 9–15](#Chapter09.html#fig_9_15).\n\n![Image](images/0915.jpg)\n\
    \n**Figure 9–15.** *The demo application is a success!*\n\nTo be honest, I was\
    \ nervous when I ran this. That was a lot of code to copy from a chapter before\
    \ getting to test anything. Congratulations! If you want to make this application\
    \ a bit more interesting, you can replace the OpenGL rendering methods with pieces\
    \ from the other sample applications. If you want to learn more about OpenGL,\
    \ check out the titles on from Apress ([`www.apress.com`](http://www.apress.com)).\n\
    \n### ARKit\n\nARKit is an old GitHub project started by Zac White. I only mention\
    \ this project because I (and 100 other people) have forked the repository because\
    \ of some of the useful functions. I'm using some pieces of it in [Chapter 11](#Chapter11.html#ch11)\
    \ for location-based AR. If you're looking to build something from scratch, browse\
    \ through the various forks on [`www.github.com`](http://www.github.com). Plus,\
    \ social code = fun.\n\n### Summary\n\nThere are lots of other SDKs and toolkits\
    \ that I didn't mention. This is mostly because they are so well documented already.\
    \ Metaio, for example, has tons of sample projects and documentation available\
    \ on the Internet already. String was launched in summer of 2011, but still doesn't\
    \ have documentation on their web site (at the time of this writing). Qualcomm\
    \ released their SDK just before the launch of iOS 5. They have some documentation\
    \ on their developer portal and have some amazing samples in the SDK, but it's\
    \ just getting out there.\n\nI hope you learned something new in this chapter\
    \ about helper libraries that are available to cut your application development\
    \ time. In [Chapter 10](#Chapter10.html#ch10), we'll build another marker-based\
    \ AR application using String. You'll have a good comparison between two great\
    \ toolkits and their very different implementation styles.\n\n## Chapter 10\n\n\
    ## Building a Marker-Based AR Application with OpenGL ES\n\nIn [Chapter 9](#Chapter09.html#ch9),\
    \ we learned about a few different SDKs that are available for iOS developers\
    \ building augmented reality applications. In this chapter, we'll start with one\
    \ of those SDKs, the String SDK for iOS, and build a marker-based augmented reality\
    \ application.\n\nAugmented reality markers are physical identifiers that instruct\
    \ the application on how to orient and scale in response to the physical world.\
    \ For example, in Chapter 1, I showed a sample of how the United States Postal\
    \ Service uses markers to orient and scale a shipping container. You can do the\
    \ same in your applications.\n\nThe advantage to using markers in your application\
    \ is that you can add value to things that already exist in the physical world.\
    \ For example, consider you have a customer with a paper-based periodical who\
    \ operates on a low budget. Using one of the existing advertisements or logos,\
    \ you can bring a 3D advertisement to life. Aside from adding value, it offers\
    \ a chance for the customer to further monetize his advertising clients.\n\nAdvertising\
    \ is a great use case for marker-based augmented reality. We'll expand on this\
    \ use case with a real-life example.\n\n### Building a Marker\n\nMarkers have\
    \ a few characteristics that ensure the applications using them perform correctly.\
    \ First, an AR marker should have only one correct orientation. You should clearly\
    \ be able to differentiate whether the marker is upside down or sideways. Square\
    \ markers aren't effective because the application will have no way to determine\
    \ its proper orientation. Second, an AR marker should be constructed from a high-contrast,\
    \ unique image. Use black and white, or any colors that are distinguishable from\
    \ each other in low-light environments. In most cases, if you're printing the\
    \ markers, you should be aware of glare and reflective surfaces.\n\n#### Our Marker\n\
    \nFor this example, I've included the marker in our GitHub repository. All the\
    \ code from this chapter is available at [`https://github.com/kyleroche/Professional_iOS_AugmentedReality`](https://github.com/kyleroche/Professional_iOS_AugmentedReality).\
    \ The source code is also available from the Source Code/Download area of the\
    \ Apress web site at [`www.apress.com`](http://www.apress.com).\n\nWe'll be using\
    \ the book's cover as our AR marker. Assuming there have been no changes to the\
    \ image during the printing process, this should make testing slightly easier\
    \ because you won't have to print anything.\n\nTo project the 3D model, we're\
    \ going to use OpenGL ES (OpenGL for Embedded Systems). Xcode has an OpenGL Gaming\
    \ template available right out of the box. However, for educational purposes,\
    \ let's build this app from the ground up. Before we get started, let's go over\
    \ the basic features of OpenGL.\n\n#### OpenGL ES\n\nOpenGL ES is a low-level,\
    \ lightweight API for advanced embedded of graphics using well-defined subset\
    \ profiles of OpenGL. It provides a low-level API between software applications\
    \ and hardware or software graphics engines.\n\nThere are many advantages to using\
    \ OpenGL ES as a developer:\n\n*   *Industry standard and royalty free:* Anyone\
    \ can download the OpenGL ES specification and implement and ship products based\
    \ on OpenGL ES.\n*   *Small footprint and low power consumption:* The embedded\
    \ space varies on processing capabilities. OpenGL ES accommodates these differences\
    \ by requiring a minimum footprint with minimum data storage.\n*   *Extensible\
    \ and evolving:* OpenGL's extension mechanism functions in OpenGL ES, so you can\
    \ add new hardware profiles as they become available.\n*   *Easy to use and well\
    \ documented:* OpenGL is the foundation for OpenGL ES. There are numerous training\
    \ materials available on the web and in published form.\n\nNeither this book,\
    \ nor this chapter, will make you an expert on OpenGL ES. However, we will make\
    \ notes of the features we use to build out this application, and I'll reference\
    \ some materials you can access if you want to learn more about 3D programming\
    \ on iOS."
  raw: '#### Redirecting the UIView


    Change the name of `ViewController.m` to `ViewController.mm`. We did this same
    thing with our `EAGLView` class earlier. We are going to require access to the
    C++ functions of the Qualcomm SDK, so this name is required for the compiler.


    Open `ViewController.mm`. Import the `EAGLView.h` header. Update the `viewDidLoad`
    method, as shown in [Listing 9–26](#Chapter09.html#list_9_26).


    **Listing 9–26.** *New viewDidLoad*


    `- (void)viewDidLoad`

    `{`

    `    [super viewDidLoad];`


    **`EAGLView * eaglview = (EAGLView*) self.view;`**

    **`[eaglview onCreate];`**

    `    // Do any additional setup after loading the view, typically from a nib.`

    `}`


    We create a new instance of the `EAGLView` and alert the class that it was created.
    Update the `viewWillAppear` and `viewWillDisappear` methods, as shown in [Listing
    9–27](#Chapter09.html#list_9_27).


    **Listing 9–27.** *New viewWillAppear and viewWillDisappear*


    `- (void)viewWillAppear:(BOOL)animated`

    `{`

    `    [super viewWillAppear:animated];`

    `    EAGLView * eaglview = (EAGLView*) self.view;`

    `    [eaglview onResume];`

    `}`


    `- (void)viewWillDisappear:(BOOL)animated`

    `{`

    `    [super viewWillDisappear:animated];`

    `    EAGLView * eaglview = (EAGLView*) self.view;`

    `    [eaglview onPause];`

    `}`


    Phew! We made it. Okay, we need a few more things to make sure our class is actually
    used. Open either (or both) of the storyboards and update the class of the `UIView`
    in the background to `EAGLView`, as shown in [Figure 9–14](#Chapter09.html#fig_9_14).


    ![Image](images/0914.jpg)


    **Figure 9–14.** *Update the class of the UIView to EAGLView.*


    Okay, you may run the project now. Don''t forget to print the marker or bring
    it up on your screen. If you just loaded the configuration files from the book''s
    source code repository, you can find the marker in the Qualcomm downloaded directory
    under **/Samples/Dominos/media**.


    The application should launch in a single view showing a full-screen camera. Point
    the camera to the marker and you''ll see something similar to [Figure 9–15](#Chapter09.html#fig_9_15).


    ![Image](images/0915.jpg)


    **Figure 9–15.** *The demo application is a success!*


    To be honest, I was nervous when I ran this. That was a lot of code to copy from
    a chapter before getting to test anything. Congratulations! If you want to make
    this application a bit more interesting, you can replace the OpenGL rendering
    methods with pieces from the other sample applications. If you want to learn more
    about OpenGL, check out the titles on from Apress ([`www.apress.com`](http://www.apress.com)).


    ### ARKit


    ARKit is an old GitHub project started by Zac White. I only mention this project
    because I (and 100 other people) have forked the repository because of some of
    the useful functions. I''m using some pieces of it in [Chapter 11](#Chapter11.html#ch11)
    for location-based AR. If you''re looking to build something from scratch, browse
    through the various forks on [`www.github.com`](http://www.github.com). Plus,
    social code = fun.


    ### Summary


    There are lots of other SDKs and toolkits that I didn''t mention. This is mostly
    because they are so well documented already. Metaio, for example, has tons of
    sample projects and documentation available on the Internet already. String was
    launched in summer of 2011, but still doesn''t have documentation on their web
    site (at the time of this writing). Qualcomm released their SDK just before the
    launch of iOS 5. They have some documentation on their developer portal and have
    some amazing samples in the SDK, but it''s just getting out there.


    I hope you learned something new in this chapter about helper libraries that are
    available to cut your application development time. In [Chapter 10](#Chapter10.html#ch10),
    we''ll build another marker-based AR application using String. You''ll have a
    good comparison between two great toolkits and their very different implementation
    styles.


    ## Chapter  10


    ## **Building a Marker-Based AR Application with OpenGL ES**


    In [Chapter 9](#Chapter09.html#ch9), we learned about a few different SDKs that
    are available for iOS developers building augmented reality applications. In this
    chapter, we''ll start with one of those SDKs, the String SDK for iOS, and build
    a marker-based augmented reality application.


    Augmented reality markers are physical identifiers that instruct the application
    on how to orient and scale in response to the physical world. For example, in
    Chapter 1, I showed a sample of how the United States Postal Service uses markers
    to orient and scale a shipping container. You can do the same in your applications.


    The advantage to using markers in your application is that you can add value to
    things that already exist in the physical world. For example, consider you have
    a customer with a paper-based periodical who operates on a low budget. Using one
    of the existing advertisements or logos, you can bring a 3D advertisement to life.
    Aside from adding value, it offers a chance for the customer to further monetize
    his advertising clients.


    Advertising is a great use case for marker-based augmented reality. We''ll expand
    on this use case with a real-life example.


    ### Building a Marker


    Markers have a few characteristics that ensure the applications using them perform
    correctly. First, an AR marker should have only one correct orientation. You should
    clearly be able to differentiate whether the marker is upside down or sideways.
    Square markers aren''t effective because the application will have no way to determine
    its proper orientation. Second, an AR marker should be constructed from a high-contrast,
    unique image. Use black and white, or any colors that are distinguishable from
    each other in low-light environments. In most cases, if you''re printing the markers,
    you should be aware of glare and reflective surfaces.


    #### Our Marker


    For this example, I''ve included the marker in our GitHub repository. All the
    code from this chapter is available at [`https://github.com/kyleroche/Professional_iOS_AugmentedReality`](https://github.com/kyleroche/Professional_iOS_AugmentedReality).
    The source code is also available from the Source Code/Download area of the Apress
    web site at [`www.apress.com`](http://www.apress.com).


    We''ll be using the book''s cover as our AR marker. Assuming there have been no
    changes to the image during the printing process, this should make testing slightly
    easier because you won''t have to print anything.


    To project the 3D model, we''re going to use OpenGL ES (OpenGL for Embedded Systems).Xcode
    has an OpenGL Gaming templateavailable right out of the box. However, for educational
    purposes, let''s build this app from the ground up. Before we get started, let''s
    go over the basic features of OpenGL.


    #### OpenGL ES


    OpenGL ES is a low-level, lightweight API for advanced embedded of graphics using
    well-defined subset profiles of OpenGL. It provides a low-level API between software
    applications and hardware or software graphics engines.


    There are many advantages to using OpenGL ES as a developer:


    *   *Industry standard and royalty free:* Anyone can download the OpenGL ES specification
    and implement and ship products based on OpenGL ES.

    *   *Small footprint and low power consumption:* The embedded space varies on
    processing capabilities. OpenGL ES accommodates these differences by requiring
    a minimum footprint with minimum data storage.

    *   *Extensible andevolving:* OpenGL''s extension mechanism functions in OpenGL
    ES, so you can add new hardware profiles as they become available.

    *   *Easy to use andwell documented:* OpenGL is the foundation for OpenGL ES.
    There are numerous training materials available on the web and in published form.


    Neither this book, nor this chapter, will make you an expert on OpenGL ES. However,
    we will make notes of the features we use to build out this application, and I''ll
    reference some materials you can access if you want to learn more about 3D programming
    on iOS.'
