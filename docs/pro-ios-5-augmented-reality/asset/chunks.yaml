    \ to **Stop Audio**. Finally, I tied the `playAudioRecording` method to the **Play\
    \ Recording** button.\n\nNext, we have to implement the methods in `SecondViewController.m`.\n\
    \n![Image](images/0502.jpg)\n\n**Figure 5–2.** *Here we see the screen layout\
