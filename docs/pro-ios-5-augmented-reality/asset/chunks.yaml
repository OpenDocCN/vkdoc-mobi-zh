    \n## 磁力计\n\n磁力计是一种用于测量设备周围磁场强度的传感器。假设设备附近没有强磁场，该读数将与地球的环境磁场相关，从而让我们能够利用这些读数来确定设备的方向。设备的方向是指其相对于北极的地磁方向。苹果在其开发者文档中指出（大多数其他相关参考资料也持相同观点），地磁方向与相对于地理北极的真实方向可能因您的位置不同而有很大差异。\n\
    \n测量设备的地磁方向与我们测量陀螺仪或加速度计读数的方式类似。让我们扩展项目，使其也显示设备方向。\n\n在 Xcode 中，向项目添加一个新的 `UIViewController`\
    \ 类。将其命名为 `headingViewController`，并确保通过 XIB 文件创建界面。我使用谷歌图片搜索找到了一张无版权的指南针图片。该图片包含在\
    \ GitHub 上的项目中，也可从 Apress 网站 (`www.apress.com`) 的“源代码/下载”区域获取。如果您使用自己的图片，请确保“北”位于图片顶部中央。我们将根据设备方向旋转这张图片，因此希望从与垂直轴成\
    \ 0 度的角度开始，以尽可能简化操作。准备好图片后，将其添加到 Xcode 项目中。\n\n### 磁力计可用性\n\n正如我们在第 3 章中讨论的，`CLLocationManager`\
    \ 需要用户启用位置更新才能正常运行。位置管理器还能返回设备的真实方向和地磁方向。然而，只有当用户启用了位置更新时，设备的真实方向才可用。而无论用户是否偏好启用位置更新，地磁方向更新始终可用。这是因为方向信息本身不会损害用户隐私，因此无需获得批准。\n\
    \n简而言之，您无需像使用其他传感器那样，在使用磁力计前检查其可用性。\n\n### 校准\n\n由于很可能存在两个读数（地磁方向与真实方向），iOS 提供了相应功能，允许我们校准设备以确定两者之间的差异。`CLLocationManager`\
    \ 定义了一个名为 `locationManagerShouldDisplayHeadingCalibration` 的委托方法。该方法会覆盖显示一个方向图像，指示用户以\
    \ 8 字形模式旋转设备，直到位置管理器能够区分任何局部磁场与地球磁场。位置管理器以真实方向作为参考。\n\n### 看看我们指向何方\n\n在 Interface\
    \ Builder 中打开 `headingViewController.xib`。添加一个 `UIImage` 输出口和两个 `UILabel` 输出口。你可以在图\
    \ 4-9 中看到示例界面的设置方式。\n\n![Image](img/0409.jpg)\n\n**图 4-9.** *此为磁力计界面（`headingViewController.xib`）的设置。*\n\
    \n在辅助编辑器中打开 `headingViewController.h`，按住 Ctrl 键，将 `UIImage` 和一组 `UILabel` 从 Interface\
    \ Builder 拖拽到接口文件中，如图 4-10 所示。\n\n![Image](img/0410.jpg)\n\n**图 4-10.** *此为 IBOutlets\
    \ 的设置属性。*\n\n确保导入 `<CoreLocation/CoreLocation.h>` 头文件，并将 `headingViewController`\
    \ 声明为 `CLLocationManagerDelegate`。\n\n完成上述步骤后，在 Xcode 中切换到 `headingViewController.m`。用代码清单\
    \ 4-17 中的代码更新 `viewDidLoad` 方法。\n\n**代码清单 4-17.** *新的 `viewDidLoad` 方法*\n\n```objective-c\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional setup\
    \ after loading the view from its nib.\n\n    CLLocationManager *locationManager\
    \ = [[CLLocationManager alloc] init];\n    locationManager.delegate = self;\n\
    \    locationManager.headingFilter = 5;\n    if ([CLLocationManager locationServicesEnabled]\
    \ && [CLLocationManager headingAvailable]) {\n        [locationManager startUpdatingHeading];\n\
    \        [locationManager startUpdatingLocation];\n    } else {\n        NSLog(@\"\
    Error starting location updates\");\n    }\n}\n```\n\n在继续之前，我们先简单梳理一下这段代码。首先，我们设置\
    \ `CLLocationManager` 实例。这应该与我们在第 3 章中的操作类似。按预期将 `delegate` 设置为 `self`，然后引入了一个新属性。`headingFilter`\
    \ 属性定义了更新委托方法所需的变化阈值。我们将该值设置为 5（度），因此位置管理器仅在方向变化超过 5 度时更新委托。\n\n我之前提到过，你无需检查磁力计的可用性。那么，为什么我在\
    \ `viewDidLoad` 中包含了检查呢？方向信息仅在 iPhone 3Gs 及更高版本中可用。此验证可确保用户使用的是较新的硬件。另外，值得注意的是，我使用的是类方法\
    \ `locationServicesEnabled` 和 `headingAvailable`。网上许多示例应用程序使用实例方法进行此检查。实例方法在 iOS\
    \ 4 中已被弃用。请确保在您的应用程序中使用类方法。\n\n最后，一旦确认读数可用，我们便启用了位置和方向更新。\n\n接下来，我们必须添加委托方法来处理更新，并在界面中反映变化。在\
    \ `viewDidLoad` 方法之后，添加代码清单 4-18 中的方法。\n\n**代码清单 4-18.** *`didUpdateHeading` 委托方法*\n\
    \n```objective-c\n- (void)locationManager:(CLLocationManager *)manager didUpdateHeading:(CLHeading\
    \ *)newHeading {\n    if (newHeading.headingAccuracy > 0) {\n        float magneticHeading\
    \ = newHeading.magneticHeading;\n        float trueHeading = newHeading.trueHeading;\n\
    \n        magneticHeadingLabel.text = [NSString stringWithFormat:@\"%f\", magneticHeading];\n\
    \        trueHeadingLabel.text = [NSString stringWithFormat:@\"%f\", trueHeading];\n\
    \n        float heading = -1.0f * M_PI * newHeading.magneticHeading / 180.0f;\n\
    \        compassImage.transform = CGAffineTransformMakeRotation(heading);\n  \
    \  }\n}\n```\n\n你可以看到，我们首先检查了 `headingAccuracy` 的值，然后再执行其他操作。如果位置更新未启用，`headingAccuracy`\
    \ 的值将被设置为 -1。检查该值是否大于零可确保我们从磁力计和位置管理器都获得了正确的读数。我们只是简单地将两个 `UILabel` 设置为读数中的值，这样你可以看到它们之间的细微差别，然后旋转图片。我们使用\
    \ `CGAffineTransformMakeRotation` 方法来旋转图片。我们将其乘以负常数，再乘以 pi，然后除以 180。之所以用 180，是因为方向始终相对于设备的顶部，无论其朝向如何。我们将在下一部分讨论这一点。\n\
    \n在物理设备上运行项目。你将看到类似于图 4-11 的结果。\n\n![Image](img/0411.jpg)\n\n**图 4-11.** *同时检索真实方向和地磁方向的值。*\n"
- fmt: "### Handling Changes in Orientation\n\nWhile you're running the sample application,\
    \ test what happens when the device is in landscape mode. You should see that\
    \ North corresponds to the top of the device, not the top of the visible screen.\
    \ If you put the device in landscape mode without changing your heading, the device\
    \ will report the heading to your left or right side (depending on which way you\
    \ reoriented). We can fix this with a quick addition to our class.\n\nOpen `headingViewController.xib`\
    \ in interface builder. Add another `UILabel IBOutlet` to the interface. Name\
    \ the property `orientationLabel` and add it to `headingViewController.h`, as\
    \ we did with the other outlets. Declare the methods shown in [Listing 4–19](#Chapter04.html#list_4_19)\
    \ in the interface file.\n\n**Listing 4–19.** *Helper Methods*\n\n```\n- (float)heading:(float)heading\
    \ fromOrientation:(UIDeviceOrientation) orientation;\n- (NSString *)stringFromOrientation:(UIDeviceOrientation)\
    \ orientation;\n```\n\nSwitch to `headingViewController.m` and add the two methods\
    \ shown in [Listing 4–20](#Chapter04.html#list_4_20).\n\n**Listing 4–20.** *Methods\
    \ to Get Degrees Based on Orientation*\n\n```\n- (float)heading:(float)heading\
    \ fromOrientation:(UIDeviceOrientation)orientation {\n    float correctedHeading\
    \ = heading;\n\n    switch (orientation) {\n        case UIDeviceOrientationPortrait:\n\
    \            break;\n        case UIDeviceOrientationPortraitUpsideDown:\n   \
    \         correctedHeading = heading + 180.0f;\n            break;\n        case\
    \ UIDeviceOrientationLandscapeLeft:\n            correctedHeading = heading +\
    \ 90.0f;\n            break;\n        case UIDeviceOrientationLandscapeRight:\n\
    \            correctedHeading = heading - 90.0f;\n            break;\n       \
    \ default:\n            break;\n    }\n    while ( heading > 360.0f ) {\n    \
    \    correctedHeading = heading - 360;\n    }\n    return correctedHeading;\n\
    }\n\n- (NSString *)stringFromOrientation:(UIDeviceOrientation) orientation {\n\
    \    NSString *orientationString;\n    switch (orientation) {\n        case UIDeviceOrientationPortrait:\n\
    \            orientationString = @\"Portrait\";\n            break;\n        case\
    \ UIDeviceOrientationPortraitUpsideDown:\n            orientationString = @\"\
    Portrait Upside Down\";\n            break;\n        case UIDeviceOrientationLandscapeLeft:\n\
    \            orientationString = @\"Landscape Left\";\n            break;\n  \
    \      case UIDeviceOrientationLandscapeRight:\n            orientationString\
    \ = @\"Landscape Right\";\n            break;\n        case UIDeviceOrientationFaceUp:\n\
    \            orientationString = @\"Face Up\";\n            break;\n        case\
    \ UIDeviceOrientationFaceDown:\n            orientationString = @\"Face Down\"\
    ;\n            break;\n        case UIDeviceOrientationUnknown:\n            orientationString\
    \ = @\"Unknown\";\n            break;\n        default:\n            orientationString\
    \ = @\"Not Known\";\n            break;\n    }\n    return orientationString;\n\
    }\n```\n\nThe first method adjusts the heading based on the orientation of the\
    \ device. This is a fairly basic correction. You could get more complicated and\
    \ precise using the gyroscope in conjunction with the orientation. For the purposes\
    \ of this example, we are assuming that the device is rotated in full portrait\
    \ or landscape mode, so we are correcting by factors of 90 degrees.\n\nThe second\
    \ method builds a human-readable string from the device's orientation. I found\
    \ this function in a few online articles. I'm not sure to whom credit is due for\
    \ this function, but it was very useful.\n\nWe have to make an adjustment to the\
    \ `didUpdateHeading` delegate method, and then we can test out our corrected sample\
    \ application. Update the `didUpdateHeading` method with the code from [Listing\
    \ 4–21](#Chapter04.html#list_4_21).\n\n**Listing 4–21.** *New didUpdateHeading\
    \ Method*\n\n```\n- (void)locationManager:(CLLocationManager *)manager didUpdateHeading:(CLHeading\
    \ *)newHeading {\n    if (newHeading.headingAccuracy > 0) {\n//float magneticHeading\
    \ = newHeading.magneticHeading;\n        //float trueHeading = newHeading.trueHeading;\n\
    \        UIDevice *device = [UIDevice currentDevice];\n        orientationLabel.text\
    \ = [self stringFromOrientation:device.orientation];\n\n        float magneticHeading\
    \ = [self heading:newHeading.magneticHeading fromOrientation:device.orientation];\n\
    \        float trueHeading = [self heading:newHeading.trueHeading fromOrientation:device.orientation];\n\
    \n        magneticHeadingLabel.text = [NSString stringWithFormat:@\"%f\", magneticHeading];\n\
    \        trueHeadingLabel.text = [NSString stringWithFormat:@\"%f\", trueHeading];\n\
    \n        float heading = -1.0f * M_PI * newHeading.magneticHeading / 180.0f;\n\
    \        compassImage.transform = CGAffineTransformMakeRotation(heading);\n  \
    \  }\n}\n```\n\nLet's walk through the bold block of code. First, we're setting\
    \ up an instance of `UIDevice` that represents the user's actual phone. We then\
    \ use our helper method to build a human-readable string and set the value or\
    \ our orientation label. Next, we use the helper method to calculate the corrected\
    \ heading values based on the device's orientation. The rest of the method remains\
    \ the same.\n\nRun the project on your physical device. [Figures 4–12](#Chapter04.html#fig_4_12)\
    \ and [4–13](#Chapter04.html#fig_4_13) show the results. Pay close attention to\
    \ the orientation label. You will see that that heading is corrected in landscape\
    \ mode.\n\n![Image](images/0412.jpg)\n\n**Figure 4–12.** *Display the headings\
    \ in portrait mode.*\n\n![Image](images/0413.jpg)\n\n**Figure 4–13.** *Display\
    \ the headings in landscape mode.*\n\n### Summary\n\nWe did a lot of work accessing\
    \ various sensors in this chapter. This might seem a bit low level or off subject\
    \ as you walk through it, but it'll come in very handy as we start to build our\
    \ own AR apps.\n\nWe discussed the accelerometer and the gyroscope and their conjunction\
    \ with the Core Motion Framework. Then, we covered the magnetometer, and put together\
    \ an example application that keeps us oriented. We're slowly completing our toolbox\
    \ with everything we need to build our own AR application.\n\nNext, in [Chapter\
    \ 5](#Chapter05.html#ch5), we will be looking sound and user feedback.\n\n## Chapter\
    \ 5\n\n## Sound and User Feedback\n\nSilent movies still have nostalgic value\
    \ and are a key part of the history of entertainment. However, silent video games\
    \ or silent interactive applications don't seem to fit in that category. A user\
    \ experience needs to be engaging. Accessibility options can help make sure all\
    \ users experience the same level of interaction. In this chapter, we'll talk\
    \ about adding effects to events and active feedback, such as vibrations, to your\
    \ applications.\n\n### Audio Data Formats\n\nLet's start with the basics. There\
    \ are a ton of options available for sound in iOS. We'll talk about the different\
    \ formats first and their subtle differences, then we'll discuss how to convert\
    \ from one to another. Take a look at [Table 5–1](#Chapter05.html#tab_5_1), which\
    \ outlines the different supported formats.\n\n![Image](images/t0501.jpg)\n\n\
    ![Image](images/t0501a.jpg)\n\n#### So, Which Data Format Is for Me?\n\nThis question\
    \ unfortunately has the answer of \"it depends.\" Your use case really drives\
    \ which sound format best fits your application. For example, if space is not\
    \ an issue, you can use linear PCM. It'll be the fastest way to play your audio\
    \ and it won't impact CPU performance while it's playing (because it's not also\
    \ working on uncompressing the files). However, if space is an issue, you might\
    \ want to use AAC for background music or larger files to benefit from compression,\
    \ and use IMA4 for sound effects and small files to gain from its advantages on\
    \ 16-bit files."
  raw: '##### Handling Changes in Orientation


    While you''re running the sample application, test what happens when the device
    is in landscape mode. You should see that North corresponds to the top of the
    device, not the top of the visible screen. If you put the device in landscape
    mode without changing your heading, the device will report the heading to your
    left or right side (depending on which way you reoriented). We can fix this with
    a quick addition to our class.


    Open `headingViewController.xib` in interface builder. Add another `UILabel IBOutlet`
    to the interface. Name the property `orientationLabel` and add it to `headingViewController.h`,
    as we did with the other outlets. Declare the methods shown in [Listing 4–19](#Chapter04.html#list_4_19)
    in the interface file.


    **Listing 4–19.** *Helper Methods*


    `- (float)heading:(float)heading fromOrientation:(UIDeviceOrientation) orientation;`

    `- (NSString *)stringFromOrientation:(UIDeviceOrientation) orientation;`


    Switch to `headingViewController.m` and add the two methods shown in [Listing
    4–20](#Chapter04.html#list_4_20).


    **Listing 4–20.** *Methods to Get Degrees Based on Orientation*


    `- (float)heading:(float)heading fromOrientation:(UIDeviceOrientation)orientation
    {`

    `    float correctedHeading = heading;`


    `    switch (orientation) {`

    `        case UIDeviceOrientationPortrait:`

    `            break;`

    `        case UIDeviceOrientationPortraitUpsideDown:`

    `            correctedHeading = heading + 180.0f;`

    `            break;`

    `        case UIDeviceOrientationLandscapeLeft:`

    `            correctedHeading = heading + 90.0f;`

    `            break;`

    `        case UIDeviceOrientationLandscapeRight:`

    `            correctedHeading = heading - 90.0f;`

    `            break;`

    `        default:`

    `            break;`

    `    }`

    `    while ( heading > 360.0f ) {`

    `        correctedHeading = heading - 360;`

    `    }`

    `    return correctedHeading;`

    `}`


    `- (NSString *)stringFromOrientation:(UIDeviceOrientation) orientation {`

    `    NSString *orientationString;`

    `    switch (orientation) {`

    `        case UIDeviceOrientationPortrait:`

    `            orientationString = @"Portrait";`

    `            break;`

    `        case UIDeviceOrientationPortraitUpsideDown:`

    `            orientationString = @"Portrait Upside Down";`

    `            break;`

    `        case UIDeviceOrientationLandscapeLeft:`

    `            orientationString = @"Landscape Left";`

    `            break;`

    `        case UIDeviceOrientationLandscapeRight:`

    `            orientationString = @"Landscape Right";`

    `            break;`

    `        case UIDeviceOrientationFaceUp:`

    `            orientationString = @"Face Up";`

    `            break;`

    `        case UIDeviceOrientationFaceDown:`

    `            orientationString = @"Face Down";`

    `            break;`

    `        case UIDeviceOrientationUnknown:`

    `            orientationString = @"Unknown";`

    `            break;`

    `        default:`

    `            orientationString = @"Not Known";`

    `            break;`

    `    }`

    `    return orientationString;`

    `}`


    The first method adjusts the heading based on the orientation of the device. This
    is a fairly basic correction. You could get more complicated and precise using
    the gyroscope in conjunction with the orientation. For the purposes of this example,
    we are assuming that the device is rotated in full portrait or landscape mode,
    so we are correcting by factors of 90 degrees.


    The second method builds a human-readable string from the device''s orientation.
    I found this function in a few online articles. I''m not sure to whom credit is
    due for this function, but it was very useful.


    We have to make an adjustment to the `didUpdateHeading` delegate method, and then
    we can test out our corrected sample application. Update the `didUpdateHeading`
    method with the code from [Listing 4–21](#Chapter04.html#list_4_21).


    **Listing 4–21.** *New didUpdateHeading Method*


    `- (void)locationManager:(CLLocationManager *)manager didUpdateHeading:(CLHeading
    *)newHeading {`

    `    if (newHeading.headingAccuracy > 0) {`

    **`//float magneticHeading = newHeading.magneticHeading;`

    `        //float trueHeading = newHeading.trueHeading;`

    `        UIDevice *device = [UIDevice currentDevice];`

    `        orientationLabel.text = [self stringFromOrientation:device.orientation];`


    `        float magneticHeading = [self heading:newHeading.magneticHeading fromOrientation:device.orientation];`

    `        float trueHeading = [self heading:newHeading.trueHeading fromOrientation:device.orientation];`**


    `        magneticHeadingLabel.text = [NSString stringWithFormat:@"%f", magneticHeading];`

    `        trueHeadingLabel.text = [NSString stringWithFormat:@"%f", trueHeading];`


    `        float heading = -1.0f * M_PI * newHeading.magneticHeading / 180.0f;`

    `        compassImage.transform = CGAffineTransformMakeRotation(heading);`

    `    }`

    `}`


    Let''s walk through the bold block of code. First, we''re setting up an instance
    of `UIDevice` that represents the user''s actual phone. We then use our helper
    method to build a human-readable string and set the value or our orientation label.
    Next, we use the helper method to calculate the corrected heading values based
    on the device''s orientation. The rest of the method remains the same.


    Run the project on your physical device. [Figures 4–12](#Chapter04.html#fig_4_12)
    and [4–13](#Chapter04.html#fig_4_13) show the results. Pay close attention to
    the orientation label. You will see that that heading is corrected in landscape
    mode.


    ![Image](images/0412.jpg)


    **Figure 4–12.** *Display the headings in portrait mode.*


    ![Image](images/0413.jpg)


    **Figure 4–13.** *Display the headings in landscape mode.*


    ### Summary


    We did a lot of work accessing various sensors in this chapter. This might seem
    a bit low level or off subject as you walk through it, but it''ll come in very
    handy as we start to build our own AR apps.


    We discussed the accelerometer and the gyroscope and their conjunction with the
    Core Motion Framework. Then, we covered the magnetometer, and put together an
    example application that keeps us oriented. We''re slowly completing our toolbox
    with everything we need to build our own AR application.


    Next, in [Chapter 5](#Chapter05.html#ch5), we will be looking sound and user feedback.


    ## Chapter  5


    ## Sound and User Feedback


    Silent movies still have nostalgic value and are a key part of the history of
    entertainment. However, silent video games or silent interactive applications
    don''t seem to fit in that category. A user experience needs to be engaging. Accessibility
    options can help make sure all users experience the same level of interaction.
    In this chapter, we''ll talk about adding effects to events and active feedback,
    such as vibrations, to your applications.


    ### Audio Data Formats


    Let''s start with the basics. There are a ton of options available for sound in
    iOS. We''ll talk about the different formats first and their subtle differences,
    then we''ll discuss how to convert from one to another. Take a look at [Table
    5–1](#Chapter05.html#tab_5_1), which outlines the different supported formats.


    ![Image](images/t0501.jpg)


    ![Image](images/t0501a.jpg)


    #### So, Which Data Format Is for Me?


    This question unfortunately has the answer of “it depends.” Your use case really
    drives which sound format best fits your application. For example, if space is
    not an issue, you can use linear PCM. It''ll be the fastest way to play your audio
    and it won''t impact CPU performance while it''s playing (because it''s not also
    working on uncompressing the files). However, if space is an issue, you might
    want to use AAC for background music or larger files to benefit from compression,
    and use IMA4 for sound effects and small files to gain from its advantages on
    16-bit files.'
  trans: "\n### 处理方向变化\n\n当您运行示例应用时，请测试设备处于横屏模式时会发生什么。您会看到“北”对应的是设备的顶部，而非可见屏幕的顶部。如果您在不改变航向的情况下将设备横置，设备报告的航向将指向您的左侧或右侧（具体取决于您旋转的方向）。我们可以通过快速修改类来解决这个问题。\n\
    \n在 Interface Builder 中打开 `headingViewController.xib`。为界面添加另一个 `UILabel IBOutlet`。将属性命名为\
    \ `orientationLabel`，并像处理其他输出口一样，将其添加到 `headingViewController.h` 中。在接口文件中声明代码清单\
    \ 4–19 所示的方法。\n\n**代码清单 4–19.** *辅助方法*\n\n```\n- (float)heading:(float)heading\
    \ fromOrientation:(UIDeviceOrientation) orientation;\n- (NSString *)stringFromOrientation:(UIDeviceOrientation)\
    \ orientation;\n```\n\n切换到 `headingViewController.m`，添加代码清单 4–20 中所示的两个方法。\n\n\
    **代码清单 4–20.** *基于方向获取角度的方法*\n\n```\n- (float)heading:(float)heading fromOrientation:(UIDeviceOrientation)orientation\
    \ {\n    float correctedHeading = heading;\n\n    switch (orientation) {\n   \
    \     case UIDeviceOrientationPortrait:\n            break;\n        case UIDeviceOrientationPortraitUpsideDown:\n\
    \            correctedHeading = heading + 180.0f;\n            break;\n      \
    \  case UIDeviceOrientationLandscapeLeft:\n            correctedHeading = heading\
    \ + 90.0f;\n            break;\n        case UIDeviceOrientationLandscapeRight:\n\
    \            correctedHeading = heading - 90.0f;\n            break;\n       \
    \ default:\n            break;\n    }\n    while ( heading > 360.0f ) {\n    \
    \    correctedHeading = heading - 360;\n    }\n    return correctedHeading;\n\
    }\n\n- (NSString *)stringFromOrientation:(UIDeviceOrientation) orientation {\n\
    \    NSString *orientationString;\n    switch (orientation) {\n        case UIDeviceOrientationPortrait:\n\
    \            orientationString = @\"Portrait\";\n            break;\n        case\
    \ UIDeviceOrientationPortraitUpsideDown:\n            orientationString = @\"\
    Portrait Upside Down\";\n            break;\n        case UIDeviceOrientationLandscapeLeft:\n\
    \            orientationString = @\"Landscape Left\";\n            break;\n  \
    \      case UIDeviceOrientationLandscapeRight:\n            orientationString\
    \ = @\"Landscape Right\";\n            break;\n        case UIDeviceOrientationFaceUp:\n\
    \            orientationString = @\"Face Up\";\n            break;\n        case\
    \ UIDeviceOrientationFaceDown:\n            orientationString = @\"Face Down\"\
    ;\n            break;\n        case UIDeviceOrientationUnknown:\n            orientationString\
    \ = @\"Unknown\";\n            break;\n        default:\n            orientationString\
    \ = @\"Not Known\";\n            break;\n    }\n    return orientationString;\n\
    }\n```\n\n第一个方法根据设备的方向调整航向。这是一种相当基础的校正方式。您可以结合陀螺仪和方向信息，实现更复杂、更精确的校正。就本示例而言，我们假设设备完全旋转为竖屏或横屏模式，因此我们依据\
    \ 90 度的倍数进行校正。\n\n第二个方法根据设备的方向构建一个人类可读的字符串。我在几篇在线文章中找到了这个函数。我不确定这个函数归功于谁，但它非常实用。\n\
    \n我们需要对 `didUpdateHeading` 代理方法进行调整，然后就可以测试我们校正后的示例应用了。用代码清单 4–21 中的代码更新 `didUpdateHeading`\
    \ 方法。\n\n**代码清单 4–21.** *新的 didUpdateHeading 方法*\n\n```\n- (void)locationManager:(CLLocationManager\
    \ *)manager didUpdateHeading:(CLHeading *)newHeading {\n    if (newHeading.headingAccuracy\
    \ > 0) {\n//float magneticHeading = newHeading.magneticHeading;\n        //float\
    \ trueHeading = newHeading.trueHeading;\n        UIDevice *device = [UIDevice\
    \ currentDevice];\n        orientationLabel.text = [self stringFromOrientation:device.orientation];\n\
    \n        float magneticHeading = [self heading:newHeading.magneticHeading fromOrientation:device.orientation];\n\
    \        float trueHeading = [self heading:newHeading.trueHeading fromOrientation:device.orientation];\n\
    \n        magneticHeadingLabel.text = [NSString stringWithFormat:@\"%f\", magneticHeading];\n\
    \        trueHeadingLabel.text = [NSString stringWithFormat:@\"%f\", trueHeading];\n\
    \n        float heading = -1.0f * M_PI * newHeading.magneticHeading / 180.0f;\n\
    \        compassImage.transform = CGAffineTransformMakeRotation(heading);\n  \
    \  }\n}\n```\n\n让我们过一遍其中加粗的代码块。首先，我们初始化了一个代表用户实际手机的 `UIDevice` 实例。然后，我们使用辅助方法构建了一个人类可读的字符串，并设置了方向标签的值。接着，我们使用辅助方法，根据设备的方向计算了校正后的航向值。方法的其余部分保持不变。\n\
    \n在您的实体设备上运行该项目。图 4–12 和 图 4–13 展示了结果。请密切关注方向标签。您会看到，在横屏模式下，航向已经被校正。\n\n![Image](img/0412.jpg)\n\
    \n**图 4–12.** *在竖屏模式下显示航向。*\n\n![Image](img/0413.jpg)\n\n**图 4–13.** *在横屏模式下显示航向。*\n\
    \n### 总结\n\n在本章中，我们在访问各种传感器方面做了大量工作。在阅读过程中，这看起来可能有点底层或偏离主题，但当我们开始构建自己的 AR 应用时，这会变得非常有用。\n\
    \n我们讨论了加速度计、陀螺仪以及它们与 Core Motion 框架的结合。然后，我们介绍了磁力计，并整合了一个能帮助我们保持方向感的示例应用。我们正在逐步完成构建我们自己的\
    \ AR 应用所需的一切工具。\n\n接下来，在第 5 章中，我们将探讨声音和用户反馈。\n\n## 第 5 章\n\n## 声音与用户反馈\n\n无声电影至今仍具有怀旧价值，是娱乐史上至关重要的一部分。然而，无声电子游戏或无声交互式应用似乎并不属于这一类。用户体验需要具有吸引力。辅助功能选项有助于确保所有用户都能体验到相同水平的交互。在本章中，我们将讨论如何为事件添加效果，以及如何在您的应用中添加主动反馈，例如振动。\n\
    \n### 音频数据格式\n\n让我们从基础开始。iOS 中有大量的声音选项可供选择。我们将首先讨论不同的格式及其细微差别，然后讨论如何在不同格式之间进行转换。请查看表\
    \ 5–1，其中概述了不同的支持格式。\n\n![Image](img/t0501.jpg)\n\n![Image](img/t0501a.jpg)\n\n\
    #### 那么，哪种数据格式适合我？\n\n遗憾的是，对这个问题的答案是“视情况而定”。您的实际使用场景将决定哪种声音格式最适合您的应用。例如，如果空间不是问题，您可以使用线性\
    \ PCM。这将是播放音频最快的方式，并且在播放期间不会影响 CPU 性能（因为它不必同时解压文件）。然而，如果空间是个问题，您可能希望为背景音乐或较大的文件使用\
    \ AAC，以利用其压缩优势；而为音效和小文件使用 IMA4，以利用其对 16 位文件的优势。\n"
- fmt: "#### What About File Formats?\n\nThe data format is one thing, but where and\
    \ how do we store these files? iOS supports many different file formats including\
    \ MPEG-1 (`.mp3`), MPEG-2 (`.aac`), AIFF, WAVE, and CAF. CAF is the preferred\
    \ format on iOS because it can contain any of the data formats we listed in [Table\
    \ 5–1](#Chapter05.html#tab_5_1).\n\n#### Bit Rates and Quality\n\nThe scenario\
    \ in which the audio will be playing determines the quality needed for that particular\
    \ event. For example, speech applications have very different sound requirements\
    \ than an app that broadcasts symphony orchestra performances.\n\nQuality can\
    \ be tweaked using a variable called bit rate for the audio files. The bit rate\
    \ is the number of bytes per second that a file uses. Only a few of the formats\
    \ mentioned in [Table 5–1](#Chapter05.html#tab_5_1) support configuration of bit\
    \ rate. [Table 5–2](#Chapter05.html#tab_5_2) illustrates some common bit rates.\n\
    \n![Image](images/t0502.jpg)\n\n![Image](images/t0502a.jpg)\n\n#### Sample Rates\n\
    \nThe sample rate for audio defines the number of samples per unit of time. Typically,\
    \ this is measured in samples per inverse second, or what is more commonly described\
    \ as a rate in hertz. The inverse of a sampling frequency, in case you aren't\
    \ aware, is the sampling interval, or time, between the samples.\n\nSome common\
    \ sample rates are described in [Table 5–3](#Chapter05.html#tab_5_3).\n\n![Image](images/t0503.jpg)\n\
    \n#### Converting Audio for Use in iOS\n\nYou can download samples from various\
    \ places all over the Internet. Sites such as `audiomicro.com` and `soundsnap.com`\
    \ offer royalty free samples for all kinds of sound categories. There are creative\
    \ commons licensed sounds available at `freesound.org`, as well. In most cases,\
    \ the formats that these samples are available in probably won't be exactly what\
    \ you're looking for to enhance your application. So, you should get used to the\
    \ tools that are available to help you convert some of these media formats.\n\n\
    Let's walk through three typical activities around testing media files. First,\
    \ we'll get information about the file we're considering using, then we'll convert\
    \ the file to another format, and finally, we'll test and play the file.\n\nThe\
    \ sample code from this chapter is available on GitHub at [`https://github.com/kyleroche/Professional_iOS_AugmentedReality`](https://github.com/kyleroche/Professional_iOS_AugmentedReality).\
    \ If you don't have sample audio files on your local machine, you can follow along\
    \ with the samples in the Xcode project on GitHub.\n\n##### Getting Information\
    \ on Media Files\n\nThere is a utility in Mac OS X called `afinfo`. This tool\
    \ is available from the Terminal. [Listing 5–1](#Chapter05.html#list_5_1) shows\
    \ the output of this command after I passed it the sample file, which is available\
    \ in this chapter's GitHub repository.\n\n**Listing 5–1.** *`afinfo waterfall.caf`*\n\
    \n```\nKyle-Roches-MacBook-Pro-2:iOS_AR_Ch5_SoundUserFeedback kyleroche$ afinfo\
    \ waterfall.caf\nFile:           waterfall.caf\nFile type ID:   caff\nData format:\
    \     1 ch, 44100 Hz, 'lpcm' (0x0000000C) 16-bit little-endian signed integer\n\
    \                no channel layout.\nestimated duration: 1.950204 sec\naudio bytes:\
    \ 172008\naudio packets: 86004\naudio 86004 valid frames + 0 priming + 0 remainder\
    \ = 86004\nbit rate: 705600 bits per second\npacket size upper bound: 2\naudio\
    \ data file offset: 4096\noptimized\nsource bit depth: I16\nsound check:\n   \
    \ approximate duration in seconds         1.95\n----\n```\n\nThe key parts of\
    \ the output are highlighted in bold. One of these falls under the caption `Data\
    \ format`. This is the same sample rate we mentioned earlier. `44100 Hz` is commonly\
    \ used for CD-quality audio and is recommended for use in iOS applications. Next,\
    \ the **bit rate** is highlighted. This isn't specifically one of the rates per\
    \ second that we mentioned, but it falls in the range of standard audio quality.\
    \ Finally, on the last line, `afinfo` returns the **approximate duration in seconds**.\
    \ This is important if you're using the sound for gaming, or in a timeline-oriented\
    \ fashion.\n\nExperiment for a bit with `afinfo`. I ran it against my iTunes library\
    \ to see the different samplings of older music I imported versus newer stuff\
    \ downloaded from iTunes. [Listing 5–2](#Chapter05.html#list_5_2) shows an example\
    \ of the output from a download song.\n\n**Listing 5–2.** *`afinfo` Results from\
    \ iTunes Files*\n\n```\nKyle-Roches-MacBook-Pro-2:Ukulele Songs kyleroche$ afinfo\
    \ 10\\ You\\'re\\ True.m4a\nFile:           10 You're True.m4a\nFile type ID:\
    \   m4af\nData format:     2 ch,  44100 Hz, 'aac ' (0x00000000) 0 bits/channel,\
    \ 0 bytes/packet, 1024 frames/packet, 0 bytes/frame\nChannel layout: Stereo (L\
    \ R)\nestimated duration: 203.333333 sec\naudio bytes: 6491497\naudio packets:\
    \ 8759\naudio 8967000 valid frames + 2112 priming + 104 remainder = 8969216\n\
    bit rate: 255340 bits per second\npacket size upper bound: 1197\naudio data file\
    \ offset: 594724\noptimized\nformat list:\n[ 0] format:     2 ch,  44100 Hz, 'aac\
    \ ' (0x00000000) 0 bits/channel, 0 bytes/packet, 1024 frames/packet, 0 bytes/frame\n\
    \     Channel layout: Stereo (L R)\nsource bit depth: I16\nsound check:\n    sc\
    \ ave perceived power coeff             2973 3040\n    sc max perceived power\
    \ coeff             16060 12146\n    sc peak amplitude msec                  \
    \ 26006 25263\n    sc max perceived power msec              25263 24520\n    sc\
    \ peak amplitude                        32766 32766\n----\n```\n\nLooking at the\
    \ output, the biggest difference is the increased amount of information in the\
    \ `sound check` section. Obviously, higher quality sound files have more available\
    \ information.\n\nWe now have a tool we can use to verify the bit rates, sample\
    \ rates, and formats of our media. Next, let's take a look at how to convert sound\
    \ files to the appropriate formats.\n\n##### Converting File Types\n\nLet's use\
    \ the same sample file from the GitHub project for initial testing. It's time\
    \ to introduce a new utility called Audio File Convert, or `afconvert`. Audio\
    \ File Convert will convert a source audio file to a new audio file with the specified\
    \ file and data types. [Listing 5–3](#Chapter05.html#list_5_3) shows the usage\
    \ statement for `afconvert`.\n\n**Listing 5–3.** *`afconvert` Usage Statement*\n\
    \n```\nUsage:\nafconvert [option...] input_file [output_file]\n    Options may\
    \ appear before or after the direct arguments. If output_file\n    is not specified,\
    \ a name is generated programmatically and the file\n    is written into the same\
    \ directory as input_file.\nafconvert input_file [-o output_file [option...]]...\n\
    \    Output file options apply to the previous output_file. Other options\n  \
    \  may appear anywhere.\nHelp options:\n    { -hf | --help-formats }\n       \
    \ print a list of supported file/data formats\n    { -h | --help }\n        print\
    \ help\n```\n\nYou can use `afconvert` to switch file formats, media formats,\
    \ or to save your file with a different bit rate. Let's experiment with bit rate\
    \ and our sample file to get used to `afconvert`. Run the command shown in [Listing\
    \ 5–4](#Chapter05.html#list_5_4) from the Terminal window.\n\n**Listing 5–4.**\
    \ *`afconvert` to Change Bit Rate*\n\n```\nafconvert -d aac -f 'caff' -b 32768\
    \ waterfall.caf waterfallNew.caf\n```\n\nIf you check your directory, you'll notice\
    \ a new file was created with the name of `waterfallNew.caf`. We used the `-d`\
    \ option to set the data format, the `-f` option to set the file format, and the\
    \ `-b` option to set the bit rate. We pass the existing file to `afconvert` first,\
    \ then the destination file. If you run the `afinfo` utility on the new file,\
    \ you'll see the difference in bit rate.\n\n##### Testing Your New Sound\n\nThe\
    \ last utility I want to mention is called `afplay`. This is another command-line\
    \ utility that gives you quick access to testing your audio files. Simply pass\
    \ the name of the file you wish to play and it'll play it over your default output\
    \ hardware."
  raw: '#### What About File Formats?


    The data format is one thing, but where and how do we store these files? iOS supports
    many different file formats including MPEG-1 (.mp3), MPEG-2 (.aac), AIFF, WAVE,
    and CAF. CAF is the preferred format on iOS because it can contain any of the
    data formats we listed in [Table 5–1](#Chapter05.html#tab_5_1).


    #### Bit Rates and Quality


    The scenario in which the audio will be playing determines the quality needed
    for that particular event. For example, speech applications have very different
    sound requirements than an app that broadcasts symphony orchestra performances.


    Quality can be tweaked using a variable called bit rate for the audio files. The
    bit rate is the number of bytes per second that a file uses. Only a few of the
    formats mentioned in [Table 5–1](#Chapter05.html#tab_5_1) support configuration
    of bit rate. [Table 5–2](#Chapter05.html#tab_5_2) illustrates some common bit
    rates.


    ![Image](images/t0502.jpg)


    ![Image](images/t0502a.jpg)


    #### Sample Rates


    The sample rate for audio defines the number of samples per unit of time. Typically,
    this is measured in samples per inverse second, or what is more commonly described
    as a rate in hertz. The inverse of a sampling frequency, in case you aren''t aware,
    is the sampling interval, or time, between the samples.


    Some common sample rates are described in [Table 5–3](#Chapter05.html#tab_5_3).


    ![Image](images/t0503.jpg)


    #### Converting Audio for Use in iOS


    You can download samples from various places all over the Internet. Sites such
    as audiomicro.com and soundsnap.com offer royalty free samples for all kinds of
    sound categories. There are creative commons licensed sounds available at freesound.org,
    as well. In most cases, the formats that these samples are available in probably
    won''t be exactly what you''re looking for to enhance your application. So, you
    should get used to the tools that are available to help you convert some of these
    media formats.


    Let''s walk through three typical activities around testing media files. First,
    we''ll get information about the file we''re considering using, then we''ll convert
    the file to another format, and finally, we''ll test and play the file.


    The sample code from this chapter is available on GitHub at [`https://github.com/kyleroche/Professional_iOS_AugmentedReality`](https://github.com/kyleroche/Professional_iOS_AugmentedReality).
    If you don''t have sample audio files on your local machine, you can follow along
    with the samples in the Xcode project on GitHub.


    ##### Getting Information on Media Files


    There is a utility in Mac OS X called `afinfo`. This tool is available from the
    Terminal. [Listing 5–1](#Chapter05.html#list_5_1) shows the output of this command
    after I passed it the sample file, which is available in this chapter''s GitHub
    repository.


    **Listing 5–1.** *afinfo waterfall.caf*


    `Kyle-Roches-MacBook-Pro-2:iOS_AR_Ch5_SoundUserFeedback kyleroche$` **`afinfo
    waterfall.caf`**

    `File:           waterfall.caf`

    `File type ID:   caff`

    `Data format:     1 ch,` **`44100 Hz`**`, ''lpcm'' (0x0000000C) 16-bit little-endian
    signed integer`

    `                no channel layout.`

    `estimated duration: 1.950204 sec`

    `audio bytes: 172008`

    `audio packets: 86004`

    `audio 86004 valid frames + 0 priming + 0 remainder = 86004`

    `bit rate:` **`705600 bits per second`**

    `packet size upper bound: 2`

    `audio data file offset: 4096`

    `optimized`

    `source bit depth: I16`

    `sound check:`

    `    approximate duration in seconds         `**`1.95`**

    `----`


    The key parts of the output are highlighted in bold. One of these falls under
    the caption `Data format`. This is the same sample rate we mentioned earlier.
    44100 Hz is commonly used for CD-quality audio and is recommended for use in iOS
    applications. Next, the **bit rate** is highlighted. This isn''t specifically
    one of the rates per second that we mentioned, but it falls in the range of standard
    audio quality. Finally, on the last line, **afinfo** returns the **approximate
    duration in seconds**. This is important if you''re using the sound for gaming,
    or in a timeline-oriented fashion.


    Experiment for a bit with **afinfo**. I ran it against my iTunes library to see
    the different samplings of older music I imported versus newer stuff downloaded
    from iTunes. [Listing 5–2](#Chapter05.html#list_5_2) shows an example of the output
    from a download song.


    **Listing 5–2.** *afinfo Results from iTunes Files*


    `Kyle-Roches-MacBook-Pro-2:Ukulele Songs kyleroche$ afinfo 10\ You\''re\ True.m4a`

    `File:           10 You''re True.m4a`

    `File type ID:   m4af`

    `Data format:     2 ch,  44100 Hz, ''aac '' (0x00000000) 0 bits/channel, 0 bytes/packet,
    1024 frames/packet, 0 bytes/frame`

    `Channel layout: Stereo (L R)`

    `estimated duration: 203.333333 sec`

    `audio bytes: 6491497`

    `audio packets: 8759`

    `audio 8967000 valid frames + 2112 priming + 104 remainder = 8969216`

    `bit rate: 255340 bits per second`

    `packet size upper bound: 1197`

    `audio data file offset: 594724`

    `optimized`

    `format list:`

    `[ 0] format:     2 ch,  44100 Hz, ''aac '' (0x00000000) 0 bits/channel, 0 bytes/packet,
    1024 frames/packet, 0 bytes/frame`

    `     Channel layout: Stereo (L R)`

    `source bit depth: I16`

    `sound check:`

    `    sc ave perceived power coeff             2973 3040`

    `    sc max perceived power coeff             16060 12146`

    `    sc peak amplitude msec                   26006 25263`

    `    sc max perceived power msec              25263 24520`

    `    sc peak amplitude                        32766 32766`

    `----`


    Looking at the output, the biggest difference is the increased amount of information
    in the `sound check` section. Obviously, higher quality sound files have more
    available information.


    We now have a tool we can use to verify the bit rates, sample rates, and formats
    of our media. Next, let''s take a look at how to convert sound files to the appropriate
    formats.


    ##### Converting File Types


    Let''s use the same sample file from the GitHub project for initial testing. It''s
    time to introduce a new utility called Audio File Convert, or `afconvert`. Audio
    File Convert will convert a source audio file to a new audio file with the specified
    file and data types. [Listing 5–3](#Chapter05.html#list_5_3) shows the usage statement
    for `afconvert`.


    **Listing 5–3.** *afconvert Usage Statement*


    `Usage:`

    `afconvert [option...] input_file [output_file]`

    `    Options may appear before or after the direct arguments. If output_file`

    `    is not specified, a name is generated programmatically and the file`

    `    is written into the same directory as input_file.`

    `afconvert input_file [-o output_file [option...]]...`

    `    Output file options apply to the previous output_file. Other options`

    `    may appear anywhere.`

    `Help options:`

    `    { -hf | --help-formats }`

    `        print a list of supported file/data formats`

    `    { -h | --help }`

    `        print help`


    You can use **afconvert** to switch file formats, media formats, or to save your
    file with a different bit rate. Let''s experiment with bit rate and our sample
    file to get used to **afconvert**. Run the command shown in [Listing 5–4](#Chapter05.html#list_5_4)
    from the Terminal window.


    **Listing 5–4.** *afconvert to Change Bit Rate*


    `afconvert -d aac -f ''caff'' -b` **`32768`** `waterfall.caf waterfallNew.caf`


    If you check your directory, you''ll notice a new file was created with the name
    of **waterfallNew.caf**. We used the `–d` option to set the data format, the `–f`
    option to set the file format, and the `–b` option to set the bit rate. We pass
    the existing file to **afconvert** first, then the destination file. If you run
    the `afinfo` utility on the new file, you''ll see the difference in bit rate.


    ##### Testing Your New Sound


    The last utility I want to mention is called `afplay`. This is another command-line
    utility that gives you quick access to testing your audio files. Simply pass the
    name of the file you wish to play and it''ll play it over your default output
    hardware.'
  trans: "\n#### 关于文件格式\n\n数据格式是一回事，但我们在哪里以及如何存储这些文件呢？iOS 支持多种不同的文件格式，包括 MPEG-1 (`.mp3`)、MPEG-2\
    \ (`.aac`)、AIFF、WAVE 和 CAF。CAF 是 iOS 上首选的格式，因为它可以包含我们在表 5–1 中列出的任何数据格式。\n\n####\
    \ 比特率与音质\n\n音频播放的场景决定了该特定事件所需的音质。例如，语音应用与播放交响乐团表演的应用有着截然不同的声音要求。\n\n音质可以通过使用称为比特率的变量来调整音频文件。比特率是文件每秒使用的字节数。只有表\
    \ 5–1 中提到的少数几种格式支持比特率的配置。表 5–2 展示了一些常见的比特率。\n\n![Image](img/t0502.jpg)\n\n![Image](img/t0502a.jpg)\n\
    \n#### 采样率\n\n音频的采样率定义了每单位时间的样本数。通常，它以每秒样本数来度量，或者更常见地，用赫兹（Hz）作为速率单位。如果你不知道，采样频率的倒数就是采样间隔，即样本之间的时间。\n\
    \n表 5–3 描述了一些常见的采样率。\n\n![Image](img/t0503.jpg)\n\n#### 转换音频以便在 iOS 中使用\n\n你可以从互联网上的各个地方下载样本。诸如\
    \ `audiomicro.com` 和 `soundsnap.com` 之类的网站提供各类声音的免版税样本。在 `freesound.org` 上也有知识共享许可的声音。大多数情况下，这些样本的格式可能并非你增强应用所需的精确格式。因此，你应该熟悉可用的工具，以帮助你转换其中的一些媒体格式。\n\
    \n让我们来演练一下关于测试媒体文件的三个典型活动。首先，我们将获取我们考虑使用的文件的信息，然后将文件转换为另一种格式，最后测试并播放该文件。\n\n本章的示例代码可在\
    \ GitHub 上获取，地址为 [`https://github.com/kyleroche/Professional_iOS_AugmentedReality`](https://github.com/kyleroche/Professional_iOS_AugmentedReality)。如果你的本地机器上没有示例音频文件，你可以跟随\
    \ GitHub 上的 Xcode 项目中的示例进行操作。\n\n##### 获取媒体文件信息\n\nMac OS X 中有一个名为 `afinfo` 的实用工具。该工具可从终端（Terminal）使用。代码清单\
    \ 5–1 显示了我将本章 GitHub 仓库中的示例文件传入此命令后的输出。\n\n**代码清单 5–1.** *`afinfo waterfall.caf`*\n\
    \n```\nKyle-Roches-MacBook-Pro-2:iOS_AR_Ch5_SoundUserFeedback kyleroche$ afinfo\
    \ waterfall.caf\nFile:           waterfall.caf\nFile type ID:   caff\nData format:\
    \     1 ch, 44100 Hz, 'lpcm' (0x0000000C) 16-bit little-endian signed integer\n\
    \                no channel layout.\nestimated duration: 1.950204 sec\naudio bytes:\
    \ 172008\naudio packets: 86004\naudio 86004 valid frames + 0 priming + 0 remainder\
    \ = 86004\nbit rate: 705600 bits per second\npacket size upper bound: 2\naudio\
    \ data file offset: 4096\noptimized\nsource bit depth: I16\nsound check:\n   \
    \ approximate duration in seconds         1.95\n----\n```\n\n输出的关键部分已用粗体高亮显示。其中一项是\
    \ `Data format`（数据格式）。这就是我们之前提到的采样率。`44100 Hz` 常用于 CD 音质音频，并推荐在 iOS 应用中使用。接下来，**比特率**被高亮显示。这并非我们之前提到的特定每秒速率，但它属于标准音频质量的范围。最后，在最后一行，`afinfo`\
    \ 返回了**以秒为单位的近似持续时间**。如果你将声音用于游戏或时间线导向的方式，这一点很重要。\n\n尝试使用 `afinfo` 做些实验。我曾针对我的\
    \ iTunes 资料库运行它，以查看我导入的旧音乐与从 iTunes 下载的新音乐之间的不同采样。代码清单 5–2 显示了一首下载歌曲的输出示例。\n\n\
    **代码清单 5–2.** *iTunes 文件的 `afinfo` 结果*\n\n```\nKyle-Roches-MacBook-Pro-2:Ukulele\
    \ Songs kyleroche$ afinfo 10\\ You\\'re\\ True.m4a\nFile:           10 You're\
    \ True.m4a\nFile type ID:   m4af\nData format:     2 ch,  44100 Hz, 'aac ' (0x00000000)\
    \ 0 bits/channel, 0 bytes/packet, 1024 frames/packet, 0 bytes/frame\nChannel layout:\
    \ Stereo (L R)\nestimated duration: 203.333333 sec\naudio bytes: 6491497\naudio\
    \ packets: 8759\naudio 8967000 valid frames + 2112 priming + 104 remainder = 8969216\n\
    bit rate: 255340 bits per second\npacket size upper bound: 1197\naudio data file\
    \ offset: 594724\noptimized\nformat list:\n[ 0] format:     2 ch,  44100 Hz, 'aac\
    \ ' (0x00000000) 0 bits/channel, 0 bytes/packet, 1024 frames/packet, 0 bytes/frame\n\
    \     Channel layout: Stereo (L R)\nsource bit depth: I16\nsound check:\n    sc\
    \ ave perceived power coeff             2973 3040\n    sc max perceived power\
    \ coeff             16060 12146\n    sc peak amplitude msec                  \
    \ 26006 25263\n    sc max perceived power msec              25263 24520\n    sc\
    \ peak amplitude                        32766 32766\n----\n```\n\n查看输出，最大的区别是\
    \ `sound check` 部分的信息量增加了。显然，更高质量的音频文件拥有更多可用信息。\n\n现在我们有了一个可以用来验证媒体文件的比特率、采样率和格式的工具。接下来，让我们看看如何将声音文件转换为适当的格式。\n\
    \n##### 转换文件类型\n\n我们使用 GitHub 项目中的同一个示例文件进行初步测试。是时候介绍一个名为 Audio File Convert（即\
    \ `afconvert`）的新工具了。Audio File Convert 会将源音频文件转换为具有指定文件和数据类型的新音频文件。代码清单 5–3 显示了\
    \ `afconvert` 的用法说明。\n\n**代码清单 5–3.** *`afconvert` 用法说明*\n\n```\nUsage:\nafconvert\
    \ [option...] input_file [output_file]\n    Options may appear before or after\
    \ the direct arguments. If output_file\n    is not specified, a name is generated\
    \ programmatically and the file\n    is written into the same directory as input_file.\n\
    afconvert input_file [-o output_file [option...]]...\n    Output file options\
    \ apply to the previous output_file. Other options\n    may appear anywhere.\n\
    Help options:\n    { -hf | --help-formats }\n        print a list of supported\
    \ file/data formats\n    { -h | --help }\n        print help\n```\n\n你可以使用 `afconvert`\
    \ 来切换文件格式、媒体格式，或以不同的比特率保存文件。让我们通过比特率和示例文件进行实验，以熟悉 `afconvert`。在终端窗口中运行代码清单 5–4\
    \ 中显示的命令。\n\n**代码清单 5–4.** *使用 `afconvert` 更改比特率*\n\n```\nafconvert -d aac -f\
    \ 'caff' -b 32768 waterfall.caf waterfallNew.caf\n```\n\n如果你检查目录，你会注意到一个名为 `waterfallNew.caf`\
    \ 的新文件已被创建。我们使用了 `-d` 选项来设置数据格式，`-f` 选项来设置文件格式，`-b` 选项来设置比特率。我们先将要转换的现有文件传递给 `afconvert`，然后是目标文件。如果你在新文件上运行\
    \ `afinfo` 工具，你将看到比特率上的差异。\n\n##### 测试你的新声音\n\n我想提到的最后一个实用工具是 `afplay`。这是另一个命令行实用工具，可以让你快速测试音频文件。只需传递你想要播放的文件名，它就会通过你的默认输出硬件播放该文件。\n"
- fmt: "### Playing Sound in an iOS Application\n\nLet's take some of these files\
    \ and add them to an iOS application. Again, the code for this chapter is available\
    \ on GitHub, but if you're following along from scratch, create a new Tab Bar\
    \ application with the iPhone as a target device.\n\nOpen `FirstView.xib` and\
    \ set up the interface, as shown in [Figure 5–1](#Chapter05.html#fig_5_1).\n\n\
    ![Image](images/0501.jpg)\n\n**Figure 5–1.** *Here we see the two `UIButton`s\
    \ to launch the actions we'll be creating.*\n\nWe're going to demonstrate two\
    \ different approaches to playing audio in the background of iOS applications.\
    \ The interface is simple. Clear out the default controls and create two new `UIButton`\
    \ elements. Use titles like those shown in [Figure 5–1](#Chapter05.html#fig_5_1).\n\
    \nBoth of the approaches we'll discuss are relatively straightforward and easy\
    \ to implement. We'll cover a more advanced, gaming-centric approach in [Chapter\
    \ 7](#Chapter07.html#ch7).\n\n### System Sound Services\n\nSystem Sound Services\
    \ is a great choice for playing sound effects on the device. It's designed for\
    \ short sound effects, such as a button click, error beep, or a game action. Sounds\
    \ played with System Sound Services are not subject to configuration using your\
    \ audio session. As a result, you cannot keep the behavior of System Sound Services\
    \ audio inline with other audio behavior in your application. This is the most\
    \ important reason to avoid using System Sound Services for any audio apart from\
    \ its intended uses. System Sound Services require that you add the `AudioToolbox`\
    \ framework to your project.\n\nTo ensure it serves its purpose as a quick sound\
    \ player, System Sound Services has some limitations. Your sound files must be\n\
    \n- No longer than 30 seconds in duration\n- In linear PCM or IMA4 (IMA/ADPCM)\
    \ format\n- Packaged in a `.caf`, `.aif`, or `.wav` file\n\nIn addition, when\
    \ you use the `AudioServicesPlaySystemSound` function,\n\n- Sounds play at the\
    \ current system audio volume, with no programmatic volume control available\n\
    - Sounds play immediately\n- Looping and stereo positioning are unavailable\n\
    - Simultaneous playback is unavailable; you can play only one sound at a time\n\
    \n### AVAudioPlayer Class\n\n`AVAudioPlayer` is a bit more flexible, but comes\
    \ with its own set of limitations. The most limiting feature of the `AVAudioPlayer`\
    \ is its noticeable delay in queuing up and playing a file. Because of this, it's\
    \ best suited for long playing, background music and use cases like that. The\
    \ `AVAudioPlayer` requires the `AVFoundation` framework in your project. Using\
    \ `AVAudioPlayer`, you can\n\n- Play sounds of any duration\n- Play sounds from\
    \ files or memory buffers\n- Loop sounds\n- Play multiple sounds simultaneously\
    \ (although not with precise synchronization)\n- Control relative playback level\
    \ for each sound you are playing\n- Seek to a particular point in a sound file,\
    \ which supports application features such as fast forward and rewind\n- Obtain\
    \ audio power data that you can use for audio level metering\n\n### Experimenting\
    \ with the Multiple Audio Players\n\nOkay, let's get to it. You have already created\
    \ the interface with both of the `UIButton`s. After the briefing on different\
    \ approaches to playing sound, the titles I used will make more sense. Before\
    \ we start, we're going to require that we add to our project both of the frameworks\
    \ mentioned in this section. Open the Build Phases tab of your application's target\
    \ and add both the `AVFoundation` and `AudioToolbox` frameworks.\n\nAdd the code\
    \ from [Listing 5–5](#Chapter05.html#list_5_5) to `FirstViewController.h`.\n\n\
    **Listing 5–5.** *New `FirstViewController.h`*\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <AudioToolbox/AudioToolbox.h>\n#import <AVFoundation/AVFoundation.h>\n\
    \n@interface FirstViewController : UIViewController <AVAudioPlayerDelegate>{\n\
    \    SystemSoundID _systemSound;\n    AVAudioPlayer *_audioPlayer;\n}\n\n- (IBAction)systemSoundAction;\n\
    - (IBAction)avAudioPlayerAction;\n\n@end\n```\n\nWe first import both the `AudioToolbox`\
    \ and `AVFoundation` libraries to our header file. We then nominate our class\
    \ as an `AVAudioPlayerDelegate`. We're not really building a multimedia application\
    \ in this book, so I'm not going to go into this delegate and its methods too\
    \ much. But, this would be something to further research if you wanted to handle\
    \ events while the audio was playing.\n\nIn the interface, we declare two instance\
    \ variables for our two use cases. The `AVAudioPlayer` requires a pointer, as\
    \ we'll be creating the instance in this class. Finally, we declare two new methods\
    \ to handle the click events of the `UIButton`s we added to our user interface.\n\
    \nNext, return to the `FirstView.xib` file in Xcode and hook up the two `IBAction`\
    \ methods to our two buttons.\n\nSwitch over to `FirstViewController.m`. We're\
    \ just using instance variables in this example, so we have nothing to synthesize.\
    \ Add the code from [Listing 5–6](#Chapter05.html#list_5_6) to your implementation\
    \ file.\n\n**Listing 5–6.** *Handle the System Sound Services Method*\n\n```\n\
    - (void)systemSoundAction {\n    NSString *soundFilePath = [[NSBundle mainBundle]\
    \ pathForResource:@\"waterfall\"\nofType:@\"caf\"];\n    NSURL *soundFileURL =\
    \ [NSURL fileURLWithPath:soundFilePath];\n    AudioServicesCreateSystemSoundID((CFURLRef)soundFileURL,\
    \ &_systemSound);\n    AudioServicesPlaySystemSound(_systemSound);\n}\n- (void)\
    \ avAudioPlayerAction {\n  // we'll get to this next\n}\n```\n\nI'm referencing\
    \ the CAFF file we have in our GitHub sample project. If you have another file\
    \ you'd like to use instead of the one in the sample, make sure you match the\
    \ names. It is important to note that the `pathForResource` argument takes the\
    \ core section of the file name, not the full file name. Run the project on your\
    \ iOS simulator and click the System Sound Action button. You'll notice a quick\
    \ (instant) response and the file will start to play.\n\nClose down the simulator.\
    \ We have a bit more work to do before we can finish the second method. Because\
    \ `AVAudioPlayer` is better for background music, I wanted to find something more\
    \ appropriate than a waterfall, as I'm not a waterfall enthusiast (not that there's\
    \ anything wrong with that). The waterfall sample came from the cocos2D examples\
    \ (we'll cover this in [Chapter 7](#Chapter07.html#ch7)). Another place to get\
    \ music samples is audiomicro.com and I searched their free background music samples\
    \ for something a bit more appropriate.\n\nOpen your Terminal to the directory\
    \ of the downloaded MP3. If you are using the MP3 in the sample, navigate to the\
    \ locally cloned GitHub directory. Run the command from [Listing 5–7](#Chapter05.html#list_5_7).\n\
    \n**Listing 5–7.** *Convert the MP3 to CAFF*\n\n```\nafconvert -d aac -f 'caff'\
    \ \"007.mp3\" backgroundMusic.caf\n```\n\nWe are using the Audio File Converter\
    \ to convert our MP3 file to a CAFF format that we can use in our project. It's\
    \ possible to just play the MP3, but that wouldn't help us demonstrate when these\
    \ utilities are useful, now would it?"
  raw: '### Playing Sound in an iOS Application


    Let''s take some of these files and add them to an iOS application. Again, the
    code for this chapter is available on GitHub, but if you''re following along from
    scratch, create a new Tab Bar application with the iPhone as a target device.


    Open **FirstView.xib** and set up the interface, as shown in [Figure 5–1](#Chapter05.html#fig_5_1).


    ![Image](images/0501.jpg)


    **Figure 5–1.** *Here we see the two UIButtons to launch the actions we''ll be
    creating.*


    We''re going to demonstrate two different approaches to playing audio in the background
    of iOS applications. The interface is simple. Clear out the default controls and
    create two new `UIButton` elements. Use titles like those shown in [Figure 5–1](#Chapter05.html#fig_5_1).


    Both of the approaches we''ll discuss are relatively straightforward and easy
    to implement. We''ll cover a more advanced, gaming-centric approach in [Chapter
    7](#Chapter07.html#ch7).


    #### System Sound Services


    System Sound Services is a great choice for playing sound effects on the device.
    It''s designed for short sound effects, such as a button click, error beep, or
    a game action. Sounds played with System Sound Services are not subject to configuration
    using your audio session. As a result, you cannot keep the behavior of System
    Sound Services audio inline with other audio behavior in your application. This
    is the most important reason to avoid using System Sound Services for any audio
    apart from its intended uses. System Sound Services require that you add the `AudioToolbox`
    framework to your project.


    To ensure it serves its purpose as a quick sound player, System Sound Services
    has some limitations. Your sound files must be


    *   No longer than 30 seconds in duration

    *   In linear PCM or IMA4 (IMA/ADPCM) format

    *   Packaged in a .caf, .aif, or .wav file


    In addition, when you use the `AudioServicesPlaySystemSound` function,


    *   Sounds play at the current system audio volume, with no programmatic volume
    control available

    *   Sounds play immediately

    *   Looping and stereo positioning are unavailable

    *   Simultaneous playback is unavailable; you can play only one sound at a time


    #### AVAudioPlayer Class


    `AVAudioPlayer` is a bit more flexible, but comes with its own set of limitations.
    The most limiting feature of the `AVAudioPlayer` is its noticeable delay in queuing
    up and playing a file. Because of this, it''s best suited for long playing, background
    music and use cases like that. The `AVAudioPlayer` requires the `AVFoundation`
    framework in your project. Using `AVAudioPlayer`, you can


    *   Play sounds of any duration

    *   Play sounds from files or memory buffers

    *   Loop sounds

    *   Play multiple sounds simultaneously (although not with precise synchronization)

    *   Control relative playback level for each sound you are playing

    *   Seek to a particular point in a sound file, which supports application features
    such as fast forward and rewind

    *   Obtain audio power data that you can use for audio level metering


    #### Experimenting with the Multiple Audio Players


    Okay, let''s get to it. You have already created the interface with both of the
    `UIButton`s. After the briefing on different approaches to playing sound, the
    titles I used will make more sense. Before we start, we''re going to require that
    we add to our project both of the frameworks mentioned in this section. Open the
    Build Phases tab of your application''s target and add both the `AVFoundation`
    and `AudioToolbox` frameworks.


    Add the code from [Listing 5–5](#Chapter05.html#list_5_5) to `FirstViewController.h`.


    **Listing 5–5.** *New FirstViewController.h*


    `#import <UIKit/UIKit.h>`

    `#import <AudioToolbox/AudioToolbox.h>`

    `#import <AVFoundation/AVFoundation.h>`


    `@interface FirstViewController : UIViewController <AVAudioPlayerDelegate>{`

    `    SystemSoundID _systemSound;`

    `    AVAudioPlayer *_audioPlayer;`

    `}`


    `- (IBAction)systemSoundAction;`

    `- (IBAction)avAudioPlayerAction;`


    `@end`


    We first import both the `AudioToolbox` and `AVFoundation` libraries to our header
    file. We then nominate our class as an `AVAudioPlayerDelegate`. We''re not really
    building a multimedia application in this book, so I''m not going to go into this
    delegate and its methods too much. But, this would be something to further research
    if you wanted to handle events while the audio was playing.


    In the interface, we declare two instance variables for our two use cases. The
    `AVAudioPlayer` requires a pointer, as we''ll be creating the instance in this
    class. Finally, we declare two new methods to handle the click events of the `UIButtons`
    we added to our user interface.


    Next, return to the **FirstView.xib** file in Xcode and hook up the two `IBAction`
    methods to our two buttons.


    Switch over to **FirstViewController.m**. We''re just using instance variables
    in this example, so we have nothing to synthesize. Add the code from [Listing
    5–6](#Chapter05.html#list_5_6) to your implementation file.


    **Listing 5–6.** *Handle the System Sound Services Method*


    `- (void)systemSoundAction {`

    `    NSString *soundFilePath = [[NSBundle mainBundle] pathForResource:@"waterfall"`

    `ofType:@"caf"];`

    `    NSURL *soundFileURL = [NSURL fileURLWithPath:soundFilePath];`

    `    AudioServicesCreateSystemSoundID((CFURLRef)soundFileURL, &_systemSound);`

    `    AudioServicesPlaySystemSound(_systemSound);`

    `}`

    `- (void) avAudioPlayerAction {`

    `  // we''ll get to this next`

    `}`


    I''m referencing the CAFF file we have in our GitHub sample project. If you have
    another file you''d like to use instead of the one in the sample, make sure you
    match the names. It is important to note that the `pathForResource` argument takes
    the core section of the file name, not the full file name. Run the project on
    your iOS simulator and click the System Sound Action button. You''ll notice a
    quick (instant) response and the file will start to play.


    Close down the simulator. We have a bit more work to do before we can finish the
    second method. Because `AVAudioPlayer` is better for background music, I wanted
    to find something more appropriate than a waterfall, as I''m not a waterfall enthusiast
    (not that there''s anything wrong with that). The waterfall sample came from the
    cocos2D examples (we''ll cover this in [Chapter 7](#Chapter07.html#ch7)). Another
    place to get music samples is audiomicro.com and I searched their free background
    music samples for something a bit more appropriate.


    Open your Terminal to the directory of the downloaded MP3\. If you are using the
    MP3 in the sample, navigate to the locally cloned GitHub directory. Run the command
    from [Listing 5–7](#Chapter05.html#list_5_7).


    **Listing 5–7.** *Convert the MP3 to CAFF*


    `afconvert -d aac -f ''caff'' "007.mp3" backgroundMusic.caf`


    We are using the Audio File Converter to convert our MP3 file to a CAFF format
    that we can use in our project. It''s possible to just play the MP3, but that
    wouldn''t help us demonstrate when these utilities are useful, now would it?'
  trans: "\n### 在 iOS 应用中播放声音\n\n让我们将其中一些文件添加到 iOS 应用中。同样，本章的代码可在 GitHub 上获取，但如果你希望从头开始实践，请创建一个以\
    \ **iPhone** 为目标设备的标签栏应用。\n\n打开 `FirstView.xib` 并设置界面，如图 5-1 所示。\n\n![图片](img/0501.jpg)\n\
    \n**图 5-1.** *这里我们看到了两个 `UIButton`，用于触发我们将要创建的操作。*\n\n我们将演示在 iOS 应用后台播放音频的两种不同方法。界面很简单。清除默认控件，创建两个新的\
    \ `UIButton` 元素。使用类似 图 5-1 中所示的标题。\n\n我们将讨论的两种方法都相对直接且易于实现。我们将在第 7 章中介绍一种更高级的、以游戏为中心的方法。\n\
    \n### 系统声音服务\n\n系统声音服务是在设备上播放音效的绝佳选择。它专为短音效而设计，例如按钮点击声、错误提示音或游戏动作。使用系统声音服务播放的声音无法通过你的音频会话进行配置。因此，你无法使系统声音服务的音频行为与应用中的其他音频行为保持一致。这是避免将系统声音服务用于其预期用途之外的任何音频的最重要原因。使用系统声音服务需要将\
    \ `AudioToolbox` 框架添加到你的项目中。\n\n为了确保其作为快速声音播放器的用途，系统声音服务存在一些限制。你的声音文件必须满足以下条件：\n\
    \n-   持续时间不超过 30 秒\n-   采用线性 PCM 或 IMA4 (IMA/ADPCM) 格式\n-   打包在 `.caf`、`.aif`\
    \ 或 `.wav` 文件中\n\n此外，当你使用 `AudioServicesPlaySystemSound` 函数时：\n\n-   声音以当前系统音频音量播放，无法通过编程方式控制音量\n\
    -   声音立即播放\n-   不支持循环和立体声定位\n-   不支持同时播放；一次只能播放一个声音\n\n### AVAudioPlayer 类\n\n\
    `AVAudioPlayer` 更加灵活，但也有其自身的局限性。`AVAudioPlayer` 最受限制的特性是在排队和播放文件时存在明显的延迟。因此，它最适合长时间播放的背景音乐及类似场景。使用\
    \ `AVAudioPlayer` 需要你的项目中包含 `AVFoundation` 框架。使用 `AVAudioPlayer`，你可以：\n\n-   播放任意持续时间的声音\n\
    -   播放来自文件或内存缓冲区的声音\n-   循环播放声音\n-   同时播放多个声音（尽管不能精确同步）\n-   控制正在播放的每个声音的相对播放电平\n\
    -   跳转到声音文件中的特定点，从而支持快进和快退等应用功能\n-   获取可用于音频电平测量的音频功率数据\n\n### 试验多个音频播放器\n\n好了，让我们开始吧。你已经创建了包含两个\
    \ `UIButton` 的界面。在简要介绍了不同的声音播放方法之后，我使用的标题将更有意义。在开始之前，我们需要将本节中提到的两个框架都添加到我们的项目中。打开应用目标的“构建阶段”选项卡，并添加\
    \ `AVFoundation` 和 `AudioToolbox` 框架。\n\n将代码清单 5-5 中的代码添加到 `FirstViewController.h`\
    \ 中。\n\n**代码清单 5-5.** *新的 `FirstViewController.h`*\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <AudioToolbox/AudioToolbox.h>\n#import <AVFoundation/AVFoundation.h>\n\
    \n@interface FirstViewController : UIViewController <AVAudioPlayerDelegate>{\n\
    \    SystemSoundID _systemSound;\n    AVAudioPlayer *_audioPlayer;\n}\n\n- (IBAction)systemSoundAction;\n\
    - (IBAction)avAudioPlayerAction;\n\n@end\n```\n\n我们首先将 `AudioToolbox` 和 `AVFoundation`\
    \ 库导入到头文件中。然后，我们将类声明为 `AVAudioPlayerDelegate`。本书并非真正构建一个多媒体应用，因此我不打算深入讨论这个委托及其方法。但是，如果你想在音频播放时处理事件，这将是进一步研究的内容。\n\
    \n在接口中，我们为两种使用场景声明了两个实例变量。`AVAudioPlayer` 需要一个指针，因为我们将在该类中创建实例。最后，我们声明了两个新方法来处理我们添加到用户界面中的\
    \ `UIButton` 的点击事件。\n\n接下来，返回 Xcode 中的 `FirstView.xib` 文件，并将这两个 `IBAction` 方法连接到我们的两个按钮上。\n\
    \n切换到 `FirstViewController.m`。在此示例中，我们仅使用实例变量，因此无需合成任何内容。将代码清单 5-6 中的代码添加到你的实现文件中。\n\
    \n**代码清单 5-6.** *处理系统声音服务方法*\n\n```\n- (void)systemSoundAction {\n    NSString\
    \ *soundFilePath = [[NSBundle mainBundle] pathForResource:@\"waterfall\"\nofType:@\"\
    caf\"];\n    NSURL *soundFileURL = [NSURL fileURLWithPath:soundFilePath];\n  \
    \  AudioServicesCreateSystemSoundID((CFURLRef)soundFileURL, &_systemSound);\n\
    \    AudioServicesPlaySystemSound(_systemSound);\n}\n- (void) avAudioPlayerAction\
    \ {\n  // 我们接下来将实现此方法\n}\n```\n\n我引用了我们 GitHub 示例项目中的 CAFF 文件。如果你有想要使用的其他文件，请确保名称匹配。需要注意的是，`pathForResource`\
    \ 参数接受文件名的核心部分，而不是完整文件名。在你的 iOS 模拟器上运行项目，然后点击“系统声音操作”按钮。你会注意到响应非常迅速（即时），并且文件将开始播放。\n\
    \n关闭模拟器。在完成第二个方法之前，我们还有一些工作要做。由于 `AVAudioPlayer` 更适合背景音乐，我想找一个比瀑布声更合适的素材，因为我不是瀑布爱好者（这并没有什么不妥）。瀑布样本来自\
    \ cocos2D 示例（我们将在第 7 章中介绍）。获取音乐样本的另一个地方是 audiomicro.com，我搜索了他们免费的背景音乐样本，寻找更合适的素材。\n\
    \n打开你的终端，进入下载的 MP3 文件所在目录。如果你使用的是示例中的 MP3，请导航到本地克隆的 GitHub 目录。运行代码清单 5-7 中的命令。\n\
    \n**代码清单 5-7.** *将 MP3 转换为 CAFF*\n\n```\nafconvert -d aac -f 'caff' \"007.mp3\"\
    \ backgroundMusic.caf\n```\n\n我们使用音频文件转换器将我们的 MP3 文件转换为可在项目中使用的 CAFF 格式。直接播放 MP3\
    \ 是可行的，但这无助于我们演示这些实用工具何时有用，对吧？\n"
- fmt: "# 排版后的文档\n\nReturn to the `FirstViewController.m` file in your Xcode project.\
    \ Let's fill out the rest of the `avAudioPlayerAction` method with the code from\
    \ [Listing 5–8](#Chapter05.html#list_5_8).\n\n**Listing 5–8.** *Completed avAudioPlayerAction\
    \ Method*\n\n```\n- (void)avAudioPlayerAction {\n    NSError *setCategoryError\
    \ = nil;\n        [[AVAudioSession sharedInstance] setCategory:AVAudioSessionCategoryAmbient\n\
    error:&setCategoryError];\n\n        NSString *backgroundMusicPath = [[NSBundle\
    \ mainBundle] pathForResource:@\"backgroundMusic\" ofType:@\"caf\"];\n       \
    \ NSURL *backgroundMusicURL = [NSURL fileURLWithPath:backgroundMusicPath];\n \
    \       NSError *error;\n\n        _audioPlayer = [[AVAudioPlayer alloc] initWithContentsOfURL:backgroundMusicURL\n\
    error:&error];\n[_audioPlayer play];\n}\n```\n\nThere are many different approaches\
    \ to how we could have ended this method. I chose the simplest method, which is\
    \ to just play the file. You can queue the file up for playing at a later time,\
    \ or start directing how to handle the file from the delegate methods.\n\nStart\
    \ the project on your iPhone simulator. Now, play both of the files. You'll notice\
    \ there is a significant delay in the `AVAudioPlayer` method.\n\n## Playing Positional\
    \ Sound\n\nFor augmented-reality applications in which the user is moving the\
    \ screen around to acquire different views, it might be useful to play positional\
    \ audio on occasion. You can achieve positional audio with cocos2D, as well. Instead\
    \ of covering that in this chapter, and because we haven't yet introduce cocos2D,\
    \ we're going to save that for [Chapter 7](#Chapter07.html#ch7).\n\n## User Feedback\
    \ Through Vibration\n\nThere are a few nonaudible options we have available to\
    \ use for providing the user with feedback. The most commonly used is the vibration\
    \ effect. This is actually depressingly easy. Create a new method in your `FirstViewController`\
    \ class called `vibrate`. Add the code from [Listing 5–9](#Chapter05.html#list_5_9).\n\
    \n**Listing 5–9.** *Completed vibrate Method*\n\n```\n- (void)vibrate {\n  AudioServicesPlaySystemSound\
    \ (kSystemSoundID_Vibrate);\n}\n```\n\nThat's it. In the sample project, I've\
    \ created another button and attached this method so you could see it in a working\
    \ state. If you have any trouble getting this to run, make sure your iPhone has\
    \ Vibrate set to on, in the Settings panel.\n\n## Recording Sound\n\nSo far in\
    \ this chapter, we've learned about the supported sound types and some of their\
    \ intricacies, as well as a few approaches on how to play files in iOS applications.\
    \ Next, let's take some time to understand how to record and save sound that you\
    \ gather from the device.\n\nWe're going to be using the same `AVFoundation` framework\
    \ we used in our previous example of playing audio, but now for simple audio recording.\
    \ We already added the framework to our project, so you won't have to worry about\
    \ that step. If you were starting with a new project, you'd need to add the framework\
    \ as we did earlier.\n\n### Initializing the Audio Recorder\n\nThe first step\
    \ in getting your application ready to record audio is setting up a new `AVAudioRecorder`\
    \ object. You can manually create this object and its settings, but both the Apple\
    \ documentation and most online tutorials will recommend starting with one of\
    \ the other `init` options.\n\nOpen `SecondViewController.h` in Xcode and update\
    \ it, as shown in [Listing 5–10](#Chapter05.html#list_5_10).\n\n**Listing 5–10.**\
    \ *New SecondViewController.h Header*\n\n```\n#import <UIKit/UIKit.h>\n#import\
    \ <AVFoundation/AVFoundation.h>\n\n@interface SecondViewController : UIViewController\
    \ <AVAudioRecorderDelegate,\nAVAudioPlayerDelegate>{\nAVAudioRecorder *_soundRecorder;\n\
    }\n\n- (IBAction)setupRecorder;\n- (IBAction)stopRecorder;\n- (IBAction)playAudioRecording;\n\
    \n@end\n```\n\nWalking through the code, we declared an `AVAudioRecorder` instance\
    \ object, as well as three methods. In final applications, you'll probably want\
