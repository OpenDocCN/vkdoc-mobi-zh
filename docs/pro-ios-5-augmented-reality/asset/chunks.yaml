    We start by importing the `CoreLocation` Framework and the `ARCoordinate` class
    we just created. We then change the parent class from `NSObject` to `ARCoordinate`.


    Finally, we declare a property to hold the `CLLocation` of the point of interest
    and define a few methods, which we''ll discuss in a bit. Switch over to `ARGeoCoordinate.m`
    and add the code from [Listing 11–17](#Chapter11.html#list_11_17).


