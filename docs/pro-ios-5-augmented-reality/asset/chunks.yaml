    `self.window.backgroundColor =` **`[UIColor clearColor];`**

    `    [self.window makeKeyAndVisible];`

    `    return YES;`

    `}`


    Again, this is nothing we haven''t seen before. We imported our new `RootViewController`
    class, synthesized the variable, and then added it as a subview to our `UIWindow`.


    Run the application on a physical device that allows for Core Location (iPhone
    or iPad). Since we''re using the camera, we won''t be able to debug using the
    simulator. You should be prompted by the location manager, as shown in [Figure
    11–4](#Chapter11.html#fig_11_4), to allow your current location to be shared with
    the application.


    ![Image](images/1104.jpg)


    **Figure 11–4.** *Allow location sharing through location manager permissions.*


    After you accept the message, you will be taken to a full-screen camera view,
    as shown in [Figure 11–5](#Chapter11.html#fig_11_5). Hopefully, you''ll have better
