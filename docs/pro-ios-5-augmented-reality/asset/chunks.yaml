    \ `NSObject`。打开头文件，并添加 代码清单 11–14 中的代码。\n\n**代码清单 11–14.** `ARCoordinate.h`\n\n\
    ```\n#import <Foundation/Foundation.h>\n\n@interface ARCoordinate : NSObject {\n\
