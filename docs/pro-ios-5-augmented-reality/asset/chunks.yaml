    \n![Image](images/1315.jpg)\n\n**Figure 13–15.** *SMS was sent successfully.*\n\
    \n## Summary\n\nThis chapter was a lot of fun. We started as we did in Chapter\
    \ 7, and created a HUD layer. After some experimentation, we realized that wasn't\
    \ necessary. By following the step-by-step process, we learned about threading\
    \ with OpenGL (which is the foundation for cocos2D).\n\nWe extended our example\
    \ to create an `AVCaptureSession` and send the `UIImages` to the face.com REST\
    \ API. We used two different open source libraries to add functionality to our\
    \ demo. ASI-HTTP-Request helped us wrap the REST callout in a short amount of\
    \ code, and the SBJson library helped us parse the responses from face.com.\n\n\
    We used cocos2D to overlay a sprite on the target's face, and a label with the\
    \ mood returned from face.com. Finally, we used Twilio's simple REST API to alert\
    \ customer service over SMS that an angry face was detected.\n\nBefore using the\
    \ facial recognition examples in your own applications, you should check your\
    \ local privacy laws. In certain regions, capturing or storing facial patterns\
    \ may be a privacy violation.\n\nI hope you learned a lot during the examples\
