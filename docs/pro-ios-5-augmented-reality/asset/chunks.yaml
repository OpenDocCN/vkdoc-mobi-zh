- fmt: "Next, we initialize the Qualcomm SDK. This will be performed on a background\
    \ thread. After it's complete, we again move the status enumeration along.\n\n\
    The last method we just implemented initializes the rendering. This is the main\
    \ `init` for the AR portion of the application.\n\nWe need two methods that will\
    \ be called from the pause and resume routines to start and stop the camera. They\
    \ are in [Listing 9–22](#Chapter09.html#list_9_22).\n\n**Listing 9–22.** *Start\
    \ and Stop the Camera View*\n\n```\n- (void)startCamera\n{\n    NSLog(@\"Start\
    \ Camera!\");\n    // Initialise the camera\n    if (QCAR::CameraDevice::getInstance().init())\
    \ {\n        // Configure video background\n        [self configureVideoBackground];\n\
    \n        // Select the default mode\n        if (QCAR::CameraDevice::getInstance().selectVideoMode(QCAR::CameraDevice::MODE_DEFAULT))\
    \ {\n            // Start camera capturing\n            if (QCAR::CameraDevice::getInstance().start())\
    \ {\n                // Start the tracker\n                QCAR::Tracker::getInstance().start();\n\
    \n                // Cache the projection matrix\n                const QCAR::CameraCalibration&\
    \ cameraCalibration = QCAR::Tracker::getInstance().getCameraCalibration();\n \
    \               projectionMatrix = QCAR::Tool::getProjectionGL(cameraCalibration,\
    \ 2.0f,\n2000.0f);\n                [self onResume];\n            }\n        }\n\
    \    }\n}\n\n- (void)stopCamera\n{\n    QCAR::Tracker::getInstance().stop();\n\
    \    QCAR::CameraDevice::getInstance().stop();\n    QCAR::CameraDevice::getInstance().deinit();\n\
    }\n```\n\nThese are all C++ functions from the QCAR library. The structure is\
    \ very similar to how we handle things in Objective-C or using an OpenGL Texture\
    \ for video, but the methods are specific to the SDK.\n\nWe're almost ready to\
    \ test the application. This was quite a lot of code without being able to test\
    \ anything.\n\nLet's configure the video as the background of our layer. Copy\
    \ the method from [Listing 9–23](#Chapter09.html#list_9_23).\n\n**Listing 9–23.**\
    \ *Configure the Video As the Background Image*\n\n```\n- (void)configureVideoBackground\n\
    {\n    // Get the default video mode\n    QCAR::CameraDevice& cameraDevice = QCAR::CameraDevice::getInstance();\n\
    \    QCAR::VideoMode videoMode =\ncameraDevice.getVideoMode(QCAR::CameraDevice::MODE_DEFAULT);\n\
    \n    // Configure the video background\n    QCAR::VideoBackgroundConfig config;\n\
    \    config.mEnabled = true;\n    config.mSynchronous = true;\n    config.mPosition.data[0]\
    \ = 0.0f;\n    config.mPosition.data[1] = 0.0f;\n\n    // Compare aspect ratios\
    \ of video and screen. If they are different\n    // we use the full screen size\
    \ while maintaining the video's aspect\n    // ratio, which naturally entails\
    \ some cropping of the video.\n    // Note: screenRect is portrait but videoMode\
    \ is always landscape,\n    // which is why \"width\" and \"height\" appear to\
    \ be reversed.\n    float arVideo = (float)videoMode.mWidth / (float)videoMode.mHeight;\n\
    \    float arScreen = screenRect.size.height / screenRect.size.width;\n\n    if\
    \ (arVideo > arScreen)\n    {\n        // Video mode is wider than the screen.\
    \ We'll crop the left and right edges of\nthe video\n        config.mSize.data[0]\
    \ = (int)screenRect.size.width * arVideo;\n        config.mSize.data[1] = (int)screenRect.size.width;\n\
    \    }\n    else\n    {\n        // Video mode is taller than the screen. We'll\
    \ crop the top and bottom edges of the video.\n        // Also used when aspect\
    \ ratios match (no cropping).\n        config.mSize.data[0] = (int)screenRect.size.height;\n\
    \        config.mSize.data[1] = (int)screenRect.size.height / arVideo;\n    }\n\
    \n    // Set the config\n    QCAR::Renderer::getInstance().setVideoBackgroundConfig(config);\n\
    }\n```\n\nThis method was copied directly from one of the samples. Qualcomm is\
    \ setting the video to match the screen, then drawing what the camera sees as\
    \ our background.\n\nLet's load up the shaders for light settings in OpenGL. Copy\
    \ the method from [Listing 9–24](#Chapter09.html#list_9_24).\n\n**Listing 9–24.**\
    \ *Load the Test Shaders*\n\n```\n-(void)loadShaders {\n    // Loading shaders\
    \ for light only\n\n    shader = [[GLProgram alloc] initWithVertexShaderFilename:@\"\
    SimpleLightShader\"\nfragmentShaderFilename:@\"SimpleLightShader\"];\n    [shader\
    \ addAttribute:@\"a_position\"];\n    [shader addAttribute:@\"a_texCoord\"];\n\
    \    [shader addAttribute:@\"a_normal\"];\n\n    if (![shader link])\n    {\n\
    \        // Compilation failed\n        NSLog(@\"light shader link failed\");\n\
    \        NSString *progLog = [shader programLog];\n        NSLog(@\"Program Log:\
    \ %@\", progLog);\n        NSString *fragLog = [shader fragmentShaderLog];\n \
    \       NSLog(@\"Frag Log: %@\", fragLog);\n        NSString *vertLog = [shader\
    \ vertexShaderLog];\n        NSLog(@\"Vert Log: %@\", vertLog);\n        shader\
    \ = nil;\n    } else {\n        NSLog(@\"Light Shader compiled successfuly!\"\
    );\n    }\n\n    shaderPositionAttribute = [shader attributeIndex:@\"a_position\"\
    ];\n    shaderNormalAttribute   = [shader attributeIndex:@\"a_normal\"];\n   \
    \ shaderColorUniform = [shader uniformIndex:@\"a_color\"];\n    shaderModelViewMatrixUniform\
    \ = [shader uniformIndex:@\"modelViewMatrix\"];\n    shaderProjectionMatrixUniform\
    \ = [shader uniformIndex:@\"projectionMatrix\"];\n}\n```\n\nWe have two more tasks\
    \ left before we can wire up the `EAGLView` class in place of our applications\
    \ `UIView`. We need to initialize the OpenGL rendering and then render the frames.\
    \ You can find these two methods in [Listing 9–25](#Chapter09.html#list_9_25).\n\
    \n**Listing 9–25.** *Initialize OpenGL Rendering and Render Frames*\n\n```\n-\
    \ (void)initRendering\n{\n    // Define the clear colour\n    glClearColor(0.0f,\
    \ 0.0f, 0.0f, QCAR::requiresAlpha() ? 0.0f : 1.0f);\n\n    [self loadShaders];\n\
    }\n\n- (void)renderFrameQCAR\n{\n    [self setFramebuffer];\n\n    // Clear colour\
    \ and depth buffers\n    glClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT);\n\
    \n    QCAR::State state = QCAR::Renderer::getInstance().begin();\n\n    glEnable(GL_DEPTH_TEST);\n\
    \    glEnable(GL_CULL_FACE);\n\n    for (int i = 0; i < state.getNumActiveTrackables();\
    \ ++i) {\n        // Get the trackable\n        const QCAR::Trackable* trackable\
    \ = state.getActiveTrackable(i);\n        QCAR::Matrix44F modelViewMatrix = QCAR::Tool::convertPose2GLMatrix(trackable-\n\
    >getPose());\n\n        [shader use];\n\n        float Sash_Kd [] = {0.589414,0.042139,0.042139};\n\
    \        // Set the sampler texture unit to 0\n        glUniformMatrix4fv(shaderProjectionMatrixUniform,\
    \ 1, 0, &projectionMatrix.data[0]);\n        glUniformMatrix4fv(shaderModelViewMatrixUniform,\
    \ 1, 0, &modelViewMatrix.data[0]);\n        glUniform3fv(shaderColorUniform, 1,\
    \ Sash_Kd);\n\n        glVertexAttribPointer(shaderPositionAttribute, 3, GL_FLOAT,\
    \ GL_FALSE, 0, (const\nGLvoid*)&cubeVertices[0]);\n        glVertexAttribPointer(shaderNormalAttribute,\
    \ 3, GL_FLOAT, GL_FALSE, 0, (const\nGLvoid*)&cubeNormals[0]);\n\n        glEnableVertexAttribArray(shaderPositionAttribute);\n\
    \        glEnableVertexAttribArray(shaderNormalAttribute);\n\n        glDrawElements(GL_TRIANGLES,\
    \ NUM_CUBE_INDEX, GL_UNSIGNED_SHORT, (const GLvoid*)&cubeIndices[0]);\n    }\n\
    \n    glDisable(GL_DEPTH_TEST);\n    glDisable(GL_CULL_FACE);\n\n    QCAR::Renderer::getInstance().end();\n\
    \    [self presentFramebuffer];\n\n}\n```\n\nThe first method loads the shaders\
    \ and defines a clear color for us to reference in the layer. After OpenGL rendering\
    \ has been initialized, we can draw the QCAR frame.\n\nIn this method, we are\
    \ iterating over the array of trackables that were found, much like we did in\
    \ the String SDK, and we're rendering the cube in the 3D space just above the\
    \ trackable. You can replace this code block with any OpenGL rendering routine."
