    Let''s start with the accelerometer. In Xcode, open the `FirstViewController.h`
    file and update it, as shown in [Listing 4–1](#Chapter04.html#list_4_1).


    **Listing 4–1.** *Updated FirstViewController.h*


    `#import <UIKit/UIKit.h>`


    `@interface FirstViewController : UIViewController {`

    `    UIAccelerometer *accelerometer;`


    `    UILabel *xLabel;`

    `    UILabel *yLabel;`

    `    UILabel *zLabel;`


    `    UIProgressView *xProgressView;`

    `    UIProgressView *yProgressView;`

    `    UIProgressView *zProgressView;`

    `}`


    `@property (nonatomic, retain) UIAccelerometer *accelerometer;`


    `@property (nonatomic, retain) IBOutlet UILabel *xLabel;`

    `@property (nonatomic, retain) IBOutlet UILabel *yLabel;`

    `@property (nonatomic, retain) IBOutlet UILabel *zLabel;`


    `@property (nonatomic, retain) IBOutlet UIProgressView *xProgressView;`

    `@property (nonatomic, retain) IBOutlet UIProgressView *yProgressView;`

    `@property (nonatomic, retain) IBOutlet UIProgressView *zProgressView;`


    `@end`


    Let''s get our `FirstViewController.m` file up to date, and then walk through
    the new code step by step. Switch to `FirstViewController.m` in Xcode and add
    the code from [Listing 4–2](#Chapter04.html#list_4_2).


    **Listing 4–2.** *Updated FirstViewController.m*


    `// after implementation`

    `@synthesize xLabel, yLabel, zLabel, xProgressView, yProgressView, zProgressView,
    accelerometer;`

    `// replace existing dealloc from auto-gen code`

    `- (void)dealloc`

    `{`

    `    [xLabel release];`

    `    xLabel = nil;`

    `    [yLabel release];`

    `    yLabel = nil;`

    `    [zLabel release];`

    `    zLabel = nil;`

    `    [xProgressView release];`

    `    xProgressView = nil;`

    `    [yProgressView release];`

    `    yProgressView = nil;`

    `    [zProgressView release];`

    `    zProgressView = nil;`

    `    [accelerometer release];`

    `    accelerometer = nil;`

    `    [super dealloc];`

    `}`


    Starting at the top, we declare a few UI elements that we''ll use to display real-time
    readings from the accelerometer. We are going to be using three labels and three
    progress bars, each associated with one axis of the accelerometer. [Figure 4–1](#Chapter04.html#fig_4_1)
    shows the X, Y, and Z coordinate axes.


    ![Image](images/0401.jpg)


    **Figure 4–1.** *The accelerometer uses X, Y, and Z coordinate axes.*


    Open `FirstView.xib` in Xcode. Add the labels and the progress bar elements to
    the interface canvas. You should see something similar to what is shown in [Figure
    4–2](#Chapter04.html#fig_4_2).


    ![Image](images/0402.jpg)


    **Figure 4–2.** *Set up the XIB file for the accelerometer readings.*


    For simplicity, let''s assign the three sets of values to the outlets in order
    horizontally. X will be at the top, and Z at the bottom. Because Xcode 4.2 is
    new to some of us, we''ll review this one more time. To assign the outlets to
    the properties in your header file, press the Ctrl key while dragging from the
    **File''s Owner** icon to the outlet on the canvas. A pop-up dialog will display,
    showing eligible properties for assignment. Select the appropriate outlet. [Figure
    4–3](#Chapter04.html#fig_4_3) shows an example.


    ![Image](images/0403.jpg)


    **Figure 4–3.** *Link the IBOutlet to the properties in FirstViewController.h.*


    Repeat the process for each of the `UILabel` outlets and `UIProgressView` components.


    We access the accelerometer through the `UIAccelerometer` class. This class uses
    the same delegate pattern we were using in [Chapter 3](#Chapter03.html#ch3) for
    location services. This class uses a shared `UIAccelerometer` singleton and is
    not directly accessed. Because of this, you''ll notice a slight change in how
    we handle memory in these examples (more specifically, how we handle the subscription
    to the hardware messages).


    ##### The UIAccelerometerDelegate Class


    Before we can start monitoring the accelerometer for updates, we must nominate
    this class as a `UIAccelerometerDelegate`. Update `FirstViewController.h` accordingly.
    Switch back to `FirstViewController.m` and add the method from [Listing 4–3](#Chapter04.html#list_4_3).


    **Listing 4–3.** *Delegate Method for UIAccelerometerDelegate Class*


    `- (void)accelerometer:(UIAccelerometer *)accelerometer didAccelerate:(UIAcceleration`

    `*)acceleration {`

    `    xLabel.text = [NSString stringWithFormat:@"%@%f", @"X: ", acceleration.x];`

    `    yLabel.text = [NSString stringWithFormat:@"%@%f", @"Y: ", acceleration.y];`

    `    zLabel.text = [NSString stringWithFormat:@"%@%f", @"Z: ", acceleration.z];`


    `    xProgressView.progress = ABS(acceleration.x);`

    `    yProgressView.progress = ABS(acceleration.y);`

    `    zProgressView.progress = ABS(acceleration.z);`

    `}`


    The `didAccelerate` method of the delegate class is called every time the accelerometer
    measures new values within range of its update interval. Let''s walk through the
    code. The first set of methods format an `NSString` value for the `text` properties
    of the three `UILabel`s. It is the acceleration value of each particular axis
    that will populate this string value. The second block of code sets the value
    of the `UIProgressView` outlets based on the same values. You''ll notice that
    we''re also setting the values to the absolute value (`ABS`) of the measurement.
    This is because a progress bar can''t display a negative value. If there''s a
    negative measurement, you''ll see it on the `UILabel`.


    Before we can run the project, we have to set up the update interval of the accelerometer
    and assign it a delegate. As I mentioned earlier, the `UIAccelerometer` class
    is a singleton class. We need to create a reference to the `sharedAccelerometer`
    object to start receiving measurements. Uncomment the `viewDidLoad` method and
    adjust it, as shownin [Listing 4–4](#Chapter04.html#list_4_4).


    **Listing 4–4.** *New viewDidLoad Method*


    `- (void)viewDidLoad`

    `{`

    `    accelerometer = [UIAccelerometer sharedAccelerometer];`

    `    accelerometer.updateInterval = .5;`

    `    accelerometer.delegate = self;`


    `    [super viewDidLoad];`

    `}`


    The first line in this method assigns our `UIAccelerometer` object to the `sharedAccelerometer`
    object. Next, you choose the `updateInterval`, which is in seconds. I have .5
    (twice per second) selected. Feel free to adjust this and experiment with the
    response times. Finally, we set the `delegate` to `self` so we can receive the
    measurements.


    Make sure you have a physical device connected and selected in the Scheme drop-down
    in Xcode. Run the project on your device. You should see something similar to
    what is shown in [Figure 4–4](#Chapter04.html#fig_4_4).


    ![Image](images/0404.jpg)


    **Figure 4–4.** *Obtain X, Y, and Z measurements of UIAccelerometer.*


    As you are testing the application, try a few different scenarios. Try to force
    the device downward to watch for quick changes on an axis. Try to set the device
    on its side horizontally, which should increase the X-axis in full (either negative
    or positive, depending on which side). Next, stand the device upright vertically.
    The Y-axis should now have a full measurement, while the other readings move toward
    zero. Lay the device flat with the screen facing upward. You should see the Z-axis
    nearing 1.0 as the other two axis measurements approach zero. Get to know the
    orientation of the device. We''ll need to coordinate these types of readings into
    our applications later in the book.'
