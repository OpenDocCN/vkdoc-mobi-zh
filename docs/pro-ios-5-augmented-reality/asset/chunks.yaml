- fmt: "### Camera View\n\nLet's start by setting the camera view as our foundation\
    \ layer, like we did in [Chapter 7](#Chapter07.html#ch7). Add the following frameworks\
    \ to the project:\n\n- CoreImage\n- CoreMedia\n- CoreVideo\n\nOpen `AppDelegate.h`\
    \ in Xcode. Update the header as shown in [Listing 8–2](#Chapter08.html#list_8_2).\n\
    \n**Listing 8–2.** *New AppDelegate.h*\n\n```\n#import <UIKit/UIKit.h>\n#import\
    \ <AVFoundation/AVFoundation.h>\n\n@class RootViewController;\n\n@interface AppDelegate\
    \ : NSObject <UIApplicationDelegate,\nAVCaptureVideoDataOutputSampleBufferDelegate>\
    \ {\n    UIWindow *window;\n    RootViewController *viewController;\n\nAVCaptureSession\
    \ *_session;\nUIView *_cameraView;\nUIImageView *_imageView;\n}\n\n@property (nonatomic,\
    \ retain) UIWindow *window;\n\n@end\n```\n\nMuch like we did in [Chapter 7](#Chapter07.html#ch7),\
    \ we're setting up `UIView` and a `UIImageView` to process and display the camera\
    \ view to the user. Switch over to `AppDelegate.m`. Add the methods from [Listing\
    \ 8–3](#Chapter08.html#list_8_3) to the implementation.\n\n**Listing 8–3.** *New\
    \ Methods for AppDelegate.m*\n\n```\n-(AVCaptureDevice *)frontFacingCameraIfAvailable\n\
    {\n    NSArray *videoDevices = [AVCaptureDevice devicesWithMediaType:AVMediaTypeVideo];\n\
    \    AVCaptureDevice *captureDevice = nil;\n    for (AVCaptureDevice *device in\
    \ videoDevices)\n    {\n        if (device.position == AVCaptureDevicePositionFront)\n\
    \        {\n            captureDevice = device;\n            break;\n        }\n\
    \    }\n\n    //  couldn't find one on the front, so just get the default video\
    \ device.\n    if ( ! captureDevice)\n    {\n        captureDevice = [AVCaptureDevice\
    \ defaultDeviceWithMediaType:AVMediaTypeVideo];\n    }\n\n    return captureDevice;\n\
    }\n\n- (void)setupCaptureSession {\n    NSError *error = nil;\n\n    _session\
    \ = [[AVCaptureSession alloc] init];\n    _session.sessionPreset = AVCaptureSessionPresetMedium;\n\
    \n    //AVCaptureDevice *device = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
    \    AVCaptureDevice *device = [self frontFacingCameraIfAvailable]; // for debug\n\
    \    AVCaptureDeviceInput *input = [AVCaptureDeviceInput deviceInputWithDevice:device\
    \ error:&error];\n\n    if (!input) {\n        NSLog(@\"Some kind of error...\
    \ handle it here\");\n    }\n\n    [_session addInput:input];\n\n    AVCaptureVideoDataOutput\
    \ *output = [[AVCaptureVideoDataOutput alloc] init];\n    [_session addOutput:output];\n\
    \n    dispatch_queue_t queue = dispatch_queue_create(\"pumpkins\", NULL);\n  \
    \  [output setSampleBufferDelegate:self queue:queue];\n    dispatch_release(queue);\n\
    \n    output.videoSettings =\n    [NSDictionary dictionaryWithObject:\n     [NSNumber\
    \ numberWithInt:kCVPixelFormatType_32BGRA]\n                                forKey:(id)kCVPixelBufferPixelFormatTypeKey];\n\
    \n    [_session startRunning];\n}\n```\n\nThe first method, `frontFacingCameraIfAvailable`,\
    \ is only here for debugging purposes. If you're not coding in a crowd, this will\
    \ come in handy, so you use the front-facing camera for testing. The lines shown\
    \ in bold should swap if you're not debugging. Meaning, either comment one or\
    \ the other to force the use of a front-facing camera, if available. Use only\
    \ one of these at a time. Because I'm not coding in a crowd and require my front-facing\
    \ camera, I'll leave mine in that state.\n\nBefore we actually add the camera\
    \ to the view, let's setup a menu screen using chipmunk physics to amuse the user\
    \ while they wait for the game to start.\n\n### Creating the Game Menu\n\nCreate\
    \ new file using the cocos2D `CCNode` template, as shown in [Figure 8–5](#Chapter08.html#fig_8_5).\n\
    \n![Image](images/0805.jpg)\n\n**Figure 8–5.** *Use the CCNode template.*\n\n\
    Make sure the file is a subclass of `CCLayer` and the name is `MenuLayer.m`. Open\
    \ `MenuLayer.h` in Xcode. Update the header to look like [Listing 8–4](#Chapter08.html#list_8_4).\n\
    \n**Listing 8–4.** *Update MenuLayer.h*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n\n@interface MenuLayer : CCLayer {\n\n}\n+ (id)scene;\n\
    @end\n```\n\nSwitch over to `MenuLayer.m`. Add the methods from [Listing 8–5](#Chapter08.html#list_8_5)\
    \ to the implementation.\n\n**Listing 8–5.** *Scene and init Method for MenuLayer.m*\n\
    \n```\n+ (id)scene {\n    CCScene *scene = [CCScene node];\n    MenuLayer *layer\
    \ = [MenuLayer node];\n    [scene addChild:layer];\n    return scene;\n}\n\n-\
    \ (id)init {\n    if ((self = [super init])) {        \n        CGSize winSize\
    \ = [CCDirector sharedDirector].winSize;\n\n        CCLabelBMFont *label = [CCLabelBMFont\
    \ labelWithString:@\"Hello, Chipmunk!\" fntFile:@\"Arial.fnt\"];\n        label.position\
    \ = ccp(winSize.width/2, winSize.height/2);\n        [self addChild:label];\n\
    \    }\n    return self;\n}  \n```\n\nAt this point, we haven't done anything\
    \ game related yet. We're setting up a type of Hello World example to make sure\
    \ everything is working properly. You'll notice that we used a custom font file\
    \ and the `CCLabelBMFont` class for this example. You can find the code in the\
    \ GitHub repository or from the Source Code/Download area at the Apress web site\
    \ ([`www.apress.com`](http://www.apress.com)). These fonts were provided by Ray\
    \ Wenderlich ([`www.raywenderlich.com`](http://www.raywenderlich.com)). You will\
    \ need to wait until the fonts have been added to the project before attempting\
    \ to run it. You can add them now, if you want to run the project as it stands.\n\
    \nLet's return to `AppDelegate.m`. We need to add a few more things to make sure\
    \ our menu is shown to the user. Add the `import` statements from [Listing 8–6](#Chapter08.html#list_8_6)\
    \ to the project.\n\n**Listing 8–6.** *Additional import Statements*\n\n```\n\
    #import \"chipmunk.h\"\n#import \"MenuLayer.h\"\n```\n\nFind the bottom of the\
    \ `applicationDidFinishLaunching` method in `AppDelegate.m`. Add the code from\
    \ [Listing 8–7](#Chapter08.html#list_8_7).\n\n**Listing 8–7.** *Add to the Bottom\
    \ of applicationDidFinishLaunching*\n\n```\ncpInitChipmunk();\n[[CCDirector sharedDirector]\
    \ runWithScene: [MenuLayer scene]];\n```\n\nGo ahead and run the project on the\
    \ iPad simulator. If everything was done correctly, you'll see something like\
    \ [Figure 8–6](#Chapter08.html#fig_8_6).\n\n![Image](images/0806.jpg)\n\n**Figure\
    \ 8–6.** *Run the project to see “Hello, Chipmunk!”*\n\nOkay, let's make this\
    \ a bit more interesting. The idea with the menu layer is that we can give the\
    \ user something to do while they are deciding whether to start a new game. Since\
    \ this is a game about pumpkins, we're going to add a pumpkin to the screen that\
    \ can be tossed around by touch interactions."
