    `    NSDate* eventDate = newLocation.timestamp;`

    `    NSTimeInterval howRecent = [eventDate timeIntervalSinceNow];`

    `    if (abs(howRecent) < 15.0)`

    `    {`

    `        //locationTextView.text = [NSString stringWithFormat:@"latitude %+.6f,
    longitude %+.6f\n",`

    **`        //                       newLocation.coordinate.latitude,`**

    **`        //                       newLocation.coordinate.longitude];`**


    **`CLLocationDistance dist = [newLocation distanceFromLocation:oldLocation] /
    1000;`**

    **`        locationTextView.text = [NSString stringWithFormat:@"distance %5.1f
    traveled"];`**

    `    } else {`

    **`        locationTextView.text = @"Update was old";`**

    **`        // you''d probably just do nothing here and ignore the event`**

    `    }`

    `}`


    In Xcode 4''s simulator, you''ll get something similar to what is shown in [Figure
    3–11](#Chapter03.html#fig_3_11). If you are using Xcode 4.2 beta and iOS 5 on
    your simulator, you can force some interesting distances. Another way to test
    this feature would be to pass in a new `CLLocation` coordinate instead of `oldLocation`.


    ![Image](images/0311.jpg)


    **Figure 3–11.** *Check the distance between updates.*


    #### Altitude


    In augmented reality, checking altitude can help make sure that the angle of the
    camera is appropriate for the view that you are presenting to the user. Getting
    the altitude of the device starts with the same process as the location. Apple
    recommends that we check for the availability of the altitude reading, and then
    try to get it from the GPS or cellular radio. To determine whether the device
    is capable of providing altitude, at this time, use the code from [Listing 3–19](#Chapter03.html#list_3_19).


    **Listing 3–19.** *Check Whether Altitude Is Available*


    `If (signbit(newLocation.verticalAccuracy)) {`

    `        // get the altitude`

    `}`


    There are a few pitfalls to altitude readings. First, older iPhones (original
    and iPhone 3Gs) are drastically less accurate. In some reference materials, it
    is noted that they are nearly ten times more inaccurate than the iPhone 4\. Second,
    as we saw with our location services examples earlier in this chapter, Core Location
    updates only when the device moves a certain distance (non vertical). So, we need
    to either force the GPS to reset or have the user tell us when they''ve changed
    altitudes automatically. To check for the GPS reading, add the code from [Listing
    3–20](#Chapter03.html#list_3_20).


    **Listing 3–20.** *Check the GPS Reading*


    `locationTextView.text = [NSString stringWithFormat:@"%6.2f m. ", newLocation.altitude];`


    Typically, even on newer devices, the altitude reading isn''t accurate enough.
    There are a few other methods and publicly available web services that you can
    use to determine the altitude based on GPS coordinates. We''ll revisit this topic
    in our examples in the later chapters. Before we move on to visualizing the location
    information on a map, let''s review the classes we have been using in this chapter.
    Their most used methods and properties are listed in [Table 3–1](#Chapter03.html#tab_3_1).


    ![Image](images/t0301.jpg)


