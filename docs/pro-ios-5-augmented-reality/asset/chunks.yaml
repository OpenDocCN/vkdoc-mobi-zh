  trans: "\n### 告别旧设备\n\n我们将在示例项目中使用 iPhone 和 iPad。不过，只要代码在两个平台上完全可移植，我们就只针对 iPhone\
    \ 进行编码。图 2–1 展示了 iPhone 4 的物理尺寸。\n\n![Image](img/0201.jpg)\n\n**图 2–1.** *这里展示了\
    \ iPhone 4 的物理尺寸。*\n\niPad 上市时间虽不如 iPhone 长，但其应用场景的吸引力毫不逊色。在本书中，我们仅以 iPad 2 为例。原因有几条。最重要的是，第一代\
    \ iPad 缺少前置摄像头，而本书后续会涉及一些人脸识别编程。图 2–2 展示了 iPad 2 的物理特性。\n\n![Image](img/0202.jpg)\n\
    \n**图 2–2.** *这里展示了 iPad 2 的物理特性。*\n\n### 硬件组件\n\n我们不要仅仅罗列这些设备的硬件规格，而是花点时间讨论增强现实应用可能需要什么。首先，也是最明显的，设备需要摄像头。大多数增强现实用例都对位置和方向有所要求，因此\
    \ GPS 和指南针会很有用。可能还需要监听声音或输出声音，所以我们应该考虑麦克风和扬声器支持。我们会在示例中融入一些游戏功能，因此可能需要一些硬件加速能力和图形工具包。让我们将这些需求转化为苹果的术语，并逐步了解如何检测这些不同的硬件组件。\n\
    \n**注意：** 在查看 iOS 设备的不同硬件组件时，我会贴出一些小代码片段。在本章中，这些代码将脱离示例项目的上下文。不过，如果你想跟着操作，本章的所有代码都存放在以下\
    \ GitHub 仓库中：\n\n[`https://github.com/kyleroche`](https://github.com/kyleroche)\n\
    \n#### 摄像头支持\n\n自苹果推出 iPhone 3GS 以来，摄像头已经取得了长足的进步。与一些以摄像头为差异化特色的其他硬件型号相比，它仍有不少改进空间，但足以满足我们的需求。\n\
    \n在手机的视频能力上构建增强现实应用有两种方式。首先，你可以主动检查视频捕获中的元素、可识别对象等。或者，你可以将视频捕获作为应用的背景，同时完全忽略其内容。我们在增强现实浏览器中经常看到这种方法，因为持续检查视频捕获涉及繁重的处理。在本书中，我们将逐步介绍这两种方法的示例。\n\
    \n表 2–1 详细介绍了本书将使用的硬件关于摄像头和视频能力的规格。\n\n![Image](img/t0201.jpg)\n\n##### 检测摄像头\n\
    \n我们可以通过使用 `UIImagePickerController` 类以编程方式检测设备上可用的摄像头。有一个名为 `isSourceTypeAvailable:`\
    \ 的方法，我们可以用它来确定设备上是否有我们想要使用的摄像头。代码清单 2–1 展示了如何使用 `isSourceTypeAvailable:` 方法的示例。\n\
    \n**代码清单 2–1.** *检测摄像头，然后检测前置摄像头*\n\n```\nBOOL cameraAvailable = [UIImagePickerController\
    \ isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera];\n    BOOL frontCameraAvailable\
    \ = [UIImagePickerController isSourceTypeAvailable:UIImagePickerControllerCameraDeviceFront];\n\
    \n    if (cameraAvailable) {\n        UIAlertView *alert = [[UIAlertView alloc]\
    \ initWithTitle:@\"Camera\"\n                                                \
    \        message:@\"Camera Available\"\n                                     \
    \                  delegate:self\n                                           \
    \   cancelButtonTitle:@\"OK\"\n                                              otherButtonTitles:nil,\
    \ nil];\n        [alert show];\n        [alert release];\n    } else {\n     \
    \   UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"Camera\"\n    \
    \                                                    message:@\"Camera NOT Available\"\
    \n                                                       delegate:self\n     \
    \                                         cancelButtonTitle:@\"OK\"\n        \
    \                                      otherButtonTitles:nil, nil];\n        [alert\
    \ show];\n        [alert release];\n    }\n\n    if (frontCameraAvailable) {\n\
    \        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"Camera\"\n\
    \                                                        message:@\"Front Camera\
    \ Available\"\n                                                       delegate:self\n\
    \                                              cancelButtonTitle:@\"OK\"\n   \
    \                                           otherButtonTitles:nil, nil];\n   \
    \     [alert show];\n        [alert release];\n    } else {\n        UIAlertView\
    \ *alert = [[UIAlertView alloc] initWithTitle:@\"Camera\"\n                  \
    \                                      message:@\"Front Camera NOT Available\"\
    \n                                                       delegate:self\n     \
    \                                         cancelButtonTitle:@\"OK\"\n        \
    \                                      otherButtonTitles:nil, nil];\n        [alert\
    \ show];\n        [alert release];\n    }\n```\n\n这段代码将通过快速弹出的 `UIAlertView` 来展示结果。实际上，你会从这个示例中得到两个弹窗。你可以在代码清单\
    \ 2–1 的开头几行看到，我们正在检查 `UIImagePickerControllerSourceTypeCamera` 是否存在，以确定摄像头是否可用。接下来，我们使用\
    \ `UIImagePickerControllerCameraDeviceFront` 参数检查前置摄像头是否存在。`isSourceTypeAvailable:`\
    \ 方法返回一个 `BOOL` 值。我们在 `if/else` 语句中使用该值，并为每次检查显示相应的 `UIAlertView`。\n\n那么，既然我们只使用\
    \ iPhone 3GS、iPhone 4 和 iPad 2，为什么还要检查摄像头呢？它们不都有摄像头吗？是的，它们都有摄像头。然而，我们也会在 Xcode\
    \ 中使用模拟器进行编码。与其他一些移动操作系统的 IDE 不同，Xcode 模拟器不支持摄像头。\n\n看看图 2–3。这两张截图均来自运行上述示例代码块的\
    \ iPhone 4 设备。由于代码块中两个 `if/else` 都会执行，所以我们得到了两个 `UIAlertView` 对话框。从对话框中可以看到，两次检查都返回了\
    \ `True`，这意味着摄像头和前置摄像头都可用。\n\n![Image](img/0203.jpg)\n"
- fmt: "## 硬件功能检测\n\n**Figure 2–3.** *We check for the camera (left), and then for\
    \ a front-facing camera (right) on an iPhone 4 gives these results.*\n\n为了证明这些函数确实会检测摄像头的可用性，我在\
    \ iPhone 4.3 Simulator from Xcode 上运行了相同的代码。结果弹出的对话框相反，如 [Figure 2–4](#Chapter02.html#fig_2_4)\
    \ 所示。\n\n我们本可以使用其他选项来检测摄像头。从技术上讲，我们的第一次检测是检查是否有任何摄像头可用。我们也可以使用`UIImagePickerControllerCameraDeviceRear`作为源类型参数，专门检测后置摄像头。或者，我们可以检查设备当前闪光灯设置的几个选项。这个选项略有不同。我们要么专门检查我们想要验证的模式，例如`UIImagePickerControllerCameraFlashModeOn`，要么使用`isFlashAvailableForCameraDevice`方法。\n\
    \n关于如何使用摄像头拍摄照片和视频，我们将在 [Chapter 8](#Chapter08.html#ch8) 中详细讨论。\n\n![Image](images/0204.jpg)\n\
    \n**Figure 2–4.** *We check for the camera (left), and then for a front-facing\
    \ camera (right) on the iPhone 4.3 Simulator.*\n\n### 检测定位能力\n\niOS 提供了 `Core\
    \ Location Framework` 用于与设备上的基于位置的服务和硬件进行交互。不幸的是，`Core Location Framework` 没有提供任何检测\
    \ GPS 是否存在的方法。相反，你应该在应用程序本身上强制这些硬件要求（参见本章后面的“强制硬件要求”）。\n\n现在，需要明确的是，你仍然可以检查位置服务是否已启用。尽管每个版本的\
    \ iOS 都提供位置服务，但在某些情况下它们可能对你的应用程序不可用。例如：\n\n*   用户可以在“设置”应用程序中禁用位置服务。\n*   用户可以拒绝特定应用程序的位置服务。\n\
    *   设备可能处于飞行模式，无法为必要的硬件供电。\n\n基于这些原因，在尝试使用任何位置服务之前，你应该始终调用`CLLocationManager`的`locationServicesEnabled`类方法。如果用户故意禁用了这些服务，当你尝试使用位置服务时自动弹出的提示可能不是你的应用程序受欢迎的功能。\n\
    \n有两种方法可用于确定用户的位置：\n\n*   **标准定位服务** 是一种可配置、通用的解决方案，所有版本的 iOS 都支持。\n*   **重大变化位置服务**\
    \ 为具有蜂窝无线电的设备提供低功耗位置服务。此服务仅在 iOS 4.0 及更高版本中可用，可以唤醒已挂起或未运行的应用程序。\n\n我们将在 [Chapter\
    \ 4](#Chapter04.html#ch4) 中详细讨论如何启动和使用定位服务。\n\n#### 数字指南针\n\n我们之前提到，增强现实应用程序也可能从方向航向中受益。实际上，对于任何基于位置的\
