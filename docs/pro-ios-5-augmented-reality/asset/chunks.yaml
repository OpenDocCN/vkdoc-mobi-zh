    ### 总结


    在本章中，我们学习了 iOS 设备上视频摄像头的核心概念及其特性。我们从基础的照片功能开始。我们设置了一个`UIImageViewController`对象来捕捉用户选择的图片。接下来，我们学习了如何将这些图片保存并转换到本地文件系统。最后，我们以附件形式通过电子邮件发送了文件。在此过程中，我们介绍了
    iOS 5 中新增的 Storyboarding 功能。


    接着，我们介绍了视频捕捉功能。这将是本书剩余大部分章节的主要内容。我们学习了如何移除摄像头控件，并使用一个占据全屏布局的视频预览。此外，我们设置了一个视频捕捉会话，以便为标记识别或面部识别等应用分析帧图像。


    在下一章中，我们将介绍 cocos2D，这是一个用于构建游戏的优秀框架。我将向您展示如何使用 cocos2D 以及本章的概念，来为您的第一款增强现实游戏打下基础。


    ## 第 7 章


    ## 使用 cocos2D 实现增强现实


    我们已经讨论了增强现实应用程序的不同用例。除了呈现基于位置的信息之外，游戏应用程序占据了增强现实市场空间的很大一部分。


    在本章中，我将介绍用于 iPhone 的 cocos2D。用于 iPhone 的 cocos2D 是一个用于构建 2D 游戏和图形交互应用程序的框架。它基于
    cocos2D 框架，您可以在 [`www.cocos2d.org`](http://www.cocos2d.org) 了解更多信息。


    ### 概述


    正是开源的 cocos2D 框架为用于 iPhone 的 cocos2D 提供了基础。原始项目是用 Python 编写的。显然，这对 iOS 程序员来说并不那么有用。用于
    iPhone 的 cocos2D 是该框架到 Objective-C 的一个移植版本。


    cocos2D 有几个关键特性，例如易于使用、速度快、灵活性强，并且是开源的。cocos2D 恰好是拥有强大社区支持和广泛采用的开源项目之一。cocos2D
    的最后一个，也是最重要的特性（如果你要发布应用的话）是它已获准在 App Store 上使用。

