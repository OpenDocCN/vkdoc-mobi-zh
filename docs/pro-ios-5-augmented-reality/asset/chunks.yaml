    `...copying template files`

    **`[much more of this type of stuff… then…]`**

    `done!`


    I shortened the output of [Listing 7–2](#Chapter07.html#list_7_2) for simplicity.
    The installer will cycle through the various templates for Xcode 4, then finish
    with templates for Xcode 3, just in case you''re still using both versions.


    #### Creating a Project


    Open Xcode. If you''ve installed the templates correctly, you should see something
    similar to [Figure 7–2](#Chapter07.html#fig_7_2) on your launch screen.


    ![Image](images/0702.jpg)


    **Figure 7–2.** *You''ve successfully installed new cocos2D templates!*


