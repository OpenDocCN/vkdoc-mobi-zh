    `- (void)calibrateUsingOrigin:(CLLocation *)origin {`

    `    double baseDistance = [origin distanceFromLocation:_geoLocation];`

    `    self.distance = sqrt(pow([origin altitude] - [_geoLocation altitude], 2)
