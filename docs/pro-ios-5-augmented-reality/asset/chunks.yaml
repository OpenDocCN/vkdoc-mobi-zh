    You can add a comment to the post or just share it, as shown. After you add it
    to your wall, you will see it on your timeline, as shown in [Figure 11–13](#Chapter11.html#fig_11_13).


    ![Image](images/1113.jpg)


    **Figure 11–13.** *We''ve posted the sharing dialog to our timeline.*


    ### Summary


    Congratulations! That was a very complicated example. We built on some existing
    open source projects, namely ARKit, and extended them into a fully functional
    social AR application. Thanks to the work from Zac, Neil, and Alasdair, we had
    a good starting point for our application setup.


    We extended the setup to handle custom application view and annotations. We changed
    their appearance programmatically and extended them with a `UIButton` to handle
    interactivity.


    After we connected our example to Facebook using the Facebook iOS SDK, we were
    able to use the Graph API to pull our friends list and add coordinates for their
    most recent check-ins.


    We added a button to the AR view on each check-in with a template, so you know
    how to share posts back to the user''s wall.


    This chapter was a lot of fun. I look forward to extending this example on GitHub
    in the future. I hope to see GitHub forks with improvements from all of you as
    well. Adding social context to AR has endless possibilities.


    In [Chapter 12](#Chapter12.html#ch12), we''re going to discuss facial-recognition
    approaches and technologies. We''ll look at three ways of recognizing faces in
    an AR application. Then, in [Chapter 13](#Chapter13.html#ch13), we''ll pick an
    approach and turn it into a full example application.


    ## Chapter  12


    ## Facial-Recognition Techniques


    One of the more impressive demonstrations of augmented reality application programming
    centers around facial recognition. From security applications that can recognize
    a friendly person vs. a known threat, to social applications that scan the crowd
    for your Facebook friends, to retail applications that allow you to try on sunglasses
    or different hairstyles, facial AR is amazing.


    Traditionally, the challenge with facial-recognition programming is the amount
    of resources required by the machine to process the images in real time. This,
    naturally, makes it very difficult to target mobile devices. This is why we see
    most facial-recognition algorithms running through a browser or installable program.


    This has changed with iOS and the newer versions of mobile devices. The iPad 2
    has more than enough processing power to handle the more intensive CPU requirements
    of facial-recognition applications.


    In this chapter, we’re going to discuss some of the newer approaches to facial
    recognition in a mobile iOS environment.


    ### Choices for Facial Recognition


    There are many ways to add facial recognition capabilities to your application.
    We are going to cover three of those. The first approach has been around the longest
    and has the most amount of information available on the subject. This approach
    is called Open Computer Vision, or OpenCV.


    #### OpenCV


    OpenCV was originally authored by Intel and was released around 2006 into the
    open source community. It has gained corporate support from Willow Garden and
    is still in active development at the time of this writing.


    OpenCV’s original code base was C, which allowed for easy portability to most
    platforms. There are ports for everything from C# to Java. And, of course, there’s
    a port for iOS.


    OpenCV is the most complicated and advanced of the topics we’ll cover in this
    chapter. Because of its age and foundation in C, it has the least amount of “developer
    friendliness.” However, the advantage over the other approaches is the extensive
    examples and tutorials available on the web. At the time of this writing, I couldn’t
    find an example of either of the other approaches online.


    #### iOS 5 CIDetector Class


    iOS 5 introduced a new set of classes under the CoreImage framework for facial
    detection. We will use the `CIDetector` and `CIFeature` classes to pinpoint a
    face in the live camera view.


    The `CIDetector` class shipped as part of iOS 5\. This class finds features in
    images using a set of predefined detectors. iOS 5 has a single detector defined
    for facial recognition. Presumably, this class is structured for expansion to
    other common object maps in the future.


    There aren’t many options available when setting up a detector, as we’ll discuss.
    Basically, you can set your type (`CIDetectorTypeFace` is the only type available
    at this time) and you can set your accuracy (high or low).


    I will mention, however, that the speed of using `CIDetector` is significantly
    faster than OpenCV.


    #### Face.com


    Consider this the “third-party API approach.” With the availability of an Internet
    connection increasing so rapidly, we’re able to explore options what were never
    before possible. Platforms such as face.com offer a free REST API for processing
    facial detection in images.


    I’m going to introduce the API and some of the features in this chapter, and we’ll
    take this approach a step further in [Chapter 13](#Chapter13.html#ch13) and build
    a fully functional application.'
