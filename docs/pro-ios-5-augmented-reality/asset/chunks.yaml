  trans: '

    ### 将 Xcode 项目关联到 GitHub


    在浏览器中返回 GitHub。点击左上导航栏中的**仪表盘（Dashboard）**，然后找到**新建仓库（New Repository）**按钮。对于**项目名称（Project
    Name）**，我将使用 `iOS_AR_Ch1_Introduction`。你也可以自由选择自己的名称，或者如果你是有经验的 GitHub 用户，可以从
    `https://github.com/kyleroche` 仓库 `fork` 我的项目。我所选择的选项可参见图 1-6。


    ![Image](img/0106.jpg)


    **图 1-6.** *在 GitHub 上创建新仓库。*


    接下来，记下你的仓库的 SSH 网址。你会在确认页面的标题栏中看到它。其格式类似于 `git@github.com:kyleroche/iOS_AR_Ch1_Introduction.git`。下一步中你需要用到这个地址。


    在你的本地机器上启动 Xcode。在启动时出现的**欢迎使用 Xcode（Welcome to Xcode）**对话框中，左侧应该有一个名为**连接到仓库（Connect
    to a Repository）**的选项。点击此选项，并输入你的 GitHub 仓库的 SSH 网址。我的配置可参见图 1-7。


    ![Image](img/0107.jpg)


    **图 1-7.** *克隆你的 GitHub 仓库以供本地访问。*


    Xcode 会验证你的位置和克隆仓库的能力。等待片刻，直到指示器变为绿色且消息显示**主机可达（Host is reachable）**，然后点击**下一步（Next）**。


    系统会提示你为新建项目命名。为简单起见，我使用与 GitHub 仓库相同的名称 `iOS_AR_Ch1_Introduction`。确保**类型（Type）**设置为**Git**，然后点击**克隆（Clone）**。


    接下来，为你的本地仓库选择一个位置，并点击**下一步（Next）**。


    **注意：** 在撰写本文时，Xcode 4.2 在使用 Git 方面仍存在一些错误。第一个错误应该会在上一步中显现出来。如果你的版本仍有问题，你将收到一个类似图
    1-8 所示的错误。如果遇到这种情况，只需点击**重试（Try Again）**，选择相同的位置，选择**替换（Replace）**，一切就会恢复正常。


    ![Image](img/0108.jpg)


    **图 1-8.** *Xcode 4.2 早期版本中的一个缺陷导致无效错误。只需点击重试即可消除。*


    ### 创建我们的 Xcode 项目


    在 Xcode 的**欢迎使用 Xcode（Welcome to Xcode）**界面中，选择**创建一个新的 Xcode 项目（Create a New
    Xcode Project）**。我们这个项目不会有太多编码工作，因此模板类型并不那么重要。为简单起见，我将选择基于 Windows 的应用程序模板。下一个界面有一些更重要的选项。系统会要求你输入**产品名称（Product
    Name）**。这将作为你完整**捆绑标识符（Bundle Identifier）**的后缀。从这里开始情况会有所不同。除非你参与团队开发，否则此选项将是你的机器独有的。同样，为了简单起见，我将使用与我的
    GitHub 仓库相同的名称。我的选项显示在图 1-9 中。


    ![Image](img/0109.jpg)


    **图 1-9.** *选择你的新项目选项。*


    你的**公司标识符（Company Identifier）**也会不同。在我们讨论通过 App Store 或企业分发选项分发应用程序之前，**公司标识符**可以使用反向
    DNS 格式。填写完所有内容后，点击**下一步（Next）**。


    最后，系统会提示你为该项目选择一个本地位置。确保你选择的是与克隆 GitHub 仓库相同的目录。另外，确保**为此项目创建本地 git 仓库（Create
    local git repository for this project）**选项*没有*被选中，如图 1-10 所示。


    ![Image](img/0110.jpg)


    **图 1-10.** *不要创建本地 Git 仓库。*


    太好了！我们刚刚创建了第一个项目。只剩下几步，我们就能开始在 GitHub 上更新代码了。以下步骤可能可以按不同顺序完成。我遵循这条路径是因为我觉得它更容易。随着
    Xcode 4.2 的成熟，我相信我们会看到基于 GUI 的功能有所改进。


    ### 将项目连接到远程仓库


    网上有很多关于集成 Xcode 和 GitHub 的教程。要开始连接你的项目并了解最新功能与变更，请访问 [`http://help.github.com/mac-set-up-git/`](http://help.github.com/mac-set-up-git/)。


    ### 接下来是什么？


    以下是本书一些关键章节的快速预览。


    #### 定位服务


    大多数 AR 用例（至少早期的用例）都包含与用户位置相关的元素。无论是通过 AR 视图显示附近的餐厅，还是寻找朋友对夜生活的推荐，基于位置的 AR 都引领了这一潮流。在第
    3 章中，我们将通过可在我们自己 AR 应用中使用的真实示例，学习 iOS 的地图和地理定位功能。


    #### 传感器编程


    创建 AR 应用需要大量与 iPhone 或 iPad 原生传感器的集成。传感器包括加速度计、数字罗盘和陀螺仪。在第 4 章中，我将通过小型项目向你介绍传感器开发，这些项目演示了我们将要在
    AR 应用中复用的关键功能。


    #### 灯光，摄像机，开拍……


    在第 5 章中，我会介绍声音和用户反馈。声音在 AR 应用中并非最突出的功能，但它能带来更好的用户体验。之后，在第 6 章中，我们将深入探讨摄像头和视频编程。由于
    AR 应用都是叠加在摄像头视图之上的，因此在我们开始构建本书结尾处的大型 AR 项目之前，本章是必不可少的基础章节。


    #### 游戏框架


    我选择使用 Cocos2D 来演示 AR 游戏功能。在第 7 章中，你将了解 Cocos2D 的基础知识，然后我们将在第 8 章中跟进一个实际应用。


    #### 第三方框架


    在第 9 章中，我会介绍几个能让基于标记的增强现实应用开发变得更简单的第三方框架。接下来我们将通过一个实际例子进行说明，然后转向更复杂的框架，例如 OpenCV（开源计算机视觉库），这是一个用于面部或复杂物体识别的开源库。在设备上进行面部识别存在一些限制。这些限制主要与硬件能力有关。我们将讨论利用公开
    API 来补充面部识别的一些更具创意的方法。


    ### 总结


    我希望你能从本书中学到很多。AR 在移动应用中是一个非常新的概念，拥有无限的可能性。开发者社区才刚刚开始探索这些可能性的表面。我希望这本书能为你开启进入 AR
    世界的旅程提供一个良好的开端。


    让我们从回顾一些应用布局选项和构建自己 AR 应用的框架开始吧。在下一章中，我们将讨论本书中会使用的硬件以及不同型号的主要功能。


    ## 第 2 章


    ## 硬件对比


    每位移动开发者都会担心硬件兼容性问题。然而，为苹果 iOS 系列产品进行开发的主要好处在于硬件之间的标准化。诚然，设备存在不同的迭代版本，但厂商只有一家：苹果！对于其他移动操作系统，你还必须担心
    OEM 厂商及其无限制的硬件配置变化。让我们来深入了解一下最新 iOS 设备的内部构造。

