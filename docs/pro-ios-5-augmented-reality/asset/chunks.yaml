    Just below the code we added from [Listing 7–7](#Chapter07.html#list_7_7), we
    are going to add the code to create the `UIImagePicker` and display it in camera
    mode. Some of this will be familiar from [Chapter 6](#Chapter06.html#ch6). Add
    the code from [Listing 7–8](#Chapter07.html#list_7_8), just below the code from
    [Listing 7–7](#Chapter07.html#list_7_7).


    **Listing 7–8.** *Create the UIImagePicker and Add to the Screen*


    `UIImagePickerController *imagePicker;`


    `@try {`

    `        imagePicker = [[[UIImagePickerController alloc] init] autorelease];`

    `        imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;`

    `        imagePicker.showsCameraControls = NO;`

    `        imagePicker.toolbarHidden = YES;`

    `        imagePicker.navigationBarHidden = YES;`

    `        imagePicker.wantsFullScreenLayout = YES;`

    `}`

    `@catch (NSException * e) {`

    `        [imagePicker release];`

    `        imagePicker = nil;`

    `}`

    `@finally {`

    `        if(imagePicker) {`

    `            [cameraView addSubview:[imagePicker view]];`

    `            [cameraView release];`

    `        }`

    `}`


    `[window bringSubviewToFront:viewController.view];`


    Let''s walk through this a bit, before we run the project. First, we create our
    `UIImagePicker`, set it up, and make sure the source type is set to camera so
    we can see the live video content. We hide the controls, the toolbar, and the
    navigation bar so that we get a full view of the camera.


    There is one last thing to do. Switch to `HelloWorldLayer.m` and change the label''s
    text and size, as shown in [Listing 7–9](#Chapter07.html#list_7_9).


    **Listing 7–9.** *Change the Label''s Text*


    `// create and initialize a Label`

    `CCLabelTTF *label = [CCLabelTTF labelWithString:@"Hello` **`Augmented`** `World"
    fontName:@"Marker Felt" fontSize:`**`48`**`];`


    Like our examples in [Chapter 6](#Chapter06.html#ch6), we''ll have to run this
    on a real device because the simulator doesn''t support the camera classes. Launch
    the project on your device. You will notice something is a bit off. Check out
    [Figure 7–4](#Chapter07.html#fig_7_4) to see what I mean.


    ![Image](images/0704.jpg)


    **Figure 7–4.** *Here is the camera view, but with a bit missing.*


    The camera didn''t cover the whole screen! There''s a black bar on the edge that
    seems leftover from our template application. Wait, we set `wantsFullScreenLayout`
    to `YES`. What happened?


    #### Scaling the Camera View


    So, why do we have this strange black bar occupying part of our UI? It has to
    do with the difference in aspect ratio between the screen and the camera (in landscape
    mode). Basically, the iPhone screen now has an aspect ratio of 3:4, and the iPhone
    camera has an aspect ratio of 4:3. So, we need to scale the camera image to match.
    This explains the black bar from [Figure 7–4](#Chapter07.html#fig_7_4).


    To fix this, we need to scale our `UIImagePicker` to match the aspect ratio of
    the device. Return to `AppDelegate.m` in Xcode. Find the section of code you added
    from [Listing 7–8](#Chapter07.html#list_7_8), and add to it the bold lines from
    [Listing 7–10](#Chapter07.html#list_7_10).


    **Listing 7–10.** *Scale the UIImagePickerController*


    `@try {`

    `        imagePicker = [[[UIImagePickerController alloc] init] autorelease];`

    `        imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;`

    `        imagePicker.showsCameraControls = NO;`

    `        imagePicker.toolbarHidden = YES;`

    `        imagePicker.navigationBarHidden = YES;`

    `        imagePicker.wantsFullScreenLayout = YES;`

    **`        imagePicker.cameraViewTransform = CGAffineTransformScale(imagePicker.cameraViewTransform,
    1.0, 1.3);`**

    `}`


    Run the project again. You should see that we''ve successfully removed the black
    bar and the camera is now occupying the full screen, as shown in [Figure 7–5](#Chapter07.html#fig_7_5).


    ![Image](images/0705.jpg)


    **Figure 7–5.** *No more black bar!*


    ### cocos2D Concepts


    Let''s add a bit of flare to our app. At the moment, it doesn''t respond to touches
    or do anything interesting. First, let''s understand how a cocos2D application
    is set up.'
  trans: "\n#### 调整默认视图\n\n在 Xcode 中打开 `AppDelegate.h`。如代码清单 7-3 所示，向接口中添加一个 `UIView`。\n\
    \n**代码清单 7-3.** *为相机叠加视图添加一个 UIView*\n\n```\nUIView  *cameraView;\n```\n\n切换到\
    \ `AppDelegate.m`，我们开始工作。首先，必须将缓冲区切换为 32 位缓冲区。这在 cocos2D 模板中应是一个被注释掉的值，因为这是开发者常见的修改操作。找到类似代码清单\
    \ 7-4 所示的那一行代码。\n\n**代码清单 7-4.** *更改 EAGLView 的像素格式（pixelFormat）*\n\n```\n//\n\
    // 手动创建 EAGLView\n//  1. 创建 RGB565 格式。备用选项：RGBA8\n//  2. 深度格式为 0 位。对于 3D 效果（如\
    \ CCPageTurnTransition）请使用 16 位或 24 位\n//\nEAGLView *glView = [EAGLView viewWithFrame:[window\
    \ bounds]\n                               pixelFormat:kEAGLColorFormatRGB565 \
    \       // kEAGLColorFormatRGBA8\n                               depthFormat:0];\n\
    ```\n\n可以看到注释解释了部分内容。由于相机视图不能使用 RGB565 这种 16 位格式，请将 `pixelFormat` 的值替换为注释中的那个值。修改后，你的代码块现在应如代码清单\
    \ 7-5 所示。我们将 `depthFormat` 保留为 0，因为我们目前还不涉及 3D 处理。\n\n**代码清单 7-5.** *更改 pixelFormat*\n\
    \n```\nEAGLView *glView = [EAGLView viewWithFrame:[window bounds]\n          \
    \                     pixelFormat:kEAGLColorFormatRGBA8 depthFormat:0];\n```\n\
    \n接下来，我们将在屏幕中添加新声明的 `UIView`，用来取代默认的单调黑色背景。找到如代码清单 7-6 所示的代码段。\n\n**代码清单 7-6.**\
    \ *主视图接收一个子视图*\n\n```\n// 使视图控制器成为主窗口的子视图\n[window addSubview: viewController.view];\n\
    ```\n\n在这行代码下方，添加代码清单 7-7 中的代码。接下来我会逐行为你解释。\n\n**代码清单 7-7.** *为相机准备叠加视图*\n\n```\n\
    [CCDirector sharedDirector].openGLView.backgroundColor = [UIColor clearColor];\n\
    [CCDirector sharedDirector].openGLView.opaque = NO;\n\nglClearColor(0.0, 0.0,\
    \ 0.0, 0.0);\n\ncameraView = [[UIView alloc] initWithFrame:[[UIScreen mainScreen]\
    \ bounds]];\ncameraView.opaque = NO;\ncameraView.backgroundColor=[UIColor clearColor];\n\
    [window addSubview:cameraView];\n```\n\n首先，我们将 OpenGL 视图的背景色设置为 `clearColor`。这可以启用透明效果，以便我们仍然可以在相机视图之上向屏幕绘制对象和文本。接着，我们确保此图层不透明（出于同样的目的）。我们使用\
    \ `glClearColor` 方法来确保我们定义的“清除”确实是透明的。你可以对此稍作调整，以形成一个朦胧的半透明图层，而不是我们本章正在构建的完全不可见图层。第二部分看起来类似。我们获取新的\
    \ `UIView`，将其拉伸至屏幕边界，并使其也变得透明。最后，我们将新的 `UIView` 添加到窗口中。\n\n如果现在再次运行项目，你不会看到明显变化。我们尚未添加任何有影响的内容。让我们继续。\n\
    \n#### 添加相机视图\n\n就在我们从代码清单 7-7 添加的代码下方，我们将添加用于创建 `UIImagePicker` 并以相机模式显示的代码。其中部分内容在第\
    \ 6 章中已经熟悉。请在代码清单 7-7 的代码下方，添加代码清单 7-8 中的代码。\n\n**代码清单 7-8.** *创建 UIImagePicker\
    \ 并添加到屏幕*\n\n```\nUIImagePickerController *imagePicker;\n\n@try {\n        imagePicker\
    \ = [[[UIImagePickerController alloc] init] autorelease];\n        imagePicker.sourceType\
    \ = UIImagePickerControllerSourceTypeCamera;\n        imagePicker.showsCameraControls\
    \ = NO;\n        imagePicker.toolbarHidden = YES;\n        imagePicker.navigationBarHidden\
    \ = YES;\n        imagePicker.wantsFullScreenLayout = YES;\n}\n@catch (NSException\
    \ * e) {\n        [imagePicker release];\n        imagePicker = nil;\n}\n@finally\
    \ {\n        if(imagePicker) {\n            [cameraView addSubview:[imagePicker\
    \ view]];\n            [cameraView release];\n        }\n}\n\n[window bringSubviewToFront:viewController.view];\n\
    ```\n\n在运行项目之前，我们先来了解一下这段代码。首先，我们创建 `UIImagePicker`，进行设置，并确保源类型设置为相机，这样我们就能看到实时视频内容。我们隐藏了控件、工具栏和导航栏，以便获得相机的全屏视图。\n\
    \n还剩最后一件事。切换到 `HelloWorldLayer.m`，并按代码清单 7-9 所示更改标签的文本和字号。\n\n**代码清单 7-9.** *更改标签文本*\n\
    \n```\n// 创建并初始化一个标签\nCCLabelTTF *label = [CCLabelTTF labelWithString:@\"Hello\
    \ Augmented World\" fontName:@\"Marker Felt\" fontSize:48];\n```\n\n和第 6 章中的示例一样，我们必须在真实设备上运行，因为模拟器不支持相机类。在设备上启动项目。你会注意到有些不对劲。查看图\
    \ 7-4 了解我的意思。\n\n![图片](img/0704.jpg)\n\n**图 7-4.** *这是相机视图，但缺少了一部分。*\n\n相机没有覆盖整个屏幕！边缘有一条黑色条，似乎是模板应用程序遗留下来的。等等，我们已经将\
    \ `wantsFullScreenLayout` 设置为 `YES`。发生了什么？\n\n#### 缩放相机视图\n\n那么，为什么我们的界面中会出现这条奇怪的黑色条呢？这与屏幕和相机（横屏模式下）之间宽高比的差异有关。基本上，iPhone\
    \ 屏幕的宽高比为 3:4，而 iPhone 相机的宽高比为 4:3。因此，我们需要缩放相机图像以匹配。这解释了图 7-4 中的黑色条。\n\n要解决这个问题，我们需要缩放\
    \ `UIImagePicker` 以匹配设备的宽高比。回到 Xcode 中的 `AppDelegate.m`。找到你从代码清单 7-8 添加的代码段，并在其中添加代码清单\
    \ 7-10 中的加粗行。\n\n**代码清单 7-10.** *缩放 UIImagePickerController*\n\n```\n@try {\n\
    \        imagePicker = [[[UIImagePickerController alloc] init] autorelease];\n\
    \        imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;\n \
    \       imagePicker.showsCameraControls = NO;\n        imagePicker.toolbarHidden\
    \ = YES;\n        imagePicker.navigationBarHidden = YES;\n        imagePicker.wantsFullScreenLayout\
    \ = YES;\n        imagePicker.cameraViewTransform = CGAffineTransformScale(imagePicker.cameraViewTransform,\
    \ 1.0, 1.3);\n}\n```\n\n再次运行项目。你应该会看到我们已经成功移除了黑色条，且相机现在已占据全屏，如图 7-5 所示。\n\n![图片](img/0705.jpg)\n\
    \n**图 7-5.** *黑色条消失了！*\n\n### cocos2D 概念\n\n让我们为应用程序增添一点活力。目前，它无法响应触摸或执行任何有趣的操作。首先，让我们了解\
    \ cocos2D 应用程序是如何设置的。\n"
- fmt: "#### Scenes\n\nA scene is the foundation of a cocos2D view. Your app can have\
    \ many scenes, but only one of them can be active at any given time. In our sample\
    \ application, we added the camera view underneath the `HelloWorldLayer` scene.\n\
    \nScenes are implementations of the `CCScene` object in cocos2D. They are independent\
    \ pieces of the app's overall workflow. In typical games, there are scenes for\
    \ the menus, the different levels, and the cutscenes for video content in between\
    \ levels or after you've won or lost a level. Each of these `CCScene` objects\
    \ comprises one or more layers. In our sample application, we have the clear layer\
    \ with the label, and the clear layer with the `UIImagePickerController`.\n\n\
    You can use scenes for transitioning between scenes as well. These types of scenes\
    \ are implementations of the `CCTransitionScene` object.\n\n#### Director\n\n\
    Not surprisingly, the director handles the selection of which scene is currently\
    \ active. The director is an instance of the `CCDirector` singleton object. It\
    \ maintains, in memory, details of which scene is active and handles a stack of\
    \ scenes to allow pushing of new scenes, pausing current scenes, and returning\
    \ to original scenes. The `CCDirector` singleton is the one who will actually\
    \ change the `CCScene`. This singleton also initializes the OpenGL ES environment.\
    \ The code in [Listing 7–11](#Chapter07.html#list_7_11), from `AppDelegate.m`,\
    \ initializes the director from the singleton, or shared, class.\n\n**Listing\
    \ 7–11.** *Create Instance of Director Singleton*\n\n`CCDirector *director = [CCDirector\
    \ sharedDirector];`\n\n#### Layers\n\nA `CCLayer` has the size of the whole drawable\
    \ area. It can be semitransparent (providing holes to underlying layer(s)) or\
    \ fully transparent (as we have done in our application already). Layers define\
    \ the appearance and behavior of a scene.\n\nThe `CCLayer` also defines your event\
    \ handlers. When an event is propagated, it starts from the front-most layer and\
    \ raises the event until some layer catches the event and accepts it. So, the\
    \ farther back a layer is in the stack, the more layers have the opportunity to\
    \ intercept and handle the event.\n\ncocos2D defines a series of predefined layers\
    \ that we can use in our games. It's rare to have to create your own extension\
    \ or custom `CCLayer` class.\n\n### Adding Effects\n\ncocos2D has tons of built-in\
    \ effects and transitions we can leverage in our games. For our augmented-reality\
    \ examples, we're going to use touch events to handle interaction from the user\
    \ before we present any visual effects. So, we first need to learn how to handle\
    \ touch events.\n\n#### Handling Touch Events\n\nThere is another singleton object,\
    \ `CCTouchDispatcher`, which sends notifications of touch events on the screen.\
    \ To be able to handle touch events in our applications, we must enable touches,\
    \ register the `CCTouchDispatcher`, and then handle the touch events themselves.\n\
    \nIn the overview, I briefly noted that events are handled at each individual\
    \ layer. They start at the front-most layer and escalate to the back-most layer\
    \ until a layer accepts and handles the event.\n\nSo far, we've built our sample\
    \ a bit different than a normal 2D game. We have an underlying layer (the camera\
    \ view) that is always on the bottom of the stack. We used a simple layer (the\
    \ label view's layer) to drive the content on the screen. In typical 2D games,\
    \ you build on static graphic layers or tile-based maps. Using the live camera\
    \ view for our foundation is what makes this an augmented-reality game. We will\
    \ add more advanced augmented-reality concepts in the example application we will\
    \ build in [Chapter 8](#Chapter08.html#ch8). Having said this, and understanding\
    \ how touch events escalate, it makes the most sense to handle the events at our\
    \ `HelloWorldLayer` layer.\n\nOpen `HelloWorldLayer.m` in Xcode and find the `init`\
    \ method. At the bottom of the `if` loop, add the statement from [Listing 7–12](#Chapter07.html#list_7_12).\n\
    \n**Listing 7–12.** *Enable Touches*\n\n`self.isTouchEnabled = YES;`\n\nNext,\
    \ we have to register with the `CCTouchDispatcher` as a layer that is accepting\
    \ these types of events. Just after the `init` method closes, add the code from\
    \ [Listing 7–13](#Chapter07.html#list_7_13).\n\n**Listing 7–13.** *Register with\
    \ CCTouchDispatcher*\n\n```\n- (void)registerWithTouchDispatcher {\n    [[CCTouchDispatcher\
    \ sharedDispatcher] addTargetedDelegate:self priority:0 swallowsTouches:YES];\n\
    }\n```\n\nWe've set the delegate to self and swallowed the touch so that no other\
    \ layers will respond until we've decided whether this layer can handle and accept\
    \ the event. To accept the event, use the `ccTouchBegan` method. Just after the\
    \ `registerWithTouchDispatcher` method, add the code from [Listing 7–14](#Chapter07.html#list_7_14).\n\
    \n**Listing 7–14.** *Accept and Handle the Event*\n\n```\n- (BOOL)ccTouchBegan:(UITouch\
    \ *)touch withEvent:(UIEvent *)event {\n    return YES;\n}\n\n- (void)ccTouchEnded:(UITouch\
    \ *)touch withEvent:(UIEvent *)event {\n    CGPoint location = [self convertTouchToNodeSpace:touch];\n\
    \    NSLog(@\"Touch %@: \", NSStringFromCGPoint(location));\n}\n```\n\nThe first\
    \ method returns a `YES` to the dispatcher to let it know that it will accept\
    \ the event, and that the dispatcher need not look further for a response. The\
    \ second event reacts to the touch by logging the location of the touch on the\
    \ screen. We use the `NSStringFromCGPoint` method to correctly cast the C struct\
    \ to a string.\n\nRun the application again on your device. Touch the screen in\
    \ a few random places. In your debugger window, you should see output similar\
    \ to that shown in [Figure 7–6](#Chapter07.html#fig_7_6).\n\n![Image](images/0706.jpg)\n\
    \n**Figure 7–6.** *We are now able to log the touch events.*\n\nWe can later use\
    \ this `CGPoint` to do something a bit more exciting. Let's talk about effects\
    \ briefly, then add one to our scene."
  raw: '#### Scenes


    A scene is the foundation of a cocos2D view. Your app can have many scenes, but
    only one of them can be active at any given time. In our sample application, we
    added the camera view underneath the `HelloWorldLayer` scene.


    Scenes are implementations of the `CCScene` object in cocos2D. They are independent
    pieces of the app''s overall workflow. In typical games, there are scenes for
    the menus, the different levels, and the cutscenes for video content in between
    levels or after you''ve won or lost a level. Each of these `CCScene` objects comprises
    one or more layers. In our sample application, we have the clear layer with the
    label, and the clear layer with the `UIImagePickerController`.


    You can use scenes for transitioning between scenes as well. These types of scenes
    are implementations of the `CCTransitionScene` object.


    #### Director


    Not surprisingly, the director handles the selection of which scene is currently
    active. The director is an instance of the `CCDirector` singleton object. It maintains,
    in memory, details of which scene is active and handles a stack of scenes to allow
    pushing of new scenes, pausing current scenes, and returning to original scenes.
    The `CCDirectory` singleton is the one who will actually change the `CCScene`.
    This singleton also initializes the OpenGL ES environment. The code in [Listing
    7–11](#Chapter07.html#list_7_11), from `AppDelegate.m`, initializes the director
    from the singleton, or shared, class.


    **Listing 7–11.** *Create Instance of Director Singleton*


    `CCDirector *director = [CCDirector sharedDirector];`


    #### Layers


    A `CCLayer` has the size of the whole drawable area. It can be semitransparent
    (providing holes to underlying layer(s)) or fully transparent (as we have done
    in our application already). Layers define the appearance and behavior of a scene.


    The `CCLayer` also defines your event handlers. When an event is propagated, it
    starts from the front-most layer and raises the event until some layer catches
    the event and accepts it. So, the farther back a layer is in the stack, the more
    layers have the opportunity to intercept and handle the event.


    cocos2D defines a series of predefined layers that we can use in our games. It''s
    rare to have to create your own extension or custom `CCLayer` class.


    ### Adding Effects


    cocos2D has tons of built-in effects and transitions we can leverage in our games.
    For our augmented-reality examples, we''re going to use touch events to handle
    interaction from the user before we present any visual effects. So, we first need
    to learn how to handle touch events.


    #### Handling Touch Events


    There is another singleton object, `CCTouchDispatcher`, which sends notifications
    of touch events on the screen. To be able to handle touch events in our applications,
    we must enable touches, register the `CCTouchDispatcher`, and then handle the
    touch events themselves.


    In the overview, I briefly noted that events are handled at each individual layer.
    They start at the front-most layer and escalate to the back-most layer until a
    layer accepts and handles the event.


    So far, we''ve built our sample a bit different than a normal 2D game. We have
    an underlying layer (the camera view) that is always on the bottom of the stack.
    We used a simple layer (the label view''s layer) to drive the content on the screen.
    In typical 2D games, you build on static graphic layers or tile-based maps. Using
    the live camera view for our foundation is what makes this an augmented-reality
    game. We will add more advanced augmented-reality concepts in the example application
    we will build in [Chapter 8](#Chapter08.html#ch8). Having said this, and understanding
    how touch events escalate, it makes the most sense to handle the events at our
    `HelloWorldLayer` layer.


    Open `HelloWorldLayer.m` in Xcode and find the `init` method. At the bottom of
    the `if` loop, add the statement from [Listing 7–12](#Chapter07.html#list_7_12).


    **Listing 7–12.** *Enable Touches*


    `self.isTouchEnabled = YES;`


    Next, we have to register with the `CCTouchDispatcher` as a layer that is accepting
    these types of events. Just after the `init` method closes, add the code from
    [Listing 7–13](#Chapter07.html#list_7_13).


    **Listing 7–13.** *Register with CCTouchDispatcher*


    `- (void)registerWithTouchDispatcher {`

    `    [[CCTouchDispatcher sharedDispatcher] addTargetedDelegate:self priority:0
    swallowsTouches:YES];`

    `}`


    We''ve set the delegate to self and swallowed the touch so that no other layers
    will respond until we''ve decided whether this layer can handle and accept the
    event. To accept the event, use the `ccTouchBegan` method. Just after the `registerWithTouchDispatcher`
    method, add the code from [Listing 7–14](#Chapter07.html#list_7_14).


    **Listing 7–14.** *Accept and Handle the Event*


    `- (BOOL)ccTouchBegan:(UITouch *)touch withEvent:(UIEvent *)event {`

    `    return YES;`

    `}`


    `- (void)ccTouchEnded:(UITouch *)touch withEvent:(UIEvent *)event {`

    `    CGPoint location = [self convertTouchToNodeSpace:touch];`

    `    NSLog(@"Touch %@: ", NSStringFromCGPoint(location));`

    `}`


    The first method returns a YES to the dispatcher to let it know that it will accept
    the event, and that the dispatcher need not look further for a response. The second
    event reacts to the touch by logging the location of the touch on the screen.
    We use the `NSStringFromCGPoint` method to correctly cast the C struct to a string.


    Run the application again on your device. Touch the screen in a few random places.
    In your debugger window, you should see output similar to that shown in [Figure
    7–6](#Chapter07.html#fig_7_6).


    ![Image](images/0706.jpg)


    **Figure 7–6.** *We are now able to log the touch events.*


    We can later use this `CGPoint` to do something a bit more exciting. Let''s talk
    about effects briefly, then add one to our scene.'
  trans: "\n#### 场景\n\n场景是 cocos2D 视图的基础。你的应用可以包含多个场景，但在任何给定时刻，只有一个场景处于活跃状态。在我们的示例应用中，我们将摄像头视图添加到了\
    \ `HelloWorldLayer` 场景的下方。\n\n场景是 cocos2D 中 `CCScene` 对象的实现。它们是应用整体工作流程中相互独立的组成部分。在典型的游戏中，场景用于菜单、不同关卡，以及关卡之间或玩家通关/失败后播放的视频过场动画。每个\
    \ `CCScene` 对象都包含一个或多个图层。在我们的示例应用中，有一个带标签的透明图层，以及一个包含 `UIImagePickerController`\
    \ 的透明图层。\n\n你也可以使用场景进行场景之间的过渡。这类场景是 `CCTransitionScene` 对象的实现。\n\n#### 导演\n\n\
    不出所料，导演负责处理当前哪个场景处于活跃状态的选择。导演是 `CCDirector` 单例对象的一个实例。它在内存中维护着当前活跃场景的详细信息，并处理一个场景栈，以便推入新场景、暂停当前场景以及返回原始场景。`CCDirector`\
    \ 单例会实际切换 `CCScene`。该单例还会初始化 OpenGL ES 环境。来自 `AppDelegate.m` 的代码清单 7–11 中的代码，会从单例（即共享）类中初始化导演。\n\
    \n**代码清单 7–11.** *创建导演单例实例*\n\n`CCDirector *director = [CCDirector sharedDirector];`\n\
    \n#### 图层\n\n`CCLayer` 的大小与整个可绘制区域相同。它可以是半透明的（为下方的图层提供空洞），也可以是完全透明的（正如我们在应用中已经做的那样）。图层定义了场景的外观和行为。\n\
    \n`CCLayer` 还定义了事件处理程序。当事件被传播时，它会从前端的图层开始向上传递，直到某个图层捕获并接受该事件。因此，图层在栈中的位置越靠后，就会有越多的图层有机会拦截并处理该事件。\n\
    \ncocos2D 定义了一系列预置的图层，我们可以在游戏中使用。通常很少需要自己创建自定义的 `CCLayer` 扩展或类。\n\n### 添加特效\n\n\
    cocos2D 拥有大量内建的特效和过渡效果，我们可以在游戏中加以利用。对于我们的增强现实示例，在展示任何视觉效果之前，我们将使用触摸事件来处理用户的交互。因此，我们首先需要学习如何处理触摸事件。\n\
    \n#### 处理触摸事件\n\n还有另一个单例对象 `CCTouchDispatcher`，它会发送屏幕上触摸事件的通知。为了在应用中处理触摸事件，我们必须启用触摸、注册\
    \ `CCTouchDispatcher`，然后处理触摸事件本身。\n\n在之前的概述中，我简要提到事件在每个单独的图层上处理。它们从前端的图层开始，向后端的图层逐级传递，直到某个图层接受并处理该事件。\n\
    \n到目前为止，我们的示例构建方式与普通 2D 游戏略有不同。我们有一个底层图层（摄像头视图），它始终位于栈的底部。我们使用了一个简单图层（标签视图的图层）来驱动屏幕上的内容。在典型的\
    \ 2D 游戏中，你会在静态图形图层或基于瓦片的地图上构建。而将实时摄像头视图作为基础，正是使这款游戏成为增强现实游戏的原因。我们将在第 8 章构建的示例应用中添加更高级的增强现实概念。话虽如此，理解了触摸事件是如何逐级传递的，那么在\
    \ `HelloWorldLayer` 图层处处理事件就显得最为合理。\n\n在 Xcode 中打开 `HelloWorldLayer.m`，找到 `init`\
    \ 方法。在 `if` 循环的底部，添加来自代码清单 7–12 的语句。\n\n**代码清单 7–12.** *启用触摸*\n\n`self.isTouchEnabled\
    \ = YES;`\n\n接下来，我们必须向 `CCTouchDispatcher` 注册为一个接受此类事件的图层。在 `init` 方法结束之后，添加来自代码清单\
    \ 7–13 的代码。\n\n**代码清单 7–13.** *注册 CCTouchDispatcher*\n\n```\n- (void)registerWithTouchDispatcher\
    \ {\n    [[CCTouchDispatcher sharedDispatcher] addTargetedDelegate:self priority:0\
    \ swallowsTouches:YES];\n}\n```\n\n我们将代理设置为 self，并启用了“吞并触摸”，这样在我们决定该图层能否处理并接受事件之前，其他图层不会做出响应。要接受事件，请使用\
    \ `ccTouchBegan` 方法。在 `registerWithTouchDispatcher` 方法之后，添加来自代码清单 7–14 的代码。\n\n\
    **代码清单 7–14.** *接受并处理事件*\n\n```\n- (BOOL)ccTouchBegan:(UITouch *)touch withEvent:(UIEvent\
    \ *)event {\n    return YES;\n}\n\n- (void)ccTouchEnded:(UITouch *)touch withEvent:(UIEvent\
    \ *)event {\n    CGPoint location = [self convertTouchToNodeSpace:touch];\n  \
    \  NSLog(@\"触摸位置 %@: \", NSStringFromCGPoint(location));\n}\n```\n\n第一个方法向分发器返回\
    \ `YES`，告知它自己将接受该事件，并且分发器无需再继续查找响应。第二个方法通过记录触摸点在屏幕上的位置来响应触摸事件。我们使用 `NSStringFromCGPoint`\
    \ 方法将 C 结构体正确转换为字符串。\n\n在设备上再次运行应用程序。在屏幕上随机触摸几个位置。在你的调试器窗口中，应该会看到类似于图 7–6 所示的输出。\n\
    \n![图像](img/0706.jpg)\n\n**图 7–6.** *我们现在能够记录触摸事件了。*\n\n稍后，我们可以利用这个 `CGPoint`\
    \ 来做一些更令人兴奋的事情。让我们简要讨论一下特效，然后为我们的场景添加一个特效。\n"
- fmt: '#### Visual Effects


    cocos2D provides all kinds of graphical effects we can use in our applications,
    right out of the box. For example, the following list contains the types of particle
    emitters that are available in the cocos2D distribution:


    *   `CCParticleFire`

    *   `CCParticleFireworks`

    *   `CCParticleSun`

    *   `CCParticleGalaxy`

    *   `CCParticleFlower`

    *   `CCParticleMeteor`

    *   `CCParticleSpiral`

    *   `CCParticleSmoke`

    *   `CCParticleExplosion`

    *   `CCParticleSnow`

    *   `CCParticleRain`


    There are methods of designing your own particle systems. There is a tool called
    Particle Designer (available at [`http://particledesigner.71squared.com/`](http://particledesigner.71squared.com/))
    that lets you create your own visual effects, and provides access to a shared
    library of community created effects. The tool, at the time of this writing, was
    under $10.


    Graphical effects is not the focus of this book, so if you need more information,
    reference any of the cocos2D titles from Apress ([`www.apress.com`](http://www.apress.com)).


    Back to our project. Open `HelloWorldLayer.m` in Xcode. Because we are already
    handling the touch events (by logging them in our console), it makes sense to
    extend this functionality with some particle effects. The goal here is to make
    the user''s touch start an explosion, or something similar, on the screen.


    Find the `ccTouchEnded` method. After you set the location variable, add the code
    from [Listing 7–15](#Chapter07.html#list_7_15).


    **Listing 7–15.** *Add a CCParticleSystem*


    ```

    CCParticleSystem* emitter = [CCParticleExplosion node];

    emitter.position = ccp(location.x, location.y);

    emitter.life = 3.0f;

    emitter.duration = 2.7f;

    emitter.lifeVar = 0.1f;

    emitter.totalParticles = 200;

    [self addChild:emitter z:20];

    ```


    Quickly glance back to the beginning of this section where I named the provided
    particle systems available in cocos2D. In line one of this code block, you''ll
    notice we used the `CCParticleExplosion` class. As you''re experimenting with
    this section, feel free to change that to any of the other types I''ve listed
    in this section.


    After we declare our `CCParticleSystem`, we set the position to the x, y coordinates
    of the touch event, define the life and duration of the particle system, and set
    its total number of particles. Again, these are all great values to play around
    with and learn.


    Finally, we add the `CCParticleSystem` to our layer. If you run the project and
    tap the screen, you will see something similar to what we see in [Figure 7–7](#Chapter07.html#fig_7_7).


    ![Image](images/0707.jpg)


    **Figure 7–7.** *Tap to create touch explosions!*


    #### Adding Sound Effects


    Explosions just aren''t the same without sound. Don''t you agree? Let''s make
    some noise. Back in [Chapter 5](#Chapter05.html#ch5), we talked about adding sound
    to iOS applications. I introduced a few web sites where you can download free
    sound effects. I downloaded an MP3 and then converted it to a CAF file using the
    `afconvert` utility I showed you in [Chapter 5](#Chapter05.html#ch5). The sample
    is included in the source code on GitHub and from the Source Code/Download area
    of the Apress web site ([`www.apress.com`](http://www.apress.com)). I called my
    file `explosion.caf`. If you use your own sound effect, make sure the names match
    in the following code blocks.


    Open `HelloWorldLayer.m` in Xcode and import the `SimpleAudioEngine` header, as
    shown in [Listing 7–16](#Chapter07.html#list_7_16).


    **Listing 7–16.** *Import SimpleAudioEngine Header*


    ```

    #import "SimpleAudioEngine.h"

    ```


    Next, locate the `init` method. Just after where we set `isTouchEnabled` to YES,
    add the code from [Listing 7–17](#Chapter07.html#list_7_17).


    **Listing 7–17.** *Preload the Sound Effect*


    ```

    [[SimpleAudioEngine sharedEngine] preloadEffect:@"explosion.caf"];

    ```


    This preloads the sound effect for faster access when we need it. Finally, find
    the `ccTouchEnded` event handler. After we have added our particle effect to the
    layer, add the code from [Listing 7–18](#Chapter07.html#list_7_18).


    **Listing 7–18.** *Play the Sound Effect*


    ```

    [[SimpleAudioEngine sharedEngine] playEffect:@"explosion.caf"];

    ```


    Run the project on your device. You should have a nice explosion sound effect
    on your touch events. This helps make the game a bit more fun and enjoyable for
    the user.'
