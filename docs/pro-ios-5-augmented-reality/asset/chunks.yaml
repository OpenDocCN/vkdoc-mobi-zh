- fmt: "### Out with the Old\n\nWe're going to be using both the iPhone and the iPad\
    \ for our sample projects. However, whenever the code is completely portable between\
    \ platforms, we'll be coding for only the iPhone. [Figure 2–1](#Chapter02.html#fig_2_1)\
    \ illustrates the physical dimensions of the iPhone 4.\n\n![Image](images/0201.jpg)\n\
    \n**Figure 2–1.** *Here we see the physical dimensions of the iPhone 4.*\n\nThe\
    \ iPad hasn't been on the market as long as the iPhone, but has no less traction\
    \ for its purpose. In this book, we're only going to use the iPad 2 for our examples.\
    \ There are a few reasons for this. Most important, the iPad (first-generation)\
    \ is missing a front-facing camera, and we're going to work on some facial recognition\
    \ programming later in this book. [Figure 2–2](#Chapter02.html#fig_2_2) shows\
    \ the physical characteristics of the iPad 2.\n\n![Image](images/0202.jpg)\n\n\
    **Figure 2–2.** *Here we see the physical characteristics of the iPad 2.*\n\n\
    ### Hardware Components\n\nInstead of just listing out the hardware specs for\
    \ each of these devices, let's take a minute to discuss what an augmented-reality\
    \ application might require. First, and most obviously, the device would need\
    \ a camera. Most augmented-reality use cases have some sort of requirement for\
    \ location and direction, so a GPS and a compass would be useful. It might be\
    \ useful to either listen for sound or output sound, so we should look for a microphone\
    \ and speaker support. We'll incorporate some gaming features into our samples,\
    \ so we probably need some hardware acceleration capabilities and a graphics toolkit.\
    \ Let's translate this to Apple's terminology and walk through how to check for\
    \ these various hardware components.\n\n**NOTE:** As we look at the different\
    \ hardware components of the iOS devices, I'll be posting some small code snippets.\
    \ In this chapter, they will be out of context of a sample project. However, if\
    \ you want to follow along, all the code in this chapter is in the following GitHub\
    \ repository:\n\n[`https://github.com/kyleroche`](https://github.com/kyleroche)\n\
    \n#### Camera Support\n\nThe camera has come a long way since Apple launched the\
    \ iPhone 3GS. It still leaves a lot to be desired when compared to some other\
    \ hardware models that make their differentiation around the camera, but it'll\
    \ more than suffice for our purposes.\n\nThere are two ways to build augmented-reality\
    \ applications over the video capabilities of the phone. First, you can actively\
    \ inspect the video capture for elements, recognizable objects, and so forth.\
    \ Or, you can use the video capture as the background for your application, while\
    \ completely ignoring the contents. We see this approach quite a bit in augmented-reality\
    \ browsers because of the heavy processing involved with constantly inspecting\
    \ the video capture. In this book, we'll walk through samples of both of these\
    \ approaches.\n\n[Table 2–1](#Chapter02.html#tab_2_1) details the specifics about\
    \ the camera and video capability of the hardware we'll be using in this book.\n\
    \n![Image](images/t0201.jpg)\n\n##### Detecting the Camera\n\nWe can programmatically\
    \ detect what camera is available on our device by using the `UIImagePickerController`\
    \ class. There is a method called `isSourceTypeAvailable:` we can use to determine\
    \ whether the camera we want to use is available on this device. [Listing 2–1](#Chapter02.html#list_2_1)\
    \ shows an example of how to use the `isSourceTypeAvailable:` method.\n\n**Listing\
    \ 2–1.** *Checking for a Camera, Then for a Front-Facing Camera*\n\n```\nBOOL\
    \ cameraAvailable = [UIImagePickerController isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera];\n\
    \    BOOL frontCameraAvailable = [UIImagePickerController isSourceTypeAvailable:UIImagePickerControllerCameraDeviceFront];\n\
    \n    if (cameraAvailable) {\n        UIAlertView *alert = [[UIAlertView alloc]\
    \ initWithTitle:@\"Camera\"\n                                                \
    \        message:@\"Camera Available\"\n                                     \
    \                  delegate:self\n                                           \
    \   cancelButtonTitle:@\"OK\"\n                                              otherButtonTitles:nil,\
    \ nil];\n        [alert show];\n        [alert release];\n    } else {\n     \
    \   UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"Camera\"\n    \
    \                                                    message:@\"Camera NOT Available\"\
    \n                                                       delegate:self\n     \
    \                                         cancelButtonTitle:@\"OK\"\n        \
    \                                      otherButtonTitles:nil, nil];\n        [alert\
    \ show];\n        [alert release];\n    }\n\n    if (frontCameraAvailable) {\n\
    \        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"Camera\"\n\
    \                                                        message:@\"Front Camera\
    \ Available\"\n                                                       delegate:self\n\
    \                                              cancelButtonTitle:@\"OK\"\n   \
    \                                           otherButtonTitles:nil, nil];\n   \
    \     [alert show];\n        [alert release];\n    } else {\n        UIAlertView\
    \ *alert = [[UIAlertView alloc] initWithTitle:@\"Camera\"\n                  \
    \                                      message:@\"Front Camera NOT Available\"\
    \n                                                       delegate:self\n     \
    \                                         cancelButtonTitle:@\"OK\"\n        \
    \                                      otherButtonTitles:nil, nil];\n        [alert\
    \ show];\n        [alert release];\n    }\n```\n\nThis code block will demonstrate\
    \ the results in a quick `UIAlertView` pop-up. Actually, you'll get two pop-ups\
    \ from this example. You can see in the first few lines of [Listing 2–1](#Chapter02.html#list_2_1)\
    \ where we are checking for the existence of `UIImagePickerControllerSourceTypeCamera`\
    \ to see whether the camera is available. We next check for the existence of the\
    \ front-facing camera using the `UIImagePickerControllerCameraDeviceFront` parameter.\
    \ The `isSourceTypeAvailable:` method returns a `BOOL` value. We use that in our\
    \ `if/else` statements, and display the appropriate `UIAlertView` for each check.\n\
    \nNow, why would we have to check for a camera when we're only using iPhone 3GS,\
    \ iPhone 4, and the iPad 2? Don't they all have cameras? Yes, they do all have\
    \ cameras. However, we'll be coding in Xcode using the simulators, as well. Unlike\
    \ some other mobile operating systems' IDEs, Xcode simulators do not have camera\
    \ support.\n\nTake a look at [Figure 2–3](#Chapter02.html#fig_2_3). Both of these\
    \ screenshots were taken from an iPhone 4 device running the previous sample code\
    \ block. Since both of the `if/else` blocks execute in the code block, we get\
    \ two `UIAlertView` dialogs. As you can see from the dialogs, both checks returned\
    \ `True`, meaning the camera and the front-facing camera are available to use.\n\
    \n![Image](images/0203.jpg)"
