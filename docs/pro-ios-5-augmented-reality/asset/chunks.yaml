    # 构建人脸识别增强现实应用


    在第 12 章中，我们介绍了几种将人脸和物体识别引入应用的方法。其中有些方法比其他方法更复杂。在本章中，我们将选择其中一种方法，利用人脸识别以及本书已讨论过的其他技术，构建一个功能完备的增强现实应用。


    ## 应用目的


    为这个应用设想一个具体用途有点困难。我并非试图解决某个非常实际的问题，而是想演示到目前为止我们在本书中学到的一些关键概念。


    话虽如此，这个应用的初衷是客户服务。诚然，这有点夸大其词，但做起来还是会很有趣。在这个项目中，设想一台 iPad 安装在餐厅的桌子上方，或酒吧的公共区域。我们将分析
    iPad 摄像头中人物的情绪，如果发现他/她情绪愤怒，就向客服发出警报。


    顺便提一下，我们将基于目前从书中学到的知识来构建这个应用。不幸的是，我们目前学到的方法可能无法如愿奏效。我想提前提醒你这一点。当应用在章节进行到一半时看起来像是坏了，那是故意的。这并非你做错了什么！我们将在后续修复它，并在此过程中了解一些
    OpenGL 及其对线程不友好的特性。


    ### 使用的技术


    起初，我们只会在屏幕上叠加一些关于用户的信息。这将是使用 cocos2D 构建更复杂 HUD 层的好练习。我们将扩展此应用，使其能够实际向客服代表发送短信（短消息服务）并报告事件。


    我们将使用的核心技术是`face.com` REST API。正如我们在第 12 章中讨论的，`face.com` API 通过 REST 请求接收 JPEG
    图像，并返回识别出的人脸的`x,y`坐标，以及关于人物情绪、眼镜和嘴部位置的信息。这是一个非常有用且快速的 API。


    ## 准备工作


    让我们整理一下示例应用所需的技术。要进入有趣的部分，你需要完成三个主要的注册流程。


    ### Face.com


    打开浏览器访问[`www.face.com`](http://www.face.com)。在右上角应该有一个名为`开发人员`的链接。点击该链接，然后点击页面中央巨大的`开始使用`图片。`face.com`的注册流程相当简单。它只要求你提供姓名、电子邮件和密码。如果你更慷慨一些，可以填写其余信息。无论如何，通过完成验证码证明你是人类，然后点击`注册`。按照确认邮件中的说明验证你的账户。


    登录后，转到`API 密钥`选项卡。点击`点击此处设置新应用`的链接来创建一个新应用。你为应用取什么名字并不重要。我用了`iOS AR 演示`作为我的应用名称。你会看到一个类似于图
    13-1 的页面。


    ![图片](img/1301.jpg)


    **图 13–1.** *完成`face.com`应用页面。*


    在开始构建应用时，你会用到这里的两个设置：`API 密钥`和`API 密钥密码`。关于`face.com`目前就这些。


    ### cocos2D


    如果你还没有`cocos2D`，请访问[`www.cocos2d-iphone.org/download`](http://www.cocos2d-iphone.org/download)下载适用于
    iPhone 的最新稳定版`cocos2D`，在撰写本文时版本为`1.0.1`。我们曾在第 7 章中介绍过在 Xcode 4.2 中安装`cocos2D`，所以如果你是那种会跳过章节的人，现在应该翻回去看看。


    ### 设置我们的 Twilio 账户


    Twilio 是一个云通信平台，支持短信、语音甚至 VoIP 通信。注册过程也很简单。访问[`www.twilio.com/try-twilio`](http://www.twilio.com/try-twilio)设置你的免费试用账户。


    设置好账户后，登录，你会看到仪表盘页面顶部类似于图 13-2 的内容。


    ![图片](img/1302.jpg)


    **图 13–2.** *登录并进入你的`Twilio`仪表盘页面。*


    **注意：** 与`face.com`的凭证类似，你需要记住你的`账户 SID`和`认证令牌`，以便在我们的演示应用中访问`Twilio`的 API。没有`认证令牌`，你的`账户
    SID`将毫无用处。因此，切勿分享`认证令牌`！


    ### 下载 ASI-HTTP-Request 库


    有几个库可用于处理来自 iOS 的 HTTP 请求。事实上，大多数功能都可以直接从头编写。但是，我们将通过 HTTP 以多部分表单上传的形式发送原始图像数据。针对这个特定目的，有一个非常好用的第三方库。


    `ASI-HTTP-Request`是一个开源库，可在 GitHub 上的`pokeb/asi-http-request`找到。我已将本例中使用的版本分支到`kyleroche/asi-http-request`，以防你在使用更新版本时遇到任何问题。请将其保存在本地机器上的某个位置。


    ### JSON-Framework


    我们还需要一些帮助来解析 JSON（JavaScript 对象表示法）消息，因为这是`face.com` API 的首选输出格式（同样也非常适用于`Twilio`）。与`ASI-HTTP-Request`类似，GitHub
    上有一个开源项目`stig/json-framework`，我已将其分支到`kyleroche/json-framework`以供参考。请将其保存在本地机器上的某个位置。

