    these boxes into pumpkins, we need to tie a sprite image to the box and make sure
    it follows it as chipmunk updates the position of the shape. And, because it''s
    not all that useful as it stands, since the user can throw the pumpkin completely
    off the screen, we''re going to add a groove joint to the screen for the pumpkin.
    Think of a groove joint like a flagpole or fixed track. The object that is tied
    to the joint can move along the path, but can''t veer away from the pole/track.


    Return to `MenuLayer.h` in Xcode. Update the header as shown in [Listing 8–17](#Chapter08.html#list_8_17).


    **Listing 8–17.** *Updated MenuLayer.h*


    `#import <Foundation/Foundation.h>`

    `#import "cocos2d.h"`

    `#import "chipmunk.h"`

    `#import "cpMouse.h"`

    **`#import "CPSprite.h"`**


    `@interface MenuLayer : CCLayer {`

    `    cpSpace *space;`

    `    cpBody *ground;`

    `    cpMouse *mouse;`


    **`    CCSpriteBatchNode *pumpkinBatchNode;`**

    **`    CPSprite *menuPumpkin1;`**

    `}`


    `+ (id)scene;`


    `@end`


    First, we import the `CPSprite` class we created earlier. This will help us easily
    add a pumpkin to the screen. Next, we declare a private `CCSpriteBatchNode` variable,
    as well as a `CCSprite` variable.


    **NOTE:** When developing games with cocos2D, it''s best to use CCSpriteBatchNodes
    and sprite sheets to save on memory. We''ll need all the memory we can get, because
    we''ll have such a high processing requirement for facial recognition.'
  trans: "\n### 在 Chipmunk 中创建对象\n\n将代码清单 8–13 中的方法添加到实现部分。\n\n**代码清单 8–13.** *`createBoxAtLocation`\
    \ 和 `draw`（覆写）方法*\n\n```\n- (void)createBoxAtLocation:(CGPoint)location {\n  \
    \  float boxSize = 60.0;\n    float mass = 1.0;\n    cpBody *body = cpBodyNew(mass,\
    \ cpMomentForBox(mass, boxSize, boxSize));\n    body->p = location;\n    cpSpaceAddBody(space,\
    \ body);\n\n    cpShape *shape = cpBoxShapeNew(body, boxSize, boxSize);\n    shape->e\
    \ = 1.0;\n    shape->u = 1.0;\n    cpSpaceAddShape(space, shape);\n}\n\n- (void)draw\
    \ {\n    drawSpaceOptions options = {\n        0, // drawHash\n        0, // drawBBs,\n\
    \        1, // drawShapes\n        4.0, // collisionPointSize\n        4.0, //\
    \ bodyPointSize,\n        2.0 // lineThickness\n    };\n\n    drawSpace(space,\
    \ &options);\n}\n```\n\n第一个方法仅在此处使用一次。我们将创建几个方框并将其丢到屏幕上，以确保 Chipmunk 运行正常。第二个方法用于启用\
    \ Chipmunk 的调试绘制功能。没有它，就很难确切知道你在屏幕上渲染了什么。如果你继续从事游戏开发，这个方法会派上用场。更新 `init` 方法并添加一个名为\
    \ `update` 的新方法，如代码清单 8–14 所示。\n\n**代码清单 8–14.** *新的 `init` 方法和 `update` 方法*\n\
    \n```\n- (id)init {\n    if ((self = [super init])) {        \n        CGSize\
    \ winSize = [CCDirector sharedDirector].winSize;\n\n        [self createSpace];\n\
    \        [self createGround];\n        [self createBoxAtLocation:ccp(100,100)];\n\
    \        [self createBoxAtLocation:ccp(200,200)];\n\n        [self scheduleUpdate];\n\
    \    }\n    return self;\n}  \n\n- (void)update:(ccTime)dt {\n    cpSpaceStep(space,\
    \ dt);\n}\n```\n\n好了，事情变得更有趣了。通过这些新代码，我们设置了 Chipmunk 空间、地面物体，并在不同坐标处创建了两个方框。`update`\
    \ 方法会逐步处理自上次迭代以来 Chipmunk 空间中的变化。Chipmunk 会为你处理其空间内所有对象的更新。现在就去用模拟器运行该项目，看看我说的效果。你应该会看到类似图\
    \ 8–9 的画面。\n\n![图片](img/0809.jpg)\n\n**图 8–9** *运行项目，查看屏幕上的方框。*\n\n再说一次，是不是并不令人兴奋？让我们添加一个所谓的*鼠标关节*，这样我们就可以抓住并投掷这些方框了。关节是\
    \ Chipmunk 中的一种约束类型。在本示例中，我们将使用两种类型的关节。我们会用鼠标关节让用户抓取方框，还会用 `cpDampedSprint` 关节让南瓜在被抛来抛去时弹跳起来。\n\
    \n切换到 `MenuLayer.h` 文件，并从我们的 Helper Code 目录导入 `cpMouse.h` 头文件。然后声明一个 `cpMouse`\
    \ 类的私有实例变量，命名为 `mouse`。\n\n将代码清单 8–15 中的以下行添加到 `init` 方法中，放在运行 `scheduleUpdates`\
    \ 方法之前。\n\n**代码清单 8–15.** *添加到 `init` 方法*\n\n```\nmouse = cpMouseNew(space);\n\
    self.isTouchEnabled = YES;\n```\n\n第一行设置了新的 `mouse` 实例变量，用于处理我们 Chipmunk 空间中的鼠标事件。第二行启用了我们类的触摸事件。\n\
    \n启用触摸事件是一回事；处理它们则稍微复杂一些。在 cocos2D 中有两种基本方法处理触摸事件。本示例只需要单点触摸事件（而非多点触摸事件）。奇怪的是，这些需要的代码比多点触摸处理还要多。将代码清单\
    \ 8–16 中的代码添加到实现部分。\n\n**代码清单 8–16.** *处理触摸事件*\n\n```\n- (void)registerWithTouchDispatcher\
    \ {\n    [[CCTouchDispatcher sharedDispatcher] addTargetedDelegate:self priority:0\
    \ swallowsTouches:YES];\n}\n\n- (BOOL)ccTouchBegan:(UITouch *)touch withEvent:(UIEvent\
    \ *)event {\n    CGPoint touchLocation = [self convertTouchToNodeSpace:touch];\n\
    \    cpMouseGrab(mouse, touchLocation, false);\n    return YES;\n}\n\n- (void)ccTouchMoved:(UITouch\
    \ *)touch withEvent:(UIEvent *)event {\n    CGPoint touchLocation = [self convertTouchToNodeSpace:touch];\n\
    \    cpMouseMove(mouse, touchLocation);\n}\n\n- (void)ccTouchEnded:(UITouch *)touch\
    \ withEvent:(UIEvent *)event {\n    cpMouseRelease(mouse);\n}\n\n- (void)ccTouchCancelled:(UITouch\
    \ *)touch withEvent:(UIEvent *)event {\n    cpMouseRelease(mouse);    \n}\n\n\
    - (void)dealloc {\n    cpMouseFree(mouse);\n    cpSpaceFree(space);\n    [super\
    \ dealloc];\n}\n```\n\n这一系列事件让 Chipmunk 知道用户想要抓取与触摸坐标碰撞的任何对象。Chipmunk 会更新对象的位置，直到用户释放触摸事件。到那时，重力、摩擦力以及任何其他\
    \ Chipmunk 环境变量会起作用，对象将回到自然的运动轨迹。再次在模拟器上运行项目。你现在可以在屏幕上抛掷这些对象了。不过要小心——你实际上可以将其抛出屏幕，而且再也拿不回来了！\n\
    \n那么，屏幕上的方框并不是我们目标的一部分，对吗？要把这些方框变成南瓜，我们需要将一个精灵图片附着到方框上，并确保当 Chipmunk 更新形状位置时，图片能跟着移动。而且，由于现在的状况没什么用，因为用户可以把南瓜完全抛出屏幕，所以我们要为屏幕上的南瓜添加一个沟槽关节。可以把沟槽关节想象成一根旗杆或固定的轨道。与关节相连的对象可以沿着路径移动，但不能偏离旗杆/轨道。\n\
    \n回到 Xcode 中的 `MenuLayer.h` 文件。按代码清单 8–17 所示更新头文件。\n\n**代码清单 8–17.** *更新后的 `MenuLayer.h`*\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n#import \"chipmunk.h\"\
    \n#import \"cpMouse.h\"\n#import \"CPSprite.h\"\n\n@interface MenuLayer : CCLayer\
    \ {\n    cpSpace *space;\n    cpBody *ground;\n    cpMouse *mouse;\n\n    CCSpriteBatchNode\
    \ *pumpkinBatchNode;\n    CPSprite *menuPumpkin1;\n}\n\n+ (id)scene;\n\n@end\n\
    ```\n\n首先，我们导入之前创建的 `CPSprite` 类。这将帮助我们轻松地将南瓜添加到屏幕上。接下来，我们声明一个私有的 `CCSpriteBatchNode`\
    \ 变量，以及一个 `CCSprite` 变量。\n\n**注意：** 在使用 cocos2D 开发游戏时，最好使用 `CCSpriteBatchNode`\
    \ 和精灵表来节省内存。我们需要尽可能多的内存，因为人脸识别对处理能力的要求很高。\n"
- fmt: "### Creating a Spring Joint in Chipmunk\n\nSwitch over to `MenuLayer.m` and\
    \ update the `init` method, as shown in [Listing 8–18](#Chapter08.html#list_8_18).\n\
    \n**Listing 8–18.** *Updated init Method*\n\n```\n- (id)init {\n    if ((self\
    \ = [super init])) {        \n        CGSize winSize = [CCDirector sharedDirector].winSize;\n\
    \        [self createSpace];\n        [self createGround];\n        //[self createBoxAtLocation:ccp(100,100)];\n\
    \        //[self createBoxAtLocation:ccp(200,200)];\n        [self scheduleUpdate];\n\
    \        mouse = cpMouseNew(space);\n        self.isTouchEnabled = YES;\n    \
    \    [[CCSpriteFrameCache sharedSpriteFrameCache] addSpriteFramesWithFile:@\"\
    pumpkins.plist\"];\n        pumpkinBatchNode = [CCSpriteBatchNode batchNodeWithFile:@\"\
    pumpkins.png\"];\n        [self addChild:pumpkinBatchNode];\n        menuPumpkin1\
    \ = [[[CPSprite alloc] initWithSpace:space location:ccp(347, 328) spriteFrameName:@\"\
    pumpkin15.png\"] autorelease];\n        [pumpkinBatchNode addChild:menuPumpkin1];\n\
    \        cpConstraint *pumpkin1 = cpDampedSpringNew(menuPumpkin1.body, ground,\
    \ ccp(-100,100), ccp(250,700), 100, 5, 1);\n        cpSpaceAddConstraint(space,\
    \ pumpkin1);\n    }\n    return self;\n}\n```\n\nFirst, we create a `CCSpriteFrameCache`\
    \ with our shared sprite sheet. We are using the PLIST file I created for you,\
    \ so the `CCSpriteFrameCache` knows about the contents of our sprite sheet. We'll\
    \ use this again later in our action layer. Next, we set our batch node to the\
    \ contents of our pumpkin PNG file.\n\nThe next two statements are a bit more\
    \ interesting. We set the `CPSpritemenuPumpkin1` to a new instance of `CCSprite`\
    \ with a location and a default pumpkin image.\n\nFinally, we set up a new `cpDampedSpring`\
    \ constraint, using the `cpDampedSpringNew` macro, as we discussed earlier. You\
    \ can play with the values I've set here, if you want. They will increase/decrease\
    \ the intensity of the spring, as well as its offset. Remember, we have debug\
    \ drawing enabled, so you'll be able to see the spring in action.\n\n**NOTE:**\
    \ If you are not able to test this on an iPad, the x, y coordinates in [Listing\
    \ 8–18](#Chapter08.html#list_8_18) need to be adjusted for the screen size of\
    \ an iPhone. Cutting them all in half should do the trick.\n\nChange the update\
    \ method to reflect the changes in [Listing 8–19](#Chapter08.html#list_8_19).\n\
    \n**Listing 8–19.** *Updated update Method*\n\n```\n- (void)update:(ccTime)dt\
    \ {\n    cpSpaceStep(space, dt);\n    for (CPSprite *sprite in pumpkinBatchNode.children)\
    \ {\n        [sprite update];\n    }\n}\n```\n\nThis is a very small amount of\
    \ code, but it has a huge impact. Try running the project with and without the\
    \ code we just added. With our new code, we'll see something like [Figure 8–10](#Chapter08.html#fig_8_10)\
    \ when we load our game menu.\n\n![Image](images/0810.jpg)\n\n**Figure 8–10**\
    \ *Run the code with the updated update method to display the correct game menu.*\n\
    \nNotice the spring join and the box around the pumpkin. The sprite keeps up with\
    \ the container when pulled by the mouse or thrown around the screen. Now, if\
    \ you leave out that update block we just added, you'd get something like [Figure\
    \ 8–11](#Chapter08.html#fig_8_11).\n\nAs you can see, our containers are still\
    \ working as expected. However, the sprite has fallen off the screen. The first\
    \ thing you should take away from this exercise is that debug draw is a lifesaver.\
    \ It would be a very daunting task to try to figure out exactly why that pumpkin\
    \ was off the screen if we didn't have debug draw enabled. The second thing you\
    \ should take away is that you must always update your scene when any changes\
    \ occur. Trust chipmunk or cocos2D to take care of the details, but make sure\
    \ you respect the updates.\n\n![Image](images/0811.jpg)\n\n**Figure 8–11** *Without\
    \ the sprite update code, you will see this on the screen.*\n\n### Adding the\
    \ Menu Option\n\nThis will be a basic game, but we'll still need a start game\
    \ option. Before we add that to the `MenuLayer`, let's create a basic class so\
    \ we'll know if it's working when we start the game.\n\nCreate a new file using\
    \ the `CCNode` template again. This time call the class `ActionLayer`. Make sure\
    \ it is a subclass of `CCLayer`. Open `ActionLayer.h` in Xcode and update it,\
    \ as shown in [Listing 8–20](#Chapter08.html#list_8_20).\n\n**Listing 8–20.**\
    \ *Updated ActionLayer.h*\n\n```\n#import <Foundation/Foundation.h>\n#import \"\
    cocos2d.h\"\n\n@interface ActionLayer : CCLayer {\n\n}\n\n+(CCScene *) scene;\n\
    \n@end\n```\n\nJust like our `MenuLayer` class, we're declaring the static `CCScene`\
    \ method. This is common to cocos2D scene classes. It's what the `CCDirector`\
    \ uses to display a new scene.\n\nSwitch over to `ActionLayer.m` and update the\
    \ implementation, as shown in [Listing 8–21](#Chapter08.html#list_8_21).\n\n**Listing\
    \ 8–21.** *Updated ActionLayer.m*\n\n```\n#import \"ActionLayer.h\"\n\n@implementation\
    \ ActionLayer\n\n+(CCScene *) scene\n{\n    // 'scene' is an autorelease object.\n\
    \    CCScene *scene = [CCScene node];\n\n    // 'layer' is an autorelease object.\n\
    \    ActionLayer *layer = [ActionLayer node];\n\n    // add layer as a child to\
    \ scene\n    [scene addChild: layer];\n    // return the scene\n    return scene;\n\
    }\n\n- (id)init {\n    if ((self = [super init])) {        \n        CGSize winSize\
    \ = [CCDirector sharedDirector].winSize;\n        CCLabelBMFont *label = [CCLabelBMFont\
    \ labelWithString:@\"Game on pumpkins!\" fntFile:@\"Arial.fnt\"];\n        label.position\
    \ = ccp(winSize.width/2, winSize.height/2);\n        [self addChild:label];\n\
    \    }\n    return self;\n}\n\n@end\n```\n\nWe'll replace most of this code later.\
    \ For now, it will display a label with a little message to the pumpkins to let\
    \ us know that things are in place to start loading up our game scene.\n\nReturn\
    \ to `MenuLayer.m`. Import the new `ActionLayer.h` class. Find the code where\
    \ we added the spring constraint to the screen. Just under that code, add the\
    \ code from [Listing 8–22](#Chapter08.html#list_8_22).\n\n**Listing 8–22.** *Add\
    \ to the Bottom of the init Method, After the Spring Constraint*\n\n```\nCCLabelBMFont\
    \ *newGame;\nif (UI_USER_INTERFACE_IDIOM() == UIUserInterfaceIdiomPad) {\n   \
    \ newGame = [CCLabelBMFont labelWithString:@\"New Game\" fntFile:@\"Arial-hd.fnt\"\
    ];\n} else {\n    newGame = [CCLabelBMFont labelWithString:@\"New Game\" fntFile:@\"\
    Arial.fnt\"];    \n}\n\nCCMenuItemLabel *newGameItem = [CCMenuItemLabel itemWithLabel:newGame\
    \ target:self selector:@selector(newGameTapped:)];\nnewGameItem.position = ccp(winSize.width\
    \ * 0.8, winSize.height * 0.3);\n\nCCMenu *menu = [CCMenu menuWithItems:newGameItem,\
    \ nil];\nmenu.position = CGPointZero;\n[self addChild:menu];\n```\n\nThis code\
    \ block creates a cocos2D menu for the user. We're loading a font depending on\
    \ the device type, then presenting the user with a single option, which is to\
    \ start a new game. If the new game label is clicked, we'll fire the selector\
    \ `newGameTapped`. This is a method we haven't yet created. Let's do that now.\
    \ Add the method from [Listing 8–23](#Chapter08.html#list_8_23) to the implementation.\n\
    \n**Listing 8–23.** *newGameTapped Method*\n\n```\n- (void)newGameTapped:(id)sender\
    \ {\n    [[CCDirector sharedDirector] replaceScene:[CCTransitionRadialCCW transitionWithDuration:1.0\
    \ scene:[ActionLayer node]]];\n}\n```\n\nWhen the user taps the new game option,\
    \ we're going to use a cocos2D transition to present the game in a fashionable\
    \ manner. Run the project using the iPad simulator. On launch, you'll see a new\
    \ menu, as shown in [Figure 8–12](#Chapter08.html#fig_8_12).\n\n![Image](images/0812.jpg)\n\
    \n**Figure 8–12** *Run the project to see the new game menu.*\n\nIf you click\
    \ New Game, you'll see a quick effect that enlarges the text and then there will\
    \ be a screen transition to the `ActionLayer` as shown in [Figure 8–13](#Chapter08.html#fig_8_13).\n\
    \n![Image](images/0813.jpg)"
