- fmt: '### Photo Capture


    Capturing a photo from iOS is not a terribly difficult task programmatically.
    The `UIImagePickerController` class that we used to determine whether the camera
    was available provides a simple method for accessing the camera, taking a photo,
    and even previewing the results.


    Create a new Xcode project for this chapter. I have created a project called `Ch6`,
    and the source is available from the Source Code/Download area of the Apress web
    site ([`www.apress.com`](http://www.apress.com)) or can be forked from [`https://github.com/kyleroche/Professional_iOS_AugmentedReality`](https://github.com/kyleroche/Professional_iOS_AugmentedReality).
    Make sure you use a tab bar application template, and your device family is set
    to `Universal`. My configuration screen is shown in [Figure 6–1](#Chapter06.html#fig_6_1).
    Note that we are using Automatic Reference Counting (new to iOS 5) in this chapter,
    by selecting the `Use Automatic Reference Counting` check box.


    ![Image](images/0601.jpg)


    **Figure 6–1.** *Create the Xcode project settings for this chapter.*


    #### Using Storyboards


    We haven''t discussed storyboards yet, in this book. Let''s take a moment for
    a quick overview. Storyboards provide a consolidated XIB file for all your application
    views. You can still programmatically load XIB files from stand-alone interface
    builder classes, but you have more flexibility and time-saving opportunities using
    a storyboard interface. For example, [Figure 6–2](#Chapter06.html#fig_6_2) shows
    the default storyboard for a tab bar–based interface.


    ![Image](images/0602.jpg)


    **Figure 6–2.** *Use the storyboard for tab bar interface template.*


    Without the storyboard, there would be three separate interface files, all requiring
    different types of links to be integrated. With storyboards, we can get a clean
    look at how the application flow will present itself without switching context.


    We could just reuse the layouts that are provided by default. However, so we can
    better understand storyboards, let''s delete these and start from scratch. Delete
    `FirstViewController.h`, `FirstViewController.m`, `SecondViewController.h`, and
    `SecondViewController.m` from the Xcode project. Delete the `.png` files associated
    with each view as well.


    Open both of the storyboard files. Click the `FirstViewController` and `SecondViewController`
    interfaces in the design window. Press Delete twice. The first time you press
    Delete, you are removing the class from the view. You will be left with an empty
    view highlighted with a blue outline. The second Delete removes the view completely.
    Repeat this for both view controllers.


    You should be left with an empty tab bar controller in your interface builder
    view. Your project should be left with an `AppDelegate`, two storyboard files,
    and the `Supporting Files` directory. Now that we have a clean project, let''s
    build it back up manually.


    We are going to start with taking a photo and saving it to the library. So, let''s
    add a view controller for this example and load it in a tab in our tab bar controller.
    Right-click the project folder and choose **New File** from the context menu.
    Choose `UIViewController` subclass as the template for this file. Click `Next`.
    On the options screen, make sure that no options are selected and name the class
    `PhotoViewController`. Before clicking `Next`, make sure that your option screen
    looks like [Figure 6–3](#Chapter06.html#fig_6_3).


    ![Image](images/0603.jpg)


    **Figure 6–3.** *Create the PhotoViewController class.*


    From the `Objects` library, drag a `View Controller` to the interface. Click the
    new `View Controller` and switch to the identity inspector and change the `Custom
    Class` to `PhotoViewController`. The result of these three steps is shown in [Figure
    6–4](#Chapter06.html#fig_6_4).


    Before we get too far ahead, make sure you nominate the `PhotoViewController`
    as a `UINavigationControllerDelegate` and a `UIImagePickerControllerDelegate`.


    ![Image](images/0604.jpg)


    **Figure 6–4.** *Add the PhotoViewController.*


    Right-click the `Tab Bar Controller` view in the interface builder. Under the
    `StoryboardSeques` category, there is an item called `Relationship – viewControllers`.
    Ctrl+click+drag the plus icon on the right side of this item to the `PhotoViewController`
    view in the interface. You will now see something similar to [Figure 6–5](#Chapter06.html#fig_6_5).


    ![Image](images/0605.jpg)


    **Figure 6–5.** *Link the Relationship Storyboard Seque to PhotoViewController.*


    Repeat this process for the iPad''s storyboard, if you are using an iPad for testing,
    or if you truly want the app to work on both devices.


    To change the name, icon, or badge associated with the tab bar item we just enabled,
    you need to do so in the associated view. You can no longer edit those items from
    the parent tab bar controller.


    Next, drag a `UIButton` to the middle of the `PhotoViewController` in interface
    builder. Make sure the assistant editor is enabled and the `PhotoViewController.h`
    is present and Ctrl+drag the `UIButton` to the header file to create an action
    associated with this outlet. Use [Figure 6–6](#Chapter06.html#fig_6_6) for reference.


    ![Image](images/0606.jpg)


    **Figure 6–6.** *Create an action for the UIButton.*


    Name the action `loadPhotoPicker` and click `Connect`. If you are using an iPad,
    or you want this to be universal, you need to (once again) repeat this step in
    the iPad storyboard. However, connecting actions to events that are already created
    is a bit different. Open the iPad storyboard and add a similar `UIButton` to the
    interface. I''ve labeled both of my `UIButton`''s with a Title of `Take Photo`.
    To connect the `UIButton` to an existing action, you must Ctrl+click+drag the
    `UIButton` to the view controller icon under the view in the storyboard. If that
    doesn''t make a lot of sense reading it through, reference [Figure 6–7](#Chapter06.html#fig_6_7)
    for some guidance.


    ![Image](images/0607.jpg)


    **Figure 6–7.** *Use this menu when connecting an outlet to an existing action.*


    Well, that was quite a bit of instruction to simply connect a button, wasn''t
    it? I wanted to go through this process in detail once, so you have it for reference
    when we build our more complicated examples in later chapters. Let''s move on.'
  raw: '### Photo Capture


    Capturing a photo from iOS is not a terribly difficult task programmatically.
    The `UIImagePickerController` class that we used to determine whether the camera
    was available provides a simple method for accessing the camera, taking a photo,
    and even previewing the results.


    Create a new Xcode project for this chapter. I have created a project called `Ch6`,
    and the source is available from the Source Code/Download area of the Apress web
    site ([`www.apress.com`](http://www.apress.com)) or can be forked from [`https://github.com/kyleroche/Professional_iOS_AugmentedReality`](https://github.com/kyleroche/Professional_iOS_AugmentedReality).
    Make sure you use a tab bar application template, and your device family is set
    to `Universal`. My configuration screen is shown in [Figure 6–1](#Chapter06.html#fig_6_1).
    Note that we are using Automatic Reference Counting (new to iOS 5) in this chapter,
    by selecting the `Use Automatic Reference Counting` check box.


    ![Image](images/0601.jpg)


    **Figure 6–1.** *Create theXcode project settings for this chapter.*


    #### Using Storyboards


    We haven''t discussed storyboards yet, in this book. Let''s take a moment for
    a quick overview. Storyboards provide a consolidated XIB file for all your application
    views. You can still programmatically load XIB files from stand-alone interface
    builder classes, but you have more flexibility and time-saving opportunities using
    a storyboard interface. For example, [Figure 6–2](#Chapter06.html#fig_6_2) shows
    the default storyboard for a tab bar–based interface.


    ![Image](images/0602.jpg)


    **Figure 6–2.** *Use thestoryboard for tab bar interface template.*


    Without the storyboard, there would be three separate interface files, all requiring
    different types of links to be integrated. With storyboards, we can get a clean
    look at how the application flow will present itself without switching context.


    We could just reuse the layouts that are provided by default. However, so we can
    better understand storyboards, let''s delete these and start from scratch. Delete
    `FirstViewController.h`, `FirstViewController.m`, `SecondViewController.h`, and
    `SecondViewController.m` from the Xcode project. Delete the `.png` files associated
    with each view as well.


    Open both of the storyboard files. Click the `FirstViewController` and `SecondViewController`
    interfaces in the design window. Press Delete twice. The first time you press
    Delete, you are removing the class from the view. You will be left with an empty
    view highlighted with a blue outline. The second Delete removes the view completely.
    Repeat this for both view controllers.


    You should be left with an empty tab bar controller in your interface builder
    view. Your project should be left with an `AppDelegate`, two storyboard files,
    and the `Supporting Files` directory. Now that we have a clean project, let''s
    build it back up manually.


    We are going to start with taking a photo and saving it to the library. So, let''s
    add a view controller for this example and load it in a tab in our tab bar controller.
    Right-click the project folder and choose **New File** from the context menu.
    Choose `UIViewController` subclass as the template for this file. Click `Next`.
    On the options screen, make sure that no options are selected and name the class
    `PhotoViewController`. Before clicking `Next`, make sure that your option screen
    looks like [Figure 6–3](#Chapter06.html#fig_6_3).


    ![Image](images/0603.jpg)


    **Figure 6–3.** *Create the PhotoViewController class.*


    From the `Objects` library, drag a `View Controller` to the interface. Click the
    new `View Controller` and switch to the identity inspector and change the `Custom
    Class` to `PhotoViewController`. The result of these three steps is shown in [Figure
    6–4](#Chapter06.html#fig_6_4).


    Before we get too far ahead, make sure you nominate the `PhotoViewController`
    as a `UINavigationControllerDelegate` and a `UIImagePickerControllerDelegate`.


    ![Image](images/0604.jpg)


    **Figure 6–4.** *Add the PhotoViewController.*


    Right-click the `Tab Bar Controller` view in the interface builder. Under the
    `StoryboardSeques` category, there is an item called `Relationship – viewControllers`.
    Ctrl+click+drag the plus icon on the right side of this item to the `PhotoViewController`
    view in the interface. You will now see something similar to [Figure 6–5](#Chapter06.html#fig_6_5).


    ![Image](images/0605.jpg)


    **Figure 6–5.** *Link the Relationship Storyboard Seque to PhotoViewController.*


    Repeat this process for the iPad''s storyboard, if you are using an iPad for testing,
    or if you truly want the app to work on both devices.


    To change the name, icon, or badge associated with the tab bar item we just enabled,
    you need to do so in the associated view. You can no longer edit those items from
    the parent tab bar controller.


    Next, drag a `UIButton` to the middle of the `PhotoViewController` in interface
    builder. Make sure the assistant editor is enabled and the `PhotoViewController.h`
    is present and Ctrl+drag the `UIButton` to the header file to create an action
    associated with this outlet. Use [Figure 6–6](#Chapter06.html#fig_6_6) for reference.


    ![Image](images/0606.jpg)


    **Figure 6–6.** *Create an action for the UIButton.*


    Name the action `loadPhotoPicker` and click `Connect`. If you are using an iPad,
    or you want this to be universal, you need to (once again) repeat this step in
    the iPad storyboard. However, connecting actions to events that are already created
    is a bit different. Open the iPad storyboard and add a similar `UIButton` to the
    interface. I''ve labeled both of my `UIButton`''s with a Title of `Take Photo`.
    To connect the `UIButton` to an existing action, you must Ctrl+click+drag the
    `UIButton` to the view controller icon under the view in the storyboard. If that
    doesn''t make a lot of sense reading it through, reference [Figure 6–7](#Chapter06.html#fig_6_7)
    for some guidance.


    ![Image](images/0607.jpg)


    **Figure 6–7.** *Use this menu when connecting an outlet to an existing action.*


    Well, that was quite a bit of instruction to simply connect a button, wasn''t
    it? I wanted to go through this process in detail once, so you have it for reference
    when we build our more complicated examples in later chapters. Let''s move on.'
  trans: '

    ### 照片拍摄


    从 iOS 以编程方式拍摄照片并非一项特别困难的任务。我们之前用来检测相机是否可用的 `UIImagePickerController` 类，提供了一个简便的方法来访问相机、拍照，甚至预览结果。


    为本章新建一个 Xcode 项目。我创建了一个名为 `Ch6` 的项目，其源代码可以从 Apress 网站的源代码/下载区（[`www.apress.com`](http://www.apress.com)）获取，也可以从
    [`https://github.com/kyleroche/Professional_iOS_AugmentedReality`](https://github.com/kyleroche/Professional_iOS_AugmentedReality)
    进行分支。确保你使用的是标签栏应用程序模板，并且设备系列设置为 `Universal`。我的配置界面如图 6-1 所示。请注意，本章我们通过选中 `Use
    Automatic Reference Counting` 复选框，使用了自动引用计数（iOS 5 的新特性）。


    ![图片](img/0601.jpg)


    **图 6-1.** *为本章创建 Xcode 项目设置。*


    #### 使用故事板


    在此之前，我们还没有讨论过故事板。现在花点时间快速概述一下。故事板为你的所有应用程序视图提供了一个统一的 XIB 文件。你仍然可以从独立的界面构建器类中以编程方式加载
    XIB 文件，但使用故事板界面可以带来更多的灵活性和节省时间的机会。例如，图 6-2 展示了默认的基于标签栏界面的故事板。


    ![图片](img/0602.jpg)


    **图 6-2.** *为标签栏界面模板使用故事板。*


    如果没有故事板，将会有三个独立的界面文件，它们需要集成不同类型的链接。而使用故事板，我们可以清晰地看到应用程序流程将如何呈现，无需切换上下文。


    我们可以直接复用默认提供的布局。但为了更好地理解故事板，让我们删除它们，从头开始。从 Xcode 项目中删除 `FirstViewController.h`、`FirstViewController.m`、`SecondViewController.h`
    和 `SecondViewController.m`。同时删除每个视图关联的 `.png` 文件。


    打开两个故事板文件。在设计窗口中点击 `FirstViewController` 和 `SecondViewController` 界面。按两次 Delete
    键。第一次按 Delete 键时，你将从视图中移除该类，留下一个带有蓝色轮廓的高亮空视图。第二次 Delete 则完全移除该视图。对两个视图控制器重复此操作。


    你应该会在界面构建器视图中留下一个空的标签栏控制器。你的项目中应该只剩下 `AppDelegate`、两个故事板文件和 `Supporting Files`
    目录。现在我们已经有了一个干净的项目，让我们手动将其重新构建起来。


    我们将从拍摄照片并将其保存到相册开始。因此，让我们为此示例添加一个视图控制器，并将其加载到标签栏控制器的某个标签中。右键点击项目文件夹，从上下文菜单中选择
    **New File**。选择 `UIViewController` 子类作为该文件的模板。点击 `Next`。在选项界面上，确保没有选择任何选项，并将类命名为
    `PhotoViewController`。在点击 `Next` 之前，确保你的选项界面看起来像图 6-3。


    ![图片](img/0603.jpg)


    **图 6-3.** *创建 PhotoViewController 类。*


    从 `Objects` 库中，将一个 `View Controller` 拖拽到界面中。点击新的 `View Controller`，切换到标识检查器，并将
    `Custom Class` 修改为 `PhotoViewController`。这三步操作的结果如图 6-4 所示。


    在进行下一步之前，请确保将 `PhotoViewController` 设置为遵循 `UINavigationControllerDelegate` 和 `UIImagePickerControllerDelegate`
    协议。


    ![图片](img/0604.jpg)


    **图 6-4.** *添加 PhotoViewController。*


    在界面构建器中右键点击 `Tab Bar Controller` 视图。在 `StoryboardSeques` 类别下，有一个名为 `Relationship
    – viewControllers` 的项。按住 Ctrl 键并点击+拖拽该项右侧的加号图标，连接到界面中的 `PhotoViewController` 视图。你将看到类似于图
    6-5 的画面。


    ![图片](img/0605.jpg)


    **图 6-5.** *将 Relationship Storyboard Seque 链接到 PhotoViewController。*


    如果你使用 iPad 进行测试，或者希望应用程序能在两种设备上运行，请为 iPad 的故事板重复此过程。


    要更改我们刚才启用的标签栏项的图标、名称或徽章，你需要在关联的视图中进行操作。你不能再从父级标签栏控制器中编辑这些项目。


    接下来，在界面构建器中，将一个 `UIButton` 拖拽到 `PhotoViewController` 的中间位置。确保辅助编辑器已启用且 `PhotoViewController.h`
    已打开，按住 Ctrl 键并拖拽 `UIButton` 到头文件中，为此插座创建一个动作。请参考图 6-6。


    ![图片](img/0606.jpg)


    **图 6-6.** *为 UIButton 创建一个动作。*


    将动作命名为 `loadPhotoPicker`，然后点击 `Connect`。如果你使用的是 iPad，或者希望实现通用性，你需要（再次）在 iPad 的故事板中重复此步骤。不过，将动作连接到已创建的事件略有不同。打开
    iPad 的故事板，在界面中添加一个类似的 `UIButton`。我将两个 `UIButton` 的标题都设置为 `Take Photo`。要将 `UIButton`
    连接到现有动作，你必须按住 Ctrl 键并点击+拖拽 `UIButton` 到故事板中视图下方的视图控制器图标上。如果读到这里你感觉不太明白，可以参考图 6-7
    获得一些指导。


    ![图片](img/0607.jpg)


    **图 6-7.** *将插座连接到现有动作时使用此菜单。*


    仅仅为了连接一个按钮，这指令确实不少，不是吗？我想详细地讲解一次这个过程，以便你在后续章节构建更复杂的示例时，有份参考资料。让我们继续。'
- fmt: "### Using the Camera\n\nSwitch to `PhotoViewController.m` in Xcode. At the\
    \ bottom of the file, the action method that we added in the previous steps will\
    \ be empty. Expand that method as shown in [Listing 6–2](#Chapter06.html#list_6_2).\n\
    \n**Listing 6–2.** *loadPhotoPicker Method*\n\n```\n- (IBAction)loadPhotoPicker:(id)sender\
    \ {\n    UIImagePickerController *imagePicker = [[UIImagePickerController alloc]\
    \ init];\n    imagePicker.sourceType =  UIImagePickerControllerSourceTypeCamera;\n\
    \    // uncomment for front camera\n    // imagePicker.cameraDevice = UIImagePickerControllerCameraDeviceFront;\n\
    \    imagePicker.delegate = self;\n    imagePicker.allowsEditing = NO;\n    [self\
    \ presentModalViewController:imagePicker animated:YES];\n}\n```\n\nThis method\
    \ first creates an instance of the `UIImagePickerController` class. This class\
    \ essentially opens the camera interface we are all used to in iOS. We set the\
    \ `sourceType` attribute to the rear camera. If you'd prefer to set this to the\
    \ front-facing camera (again, you should verify this is present first), you can\
    \ uncomment the code that is commented out below this line.\n\nNext, we set the\
    \ `delegate` to `self` and disallow editing of the image picker. We then present\
    \ the `UIImagePickerController` in a modal dialog to `PhotoViewController`.\n\n\
    If you run this now, the image picker (camera) will be displayed but nothing will\
    \ be saved. Add the methods from [Listing 6–3](#Chapter06.html#list_6_3) to the\
    \ implementation.\n\n**Listing 6–3.** *Methods to Save the Photo Image*\n\n```\n\
    - (void) imagePickerController:(UIImagePickerController *)picker didFinishPickingMediaWithInfo:(NSDictionary\
    \ *)info\n{\n    UIImage *image = [info objectForKey:@\"UIImagePickerControllerOriginalImage\"\
    ];\n    UIImageWriteToSavedPhotosAlbum(image, self,\n                        \
    \           @selector(image:didFinishSavingWithError:contextInfo:), nil);\n}\n\
    \n- (void)image:(UIImage *)image didFinishSavingWithError:(NSError *)error contextInfo:(void\
    \ *)contextInfo\n{\n    UIAlertView *alert;\n    if (error) {\n        alert =\
    \ [[UIAlertView alloc] initWithTitle:@\"Error\"\n                            \
    \               message:@\"Unable to save image to Photo Album.\"\n          \
    \                                delegate:self cancelButtonTitle:@\"Ok\"\n   \
    \                              otherButtonTitles:nil];\n    } else {\n       \
    \ alert = [[UIAlertView alloc] initWithTitle:@\"Success\"\n                  \
    \                         message:@\"Image saved to Photo Album.\"\n         \
    \                                 delegate:self cancelButtonTitle:@\"Ok\"\n  \
    \                               otherButtonTitles:nil];\n    }\n    [alert show];\n\
    \    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\nThe first method\
    \ is a delegate method for the `UIImagePickerController` class. It is fired when\
    \ an image is selected from the controller. We are allocating an object for this\
    \ image and sending it to the second method shown in [Listing 6–3](#Chapter06.html#list_6_3).\n\
    \nThe second method, which was set as the selector method after saving the file,\
    \ checks for an error and displays a success or failure message in a `UIAlertView`\
    \ control. You might notice that I'm not releasing the `UIAlertView` instances.\
    \ When we created this project, earlier in the chapter, we enabled Automatic Reference\
    \ Counting. Automatic Referencing Counting (new to iOS5) forbids explicit calling\
    \ of the `release` method.\n\nWe're ready to test the project. Start it up on\
    \ either an iPhone or iPad device. Since we're using the camera, this project\
    \ can't be run on the simulator.\n\nClick the button in the middle of the interface,\
    \ take a photo, and click the `Use` button to select that photo. You will get\
    \ a `UIAlertView` dialog that confirms the file was saved correctly. Open the\
    \ Photos application on the iPad or iPhone you used for testing. You will find\
    \ the photo saved in there.\n\n### Saving Images in Different Formats\n\nSo far,\
    \ we've saved an image to our photo library. What about using that image for another\
    \ purpose, like object or facial recognition? We will be using images from our\
    \ video buffer in our facial recognition chapters later in this book. UIKit includes\
    \ a few C functions that are helpers for exporting images to files on the iOS\
    \ device. The two most common formats used for export are JPEG and PNG, so let's\
    \ concentrate on those first.\n\nOpen `PhotoViewController.m` in Xcode. Find the\
    \ `didFinishPickingMediaWithInfo` method and add the code from [Listing 6–4](#Chapter06.html#list_6_4)\
    \ at the end of the method.\n\n**Listing 6–4.** *Convert and Save UIImage Object*\n\
    \n```\n// start saving files\n    NSString  *pngPath = [NSHomeDirectory() stringByAppendingPathComponent:@\"\
    Documents/ConvertedPNG.png\"];\n    NSString  *jpgPath = [NSHomeDirectory() stringByAppendingPathComponent:@\"\
    Documents/ConvertedJPEG.jpg\"];\n    [UIImageJPEGRepresentation(image, 1.0) writeToFile:jpgPath\
    \ atomically:YES];\n    [UIImagePNGRepresentation(image) writeToFile:pngPath atomically:YES];\n\
    \    // optional (check for files)\n    NSError *error;\n    NSFileManager *fileMgr\
    \ = [NSFileManager defaultManager];\n    NSString *documentsDirectory = [NSHomeDirectory()\
    \ stringByAppendingPathComponent:@\"Documents\"];\n    NSLog(@\"Documents: %@\"\
    , [fileMgr contentsOfDirectoryAtPath:documentsDirectory error:&error]);\n```\n\
    \nFirst, we set two strings to the full path value of what the file name will\
    \ eventually become. We next use the C functions (`UIImageJPEGRepresentation`\
    \ and `UIImagePNGRepresentation`) to write the files to the respective paths.\
    \ We pass the image compression quality as part of the parameter set. Image compression\
    \ is measured on a scale of 0.0 to 1.0. So, we are saving the image with the best\
    \ quality and least compression possible.\n\nRun the project using either physical\
    \ device type. Make sure you have your console open so you can see the output.\
    \ You will see something similar to [Figure 6–8](#Chapter06.html#fig_6_8) after\
    \ the image is saved.\n\n![Image](images/0608.jpg)\n\n**Figure 6–8.** *The image\
    \ is saved, converted, and stored.*"
