    Let''s take a break and review what we just added. First, we synthesize the properties
    we declared. Next, we create a method called `initWithCoordinate`. This takes
    in the name and place of the coordinate and sets the properties of the base class,
    `ARCoordinate`, so we can use them later in our visualization layer.


    We then create a method called `initWithCoordinateAndOrigin`. This solves the
    same purpose as `initWithCoordinate`, but allows you to define an origin as well.
    The major difference is that this method calls a new internal method, which we
    will discuss next.


    The `calibrateUsingOrigin` method takes the distance between the two points (your
    device and the point of interest) and calculates the raw distance, the angle (considering
    altitude changes), and the azimuth. These properties are set in the base class
    so we can reference them later in the example.


    Finally, we create a method called `angleFromCoordinate`. This method calculates
    the distance of the angle between the two points.


