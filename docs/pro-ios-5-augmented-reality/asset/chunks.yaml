    #### Magnetometer


    The magnetometer is the sensor that measures the strength of the magnetic field
    surrounding the device.  Assuming that there are no strong magnetic fields next
    to the device, this reading will correlate to the ambient magnetic field of the
    Earth, which allows us to then use the readings for determining our heading. The
    heading of the device is its geomagnetic orientation of the device from the North
    Pole. Apple points out in its developer documentation, as do most other reference
    materials on this subject, that the geomagnetic heading and the true heading,
    with respect to the geographic North Pole, may vary greatly depending on your
    location.


    We measure the geomagnetic heading of the device much like we measured the gyroscope
    or accelerometer readings. Let''s extend our project to also display our heading.


    In Xcode, add a new `UIViewController` class to the project. Name it `headingViewController`
    and make sure you create it with an XIB file interface building. I used Google
    Image Search to find a noncopyrighted image of a compass. It''s included in the
    project on GitHub and is available from the Source Code/Download area at the Apress
    web site ([`www.apress.com`](http://www.apress.com)). If you substitute your own
    image, make sure that North is centered at the top of the image. We will be rotating
    this image based on the device''s heading, so we want to start with an angle of
    0 degrees from the vertical axis to make things as simple as possible. After you
    have your image, add it to the project in Xcode.


    ##### Magnetometer Availability


    As we discussed in [Chapter 3](#Chapter03.html#ch3), the `CLLocationManager` requires
    the user to enable location updates to function properly. The location manager
    is also capable of returning both the true and the magnetic heading of the device.
    However, the true heading of the device is available only if the user has location
    updates enabled. Magnetic heading updates, however, are always available regardless
    of the user''s preference for location updates. This is because heading on its
    own does not compromise the user''s privacy and, therefore, doesn''t require approval.


    In short, you do not need to check for availability of the magnetometer before
    using it, as we did with other sensors.


    ##### Calibration


    Because we have a strong possibility of two readings, there are functions in iOS
    that allow us to calibrate the device to determine the difference between the
    magnetic heading and the true heading. `CLLocationManager` defines a delegate
    method named `locationManagerShouldDisplayHeadingCalibration`. This method overlays
    an orientation image instructing the user to rotate the device in a [figure-8](#Chapter04.html#fig_4_8)
    pattern until the location manager can distinguish between any local magnetic
    fields and the Earth''s magnetic field. The location manager uses the true heading
    as reference.


    ##### Let''s See Where We''re Headed


