    #### Camera Support


    The camera has come a long way since Apple launched the iPhone 3GS. It still leaves
    a lot to be desired when compared to some other hardware models that make their
    differentiation around the camera, but it''ll more than suffice for our purposes.


    There are two ways to build augmented-reality applications over the video capabilities
