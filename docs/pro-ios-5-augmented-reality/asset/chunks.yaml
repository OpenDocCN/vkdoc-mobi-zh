    }\n\n@end\n```\n\n这里应该没有什么令人惊讶的地方。我们只是在设置我们的类，以便检索和存储坐标的属性。我们还需要一个继承自 `ARCoordinate`\
    \ 的类来添加位置信息。\n\n创建一个名为 `ARGeoCoordinate` 的新类。在 Xcode 中打开这个新类，并添加 代码清单 11–16 中所示的代码。\n\
    \n**代码清单 11–16.** `ARGeoCoordinate.h`\n\n```\n#import <Foundation/Foundation.h>\n\
