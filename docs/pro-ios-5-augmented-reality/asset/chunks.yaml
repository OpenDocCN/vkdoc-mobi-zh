    To demonstrate that these functions actually do check for the availability of
    the camera, I ran the same code on the iPhone 4.3 Simulator from Xcode. The resulting
    dialogs were the opposite, as you can see in [Figure 2–4](#Chapter02.html#fig_2_4).


    There are a few other options we could have used to check for the camera. Technically,
    our first check is looking for any camera to be available. We could have used
    `UIImagePickerControllerCameraDeviceRear` as our source type argument and checked
    specifically for the rear-facing camera. Or, we could have checked a few options
    for the current flash setting on the device. This one is a bit different. Either
    we have to check specifically for the mode we are looking to validate, such as
    `UIImagePickerControllerCameraFlashModeOn`, or we can use the `isFlashAvailableForCameraDevice`
    method.


    We''ll talk more about how to use the camera to capture images and video in [Chapter
    8](#Chapter08.html#ch8).


    ![Image](images/0204.jpg)


    **Figure 2–4.** *We check for the camera (left), and then for a front-facing camera
    (right) on the iPhone 4.3 Simulator.*


    #### Detecting Location Capabilities


    iOS provides the Core Location Framework for interacting with location-based services
    and hardware on the device. Unfortunately, the Core Location Framework doesn''t
    provide any way to detect the presence of GPS. Instead, you should enforce these
    hardware requirements on the application itself (see “Enforcing Hardware Requirements,”
    later in this chapter).


    Now, to be clear, you can still check whether location services are enabled. Even
    though location services are available in every version of iOS, there are still
    cases in which they might not be available to your application. For example:


    *   The user can disable location services in the Settings application.

    *   The user can deny location services for a specific application.

    *   The device might be in airplane mode and unable to power up the necessary
    hardware.


    For these reasons, you should always call the `locationServicesEnabled` class
    method of `CLLocationManager` before attempting to use any location services.
    If the user has disabled these services on purpose, the automated prompt that
    is presented when you try to use location services might not be a welcomed feature
    of your application.


    There are two methods available for determining the user''s location:


    *   The Standard Location Service is a configurable, general-purpose solution,
    which all versions of iOS support.

    *   The Significant-Change Location Service offers a low-power location service
    for devices with cellular radios. This service, which is available only in iOS
    4.0 and later, can wake up an application that is suspended or is not running.


    We will discuss in detail how to start and use location services in [Chapter 4](#Chapter04.html#ch4).


    ##### Digital Compass


    We discussed that augmented-reality applications might also benefit from a directional
    heading. In fact, this would be a requirement for any location-based AR application
    or you wouldn''t be able to determine which direction the user was facing. Checking
    for the magnetometer (digital compass) is fairly straightforward. Before you can
    use the Core Location Framework, there are two steps you must take to prepare
    your project.


    First, you must link your application binary with the Core Location library. Click
    on your project name in the **Project Navigator** of Xcode. Switch your view to
    the **Build Phases** tab of your application''s target. There is a section called
    **Link Binary With Libraries**. Expand this section and click on the `+` button
    to add a new library. In [Figure 2–5](#Chapter02.html#fig_2_5), you can see the
    Core Location Framework that we are adding to our project.


    ![Image](images/0205.jpg)


    **Figure 2–5.** *We add the Core Location Framework to our application binary.*


    Second, be sure you add the `import` statement from [Listing 2–2](#Chapter02.html#list_2_2)
    to your header file.


    **Listing 2–2.** *Import the Core Location Framework*


    `#import <CoreLocation/CoreLocation.h>`


    After you''ve added the Core Location Framework, you can add [Listing 2–3](#Chapter02.html#list_2_3)
    to the code snippet from [Listing 2–1](#Chapter02.html#list_2_1) to detect the
    presence of the magnetometer. All this code belongs in the `.m` file. Notice that
    we are using the `headingAvailable` class method, and not the property. The property
    was deprecated recently, and the class method is the preferred way to detect whether
    the heading is available.


    In the example posted on GitHub, I keep all this code in the `viewDidLoad` method
    to make sure it runs when the view is presented.


    **Listing 2–3.** *Check for the Magnetometer*


    `BOOL magnetometerAvailable = [CLLocationManager headingAvailable];`

    `    if (magnetometerAvailable) {`

    `        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Magnetometer"`

    `                                                        message:@"Magnetometer
    Available"`

    `                                                       delegate:self`

    `                                              cancelButtonTitle:@"OK"`

    `                                              otherButtonTitles:nil, nil];`

    `        [alert show];`

    `        [alert release];`

    `    } else {`

    `        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Magnetometer"`

    `                                                        message:@"Magnetometer
    NOT Available"`

    `                                                       delegate:self`

    `                                              cancelButtonTitle:@"OK"`

    `                                              otherButtonTitles:nil, nil];`

    `        [alert show];`

    `        [alert release];`

    `    }`


    Like the camera, the magnetometer is another hardware component that is not available
    on the simulator. [Figure 2–6](#Chapter02.html#fig_2_6) illustrates the code from
    [Listing 2–3](#Chapter02.html#list_2_3) running on the iPhone 4.3 simulator.


    If you run this same code block is against the physical iPhone device or iPad,
    you''ll get the opposite message.


    Keep in mind that you can still use hardware requirements to stop the application
    from launching on a particular device if the magnetometer is not available. See
    the section “Enforcing Hardware Requirements” for more details and instructions
    on that topic. We''re going to cover more advanced usage of the digital compass
    in [Chapter 7](#Chapter07.html#ch7).


    ![Image](images/0206.jpg)


    **Figure 2–6.** *We check for the magnetometer on the iPhone 4.3 simulator*'
