  trans: "\n# 构建 HUD 层\n\n到目前为止，如果你是一名开发者，这个应用本身看起来非常酷。然而，从用户的角度来看，我们无法真正了解正在发生什么。接下来，我们将通过本章第一部分创建的\
    \ HUD 层添加一些反馈信息来改变这一状况。请记住，HUD 层是透明的，但它位于场景堆栈的其余部分之上。因此，我们可以在这一层叠加所有内容。\n\n还记得本章引言中我曾提到事情不会如预期般顺利吗？这部分内容就从这里开始。如果你愿意，可以快速浏览一下，不过这只是一段小插曲；所以，如果你乐意的话，就跟着代码继续往下看吧。\n\
    \n打开 `HUDLayer.h`，声明 代码清单 13–32 中所示的方法。\n\n**代码清单 13–32.** *加载准星和情绪标签*\n\n`- (void)loadCrosshair:(NSString\
    \ *)mood x:(double)x y:(double)y;`\n\n切换到 `HUDLayer.m`，实现 代码清单 13–33 中的 `loadCrosshair`\
    \ 方法。\n\n**代码清单 13–33.** *实现 loadCrosshair 方法*\n\n`- (void)loadCrosshair:(NSString\
    \ *)mood x:(double)x y:(double)y {`\n`    CGSize size = [[CCDirector sharedDirector]\
    \ winSize];`\n`    CCLabelTTF *label = [CCLabelTTF labelWithString:@\"test\" fontName:@\"\
    Marker Felt\" fontSize:48];`\n`    // 将标签定位在屏幕中央`\n`    label.position =  ccp(\
    \ size.width /2 , size.height/2 );`\n`    // 将标签作为子节点添加到此层`\n`    [self addChild:\
    \ label];`\n`    CCSprite *crosshair = [CCSprite spriteWithFile:@\"crosshair.png\"\
    \ rect:CGRectMake(0,0,390,390)];`\n`    crosshair.position = ccp((size.width *\
    \ (x/100)), (size.height * (1 - (y/100))));`\n`    [self addChild:crosshair];`\n\
    `}`\n\n在此方法中，我们使用了一些基本函数来将 PNG 文件添加到屏幕上，并设置一个标签来显示用户的情绪。`label` 对象的 `position`\
    \ 属性是使用 cocos2D 中的 `ccp` 宏设置的。这个宏为我们创建了一个锚点，用于将图像放置在屏幕上。我们将锚点的位置设置为屏幕中央（宽度的一半，高度的一半）。\n\
    \n接下来，我们从 PNG 文件加载一个精灵，并将其放置在屏幕上。Face.com 作为其响应的一部分，会返回所识别人脸的位置（中心）。该位置以屏幕的百分比表示，这样如果你发送的是缩小后的图像（正如本章我们所做的），就无需重新计算像素。由于这些百分比是整数，我们将它们除以\
    \ 100，并为精灵创建一个与 Face.com 识别人脸位置相同的锚点。\n\n切换到 `FaceDetectionLayer.m`，找到 代码清单 13–31\
    \ 中的代码（该代码解析了 Face.com 请求返回的情绪、x 和 y 值）。在这些代码行之后，添加 代码清单 13–34 中的代码。\n\n**代码清单\
    \ 13–34.** *调用 loadCrosshair 方法*\n\n`[_hud loadCrosshair:mood x:xPosition y:yPosition];`\n\
    \n我们将使用 HUD 层来调用这个新方法。回想一下我们堆叠视图的示意图，这应该能正常工作。运行项目。结果应该类似于 图 13–11。\n\n![图片](img/1311.jpg)\n\
    \n**图 13–11.** *等等，这不对！*\n\n好消息是，图像似乎被放置在了正确的位置。坏消息是，你看不到图像。屏幕上看起来像是一个不透明的块。\n\
    \n这是由于 OpenGL 处理线程的方式导致的。我们分离了一个线程来处理 HTTP 请求，而 OpenGL 要求我们通过主线程与屏幕交互。关于处理 OpenGL\
    \ 线程问题有多种方法，网上也有大量相关文章。这是一个基本示例，说明了在 cocos2D 应用程序中需要更有序的线程管理。如果你想了解更多关于 OpenGL\
    \ 和线程的知识，可以查阅 Apress 出版社的 Mike Smithwick 所著的 *Pro OpenGL for iOS*。\n\n让我们解决这个问题。事实证明，这个应用其实并不需要一个\
    \ HUD 层。因为我们的基本逻辑在 `AppDelegate` 中，所以 `FaceDetectionLayer` 充当了 HUD 层的角色。让我们将绘图函数向下移动一层，并使用主线程来调用屏幕上的标签更改。\n\
    \n与其动态创建标签和精灵，不如创建一个属性，这样我们就能在类外部访问它。此外，我们还需要一个属性来引用我们的 `RootViewController`。\n\
    \n按 代码清单 13–35 所示调整 `FaceDetectionLayer.h` 文件。我已经注释掉了不再需要的行。\n\n**代码清单 13–35.**\
    \ *对 FaceDetectionLayer 的修改*\n\n```\n#import <Foundation/Foundation.h>\n#import\
    \ \"cocos2d.h\"\n#import \"HUDLayer.h\"\n#import \"ASIFormDataRequest.h\"\n#import\
    \ \"SBJson.h\"\n\n@interface FaceDetectionLayer : CCLayer {\n    //HUDLayer *_hud;\n\
    \    BOOL _sendingRequest;\n    CCSprite *crosshair;\n}\n\n@property (retain)\
    \ UIViewController * root;\n@property (retain) CCLabelTTF * label;\n\n//+ (CCScene\
    \ *)scene;\n//- (id)initWithHUD:(HUDLayer *)hud;\n- (void)facialRecognitionRequest:(UIImage\
    \ *)image;\n@end\n```\n\n切换回 `FaceDetectionLayer.m`，按 代码清单 13–36 所示合成新的属性。\n\n\
    **代码清单 13–36.** *合成新属性*\n\n```\n@synthesize root;\n@synthesize label = _label;\n\
    ```\n\n同样注释掉 `scene` 和 `initWithHUD` 方法。我们将不再使用它们。使用 代码清单 13–37 中的代码创建一个新的 `init`\
    \ 方法。\n\n**代码清单 13–37.** *新的 init 方法*\n\n```\n-(id) init {\n    if(self = [super\
    \ init]){\n        CGSize size = [[CCDirector sharedDirector] winSize];\n    \
    \    crosshair =  [CCSprite spriteWithFile:@\"crosshair.png\" ];\n        crosshair.position\
    \ = ccp((size.width * (50.0/100)), (size.height * (1 - (50.0/100))));\n      \
    \  crosshair.opacity = 0;\n        [self addChild:crosshair];\n        _label\
    \ = [CCLabelTTF labelWithString:@\"\" fontName:@\"Marker Felt\" fontSize:48];\n\
    \        _label.position =  ccp( size.width /2 , size.height/2 );\n        [self\
    \ addChild: _label];\n    }\n    return self;\n}\n```\n\n我们只是将部分 `HUDLayer` 代码移到了\
    \ `FaceDetectionLayer` 的 `init` 方法中。这段代码唯一真正的区别是我们还没有设置标签的文本。我们稍后将在 `RootViewController`\
    \ 中设置它。\n\n用 代码清单 13–39 中的代码替换 代码清单 13–38 中的代码行。\n\n**代码清单 13–38.** *找到这行代码……*\n\
    \n`[_hud loadCrosshair:mood x:xPosition y:yPosition];`\n\n**代码清单 13–39.** *替换为以下代码……*\n\
    \n```\nCGSize size = [[CCDirector sharedDirector] winSize];\ncrosshair.opacity\
    \ = 255;\ncrosshair.position = ccp((size.width * (xPosition/100)), (size.height\
    \ * (1 - (yPosition/100))));\n[root performSelectorOnMainThread:@selector(updateMood:)\
    \ withObject:mood waitUntilDone:YES];\n```\n\n我们没有将请求发送到 `HUDLayer` 类，而是使用 `ccp`\
    \ 宏移动精灵，并将标签的更新发送回主线程。`updateMood` 函数尚不存在。我们接下来将创建它。\n\n打开 `RootViewController.h`。导入\
    \ `FaceDetectionLayer.h` 头文件，并添加 代码清单 13–40 中所示的属性和方法。\n\n**代码清单 13–40.** *更新后的\
    \ RootViewController*\n\n```\n#import <UIKit/UIKit.h>\n#import \"FaceDetectionLayer.h\"\
    \n\n@interface RootViewController : UIViewController {\n}\n@property (retain)\
    \ FaceDetectionLayer* fdLayer;\n-(void)updateMood:(NSString*)mood;\n@end\n```\n\
    \n切换到 `RootViewController.m`，合成我们刚创建的属性。然后创建 代码清单 13–41 中的方法。\n\n**代码清单 13–41.**\
    \ *updateMood 方法*\n\n```\n-(void)updateMood:(NSString *) mood {\n    [[[self fdLayer]\
    \ label] setString:mood];\n}\n```\n"
