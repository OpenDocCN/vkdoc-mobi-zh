    \ = CGAffineTransformRotate(transform, M_PI / 2.0);\nbreak;\n        case UIImageOrientationRight:\n\
    \            boundHeight = bounds.size.height;\n            bounds.size.height\
    \ = bounds.size.width;\n            bounds.size.width = boundHeight;\n       \
    \     transform = CGAffineTransformMakeTranslation(imageSize.height, 0.0);\n \
    \           transform = CGAffineTransformRotate(transform, M_PI / 2.0);\n    \
    \        break;\n        default:\n             [NSException raise:NSInternalInconsistencyException\
    \ format:@\"Invalid image orientation\"];\n    }\n    UIGraphicsBeginImageContext(bounds.size);\n\
    \    CGContextRef context = UIGraphicsGetCurrentContext();\n    if (orient ==\
    \ UIImageOrientationRight || orient == UIImageOrientationLeft) {\n        CGContextScaleCTM(context,\
    \ -scaleRatio, scaleRatio);\n        CGContextTranslateCTM(context, -height, 0);\n\
    \    } else {\n        CGContextScaleCTM(context, scaleRatio, -scaleRatio);\n\
    \        CGContextTranslateCTM(context, 0, -height);\n    }\n    CGContextConcatCTM(context,\
    \ transform);\n    CGContextDrawImage(UIGraphicsGetCurrentContext(), CGRectMake(0,\
    \ 0, width, height), imgRef);\nUIImage *imageCopy = UIGraphicsGetImageFromCurrentImageContext();\n\
    \    UIGraphicsEndImageContext();\n\n    return imageCopy;\n}\n```\n\n这是我们单个新增内容中最大的代码块。其中大部分代码我们在第\
    \ 7 章中已经见过。不过，在将图像设置到屏幕视图的处理方式上存在一个差异。当我们将图像设置到屏幕时，我们还会在向动作层发送新的图像请求之前，检查它是否正忙。我们尚未在动作层中实现此功能。这将是下一步的工作。\n\
    \n如下清单 8-29 所示，更新`AppDelegate.m`中的`Private`方法声明。\n\n**清单 8-29.** *更新后的私有方法声明*\n\
    \n```\n@interface AppDelegate (Private)\n- (void)setupCaptureSession;\n- (UIImage\
    \ *) rotateImage:(UIImage*)image orientation:(UIImageOrientation) orient;\n@end\n\
    ```\n"
- fmt: "There should be two compiler errors in your `AppDelegate` class. They are\
    \ caused by the missing property and method in the action layer. Switch over to\
    \ `ActionLayer.h` and add the code from [Listing 8–30](#Chapter08.html#list_8_30)\
    \ to the header.\n\n**Listing 8–30.** *Add to ActionLayer.h*\n\n```objc\n@property\
    \ (nonatomic) BOOL isProcessingRequest;\n- (void)facialRecognitionRequest:(UIImage\
    \ *)image;\n```\n\nThese are the two missing elements from our `AppDelegate`.\
    \ Switch over to `ActionLayer.m`. Import `AppDelegate.h` and synthesize the `isProcessingRequest`\
    \ Boolean. Update the `init` method as shown in [Listing 8–31](#Chapter08.html#list_8_31).\n\
    \n**Listing 8–31.** *Updated init Method*\n\n```objc\n- (id)init {\n    if ((self\
    \ = [super init])) {        \n        isProcessingRequest = NO;\n        [AppDelegate\
    \ instance].actionLayer = self;\n        [AppDelegate instance].isPlaying = YES;\n\
    \    }\n    return self;\n}  \n```\n\nWe removed the code that created the message\
    \ to the pumpkins, and added a few default variables. You'll notice this new instance\
    \ method from our `AppDelegate` class shows a warning. We haven't yet implemented\
    \ that static method, so disregard that for now. If you tried to compile, you\
    \ would also get an error due to the missing static `instance` method, which we'll\
    \ implement in a moment. Implement the `facialRecognitionRequest` method, as shown\
    \ in [Listing 8–32](#Chapter08.html#list_8_32).\n\n**Listing 8–32.** *facialRecognitionRequest\
    \ Method*\n\n```objc\n- (void)facialRecognitionRequest:(UIImage *)image {\n  \
    \  NSLog(@\"Image is: %f by %f\", image.size.width, image.size.height);\n}   \n\
    ```\n\nFor now, we're just going to log the event with some details to make sure\
    \ we're receiving a proper image. Open `AppDelegate.h` in Xcode and declare the\
    \ static method shown in [Listing 8–33](#Chapter08.html#list_8_33).\n\n**Listing\
    \ 8–33.** *Static instance Method for AppDelegate.h*\n\n```objc\n+ (AppDelegate\
    \ *)instance;\n```\n\nThis method is inconsequential to the goal of this project.\
    \ It's more of a habit with my implementations. It provides a simple way to get\
    \ the singleton representation of the `AppDelegate` without too much effort. Switch\
    \ over to `AppDelegate.m` and add the method from [Listing 8–34](#Chapter08.html#list_8_34).\n\
    \n**Listing 8–34.** *Static instance Method for AppDelegate.m*\n\n```objc\n+ (AppDelegate\
    \ *)instance {\n    return (AppDelegate *)[[UIApplication sharedApplication] delegate];\n\
    }\n```\n\nWhile you're in the `AppDelegate.m` file, make sure you've synthesized\
    \ the `actionLayer` property we set up earlier. Go ahead and run the project on\
    \ a physical device (preferably an iPad 2). You will see a welcome menu, as shown\
    \ in [Figure 8–14](#Chapter08.html#fig_8_14).\n\n![Image](images/0814.jpg)\n\n\
    **Figure 8–14** *Run the project again to see the game menu with camera background.*\n\
    \nIf you click the New Game menu, you can watch your debug console for updates.\
    \ You should see tons of messages coming through, as illustrated in [Figure 8–15](#Chapter08.html#fig_8_15).\n\
    \n![Image](images/0815.jpg)\n\n**Figure 8–15** *Watch the screen buffer logging\
    \ messages.*\n\nYou can see that our call to the action layer is happening frequently.\
    \ In fact, this would be a good area for improvement. Slowing down the processes\
    \ that make it to the action layer could help our game perform more optimally.\n\
    \n### Finishing the Action Layer\n\nLet's think about what else we might need\
    \ to make this game have some structure. We are missing the pumpkins, obviously.\
    \ But, otherwise, we should implement some sort of counter to keep track of how\
    \ many alien pumpkins have been eliminated. There are 12 different pumpkin images\
    \ in our sprite sheet. Let's set this as a countdown-type game in which the user\
    \ has to eliminate each of the 12 pumpkins before the game is over.\n\nFirst,\
    \ let's tackle the facial recognition problem. We're going to use a class that\
    \ is new to iOS 5 called `CIDetector`. We'll discuss this in more detail in [Chapter\
    \ 12](#Chapter12.html#ch12). In `ActionLayer.h`, add the property from [Listing\
    \ 8–35](#Chapter08.html#list_8_35).\n\n**Listing 8–35.** *CIDetector Property*\n\
    \n```objc\n@property (nonatomic, retain) CIDetector *detector;\n```\n\nOpen `ActionLayer.m`\
    \ and synthesize the property. Inside the `if` block in the `init` method, add\
    \ the code from [Listing 8–36](#Chapter08.html#list_8_36).\n\n**Listing 8–36.**\
    \ *Set Up the CIDetector*\n\n```objc\nNSDictionary *detectorOptions = [NSDictionary\
    \ dictionaryWithObjectsAndKeys:CIDetectorAccuracyLow, CIDetectorAccuracy, nil];\n\
    \        self.detector = [CIDetector detectorOfType:CIDetectorTypeFace context:nil\
    \ options:detectorOptions];\n```\n\nAs I mentioned, we'll discuss this class in\
    \ more detail in [Chapter 12](#Chapter12.html#ch12). For now, you need to know\
    \ that the `CIDetector` tracks the x, y coordinates of faces it recognizes in\
    \ images. In our case, we'll be using it to track faces in the camera view. Update\
    \ the `facialRecognitionRequest` method, as shown in [Listing 8–37](#Chapter08.html#list_8_37).\n\
    \n**Listing 8–37.** *Updated facialRecognitionRequest Method*\n\n```objc\n- (void)facialRecognitionRequest:(UIImage\
    \ *)image {\n    if (!isProcessingRequest) {\n        isProcessingRequest = YES;\n\
    \        NSArray *arr = [detector featuresInImage:[CIImage imageWithCGImage:[image\
    \ CGImage]]];\n\n        if ([arr count] > 0) {\n            NSLog(@\"Faces found.\"\
    );\n        } else {\n            NSLog(@\"No faces found\");\n        }    \n\
    \    }\n    isProcessingRequest = NO;\n}\n```\n\nI know I said we'd talk about\
    \ this later, but the small amount of code required to process an image for facial\
    \ recognition is pretty impressive. The line in bold is really all it takes. If\
    \ we find a face in the camera view, we log to the console. The same thing happens\
    \ if we don't find a face.\n\nGo ahead and run the application again on a physical\
    \ device. You should see console output similar to [Figure 8–16](#Chapter08.html#fig_8_16).\n\
    \n![Image](images/0816.jpg)\n\n**Figure 8–16** *View the screen buffer logging\
    \ messages, and notice the “Faces found” messages.*\n\nIt looks like things are\
    \ working. Let's add the logic to display the pumpkins on the target's face."
  raw: 'There should be two compiler errors in your `AppDelegate` class. They are
    caused by the missing property and method in the action layer. Switch over to
    `ActionLayer.h` and add the code from [Listing 8–30](#Chapter08.html#list_8_30)
    to the header.


    **Listing 8–30.** *Add to ActionLayer.h*


    `@property (nonatomic) BOOL isProcessingRequest;`

    `- (void)facialRecognitionRequest:(UIImage *)image;`


    These are the two missing elements from our `AppDelegate`. Switch over to `ActionLayer.m`.
    Import `AppDelegate.h` and synthesize the `isProcessingRequest` Boolean. Update
    the `init` method as shown in [Listing 8–31](#Chapter08.html#list_8_31).


    **Listing 8–31.** *Updated init Method*


    `- (id)init {`

    `    if ((self = [super init])) {        `

    `        isProcessingRequest = NO;`

    `        [AppDelegate instance].actionLayer = self;`

    `        [AppDelegate instance].isPlaying = YES;`

    `    }`

    `    return self;`

    `}  `


    We removed the code that created the message to the pumpkins, and added a few
    default variables. You''ll notice this new instance method from our `AppDelegate`
    class shows a warning. We haven''t yet implemented that static method, so disregard
    that for now. If you tried to compile, you would also get an error due to the
    missing static `instance` method, which we''ll implement in a moment. Implement
    the `facialRecognitionRequest` method, as shown in [Listing 8–32](#Chapter08.html#list_8_32).


    **Listing 8–32.** *facialRecognitionRequest Method*


    `- (void)facialRecognitionRequest:(UIImage *)image {`

    `    NSLog(@"Image is: %f by %f", image.size.width, image.size.height);`

    `}   `


    For now, we''re just going to log the event with some details to make sure we''re
    receiving a proper image. Open `AppDelegate.h` in Xcode and declare the static
    method shown in [Listing 8–33](#Chapter08.html#list_8_33).


    **Listing 8–33.** *Static instance Method for AppDelegate.h*


    `+ (AppDelegate *)instance;`


    This method is inconsequential to the goal of this project. It''s more of a habit
    with my implementations. It provides a simple way to get the singleton representation
    of the `AppDelegate` without too much effort. Switch over to `AppDelegate.m` and
    add the method from [Listing 8–34](#Chapter08.html#list_8_34).


    **Listing 8–34.** *Static instance Method for AppDelegate.m*


    `+ (AppDelegate *)instance {`

    `    return (AppDelegate *)[[UIApplication sharedApplication] delegate];`

    `}`


    While you''re in the `AppDelegate.m` file, make sure you''ve synthesized the `actionLayer`
    property we set up earlier. Go ahead and run the project on a physical device
    (preferably an iPad 2). You will see a welcome menu, as shown in [Figure 8–14](#Chapter08.html#fig_8_14).


    ![Image](images/0814.jpg)


    **Figure 8–14** *Run the project again to see the game menu with camera background.*


    If you click the New Game menu, you can watch your debug console for updates.
    You should see tons of messages coming through, as illustrated in [Figure 8–15](#Chapter08.html#fig_8_15).


    ![Image](images/0815.jpg)


    **Figure 8–15** *Watch the screen buffer logging messages.*


    You can see that our call to the action layer is happening frequently. In fact,
    this would be a good area for improvement. Slowing down the processes that make
    it to the action layer could help our game perform more optimally.


    ### Finishing the Action Layer


    Let''s think about what else we might need to make this game have some structure.
    We are missing the pumpkins, obviously. But, otherwise, we should implement some
    sort of counter to keep track of how many alien pumpkins have been eliminated.
    There are 12 different pumpkin images in our sprite sheet. Let''s set this as
    a countdown-type game in which the user has to eliminate each of the 12 pumpkins
    before the game is over.


    First, let''s tackle the facial recognition problem. We''re going to use a class
    that is new to iOS 5 called `CIDetector`. We''ll discuss this in more detail in
    [Chapter 12](#Chapter12.html#ch12). In `ActionLayer.h`, add the property from
    [Listing 8–35](#Chapter08.html#list_8_35).


    **Listing 8–35.** *CIDetector Property*


    `@property (nonatomic, retain) CIDetector *detector;`


    Open `ActionLayer.m` and synthesize the property. Inside the `if` block in the
    `init` method, add the code from [Listing 8–36](#Chapter08.html#list_8_36).


    **Listing 8–36.** *Set Up the CIDetector*


    `NSDictionary *detectorOptions = [NSDictionary dictionaryWithObjectsAndKeys:CIDetectorAccuracyLow,
    CIDetectorAccuracy, nil];`

    `        self.detector = [CIDetector detectorOfType:CIDetectorTypeFace context:nil
    options:detectorOptions];`


    As I mentioned, we''ll discuss this class in more detail in [Chapter 12](#Chapter12.html#ch12).
    For now, you need to know that the `CIDetector` tracks the x, y coordinates of
    faces it recognizes in images. In our case, we''ll be using it to track faces
    in the camera view. Update the `facialRecognitionRequest` method, as shown in
    [Listing 8–37](#Chapter08.html#list_8_37).


    **Listing 8–37.** *Updated facialRecognitionRequest Method*


    `- (void)facialRecognitionRequest:(UIImage *)image {`

    `    if (!isProcessingRequest) {`

    `        isProcessingRequest = YES;`

    **`        NSArray *arr = [detector featuresInImage:[CIImage imageWithCGImage:[image
    CGImage]]];`**


    `        if ([arr count] > 0) {`

    `            NSLog(@"Faces found.");`

    `        } else {`

    `            NSLog(@"No faces found");`

    `        }    `

    `    }`

    `    isProcessingRequest = NO;`

    `}`


    I know I said we''d talk about this later, but the small amount of code required
    to process an image for facial recognition is pretty impressive. The line in bold
    is really all it takes. If we find a face in the camera view, we log to the console.
    The same thing happens if we don''t find a face.


    Go ahead and run the application again on a physical device. You should see console
    output similar to [Figure 8–16](#Chapter08.html#fig_8_16).


    ![Image](images/0816.jpg)


    **Figure 8–16** *View the screen buffer logging messages, and notice the “Faces
    found” messages.*


    It looks like things are working. Let''s add the logic to display the pumpkins
    on the target''s face.'
  trans: "\n你的 `AppDelegate` 类中应该会出现两个编译器错误。它们是由动作层中缺少的属性和方法引起的。请切换到 `ActionLayer.h`，并将代码清单\
    \ 8-30 中的代码添加到头文件中。\n\n**代码清单 8-30.** *添加到 ActionLayer.h*\n\n```objc\n@property\
    \ (nonatomic) BOOL isProcessingRequest;\n- (void)facialRecognitionRequest:(UIImage\
    \ *)image;\n```\n\n这两个元素正是我们的 `AppDelegate` 中所缺失的。切换到 `ActionLayer.m`。导入 `AppDelegate.h`\
    \ 并合成 `isProcessingRequest` 布尔属性。按代码清单 8-31 所示更新 `init` 方法。\n\n**代码清单 8-31.**\
    \ *更新后的 init 方法*\n\n```objc\n- (id)init {\n    if ((self = [super init])) {  \
    \      \n        isProcessingRequest = NO;\n        [AppDelegate instance].actionLayer\
    \ = self;\n        [AppDelegate instance].isPlaying = YES;\n    }\n    return\
    \ self;\n}  \n```\n\n我们移除了向南瓜发送消息的代码，并添加了几个默认变量。你会注意到，这个来自 `AppDelegate` 类的新实例方法显示了一个警告。我们尚未实现那个静态方法，所以暂时忽略它。如果你尝试编译，还会因为缺少静态的\
    \ `instance` 方法而出现错误，我们稍后会实现它。按代码清单 8-32 所示实现 `facialRecognitionRequest` 方法。\n\
    \n**代码清单 8-32.** *facialRecognitionRequest 方法*\n\n```objc\n- (void)facialRecognitionRequest:(UIImage\
    \ *)image {\n    NSLog(@\"Image is: %f by %f\", image.size.width, image.size.height);\n\
    }   \n```\n\n目前，我们只是记录该事件的一些详细信息，以确保我们接收到的是正确的图像。在 Xcode 中打开 `AppDelegate.h`，并声明代码清单\
    \ 8-33 中所示的静态方法。\n\n**代码清单 8-33.** *AppDelegate.h 的静态 instance 方法*\n\n```objc\n\
    + (AppDelegate *)instance;\n```\n\n这个方法对于本项目的目标来说并不重要，更多是我个人实现习惯的体现。它提供了一种无需太多功夫就能获取\
    \ `AppDelegate` 单例的简单方式。切换到 `AppDelegate.m`，并添加代码清单 8-34 中的方法。\n\n**代码清单 8-34.**\
    \ *AppDelegate.m 的静态 instance 方法*\n\n```objc\n+ (AppDelegate *)instance {\n  \
    \  return (AppDelegate *)[[UIApplication sharedApplication] delegate];\n}\n```\n\
    \n在 `AppDelegate.m` 文件中，请确保已合成了我们之前设置的 `actionLayer` 属性。继续在实体设备（最好是 iPad 2）上运行项目。你将看到一个欢迎菜单，如图\
    \ 8-14 所示。\n\n![Image](img/0814.jpg)\n\n**图 8-14** *再次运行项目，查看带有相机背景的游戏菜单。*\n\n\
    如果你点击“新游戏”菜单，可以观察调试控制台的更新。你应该会看到大量消息输出，如图 8-15 所示。\n\n![Image](img/0815.jpg)\n\
    \n**图 8-15** *观察屏幕缓冲日志信息。*\n\n你可以看到，我们对动作层的调用非常频繁。实际上，这是一个很好的优化点。降低进入动作层的处理频率，有助于让我们的游戏运行得更高效。\n\
    \n### 完成动作层\n\n让我们思考一下，为了让这个游戏具备一定结构，我们还需要什么。显然，我们缺少南瓜。但除此之外，我们应该实现某种计数器，用来追踪已经消灭了多少个外星南瓜。我们的精灵表单中有\
    \ 12 张不同的南瓜图像。让我们将其设置为倒计时类型的游戏，即用户必须在游戏结束前消灭全部 12 个南瓜。\n\n首先，我们来解决面部识别问题。我们将使用\
    \ iOS 5 中新增的一个类——`CIDetector`。我们将在第 12 章中更详细地讨论它。在 `ActionLayer.h` 中，添加代码清单 8-35\
    \ 中的属性。\n\n**代码清单 8-35.** *CIDetector 属性*\n\n```objc\n@property (nonatomic, retain)\
    \ CIDetector *detector;\n```\n\n打开 `ActionLayer.m` 并合成该属性。在 `init` 方法的 `if` 块内部，添加代码清单\
    \ 8-36 中的代码。\n\n**代码清单 8-36.** *设置 CIDetector*\n\n```objc\nNSDictionary *detectorOptions\
    \ = [NSDictionary dictionaryWithObjectsAndKeys:CIDetectorAccuracyLow, CIDetectorAccuracy,\
    \ nil];\n        self.detector = [CIDetector detectorOfType:CIDetectorTypeFace\
    \ context:nil options:detectorOptions];\n```\n\n正如我所提到的，我们将在第 12 章中更详细地讨论这个类。现在，你只需要知道\
    \ `CIDetector` 会追踪它在图像中识别到的面部的 x、y 坐标。在我们的案例中，我们将用它来追踪相机视图中的面部。按代码清单 8-37 所示更新\
    \ `facialRecognitionRequest` 方法。\n\n**代码清单 8-37.** *更新后的 facialRecognitionRequest\
    \ 方法*\n\n```objc\n- (void)facialRecognitionRequest:(UIImage *)image {\n    if\
    \ (!isProcessingRequest) {\n        isProcessingRequest = YES;\n        NSArray\
    \ *arr = [detector featuresInImage:[CIImage imageWithCGImage:[image CGImage]]];\n\
    \n        if ([arr count] > 0) {\n            NSLog(@\"Faces found.\");\n    \
    \    } else {\n            NSLog(@\"No faces found\");\n        }    \n    }\n\
    \    isProcessingRequest = NO;\n}\n```\n\n我知道我说过稍后再讨论，但处理图像进行面部识别所需的代码量之少，实在令人印象深刻。加粗的那一行代码就是全部所需。如果我们在相机视图中找到了面部，就记录到控制台；如果没找到，也同样记录。\n\
    \n继续在实体设备上再次运行应用程序。你应该会看到类似图 8-16 所示的控制台输出。\n\n![Image](img/0816.jpg)\n\n**图 8-16**\
    \ *查看屏幕缓冲日志信息，并注意“Faces found.”消息。*\n\n看起来一切正常。让我们添加逻辑，将南瓜显示在目标的面部上。\n"
- fmt: "### Here Come the Pumpkins\n\nWe're going to allow for only one alien pumpkin\
    \ to be present at any given time. Basically, the first face we find is the unlucky\
    \ victim of a pumpkin takeover.\n\nTo manage this, we're going to add a pumpkin\
    \ to the screen and make him invisible. When we detect a face, we'll move the\
    \ pumpkin to the coordinates of the face and we'll set the pumpkin back to opaque\
    \ so he shows up in our camera view.\n\nOpen `ActionLayer.h`. Declare the private\
    \ variables shown in [Listing 8–38](#Chapter08.html#list_8_38).\n\n**Listing 8–38.**\
    \ *New private Variables*\n\n```\nCCSpriteBatchNode *pumpkinBatchNode;\nCCSprite\
    \ *pumpkin;\nint pumpkin_count;\n```\n\nThese variables will be used to set up\
    \ our initial pumpkin image. Like before, we'll be using a `CCSpriteBatchNode`\
    \ to hold our images. The `pumpkin_count` integer will be used to track backward\
    \ from 12, so we know how many alien pumpkins are left to destroy. Switch over\
    \ to `ActionLayer.m`. Update the `init` method as shown in [Listing 8–39](#Chapter08.html#list_8_39).\n\
    \n**Listing 8–39.** *New init Method*\n\n```\n- (id)init {\n    if (self = [super\
    \ init]) {\n        //CGSize winSize = [CCDirector sharedDirector].winSize;\n\n\
    \        NSDictionary *detectorOptions = [NSDictionary dictionaryWithObjectsAndKeys:CIDetectorAccuracyLow,\
    \ CIDetectorAccuracy, nil];\n        self.detector = [CIDetector detectorOfType:CIDetectorTypeFace\
    \ context:nil options:detectorOptions];\n\n        pumpkinBatchNode = [CCSpriteBatchNode\
    \ batchNodeWithFile:@\"pumpkins.png\"];\n        [self addChild:pumpkinBatchNode];\n\
    \n        pumpkin = [CCSprite spriteWithSpriteFrameName:@\"pumpkin5.png\"];\n\
    \        pumpkin.position = ccp(0,0);\n        pumpkin.opacity = 0;\n        [self\
    \ addChild:pumpkin];\n\n        // Start the game\n        isProcessingRequest\
    \ = NO;\n        pumpkin_count = 12;\n        [AppDelegate instance].actionLayer\
    \ = self;\n        [AppDelegate instance].isPlaying = YES;\n\n        self.isTouchEnabled\
    \ = YES;\n    }\n    return self;\n}\n```\n\nHere, we set up our `CCSpriteBatchNode`\
    \ with the same sprite sheet we used earlier. Then we initialize the pumpkin variable\
    \ as a new `CCSprite` using the `pumpkin5.png` frame from our sprite sheet. We\
    \ then set it to transparent and add it to the scene.\n\nMake sure your project\
    \ is still building without errors. There's nothing new to see yet, so it's no\
    \ use running it on a device. Update the `facialRecognitionRequest` method, as\
    \ shown in [Listing 8–40](#Chapter08.html#list_8_40).\n\n**Listing 8–40.** *New\
    \ facialRecognitionRequest Method*\n\n```\n- (void)facialRecognitionRequest:(UIImage\
    \ *)image {\n    //NSLog(@\"Image is: %f by %f\", image.size.width, image.size.height);\n\
    \n    if (!isProcessingRequest) {\n        isProcessingRequest = YES;\n      \
    \  //NSLog(@\"Detecting Faces\");\n        NSArray *arr = [detector featuresInImage:[CIImage\
    \ imageWithCGImage:[image CGImage]]];\n\n        if ([arr count] > 0) {\n    \
    \        //NSLog(@\"Faces found.\");\n            for (int i = 0; i < 1; i++)\
    \ { //< [arr count]; i++) {\n                CIFaceFeature *feature = [arr objectAtIndex:i];\n\
    \                double xPosition = (feature.leftEyePosition.x + feature.rightEyePosition.x+feature.mouthPosition.x)/(3*image.size.width)\
    \ ;\n                double yPosition = (feature.leftEyePosition.y + feature.rightEyePosition.y+feature.mouthPosition.y)/(3*image.size.height);\n\
    \n                double dist = sqrt(pow((feature.leftEyePosition.x - feature.rightEyePosition.x),2)+pow((feature.leftEyePosition.y\
    \ - feature.rightEyePosition.y),2))/image.size.width;\n\n                yPosition\
    \ += dist;\n                CGSize size = [[CCDirector sharedDirector] winSize];\n\
    \                pumpkin.opacity = 255;\n                pumpkin.scale = 5*(size.width*dist)/256.0;\n\
    \n              [pumpkin setDisplayFrame:[[CCSpriteFrameCache sharedSpriteFrameCache]\n\
    spriteFrameByName:[NSString stringWithFormat:@\"pumpkin%d.png\", pumpkin_count\
    \ + 4]]];\n                CCMoveTo *moveAction = [CCMoveTo actionWithDuration:0\n\
    position:ccp((size.width * (xPosition)), (size.height * ((yPosition))))];\n  \
    \              [pumpkin runAction:moveAction];\n            }\n        } else\
    \ {\n            pumpkin.opacity = 0;\n        }    \n    }\n    isProcessingRequest\
    \ = NO;\n}\n```\n\nThis is the most important code block of the whole game, so\
    \ let's step through it slowly. First, we check to see whether a current request\
    \ is in progress. If not, we run the `CIDetector` methods to find the faces in\
    \ the camera image. If at least one face is found, we continue forward.\n\nAt\
    \ this point, I'm actually hard-coding a loop of no more than one iteration. If\
    \ you want to extend this game, this would be another area for improvement. Implement\
    \ a randomizer in the place of this loop and chose a random pumpkin to attach\
    \ to a random target in the camera view. There could be a significant amount of\
    \ processing to track which user has which pumpkin on their head, but it would\
    \ make for a more robust gaming experience.\n\nNext, we triple the X and Y coordinates\
    \ of the eyes that `CIDetector` found to better place our pumpkin on the top of\
    \ the actual image on the screen, and not the image we're processing, which is\
    \ smaller in ratio.\n\nWe calculate the distance using the good old Pythagorean\
    \ theorem and divide it by the width of the screen. This helps us scale the image\
    \ so that it fits your face as you move away from the screen. Try this yourself\
    \ when you run the application. The pumpkin will follow you to and from the screen\
    \ and scale appropriately.\n\nFinally, we set the `opacity` back to `255` (so\
    \ it's visible) and move the sprite to the location where we found the face. We're\
    \ using two cocos2D macros to simplify this step. We first set the sprite frame\
    \ to the `pumpkin_count` image (we'll get back to this in a moment), and then\
    \ we use the `CCMoveTo` action to move the sprite to the X, Y coordinates of the\
    \ face.\n\nRun the application on a physical device. Start the game by choosing\
    \ New Game from the menu options. You'll see something similar to [Figure 8–17](#Chapter08.html#fig_8_17).\n\
    \n![Image](images/0817.jpg)\n\n**Figure 8–17** *Dude, I'm a pumpkin!*\n\nI'm not\
    \ sure I like being a pumpkin. Earlier, we set the `ActionLayer` class to be touch\
    \ enabled, but we never implemented the response methods. Declare a new private\
    \ variable of the `CCParticleSystemQuad` class called `emitter` in the `ActionLayer.h`\
    \ file. Open `ActionLayer.m` and add the methods from [Listing 8–41](#Chapter08.html#list_8_41).\n\
    \n**Listing 8–41.** *Touch Methods*\n\n```\n- (void)registerWithTouchDispatcher\
    \ {\n    [[CCTouchDispatcher sharedDispatcher] addTargetedDelegate:self priority:0\
    \ swallowsTouches:YES];\n}\n\n- (BOOL)ccTouchBegan:(UITouch *)touch withEvent:(UIEvent\
    \ *)event {\n    return YES;\n}\n\n- (void)ccTouchEnded:(UITouch *)touch withEvent:(UIEvent\
    \ *)event {\n    CGPoint location = [self convertTouchToNodeSpace:touch];\n  \
    \  if (CGRectContainsPoint(pumpkin.boundingBox, location)) {\n        pumpkin_count--;\n\
    \n        emitter = [CCParticleSystemQuad particleWithFile:@\"PumpkinExplosion.plist\"\
    ];\n        emitter.position = ccp(location.x, location.y);\n        [self addChild:emitter\
    \ z:1];\n\n        if (pumpkin_count == 0) {\n            NSLog(@\"You won\");\n\
    \        }\n    }\n    //NSLog(@\"Touch %@: \", NSStringFromCGPoint(location));\n\
    }\n```\n\nEarlier in the chapter, we imported the Art directory from the sample\
    \ project. I also created a particle effect using Particle Designer (from [`www.71squared.com`](http://www.71squared.com))\
    \ to vaporize the pumpkins.\n\nWhen a pumpkin is vaporized, we want to subtract\
    \ from the number of remaining pumpkins and change the pumpkin's image (so we\
    \ see each pumpkin once during the game)."
  raw: '### Here Come the Pumpkins


    We''re going to allow for only one alien pumpkin to be present at any given time.
    Basically, the first face we find is the unlucky victim of a pumpkin takeover.


    To manage this, we''re going to add a pumpkin to the screen and make him invisible.
    When we detect a face, we''ll move the pumpkin to the coordinates of the face
    and we''ll set the pumpkin back to opaque so he shows up in our camera view.


    Open `ActionLayer.h`. Declare the private variables shown in [Listing 8–38](#Chapter08.html#list_8_38).


    **Listing 8–38.** *New private Variables*


    `CCSpriteBatchNode *pumpkinBatchNode;`

    `CCSprite *pumpkin;`

    `int pumpkin_count;`


    These variables will be used to set up our initial pumpkin image. Like before,
    we''ll be using a `CCSpriteBatchNode` to hold our images. The `pumpkin_count`
    integer will be used to track backward from 12, so we know how many alien pumpkins
    are left to destroy. Switch over to `ActionLayer.m`. Update the `init` method
    as shown in [Listing 8–39](#Chapter08.html#list_8_39).


    **Listing 8–39.** *New init Method*


    `- (id)init {`

    `    if (self = [super init]) {`

    `        //CGSize winSize = [CCDirector sharedDirector].winSize;`


    `        NSDictionary *detectorOptions = [NSDictionary dictionaryWithObjectsAndKeys:CIDetectorAccuracyLow,
    CIDetectorAccuracy, nil];`

    `        self.detector = [CIDetector detectorOfType:CIDetectorTypeFace context:nil
    options:detectorOptions];`


    **`        pumpkinBatchNode = [CCSpriteBatchNode batchNodeWithFile:@"pumpkins.png"];`**

    **`        [self addChild:pumpkinBatchNode];`**


    **`        pumpkin = [CCSprite spriteWithSpriteFrameName:@"pumpkin5.png"];`**

    **`        pumpkin.position = ccp(0,0);`**

    **`        pumpkin.opacity = 0;`**

    **`        [self addChild:pumpkin];`**


    `        // Start the game`

    `        isProcessingRequest = NO;`

    **`pumpkin_count = 12;`**

    `        [AppDelegate instance].actionLayer = self;`

    `        [AppDelegate instance].isPlaying = YES;`


    `        self.isTouchEnabled = YES;`

    `    }`

    `    return self;`

    `}`


    Here, we set up our `CCSpriteBatchNode` with the same sprite sheet we used earlier.
    Then we initialize the pumpkin variable as a new `CCSprite` using the `pumpkin5.png`
    frame from our sprite sheet. We then set it to transparent and add it to the scene.


    Make sure your project is still building without errors. There''s nothing new
    to see yet, so it''s no use running it on a device. Update the `facialRecognitionRequest`
    method, as shown in [Listing 8–40](#Chapter08.html#list_8_40).


    **Listing 8–40.** *New facialRecognitionRequest Method*


    `- (void)facialRecognitionRequest:(UIImage *)image {`

    `    //NSLog(@"Image is: %f by %f", image.size.width, image.size.height);`


    `    if (!isProcessingRequest) {`

    `        isProcessingRequest = YES;`

    `        //NSLog(@"Detecting Faces");`

    `        NSArray *arr = [detector featuresInImage:[CIImage imageWithCGImage:[image
    CGImage]]];`


    `        if ([arr count] > 0) {`

    `            //NSLog(@"Faces found.");`

    `            for (int i = 0; i < 1; i++) { //< [arr count]; i++) {`

    `                CIFaceFeature *feature = [arr objectAtIndex:i];`

    `                double xPosition = (feature.leftEyePosition.x + feature.rightEyePosition.x+feature.mouthPosition.x)/(3*image.size.width)
    ;`

    `                double yPosition = (feature.leftEyePosition.y + feature.rightEyePosition.y+feature.mouthPosition.y)/(3*image.size.height);`


    `                double dist = sqrt(pow((feature.leftEyePosition.x - feature.rightEyePosition.x),2)+pow((feature.leftEyePosition.y
    - feature.rightEyePosition.y),2))/image.size.width;`


    `                yPosition += dist;`

    `                CGSize size = [[CCDirector sharedDirector] winSize];`

    `                pumpkin.opacity = 255;`

    `                pumpkin.scale = 5*(size.width*dist)/256.0;`


    `              [pumpkin setDisplayFrame:[[CCSpriteFrameCache sharedSpriteFrameCache]`

    `spriteFrameByName:[NSString stringWithFormat:@"pumpkin%d.png", pumpkin_count
    + 4]]];`

    `                CCMoveTo *moveAction = [CCMoveTo actionWithDuration:0`

    `position:ccp((size.width * (xPosition)), (size.height * ((yPosition))))];`

    `                [pumpkin runAction:moveAction];`

    `            }`

    `        } else {`

    `            pumpkin.opacity = 0;`

    `        }    `

    `    }`

    `    isProcessingRequest = NO;`

    `}`


    This is the most important code block of the whole game, so let''s step through
    it slowly. First, we check to see whether a current request is in progress. If
    not, we run the `CIDetector` methods to find the faces in the camera image. If
    at least one face is found, we continue forward.


    At this point, I''m actually hard-coding a loop of no more than one iteration.
    If you want to extend this game, this would be another area for improvement. Implement
    a randomizer in the place of this loop and chose a random pumpkin to attach to
    a random target in the camera view. There could be a significant amount of processing
    to track which user has which pumpkin on their head, but it would make for a more
    robust gaming experience.


    Next, we triple the X and Y coordinates of the eyes that `CIDetector` found to
    better place our pumpkin on the top of the actual image on the screen, and not
    the image we''re processing, which is smaller in ratio.


    We calculate the distance using the good old Pythagorean theorem and divide it
    by the width of the screen. This helps us scale the image so that it fits your
    face as you move away from the screen. Try this yourself when you run the application.
    The pumpkin will follow you to and from the screen and scale appropriately.


    Finally, we set the `opacity` back to `255` (so it''s visible) and move the sprite
    to the location where we found the face. We''re using two cocos2D macros to simplify
    this step. We first set the sprite frame to the `pumpkin_count` image (we''ll
