  trans: "\n### 使用相机\n\n在 Xcode 中切换到 `PhotoViewController.m`。在文件底部，我们在前面步骤中添加的操作方法目前为空。按照代码清单\
    \ 6-2 所示展开该方法。\n\n**代码清单 6-2.** *loadPhotoPicker 方法*\n\n```\n- (IBAction)loadPhotoPicker:(id)sender\
    \ {\n    UIImagePickerController *imagePicker = [[UIImagePickerController alloc]\
    \ init];\n    imagePicker.sourceType =  UIImagePickerControllerSourceTypeCamera;\n\
    \    // uncomment for front camera\n    // imagePicker.cameraDevice = UIImagePickerControllerCameraDeviceFront;\n\
    \    imagePicker.delegate = self;\n    imagePicker.allowsEditing = NO;\n    [self\
    \ presentModalViewController:imagePicker animated:YES];\n}\n```\n\n该方法首先创建 `UIImagePickerController`\
    \ 类的实例。该类实质上会打开我们在 iOS 系统中熟悉的相机界面。我们将 `sourceType` 属性设置为后置摄像头。如果你希望将其设置为前置摄像头（再次提醒，首先应确认设备支持前置摄像头），可以取消注释该行下方的代码。\n\
    \n接下来，我们将 `delegate` 设置为 `self`，并禁止对图片选择器进行编辑。然后，我们以模态对话框的形式将 `UIImagePickerController`\
    \ 呈现给 `PhotoViewController`。\n\n如果现在运行此代码，图片选择器（相机）会显示出来，但不会保存任何内容。将代码清单 6-3 中的方法添加到实现文件中。\n\
    \n**代码清单 6-3.** *保存照片图像的方法*\n\n```\n- (void) imagePickerController:(UIImagePickerController\
    \ *)picker didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    UIImage\
    \ *image = [info objectForKey:@\"UIImagePickerControllerOriginalImage\"];\n  \
    \  UIImageWriteToSavedPhotosAlbum(image, self,\n                             \
    \      @selector(image:didFinishSavingWithError:contextInfo:), nil);\n}\n\n- (void)image:(UIImage\
    \ *)image didFinishSavingWithError:(NSError *)error contextInfo:(void *)contextInfo\n\
    {\n    UIAlertView *alert;\n    if (error) {\n        alert = [[UIAlertView alloc]\
    \ initWithTitle:@\"错误\"\n                                           message:@\"\
    无法将图像保存到相册。\"\n                                          delegate:self cancelButtonTitle:@\"\
    确定\"\n                                 otherButtonTitles:nil];\n    } else {\n\
    \        alert = [[UIAlertView alloc] initWithTitle:@\"成功\"\n                \
    \                           message:@\"图像已保存到相册。\"\n                         \
    \                 delegate:self cancelButtonTitle:@\"确定\"\n                  \
    \               otherButtonTitles:nil];\n    }\n    [alert show];\n    [self dismissModalViewControllerAnimated:YES];\n\
    }\n```\n\n第一个方法是 `UIImagePickerController` 类的委托方法。当从控制器中选择图像时，该方法会被触发。我们为此图像分配一个对象，并将其传递给代码清单\
    \ 6-3 中所示的第二个方法。\n\n第二个方法，即文件保存后设置的 selector 方法，会检查是否存在错误，并通过 `UIAlertView` 控件显示成功或失败消息。你可能会注意到我没有释放\
    \ `UIAlertView` 实例。当我们在本章前面创建项目时，启用了自动引用计数（Automatic Reference Counting）。自动引用计数（iOS5\
    \ 新增特性）禁止显式调用 `release` 方法。\n\n现在可以测试项目了。在 iPhone 或 iPad 设备上启动它。由于我们使用的是相机，该项目无法在模拟器上运行。\n\
    \n点击界面中间的按钮，拍摄一张照片，然后点击“使用”按钮来选择该照片。你将看到一个 `UIAlertView` 对话框，确认文件已正确保存。打开用于测试的\
    \ iPad 或 iPhone 上的“照片”应用，你会发现照片已保存在其中。\n\n### 以不同格式保存图像\n\n到目前为止，我们已经将图像保存到了照片库中。那么，如何将图像用于其他用途，比如物体识别或人脸识别呢？在本书后面的人脸识别章节中，我们将使用来自视频缓冲区的图像。UIKit\
    \ 包含几个 C 函数，可帮助将图像导出到 iOS 设备上的文件中。用于导出的两种最常用格式是 JPEG 和 PNG，因此我们先重点介绍这两种格式。\n\n\
    在 Xcode 中打开 `PhotoViewController.m`。找到 `didFinishPickingMediaWithInfo` 方法，并在方法末尾添加代码清单\
    \ 6-4 中的代码。\n\n**代码清单 6-4.** *转换并保存 UIImage 对象*\n\n```\n// start saving files\n\
    \    NSString  *pngPath = [NSHomeDirectory() stringByAppendingPathComponent:@\"\
    Documents/ConvertedPNG.png\"];\n    NSString  *jpgPath = [NSHomeDirectory() stringByAppendingPathComponent:@\"\
    Documents/ConvertedJPEG.jpg\"];\n    [UIImageJPEGRepresentation(image, 1.0) writeToFile:jpgPath\
    \ atomically:YES];\n    [UIImagePNGRepresentation(image) writeToFile:pngPath atomically:YES];\n\
    \    // optional (check for files)\n    NSError *error;\n    NSFileManager *fileMgr\
    \ = [NSFileManager defaultManager];\n    NSString *documentsDirectory = [NSHomeDirectory()\
    \ stringByAppendingPathComponent:@\"Documents\"];\n    NSLog(@\"Documents: %@\"\
    , [fileMgr contentsOfDirectoryAtPath:documentsDirectory error:&error]);\n```\n\
    \n首先，我们设置两个字符串，分别指向文件最终全路径的值。接着，我们使用 C 函数（`UIImageJPEGRepresentation` 和 `UIImagePNGRepresentation`）将文件写入相应路径。我们将图像压缩质量作为参数集的一部分传入。图像压缩质量按\
    \ 0.0 到 1.0 的等级衡量。因此，我们正在以最高质量和最低压缩比保存图像。\n\n使用实体设备运行该项目。确保控制台已打开，以便查看输出结果。图像保存后，你会看到类似图\
    \ 6-8 的内容。\n\n![图像](img/0608.jpg)\n\n**图 6-8.** *图像已保存、转换并存储。*\n"
- fmt: "### E-mailing an Image\n\nMaybe storing the file isn't quite enough and you'd\
    \ prefer to attach it to an e-mail message. If you want to e-mail a message programmatically,\
    \ you first need to import the `MessageUI` framework.\n\nClick your project name\
    \ in the Xcode navigator. Switch to the `Build Phases` tab and import the `MessageUI`\
    \ framework. Next, open `PhotoViewController.h` in Xcode and update the interface\
    \ as shown in [Listing 6–5](#Chapter06.html#list_6_5).\n\n**Listing 6–5.** *Updated\
    \ Interface for PhotoViewController*\n\n```\n#import <UIKit/UIKit.h>\n#import\
    \ <MessageUI/MessageUI.h>\n#import <MessageUI/MFMailComposeViewController.h>\n\
    \n@interface PhotoViewController : UIViewController <UINavigationControllerDelegate,\
    \ UIImagePickerControllerDelegate, MFMailComposeViewControllerDelegate> {\n}\n\
    - (IBAction)loadPhotoPicker:(id)sender;\n\n@end\n```\n\nWe imported a few headers\
    \ and nominated this class as an `MFMailComposeViewControllerDelegate` so we can\
    \ handle the event callback when the user sends the message. Add the methods from\
    \ [Listing 6–6](#Chapter06.html#list_6_6) to the implementation.\n\n**Listing\
    \ 6–6.** *Updated Interface for PhotoViewController*\n\n```\n- (void)sendEmailMessage:(UIImage\
    \ *)image\n{\n    NSLog(@\"Sending Email\");\n\n    MFMailComposeViewController\
    \ *picker = [[MFMailComposeViewController alloc] init];\n    picker.mailComposeDelegate\
    \ = self;\n\n    [picker setSubject:@\"iOS Augmented Reality - Chapter 6\"];\n\
    \n    [picker setToRecipients:[NSArray arrayWithObjects:@\"kyle.m.roche@gmail.com\"\
    , nil]];\n\n    NSString *emailBody = @\"Hi Kyle, this stuff actually works.\"\
    ;\n\n    [picker setMessageBody:emailBody isHTML:NO];\n\n    NSData *data = UIImagePNGRepresentation(image);\n\
    \n    [picker addAttachmentData:data mimeType:@\"image/png\" fileName:@\"Ch6ScreenShot\"\
    ];\n\n    [self presentModalViewController:picker animated:YES];\n}\n\n- (void)mailComposeController:(MFMailComposeViewController*)controller\
    \ didFinishWithResult:(MFMailComposeResult)result error:(NSError*)error\n{\n \
    \   [self dismissModalViewControllerAnimated:YES];\n}\n```\n\nLet's step through\
    \ each method, line by line. Let's start with the `sendEmailMessage` method. First\
    \ we allocate an `MFMailComposeViewController` object and set the `delegate` to\
    \ `self` so we can handle the callback events. Next, we set our `Subject`, `ToRecipients`\
    \ address, and `MessageBody` of the e-mail. Finally, we attach the photo to the\
    \ e-mail and present the drafted e-mail in a modal dialog to the user.\n\nNext,\
    \ we define another method called `didFinishWithResult`. This method is a delegate\
    \ method for the `MFMailComposeViewControllerDelegate` protocol. It is called\
    \ after the e-mail is actually sent by the user. When this event is fired, we\
    \ are removing the modal dialog because it is no longer needed.\n\nWe're almost\
    \ ready to test this code. First, we have to declare the `sendEmailMessage` method\
    \ so we can call it from within our implementation. Add the code from [Listing\
    \ 6–7](#Chapter06.html#list_6_7) after the `import` statements in `PhotoViewController.m`.\n\
    \n**Listing 6–7.** *Declare sendEmailMessage As a Private Method*\n\n```\n@interface\
    \ PhotoViewController (Private)\n- (void)sendEmailMessage:(UIImage *)image;\n\
    @end\n```\n\nAdd a call to the `sendEmailMessage` method at the end of the `didFinishSavingWithError`\
    \ method. If you try to run the code now, you will get an interesting result.\
    \ Everything will appear to work as expected, but you will get an error similar\
    \ to [Listing 6–8](#Chapter06.html#list_6_8) when the e-mail dialog should appear.\n\
    \n**Listing 6–8.** *Error Message*\n\n```\n2011-09-24 21:35:32.153 Ch6[1128:707]\
    \ Sending Email\n[Switching to process 9731 thread 0x2603]\nwait_fences: failed\
    \ to receive reply: 10004003\n```\n\nNot the most descriptive of errors, is it?\
    \ Here's what this means. Typically, the `wait_fences` message indicates a running\
    \ animation collided with a newly requested animation. In our case, we were just\
    \ dismissing a modal dialog with the `withAnimation` attribute set to `YES` as\
    \ we were trying to create a new modal dialog with the `withAnimation` attribute\
    \ set to `YES`. It doesn't matter how many times you try to run that project,\
    \ it will never pass that line of code successfully.\n\nSo, before testing this,\
    \ we have to make a few adjustments to our previous code. Update the `didFinishSavingWithError`\
    \ message as shown in [Listing 6–9](#Chapter06.html#list_6_9).\n\n**Listing 6–9.**\
    \ *Updated didFinishSavingWithError*\n\n```\n- (void)image:(UIImage *)image didFinishSavingWithError:(NSError\
    \ *)error contextInfo:(void *)contextInfo\n{\n    /*UIAlertView *alert;\n    if\
    \ (error) {\n        alert = [[UIAlertView alloc] initWithTitle:@\"Error\"\n \
    \                                          message:@\"Unable to save image to\
    \ Photo Album.\"\n                                          delegate:self cancelButtonTitle:@\"\
    Ok\"\n                                 otherButtonTitles:nil];\n    } else {\n\
    \        alert = [[UIAlertView alloc] initWithTitle:@\"Success\"\n           \
    \                                message:@\"Image saved to Photo Album.\"\n  \
    \                                        delegate:self cancelButtonTitle:@\"Ok\"\
    \n                                 otherButtonTitles:nil];\n    }\n    [alert\
    \ show];*/\n    [self dismissModalViewControllerAnimated:NO];\n\n    [self sendEmailMessage:image];\n\
    }\n```\n\nYou can see that the code in bold is now in a comment block. The second\
    \ change that was made (also in bold) is that we have set the animated flag to\
    \ `NO`, so that there won't be a collision. I should point out, for the more advanced\
    \ readers, that there are ways around this issue. However, with heavy animations,\
    \ they leave trace issues or pixilation and other complicated problems that are\
    \ easily avoidable by small changes such as this change.\n\n[Figure 6–9](#Chapter06.html#fig_6_9)\
    \ shows the successful execution of the project and the dialog message with the\
    \ e-mail properly formatted.\n\n![Image](images/0609.jpg)\n\n**Figure 6–9.** *We've\
    \ now received a properly formatted e-mail.*\n\n### Video Capture\n\nThere are\
    \ two main approaches to building an application on top of a video feed. First,\
    \ there is the approach that does not require analyzing the frames of the video.\
    \ This approach is seen in some location-based augmented reality applications,\
    \ which we'll learn more about in [Chapter 11](#Chapter11.html#ch11). They use\
    \ the heading and location classes, along with the gyroscope, to determine where\
    \ to orient your AR targets. However, the video is just a gimmick. Looking at\
    \ the location-based objects on top of the video gives you the feeling that it\
    \ is all integrated. This approach (to save time and computing resources) is a\
    \ simple matter of opening up the video preview as your base layer in the application.\n\
    \nSecond, there is the approach that requires analyzing the video feed. This approach\
    \ is seen in marker-based augmented reality applications (like we'll see in [Chapter\
    \ 10](#Chapter10.html#ch10)) and facial-recognition augmented reality applications\
    \ (like we'll see in [Chapter 13](#Chapter13.html#ch13)). Both of these applications\
    \ require that each frame of video is accessible for analytics."
  raw: '#### E-mailing an Image


    Maybe storing the file isn''t quite enough and you''d prefer to attach it to an
    e-mail message. If you want to e-mail a message programmatically, you first need
    to import the MessageUI framework.


    Click your project name in the Xcode navigator. Switch to the `Build Phases` tab
    and import the MessageUI framework. Next, open `PhotoViewController.h` in Xcode
    and update the interface as shown in [Listing 6–5](#Chapter06.html#list_6_5).


    **Listing 6–5.** *Updated Interface for PhotoViewController*


    `#import <UIKit/UIKit.h>`

    **`#import <MessageUI/MessageUI.h>`**

    **`#import <MessageUI/MFMailComposeViewController.h>`**


    `@interface PhotoViewController : UIViewController <UINavigationControllerDelegate,
    UIImagePickerControllerDelegate,` **`MFMailComposeViewControllerDelegate`**`>
    {`

    `}`

    `- (IBAction)loadPhotoPicker:(id)sender;`


    `@end`


    We imported a few headers and nominated this class as an `MFMailComposeViewControllerDelegate`
    so we can handle the event callback when the user sends the message. Add the methods
    from [Listing 6–6](#Chapter06.html#list_6_6) to the implementation.


    **Listing 6–6.** *Updated Interface for PhotoViewController*


    `- (void)sendEmailMessage:(UIImage *)image`

    `{`

    `    NSLog(@"Sending Email");`


    `    MFMailComposeViewController *picker = [[MFMailComposeViewController alloc]
    init];`

    `    picker.mailComposeDelegate = self;`


    `    [picker setSubject:@"iOS Augmented Reality - Chapter 6"];`


    `    [picker setToRecipients:[NSArray arrayWithObjects:@"kyle.m.roche@gmail.com",
    nil]];`


    `    NSString *emailBody = @"Hi Kyle, this stuff actually works.";`


    `    [picker setMessageBody:emailBody isHTML:NO];`


    `    NSData *data = UIImagePNGRepresentation(image);`


    `    [picker addAttachmentData:data mimeType:@"image/png" fileName:@"Ch6ScreenShot"];`


    `    [self presentModalViewController:picker animated:YES];`

    `}`


    `- (void)mailComposeController:(MFMailComposeViewController*)controller didFinishWithResult:(MFMailComposeResult)result
    error:(NSError*)error`

    `{`

    `    [self dismissModalViewControllerAnimated:YES];`

    `}`


    Let''s step through each method, line by line. Let''s start with the `sendEmailMessage`
    method. First we allocate an `MFMailComposeViewController` object and set the
    `delegate` to `self` so we can handle the callback events. Next, we set our `Subject`,
    `ToRecipients` address, and `MessageBody` of the e-mail. Finally, we attach the
    photo to the e-mail and present the drafted e-mail in a modal dialog to the user.


    Next, we define another method called `didFinishWithResult`. This method is a
    delegate method for the `MFMailComposeViewControllerDelegate` protocol. It is
    called after the e-mail is actually sent by the user. When this event is fired,
    we are removing the modal dialog because it is no longer needed.


    We''re almost ready to test this code. First, we have to declare the `sendEmailMessage`
    method so we can call it from within our implementation. Add the code from [Listing
    6–7](#Chapter06.html#list_6_7) after the `import` statements in `PhotoViewController.m`.


    **Listing 6–7.** *Declare sendEmailMessage As a Private Method*


    `@interface PhotoViewController (Private)`

    `- (void)sendEmailMessage:(UIImage *)image;`

    `@end`


    Add a call to the `sendEmailMessage` method at the end of the `didFinishSavingWithError`
    method. If you try to run the code now, you will get an interesting result. Everything
    will appear to work as expected, but you will get an error similar to [Listing
    6–8](#Chapter06.html#list_6_8) when the e-mail dialog should appear.


    **Listing 6–8.** *Error Message*


    `2011-09-24 21:35:32.153 Ch6[1128:707] Sending Email`

    `[Switching to process 9731 thread 0x2603]`

    `wait_fences: failed to receive reply: 10004003`


    Not the most descriptive of errors, is it? Here''s what this means. Typically,
    the `wait_fences` message indicates a running animation collided with a newly
    requested animation. In our case, we were just dismissing a modal dialog with
    the `withAnimation` attribute set to YES as we were trying to create a new modal
    dialog with the `withAnimation` attribute set to YES. It doesn''t matter how many
    times you try to run that project, it will never pass that line of code successfully.


    So, before testing this, we have to make a few adjustments to our previous code.
    Update the `didFinishSavingWithError` message as shown in [Listing 6–9](#Chapter06.html#list_6_9).


    **Listing 6–9.** *Updated didFinishSavingWithError*


    `- (void)image:(UIImage *)image didFinishSavingWithError:(NSError *)error contextInfo:(void
    *)contextInfo`

    `{`

    **`/*UIAlertView *alert;`**

    **`    if (error) {`**

    **`        alert = [[UIAlertView alloc] initWithTitle:@"Error"`**

    **`                                           message:@"Unable to save image to
    Photo`**

    **`Album."`**

    **`                                          delegate:self cancelButtonTitle:@"Ok"`**

    **`                                 otherButtonTitles:nil];`**

    **`    } else {`**

    **`        alert = [[UIAlertView alloc] initWithTitle:@"Success"`**

    **`                                           message:@"Image saved to Photo Album."`**

    **`                                          delegate:self cancelButtonTitle:@"Ok"`**

    **`                                 otherButtonTitles:nil];`**

    **`    }`**

    **`    [alert show];*/`**

    `    [self dismissModalViewControllerAnimated:`**`NO`**`];`


    `    [self sendEmailMessage:image];`

    `}`


    You can see that the code in bold is now in a comment block. The second change
    that was made (also in bold) is that we have set the animated flag to NO, so that
    there won''t be a collision. I should point out, for the more advanced readers,
    that there are ways around this issue. However, with heavy animations, they leave
    trace issues or pixilation and other complicated problems that are easily avoidable
    by small changes such as this change.


    [Figure 6–9](#Chapter06.html#fig_6_9) shows the successful execution of the project
    and the dialog message with the e-mail properly formatted.


    ![Image](images/0609.jpg)


    **Figure 6–9.** *We''ve now received a properly formatted e-mail.*


    ### Video Capture


    There are two main approaches to building an application on top of a video feed.
    First, there is the approach that does not require analyzing the frames of the
    video. This approach is seen in some location-based augmented reality applications,
    which we''ll learn more about in [Chapter 11](#Chapter11.html#ch11). They use
    the heading and location classes, along with the gyroscope, to determine where
    to orient your AR targets. However, the video is just a gimmick. Looking at the
    location-based objects on top of the video gives you the feeling that it is all
    integrated. This approach (to save time and computing resources) is a simple matter
    of opening up the video preview as your base layer in the application.


    Second, there is the approach that requires analyzing the video feed. This approach
    is seen in marker-based augmented reality applications (like we''ll see in [Chapter
    10](#Chapter10.html#ch10)) and facial-recognition augmented reality applications
    (like we''ll see in [Chapter 13](#Chapter13.html#ch13)). Both of these applications
    require that each frame of video is accessible for analytics.'
  trans: "\n### 通过电子邮件发送图片\n\n仅存储文件可能还不够，你可能希望将其作为附件添加到电子邮件中。如果你想以编程方式发送邮件，首先需要导入\
    \ `MessageUI` 框架。\n\n在 Xcode 导航器中单击你的项目名称。切换到 `Build Phases` 选项卡并导入 `MessageUI`\
    \ 框架。接着，在 Xcode 中打开 `PhotoViewController.h`，并按照代码清单 6–5 所示更新接口。\n\n**代码清单 6–5.**\
    \ *PhotoViewController 的更新接口*\n\n```\n#import <UIKit/UIKit.h>\n#import <MessageUI/MessageUI.h>\n\
    #import <MessageUI/MFMailComposeViewController.h>\n\n@interface PhotoViewController\
    \ : UIViewController <UINavigationControllerDelegate, UIImagePickerControllerDelegate,\
    \ MFMailComposeViewControllerDelegate> {\n}\n- (IBAction)loadPhotoPicker:(id)sender;\n\
    \n@end\n```\n\n我们导入了一些头文件，并将该类指定为 `MFMailComposeViewControllerDelegate`，以便处理用户发送消息时的事件回调。将代码清单\
    \ 6–6 中的方法添加到实现文件中。\n\n**代码清单 6–6.** *PhotoViewController 的更新接口*\n\n```\n- (void)sendEmailMessage:(UIImage\
    \ *)image\n{\n    NSLog(@\"Sending Email\");\n\n    MFMailComposeViewController\
    \ *picker = [[MFMailComposeViewController alloc] init];\n    picker.mailComposeDelegate\
    \ = self;\n\n    [picker setSubject:@\"iOS Augmented Reality - Chapter 6\"];\n\
    \n    [picker setToRecipients:[NSArray arrayWithObjects:@\"kyle.m.roche@gmail.com\"\
    , nil]];\n\n    NSString *emailBody = @\"Hi Kyle, this stuff actually works.\"\
    ;\n\n    [picker setMessageBody:emailBody isHTML:NO];\n\n    NSData *data = UIImagePNGRepresentation(image);\n\
    \n    [picker addAttachmentData:data mimeType:@\"image/png\" fileName:@\"Ch6ScreenShot\"\
    ];\n\n    [self presentModalViewController:picker animated:YES];\n}\n\n- (void)mailComposeController:(MFMailComposeViewController*)controller\
    \ didFinishWithResult:(MFMailComposeResult)result error:(NSError*)error\n{\n \
    \   [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n让我们逐行分析每个方法。先从 `sendEmailMessage`\
    \ 方法开始。首先，我们分配一个 `MFMailComposeViewController` 对象，并将 `delegate` 设置为 `self`，以便处理回调事件。接下来，设置邮件的\
    \ `Subject`（主题）、`ToRecipients`（收件人）地址和 `MessageBody`（邮件正文）。最后，将照片附加到邮件中，并以模态对话框的形式向用户展示草稿邮件。\n\
    \n接着，我们定义另一个名为 `didFinishWithResult` 的方法。该方法是 `MFMailComposeViewControllerDelegate`\
    \ 协议的委托方法，在用户实际发送邮件后被调用。当此事件触发时，我们将移除模态对话框，因为它不再需要了。\n\n现在，我们基本可以测试这段代码了。首先，需要声明\
    \ `sendEmailMessage` 方法，以便在实现文件中调用它。在 `PhotoViewController.m` 的 `import` 语句之后，添加代码清单\
    \ 6–7 中的代码。\n\n**代码清单 6–7.** *将 sendEmailMessage 声明为私有方法*\n\n```\n@interface PhotoViewController\
    \ (Private)\n- (void)sendEmailMessage:(UIImage *)image;\n@end\n```\n\n在 `didFinishSavingWithError`\
    \ 方法的末尾添加对 `sendEmailMessage` 方法的调用。如果现在尝试运行代码，你会得到一个有趣的结果。一切看起来都按预期工作，但当电子邮件对话框应该出现时，会收到类似代码清单\
    \ 6–8 的错误。\n\n**代码清单 6–8.** *错误消息*\n\n```\n2011-09-24 21:35:32.153 Ch6[1128:707]\
    \ Sending Email\n[Switching to process 9731 thread 0x2603]\nwait_fences: failed\
    \ to receive reply: 10004003\n```\n\n这个错误并不算最描述性的，对吧？以下是其含义。通常，`wait_fences` 消息表示正在运行的动画与一个新请求的动画冲突。在我们的案例中，当我们试图创建一个\
    \ `withAnimation` 属性设置为 `YES` 的新模态对话框时，刚刚关闭了一个同样 `withAnimation` 属性设置为 `YES` 的模态对话框。无论你尝试运行该项目多少次，它都无法成功执行那一行代码。\n\
    \n因此，在测试之前，我们需要对之前的代码做一些调整。按照代码清单 6–9 所示更新 `didFinishSavingWithError` 消息。\n\n\
    **代码清单 6–9.** *更新后的 didFinishSavingWithError*\n\n```\n- (void)image:(UIImage *)image\
    \ didFinishSavingWithError:(NSError *)error contextInfo:(void *)contextInfo\n\
    {\n    /*UIAlertView *alert;\n    if (error) {\n        alert = [[UIAlertView\
    \ alloc] initWithTitle:@\"Error\"\n                                          \
    \ message:@\"Unable to save image to Photo Album.\"\n                        \
    \                  delegate:self cancelButtonTitle:@\"Ok\"\n                 \
    \                otherButtonTitles:nil];\n    } else {\n        alert = [[UIAlertView\
    \ alloc] initWithTitle:@\"Success\"\n                                        \
    \   message:@\"Image saved to Photo Album.\"\n                               \
    \           delegate:self cancelButtonTitle:@\"Ok\"\n                        \
    \         otherButtonTitles:nil];\n    }\n    [alert show];*/\n    [self dismissModalViewControllerAnimated:NO];\n\
    \n    [self sendEmailMessage:image];\n}\n```\n\n你可以看到，粗体显示的代码现在位于注释块中。第二个改动（同样以粗体显示）是，我们将动画标志设置为\
    \ `NO`，这样就不会发生冲突。我需要指出的是，对于更高级的读者，有办法绕过这个问题。然而，在大量动画的情况下，它们会留下痕迹问题或像素化及其他复杂问题，而像这样的微小改动可以轻松避免这些问题。\n\
    \n图 6–9 展示了项目成功执行的结果，以及格式正确的电子邮件对话框。\n\n![图片](img/0609.jpg)\n\n**图 6–9.** *现在我们收到了一封格式正确的电子邮件。*\n\
    \n### 视频捕获\n\n在视频流之上构建应用程序主要有两种方法。第一种是不需要分析视频帧的方法。这种方法出现在一些基于位置的增强现实应用中，我们将在第\
    \ 11 章中进一步了解。它们使用航向和定位类以及陀螺仪来确定 AR 目标的朝向位置。然而，视频只是一种噱头。查看视频之上基于位置的对象，会给你一种所有内容都已集成的感觉。这种方法（为了节省时间和计算资源）只是简单地在应用程序中将视频预览作为基础层打开。\n\
    \n第二种是需要分析视频流的方法。这种方法出现在基于标记的增强现实应用（如我们将在第 10 章中看到的）和面部识别增强现实应用（如我们将在第 13 章中看到的）中。这两种应用都要求每一帧视频都可被访问以进行分析。\n"
- fmt: '#### Building a Base on the Video Preview


    In [Chapter 7](#Chapter07.html#ch7) we are going to discuss how to overlay a cocos2D
    layer on the video preview for building out augmented reality games. So, this
    section will be a brief introduction to some of the core concepts.


    Open `PhotoViewController.m` in Xcode and find the `loadPhotoPicker` method. This
    method opens the `UIImagePickerController` object and allows the user to take
    a photo. Update that method, as shown in [Listing 6–10](#Chapter06.html#list_6_10).


    **Listing 6–10.** *Updated loadPhotoPicker*


    ```

    - (IBAction)loadPhotoPicker:(id)sender {

        UIImagePickerController *imagePicker = [[UIImagePickerController alloc] init];

        imagePicker.sourceType =  UIImagePickerControllerSourceTypeCamera;

        // uncomment for front camera

        //imagePicker.cameraDevice = UIImagePickerControllerCameraDeviceFront;

        imagePicker.cameraDevice = UIImagePickerControllerCameraCaptureModeVideo;

        imagePicker.showsCameraControls = NO;

        imagePicker.toolbarHidden = YES;

        imagePicker.navigationBarHidden = YES;

        imagePicker.wantsFullScreenLayout = YES;


        imagePicker.delegate = self;

        imagePicker.allowsEditing = NO;

        [self presentModalViewController:imagePicker animated:YES];

    }

    ```


    We set a few new options for the `UIImagePickerController` object. First, we set
    the device type to the video camera. Then, we hid the camera''s controls, the
    toolbar, and the navigation bar. Finally, we instruct the view controller to make
    the `UIImagePickerController` render in full-screen mode.


    If you run the code, after this change, you will get something similar to [Figure
    6–10](#Chapter06.html#fig_6_10).


    ![Image](images/0610.jpg)


    **Figure 6–10.** *We get a full-screen video. No controls!*


    This clean video interface provides us with a perfect background for building
    out an augmented reality application.


    If we were to want to analyze these video frames, we would have to set up an `NSTimer`
    and capture and save the preview screen every so often. Alternatively, we could
    also set up some sort of user action that causes the image to be saved, or some
    sort of programmatic loop. None of these options are ideal, and as you probably
    noticed from the previous examples in this chapter, saving images manually takes
    a second or two of the processor''s time. Let''s explore a better way to capture
    video frames for the purpose of analyzing them.


    #### Building a Base for Frame Capture


    Frame capture sessions work a bit differently. To demonstrate this, we''re going
    to use a new class called `AVCaptureSession`. Let''s move this into a separate
    tab in our example application so we can reference the differences later.


    First, let''s add the frameworks we will need to work with the AV Foundation Library.
    Add the following frameworks to your project.


    *   `CoreVideo`

    *   `CoreMedia`

    *   `AVFoundation`

    *   `ImageIO`


    Next, add a new cocoa touch file using the `UIViewController` subclass to the
    project. Make sure that you are not targeting this class for iPad and you do not
    use an XIB file for the interface. Name the class `VideoViewController`.


    We are going to create another tab bar item, as we did in the previous examples,
    and link it up to both the iPad and iPhone storyboards. Open both storyboard files
    and follow the same steps we did before to link them up to the tab bar. When you
    have finished, you should see something similar to [Figure 6–11](#Chapter06.html#fig_6_11)
    in your iPhone storyboard.


    ![Image](images/0611.jpg)


    **Figure 6–11.** *You''ve added the new tab bar item to your iPhone storyboard.*


    Follow the steps again for the iPad storyboard. In both of the interfaces, we
    are going to add a few outlets. First, add a `UIView` to the `VideoViewController`
    NIB. Name the `UIViewvideoPreview`. Make sure you connect the outlet to the `VideoViewController`
    header file. While `VideoViewController.h` is open in your assistant editor, import
    the `AVFoundation.h` and `ImageIO/CGImageProperties.h` headers. Your new interface
    file should look like [Listing 6–11](#Chapter06.html#list_6_11).


    **Listing 6–11.** *Updated VideoViewController.h*


    ```

    #import <UIKit/UIKit.h>

    #import <AVFoundation/AVFoundation.h>

    #import <ImageIO/CGImageProperties.h>


    @interface VideoViewController : UIViewController {


    }

    @property (strong, nonatomic) IBOutlet UIView *videoPreview;

    @end

    ```


    Next, we are going to add a `UIImageView` outlet and a `UIButton` to the `VideoViewController`
    layout. Name the `UIImageViewvideoImage` and connect an action called `captureScreen`
    to the `UIButton`.


    To save a still image from the video preview, we are going to use an `AVCaptureStillImageOutput`
    object. Create a property called `stillImageOutput` for this object.


    `VideoViewController.h` should now look like [Listing 6–12](#Chapter06.html#list_6_12).


    **Listing 6–12.** *Updated VideoViewController.h*


    ```

    #import <UIKit/UIKit.h>

    #import <AVFoundation/AVFoundation.h>

    #import <ImageIO/CGImageProperties.h>


    @interface VideoViewController : UIViewController {


    }

    @property(nonatomic, retain) AVCaptureStillImageOutput *stillImageOutput;


    @property (strong, nonatomic) IBOutlet UIView *videoPreview;

    @property (strong, nonatomic) IBOutlet UIImageView *videoImage;

    - (IBAction)captureScreen:(id)sender;

    @end

    ```


    Switch to `VideoViewController.m` in Xcode. We need to create a `viewDidAppear`
    method to start the camera preview session. Create the method with the code shown
    in [Listing 6–13](#Chapter06.html#list_6_13).


    **Listing 6–13.** *viewDidAppear Method*


    ```

    - (void)viewDidAppear:(BOOL)animated {

        AVCaptureSession *session = [[AVCaptureSession alloc] init];

        session.sessionPreset = AVCaptureSessionPresetMedium;


        AVCaptureVideoPreviewLayer *captureVideoPreviewLayer = [[AVCaptureVideoPreviewLayer
    alloc] initWithSession:session];

        captureVideoPreviewLayer.frame = self.videoPreview.bounds;

            [self.videoPreview.layer addSublayer:captureVideoPreviewLayer];


            AVCaptureDevice *device = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];


            NSError *error = nil;

            AVCaptureDeviceInput *input = [AVCaptureDeviceInput deviceInputWithDevice:device
    error:&error];

            if (!input) {

                    NSLog(@"ERROR: trying to open camera: %@", error);

            }

            [session addInput:input];

            // Placeholder

            [session startRunning];

    }

    ```'
