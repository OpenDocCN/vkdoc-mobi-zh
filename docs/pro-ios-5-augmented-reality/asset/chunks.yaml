    `#import <MobileCoreServices/UTCoreTypes.h>`


    **Listing 2–7.** *Declare the isVideoCameraAvailable Method*


    `- (BOOL) isVideoCameraAvailable;`


    In [Listing 2–7](#Chapter02.html#list_2_7), we are declaring a method signature
    so we can use a helper function to check for video. Switch to the .m file of your
    class and add the following helper function from [Listing 2–8](#Chapter02.html#list_2_8).


    **Listing 2–8.** *Add the Helper Function to the .m File*


    `- (BOOL) isVideoCameraAvailable`

    `{`

    `    UIImagePickerController *picker = [[UIImagePickerController alloc] init];`

    `    NSArray *sourceTypes = [UIImagePickerController availableMediaTypesForSourceType:picker.sourceType];`

    `    [picker release];`


    `    if (![sourceTypes containsObject:(NSString *)kUTTypeMovie]){`


    `        return NO;`

    `    }`


    `    return YES;`

    `}`


    In this code block, we are simply checking for all available media source types
    then inspecting that array to see whether it contains an object of type `NSString`
    with the value `kUTTypeMovie`. If we find this value, then video is supported
    on the device''s camera. Now that this method is declared and available to our
    class, we can follow the same pattern we used to check for other components. Add
    the code from [Listing 2–9](#Chapter02.html#list_2_9) after the checks for camera
    support.


    **Listing 2–9.** *Call the New Helper Function to Check for Video Support*


    `if ([self isVideoCameraAvailable]) {`

    `        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Video"`

    `                                                        message:@"Video Available"`

    `                                                       delegate:self`

    `                                              cancelButtonTitle:@"OK"`

    `                                              otherButtonTitles:nil, nil];`

    `        [alert show];`

    `        [alert release];`

    `    } else {`

    `        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Video"`

    `                                                        message:@"Video NOT Available"`

    `                                                       delegate:self`

    `                                              cancelButtonTitle:@"OK"`

    `                                              otherButtonTitles:nil, nil];`

    `        [alert show];`

    `        [alert release];`

    `    }`


    As you would expect (because we''ve already determined there is no camera on the
    simulator), you won''t find video support on the simulator either.'
  trans: "\n#### 音频检测\n\n检测音频功能的方式与检测其他组件相同。检查音频需要用到 AVFoundation 框架。按照本章前面链接 Core\
