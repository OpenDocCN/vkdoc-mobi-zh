    `    float latDiff = second.latitude - second.latitude;`

    `    float aprxAziumuth = (M_PI *.5f) - atan(latDiff / longDiff);`


    `    if (longDiff > 0) {`

    `        return aprxAziumuth;`

    `    } else if (longDiff < 0) {`

    `        return aprxAziumuth + M_PI;`

    `    } else if (latDiff < 0) {`

    `        return M_PI;`

    `    }`


    `    return 0.0f;`

