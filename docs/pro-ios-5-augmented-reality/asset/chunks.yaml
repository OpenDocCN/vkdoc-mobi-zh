    The code for this project is available at [`www.github.com/kyleroche`](http://www.github.com/kyleroche)
    and from the Source Code/Download area of the Apress web site ([`www.apress.com`](http://www.apress.com)).


    Run the project in its default form. Use either the iPad or iPhone simulator.
    You will get a result similar to what we see in [Figure 7–3](#Chapter07.html#fig_7_3).
    This is the default project for all the cocos2D templates.


