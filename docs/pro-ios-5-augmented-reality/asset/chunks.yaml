- fmt: '# About the Technical Reviewers


    ![Image](images/yosun_chang.jpg) **Yosun Chang** has been creating apps for iOS
    and Android since early 2009, and is currently working on a next generation 3D
    and augmented reality mobile games startup called nusoy. Prior to that, since
    1999 she did web development on the LAMP stack and Flash. She has also spoken
    at several virtual world, theater, and augmented reality conferences under her
    artist name of Ina Centaur. She has a graduate level background in physics and
    philosophy from UC San Diego and UC Berkeley. An avid reader who learned much
    of her coding chops from technical books like the current volume, she has taken
    care to read every single word of the chapters she reviewed — and vet the source.
    Contact her `@yosunchang` on Twitter.


    ![Image](images/peter_ma.jpg) **Peter Ma** has been working with web, iOS, Android,
    WebOS, and WP7 since 2007. He has been building projects from database design
    to mobile presentation. Peter has won many hackathons and developer challenges,
    all using native tools. He has won a TEDPrize sponsored challenge and gave a TEDtalk
    about building mobile apps during TEDGlobal2010. The mobile app Pickup Sports
    was the foundation for Spotvite and had over 80,000 signups. Peter is also involved
    in many open source projects; he has pioneered the TEDx app that helps organizers
    to build their own iOS and Android applications. Contact him `@Nyceane` on Twitter.


    ![Image](images/graham_wood.jpg) **Graham Wood** is a mobile application developer
    whose primary focus is the iOS platform. He has 11 years of experience in software
    development, with most of that time spent writing software for safety critical
    embedded systems for commercial aircraft. Graham holds a Bachelor of Science degree
    in Computer Science from the University of Minnesota. His company, Wood App Developers
    LLC, develops mobile applications for clients, along with its own suite of iOS
    applications. He can be reached at [`graham@woodappsllc.com`](http://graham@woodappsllc.com)
    or followed on Twitter at `@woodappsllc`.


    ## Preface


    This was a fun and interesting book to write! Augmented reality is a fascinating
    new field with tons of potential to reshape how we integrate technology into our
    everyday lives. Companies and toolkits are popping up each week trying to capture
    a piece of this emerging market.


    The goal of this book was to provide you with a jump-start on building these types
    of applications. I begin by discussing the basic foundations of the app, such
    as the compass and accelerometer, and move on to more advanced ideas behind image
    processing.


    This book is intended for experienced iOS developers. You should have moderate
    experience with `Xcode` and `Objective-C`. I use third-party frameworks and some
    of the new `iOS5` APIs to show you how to build augmented reality applications
    for location, social, and gaming purposes.


    You can download the source code for this book from the book''s page on Apress.com,
    or check out [`www.apress.com/source-code/`](http://www.apress.com/source-code/).


    ## Chapter 1


    ### Introduction


    Welcome to *Pro iOS 5 Augmented Reality*. Augmented reality (AR) has existed in
    sci-fi movies for decades, is used in the military for head-up displays (HUDs),
    and until recently, has been a thing of the future. With the upswing in mobile
    applications since the introduction of the iPhone and the Android operating system,
    applications such as `Layar` ([`www.layar.com`](http://www.layar.com)), `Metaio''s
    Junaio` ([`www.junaio.com`](http://www.junaio.com)), and `Wikitude` ([`www.wikitude.com`](http://www.wikitude.com))
    have put augmented reality in the hands of the everyday consumer. In this book,
    I''ll walk you through how to create your own augmented reality applications for
    iOS.


    *Time* magazine named augmented reality among the top-ten technology trends for
    2010. *Time* barely scratched the surface on the potential applications of AR.
    They selected a few vendor application platforms, such as `Layar`, and also discussed
    some more day-to-day applications, such as that employed by the United States
    Postal Service (USPS).


    ### Augmented Reality in the Real and Cyber World


    The USPS introduced an augmented reality application to its web site in 2010.
    If you''ve ever mailed something from the post office, you can attest to the fact
    that quickly selecting a box that fits your needs without holding up the line
    is a near impossible task. Either you''re stuck wasting a lot of space with a
    bigger box or you''re holding up the 20 people behind you while you jam all your
    items into the box that *almost* fits everything. The USPS took a shot at making
    this easier, without requiring you to leave your home or office. Basically, you
    go to the USPS web site ([`www.prioritymail.com`](http://www.prioritymail.com))
    and use the Virtual Box Simulator and your webcam to try out different box sizes
    before you head out for the post office. It works like this:


    Print out a special icon (the USPS eagle) so the simulator knows where to put
    the hologram of the virtual box. See [Figure 1–1](#Chapter01.html#fig_1_1).


    1. Make sure your webcam is enabled.

    2. Launch the Virtual Box Simulator. Put the printed image in the view of the
    webcam and the simulator puts a hologram of different options for shipping containers
    around the image. See [Figure 1–2](#Chapter01.html#fig_1_2).


    ![Image](images/0101.jpg)


    **Figure 1–1.** *This eagle icon is printed and used by the USPS to augment your
    camera''s view with a simulated shipping container.*


    There are a few basic principles to follow when creating icons or markers for
    recognition. For traditional markers, you want high-contrast objects that carry
    a certain uniqueness and aren''t found in common scenarios. In fact, random images
    are often more effective. Also, you want to use images that have a certain rotation
    and aren''t symmetrical either horizontally or vertically. This helps the AR program
    recognize orientation and adjust accordingly. The USPS marker is a good example
    of these principles.


    ![Image](images/0102.jpg)


    **Figure 1–2.** *The hologram is overlaying the printed icon.*


    Notice in [Figure 1–2](#Chapter01.html#fig_1_2) that the simulator allows you
    to adjust transparency, move your to-be-shipped item on different angles and rotations,
    and experience exactly which shipping container you need to ship your materials.
    The USPS uses the marker and some sort of recognition algorithm to find it in
    the live camera view, track its orientation, and augment the picture with the
    current box you''ve selected.'
