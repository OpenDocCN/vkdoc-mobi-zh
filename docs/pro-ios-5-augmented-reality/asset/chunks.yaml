    First, we need to get our environment set up. In this chapter, we''re going to
    walk through setup, core concepts, and then introduce a quick augmented-reality
    sample application. In [Chapter 8](#Chapter08.html#ch8), we''ll be building a
    full augmented-reality game with cocos2D.


    Visit [`www.cocos2d-iphone.org/download`](http://www.cocos2d-iphone.org/download)
    and download the latest stable build of cocos2D for iPhone. After you''ve downloaded
    the file, double-click it in Finder to unpack the archive.


    In the new directory, there is a file called `cocos2D-ios.xcodeproj`. This is
    the Xcode project for testing the cocos2D download and prerequisites. Open the
    project in Xcode. There should be nearly 70 targets in the project. Most of them
    test a specific feature of cocos2D for iPhone. Change your Scheme to point to
    a test target to make sure your installation has everything it needs. See [Figure
    7–1](#Chapter07.html#fig_7_1) for an example of how to adjust your Scheme in Xcode.


    ![Image](images/0701.jpg)


    **Figure 7–1.** *Select ParticleTest (or another target) from the Scheme''s drop-down
    menu.*


    For good measure, step through a few of the targets and run the projects on the
    simulator. Most of them are a series of click-through examples that demonstrate
    a particular function.


    #### Installing the Project Templates


    cocos2D comes with project templates for Xcode. The download includes all the
    files needed to install the templates. These templates give your projects the
    necessary components they require and save you setup time. There are three main
    project templates:


    - cocos2D stand-alone template

    - cocos2D + box2D template

    - cocos2D + chipmunk template


    Before you run these scripts, make sure you have placed the unpacked directory
    in a location in which you are happy. Open the Terminal application and navigate
    to that directory. To install the templates, run the commands shown in [Listing
    7–1](#Chapter07.html#list_7_1).


    **Listing 7–1.** *Installing the Templates (Fail)*


    ```

    cocos2d-iphone-1.0.1$ ./install-templates.sh -u

    cocos2d-iphone template installer

    Installing Xcode 4 cocos2d iOS template

    ----------------------------------------------------


