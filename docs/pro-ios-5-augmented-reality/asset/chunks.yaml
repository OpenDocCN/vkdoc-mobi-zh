    Let’s step through this for a moment. First, we set up an `NSAutoReleasePool`
    to handle memory allocation and release during the processing of the image. We
    load our Haar cascade from the file path and set up some basic information for
    the detector such as size, width, and scale.


    After we convert the `UIImage` to an `IplImage` using our new helper method, we
    use the `cvHaarDetectObjects` function to detect the faces in the picture. From
    there, we have a few paths the method can take. First, if we don’t find any faces,
    we fire a `UIAlertView` to notify the user to select a new image. If we do find
    faces, we iterate over them and overlay a translucent square on the image.


    There are a few interesting methods here that you might recognize if you dove
    any deeper into cocos2D earlier in this book. The notion of `DeviceSpace` and
    `WorldSpace` are common in game programming. Sometimes, you are working in pixels
    on an image, which might differ from CGPoints or percentages in other systems.
    These C-based conversion functions make it easy to switch between special systems.


    Okay, we have both of our processing methods in place. We need to call them after
    we obtain the `UIImage` from the library or camera. Find the `didFinishPickingImage`
    delegate method and add the line from [Listing 12–9](#Chapter12.html#list_12_9)
    at the end of the routine.


