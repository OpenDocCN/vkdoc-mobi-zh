- fmt: "#### Wired for Sound\n\nChecking for audio capabilities works in the same\
    \ way as checking for other components. Checking for sound requires the AVFoundation\
    \ Framework. Link this framework to your application binary the same way we linked\
    \ the Core Location Framework earlier in this chapter. Next, add the appropriate\
    \ `import` statement to your header file, as shown in [Listing 2–4](#Chapter02.html#list_2_4).\n\
    \n**Listing 2–4.** *Add the Import Statement*\n\n```\n#import <AVFoundation/AVFoundation.h>\n\
    ```\n\nFinally, switch to the `.m` file and uncomment the `viewDidLoad` method.\
    \ Or, if you're adding this to the same file as the checks for location services\
    \ and the magnetometer, you can simply append the code from [Listing 2–5](#Chapter02.html#list_2_5).\n\
    \n**Listing 2–5.** *Import the AVFoundation Framework*\n\n```\nAVAudioSession\
    \ *audioSession = [AVAudioSession sharedInstance];\nBOOL audioAvailable = audioSession.inputIsAvailable;\n\
    \n    if (audioAvailable) {\n        UIAlertView *alert = [[UIAlertView alloc]\
    \ initWithTitle:@\"Audio\"\n                                                 \
    \       message:@\"Audio Available\"\n                                       \
    \                delegate:self\n                                             \
    \ cancelButtonTitle:@\"OK\"\n                                              otherButtonTitles:nil,\
    \ nil];\n        [alert show];\n        [alert release];\n    } else {\n     \
    \   UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"Audio\"\n     \
    \                                                   message:@\"Audio NOT Available\"\
    \n                                                       delegate:self\n     \
    \                                         cancelButtonTitle:@\"OK\"\n        \
    \                                      otherButtonTitles:nil, nil];\n        [alert\
    \ show];\n        [alert release];\n    }\n```\n\n#### Checking for Video Capabilities\n\
    \nWe've verified that most of the components we'll need to build an augmented-reality\
    \ application are present on the device. However, having a camera available doesn't\
    \ necessarily mean it will function for video capture. And, after all, the video\
    \ capture is what makes the augmented-reality application so appealing.\n\nChecking\
    \ for video capability of the camera is a bit more complicated than simply checking\
    \ for the camera's existence. To do this, we have to add the Mobile Core Services\
    \ Framework to our project. Follow the same pattern we used to add the Core Location\
    \ Framework to the project when we checked for the existence of the magnetometer,\
    \ but instead add the framework called `MobileCoreServices.framework`. In your\
    \ header file, add the code from [Listing 2–6](#Chapter02.html#list_2_6) after\
    \ the other `import` statements. Then, add the code from [Listing 2–7](#Chapter02.html#list_2_7)\
    \ just above the `@end`.\n\n**Listing 2–6.** *Import the Mobile Core Services\
    \ Framework*\n\n```\n#import <MobileCoreServices/UTCoreTypes.h>\n```\n\n**Listing\
    \ 2–7.** *Declare the isVideoCameraAvailable Method*\n\n```\n- (BOOL) isVideoCameraAvailable;\n\
    ```\n\nIn [Listing 2–7](#Chapter02.html#list_2_7), we are declaring a method signature\
    \ so we can use a helper function to check for video. Switch to the `.m` file\
    \ of your class and add the following helper function from [Listing 2–8](#Chapter02.html#list_2_8).\n\
    \n**Listing 2–8.** *Add the Helper Function to the .m File*\n\n```\n- (BOOL) isVideoCameraAvailable\n\
    {\n    UIImagePickerController *picker = [[UIImagePickerController alloc] init];\n\
    \    NSArray *sourceTypes = [UIImagePickerController availableMediaTypesForSourceType:picker.sourceType];\n\
    \    [picker release];\n\n    if (![sourceTypes containsObject:(NSString *)kUTTypeMovie]){\n\
    \n        return NO;\n    }\n\n    return YES;\n}\n```\n\nIn this code block,\
    \ we are simply checking for all available media source types then inspecting\
    \ that array to see whether it contains an object of type `NSString` with the\
    \ value `kUTTypeMovie`. If we find this value, then video is supported on the\
    \ device's camera. Now that this method is declared and available to our class,\
    \ we can follow the same pattern we used to check for other components. Add the\
    \ code from [Listing 2–9](#Chapter02.html#list_2_9) after the checks for camera\
    \ support.\n\n**Listing 2–9.** *Call the New Helper Function to Check for Video\
    \ Support*\n\n```\nif ([self isVideoCameraAvailable]) {\n        UIAlertView *alert\
    \ = [[UIAlertView alloc] initWithTitle:@\"Video\"\n                          \
    \                              message:@\"Video Available\"\n                \
    \                                       delegate:self\n                      \
    \                        cancelButtonTitle:@\"OK\"\n                         \
    \                     otherButtonTitles:nil, nil];\n        [alert show];\n  \
    \      [alert release];\n    } else {\n        UIAlertView *alert = [[UIAlertView\
    \ alloc] initWithTitle:@\"Video\"\n                                          \
    \              message:@\"Video NOT Available\"\n                            \
    \                           delegate:self\n                                  \
    \            cancelButtonTitle:@\"OK\"\n                                     \
    \         otherButtonTitles:nil, nil];\n        [alert show];\n        [alert\
    \ release];\n    }\n```\n\nAs you would expect (because we've already determined\
    \ there is no camera on the simulator), you won't find video support on the simulator\
    \ either."
