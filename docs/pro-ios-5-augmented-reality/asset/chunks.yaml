    you''ll get a compiler error if you didn''t include your Facebook SDK correctly.


    Switch over to `RootViewController.m`. Add the code from [Listing 11–38](#Chapter11.html#list_11_38),
    just after your last `synthesize` statement. Obviously, replace this with your
    own App ID.


    **Listing 11–38.** *Create Variable for FB App ID*


    `@synthesize facebook = _facebook;`

    `static NSString* kAppId = @"your app id";`


    At the end of the `loadView` method, add the code from [Listing 11–39](#Chapter11.html#list_11_39).


    **Listing 11–39.** *Launch Facebook oAuth Dialog*


    `_permissions =  [[NSArray arrayWithObjects:@"read_stream", @"publish_stream",
    @"offline_access", @"friends_checkins", nil] retain];`

    `_facebook = [[Facebook alloc] initWithAppId:kAppId andDelegate:self];`

    ` [_facebook authorize:_permissions];`


    There are three basic steps to authenticating to Facebook, as you can see. First,
    you set up the list of permissions your application will require. Second, you
    init the `facebook` class with the App ID and the delegate (in this case, we use
    `self`). Next, you use the `authorize` instance method to launch the oAuth dialog
    in a web browser. Remember, Facebook then calls your application back using the
    URL Scheme we set up earlier.


    Facebook''s platform is built around the Graph API. It provides a simple and consistent
    mechanism to retrieve and update information about the social graph of the user.
    The drawback for us, however, is that we need to query a cross-section of data.
    Namely, we need a subset of our friends and their last known check-in location.
    This is too complex for the standard Graph API. So, we will be querying the Graph
    API through a more advanced medium called FQL (Facebook Query Language). FQL exposes
    the data in the Graph API through a SQL-like interface.


    To demonstrate both a Graph API call and an FQL call, we will be pulling our friends
    list from the standard Graph API, then using FQL calls to pull the last check-in
    location for each friend. Let''s get started.'
  trans: "\n`tempLocation = [[CLLocation alloc] initWithLatitude:39.550051 longitude:-105.782067];`\n\
    `tempCoordinate = [[ARGeoCoordinate alloc] initWithCoordinate:tempLocation name:@\"\
    Kyle Roche\" place:@\"Denver\"];`\n`[self.arController addCoordinate:tempCoordinate\
    \ animated:NO];`\n\n我们终于可以测试这个功能了。与其他示例应用一样，你不能使用模拟器进行测试。在你的物理设备上，你应该会看到类似于图 11-7\
    \ 的内容。\n\n![图像](img/1107.jpg)\n\n**图 11-7.** *这是我们目前构建的成果。*\n\n### 添加社交上下文\n\n\
    应用已经初具雏形。我们已经构建了处理位置和方向更新以及在屏幕上显示标签的功能。目前，我们硬编码了一个位置（我的位置）来调试功能。现在，让我们加入 Facebook\
    \ 上下文，并获取部分 Facebook 好友的位置。\n\n如果你没有跳过本章的那一节，你会记得 Facebook iOS SDK 使用 URL Scheme\
    \ 来管理其原生应用中的 oAuth 回调。我们已经将 Facebook SDK 复制到项目中，因此在使用之前，我们需要在`.plist`文件中设置 URL\
    \ Scheme。\n\n在 Xcode 中，找到`Resources`分组下的`Ch11–Info.plist`文件。\n\n1.  打开文件并添加一个新行。\n\
    2.  将键（Key）设置为`URL Types`。\n3.  展开新分组。添加一个子行。\n4.  将键命名为`URL Schemes`。\n5.  展开新键。将第\
    \ 0 项的值设置为`fb[appID]`，其中`appID`是你的 Facebook 应用 ID。\n\n我们在随 SDK 一起下载的 Facebook\
    \ 演示应用中已经测试过这个流程。\n\n打开`RootViewController.h`。更新接口文件，如代码清单 11-37 所示。\n\n**代码清单\
    \ 11-37.** *将 Facebook Connect 添加到 RootViewController*\n\n```\n#import <UIKit/UIKit.h>\n\
    #import \"FBConnect.h\"\n\n@class ARController;\n\n@interface RootViewController\
    \ : UIViewController <FBRequestDelegate, FBDialogDelegate,\nFBSessionDelegate>\
    \ {\nNSArray *_permissions;\n}\n\n@property (nonatomic, retain) Facebook *facebook;\n\
    @property (nonatomic, retain) ARController *arController;\n\n@end\n```\n\n权限数组实际上并非必需。我们可以将其本地化到登录方法中，但我遵循了演示应用和文档中的代码，以便你更轻松地将此功能迁移到未来的应用中。\n\
    \n检查你的项目，确保它能够正确编译。在`import`语句之后，如果你没有正确包含 Facebook SDK，将会出现编译错误。\n\n切换到`RootViewController.m`。在你最后的`synthesize`语句之后，添加代码清单\
    \ 11-38 中的代码。显然，请将其替换为你自己的应用 ID。\n\n**代码清单 11-38.** *为 Facebook 应用 ID 创建变量*\n\n\
    ```\n@synthesize facebook = _facebook;\nstatic NSString* kAppId = @\"your app\
    \ id\";\n```\n\n在`loadView`方法的末尾，添加代码清单 11-39 中的代码。\n\n**代码清单 11-39.** *启动 Facebook\
    \ oAuth 对话框*\n\n```\n_permissions =  [[NSArray arrayWithObjects:@\"read_stream\"\
    , @\"publish_stream\", @\"offline_access\", @\"friends_checkins\", nil] retain];\n\
    _facebook = [[Facebook alloc] initWithAppId:kAppId andDelegate:self];\n [_facebook\
    \ authorize:_permissions];\n```\n\n如你所见，对 Facebook 进行身份验证有三个基本步骤。首先，设置你的应用所需的权限列表。其次，使用应用\
    \ ID 和委托（此处我们使用`self`）初始化`facebook`类。接着，使用`authorize`实例方法在 Web 浏览器中启动 oAuth 对话框。请记住，Facebook\
    \ 随后会使用我们之前设置的 URL Scheme 回调你的应用。\n\nFacebook 平台建立在 Graph API 之上。它提供了一种简单且一致的机制来检索和更新用户社交图谱的信息。然而，对我们来说，缺点是我们需要查询一个数据交集。具体来说，我们需要一部分好友及其最后已知的签到位置。这对于标准的\
    \ Graph API 来说过于复杂。因此，我们将通过一种更高级的媒介——FQL（Facebook 查询语言）来查询 Graph API。FQL 通过类似\
    \ SQL 的接口暴露 Graph API 中的数据。\n\n为了演示 Graph API 调用和 FQL 调用，我们将从标准 Graph API 拉取好友列表，然后使用\
    \ FQL 调用拉取每位好友的最后签到位置。让我们开始吧。\n"
- fmt: "### Graph for Friends\n\n打开`RootViewController.m`。由于这是我们示例中设置GPS坐标的位置，因此扩展示例以查询Facebook位置是合理的。\n\
    \nFacebook的iOS SDK使用一个委托协议（已添加到`RootViewController.h`中）来处理API调用的结果。在调用Graph API之前，我们需要创建委托方法。将[清单11-40](#Chapter11.html#list_11_40)中的代码添加到`RootViewController.m`。\n\
    \n**清单11-40.** *Facebook请求委托方法*\n\n```\n/**\n * Called when the Facebook API request\
    \ has returned a response. This callback\n * gives you access to the raw response.\
    \ It's called before\n * (void)request:(FBRequest *)request didLoad:(id)result,\n\
    \ * which is passed the parsed response object.\n */\n- (void)request:(FBRequest\
    \ *)request didReceiveResponse:(NSURLResponse *)response {\n    NSLog(@\"received\
    \ response\");\n}\n\n/**\n * Called when a request returns and its response has\
    \ been parsed into\n * an object. The resulting object may be a dictionary, an\
    \ array, a string,\n * or a number, depending on the format of the API response.\
    \ If you need access\n * to the raw response, use:\n *\n * (void)request:(FBRequest\
    \ *)request\n *      didReceiveResponse:(NSURLResponse *)response\n */\n- (void)request:(FBRequest\
    \ *)request didLoad:(id)result {\n    NSLog(@\"RESULT: %@\", result);\n};\n\n\
    /**\n * Called when an error prevents the Facebook API request from completing\n\
    \ * successfully.\n */\n- (void)request:(FBRequest *)request didFailWithError:(NSError\
    \ *)error {\n    NSLog(@\"ERROR: %@\", [error localizedDescription]);\n};\n```\n\
    \n这些方法直接复制自SDK附带的示例应用程序。它们处理调用Facebook后可能发生的三种事件：收到响应、加载响应以及响应出错。现在，让我们记录这些结果。\n\
    \n认证的回调委托也需要一些方法。将[清单11-41](#Chapter11.html#list_11_41)中的方法添加到`RootViewController.m`。\n\
    \n**清单11-41.** *Facebook授权委托方法*\n\n```\n- (void)fbDidLogin {\n    NSLog(@\"LOGGED\
    \ IN\");\n}\n\n-(void)fbDidNotLogin:(BOOL)cancelled {\n    NSLog(@\"did not login\"\
    );\n}\n\n- (void)fbDidLogout {\n    NSLog(@\"LOGOUT\");\n}\n```\n\n在Xcode中打开`AppDelegate.m`。添加[清单11-42](#Chapter11.html#list_11_42)所示的方法。\n\
    \n**清单11-42.** *处理来自oAuth对话框的URLScheme*\n\n```\n- (BOOL)application:(UIApplication\
    \ *)application handleOpenURL:(NSURL *)url {\n    return [[_rootViewController\
    \ facebook] handleOpenURL:url];\n}\n```\n\n现在，我们已具备响应查询、URL Scheme和身份验证请求所需的一切。让我们启动身份验证对话框。首次访问应用程序时，您将看到类似[图11-8](#Chapter11.html#fig_11_8)的画面。在后续的身份验证尝试中，您将看到类似[图11-9](#Chapter11.html#fig_11_9)的画面。在此过程中，请观察控制台。您应该能看到身份验证回调被调用的记录。\n\
    \n![Image](images/1108.jpg)\n\n**图11-8.** *初始身份验证对话框启动。*\n\n如您所见，应用程序尚未获得我们请求的权限（传递给`authorize`方法的`NSArray`）的授权。您只需在应用程序首次登录时执行此操作。\n\
    \n![Image](images/1109.jpg)\n\n**图11-9.** *后续登录尝试会弹出不同的对话框。*\n\n有一些方法可以完全避免这个弹出消息（即在后续登录时）。如果您持久化从oAuth回调返回的访问令牌，可以将其传递给`authorize`方法以获取刷新后的令牌。但这对于我们的目的来说已经足够。\n\
    \n在`RootViewController.h`中，添加两个私有的`FBRequest`变量，分别命名为`_friendsRequest`和`_checkinRequest`。在回调中，Facebook会发送一个对发起调用的`FBRequest`对象的引用。这是我们在解析响应时区分不同Graph\
    \ API调用的唯一方式。\n\n在Xcode中打开`RootViewController.m`。让我们调用Graph API并在控制台中查看结果。更新`fbDidLogin`方法，如[清单11-43](#Chapter11.html#list_11_43)所示。\n\
    \n**清单11-43.** *更新后的fbDidLogin方法*\n\n```\n- (void)fbDidLogin {\n    NSLog(@\"\
    LOGGED IN\");\n    _friendsRequest = [_facebook requestWithGraphPath:@\"me/friends\"\
    \ andDelegate:self];\n}\n```\n\n此调用使用预定义路径向Graph API发起请求。我们使用了`me`关键字，它代表当前用户。`friends`路由返回朋友列表的JSON表示。您会注意到此调用现在引用了我们创建的私有`_friendsRequest`对象。\n\
    \n如果您再次运行应用程序，控制台中应显示类似[清单11-44](#Chapter11.html#list_11_44)的内容。\n\n**清单11-44.**\
    \ *来自me/friends的结果（名称和ID已更改）*\n\n```\n2011–10-08 10:14:55.281 Ch11[1302:707] RESULT:\
    \ {\n    data =     (\n                {\n            id = 12345;\n          \
    \  name = \"Bob Smith\";\n        },\n                {\n            id = 12345;\n\
    \            name = \"Bob Smith\";\n        },\n                {\n          \
    \  id = 12345;\n            name = \"Bob Smith\";\n        },\n```\n\n我们继续使用前十个返回的结果，并在AR视图中加载他们最近的一次签到。更新Facebook查询委托方法，如[清单11-45](#Chapter11.html#list_11_45)所示。\n\
    \n**清单11-45.** *更新后的didLoad方法*\n\n```\n- (void)request:(FBRequest *)request didLoad:(id)result\
    \ {\n    if (request == _friendsRequest) {\n        for (int i = 0; i < 1; i++)\
    \ { // change this to whatever number you like\n            [_facebook requestWithGraphPath:[NSString\
    \ stringWithFormat:@\"%@/checkins\", [[[result objectForKey:@\"data\"] objectAtIndex:i]\
    \ objectForKey:@\"id\"]] andDelegate:self];\n        }\n    } else {\n       \
    \ NSLog(@\"RESULT: %@\", [[result objectForKey:@\"data\"] objectAtIndex:1]);\n\
    \    }\n};\n```\n\n让我们花点时间分析一下这段代码块。我们正在检查引用的`FBRequest`对象是否是我们的`_friendsRequest`对象。如果是，我们设置一个`for`循环（如果要扩展，请更改`i\
    \ < #`），以创建对Graph API的第二次调用来拉取用户的签到记录。我们正在记录该调用的结果。\n\n[清单11-46](#Chapter11.html#list_11_46)显示了一个示例响应。（再次声明，名称已更改。）\n\
    \n**清单11-46.** *示例JSON响应*"
  raw: '#### Graph for Friends


    Open `RootViewController.m`. Because this is where we set our GPS coordinate in
    our example, it makes sense to extend this class to query the Facebook locations.


    Facebook''s iOS SDK uses a delegate protocol, which we''ve already added to `RootViewController.h`,
    to handle the results of API calls. Before we make a call to the Graph API, we
    need to create the delegate methods. Add the code from [Listing 11–40](#Chapter11.html#list_11_40)
    to `RootViewController.m`.


    **Listing 11–40.** *Facebook Request Delegate Methods*


    `/**`

    ` * Called when the Facebook API request has returned a response. This callback`

    ` * gives you access to the raw response. It''s called before`

    ` * (void)request:(FBRequest *)request didLoad:(id)result,`

    ` * which is passed the parsed response object.`

    ` */`

    `- (void)request:(FBRequest *)request didReceiveResponse:(NSURLResponse *)response
    {`

    `  NSLog(@"received response");`

    `}`


    `/**`

    ` * Called when a request returns and its response has been parsed into`

    ` * an object. The resulting object may be a dictionary, an array, a string,`

    ` * or a number, depending on the format of the API response. If you need access`

    ` * to the raw response, use:`

    ` *`

    ` * (void)request:(FBRequest *)request`

    ` *      didReceiveResponse:(NSURLResponse *)response`

    ` */`

    `- (void)request:(FBRequest *)request didLoad:(id)result {`

    `    NSLog(@"RESULT: %@", result);`

    `};`


    `/**`

    ` * Called when an error prevents the Facebook API request from completing`

    ` * successfully.`

    ` */`

    `- (void)request:(FBRequest *)request didFailWithError:(NSError *)error {`

    `    NSLog(@"ERROR: %@", [error localizedDescription]);`

    `};`


    These methods are copied straight from the example application that came with
    the SDK. They handle the three events that can happen after a call out to Facebook.
    The response is received, the response is loaded, and the response was an error.
    For now, let''s log the results.


    The callback delegate from authentication requires some methods as well. Add the
    methods from [Listing 11–41](#Chapter11.html#list_11_41) to `RootViewController.m`.


    **Listing 11–41.** *Facebook Auth Delegate Methods*


    `- (void)fbDidLogin {`

    `    NSLog(@"LOGGED IN");`

    `}`


    `-(void)fbDidNotLogin:(BOOL)cancelled {`

    `    NSLog(@"did not login");`

    `}`


    `- (void)fbDidLogout {`

    `    NSLog(@"LOGOUT");`

    `}`


    Open `AppDelegate.m` in Xcode. Add the method shown in [Listing 11–42](#Chapter11.html#list_11_42).


    **Listing 11–42.** *Handle the URLScheme Sent from oAuth Dialog*


    `- (BOOL)application:(UIApplication *)application handleOpenURL:(NSURL *)url {`

    `    return [[_rootViewController facebook] handleOpenURL:url];`

    `}`


    So, we have everything we need to respond to queries, URL Schemes, and authentication
    requests. Let''s launch the authentication dialog. The first time you access the
    application, you will see something similar to [Figure 11–8](#Chapter11.html#fig_11_8).
    On subsequent authentication attempts, you''ll see something more like [Figure
    11–9](#Chapter11.html#fig_11_9). Watch your console during this process. You should
    see notes where the authentication callbacks were made.


    ![Image](images/1108.jpg)


    **Figure 11–8.** *The initial authentication dialog launches.*


    As you can see, the app has not yet been authorized for the permissions we have
    requested (the `NSArray` we passed to the `authorize` method). You only need to
    do this on the first login for the application.


    ![Image](images/1109.jpg)


    **Figure 11–9.** *Subsequent login attempts bring up a different dialog.*


    There are ways to avoid this pop-up message entirely (on subsequent logins, that
    is). If you persist the access token that is returned from the oAuth callback,
    you can pass that to the `authorize` method to get a refreshed token. But, this
    will work fine for our purposes.


    In `RootViewController.h`, add two private `FBRequest` variables called `_friendsRequest`
    and `_checkinRequest`. On the callback, Facebook sends a reference to the `FBRequest`
    object that created the call. This is the only way we can differentiate between
    the Graph API calls for which we are parsing the response.


    Open `RootViewController.m` in Xcode. Let''s make a call to the Graph API and
    view the results in the console. Update the `fbDidLogin` method as shown in [Listing
    11–43](#Chapter11.html#list_11_43).


    **Listing 11–43.** *Updated fbDidLogin Method*


    `- (void)fbDidLogin {`

    `    NSLog(@"LOGGED IN");`

    **`_friendsRequest = [_facebook requestWithGraphPath:@"me/friends" andDelegate:self];`**

    `}`


    This call makes a request to the Graph API using a predefined path. We are using
    the `me` keyword, which represents the current user. The `friends` route returns
    a JSON representation of our friends list. You will notice that this call is now
    referencing the private `_friendsRequestFBRequest` object we created.


    If you run the application again, you should see something similar to [Listing
    11–44](#Chapter11.html#list_11_44) in your console.


    **Listing 11–44.** *Results from me/friends (Names and IDs Have Been Changed)*


    `2011–10-08 10:14:55.281 Ch11[1302:707] RESULT: {`

    `    data =     (`

    `                {`

    `            id = 12345;`

    `            name = "Bob Smith";`

    `        },`

    `                {`

    `            id = 12345;`

    `            name = "Bob Smith";`

    `        },`

    `                {`

    `            id = 12345;`

    `            name = "Bob Smith";`

    `        },`


    Let''s stick with the first ten that are returned, and load up their last check-in
    in the AR view. Update the Facebook query delegate method as shown in [Listing
    11–45](#Chapter11.html#list_11_45).


    **Listing 11–45.** *Updated didLoad Method*


    `- (void)request:(FBRequest *)request didLoad:(id)result {`

    `    if (request == _friendsRequest) {`

    `        for (int i = 0; i < 1; i++) { // change this to whatever number you like`

    `            [_facebook requestWithGraphPath:[NSString stringWithFormat:@"%@/checkins",
    [[[result objectForKey:@"data"] objectAtIndex:i] objectForKey:@"id"]] andDelegate:self];`

    `        }`

    `    } else {`

    `        NSLog(@"RESULT: %@", [[result objectForKey:@"data"] objectAtIndex:1]);`

    `    }`

    `};`


    Let''s take a moment to walk through this code block. We are checking to see that
    the referenced `FBRequest` object is our `_friendsRequest` object. If it is, we
    set up a `for` loop (change `i < #` if you want to expand this further) to create
    a second call to the Graph API to pull the user''s check-ins. We are logging the
    result of that call.


    An example response is shown in [Listing 11–46](#Chapter11.html#list_11_46). (Again,
    the names are changed.)


    **Listing 11–46.** *Example JSON Response*'
  trans: "\n### 面向朋友的图形\n\n打开`RootViewController.m`。由于这是我们示例中设置 GPS 坐标的位置，因此扩展示例以查询\
    \ Facebook 位置是合理的。\n\nFacebook 的 iOS SDK 使用一个委托协议（已添加到`RootViewController.h`中）来处理\
    \ API 调用的结果。在调用 Graph API 之前，我们需要创建委托方法。将清单 11-40 中的代码添加到`RootViewController.m`。\n\
    \n**清单 11-40.** *Facebook 请求委托方法*\n\n```\n/**\n * Called when the Facebook API\
    \ request has returned a response. This callback\n * gives you access to the raw\
    \ response. It's called before\n * (void)request:(FBRequest *)request didLoad:(id)result,\n\
    \ * which is passed the parsed response object.\n */\n- (void)request:(FBRequest\
    \ *)request didReceiveResponse:(NSURLResponse *)response {\n    NSLog(@\"received\
    \ response\");\n}\n\n/**\n * Called when a request returns and its response has\
    \ been parsed into\n * an object. The resulting object may be a dictionary, an\
    \ array, a string,\n * or a number, depending on the format of the API response.\
    \ If you need access\n * to the raw response, use:\n *\n * (void)request:(FBRequest\
    \ *)request\n *      didReceiveResponse:(NSURLResponse *)response\n */\n- (void)request:(FBRequest\
    \ *)request didLoad:(id)result {\n    NSLog(@\"RESULT: %@\", result);\n};\n\n\
    /**\n * Called when an error prevents the Facebook API request from completing\n\
    \ * successfully.\n */\n- (void)request:(FBRequest *)request didFailWithError:(NSError\
    \ *)error {\n    NSLog(@\"ERROR: %@\", [error localizedDescription]);\n};\n```\n\
    \n这些方法直接复制自 SDK 附带的示例应用程序。它们处理调用 Facebook 后可能发生的三种事件：收到响应、加载响应以及响应出错。现在，让我们记录这些结果。\n\
    \n认证的回调委托也需要一些方法。将清单 11-41 中的方法添加到`RootViewController.m`。\n\n**清单 11-41.** *Facebook\
    \ 授权委托方法*\n\n```\n- (void)fbDidLogin {\n    NSLog(@\"LOGGED IN\");\n}\n\n-(void)fbDidNotLogin:(BOOL)cancelled\
    \ {\n    NSLog(@\"did not login\");\n}\n\n- (void)fbDidLogout {\n    NSLog(@\"\
    LOGOUT\");\n}\n```\n\n在 Xcode 中打开`AppDelegate.m`。添加清单 11-42 所示的方法。\n\n**清单 11-42.**\
    \ *处理来自 oAuth 对话框的 URLScheme*\n\n```\n- (BOOL)application:(UIApplication *)application\
    \ handleOpenURL:(NSURL *)url {\n    return [[_rootViewController facebook] handleOpenURL:url];\n\
    }\n```\n\n现在，我们已具备响应查询、URL Scheme 和身份验证请求所需的一切。让我们启动身份验证对话框。首次访问应用程序时，您将看到类似图\
    \ 11-8 的画面。在后续的身份验证尝试中，您将看到类似图 11-9 的画面。在此过程中，请观察控制台。您应该能看到身份验证回调被调用的记录。\n\n![Image](img/1108.jpg)\n\
    \n**图 11-8.** *初始身份验证对话框启动。*\n\n如您所见，应用程序尚未获得我们请求的权限（传递给`authorize`方法的`NSArray`）的授权。您只需在应用程序首次登录时执行此操作。\n\
    \n![Image](img/1109.jpg)\n\n**图 11-9.** *后续登录尝试会弹出不同的对话框。*\n\n有一些方法可以完全避免这个弹出消息（即在后续登录时）。如果您持久化从\
    \ oAuth 回调返回的访问令牌，可以将其传递给`authorize`方法以获取刷新后的令牌。但这对于我们的目的来说已经足够。\n\n在`RootViewController.h`中，添加两个私有的`FBRequest`变量，分别命名为`_friendsRequest`和`_checkinRequest`。在回调中，Facebook\
    \ 会发送一个对发起调用的`FBRequest`对象的引用。这是我们在解析响应时区分不同 Graph API 调用的唯一方式。\n\n在 Xcode 中打开`RootViewController.m`。让我们调用\
    \ Graph API 并在控制台中查看结果。更新`fbDidLogin`方法，如清单 11-43 所示。\n\n**清单 11-43.** *更新后的 fbDidLogin\
    \ 方法*\n\n```\n- (void)fbDidLogin {\n    NSLog(@\"LOGGED IN\");\n    _friendsRequest\
    \ = [_facebook requestWithGraphPath:@\"me/friends\" andDelegate:self];\n}\n```\n\
    \n此调用使用预定义路径向 Graph API 发起请求。我们使用了`me`关键字，它代表当前用户。`friends`路由返回朋友列表的 JSON 表示。您会注意到此调用现在引用了我们创建的私有`_friendsRequest`对象。\n\
    \n如果您再次运行应用程序，控制台中应显示类似清单 11-44 的内容。\n\n**清单 11-44.** *来自 me/friends 的结果（名称和 ID\
    \ 已更改）*\n\n```\n2011–10-08 10:14:55.281 Ch11[1302:707] RESULT: {\n    data = \
    \    (\n                {\n            id = 12345;\n            name = \"Bob Smith\"\
    ;\n        },\n                {\n            id = 12345;\n            name =\
    \ \"Bob Smith\";\n        },\n                {\n            id = 12345;\n   \
    \         name = \"Bob Smith\";\n        },\n```\n\n我们继续使用前十个返回的结果，并在 AR 视图中加载他们最近的一次签到。更新\
    \ Facebook 查询委托方法，如清单 11-45 所示。\n\n**清单 11-45.** *更新后的 didLoad 方法*\n\n```\n- (void)request:(FBRequest\
    \ *)request didLoad:(id)result {\n    if (request == _friendsRequest) {\n    \
    \    for (int i = 0; i < 1; i++) { // change this to whatever number you like\n\
    \            [_facebook requestWithGraphPath:[NSString stringWithFormat:@\"%@/checkins\"\
    , [[[result objectForKey:@\"data\"] objectAtIndex:i] objectForKey:@\"id\"]] andDelegate:self];\n\
    \        }\n    } else {\n        NSLog(@\"RESULT: %@\", [[result objectForKey:@\"\
    data\"] objectAtIndex:1]);\n    }\n};\n```\n\n让我们花点时间分析一下这段代码块。我们正在检查引用的`FBRequest`对象是否是我们的`_friendsRequest`对象。如果是，我们设置一个`for`循环（如果要扩展，请更改`i\
    \ < #`），以创建对 Graph API 的第二次调用来拉取用户的签到记录。我们正在记录该调用的结果。\n\n清单 11-46 显示了一个示例响应。（再次声明，名称已更改。）\n\
    \n**清单 11-46.** *示例 JSON 响应*\n"
- fmt: "`2011–10-08 10:49:01.573 Ch11[1523:707] RESULT: {`\n`    application =   \
    \  {`\n`        id = 350685531728;`\n`        name = \"Facebook for Android\"\
    ;`\n`    };`\n`    comments =     {`\n`        data =         (`\n`          \
    \              {`\n`                \"created_time\" = \"2011–10-03T21:43:16+0000\"\
    ;`\n`                from =                 {`\n`                    id = 345435;`\n\
    `                    name = \"Bob Smith\";`\n`                };`\n`         \
    \       id = \"42_4\";`\n`                message = \"Can't wait to hear all about\
    \ the new assignment.\";`\n`            },`\n`                        {`\n`  \
    \              \"created_time\" = \"2011–10-04T01:33:16+0000\";`\n`          \
    \      from =                 {`\n`                    id = 345345;`\n`      \
    \              name = \"Dustin Smith\";`\n`                };`\n`            \
    \    id = \"602267025184_841815\";`\n`                message = \"Maybe do this\
    \ one faster?\";`\n`            }`\n`        );`\n`    };`\n`    \"created_time\"\
    \ = \"2011–10-03T19:52:47+0000\";`\n`    from =     {`\n`        id = 34534435;`\n\
    `        name = \"Jason Smith\";`\n`    };`\n`    id = 602267025184;`\n`    likes\
    \ =     {`\n`        data =         (`\n`                        {`\n`       \
    \         id = 09870928;`\n`                name = \"Bob Barbin\";`\n`       \
    \     }`\n`        );`\n`    };`\n`    message = \"Starting the next project.\
    \ Should be fun!\";`\n`    place =     {`\n`        id = 110506962309835;`\n`\
    \        location =         {`\n`            city = \"Palo Alto\";`\n`       \
    \     country = \"United States\";`\n`            latitude = \"37.41761460129\"\
    ;`\n`            longitude = \"-122.15007660582\";`\n`            state = CA;`\n\
    `            street = \"1601 S California Ave\";`\n`            zip = 94304;`\n\
    `        };`\n`        name = \"Facebook HQ\";`\n`    };`\n`}`\n\nLucky that we\
    \ have a check-in related to Facebook. That makes it at least appear relevant.\
    \ If you analyze the structure of the data, you can see that there is an element\
    \ called `place` that contains most of what we will need to send a new GPS coordinate\
    \ to our `ARView`. Let's attach the check-in message to the annotation instead\
    \ of names, so we can use some of the real data.\n\nAdjust the `didLoad` delegate\
    \ method as shown in [Listing 11–47](#Chapter11.html#list_11_47).\n\n**Listing\
    \ 11–47.** *Updated didLoad Method*\n\n```\n- (void)request:(FBRequest *)request\
    \ didLoad:(id)result {\n    if (request == _friendsRequest) {\n        for (int\
    \ i = 0; i < 10; i++) {\n            [_facebook requestWithGraphPath:[NSString\
    \ stringWithFormat:@\"%@/checkins\", [[[result objectForKey:@\"data\"] objectAtIndex:i]\
    \ objectForKey:@\"id\"]] andDelegate:self];\n        }\n    } else {\n       \
    \ if ([[result objectForKey:@\"data\"] count] > 0) {\n            NSString *placeName\
    \ = [[[[result objectForKey:@\"data\"]\nobjectAtIndex:0] objectForKey:@\"place\"\
    ] objectForKey:@\"name\"];\n            NSString *placeLat = [[[[[result objectForKey:@\"\
    data\"] objectAtIndex:0]\nobjectForKey:@\"place\"] objectForKey:@\"location\"\
    ] objectForKey:@\"latitude\"];\n            NSString *placeLong = [[[[[result\
    \ objectForKey:@\"data\"] objectAtIndex:0]\nobjectForKey:@\"place\"] objectForKey:@\"\
    location\"] objectForKey:@\"longitude\"];\n            NSString *checkinMessage\
    \ = [[[result objectForKey:@\"data\"] objectAtIndex:0]\nobjectForKey:@\"message\"\
    ];\n\n            ARGeoCoordinate *tempCoordinate;\n            CLLocation   \
    \             *tempLocation;\n\n            tempLocation = [[CLLocation alloc]\
    \ initWithLatitude:[placeLat floatValue] longitude:[placeLong floatValue]];\n\
    \            tempCoordinate = [[ARGeoCoordinate alloc] initWithCoordinate:tempLocation\
    \ name:checkinMessage place:placeName];\n            [self.arController addCoordinate:tempCoordinate\
    \ animated:NO];\n            [tempLocation release];\n        }\n    }\n}\n```\n\
    \nThe new code sets up a few new temp variables to store the values from the JSON\
    \ response. The temp variables are passed to the `addCoordinate` method so that\
    \ they will appear in our AR view. JSON parsing is fairly simple, once it has\
    \ been converted to an `NSDictionary`, as we have here. You simply follow the\
    \ path down the structure using the `objectForKey` method.\n\nRun the application\
    \ again. If most of your friends are checking in to places that are geographically\
    \ close together, you might need to adjust how many places are shown in the view\
    \ at one time. The example from our console is shown in AR view in [Figure 11–10](#Chapter11.html#fig_11_10).\n\
    \n![Image](images/1110.jpg)\n\n**Figure 11–10.** *Facebook HQ displays as a Facebook\
    \ place.*\n\nWe could probably dress this up a bit and add some interactivity.\
    \ How about we add a `UIButton` that launches a Facebook sharing dialog?\n\nOpen\
    \ `ARAnnotation.m`. Adjust the top of the class as shown in [Listing 11–48](#Chapter11.html#list_11_48).\n\
    \n**Listing 11–48.** *Updated ARAnnotation*\n\n```\n#import \"ARAnnotation.h\"\
    \n#import \"ARCoordinate.h\"\n#import \"AppDelegate.h\"\n#import \"RootViewController.h\"\
    \n#import \"FBConnect.h\"\n\n#define ANNOTATION_WIDTH 150\n#define ANNOTATION_HEIGHT\
    \ 200\n\n@implementation ARAnnotation\nstatic NSString* kAppId = @\"your app id\"\
    ;\n```\n\nWe need to import the `RootViewController` as well as the `AppDelegate`.\
    \ This is because the `RootViewController` has the reference to our Facebook class\
    \ and will be acting as the delegate for our sharing dialog.\n\nAdd the method\
    \ from [Listing 11–49](#Chapter11.html#list_11_49) to the class.\n\n**Listing\
    \ 11–49.** *shareButtonClicked Method*\n\n```\n- (IBAction)shareButtonClicked:(id)sender\
    \ {\n    AppDelegate *_appDelegate = (AppDelegate *)[[UIApplication sharedApplication]\n\
    delegate];\n    RootViewController *_rootViewController = _appDelegate.rootViewController;\n\
    \n    NSMutableDictionary* params = [NSMutableDictionary dictionaryWithObjectsAndKeys:\n\
    \                                   kAppId, @\"app_id\",\n                   \
    \                @\"http://amzn.com/1430239123\", @\"link\",\n               \
    \                    @\"http://bit.ly/qILSZh\", @\"picture\",\n              \
    \                     @\"Facebook Places AR App\", @\"name\",\n              \
    \                     @\"Sharing information on a Facebook Place\",\n@\"caption\"\
    ,\n                                   @\"Look, All my Facebook places are in Augmented\n\
    Reality view.\", @\"description\",\n                                   @\"Buy\
    \ the book\",  @\"message\",\n                                   nil];\n\n   \
    \ [_rootViewController.facebook dialog:@\"feed\"\n            andParams:params\n\
    \          andDelegate:_rootViewController];\n}\n```\n\nThis method will be called\
    \ from the `UIButton` outlet we're about to add to the pop-up. It finds a reference\
    \ to the `RootViewController` instance the application is running, and then it\
    \ creates an `NSMutableDictionary` with the POST parameters required for our call\
    \ to the Facebook API. We then call the dialog method from the `facebook` property\
    \ of our `RootViewController`. This will launch a dialog prompting us to add a\
    \ comment as we share the post.\n\nUpdate the `initWithCoordinate` method as shown\
    \ in [Listing 11–50](#Chapter11.html#list_11_50).\n\n**Listing 11–50.** *Updates\
    \ to initWithCoordinate*\n\n```\n- (id)initWithCoordinate:(ARCoordinate *)coordinate\n\
    {\n    CGRect annotationFrame = CGRectMake(0, 0, ANNOTATION_WIDTH, ANNOTATION_HEIGHT);\n\
    \n    if (self = [super initWithFrame:annotationFrame]) {\n        UIButton *shareButton\
    \ = [UIButton buttonWithType:UIButtonTypeCustom];\n        [shareButton setFrame:CGRectMake(0,\
    \ 0, 32, 32)];\n        [shareButton setBackgroundImage:[UIImage imageNamed:@\"\
    Facebook-Places.png\"]\nforState:UIControlStateNormal];\n        [shareButton\
    \ addTarget:self action:@selector(shareButtonClicked:)\nforControlEvents:UIControlEventTouchUpInside];\n\
    \        [self addSubview:shareButton];\n}"
