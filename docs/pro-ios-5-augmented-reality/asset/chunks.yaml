  trans: '

    #### 在视频预览上构建基础


    在第 7 章中，我们将讨论如何在视频预览上叠加 cocos2D 图层，以构建增强现实游戏。因此，本节将简要介绍一些核心概念。


    在 Xcode 中打开`PhotoViewController.m`，找到`loadPhotoPicker`方法。该方法会打开`UIImagePickerController`对象，允许用户拍照。请按照代码清单
    6-10 所示更新该方法。


    **代码清单 6-10.** *更新后的 loadPhotoPicker*


    ```

    - (IBAction)loadPhotoPicker:(id)sender {

        UIImagePickerController *imagePicker = [[UIImagePickerController alloc] init];

        imagePicker.sourceType =  UIImagePickerControllerSourceTypeCamera;

        // 取消注释以使用前置摄像头

        // imagePicker.cameraDevice = UIImagePickerControllerCameraDeviceFront;

        imagePicker.cameraDevice = UIImagePickerControllerCameraCaptureModeVideo;

        imagePicker.showsCameraControls = NO;

        imagePicker.toolbarHidden = YES;

        imagePicker.navigationBarHidden = YES;

        imagePicker.wantsFullScreenLayout = YES;


        imagePicker.delegate = self;

        imagePicker.allowsEditing = NO;

        [self presentModalViewController:imagePicker animated:YES];

    }

    ```


    我们为`UIImagePickerController`对象设置了几个新选项。首先，将设备类型设为摄像机。然后，隐藏了摄像机的控制项、工具栏和导航栏。最后，指示视图控制器让`UIImagePickerController`以全屏模式渲染。


    完成此更改后，如果运行代码，你将得到类似于图 6-10 的效果。


    ![Image](img/0610.jpg)


    **图 6-10.** *我们获得了全屏视频。没有任何控制项！*


    这个简洁的视频界面为构建增强现实应用提供了完美的背景。


    如果我们想要分析这些视频帧，就必须设置一个`NSTimer`，并定时捕获和保存预览屏幕。或者，我们也可以设置某种用户操作来触发图像保存，或者使用某种程序化循环。这些方案都不理想，正如你可能已从本章前面的示例中注意到的，手动保存图像会占用处理器一两秒的时间。让我们探索一种更好的方式来捕获视频帧以供分析。


    #### 构建帧捕获的基础


    帧捕获会话的工作方式略有不同。为了演示这一点，我们将使用一个名为`AVCaptureSession`的新类。让我们在示例应用中将其放入一个单独的标签页中，以便日后参考对比。


    首先，添加使用 AV Foundation 库所需的框架。请将以下框架添加到你的项目中。


    *   `CoreVideo`

    *   `CoreMedia`

    *   `AVFoundation`

    *   `ImageIO`


    接下来，向项目中添加一个新的 Cocoa Touch 文件，使用`UIViewController`子类。请确保不要将此类设置为 iPad 专用，并且不要为界面使用
    XIB 文件。将此类命名为`VideoViewController`。


    我们将像之前示例中那样，创建另一个标签栏项，并将其链接到 iPad 和 iPhone 故事板。打开两个故事板文件，按照之前相同的步骤将它们链接到标签栏。完成后，你应该会在
    iPhone 故事板中看到类似于图 6-11 的内容。


    ![Image](img/0611.jpg)


    **图 6-11.** *你已在 iPhone 故事板中添加了新的标签栏项。*


    对 iPad 故事板重复这些步骤。在这两个界面中，我们将添加几个输出口（outlet）。首先，向`VideoViewController`的 NIB 中添加一个`UIView`。将其命名为`videoPreview`。确保将该输出口连接到`VideoViewController`的头文件。在助理编辑器中打开`VideoViewController.h`时，导入`AVFoundation.h`和`ImageIO/CGImageProperties.h`头文件。你的新接口文件应如代码清单
    6-11 所示。


    **代码清单 6-11.** *更新后的 VideoViewController.h*


    ```

    #import <UIKit/UIKit.h>

    #import <AVFoundation/AVFoundation.h>

    #import <ImageIO/CGImageProperties.h>


    @interface VideoViewController : UIViewController {


    }

    @property (strong, nonatomic) IBOutlet UIView *videoPreview;

    @end

    ```


    接下来，我们将向`VideoViewController`布局中添加一个`UIImageView`输出口和一个`UIButton`。将`UIImageView`命名为`videoImage`，并将一个名为`captureScreen`的操作连接到该`UIButton`。


    为了从视频预览中保存静态图像，我们将使用`AVCaptureStillImageOutput`对象。为此对象创建一个名为`stillImageOutput`的属性。


    现在，`VideoViewController.h`应如代码清单 6-12 所示。


    **代码清单 6-12.** *更新后的 VideoViewController.h*


    ```

    #import <UIKit/UIKit.h>

    #import <AVFoundation/AVFoundation.h>

    #import <ImageIO/CGImageProperties.h>


    @interface VideoViewController : UIViewController {


    }

    @property(nonatomic, retain) AVCaptureStillImageOutput *stillImageOutput;


    @property (strong, nonatomic) IBOutlet UIView *videoPreview;

    @property (strong, nonatomic) IBOutlet UIImageView *videoImage;

    - (IBAction)captureScreen:(id)sender;

    @end

    ```


    在 Xcode 中切换到`VideoViewController.m`。我们需要创建一个`viewDidAppear`方法来启动相机预览会话。使用代码清单
    6-13 所示的代码创建该方法。


    **代码清单 6-13.** *viewDidAppear 方法*


    ```

    - (void)viewDidAppear:(BOOL)animated {

        AVCaptureSession *session = [[AVCaptureSession alloc] init];

        session.sessionPreset = AVCaptureSessionPresetMedium;


        AVCaptureVideoPreviewLayer *captureVideoPreviewLayer = [[AVCaptureVideoPreviewLayer
    alloc] initWithSession:session];

        captureVideoPreviewLayer.frame = self.videoPreview.bounds;

            [self.videoPreview.layer addSublayer:captureVideoPreviewLayer];


            AVCaptureDevice *device = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];


            NSError *error = nil;

            AVCaptureDeviceInput *input = [AVCaptureDeviceInput deviceInputWithDevice:device
    error:&error];

            if (!input) {

                    NSLog(@"ERROR: trying to open camera: %@", error);

            }

            [session addInput:input];

            // 占位符

            [session startRunning];

    }

    ```

    '
- fmt: 'Let''s walk through this a bit before moving on to testing the application.
    First, we create an instance of `AVCaptureSession`. We set our video quality to
    medium for this application. Next, we create an instance of `AVCaptureVideoPreviewLayer`.
    This will be used to store the real time preview of the video buffer.


    Next, we set the frame to fill the size of the `videoPreviewUIView`. We then set
    up our `AVCaptureDevice`, which we''ve covered in previous examples, and we check
    to make sure it''s available.


    The last few lines are very important. If you don''t start your `AVCaptureSession`
    with the `startRunning` method, nothing will appear in your view.


    You can run the application to this point. You should see your `UIView` filled
    with the camera''s preview. Not all that exciting, is it? We had this already
    in our photo example. Let''s extend this example so that our `UIButton` invokes
    a routine that captures a still image from the video buffer without affecting
    the live preview.


    Return to `VideoViewController.m` in Xcode. At the end of the `viewDidAppear`
    method, we left a comment labeled `// Placeholder.` Find that section and replace
    it with the code from [Listing 6–14](#Chapter06.html#list_6_14).


    **Listing 6–14.** *Replace the Placeholder Comment*


    ```

    stillImageOutput = [[AVCaptureStillImageOutput alloc] init];

        NSDictionary *outputSettings = [[NSDictionary alloc] initWithObjectsAndKeys:
    AVVideoCodecJPEG, AVVideoCodecKey, nil];

        [stillImageOutput setOutputSettings:outputSettings];


        [session addOutput:stillImageOutput];

    ```


    This code has a specific purpose. It captures the still image from the camera
    and saves it to the `AVCaptureStillImageOutput` object we created earlier.


    Locate the `captureScreenIBAction` method. Update this method with the code from
    [Listing 6–15](#Chapter06.html#list_6_15).


    **Listing 6–15.** *`captureScreen` Method*


    ```

    - (IBAction)captureScreen:(id)sender {

        AVCaptureConnection *videoConnection = nil;

            for (AVCaptureConnection *connection in stillImageOutput.connections)

            {

                    for (AVCaptureInputPort *port in [connection inputPorts])

                    {

                            if ([[port mediaType] isEqual:AVMediaTypeVideo] )

                            {

                                    videoConnection = connection;

                                    break;

                            }

                    }

                    if (videoConnection) { break; }

            }


            NSLog(@"about to request a capture from: %@", stillImageOutput);

            [stillImageOutput captureStillImageAsynchronouslyFromConnection:videoConnection
    completionHandler: ^(CMSampleBufferRef imageSampleBuffer, NSError *error)

         {

                    CFDictionaryRef exifAttachments = CMGetAttachment( imageSampleBuffer,

    kCGImagePropertyExifDictionary, NULL);

                    if (exifAttachments)

                    {

                 // Do something with the attachments.

                 NSLog(@"attachements: %@", exifAttachments);

                     }

             else

                 NSLog(@"no attachments");


            NSData *imageData = [AVCaptureStillImageOutput jpegStillImageNSDataRepresentation:imageSampleBuffer];

            UIImage *image = [[UIImage alloc] initWithData:imageData];


            self.videoImage.image = image;

            }];

    }

    ```


    There are two main code blocks in this method. The first code block checks for
    the `AVCaptureConnection` in the `AVCaptureStillImageOutput` object. We verify
    that this is a video output and set a local reference to the `AVCaptureConnection`
    instance.


    Next, we capture (asynchronously) the image from the camera. We set up an image
    buffer to store the image. After this, we use the ImageIO framework to capture
    the EXIF attachments of the image. This might be useful for setting up filters
    or storing values about the photo quality for other purposes.


    Finally, we set the `UIImageView` outlet to display our captured video frame.
    If you run the project, you will see something similar to [Figure 6–12](#Chapter06.html#fig_6_12).


    ![Image](images/0612.jpg)


    **Figure 6–12.** *We''ve easily captured video evidence of wine and iced coffee.*


    Our example worked perfectly. You will notice the shutter noise over the speakers
    when you capture a screen. This is because of how we went about grabbing the still
    image. In [Chapter 13](#Chapter13.html#ch13)''s example application, we''ll vary
    this approach slightly to remove that effect.


    Finally, let''s take a quick look at the EXIF attachments that came with our still
    image. [Listing 6–16](#Chapter06.html#list_6_16) shows the output from the console.


