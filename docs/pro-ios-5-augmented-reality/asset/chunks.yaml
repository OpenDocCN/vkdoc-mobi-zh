    \n**Listing 9–12.** `layerClass` 静态方法\n\n```\n+ (Class)layerClass\n{\n    return\
    \ [CAEAGLLayer class];\n}\n```\n\n我们将从故事板的视图控制器 NIB 文件加载此类，因此需要实现 `initWithCoder`\
    \ 方法。复制 [Listing 9–13](#Chapter09.html#list_9_13) 中的方法。\n\n**Listing 9–13.** `initWithCoder`\n\
    \n```\n- (id)initWithCoder:(NSCoder*)coder\n{\n    self = [super initWithCoder:coder];\n\
    \n        if (self) {\n        NSLog(@\"Initialising EAGLView\");\n        CAEAGLLayer\
    \ *eaglLayer = (CAEAGLLayer *)self.layer;\n\n        eaglLayer.opaque = TRUE;\n\
    \        eaglLayer.drawableProperties = [NSDictionary dictionaryWithObjectsAndKeys:\n\
    \                                        [NSNumber numberWithBool:FALSE], kEAGLDrawablePropertyRetainedBacking,\n\
    \                                        kEAGLColorFormatRGBA8, kEAGLDrawablePropertyColorFormat,\n\
    \                                        nil];\n\n        context = [[EAGLContext\
    \ alloc] initWithAPI:kEAGLRenderingAPIOpenGLES2];\nQCARFlags = QCAR::GL_20;\n\n\
    NSLog(@\"QCAR OpenGL flag: %d\", QCARFlags);\n\n        if (!context) {\n    \
    \        NSLog(@\"Failed to create ES context\");\n        }\n    }\n\n    return\
    \ self;\n}\n```\n\n此代码与我们在 OpenGL ES 模板或其他 OpenGL 应用程序中通常看到的代码之间的关键区别在于 `QCAR`\
    \ 标志。我们在此处设置它们，以便 SDK 知道预期什么。\n\n复制 [Listing 9–14](#Chapter09.html#list_9_14)\
    \ 中的方法到实现中。\n\n**Listing 9–14.** `createFrameBuffer` 方法\n\n```\n- (void)createFramebuffer\n\
    {\n    if (context && !defaultFramebuffer) {\n        [EAGLContext setCurrentContext:context];\n\
    \n        // Create default framebuffer object\n        glGenFramebuffers(1, &defaultFramebuffer);\n\
    \        glBindFramebuffer(GL_FRAMEBUFFER, defaultFramebuffer);\n\n        //\
    \ Create colour render buffer and allocate backing store\n        glGenRenderbuffers(1,\
    \ &colorRenderbuffer);\n        glBindRenderbuffer(GL_RENDERBUFFER, colorRenderbuffer);\n\
    \n        // Allocate the renderbuffer's storage (shared with the drawable object)\n\
    \        [context renderbufferStorage:GL_RENDERBUFFER fromDrawable:(CAEAGLLayer\n\
    *)self.layer];\n        glGetRenderbufferParameteriv(GL_RENDERBUFFER, GL_RENDERBUFFER_WIDTH,\n\
    &framebufferWidth);\n        glGetRenderbufferParameteriv(GL_RENDERBUFFER, GL_RENDERBUFFER_HEIGHT,\n\
    &framebufferHeight);\n\n        // Create the depth render buffer and allocate\
    \ storage\n        glGenRenderbuffers(1, &depthRenderbuffer);\n        glBindRenderbuffer(GL_RENDERBUFFER,\
    \ depthRenderbuffer);\n        glRenderbufferStorage(GL_RENDERBUFFER, GL_DEPTH_COMPONENT16,\
    \ framebufferWidth,\nframebufferHeight);\n\n        // Attach colour and depth\
    \ render buffers to the frame buffer\n        glFramebufferRenderbuffer(GL_FRAMEBUFFER,\
    \ GL_COLOR_ATTACHMENT0, GL_RENDERBUFFER,\ncolorRenderbuffer);\n        glFramebufferRenderbuffer(GL_FRAMEBUFFER,\
    \ GL_DEPTH_ATTACHMENT, GL_RENDERBUFFER,\ndepthRenderbuffer);\n\n        // Leave\
    \ the colour render buffer bound so future rendering operations will act\non it\n\
    \        glBindRenderbuffer(GL_RENDERBUFFER, colorRenderbuffer);\n\n        if\
    \ (glCheckFramebufferStatus(GL_FRAMEBUFFER) != GL_FRAMEBUFFER_COMPLETE) {\n  \
    \          NSLog(@\"Failed to make complete framebuffer object %x\",\nglCheckFramebufferStatus(GL_FRAMEBUFFER));\n\
    \        }\n    }\n}\n```\n\n此方法以及后续的一些方法取自 OpenGL 模板。我们从 [Listing 9–14](#Chapter09.html#list_9_14)\
    \ 复制的方法设置了帧缓冲区，使 OpenGL 能够在图层上开始绘制。\n\n我们还需要帧缓冲区的拆卸方法。当帧缓冲区不再需要内存时，[Listing 9–15](#Chapter09.html#list_9_15)\
    \ 中的方法会释放内存。\n\n**Listing 9–15.** `deleteFrameBuffer` 方法\n\n```\n- (void)deleteFramebuffer\n\
    {\n    if (context) {\n        [EAGLContext setCurrentContext:context];\n    \
    \    if (defaultFramebuffer) {\n            glDeleteFramebuffers(1, &defaultFramebuffer);\n\
    \            defaultFramebuffer = 0;\n        }\n\n        if (colorRenderbuffer)\
    \ {\n            glDeleteRenderbuffers(1, &colorRenderbuffer);\n            colorRenderbuffer\
    \ = 0;\n        }\n\n        if (depthRenderbuffer) {\n            glDeleteRenderbuffers(1,\
    \ &depthRenderbuffer);\n            depthRenderbuffer = 0;\n        }\n    }\n\
    }\n```\n\n复制 [Listing 9–16](#Chapter09.html#list_9_16) 中的方法。此方法设置我们之前声明的 `defaultFramebuffer`\
    \ 实例变量。\n\n**Listing 9–16.** `setFrameBuffer`\n\n```\n- (void)setFramebuffer\n\
    {\n    if (context) {\n        [EAGLContext setCurrentContext:context];\n\n  \
    \      if (!defaultFramebuffer) {\n            // Perform on the main thread to\
    \ ensure safe memory allocation for\n            // the shared buffer. Block until\
    \ the operation is complete to\n            // prevent simultaneous access to\
