- fmt: "`CGContextRelease( context );`  \n`CGColorSpaceRelease( colorSpaceRef );`\
    \  \n`cvReleaseMemStorage( &storage );`  \n`cvReleaseHaarClassifierCascade( &cascade\
    \ );`  \n`cvReleaseImage( &smallImage );`  \n`[pool release];`  \n`}`\n\nLet’s\
    \ step through this for a moment. First, we set up an `NSAutoReleasePool` to handle\
    \ memory allocation and release during the processing of the image. We load our\
    \ Haar cascade from the file path and set up some basic information for the detector\
    \ such as size, width, and scale.\n\nAfter we convert the `UIImage` to an `IplImage`\
    \ using our new helper method, we use the `cvHaarDetectObjects` function to detect\
    \ the faces in the picture. From there, we have a few paths the method can take.\
    \ First, if we don’t find any faces, we fire a `UIAlertView` to notify the user\
    \ to select a new image. If we do find faces, we iterate over them and overlay\
    \ a translucent square on the image.\n\nThere are a few interesting methods here\
    \ that you might recognize if you dove any deeper into cocos2D earlier in this\
    \ book. The notion of `DeviceSpace` and `WorldSpace` are common in game programming.\
    \ Sometimes, you are working in pixels on an image, which might differ from CGPoints\
    \ or percentages in other systems. These C-based conversion functions make it\
    \ easy to switch between special systems.\n\nOkay, we have both of our processing\
    \ methods in place. We need to call them after we obtain the `UIImage` from the\
    \ library or camera. Find the `didFinishPickingImage` delegate method and add\
    \ the line from [Listing 12–9](#Chapter12.html#list_12_9) at the end of the routine.\n\
    \n**Listing 12–9.** *Call the OpenCV Routine*\n\n`[self openCVFaceDetect];`\n\n\
    You should be ready to test the routine. Launch the application on the simulator\
    \ or on a physical device. I’m choosing the **Library** option for my image. After\
    \ I select the image, something unexpected happens: my console shows the output\
    \ from [Listing 12–10](#Chapter12.html#list_12_10).\n\n**Listing 12–10.** *Not\
    \ Great Output*\n\n`Detected an attempt to call a symbol in system libraries that\
    \ is not present on the iPhone: strtod$UNIX2003 called from function _ZL10icv_strtodP13CvFileStoragePcPS1_\
    \ in image OpenCV-iPad.`\n\nLuckily, we know what causes this situation. In most\
    \ available OpenCV distributions, there isn’t an appropriate build for the architecture\
    \ of our devices and simulators. We used a static library for this example that\
    \ needs to be updated. Let’s update that and try again.\n\nOpenCV has a lot of\
    \ great open source build scripts. The version I have used the most was contributed\
    \ by YoshimasaNiwa ([`https://github.com/niw`](https://github.com/niw)). We’ll\
    \ be following this recommendation to fix our sample project. Download the OpenCV\
    \ source for 2.2.0 from this URL: [`http://sourceforge.net/projects/opencvlibrary/files/opencv-unix/2.2/OpenCV-2.2.0.tar.bz2/download`](http://sourceforge.net/projects/opencvlibrary/files/opencv-unix/2.2/OpenCV-2.2.0.tar.bz2/download).\n\
    \n**NOTE:** There may be new versions of OpenCV available. This routine should\
    \ still work without issue. If you can’t find 2.2.0, try to use a newer version.\n\
    \nOpen the command line utility on your Mac. Navigate to the directory where you\
    \ downloaded the archive. Run the command from [Listing 12–11](#Chapter12.html#list_12_11).\n\
    \n**Listing 12–11.** *Extract OpenCV*\n\n```\nKyle-Roches-MacBook-Pro-2:Downloads\
    \ kyleroche$ tar xjvf OpenCV-2.2.0.tar.bz2\nx OpenCV-2.2.0/.DS_Store\nx OpenCV-2.2.0/3rdparty/CMakeLists.txt\n\
    x OpenCV-2.2.0/3rdparty/ilmimf/LICENSE\nx OpenCV-2.2.0/3rdparty/ilmimf/README\n\
    ….. on and on and on…..\n```\n\nNow that we’ve extracted the library, we need\
    \ to apply a quick patch to make sure we can build this for iOS. Download the\
    \ patch files from [`https://github.com/niw/iphone_opencv_test`](https://github.com/niw/iphone_opencv_test).\
    \ To make things easier, I downloaded the whole GitHub repository and moved my\
