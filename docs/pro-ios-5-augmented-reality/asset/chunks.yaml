    \        label.position =  ccp( size.width /2 , size.height/2 );\n\n        //\
    \ 将标签添加为此 Layer 的子节点\n        [self addChild: label];\n\n            self.isTouchEnabled\
    \ = YES;\n            [[SimpleAudioEngine sharedEngine] preloadEffect:@\"explosion.caf\"\
    ];\n    }\n    return self;\n}\n```\n\n除了方法签名外，我们只向该方法添加了一行代码。我们将私有变量 `_hud` 设置为我们之前在静态\
    \ scene 方法中创建的新 `HUDLayer` 对象。\n\n在测试应用程序之前，还有最后一件事要做。找到 `ccTouchEnded` 方法，并在我们的\
    \ `NSLog` 语句之前添加代码清单 7-25 中的代码。\n\n**代码清单 7-25.** *调用 HUDLayer 的 incrementCounter\
    \ 方法*\n\n```\n[_hud incrementCounter];\n```\n\n就这样。我们新的 HUD 层应该被加载到场景中，并负责递增屏幕右上角当前计数标签的值。在你的设备上运行项目。声音和粒子效果应该保持不变。但是，你应该会看到屏幕顶部显示触摸次数的标签。点击几次；你最终会看到类似图\
    \ 7-8 的效果。\n\n![图片](img/0708.jpg)\n\n**图 7-8.** *你现在可以在屏幕的右上角看到 HUD 层。*\n\n你可以添加更复杂的\
    \ HUD 层，它们能自行处理用户输入，例如按钮或选择选项。本书将不涉及这部分内容。有关 cocos2D 或高级游戏主题的更多信息，请参考 Apress 出版的任何一本关于\
    \ cocos2D 的书籍。\n\n# 本章小结\n\n在本章中，我介绍了 cocos2D。我们设置了示例模板，并将 Hello World 项目从一个简单的标签扩展为一个简单的增强现实游戏。我们将相机视图缩放以适应设备在横屏模式下的宽高比。然后，我们为用户触摸事件设置了事件处理程序。\n\
    \n我们这个简单的小游戏处理用户的触摸事件，创建并启动粒子系统以实现视觉效果，甚至还包含了爆炸音效。我们甚至构建了一个独立的 HUD 层，它独立于游戏层，用于统计指标并将其显示给用户。\n\
    \n在下一章中，我们将把增强现实游戏提升到一个新的水平，利用陀螺仪创建一个 360 度的第一人称增强现实射击游戏。\n\n# 第 8 章\n"
- fmt: '# Building a cocos2D AR Game


    In this chapter, we''re going to extend on what we learned in [Chapter 7](#Chapter07.html#ch7)
    and build a fully functional AR game. There are so many scenarios or possible
    story lines for augmented reality games. Although this plot is a little ridiculous,
    it''ll demonstrate some important capabilities for AR gaming. We''ll learn how
    to structure a cocos2D game with a menu and launch options. We''ll also handle
    scoring and end game scenes. The entire game will be played on top of a camera
    view.


    ## Overview


    Every game starts with a story. Here''s our story: Some alien pumpkins have taken
    over our planet. The universal police have released a special device that lets
    us see the pumpkins and destroy them by tapping on them through the camera. This
    device, of course, is our iPad or iPhone.


    When the game launches, we''re going to use a class new to iOS 5 called `CIDetector`.
    This class will be discussed in more detail in [Chapter 12](#Chapter12.html#ch12).
    All you need to know now is that it will identify faces in the camera view and
    allow us to overlay pumpkin images in place of people''s heads. When people are
    found in the camera view, you will see something like [Figure 8–1](#Chapter08.html#fig_8_1).


    ![Image](images/0801.jpg)


    **Figure 8–1.** *Here is our sample pumpkin, overlaying a face.*


    We should already have everything we need to start coding. In [Chapter 7](#Chapter07.html#ch7),
    we setup cocos2D and ran through a brief sample. We''ll be using the same templates
    that we installed with cocos2D in this chapter. More precisely, we''ll be using
    the template that includes cocos2D and the chipmunk physics library. We won''t
    be doing too much with chipmunk in the game. We''re going to use it to make our
    menu screen more interesting for the user.


    Scoring in this game will be somewhat difficult. Since we''re randomly placing
    pumpkins on people''s faces, then blowing them up, we have to consider how quickly
    a pumpkin can reappear. To prevent an unwinnable game, we''re going to use a static
    set of pumpkins. They will most likely find the same victim more than once (unless
    you can test this in a big crowd). After the user has cleared the whole clan of
    alien pumpkins, we''ll let them win the game. We''ll put a timer on it as well,
    so the aliens have a fair shot at continuing their existence.


    ## Creating the Project


    If you skipped [Chapter 7](#Chapter07.html#ch7), go back and make sure you follow
    the steps in the "Installation" section. The cocos2D framework will be absolutely
    required for this chapter.


    Create a new project in Xcode. Make sure you choose the `cocos2d_chipmunk` template,
    as shown in [Figure 8–2](#Chapter08.html#fig_8_2).


    ![Image](images/0802.jpg)


    **Figure 8–2.** *Choose the cocos2d_chipmunk template.*


    Name your project. I''m calling mine `Ch8`, so you can find it easily in the GitHub
    repository or from the Source Code/Download area at the Apress web site ([`www.apress.com`](http://www.apress.com)).
    Make sure you set the project as a **Universal Project**. Minimize **Supported
    Device Orientations** to **Landscape Right** only, as shown in [Figure 8–3](#Chapter08.html#fig_8_3).
    We are doing this to minimize the logic on pumpkin placement.


    ![Image](images/0803.jpg)


    **Figure 8–3.** *Set the Supported Device Orientations to Landscape Right.*


    Run the project and make sure everything is working. Sometimes chipmunk causes
    some headaches that are hard to track down if you get too far into the project.
    Chipmunk has a different Hello World style than the standard cocos2D template.
    You''ll see a single man on the screen. His name is Grossini, in case you''re
    wondering.


    Now, this is a very cool Hello World project. If you click on the screen, a new
    Grossini appears and moves the other ones out of his way. The application reacts
    to your accelerometer and orientation as well, so if you''re interested in seeing
    a quick example of what chipmunk can do for you, run this on your device, not
    just the simulator.


    After clicking on the screen a few times, I''m left with something like [Figure
    8–4](#Chapter08.html#fig_8_4).


    ![Image](images/0804.jpg)


    **Figure 8–4.** *Click on the screen a few times to see the Grossini multiplication.*


    Close the application and return to Xcode. Let''s delete the files we aren''t
    going to use, and build this project back up from scratch. Delete `HelloWorldLayer.h`,
    `HelloWorldLayer.m`, and `grossini_dance_atlas.png` from the project.


    Open `AppDelegate.m`. Remove the `import` statement for the class we just deleted.
    Then comment out the line shown in [Listing 8–1](#Chapter08.html#list_8_1). It
    can be found at the end of the `applicationDidFinishLaunching` method.


    **Listing 8–1.** *Comment out the HelloWorld Scene*


    ```

    //[[CCDirector sharedDirector] runWithScene: [HelloWorldLayer scene]];

    ```


    Okay, make sure the application builds. You don''t need it to run yet, but it
    should compile with no errors.'
  raw: '## Building a cocos2D AR Game


    In this chapter, we''re going to extend on what we learned in [Chapter 7](#Chapter07.html#ch7)
    and build a fully functional AR game. There are so many scenarios or possible
    story lines for augmented reality games. Although this plot is a little ridiculous,
    it''ll demonstrate some important capabilities for AR gaming. We''ll learn how
    to structure a cocos2D game with a menu and launch options. We''ll also handle
    scoring and end game scenes. The entire game will be played on top of a camera
    view.


    ### Overview


    Every game starts with a story. Here''s our story: Some alien pumpkins have taken
    over our planet. The universal police have released a special device that lets
    us see the pumpkins and destroy them by tapping on them through the camera. This
    device, of course, is our iPad or iPhone.


    When the game launches, we''re going to use a class new to iOS 5 called `CIDetector`.
    This class will be discussed in more detail in [Chapter 12](#Chapter12.html#ch12).
    All you need to know now is that it will identify faces in the camera view and
    allow us to overlay pumpkin images in place of people''s heads. When people are
    found in the camera view, you will see something like [Figure 8–1](#Chapter08.html#fig_8_1).


    ![Image](images/0801.jpg)


    **Figure 8–1.** *Here is our sample pumpkin, overlaying a face.*


    We should already have everything we need to start coding. In [Chapter 7](#Chapter07.html#ch7),
    we setup cocos2D and ran through a brief sample. We''ll be using the same templates
    that we installed with cocos2D in this chapter. More precisely, we''ll be using
    the template that includes cocos2D and the chipmunk physics library. We won''t
    be doing too much with chipmunk in the game. We''re going to use it to make our
    menu screen more interesting for the user.


    Scoring in this game will be somewhat difficult. Since we''re randomly placing
    pumpkins on people''s faces, then blowing them up, we have to consider how quickly
    a pumpkin can reappear. To prevent an unwinnable game, we''re going to use a static
    set of pumpkins. They will most likely find the same victim more than once (unless
    you can test this in a big crowd). After the user has cleared the whole clan of
    alien pumpkins, we''ll let them win the game. We''ll put a timer on it as well,
    so the aliens have a fair shot at continuing their existence.


    ### Creating the Project


    If you skipped [Chapter 7](#Chapter07.html#ch7), go back and make sure you follow
    the steps in the “Installation” section. The cocos2D framework will be absolutely
    required for this chapter.


    Create a new project in Xcode. Make sure you choose the `cocos2d_chipmunk` template,
    as shown in [Figure 8–2](#Chapter08.html#fig_8_2).


    ![Image](images/0802.jpg)


    **Figure 8–2.** *Choose the cocos2d_chipmunk template.*


    Name your project. I''m calling mine Ch8, so you can find it easily in the GitHub
    repository or from the Source Code/Download area at the Apress web site ([`www.apress.com`](http://www.apress.com)).
    Make sure you set the project as a **Universal Project**. Minimize **Supported
    Device Orientations** to **Landscape Right** only, as shown in [Figure 8–3](#Chapter08.html#fig_8_3).
    We are doing this to minimize the logic on pumpkin placement.


    ![Image](images/0803.jpg)


    **Figure 8–3.** *Set the Supported Device Orientations to Landscape Right.*


    Run the project and make sure everything is working. Sometimes chipmunk causes
    some headaches that are hard to track down if you get too far into the project.
    Chipmunk has a different Hello World style than the standard cocos2D template.
    You''ll see a single man on the screen. His name is Grossini, in case you''re
    wondering.


    Now, this is a very cool Hello World project. If you click on the screen, a new
    Grossini appears and moves the other ones out of his way. The application reacts
    to your accelerometer and orientation as well, so if you''re interested in seeing
    a quick example of what chipmunk can do for you, run this on your device, not
    just the simulator.


    After clicking on the screen a few times, I''m left with something like [Figure
    8–4](#Chapter08.html#fig_8_4).


    ![Image](images/0804.jpg)


    **Figure 8–4.** *Click on the screen a few times to see the Grossini multiplication.*


    Close the application and return to Xcode. Let''s delete the files we aren''t
    going to use, and build this project back up from scratch. Delete `HelloWorldLayer.h`,
    `HelloWorldLayer.m`, and `grossini_dance_atlas.png` from the project.


    Open `AppDelegate.m`. Remove the `import` statement for the class we just deleted.
    Then comment out the line shown in [Listing 8–1](#Chapter08.html#list_8_1). It
    can be found at the end of the `applicationDidFinishLaunching` method.


    **Listing 8–1.** *Comment out the HelloWorld Scene*


    `//[[CCDirector sharedDirector] runWithScene: [HelloWorldLayer scene]];`


    Okay, make sure the application builds. You don''t need it to run yet, but it
    should compile with no errors.'
  trans: '

    # 构建 cocos2D AR 游戏


    本章将扩展我们在第 7 章中学到的知识，构建一个功能完备的增强现实（AR）游戏。增强现实游戏可以拥有众多场景或故事线。虽然本游戏的情节略显荒诞，但它将展示
    AR 游戏的一些重要能力。我们将学习如何构建一个带有菜单和启动选项的 cocos2D 游戏结构，并处理计分和游戏结束场景。整个游戏将在相机视图之上进行。


    ## 概述


    每个游戏都始于一个故事。我们的故事是：外星南瓜占领了地球。星际警察发布了一种特殊设备，让我们能够看到这些南瓜，并通过相机点击它们将其摧毁。这个设备当然就是我们的
    iPad 或 iPhone。


    游戏启动时，我们将使用一个 iOS 5 新增的类——`CIDetector`。这个类将在第 12 章中详细讨论。现在你只需要知道，它能识别相机视图中的人脸，并允许我们在人的头部位置叠加南瓜图像。当相机视图中检测到人脸时，你会看到类似图
    8-1 的效果。


    ![Image](img/0801.jpg)


    **图 8-1.** *我们的南瓜示例，叠加在人脸上。*


    我们现在应该已经具备了开始编码所需的一切。在第 7 章中，我们配置了 cocos2D 并运行了一个简单示例。本章将使用我们在安装 cocos2D 时一同安装的模板。更准确地说，我们将使用包含
    cocos2D 和 chipmunk 物理库的模板。我们不会在游戏中使用太多 chipmunk 功能，而是利用它让菜单屏幕对用户来说更有趣。


    本游戏的计分会有一定难度。由于我们是在人脸上随机放置南瓜并炸毁它们，因此需要考虑南瓜重新出现的速度。为了避免游戏无法获胜，我们将使用一组固定的南瓜。这些南瓜很可能会多次覆盖同一个人（除非你能在人群中测试）。当用户消灭所有外星南瓜后，我们就判定玩家获胜。我们还会设置一个计时器，让外星人有公平的机会继续存在。


    ## 创建项目


    如果你跳过了第 7 章，请返回并确保你已完成“安装”部分的步骤。本章绝对需要 cocos2D 框架。


    在 Xcode 中创建一个新项目。确保选择 `cocos2d_chipmunk` 模板，如图 8-2 所示。


    ![Image](img/0802.jpg)


    **图 8-2.** *选择 cocos2d_chipmunk 模板。*


    为项目命名。我将其命名为 `Ch8`，这样你可以轻松在 GitHub 仓库或 Apress 网站（[`www.apress.com`](http://www.apress.com)）的“源代码/下载”区找到它。确保将项目设置为**通用项目**。将**支持的设备方向**仅设置为**横向右**，如图
    8-3 所示。这样做是为了最小化南瓜放置的逻辑。


    ![Image](img/0803.jpg)


    **图 8-3.** *将支持的设备方向设置为横向右。*


    运行项目并确保一切正常。有时 chipmunk 会带来一些难以追踪的麻烦，尤其是在项目深入之后。Chipmunk 的 Hello World 风格与标准 cocos2D
    模板不同。你会看到一个画面中的人物，他叫 Grossini，以防你好奇。


    这是一个非常酷的 Hello World 项目。如果你点击屏幕，一个新的 Grossini 会出现，并将其他人物推开。应用程序也会对加速度计和方向变化做出响应。所以，如果你想快速了解
    chipmunk 的能力，请在真机（而非模拟器）上运行它。


    在屏幕点击几次后，我会看到类似图 8-4 的效果。


    ![Image](img/0804.jpg)


    **图 8-4.** *点击屏幕几次，观察 Grossini 的增殖。*


    关闭应用程序并返回 Xcode。让我们删除不会用到的文件，从头重建这个项目。从项目中删除 `HelloWorldLayer.h`、`HelloWorldLayer.m`
    和 `grossini_dance_atlas.png`。


    打开 `AppDelegate.m`。删除我们刚删除的类的 `import` 语句。然后注释掉代码清单 8-1 中显示的那行代码。该代码可以在 `applicationDidFinishLaunching`
    方法的末尾找到。


    **代码清单 8-1.** *注释掉 HelloWorld 场景*


    ```

    //[[CCDirector sharedDirector] runWithScene: [HelloWorldLayer scene]];

    ```


    好的，确保应用程序可以构建。现在不需要运行它，但应该能无错误地编译。

