    \ We are importing the `AVFoundation` headers and nominating this class as an\
    \ `AVAudioRecorderDelegate` and an `AVAudioPlayerDelegate`.\n\nSwitch to `SecondView.xib`\
    \ in Xcode and attach the `IBActions` to a few new `UIButtons`. I laid out my\
    \ screen as shown in [Figure 5–2](#Chapter05.html#fig_5_2). There are three `UIButtons`\
    \ on the layout. Each of them will be wired up to their own `IBAction`.\n\nI tied\
