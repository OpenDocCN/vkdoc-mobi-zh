  trans: '

    ### 从你的电脑访问 GitHub


    如果你以前用过 GitHub，可以跳过本节，本节面向尚未创建用于 GitHub 的 SSH 密钥的用户。


    从你的电脑访问 GitHub 远程仓库有几种方式。我们将使用 SSH 访问，这意味着需要生成一个令牌并将其发布到 GitHub。从 Mac 上打开 **终端**（**应用程序**
    ![Image](img/U001.jpg) **实用工具** ![Image](img/U001.jpg) **终端**）。请参阅列表 1–1。按照同样的模式在你的终端窗口中操作。接下来我将解释具体步骤。


    **列表 1–1.** *在你的 Mac 上创建 SSH 密钥*


    ```

    Kyle-Roches-MacBook-Pro-2:~ kyleroche$ cd ~/.ssh

    Kyle-Roches-MacBook-Pro-2:.ssh kyleroche$ ls

    known_hosts

    Kyle-Roches-MacBook-Pro-2:.ssh kyleroche$ ssh-keygen -t rsa -C "kyle@isidorey.com"

    Generating public/private rsa key pair.

    Enter file in which to save the key (/Users/kyleroche/.ssh/id_rsa):

    Enter passphrase (empty for no passphrase): [enter a passphrase here]

    Enter same passphrase again: [enter your passphrase again]

    Your identification has been saved in /Users/kyleroche/.ssh/id_rsa.

    Your public key has been saved in /Users/kyleroche/.ssh/id_rsa.pub.

    The key fingerprint is:

    26:9d:3a:82:fe:r9:gf:ba:39:30:6b:98:16:fe:3b:2c kyle@isidorey.com

    The key''s randomart image is:

    +--[ RSA 2048]----+

    |                 |

    |                 |

    |                 |

    | .     . . 4      |

    |. . . ..N        |

    |.  o ..+r        |

    | .. ...-|=.        |

    |  ..+.-E.o       |

    |   +.==oooo      |

    +-----------------+

    Kyle-Roches-MacBook-Pro-2:.ssh kyleroche$ ls

    id_rsa          id_rsa.pub          known_hosts

    ```


    如果你已经有现有密钥，目录列出命令的结果可能会有所不同。在这种情况下，为了安全起见，你可能希望备份密钥目录。首先，我们要使用 `ssh-keygen` 工具来创建一对
    RSA 公钥/私钥。该工具会要求我们输入一个密码短语。这是可选的，但密码短语确实能增强安全性。我们大多数人都意识到，密码本身并不那么安全。不设置密码短语生成密钥对，相当于将密码以纯文本形式保存在你的电脑上。任何获得访问权限的人都能使用你的密钥。如果你比较懒，不想每次都输入密码，也别担心。钥匙串（因为大家用的都是
    Mac）可以让你在第一次使用这对密钥后将其存储起来。


    这样，我们就拥有了一对密钥。它存储在你目录列表中看到的新创建的 `id_rsa.pub` 文件中。在你喜欢的纯文本编辑器中打开这个文件，并复制其所有内容。务必复制所有内容，包括头部信息。


    回到 GitHub，你的浏览器中应该已经打开了你的账户页面。从左上角的导航菜单中打开**账户设置**页面。然后打开左侧名为**SSH 公钥**的子选项卡。你应该会看到类似图
    1–4 的内容。


    ![Image](img/0104.jpg)


    **图 1–4.** *在 GitHub 上打开 SSH 公钥对话框。*


    找到页面中间的**添加另一个公钥**链接。这将打开一个对话框，你可以在其中粘贴我们刚刚创建的 `id_rsa.pub` 文件的内容。就这样！现在你已经在 GitHub
    上设置好了，你的电脑可以通过 SSH 访问你的仓库了。


    由于在本书中我们将使用 SSH 访问，让我们在继续之前先快速设置好默认偏好。


    我们需要配置本地 Git 客户端，使其使用我们在注册 GitHub 时获得的凭据。首先，在终端窗口中运行列表 1–2 中的以下命令，为 Git 设置一些全局标志。这结合你的
    SSH 密钥，将能让你的 Git 客户端向远程仓库进行身份验证。


    **列表 1–2.** *在你的 Mac 上创建 SSH 密钥*


    ```

    Kyle-Roches-MacBook-Pro-2: kyleroche$ git config --global user.name "Kyle Roche"

    Kyle-Roches-MacBook-Pro-2: kyleroche$ git config --global user.email "kyle@isidorey.com"

    ```


    ### 设置 Xcode 4.2 和你的开发者账户


    如果你已经设置好了 Xcode 4.2，可以跳过本节。


    要将应用发布到 App Store，你需要 Xcode 和一个 Apple 开发者账户。我们可以同时处理这两个步骤。打开浏览器，访问 [`http://developer.apple.com/programs/register/`](http://developer.apple.com/programs/register/)
    并点击顶部的**开始使用**按钮。这里有几种路径可供选择。如果你想使用现有的 Apple ID，可以填写并继续。参见图 1–5。或者，你也可以为 iOS 开发创建一个新
    ID。这看起来可能不太合理，但使用一个账户存在一些隐患。


    ![Image](img/0105.jpg)


    **图 1–5.** *使用现有 Apple ID 还是创建一个新 ID？*


    **注意：** 选择合并你的 Apple ID 还是创建第二个，取决于你未来发布应用的意图。Apple 对账户可以关联的发布类型有限制。有两种发布应用的方式：通过
    App Store 和通过 Apple 的企业分发计划。一个 Apple ID 不能同时关联这两种发布方式。如果你计划涉及这两种场景，请确保决定好哪个 ID
    负责哪种发布方式。


    如果你只想使用账户进行开发和调试，那么使用现有账户即可。这可能是最简单的路径。注册完成后，登录到 **iOSDev 中心**。找到**下载**链接。在撰写本文时，只有两个选项：**下载
    Xcode 4.2** 和一串关于 iAd Producer 1.1 的链接。将 Xcode 4.2 下载到你的电脑上。下载文件相当大。这是 Xcode 的缺点之一。自从
    iOS 以来，每个升级版本（其发布频率越来越快）都需要重新完整下载整个 IDE。


    现在我们已设置好 IDE 和源代码管理策略。让我们将两者连接起来，确保我们已经准备好开始。

    '
- fmt: '### Linking an Xcode Project to GitHub


    Return to GitHub in your browser. Click on **Dashboard** in the top-left navigation
    bar and find the **New Repository** button. For **Project Name** I''m going to
    use `iOS_AR_Ch1_Introduction`. Feel free to choose your own name, or if you''re
    an experienced GitHub user, you can `fork` my repository from `https://github.com/kyleroche`.
    See [Figure 1–6](#Chapter01.html#fig_1_6) for the options I''ve chosen.


    ![Image](images/0106.jpg)


    **Figure 1–6.** *Create a new repository at GitHub.*


    Next, take note of your repository''s SSH URL. You will see it in the header of
    the confirmation page. It will be in a form similar to `git@github.com:kyleroche/iOS_AR_Ch1_Introduction.git`.
    You are going to need this in the next step.


    Launch Xcode on your local machine. In the **Welcome to Xcode** dialog box that
    launches on startup, you should have an option on the left side called **Connect
    to a Repository**. Click this option and enter the SSH URL for your GitHub repository.
    See [Figure 1–7](#Chapter01.html#fig_1_7) for my configuration.


    ![Image](images/0107.jpg)


    **Figure 1–7.** *Clone your GitHub repository for local access.*


    Xcode validates your location and the ability to clone the repository. Wait a
    few moments until your indicator is green and the message states **Host is reachable**,
    then click **Next**.


    You are presented with a prompt to name your new project. I am using the same
    name as my GitHub repository, `iOS_AR_Ch1_Introduction`, for simplicity. Make
    sure that **Type** is set to **Git** and click **Clone**.


    Next, choose a location for your local repository and click **Next**.


    **NOTE:** At the time of this writing, Xcode 4.2 still has a few bugs in regards
    to using Git. The first of them should have manifested itself in this last step.
    If your version still has issues, you will get an error similar to that shown
    in [Figure 1–8](#Chapter01.html#fig_1_8). If this is the case, simply click **Try
    Again**, select the same location, choose **Replace** and everything should be
    fine.


    ![Image](images/0108.jpg)


    **Figure 1–8.** *A defect in early releases of Xcode 4.2 threw invalid errors.
    Simply click Try Again and it goes away.*


    ### Creating Our Xcode Project


    From Xcode''s **Welcome to Xcode** screen, select **Create a New Xcode Project**.
    We''re not going to be doing much coding in this project, so the template type
    isn''t all that important. I''m going to select a Windows-based application template
    for simplicity. The next screen has a few more important options. You are now
    being asked for your **Product Name**. This is used as a suffix to your fully
    qualified **Bundle Identifier**. This is where things will start to diverge a
    bit. Unless you''re involved in team-based development, this option will be unique
    to your machine. I''m going to, again, use the same name as my GitHub repository
    to make things easy. My options are shown in [Figure 1–9](#Chapter01.html#fig_1_9).


    ![Image](images/0109.jpg)


    **Figure 1–9.** *Choose your new project options.*


    Your **Company Identifier** is going to be different as well. Until we discuss
    distributing applications either over the App Store or over the Enterprise Distribution
    options, the **Company Identifier** can be a reverse DNS format. Click **Next**
    when you have everything filled out.


    You are finally prompted to find a local location for this project. Make sure
    that you select the same directory as you did for cloning the GitHub repository.
    Also, make sure that **Create local git repository for this project** is *not*
    selected, as shown in [Figure 1–10](#Chapter01.html#fig_1_10).


    ![Image](images/0110.jpg)


    **Figure 1–10.** *Do not create a local Git repository.*


    Great! We just created our first project. Only a few more steps and we''ll be
    able to start updating code on GitHub. The following steps can probably be completed
    in various orders. I''m following this path because I find it easier. As Xcode
    4.2 matures, I''m sure we''ll see some improvements on the GUI-based functionality.


    ### Connecting Our Project to the Remote Repository


    There are quite a few online tutorials covering the integration of Xcode and GitHub.
    To get started connecting your project, and to learn the latest features and changes,
    visit [`http://help.github.com/mac-set-up-git/`](http://help.github.com/mac-set-up-git/).


    ### What''s Next?


    Here''s a quick walk-through of some of the key sections in this book.


    #### Location Services


    Most AR use cases, at least the early ones, have some element that relates to
    the user''s location. Whether it''s presenting nearby restaurants in AR view or
    finding your friends recommendations on night life, location-based AR kicked off
    the trend. In [Chapter 3](#Chapter03.html#ch3), we''ll learn about the mapping
    and geo-location capabilities of iOS using real examples that we can apply to
    our own AR apps.


    #### Sensor Programming


    Creating an AR application requires quite a bit of integration with the native
    sensors on the iPhone or iPad. Sensors include the accelerometer, the digital
    compass, and the gyroscope. In [Chapter 4](#Chapter04.html#ch4), I''ll introduce
    you to sensor development with small projects demonstrating the key features we''ll
    reuse in our AR applications.


    #### Lights, Camera, Action …


    In [Chapter 5](#Chapter05.html#ch5), I cover sound and user feedback. Sound isn''t
    the most prominent feature in AR apps, but it does lead to a better user experience.
    After that, in [Chapter 6](#Chapter06.html#ch6), we''ll dive into camera and video
    programming. Because AR apps are all overlaid on our camera view, this is an essential
    chapter to understand before we start constructing the larger AR projects at the
    end of the book.


    #### Gaming Frameworks


    I choose to use Cocos2D to demonstrate AR gaming capabilities. In [Chapter 7](#Chapter07.html#ch7),
    you''ll get a primer on Cocos2D''s essentials and we''ll follow that up with a
    real application in [Chapter 8](#Chapter08.html#ch8).


    #### Third-Party Frameworks


    In [Chapter 9](#Chapter09.html#ch9), I talk about a few third-party frameworks
    that make marker-based augmented reality application development easier. We follow
    that up with a real example, then move on to more complicated frameworks, such
    as OpenCV (Open Computer Vision), which is an open source library for things such
    as facial or complex-object recognition. Facial recognition on the device itself
    has some limitations. Mostly, these limitations are related to hardware capabilities.
    We''ll discuss a few more creative ways to supplement facial recognition using
    publicly available APIs.


    ### Summary


    I hope you learn much from this book. AR is such a new concept in mobile apps
    and has endless possibilities. The developer community is just beginning to scratch
    the surface of possibilities. I hope this book gives you a jump-start on your
    own journey into the AR world.


    Let''s get started by reviewing some of our application layout options and frameworks
    for putting together our own AR applications. In the next chapter, we''ll discuss
    the hardware we''ll be using in this book and the major features of the different
    models.


    ## Chapter 2


    ## Hardware Comparison


    Every mobile developer worries about hardware compatibility. However, the main
    benefit of developing for Apple''s iOS line is standardization among hardware.
    True, there are different evolutions of the devices, but there is only one vendor:
    Apple! With other mobile operating systems, you have to worry about OEM vendors
    and their unlimited variations of hardware configurations. Let''s take a look
    under the hood of the more recent iOS devices.'
