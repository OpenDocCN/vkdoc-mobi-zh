    \n### ARKit\n\nARKit 是一个由 Zac White 发起的古老 GitHub 项目。我之所以提到这个项目，是因为我（和其他 100 个人）因它的一些实用功能而\
    \ fork 了该仓库。我在第 11 章的基于位置的 AR 中使用了它的一些片段。如果你打算从头开始构建一些东西，可以浏览 [`www.github.com`](http://www.github.com)\
    \ 上的各种 fork。此外，社会化编程也很有趣。\n\n### 总结\n\n还有很多我没提到的其他 SDK 和工具包。这主要是因为它们的文档已经非常完善了。例如，Metaio\
    \ 在网上已有大量的示例项目和文档。String 于 2011 年夏季发布，但（在撰写本文时）其网站上仍然没有文档。Qualcomm 在 iOS 5 发布前发布了他们的\
    \ SDK。他们在开发者门户网站上提供了一些文档，SDK 中也包含一些很棒的示例，但这只是刚刚开始。\n\n我希望你通过本章了解了一些可用的辅助库，从而缩短你的应用开发时间。在第\
    \ 10 章中，我们将使用 String 构建另一个基于标记的 AR 应用。你将有机会比较两个出色的工具包及其截然不同的实现风格。\n\n## 第 10 章\n\
    \n## 使用 OpenGL ES 构建基于标记的 AR 应用\n\n在第 9 章中，我们了解了一些可用于 iOS 开发者构建增强现实应用的不同 SDK。在本章中，我们将从其中一个\
    \ SDK，即 String SDK for iOS 开始，构建一个基于标记的增强现实应用。\n\n增强现实标记是物理标识符，用于指示应用如何根据物理世界进行定位和缩放。例如，在第\
    \ 1 章中，我展示了一个示例，说明美国邮政服务如何使用标记来定位和缩放运输容器。你也可以在自己的应用中实现同样的功能。\n\n在你的应用中使用标记的优势在于，你可以为物理世界中已存在的事物增加价值。例如，考虑你有一个预算有限的客户，他运营纸质期刊。使用现有的广告或徽标之一，你可以将\
    \ 3D 广告带入现实。除了增加价值之外，这还为客户提供了进一步将其广告客户货币化的机会。\n\n广告是基于标记的增强现实的一个绝佳用例。我们将通过一个真实示例来扩展这个用例。\n\
    \n### 构建标记\n\n标记具有一些特性，以确保使用它们的应用能正确运行。首先，AR 标记应该只有一个正确的方向。你应该能够清楚地分辨标记是倒置的还是侧向的。方形标记效率不高，因为应用将无法确定其正确的方向。其次，AR\
    \ 标记应由高对比度、独特的图像构成。使用黑白，或任何在低光环境下能相互区分的颜色。在大多数情况下，如果你打印标记，应注意眩光和反光表面。\n\n####\
    \ 我们的标记\n\n对于这个示例，我已将标记包含在我们的 GitHub 仓库中。本章的所有代码都可以在 [`https://github.com/kyleroche/Professional_iOS_AugmentedReality`](https://github.com/kyleroche/Professional_iOS_AugmentedReality)\
    \ 找到。源代码也可以从 Apress 网站的源代码/下载区域获取，网址是 [`www.apress.com`](http://www.apress.com)。\n\
    \n我们将使用本书的封面作为我们的 AR 标记。假设在印刷过程中图像没有更改，这应该会使测试稍微容易一些，因为你将无需打印任何东西。\n\n为了投影 3D\
    \ 模型，我们将使用 OpenGL ES（嵌入式系统 OpenGL）。Xcode 提供了一个现成的 OpenGL 游戏模板。然而，出于教学目的，让我们从头开始构建这个应用。在开始之前，让我们先了解一下\
    \ OpenGL 的基本特性。\n\n#### OpenGL ES\n\nOpenGL ES 是一种底层、轻量级的 API，用于使用定义良好的 OpenGL\
    \ 子集配置文件进行高级嵌入式图形处理。它在软件应用程序与硬件或软件图形引擎之间提供了一个底层 API。\n\n作为开发者，使用 OpenGL ES 有很多优势：\n\
    \n*   **行业标准且免版税：** 任何人都可以下载 OpenGL ES 规范，并基于 OpenGL ES 实现和交付产品。\n*   **占用空间小且功耗低：**\
    \ 嵌入式空间在处理能力上各不相同。OpenGL ES 通过要求最小的占用空间和最小的数据存储来适应这些差异。\n*   **可扩展且持续演进：** OpenGL\
    \ 的扩展机制可在 OpenGL ES 中运行，因此你可以随着新硬件配置文件的出现而添加它们。\n*   **易于使用且文档完善：** OpenGL 是 OpenGL\
    \ ES 的基础。网上和出版物中有大量的培训材料。\n\n无论是本书还是本章，都不会让你成为 OpenGL ES 的专家。但是，我们会记录用于构建此应用的功能特性，如果你还想了解有关\
    \ iOS 上 3D 编程的更多信息，我会推荐一些你可以查阅的资料。\n"
- fmt: "### Creating the Project\n\nOpen Xcode and start a new project. Use the `Single\
    \ View Application` to get some of the default setup for the project. Make sure\
    \ you select `Universal` as your `Device Family`. You can leave `Automatic Reference\
    \ Counting` enabled.\n\n### Adding the String SDK\n\nUnzip the download from String\
    \ to a directory on your local machine. From the `Libraries` folder, copy `libStringOGL*.a`\
    \ to your Xcode project. From the `Headers` folder, copy `StringOGL.h` and `TrackerOutput.h`\
    \ to your Xcode project. This is all we need from the String SDK. Let's move on\
    \ to adding the project dependencies, and then we'll circle back on how to use\
    \ the String SDK.\n\n#### Project Dependencies\n\nWe need to add a few frameworks\
    \ to our Xcode project to make sure the String SDK has the resources it needs.\
    \ Click your project name in the Xcode navigator. Switch to the `Build Phases`\
    \ tab and add the `QuartzCore`, `OpenGLES`, `AVFoundation`, `CoreGraphics`, `CoreMedia`,\
    \ and `CoreVideo` frameworks to the section called `Link Binary with Libraries`.\n\
    \nSwitch from the `Build Phases` tab to the `Build Settings` tab. Find the configuration\
    \ key called `Other Linker Flags`. Enter `–lstdc++` as the value. Refer to [Figure\
    \ 10–1](#Chapter10.html#fig_10_1) for the setup we've completed thus far.\n\n\
    ![Image](images/1001.jpg)\n\n**Figure 10–1.** *We've set up the Frameworks and\
    \ Linker Flags correctly.*\n\n### EAGLView\n\nIn previous versions of Xcode, the\
    \ OpenGL templates included the `EAGLView` template. Xcode 4.2, along with iOS\
    \ 5, introduced a new OpenGL Gaming template and removed the previous OpenGL application\
    \ template. This new template no longer provides the `EAGLView` files we had in\
    \ previous versions. So, we are left to create these ourselves. Automatic Reference\
    \ Counting was not available in the iOS 4.3 templates. We will add that to our\
    \ project as well.\n\nCreate a new Objective-C class in your Xcode project. Name\
    \ the class `EAGLView`. Make it a subclass of `NSObject` for now. We will change\
    \ this in a moment.\n\nOpen `EAGLView.h` in Xcode and remove the existing `import`\
    \ statements. Add the new `import` statements from [Listing 10–1](#Chapter10.html#list_10_1).\n\
    \n**Listing 10–1.** *import Statements*\n\n```\n#import <UIKit/UIKit.h>\n#import\
    \ <OpenGLES/ES1/gl.h>\n#import <OpenGLES/ES1/glext.h>\n#import <OpenGLES/ES2/gl.h>\n\
    #import <OpenGLES/ES2/glext.h>\n@class EAGLContext;\n```\n\nNext, change the interface\
    \ declaration so that `EAGLView` extends `UIView` and not `NSObject`. We are going\
    \ to declare a few properties related to the frame buffer we'll be using to render\
    \ our 3D object. Update the `EAGLView.h` class to look like the code found in\
    \ [Listing 10–2](#Chapter10.html#list_10_2).\n\n**Listing 10–2.** *Updated @interface\
    \ for EAGLView*\n\n```\n@interface EAGLView : UIView {\n    GLint framebufferWidth;\n\
    \    GLint framebufferHeight;\n\n    GLuint defaultFramebuffer, colorRenderbuffer;\n\
    \    GLuint depthRenderbuffer;\n}\n\n@property (nonatomic, retain) EAGLContext\
    \ *context;\n@property (nonatomic, readonly) GLuint defaultFramebuffer;\n@property\
    \ (nonatomic, readonly) GLint framebufferWidth;\n@property (nonatomic, readonly)\
    \ GLint framebufferHeight;\n\n- (void)setFrameBuffer;\n```\n\nMost of this code\
    \ is fairly close to the previous iOS 4.3 templates. We trimmed it down a bit\
    \ for simplicity. Switch over to `EAGLView.m` and add the `import` statements\
    \ from [Listing 10–3](#Chapter10.html#list_10_3).\n\n**Listing 10–3.** *Import\
    \ the QuartzCore Library*\n\n```\n#import <QuartzCore/QuartzCore.h>\n```\n\nNext,\
    \ we need to declare a few private methods for our class. Just below the `import`\
    \ statements and above the implementation block, add the code from [Listing 10–4](#Chapter10.html#list_10_4).\n\
    \n**Listing 10–4.** *Private Methods*\n\n```\n@interface EAGLView (PrivateMethods)\n\
    - (void)createFramebuffer;\n- (void)deleteFramebuffer;\n@end\n```\n\nWe'll implement\
    \ these methods shortly. First, let's set up the basics of our class. We need\
    \ to synthesize the properties we added to the interface. Inside the implementation\
    \ block of `EAGLView.m`, add the code from [Listing 10–5](#Chapter10.html#list_10_5).\n\
    \n**Listing 10–5.** *Synthesize the Properties*\n\n```\n@synthesize context;\n\
    @synthesize framebufferWidth;\n@synthesize framebufferHeight;\n@synthesize defaultFramebuffer;\n\
    ```\n\nThe `CAEGLLayer` class is what supports the drawing for OpenGL content\
    \ in iOS applications. Because we are using OpenGL for rendering our 3D objects,\
    \ we need a reference to the `CAEGLLayer` class. Create the static method found\
    \ in [Listing 10–6](#Chapter10.html#list_10_6), just after the `synthesize` statements.\n\
    \n**Listing 10–6.** *layerClass Method Required for OpenGL Apps*\n\n```\n+ (Class)layerClass\
    \ {\n    return [CAEAGLLayer class];\n}\n```\n\nBefore we set up our layer's associated\
    \ view, we have to change the rendering attributes that we want to use. The `drawableProperties`\
    \ property lets you configure the color format for the rendering surface and the\
    \ content. We will set this property's value in our `init` method. Copy the method\
    \ from [Listing 10–7](#Chapter10.html#list_10_7) to the implementation.\n\n**Listing\
    \ 10–7.** *initWithCoder Method*\n\n```\n- (id)initWithCoder:(NSCoder*)coder\n\
    {\n    self = [super initWithCoder:coder];\n        if (self) {\n        CAEAGLLayer\
    \ *eaglLayer = (CAEAGLLayer *)self.layer;\n```"
  raw: '### Creating the Project


    Open Xcode and start a new project. Use the Single View Application to get some
    of the default setup for the project. Make sure you select `Universal` as your
    `Device Family`. You can leave `Automatic Reference Counting` enabled.


    #### Adding the String SDK


    Unzip the download from String to a directory on your local machine. From the
    `Libraries` folder, copy `libStringOGL*.a` to your Xcode project. From the `Headers`
    folder, copy `StringOGL.h` and `TrackerOutput.h` to your Xcode project. This is
    all we need from the String SDK. Let''s move on to adding the project dependencies,
    and then we''ll circle back on how to use the String SDK.


    ##### Project Dependencies


    We need to add a few frameworks to our Xcode project to make sure the String SDK
    has the resources it needs. Click your project name in the Xcode navigator. Switch
    to the `Build Phases` tab and add the `QuartzCore`, `OpenGLES`, `AVFoundation`,
    `CoreGraphics`, `CoreMedia`, and `CoreVideo` frameworks to the section called
    `Link Binary with Libraries`.


    Switch from the `Build Phases` tab to the `Build Settings` tab. Find the configuration
    key called `Other Linker Flags`. Enter `–lstdc++` as the value. Refer to [Figure
    10–1](#Chapter10.html#fig_10_1) for the setup we''ve completed thus far.


    ![Image](images/1001.jpg)


    **Figure 10–1.** *We''ve set up theFrameworks and Linker Flags correctly.*


    #### EAGLView


    In previous versions of Xcode, the OpenGL templates included the `EAGLView` template.
    Xcode 4.2, along with iOS 5, introduced a new OpenGL Gaming template and removed
    the previous OpenGL application template. This new template no longer provides
    the `EAGLView` files we had in previous versions. So, we are left to create these
    ourselves. Automatic Reference Counting was not available in the iOS 4.3 templates.
    We will add that to our project as well.


    Create a new Objective-C class in your Xcode project. Name the class `EAGLView`.
    Make it a subclass of `NSObject` for now. We will change this in a moment.


    Open `EAGLView.h` in Xcode and remove the existing `import` statements. Add the
    new `import` statements from [Listing 10–1](#Chapter10.html#list_10_1).


    **Listing 10–1.** *import Statements*


    `#import <UIKit/UIKit.h>`

    `#import <OpenGLES/ES1/gl.h>`

    `#import <OpenGLES/ES1/glext.h>`

    `#import <OpenGLES/ES2/gl.h>`

    `#import <OpenGLES/ES2/glext.h>`

    `@class EAGLContext;`


    Next, change the interface declaration so that `EAGLView` extends `UIView` and
    not `NSObject`. We are going to declare a few properties related to the frame
    buffer we''ll be using to render our 3D object. Update the `EAGLView.h` class
    to look like the code found in [Listing 10–2](#Chapter10.html#list_10_2).


    **Listing 10–2.** *Updated @interface for EAGLView*


    `@interface EAGLView : UIView {`

    `    GLint framebufferWidth;`

    `    GLint framebufferHeight;`


    `    GLuint defaultFramebuffer, colorRenderbuffer;`

    `    GLuint depthRenderbuffer;`

    `}`


    `@property (nonatomic, retain) EAGLContext *context;`

    `@property (nonatomic, readonly) GLuint defaultFramebuffer;`

    `@property (nonatomic, readonly) GLint framebufferWidth;`

    `@property (nonatomic, readonly) GLint framebufferHeight;`


    `- (void)setFrameBuffer;`


    Most of this code is fairly close to the previous iOS 4.3 templates. We trimmed
    it down a bit for simplicity. Switch over to `EAGLView.m` and add the `import`
    statements from [Listing 10–3](#Chapter10.html#list_10_3).


    **Listing 10–3.** *Import the QuartzCore Library*


    `#import <QuartzCore/QuartzCore.h>`


    Next, we need to declare a few private methods for our class. Just below the `import`
    statements and above the implementation block, add the code from [Listing 10–4](#Chapter10.html#list_10_4).


    **Listing 10–4.** *Private Methods*


    `@interface EAGLView (PrivateMethods)`

    `- (void)createFramebuffer;`

    `- (void)deleteFramebuffer;`

    `@end`


    We''ll implement these methods shortly. First, let''s set up the basics of our
    class. We need to synthesize the properties we added to the interface. Inside
    the implementation block of `EAGLView.m`, add the code from [Listing 10–5](#Chapter10.html#list_10_5).


    **Listing 10–5.** *Synthesize the Properties*


    `@synthesize context;`

    `@synthesize framebufferWidth;`

    `@synthesize framebufferHeight;`

    `@synthesize defaultFramebuffer;`


    The `CAEGLLayer` class is what supports the drawing for OpenGL content in iOS
    applications. Because we are using OpenGL for rendering our 3D objects, we need
    a reference to the `CAEGLLayer` class. Create the static method found in [Listing
    10–6](#Chapter10.html#list_10_6), just after the `synthesize` statements.


    **Listing 10–6.** *layerClass Method Required for OpenGL Apps*


    `+ (Class)layerClass {`

    `    return [CAEAGLLayer class];`

    `}`


    Before we set up our layer''s associated view, we have to change the rendering
    attributes that we want to use. The `drawableProperties` property lets you configure
    the color format for the rendering surface and the content. We will set this property''s
    value in our `init` method. Copy the method from [Listing 10–7](#Chapter10.html#list_10_7)
    to the implementation.


    **Listing 10–7.** *initWithCoder Method*


    `- (id)initWithCoder:(NSCoder*)coder`

    `{`

    `    self = [super initWithCoder:coder];`

    `        if (self) {`

    `        CAEAGLLayer *eaglLayer = (CAEAGLLayer *)self.layer;`'
  trans: "\n### 创建项目\n\n打开 Xcode 并新建一个项目。使用`Single View Application`模板可以获得一些默认的项目设置。请确保选择`Universal`作为`设备系列`。`自动引用计数`选项保持启用即可。\n\
    \n### 添加 String SDK\n\n将从 String 下载的压缩包解压到本地计算机的某个目录中。从`Libraries`文件夹中，将`libStringOGL*.a`复制到你的\
    \ Xcode 项目中。从`Headers`文件夹中，将`StringOGL.h`和`TrackerOutput.h`复制到你的 Xcode 项目中。这就是使用\
    \ String SDK 所需的全部内容。接下来我们添加项目依赖项，然后会回来介绍如何使用 String SDK。\n\n#### 项目依赖项\n\n我们需要向\
    \ Xcode 项目添加几个框架，以确保 String SDK 拥有所需的资源。在 Xcode 导航器中点击项目名称。切换到`构建阶段`选项卡，并在`与二进制文件链接`部分添加`QuartzCore`、`OpenGLES`、`AVFoundation`、`CoreGraphics`、`CoreMedia`和`CoreVideo`框架。\n\
    \n从`构建阶段`选项卡切换到`构建设置`选项卡。找到名为`其他链接器标志`的配置项。输入`–lstdc++`作为其值。参考图 10–1 查看我们目前完成的设置。\n\
    \n![图片](img/1001.jpg)\n\n**图 10–1.** *我们已正确设置框架和链接器标志。*\n\n### EAGLView\n\n在之前版本的\
    \ Xcode 中，OpenGL 模板包含`EAGLView`模板。Xcode 4.2 与 iOS 5 一起引入了一个新的 OpenGL 游戏模板，并移除了之前的\
    \ OpenGL 应用程序模板。这个新模板不再提供旧版本中使用的`EAGLView`文件。因此，我们需要自己创建这些文件。在 iOS 4.3 模板中，自动引用计数尚不可用。我们也需要将其添加到项目中。\n\
    \n在 Xcode 项目中新建一个 Objective-C 类。将类命名为`EAGLView`。暂时将其设为`NSObject`的子类。稍后我们会修改这一点。\n\
    \n在 Xcode 中打开`EAGLView.h`，移除现有的`import`语句。添加代码清单 10–1 中的新`import`语句。\n\n**代码清单\
    \ 10–1.** *import 语句*\n\n```\n#import <UIKit/UIKit.h>\n#import <OpenGLES/ES1/gl.h>\n\
    #import <OpenGLES/ES1/glext.h>\n#import <OpenGLES/ES2/gl.h>\n#import <OpenGLES/ES2/glext.h>\n\
    @class EAGLContext;\n```\n\n接下来，修改接口声明，使`EAGLView`继承自`UIView`而非`NSObject`。我们将声明一些与用于渲染\
    \ 3D 对象的帧缓冲区相关的属性。将`EAGLView.h`类更新为代码清单 10–2 中的代码。\n\n**代码清单 10–2.** *EAGLView\
    \ 的更新后@interface*\n\n```\n@interface EAGLView : UIView {\n    GLint framebufferWidth;\n\
    \    GLint framebufferHeight;\n\n    GLuint defaultFramebuffer, colorRenderbuffer;\n\
    \    GLuint depthRenderbuffer;\n}\n\n@property (nonatomic, retain) EAGLContext\
    \ *context;\n@property (nonatomic, readonly) GLuint defaultFramebuffer;\n@property\
    \ (nonatomic, readonly) GLint framebufferWidth;\n@property (nonatomic, readonly)\
    \ GLint framebufferHeight;\n\n- (void)setFrameBuffer;\n```\n\n大部分代码与之前的 iOS 4.3\
    \ 模板非常接近。为了简洁起见，我们做了一些精简。切换到`EAGLView.m`，并添加代码清单 10–3 中的`import`语句。\n\n**代码清单\
    \ 10–3.** *导入 QuartzCore 库*\n\n```\n#import <QuartzCore/QuartzCore.h>\n```\n\n\
    接下来，我们需要为类声明几个私有方法。在`import`语句下方、实现块上方，添加代码清单 10–4 中的代码。\n\n**代码清单 10–4.** *私有方法*\n\
    \n```\n@interface EAGLView (PrivateMethods)\n- (void)createFramebuffer;\n- (void)deleteFramebuffer;\n\
    @end\n```\n\n稍后我们会实现这些方法。首先，让我们设置类的基本结构。我们需要合成添加到接口中的属性。在`EAGLView.m`的实现块内，添加代码清单\
    \ 10–5 中的代码。\n\n**代码清单 10–5.** *合成属性*\n\n```\n@synthesize context;\n@synthesize\
    \ framebufferWidth;\n@synthesize framebufferHeight;\n@synthesize defaultFramebuffer;\n\
    ```\n\n`CAEGLLayer`类负责支持 iOS 应用中 OpenGL 内容的绘制。由于我们使用 OpenGL 渲染 3D 对象，因此需要引用`CAEGLLayer`类。在`@synthesize`语句之后，创建代码清单\
    \ 10–6 中的静态方法。\n\n**代码清单 10–6.** *OpenGL 应用所需的 layerClass 方法*\n\n```\n+ (Class)layerClass\
    \ {\n    return [CAEAGLLayer class];\n}\n```\n\n在设置图层的关联视图之前，我们必须更改要使用的渲染属性。`drawableProperties`属性允许你配置渲染表面和内容的颜色格式。我们将在`init`方法中设置此属性的值。将代码清单\
    \ 10–7 中的方法复制到实现中。\n\n**代码清单 10–7.** *initWithCoder 方法*\n\n```\n- (id)initWithCoder:(NSCoder*)coder\n\
    {\n    self = [super initWithCoder:coder];\n        if (self) {\n        CAEAGLLayer\
    \ *eaglLayer = (CAEAGLLayer *)self.layer;\n```\n"
- fmt: "```objectivec\neaglLayer.opaque = TRUE;\neaglLayer.drawableProperties = [NSDictionary\
    \ dictionaryWithObjectsAndKeys:\n                                [NSNumber numberWithBool:FALSE],\
    \ kEAGLDrawablePropertyRetainedBacking,\n                                kEAGLColorFormatRGBA8,\
    \ kEAGLDrawablePropertyColorFormat,\n                                nil];\n}\n\
    \nreturn self;\n}\n```\n\nThe code in bold is where we set up our `drawableProperties`\
    \ for this rendering. For more information on OpenGL color and formatting options,\
    \ refer to *Pro OpenGL ES for iOS* (Apress), which can be found at [www.apress.com/mobile/ios/9781430238409](http://www.apress.com/mobile/ios/9781430238409).\n\
    \nBecause the rendering surface is presented to the user using Core Animation,\
    \ any effects or animations you apply affect the 3D content that will be rendered\
    \ to the user. Apple's documentation recommends the following best practices:\n\
    \n- Set the layer's `opaque` attribute to `TRUE`.\n- Set the layer's `bounds`\
    \ to match the dimensions of the display.\n- Make sure the layer is not transformed.\n\
