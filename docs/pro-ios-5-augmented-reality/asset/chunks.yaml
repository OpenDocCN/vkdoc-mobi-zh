    We start out by setting the `backgroundColor` and `opaque` attribute of the `sharedDirector`
    from our singleton `CCDirector` class so that both settings are transparent to
    the screen.


    Go ahead and run the project as it stands. When we approached a cocos2D project
    like this using the `UIImagePickerViewController`, we used the same steps and
    we were able to start building on layers above the camera view. However, as you’ll
    notice when you run the application, we are still getting a full black screen.
    This is because (as you’ll remember from [Chapter 6](#Chapter06.html#ch6)) there
    are two steps involved with utilizing the `AVCaptureSession`: We queue up the
    images from the buffer, but we also need to actually do something with those images.


    To access images from the buffer, we can use the delegate method called `didOutputSampleBuffer`
    from the `AVCaptureVideoDataOutputSampleBufferDelegate` class. This method allows
    us to pull images from the buffer as they are captured.


    Before we introduce the delegate method, switch over to `AppDelegate.h` again
    and declare a `BOOL` flag called `_settingImage` so we can keep track of when
    we are in the middle of this process. Add the utility method from [Listing 13–15](#Chapter13.html#list_13_15)
    to your implementation file.


