    We saw pieces of this method back in [Chapter 7](#Chapter07.html#ch7). Basically,
    we are checking the device’s rotation, then reorienting and rescaling the image
    accordingly. Adjust the `setImageToView` method as shown in [Listing 13–18](#Chapter13.html#list_13_18).


    **Listing 13–18.** *Updated setImageToView Method*


    `-(void)setImageToView:(UIImage*)image {`

    `    UIImage * capturedImage = [self rotateImage:image orientation:UIImageOrientationLeftMirrored
    ];`

    `    _imageView.image = capturedImage;`

    `    _settingImage = NO;`

    `}`


    Instead of just setting the `UIImage`, this method gets passed. We are first rotating
    it properly using the utility method we just created. Then we set the returned
    (and adjusted) `UIImage` back to the caller.


    Run the project again. You will see much better results. The screenshot of my
    iPad is shown in [Figure 13–7](#Chapter13.html#fig_13_7).


    ![Image](images/1307.jpg)


    **Figure 13–7.** *We’re NOT sideways!![Image](images/smile.jpg)*


    So, the world is right side up again. Next, what do we do with this image now
    that we have captured it and oriented it correctly? Remember, the goal here is
    to send the image from the camera buffer to face.com and get back the coordinates
    of any faces found in the picture.


    We have to decide on an approach to this feature. There are a number of ways to
    tackle it, each with its own set of advantages and drawbacks. First, let’s review
    the face.com API and required parameters so we can make a decision on how we want
    to handle sending the image.


    ### Face.com API


    The face.com API is a surprisingly straightforward REST API that takes a multipart
    form upload with the raw data of the image you want to analyze in the body of
    the request.


    We’re going to be using only one call from the face.com API. The `faces.detect`
    call returns tags for detected faces in one or more photos, with geometric information
    of the tag, eyes, nose, and mouth, as well as various attributes such as gender,
    is wearing glasses, and is smiling.


    The usage notes on the call (from the online documentation) include the following:


    *   All coordinates are provided in percent values to support any photo scale.
    Photo height and width (vs. tag height/width) are provided in pixels. Yaw, roll,
    and pitch are provided on the –90 degrees to 90 degrees scale.

    *   The maximum width or height of a photo is 900 pixels. You may POST or send
    links to higher-size photos, but those will be resized internally to improve performance.

    *   Every tag returned contains a set of attributes. The most important of them
    is the face attribute. It contains the confidence level of that tag being a face.
    Yada, yada, don’t use tags with less than 50 percent confidence.

    *   Face detection is a prerequisite step in adding training-set data for a user
    to the recognition index. (We won’t be doing this.)


    The API is also rate limited. At the time of this writing, the limit was 5,000
    requests per minute from the same application. So, I think we’ll be fine for this
    example.


    The REST URL for this call is `http://api.face.com/faces/detect.[format]`. For
    us, we will be setting the format equal to JSON. The input parameters for the
    POST request are described in [Table 13–1](#Chapter13.html#tab_13_1).


    ![Image](images/t1301.jpg)


    ![Image](images/t1301a.jpg)


    If you look through the parameter list, this call actually turns out to be fairly
    simple. Our options are to upload the image somewhere and send a reference URL
    so face.com can fetch it and analyze it, or we can post the raw image data directly
    in the POST request. Without actually testing this theory, I’d imagine that uploading
    it somewhere else, then having face.com download it and analyze it is far less
    efficient than uploading it directly in the POST request. So, let’s go that route.


    Now that we have an approach, let’s figure out timing. We already have the `UIImage`
    object, which we could convert to JPEG and attach to the POST request as it comes
    in, but that could easily lead to requests running on top of themselves and a
    bunch of unnecessary CPU time. I’m going to recommend we use an `NSTimer` to grab
    the screen image periodically; then send it on a background thread to face.com
    for analyzing. When it’s returned, we’ll draw on the HUD layer to provide information
    on the attributes found, and we’ll fade into the background until the next request
    is sent.'
  trans: "\n```objective-c\nswitch(orient) {\n    case UIImageOrientationUp:\n   \
    \     transform = CGAffineTransformIdentity;\n        break;\n    case UIImageOrientationUpMirrored:\n\
    \        transform = CGAffineTransformMakeTranslation(imageSize.width, 0.0);\n\
    \        transform = CGAffineTransformScale(transform, -1.0, 1.0);\n        break;\n\
    \    case UIImageOrientationDown:\n        transform = CGAffineTransformMakeTranslation(imageSize.width,\n\
    \                                                     imageSize.height);\n   \
    \     transform = CGAffineTransformRotate(transform, M_PI);\n        break;\n\
    \    case UIImageOrientationDownMirrored:\n        transform = CGAffineTransformMakeTranslation(0.0,\
    \ imageSize.height);\n        transform = CGAffineTransformScale(transform, 1.0,\
    \ -1.0);\n        break;\n    case UIImageOrientationLeftMirrored:\n        boundHeight\
    \ = bounds.size.height;\n        bounds.size.height = bounds.size.width;\n   \
    \     bounds.size.width = boundHeight;\n        transform = CGAffineTransformMakeTranslation(imageSize.height,\
    \ imageSize.height);\n        transform = CGAffineTransformScale(transform, -1.0,\
    \ 1.0);\n        transform = CGAffineTransformRotate(transform, 3.0 * M_PI / 2.0);\n\
    \        break;\n    case UIImageOrientationLeft:\n        boundHeight = bounds.size.height;\n\
    \        bounds.size.height = bounds.size.width;\n        bounds.size.width =\
    \ boundHeight;\n        transform = CGAffineTransformMakeTranslation(0.0, imageSize.width);\n\
    \        transform = CGAffineTransformRotate(transform, 3.0 * M_PI / 2.0);\n \
    \       break;\n    case UIImageOrientationRightMirrored:\n        boundHeight\
    \ = bounds.size.height;\n        bounds.size.height = bounds.size.width;\n   \
    \     bounds.size.width = boundHeight;\n        transform = CGAffineTransformMakeScale(-1.0,\
    \ 1.0);\n        transform = CGAffineTransformRotate(transform, M_PI / 2.0);\n\
    \        break;\n    case UIImageOrientationRight:\n        boundHeight = bounds.size.height;\n\
    \        bounds.size.height = bounds.size.width;\n        bounds.size.width =\
    \ boundHeight;\n        transform = CGAffineTransformMakeTranslation(imageSize.height,\
    \ 0.0);\n        transform = CGAffineTransformRotate(transform, M_PI / 2.0);\n\
    \        break;\n    default:\n        [NSException raise:NSInternalInconsistencyException\n\
    \                    format:@\"Invalid image orientation\"];\n}\nUIGraphicsBeginImageContext(bounds.size);\n\
    CGContextRef context = UIGraphicsGetCurrentContext();\nif (orient == UIImageOrientationRight\
    \ || orient == UIImageOrientationLeft) {\n    CGContextScaleCTM(context, -scaleRatio,\
    \ scaleRatio);\n    CGContextTranslateCTM(context, -height, 0);\n} else {\n  \
    \  CGContextScaleCTM(context, scaleRatio, -scaleRatio);\n    CGContextTranslateCTM(context,\
    \ 0, -height);\n}\nCGContextConcatCTM(context, transform);\nCGContextDrawImage(UIGraphicsGetCurrentContext(),\
    \ CGRectMake(0, 0, width, height), imgRef);\nUIImage *imageCopy = UIGraphicsGetImageFromCurrentImageContext();\n\
    UIGraphicsEndImageContext();\n\nreturn imageCopy;\n}\n```\n\n我们在第 7 章中见过这个方法的片段。基本上，我们是在检查设备的旋转方向，然后相应地调整图像的方向和缩放。请按照代码清单\
    \ 13-18 所示修改`setImageToView`方法。\n\n**代码清单 13-18.** *更新后的 setImageToView 方法*\n\n\
    ```objective-c\n-(void)setImageToView:(UIImage*)image {\n    UIImage * capturedImage\
    \ = [self rotateImage:image orientation:UIImageOrientationLeftMirrored ];\n  \
    \  _imageView.image = capturedImage;\n    _settingImage = NO;\n}\n```\n\n这个方法不再直接设置`UIImage`，而是先通过我们刚刚创建的工具方法对图像进行正确旋转，然后将返回的（调整后的）`UIImage`赋值给调用方。\n\
    \n重新运行项目，你会看到更好的结果。我的 iPad 截图如图 13-7 所示。\n\n![图片](img/1307.jpg)\n\n**图 13-7.**\
    \ *我们不再倒置了！！![图片](img/smile.jpg)*\n\n好了，世界又恢复正位了。接下来，既然我们已经捕获并正确旋转了图像，该拿它做什么呢？记住，我们的目标是将相机缓冲区的图像发送到\
    \ face.com，并获取图片中检测到的所有面部的坐标。\n\n我们需要决定这个功能的具体实现方式。有多种方法可以解决这个问题，每种方法都有其优势和缺点。首先，我们来回顾一下\
    \ face.com 的 API 及其所需参数，以便决定如何处理图像发送。\n\n### Face.com API\n\nface.com 的 API 是一个出奇简单的\
    \ REST API，它接受一个多部分表单上传，其中包含你希望分析的图像的原始数据，放在请求体中。\n\n我们只使用 face.com API 中的一个调用。`faces.detect`调用会返回一张或多张照片中检测到的面部的标签，包含标签、眼睛、鼻子和嘴部的几何信息，以及各种属性，如性别、是否戴眼镜、是否微笑。\n\
    \n该调用的使用说明（来自在线文档）包括以下内容：\n\n* 所有坐标都以百分比值提供，以支持任意比例的图片。照片的高度和宽度（相对于标签的高度/宽度）以像素为单位提供。偏航角、滚动角和俯仰角以-90\
    \ 度到 90 度的范围提供。\n* 照片的最大宽度或高度为 900 像素。你可以上传或发送更大尺寸照片的链接，但内部会调整大小以提升性能。\n* 每个返回的标签都包含一组属性。其中最重要的是面部属性，它包含了该标签是人脸的置信度。等等，不要使用置信度低于\
    \ 50%的标签。\n* 人脸检测是将用户训练集数据添加到识别索引中的前提步骤。（我们不会进行此操作。）\n\n该 API 也有限速。在撰写本文时，同一应用的请求限制为每分钟\
    \ 5000 次。所以，我认为这个示例不会有问题。\n\n该调用的 REST URL 是`http://api.face.com/faces/detect.[format]`。对于我们来说，我们会将格式设置为\
    \ JSON。POST 请求的输入参数如表 13-1 所述。\n\n![图片](img/t1301.jpg)\n\n![图片](img/t1301a.jpg)\n\
    \n如果你查看参数列表，会发现这个调用实际上相当简单。我们的选择是：要么将图像上传到某个地方并发送一个引用 URL，让 face.com 获取并分析它；要么直接在\
    \ POST 请求中上传原始图像数据。不经过实际测试，我猜想先将图像上传到其他地方，再让 face.com 下载并分析，其效率远不如直接在 POST 请求中上传。因此，我们选择后一种方式。\n\
    \n既然有了方案，我们来考虑时机问题。我们已经有了`UIImage`对象，可以将其转换为 JPEG 格式并在请求传入时附加到 POST 请求中，但这很容易导致请求相互叠加以及大量不必要的\
    \ CPU 占用。我建议使用`NSTimer`定期抓取屏幕图像，然后在后台线程中将其发送到 face.com 进行分析。当结果返回时，我们将在 HUD 层上绘制，以提供找到的属性的相关信息，然后淡出到背景中，直到下一次请求发送。"
- fmt: "#### Using the ASI-HTTP-Request Library\n\nWe're going to need that library\
    \ we downloaded earlier in the chapter before we can move too much further ahead.\
    \ Find the downloaded archive we stored earlier. Copy the following files to your\
    \ project. Because I like my project structure nice and clean, I created another\
    \ Group called `ASI` to store these files.\n\n*   `ASIHTTPRequestConfig.h`\n*\
    \   `ASIHTTPRequestDelegate.h`\n*   `ASIProgressDelegate.h`\n*   `ASICacheDelegate.h`\n\
    *   `ASIHTTPRequest.h`\n*   `ASIHTTPRequest.m`\n*   `ASIDataCompressor.h`\n* \
    \  `ASIDataCompressor.m`\n*   `ASIDataDecompressor.h`\n*   `ASIDataDecompressor.m`\n\
    *   `ASIFormDataRequest.h`\n*   `ASIInputStream.h`\n*   `ASIInputStream.m`\n*\
    \   `ASIFormDataRequest.m`\n*   `ASINetworkQueue.h`\n*   `ASINetworkQueue.m`\n\
    *   `ASIDownloadCache.h`\n*   `ASIDownloadCache.m`\n*   `ASIAuthenticationDialog.h`\n\
    *   `ASIAuthenticationDialog.m`\n*   `Reachability.h` (in the `External/Reachability`\
    \ folder)\n*   `Reachability.m` (in the `External/Reachability` folder)\n\nThe\
    \ library also requires a few references, but since I was thinking ahead, we added\
    \ them earlier in the chapter.\n\nLet's take a step back for a moment and think\
    \ about the best placement for the HTTP POST request. Remember, cocos2D applications,\
    \ like any other iOS application, are built on view hierarchies. We have stacked\
    \ two of our own scenes on top of the OpenGL view and camera layer. Take a look\
    \ at [Figure 13–8](#Chapter13.html#fig_13_8) for reference. (This is a logical\
    \ model, not an exact representation of the classes.)\n\n![Image](images/1308.jpg)\n\
    \n**Figure 13–8.** *The logical hierarchy of our scene shows the stacked views.*\n\
    \nThe POST request to face.com will be executed on a separate thread. Because\
    \ of this, we will want the return code to be parsed at a layer that can interact\
    \ with the HUD layer. The HUD layer is where we will be actually creating the\
    \ images and text that will overlay the interface, so we will have methods exposed\
    \ to handle those actions.\n\nIt looks like the best candidate to handle our POST\
    \ request would be the `FaceDetectionLayer`. If we can handle the POST request\
    \ there, we don't have to traverse two layers from our `AppDelegate`.\n\nLet's\
    \ create the method to send the POST request and `NSLog` the response. Then, we'll\
    \ create our `NSTimer` and finish by parsing our JSON response.\n\n#### Creating\
    \ the POST Request Method\n\nOpen `FaceDetectionLayer.m` in Xcode. Import the\
    \ `ASIFormDataRequest.h` and `AppDelegate.h` headers. Declare a private `BOOL`\
    \ called `_sendingRequest` to keep track of when a POST request is in process\
    \ and create a `void` method called `facialRecognitionRequest` that takes a `UIImage`\
    \ as a parameter. Your updated `FaceDetectionLayer.h` file should look like [Listing\
    \ 13–19](#Chapter13.html#list_13_19).\n\n**Listing 13–19.** *Updated FaceDetectionLayer.h*\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n#import \"HUDLayer.h\"\
    \n#import \"ASIFormDataRequest.h\"\n#import \"AppDelegate.h\"\n\n@interface FaceDetectionLayer\
    \ : CCLayer {\n    HUDLayer *_hud;\n    BOOL _sendingRequest;\n}\n\n+ (CCScene\
    \ *)scene;\n- (id)initWithHUD:(HUDLayer *)hud;\n- (void)facialRecognitionRequest:(UIImage\
    \ *)image;\n@end\n```\n\nSwitch over to `FaceDetectionLayer.m`. Create the method\
    \ as shown in [Listing 13–20](#Chapter13.html#list_13_20).\n\n**Listing 13–20.**\
    \ *facialRecognitionRequest Method*\n\n```\n- (void)facialRecognitionRequest:(UIImage\
    \ *)image {\n    NSLog(@\"Image width = %f height = %f\",image.size.width, image.size.height);\n\
    \n    if (!_sendingRequest) {   \n        _sendingRequest = YES;\n\n        NSAutoreleasePool\
    \ * pool = [[NSAutoreleasePool alloc] init];\n\n        NSData * imageData = UIImageJPEGRepresentation(image,\
    \ 90);\n\n        NSURL * url = [NSURL URLWithString:@\"http://api.face.com/faces/detect.json\"\
    ];\n\n        ASIFormDataRequest *request = [ASIFormDataRequest requestWithURL:url];\n\
    \        [request addPostValue:@\"your face.com api_key\" forKey:@\"api_key\"\
    ];\n        [request addPostValue:@\"your face.com api_secret\" forKey:@\"api_secret\"\
    ];\n        [request addData:imageData withFileName:@\"image.jpg\"\nandContentType:@\"\
    image/jpeg\" forKey:@\"filename\"];\n\n        [request startSynchronous];\n\n\
    \        NSError *error = [request error];\n        if (!error) {\n          \
    \  NSString *response = [request responseString];\n\n            NSLog(@\"Response:\
    \ %@\",response);\n        } else {\n            NSLog(@\"Error: %d\",[error code]);\n\
    \        }\n\n        _sendingRequest = NO;\n\n        [pool drain];\n    }  \
    \ \n}\n```\n\nStarting at the top of this method, we are first checking to see\
    \ if another call is in progress, by referencing the `_sendingRequest` `BOOL`.\
    \ If there isn't a current call in progress, we set the flag to `YES` to prevent\
    \ any other calls (on separate threads) from colliding with this transaction.\n\
    \nNext, we allocate an `NSAutoreleasePool`. The `NSAutoreleasePool` class (from\
    \ the Apple developer documentation) is used to support Cocoa's reference-counted\
    \ memory management system. An autorelease pool stores objects that are sent a\
    \ release message when the pool itself is drained.\n\nIn a reference-counted environment\
    \ (as opposed to one that uses garbage collection), an `NSAutoreleasePool` object\
    \ contains objects that have received an autorelease message and, when drained,\
    \ it sends a release message to each of those objects. Thus, sending `autorelease`\
    \ instead of `release` to an object extends the lifetime of that object at least\
    \ until the pool itself is drained (it may be longer if the object is subsequently\
    \ retained). An object can be put into the same pool several times, in which case\
    \ it receives a release message for each time it was put into the pool.\n\nAfter\
    \ we have our `NSAutoreleasePool` in place, we create an `NSData` object to hold\
    \ the raw image data from the JPEG image. We set up our `NSURL` REST target for\
    \ face.com, our HTTP POST values (one of which is the raw image data) and we start\
    \ a synchronous call to face.com.\n\nWe'll add the JSON parsing logic a little\
    \ later. For now, we are just logging the output.\n\nTo send the POST request\
    \ from `FaceDetectionLayer`, we're going to need to reference that class from\
    \ our `AppDelegate`. If you do that now, we will be creating cyclical dependencies\
    \ between the two headers. This is easy to fix, as our solution isn't all that\
    \ complicated yet. Move the `import AppDelegate.h` statement from `FaceDetectionLayer.h`\
    \ to `FaceDetectionLayer.m` and we won't experience this issue. If you run into\
    \ a compiler error that starts with `expected specifier-qualifier-list before…`,\
    \ you still have the cyclical reference somewhere else in the project.\n\nLet's\
    \ create the `NSTimer` and the process to send the `UIImage` object from our `AppDelegate`\
    \ to the `FaceDetectionLayer`, so we're ready for the POST request."
  raw: '#### Using the ASI-HTTP-Request Library


    We’re going to need that library we downloaded earlier in the chapter before we
    can move too much further ahead.  Find the downloaded archive we stored earlier.
    Copy the following files to your project. Because I like my project structure
    nice and clean, I created another Group called ASI to store these files.


    *   `ASIHTTPRequestConfig.h`

    *   `ASIHTTPRequestDelegate.h`

    *   `ASIProgressDelegate.h`

    *   `ASICacheDelegate.h`

    *   `ASIHTTPRequest.h`

    *   `ASIHTTPRequest.m`

    *   `ASIDataCompressor.h`

    *   `ASIDataCompressor.m`

    *   `ASIDataDecompressor.h`

    *   `ASIDataDecompressor.m`

    *   `ASIFormDataRequest.h`

    *   `ASIInputStream.h`

    *   `ASIInputStream.m`

    *   `ASIFormDataRequest.m`

    *   `ASINetworkQueue.h`

    *   `ASINetworkQueue.m`

    *   `ASIDownloadCache.h`

    *   `ASIDownloadCache.m`

    *   `ASIAuthenticationDialog.h`

    *   `ASIAuthenticationDialog.m`

    *   `Reachability.h` (in the External/Reachability folder)

    *   `Reachability.m` (in the External/Reachability folder)


    The library also requires a few references, but since I was thinking ahead, we
    added them earlier in the chapter.


    Let’s take a step back for a moment and think about the best placement for the
    HTTP POST request. Remember, cocos2D applications, like any other iOS application,
    are built on view hierarchies. We have stacked two of our own scenes on top of
    the OpenGL view and camera layer. Take a look at [Figure 13–8](#Chapter13.html#fig_13_8)
    for reference. (This is a logical model, not an exact representation of the classes.)


    ![Image](images/1308.jpg)


    **Figure 13–8.** *The logical hierarchy of our scene shows the stacked views.*


    The POST request to face.com will be executed on a separate thread. Because of
    this, we will want the return code to be parsed at a layer that can interact with
    the HUD layer. The HUD layer is where we will be actually creating the images
    and text that will overlay the interface, so we will have methods exposed to handle
    those actions.


    It looks like the best candidate to handle our POST request would be the `FaceDetectionLayer`.
    If we can handle the POST request there, we don’t have to traverse two layers
    from our `AppDelegate`.


    Let’s create the method to send the POST request and `NSLog` the response. Then,
    we’ll create our `NSTimer` and finish by parsing our JSON response.


    #### Creating the POST Request Method


    Open `FaceDetectionLayer.m` in Xcode. Import the `ASIFormDataRequest.h` and `AppDelegate.h`
    headers. Declare a private `BOOL` called `_sendingRequest` to keep track of when
    a POST request is in process and create a `void` method called `facialRecognitionRequest`
    that takes a `UIImage` as a parameter. Your updated `FaceDetectionLayer.h` file
    should look like [Listing 13–19](#Chapter13.html#list_13_19).


    **Listing 13–19.** *Updated FaceDetectionLayer.h*


    `#import <Foundation/Foundation.h>`

    `#import "cocos2d.h"`

    `#import "HUDLayer.h"`

    **`#import "ASIFormDataRequest.h"`**

    **`#import "AppDelegate.h"`**


    `@interface FaceDetectionLayer : CCLayer {`

    `    HUDLayer *_hud;`

    **`BOOL _sendingRequest;`**

    `}`


    `+ (CCScene *)scene;`

    `- (id)initWithHUD:(HUDLayer *)hud;`

    **`- (void)facialRecognitionRequest:(UIImage *)image;`**

    `@end`


    Switch over to `FaceDetectionLayer.m`. Create the method as shown in [Listing
    13–20](#Chapter13.html#list_13_20).


    **Listing 13–20.** *facialRecognitionRequest Method*


    `- (void)facialRecognitionRequest:(UIImage *)image {`

    `    NSLog(@"Image width = %f height = %f",image.size.width, image.size.height);`


    `    if (!_sendingRequest) {   `

    `        _sendingRequest = YES;`


    `        NSAutoreleasePool * pool = [[NSAutoreleasePool alloc] init];`


    `        NSData * imageData = UIImageJPEGRepresentation(image, 90);`


    `        NSURL * url = [NSURL URLWithString:@"http://api.face.com/faces/detect.json"];`


    `        ASIFormDataRequest *request = [ASIFormDataRequest requestWithURL:url];`

    `        [request addPostValue:@"`**`your face.com api_key`**`" forKey:@"api_key"];`

    `        [request addPostValue:@"`**`your face.com api_secret`**`" forKey:@"api_secret"];`

    `        [request addData:imageData withFileName:@"image.jpg"`

    `andContentType:@"image/jpeg" forKey:@"filename"];`


    `        [request startSynchronous];`


    `        NSError *error = [request error];`

    `        if (!error) {`

    `            NSString *response = [request responseString];`


    `            NSLog(@"Response: %@",response);`

    `        } else {`

    `            NSLog(@"Error: %d",[error code]);`

    `        }`


    `        _sendingRequest = NO;`


    `        [pool drain];`

    `    }   `

    `}`


    Starting at the top of this method, we are first checking to see if another call
    is in progress, by referencing the `_sendingRequestBOOL`. If there isn’t a current
    call in progress, we set the flag to `YES` to prevent any other calls (on separate
    threads) to collide with this transaction.


    Next, we allocate an `NSAutoreleasePool`. The `NSAutoreleasePool` class (from
    the Apple developer documentation) is used to support cocoa’s reference-counted
    memory management system. An autorelease pool stores objects that are sent a release
    message when the pool itself is drained.


    In a reference-counted environment (as opposed to one that uses garbage collection),
    an `NSAutoreleasePool` object contains objects that have received an autorelease
    message and, when drained, it sends a release message to each of those objects.
    Thus, sending autorelease instead of release to an object extends the lifetime
    of that object at least until the pool itself is drained (it may be longer if
    the object is subsequently retained). An object can be put into the same pool
    several times, in which case it receives a release message for each time it was
    put into the pool.


    After we have our `NSAutoreleasePool` in place, we create an `NSData` object to
    hold the raw image data from the JPEG image. We set up our `NSURL` REST target
    for face.com, our HTTP POST values (one of which is the raw image data) and we
    start a synchronous call to face.com.


    We’ll add the JSON parsing logic a little later. For now, we are just logging
    the output.


    To send the POST request from `FaceDetectionLayer`, we’re going to need to reference
    that class from our `AppDelegate`. If you do that now, we will be creating cyclical
    dependencies between the two headers. This is easy to fix, as our solution isn’t
    all that complicated yet. Move the `import AppDelegate.h` statement from `FaceDetectionLayer.h`
    to `FaceDetectionLayer.m` and we won’t experience this issue. If you run into
    a compiler error that starts with `expected specifier-qualifier-list before…`you
    still have the cyclical reference somewhere else in the project.


    Let’s create the `NSTimer`and the process to send the `UIImage` object from our
    `AppDelegate` to the `FaceDetectionLayer`, so we’re ready for the POST request.'
  trans: "\n#### 使用 ASI-HTTP-Request 库\n\n在进一步推进之前，我们需要用到本章前文下载的那个库。找到之前存放的下载存档，将以下文件复制到你的项目中。由于我喜欢保持项目结构整洁清晰，我创建了一个名为\
    \ `ASI` 的新分组来存放这些文件。\n\n*   `ASIHTTPRequestConfig.h`\n*   `ASIHTTPRequestDelegate.h`\n\
    *   `ASIProgressDelegate.h`\n*   `ASICacheDelegate.h`\n*   `ASIHTTPRequest.h`\n\
    *   `ASIHTTPRequest.m`\n*   `ASIDataCompressor.h`\n*   `ASIDataCompressor.m`\n\
    *   `ASIDataDecompressor.h`\n*   `ASIDataDecompressor.m`\n*   `ASIFormDataRequest.h`\n\
    *   `ASIInputStream.h`\n*   `ASIInputStream.m`\n*   `ASIFormDataRequest.m`\n*\
    \   `ASINetworkQueue.h`\n*   `ASINetworkQueue.m`\n*   `ASIDownloadCache.h`\n*\
    \   `ASIDownloadCache.m`\n*   `ASIAuthenticationDialog.h`\n*   `ASIAuthenticationDialog.m`\n\
    *   `Reachability.h`（位于 `External/Reachability` 文件夹中）\n*   `Reachability.m`（位于\
    \ `External/Reachability` 文件夹中）\n\n该库还需要一些引用，但因为我提前考虑到了，我们已经在章节前文添加了它们。\n\n让我们先退一步，思考一下\
    \ HTTP POST 请求的最佳放置位置。请记住，cocos2D 应用与其他 iOS 应用一样，都是基于视图层次结构构建的。我们在 OpenGL 视图和相机图层之上叠加了两个自己的场景。请参考图\
    \ 13–8。（这是一个逻辑模型，并非类的精确表示。）\n\n![Image](img/1308.jpg)\n\n**图 13-8.** *场景的逻辑层次结构展示了叠加的视图。*\n\
    \n向 face.com 发送的 POST 请求将在单独的线程上执行。因此，我们希望返回代码能在可以与 HUD 层交互的层级进行解析。HUD 层正是我们实际创建叠加在界面上的图像和文本的地方，因此我们将公开一些方法来处理这些操作。\n\
    \n看来处理 POST 请求的最佳候选是 `FaceDetectionLayer`。如果我们能在那里处理 POST 请求，就无需从 `AppDelegate`\
    \ 穿越两个层级。\n\n让我们创建发送 POST 请求的方法，并用 `NSLog` 输出响应。然后，我们将创建 `NSTimer`，最后解析 JSON 响应。\n\
    \n#### 创建 POST 请求方法\n\n在 Xcode 中打开 `FaceDetectionLayer.m`。导入 `ASIFormDataRequest.h`\
    \ 和 `AppDelegate.h` 头文件。声明一个名为 `_sendingRequest` 的私有 `BOOL` 变量，用于跟踪 POST 请求是否正在进行中，并创建一个名为\
    \ `facialRecognitionRequest` 的 `void` 方法，该方法接收一个 `UIImage` 作为参数。更新后的 `FaceDetectionLayer.h`\
    \ 文件应该如代码清单 13–19 所示。\n\n**代码清单 13–19.** *更新后的 FaceDetectionLayer.h*\n\n```\n\
    #import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n#import \"HUDLayer.h\"\
    \n#import \"ASIFormDataRequest.h\"\n#import \"AppDelegate.h\"\n\n@interface FaceDetectionLayer\
    \ : CCLayer {\n    HUDLayer *_hud;\n    BOOL _sendingRequest;\n}\n\n+ (CCScene\
    \ *)scene;\n- (id)initWithHUD:(HUDLayer *)hud;\n- (void)facialRecognitionRequest:(UIImage\
    \ *)image;\n@end\n```\n\n切换到 `FaceDetectionLayer.m`。创建如代码清单 13–20 所示的方法。\n\n**代码清单\
    \ 13–20.** *facialRecognitionRequest 方法*\n\n```\n- (void)facialRecognitionRequest:(UIImage\
    \ *)image {\n    NSLog(@\"Image width = %f height = %f\",image.size.width, image.size.height);\n\
    \n    if (!_sendingRequest) {   \n        _sendingRequest = YES;\n\n        NSAutoreleasePool\
    \ * pool = [[NSAutoreleasePool alloc] init];\n\n        NSData * imageData = UIImageJPEGRepresentation(image,\
    \ 90);\n\n        NSURL * url = [NSURL URLWithString:@\"http://api.face.com/faces/detect.json\"\
    ];\n\n        ASIFormDataRequest *request = [ASIFormDataRequest requestWithURL:url];\n\
    \        [request addPostValue:@\"your face.com api_key\" forKey:@\"api_key\"\
    ];\n        [request addPostValue:@\"your face.com api_secret\" forKey:@\"api_secret\"\
    ];\n        [request addData:imageData withFileName:@\"image.jpg\"\nandContentType:@\"\
    image/jpeg\" forKey:@\"filename\"];\n\n        [request startSynchronous];\n\n\
    \        NSError *error = [request error];\n        if (!error) {\n          \
    \  NSString *response = [request responseString];\n\n            NSLog(@\"Response:\
    \ %@\",response);\n        } else {\n            NSLog(@\"Error: %d\",[error code]);\n\
    \        }\n\n        _sendingRequest = NO;\n\n        [pool drain];\n    }  \
    \ \n}\n```\n\n从该方法顶部开始，我们首先通过引用 `_sendingRequest` 这个 `BOOL` 变量来检查是否有另一个调用正在进行。如果没有正在进行的当前调用，我们将标志设置为\
    \ `YES`，以防止任何其他调用（在单独的线程上）与此事务冲突。\n\n接下来，我们分配一个 `NSAutoreleasePool`。`NSAutoreleasePool`\
    \ 类（来自 Apple 开发者文档）用于支持 Cocoa 的引用计数内存管理系统。自动释放池存储那些在池本身被排空时会收到释放消息的对象。\n\n在引用计数环境中（与使用垃圾回收的环境相对），一个\
    \ `NSAutoreleasePool` 对象包含那些已收到自动释放消息的对象，当池被排空时，它会向每个这些对象发送一条释放消息。因此，向对象发送 `autorelease`\
    \ 而不是 `release` 会将该对象的生命周期至少延长到池本身被排空为止（如果对象随后被保留，则可能更长）。一个对象可以被多次放入同一个池中，在这种情况下，它每次被放入池中时都会收到一条释放消息。\n\
    \n在我们设置好 `NSAutoreleasePool` 之后，我们创建一个 `NSData` 对象来保存来自 JPEG 图像的原始图像数据。我们设置好目标为\
    \ face.com 的 `NSURL` REST 端点、HTTP POST 值（其中之一是原始图像数据），然后开始向 face.com 进行同步调用。\n\
    \n稍后我们会添加 JSON 解析逻辑。目前，我们只是记录输出。\n\n为了从 `FaceDetectionLayer` 发送 POST 请求，我们需要从\
    \ `AppDelegate` 引用该类。如果你现在这样做，我们就会在两个头文件之间创建循环依赖。这很容易修复，因为我们的解决方案目前还不算复杂。将 `import\
    \ AppDelegate.h` 语句从 `FaceDetectionLayer.h` 移动到 `FaceDetectionLayer.m`，我们就不会遇到这个问题了。如果你遇到以\
    \ `expected specifier-qualifier-list before...` 开头的编译器错误，说明你在项目中的其他地方仍然存在循环引用。\n\
    \n让我们创建 `NSTimer` 以及从 `AppDelegate` 向 `FaceDetectionLayer` 发送 `UIImage` 对象的过程，这样我们就为\
    \ POST 请求做好了准备。\n"
- fmt: "#### Creating the `NSTimer`\n\nOpen `AppDelegate.h` in Xcode. Create a private\
    \ variable of type `FaceDetectionLayer` called `_layer`, and another private variable\
    \ of type `NSTimer` called `_timer`. The changes we made to the header are shown\
    \ in [Listing 13–21](#Chapter13.html#list_13_21).\n\n**Listing 13–21.** *Changes\
    \ to `AppDelegate.h`*\n\n```\n@interface AppDelegate : NSObject <UIApplicationDelegate,\n\
    AVCaptureVideoDataOutputSampleBufferDelegate> {\n    …\nFaceDetectionLayer *_layer;\n\
    NSTimer *_timer;\n}\n…\n```\n\nSwitch over to `AppDelegate.m`. Find the line shown\
    \ in [Listing 13–22](#Chapter13.html#list_13_22).\n\n**Listing 13–22.** *Find\
    \ This Line in `AppDelegate.m` . . .*\n\n```\n[[CCDirector sharedDirector] runWithScene:\
    \ [FaceDetectionLayer scene]];\n```\n\nThis line used the `CCDirector` singleton\
    \ to launch a default `FaceDetectionLayer` scene. We have a static method in `FaceDetectionLayer`\
    \ that we are using to create our scene. That method launches the scene with the\
    \ `HUDLayer`. To keep from managing too many instances or creating another set\
    \ of singleton classes, we’re going to move some of our functionality from the\
    \ static `scene` method to our `AppDelegate`.\n\nReplace the line from [Listing\
    \ 13–22](#Chapter13.html#list_13_22) with the code from [Listing 13–23](#Chapter13.html#list_13_23).\n\
    \n**Listing 13–23.** *Launch the `FaceDetectionLayer` in a Different Way*\n\n\
    ```\nCCScene *scene = [CCScene node];\nHUDLayer *hud = [HUDLayer node];\n[scene\
    \ addChild:hud z:1];\n_layer = [[[FaceDetectionLayer alloc] initWithHUD:hud] autorelease];\n\
    \ [scene addChild:_layer];\n\n [[CCDirector sharedDirector] runWithScene: scene];\n\
    ```\n\nThis code was taken from our static `scene` method in the `FaceDetectionLayer`\
    \ class. If you run the application now, it should look just about the same. You\
    \ will see the camera view, oriented correctly, taking up the full screen.\n\n\
    Add the method from [Listing 13–24](#Chapter13.html#list_13_24) to `AppDelegate.m`.\n\
    \n**Listing 13–24.** *Add the Background Method*\n\n```\n-(void)backgroundRequest:(UIImage\
    \ * ) image{\n    NSAutoreleasePool * pool = [[NSAutoreleasePool alloc] init];\n\
    \n    UIInterfaceOrientation orient =  [UIApplication sharedApplication].statusBarOrientation;\n\
    \    UIImage * rotatedImage = image;\n    switch (orient) {\n        case UIInterfaceOrientationPortrait:\n\
    \            NSLog(@\"Device orientation portrait\");\n            break;\n  \
    \      case UIInterfaceOrientationPortraitUpsideDown:\n            NSLog(@\"Device\
    \ orientation portrait upside down\");\n            break;\n        case UIInterfaceOrientationLandscapeLeft:\n\
    \            rotatedImage = [self rotateImage:image orientation: UIImageOrientationRight];\n\
    \            NSLog(@\"Device orientation landscape left\");\n            break;\n\
    \        case UIInterfaceOrientationLandscapeRight:\n            rotatedImage\
    \ = [self rotateImage:image orientation: UIImageOrientationLeft];\n          \
    \  NSLog(@\"Device orientation landscape right\");\n            break;\n    };\n\
    \n    [_layer facialRecognitionRequest:rotatedImage];\n\n    [pool drain];\n}\n\
    ```\n\nThis method will be the caller for the `facialRecognitionRequest` method\
    \ we created earlier in our `FaceDetectionLayer` class. We are, again, using an\
    \ `NSAutoReleasePool` to manage the automatic release of objects from memory.\
    \ Next, we check the orientation of the device. Again, I’m using Landscape Right\
    \ for all my testing, but this method should suffice to reorient the image properly\
    \ for other orientations. Basically, we have to do this so that we send face.com\
    \ the image right side up. If we send the image in sideways or upside down, face.com\
    \ won’t be able to recognize the faces in the picture.\n\nWhen we’re done rotating\
    \ the image, we send the updated image object to the `FaceDetectionLayer`’s `facialRecognitionRequest`\
    \ method. Okay, let’s create the timer callback, and then we’ll create our `NSTimer`.\
    \ The callback will be the event that is fired each time the timer expires (I\
    \ didn’t mean for that to rhyme, it’s just the way it is). This should be a simple\
    \ method. We simply need to call our new `backgroundRequest` method every few\
    \ seconds on a new thread. Copy the method from [Listing 13–25](#Chapter13.html#list_13_25)\
    \ just above the `backgroundRequest` method.\n\n**Listing 13–25.** *Timer Callback\
    \ Method*\n\n```\n-(void) timerCallback {\n    [NSThread detachNewThreadSelector:@selector(backgroundRequest:)\
    \ toTarget:self withObject:_imageView.image];\n}\n```\n\nWe are simply detaching\
    \ a new thread to run the `backgroundRequest` method and assigning the `delegate`\
    \ to `self`.\n\nSo, the last step to this process is to start the timer. In the\
    \ last line of the `applicationDidFinishLaunching` method, we start our `AVCaptureSession`.\
    \ Just before that line, add the code from [Listing 13–26](#Chapter13.html#list_13_26).\n\
    \n**Listing 13–26.** *Start a Five-Second Timer*\n\n```\n_timer = [NSTimer scheduledTimerWithTimeInterval:5.0\
    \ target:self\nselector:@selector(timerCallback) userInfo:nil repeats:YES];\n\
    ```\n\nThe code in bold shows you where to reset the timing in between executions.\
    \ If you are running a very slow Internet connection, you might need to increase\
    \ this setting.\n\nIf you run this project now, and let it run for a few seconds,\
    \ you should see something like [Figure 13–9](#Chapter13.html#fig_13_9) in your\
    \ debug console.\n\n![Image](images/1309.jpg)\n\n**Figure 13–9.** *The output\
    \ shows the looping execution of face.com request.*\n\n#### Parsing the Output\n\
    \nNext, we need to parse the output from face.com. To do this, we’re going to\
    \ use the JSON-Framework library we downloaded from GitHub earlier in the chapter.\n\
    \nFind the directory where you unzipped the downloaded files. There is a subdirectory\
    \ called `Classes`. Open that directory. As with the ASI-HTTP-Request library,\
    \ organization in Xcode is a bit of a preference. I created a `Group` in my Xcode\
    \ project called `JSON`, but this is not necessary. Copy all the files from the\
