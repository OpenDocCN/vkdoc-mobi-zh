- fmt: "# Constructing Our HUD Layer\n\nThe application on its own, to this point,\
    \ is very cool if you're the developer. However, from a user's perspective, we\
    \ can't really tell what's happening. We are about to change that by adding some\
    \ feedback through the HUD layer we created in the first part of this chapter.\
    \ Remember, the HUD layer is transparent, but sits on top of the rest of the stack\
    \ of scenes. So, we can overlay everything at this level.\n\nRemember back in\
    \ the introduction to this chapter, I mentioned things won't go as expected. That\
    \ section starts here. You can skim it over if you'd prefer, but it's a small\
    \ detour; so, follow along with the code, if you're up to it.\n\nOpen `HUDLayer.h`\
    \ and declare the method shown in [Listing 13–32](#Chapter13.html#list_13_32).\n\
    \n**Listing 13–32.** *Load the Crosshair and Mood Label*\n\n`- (void)loadCrosshair:(NSString\
    \ *)mood x:(double)x y:(double)y;`\n\nSwitch over to `HUDLayer.m` and implement\
    \ the `loadCrosshair` method from [Listing 13–33](#Chapter13.html#list_13_33).\n\
    \n**Listing 13–33.** *Implement the loadCrosshair Method*\n\n`- (void)loadCrosshair:(NSString\
    \ *)mood x:(double)x y:(double)y {`\n`    CGSize size = [[CCDirector sharedDirector]\
    \ winSize];`\n`    CCLabelTTF *label = [CCLabelTTF labelWithString:@\"test\" fontName:@\"\
    Marker Felt\" fontSize:48];`\n`    // position the label on the center of the\
    \ screen`\n`    label.position =  ccp( size.width /2 , size.height/2 );`\n`  \
    \  // add the label as a child to this Layer`\n`    [self addChild: label];`\n\
    `    CCSprite *crosshair = [CCSprite spriteWithFile:@\"crosshair.png\" rect:CGRectMake(0,0,390,390)];`\n\
    `    crosshair.position = ccp((size.width * (x/100)), (size.height * (1 - (y/100))));`\n\
    `    [self addChild:crosshair];`\n`}`\n\nWe use a few basic functions in this\
    \ method to add the PNG file to the screen and set up a label to display the user's\
    \ mood. The `label` object's `position` attribute is set using the `ccp` macro\
    \ from cocos2D. This macro creates an anchor point for us to use when placing\
    \ the images on the screen. We are setting the position of the anchor point to\
    \ the center of the screen (half of the width, half of the height).\n\nNext, we\
    \ load a sprite from the PNG file and place that on the screen. Face.com, as part\
    \ of its response, gives us the position (center) of the face that was recognized.\
    \ It is expressed in percentages of the screen so that you don't have to recalculate\
    \ the pixels if you are sending scaled-down images (as we are in this chapter).\
    \ Since the percentages are whole numbers, we divide them by 100 and create an\
    \ anchor point for the sprite at the same position where face.com recognized a\
    \ face.\n\nSwitch over to `FaceDetectionLayer.m` and find the code from [Listing\
    \ 13–31](#Chapter13.html#list_13_31) (parses the mood, x, and y of the face.com\
    \ request). Add the code from [Listing 13–34](#Chapter13.html#list_13_34) just\
    \ after those lines.\n\n**Listing 13–34.** *Invoke the loadCrosshair Method*\n\
    \n`[_hud loadCrosshair:mood x:xPosition y:yPosition];`\n\nWe are going to call\
    \ our new method using our HUD layer. If you think back to the diagram where we\
    \ stacked our views, this should work just fine. Run the project. The result should\
    \ look something like [Figure 13–11](#Chapter13.html#fig_13_11).\n\n![Image](images/1311.jpg)\n\
    \n**Figure 13–11.** *Wait, that's not right!*\n\nThe good news is that the image\
    \ appears to have been placed in the right spot. The bad news is that you can't\
    \ see the image. It seems like an opaque block on the screen.\n\nThis is due to\
    \ how OpenGL handles threading. We detached a thread to handle the HTTP request,\
    \ and OpenGL wants us to interact with the screen through the main thread. There\
    \ are ways around threading with OpenGL, and there are plenty of articles on the\
    \ topic. This is a basic example of the need for more organized threads in a cocos2D\
    \ application. If you would like to learn more about OpenGL and threading, check\
    \ out Mike Smithwick's *Pro OpenGL for iOS* book from Apress.\n\nLet's fix this\
    \ issue. As it turns out, we really don't need a HUD layer for this application.\
    \ Since our base logic was in the `AppDelegate`, our `FaceDetectionLayer` is acting\
    \ as our HUD layer. Let's move the drawing function down a level in the stack,\
    \ and use our main thread to invoke the change in the label on the screen.\n\n\
    Instead of creating the label and the sprite on the fly, let's make a property\
    \ so we can access it outside of the class. Also, we'll need a property to reference\
    \ our `RootViewController`.\n\nAdjust the `FaceDetectionLayer.h` file as shown\
    \ in [Listing 13–35](#Chapter13.html#list_13_35). I commented out the lines we\
    \ will no longer need.\n\n**Listing 13–35.** *Changes to FaceDetectionLayer*\n\
    \n```\n#import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n#import \"HUDLayer.h\"\
    \n#import \"ASIFormDataRequest.h\"\n#import \"SBJson.h\"\n\n@interface FaceDetectionLayer\
    \ : CCLayer {\n    //HUDLayer *_hud;\n    BOOL _sendingRequest;\n    CCSprite\
    \ *crosshair;\n}\n\n@property (retain) UIViewController * root;\n@property (retain)\
    \ CCLabelTTF * label;\n\n//+ (CCScene *)scene;\n//- (id)initWithHUD:(HUDLayer\
    \ *)hud;\n- (void)facialRecognitionRequest:(UIImage *)image;\n@end\n```\n\nSwitch\
    \ back to `FaceDetectionLayer.m` and synthesize the new properties as shown in\
    \ [Listing 13–36](#Chapter13.html#list_13_36).\n\n**Listing 13–36.** *Synthesize\
    \ New Properties*\n\n```\n@synthesize root;\n@synthesize label = _label;\n```\n\
    \nComment out the `scene` and `initWithHUD` methods as well. We won't be using\
    \ those any longer. Create a new `init` method with the code from [Listing 13–37](#Chapter13.html#list_13_37).\n\
    \n**Listing 13–37.** *New init Method*\n\n```\n-(id) init {\n    if(self = [super\
    \ init]){\n        CGSize size = [[CCDirector sharedDirector] winSize];\n    \
    \    crosshair =  [CCSprite spriteWithFile:@\"crosshair.png\" ];\n        crosshair.position\
    \ = ccp((size.width * (50.0/100)), (size.height * (1 - (50.0/100))));\n      \
    \  crosshair.opacity = 0;\n        [self addChild:crosshair];\n        _label\
    \ = [CCLabelTTF labelWithString:@\"\" fontName:@\"Marker Felt\" fontSize:48];\n\
    \        _label.position =  ccp( size.width /2 , size.height/2 );\n        [self\
    \ addChild: _label];\n    }\n    return self;\n}\n```\n\nWe are simply moving\
    \ some of our `HUDLayer` code to the `init` method of the `FaceDetectionLayer`.\
    \ The only real difference in this code is that we are not setting the string\
    \ of the label just yet. We will do that from our `RootViewController` in a moment.\n\
    \nReplace the line from [Listing 13–38](#Chapter13.html#list_13_38) with the code\
    \ from [Listing 13–39](#Chapter13.html#list_13_39).\n\n**Listing 13–38.** *Find\
    \ This Line . . .*\n\n`[_hud loadCrosshair:mood x:xPosition y:yPosition];`\n\n\
    **Listing 13–39.** *Replace with This . . .*\n\n```\nCGSize size = [[CCDirector\
    \ sharedDirector] winSize];\ncrosshair.opacity = 255;\ncrosshair.position = ccp((size.width\
    \ * (xPosition/100)), (size.height * (1 - (yPosition/100))));\n[root performSelectorOnMainThread:@selector(updateMood:)\
    \ withObject:mood waitUntilDone:YES];\n```\n\nInstead of sending the request to\
    \ the `HUDLayer` class, we are moving the sprite using the `ccp` macro and sending\
    \ the update for the label back to the main thread. The `updateMood` function\
    \ doesn't exist yet. We will create that next.\n\nOpen `RootViewController.h`.\
    \ Import the `FaceDetectionLayer.h` header and add the property and method shown\
    \ in [Listing 13–40](#Chapter13.html#list_13_40).\n\n**Listing 13–40.** *Updated\
    \ RootViewController*\n\n```\n#import <UIKit/UIKit.h>\n#import \"FaceDetectionLayer.h\"\
    \n\n@interface RootViewController : UIViewController {\n}\n@property (retain)\
    \ FaceDetectionLayer* fdLayer;\n-(void)updateMood:(NSString*)mood;\n@end\n```\n\
    \nSwitch over to `RootViewController.m` and synthesize the property we just created.\
    \ Then create the method from [Listing 13–41](#Chapter13.html#list_13_41).\n\n\
    **Listing 13–41.** *updateMood Method*\n\n```\n-(void)updateMood:(NSString *)\
    \ mood {\n    [[[self fdLayer] label] setString:mood];\n}\n```"
  raw: '#### Constructing Our HUD Layer


    The application on its own, to this point, is very cool if you’re the developer.
    However, from a user’s perspective, we can’t really tell what’s happening. We
    are about to change that by adding some feedback through the HUD layer we created
    in the first part of this chapter. Remember, the HUD layer is transparent, but
    sits on top of the rest of the stack of scenes. So, we can overlay everything
    at this level.


    Remember back in the introduction to this chapter, I mentioned things won’t go
    as expected. That section starts here. You can skim it over if you’d prefer, but
    it’s a small detour; so, follow along with the code, if you’re up to it.


    Open `HUDLayer.h` and declare the method shown in [Listing 13–32](#Chapter13.html#list_13_32).


    **Listing 13–32.** *Load the Crosshair and Mood Label*


    `- (void)loadCrosshair:(NSString *)mood x:(double)x y:(double)y;`


    Switch over to `HUDLayer.m` and implement the `loadCrosshair` method from [Listing
    13–33](#Chapter13.html#list_13_33).


    **Listing 13–33.** *Implement the loadCrosshair Method*


    `- (void)loadCrosshair:(NSString *)mood x:(double)x y:(double)y {`

    `    CGSize size = [[CCDirector sharedDirector] winSize];`


    `     CCLabelTTF *label = [CCLabelTTF labelWithString:@"test" fontName:@"Marker
    Felt" fontSize:48];`

    `    // position the label on the center of the screen`

    `    label.position =  ccp( size.width /2 , size.height/2 );`

    `    // add the label as a child to this Layer`

    `    [self addChild: label];`


    `    CCSprite *crosshair = [CCSprite spriteWithFile:@"crosshair.png"`

    `rect:CGRectMake(0,0,390,390)];`

    `    crosshair.position = ccp((size.width * (x/100)), (size.height * (1 - (y/100))));`

    `    [self addChild:crosshair];`

    `}`


    We use a few basic functions in this method to add the PNG file to the screen
    and set up a label to display the user’s mood. The `label` object’s `position`
    attribute is set using the `ccp` macro from cocos2D. This macro creates an anchor
    point for us to use when placing the images on the screen. We are setting the
    position of the anchor point to the center of the screen (half of the width, half
    of the height).


    Next, we load a sprite from the PNG file and place that on the screen. Face.com,
    as part of its response, gives us the position (center) of the face that was recognized.
    It is expressed in percentages of the screen so that you don’t have to recalculate
    the pixels if you are sending scaled-down images (as we are in this chapter).
    Since the percentages are whole numbers, we divide them by 100 and create an anchor
    point for the sprite at the same position where face.com recognized a face.


    Switch over to `FaceDetectionLayer.m` and find the code from [Listing 13–31](#Chapter13.html#list_13_31)
    (parses the mood, x, and y of the face.com request). Add the code from [Listing
    13–34](#Chapter13.html#list_13_34) just after those lines.


    **Listing 13–34.** *Invoke the loadCrosshair Method*


    `[_hud loadCrosshair:mood x:xPosition y:yPosition];`


    We are going to call our new method using our HUD layer. If you think back to
    the diagram where we stacked our views, this should work just fine. Run the project.
    The result should look something like [Figure 13–11](#Chapter13.html#fig_13_11).


    ![Image](images/1311.jpg)


    **Figure 13–11.** *Wait, that’s not right!*


    The good news is that the image appears to have been placed in the right spot.
    The bad news is that you can’t see the image. It seems like an opaque block on
    the screen.


    This is due to how OpenGL handles threading. We detached a thread to handle the
    HTTP request, and OpenGL wants us to interact with the screen through the main
    thread. There are ways around threading with OpenGL, and there are plenty of articles
    on the topic. This is a basic example of the need for more organized threads in
    a cocos2D application. If you would like to learn more about OpenGL and threading,
    check out Mike Smithwick’s*Pro OpenGL for iOS* book from Apress.


    Let’s fix this issue. As it turns out, we really don’t need a HUD layer for this
    application. Since our base logic was in the `AppDelegate`, our `FaceDetectionLayer`
    is acting as our HUD layer. Let’s move the drawing function down a level in the
    stack, and use our main thread to invoke the change in the label on the screen.


    Instead of creating the label and the sprite on the fly, let’s make a property
    so we can access it outside of the class. Also, we’ll need a property to reference
    our `RootViewController`.


    Adjust the `FaceDetectionLayer.h` file as shown in [Listing 13–35](#Chapter13.html#list_13_35).
    I commented out the lines we will no longer need.


    **Listing 13–35.** *Changes to FaceDetectionLayer*


    `#import <Foundation/Foundation.h>`

    `#import "cocos2d.h"`

    `#import "HUDLayer.h"`

    `#import "ASIFormDataRequest.h"`

    `#import "SBJson.h"`


    `@interface FaceDetectionLayer : CCLayer {`

    `    //HUDLayer *_hud;`

    `    BOOL _sendingRequest;`


    **`CCSprite *crosshair;`**

    **`}`**


    **`@property (retain) UIViewController * root;`**

    **`@property (retain) CCLabelTTF * label;`**


    `//+ (CCScene *)scene;`

    `//- (id)initWithHUD:(HUDLayer *)hud;`

    `- (void)facialRecognitionRequest:(UIImage *)image;`

    `@end`


    Switch back to `FaceDetectionLayer.m` and synthesize the new properties as shown
    in [Listing 13–36](#Chapter13.html#list_13_36).


    **Listing 13–36.** *Synthesize New Properties*


    `@synthesize root;`

    `@synthesize label = _label;`


    Comment out the `scene` and `initWithHUD` methods as well. We won’t be using those
    any longer. Create a new `init` method with the code from [Listing 13–37](#Chapter13.html#list_13_37).


    **Listing 13–37.** *New init Method*


    `-(id) init {`

    `    if(self = [super init]){`

    `        CGSize size = [[CCDirector sharedDirector] winSize];`


    `        crosshair =  [CCSprite spriteWithFile:@"crosshair.png" ];`

    `        crosshair.position = ccp((size.width * (50.0/100)), (size.height * (1
    - (50.0/100))));`

    `        crosshair.opacity = 0;`

    `        [self addChild:crosshair];`


    `        _label = [CCLabelTTF labelWithString:@"" fontName:@"Marker Felt" fontSize:48];`

    `        _label.position =  ccp( size.width /2 , size.height/2 );`

    `        [self addChild: _label];`

    `    }`

    `    return self;`

    `}`


    We are simply moving some of our `HUDLayer` code to the `init` method of the `FaceDetectionLayer`.
    The only real difference in this code is that we are not setting the string of
    the label just yet. We will do that from our `RootViewController` in a moment.


    Replace the line from [Listing 13–38](#Chapter13.html#list_13_38) with the code
    from [Listing 13–39](#Chapter13.html#list_13_39).


