    `        label.position = ccp(winSize.width/2, winSize.height/2);`

    `        [self addChild:label];`

    `    }`

    `    return self;`

    `}  `


    At this point, we haven''t done anything game related yet. We''re setting up a
    type of Hello World example to make sure everything is working properly. You''ll
    notice that we used a custom font file and the `CCLabelBMFont` class for this
    example. You can find the code in the GitHub repository or from the Source Code/Download
    area at the Apress web site ([`www.apress.com`](http://www.apress.com)). These
    fonts were provided by Ray Wenderlich ([`www.raywenderlich.com`](http://www.raywenderlich.com)).
    You will need to wait until the fonts have been added to the project before attempting
    to run it. You can add them now, if you want to run the project as it stands.


    Let''s return to `AppDelegate.m`. We need to add a few more things to make sure
    our menu is shown to the user. Add the `import` statements from [Listing 8–6](#Chapter08.html#list_8_6)
    to the project.


    **Listing 8–6.** *Additional import Statements*


    `#import "chipmunk.h"`

    `#import "MenuLayer.h"`


    Find the bottom of the `applicationDidFinishLaunching` method in `AppDelegate.m`.
    Add the code from [Listing 8–7](#Chapter08.html#list_8_7).


    **Listing 8–7.** *Add to the Bottom of applicationDidFinishLaunching*


    `cpInitChipmunk();`

    `[[CCDirector sharedDirector] runWithScene: [MenuLayer scene]];`


    Go ahead and run the project on the iPad simulator. If everything was done correctly,
    you''ll see something like [Figure 8–6](#Chapter08.html#fig_8_6).


    ![Image](images/0806.jpg)


    **Figure 8–6.** *Run the project to see “Hello, Chipmunk!”*


    Okay, let''s make this a bit more interesting. The idea with the menu layer is
    that we can give the user something to do while they are deciding whether to start
    a new game. Since this is a game about pumpkins, we''re going to add a pumpkin
    to the screen that can be tossed around by touch interactions.'
  trans: "\n### 相机视图\n\n首先，像我们在第 7 章中所做的那样，将相机视图设置为基础层。在项目中添加以下框架：\n\n- CoreImage\n\
    - CoreMedia\n- CoreVideo\n\n在 Xcode 中打开 `AppDelegate.h`。按照代码清单 8-2 所示更新头文件。\n\n\
    **代码清单 8-2.** *新的 AppDelegate.h*\n\n```\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n\
    \n@class RootViewController;\n\n@interface AppDelegate : NSObject <UIApplicationDelegate,\n\
    AVCaptureVideoDataOutputSampleBufferDelegate> {\n    UIWindow *window;\n    RootViewController\
    \ *viewController;\n\nAVCaptureSession *_session;\nUIView *_cameraView;\nUIImageView\
    \ *_imageView;\n}\n\n@property (nonatomic, retain) UIWindow *window;\n\n@end\n\
    ```\n\n与我们在第 7 章中的做法非常相似，我们正在设置 `UIView` 和 `UIImageView` 来处理并向用户显示相机视图。切换到 `AppDelegate.m`。将代码清单\
    \ 8-3 中的方法添加到实现中。\n\n**代码清单 8-3.** *AppDelegate.m 的新方法*\n\n```\n-(AVCaptureDevice\
    \ *)frontFacingCameraIfAvailable\n{\n    NSArray *videoDevices = [AVCaptureDevice\
    \ devicesWithMediaType:AVMediaTypeVideo];\n    AVCaptureDevice *captureDevice\
    \ = nil;\n    for (AVCaptureDevice *device in videoDevices)\n    {\n        if\
    \ (device.position == AVCaptureDevicePositionFront)\n        {\n            captureDevice\
    \ = device;\n            break;\n        }\n    }\n\n    //  如果找不到前置摄像头，就获取默认视频设备。\n\
    \    if ( ! captureDevice)\n    {\n        captureDevice = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
    \    }\n\n    return captureDevice;\n}\n\n- (void)setupCaptureSession {\n    NSError\
    \ *error = nil;\n\n    _session = [[AVCaptureSession alloc] init];\n    _session.sessionPreset\
    \ = AVCaptureSessionPresetMedium;\n\n    //AVCaptureDevice *device = [AVCaptureDevice\
    \ defaultDeviceWithMediaType:AVMediaTypeVideo];\n    AVCaptureDevice *device =\
    \ [self frontFacingCameraIfAvailable]; // 用于调试\n    AVCaptureDeviceInput *input\
    \ = [AVCaptureDeviceInput deviceInputWithDevice:device error:&error];\n\n    if\
    \ (!input) {\n        NSLog(@\"出现了某种错误... 在此处处理\");\n    }\n\n    [_session addInput:input];\n\
    \n    AVCaptureVideoDataOutput *output = [[AVCaptureVideoDataOutput alloc] init];\n\
    \    [_session addOutput:output];\n\n    dispatch_queue_t queue = dispatch_queue_create(\"\
    pumpkins\", NULL);\n    [output setSampleBufferDelegate:self queue:queue];\n \
    \   dispatch_release(queue);\n\n    output.videoSettings =\n    [NSDictionary\
    \ dictionaryWithObject:\n     [NSNumber numberWithInt:kCVPixelFormatType_32BGRA]\n\
    \                                forKey:(id)kCVPixelBufferPixelFormatTypeKey];\n\
    \n    [_session startRunning];\n}\n```\n\n第一个方法 `frontFacingCameraIfAvailable`\
    \ 仅用于调试目的。如果你不是在人群中编码，这会很方便，这样你就可以使用前置摄像头进行测试。如果你不在调试状态，应该交换显示为粗体的两行代码。也就是说，注释掉其中一个来强制使用前置摄像头（如果可用的话）。每次只使用其中一个。因为我不是在人群中编码，并且需要使用前置摄像头，所以我将保留当前状态。\n\
    \n在我们真正将相机添加到视图之前，让我们先使用 Chipmunk 物理引擎设置一个菜单界面，以便用户在等待游戏开始时消遣。\n\n### 创建游戏菜单\n\
    \n使用 cocos2D 的 `CCNode` 模板创建新文件，如图 8-5 所示。\n\n![Image](img/0805.jpg)\n\n**图 8-5.**\
    \ *使用 CCNode 模板*\n\n确保文件是 `CCLayer` 的子类，并且名称为 `MenuLayer.m`。在 Xcode 中打开 `MenuLayer.h`。按照代码清单\
    \ 8-4 所示更新头文件。\n\n**代码清单 8-4.** *更新 MenuLayer.h*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n\n@interface MenuLayer : CCLayer {\n\n}\n+ (id)scene;\n\
    @end\n```\n\n切换到 `MenuLayer.m`。将代码清单 8-5 中的方法添加到实现中。\n\n**代码清单 8-5.** *MenuLayer.m\
    \ 的 Scene 和 init 方法*\n\n```\n+ (id)scene {\n    CCScene *scene = [CCScene node];\n\
    \    MenuLayer *layer = [MenuLayer node];\n    [scene addChild:layer];\n    return\
    \ scene;\n}\n\n- (id)init {\n    if ((self = [super init])) {        \n      \
    \  CGSize winSize = [CCDirector sharedDirector].winSize;\n\n        CCLabelBMFont\
    \ *label = [CCLabelBMFont labelWithString:@\"你好，Chipmunk!\" fntFile:@\"Arial.fnt\"\
    ];\n        label.position = ccp(winSize.width/2, winSize.height/2);\n       \
    \ [self addChild:label];\n    }\n    return self;\n}  \n```\n\n到目前为止，我们还没有做任何与游戏相关的事情。我们正在设置一个类似\
    \ Hello World 的示例，以确保一切正常运行。你会注意到，在这个示例中我们使用了一个自定义字体文件和 `CCLabelBMFont` 类。你可以在\
    \ GitHub 仓库或 Apress 网站（[`www.apress.com`](http://www.apress.com)）的源代码/下载区域找到相关代码。这些字体由\
    \ Ray Wenderlich（[`www.raywenderlich.com`](http://www.raywenderlich.com)）提供。在尝试运行项目之前，你需要等待字体被添加到项目中。如果你现在就想运行项目，可以现在就添加它们。\n\
    \n让我们回到 `AppDelegate.m`。我们需要再添加一些内容，以确保菜单能够显示给用户。将代码清单 8-6 中的 `import` 语句添加到项目中。\n\
    \n**代码清单 8-6.** *额外的 import 语句*\n\n```\n#import \"chipmunk.h\"\n#import \"MenuLayer.h\"\
    \n```\n\n找到 `AppDelegate.m` 中 `applicationDidFinishLaunching` 方法的底部。添加代码清单 8-7\
    \ 中的代码。\n\n**代码清单 8-7.** *添加到 applicationDidFinishLaunching 底部*\n\n```\ncpInitChipmunk();\n\
    [[CCDirector sharedDirector] runWithScene: [MenuLayer scene]];\n```\n\n继续在 iPad\
    \ 模拟器上运行项目。如果一切正确，你将看到类似图 8-6 的内容。\n\n![Image](img/0806.jpg)\n\n**图 8-6.** *运行项目，看到“你好，Chipmunk!”*\n\
    \n好了，让我们让这个更有趣一些。菜单层的想法是，当用户决定是否开始新游戏时，我们可以给他们一些事情做。由于这是一个关于南瓜的游戏，我们将添加一个南瓜到屏幕上，用户可以通过触摸交互来抛掷它。\n"
- fmt: "### Artwork\n\nFor cocos2D gaming, it's best to use sprite sheets. Furthermore,\
    \ it's even better if you can consolidate your images into a few sprite sheets\
    \ that are optimized for space. Since this book is about augmented reality and\
    \ not iOS gaming, I've created and optimized the sprite sheets for you already.\
    \ They can be found in the `Art` directory on GitHub or from the Source Code/Download\
    \ area at the Apress web site ([`www.apress.com`](http://www.apress.com)). Copy\
    \ the `Art` directory to your Xcode project before moving forward on the tutorial.\
    \ You should have the following four new files:\n\n- `particleTexture.png`\n-\
    \ `PumpkinExplosion.plist`\n- `Pumpkins.plist`\n- `Pumpkins.png`\n\nThe first\
    \ two files are a particle emitter I created for this project. It will give the\
    \ pumpkins the effect of an orangish dissolve when we destroy them. The second\
    \ pair of files is the consolidated PNG files for the different pumpkins we'll\
    \ be using. The full sprite sheet is shown in [Figure 8–7](#Chapter08.html#fig_8_7).\n\
    \n![Image](images/0807.jpg)\n\n**Figure 8–7.** *Use the pumpkin sprite sheet for\
    \ our project.*\n\nThe pumpkins in this sprite sheet are named `pumpkin_#_.png`,\
    \ where `#` is a number between 5 and 16. Pumpkins 1–4 had no faces, so we're\
    \ just going to leave those out.\n\nWe're going to add one of these pumpkins to\
    \ the menu screen and let the user throw him around a bit. Create a new file using\
    \ any template. We're going to overwrite the whole thing anyway. Name the new\
    \ class `CPSprite`.\n\nOverwrite the header with the code from [Listing 8–8](#Chapter08.html#list_8_8).\n\
    \n**Listing 8–8.** *CPSprite.h*\n\n```\n#import \"cocos2d.h\"\n#import \"chipmunk.h\"\
    \n\ntypedef enum {\n    kCollisionTypeGround = 0x1,\n    kCollisionTypeCat,\n\
    \    kCollisionTypeBed\n} CollisionType;\n\n@interface CPSprite : CCSprite {\n\
    \    cpBody *body;\n    cpShape *shape;\n    cpSpace *space;\n    BOOL canBeDestroyed;\n\
    }\n\n@property (assign) cpBody *body;\n\n- (void)update;\n- (void)createBoxAtLocation:(CGPoint)location;\n\
    - (id)initWithSpace:(cpSpace *)theSpace location:(CGPoint)location spriteFrameName:(NSString\
    \ *)spriteFrameName;\n- (void)destroy;\n\n@end\n```\n\nWe don't really have to\
    \ worry too much about what this class is doing. We're basically setting up a\
    \ wrapper for the `CCSprite` class, so we can more easily interact with the objects\
    \ on our screen. In our case, this will help us make a pumpkin that we can toss\
    \ around the screen.\n\nSwitch to `CPSprite.m` and replace the implementation\
    \ with the code from [Listing 8–9](#Chapter08.html#list_8_9).\n\n**Listing 8–9.**\
    \ *CPSprite.m*\n\n```\n#import \"CPSprite.h\"\n\n@implementation CPSprite\n@synthesize\
    \ body;\n\n- (void)update {    \n    self.position = body->p;\n    self.rotation\
    \ = CC_RADIANS_TO_DEGREES(-1 * body->a);\n}\n\n- (void)createBoxAtLocation:(CGPoint)location\
    \ {\n\n    float mass = 1.0;\n    body = cpBodyNew(mass, cpMomentForBox(mass,\
    \ self.contentSize.width, self.contentSize.height));\n    body->p = location;\n\
    \    body->data = self;\n    cpSpaceAddBody(space, body);\n\n    shape = cpBoxShapeNew(body,\
    \ self.contentSize.width, self.contentSize.height);\n    shape->e = 0.3;\n   \
    \ shape->u = 1.0;\n    shape->data = self;\n    shape->group = 1;\n    cpSpaceAddShape(space,\
    \ shape);\n\n}\n\n- (id)initWithSpace:(cpSpace *)theSpace location:(CGPoint)location\
    \ spriteFrameName:(NSString *)spriteFrameName {\n\n    if ((self = [super initWithSpriteFrameName:spriteFrameName]))\
    \ {\n\n        space = theSpace;\n        canBeDestroyed = YES;\n        [self\
    \ createBoxAtLocation:location];\n\n    }\n    return self;\n\n}\n\n- (void)destroy\
    \ {\n\n    if (!canBeDestroyed) return;\n\n    cpSpaceRemoveBody(space, body);\n\
    \    cpSpaceRemoveShape(space, shape);\n    [self removeFromParentAndCleanup:YES];\n\
    }\n\n@end\n```\n\nThe implementation file sets up the properties we'll be using\
    \ in our menu. For the most part, you don't have to worry too much about what\
    \ is happening in this file. This file, and two others are included in the source\
    \ code under the `Helper Code` directory. They are utility methods used to make\
    \ the implementation files more easily read.\n\n### Helper Code Directory\n\n\
    There are four more files you need to copy from the source directory before we\
    \ move forward. They are found in the `Helper Code` directory on GitHub or from\
    \ the Source Code/Download area at the Apress web site ([`www.apress.com`](http://www.apress.com)).\n\
    \nThe files are:\n\n- `cpMouse.c`\n- `cpMouse.h`\n- `drawSpace.h`\n- `drawSpace.c`\n\
    \nCopy these files into your Xcode project. If you try to build the project, you'll\
    \ get a compiler error. Click `cpMouse.c` in the Xcode navigator. On the right\
    \ panel, open the **Identity and Type** view and set the **File Type** to **Objective-C\
    \ source**, as shown in [Figure 8–8](#Chapter08.html#fig_8_8).\n\n![Image](images/0808.jpg)\n\
    \n**Figure 8–8.** *Set the File Type of cpMouse.c.*\n\nRepeat this process for\
    \ `drawSpace.c`. Your project should build with no errors at this point.\n\n###\
    \ Finishing the Menu Screen\n\nReturn to `MenuLayer.h`. Now that we have the helper\
    \ classes in our project, things will be much smoother. Update the header as shown\
    \ in [Listing 8–10](#Chapter08.html#list_8_10).\n\n**Listing 8–10.** *Updated\
    \ MenuLayer.h*\n\n```\n#import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\
    \n#import \"chipmunk.h\"\n\n@interface MenuLayer : CCLayer {\n    cpSpace *space;\n\
    \    cpBody *ground;\n}\n\n+ (id)scene;\n\n@end\n```\n\nAfter importing the chipmunk\
    \ library, we declare two new private variables. First, we set up a `cpSpace`\
    \ iVar for chipmunk. This defines the space where chipmunk will track physics\
    \ actions. We then add a `cpBody` to the class. This will represent the bottom\
    \ of our screen as sort of a floor. If we didn't have this, the pumpkin could\
    \ fly off the screen in all directions. Having a ground also helps chipmunk understand\
    \ gravity and friction a bit more easily.\n\n#### Working with Chipmunk\n\nSwitch\
    \ over to `MenuLayer.m`. Import the `drawSpace.h` header from our Helper Code\
    \ class. Add the method from [Listing 8–11](#Chapter08.html#list_8_11) to the\
    \ implementation.\n\n**Listing 8–11.** *createSpace Method*\n\n```\n- (void)createSpace\
    \ {\n    space = cpSpaceNew();\n    space->gravity = ccp(0, -750);\n    cpSpaceResizeStaticHash(space,\
    \ 400, 200);\n    cpSpaceResizeActiveHash(space, 200, 200);\n}\n```\n\nThis method\
    \ defines the space for chipmunk. We set the gravity to nothing along the X axis\
    \ (no side-to-side gravity), and a fairly heavy pull for the Y axis. You can play\
    \ with these values for your implementation to get the feel you are looking for.\
    \ The second two lines are there to optimize chipmunk's collision detection. It\
    \ divides chipmunk into grids and tells the framework to ignore objects that don't\
    \ reside in the same grid. Add the method from [Listing 8–12](#Chapter08.html#list_8_12),\
    \ just under the `createSpace` method.\n\n**Listing 8–12.** *createGround Method*\n\
    \n```\n- (void)createGround {    \n\n    CGSize winSize = [CCDirector sharedDirector].winSize;\n\
    \    CGPoint lowerLeft = ccp(0, 0);\n    CGPoint lowerRight = ccp(winSize.width,\
    \ 0);\n\n    ground = cpBodyNewStatic();\n\n    float radius = 10.0;\n    cpShape\
    \ *groundShape = cpSegmentShapeNew(ground, lowerLeft, lowerRight, radius);\n\n\
    \    groundShape->e = 0.5; // elasticity\n    groundShape->u = 1.0; // friction\n\
    \n     cpSpaceAddShape(space, groundShape);    \n}\n```\n\nAs I mentioned earlier,\
    \ we're creating a ground effect so the pumpkin doesn't totally fall off the screen.\
    \ We are setting up friction and elasticity, as well. If you want to have some\
    \ fun with the pumpkin, you can set elasticity low and friction to 0 and get an\
    \ ice-like effect. Or, you can increase elasticity and friction to get more of\
    \ a trampoline effect."
