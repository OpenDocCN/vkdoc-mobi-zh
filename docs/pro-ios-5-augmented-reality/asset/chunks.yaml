    the bottom of our screen as sort of a floor. If we didn''t have this, the pumpkin
    could fly off the screen in all directions. Having a ground also helps chipmunk
    understand gravity and friction a bit more easily.


    ##### Working with Chipmunk


    Switch over to `MenuLayer.m`. Import the `drawSpace.h` header from our Helper
    Code class. Add the method from [Listing 8–11](#Chapter08.html#list_8_11) to the
    implementation.


    **Listing 8–11.** *createSpace Method*


    `- (void)createSpace {`

    `    space = cpSpaceNew();`

    `    space->gravity = ccp(0, -750);`

    `    cpSpaceResizeStaticHash(space, 400, 200);`

    `    cpSpaceResizeActiveHash(space, 200, 200);`

    `}`


    This method defines the space for chipmunk. We set the gravity to nothing along
    the X axis (no side-to-side gravity), and a fairly heavy pull for the Y axis.
    You can play with these values for your implementation to get the feel you are
    looking for. The second two lines are there to optimize chipmunk''s collision
    detection. It divides chipmunk into grids and tells the framework to ignore objects
    that don''t reside in the same grid. Add the method from [Listing 8–12](#Chapter08.html#list_8_12),
    just under the `createSpace` method.


    **Listing 8–12.** *createGround Method*


    `- (void)createGround {    `


    `    CGSize winSize = [CCDirector sharedDirector].winSize;`

    `    CGPoint lowerLeft = ccp(0, 0);`

    `    CGPoint lowerRight = ccp(winSize.width, 0);`


    `    ground = cpBodyNewStatic();`


    `    float radius = 10.0;`

    `    cpShape *groundShape = cpSegmentShapeNew(ground, lowerLeft, lowerRight, radius);`


    `    groundShape->e = 0.5; // elasticity`

    `    groundShape->u = 1.0; // friction`


    `     cpSpaceAddShape(space, groundShape);    `

    `}`


    As I mentioned earlier, we''re creating a ground effect so the pumpkin doesn''t
    totally fall off the screen. We are setting up friction and elasticity, as well.
    If you want to have some fun with the pumpkin, you can set elasticity low and
    friction to 0 and get an ice-like effect. Or, you can increase elasticity and
    friction to get more of a trampoline effect.'
  trans: "\n### 美术资源\n\n对于 cocos2D 游戏开发，最好使用精灵表。更进一步，如果能将图片合并到少数几个优化过空间占用的精灵表中，效果更佳。由于本书是关于增强现实而非\
    \ iOS 游戏开发的，我已经为您创建并优化好了精灵表。它们可以在 GitHub 上的`Art`目录中找到，或者从 Apress 网站（[`www.apress.com`](http://www.apress.com)）的源代码/下载区域获取。在继续教程之前，请将`Art`目录复制到您的\
    \ Xcode 项目中。您应该会得到以下四个新文件：\n\n- `particleTexture.png`\n- `PumpkinExplosion.plist`\n\
    - `Pumpkins.plist`\n- `Pumpkins.png`\n\n前两个文件是我为此项目创建的粒子发射器。它能在我们摧毁南瓜时，赋予它们一种橘色溶解的效果。第二对文件是合并后的\
    \ PNG 文件，包含了我们将使用的不同南瓜。完整的精灵表如图 8-7 所示。\n\n![图片](img/0807.jpg)\n\n**图 8-7.** *为我们的项目使用南瓜精灵表。*\n\
    \n此精灵表中的南瓜被命名为`pumpkin_#_.png`，其中`#`是 5 到 16 之间的数字。南瓜 1 到 4 没有脸，所以我们不打算使用它们。\n\
    \n我们将把其中一个南瓜添加到菜单屏幕上，并允许用户稍微抛掷它。使用任意模板创建一个新文件。反正我们后续会覆盖整个内容。将新类命名为`CPSprite`。\n\
    \n用代码清单 8-8 中的代码覆盖头文件。\n\n**代码清单 8-8.** *CPSprite.h*\n\n```\n#import \"cocos2d.h\"\
    \n#import \"chipmunk.h\"\n\ntypedef enum {\n    kCollisionTypeGround = 0x1,\n\
    \    kCollisionTypeCat,\n    kCollisionTypeBed\n} CollisionType;\n\n@interface\
    \ CPSprite : CCSprite {\n    cpBody *body;\n    cpShape *shape;\n    cpSpace *space;\n\
    \    BOOL canBeDestroyed;\n}\n\n@property (assign) cpBody *body;\n\n- (void)update;\n\
    - (void)createBoxAtLocation:(CGPoint)location;\n- (id)initWithSpace:(cpSpace *)theSpace\
    \ location:(CGPoint)location spriteFrameName:(NSString *)spriteFrameName;\n- (void)destroy;\n\
    \n@end\n```\n\n我们无需过分担心这个类的具体作用。本质上，我们是在为`CCSprite`类建立一个包装器，以便更容易地与屏幕上的对象进行交互。在我们的场景中，这将帮助我们创建一个可以在屏幕上抛掷的南瓜。\n\
    \n切换到`CPSprite.m`，并用代码清单 8-9 中的代码替换其实现。\n\n**代码清单 8-9.** *CPSprite.m*\n\n```\n\
    #import \"CPSprite.h\"\n\n@implementation CPSprite\n@synthesize body;\n\n- (void)update\
    \ {    \n    self.position = body->p;\n    self.rotation = CC_RADIANS_TO_DEGREES(-1\
    \ * body->a);\n}\n\n- (void)createBoxAtLocation:(CGPoint)location {\n\n    float\
    \ mass = 1.0;\n    body = cpBodyNew(mass, cpMomentForBox(mass, self.contentSize.width,\
    \ self.contentSize.height));\n    body->p = location;\n    body->data = self;\n\
    \    cpSpaceAddBody(space, body);\n\n    shape = cpBoxShapeNew(body, self.contentSize.width,\
    \ self.contentSize.height);\n    shape->e = 0.3;\n    shape->u = 1.0;\n    shape->data\
    \ = self;\n    shape->group = 1;\n    cpSpaceAddShape(space, shape);\n\n}\n\n\
    - (id)initWithSpace:(cpSpace *)theSpace location:(CGPoint)location spriteFrameName:(NSString\
    \ *)spriteFrameName {\n\n    if ((self = [super initWithSpriteFrameName:spriteFrameName]))\
    \ {\n\n        space = theSpace;\n        canBeDestroyed = YES;\n        [self\
    \ createBoxAtLocation:location];\n\n    }\n    return self;\n\n}\n\n- (void)destroy\
    \ {\n\n    if (!canBeDestroyed) return;\n\n    cpSpaceRemoveBody(space, body);\n\
    \    cpSpaceRemoveShape(space, shape);\n    [self removeFromParentAndCleanup:YES];\n\
    }\n\n@end\n```\n\n实现文件设置了我们将在菜单中使用的属性。在大多数情况下，您无需过分担心这个文件中的具体实现。这个文件和其他两个文件一起包含在`Helper\
    \ Code`目录下的源代码中。它们是一些工具方法，旨在使实现文件更容易阅读。\n\n### 辅助代码目录\n\n在继续之前，您还需要从源代码目录复制另外四个文件。它们位于\
    \ GitHub 上的`Helper Code`目录中，或者 Apress 网站（[`www.apress.com`](http://www.apress.com)）的源代码/下载区域。\n\
    \n这些文件是：\n\n- `cpMouse.c`\n- `cpMouse.h`\n- `drawSpace.h`\n- `drawSpace.c`\n\n\
    将这些文件复制到您的 Xcode 项目中。如果您尝试构建项目，将会出现编译器错误。在 Xcode 导航器中点击`cpMouse.c`。在右侧面板中，打开**Identity\
    \ and Type**视图，并将**File Type**设置为**Objective-C source**，如图 8-8 所示。\n\n![图片](img/0808.jpg)\n\
    \n**图 8-8.** *设置`cpMouse.c`的文件类型。*\n\n对`drawSpace.c`重复此过程。此时，您的项目应该能够无错误地构建。\n\
    \n### 完成菜单屏幕\n\n回到`MenuLayer.h`。现在我们的项目中有了辅助类，事情会顺利得多。像代码清单 8-10 所示更新头文件。\n\n\
    **代码清单 8-10.** *更新后的 MenuLayer.h*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n#import \"chipmunk.h\"\n\n@interface MenuLayer : CCLayer\
    \ {\n    cpSpace *space;\n    cpBody *ground;\n}\n\n+ (id)scene;\n\n@end\n```\n\
    \n导入 chipmunk 库之后，我们声明了两个新的私有变量。首先，为 chipmunk 设置一个`cpSpace`实例变量。这定义了 chipmunk\
    \ 追踪物理动作的空间。然后，我们向类添加了一个`cpBody`。这将代表我们屏幕的底部，作为某种意义上的地面。如果没有这个地面，南瓜可能会飞向屏幕的各个方向。拥有地面也有助于\
    \ chipmunk 更容易地理解重力和摩擦力。\n\n#### 使用 Chipmunk\n\n切换到`MenuLayer.m`。从我们的辅助代码类中导入`drawSpace.h`头文件。将代码清单\
    \ 8-11 中的方法添加到实现中。\n\n**代码清单 8-11.** *`createSpace`方法*\n\n```\n- (void)createSpace\
    \ {\n    space = cpSpaceNew();\n    space->gravity = ccp(0, -750);\n    cpSpaceResizeStaticHash(space,\
    \ 400, 200);\n    cpSpaceResizeActiveHash(space, 200, 200);\n}\n```\n\n此方法定义了\
    \ chipmunk 的空间。我们将重力设置为在 X 轴上无作用（无左右重力），而在 Y 轴上施加一个相当强的拉力。您可以在自己的实现中调整这些数值，以获得您想要的感觉。接下来的两行代码用于优化\
    \ chipmunk 的碰撞检测。它将 chipmunk 划分为网格，并告诉框架忽略不在同一网格中的对象。在`createSpace`方法正下方，添加代码清单\
    \ 8-12 中的方法。\n\n**代码清单 8-12.** *`createGround`方法*\n\n```\n- (void)createGround\
    \ {    \n\n    CGSize winSize = [CCDirector sharedDirector].winSize;\n    CGPoint\
    \ lowerLeft = ccp(0, 0);\n    CGPoint lowerRight = ccp(winSize.width, 0);\n\n\
    \    ground = cpBodyNewStatic();\n\n    float radius = 10.0;\n    cpShape *groundShape\
    \ = cpSegmentShapeNew(ground, lowerLeft, lowerRight, radius);\n\n    groundShape->e\
    \ = 0.5; // 弹性系数\n    groundShape->u = 1.0; // 摩擦系数\n\n     cpSpaceAddShape(space,\
    \ groundShape);    \n}\n```\n\n正如我之前提到的，我们正在创建一个地面效果，以防止南瓜完全掉出屏幕。我们还设置了摩擦力和弹性系数。如果您想用南瓜找点乐子，可以将弹性系数设低，摩擦系数设为\
    \ 0，从而获得类似冰面的效果。或者，您可以增加弹性和摩擦系数，以获得更像蹦床的效果。\n"
- fmt: "### Creating Objects in Chipmunk\n\nAdd the methods from [Listing 8–13](#Chapter08.html#list_8_13)\
    \ to the implementation.\n\n**Listing 8–13.** *`createBoxAtLocation` and `draw`\
    \ (Override) Methods*\n\n```\n- (void)createBoxAtLocation:(CGPoint)location {\n\
    \    float boxSize = 60.0;\n    float mass = 1.0;\n    cpBody *body = cpBodyNew(mass,\
    \ cpMomentForBox(mass, boxSize, boxSize));\n    body->p = location;\n    cpSpaceAddBody(space,\
    \ body);\n\n    cpShape *shape = cpBoxShapeNew(body, boxSize, boxSize);\n    shape->e\
    \ = 1.0;\n    shape->u = 1.0;\n    cpSpaceAddShape(space, shape);\n}\n\n- (void)draw\
    \ {\n    drawSpaceOptions options = {\n        0, // drawHash\n        0, // drawBBs,\n\
    \        1, // drawShapes\n        4.0, // collisionPointSize\n        4.0, //\
    \ bodyPointSize,\n        2.0 // lineThickness\n    };\n\n    drawSpace(space,\
    \ &options);\n}\n```\n\nThe first method will be used only this once. We are going\
    \ to create a few boxes and drop them on the screen to make sure chipmunk is behaving\
    \ correctly. The second method enables debug draw for chipmunk. Without this,\
    \ it's hard to tell what exactly you are rendering to the screen. This method\
    \ will come in handy if you continue in game development. Update the `init` method\
    \ and add a new method called `update`, as shown in [Listing 8–14](#Chapter08.html#list_8_14).\n\
    \n**Listing 8–14.** *New `init` Method and `update` Method*\n\n```\n- (id)init\
    \ {\n    if ((self = [super init])) {        \n        CGSize winSize = [CCDirector\
    \ sharedDirector].winSize;\n\n        [self createSpace];\n        [self createGround];\n\
    \        [self createBoxAtLocation:ccp(100,100)];\n        [self createBoxAtLocation:ccp(200,200)];\n\
    \n        [self scheduleUpdate];\n    }\n    return self;\n}  \n\n- (void)update:(ccTime)dt\
    \ {\n    cpSpaceStep(space, dt);\n}\n```\n\nAll right, things are getting more\
    \ interesting. With this new, code we're setting up the chipmunk space, ground\
    \ body, and creating two boxes at various coordinates. The `update` method steps\
    \ through the changes in the chipmunk space since the last iteration. Chipmunk\
    \ handles all the updates to objects in its space for you. Go ahead and run the\
    \ project using the simulator to see what I mean. You should see something similar\
    \ to [Figure 8–9](#Chapter08.html#fig_8_9).\n\n![Image](images/0809.jpg)\n\n**Figure\
    \ 8–9** *Run the project to see the boxes on the screen.*\n\nAgain, not too exciting\
    \ is it? Let's add what's called a *mouse joint*, so we can grab and throw the\
    \ boxes. Joints are a type of constraint in chipmunk. We'll be using two types\
    \ of joints in this example. We'll use the mouse joint to enable the user to grab\
    \ the box, and we'll use the `cpDampedSprint` joint to make the pumpkin bounce\
    \ as we toss it around.\n\nSwitch over to `MenuLayer.h` and import the `cpMouse.h`\
    \ header from our Helper Code directory. Then declare a private iVar of the `cpMouse`\
    \ class called `mouse`.\n\nAdd the following lines from [Listing 8–15](#Chapter08.html#list_8_15)\
    \ to the `init` method, just before you run the `scheduleUpdates` method.\n\n\
    **Listing 8–15.** *Add to `init` Method*\n\n```\nmouse = cpMouseNew(space);\n\
    self.isTouchEnabled = YES;\n```\n\nThe first line sets the new `mouse` iVar to\
    \ handle mouse events in our chipmunk space. The second line enables touch events\
    \ for our class.\n\nEnabling touch events is one thing; handling them is a bit\
    \ more complicated. There are two basic approaches to handling touch events in\
    \ cocos2D. For this example, we're requiring only single-touch events (as opposed\
    \ to multitouch events). Oddly enough, these require more code than multitouch\
    \ handling. Add the code from [Listing 8–16](#Chapter08.html#list_8_16) to the\
    \ implementation.\n\n**Listing 8–16.** *Handle the Touch Events*\n\n```\n- (void)registerWithTouchDispatcher\
    \ {\n    [[CCTouchDispatcher sharedDispatcher] addTargetedDelegate:self priority:0\
    \ swallowsTouches:YES];\n}\n\n- (BOOL)ccTouchBegan:(UITouch *)touch withEvent:(UIEvent\
    \ *)event {\n    CGPoint touchLocation = [self convertTouchToNodeSpace:touch];\n\
    \    cpMouseGrab(mouse, touchLocation, false);\n    return YES;\n}\n\n- (void)ccTouchMoved:(UITouch\
    \ *)touch withEvent:(UIEvent *)event {\n    CGPoint touchLocation = [self convertTouchToNodeSpace:touch];\n\
    \    cpMouseMove(mouse, touchLocation);\n}\n\n- (void)ccTouchEnded:(UITouch *)touch\
    \ withEvent:(UIEvent *)event {\n    cpMouseRelease(mouse);\n}\n\n- (void)ccTouchCancelled:(UITouch\
    \ *)touch withEvent:(UIEvent *)event {\n    cpMouseRelease(mouse);    \n}\n\n\
    - (void)dealloc {\n    cpMouseFree(mouse);\n    cpSpaceFree(space);\n    [super\
    \ dealloc];\n}\n```\n\nThis series of events lets chipmunk know that the user\
    \ wants to grab any objects that collide with the touch coordinates. Chipmunk\
    \ will update the position of the object until the user lets go of the touch event.\
    \ At that time, gravity, friction, and any other chipmunk environmental variables\
    \ will come into play and the object will settle back to a natural path. Run the\
    \ project again on the simulator. You'll be able to toss the objects around the\
    \ screen now. Be careful, though—you can actually toss them off the screen and\
    \ you won't be able to get them back!\n\nSo, boxes on the screen weren't exactly\
    \ part of our goal, were they? To make these boxes into pumpkins, we need to tie\
    \ a sprite image to the box and make sure it follows it as chipmunk updates the\
    \ position of the shape. And, because it's not all that useful as it stands, since\
    \ the user can throw the pumpkin completely off the screen, we're going to add\
    \ a groove joint to the screen for the pumpkin. Think of a groove joint like a\
    \ flagpole or fixed track. The object that is tied to the joint can move along\
    \ the path, but can't veer away from the pole/track.\n\nReturn to `MenuLayer.h`\
    \ in Xcode. Update the header as shown in [Listing 8–17](#Chapter08.html#list_8_17).\n\
    \n**Listing 8–17.** *Updated `MenuLayer.h`*\n\n```\n#import <Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n#import \"chipmunk.h\"\n#import \"cpMouse.h\"\n#import\
    \ \"CPSprite.h\"\n\n@interface MenuLayer : CCLayer {\n    cpSpace *space;\n  \
    \  cpBody *ground;\n    cpMouse *mouse;\n\n    CCSpriteBatchNode *pumpkinBatchNode;\n\
    \    CPSprite *menuPumpkin1;\n}\n\n+ (id)scene;\n\n@end\n```\n\nFirst, we import\
    \ the `CPSprite` class we created earlier. This will help us easily add a pumpkin\
    \ to the screen. Next, we declare a private `CCSpriteBatchNode` variable, as well\
    \ as a `CCSprite` variable.\n\n**NOTE:** When developing games with cocos2D, it's\
    \ best to use `CCSpriteBatchNode`s and sprite sheets to save on memory. We'll\
    \ need all the memory we can get, because we'll have such a high processing requirement\
    \ for facial recognition."
