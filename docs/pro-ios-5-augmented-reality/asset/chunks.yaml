    **Figure 7–3.** *Run the default project Hello World from cocos2D.*


    Let''s turn this Hello World into an augmented-reality Hello World application,
    then we''ll discuss some of the features available to us in cocos2D.


    ### Hello Augmented World


    As you know, augmented-reality applications are built on a backdrop of a live
    camera view. In our sample project, we have a black screen as our backdrop. This
    is the first thing we''re going to have to replace.


    I mentioned briefly in the introduction that cocos2D for iPhone is based on cocos2D,
