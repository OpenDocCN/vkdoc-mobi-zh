  trans: "\n#### 监听传感器更新\n\n我们已启用了航向和位置更新，但目前尚未对这些数据执行任何操作。此外，我们也没有对设备方向的改变做出响应。在第\
    \ 7 章中，我们讨论了弧度与度数的转换，以及这在计算屏幕角度时的重要性。为此，我们设置一些便捷方法。打开`Ch11_Prefix.pch`，并添加代码清单\
    \ 11-8 中的代码。\n\n**代码清单 11-8.** *度数与弧度互相转换*\n\n```\n#define degreesToRadians(x)\
    \ (M_PI * (x) / 180.0)\n#define radiansToDegrees(x) ((x) * 180.0/M_PI)\n```\n\n\
    既然已经解决了这个问题，我们需要再定义几个变量。打开`ARController.h`，添加代码清单 11-9 中的变量。\n\n**代码清单 11-9.**\
    \ *更新后的 ARController.h*\n\n```\n@property (nonatomic) UIDeviceOrientation deviceOrientation;\n\
    @property (nonatomic) double range;\n```\n\n切换到`ARController.m`，并按照代码清单 11-10\
    \ 所示合成这些属性。\n\n**代码清单 11-10.** *合成属性*\n\n```\n@synthesize deviceOrientation =\
    \ _deviceOrientation;\n@synthesize range = _range;\n```\n\n现在我们有了一个位置来存储当前设备方向和视野范围。`range`变量将用于存储屏幕所对应的视角角度。图\
    \ 11-6 展示了一个计算对应角度的示例。在点 A 处，树木对应的角度为 25 度。我们将通过计算屏幕全宽对应的视角来计算一个可接受的视野，假设视角窗口约为\
    \ 15 度。\n\n![图像](img/1106.jpg)\n\n**图 11-6.** *通过对应角度计算可接受视野。*\n\n在`ARController.m`中，使用代码清单\
    \ 11-11 中的代码更新`deviceOrientationDidChange`方法。\n\n**代码清单 11-11.** *新的 deviceOrientationDidChange\
    \ 方法*\n\n```\n- (void)deviceOrientationDidChange:(NSNotification *)notification\
    \ {\n    UIDeviceOrientation orientation = [[UIDevice currentDevice] orientation];\n\
    \    UIApplication *app = [UIApplication sharedApplication];\n\n    if ( orientation\
    \ != UIDeviceOrientationUnknown &&\n        orientation != UIDeviceOrientationFaceUp\
    \ &&\n        orientation != UIDeviceOrientationFaceDown) {\n\n              \
    \  CGAffineTransform transform =\nCGAffineTransformMakeRotation(degreesToRadians(0));\n\
    \                CGRect bounds = [[UIScreen mainScreen] bounds];\n           \
    \     [app setStatusBarHidden:YES];\n                [app setStatusBarOrientation:UIInterfaceOrientationPortrait\
    \ animated:\nNO];\n\n                if (orientation == UIDeviceOrientationLandscapeLeft)\
    \ {\n                        transform                   =\nCGAffineTransformMakeRotation(degreesToRadians(90));\n\
    \                        bounds.size.width  = [[UIScreen mainScreen] bounds].size.height;\n\
    \                        bounds.size.height = [[UIScreen mainScreen] bounds].size.width;\n\
    \                        [app\nsetStatusBarOrientation:UIInterfaceOrientationLandscapeRight\
    \ animated: NO];\n\n                } else if (orientation == UIDeviceOrientationLandscapeRight)\
    \ {\n                        transform                   =\nCGAffineTransformMakeRotation(degreesToRadians(-90));\n\
    \                        bounds.size.width  = [[UIScreen mainScreen] bounds].size.height;\n\
    \                        bounds.size.height = [[UIScreen mainScreen] bounds].size.width;\n\
    \                        [app setStatusBarOrientation:UIInterfaceOrientationLandscapeLeft\n\
    animated: NO];\n\n                } else if (orientation == UIDeviceOrientationPortraitUpsideDown)\
    \ {\n                        transform =\nCGAffineTransformMakeRotation(degreesToRadians(180));\n\
    \                        [app setStatusBarOrientation:UIInterfaceOrientationPortraitUpsideDown\
    \ animated: NO];\n\n                }\n                _hudView.transform = transform;\n\
    \                _hudView.bounds = bounds;\n                _range = _hudView.bounds.size.width\
    \ / 12;\n\n        }\n        _deviceOrientation = orientation;\n}\n```\n\n让我们从头逐步分析这段代码。首先，我们声明了几个变量来引用更多的全局应用程序对象。我们设置了对设备方向的引用，以及我们的`sharedApplication`单例。\n\
    \n接下来，我们使用在预编译头文件中定义的转换方法，将度数转换为弧度，并针对非“面部朝上”或“面部朝下”的旋转情况（我们也忽略未知方向）转换屏幕。\n\n\
    最后，我们将变换应用到了 HUD 图层，并设置了屏幕的`range`。请记住，尽管`range`的函数看起来是静态的，但根据方向和设备的不同，它的分子会有所变化。\n\
    \n返回`ARController.h`，设置更多的变量来管理位置更新和航向更新。添加代码清单 11-12 中所示的属性。\n\n**代码清单 11-12.**\
    \ *用于航向和位置的属性*\n\n```\n@property (nonatomic, retain) CLLocation *deviceLocation;\n\
    @property (nonatomic, retain) CLHeading *deviceHeading;\n```\n\n按照代码清单 11-13 所示合成这些属性。\n\
    \n**代码清单 11-13.** *合成属性*\n\n```\n@synthesize deviceHeading = _deviceHeading;\n\
    @synthesize deviceLocation = _deviceLocation;\n```\n\n我们将在后面的示例中使用这些变量。\n"
- fmt: "### Storing Coordinates\n\nWe are pretty close to having everything we need\
    \ to store the location, range of view of the screen, and heading of our device.\
    \ However, we haven't defined a place to store the coordinates of our points of\
    \ interest. This section is modified, but based on work by Alasdair Allan, who\
    \ based his work on Zac White's `ARKit`.\n\nCreate a new class called`ARCoordinate`\
    \ that subclasses`NSObject`. Open the header file, and add the code from [Listing\
    \ 11–14](#Chapter11.html#list_11_14).\n\n**Listing 11–14.** `ARCoordinate.h`\n\
    \n```\n#import <Foundation/Foundation.h>\n\n@interface ARCoordinate : NSObject\
    \ {\n\n}\n\n@property (nonatomic, retain) NSString *name;\n@property (nonatomic,\
    \ retain) NSString *place;\n@property (nonatomic) double distance;\n@property\
    \ (nonatomic) double inclination;\n@property (nonatomic) double azimuth;\n\n-\
    \ (id)initWithRadialDistance:(double)distance inclination:(double)inclination\n\
    azimuth:(double)azimuth;\n@end\n```\n\nWe will eventually be pulling the Facebook\
    \ places of some of our social network. We will overlay the coordinate with the\
    \ name of the person and the name of the Facebook place. The other properties\
    \ store the distance, inclination, and azimuth of the place we are tracking.\n\
    \nThe method we defined will be used to create a new coordinate instance with\
    \ the specified properties.\n\nSwitch to`ARCoordinate.m` and let's finish the\
    \ implementation of this class. Add the code from [Listing 11–15](#Chapter11.html#list_11_15)\
    \ to`ARCoordinate.m`.\n\n**Listing 11–15.** `ARCoordinate.m`\n\n```\n#import \"\
    ARCoordinate.h\"\n\n@implementation ARCoordinate\n\n@synthesize name = _name;\n\
    @synthesize place = _place;\n@synthesize distance = _distance;\n@synthesize inclination\
    \ = _inclination;\n@synthesize azimuth = _azimuth;\n\n- (id)initWithRadialDistance:(double)distance\
    \ inclination:(double)inclination\nazimuth:(double)azimuth {\n    if (self = [super\
    \ init]) {\n        _distance = distance;\n        _inclination = inclination;\n\
    \        _azimuth = azimuth;\n    }\n    return self;\n}\n\n- (void)dealloc {\n\
    \    [_name release];\n    _name = nil;\n    [_place release];\n    _place = nil;\n\
    }\n\n@end\n```\n\nThere shouldn't be anything surprising here. We are simply setting\
    \ up our class to retrieve and store the properties of the coordinate. We need\
    \ another class, which will subclass`ARCoordinate`, to add the location information.\n\
    \nCreate a new class called`ARGeoCoordinate`. Open the new class in Xcode, and\
    \ add the code shown in [Listing 11–16](#Chapter11.html#list_11_16).\n\n**Listing\
    \ 11–16.** `ARGeoCoordinate.h`\n\n```\n#import <Foundation/Foundation.h>\n#import\
    \ <CoreLocation/CoreLocation.h>\n#import \"ARCoordinate.h\"\n\n@interface ARGeoCoordinate\
    \ : ARCoordinate {\n\n}\n\n@property (nonatomic, retain) CLLocation *geoLocation;\n\
    \n- (id)initWithCoordinate:(CLLocation *)location name:(NSString *)name place:(NSString\
    \ *)\nplace;\n- (id)initWithCoordinateAndOrigin:(CLLocation *)location name:(NSString\
    \ *)name\nplace:(NSString *)place origin:(CLLocation *)origin;\n- (float)angleFromCoordinate:(CLLocationCoordinate2D)first\n\
    second:(CLLocationCoordinate2D)second;\n- (void)calibrateUsingOrigin:(CLLocation\
    \ *)origin;\n@end\n```\n\nWe start by importing the`CoreLocation` Framework and\
    \ the`ARCoordinate` class we just created. We then change the parent class from`NSObject`\
    \ to`ARCoordinate`.\n\nFinally, we declare a property to hold the`CLLocation`\
    \ of the point of interest and define a few methods, which we'll discuss in a\
    \ bit. Switch over to`ARGeoCoordinate.m` and add the code from [Listing 11–17](#Chapter11.html#list_11_17).\n\
    \n**Listing 11–17.** `ARGeoCoordinate.m`\n\n```\n#import \"ARGeoCoordinate.h\"\
    \n\n@implementation ARGeoCoordinate\n@synthesize geoLocation = _geoLocation;\n\
    \n- (id)initWithCoordinate:(CLLocation *)location name:(NSString *)name place:(NSString\
    \ *)place {\n    if (self = [super init]) {\n        self.geoLocation = location;\n\
    \        // Properties of base class\n        self.name = name;\n        self.place\
    \ = place;\n    }\n    return self;\n}\n\n- (id)initWithCoordinateAndOrigin:(CLLocation\
    \ *)location name:(NSString *)name place:(NSString *)place origin:(CLLocation\
    \ *)origin {\n    if (self = [super init]) {\n        self.geoLocation = location;\n\
    \        // Properties of base class\n        self.name = name;\n        self.place\
    \ = place;\n        [self calibrateUsingOrigin:origin];\n    }\n    return self;\n\
    }\n\n- (float)angleFromCoordinate:(CLLocationCoordinate2D)first second:(CLLocationCoordinate2D)second\
    \ {\n    float longDiff = second.longitude - first.longitude;\n    float latDiff\
    \ = second.latitude - second.latitude;\n    float aprxAziumuth = (M_PI *.5f) -\
    \ atan(latDiff / longDiff);\n\n    if (longDiff > 0) {\n        return aprxAziumuth;\n\
    \    } else if (longDiff < 0) {\n        return aprxAziumuth + M_PI;\n    } else\
    \ if (latDiff < 0) {\n        return M_PI;\n    }\n\n    return 0.0f;\n}\n\n-\
    \ (void)calibrateUsingOrigin:(CLLocation *)origin {\n    double baseDistance =\
    \ [origin distanceFromLocation:_geoLocation];\n    self.distance = sqrt(pow([origin\
    \ altitude] - [_geoLocation altitude], 2) + pow(baseDistance, 2));\n    float\
    \ angle = sin(ABS([origin altitude] - [_geoLocation altitude]) / self.distance);\n\
    \n    if ([origin altitude] > [_geoLocation altitude]) {\n        angle = -angle;\n\
    \    }\n\n    self.inclination = angle;\n    self.azimuth = [self angleFromCoordinate:[origin\
    \ coordinate] second:[_geoLocation coordinate]];\n}\n\n@end\n```\n\nLet's take\
    \ a break and review what we just added. First, we synthesize the properties we\
    \ declared. Next, we create a method called`initWithCoordinate`. This takes in\
    \ the name and place of the coordinate and sets the properties of the base class,`ARCoordinate`,\
    \ so we can use them later in our visualization layer.\n\nWe then create a method\
    \ called`initWithCoordinateAndOrigin`. This solves the same purpose as`initWithCoordinate`,\
    \ but allows you to define an origin as well. The major difference is that this\
    \ method calls a new internal method, which we will discuss next.\n\nThe`calibrateUsingOrigin`\
    \ method takes the distance between the two points (your device and the point\
    \ of interest) and calculates the raw distance, the angle (considering altitude\
    \ changes), and the azimuth. These properties are set in the base class so we\
    \ can reference them later in the example.\n\nFinally, we create a method called`angleFromCoordinate`.\
    \ This method calculates the distance of the angle between the two points.\n\n\
    Return to`ARController.h` and insert the code from [Listing 11–18](#Chapter11.html#list_11_18),\
    \ right after the`import` statements.\n\n**Listing 11–18.** `ARController.h`\n\
    \n```\n@class ARCoordinate;\n@class ARGeoCoordinate;\n```\n\nNext, declare a property\
    \ for the`ARCoordinate` as shown in [Listing 11–19](#Chapter11.html#list_11_19).\n\
    \n**Listing 11–19.** `ARCoordinate` Property\n\n```\n@property (nonatomic, retain)\
    \ ARCoordinate *coordinate;\n```\n\nSwitch to`ARController.m` and synthesize the\
    \ new property. Use the same underscore pattern for the private variable we've\
    \ been using so far in this chapter. Adjust the`initWithViewController` method\
    \ as shown in [Listing 11–20](#Chapter11.html#list_11_20). This code is at the\
    \ bottom of the method.\n\n**Listing 11–20.** Updated`initWithViewController`\
    \ Method\n\n```\n…….\n_coordinate = [[ARCoordinate alloc] initWithRadialDistance:1.0\
    \ inclination:0 azimuth:0];\nreturn self;\n}\n```\n\nAdd the following code from\
    \ [Listing 11–21](#Chapter11.html#list_11_21) to the top of the`ARController`\
    \ implementation file, just below the`import` statements.\n\n**Listing 11–21.**\
    \ Imports and Private Method for`ARController`\n\n```\n#import \"ARCoordinate.h\"\
    \n#import \"ARGeoCoordinate.h\"\n```"
