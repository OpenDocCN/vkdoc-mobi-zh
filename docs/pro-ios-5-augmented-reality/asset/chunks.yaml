    \ *)newLocation\n           fromLocation:(CLLocation *)oldLocation\n{\n    NSDate*\
    \ eventDate = newLocation.timestamp;\n    NSTimeInterval howRecent = [eventDate\
    \ timeIntervalSinceNow];\n    if (abs(howRecent) < 15.0)\n    {\n        //locationTextView.text\
    \ = [NSString stringWithFormat:@\"latitude %+.6f, longitude %+.6f\\n\",\n    \
    \    //                       newLocation.coordinate.latitude,\n        //   \
    \                    newLocation.coordinate.longitude];\n\n        CLLocationDistance\
    \ dist = [newLocation distanceFromLocation:oldLocation] / 1000;\n        locationTextView.text\
    \ = [NSString stringWithFormat:@\"distance %5.1f traveled\"];\n    } else {\n\
    \        locationTextView.text = @\"Update was old\";\n        // 这里你可能只是什么都不做，忽略该事件\n\
    \    }\n}\n```\n\n在 Xcode 4 的模拟器中，您将得到类似于图 3-11 所示的结果。如果您在模拟器上使用 Xcode 4.2 beta\
    \ 和 iOS 5，可以强制生成一些有趣的数值。测试此功能的另一种方法是传入一个新的 `CLLocation` 坐标来替代 `oldLocation`。\n\
    \n![Image](img/0311.jpg)\n\n**图 3-11.** *检查更新之间的距离。*\n\n### 海拔高度\n\n在增强现实中，检查海拔高度有助于确保摄像头的角度适合您呈现给用户的视图。获取设备的海拔高度起始于与获取位置相同的过程。苹果建议我们先检查海拔高度读数的可用性，然后再尝试从\
    \ GPS 或蜂窝无线电中获取它。目前，要确定设备是否能够提供海拔高度，请使用代码清单 3-19 中的代码。\n\n**代码清单 3-19.** *检查海拔高度是否可用*\n\
    \n```\nIf (signbit(newLocation.verticalAccuracy)) {\n        // 获取海拔高度\n}\n```\n\
    \n海拔高度读数存在几个陷阱。首先，较旧的 iPhone（初代和 iPhone 3Gs）的精度要差得多。在一些参考资料中，指出它们的误差几乎是 iPhone\
    \ 4 的十倍。其次，正如我们在本章前面的定位服务示例中所看到的，Core Location 仅在设备移动一定距离（非竖直方向）时才会更新。因此，我们需要要么强制\
    \ GPS 重置，要么让用户在海拔高度发生变化时自动告知我们。要检查 GPS 读数，请添加代码清单 3-20 中的代码。\n\n**代码清单 3-20.**\
    \ *检查 GPS 读数*\n\n```\nlocationTextView.text = [NSString stringWithFormat:@\"%6.2f\
    \ m. \", newLocation.altitude];\n```\n\n通常情况下，即使在新设备上，海拔高度读数也不够精确。还有其他一些方法以及公开可用的\
    \ Web 服务可以根据 GPS 坐标来确定海拔高度。我们将在后续章节的示例中再次讨论这个主题。在继续学习如何在地图上可视化位置信息之前，让我们回顾一下本章中使用的类。它们最常用的方法和属性列在表\
    \ 3-1 中。\n\n![Image](img/t0301.jpg)\n\n![Image](img/t0301a.jpg)\n"
- fmt: "# Viewing on the Map\n\nWe've explored the different methods of gathering\
    \ the user's location. Let's take a look at how to render those on a map. In augmented-reality\
    \ applications, using the map isn't typically required. However, it adds good\
    \ debugging and visualization to testing of coordinates and locations we are using\
    \ for our AR applications. We'll cover it in this chapter, so you'll have it available\
    \ in your toolbox.\n\nLet's start by setting up the `SecondViewController` class\
    \ in our demo project. This is the second tab in the tab view template. If you've\
    \ followed the chapter so far, it should still be unused. Open `SecondViewController.h`\
    \ and make sure to declare the `IBOutlet` for the `MKMapView`, as shown in [Listing\
    \ 3–21](#Chapter03.html#list_3_21).\n\n**Listing 3–21.** *Declare the MKMapViewIBOutlet*\n\
    \n```\n#import <UIKit/UIKit.h>\n#import <MapKit/MapKit.h>\n\n@interface SecondViewController\
    \ : UIViewController <MKMapViewDelegate>{\n    IBOutlet MKMapView *mapView;\n\
    }\n\n@property (nonatomic, retain) IBOutlet MKMapView *mapView;\n@end\n```\n\n\
    The code shown in bold in [Listing 3–21](#Chapter03.html#list_3_21) is what we\
    \ added to the default template class. First, we import the `Mapkit.h` header\
    \ file. We also nominate our class to be an `MKMapViewDelegate`. This will allow\
    \ this class to handle the messages and updates from the `MKMapView`.\n\nNext,\
    \ open `SecondViewController.m` and `synthesize` your new property. Also, don't\
    \ forget to release it when you're finished with it. Add the code from [Listing\
    \ 3–22](#Chapter03.html#list_3_22) to `SecondViewController.m`.\n\n**Listing 3–22.**\
    \ *Synthesize and Release mapView*\n\n```\n@synthesize mapView;\n\n- (void)dealloc\n\
    {\n    [mapView release];\n    mapView = nil;\n    [super dealloc];\n}\n```\n\n\
    Open `SecondView.xib` in Xcode and remove the `UITextView` and `UITextLabel` that\
    \ were there by default. Drag the **Map View** from the `Object Library` over\
    \ the view and pause to let it autoscale to fill the space available. Next, press\
    \ Ctrl and click and drag a line from the cube (File's Owner icon) on the left-hand\
    \ side of the editor to the new `MKMapView`. You should see a context menu similar\
    \ to that shown in [Figure 3–12](#Chapter03.html#fig_3_12). Select our `mapView`\
    \ property in the menu.\n\n![Image](images/0312.jpg)\n\n**Figure 3–12.** *Configure\
    \ our MKMapView.*\n\n## Centering the Map and Setting the Displayed Region\n\n\
    Returning to `SecondView.m`, we are going to start by uncommenting the `viewDidLoad:`\
    \ method and adding the code from [Listing 3–23](#Chapter03.html#list_3_23).\n\
    \n**Listing 3–23.** *Start a New Thread for Setting Up the Map*\n\n```\n- (void)viewDidLoad\n\
    {\n    mapView.delegate=self;\n    [self.view addSubview:mapView];\n\n    [NSThread\
    \ detachNewThreadSelector:@selector(displayMap) toTarget:self withObject:nil];\n\
    \    [super viewDidLoad];\n}\n```\n\nFirst, we set the `delegate` of the `MKMapView`\
    \ to `self`. Recall that we already nominated this class as an `MKMapViewDelegate`.\
    \ Finally, instead of just loading up the map right here in the `viewDidLoad:`\
    \ method, we detached a new thread for the setup. This is overkill for this sample,\
    \ but it's a good introduction to threading, which we'll need later for the AR\
    \ sample applications. Our thread calls a method, `displayMap`, which we have\
    \ not yet created. Add the code from [Listing 3–24](#Chapter03.html#list_3_24)\
    \ under the `viewDidLoad:` method to create this method.\n\n**Listing 3–24.**\
    \ *Create New displayMap Method*\n\n```\n- (void)displayMap {\n    NSAutoreleasePool\
    \ *pool = [[NSAutoreleasePool alloc] init];\n\n    CLLocationCoordinate2D coords;\n\
    \    coords.latitude = 37.33188;\n    coords.longitude = -122.029497;\n    MKCoordinateSpan\
    \ span = MKCoordinateSpanMake(0.002389, 0.005681);\n    MKCoordinateRegion region\
    \ = MKCoordinateRegionMake(coords, span);\n    [mapView setRegion:region animated:YES];\n\
    \n    [pool drain];\n}\n```\n\nThere are a few things to discuss in this method.\
    \ First, let's run it and see what happens. [Figure 3–13](#Chapter03.html#fig_3_13)\
    \ illustrates this application running in the iPhone simulator. Ignore the preceding\
    \ code in bold for now, as we'll get back to that later. We started by manually\
    \ creating a `CLLocationCoordinate2D` and setting the latitude and longitude to\
    \ Apple's HQ. After we set the coordinates, we created an `MKCoordinateSpan` to\
    \ set the delta of the latitude and longitude in the display. Finally, we used\
    \ the new coordinates and the span we created to set up our `MKCoordinateRegion`.\n\
    \nWe used the `MKMapView`'s `setRegion` method in this example to set up the defaults\
    \ for our map. There are a few other options we could have added here for additional\
    \ customization. You can set the `mapType` property, which we'll look at next,\
    \ and also use the `zoomEnabled` and `scrollEnabled` methods to dictate whether\
    \ the user can zoom and scroll the map.\n\nFor experimentation, comment out the\
    \ code in bold and rerun the application. Your Xcode console will quickly fill\
    \ up with warning messages about having no thread pool in place and that your\
    \ application is `Just Leaking`. Because we have this method running on a new\
    \ thread, we are required to set up a new `NSAutoReleasePool` to handle memory\
    \ management on our new thread.\n\n![Image](images/0313.jpg)\n\n**Figure 3–13.**\
    \ *The simulator displays Apple HQ on a map (leaking or not, it looks the same).*\n\
    \nThe `NSAutoreleasePool` class is used to support the reference-counted memory\
    \ system. The iOS templates (we are using the tab view template) create an autorelease\
    \ pool in the `main.m` file under the `Supporting Files` directory. These autorelease\
    \ pools contain objects that have received an autorelease message. When you drain\
    \ the pool, as we did in our last line of the new `viewDidLoad`, the `NSAutoReleasePool`\
    \ sends a release message to each of these objects. Because we're not on that\
    \ main thread any longer, any autoreleased objects would not get their release\
    \ message if we didn't create this pool. Hence, we'd be leaking memory potentially,\
    \ which results in the warning messages in the console."
  raw: '### Viewing on the Map


    We''ve explored the different methods of gathering the user''s location. Let''s
    take a look at how to render those on a map. In augmented-reality applications,
    using the map isn''t typically required. However, it adds good debugging and visualization
    to testing of coordinates and locations we are using for our AR applications.
    We''ll cover it in this chapter, so you''ll have it available in your toolbox.


    Let''s start by setting up the `SecondViewController` class in our demo project.
    This is the second tab in the tab view template. If you''ve followed the chapter
    so far, it should still be unused. Open `SecondViewController.h` and make sure
    to declare the `IBOutlet` for the `MKMapView`, as shownin [Listing 3–21](#Chapter03.html#list_3_21).


    **Listing 3–21.** *Declare the MKMapViewIBOutlet*


    `#import <UIKit/UIKit.h>`

    **`#import <MapKit/MapKit.h>`**


    `@interface SecondViewController : UIViewController <`**`MKMapViewDelegate`**`>{`

    **`    IBOutlet MKMapView *mapView;`**

    `}`


    **`@property (nonatomic, retain) IBOutlet MKMapView *mapView;`**

    `@end`


    The code shown in bold in [Listing 3–21](#Chapter03.html#list_3_21) is what we
    added to the default template class. First, we import the `Mapkit.h` header file.
    We also nominate our class to be an `MKMapViewDelegate`. This will allow this
    class to handle the messages and updates from the `MKMapView`.


    Next, open `SecondViewController.m` and `synthesize` your new property. Also,
    don''t forget to release it when you''re finished with it. Add the code from [Listing
    3–22](#Chapter03.html#list_3_22) to `SecondViewController.m`.


    **Listing 3–22.** *Synthesize and Release mapView*


    **`@synthesize mapView;`**


    `- (void)dealloc`

    `{`

    **`[mapView release];`**

    **`    mapView = nil;`**

    `    [super dealloc];`

    `}`


    Open `SecondView.xib` in Xcode and remove the `UITextView` and `UITextLabel` that
    were there by default. Drag the **Map View** from the `Object Library` over the
    view and pause to let it autoscale to fill the space available. Next, press Ctrl
    and click and drag a line from the cube (File''s Owner icon) on the left-hand
    side of the editor to the new `MKMapView`. You should see a context menu similar
    to that shown in [Figure 3–12](#Chapter03.html#fig_3_12). Select our **mapView**
    property in the menu.


    ![Image](images/0312.jpg)


    **Figure 3–12.** *Configure our MKMapView.*


    #### Centering the Map and Setting the Displayed Region


    Returning to `SecondView.m`, we are going to start by uncommenting the `viewDidLoad:`
    method and adding the code from [Listing 3–23](#Chapter03.html#list_3_23).


    **Listing 3–23.** *Start a New Thread for Setting Up the Map*


    `- (void)viewDidLoad`

    `{`

    **`    mapView.delegate=self;`**

    **`    [self.view addSubview:mapView];`**


    **`    [NSThread detachNewThreadSelector:@selector(displayMap) toTarget:self withObject:nil];`**

    `    [super viewDidLoad];`

    `}`


    First, we set the `delegate` of the `MKMapView` to `self`. Recall that we already
    nominated this class as an `MKMapViewDelegate`. Finally, instead of just loading
    up the map right here in the `viewDidLoad:` method, we detached a new thread for
    the setup. This is overkill for this sample, but it''s a good introduction to
    threading, which we''ll need later for the AR sample applications. Our thread
    calls a method, `displayMap`, which we have not yet created. Add the code from
    [Listing 3–24](#Chapter03.html#list_3_24) under the `viewDidLoad:` method to create
    this method.


    **Listing 3–24.** *Create NewdisplayMap Method*


    `- (void)displayMap {`

    **`    NSAutoreleasePool *pool = [[NSAutoreleasePool alloc] init];`**


    `    CLLocationCoordinate2D coords;`

    `    coords.latitude = 37.33188;`

    `    coords.longitude = -122.029497;`

    `    MKCoordinateSpan span = MKCoordinateSpanMake(0.002389, 0.005681);`

    `    MKCoordinateRegion region = MKCoordinateRegionMake(coords, span);`

    `    [mapView setRegion:region animated:YES];`


    **`    [pool drain];`**

    `}`


    There are a few things to discuss in this method. First, let''s run it and see
    what happens. [Figure 3–13](#Chapter03.html#fig_3_13)illustrates this application
    running in the iPhone simulator. Ignore the preceding code in bold for now, as
    we''ll get back to that later. We started by manually creating a `CLLocationCoordinate2D`
    and setting the latitude and longitude to Apple''s HQ. After we set the coordinates,
    we created an `MKCoordinateSpan` to set the delta of the latitude and longitude
    in the display. Finally, we used the new coordinates and the span we created to
    set up our `MKCoordinateRegion`.


    We used the `MKMapView`''s `setRegion` method in this example to set up the defaults
    for our map. There are a few other options we could have added here for additional
    customization. You can set the `mapType` property, which we''ll look at next,
    and also use the `zoomEnabled` and `scrollEnabled` methods to dictate whether
    the user can zoom and scroll the map.


    For experimentation, comment out the code in bold and rerun the application. Your
    Xcode console will quickly fill up with warning messages about having no thread
    pool in place and that your application is `Just Leaking`. Because we have this
    method running on a new thread, we are required to set up a new `NSAutoReleasePool`
    to handle memory management on our new thread.


    ![Image](images/0313.jpg)


    **Figure 3–13.** *The simulatordisplays Apple HQ on a map (leaking or not, it
    looks the same).*


    The `NSAutoreleasePool` class is used to support the reference-counted memory
    system. The iOS templates (we are using the tab view template) create an autorelease
    pool in the `main.m` file under the `Supporting Files` directory. These autorelease
    pools contain objects that have received an autorelease message. When you drain
    the pool, as we did in our last line of the new `viewDidLoad`, the `NSAutoReleasePool`
    sends a release message to each of these objects. Because we''re not on that main
    thread any longer, any autoreleased objects would not get their release message
    if we didn''t create this pool. Hence, we''d be leaking memory potentially, which
    results in the warning messages in the console.'
  trans: "\n# 在地图上查看\n\n我们已经探索了获取用户位置的不同方法。接下来看看如何将这些位置渲染到地图上。在增强现实应用中，通常不需要使用地图。但它能为我们在\
    \ AR 应用中所使用的坐标和位置测试提供良好的调试与可视化支持。本章将讲解这部分内容，以便你将其纳入技术工具箱。\n\n首先在演示项目中设置`SecondViewController`类。这是标签视图模板中的第二个标签页。如果你已跟随本章内容进行操作，这个类应该尚未使用。打开`SecondViewController.h`文件，确保为`MKMapView`声明`IBOutlet`，如代码清单\
    \ 3-21 所示。\n\n**代码清单 3-21.** *声明 MKMapViewIBOutlet*\n\n```\n#import <UIKit/UIKit.h>\n\
    #import <MapKit/MapKit.h>\n\n@interface SecondViewController : UIViewController\
    \ <MKMapViewDelegate>{\n    IBOutlet MKMapView *mapView;\n}\n\n@property (nonatomic,\
    \ retain) IBOutlet MKMapView *mapView;\n@end\n```\n\n代码清单 3-21 中加粗显示的代码是我们对默认模板类所做的修改。首先导入`Mapkit.h`头文件，同时将类声明为`MKMapViewDelegate`委托，这样该类就能处理来自`MKMapView`的消息和更新。\n\
    \n接下来打开`SecondViewController.m`文件，合成新的属性。另外，使用完毕后不要忘记释放它。将代码清单 3-22 中的代码添加到`SecondViewController.m`中。\n\
    \n**代码清单 3-22.** *合成与释放 mapView*\n\n```\n@synthesize mapView;\n\n- (void)dealloc\n\
    {\n    [mapView release];\n    mapView = nil;\n    [super dealloc];\n}\n```\n\n\
    在 Xcode 中打开`SecondView.xib`，移除默认存在的`UITextView`和`UITextLabel`。从**对象库**中将**Map\
    \ View**拖拽到视图上，稍等片刻让其自动缩放以填满可用空间。接着按住 Ctrl 键，从编辑器左侧的立方体（文件所有者图标）点击并拖拽出一条线连接到新的`MKMapView`上。此时应出现类似图\
    \ 3-12 所示的上下文菜单。在菜单中选择`mapView`属性。\n\n![图片](img/0312.jpg)\n\n**图 3-12.** *配置我们的\
    \ MKMapView。*\n\n## 居中地图与设置显示区域\n\n回到`SecondView.m`文件，首先取消`viewDidLoad:`方法的注释，并添加代码清单\
    \ 3-23 中的代码。\n\n**代码清单 3-23.** *启动新线程设置地图*\n\n```\n- (void)viewDidLoad\n{\n  \
    \  mapView.delegate=self;\n    [self.view addSubview:mapView];\n\n    [NSThread\
    \ detachNewThreadSelector:@selector(displayMap) toTarget:self withObject:nil];\n\
    \    [super viewDidLoad];\n}\n```\n\n首先将`MKMapView`的`delegate`设置为`self`。回想一下，我们此前已将此类声明为`MKMapViewDelegate`。最后，我们并没有直接在`viewDidLoad:`方法中加载地图，而是分离了一个新线程用于设置。虽然这个示例中使用这种方式有些大材小用，但这是了解多线程的好方法，后续在\
    \ AR 示例应用中会用到。该线程调用了一个尚未创建的`displayMap`方法。在`viewDidLoad:`方法下方添加代码清单 3-24 中的代码来创建此方法。\n\
    \n**代码清单 3-24.** *创建新的 displayMap 方法*\n\n```\n- (void)displayMap {\n    NSAutoreleasePool\
    \ *pool = [[NSAutoreleasePool alloc] init];\n\n    CLLocationCoordinate2D coords;\n\
    \    coords.latitude = 37.33188;\n    coords.longitude = -122.029497;\n    MKCoordinateSpan\
    \ span = MKCoordinateSpanMake(0.002389, 0.005681);\n    MKCoordinateRegion region\
    \ = MKCoordinateRegionMake(coords, span);\n    [mapView setRegion:region animated:YES];\n\
    \n    [pool drain];\n}\n```\n\n这个方法中有几个要点需要讨论。首先运行一下看看效果。图 3-13 展示了该应用在 iPhone\
    \ 模拟器中的运行情况。暂时忽略上面加粗的代码，稍后会再提及。我们手动创建了一个`CLLocationCoordinate2D`结构体，并将经纬度设置为苹果总部的位置。设置好坐标后，创建了一个`MKCoordinateSpan`结构体来设定显示区域中经纬度的跨度。最后，使用新的坐标和创建的跨度设置`MKCoordinateRegion`。\n\
    \n在此示例中，我们使用`MKMapView`的`setRegion`方法来设置地图的默认显示区域。还可以添加其他选项进行更多自定义设置。例如设置`mapType`属性（稍后会介绍），以及使用`zoomEnabled`和`scrollEnabled`方法控制用户能否缩放和滚动地图。\n\
    \n为了实验效果，注释掉加粗的代码并重新运行应用。Xcode 控制台会迅速被警告信息填满，提示没有线程池以及应用`Just Leaking`。由于此方法运行在新线程上，我们需要设置一个新的`NSAutoReleasePool`来处理新线程的内存管理。\n\
    \n![图片](img/0313.jpg)\n\n**图 3-13.** *模拟器在地图上显示苹果总部（无论是否泄漏，显示效果相同）。*\n\n`NSAutoreleasePool`类用于支持引用计数的内存管理系统。iOS\
    \ 模板（我们使用的是标签视图模板）在`Supporting Files`目录下的`main.m`文件中创建了一个自动释放池。这些自动释放池包含已收到 autorelease\
    \ 消息的对象。当释放池时（就像我们在新`viewDidLoad`方法的最后一行所做的那样），`NSAutoReleasePool`会向每个对象发送 release\
    \ 消息。由于我们不再处于主线程，如果不创建这个池，任何自动释放的对象都不会收到 release 消息，从而可能导致内存泄漏，并在控制台中产生警告信息。\n"
- fmt: "#### Changing the Map Type\n\nI mentioned in the last section, that the `mapType`\
    \ property was available to change the type of map we are displaying. Return to\
    \ `SecondViewController.h` and declare a new `IBOutlet`, as shown in [Listing\
    \ 3–25](#Chapter03.html#list_3_25).\n\n**Listing 3–25.** *Declare the UISegmentedControl*\n\
    \n```\n@interface SecondViewController : UIViewController <MKMapViewDelegate>{\n\
    \    IBOutlet MKMapView *mapView;\n    UISegmentedControl *buttonBarSegmentedControl;\n\
    }\n\n@property (nonatomic, retain) IBOutlet MKMapView *mapView;\n@property (nonatomic,\
    \ retain) IBOutlet UISegmentedControl *buttonBarSegmentedControl;\n```\n\nInstead\
    \ of adding this to the XIB file manually, let's create it on the fly. We'll be\
    \ doing similar things in our augmented-reality application to overlay controls\
    \ to the user's view. Add the method from [Listing 3–26](#Chapter03.html#list_3_26)\
    \ under the `displayMap` that we created earlier.\n\n**Listing 3–26.** *Create\
    \ the UISegmentedControl to Change Map Type*\n\n```\n- (void)setupSegmentedControl\
    \ {\n    buttonBarSegmentedControl = [[UISegmentedControl alloc] initWithItems:[NSArray\
    \ arrayWithObjects:@\"Standard\", @\"Satellite\", @\"Hybrid\", nil]];\n\n    [buttonBarSegmentedControl\
    \ setFrame:CGRectMake(30, 50, 280-30, 30)];\n    buttonBarSegmentedControl.selectedSegmentIndex\
    \ = 0.0;        // start by showing the normal picker\n\n    [buttonBarSegmentedControl\
    \ addTarget:self action:@selector(toggleToolBarChange:)\n                    \
    \    forControlEvents:UIControlEventValueChanged];\n\n    buttonBarSegmentedControl.segmentedControlStyle\
    \ = UIScrollViewIndicatorStyleWhite;\n    buttonBarSegmentedControl.backgroundColor\
    \ = [UIColor clearColor];\n    buttonBarSegmentedControl.tintColor = [UIColor\
    \ blackColor];\n    [buttonBarSegmentedControl setAlpha:0.8];\n\n    [self.view\
    \ addSubview:buttonBarSegmentedControl];\n}\n```\n\nThis method needs to be declared\
    \ in the header file as well. Make sure you do that before you run the application.\n\
    \nThis method starts by initializing the `UISegmentedControl` with items from\
    \ a new array. We are using three strings for our menu options: `Standard`, `Satellite`,\
    \ and `Hybrid`. These correspond to the different options for the `MKMapView.mapType`\
    \ property.\n\nNext, we call the `CGRectMake` method to set up the area in our\
    \ view for the segmented control. Segmented controls work similarly to buttons\
    \ in iOS. We need to be able to add a target and respond to the events raised\
    \ appropriately. The code in bold in [Listing 3–27](#Chapter03.html#list_3_27)\
    \ sets the target to `self` and the `action` to a new method called `toggleToolBarChange`.\
    \ We'll create this method next. Finally, in the `setupSegmentedControl` method,\
    \ we set up some basic preferences for the control. We set the style, background\
    \ color, and tint for the control. This is all optional, obviously, but I wanted\
    \ to demonstrate some options that might match the default styling of the tab\
    \ bar template that we've been using in this chapter. If we didn't set these options,\
    \ the control would appear blue by default.\n\nI mentioned that our action was\
    \ set to a new method called `toggleToolBarChange`. The code for this method is\
    \ in [Listing 3–27](#Chapter03.html#list_3_27). Add this to the class.\n\n**Listing\
    \ 3–27.** *Handle the Action of the UISegmentedControl*\n\n```\n- (void)toggleToolBarChange:(id)sender\n\
    {\n    UISegmentedControl *segControl = sender;\n\n    switch (segControl.selectedSegmentIndex)\n\
    \    {\n        case 0:        // Map\n        {\n            [mapView setMapType:MKMapTypeStandard];\n\
    \            break;\n        }\n        case 1: // Satellite\n        {\n    \
    \        [mapView setMapType:MKMapTypeSatellite];\n            break;\n      \
    \  }\n        case 2: // Hybrid\n        {\n            [mapView setMapType:MKMapTypeHybrid];\n\
    \            break;\n        }\n    }\n}\n```\n\nThe final step before we can\
    \ test this new control is to call the `setupSegmentedControl` method from the\
    \ `viewDidLoad` method. Right after you detached the new thread to set up the\
    \ map, add the code from [Listing 3–28](#Chapter03.html#list_3_28).\n\n**Listing\
    \ 3–28.** *Call setupSegmentedControl*\n\n```\n[self setupSegmentedControl];\n\
    ```\n\nYou're now ready to test out the new functionality. Run the code we've\
    \ put together in the iPhone simulator. Switch to the second tab and experiment\
    \ with the segmented control buttons. [Figure 3–14](#Chapter03.html#fig_3_14)\
    \ shows the simulator running the map with the satellite map type selected.\n\n\
    ![Image](images/0314.jpg)\n\n**Figure 3–14.** *The satellite map type is selected.*\n\
    \nSo, we've added a map to the view, we've learned how to center it based on static\
    \ location coordinates, and we dynamically added a `UISegmentedControl` to the\
    \ view to switch map types on the fly.\n\nNext, let's take a look at adding annotations\
    \ to the map. Annotations provide a way to mark specific locations. In much the\
    \ same way that they work on Google Maps or Bing, you can add pop-up displays\
    \ to show the user more contextual information. The icons themselves can be customized,\
    \ as well as the actions to which they respond."
  raw: '#### Changing the Map Type


    I mentioned in the last section, that the `mapType` property was available to
    change the type of map we are displaying. Return to `SecondViewController.h` and
    declare a new `IBOutlet`, as shown in [Listing 3–25](#Chapter03.html#list_3_25).


    **Listing 3–25.** *Declare the UISegmentedControl*


    `@interface SecondViewController : UIViewController <MKMapViewDelegate>{`

    **`    IBOutlet MKMapView *mapView;`**

    **`    UISegmentedControl *buttonBarSegmentedControl;`**

    `}`


    `@property (nonatomic, retain) IBOutlet MKMapView *mapView;`

    **`@property (nonatomic, retain) IBOutlet UISegmentedControl *buttonBarSegmentedControl;`**


    Instead of adding this to the XIB file manually, let''s create it on the fly.
    We''ll be doing similar things in our augmented-reality application to overlay
    controls to the user''s view. Add the method from [Listing 3–26](#Chapter03.html#list_3_26)
    under the `displayMap` that we created earlier.


    **Listing 3–26.** *Create the UISegmentedControlto Change Map Type*


    `- (void)setupSegmentedControl {`

    `    buttonBarSegmentedControl = [[UISegmentedControl alloc] initWithItems:[NSArray
    arrayWithObjects:@"Standard", @"Satellite", @"Hybrid", nil]];`


    `    [buttonBarSegmentedControl setFrame:CGRectMake(30, 50, 280-30, 30)];`

    `    buttonBarSegmentedControl.selectedSegmentIndex = 0.0;        // start by
    showing the normal picker`


    **`[buttonBarSegmentedControl addTarget:self action:@selector(toggleToolBarChange:)`**

    `forControlEvents:UIControlEventValueChanged];`


    `    buttonBarSegmentedControl.segmentedControlStyle = UIScrollViewIndicatorStyleWhite;`

    `    buttonBarSegmentedControl.backgroundColor = [UIColor clearColor];`

    `    buttonBarSegmentedControl.tintColor = [UIColor blackColor];`

    `    [buttonBarSegmentedControl setAlpha:0.8];`


    `    [self.view addSubview:buttonBarSegmentedControl];`

    `}`


    This method needs to be declared in the header file as well. Make sure you do
    that before you run the application.


    This method starts by initializing the `UISegmentedControl` with items from a
    new array. We are using three strings for our menu options: `Standard`, `Satellite`,
    and `Hybrid`. These correspond to the different options for the `MKMapView.mapType`
    property.


    Next, we call the `CGRectMake` method to set up the area in our view for the segmented
    control. Segmented controls work similarly to buttons in iOS. We need to be able
    to add a target and respond to the events raised appropriately. The code in bold
    in [Listing 3–27](#Chapter03.html#list_3_27) sets the target to `self` and the
    `action` to a new method called `toggleToolBarChange`. We''ll create this method
    next. Finally, in the `setupSegmentedControl` method, we set up some basic preferences
    for the control. We set the style, background color, and tint for the control.
    This is all optional, obviously, but I wanted to demonstrate some options that
    might match the default styling of the tab bar template that we''ve been using
    in this chapter. If we didn''t set these options, the control would appear blue
    by default.


    I mentioned that our action was set to a new method called `toggleToolBarChange`.
    The code for this method is in [Listing 3–27](#Chapter03.html#list_3_27). Add
    this to the class.


    **Listing 3–27.** *Handle the Action of the UISegmentedControl*


    `- (void)toggleToolBarChange:(id)sender`

    `{`

    `        UISegmentedControl *segControl = sender;`


    `        switch (segControl.selectedSegmentIndex)`

    `        {`

    `                case 0:        // Map`

    `                {`

    `[mapView setMapType:` **`MKMapTypeStandard`**`];`

    `                              break;`

    `                }`

    `                case 1: // Satellite`

    `                {`

    `[mapView setMapType:` **`MKMapTypeSatellite`**`];`

    **`                        break;`**

    `                }`

    `                case 2: // Hybrid`

    `                {`

    `[mapView setMapType:` **`MKMapTypeHybrid`**`];`

    `                        break;`

    `                }`

    `        }`

    `}`


    The final step before we can test this new control is to call the `setupSegmentedControl`
    method from the `viewDidLoad` method. Right after you detached the new thread
    to set up the map, add the code from [Listing 3–28](#Chapter03.html#list_3_28).


    **Listing 3–28.** *Call setupSegmentedControl*


    `[self setupSegmentedControl];`


    You''re now ready to test out the new functionality. Run the code we''ve put together
    in the iPhone simulator. Switch to the second tab and experiment with the segmented
    control buttons. [Figure 3–14](#Chapter03.html#fig_3_14) shows the simulator running
    the map with the satellite map type selected.


    ![Image](images/0314.jpg)


    **Figure 3–14.** *The satellite map type is selected.*


    So, we''ve added a map to the view, we''ve learned how to center it based on static
    location coordinates, and we dynamically added a `UISegmentedControl` to the view
    to switch map types on the fly.


    Next, let''s take a look at adding annotations to the map. Annotations provide
    a way to mark specific locations. In much the same way that they work on Google
    Maps or Bing, you can add pop-up displays to show the user more contextual information.
    The icons themselves can be customized, as well as the actions to which they respond.'
  trans: "\n#### 更改地图类型\n\n上一节中提到，可以使用 `mapType` 属性来更改我们正在显示的地图类型。返回 `SecondViewController.h`\
    \ 并声明一个新的 `IBOutlet`，如代码清单 3-25 所示。\n\n**代码清单 3–25.** *声明 UISegmentedControl*\n\
    \n```\n@interface SecondViewController : UIViewController <MKMapViewDelegate>{\n\
    \    IBOutlet MKMapView *mapView;\n    UISegmentedControl *buttonBarSegmentedControl;\n\
    }\n\n@property (nonatomic, retain) IBOutlet MKMapView *mapView;\n@property (nonatomic,\
    \ retain) IBOutlet UISegmentedControl *buttonBarSegmentedControl;\n```\n\n我们不必手动将其添加到\
    \ XIB 文件中，而是动态创建它。在增强现实应用中，我们也会做类似的事情，以便在用户视图上叠加控件。将代码清单 3-26 中的方法添加到我们之前创建的 `displayMap`\
    \ 方法下方。\n\n**代码清单 3–26.** *创建用于更改地图类型的 UISegmentedControl*\n\n```\n- (void)setupSegmentedControl\
    \ {\n    buttonBarSegmentedControl = [[UISegmentedControl alloc] initWithItems:[NSArray\
    \ arrayWithObjects:@\"Standard\", @\"Satellite\", @\"Hybrid\", nil]];\n\n    [buttonBarSegmentedControl\
    \ setFrame:CGRectMake(30, 50, 280-30, 30)];\n    buttonBarSegmentedControl.selectedSegmentIndex\
    \ = 0.0;        // 初始显示普通选择器\n\n    [buttonBarSegmentedControl addTarget:self\
    \ action:@selector(toggleToolBarChange:)\n                        forControlEvents:UIControlEventValueChanged];\n\
    \n    buttonBarSegmentedControl.segmentedControlStyle = UIScrollViewIndicatorStyleWhite;\n\
    \    buttonBarSegmentedControl.backgroundColor = [UIColor clearColor];\n    buttonBarSegmentedControl.tintColor\
    \ = [UIColor blackColor];\n    [buttonBarSegmentedControl setAlpha:0.8];\n\n \
    \   [self.view addSubview:buttonBarSegmentedControl];\n}\n```\n\n此方法也需要在头文件中声明。确保在运行应用程序之前完成此操作。\n\
    \n此方法首先使用一个包含新项目的数组来初始化 `UISegmentedControl`。我们为菜单选项使用了三个字符串：`Standard`、`Satellite`\
    \ 和 `Hybrid`。它们分别对应 `MKMapView.mapType` 属性的不同选项。\n\n接下来，我们调用 `CGRectMake` 方法来为分段控件在视图中设置区域。分段控件在\
    \ iOS 中的工作原理与按钮类似。我们需要能够添加一个目标并正确响应所引发的事件。代码清单 3-27 中加粗的代码将目标设置为 `self`，并将 `action`\
    \ 设置为一个名为 `toggleToolBarChange` 的新方法。我们接下来将创建这个方法。最后，在 `setupSegmentedControl`\
    \ 方法中，我们为控件设置了一些基本偏好设置，包括风格、背景颜色和色调。这些显然都是可选的，但我想演示一些可能与本章一直在使用的标签栏模板默认样式相匹配的选项。如果我们不设置这些选项，控件默认会显示为蓝色。\n\
    \n我提到过，我们的操作被设置为一个名为 `toggleToolBarChange` 的新方法。该方法的代码在代码清单 3-27 中。将其添加到类中。\n\n\
    **代码清单 3–27.** *处理 UISegmentedControl 的动作*\n\n```\n- (void)toggleToolBarChange:(id)sender\n\
    {\n    UISegmentedControl *segControl = sender;\n\n    switch (segControl.selectedSegmentIndex)\n\
    \    {\n        case 0:        // 地图模式 (Map)\n        {\n            [mapView\
    \ setMapType:MKMapTypeStandard];\n            break;\n        }\n        case\
    \ 1: // 卫星模式 (Satellite)\n        {\n            [mapView setMapType:MKMapTypeSatellite];\n\
    \            break;\n        }\n        case 2: // 混合模式 (Hybrid)\n        {\n\
    \            [mapView setMapType:MKMapTypeHybrid];\n            break;\n     \
    \   }\n    }\n}\n```\n\n在测试这个新控件之前的最后一步，是在 `viewDidLoad` 方法中调用 `setupSegmentedControl`\
    \ 方法。在您分离新线程来设置地图之后，立即添加代码清单 3-28 中的代码。\n\n**代码清单 3–28.** *调用 setupSegmentedControl*\n\
    \n```\n[self setupSegmentedControl];\n```\n\n现在，您已准备好测试新功能。在 iPhone 模拟器中运行我们组合好的代码。切换到第二个标签页，并尝试操作分段控件按钮。图\
    \ 3-14 显示了模拟器运行地图并选择卫星地图类型时的画面。\n\n![Image](img/0314.jpg)\n\n**图 3-14.** *选择了卫星地图类型。*\n\
    \n至此，我们已向视图添加了地图，学会了如何根据静态位置坐标居中显示地图，并且动态地向视图中添加了一个 `UISegmentedControl` 来即时切换地图类型。\n\
    \n接下来，让我们看看如何向地图添加标注。标注提供了一种标记特定位置的方法。与它们在谷歌地图或必应地图上的工作方式大致相同，您可以添加弹出式显示来向用户展示更多上下文信息。图标本身以及它们响应的操作都可以进行自定义。\n"
- fmt: "### Adding Annotations to the Map\n\nTo set up an annotation, we are going\
    \ to use a new class that will hold the customization properties of the annotation.\
    \ Right-click somewhere in your `Project Navigator` and select `New File` from\
    \ the context menu. Under the `Cocoa Touch` category, select the `Objective-C\
    \ class` template. Leave the class as a subclass of `NSObject` and name the new\
    \ class `MapAnnotation`. Annotations on maps have a few main characteristics:\
    \ title, subtitle, and coordinate. We're going to add the properties for these\
    \ characteristics to our new class and provide some methods to set them from our\
    \ map class. First, add the declarations from [Listing 3–29](#Chapter03.html#list_3_29)\
    \ to `MapAnnotation.h`.\n\n**Listing 3–29.** *MapAnnotation.h Changes*\n\n```\n\
    #import <Foundation/Foundation.h>\n#import <MapKit/MapKit.h>\n\n@interface MapAnnotation\
    \ : NSObject<MKAnnotation> {\n    CLLocationCoordinate2D coordinate;\n    NSString\
    \ *subtitletext;\n    NSString *titletext;\n}\n@property (nonatomic, readonly)\
    \ CLLocationCoordinate2D coordinate;\n@property (readwrite, retain) NSString *titletext;\n\
    @property (readwrite, retain) NSString *subtitletext;\n-(id)initWithCoordinate:(CLLocationCoordinate2D)\
    \ coordinate;\n- (NSString *)subtitle;\n- (NSString *)title;\n-(void)setTitle:(NSString*)strTitle;\n\
    -(void)setSubTitle:(NSString*)strSubTitle;\n\n@end\n```\n\nAgain, we start by\
    \ importing `MapKit.h`. We declare the properties for our initial coordinate location\
    \ (where the annotation will be placed) and the title and subtitle of the annotation.\
    \ We also add a few methods to the class: an initialization method for our coordinate,\
    \ as well as a set of getters and setters for our title and subtitle.\n\nSwitch\
    \ to `MapAnnotation.m` and add the corresponding properties and method implementations\
    \ from [Listing 3–30](#Chapter03.html#list_3_30).\n\n**Listing 3–30.** *MapAnnotation.m\
    \ Changes*\n\n```\n@implementation MapAnnotation\n@synthesize coordinate, titletext,\
    \ subtitletext;\n\n- (NSString *)subtitle{\n        return subtitletext;\n}\n\
    - (NSString *)title{\n        return titletext;\n}\n\n-(void)setTitle:(NSString*)strTitle\
    \ {\n        self.titletext = strTitle;\n}\n\n-(void)setSubTitle:(NSString*)strSubTitle\
    \ {\n        self.subtitletext = strSubTitle;\n}\n\n-(id)initWithCoordinate:(CLLocationCoordinate2D)\
    \ c{\n        coordinate=c;\n        return self;\n}\n@end\n```\n\nThis class\
    \ is not all that exciting. It's basic refactoring to act as a placeholder for\
    \ the properties of the annotation. In `SecondViewController.h`, add an `import`\
    \ statement for the `MapAnnotation.h` header. Then, open `SecondViewController.m`\
    \ and add the following code from [Listing 3–31](#Chapter03.html#list_3_31), just\
    \ above where the `setRegion` method is called from within the `displayMap` method.\
    \ Take note of the three methods from our `MapAnnotation` class and how they are\
    \ being called.\n\n**Listing 3–31.** *Create the Annotation in the displayMap\
    \ Method*\n\n```\nMapAnnotation *addAnnotation = [[[MapAnnotation alloc] initWithCoordinate:coords]\
    \ retain];\n[addAnnotation setTitle:@\"My Annotation Title\"];\n[addAnnotation\
    \ setSubTitle:@\"this is my subtitle property\"];\n[mapView addAnnotation:addAnnotation];\n\
    ```\n\nFirst, when we create our `MapAnnotation` object, we call the `initWithCoordinate`\
    \ method to set the default location of the annotation. The next two lines call\
    \ the getters for our properties for title and subtitle. Finally, we add the annotation\
    \ to the `MKMapView`.\n\nGo ahead and run this in the simulator. Switch to the\
    \ second tab and you'll see the map view and a red annotation on Apple HQ (the\
    \ same coordinates we centered the map on earlier). If you click the annotation,\
    \ you'll see something similar to [Figure 3–15](#Chapter03.html#fig_3_15).\n\n\
    ![Image](images/0315.jpg)\n\n**Figure 3–15.** *The default annotation shows the\
    \ populated title and subtitle.*\n\nYou'll see that both the title and the subtitle\
    \ have been populated and the annotation is showing in the correct coordinates.\
    \ There are plenty of options available to customize our annotation. For example,\
    \ what about animating our annotation and changing its color? To customize the\
    \ appearance of the annotation, we would use another delegate method called `viewForAnnotation`.\
    \ This method is called when an annotation is created and gives you the opportunity\
    \ to customize that particular view with a reusable object reference. Add the\
    \ method from [Listing 3–32](#Chapter03.html#list_3_32) to the class to handle\
    \ the delegate method.\n\n**Listing 3–32.** *Handle the viewForAnnotation Delegate\
    \ Method*\n\n```\n- (MKAnnotationView *) mapView:(MKMapView *)mapView viewForAnnotation:(id\
    \ <MKAnnotation>) annotation{\n    MKPinAnnotationView *annView=[[MKPinAnnotationView\
    \ alloc] initWithAnnotation:annotation reuseIdentifier:@\"MyPin\"];\n    annView.animatesDrop=TRUE;\n\
    \    annView.canShowCallout = YES;\n    [annView setSelected:YES];\n    annView.pinColor\
    \ = MKPinAnnotationColorPurple;\n    annView.calloutOffset = CGPointMake(-50,\
    \ 5);\n    return annView;\n}\n```\n\nWe made a few changes to the annotation.\
    \ If you run it in the simulator now, you'll see something similar to [Figure\
    \ 3–16](#Chapter03.html#fig_3_16).\n\n![Image](images/0316.jpg)\n\n**Figure 3–16.**\
    \ *The simulator now shows the customized annotation.*\n\nThe first change you'll\
    \ notice when the simulator changes to the second tab is that the annotation is\
    \ now animated. It drops in place in a nice friendly motion. We did this using\
    \ the `animatesDrop` property. It's also purple now. We set the color of the annotation\
    \ with the `pinColor` property. Finally, you'll notice the dialog is off-center.\
    \ We set an offset using the `calloutOffset` property. This is useful when you\
    \ are using custom annotation images that aren't as balanced as the default pins.\n\
    \nNext, let's take a quick look at how to get more information about specific\
    \ coordinates."
  raw: '#### Adding Annotations to the Map


    To set up an annotation, we are going to use a new class that will hold the customization
    properties of the annotation. Right-click somewhere in your `Project Navigator`
    and select `New File` from the context menu. Under the `Cocoa Touch` category,
    select the `Objective-C class` template. Leave the class as a subclass of `NSObject`
    and name the new class `MapAnnotation`. Annotations on maps have a few main characteristics.
    They are title, subtitle, and coordinate. We''re going to add the properties for
    these characteristics to our new class and provide some methods to set them from
    our map class. First, add the declarations from [Listing 3–29](#Chapter03.html#list_3_29)
    to `MapAnnotation.h`.


    **Listing 3–29.** *MapAnnotation.h Changes*


    `#import <Foundation/Foundation.h>`

    **`#import <MapKit/MapKit.h>`**


    `@interface MapAnnotation : NSObject<` **`MKAnnotation`**`> {`

    **`    CLLocationCoordinate2D coordinate;`**

    **`    NSString *subtitletext;`**

    **`    NSString *titletext;  `**

    `}`

    **`@property (nonatomic, readonly) CLLocationCoordinate2D coordinate;`**

    **`@property (readwrite, retain) NSString *titletext;`**

    **`@property (readwrite, retain) NSString *subtitletext;`**

    **`-(id)initWithCoordinate:(CLLocationCoordinate2D) coordinate;`**

    **`- (NSString *)subtitle;`**

    **`- (NSString *)title;`**

    **`-(void)setTitle:(NSString*)strTitle;`**

    **`-(void)setSubTitle:(NSString*)strSubTitle;`**


    `@end`


    Again, we start by importing `MapKit.h`. We declare the properties for our initial
    coordinate location (where the annotation will be placed) and the title and subtitle
    of the annotation. We also add a few methods to the class. We have an initialization
    method for our coordinate, as well as a set of getters and setters for our title
    and subtitle.


    Switch to `MapAnnotation.m` and add the corresponding properties and method implementations
    from [Listing 3–30](#Chapter03.html#list_3_30).


    **Listing 3–30.** *MapAnnotation.m Changes*


    `@implementation MapAnnotation`

    `@synthesize coordinate, titletext, subtitletext;`


    `- (NSString *)subtitle{`

    `        return subtitletext;`

    `}`

    `- (NSString *)title{`

    `        return titletext;`

    `}`


    `-(void)setTitle:(NSString*)strTitle {`

    `        self.titletext = strTitle;`

    `}`


    `-(void)setSubTitle:(NSString*)strSubTitle {`

    `        self.subtitletext = strSubTitle;`

    `}`


    `-(id)initWithCoordinate:(CLLocationCoordinate2D) c{`

    `        coordinate=c;`

    `        return self;`

    `}`

    `@end`


    This class is not all that exciting. It''s basic refactoring to act as a placeholder
    for the properties of the annotation. In `SecondViewController.h` add an `import`
    statement for the `MapAnnotation.h`header. Then, open `SecondViewController.m`
    and add the following code from [Listing 3–31](#Chapter03.html#list_3_31), just
    above where the `setRegion` method is called from within the `displayMap` method.
    Take note of the three methods from our `MapAnnotation` class and how they are
    being called.


    **Listing 3–31.** *Create the Annotation in the displayMap Method*


    `MapAnnotation *addAnnotation = [[[MapAnnotation alloc] initWithCoordinate:coords]
    retain];`

    `[addAnnotation setTitle:@"My Annotation Title"];`

    `[addAnnotation setSubTitle:@"this is my subtitle property"];`

    `[mapView addAnnotation:addAnnotation];`


    First, when we create our `MapAnnotation` object, we call the `initWithCoordinate`
    method to set the default location of the annotation. The next two lines call
    the getters for our properties for title and subtitle. Finally, we add the annotation
    to the `MKMapView`.


    Go ahead and run this in the simulator. Switch to the second tab and you''ll see
    the map view and a red annotation on Apple HQ (the same coordinates we centered
    the map on earlier). If you click the annotation, you''ll see something similar
    to [Figure 3–15](#Chapter03.html#fig_3_15).


    You''ll see that both the title and the subtitle have been populated and the annotation
    is showing in the correct coordinates. There are plenty of options available to
    customize our annotation. For example, what about animating our annotation and
    changing its color? To customize the appearance of the annotation we would use
    another delegate method called `viewForAnnotation`. This method is called when
    an annotation is created and gives you the opportunity to customize that particular
    view with a reusable object reference. Add the method from [Listing 3–32](#Chapter03.html#list_3_32)
    to the class to handle the delegate method.


    ![Image](images/0315.jpg)


    **Figure 3–15.** *The default annotation shows the populated title and subtitle.*


    **Listing 3–32.** *Handle the viewForAnnotation Delegate Method*


    `- (MKAnnotationView *) mapView:(MKMapView *)mapView viewForAnnotation:(id <MKAnnotation>)
    annotation{`

    `    MKPinAnnotationView *annView=[[MKPinAnnotationView alloc] initWithAnnotation:annotation
    reuseIdentifier:@"MyPin"];`

    `    annView.animatesDrop=TRUE;`

    `    annView.canShowCallout = YES;`

    `    [annView setSelected:YES];`

    `    annView.pinColor = MKPinAnnotationColorPurple;`

    `    annView.calloutOffset = CGPointMake(-50, 5);`

    `    return annView;`

    `}`


    We made a few changes to the annotation. If you run it in the simulator now, you''ll
    see something similar to [Figure 3–16](#Chapter03.html#fig_3_16).


    ![Image](images/0316.jpg)


    **Figure 3–16.** *The simulator now shows the customized annotation.*


    The first change you''ll notice when the simulator changes to the second tab is
    that the annotation is now animated. It drops in place in a nice friendly motion.
    We did this using the `animatesDrop` property. It''s also purple now. We set the
    color of the annotation with the `pinColor` property. Finally, you''ll notice
    the dialog is off-center. We set an offset using the `calloutOffset` property.
    This is useful when you are using custom annotation images that aren''t as balanced
    as the default pins.


    Next, let''s take a quick look at how to get more information about specific coordinates.'
  trans: "\n### 为地图添加标注\n\n要设置标注，我们将使用一个新类来保存标注的自定义属性。在`Project Navigator`中任意位置右键，从上下文菜单中选择`New\
    \ File`。在`Cocoa Touch`类别下，选择`Objective-C class`模板。保持该类为`NSObject`的子类，并将新类命名为`MapAnnotation`。地图上的标注有几个主要特征：标题、副标题和坐标。我们将为这些特征向新类添加属性，并提供一些方法以便从地图类中设置它们。首先，将代码清单\
    \ 3-29 中的声明添加到`MapAnnotation.h`中。\n\n**代码清单 3-29.** *MapAnnotation.h 的修改*\n\n\
    ```\n#import <Foundation/Foundation.h>\n#import <MapKit/MapKit.h>\n\n@interface\
    \ MapAnnotation : NSObject<MKAnnotation> {\n    CLLocationCoordinate2D coordinate;\n\
    \    NSString *subtitletext;\n    NSString *titletext;\n}\n@property (nonatomic,\
    \ readonly) CLLocationCoordinate2D coordinate;\n@property (readwrite, retain)\
    \ NSString *titletext;\n@property (readwrite, retain) NSString *subtitletext;\n\
    -(id)initWithCoordinate:(CLLocationCoordinate2D) coordinate;\n- (NSString *)subtitle;\n\
    - (NSString *)title;\n-(void)setTitle:(NSString*)strTitle;\n-(void)setSubTitle:(NSString*)strSubTitle;\n\
    \n@end\n```\n\n同样，我们从导入`MapKit.h`开始。我们声明了初始坐标位置（标注将放置的位置）以及标注标题和副标题的属性。我们还为类添加了一些方法：一个用于坐标的初始化方法，以及一组用于标题和副标题的\
    \ getter 和 setter 方法。\n\n切换到`MapAnnotation.m`，并从代码清单 3-30 中添加对应的属性和方法实现。\n\n**代码清单\
    \ 3-30.** *MapAnnotation.m 的修改*\n\n```\n@implementation MapAnnotation\n@synthesize\
    \ coordinate, titletext, subtitletext;\n\n- (NSString *)subtitle{\n        return\
    \ subtitletext;\n}\n- (NSString *)title{\n        return titletext;\n}\n\n-(void)setTitle:(NSString*)strTitle\
    \ {\n        self.titletext = strTitle;\n}\n\n-(void)setSubTitle:(NSString*)strSubTitle\
    \ {\n        self.subtitletext = strSubTitle;\n}\n\n-(id)initWithCoordinate:(CLLocationCoordinate2D)\
    \ c{\n        coordinate=c;\n        return self;\n}\n@end\n```\n\n这个类并不复杂。它通过基本重构来充当标注属性的占位符。在`SecondViewController.h`中，为`MapAnnotation.h`头文件添加一条`import`语句。然后，打开`SecondViewController.m`，在`displayMap`方法中调用`setRegion`方法的代码之前，添加代码清单\
    \ 3-31 中的代码。请注意来自`MapAnnotation`类的三个方法及其调用方式。\n\n**代码清单 3-31.** *在 displayMap\
    \ 方法中创建标注*\n\n```\nMapAnnotation *addAnnotation = [[[MapAnnotation alloc] initWithCoordinate:coords]\
    \ retain];\n[addAnnotation setTitle:@\"My Annotation Title\"];\n[addAnnotation\
    \ setSubTitle:@\"this is my subtitle property\"];\n[mapView addAnnotation:addAnnotation];\n\
    ```\n\n首先，创建`MapAnnotation`对象时，我们调用`initWithCoordinate`方法来设置标注的默认位置。接下来的两行调用我们为标题和副标题属性编写的\
    \ getter 方法。最后，我们将标注添加到`MKMapView`中。\n\n现在继续在模拟器中运行。切换到第二个标签页，你会看到地图视图以及在 Apple\
    \ 总部（与我们之前将地图居中显示的坐标相同）上的一个红色标注。如果点击该标注，你会看到类似图 3-15 的内容。\n\n![图片](img/0315.jpg)\n\
    \n**图 3-15.** *默认标注显示了已填充的标题和副标题。*\n\n你会看到标题和副标题都已填充，并且标注显示在正确的坐标上。有许多选项可用于自定义标注。例如，让标注动起来并改变它的颜色怎么样？要自定义标注的外观，我们会使用另一个名为`viewForAnnotation`的委托方法。这个方法在标注创建时被调用，让你有机会通过一个可重用的对象引用来自定义该特定视图。将代码清单\
    \ 3-32 中的方法添加到类中以处理这个委托方法。\n\n**代码清单 3-32.** *处理 viewForAnnotation 委托方法*\n\n```\n\
    - (MKAnnotationView *) mapView:(MKMapView *)mapView viewForAnnotation:(id <MKAnnotation>)\
    \ annotation{\n    MKPinAnnotationView *annView=[[MKPinAnnotationView alloc] initWithAnnotation:annotation\
    \ reuseIdentifier:@\"MyPin\"];\n    annView.animatesDrop=TRUE;\n    annView.canShowCallout\
    \ = YES;\n    [annView setSelected:YES];\n    annView.pinColor = MKPinAnnotationColorPurple;\n\
    \    annView.calloutOffset = CGPointMake(-50, 5);\n    return annView;\n}\n```\n\
    \n我们对标注做了一些修改。如果在模拟器中再次运行，你会看到类似图 3-16 的内容。\n\n![图片](img/0316.jpg)\n\n**图 3-16.**\
    \ *模拟器现在显示了自定义后的标注。*\n\n当模拟器切换到第二个标签页时，你会注意到的第一个变化是标注现在带有动画效果。它会以一种友好的方式掉落到位。我们通过`animatesDrop`属性实现了这一点。现在它也是紫色的。我们使用`pinColor`属性设置了标注的颜色。最后，你会注意到提示框是偏离中心的。我们使用`calloutOffset`属性设置了一个偏移量。当你使用并非像默认大头针那样平衡的自定义标注图片时，这个属性会很有用。\n\
    \n接下来，让我们快速了解一下如何获取特定坐标的更多信息。\n"
- fmt: "### Reverse Geocoding\n\nFinally, we come to reverse geocoding. Reverse geocoding\
    \ is the process of obtaining address or location information from the latitude\
    \ and longitude values, whereas geocoding is the process of getting the latitude\
    \ and longitude from an address. iOS provides a class to make reverse geocoding\
    \ easy on the developer. Let's extend our current example and log some actual\
    \ information about the coordinate we have been using.\n\nWe're going to use a\
    \ class called `MKReverseGeocoder`. There are a few properties and methods of\
    \ this class on which we should concentrate. They are shown in [Table 3–2](#Chapter03.html#tab_3_2).\
    \ However, before we use any of these, we need to nominate the `SecondViewController`\
    \ class as an `MKReverseGeocoderDelegate`. This is important, or the reverse geocoding\
    \ will appear to do nothing.\n\n![Image](images/t0302.jpg)\n\nTo keep things simple\
    \ and not refactor our whole example, let's reverse geocode the address of the\
    \ coordinate we've been using thus far. Find the `toggleToolBarChange` method\
    \ and change the method to reflect what is shown in [Listing 3–33](#Chapter03.html#list_3_33).\
    \ We are using this method because we want to initiate the reverse geocoding from\
    \ a user action to demonstrate the feature. This method is called when you click\
    \ on the segmented button, so it will serve our purpose.\n\n**Listing 3–33.**\
    \ *The Updated `toggleToolBarChange` Method Calls Reverse Geocoder*\n\n```\n…\n\
    case 1: // Satellite\n{\nCLLocationCoordinate2D coords;\n                coords.latitude\
    \ = 37.33188;\n                coords.longitude = -122.029497;\n\n           \
    \     MKReverseGeocoder *geoCoder = [[MKReverseGeocoder alloc] initWithCoordinate:coords];\n\
    \                [geoCoder setDelegate:self];\n                [geoCoder start];\n\
    \        [mapView setMapType:MKMapTypeSatellite];\n        break;\n}\n…\n```\n\
    \nFirst, we're a bit sloppy and repeat the code for the `CLLocationCoordinate2D`.\
    \ In any real application, this would either be derived or set at a higher scope.\
    \ After we create our coordinate again, we initialize the `MKReverseGeocoder`\
    \ with that same coordinate. This is required to use the reverse geocoding class.\
    \ We then set the `delegate` to `self`. Finally, we start the geocoding process.\n\
    \nAs you would expect, because we set our class as an `MKReverseGeocoderDelegate`,\
    \ there are a few more methods that the delegate implementation requires. Refer\
    \ to [Listing 3–34](#Chapter03.html#list_3_34) and add the delegate methods to\
    \ `SecondViewController.m`.\n\n**Listing 3–34.** *`MKReverseGeocoderDelegate`\
    \ Methods*\n\n```\n- (void)reverseGeocoder:(MKReverseGeocoder *)geocoder didFindPlacemark:(MKPlacemark\
    \ *)placemark {\n    NSLog(@\"return %@\", placemark.addressDictionary);\n}\n\
    - (void)reverseGeocoder:(MKReverseGeocoder *)geocoder didFailWithError:(NSError\
    \ *)error {\n    NSLog(@\"fail %@\", error);\n}\n```\n\nThe key piece of code\
    \ here is bolded. The `MKPlacemark` object is returned to the delegate method\
    \ if any information is found on the specified coordinate. [Figure 3–17](#Chapter03.html#fig_3_17)\
    \ shows the output in the Xcode console.\n\n![Image](images/0317.jpg)\n\n**Figure\
    \ 3–17.** *The Xcode console shows the reverse geocoding output.*\n\n### Summary\n\
    \nWe covered a lot of ground in this chapter on location services. We started\
    \ by looking at the various options available for tracking a location, such as\
    \ the Standard Location Service, the Significant-Change Location Service, the\
    \ Geographic Region Monitoring Service, and determining altitude. We looked at\
    \ how to visualize location services on a map and how to determine contextual\
    \ information from reverse geocoding that location. There were a few subtle lessons\
    \ in this chapter as well. For example, we introduced basic threading, which we'll\
    \ continue to expand on in later examples; and dynamic overlays, which we'll be\
    \ using in more of a HUD (head-up display) fashion in our augmented-reality chapters.\n\
    \nWe're building the tools that we'll need to fully construct our AR applications.\
    \ Next, we'll explore iOS sensor programming by working with the gyroscope and\
    \ the accelerometer.\n\n## Chapter 4: iOS Sensors\n\nAugmented-reality programming\
    \ requires the use of multiple hardware components to build an effective application.\
    \ Most of these components are commonly referred to as sensors. Sensors, such\
    \ as the gyroscope and accelerometer, help us figure out the device's orientation\
    \ and change in position while the application is running. Since we'll be programming\
    \ in AR, we'll be overlaying our application on the real-life view of the device's\
    \ camera. This makes it so much more important that we track orientation so we\
    \ can keep the application oriented in a realistic way.\n\n### Orientation Sensors\n\
    \nThe accelerometer and gyroscope are used for similar purposes, but there is\
    \ a subtle difference between the two, and most applications rely on the combination\
    \ of both readings for maximum effectiveness. Let's take a look at the differences\
    \ and similarities between the two components.\n\nLet's start with the accelerometer.\
    \ The three-axis accelerometer in the iPhone 4 gauges the orientation of the device\
    \ relative to the Earth's surface. If the device happens to be in free fall or\
    \ has a constant acceleration in a particular direction, the acceleration returns\
    \ zero (or should return zero) because it would be indistinguishable from the\
    \ acceleration being provided by the Earth's gravitational pull.\n\nThe gyroscope\
    \ has the capability of measuring the rate of rotation around a particular axis.\
    \ Rotation is something an accelerometer does not measure, which is why flight\
    \ computers cannot rely on an accelerometer alone, but need a gyroscope as well\
    \ to keep an aircraft from rolling.\n\nAn easy way to think of the difference\
    \ between these components is that the gyroscope helps measure orientation, and\
    \ an accelerometer measures vibration. Using this as a basis, the gyroscope can\
    \ provide an angular rate (or rotation), whereas the accelerometer can measure\
    \ only linear acceleration (over all three axes).\n\nLet's start by looking at\
    \ each of these components and how to use them, then move on to combining the\
    \ two for better measurements. For this chapter, we're going to use the Tab Bar\
    \ application template again to keep our number of sample applications to a minimum.\
    \ Create a new project using the Tab Bar application template with iPhone as your\
    \ target device in Xcode. Call the new project `iOS_AR_Ch4_Sensors`, or download\
    \ the completed code for this chapter from `github.com/kyleroche/Professional_iOS_AugmentedReality`\
    \ or from the Source Code/Download area of the Apress web site ([`www.apress.com`](http://www.apress.com))."
  raw: '### Reverse Geocoding


    Finally, we come to reverse geocoding. Reverse geocoding is the process of obtaining
    address or location information from the latitude and longitude values, whereas
    geocoding is the process of getting the latitude and longitude from an address.
    iOS provides a class to make reverse geocoding easy on the developer. Let''s extend
    our current example and log some actual information about the coordinate we have
    been using.


    We''re going to use a class called `MKReverseGeocoder`. There are a few properties
    and methods of this class on which we should concentrate. They are shown in [Table
    3–2](#Chapter03.html#tab_3_2). However, before we use any of these, we need to
    nominate the `SecondViewController` class as an `MKReverseGeocoderDelegate`. This
    is important, or the reverse geocoding will appear to do nothing.


    ![Image](images/t0302.jpg)


    To keep things simple and not refactor our whole example, let''s reverse geocode
    the address of the coordinate we''ve been using thus far. Find the `toggleToolBarChange`
    method and change the method to reflect what is shown in [Listing 3–33](#Chapter03.html#list_3_33).
    We are using this method because we want to initiate the reverse geocoding from
    a user action to demonstrate the feature. This method is called when you click
    on the segmented button, so it will serve our purpose.


    **Listing 3–33.** *The Updated toggleToolBarChange Method Calls Reverse Geocoder*


    `…`

    `case 1: // Satellite`

    `{`

    **`CLLocationCoordinate2D coords;`**

    **`                coords.latitude = 37.33188;`**

    **`                coords.longitude = -122.029497;`**


    **`                MKReverseGeocoder *geoCoder = [[MKReverseGeocoder alloc] initWithCoordinate:coords];`**

    **`                [geoCoder setDelegate:self];`**

    **`                [geoCoder start];`**

    `        [mapView setMapType:MKMapTypeSatellite];`

    `        break;`

    `}`

    `…`


    First, we''re a bit sloppy and repeat the code for the `CLLocationCoordinate2D`.
    In any real application, this would either be derived or set at a higher scope.
    After we create our coordinate again, we initialize the `MKReverseGeocoder` with
    that same coordinate. This is required to use the reverse geocoding class. We
    then set the `delegate` to `self`. Finally, we start the geocoding process.


    As you would expect, because we set our class as an `MKReverseGeocoderDelegate`,
    there are a few more methods that the delegate implementation requires. Refer
    to [Listing 3–34](#Chapter03.html#list_3_34) and add the delegate methods to `SecondViewController.m`.


    **Listing 3–34.** *MKReverseGeocoderDelegate Methods*


    `- (void)reverseGeocoder:(MKReverseGeocoder *)geocoder didFindPlacemark:(MKPlacemark
    *)placemark {`

    **`    NSLog(@"return %@", placemark.addressDictionary);`**

    `}`

    `- (void)reverseGeocoder:(MKReverseGeocoder *)geocoder didFailWithError:(NSError
    *)error {`

    `    NSLog(@"fail %@", error);`

    `}`


    The key piece of code here is bolded. The `MKPlacemark` object is returned to
    the delegate method if any information is found on the specified coordinate. [Figure
    3–17](#Chapter03.html#fig_3_17) shows the output in the Xcode console.


    ![Image](images/0317.jpg)


    **Figure 3–17.** *The Xcode console shows thereverse geocoding output.*


    ### Summary


    We covered a lot of ground in this chapter on location services. We started by
    looking at the various options available for tracking a location, such as the
    Standard Location Service, the Significant-Change Location Service, the Geographic
    Region Monitoring Service, and determining altitude. We looked at how to visualize
    location services on a map and how to determine contextual information from reverse
    geocoding that location. There were a few subtle lessons in this chapter as well.
    For example, we introduced basic threading, which we''ll continue to expand on
    in later examples; and dynamic overlays, which we''ll be using in more of a HUD
    (head-up display) fashion in our augmented-reality chapters.


    We''re building the tools that we''ll need to fully construct our AR applications.
    Next, we''ll explore iOS sensor programming by working with the gyroscope and
    the accelerometer.


    ## Chapter  4


    ## iOS Sensors


    Augmented-reality programming requires the use of multiple hardware components
    to build an effective application. Most of these components are commonly referred
    to as sensors. Sensors, such as the gyroscope and accelerometer, help us figure
    out the device''s orientation and change in position while the application is
    running. Since we''ll be programming in AR, we''ll be overlaying our application
    on the real-life view of the device''s camera. This makes it so much more important
    that we track orientation so we can keep the application oriented in a realistic
    way.


    ### Orientation Sensors


    The accelerometer and gyroscope are used for similar purposes, but there is a
    subtle difference between the two, and most applications rely on the combination
    of both readings for maximum effectiveness. Let''s take a look at the differences
    and similarities between the two components.


    Let''s start with the accelerometer. The three-axis accelerometer in the iPhone
    4 gauges the orientation of the device relative to the Earth''s surface. If the
    device happens to be in free fall or has a constant acceleration in a particular
    direction, the acceleration returns zero (or should return zero) because it would
    be indistinguishable from the acceleration being provided by the Earth''s gravitational
    pull.


    The gyroscope has the capability of measuring the rate of rotation around a particular
    axis. Rotation is something an accelerometer does not measure, which is why flight
    computers cannot rely on an accelerometer alone, but need a gyroscope as well
    to keep an aircraft from rolling.


    An easy way to think of the difference between these components is that the gyroscope
    helps measure orientation, and an accelerometer measures vibration. Using this
    as a basis, the gyroscope can provide an angular rate (or rotation), whereas the
    accelerometer can measure only linear acceleration (over all three axes).


    Let''s start by looking at each of these components and how to use them, then
    move on to combining the two for better measurements. For this chapter, we''re
    going to use the Tab Bar application template again to keep our number of sample
    applications to a minimum. Create a new project using the Tab Bar application
    template with iPhone as your target device in Xcode. Call the new project `iOS_AR_Ch4_Sensors,`
    or download the completed code for this chapter from `github.com/kyleroche/Professional_iOS_AugmentedReality`
    or from the Source Code/Download area of the Apress web site ([`www.apress.com`](http://www.apress.com)).'
  trans: "\n### 反向地理编码\n\n最后，我们来讲反向地理编码。反向地理编码是通过经纬度获取地址或位置信息的过程，而地理编码则是通过地址获取经纬度。iOS\
    \ 提供了一个类，让开发者能轻松实现反向地理编码。让我们扩展当前示例，记录我们一直使用坐标的实际信息。\n\n我们将使用一个名为 `MKReverseGeocoder`\
    \ 的类。需要重点关注这个类的几个属性和方法，如表 3-2 所示。但在使用这些方法之前，我们需要将 `SecondViewController` 类指定为\
    \ `MKReverseGeocoderDelegate`。这一步非常重要，否则反向地理编码将毫无反应。\n\n![Image](img/t0302.jpg)\n\
    \n为了简单起见，不重构整个示例，我们直接对一直使用的坐标进行反向地理编码。找到 `toggleToolBarChange` 方法，并按照代码清单 3-33\
    \ 所示修改该方法。之所以使用此方法，是因为我们希望通过用户操作来启动反向地理编码以演示该功能。当你点击分段按钮时会调用此方法，因此正好满足需求。\n\n\
    **代码清单 3-33.** *更新后的 `toggleToolBarChange` 方法调用反向地理编码*\n\n```\n…\ncase 1: // 卫星\n\
    {\nCLLocationCoordinate2D coords;\n                  coords.latitude = 37.33188;\n\
    \                  coords.longitude = -122.029497;\n\n                  MKReverseGeocoder\
    \ *geoCoder = [[MKReverseGeocoder alloc] initWithCoordinate:coords];\n       \
    \           [geoCoder setDelegate:self];\n                  [geoCoder start];\n\
    \          [mapView setMapType:MKMapTypeSatellite];\n          break;\n}\n…\n\
    ```\n\n首先，我们有点草率地重复了 `CLLocationCoordinate2D` 的代码。在实际应用中，这个值要么是派生而来，要么在更高作用域内设置。重新创建坐标后，我们用同一坐标初始化了\
    \ `MKReverseGeocoder`。这是使用反向地理编码类所必需的。接着将 `delegate` 设置为 `self`，最后启动地理编码过程。\n\n\
    如你所料，由于我们将类设置为 `MKReverseGeocoderDelegate`，委托实现还需要几个额外的方法。参考代码清单 3-34，将委托方法添加到\
    \ `SecondViewController.m` 中。\n\n**代码清单 3-34.** *`MKReverseGeocoderDelegate` 方法*\n\
    \n```\n- (void)reverseGeocoder:(MKReverseGeocoder *)geocoder didFindPlacemark:(MKPlacemark\
    \ *)placemark {\n      NSLog(@\"return %@\", placemark.addressDictionary);\n}\n\
    - (void)reverseGeocoder:(MKReverseGeocoder *)geocoder didFailWithError:(NSError\
    \ *)error {\n      NSLog(@\"fail %@\", error);\n}\n```\n\n这段代码的关键部分已加粗。如果在指定坐标上找到任何信息，`MKPlacemark`\
    \ 对象会返回给委托方法。图 3-17 展示了 Xcode 控制台中的输出结果。\n\n![Image](img/0317.jpg)\n\n**图 3-17.**\
    \ *Xcode 控制台显示反向地理编码输出*\n\n### 本章小结\n\n本章我们深入探讨了定位服务。首先了解了跟踪位置的各种选项，例如标准定位服务、重大变化定位服务、地理区域监控服务以及海拔高度测量。我们还探讨了如何在地图上可视化定位服务，以及如何通过反向地理编码获取上下文信息。本章还包含一些细微的知识点，比如介绍了基础线程（我们将在后续示例中继续扩展），以及动态叠加层（在增强现实章节中，我们将以\
    \ HUD（抬头显示器）的形式更多地使用它）。\n\n我们正在构建全面开发 AR 应用所需的工具。接下来，我们将通过陀螺仪和加速计来探索 iOS 传感器编程。\n\
    \n## 第 4 章：iOS 传感器\n\n增强现实编程需要利用多种硬件组件来构建有效的应用。这些组件通常被称为传感器。陀螺仪和加速计等传感器能帮助我们确定应用运行时设备的朝向和位置变化。由于我们进行\
    \ AR 编程，需要将应用叠加在设备摄像头的实景视图上，因此跟踪朝向以保持应用现实的朝向方式至关重要。\n\n### 朝向传感器\n\n加速计和陀螺仪的用途相似，但两者之间存在细微差别，大多数应用需要结合两者的读数才能达到最佳效果。我们来看看这两个组件的异同。\n\
    \n首先从加速计开始。iPhone 4 中的三轴加速计用于测量设备相对于地球表面的朝向。如果设备处于自由落体状态或在某个方向上有恒定加速度，则加速度返回零（或应该返回零），因为此时无法将其与地球引力提供的加速度区分开。\n\
    \n陀螺仪能够测量绕特定轴的旋转速率。旋转是加速计无法测量的，因此飞行计算机不能仅依赖加速计，还需要陀螺仪来防止飞机翻滚。\n\n区分这两者的一个简单方法是：陀螺仪有助于测量朝向，而加速计测量振动。以此为基础，陀螺仪可以提供角速度（或旋转），而加速计只能测量线性加速度（跨越所有三个轴）。\n\
    \n我们先分别了解每个组件及其使用方法，然后结合两者以获得更好的测量效果。本章我们将再次使用标签栏应用模板，以尽量减少示例应用的数量。在 Xcode 中使用标签栏应用模板创建一个新项目，目标设备选择\
    \ iPhone。将项目命名为 `iOS_AR_Ch4_Sensors`，或者从 `github.com/kyleroche/Professional_iOS_AugmentedReality`\
    \ 或 Apress 网站（[`www.apress.com`](http://www.apress.com)）的源代码/下载区域下载本章的完整代码。\n"
- fmt: "### Using the Accelerometer\n\nLet's start with the accelerometer. In Xcode,\
    \ open the `FirstViewController.h` file and update it, as shown in [Listing 4–1](#Chapter04.html#list_4_1).\n\
    \n**Listing 4–1.** *Updated FirstViewController.h*\n\n```\n#import <UIKit/UIKit.h>\n\
    \n@interface FirstViewController : UIViewController {\n    UIAccelerometer *accelerometer;\n\
    \n    UILabel *xLabel;\n    UILabel *yLabel;\n    UILabel *zLabel;\n\n    UIProgressView\
    \ *xProgressView;\n    UIProgressView *yProgressView;\n    UIProgressView *zProgressView;\n\
    }\n\n@property (nonatomic, retain) UIAccelerometer *accelerometer;\n\n@property\
    \ (nonatomic, retain) IBOutlet UILabel *xLabel;\n@property (nonatomic, retain)\
    \ IBOutlet UILabel *yLabel;\n@property (nonatomic, retain) IBOutlet UILabel *zLabel;\n\
    \n@property (nonatomic, retain) IBOutlet UIProgressView *xProgressView;\n@property\
    \ (nonatomic, retain) IBOutlet UIProgressView *yProgressView;\n@property (nonatomic,\
    \ retain) IBOutlet UIProgressView *zProgressView;\n\n@end\n```\n\nLet's get our\
    \ `FirstViewController.m` file up to date, and then walk through the new code\
    \ step by step. Switch to `FirstViewController.m` in Xcode and add the code from\
    \ [Listing 4–2](#Chapter04.html#list_4_2).\n\n**Listing 4–2.** *Updated FirstViewController.m*\n\
    \n```\n// after implementation\n@synthesize xLabel, yLabel, zLabel, xProgressView,\
    \ yProgressView, zProgressView, accelerometer;\n// replace existing dealloc from\
    \ auto-gen code\n- (void)dealloc\n{\n    [xLabel release];\n    xLabel = nil;\n\
    \    [yLabel release];\n    yLabel = nil;\n    [zLabel release];\n    zLabel =\
    \ nil;\n    [xProgressView release];\n    xProgressView = nil;\n    [yProgressView\
    \ release];\n    yProgressView = nil;\n    [zProgressView release];\n    zProgressView\
    \ = nil;\n    [accelerometer release];\n    accelerometer = nil;\n    [super dealloc];\n\
    }\n```\n\nStarting at the top, we declare a few UI elements that we'll use to\
    \ display real-time readings from the accelerometer. We are going to be using\
    \ three labels and three progress bars, each associated with one axis of the accelerometer.\
    \ [Figure 4–1](#Chapter04.html#fig_4_1) shows the X, Y, and Z coordinate axes.\n\
    \n![Image](images/0401.jpg)\n\n**Figure 4–1.** *The accelerometer uses X, Y, and\
    \ Z coordinate axes.*\n\nOpen `FirstView.xib` in Xcode. Add the labels and the\
    \ progress bar elements to the interface canvas. You should see something similar\
    \ to what is shown in [Figure 4–2](#Chapter04.html#fig_4_2).\n\n![Image](images/0402.jpg)\n\
    \n**Figure 4–2.** *Set up the XIB file for the accelerometer readings.*\n\nFor\
    \ simplicity, let's assign the three sets of values to the outlets in order horizontally.\
    \ X will be at the top, and Z at the bottom. Because Xcode 4.2 is new to some\
    \ of us, we'll review this one more time. To assign the outlets to the properties\
    \ in your header file, press the Ctrl key while dragging from the **File's Owner**\
    \ icon to the outlet on the canvas. A pop-up dialog will display, showing eligible\
    \ properties for assignment. Select the appropriate outlet. [Figure 4–3](#Chapter04.html#fig_4_3)\
    \ shows an example.\n\n![Image](images/0403.jpg)\n\n**Figure 4–3.** *Link the\
    \ IBOutlet to the properties in FirstViewController.h.*\n\nRepeat the process\
    \ for each of the `UILabel` outlets and `UIProgressView` components.\n\nWe access\
    \ the accelerometer through the `UIAccelerometer` class. This class uses the same\
    \ delegate pattern we were using in [Chapter 3](#Chapter03.html#ch3) for location\
    \ services. This class uses a shared `UIAccelerometer` singleton and is not directly\
    \ accessed. Because of this, you'll notice a slight change in how we handle memory\
    \ in these examples (more specifically, how we handle the subscription to the\
    \ hardware messages).\n\n### The UIAccelerometerDelegate Class\n\nBefore we can\
    \ start monitoring the accelerometer for updates, we must nominate this class\
    \ as a `UIAccelerometerDelegate`. Update `FirstViewController.h` accordingly.\
    \ Switch back to `FirstViewController.m` and add the method from [Listing 4–3](#Chapter04.html#list_4_3).\n\
    \n**Listing 4–3.** *Delegate Method for UIAccelerometerDelegate Class*\n\n```\n\
    - (void)accelerometer:(UIAccelerometer *)accelerometer didAccelerate:(UIAcceleration\
    \ *)acceleration {\n    xLabel.text = [NSString stringWithFormat:@\"%@%f\", @\"\
    X: \", acceleration.x];\n    yLabel.text = [NSString stringWithFormat:@\"%@%f\"\
    , @\"Y: \", acceleration.y];\n    zLabel.text = [NSString stringWithFormat:@\"\
    %@%f\", @\"Z: \", acceleration.z];\n\n    xProgressView.progress = ABS(acceleration.x);\n\
    \    yProgressView.progress = ABS(acceleration.y);\n    zProgressView.progress\
    \ = ABS(acceleration.z);\n}\n```\n\nThe `didAccelerate` method of the delegate\
    \ class is called every time the accelerometer measures new values within range\
    \ of its update interval. Let's walk through the code. The first set of methods\
    \ format an `NSString` value for the `text` properties of the three `UILabel`s.\
    \ It is the acceleration value of each particular axis that will populate this\
    \ string value. The second block of code sets the value of the `UIProgressView`\
    \ outlets based on the same values. You'll notice that we're also setting the\
    \ values to the absolute value (`ABS`) of the measurement. This is because a progress\
    \ bar can't display a negative value. If there's a negative measurement, you'll\
    \ see it on the `UILabel`.\n\nBefore we can run the project, we have to set up\
    \ the update interval of the accelerometer and assign it a delegate. As I mentioned\
    \ earlier, the `UIAccelerometer` class is a singleton class. We need to create\
    \ a reference to the `sharedAccelerometer` object to start receiving measurements.\
    \ Uncomment the `viewDidLoad` method and adjust it, as shown in [Listing 4–4](#Chapter04.html#list_4_4).\n\
    \n**Listing 4–4.** *New viewDidLoad Method*\n\n```\n- (void)viewDidLoad\n{\n \
    \   accelerometer = [UIAccelerometer sharedAccelerometer];\n    accelerometer.updateInterval\
    \ = .5;\n    accelerometer.delegate = self;\n\n    [super viewDidLoad];\n}\n```\n\
    \nThe first line in this method assigns our `UIAccelerometer` object to the `sharedAccelerometer`\
    \ object. Next, you choose the `updateInterval`, which is in seconds. I have .5\
    \ (twice per second) selected. Feel free to adjust this and experiment with the\
    \ response times. Finally, we set the `delegate` to `self` so we can receive the\
    \ measurements.\n\nMake sure you have a physical device connected and selected\
    \ in the Scheme drop-down in Xcode. Run the project on your device. You should\
    \ see something similar to what is shown in [Figure 4–4](#Chapter04.html#fig_4_4).\n\
    \n![Image](images/0404.jpg)\n\n**Figure 4–4.** *Obtain X, Y, and Z measurements\
    \ of UIAccelerometer.*\n\nAs you are testing the application, try a few different\
    \ scenarios. Try to force the device downward to watch for quick changes on an\
    \ axis. Try to set the device on its side horizontally, which should increase\
    \ the X-axis in full (either negative or positive, depending on which side). Next,\
    \ stand the device upright vertically. The Y-axis should now have a full measurement,\
    \ while the other readings move toward zero. Lay the device flat with the screen\
    \ facing upward. You should see the Z-axis nearing 1.0 as the other two axis measurements\
    \ approach zero. Get to know the orientation of the device. We'll need to coordinate\
    \ these types of readings into our applications later in the book."
