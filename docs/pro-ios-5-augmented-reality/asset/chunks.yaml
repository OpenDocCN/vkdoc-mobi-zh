    \n我们的转换方法将在 OpenCV 处理块内部调用，该方法接收`UIImage`并绘制一个具有相同表示的新`IplImage`。其尺寸和颜色将足够接近，使我们仍能使用\
    \ x,y 坐标在检测到的每张人脸周围叠加一个半透明矩形。\n\n接下来，将列表 12–8 中的方法复制到实现部分。\n\n**列表 12–8.** `openCVFaceDetect`方法\n\
    \n```\n- ( void )openCVFaceDetect\n{\n    NSInteger                 i;\n    NSUInteger\
