  raw: '#### Significant-Change Location Service


    The Standard Location Service, which we''ve been using so far, is the most common
    way of getting the device''s location. However, after iOS 4.0, you can use the
    Significant-Change Location Service if you would like to sacrifice accuracy for
    power savings. The Significant-Change Location Service is accurate enough for
    the majority of applications. It uses the device''s cellular radio instead of
    the GPS radio to determine location, which allows the device to manage power usage
    more aggressively. The Significant-Change LocationService is also capable of waking
    a suspended application in order to deliver new coordinates.


    Once you''ve determined which location service best fits your application''s needs,
    the coding difference is fairly basic. Add the method from [Listing 3–11](#Chapter03.html#list_3_11)
    to `FirstViewController.m` to start the Significant-Change Location Service.


    **Listing 3–11.** *Start the Significant-Change Location Service*


    `- (void)startSignificantChangeUpdates`

    `{`

    `    CLLocationManager *locationManager = [[CLLocationManager alloc] init];`

    `    locationManager.delegate = self;`

    `    [locationManager startMonitoringSignificantLocationChanges];`

    `}`


    Because we nominated this class as a `CLLocationManagerDelegate` and we set the
    `delegate` property of the `CLLocationManager` to `self`, running this method
    instead of the one we added from [Listing 3–9](#Chapter03.html#list_3_9) should
    result in the same screen in the simulator (so, we think anyway). Add the code
    from [Listing 3–12](#Chapter03.html#list_3_12) to your header file and change
    the `viewDidLoad` method as shown in [Listing 3–13](#Chapter03.html#list_3_13).


    **Listing 3–12.** *Declare the New Method in FirstViewController.h*


    `- (void)startSignificantChangeUpdates;`


    **Listing 3–13.** *The New viewDidLoad Method Calls the Significant-Change Location
    Service*


    `- (void)viewDidLoad`

    `{`

    `    // [self startStandardUpdates];`

    `    [self startSignificantChangeUpdates];`

    `    [super viewDidLoad];`

    `}`


    If you start the simulator and run our new version, you''ll notice something a
    bit different. Namely, nothing happens. The `UITextView` never changes. If you
    were to deploy this to a physical device, the results would change as your position
    changed. Don''t worry about this just yet. In the next section, “Geographic Region
    Monitoring,” I''ll introduce a new way to test your location in the simulator.


    #### Geographic Region Monitoring Service


    In some cases, monitoring a precise location doesn''t exactly solve the problem.
    Instead, we just want to know if, or when, we are close to a certain coordinate.
    iOS provides a set of features for a Region Monitoring Service. It works, in most
    ways, just like the other location services. It provides a few key delegate methods
    that need to be handled to appropriately react to changes in region. We will be
    using the `didEnterRegion:` and `didExitRegion:` delegate methods to demonstrate
    the functionality.


    The code in this example will work just fine on a physical device. However, to
    demonstrate this with a simulator, I''m going to show it on the iOS 5 simulator
    running Xcode 4.2 beta. Xcode 4.2 introduced a way to simulate location changes
    in the debugger, which will illustrate our demonstration nicely. Start by adding
    the method from [Listing 3–14](#Chapter03.html#list_3_14) to `FirstViewController.m`.


    **Listing 3–14.** *Add New Methods in FirstViewController.m*


    `- (void)startRegionMonitoring`

    `{`

    `    NSLog(@"Starting region monitoring");`

    `    CLLocationManager *locationManager = [[CLLocationManager alloc] init];`

    `    locationManager.delegate = self;`


    `    CLLocationCoordinate2D coord = CLLocationCoordinate2DMake(37.787359, -122.408227);`

    `    CLRegion *region = [[CLRegion alloc] initCircularRegionWithCenter:coord`

    `radius:1000.0 identifier:@"San Francisco"];`


    `    [locationManager startMonitoringForRegion:region`

    `desiredAccuracy:kCLLocationAccuracyKilometer];`

    `}`


    The code looks very similar to our other methods of tracking location except for
    the last line, which starts the Region Monitoring Service. We created a `CLLocationCoordinate2D`
    with GPS coordinates in San Francisco. The reason I selected San Francisco is
    that it is one of the preloaded GPS coordinates found in Xcode 4.2 beta, as shownin
    [Figure 3–6](#Chapter03.html#fig_3_6).


    Don''t forget to declare your new method in the header file. Add the code from
    [Listing 3–15](#Chapter03.html#list_3_15) to `FirstViewController.h`, just above
    the `@end`.


    **Listing 3–15.** *Declare the New Method in FirstViewController.h*


    `- (void)startRegionMonitoring;` ![Image](images/0306.jpg)


    **Figure 3–6.** *Choose preloaded GPS coordinates in Xcode 4.2 beta.*


    Now that the Region Monitoring Service is started, we need to handle the delegate
    methods that are called when a user enters or exits the region we are monitoring.
    Add the methods from [Listing 3–16](#Chapter03.html#list_3_16) to `FirstViewController.m`.


    **Listing 3–16.** *Declare New Methods in FirstViewController.m*


    `- (void)locationManager:(CLLocationManager *)manager` **`didEnterRegion`**`:(CLRegion
    *)region {`

    `    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Region Alert"`

    `                                                    message:@"You entered the
    region"`

    `                                                   delegate:self`

    `                                          cancelButtonTitle:@"OK"`

    `                                          otherButtonTitles:nil, nil];`

    `    [alert show];`

    `    [alert release];`

    `}`


    `- (void)locationManager:(CLLocationManager *)manager` **`didExitRegion`**`:(CLRegion
    *)region {`

    `    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@"Region Alert"`

    `                                                    message:@"You exited the
    region"`

    `                                                   delegate:self`

    `                                          cancelButtonTitle:@"OK"`

    `                                          otherButtonTitles:nil, nil];`

    `    [alert show];`

    `    [alert release];`

    `}`'
  trans: "\n# 重大位置变化（Significant-Change Location）服务\n\n到目前为止一直在使用的“标准位置服务”是获取设备位置最常见的方式。然而，在\
    \ iOS 4.0 之后，如果你愿意牺牲精度以换取省电，可以使用“重大位置变化服务”。对于大多数应用而言，重大位置变化服务的精度已经足够。该服务使用设备的蜂窝无线电（而非\
    \ GPS 无线电）来确定位置，这使得设备能够更激进地管理功耗。重大位置变化服务还能够唤醒已挂起的应用，以便传送新的坐标。\n\n一旦你确定了最适合应用需求的位置服务，编码上的差异就相当小了。将代码清单\
    \ 3–11 中的方法添加到 `FirstViewController.m` 中，以启动重大位置变化服务。\n\n**代码清单 3–11.** 启动重大位置变化服务\n\
    \n```\n- (void)startSignificantChangeUpdates\n{\n    CLLocationManager *locationManager\
    \ = [[CLLocationManager alloc] init];\n    locationManager.delegate = self;\n\
    \    [locationManager startMonitoringSignificantLocationChanges];\n}\n```\n\n\
    因为我们指定了该类作为 `CLLocationManagerDelegate`，并且将 `CLLocationManager` 的 `delegate` 属性设置为\
    \ `self`，运行此方法（而非我们在代码清单 3–9 中添加的方法）在模拟器中应该会产生相同的屏幕（至少我们是这么认为的）。将代码清单 3–12 中的代码添加到头文件中，并按照代码清单\
    \ 3–13 所示修改 `viewDidLoad` 方法。\n\n**代码清单 3–12.** 在 `FirstViewController.h` 中声明新方法\n\
    \n```\n- (void)startSignificantChangeUpdates;\n```\n\n**代码清单 3–13.** 新的 `viewDidLoad`\
    \ 方法调用重大位置变化服务\n\n```\n- (void)viewDidLoad\n{\n    // [self startStandardUpdates];\n\
    \    [self startSignificantChangeUpdates];\n    [super viewDidLoad];\n}\n```\n\
    \n如果你启动模拟器并运行新版本，你会发现有些不同。具体来说，什么都不会发生。`UITextView` 从未更新。如果你将此应用部署到物理设备上，结果将会随着你的位置变化而改变。暂时不必为此担心。在下一节“地理区域监控”中，我将介绍一种在模拟器中测试位置的新方法。\n\
    \n# 地理区域监控（Geographic Region Monitoring）服务\n\n在某些情况下，监控精确位置并不能完全解决问题。相反，我们只想了解是否（或何时）靠近某个特定的坐标。iOS\
    \ 提供了一套用于区域监控服务的特性。在大多数方面，它的工作方式与其他位置服务类似。它提供了一些需要处理的关键委托方法，以便对区域变化做出恰当的响应。我们将使用\
    \ `didEnterRegion:` 和 `didExitRegion:` 这两个委托方法来演示其功能。\n\n本示例中的代码在物理设备上可以正常工作。但是，为了在模拟器上演示，我将展示如何在运行\
    \ Xcode 4.2 测试版的 iOS 5 模拟器上进行操作。Xcode 4.2 引入了一种在调试器中模拟位置变化的方法，这将很好地演示我们的功能。首先，将代码清单\
    \ 3–14 中的方法添加到 `FirstViewController.m` 中。\n\n**代码清单 3–14.** 在 `FirstViewController.m`\
    \ 中添加新方法\n\n```\n- (void)startRegionMonitoring\n{\n    NSLog(@\"Starting region\
    \ monitoring\");\n    CLLocationManager *locationManager = [[CLLocationManager\
    \ alloc] init];\n    locationManager.delegate = self;\n\n    CLLocationCoordinate2D\
    \ coord = CLLocationCoordinate2DMake(37.787359, -122.408227);\n    CLRegion *region\
    \ = [[CLRegion alloc] initCircularRegionWithCenter:coord\n                   \
    \ radius:1000.0 identifier:@\"San Francisco\"];\n\n    [locationManager startMonitoringForRegion:region\n\
    \            desiredAccuracy:kCLLocationAccuracyKilometer];\n}\n```\n\n这段代码与我们之前跟踪位置的其他方法看起来非常相似，除了最后一行启动了区域监控服务之外。我们使用旧金山的\
    \ GPS 坐标创建了一个 `CLLocationCoordinate2D`。我选择旧金山的原因是，它是 Xcode 4.2 测试版中预加载的 GPS 坐标之一，如图\
    \ 3–6 所示。\n\n不要忘记在头文件中声明你的新方法。将代码清单 3–15 中的代码添加到 `FirstViewController.h` 中，紧贴\
    \ `@end` 的上方。\n\n**代码清单 3–15.** 在 `FirstViewController.h` 中声明新方法\n\n```\n- (void)startRegionMonitoring;\n\
    ```\n\n![Image](img/0306.jpg)\n\n**图 3–6.** 在 Xcode 4.2 测试版中选择预加载的 GPS 坐标。\n\n\
    既然区域监控服务已经启动，我们需要处理当用户进入或离开我们正在监控的区域时所调用的委托方法。将代码清单 3–16 中的方法添加到 `FirstViewController.m`\
    \ 中。\n\n**代码清单 3–16.** 在 `FirstViewController.m` 中声明新方法\n\n```\n- (void)locationManager:(CLLocationManager\
    \ *)manager didEnterRegion:(CLRegion *)region {\n    UIAlertView *alert = [[UIAlertView\
    \ alloc] initWithTitle:@\"Region Alert\"\n                                   \
    \                 message:@\"You entered the region\"\n                      \
    \                             delegate:self\n                                \
    \          cancelButtonTitle:@\"OK\"\n                                       \
    \   otherButtonTitles:nil, nil];\n    [alert show];\n    [alert release];\n}\n\
    \n- (void)locationManager:(CLLocationManager *)manager didExitRegion:(CLRegion\
    \ *)region {\n    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\
    Region Alert\"\n                                                    message:@\"\
    You exited the region\"\n                                                   delegate:self\n\
    \                                          cancelButtonTitle:@\"OK\"\n       \
    \                                   otherButtonTitles:nil, nil];\n    [alert show];\n\
    \    [alert release];\n}\n```\n"
- fmt: "The final step to test out the Region Monitoring Service is to call the `startRegionMonitoring`\
    \ method we just created. In [Chapter 2](#Chapter02.html#ch2), we discussed how\
    \ to check for existing services and supported hardware prior to using them. We\
    \ should do the same thing in this scenario. `CLLocationManager` provides a way\
    \ of checking for both the availability of the Region Monitoring Service and whether\
    \ the service is actually enabled. Update your `viewDidLoad:` method as shown\
    \ in [Listing 3–17](#Chapter03.html#list_3_17).\n\n**Listing 3–17.** *New viewDidLoad\
    \ Method*\n\n```\n- (void)viewDidLoad\n{\n    [self startStandardUpdates];\n \
    \   //[self startSignificantChangeUpdates];\n\n    if ([CLLocationManager regionMonitoringAvailable])\
    \ { // check is service is available\n        [self startRegionMonitoring];\n\
    \    }  // else do something\n    [super viewDidLoad];\n}\n```\n\nOur new method\
    \ starts the Standard Location Service and the Region Monitoring Service. When\
    \ you run this in the new Xcode 4.2 debugger, you'll be presented with a slightly\
    \ different permissions dialog asking to use your device's location. This was\
    \ another update to iOS 5's simulator. You can see an example of the new permissions\
    \ dialog in [Figure 3–7](#Chapter03.html#fig_3_7).\n\n![Image](images/0307.jpg)\n\
    \n**Figure 3–7.** *Allow permissions from the new iOS5 authorization dialog.*\n\
    \nClicking **OK** in the dialog to load the view and start our services.\n\nAnother\
    \ new feature of Xcode 4.2 is the ability to alter the simulator's location while\
    \ the application is running. In the `Console` window of Xcode, you'll see a new\
    \ drop-down menu for location, as shown in [Figure 3–8](#Chapter03.html#fig_3_8).\n\
    \n![Image](images/0308.jpg)\n\n**Figure 3–8.** *Use the new Xcode 4.2 beta location\
    \ simulator in debugger.*\n\nWhen we initialized our Region Monitoring Service,\
    \ we started it around a coordinate in San Francisco. So, to test our code we'll\
    \ need to enter and exit that region. If you have Xcode 4.2 installed, use the\
    \ pull-down menu in the debugger to select `San Francisco, CA, USA` as your location.\
    \ The simulator changes its coordinates in the background; the Standard Location\
    \ Service picks up the change and reports it to our delegate method. In addition,\
    \ we have entered the defined region so our `didEnterRegion:` method fires as\
    \ well. You will see something similar to what is shown in [Figure 3–9](#Chapter03.html#fig_3_9).\n\
    \n![Image](images/0309.jpg)\n\n**Figure 3–9.** *The didEnterRegion: method fires.*\n\
    \nWe can also use the debugger to test the `didExitRegion:` method. Change your\
    \ location to anywhere except San Francisco, CA, USA, and you'll trigger the other\
    \ delegate method as shown in [Figure 3–10](#Chapter03.html#fig_3_10).\n\n![Image](images/0310.jpg)\n\
    \n**Figure 3–10.** *The didExitRegion: method fires.*\n\nSo far, we have looked\
    \ at the different location services to monitor the device's locations and set\
    \ up some alerting options for when the device enters or exits a geographic region.\
    \ Visualizing coordinates of interest in augmented-reality applications also requires\
    \ that we know the distance from our device to certain coordinates of interest.\
    \ To do this, let's make a quick change to our `didUpdateToLocation:` method that\
    \ we defined earlier in this chapter. Update the method as shown in [Listing 3–18](#Chapter03.html#list_3_18).\n\
    \n**Listing 3–18.** *New didUpdateToLocation Method*\n\n```\n- (void)locationManager:(CLLocationManager\
    \ *)manager\n    didUpdateToLocation:(CLLocation *)newLocation\n           fromLocation:(CLLocation\
    \ *)oldLocation\n{\n    NSDate* eventDate = newLocation.timestamp;\n    NSTimeInterval\
    \ howRecent = [eventDate timeIntervalSinceNow];\n    if (abs(howRecent) < 15.0)\n\
    \    {\n        //locationTextView.text = [NSString stringWithFormat:@\"latitude\
    \ %+.6f, longitude %+.6f\\n\",\n        //                       newLocation.coordinate.latitude,\n\
    \        //                       newLocation.coordinate.longitude];\n\n     \
    \   CLLocationDistance dist = [newLocation distanceFromLocation:oldLocation] /\
    \ 1000;\n        locationTextView.text = [NSString stringWithFormat:@\"distance\
    \ %5.1f traveled\"];\n    } else {\n        locationTextView.text = @\"Update\
    \ was old\";\n        // you'd probably just do nothing here and ignore the event\n\
    \    }\n}\n```\n\nIn Xcode 4's simulator, you'll get something similar to what\
    \ is shown in [Figure 3–11](#Chapter03.html#fig_3_11). If you are using Xcode\
    \ 4.2 beta and iOS 5 on your simulator, you can force some interesting distances.\
    \ Another way to test this feature would be to pass in a new `CLLocation` coordinate\
    \ instead of `oldLocation`.\n\n![Image](images/0311.jpg)\n\n**Figure 3–11.** *Check\
    \ the distance between updates.*\n\n### Altitude\n\nIn augmented reality, checking\
    \ altitude can help make sure that the angle of the camera is appropriate for\
    \ the view that you are presenting to the user. Getting the altitude of the device\
    \ starts with the same process as the location. Apple recommends that we check\
    \ for the availability of the altitude reading, and then try to get it from the\
    \ GPS or cellular radio. To determine whether the device is capable of providing\
    \ altitude, at this time, use the code from [Listing 3–19](#Chapter03.html#list_3_19).\n\
    \n**Listing 3–19.** *Check Whether Altitude Is Available*\n\n```\nIf (signbit(newLocation.verticalAccuracy))\
    \ {\n        // get the altitude\n}\n```\n\nThere are a few pitfalls to altitude\
    \ readings. First, older iPhones (original and iPhone 3Gs) are drastically less\
    \ accurate. In some reference materials, it is noted that they are nearly ten\
    \ times more inaccurate than the iPhone 4. Second, as we saw with our location\
    \ services examples earlier in this chapter, Core Location updates only when the\
    \ device moves a certain distance (non vertical). So, we need to either force\
    \ the GPS to reset or have the user tell us when they've changed altitudes automatically.\
    \ To check for the GPS reading, add the code from [Listing 3–20](#Chapter03.html#list_3_20).\n\
    \n**Listing 3–20.** *Check the GPS Reading*\n\n```\nlocationTextView.text = [NSString\
    \ stringWithFormat:@\"%6.2f m. \", newLocation.altitude];\n```\n\nTypically, even\
    \ on newer devices, the altitude reading isn't accurate enough. There are a few\
    \ other methods and publicly available web services that you can use to determine\
    \ the altitude based on GPS coordinates. We'll revisit this topic in our examples\
    \ in the later chapters. Before we move on to visualizing the location information\
    \ on a map, let's review the classes we have been using in this chapter. Their\
    \ most used methods and properties are listed in [Table 3–1](#Chapter03.html#tab_3_1).\n\
    \n![Image](images/t0301.jpg)\n\n![Image](images/t0301a.jpg)"
