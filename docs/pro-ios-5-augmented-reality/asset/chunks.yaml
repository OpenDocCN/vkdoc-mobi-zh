    `@end`


    Open `AppDelegate.m` in Xcode. We will be overriding our `didFinishLaunchingWithOptions`
    method so that we can add our `RootViewController` to the view stack. Update `AppDelegate.m`
    with the changes reflected in [Listing 11–7](#Chapter11.html#list_11_7).


    **Listing 11–7.** *Updated AppDelegate.m*


    `#import "AppDelegate.h"`

    **`#import "RootViewController.h"`**


    `@implementation AppDelegate`


