    \n幸运的是，我们知道问题所在。在大多数可用的 OpenCV 发行版中，都没有为设备和模拟器的架构进行适当编译。本例中使用的静态库需要更新。我们来更新并重试。\n\
    \nOpenCV 有很多优秀的开源构建脚本。我使用最多的版本是由 YoshimasaNiwa 贡献的（[`https://github.com/niw`](https://github.com/niw)）。我们将按照这个建议来修复示例项目。从此链接下载\
