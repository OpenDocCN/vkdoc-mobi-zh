    The first method will be used only this once. We are going to create a few boxes
    and drop them on the screen to make sure chipmunk is behaving correctly. The second
    method enables debug draw for chipmunk. Without this, it''s hard to tell what
    exactly you are rendering to the screen. This method will come in handy if you
