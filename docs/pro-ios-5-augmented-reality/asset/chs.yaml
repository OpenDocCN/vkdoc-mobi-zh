  \ 4–1），我们将在本书后续的示例应用中使用这些参数。\n\n![图片](img/t0401.jpg)\n\n在实体设备上运行应用。切换到第二个标签页，点击\
  \ Test 按钮。沿不同方向旋转设备，持续测试这些数值。在 Xcode 控制台中，您应能看到类似代码清单 4–11 所示的日志输出。\n\n**代码清单 4–11.**\
  \ *记录设备姿态的 NSLog 输出*\n\n```\n2011-07-08 20:38:31.955 iOS_AR_Ch4_Sensors[6144:707]\
