  \ 类的一个新实例。接着，我们设置更新的时间间隔。最后，如果运动管理器可用，我们就开始更新。如果你还记得第 2 章中验证传感器可用性的内容，这里看起来会很熟悉。如果你跳过了第\
  \ 2 章，只需注意，在尝试访问传感器之前先验证其是否可用是一种良好的实践。\n\n\n\n#### 姿态\n\n在用数值更新 UI 之前，我们先将其输出到控制台，确保能成功访问硬件。将代码清单\
  \ 4–10 中的代码复制到`SecondViewController.m`，添加我们在头文件中声明的`IBAction`方法。\n\n**代码清单 4–10.**\
