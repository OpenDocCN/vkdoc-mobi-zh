  \ SDK 特定的。\n\n我们几乎准备好测试应用程序了。在没有进行任何测试的情况下，这已经写了不少代码。\n\n现在，让我们将视频配置为图层的背景。从代码清单\
  \ 9-23 中复制该方法。\n\n**代码清单 9-23.** *将视频配置为背景图像*\n\n```\n- (void)configureVideoBackground\n\
  {\n    // Get the default video mode\n    QCAR::CameraDevice& cameraDevice = QCAR::CameraDevice::getInstance();\n\
  \    QCAR::VideoMode videoMode =\ncameraDevice.getVideoMode(QCAR::CameraDevice::MODE_DEFAULT);\n\
  \n    // Configure the video background\n    QCAR::VideoBackgroundConfig config;\n\
  \    config.mEnabled = true;\n    config.mSynchronous = true;\n    config.mPosition.data[0]\
  \ = 0.0f;\n    config.mPosition.data[1] = 0.0f;\n\n    // Compare aspect ratios\
  \ of video and screen. If they are different\n    // we use the full screen size\
  \ while maintaining the video's aspect\n    // ratio, which naturally entails some\
  \ cropping of the video.\n    // Note: screenRect is portrait but videoMode is always\
  \ landscape,\n    // which is why \"width\" and \"height\" appear to be reversed.\n\
  \    float arVideo = (float)videoMode.mWidth / (float)videoMode.mHeight;\n    float\
  \ arScreen = screenRect.size.height / screenRect.size.width;\n\n    if (arVideo\
  \ > arScreen)\n    {\n        // Video mode is wider than the screen. We'll crop\
  \ the left and right edges of\nthe video\n        config.mSize.data[0] = (int)screenRect.size.width\
  \ * arVideo;\n        config.mSize.data[1] = (int)screenRect.size.width;\n    }\n\
  \    else\n    {\n        // Video mode is taller than the screen. We'll crop the\
  \ top and bottom edges of the video.\n        // Also used when aspect ratios match\
  \ (no cropping).\n        config.mSize.data[0] = (int)screenRect.size.height;\n\
  \        config.mSize.data[1] = (int)screenRect.size.height / arVideo;\n    }\n\n\
  \    // Set the config\n    QCAR::Renderer::getInstance().setVideoBackgroundConfig(config);\n\
  }\n```\n\n此方法直接从一个示例中复制而来。Qualcomm 将视频设置为与屏幕匹配，然后绘制摄像头所见的画面作为我们的背景。\n\n接下来，为 OpenGL\
  \ 的光照设置加载着色器。从代码清单 9-24 中复制该方法。\n\n**代码清单 9-24.** *加载测试着色器*\n\n```\n-(void)loadShaders\
