  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵守您的格式要求，将给定的英文文本翻译成中文。\n\n\n#### 存储坐标\n\n我们已经非常接近拥有存储设备位置、屏幕视野范围和朝向所需的一切了。然而，我们还没有定义一个用于存储兴趣点坐标的地方。本节内容经过了修改，但其基础是\
  \ Alasdair Allan 的工作，而他的工作又基于 Zac White 的 `ARKit`。\n\n创建一个名为 `ARCoordinate` 的新类，它继承自\
  \ `NSObject`。打开头文件，并添加 代码清单 11–14 中的代码。\n\n**代码清单 11–14.** `ARCoordinate.h`\n\n\
  ```\n#import <Foundation/Foundation.h>\n\n@interface ARCoordinate : NSObject {\n\
