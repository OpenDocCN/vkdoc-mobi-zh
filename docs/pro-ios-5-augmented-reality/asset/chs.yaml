  BOOL result        = NO;\nif (deltaAzimuth <= degreesToRadians(_range)) {\n    result\
  \ = YES;\n}\n\nreturn result;\n```\n\n此方法用于检查我们先前定义的范围（屏幕可见区域），并验证传入的坐标是否位于指定范围内。该方法将帮助我们忽略可视屏幕范围之外的坐标。接下来，复制列表\
  \ 11–31 中的代码。\n\n**列表 11–31.** *deltaAzimuthForCoordinateMethod*\n\n```objectivec\n\
  - (double)deltaAzimuthForCoordinate:(ARCoordinate *)coordinate {\n\n    double currentAzimuth\
  \ = _coordinate.azimuth;\n    double pointAzimuth   = coordinate.azimuth;\n\n  \
  \  double deltaAzimith = ABS(pointAzimuth - currentAzimuth);\n\n    if (currentAzimuth\
  \ < degreesToRadians(_range) &&\n        pointAzimuth > degreesToRadians(360-_range))\
  \ {\n        deltaAzimith = (currentAzimuth + ((M_PI * 2.0) - pointAzimuth));\n\
  \    } else if (pointAzimuth < degreesToRadians(_range) &&\n               currentAzimuth\
  \ > degreesToRadians(360-_range)) {\n        deltaAzimith = (pointAzimuth + ((M_PI\
  \ * 2.0) - currentAzimuth));\n    }\n    return deltaAzimith;\n}\n```\n\n此方法计算我们当前位置的方位角与传入坐标的方位角之间的差值。这将帮助我们在\
  \ 360 度视图中定位目标点。我们还对正北方向的正负角度进行了调整。将列表 11–32 中的方法添加到实现文件中。\n\n**列表 11–32.** *pointForCoordinate\
  \ 和 isNorthForCoordinate 方法*\n\n```objectivec\n-(BOOL)isNorthForCoordinate:(ARCoordinate\
  \ *)coordinate {\n\n    BOOL isBetweenNorth = NO;\n    double currentAzimuth = _coordinate.azimuth;\n\
  \    double pointAzimuth   = coordinate.azimuth;\n\n    if (currentAzimuth < degreesToRadians(_range)\
  \ &&\n        pointAzimuth > degreesToRadians(360-_range)) {\n        isBetweenNorth\
  \ = YES;\n    } else if (pointAzimuth < degreesToRadians(_range) &&\n          \
  \     currentAzimuth > degreesToRadians(360-_range)) {\n        isBetweenNorth =\
  \ YES;\n    }\n    return isBetweenNorth;\n}\n\n- (CGPoint)pointForCoordinate:(ARCoordinate\
  \ *)coordinate {\n\n    CGPoint point;\n    CGRect viewBounds = _hudView.bounds;\n\
  \n    double currentAzimuth = _coordinate.azimuth;\n    double pointAzimuth   =\
  \ coordinate.azimuth;\n    double pointInclination = coordinate.inclination;\n\n\
  \    double deltaAzimuth = [self deltaAzimuthForCoordinate:coordinate];\n    BOOL\
  \ isBetweenNorth = [self isNorthForCoordinate:coordinate];\n\n    if ((pointAzimuth\
  \ > currentAzimuth && !isBetweenNorth) ||\n        (currentAzimuth > degreesToRadians(360-_range)\
  \ &&\n         pointAzimuth < degreesToRadians(_range))) {\n\n        // 右侧方位角\n\
  \        point.x = (viewBounds.size.width / 2) + ((deltaAzimuth / degreesToRadians(1))\
  \ * 12);\n    } else {\n\n        // 左侧方位角\n        point.x = (viewBounds.size.width\
  \ / 2) - ((deltaAzimuth / degreesToRadians(1)) * 12);\n    }\n    point.y = (viewBounds.size.height\
  \ / 2)\n        + (radiansToDegrees(M_PI_2 + _viewAngle) * 2.0)\n        + ((pointInclination\
  \ / degreesToRadians(1)) * 12);\n\n    return point;\n}\n```\n\n第一个方法 `isNorthForCoordinate`\
  \ 遵循了我们之前检查两个坐标方位角差值时的相同逻辑。现在我们正在对坐标与正北方向之间执行相同的操作。\n\n在 `pointForCoordinate` 方法中，我们将\
  \ `ARCoordinate` 类转换为可在视图中使用的 `CGPoint`。我们需要了解坐标在方位角数值上的差异，以及该点是否位于我们与正北方向之间。我们返回这个点，以便在视图中更新它——我们稍后将执行此操作。\n\
  \n让我们完成 `ARController.m` 实现中的 `updateLocations` 方法。按照列表 11–33 所示更新该方法。\n\n**列表 11–33.**\
