  \        bounds.size.height = bounds.size.width;\n        bounds.size.width = boundHeight;\n\
  \        transform = CGAffineTransformMakeScale(-1.0, 1.0);\n        transform =\
  \ CGAffineTransformRotate(transform, M_PI / 2.0);\n        break;\n    case UIImageOrientationRight:\n\
  \        boundHeight = bounds.size.height;\n        bounds.size.height = bounds.size.width;\n\
  \        bounds.size.width = boundHeight;\n        transform = CGAffineTransformMakeTranslation(imageSize.height,\
  \ 0.0);\n        transform = CGAffineTransformRotate(transform, M_PI / 2.0);\n \
  \       break;\n    default:\n        [NSException raise:NSInternalInconsistencyException\n\
  \                    format:@\"Invalid image orientation\"];\n}\nUIGraphicsBeginImageContext(bounds.size);\n\
  CGContextRef context = UIGraphicsGetCurrentContext();\nif (orient == UIImageOrientationRight\
  \ || orient == UIImageOrientationLeft) {\n    CGContextScaleCTM(context, -scaleRatio,\
  \ scaleRatio);\n    CGContextTranslateCTM(context, -height, 0);\n} else {\n    CGContextScaleCTM(context,\
  \ scaleRatio, -scaleRatio);\n    CGContextTranslateCTM(context, 0, -height);\n}\n\
  CGContextConcatCTM(context, transform);\nCGContextDrawImage(UIGraphicsGetCurrentContext(),\
  \ CGRectMake(0, 0, width, height), imgRef);\nUIImage *imageCopy = UIGraphicsGetImageFromCurrentImageContext();\n\
  UIGraphicsEndImageContext();\n\nreturn imageCopy;\n}\n```\n\n我们在第 7 章中见过这个方法的片段。基本上，我们是在检查设备的旋转方向，然后相应地调整图像的方向和缩放。请按照代码清单\
  \ 13-18 所示修改`setImageToView`方法。\n\n**代码清单 13-18.** *更新后的 setImageToView 方法*\n\n\
  ```objective-c\n-(void)setImageToView:(UIImage*)image {\n    UIImage * capturedImage\
  \ = [self rotateImage:image orientation:UIImageOrientationLeftMirrored ];\n    _imageView.image\
  \ = capturedImage;\n    _settingImage = NO;\n}\n```\n\n这个方法不再直接设置`UIImage`，而是先通过我们刚刚创建的工具方法对图像进行正确旋转，然后将返回的（调整后的）`UIImage`赋值给调用方。\n\
  \n重新运行项目，你会看到更好的结果。我的 iPad 截图如图 13-7 所示。\n\n![图片](img/1307.jpg)\n\n**图 13-7.** *我们不再倒置了！！![图片](img/smile.jpg)*\n\
  \n好了，世界又恢复正位了。接下来，既然我们已经捕获并正确旋转了图像，该拿它做什么呢？记住，我们的目标是将相机缓冲区的图像发送到 face.com，并获取图片中检测到的所有面部的坐标。\n\
  \n我们需要决定这个功能的具体实现方式。有多种方法可以解决这个问题，每种方法都有其优势和缺点。首先，我们来回顾一下 face.com 的 API 及其所需参数，以便决定如何处理图像发送。\n\
  \n### Face.com API\n\nface.com 的 API 是一个出奇简单的 REST API，它接受一个多部分表单上传，其中包含你希望分析的图像的原始数据，放在请求体中。\n\
  \n我们只使用 face.com API 中的一个调用。`faces.detect`调用会返回一张或多张照片中检测到的面部的标签，包含标签、眼睛、鼻子和嘴部的几何信息，以及各种属性，如性别、是否戴眼镜、是否微笑。\n\
  \n该调用的使用说明（来自在线文档）包括以下内容：\n\n* 所有坐标都以百分比值提供，以支持任意比例的图片。照片的高度和宽度（相对于标签的高度/宽度）以像素为单位提供。偏航角、滚动角和俯仰角以-90\
  \ 度到 90 度的范围提供。\n* 照片的最大宽度或高度为 900 像素。你可以上传或发送更大尺寸照片的链接，但内部会调整大小以提升性能。\n* 每个返回的标签都包含一组属性。其中最重要的是面部属性，它包含了该标签是人脸的置信度。等等，不要使用置信度低于\
  \ 50%的标签。\n* 人脸检测是将用户训练集数据添加到识别索引中的前提步骤。（我们不会进行此操作。）\n\n该 API 也有限速。在撰写本文时，同一应用的请求限制为每分钟\
  \ 5000 次。所以，我认为这个示例不会有问题。\n\n该调用的 REST URL 是`http://api.face.com/faces/detect.[format]`。对于我们来说，我们会将格式设置为\
  \ JSON。POST 请求的输入参数如表 13-1 所述。\n\n![图片](img/t1301.jpg)\n\n![图片](img/t1301a.jpg)\n\
  \n如果你查看参数列表，会发现这个调用实际上相当简单。我们的选择是：要么将图像上传到某个地方并发送一个引用 URL，让 face.com 获取并分析它；要么直接在\
  \ POST 请求中上传原始图像数据。不经过实际测试，我猜想先将图像上传到其他地方，再让 face.com 下载并分析，其效率远不如直接在 POST 请求中上传。因此，我们选择后一种方式。\n\
  \n既然有了方案，我们来考虑时机问题。我们已经有了`UIImage`对象，可以将其转换为 JPEG 格式并在请求传入时附加到 POST 请求中，但这很容易导致请求相互叠加以及大量不必要的\
  \ CPU 占用。我建议使用`NSTimer`定期抓取屏幕图像，然后在后台线程中将其发送到 face.com 进行分析。当结果返回时，我们将在 HUD 层上绘制，以提供找到的属性的相关信息，然后淡出到背景中，直到下一次请求发送。\n\
  \n\n#### 使用 ASI-HTTP-Request 库\n\n在进一步推进之前，我们需要用到本章前文下载的那个库。找到之前存放的下载存档，将以下文件复制到你的项目中。由于我喜欢保持项目结构整洁清晰，我创建了一个名为\
  \ `ASI` 的新分组来存放这些文件。\n\n*   `ASIHTTPRequestConfig.h`\n*   `ASIHTTPRequestDelegate.h`\n\
  *   `ASIProgressDelegate.h`\n*   `ASICacheDelegate.h`\n*   `ASIHTTPRequest.h`\n\
  *   `ASIHTTPRequest.m`\n*   `ASIDataCompressor.h`\n*   `ASIDataCompressor.m`\n*\
  \   `ASIDataDecompressor.h`\n*   `ASIDataDecompressor.m`\n*   `ASIFormDataRequest.h`\n\
  *   `ASIInputStream.h`\n*   `ASIInputStream.m`\n*   `ASIFormDataRequest.m`\n*  \
  \ `ASINetworkQueue.h`\n*   `ASINetworkQueue.m`\n*   `ASIDownloadCache.h`\n*   `ASIDownloadCache.m`\n\
  *   `ASIAuthenticationDialog.h`\n*   `ASIAuthenticationDialog.m`\n*   `Reachability.h`（位于\
  \ `External/Reachability` 文件夹中）\n*   `Reachability.m`（位于 `External/Reachability`\
  \ 文件夹中）\n\n该库还需要一些引用，但因为我提前考虑到了，我们已经在章节前文添加了它们。\n\n让我们先退一步，思考一下 HTTP POST 请求的最佳放置位置。请记住，cocos2D\
  \ 应用与其他 iOS 应用一样，都是基于视图层次结构构建的。我们在 OpenGL 视图和相机图层之上叠加了两个自己的场景。请参考图 13–8。（这是一个逻辑模型，并非类的精确表示。）\n\
  \n![Image](img/1308.jpg)\n\n**图 13-8.** *场景的逻辑层次结构展示了叠加的视图。*\n\n向 face.com 发送的 POST\
  \ 请求将在单独的线程上执行。因此，我们希望返回代码能在可以与 HUD 层交互的层级进行解析。HUD 层正是我们实际创建叠加在界面上的图像和文本的地方，因此我们将公开一些方法来处理这些操作。\n\
  \n看来处理 POST 请求的最佳候选是 `FaceDetectionLayer`。如果我们能在那里处理 POST 请求，就无需从 `AppDelegate`\
  \ 穿越两个层级。\n\n让我们创建发送 POST 请求的方法，并用 `NSLog` 输出响应。然后，我们将创建 `NSTimer`，最后解析 JSON 响应。\n\
  \n#### 创建 POST 请求方法\n\n在 Xcode 中打开 `FaceDetectionLayer.m`。导入 `ASIFormDataRequest.h`\
  \ 和 `AppDelegate.h` 头文件。声明一个名为 `_sendingRequest` 的私有 `BOOL` 变量，用于跟踪 POST 请求是否正在进行中，并创建一个名为\
  \ `facialRecognitionRequest` 的 `void` 方法，该方法接收一个 `UIImage` 作为参数。更新后的 `FaceDetectionLayer.h`\
  \ 文件应该如代码清单 13–19 所示。\n\n**代码清单 13–19.** *更新后的 FaceDetectionLayer.h*\n\n```\n#import\
  \ <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n#import \"HUDLayer.h\"\n#import\
  \ \"ASIFormDataRequest.h\"\n#import \"AppDelegate.h\"\n\n@interface FaceDetectionLayer\
  \ : CCLayer {\n    HUDLayer *_hud;\n    BOOL _sendingRequest;\n}\n\n+ (CCScene *)scene;\n\
  - (id)initWithHUD:(HUDLayer *)hud;\n- (void)facialRecognitionRequest:(UIImage *)image;\n\
  @end\n```\n\n切换到 `FaceDetectionLayer.m`。创建如代码清单 13–20 所示的方法。\n\n**代码清单 13–20.**\
  \ *facialRecognitionRequest 方法*\n\n```\n- (void)facialRecognitionRequest:(UIImage\
  \ *)image {\n    NSLog(@\"Image width = %f height = %f\",image.size.width, image.size.height);\n\
  \n    if (!_sendingRequest) {   \n        _sendingRequest = YES;\n\n        NSAutoreleasePool\
  \ * pool = [[NSAutoreleasePool alloc] init];\n\n        NSData * imageData = UIImageJPEGRepresentation(image,\
  \ 90);\n\n        NSURL * url = [NSURL URLWithString:@\"http://api.face.com/faces/detect.json\"\
  ];\n\n        ASIFormDataRequest *request = [ASIFormDataRequest requestWithURL:url];\n\
  \        [request addPostValue:@\"your face.com api_key\" forKey:@\"api_key\"];\n\
  \        [request addPostValue:@\"your face.com api_secret\" forKey:@\"api_secret\"\
  ];\n        [request addData:imageData withFileName:@\"image.jpg\"\nandContentType:@\"\
  image/jpeg\" forKey:@\"filename\"];\n\n        [request startSynchronous];\n\n \
  \       NSError *error = [request error];\n        if (!error) {\n            NSString\
  \ *response = [request responseString];\n\n            NSLog(@\"Response: %@\",response);\n\
  \        } else {\n            NSLog(@\"Error: %d\",[error code]);\n        }\n\n\
  \        _sendingRequest = NO;\n\n        [pool drain];\n    }   \n}\n```\n\n从该方法顶部开始，我们首先通过引用\
  \ `_sendingRequest` 这个 `BOOL` 变量来检查是否有另一个调用正在进行。如果没有正在进行的当前调用，我们将标志设置为 `YES`，以防止任何其他调用（在单独的线程上）与此事务冲突。\n\
  \n接下来，我们分配一个 `NSAutoreleasePool`。`NSAutoreleasePool` 类（来自 Apple 开发者文档）用于支持 Cocoa\
  \ 的引用计数内存管理系统。自动释放池存储那些在池本身被排空时会收到释放消息的对象。\n\n在引用计数环境中（与使用垃圾回收的环境相对），一个 `NSAutoreleasePool`\
  \ 对象包含那些已收到自动释放消息的对象，当池被排空时，它会向每个这些对象发送一条释放消息。因此，向对象发送 `autorelease` 而不是 `release`\
  \ 会将该对象的生命周期至少延长到池本身被排空为止（如果对象随后被保留，则可能更长）。一个对象可以被多次放入同一个池中，在这种情况下，它每次被放入池中时都会收到一条释放消息。\n\
  \n在我们设置好 `NSAutoreleasePool` 之后，我们创建一个 `NSData` 对象来保存来自 JPEG 图像的原始图像数据。我们设置好目标为\
  \ face.com 的 `NSURL` REST 端点、HTTP POST 值（其中之一是原始图像数据），然后开始向 face.com 进行同步调用。\n\n\
  稍后我们会添加 JSON 解析逻辑。目前，我们只是记录输出。\n\n为了从 `FaceDetectionLayer` 发送 POST 请求，我们需要从 `AppDelegate`\
  \ 引用该类。如果你现在这样做，我们就会在两个头文件之间创建循环依赖。这很容易修复，因为我们的解决方案目前还不算复杂。将 `import AppDelegate.h`\
  \ 语句从 `FaceDetectionLayer.h` 移动到 `FaceDetectionLayer.m`，我们就不会遇到这个问题了。如果你遇到以 `expected\
  \ specifier-qualifier-list before...` 开头的编译器错误，说明你在项目中的其他地方仍然存在循环引用。\n\n让我们创建 `NSTimer`\
  \ 以及从 `AppDelegate` 向 `FaceDetectionLayer` 发送 `UIImage` 对象的过程，这样我们就为 POST 请求做好了准备。\n\
  \n\n\n#### 创建 `NSTimer`\n\n在 Xcode 中打开 `AppDelegate.h`。创建一个类型为 `FaceDetectionLayer`\
  \ 的私有变量 `_layer`，以及另一个类型为 `NSTimer` 的私有变量 `_timer`。我们对头文件所做的更改如代码清单 13-21 所示。\n\n\
  **代码清单 13-21.** *对 `AppDelegate.h` 的更改*\n\n```\n@interface AppDelegate : NSObject\
  \ <UIApplicationDelegate,\nAVCaptureVideoDataOutputSampleBufferDelegate> {\n   \
  \ …\nFaceDetectionLayer *_layer;\nNSTimer *_timer;\n}\n…\n```\n\n切换到 `AppDelegate.m`。找到代码清单\
  \ 13-22 中所示的那一行。\n\n**代码清单 13-22.** *在 `AppDelegate.m` 中找到这一行……*\n\n```\n[[CCDirector\
  \ sharedDirector] runWithScene: [FaceDetectionLayer scene]];\n```\n\n这一行使用了 `CCDirector`\
  \ 单例来启动一个默认的 `FaceDetectionLayer` 场景。我们在 `FaceDetectionLayer` 中有一个静态方法，用于创建场景。该方法会连同\
  \ `HUDLayer` 一起启动场景。为了避免管理太多实例或创建另一组单例类，我们将把部分功能从静态的 `scene` 方法移到 `AppDelegate`\
  \ 中。\n\n用代码清单 13-23 中的代码替换代码清单 13-22 中的那一行。\n\n**代码清单 13-23.** *以不同方式启动 `FaceDetectionLayer`*\n\
  \n```\nCCScene *scene = [CCScene node];\nHUDLayer *hud = [HUDLayer node];\n[scene\
  \ addChild:hud z:1];\n_layer = [[[FaceDetectionLayer alloc] initWithHUD:hud] autorelease];\n\
  \ [scene addChild:_layer];\n\n [[CCDirector sharedDirector] runWithScene: scene];\n\
  ```\n\n这段代码取自 `FaceDetectionLayer` 类中的静态 `scene` 方法。如果现在运行应用程序，它看起来应该和之前差不多。你会看到相机视图，方向正确，并且占满整个屏幕。\n\
  \n将代码清单 13-24 中的方法添加到 `AppDelegate.m` 中。\n\n**代码清单 13-24.** *添加后台方法*\n\n```\n-(void)backgroundRequest:(UIImage\
  \ * ) image{\n    NSAutoreleasePool * pool = [[NSAutoreleasePool alloc] init];\n\
  \n    UIInterfaceOrientation orient =  [UIApplication sharedApplication].statusBarOrientation;\n\
  \    UIImage * rotatedImage = image;\n    switch (orient) {\n        case UIInterfaceOrientationPortrait:\n\
  \            NSLog(@\"设备方向为竖屏\");\n            break;\n        case UIInterfaceOrientationPortraitUpsideDown:\n\
  \            NSLog(@\"设备方向为倒竖屏\");\n            break;\n        case UIInterfaceOrientationLandscapeLeft:\n\
  \            rotatedImage = [self rotateImage:image orientation: UIImageOrientationRight];\n\
  \            NSLog(@\"设备方向为左横屏\");\n            break;\n        case UIInterfaceOrientationLandscapeRight:\n\
  \            rotatedImage = [self rotateImage:image orientation: UIImageOrientationLeft];\n\
  \            NSLog(@\"设备方向为右横屏\");\n            break;\n    };\n\n    [_layer facialRecognitionRequest:rotatedImage];\n\
  \n    [pool drain];\n}\n```\n\n这个方法将是我们之前在 `FaceDetectionLayer` 类中创建的 `facialRecognitionRequest`\
  \ 方法的调用者。我们再次使用 `NSAutoReleasePool` 来管理对象从内存中的自动释放。接着，我们检查设备的方向。同样，我所有测试都使用横向右方向，但这个方法应该足以正确地重新调整图像以适配其他方向。基本上，我们必须这样做，以便将正立的图像发送给\
  \ face.com。如果我们发送侧向或倒立的图像，face.com 将无法识别图片中的人脸。\n\n完成图像旋转后，我们将更新后的图像对象发送给 `FaceDetectionLayer`\
  \ 的 `facialRecognitionRequest` 方法。好了，让我们创建定时器回调，然后再创建我们的 `NSTimer`。回调将是每次定时器超时时触发的事件（我并非有意押韵，只是事实如此）。这应该是一个简单的方法。我们只需每隔几秒在新线程上调用新的\
  \ `backgroundRequest` 方法。将代码清单 13-25 中的方法复制到 `backgroundRequest` 方法上方。\n\n**代码清单\
  \ 13-25.** *定时器回调方法*\n\n```\n-(void) timerCallback {\n    [NSThread detachNewThreadSelector:@selector(backgroundRequest:)\
  \ toTarget:self withObject:_imageView.image];\n}\n```\n\n我们只是分离一个新线程来运行 `backgroundRequest`\
  \ 方法，并将 `delegate` 分配给 `self`。\n\n因此，此过程的最后一步是启动定时器。在 `applicationDidFinishLaunching`\
  \ 方法的最后一行，我们启动了 `AVCaptureSession`。就在那一行之前，添加代码清单 13-26 中的代码。\n\n**代码清单 13-26.**\
  \ *启动一个五秒定时器*\n\n```\n_timer = [NSTimer scheduledTimerWithTimeInterval:5.0 target:self\n\
  selector:@selector(timerCallback) userInfo:nil repeats:YES];\n```\n\n粗体代码指示了在两次执行之间重置计时应在何处进行。如果你的网络连接速度非常慢，可能需要增加此设置。\n\
  \n如果你现在运行这个项目，并让它运行几秒钟，你应该会在调试控制台中看到类似图 13-9 的内容。\n\n![Image](img/1309.jpg)\n\n\
  **图 13-9.** *输出显示了 face.com 请求的循环执行情况。*\n\n#### 解析输出\n\n接下来，我们需要解析来自 face.com 的输出。为此，我们将使用本章早些时候从\
  \ GitHub 下载的 JSON-Framework 库。\n\n找到你解压下载文件的目录。其中有一个名为 `Classes` 的子目录。打开该目录。与 ASI-HTTP-Request\
  \ 库一样，Xcode 中的组织方式取决于个人偏好。我在 Xcode 项目中创建了一个名为 `JSON` 的 `Group`，但这并非必需。将 `Classes`\
  \ 目录中的所有文件复制到 Xcode 项目中。确保勾选**将项目复制到目标组的文件夹中（如果需要）**选项。\n\n在 Xcode 中打开 `FaceDetectionLayer.h`\
  \ 并导入 `SBJson.h` 头文件。切换到 `FaceDetectionLayer.m`，找到代码清单 13-27 中所示的代码行。\n\n**代码清单\
  \ 13-27.** *找到这一部分……*\n\n```\nif (!error) {\n            NSString *response = [request\
  \ responseString];\n```\n\n在代码清单 13-27 中的代码之后，我们将添加逻辑来解析 JSON 响应。在开始之前，让我们再看一下来自\
