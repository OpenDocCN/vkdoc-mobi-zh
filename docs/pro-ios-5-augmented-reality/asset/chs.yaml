  \ `initWithHUD` 的新方法，就像我们在第 7 章的示例中所做的那样。\n\n新的 `FaceDetectionLayer.h` 文件应如代码清单\
  \ 13-1 所示。\n\n**代码清单 13-1.** *更新后的 `FaceDetectionLayer.h`*\n\n`#import <Foundation/Foundation.h>`\n\
  `#import \"cocos2d.h\"`\n**`#import \"HUDLayer.h\"`**\n\n`@interface FaceDetectionLayer\
  \ : CCLayer {`\n**`HUDLayer *_hud;`**\n`}`\n\n**`+ (CCScene *)scene;`**\n**`- (id)initWithHUD:(HUDLayer\
