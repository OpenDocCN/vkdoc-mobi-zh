  YAW: %f\", currentAttitude.yaw];\n    yawProgressView.progress = ABS(currentAttitude.yaw);\n\
  ```\n\n刚添加的代码块应该看起来很熟悉。我们只是设置 UI 元素中的可视化值以便快速调试。运行应用，您应能看到类似于图 4–7 所示的效果。\n\n可以看到，Xcode\
  \ 控制台中显示的数值与屏幕上的值并不完全一致。格式相同，但我们现在看到的是每个轴上旋转的弧度测量值。\n\n在进入本书后续的示例之前，我们先介绍一个名为 cocos2D\
  \ 的框架。我们将使用该框架实现动画和 2D 游戏功能。cocos2D 提供了一些非常简单的函数，用于将弧度转换为角度。\n\n![图片](img/0407.jpg)\n\
  \n**图 4–7.** *从 CMMotionManager 读取陀螺仪数据*\n\n运动管理器会自动融合加速度计和陀螺仪数据。这种方法缺失的一个读数是旋转速率。让我们快速构建一个示例，演示如何获取该指标并将其与\
  \ UI 元素关联。这将是增强现实编程中的常见任务。大多数情况下，当手机旋转时，您需要保持叠加在视图上的元素方向正确。\n\n#### 旋转速率\n\n在 Xcode\
  \ 中打开`SecondView.xib`。在视图已有内容的上方添加一个`UIImageView`对象。为该元素分配一个更偏向水平方向的图像。本章的 GitHub\
  \ 仓库中附带了一张战斗机图片，可供使用。在头文件中定义`UIImageView`，并在实现文件中合成/释放该对象。将代码清单 4–13 中的代码添加到`readGyroscope`方法的末尾。\n\
  \n**代码清单 4–13.** *添加到 readGyroscope 方法末尾*\n\n```\nfloat rotation;\n    float rate\
  \ = motionManager.gyroData.rotationRate.z;\n        if (fabs(rate) > .2) {\n   \
  \         float direction = rate > 0 ? 1 : -1;\n            rotation += direction\
  \ * M_PI/90.0;\nimageView.transform = CGAffineTransformMakeRotation(rotation);\n\
  \            NSLog(@\"Rotation: %f\", rotation);\n        }\n```\n\n该方法将使用运动管理器的`gyroData`属性获取\
  \ Z 轴的旋转速率。这里使用了一个新函数，根据 Z 轴的旋转来旋转图像。我们将在本书后续的深入示例中更详细地探讨此类任务的各种实现方法。当然，我们尚未开始实际监控陀螺仪，因此在看到有用结果之前需要先进行设置。按代码清单\
  \ 4–14 所示更新`viewDidLoad`方法。\n\n**代码清单 4–14.** *更新后的 viewDidLoad 方法*\n\n```\n- (void)viewDidLoad\n\
  {\n    self.motionManager = [[[CMMotionManager alloc] init] autorelease];\n    motionManager.deviceMotionUpdateInterval\
  \ = 1.0/60.0;\n\n    if (motionManager.isDeviceMotionAvailable) {\n        [motionManager\
  \ startDeviceMotionUpdates];\n        [motionManager startGyroUpdates];\n    }\n\
  \    [super viewDidLoad];\n}\n```\n\n在继续深入之前，务必注意这段代码并未停止监听陀螺仪读数。实现合理的开始/停止监听传感器读数的例程非常重要。\n\
  \n继续运行项目。您会发现测试有些困难。我们需要验证的是：当我们按下 Test 按钮时，若 Z 轴旋转速率显著增加，图像是否会旋转到与 Z 轴相同的角度。主要难点在于我们必须同时按下按钮并移动设备，这只会导致旋转速率的微小变化，如图\
  \ 4–8 所示。\n\n![图片](img/0408.jpg)\n\n**图 4–8.** *测试陀螺仪数据的手动读取（注意图像的轻微滚动效果）*\n\n与其通过按钮点击手动获取读数，不如使用`NSTimer`类设置时间间隔并回调另一个方法。\n\
  \n将代码清单 4–13 中的代码块重构为一个新方法，如代码清单 4–15 所示。\n\n**代码清单 4–15.** *重构后的代码——新方法 doGyroUpdate*\n\
  \n```\n-(void)doGyroUpdate {\n    float rotation;\n    float rate = motionManager.gyroData.rotationRate.z;\n\
  \    if (fabs(rate) > .2) {\n       float direction = rate > 0 ? 1 : -1;\n     \
  \  rotation += direction * M_PI/90.0;\n       imageView.transform = CGAffineTransformMakeRotation(rotation);\n\
  \        NSLog(@\"Rotation: %f\", rotation);\n    }\n}\n```\n\n开始监听陀螺仪事件后，创建一个`NSTimer`来调用我们的新方法。首先在头文件中声明`NSTimer`（我将其命名为`timer`）。在`viewDidLoad`方法中创建定时器。代码应类似于代码清单\
  \ 4–16。再次提醒，本示例中我们没有进行资源清理，因为我们的目标是读取数据。该应用没有 UI 流程。\n\n**代码清单 4–16.** *设置 NSTimer*\n\
  \n\n\n```objective-c\ntimer = [NSTimer scheduledTimerWithTimeInterval:1/30.0\n \
  \                target:self\n                 selector:@selector(doGyroUpdate)\n\
  \                 userInfo:nil\n                 repeats:YES];\n```\n\n如果再次运行项目，你会在控制台中看到更多输出，同时设备对旋转的响应也会更平滑。陀螺仪类正在以亚秒级频率更新数据，我们随之旋转图像来匹配这些读数。\n\
  \n### 磁力计\n\n磁力计是一种用于测量设备周围磁场强度的传感器。假设设备附近没有强磁场，该读数将与地球的环境磁场相关，从而让我们能够利用这些读数来确定设备的方向。设备的方向是指其相对于北极的地磁方向。苹果在其开发者文档中指出（大多数其他相关参考资料也持相同观点），地磁方向与相对于地理北极的真实方向可能因您的位置不同而有很大差异。\n\
  \n测量设备的地磁方向与我们测量陀螺仪或加速度计读数的方式类似。让我们扩展项目，使其也显示设备方向。\n\n在 Xcode 中，向项目添加一个新的 `UIViewController`\
  \ 类。将其命名为 `headingViewController`，并确保通过 XIB 文件创建界面。我使用谷歌图片搜索找到了一张无版权的指南针图片。该图片包含在\
  \ GitHub 上的项目中，也可从 Apress 网站 (`www.apress.com`) 的“源代码/下载”区域获取。如果您使用自己的图片，请确保“北”位于图片顶部中央。我们将根据设备方向旋转这张图片，因此希望从与垂直轴成\
  \ 0 度的角度开始，以尽可能简化操作。准备好图片后，将其添加到 Xcode 项目中。\n\n#### 磁力计可用性\n\n正如我们在第 3 章中讨论的，`CLLocationManager`\
  \ 需要用户启用位置更新才能正常运行。位置管理器还能返回设备的真实方向和地磁方向。然而，只有当用户启用了位置更新时，设备的真实方向才可用。而无论用户是否偏好启用位置更新，地磁方向更新始终可用。这是因为方向信息本身不会损害用户隐私，因此无需获得批准。\n\
  \n简而言之，您无需像使用其他传感器那样，在使用磁力计前检查其可用性。\n\n#### 校准\n\n由于很可能存在两个读数（地磁方向与真实方向），iOS 提供了相应功能，允许我们校准设备以确定两者之间的差异。`CLLocationManager`\
  \ 定义了一个名为 `locationManagerShouldDisplayHeadingCalibration` 的委托方法。该方法会覆盖显示一个方向图像，指示用户以\
  \ 8 字形模式旋转设备，直到位置管理器能够区分任何局部磁场与地球磁场。位置管理器以真实方向作为参考。\n\n#### 看看我们指向何方\n\n在 Interface\
  \ Builder 中打开 `headingViewController.xib`。添加一个 `UIImage` 输出口和两个 `UILabel` 输出口。你可以在图\
  \ 4-9 中看到示例界面的设置方式。\n\n![Image](img/0409.jpg)\n\n**图 4-9.** *此为磁力计界面（`headingViewController.xib`）的设置。*\n\
  \n在辅助编辑器中打开 `headingViewController.h`，按住 Ctrl 键，将 `UIImage` 和一组 `UILabel` 从 Interface\
  \ Builder 拖拽到接口文件中，如图 4-10 所示。\n\n![Image](img/0410.jpg)\n\n**图 4-10.** *此为 IBOutlets\
  \ 的设置属性。*\n\n确保导入 `<CoreLocation/CoreLocation.h>` 头文件，并将 `headingViewController`\
  \ 声明为 `CLLocationManagerDelegate`。\n\n完成上述步骤后，在 Xcode 中切换到 `headingViewController.m`。用代码清单\
  \ 4-17 中的代码更新 `viewDidLoad` 方法。\n\n**代码清单 4-17.** *新的 `viewDidLoad` 方法*\n\n```objective-c\n\
  - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional setup\
  \ after loading the view from its nib.\n\n    CLLocationManager *locationManager\
  \ = [[CLLocationManager alloc] init];\n    locationManager.delegate = self;\n  \
  \  locationManager.headingFilter = 5;\n    if ([CLLocationManager locationServicesEnabled]\
  \ && [CLLocationManager headingAvailable]) {\n        [locationManager startUpdatingHeading];\n\
  \        [locationManager startUpdatingLocation];\n    } else {\n        NSLog(@\"\
  Error starting location updates\");\n    }\n}\n```\n\n在继续之前，我们先简单梳理一下这段代码。首先，我们设置\
  \ `CLLocationManager` 实例。这应该与我们在第 3 章中的操作类似。按预期将 `delegate` 设置为 `self`，然后引入了一个新属性。`headingFilter`\
  \ 属性定义了更新委托方法所需的变化阈值。我们将该值设置为 5（度），因此位置管理器仅在方向变化超过 5 度时更新委托。\n\n我之前提到过，你无需检查磁力计的可用性。那么，为什么我在\
  \ `viewDidLoad` 中包含了检查呢？方向信息仅在 iPhone 3Gs 及更高版本中可用。此验证可确保用户使用的是较新的硬件。另外，值得注意的是，我使用的是类方法\
  \ `locationServicesEnabled` 和 `headingAvailable`。网上许多示例应用程序使用实例方法进行此检查。实例方法在 iOS\
  \ 4 中已被弃用。请确保在您的应用程序中使用类方法。\n\n最后，一旦确认读数可用，我们便启用了位置和方向更新。\n\n接下来，我们必须添加委托方法来处理更新，并在界面中反映变化。在\
  \ `viewDidLoad` 方法之后，添加代码清单 4-18 中的方法。\n\n**代码清单 4-18.** *`didUpdateHeading` 委托方法*\n\
  \n```objective-c\n- (void)locationManager:(CLLocationManager *)manager didUpdateHeading:(CLHeading\
  \ *)newHeading {\n    if (newHeading.headingAccuracy > 0) {\n        float magneticHeading\
  \ = newHeading.magneticHeading;\n        float trueHeading = newHeading.trueHeading;\n\
  \n        magneticHeadingLabel.text = [NSString stringWithFormat:@\"%f\", magneticHeading];\n\
  \        trueHeadingLabel.text = [NSString stringWithFormat:@\"%f\", trueHeading];\n\
  \n        float heading = -1.0f * M_PI * newHeading.magneticHeading / 180.0f;\n\
  \        compassImage.transform = CGAffineTransformMakeRotation(heading);\n    }\n\
  }\n```\n\n你可以看到，我们首先检查了 `headingAccuracy` 的值，然后再执行其他操作。如果位置更新未启用，`headingAccuracy`\
  \ 的值将被设置为 -1。检查该值是否大于零可确保我们从磁力计和位置管理器都获得了正确的读数。我们只是简单地将两个 `UILabel` 设置为读数中的值，这样你可以看到它们之间的细微差别，然后旋转图片。我们使用\
  \ `CGAffineTransformMakeRotation` 方法来旋转图片。我们将其乘以负常数，再乘以 pi，然后除以 180。之所以用 180，是因为方向始终相对于设备的顶部，无论其朝向如何。我们将在下一部分讨论这一点。\n\
  \n在物理设备上运行项目。你将看到类似于图 4-11 的结果。\n\n![Image](img/0411.jpg)\n\n**图 4-11.** *同时检索真实方向和地磁方向的值。*\n\
  \n\n\n### 处理方向变化\n\n当您运行示例应用时，请测试设备处于横屏模式时会发生什么。您会看到“北”对应的是设备的顶部，而非可见屏幕的顶部。如果您在不改变航向的情况下将设备横置，设备报告的航向将指向您的左侧或右侧（具体取决于您旋转的方向）。我们可以通过快速修改类来解决这个问题。\n\
  \n在 Interface Builder 中打开 `headingViewController.xib`。为界面添加另一个 `UILabel IBOutlet`。将属性命名为\
  \ `orientationLabel`，并像处理其他输出口一样，将其添加到 `headingViewController.h` 中。在接口文件中声明代码清单\
  \ 4–19 所示的方法。\n\n**代码清单 4–19.** *辅助方法*\n\n```\n- (float)heading:(float)heading fromOrientation:(UIDeviceOrientation)\
  \ orientation;\n- (NSString *)stringFromOrientation:(UIDeviceOrientation) orientation;\n\
  ```\n\n切换到 `headingViewController.m`，添加代码清单 4–20 中所示的两个方法。\n\n**代码清单 4–20.** *基于方向获取角度的方法*\n\
  \n```\n- (float)heading:(float)heading fromOrientation:(UIDeviceOrientation)orientation\
  \ {\n    float correctedHeading = heading;\n\n    switch (orientation) {\n     \
  \   case UIDeviceOrientationPortrait:\n            break;\n        case UIDeviceOrientationPortraitUpsideDown:\n\
  \            correctedHeading = heading + 180.0f;\n            break;\n        case\
  \ UIDeviceOrientationLandscapeLeft:\n            correctedHeading = heading + 90.0f;\n\
  \            break;\n        case UIDeviceOrientationLandscapeRight:\n         \
  \   correctedHeading = heading - 90.0f;\n            break;\n        default:\n\
  \            break;\n    }\n    while ( heading > 360.0f ) {\n        correctedHeading\
  \ = heading - 360;\n    }\n    return correctedHeading;\n}\n\n- (NSString *)stringFromOrientation:(UIDeviceOrientation)\
  \ orientation {\n    NSString *orientationString;\n    switch (orientation) {\n\
  \        case UIDeviceOrientationPortrait:\n            orientationString = @\"\
  Portrait\";\n            break;\n        case UIDeviceOrientationPortraitUpsideDown:\n\
  \            orientationString = @\"Portrait Upside Down\";\n            break;\n\
  \        case UIDeviceOrientationLandscapeLeft:\n            orientationString =\
  \ @\"Landscape Left\";\n            break;\n        case UIDeviceOrientationLandscapeRight:\n\
  \            orientationString = @\"Landscape Right\";\n            break;\n   \
  \     case UIDeviceOrientationFaceUp:\n            orientationString = @\"Face Up\"\
  ;\n            break;\n        case UIDeviceOrientationFaceDown:\n            orientationString\
  \ = @\"Face Down\";\n            break;\n        case UIDeviceOrientationUnknown:\n\
  \            orientationString = @\"Unknown\";\n            break;\n        default:\n\
  \            orientationString = @\"Not Known\";\n            break;\n    }\n  \
  \  return orientationString;\n}\n```\n\n第一个方法根据设备的方向调整航向。这是一种相当基础的校正方式。您可以结合陀螺仪和方向信息，实现更复杂、更精确的校正。就本示例而言，我们假设设备完全旋转为竖屏或横屏模式，因此我们依据\
  \ 90 度的倍数进行校正。\n\n第二个方法根据设备的方向构建一个人类可读的字符串。我在几篇在线文章中找到了这个函数。我不确定这个函数归功于谁，但它非常实用。\n\
  \n我们需要对 `didUpdateHeading` 代理方法进行调整，然后就可以测试我们校正后的示例应用了。用代码清单 4–21 中的代码更新 `didUpdateHeading`\
  \ 方法。\n\n**代码清单 4–21.** *新的 didUpdateHeading 方法*\n\n```\n- (void)locationManager:(CLLocationManager\
  \ *)manager didUpdateHeading:(CLHeading *)newHeading {\n    if (newHeading.headingAccuracy\
  \ > 0) {\n//float magneticHeading = newHeading.magneticHeading;\n        //float\
  \ trueHeading = newHeading.trueHeading;\n        UIDevice *device = [UIDevice currentDevice];\n\
  \        orientationLabel.text = [self stringFromOrientation:device.orientation];\n\
  \n        float magneticHeading = [self heading:newHeading.magneticHeading fromOrientation:device.orientation];\n\
  \        float trueHeading = [self heading:newHeading.trueHeading fromOrientation:device.orientation];\n\
  \n        magneticHeadingLabel.text = [NSString stringWithFormat:@\"%f\", magneticHeading];\n\
  \        trueHeadingLabel.text = [NSString stringWithFormat:@\"%f\", trueHeading];\n\
  \n        float heading = -1.0f * M_PI * newHeading.magneticHeading / 180.0f;\n\
  \        compassImage.transform = CGAffineTransformMakeRotation(heading);\n    }\n\
  }\n```\n\n让我们过一遍其中加粗的代码块。首先，我们初始化了一个代表用户实际手机的 `UIDevice` 实例。然后，我们使用辅助方法构建了一个人类可读的字符串，并设置了方向标签的值。接着，我们使用辅助方法，根据设备的方向计算了校正后的航向值。方法的其余部分保持不变。\n\
  \n在您的实体设备上运行该项目。图 4–12 和 图 4–13 展示了结果。请密切关注方向标签。您会看到，在横屏模式下，航向已经被校正。\n\n![Image](img/0412.jpg)\n\
  \n**图 4–12.** *在竖屏模式下显示航向。*\n\n![Image](img/0413.jpg)\n\n**图 4–13.** *在横屏模式下显示航向。*\n\
  \n### 总结\n\n在本章中，我们在访问各种传感器方面做了大量工作。在阅读过程中，这看起来可能有点底层或偏离主题，但当我们开始构建自己的 AR 应用时，这会变得非常有用。\n\
  \n我们讨论了加速度计、陀螺仪以及它们与 Core Motion 框架的结合。然后，我们介绍了磁力计，并整合了一个能帮助我们保持方向感的示例应用。我们正在逐步完成构建我们自己的\
  \ AR 应用所需的一切工具。\n\n接下来，在第 5 章中，我们将探讨声音和用户反馈。\n\n## 第 5 章\n\n## 声音与用户反馈\n\n无声电影至今仍具有怀旧价值，是娱乐史上至关重要的一部分。然而，无声电子游戏或无声交互式应用似乎并不属于这一类。用户体验需要具有吸引力。辅助功能选项有助于确保所有用户都能体验到相同水平的交互。在本章中，我们将讨论如何为事件添加效果，以及如何在您的应用中添加主动反馈，例如振动。\n\
  \n### 音频数据格式\n\n让我们从基础开始。iOS 中有大量的声音选项可供选择。我们将首先讨论不同的格式及其细微差别，然后讨论如何在不同格式之间进行转换。请查看表\
  \ 5–1，其中概述了不同的支持格式。\n\n![Image](img/t0501.jpg)\n\n![Image](img/t0501a.jpg)\n\n####\
  \ 那么，哪种数据格式适合我？\n\n遗憾的是，对这个问题的答案是“视情况而定”。您的实际使用场景将决定哪种声音格式最适合您的应用。例如，如果空间不是问题，您可以使用线性\
  \ PCM。这将是播放音频最快的方式，并且在播放期间不会影响 CPU 性能（因为它不必同时解压文件）。然而，如果空间是个问题，您可能希望为背景音乐或较大的文件使用\
  \ AAC，以利用其压缩优势；而为音效和小文件使用 IMA4，以利用其对 16 位文件的优势。\n\n\n\n#### 关于文件格式\n\n数据格式是一回事，但我们在哪里以及如何存储这些文件呢？iOS\
  \ 支持多种不同的文件格式，包括 MPEG-1 (`.mp3`)、MPEG-2 (`.aac`)、AIFF、WAVE 和 CAF。CAF 是 iOS 上首选的格式，因为它可以包含我们在表\
  \ 5–1 中列出的任何数据格式。\n\n#### 比特率与音质\n\n音频播放的场景决定了该特定事件所需的音质。例如，语音应用与播放交响乐团表演的应用有着截然不同的声音要求。\n\
  \n音质可以通过使用称为比特率的变量来调整音频文件。比特率是文件每秒使用的字节数。只有表 5–1 中提到的少数几种格式支持比特率的配置。表 5–2 展示了一些常见的比特率。\n\
  \n![Image](img/t0502.jpg)\n\n![Image](img/t0502a.jpg)\n\n#### 采样率\n\n音频的采样率定义了每单位时间的样本数。通常，它以每秒样本数来度量，或者更常见地，用赫兹（Hz）作为速率单位。如果你不知道，采样频率的倒数就是采样间隔，即样本之间的时间。\n\
  \n表 5–3 描述了一些常见的采样率。\n\n![Image](img/t0503.jpg)\n\n#### 转换音频以便在 iOS 中使用\n\n你可以从互联网上的各个地方下载样本。诸如\
  \ `audiomicro.com` 和 `soundsnap.com` 之类的网站提供各类声音的免版税样本。在 `freesound.org` 上也有知识共享许可的声音。大多数情况下，这些样本的格式可能并非你增强应用所需的精确格式。因此，你应该熟悉可用的工具，以帮助你转换其中的一些媒体格式。\n\
  \n让我们来演练一下关于测试媒体文件的三个典型活动。首先，我们将获取我们考虑使用的文件的信息，然后将文件转换为另一种格式，最后测试并播放该文件。\n\n本章的示例代码可在\
  \ GitHub 上获取，地址为 [`https://github.com/kyleroche/Professional_iOS_AugmentedReality`](https://github.com/kyleroche/Professional_iOS_AugmentedReality)。如果你的本地机器上没有示例音频文件，你可以跟随\
  \ GitHub 上的 Xcode 项目中的示例进行操作。\n\n##### 获取媒体文件信息\n\nMac OS X 中有一个名为 `afinfo` 的实用工具。该工具可从终端（Terminal）使用。代码清单\
  \ 5–1 显示了我将本章 GitHub 仓库中的示例文件传入此命令后的输出。\n\n**代码清单 5–1.** *`afinfo waterfall.caf`*\n\
  \n```\nKyle-Roches-MacBook-Pro-2:iOS_AR_Ch5_SoundUserFeedback kyleroche$ afinfo\
  \ waterfall.caf\nFile:           waterfall.caf\nFile type ID:   caff\nData format:\
  \     1 ch, 44100 Hz, 'lpcm' (0x0000000C) 16-bit little-endian signed integer\n\
  \                no channel layout.\nestimated duration: 1.950204 sec\naudio bytes:\
  \ 172008\naudio packets: 86004\naudio 86004 valid frames + 0 priming + 0 remainder\
  \ = 86004\nbit rate: 705600 bits per second\npacket size upper bound: 2\naudio data\
  \ file offset: 4096\noptimized\nsource bit depth: I16\nsound check:\n    approximate\
  \ duration in seconds         1.95\n----\n```\n\n输出的关键部分已用粗体高亮显示。其中一项是 `Data format`（数据格式）。这就是我们之前提到的采样率。`44100\
  \ Hz` 常用于 CD 音质音频，并推荐在 iOS 应用中使用。接下来，**比特率**被高亮显示。这并非我们之前提到的特定每秒速率，但它属于标准音频质量的范围。最后，在最后一行，`afinfo`\
  \ 返回了**以秒为单位的近似持续时间**。如果你将声音用于游戏或时间线导向的方式，这一点很重要。\n\n尝试使用 `afinfo` 做些实验。我曾针对我的 iTunes\
  \ 资料库运行它，以查看我导入的旧音乐与从 iTunes 下载的新音乐之间的不同采样。代码清单 5–2 显示了一首下载歌曲的输出示例。\n\n**代码清单 5–2.**\
  \ *iTunes 文件的 `afinfo` 结果*\n\n```\nKyle-Roches-MacBook-Pro-2:Ukulele Songs kyleroche$\
  \ afinfo 10\\ You\\'re\\ True.m4a\nFile:           10 You're True.m4a\nFile type\
  \ ID:   m4af\nData format:     2 ch,  44100 Hz, 'aac ' (0x00000000) 0 bits/channel,\
  \ 0 bytes/packet, 1024 frames/packet, 0 bytes/frame\nChannel layout: Stereo (L R)\n\
  estimated duration: 203.333333 sec\naudio bytes: 6491497\naudio packets: 8759\n\
  audio 8967000 valid frames + 2112 priming + 104 remainder = 8969216\nbit rate: 255340\
  \ bits per second\npacket size upper bound: 1197\naudio data file offset: 594724\n\
  optimized\nformat list:\n[ 0] format:     2 ch,  44100 Hz, 'aac ' (0x00000000) 0\
  \ bits/channel, 0 bytes/packet, 1024 frames/packet, 0 bytes/frame\n     Channel\
  \ layout: Stereo (L R)\nsource bit depth: I16\nsound check:\n    sc ave perceived\
  \ power coeff             2973 3040\n    sc max perceived power coeff          \
  \   16060 12146\n    sc peak amplitude msec                   26006 25263\n    sc\
  \ max perceived power msec              25263 24520\n    sc peak amplitude     \
  \                   32766 32766\n----\n```\n\n查看输出，最大的区别是 `sound check` 部分的信息量增加了。显然，更高质量的音频文件拥有更多可用信息。\n\
  \n现在我们有了一个可以用来验证媒体文件的比特率、采样率和格式的工具。接下来，让我们看看如何将声音文件转换为适当的格式。\n\n##### 转换文件类型\n\n\
  我们使用 GitHub 项目中的同一个示例文件进行初步测试。是时候介绍一个名为 Audio File Convert（即 `afconvert`）的新工具了。Audio\
  \ File Convert 会将源音频文件转换为具有指定文件和数据类型的新音频文件。代码清单 5–3 显示了 `afconvert` 的用法说明。\n\n**代码清单\
  \ 5–3.** *`afconvert` 用法说明*\n\n```\nUsage:\nafconvert [option...] input_file [output_file]\n\
  \    Options may appear before or after the direct arguments. If output_file\n \
  \   is not specified, a name is generated programmatically and the file\n    is\
  \ written into the same directory as input_file.\nafconvert input_file [-o output_file\
  \ [option...]]...\n    Output file options apply to the previous output_file. Other\
  \ options\n    may appear anywhere.\nHelp options:\n    { -hf | --help-formats }\n\
  \        print a list of supported file/data formats\n    { -h | --help }\n    \
  \    print help\n```\n\n你可以使用 `afconvert` 来切换文件格式、媒体格式，或以不同的比特率保存文件。让我们通过比特率和示例文件进行实验，以熟悉\
  \ `afconvert`。在终端窗口中运行代码清单 5–4 中显示的命令。\n\n**代码清单 5–4.** *使用 `afconvert` 更改比特率*\n\
  \n```\nafconvert -d aac -f 'caff' -b 32768 waterfall.caf waterfallNew.caf\n```\n\
  \n如果你检查目录，你会注意到一个名为 `waterfallNew.caf` 的新文件已被创建。我们使用了 `-d` 选项来设置数据格式，`-f` 选项来设置文件格式，`-b`\
  \ 选项来设置比特率。我们先将要转换的现有文件传递给 `afconvert`，然后是目标文件。如果你在新文件上运行 `afinfo` 工具，你将看到比特率上的差异。\n\
  \n##### 测试你的新声音\n\n我想提到的最后一个实用工具是 `afplay`。这是另一个命令行实用工具，可以让你快速测试音频文件。只需传递你想要播放的文件名，它就会通过你的默认输出硬件播放该文件。\n\
  \n\n\n### 在 iOS 应用中播放声音\n\n让我们将其中一些文件添加到 iOS 应用中。同样，本章的代码可在 GitHub 上获取，但如果你希望从头开始实践，请创建一个以\
  \ **iPhone** 为目标设备的标签栏应用。\n\n打开 `FirstView.xib` 并设置界面，如图 5-1 所示。\n\n![图片](img/0501.jpg)\n\
  \n**图 5-1.** *这里我们看到了两个 `UIButton`，用于触发我们将要创建的操作。*\n\n我们将演示在 iOS 应用后台播放音频的两种不同方法。界面很简单。清除默认控件，创建两个新的\
  \ `UIButton` 元素。使用类似 图 5-1 中所示的标题。\n\n我们将讨论的两种方法都相对直接且易于实现。我们将在第 7 章中介绍一种更高级的、以游戏为中心的方法。\n\
  \n### 系统声音服务\n\n系统声音服务是在设备上播放音效的绝佳选择。它专为短音效而设计，例如按钮点击声、错误提示音或游戏动作。使用系统声音服务播放的声音无法通过你的音频会话进行配置。因此，你无法使系统声音服务的音频行为与应用中的其他音频行为保持一致。这是避免将系统声音服务用于其预期用途之外的任何音频的最重要原因。使用系统声音服务需要将\
  \ `AudioToolbox` 框架添加到你的项目中。\n\n为了确保其作为快速声音播放器的用途，系统声音服务存在一些限制。你的声音文件必须满足以下条件：\n\
  \n-   持续时间不超过 30 秒\n-   采用线性 PCM 或 IMA4 (IMA/ADPCM) 格式\n-   打包在 `.caf`、`.aif` 或\
  \ `.wav` 文件中\n\n此外，当你使用 `AudioServicesPlaySystemSound` 函数时：\n\n-   声音以当前系统音频音量播放，无法通过编程方式控制音量\n\
  -   声音立即播放\n-   不支持循环和立体声定位\n-   不支持同时播放；一次只能播放一个声音\n\n### AVAudioPlayer 类\n\n`AVAudioPlayer`\
  \ 更加灵活，但也有其自身的局限性。`AVAudioPlayer` 最受限制的特性是在排队和播放文件时存在明显的延迟。因此，它最适合长时间播放的背景音乐及类似场景。使用\
  \ `AVAudioPlayer` 需要你的项目中包含 `AVFoundation` 框架。使用 `AVAudioPlayer`，你可以：\n\n-   播放任意持续时间的声音\n\
  -   播放来自文件或内存缓冲区的声音\n-   循环播放声音\n-   同时播放多个声音（尽管不能精确同步）\n-   控制正在播放的每个声音的相对播放电平\n\
  -   跳转到声音文件中的特定点，从而支持快进和快退等应用功能\n-   获取可用于音频电平测量的音频功率数据\n\n### 试验多个音频播放器\n\n好了，让我们开始吧。你已经创建了包含两个\
  \ `UIButton` 的界面。在简要介绍了不同的声音播放方法之后，我使用的标题将更有意义。在开始之前，我们需要将本节中提到的两个框架都添加到我们的项目中。打开应用目标的“构建阶段”选项卡，并添加\
  \ `AVFoundation` 和 `AudioToolbox` 框架。\n\n将代码清单 5-5 中的代码添加到 `FirstViewController.h`\
  \ 中。\n\n**代码清单 5-5.** *新的 `FirstViewController.h`*\n\n```\n#import <UIKit/UIKit.h>\n\
  #import <AudioToolbox/AudioToolbox.h>\n#import <AVFoundation/AVFoundation.h>\n\n\
  @interface FirstViewController : UIViewController <AVAudioPlayerDelegate>{\n   \
  \ SystemSoundID _systemSound;\n    AVAudioPlayer *_audioPlayer;\n}\n\n- (IBAction)systemSoundAction;\n\
  - (IBAction)avAudioPlayerAction;\n\n@end\n```\n\n我们首先将 `AudioToolbox` 和 `AVFoundation`\
  \ 库导入到头文件中。然后，我们将类声明为 `AVAudioPlayerDelegate`。本书并非真正构建一个多媒体应用，因此我不打算深入讨论这个委托及其方法。但是，如果你想在音频播放时处理事件，这将是进一步研究的内容。\n\
  \n在接口中，我们为两种使用场景声明了两个实例变量。`AVAudioPlayer` 需要一个指针，因为我们将在该类中创建实例。最后，我们声明了两个新方法来处理我们添加到用户界面中的\
  \ `UIButton` 的点击事件。\n\n接下来，返回 Xcode 中的 `FirstView.xib` 文件，并将这两个 `IBAction` 方法连接到我们的两个按钮上。\n\
  \n切换到 `FirstViewController.m`。在此示例中，我们仅使用实例变量，因此无需合成任何内容。将代码清单 5-6 中的代码添加到你的实现文件中。\n\
  \n**代码清单 5-6.** *处理系统声音服务方法*\n\n```\n- (void)systemSoundAction {\n    NSString *soundFilePath\
  \ = [[NSBundle mainBundle] pathForResource:@\"waterfall\"\nofType:@\"caf\"];\n \
  \   NSURL *soundFileURL = [NSURL fileURLWithPath:soundFilePath];\n    AudioServicesCreateSystemSoundID((CFURLRef)soundFileURL,\
  \ &_systemSound);\n    AudioServicesPlaySystemSound(_systemSound);\n}\n- (void)\
  \ avAudioPlayerAction {\n  // 我们接下来将实现此方法\n}\n```\n\n我引用了我们 GitHub 示例项目中的 CAFF 文件。如果你有想要使用的其他文件，请确保名称匹配。需要注意的是，`pathForResource`\
  \ 参数接受文件名的核心部分，而不是完整文件名。在你的 iOS 模拟器上运行项目，然后点击“系统声音操作”按钮。你会注意到响应非常迅速（即时），并且文件将开始播放。\n\
  \n关闭模拟器。在完成第二个方法之前，我们还有一些工作要做。由于 `AVAudioPlayer` 更适合背景音乐，我想找一个比瀑布声更合适的素材，因为我不是瀑布爱好者（这并没有什么不妥）。瀑布样本来自\
  \ cocos2D 示例（我们将在第 7 章中介绍）。获取音乐样本的另一个地方是 audiomicro.com，我搜索了他们免费的背景音乐样本，寻找更合适的素材。\n\
  \n打开你的终端，进入下载的 MP3 文件所在目录。如果你使用的是示例中的 MP3，请导航到本地克隆的 GitHub 目录。运行代码清单 5-7 中的命令。\n\
  \n**代码清单 5-7.** *将 MP3 转换为 CAFF*\n\n```\nafconvert -d aac -f 'caff' \"007.mp3\"\
  \ backgroundMusic.caf\n```\n\n我们使用音频文件转换器将我们的 MP3 文件转换为可在项目中使用的 CAFF 格式。直接播放 MP3\
  \ 是可行的，但这无助于我们演示这些实用工具何时有用，对吧？\n\n\n\n"
- "# 排版后的文档\n\n回到 Xcode 项目中的 `FirstViewController.m` 文件。我们使用代码清单 5-8 中的代码来填充 `avAudioPlayerAction`\
  \ 方法的剩余部分。\n\n**代码清单 5-8.** *完整的 avAudioPlayerAction 方法*\n\n```\n- (void)avAudioPlayerAction\
  \ {\n    NSError *setCategoryError = nil;\n        [[AVAudioSession sharedInstance]\
  \ setCategory:AVAudioSessionCategoryAmbient\nerror:&setCategoryError];\n\n     \
  \   NSString *backgroundMusicPath = [[NSBundle mainBundle] pathForResource:@\"backgroundMusic\"\
  \ ofType:@\"caf\"];\n        NSURL *backgroundMusicURL = [NSURL fileURLWithPath:backgroundMusicPath];\n\
  \        NSError *error;\n\n        _audioPlayer = [[AVAudioPlayer alloc] initWithContentsOfURL:backgroundMusicURL\n\
  error:&error];\n[_audioPlayer play];\n}\n```\n\n关于如何结束这个方法，有很多不同的方式。我选择了最简单的一种，那就是直接播放文件。你可以将文件加入队列以便稍后播放，或者从委托方法开始指导如何处理该文件。\n\
  \n在你的 iPhone 模拟器上启动项目。现在，播放这两个文件。你会注意到 `AVAudioPlayer` 方法存在显著的延迟。\n\n### 播放位置音效\n\
  \n对于用户移动屏幕以获取不同视角的增强现实应用，偶尔播放位置音效可能会很有用。你也可以通过 cocos2D 实现位置音效。不过，我们不打算在本章中介绍这部分内容，而且因为还没有引入\
  \ cocos2D，我们将其留到第 7 章再进行讲解。\n\n### 通过振动提供用户反馈\n\n我们有一些非听觉选项可用于向用户提供反馈。最常用的是振动效果。实际上，这简单得令人沮丧。在你的\
  \ `FirstViewController` 类中创建一个名为 `vibrate` 的新方法。添加代码清单 5-9 中的代码。\n\n**代码清单 5-9.**\
  \ *完整的 vibrate 方法*\n\n```\n- (void)vibrate {\n  AudioServicesPlaySystemSound (kSystemSoundID_Vibrate);\n\
  }\n```\n\n就这样。在示例项目中，我创建了另一个按钮并关联了此方法，这样你就可以看到它在工作状态下的表现。如果你在运行它时遇到任何问题，请确保你的 iPhone\
  \ 在“设置”面板中已将“振动”开启。\n\n### 录制声音\n\n在本章中，到目前为止，我们已经了解了支持的音频类型及其一些复杂性，以及在 iOS 应用中播放文件的几种方法。接下来，让我们花点时间来理解如何录制和保存在设备上获取的声音。\n\
  \n我们将使用与之前播放音频示例中相同的 `AVFoundation` 框架，但现在用于简单的音频录制。我们已经将框架添加到了项目中，所以不必担心这一步。如果你是从一个新项目开始，你需要像之前一样添加框架。\n\
  \n#### 初始化音频录制器\n\n让应用程序准备录制音频的第一步是设置一个新的 `AVAudioRecorder` 对象。你可以手动创建这个对象及其设置，但\
  \ Apple 的文档和大多数在线教程都建议从其他 `init` 选项开始。\n\n在 Xcode 中打开 `SecondViewController.h` 并更新它，如代码清单\
  \ 5-10 所示。\n\n**代码清单 5-10.** *新的 SecondViewController.h 头文件*\n\n```\n#import <UIKit/UIKit.h>\n\
  #import <AVFoundation/AVFoundation.h>\n\n@interface SecondViewController : UIViewController\
  \ <AVAudioRecorderDelegate,\nAVAudioPlayerDelegate>{\nAVAudioRecorder *_soundRecorder;\n\
  }\n\n- (IBAction)setupRecorder;\n- (IBAction)stopRecorder;\n- (IBAction)playAudioRecording;\n\
  \n@end\n```\n\n逐行查看代码，我们声明了一个 `AVAudioRecorder` 实例对象以及三个方法。在最终的应用程序中，你可能希望整合一些音频录制操作，或者利用委托方法，但我们在这里将它们分开以便参考。你可能注意到了另外两个在本章中已经见过几次的内容。我们正在导入\
  \ `AVFoundation` 头文件，并将此类指定为 `AVAudioRecorderDelegate` 和 `AVAudioPlayerDelegate`。\n\
  \n在 Xcode 中切换到 `SecondView.xib`，并将 `IBActions` 关联到几个新的 `UIButton`。我按照图 5-2 所示布置了我的屏幕。布局上有三个\
  \ `UIButton`。每个按钮都将连接到它们自己的 `IBAction`。\n\n我将 `setupRecorder` 关联到了**录制音频**按钮。接着，我将\
  \ `stopRecorder` 关联到了**停止音频**按钮。最后，我将 `playAudioRecording` 方法关联到了**播放录音**按钮。\n\n\
  接下来，我们必须在 `SecondViewController.m` 中实现这些方法。\n\n![图片](img/0502.jpg)\n\n**图 5-2.**\
  \ *这里我们看到的是用于测试音频录制的屏幕布局。*\n\n在 Xcode 中打开 `SecondViewController.m`。我们必须实现已经声明的方法。让我们从第一个方法\
  \ `setupRecorder` 开始。将代码清单 5-11 中的方法添加到你的实现文件中。\n\n**代码清单 5-11.** *setupRecorder\
  \ 方法*\n\n```\n- (void)setupRecorder {\n    NSString *filePath = [NSHomeDirectory()\n\
  stringByAppendingPathComponent:@\"Documents/recording.caf\"];\n    NSDictionary\
  \ *recordSettings = [[NSDictionary alloc] initWithObjectsAndKeys:\n            \
  \                        [NSNumber numberWithFloat: 44100.0],\nAVSampleRateKey,\n\
  \                                    [NSNumber numberWithInt: kAudioFormatAppleLossless],\n\
  AVFormatIDKey,\n                                    [NSNumber numberWithInt: 1],\
  \ AVNumberOfChannelsKey,\n                                    [NSNumber numberWithInt:\
  \ AVAudioQualityMax],\nAVEncoderAudioQualityKey,nil];\n\n    _soundRecorder = [[AVAudioRecorder\
  \ alloc] initWithURL:[NSURL\nfileURLWithPath:filePath]\n                       \
  \                                          settings:\nrecordSettings error: nil];\n\
  \    _soundRecorder.delegate = self;\n    [_soundRecorder record];\n}\n```\n\n这个方法首先声明了一个\
  \ `NSString` 来表示我们将要保存的文件的路径。接着，我们设置了 `NSDictionary` 对象，它保存了我们的 `AVAudioRecorder`\
  \ 的设置。最后，我们将 `AVAudioRecorder` 的 `delegate` 设置为 `self`，并使用 `record` 方法开始录制。\n\n\
  在 `setupRecorder` 之后，复制代码清单 5-12 中的下一个方法。\n\n**代码清单 5-12.** *stopRecorder 方法*\n\n\
  ```\n- (void)stopRecorder {\n    [_soundRecorder stop];\n}\n```\n\n这个方法不难理解。我们只是停止了录制。\n\
  \n现在，在我们完成最后一个方法之前，将代码清单 5-13 中的以下方法添加到 `stopRecorder` 下方。\n\n**代码清单 5-13.** *AVAudioRecorder\
  \ 的委托方法*\n\n\n\n```objc\n- (void)audioRecorderDidFinishRecording:(AVAudioRecorder\
  \ *)recorder\n                         successfully:(BOOL)flag {\n    NSLog(@\"\
  录音完成\");\n}\n\n- (void)audioRecorderBeginInterruption:(AVAudioRecorder *)recorder\
  \ {\n    NSLog(@\"录音被中断\");\n}\n\n- (void)audioRecorderEndInterruption:(AVAudioRecorder\
  \ *)recorder {\n    NSLog(@\"中断结束...返回录音\");\n}\n```\n\n我们之前设置的 `AVAudioRecorderDelegate`\
  \ 定义了几个与 `AVAudioRecorder` 交互的方法。我们在每个方法中仅进行日志记录，以便观察事件的触发时机。在目前的操作集合中，唯一会触发的方法是\
  \ `audioRecorderDidFinishRecording`。另外两个方法则适合用于测试。如果你在 iPhone 上进行测试，可以在调试应用的过程中给自己打电话；当电话响起时，`audioRecorderBeginInterruption`\
  \ 方法会被触发。一旦你挂断电话，`audioRecorderEndInterruption` 方法就会被触发。这些事件都属于委托接口的一部分。\n\n我们正在录制音频会话并将其存储到本地文件系统。最后一步是从本地磁盘回放音频。请在我们刚刚定义的三个委托方法之后，添加代码清单\
  \ 5–14 所示的方法。\n\n**代码清单 5–14.** *回放文件*\n\n```objc\n- (void)playAudioRecording {\n\
  \    NSString * filePath = [NSHomeDirectory() stringByAppendingPathComponent:\n\
  \                           @\"Documents/recording.caf\"];\n    AVAudioPlayer *newPlayer\
  \ = [[AVAudioPlayer alloc] initWithContentsOfURL: [NSURL\n                     \
  \           fileURLWithPath:filePath] error: nil];\n    newPlayer.delegate = self;\n\
  \    [newPlayer play];\n}\n```\n\n这段代码应该看起来很熟悉。在本章前面部分，我们学习了同样的音频播放流程。现在我们可以开始测试应用了。为了正确测试，你应该使用物理测试设备，而不是模拟器。虽然大多数功能在模拟器上也能运行，但从真实设备上录制声音再进行测试效果更好。\n\
  \n运行应用并切换到第二个标签页。从顶部开始，点击**录制音频**按钮。对着麦克风说话，或者确保有足够的背景噪音来获取真实的样本录音。完成后，点击**停止录制**按钮。在控制台中，你应该会看到日志消息：“**录音完成**”。最后，点击**播放录音**，你就能听到扬声器播放的声音。请确保你的手机没有被强制静音。\n\
  \n### 总结\n\n在本章中，我们学习了 iOS 音频格式的不同内部细节。我们讨论了比特率和文件格式，以及 iOS 支持并推荐使用的格式。我们还了解了一些实用工具，当你需要测试文件或将其转换为其他格式时可以使用。\n\
  \n下一章，我们将从音频转向视频，并为增强现实编程奠定基础。至此，本书各章节已经涵盖了我们将要构建的应用的基本组件。在下一章，我们实际上将开始看到类似于增强现实应用的内容。\n\
  \n## 第 6 章\n\n## 摄像头与视频捕获\n\n增强现实应用通常有一个共同点：它们都建立在实时视频流的基础上。\n\n在本章中，我们将从使用摄像头的基本概念开始，然后迅速转向更高级的视频捕获示例，并逐帧分析视频。\n\
  \n在后续章节中，我们将利用这些概念来构建在视频流上叠加内容的应用程序。\n\n### 快速回顾\n\n在第 2 章中，我们讨论了在代码中访问传感器或硬件组件之前，检查其是否存在及可用性的重要性。\n\
  \n你可以使用 `UIImagePickerController` 类以编程方式检测设备上可用的摄像头。有一个名为 `isSourceTypeAvailable`\
  \ 的方法，我们可以用来判断我们想使用的摄像头是否可用。代码清单 6–1 展示了我们在第 2 章中用于检测摄像头并在可用时使用前置摄像头的示例方法。\n\n**代码清单\
  \ 6–1.** *检查摄像头，然后检查前置摄像头*\n\n```objc\nBOOL cameraAvailable = [UIImagePickerController\n\
  \                        isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera];\n\
  \    BOOL frontCameraAvailable = [UIImagePickerController\n                    \
  \             isSourceTypeAvailable:UIImagePickerControllerCameraDeviceFront];\n\
  \n    if (cameraAvailable) {\n        UIAlertView *alert = [[UIAlertView alloc]\
  \ initWithTitle:@\"摄像头\"\n                                                     \
  \   message:@\"摄像头可用\"\n                                                       delegate:self\n\
  \                                              cancelButtonTitle:@\"确定\"\n     \
  \                                         otherButtonTitles:nil, nil];\n       \
  \ [alert show];\n        [alert release];\n    } else {\n        UIAlertView *alert\
  \ = [[UIAlertView alloc] initWithTitle:@\"摄像头\"\n                              \
  \                          message:@\"摄像头不可用\"\n                               \
  \                        delegate:self\n                                       \
  \       cancelButtonTitle:@\"确定\"\n                                            \
  \  otherButtonTitles:nil, nil];\n        [alert show];\n        [alert release];\n\
  \    }\n\n    if (frontCameraAvailable) {\n        UIAlertView *alert = [[UIAlertView\
  \ alloc] initWithTitle:@\"摄像头\"\n                                              \
  \          message:@\"前置摄像头可用\"\n                                              \
  \         delegate:self\n                                              cancelButtonTitle:@\"\
  确定\"\n                                              otherButtonTitles:nil, nil];\n\
  \        [alert show];\n        [alert release];\n    } else {\n        UIAlertView\
  \ *alert = [[UIAlertView alloc] initWithTitle:@\"摄像头\"\n                       \
  \                                 message:@\"前置摄像头不可用\"\n                      \
  \                                 delegate:self\n                              \
  \                cancelButtonTitle:@\"确定\"\n                                   \
  \           otherButtonTitles:nil, nil];\n        [alert show];\n        [alert\
  \ release];\n    }\n```\n\n这段代码块将以 `UIAlertView` 弹出窗口的形式快速显示结果。实际上，你会从这个示例中得到两个弹出窗口。你可以在代码清单\
  \ 6–1 的前几行中看到，我们首先检查是否存在 `UIImagePickerControllerSourceTypeCamera`，以判断摄像头是否可用。接着，我们使用\
  \ `UIImagePickerControllerCameraDeviceFront` 参数检查前置摄像头的存在性。`isSourceTypeAvailable`\
  \ 方法返回一个 `BOOL` 值。我们将其用于 `if`/`else` 语句中，并为每次检查显示相应的 `UIAlertView`。\n\n你还会记得第 2\
  \ 章中提到，Xcode 模拟器不支持摄像头或视频捕获。因此，本章中的所有示例必须在物理设备上运行。\n\n在进入视频部分之前，我们先从捕获基本照片开始。\n\n\
  \n\n### 照片拍摄\n\n从 iOS 以编程方式拍摄照片并非一项特别困难的任务。我们之前用来检测相机是否可用的 `UIImagePickerController`\
  \ 类，提供了一个简便的方法来访问相机、拍照，甚至预览结果。\n\n为本章新建一个 Xcode 项目。我创建了一个名为 `Ch6` 的项目，其源代码可以从 Apress\
  \ 网站的源代码/下载区（[`www.apress.com`](http://www.apress.com)）获取，也可以从 [`https://github.com/kyleroche/Professional_iOS_AugmentedReality`](https://github.com/kyleroche/Professional_iOS_AugmentedReality)\
  \ 进行分支。确保你使用的是标签栏应用程序模板，并且设备系列设置为 `Universal`。我的配置界面如图 6-1 所示。请注意，本章我们通过选中 `Use\
  \ Automatic Reference Counting` 复选框，使用了自动引用计数（iOS 5 的新特性）。\n\n![图片](img/0601.jpg)\n\
  \n**图 6-1.** *为本章创建 Xcode 项目设置。*\n\n#### 使用故事板\n\n在此之前，我们还没有讨论过故事板。现在花点时间快速概述一下。故事板为你的所有应用程序视图提供了一个统一的\
  \ XIB 文件。你仍然可以从独立的界面构建器类中以编程方式加载 XIB 文件，但使用故事板界面可以带来更多的灵活性和节省时间的机会。例如，图 6-2 展示了默认的基于标签栏界面的故事板。\n\
  \n![图片](img/0602.jpg)\n\n**图 6-2.** *为标签栏界面模板使用故事板。*\n\n如果没有故事板，将会有三个独立的界面文件，它们需要集成不同类型的链接。而使用故事板，我们可以清晰地看到应用程序流程将如何呈现，无需切换上下文。\n\
  \n我们可以直接复用默认提供的布局。但为了更好地理解故事板，让我们删除它们，从头开始。从 Xcode 项目中删除 `FirstViewController.h`、`FirstViewController.m`、`SecondViewController.h`\
  \ 和 `SecondViewController.m`。同时删除每个视图关联的 `.png` 文件。\n\n打开两个故事板文件。在设计窗口中点击 `FirstViewController`\
  \ 和 `SecondViewController` 界面。按两次 Delete 键。第一次按 Delete 键时，你将从视图中移除该类，留下一个带有蓝色轮廓的高亮空视图。第二次\
  \ Delete 则完全移除该视图。对两个视图控制器重复此操作。\n\n你应该会在界面构建器视图中留下一个空的标签栏控制器。你的项目中应该只剩下 `AppDelegate`、两个故事板文件和\
  \ `Supporting Files` 目录。现在我们已经有了一个干净的项目，让我们手动将其重新构建起来。\n\n我们将从拍摄照片并将其保存到相册开始。因此，让我们为此示例添加一个视图控制器，并将其加载到标签栏控制器的某个标签中。右键点击项目文件夹，从上下文菜单中选择\
  \ **New File**。选择 `UIViewController` 子类作为该文件的模板。点击 `Next`。在选项界面上，确保没有选择任何选项，并将类命名为\
  \ `PhotoViewController`。在点击 `Next` 之前，确保你的选项界面看起来像图 6-3。\n\n![图片](img/0603.jpg)\n\
  \n**图 6-3.** *创建 PhotoViewController 类。*\n\n从 `Objects` 库中，将一个 `View Controller`\
  \ 拖拽到界面中。点击新的 `View Controller`，切换到标识检查器，并将 `Custom Class` 修改为 `PhotoViewController`。这三步操作的结果如图\
  \ 6-4 所示。\n\n在进行下一步之前，请确保将 `PhotoViewController` 设置为遵循 `UINavigationControllerDelegate`\
  \ 和 `UIImagePickerControllerDelegate` 协议。\n\n![图片](img/0604.jpg)\n\n**图 6-4.** *添加\
  \ PhotoViewController。*\n\n在界面构建器中右键点击 `Tab Bar Controller` 视图。在 `StoryboardSeques`\
  \ 类别下，有一个名为 `Relationship – viewControllers` 的项。按住 Ctrl 键并点击+拖拽该项右侧的加号图标，连接到界面中的\
  \ `PhotoViewController` 视图。你将看到类似于图 6-5 的画面。\n\n![图片](img/0605.jpg)\n\n**图 6-5.**\
  \ *将 Relationship Storyboard Seque 链接到 PhotoViewController。*\n\n如果你使用 iPad 进行测试，或者希望应用程序能在两种设备上运行，请为\
  \ iPad 的故事板重复此过程。\n\n要更改我们刚才启用的标签栏项的图标、名称或徽章，你需要在关联的视图中进行操作。你不能再从父级标签栏控制器中编辑这些项目。\n\
  \n接下来，在界面构建器中，将一个 `UIButton` 拖拽到 `PhotoViewController` 的中间位置。确保辅助编辑器已启用且 `PhotoViewController.h`\
  \ 已打开，按住 Ctrl 键并拖拽 `UIButton` 到头文件中，为此插座创建一个动作。请参考图 6-6。\n\n![图片](img/0606.jpg)\n\
  \n**图 6-6.** *为 UIButton 创建一个动作。*\n\n将动作命名为 `loadPhotoPicker`，然后点击 `Connect`。如果你使用的是\
  \ iPad，或者希望实现通用性，你需要（再次）在 iPad 的故事板中重复此步骤。不过，将动作连接到已创建的事件略有不同。打开 iPad 的故事板，在界面中添加一个类似的\
  \ `UIButton`。我将两个 `UIButton` 的标题都设置为 `Take Photo`。要将 `UIButton` 连接到现有动作，你必须按住 Ctrl\
  \ 键并点击+拖拽 `UIButton` 到故事板中视图下方的视图控制器图标上。如果读到这里你感觉不太明白，可以参考图 6-7 获得一些指导。\n\n![图片](img/0607.jpg)\n\
  \n**图 6-7.** *将插座连接到现有动作时使用此菜单。*\n\n仅仅为了连接一个按钮，这指令确实不少，不是吗？我想详细地讲解一次这个过程，以便你在后续章节构建更复杂的示例时，有份参考资料。让我们继续。\n\
  \n\n#### 使用相机\n\n在 Xcode 中切换到 `PhotoViewController.m`。在文件底部，我们在前面步骤中添加的操作方法目前为空。按照代码清单\
  \ 6-2 所示展开该方法。\n\n**代码清单 6-2.** *loadPhotoPicker 方法*\n\n```\n- (IBAction)loadPhotoPicker:(id)sender\
  \ {\n    UIImagePickerController *imagePicker = [[UIImagePickerController alloc]\
  \ init];\n    imagePicker.sourceType =  UIImagePickerControllerSourceTypeCamera;\n\
  \    // uncomment for front camera\n    // imagePicker.cameraDevice = UIImagePickerControllerCameraDeviceFront;\n\
  \    imagePicker.delegate = self;\n    imagePicker.allowsEditing = NO;\n    [self\
  \ presentModalViewController:imagePicker animated:YES];\n}\n```\n\n该方法首先创建 `UIImagePickerController`\
  \ 类的实例。该类实质上会打开我们在 iOS 系统中熟悉的相机界面。我们将 `sourceType` 属性设置为后置摄像头。如果你希望将其设置为前置摄像头（再次提醒，首先应确认设备支持前置摄像头），可以取消注释该行下方的代码。\n\
  \n接下来，我们将 `delegate` 设置为 `self`，并禁止对图片选择器进行编辑。然后，我们以模态对话框的形式将 `UIImagePickerController`\
  \ 呈现给 `PhotoViewController`。\n\n如果现在运行此代码，图片选择器（相机）会显示出来，但不会保存任何内容。将代码清单 6-3 中的方法添加到实现文件中。\n\
  \n**代码清单 6-3.** *保存照片图像的方法*\n\n```\n- (void) imagePickerController:(UIImagePickerController\
  \ *)picker didFinishPickingMediaWithInfo:(NSDictionary *)info\n{\n    UIImage *image\
  \ = [info objectForKey:@\"UIImagePickerControllerOriginalImage\"];\n    UIImageWriteToSavedPhotosAlbum(image,\
  \ self,\n                                   @selector(image:didFinishSavingWithError:contextInfo:),\
  \ nil);\n}\n\n- (void)image:(UIImage *)image didFinishSavingWithError:(NSError *)error\
  \ contextInfo:(void *)contextInfo\n{\n    UIAlertView *alert;\n    if (error) {\n\
  \        alert = [[UIAlertView alloc] initWithTitle:@\"错误\"\n                  \
  \                         message:@\"无法将图像保存到相册。\"\n                           \
  \               delegate:self cancelButtonTitle:@\"确定\"\n                      \
  \           otherButtonTitles:nil];\n    } else {\n        alert = [[UIAlertView\
  \ alloc] initWithTitle:@\"成功\"\n                                           message:@\"\
  图像已保存到相册。\"\n                                          delegate:self cancelButtonTitle:@\"\
  确定\"\n                                 otherButtonTitles:nil];\n    }\n    [alert\
  \ show];\n    [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n第一个方法是 `UIImagePickerController`\
  \ 类的委托方法。当从控制器中选择图像时，该方法会被触发。我们为此图像分配一个对象，并将其传递给代码清单 6-3 中所示的第二个方法。\n\n第二个方法，即文件保存后设置的\
  \ selector 方法，会检查是否存在错误，并通过 `UIAlertView` 控件显示成功或失败消息。你可能会注意到我没有释放 `UIAlertView`\
  \ 实例。当我们在本章前面创建项目时，启用了自动引用计数（Automatic Reference Counting）。自动引用计数（iOS5 新增特性）禁止显式调用\
  \ `release` 方法。\n\n现在可以测试项目了。在 iPhone 或 iPad 设备上启动它。由于我们使用的是相机，该项目无法在模拟器上运行。\n\n\
  点击界面中间的按钮，拍摄一张照片，然后点击“使用”按钮来选择该照片。你将看到一个 `UIAlertView` 对话框，确认文件已正确保存。打开用于测试的 iPad\
  \ 或 iPhone 上的“照片”应用，你会发现照片已保存在其中。\n\n#### 以不同格式保存图像\n\n到目前为止，我们已经将图像保存到了照片库中。那么，如何将图像用于其他用途，比如物体识别或人脸识别呢？在本书后面的人脸识别章节中，我们将使用来自视频缓冲区的图像。UIKit\
  \ 包含几个 C 函数，可帮助将图像导出到 iOS 设备上的文件中。用于导出的两种最常用格式是 JPEG 和 PNG，因此我们先重点介绍这两种格式。\n\n在\
  \ Xcode 中打开 `PhotoViewController.m`。找到 `didFinishPickingMediaWithInfo` 方法，并在方法末尾添加代码清单\
  \ 6-4 中的代码。\n\n**代码清单 6-4.** *转换并保存 UIImage 对象*\n\n```\n// start saving files\n\
  \    NSString  *pngPath = [NSHomeDirectory() stringByAppendingPathComponent:@\"\
  Documents/ConvertedPNG.png\"];\n    NSString  *jpgPath = [NSHomeDirectory() stringByAppendingPathComponent:@\"\
  Documents/ConvertedJPEG.jpg\"];\n    [UIImageJPEGRepresentation(image, 1.0) writeToFile:jpgPath\
  \ atomically:YES];\n    [UIImagePNGRepresentation(image) writeToFile:pngPath atomically:YES];\n\
  \    // optional (check for files)\n    NSError *error;\n    NSFileManager *fileMgr\
  \ = [NSFileManager defaultManager];\n    NSString *documentsDirectory = [NSHomeDirectory()\
  \ stringByAppendingPathComponent:@\"Documents\"];\n    NSLog(@\"Documents: %@\"\
  , [fileMgr contentsOfDirectoryAtPath:documentsDirectory error:&error]);\n```\n\n\
  首先，我们设置两个字符串，分别指向文件最终全路径的值。接着，我们使用 C 函数（`UIImageJPEGRepresentation` 和 `UIImagePNGRepresentation`）将文件写入相应路径。我们将图像压缩质量作为参数集的一部分传入。图像压缩质量按\
  \ 0.0 到 1.0 的等级衡量。因此，我们正在以最高质量和最低压缩比保存图像。\n\n使用实体设备运行该项目。确保控制台已打开，以便查看输出结果。图像保存后，你会看到类似图\
  \ 6-8 的内容。\n\n![图像](img/0608.jpg)\n\n**图 6-8.** *图像已保存、转换并存储。*\n\n\n\n### 通过电子邮件发送图片\n\
  \n仅存储文件可能还不够，你可能希望将其作为附件添加到电子邮件中。如果你想以编程方式发送邮件，首先需要导入 `MessageUI` 框架。\n\n在 Xcode\
  \ 导航器中单击你的项目名称。切换到 `Build Phases` 选项卡并导入 `MessageUI` 框架。接着，在 Xcode 中打开 `PhotoViewController.h`，并按照代码清单\
  \ 6–5 所示更新接口。\n\n**代码清单 6–5.** *PhotoViewController 的更新接口*\n\n```\n#import <UIKit/UIKit.h>\n\
  #import <MessageUI/MessageUI.h>\n#import <MessageUI/MFMailComposeViewController.h>\n\
  \n@interface PhotoViewController : UIViewController <UINavigationControllerDelegate,\
  \ UIImagePickerControllerDelegate, MFMailComposeViewControllerDelegate> {\n}\n-\
  \ (IBAction)loadPhotoPicker:(id)sender;\n\n@end\n```\n\n我们导入了一些头文件，并将该类指定为 `MFMailComposeViewControllerDelegate`，以便处理用户发送消息时的事件回调。将代码清单\
  \ 6–6 中的方法添加到实现文件中。\n\n**代码清单 6–6.** *PhotoViewController 的更新接口*\n\n```\n- (void)sendEmailMessage:(UIImage\
  \ *)image\n{\n    NSLog(@\"Sending Email\");\n\n    MFMailComposeViewController\
  \ *picker = [[MFMailComposeViewController alloc] init];\n    picker.mailComposeDelegate\
  \ = self;\n\n    [picker setSubject:@\"iOS Augmented Reality - Chapter 6\"];\n\n\
  \    [picker setToRecipients:[NSArray arrayWithObjects:@\"kyle.m.roche@gmail.com\"\
  , nil]];\n\n    NSString *emailBody = @\"Hi Kyle, this stuff actually works.\";\n\
  \n    [picker setMessageBody:emailBody isHTML:NO];\n\n    NSData *data = UIImagePNGRepresentation(image);\n\
  \n    [picker addAttachmentData:data mimeType:@\"image/png\" fileName:@\"Ch6ScreenShot\"\
  ];\n\n    [self presentModalViewController:picker animated:YES];\n}\n\n- (void)mailComposeController:(MFMailComposeViewController*)controller\
  \ didFinishWithResult:(MFMailComposeResult)result error:(NSError*)error\n{\n   \
  \ [self dismissModalViewControllerAnimated:YES];\n}\n```\n\n让我们逐行分析每个方法。先从 `sendEmailMessage`\
  \ 方法开始。首先，我们分配一个 `MFMailComposeViewController` 对象，并将 `delegate` 设置为 `self`，以便处理回调事件。接下来，设置邮件的\
  \ `Subject`（主题）、`ToRecipients`（收件人）地址和 `MessageBody`（邮件正文）。最后，将照片附加到邮件中，并以模态对话框的形式向用户展示草稿邮件。\n\
  \n接着，我们定义另一个名为 `didFinishWithResult` 的方法。该方法是 `MFMailComposeViewControllerDelegate`\
  \ 协议的委托方法，在用户实际发送邮件后被调用。当此事件触发时，我们将移除模态对话框，因为它不再需要了。\n\n现在，我们基本可以测试这段代码了。首先，需要声明\
  \ `sendEmailMessage` 方法，以便在实现文件中调用它。在 `PhotoViewController.m` 的 `import` 语句之后，添加代码清单\
  \ 6–7 中的代码。\n\n**代码清单 6–7.** *将 sendEmailMessage 声明为私有方法*\n\n```\n@interface PhotoViewController\
  \ (Private)\n- (void)sendEmailMessage:(UIImage *)image;\n@end\n```\n\n在 `didFinishSavingWithError`\
  \ 方法的末尾添加对 `sendEmailMessage` 方法的调用。如果现在尝试运行代码，你会得到一个有趣的结果。一切看起来都按预期工作，但当电子邮件对话框应该出现时，会收到类似代码清单\
  \ 6–8 的错误。\n\n**代码清单 6–8.** *错误消息*\n\n```\n2011-09-24 21:35:32.153 Ch6[1128:707]\
  \ Sending Email\n[Switching to process 9731 thread 0x2603]\nwait_fences: failed\
  \ to receive reply: 10004003\n```\n\n这个错误并不算最描述性的，对吧？以下是其含义。通常，`wait_fences` 消息表示正在运行的动画与一个新请求的动画冲突。在我们的案例中，当我们试图创建一个\
  \ `withAnimation` 属性设置为 `YES` 的新模态对话框时，刚刚关闭了一个同样 `withAnimation` 属性设置为 `YES` 的模态对话框。无论你尝试运行该项目多少次，它都无法成功执行那一行代码。\n\
  \n因此，在测试之前，我们需要对之前的代码做一些调整。按照代码清单 6–9 所示更新 `didFinishSavingWithError` 消息。\n\n**代码清单\
  \ 6–9.** *更新后的 didFinishSavingWithError*\n\n```\n- (void)image:(UIImage *)image\
  \ didFinishSavingWithError:(NSError *)error contextInfo:(void *)contextInfo\n{\n\
  \    /*UIAlertView *alert;\n    if (error) {\n        alert = [[UIAlertView alloc]\
  \ initWithTitle:@\"Error\"\n                                           message:@\"\
  Unable to save image to Photo Album.\"\n                                       \
  \   delegate:self cancelButtonTitle:@\"Ok\"\n                                 otherButtonTitles:nil];\n\
  \    } else {\n        alert = [[UIAlertView alloc] initWithTitle:@\"Success\"\n\
  \                                           message:@\"Image saved to Photo Album.\"\
  \n                                          delegate:self cancelButtonTitle:@\"\
  Ok\"\n                                 otherButtonTitles:nil];\n    }\n    [alert\
  \ show];*/\n    [self dismissModalViewControllerAnimated:NO];\n\n    [self sendEmailMessage:image];\n\
  }\n```\n\n你可以看到，粗体显示的代码现在位于注释块中。第二个改动（同样以粗体显示）是，我们将动画标志设置为 `NO`，这样就不会发生冲突。我需要指出的是，对于更高级的读者，有办法绕过这个问题。然而，在大量动画的情况下，它们会留下痕迹问题或像素化及其他复杂问题，而像这样的微小改动可以轻松避免这些问题。\n\
  \n图 6–9 展示了项目成功执行的结果，以及格式正确的电子邮件对话框。\n\n![图片](img/0609.jpg)\n\n**图 6–9.** *现在我们收到了一封格式正确的电子邮件。*\n\
  \n### 视频捕获\n\n在视频流之上构建应用程序主要有两种方法。第一种是不需要分析视频帧的方法。这种方法出现在一些基于位置的增强现实应用中，我们将在第 11\
  \ 章中进一步了解。它们使用航向和定位类以及陀螺仪来确定 AR 目标的朝向位置。然而，视频只是一种噱头。查看视频之上基于位置的对象，会给你一种所有内容都已集成的感觉。这种方法（为了节省时间和计算资源）只是简单地在应用程序中将视频预览作为基础层打开。\n\
  \n第二种是需要分析视频流的方法。这种方法出现在基于标记的增强现实应用（如我们将在第 10 章中看到的）和面部识别增强现实应用（如我们将在第 13 章中看到的）中。这两种应用都要求每一帧视频都可被访问以进行分析。\n\
  \n\n\n#### 在视频预览上构建基础\n\n在第 7 章中，我们将讨论如何在视频预览上叠加 cocos2D 图层，以构建增强现实游戏。因此，本节将简要介绍一些核心概念。\n\
  \n在 Xcode 中打开`PhotoViewController.m`，找到`loadPhotoPicker`方法。该方法会打开`UIImagePickerController`对象，允许用户拍照。请按照代码清单\
  \ 6-10 所示更新该方法。\n\n**代码清单 6-10.** *更新后的 loadPhotoPicker*\n\n```\n- (IBAction)loadPhotoPicker:(id)sender\
  \ {\n    UIImagePickerController *imagePicker = [[UIImagePickerController alloc]\
  \ init];\n    imagePicker.sourceType =  UIImagePickerControllerSourceTypeCamera;\n\
      // 取消注释以使用前置摄像头\n    // imagePicker.cameraDevice = UIImagePickerControllerCameraDeviceFront;\n\
      imagePicker.cameraDevice = UIImagePickerControllerCameraCaptureModeVideo;\n\
      imagePicker.showsCameraControls = NO;\n    imagePicker.toolbarHidden = YES;\n\
      imagePicker.navigationBarHidden = YES;\n    imagePicker.wantsFullScreenLayout\
  \ = YES;\n\n    imagePicker.delegate = self;\n    imagePicker.allowsEditing = NO;\n\
      [self presentModalViewController:imagePicker animated:YES];\n}\n```\n\n我们为`UIImagePickerController`对象设置了几个新选项。首先，将设备类型设为摄像机。然后，隐藏了摄像机的控制项、工具栏和导航栏。最后，指示视图控制器让`UIImagePickerController`以全屏模式渲染。\n\
  \n完成此更改后，如果运行代码，你将得到类似于图 6-10 的效果。\n\n![Image](img/0610.jpg)\n\n**图 6-10.** *我们获得了全屏视频。没有任何控制项！*\n\
  \n这个简洁的视频界面为构建增强现实应用提供了完美的背景。\n\n如果我们想要分析这些视频帧，就必须设置一个`NSTimer`，并定时捕获和保存预览屏幕。或者，我们也可以设置某种用户操作来触发图像保存，或者使用某种程序化循环。这些方案都不理想，正如你可能已从本章前面的示例中注意到的，手动保存图像会占用处理器一两秒的时间。让我们探索一种更好的方式来捕获视频帧以供分析。\n\
  \n#### 构建帧捕获的基础\n\n帧捕获会话的工作方式略有不同。为了演示这一点，我们将使用一个名为`AVCaptureSession`的新类。让我们在示例应用中将其放入一个单独的标签页中，以便日后参考对比。\n\
  \n首先，添加使用 AV Foundation 库所需的框架。请将以下框架添加到你的项目中。\n\n*   `CoreVideo`\n*   `CoreMedia`\n\
  *   `AVFoundation`\n*   `ImageIO`\n\n接下来，向项目中添加一个新的 Cocoa Touch 文件，使用`UIViewController`子类。请确保不要将此类设置为\
  \ iPad 专用，并且不要为界面使用 XIB 文件。将此类命名为`VideoViewController`。\n\n我们将像之前示例中那样，创建另一个标签栏项，并将其链接到\
  \ iPad 和 iPhone 故事板。打开两个故事板文件，按照之前相同的步骤将它们链接到标签栏。完成后，你应该会在 iPhone 故事板中看到类似于图 6-11\
  \ 的内容。\n\n![Image](img/0611.jpg)\n\n**图 6-11.** *你已在 iPhone 故事板中添加了新的标签栏项。*\n\n\
  对 iPad 故事板重复这些步骤。在这两个界面中，我们将添加几个输出口（outlet）。首先，向`VideoViewController`的 NIB 中添加一个`UIView`。将其命名为`videoPreview`。确保将该输出口连接到`VideoViewController`的头文件。在助理编辑器中打开`VideoViewController.h`时，导入`AVFoundation.h`和`ImageIO/CGImageProperties.h`头文件。你的新接口文件应如代码清单\
  \ 6-11 所示。\n\n**代码清单 6-11.** *更新后的 VideoViewController.h*\n\n```\n#import <UIKit/UIKit.h>\n\
  #import <AVFoundation/AVFoundation.h>\n#import <ImageIO/CGImageProperties.h>\n\n\
  @interface VideoViewController : UIViewController {\n\n}\n@property (strong, nonatomic)\
  \ IBOutlet UIView *videoPreview;\n@end\n```\n\n接下来，我们将向`VideoViewController`布局中添加一个`UIImageView`输出口和一个`UIButton`。将`UIImageView`命名为`videoImage`，并将一个名为`captureScreen`的操作连接到该`UIButton`。\n\
  \n为了从视频预览中保存静态图像，我们将使用`AVCaptureStillImageOutput`对象。为此对象创建一个名为`stillImageOutput`的属性。\n\
  \n现在，`VideoViewController.h`应如代码清单 6-12 所示。\n\n**代码清单 6-12.** *更新后的 VideoViewController.h*\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n#import <ImageIO/CGImageProperties.h>\n\
  \n@interface VideoViewController : UIViewController {\n\n}\n@property(nonatomic,\
  \ retain) AVCaptureStillImageOutput *stillImageOutput;\n\n@property (strong, nonatomic)\
  \ IBOutlet UIView *videoPreview;\n@property (strong, nonatomic) IBOutlet UIImageView\
  \ *videoImage;\n- (IBAction)captureScreen:(id)sender;\n@end\n```\n\n在 Xcode 中切换到`VideoViewController.m`。我们需要创建一个`viewDidAppear`方法来启动相机预览会话。使用代码清单\
  \ 6-13 所示的代码创建该方法。\n\n**代码清单 6-13.** *viewDidAppear 方法*\n\n```\n- (void)viewDidAppear:(BOOL)animated\
  \ {\n    AVCaptureSession *session = [[AVCaptureSession alloc] init];\n    session.sessionPreset\
  \ = AVCaptureSessionPresetMedium;\n\n    AVCaptureVideoPreviewLayer *captureVideoPreviewLayer\
  \ = [[AVCaptureVideoPreviewLayer alloc] initWithSession:session];\n    captureVideoPreviewLayer.frame\
  \ = self.videoPreview.bounds;\n        [self.videoPreview.layer addSublayer:captureVideoPreviewLayer];\n\
  \n        AVCaptureDevice *device = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
  \n        NSError *error = nil;\n        AVCaptureDeviceInput *input = [AVCaptureDeviceInput\
  \ deviceInputWithDevice:device error:&error];\n        if (!input) {\n                NSLog(@\"\
  ERROR: trying to open camera: %@\", error);\n        }\n        [session addInput:input];\n\
          // 占位符\n        [session startRunning];\n}\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将以下英文文本翻译成中文。\n\
  \n\n在继续测试应用程序之前，我们先来梳理一下。首先，我们创建了一个`AVCaptureSession`的实例。在本应用中，我们将视频质量设置为中等。接着，我们创建了一个`AVCaptureVideoPreviewLayer`的实例，它将用于存储视频缓冲区的实时预览。\n\
  \n然后，我们将该图层的框架设置为填充`videoPreviewUIView`的大小。接下来，我们初始化`AVCaptureDevice`（之前的示例中已经介绍过），并检查其是否可用。\n\
  \n最后几行代码非常重要。如果你没有使用`startRunning`方法来启动你的`AVCaptureSession`，你的视图中将不会显示任何内容。\n\n\
  你可以将应用程序运行到这一步。你应该会看到你的`UIView`已被摄像头的预览画面填满。这没什么好激动的，对吧？我们在照片示例中已经实现过这个功能了。现在，让我们扩展这个示例，让我们的`UIButton`能够调用一个例程，在不影响实时预览的情况下，从视频缓冲区中捕捉静态图像。\n\
  \n回到 Xcode 中的 `VideoViewController.m` 文件。在 `viewDidAppear` 方法的末尾，我们留下了一条标记为 `//\
  \ Placeholder` 的注释。找到该部分，并用代码清单 6–14 中的代码替换它。\n\n**代码清单 6–14.** *替换占位注释*\n\n```\n\
  stillImageOutput = [[AVCaptureStillImageOutput alloc] init];\n    NSDictionary *outputSettings\
  \ = [[NSDictionary alloc] initWithObjectsAndKeys: AVVideoCodecJPEG, AVVideoCodecKey,\
  \ nil];\n    [stillImageOutput setOutputSettings:outputSettings];\n\n    [session\
  \ addOutput:stillImageOutput];\n```\n\n这段代码有特定的用途。它从摄像头捕捉静态图像，并将其保存到我们之前创建的 `AVCaptureStillImageOutput`\
  \ 对象中。\n\n找到 `captureScreenIBAction` 方法。使用代码清单 6–15 中的代码更新此方法。\n\n**代码清单 6–15.**\
  \ *`captureScreen` 方法*\n\n```\n- (IBAction)captureScreen:(id)sender {\n    AVCaptureConnection\
  \ *videoConnection = nil;\n        for (AVCaptureConnection *connection in stillImageOutput.connections)\n\
          {\n                for (AVCaptureInputPort *port in [connection inputPorts])\n\
                  {\n                        if ([[port mediaType] isEqual:AVMediaTypeVideo]\
  \ )\n                        {\n                                videoConnection\
  \ = connection;\n                                break;\n                        }\n\
                  }\n                if (videoConnection) { break; }\n        }\n\n\
          NSLog(@\"about to request a capture from: %@\", stillImageOutput);\n        [stillImageOutput\
  \ captureStillImageAsynchronouslyFromConnection:videoConnection completionHandler:\
  \ ^(CMSampleBufferRef imageSampleBuffer, NSError *error)\n     {\n                CFDictionaryRef\
  \ exifAttachments = CMGetAttachment( imageSampleBuffer,\nkCGImagePropertyExifDictionary,\
  \ NULL);\n                if (exifAttachments)\n                {\n            \
  \ // Do something with the attachments.\n             NSLog(@\"attachements: %@\"\
  , exifAttachments);\n                 }\n         else\n             NSLog(@\"no\
  \ attachments\");\n\n        NSData *imageData = [AVCaptureStillImageOutput jpegStillImageNSDataRepresentation:imageSampleBuffer];\n\
          UIImage *image = [[UIImage alloc] initWithData:imageData];\n\n        self.videoImage.image\
  \ = image;\n        }];\n}\n```\n\n该方法包含两个主要的代码块。第一个代码块检查`AVCaptureStillImageOutput`对象中的`AVCaptureConnection`。我们验证这是一个视频输出，并设置一个指向`AVCaptureConnection`实例的本地引用。\n\
  \n接下来，我们（异步地）从摄像头捕捉图像。我们设置一个图像缓冲区来存储图像。之后，我们使用 ImageIO 框架来捕获图像的 EXIF 附件。这对于设置滤镜或存储用于其他目的的图像质量值可能很有用。\n\
  \n最后，我们设置`UIImageView`的出口（outlet）来显示捕捉到的视频帧。如果你运行项目，你将看到类似于图 6–12 的效果。\n\n![Image](img/0612.jpg)\n\
  \n**图 6–12.** *我们轻松地捕捉到了红酒和冰咖啡的视频证据。*\n\n我们的示例完美运行。你会注意到，当捕捉屏幕时，扬声器会发出快门声。这是因为我们抓取静态图像的方式所致。在第\
  \ 13 章的应用程序示例中，我们将略微调整这种方法以消除该影响。\n\n最后，让我们快速浏览一下我们的静态图像附带的 EXIF 附件。代码清单 6–16 显示了控制台的输出。\n\
  \n**代码清单 6–16.** *EXIF 附件*\n\n```\n2011-09-25 15:46:40.751 Ch6[183:707] attachments:\
  \ {\n    ApertureValue = \"2.526068811667588\";\n    BrightnessValue = \"-1.04630972052318\"\
  ;\n    ExposureMode = 0;\n    ExposureProgram = 2;\n    ExposureTime = \"0.04166666666666666\"\
  ;\n    FNumber = \"2.4\";\n    Flash = 32;\n    FocalLenIn35mmFilm = 32;\n    FocalLength\
  \ = \"2.03\";\n    ISOSpeedRatings =     (\n        800\n    );\n    MeteringMode\
  \ = 5;\n    PixelXDimension = 640;\n    PixelYDimension = 480;\n    SceneType =\
  \ 1;\n    SensingMethod = 2;\n    Sharpness = 0;\n    ShutterSpeedValue = \"4.584985584026477\"\
  ;\n    WhiteBalance = 0;\n}\n```\n\n### 总结\n\n在本章中，我们学习了 iOS 设备上视频摄像头的核心概念及其特性。我们从基础的照片功能开始。我们设置了一个`UIImageViewController`对象来捕捉用户选择的图片。接下来，我们学习了如何将这些图片保存并转换到本地文件系统。最后，我们以附件形式通过电子邮件发送了文件。在此过程中，我们介绍了\
  \ iOS 5 中新增的 Storyboarding 功能。\n\n接着，我们介绍了视频捕捉功能。这将是本书剩余大部分章节的主要内容。我们学习了如何移除摄像头控件，并使用一个占据全屏布局的视频预览。此外，我们设置了一个视频捕捉会话，以便为标记识别或面部识别等应用分析帧图像。\n\
  \n在下一章中，我们将介绍 cocos2D，这是一个用于构建游戏的优秀框架。我将向您展示如何使用 cocos2D 以及本章的概念，来为您的第一款增强现实游戏打下基础。\n\
  \n## 第 7 章\n\n## 使用 cocos2D 实现增强现实\n\n我们已经讨论了增强现实应用程序的不同用例。除了呈现基于位置的信息之外，游戏应用程序占据了增强现实市场空间的很大一部分。\n\
  \n在本章中，我将介绍用于 iPhone 的 cocos2D。用于 iPhone 的 cocos2D 是一个用于构建 2D 游戏和图形交互应用程序的框架。它基于\
  \ cocos2D 框架，您可以在 [`www.cocos2d.org`](http://www.cocos2d.org) 了解更多信息。\n\n### 概述\n\
  \n正是开源的 cocos2D 框架为用于 iPhone 的 cocos2D 提供了基础。原始项目是用 Python 编写的。显然，这对 iOS 程序员来说并不那么有用。用于\
  \ iPhone 的 cocos2D 是该框架到 Objective-C 的一个移植版本。\n\ncocos2D 有几个关键特性，例如易于使用、速度快、灵活性强，并且是开源的。cocos2D\
  \ 恰好是拥有强大社区支持和广泛采用的开源项目之一。cocos2D 的最后一个，也是最重要的特性（如果你要发布应用的话）是它已获准在 App Store 上使用。\n\
  \n\n\n### 安装\n\n首先，我们需要配置好开发环境。本章将指导您完成环境搭建、核心概念介绍，并引入一个简短的增强现实示例应用。在第 8 章中，我们将使用\
