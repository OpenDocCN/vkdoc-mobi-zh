  \ Twitter 上关注`@woodappsllc`。\n\n## 前言\n\n撰写这本书既有趣又令人兴奋！增强现实是一个迷人的新领域，拥有重塑我们如何将技术融入日常生活的巨大潜力。每周都有新的公司和工具包涌现，试图在这个新兴市场中分得一杯羹。\n\
  \n本书旨在为您快速构建这类应用程序提供入门指导。我从讨论应用程序的基础构成（如指南针和加速度计）开始，然后深入到图像处理背后更高级的理念。\n\n本书面向有经验的\
  \ iOS 开发者。您应具备使用`Xcode`和`Objective-C`的中等经验。我将使用第三方框架以及一些新的`iOS5` API，向您展示如何构建用于位置、社交和游戏目的的增强现实应用程序。\n\
  \n您可以从 Apress.com 上本书的页面下载本书的源代码，或访问[`www.apress.com/source-code/`](http://www.apress.com/source-code/)。\n\
  \n## 第 1 章\n\n### 引言\n\n欢迎阅读*Pro iOS 5 Augmented Reality*。增强现实（AR）已在科幻电影中存在了数十年，在军事上用于平视显示器（HUD），而直到最近，它一直是未来的事物。随着\
  \ iPhone 和 Android 操作系统问世以来移动应用的蓬勃发展，诸如`Layar`（[`www.layar.com`](http://www.layar.com)）、`Metaio's\
  \ Junaio`（[`www.junaio.com`](http://www.junaio.com)）和`Wikitude`（[`www.wikitude.com`](http://www.wikitude.com)）等应用已让增强现实走进了普通消费者的手中。在本书中，我将引导您了解如何为\
  \ iOS 创建自己的增强现实应用程序。\n\n*时代*杂志将增强现实列为 2010 年十大技术趋势之一。*时代*杂志仅仅触及了 AR 潜在应用的皮毛。他们选择了一些供应商应用平台，如`Layar`，并讨论了一些更贴近日常的应用，例如美国邮政服务（USPS）所采用的应用。\n\
  \n### 现实世界与网络世界中的增强现实\n\nUSPS 于 2010 年在其网站上推出了一款增强现实应用。如果你曾从邮局寄过东西，你就能证明，要快速选择一个既满足需求又不耽误排队的箱子几乎是不可能完成的任务。你要么被迫使用一个浪费大量空间的大箱子，要么在身后\
  \ 20 个人排着队的情况下，费力地把所有物品塞进一个*几乎*能装下所有东西的箱子里。USPS 尝试让这个过程变得更简单，且无需你离开家或办公室。基本上，你只需访问\
  \ USPS 网站（[`www.prioritymail.com`](http://www.prioritymail.com)），在出发去邮局之前，使用虚拟箱子模拟器和你的网络摄像头来尝试不同的箱子尺寸。其工作原理如下：\n\
  \n打印出一个特殊图标（USPS 鹰徽），以便模拟器知道在哪里放置虚拟箱子的全息投影。见图 1–1。\n\n1. 确保你的网络摄像头已启用。\n2. 启动虚拟箱子模拟器。将打印好的图像放在网络摄像头的视野中，模拟器便会围绕该图像放置代表不同运输容器选项的全息投影。见图\
  \ 1–2。\n\n![图片](img/0101.jpg)\n\n**图 1–1.** *打印此鹰徽图标，USPS 用它来在你的摄像头画面中叠加一个模拟的运输容器。*\n\
  \n创建用于识别的图标或标记时，需要遵循几条基本原则。对于传统标记，你需要使用高对比度的物体，这些物体应具有一定独特性，并且在常见场景中不易出现。实际上，随机的图像往往更有效。此外，你应使用具有一定旋转角度且水平或垂直方向都不对称的图像。这有助于\
  \ AR 程序识别方向并进行相应调整。USPS 的标记就是这些原则的一个很好的例子。\n\n![图片](img/0102.jpg)\n\n**图 1–2.**\
  \ *全息投影叠加在打印的图标之上。*\n\n注意图 1–2 中，模拟器允许你调整透明度，以不同角度和旋转方式移动待寄物品，并准确体验你需要哪种运输容器来寄送你的物品。USPS\
  \ 使用该标记并通过某种识别算法在实时摄像头画面中找到它，追踪其方向，并用你当前选中的箱子来增强画面。\n\n\n\n#### 流行文化\n\n增强现实技术在广告、房地产、汽车行业，尤其是消费领域有着数百种应用。据维基百科统计，尽管数据显示超过半数的美国民众尝试过网购，但其收入仅占消费支出的\
  \ 8%。显然，关于这项技术为何未能占据更大市场份额存在多种理论解释，其中既包括对在线隐私与安全的基本担忧，也不乏因缺乏实体互动体验而无法了解产品本身的观点。以服装为例，有些商品确实需要亲眼所见、亲手触摸才能决定购买。\n\
  \n大约在 2010 年末，我们开始看到多种 AR 体验渗入零售市场。作为 70 年代末成长起来的一代人，我记得简·杰特森只需按下按钮就能尝试新发型，或者卢克·天行者通过全息\
  \ 3D 显示屏聆听关于死星接近方案的简报。如今这种体验已向消费者开放。从试穿新衣饰到查看杂货店苹果的产地，不妨看看以下近期案例：\n\n*   *乐高数字展示台：*\
  \ 乐高推出的店内交互终端，让孩子将心仪的套装盒放在摄像头前，系统随即在盒子上叠加显示完整的组装模型。孩子可以旋转、翻转模型，感受这是否真是他们想列入圣诞愿望清单的套装。\n\
  *   *Zugara：* Zugara 的\"魔镜\"让网购者无需鼠标键盘，只需站在摄像头前就能试穿不同款式的服装。除了叠加在线目录中的衣物，Zugara 还在摄像头画面中叠加控制界面，用户可通过手势操作菜单选项，或在社交网络分享新造型。\n\
  *   *FoodTracer：* 朱塞佩·科斯塔纳的这个项目利用 AR 图像识别技术，为杂货购物者提供所购食品的更多信息。只需在货架前挥动智能手机摄像头，相关信息便会即刻呈现。\n\
  \n互动体验的优势与吸引力显而易见。然而，还需考虑 AR 的一些附加价值：多数此类应用的后端都运行在云端。图像识别算法和摄像头解析功能主要在设备端运行，但广告数据、场景信息、位置目录以及与\
  \ AR 视图关联的其他动态内容均可从云端加载——这些集中存储的内容可实现无缝更新，使应用始终保持最新状态。\n\n#### 游戏与基于位置的 AR\n\n零售和店内交互终端并非\
  \ AR 成为趋势的唯一领域。社交网络、基于位置的服务以及游戏领域也在利用 AR 技术。想象一下游戏场景中通过摄像头与真实世界互动的情景。最近在某场会议上，我看到一个演示：iPhone\
  \ 的 AR 视图中渲染出立体僵尸模型，用户只需轻点屏幕即可射击。这催生了如 iPhone 枪托等配件的二级市场，相关报道见[`www.augmentedplanet.com`](http://www.augmentedplanet.com)。这种步枪大小的配件可将\
  \ iPhone 固定在瞄准镜上，让用户以 AR 方式获得逼真的 3D 僵尸射击体验。\n\n本书将介绍创建 AR 游戏的基础知识，包括加快产品上市速度的多种方案及可用\
  \ SDK。\n\n### 准备工作就绪\n\n你需要完成若干步骤，确保设备为 iOS 编程做好准备。本书将仅使用 Xcode 4.2，所有项目都存放在 GitHub\
  \ 上。由于 Xcode 已内置原生的 Git 集成功能用于源代码管理，我们将利用这一特性简化操作并节省设置时间。\n\n#### 注册 GitHub 账号\n\
  \n若已有 GitHub 账号可跳过本节。若无账号，则需要注册一个以获取各章节的素材和起始文件。打开浏览器访问[`www.github.com`](http://www.github.com)，点击页面中央的\"\
  注册\"大按钮，如图 1-3 所示。\n\n![图片](img/0103.jpg)\n\n**图 1-3.** *GitHub 上的注册按钮清晰易见。*\n\n\
  本书中，我们将访问我为各章节预先配置的 Git 仓库；如果你乐于分享，也可以将任何个性化版本上传供其他读者参考。因此，我们只需选择\"开源项目免费\"账户类型。点击**创建免费账户**按钮并填写信息即可。\n\
  \n\n\n### 从你的电脑访问 GitHub\n\n如果你以前用过 GitHub，可以跳过本节，本节面向尚未创建用于 GitHub 的 SSH 密钥的用户。\n\
  \n从你的电脑访问 GitHub 远程仓库有几种方式。我们将使用 SSH 访问，这意味着需要生成一个令牌并将其发布到 GitHub。从 Mac 上打开 **终端**（**应用程序**\
  \ ![Image](img/U001.jpg) **实用工具** ![Image](img/U001.jpg) **终端**）。请参阅列表 1–1。按照同样的模式在你的终端窗口中操作。接下来我将解释具体步骤。\n\
  \n**列表 1–1.** *在你的 Mac 上创建 SSH 密钥*\n\n```\nKyle-Roches-MacBook-Pro-2:~ kyleroche$\
  \ cd ~/.ssh\nKyle-Roches-MacBook-Pro-2:.ssh kyleroche$ ls\nknown_hosts\nKyle-Roches-MacBook-Pro-2:.ssh\
  \ kyleroche$ ssh-keygen -t rsa -C \"kyle@isidorey.com\"\nGenerating public/private\
  \ rsa key pair.\nEnter file in which to save the key (/Users/kyleroche/.ssh/id_rsa):\n\
  Enter passphrase (empty for no passphrase): [enter a passphrase here]\nEnter same\
  \ passphrase again: [enter your passphrase again]\nYour identification has been\
  \ saved in /Users/kyleroche/.ssh/id_rsa.\nYour public key has been saved in /Users/kyleroche/.ssh/id_rsa.pub.\n\
  The key fingerprint is:\n26:9d:3a:82:fe:r9:gf:ba:39:30:6b:98:16:fe:3b:2c kyle@isidorey.com\n\
  The key's randomart image is:\n+--[ RSA 2048]----+\n|                 |\n|     \
  \            |\n|                 |\n| .     . . 4      |\n|. . . ..N        |\n\
  |.  o ..+r        |\n| .. ...-|=.        |\n|  ..+.-E.o       |\n|   +.==oooo  \
  \    |\n+-----------------+\nKyle-Roches-MacBook-Pro-2:.ssh kyleroche$ ls\nid_rsa\
  \          id_rsa.pub          known_hosts\n```\n\n如果你已经有现有密钥，目录列出命令的结果可能会有所不同。在这种情况下，为了安全起见，你可能希望备份密钥目录。首先，我们要使用\
  \ `ssh-keygen` 工具来创建一对 RSA 公钥/私钥。该工具会要求我们输入一个密码短语。这是可选的，但密码短语确实能增强安全性。我们大多数人都意识到，密码本身并不那么安全。不设置密码短语生成密钥对，相当于将密码以纯文本形式保存在你的电脑上。任何获得访问权限的人都能使用你的密钥。如果你比较懒，不想每次都输入密码，也别担心。钥匙串（因为大家用的都是\
  \ Mac）可以让你在第一次使用这对密钥后将其存储起来。\n\n这样，我们就拥有了一对密钥。它存储在你目录列表中看到的新创建的 `id_rsa.pub` 文件中。在你喜欢的纯文本编辑器中打开这个文件，并复制其所有内容。务必复制所有内容，包括头部信息。\n\
  \n回到 GitHub，你的浏览器中应该已经打开了你的账户页面。从左上角的导航菜单中打开**账户设置**页面。然后打开左侧名为**SSH 公钥**的子选项卡。你应该会看到类似图\
  \ 1–4 的内容。\n\n![Image](img/0104.jpg)\n\n**图 1–4.** *在 GitHub 上打开 SSH 公钥对话框。*\n\n\
  找到页面中间的**添加另一个公钥**链接。这将打开一个对话框，你可以在其中粘贴我们刚刚创建的 `id_rsa.pub` 文件的内容。就这样！现在你已经在 GitHub\
  \ 上设置好了，你的电脑可以通过 SSH 访问你的仓库了。\n\n由于在本书中我们将使用 SSH 访问，让我们在继续之前先快速设置好默认偏好。\n\n我们需要配置本地\
  \ Git 客户端，使其使用我们在注册 GitHub 时获得的凭据。首先，在终端窗口中运行列表 1–2 中的以下命令，为 Git 设置一些全局标志。这结合你的\
  \ SSH 密钥，将能让你的 Git 客户端向远程仓库进行身份验证。\n\n**列表 1–2.** *在你的 Mac 上创建 SSH 密钥*\n\n```\n\
  Kyle-Roches-MacBook-Pro-2: kyleroche$ git config --global user.name \"Kyle Roche\"\
  \nKyle-Roches-MacBook-Pro-2: kyleroche$ git config --global user.email \"kyle@isidorey.com\"\
  \n```\n\n### 设置 Xcode 4.2 和你的开发者账户\n\n如果你已经设置好了 Xcode 4.2，可以跳过本节。\n\n要将应用发布到 App\
  \ Store，你需要 Xcode 和一个 Apple 开发者账户。我们可以同时处理这两个步骤。打开浏览器，访问 [`http://developer.apple.com/programs/register/`](http://developer.apple.com/programs/register/)\
  \ 并点击顶部的**开始使用**按钮。这里有几种路径可供选择。如果你想使用现有的 Apple ID，可以填写并继续。参见图 1–5。或者，你也可以为 iOS 开发创建一个新\
  \ ID。这看起来可能不太合理，但使用一个账户存在一些隐患。\n\n![Image](img/0105.jpg)\n\n**图 1–5.** *使用现有 Apple\
  \ ID 还是创建一个新 ID？*\n\n**注意：** 选择合并你的 Apple ID 还是创建第二个，取决于你未来发布应用的意图。Apple 对账户可以关联的发布类型有限制。有两种发布应用的方式：通过\
  \ App Store 和通过 Apple 的企业分发计划。一个 Apple ID 不能同时关联这两种发布方式。如果你计划涉及这两种场景，请确保决定好哪个 ID\
  \ 负责哪种发布方式。\n\n如果你只想使用账户进行开发和调试，那么使用现有账户即可。这可能是最简单的路径。注册完成后，登录到 **iOSDev 中心**。找到**下载**链接。在撰写本文时，只有两个选项：**下载\
  \ Xcode 4.2** 和一串关于 iAd Producer 1.1 的链接。将 Xcode 4.2 下载到你的电脑上。下载文件相当大。这是 Xcode 的缺点之一。自从\
  \ iOS 以来，每个升级版本（其发布频率越来越快）都需要重新完整下载整个 IDE。\n\n现在我们已设置好 IDE 和源代码管理策略。让我们将两者连接起来，确保我们已经准备好开始。\n\
