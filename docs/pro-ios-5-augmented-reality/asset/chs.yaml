  \ 的类来添加位置信息。\n\n创建一个名为 `ARGeoCoordinate` 的新类。在 Xcode 中打开这个新类，并添加 代码清单 11–16 中所示的代码。\n\
  \n**代码清单 11–16.** `ARGeoCoordinate.h`\n\n```\n#import <Foundation/Foundation.h>\n\
  #import <CoreLocation/CoreLocation.h>\n#import \"ARCoordinate.h\"\n\n@interface\
  \ ARGeoCoordinate : ARCoordinate {\n\n}\n\n@property (nonatomic, retain) CLLocation\
  \ *geoLocation;\n\n- (id)initWithCoordinate:(CLLocation *)location name:(NSString\
  \ *)name place:(NSString *)\nplace;\n- (id)initWithCoordinateAndOrigin:(CLLocation\
  \ *)location name:(NSString *)name\nplace:(NSString *)place origin:(CLLocation *)origin;\n\
  - (float)angleFromCoordinate:(CLLocationCoordinate2D)first\nsecond:(CLLocationCoordinate2D)second;\n\
  - (void)calibrateUsingOrigin:(CLLocation *)origin;\n@end\n```\n\n我们首先导入 `CoreLocation`\
  \ 框架和我们刚刚创建的 `ARCoordinate` 类。然后我们将父类从 `NSObject` 改为 `ARCoordinate`。\n\n最后，我们声明一个属性来保存兴趣点的\
  \ `CLLocation`，并定义了几个方法，稍后我们将讨论这些方法。切换到 `ARGeoCoordinate.m` 并添加 代码清单 11–17 中的代码。\n\
  \n**代码清单 11–17.** `ARGeoCoordinate.m`\n\n```\n#import \"ARGeoCoordinate.h\"\n\n\
  @implementation ARGeoCoordinate\n@synthesize geoLocation = _geoLocation;\n\n- (id)initWithCoordinate:(CLLocation\
  \ *)location name:(NSString *)name place:(NSString *)place {\n    if (self = [super\
  \ init]) {\n        self.geoLocation = location;\n        // 基类的属性\n        self.name\
  \ = name;\n        self.place = place;\n    }\n    return self;\n}\n\n- (id)initWithCoordinateAndOrigin:(CLLocation\
  \ *)location name:(NSString *)name place:(NSString *)place origin:(CLLocation *)origin\
  \ {\n    if (self = [super init]) {\n        self.geoLocation = location;\n    \
  \    // 基类的属性\n        self.name = name;\n        self.place = place;\n        [self\
  \ calibrateUsingOrigin:origin];\n    }\n    return self;\n}\n\n- (float)angleFromCoordinate:(CLLocationCoordinate2D)first\
  \ second:(CLLocationCoordinate2D)second {\n    float longDiff = second.longitude\
  \ - first.longitude;\n    float latDiff = second.latitude - second.latitude;\n \
  \   float aprxAziumuth = (M_PI *.5f) - atan(latDiff / longDiff);\n\n    if (longDiff\
  \ > 0) {\n        return aprxAziumuth;\n    } else if (longDiff < 0) {\n       \
  \ return aprxAziumuth + M_PI;\n    } else if (latDiff < 0) {\n        return M_PI;\n\
  \    }\n\n    return 0.0f;\n}\n\n- (void)calibrateUsingOrigin:(CLLocation *)origin\
  \ {\n    double baseDistance = [origin distanceFromLocation:_geoLocation];\n   \
  \ self.distance = sqrt(pow([origin altitude] - [_geoLocation altitude], 2) + pow(baseDistance,\
  \ 2));\n    float angle = sin(ABS([origin altitude] - [_geoLocation altitude]) /\
  \ self.distance);\n\n    if ([origin altitude] > [_geoLocation altitude]) {\n  \
  \      angle = -angle;\n    }\n\n    self.inclination = angle;\n    self.azimuth\
  \ = [self angleFromCoordinate:[origin coordinate] second:[_geoLocation coordinate]];\n\
  }\n\n@end\n```\n\n让我们暂停一下，回顾一下我们刚刚添加的内容。首先，我们合成了声明的属性。接下来，我们创建了一个名为 `initWithCoordinate`\
  \ 的方法。该方法接收坐标的名称和地点，并设置基类 `ARCoordinate` 的属性，以便我们稍后在可视化层中使用它们。\n\n然后，我们创建了一个名为 `initWithCoordinateAndOrigin`\
  \ 的方法。该方法的用途与 `initWithCoordinate` 相同，但允许您同时定义一个原点。主要区别在于，此方法会调用一个我们接下来要讨论的新内部方法。\n\
  \n`calibrateUsingOrigin` 方法获取两点（您的设备和兴趣点）之间的距离，并计算原始距离、角度（考虑海拔变化）和方位角。这些属性设置在基类中，以便我们稍后在示例中引用它们。\n\
  \n最后，我们创建了一个名为 `angleFromCoordinate` 的方法。该方法计算两点之间角度的距离。\n\n返回到 `ARController.h`\
