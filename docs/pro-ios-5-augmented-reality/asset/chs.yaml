  \ 12–6.** *OpenCV 现在可以在 iPad 模拟器上正常工作。*\n\n我们在相册的图片中找到了猫王（Elvis）。\n\n#### OpenCV\
  \ 回顾\n\n事实证明 OpenCV 并不那么用户友好。虽然文档齐全，但主要的示例尚未适配 iOS 5，也未针对当前架构进行编译。OpenCV 功能强大，但需要大量工作才能运行起来。作为练习，请使用\
  \ `UILabel` 测量 OpenCV 分析图像所需的时间。你可以对比接下来两种方法的结果。\n\n\n\n### 使用 CIDetector 类方法\n\n\
  `CIDetector` 类是 iOS 5 新增的。在 iOS 5 发布时，只有一种检测器可用，即用于面部识别。让我们看看使用原生类和使用 OpenCV 之间的区别。\n\
  \n为了尽可能公平地进行比较，我们使用同一个应用程序，并添加一些方法，利用 `CIDetector` 替代 OpenCV 来分析面部信息。\n\n再次打开 OpenCV-iPad\
  \ 项目，并将 `CoreImage` 框架添加到项目中。我们需要它来访问 `CIDetector` 类。打开 `MainViewController.h` 并按照代码清单\
  \ 12-14 所示进行更新。\n\n**代码清单 12-14.** *更新后的 MainViewController.h*\n\n```\n#import <UIKit/UIKit.h>\n\
  #import <CoreImage/CoreImage.h>\n\n#define DETECT_IMAGE_MAX_SIZE  1024\n\n@interface\
  \ MainViewController : UIViewController <UINavigationControllerDelegate,\nUIImagePickerControllerDelegate,\
  \ UIActionSheetDelegate, UIPopoverControllerDelegate> {\n    UIImagePickerController\
  \ *_imagePicker;\n    UIPopoverController *_imagePopover;\n}\n\n@property (nonatomic,\
  \ retain) CIDetector *detector;\n@property (retain, nonatomic) IBOutlet UIImageView\
  \ *cameraView;\n@property (retain, nonatomic) IBOutlet UILabel *timerLabel;\n@property\
  \ (retain, nonatomic) IBOutlet UIToolbar *toolbar;\n- (IBAction)cameraButtonClicked:(id)sender;\n\
  @end\n```\n\n我们需要一个 `CIDetector` 类型的属性来分析图像。切换到 `MainViewController.m` 并合成新的检测器属性。接着，在\
  \ `import` 语句下方的 `Private` 块中添加代码清单 12-15 中的声明。\n\n**代码清单 12-15.** *CIDetectorFaceDetect\
