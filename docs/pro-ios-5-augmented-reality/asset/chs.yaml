  \n**代码清单 12–24.** *控制台输出*\n\n```\n2011-10-22 15:12:27.753 OpenCV-iPad[26058:10103]\
  \ ==== 开始非代码块时间戳数据（来自 \"LogTimestamp\"） ====\n2011-10-22 15:12:27.754 OpenCV-iPad[26058:10103]\
  \ * -[MainViewController\nopenCVFaceDetect]:  76\n2011-10-22 15:12:27.754 OpenCV-iPad[26058:10103]\
  \ * -[MainViewController\nopenCVFaceDetect]: 163 -  664215125 nsec since last timestamp\n\
  2011-10-22 15:12:27.755 OpenCV-iPad[26058:10103] ==== 结束时间戳数据 ====\n```\n\n看起来使用\
  \ OpenCV 处理这张图像花费了 61231366 纳秒。对其他方法重复此过程。我的测试结果显示，`CIDetector` 的耗时仅为 OpenCV 的约\
  \ 29%。此外，如果对应用程序启动时间进行测量，你会发现 OpenCV 的启动耗时远超其他方法。\n\n`CIDetector` 的耗时仅为 face.com\
  \ 的 18%。这当然可以理解，因为 face.com 涉及网络请求和大量响应数据的返回与解析（使用了原生 JSON 序列化类）。\n\n对比 OpenCV 和\
  \ face.com 很有意思。OpenCV 虽然应用程序启动耗时多了整整几秒钟，但在实际处理速度上比完整的 face.com 事务快了约 35%。这种亚秒级的差异对用户来说几乎是无感的。\n\
  \n### 本章小结\n\n本章我们学习了很多内容。早期的人脸识别方法（如 OpenCV）存在一些痛点。这些库已经存在多年，缺少我们在原生 Objective-C\
  \ 函数和宏中习以为常的便捷性。然而，它们是功能强大的库，为我们在更新的人脸识别方法中所展示的创新铺平了道路。\n\n我们讨论了新的 iOS 5 `CIDetector`\
  \ 类，以及它无需加载 Haar 级联分类器或用样本训练库，即可分析原生 `UIImage` 对象中面部模式的能力。\n\n最后，我们介绍了一种使用免费 REST\
  \ API 的非原生方法，该 API 能够分析原始 JPEG 数据。这种方法也帮助我们引入了 iOS 5 新增的原生 JSON 解析功能。\n\n所有这些方法都各有优缺点。我们使用\
  \ iPad 2 快速对比了这些事务的速度性能，发现新的 iOS 5 `CIDetector` 类在性能上显著优于其他两种方法。需要注意的是，face.com\
  \ 确实需要进行完整的网络请求和响应，其速度几乎赶上了原生方法。此外，如果你正在开发跨平台应用，或者你的 Web API 具备额外功能，那么 face.com\
  \ 的方法可能比纯原生方法更适合你的需求。\n\n在第 13 章中，我们将更深入地研究 face.com 的方法。我们会分析屏幕缓冲区，每隔几秒向 face.com\
  \ 发送一次请求，并使用 `cocos2D` 在屏幕上叠加显示响应相关信息。\n\n## 第 13 章\n\n\n# 构建人脸识别增强现实应用\n\n在第 12\
  \ 章中，我们介绍了几种将人脸和物体识别引入应用的方法。其中有些方法比其他方法更复杂。在本章中，我们将选择其中一种方法，利用人脸识别以及本书已讨论过的其他技术，构建一个功能完备的增强现实应用。\n\
  \n### 应用目的\n\n为这个应用设想一个具体用途有点困难。我并非试图解决某个非常实际的问题，而是想演示到目前为止我们在本书中学到的一些关键概念。\n\n\
  话虽如此，这个应用的初衷是客户服务。诚然，这有点夸大其词，但做起来还是会很有趣。在这个项目中，设想一台 iPad 安装在餐厅的桌子上方，或酒吧的公共区域。我们将分析\
  \ iPad 摄像头中人物的情绪，如果发现他/她情绪愤怒，就向客服发出警报。\n\n顺便提一下，我们将基于目前从书中学到的知识来构建这个应用。不幸的是，我们目前学到的方法可能无法如愿奏效。我想提前提醒你这一点。当应用在章节进行到一半时看起来像是坏了，那是故意的。这并非你做错了什么！我们将在后续修复它，并在此过程中了解一些\
  \ OpenGL 及其对线程不友好的特性。\n\n### 使用的技术\n\n起初，我们只会在屏幕上叠加一些关于用户的信息。这将是使用 cocos2D 构建更复杂\
  \ HUD 层的好练习。我们将扩展此应用，使其能够实际向客服代表发送短信（短消息服务）并报告事件。\n\n我们将使用的核心技术是`face.com` REST\
  \ API。正如我们在第 12 章中讨论的，`face.com` API 通过 REST 请求接收 JPEG 图像，并返回识别出的人脸的`x,y`坐标，以及关于人物情绪、眼镜和嘴部位置的信息。这是一个非常有用且快速的\
  \ API。\n\n### 准备工作\n\n让我们整理一下示例应用所需的技术。要进入有趣的部分，你需要完成三个主要的注册流程。\n\n#### Face.com\n\
  \n打开浏览器访问[`www.face.com`](http://www.face.com)。在右上角应该有一个名为`开发人员`的链接。点击该链接，然后点击页面中央巨大的`开始使用`图片。`face.com`的注册流程相当简单。它只要求你提供姓名、电子邮件和密码。如果你更慷慨一些，可以填写其余信息。无论如何，通过完成验证码证明你是人类，然后点击`注册`。按照确认邮件中的说明验证你的账户。\n\
  \n登录后，转到`API 密钥`选项卡。点击`点击此处设置新应用`的链接来创建一个新应用。你为应用取什么名字并不重要。我用了`iOS AR 演示`作为我的应用名称。你会看到一个类似于图\
  \ 13-1 的页面。\n\n![图片](img/1301.jpg)\n\n**图 13–1.** *完成`face.com`应用页面。*\n\n在开始构建应用时，你会用到这里的两个设置：`API\
  \ 密钥`和`API 密钥密码`。关于`face.com`目前就这些。\n\n#### cocos2D\n\n如果你还没有`cocos2D`，请访问[`www.cocos2d-iphone.org/download`](http://www.cocos2d-iphone.org/download)下载适用于\
  \ iPhone 的最新稳定版`cocos2D`，在撰写本文时版本为`1.0.1`。我们曾在第 7 章中介绍过在 Xcode 4.2 中安装`cocos2D`，所以如果你是那种会跳过章节的人，现在应该翻回去看看。\n\
  \n#### 设置我们的 Twilio 账户\n\nTwilio 是一个云通信平台，支持短信、语音甚至 VoIP 通信。注册过程也很简单。访问[`www.twilio.com/try-twilio`](http://www.twilio.com/try-twilio)设置你的免费试用账户。\n\
  \n设置好账户后，登录，你会看到仪表盘页面顶部类似于图 13-2 的内容。\n\n![图片](img/1302.jpg)\n\n**图 13–2.** *登录并进入你的`Twilio`仪表盘页面。*\n\
  \n**注意：** 与`face.com`的凭证类似，你需要记住你的`账户 SID`和`认证令牌`，以便在我们的演示应用中访问`Twilio`的 API。没有`认证令牌`，你的`账户\
  \ SID`将毫无用处。因此，切勿分享`认证令牌`！\n\n#### 下载 ASI-HTTP-Request 库\n\n有几个库可用于处理来自 iOS 的 HTTP\
  \ 请求。事实上，大多数功能都可以直接从头编写。但是，我们将通过 HTTP 以多部分表单上传的形式发送原始图像数据。针对这个特定目的，有一个非常好用的第三方库。\n\
  \n`ASI-HTTP-Request`是一个开源库，可在 GitHub 上的`pokeb/asi-http-request`找到。我已将本例中使用的版本分支到`kyleroche/asi-http-request`，以防你在使用更新版本时遇到任何问题。请将其保存在本地机器上的某个位置。\n\
  \n#### JSON-Framework\n\n我们还需要一些帮助来解析 JSON（JavaScript 对象表示法）消息，因为这是`face.com` API\
  \ 的首选输出格式（同样也非常适用于`Twilio`）。与`ASI-HTTP-Request`类似，GitHub 上有一个开源项目`stig/json-framework`，我已将其分支到`kyleroche/json-framework`以供参考。请将其保存在本地机器上的某个位置。\n\
  \n\n\n### 项目结构\n\n我们来创建项目。打开 Xcode，并使用 cocos2D 模板创建一个新项目，如图 13-3 所示。\n\n![Image](img/1303.jpg)\n\
