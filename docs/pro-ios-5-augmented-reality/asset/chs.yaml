  \          \"value\": \"true\",\n              \"confidence\": 87\n            },\n\
  \            \"gender\": {\n              \"value\": \"male\",\n              \"\
  confidence\": 46\n            },\n            \"mood\": {\n              \"value\"\
  : \"happy\",\n              \"confidence\": 51\n            },\n            \"lips\"\
  : {\n              \"value\": \"parted\",\n              \"confidence\": 98\n  \
  \          }\n          }\n        }\n      ]\n    }\n  ],\n  \"status\": \"success\"\
  ,\n  \"usage\": {\n    \"used\": 31,\n    \"remaining\": 4969,\n    \"limit\": 5000,\n\
  \    \"reset_time_text\": \"Thu, 29 Sep 2011 02:40:10 +0000\",\n    \"reset_time\"\
  : 1317264010\n  }\n}\n```\n\n我高亮了一些章节，这些章节将用于完成此示例。让我们从尝试捕获`status`值开始。\n\n借助 **SBJson**\
  \ 库，解析 JSON 变得非常简单。首先，创建一个新的`SBJsonParser`对象，然后从 face.com 返回的 JSON 字符串中创建一个`NSDictionary`。在代码清单\
  \ 13–27 中找到的代码之后，添加代码清单 13–29 中的代码。\n\n**代码清单 13–29.** *识别 JSON 数组中的键*\n\n```objectivec\n\
  SBJsonParser *jsonParser = [SBJsonParser new];\nNSDictionary *feed = [jsonParser\
  \ objectWithString:response error:nil];\nNSLog(@\"RETURN: %@\", [feed allKeys]);\n\
  ```\n\n由于我们可以将 JSON 字符串转换为`NSDictionary`，因此通常最好验证期望在`NSDictionary`根目录中找到的键是否与解析器认为存在于字典根目录中的键相匹配。我们通过`NSDictionary`的`allKeys`属性来实现这一点。如果添加此代码后再次运行项目，您将在控制台中看到类似于图\
  \ 13–10 的输出。\n\n![Image](img/1310.jpg)\n\n**图 13–10.** *控制台显示`allKeys`的返回值。*\n\n\
  可以看到`status`元素（即我们正在查找的元素）直接位于字典的顶层。由于这是一个单一元素，我们可以直接获取该键的值并将其记录到控制台。在记录`allKeys`输出之后，添加代码清单\
  \ 13–30 中的代码。\n\n**代码清单 13–30.** *记录状态消息*\n\n```objectivec\nif ([[feed valueForKey:@\"\
  status\"] isEqualToString:@\"success\"]) {\n        NSLog(@\"face.com request =\
  \ success\");\n}\n```\n\n如果再次运行项目，您将在控制台中看到成功消息。接下来，我们将继续向此`if`块的主体中添加代码，以捕获识别出的人脸的\
  \ x、y、width（宽度）和 height（高度）值。\n\n在成功块内部添加代码清单 13–31 中的代码。\n\n**代码清单 13–31.** *查找图片中人脸的位置*\n\
  \n```objectivec\ndouble xPosition = [[[[[photo objectForKey:@\"tags\"] objectAtIndex:0]\n\
  valueForKey:@\"center\"] valueForKey:@\"x\"] doubleValue];\ndouble yPosition = [[[[[photo\
  \ objectForKey:@\"tags\"] objectAtIndex:0]\nvalueForKey:@\"center\"] valueForKey:@\"\
  y\"] doubleValue];\nNSString *mood = [[[[[photo objectForKey:@\"tags\"] objectAtIndex:0]\n\
  objectForKey:@\"attributes\"] objectForKey:@\"mood\"] valueForKey:@\"value\"];\n\
  NSDictionary *photo = [[feed objectForKey:@\"photos\"] objectAtIndex:0];\n```\n\n\
  因此，这些代码行解析剩余的 JSON 元素，以查找我们在代码清单 13–28 中加粗的值。接下来，我们将使用它们来构建我们 HUD 层。\n\n\n### 构建\
  \ HUD 层\n\n到目前为止，如果你是一名开发者，这个应用本身看起来非常酷。然而，从用户的角度来看，我们无法真正了解正在发生什么。接下来，我们将通过本章第一部分创建的\
  \ HUD 层添加一些反馈信息来改变这一状况。请记住，HUD 层是透明的，但它位于场景堆栈的其余部分之上。因此，我们可以在这一层叠加所有内容。\n\n还记得本章引言中我曾提到事情不会如预期般顺利吗？这部分内容就从这里开始。如果你愿意，可以快速浏览一下，不过这只是一段小插曲；所以，如果你乐意的话，就跟着代码继续往下看吧。\n\
  \n打开 `HUDLayer.h`，声明 代码清单 13–32 中所示的方法。\n\n**代码清单 13–32.** *加载准星和情绪标签*\n\n`- (void)loadCrosshair:(NSString\
  \ *)mood x:(double)x y:(double)y;`\n\n切换到 `HUDLayer.m`，实现 代码清单 13–33 中的 `loadCrosshair`\
  \ 方法。\n\n**代码清单 13–33.** *实现 loadCrosshair 方法*\n\n`- (void)loadCrosshair:(NSString\
  \ *)mood x:(double)x y:(double)y {`\n`    CGSize size = [[CCDirector sharedDirector]\
  \ winSize];`\n`    CCLabelTTF *label = [CCLabelTTF labelWithString:@\"test\" fontName:@\"\
  Marker Felt\" fontSize:48];`\n`    // 将标签定位在屏幕中央`\n`    label.position =  ccp( size.width\
  \ /2 , size.height/2 );`\n`    // 将标签作为子节点添加到此层`\n`    [self addChild: label];`\n\
  `    CCSprite *crosshair = [CCSprite spriteWithFile:@\"crosshair.png\" rect:CGRectMake(0,0,390,390)];`\n\
  `    crosshair.position = ccp((size.width * (x/100)), (size.height * (1 - (y/100))));`\n\
  `    [self addChild:crosshair];`\n`}`\n\n在此方法中，我们使用了一些基本函数来将 PNG 文件添加到屏幕上，并设置一个标签来显示用户的情绪。`label`\
  \ 对象的 `position` 属性是使用 cocos2D 中的 `ccp` 宏设置的。这个宏为我们创建了一个锚点，用于将图像放置在屏幕上。我们将锚点的位置设置为屏幕中央（宽度的一半，高度的一半）。\n\
  \n接下来，我们从 PNG 文件加载一个精灵，并将其放置在屏幕上。Face.com 作为其响应的一部分，会返回所识别人脸的位置（中心）。该位置以屏幕的百分比表示，这样如果你发送的是缩小后的图像（正如本章我们所做的），就无需重新计算像素。由于这些百分比是整数，我们将它们除以\
  \ 100，并为精灵创建一个与 Face.com 识别人脸位置相同的锚点。\n\n切换到 `FaceDetectionLayer.m`，找到 代码清单 13–31\
  \ 中的代码（该代码解析了 Face.com 请求返回的情绪、x 和 y 值）。在这些代码行之后，添加 代码清单 13–34 中的代码。\n\n**代码清单 13–34.**\
  \ *调用 loadCrosshair 方法*\n\n`[_hud loadCrosshair:mood x:xPosition y:yPosition];`\n\
  \n我们将使用 HUD 层来调用这个新方法。回想一下我们堆叠视图的示意图，这应该能正常工作。运行项目。结果应该类似于 图 13–11。\n\n![图片](img/1311.jpg)\n\
  \n**图 13–11.** *等等，这不对！*\n\n好消息是，图像似乎被放置在了正确的位置。坏消息是，你看不到图像。屏幕上看起来像是一个不透明的块。\n\n\
  这是由于 OpenGL 处理线程的方式导致的。我们分离了一个线程来处理 HTTP 请求，而 OpenGL 要求我们通过主线程与屏幕交互。关于处理 OpenGL\
  \ 线程问题有多种方法，网上也有大量相关文章。这是一个基本示例，说明了在 cocos2D 应用程序中需要更有序的线程管理。如果你想了解更多关于 OpenGL 和线程的知识，可以查阅\
  \ Apress 出版社的 Mike Smithwick 所著的 *Pro OpenGL for iOS*。\n\n让我们解决这个问题。事实证明，这个应用其实并不需要一个\
  \ HUD 层。因为我们的基本逻辑在 `AppDelegate` 中，所以 `FaceDetectionLayer` 充当了 HUD 层的角色。让我们将绘图函数向下移动一层，并使用主线程来调用屏幕上的标签更改。\n\
  \n与其动态创建标签和精灵，不如创建一个属性，这样我们就能在类外部访问它。此外，我们还需要一个属性来引用我们的 `RootViewController`。\n\n\
  按 代码清单 13–35 所示调整 `FaceDetectionLayer.h` 文件。我已经注释掉了不再需要的行。\n\n**代码清单 13–35.** *对\
  \ FaceDetectionLayer 的修改*\n\n```\n#import <Foundation/Foundation.h>\n#import \"\
  cocos2d.h\"\n#import \"HUDLayer.h\"\n#import \"ASIFormDataRequest.h\"\n#import \"\
  SBJson.h\"\n\n@interface FaceDetectionLayer : CCLayer {\n    //HUDLayer *_hud;\n\
  \    BOOL _sendingRequest;\n    CCSprite *crosshair;\n}\n\n@property (retain) UIViewController\
  \ * root;\n@property (retain) CCLabelTTF * label;\n\n//+ (CCScene *)scene;\n//-\
  \ (id)initWithHUD:(HUDLayer *)hud;\n- (void)facialRecognitionRequest:(UIImage *)image;\n\
  @end\n```\n\n切换回 `FaceDetectionLayer.m`，按 代码清单 13–36 所示合成新的属性。\n\n**代码清单 13–36.**\
  \ *合成新属性*\n\n```\n@synthesize root;\n@synthesize label = _label;\n```\n\n同样注释掉 `scene`\
  \ 和 `initWithHUD` 方法。我们将不再使用它们。使用 代码清单 13–37 中的代码创建一个新的 `init` 方法。\n\n**代码清单 13–37.**\
  \ *新的 init 方法*\n\n```\n-(id) init {\n    if(self = [super init]){\n        CGSize\
  \ size = [[CCDirector sharedDirector] winSize];\n        crosshair =  [CCSprite\
  \ spriteWithFile:@\"crosshair.png\" ];\n        crosshair.position = ccp((size.width\
  \ * (50.0/100)), (size.height * (1 - (50.0/100))));\n        crosshair.opacity =\
  \ 0;\n        [self addChild:crosshair];\n        _label = [CCLabelTTF labelWithString:@\"\
  \" fontName:@\"Marker Felt\" fontSize:48];\n        _label.position =  ccp( size.width\
  \ /2 , size.height/2 );\n        [self addChild: _label];\n    }\n    return self;\n\
  }\n```\n\n我们只是将部分 `HUDLayer` 代码移到了 `FaceDetectionLayer` 的 `init` 方法中。这段代码唯一真正的区别是我们还没有设置标签的文本。我们稍后将在\
  \ `RootViewController` 中设置它。\n\n用 代码清单 13–39 中的代码替换 代码清单 13–38 中的代码行。\n\n**代码清单\
  \ 13–38.** *找到这行代码……*\n\n`[_hud loadCrosshair:mood x:xPosition y:yPosition];`\n\n\
  **代码清单 13–39.** *替换为以下代码……*\n\n```\nCGSize size = [[CCDirector sharedDirector] winSize];\n\
  crosshair.opacity = 255;\ncrosshair.position = ccp((size.width * (xPosition/100)),\
  \ (size.height * (1 - (yPosition/100))));\n[root performSelectorOnMainThread:@selector(updateMood:)\
  \ withObject:mood waitUntilDone:YES];\n```\n\n我们没有将请求发送到 `HUDLayer` 类，而是使用 `ccp`\
  \ 宏移动精灵，并将标签的更新发送回主线程。`updateMood` 函数尚不存在。我们接下来将创建它。\n\n打开 `RootViewController.h`。导入\
  \ `FaceDetectionLayer.h` 头文件，并添加 代码清单 13–40 中所示的属性和方法。\n\n**代码清单 13–40.** *更新后的\
  \ RootViewController*\n\n```\n#import <UIKit/UIKit.h>\n#import \"FaceDetectionLayer.h\"\
  \n\n@interface RootViewController : UIViewController {\n}\n@property (retain) FaceDetectionLayer*\
  \ fdLayer;\n-(void)updateMood:(NSString*)mood;\n@end\n```\n\n切换到 `RootViewController.m`，合成我们刚创建的属性。然后创建\
  \ 代码清单 13–41 中的方法。\n\n**代码清单 13–41.** *updateMood 方法*\n\n```\n-(void)updateMood:(NSString\
  \ *) mood {\n    [[[self fdLayer] label] setString:mood];\n}\n```\n\n\n\n在 Xcode\
  \ 中打开 `AppDelegate.m`。使用代码清单 13–42 中的代码更新 `applicationDidFinishLaunching` 方法。\n\n\
  **代码清单 13–42.** *已更新的 applicationDidFinishLaunching 方法*\n\n```\n// 消除启动时的闪烁\n [self\
  \ removeStartupFlicker];\n// 运行介绍场景\nCCScene *scene = [CCScene node];\n_layer =[[[FaceDetectionLayer\
  \ alloc] init] autorelease];\n[scene addChild:_layer];\nviewController.fdLayer =\
  \ _layer;\n_layer.root = viewController;\n [[CCDirector sharedDirector] runWithScene:\
  \ scene];\n\n_timer = [NSTimer scheduledTimerWithTimeInterval:5.0 target:self selector:@selector(timerCallback)\
  \ userInfo:nil repeats:YES];\n[self setupCaptureSession];\n}\n```\n\n我们没有运行 `initWithHUD`\
  \ 方法，而是使用新的 `init` 方法实例化 `FaceDetectionLayer`。这段代码的另一个区别是，我们将 `viewController`（即\
  \ `RootViewController`）的 `fdLayer` 属性设置为了我们的 `FaceDetectionLayer`。\n\n如果你直接运行项目，在请求解析完毕后，屏幕上应该会显示正确的叠加层和心情标签。这部分内容我得到了孩子们的帮助。结果如图\
  \ 13–12 至图 13–14 所示。\n\n请注意表情变化时心情标签的更新。Face.com 在识别每次请求之间的表情方面做得非常出色。我们的程序正确地将\
  \ PNG 文件移动到了面部的 x、y 坐标位置，并且由于我们将部分逻辑移回了主线程，一切看起来进展顺利。\n\n![Image](img/1312.jpg)\n\
  \n**图 13–12.** *Aodhan 很开心！*\n\n![Image](img/1313.jpg)\n\n**图 13–13.** *Avery 很生气！*\n\
  \n![Image](img/1314.jpg)\n\n**图 13–14.** *Avery 很惊讶！*\n\n我们要构建到应用程序中的最后一个功能是短信功能，用于在检测到愤怒或悲伤表情时通知客服人员。\n\
  \n请记住，如果你希望将此功能扩展用于实际目的，摄像头视野中可能不止一个人。你唯一需要做的调整是遍历 face.com 的 JSON 响应中返回的所有照片。我们硬编码了\
  \ `objectAtIndex:0`，只选取第一个被识别的人脸。因此，如果你想要分析人群，就需要进行这种调整。\n\n### 添加 Twilio 调用\n\n\
  Twilio 使用 REST 发起外呼或发送短信。我们使用短信的原因之一是它只需要 REST 调用。我们无需在 Web 服务器上托管任何代码。将代码清单 13–43\
  \ 中的方法添加到 `FaceDetectionLayer.m` 文件中。\n\n**代码清单 13–43.** *发送短信*\n\n```\n- (void)sendSMS\
  \ {\n    NSAutoreleasePool * pool = [[NSAutoreleasePool alloc] init];\n\n    NSLog(@\"\
  发送请求\");\n    NSString *accountSid = @\"在此处输入您的账户 SID\";\n    NSString *authToken\
  \ = @\"在此处输入您的 AuthToken\";\n    NSString *urlString = [NSString\nstringWithFormat:@\"\
  https://%@:%@@api.twilio.com/2010-04-01/Accounts/%@/SMS/Messages\",\naccountSid,\
  \ authToken, accountSid];\n\n    NSURL *url = [NSURL URLWithString:urlString];\n\
  \n    ASIFormDataRequest *request = [ASIFormDataRequest requestWithURL:url];\n \
  \   [request addPostValue:@\"在此处输入您的目标号码\" forKey:@\"To\"];\n    [request addPostValue:@\"\
  检测到愤怒表情\" forKey:@\"Body\"];\n    [request addPostValue:@\"有效的 Twilio 号码\" forKey:@\"\
  From\"];\n\n    [request startSynchronous];\n\n    NSError *error = [request error];\n\
  \    if (!error) {\n        NSString *response = [request responseString];\n   \
  \     NSLog(@\"%@\",response);\n    } else {\n        NSLog(@\"发生错误 %d; %@\",[error\
  \ code], [request responseString]);\n    }\n\n    [pool drain];\n}\n```\n\n这简单多了。正如你所见，Twilio\
  \ 提供了一个非常简单的 API，可以快速为你的应用增加价值。你可以从 `facialRecognitionRequest` 方法中引用这个新函数。只需将其包装在一个简单的检查中，以匹配“愤怒”心情，一切就准备就绪了。\n\
  \n短信如图 13–15 所示。\n\n![Image](img/1315.jpg)\n\n**图 13–15.** *短信已成功发送。*\n\n### 总结\n\
  \n本章非常有趣。我们像第 7 章一样，从创建一个 HUD 层开始。经过一些实验后，我们意识到这并非必要。通过逐步操作，我们了解了 OpenGL 的多线程技术（这是\
  \ cocos2D 的基础）。\n\n我们扩展了示例，创建了 `AVCaptureSession` 并将 `UIImages` 发送到 face.com 的 REST\
  \ API。我们使用了两个不同的开源库来为演示添加功能。ASI-HTTP-Request 帮助我们以简短的代码封装了 REST 调用，而 SBJson 库则帮助我们解析来自\
  \ face.com 的响应。\n\n我们使用 cocos2D 在目标人脸叠加了一个精灵，并用一个标签显示了来自 face.com 的心情结果。最后，我们使用\
  \ Twilio 简单的 REST API 通过短信向客服人员发出通知，告知检测到了愤怒的表情。\n\n在将人脸识别示例用于自己的应用程序之前，你应该检查当地的隐私法律。在某些地区，捕获或存储面部模式可能构成隐私侵犯。\n\
  \n希望你从本书的示例中学到了很多。请查阅书末的补充材料，了解一些更有帮助的主题。如果对演示有任何疑问或反馈，欢迎在 Twitter 上联系我 @kylemroche，也可以在\
