  \    self.hudView = [[UIView alloc] initWithFrame:screenBounds];\n    self.rootViewController.view\
  \ = self.hudView;\n\n    self.pickerController = [[[UIImagePickerController alloc]\
  \ init] autorelease];\n        self.pickerController.sourceType = UIImagePickerControllerSourceTypeCamera;\n\
  \        self.pickerController.cameraViewTransform = CGAffineTransformScale(\nself.pickerController.cameraViewTransform,\
  \ 1.13f,  1.13f);\n\n        self.pickerController.showsCameraControls = NO;\n \
  \       self.pickerController.navigationBarHidden = YES;\n        self.pickerController.cameraOverlayView\
