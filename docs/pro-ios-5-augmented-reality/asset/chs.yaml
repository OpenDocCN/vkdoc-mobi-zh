  \ 的内容。\n\n![图像](img/1107.jpg)\n\n**图 11-7.** *这是我们目前构建的成果。*\n\n### 添加社交上下文\n\n应用已经初具雏形。我们已经构建了处理位置和方向更新以及在屏幕上显示标签的功能。目前，我们硬编码了一个位置（我的位置）来调试功能。现在，让我们加入\
  \ Facebook 上下文，并获取部分 Facebook 好友的位置。\n\n如果你没有跳过本章的那一节，你会记得 Facebook iOS SDK 使用 URL\
  \ Scheme 来管理其原生应用中的 oAuth 回调。我们已经将 Facebook SDK 复制到项目中，因此在使用之前，我们需要在`.plist`文件中设置\
  \ URL Scheme。\n\n在 Xcode 中，找到`Resources`分组下的`Ch11–Info.plist`文件。\n\n1.  打开文件并添加一个新行。\n\
  2.  将键（Key）设置为`URL Types`。\n3.  展开新分组。添加一个子行。\n4.  将键命名为`URL Schemes`。\n5.  展开新键。将第\
  \ 0 项的值设置为`fb[appID]`，其中`appID`是你的 Facebook 应用 ID。\n\n我们在随 SDK 一起下载的 Facebook 演示应用中已经测试过这个流程。\n\
  \n打开`RootViewController.h`。更新接口文件，如代码清单 11-37 所示。\n\n**代码清单 11-37.** *将 Facebook\
  \ Connect 添加到 RootViewController*\n\n```\n#import <UIKit/UIKit.h>\n#import \"FBConnect.h\"\
  \n\n@class ARController;\n\n@interface RootViewController : UIViewController <FBRequestDelegate,\
  \ FBDialogDelegate,\nFBSessionDelegate> {\nNSArray *_permissions;\n}\n\n@property\
  \ (nonatomic, retain) Facebook *facebook;\n@property (nonatomic, retain) ARController\
  \ *arController;\n\n@end\n```\n\n权限数组实际上并非必需。我们可以将其本地化到登录方法中，但我遵循了演示应用和文档中的代码，以便你更轻松地将此功能迁移到未来的应用中。\n\
  \n检查你的项目，确保它能够正确编译。在`import`语句之后，如果你没有正确包含 Facebook SDK，将会出现编译错误。\n\n切换到`RootViewController.m`。在你最后的`synthesize`语句之后，添加代码清单\
  \ 11-38 中的代码。显然，请将其替换为你自己的应用 ID。\n\n**代码清单 11-38.** *为 Facebook 应用 ID 创建变量*\n\n\
  ```\n@synthesize facebook = _facebook;\nstatic NSString* kAppId = @\"your app id\"\
  ;\n```\n\n在`loadView`方法的末尾，添加代码清单 11-39 中的代码。\n\n**代码清单 11-39.** *启动 Facebook oAuth\
  \ 对话框*\n\n```\n_permissions =  [[NSArray arrayWithObjects:@\"read_stream\", @\"\
  publish_stream\", @\"offline_access\", @\"friends_checkins\", nil] retain];\n_facebook\
  \ = [[Facebook alloc] initWithAppId:kAppId andDelegate:self];\n [_facebook authorize:_permissions];\n\
  ```\n\n如你所见，对 Facebook 进行身份验证有三个基本步骤。首先，设置你的应用所需的权限列表。其次，使用应用 ID 和委托（此处我们使用`self`）初始化`facebook`类。接着，使用`authorize`实例方法在\
  \ Web 浏览器中启动 oAuth 对话框。请记住，Facebook 随后会使用我们之前设置的 URL Scheme 回调你的应用。\n\nFacebook\
  \ 平台建立在 Graph API 之上。它提供了一种简单且一致的机制来检索和更新用户社交图谱的信息。然而，对我们来说，缺点是我们需要查询一个数据交集。具体来说，我们需要一部分好友及其最后已知的签到位置。这对于标准的\
  \ Graph API 来说过于复杂。因此，我们将通过一种更高级的媒介——FQL（Facebook 查询语言）来查询 Graph API。FQL 通过类似 SQL\
  \ 的接口暴露 Graph API 中的数据。\n\n为了演示 Graph API 调用和 FQL 调用，我们将从标准 Graph API 拉取好友列表，然后使用\
  \ FQL 调用拉取每位好友的最后签到位置。让我们开始吧。\n\n\n\n### 面向朋友的图形\n\n打开`RootViewController.m`。由于这是我们示例中设置\
  \ GPS 坐标的位置，因此扩展示例以查询 Facebook 位置是合理的。\n\nFacebook 的 iOS SDK 使用一个委托协议（已添加到`RootViewController.h`中）来处理\
  \ API 调用的结果。在调用 Graph API 之前，我们需要创建委托方法。将清单 11-40 中的代码添加到`RootViewController.m`。\n\
  \n**清单 11-40.** *Facebook 请求委托方法*\n\n```\n/**\n * Called when the Facebook API request\
  \ has returned a response. This callback\n * gives you access to the raw response.\
  \ It's called before\n * (void)request:(FBRequest *)request didLoad:(id)result,\n\
  \ * which is passed the parsed response object.\n */\n- (void)request:(FBRequest\
  \ *)request didReceiveResponse:(NSURLResponse *)response {\n    NSLog(@\"received\
  \ response\");\n}\n\n/**\n * Called when a request returns and its response has\
  \ been parsed into\n * an object. The resulting object may be a dictionary, an array,\
  \ a string,\n * or a number, depending on the format of the API response. If you\
  \ need access\n * to the raw response, use:\n *\n * (void)request:(FBRequest *)request\n\
  \ *      didReceiveResponse:(NSURLResponse *)response\n */\n- (void)request:(FBRequest\
