- "# 构建 cocos2D AR 游戏\n\n本章将扩展我们在第 7 章中学到的知识，构建一个功能完备的增强现实（AR）游戏。增强现实游戏可以拥有众多场景或故事线。虽然本游戏的情节略显荒诞，但它将展示\
  \ AR 游戏的一些重要能力。我们将学习如何构建一个带有菜单和启动选项的 cocos2D 游戏结构，并处理计分和游戏结束场景。整个游戏将在相机视图之上进行。\n\
  \n### 概述\n\n每个游戏都始于一个故事。我们的故事是：外星南瓜占领了地球。星际警察发布了一种特殊设备，让我们能够看到这些南瓜，并通过相机点击它们将其摧毁。这个设备当然就是我们的\
  \ iPad 或 iPhone。\n\n游戏启动时，我们将使用一个 iOS 5 新增的类——`CIDetector`。这个类将在第 12 章中详细讨论。现在你只需要知道，它能识别相机视图中的人脸，并允许我们在人的头部位置叠加南瓜图像。当相机视图中检测到人脸时，你会看到类似图\
  \ 8-1 的效果。\n\n![Image](img/0801.jpg)\n\n**图 8-1.** *我们的南瓜示例，叠加在人脸上。*\n\n我们现在应该已经具备了开始编码所需的一切。在第\
  \ 7 章中，我们配置了 cocos2D 并运行了一个简单示例。本章将使用我们在安装 cocos2D 时一同安装的模板。更准确地说，我们将使用包含 cocos2D\
  \ 和 chipmunk 物理库的模板。我们不会在游戏中使用太多 chipmunk 功能，而是利用它让菜单屏幕对用户来说更有趣。\n\n本游戏的计分会有一定难度。由于我们是在人脸上随机放置南瓜并炸毁它们，因此需要考虑南瓜重新出现的速度。为了避免游戏无法获胜，我们将使用一组固定的南瓜。这些南瓜很可能会多次覆盖同一个人（除非你能在人群中测试）。当用户消灭所有外星南瓜后，我们就判定玩家获胜。我们还会设置一个计时器，让外星人有公平的机会继续存在。\n\
  \n### 创建项目\n\n如果你跳过了第 7 章，请返回并确保你已完成“安装”部分的步骤。本章绝对需要 cocos2D 框架。\n\n在 Xcode 中创建一个新项目。确保选择\
  \ `cocos2d_chipmunk` 模板，如图 8-2 所示。\n\n![Image](img/0802.jpg)\n\n**图 8-2.** *选择 cocos2d_chipmunk\
  \ 模板。*\n\n为项目命名。我将其命名为 `Ch8`，这样你可以轻松在 GitHub 仓库或 Apress 网站（[`www.apress.com`](http://www.apress.com)）的“源代码/下载”区找到它。确保将项目设置为**通用项目**。将**支持的设备方向**仅设置为**横向右**，如图\
  \ 8-3 所示。这样做是为了最小化南瓜放置的逻辑。\n\n![Image](img/0803.jpg)\n\n**图 8-3.** *将支持的设备方向设置为横向右。*\n\
  \n运行项目并确保一切正常。有时 chipmunk 会带来一些难以追踪的麻烦，尤其是在项目深入之后。Chipmunk 的 Hello World 风格与标准 cocos2D\
  \ 模板不同。你会看到一个画面中的人物，他叫 Grossini，以防你好奇。\n\n这是一个非常酷的 Hello World 项目。如果你点击屏幕，一个新的 Grossini\
  \ 会出现，并将其他人物推开。应用程序也会对加速度计和方向变化做出响应。所以，如果你想快速了解 chipmunk 的能力，请在真机（而非模拟器）上运行它。\n\n\
  在屏幕点击几次后，我会看到类似图 8-4 的效果。\n\n![Image](img/0804.jpg)\n\n**图 8-4.** *点击屏幕几次，观察 Grossini\
  \ 的增殖。*\n\n关闭应用程序并返回 Xcode。让我们删除不会用到的文件，从头重建这个项目。从项目中删除 `HelloWorldLayer.h`、`HelloWorldLayer.m`\
  \ 和 `grossini_dance_atlas.png`。\n\n打开 `AppDelegate.m`。删除我们刚删除的类的 `import` 语句。然后注释掉代码清单\
  \ 8-1 中显示的那行代码。该代码可以在 `applicationDidFinishLaunching` 方法的末尾找到。\n\n**代码清单 8-1.**\
  \ *注释掉 HelloWorld 场景*\n\n```\n//[[CCDirector sharedDirector] runWithScene: [HelloWorldLayer\
  \ scene]];\n```\n\n好的，确保应用程序可以构建。现在不需要运行它，但应该能无错误地编译。\n\n\n\n#### 相机视图\n\n首先，像我们在第\
  \ 7 章中所做的那样，将相机视图设置为基础层。在项目中添加以下框架：\n\n- CoreImage\n- CoreMedia\n- CoreVideo\n\n\
  在 Xcode 中打开 `AppDelegate.h`。按照代码清单 8-2 所示更新头文件。\n\n**代码清单 8-2.** *新的 AppDelegate.h*\n\
  \n```\n#import <UIKit/UIKit.h>\n#import <AVFoundation/AVFoundation.h>\n\n@class\
  \ RootViewController;\n\n@interface AppDelegate : NSObject <UIApplicationDelegate,\n\
  AVCaptureVideoDataOutputSampleBufferDelegate> {\n    UIWindow *window;\n    RootViewController\
  \ *viewController;\n\nAVCaptureSession *_session;\nUIView *_cameraView;\nUIImageView\
  \ *_imageView;\n}\n\n@property (nonatomic, retain) UIWindow *window;\n\n@end\n```\n\
  \n与我们在第 7 章中的做法非常相似，我们正在设置 `UIView` 和 `UIImageView` 来处理并向用户显示相机视图。切换到 `AppDelegate.m`。将代码清单\
  \ 8-3 中的方法添加到实现中。\n\n**代码清单 8-3.** *AppDelegate.m 的新方法*\n\n```\n-(AVCaptureDevice\
  \ *)frontFacingCameraIfAvailable\n{\n    NSArray *videoDevices = [AVCaptureDevice\
  \ devicesWithMediaType:AVMediaTypeVideo];\n    AVCaptureDevice *captureDevice =\
  \ nil;\n    for (AVCaptureDevice *device in videoDevices)\n    {\n        if (device.position\
  \ == AVCaptureDevicePositionFront)\n        {\n            captureDevice = device;\n\
  \            break;\n        }\n    }\n\n    //  如果找不到前置摄像头，就获取默认视频设备。\n    if (\
  \ ! captureDevice)\n    {\n        captureDevice = [AVCaptureDevice defaultDeviceWithMediaType:AVMediaTypeVideo];\n\
  \    }\n\n    return captureDevice;\n}\n\n- (void)setupCaptureSession {\n    NSError\
  \ *error = nil;\n\n    _session = [[AVCaptureSession alloc] init];\n    _session.sessionPreset\
  \ = AVCaptureSessionPresetMedium;\n\n    //AVCaptureDevice *device = [AVCaptureDevice\
  \ defaultDeviceWithMediaType:AVMediaTypeVideo];\n    AVCaptureDevice *device = [self\
  \ frontFacingCameraIfAvailable]; // 用于调试\n    AVCaptureDeviceInput *input = [AVCaptureDeviceInput\
  \ deviceInputWithDevice:device error:&error];\n\n    if (!input) {\n        NSLog(@\"\
  出现了某种错误... 在此处处理\");\n    }\n\n    [_session addInput:input];\n\n    AVCaptureVideoDataOutput\
  \ *output = [[AVCaptureVideoDataOutput alloc] init];\n    [_session addOutput:output];\n\
  \n    dispatch_queue_t queue = dispatch_queue_create(\"pumpkins\", NULL);\n    [output\
  \ setSampleBufferDelegate:self queue:queue];\n    dispatch_release(queue);\n\n \
  \   output.videoSettings =\n    [NSDictionary dictionaryWithObject:\n     [NSNumber\
  \ numberWithInt:kCVPixelFormatType_32BGRA]\n                                forKey:(id)kCVPixelBufferPixelFormatTypeKey];\n\
  \n    [_session startRunning];\n}\n```\n\n第一个方法 `frontFacingCameraIfAvailable` 仅用于调试目的。如果你不是在人群中编码，这会很方便，这样你就可以使用前置摄像头进行测试。如果你不在调试状态，应该交换显示为粗体的两行代码。也就是说，注释掉其中一个来强制使用前置摄像头（如果可用的话）。每次只使用其中一个。因为我不是在人群中编码，并且需要使用前置摄像头，所以我将保留当前状态。\n\
  \n在我们真正将相机添加到视图之前，让我们先使用 Chipmunk 物理引擎设置一个菜单界面，以便用户在等待游戏开始时消遣。\n\n### 创建游戏菜单\n\n\
  使用 cocos2D 的 `CCNode` 模板创建新文件，如图 8-5 所示。\n\n![Image](img/0805.jpg)\n\n**图 8-5.**\
  \ *使用 CCNode 模板*\n\n确保文件是 `CCLayer` 的子类，并且名称为 `MenuLayer.m`。在 Xcode 中打开 `MenuLayer.h`。按照代码清单\
  \ 8-4 所示更新头文件。\n\n**代码清单 8-4.** *更新 MenuLayer.h*\n\n```\n#import <Foundation/Foundation.h>\n\
