  \n### 完成动作层\n\n让我们思考一下，为了让这个游戏具备一定结构，我们还需要什么。显然，我们缺少南瓜。但除此之外，我们应该实现某种计数器，用来追踪已经消灭了多少个外星南瓜。我们的精灵表单中有\
  \ 12 张不同的南瓜图像。让我们将其设置为倒计时类型的游戏，即用户必须在游戏结束前消灭全部 12 个南瓜。\n\n首先，我们来解决面部识别问题。我们将使用 iOS\
  \ 5 中新增的一个类——`CIDetector`。我们将在第 12 章中更详细地讨论它。在 `ActionLayer.h` 中，添加代码清单 8-35 中的属性。\n\
  \n**代码清单 8-35.** *CIDetector 属性*\n\n```objc\n@property (nonatomic, retain) CIDetector\
  \ *detector;\n```\n\n打开 `ActionLayer.m` 并合成该属性。在 `init` 方法的 `if` 块内部，添加代码清单 8-36\
  \ 中的代码。\n\n**代码清单 8-36.** *设置 CIDetector*\n\n```objc\nNSDictionary *detectorOptions\
  \ = [NSDictionary dictionaryWithObjectsAndKeys:CIDetectorAccuracyLow, CIDetectorAccuracy,\
  \ nil];\n        self.detector = [CIDetector detectorOfType:CIDetectorTypeFace context:nil\
  \ options:detectorOptions];\n```\n\n正如我所提到的，我们将在第 12 章中更详细地讨论这个类。现在，你只需要知道 `CIDetector`\
  \ 会追踪它在图像中识别到的面部的 x、y 坐标。在我们的案例中，我们将用它来追踪相机视图中的面部。按代码清单 8-37 所示更新 `facialRecognitionRequest`\
  \ 方法。\n\n**代码清单 8-37.** *更新后的 facialRecognitionRequest 方法*\n\n```objc\n- (void)facialRecognitionRequest:(UIImage\
  \ *)image {\n    if (!isProcessingRequest) {\n        isProcessingRequest = YES;\n\
  \        NSArray *arr = [detector featuresInImage:[CIImage imageWithCGImage:[image\
