  \ 的示例，以确保一切正常运行。你会注意到，在这个示例中我们使用了一个自定义字体文件和 `CCLabelBMFont` 类。你可以在 GitHub 仓库或 Apress\
  \ 网站（[`www.apress.com`](http://www.apress.com)）的源代码/下载区域找到相关代码。这些字体由 Ray Wenderlich（[`www.raywenderlich.com`](http://www.raywenderlich.com)）提供。在尝试运行项目之前，你需要等待字体被添加到项目中。如果你现在就想运行项目，可以现在就添加它们。\n\
  \n让我们回到 `AppDelegate.m`。我们需要再添加一些内容，以确保菜单能够显示给用户。将代码清单 8-6 中的 `import` 语句添加到项目中。\n\
