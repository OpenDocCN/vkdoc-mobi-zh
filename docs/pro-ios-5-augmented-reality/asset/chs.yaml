  );\n        } else {\n            NSLog(@\"No faces found\");\n        }    \n \
  \   }\n    isProcessingRequest = NO;\n}\n```\n\n我知道我说过稍后再讨论，但处理图像进行面部识别所需的代码量之少，实在令人印象深刻。加粗的那一行代码就是全部所需。如果我们在相机视图中找到了面部，就记录到控制台；如果没找到，也同样记录。\n\
  \n继续在实体设备上再次运行应用程序。你应该会看到类似图 8-16 所示的控制台输出。\n\n![Image](img/0816.jpg)\n\n**图 8-16**\
  \ *查看屏幕缓冲日志信息，并注意“Faces found.”消息。*\n\n看起来一切正常。让我们添加逻辑，将南瓜显示在目标的面部上。\n\n\n\n###\
  \ 南瓜登场\n\n我们只允许同时存在一个外星南瓜。基本规则是：第一个被检测到的人脸，就会不幸成为南瓜寄生的目标。\n\n为了实现这一机制，我们需要先在屏幕上添加一个南瓜，并将其设置为不可见状态。当我们检测到人脸时，将南瓜移动到人脸的坐标位置，并重新将其设置为不透明，这样它就会出现在摄像头画面中。\n\
  \n打开 `ActionLayer.h`。声明如代码清单 8-38 所示的私有变量。\n\n**代码清单 8-38.** *新的私有变量*\n\n```\nCCSpriteBatchNode\
  \ *pumpkinBatchNode;\nCCSprite *pumpkin;\nint pumpkin_count;\n```\n\n这些变量将用于初始化我们的南瓜图像。和之前一样，我们会使用\
  \ `CCSpriteBatchNode` 来管理图片。整数 `pumpkin_count` 用于从 12 开始倒计数，这样我们就能知道还剩多少个外星南瓜需要消灭。切换到\
  \ `ActionLayer.m` 文件。按照代码清单 8-39 所示更新 `init` 方法。\n\n**代码清单 8-39.** *新的 init 方法*\n\
  \n```\n- (id)init {\n    if (self = [super init]) {\n        //CGSize winSize =\
  \ [CCDirector sharedDirector].winSize;\n\n        NSDictionary *detectorOptions\
  \ = [NSDictionary dictionaryWithObjectsAndKeys:CIDetectorAccuracyLow, CIDetectorAccuracy,\
  \ nil];\n        self.detector = [CIDetector detectorOfType:CIDetectorTypeFace context:nil\
  \ options:detectorOptions];\n\n        pumpkinBatchNode = [CCSpriteBatchNode batchNodeWithFile:@\"\
  pumpkins.png\"];\n        [self addChild:pumpkinBatchNode];\n\n        pumpkin =\
  \ [CCSprite spriteWithSpriteFrameName:@\"pumpkin5.png\"];\n        pumpkin.position\
  \ = ccp(0,0);\n        pumpkin.opacity = 0;\n        [self addChild:pumpkin];\n\n\
  \        // 开始游戏\n        isProcessingRequest = NO;\n        pumpkin_count = 12;\n\
  \        [AppDelegate instance].actionLayer = self;\n        [AppDelegate instance].isPlaying\
  \ = YES;\n\n        self.isTouchEnabled = YES;\n    }\n    return self;\n}\n```\n\
  \n这里，我们使用之前用过的精灵表初始化了 `CCSpriteBatchNode`。然后，通过精灵表中的 `pumpkin5.png` 帧初始化了 `pumpkin`\
  \ 变量，将其作为一个新的 `CCSprite`。接着，我们将其设置为透明，并添加到场景中。\n\n确保项目仍然能无报错地构建。目前还看不出什么新效果，所以把项目跑在设备上也没用。按照代码清单\
  \ 8-40 所示，更新 `facialRecognitionRequest` 方法。\n\n**代码清单 8-40.** *新的 facialRecognitionRequest\
  \ 方法*\n\n```\n- (void)facialRecognitionRequest:(UIImage *)image {\n    //NSLog(@\"\
  Image is: %f by %f\", image.size.width, image.size.height);\n\n    if (!isProcessingRequest)\
  \ {\n        isProcessingRequest = YES;\n        //NSLog(@\"Detecting Faces\");\n\
  \        NSArray *arr = [detector featuresInImage:[CIImage imageWithCGImage:[image\
  \ CGImage]]];\n\n        if ([arr count] > 0) {\n            //NSLog(@\"Faces found.\"\
  );\n            for (int i = 0; i < 1; i++) { //< [arr count]; i++) {\n        \
  \        CIFaceFeature *feature = [arr objectAtIndex:i];\n                double\
  \ xPosition = (feature.leftEyePosition.x + feature.rightEyePosition.x+feature.mouthPosition.x)/(3*image.size.width)\
  \ ;\n                double yPosition = (feature.leftEyePosition.y + feature.rightEyePosition.y+feature.mouthPosition.y)/(3*image.size.height);\n\
  \n                double dist = sqrt(pow((feature.leftEyePosition.x - feature.rightEyePosition.x),2)+pow((feature.leftEyePosition.y\
  \ - feature.rightEyePosition.y),2))/image.size.width;\n\n                yPosition\
  \ += dist;\n                CGSize size = [[CCDirector sharedDirector] winSize];\n\
  \                pumpkin.opacity = 255;\n                pumpkin.scale = 5*(size.width*dist)/256.0;\n\
  \n              [pumpkin setDisplayFrame:[[CCSpriteFrameCache sharedSpriteFrameCache]\n\
  spriteFrameByName:[NSString stringWithFormat:@\"pumpkin%d.png\", pumpkin_count +\
  \ 4]]];\n                CCMoveTo *moveAction = [CCMoveTo actionWithDuration:0\n\
  position:ccp((size.width * (xPosition)), (size.height * ((yPosition))))];\n    \
  \            [pumpkin runAction:moveAction];\n            }\n        } else {\n\
  \            pumpkin.opacity = 0;\n        }    \n    }\n    isProcessingRequest\
  \ = NO;\n}\n```\n\n这是整款游戏中最关键的代码块，让我们逐步仔细分析。首先，我们检查当前是否正在处理请求。如果没有，则调用 `CIDetector`\
  \ 的方法来找出摄像头图像中的人脸。如果至少找到一张脸，我们再继续执行后续操作。\n\n在这里，我实际上硬编码了一个不超过一次迭代的循环。如果你想扩展这个游戏，这里也是一个可以改进的地方。可以用一个随机生成器来替换这个循环，从摄像头画面中随机选择一个目标，并随机分配一个南瓜。跟踪哪个用户的头上顶着哪个南瓜可能会需要大量的处理工作，但这会让游戏体验更丰富、更强大。\n\
  \n接着，我们会对 `CIDetector` 找到的眼睛的 X 和 Y 坐标进行三倍处理。这样做的目的是让南瓜更好地定位在实际显示的屏幕图像上方，而不是我们正在处理的比例较小的图像上。\n\
  \n我们使用经典的勾股定理计算距离，并将其除以屏幕的宽度。这有助于我们缩放图像，以便在你远离屏幕时，南瓜能贴合你的脸部。你可以在运行应用时亲自尝试一下。南瓜会随着你靠近或远离屏幕而相应地缩放。\n\
  \n最后，我们将 `opacity`（不透明度）重新设为 `255`（使其可见），并将精灵移动到检测到人脸的位置。我们使用了两个 cocos2D 宏来简化这一步。首先将精灵帧设置为`pumpkin_count`\
  \ 对应的图像（我们稍后会回看这一步），然后使用 `CCMoveTo` 动作将精灵移动到人脸所在的 X、Y 坐标位置。\n\n在实体设备上运行应用程序。从菜单选项中选择“新游戏”来开始游戏。你会看到类似于图\
  \ 8-17 的画面。\n\n![图片](img/0817.jpg)\n\n**图 8-17** *伙计，我变成南瓜了！*\n\n我不太确定我喜不喜欢变成南瓜。之前，我们将\
  \ `ActionLayer` 类设置为支持触摸，但我们从未实现过响应方法。在 `ActionLayer.h` 文件中声明一个名为 `emitter` 的 `CCParticleSystemQuad`\
  \ 类新私有变量。打开 `ActionLayer.m`，添加代码清单 8-41 中的方法。\n\n**代码清单 8-41.** *触摸方法*\n\n```\n\
  - (void)registerWithTouchDispatcher {\n    [[CCTouchDispatcher sharedDispatcher]\
  \ addTargetedDelegate:self priority:0 swallowsTouches:YES];\n}\n\n- (BOOL)ccTouchBegan:(UITouch\
  \ *)touch withEvent:(UIEvent *)event {\n    return YES;\n}\n\n- (void)ccTouchEnded:(UITouch\
  \ *)touch withEvent:(UIEvent *)event {\n    CGPoint location = [self convertTouchToNodeSpace:touch];\n\
  \    if (CGRectContainsPoint(pumpkin.boundingBox, location)) {\n        pumpkin_count--;\n\
  \n        emitter = [CCParticleSystemQuad particleWithFile:@\"PumpkinExplosion.plist\"\
  ];\n        emitter.position = ccp(location.x, location.y);\n        [self addChild:emitter\
  \ z:1];\n\n        if (pumpkin_count == 0) {\n            NSLog(@\"You won\");\n\
  \        }\n    }\n    //NSLog(@\"Touch %@: \", NSStringFromCGPoint(location));\n\
  }\n```\n\n在本章前面，我们已经从示例项目中导入了“Art”目录。我还使用 Particle Designer（来自 [`www.71squared.com`](http://www.71squared.com)）创建了一个粒子特效，用于南瓜的“蒸发”。\n\
  \n当一个南瓜被“蒸发”时，我们需要从剩余的南瓜数量中减一，并更换南瓜的图像（这样我们在游戏中每次看到的南瓜都不同）。\n\n\n\n\n我们在清单 8-41\
  \ 中添加的代码首先检查触摸位置。我们使用`convertTouchToNodeSpace`宏获取触摸事件的屏幕坐标。在某些 cocos2D 游戏中，“游戏世界”超出了屏幕的边界（例如，像《塞尔达传说》这样的瓦片地图游戏），因此我们需要将其转换为设备屏幕的坐标。接下来，我们检查触摸位置是否在我们南瓜的边界框内。如果是，我们设置粒子发射器（以添加蒸发效果），减少`pumpkin_count`，并刷新场景。如果你摧毁了足够多的南瓜，控制台将显示“You\
  \ won”消息。被蒸发的南瓜应具有类似于图 8-18 的效果。\n\n![Image](img/0818.jpg)\n\n**图 8-18** *现在，我是一个被蒸发的南瓜。*\n\
  \n### 结束游戏\n\n永不结束的游戏毫无乐趣。我们在蒸发南瓜时已经减少了南瓜计数变量。让我们在游戏中添加一个场景来处理游戏结束状态，并在用户感兴趣时提供重新开始功能。\n\
  \n创建一个名为`EndLayer`的新类。确保它使用`CCNode`模板，并且是`CCLayer`的子类。在 Xcode 中打开`EndLayer.h`并更新头文件，如图\
  \ 8-42 所示。\n\n**清单 8-42.** *更新后的 EndLayer.h 文件*\n\n```objectivec\n#import <Foundation/Foundation.h>\n\
  #import \"cocos2d.h\"\n\n@interface EndLayer : CCLayer {\n\n}\n\n+(CCScene *) scene;\n\
  \n@end\n```\n\n看起来很熟悉吧？我们再次向新图层添加了静态的`CCScene`方法。切换到`EndLayer.m`。首先导入`ActionLayer.h`文件。然后，将清单\
  \ 8-43 中的方法添加到实现中。\n\n**清单 8-43.** *EndLayer.m 中的新方法*\n\n```objectivec\n+(CCScene\
  \ *) scene\n{\n    // 'scene' is an autorelease object.\n    CCScene *scene = [CCScene\
  \ node];\n\n    // 'layer' is an autorelease object.\n    EndLayer *layer = [EndLayer\
  \ node];\n\n    // add layer as a child to scene\n    [scene addChild: layer];\n\
  \n    // return the scene\n    return scene;\n}\n\n- (id)init {\n\n    if ((self\
  \ = [super init])) {\n\n        CGSize winSize = [CCDirector sharedDirector].winSize;\n\
  \n        CCLabelBMFont *titleLabel;\n        if (UI_USER_INTERFACE_IDIOM() == UIUserInterfaceIdiomPad)\
  \ {\n            titleLabel = [CCLabelBMFont labelWithString:@\"New Game\" fntFile:@\"\
  Arial-hd.fnt\"];\n        } else {\n            titleLabel = [CCLabelBMFont labelWithString:@\"\
  New Game\" fntFile:@\"Arial.fnt\"];    \n        }\n\n        CCMenuItemLabel *newGameItem\
  \ = [CCMenuItemLabel itemWithLabel:titleLabel target:self selector:@selector(playTapped:)];\n\
  \        newGameItem.position = ccp(winSize.width * 0.8, winSize.height * 0.3);\n\
  \n        CCMenu *menu = [CCMenu menuWithItems:newGameItem, nil];\n        menu.position\
  \ = CGPointZero;\n\n        [self addChild:menu];\n\n    }\n    return self;\n}\n\
  \n- (void)playTapped:(id)sender {\n    [[CCDirector sharedDirector] replaceScene:[CCTransitionRadialCCW\
  \ transitionWithDuration:1.0 scene:[ActionLayer scene]]];\n}\n```\n\n`scene`和`init`方法应该没有意外。在`init`方法中，我们设置了另一个游戏菜单，允许用户重新开始游戏。在显示`EndLayer`场景之前，我们需要清除`ActionLayer`中的一些变量。返回到`ActionLayer.m`。首先导入`EndLayer.h`头文件。\n\
  \n找到清单 8-44 所示的代码。将其替换为清单 8-45 中的代码。\n\n**清单 8-44.** *找到这段代码……*\n\n```objectivec\n\
  if (pumpkin_count == 0) {\n            NSLog(@\"You won\");\n}\n```\n\n**清单 8-45.**\
  \ *替换为这段代码……*\n\n```objectivec\nif (pumpkin_count == 0) {\n            NSLog(@\"\
  You won\");\n            isProcessingRequest = YES;\n            [AppDelegate instance].isPlaying\
  \ = NO;\n            [[CCDirector sharedDirector] replaceScene:[EndLayer scene]];\n\
  }\n```\n\n当我们的`ActionLayer`类被初始化时，我们将`isProcessingRequest`设置为`YES`。我们还将`AppDelegate`的`isPlaying`布尔值设置为`NO`。在我们可以结束游戏并允许用户重新开始之前，我们必须重置我们的环境。处理完毕后，我们告诉`CCDirector`播放`EndLayer\
  \ scene`。\n\n在你摧毁了十几个南瓜后，你将看到一个重新开始菜单，如图 8-19 所示。\n\n![Image](img/0819.jpg)\n\n\
  **图 8-19** *所有南瓜都被蒸发，并显示新游戏菜单。*\n\n如果你选择新游戏菜单，游戏将以其默认状态（剩余 12 个南瓜需要消灭）重新开始。\n\n\
  **注意：** 在将游戏带出去参加派对之前，你可能希望将其从前置摄像头切换为默认视频设备。同时，确保你换回旋转效果。`CIDetector`在处理非垂直图像时会有问题。此外，你可以从`MenuLayer`中移除调试绘制方法，使菜单看起来不那么像程序员风格。\n\
  \n### 总结\n\n这是一个非常有趣的章节。我们从一个默认的 cocos2D chipmunk 模板开始，构建了一个功能完整的游戏。我们首先让菜单对用户来说更有趣。我们拿了一个南瓜，并将其连接到一个弹簧约束上，这样我们就可以折腾它，而不会让它飞到屏幕外。\n\
  \n我们构建了游戏菜单，用来启动动作场景并开始接收面部识别请求。我们学习了精灵表单和批次节点，以及一些处理叠加效果的简单方法，如`CCMoveTo`和设置精灵的不透明度。\n\
  \n我们引入了`CIDetector`，我们将在第 12 章中学习它，用于查找面部，以便将南瓜移动到正确的位置。最后，我们使用粒子效果来蒸发外星入侵者，并构建了一个结束游戏菜单。\n\
  \n正如我们在过去两章中看到的，cocos2D 框架使得游戏开发比在 OpenGL ES 中从头构建这些功能要容易得多。\n\n在第 9 章中，我们将介绍一些可用于增强现实项目的其他第三方框架和\
  \ SDK。这些框架大多专注于基于位置的 AR 或基于标记的 AR。我们将在第 13 章中看到更多游戏风格的示例。\n\n"
- "# 第 9 章\n\n## 第三方增强现实工具包\n\n在本书中，我们将介绍许多可用于帮助您进行 AR 开发的技术。将应用程序快速推向市场的关键部分是不重复造轮子。对于\
  \ AR 来说，即使这是一个新领域，这一点仍然成立。有一些工具包可供开发人员用于基于标记的应用程序、基于位置的应用程序，甚至 3D 绘图应用程序。\n\n在本章中，我们将讨论其中的一些工具及其优缺点。在此过程中，我们还将构建一些示例应用程序。\n\
  \n### 概览\n\n在本章中，我们将讨论表 9-1 中列出的工具包。\n\n![Image](img/t0901.jpg)\n\n每个工具包都有其独特的优势，并且在某些情况下，与其他工具包相比，也存在一些缺点。我们将逐一讨论这些工具包，并查看一些示例。\n\
  \n\n\n\n### 基于 String 开发\n\n让我们从 Powered by String SDK 开始。打开浏览器，访问 [`http://poweredbystring.com/developers/register`](http://poweredbystring.com/developers/register)。你应该会看到注册页面，请填写所需信息。\n\
  \n注册并登录后，转到 [`http://poweredbystring.com/licensing`](http://poweredbystring.com/licensing)\
  \ 下载该工具包的演示版。系统会要求你提供更多信息，然后你会进入一个类似图 9-1 的页面。\n\n![Image](img/0901.jpg)\n\n**图\
  \ 9–1.** *前往 Powered by String 下载页面获取演示版。*\n\n下载最新版本的 SDK。在本地机器上解压缩归档文件，找到 `OGL\
  \ Tutorial` 目录。打开 Xcode 项目并在物理设备上运行。在电脑屏幕上打开 `Marker1.png` 文件。应用启动后，将摄像头对准标记物使其进入焦点。图\
  \ 9-2 展示了运行结果。\n\n![Image](img/0902.jpg)\n\n**图 9–2.** *在 String SDK 示例应用中查看标记物。*\n\
  \n我们将在第 10 章 中深入探讨这个应用，因此目前你不必过于担心其内容。但如果这是你第一个基于标记的增强现实应用，它可能会相当有趣。仅需几行代码，String\
  \ 就能从摄像头视野中加载并捕获标记物。\n\n### String 的基本工作流程\n\n同样，我们将在下一章中介绍 String 的完整教程，但以下是使用\
  \ String SDK 实现 OpenGL AR 应用所需的基本步骤。\n\n首先，你需要从源代码下载文件（即你找到示例应用的位置）中添加 `Libraries`\
  \ 和 `Headers` 文件夹。你还需要 `AVFoundation`、`CoreGraphics`、`CoreMedia` 和 `CoreVideo` 框架。\n\
  \nString SDK 的一大优点是它可以添加到任何视图控制器（甚至其他类）中。你只需创建一个 `StringOGL` 类的实例，并实现 `StringOGLDelegate`\
  \ 协议。该协议仅要求你实现一个 `render` 方法。\n\n在初始化 String 之前，你应该像在普通 OpenGL 应用中一样设置好 `framebuffer`、`renderbuffer`、投影矩阵、视口和其他初始状态。这些工作大多由\
  \ Xcode 提供的 OpenGL ES 游戏模板为你处理。你将添加用于初始化 String 的代码，如代码清单 9-1 所示。\n\n**代码清单 9–1.**\
  \ *String 示例初始化代码*\n\n```\nstringOGL = [[StringOGL alloc] initWithDelegate: self\
  \ context: myEAGLContext\nframeBuffer: myFrameBuffer leftHanded: NO];\n[stringOGL\
  \ setProjectionMatrix: myProjectionMatrix viewport: myViewport\norientation: [self\
  \ interfaceOrientation] reorientIPhoneSplash: NO];\n```\n\nString 建议你不要允许应用旋转。在我们的一些示例应用中，我们实际上也遵循了这一建议，尽管并非每个工具包都要求或推荐这样做。\n\
  \nString 需要使用标记物。相比之下，String 对标记物的要求最为宽松。标记物应以 PNG 文件的形式包含在你的主包中。令人惊讶的是，标记物越小，效果越好。这主要与工具包的加载时间有关，而非你想象的标记物分辨率。包含\
  \ PNG 文件后，你可以像代码清单 9-2 所示那样加载它们。\n\n**代码清单 9–2.** *加载 String 标记物*\n\n```\nmyMarkerID\
  \ = [stringOGL loadImageMarker: @\"MyMarker\" ofType: @\"png\"];\n```\n\nString\
  \ 在高对比度（接近白色背景上的接近黑色）标记物上表现非常出色，并且不需要高细节水平。此外，在付费版本中，String 可以同时追踪无数个标记物。String\
  \ 标记物识别算法的缺点是无法追踪部分遮挡的标记物。如果标记物被任何遮挡或移出视野，String 将完全丢失该标记物。另外，String 的对象比例是基于标记物的百分比尺度设置的。例如，String\
  \ 认为所有标记物的对角线长度为一个单位。因此，如果你希望标记物的对角线长度为五，则需要在投影图像之前将追踪位置乘以五。这些设置可以应用于标准的 OpenGL\
  \ 变换。\n\n正如我所提到的，协议中只有一个必需的委托方法。你需要在你的类中实现 `render` 方法。代码清单 9-3 展示了该方法的推荐格式。\n\n\
  **代码清单 9–3.** *render 方法的推荐格式*\n\n```\n- (void)render\n{\n// 读取当前帧检测到的标记物的数据\nconst\
  \ int maxMarkerCount = 10;\nstruct MarkerInfoMatrixBased markerInfo[10];\n!\nint\
  \ markerCount = [stringOGL getMarkerInfoMatrixBased: markerInfo\nmaxMarkerCount:\
  \ maxMarkerCount];\n// 遍历检测到的标记物\nfor (int i = 0; i < markerCount; i++)\n{\n// 为此图像标记物绘制相应的内容\n\
  }\n}\n```\n\n要让框架运行起来，所需编写的代码并不多。你只需追踪标记物，然后遍历标记物信息。如果你使用的许可支持追踪多个标记物，你可能需要为每个标记物设置不同的操作。你可以使用\
  \ `markerInfo` 类来识别正在追踪的是哪个标记物。\n\n每个标记物都有特定的颜色、`imageID` 和 `uniqueInstanceID`。如果你有多个相同的标记物，`uniqueInstanceID`\
  \ 会很有帮助。利用此属性可以分别追踪它们。\n\n### 额外功能\n\nString 还为增强现实应用中可能需要的实用函数提供了一些简单的包装器。在某些情况下，例如本书后面的人脸识别示例中，我们需要直接访问帧缓冲区。String\
  \ 实际上“拥有”屏幕缓冲区的委托，因此我们需要使用 `getCurrentVideoBuffer` 方法从 String 请求每一帧。该方法如代码清单 9-4\
  \ 所示。\n\n**代码清单 9–4.** *获取当前帧缓冲区*\n\n```\n- (void)getCurrentVideoBuffer: (unsigned\
  \ *)buffer viewToVideoTextureTransform:\n(float *)viewToVideoTextureTransform;\n\
  ```\n\n该方法会检索当前的视频纹理以及一个用于将坐标从视图空间转换到 OpenGL 纹理空间的矩阵。在我们的其他示例中，实际上并不需要所有这些信息。如果你决定要追踪标记物并分析帧缓冲区，则应在每一帧调用此方法，因为视频流是双缓冲的。\n\
  \n第二个有用的功能是 String 提供的用于获取屏幕缓冲区快照的便捷方法。这对于通过电子邮件发送应用截图或发布到 Facebook 等操作非常有用。代码清单\
  \ 9-5 展示了这个简单的方法。\n\n**代码清单 9–5.** *获取帧缓冲区快照*\n\n```\n- (void)takeSnapshotAndPause;\n\
  ```\n\n此方法的设置几乎类似于异步回调方法。你需要等待，直到 `handleSnapshot` 方法（你还需要实现此方法）完成后再调用 `resume`\
  \ 方法。\n\n### Unity 集成\n\nUnity 3D 并非本书涉及的内容，但 Apress 有许多关于该主题的书籍。Unity 是一个非常强大的\
  \ 3D 游戏引擎，它原生集成了 String。如果你对 Unity 感兴趣，可以直接从他们的入门项目开始，用零行代码构建一个增强现实应用。\n\n\n\n###\
  \ 高级着色器与 OpenGL 特性\n\n如果你想了解用 `String` 可以构建出怎样的应用示例，请访问其官网上的展示页面，或从 App Store 下载示例应用程序。\n\
  \n`String` 能够很好地兼容更高级的着色器和光照效果。它能快速加载对象，并对标记的呈现做到近乎即时的响应。\n\n图 9–3 展示了使用 `String`\
  \ 构建的演示应用截图。该应用从标记处加载了一个 3D 台灯，并允许用户通过 Open GL ES 着色和光照效果来开关灯光。\n\n![图片](img/0903.jpg)\n\
  \n**图 9–3.** *演示版 String 应用加载了一个可开关的 3D 台灯。*\n\n这个演示项目扩展了 `Cube` 示例（请注意图 9–3 中的第二个标签页），并为\
  \ `Lantern` 标签页渲染了一个不同的对象。源代码将在本书的 GitHub 补充资料中提供，也可从 Apress 网站的源代码/下载区域获取（[`www.apress.com`](http://www.apress.com)）。\n\
  \n#### Qualcomm SDK\n\n高通在 2011 年夏末，即 iOS 5 发布前夕，推出了一个 AR SDK。高通 SDK 与 Powered by\
  \ `String` SDK 截然不同，这也是我选择介绍这两个框架的原因之一。\n\n访问高通的网站 [`https://ar.qualcomm.at`](https://ar.qualcomm.at)，注册一个免费账户。注册完成后，您可以如图\
  \ 图 9–4 所示，从 `Android` 标签页切换到 `iOS` 标签页，并下载适用于 Mac 的 QCAR SDK。\n\n![图片](img/0904.jpg)\n\
  \n**图 9–4.** *下载 QCAR SDK。*\n\n与 `String`（它是一个静态库加一组文件）不同，QCAR 实际上提供了一个安装程序，使库文件与您的代码保持分离。这样，当\
  \ SDK 更新时，您可以更轻松地进行升级。\n\n**注意：** 在安装程序启动之前，您可能需要升级 Java。\n\n解压归档文件并启动安装程序。您将看到一个类似图\
  \ 9–5 所示的界面。\n\n![图片](img/0905.jpg)\n\n**图 9–5.** *启动安装程序。*\n\n点击 `Next`。您应该会看到一个对话框，要求您选择工具包的安装位置。我已将其移动到我安装同类工具包的目录中，但如果您愿意，也可以选择默认位置。\n\
  \n接受许可协议并点击 `Next`。准备好继续后，点击 `Install`。当库安装完成后，点击 `Done` 退出安装程序。\n\n值得提一下该库的目录结构。SDK\
  \ 中包含了一些非常令人印象深刻的演示程序。请查看表 9–2，以了解包含的内容及其在安装目录中的位置。\n\n![图片](img/t0902.jpg)\n\n\
  ![图片](img/t0902a.jpg)\n\n我们先从 `Dominoes` 应用开始。这个应用背后有大量的代码和数学运算，但它展示了该框架的所有功能。在\
  \ Xcode 中启动该项目，并在物理设备上运行。\n\n确保您打印或屏幕上显示项目 `Media` 子目录中的 `stones.jpg` 文件。这是该应用的标记。将标记放在摄像头的视野内。应用会提示您缓慢地在屏幕上拖动手指。随着您的手指移动，它会构建出一组多米诺骨牌。\n\
  \n这就是令人惊叹之处。您可以使用菜单启用一个虚拟按钮，然后在混合现实空间中拨弄多米诺骨牌（当摄像头投影增强场景时，您的手指会出现在摄像头视野中）。\n\n运行中的项目如图\
  \ 9–6 所示。\n\n![图片](img/0906.jpg)\n\n**图 9–6.** *运行 Dominoes 演示程序。*\n\n您可以看到左侧 1\
  \ 号多米诺骨牌下方有一个绿点。那就是虚拟按钮。如果用户用手指击打它，SDK 会检测到并处理该事件。在本例中，事件是让多米诺骨牌按顺序倒下。\n\n这是一个非常了不起的\
  \ Hello World 应用程序，不是吗？让我们从头开始构建一个不那么令人印象深刻的应用，这样您就能熟悉 SDK 了。\n\n### 构建我们自己的 QCAR\
  \ 演示\n\n在我们从头开始构建之前，先为我们的应用创建一个标记。点击 Qualcomm 网站上的 `My Trackables` 链接。点击 `New Project`\
  \ 链接创建一个新项目。我将项目命名为 `Apress`。\n\n您将进入一个类似于图 9–7 所示的界面。\n\n![图片](img/0907.jpg)\n\n\
  **图 9–7.** *使用 New Project 链接创建新项目。*\n\n点击 `Create a trackable` 链接。将可追踪对象命名为 `Apress\
  \ Trackable`，并将类型设置为单图像类型。将宽度设置为 `100`。\n\n需要注意的是，宽度并不对应标记的实际宽度，标记也不会被调整为这个宽度。在标记周围的\
  \ AR 空间中，您将加载到场景中的 3D 对象相对于标记有一个尺寸比例。将此值设为 `100` 是为其他对象设定初始比较标准。您的可追踪对象应该看起来像图 9–8。\n\
  \n![图片](img/0908.jpg)\n\n**图 9–8.** *我们创建了一个新的可追踪对象。*\n\n现在，高通期望的标记与 `String` 截然不同。高通更倾向于使用高分辨率、细节丰富的标记，以增加其可追踪的特征点数量。标记必须包含大量微小的细节。类似教程中附带的河石示例那样的图片效果最佳。\n\
  \n为了对比图片，我随机在谷歌图片中搜索了“免费高分辨率壁纸”，找到了一些我认为细节度很高的图片。\n\n我通过高通的追踪测试对其中几张进行了测试。结果通常类似图\
  \ 9–9 所示。\n\n![图片](img/0909.jpg)\n\n**图 9–9.** *新的可追踪对象失败了！*\n\n如果您想设计自己的图片，请继续尝试。确保找到一张在大部分区域内都有细节的图片。我重新加载了名为\
  \ `stones.jpg` 的图片。你可以在 `Dominos` 示例应用的 `Media` 子目录中找到它。结果好了很多，如图 9–10 所示。\n\n![图片](img/0910.jpg)\n\
  \n**图 9–10.** *下一个可追踪对象成功了！*\n\n通过点击 `Back` 按钮保存可追踪对象，您将返回到 `My Trackables` 页面。现在，您的可追踪对象列表中会出现一张新图片。点击该图片，您将进入一个界面，您可以在其中选择该可追踪对象并下载它以供我们的应用使用。该界面看起来类似于图\
  \ 9–11。\n\n![图片](img/0911.jpg)\n\n**图 9–11.** *下载可追踪对象。*\n\n使用选择窗口顶部的链接下载可追踪对象。请确保您选择的是\
  \ SDK 下载版本，而不是 Unity 版本。该归档文件包含以下两个文件：\n\n* `config.xml`\n* `qcar-resources.dat`\n\
  \n\n\n##### 创建 Xcode 项目\n\n在 Xcode 中创建一个新项目。使用“单视图应用”模板。将项目命名为 `Ch9`。确保使用自动引用计数。我的设置如图\
  \ 9-12 所示。\n\n![图片](img/0912.jpg)\n\n**图 9-12.** *设置项目设置。*\n\n打开 Finder。导航至你安装 QCAR\
  \ SDK 的位置。其中有一个名为 `build` 的子目录。在 Finder 中打开该目录。复制此目录（`lib` 和 `include` 文件夹）的内容到项目目录下。\n\
  \n打开 Xcode 项目设置页面中的 **Build Settings** 选项卡。更新 Header Paths，使其包含 `$(SRCROOT)/Ch9/include`。现在，在\
  \ Finder 中打开项目目录。将 `lib` 目录拖放到 Xcode 项目中。确保你没有选择复制资源（因为它们已经存在）。\n\n从 GitHub 或 Apress（位于\
  \ [`www.apress.com`](http://www.apress.com) 的源代码/下载区域）上的本书源代码仓库中，将 `GLProgram.h`\
  \ 和 `GLProgram.m` 复制到项目中。这些文件最初由 Jeff LaMarche 编写。它们已针对 iOS 5 自动引用计数进行了适配。\n\n同样从源代码仓库复制\
  \ `Cube.h`。该文件由高通编写，用于测试 OpenGL ES 绘图。\n\n最后，将 `SimpleLightShader.vsh` 和 `SimpleLightShader.fsh`\
  \ 文件复制到项目中。打开 **Build Phases** 选项卡，确保这两个文件都作为 Bundle 资源被复制，如图 9-13 所示。\n\n![图片](img/0913.jpg)\n\
  \n**图 9-13.** *复制 Bundle 资源。*\n\n我们需要在项目中添加几个框架。在 Xcode 中添加以下框架：\n\n- `OpenGLES.framework`\n\
  - `Security.framework`\n- `AVFoundation.framework`\n- `CoreVideo.framework`\n- `CoreMedia.framework`\n\
  - `SystemConfiguration.framework`\n- `QuartzCore.framework`\n\n好了，现在我们准备添加标记文件。将从高通网站下载的两个文件复制到项目中。\n\
  \n正如我们在处理 String 时所见，通常建议在增强现实应用中限制设备的动态方向旋转，尤其是那些使用第三方 SDK 的应用。打开项目的 **Summary**\
  \ 选项卡，确保应用仅启用 **横屏右向** 方向。\n\n##### EAGLView\n\n创建一个继承自 `UIView` 的新类。将其命名为 `EAGLView`。在\
  \ Xcode 中打开 `EAGLView.h`，并导入代码清单 9-6 中所示的头文件。\n\n**代码清单 9-6.** *import 声明*\n\n```objc\n\
  #import <OpenGLES/EAGL.h>\n#import <OpenGLES/ES1/gl.h>\n#import <OpenGLES/ES1/glext.h>\n\
  #import <OpenGLES/ES2/gl.h>\n#import <OpenGLES/ES2/glext.h>\n#import <QCAR/Tool.h>\n\
  #import <QCAR/UIGLViewProtocol.h>\n#import \"GLProgram.h\"\n```\n\n在 `import` 声明下方，设置一个枚举来跟踪应用当前运行的状态。复制代码清单\
  \ 9-7 中的代码。\n\n**代码清单 9-7.** *状态枚举*\n\n```objc\ntypedef enum _status {\n    APPSTATUS_UNINITED,\n\
  \    APPSTATUS_INIT_APP,\n    APPSTATUS_INIT_QCAR,\n    APPSTATUS_INIT_APP_AR,\n\
  \    APPSTATUS_INIT_TRACKER,\n    APPSTATUS_INITED,\n    APPSTATUS_CAMERA_STOPPED,\n\
  \    APPSTATUS_CAMERA_RUNNING,\n    APPSTATUS_ERROR\n} status;\n```\n\n在更新实现块之前，将\
  \ `EAGLView.m` 重命名为 `EAGLView.mm`。高通的 SDK 基于 C++，我们需要这个扩展名来访问 C++ 类。\n\n更新 `interface`\
  \ 块，如代码清单 9-8 所示。\n\n**代码清单 9-8.** *EAGLView 接口*\n\n```objc\n@interface EAGLView\
  \ : UIView <UIGLViewProtocol> {\n    EAGLContext *context;    \n    GLint framebufferWidth;\n\
  \    GLint framebufferHeight;\n\n    GLuint defaultFramebuffer;\n    GLuint colorRenderbuffer;\n\
  \    GLuint depthRenderbuffer;\n\n    QCAR::Matrix44F projectionMatrix;\n    CGRect\
  \ screenRect;\n    int QCARFlags;\n    status appStatus;\n    GLProgram *shader;\n\
  \    GLint shaderPositionAttribute, shaderNormalAttribute, shaderModelViewMatrixUniform,\
  \ shaderProjectionMatrixUniform, shaderColorUniform;\n}\n@end\n```\n\n在这里，我们首先为\
  \ OpenGL 上下文设置了一个实例变量。然后为帧缓冲区的宽度和高度，以及默认缓冲区句柄设置了一些变量。接着，我们设置了投影矩阵，用于乘以我们的 3D 坐标。正是这一行导致需要将文件名改为\
