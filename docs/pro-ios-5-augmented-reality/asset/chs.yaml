  \n**图 7–3.** *运行 cocos2D 的默认项目 Hello World。*\n\n接下来，让我们将这个 Hello World 程序改造成增强现实版\
  \ Hello World 应用，然后讨论 cocos2D 中可用的一些特性。\n\n### 增强现实版 Hello World\n\n如您所知，增强现实应用建立在实时摄像头视图的背景之上。在我们的示例项目中，背景是黑色屏幕。这是我们需要替换的第一个元素。\n\
  \n我在引言中曾简要提到，cocos2D for iPhone 基于 cocos2D，后者为 2D 世界提供 OpenGL 渲染。OpenGL 是这两个源代码库的基础。因此，我们需要修改所谓的可绘制层，将其替换为摄像头视图。OpenGL\
  \ 的可绘制层实现了`EAGLDrawable`协议，该协议用作渲染表面，并将`EAGLContext`对象显示到屏幕上。我们将在第 10 章构建基于标记的 AR\
  \ 应用时，进一步了解`EAGLContext`。目前，我们必须意识到，无法使用 cocos2D 模板默认的 16 位缓冲区格式来显示摄像头。我们需要将其切换为使用\
  \ 32 位颜色格式。\n\n\n\n#### 调整默认视图\n\n在 Xcode 中打开 `AppDelegate.h`。如代码清单 7-3 所示，向接口中添加一个\
  \ `UIView`。\n\n**代码清单 7-3.** *为相机叠加视图添加一个 UIView*\n\n```\nUIView  *cameraView;\n\
  ```\n\n切换到 `AppDelegate.m`，我们开始工作。首先，必须将缓冲区切换为 32 位缓冲区。这在 cocos2D 模板中应是一个被注释掉的值，因为这是开发者常见的修改操作。找到类似代码清单\
  \ 7-4 所示的那一行代码。\n\n**代码清单 7-4.** *更改 EAGLView 的像素格式（pixelFormat）*\n\n```\n//\n//\
  \ 手动创建 EAGLView\n//  1. 创建 RGB565 格式。备用选项：RGBA8\n//  2. 深度格式为 0 位。对于 3D 效果（如 CCPageTurnTransition）请使用\
  \ 16 位或 24 位\n//\nEAGLView *glView = [EAGLView viewWithFrame:[window bounds]\n \
  \                              pixelFormat:kEAGLColorFormatRGB565        // kEAGLColorFormatRGBA8\n\
  \                               depthFormat:0];\n```\n\n可以看到注释解释了部分内容。由于相机视图不能使用\
  \ RGB565 这种 16 位格式，请将 `pixelFormat` 的值替换为注释中的那个值。修改后，你的代码块现在应如代码清单 7-5 所示。我们将 `depthFormat`\
  \ 保留为 0，因为我们目前还不涉及 3D 处理。\n\n**代码清单 7-5.** *更改 pixelFormat*\n\n```\nEAGLView *glView\
  \ = [EAGLView viewWithFrame:[window bounds]\n                               pixelFormat:kEAGLColorFormatRGBA8\
  \ depthFormat:0];\n```\n\n接下来，我们将在屏幕中添加新声明的 `UIView`，用来取代默认的单调黑色背景。找到如代码清单 7-6 所示的代码段。\n\
  \n**代码清单 7-6.** *主视图接收一个子视图*\n\n```\n// 使视图控制器成为主窗口的子视图\n[window addSubview: viewController.view];\n\
  ```\n\n在这行代码下方，添加代码清单 7-7 中的代码。接下来我会逐行为你解释。\n\n**代码清单 7-7.** *为相机准备叠加视图*\n\n```\n\
  [CCDirector sharedDirector].openGLView.backgroundColor = [UIColor clearColor];\n\
  [CCDirector sharedDirector].openGLView.opaque = NO;\n\nglClearColor(0.0, 0.0, 0.0,\
  \ 0.0);\n\ncameraView = [[UIView alloc] initWithFrame:[[UIScreen mainScreen] bounds]];\n\
  cameraView.opaque = NO;\ncameraView.backgroundColor=[UIColor clearColor];\n[window\
  \ addSubview:cameraView];\n```\n\n首先，我们将 OpenGL 视图的背景色设置为 `clearColor`。这可以启用透明效果，以便我们仍然可以在相机视图之上向屏幕绘制对象和文本。接着，我们确保此图层不透明（出于同样的目的）。我们使用\
  \ `glClearColor` 方法来确保我们定义的“清除”确实是透明的。你可以对此稍作调整，以形成一个朦胧的半透明图层，而不是我们本章正在构建的完全不可见图层。第二部分看起来类似。我们获取新的\
  \ `UIView`，将其拉伸至屏幕边界，并使其也变得透明。最后，我们将新的 `UIView` 添加到窗口中。\n\n如果现在再次运行项目，你不会看到明显变化。我们尚未添加任何有影响的内容。让我们继续。\n\
  \n#### 添加相机视图\n\n就在我们从代码清单 7-7 添加的代码下方，我们将添加用于创建 `UIImagePicker` 并以相机模式显示的代码。其中部分内容在第\
  \ 6 章中已经熟悉。请在代码清单 7-7 的代码下方，添加代码清单 7-8 中的代码。\n\n**代码清单 7-8.** *创建 UIImagePicker\
  \ 并添加到屏幕*\n\n```\nUIImagePickerController *imagePicker;\n\n@try {\n        imagePicker\
  \ = [[[UIImagePickerController alloc] init] autorelease];\n        imagePicker.sourceType\
  \ = UIImagePickerControllerSourceTypeCamera;\n        imagePicker.showsCameraControls\
  \ = NO;\n        imagePicker.toolbarHidden = YES;\n        imagePicker.navigationBarHidden\
  \ = YES;\n        imagePicker.wantsFullScreenLayout = YES;\n}\n@catch (NSException\
  \ * e) {\n        [imagePicker release];\n        imagePicker = nil;\n}\n@finally\
  \ {\n        if(imagePicker) {\n            [cameraView addSubview:[imagePicker\
  \ view]];\n            [cameraView release];\n        }\n}\n\n[window bringSubviewToFront:viewController.view];\n\
  ```\n\n在运行项目之前，我们先来了解一下这段代码。首先，我们创建 `UIImagePicker`，进行设置，并确保源类型设置为相机，这样我们就能看到实时视频内容。我们隐藏了控件、工具栏和导航栏，以便获得相机的全屏视图。\n\
  \n还剩最后一件事。切换到 `HelloWorldLayer.m`，并按代码清单 7-9 所示更改标签的文本和字号。\n\n**代码清单 7-9.** *更改标签文本*\n\
  \n```\n// 创建并初始化一个标签\nCCLabelTTF *label = [CCLabelTTF labelWithString:@\"Hello Augmented\
  \ World\" fontName:@\"Marker Felt\" fontSize:48];\n```\n\n和第 6 章中的示例一样，我们必须在真实设备上运行，因为模拟器不支持相机类。在设备上启动项目。你会注意到有些不对劲。查看图\
  \ 7-4 了解我的意思。\n\n![图片](img/0704.jpg)\n\n**图 7-4.** *这是相机视图，但缺少了一部分。*\n\n相机没有覆盖整个屏幕！边缘有一条黑色条，似乎是模板应用程序遗留下来的。等等，我们已经将\
  \ `wantsFullScreenLayout` 设置为 `YES`。发生了什么？\n\n#### 缩放相机视图\n\n那么，为什么我们的界面中会出现这条奇怪的黑色条呢？这与屏幕和相机（横屏模式下）之间宽高比的差异有关。基本上，iPhone\
  \ 屏幕的宽高比为 3:4，而 iPhone 相机的宽高比为 4:3。因此，我们需要缩放相机图像以匹配。这解释了图 7-4 中的黑色条。\n\n要解决这个问题，我们需要缩放\
  \ `UIImagePicker` 以匹配设备的宽高比。回到 Xcode 中的 `AppDelegate.m`。找到你从代码清单 7-8 添加的代码段，并在其中添加代码清单\
  \ 7-10 中的加粗行。\n\n**代码清单 7-10.** *缩放 UIImagePickerController*\n\n```\n@try {\n  \
  \      imagePicker = [[[UIImagePickerController alloc] init] autorelease];\n   \
  \     imagePicker.sourceType = UIImagePickerControllerSourceTypeCamera;\n      \
  \  imagePicker.showsCameraControls = NO;\n        imagePicker.toolbarHidden = YES;\n\
  \        imagePicker.navigationBarHidden = YES;\n        imagePicker.wantsFullScreenLayout\
  \ = YES;\n        imagePicker.cameraViewTransform = CGAffineTransformScale(imagePicker.cameraViewTransform,\
  \ 1.0, 1.3);\n}\n```\n\n再次运行项目。你应该会看到我们已经成功移除了黑色条，且相机现在已占据全屏，如图 7-5 所示。\n\n![图片](img/0705.jpg)\n\
  \n**图 7-5.** *黑色条消失了！*\n\n### cocos2D 概念\n\n让我们为应用程序增添一点活力。目前，它无法响应触摸或执行任何有趣的操作。首先，让我们了解\
  \ cocos2D 应用程序是如何设置的。\n\n\n\n#### 场景\n\n场景是 cocos2D 视图的基础。你的应用可以包含多个场景，但在任何给定时刻，只有一个场景处于活跃状态。在我们的示例应用中，我们将摄像头视图添加到了\
  \ `HelloWorldLayer` 场景的下方。\n\n场景是 cocos2D 中 `CCScene` 对象的实现。它们是应用整体工作流程中相互独立的组成部分。在典型的游戏中，场景用于菜单、不同关卡，以及关卡之间或玩家通关/失败后播放的视频过场动画。每个\
  \ `CCScene` 对象都包含一个或多个图层。在我们的示例应用中，有一个带标签的透明图层，以及一个包含 `UIImagePickerController`\
  \ 的透明图层。\n\n你也可以使用场景进行场景之间的过渡。这类场景是 `CCTransitionScene` 对象的实现。\n\n#### 导演\n\n不出所料，导演负责处理当前哪个场景处于活跃状态的选择。导演是\
  \ `CCDirector` 单例对象的一个实例。它在内存中维护着当前活跃场景的详细信息，并处理一个场景栈，以便推入新场景、暂停当前场景以及返回原始场景。`CCDirector`\
  \ 单例会实际切换 `CCScene`。该单例还会初始化 OpenGL ES 环境。来自 `AppDelegate.m` 的代码清单 7–11 中的代码，会从单例（即共享）类中初始化导演。\n\
  \n**代码清单 7–11.** *创建导演单例实例*\n\n`CCDirector *director = [CCDirector sharedDirector];`\n\
  \n#### 图层\n\n`CCLayer` 的大小与整个可绘制区域相同。它可以是半透明的（为下方的图层提供空洞），也可以是完全透明的（正如我们在应用中已经做的那样）。图层定义了场景的外观和行为。\n\
  \n`CCLayer` 还定义了事件处理程序。当事件被传播时，它会从前端的图层开始向上传递，直到某个图层捕获并接受该事件。因此，图层在栈中的位置越靠后，就会有越多的图层有机会拦截并处理该事件。\n\
  \ncocos2D 定义了一系列预置的图层，我们可以在游戏中使用。通常很少需要自己创建自定义的 `CCLayer` 扩展或类。\n\n### 添加特效\n\n\
  cocos2D 拥有大量内建的特效和过渡效果，我们可以在游戏中加以利用。对于我们的增强现实示例，在展示任何视觉效果之前，我们将使用触摸事件来处理用户的交互。因此，我们首先需要学习如何处理触摸事件。\n\
  \n#### 处理触摸事件\n\n还有另一个单例对象 `CCTouchDispatcher`，它会发送屏幕上触摸事件的通知。为了在应用中处理触摸事件，我们必须启用触摸、注册\
  \ `CCTouchDispatcher`，然后处理触摸事件本身。\n\n在之前的概述中，我简要提到事件在每个单独的图层上处理。它们从前端的图层开始，向后端的图层逐级传递，直到某个图层接受并处理该事件。\n\
  \n到目前为止，我们的示例构建方式与普通 2D 游戏略有不同。我们有一个底层图层（摄像头视图），它始终位于栈的底部。我们使用了一个简单图层（标签视图的图层）来驱动屏幕上的内容。在典型的\
  \ 2D 游戏中，你会在静态图形图层或基于瓦片的地图上构建。而将实时摄像头视图作为基础，正是使这款游戏成为增强现实游戏的原因。我们将在第 8 章构建的示例应用中添加更高级的增强现实概念。话虽如此，理解了触摸事件是如何逐级传递的，那么在\
  \ `HelloWorldLayer` 图层处处理事件就显得最为合理。\n\n在 Xcode 中打开 `HelloWorldLayer.m`，找到 `init`\
  \ 方法。在 `if` 循环的底部，添加来自代码清单 7–12 的语句。\n\n**代码清单 7–12.** *启用触摸*\n\n`self.isTouchEnabled\
  \ = YES;`\n\n接下来，我们必须向 `CCTouchDispatcher` 注册为一个接受此类事件的图层。在 `init` 方法结束之后，添加来自代码清单\
  \ 7–13 的代码。\n\n**代码清单 7–13.** *注册 CCTouchDispatcher*\n\n```\n- (void)registerWithTouchDispatcher\
  \ {\n    [[CCTouchDispatcher sharedDispatcher] addTargetedDelegate:self priority:0\
  \ swallowsTouches:YES];\n}\n```\n\n我们将代理设置为 self，并启用了“吞并触摸”，这样在我们决定该图层能否处理并接受事件之前，其他图层不会做出响应。要接受事件，请使用\
  \ `ccTouchBegan` 方法。在 `registerWithTouchDispatcher` 方法之后，添加来自代码清单 7–14 的代码。\n\n\
  **代码清单 7–14.** *接受并处理事件*\n\n```\n- (BOOL)ccTouchBegan:(UITouch *)touch withEvent:(UIEvent\
  \ *)event {\n    return YES;\n}\n\n- (void)ccTouchEnded:(UITouch *)touch withEvent:(UIEvent\
  \ *)event {\n    CGPoint location = [self convertTouchToNodeSpace:touch];\n    NSLog(@\"\
  触摸位置 %@: \", NSStringFromCGPoint(location));\n}\n```\n\n第一个方法向分发器返回 `YES`，告知它自己将接受该事件，并且分发器无需再继续查找响应。第二个方法通过记录触摸点在屏幕上的位置来响应触摸事件。我们使用\
  \ `NSStringFromCGPoint` 方法将 C 结构体正确转换为字符串。\n\n在设备上再次运行应用程序。在屏幕上随机触摸几个位置。在你的调试器窗口中，应该会看到类似于图\
  \ 7–6 所示的输出。\n\n![图像](img/0706.jpg)\n\n**图 7–6.** *我们现在能够记录触摸事件了。*\n\n稍后，我们可以利用这个\
  \ `CGPoint` 来做一些更令人兴奋的事情。让我们简要讨论一下特效，然后为我们的场景添加一个特效。\n\n\n\n#### 视觉效果\n\ncocos2D\
  \ 提供了各种开箱即用的图形效果，可供我们在应用程序中使用。例如，以下列表包含了 cocos2D 发行版中可用的粒子发射器类型：\n\n*   `CCParticleFire`\n\
  *   `CCParticleFireworks`\n*   `CCParticleSun`\n*   `CCParticleGalaxy`\n*   `CCParticleFlower`\n\
  *   `CCParticleMeteor`\n*   `CCParticleSpiral`\n*   `CCParticleSmoke`\n*   `CCParticleExplosion`\n\
  *   `CCParticleSnow`\n*   `CCParticleRain`\n\n还有设计自己粒子系统的方法。有一个名为 Particle Designer\
  \ 的工具（可在 [`http://particledesigner.71squared.com/`](http://particledesigner.71squared.com/)\
  \ 获取），它允许你创建自己的视觉效果，并能访问一个由社区创建的效果组成的共享库。在撰写本书时，该工具的价格不到 10 美元。\n\n图形效果并非本书的重点，因此如果你需要更多信息，请参考\
  \ Apress 出版的任何 cocos2D 相关书籍（[`www.apress.com`](http://www.apress.com)）。\n\n回到我们的项目。在\
  \ Xcode 中打开 `HelloWorldLayer.m`。由于我们已经处理了触摸事件（通过在控制台中记录它们），因此扩展此功能并添加一些粒子效果是合理的。这里的目标是让用户的触摸在屏幕上引发一次爆炸或类似效果。\n\
  \n找到 `ccTouchEnded` 方法。在设置了 `location` 变量之后，添加来自 代码清单 7-15 的代码。\n\n**代码清单 7-15.**\
  \ *添加一个 CCParticleSystem*\n\n```\nCCParticleSystem* emitter = [CCParticleExplosion\
  \ node];\nemitter.position = ccp(location.x, location.y);\nemitter.life = 3.0f;\n\
  emitter.duration = 2.7f;\nemitter.lifeVar = 0.1f;\nemitter.totalParticles = 200;\n\
  [self addChild:emitter z:20];\n```\n\n快速回顾一下本节开头我列出的 cocos2D 中提供的粒子系统。在这段代码的第一行，你会注意到我们使用了\
  \ `CCParticleExplosion` 类。当你尝试本节的示例时，可以随意将其更改为我在本节中列出的任何其他类型。\n\n在声明了我们的 `CCParticleSystem`\
  \ 之后，我们将其位置设置为触摸事件的 x、y 坐标，定义粒子系统的生命期和持续时间，并设置其粒子总数。同样，这些都非常值得尝试和学习。\n\n最后，我们将 `CCParticleSystem`\
  \ 添加到我们的层中。如果你运行项目并点击屏幕，你会看到类似 图 7-7 所示的效果。\n\n![Image](img/0707.jpg)\n\n**图 7-7.**\
  \ *点击即可创建触摸爆炸效果！*\n\n#### 添加音效\n\n没有声音的爆炸总感觉少了点什么。你同意吗？让我们制造点噪音吧。在第 5 章中，我们讨论了如何为\
  \ iOS 应用程序添加声音。我介绍了一些可以下载免费音效的网站。我下载了一个 MP3 文件，然后使用我在第 5 章中向你展示的 `afconvert` 工具将其转换为\
  \ CAF 文件。该示例文件包含在 GitHub 上的源代码中，也可以从 Apress 网站的源代码/下载区域（[`www.apress.com`](http://www.apress.com)）获取。我将文件命名为\
  \ `explosion.caf`。如果你使用自己的音效，请确保在以下代码块中名称匹配。\n\n在 Xcode 中打开 `HelloWorldLayer.m`，并导入\
  \ `SimpleAudioEngine` 头文件，如 代码清单 7-16 所示。\n\n**代码清单 7-16.** *导入 SimpleAudioEngine\
  \ 头文件*\n\n```\n#import \"SimpleAudioEngine.h\"\n```\n\n接下来，找到 `init` 方法。就在我们设置 `isTouchEnabled`\
  \ 为 YES 的代码之后，添加来自 代码清单 7-17 的代码。\n\n**代码清单 7-17.** *预加载音效*\n\n```\n[[SimpleAudioEngine\
  \ sharedEngine] preloadEffect:@\"explosion.caf\"];\n```\n\n这将预加载音效，以便在需要时更快地访问。最后，找到\
  \ `ccTouchEnded` 事件处理程序。在我们已将粒子效果添加到层之后，添加来自 代码清单 7-18 的代码。\n\n**代码清单 7-18.** *播放音效*\n\
  \n```\n[[SimpleAudioEngine sharedEngine] playEffect:@\"explosion.caf\"];\n```\n\n\
  在你的设备上运行项目。你应该会在触摸事件时听到很棒的爆炸音效。这有助于让游戏对用户来说更有趣、更愉快。\n\n\n\n### 添加 HUD 层\n\n在 cocos2D\
  \ 游戏中，“世界”通常比设备当前渲染的视图要大。因此，如果你只是将元素渲染到屏幕上，根据场景当前的焦点位置，它们可能会出现轻微的对齐偏差。HUD（平视显示器）层通常用于解决这个问题。HUD\
  \ 层是在我们场景的动作层之上的另一个半透明层。在游戏中，我们经常看到它用于显示分数、剩余生命等。\n\n让我们为当前示例添加一个 HUD 层，用于统计用户引发的爆炸次数。向项目中添加一个新的\
  \ Objective-C 类。该类应该是 `NSObject` 的子类。将类命名为 `HUDLayer.mm`。`.mm` 扩展名并非笔误。对于混合了 Objective-C\
  \ 和 C++ 的文件，使用 `.mm` 是一种推荐的约定。这比告诉编译器单独处理某个文件要简单，并且能让将来阅读你代码的开发者知道该实现使用了 C++。\n\n\
  打开 `HUDLayer.h`，用 代码清单 7-19 中所示的代码替换其内容。\n\n**代码清单 7-19.** *新的 HUDLayer.h*\n\n```\n\
  #import \"cocos2d.h\"\n@interface HUDLayer : CCLayer {\n    CCLabelTTF *_counterLabel;\n\
  }\n- (void)incrementCounter;\n@end\n```\n\n我们将子类改为 `CCLayer`，并创建了一个私有的 `CCLabelTTF`\
  \ 对象，用于在屏幕上保存一个标签。我们还创建了一个名为 `incrementCounter` 的实例方法。触摸事件将调用此方法，以通知 HUD 层发生了新的触摸，并递增标签显示的计数。\n\
  \n在 Xcode 中切换到 `HudLayer.mm`。首先，导入 `HelloWorldLayer` 头文件。接下来，我们将创建一个局部变量来保存当前计数的值，并为\
  \ `HUDLayer` 创建 `init` 方法。将代码清单 7-20 中的代码复制到 `HUDLayer.mm` 中。\n\n**代码清单 7-20.**\
  \ *HUDLayer.mm 的 Init 方法*\n\n```\nint counter = 0;\n- (id)init {\n    if ((self\
  \ = [super init])) {\n        _counterLabel = [CCLabelTTF labelWithString:[NSString\
  \ stringWithFormat:@\"Explosions: %d\", counter] fontName:@\"Marker Felt\" fontSize:24];\n\
  \n        CGSize size = [[CCDirector sharedDirector] winSize];\n\n        _counterLabel.position\
  \ =  ccp( size.width * 0.85 , size.height * 0.9 );\n\n        [self addChild: _counterLabel\
  \ z:10];\n   }\n   return self;\n}\n```\n\n`init` 方法使用了我们 `HelloWorldLayer` 类中的一些代码。我们只是简单地创建了一个新的标签并将其添加到屏幕上。在这里，我们将其添加到屏幕的右上角，z\
  \ 轴值为 10，这样所有的爆炸效果都会渲染在标签之后。\n\n通过在新 `init` 方法之后添加代码清单 7-21 中的代码来实现 `incrementCounter`\
  \ 方法。\n\n**代码清单 7-21.** *`incrementCounter` 方法*\n\n```\n- (void)incrementCounter\
  \ {\n   counter++;\n    _counterLabel.string = [NSString stringWithFormat:@\"Explosions:\
  \ %d\", counter];\n}\n```\n\n这个方法应该很容易理解。我们只是递增计数器（该计数器将存储在 HUD 层中，而非游戏层），并更新我们已经添加到视图中的标签。\n\
  \n关于 HUD 层的内容就这些了。现在，我们必须在我们的 `HelloWorldLayer` 层中使用它。在 Xcode 中切换到 `HelloWorldLayer.h`，首先导入\
  \ `HUDLayer.h` 文件。接下来，声明一个类型为 `HUDLayer` 的私有变量 `_hud`。最后，我们将创建一个名为 `initWithHUD`\
  \ 的新方法。你新的 `HelloWorldLayer.h` 文件应该如代码清单 7-22 所示。\n\n**代码清单 7-22.** *新的 HelloWorldLayer.h*\n\
  \n```\n#import \"cocos2d.h\"\n#import \"CCTouchDispatcher.h\"\n#import \"HUDLayer.h\"\
  \n\n// HelloWorldLayer\n@interface HelloWorldLayer : CCLayer {\nHUDLayer *_hud;\n\
  }\n\n// 返回一个 CCScene，其唯一子节点是 HelloWorldLayer\n+(CCScene *) scene;\n- (id)initWithHUD:(HUDLayer\
  \ *)hud;\n@end\n```\n\n切换到 `HelloWorldLayer.m`，将你的静态 scene 方法修改为如代码清单 7-23 所示。\n\
  \n**代码清单 7-23.** *新的 Scene 方法*\n\n```\n+(CCScene *) scene\n{\n    CCScene *scene\
  \ = [CCScene node];\n\n    HUDLayer *hud = [HUDLayer node];\n    [scene addChild:hud\
  \ z:1];\n\n    // 'layer' 是一个自动释放对象。\n    //HelloWorldLayer *layer = [HelloWorldLayer\
  \ node];\nHelloWorldLayer *layer = [[[HelloWorldLayer alloc] initWithHUD:hud] autorelease];\n\
  \n    // 将 layer 添加为 scene 的子节点\n    [scene addChild: layer];\n\n    // 返回 scene\n\
  \    return scene;\n}\n```\n\n我们来讨论一下高亮显示的代码行。首先，我们声明了一个新的 `HUDLayer` 变量并将其添加到场景中。我们注释掉了旧的\
  \ `init` 方法，并用一个名为 `initWithHUD` 的方法代替（我们还没有实现这个方法，但别担心，接下来就做）。\n\n找到 `HelloWorldLayer.m`\
  \ 中的 `init` 方法。将其签名从 `init` 改为 `initWithHUD:(HUDLayer *)hud`。按照代码清单 7-24 所示替换该方法。\n\
  \n**代码清单 7-24.** *用以下代码块替换 init 方法*\n\n```\n-(id) initWithHUD:(HUDLayer *)hud\n\
  {\n    // 总是先调用\"super\"的 init\n    // Apple 建议将\"self\"重新赋值为\"super\"的返回值\n   \
  \ if( (self=[super init])) {\n_hud = hud;\n        // 创建并初始化一个标签\n        CCLabelTTF\
  \ *label = [CCLabelTTF labelWithString:@\"Hello Augmented World\" fontName:@\"Marker\
  \ Felt\" fontSize:48];\n\n        // 询问 director 窗口大小\n        CGSize size = [[CCDirector\
  \ sharedDirector] winSize];\n\n        // 将标签放置在屏幕中央\n        label.position = \
  \ ccp( size.width /2 , size.height/2 );\n\n        // 将标签添加为此 Layer 的子节点\n     \
  \   [self addChild: label];\n\n            self.isTouchEnabled = YES;\n        \
  \    [[SimpleAudioEngine sharedEngine] preloadEffect:@\"explosion.caf\"];\n    }\n\
  \    return self;\n}\n```\n\n除了方法签名外，我们只向该方法添加了一行代码。我们将私有变量 `_hud` 设置为我们之前在静态 scene\
  \ 方法中创建的新 `HUDLayer` 对象。\n\n在测试应用程序之前，还有最后一件事要做。找到 `ccTouchEnded` 方法，并在我们的 `NSLog`\
  \ 语句之前添加代码清单 7-25 中的代码。\n\n**代码清单 7-25.** *调用 HUDLayer 的 incrementCounter 方法*\n\n\
  ```\n[_hud incrementCounter];\n```\n\n就这样。我们新的 HUD 层应该被加载到场景中，并负责递增屏幕右上角当前计数标签的值。在你的设备上运行项目。声音和粒子效果应该保持不变。但是，你应该会看到屏幕顶部显示触摸次数的标签。点击几次；你最终会看到类似图\
  \ 7-8 的效果。\n\n![图片](img/0708.jpg)\n\n**图 7-8.** *你现在可以在屏幕的右上角看到 HUD 层。*\n\n你可以添加更复杂的\
  \ HUD 层，它们能自行处理用户输入，例如按钮或选择选项。本书将不涉及这部分内容。有关 cocos2D 或高级游戏主题的更多信息，请参考 Apress 出版的任何一本关于\
  \ cocos2D 的书籍。\n\n### 本章小结\n\n在本章中，我介绍了 cocos2D。我们设置了示例模板，并将 Hello World 项目从一个简单的标签扩展为一个简单的增强现实游戏。我们将相机视图缩放以适应设备在横屏模式下的宽高比。然后，我们为用户触摸事件设置了事件处理程序。\n\
  \n我们这个简单的小游戏处理用户的触摸事件，创建并启动粒子系统以实现视觉效果，甚至还包含了爆炸音效。我们甚至构建了一个独立的 HUD 层，它独立于游戏层，用于统计指标并将其显示给用户。\n\
  \n在下一章中，我们将把增强现实游戏提升到一个新的水平，利用陀螺仪创建一个 360 度的第一人称增强现实射击游戏。\n\n"
