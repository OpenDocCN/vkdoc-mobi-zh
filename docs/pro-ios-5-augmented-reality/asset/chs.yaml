  \n好了，让我们让这个更有趣一些。菜单层的想法是，当用户决定是否开始新游戏时，我们可以给他们一些事情做。由于这是一个关于南瓜的游戏，我们将添加一个南瓜到屏幕上，用户可以通过触摸交互来抛掷它。\n\
  \n\n\n#### 美术资源\n\n对于 cocos2D 游戏开发，最好使用精灵表。更进一步，如果能将图片合并到少数几个优化过空间占用的精灵表中，效果更佳。由于本书是关于增强现实而非\
  \ iOS 游戏开发的，我已经为您创建并优化好了精灵表。它们可以在 GitHub 上的`Art`目录中找到，或者从 Apress 网站（[`www.apress.com`](http://www.apress.com)）的源代码/下载区域获取。在继续教程之前，请将`Art`目录复制到您的\
  \ Xcode 项目中。您应该会得到以下四个新文件：\n\n- `particleTexture.png`\n- `PumpkinExplosion.plist`\n\
  - `Pumpkins.plist`\n- `Pumpkins.png`\n\n前两个文件是我为此项目创建的粒子发射器。它能在我们摧毁南瓜时，赋予它们一种橘色溶解的效果。第二对文件是合并后的\
  \ PNG 文件，包含了我们将使用的不同南瓜。完整的精灵表如图 8-7 所示。\n\n![图片](img/0807.jpg)\n\n**图 8-7.** *为我们的项目使用南瓜精灵表。*\n\
  \n此精灵表中的南瓜被命名为`pumpkin_#_.png`，其中`#`是 5 到 16 之间的数字。南瓜 1 到 4 没有脸，所以我们不打算使用它们。\n\n\
  我们将把其中一个南瓜添加到菜单屏幕上，并允许用户稍微抛掷它。使用任意模板创建一个新文件。反正我们后续会覆盖整个内容。将新类命名为`CPSprite`。\n\n\
  用代码清单 8-8 中的代码覆盖头文件。\n\n**代码清单 8-8.** *CPSprite.h*\n\n```\n#import \"cocos2d.h\"\
  \n#import \"chipmunk.h\"\n\ntypedef enum {\n    kCollisionTypeGround = 0x1,\n  \
  \  kCollisionTypeCat,\n    kCollisionTypeBed\n} CollisionType;\n\n@interface CPSprite\
  \ : CCSprite {\n    cpBody *body;\n    cpShape *shape;\n    cpSpace *space;\n  \
  \  BOOL canBeDestroyed;\n}\n\n@property (assign) cpBody *body;\n\n- (void)update;\n\
  - (void)createBoxAtLocation:(CGPoint)location;\n- (id)initWithSpace:(cpSpace *)theSpace\
  \ location:(CGPoint)location spriteFrameName:(NSString *)spriteFrameName;\n- (void)destroy;\n\
  \n@end\n```\n\n我们无需过分担心这个类的具体作用。本质上，我们是在为`CCSprite`类建立一个包装器，以便更容易地与屏幕上的对象进行交互。在我们的场景中，这将帮助我们创建一个可以在屏幕上抛掷的南瓜。\n\
  \n切换到`CPSprite.m`，并用代码清单 8-9 中的代码替换其实现。\n\n**代码清单 8-9.** *CPSprite.m*\n\n```\n#import\
  \ \"CPSprite.h\"\n\n@implementation CPSprite\n@synthesize body;\n\n- (void)update\
  \ {    \n    self.position = body->p;\n    self.rotation = CC_RADIANS_TO_DEGREES(-1\
  \ * body->a);\n}\n\n- (void)createBoxAtLocation:(CGPoint)location {\n\n    float\
  \ mass = 1.0;\n    body = cpBodyNew(mass, cpMomentForBox(mass, self.contentSize.width,\
  \ self.contentSize.height));\n    body->p = location;\n    body->data = self;\n\
  \    cpSpaceAddBody(space, body);\n\n    shape = cpBoxShapeNew(body, self.contentSize.width,\
  \ self.contentSize.height);\n    shape->e = 0.3;\n    shape->u = 1.0;\n    shape->data\
  \ = self;\n    shape->group = 1;\n    cpSpaceAddShape(space, shape);\n\n}\n\n- (id)initWithSpace:(cpSpace\
  \ *)theSpace location:(CGPoint)location spriteFrameName:(NSString *)spriteFrameName\
  \ {\n\n    if ((self = [super initWithSpriteFrameName:spriteFrameName])) {\n\n \
  \       space = theSpace;\n        canBeDestroyed = YES;\n        [self createBoxAtLocation:location];\n\
  \n    }\n    return self;\n\n}\n\n- (void)destroy {\n\n    if (!canBeDestroyed)\
  \ return;\n\n    cpSpaceRemoveBody(space, body);\n    cpSpaceRemoveShape(space,\
  \ shape);\n    [self removeFromParentAndCleanup:YES];\n}\n\n@end\n```\n\n实现文件设置了我们将在菜单中使用的属性。在大多数情况下，您无需过分担心这个文件中的具体实现。这个文件和其他两个文件一起包含在`Helper\
  \ Code`目录下的源代码中。它们是一些工具方法，旨在使实现文件更容易阅读。\n\n#### 辅助代码目录\n\n在继续之前，您还需要从源代码目录复制另外四个文件。它们位于\
  \ GitHub 上的`Helper Code`目录中，或者 Apress 网站（[`www.apress.com`](http://www.apress.com)）的源代码/下载区域。\n\
  \n这些文件是：\n\n- `cpMouse.c`\n- `cpMouse.h`\n- `drawSpace.h`\n- `drawSpace.c`\n\n将这些文件复制到您的\
  \ Xcode 项目中。如果您尝试构建项目，将会出现编译器错误。在 Xcode 导航器中点击`cpMouse.c`。在右侧面板中，打开**Identity and\
  \ Type**视图，并将**File Type**设置为**Objective-C source**，如图 8-8 所示。\n\n![图片](img/0808.jpg)\n\
  \n**图 8-8.** *设置`cpMouse.c`的文件类型。*\n\n对`drawSpace.c`重复此过程。此时，您的项目应该能够无错误地构建。\n\n\
  ### 完成菜单屏幕\n\n回到`MenuLayer.h`。现在我们的项目中有了辅助类，事情会顺利得多。像代码清单 8-10 所示更新头文件。\n\n**代码清单\
  \ 8-10.** *更新后的 MenuLayer.h*\n\n```\n#import <Foundation/Foundation.h>\n#import\
  \ \"cocos2d.h\"\n#import \"chipmunk.h\"\n\n@interface MenuLayer : CCLayer {\n  \
  \  cpSpace *space;\n    cpBody *ground;\n}\n\n+ (id)scene;\n\n@end\n```\n\n导入 chipmunk\
  \ 库之后，我们声明了两个新的私有变量。首先，为 chipmunk 设置一个`cpSpace`实例变量。这定义了 chipmunk 追踪物理动作的空间。然后，我们向类添加了一个`cpBody`。这将代表我们屏幕的底部，作为某种意义上的地面。如果没有这个地面，南瓜可能会飞向屏幕的各个方向。拥有地面也有助于\
  \ chipmunk 更容易地理解重力和摩擦力。\n\n#### 使用 Chipmunk\n\n切换到`MenuLayer.m`。从我们的辅助代码类中导入`drawSpace.h`头文件。将代码清单\
  \ 8-11 中的方法添加到实现中。\n\n**代码清单 8-11.** *`createSpace`方法*\n\n```\n- (void)createSpace\
  \ {\n    space = cpSpaceNew();\n    space->gravity = ccp(0, -750);\n    cpSpaceResizeStaticHash(space,\
  \ 400, 200);\n    cpSpaceResizeActiveHash(space, 200, 200);\n}\n```\n\n此方法定义了 chipmunk\
  \ 的空间。我们将重力设置为在 X 轴上无作用（无左右重力），而在 Y 轴上施加一个相当强的拉力。您可以在自己的实现中调整这些数值，以获得您想要的感觉。接下来的两行代码用于优化\
  \ chipmunk 的碰撞检测。它将 chipmunk 划分为网格，并告诉框架忽略不在同一网格中的对象。在`createSpace`方法正下方，添加代码清单\
  \ 8-12 中的方法。\n\n**代码清单 8-12.** *`createGround`方法*\n\n```\n- (void)createGround {\
  \    \n\n    CGSize winSize = [CCDirector sharedDirector].winSize;\n    CGPoint\
  \ lowerLeft = ccp(0, 0);\n    CGPoint lowerRight = ccp(winSize.width, 0);\n\n  \
  \  ground = cpBodyNewStatic();\n\n    float radius = 10.0;\n    cpShape *groundShape\
  \ = cpSegmentShapeNew(ground, lowerLeft, lowerRight, radius);\n\n    groundShape->e\
  \ = 0.5; // 弹性系数\n    groundShape->u = 1.0; // 摩擦系数\n\n     cpSpaceAddShape(space,\
  \ groundShape);    \n}\n```\n\n正如我之前提到的，我们正在创建一个地面效果，以防止南瓜完全掉出屏幕。我们还设置了摩擦力和弹性系数。如果您想用南瓜找点乐子，可以将弹性系数设低，摩擦系数设为\
  \ 0，从而获得类似冰面的效果。或者，您可以增加弹性和摩擦系数，以获得更像蹦床的效果。\n\n\n\n### 在 Chipmunk 中创建对象\n\n将代码清单\
  \ 8–13 中的方法添加到实现部分。\n\n**代码清单 8–13.** *`createBoxAtLocation` 和 `draw`（覆写）方法*\n\n\
  ```\n- (void)createBoxAtLocation:(CGPoint)location {\n    float boxSize = 60.0;\n\
  \    float mass = 1.0;\n    cpBody *body = cpBodyNew(mass, cpMomentForBox(mass,\
  \ boxSize, boxSize));\n    body->p = location;\n    cpSpaceAddBody(space, body);\n\
  \n    cpShape *shape = cpBoxShapeNew(body, boxSize, boxSize);\n    shape->e = 1.0;\n\
  \    shape->u = 1.0;\n    cpSpaceAddShape(space, shape);\n}\n\n- (void)draw {\n\
  \    drawSpaceOptions options = {\n        0, // drawHash\n        0, // drawBBs,\n\
  \        1, // drawShapes\n        4.0, // collisionPointSize\n        4.0, // bodyPointSize,\n\
  \        2.0 // lineThickness\n    };\n\n    drawSpace(space, &options);\n}\n```\n\
  \n第一个方法仅在此处使用一次。我们将创建几个方框并将其丢到屏幕上，以确保 Chipmunk 运行正常。第二个方法用于启用 Chipmunk 的调试绘制功能。没有它，就很难确切知道你在屏幕上渲染了什么。如果你继续从事游戏开发，这个方法会派上用场。更新\
  \ `init` 方法并添加一个名为 `update` 的新方法，如代码清单 8–14 所示。\n\n**代码清单 8–14.** *新的 `init` 方法和\
  \ `update` 方法*\n\n```\n- (id)init {\n    if ((self = [super init])) {        \n\
  \        CGSize winSize = [CCDirector sharedDirector].winSize;\n\n        [self\
  \ createSpace];\n        [self createGround];\n        [self createBoxAtLocation:ccp(100,100)];\n\
  \        [self createBoxAtLocation:ccp(200,200)];\n\n        [self scheduleUpdate];\n\
  \    }\n    return self;\n}  \n\n- (void)update:(ccTime)dt {\n    cpSpaceStep(space,\
  \ dt);\n}\n```\n\n好了，事情变得更有趣了。通过这些新代码，我们设置了 Chipmunk 空间、地面物体，并在不同坐标处创建了两个方框。`update`\
  \ 方法会逐步处理自上次迭代以来 Chipmunk 空间中的变化。Chipmunk 会为你处理其空间内所有对象的更新。现在就去用模拟器运行该项目，看看我说的效果。你应该会看到类似图\
  \ 8–9 的画面。\n\n![图片](img/0809.jpg)\n\n**图 8–9** *运行项目，查看屏幕上的方框。*\n\n再说一次，是不是并不令人兴奋？让我们添加一个所谓的*鼠标关节*，这样我们就可以抓住并投掷这些方框了。关节是\
  \ Chipmunk 中的一种约束类型。在本示例中，我们将使用两种类型的关节。我们会用鼠标关节让用户抓取方框，还会用 `cpDampedSprint` 关节让南瓜在被抛来抛去时弹跳起来。\n\
  \n切换到 `MenuLayer.h` 文件，并从我们的 Helper Code 目录导入 `cpMouse.h` 头文件。然后声明一个 `cpMouse` 类的私有实例变量，命名为\
  \ `mouse`。\n\n将代码清单 8–15 中的以下行添加到 `init` 方法中，放在运行 `scheduleUpdates` 方法之前。\n\n**代码清单\
  \ 8–15.** *添加到 `init` 方法*\n\n```\nmouse = cpMouseNew(space);\nself.isTouchEnabled\
  \ = YES;\n```\n\n第一行设置了新的 `mouse` 实例变量，用于处理我们 Chipmunk 空间中的鼠标事件。第二行启用了我们类的触摸事件。\n\
  \n启用触摸事件是一回事；处理它们则稍微复杂一些。在 cocos2D 中有两种基本方法处理触摸事件。本示例只需要单点触摸事件（而非多点触摸事件）。奇怪的是，这些需要的代码比多点触摸处理还要多。将代码清单\
  \ 8–16 中的代码添加到实现部分。\n\n**代码清单 8–16.** *处理触摸事件*\n\n```\n- (void)registerWithTouchDispatcher\
  \ {\n    [[CCTouchDispatcher sharedDispatcher] addTargetedDelegate:self priority:0\
  \ swallowsTouches:YES];\n}\n\n- (BOOL)ccTouchBegan:(UITouch *)touch withEvent:(UIEvent\
  \ *)event {\n    CGPoint touchLocation = [self convertTouchToNodeSpace:touch];\n\
  \    cpMouseGrab(mouse, touchLocation, false);\n    return YES;\n}\n\n- (void)ccTouchMoved:(UITouch\
  \ *)touch withEvent:(UIEvent *)event {\n    CGPoint touchLocation = [self convertTouchToNodeSpace:touch];\n\
  \    cpMouseMove(mouse, touchLocation);\n}\n\n- (void)ccTouchEnded:(UITouch *)touch\
  \ withEvent:(UIEvent *)event {\n    cpMouseRelease(mouse);\n}\n\n- (void)ccTouchCancelled:(UITouch\
  \ *)touch withEvent:(UIEvent *)event {\n    cpMouseRelease(mouse);    \n}\n\n- (void)dealloc\
  \ {\n    cpMouseFree(mouse);\n    cpSpaceFree(space);\n    [super dealloc];\n}\n\
  ```\n\n这一系列事件让 Chipmunk 知道用户想要抓取与触摸坐标碰撞的任何对象。Chipmunk 会更新对象的位置，直到用户释放触摸事件。到那时，重力、摩擦力以及任何其他\
  \ Chipmunk 环境变量会起作用，对象将回到自然的运动轨迹。再次在模拟器上运行项目。你现在可以在屏幕上抛掷这些对象了。不过要小心——你实际上可以将其抛出屏幕，而且再也拿不回来了！\n\
  \n那么，屏幕上的方框并不是我们目标的一部分，对吗？要把这些方框变成南瓜，我们需要将一个精灵图片附着到方框上，并确保当 Chipmunk 更新形状位置时，图片能跟着移动。而且，由于现在的状况没什么用，因为用户可以把南瓜完全抛出屏幕，所以我们要为屏幕上的南瓜添加一个沟槽关节。可以把沟槽关节想象成一根旗杆或固定的轨道。与关节相连的对象可以沿着路径移动，但不能偏离旗杆/轨道。\n\
  \n回到 Xcode 中的 `MenuLayer.h` 文件。按代码清单 8–17 所示更新头文件。\n\n**代码清单 8–17.** *更新后的 `MenuLayer.h`*\n\
  \n```\n#import <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n#import \"chipmunk.h\"\
  \n#import \"cpMouse.h\"\n#import \"CPSprite.h\"\n\n@interface MenuLayer : CCLayer\
  \ {\n    cpSpace *space;\n    cpBody *ground;\n    cpMouse *mouse;\n\n    CCSpriteBatchNode\
  \ *pumpkinBatchNode;\n    CPSprite *menuPumpkin1;\n}\n\n+ (id)scene;\n\n@end\n```\n\
  \n首先，我们导入之前创建的 `CPSprite` 类。这将帮助我们轻松地将南瓜添加到屏幕上。接下来，我们声明一个私有的 `CCSpriteBatchNode`\
