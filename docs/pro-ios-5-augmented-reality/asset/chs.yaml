  \n#### 性能测量\n\n以上方法各有不同，但我们可以对比一下它们的速度以供参考。在项目中新建一个名为`CodeTimestamps.m`的类，使其继承自`NSObject`。更新头文件以使其与代码清单\
  \ 12-20 中的代码保持一致。\n\n直接从 GitHub 或 Apress 网站（[`www.apress.com`](http://www.apress.com)）上的项目中复制这些文件可能会更简单。本书的代码仓库中包含了相应的头文件和版权声明。\n\
  \n**代码清单 12–20.** *CodeTimestamps.h*\n\n```\n#import <Foundation/Foundation.h>\n\
  \n// 注释掉此行可禁用时间戳日志记录。\n#define USE_TIMESTAMPS 1\n\n// 计时数据输出到日志的频率。\n#define kLogTimeInterval\
  \ 10.0\n\n// 宏，用于实现高效的一次性函数调用。\n// 令牌拼接技巧来源于：\n// http://bit.ly/fQ6Glh\n#define\
  \ TokenPasteInternal(x,y) x ## y\n#define TokenPaste(x,y) TokenPasteInternal(x,y)\n\
  #define UniqueTokenMacro TokenPaste(unique,__LINE__)\n#define OneTimeCall(x) \\\n\
  { static BOOL UniqueTokenMacro = NO; \\\nif (!UniqueTokenMacro) {x; UniqueTokenMacro\
  \ = YES; }}\n\n// 用于性能调优的函数与宏。\nvoid LogTimeStampInMethod(const char *fnName, int\
