- "# 构建社交 AR 应用\n\n在第 10 章中，我们讨论了使用 String SDK 的基于标记的增强现实应用。由于手持设备识别标记需要处理能力，基于位置的\
  \ AR 应用比基于标记的 AR 应用出现得更早。\n\n在本章中，我们将以更传统的方式审视 AR 应用，并构建一个更接近最初在 AppStore 和 Android\
  \ Market 上引发革命的原生应用。\n\n我们将构建一个支持 GPS 的 AR 应用，用于查找附近的 Facebook 地点。\n\n### 开始设置\n\
  \n首先，我们需要确保已经为围绕 Facebook Open Graph 开发应用做好了准备。这个过程有几个步骤。它们主要包括：\n\n*   创建一个 Facebook\
  \ 应用\n*   克隆 Facebook iOS SDK GitHub 仓库\n*   为应用启用单点登录\n\n#### 创建 Facebook 应用\n\n\
  为 Facebook 创建应用可以为 API 和你的用户提供权限和数据的上下文。如果没有应用，你通过 Open Graph API 检索的内容将没有边界。Facebook\
  \ 应用允许你的用户决定他们将为你的应用授予何种访问权限。\n\n访问[`https://developers.facebook.com/apps`](https://developers.facebook.com/apps)。如果你之前使用过\
  \ Facebook API，应该已经准备好创建新的 Facebook 应用了。在开发者仪表板的右上角有一个标有`Create New App`的按钮。点击此按钮并按照说明设置你的应用。我将我的应用命名为*kyleroche*。设置完成后，你应该会在应用仪表板上看到类似图\
  \ 11–1 的内容。\n\n![Image](img/1101.jpg)\n\n**图 11–1.** *设置 Facebook 应用。*\n\n记下你的`App\
  \ ID`和`App Secret`。在设置 Xcode 项目时，你将需要你的`App ID`。\n\n#### 克隆 Facebook iOS SDK\n\n\
  使用浏览器访问[`https://github.com/facebook/facebook-ios-sdk`](https://github.com/facebook/facebook-ios-sdk)下载最新版本的\
  \ Facebook iOS SDK。将仓库克隆到本地机器。如果你感兴趣，可以运行一些示例应用。打开位于`samples`子目录中的 Xcode 项目。在 Xcode\
  \ 中打开`DemoAppViewController.m`，找到列表 11–1 中显示的代码段。\n\n**列表 11–1.** *设置你的 Facebook\
  \ App ID*\n\n```objc\n// Your Facebook APP Id must be set before running this example\n\
  // See http://www.facebook.com/developers/createapp.php\n// Also, your application\
  \ must bind to the fb[app_id]:// URL\n// scheme (substitute [app_id] for your real\
  \ Facebook app id).\nstatic NSString* kAppId = nil;\n```\n\n确保将`nil`改为你的 Facebook\
  \ App ID。还有一步需要完成才能测试 SDK 提供的演示应用。打开应用的`.plist`文件，找到 URL Schemes 条目。该数组中的项目 0 需要设置为`fb[`*`你的应用\
  \ ID`*`]`才能正常运行。当从原生 iOS 应用进行身份验证时，Facebook 通过 URL Scheme 验证本地应用的真实性。在 iOS 中，URL\
  \ Scheme 用于在上下文中启动其他原生应用。前缀（现在是你的应用 ID）用于唯一标识该应用。例如，如果我的应用 ID 是 123456，我会将 URL Scheme\
  \ 设置为`fb123456`，身份验证后，Facebook 将验证原生应用是否绑定到 URL Scheme`fb123456://[action]`。\n\n\
  此时，除非同一设备上安装了 Facebook 应用，否则该应用将无法运行。\n\n### 词汇课\n\n到目前为止，在本书中，我们已经为基于标记的增强现实和增强现实游戏场景构建了应用示例。我们还没有讨论与基于位置的\
  \ AR 的一些区别。在本节中，我们将讨论在本应用中会用到的一些新术语。\n\n### 方位角\n\n方位角（Azimuth）是一个源自阿拉伯语的词汇。其字面翻译是“方向”。方位角是一种用于球面坐标系的角度测量，例如在空间计算中。方位角是投影向量与定义明确的参考平面上的参考向量之间的角度。例如，考虑一个包含兴趣点的基于位置的应用。如果我们想知道需要面向哪个方向才能指向该兴趣点，我们可能会计算该点相对于北极的方位角。我们会（比喻性地）从当前位置画一个垂直于北极的平面，再从兴趣点画一个垂直于海平面（或我们位置下方的等位面）的平面。这两个平面之间的角度就是方位角。\n\
  \n俗话说，“一图胜千言”。请参见图 11–2 获取更详细的解释。\n\n![Image](img/1102.jpg)\n\n**图 11–2.** *计算方位角。该点与北极的方位角为\
  \ 80 度。*\n\n在我们将要构建的示例应用中，我们将讨论用于计算从我们的视点到另一个 GPS 坐标视点的方位角的公式。但是，如果你等不及了，这里有一个例子：如果我们站在纬度φ[1]、经度零的位置，并且想找到从我们的视点到纬度φ[2]、经度\
  \ L（向东为正）的 Point 2 的方位角，公式如图 11–3 所示。\n\n![Image](img/1103.jpg)\n\n**图 11–3.** *这是一个计算方位角的公式示例。*\n\
  \n\n\n#### 修正后的标题\n\n实际上，我们已经在书中讨论过这个概念。我不确定是否有标准术语来定义它，但回想一下我们在第 4 章中关于磁力计的讨论，当时我们聊到了方向变化。假设一部\
  \ iPhone 处于竖屏模式且朝向正北。如果你将 iPhone 侧放，此时它变成了横屏右向模式（举例来说），虽然你仍然面向正北，但 iPhone 的朝向可能会错误地认为你已转向正西。\n\
  \n当 AR 应用（尤其是基于位置信息的应用）中的方向发生变化时，你必须注意相应地调整朝向。\n\n### 构建应用程序\n\n让我们开始吧。打开 Xcode\
  \ 并创建一个名为 `Ch11` 的项目，使用`空应用程序`模板。此模板将使用单个窗口构建一个简单的应用程序。\n\n#### 鸣谢\n\n`github.com`、`stackoverflow.com`、苹果开发者论坛以及其他各种在线社区上有很多关于基于位置的\
  \ AR 的讨论。有一些工具包，例如 ARKit（[`https://github.com/zac/iphonearkit`](https://github.com/zac/iphonearkit)），它拥有来自贡献者的近\
  \ 100 个不同分支变体。本章中的工作基于其中一些变体。因此，我要特别感谢 Zac White 和 Niels Hansen，他们为我们提供了可以在此基础上构建的起点。\n\
  \n#### 必需的框架\n\n我们正在构建一个基于位置的应用程序。你可能已经猜到，我们需要将`CoreLocation`框架添加到项目中。在继续之前，请确保已包含该框架。\n\
  \n#### 添加 Facebook iOS SDK\n\n我们之前下载 SDK 时，里面附带了示例应用程序。由于我们现在从一个干净的应用开始，我们需要将 SDK\
  \ 重新添加到此项目中。\n\n在 Finder 中打开已归档的 SDK 目录。将 SDK 中的 `src` 目录拖入你的 Xcode 项目。确保选择了将资源复制到项目目录的选项。我们将在本章后面部分继续讨论这一点。\n\
  \n#### 好了，开始吧！\n\n好的，准备就绪。让我们开始编码。在你的 Xcode 项目中创建一个名为 `ARController` 的组。我们将把 AR\
  \ 特定的代码放在这里，以便你以后可以在自己的项目中复用它们。\n\n在 `ARController` 组中创建一个名为 `ARController.m` 的新类。确保此类继承自\
  \ `NSObject` 而不是 `UIViewController`。在 Xcode 中打开 `ARController.h`。按照代码清单 11–2 所示更新接口。\n\
  \n**代码清单 11–2.** *更新后的 ARController.h*\n\n```\n#import <Foundation/Foundation.h>\n\
  #import <CoreLocation/CoreLocation.h>\n#import <UIKit/UIKit.h>\n\n@interface ARController\
  \ : NSObject <UIAccelerometerDelegate, CLLocationManagerDelegate>\n{\n\n}\n\n@property\
  \ (nonatomic, retain) UIViewController *rootViewController;\n@property (nonatomic,\
