  \ [`http://help.github.com/mac-set-up-git/`](http://help.github.com/mac-set-up-git/)。\n\
  \n### 接下来是什么？\n\n以下是本书一些关键章节的快速预览。\n\n#### 定位服务\n\n大多数 AR 用例（至少早期的用例）都包含与用户位置相关的元素。无论是通过\
  \ AR 视图显示附近的餐厅，还是寻找朋友对夜生活的推荐，基于位置的 AR 都引领了这一潮流。在第 3 章中，我们将通过可在我们自己 AR 应用中使用的真实示例，学习\
  \ iOS 的地图和地理定位功能。\n\n#### 传感器编程\n\n创建 AR 应用需要大量与 iPhone 或 iPad 原生传感器的集成。传感器包括加速度计、数字罗盘和陀螺仪。在第\
  \ 4 章中，我将通过小型项目向你介绍传感器开发，这些项目演示了我们将要在 AR 应用中复用的关键功能。\n\n#### 灯光，摄像机，开拍……\n\n在第 5\
  \ 章中，我会介绍声音和用户反馈。声音在 AR 应用中并非最突出的功能，但它能带来更好的用户体验。之后，在第 6 章中，我们将深入探讨摄像头和视频编程。由于 AR\
  \ 应用都是叠加在摄像头视图之上的，因此在我们开始构建本书结尾处的大型 AR 项目之前，本章是必不可少的基础章节。\n\n#### 游戏框架\n\n我选择使用\
  \ Cocos2D 来演示 AR 游戏功能。在第 7 章中，你将了解 Cocos2D 的基础知识，然后我们将在第 8 章中跟进一个实际应用。\n\n#### 第三方框架\n\
  \n在第 9 章中，我会介绍几个能让基于标记的增强现实应用开发变得更简单的第三方框架。接下来我们将通过一个实际例子进行说明，然后转向更复杂的框架，例如 OpenCV（开源计算机视觉库），这是一个用于面部或复杂物体识别的开源库。在设备上进行面部识别存在一些限制。这些限制主要与硬件能力有关。我们将讨论利用公开\
  \ API 来补充面部识别的一些更具创意的方法。\n\n### 总结\n\n我希望你能从本书中学到很多。AR 在移动应用中是一个非常新的概念，拥有无限的可能性。开发者社区才刚刚开始探索这些可能性的表面。我希望这本书能为你开启进入\
  \ AR 世界的旅程提供一个良好的开端。\n\n让我们从回顾一些应用布局选项和构建自己 AR 应用的框架开始吧。在下一章中，我们将讨论本书中会使用的硬件以及不同型号的主要功能。\n\
  \n## 第 2 章\n\n## 硬件对比\n\n每位移动开发者都会担心硬件兼容性问题。然而，为苹果 iOS 系列产品进行开发的主要好处在于硬件之间的标准化。诚然，设备存在不同的迭代版本，但厂商只有一家：苹果！对于其他移动操作系统，你还必须担心\
  \ OEM 厂商及其无限制的硬件配置变化。让我们来深入了解一下最新 iOS 设备的内部构造。\n\n\n\n### 告别旧设备\n\n我们将在示例项目中使用 iPhone\
  \ 和 iPad。不过，只要代码在两个平台上完全可移植，我们就只针对 iPhone 进行编码。图 2–1 展示了 iPhone 4 的物理尺寸。\n\n![Image](img/0201.jpg)\n\
  \n**图 2–1.** *这里展示了 iPhone 4 的物理尺寸。*\n\niPad 上市时间虽不如 iPhone 长，但其应用场景的吸引力毫不逊色。在本书中，我们仅以\
  \ iPad 2 为例。原因有几条。最重要的是，第一代 iPad 缺少前置摄像头，而本书后续会涉及一些人脸识别编程。图 2–2 展示了 iPad 2 的物理特性。\n\
  \n![Image](img/0202.jpg)\n\n**图 2–2.** *这里展示了 iPad 2 的物理特性。*\n\n### 硬件组件\n\n我们不要仅仅罗列这些设备的硬件规格，而是花点时间讨论增强现实应用可能需要什么。首先，也是最明显的，设备需要摄像头。大多数增强现实用例都对位置和方向有所要求，因此\
  \ GPS 和指南针会很有用。可能还需要监听声音或输出声音，所以我们应该考虑麦克风和扬声器支持。我们会在示例中融入一些游戏功能，因此可能需要一些硬件加速能力和图形工具包。让我们将这些需求转化为苹果的术语，并逐步了解如何检测这些不同的硬件组件。\n\
  \n**注意：** 在查看 iOS 设备的不同硬件组件时，我会贴出一些小代码片段。在本章中，这些代码将脱离示例项目的上下文。不过，如果你想跟着操作，本章的所有代码都存放在以下\
  \ GitHub 仓库中：\n\n[`https://github.com/kyleroche`](https://github.com/kyleroche)\n\
  \n#### 摄像头支持\n\n自苹果推出 iPhone 3GS 以来，摄像头已经取得了长足的进步。与一些以摄像头为差异化特色的其他硬件型号相比，它仍有不少改进空间，但足以满足我们的需求。\n\
  \n在手机的视频能力上构建增强现实应用有两种方式。首先，你可以主动检查视频捕获中的元素、可识别对象等。或者，你可以将视频捕获作为应用的背景，同时完全忽略其内容。我们在增强现实浏览器中经常看到这种方法，因为持续检查视频捕获涉及繁重的处理。在本书中，我们将逐步介绍这两种方法的示例。\n\
  \n表 2–1 详细介绍了本书将使用的硬件关于摄像头和视频能力的规格。\n\n![Image](img/t0201.jpg)\n\n##### 检测摄像头\n\n\
  我们可以通过使用 `UIImagePickerController` 类以编程方式检测设备上可用的摄像头。有一个名为 `isSourceTypeAvailable:`\
  \ 的方法，我们可以用它来确定设备上是否有我们想要使用的摄像头。代码清单 2–1 展示了如何使用 `isSourceTypeAvailable:` 方法的示例。\n\
  \n**代码清单 2–1.** *检测摄像头，然后检测前置摄像头*\n\n```\nBOOL cameraAvailable = [UIImagePickerController\
  \ isSourceTypeAvailable:UIImagePickerControllerSourceTypeCamera];\n    BOOL frontCameraAvailable\
  \ = [UIImagePickerController isSourceTypeAvailable:UIImagePickerControllerCameraDeviceFront];\n\
  \n    if (cameraAvailable) {\n        UIAlertView *alert = [[UIAlertView alloc]\
  \ initWithTitle:@\"Camera\"\n                                                  \
  \      message:@\"Camera Available\"\n                                         \
  \              delegate:self\n                                              cancelButtonTitle:@\"\
  OK\"\n                                              otherButtonTitles:nil, nil];\n\
  \        [alert show];\n        [alert release];\n    } else {\n        UIAlertView\
  \ *alert = [[UIAlertView alloc] initWithTitle:@\"Camera\"\n                    \
  \                                    message:@\"Camera NOT Available\"\n       \
  \                                                delegate:self\n               \
  \                               cancelButtonTitle:@\"OK\"\n                    \
  \                          otherButtonTitles:nil, nil];\n        [alert show];\n\
  \        [alert release];\n    }\n\n    if (frontCameraAvailable) {\n        UIAlertView\
  \ *alert = [[UIAlertView alloc] initWithTitle:@\"Camera\"\n                    \
  \                                    message:@\"Front Camera Available\"\n     \
  \                                                  delegate:self\n             \
  \                                 cancelButtonTitle:@\"OK\"\n                  \
  \                            otherButtonTitles:nil, nil];\n        [alert show];\n\
  \        [alert release];\n    } else {\n        UIAlertView *alert = [[UIAlertView\
  \ alloc] initWithTitle:@\"Camera\"\n                                           \
  \             message:@\"Front Camera NOT Available\"\n                        \
  \                               delegate:self\n                                \
  \              cancelButtonTitle:@\"OK\"\n                                     \
  \         otherButtonTitles:nil, nil];\n        [alert show];\n        [alert release];\n\
  \    }\n```\n\n这段代码将通过快速弹出的 `UIAlertView` 来展示结果。实际上，你会从这个示例中得到两个弹窗。你可以在代码清单 2–1\
  \ 的开头几行看到，我们正在检查 `UIImagePickerControllerSourceTypeCamera` 是否存在，以确定摄像头是否可用。接下来，我们使用\
  \ `UIImagePickerControllerCameraDeviceFront` 参数检查前置摄像头是否存在。`isSourceTypeAvailable:`\
  \ 方法返回一个 `BOOL` 值。我们在 `if/else` 语句中使用该值，并为每次检查显示相应的 `UIAlertView`。\n\n那么，既然我们只使用\
  \ iPhone 3GS、iPhone 4 和 iPad 2，为什么还要检查摄像头呢？它们不都有摄像头吗？是的，它们都有摄像头。然而，我们也会在 Xcode 中使用模拟器进行编码。与其他一些移动操作系统的\
  \ IDE 不同，Xcode 模拟器不支持摄像头。\n\n看看图 2–3。这两张截图均来自运行上述示例代码块的 iPhone 4 设备。由于代码块中两个 `if/else`\
  \ 都会执行，所以我们得到了两个 `UIAlertView` 对话框。从对话框中可以看到，两次检查都返回了 `True`，这意味着摄像头和前置摄像头都可用。\n\
  \n![Image](img/0203.jpg)\n\n\n\n### 硬件功能检测\n\n**图 2–3.** *我们首先检测摄像头（左图），然后在 iPhone\
  \ 4 上检测前置摄像头（右图），得到了这些结果。*\n\n为了证明这些函数确实会检测摄像头的可用性，我在 Xcode 的 iPhone 4.3 模拟器上运行了相同的代码。结果弹出的对话框相反，如图\
  \ 2–4 所示。\n\n我们本可以使用其他选项来检测摄像头。从技术上讲，我们的第一次检测是检查是否有任何摄像头可用。我们也可以使用 `UIImagePickerControllerCameraDeviceRear`\
  \ 作为源类型参数，专门检测后置摄像头。或者，我们可以检查设备当前闪光灯设置的几个选项。这个选项略有不同。我们要么专门检查我们想要验证的模式，例如 `UIImagePickerControllerCameraFlashModeOn`，要么使用\
  \ `isFlashAvailableForCameraDevice` 方法。\n\n关于如何使用摄像头拍摄照片和视频，我们将在第 8 章中详细讨论。\n\n\
  ![Image](img/0204.jpg)\n\n**图 2–4.** *我们在 iPhone 4.3 模拟器上检测摄像头（左图），然后检测前置摄像头（右图）。*\n\
  \n#### 检测定位能力\n\niOS 提供了 `Core Location Framework` 用于与设备上的基于位置的服务和硬件进行交互。不幸的是，`Core\
  \ Location Framework` 没有提供任何检测 GPS 是否存在的方法。相反，你应该在应用程序本身上强制这些硬件要求（参见本章后面的“强制硬件要求”）。\n\
  \n现在，需要明确的是，你仍然可以检查位置服务是否已启用。尽管每个版本的 iOS 都提供位置服务，但在某些情况下它们可能对你的应用程序不可用。例如：\n\n*\
  \   用户可以在“设置”应用程序中禁用位置服务。\n*   用户可以拒绝特定应用程序的位置服务。\n*   设备可能处于飞行模式，无法为必要的硬件供电。\n\n\
  基于这些原因，在尝试使用任何位置服务之前，你应该始终调用 `CLLocationManager` 的 `locationServicesEnabled` 类方法。如果用户故意禁用了这些服务，当你尝试使用位置服务时自动弹出的提示可能不是你的应用程序受欢迎的功能。\n\
  \n有两种方法可用于确定用户的位置：\n\n*   **标准定位服务** 是一种可配置、通用的解决方案，所有版本的 iOS 都支持。\n*   **重大变化位置服务**\
  \ 为具有蜂窝无线电的设备提供低功耗位置服务。此服务仅在 iOS 4.0 及更高版本中可用，可以唤醒已挂起或未运行的应用程序。\n\n我们将在第 4 章中详细讨论如何启动和使用定位服务。\n\
  \n#### 数字指南针\n\n我们之前提到，增强现实应用程序也可能从方向航向中受益。实际上，对于任何基于位置的 AR 应用程序来说，这都是一项要求，否则你将无法确定用户面对的方向。检测磁力计（数字指南针）相当直接。在使用\
  \ `Core Location Framework` 之前，必须执行两个步骤来准备项目。\n\n首先，必须将应用程序二进制文件与 `Core Location`\
  \ 库链接。点击 Xcode **项目导航器** 中的项目名称。将视图切换到应用程序目标的 **构建阶段** 选项卡。有一个名为 **链接二进制文件与库** 的部分。展开此部分，点击\
  \ `+` 按钮添加一个新库。在图 2–5 中，你可以看到我们正在添加到项目中的 `Core Location Framework`。\n\n![Image](img/0205.jpg)\n\
  \n**图 2–5.** *将 Core Location Framework 添加到应用程序二进制文件中。*\n\n其次，确保将清单 2–2 中的 `import`\
  \ 语句添加到你的头文件中。\n\n**清单 2–2.** *引入 Core Location Framework*\n\n```\n#import <CoreLocation/CoreLocation.h>\n\
  ```\n\n添加 `Core Location Framework` 后，你可以将清单 2–3 添加到清单 2–1 的代码片段中，以检测磁力计的存在。所有这些代码都属于\
  \ `.m` 文件。请注意，我们使用的是 `headingAvailable` 类方法，而不是属性。该属性最近已被弃用，而类方法是检测航向是否可用的首选方式。\n\
  \n在 GitHub 上发布的示例中，我将所有这些代码保留在 `viewDidLoad` 方法中，以确保在视图呈现时运行。\n\n**清单 2–3.** *检测磁力计*\n\
  \n```\nBOOL magnetometerAvailable = [CLLocationManager headingAvailable];\n    if\
  \ (magnetometerAvailable) {\n        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\
  Magnetometer\"\n                                                        message:@\"\
  Magnetometer Available\"\n                                                     \
  \  delegate:self\n                                              cancelButtonTitle:@\"\
  OK\"\n                                              otherButtonTitles:nil, nil];\n\
  \        [alert show];\n        [alert release];\n    } else {\n        UIAlertView\
  \ *alert = [[UIAlertView alloc] initWithTitle:@\"Magnetometer\"\n              \
  \                                          message:@\"Magnetometer NOT Available\"\
  \n                                                       delegate:self\n       \
  \                                       cancelButtonTitle:@\"OK\"\n            \
  \                                  otherButtonTitles:nil, nil];\n        [alert\
  \ show];\n        [alert release];\n    }\n```\n\n与摄像头一样，磁力计是另一种在模拟器上不可用的硬件组件。图\
  \ 2–6 展示了清单 2–3 中的代码在 iPhone 4.3 模拟器上运行的情况。\n\n如果你在物理 iPhone 设备或 iPad 上运行相同的代码块，你将得到相反的消息。\n\
  \n请记住，如果磁力计不可用，你仍然可以使用硬件要求来阻止应用程序在特定设备上启动。有关此主题的更多详细信息和说明，请参阅“强制硬件要求”部分。我们将在第 7\
  \ 章中介绍数字指南针的更高级用法。\n\n![Image](img/0206.jpg)\n\n**图 2–6.** *在 iPhone 4.3 模拟器上检测磁力计*\n\
  \n\n\n#### 音频检测\n\n检测音频功能的方式与检测其他组件相同。检查音频需要用到 AVFoundation 框架。按照本章前面链接 Core Location\
  \ 框架的方式，将此框架链接到你的应用程序二进制文件中。接着，在头文件中添加适当的 `import` 语句，如代码清单 2-4 所示。\n\n**代码清单 2-4.**\
  \ *添加 Import 语句*\n\n```\n#import <AVFoundation/AVFoundation.h>\n```\n\n最后，切换到 `.m`\
  \ 文件，取消注释 `viewDidLoad` 方法。或者，如果你将此代码添加到与位置服务和磁力计检测相同的文件中，可以直接附加代码清单 2-5 中的代码。\n\
  \n**代码清单 2-5.** *导入 AVFoundation 框架*\n\n```\nAVAudioSession *audioSession = [AVAudioSession\
  \ sharedInstance];\nBOOL audioAvailable = audioSession.inputIsAvailable;\n\n   \
  \ if (audioAvailable) {\n        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"\
  音频\"\n                                                        message:@\"音频可用\"\n\
  \                                                       delegate:self\n        \
  \                                      cancelButtonTitle:@\"确定\"\n             \
  \                                 otherButtonTitles:nil, nil];\n        [alert show];\n\
  \        [alert release];\n    } else {\n        UIAlertView *alert = [[UIAlertView\
  \ alloc] initWithTitle:@\"音频\"\n                                               \
  \         message:@\"音频不可用\"\n                                                 \
  \      delegate:self\n                                              cancelButtonTitle:@\"\
  确定\"\n                                              otherButtonTitles:nil, nil];\n\
  \        [alert show];\n        [alert release];\n    }\n```\n\n#### 检测视频功能\n\n\
  我们已经确认构建增强现实应用所需的大多数组件都已存在于设备上。然而，有摄像头可用并不一定意味着它能进行视频捕捉。而正是视频捕捉功能让增强现实应用如此吸引人。\n\
  \n检测摄像头的视频功能比单纯检测摄像头是否存在要复杂一些。为此，我们需要将 Mobile Core Services 框架添加到项目中。按照之前检测磁力计时添加\
  \ Core Location 框架的模式操作，但这次添加的是名为 `MobileCoreServices.framework` 的框架。在你的头文件中，在其他\
  \ `import` 语句之后添加代码清单 2-6 中的代码。然后，在 `@end` 之前添加代码清单 2-7 中的代码。\n\n**代码清单 2-6.** *导入\
  \ Mobile Core Services 框架*\n\n```\n#import <MobileCoreServices/UTCoreTypes.h>\n\
  ```\n\n**代码清单 2-7.** *声明 isVideoCameraAvailable 方法*\n\n```\n- (BOOL) isVideoCameraAvailable;\n\
  ```\n\n在代码清单 2-7 中，我们声明了一个方法签名，以便使用辅助函数来检测视频功能。切换到类的 `.m` 文件，并添加代码清单 2-8 中的辅助函数。\n\
  \n**代码清单 2-8.** *在 .m 文件中添加辅助函数*\n\n```\n- (BOOL) isVideoCameraAvailable\n{\n  \
  \  UIImagePickerController *picker = [[UIImagePickerController alloc] init];\n \
  \   NSArray *sourceTypes = [UIImagePickerController availableMediaTypesForSourceType:picker.sourceType];\n\
  \    [picker release];\n\n    if (![sourceTypes containsObject:(NSString *)kUTTypeMovie]){\n\
  \n        return NO;\n    }\n\n    return YES;\n}\n```\n\n在这段代码中，我们简单地检查所有可用的媒体源类型，然后检查该数组是否包含值为\
  \ `kUTTypeMovie` 的 `NSString` 对象。如果找到这个值，则说明设备摄像头支持视频功能。现在，这个方法已经声明并对我们的类可用，我们可以采用与检测其他组件相同的模式。在检查摄像头支持的代码之后，添加代码清单\
  \ 2-9 中的代码。\n\n**代码清单 2-9.** *调用新的辅助函数来检测视频功能*\n\n```\nif ([self isVideoCameraAvailable])\
  \ {\n        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"视频\"\n \
  \                                                       message:@\"视频可用\"\n    \
  \                                                   delegate:self\n            \
  \                                  cancelButtonTitle:@\"确定\"\n                 \
  \                             otherButtonTitles:nil, nil];\n        [alert show];\n\
  \        [alert release];\n    } else {\n        UIAlertView *alert = [[UIAlertView\
  \ alloc] initWithTitle:@\"视频\"\n                                               \
  \         message:@\"视频不可用\"\n                                                 \
  \      delegate:self\n                                              cancelButtonTitle:@\"\
  确定\"\n                                              otherButtonTitles:nil, nil];\n\
  \        [alert show];\n        [alert release];\n    }\n```\n\n正如你所料（因为我们之前已经确定模拟器上没有摄像头），在模拟器上你同样找不到视频功能。\n\
  \n\n\n#### 加速度计与陀螺仪\n\n许多应用场景（如虚拟试衣间或我在第 1 章中提到的邮局示例）都利用了固定位置摄像头的增强现实功能。然而，在大多数移动应用场景中，用户将能够移动设备、改变方向或四处走动来与应用程序交互。为了响应用户的移动，我们需要结合使用陀螺仪和加速度计的数据。在开始验证它们是否存在于设备上之前，让我们花点时间来了解这两个组件之间的区别。\n\
  \n加速度计通过测量三个轴上的数据来评估静止平台相对于地球表面的方向。如果设备仅朝一个特定方向加速，则无法与地球引力产生的加速度区分开。仅凭这种测量方式的问题在于，它无法提供足够的信息来维持特定的方向。\n\
  \n陀螺仪最早出现在 iPhone 4 中，它对加速度计进行了补充，因为它能够测量绕某个轴的旋转速率。使用同样的例子，陀螺仪可以测量绕轴旋转的恒定状态，并在旋转停止或改变时进行报告。通常，陀螺仪可在六个轴上工作。iPhone\
  \ 4 配备的是三轴陀螺仪。\n\n简而言之，陀螺仪测量并维持方向，而加速度计测量振动。我们将在后面的章节中了解在何时何地使用这些组件。首先，让我们看看如何在自己的应用中检测它们的存在。\n\
  \n检测陀螺仪的存在需要添加另一个框架。在这种情况下，我们需要向应用程序添加 Core Motion 框架。将框架链接到应用程序二进制文件，就像我们在本章中对之前的框架所做的操作一样。接下来，打开你想要检测陀螺仪是否存在的头文件。在最后一个`import`语句下，将代码清单\
  \ 2-10 中的代码添加到头文件中。\n\n**代码清单 2-10.** *导入 Core Motion 框架*\n\n```\n#import <CoreMotion/CoreMotion.h>\n\
  ```\n\n接下来，在头文件的`@end`上方添加代码清单 2-11 中的代码，以声明我们新的辅助方法。\n\n**代码清单 2-11.** *声明辅助方法*\n\
  \n```\n- (BOOL) isGyroscopeAvailable;\n```\n\n接下来，我们将构建辅助函数，以便我们可以在`if/else`语句中引用它，就像我们对其他硬件检查所做的那样。将代码清单\
  \ 2-12 中的代码复制到该类的`.m`文件中。\n\n**代码清单 2-12.** *辅助方法检查陀螺仪是否可用*\n\n```\n- (BOOL) isGyroscopeAvailable\n\
  {\n#ifdef __IPHONE_4_0\n    CMMotionManager *motionManager = [[CMMotionManager alloc]\
  \ init];\n    BOOL gyroscopeAvailable = motionManager.gyroAvailable;\n    [motionManager\
  \ release];\n    return gyroscopeAvailable;\n#else\n    return NO;\n#endif\n}\n\
  ```\n\n我们使用`CMMotionManager`类的`gyroAvailable`属性来检查陀螺仪是否存在。请注意，我们将其包裹在对`__IPHONE_4_0`宏的检查中。由于陀螺仪在\
  \ iPhone 4 之前的版本中不可用，因此我们无需检查它。\n\n最后，我们需要在`viewDidLoad`方法中调用这个新方法，并将其与我们的其他验证放在一起。在检查摄像头的代码下方，添加代码清单\
  \ 2-13 中的代码。\n\n**代码清单 2-13.** *调用陀螺仪辅助方法*\n\n```\nif ([self isGyroscopeAvailable])\
  \ {\n        UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"陀螺仪\"\n\
  \                                                        message:@\"陀螺仪可用\"\n  \
  \                                                     delegate:self\n          \
  \                                    cancelButtonTitle:@\"确定\"\n               \
  \                               otherButtonTitles:nil, nil];\n        [alert show];\n\
  \        [alert release];\n    } else {\n        UIAlertView *alert = [[UIAlertView\
  \ alloc] initWithTitle:@\"陀螺仪\"\n                                              \
  \          message:@\"陀螺仪不可用\"\n                                               \
  \        delegate:self\n                                              cancelButtonTitle:@\"\
  确定\"\n                                              otherButtonTitles:nil, nil];\n\
  \        [alert show];\n        [alert release];\n    }\n```\n\n你可能已经猜到了，模拟器上并不提供陀螺仪。所以，如果你想测试它，需要将应用程序部署到你的设备上。\n\
  \n### 强制执行硬件要求\n\n在你的应用中，在使用所需硬件之前检查其是否存在始终很重要，但如果你的应用不满足硬件要求，你也可以阻止它启动。配置应用的`Info.plist`文件即可实现这一点。`Info.plist`文件是所有\
  \ iOS 模板的标准组件。Xcode 4.2 模板会在项目中的`Supporting Files`目录下生成此文件。它将命名为`ProjectName-Info.plist`，其中`ProjectName`是你的\
  \ Xcode 项目名称。\n\n要为应用添加硬件要求，首先需要在`Info.plist`文件中添加另一个键。如果在 Xcode 中打开了该文件，你可以从右键上下文菜单中选择**添加行**。Xcode\
  \ 4.2 使用描述来选择新键，因此请查找**所需设备功能**。此键是一个值的数组，对应于 iOS 设备的各种硬件组件。例如，你可以添加`telephony`键来要求电话应用程序，或者添加`front-facing-camera`来要求设备具有前置摄像头。\n\
  \n使用硬件要求需要谨慎，并且在提交到 App Store 时会产生一些影响。你需要确保要求所有将要使用的组件，但不要限制你的设备选项。在 GitHub 上的示例项目中（参见本章开头的注释），我为`wifi`和`still-camera`添加了硬件要求，这样你就有了一个可运行的示例。\n\
  \n表 2-2 列出了`UIRequiredDeviceCapabilities`键（例如**所需设备功能**）可用的其他各种键。\n\n![图片](img/t0202.jpg)\n\
  \n![图片](img/t0202a.jpg)\n\n### 本章小结\n\n在本章中，我们回顾了增强现实应用程序中常用的硬件组件。我们还逐步介绍了在设备上检测这些硬件的必要步骤，甚至在先决条件不满足时限制应用程序启动的方法。在接下来的几章中，我们将深入探讨如何使用这些组件中的每一个，并从硬件获取信息。所有这些都将为我们编写一个功能齐全的增强现实应用程序奠定基础。\n\
  \n在下一章中，我们将从 iOS 中可用的视图和布局开始，以及我们将在示例应用程序中使用的那些视图和布局。\n\n## 第 3 章\n\n## 使用定位服务\n\
  \n尽管本书主要讨论增强现实，但地图和定位服务的编程构成了成功 AR 应用所需的许多基础方面。在本章中，我们将探讨 iOS 的地图功能以及一些将定位服务集成到\
  \ AR 应用中的高级技术。\n\n如果你过于兴奋地直接跳到本章而跳过了第 2 章，我建议你返回去快速浏览一下“检测定位功能”这一节。其中涵盖了如何确保定位服务可用，以及如何防止你的应用尝试访问用户可能已禁用的服务。如果你准备好深入学习了，那就让我们开始吧。\n\
  \n\n\n### 您现在的位置\n\n我们先从一个示例开始。首先，打开 Xcode 并创建一个新项目。选择 `Tab Bar Application` 作为模板，并将项目命名为\
  \ `iOS_AR_Ch3_LocationServices`。确保设备系列设置为 `iPhone`。本章介绍的所有内容都可以轻松复用到你的 iPad 应用中。因此，为简单起见，本章仅使用\
  \ iPhone 进行演示。\n\n此步骤为可选项。我为这个 Xcode 项目创建了一个本地 Git 仓库。在终端中，我导航到新项目的目录，并运行了清单 3–1\
  \ 中所示的命令。本章的完成项目可在 `github.com/kyleroche` 获取。\n\n**清单 3–1.** *将本地仓库连接到 GitHub*\n\
  \n```\nKyle-Roches-MacBook-Pro-2:iOS_AR_Ch3_LocationServices kyleroche$ git remote\
  \ add origin git@github.com:kyleroche/iOS_AR_Ch3_LocationServices.git\nKyle-Roches-MacBook-Pro-2:iOS_AR_Ch3_LocationServices\
  \ kyleroche$ git push -u origin master\nCounting objects: 19, done.\nDelta compression\
  \ using up to 8 threads.\nCompressing objects: 100% (17/17), done.\nWriting objects:\
  \ 100% (19/19), 10.78 KiB, done.\nTotal 19 (delta 5), reused 0 (delta 0)\nTo git@github.com:kyleroche/iOS_AR_Ch3_LocationServices.git\n\
  \ * [new branch]      master -> master\nBranch master set up to track remote branch\
  \ master from origin.\n```\n\n我们选择了标签栏应用，这样我们可以继续构建本章中的概念，而不会在后续过程中过度覆盖它们。首先，在 Xcode\
  \ 中打开 `FirstViewController.h` 文件。我们将声明构建此演示所需的一些插座变量。在 Xcode 中打开 `FirstViewController.h`\
  \ 文件，并在 `@interface` 代码块中添加清单 3–2 中的代码。\n\n**清单 3–2.** *在接口中声明 UITextView*\n\n```\n\
  UITextView *locationTextView;\n```\n\n现在，在头文件的 `@end` 之前，添加清单 3–3 中的代码。\n\n**清单\
  \ 3–3.** *将属性添加到类中*\n\n```\n@property (nonatomic, retain) IBOutletUITextView *locationTextView;\n\
  ```\n\n我们将使用这个 `UITextView` 插座变量来打印将要审查的位置服务信息。在使用此插座变量之前，我们必须在 `.m` 文件中对其进行 `synthesize`（合成）和释放。切换到\
  \ Xcode 中的 `FirstViewController.m`，并添加清单 3–4 中加粗的行。\n\n**清单 3–4.** *合成并释放 UILabel*\n\
  \n````\n#import \"FirstViewController.h\"\n\n@implementation FirstViewController\n\
  @synthesize locationTextView; // 合成 *locationTextView\n\n/*\n// Implement viewDidLoad\
  \ to do additional setup after loading the view, typically from a nib.\n- (void)viewDidLoad\n\
  {\n\n    [superviewDidLoad];\n}\n*/\n\n- (BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
  {\n    // Return YES for supported orientations\n    return (interfaceOrientation\
  \ == UIInterfaceOrientationPortrait);\n}\n\n- (void)didReceiveMemoryWarning\n{\n\
  \    // Releases the view if it doesn't have a superview.\n    [super didReceiveMemoryWarning];\n\
  \n    // Release any cached data, images, etc. that aren't in use.\n}\n\n- (void)viewDidUnload\n\
  {\n    [super viewDidUnload];\n\n    // Release any retained subviews of the main\
  \ view.\n    // e.g. self.myOutlet = nil;\n}\n\n- (void)dealloc\n{\n    [locationTextView\
  \ release];  // 释放 UITextView\n    locationTextView = nil; // 释放后设置为 nil 是良好实践\n\
  \    [superdealloc];\n}\n@end\n````\n\n你可能注意到我释放了变量，然后又将其设置为 `nil`。在大多数情况下，这是内存管理的好习惯。本书不侧重于这些主题，但我们会在适当的时候指出一些与增强现实和内存管理相关的细节。增强现实应用在类中使用了大量代理，而内存管理是正确构建\
  \ AR 应用结构的一个重要方面。\n\n既然我们已经定义了一个可用于文本更新的 `UITextView`，接下来我们在 XIB 文件中创建该组件。在 Xcode\
  \ 的 `Project Navigator` 中点击 `FirstView.xib` 以打开设计视图。你应该能看到类似于图 3–1 所示的内容。\n\n![Image](img/0301.jpg)\n\
  \n**图 3–1.** *在设计视图中打开 FirstView.xib。*\n\n你会注意到布局中已经有一些组件了。这就是我们选择添加 `UITextView`\
  \ 的原因。我们将直接使用已存在的某个组件。在设计窗口的左侧，有一个半透明立方体的图标。按住 Ctrl 键，从该图标点击并拖动到 iPhone 屏幕上的 `UITextView`\
  \ 插座变量上。请参考图 3–2。\n\n![Image](img/0302.jpg)\n\n**图 3–2.** *按住 Ctrl 键并从 File's Owner\
  \ 图标拖动到 UITextView。*\n\n当你在 `UITextView` 上释放鼠标按钮时，会弹出一个上下文菜单。你会看到有两个插座变量可供选择。它们是：\n\
  \n- `locationTextView`（我们刚刚创建的）\n- `View`\n\n从列表中选择 `locationTextView`。现在，我们已经将\
  \ UI 组件连接到了 `ViewController` 类中的 `IBOutlet`。返回 Xcode 中的 `FirstViewController.m`\
  \ 文件，并取消注释 `viewDidLoad` 方法。我们将向此方法添加一些代码，以启动位置服务，并用最新的位置信息更新我们的 `UITextView` 元素。\n\
  \n\n\n### 标准定位服务\n\n我们可以启动两种服务来监听位置变化。首先来看标准定位服务。这是获取用户当前位置的较常见方式，因为它适用于所有 iOS 设备。标准定位服务可以配置为指定位置数据所需的精确度，以及报告新位置前必须移动的距离。该服务启动后，会确定开启哪些无线电模块，随后开始向指定的服务代理报告位置。\n\
  \n在启动标准定位服务之前，我们需要将 Core Location 框架添加到项目中。如果你没有跳过第 2 章，可能会觉得这一步多余。在 Xcode 中，点击**项目导航器**中的项目名称，然后转到**构建阶段**标签页。展开**链接二进制文件与库**部分，将\
  \ Core Location 框架添加到项目中。请参考图 3–3。\n\n![图片](img/0303.jpg)\n\n**图 3–3.** *将 Core\
  \ Location 框架添加到项目中。*\n\n返回到 `FirstViewController.h` 文件。将 Core Location 框架导入头文件，并声明该类遵循\
  \ `CLLocationManagerDelegate` 协议。你的头文件现在应如代码清单 3–5 所示。\n\n**代码清单 3–5.** *FirstViewController\
  \ 的新头文件*\n\n```objc\n#import <UIKit/UIKit.h>\n#import <CoreLocation/CoreLocation.h>\n\
  \n@interface FirstViewController : UIViewController <CLLocationManagerDelegate>\
  \ {\n    UITextView *locationTextView;\n}\n\n@property (nonatomic, retain) IBOutlet\
  \ UITextView *locationTextView;\n@end\n```\n\n`CLLocationManagerDelegate` 协议将信息发送给其代理的\
  \ `locationManager:didUpdateToLocation:fromLocation:` 方法。如果调用此方法时出现错误，代理将调用 `locationManager:didFailWithError:`\
  \ 方法。切换回 `FirstViewController.m` 文件。将代码清单 3–6 所示的方法添加到你的类中。\n\n**代码清单 3–6.** *`CLLocationManagerDelegate`\
  \ 的代理方法*\n\n```objc\n- (void)locationManager:(CLLocationManager *)manager didUpdateToLocation:(CLLocation\
  \ *)newLocation\n         fromLocation:(CLLocation *)oldLocation\n{\n      locationTextView.text\
  \ = [NSString stringWithFormat:@\"latitude %+.6f, longitude %+.6f\\n\",\n      \
  \      newLocation.coordinate.latitude,\n            newLocation.coordinate.longitude];\n\
  }\n```\n\n这个方法做的事情并不多。基本上，我们将 `UITextView` 的文本设置为包含新经纬度坐标的字符串。名为 `newLocation` 的\
  \ `CLLocation` 引用将这些坐标传递给我们。我们使用其 `coordinate` 属性来查找新位置的纬度和经度。\n\nApple 建议我们检查新位置的时间戳，因为标准定位服务有时向代理方法传递数据会有延迟。在我们的演示中，这并非必需；不过，作为参考，你可以扩展我们的方法，先检查位置更新事件的时间，如代码清单\
  \ 3–7 所示。\n\n**代码清单 3–7.** *首先检查位置更新的时间（代码清单 3–5 的变体）*\n\n```objc\n- (void)locationManager:(CLLocationManager\
  \ *)manager\n    didUpdateToLocation:(CLLocation *)newLocation\n           fromLocation:(CLLocation\
  \ *)oldLocation\n{\n    NSDate* eventDate = newLocation.timestamp;\n    NSTimeInterval\
  \ howRecent = [eventDate timeIntervalSinceNow];\n    if (abs(howRecent) < 15.0)\n\
  \    {\n        locationTextView.text = [NSString stringWithFormat:@\"latitude %+.6f,\
  \ longitude %+.6f\\n\",\n               newLocation.coordinate.latitude,\n     \
  \          newLocation.coordinate.longitude];\n    } else {\n         locationTextView.text\
  \ = @\"Update was old\";\n        // 你很可能在此处什么都不做，忽略该事件\n    }\n}\n```\n\n现在我们的监听器已就位，可以接收位置更新了。让我们继续启动服务。切换到头文件（`FirstViewController.h`），在\
  \ `@end` 之前添加代码清单 3–8 中的代码。\n\n**代码清单 3–8.** *声明启动定位服务的方法*\n\n```objc\n- (void)startStandardUpdates;\n\
  ```\n\n现在切换回 `.m` 文件，添加代码清单 3–9 中的方法。\n\n**代码清单 3–9.** *`startStandardUpdates` 方法*\n\
  \n```objc\n- (void)startStandardUpdates\n{\n    CLLocationManager *locationManager\
  \ = [[CLLocationManager alloc] init];\n    locationManager.delegate = self;\n  \
  \  locationManager.desiredAccuracy = kCLLocationAccuracyKilometer;\n    locationManager.distanceFilter\
  \ = 500;\n\n    [locationManager startUpdatingLocation];\n}\n```\n\n这个方法有几个重要方面。首先，在声明\
  \ `CLLocationManager` 对象后，我们将代理设置为 `self`。如果我们之前在代码清单 3–5 中没有声明该类为 `CLLocationManagerDelegate`，这会产生一个警告。接下来，我们设置一些配置选项，以便标准定位服务知道我们何时想要接收更新。我们将期望精度设置为千米级别，并告诉位置管理器在检测到超过\
  \ 500 千米的变化时才更新代理。\n\n最后，从代码清单 3–10 中添加以粗体标记的代码，在 `viewDidLoad:` 方法中，在 `[super viewDidLoad];`\
  \ 之前启动服务。\n\n**代码清单 3–10.** *新的 `viewDidLoad` 方法*\n\n```objc\n- (void)viewDidLoad\n\
  {\n    [self startStandardUpdates];\n    [super viewDidLoad];\n}\n```\n\n现在我们可以测试演示程序了。在\
  \ Xcode 左上角有一个名为 `Scheme` 的下拉菜单。确保你选择了 iPhone 4.3 模拟器，然后点击最左侧的 `Run` 按钮。模拟器将启动，并自动打开我们的演示应用程序。\n\
  \n你应该会立刻看到一个如图 3–4 所示的模态对话框，请求允许检查你的位置。\n\n![图片](img/0304.jpg)\n\n**图 3–4.** *允许你的应用程序使用定位服务来确定你的位置。*\n\
  \n如果你不希望此对话框再次出现，请选择“不再询问”。无论如何，请确保点击**确定**，否则演示程序将无法正常运行。图 3–5 展示了运行中的应用程序。你可以看到\
  \ `UITextView` 现在已填充了我们构建的包含经纬度的字符串。\n\n![图片](img/0305.jpg)\n\n**图 3–5.** *在 iPhone\
  \ 模拟器上运行演示程序。*\n\n\n\n### 重大位置变化（Significant-Change Location）服务\n\n到目前为止一直在使用的“标准位置服务”是获取设备位置最常见的方式。然而，在\
  \ iOS 4.0 之后，如果你愿意牺牲精度以换取省电，可以使用“重大位置变化服务”。对于大多数应用而言，重大位置变化服务的精度已经足够。该服务使用设备的蜂窝无线电（而非\
  \ GPS 无线电）来确定位置，这使得设备能够更激进地管理功耗。重大位置变化服务还能够唤醒已挂起的应用，以便传送新的坐标。\n\n一旦你确定了最适合应用需求的位置服务，编码上的差异就相当小了。将代码清单\
  \ 3–11 中的方法添加到 `FirstViewController.m` 中，以启动重大位置变化服务。\n\n**代码清单 3–11.** 启动重大位置变化服务\n\
  \n```\n- (void)startSignificantChangeUpdates\n{\n    CLLocationManager *locationManager\
  \ = [[CLLocationManager alloc] init];\n    locationManager.delegate = self;\n  \
  \  [locationManager startMonitoringSignificantLocationChanges];\n}\n```\n\n因为我们指定了该类作为\
  \ `CLLocationManagerDelegate`，并且将 `CLLocationManager` 的 `delegate` 属性设置为 `self`，运行此方法（而非我们在代码清单\
  \ 3–9 中添加的方法）在模拟器中应该会产生相同的屏幕（至少我们是这么认为的）。将代码清单 3–12 中的代码添加到头文件中，并按照代码清单 3–13 所示修改\
  \ `viewDidLoad` 方法。\n\n**代码清单 3–12.** 在 `FirstViewController.h` 中声明新方法\n\n```\n\
  - (void)startSignificantChangeUpdates;\n```\n\n**代码清单 3–13.** 新的 `viewDidLoad` 方法调用重大位置变化服务\n\
  \n```\n- (void)viewDidLoad\n{\n    // [self startStandardUpdates];\n    [self startSignificantChangeUpdates];\n\
  \    [super viewDidLoad];\n}\n```\n\n如果你启动模拟器并运行新版本，你会发现有些不同。具体来说，什么都不会发生。`UITextView`\
  \ 从未更新。如果你将此应用部署到物理设备上，结果将会随着你的位置变化而改变。暂时不必为此担心。在下一节“地理区域监控”中，我将介绍一种在模拟器中测试位置的新方法。\n\
  \n### 地理区域监控（Geographic Region Monitoring）服务\n\n在某些情况下，监控精确位置并不能完全解决问题。相反，我们只想了解是否（或何时）靠近某个特定的坐标。iOS\
  \ 提供了一套用于区域监控服务的特性。在大多数方面，它的工作方式与其他位置服务类似。它提供了一些需要处理的关键委托方法，以便对区域变化做出恰当的响应。我们将使用\
  \ `didEnterRegion:` 和 `didExitRegion:` 这两个委托方法来演示其功能。\n\n本示例中的代码在物理设备上可以正常工作。但是，为了在模拟器上演示，我将展示如何在运行\
  \ Xcode 4.2 测试版的 iOS 5 模拟器上进行操作。Xcode 4.2 引入了一种在调试器中模拟位置变化的方法，这将很好地演示我们的功能。首先，将代码清单\
  \ 3–14 中的方法添加到 `FirstViewController.m` 中。\n\n**代码清单 3–14.** 在 `FirstViewController.m`\
  \ 中添加新方法\n\n```\n- (void)startRegionMonitoring\n{\n    NSLog(@\"Starting region\
  \ monitoring\");\n    CLLocationManager *locationManager = [[CLLocationManager alloc]\
  \ init];\n    locationManager.delegate = self;\n\n    CLLocationCoordinate2D coord\
  \ = CLLocationCoordinate2DMake(37.787359, -122.408227);\n    CLRegion *region =\
  \ [[CLRegion alloc] initCircularRegionWithCenter:coord\n                    radius:1000.0\
  \ identifier:@\"San Francisco\"];\n\n    [locationManager startMonitoringForRegion:region\n\
  \            desiredAccuracy:kCLLocationAccuracyKilometer];\n}\n```\n\n这段代码与我们之前跟踪位置的其他方法看起来非常相似，除了最后一行启动了区域监控服务之外。我们使用旧金山的\
  \ GPS 坐标创建了一个 `CLLocationCoordinate2D`。我选择旧金山的原因是，它是 Xcode 4.2 测试版中预加载的 GPS 坐标之一，如图\
  \ 3–6 所示。\n\n不要忘记在头文件中声明你的新方法。将代码清单 3–15 中的代码添加到 `FirstViewController.h` 中，紧贴 `@end`\
  \ 的上方。\n\n**代码清单 3–15.** 在 `FirstViewController.h` 中声明新方法\n\n```\n- (void)startRegionMonitoring;\n\
  ```\n\n![Image](img/0306.jpg)\n\n**图 3–6.** 在 Xcode 4.2 测试版中选择预加载的 GPS 坐标。\n\n既然区域监控服务已经启动，我们需要处理当用户进入或离开我们正在监控的区域时所调用的委托方法。将代码清单\
  \ 3–16 中的方法添加到 `FirstViewController.m` 中。\n\n**代码清单 3–16.** 在 `FirstViewController.m`\
  \ 中声明新方法\n\n```\n- (void)locationManager:(CLLocationManager *)manager didEnterRegion:(CLRegion\
  \ *)region {\n    UIAlertView *alert = [[UIAlertView alloc] initWithTitle:@\"Region\
  \ Alert\"\n                                                    message:@\"You entered\
  \ the region\"\n                                                   delegate:self\n\
  \                                          cancelButtonTitle:@\"OK\"\n         \
  \                                 otherButtonTitles:nil, nil];\n    [alert show];\n\
  \    [alert release];\n}\n\n- (void)locationManager:(CLLocationManager *)manager\
  \ didExitRegion:(CLRegion *)region {\n    UIAlertView *alert = [[UIAlertView alloc]\
  \ initWithTitle:@\"Region Alert\"\n                                            \
  \        message:@\"You exited the region\"\n                                  \
  \                 delegate:self\n                                          cancelButtonTitle:@\"\
  OK\"\n                                          otherButtonTitles:nil, nil];\n \
  \   [alert show];\n    [alert release];\n}\n```\n\n\n\n测试区域监控服务的最后一步是调用我们刚刚创建的 `startRegionMonitoring`\
  \ 方法。在第 2 章中，我们讨论了如何在使用现有服务和支持的硬件之前对其进行检查。在本场景中，我们也应执行同样的操作。`CLLocationManager`\
  \ 提供了一种方法来检查区域监控服务是否可用以及该服务是否实际启用。请更新您的 `viewDidLoad:` 方法，如代码清单 3-17 所示。\n\n**代码清单\
  \ 3-17.** *新的 viewDidLoad 方法*\n\n```\n- (void)viewDidLoad\n{\n    [self startStandardUpdates];\n\
  \    //[self startSignificantChangeUpdates];\n\n    if ([CLLocationManager regionMonitoringAvailable])\
  \ { // 检查服务是否可用\n        [self startRegionMonitoring];\n    }  // 否则执行其他操作\n   \
  \ [super viewDidLoad];\n}\n```\n\n我们的新方法启动了标准定位服务和区域监控服务。当您在新的 Xcode 4.2 调试器中运行此代码时，将看到一个略有不同的权限对话框，询问是否允许使用您设备的位置信息。这是\
  \ iOS 5 模拟器的另一项更新。您可以在图 3-7 中看到新权限对话框的示例。\n\n![Image](img/0307.jpg)\n\n**图 3-7.**\
  \ *来自新的 iOS5 授权对话框的权限允许。*\n\n在对话框中点击**确定**以加载视图并启动我们的服务。\n\nXcode 4.2 的另一个新功能是在应用程序运行时能够更改模拟器的位置。在\
  \ Xcode 的`控制台`窗口中，您将看到一个用于选择位置的新下拉菜单，如图 3-8 所示。\n\n![Image](img/0308.jpg)\n\n**图\
  \ 3-8.** *在调试器中使用新的 Xcode 4.2 beta 位置模拟器。*\n\n当我们初始化区域监控服务时，我们围绕旧金山的一个坐标启动了该服务。因此，为了测试我们的代码，我们需要进入并离开该区域。如果您已安装\
  \ Xcode 4.2，请使用调试器中的下拉菜单选择 `San Francisco, CA, USA` 作为您的位置。模拟器会在后台更改其坐标；标准定位服务会检测到此更改并将其报告给我们的委托方法。此外，由于我们已进入定义的区域，因此\
  \ `didEnterRegion:` 方法也会被触发。您将看到类似于图 3-9 所示的内容。\n\n![Image](img/0309.jpg)\n\n**图\
  \ 3-9.** *didEnterRegion: 方法被触发。*\n\n我们也可以使用调试器来测试 `didExitRegion:` 方法。将您的位置更改为除\
  \ `San Francisco, CA, USA` 以外的任何地方，您将触发另一个委托方法，如图 3-10 所示。\n\n![Image](img/0310.jpg)\n\
  \n**图 3-10.** *didExitRegion: 方法被触发。*\n\n到目前为止，我们已经了解了用于监控设备位置的不同定位服务，并为设备进入或离开地理区域时设置了一些警报选项。在增强现实应用程序中可视化感兴趣的点还要求我们知道从设备到某些感兴趣的点之间的距离。为此，让我们快速修改一下我们在本章前面定义的\
  \ `didUpdateToLocation:` 方法。请按代码清单 3-18 所示更新该方法。\n\n**代码清单 3-18.** *新的 didUpdateToLocation\
  \ 方法*\n\n```\n- (void)locationManager:(CLLocationManager *)manager\n    didUpdateToLocation:(CLLocation\
  \ *)newLocation\n           fromLocation:(CLLocation *)oldLocation\n{\n    NSDate*\
  \ eventDate = newLocation.timestamp;\n    NSTimeInterval howRecent = [eventDate\
  \ timeIntervalSinceNow];\n    if (abs(howRecent) < 15.0)\n    {\n        //locationTextView.text\
  \ = [NSString stringWithFormat:@\"latitude %+.6f, longitude %+.6f\\n\",\n      \
  \  //                       newLocation.coordinate.latitude,\n        //       \
  \                newLocation.coordinate.longitude];\n\n        CLLocationDistance\
  \ dist = [newLocation distanceFromLocation:oldLocation] / 1000;\n        locationTextView.text\
  \ = [NSString stringWithFormat:@\"distance %5.1f traveled\"];\n    } else {\n  \
  \      locationTextView.text = @\"Update was old\";\n        // 这里你可能只是什么都不做，忽略该事件\n\
  \    }\n}\n```\n\n在 Xcode 4 的模拟器中，您将得到类似于图 3-11 所示的结果。如果您在模拟器上使用 Xcode 4.2 beta\
  \ 和 iOS 5，可以强制生成一些有趣的数值。测试此功能的另一种方法是传入一个新的 `CLLocation` 坐标来替代 `oldLocation`。\n\n\
  ![Image](img/0311.jpg)\n\n**图 3-11.** *检查更新之间的距离。*\n\n### 海拔高度\n\n在增强现实中，检查海拔高度有助于确保摄像头的角度适合您呈现给用户的视图。获取设备的海拔高度起始于与获取位置相同的过程。苹果建议我们先检查海拔高度读数的可用性，然后再尝试从\
  \ GPS 或蜂窝无线电中获取它。目前，要确定设备是否能够提供海拔高度，请使用代码清单 3-19 中的代码。\n\n**代码清单 3-19.** *检查海拔高度是否可用*\n\
  \n```\nIf (signbit(newLocation.verticalAccuracy)) {\n        // 获取海拔高度\n}\n```\n\
  \n海拔高度读数存在几个陷阱。首先，较旧的 iPhone（初代和 iPhone 3Gs）的精度要差得多。在一些参考资料中，指出它们的误差几乎是 iPhone 4\
  \ 的十倍。其次，正如我们在本章前面的定位服务示例中所看到的，Core Location 仅在设备移动一定距离（非竖直方向）时才会更新。因此，我们需要要么强制\
  \ GPS 重置，要么让用户在海拔高度发生变化时自动告知我们。要检查 GPS 读数，请添加代码清单 3-20 中的代码。\n\n**代码清单 3-20.** *检查\
  \ GPS 读数*\n\n```\nlocationTextView.text = [NSString stringWithFormat:@\"%6.2f m.\
  \ \", newLocation.altitude];\n```\n\n通常情况下，即使在新设备上，海拔高度读数也不够精确。还有其他一些方法以及公开可用的 Web\
  \ 服务可以根据 GPS 坐标来确定海拔高度。我们将在后续章节的示例中再次讨论这个主题。在继续学习如何在地图上可视化位置信息之前，让我们回顾一下本章中使用的类。它们最常用的方法和属性列在表\
  \ 3-1 中。\n\n![Image](img/t0301.jpg)\n\n![Image](img/t0301a.jpg)\n\n\n\n### 在地图上查看\n\
  \n我们已经探索了获取用户位置的不同方法。接下来看看如何将这些位置渲染到地图上。在增强现实应用中，通常不需要使用地图。但它能为我们在 AR 应用中所使用的坐标和位置测试提供良好的调试与可视化支持。本章将讲解这部分内容，以便你将其纳入技术工具箱。\n\
  \n首先在演示项目中设置`SecondViewController`类。这是标签视图模板中的第二个标签页。如果你已跟随本章内容进行操作，这个类应该尚未使用。打开`SecondViewController.h`文件，确保为`MKMapView`声明`IBOutlet`，如代码清单\
  \ 3-21 所示。\n\n**代码清单 3-21.** *声明 MKMapViewIBOutlet*\n\n```\n#import <UIKit/UIKit.h>\n\
  #import <MapKit/MapKit.h>\n\n@interface SecondViewController : UIViewController\
  \ <MKMapViewDelegate>{\n    IBOutlet MKMapView *mapView;\n}\n\n@property (nonatomic,\
  \ retain) IBOutlet MKMapView *mapView;\n@end\n```\n\n代码清单 3-21 中加粗显示的代码是我们对默认模板类所做的修改。首先导入`Mapkit.h`头文件，同时将类声明为`MKMapViewDelegate`委托，这样该类就能处理来自`MKMapView`的消息和更新。\n\
  \n接下来打开`SecondViewController.m`文件，合成新的属性。另外，使用完毕后不要忘记释放它。将代码清单 3-22 中的代码添加到`SecondViewController.m`中。\n\
  \n**代码清单 3-22.** *合成与释放 mapView*\n\n```\n@synthesize mapView;\n\n- (void)dealloc\n\
  {\n    [mapView release];\n    mapView = nil;\n    [super dealloc];\n}\n```\n\n\
  在 Xcode 中打开`SecondView.xib`，移除默认存在的`UITextView`和`UITextLabel`。从**对象库**中将**Map View**拖拽到视图上，稍等片刻让其自动缩放以填满可用空间。接着按住\
  \ Ctrl 键，从编辑器左侧的立方体（文件所有者图标）点击并拖拽出一条线连接到新的`MKMapView`上。此时应出现类似图 3-12 所示的上下文菜单。在菜单中选择`mapView`属性。\n\
  \n![图片](img/0312.jpg)\n\n**图 3-12.** *配置我们的 MKMapView。*\n\n#### 居中地图与设置显示区域\n\n\
  回到`SecondView.m`文件，首先取消`viewDidLoad:`方法的注释，并添加代码清单 3-23 中的代码。\n\n**代码清单 3-23.**\
  \ *启动新线程设置地图*\n\n```\n- (void)viewDidLoad\n{\n    mapView.delegate=self;\n    [self.view\
  \ addSubview:mapView];\n\n    [NSThread detachNewThreadSelector:@selector(displayMap)\
  \ toTarget:self withObject:nil];\n    [super viewDidLoad];\n}\n```\n\n首先将`MKMapView`的`delegate`设置为`self`。回想一下，我们此前已将此类声明为`MKMapViewDelegate`。最后，我们并没有直接在`viewDidLoad:`方法中加载地图，而是分离了一个新线程用于设置。虽然这个示例中使用这种方式有些大材小用，但这是了解多线程的好方法，后续在\
  \ AR 示例应用中会用到。该线程调用了一个尚未创建的`displayMap`方法。在`viewDidLoad:`方法下方添加代码清单 3-24 中的代码来创建此方法。\n\
  \n**代码清单 3-24.** *创建新的 displayMap 方法*\n\n```\n- (void)displayMap {\n    NSAutoreleasePool\
  \ *pool = [[NSAutoreleasePool alloc] init];\n\n    CLLocationCoordinate2D coords;\n\
  \    coords.latitude = 37.33188;\n    coords.longitude = -122.029497;\n    MKCoordinateSpan\
  \ span = MKCoordinateSpanMake(0.002389, 0.005681);\n    MKCoordinateRegion region\
  \ = MKCoordinateRegionMake(coords, span);\n    [mapView setRegion:region animated:YES];\n\
  \n    [pool drain];\n}\n```\n\n这个方法中有几个要点需要讨论。首先运行一下看看效果。图 3-13 展示了该应用在 iPhone 模拟器中的运行情况。暂时忽略上面加粗的代码，稍后会再提及。我们手动创建了一个`CLLocationCoordinate2D`结构体，并将经纬度设置为苹果总部的位置。设置好坐标后，创建了一个`MKCoordinateSpan`结构体来设定显示区域中经纬度的跨度。最后，使用新的坐标和创建的跨度设置`MKCoordinateRegion`。\n\
  \n在此示例中，我们使用`MKMapView`的`setRegion`方法来设置地图的默认显示区域。还可以添加其他选项进行更多自定义设置。例如设置`mapType`属性（稍后会介绍），以及使用`zoomEnabled`和`scrollEnabled`方法控制用户能否缩放和滚动地图。\n\
  \n为了实验效果，注释掉加粗的代码并重新运行应用。Xcode 控制台会迅速被警告信息填满，提示没有线程池以及应用`Just Leaking`。由于此方法运行在新线程上，我们需要设置一个新的`NSAutoReleasePool`来处理新线程的内存管理。\n\
  \n![图片](img/0313.jpg)\n\n**图 3-13.** *模拟器在地图上显示苹果总部（无论是否泄漏，显示效果相同）。*\n\n`NSAutoreleasePool`类用于支持引用计数的内存管理系统。iOS\
  \ 模板（我们使用的是标签视图模板）在`Supporting Files`目录下的`main.m`文件中创建了一个自动释放池。这些自动释放池包含已收到 autorelease\
  \ 消息的对象。当释放池时（就像我们在新`viewDidLoad`方法的最后一行所做的那样），`NSAutoReleasePool`会向每个对象发送 release\
  \ 消息。由于我们不再处于主线程，如果不创建这个池，任何自动释放的对象都不会收到 release 消息，从而可能导致内存泄漏，并在控制台中产生警告信息。\n\n\
  \n\n#### 更改地图类型\n\n上一节中提到，可以使用 `mapType` 属性来更改我们正在显示的地图类型。返回 `SecondViewController.h`\
  \ 并声明一个新的 `IBOutlet`，如代码清单 3-25 所示。\n\n**代码清单 3–25.** *声明 UISegmentedControl*\n\n\
  ```\n@interface SecondViewController : UIViewController <MKMapViewDelegate>{\n \
  \   IBOutlet MKMapView *mapView;\n    UISegmentedControl *buttonBarSegmentedControl;\n\
  }\n\n@property (nonatomic, retain) IBOutlet MKMapView *mapView;\n@property (nonatomic,\
  \ retain) IBOutlet UISegmentedControl *buttonBarSegmentedControl;\n```\n\n我们不必手动将其添加到\
  \ XIB 文件中，而是动态创建它。在增强现实应用中，我们也会做类似的事情，以便在用户视图上叠加控件。将代码清单 3-26 中的方法添加到我们之前创建的 `displayMap`\
  \ 方法下方。\n\n**代码清单 3–26.** *创建用于更改地图类型的 UISegmentedControl*\n\n```\n- (void)setupSegmentedControl\
  \ {\n    buttonBarSegmentedControl = [[UISegmentedControl alloc] initWithItems:[NSArray\
  \ arrayWithObjects:@\"Standard\", @\"Satellite\", @\"Hybrid\", nil]];\n\n    [buttonBarSegmentedControl\
  \ setFrame:CGRectMake(30, 50, 280-30, 30)];\n    buttonBarSegmentedControl.selectedSegmentIndex\
  \ = 0.0;        // 初始显示普通选择器\n\n    [buttonBarSegmentedControl addTarget:self action:@selector(toggleToolBarChange:)\n\
  \                        forControlEvents:UIControlEventValueChanged];\n\n    buttonBarSegmentedControl.segmentedControlStyle\
  \ = UIScrollViewIndicatorStyleWhite;\n    buttonBarSegmentedControl.backgroundColor\
  \ = [UIColor clearColor];\n    buttonBarSegmentedControl.tintColor = [UIColor blackColor];\n\
  \    [buttonBarSegmentedControl setAlpha:0.8];\n\n    [self.view addSubview:buttonBarSegmentedControl];\n\
  }\n```\n\n此方法也需要在头文件中声明。确保在运行应用程序之前完成此操作。\n\n此方法首先使用一个包含新项目的数组来初始化 `UISegmentedControl`。我们为菜单选项使用了三个字符串：`Standard`、`Satellite`\
  \ 和 `Hybrid`。它们分别对应 `MKMapView.mapType` 属性的不同选项。\n\n接下来，我们调用 `CGRectMake` 方法来为分段控件在视图中设置区域。分段控件在\
  \ iOS 中的工作原理与按钮类似。我们需要能够添加一个目标并正确响应所引发的事件。代码清单 3-27 中加粗的代码将目标设置为 `self`，并将 `action`\
  \ 设置为一个名为 `toggleToolBarChange` 的新方法。我们接下来将创建这个方法。最后，在 `setupSegmentedControl` 方法中，我们为控件设置了一些基本偏好设置，包括风格、背景颜色和色调。这些显然都是可选的，但我想演示一些可能与本章一直在使用的标签栏模板默认样式相匹配的选项。如果我们不设置这些选项，控件默认会显示为蓝色。\n\
  \n我提到过，我们的操作被设置为一个名为 `toggleToolBarChange` 的新方法。该方法的代码在代码清单 3-27 中。将其添加到类中。\n\n\
  **代码清单 3–27.** *处理 UISegmentedControl 的动作*\n\n```\n- (void)toggleToolBarChange:(id)sender\n\
  {\n    UISegmentedControl *segControl = sender;\n\n    switch (segControl.selectedSegmentIndex)\n\
  \    {\n        case 0:        // 地图模式 (Map)\n        {\n            [mapView setMapType:MKMapTypeStandard];\n\
  \            break;\n        }\n        case 1: // 卫星模式 (Satellite)\n        {\n\
  \            [mapView setMapType:MKMapTypeSatellite];\n            break;\n    \
  \    }\n        case 2: // 混合模式 (Hybrid)\n        {\n            [mapView setMapType:MKMapTypeHybrid];\n\
  \            break;\n        }\n    }\n}\n```\n\n在测试这个新控件之前的最后一步，是在 `viewDidLoad`\
  \ 方法中调用 `setupSegmentedControl` 方法。在您分离新线程来设置地图之后，立即添加代码清单 3-28 中的代码。\n\n**代码清单\
  \ 3–28.** *调用 setupSegmentedControl*\n\n```\n[self setupSegmentedControl];\n```\n\
  \n现在，您已准备好测试新功能。在 iPhone 模拟器中运行我们组合好的代码。切换到第二个标签页，并尝试操作分段控件按钮。图 3-14 显示了模拟器运行地图并选择卫星地图类型时的画面。\n\
  \n![Image](img/0314.jpg)\n\n**图 3-14.** *选择了卫星地图类型。*\n\n至此，我们已向视图添加了地图，学会了如何根据静态位置坐标居中显示地图，并且动态地向视图中添加了一个\
  \ `UISegmentedControl` 来即时切换地图类型。\n\n接下来，让我们看看如何向地图添加标注。标注提供了一种标记特定位置的方法。与它们在谷歌地图或必应地图上的工作方式大致相同，您可以添加弹出式显示来向用户展示更多上下文信息。图标本身以及它们响应的操作都可以进行自定义。\n\
  \n\n\n### 为地图添加标注\n\n要设置标注，我们将使用一个新类来保存标注的自定义属性。在`Project Navigator`中任意位置右键，从上下文菜单中选择`New\
  \ File`。在`Cocoa Touch`类别下，选择`Objective-C class`模板。保持该类为`NSObject`的子类，并将新类命名为`MapAnnotation`。地图上的标注有几个主要特征：标题、副标题和坐标。我们将为这些特征向新类添加属性，并提供一些方法以便从地图类中设置它们。首先，将代码清单\
  \ 3-29 中的声明添加到`MapAnnotation.h`中。\n\n**代码清单 3-29.** *MapAnnotation.h 的修改*\n\n```\n\
  #import <Foundation/Foundation.h>\n#import <MapKit/MapKit.h>\n\n@interface MapAnnotation\
  \ : NSObject<MKAnnotation> {\n    CLLocationCoordinate2D coordinate;\n    NSString\
  \ *subtitletext;\n    NSString *titletext;\n}\n@property (nonatomic, readonly) CLLocationCoordinate2D\
  \ coordinate;\n@property (readwrite, retain) NSString *titletext;\n@property (readwrite,\
  \ retain) NSString *subtitletext;\n-(id)initWithCoordinate:(CLLocationCoordinate2D)\
  \ coordinate;\n- (NSString *)subtitle;\n- (NSString *)title;\n-(void)setTitle:(NSString*)strTitle;\n\
  -(void)setSubTitle:(NSString*)strSubTitle;\n\n@end\n```\n\n同样，我们从导入`MapKit.h`开始。我们声明了初始坐标位置（标注将放置的位置）以及标注标题和副标题的属性。我们还为类添加了一些方法：一个用于坐标的初始化方法，以及一组用于标题和副标题的\
  \ getter 和 setter 方法。\n\n切换到`MapAnnotation.m`，并从代码清单 3-30 中添加对应的属性和方法实现。\n\n**代码清单\
  \ 3-30.** *MapAnnotation.m 的修改*\n\n```\n@implementation MapAnnotation\n@synthesize\
  \ coordinate, titletext, subtitletext;\n\n- (NSString *)subtitle{\n        return\
  \ subtitletext;\n}\n- (NSString *)title{\n        return titletext;\n}\n\n-(void)setTitle:(NSString*)strTitle\
  \ {\n        self.titletext = strTitle;\n}\n\n-(void)setSubTitle:(NSString*)strSubTitle\
  \ {\n        self.subtitletext = strSubTitle;\n}\n\n-(id)initWithCoordinate:(CLLocationCoordinate2D)\
  \ c{\n        coordinate=c;\n        return self;\n}\n@end\n```\n\n这个类并不复杂。它通过基本重构来充当标注属性的占位符。在`SecondViewController.h`中，为`MapAnnotation.h`头文件添加一条`import`语句。然后，打开`SecondViewController.m`，在`displayMap`方法中调用`setRegion`方法的代码之前，添加代码清单\
  \ 3-31 中的代码。请注意来自`MapAnnotation`类的三个方法及其调用方式。\n\n**代码清单 3-31.** *在 displayMap 方法中创建标注*\n\
  \n```\nMapAnnotation *addAnnotation = [[[MapAnnotation alloc] initWithCoordinate:coords]\
  \ retain];\n[addAnnotation setTitle:@\"My Annotation Title\"];\n[addAnnotation setSubTitle:@\"\
  this is my subtitle property\"];\n[mapView addAnnotation:addAnnotation];\n```\n\n\
  首先，创建`MapAnnotation`对象时，我们调用`initWithCoordinate`方法来设置标注的默认位置。接下来的两行调用我们为标题和副标题属性编写的\
  \ getter 方法。最后，我们将标注添加到`MKMapView`中。\n\n现在继续在模拟器中运行。切换到第二个标签页，你会看到地图视图以及在 Apple\
  \ 总部（与我们之前将地图居中显示的坐标相同）上的一个红色标注。如果点击该标注，你会看到类似图 3-15 的内容。\n\n![图片](img/0315.jpg)\n\
  \n**图 3-15.** *默认标注显示了已填充的标题和副标题。*\n\n你会看到标题和副标题都已填充，并且标注显示在正确的坐标上。有许多选项可用于自定义标注。例如，让标注动起来并改变它的颜色怎么样？要自定义标注的外观，我们会使用另一个名为`viewForAnnotation`的委托方法。这个方法在标注创建时被调用，让你有机会通过一个可重用的对象引用来自定义该特定视图。将代码清单\
  \ 3-32 中的方法添加到类中以处理这个委托方法。\n\n**代码清单 3-32.** *处理 viewForAnnotation 委托方法*\n\n```\n\
  - (MKAnnotationView *) mapView:(MKMapView *)mapView viewForAnnotation:(id <MKAnnotation>)\
  \ annotation{\n    MKPinAnnotationView *annView=[[MKPinAnnotationView alloc] initWithAnnotation:annotation\
  \ reuseIdentifier:@\"MyPin\"];\n    annView.animatesDrop=TRUE;\n    annView.canShowCallout\
  \ = YES;\n    [annView setSelected:YES];\n    annView.pinColor = MKPinAnnotationColorPurple;\n\
  \    annView.calloutOffset = CGPointMake(-50, 5);\n    return annView;\n}\n```\n\
  \n我们对标注做了一些修改。如果在模拟器中再次运行，你会看到类似图 3-16 的内容。\n\n![图片](img/0316.jpg)\n\n**图 3-16.**\
  \ *模拟器现在显示了自定义后的标注。*\n\n当模拟器切换到第二个标签页时，你会注意到的第一个变化是标注现在带有动画效果。它会以一种友好的方式掉落到位。我们通过`animatesDrop`属性实现了这一点。现在它也是紫色的。我们使用`pinColor`属性设置了标注的颜色。最后，你会注意到提示框是偏离中心的。我们使用`calloutOffset`属性设置了一个偏移量。当你使用并非像默认大头针那样平衡的自定义标注图片时，这个属性会很有用。\n\
  \n接下来，让我们快速了解一下如何获取特定坐标的更多信息。\n\n\n\n### 反向地理编码\n\n最后，我们来讲反向地理编码。反向地理编码是通过经纬度获取地址或位置信息的过程，而地理编码则是通过地址获取经纬度。iOS\
