  \ 代码清单 13–14 中的代码。\n\n**代码清单 13–14.** *将视图设为透明*\n\n```\n// 将视图设为透明。\n    [CCDirector\
  \ sharedDirector].openGLView.backgroundColor = [UIColor clearColor];\n    [CCDirector\
  \ sharedDirector].openGLView.opaque = NO;\n\n    glClearColor(0.0, 0.0, 0.0, 0.0);\n\
  \n    // 准备覆盖层视图并将其添加到窗口。\n    _cameraView = [[UIView alloc] initWithFrame:[[UIScreen\
