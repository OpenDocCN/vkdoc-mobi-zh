  \    [self presentFramebuffer];\n\n}\n```\n\n第一个方法加载着色器并定义一个清除颜色，供我们在图层中引用。OpenGL\
  \ 渲染初始化完成后，我们就可以绘制 QCAR 帧了。\n\n在此方法中，我们遍历已找到的可追踪物体数组，这与我们在 String SDK 中所做的十分相似，然后在可追踪物体正上方的\
  \ 3D 空间中渲染立方体。你可以将此代码块替换为任何 OpenGL 渲染例程。\n\n\n\n### 重定向 `UIView`\n\n将 `ViewController.m`\
  \ 的文件名改为 `ViewController.mm`。我们之前对 `EAGLView` 类也做过同样的操作。由于我们需要访问 Qualcomm SDK 的\
  \ C++ 函数，因此编译器要求使用此文件名。\n\n打开 `ViewController.mm`，导入 `EAGLView.h` 头文件。更新 `viewDidLoad`\
  \ 方法，如代码清单 9-26 所示。\n\n**代码清单 9–26.** *新的 `viewDidLoad`*\n\n```objectivec\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n\n    EAGLView * eaglview = (EAGLView*) self.view;\n\
  \    [eaglview onCreate];\n    // 加载视图后的其他设置，通常来自 nib 文件\n}\n```\n\n我们创建了一个新的 `EAGLView`\
  \ 实例，并通知该类它已被创建。更新 `viewWillAppear` 和 `viewWillDisappear` 方法，如代码清单 9-27 所示。\n\n\
  **代码清单 9–27.** *新的 `viewWillAppear` 和 `viewWillDisappear`*\n\n```objectivec\n- (void)viewWillAppear:(BOOL)animated\n\
  {\n    [super viewWillAppear:animated];\n    EAGLView * eaglview = (EAGLView*) self.view;\n\
  \    [eaglview onResume];\n}\n\n- (void)viewWillDisappear:(BOOL)animated\n{\n  \
  \  [super viewWillDisappear:animated];\n    EAGLView * eaglview = (EAGLView*) self.view;\n\
  \    [eaglview onPause];\n}\n```\n\n呼！我们成功了。好了，我们还需要做一些额外工作来确保我们的类确实被用到了。打开一个（或两个）故事板，将背景中的\
  \ `UIView` 的类更新为 `EAGLView`，如图 9-14 所示。\n\n![Image](img/0914.jpg)\n\n**图 9–14.**\
  \ *将 `UIView` 的类更新为 `EAGLView`。*\n\n好了，现在你可以运行项目了。别忘了打印标记，或者将其显示在屏幕上。如果你只是从本书的源代码仓库中加载了配置文件，可以在\
  \ Qualcomm 下载目录下的 `/Samples/Dominos/media` 中找到该标记。\n\n应用程序应以单个视图启动，显示一个全屏摄像头。将摄像头对准标记，你将看到类似于图\
  \ 9-15 的画面。\n\n![Image](img/0915.jpg)\n\n**图 9–15.** *演示应用成功了！*\n\n老实说，我运行这个程序时还挺紧张的。在测试之前，从一章中复制了这么多代码。恭喜你！如果你想让这个应用更有趣一些，可以用其他示例应用中的\
  \ OpenGL 渲染方法来替换。如果你想学习更多关于 OpenGL 的知识，可以查阅 Apress 出版社的相关书籍（[`www.apress.com`](http://www.apress.com)）。\n\
  \n### ARKit\n\nARKit 是一个由 Zac White 发起的古老 GitHub 项目。我之所以提到这个项目，是因为我（和其他 100 个人）因它的一些实用功能而\
  \ fork 了该仓库。我在第 11 章的基于位置的 AR 中使用了它的一些片段。如果你打算从头开始构建一些东西，可以浏览 [`www.github.com`](http://www.github.com)\
  \ 上的各种 fork。此外，社会化编程也很有趣。\n\n### 总结\n\n还有很多我没提到的其他 SDK 和工具包。这主要是因为它们的文档已经非常完善了。例如，Metaio\
  \ 在网上已有大量的示例项目和文档。String 于 2011 年夏季发布，但（在撰写本文时）其网站上仍然没有文档。Qualcomm 在 iOS 5 发布前发布了他们的\
  \ SDK。他们在开发者门户网站上提供了一些文档，SDK 中也包含一些很棒的示例，但这只是刚刚开始。\n\n我希望你通过本章了解了一些可用的辅助库，从而缩短你的应用开发时间。在第\
  \ 10 章中，我们将使用 String 构建另一个基于标记的 AR 应用。你将有机会比较两个出色的工具包及其截然不同的实现风格。\n\n## 第 10 章\n\
  \n## 使用 OpenGL ES 构建基于标记的 AR 应用\n\n在第 9 章中，我们了解了一些可用于 iOS 开发者构建增强现实应用的不同 SDK。在本章中，我们将从其中一个\
  \ SDK，即 String SDK for iOS 开始，构建一个基于标记的增强现实应用。\n\n增强现实标记是物理标识符，用于指示应用如何根据物理世界进行定位和缩放。例如，在第\
  \ 1 章中，我展示了一个示例，说明美国邮政服务如何使用标记来定位和缩放运输容器。你也可以在自己的应用中实现同样的功能。\n\n在你的应用中使用标记的优势在于，你可以为物理世界中已存在的事物增加价值。例如，考虑你有一个预算有限的客户，他运营纸质期刊。使用现有的广告或徽标之一，你可以将\
  \ 3D 广告带入现实。除了增加价值之外，这还为客户提供了进一步将其广告客户货币化的机会。\n\n广告是基于标记的增强现实的一个绝佳用例。我们将通过一个真实示例来扩展这个用例。\n\
  \n### 构建标记\n\n标记具有一些特性，以确保使用它们的应用能正确运行。首先，AR 标记应该只有一个正确的方向。你应该能够清楚地分辨标记是倒置的还是侧向的。方形标记效率不高，因为应用将无法确定其正确的方向。其次，AR\
  \ 标记应由高对比度、独特的图像构成。使用黑白，或任何在低光环境下能相互区分的颜色。在大多数情况下，如果你打印标记，应注意眩光和反光表面。\n\n#### 我们的标记\n\
  \n对于这个示例，我已将标记包含在我们的 GitHub 仓库中。本章的所有代码都可以在 [`https://github.com/kyleroche/Professional_iOS_AugmentedReality`](https://github.com/kyleroche/Professional_iOS_AugmentedReality)\
  \ 找到。源代码也可以从 Apress 网站的源代码/下载区域获取，网址是 [`www.apress.com`](http://www.apress.com)。\n\
  \n我们将使用本书的封面作为我们的 AR 标记。假设在印刷过程中图像没有更改，这应该会使测试稍微容易一些，因为你将无需打印任何东西。\n\n为了投影 3D 模型，我们将使用\
  \ OpenGL ES（嵌入式系统 OpenGL）。Xcode 提供了一个现成的 OpenGL 游戏模板。然而，出于教学目的，让我们从头开始构建这个应用。在开始之前，让我们先了解一下\
  \ OpenGL 的基本特性。\n\n#### OpenGL ES\n\nOpenGL ES 是一种底层、轻量级的 API，用于使用定义良好的 OpenGL 子集配置文件进行高级嵌入式图形处理。它在软件应用程序与硬件或软件图形引擎之间提供了一个底层\
  \ API。\n\n作为开发者，使用 OpenGL ES 有很多优势：\n\n*   **行业标准且免版税：** 任何人都可以下载 OpenGL ES 规范，并基于\
  \ OpenGL ES 实现和交付产品。\n*   **占用空间小且功耗低：** 嵌入式空间在处理能力上各不相同。OpenGL ES 通过要求最小的占用空间和最小的数据存储来适应这些差异。\n\
  *   **可扩展且持续演进：** OpenGL 的扩展机制可在 OpenGL ES 中运行，因此你可以随着新硬件配置文件的出现而添加它们。\n*   **易于使用且文档完善：**\
  \ OpenGL 是 OpenGL ES 的基础。网上和出版物中有大量的培训材料。\n\n无论是本书还是本章，都不会让你成为 OpenGL ES 的专家。但是，我们会记录用于构建此应用的功能特性，如果你还想了解有关\
  \ iOS 上 3D 编程的更多信息，我会推荐一些你可以查阅的资料。\n\n\n\n### 创建项目\n\n打开 Xcode 并新建一个项目。使用`Single\
  \ View Application`模板可以获得一些默认的项目设置。请确保选择`Universal`作为`设备系列`。`自动引用计数`选项保持启用即可。\n\n\
  ### 添加 String SDK\n\n将从 String 下载的压缩包解压到本地计算机的某个目录中。从`Libraries`文件夹中，将`libStringOGL*.a`复制到你的\
  \ Xcode 项目中。从`Headers`文件夹中，将`StringOGL.h`和`TrackerOutput.h`复制到你的 Xcode 项目中。这就是使用\
  \ String SDK 所需的全部内容。接下来我们添加项目依赖项，然后会回来介绍如何使用 String SDK。\n\n#### 项目依赖项\n\n我们需要向\
  \ Xcode 项目添加几个框架，以确保 String SDK 拥有所需的资源。在 Xcode 导航器中点击项目名称。切换到`构建阶段`选项卡，并在`与二进制文件链接`部分添加`QuartzCore`、`OpenGLES`、`AVFoundation`、`CoreGraphics`、`CoreMedia`和`CoreVideo`框架。\n\
  \n从`构建阶段`选项卡切换到`构建设置`选项卡。找到名为`其他链接器标志`的配置项。输入`–lstdc++`作为其值。参考图 10–1 查看我们目前完成的设置。\n\
  \n![图片](img/1001.jpg)\n\n**图 10–1.** *我们已正确设置框架和链接器标志。*\n\n##### EAGLView\n\n在之前版本的\
  \ Xcode 中，OpenGL 模板包含`EAGLView`模板。Xcode 4.2 与 iOS 5 一起引入了一个新的 OpenGL 游戏模板，并移除了之前的\
  \ OpenGL 应用程序模板。这个新模板不再提供旧版本中使用的`EAGLView`文件。因此，我们需要自己创建这些文件。在 iOS 4.3 模板中，自动引用计数尚不可用。我们也需要将其添加到项目中。\n\
  \n在 Xcode 项目中新建一个 Objective-C 类。将类命名为`EAGLView`。暂时将其设为`NSObject`的子类。稍后我们会修改这一点。\n\
  \n在 Xcode 中打开`EAGLView.h`，移除现有的`import`语句。添加代码清单 10–1 中的新`import`语句。\n\n**代码清单 10–1.**\
  \ *import 语句*\n\n```\n#import <UIKit/UIKit.h>\n#import <OpenGLES/ES1/gl.h>\n#import\
  \ <OpenGLES/ES1/glext.h>\n#import <OpenGLES/ES2/gl.h>\n#import <OpenGLES/ES2/glext.h>\n\
  @class EAGLContext;\n```\n\n接下来，修改接口声明，使`EAGLView`继承自`UIView`而非`NSObject`。我们将声明一些与用于渲染\
  \ 3D 对象的帧缓冲区相关的属性。将`EAGLView.h`类更新为代码清单 10–2 中的代码。\n\n**代码清单 10–2.** *EAGLView 的更新后@interface*\n\
  \n```\n@interface EAGLView : UIView {\n    GLint framebufferWidth;\n    GLint framebufferHeight;\n\
  \n    GLuint defaultFramebuffer, colorRenderbuffer;\n    GLuint depthRenderbuffer;\n\
  }\n\n@property (nonatomic, retain) EAGLContext *context;\n@property (nonatomic,\
  \ readonly) GLuint defaultFramebuffer;\n@property (nonatomic, readonly) GLint framebufferWidth;\n\
  @property (nonatomic, readonly) GLint framebufferHeight;\n\n- (void)setFrameBuffer;\n\
  ```\n\n大部分代码与之前的 iOS 4.3 模板非常接近。为了简洁起见，我们做了一些精简。切换到`EAGLView.m`，并添加代码清单 10–3 中的`import`语句。\n\
  \n**代码清单 10–3.** *导入 QuartzCore 库*\n\n```\n#import <QuartzCore/QuartzCore.h>\n```\n\
  \n接下来，我们需要为类声明几个私有方法。在`import`语句下方、实现块上方，添加代码清单 10–4 中的代码。\n\n**代码清单 10–4.** *私有方法*\n\
  \n```\n@interface EAGLView (PrivateMethods)\n- (void)createFramebuffer;\n- (void)deleteFramebuffer;\n\
  @end\n```\n\n稍后我们会实现这些方法。首先，让我们设置类的基本结构。我们需要合成添加到接口中的属性。在`EAGLView.m`的实现块内，添加代码清单\
  \ 10–5 中的代码。\n\n**代码清单 10–5.** *合成属性*\n\n```\n@synthesize context;\n@synthesize\
  \ framebufferWidth;\n@synthesize framebufferHeight;\n@synthesize defaultFramebuffer;\n\
  ```\n\n`CAEGLLayer`类负责支持 iOS 应用中 OpenGL 内容的绘制。由于我们使用 OpenGL 渲染 3D 对象，因此需要引用`CAEGLLayer`类。在`@synthesize`语句之后，创建代码清单\
  \ 10–6 中的静态方法。\n\n**代码清单 10–6.** *OpenGL 应用所需的 layerClass 方法*\n\n```\n+ (Class)layerClass\
  \ {\n    return [CAEAGLLayer class];\n}\n```\n\n在设置图层的关联视图之前，我们必须更改要使用的渲染属性。`drawableProperties`属性允许你配置渲染表面和内容的颜色格式。我们将在`init`方法中设置此属性的值。将代码清单\
  \ 10–7 中的方法复制到实现中。\n\n**代码清单 10–7.** *initWithCoder 方法*\n\n```\n- (id)initWithCoder:(NSCoder*)coder\n\
  {\n    self = [super initWithCoder:coder];\n        if (self) {\n        CAEAGLLayer\
  \ *eaglLayer = (CAEAGLLayer *)self.layer;\n```\n\n\n```objectivec\neaglLayer.opaque\
  \ = TRUE;\neaglLayer.drawableProperties = [NSDictionary dictionaryWithObjectsAndKeys:\n\
  \                                [NSNumber numberWithBool:FALSE], kEAGLDrawablePropertyRetainedBacking,\n\
  \                                kEAGLColorFormatRGBA8, kEAGLDrawablePropertyColorFormat,\n\
  \                                nil];\n}\n\nreturn self;\n}\n```\n\n加粗的代码是我们为此渲染设置`drawableProperties`的部分。有关\
  \ OpenGL 颜色和格式选项的更多信息，请参考 *Pro OpenGL ES for iOS*（Apress），该书可在 [www.apress.com/mobile/ios/9781430238409](http://www.apress.com/mobile/ios/9781430238409)\
  \ 找到。\n\n由于渲染表面是通过 Core Animation 呈现给用户的，因此你应用的任何效果或动画都会影响将渲染给用户的 3D 内容。苹果文档推荐以下最佳实践：\n\
  \n- 将图层的 `opaque` 属性设置为 `TRUE`。\n- 将图层的 `bounds` 设置为与显示尺寸匹配。\n- 确保图层未变形。\n- 避免在\
  \ `CAEGLLayer` 对象之上绘制其他图层。其他非 OpenGL 内容可能会对性能产生负面影响。\n- 在竖屏显示器上绘制横屏内容时，应自行旋转内容，而不是使用\
  \ `CAEGLLayer` 的 transform 属性。\n\n既然我们已经了解了一些基本原理和最佳实践，让我们来创建 OpenGL 图层。我们在接口文件中声明了几个方法。将代码清单\
  \ 10–8 中的代码添加到实现中。\n\n**代码清单 10–8.** *setContext 方法*\n\n```objectivec\n- (void)setContext:(EAGLContext\
  \ *)newContext\n{\n    if (context != newContext) {\n        [self deleteFramebuffer];\n\
  \n        context = newContext;\n\n        [EAGLContext setCurrentContext:nil];\n\
  \    }\n}\n```\n\n此方法将从父`UIViewController`中的`viewDidLoad`方法调用。在设置帧缓冲区之前，我们将使用它来设置\
  \ OpenGL 上下文。复制代码清单 10–9 中的代码来设置帧缓冲区。\n\n**代码清单 10–9.** *createFrameBuffer 方法*\n\
  \n```objectivec\n- (void)createFramebuffer\n{\n    if (context && !defaultFramebuffer)\
  \ {\n        [EAGLContext setCurrentContext:context];\n\n        // 1\n        if\
  \ ([self respondsToSelector:@selector(setContentScaleFactor:)]) {\n            float\
  \ screenScale = [UIScreen mainScreen].scale;\n\n            self.contentScaleFactor\
  \ = screenScale;\n        }\n\n        // 2\n        glGenFramebuffers(1, &defaultFramebuffer);\n\
  \        glBindFramebuffer(GL_FRAMEBUFFER, defaultFramebuffer);\n\n        // 3\n\
  \        glGenRenderbuffers(1, &colorRenderbuffer);\n        glBindRenderbuffer(GL_RENDERBUFFER,\
  \ colorRenderbuffer);\n        [context renderbufferStorage:GL_RENDERBUFFER fromDrawable:(CAEAGLLayer\
  \ *)self.layer];\n        glGetRenderbufferParameteriv(GL_RENDERBUFFER, GL_RENDERBUFFER_WIDTH,\
  \ &framebufferWidth);\n        glGetRenderbufferParameteriv(GL_RENDERBUFFER, GL_RENDERBUFFER_HEIGHT,\
  \ &framebufferHeight);\n\n        glFramebufferRenderbuffer(GL_FRAMEBUFFER, GL_COLOR_ATTACHMENT0,\
  \ GL_RENDERBUFFER, colorRenderbuffer);\n\n        // 4\n        glGenRenderbuffers(1,\
  \ &depthRenderbuffer);\n        glBindRenderbuffer(GL_RENDERBUFFER, depthRenderbuffer);\n\
  \        glRenderbufferStorage(GL_RENDERBUFFER, GL_DEPTH_COMPONENT16, framebufferWidth,\
  \ framebufferHeight);\n\n        glFramebufferRenderbuffer(GL_FRAMEBUFFER, GL_DEPTH_ATTACHMENT,\
  \ GL_RENDERBUFFER, depthRenderbuffer);\n\n        if (glCheckFramebufferStatus(GL_FRAMEBUFFER)\
  \ != GL_FRAMEBUFFER_COMPLETE)\n            NSLog(@\"无法完成帧缓冲区对象 %x\", glCheckFramebufferStatus(GL_FRAMEBUFFER));\n\
  \    }\n}\n```\n\n这个方法稍微复杂一些。请查看加粗的注释，我们将逐一解析每个部分。标记为“1”的注释用于处理 OpenGL 图层的缩放。我们基本上将其设置为与屏幕缩放比例一致。第“2”部分创建了默认的\
  \ `Framebuffer` 对象。第“3”部分创建了一个颜色缓冲区，并为上下文分配了缓冲区存储空间。最后一部分，第“4”部分，创建了深度缓冲区并将其附加。\n\
  \n对于基于标记的增强现实应用，这段代码大部分是相同的。通常只需替换标记图像以及渲染层中的一些矩阵即可。\n\n我们已经创建了处理帧缓冲区的方法。还需要设置一些方法来清理这些对象。将代码清单\
  \ 10–10 中的代码添加到实现中。\n\n**代码清单 10–10.** *deleteFramebuffer（和 dealloc）方法*\n\n```objectivec\n\
  - (void)deleteFramebuffer\n{\n    if (context) {\n        [EAGLContext setCurrentContext:context];\n\
  \n        if (defaultFramebuffer) {\n            glDeleteFramebuffers(1, &defaultFramebuffer);\n\
  \            defaultFramebuffer = 0;\n        }\n\n        if (colorRenderbuffer)\
  \ {\n            glDeleteRenderbuffers(1, &colorRenderbuffer);\n            colorRenderbuffer\
  \ = 0;\n        }\n    }\n}\n- (void)dealloc\n{\n    [self deleteFramebuffer];\n\
  }\n```\n\n这些包装方法会检查上下文以确定应移除哪种类型的缓冲区，然后移除该特定缓冲区。我们还在`dealloc`中添加了对该方法的调用。最后，我们需要一个将帧缓冲区绑定到视图的方法。复制代码清单\
  \ 10–11 中的代码。\n\n**代码清单 10–11.** *setFramebuffer 方法*\n\n```objectivec\n- (void)setFramebuffer\n\
  {\n    if (context) {\n        [EAGLContext setCurrentContext:context];\n\n    \
  \    if (!defaultFramebuffer)\n            [self createFramebuffer];\n\n       \
  \ glBindFramebuffer(GL_FRAMEBUFFER, defaultFramebuffer);\n\n        glViewport(0,\
  \ 0, framebufferWidth, framebufferHeight);\n    }\n}\n```\n\n此方法的最后两行是唯二需要注意的行。第一行将帧缓冲区绑定到图层。第二行设置图层的定位，从屏幕左上角\
  \ (0,0) 开始，并扩展到已定义帧缓冲区的宽度和高度。\n\n这就是我们需要在 `EAGLView` 类中更改的全部内容。接下来，确保我们的视图使用了这个新类。\n\
  \n对于我们的每个故事板文件，`MainStoryboard_iPhone.storyboard` 和 `MainStoryboard_iPad.storyboard`，我们需要将\
  \ `View` 设置为自定义类 `EAGLView`。具体设置方法请参见图 10–2 的详细说明。\n\n![图片](img/1002.jpg)\n\n**图\
  \ 10–2.** *将视图设置为我们的 EAGLView 类。*\n\n在左侧的导航器中，我选择了故事板。然后展开 `View Controller` 并选择其默认的\
  \ `View`。在右侧的 `Identity Inspector` 选项卡中，我们为此 `View` 选择了新的 `EAGLView` 类。请确保对两个故事板都重复此步骤。\n\
  \n既然我们已经确认视图设置正确，让我们进行必要的更改。\n\n\n#### 创建 AR 视图控制器\n\n在 Xcode 中打开 `ViewController.h`。首先，我们需要导入所需的头文件来设置视图。列表\
  \ 10–12 显示了该类所需的 `import` 语句。\n\n**列表 10–12.** *ViewController 的 import 语句*\n\n\
  ```\n#import \"StringOGL.h\"\n#import <OpenGLES/EAGL.h>\n#import <OpenGLES/ES1/gl.h>\n\
  #import <OpenGLES/ES1/glext.h>\n#import <OpenGLES/ES2/gl.h>\n#import <OpenGLES/ES2/glext.h>\n\
  ```\n\n接下来，我们必须将 `ViewController` 指定为 `StringOGLDelegate` 类。在这样做的同时，让我们也定义实例变量。将列表\
  \ 10–13 的代码复制到接口块中。\n\n**列表 10–13.** *实例变量*\n\n```\n@interface ViewController :\
  \ UIViewController <StringOGLDelegate> {\n    EAGLContext *context;\n    StringOGL\
  \ *stringOGL;\n    float projectionMatrix[16];\n    BOOL animating;\n}\n```\n\n\
  接下来，定义列表 10–14 中所示的方法。\n\n**列表 10–14.** *实例方法*\n\n```\n- (void)startAnimation;\n\
  - (void)stopAnimation;\n```\n\n我将在本章后面实现这些方法时解释它们及其作用。切换到 `ViewController.m`。我们需要添加的第一个方法是为我们的\
  \ 3D 对象创建一个标准投影矩阵。这个方法几乎是可能的最基本的投影矩阵。它稍微模仿了 `glFrustum` 规范。`glFrustum` 描述了一个产生透视投影的透视矩阵。这是通过将当前矩阵乘以\
  \ `glFrustum` 矩阵，然后用结果矩阵替换当前矩阵来完成的。在 `didReceiveMemoryWarning` 方法之前，添加列表 10–15 中的代码。\n\
  \n**列表 10–15.** *创建投影矩阵*\n\n```\n- (void)createProjectionMatrix: (float *)matrix\
  \ verticalFOV: (float)verticalFOV aspectRatio: (float)aspectRatio nearClip: (float)nearClip\
  \ farClip: (float)farClip\n{\n        memset(matrix, 0, sizeof(*matrix) * 16);\n\
  \n        float tan = tanf(verticalFOV * M_PI / 360.f);\n\n        matrix[0] = 1.f\
  \ / (tan * aspectRatio);\n        matrix[5] = 1.f / tan;\n        matrix[10] = (farClip\
  \ + nearClip) / (nearClip - farClip);\n        matrix[11] = -1.f;\n        matrix[14]\
  \ = (2.f * farClip * nearClip) / (nearClip - farClip);\n}\n```\n\n关于此方法的具体细节，我再次推荐您参考\
  \ Apress 出版的 iOS OpenGL 编程书籍 (*Pro OpenGL ES for iOS*)。然而，在阅读此方法时，请记住深度缓冲区精度会受到\
  \ `nearClip` 和 `farClip` 值的影响。随着 `farClip` 与 `nearClip` 的比率增加，深度缓冲区对于视图中彼此接近的表面之间的区分度会降低。`nearClip`\
  \ 永远不能设置为零，因为当 `nearClip` 接近零时，乘数会接近无穷大。\n\n我们在头文件中定义了两个方法，接下来将完成它们。但是，在继续之前，将 `EAGLView`\
  \ 头文件导入到 `ViewController.h` 中。然后，将列表 10–16 中的代码添加到 `ViewController`。\n\n**列表 10–16.**\
  \ *动画开始和停止方法*\n\n```\n- (void)startAnimation\n{\n    if (!animating) {\n       \
  \ [stringOGL resume];\n        animating = TRUE;\n    }\n}\n\n- (void)stopAnimation\n\
  {\n    if (animating) {\n        [stringOGL pause];\n        animating = FALSE;\n\
  \    }\n}\n```\n\n对于实现 `StringOGLDelegate` 协议的类，只有一个必需的方法，那就是渲染方法。此方法处理 String SDK\
  \ 在识别到潜在标记后将要执行的操作。将列表 10–17 中的方法添加到 `ViewController`。\n\n**列表 10–17.** *渲染 3D 对象*\n\
  \n```\n- (void)render\n{\n    [(EAGLView *)self.view setFramebuffer];\n\n    static\
  \ const GLfloat squareVertices[] = {\n        -0.33f, -0.33f,\n        0.33f, -0.33f,\n\
  \        -0.33f,  0.33f,\n        0.33f,  0.33f,\n    };\n\n    static const GLubyte\
  \ squareColors[] = {\n        255, 255,   0, 255,\n        0,   255, 255, 255,\n\
  \        0,     0,   0,   0,\n        255,   0, 255, 255,\n    };\n\n        const\
  \ int maxMarkerCount = 10;\n        struct MarkerInfoMatrixBased markerInfo[10];\n\
  \n        int markerCount = [stringOGL getMarkerInfoMatrixBased: markerInfo maxMarkerCount:\
  \ maxMarkerCount];\n    for (int i = 0; i < markerCount; i++)\n{\n        glMatrixMode(GL_PROJECTION);\n\
  \        glLoadMatrixf(projectionMatrix);\n\n        glMatrixMode(GL_MODELVIEW);\n\
  \        glLoadIdentity();\n        glMultMatrixf(markerInfo[i].transform);\n\n\
  \        glVertexPointer(2, GL_FLOAT, 0, squareVertices);\n        glEnableClientState(GL_VERTEX_ARRAY);\n\
  \        glColorPointer(4, GL_UNSIGNED_BYTE, 0, squareColors);\n        glEnableClientState(GL_COLOR_ARRAY);\n\
  \n        glDrawArrays(GL_TRIANGLE_STRIP, 0, 4);        \n\n    }\n}\n```\n\n这个方法有几个用途。首先，我们设置渲染位置的顶点以及颜色。接下来，我们设置\
  \ String SDK 将识别的标记的数量限制。我们将其设置为 10。我们创建一个 `struct` 来在识别到 `MarkerInfo` 时与其联系，然后我们循环遍历\
  \ `getMarkerInfoMatrixBased` 方法的结果。此方法将使用我们项目中加载的任何图像文件，并尝试在摄像头视图中识别它们。\n\n在循环中，我们有标准的\
  \ OpenGL 代码。此示例打印出一个标准的 OpenGL 立方体，就像我们在 iOS 4.3 模板中看到的那样。在更新我们的 `viewDidLoad` 方法之前，更改类使其仅在竖屏模式下渲染。如列表\
  \ 10–18 所示更新 `shouldAutorotateToInterfaceOrientation` 方法。\n\n**列表 10–18.** *仅允许竖屏方向*\n\
  \n```\nreturn (interfaceOrientation == UIInterfaceOrientationPortrait);\n```\n\n\
  我们快完成了。但是，在测试应用程序之前，我们需要更新 `viewDidLoad` 方法。使用列表 10–19 中的代码更新该方法。\n\n**列表 10–19.**\
  \ *更新后的 viewDidLoad*\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \    animating = NO;\n\n    EAGLContext *aContext = [[EAGLContext alloc] initWithAPI:kEAGLRenderingAPIOpenGLES1];\n\
  \n    if (!aContext)\n        NSLog(@\"Failed to create ES context\");\n    else\
  \ if (![EAGLContext setCurrentContext:aContext])\n        NSLog(@\"Failed to set\
  \ ES context current\");\n\n    context = aContext;\n\n    EAGLView *eaglView =\
  \ (EAGLView *)self.view;\n\n    [(EAGLView *)self.view setContext:context];\n  \
  \  [(EAGLView *)self.view setFrameBuffer];\n\n    int viewport[4] = {0, 0, eaglView.framebufferWidth,\
  \ eaglView.framebufferHeight};\n    viewport[1] = (eaglView.framebufferHeight -\
  \ viewport[3]) / 2;\n\n    glViewport(viewport[0], viewport[1], viewport[2], viewport[3]);\n\
  \n    float aspectRatio = viewport[2] / (float)viewport[3];\n\n    [self createProjectionMatrix:\
  \ projectionMatrix verticalFOV: 47.22f aspectRatio: aspectRatio nearClip: 0.1f farClip:\
  \ 100.f];\n\n// Initialize String\nstringOGL = [[StringOGL alloc] initWithDelegate:\
  \ self context: aContext\nframeBuffer:[eaglView defaultFramebuffer] leftHanded:\
  \ NO];\n\n[stringOGL setProjectionMatrix:projectionMatrix viewport:viewport orientation:[self\
  \ interfaceOrientation] reorientIPhoneSplash:YES];\n\n// Load image markers\n[stringOGL\
  \ loadImageMarker: @\"bookcover\" ofType: @\"png\"];\n\n}\n```\n\n此方法的前半部分使用我们在本章中已创建的方法设置\
  \ OpenGL 上下文。粗体代码行特定于 String SDK。首先，我们使用 `self` 作为 `delegate` 初始化 String，并创建适当的帧缓冲区。接下来，我们设置投影矩阵。最后，我们加载标记。如果您有多个标记，可以在此处全部添加。\n\
  \n\n\n### 最终代码更新\n\n我们的最终代码更新涉及`viewWillAppear`和`viewWillDisappear`方法。按照列表 10–20\
  \ 所示更新它们。\n\n**列表 10–20.** *启动和停止动画*\n\n```objc\n- (void)viewWillAppear:(BOOL)animated\n\
  {\n    [self startAnimation];\n\n    [super viewWillAppear:animated];\n}\n\n- (void)viewWillDisappear:(BOOL)animated\n\
  {\n    [self stopAnimation];\n\n    [super viewWillDisappear:animated];\n}\n```\n\
  \n`String`实际上不会启动，直到第一次调用`resume`方法。如果你还记得，我们在`startAnimation`包装器中引用了这个方法。这就是我们将其放在`viewWillAppear`方法中的原因。\n\
  \n在物理设备上运行项目。因为我们将其构建为通用程序，它应该可以在 iPad 或 iPhone 设备上正常运行。确保将相机对准书籍或屏幕上的图像。你将看到类似于图\
  \ 10–3 的效果。\n\n![Image](img/1003.jpg)\n\n**图 10–3.** *查看我们的 AR 标记应用运行效果。*\n\n###\
  \ 总结\n\n在第 9 章中，我们讨论了市场上可用于构建增强现实应用的开发工具包。在大多数情况下，围绕对象识别重新发明轮子并不是资源的最佳利用方式。这些工具包的价值主张在于处理基础性工作，让你专注于应用中的业务层或功能。\n\
  \n在本章中，我们从单视图应用开始，构建了一个基于标记的增强现实应用，该应用由 String 的 AR SDK 驱动。我们只是浅尝了 OpenGL 和 3D 建模，但学到的知识足以为进一步开发更复杂的应用奠定基础。\n\
  \n在第 11 章中，我们将转向社交媒体，构建一个基于地理坐标渲染社交数据的增强现实应用。\n\n"
