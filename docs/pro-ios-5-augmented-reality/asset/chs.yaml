  \n我们还需要帧缓冲区的拆卸方法。当帧缓冲区不再需要内存时，Listing 9–15 中的方法会释放内存。\n\n**Listing 9–15.** `deleteFrameBuffer`\
  \ 方法\n\n```\n- (void)deleteFramebuffer\n{\n    if (context) {\n        [EAGLContext\
  \ setCurrentContext:context];\n        if (defaultFramebuffer) {\n            glDeleteFramebuffers(1,\
