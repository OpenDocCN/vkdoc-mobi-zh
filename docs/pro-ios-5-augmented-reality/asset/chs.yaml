  \ isStart, BOOL\nisEnd);\nvoid printAllLogs();\n#ifdef USE_TIMESTAMPS\n\n#define\
  \ LogTimestamp LogTimeStampInMethod(__FUNCTION__, __LINE__)\n#define LogTimestampStartChunk\
  \ LogTimestampChunkInMethod(__FUNCTION__, __LINE__, YES,\nNO)\n#define LogTimestampMidChunk\
  \ LogTimestampChunkInMethod(__FUNCTION__, __LINE__, NO, NO)\n#define LogTimestampEndChunk\
  \ LogTimestampChunkInMethod(__FUNCTION__, __LINE__, NO, YES)\n\n#else\n\n#define\
  \ LogTimestamp\n#define LogTimestampStartChunk\n#define LogTimestampMidChunk\n#define\
  \ LogTimestampEndChunk\n\n#endif\n\n#ifndef PrintName\n#define PrintName NSLog(@\"\
  %s\", __FUNCTION__)\n#endif\n```\n\n在 Xcode 中打开`CodeTimestamps.m`，并添加代码清单 12–21\
  \ 中的代码。\n\n**代码清单 12–21.** *CodeTimestamps.m*\n\n```\n#import \"CodeTimestamps.h\"\
  \n\n#import <mach/mach.h>\n#import <mach/mach_time.h>\n\n#define kNumSlowestChunks\
  \ 5\n#define kNumMidPoints 5\n\nstatic NSMutableArray *chunkData = nil;\n\n@class\
  \ ChunkTimeInterval;\n\n@interface LogHelper : NSObject {\n@private\n    NSTimer\
  \ *logTimer;\n    NSMutableArray *pendingLines;\n    NSMutableArray *slowestChunks;\n\
  }\n\n+ (LogHelper *)sharedInstance;\n\n- (void)startLoggingTimer;\n- (void)printOutTimingData:(NSTimer\
  \ *)timer;\n- (void)addLogString:(NSString *)newString;\n\n- (void)maybeAddTimeIntervalAsSlowest:(ChunkTimeInterval\
  \ *)timeInterval;\n- (void)logSlowestChunks;\n\n- (void)consolidateTimeIntervals:(NSMutableArray\
  \ *)timeIntervals;\n\n@end\n\n@interface ChunkStamp : NSObject {\n@public\n    const\
  \ char *fnName;\n    int lineNum;\n    uint64_t timestamp;\n    NSThread *thread;\n\
  \    BOOL isStart;\n    BOOL isEnd;\n}\n\n- (NSComparisonResult)compare:(id)other;\n\
  \n@end\n\nvoid printAllLogs() {\n        [[LogHelper sharedInstance] printOutTimingData:nil];\n\
  }\n\nuint64_t NanosecondsFromTimeInterval(uint64_t timeInterval) {\n    static struct\
  \ mach_timebase_info timebase_info;\n    OneTimeCall(mach_timebase_info(&timebase_info));\n\
  \    timeInterval *= timebase_info.numer;\n    timeInterval /= timebase_info.denom;\n\
  \    return timeInterval;\n}\n```\n\n\n\n```objectivec\n// 此函数需要 _ 快速 _ 执行，以尽量减少对时序数据的干扰。\n\
  // 因此我们实际上不会在函数内部使用 NSLog，而是使用 LogHelper。\nvoid LogTimeStampInMethod(const char\
  \ *fnName, int lineNum) {\n    OneTimeCall([[LogHelper sharedInstance] startLoggingTimer]);\n\
  \    static uint64_t lastTimestamp = 0;\n    uint64_t thisTimestamp = mach_absolute_time();\n\
  \    NSString *logStr = nil;\n    if (lastTimestamp == 0) {\n        logStr = [NSString\
  \ stringWithFormat:@\"* %s:%4d\", fnName, lineNum];\n    } else {\n        uint64_t\
