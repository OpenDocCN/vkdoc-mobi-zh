  ### 本章小结\n\n本章我们深入探讨了定位服务。首先了解了跟踪位置的各种选项，例如标准定位服务、重大变化定位服务、地理区域监控服务以及海拔高度测量。我们还探讨了如何在地图上可视化定位服务，以及如何通过反向地理编码获取上下文信息。本章还包含一些细微的知识点，比如介绍了基础线程（我们将在后续示例中继续扩展），以及动态叠加层（在增强现实章节中，我们将以\
  \ HUD（抬头显示器）的形式更多地使用它）。\n\n我们正在构建全面开发 AR 应用所需的工具。接下来，我们将通过陀螺仪和加速计来探索 iOS 传感器编程。\n\
  \n## 第 4 章：iOS 传感器\n\n增强现实编程需要利用多种硬件组件来构建有效的应用。这些组件通常被称为传感器。陀螺仪和加速计等传感器能帮助我们确定应用运行时设备的朝向和位置变化。由于我们进行\
  \ AR 编程，需要将应用叠加在设备摄像头的实景视图上，因此跟踪朝向以保持应用现实的朝向方式至关重要。\n\n### 朝向传感器\n\n加速计和陀螺仪的用途相似，但两者之间存在细微差别，大多数应用需要结合两者的读数才能达到最佳效果。我们来看看这两个组件的异同。\n\
  \n首先从加速计开始。iPhone 4 中的三轴加速计用于测量设备相对于地球表面的朝向。如果设备处于自由落体状态或在某个方向上有恒定加速度，则加速度返回零（或应该返回零），因为此时无法将其与地球引力提供的加速度区分开。\n\
  \n陀螺仪能够测量绕特定轴的旋转速率。旋转是加速计无法测量的，因此飞行计算机不能仅依赖加速计，还需要陀螺仪来防止飞机翻滚。\n\n区分这两者的一个简单方法是：陀螺仪有助于测量朝向，而加速计测量振动。以此为基础，陀螺仪可以提供角速度（或旋转），而加速计只能测量线性加速度（跨越所有三个轴）。\n\
  \n我们先分别了解每个组件及其使用方法，然后结合两者以获得更好的测量效果。本章我们将再次使用标签栏应用模板，以尽量减少示例应用的数量。在 Xcode 中使用标签栏应用模板创建一个新项目，目标设备选择\
  \ iPhone。将项目命名为 `iOS_AR_Ch4_Sensors`，或者从 `github.com/kyleroche/Professional_iOS_AugmentedReality`\
  \ 或 Apress 网站（[`www.apress.com`](http://www.apress.com)）的源代码/下载区域下载本章的完整代码。\n\n\n\
  \n### 使用加速计\n\n我们先从加速计开始。在 Xcode 中，打开 `FirstViewController.h` 文件并更新它，如代码清单 4-1 所示。\n\
  \n**代码清单 4-1.** *更新后的 FirstViewController.h*\n\n```\n#import <UIKit/UIKit.h>\n\n\
  @interface FirstViewController : UIViewController {\n    UIAccelerometer *accelerometer;\n\
  \n    UILabel *xLabel;\n    UILabel *yLabel;\n    UILabel *zLabel;\n\n    UIProgressView\
  \ *xProgressView;\n    UIProgressView *yProgressView;\n    UIProgressView *zProgressView;\n\
  }\n\n@property (nonatomic, retain) UIAccelerometer *accelerometer;\n\n@property\
  \ (nonatomic, retain) IBOutlet UILabel *xLabel;\n@property (nonatomic, retain) IBOutlet\
  \ UILabel *yLabel;\n@property (nonatomic, retain) IBOutlet UILabel *zLabel;\n\n\
  @property (nonatomic, retain) IBOutlet UIProgressView *xProgressView;\n@property\
  \ (nonatomic, retain) IBOutlet UIProgressView *yProgressView;\n@property (nonatomic,\
  \ retain) IBOutlet UIProgressView *zProgressView;\n\n@end\n```\n\n让我们更新 `FirstViewController.m`\
  \ 文件，然后逐步了解新代码。在 Xcode 中切换到 `FirstViewController.m`，并添加代码清单 4-2 中的代码。\n\n**代码清单\
  \ 4-2.** *更新后的 FirstViewController.m*\n\n```\n// 在 @implementation 之后\n@synthesize\
  \ xLabel, yLabel, zLabel, xProgressView, yProgressView, zProgressView, accelerometer;\n\
  // 替换自动生成代码中的现有 dealloc 方法\n- (void)dealloc\n{\n    [xLabel release];\n    xLabel\
  \ = nil;\n    [yLabel release];\n    yLabel = nil;\n    [zLabel release];\n    zLabel\
  \ = nil;\n    [xProgressView release];\n    xProgressView = nil;\n    [yProgressView\
  \ release];\n    yProgressView = nil;\n    [zProgressView release];\n    zProgressView\
  \ = nil;\n    [accelerometer release];\n    accelerometer = nil;\n    [super dealloc];\n\
  }\n```\n\n从顶部开始，我们声明了一些 UI 元素，用于显示来自加速计的实时读数。我们将使用三个标签和三个进度条，每个对应加速计的一个轴。图 4-1 展示了\
  \ X、Y 和 Z 坐标轴。\n\n![图示](img/0401.jpg)\n\n**图 4-1.** *加速计使用 X、Y 和 Z 坐标轴。*\n\n在 Xcode\
  \ 中打开 `FirstView.xib`。将标签和进度条元素添加到界面画布上。你应该会看到类似图 4-2 所示的内容。\n\n![图示](img/0402.jpg)\n\
  \n**图 4-2.** *为加速计读数设置 XIB 文件。*\n\n为简单起见，我们按水平顺序将这三组值分配给输出口。X 在顶部，Z 在底部。由于 Xcode\
  \ 4.2 对某些人来说还比较新，我们再回顾一下。要将输出口分配给头文件中的属性，请在按住 Ctrl 键的同时，从 **File's Owner** 图标拖拽到画布上的输出口。会弹出一个对话框，显示可分配的属性。选择相应的输出口。图\
  \ 4-3 展示了一个示例。\n\n![图示](img/0403.jpg)\n\n**图 4-3.** *将 IBOutlet 链接到 FirstViewController.h\
  \ 中的属性。*\n\n对每个 `UILabel` 输出口和 `UIProgressView` 组件重复此过程。\n\n我们通过 `UIAccelerometer`\
  \ 类访问加速计。这个类使用了与第 3 章定位服务相同的委托模式。这个类使用一个共享的 `UIAccelerometer` 单例，不能直接访问。因此，你会注意到在这些示例中处理内存的方式略有不同（更具体地说，是我们处理硬件消息订阅的方式）。\n\
  \n### UIAccelerometerDelegate 类\n\n在开始监控加速计的更新之前，我们必须将此类指定为 `UIAccelerometerDelegate`。相应地更新\
  \ `FirstViewController.h`。切换回 `FirstViewController.m`，并添加代码清单 4-3 中的方法。\n\n**代码清单\
  \ 4-3.** *UIAccelerometerDelegate 类的委托方法*\n\n```\n- (void)accelerometer:(UIAccelerometer\
  \ *)accelerometer didAccelerate:(UIAcceleration *)acceleration {\n    xLabel.text\
  \ = [NSString stringWithFormat:@\"%@%f\", @\"X: \", acceleration.x];\n    yLabel.text\
  \ = [NSString stringWithFormat:@\"%@%f\", @\"Y: \", acceleration.y];\n    zLabel.text\
  \ = [NSString stringWithFormat:@\"%@%f\", @\"Z: \", acceleration.z];\n\n    xProgressView.progress\
  \ = ABS(acceleration.x);\n    yProgressView.progress = ABS(acceleration.y);\n  \
  \  zProgressView.progress = ABS(acceleration.z);\n}\n```\n\n每当加速计在其更新间隔内测量到新值时，就会调用委托类的\
  \ `didAccelerate` 方法。我们来看看代码。第一组方法为三个 `UILabel` 的 `text` 属性格式化一个 `NSString` 值。这个字符串值由每个特定轴的加速度值填充。第二段代码根据相同的值设置\
  \ `UIProgressView` 输出口的数值。你会注意到，我们还把值设置成了测量值的绝对值（`ABS`）。这是因为进度条无法显示负值。如果有负的测量值，你会从\
  \ `UILabel` 上看到。\n\n在运行项目之前，我们必须设置加速计的更新间隔并为其指定一个委托。正如我之前提到的，`UIAccelerometer` 类是一个单例类。我们需要创建一个对\
  \ `sharedAccelerometer` 对象的引用来开始接收测量值。取消注释 `viewDidLoad` 方法并进行调整，如代码清单 4-4 所示。\n\
  \n**代码清单 4-4.** *新的 viewDidLoad 方法*\n\n```\n- (void)viewDidLoad\n{\n    accelerometer\
  \ = [UIAccelerometer sharedAccelerometer];\n    accelerometer.updateInterval = .5;\n\
  \    accelerometer.delegate = self;\n\n    [super viewDidLoad];\n}\n```\n\n此方法中的第一行将我们的\
  \ `UIAccelerometer` 对象分配给 `sharedAccelerometer` 对象。接下来，你选择 `updateInterval`，单位是秒。我选择了\
  \ .5 秒（每秒两次）。你可以随意调整并测试响应时间。最后，将 `delegate` 设置为 `self`，这样我们就能接收测量值了。\n\n确保你已连接物理设备，并在\
  \ Xcode 的 Scheme 下拉菜单中选中它。在设备上运行项目。你应该会看到类似图 4-4 所示的内容。\n\n![图示](img/0404.jpg)\n\
  \n**图 4-4.** *获取 UIAccelerometer 的 X、Y 和 Z 测量值。*\n\n在测试应用程序时，尝试几种不同的场景。尝试向下用力甩动设备，观察轴上的快速变化。尝试将设备水平侧放，这会使\
  \ X 轴达到最大值（负值或正值取决于侧放方向）。接下来，将设备竖直放置。此时 Y 轴应达到满量程，而其他读数趋近于零。将设备平放，屏幕朝上。你应该会看到 Z\
  \ 轴接近 1.0，而其他两个轴的测量值趋近于零。熟悉设备的方向。在本书后续内容中，我们需要将这些类型的读数整合到我们的应用程序中。\n\n\n\n### 摇动检测\n\
  \n你也可以使用加速度计来测量用户的动作。App Store 上一些流行的 iOS 应用（如 Facebook）会利用摇动检测实现刷新操作。而其他原生应用（如短信）则将摇动检测作为用户取消操作的一种方式。\n\
  \n返回到 `FirstViewController.m` 的 `didAccelerate` 委托方法中，将代码清单 4-5 中的代码添加至该方法底部。\n\n\
  **代码清单 4-5.** *添加到 `didAccelerate` 委托方法*\n\n```\ndouble const kThreshold = 2.0;\
  \ // 2Gs 是检测摇动的典型阈值\n    if (   ABS(acceleration.x) > kThreshold\n        || ABS(acceleration.y)\
  \ > kThreshold\n        || ABS(acceleration.z) > kThreshold) {\n        // 如果检测到任意轴有摇动\n\
  \        NSLog(@\"检测到摇动！\"); // 记录日志！\n    }\n```\n\n首先，我们定义一个常量作为摇动检测的阈值。如果任一轴测得的震动幅度超过\
  \ 2Gs，该方法将在控制台记录我们设定的消息。在设备上运行更新后的项目，并在应用启动时摇动设备。在 Xcode 控制台中，你应该能看到类似图 4-5 所示的内容。\n\
  \n![图片](img/0405.jpg)\n\n**图 4-5.** *检测用户的摇动操作。*\n\n在第 5 章中，我们将讨论声音和用户反馈，并展示如何使设备振动。本章主要聚焦于收集传感器数据。\n\
  \n### 低通滤波\n\n我们将在示例中使用的一种技术称为低通滤波。基本上，当接收到加速度计数据时，我们会过滤掉除重力读数之外的所有数据。这有助于我们在增强现实视图中保持三维物体的朝向。代码清单\
  \ 4-6 展示了设置低通滤波器的示例代码。\n\n我们将在讨论三维物体和增强现实时更详细地介绍这一主题。\n\n**代码清单 4-6.** *设置低通滤波器*\n\
  \n```\naccel[0] = acceleration.x * kFilteringFactor + accel[0] * (1.0 - kFilteringFactor);\n\
  accel[1] = acceleration.y * kFilteringFactor + accel[1] * (1.0 - kFilteringFactor);\n\
  accel[2] = acceleration.z * kFilteringFactor + accel[2] * (1.0 - kFilteringFactor);\n\
  ```\n\n### 使用陀螺仪\n\n实际上，读取陀螺仪的数据要稍微简单一些。无需设置委托类或委托方法来处理更新。启动陀螺仪后，你可以直接通过 `CMMotionManager`\
  \ 类请求测量数据。该类充当设备硬件的接口网关。\n\n现在，让我们使用演示项目中的第二个标签页来测量陀螺仪。打开 Xcode，选择 `SecondView.xib`，并按图\
  \ 4-6 所示设置画布。我们将根据陀螺仪的三个 `attitude` 属性（即 `roll`、`pitch` 和 `yaw`）进行可视化显示。\n\n![图片](img/0406.jpg)\n\
  \n**图 4-6.** *设置用于监测陀螺仪的画布。*\n\n在连接这些输出口之前，我们必须向项目添加一个新的框架。与陀螺仪交互需要使用 Core Motion\
  \ 框架。通过在你的 Xcode **项目导航器**中选择项目名称，并在应用目标的 **Build Phases** 标签页的 **Link Binary With\
  \ Libraries** 部分添加该框架，即可将其添加到项目中。打开 `SecondViewController.h`，并添加属性，用于将信息发送到我们刚刚创建的\
  \ `IBOutlet`。请参考代码清单 4-7 中的代码。\n\n**代码清单 4-7.** *新的 `SecondViewController.h`*\n\n\
  ```\n#import <UIKit/UIKit.h>\n#import <CoreMotion/CoreMotion.h>\n\n@interface SecondViewController\
  \ : UIViewController {\n    CMMotionManager *motionManager;\n\n    UILabel *rollLabel;\n\
  \    UILabel *pitchLabel;\n    UILabel *yawLabel;\n\n    UIProgressView *rollProgressView;\n\
  \    UIProgressView *pitchProgressView;\n    UIProgressView *yawProgressView;\n\n\
  }\n\n@property (nonatomic, retain) CMMotionManager *motionManager;\n\n@property\
  \ (nonatomic, retain) IBOutlet UILabel *rollLabel;\n@property (nonatomic, retain)\
  \ IBOutlet UILabel *pitchLabel;\n@property (nonatomic, retain) IBOutlet UILabel\
  \ *yawLabel;\n\n@property (nonatomic, retain) IBOutlet UIProgressView *rollProgressView;\n\
  @property (nonatomic, retain) IBOutlet UIProgressView *pitchProgressView;\n@property\
  \ (nonatomic, retain) IBOutlet UIProgressView *yawProgressView;\n\n- (IBAction)readGyroscope;\n\
  \n@end\n```\n\n在我们深入之前，快速过一下这段代码。从顶部开始，你会看到我们为刚刚添加到应用中的 Core Motion 框架添加的 `import`\
  \ 语句。接下来，在 `interface` 块中，你会注意到我们并没有像处理加速度计那样将此类指定为任何委托。陀螺仪类充当硬件传感器的接口网关，它不像加速度计类那样向委托方法报告。\n\
  \n`UILabel` 和 `UIProgressBar` 属性应该不足为奇，它们与加速度计示例中使用的相同。不过，在这个示例中我们有一个新属性。`CMMotionManager`\
  \ 是我们将用来与陀螺仪交互的类。\n\n最后，我们为按钮声明了一个 `IBAction` 方法。我们不会像处理加速度计那样依赖委托方法，而是手动调用一个方法来查询陀螺仪的当前测量值。\n\
  \n在 Xcode 中切换到 `SecondViewController.m`，并 `synthesize` 我们的新属性；别忘了更新你的 `dealloc`\
  \ 方法以释放这些属性并将其设置为 `nil`，如代码清单 4-8 所示。\n\n**代码清单 4-8.** *合成并释放新属性*\n\n```\n// 在 @implementation\
  \ 之后\n@synthesize motionManager;\n@synthesize rollLabel, rollProgressView, pitchLabel,\
  \ pitchProgressView, yawLabel, yawProgressView;\n\n// 新的 dealloc 方法\n- (void)dealloc\n\
  {\n    [motionManager release];\n    motionManager = nil;\n    [rollLabel release];\n\
  \    rollLabel = nil;\n    [rollProgressView release];\n    rollProgressView = nil;\n\
  \    [pitchLabel release];\n    pitchLabel = nil;\n    [pitchProgressView release];\n\
  \    pitchProgressView = nil;\n    [yawLabel release];\n    yawLabel = nil;\n  \
  \  [yawProgressView release];\n    yawProgressView = nil;\n    [super dealloc];\n\
  }\n```\n\n取消注释 `viewDidLoad` 方法并更新它，如代码清单 4-9 所示。\n\n**代码清单 4-9.** *取消注释并更新 `viewDidLoad`\
  \ 方法*\n\n```\n- (void)viewDidLoad\n{\n    self.motionManager = [[[CMMotionManager\
  \ alloc] init] autorelease];\n    motionManager.deviceMotionUpdateInterval = 1.0/60.0;\n\
