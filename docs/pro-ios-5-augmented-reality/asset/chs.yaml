  \n从代码清单 9–20 中复制这两个方法。\n\n**代码清单 9–20.** *加载标记（或可追踪对象）*\n\n```objective-c\n- (void)bumpAppStatus\n\
  {\n    [self updateApplicationStatus:(status)(appStatus + 1)];\n}\n\n- (void)loadTracker\n\
  {\n    int nPercentComplete = 0;\n\n    // 后台线程必须有自己的自动释放池\n    // 加载追踪器数据\n   \
