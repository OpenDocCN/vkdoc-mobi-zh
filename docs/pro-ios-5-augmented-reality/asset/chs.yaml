  \ addSubview:_imageView];\n\n    [window bringSubviewToFront:viewController.view];\n\
  ```\n\n首先，我们从单例类 `CCDirector` 中取出 `sharedDirector`，并设置其 `backgroundColor` 和 `opaque`\
  \ 属性，使两者均对屏幕透明。\n\n现在，直接运行当前的项目。当我们使用 `UIImagePickerViewController` 处理类似的 cocos2D\
  \ 项目时，曾采用同样的步骤，并成功在摄像头视图之上构建图层。然而，你运行应用后会发现，屏幕上仍然一片漆黑。这是因为（如 第 6 章 所述）使用 `AVCaptureSession`\
  \ 涉及两个步骤：将图像从缓冲区排入队列，但同时还需要对这些图像进行实际处理。\n\n要从缓冲区获取图像，我们可以使用 `AVCaptureVideoDataOutputSampleBufferDelegate`\
  \ 类中的委托方法 `didOutputSampleBuffer`。此方法允许我们在图像被捕获时将其从缓冲区提取出来。\n\n在引入委托方法之前，再次切换到 `AppDelegate.h`\
  \ 文件，声明一个名为 `_settingImage` 的 `BOOL` 类型标志，以便跟踪当前是否正处于该处理过程中。将 代码清单 13–15 中的工具方法添加到你的实现文件中。\n\
  \n**代码清单 13–15.** *setImageToView 方法*\n\n```\n-(void)setImageToView:(UIImage*)image\
  \ {\n    _imageView.image = image;\n    _settingImage = NO;\n}\n```\n\n*这个方法很简单，只是将\
  \ `UIImageView` 设置为方法传入的图像。接下来，将其与接收缓冲图像的委托方法关联起来。在 `setImageToView` 方法下方添加 代码清单\
  \ 13–16 中的方法。面部识别：\U0001F4F7*\n\n**代码清单 13–16.** *从缓冲区提取图像的方法*\n\n```\n- (UIImage\
  \ *) imageFromSampleBuffer:(CMSampleBufferRef) sampleBuffer\n{\n    // 获取 CMSampleBuffer\
  \ 的核心视频图像缓冲区\n    CVImageBufferRef imageBuffer = CMSampleBufferGetImageBuffer(sampleBuffer);\n\
  \    // 锁定像素缓冲区的基地址\n    CVPixelBufferLockBaseAddress(imageBuffer, 0);\n\n    //\
  \ 获取像素缓冲区的每行字节数\n    void *baseAddress = CVPixelBufferGetBaseAddress(imageBuffer);\n\
  \n    // 获取像素缓冲区的每行字节数\n    size_t bytesPerRow = CVPixelBufferGetBytesPerRow(imageBuffer);\n\
  \    // 获取像素缓冲区的宽度和高度\n    size_t width = CVPixelBufferGetWidth(imageBuffer);\n\
  \    size_t height = CVPixelBufferGetHeight(imageBuffer);\n\n    // 创建设备相关的 RGB\
  \ 色彩空间\n    CGColorSpaceRef colorSpace = CGColorSpaceCreateDeviceRGB();\n\n    //\
  \ 使用样本缓冲区数据创建位图图形上下文\n    CGContextRef context = CGBitmapContextCreate(baseAddress,\
  \ width, height, 8,\n                                                 bytesPerRow,\
  \ colorSpace, kCGBitmapByteOrder32Little | kCGImageAlphaPremultipliedFirst);\n \
  \   // 从位图图形上下文中的像素数据创建 Quartz 图像\n    CGImageRef quartzImage = CGBitmapContextCreateImage(context);\n\
  \    // 解锁像素缓冲区\n    CVPixelBufferUnlockBaseAddress(imageBuffer,0);\n\n    // 释放上下文和色彩空间\n\
  \    CGContextRelease(context);\n    CGColorSpaceRelease(colorSpace);\n\n    //\
  \ 从 Quartz 图像创建 UIImage 对象\n    UIImage *image = [UIImage imageWithCGImage:quartzImage];\n\
  \n    // 释放 Quartz 图像\n    CGImageRelease(quartzImage);\n\n    return (image);\n\
  }\n\n- (void)captureOutput:(AVCaptureOutput *)captureOutput\ndidOutputSampleBuffer:(CMSampleBufferRef)sampleBuffer\n\
  fromConnection:(AVCaptureConnection *)connection\n{\n    UIImage *image = [self\
  \ imageFromSampleBuffer:sampleBuffer];\n\n    if(_settingImage == NO){\n       \
  \ _settingImage = YES;\n        [NSThread detachNewThreadSelector:@selector(setImageToView:)\
  \ toTarget:self withObject:image];\n    }\n}\n```\n\n我们复制的第一个方法同样直接来自 Apple 开发者文档。该方法从\
  \ `CMSampleBufferRef` 缓冲区返回一个 `UIImage` 对象。我们在 `didOutputSampleBuffer` 委托方法的第一行调用它。接着，在\
  \ `didOutputSampleBuffer` 方法中，检查我们是否已经在为 `UIImageView` 设置图像。如果尚未开始，则为我们之前创建的 `setImageToView`\
  \ 工具方法分离一个新线程。\n\n再次运行项目。视频虽然显示出来了，但效果并不符合预期。我的屏幕画面如 图 13–6 所示。\n\n![图示](img/1306.jpg)\n\
