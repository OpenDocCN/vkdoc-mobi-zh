  \n\n\n接下来，我们初始化 Qualcomm SDK。这一步将在后台线程中执行。完成后，我们再次推进状态枚举。\n\n我们刚刚实现的最后一个方法用于初始化渲染。这是应用程序增强现实部分的主要\
