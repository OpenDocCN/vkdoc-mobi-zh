  \n**图 12–5.** *`UIPopoverController`在 iPad 上显示`UIImagePickerController`。*\n\n####\
  \ Haar 级联\n\n在我们对 OpenCV 进行操作之前，需要向项目中添加几个 Haar 级联。Haar 级联是一组用于物体识别的组织化的分类器级联或数字图像特征。其名称来源于最早用于人脸检测系统的\
  \ Haar 小波。\n\n在 Haar 小波出现之前，图像识别分析每个像素 RGB 值的强度，这需要相当多的时间和计算资源。Haar 级联用于分析检测窗口的相邻矩形区域，并对这些区域的像素强度进行求和，以便相互比较，而不是逐像素比较。Viola\
  \ 和 Jones 在 2001 年发表的论文《使用简单特征的增强级联进行快速物体检测》（已在 2001 年计算机视觉与模式识别会议上被接受）中记录了这种方法。^(1)\n\
  \n如果您想进一步研究这个主题，该算法背后的数学原理有详尽的文档记录。我们将使用 OpenCV 源代码发行版中自带的 Haar 级联。您可以在[`http://opencv.willowgarage.com/wiki/`](http://opencv.willowgarage.com/wiki/)找到该发行版。如果您不想再下载另一个版本的\
  \ OpenCV（准确地说，这是原始版本），您可以只需从本书在 GitHub 上的示例代码或 Apress 网站（[`www.apress.com`](http://www.apress.com)）的源代码/下载区域复制这些文件。\n\
  \n找到您将要使用的级联目录，并将它们拖放到您的 Xcode 项目中。确保选择了按需复制资源的选项。\n\n**注意：** 如果您已经为 iOS 5 编译了自己的\
  \ OpenCV 发行版，可以跳过下一节。将您编译好的库添加到项目中，一切就绪。\n\n切换到`MainViewController.m`。在`import`语句之后，添加代码清单\
  \ 12-6 中的代码。\n\n**代码清单 12–6.** *私有方法*\n\n```\n@interface MainViewController (Private)\n\
  - (IplImage *)createIplImage:(UIImage *)image;\n- (void)openCVFaceDetect;\n@end\n\
  ```\n\n我们只是声明了几个将用于分析图像的私有方法。现在让我们实现这些方法，然后我们逐步讲解它们。\n\n__________\n\n¹ 你可以在[`http://research.microsoft.com/enus/um/people/viola/Pubs/Detect/violaJones_CVPR2001.pdf`](http://research.microsoft.com/enus/um/people/viola/Pubs/Detect/violaJones_CVPR2001.pdf)找到整篇论文。\n\
  \n首先，将代码清单 12-7 中的方法添加到实现中。正如我之前提到的，这两个实用方法来自 eosgarden 示例项目。它们按原样在 iOS 5 上无法工作，但我们稍后会修复这个问题。\n\
  \n**代码清单 12–7.** *`createIplImage` 方法*\n\n```\n- ( IplImage * )createIplImage: (\
  \ UIImage * )image\n{\n    CGImageRef      imageRef;\n    CGColorSpaceRef colorSpaceRef;\n\
  \    CGContextRef    context;\n    IplImage      * iplImage;\n    IplImage     \
  \ * returnImage;\n\n    imageRef      = image.CGImage;\n    colorSpaceRef = CGColorSpaceCreateDeviceRGB();\n\
  \    iplImage      = cvCreateImage( cvSize( image.size.width, image.size.height\
  \ ),\nIPL_DEPTH_8U, 4 );\n    context       = CGBitmapContextCreate\n    (\n   \
  \  iplImage->imageData,\n     iplImage->width,\n     iplImage->height,\n     iplImage->depth,\n\
  \     iplImage->widthStep,\n     colorSpaceRef,\n     kCGImageAlphaPremultipliedLast\
  \ | kCGBitmapByteOrderDefault\n     );\n\n    CGContextDrawImage( context, CGRectMake(\
  \ 0, 0, image.size.width, image.size.height\n), imageRef );\n    CGContextRelease(\
  \ context );\n    CGColorSpaceRelease( colorSpaceRef );\n\n    returnImage = cvCreateImage(\
  \ cvGetSize( iplImage ), IPL_DEPTH_8U, 3 );\n\n    cvCvtColor( iplImage, returnImage,\
  \ CV_RGBA2BGR );\n    cvReleaseImage( &iplImage );\n\n    return returnImage;\n\
  }\n```\n\n\n#### OpenCV 与 iOS 图像处理\n\n当我们从相机或相册获取所选图像后，会将其存储在`UIImageView`中。由于 OpenCV\
  \ 无法直接使用`UIImage`格式，因此需要将图像转换为它能处理的格式。OpenCV 使用名为`IplImage`的格式，该格式属于 Intel 图像处理库（Intel\
  \ Image Processing Library）的一部分。对于本演示而言，我们只需了解这些基本信息即可。互联网上提供了许多类似的辅助函数，例如来自`eosgarden`的函数。\n\
  \n我们的转换方法将在 OpenCV 处理块内部调用，该方法接收`UIImage`并绘制一个具有相同表示的新`IplImage`。其尺寸和颜色将足够接近，使我们仍能使用\
  \ x,y 坐标在检测到的每张人脸周围叠加一个半透明矩形。\n\n接下来，将列表 12–8 中的方法复制到实现部分。\n\n**列表 12–8.** `openCVFaceDetect`方法\n\
  \n```\n- ( void )openCVFaceDetect\n{\n    NSInteger                 i;\n    NSUInteger\
  \                scale;\n    NSAutoreleasePool       * pool;\n    IplImage     \
  \           * image;\n    IplImage                * smallImage;\n    NSString  \
  \              * xmlPath;\n    CvHaarClassifierCascade * cascade;\n    CvMemStorage\
  \            * storage;\n    CvSeq                   * faces;\n    UIAlertView \
  \            * alert;\n    CGImageRef                imageRef;\n    CGColorSpaceRef\
  \           colorSpaceRef;\n    CGContextRef              context;\n    CvRect \
  \                   rect;\n    CGRect                    faceRect;\n\n    pool \
  \ = [ [ NSAutoreleasePool alloc ] init ];\n    scale = 2;\n\n    cvSetErrMode( CV_ErrModeParent\
  \ );\n\n    xmlPath    = [ [ NSBundle mainBundle ] pathForResource: @\"haarcascade_frontalface_default\"\
  \ ofType: @\"xml\" ];\n    image      = [ self createIplImage: cameraView.image\
  \ ];\n    smallImage = cvCreateImage( cvSize( image->width / scale, image->height\
  \ / scale ),\nIPL_DEPTH_8U, 3 );\n\n    cvPyrDown( image, smallImage, CV_GAUSSIAN_5x5\
  \ );\n\n    cascade = ( CvHaarClassifierCascade * )cvLoad( [ xmlPath cStringUsingEncoding:\n\
  NSASCIIStringEncoding ], NULL, NULL, NULL );\n    storage = cvCreateMemStorage(\
  \ 0 );\n    faces   = cvHaarDetectObjects( smallImage, cascade, storage, ( float\
  \ )1.2, 2,\nCV_HAAR_DO_CANNY_PRUNING, cvSize( 20, 20 ) );\n\n    cvReleaseImage(\
  \ &smallImage );\n\n    imageRef      = cameraView.image.CGImage;\n    colorSpaceRef\
  \ = CGColorSpaceCreateDeviceRGB();\n    context       = CGBitmapContextCreate\n\
  \    (\n     NULL,\n     cameraView.image.size.width,\n     cameraView.image.size.height,\n\
  \     8,\n     cameraView.image.size.width * 4,\n     colorSpaceRef,\n     kCGImageAlphaPremultipliedLast\
  \ | kCGBitmapByteOrderDefault\n     );\n\n    CGContextDrawImage\n    (\n     context,\n\
  \     CGRectMake( 0, 0, cameraView.image.size.width, cameraView.image.size.height\
  \ ),\n     imageRef\n     );\n\n    CGContextSetLineWidth( context, 1 );\n    CGContextSetRGBStrokeColor(\
  \ context, ( CGFloat )0, ( CGFloat )0, ( CGFloat )0, (\nCGFloat )0.5 );\n    CGContextSetRGBFillColor(\
  \ context, ( CGFloat )1, ( CGFloat )1, ( CGFloat )1, (\nCGFloat )0.5 );\n\n    if(\
  \ faces->total == 0 )\n    {\n        alert = [ [ UIAlertView alloc ] initWithTitle:\
  \ @\"No faces\" message: @\"No faces\nwere detected in the picture. Please try with\
  \ another one.\" delegate: NULL\ncancelButtonTitle: @\"OK\" otherButtonTitles: nil\
  \ ];\n\n        [ alert show ];\n        [ alert release ];\n    }\n    else\n \
  \   {\n        for( i = 0; i < faces->total; i++ )\n        {\n            rect\
  \     = *( CvRect * )cvGetSeqElem( faces, i );\n            faceRect = CGContextConvertRectToDeviceSpace(\
  \ context, CGRectMake( rect.x *\nscale, rect.y * scale, rect.width * scale, rect.height\
  \ * scale ) );\n\n            CGContextFillRect( context, faceRect );\n        \
  \    CGContextStrokeRect( context, faceRect );\n        }\n\n        cameraView.image\
  \ = [ UIImage imageWithCGImage: CGBitmapContextCreateImage(\ncontext ) ];\n    }\n\
  ```\n\n\n\n`CGContextRelease( context );`  \n`CGColorSpaceRelease( colorSpaceRef\
  \ );`  \n`cvReleaseMemStorage( &storage );`  \n`cvReleaseHaarClassifierCascade(\
  \ &cascade );`  \n`cvReleaseImage( &smallImage );`  \n`[pool release];`  \n`}`\n\
  \n让我们逐步分析这段代码。首先，我们设置了一个 `NSAutoReleasePool` 来处理图像处理过程中的内存分配和释放。然后从文件路径加载 Haar 级联分类器，并为检测器设置一些基本信息，如尺寸、宽度和缩放比例。\n\
  \n使用新的辅助方法将 `UIImage` 转换为 `IplImage` 后，我们调用 `cvHaarDetectObjects` 函数来检测图片中的人脸。接下来，方法有几个分支路径：如果没有检测到人脸，我们会触发一个\
  \ `UIAlertView` 通知用户选择新图片；如果检测到人脸，则遍历它们，并在图像上覆盖一个半透明矩形。\n\n这里有几个有趣的方法，如果你之前深入学习了本书中\
  \ cocos2D 的内容，可能会认出它们。`DeviceSpace`（设备空间）和 `WorldSpace`（世界空间）的概念在游戏编程中很常见。有时候，你可能在处理图像上的像素坐标，而这些坐标可能与\
  \ CGPoints 或其他系统中的百分比有所不同。这些基于 C 语言的转换函数能让你在不同坐标系之间轻松切换。\n\n好了，两个处理方法都已就位。我们需要在从相册或相机获取\
  \ `UIImage` 之后调用它们。找到 `didFinishPickingImage` 委托方法，并在该例程末尾添加列表 12–9 中的代码行。\n\n**列表\
  \ 12–9.** *调用 OpenCV 例程*\n\n`[self openCVFaceDetect];`\n\n现在可以测试该例程了。在模拟器或物理设备上启动应用。我选择**相册**选项来选取图片。选择图片后，发生了意外情况：控制台输出了列表\
  \ 12–10 中的内容。\n\n**列表 12–10.** *不理想的输出*\n\n`Detected an attempt to call a symbol\
  \ in system libraries that is not present on the iPhone: strtod$UNIX2003 called\
  \ from function _ZL10icv_strtodP13CvFileStoragePcPS1_ in image OpenCV-iPad.`\n\n\
  幸运的是，我们知道问题所在。在大多数可用的 OpenCV 发行版中，都没有为设备和模拟器的架构进行适当编译。本例中使用的静态库需要更新。我们来更新并重试。\n\n\
