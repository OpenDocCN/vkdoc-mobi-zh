    If you run this code, you’ll notice that when the app identifies a horizontal
    plane, it places a plane, displaying a texture image, in that location. However,
    one additional problem remains. The `didUpdate renderer` function constantly scans
    the real world and updates the `ARPlaneAnchor` for what it identifies as the horizontal
    plane.


    That means we need to add code inside this `didUpdate renderer` function so when
    it recognizes that the horizontal plane is larger, it will display a larger virtual
    plane in that area.


    The `didUpdate renderer` function runs every time ARKit detects that the horizontal
    plane is larger. Each time it needs to remove the currently displayed horizontal
    plane before adding an updated horizontal plane. To do this, we use the `enumeratechildNodes`
    loop to constantly remove the old horizontal plane like this:


    ```

    node.enumerateChildNodes { (childNode, _) in

    childNode.removeFromParentNode()

    }

    ```


    After removing the old horizontal plane, we need to add a new one, so the entire
    `didUpdate renderer` function should look like this:


    ```

    func renderer(_ renderer: SCNSceneRenderer, didUpdate node: SCNNode, for anchor:
    ARAnchor) {

    guard anchor is ARPlaneAnchor else { return }

    node.enumerateChildNodes { (childNode, _) in

    childNode.removeFromParentNode()

