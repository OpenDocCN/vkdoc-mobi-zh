    \ as shown in Figure [4-5](#469983_1_En_4_Chapter.xhtml#Fig5).\n\nTry experimenting\
    \ with different text and extrusion depth along with different colors.\n\n## Adding\
    \ Textures to Shapes\n\nIn the examples we’ve created so far, we’ve simply used\
    \ solid colors to color the geometric shapes we’ve added to our augmented reality\
    \ view. However, you can apply graphic images to the surface of geometric shapes.\
    \ This can create interesting visual effects such as showing shapes as planets\
    \ or boxes that looks like they’re made out of bricks.\n\nYou can find public\
    \ domain texture images from various sites on the Internet by searching for “texture\
    \ images” in your favorite search engine. Such a search will help you find texture\
    \ images of all varieties, as shown in Figure [4-6](#469983_1_En_4_Chapter.xhtml#Fig6).\n\
    \n![../images/469983_1_En_4_Chapter/469983_1_En_4_Fig6_HTML.jpg](images/469983_1_En_4_Chapter/469983_1_En_4_Fig6_HTML.jpg)\n\
    \nFigure 4-6\n\nFinding texture images on the Internet\n\nOnce you download one\
    \ or more texture images, you need to add the texture image to your Xcode project\
    \ by following these steps:\n\n![../images/469983_1_En_4_Chapter/469983_1_En_4_Fig8_HTML.jpg](images/469983_1_En_4_Chapter/469983_1_En_4_Fig8_HTML.jpg)\n\
    \nFigure 4-8\n\nSelecting a texture file displays its contents in Xcode\n\n1.\
    \  Make sure the Copy Items if Needed check box is selected and then click the\
    \ Finish button.\n\n2.  Click on the stexture file you just added in the Navigator\
    \ pane. Xcode displays the contents of that texture image, as shown in Figure\
    \ [4-8](#469983_1_En_4_Chapter.xhtml#Fig8).\n\n![../images/469983_1_En_4_Chapter/469983_1_En_4_Fig7_HTML.jpg](images/469983_1_En_4_Chapter/469983_1_En_4_Fig7_HTML.jpg)\n\
    \nFigure 4-7\n\nAdding a file to an Xcode project\n\n1.  Modify the current Xcode\
    \ project you used to display text or create a new project that allows the use\
    \ of the camera to display an augmented reality view. (This should be the Xcode\
    \ project you created earlier for this chapter.)\n\n2.  Drag the texture image\
    \ to the navigator pane of your Xcode project. A window appears, displaying different\
    \ options for adding a file, as shown in Figure [4-7](#469983_1_En_4_Chapter.xhtml#Fig7).\n\
    \nOnce you’ve added a texture image to your Xcode project, the final step is to\
    \ define that texture image to appear on the surface of a geometric shape such\
    \ as a sphere, box, or pyramid. First, define the geometric shape separately like\
    \ this:\n\n```\nlet sphere = SCNSphere(radius: 0.05)\n```\n\nNext, define a material\
    \ for the sphere. We’ll need to first create a material then assign the texture\
    \ image to that material contents. Finally, we’ll need to apply the material to\
    \ the sphere like this:\n\n```\nlet material = SCNMaterial()\nmaterial.diffuse.contents\
    \ = UIImage(named: \"earth.jpg\")\nsphere.materials = [material]\n```\n\nIn this\
    \ example, the texture image is called `earth.jpg` but you’ll need to change this\
    \ to the name of your specific image file, including the file extension such as\
    \ .jpg.\n\nAfter defining a sphere and its material (the texture image), the final\
    \ step is to create a node, assign that node’s geometry to the sphere, and position\
    \ that node in the augmented reality view like this:\n\n```\nlet node = SCNNode()\n\
    node.geometry = sphere\nnode.position = SCNVector3(Xslider.value,Yslider.value,Zslider.value)\n\
    ```\n\nTo edit the `ViewController.swift` file , follow these steps:\n\n1.  Click\
    \ the Stop button or choose Product ➤ Stop in Xcode.\n\n![../images/469983_1_En_4_Chapter/469983_1_En_4_Fig9_HTML.jpg](images/469983_1_En_4_Chapter/469983_1_En_4_Fig9_HTML.jpg)\n\
    \nFigure 4-9\n\nDisplaying a texture file over a geometric shape\n\n1.  Click\
    \ on the `ViewController.swift` file in the Navigator pane.\n\n2.  Edit the contents\
    \ of the `ViewController.swift` file so it looks like the following:"
