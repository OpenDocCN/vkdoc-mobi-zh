    \ `.dae` 文件转换为 `.scn` 文件，如图 2-22 所示。\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig22_HTML.jpg](img/469983_1_En_2_Fig22_HTML.jpg)\n\
    \n图 2-22\nXcode 请求确认将 `.dae` 文件转换为 `.scn` 文件\n\n4.  点击 Convert 按钮。Xcode 会将你的 `.dae`\
    \ 文件转换为 `.scn` 文件。\n5.  （可选）点击 `.scn` 文件并按 Return，将文件名编辑为简单且具描述性的内容。\n6.  编辑`viewDidLoad`函数中的以下行以包含你的\
    \ `.scn` 文件的名称。如果你的 `.scn` 文件名为`satellite.scn`，则代码应如下所示：\n\n```\nlet scene = SCNScene(named:\
    \ \"art.scnassets/satellite.scn\")!\n```\n\n此 Swift 代码会将 `.dae` 文件（已转换为 `.scn`\
    \ 文件）加载到你的增强现实视图中。然而，还有最后一步。对于大多数 `.dae` 文件，都有一个伴随的纹理文件来定义三维对象的外观或“皮肤”。最后一步是将此纹理或“皮肤”应用到\
    \ `.scn` 文件。为此，请按照以下步骤操作：\n\n1.  在导航器窗格中点击 `scnassets` 文件夹中显示的 `.scn` 文件。Xcode\
    \ 会将你的图像显示为一个通用形状，但没有外观。\n2.  点击 Xcode 窗口底部附近的“显示场景图视图”图标，如图 2-23 所示。Xcode 将显示场景图视图。\n\
    \n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig23_HTML.jpg](img/469983_1_En_2_Fig23_HTML.jpg)\n\
    \n图 2-23\n“显示场景图视图”图标\n\n3.  点击场景图视图窗格中显示的每个项目，然后点击“显示材质检查器”图标，如图 2-24 所示。或者选择\
    \ 视图 ➤ 检查器 ➤ 显示材质检查器。\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig24_HTML.jpg](img/469983_1_En_2_Fig24_HTML.jpg)\n\
    \n图 2-24\n“显示材质检查器”图标\n\n4.  点击漫反射弹出菜单，选择纹理文件的名称，例如`texture.jpg`，如图 2-25 所示。\n\
    \n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig25_HTML.jpg](img/469983_1_En_2_Fig25_HTML.jpg)\n\
    \n图 2-25\n漫反射弹出菜单允许你选择纹理图像\n\n如果你的原始 `.dae` 文件附带两个或更多纹理文件，则可能需要将这些多个纹理文件包含在 `scnassets`\
    \ 文件夹中，并使用漫反射弹出菜单为三维对象的不同部分选择每个相应的纹理文件。\n\n现在，通过 USB 线将 iOS 设备连接到 Macintosh，然后点击\
    \ Run 图标或选择 产品 ➤ 运行。你现在应该会看到你的 `.scn` 文件显示在 iOS 设备摄像头捕获的图像之上。\n"
- fmt: '## Summary


    While it’s possible to create augmented reality apps on your own, it’s far simpler
    to rely on Apple’s `ARKit` framework. `ARKit` takes care of the details of managing
    a camera and real-world objects around you to combine reality with virtual images.


    The simplest way to create an augmented reality app is to start with the Augmented
    Reality template when creating a new iOS project. However, you can also add augmented
    reality features to an existing app. First, you must import the `ARKit` framework
    along with a graphics framework such as `SceneKit`. Next you must create an `ARKit
    SceneKit View` on your app’s user interface to view the actual augmented reality
    image. Finally, you must import a three-dimensional image into Xcode and convert
    it to an `.scn` `SceneKit` file.


    When you want an app focused on augmented reality, it’s best to create a new project
    using the Augmented Reality project template. When you want to add augmented reality
    features to an existing app, you can easily do so at any time as well.


    Now that you have a basic idea how to create an augmented reality app and the
    various steps you need to follow to create augmented reality, it’s time to go
    into more detail about the specific parts of the different augmented reality features
    available through `ARKit`.


    ## World Tracking


    Augmented reality works by tracking the real world through a camera. By identifying
    solid objects in the real world such as floors, tables, and walls, augmented reality
    can then accurately place virtual objects on the scene that create the illusion
    of actually being there. Even if the virtual object is nothing more than a cartoon
    Pokémon character, augmented reality must overlay that virtual object so the virtual
    object feels like it’s part of the real world seen through a camera.


    To identify the location of both real and virtual objects, `ARKit` uses a coordinate
    system where the x-axis points left and right, the y-axis points up and down,
    and the z-axis points toward and away from the camera, as shown in Figure [3-1](#469983_1_En_3_Chapter.xhtml#Fig1).


    ![../images/469983_1_En_3_Chapter/469983_1_En_3_Fig1_HTML.jpg](images/469983_1_En_3_Chapter/469983_1_En_3_Fig1_HTML.jpg)


    **Figure 3-1** Defining the x-, y-, and z-axes for the ARKit coordinate system


    To place virtual objects in the real world, `ARKit` uses a technique called `visual-inertial
    odometry`, which is just a fancy way of recognizing solid objects in the real
    world (such as walls and tabletops) and the current position of the camera (the
    iOS device) in relation to objects in the real world. With this information, `ARKit`
    can place objects on real-world items such as floors or desks, or at a fixed distance
    from the camera’s current location, such as two meters in front of you and a half
    meter to your left.


    Identifying real-life objects seen through a camera is known as `world tracking`.
    World tracking accuracy works best in good lighting with multiple, contrasting
    objects that can be easily spotted such as a chair and a table in a room. World
    tracking accuracy can suffer in dim or poor lighting or when viewing objects that
    are not easy to identify such as a solid wall or road with no other contrasting
    objects.


    Think of how you identify objects in the real world. It’s easy to identify a lamp
    on a table because you can see both the lamp’s entire outline and the table surface
    and edges. If someone just showed you a close up of a lamp or table surface, you
    might not know whether you’re looking at a wall or a floor. As a general rule,
    if it’s easy for a person to identify objects in an image, it’s easy for `ARKit`
    to identify the shape of those objects too.


    Besides identifying object boundaries, another key to accuracy depends on the
    user holding the camera steady. This gives `ARKit` time to accurately map out
    its surroundings. If the user moves the camera around too quickly or in erratic
    movements, `ARKit` will have a harder time accurately identifying real-world objects
    in the same way you might have trouble identifying objects if shown a video of
    someone moving a camera rapidly in all directions.


    ### Displaying the World Origin


    Every augmented reality app needs to import the `ARKit` framework and a graphics
    framework to display virtual objects such as `SceneKit`, `SpriteKit`, or `Metal`
    like this:


    ```

    import ARKit

    import SceneKit

    ```


    Once your app imports the `ARKit` framework and a graphics framework like `SceneKit`,
    the next step is to use the `ARWorldTrackingConfiguration` class like this:


    ```

    let configuration = ARWorldTrackingConfiguration()

    ```


    AR world tracking needs to take place inside an `ARKit SceneKit View` (`ARSCNView`),
    which you must add to your app’s user interface. You must create an `IBOutlet`
    inside this `ARSCNView` such as:


    ```

    @IBOutlet var sceneView: ARSCNView!

    ```


    Now you need to run AR world tracking within this `ARSCNView` like this:


    ```

    sceneView.session.run(configuration)

    ```


    At this point, you would normally display a virtual object in the `ARSCNView`
    such as a cartoon airplane or chair. For this exercise, we’re going to display
    the world origin that `ARKit` uses. These world origin coordinates will let you
    see the x-, y-, and z-axes that define where `ARKit` places virtual objects. Displaying
    the world origin is handy to debug your app and make sure it displays virtual
    objects exactly where you want them. To see how to display the world origin in
    an augmented reality app, follow these steps:


    1. Start Xcode. (Make sure you’re using Xcode 10 or greater.)

    2. Choose File ➤ New ➤ Project. Xcode asks you to choose a template.

    3. Click the iOS category.

    4. Click the Single View App icon and click the Next button. Xcode asks for a
    product name, organization name, organization identifiers, and content technology.

    5. Click in the Product Name text field and type a descriptive name for your project,
    such as `World Tracking`. (The exact name does not matter.)

    6. Make sure the Content Technology popup menu displays `SceneKit`.

    7. Click the Next button. Xcode asks where you want to store your project.

    8. Choose a folder and click the Create button. Xcode creates an iOS project.


    First, let’s modify the `Info.plist` file to allow access to the camera and to
    use `ARKit` by following these steps:


    1. Click the `Info.plist` file in the Navigator pane. Xcode displays a list of
    keys, types, and values.

    2. Click the disclosure triangle to expand the Required Device Capabilities category
    to display Item 0.

    3. Move the mouse pointer over Item 0 to display a plus (`+`) icon.

    4. Click this plus (`+`) icon to display a blank Item 1.

    5. Type `arkit` under the Value category in the Item 1 row.

    6. Move the mouse pointer over the last row to display a plus (`+`) icon.

    7. Click on the plus (`+`) icon to create a new row. A popup menu appears.

    8. Choose Privacy – Camera Usage Description.

    9. Type `AR needs to use the camera` under the Value category in the Privacy –
    Camera Usage Description row.


    Now that our app can access the camera and use `ARKit`, let’s add an `ARKit SceneKit
    View` to the `Main.storyboard` file so our app can display images from the camera.
    To add an `ARKit SceneKit View` to your user interface, follow these steps:


    1. Click on the `Main.storyboard` file in the Navigator pane of Xcode. Xcode displays
    an iOS device on the storyboard screen that you can change by clicking View As
    at the bottom of the storyboard screen.

    2. Click the Object Library icon to display the Object Library window.

    3. Click in the search field at the top of the Object Library window and type
    `ARKit`. The Object Library window displays all ARKit objects available.

    4. Drag the `ARKit SceneKit View` from the Object Library on to the storyboard.

    5. Resize the `ARKit SceneKit View` on the storyboard. The exact size and position
    of the `ARKit SceneKit View` isn’t important, but make it large enough because
    the size of the `ARKit SceneKit View` defines how large the image will appear
    when viewed through the iOS device’s camera.'
