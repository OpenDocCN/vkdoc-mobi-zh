  trans: "\n20.  点击 `Stop` 按钮或选择 `Product` ➤ `Stop`。\n\n![图 9-5](img/469983_1_En_9_Fig5_HTML.jpg)\n\
    \n**图 9-5**\n\n文档大纲窗格显示所有用户界面项目。\n\n1.  将 `Rotation Gesture Recognizer` 拖拽到 `ARSCNView`\
    \ 上。Xcode 会在文档大纲中显示 `Rotation Gesture Recognizer`，如图 9-5 所示。（你可以通过选择 `Editor`\
    \ ➤ `Show/Hide Document Outline` 来切换隐藏或显示文档大纲。）\n\n![图 9-4](img/469983_1_En_9_Fig4_HTML.jpg)\n\
    \n**图 9-4**\n\n对象库窗口中的旋转手势识别器。\n\n1.  在对象库窗口中输入 `Rotation`。对象库窗口会显示 `Rotation\
    \ Gesture Recognizer`。\n\n![图 9-3](img/469983_1_En_9_Fig3_HTML.jpg)\n\n**图 9-3**\n\
    \n对象库图标。\n\n1.  确保你的 `TouchGestures` 项目已打开。\n2.  在导航器窗格中点击 `Main.storyboard` 文件。\n\
    3.  点击 `Object Library` 图标以显示对象库窗口。\n\n请注意，通过将手势识别器拖放到 `ARSCNView` 上，我们省去了编写代码的工作。你可以使用其中一种方法或两种方法结合使用。\n\
    \n## 总结\n\niOS 设备的触摸屏可以识别多种类型的触摸手势，从简单的点击到旋转、轻扫和拖拽。要识别手势，你有两种方法。首先，你可以通过编写如下代码来为你的应用添加手势识别器：\n\
    \n```\nlet panGesture = UIPanGestureRecognizer(target: self, action: #selector(handlePan))\n\
    sceneView.addGestureRecognizer(panGesture)\n```\n\n然后你需要编写一个函数来处理触摸手势，例如：\n\n\
    ```\n@objc func handlePan(sender: UIPanGestureRecognizer) {\n}\n```\n\n另一种方法是，我们可以直接从对象库中拖放手势识别器到\
    \ `ARSCNView` 上。然后我们可以通过 Ctrl-拖拽来为手势识别器创建一个 `IBOutlet`，并创建一个 `IBAction` 方法来处理检测到的手势。\n\
    \n# 10. 与增强现实交互\n\n触摸手势让用户能够仅通过手指动作（如点击、轻扫、旋转和捏合）来控制增强现实应用。一旦你为增强现实应用添加了触摸手势，下一步就是利用这些触摸手势来操控显示在增强现实视图中的虚拟对象。\n\
    \n在上一章中，我们学习了如何识别虚拟对象上发生的简单触摸手势，如点击、长按或轻扫。在本章中，我们将学习如何使用捏合、旋转和拖拽触摸手势来缩放、旋转和移动虚拟对象。\n\
    \n对于本章的示例，我们将通过对象库创建不同的手势识别器。让我们按照以下步骤创建一个新的 Xcode 项目：\n\n1.  启动 Xcode。（确保你使用的是\
    \ Xcode 10 或更高版本。）\n2.  选择 `File` ➤ `New` ➤ `Project`。Xcode 会要求你选择一个模板。\n3.  点击\
    \ `iOS` 类别。\n4.  点击 `Augmented Reality App` 图标并点击 `Next` 按钮。Xcode 会要求输入产品名称、组织名称、组织标识符和内容技术。\n\
    5.  点击 `Product Name` 文本框，为你的项目输入一个描述性名称，例如 `RotatePinch`。（具体名称无关紧要。）\n6.  确保\
    \ `Content Technology` 弹出菜单显示 `SceneKit`。\n7.  点击 `Next` 按钮。Xcode 会询问你想将项目存储在何处。\n\
    8.  选择一个文件夹并点击 `Create` 按钮。Xcode 会创建一个 iOS 项目。\n\n这将创建一个简单的增强现实应用，显示一个卡通飞机。既然我们已经自动获得了显示的飞机模型，让我们从学习使用捏合手势在增强现实视图中缩放或调整飞机虚拟对象的大小开始。\n\
    \n捏合手势包括将两个指尖放在屏幕上，然后以捏合动作将它们分开或合拢。要在我们的应用中放置一个捏合手势识别器，请按照以下步骤操作：\n\n1.  点击 `Assistant\
    \ Editor` 图标或选择 `View` ➤ `Assistant Editor` ➤ `Show Assistant Editor`，以并排显示 `Main.storyboard`\
    \ 和 `ViewController.swift` 文件。\n2.  将鼠标指针移动到文档大纲中的 `Pinch Gesture Recognizer`\
    \ 上，按住 `Control` 键，然后 Ctrl-拖拽到 `ViewController.swift` 文件底部最后一个大括号的上方。\n3.  松开\
    \ `Control` 键和鼠标左键。会出现一个弹出菜单。\n4.  确保 `Connection` 弹出菜单显示 `Action`。\n5.  点击 `Name`\
    \ 文本框，输入 `pinchGesture`。\n6.  点击 `Type` 弹出菜单，选择 `UIPinchGestureRecognizer`。然后点击\
    \ `Connect` 按钮。Xcode 会创建一个 `IBAction` 方法，如下所示：\n\n```\n@IBAction func pinchGesture(_\
    \ sender: UIPinchGestureRecognizer) {\n}\n```\n\n7.  按如下方式编辑这个 `IBAction` 方法 `pinchGesture`：\n\
    \n```\n@IBAction func pinchGesture(_ sender: UIPinchGestureRecognizer) {\n   \
    \ print(\"Pinch gesture\")\n}\n```\n\n8.  通过 USB 线缆将 iOS 设备连接到你的 Macintosh。\n\
    9.  点击 `Run` 按钮或选择 `Product` ➤ `Run`。首次运行此应用时，它会请求访问摄像头的权限，请授予权限。\n10. 将两个指尖放在屏幕上并进行捏合或张开操作。Xcode\
    \ 调试区域应显示 `Pinch Gesture`，让你知道它已成功检测到捏合手势。\n11. 点击 `Stop` 按钮或选择 `Product` ➤ `Stop`。\n\
    \n![图 10-2](img/469983_1_En_10_Fig2_HTML.jpg)\n\n**图 10-2**\n\n文档大纲显示你放置在用户界面上的任何手势识别器。\n\
    \n1.  从对象库窗口中拖拽 `Pinch Gesture Recognizer` 并放到用户界面上的 `ARSCNView` 上。尽管你将捏合手势识别器拖放到了用户界面上，但除了在文档大纲中（如图\
    \ 10-2 所示），你在其他地方都看不到它的任何迹象。如果文档大纲不可见，点击 `Show Document Outline` 图标或选择 `Editor`\
    \ ➤ `Show Document Outline`。\n\n![图 10-1](img/469983_1_En_10_Fig1_HTML.jpg)\n\n\
    **图 10-1**\n\n在对象库窗口中查找捏合手势识别器。\n\n1.  在导航器窗格中点击 `Main.storyboard` 文件。\n2.  点击\
    \ `Object Library` 图标以显示对象库窗口。\n3.  在对象库中输入 `pinch`。对象库会显示捏合手势识别器，如图 10-1 所示。\n"
- fmt: "# Scaling with the Pinch Touch Gesture\n\nThe pinch gesture is a common touch\
    \ gesture for zooming in or out of an image displayed on the screen, such as while\
    \ looking at a digital photograph. Likewise, this same pinch gesture can be used\
    \ to scale the virtual plane that appears in the augmented reality view.\n\nTouch\
    \ gestures consist of three states:\n* `.began`—Occurs when the app first detects\
    \ a specific touch gesture\n* `.changed`—Occurs while the touch gesture is still\
    \ going on\n* `.ended`—Occurs when the app detects that the touch gesture has\
    \ stopped\n\nFor the pinch gesture, we just care about when it’s changing because\
    \ as the user pinches in or out, we want to scale the size of the virtual plane\
    \ in the augmented reality view. Edit the `pinchGesture` function like this:\n\
    \n```\n@IBAction func pinchGesture(_ sender: UIPinchGestureRecognizer) {\n   \
    \ if sender.state == .changed {\n        print(\"Pinch gesture\")\n    }\n}\n\
    ```\n\nIf you run this code and pinch on the screen, you should still see “Pinch\
    \ gesture” appear in the debug area of Xcode. This verifies that the app still\
    \ recognizes the pinch gesture.\n\nWe only want the pinch gesture to resize the\
    \ virtual plane when the user pinches directly on the virtual plane and not on\
    \ any other part of the augmented reality view. To detect what part of the screen\
    \ the user pinched on, we first need to retrieve the entire augmented reality\
    \ view like this:\n\n```\nlet areaPinched = sender.view as? SCNView\n```\n\nNow\
    \ we need to get the specific location that the user pinched on the screen:\n\n\
    ```\nlet location = sender.location(in: areaPinched)\n```\n\nFinally, we need\
    \ to use the `hitTest` method to determine if the user touched the virtual plane:\n\
    \n```\nlet hitTestResults = sceneView.hitTest(location, options: nil)\nif let\
    \ hitTest = hitTestResults.first {\n}\n```\n\nIf the user touched the first node\
    \ in the augmented reality view (the plane is the only node), then we can identify\
    \ the `hitTest` node with an arbitrary name such as:\n\n```\nif let hitTest =\
    \ hitTestResults.first {\n    let plane = hitTest.node\n}\n```\n\nNow based on\
    \ how far the user moves the pinch gesture, we can multiply this value by the\
    \ virtual plane’s current scale. If the user pinches out, the scale will be larger\
    \ and the virtual plane should increase in size. If the user pinches in, the scale\
    \ will be smaller and the virtual plane should decrease in size. The following\
    \ three lines of code measure how the virtual plane should change in size in the\
    \ x, y, and z direction:\n\n```\nlet scaleX = Float(sender.scale) * plane.scale.x\n\
    let scaleY = Float(sender.scale) * plane.scale.y\nlet scaleZ = Float(sender.scale)\
    \ * plane.scale.z\n```\n\nOnce we know how much to scale the virtual plane in\
    \ the x, y, and z direction, we can apply these values to the virtual plane itself\
    \ like this:\n\n```\nplane.scale = SCNVector3(scaleX, scaleY, scaleZ)\n```\n\n\
    Finally, we need to reset the virtual plane’s new size to a scale of 1:\n\n```\n\
    sender.scale = 1\n```\n\nThe entire `pinchGesture` IBAction method should look\
    \ like this:\n\n```\n@IBAction func pinchGesture(_ sender: UIPinchGestureRecognizer)\
    \ {\n    if sender.state == .changed {\n        let areaPinched = sender.view\
    \ as? SCNView\n        let location = sender.location(in: areaPinched)\n     \
    \   let hitTestResults = sceneView.hitTest(location, options: nil)\n        if\
    \ let hitTest = hitTestResults.first {\n            let plane = hitTest.node\n\
    \            let scaleX = Float(sender.scale) * plane.scale.x\n            let\
    \ scaleY = Float(sender.scale) * plane.scale.y\n            let scaleZ = Float(sender.scale)\
    \ * plane.scale.z\n            plane.scale = SCNVector3(scaleX, scaleY, scaleZ)\n\
    \            sender.scale = 1\n        }\n    }\n}\n```\n\nRun this app through\
    \ a connected iOS device and pinch directly on the virtual plane (not on the area\
    \ around the virtual plane). You should be able to scale the virtual plane larger\
    \ and smaller depending on which direction you pinch.\n\n![Figure 10-3](images/469983_1_En_10_Chapter/469983_1_En_10_Fig3_HTML.jpg)\n\
    \nFigure 10-3 Pinching scales the virtual plane bigger or smaller\n\n## Rotating\
    \ with the Rotation Touch Gesture\n\nThe rotation gesture uses two fingertips\
    \ much like the pinch gesture. The big difference is that while the pinch gesture\
    \ involves moving the two fingertips closer or farther apart, the rotation touch\
    \ gesture involves placing two fingertips on the screen and rotating clockwise\
    \ or counter-clockwise while keeping the distance between the two fingertips unchanged.\n\
    \nTo place a rotation gesture recognizer in our app, follow these steps:\n1. Drag\
    \ the Rotation Gesture Recognizer from the Object Library window and drop it on\
    \ the `ARSCNView` on the user interface. Although you dragged and dropped the\
    \ Rotation Gesture Recognizer on to the user interface, you won’t see any sign\
    \ of it anywhere except in the Document Outline.\n2. Click the Assistant Editor\
    \ icon or choose View ➤ Assistant Editor ➤ Show Assistant Editor to display the\
    \ `Main.storyboard` and the `ViewController.swift` file side by side.\n3. Move\
    \ the mouse pointer over the Rotation Gesture Recognizer in the Document Outline,\
    \ hold down the Control key, and Ctrl-drag above the last curly bracket at the\
    \ bottom of the `ViewController.swift` file.\n4. Release the Control key and the\
    \ left mouse button. A popup menu appears.\n5. Make sure the Connection popup\
    \ menu displays Action.\n6. Click in the Name text field and type `rotationGesture`.\n\
    7. Click in the Type popup menu and choose `UIRotationGestureRecognizer`. Then\
    \ click the Connect button. Xcode creates an IBAction method as shown here:\n\
    \    ```\n    @IBAction func rotationGesture(_ sender: UIRotationGestureRecognizer)\
    \ {\n    }\n    ```\n8. Edit this IBAction method `rotationGesture` as follows:\n\
    \    ```\n    @IBAction func rotationGesture(_ sender: UIRotationGestureRecognizer)\
    \ {\n        print(\"Rotation gesture\")\n    }\n    ```\n9. Connect an iOS device\
    \ to your Macintosh through its USB cable.\n10. Click the Run button or choose\
    \ Product ➤ Run.\n11. Place two fingertips on the screen and rotate them clockwise\
    \ or counter-clockwise. The Xcode debug area should display “Rotation Gesture”\
    \ to let you know that it successfully detected the rotation gesture.\n12. Click\
    \ the Stop button or choose Product ➤ Stop.\n\n![Figure 10-4](images/469983_1_En_10_Chapter/469983_1_En_10_Fig4_HTML.jpg)\n\
    \nFigure 10-4 Finding the rotation gesture recognizer in the Object Library window\n\
    \nWith the rotation gesture, we need to identify when the rotation is actually\
    \ taking place and when the rotation finally stops. While the rotation gesture\
    \ is occurring, we’ll need to rotate the virtual plane. As soon as the rotation\
    \ ends, we’ll need to store the rotated angle as the virtual plane’s current angle.\n\
    \nFirst, we’ll need to create two variables underneath the IBOutlet for the `ARSCNView`\
    \ like this:\n\n```\nvar newAngleZ : Float = 0.0\nvar currentAngleZ : Float =\
    \ 0.0\n```\n\nIn this example, we’ll be rotating the virtual plane around its\
    \ z-axis so the `currentAngleZ` stores the virtual plane’s current angle. Then\
    \ we’ll calculate a new angle, based on the rotation gesture, and store this new\
    \ angle in the `newAngleZ` variable.\n\nOnce these two variables are available,\
    \ we can write code that detects when the rotation is happening (`.changed`) and\
    \ when the rotation has stopped (`.ended`):\n\n```\n@IBAction func rotationGesture(_\
    \ sender: UIRotationGestureRecognizer) {\n    if sender.state == .changed {\n\
    \    } else if sender.state == .ended {\n        currentAngleZ = newAngleZ\n \
    \   }\n}\n```\n\nAs soon as the rotation gesture ends, we want to store the new\
    \ angle of rotation (`newAngleZ`) into the `currentAngleZ` variable."
