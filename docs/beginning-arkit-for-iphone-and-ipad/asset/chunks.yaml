    import UIKit

    import SceneKit

    import ARKit

    class ViewController: UIViewController, ARSCNViewDelegate {

    @IBOutlet var sceneView: ARSCNView!

    let configuration = ARWorldTrackingConfiguration()

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]

    sceneView.delegate = self

    configuration.planeDetection = .horizontal

    sceneView.session.run(configuration)

    let tapGesture = UITapGestureRecognizer(target: self, action: #selector(tapResponse))

    sceneView.addGestureRecognizer(tapGesture)

    }

    @objc func tapResponse(sender: UITapGestureRecognizer) {

    let scene = sender.view as! ARSCNView

    let tapLocation = sender.location(in: scene)

    let hitTest = scene.hitTest(tapLocation, types: .existingPlaneUsingExtent)

    if hitTest.isEmpty{

    print ("no plane detected")

    } else {

    print("found a horizontal plane")

    guard let hitResult = hitTest.first else { return }

    addObject(hitResult: hitResult)

    }

    }

    func addObject(hitResult: ARHitTestResult) {

    let objectNode = SCNNode()

    objectNode.geometry = SCNPyramid(width: 0.1, height: 0.2, length: 0.1)

    objectNode.geometry?.firstMaterial?.diffuse.contents = UIColor.orange

    objectNode.position = SCNVector3(hitResult.worldTransform.columns.3.x, hitResult.worldTransform.columns.3.y,
    hitResult.worldTransform.columns.3.z)

    sceneView.scene.rootNode.addChildNode(objectNode)

    }

    }

    ```


    To test this code, follow these steps:


    1.  Click the Stop button or choose Product ➤ Stop.


    ![../images/469983_1_En_11_Chapter/469983_1_En_11_Fig5_HTML.jpg](images/469983_1_En_11_Chapter/469983_1_En_11_Fig5_HTML.jpg)


    Figure 11-5


    Adding orange pyramids to a horizontal plane


    1.  Connect an iOS device to your Macintosh through its USB cable.


    2.  Click the Run button or choose Product ➤ Run. The first time you run this
    app, it will ask permission to access the camera, so give it permission.


    3.  Aim the iOS device’s camera at a horizontal plane, such as the seat of a chair
    or the floor. The first time ARKit identifies a horizontal plane, the Xcode debug
    area displays the message “plane detected”.


    4.  Tap the screen. An orange pyramid appears where you tapped, as shown in Figure
    [11-5](#469983_1_En_11_Chapter.xhtml#Fig5). Repeat Steps 3 and 4 to add orange
    pyramids to the detected horizontal plane.


    ## Detecting Vertical Planes


    Detecting vertical planes is identical to detecting horizontal planes. Instead
    of defining `planeDetection` as `.horizontal`, you define it as `.vertical` like
    this:


    ```

    configuration.planeDetection = .vertical

    ```


    Now your app can detect vertical planes such as walls instead of only horizontal
    planes like floors. To see how detecting vertical planes can work, simply modify
    the `PlacingObjects` project by editing the `viewDidLoad` function so it detects
    vertical planes. The entire `viewDidLoad` function should look like this:


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]

    sceneView.delegate = self

    configuration.planeDetection = .vertical

    sceneView.session.run(configuration)

    let tapGesture = UITapGestureRecognizer(target: self, action: #selector(tapResponse))

    sceneView.addGestureRecognizer(tapGesture)

    }

    ```


    In the `tapResponse` function , simply replace `horizontal` with `vertical` in
    the `print` statement so the entire `tapResponse` function looks like this:


    ```

    @objc func tapResponse(sender: UITapGestureRecognizer) {

    let scene = sender.view as! ARSCNView

    let tapLocation = sender.location(in: scene)

    let hitTest = scene.hitTest(tapLocation, types: .existingPlaneUsingExtent)

    if hitTest.isEmpty{

    print ("no plane detected")

    } else {

    print("found a vertical plane")

    guard let hitResult = hitTest.first else { return }

    addObject(hitResult: hitResult)

    }

    }

    ```


    Search the Internet for an image of your favorite painting and drag it into the
    Navigator pane, as shown in Figure [11-6](#469983_1_En_11_Chapter.xhtml#Fig6).


    ![../images/469983_1_En_11_Chapter/469983_1_En_11_Fig6_HTML.jpg](images/469983_1_En_11_Chapter/469983_1_En_11_Fig6_HTML.jpg)


    Figure 11-6


    Adding an image of a painting


    Most of the changes will need to occur in the `addObject` function. First, we
    need to create a plane to add, define the plane’s size, and display the painting
    image on that plane like this:


    ```

    let objectNode = SCNNode()

    objectNode.geometry = SCNPlane(width: 0.3, height: 0.3)

    objectNode.geometry?.firstMaterial?.diffuse.contents = UIImage(named: "Mona_Lisa.jpg")

    ```


    This code adds an image called `Mona_Lisa.jpg` to the plane, but you’ll need to
    replace this image name with the name of the image you dragged and dropped into
    the Navigator pane.


    The entire `addObject` function should look like this:


    ```

    func addObject(hitResult: ARHitTestResult) {

    let objectNode = SCNNode()

    objectNode.geometry = SCNPlane(width: 0.3, height: 0.3)

    objectNode.geometry?.firstMaterial?.diffuse.contents = UIImage(named: "Mona_Lisa.jpg")

    objectNode.position = SCNVector3(hitResult.worldTransform.columns.3.x, hitResult.worldTransform.columns.3.y,
    hitResult.worldTransform.columns.3.z)

    sceneView.scene.rootNode.addChildNode(objectNode)

    }

    ```


