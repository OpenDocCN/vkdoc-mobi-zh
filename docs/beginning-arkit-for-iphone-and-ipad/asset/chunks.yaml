- fmt: "# Detecting Points in the Real World\n\n`ARKit` can detect horizontal and\
    \ vertical planes, but you can also make it detect individual points as well.\
    \ For example, a measuring app would let you point the center of an iOS device’s\
    \ camera at an object to record that position. Then, as you move the iOS device’s\
    \ camera and tap to identify another position, such a measuring app could determine\
    \ the distance between the two points.\n\nLet’s create an Xcode project to identify\
    \ two points in the real world and calculate the distance between them by following\
    \ these steps:\n\n1. Start Xcode. (Make sure you’re using Xcode 10 or greater.)\n\
    2. Choose File ➤ New ➤ Project. Xcode asks you to choose a template.\n3. Click\
    \ the iOS category.\n4. Click the Single View App icon and click the Next button.\
    \ Xcode asks for a product name, organization name, organization identifiers,\
    \ and content technology.\n5. Click in the Product Name text field and type a\
    \ descriptive name for your project, such as `Ruler`. (The exact name does not\
    \ matter.)\n6. Click the Next button. Xcode asks where you want to store your\
    \ project.\n7. Choose a folder and click the Create button. Xcode creates an iOS\
    \ project.\n\nNow modify the `Info.plist` file to allow access to the camera and\
    \ to use `ARKit` by following these steps:\n\n1. Click the `Info.plist` file in\
    \ the Navigator pane. Xcode displays a list of keys, types, and values.\n2. Click\
    \ the disclosure triangle to expand the Required Device Capabilities category\
    \ to display Item 0.\n3. Move the mouse pointer over Item 0 to display a plus\
    \ (+) icon.\n4. Click this plus (+) icon to display a blank Item 1.\n5. Type `arkit`\
    \ under the Value category in the Item 1 row.\n6. Move the mouse pointer over\
    \ the last row to display a plus (+) icon.\n7. Click on the plus (+) icon to create\
    \ a new row. A popup menu appears.\n8. Choose Privacy – Camera Usage Description.\n\
    9. Type `AR needs to use the camera` under the Value category in the Privacy –\
    \ Camera Usage Description row.\n\nNow it’s time to modify the `ViewController.swift`\
    \ file to use `ARKit` and `SceneKit` by following these steps:\n\n![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig6_HTML.jpg](images/469983_1_En_13_Chapter/469983_1_En_13_Fig6_HTML.jpg)\n\
    \nFigure 13-6 Aligning the `UILabel` horizontally and vertically\n\n1. Click in\
    \ the Size text field and type `24`. Then click the Done button.\n2. Click the\
    \ Align icon near the bottom of the Xcode screen to display a popup window.\n\
    3. Select the Horizontally in Container and Vertically in Container check boxes.\
    \ Then click the Add 2 Constraints button. Xcode centers your `UILabel`, displaying\
    \ the plus sign, in the center of the screen, as shown in Figure [13-6](#469983_1_En_13_Chapter.xhtml#Fig6).\n\
    \n![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig5_HTML.jpg](images/469983_1_En_13_Chapter/469983_1_En_13_Fig5_HTML.jpg)\n\
    \nFigure 13-5 Defining a size for the text in the `UILabel`\n\n1. Click the Add\
    \ 4 Constraints button to define constraints on the `ARSCNView`.\n2. Drag and\
    \ drop a `UILabel` on the `ARSCNView`.\n3. Click on the `UILabel` and click the\
    \ Attributes Inspector icon, or choose View ➤ Inspectors ➤ Show Attributes Inspector.\n\
    4. Click in the text field that displays Label and type a plus sign (+). Press\
    \ Return.\n5. Click on the T icon that appears on the far right of the Font popup\
    \ menu. A popup window appears, as shown in Figure [13-5](#469983_1_En_13_Chapter.xhtml#Fig5).\n\
    \n![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig4_HTML.jpg](images/469983_1_En_13_Chapter/469983_1_En_13_Fig4_HTML.jpg)\n\
    \nFigure 13-4 Defining constraints on the `ARSCNView`\n\n1. Click on the `ViewController.swift`\
    \ file in the Navigator pane.\n2. Edit the `ViewController.swift` file so it looks\
    \ like this:\n\n```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController:\
    \ UIViewController, ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
    \ any additional setup after loading the view, typically from a nib.\n    }\n\
    }\n```\n\n3. Click the `Main.storyboard` file in the Navigator pane.\n4. Drag\
    \ and drop an `ARSCNView` and expand it to fill the entire view.\n5. Click the\
    \ Add New Constraints icon near the bottom of the Xcode screen. A popup window\
    \ appears.\n6. Make sure the values on the top, bottom, left, and right edges\
    \ are all 0. Then click the constraint in each direction so they appear in red,\
    \ as shown in Figure [13-4](#469983_1_En_13_Chapter.xhtml#Fig4).\n\nThe whole\
    \ purpose of the plus sign in the label is to show us where the center of the\
    \ camera is when viewed through an augmented reality view.\n\nThe next step is\
    \ to connect the user interface items to the Swift code in the `ViewController.swift`\
    \ file. To do this, follow these steps:\n\n1. Click the `Main.storyboard` file\
    \ in the Navigator pane.\n2. Click the Assistant Editor icon or choose View ➤\
    \ Assistant Editor ➤ Show Assistant Editor to display the `Main.storyboard` and\
    \ the `ViewController.swift` file side by side.\n3. Move the mouse pointer over\
    \ the `ARSCNView`, hold down the Control key, and Ctrl-drag under the `class ViewController`\
    \ line.\n4. Release the Control key and the left mouse button. A popup menu appears.\n\
    5. Click in the Name text field and type `sceneView`, then click the Connect button.\
    \ Xcode creates an `IBOutlet` as shown here:\n\n```\n@IBOutlet var sceneView:\
    \ ARSCNView!\n```\n\n6. Edit the `viewDidLoad` function so it looks like this:\n\
    \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n    sceneView.debugOptions\
    \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    sceneView.delegate = self\n    sceneView.session.run(configuration)\n   \
    \ let tapGesture = UITapGestureRecognizer(target: self, action: #selector(tapResponse))\n\
    \    sceneView.addGestureRecognizer(tapGesture)\n}\n```\n\nAt this point, we’ve\
    \ added a Tap Gesture Recognizer so we need to write a function to handle this\
    \ tap gesture by following these steps:\n\n1. Click the `ViewController.swift`\
    \ file in the Navigator pane.\n2. Type the following underneath the `viewDidLoad`\
    \ function:\n\n```\n@objc func tapResponse(sender: UITapGestureRecognizer) {\n\
    \    print (\"Tapped screen\")\n}\n```\n\nIf you test this app, you’ll be able\
    \ to see the plus sign as a tiny black crosshair that appears in the center of\
    \ the screen. This center is where we want to use for defining our two points\
    \ to measure in the real world. For now, tapping the screen just displays “Tapped\
    \ screen” in the Xcode debug area."
  raw: "## Detecting Points in the Real World\n\nARKit can detect horizontal and vertical\
    \ planes, but you can also make it detect individual points as well. For example,\
    \ a measuring app would let you point the center of an iOS device’s camera at\
    \ an object to record that position. Then, as you move the iOS device’s camera\
    \ and tap to identify another position, such a measuring app could determine the\
    \ distance between the two points.\n\nLet’s create an Xcode project to identify\
    \ two points in the real world and calculate the distance between them by following\
    \ these steps:\n\n1.  Start Xcode. (Make sure you’re using Xcode 10 or greater.)\n\
    \n2.  Choose File ➤ New ➤ Project. Xcode asks you to choose a template.\n\n3.\
    \  Click the iOS category.\n\n4.  Click the Single View App icon and click the\
    \ Next button. Xcode asks for a product name, organization name, organization\
    \ identifiers, and content technology.\n\n5.  Click in the Product Name text field\
    \ and type a descriptive name for your project, such as `Ruler`. (The exact name\
    \ does not matter.)\n\n6.  Click the Next button. Xcode asks where you want to\
    \ store your project.\n\n7.  Choose a folder and click the Create button. Xcode\
    \ creates an iOS project.\n\nNow modify the `Info.plist` file to allow access\
    \ to the camera and to use ARKit by following these steps:\n\n1.  Click the `Info.plist`\
    \ file in the Navigator pane. Xcode displays a list of keys, types, and values.\n\
    \n2.  Click the disclosure triangle to expand the Required Device Capabilities\
    \ category to display Item 0.\n\n3.  Move the mouse pointer over Item 0 to display\
    \ a plus (+) icon.\n\n4.  Click this plus (+) icon to display a blank Item 1.\n\
    \n5.  Type `arkit` under the Value category in the Item 1 row.\n\n6.  Move the\
    \ mouse pointer over the last row to display a plus (+) icon.\n\n7.  Click on\
    \ the plus (+) icon to create a new row. A popup menu appears.\n\n8.  Choose Privacy –\
    \ Camera Usage Description.\n\n9.  Type `AR needs to use the camera` under the\
    \ Value category in the Privacy – Camera Usage Description row.\n\nNow it’s time\
    \ to modify the `ViewController.swift` file to use ARKit and SceneKit by following\
    \ these steps:\n\n![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig6_HTML.jpg](images/469983_1_En_13_Chapter/469983_1_En_13_Fig6_HTML.jpg)\n\
    \nFigure 13-6\n\nAligning the UILabel horizontally and vertically\n\n1.  Click\
    \ in the Size text field and type `24`. Then click the Done button.\n\n2.  Click\
    \ the Align icon near the bottom of the Xcode screen to display a popup window.\n\
    \n3.  Select the Horizontally in Container and Vertically in Container check boxes.\
    \ Then click the Add 2 Constraints button. Xcode centers your UILabel, displaying\
    \ the plus sign, in the center of the screen, as shown in Figure [13-6](#469983_1_En_13_Chapter.xhtml#Fig6).\n\
    \n![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig5_HTML.jpg](images/469983_1_En_13_Chapter/469983_1_En_13_Fig5_HTML.jpg)\n\
    \nFigure 13-5\n\nDefining a size for the text in the UILabel\n\n1.  Click the\
    \ Add 4 Constraints button to define constraints on the ARSCNView.\n\n2.  Drag\
    \ and drop a UILabel on the ARSCNView.\n\n3.  Click on the UILabel and click the\
    \ Attributes Inspector icon, or choose View ➤ Inspectors ➤ Show Attributes Inspector.\n\
    \n4.  Click in the text field that displays Label and type a plus sign (+). Press\
    \ Return.\n\n5.  Click on the T icon that appears on the far right of the Font\
    \ popup menu. A popup window appears, as shown in Figure [13-5](#469983_1_En_13_Chapter.xhtml#Fig5).\n\
    \n![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig4_HTML.jpg](images/469983_1_En_13_Chapter/469983_1_En_13_Fig4_HTML.jpg)\n\
    \nFigure 13-4\n\nDefining constraints on the ARSCNView\n\n1.  Click on the `ViewController.swift`\
    \ file in the Navigator pane.\n\n2.  Edit the `ViewController.swift` file so it\
    \ looks like this:\n\n```\n    import UIKit\n    import SceneKit\n    import ARKit\n\
    \    class ViewController: UIViewController, ARSCNViewDelegate {\n    let configuration\
    \ = ARWorldTrackingConfiguration()\n    override func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    }\n    ```\n\n3.  Click the `Main.storyboard` file in the Navigator\
    \ pane.\n\n4.  Drag and drop an ARSCNView and expand it to fill the entire view.\n\
    \n5.  Click the Add New Constraints icon near the bottom of the Xcode screen.\
    \ A popup window appears.\n\n6.  Make sure the values on the top, bottom, left,\
    \ and right edges are all 0\\. Then click the constraint in each direction so\
    \ they appear in red, as shown in Figure [13-4](#469983_1_En_13_Chapter.xhtml#Fig4).\n\
    \nThe whole purpose of the plus sign in the label is to show us where the center\
    \ of the camera is when viewed through an augmented reality view.\n\nThe next\
    \ step is to connect the user interface items to the Swift code in the `ViewController.swift`\
    \ file . To do this, follow these steps:\n\n1.  Click the `Main.storyboard` file\
    \ in the Navigator pane.\n\n2.  Click the Assistant Editor icon or choose View\
    \ ➤ Assistant Editor ➤ Show Assistant Editor to display the `Main.storyboard`\
    \ and the `ViewController.swif`t file side by side.\n\n3.  Move the mouse pointer\
    \ over the ARSCNView, hold down the Control key, and Ctrl-drag under the `class\
    \ ViewController` line.\n\n4.  Release the Control key and the left mouse button.\
    \ A popup menu appears.\n\n5.  Click in the Name text field and type `sceneView`,\
    \ then click the Connect button. Xcode creates an IBOutlet as shown here:\n\n\
    ```\n    @IBOutlet var sceneView: ARSCNView!\n    ```\n\n6.  Edit the `viewDidLoad`\
    \ function so it looks like this:\n\n```\n    override func viewDidLoad() {\n\
    \    super.viewDidLoad()\n    // Do any additional setup after loading the view,\
    \ typically from a nib.\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
    \ ARSCNDebugOptions.showFeaturePoints]\n    sceneView.delegate = self\n    sceneView.session.run(configuration)\n\
    \    let tapGesture = UITapGestureRecognizer(target: self, action: #selector(tapResponse))\n\
    \    sceneView.addGestureRecognizer(tapGesture)\n    }\n    ```\n\nAt this point,\
    \ we’ve added a Tap Gesture Recognizer so we need to write a function to handle\
    \ this tap gesture by following these steps:\n\n1.  Click the `ViewController.swift`\
    \ file in the Navigator pane.\n\n2.  Type the following underneath the `viewDidLoad`\
    \ function:\n\n```\n    @objc func tapResponse(sender: UITapGestureRecognizer)\
    \ {\n    print (\"Tapped screen\")\n    }\n    ```\n\nIf you test this app, you’ll\
    \ be able to see the plus sign as a tiny black crosshair that appears in the center\
    \ of the screen. This center is where we want to use for defining our two points\
    \ to measure in the real world. For now, tapping the screen just displays “Tapped\
    \ screen” in the Xcode debug area."
  trans: "\n# 检测现实世界中的点\n\n`ARKit` 可以检测水平面和垂直面，但你也可以让它检测单个点。例如，一款测量应用可以让你将 iOS 设备摄像头的中心对准一个物体来记录该位置。然后，当你移动\
    \ iOS 设备摄像头并点击确定另一个位置时，这样的测量应用就能计算出两点之间的距离。\n\n让我们创建一个 Xcode 项目来识别现实世界中的两个点，并通过以下步骤计算它们之间的距离：\n\
    \n1. 启动 Xcode。（确保你使用的是 Xcode 10 或更高版本。）\n2. 选择 文件 ➤ 新建 ➤ 项目。Xcode 会要求你选择一个模板。\n\
    3. 点击 iOS 类别。\n4. 点击“单视图应用”图标，然后点击“下一步”按钮。Xcode 会要求输入产品名称、组织名称、组织标识符和内容技术。\n5.\
    \ 在“产品名称”文本框中点击，然后为你的项目输入一个描述性名称，例如 `Ruler`。（具体名称无关紧要。）\n6. 点击“下一步”按钮。Xcode 会询问你想将项目存储在哪里。\n\
    7. 选择一个文件夹，然后点击“创建”按钮。Xcode 会创建一个 iOS 项目。\n\n现在按照以下步骤修改 `Info.plist` 文件，以允许访问摄像头并使用\
    \ `ARKit`：\n\n1. 在导航器窗格中点击 `Info.plist` 文件。Xcode 会显示一个键、类型和值的列表。\n2. 点击展开三角形，展开“所需的设备功能”类别，以显示“项目\
    \ 0”。\n3. 将鼠标指针移到“项目 0”上，显示一个加号（+）图标。\n4. 点击这个加号（+）图标，显示一个空白的“项目 1”。\n5. 在“项目\
    \ 1”行的“值”类别下输入 `arkit`。\n6. 将鼠标指针移到最后一行，显示一个加号（+）图标。\n7. 点击加号（+）图标创建一个新行。会出现一个弹出菜单。\n\
    8. 选择“隐私 - 相机使用说明”。\n9. 在“隐私 - 相机使用说明”行的“值”类别下输入 `AR 需要使用摄像头`。\n\n现在是时候按照以下步骤修改\
    \ `ViewController.swift` 文件以使用 `ARKit` 和 `SceneKit` 了：\n\n![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig6_HTML.jpg](img/469983_1_En_13_Fig6_HTML.jpg)\n\
    \n图 13-6 在水平和垂直方向上对齐 `UILabel`\n\n1. 在“大小”文本框中点击并输入 `24`。然后点击“完成”按钮。\n2. 点击 Xcode\
    \ 屏幕底部附近的“对齐”图标，显示一个弹出窗口。\n3. 选中“在容器中水平居中”和“在容器中垂直居中”复选框。然后点击“添加 2 个约束”按钮。Xcode\
    \ 会将你的 `UILabel` 居中，并在屏幕中央显示加号，如图 13-6 所示。\n\n![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig5_HTML.jpg](img/469983_1_En_13_Fig5_HTML.jpg)\n\
    \n图 13-5 为 `UILabel` 中的文本定义大小\n\n1. 点击“添加 4 个约束”按钮，为 `ARSCNView` 定义约束。\n2. 将一个\
    \ `UILabel` 拖放到 `ARSCNView` 上。\n3. 点击该 `UILabel`，然后点击“属性检查器”图标，或者选择 视图 ➤ 检查器 ➤\
    \ 显示属性检查器。\n4. 在显示“标签”的文本框中点击，并输入一个加号（+）。按 Return 键。\n5. 点击字体弹出菜单最右侧出现的 T 图标。会显示一个弹出窗口，如图\
    \ 13-5 所示。\n\n![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig4_HTML.jpg](img/469983_1_En_13_Fig4_HTML.jpg)\n\
    \n图 13-4 为 `ARSCNView` 定义约束\n\n1. 在导航器窗格中点击 `ViewController.swift` 文件。\n2. 编辑\
    \ `ViewController.swift` 文件，使其看起来像这样：\n\n```\nimport UIKit\nimport SceneKit\n\
    import ARKit\nclass ViewController: UIViewController, ARSCNViewDelegate {\n  \
    \  let configuration = ARWorldTrackingConfiguration()\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        // 在此处执行任何额外的视图加载后设置，通常来自 nib 文件。\n\
    \    }\n}\n```\n\n3. 在导航器窗格中点击 `Main.storyboard` 文件。\n4. 拖放一个 `ARSCNView` 并将其展开以填充整个视图。\n\
    5. 点击 Xcode 屏幕底部附近的“添加新约束”图标。会显示一个弹出窗口。\n6. 确保顶部、底部、左侧和右侧边缘的值都为 0。然后点击每个方向的约束，使其显示为红色，如图\
    \ 13-4 所示。\n\n标签中加号的整个目的是为了向我们显示，当通过增强现实视图观看时，摄像头的中心在哪里。\n\n下一步是将用户界面元素连接到 `ViewController.swift`\
    \ 文件中的 Swift 代码。请按照以下步骤操作：\n\n1. 在导航器窗格中点击 `Main.storyboard` 文件。\n2. 点击“助理编辑器”图标，或选择\
    \ 视图 ➤ 助理编辑器 ➤ 显示助理编辑器，以并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n\
    3. 将鼠标指针移到 `ARSCNView` 上，按住 Control 键，然后将 Control 键拖到 `class ViewController` 行下方。\n\
    4. 松开 Control 键和鼠标左键。会出现一个弹出菜单。\n5. 在“名称”文本框中点击并输入 `sceneView`，然后点击“连接”按钮。Xcode\
    \ 会创建一个 `IBOutlet`，如下所示：\n\n```\n@IBOutlet var sceneView: ARSCNView!\n```\n\n\
    6. 编辑 `viewDidLoad` 函数，使其看起来像这样：\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    // 在此处执行任何额外的视图加载后设置，通常来自 nib 文件。\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
    \ ARSCNDebugOptions.showFeaturePoints]\n    sceneView.delegate = self\n    sceneView.session.run(configuration)\n\
    \    let tapGesture = UITapGestureRecognizer(target: self, action: #selector(tapResponse))\n\
    \    sceneView.addGestureRecognizer(tapGesture)\n}\n```\n\n此时，我们添加了一个点击手势识别器，因此我们需要按照以下步骤编写一个函数来处理此点击手势：\n\
    \n1. 在导航器窗格中点击 `ViewController.swift` 文件。\n2. 在 `viewDidLoad` 函数下面输入以下内容：\n\n\
    ```\n@objc func tapResponse(sender: UITapGestureRecognizer) {\n    print (\"已点击屏幕\"\
    )\n}\n```\n\n如果你测试这个应用，你会看到加号作为一个微小的黑色十字准线出现在屏幕中央。这个中心就是我们想要用来定义现实世界中要测量的两个点的位置。目前，点击屏幕只会将“已点击屏幕”显示在\
    \ Xcode 的调试区域中。\n"
- fmt: "# Defining a Point in the Real World\n\nFor our ruler app to work, we need\
    \ to define two points in the real world and then measure the distance between\
    \ them. That means placing two points in the real world and storing the location\
    \ of those points.\n\nEach time the user taps the screen, we want to display a\
    \ small sphere that defines a point in the real world. Then the user will need\
    \ to point and tap the iOS device at another point so the app can measure the\
    \ distance between the two points.\n\nInside the `tapResponse` function, we need\
    \ to get the center of the screen where the center of the camera is pointed at,\
    \ which is where the plus sign appears on the screen. To do that, we need to retrieve\
    \ the scene that the user tapped on and identify the center like this:\n\n```\n\
    let scene = sender.view as! ARSCNView\nlet location = scene.center\n```\n\nNext,\
    \ we need to use the `hitTest` method to identify a feature point where the camera\
    \ is pointing. A feature point represents a real-world surface that ARKit can\
    \ recognize so the code looks like this:\n\n```\nlet hitTestResults = scene.hitTest(location,\
    \ types: .featurePoint)\n```\n\nAs long as ARKit can identify a feature point,\
    \ we can proceed so we need an `if` statement like this:\n\n```\nif hitTestResults.isEmpty\
    \ == false {\n}\n```\n\nInside this `if` statement, we need to retrieve the first\
    \ item retrieved from the `hitTestResults` constant:\n\n```\nguard let hitTestResults\
    \ = hitTestResults.first else { return }\n```\n\nOnce we've identified a point\
    \ that the camera is pointing at, we can create a green sphere to appear at that\
    \ point:\n\n```\nlet sphereNode = SCNNode()\nsphereNode.geometry = SCNSphere(radius:\
    \ 0.003)\nsphereNode.geometry?.firstMaterial?.diffuse.contents = UIColor.green\n\
    ```\n\nTo place the green sphere where the center of the camera is pointing, we\
    \ need to retrieve the x, y, and z coordinates of the camera through its `worldTransform`\
    \ property, which is a matrix. The third column of the matrix contains the position\
    \ we need, so we can define the green sphere's position like this:\n\n```\nsphereNode.position\
    \ = SCNVector3(hitTestResults.worldTransform.columns.3.x, hitTestResults.worldTransform.columns.3.y,\
    \ hitTestResults.worldTransform.columns.3.z)\n```\n\nFinally we need to add the\
    \ sphere to the scene like this:\n\n```\nsceneView.scene.rootNode.addChildNode(sphereNode)\n\
    ```\n\nThe entire `tapResponse` function should look like this:\n\n```\n@objc\
    \ func tapResponse(sender: UITapGestureRecognizer) {\n    let scene = sender.view\
    \ as! ARSCNView\n    let location = scene.center\n    let hitTestResults = scene.hitTest(location,\
    \ types: .featurePoint)\n    if hitTestResults.isEmpty == false {\n        guard\
    \ let hitTestResults = hitTestResults.first else { return }\n        let sphereNode\
    \ = SCNNode()\n        sphereNode.geometry = SCNSphere(radius: 0.003)\n      \
    \  sphereNode.geometry?.firstMaterial?.diffuse.contents = UIColor.green\n    \
    \    sphereNode.position = SCNVector3(hitTestResults.worldTransform.columns.3.x,\
    \ hitTestResults.worldTransform.columns.3.y, hitTestResults.worldTransform.columns.3.z)\n\
    \        sceneView.scene.rootNode.addChildNode(sphereNode)\n    }\n}\n```\n\n\
    If you test this app, you'll be able to point the plus sign in the center of the\
    \ screen at any real item and tap the screen to place a green sphere.\n\n# Measuring\
    \ Distance Between Virtual Objects\n\nOur ruler app will define two feature points\
    \ detected in the real world, display green spheres to mark their locations, and\
    \ then calculate the distance between the two virtual objects. Finally, it will\
    \ display the result on the screen. First, we'll need to keep track of the two\
    \ points using an array of `SCNNode`s:\n\n```\nvar realPoints = [SCNNode]()\n\
    ```\n\nThis array will store the location of the two feature points, identified\
    \ by green spheres. After we place a green sphere in the augmented reality view,\
    \ we need to store that sphere's location in the array by using the `append` method\
    \ like this:\n\n```\nrealPoints.append(sphereNode)\n```\n\nIf the number of spheres\
    \ added to the augmented reality view is exactly two, then we can calculate the\
    \ distance between those two points. If the number of spheres added is only one\
    \ or zero, then we don't need to do anything, so we need an `if` statement that\
