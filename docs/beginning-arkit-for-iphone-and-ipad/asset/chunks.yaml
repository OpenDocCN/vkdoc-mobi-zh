  trans: '

    ## 概述


    增强现实，尤其是`ARKit`的真正潜力尚未被充分发掘。与需要购买专用 VR 头显的虚拟现实不同，增强现实可以在许多人已拥有的普通 iPhone 和 iPad
    上使用。同样与虚拟现实不同的是，增强现实让你可以在所处的任何地方使用它，并与周围的现实世界进行互动。


    像《`Pokemon GO`》这样的游戏帮助公众接触了增强现实，就像电子游戏曾帮助人们认识早期的个人电脑一样。除了增强现实的娱乐价值之外，越来越多的人和公司将开始看到并使用增强现实的有益应用。


    增强现实的一个简单用途涉及导航方向。通过 iPhone 或 iPad 屏幕查看周围环境，你可以看到街道和建筑物。借助增强现实，你将很快能看到彩色的路径线，为你指引步行前往目的地的最快路线，同时还能看到叠加在道路和店面之上的街道名称和商户名称。


    当你想使用增强现实时，就像拿出 iPhone 或 iPad 一样简单。使用完毕后，只需将 iPhone 或 iPad 收好即可。（而使用虚拟现实，你需要购买专用的虚拟现实头显并将其固定在脸上，从而完全阻隔对周围环境的视线。使用虚拟现实结束后，你仍然需要随身携带或存放那个虚拟现实头显，这使得虚拟现实相比增强现实使用起来不那么方便。）


    增强现实将逐渐在每一部 iPhone 和 iPad 上变得司空见惯。最终，智能眼镜将会出现，无需手持 iPhone 或 iPad 在空中即可显示增强现实。增强现实的未来比你想象中来得更快。通过学习如何使用`ARKit`在今天创建增强现实应用，你将准备好迎接未来，无论它以何种形式呈现。


    # 认识 ARKit


    增强现实的工作原理是通过摄像头追踪现实世界。通过识别现实世界中的实体物体，如地板、桌子和墙壁，增强现实随后能够准确地将虚拟物体放置在场景中，创造出其真实存在的错觉。即使虚拟物体仅仅是一个卡通宝可梦角色，增强现实也必须准确覆盖这个虚拟物体，使其不会在家具、墙壁或桌子处被切断。


    由于即使对于经验丰富的程序员来说，创建用于检测现实世界中物体的算法也可能很困难，苹果创建了一个名为`ARKit`的软件框架，它提供了任何增强现实应用所需的大部分基本功能。通过使用`ARKit`，你可以专注于应用程序的独特功能，而不是处理在现实世界中检测、显示和跟踪虚拟物体的细节，从而创建增强现实应用。


    `ARKit`作为一个平台，供你开发自己的增强现实应用。为了帮助你熟悉使用`ARKit`，`Xcode`提供了一个简单的增强现实项目，你可以通过 USB 线缆将其编译并运行在任何与
    Macintosh 物理连接的兼容 iOS 设备上。要创建这个`ARKit`示例应用，请按照以下步骤操作：


    1.  启动`Xcode`。（请确保你使用的是`Xcode 10`或更高版本。）

    2.  选择`文件` ➤ `新建` ➤ `项目`。`Xcode`会要求你选择一个模板，如图 2-1 所示。

    3.  点击“增强现实应用”图标，然后点击“下一步”按钮。`Xcode`会要求输入产品名称、组织名称、组织标识符和内容技术，如图 2-2 所示。

    4.  点击“产品名称”文本框，为你的项目输入一个描述性名称，例如`ARExample`。（具体名称无关紧要。）

    5.  确保“内容技术”弹出菜单显示`SceneKit`。`SpriteKit`和`Metal`提供了更多功能，但代价是更复杂。本书中，所有增强现实应用都将依赖`SceneKit`。

    6.  确保“包含单元测试”和“包含 UI 测试”复选框未被选中，因为本书创建的任何应用都不会使用这些功能。

    7.  点击“下一步”按钮。`Xcode`会询问你希望将项目存储在何处。

    8.  选择一个文件夹，然后点击“创建”按钮。`Xcode`将创建一个可以立即运行的增强现实项目。

    9.  使用 USB 线缆将你的 iPhone 或 iPad 连接到 Macintosh。

    10. 点击`Xcode`窗口顶部附近的弹出菜单，该菜单显示用于运行项目的设备，如图 2-3 所示。

    11. 选择你的 iOS 设备，例如 iPhone 或 iPad。

    12. 点击“运行”按钮或选择`产品` ➤ `运行`。会出现一个对话框，询问是否允许你的项目访问 iOS 设备的摄像头，如图 2-4 所示。

    13.  你的项目会出现在你的 iOS 设备上。注意会出现一个卡通飞机，如图 2-5 所示。每次运行此项目时，请将你的 iOS 设备指向不同的方向。你的 iOS
    设备摄像头指向哪里，卡通飞机就会出现在哪里。移动你的 iOS 设备，你可以从不同角度查看卡通飞机。

    14.  在`Xcode`中点击“停止”按钮或选择`产品` ➤ `停止`。


    ### 注意


    组织名称和标识符可以是任何文本，例如你的名字或公司名称。组织标识符通常是公司网站地址的反向拼写，例如`com.microsoft`。


    ### 注意


    `Xcode`可能会要求你输入密码以允许你的应用访问额外的库。要授予访问权限，请键入密码并点击“允许”按钮。


    ## 理解 Swift 源代码


    通过使用增强现实应用模板创建项目，你无需编写或修改任何一行代码，就能创建一个可运行的增强现实应用。为了更好地理解如何使用`ARKit`，让我们剖析一下 Swift
    代码，以便你能确切理解发生了什么。


    你的整个增强现实项目包含多个文件，但`ViewController.swift`文件包含了向任何项目添加增强现实功能所需的所有 Swift 代码。首先，注意`ViewController.swift`文件导入了三个软件框架：`UIKit`（定义用户界面）、`SceneKit`（定义用于创建虚拟图像的
    3D 动画）和`ARKit`（链接到`ARKit`增强现实库）。


    ```

    import UIKit

    import SceneKit

    import ARKit

    ```

    '
- fmt: '### Note


    SceneKit 是 Apple 用于创建 3D 动画的框架，但另外两个选择是 SpriteKit 和 Metal。如果你选择其中任何一个选项，你的项目需要导入`SpriteKit`或`Metal`框架而不是`SceneKit`。


    接下来，你必须将`ViewController`类定义为`ARSCNViewDelegate`：


    ```

    class ViewController: UIViewController, ARSCNViewDelegate {

    ```


    现在你需要创建一个用于显示虚拟图像的场景。为此，你需要创建一个 IBOutlet。这个 IBOutlet 的名字可以是任何你喜欢的，但增强现实应用模板将这个
    IBOutlet 命名为`sceneView`，它代表一个`ARSCNView`对象：


    ```

    @IBOutlet var sceneView: ARSCNView!

    ```


    在`viewDidLoad`方法中，你需要定义四项内容。首先，你必须将`ViewController`类设置为其自身的`ARSCNViewDelegate`：


    ```

    // Set the view''s delegate

    sceneView.delegate = self

    ```


    其次，你可以在屏幕上显示统计数据，让你了解诸如每秒帧数（fps）等信息：


    ```

    // Show statistics such as fps and timing information

    sceneView.showsStatistics = true

    ```


    第三，你需要定义要在增强现实场景中显示的实际图像。记住，场景由名为`sceneView`的 IBOutlet 定义：


    ```

    // Create a new scene

    let scene = SCNScene(named: "art.scnassets/ship.scn")!

    ```


    如果你在 Xcode 中点击`art.scnassets`文件夹，你可以看到两个名为`ship.scn`和`texture.png`的图形文件，如图 [2-6](#469983_1_En_2_Chapter.xhtml#Fig6)
    所示。


    ![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig6_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig6_HTML.jpg)


    图 2-6

    `art.scnassets`文件夹的内容


    `ship.scn`文件代表一个 SceneKit 图像（注意`.scn`文件扩展名）。你可以与 ARKit 一起使用的另一种图形图像是 COLLADA（COLLAborative
    Design Activity）文件，它具有`.dae`文件扩展名。几乎所有的 3D 创作工具，如 SketchUp，都可以将文件导出为`.dae`格式，这是一种存储
    3D 图像的开放标准。


    `ship.scn`文件定义了飞机的 3D 形状。`texture.png`图形文件定义了应用于`ship.scn`图像以显示不同颜色或图案的图像。在大多数情况下，你既需要一个
    3D 图像（一个`.scn`或`.dae`文件），也需要一个纹理（一个`.png`文件），该纹理包裹在 3D 图像上，并为该 3D 图像提供“皮肤”或外部图形。如果你点击`texture.png`文件，你可以看到它的样子，如图
    [2-7](#469983_1_En_2_Chapter.xhtml#Fig7) 所示。


    ![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig7_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig7_HTML.jpg)


    图 2-7

    `texture.png`文件定义了 3D 图像的“皮肤”


    第四，在用一个变量名（`scene`）定义了 3D 图像之后，你需要将这个 3D 图像放入实际的场景视图中：


    ```

    // Set the scene to the view

    sceneView.scene = scene

    ```


    在`viewWillAppear`方法中，你需要两行额外的 Swift 代码。第一行打开 iOS 设备的跟踪功能，以测量你瞄准 iOS 设备相机时的位置和角度：


    ```

    // Create a session configuration

    let configuration = ARWorldTrackingConfiguration()

    ```


    第二行运行实际的增强现实会话：


    ```

    // Run the view''s session

    sceneView.session.run(configuration)

    ```


    ## Understanding the User Interface


    增强现实应用模板的用户界面由故事板中的一个单一视图组成。在该视图上有一个`ARSCNView`对象，它填满了整个视图，如图 [2-8](#469983_1_En_2_Chapter.xhtml#Fig8)
    所示。这个 ARKit SceneKit 视图允许 SceneKit 3D 图像出现在用户界面上。


    ![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig8_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig8_HTML.jpg)


    图 2-8

    ARKit SceneKit 视图定义了在用户界面上显示 3D 图像的位置


    每个增强现实应用都必须访问 iOS 设备的摄像头。然而，每个应用必须首先请求使用摄像头的权限。要请求访问摄像头的权限，你的应用必须为摄像头定义一个隐私设置。你可以在`Info.plist`文件中查看这个摄像头隐私设置，如图
    [2-9](#469983_1_En_2_Chapter.xhtml#Fig9) 所示。


    ![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig9_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig9_HTML.jpg)


    图 2-9

    `Info.plist`文件定义了 iOS 设备摄像头的隐私设置


    出现在摄像头隐私设置值列中的文本将出现在请求用户允许你的应用访问 iOS 设备摄像头的对话框中。这段文本只是解释你的应用为何需要访问摄像头，例如“此应用程序将使用摄像头进行增强现实。”如果你愿意，可以随时将这段文本更改为其他内容。


    `Info.plist`文件中每个增强现实应用需要的第二行是“所需设备功能”设置。它必须设置为`arkit`，如图 [2-10](#469983_1_En_2_Chapter.xhtml#Fig10)
    所示。


    ![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig10_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig10_HTML.jpg)


    图 2-10

    `Info.plist`文件定义了运行增强现实应用的 iOS 设备的硬件要求


    `Info.plist`文件中的此设置确保你的应用只会在具有运行 ARKit 的适当硬件的 iOS 设备上运行，例如 iPhone 6s 或更高版本，或 iPad
    Pro 或更高版本。'
  raw: '### Note


    SceneKit is Apple’s framework for creating 3D animation, but two other options
    are SpriteKit and Metal. If you choose either of these options, your project would
    need to import the SpriteKit or Metal framework instead of SceneKit.


    Next, you must define the `ViewController` class as the `ARSCNViewDelegate` :


    ```

    class ViewController: UIViewController, ARSCNViewDelegate {

    ```


    Now you need to create a scene for displaying a virtual image. To do this, you
    need to create an IBOutlet. The name of this IBOutlet can be anything you wish,
    but the Augmented Reality App template names this IBOutlet `sceneView` and it
    represents an `ARSCNView` object:


    ```

    @IBOutlet var sceneView: ARSCNView!

    ```


    Within the `viewDidLoad` method , you need to define four items. First, you must
    set the `ViewController` class to its own `ARSCNViewDelegate`:


    ```

    // Set the view''s delegate

    sceneView.delegate = self

    ```


    Second, you can display statistics on the screen that let you know information
    such as frames per second (fps):


    ```

    // Show statistics such as fps and timing information

    sceneView.showsStatistics = true

    ```


    Third, you need to define the actual image to display on the augmented reality
    scene. Remember, the scene is defined by the IBOutlet named `sceneView` :


    ```

    // Create a new scene

    let scene = SCNScene(named: "art.scnassets/ship.scn")!

    ```


    If you click on the art.scnassets folder in Xcode, you can see two graphic files
    called `ship.scn` and `texture.png` , as shown in Figure [2-6](#469983_1_En_2_Chapter.xhtml#Fig6).


    ![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig6_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    The contents of the art.scnassets folder


    The `ship.scn` file represents a SceneKit image (notice the .scn file extension).
    Another type of graphic image you can use with ARKit is the COLLADA (COLLAborative
    Design Activity) file, which has the .dae file extension. Nearly all 3D authoring
    tools, such as SketchUp, can export files to the .dae format, which is an open
    standard for storing 3D images.


    The `ship.scn` file defines the 3D shape of the plane. The `texture.png` graphic
    file defines the image that gets applied on the `ship.scn` image to display different
    colors or patterns. In most cases, you’ll need both a 3D image (a .scn or .dae
    file) and a texture (a .png file) that wraps around the 3D image and provides
    the “skin” or outside graphics for that 3D image. If you click on the `texture.png`
    file, you can see what it looks like, as shown in Figure [2-7](#469983_1_En_2_Chapter.xhtml#Fig7).


    ![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig7_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig7_HTML.jpg)


    Figure 2-7


    The texture.png file defines the “skin” of a 3D image


    Fourth, after defining the 3D image with a variable name (`scene`), you need to
    put this 3D image into the actual scene view:


    ```

    // Set the scene to the view

    sceneView.scene = scene

    ```


    In the `viewWillAppear` method , you need two additional lines of Swift code.
    The first line turns on the iOS device’s tracking to measure the location and
    angle you aim the iOS device’s camera:


    ```

    // Create a session configuration

    let configuration = ARWorldTrackingConfiguration()

    ```


    The second line runs the actual augmented reality session:


    ```

    // Run the view''s session

    sceneView.session.run(configuration)

    ```


    ## Understanding the User Interface


    The user interface for the Augmented Reality App Template consists of a single
    view in a storyboard. On that view is an `ARSCNView` object that fills the entire
    view, as shown in Figure [2-8](#469983_1_En_2_Chapter.xhtml#Fig8). This ARKit
    SceneKit View allows SceneKit 3D images to appear on the user interface.


    ![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig8_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig8_HTML.jpg)


    Figure 2-8


    The ARKit SceneKit View defines where to display the 3D image on the user interface


    Every augmented reality app must access the iOS device’s camera. However, every
    app must first ask for permission to use the camera. To ask for permission to
    access the camera, your app must define a privacy setting for the camera. You
    can view this camera privacy setting in the `Info.plist` file , as shown in Figure
    [2-9](#469983_1_En_2_Chapter.xhtml#Fig9).


    ![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig9_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig9_HTML.jpg)


    Figure 2-9


    The Info.plist file defines the privacy setting for the iOS device camera


    The text that appears in the Value column of the camera privacy setting will appear
    in the dialog that asks the user’s permission for your app to access the iOS device’s
    camera. This text is simply an explanation for why your app needs access to the
    camera, such as “This application will use the camera for Augmented Reality.”
    You can always change this text to something else if you wish.


    The second line in the `Info.plist` file that every augmented reality app needs
    is the Required Device Capabilities setting. It must be set to arkit, as shown
    in Figure [2-10](#469983_1_En_2_Chapter.xhtml#Fig10).


    ![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig10_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig10_HTML.jpg)


    Figure 2-10


    The Info.plist file defines the hardware requirements for an iOS device to run
    augmented reality apps


    This setting in the `Info.plist` file makes sure your app will only attempt to
    run on an iOS device with the proper hardware capable of running ARKit such as
    an iPhone 6s or higher, or an iPad Pro or higher.'
