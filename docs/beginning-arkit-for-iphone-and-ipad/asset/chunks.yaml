    \n![../images/469983_1_En_11_Chapter/469983_1_En_11_Fig7_HTML.jpg](images/469983_1_En_11_Chapter/469983_1_En_11_Fig7_HTML.jpg)\n\
    \nFigure 11-7\n\nAdding a plane to a vertical surface\n\n1.  Connect an iOS device\
    \ to your Macintosh through its USB cable.\n\n2.  Click the Run button or choose\
    \ Product ➤ Run. The first time you run this app, it will ask permission to access\
    \ the camera so give it permission.\n\n3.  Aim the iOS device’s camera at a vertical\
    \ plane such as a wall or a door. Pick a vertical surface that isn’t smooth but\
    \ has plenty of distinctive features for the app to identify as tiny yellow feature\
    \ points on the screen. The more feature points the app can identify on a vertical\
    \ plane, the more likely it will be able to identify that vertical plane. The\
    \ first time ARKit identifies a vertical plane, the Xcode debug area displays\
    \ the message “plane detected”.\n\n4.  Tap the screen. The image of your painting\
    \ appears on the vertical plane, as shown in Figure [11-7](#469983_1_En_11_Chapter.xhtml#Fig7).\n\
    \nAs you can see, detecting vertical planes is identical to detecting horizontal\
    \ planes.\n\n## Summary\n\nDetecting horizontal or vertical planes can be crucial\
    \ when you want to add virtual objects to the real world. You simply need to use\
    \ one line of code to detect horizontal or vertical planes:\n\n```\nconfiguration.planeDetection\
    \ = .horizontal\n```\n\nOr\n\n```\nconfiguration.planeDetection = .vertical\n\
    ```\n\nOnce ARKit detects a horizontal or vertical plane, it can define that plane\
    \ with a texture image, such as water, bricks, or sand. As you move an iOS device’s\
    \ camera around, the size of a detected plane will gradually grow.\n\n# 12. Physics\
    \ on Virtual Objects\n\nSo far when we’ve added virtual objects to an augmented\
    \ reality view, those virtual objects simply float in mid-air. While this might\
    \ be suitable in some cases, in other cases you might want the virtual objects\
    \ to behave more like real objects that can fall, bounce, and collide with one\
    \ another.\n\nTo give virtual objects the same characteristics as real objects,\
    \ you can define physical characteristics to any virtual object. That means you\
    \ can define how a virtual object interacts with others (static, dynamic, or kinematic),\
    \ the shape of a virtual object such as a box or sphere, and the force applied\
    \ to a virtual object.\n\nA virtual object can behave in one of three ways:\n\n\
    *   Static—Cannot move and is unaffected by collisions or force.\n\n*   Dynamic—Affected\
    \ by forces and collisions.\n\n*   Kinematic—Not affected by forces or collisions,\
    \ but can affect dynamic virtual objects.\n\nStatic virtual objects are fine for\
    \ scenery that simply exists. So far, all the virtual objects we’ve created so\
    \ far have been static in that they don’t move or affect any other virtual objects.\n\
    \nDynamic virtual objects are more interesting because they can move and be affected\
    \ by gravity, which means they’ll fall to the ground along the y-axis. A dynamic\
    \ virtual object can move and bounce off other dynamic or kinematic virtual objects.\n\
    \nKinematic virtual objects don’t move but they can collide with dynamic virtual\
    \ objects. In a video game, a stationary item like a road or an obstacle could\
    \ be a kinematic virtual object.\n\nTo learn about applying physics to virtual\
    \ objects, let’s create a new Xcode project by following these steps:\n\n1.  Start\
    \ Xcode. (Make sure you’re using Xcode 10 or greater.)\n\n2.  Choose File ➤ New\
    \ ➤ Project. Xcode asks you to choose a template.\n\n3.  Click the iOS category.\n\
    \n4.  Click the Single View App icon and click the Next button. Xcode asks for\
    \ a product name, organization name, organization identifiers, and content technology.\n\
    \n5.  Click in the Product Name text field and type a descriptive name for your\
    \ project, such as `Physics`. (The exact name does not matter.)\n\n6.  Click the\
    \ Next button. Xcode asks where you want to store your project.\n\n7.  Choose\
    \ a folder and click the Create button. Xcode creates an iOS project.\n\nNow modify\
    \ the `Info.plist` file to allow access to the camera and to use ARKit by following\
    \ these steps:\n\n1.  Click the `Info.plist` file in the Navigator pane. Xcode\
    \ displays a list of keys, types, and values.\n\n2.  Click the disclosure triangle\
    \ to expand the Required Device Capabilities category to display Item 0.\n\n3.\
    \  Move the mouse pointer over Item 0 to display a plus (+) icon.\n\n4.  Click\
    \ this plus (+) icon to display a blank Item 1.\n\n5.  Type `arkit` under the\
    \ Value category in the Item 1 row.\n\n6.  Move the mouse pointer over the last\
    \ row to display a plus (+) icon.\n\n7.  Click on the plus (+) icon to create\
    \ a new row. A popup menu appears.\n\n8.  Choose Privacy – Camera Usage Description.\n\
    \n9.  Type `AR needs to use the camera` under the Value category in the Privacy –\
    \ Camera Usage Description row.\n\nNow it’s time to modify the `ViewController.swift`\
    \ file to use ARKit and SceneKit by following these steps:\n\n1.  Click on the\
    \ `ViewController.swift` file in the Navigator pane.\n\n2.  Edit the `ViewController.swift`\
    \ file so it looks like this:\n\n```\n    import UIKit\n    import SceneKit\n\
    \    import ARKit\n    class ViewController: UIViewController, ARSCNViewDelegate\
    \ {\n    let configuration = ARWorldTrackingConfiguration()\n    override func\
    \ viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional setup after\
    \ loading the view, typically from a nib.\n    }\n    }\n    ```\n\nTo view augmented\
    \ reality in our app, add a single ARKit SceneKit View (ARSCNView) and expand\
    \ it so it fills the entire user interface. Then add constraints by choosing Editor\
    \ ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints at the bottom\
    \ half of the menu under the All Views in Container category."
