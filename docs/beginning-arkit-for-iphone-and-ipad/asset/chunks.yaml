    import UIKit

    import SceneKit

    import ARKit

    class ViewController: UIViewController, ARSCNViewDelegate  {

    @IBOutlet var sceneView: ARSCNView!

    let configuration = ARWorldTrackingConfiguration()

    struct Images {

    var title: String

    var info: String

    }

    var imageArray: [Images] = []

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]

    sceneView.delegate = self

    guard let storedImages =  ARReferenceImage.referenceImages(inGroupNamed: "AR Resources",
    bundle: nil) else {

    fatalError("Missing AR Resources images")

    }

    configuration.detectionImages = storedImages

    getData()

    sceneView.session.run(configuration)

    }

    func renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:
    ARAnchor) {

    if anchor is ARImageAnchor {

    print("Item recognized")

    }

    }

    func renderer(_ renderer: SCNSceneRenderer, nodeFor anchor: ARAnchor) -> SCNNode?
    {

    guard let imageAnchor = anchor as? ARImageAnchor else { return nil }

    let plane = SCNPlane(width: imageAnchor.referenceImage.physicalSize.width, height:
    imageAnchor.referenceImage.physicalSize.height)

    plane.firstMaterial?.diffuse.contents = UIColor.clear

    let planeNode = SCNNode()

    planeNode.geometry = plane

    let ninetyDegrees = GLKMathDegreesToRadians(-90)

    planeNode.eulerAngles = SCNVector3(ninetyDegrees, 0, 0)

    switch imageAnchor.referenceImage.name {

    case "CRS-15":

    let title = SCNText(string: imageArray[0].title, extrusionDepth: 0.0)

    title.flatness = 0.1

    title.font = UIFont.boldSystemFont(ofSize: 10)

    let titleNode = SCNNode()

    titleNode.geometry = title

    titleNode.geometry?.firstMaterial?.diffuse.contents = UIColor.white

    titleNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)

    titleNode.position.x = -Float(plane.width) / 2.2

    titleNode.position.y = -Float(plane.height) / 2.2

    planeNode.addChildNode(titleNode)

    let info = SCNText(string: imageArray[0].info, extrusionDepth: 0.0)

    info.flatness = 0.1

    info.font = UIFont.boldSystemFont(ofSize: 8)

    let infoNode = SCNNode()

    infoNode.geometry = info

    infoNode.geometry?.firstMaterial?.diffuse.contents = UIColor.gray

    infoNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)

    infoNode.position.x = -Float(plane.width) / 2.2

    infoNode.position.y = -Float(plane.height) / 1.8

    planeNode.addChildNode(infoNode)

    case "SaturnV":

    let title = SCNText(string: imageArray[1].title, extrusionDepth: 0.0)

    title.flatness = 0.1

    title.font = UIFont.boldSystemFont(ofSize: 10)

    let titleNode = SCNNode()

    titleNode.geometry = title

    titleNode.geometry?.firstMaterial?.diffuse.contents = UIColor.white

    titleNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)

    titleNode.position.x = -Float(plane.width) / 2.2

    titleNode.position.y = -Float(plane.height) / 2.2

    planeNode.addChildNode(titleNode)

    let info = SCNText(string: imageArray[1].info, extrusionDepth: 0.0)

    info.flatness = 0.1

    info.font = UIFont.boldSystemFont(ofSize: 8)

    let infoNode = SCNNode()

    infoNode.geometry = info

    infoNode.geometry?.firstMaterial?.diffuse.contents = UIColor.gray

    infoNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)

    infoNode.position.x = -Float(plane.width) / 2.2

    infoNode.position.y = -Float(plane.height) / 1.8

    planeNode.addChildNode(infoNode)

    default:

    print("Nothing found")

    }

    let node = SCNNode()

    node.addChildNode(planeNode)

    return node

    }

    func getData() {

    let item1 = Images(title: "CRS-15 SpaceX rocket", info: "Commercial Resupply Service")

    let item2 = Images(title: "Saturn V rocket", info: "Apollo moon launch vehicle")

    imageArray.append(item1)

    imageArray.append(item2)

    }

    }

    ```


    If you run this app, you’ll see the title text appear in the lower-right corner
    of the image while the info text appears below, as shown in Figure [14-5](#469983_1_En_14_Chapter.xhtml#Fig5).


    ![../images/469983_1_En_14_Chapter/469983_1_En_14_Fig5_HTML.jpg](images/469983_1_En_14_Chapter/469983_1_En_14_Fig5_HTML.jpg)


    Figure 14-5


    Displaying text in an augmented reality view


    ## Summary


    Image detection works by storing one or more images in a special `AR Resources`
    folder and then using the iOS device’s camera to run multiple renderer functions
    when ARKit recognizes one of its many stored images. When you drag and drop an
    image into the `AR Resources` folder, you must define that image’s physical width
    and height. In addition, you also need to give each image a distinct name so you
    can use that name later to identify which recognized image the iOS device’s camera
    currently has found.


    Once you’re able to use the name of each recognized image to specify which particular
    image has been recognized, you can display text related to that image within the
    augmented reality view. This text can appear positioned within or outside the
    boundaries of the recognized image.


    Image detection works best with high-resolution pictures. By using image detection,
    your augmented reality apps can respond to real-world objects and provide information
    about that object as virtual text that’s only visible when seen through the camera
    of an iOS device.


    # 15. Displaying Video and Virtual Models


    In Chapter [14](#469983_1_En_14_Chapter.xhtml), we learned how to use image detection
    to detect specific items and then respond by displaying text related to that particular
    image. In this chapter, we’ll continue using image detection but instead of displaying
    text as virtual objects, we’re going to learn how to display videos or virtual
    models.


    When using videos with image detection, users will be able to aim an iOS device’s
    camera at a still image and the augmented reality view will display a video over
    that image.


    When using virtual models with image detection, users will be able to aim an iOS
    device’s camera at a still image and see a three-dimension virtual model float
    in mid-air in front of the image.


    To learn about using video and virtual models with image detection, we’re going
    to modify the image detection project created in Chapter [14](#469983_1_En_14_Chapter.xhtml).
    You can make a copy of that project or just modify the existing code.


    First, let’s edit the code in the project to make room for adding code to display
    video and virtual models. Delete all the code inside the `switch` statement in
    the `nodeFor renderer` function so it looks like this:


    ```

    switch imageAnchor.referenceImage.name {

    case "CRS-15":

    print("1st image")

    case "SaturnV":

    print("2nd image")

    default:

    print("Nothing found")

    }

    ```


    Now we need to drag and drop an `.scn` file into our Xcode project. The simplest
    way to do that is to create an Augmented Reality App by choosing File ➤ New ➤
    Project. This creates a sample augmented reality app that includes the `ship.scn`
    SceneKit file inside an `art.scnassets` folder.


    With two Xcode windows open side by side, drag and drop `ship.scn` and its accompanying
    `texture.png` file from the sample augmented reality project Xcode window into
    the Navigator pane of your current project’s Xcode window.


    Now you’ll need to drag and drop a `.mov` video file into the Navigator pane as
    well. This video can be anything you want, such as a video captured off your iPhone
    or a video file downloaded from the Internet.


    When you have both the `ship.scn` and a `.mov` file in the Navigator pane of your
    current project, click on each file and make sure the check box is selected under
    the Target Membership category, as shown in Figure [15-1](#469983_1_En_15_Chapter.xhtml#Fig1).
    If the Target Membership check box is not selected, Xcode won’t include the file
    in your current project even though it appears in the Navigator pane.


    ![../images/469983_1_En_15_Chapter/469983_1_En_15_Fig1_HTML.jpg](images/469983_1_En_15_Chapter/469983_1_En_15_Fig1_HTML.jpg)


    Figure 15-1


    The Target Membership check box must be selected for your `.scn` and `.mp4` files'
