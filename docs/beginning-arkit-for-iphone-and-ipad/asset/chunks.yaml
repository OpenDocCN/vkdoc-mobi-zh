    # 增强现实应用


    您也可以使用此应用程序来查看柏林的不同区域，应用会播放一段视频，展示在柏林墙仍存时期该区域的模样，如图 1-7 所示。增强现实的此类应用，使得柏林墙纪念馆从一个布满静态图像和场所的博物馆，转变为一个视觉上充满活力的展示，让历史仿佛就在您眼前重现。


    ![../images/469983_1_En_1_Chapter/469983_1_En_1_Fig7_HTML.jpg](img/469983_1_En_1_Fig7_HTML.jpg)


    图 1-7

    增强现实向游客展示 20 世纪 60 年代柏林的风貌


    增强现实很可能会在广告中变得普遍。百事可乐曾利用增强现实作为促销噱头，在一个热门的伦敦公交站设置了摄像头和屏幕。当人们等车时，屏幕上显示的增强现实画面包括老虎在人行道上行走、巨型机器人攻击城市、陨石撞击地面以及
    UFO 在空中漂浮，如图 1-8 所示。


    ![../images/469983_1_En_1_Chapter/469983_1_En_1_Fig8_HTML.jpg](img/469983_1_En_1_Fig8_HTML.jpg)


    图 1-8

    百事可乐将增强现实用作促销噱头


    正如世界各地的空军为其飞行员依赖平视显示器一样，地面上的士兵们也将很快依赖类似的平视显示器来帮助他们识别周围的目标。美国陆军正在开发**战术增强现实**（`TAC`）系统，士兵将佩戴智能眼镜，以便能看到周围世界的增强视图，包括夜视功能和可能目标的识别，如图
    1-9 所示。


    ![../images/469983_1_En_1_Chapter/469983_1_En_1_Fig9_HTML.jpg](img/469983_1_En_1_Fig9_HTML.jpg)


    图 1-9

    未来的士兵可能佩戴带有平视显示器的智能眼镜以识别潜在目标


    迪士尼公司正在试验使用增强现实来创建互动涂色书。当孩子为一幅图像上色时，他们可以将该图像看作一个三维角色，正站在他们面前的页面上，如图 1-10 所示。


    ![../images/469983_1_En_1_Chapter/469983_1_En_1_Fig10_HTML.jpg](img/469983_1_En_1_Fig10_HTML.jpg)


    图 1-10

    增强现实可以创建互动涂色书


    游戏、广告、平视显示器和互动书籍只是增强现实提供的众多可能性中的一部分。时至今日，苹果公司仍在持续收购增强现实公司以完善其增强现实计划，例如`ARKit`。2016
    年，苹果收购了专注于空间识别的增强现实公司 Flyby Media。Flyby Media 的技术能让增强现实设备理解移动设备与周围真实世界物体之间的距离。


    2017 年，苹果收购了 SensoMotoric Instruments，该公司专门从事可用于虚拟现实和增强现实眼镜的眼球追踪技术。同年，苹果收购了专注于混合现实头显的公司
    VRvana。2018 年，苹果收购了初创公司 Akonia Holographics，该公司声称他们制造“用于智能眼镜透明显示元件的全息反射与波导光学元件”。


    通过追踪苹果最新的增强现实收购动态，您可以预见哪些新功能最终会出现在 iPhone 和 iPad 等 iOS 设备的`ARKit`上，以及未来的智能眼镜或汽车平视显示器等设备中。`ARKit`的功能将持续增长，同时让所有希望在自己
    iOS 应用中添加增强现实功能的`Swift`和`Objective-C`开发者都能使用增强现实。现在学习`ARKit`，您就可以现在乃至未来都能创建增强现实应用。


    ### 注意


    增强现实最适合配备摄像头的移动设备，如 iPhone 和 iPad。这意味着`ARKit`是为创建 iOS 应用而设计的，并不适用于苹果的其他操作系统，如`MacOS`、`tvOS`或`watchOS`。


    ## ARKit 的系统要求


    由于增强现实需要处理能力、摄像头和高分辨率显示屏，您只能在现代的 iOS 设备上创建和运行`ARKit`应用。这意味着`ARKit`应用只能在 iPhone
    6s/6s Plus 或更高版本以及 iPad Pro 上运行。较旧的 iOS 设备，如 iPhone 5s 或 iPad mini，将无法运行`ARKit`应用。随着人们弃用旧的
    iOS 设备转而使用新机型，这个限制不会是大问题，但目前请注意，您创建的`ARKit`应用可能无法在一些人的旧款 iOS 设备上运行。


    要创建应用，您需要使用苹果的免费`Xcode`编译器。创建普通的 iOS 应用时，您可以在`Simulator`程序上测试它们，该程序让您的 Macintosh
    模拟不同的 iPhone 和 iPad 型号，例如 iPhone 4s。创建使用`ARKit`的 iOS 应用时，您将无法在`Simulator`程序上测试您的应用。相反，您需要一个物理
    iOS 设备，例如 iPhone 6s 或更新型号，或 iPad Pro，您需要通过其 USB 数据线将其连接到您的 Macintosh。您只能通过物理设备测试`ARKit`应用，因为您需要使用真实
    iOS 设备中的摄像头。


    最后，要创建使用`ARKit`的 iOS 应用，您可以在苹果的两种官方编程语言——`Swift`和`Objective-C`——之间进行选择。虽然许多较旧的应用程序是用`Objective-C`编写的，但`Swift`是苹果未来的编程语言。`Swift`不仅与`Objective-C`一样强大，而且速度更快，学习起来也容易得多。尽管您可以使用`Objective-C`来创建`ARKit`应用，但最好完全专注于使用`Swift`来创建`ARKit`应用。`Swift`只会越来越受欢迎，而随着时间的推移，随着更多开发者拥抱`Swift`，`Objective-C`的受欢迎程度将持续下降。因为苹果开发的未来是`Swift`而不是`Objective-C`，所以本书完全专注于使用`Swift`来创建`ARKit`应用。


    要在本书中创建增强现实应用，您需要一台 Macintosh 和一份`Xcode 10`或更高版本。您还需要一个 iOS 设备，如 iPhone 或 iPad，您可以通过其
    USB 数据线将其连接到 Macintosh。为了充分利用`ARKit`的所有最新功能，您的 iOS 设备还应运行`iOS 12`或更高版本。

    '
- fmt: '## Summary


    The true potential of augmented reality and `ARKit` in particular is yet to be
    realized. Unlike virtual reality, which requires the purchase of a dedicated VR
    headset, augmented reality can be used on ordinary iPhones and iPads that many
    people already own. Also unlike virtual reality, augmented reality lets you use
    it wherever you happen to be as you interact with the real world around you.


    Games like `Pokemon GO` have helped introduce augmented reality to the public
    just as video games helped introduce people to early personal computers. Beyond
    the entertainment value of augmented reality, more people and companies will start
    seeing and using augmented reality for useful applications.


    One simple use for augmented reality involves directions. By viewing your surroundings
    through an iPhone or iPad screen, you can see streets and buildings. With augmented
    reality, you will soon be able to see colored pathways showing you the fastest
    way to walk to your destination along with street names and business names overlaid
    over roads and storefronts.


    When you want to use augmented reality, it’s as easy as pulling out your iPhone
    or iPad. When you’re done using augmented reality, just put your iPhone or iPad
    away. (To use virtual reality, you have to buy a dedicated virtual reality headset
    and strap it over your face, cutting off your view of your surroundings. When
    you’re done with virtual reality, you still have to lug around the virtual reality
    headset or store it somewhere, which makes virtual reality less convenient to
    use than augmented reality.)


    Augmented reality will gradually become commonplace on every iPhone and iPad.
    Eventually, smart glasses will appear that will display augmented reality without
    the need to hold an iPhone or iPad in the air. The future of augmented reality
    is coming faster than you think. By learning how to create augmented reality apps
    today using `ARKit`, you’ll be ready for the future, whatever form it may take.


    # Getting to Know ARKit


    Augmented reality works by tracking the real world through a camera. By identifying
    solid objects in the real world such as floors, tables, and walls, augmented reality
    can then accurately place virtual objects on the scene that create the illusion
    of actually being there. Even if the virtual object is nothing more than a cartoon
    Pokémon character, augmented reality must overlay that virtual object so the virtual
    object doesn’t get cut in half by furniture, walls, or tables.


    Since creating algorithms for detecting objects in the real world can be difficult
    even for experienced programmers, Apple created a software framework called `ARKit`,
    which provides much of the basic needs of any augmented reality app. By using
    `ARKit`, you can create augmented reality apps by focusing on the unique features
    of your app rather than on the details of detecting, displaying, and tracking
    virtual objects in the real world.


    `ARKit` acts as a platform for you to develop your own augmented reality apps.
    To help you get familiar using `ARKit`, `Xcode` provides a simple augmented reality
    project that you can compile and run on any compatible iOS device physically connected
    to your Macintosh through its USB cable. To create this `ARKit` sample app, follow
    these steps:


    1.  Start `Xcode`. (Make sure you’re using `Xcode 10` or greater.)

    2.  Choose `File` ➤ `New` ➤ `Project`. `Xcode` asks you to choose a template,
    as shown in Figure 2-1.

    3.  Click the Augmented Reality App icon and click the Next button. `Xcode` asks
    for a product name, organization name, organization identifiers, and content technology,
    as shown in Figure 2-2.

    4.  Click in the Product Name text field and type a descriptive name for your
    project, such as `ARExample`. (The exact name does not matter.)

    5.  Make sure the Content Technology popup menu displays `SceneKit`. `SpriteKit`
    and `Metal` give you more versatility at the expense of more complexity. For the
    purposes of this book, all augmented reality apps will rely on `SceneKit`.

    6.  Make sure the Include Unit Tests and Include UI Tests check boxes are not
    checked since we won’t be using these features in any of the apps created in this
    book.

    7.  Click the Next button. `Xcode` asks where you want to store your project.

    8.  Choose a folder and click the Create button. `Xcode` creates an augmented
    reality project that’s ready to run.

    9.  Connect your iPhone or iPad to your Macintosh using its USB cable.

    10. Click on the popup menu near the top of `Xcode` window that displays the device
    to run your project on, as shown in Figure 2-3.

    11. Choose your iOS device, such as an iPhone or iPad.

    12. Click the Run button or choose `Product` ➤ `Run`. A dialog appears, asking
    if you want to allow your project to access the iOS device’s camera, as shown
    in Figure 2-4.

    13. Your project appears on your iOS device. Notice that a cartoon airplane appears,
    as shown in Figure 2-5. Each time you run this project, point your iOS device
    in a different direction. Whatever direction your iOS device’s camera points at
    is where the cartoon airplane will appear. Move your iOS device around and you’ll
    be able to see the cartoon airplane from different angles.

    14. Click the Stop button in `Xcode` or choose `Product` ➤ `Stop`.


    ### Note


    The organization name and identifier can be any text such as your name or company
    name. The organization identifier is typically the website address of your company
    spelled backwards, such as `com.microsoft`.


    ### Note


    `Xcode` may ask for your password to allow your app to access additional libraries.
    To grant access, type your password and click the Allow button.


    ## Understanding the Swift Source Code


    By creating a project using the Augmented Reality App template, you can create
    a working augmented reality app without writing or modifying a single line of
    code. To better understand how to use `ARKit`, let’s dissect the Swift code so
    you can understand exactly what’s happening.


    Your entire augmented reality project consists of several files, but the `ViewController.swift`
    file contains all the Swift code you need to add augmented reality to any project.
    First, notice that the `ViewController.swift` file imports three software frameworks:
    `UIKit` (defines the user interface), `SceneKit` (defines the 3D animation used
    to create virtual images), and `ARKit` (links to the `ARKit` augmented reality
    library).


    ```

    import UIKit

    import SceneKit

    import ARKit

    ```'
