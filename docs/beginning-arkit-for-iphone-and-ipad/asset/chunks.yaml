- fmt: "8.  Click the Connect button. Xcode creates an `IBAction` method.\n\n9.  Edit\
    \ this `addButton IBAction` method like this:\n\n```\n    @IBAction func addButton(_\
    \ sender: UIButton) {\n    showShape()\n    }\n```\n\n10.  Modify the `showShape()`\
    \ function like this:\n\n```\n    func showShape() {\n    let node = SCNNode()\n\
    \    node.geometry = SCNSphere(radius: 0.05)\n    node.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.yellow\n    node.position = SCNVector3(Xslider.value,Yslider.value,Zslider.value)\n\
    \    node.name = \"sphere\"\n    sceneView.scene.rootNode.addChildNode(node)\n\
    \    }\n```\n\nThe `showShape()` function creates yellow spheres that are placed\
    \ in the augmented reality view based on the x, y, and z coordinates defined by\
    \ the three sliders (`Xslider`, `Yslider`, and `Zslider`) on the user interface.\
    \ The first step to creating a virtual object is to define a node:\n\n```\n  \
    \  let node = SCNNode()\n```\n\n`SCNNode` defines a SceneKit node where a node\
    \ simply represents a virtual object. Once we’ve defined a node, we need to define\
    \ an actual object to appear. SceneKit offers several different geometric shapes\
    \ to choose, but for this example, we’ll use a sphere and define its radius as\
    \ 0.05 meters:\n\n```\n    node.geometry = SCNSphere(radius: 0.05)\n```\n\nThe\
    \ `geometry` property defines the node’s shape, which is a sphere. To make that\
    \ object visible, we need to define its material. For this example, we’ll choose\
    \ the color yellow and diffuse it across the entire surface of the sphere:\n\n\
    ```\n    node.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n```\n\
    \nNext, we need to define the node’s position, which requires an x, y, and z floating\
    \ point value. Rather than define fixed values, we’ll retrieve the values from\
    \ the three sliders on the user interface:\n\n```\n    node.position = SCNVector3(Xslider.value,Yslider.value,Zslider.value)\n\
    ```\n\nEach time we add a new node (sphere), let’s give it a name. This name will\
    \ be important later when we need to remove all spheres from the augmented reality\
    \ view. The name can be anything so just call it `sphere`:\n\n```\n    node.name\
    \ = \"sphere\"\n```\n\nFinally, we need to add this node to the root node. ARKit\
    \ organizes everything displayed as a hierarchy where every augmented reality\
    \ view comes with a single root node. Each time you create a new object to display\
    \ in an augmented reality view, that new object is a node that becomes a child\
    \ node to the root node. Every augmented reality view contains one root node and\
    \ zero or more child nodes:\n\n```\n    sceneView.scene.rootNode.addChildNode(node)\n\
    ```\n\n11.  Modify the `resetButton` function like this:\n\n```\n    @IBAction\
    \ func resetButton(_ sender: UIButton) {\n    sceneView.session.pause()\n    sceneView.scene.rootNode.enumerateChildNodes\
    \ { (node, _) in\n    if node.name == \"sphere\" {\n    node.removeFromParentNode()\n\
    \    }\n    }\n    sceneView.session.run(configuration, options: [.resetTracking])\n\
    \    }\n```\n\n![Figure 3-11](images/469983_1_En_3_Chapter/469983_1_En_3_Fig11_HTML.jpg)\n\
    \n### Creating an IBOutlet for a slider\n\n1.  Click on the Assistant Editor icon\
    \ or choose **View** ➤ **Assistant Editor** ➤ **Show Assistant Editor**. Xcode\
    \ displays the `ViewController.swift` file side by side with the `Main.storyboard`\
    \ file.\n2.  Click on each slider, hold down the **Control** key, and drag the\
    \ mouse to the `ViewController.swift` file under the existing `IBOutlet`, as shown\
    \ in Figure 3-11.\n\nThis `resetButton` function first pauses the current augmented\
    \ reality session, then it checks each child node. If the name of that child node\
    \ happens to be `sphere`, then it removes that node from the root node.\n\nThis\
    \ `if` statement to check if a node’s name is `sphere` is important because, when\
    \ the app displays the world origin, that’s also a child node connected to the\
    \ root node. Suppose you just had the following code:\n\n```\nsceneView.scene.rootNode.enumerateChildNodes\
    \ { (node, _) in\nnode.removeFromParentNode()\n}\n```\n\nThis code would remove\
    \ all nodes from the root node, including the world origin. By only removing nodes\
    \ named `sphere`, we can keep the world origin displayed while removing all yellow\
    \ spheres displayed in the augmented reality view.\n\nThe complete `ViewController.swift`\
    \ file should look like this:\n\n```\nimport UIKit\nimport SceneKit\nimport ARKit\n\
    class ViewController: UIViewController, ARSCNViewDelegate {\n@IBOutlet var sceneView:\
    \ ARSCNView!\n@IBOutlet var Xslider: UISlider!\n@IBOutlet var Yslider: UISlider!\n\
    @IBOutlet var Zslider: UISlider!\nlet configuration = ARWorldTrackingConfiguration()\n\
    override func viewDidLoad() {\nsuper.viewDidLoad()\n// Do any additional setup\
    \ after loading the view, typically from a nib.\nsceneView.delegate = self\nsceneView.showsStatistics\
    \ = true\nsceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin]\n}\noverride\
    \ func viewWillAppear(_ animated: Bool) {\nsuper.viewWillAppear(animated)\nsceneView.session.run(configuration)\n\
    }\n@IBAction func addButton(_ sender: UIButton) {\nshowShape()\n}\n@IBAction func\
    \ resetButton(_ sender: UIButton) {\nsceneView.session.pause()\nsceneView.scene.rootNode.enumerateChildNodes\
    \ { (node, _) in\nif node.name == \"sphere\" {\nnode.removeFromParentNode()\n\
    }\n}\nsceneView.session.run(configuration, options: [.resetTracking])\n}\nfunc\
    \ showShape() {\nlet node = SCNNode()\nnode.geometry = SCNSphere(radius: 0.05)\n\
    node.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\nnode.position\
    \ = SCNVector3(Xslider.value,Yslider.value,Zslider.value)\nnode.name = \"sphere\"\
    \nsceneView.scene.rootNode.addChildNode(node)\n}\n}\n```\n\nAttach an iOS device\
    \ to your Macintosh through a USB cable and then click the Run button or choose\
    \ **Product** ➤ **Run**. After a few moments, step back and you should see the\
    \ world origin appear. Move the sliders left or right and then tap the **Add**\
    \ button. Your app should display a yellow sphere at the x, y, and z coordinates\
    \ defined by the three sliders, as shown in Figure 3-12.\n\n![Figure 3-12](images/469983_1_En_3_Chapter/469983_1_En_3_Fig12_HTML.jpg)\n\
    \nYou can repeat this process of changing the slider values and tapping the **Add**\
    \ button to keep adding more yellow spheres. Move your iOS device to a new location\
    \ and tap the **Reset** button. Your app will remove all yellow spheres and display\
    \ the world origin at the current location of your iOS device.\n\n## Summary\n\
    \nIn this chapter, you learned how to display a world origin for debugging purposes\
    \ in helping you verify that your app is placing objects correctly in an augmented\
    \ reality view. Once your app is finished, you’ll need to remove the code that\
    \ makes the world origin appear each time your app displays its augmented reality\
    \ view.\n\nThe world origin helps you position objects by defining its x, y, and\
    \ z coordinates. To display items in an augmented reality view, you need to create\
    \ a node and define a shape for that node, such as a sphere, box, or torus. Next,\
    \ you need to define an object’s appearance, such as yellow or red, along with\
    \ its size.\n\nTo make augmented reality more versatile, you can reset the world\
    \ origin based on a new location the user may hold an iOS device. This ability\
    \ to reset the world origin lets your app display virtual objects wherever the\
    \ user decides to move and point an iOS device.\n\nIn the next chapter, we go\
    \ into more details about creating geometric shapes and applying different textures\
    \ to a shape beyond solid colors."
