    请记住，当你使用 `SCNVector3` 命令为节点（虚拟对象）定义位置时，你只是基于根节点的位置（即世界原点 `(0, 0, 0)`）来定义虚拟对象的位置，就像这样：


    ```

    node.position = SCNVector3(0.2, 0.1, -0.1)

