  trans: "\n# 使用捏合触摸手势进行缩放\n\n捏合手势是一种常见的触摸手势，用于放大或缩小屏幕上显示的图像，例如在查看数码照片时。同样，这一捏合手势也可用于缩放增强现实视图中出现的虚拟平面。\n\
    \n触摸手势包含三种状态：\n*   `.began` — 当应用首次检测到特定触摸手势时发生\n*   `.changed` — 当触摸手势仍在进行时发生\n\
    *   `.ended` — 当应用检测到触摸手势已停止时发生\n\n对于捏合手势，我们只关心它何时正在改变，因为随着用户向内或向外捏合，我们希望按比例缩放增强现实视图中虚拟平面的大小。像这样编辑\
    \ `pinchGesture` 函数：\n\n```\n@IBAction func pinchGesture(_ sender: UIPinchGestureRecognizer)\
    \ {\n    if sender.state == .changed {\n        print(\"Pinch gesture\")\n   \
    \ }\n}\n```\n\n如果你运行此代码并在屏幕上进行捏合操作，应该仍然能在 Xcode 的调试区域看到“Pinch gesture”出现。这验证了应用仍然识别捏合手势。\n\
    \n我们只希望当用户在虚拟平面上直接捏合（而不是在增强现实视图的其他任何部分）时，捏合手势才调整虚拟平面的大小。为了检测用户在屏幕的哪个部分进行了捏合，我们首先需要像这样获取整个增强现实视图：\n\
    \n```\nlet areaPinched = sender.view as? SCNView\n```\n\n现在我们需要获取用户在屏幕上捏合的具体位置：\n\
    \n```\nlet location = sender.location(in: areaPinched)\n```\n\n最后，我们需要使用 `hitTest`\
    \ 方法来确定用户是否触摸到了虚拟平面：\n\n```\nlet hitTestResults = sceneView.hitTest(location,\
    \ options: nil)\nif let hitTest = hitTestResults.first {\n}\n```\n\n如果用户触摸了增强现实视图中的第一个节点（该平面是唯一的节点），那么我们可以用一个任意的名称来标识这个\
    \ `hitTest` 节点，例如：\n\n```\nif let hitTest = hitTestResults.first {\n    let plane\
    \ = hitTest.node\n}\n```\n\n现在，根据用户移动捏合手势的距离，我们可以将此值乘以虚拟平面的当前缩放比例。如果用户向外捏合（两指分开），缩放比例会变大，虚拟平面应该增大尺寸。如果用户向内捏合（两指并拢），缩放比例会变小，虚拟平面应该减小尺寸。以下三行代码测量了虚拟平面在\
    \ x、y 和 z 方向上应如何改变尺寸：\n\n```\nlet scaleX = Float(sender.scale) * plane.scale.x\n\
    let scaleY = Float(sender.scale) * plane.scale.y\nlet scaleZ = Float(sender.scale)\
    \ * plane.scale.z\n```\n\n一旦我们知道虚拟平面在 x、y 和 z 方向上的缩放量，就可以将这些值应用到虚拟平面本身，如下所示：\n\
    \n```\nplane.scale = SCNVector3(scaleX, scaleY, scaleZ)\n```\n\n最后，我们需要将虚拟平面的新尺寸重置为缩放比例为\
    \ 1：\n\n```\nsender.scale = 1\n```\n\n完整的 `pinchGesture` IBAction 方法应如下所示：\n\n\
    ```\n@IBAction func pinchGesture(_ sender: UIPinchGestureRecognizer) {\n    if\
    \ sender.state == .changed {\n        let areaPinched = sender.view as? SCNView\n\
    \        let location = sender.location(in: areaPinched)\n        let hitTestResults\
    \ = sceneView.hitTest(location, options: nil)\n        if let hitTest = hitTestResults.first\
    \ {\n            let plane = hitTest.node\n            let scaleX = Float(sender.scale)\
    \ * plane.scale.x\n            let scaleY = Float(sender.scale) * plane.scale.y\n\
    \            let scaleZ = Float(sender.scale) * plane.scale.z\n            plane.scale\
    \ = SCNVector3(scaleX, scaleY, scaleZ)\n            sender.scale = 1\n       \
    \ }\n    }\n}\n```\n\n通过连接的 iOS 设备运行此应用，并直接在虚拟平面上进行捏合（不要在虚拟平面周围的区域）。你应该能够根据捏合的方向将虚拟平面缩放得更大或更小。\n\
    \n![图 10-3](img/469983_1_En_10_Fig3_HTML.jpg)\n\n图 10-3 捏合手势使虚拟平面放大或缩小\n\n## 使用旋转触摸手势进行旋转\n\
    \n旋转手势也使用两根手指，很像捏合手势。最大的区别在于，捏合手势涉及将两根手指指尖移近或移远，而旋转触摸手势则是将两根手指指尖放在屏幕上并顺时针或逆时针旋转，同时保持两指指尖之间的距离不变。\n\
    \n要在我们的应用中放置旋转手势识别器，请按照以下步骤操作：\n1.  从对象库窗口中拖动 Rotation Gesture Recognizer（旋转手势识别器），并将其放到用户界面上的\
    \ `ARSCNView` 上。尽管你将 Rotation Gesture Recognizer 拖放到了用户界面上，但除了在文档大纲中，你在其他地方看不到它的任何痕迹。\n\
    2.  点击 Assistant Editor 图标或选择 View（视图） ➤ Assistant Editor（助理编辑器） ➤ Show Assistant\
    \ Editor（显示助理编辑器）以并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n3.  将鼠标指针移到文档大纲中的\
    \ Rotation Gesture Recognizer 上，按住 Control 键，然后按住 Control 键并拖动到 `ViewController.swift`\
    \ 文件底部最后一个花括号的上方。\n4.  释放 Control 键和鼠标左键。会出现一个弹出菜单。\n5.  确保 Connection（连接）弹出菜单显示为\
    \ Action（动作）。\n6.  点击 Name（名称）文本字段，输入 `rotationGesture`。\n7.  点击 Type（类型）弹出菜单，选择\
    \ `UIRotationGestureRecognizer`。然后点击 Connect（连接）按钮。Xcode 将创建一个如下所示的 IBAction 方法：\n\
    \    ```\n    @IBAction func rotationGesture(_ sender: UIRotationGestureRecognizer)\
    \ {\n    }\n    ```\n8.  按如下方式编辑这个 IBAction 方法 `rotationGesture`：\n    ```\n \
    \   @IBAction func rotationGesture(_ sender: UIRotationGestureRecognizer) {\n\
    \        print(\"Rotation gesture\")\n    }\n    ```\n9.  通过 USB 数据线将 iOS 设备连接到你的\
    \ Macintosh。\n10. 点击 Run（运行）按钮或选择 Product（产品）➤ Run（运行）。\n11. 将两根手指指尖放在屏幕上，并顺时针或逆时针旋转。Xcode\
    \ 调试区域应显示“Rotation Gesture”，让你知道它成功检测到了旋转手势。\n12. 点击 Stop（停止）按钮或选择 Product（产品）➤\
    \ Stop（停止）。\n\n![图 10-4](img/469983_1_En_10_Fig4_HTML.jpg)\n\n图 10-4 在对象库窗口中查找旋转手势识别器\n\
    \n对于旋转手势，我们需要识别旋转实际何时发生以及旋转最终何时停止。当旋转手势正在进行时，我们需要旋转虚拟平面。一旦旋转结束，我们需要将旋转后的角度存储为虚拟平面的当前角度。\n\
    \n首先，我们需要在 `ARSCNView` 的 IBOutlet 下方创建两个变量，如下所示：\n\n```\nvar newAngleZ : Float\
    \ = 0.0\nvar currentAngleZ : Float = 0.0\n```\n\n在这个例子中，我们将围绕虚拟平面的 z 轴进行旋转，因此\
    \ `currentAngleZ` 存储虚拟平面的当前角度。然后，我们将基于旋转手势计算一个新角度，并将这个新角度存储在 `newAngleZ` 变量中。\n\
    \n一旦这两个变量可用，我们就可以编写检测旋转何时正在发生（`.changed`）以及旋转何时已停止（`.ended`）的代码：\n\n```\n@IBAction\
    \ func rotationGesture(_ sender: UIRotationGestureRecognizer) {\n    if sender.state\
    \ == .changed {\n    } else if sender.state == .ended {\n        currentAngleZ\
    \ = newAngleZ\n    }\n}\n```\n\n一旦旋转手势结束，我们希望将新的旋转角度（`newAngleZ`）存储到 `currentAngleZ`\
    \ 变量中。\n"
- fmt: "# 旋转虚拟平面\n\n一旦检测到旋转手势，我们需要确认该手势是否发生在虚拟平面上。为此，我们需要获取被触摸的视图、用户指尖的位置，并使用 `hitTest`\
    \ 方法来判断是否触摸到了增强现实视图中的任何虚拟对象：\n\n```\nlet areaTouched = sender.view as? SCNView\n\
    let location = sender.location(in: areaTouched)\nlet hitTestResults = sceneView.hitTest(location,\
    \ options: nil)\n```\n\n接下来，我们需要检查旋转手势是否发生在增强现实视图中的第一个（且唯一的）虚拟对象上：\n\n```\nif\
    \ let hitTest = hitTestResults.first {\n}\n```\n\n然后，我们将创建一个名为 `plane` 的常量来代表用户触摸的节点（即虚拟平面），并将手势的旋转角度存储在\
    \ `newAngleZ` 变量中。\n\n```\nlet plane = hitTest.node\nnewAngleZ = Float(-sender.rotation)\n\
    ```\n\n负号对于协调屏幕上的旋转手势与增强现实视图中虚拟平面的旋转是必需的。如果没有这个负号，虚拟平面将朝与旋转手势相反的方向旋转。\n\n我们将把这个新的旋转角度加到虚拟平面的当前角度上，然后将这个新角度赋值以围绕\
    \ z 轴旋转虚拟平面。为此，我们需要使用 `eulerAngles` 属性，该属性定义了虚拟对象围绕 x、y 和 z 轴的旋转。由于我们只围绕 z 轴旋转虚拟平面，我们只需要将新的旋转角度赋值给\
    \ z 轴，如下所示：\n\n```\nnewAngleZ += currentAngleZ\nplane.eulerAngles.z = newAngleZ\n\
    ```\n\n完整的旋转手势 `IBAction` 方法应如下所示：\n\n```\n@IBAction func rotationGesture(_ sender:\
    \ UIRotationGestureRecognizer) {\n    if sender.state == .changed {\n        let\
    \ areaTouched = sender.view as? SCNView\n        let location = sender.location(in:\
    \ areaTouched)\n        let hitTestResults = sceneView.hitTest(location, options:\
    \ nil)\n        if let hitTest = hitTestResults.first {\n            let plane\
    \ = hitTest.node\n            newAngleZ = Float(-sender.rotation)\n          \
    \  newAngleZ += currentAngleZ\n            plane.eulerAngles.z = newAngleZ\n \
    \       }\n    } else if sender.state == .ended {\n        currentAngleZ = newAngleZ\n\
    \    }\n}\n```\n\n请记住，你还必须通过在 `ViewController.swift` 类的顶部附近声明两个 `Float` 类型的变量（`newAngleZ`\
    \ 和 `currentAngleZ`）来添加它们，如下所示：\n\n```\nvar newAngleZ : Float = 0.0\nvar currentAngleZ\
    \ : Float = 0.0\n```\n\n如果你运行此应用，可以将两个手指放在虚拟平面上并进行旋转。然后虚拟平面将朝相同方向旋转，如图 [10-5]\
    \ 所示。\n\n![../images/469983_1_En_10_Chapter/469983_1_En_10_Fig5_HTML.jpg](images/469983_1_En_10_Chapter/469983_1_En_10_Fig5_HTML.jpg)\n\
    \n图 10-5\n使用旋转手势旋转虚拟平面\n\n# 使用平移手势移动虚拟对象\n\n平移手势发生在用户用一个手指在屏幕上沿任意方向滑动时。你可以为平移手势定义最少和最多的手指数量，例如至少两个但不超过四个。默认情况下，检测平移手势的最少手指数量是\
    \ 1。\n\nXcode 提供两种类型的平移手势识别器。我们将使用的那个简称为“平移手势识别器”，它检测屏幕上任意位置的手指移动。另一个平移手势识别器称为“屏幕边缘平移手势识别器”。如果你曾经从\
    \ iPhone 屏幕底部向上滑动以显示诸如将 iPhone 变为手电筒之类的选项，那么你就使用了屏幕边缘平移手势识别器，它检测从屏幕边缘开始的平移。\n\n\
    要在我们的应用中放置一个常规的平移手势识别器，请按照以下步骤操作：\n\n1.  从对象库窗口拖动“平移手势识别器”并将其放到用户界面上的 `ARSCNView`\
    \ 上。虽然你将平移手势识别器拖放到了用户界面上，但除了在文档大纲中，你在任何地方都看不到它的任何迹象。\n2.  单击“助理编辑器”图标或选择“查看”➤“助理编辑器”➤“显示助理编辑器”，以并排显示\
    \ `Main.storyboard` 和 `ViewController.swift` 文件。\n3.  将鼠标指针移动到文档大纲中的“平移手势识别器”上，按住\
    \ Control 键，并按住 Control 键拖动到 `ViewController.swift` 文件底部最后一个大括号上方。\n4.  释放 Control\
    \ 键和鼠标左键。会出现一个弹出菜单。\n5.  确保“连接”弹出菜单显示“操作”。\n6.  在“名称”文本字段中单击并输入 `panGesture`。\n\
    7.  单击“类型”弹出菜单并选择 `UIPanGestureRecognizer`。然后单击“连接”按钮。Xcode 将创建一个 `IBAction` 方法，如下所示：\n\
    \    ```\n    @IBAction func panGesture(_ sender: UIPanGestureRecognizer) {\n\
    \    }\n    ```\n8.  按如下方式编辑这个 `IBAction` 方法 `panGesture`：\n    ```\n    @IBAction\
    \ func panGesture(_ sender: UIPanGestureRecognizer) {\n        print (\"Pan gesture\"\
    )\n    }\n    ```\n9.  通过 USB 电缆将 iOS 设备连接到你的 Macintosh。\n10. 单击“运行”按钮或选择“产品”➤“运行”。\n\
    11. 将一个手指放在屏幕上并在屏幕上滑动。Xcode 调试区域应显示“Pan Gesture”，让你知道它已成功检测到平移手势。\n12. 单击“停止”按钮或选择“产品”➤“停止”。\n\
    \n![../images/469983_1_En_10_Chapter/469983_1_En_10_Fig6_HTML.jpg](images/469983_1_En_10_Chapter/469983_1_En_10_Fig6_HTML.jpg)\n\
    \n图 10-6\n在对象库窗口中查找平移手势识别器\n\n1.  在导航窗格中单击 `Main.storyboard` 文件。\n2.  单击“对象库”图标以显示对象库窗口。\n\
    3.  在对象库中输入 `pan`。对象库会显示平移手势识别器，如图 [10-6] 所示。\n\n一旦我们确认平移手势有效，第一步是识别用户是否在增强现实视图中平移虚拟平面。我们需要获取用户平移经过的视图位置，并使用\
    \ `hitTest` 方法来验证用户的指尖是否在虚拟对象上：\n\n```\nlet areaPanned = sender.view as? SCNView\n\
    let location = sender.location(in: areaPanned)\nlet hitTestResults = areaPanned?.hitTest(location,\
    \ options: nil)\n```\n\n接下来，我们必须确定用户是否触摸了第一个节点（虚拟平面）：\n\n```\nif let hitTest =\
    \ hitTestResults?.first {\n}\n```"
  raw: "Now as soon as we detect a rotation gesture, we need to verify that this rotation\
    \ gesture occurs on the virtual plane. To do this, we need to retrieve the view\
    \ touched, get the location of the user’s fingertips, and use the `hitTest` method\
    \ to determine if it touched any virtual object in the augmented reality view:\n\
    \n```\nlet areaTouched = sender.view as? SCNView\nlet location = sender.location(in:\
    \ areaTouched)\nlet hitTestResults = sceneView.hitTest(location, options: nil)\n\
    ```\n\nNext, we’ll need to check if the rotation gesture occurs over the first\
    \ (and only virtual object) in the augmented reality view:\n\n```\nif let hitTest\
    \ = hitTestResults.first {\n}\n```\n\nThen we’ll create a “plane” constant to\
    \ represent the node that the user touched (the virtual plane) and store the rotation\
    \ angle of the gesture in the `newAngleZ` variable.\n\n```\nlet plane = hitTest.node\n\
    newAngleZ = Float(-sender.rotation)\n```\n\nThe negative sign is necessary to\
    \ coordinate the rotation gesture on the screen with the rotation of the virtual\
    \ plane in the augmented reality view. Without this negative sign, the virtual\
    \ plane would rotate in the opposite direction as the rotation gesture.\n\nWe’ll\
    \ add this new rotation angle to the virtual plane’s current angle and then assign\
    \ this new angle to rotate the virtual plane around the z-axis. To do this, we\
    \ need to use the `eulerAngles` property that defines a virtual object’s rotation\
    \ around the x-, y-, and z-axes. Since we’re only rotating the virtual plane around\
    \ the z-axis, we only need to assign the new angle of rotation to the z-axis like\
    \ this:\n\n```\nnewAngleZ += currentAngleZ\nplane.eulerAngles.z = newAngleZ\n\
    ```\n\nThe complete rotation gesture IBAction method should look like this:\n\n\
    ```\n@IBAction func rotationGesture(_ sender: UIRotationGestureRecognizer) {\n\
    if sender.state == .changed {\nlet areaTouched = sender.view as? SCNView\nlet\
    \ location = sender.location(in: areaTouched)\nlet hitTestResults = sceneView.hitTest(location,\
    \ options: nil)\nif let hitTest = hitTestResults.first {\nlet plane = hitTest.node\n\
    newAngleZ = Float(-sender.rotation)\nnewAngleZ += currentAngleZ\nplane.eulerAngles.z\
    \ = newAngleZ\n}\n} else if sender.state == .ended {\ncurrentAngleZ = newAngleZ\n\
    }\n}\n```\n\nRemember, you must also add the two variables (`newAngleZ` and `currentAngleZ`)\
    \ as `Float` variables by declaring them near the top of the `ViewController.swift`\
    \ class like this:\n\n```\nvar newAngleZ : Float = 0.0\nvar currentAngleZ : Float\
    \ = 0.0\n```\n\nIf you run this app, you can place two fingertips on the virtual\
    \ plane and rotate. Then the virtual plane will rotate in the same direction,\
    \ as shown in Figure [10-5](#469983_1_En_10_Chapter.xhtml#Fig5).\n\n![../images/469983_1_En_10_Chapter/469983_1_En_10_Fig5_HTML.jpg](images/469983_1_En_10_Chapter/469983_1_En_10_Fig5_HTML.jpg)\n\
    \nFigure 10-5\n\nRotating the virtual plane with the rotation gesture\n\n## Moving\
    \ Virtual Objects with the Pan Gesture\n\nThe pan gesture occurs when the user\
    \ slides one fingertip across the screen in any direction. You can define both\
    \ the minimum and maximum number of fingertips for a pan gesture such as at least\
    \ two fingers but not more than four. By default, the minimum number of fingertips\
    \ to detect a pan gesture is 1.\n\nXcode offers two types of pan gesture recognizers.\
    \ The one we’ll be using is simply called Pan Gesture Recognizer, which detects\
    \ fingertip movement anywhere on the screen. The other pan gesture recognizer\
    \ is called Screen Edge Pan Gesture Recognizer. If you’ve ever swiped up from\
    \ the bottom of an iPhone screen to display options such as turning your iPhone\
    \ into a flashlight, then you’ve used the Screen Edge Pan Gesture Recognizer that\
    \ detects pans that start at the edge of a screen.\n\nTo place a regular pan gesture\
    \ recognizer in our app, follow these steps:\n\n1.  Drag the Pan Gesture Recognizer\
    \ from the Object Library window and drop it on the ARSCNView on the user interface.\
    \ Although you dragged and dropped the Pan Gesture Recognizer on to the user interface,\
    \ you won’t see any sign of it anywhere except in the Document Outline.\n\n2.\
    \  Click the Assistant Editor icon or choose View ➤ Assistant Editor ➤ Show Assistant\
    \ Editor to display the `Main.storyboard` and the `ViewController.swift` file\
    \ side by side.\n\n3.  Move the mouse pointer over the Pan Gesture Recognizer\
    \ in the Document Outline, hold down the Control key, and Ctrl-drag above the\
    \ last curly bracket at the bottom of the `ViewController.swift` file.\n\n4. \
    \ Release the Control key and the left mouse button. A popup menu appears.\n\n\
    5.  Make sure the Connection popup menu displays Action.\n\n6.  Click in the Name\
    \ text field and type `panGesture`.\n\n7.  Click in the Type popup menu and choose\
    \ `UIPanGestureRecognizer` . Then click the Connect button. Xcode creates an IBAction\
    \ method as shown here:\n\n```\n    @IBAction func panGesture(_ sender: UIPanGestureRecognizer)\
    \ {\n    }\n    }\n    ```\n\n8.  Edit this IBAction method `panGesture` as follows:\n\
    \n```\n    @IBAction func panGesture(_ sender: UIPanGestureRecognizer) {\n   \
    \ print (\"Pan gesture\")\n    }\n    ```\n\n9.  Connect an iOS device to your\
    \ Macintosh through its USB cable.\n\n10.  Click the Run button or choose Product\
    \ ➤ Run.\n\n11.  Place one fingertip on the screen and slide it around the screen.\
    \ The Xcode debug area should display “Pan Gesture” to let you know that it successfully\
    \ detected the rotation gesture.\n\n12.  Click the Stop button or choose Product\
    \ ➤ Stop.\n\n![../images/469983_1_En_10_Chapter/469983_1_En_10_Fig6_HTML.jpg](images/469983_1_En_10_Chapter/469983_1_En_10_Fig6_HTML.jpg)\n\
    \nFigure 10-6\n\nFinding the pan gesture recognizer in the Object Library window\n\
    \n1.  Click the `Main.storyboard` file in the Navigator pane.\n\n2.  Click the\
    \ Object Library icon to display the Object Library window.\n\n3.  Type `pan`\
    \ in the Object Library. The Object Library displays the pan gesture recognizer,\
    \ as shown in Figure [10-6](#469983_1_En_10_Chapter.xhtml#Fig6).\n\nOnce we verify\
    \ that the pan gesture works, the first step is to identify if the user is panning\
    \ across the virtual plane in the augmented reality view. We need to retrieve\
    \ the location on the view that the user pans across and use the `hitTest` method\
    \ to verify that the user’s fingertip is on a virtual object:\n\n```\nlet areaPanned\
    \ = sender.view as? SCNView\nlet location = sender.location(in: areaPanned)\n\
    let hitTestResults = areaPanned?.hitTest(location, options: nil)\n```\n\nNext,\
    \ we have to determine if the user touched the first node (the virtual plane):\n\
    \n```\nif let hitTest = hitTestResults?.first {\n}\n```"
