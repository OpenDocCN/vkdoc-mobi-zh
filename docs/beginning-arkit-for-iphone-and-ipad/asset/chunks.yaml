    5.  Click the Stop button or choose Product ➤ Stop. At this point, you can disconnect
    the iOS 12 device from your Macintosh.


    Once you have Apple’s ARKit Scanner installed on an iOS 12 device, you can start
    scanning objects. To scan an item, follow these steps:


    1.  Tap the top gray circle that represents your Macintosh to transfer the .arobject
    file to the `Downloads` folder of your Macintosh.


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig9_HTML.jpg](images/469983_1_En_16_Chapter/469983_1_En_16_Fig9_HTML.jpg)


    Figure 16-9


    Accessing AirDrop from an iOS device


    1.  Tap the Share button in the ARKit Scanner screen. A popup window appears,
    letting you choose how you want to share the .arobject file, as shown in Figure
    [16-9](#469983_1_En_16_Chapter.xhtml#Fig9).


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig8_HTML.jpg](images/469983_1_En_16_Chapter/469983_1_En_16_Fig8_HTML.jpg)


    Figure 16-8


    Turning on AirDrop on a Macintosh


    1.  On your Macintosh, open a Finder window and choose Go ➤ AirDrop to open an
    AirDrop window, as shown in Figure [16-8](#469983_1_En_16_Chapter.xhtml#Fig8).


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig7_HTML.jpg](images/469983_1_En_16_Chapter/469983_1_En_16_Fig7_HTML.jpg)


    Figure 16-7


    Testing if object detection is successful or not


    1.  Move the origin by swiping your finger on the origin and then tap the Test
    button.


    2.  Move the object to a new location and aim the iOS device’s camera at it to
    make sure the ARKit Scanner app can recognize the object, as shown in Figure [16-7](#469983_1_En_16_Chapter.xhtml#Fig7).


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig6_HTML.jpg](images/469983_1_En_16_Chapter/469983_1_En_16_Fig6_HTML.jpg)


    Figure 16-6


    After scanning an object, you can move its origin


    1.  When yellow planes completely cover all sides of the bounding box, tap the
    Finish button. The ARKit Scanner app now displays the origin of the detected object
    that you can move if you wish, as shown in Figure [16-6](#469983_1_En_16_Chapter.xhtml#Fig6).


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig5_HTML.jpg](images/469983_1_En_16_Chapter/469983_1_En_16_Fig5_HTML.jpg)


    Figure 16-5


    As you scan the object, yellow planes show you which areas you’ve already scanned


    1.  Tap the Scan button and move around the object. As you move, the app displays
    yellow planes along the sides and top of the bounding box to let you know which
    angles it can detect, as shown in Figure [16-5](#469983_1_En_16_Chapter.xhtml#Fig5).
    The goal is to move your iOS device’s camera along all sides and the top of the
    object until yellow planes completely cover the bounding box.


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig4_HTML.jpg](images/469983_1_En_16_Chapter/469983_1_En_16_Fig4_HTML.jpg)


    Figure 16-4


    The bounding box encloses the object you want to detect


    1.  When the object appears centered inside the bounding box, tap the Next button.
    The ARKit Scanner app displays the bounding box around your object along with
    measurement information about that object, as shown in Figure [16-4](#469983_1_En_16_Chapter.xhtml#Fig4).


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig3_HTML.jpg](images/469983_1_En_16_Chapter/469983_1_En_16_Fig3_HTML.jpg)


    Figure 16-3


    A bounding box defines the area of the object to detect


    1.  Place the object you want your app to detect on a flat, well-lit surface that’s
    free of any other objects.


    2.  Run the ARKit Scanner app on your iOS 12 device.


    3.  Point the iOS device’s camera at the object until a cartoon bounding box encloses
    the object you want to detect, as shown in Figure [16-3](#469983_1_En_16_Chapter.xhtml#Fig3).'
  trans: '

    # 扫描对象


    你的应用检测物体的能力，其质量取决于事先对该物体的准确扫描。进行扫描需要使用一台运行**iOS 12**且至少配备**A9 处理器**的设备（iPhone
    6s、iPhone 6s Plus、iPhone SE 以及 2017 款 iPad）。设备越新（摄像头分辨率更高、处理器速度更快等），扫描捕获的参考数据质量就越好。


    为了提高扫描精度，请将你想要检测的物体放在一个平坦且无任何其他物品的表面上。这样扫描就能仅专注于你想要的检测对象。


    首先，你需要在 iOS 12 设备上安装 Apple 的 ARKit Scanner 应用。要获取此 ARKit Scanner 应用，请按照以下步骤操作：


    1.  访问 `https://developer.apple.com/documentation/arkit/scanning_and_detecting_3d_objects`
    并下载 `ScanningApp`，其中包含 Swift 源代码。

    2.  在 Xcode 中打开这个 `ScanningApp` 项目。

    3.  使用 USB 线将 iOS 12 设备连接到你的 Macintosh 电脑。

    4.  点击“运行”按钮或选择“产品”➤“运行”。这会将 ARKit Scanner 应用安装到你的 iOS 设备上。

    5.  点击“停止”按钮或选择“产品”➤“停止”。此时，你可以断开 iOS 12 设备与 Macintosh 的连接。


    一旦你在 iOS 12 设备上安装了 Apple 的 ARKit Scanner，就可以开始扫描物体了。要扫描一个项目，请按照以下步骤操作：


    1.  将你想要应用检测的物体放在一个平坦、光线良好且无其他物品的表面上。

    2.  在 iOS 12 设备上运行 ARKit Scanner 应用。

    3.  将 iOS 设备的摄像头对准物体，直到一个卡通样式的边界框包围住你想要检测的物体，如图 16-3 所示。


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig3_HTML.jpg](img/469983_1_En_16_Fig3_HTML.jpg)


    图 16-3：边界框定义了待检测物体的区域


    4.  当物体出现在边界框内并居中时，点击“下一步”按钮。ARKit Scanner 应用会在物体周围显示边界框以及关于该物体的测量信息，如图 16-4 所示。


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig4_HTML.jpg](img/469983_1_En_16_Fig4_HTML.jpg)


    图 16-4：边界框包围了你要检测的物体


    5.  点击“扫描”按钮并围绕物体移动。当你移动时，应用会在边界框的侧面和顶部显示黄色平面，以提示它可以检测到的角度，如图 16-5 所示。目标是移动你的
    iOS 设备摄像头，覆盖物体的所有侧面和顶部，直到黄色平面完全覆盖整个边界框。


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig5_HTML.jpg](img/469983_1_En_16_Fig5_HTML.jpg)


    图 16-5：当你扫描物体时，黄色平面会显示你已经扫描过的区域


    6.  当黄色平面完全覆盖边界框的所有侧面时，点击“完成”按钮。ARKit Scanner 应用现在会显示检测到的物体的原点，您可以根据需要移动它，如图 16-6
    所示。


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig6_HTML.jpg](img/469983_1_En_16_Fig6_HTML.jpg)


    图 16-6：扫描物体后，你可以移动它的原点


    7.  通过在原点上滑动手指来移动原点，然后点击“测试”按钮。

    8.  将物体移动到一个新位置，并将 iOS 设备的摄像头对准它，以确保 ARKit Scanner 应用能够识别该物体，如图 16-7 所示。


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig7_HTML.jpg](img/469983_1_En_16_Fig7_HTML.jpg)


    图 16-7：测试物体检测是否成功


    9.  在你的 Macintosh 上，打开一个 Finder 窗口并选择“前往”➤“隔空投送”以打开一个隔空投送窗口，如图 16-8 所示。


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig8_HTML.jpg](img/469983_1_En_16_Fig8_HTML.jpg)


    图 16-8：在 Macintosh 上开启隔空投送


    10. 在 ARKit Scanner 界面中点击“共享”按钮。会弹出一个窗口，让你选择如何共享 `.arobject` 文件，如图 16-9 所示。


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig9_HTML.jpg](img/469983_1_En_16_Fig9_HTML.jpg)


    图 16-9：从 iOS 设备访问隔空投送


    11. 点击代表你 Macintosh 的顶部灰色圆形图标，将 `.arobject` 文件传输到 Macintosh 的 `Downloads`（下载）文件夹中。

