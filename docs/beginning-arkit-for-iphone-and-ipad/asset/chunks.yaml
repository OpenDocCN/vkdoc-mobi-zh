    1.  通过 USB 线将 iOS 设备连接到 Macintosh。

    2.  点击“运行”按钮，或选择**产品** ➤ **运行**。

    3.  世界原点应出现，同时还有一个橙色金字塔、一个蓝色圆环和一个绿色盒子。将屏幕中心对准目标，然后点击屏幕即可发射一个紫色抛射体。每当紫色抛射体击中一个虚拟对象时，该虚拟对象会变为不同颜色，让你直观地看到它被击中了。

    4.  点击“停止”按钮，或选择**产品** ➤ **停止**。


    ## 小结


    默认情况下，虚拟对象只是悬浮在增强现实视图的半空中。通过为虚拟对象应用物理实体，你可以让它受重力影响而下落，或者让它与其他虚拟对象交互并发生碰撞。


    你可以用不同类型的物理实体定义虚拟对象，这些实体决定了它如何响应碰撞。要发起碰撞，你可以沿 x、y 和 z 轴对虚拟对象施加一个力。要确定虚拟对象可能击中了什么，你需要定义一个枚举结构来标识可能发生碰撞的不同虚拟对象。然后你需要编写一个
    `didBegin physicsWorld` 函数来响应这一碰撞。


    添加物理、受力及碰撞检测功能，能让你的应用中的虚拟对象像真实物体一样做出反应，并在它们因碰撞而发生物理接触时通知你。'
- fmt: "# 13. Interacting with the Real World\n\nWhen we've placed virtual objects\
    \ in an augmented reality view, those virtual objects can interact with each other\
    \ in different ways. The simplest way two virtual objects can interact is by placing\
    \ one in front of another. Then the closest virtual object blocks your view of\
    \ the second virtual object.\n\nFor greater realism within an augmented reality\
    \ view, you can also have real-world objects appear to block virtual objects,\
    \ which is called *occlusion*. We can mimic a real-world object blocking the view\
    \ of a virtual object by creating an invisible virtual object that matches the\
    \ position and size of a real-world object.\n\nAnother form of interaction occurs\
    \ when virtual objects can interact with real-world objects. The simplest example\
    \ is horizontal or vertical plane detection where `ARKit` can identify walls or\
    \ floors. Of course, `ARKit` can also recognize points in the real world. It can,\
    \ for example, compare the distance between two points that exist in the real\
    \ world, such as the distance from one corner of a table to another corner.\n\n\
    To learn about occlusion with virtual objects, let's create a new Xcode project\
    \ by following these steps:\n\n1. Start Xcode. (Make sure you're using Xcode 10\
    \ or greater.)\n2. Choose File ➤ New ➤ Project. Xcode asks you to choose a template.\n\
    3. Click the iOS category.\n4. Click the Single View App icon and click the Next\
    \ button. Xcode asks for a product name, organization name, organization identifiers,\
    \ and content technology.\n5. Click in the Product Name text field and type a\
    \ descriptive name for your project, such as `Occlusion`. (The exact name does\
    \ not matter.)\n6. Click the Next button. Xcode asks where you want to store your\
    \ project.\n7. Choose a folder and click the Create button. Xcode creates an iOS\
    \ project.\n\nNow modify the `Info.plist` file to allow access to the camera and\
    \ to use `ARKit` by following these steps:\n\n1. Click the `Info.plist` file in\
    \ the Navigator pane. Xcode displays a list of keys, types, and values.\n2. Click\
    \ the disclosure triangle to expand the Required Device Capabilities category\
    \ to display Item 0.\n3. Move the mouse pointer over Item 0 to display a plus\
    \ (+) icon.\n4. Click this plus (+) icon to display a blank Item 1.\n5. Type `arkit`\
    \ under the Value category in the Item 1 row.\n6. Move the mouse pointer over\
    \ the last row to display a plus (+) icon.\n7. Click on the plus (+) icon to create\
    \ a new row. A popup menu appears.\n8. Choose Privacy – Camera Usage Description.\n\
    9. Type `AR needs to use the camera` under the Value category in the Privacy –\
    \ Camera Usage Description row.\n\nNow it's time to modify the `ViewController.swift`\
    \ file to use `ARKit` and `SceneKit` by following these steps:\n\n1. Click on\
    \ the `ViewController.swift` file in the Navigator pane.\n2. Edit the `ViewController.swift`\
    \ file so it looks like this:\n\n```\nimport UIKit\nimport SceneKit\nimport ARKit\n\
    class ViewController: UIViewController, ARSCNViewDelegate {\n    let configuration\
    \ = ARWorldTrackingConfiguration()\n    var x : Float = 0\n    var y : Float =\
    \ 0\n    var z : Float = 0\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n}\n```\n\nThis code declares three variables `x`, `y`, and `z`. These\
    \ variables will be used to store the location of a horizontal plane. Once our\
    \ app detects a horizontal plane, we'll draw a virtual object underneath the horizontal\
    \ plane using these `x`, `y`, and `z` variables.\n\nTo view augmented reality\
    \ in our app, add a single `ARKit SceneKit View` (`ARSCNView`) and expand it so\
    \ it fills the entire user interface. Then add constraints by choosing Editor\
    \ ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints at the bottom\
    \ half of the menu under the All Views in Container category.\n\nThe next step\
    \ is to connect the user interface items to the Swift code in the `ViewController.swift`\
    \ file. To do this, follow these steps:\n\n1. Click the `Main.storyboard` file\
    \ in the Navigator pane.\n2. Click the Assistant Editor icon or choose View ➤\
    \ Assistant Editor ➤ Show Assistant Editor to display the `Main.storyboard` and\
    \ the `ViewController.swift` file side by side.\n3. Move the mouse pointer over\
    \ the `ARSCNView`, hold down the Control key, and Ctrl-drag under the `class ViewController`\
    \ line.\n4. Release the Control key and the left mouse button. A popup menu appears.\n\
    5. Click in the Name text field and type `sceneView`, then click the Connect button.\
    \ Xcode creates an `IBOutlet` as shown here:\n\n```\n@IBOutlet var sceneView:\
    \ ARSCNView!\n```\n\n6. Edit the `viewDidLoad` function so it looks like this:\n\
    \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n    sceneView.debugOptions\
    \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    sceneView.delegate = self\n    configuration.planeDetection = .horizontal\n\
    \    sceneView.session.run(configuration)\n    let tapGesture = UITapGestureRecognizer(target:\
    \ self, action: #selector(tapResponse))\n    sceneView.addGestureRecognizer(tapGesture)\n\
    }\n```\n\nThe last two lines in the `viewDidLoad` function create a tap gesture,\
    \ which means we'll need a function to handle the tap gesture, called `tapGesture`.\n\
    \n7. Underneath the `viewDidLoad` function, write the following `tapResponse`\
    \ function:\n\n```\n@objc func tapResponse(sender: UITapGestureRecognizer) {\n\
    \    let boxNode = SCNNode()\n    boxNode.geometry = SCNBox(width: 0.08, height:\
    \ 0.08, length: 0.08, chamferRadius: 0)\n    boxNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.green\n    boxNode.position = SCNVector3(x, y, z)\n    sceneView.scene.rootNode.addChildNode(boxNode)\n\
    }\n```\n\nThis `tapResponse` function identifies the location on the screen where\
    \ the user tapped and then displays a green box at the `x`, `y`, and `z` coordinates,\
    \ which represent the center coordinates of a horizontal plane.\n\n8. Underneath\
    \ the `tapResponse` function, write the following `didAdd renderer` function:\n\
    \n```\nfunc renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:\
    \ ARAnchor) {\n    guard anchor is ARPlaneAnchor else { return }\n    let planeNode\
    \ = detectPlane(anchor: anchor as! ARPlaneAnchor)\n    node.addChildNode(planeNode)\n\
    }\n```\n\nThis `renderer` function runs the first time `ARKit` detects a horizontal\
    \ plane. Once it detects a horizontal plane, it runs the `detectPlane` function\
    \ (which we'll need to write later).\n\n9. Write the following `didUpdate renderer`\
    \ function:\n\n```\nfunc renderer(_ renderer: SCNSceneRenderer, didUpdate node:\
    \ SCNNode, for anchor: ARAnchor) {\n    guard anchor is ARPlaneAnchor else { return\
    \ }\n    node.enumerateChildNodes { (childNode, _) in\n        childNode.removeFromParentNode()\n\
    \    }\n    let planeNode = detectPlane(anchor: anchor as! ARPlaneAnchor)\n  \
    \  node.addChildNode(planeNode)\n    print(\"updating plane anchor\")\n}\n```\n\
    \nThis `didUpdate renderer` function constantly resizes the horizontal plane as\
    \ the iOS camera detects more of the horizontal plane. Notice that this function\
    \ also calls the `detectPlane` function while also printing \"updating plane anchor\"\
    \ each time it detects the expands the size of the horizontal plane.\n\n10. Finally,\
    \ write the following `detectPlane` function:\n\n```\nfunc detectPlane(anchor:\
    \ ARPlaneAnchor) -> SCNNode {\n    let planeNode = SCNNode()\n    planeNode.geometry\
    \ = SCNPlane(width: CGFloat(anchor.extent.x), height: CGFloat(anchor.extent.z))\n\
    \    planeNode.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n  \
    \  planeNode.position = SCNVector3(anchor.center.x, anchor.center.y, anchor.center.z)\n\
    \    x = anchor.center.x\n    y = anchor.center.y - 0.4\n    z = anchor.center.z\n\
    \    let ninetyDegrees = GLKMathDegreesToRadians(90)\n    planeNode.eulerAngles\
    \ = SCNVector3(ninetyDegrees, 0, 0)\n    planeNode.geometry?.firstMaterial?.isDoubleSided\
    \ = true\n    return planeNode\n}\n```"
