    5.  在 Name 文本框中点击并输入 `sceneView`，然后点击 Connect 按钮。Xcode 将创建一个 IBOutlet，如下所示：\n\n\
    ```\n@IBOutlet var sceneView: ARSCNView!\n```\n\n6.  编辑 `viewDidLoad` 函数，使其如下所示：\n"
- fmt: "```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // Do\
    \ any additional setup after loading the view, typically from a nib.\n    sceneView.debugOptions\
    \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    sceneView.delegate = self\n    sceneView.session.run(configuration)\n   \
    \ let tapGesture = UITapGestureRecognizer(target: self, action: #selector(tapResponse))\n\
    \    sceneView.addGestureRecognizer(tapGesture)\n}\n```\n\n## 处理点击手势\n\n此时，我们已经添加了一个点击手势识别器，因此需要按照以下步骤编写一个函数来处理这个点击手势：\n\
    \n1.  在导航器窗格中点击`ViewController.swift`文件。\n2.  在`viewDidLoad`函数下方键入以下代码：\n\n```swift\n\
    @objc func tapResponse(sender: UITapGestureRecognizer) {\n}\n```\n\n每当用户点击屏幕时，我们希望一个球体从屏幕中心射出并远离用户。要做到这一点，我们必须首先获取摄像机的当前朝向和位置。这意味着要确保用户点击的是增强现实视图，然后使用以下三行代码检索关于摄像机当前朝向和位置的信息（存储在矩阵中）：\n\
    \n```swift\nguard let scene = sender.view as? ARSCNView else { return }\nguard\
    \ let pov = scene.pointOfView else { return }\nlet transform = pov.transform\n\
    ```\n\n`transform`常量存储了一个4x4矩阵，包含摄像机位置和朝向的信息。要检索朝向信息，我们需要访问此矩阵的第三列：\n\n```swift\n\
    let orientation = SCNVector3(-transform.m31, -transform.m32, -transform.m33)\n\
    ```\n\n所有这些信息都需要反转（因此使用负号），因为朝向是面向我们的，而我们需要它面向相反的方向远离我们。\n\n摄像机的位置可以从矩阵的第四列这样获取：\n\
    \n```swift\nlet location = SCNVector3(transform.m41, transform.m42, transform.m43)\n\
    ```\n\n要获得摄像机的最终位置，我们需要将朝向与位置相结合，如下所示：\n\n```swift\nlet position = SCNVector3(orientation.x\
    \ + location.x, orientation.y + location.y, orientation.z + location.z)\n```\n\
    \n一旦我们知道了摄像机的位置，就需要创建一个投射物，它将是一个紫色球体，出现在屏幕中心（即摄像机位置）：\n\n```swift\nlet projectile\
    \ = SCNNode()\nprojectile.geometry = SCNSphere(radius: 0.35)\nprojectile.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.purple\nprojectile.position = position\n```\n\n这创建了一个紫色球体，当用户点击屏幕时，它会悬浮在屏幕中央的半空中。我们需要给投射物一个物理体，将其类型定义为`.dynamic`，这意味着它可以与其他虚拟对象碰撞：\n\
    \n```swift\nprojectile.physicsBody = SCNPhysicsBody(type: .dynamic, shape: SCNPhysicsShape(node:\
    \ projectile, options: nil))\nprojectile.physicsBody?.isAffectedByGravity = false\n\
    ```\n\n第一行将紫色球体定义为一个能够移动和碰撞的物理体，第二行关闭了它的重力。否则，重力只会让紫色球体坠落到地面。\n\n现在是对紫色球体施加力的时候了。首先，声明一个名为`force`的常量，并将其值设置为任意值50。然后使用`applyForce`方法对该投射物施加该力，如下所示：\n\
    \n```swift\nlet force: Float = 50\nprojectile.physicsBody?.applyForce(SCNVector3(orientation.x\
    \ * force, orientation.y * force, orientation.z * force), asImpulse: true)\n```\n\
    \n这段代码对投射物施加了一个力，但这个力相对较弱，因此我们需要将其乘以任意的`force`常数（50）。`asImpulse`值设为`true`，以便对投射物创建一个瞬时力。如果这个`asImpulse`值是`false`，那么这个力将持续施加在投射物上。\n\
    \n完整的`tapResponse`函数应如下所示：\n\n```swift\n@objc func tapResponse(sender: UITapGestureRecognizer)\
    \ {\n    guard let scene = sender.view as? ARSCNView else { return }\n    guard\
    \ let pov = scene.pointOfView else { return }\n    let transform = pov.transform\n\
    \    let orientation = SCNVector3(-transform.m31, -transform.m32, -transform.m33)\n\
    \    let location = SCNVector3(transform.m41, transform.m42, transform.m43)\n\
    \    let position = SCNVector3(orientation.x + location.x, orientation.y + location.y,\
    \ orientation.z + location.z)\n    let projectile = SCNNode()\n    projectile.geometry\
    \ = SCNSphere(radius: 0.35)\n    projectile.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.purple\n    projectile.position = position\n    projectile.physicsBody\
    \ = SCNPhysicsBody(type: .dynamic, shape: SCNPhysicsShape(node: projectile, options:\
    \ nil))\n    projectile.physicsBody?.isAffectedByGravity = false\n    let force:\
    \ Float = 50\n    projectile.physicsBody?.applyForce(SCNVector3(orientation.x\
    \ * force, orientation.y * force, orientation.z * force), asImpulse: true)\n \
    \   sceneView.scene.rootNode.addChildNode(projectile)\n}\n```\n\n## 测试代码\n\n要测试此代码，请按照以下步骤操作：\n\
    \n1.  通过USB线缆将iOS设备连接到Mac。\n2.  点击运行按钮或选择 Product ➤ Run。首次运行此应用程序时，它会请求访问摄像机的权限，请授予权限。\n\
    3.  对准iOS设备的摄像头并点击屏幕。每次点击屏幕时，都应有一个紫色球体射出并逐渐消失。\n4.  点击停止按钮或选择 Product ➤ Stop。\n\
    \n尝试使用不同的值（如20或75）修改`force`常数，观察它对施加在紫色球体上的力的影响。"
  raw: "```\n    override func viewDidLoad() {\n    super.viewDidLoad()\n    // Do\
    \ any additional setup after loading the view, typically from a nib.\n    sceneView.debugOptions\
    \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    sceneView.delegate = self\n    sceneView.session.run(configuration)\n   \
    \ let tapGesture = UITapGestureRecognizer(target: self, action: #selector(tapResponse))\n\
    \    sceneView.addGestureRecognizer(tapGesture)\n    }\n    ```\n\nAt this point,\
    \ we’ve added a tap gesture recognizer so we need to write a function to handle\
    \ this tap gesture by following these steps:\n\n1.  Click the `ViewController.swift`\
    \ file in the Navigator pane.\n\n2.  Type the following underneath the `viewDidLoad`\
    \ function:\n\n```\n    @objc func tapResponse(sender: UITapGestureRecognizer)\
    \ {\n    }\n    ```\n\nEach time the user taps the screen, we want a sphere to\
    \ shoot out from the center of the screen and away from the user. To do this,\
    \ we must first get the current orientation and location of the camera. That means\
    \ making sure the user tapped on an augmented reality view and then retrieving\
    \ information about the current camera’s orientation and location in a matrix\
    \ using these three lines of code:\n\n```\nguard let scene = sender.view as? ARSCNView\
    \ else { return }\nguard let pov = scene.pointOfView else { return }\nlet transform\
    \ = pov.transform\n```\n\nThe transform constant stores a 4 by 4 matrix that contains\
    \ information about the camera’s position and orientation. To retrieve the orientation\
    \ information, we need to access the third column of this matrix:\n\n```\nlet\
    \ orientation = SCNVector3(-transform.m31, -transform.m32, -transform.m33)\n```\n\
    \nAll of this information needs to be reversed (hence the negative signs) because\
    \ the orientation faces toward us and we need it to face the opposite direction\
    \ away from us.\n\nThe location of the camera can be retrieved in the fourth column\
    \ of the matrix like this:\n\n```\nlet location = SCNVector3(transform.m41, transform.m42,\
    \ transform.m43)\n```\n\nTo get the final position of the camera, we need to combine\
    \ the orientation with the location like this:\n\n```\nlet position = SCNVector3(orientation.x\
    \ + location.x, orientation.y + location.y, orientation.z + location.z)\n```\n\
    \nOnce we know the position of the camera, we need to create a projectile, which\
    \ will be a sphere that’s colored purple and appears at the center of the screen,\
    \ which is the position of the camera:\n\n```\nlet projectile = SCNNode()\nprojectile.geometry\
    \ = SCNSphere(radius: 0.35)\nprojectile.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.purple\nprojectile.position = position\n```\n\nThis creates a purple\
    \ sphere that will float in mid-air in the center of the screen when the user\
    \ taps the screen. We need to give the projectile a physics body that defines\
    \ its type as `.dynamic` , which means it can collide with other virtual objects:\n\
    \n```\nprojectile.physicsBody = SCNPhysicsBody(type: .dynamic, shape: SCNPhysicsShape(node:\
    \ projectile, options: nil))\nprojectile.physicsBody?.isAffectedByGravity = false\n\
    ```\n\nThe first line defines the purple sphere as a physics body capable of moving\
    \ and colliding, and the second line turns off its gravity. Otherwise gravity\
    \ would just make the purple sphere plummet to the ground.\n\nNow it’s time to\
    \ apply a force to the purple sphere. First, declare a constant named force and\
    \ set its value to an arbitrary value of 50\\. Then apply that force on the project\
    \ using the `applyForce` method like this:\n\n```\nlet force: Float = 50\nprojectile.physicsBody?.applyForce(SCNVector3(orientation.x\
    \ * force, orientation.y * force, orientation.z * force), asImpulse: true)\n```\n\
    \nThis code applies a force to the projectile but this force is relatively weak,\
    \ so we need to multiply it by the arbitrary force constant (50). The `asImpulse`\
    \ value is `true` to create an instantaneous force on the projectile. If this\
    \ `asImpulse` value were `false`, then the force would be applied continuously\
    \ on the projectile.\n\nThe entire `tapResponse` function should look like this:\n\
    \n```\n@objc func tapResponse(sender: UITapGestureRecognizer) {\nguard let scene\
    \ = sender.view as? ARSCNView else { return }\nguard let pov = scene.pointOfView\
    \ else { return }\nlet transform = pov.transform\nlet orientation = SCNVector3(-transform.m31,\
    \ -transform.m32, -transform.m33)\nlet location = SCNVector3(transform.m41, transform.m42,\
    \ transform.m43)\nlet position = SCNVector3(orientation.x + location.x, orientation.y\
    \ + location.y, orientation.z + location.z)\nlet projectile = SCNNode()\nprojectile.geometry\
    \ = SCNSphere(radius: 0.35)\nprojectile.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.purple\nprojectile.position = position\nprojectile.physicsBody = SCNPhysicsBody(type:\
    \ .dynamic, shape: SCNPhysicsShape(node: projectile, options: nil))\nprojectile.physicsBody?.isAffectedByGravity\
    \ = false\nlet force: Float = 50\nprojectile.physicsBody?.applyForce(SCNVector3(orientation.x\
    \ * force, orientation.y * force, orientation.z * force), asImpulse: true)\nsceneView.scene.rootNode.addChildNode(projectile)\n\
    }\n```\n\nTo test this code, follow these steps:\n\n1.  Connect an iOS device\
    \ to your Macintosh through its USB cable.\n\n2.  Click the Run button or choose\
    \ Product ➤ Run. The first time you run this app, it will ask permission to access\
    \ the camera so give it permission.\n\n3.  Aim the iOS device’s camera and tap\
    \ the screen. Each time you tap the screen, a purple sphere should shoot out and\
    \ gradually disappear.\n\n4.  Click the Stop button or choose Product ➤ Stop.\n\
    \nModify the force constant with different values such as 20 or 75 to see the\
    \ effect it has on the force applied to the purple sphere."
