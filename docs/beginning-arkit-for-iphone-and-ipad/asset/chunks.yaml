  trans: "\n# 在坐标处显示形状\n\n显示世界原点可以让你知道能在增强现实视图的哪些位置定义虚拟对象的出现。通过指定 x、y 和 z 坐标，你可以使虚拟对象相对于用户\
    \ iOS 设备的当前位置显示出来。除了显示像宇宙飞船或恐龙这样的虚拟对象，ARKit 能在特定坐标显示的最简单的虚拟对象就是球体、立方体和平面这类形状。\n\
    \n要创建一个形状，你首先必须基于 `SCNNode` 类创建一个节点，如下所示：\n\n```\nlet node = SCNNode()\n```\n\n\
    此时，你需要为节点定义一个形状。SceneKit 提供了立方体、平面、球体、圆环体和其他形状，所以让我们选择一个球体，并将其半径定义为 0.05 米，如下所示：\n\
    \n```\nnode.geometry = SCNSphere(radius: 0.05)\n```\n\n为了让球体可见，让我们给它一个颜色。为此，我们需要定义节点的材质，该材质定义了其外表面，例如：\n\
    \n```\nnode.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n```\n\n\
    这三行 Swift 代码创建了一个节点，将该节点的几何形状定义为球体，然后用黄色为该球体的外表面上色。现在剩下的唯一任务就是根据世界原点将该节点放置到特定位置。为此，我们需要定义节点的位置，如下所示：\n\
    \n```\nnode.position = SCNVector3(0,0,0)\n```\n\n由于节点需要 x、y 和 z 坐标，因此节点的位置也必须由三个特定值定义。将\
    \ x、y 和 z 位置定义为 0 意味着该节点将出现在 x、y 和 z 轴相交的世界原点。\n\n在定义了几何形状、其尺寸、颜色和位置之后，最后一步是将该节点添加到现有场景中，使其实际出现在增强现实视图中。为此，你只需要最后一行代码，如下所示：\n\
    \n```\nsceneView.scene.rootNode.addChildNode(node)\n```\n\n这行代码将节点（球体）添加到增强现实场景的根节点。根节点定义了增强现实视图中显示项目的层级结构。要了解此代码如何在世界原点显示一个黄色球体，请按照以下步骤操作：\n\
    \n## 准备项目\n\n1.  在导航器窗格中点击 `Main.storyboard` 文件。\n2.  调整 `ARSCNView` 的大小，使得在 `ARSCNView`\
    \ 底部和 iOS 设备屏幕底部之间留出空白区域。\n3.  点击对象库图标以打开对象库窗口。\n4.  输入 `UIButton`。对象库窗口将显示 `UIButton`，如图\
    \ 3-4 所示。\n\n![images/469983_1_En_3_Chapter/469983_1_En_3_Fig4_HTML.jpg](img/469983_1_En_3_Fig4_HTML.jpg)\n\
    图 3-4 在对象库中找到 `UIButton`\n\n5.  将 `UIButton` 拖到 `ARSCNView` 下方。\n6.  调整 `UIButton`\
    \ 的宽度。\n7.  双击 `UIButton` 以高亮其标题，并输入新标题，例如 `Reset`。你的用户界面应类似于图 3-5。\n\n![images/469983_1_En_3_Chapter/469983_1_En_3_Fig5_HTML.jpg](img/469983_1_En_3_Fig5_HTML.jpg)\n\
    图 3-5 向用户界面添加 `UIButton`\n\n8.  将鼠标悬停在故事板上的 `UIButton` 上，按住 Control 键，然后将鼠标拖动到\
    \ `ViewController.swift` 文件中 IBOutlet 的下方，如图 3-6 所示。\n9.  修改世界跟踪项目，或者创建一个与“世界跟踪”项目相同的新项目，只是将其命名为\
    \ `Node Placement`。\n10. 修改 `ViewController.swift` 文件，使代码看起来像这样：\n\n    ```\n\
    \    import UIKit\n    import SceneKit\n    import ARKit\n    class ViewController:\
    \ UIViewController, ARSCNViewDelegate {\n    @IBOutlet var sceneView: ARSCNView!\n\
    \    let configuration = ARWorldTrackingConfiguration()\n    override func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    // Do any additional setup after loading the\
    \ view, typically from a nib.\n    sceneView.delegate = self\n    sceneView.showsStatistics\
    \ = true\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin]\n \
    \   showShape()\n    }\n    override func viewWillAppear(_ animated: Bool) {\n\
    \    super.viewWillAppear(animated)\n    sceneView.session.run(configuration)\n\
    \    }\n    @IBAction func resetButton(_ sender: UIButton) {\n    sceneView.session.pause()\n\
    \    sceneView.session.run(configuration, options: [.resetTracking])\n    showShape()\n\
    \    }\n    func showShape() {\n    let node = SCNNode()\n    node.geometry =\
    \ SCNSphere(radius: 0.05)\n    node.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.yellow\n    node.position = SCNVector3(0,0,0)\n    sceneView.scene.rootNode.addChildNode(node)\n\
    \    }\n    }\n    ```\n\n11. 通过 USB 数据线将 iOS 设备连接到你的 Macintosh。\n12. 点击运行按钮或选择\
    \ Product ➤ Run。一个黄色球体将出现在世界原点，如图 3-8 所示。\n\n![images/469983_1_En_3_Chapter/469983_1_En_3_Fig8_HTML.jpg](img/469983_1_En_3_Fig8_HTML.jpg)\n\
    图 3-8 在世界原点显示一个黄色球体\n\n## 测试应用程序\n\n1.  将你的 iOS 设备移动到一个新位置，然后点击重置按钮。注意，世界坐标现在出现在不同的位置，并且原点处有一个黄色球体。\n\
    2.  点击停止按钮或选择 Product ➤ Stop。\n\n## 试验坐标\n\n让黄色球体出现在原点固然不错，但除了 `0,0,0` 之外，你还可以尝试为球体的\
    \ x、y 和 z 坐标设置不同的值。尝试用节点位置的不同值修改以下这行代码，例如：\n\n```\nnode.position = SCNVector3(0.2,\
    \ -0.4, 0.1)\n```\n\n请记住，这些值定义的是米，所以如果你选择的值太大，例如 10 米，黄色球体将因距离太远而无法在增强现实视图中看到，因此请尝试使用较低的值，如\
    \ `-0.4` 或 `0.2`。\n"
- fmt: '## Adding and Removing Multiple Objects


    In the previous app example, we displayed the world origin, which appears at the
    current iOS device’s location. Then we displayed a yellow sphere at a specific
    location. Unfortunately, defining x, y, and z coordinates for the yellow sphere
    remains fixed in code. If we want the yellow sphere to appear in another location,
    or if we want to display additional yellow spheres, we can’t do that.


    For more versatility, let’s put an `Add` button on the user interface. Each time
    the user taps the `Add` button, it will add a new yellow sphere. Of course, adding
    multiple yellow spheres won’t look any different if all the spheres share the
    same x, y, and z coordinates, so let’s also add three sliders that let us define
    new x, y, and z coordinates for a sphere before adding it to the augmented reality
    view.


    To do this, we’ll need to resize the height of the `ARKit SceneKit View` and add
    three `UISlider`s at the bottom along with three labels to identify which axis
    each slider defines. To do this, follow these steps:


    ![../images/469983_1_En_3_Chapter/469983_1_En_3_Fig9_HTML.jpg](images/469983_1_En_3_Chapter/469983_1_En_3_Fig9_HTML.jpg)


    **Figure 3-9** Redesigning the user interface with three sliders


    1. Click the `Main.storyboard` file in the Navigator pane.

    2. Resize the height of the `ARKit SceneKit View` to make more room near the bottom.

    3. Add a new `UIButton` next to the existing `Reset` button and give this new
    `UIButton` a caption name of `Add`.

    4. Add three `UISlider`s.

    5. Add three labels and modify the captions to display X, Y, and Z. Your user
    interface should look similar to **Figure 3-9**.


    This completes the user interface changes. Let’s add constraints by choosing `Edit
    ➤ Select All` (or pressing `Command+A`). Then choose `Editor ➤ Resolve Auto Layout
    Issues ➤ Reset to Suggested Constraints`. Xcode adds constraints to your labels,
    buttons, and sliders.


    Now we need to modify this user interface in two ways. First, we need to define
    the minimum and maximum values for the slider along with a default value. Second,
    we need to connect the three sliders to our `ViewController.swift` file as `IBOutlets`.
    In addition, we also need to connect the `Add` button as an `IBAction` method.


    To define the minimum and maximum values for each slider, follow these steps:


    1. Make sure you change the `Value`, `Minimum`, and `Maximum` properties identically
    for all three sliders.


    ![../images/469983_1_En_3_Chapter/469983_1_En_3_Fig10_HTML.jpg](images/469983_1_En_3_Chapter/469983_1_En_3_Fig10_HTML.jpg)


    **Figure 3-10** Modifying the properties of a slider


    1. Click on each slider.

    2. Click the `Show Attributes Inspector` icon or choose `View ➤ Inspectors ➤ Show
    Attributes inspector`. Xcode displays the `Attributes Inspector` pane.

    3. Change the `Value` property to `0`.

    4. Change the `Minimum` property to `-1`.

    5. Change the `Maximum` property to `1`, as shown in **Figure 3-10**. This lets
    you choose a value of -1 meter to 1 meter for defining a coordinate for placing
    a sphere in the augmented reality view.


    Now that we’ve defined the slider values, we need to connect all three sliders
    and the `Add` button to the `ViewController.swift` file. To do this, follow these
    steps:


    1. Release the `Control` key and the mouse. A popup menu appears.

    2. Click in the `Name` text field and type a descriptive name such as `Xslider`,
    `Yslider`, or `Zslider`. You should create three `IBOutlets` that represent the
    x, y, and z coordinates as follows:


    ```

    @IBOutlet var Xslider: UISlider!

    @IBOutlet var Yslider: UISlider!

    @IBOutlet var Zslider: UISlider!

    ```


    3. Click on the `Add` button, hold down the `Control` key, and drag the mouse
    near the bottom of the `ViewController.swift` file to create an `IBAction` method.

    4. Release the `Control` key and the mouse. A popup menu appears.

    5. Click in the `Connection` popup menu and choose `Action`.

    6. Click in the `Name` text field and type `addButton`.

    7. Click in the `Type` popup menu and choose `UIButton`.'
