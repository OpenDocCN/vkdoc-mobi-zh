  trans: "\n# 13. 与现实世界互动\n\n当我们在增强现实视图中放置虚拟对象时，这些虚拟对象可以以不同方式相互交互。两个虚拟对象交互的最简单方法是将一个放在另一个前面。然后，最近的虚拟对象会遮挡您对第二个虚拟对象的视线。\n\
    \n为了在增强现实视图中实现更高的真实感，您还可以让现实世界中的物体看起来遮挡住虚拟对象，这称为*遮挡*。我们可以通过创建一个与现实世界物体位置和大小匹配的不可见虚拟对象，来模拟现实物体遮挡虚拟对象的效果。\n\
    \n另一种交互形式是虚拟对象与现实世界物体的交互。最简单的例子是水平或垂直平面检测，`ARKit` 可以识别墙壁或地板。当然，`ARKit` 也能识别现实世界中的点。例如，它可以比较现实世界中存在的两个点之间的距离，比如桌子一个角落到另一个角落的距离。\n\
    \n为了学习如何通过虚拟对象实现遮挡，让我们按照以下步骤创建一个新的 Xcode 项目：\n\n1.  启动 Xcode。（确保您的 Xcode 版本为 10\
    \ 或更高。）\n2.  选择“文件”➤“新建”➤“项目”。Xcode 会要求您选择一个模板。\n3.  点击“iOS”类别。\n4.  点击“单视图 App”图标，然后点击“下一步”按钮。Xcode\
    \ 会要求您提供产品名称、组织名称、组织标识符和内容技术。\n5.  点击“产品名称”文本框，为您的项目输入一个描述性名称，例如 `Occlusion`。（确切名称无关紧要。）\n\
    6.  点击“下一步”按钮。Xcode 会询问您想要存储项目的位置。\n7.  选择一个文件夹，然后点击“创建”按钮。Xcode 会创建一个 iOS 项目。\n\
    \n现在，按照以下步骤修改 `Info.plist` 文件，以允许访问摄像头并使用 `ARKit`：\n\n1.  在导航器窗格中点击 `Info.plist`\
    \ 文件。Xcode 会显示键、类型和值的列表。\n2.  点击展开三角形，展开“所需设备功能”类别以显示“项目 0”。\n3.  将鼠标指针移到“项目 0”上，显示一个加号\
    \ (+) 图标。\n4.  点击此加号 (+) 图标，显示一个空白的“项目 1”。\n5.  在“项目 1”行的“值”类别下输入 `arkit`。\n6.\
    \  将鼠标指针移到最后一行，显示一个加号 (+) 图标。\n7.  点击加号 (+) 图标创建一个新行。会弹出一个菜单。\n8.  选择“隐私 – 相机使用说明”。\n\
    9.  在“隐私 – 相机使用说明”行的“值”类别下输入 `AR 需要使用摄像头`。\n\n现在是时候按照以下步骤修改 `ViewController.swift`\
    \ 文件，以使用 `ARKit` 和 `SceneKit` 了：\n\n1.  在导航器窗格中点击 `ViewController.swift` 文件。\n\
    2.  编辑 `ViewController.swift` 文件，使其内容如下：\n\n```\nimport UIKit\nimport SceneKit\n\
    import ARKit\nclass ViewController: UIViewController, ARSCNViewDelegate {\n  \
    \  let configuration = ARWorldTrackingConfiguration()\n    var x : Float = 0\n\
    \    var y : Float = 0\n    var z : Float = 0\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        // Do any additional setup after loading\
    \ the view, typically from a nib.\n    }\n}\n```\n\n这段代码声明了三个变量 `x`、`y` 和 `z`。这些变量将用于存储水平平面的位置。一旦我们的应用检测到水平平面，我们将使用这些\
    \ `x`、`y` 和 `z` 变量在水平平面下方绘制一个虚拟对象。\n\n要在我们的应用中查看增强现实，请添加一个单独的 `ARKit SceneKit\
    \ 视图`（`ARSCNView`），并将其展开以填满整个用户界面。然后，通过选择“编辑器”➤“解决自动布局问题”➤“重置为建议的约束”（位于菜单下半部分“容器中所有视图”类别下）来添加约束。\n\
    \n下一步是将用户界面项连接到 `ViewController.swift` 文件中的 Swift 代码。为此，请按照以下步骤操作：\n\n1.  在导航器窗格中点击\
    \ `Main.storyboard` 文件。\n2.  点击“助理编辑器”图标，或选择“视图”➤“助理编辑器”➤“显示助理编辑器”，以并排显示 `Main.storyboard`\
    \ 和 `ViewController.swift` 文件。\n3.  将鼠标指针移到 `ARSCNView` 上，按住 Control 键，然后按 Ctrl\
    \ 键拖拽至 `class ViewController` 行下方。\n4.  松开 Control 键和鼠标左键。会弹出一个菜单。\n5.  点击“名称”文本框，输入\
    \ `sceneView`，然后点击“连接”按钮。Xcode 会创建一个 `IBOutlet`，如下所示：\n\n```\n@IBOutlet var sceneView:\
    \ ARSCNView!\n```\n\n6.  编辑 `viewDidLoad` 函数，使其内容如下：\n\n```\noverride func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    // Do any additional setup after loading the\
    \ view, typically from a nib.\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
    \ ARSCNDebugOptions.showFeaturePoints]\n    sceneView.delegate = self\n    configuration.planeDetection\
    \ = .horizontal\n    sceneView.session.run(configuration)\n    let tapGesture\
    \ = UITapGestureRecognizer(target: self, action: #selector(tapResponse))\n   \
    \ sceneView.addGestureRecognizer(tapGesture)\n}\n```\n\n`viewDidLoad` 函数中的最后两行创建了一个点击手势，这意味着我们需要一个名为\
    \ `tapGesture` 的函数来处理此点击手势。\n\n7.  在 `viewDidLoad` 函数下方，编写以下 `tapResponse` 函数：\n\
    \n```\n@objc func tapResponse(sender: UITapGestureRecognizer) {\n    let boxNode\
    \ = SCNNode()\n    boxNode.geometry = SCNBox(width: 0.08, height: 0.08, length:\
    \ 0.08, chamferRadius: 0)\n    boxNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.green\n    boxNode.position = SCNVector3(x, y, z)\n    sceneView.scene.rootNode.addChildNode(boxNode)\n\
    }\n```\n\n这个 `tapResponse` 函数会识别用户点击屏幕的位置，然后在代表水平平面中心坐标的 `x`、`y` 和 `z` 坐标处显示一个绿色方块。\n\
    \n8.  在 `tapResponse` 函数下方，编写以下 `didAdd renderer` 函数：\n\n```\nfunc renderer(_\
    \ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor: ARAnchor) {\n\
    \    guard anchor is ARPlaneAnchor else { return }\n    let planeNode = detectPlane(anchor:\
    \ anchor as! ARPlaneAnchor)\n    node.addChildNode(planeNode)\n}\n```\n\n这个 `renderer`\
    \ 函数在 `ARKit` 首次检测到水平平面时运行。一旦检测到水平平面，它就会运行 `detectPlane` 函数（我们需要稍后编写）。\n\n9. \
    \ 编写以下 `didUpdate renderer` 函数：\n\n```\nfunc renderer(_ renderer: SCNSceneRenderer,\
    \ didUpdate node: SCNNode, for anchor: ARAnchor) {\n    guard anchor is ARPlaneAnchor\
    \ else { return }\n    node.enumerateChildNodes { (childNode, _) in\n        childNode.removeFromParentNode()\n\
    \    }\n    let planeNode = detectPlane(anchor: anchor as! ARPlaneAnchor)\n  \
    \  node.addChildNode(planeNode)\n    print(\"updating plane anchor\")\n}\n```\n\
    \n这个 `didUpdate renderer` 函数会在 iOS 摄像头检测到水平平面的更多部分时，不断调整水平平面的大小。请注意，此函数还会调用 `detectPlane`\
    \ 函数，并在每次检测到平面扩展时打印 \"updating plane anchor\"。\n\n10. 最后，编写以下 `detectPlane` 函数：\n\
    \n```\nfunc detectPlane(anchor: ARPlaneAnchor) -> SCNNode {\n    let planeNode\
    \ = SCNNode()\n    planeNode.geometry = SCNPlane(width: CGFloat(anchor.extent.x),\
    \ height: CGFloat(anchor.extent.z))\n    planeNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.yellow\n    planeNode.position = SCNVector3(anchor.center.x, anchor.center.y,\
    \ anchor.center.z)\n    x = anchor.center.x\n    y = anchor.center.y - 0.4\n \
    \   z = anchor.center.z\n    let ninetyDegrees = GLKMathDegreesToRadians(90)\n\
    \    planeNode.eulerAngles = SCNVector3(ninetyDegrees, 0, 0)\n    planeNode.geometry?.firstMaterial?.isDoubleSided\
    \ = true\n    return planeNode\n}\n```\n"
- fmt: '`detectPlane`函数的前两行创建了一个节点，然后根据检测到的平面的宽度和高度定义平面的大小。`extent`属性包含检测到的水平平面的宽度和高度。


    接下来的两行定义平面的颜色为黄色，并将该平面定位在检测到的平面锚点的中心。


    接下来的三行存储平面`x`、`y`和`z`位置的值，但会从平面的`y`位置减去0.4米。这创建了一个位于水平平面下方且低于该平面的`y`值。


    接下来的两行使用`GLKMathDegreesToRadians`将90度转换为弧度。然后，它将平面绕`x`轴旋转90度，因为该平面最初是垂直绘制的。将平面绕`x`轴旋转90度可以使平面水平显示。


    最后，最后一行将平面定义为双面，以便黄色出现在顶部和底部。


    要测试此项目，请按照以下步骤操作：


    1. 点击“停止”按钮，或选择“产品”➤“停止”。


    ![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig1_HTML.jpg](images/469983_1_En_13_Chapter/469983_1_En_13_Fig1_HTML.jpg)


    图13-1


    黄色平面遮挡了绿色盒子的视线


    1. 通过USB线将iOS设备连接到Macintosh。


    2. 点击“运行”按钮，或选择“产品”➤“运行”。首次运行此应用时，它会请求访问相机的权限，因此请授予权限。


    3. 将iOS设备的摄像头对准一个下方有空间（例如桌子）的水平平面。当ARKit识别出足够的特征点时，它会在iOS摄像头对准的水平表面上绘制一个黄色平面。


    4. 点击屏幕。这将在黄色平面下方0.4米处放置一个绿色盒子。您可能需要移动到侧面才能看到黄色平面下方的绿色盒子。请注意，如图13-1所示，当黄色平面出现在绿色盒子上方时，它会遮挡您对绿色盒子的视线。


    遮挡功能的实现方式是在检测到的水平表面（例如桌面）上显示一个不可见的水平平面。由于不可见的水平平面不可见，因此看起来像不存在。然而，除非您移动到侧面，否则它会遮挡绿色盒子的视线。这营造出一种错觉，即水平表面（例如桌面）实际上遮挡了绿色盒子的视线。


    要创建不可见的水平平面，只需注释掉`detectPlane`函数中显示平面为黄色的那一行。然后，用以下两行替换它：


    ```

    planeNode.geometry?.firstMaterial?.colorBufferWriteMask = []

    planeNode.renderingOrder = -1

    ```


    这会创建一个没有颜色且渲染顺序为`-1`的平面。大多数虚拟对象的默认`renderingOrder`值为`0`，但更高的`renderingOrder`值意味着虚拟对象会最后绘制。因此，`-1`的`renderingOrder`值意味着该虚拟对象始终显示在其他虚拟对象之上。这有助于营造一种错觉，即真实的水平平面会遮挡绿色虚拟盒子的视线，尽管实际上是一个不可见的水平平面在起作用。


    整个`detectPlane`函数应如下所示：


    ```

    func detectPlane(anchor: ARPlaneAnchor) -> SCNNode {

    let planeNode = SCNNode()

    //planeNode.geometry = SCNPlane(width: CGFloat(anchor.extent.x), height: CGFloat(anchor.extent.z))

    planeNode.geometry?.firstMaterial?.colorBufferWriteMask = []

    planeNode.renderingOrder = -1

    planeNode.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow

    planeNode.position = SCNVector3(anchor.center.x, anchor.center.y, anchor.center.z)

    x = anchor.center.x

    y = anchor.center.y - 0.4

    z = anchor.center.z

    let ninetyDegrees = GLKMathDegreesToRadians(90)

    planeNode.eulerAngles = SCNVector3(ninetyDegrees, 0, 0)

    planeNode.geometry?.firstMaterial?.isDoubleSided = true

    return planeNode

    }

    ```


    要测试此项目，请按照以下步骤操作：


    1. 点击“停止”按钮，或选择“产品”➤“停止”。


    ![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig3_HTML.jpg](images/469983_1_En_13_Chapter/469983_1_En_13_Fig3_HTML.jpg)


    图13-3


    绿色盒子看起来被真实的水平表面遮挡了


    1. 直接移动到绿色盒子上方。请注意，如图13-3所示，真实的水平表面似乎切断了您对绿色盒子的视线。


    ![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig2_HTML.jpg](images/469983_1_En_13_Chapter/469983_1_En_13_Fig2_HTML.jpg)


    图13-2


    绿色盒子出现在真实的水平表面下方


    1. 通过USB线将iOS设备连接到Macintosh。


    2. 点击“运行”按钮，或选择“产品”➤“运行”。首次运行此应用时，它会请求访问相机的权限，因此请授予权限。


    3. 将iOS设备的摄像头对准一个下方有空间（例如桌子）的水平平面。当您在水平平面上看到大量特征点，并在Xcode调试区域看到“updating plane
    anchor”时，您就知道ARKit已检测到一个水平平面，并在其上放置了一个不可见的虚拟平面。


    4. 点击屏幕。这将在不可见水平平面下方0.4米处绘制一个绿色盒子，但除非您移动到侧面，否则您将看不到它，如图13-2所示。'
  raw: 'The first two lines in the `detectPlane` function create a node and then define
    the plane’s size based on the width and height of the detected plane. The `extent`
    property contains the detected horizontal plane’s width and height


    The next two lines define a yellow color for the plane and position the plate
    at the center of the detected plane anchor.


    The next three lines store the values of the plane’s x, y, and z position, except
    it subtracts 0.4 meters from the plane’s y position. This creates a y value below
    and underneath the horizontal plane.


    The next two lines use the `GLKMathDegreesToRadians` to convert 90 degrees into
    radians. Then it rotates the plane 90 degrees around the x-axis because the plane
    will initially be drawn vertically. Rotating the plane 90 degrees around the x-axis
    makes the plane appear horizontally.


    Finally, the last line defines the plate as double-sided so the color yellow appears
    on the top and bottom.


    To test this project, follow these steps:


    1.  Click the Stop button or choose Product ➤ Stop.


    ![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig1_HTML.jpg](images/469983_1_En_13_Chapter/469983_1_En_13_Fig1_HTML.jpg)


    Figure 13-1


    The yellow plane blocks the green box from view


    1.  Connect an iOS device to your Macintosh through its USB cable.


    2.  Click the Run button or choose Product ➤ Run. The first time you run this
    app, it will ask permission to access the camera, so give it permission.


    3.  Aim the iOS device’s camera at a horizontal plane that has empty space underneath
    it, such as a table. When ARKit identifies enough feature points, it draws a yellow
    plane on top of the horizontal surface the iOS camera is aimed at.


    4.  Tap the screen. This places a green box 0.4 meters underneath the yellow plane.
    You may need to move to the side to see the green box underneath the yellow plane.
    Notice that yellow plane blocks your view of the green box when the yellow plane
    appears over the green box, as shown in Figure [13-1](#469983_1_En_13_Chapter.xhtml#Fig1).


    Occlusion works by displaying an invisible horizontal plane on a detected horizontal
    surface, such as a table top. Since the invisible horizontal plane can’t be seen,
    it will look like it’s not there. Yet it will block the green box from view unless
    you move to the side. This creates the illusion that the horizontal surface (such
    as a table top) is actually blocking the view of the green box.


    To create an invisible horizontal plane, just comment out the line in the `detectPlane`
    function that displays the plane as yellow. Then replace it with two lines like
    this:


    ```

    planeNode.geometry?.firstMaterial?.colorBufferWriteMask = []

    planeNode.renderingOrder = -1

    ```


    This creates a plane with no color and rendering order of `-1`. Most virtual objects
    have a default `renderingOrder` value of `0`, but a higher `renderingOrder` value
    makes the virtual object appear drawn last. So a `-1 renderingOrder` value means
    that the virtual object always appears over other virtual objects. This helps
    create the illusion that the real horizontal plane will block the view of the
    green virtual box even though it’s really an invisible horizontal plane that’s
    doing it.


    The entire `detectPlane` function should look like this:


    ```

    func detectPlane(anchor: ARPlaneAnchor) -> SCNNode {

    let planeNode = SCNNode()

    //planeNode.geometry = SCNPlane(width: CGFloat(anchor.extent.x), height: CGFloat(anchor.extent.z))

    planeNode.geometry?.firstMaterial?.colorBufferWriteMask = []

    planeNode.renderingOrder = -1

    planeNode.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow

    planeNode.position = SCNVector3(anchor.center.x, anchor.center.y, anchor.center.z)

    x = anchor.center.x

    y = anchor.center.y - 0.4

    z = anchor.center.z

    let ninetyDegrees = GLKMathDegreesToRadians(90)

    planeNode.eulerAngles = SCNVector3(ninetyDegrees, 0, 0)

    planeNode.geometry?.firstMaterial?.isDoubleSided = true

    return planeNode

    }

    ```


    To test this project, follow these steps:


    1.  Click the Stop button or choose Product ➤ Stop.


    ![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig3_HTML.jpg](images/469983_1_En_13_Chapter/469983_1_En_13_Fig3_HTML.jpg)


    Figure 13-3


    The green box appears cut from view by the real horizontal surface


    1.  Move directly over the green box. Notice that real horizontal surface appears
    to cut off your view of the green box, as shown in Figure [13-3](#469983_1_En_13_Chapter.xhtml#Fig3).


    ![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig2_HTML.jpg](images/469983_1_En_13_Chapter/469983_1_En_13_Fig2_HTML.jpg)


    Figure 13-2


    The green box appears underneath the real horizontal surface


    1.  Connect an iOS device to your Macintosh through its USB cable.


    2.  Click the Run button or choose Product ➤ Run. The first time you run this
    app, it will ask permission to access the camera, so give it permission.


    3.  Aim the iOS device’s camera at a horizontal plane that has empty space underneath
    it, such as a table. When you see a lot of feature points on the horizontal plane
    and see “updating plane anchor” in the Xcode debug area, you’ll know that ARKit
    has detected a horizontal plane and placed an invisible virtual plane on top of
    it.


    4.  Tap the screen. This draws a green box 0.4 meters underneath the invisible
    horizontal plane, but you won’t be able to see it unless you move to the side,
    as shown in Figure [13-2](#469983_1_En_13_Chapter.xhtml#Fig2).'
