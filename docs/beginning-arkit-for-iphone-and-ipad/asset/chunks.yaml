- fmt: '# Augmented Reality Applications


    You could also use this app to view different parts of Berlin and the app would
    display a video showing what that part of Berlin looked like during the time when
    the Berlin Wall still existed, as shown in Figure [1-7](#469983_1_En_1_Chapter.xhtml#Fig7).
    Such uses of augmented reality helped turn the Berlin Wall Memorial from a museum
    filled with static images and places to a visually dynamic display that helped
    make history seem to occur right before your eyes.


    ![../images/469983_1_En_1_Chapter/469983_1_En_1_Fig7_HTML.jpg](images/469983_1_En_1_Chapter/469983_1_En_1_Fig7_HTML.jpg)


    Figure 1-7

    Augmented reality shows tourists what Berlin looked like back in the 1960s


    Augmented reality will likely become common in advertising. Pepsi used augmented
    reality as a promotional prank by displaying a camera and a screen on a popular
    London bus stop. While people waited for the bus, the screen displayed augmented
    reality showing a tiger walking down the sidewalk, a giant robot attacking the
    city, a meteor crashing into the ground, and UFOs floating above the sky, as shown
    in Figure [1-8](#469983_1_En_1_Chapter.xhtml#Fig8).


    ![../images/469983_1_En_1_Chapter/469983_1_En_1_Fig8_HTML.jpg](images/469983_1_En_1_Chapter/469983_1_En_1_Fig8_HTML.jpg)


    Figure 1-8

    Pepsi used augmented reality as a promotional gimmick


    Just as air forces around the world rely on heads-up displays for their pilots,
    so will soldiers on the ground soon rely on similar heads-up displays to help
    them identify targets around them. The U.S. Army is developing Tactical Augmented
    Reality (`TAC`) where soldiers will wear smart glasses so they can see enhanced
    views of the world around them, including night vision and identification of possible
    targets, as shown in Figure [1-9](#469983_1_En_1_Chapter.xhtml#Fig9).


    ![../images/469983_1_En_1_Chapter/469983_1_En_1_Fig9_HTML.jpg](images/469983_1_En_1_Chapter/469983_1_En_1_Fig9_HTML.jpg)


    Figure 1-9

    Soldiers of the future may wear smart glasses with heads-up displays to identify
    possible targets


    The Disney Corporation is experimenting with augmented reality to create interactive
    coloring books. As a child colors an image, they can view that image as a three-dimensional
    character standing on the pages right in front of them, as shown in Figure [1-10](#469983_1_En_1_Chapter.xhtml#Fig10).


    ![../images/469983_1_En_1_Chapter/469983_1_En_1_Fig10_HTML.jpg](images/469983_1_En_1_Chapter/469983_1_En_1_Fig10_HTML.jpg)


    Figure 1-10

    Augmented reality can create interactive coloring books


    Games, advertising, heads-up displays, and interactive books are just some of
    the many possibilities that augmented reality offers. To this day, Apple continues
    acquiring augmented reality companies to improve its augmented reality plans,
    such as `ARKit`. In 2016, Apple acquired Flyby Media, an augmented reality company
    that focused on spatial recognition. Flyby Media’s technology would let augmented
    reality devices understand distances between mobile devices and real-world objects
    around them.


    In 2017, Apple acquired SensoMotoric Instruments, a company that specialized in
    eye tracking technology that could be used for virtual and augmented reality glasses.
    That same year, Apple acquired VRvana, a company that specialized in mixed reality
    headsets. In 2018, Apple acquired Akonia Holographics, a startup that advertised
    that they made “holographic reflective and waveguide optics for transparent display
    elements in smart glasses”.


    By tracking Apple’s latest augmented reality acquisitions, you can see what new
    features will eventually come to `ARKit` on iOS devices like the iPhone and iPad,
    and in future devices like smart glasses or heads-up displays for cars. `ARKit`
    will continue growing in features while making augmented reality accessible to
    all `Swift` and `Objective-C` developers who want to add augmented reality in
    their own iOS apps. By learning `ARKit` now, you can create augmented reality
    apps now and in the future.


    ### Note


    Augmented reality is best suited for mobile devices with a camera such as the
    iPhone and iPad. That means `ARKit` is designed for creating iOS apps but is not
    designed to work with Apple’s other operating systems, such as `MacOS`, `tvOS`,
    or `watchOS`.


    ## System Requirements for ARKit


    Since augmented reality requires processing power, cameras, and high-resolution
    displays, you can only create and run `ARKit` apps on modern iOS devices. That
    means `ARKit` apps can only run on the iPhone 6s/6s Plus or higher along with
    the iPad Pro. Older iOS devices such as the iPhone 5s or iPad mini won’t be able
    to run `ARKit` apps. As people abandon older iOS devices in favor of newer models,
    this restriction won’t be much of a problem but for now, be aware that any `ARKit`
    apps you create may not run on some people’s older iOS devices.


    To create apps, you need to use Apple’s free `Xcode` compiler. When creating ordinary
    iOS apps, you can test them on the `Simulator` program that lets your Macintosh
    mimic different iPhone and iPad models such as the iPhone 4s. When creating iOS
    apps that use `ARKit`, you will not be able to test your apps on the `Simulator`
    program. Instead, you’ll need a physical iOS device such as an iPhone 6s or newer,
    or iPad Pro that you’ll need to connect to your Macintosh through its USB cable.
    You can only test `ARKit` apps through a physical device because you need to use
    the camera in a real iOS device.


    Finally, to create iOS apps that use `ARKit`, you can choose between Apple’s two
    official programming languages—`Swift` and `Objective-C`. While many older apps
    were written in `Objective-C`, `Swift` is Apple’s programming language of the
    future. Not only is `Swift` just as powerful as `Objective-C`, but it’s also faster
    and far easier to learn. Although you can use `Objective-C` to create `ARKit`
    apps, it’s far better to focus solely on `Swift` to create `ARKit` apps. `Swift`
    will only continue to grow in popularity, while `Objective-C` will continue decreasing
    in popularity over time as more developers embrace `Swift`. Because the future
    of Apple development is `Swift` and not `Objective-C`, this book focuses exclusively
    on `Swift` to create `ARKit` apps.


    To create augmented reality apps in this book, you’ll need a Macintosh and a copy
    of `Xcode 10` or greater. You’ll also need an iOS device such as an iPhone or
    iPad that you can connect to your Macintosh through its USB cable. To take full
    advantage of all the latest features of `ARKit`, your iOS device should also be
    running `iOS 12` or later.'
