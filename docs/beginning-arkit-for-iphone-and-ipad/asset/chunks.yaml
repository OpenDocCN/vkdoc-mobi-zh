  raw: '## Defining a Point in the Real World


    For our ruler app to work, we need to define two points in the real world and
    then measure the distance between them. That means placing two points in the real
    world and storing the location of those points.


    Each time the user taps the screen, we want to display a small sphere that defines
    a point in the real world. Then the user will need to point and tap the iOS device
    at another point so the app can measure the distance between the two points.


    Inside the `tapResponse` function , we need to get the center of the screen where
    the center of the camera is pointed at, which is where the plus sign appears on
    the screen. To do that, we need to retrieve the scene that the user tapped on
    and identify the center like this:


    ```

    let scene = sender.view as! ARSCNView

    let location = scene.center

    ```


    Next, we need to use the `hitTest` method to identify a feature point where the
    camera is pointing. A feature point represents a real-world surface that ARKit
    can recognize so the code looks like this:


    ```

    let hitTestResults = scene.hitTest(location, types: .featurePoint)

    ```


    As long as ARKit can identify a feature point, we can proceed so we need an `if`
    statement like this:


    ```

    if hitTestResults.isEmpty == false {

    }

    ```


    Inside this `if` statement, we need to retrieve the first item retrieved from
    the `hitTestResults` constant :


    ```

    guard let hitTestResults = hitTestResults.first else { return }

    ```


    Once we’ve identified a point that the camera is pointing at, we can create a
    green sphere to appear at that point:


    ```

    let sphereNode = SCNNode()

    sphereNode.geometry = SCNSphere(radius: 0.003)

    sphereNode.geometry?.firstMaterial?.diffuse.contents = UIColor.green

    ```


    To place the green sphere where the center of the camera is pointing, we need
    to retrieve the x, y, and z coordinates of the camera through its `worldTransform`
    property , which is a matrix. The third column of the matrix contains the position
    we need, so we can define the green sphere’s position like this:


    ```

    sphereNode.position = SCNVector3(hitTestResults.worldTransform.columns.3.x, hitTestResults.worldTransform.columns.3.y,
    hitTestResults.worldTransform.columns.3.z)

    ```


    Finally we need to add the sphere to the scene like this:


        sceneView.scene.rootNode.addChildNode(sphereNode)


    The entire tapResponse function should look like this:


    ```

    @objc func tapResponse(sender: UITapGestureRecognizer) {

    let scene = sender.view as! ARSCNView

    let location = scene.center

    let hitTestResults = scene.hitTest(location, types: .featurePoint)

    if hitTestResults.isEmpty == false {

    guard let hitTestResults = hitTestResults.first else { return }

    let sphereNode = SCNNode()

    sphereNode.geometry = SCNSphere(radius: 0.003)

    sphereNode.geometry?.firstMaterial?.diffuse.contents = UIColor.green

    sphereNode.position = SCNVector3(hitTestResults.worldTransform.columns.3.x, hitTestResults.worldTransform.columns.3.y,
    hitTestResults.worldTransform.columns.3.z)

    sceneView.scene.rootNode.addChildNode(sphereNode)

    }

    ```


    If you test this app, you’ll be able to point the plus sign in the center of the
    screen at any real item and tap the screen to place a green sphere.


    ## Measuring Distance Between Virtual Objects


    Our ruler app will define two feature points detected in the real world, display
    green spheres to mark their locations, and then calculate the distance between
    the two virtual objects. Finally, it will display the result on the screen. First,
    we’ll need to keep track of the two points using an array of `SCNNode`s:


    ```

    var realPoints = [SCNNode]()

    ```


    This array will store the location of the two feature points, identified by green
    spheres. After we place a green sphere in the augmented reality view, we need
    to store that sphere’s location in the array by using the `append` method like
    this:


    ```

    realPoints.append(sphereNode)

    ```


    If the number of spheres added to the augmented reality view is exactly two, then
    we can calculate the distance between those two points. If the number of spheres
    added is only one or zero, then we don’t need to do anything, so we need an `if`
    statement that counts the number of spheres in the array like this:


    ```

    if realPoints.count == 2 {

    }

    ```


    Inside this `if` statement, we need to retrieve the two stored spheres:


    ```

    if realPoints.count == 2 {

    let pointOne = realPoints.first!

    let pointTwo = realPoints.last!

    }

    ```


    This code retrieves the first and last elements stored in the `realPoints` array
    . Now we need to get the x, y, and z positions by subtracting the second sphere
    (`pointTwo`) from the position of the first sphere (`pointOne`):


    ```

    if realPoints.count == 2 {

    let pointOne = realPoints.first!

    let pointTwo = realPoints.last!

    let x = pointTwo.position.x - pointOne.position.x

    let y = pointTwo.position.y - pointOne.position.y

    let z = pointTwo.position.z - pointOne.position.z

    }

    ```


    We can define the position using these x, y, and z values:


    ```

    if realPoints.count == 2 {

    let pointOne = realPoints.first!

    let pointTwo = realPoints.last!

    let x = pointTwo.position.x - pointOne.position.x

    let y = pointTwo.position.y - pointOne.position.y

    let z = pointTwo.position.z - pointOne.position.z

    let position = SCNVector3(x, y, z)

    }

    ```


    Now we can calculate the distance using Pythagorean’s theorem. Since we’re working
    in three dimensions, we need to use the x, y, and z coordinates to define the
    distance like this:


    ![$$ distance=\sqrt{x^2+{y}^2+{z}^2} $$](images/469983_1_En_13_Chapter/469983_1_En_13_Chapter_TeX_Equa.png)


    In Swift, this equation looks like this:


    ```

    let distance = sqrt(position.x * position.x + position.y * position.y + position.z
    * position.z)

    ```


    So the complete `if` statement looks like this:


    ```

    if realPoints.count == 2 {

    let pointOne = realPoints.first!

    let pointTwo = realPoints.last!

    let x = pointTwo.position.x - pointOne.position.x

    let y = pointTwo.position.y - pointOne.position.y

    let z = pointTwo.position.z - pointOne.position.z

    let position = SCNVector3(x, y, z)

    let distance = sqrt(position.x * position.x + position.y * position.y + position.z
    * position.z)

    }

    ```


    Now that we can accurately calculate the distance between two points, defined
    by green spheres in the augmented reality view, the final step is to display the
    results on the screen. To do this, we can create `SCNText`, which displays text
    as a virtual object.


    We want to display the distance in between the two green spheres. To do that,
    we need to calculate a halfway point in between the two green spheres for the
    distance result to appear. At the end of the `if` statement, we need to calculate
    a location like this:


    ```

    let x1 = (pointOne.position.x + pointTwo.position.x) / 2

    let y1 = pointOne.position.y + pointTwo.position.y

    let z1 = pointOne.position.z + pointTwo.position.z

    let centerPosition = SCNVector3(x1, y1, z1)

    ```


    Then we need to call a `displayText` function that takes the distance between
    the two points and a position to display the actual answer as virtual text:


    ```

    displayText(answer: distance, position: centerPosition)

    ```


    This means we need to create a `displayText` function that defines `SCNText` and
    displays the distance as yellow text that floats in the augmented reality view:'
