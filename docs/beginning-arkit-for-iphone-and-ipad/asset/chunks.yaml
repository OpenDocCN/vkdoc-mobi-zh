    \ Value category in the Privacy – Camera Usage Description row.\n\nNow it’s time\
    \ to modify the `ViewController.swift` file to use ARKit and SceneKit by following\
    \ these steps:\n\n1.  Click on the `ViewController.swift` file in the Navigator\
    \ pane.\n\n2.  Edit the `ViewController.swift` file so it looks like this:\n\n\
    ```\n    import UIKit\n    import SceneKit\n    import ARKit\n    class ViewController:\
    \ UIViewController, ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    override func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n    }\n    }\n    ```\n\
    \nTo view augmented reality in our app, add a single ARKit SceneKit View (ARSCNView)\
    \ so the user interface looks similar to Figure [9-1](#469983_1_En_9_Chapter.xhtml#Fig1).\n\
    \n![../images/469983_1_En_9_Chapter/469983_1_En_9_Fig1_HTML.jpg](images/469983_1_En_9_Chapter/469983_1_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1\n\nThe user interface includes a single ARSCNView\n\nAfter you’ve\
    \ designed your user interface , you need to add constraints. To add constraints,\
    \ choose Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints\
    \ at the bottom half of the menu under the All Views in Container category.\n\n\
    The next step is to connect the user interface items to the Swift code in the\
