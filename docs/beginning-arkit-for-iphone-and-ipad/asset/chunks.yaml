    let item1 = Images(title: "CRS-15 SpaceX 火箭", info: "商业补给服务")

    let item2 = Images(title: "土星五号火箭", info: "阿波罗登月运载火箭")

    imageArray.append(item1)

    imageArray.append(item2)

    }

    }

    ```


    如果你运行这个应用，你会看到标题文本出现在图像的右下角，而信息文本则显示在下方，如图 14-5 所示。


    ![../images/469983_1_En_14_Chapter/469983_1_En_14_Fig5_HTML.jpg](img/469983_1_En_14_Fig5_HTML.jpg)


    图 14-5


    在增强现实视图中显示文本


    ## 总结


    图像检测的工作原理是将一张或多张图像存储在专门的`AR Resources`文件夹中，然后当 ARKit 识别到其中任何一张存储的图像时，利用 iOS 设备的摄像头运行多个渲染器函数。当你将图像拖放到`AR
    Resources`文件夹时，必须定义该图像的物理宽度和高度。此外，你还需要为每张图像赋予一个独特的名称，以便之后能使用该名称来识别 iOS 设备摄像头当前找到的是哪张被识别的图像。


    一旦你能够利用每张被识别图像的名称来指定具体识别了哪张图像，就可以在增强现实视图中显示与该图像相关的文本。这些文本可以出现在被识别图像的边界之内或之外。


    图像检测在高分辨率图片上效果最佳。通过使用图像检测，你的增强现实应用可以响应真实世界中的物体，并以虚拟文本的形式提供关于该物体的信息，这些文本只有通过 iOS
    设备的摄像头才能看到。


    # 15. 显示视频和虚拟模型


    在第 14 章中，我们学习了如何使用图像检测来识别特定物品，然后通过显示与该图像相关的文本来进行响应。在本章中，我们将继续使用图像检测，但不再以虚拟对象的形式显示文本，而是学习如何显示视频或虚拟模型。


    当在图像检测中使用视频时，用户可以将 iOS 设备的摄像头对准一张静态图像，增强现实视图会在该图像上显示一个视频。


    当在图像检测中使用虚拟模型时，用户可以将 iOS 设备的摄像头对准一张静态图像，并看到一个三维虚拟模型漂浮在图像前方的半空中。


    为了学习如何在图像检测中使用视频和虚拟模型，我们将修改在第 14 章中创建的图像检测项目。你可以复制该项目，或者直接修改现有的代码。


    首先，让我们编辑项目中的代码，为添加显示视频和虚拟模型的代码腾出空间。删除`nodeFor renderer`函数中`switch`语句内的所有代码，使其看起来像这样：


    ```

    switch imageAnchor.referenceImage.name {

    case "CRS-15":

    print("第一张图片")

    case "SaturnV":

    print("第二张图片")

    default:

    print("未发现任何内容")

    }

    ```


    现在我们需要将一个`.scn`文件拖放到我们的 Xcode 项目中。最简单的做法是选择“文件”➤“新建”➤“项目”来创建一个增强现实应用。这会创建一个示例增强现实应用，其中在`art.scnassets`文件夹内包含`ship.scn`
    SceneKit 文件。


    将两个 Xcode 窗口并排放置，从示例增强现实项目的 Xcode 窗口中，将`ship.scn`及其附带的`texture.png`文件拖放到当前项目 Xcode
    窗口的导航器窗格中。


    现在你还需要将一个`.mov`视频文件拖放到导航器窗格中。这个视频可以是任何你想要的，比如从你的 iPhone 上捕获的视频，或者从互联网上下载的视频文件。


    当你将`ship.scn`和一个`.mov`文件都放入当前项目的导航器窗格后，点击每个文件，并确保在“目标成员”类别下选中了复选框，如图 15-1 所示。如果“目标成员”复选框未被选中，即使文件出现在导航器窗格中，Xcode
    也不会将其包含在当前项目中。


    ![../images/469983_1_En_15_Chapter/469983_1_En_15_Fig1_HTML.jpg](img/469983_1_En_15_Fig1_HTML.jpg)


    图 15-1


    必须为你的`.scn`和`.mp4`文件选中“目标成员”复选框'
- fmt: "# Displaying Virtual Objects in Mid-Air\n\nThe goal is to have ARKit use image\
    \ detection to recognize an image in the real world. As soon as it recognizes\
    \ an image, it displays a virtual object in front of that image. All code will\
    \ be written inside the `switch` statement in the `nodeFor(renderer:)` function.\
    \ To display a virtual object after recognizing an image, follow these steps:\n\
    \n1. Write the following inside the first `case` statement inside the `switch`\
    \ statement to create a variable that represents the `ship.scn` virtual object\
    \ like this:\n   ```\n   let item = SCNScene(named: \"ship.scn\")\n   ```\n\n\
    2. Now we need to identify the parent or rootnode of the virtual object by writing\
    \ the following line:\n   ```\n   let itemNode = item?.rootNode.childNode(withName:\
    \ \"ship\", recursively: true)\n   ```\n\n3. Now we need to position the virtual\
    \ object node in the augmented reality view by retrieving the position from the\
    \ `ARImageAnchor`:\n   ```\n   itemNode?.position = SCNVector3(anchor.transform.columns.3.x,\
    \ anchor.transform.columns.3.y, anchor.transform.columns.3.z)\n   sceneView.scene.rootNode.addChildNode(itemNode!)\n\
    \   ```\n\nAt this point, the code will recognize the first image and then display\
    \ `ship.scn` in mid-air. However, to create a more interesting visual effect,\
    \ we can also rotate the virtual object around.\n\n4. Add the following two lines\
    \ above the code from Step 4. The following code defines rotation around the x-,\
    \ y-, and z-axes and keeps this rotation animation going forever:\n   ```\n  \
    \ let rotateMe = SCNAction.rotateBy(x: 0.5, y: 0.1, z: 0.2, duration: 1)\n   let\
    \ repeatMe = SCNAction.repeatForever(rotateMe)\n   itemNode?.runAction(repeatMe)\n\
    \   ```\n\n![../images/469983_1_En_15_Chapter/469983_1_En_15_Fig2_HTML.jpg](images/469983_1_En_15_Chapter/469983_1_En_15_Fig2_HTML.jpg)\n\
    \nFigure 15-2 – Identifying the rootnode name of an image\n\n1. Click on the `ship.scn`\
    \ file in the Navigator pane. Xcode displays both the image and a list of the\
    \ nodes that make up that image, as shown in Figure 15-2. The rootnode name for\
    \ the `ship.scn` file is “ship”.\n\nThe rotation values for the x-, y-, and z-axes\
    \ are arbitrary, so feel free to experiment with different values so you can see\
    \ how they change the rotation of the virtual object.\n\nThe entire `ViewController.swift`\
    \ file should look like this:\n```\nimport UIKit\nimport SceneKit\nimport ARKit\n\
    class ViewController: UIViewController, ARSCNViewDelegate  {\n@IBOutlet var sceneView:\
    \ ARSCNView!\nlet configuration = ARWorldTrackingConfiguration()\nstruct Images\
    \ {\nvar title: String\nvar info: String\n}\nvar imageArray: [Images] = []\noverride\
    \ func viewDidLoad() {\nsuper.viewDidLoad()\n// Do any additional setup after\
    \ loading the view, typically from a nib.\nsceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
    \ ARSCNDebugOptions.showFeaturePoints]\nsceneView.delegate = self\nguard let storedImages\
    \ =  ARReferenceImage.referenceImages(inGroupNamed: \"AR Resources\", bundle:\
    \ nil) else {\nfatalError(\"Missing AR Resources images\")\n}\nconfiguration.detectionImages\
    \ = storedImages\ngetData()\nsceneView.session.run(configuration)\n}\nfunc renderer(_\
    \ renderer: SCNSceneRenderer, nodeFor anchor: ARAnchor) -> SCNNode? {\nguard let\
    \ imageAnchor = anchor as? ARImageAnchor else { return nil }\nlet plane = SCNPlane(width:\
    \ imageAnchor.referenceImage.physicalSize.width, height: imageAnchor.referenceImage.physicalSize.height)\n\
    plane.firstMaterial?.diffuse.contents = UIColor.clear\nlet planeNode = SCNNode()\n\
    planeNode.geometry = plane\nlet ninetyDegrees = GLKMathDegreesToRadians(-90)\n\
    planeNode.eulerAngles = SCNVector3(ninetyDegrees, 0, 0)\nswitch imageAnchor.referenceImage.name\
    \ {\ncase \"CRS-15\":\nprint(\"1st image\")\nlet item = SCNScene(named: \"ship.scn\"\
    )\nlet itemNode = item?.rootNode.childNode(withName: \"ship\", recursively: true)\n\
    let rotateMe = SCNAction.rotateBy(x: 0.5, y: 0.1, z: 0.2, duration: 1)\nlet repeatMe\
    \ = SCNAction.repeatForever(rotateMe)\nitemNode?.runAction(repeatMe)\nitemNode?.position\
    \ = SCNVector3(anchor.transform.columns.3.x, anchor.transform.columns.3.y,anchor.transform.columns.3.z)\n\
    sceneView.scene.rootNode.addChildNode(itemNode!)\ncase \"SaturnV\":\nprint(\"\
    2nd image\")\ndefault:\nprint(\"Nothing found\")\n}\nlet node = SCNNode()\nnode.addChildNode(planeNode)\n\
    return node\n}\nfunc getData() {\nlet item1 = Images(title: \"CRS-15 SpaceX rocket\"\
    , info: \"Commercial Resupply Service\")\nlet item2 = Images(title: \"Saturn V\
    \ rocket\", info: \"Apollo moon launch vehicle\")\nimageArray.append(item1)\n\
    imageArray.append(item2)\n}\n}\n```\n\nTo test this app, follow these steps:\n\
    \n1. Click the Stop button or choose Product ➤ Stop.\n\n![../images/469983_1_En_15_Chapter/469983_1_En_15_Fig3_HTML.jpg](images/469983_1_En_15_Chapter/469983_1_En_15_Fig3_HTML.jpg)\n\
    \nFigure 15-3 – The `ship.scn` virtual object appears and rotates when the app\
    \ recognizes the first image\n\n2. Connect an iOS device to your Macintosh through\
    \ its USB cable.\n3. Click the Run button or choose Product ➤ Run.\n4. Load the\
    \ first picture on your computer that you stored in your project’s `AR Resources`\
    \ folder.\n5. Aim the iOS device’s camera at the screen that displays the picture\
    \ you want ARKit to recognize. When ARKit recognizes the image, it displays the\
    \ `ship.scn` virtual object that rotates slowly in the air, as shown in Figure\
    \ 15-3.\n\nRepeat these steps except point the iOS device’s camera at the second\
    \ image stored in the `AR Resources` folder. Notice that the virtual object does\
    \ not appear for this second virtual object."
