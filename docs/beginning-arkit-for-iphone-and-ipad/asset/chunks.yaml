- fmt: "## 连接视图并配置平面检测\n\n2. 点击助手编辑器图标，或选择 View ➤ Assistant Editor ➤ Show Assistant\
    \ Editor，以并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n\n3.  将鼠标指针悬停在\
    \ `ARSCNView` 上，按住 Control 键，并 Ctrl-拖曳到 `class ViewController` 行下方。\n\n4.  松开\
    \ Control 键和鼠标左键。将出现一个弹出菜单。\n\n5.  在 Name 文本框中输入 `sceneView`，然后点击 Connect 按钮。Xcode\
    \ 将创建一个 IBOutlet，如下所示：\n\n    ```\n    @IBOutlet var sceneView: ARSCNView!\n \
    \   ```\n\n## 配置视图和平面检测\n\n6.  编辑 `viewDidLoad` 函数，使其如下所示：\n\n    ```\n    override\
    \ func viewDidLoad() {\n        super.viewDidLoad()\n        // Do any additional\
    \ setup after loading the view, typically from a nib.\n        sceneView.debugOptions\
    \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \        sceneView.delegate = self\n        configuration.planeDetection = .horizontal\n\
    \        sceneView.session.run(configuration)\n    }\n    ```\n\n7.  编辑 `viewWillAppear`\
    \ 函数，使其如下所示：\n\n    ```\n    override func viewWillAppear(_ animated: Bool) {\n\
    \        super.viewWillAppear(animated)\n        sceneView.session.run(configuration)\n\
    \    }\n    ```\n\n请注意，要检测水平平面，我们只需要一行代码：\n\n```\nconfiguration.planeDetection\
    \ = .horizontal\n```\n\n检测水平平面需要 ARKit 在一个平坦的水平表面上识别足够的特征点（那些微小的黄点）。为了提高 ARKit\
    \ 检测到水平平面的几率，请将 iOS 设备的摄像头对准具有丰富纹理或颜色变化的平坦表面，例如床、地毯或桌子。相比之下，纯白色的地板将更难识别，因为 ARKit\
    \ 可识别的细节要少得多。\n\n## 实现渲染器委托方法\n\n为了检测 ARKit 是否识别出水平平面，我们需要一个 `didAdd renderer`\
    \ 函数。该函数在 ARKit 每次识别出一个水平平面并将其识别为一个名为 `ARPlaneAnchor` 的平面锚定时运行，该锚定定义了平坦表面的位置和方向。在您的\
    \ `ViewController.swift` 文件中添加以下 `didAdd renderer` 函数：\n\n```\nfunc renderer(_\
    \ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor: ARAnchor) {\n\
    \    guard anchor is ARPlaneAnchor else { return }\n    print (\"plane detected\"\
    )\n}\n```\n\nARKit 首次识别一个水平平面时，它会假定该水平平面仅为其通过 iOS 设备摄像头看到的大小。当您移动 iOS 设备的摄像头时，ARKit\
    \ 会发现该水平平面的其他点。当这种情况发生时，它会更新其地板锚点信息，以存储一个更大尺寸的水平平面。\n\n每次 ARKit 通过认识到水平平面可能更大而更新其\
    \ `ARPlaneAnchor` 信息时，它都会运行一个 `didUpdate renderer` 函数。在 `ViewController.swift`\
    \ 文件中添加以下 `didUpdate renderer` 函数：\n\n```\nfunc renderer(_ renderer: SCNSceneRenderer,\
    \ didUpdate node: SCNNode, for anchor: ARAnchor) {\n    guard anchor is ARPlaneAnchor\
    \ else { return }\n    print(\"updating floor anchor\")\n}\n```\n\n在这两个 `renderer`\
    \ 函数中，都有一个初始的 `guard` 语句，用于检查 `renderer` 函数是否识别到水平平面 (`ARPlaneAnchor`)。如果没有，则\
    \ `renderer` 函数退出。如果 `renderer` 函数确实识别到一个水平平面，那么每个 `renderer` 函数都会打印一条语句（`\"plane\
    \ detected\"` 或 `\"updating floor anchor\"`）。\n\n## 完整的 ViewController.swift 文件\n\
    \n完整的 `ViewController.swift` 文件应如下所示：\n\n```\nimport UIKit\nimport SceneKit\n\
    import ARKit\nclass ViewController: UIViewController, ARSCNViewDelegate {\n  \
    \  @IBOutlet var sceneView: ARSCNView!\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
    \ any additional setup after loading the view, typically from a nib.\n       \
    \ sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \        sceneView.delegate = self\n        configuration.planeDetection = .horizontal\n\
    \        sceneView.session.run(configuration)\n    }\n    func renderer(_ renderer:\
    \ SCNSceneRenderer, didAdd node: SCNNode, for anchor: ARAnchor) {\n        guard\
    \ anchor is ARPlaneAnchor else { return }\n        print (\"plane detected\")\n\
    \    }\n    func renderer(_ renderer: SCNSceneRenderer, didUpdate node: SCNNode,\
    \ for anchor: ARAnchor) {\n        guard anchor is ARPlaneAnchor else { return\
    \ }\n        print(\"updating plane anchor\")\n    }\n}\n```\n\n## 测试项目\n\n要测试此项目，请按照以下步骤操作：\n\
    \n1.  通过 USB 数据线将 iOS 设备连接到 Macintosh。\n2.  点击 Run 按钮或选择 Product ➤ Run。首次运行此应用程序时，它会请求访问摄像头的权限，请授予其权限。\n\
    3.  将 iOS 设备的摄像头对准水平平面，例如椅子座面或地板。ARKit 首次识别出水平平面时，Xcode 调试区域会显示消息 “plane detected”。\n\
    4.  移动 iOS 设备以捕捉更多水平平面。每次 ARKit 识别出水平平面的新部分时，Xcode 调试区域会显示消息 “updating plane anchor”。\n\
    5.  点击 Stop 按钮或选择 Product ➤ Stop。"
  raw: "2.  Click the Assistant Editor icon or choose View ➤ Assistant Editor ➤ Show\
    \ Assistant Editor to display the `Main.storyboard` and the `ViewController.swift`\
    \ file side by side.\n\n3.  Move the mouse pointer over the ARSCNView, hold down\
    \ the Control key, and Ctrl-drag under the `class ViewController` line.\n\n4.\
    \  Release the Control key and the left mouse button. A popup menu appears.\n\n\
    5.  Click in the Name text field and type `sceneView`, then click the Connect\
    \ button. Xcode creates an IBOutlet as shown here:\n\n```\n    @IBOutlet var sceneView:\
    \ ARSCNView!\n    ```\n\n6.  Edit the `viewDidLoad` function so it looks like\
    \ this:\n\n```\n    override func viewDidLoad() {\n    super.viewDidLoad()\n \
    \   // Do any additional setup after loading the view, typically from a nib.\n\
    \    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    sceneView.delegate = self\n    configuration.planeDetection = .horizontal\n\
    \    sceneView.session.run(configuration)\n    }\n    ```\n\n7.  Edit the `viewWillAppear`\
    \ function so it looks like this:\n\n```\n    override func viewWillAppear(_ animated:\
    \ Bool) {\n    super.viewWillAppear(animated)\n    sceneView.session.run(configuration)\n\
    \    }\n    ```\n\nNotice that to detect a horizontal plane, we just need one\
    \ line of code:\n\n```\nconfiguration.planeDetection = .horizontal\n```\n\nDetecting\
    \ a horizontal plane requires ARKit identifying enough feature points (those tiny\
    \ yellow dots) on a flat, horizontal surface. To increase the odds that ARKit\
    \ will detect a horizontal plane, aim your iOS device’s camera at a flat surface\
    \ with plenty of texture or color variation such as a bed, a rug or carpet, or\
    \ a table. In comparison, a solid white floor will be much harder to identify\
    \ since there will be much less detail for ARKit to identify.\n\nTo detect if\
    \ ARKit has identified a horizontal plane, we’ll need a `didAdd renderer` function.\
    \ This function runs each time ARKit identifies a horizontal plane and identifies\
    \ it as a plane anchor called `ARPlaneAnchor`, which defines the position an orientation\
    \ of the flat surface. Add the following `didAdd renderer` function in your `ViewController.swift`\
    \ file:\n\n```\nfunc renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode,\
    \ for anchor: ARAnchor) {\nguard anchor is ARPlaneAnchor else { return }\nprint\
    \ (\"plane detected\")\n}\n```\n\nThe first time ARKit identifies a horizontal\
    \ plane, it assumes the horizontal plane is only as large as what it sees through\
    \ the iOS device’s camera. As you move the iOS device’s camera around, ARKit will\
    \ spot additional points of the horizontal plane. When that occurs, it updates\
    \ its floor anchor information so it stores a larger dimension of the horizontal\
    \ plane.\n\nEach time ARKit updates its `ARPlaneAnchor` information by realizing\
    \ a horizontal plane may be larger, it runs an `didUpdate renderer` function .\
    \ Add the following `didUpdate renderer` function in the `ViewController.swift`\
    \ file:\n\n```\nfunc renderer(_ renderer: SCNSceneRenderer, didUpdate node: SCNNode,\
    \ for anchor: ARAnchor) {\nguard anchor is ARPlaneAnchor else { return }\nprint(\"\
    updating floor anchor\")\n}\n```\n\nIn both of these `renderer` functions, there’s\
    \ an initial `guard` statement that checks if the `renderer` function identifies\
    \ a horizontal plane (`ARPlaneAnchor`). If not, then the `renderer` function exits.\
    \ If the `renderer` function does identify a horizontal plane, then each `renderer`\
    \ function prints a statement (`“plane detected”` or `“updating floor anchor”`).\n\
    \nThe entire `ViewController.swift` file should look like this:\n\n```\nimport\
    \ UIKit\nimport SceneKit\nimport ARKit\nclass ViewController: UIViewController,\
    \ ARSCNViewDelegate {\n@IBOutlet var sceneView: ARSCNView!\nlet configuration\
    \ = ARWorldTrackingConfiguration()\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n\
    // Do any additional setup after loading the view, typically from a nib.\nsceneView.debugOptions\
    \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    sceneView.delegate = self\nconfiguration.planeDetection = .horizontal\nsceneView.session.run(configuration)\n\
    }\nfunc renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:\
    \ ARAnchor) {\nguard anchor is ARPlaneAnchor else { return }\nprint (\"plane detected\"\
    )\n}\nfunc renderer(_ renderer: SCNSceneRenderer, didUpdate node: SCNNode, for\
    \ anchor: ARAnchor) {\nguard anchor is ARPlaneAnchor else { return }\nprint(\"\
    updating plane anchor\")\n}\n}\n```\n\nTo test this project, follow these steps:\n\
    \n1.  Connect an iOS device to your Macintosh through its USB cable.\n\n2.  Click\
    \ the Run button or choose Product ➤ Run. The first time you run this app, it\
    \ will ask permission to access the camera so give it permission.\n\n3.  Aim the\
    \ iOS device’s camera at a horizontal plane such as the seat of a chair or the\
    \ floor. The first time ARKit identifies a horizontal plane, the Xcode debug area\
    \ displays the message “plane detected”.\n\n4.  Move the iOS device around to\
    \ capture more of the horizontal plane. Each time ARKit recognizes a new part\
    \ of the horizontal plane, the Xcode debug area displays the message “updating\
    \ plane anchor”.\n\n5.  Click the Stop button or choose Product ➤ Stop."
