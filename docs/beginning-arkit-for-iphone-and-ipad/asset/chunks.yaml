  raw: '## Colliding with Virtual Objects


    To make a virtual object collide with another one, the two colliding virtual objects
    need to be either `.static` or `.dynamic` physics body types. At the end of the
    `viewDidLoad` function, add this line to call a function called `addTargets`:


    ```

    addTargets()

    ```


    The projectile purples sphere is defined as a `.dynamic` physics body, which means
    that any other virtual objects that we want to collide with the purple sphere
    must be `.dynamic` or `.static` physics bodies. First, let’s create an `addTargets`
    function :


    ```

    func addTargets() {

    }

    ```


    Add a pyramid in the `addTargets` function that defines an orange color, specific
    dimensions, and a position based on the world origin. Then define the pyramid
    as a `.static` physics body and add it to the scene like this:


    ```

    let pyramidNode = SCNNode()

    pyramidNode.geometry = SCNPyramid(width: 4, height: 4.5, length: 4)

    pyramidNode.geometry?.firstMaterial?.diffuse.contents = UIColor.orange

    pyramidNode.position = SCNVector3(-3, 1, -15)

    pyramidNode.physicsBody = SCNPhysicsBody(type: .static, shape: nil)

    sceneView.scene.rootNode.addChildNode(pyramidNode)

    ```


    Create a green box with specific dimensions and position it nearby like this:


    ```

    let boxNode = SCNNode()

    boxNode.geometry = SCNBox(width: 3.5, height: 3.5, length: 3.5, chamferRadius:
    0)

    boxNode.geometry?.firstMaterial?.diffuse.contents = UIColor.green

    boxNode.position = SCNVector3(5, 1, -15)

    boxNode.physicsBody = SCNPhysicsBody(type: .static, shape: nil)

    sceneView.scene.rootNode.addChildNode(boxNode)

    ```


    Notice that when defining the physics body of the pyramid and box, the shape is
    defined as nil, which means to use the shape of the virtual object as its boundaries
    like this:


    ```

    pyramidNode.physicsBody = SCNPhysicsBody(type: .static, shape: nil)

    boxNode.physicsBody = SCNPhysicsBody(type: .static, shape: nil)

    ```


    The final virtual object to create inside the `addTargets` function is a torus,
    which looks like a doughnut or a hoop. Creating a blue torus involves defining
    physical dimensions, a color, and a position:


    ```

    let torusNode = SCNNode()

    torusNode.geometry = SCNTorus(ringRadius: 2, pipeRadius: 0.5)

    torusNode.geometry?.firstMaterial?.diffuse.contents = UIColor.blue

    torusNode.position = SCNVector3(0, -2, -15)

    ```


    First, we’ll need to rotate the torus 90 degrees around the x-axis or else it
    will appear as a flat disk. To rotate the torus, we need to first convert 90 degrees
    into radians and then apply the value in radians into rotating the torus around
    its x-axis like this:


    ```

    let ninetyDegrees = GLKMathDegreesToRadians(90)

    torusNode.eulerAngles = SCNVector3(ninetyDegrees, 0, 0)

    ```


    Now we need to define the physics body of the torus. If we simply define its shape
    as nil like this:


    ```

    torusNode.physicsBody = SCNPhysicsBody(type: .static, shape: nil)

    ```


    This will create torus that looks like it has a hole in the middle of it, but
    really doesn’t. That’s because the nil value for its shape simply uses the entire
    boundary of the torus as the boundaries for detecting collections, including the
    inner hole. To make the hole behave like empty air, we need to define the torus’s
    physics body to use the boundaries of the actual shape itself, not just the outer
    boundaries. To do this, we can use this code:


    ```

    torusNode.physicsBody = SCNPhysicsBody(type: .static, shape: SCNPhysicsShape(node:
    torusNode, options: [SCNPhysicsShape.Option.type: SCNPhysicsShape.ShapeType.concavePolyhedron]))

    ```


    The entire `ViewController.swift` file should look like this:


    ```

