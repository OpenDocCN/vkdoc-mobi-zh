    \n![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig1_HTML.jpg](images/469983_1_En_16_Chapter/469983_1_En_16_Fig1_HTML.jpg)\n\
    \nFigure 16-1\n\nDefining the width and height of the item to recognize\n\n1.\
    \  Click the `Assets.xcassets` folder in the Navigator pane.\n\n2.  Click the\
    \ plus (+) icon in the bottom of the pane. A popup menu appears.\n\n3.  Choose\
    \ New AR Resource Group. Xcode creates an `AR Resources` folder.\n\n4.  Drag and\
    \ drop the images you want ARKit to recognize in the real world. Xcode displays\
    \ a yellow alert icon in the bottom-right corner of your images.\n\n5.  Click\
    \ the Attributes Inspector icon or choose View ➤ Inspectors ➤ Show Attributes\
    \ Inspector. An AR Reference Image pane appears, as shown in Figure [16-1](#469983_1_En_16_Chapter.xhtml#Fig1).\n\
    \nOnce we’ve added one or more images of the real objects we want ARKit to recognize,\
    \ we need to write actual Swift code to recognize the image when spotted through\
    \ an iOS device’s camera.\n\nFirst, we need to access the folder containing the\
    \ images of items to recognize. This folder can be called anything, such as `AR\
    \ Resources`. This means using a `guard` statement to verify that the image folder\
    \ even exists like this:\n\n```\nguard let storedImages =  ARReferenceImage.referenceImages(inGroupNamed:\
    \ \"AR Resources\", bundle: nil) else {\nfatalError(\"Missing AR Resources images\"\
    )\n}\n```"
  trans: "\n# 16. 图像跟踪与物体检测\n\n在前面的章节中，我们学习了图像检测技术。它能够让应用识别存储在 `AR Resources` 文件夹中的图像，并在\
    \ iOS 设备摄像头识别到现实世界中的该图像时做出响应。图像检测适用于图片和照片等二维物品，但 ARKit 2.0 和 iOS 12 在图像检测基础上增加了两项新功能：**图像跟踪**和**物体检测**。\n\
    \n目前的图像检测技术是通过将文本、虚拟物体或视频链接到被检测图像的位置来实现的。但是，如果被检测的图像发生了移动，那么所显示的文本、虚拟物体或视频并不会随之移动。正因如此，ARKit\
    \ 2.0 推出了图像跟踪功能，它允许文本、虚拟物体或视频随着被检测图像的移动而移动。\n\n尽管图像检测功能令人印象深刻，但它仅限于图片或照片等二维物品。为了克服这个限制，ARKit\
    \ 2.0 提供了物体检测功能。首先，你可以扫描一个三维物体。然后，你可以将这个三维物体的扫描数据存储在你的增强现实应用中。\n\n一旦用户扫描到同一个物品，增强现实应用就能识别出这个三维物体，并像图像检测一样，通过显示文本、虚拟物体或视频来做出响应。图像检测针对的是二维平面物品，而物体检测则针对三维物体，这使得用户无论从\
    \ iOS 摄像头的哪个位置或角度，都能获取到该物体的相关信息。\n\n在本章中，让我们按照以下步骤创建一个新的 Xcode 项目：\n\n1.  启动 Xcode。（请确保你使用的是\
    \ Xcode 10 或更高版本。）\n2.  选择“文件”➤“新建”➤“项目”。Xcode 会要求你选择一个模板。\n3.  点击 iOS 类别。\n4.\
    \  点击“单视图应用”图标，然后点击“下一步”按钮。Xcode 会要求输入产品名称、组织名称、组织标识符以及内容技术。\n5.  点击“产品名称”文本框，为你的项目输入一个描述性名称，例如\
    \ `ImageTracking`。（具体的名称不重要。）\n6.  点击“下一步”按钮。Xcode 会询问你项目的存储位置。\n7.  选择一个文件夹，然后点击“创建”按钮。Xcode\
    \ 会创建一个 iOS 项目。\n\n现在，按照以下步骤修改 `Info.plist` 文件，以允许访问摄像头并使用 ARKit：\n\n1.  在导航窗格中点击\
    \ `Info.plist` 文件。Xcode 会显示一个包含键、类型和值的列表。\n2.  点击展开三角标，展开“所需设备功能”类别，以显示 Item 0。\n\
    3.  将鼠标指针移动到 Item 0 上，显示一个加号（+）图标。\n4.  点击这个加号（+）图标，显示一个空白的 Item 1。\n5.  在 Item\
    \ 1 行的“值”类别下输入 `arkit`。\n6.  将鼠标指针移动到最后一行上，显示一个加号（+）图标。\n7.  点击加号（+）图标创建一个新行。会弹出一个菜单。\n\
    8.  选择“隐私 - 相机使用说明”。\n9.  在“隐私 - 相机使用说明”行的“值”类别下输入 `AR 需要使用摄像头`。\n\n现在，是时候按照以下步骤修改\
    \ `ViewController.swift` 文件来使用 ARKit 和 SceneKit 了：\n\n1.  在导航窗格中点击 `ViewController.swift`\
    \ 文件。\n2.  编辑 `ViewController.swift` 文件，使其内容如下：\n\n```\n    import UIKit\n   \
    \ import SceneKit\n    import ARKit\n    class ViewController: UIViewController,\
    \ ARSCNViewDelegate {\n    let configuration = ARImageTrackingConfiguration()\n\
    \    override func viewDidLoad() {\n    super.viewDidLoad()\n    // 在此处执行视图加载后的任何额外设置，通常从\
    \ nib 文件加载。\n    }\n    }\n```\n\n需要注意的最重要的一行是定义了 `ARImageTrackingConfiguration`\
    \ 的那一行：\n\n```\nlet configuration = ARImageTrackingConfiguration()\n```\n\n之前，我们只定义过\
    \ `ARWorldTrackingConfiguration`，但我们需要 `ARImageTrackingConfiguration` 来让我们的增强现实应用在检测到的图像移动时对其进行跟踪。\n\
    \n要在我们的应用中查看增强现实效果，请添加一个 ARKit SceneKit 视图（`ARSCNView`），使其充满整个视图。设计好用户界面后，需要添加约束。要添加约束，请选择“编辑器”➤“解决自动布局问题”➤“重置为建议的约束”，该选项位于菜单底部“容器中的所有视图”类别下。\n\
    \n下一步是将用户界面元素连接到 `ViewController.swift` 文件中的 Swift 代码。为此，请遵循以下步骤：\n\n1.  在导航窗格中点击\
    \ `Main.storyboard` 文件。\n2.  点击助理编辑器图标，或者选择“视图”➤“助理编辑器”➤“显示助理编辑器”，以便并排显示 `Main.storyboard`\
    \ 和 `ViewController.swift` 文件。\n3.  将鼠标指针移动到 `ARSCNView` 上，按住 Control 键，然后从 `class\
    \ ViewController` 行下方开始 Control-拖拽。\n4.  释放 Control 键和鼠标左键。会弹出一个菜单。\n5.  点击“名称”文本框，输入\
    \ `sceneView`，然后点击“连接”按钮。Xcode 会创建一个 `IBOutlet`，如下所示：\n\n```\n    @IBOutlet var\
    \ sceneView: ARSCNView!\n```\n\n6.  编辑 `viewDidLoad` 函数，使其内容如下：\n\n```\n    override\
    \ func viewDidLoad() {\n    super.viewDidLoad()\n    // 在此处执行视图加载后的任何额外设置，通常从\
    \ nib 文件加载。\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
    \ ARSCNDebugOptions.showFeaturePoints]\n    sceneView.delegate = self\n    sceneView.session.run(configuration)\n\
    \    }\n```\n\n请记住，只有在你将物品的图像存储到应用中之后，ARKit 才能识别现实世界中的实物。除了存储图像，你还必须指定该实物在现实世界中的宽度和高度。这样，当\
    \ ARKit 通过 iOS 设备的摄像头发现实际物品时，它可以将其图像与存储的图像进行比较。如果外观和尺寸都匹配，那么 ARKit 就能识别出这个实物。\n\
    \n首先，你必须捕捉要检测物品的图像。由于这些图像需要高分辨率，你可以从互联网上获取公有领域的图像，例如从 NASA（`www.nasa.gov`）获取。然后，你可以将这些图像显示在笔记本电脑或\
    \ iPad 屏幕上，供你的 iOS 设备识别。\n\n要按照以下步骤存储一个或多个希望 ARKit 识别的图像：\n\n1.  在“宽度”和“高度”文本框中点击并输入实物的实际宽度和高度。你也可以点击“单位”弹出菜单，将默认的测量单位从米更改为其他单位，例如英寸或厘米。\n\
    \n![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig1_HTML.jpg](img/469983_1_En_16_Fig1_HTML.jpg)\n\
    \n图 16-1 定义待识别物品的宽度和高度\n\n2.  在导航窗格中点击 `Assets.xcassets` 文件夹。\n3.  点击窗格底部的加号（+）图标。会弹出一个菜单。\n\
    4.  选择“新建 AR 资源组”。Xcode 会创建一个 `AR Resources` 文件夹。\n5.  拖拽你希望 ARKit 在现实世界中识别的图像到该文件夹中。Xcode\
    \ 会在图像右下角显示一个黄色警告图标。\n6.  点击属性检查器图标，或者选择“视图”➤“检查器”➤“显示属性检查器”。会出现一个“AR 参考图像”窗格，如图\
    \ 16-1 所示。\n\n一旦我们添加了一个或多个希望 ARKit 识别的实物图像，就需要编写实际的 Swift 代码，以便在通过 iOS 设备摄像头发现图像时进行识别。\n\
    \n首先，我们需要访问包含待识别物品图像的文件夹。这个文件夹可以任意命名，例如 `AR Resources`。这意味着需要使用一个 `guard` 语句来验证图像文件夹是否存在，如下所示：\n\
    \n```\nguard let storedImages =  ARReferenceImage.referenceImages(inGroupNamed:\
    \ \"AR Resources\", bundle: nil) else {\nfatalError(\"缺少 AR Resources 图像\")\n\
    }\n```\n"
- fmt: 'This code looks for a folder named `AR Resources`. If it fails to find it,
    it ends the program and displays `"Missing AR Resources images"`. If it finds
    an `AR Resources` folder, then we can define where the detected images are stored,
    like this:


    ```

    configuration.trackingImages = storedImages

    ```


    Notice that this line of code uses `trackingImages` instead of `detectionImages`.
    With `detectionImages`, an app will recognize an image only if it stays in one
    place. With `trackingImages`, the app can follow the detected image if it moves.


    Finally, we need to use the `didAdd renderer` function, which runs every time
    the camera updates its view. If the camera detects a recognized image (`ARImageAnchor`)
    then we want to display a virtual object that appears near the detected image.


    In our earlier examples, we would display a virtual object to the detected image
    by attaching it to the `rootNode` of the scene like this:


    ```

    sceneView.scene.rootNode.addChildNode(objectNode)

    ```


    However, this ties the virtual object to a specific location in the augmented
    reality view. What we want is to tie the virtual object to the detected image
    like this:


    ```

    node.addChildNode(objectNode)

    ```


    Now if the detected image moves, the virtual object will move as well. To detect
    and track the stored image, we need to use the `didAdd renderer` function. First,
    we need to make sure we detected a stored image as an `ARImageAnchor` like this:


    ```

    func renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:
    ARAnchor) {

    if anchor is ARImageAnchor {

    }

    }

    ```


    Then we can create a virtual object to appear over the detected image. In this
    example, we’ll create text as follows:


    ```

    let movingImage = SCNText(string: "Moving Text", extrusionDepth: 0.0)

    movingImage.flatness = 0.1

    movingImage.font = UIFont.boldSystemFont(ofSize: 10)

    ```


    Next, we’ll need to store this `SCNText` in a node, so we need to define a node
    by defining its color and scale:


    ```

    let titleNode = SCNNode()

    titleNode.geometry = movingImage

    titleNode.geometry?.firstMaterial?.diffuse.contents = UIColor.white

    titleNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)

    ```


    Then we just need to add the node containing our `SCNText` to the detected image:


    ```

    node.addChildNode(titleNode)

    ```


    The entire `ViewController.swift` file should look like this:


    ```

    import UIKit

    import SceneKit

    import ARKit

    class ViewController: UIViewController, ARSCNViewDelegate {

    @IBOutlet var sceneView: ARSCNView!

    let configuration = ARImageTrackingConfiguration()

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]

    sceneView.delegate = self

    guard let storedImages =  ARReferenceImage.referenceImages(inGroupNamed: "AR Resources",
    bundle: nil) else {

    fatalError("Missing AR Resources images")

    }

    configuration.trackingImages = storedImages

    sceneView.session.run(configuration)

    }

    func renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:
    ARAnchor) {

    if anchor is ARImageAnchor {

    let movingImage = SCNText(string: "Moving Text", extrusionDepth: 0.0)

    movingImage.flatness = 0.1

    movingImage.font = UIFont.boldSystemFont(ofSize: 10)

    let titleNode = SCNNode()

    titleNode.geometry = movingImage

    titleNode.geometry?.firstMaterial?.diffuse.contents = UIColor.white

    titleNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)

    node.addChildNode(titleNode)

    }

    }

    }

    ```


    To test this app, place the item that you took a picture of and stored in the
    `AR Resources` folder and display that item on a laptop or iPad placed on a table
    or floor. Then follow these steps:


    1. Move the laptop or iPad screen that’s displaying the detected image. Notice
    that as you move the detected image, the virtual object (`"Moving Text"`) moves
    along to maintain its distance and orientation with the detected image at all
    times.


    2. Click the Stop button or choose Product ➤ Stop.


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig2_HTML.jpg](images/469983_1_En_16_Chapter/469983_1_En_16_Fig2_HTML.jpg)


    Figure 16-2


    Text appears over the detected image even when you move the detected image


    3. Connect an iOS device to your Macintosh through its USB cable.


    4. Click the Run button or choose Product ➤ Run. The first time you run this app,
    it will ask permission to access the camera so give it permission.


    5. Using the picture on your you stored in your project’s `AR Resources` folder,
    display this same picture on a laptop or iPad screen.


    6. Aim the iOS device’s camera at the screen that displays the picture you want
    ARKit to recognize. When ARKit recognizes the image, it displays the text `"Moving
    Text"` over the detected image, as shown in Figure [16-2](#469983_1_En_16_Chapter.xhtml#Fig2).


    ## Detecting Objects


    With image detection, we had to store the actual images we want the app to detect
    in a special `AR Resources` folder. Object detection works in a similar way except
    instead of storing a single image to detect, object detection stores the three-dimensional
    spatial features of an object in the `AR Resources` folder. To get these three-dimensional
    spatial features of an object we want to detect in the future, we have to scan
    that image ahead of time and store that scanned representation of the image in
    our app.


    To enable object detection in your app, you must follow these steps:


    1. Scan the object you want your app to detect using Apple’s scanning app. This
    stores the three-dimensional spatial representation of that object in an `.arobject`
    file format.


    2. Store this `.arobject` file in the `AR Resources` folder of your own app.


    3. Write Swift code to make your app respond when it detects the object defined
    by the `.arobject` file.'
