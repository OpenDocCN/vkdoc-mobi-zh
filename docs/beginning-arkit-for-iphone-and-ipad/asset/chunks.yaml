  trans: "\n# 识别虚拟物体上的长按手势\n\n轻点手势发生在用户用手指按压屏幕然后松开时。长按手势与之类似，但允许用户将一个或多个手指按压在屏幕上并保持，然后再松开。你可以修改长按手势的四个属性：\n\
    \n*   `minimumPressDuration` —— 定义用户必须按压屏幕多长时间。默认值为 0.5 秒。\n*   `numberOfTouchesRequired`\
    \ —— 定义用户必须用几个手指按压屏幕。默认值为 1。\n*   `numberOfTapsRequired` —— 定义用户必须按压并抬起手指多少次来触发长按手势。默认值为\
    \ 0。\n*   `allowableMovement` —— 定义用户滑动手指多远的距离仍可触发长按手势。默认值为 10 个点。\n\n要定义一个长按手势及其任意四个属性，你只需定义一个函数来处理长按手势，然后将长按手势添加到场景中，如下所示：\n\
    \n```\nlet longPressGesture = UILongPressGestureRecognizer(target: self, action:\
    \ #selector(handleLongPress))\nlongPressGesture.minimumPressDuration = 1\nsceneView.addGestureRecognizer(longPressGesture)\n\
    ```\n\n这段代码将 `minimumPressDuration` 定义为 1 秒，但如果你省略此行，它将使用默认的 0.5 秒 `minimumPressDuration`。这段代码还定义了一个名为\
    \ `handleLongPress` 的函数来响应长按手势，因此我们需要这样创建这个函数：\n\n```\n@objc func handleLongPress(sender:\
    \ UILongPressGestureRecognizer) {\n}\n```\n\n要确定用户按压的位置，我们需要像这样识别区域：\n\n```\n\
    let areaPressed = sender.view as! SCNView\nlet tappedCoordinates = sender.location(in:\
    \ areaPressed)\nlet hitTest = areaPressed.hitTest(tappedCoordinates)\n```\n\n\
    然后我们需要使用 `hitTest` 函数来识别用户是否按压在立方体或金字塔上，像这样：\n\n```\nif hitTest.isEmpty {\n  \
    \  print (\"Nothing\")\n} else {\n    let results = hitTest.first!\n    let name\
    \ = results.node.name ?? \"background\"\n    print(\"Long press on \\(name)\"\
    )\n}\n```\n\n完整的 `handleLongPress` 函数应如下所示：\n\n```\n@objc func handleLongPress(sender:\
    \ UILongPressGestureRecognizer) {\n    let areaPressed = sender.view as! SCNView\n\
    \    let tappedCoordinates = sender.location(in: areaPressed)\n    let hitTest\
    \ = areaPressed.hitTest(tappedCoordinates)\n    if hitTest.isEmpty {\n       \
    \ print (\"Nothing\")\n    } else {\n        let results = hitTest.first!\n  \
    \      let name = results.node.name ?? \"background\"\n        print(\"Long press\
    \ on \\(name)\")\n    }\n}\n```\n\n将 `handleLongPress` 函数添加到你的 `ViewController.swift`\
    \ 文件中，并按如下方式定义长按识别器：\n\n```\nlet longPressGesture = UILongPressGestureRecognizer(target:\
    \ self, action: #selector(handleLongPress))\nsceneView.addGestureRecognizer(longPressGesture)\n\
    ```\n\n然后，要运行应用，请执行以下操作：\n\n1.  通过 USB 数据线将 iOS 设备连接到 Macintosh。\n2.  点击运行按钮或选择\
    \ Product ➤ Run。\n3.  在屏幕上用一根手指按压立方体或金字塔。注意，调试区域会显示“Long press on box”或“Long press\
    \ on pyramid”。\n4.  点击停止按钮或选择 Product ➤ Stop。\n\n## 添加捏合与旋转手势\n\n到目前为止，我们已通过编写至少两行代码以编程方式添加了手势识别器。首先，我们创建了一个常量来表示手势识别器，并定义了一个处理该手势的函数，如下所示：\n\
    \n```\nlet tapGesture = UITapGestureRecognizer(target: self, action: #selector(handleTap))\n\
    ```\n\n其次，我们这样将手势识别器添加到视图中：\n\n```\nsceneView.addGestureRecognizer(tapGesture)\n\
    ```\n\n向应用添加手势识别器的第二种方法是使用对象库，并直接将手势识别器拖放到场景中。如果你点击对象库并搜索“gesture recognizer”，Xcode\
    \ 会显示所有可用手势识别器的列表，如图 9-2 所示。\n\n![../images/469983_1_En_9_Chapter/469983_1_En_9_Fig2_HTML.jpg](img/469983_1_En_9_Fig2_HTML.jpg)\n\
    \n图 9-2\n\n在对象库窗口中查看手势识别器列表\n\n将手势识别器拖放到视图上等同于编写代码将手势识别器添加到视图：\n\n```\nsceneView.addGestureRecognizer(tapGesture)\n\
    ```\n\n现在，如果你打开 Assistant Editor，可以按住 Control 键从手势识别器拖动到 `ViewController.swift`\
    \ 文件。如果你按住 Control 键拖动以创建一个 IBOutlet，这等同于声明一个手势识别器，如下所示：\n\n```\nlet tapGesture\
    \ = UITapGestureRecognizer(target: self, action: #selector(handleTap))\n```\n\n\
    当然，每个手势识别器都需要一个包含代码来处理手势的函数，因此你还需要按住 Control 键拖动以创建一个 IBAction 方法。通过将手势识别器拖放到视图上，你可以避免编写代码。让我们看看旋转和捏合手势识别器如何通过以下步骤实现这一点：\n\
    \n1.  重复步骤 3-5，但将 Pinch Gesture Recognizer 拖放到 `ARSCNView` 上，这样 Pinch Gesture\
    \ Recognizer 也会出现在 Document Outline 窗口中。\n2.  点击 Assistant Editor 图标或选择 View ➤\
    \ Assistant Editor ➤ Show Assistant Editor。Xcode 会并排显示 Document Outline、`Main.storyboard`\
    \ 文件和 `ViewController.swift` 文件。\n3.  在 Document Outline 中点击 Rotation Gesture\
    \ Recognizer，然后按住 Control 键拖动到 `ViewController.swift` 文件的底部。\n4.  松开 Control 键和鼠标左键。出现一个弹出窗口。\n\
    5.  确保 Connection 弹出菜单显示 Action。\n6.  点击 Name 文本字段并输入 `handleRotation`。\n7.  点击\
    \ Type 弹出菜单并选择 `UIRotationGestureRecognizer`。\n8.  点击 Connect 按钮。Xcode 创建一个空的\
    \ IBAction 方法，如下所示：\n\n    ```\n    @IBAction func handleRotation(_ sender: UIRotationGestureRecognizer)\
    \ {\n    }\n    ```\n\n9.  在 Document Outline 中点击 Pinch Gesture Recognizer，然后按住\
    \ Control 键拖动到 `ViewController.swift` 文件的底部。\n10.  松开 Control 键和鼠标左键。出现一个弹出窗口。\n\
    11.  确保 Connection 弹出菜单显示 Action。\n12.  点击 Name 文本字段并输入 `handlePinch`。\n13.  点击\
    \ Type 弹出菜单并选择 `UIPinchGestureRecognizer`。\n14.  点击 Connect 按钮。Xcode 创建一个空的 IBAction\
    \ 方法，如下所示：\n\n    ```\n    @IBAction func handlePinch(_ sender: UIPinchGestureRecognizer)\
    \ {\n    }\n    ```\n\n15.  编辑这两个函数，添加 `print` 语句，如下所示：\n\n    ```\n    @IBAction\
    \ func handleRotation(_ sender: UIRotationGestureRecognizer) {\n        print(\"\
    Rotation detected\")\n    }\n    @IBAction func handlePinch(_ sender: UIPinchGestureRecognizer)\
    \ {\n        print(\"Pinch detected\")\n    }\n    ```\n\n16.  通过 USB 数据线将 iOS\
    \ 设备连接到 Macintosh。\n17.  点击运行按钮或选择 Product ➤ Run。\n18.  用两根手指按压屏幕并以圆周运动旋转它们。Xcode\
    \ 调试区域应显示“Rotation detected”。\n19.  用两根手指按压屏幕并将它们捏合。Xcode 调试区域应显示“Pinch detected”。\n"
- fmt: "20.  Click the `Stop` button or choose `Product` ➤ `Stop`.\n\n![Figure 9-5](images/469983_1_En_9_Chapter/469983_1_En_9_Fig5_HTML.jpg)\n\
    \n**Figure 9-5**\n\nThe Document Outline pane displays all user interface items.\n\
    \n1.  Drag the `Rotation Gesture Recognizer` and drop it over the `ARSCNView`.\
    \ Xcode displays the `Rotation Gesture Recognizer` in the Document Outline, as\
    \ shown in Figure 9-5. (You can toggle between hiding or showing the Document\
    \ Outline by choosing `Editor` ➤ `Show/Hide Document Outline`.)\n\n![Figure 9-4](images/469983_1_En_9_Chapter/469983_1_En_9_Fig4_HTML.jpg)\n\
    \n**Figure 9-4**\n\nThe Rotation Gesture Recognizer in the Object Library window.\n\
    \n1.  Type `Rotation` in the Object Library window. The Object Library window\
    \ displays the `Rotation Gesture Recognizer`.\n\n![Figure 9-3](images/469983_1_En_9_Chapter/469983_1_En_9_Fig3_HTML.jpg)\n\
    \n**Figure 9-3**\n\nThe Object Library icon.\n\n1.  Make sure your `TouchGestures`\
    \ project is open.\n2.  Click the `Main.storyboard` file in the Navigator pane.\n\
    3.  Click the `Object Library` icon to display the Object Library window.\n\n\
    Notice that by dragging and dropping gesture recognizers on to the `ARSCNView`,\
    \ we’ve saved ourselves writing code. You can use either method or a combination\
    \ of both methods.\n\n## Summary\n\nThe touch screen of an iOS device can recognize\
    \ multiple types of touch gestures, from simple taps to rotation, swipes, and\
    \ pans. To recognize gestures, you have two methods. First, you can add a gesture\
    \ recognizer to your app by writing code such as:\n\n```\nlet panGesture = UIPanGestureRecognizer(target:\
    \ self, action: #selector(handlePan))\nsceneView.addGestureRecognizer(panGesture)\n\
    ```\n\nThen you’ll need to write a function to handle the touch gesture such as:\n\
    \n```\n@objc func handlePan(sender: UIPanGestureRecognizer) {\n}\n```\n\nAs an\
    \ alternative, we can simply drag and drop a gesture recognizer from the Object\
    \ Library on to the `ARSCNView`. Then we can Ctrl-drag to create an `IBOutlet`\
    \ for the gesture recognizer and an `IBAction` method to handle the gesture when\
    \ it’s detected.\n\n# 10. Interacting with Augmented Reality\n\nTouch gestures\
    \ let the user control an augmented reality app through finger gestures alone\
    \ such as taps, swipes, rotations, and pinches. Once you’ve added touch gestures\
    \ to an augmented reality app, the next step is to use those touch gestures to\
    \ manipulate virtual objects displayed in the augmented reality view.\n\nIn the\
    \ previous chapter, we learned how to recognize when simple touch gestures occur\
    \ on a virtual object such as a tap, long press, or swipe. In this chapter, we\
    \ learn how to scale, rotate, and move a virtual object using a pinch, rotation,\
    \ and pan touch gesture.\n\nFor this chapter’s example, we’ll create the different\
    \ gesture recognizers through the Object Library. Let’s create a new Xcode project\
    \ by following these steps:\n\n1.  Start Xcode. (Make sure you’re using Xcode\
    \ 10 or greater.)\n2.  Choose `File` ➤ `New` ➤ `Project`. Xcode asks you to choose\
    \ a template.\n3.  Click the `iOS` category.\n4.  Click the `Augmented Reality\
    \ App` icon and click the `Next` button. Xcode asks for a product name, organization\
    \ name, organization identifiers, and content technology.\n5.  Click in the `Product\
    \ Name` text field and type a descriptive name for your project, such as `RotatePinch`.\
    \ (The exact name does not matter.)\n6.  Make sure the `Content Technology` popup\
    \ menu displays `SceneKit`.\n7.  Click the `Next` button. Xcode asks where you\
    \ want to store your project.\n8.  Choose a folder and click the `Create` button.\
    \ Xcode creates an iOS project.\n\nThis creates a simple augmented reality app\
    \ that displays a cartoon airplane. Now that we have the airplane displayed for\
    \ us automatically, let’s start by learning to scale or resize the airplane virtual\
    \ object in the augmented reality view using the pinch gesture.\n\nThe pinch gesture\
    \ consists of placing two fingertips on the screen and then drawing them apart\
    \ or together in a pinching motion. To place a pinch gesture recognizer in our\
    \ app, follow these steps:\n\n1.  Click the `Assistant Editor` icon or choose\
    \ `View` ➤ `Assistant Editor` ➤ `Show Assistant Editor` to display the `Main.storyboard`\
    \ and the `ViewController.swift` file side by side.\n2.  Move the mouse pointer\
    \ over the `Pinch Gesture Recognizer` in the Document Outline, hold down the `Control`\
    \ key, and Ctrl-drag above the last curly bracket at the bottom of the `ViewController.swift`\
    \ file.\n3.  Release the `Control` key and the left mouse button. A popup menu\
    \ appears.\n4.  Make sure the `Connection` popup menu displays `Action`.\n5. \
    \ Click in the `Name` text field and type `pinchGesture`.\n6.  Click in the `Type`\
    \ popup menu and choose `UIPinchGestureRecognizer`. Then click the `Connect` button.\
    \ Xcode creates an `IBAction` method as shown here:\n\n```\n@IBAction func pinchGesture(_\
    \ sender: UIPinchGestureRecognizer) {\n}\n```\n\n7.  Edit this `IBAction` method\
    \ `pinchGesture` as follows:\n\n```\n@IBAction func pinchGesture(_ sender: UIPinchGestureRecognizer)\
    \ {\n    print(\"Pinch gesture\")\n}\n```\n\n8.  Connect an iOS device to your\
    \ Macintosh through its USB cable.\n9.  Click the `Run` button or choose `Product`\
    \ ➤ `Run`. The first time you run this app, it will ask permission to access the\
    \ camera so give it permission.\n10. Place two fingertips on the screen and pinch\
    \ in or out. The Xcode debug area should display `Pinch Gesture` to let you know\
    \ that it successfully detected the pinch gesture.\n11. Click the `Stop` button\
    \ or choose `Product` ➤ `Stop`.\n\n![Figure 10-2](images/469983_1_En_10_Chapter/469983_1_En_10_Fig2_HTML.jpg)\n\
    \n**Figure 10-2**\n\nThe Document Outline displays any gesture recognizers you\
    \ place on the user interface.\n\n1.  Drag the `Pinch Gesture Recognizer` from\
    \ the Object Library window and drop it on the `ARSCNView` on the user interface.\
    \ Although you dragged and dropped the Pinch Gesture Recognizer on to the user\
    \ interface, you won’t see any sign of it anywhere except in the Document Outline,\
    \ as shown in Figure 10-2. If the Document Outline is not visible, click the `Show\
    \ Document Outline` icon or choose `Editor` ➤ `Show Document Outline`.\n\n![Figure\
    \ 10-1](images/469983_1_En_10_Chapter/469983_1_En_10_Fig1_HTML.jpg)\n\n**Figure\
    \ 10-1**\n\nFinding the pinch gesture recognizer in the Object Library window.\n\
    \n1.  Click the `Main.storyboard` file in the Navigator pane.\n2.  Click the `Object\
    \ Library` icon to display the Object Library window.\n3.  Type `pinch` in the\
    \ Object Library. The Object Library displays the pinch gesture recognizer, as\
    \ shown in Figure 10-1."
