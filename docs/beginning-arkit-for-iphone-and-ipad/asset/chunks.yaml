  trans: "2. 点击“助理编辑器”图标，或选择“视图”➤“助理编辑器”➤“显示助理编辑器”，将`Main.storyboard`和`ViewController.swift`文件并排显示。\n\
    \n3. 将鼠标指针移到 ARSCNView 上，按住 Control 键，然后在`class ViewController`行下方按住 Control 键拖动。\n\
    \n4. 松开 Control 键和鼠标左键。此时会弹出一个菜单。\n\n5. 点击“名称”文本字段，输入`sceneView`，然后点击“连接”按钮。Xcode\
    \ 会创建一个如下的 IBOutlet：\n\n    ```\n    @IBOutlet var sceneView: ARSCNView!\n   \
    \ ```\n\n6. 将鼠标移到标签上，按住 Control 键，然后在刚创建的 IBOutlet 下方按住 Control 键拖动。\n\n7. 松开\
    \ Control 键和鼠标左键。此时会弹出一个菜单。\n\n8. 点击“名称”文本字段，输入`lblMessage`，然后点击“连接”按钮。Xcode 会创建一个如下的\
    \ IBOutlet：\n\n    ```\n    @IBOutlet var lblMessage: UILabel!\n    ```\n\n9.\
    \ 在两个 IBOutlet 下方，输入以下代码：\n\n    ```\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    ```\n\n10. 编辑`viewDidLoad`函数，使其代码如下：\n\n    ```\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        // 加载视图后的其他设置，通常来自 nib 文件\n        sceneView.debugOptions\
    \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \        sceneView.delegate = self\n        sceneView.session.delegate = self\n\
    \        configuration.planeDetection = .horizontal\n        let tapGesture =\
    \ UITapGestureRecognizer(target: self, action: #selector(handleTap))\n       \
    \ sceneView.addGestureRecognizer(tapGesture)\n        self.lblMessage.text = \"\
    点击以放置虚拟对象\"\n        sceneView.session.run(configuration)\n    }\n    ```\n\n\
    至此，我们定义了一个点按手势，但还需要创建一个函数来处理该点按手势。在`viewDidLoad`函数下方，添加名为`handleTap`的函数：\n\n```\n\
    @objc func handleTap(sender: UITapGestureRecognizer) {\n    guard let sceneView\
    \ = sender.view as? ARSCNView else {\n        return\n    }\n    let touch = sender.location(in:\
    \ sceneView)\n    let hitTestResults = sceneView.hitTest(touch, types: [.featurePoint,\
    \ .estimatedHorizontalPlane])\n    if hitTestResults.isEmpty == false {\n    \
    \    if let hitTestResult = hitTestResults.first {\n            let virtualAnchor\
    \ = ARAnchor(transform: hitTestResult.worldTransform)\n            self.sceneView.session.add(anchor:\
    \ virtualAnchor)\n        }\n    }\n}\n```\n\n每次用户点击屏幕时，都会向增强现实视图添加一个`ARAnchor`。这也会触发`didAdd\
    \ renderer`函数，我们需要编写该函数以在屏幕上显示一个蓝色方块。在`handleTap`函数下方，按如下方式编写`didAdd renderer`函数：\n\
    \n```\nfunc renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:\
    \ ARAnchor) {\n    if anchor is ARPlaneAnchor {\n        return\n    }\n    let\
    \ newNode = SCNNode(geometry: SCNBox(width: 0.05, height: 0.05, length: 0.05,\
    \ chamferRadius: 0))\n    newNode.geometry?.firstMaterial?.diffuse.contents =\
    \ UIColor.blue\n    node.addChildNode(newNode)\n}\n```\n\n最后，按如下方式添加`viewWillDisappear`函数：\n\
    \n```\noverride func viewWillDisappear(_ animated: Bool) {\n    sceneView.session.pause()\n\
    }\n```\n\n## 保存世界地图\n\n至此，该应用允许用户点击屏幕并在增强现实视图中放置蓝色方块。然而，你目前还不能保存增强现实视图。要保存增强现实视图，我们需要将当前增强现实视图存储为世界地图。\n\
    \n我们可以将世界地图保存到任何数据库中，但由于世界地图数据量较小，我们将把它存储在用户默认数据库中，该数据库通常用于存储应用设置。要保存世界地图，请按照以下步骤操作：\n\
    \n1. 在导航窗格中点击`Main.storyboard`文件。\n\n2. 点击“助理编辑器”图标，或选择“视图”➤“助理编辑器”➤“显示助理编辑器”，将`Main.storyboard`和`ViewController.swift`文件并排显示。\n\
    \n3. 将鼠标指针移到用户界面上显示“保存”的按钮上，按住 Control 键，然后在`class ViewController`行下方按住 Control\
    \ 键拖动。\n\n4. 松开 Control 键和鼠标左键。此时会弹出一个菜单。\n\n5. 确保“连接”弹出菜单显示为“操作”，然后点击“名称”文本字段，输入`saveButton`。\n\
    \n6. 点击“类型”弹出菜单，选择 UIButton，然后点击“连接”按钮。Xcode 会创建一个如下的`IBAction`方法：\n\n    ```\n\
    \    @IBAction func saveButton(_ sender: UIButton) {\n    }\n    ```\n\n7. 按如下方式编辑这个`saveButton\
    \ IBAction`方法：\n\n    ```\n    @IBAction func saveButton(_ sender: UIButton) {\n\
    \        saveMap()\n    }\n    ```\n\n每当用户点击“保存”按钮时，该按钮会运行`saveMap()`函数，我们需要按如下方式编写该函数：\n\
    \n```\nfunc saveMap() {\n}\n```\n\n保存世界地图的第一步是获取增强现实视图的当前状态：\n\n```\nself.sceneView.session.getCurrentWorldMap\
    \ { worldMap, error in\n}\n```\n\n这段代码要么获取当前状态（`worldMap`），要么显示错误。如果保存当前增强现实状态时出现错误，我们需要显示一条错误消息并停止尝试保存世界地图：\n\
    \n```\nif error != nil {\n    print(error?.localizedDescription ?? \"未知错误\")\n\
    \    return\n}\n```\n\n如果成功获取当前状态（`worldMap`），那么我们可以创建一个“map”变量来表示当前的世界地图：\n\n\
    ```\nif let map = worldMap {\n}\n```\n\n接下来，我们需要按如下方式归档这个世界地图：\n\n```\nlet data\
    \ = try! NSKeyedArchiver.archivedData(withRootObject: map, requiringSecureCoding:\
    \ true)\n```\n\n现在，我们需要将这些数据保存到用户默认数据库中，并为其指定一个任意字符串作为键，以便稍后检索：\n\n```\nlet savedMap\
    \ = UserDefaults.standard\nsavedMap.set(data, forKey: \"worldmap\")\nsavedMap.synchronize()\n\
    ```\n\n最后，我们需要向用户发送一条消息，告知世界地图已保存：\n\n```\nDispatchQueue.main.async {\n    self.lblMessage.text\
    \ = \"世界地图已保存\"\n}\n```\n\n完整的`saveMap`函数应如下所示：\n\n```\nfunc saveMap() {\n   \
    \ self.sceneView.session.getCurrentWorldMap { worldMap, error in\n        if error\
    \ != nil {\n            print(error?.localizedDescription ?? \"未知错误\")\n     \
    \       return\n        }\n        if let map = worldMap {\n            let data\
    \ = try! NSKeyedArchiver.archivedData(withRootObject: map, requiringSecureCoding:\
    \ true)\n            // 保存到用户默认数据库\n            let savedMap = UserDefaults.standard\n\
    \            savedMap.set(data, forKey: \"worldmap\")\n            savedMap.synchronize()\n\
    \            DispatchQueue.main.async {\n                self.lblMessage.text\
    \ = \"世界地图已保存\"\n            }\n        }\n    }\n}\n```"
- fmt: '# Loading a World Map


    After we’ve saved a world map, the next step is to load that world map back into
    the augmented reality view. This requires using the user defaults key (defined
    as `worldmap`). To retrieve the stored world map, we need to connect the Load
    button on the user interface to an `IBAction` method and then write code to retrieve
    any data stored in the user defaults database.


    To load a world map, follow these steps:


    1. Click the `Main.storyboard` file in the Navigator pane.

    2. Click the Assistant Editor icon or choose View ➤ Assistant Editor ➤ Show Assistant
    Editor to display the `Main.storyboard` and the `ViewController.swift` file side
    by side.

    3. Move the mouse pointer over the button displaying Load on the user interface,
    hold down the Control key, and Ctrl-drag under the `class ViewController` line.

    4. Release the Control key and the left mouse button. A popup menu appears.

    5. Make sure the Connection popup menu displays Action, then click in the Name
    text field and type `saveButton`.

    6. Click in the Type popup menu and choose `UIButton`, then click the Connect
    button. Xcode creates an `IBAction` method as shown here:


    ```

    @IBAction func loadButton(_ sender: UIButton) {

    }

    ```


    7. Edit this `saveButton` `IBAction` method as follows:


    ```

    @IBAction func loadButton(_ sender: UIButton) {

    loadMap()

    }

    ```


    Each time the user taps the Load button, the Load button runs the `loadMap()`
    function, which will need to either retrieve a previously saved world map or simply
    start an ordinary augmented reality session in case no previous world map has
    been stored.


    First, create the `loadMap` function like this:


    ```

    func loadMap() {

    }

    ```


    Now we need to retrieve the data stored in the user defaults database:


    ```

    let storedData = UserDefaults.standard

    ```


    Next, we need an `if-else` statement where if a world map is found (using the
    arbitrary `worldmap` key), one set of code runs, and if a world map is not found,
    a second set of code runs:


    ```

    if let data = storedData.data(forKey: "worldmap") {

    } else {

    }

    ```


    If a `worldmap` key is found, then we need to retrieve and unarchive it:


    ```

    if let unarchived = try? NSKeyedUnarchiver.unarchivedObject(ofClasses: [ARWorldMap.classForKeyedUnarchiver()],
    from: data), let worldMap = unarchived as? ARWorldMap {

    }

    ```


    Then we can store the previously saved world map into the `initialWorldMap` property
    and display a message to the user that the world map has been loaded. Finally
    we can run that configuration:


    ```

    let configuration = ARWorldTrackingConfiguration()

    configuration.initialWorldMap = worldMap

    configuration.planeDetection = .horizontal

    self.lblMessage.text = "Previous world map loaded"

    sceneView.session.run(configuration)

    ```


    If a world map has not been found using our arbitrary `worldmap` key, we just
    need to load a regular configuration for the augmented reality view so the entire
    `loadMap` function looks like this:


    ```

    func loadMap() {

    let storedData = UserDefaults.standard

    if let data = storedData.data(forKey: "worldmap") {

    if let unarchived = try? NSKeyedUnarchiver.unarchivedObject(ofClasses: [ARWorldMap.classForKeyedUnarchiver()],
    from: data), let worldMap = unarchived as? ARWorldMap {

    let configuration = ARWorldTrackingConfiguration()

    configuration.initialWorldMap = worldMap

    configuration.planeDetection = .horizontal

    self.lblMessage.text = "Previous world map loaded"

    sceneView.session.run(configuration)

    }

    } else {

    let configuration = ARWorldTrackingConfiguration()

    configuration.planeDetection = .horizontal

    sceneView.session.run(configuration)

    }

    }

    ```


    # Clearing an Augmented Reality View


    At this point, our app can save a world map and load it again, but let’s make
    one final adjustment and create a Clear button. When the user taps the Clear button,
    we need to remove any virtual objects so we can create and save a new augmented
    reality view.


    To clear an augmented reality view, follow these steps:


    1. Click the `Main.storyboard` file in the Navigator pane.

    2. Click the Assistant Editor icon or choose View ➤ Assistant Editor ➤ Show Assistant
    Editor to display the `Main.storyboard` and the `ViewController.swift` file side
    by side.

    3. Move the mouse pointer over the button displaying Clear on the user interface,
    hold down the Control key, and Ctrl-drag under the `class ViewController` line.

    4. Release the Control key and the left mouse button. A popup menu appears.

    5. Make sure the Connection popup menu displays Action, then click in the Name
    text field and type `saveButton`.

    6. Click in the Type popup menu and choose `UIButton`, then click the Connect
    button. Xcode creates an `IBAction` method as shown here:


    ```

    @IBAction func clearButton(_ sender: UIButton) {

    }

    ```


    7. Edit this `saveButton` `IBAction` method as follows:


    ```

    @IBAction func clearButton(_ sender: UIButton) {

    clearMap()

    }

    ```


    Each time the user taps the Clear button, the Clear button runs the `clearMap()`
    function, which resets tracking and removes any existing anchors where planes
    and virtual objects exist, essentially clearing the augmented reality view. Add
    the following `clearMap` function as follows:


    ```

    func clearMap() {

    let configuration = ARWorldTrackingConfiguration()

    configuration.planeDetection = .horizontal

    self.lblMessage.text = "Tap to place a virtual object"

    sceneView.debugOptions = [.showWorldOrigin, .showFeaturePoints]

    let options: ARSession.RunOptions = [.resetTracking, .removeExistingAnchors]

    sceneView.session.run(configuration, options: options)

    }

    ```


    The entire `ViewController.swift` file should look like this:'
