    The purpose of this app is to display a red pointer in the center of the screen.
    When the user turns the UISwitch to the On position, then the app will draw a
    green line wherever the user points the camera. To keep the app from drawing right
    away, let’s turn the UISwitch to the Off position by following these steps:


    ![../images/469983_1_En_8_Chapter/469983_1_En_8_Fig3_HTML.jpg](images/469983_1_En_8_Chapter/469983_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    Changing the UISwitch State value to Off


    1.  Click the `Main.storyboard` file in the Navigator pane. The user interface
    appears.


    2.  Click on the UISwitch to select it.


    3.  Click on the Show the Attributes Inspector icon or choose View ➤ Inspectors
    ➤ Show Attributes Inspector.


    4.  Click on the State popup menu and choose Off (see Figure [8-3](#469983_1_En_8_Chapter.xhtml#Fig3)).


    Now we need to write additional code inside the `renderer` function , which should
    currently look like this:


    ```

    func renderer(_ renderer: SCNSceneRenderer, willRenderScene scene: SCNScene, atTime
    time: TimeInterval) {

    guard let pov = sceneView.pointOfView else {return}

    let transform = pov.transform

    let rotation = SCNVector3(-transform.m31, -transform.m32, -transform.m33)

    let location = SCNVector3(transform.m41, transform.m42, transform.m43)

    let currentPosition = SCNVector3(rotation.x + location.x, rotation.y + location.y,
    rotation.z + location.z)

    }

    ```


    We need additional code inside this `renderer` function to determine whether to
    show the pointer or draw a line. Since this additional code will need to run at
    the same time that the app displays the augmented reality view from the camera,
    we need to use the `DispatchQueue` . This allows the app to show the camera and
    draw a line at the same time. A `DispatchQueue` simply defines code to run separately
    from the main code and looks like this:


    ```

    DispatchQueue.main.async {

    }

    ```


    Inside this `DispatchQueue` , we need an `if-else` statement. If the UISwitch
    is turned on, then draw a line. Otherwise, display a pointer to show where the
    line will start to appear when the switch is turned on. This makes the `DispatchQueue`
    code look like this:


    ```

    DispatchQueue.main.async {

    if self.switchDraw.isOn {

    // Draw a line

    } else {

    // Display a pointer

    }

    }

    ```


    First, let’s add code to draw a green line in the augmented reality view. The
    first step is to create a node and define it as a sphere like this:


    ```

    let drawNode = SCNNode()

    drawNode.geometry = SCNSphere(radius: 0.01)

    ```


    Next, we’ll color the sphere green and place it at the current position that of
    the camera’s location and rotation so it appears in the center of the augmented
    reality view:


    ```

    drawNode.geometry?.firstMaterial?.diffuse.contents = UIColor.green

    drawNode.position = currentPosition

    ```


    Then we’ll need to add this green sphere to the rootnode (world origin) like this:


    ```

    self.sceneView.scene.rootNode.addChildNode(drawNode)

    ```


    The `if` portion of the `DispatchQueue` should look like this:


    ```

    if self.switchDraw.isOn {

    let drawNode = SCNNode()

    drawNode.geometry = SCNSphere(radius: 0.01)

    drawNode.geometry?.firstMaterial?.diffuse.contents = UIColor.green

    drawNode.position = currentPosition

    self.sceneView.scene.rootNode.addChildNode(drawNode)

    }

    ```


    This code draws successive green spheres on the screen, creating the illusion
    of a line. Of course, the app only draws this green line if the UISwitch is set
    to On. If the user sets the UISwitch to Off, then the `else` portion of the `if-else`
    statement must run, which displays a pointer.


    Let’s create the pointer as a red sphere like this:


    ```

    let point = SCNNode()

    point.geometry = SCNSphere(radius: 0.005)

    point.position = currentPosition

    point.geometry?.firstMaterial?.diffuse.contents = UIColor.red

    ```


    Now we need to add it to the rootnode like this:


    ```

    self.sceneView.scene.rootNode.addChildNode(point)

    ```


    Just like creating a green sphere to draw a line, this code will display a red
    sphere and draw a line, which is not what we want. The problem is as the user
    moves the camera around, the app keeps drawing red spheres that creates the illusion
    of a line.


    What we need is to draw a red sphere and then delete the previous red sphere so
    it does not create a line on the screen. To do that, we need the following code:


    ```

    self.sceneView.scene.rootNode.enumerateChildNodes({ (node, _) in

    if node.name == "aiming point" {

    node.removeFromParentNode()

    }

    })

    ```


    The `enumerateChildNodes` creates a loop that examines every node connected to
    the rootnode. Then inside this loop we use the `removeFromParentNode` command
    to remove the node. This will delete all nodes connected to the rootnode, including
    our green line, so we need an `if` statement that checks if the node is called
    “aiming point ”. If so, then delete just that node.


    That means we need to name the pointer node as “aiming point” like this:


    ```

    point.name = "aiming point"

    ```


    So the full `DispatchQueue` code should look like this:


    ```

    DispatchQueue.main.async {

    if self.switchDraw.isOn {

    let drawNode = SCNNode()

    drawNode.geometry = SCNSphere(radius: 0.01)

    drawNode.geometry?.firstMaterial?.diffuse.contents = UIColor.green

    drawNode.position = currentPosition

    self.sceneView.scene.rootNode.addChildNode(drawNode)

    } else {

    let point = SCNNode()

    point.name = "aiming point"

    point.geometry = SCNSphere(radius: 0.005)

    point.position = currentPosition

    point.geometry?.firstMaterial?.diffuse.contents = UIColor.red

    self.sceneView.scene.rootNode.enumerateChildNodes({ (node, _) in

    if node.name == "aiming point" {

    node.removeFromParentNode()

    }

    })

    self.sceneView.scene.rootNode.addChildNode(point)

    }

    }

    ```


    The entire `ViewController.swift` file should now look like this:


    ```

    import UIKit

    import SceneKit

    import ARKit

    class ViewController: UIViewController, ARSCNViewDelegate {

    @IBOutlet var sceneView: ARSCNView!

    @IBOutlet var switchDraw: UISwitch!

    let configuration = ARWorldTrackingConfiguration()

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    sceneView.delegate = self

    sceneView.showsStatistics = true

    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]

    }

    override func viewWillAppear(_ animated: Bool) {

    super.viewWillAppear(animated)

    sceneView.session.run(configuration)

    }

    func renderer(_ renderer: SCNSceneRenderer, willRenderScene scene: SCNScene, atTime
    time: TimeInterval) {

    guard let pov = sceneView.pointOfView else {return}

    let transform = pov.transform

    let rotation = SCNVector3(-transform.m31, -transform.m32, -transform.m33)

    let location = SCNVector3(transform.m41, transform.m42, transform.m43)

    let currentPosition = SCNVector3(rotation.x + location.x, rotation.y + location.y,
    rotation.z + location.z)

    DispatchQueue.main.async {

    if self.switchDraw.isOn {

    let drawNode = SCNNode()

    drawNode.geometry = SCNSphere(radius: 0.01)

    drawNode.geometry?.firstMaterial?.diffuse.contents = UIColor.green

    drawNode.position = currentPosition

    self.sceneView.scene.rootNode.addChildNode(drawNode)

    } else {

    let point = SCNNode()

    point.name = "aiming point"

    point.geometry = SCNSphere(radius: 0.005)

    point.position = currentPosition

    point.geometry?.firstMaterial?.diffuse.contents = UIColor.red

    self.sceneView.scene.rootNode.enumerateChildNodes({ (node, _) in

    if node.name == "aiming point" {

    node.removeFromParentNode()

    }

    })

    self.sceneView.scene.rootNode.addChildNode(point)

    }

    }

    }

    }

    ```


    Modify the code in your `ViewController.swift` file to match the code. Then, to
    see the app run, do the following:


    ![../images/469983_1_En_8_Chapter/469983_1_En_8_Fig4_HTML.jpg](images/469983_1_En_8_Chapter/469983_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Drawing a line in augmented reality


    1.  Connect an iOS device to your Macintosh through its USB cable.


    2.  Click the Run button or choose Product ➤ Run.'
