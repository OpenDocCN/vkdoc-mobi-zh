    \        let pyramid = SCNPyramid(width: 0.05, height: 0.1, length: 0.05)\n  \
    \      pyramid.firstMaterial?.diffuse.contents = UIColor.green\n        node.geometry\
    \ = pyramid\n        node.position = SCNVector3(0.05, 0.05, -0.05)\n        sceneView.scene.rootNode.addChildNode(node)\n\
    \    }\n    @IBAction func XChanged(_ sender: UISlider) {\n        currentX =\
    \ GLKMathDegreesToRadians(sender.value)\n        node.eulerAngles = SCNVector3(currentX,\
    \ currentY, currentZ)\n    }\n    @IBAction func YChanged(_ sender: UISlider)\
    \ {\n        currentY = GLKMathDegreesToRadians(sender.value)\n        node.eulerAngles\
    \ = SCNVector3(currentX, currentY, currentZ)\n    }\n    @IBAction func ZChanged(_\
    \ sender: UISlider) {\n        currentZ = GLKMathDegreesToRadians(sender.value)\n\
    \        node.eulerAngles = SCNVector3(currentX, currentY, currentZ)\n    }\n\
    }\n```\n\n此应用将一个绿色的金字塔放置在 `SCNVector3(0.05, 0.05, -0.05)` 位置。要运行此应用，请按照以下步骤操作：\n\
    \n1.  通过 USB 线缆将 iOS 设备连接到您的 Macintosh。\n2.  点击运行按钮或选择**产品** ➤ **运行**。\n3.  当应用运行时，会出现一个绿色的金字塔。\n\
    4.  左右滑动 `x`、`y` 和 `z` 轴滑块。请注意，绿色的金字塔会围绕 `x`、`y` 或 `z` 轴旋转，具体取决于您当前正在移动哪个滑块。\n\
    5.  点击停止按钮或选择**产品** ➤ **停止**。\n\n## 关联对象的旋转\n\n通过使用欧拉角，可以轻松地使虚拟对象围绕其 `x`、`y` 或\
    \ `z` 轴旋转。如果您旋转一个对象，可能会想知道位于旋转对象旁边的任何相邻对象会发生什么变化。如果您使用相对定位将一个虚拟对象放置在另一个虚拟对象旁边，那么旋转一个对象也会导致附近的任何对象改变其位置。\n\
    \n因此，如果您有一个绿色的金字塔，并使用相对定位在绿色金字塔旁边放置一个橙色的盒子，那么旋转绿色金字塔也会移动橙色的盒子。这是因为橙色的盒子使用相对定位，使其与绿色金字塔保持特定的距离。当绿色金字塔旋转时，橙色的盒子也会改变其位置。\n\
    \n让我们添加第二个虚拟对象，例如一个橙色的盒子，并使用相对定位将其放置在绿色金字塔左侧 0.15 米处（`x` 轴），在 `y` 轴上为 0 米，在 `z`\
    \ 轴上为 0 米。\n\n编辑 `showShape` 函数，使其看起来像这样：\n\n```swift\nfunc showShape() {\n  \
    \  let pyramid = SCNPyramid(width: 0.05, height: 0.1, length: 0.05)\n    pyramid.firstMaterial?.diffuse.contents\
    \ = UIColor.green\n    node.geometry = pyramid\n    node.position = SCNVector3(0.05,\
    \ 0.05, -0.05)\n    sceneView.scene.rootNode.addChildNode(node)\n    let box =\
    \ SCNBox (width: 0.05, height: 0.05, length: 0.05, chamferRadius: 0)\n    box.firstMaterial?.diffuse.contents\
    \ = UIColor.orange\n    let boxNode = SCNNode()\n    boxNode.geometry = box\n\
    \    boxNode.position = SCNVector3(-0.15, 0, 0)\n    node.addChildNode(boxNode)\n\
    }\n```\n\n这段代码创建了一个橙色的盒子，出现在绿色金字塔左侧 0.15 米处。由于橙色的盒子使用基于绿色金字塔位置的相对定位，旋转绿色金字塔会自动迫使橙色的盒子改变其位置，以维持其相对于绿色金字塔的固定位置。\n\
    \n运行这个修改后的应用，并左右滑动 `x` 轴、`y` 轴和 `z` 轴滑块。请注意，绿色金字塔会旋转，并迫使橙色的盒子根据绿色金字塔的旋转而改变其位置。\n\
    \n由于橙色的盒子是相对于绿色金字塔定位的，旋转绿色金字塔也会迫使橙色的盒子移动。如果我们创建第三个虚拟对象，该对象使用相对于橙色盒子的定位，会发生什么情况？那么旋转金字塔将移动橙色的盒子，而橙色的盒子又会移动我们的第三个虚拟对象。让我们看看这是如何工作的。\n\
    \n重写 `showShape` 函数，使其添加一个红色的圆柱体，该圆柱体使用相对定位来根据橙色盒子的位置确定自身方向。现在旋转绿色金字塔会移动橙色的盒子（它维持相对于绿色金字塔的位置），也会移动红色的圆柱体（它维持相对于橙色盒子的位置）。\n\
    \n`showShape` 函数应如下所示：\n\n```swift\nfunc showShape() {\n    let pyramid = SCNPyramid(width:\
    \ 0.05, height: 0.1, length: 0.05)\n    pyramid.firstMaterial?.diffuse.contents\
    \ = UIColor.green\n    node.geometry = pyramid\n    node.position = SCNVector3(0.05,\
    \ 0.05, -0.05)\n    sceneView.scene.rootNode.addChildNode(node)\n    let box =\
    \ SCNBox (width: 0.05, height: 0.05, length: 0.05, chamferRadius: 0)\n    box.firstMaterial?.diffuse.contents\
    \ = UIColor.orange\n    let boxNode = SCNNode()\n    boxNode.geometry = box\n\
    \    boxNode.position = SCNVector3(-0.15, 0, 0)\n    node.addChildNode(boxNode)\n\
    \    let cylinder = SCNCylinder(radius: 0.04, height: 0.06)\n    cylinder.firstMaterial?.diffuse.contents\
    \ = UIColor.red\n    let thirdNode = SCNNode()\n    thirdNode.geometry = cylinder\n\
    \    thirdNode.position = SCNVector3(0, -0.15, 0.1)\n    boxNode.addChildNode(thirdNode)\n\
    }\n```\n"
- fmt: "# 相对定位移动所有相关的虚拟对象\n\n这段代码创建了一个半径为0.04米、高度为0.06米的红色圆柱体。然后将其放置在橙色盒子下方0.15米、前方0.1米的位置。当你运行此版本的应用时，移动x、y和z轴的滑块，你将看到绿色金字塔旋转并影响橙色盒子的位置，进而影响红色圆柱体的位置，如图[7-4](#469983_1_En_7_Chapter.xhtml#Fig4)所示。\n\
    \n![images/469983_1_En_7_Chapter/469983_1_En_7_Fig4_HTML.jpg](images/469983_1_En_7_Chapter/469983_1_En_7_Fig4_HTML.jpg)\n\
    \n图 7-4\n相对定位移动所有相关的虚拟对象\n\n此时，我们有三个虚拟对象——一个绿色金字塔、一个橙色盒子和一个红色圆柱体。但是，我们只旋转绿色金字塔。橙色盒子移动以保持其相对于绿色金字塔的位置，而红色圆柱体移动以保持其相对于橙色盒子的位置。\n\
    \n如果我们添加一个仅相对于`rootnode`定位的第四个虚拟对象会怎样？在这种情况下，旋转绿色金字塔对这个第四个虚拟对象没有影响，因为它仅依赖于`rootnode`（世界原点）。让我们看看这是如何工作的。\n\
    \n编辑`showShape`函数以添加第四个虚拟对象，这次将其设为一个蓝色的圆环，如下所示：\n\n```\nlet torus = SCNTorus(ringRadius:\
    \ 0.02, pipeRadius: 0.004)\ntorus.firstMaterial?.diffuse.contents = UIColor.blue\n\
    let fourthNode = SCNNode()\nfourthNode.geometry = torus\nfourthNode.position =\
    \ SCNVector3(0, -0.02, 0.1)\nsceneView.scene.rootNode.addChildNode(fourthNode)\n\
    ```\n\n修改`showShape`函数如下：\n\n```\nfunc showShape() {\n    let pyramid = SCNPyramid(width:\
    \ 0.05, height: 0.1, length: 0.05)\n    pyramid.firstMaterial?.diffuse.contents\
    \ = UIColor.green\n    node.geometry = pyramid\n    node.position = SCNVector3(0.05,\
    \ 0.05, -0.05)\n    sceneView.scene.rootNode.addChildNode(node)\n\n    let box\
    \ = SCNBox (width: 0.05, height: 0.05, length: 0.05, chamferRadius: 0)\n    box.firstMaterial?.diffuse.contents\
    \ = UIColor.orange\n    let boxNode = SCNNode()\n    boxNode.geometry = box\n\
    \    boxNode.position = SCNVector3(-0.15, 0, 0)\n    node.addChildNode(boxNode)\n\
    \n    let cylinder = SCNCylinder(radius: 0.04, height: 0.06)\n    cylinder.firstMaterial?.diffuse.contents\
    \ = UIColor.red\n    let thirdNode = SCNNode()\n    thirdNode.geometry = cylinder\n\
    \    thirdNode.position = SCNVector3(0, -0.15, 0.1)\n    boxNode.addChildNode(thirdNode)\n\
    \n    let torus = SCNTorus(ringRadius: 0.02, pipeRadius: 0.004)\n    torus.firstMaterial?.diffuse.contents\
    \ = UIColor.blue\n    let fourthNode = SCNNode()\n    fourthNode.geometry = torus\n\
    \    fourthNode.position = SCNVector3(0, -0.02, 0.1)\n    sceneView.scene.rootNode.addChildNode(fourthNode)\n\
    }\n```\n\n由于圆环是相对于`rootnode`定位，而不是相对于其他任何虚拟对象，因此旋转绿色金字塔不会影响圆环的位置。这说明了在增强现实视图中移动虚拟对象时，相对定位与相对于`rootnode`定位的区别。\n\
    \n## 总结\n\n有两种方法可以在增强现实视图中定义虚拟对象的位置。第一种，你可以相对于`rootnode`定义对象的位置，`rootnode`出现在世界原点(0,\
    \ 0, 0)。第二种，你可以相对于另一个对象的位置来定义对象的位置。\n\n要旋转一个对象，你需要定义其围绕x、y和z轴的欧拉角。欧拉角使用弧度，因此你需要使用存储在`GLKit`框架中的函数将度转换为弧度。通过使用`GLKMathDegreesToRadians`函数，你可以轻松地将度转换为弧度。\n\
    \n旋转一个对象也会改变任何定义为相对于该旋转对象的附近对象的位置。只有相对于`rootnode`定位的对象在旋转其他对象时不会改变。\n\n# 8. 在屏幕上绘图\n\
    \n你已经了解了如何在增强现实中绘制常见的几何形状，如圆柱体、盒子、金字塔和球体。你也已经了解了如何通过定义起点和终点来绘制自定义几何形状。在屏幕上创建和显示虚拟对象通常通过代码完成。\n\
    \n但是，如果你想让用户选择在屏幕上绘制物品呢？这就是你将在本章学到的：如何让用户直接在增强现实视图上绘制线条。\n\n首先，解释一下你一直使用的另一个调试功能：\n\
    \n```\nsceneView.showsStatistics = true\n```\n\n这行代码显示了相机显示的每秒帧数，如图[8-1](#469983_1_En_8_Chapter.xhtml#Fig1)所示。\n\
    \n![images/469983_1_En_8_Chapter/469983_1_En_8_Fig1_HTML.jpg](images/469983_1_En_8_Chapter/469983_1_En_8_Fig1_HTML.jpg)\n\
    \n图 8-1\n查看增强现实应用中的每秒帧数\n\n每秒帧数定义了相机更新或渲染其视图的频率。每次相机更新或渲染其视图时（通常为每秒60帧），它都会运行一个`willRenderScene`函数，如下所示：\n\
    \n```\nfunc renderer(_ renderer: SCNSceneRenderer, willRenderScene scene: SCNScene,\
    \ atTime time: TimeInterval) {\n}\n```\n\n因此，要在增强现实视图中绘制某些内容，我们需要使用这个`willRenderScene`函数来更新或渲染屏幕上的图像。\n\
    \n要在增强现实中绘制一个项目，我们需要按照以下步骤创建一个新的Xcode项目：\n\n1.  启动Xcode。（确保你使用的是Xcode 10或更高版本。）\n\
    2.  选择 File ➤ New ➤ Project。Xcode会要求你选择一个模板。\n3.  点击iOS类别。\n4.  点击Single View\
    \ App图标，然后点击Next按钮。Xcode要求输入产品名称、组织名称、组织标识符和内容技术。\n5.  点击Product Name文本字段，为你的项目输入一个描述性名称，例如`Drawing`。（确切的名称不重要。）\n\
    6.  点击Next按钮。Xcode询问你要将项目存储在哪里。\n7.  选择一个文件夹并点击Create按钮。Xcode创建一个iOS项目。\n\n现在按照以下步骤修改`Info.plist`文件以允许访问相机并使用ARKit：\n\
    \n1.  点击Navigator窗格中的`Info.plist`文件。Xcode显示一个键、类型和值的列表。\n2.  点击展开三角形以展开Required\
    \ Device Capabilities类别，显示Item 0。\n3.  将鼠标指针移到Item 0上以显示加号(+)图标。\n4.  点击这个加号(+)图标以显示一个空白的Item\
    \ 1。\n5.  在Item 1行的Value类别下输入`arkit`。\n6.  将鼠标指针移到最后一行以显示加号(+)图标。\n7.  点击加号(+)图标创建一个新行。会弹出一个菜单。\n\
    8.  选择 Privacy – Camera Usage Description。\n9.  在Privacy – Camera Usage Description行的Value类别下输入`AR\
    \ needs to use the camera`。\n\n现在按照以下步骤修改`ViewController.swift`文件以使用ARKit和SceneKit：\n\
    \n1.  点击Navigator窗格中的`ViewController.swift`文件。\n2.  编辑`ViewController.swift`文件，使其看起来像这样：\n\
    \n```\nimport UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController: UIViewController,\
    \ ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
    \ any additional setup after loading the view, typically from a nib.\n    }\n\
    }\n```\n\n要在我们的应用中查看增强现实，添加一个单独的ARKit SceneKit视图(`ARSCNView`)和一个`UISwitch`，使用户界面类似于图[8-2](#469983_1_En_8_Chapter.xhtml#Fig2)。\n\
    \n![images/469983_1_En_8_Chapter/469983_1_En_8_Fig2_HTML.jpg](images/469983_1_En_8_Chapter/469983_1_En_8_Fig2_HTML.jpg)\n\
    \n图 8-2\n用户界面包括一个放置在`ARSCNView`上的`UISwitch`"
  raw: "This code creates a red cylinder with a radius of 0.04 meters and a height\
    \ of 0.06 meters. Then it places it 0.15 meters below the orange box and 0.1 meters\
    \ in front of the orange box. When you run this version of the app, move the x-,\
    \ y-, and z-axes sliders and you’ll see the green pyramid rotate and affect the\
    \ position of the orange box, which in turn affects the position of the red cylinder,\
    \ as shown in Figure [7-4](#469983_1_En_7_Chapter.xhtml#Fig4).\n\n![../images/469983_1_En_7_Chapter/469983_1_En_7_Fig4_HTML.jpg](images/469983_1_En_7_Chapter/469983_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4\n\nRelative positioning moves all related virtual objects\n\nAt this\
    \ point we have three virtual objects—a green pyramid, an orange box, and a red\
    \ cylinder. However, we’re only rotating the green pyramid. The orange box moves\
    \ to maintain its relative position to the green pyramid and the red cylinder\
    \ moves to maintain its relative position to the orange box.\n\nWhat happens if\
    \ we add a fourth virtual object that’s only positioned according to the rootnode?\
    \ In that case, rotating the green pyramid will have no effect on this fourth\
    \ virtual object because this fourth virtual object only depends on the rootnode\
    \ (world origin). Let’s see this work.\n\nEdit the `showShape` function to add\
    \ a fourth virtual object, this time make it a blue torus like this:\n\n```\n\
    let torus = SCNTorus(ringRadius: 0.02, pipeRadius: 0.004)\ntorus.firstMaterial?.diffuse.contents\
    \ = UIColor.blue\nlet fourthNode = SCNNode()\nfourthNode.geometry = torus\nfourthNode.position\
    \ = SCNVector3(0, -0.02, 0.1)\nsceneView.scene.rootNode.addChildNode(fourthNode)\n\
    ```\n\nModify the `showShape` function like this:\n\n```\nfunc showShape() {\n\
    let pyramid = SCNPyramid(width: 0.05, height: 0.1, length: 0.05)\npyramid.firstMaterial?.diffuse.contents\
    \ = UIColor.green\nnode.geometry = pyramid\nnode.position = SCNVector3(0.05, 0.05,\
    \ -0.05)\nsceneView.scene.rootNode.addChildNode(node)\nlet box = SCNBox (width:\
    \ 0.05, height: 0.05, length: 0.05, chamferRadius: 0)\nbox.firstMaterial?.diffuse.contents\
    \ = UIColor.orange\nlet boxNode = SCNNode()\nboxNode.geometry = box\nboxNode.position\
    \ = SCNVector3(-0.15, 0, 0)\nnode.addChildNode(boxNode)\nlet cylinder = SCNCylinder(radius:\
    \ 0.04, height: 0.06)\ncylinder.firstMaterial?.diffuse.contents = UIColor.red\n\
    let thirdNode = SCNNode()\nthirdNode.geometry = cylinder\nthirdNode.position =\
    \ SCNVector3(0, -0.15, 0.1)\nboxNode.addChildNode(thirdNode)\nlet torus = SCNTorus(ringRadius:\
    \ 0.02, pipeRadius: 0.004)\ntorus.firstMaterial?.diffuse.contents = UIColor.blue\n\
    let fourthNode = SCNNode()\nfourthNode.geometry = torus\nfourthNode.position =\
    \ SCNVector3(0, -0.02, 0.1)\nsceneView.scene.rootNode.addChildNode(fourthNode)\n\
    }\n```\n\nBecause the torus is positioned to the rootnode and not relative to\
    \ any of the other virtual objects, rotating the green pyramid does not affect\
    \ the position of the torus. This shows the difference between relative positioning\
    \ and positioning to the rootnode when moving virtual objects in an augmented\
    \ reality view.\n\n## Summary\n\nThere are two ways to define a location of a\
    \ virtual object in an augmented reality view. One, you can define the object’s\
    \ position in relation to the rootnode, which appears at the world origin (0,\
    \ 0, 0). Two, you can define the object’s position relative to another object’s\
    \ position.\n\nTo rotate an object, you need to define its Euler angles around\
    \ the x-, y-, and z-axes. Euler angles use radians so you’ll need to convert degrees\
    \ to radians using a function stored in the GLKit framework. By using the `GLKMathDegreesToRadians`\
    \ function, you can easily convert degrees to radians.\n\nRotating an object also\
    \ changes the position of any nearby objects that are defined relative to the\
    \ rotated object. Only objects positioned relative to the rootnode won’t change\
    \ when other objects are rotated.\n\n# 8. Drawing on the Screen\n\nYou’ve already\
    \ seen how you can draw common geometric shapes in augmented reality such as cylinders,\
    \ boxes, pyramids, and spheres. You’ve also seen how you can draw custom geometric\
    \ shapes by defining starting and end points. Creating and displaying virtual\
    \ objects on the screen typically occurs in code.\n\nHowever, what if you want\
    \ to give the user the choice of drawing items on the screen? That’s what you’ll\
    \ learn in this chapter: how to let the user draw lines directly on an augmented\
    \ reality view.\n\nFirst, let’s explain another debugging feature that you’ve\
    \ been using all this time:\n\n```\nsceneView.showsStatistics = true\n```\n\n\
    This line of code shows the number of frames per second that the camera displays,\
    \ as shown in Figure [8-1](#469983_1_En_8_Chapter.xhtml#Fig1).\n\n![../images/469983_1_En_8_Chapter/469983_1_En_8_Fig1_HTML.jpg](images/469983_1_En_8_Chapter/469983_1_En_8_Fig1_HTML.jpg)\n\
    \nFigure 8-1\n\nViewing frames per second in an augmented reality app\n\nFrames\
    \ per second defines how often the camera updates or renders its view. Each time\
    \ the camera updates or renders its view (usually 60 frames per second), it runs\
    \ a `willRenderScene` function like this:\n\n```\nfunc renderer(_ renderer: SCNSceneRenderer,\
    \ willRenderScene scene: SCNScene, atTime time: TimeInterval) {\n}\n```\n\nSo\
    \ to draw something in an augmented reality view, we need to use this `willRenderScene`\
    \ function to update or render an image on the screen.\n\nTo draw an item in an\
    \ augmented reality, we need to create a new Xcode project by following these\
    \ steps:\n\n1.  Start Xcode. (Make sure you’re using Xcode 10 or greater.)\n\n\
    2.  Choose File ➤ New ➤ Project. Xcode asks you to choose a template.\n\n3.  Click\
    \ the iOS category.\n\n4.  Click the Single View App icon and click the Next button.\
    \ Xcode asks for a product name, organization name, organization identifiers,\
    \ and content technology.\n\n5.  Click in the Product Name text field and type\
    \ a descriptive name for your project, such as `Drawing`. (The exact name does\
    \ not matter.)\n\n6.  Click the Next button. Xcode asks where you want to store\
    \ your project.\n\n7.  Choose a folder and click the Create button. Xcode creates\
    \ an iOS project.\n\nNow modify the `Info.plist` file to allow access to the camera\
    \ and to use ARKit by following these steps:\n\n1.  Click the `Info.plist` file\
    \ in the Navigator pane. Xcode displays a list of keys, types, and values.\n\n\
    2.  Click the disclosure triangle to expand the Required Device Capabilities category\
    \ to display Item 0.\n\n3.  Move the mouse pointer over Item 0 to display a plus\
    \ (+) icon.\n\n4.  Click this plus (+) icon to display a blank Item 1.\n\n5. \
    \ Type `arkit` under the Value category in the Item 1 row.\n\n6.  Move the mouse\
    \ pointer over the last row to display a plus (+) icon.\n\n7.  Click on the plus\
    \ (+) icon to create a new row. A popup menu appears.\n\n8.  Choose Privacy –\
    \ Camera Usage Description.\n\n9.  Type `AR needs to use the camera` under the\
    \ Value category in the Privacy – Camera Usage Description row.\n\nNow it’s time\
    \ to modify the `ViewController.swift` file to use ARKit and SceneKit by following\
    \ these steps:\n\n1.  Click on the `ViewController.swift` file in the Navigator\
    \ pane.\n\n2.  Edit the `ViewController.swift` file so it looks like this:\n\n\
    ```\n    import UIKit\n    import SceneKit\n    import ARKit\n    class ViewController:\
    \ UIViewController, ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    override func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n    }\n    }\n    ```\n\
    \nTo view augmented reality in our app, add a single ARKit SceneKit View (ARSCNView)\
    \ and a UISwitch so the user interface looks similar to Figure [8-2](#469983_1_En_8_Chapter.xhtml#Fig2).\n\
    \n![../images/469983_1_En_8_Chapter/469983_1_En_8_Fig2_HTML.jpg](images/469983_1_En_8_Chapter/469983_1_En_8_Fig2_HTML.jpg)\n\
    \nFigure 8-2\n\nThe user interface includes a single UISwitch on an ARSCNView"
  trans: "\n# 相对定位移动所有相关的虚拟对象\n\n这段代码创建了一个半径为 0.04 米、高度为 0.06 米的红色圆柱体。然后将其放置在橙色盒子下方\
    \ 0.15 米、前方 0.1 米的位置。当你运行此版本的应用时，移动 x、y 和 z 轴的滑块，你将看到绿色金字塔旋转并影响橙色盒子的位置，进而影响红色圆柱体的位置，如图\
    \ 7-4 所示。\n\n![images/469983_1_En_7_Chapter/469983_1_En_7_Fig4_HTML.jpg](img/469983_1_En_7_Fig4_HTML.jpg)\n\
    \n图 7-4\n相对定位移动所有相关的虚拟对象\n\n此时，我们有三个虚拟对象——一个绿色金字塔、一个橙色盒子和一个红色圆柱体。但是，我们只旋转绿色金字塔。橙色盒子移动以保持其相对于绿色金字塔的位置，而红色圆柱体移动以保持其相对于橙色盒子的位置。\n\
    \n如果我们添加一个仅相对于`rootnode`定位的第四个虚拟对象会怎样？在这种情况下，旋转绿色金字塔对这个第四个虚拟对象没有影响，因为它仅依赖于`rootnode`（世界原点）。让我们看看这是如何工作的。\n\
    \n编辑`showShape`函数以添加第四个虚拟对象，这次将其设为一个蓝色的圆环，如下所示：\n\n```\nlet torus = SCNTorus(ringRadius:\
    \ 0.02, pipeRadius: 0.004)\ntorus.firstMaterial?.diffuse.contents = UIColor.blue\n\
    let fourthNode = SCNNode()\nfourthNode.geometry = torus\nfourthNode.position =\
    \ SCNVector3(0, -0.02, 0.1)\nsceneView.scene.rootNode.addChildNode(fourthNode)\n\
    ```\n\n修改`showShape`函数如下：\n\n```\nfunc showShape() {\n    let pyramid = SCNPyramid(width:\
    \ 0.05, height: 0.1, length: 0.05)\n    pyramid.firstMaterial?.diffuse.contents\
    \ = UIColor.green\n    node.geometry = pyramid\n    node.position = SCNVector3(0.05,\
    \ 0.05, -0.05)\n    sceneView.scene.rootNode.addChildNode(node)\n\n    let box\
    \ = SCNBox (width: 0.05, height: 0.05, length: 0.05, chamferRadius: 0)\n    box.firstMaterial?.diffuse.contents\
    \ = UIColor.orange\n    let boxNode = SCNNode()\n    boxNode.geometry = box\n\
    \    boxNode.position = SCNVector3(-0.15, 0, 0)\n    node.addChildNode(boxNode)\n\
    \n    let cylinder = SCNCylinder(radius: 0.04, height: 0.06)\n    cylinder.firstMaterial?.diffuse.contents\
    \ = UIColor.red\n    let thirdNode = SCNNode()\n    thirdNode.geometry = cylinder\n\
    \    thirdNode.position = SCNVector3(0, -0.15, 0.1)\n    boxNode.addChildNode(thirdNode)\n\
    \n    let torus = SCNTorus(ringRadius: 0.02, pipeRadius: 0.004)\n    torus.firstMaterial?.diffuse.contents\
    \ = UIColor.blue\n    let fourthNode = SCNNode()\n    fourthNode.geometry = torus\n\
    \    fourthNode.position = SCNVector3(0, -0.02, 0.1)\n    sceneView.scene.rootNode.addChildNode(fourthNode)\n\
    }\n```\n\n由于圆环是相对于`rootnode`定位，而不是相对于其他任何虚拟对象，因此旋转绿色金字塔不会影响圆环的位置。这说明了在增强现实视图中移动虚拟对象时，相对定位与相对于`rootnode`定位的区别。\n\
    \n## 总结\n\n有两种方法可以在增强现实视图中定义虚拟对象的位置。第一种，你可以相对于`rootnode`定义对象的位置，`rootnode`出现在世界原点(0,\
    \ 0, 0)。第二种，你可以相对于另一个对象的位置来定义对象的位置。\n\n要旋转一个对象，你需要定义其围绕 x、y 和 z 轴的欧拉角。欧拉角使用弧度，因此你需要使用存储在`GLKit`框架中的函数将度转换为弧度。通过使用`GLKMathDegreesToRadians`函数，你可以轻松地将度转换为弧度。\n\
    \n旋转一个对象也会改变任何定义为相对于该旋转对象的附近对象的位置。只有相对于`rootnode`定位的对象在旋转其他对象时不会改变。\n\n# 8. 在屏幕上绘图\n\
    \n你已经了解了如何在增强现实中绘制常见的几何形状，如圆柱体、盒子、金字塔和球体。你也已经了解了如何通过定义起点和终点来绘制自定义几何形状。在屏幕上创建和显示虚拟对象通常通过代码完成。\n\
    \n但是，如果你想让用户选择在屏幕上绘制物品呢？这就是你将在本章学到的：如何让用户直接在增强现实视图上绘制线条。\n\n首先，解释一下你一直使用的另一个调试功能：\n\
    \n```\nsceneView.showsStatistics = true\n```\n\n这行代码显示了相机显示的每秒帧数，如图 8-1 所示。\n\n\
    ![images/469983_1_En_8_Chapter/469983_1_En_8_Fig1_HTML.jpg](img/469983_1_En_8_Fig1_HTML.jpg)\n\
    \n图 8-1\n查看增强现实应用中的每秒帧数\n\n每秒帧数定义了相机更新或渲染其视图的频率。每次相机更新或渲染其视图时（通常为每秒 60 帧），它都会运行一个`willRenderScene`函数，如下所示：\n\
    \n```\nfunc renderer(_ renderer: SCNSceneRenderer, willRenderScene scene: SCNScene,\
    \ atTime time: TimeInterval) {\n}\n```\n\n因此，要在增强现实视图中绘制某些内容，我们需要使用这个`willRenderScene`函数来更新或渲染屏幕上的图像。\n\
    \n要在增强现实中绘制一个项目，我们需要按照以下步骤创建一个新的 Xcode 项目：\n\n1.  启动 Xcode。（确保你使用的是 Xcode 10 或更高版本。）\n\
    2.  选择 File ➤ New ➤ Project。Xcode 会要求你选择一个模板。\n3.  点击 iOS 类别。\n4.  点击 Single View\
    \ App 图标，然后点击 Next 按钮。Xcode 要求输入产品名称、组织名称、组织标识符和内容技术。\n5.  点击 Product Name 文本字段，为你的项目输入一个描述性名称，例如`Drawing`。（确切的名称不重要。）\n\
    6.  点击 Next 按钮。Xcode 询问你要将项目存储在哪里。\n7.  选择一个文件夹并点击 Create 按钮。Xcode 创建一个 iOS 项目。\n\
    \n现在按照以下步骤修改`Info.plist`文件以允许访问相机并使用 ARKit：\n\n1.  点击 Navigator 窗格中的`Info.plist`文件。Xcode\
    \ 显示一个键、类型和值的列表。\n2.  点击展开三角形以展开 Required Device Capabilities 类别，显示 Item 0。\n\
    3.  将鼠标指针移到 Item 0 上以显示加号(+)图标。\n4.  点击这个加号(+)图标以显示一个空白的 Item 1。\n5.  在 Item 1\
    \ 行的 Value 类别下输入`arkit`。\n6.  将鼠标指针移到最后一行以显示加号(+)图标。\n7.  点击加号(+)图标创建一个新行。会弹出一个菜单。\n\
    8.  选择 Privacy – Camera Usage Description。\n9.  在 Privacy – Camera Usage Description\
    \ 行的 Value 类别下输入`AR needs to use the camera`。\n\n现在按照以下步骤修改`ViewController.swift`文件以使用\
    \ ARKit 和 SceneKit：\n\n1.  点击 Navigator 窗格中的`ViewController.swift`文件。\n2.  编辑`ViewController.swift`文件，使其看起来像这样：\n\
    \n```\nimport UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController: UIViewController,\
    \ ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
    \ any additional setup after loading the view, typically from a nib.\n    }\n\
    }\n```\n\n要在我们的应用中查看增强现实，添加一个单独的 ARKit SceneKit 视图(`ARSCNView`)和一个`UISwitch`，使用户界面类似于图\
    \ 8-2。\n\n![images/469983_1_En_8_Chapter/469983_1_En_8_Fig2_HTML.jpg](img/469983_1_En_8_Fig2_HTML.jpg)\n\
    \n图 8-2\n用户界面包括一个放置在`ARSCNView`上的`UISwitch`\n"
- fmt: "# 添加约束与连接界面\n\n在设计了用户界面之后，需要添加约束。要添加约束，请在菜单底部“All Views in Container”类别下选择\
    \ **Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints**。\n\n\
    设计完用户界面后，下一步是将界面元素连接到`ViewController.swift`文件中的Swift代码。请按以下步骤操作：\n\n1.  在导航器窗格中点击`Main.storyboard`文件。\n\
    2.  点击助理编辑器图标，或选择 **View ➤ Assistant Editor ➤ Show Assistant Editor**，以并排显示`Main.storyboard`和`ViewController.swift`文件。\n\
    3.  将鼠标指针悬停在`ARSCNView`上，按住Control键，然后按住Control键并拖动到`class ViewController`行下方。\n\
    4.  释放Control键和鼠标左键。会弹出一个菜单。\n5.  在Name文本框中点击并输入`sceneView`，然后点击Connect按钮。Xcode将创建一个IBOutlet，如下所示：\n\
    \    ```\n    @IBOutlet var sceneView: ARSCNView!\n    ```\n6.  将鼠标指针悬停在`UISwitch`上，按住Control键，然后按住Control键并拖动到`@IBOutlet\
    \ sceneView`行下方。\n7.  释放Control键和鼠标左键。会弹出一个菜单。\n8.  在Name文本框中点击并输入`switchDraw`，然后点击Connect按钮。Xcode将创建一个IBOutlet，如下所示：\n\
    \    ```\n    @IBOutlet var switchDraw: UISwitch!\n    ```\n9.  编辑`viewDidLoad`函数，使其如下所示：\n\
    \    ```\n    override func viewDidLoad() {\n        super.viewDidLoad()\n   \
    \     // Do any additional setup after loading the view, typically from a nib.\n\
    \        sceneView.delegate = self\n        sceneView.showsStatistics = true\n\
    \        sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    }\n    ```\n10. 编辑`viewWillAppear`函数，使其如下所示：\n    ```\n    override func\
    \ viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
    \        sceneView.session.run(configuration)\n    }\n    ```\n11. 在`viewWillAppear`函数下方键入以下内容：\n\
    \    ```\n    func renderer(_ renderer: SCNSceneRenderer, willRenderScene scene:\
    \ SCNScene, atTime time: TimeInterval) {\n    }\n    ```\n\n`renderer(_:willRenderScene:atTime:)`函数在每次应用更新增强现实视图时运行，通常为每秒60帧。\n\
    \n## 绘制增强现实视图\n\n要在增强现实视图上绘制，必须首先在`willRenderScene`函数中获取iOS设备摄像头的位置。为此，我们可以使用以下代码来获取摄像头的位置和方向：\n\
    ```\nguard let pov = sceneView.pointOfView else {return}\n```\n`guard`语句确保我们从iOS设备获取了摄像头信息。如果由于某些原因未能获取，则`guard`语句会立即退出`willRenderScene`函数。\n\
    \n假设我们从iOS设备获取了摄像头信息，下一步是将此信息转换为一个4x4矩阵，其中包含关于摄像头的各种信息：\n```\nlet transform =\
    \ pov.transform\n```\n\n### 获取摄像头旋转与位置\n\n这个4x4矩阵的第三行包含摄像头的x、y、z旋转。要获取此信息，我们需要使用以下代码：\n\
    ```\nlet rotation = SCNVector3(-transform.m31, -transform.m32, -transform.m33)\n\
    ```\n注意，从矩阵第三行获取的每个项目前都有一个负号。这个负号反转了旋转信息，因为如果没有它，在x轴上向右移动将为负值（而不是正值），在y轴上向上移动将为负值（而不是正值），在z轴上向后移动将为负值（而不是正值）。\n\
    \n旋转定义了摄像头所面对的方向。接下来，我们需要从4x4矩阵的第四行获取摄像头的位置，如下所示：\n```\nlet location = SCNVector3(transform.m41,\
    \ transform.m42, transform.m43)\n```\n一旦我们有了摄像头的旋转和位置，就需要将它们的x、y和z坐标相加来获取摄像头的方位。"
  raw: "After you’ve designed your user interface, you need to add constraints. To\
    \ add constraints, choose Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested\
    \ Constraints at the bottom half of the menu under the All Views in Container\
    \ category.\n\nAfter designing the user interface, the next step is to connect\
    \ the user interface items to the Swift code in the `ViewController.swift` file.\
    \ To do this, follow these steps:\n\n1.  Click the `Main.storyboard` file in the\
    \ Navigator pane.\n\n2.  Click the Assistant Editor icon or choose View ➤ Assistant\
    \ Editor ➤ Show Assistant Editor to display the `Main.storyboard` and the `ViewController.swift`\
    \ file side by side.\n\n3.  Move the mouse pointer over the ARSCNView, hold down\
    \ the Control key, and Ctrl-drag under the `class ViewController` line.\n\n4.\
    \  Release the Control key and the left mouse button. A popup menu appears.\n\n\
    5.  Click in the Name text field and type `sceneView`, then click the Connect\
    \ button. Xcode creates an IBOutlet as shown here:\n\n```\n    @IBOutlet var sceneView:\
    \ ARSCNView!\n    ```\n\n6.  Move the mouse pointer over the UISwitch, hold down\
    \ the Control key, and Ctrl-drag under the `IBOutlet sceneView` line.\n\n7.  Release\
    \ the Control key and the left mouse button. A popup menu appears.\n\n8.  Click\
    \ in the Name text field and type `switchDraw`, then click the Connect button.\
    \ Xcode creates an IBOutlet as shown here:\n\n```\n    @IBOutlet var switchDraw:\
    \ UISwitch!\n    ```\n\n9.  Edit the `viewDidLoad` function so it looks like this:\n\
    \n```\n    override func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any\
    \ additional setup after loading the view, typically from a nib.\n    sceneView.delegate\
    \ = self\n    sceneView.showsStatistics = true\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
    \ ARSCNDebugOptions.showFeaturePoints]\n    }\n    ```\n\n10.  Edit the `viewWillAppear`\
    \ function so it looks like this:\n\n```\n    override func viewWillAppear(_ animated:\
    \ Bool) {\n    super.viewWillAppear(animated)\n    sceneView.session.run(configuration)\n\
    \    }\n    ```\n\n11.  Type the following underneath the `viewWillAppear` function:\n\
    \n```\n    func renderer(_ renderer: SCNSceneRenderer, willRenderScene scene:\
    \ SCNScene, atTime time: TimeInterval) {\n    }\n    ```\n\nThe `renderer willRenderScene`\
    \ function runs every time the app updates the augmented reality view, which is\
    \ usually 60 frames per second.\n\nTo draw on the augmented reality view, we must\
    \ first retrieve the iOS device camera’s location within the `willRenderScene`\
    \ function . To do this, we can use the following, which retrieves the camera’s\
    \ position and direction:\n\n```\nguard let pov = sceneView.pointOfView else {return}\n\
    ```\n\nThe `guard` statement just makes sure we get camera information from the\
    \ iOS device. If for some reason we do not, then the `guard` statement immediately\
    \ exits the `willRenderScene` function .\n\nAssuming we get camera information\
    \ from the iOS device, the next step is to transform this information into a 4\
    \ by 4 matrix that contains various information about the camera:\n\n```\nlet\
    \ transform = pov.transform\n```\n\nThe third row of this 4 by 4 matrix contains\
    \ the x, y, and z rotation of the camera. To retrieve this information, we need\
    \ to use this code:\n\n```\nlet rotation = SCNVector3(-transform.m31, -transform.m32,\
    \ -transform.m33)\n```\n\nNotice that there’s a negative sign in front of each\
    \ item retrieved from the third row of the matrix. This negative sign reverses\
    \ the rotation information because without it, moving right on the x-axis would\
    \ be negative (instead of positive), moving up on the y-axis would be negative\
    \ (instead of positive), and moving back on the z-axis would be negative (instead\
    \ of positive).\n\nThe rotation defines the camera’s direction that it’s facing.\
    \ Next we need to retrieve the location of the camera from the fourth row of the\
    \ 4 by 4 matrix like this:\n\n```\nlet location = SCNVector3(transform.m41, transform.m42,\
    \ transform.m43)\n```\n\nOnce we have the rotation and location of the camera,\
    \ we need to add their x, y, and z coordinates to get the position of the camera\
    \ like this:"
  trans: "\n# 添加约束与连接界面\n\n设计好用户界面后，下一步是添加约束。要添加约束，请在底部菜单的“All Views in Container”分类下选择\
