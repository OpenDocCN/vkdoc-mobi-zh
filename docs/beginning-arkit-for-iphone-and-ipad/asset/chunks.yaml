    ### About the Author and About the Technical Reviewer


    ### About the Author


    ### About the Technical Reviewer


    # 1. Understanding Augmented Reality and ARKit


    You may have heard of virtual reality (VR), but there’s a similar innovation that’s
    appearing on mobile devices like the iPhone and iPad that’s called augmented reality
    (AR). Although they may rely on similar technology, virtual reality and augmented
    reality offer vastly different uses in everyday life.


    Virtual reality works by forcing users to strap a device around their head like
    an alien facehugger. Such VR headsets completely isolate the user from his or
    her surroundings and immerses the user in a completely fictional world. NASA uses
    virtual reality to train astronauts to explore the surface of Mars, while American
    football teams are experimenting with virtual reality to train quarterbacks to
    re-experience plays without actually going out on a field and risking physical
    injury. By practicing skills in a virtual reality world, users can safely make
    mistakes and learn from them without any physical consequences.


    The huge drawback with virtual reality is that to use it, you must be in a safe
    place such as in a home or office. Because VR headsets isolate you from your surroundings,
    using virtual reality essentially blindfolds you. You can’t use virtual reality
    while driving, walking, or operating a vehicle of any kind. Because you need to
    wear a VR headset, you can only use virtual reality wherever you can safely stand
    or sit without worrying about interference from outside elements such as other
    people or moving vehicles. For that reason, virtual reality’s uses are limited
    to fixed locations where users can remain safe while they immerse themselves in
    another world.


    On the other hand, augmented reality is designed to interact with the world around
    you. Augmented reality lets you view the real world but with additional information
    overlaid over reality to help you better understand what you’re looking at.


    For example, a measuring cup is a simple version of augmented reality. By pouring
    liquid in a transparent cup with measurement units printed on the outside, you
    can accurately measure the amount of any liquid in the cup, as shown in Figure
    [1-1](#469983_1_En_1_Chapter.xhtml#Fig1). Without the measurement units printed
    on the outside of the transparent cup, you would never know exactly how much liquid
    the cup contains.


    ![../images/469983_1_En_1_Chapter/469983_1_En_1_Fig1_HTML.jpg](images/469983_1_En_1_Chapter/469983_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    A measuring cup is a simple version of augmented reality


    Hunters use a similar type of augmented reality when aiming a rifle. The scope
    magnifies the view of whatever the hunter may be looking at, and crosshairs etched
    in the lens shows the hunter exactly where the rifle’s bullet will hit, as shown
    in Figure [1-2](#469983_1_En_1_Chapter.xhtml#Fig2).


    ![../images/469983_1_En_1_Chapter/469983_1_En_1_Fig2_HTML.jpg](images/469983_1_En_1_Chapter/469983_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    A hunting scope is another form of static augmented reality


    Both the measuring cup and rifle scope represent simple, but fixed, types of augmented
    reality. A measuring cup can only measure amounts of liquids poured into that
    cup and a rifle scope can only magnify a target. Computers have helped make augmented
    reality more versatile so it can show information as the real world around you
    changes.


    In the early days of aviation, pilots had to glance at an instrument panel to
    get information on their speed, direction, and location. Unfortunately, glancing
    down at the instrument panel means taking your eyes off the real world around
    you, even for a moment. Such brief glances away from the outside world can be
    dangerous because it takes your eyes off any possible threats or obstacles nearby.
    In war time, these obstacles could be enemy planes trying to shoot you down, while
    in peace time, these obstacles could be buildings or other planes that you need
    to avoid. That’s why modern planes offer a form of augmented reality known as
    a heads-up display (HUD) .


    A heads-up display displays flight information projected directly on the cockpit
    glass. A pilot can turn off the heads-up display to get a clean view of the outside
    world, or turn on the heads-up display to see the real world and crucial flight
    information at the same time, as shown in Figure [1-3](#469983_1_En_1_Chapter.xhtml#Fig3).


    ![../images/469983_1_En_1_Chapter/469983_1_En_1_Fig3_HTML.jpg](images/469983_1_En_1_Chapter/469983_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    An airplane heads-up display offers a more sophisticated form of augmented reality


    Unlike the fixed information displayed by a measuring cup or a rifle scope, an
    airplane’s heads-up display can display constantly changing information such as
    altitude and speed. Because heads-up displays are simply projections on a cockpit
    window, a computer can display different types of information depending on the
    pilot’s need. The ability to display dynamic, changing data and choose which type
    of data to display makes augmented reality far more useful and versatile than
    the fixed type of information displayed by crude augmented reality devices like
    a measuring cup or a hunter’s rifle scope.'
