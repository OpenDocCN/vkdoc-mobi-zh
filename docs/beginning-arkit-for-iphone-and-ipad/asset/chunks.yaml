- fmt: "# Identifying Long Press Gestures on Virtual Objects\n\nA tap gesture occurs\
    \ when the user presses a fingertip on the screen and releases it. A long press\
    \ gesture is similar except that it allows the user to press and hold one or more\
    \ fingertips on the screen, then release. You can modify four properties of a\
    \ long press gesture:\n\n*   `minimumPressDuration`—Defines how long the user\
    \ must press on the screen. The default is 0.5 seconds.\n*   `numberOfTouchesRequired`—Defines\
    \ how many fingertips the user must press on the screen. The default is 1.\n*\
    \   `numberOfTapsRequired`—Defines how many times the user must press and lift\
    \ one or more fingertips to initiate a long press gesture. The default is 0.\n\
    *   `allowableMovement`—Defines how far the user can slide one or more fingertips\
    \ to initiate a long press gesture. The default is 10 points.\n\nTo define a long\
    \ press gesture and any four properties, you just need to define a function to\
    \ handle the long press gesture and then add the long press gesture to a scene\
    \ like this:\n\n```\nlet longPressGesture = UILongPressGestureRecognizer(target:\
    \ self, action: #selector(handleLongPress))\nlongPressGesture.minimumPressDuration\
    \ = 1\nsceneView.addGestureRecognizer(longPressGesture)\n```\n\nThis code defines\
    \ the `minimumPressDuration` to 1 second but if you omit this line, then it will\
    \ use the default `minimumPressDuration` of 0.5 seconds instead. This code also\
    \ defines a function called `handleLongPress` to respond to the long press gesture,\
    \ so we need to create this function like this:\n\n```\n@objc func handleLongPress(sender:\
    \ UILongPressGestureRecognizer) {\n}\n```\n\nTo determine where the user pressed,\
    \ we need to identify the area like this:\n\n```\nlet areaPressed = sender.view\
    \ as! SCNView\nlet tappedCoordinates = sender.location(in: areaPressed)\nlet hitTest\
    \ = areaPressed.hitTest(tappedCoordinates)\n```\n\nThen we need to use the `hitTest`\
    \ function to identify if the user pressed on the box or pyramid like this:\n\n\
    ```\nif hitTest.isEmpty {\n    print (\"Nothing\")\n} else {\n    let results\
    \ = hitTest.first!\n    let name = results.node.name ?? \"background\"\n    print(\"\
    Long press on \\(name)\")\n}\n```\n\nThe entire `handleLongPress` function should\
    \ look like this:\n\n```\n@objc func handleLongPress(sender: UILongPressGestureRecognizer)\
    \ {\n    let areaPressed = sender.view as! SCNView\n    let tappedCoordinates\
    \ = sender.location(in: areaPressed)\n    let hitTest = areaPressed.hitTest(tappedCoordinates)\n\
    \    if hitTest.isEmpty {\n        print (\"Nothing\")\n    } else {\n       \
    \ let results = hitTest.first!\n        let name = results.node.name ?? \"background\"\
    \n        print(\"Long press on \\(name)\")\n    }\n}\n```\n\nAdd the `handleLongPress`\
    \ function to your `ViewController.swift` file and define the long press recognizer\
    \ like this:\n\n```\nlet longPressGesture = UILongPressGestureRecognizer(target:\
    \ self, action: #selector(handleLongPress))\nsceneView.addGestureRecognizer(longPressGesture)\n\
    ```\n\nThen to see the app run, do the following:\n\n1.  Connect an iOS device\
    \ to your Macintosh through its USB cable.\n2.  Click the Run button or choose\
    \ Product ➤ Run.\n3.  Press one finger over the box or pyramid on the screen.\
    \ Notice that the debug area in displays “Long press on box” or “Long press on\
    \ pyramid”.\n4.  Click the Stop button or choose Product ➤ Stop.\n\n## Adding\
    \ Pinch and Rotation Gestures\n\nUp until now, we’ve added gesture recognizers\
    \ programmatically by writing at least two lines of code. First, we’ve created\
    \ a constant to represent the gesture recognizer along with defining a function\
    \ to handle the gesture like this:\n\n```\nlet tapGesture = UITapGestureRecognizer(target:\
    \ self, action: #selector(handleTap))\n```\n\nSecond, we added the gesture recognizer\
    \ to the view like this:\n\n```\nsceneView.addGestureRecognizer(tapGesture)\n\
    ```\n\nA second way to add gesture recognizers to an app is to use the Object\
    \ Library and drag a gesture recognizer directly on a scene. If you click on the\
    \ Object Library and search for “gesture recognizer,” Xcode displays a list of\
    \ all available gesture recognizers, as shown in Figure 9-2.\n\n![../images/469983_1_En_9_Chapter/469983_1_En_9_Fig2_HTML.jpg](images/469983_1_En_9_Chapter/469983_1_En_9_Fig2_HTML.jpg)\n\
    \nFigure 9-2\n\nViewing a list of gesture recognizers in the Object Library window\n\
    \nDragging and dropping a gesture recognizer on to a view is equivalent to writing\
    \ code to add a gesture recognizer to a view:\n\n```\nsceneView.addGestureRecognizer(tapGesture)\n\
    ```\n\nNow if you open the Assistant Editor, you can Ctrl-drag from the gesture\
    \ recognizer to the `ViewController.swift` file. If you Ctrl-drag to create an\
    \ IBOutlet, this is equivalent to declaring a gesture recognizer like this:\n\n\
    ```\nlet tapGesture = UITapGestureRecognizer(target: self, action: #selector(handleTap))\n\
    ```\n\nOf course, every gesture recognizer needs a function that contains code\
    \ to handle the gesture, so you also need to Ctrl-drag to create an IBAction method.\
    \ By dragging and dropping a gesture recognizer on a view, you can avoid writing\
    \ code. Let’s see how this works with both the rotation and pinch gesture recognizers\
    \ by following these steps:\n\n1.  Repeat Steps 3-5, except drag and drop the\
    \ Pinch Gesture Recognizer on to the `ARSCNView` so the Pinch Gesture Recognizer\
    \ also appears in the Document Outline window.\n2.  Click the Assistant Editor\
    \ icon or choose View ➤ Assistant Editor ➤ Show Assistant Editor. Xcode displays\
    \ the Document Outline, `Main.storyboard` file, and the `ViewController.swift`\
    \ file side by side.\n3.  Click on the Rotation Gesture Recognizer in the Document\
    \ Outline and Ctrl-drag to the bottom of the `ViewController.swift` file.\n4.\
    \  Release the Control key and the left mouse button. A popup window appears.\n\
    5.  Make sure the Connection popup menu displays Action.\n6.  Click in the Name\
    \ text field and type `handleRotation`.\n7.  Click in the Type popup menu and\
    \ choose `UIRotationGestureRecognizer`.\n8.  Click the Connect button. Xcode creates\
    \ an empty IBAction method like this:\n\n    ```\n    @IBAction func handleRotation(_\
    \ sender: UIRotationGestureRecognizer) {\n    }\n    ```\n\n9.  Click on the Pinch\
    \ Gesture Recognizer in the Document Outline and Ctrl-drag to the bottom of the\
    \ `ViewController.swift` file.\n10.  Release the Control key and the left mouse\
    \ button. A popup window appears.\n11.  Make sure the Connection popup menu displays\
    \ Action.\n12.  Click in the Name text field and type `handlePinch`.\n13.  Click\
    \ in the Type popup menu and choose `UIPinchGestureRecognizer`.\n14.  Click the\
    \ Connect button. Xcode creates an empty IBAction method like this:\n\n    ```\n\
    \    @IBAction func handlePinch(_ sender: UIPinchGestureRecognizer) {\n    }\n\
    \    ```\n\n15.  Edit both functions to include a `print` statement like this:\n\
    \n    ```\n    @IBAction func handleRotation(_ sender: UIRotationGestureRecognizer)\
    \ {\n        print(\"Rotation detected\")\n    }\n    @IBAction func handlePinch(_\
    \ sender: UIPinchGestureRecognizer) {\n        print(\"Pinch detected\")\n   \
    \ }\n    ```\n\n16.  Connect an iOS device to your Macintosh through its USB cable.\n\
    17.  Click the Run button or choose Product ➤ Run.\n18.  Press two fingers on\
    \ the screen and rotate them in a circular motion. The Xcode debug area should\
    \ display “Rotation detected”.\n19.  Press two fingers on the screen and pinch\
    \ them closer together. The Xcode debug area should display “Pinch detected”."
