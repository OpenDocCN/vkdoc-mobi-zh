- fmt: '# Placing Virtual Objects on a Horizontal Plane


    One way users can interact with augmented reality is by placing virtual objects
    on horizontal planes identified in the real world, such as a floor or table top.
    This involves first detecting the horizontal plane, then placing a virtual object
    on that detected horizontal plane.


    Let’s create a new Xcode project by following these steps:


    1. Start Xcode. (Make sure you’re using Xcode 10 or greater.)

    2. Choose `File` ➤ `New` ➤ `Project`. Xcode asks you to choose a template.

    3. Click the `iOS` category.

    4. Click the `Single View App` icon and click the `Next` button. Xcode asks for
    a product name, organization name, organization identifiers, and content technology.

    5. Click in the `Product Name` text field and type a descriptive name for your
    project, such as `PlacingObjects`. (The exact name does not matter.)

    6. Click the `Next` button. Xcode asks where you want to store your project.

    7. Choose a folder and click the `Create` button. Xcode creates an iOS project.


    ## Modifying the `Info.plist` File


    Now modify the `Info.plist` file to allow access to the camera and to use ARKit
    by following these steps:


    1. Click the `Info.plist` file in the Navigator pane. Xcode displays a list of
    keys, types, and values.

    2. Click the disclosure triangle to expand the `Required Device Capabilities`
    category to display `Item 0`.

    3. Move the mouse pointer over `Item 0` to display a plus (`+`) icon.

    4. Click this plus (`+`) icon to display a blank `Item 1`.

    5. Type `arkit` under the `Value` category in the `Item 1` row.

    6. Move the mouse pointer over the last row to display a plus (`+`) icon.

    7. Click on the plus (`+`) icon to create a new row. A popup menu appears.

    8. Choose `Privacy – Camera Usage Description`.

    9. Type `AR needs to use the camera` under the `Value` category in the `Privacy –
    Camera Usage Description` row.


    ## Modifying the `ViewController.swift` File


    Now it’s time to modify the `ViewController.swift` file to use ARKit and SceneKit
    by following these steps:


    1. Click on the `ViewController.swift` file in the Navigator pane.

    2. Edit the `ViewController.swift` file so it looks like this:


    ```

    import UIKit

    import SceneKit

    import ARKit

    class ViewController: UIViewController, ARSCNViewDelegate {

    let configuration = ARWorldTrackingConfiguration()

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    }

    }

    ```


    To view augmented reality in our app, add a single ARKit SceneKit View (`ARSCNView`)
    so it fills the entire user interface.


    After you’ve designed your user interface, you need to add constraints. To add
    constraints, choose `Editor` ➤ `Resolve Auto Layout Issues` ➤ `Reset to Suggested
    Constraints` at the bottom half of the menu under the `All Views in Container`
    category.


    The next step is to connect the user interface items to the Swift code in the
    `ViewController.swift` file. To do this, follow these steps:


    1. Click the `Main.storyboard` file in the Navigator pane.

    2. Click the `Assistant Editor` icon or choose `View` ➤ `Assistant Editor` ➤ `Show
    Assistant Editor` to display the `Main.storyboard` and the `ViewController.swift`
    file side by side.

    3. Move the mouse pointer over the `ARSCNView`, hold down the `Control` key, and
    Ctrl-drag under the `class ViewController` line.

    4. Release the `Control` key and the left mouse button. A popup menu appears.

    5. Click in the `Name` text field and type `sceneView`, then click the `Connect`
    button. Xcode creates an IBOutlet as shown here:


    ```

    @IBOutlet var sceneView: ARSCNView!

    ```


    6. Edit the `viewDidLoad` function so it looks like this:


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]

    sceneView.delegate = self

    configuration.planeDetection = .horizontal

    sceneView.session.run(configuration)

    }

    ```


    ## Adding Tap Gesture Recognition


    This app currently detects horizontal planes, but we also need it to accept tap
    gestures to place a virtual object on a detected horizontal plane. To place a
    tap gesture recognizer in our app, follow these steps:


    1. Click the `ViewController.swift` file in the Navigator pane.

    2. Add the following two lines to the end of the `viewDidLoad` function:


    ```

    let tapGesture = UITapGestureRecognizer(target: self, action: #selector(tapResponse))

    sceneView.addGestureRecognizer(tapGesture)

    ```


    3. Type the following underneath the `viewDidLoad` function:


    ```

    @objc func tapResponse(sender: UITapGestureRecognizer) {

    let scene = sender.view as! ARSCNView

    let tapLocation = sender.location(in: scene)

    let hitTest = scene.hitTest(tapLocation, types: .existingPlaneUsingExtent)

    if hitTest.isEmpty{

    print ("no plane detected")

    } else {

    print("found a horizontal plane")

    }

    }

    ```


    4. Connect an iOS device to your Macintosh through its USB cable.

    5. Click the `Run` button or choose `Product` ➤ `Run`.

    6. Point your iOS device’s camera at a flat, horizontal surface until you see
    plenty of yellow feature points appearing. Then tap on the screen. The debug area
    of Xcode should display the `"found a horizontal plane"` message.

    7. Point your iOS device’s camera at a wall. Then tap on the screen. The debug
    area of Xcode should display the `"no plane detected"` message.

    8. Click the `Stop` button or choose `Product` ➤ `Stop`.


    This code shows that we can detect horizontal planes and recognize a tap gesture.
    This tap gesture will be used to place a virtual object when ARKit recognizes
    a horizontal plane. To do this, we must first modify the `tapResponse` function
    with two additional lines below the `print("found a horizontal plane")` line like
    this:


    ```

    guard let hitResult = hitTest.first else { return }

    addObject(hitResult: hitResult)

    ```


    This first `guard` line checks to make sure that the user tapped on a horizontal
    plane. Then the second line calls an `addObject` function and sends the position
    of where the user tapped.


    ## Creating the `addObject` Function


    Next, we’ll need to create an `addObject` function like this:


    ```

    func addObject(hitResult: ARHitTestResult) {

    }

    ```


    This function receives the location of the horizontal plane send by the `tapResponse`
    function. What we’ll add each time the user taps the screen on a horizontal plane
    will be an orange pyramid, so we can write the following code inside the `addObject`
    function:


    ```

    func addObject(hitResult: ARHitTestResult) {

    let objectNode = SCNNode()

    objectNode.geometry = SCNPyramid(width: 0.1, height: 0.2, length: 0.1)

    objectNode.geometry?.firstMaterial?.diffuse.contents = UIColor.orange

    }

    ```


    Finally, we need to define the position of each pyramid. The x, y, and z positions
    where the user tapped is stored in a 4x4 matrix called `worldTransform`. The x,
    y, and z positions are stored in the third column of this `worldTransform` matrix
    so the last two lines in the `addObject` function look like this:


    ```

    objectNode.position = SCNVector3(hitResult.worldTransform.columns.3.x, hitResult.worldTransform.columns.3.y,
    hitResult.worldTransform.columns.3.z)

    sceneView.scene.rootNode.addChildNode(objectNode)

    ```


    The first line retrieves the x, y, and z location of the tap on the screen, while
    the second line places the virtual object (the orange pyramid) where the user
    tapped. The entire `ViewController.swift` file should look like this.'
