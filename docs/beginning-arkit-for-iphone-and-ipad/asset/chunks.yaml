    Measuring a real-world object


    1.  Connect an iOS device to your Macintosh through its USB cable.


    2.  Click the Run button or choose Product ➤ Run.


    3.  Move the plus sign in the center of the screen to the corner or tip of the
    object you want to measure, such as a pencil, book, or table.


    4.  Tap the screen to place the first green sphere on the screen.


    5.  Move the plus sign in the center of the screen to another corner or tip of
    the object you want to measure.


    6.  Tap the screen to place the second green sphere on the screen. Your app now
    displays the distance result, as shown in Figure [13-7](#469983_1_En_13_Chapter.xhtml#Fig7).


    ## Summary


    Augmented reality combines reality with virtual objects. To create the illusion
    that virtual objects can interact with the real world, you can use occlusion.
    By displaying invisible planes that you place in the real world, occlusion can
    create the illusion that real objects like horizontal or vertical surfaces can
    actually cover and hide a virtual object. Without placing an invisible plane to
    block a user’s view, virtual objects always appear floating in mid-air no matter
    what real-world objects may seem to get in the way.


    Another way to interact with the real world is by using feature points to identify
    points in the real world. By placing virtual objects at these real points, you
    can mimic measuring the distance between two real points by using virtual objects.


    By making virtual objects appear to interact with real-world items, you can create
    more realistic augmented reality experiences for the users of your app.'
