    # 识别虚拟物体上的滑动手势


    除了检测对虚拟物体的点击外，你可能还希望允许用户在虚拟物体上滑动。滑动手势可以包含一个或多个手指向上、下、左或右移动。对于你想要检测的每种滑动手势（上、下、左、右），你都必须单独定义一个`UISwipeGestureRecognizer`，如下所示：


    ```

