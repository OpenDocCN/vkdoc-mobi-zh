- fmt: "## Drawing Shapes\n\nBy offering different geometric shapes you can customize,\
    \ ARKit makes it easy to add virtual objects to any augmented reality view. However,\
    \ what if you want to create a shape that doesn’t fit within the confines of a\
    \ common geometric shape like a box or a sphere? The simplest solution is to draw\
    \ your own shape.\n\nThe simplest type of shape to draw is a plane, which you\
    \ can create by defining two different sets of points. To draw a shape, you must\
    \ define a `BezierPath` object like this:\n\n```\nlet plane = UIBezierPath()\n\
    ```\n\nAfter creating a `BezierPath` object, the next step is to define a starting\
    \ set of x and y coordinates such as 0, 0, like this:\n\n```\nplane.move(to: CGPoint(x:\
    \ 0, y: 0))\n```\n\nRemember, these x and y coordinates don’t define the physical\
    \ position of the shape in the augmented reality view. After defining a starting\
    \ point, you can define a second set of x, y coordinates that defines a plane\
    \ like this:\n\n```\nplane.addLine(to: CGPoint(x: 0, y: 0.1))\n```\n\nThis `plane.addLine`\
    \ command tells Xcode to start drawing at the beginning x and y coordinates defined\
    \ by the `plane.move` command. Then the `plane.addLine` command draws a line 0\
    \ that points along the x-axis and 0.1 distance that points along the y-axis.\n\
    \nFinally, you need to define the shape as an `SCNShape` object, which also specifies\
    \ how thick to make the shape along the z-axis, known as the extrusion depth.\
    \ To do this, you define the shape name along with its extrusion depth like this:\n\
    \n```\nlet customShape = SCNShape(path: plane, extrusionDepth: 0.1)\n```\n\nAfter\
    \ creating a custom shape, the final step is to assign this shape to a node and\
    \ display this node at specific x, y, and z coordinates like this:\n\n```\nlet\
    \ node = SCNNode()\nnode.geometry = customShape\nnode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.yellow\nnode.position = SCNVector3(0,0,0)\nsceneView.scene.rootNode.addChildNode(node)\n\
    ```\n\nThis code creates a yellow plane that extends 0.1 points along the z-axis,\
    \ rises 0.1 points up on the y-axis, and doesn’t extend at all along the x-axis,\
    \ as shown in Figure 4-12.\n\n![../images/469983_1_En_4_Chapter/469983_1_En_4_Fig12_HTML.jpg](images/469983_1_En_4_Chapter/469983_1_En_4_Fig12_HTML.jpg)\n\
    \n**Figure 4-12**  \nDisplaying a plane defined by its distance along the x-,\
    \ y-, and z-axes\n\nBy adding multiple `addLine` commands, you can define additional\
    \ planes on a custom shape. To see how to create a wedge shape, follow these steps:\n\
    \n![../images/469983_1_En_4_Chapter/469983_1_En_4_Fig13_HTML.jpg](images/469983_1_En_4_Chapter/469983_1_En_4_Fig13_HTML.jpg)\n\
    \n**Figure 4-13**  \nTwo `addLine` commands help define a wedge shape\n\n1. Use\
    \ the Xcode project that displayed a texture over a geometric shape.\n2. Click\
    \ on the `ViewController.swift` file in the Navigator pane.\n3. Edit the `showShape`\
    \ function so the entire `ViewController.swift` file looks like this:\n\n```\n\
    import UIKit\nimport SceneKit\nimport ARKit\nclass ViewController: UIViewController,\
    \ ARSCNViewDelegate {\n    @IBOutlet var sceneView: ARSCNView!\n    @IBOutlet\
    \ var Xslider: UISlider!\n    @IBOutlet var Yslider: UISlider!\n    @IBOutlet\
    \ var Zslider: UISlider!\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
    \ any additional setup after loading the view, typically from a nib.\n       \
    \ sceneView.delegate = self\n        sceneView.showsStatistics = true\n      \
    \  sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    }\n    override func viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
    \        sceneView.session.run(configuration)\n    }\n    @IBAction func addButton(_\
    \ sender: UIButton) {\n        showShape()\n    }\n    @IBAction func resetButton(_\
    \ sender: UIButton) {\n        sceneView.session.pause()\n        sceneView.scene.rootNode.enumerateChildNodes\
    \ { (node, _) in\n            if node.name == \"shape\" {\n                node.removeFromParentNode()\n\
    \            }\n        }\n        sceneView.session.run(configuration, options:\
    \ [.resetTracking, .removeExistingAnchors])\n    }\n    func showShape() {\n \
    \       let plane = UIBezierPath()\n        plane.move(to: CGPoint(x: 0, y: 0))\n\
    \        plane.addLine(to: CGPoint(x: 0.1, y: 0.1))\n        plane.addLine(to:\
    \ CGPoint(x: 0.1, y: -0.03))\n        let customShape = SCNShape(path: plane,\
    \ extrusionDepth: 0.1)\n        let node = SCNNode()\n        node.geometry =\
    \ customShape\n        node.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n\
    \        node.position = SCNVector3(Xslider.value,Yslider.value,Zslider.value)\n\
    \        node.name = \"shape\"\n        sceneView.scene.rootNode.addChildNode(node)\n\
    \    }\n}\n```\n\n4. Connect an iOS device to your Macintosh through its USB cable.\n\
    5. Click the `Run` button or choose `Product` ➤ `Run`.\n6. Tap the `Add` button\
    \ when the app runs. A yellow wedge appears, as shown in Figure 4-13.\n7. Click\
    \ the `Stop` button or choose `Product` ➤ `Stop`.\n\nThe first `addLine` command\
    \ defined the left side of the wedge and the second `addLine` command defined\
    \ the right side of the wedge:\n\n```\nplane.addLine(to: CGPoint(x: 0.1, y: 0.1))\n\
    plane.addLine(to: CGPoint(x: 0.1, y: -0.03))\n```\n\nBy using as many `addLine`\
    \ commands as you wish, you can define your own custom three-dimensional shapes\
    \ that can’t be created by common geometric shapes like spheres, boxes, or cones.\n\
    \n## Summary\n\nBesides displaying 3D images, ARKit can also display geometric\
    \ shapes in an augmented reality view. Some common geometric shapes include boxes,\
    \ spheres, planes, and cylinders. By specifying dimensions and positions, you\
    \ can make a geometric shape appear anywhere.\n\nAfter defining the dimensions\
    \ of a geometric shape, you can modify its appearance by choosing different colors\
    \ for its surface. For more variety, you can also apply different texture images\
    \ to cover the surfaces of any geometric shapes you create.\n\nIn case no geometric\
    \ shape matches what you need, you can draw individual lines to create your own\
    \ virtual objects to display in an augmented reality view. By drawing lines and\
    \ combining multiple geometric shapes, you can create custom shapes limited only\
    \ by your imagination.\n\nColors and textures can give your geometric shapes a\
    \ distinctive appearance. In the next chapter, we learn other ways to alter the\
    \ appearance of virtual objects using different lighting sources.\n\n# 5. Working\
    \ with Lights\n\nThe simplest way to alter the appearance of a virtual object\
    \ is to change its color or texture. However, a more subtle way to alter the appearance\
    \ of virtual objects is to change the lighting source. Think of a typical studio\
    \ that lets a photographer place one or more lights in different positions around\
    \ a subject. These lights can be bright or dim, and shine at different intensities\
    \ and colors to highlight an object in different ways.\n\nAugmented reality is\
    \ no different. To highlight virtual objects in an augmented reality view, you\
    \ can place one or more light sources at specific x, y, and z coordinates. In\
    \ addition, you can also define different types of light sources, such as direction,\
    \ ambient, or spot to create unique visual effects, as shown in Figure 5-1.\n\n\
    ![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig1_HTML.jpg](images/469983_1_En_5_Chapter/469983_1_En_5_Fig1_HTML.jpg)\n\
    \n**Figure 5-1**  \nDifferent light types available\n\nBy adding light and customizing\
    \ the appearance of light through color, intensity, and temperature, you can illuminate\
    \ virtual objects in unique ways within an augmented reality view."
  raw: "## Drawing Shapes\n\nBy offering different geometric shapes you can customize,\
    \ ARKit makes it easy to add virtual objects to any augmented reality view. However,\
    \ what if you want to create a shape that doesn’t fit within the confines of a\
    \ common geometric shape like a box or a sphere? The simplest solution is to draw\
    \ your own shape.\n\nThe simplest type of shape to draw is a plane, which you\
    \ can create by defining two different sets of points. To draw a shape, you must\
    \ define a `BezierPath` object like this:\n\n```\nlet plane = UIBezierPath()\n\
    ```\n\nAfter creating a `BezierPath` object, the next step is to define a starting\
    \ set of x and y coordinates such as 0, 0, like this:\n\n```\nplane.move(to: CGPoint(x:\
    \ 0, y: 0))\n```\n\nRemember, these x and y coordinates don’t define the physical\
    \ position of the shape in the augmented reality view. After defining a starting\
    \ point, you can define a second set of x, y coordinates that defines a plane\
    \ like this:\n\n```\nplane.addLine(to: CGPoint(x: 0, y: 0.1))\n```\n\nThis `plane.addLine`\
    \ command tells Xcode to start drawing at the beginning x and y coordinates defined\
    \ by the `plane.move` command. Then the `plane.addLine` command draws a line 0\
    \ that points along the x-axis and 0.1 distance that points along the y-axis.\n\
    \nFinally, you need to define the shape as an `SCNShape` object, which also specifies\
    \ how thick to make the shape along the z-axis, known as the extrusion depth.\
    \ To do this, you define the shape name along with its extrusion depth like this:\n\
    \n```\nlet customShape = SCNShape(path: plane, extrusionDepth: 0.1)\n```\n\nAfter\
    \ creating a custom shape, the final step is to assign this shape to a node and\
    \ display this node at specific x, y, and z coordinates like this:\n\n```\nlet\
    \ node = SCNNode()\nnode.geometry = customShape\nnode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.yellow\nnode.position = SCNVector3(0,0,0)\nsceneView.scene.rootNode.addChildNode(node)\n\
    ```\n\nThis code creates a yellow plane that extends 0.1 points along the z-axis,\
    \ rises 0.1 points up on the y-axis, and doesn’t extend at all along the x-axis,\
    \ as shown in Figure [4-12](#469983_1_En_4_Chapter.xhtml#Fig12).\n\n![../images/469983_1_En_4_Chapter/469983_1_En_4_Fig12_HTML.jpg](images/469983_1_En_4_Chapter/469983_1_En_4_Fig12_HTML.jpg)\n\
    \nFigure 4-12\n\nDisplaying a plane defined by its distance along the x-, y-,\
    \ and z-axes\n\nBy adding multiple `addLine` commands , you can define additional\
    \ planes on a custom shape. To see how to create a wedge shape, follow these steps:\n\
    \n![../images/469983_1_En_4_Chapter/469983_1_En_4_Fig13_HTML.jpg](images/469983_1_En_4_Chapter/469983_1_En_4_Fig13_HTML.jpg)\n\
    \nFigure 4-13\n\nTwo addLine commands help define a wedge shape\n\n1.  Use the\
    \ Xcode project that displayed a texture over a geometric shape.\n\n2.  Click\
    \ on the `ViewController.swift` file in the Navigator pane.\n\n3.  Edit the `showShape`\
    \ function so the entire `ViewController.swift` file looks like this:\n\n```\n\
    \    import UIKit\n    import SceneKit\n    import ARKit\n    class ViewController:\
    \ UIViewController, ARSCNViewDelegate {\n    @IBOutlet var sceneView: ARSCNView!\n\
    \    @IBOutlet var Xslider: UISlider!\n    @IBOutlet var Yslider: UISlider!\n\
    \    @IBOutlet var Zslider: UISlider!\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    override func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n    sceneView.delegate\
    \ = self\n    sceneView.showsStatistics = true\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
    \ ARSCNDebugOptions.showFeaturePoints]\n    }\n    override func viewWillAppear(_\
    \ animated: Bool) {\n    super.viewWillAppear(animated)\n    sceneView.session.run(configuration)\n\
    \    }\n    @IBAction func addButton(_ sender: UIButton) {\n    showShape()\n\
    \    }\n    @IBAction func resetButton(_ sender: UIButton) {\n    sceneView.session.pause()\n\
    \    sceneView.scene.rootNode.enumerateChildNodes { (node, _) in\n    if node.name\
    \ == \"shape\" {\n    node.removeFromParentNode()\n    }\n    }\n    sceneView.session.run(configuration,\
    \ options: [.resetTracking, .removeExistingAnchors])\n    }\n    func showShape()\
    \ {\n    let plane = UIBezierPath()\n    plane.move(to: CGPoint(x: 0, y: 0))\n\
    \    plane.addLine(to: CGPoint(x: 0.1, y: 0.1))\n    plane.addLine(to: CGPoint(x:\
    \ 0.1, y: -0.03))\n    let customShape = SCNShape(path: plane, extrusionDepth:\
    \ 0.1)\n    let node = SCNNode()\n    node.geometry = customShape\n    node.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.yellow\n    node.position = SCNVector3(Xslider.value,Yslider.value,Zslider.value)\n\
    \    node.name = \"shape\"\n    sceneView.scene.rootNode.addChildNode(node)\n\
    \    }\n    }\n    ```\n\n4.  Connect an iOS device to your Macintosh through\
    \ its USB cable.\n\n5.  Click the Run button or choose Product ➤ Run.\n\n6.  Tap\
    \ the Add button when the app runs. A yellow wedge appears, as shown in Figure\
    \ [4-13](#469983_1_En_4_Chapter.xhtml#Fig13).\n\n7.  Click the Stop button or\
    \ choose Product ➤ Stop.\n\nThe first `addLine` command defined the left side\
    \ of the wedge and the second `addLine` command defined the right side of the\
    \ wedge:\n\n```\nplane.addLine(to: CGPoint(x: 0.1, y: 0.1))\nplane.addLine(to:\
    \ CGPoint(x: 0.1, y: -0.03))\n```\n\nBy using as many `addLine` commands as you\
    \ wish, you can define your own custom three-dimensional shapes that can’t be\
    \ created by common geometric shapes like spheres, boxes, or cones.\n\n## Summary\n\
    \nBesides displaying 3D images, ARKit can also display geometric shapes in an\
    \ augmented reality view. Some common geometric shapes include boxes, spheres,\
    \ planes, and cylinders. By specifying dimensions and positions, you can make\
    \ a geometric shape appear anywhere.\n\nAfter defining the dimensions of a geometric\
    \ shape, you can modify its appearance by choosing different colors for its surface.\
    \ For more variety, you can also apply different texture images to cover the surfaces\
    \ of any geometric shapes you create.\n\nIn case no geometric shape matches what\
    \ you need, you can draw individual lines to create your own virtual objects to\
    \ display in an augmented reality view. By drawing lines and combining multiple\
    \ geometric shapes, you can create custom shapes limited only by your imagination.\n\
    \nColors and textures can give your geometric shapes a distinctive appearance.\
    \ In the next chapter, we learn other ways to alter the appearance of virtual\
    \ objects using different lighting sources.\n\n# 5. Working with Lights\n\nThe\
    \ simplest way to alter the appearance of a virtual object is to change its color\
    \ or texture. However, a more subtle way to alter the appearance of virtual objects\
    \ is to change the lighting source. Think of a typical studio that lets a photographer\
    \ place one or more lights in different positions around a subject. These lights\
    \ can be bright or dim, and shine at different intensities and colors to highlight\
    \ an object in different ways.\n\nAugmented reality is no different. To highlight\
    \ virtual objects in an augmented reality view, you can place one or more light\
    \ sources at specific x, y, and z coordinates. In addition, you can also define\
    \ different types of light sources, such as direction, ambient, or spot to create\
    \ unique visual effects, as shown in Figure [5-1](#469983_1_En_5_Chapter.xhtml#Fig1).\n\
    \n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig1_HTML.jpg](images/469983_1_En_5_Chapter/469983_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1\n\nDifferent light types available\n\nBy adding light and customizing\
    \ the appearance of light through color, intensity, and temperature, you can illuminate\
    \ virtual objects in unique ways within an augmented reality view."
  trans: "\n## 绘制形状\n\n通过提供可自定义的不同几何形状，ARKit 可以轻松地将虚拟对象添加到任何增强现实视图中。然而，如果您想要创建一个不适合常见几何形状（如盒子或球体）范围的自定义形状，该怎么办？最简单的解决方案是绘制您自己的形状。\n\
    \n最简单的形状类型是平面，您可以通过定义两组不同的点来创建。要绘制一个形状，必须定义一个 `BezierPath` 对象，如下所示：\n\n```\nlet\
    \ plane = UIBezierPath()\n```\n\n创建 `BezierPath` 对象后，下一步是定义一组起始的 x 和 y 坐标，例如 0,\
    \ 0，如下所示：\n\n```\nplane.move(to: CGPoint(x: 0, y: 0))\n```\n\n请记住，这些 x 和 y 坐标并不定义形状在增强现实视图中的物理位置。定义了起点之后，您可以定义第二组\
    \ x, y 坐标来定义一个平面，如下所示：\n\n```\nplane.addLine(to: CGPoint(x: 0, y: 0.1))\n```\n\
    \n这条 `plane.addLine` 命令告诉 Xcode 从 `plane.move` 命令定义的起始 x 和 y 坐标开始绘制。然后 `plane.addLine`\
    \ 命令绘制一条线，该线沿 x 轴延伸 0 个点，沿 y 轴延伸 0.1 个点。\n\n最后，您需要将形状定义为一个 `SCNShape` 对象，该对象还指定了形状沿\
    \ z 轴的厚度，称为*挤出深度*。为此，您需要定义形状名称及其挤出深度，如下所示：\n\n```\nlet customShape = SCNShape(path:\
    \ plane, extrusionDepth: 0.1)\n```\n\n创建自定义形状后，最后一步是将此形状分配给一个节点，并在特定的 x、y 和 z\
    \ 坐标处显示该节点，如下所示：\n\n```\nlet node = SCNNode()\nnode.geometry = customShape\nnode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.yellow\nnode.position = SCNVector3(0,0,0)\nsceneView.scene.rootNode.addChildNode(node)\n\
    ```\n\n此代码创建了一个沿 z 轴延伸 0.1 个点、沿 y 轴向上延伸 0.1 个点且完全不沿 x 轴延伸的黄色平面，如图 4-12 所示。\n\n\
    ![../images/469983_1_En_4_Chapter/469983_1_En_4_Fig12_HTML.jpg](img/469983_1_En_4_Fig12_HTML.jpg)\n\
    \n**图 4-12**  \n显示一个由其沿 x、y、z 轴的距离定义的平面\n\n通过添加多个 `addLine` 命令，您可以在自定义形状上定义额外的平面。要了解如何创建楔形形状，请按照以下步骤操作：\n\
    \n![../images/469983_1_En_4_Chapter/469983_1_En_4_Fig13_HTML.jpg](img/469983_1_En_4_Fig13_HTML.jpg)\n\
    \n**图 4-13**  \n两个 `addLine` 命令有助于定义楔形形状\n\n1.  使用在几何形状上显示纹理的 Xcode 项目。\n2.  在导航器窗格中单击\
    \ `ViewController.swift` 文件。\n3.  编辑 `showShape` 函数，使整个 `ViewController.swift`\
    \ 文件看起来像这样：\n\n```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController:\
    \ UIViewController, ARSCNViewDelegate {\n    @IBOutlet var sceneView: ARSCNView!\n\
    \    @IBOutlet var Xslider: UISlider!\n    @IBOutlet var Yslider: UISlider!\n\
    \    @IBOutlet var Zslider: UISlider!\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
    \ any additional setup after loading the view, typically from a nib.\n       \
    \ sceneView.delegate = self\n        sceneView.showsStatistics = true\n      \
    \  sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    }\n    override func viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
    \        sceneView.session.run(configuration)\n    }\n    @IBAction func addButton(_\
    \ sender: UIButton) {\n        showShape()\n    }\n    @IBAction func resetButton(_\
    \ sender: UIButton) {\n        sceneView.session.pause()\n        sceneView.scene.rootNode.enumerateChildNodes\
    \ { (node, _) in\n            if node.name == \"shape\" {\n                node.removeFromParentNode()\n\
    \            }\n        }\n        sceneView.session.run(configuration, options:\
    \ [.resetTracking, .removeExistingAnchors])\n    }\n    func showShape() {\n \
    \       let plane = UIBezierPath()\n        plane.move(to: CGPoint(x: 0, y: 0))\n\
    \        plane.addLine(to: CGPoint(x: 0.1, y: 0.1))\n        plane.addLine(to:\
    \ CGPoint(x: 0.1, y: -0.03))\n        let customShape = SCNShape(path: plane,\
    \ extrusionDepth: 0.1)\n        let node = SCNNode()\n        node.geometry =\
    \ customShape\n        node.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n\
    \        node.position = SCNVector3(Xslider.value,Yslider.value,Zslider.value)\n\
    \        node.name = \"shape\"\n        sceneView.scene.rootNode.addChildNode(node)\n\
    \    }\n}\n```\n\n4.  通过 USB 线将 iOS 设备连接到您的 Macintosh。\n5.  单击 `Run` 按钮或选择 `Product`\
    \ ➤ `Run`。\n6.  当应用程序运行时，点击 `Add` 按钮。将出现一个黄色楔形，如图 4-13 所示。\n7.  单击 `Stop` 按钮或选择\
    \ `Product` ➤ `Stop`。\n\n第一个 `addLine` 命令定义了楔形的左侧，第二个 `addLine` 命令定义了楔形的右侧：\n\n\
    ```\nplane.addLine(to: CGPoint(x: 0.1, y: 0.1))\nplane.addLine(to: CGPoint(x:\
    \ 0.1, y: -0.03))\n```\n\n通过使用任意数量的 `addLine` 命令，您可以定义自己的自定义三维形状，这些形状无法通过球体、盒子或圆锥体等常见几何形状创建。\n\
    \n## 总结\n\n除了显示 3D 图像，ARKit 还可以在增强现实视图中显示几何形状。一些常见的几何形状包括盒子、球体、平面和圆柱体。通过指定尺寸和位置，您可以让几何形状出现在任何地方。\n\
    \n定义了几何形状的尺寸后，您可以通过为其表面选择不同的颜色来修改其外观。为了获得更多变化，您还可以应用不同的纹理图像来覆盖您创建的任何几何形状的表面。\n\
    \n如果没有几何形状符合您的需求，您可以绘制单独的线条来创建自己的虚拟对象，以显示在增强现实视图中。通过绘制线条并结合多个几何形状，您可以创造出仅受想象力限制的自定义形状。\n\
    \n颜色和纹理可以让您的几何形状具有独特的外观。在下一章中，我们将学习使用不同光源改变虚拟对象外观的其他方法。\n\n# 5. 处理光照\n\n改变虚拟对象外观的最简单方法是改变其颜色或纹理。然而，改变虚拟对象外观的一个更微妙的方法是改变光源。想象一下一个典型的摄影棚，摄影师可以将一个或多个灯放置在拍摄对象周围的不同位置。这些灯可以明亮或暗淡，并以不同的强度和颜色照射，以不同的方式突出对象。\n\
    \n增强现实也是如此。为了在增强现实视图中突出虚拟对象，您可以在特定的 x、y 和 z 坐标处放置一个或多个光源。此外，您还可以定义不同类型的光源，例如方向光、环境光或聚光灯，以创建独特的视觉效果，如图\
    \ 5-1 所示。\n\n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig1_HTML.jpg](img/469983_1_En_5_Fig1_HTML.jpg)\n\
    \n**图 5-1**  \n可用的不同光照类型\n\n通过添加光照并通过颜色、强度和色温自定义光照的外观，您可以在增强现实视图中以独特的方式照亮虚拟对象。\n"
- fmt: "## Using Color, Intensity, and Temperature\n\nColor light can illuminate virtual\
    \ objects in different ways, especially if the virtual objects display their own\
    \ colors. While color is an obvious way to change a light, two other ways to change\
    \ the appearance of light involve temperature and intensity.\n\nTemperature works\
    \ by multiplying the color value by a color corresponding to the light’s temperature.\
    \ The default value of `6500` represents a pure white light, while lower values\
    \ (down to a minimum of zero) add a “warmer” yellow or orange effect to the light\
    \ source. On the other hand, higher values (up to a maximum of `40000`) add a\
    \ “cooler” blue effect.\n\nIntensity modifies light by brightening or dimming\
    \ the light where a value of `1000` leaves the light unaffected. Lower values\
    \ dim the light while higher values brighten the light.\n\nTo learn how to use\
    \ light to modify the appearance of virtual objects, let’s start by creating a\
    \ new Xcode project by following these steps:\n\n1. Start Xcode. (Make sure you’re\
    \ using Xcode 10 or greater.)\n2. Choose `File` ➤ `New` ➤ `Project`. Xcode asks\
    \ you to choose a template.\n3. Click the iOS category.\n4. Click the Single View\
    \ App icon and click the Next button. Xcode asks for a product name, organization\
    \ name, organization identifiers, and content technology.\n5. Click in the Product\
    \ Name text field and type a descriptive name for your project, such as `Light\
    \ Sources`. (The exact name does not matter.)\n6. Click the Next button. Xcode\
    \ asks where you want to store your project.\n7. Choose a folder and click the\
    \ Create button. Xcode creates an iOS project.\n\nNow modify the `Info.plist`\
    \ file to allow access to the camera and to use ARKit by following these steps:\n\
    \n1. Click the `Info.plist` file in the Navigator pane. Xcode displays a list\
    \ of keys, types, and values.\n2. Click the disclosure triangle to expand the\
    \ Required Device Capabilities category to display Item 0.\n3. Move the mouse\
    \ pointer over Item 0 to display a plus (`+`) icon.\n4. Click this plus (`+`)\
    \ icon to display a blank Item 1.\n5. Type `arkit` under the Value category in\
    \ the Item 1 row.\n6. Move the mouse pointer over the last row to display a plus\
    \ (`+`) icon.\n7. Click on the plus (`+`) icon to create a new row. A popup menu\
    \ appears.\n8. Choose `Privacy – Camera Usage Description`.\n9. Type `AR needs\
    \ to use the camera` under the Value category in the `Privacy – Camera Usage Description`\
    \ row.\n\nNow it’s time to modify the `ViewController.swift` file to use ARKit\
    \ and SceneKit by following these steps:\n\n1. Click on the `ViewController.swift`\
    \ file in the Navigator pane.\n2. Edit the `ViewController.swift` file so it looks\
    \ like this:\n\n```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController:\
    \ UIViewController, ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
    \ any additional setup after loading the view, typically from a nib.\n    }\n\
    }\n```\n\nTo view augmented reality in our app, we need to add the following objects\
    \ to the `Main.storyboard` user interface:\n\n*   One ARKit SceneKit View (`ARSCNView`)—For\
    \ displaying augmented reality with the camera view\n*   Two `UISliders`—For controlling\
    \ the temperature and intensity of the light\n*   Two `UILabels`—For identifying\
    \ the purpose of each slider\n*   Five `UIButtons`—For choosing different colors\
    \ for the light\n\nTo design the user interface, click on the `Main.storyboard`\
    \ file in the Navigator pane and click on the Object Library button to open the\
    \ Object Library. Then drag and drop the different user interface items on to\
    \ the user interface. The user interface should eventually look similar to Figure\
    \ [5-2](#469983_1_En_5_Chapter.xhtml#Fig2).\n\n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig2_HTML.jpg](images/469983_1_En_5_Chapter/469983_1_En_5_Fig2_HTML.jpg)\n\
    \n**Figure 5-2** Designing the user interface"
