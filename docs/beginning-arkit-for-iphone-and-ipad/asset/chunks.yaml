    \ [10-5] 所示。\n\n![../images/469983_1_En_10_Chapter/469983_1_En_10_Fig5_HTML.jpg](img/469983_1_En_10_Fig5_HTML.jpg)\n\
    \n图 10-5\n使用旋转手势旋转虚拟平面\n\n# 使用平移手势移动虚拟对象\n\n平移手势发生在用户用一个手指在屏幕上沿任意方向滑动时。你可以为平移手势定义最少和最多的手指数量，例如至少两个但不超过四个。默认情况下，检测平移手势的最少手指数量是\
    \ 1。\n\nXcode 提供两种类型的平移手势识别器。我们将使用的那个简称为“平移手势识别器”，它检测屏幕上任意位置的手指移动。另一个平移手势识别器称为“屏幕边缘平移手势识别器”。如果你曾经从\
    \ iPhone 屏幕底部向上滑动以显示诸如将 iPhone 变为手电筒之类的选项，那么你就使用了屏幕边缘平移手势识别器，它检测从屏幕边缘开始的平移。\n\n\
    要在我们的应用中放置一个常规的平移手势识别器，请按照以下步骤操作：\n\n1.  从对象库窗口拖动“平移手势识别器”并将其放到用户界面上的 `ARSCNView`\
    \ 上。虽然你将平移手势识别器拖放到了用户界面上，但除了在文档大纲中，你在任何地方都看不到它的任何迹象。\n2.  单击“助理编辑器”图标或选择“查看”➤“助理编辑器”➤“显示助理编辑器”，以并排显示\
    \ `Main.storyboard` 和 `ViewController.swift` 文件。\n3.  将鼠标指针移动到文档大纲中的“平移手势识别器”上，按住\
    \ Control 键，并按住 Control 键拖动到 `ViewController.swift` 文件底部最后一个大括号上方。\n4.  释放 Control\
    \ 键和鼠标左键。会出现一个弹出菜单。\n5.  确保“连接”弹出菜单显示“操作”。\n6.  在“名称”文本字段中单击并输入 `panGesture`。\n\
    7.  单击“类型”弹出菜单并选择 `UIPanGestureRecognizer`。然后单击“连接”按钮。Xcode 将创建一个 `IBAction` 方法，如下所示：\n\
    \    ```\n    @IBAction func panGesture(_ sender: UIPanGestureRecognizer) {\n\
    \    }\n    ```\n8.  按如下方式编辑这个 `IBAction` 方法 `panGesture`：\n    ```\n    @IBAction\
    \ func panGesture(_ sender: UIPanGestureRecognizer) {\n        print (\"Pan gesture\"\
    )\n    }\n    ```\n9.  通过 USB 电缆将 iOS 设备连接到你的 Macintosh。\n10. 单击“运行”按钮或选择“产品”➤“运行”。\n\
    11. 将一个手指放在屏幕上并在屏幕上滑动。Xcode 调试区域应显示“Pan Gesture”，让你知道它已成功检测到平移手势。\n12. 单击“停止”按钮或选择“产品”➤“停止”。\n\
    \n![../images/469983_1_En_10_Chapter/469983_1_En_10_Fig6_HTML.jpg](img/469983_1_En_10_Fig6_HTML.jpg)\n\
    \n图 10-6\n在对象库窗口中查找平移手势识别器\n\n1.  在导航窗格中单击 `Main.storyboard` 文件。\n2.  单击“对象库”图标以显示对象库窗口。\n\
    3.  在对象库中输入 `pan`。对象库会显示平移手势识别器，如图 [10-6] 所示。\n\n一旦我们确认平移手势有效，第一步是识别用户是否在增强现实视图中平移虚拟平面。我们需要获取用户平移经过的视图位置，并使用\
    \ `hitTest` 方法来验证用户的指尖是否在虚拟对象上：\n\n```\nlet areaPanned = sender.view as? SCNView\n\
    let location = sender.location(in: areaPanned)\nlet hitTestResults = areaPanned?.hitTest(location,\
    \ options: nil)\n```\n\n接下来，我们必须确定用户是否触摸了第一个节点（虚拟平面）：\n\n```\nif let hitTest =\
    \ hitTestResults?.first {\n}\n```\n"
- fmt: "# 11. 平面检测\n\n将虚拟对象悬空放置是可以的，但增强现实在与现实世界互动时效果最佳。增强现实与现实世界互动的最基本方式之一是通过检测水平或垂直平面。当\
    \ ARKit 能检测到一个平坦表面时，它就可以随后放置一个虚拟对象，使其看起来像是放置在那个真实的平坦表面上，例如桌子或地板。\n\n每当 ARKit 检测到一个平面时，它就会在该增强现实视图中放置一个锚点。每个平面对应一个锚点，其中包含关于该平面的信息：\n\
    \n*   方向\n*   位置\n*   大小\n\n当你移动 iOS 设备上的摄像头时，ARKit 会不断更新关于平面的信息。通常，这涉及到认识到一个平面可能比最初认为的要大。例如，当你首次将\
    \ iOS 设备的摄像头对准地板时，ARKit 只能识别摄像头看到的那部分地板。当你移动 iOS 设备的摄像头时，ARKit 可以检测到地板的其它部分，迫使其更新关于该平面实际可能有多大的信息。\n\
    \n在本章中，让我们按照以下步骤创建一个新的 Xcode 项目：\n\n1.  启动 Xcode。（请确保你使用的是 Xcode 10 或更高版本。）\n\
    2.  选择 `File` ➤ `New` ➤ `Project`。Xcode 会要求你选择一个模板。\n3.  点击 `iOS` 类别。\n4.  点击\
    \ `Single View App` 图标，然后点击 `Next` 按钮。Xcode 会要求输入产品名称、组织名称、组织标识符和内容技术。\n5.  点击\
    \ `Product Name` 文本字段，并为你的项目输入一个描述性名称，例如 `PlaneDetection`。（确切的名称无关紧要。）\n6.  点击\
    \ `Next` 按钮。Xcode 会询问你想将项目存储在哪里。\n7.  选择一个文件夹并点击 `Create` 按钮。Xcode 会创建一个 iOS 项目。\n\
    \n现在，按照以下步骤修改 `Info.plist` 文件以允许访问摄像头并使用 ARKit：\n\n1.  点击导航器窗格中的 `Info.plist`\
    \ 文件。Xcode 会显示一个键、类型和值的列表。\n2.  点击展开三角形以展开 `Required Device Capabilities` 类别，显示\
    \ `Item 0`。\n3.  将鼠标指针悬停在 `Item 0` 上，会显示一个加号（`+`）图标。\n4.  点击这个加号（`+`）图标，显示一个空白的\
    \ `Item 1`。\n5.  在 `Item 1` 行的 `Value` 类别下输入 `arkit`。\n6.  将鼠标指针悬停在最后一行上，会显示一个加号（`+`）图标。\n\
    7.  点击加号（`+`）图标以创建一个新行。会出现一个弹出菜单。\n8.  选择 `Privacy - Camera Usage Description`。\n\
    9.  在 `Privacy - Camera Usage Description` 行的 `Value` 类别下输入 `AR needs to use the\
    \ camera`。\n\n现在，是时候按照以下步骤修改 `ViewController.swift` 文件以使用 ARKit 和 SceneKit 了：\n\
    \n1.  点击导航器窗格中的 `ViewController.swift` 文件。\n2.  编辑 `ViewController.swift` 文件，使其看起来像这样：\n\
    \n```\nimport UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController: UIViewController,\
    \ ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
    \ any additional setup after loading the view, typically from a nib.\n    }\n\
    }\n```\n\n为了在我们的应用中查看增强现实，添加一个 ARKit SceneKit 视图（`ARSCNView`），使用户界面看起来类似于图 [11-1](#469983_1_En_11_Chapter.xhtml#Fig1)。\n\
    \n![../images/469983_1_En_11_Chapter/469983_1_En_11_Fig1_HTML.jpg](images/469983_1_En_11_Chapter/469983_1_En_11_Fig1_HTML.jpg)\n\
    \n图 11-1 用户界面包含一个单独的 ARSCNView\n\n设计好用户界面后，需要添加约束。要添加约束，请在 `Editor` ➤ `Resolve\
    \ Auto Layout Issues` ➤ `Reset to Suggested Constraints` 菜单的底部（位于 `All Views in\
    \ Container` 类别下）选择。\n\n下一步是将用户界面项连接到 `ViewController.swift` 文件中的 Swift 代码。为此，请按照以下步骤操作：\n\
    \n1.  点击导航器窗格中的 `Main.storyboard` 文件。"
  raw: "Once we know that the user touched the virtual plane, we need to create a\
    \ “plane” constant that represents the virtual plan’s parent node. A virtual object\
    \ can consist of multiple nodes daisy-chained together to create the illusion\
    \ of a single item. To move a virtual object, we need to move the parent node\
    \ because this will automatically move any attached nodes. So we need an additional\
    \ `if let` statement like this:\n\n```\nif let hitTest = hitTestResults?.first\
    \ {\nif let plane = hitTest.node.parent {\n}\n}\n```\n\nFinally, we need to detect\
    \ when the pan gesture is occurring. This happens when the pan gesture state is\
    \ equal to `.changed`, so we need a final `if` statement inside like this:\n\n\
    ```\nif let hitTest = hitTestResults?.first {\nif let plane = hitTest.node.parent\
    \ {\nif sender.state == .changed {\n}\n}\n}\n```\n\nInside all of these multiple\
    \ `if` statements, we need to get the translation property from the pan gesture,\
    \ which defines how far the user has moved a fingertip across the screen. Because\
    \ a screen is a flat, two-dimensional surface, we can only track movement across\
    \ the x-axis and y-axis.\n\n```\nlet translate = sender.translation(in: areaPanned)\n\
    ```\n\nAfter getting the translation movement from the pan gesture, we can finally\
    \ apply this translation movement to the virtual object itself:\n\n```\nplane.localTranslate(by:\
    \ SCNVector3(translate.x/10000,-translate.y/10000,0.0))\n```\n\nThis code applies\
    \ the translation from the pan gesture in the x and y directions to the virtual\
    \ plane. Since we can’t detect any pan gesture on the z-axis, we won’t translate\
    \ in any direction along the z-axis, so the z value of the `SCNVector3` is 0.0.\n\
    \nBoth the `translate.x` and `translate.y` values are divided by 10000 as an arbitrary\
    \ value. Without dividing the `translate.x` or `translate.y` values by a large\
    \ number, the actual movement of the virtual plane will appear choppy. Large values\
    \ such as 10000 force the movement to occur more smoothly. Experiment with lower\
    \ values to see how they create a choppy movement of the virtual plane when the\
    \ user slides a fingertip across the screen.\n\nThe entire `panGesture` IBAction\
    \ method should look like this:\n\n```\n@IBAction func panGesture(_ sender: UIPanGestureRecognizer)\
    \ {\nlet areaPanned = sender.view as? SCNView\nlet location = sender.location(in:\
    \ areaPanned)\nlet hitTestResults = areaPanned?.hitTest(location, options: nil)\n\
    if let hitTest = hitTestResults?.first {\nif let plane = hitTest.node.parent {\n\
    if sender.state == .changed {\nlet translate = sender.translation(in: areaPanned)\n\
    plane.localTranslate(by: SCNVector3(translate.x/10000,-translate.y/10000,0.0))\n\
    }\n}\n}\n}\n```\n\nWhen you run this app, press a fingertip on the virtual plane\
    \ and slide it around the screen. The virtual plane can then move in the x and\
    \ y directions, as shown in Figure [10-7](#469983_1_En_10_Chapter.xhtml#Fig7).\n\
    \n![../images/469983_1_En_10_Chapter/469983_1_En_10_Fig7_HTML.jpg](images/469983_1_En_10_Chapter/469983_1_En_10_Fig7_HTML.jpg)\n\
    \nFigure 10-7\n\nMoving the virtual plane through the pan gesture\n\n## Summary\n\
    \nTouch gestures can interact with virtual objects and make them move, rotate,\
    \ or scale. When using touch gestures to interact with virtual objects, you need\
    \ to use the `hitTest` function to detect when the user’s touch gestures occur\
    \ over a virtual object. Then you can modify that virtual object physical position.\n\
    \nTouch gestures provide a way for users to manipulate virtual objects within\
    \ an augmented reality view and turn a static augmented reality view into an interactive\
    \ one.\n\n# 11. Plane Detection\n\nPlacing virtual objects in mid-air is fine,\
    \ but augmented reality works best when it also interacts with the real world.\
    \ One of the most basic ways augmented reality interacts with the real world is\
    \ through detecting horizontal or vertical planes. When ARKit can detect a flat\
    \ surface, it can later place a virtual object so that it appears to be resting\
    \ on that real flat surface, such as a table or floor.\n\nEach time ARKit detects\
    \ a plane, it places an anchor in that augmented reality view. This anchor, one\
    \ per plane, contains information about the plane’s:\n\n*   Orientation\n\n* \
    \  Position\n\n*   Size\n\nAs you move the camera in an iOS device around, ARKit\
    \ constantly updates its information about a plane. Typically this involves recognizing\
    \ that a plane may be larger than it initially thought. For example, when you\
    \ first point an iOS device’s camera at a floor, ARKit can only recognize that\
    \ portion of the floor that the camera sees. As you move the iOS device’s camera\
    \ around, ARKit can detect other parts of the floor, forcing it to update its\
    \ information on how large the plane might really be.\n\nFor this chapter, let’s\
    \ create a new Xcode project by following these steps:\n\n1.  Start Xcode. (Make\
    \ sure you’re using Xcode 10 or greater.)\n\n2.  Choose File ➤ New ➤ Project.\
    \ Xcode asks you to choose a template.\n\n3.  Click the iOS category.\n\n4.  Click\
    \ the Single View App icon and click the Next button. Xcode asks for a product\
    \ name, organization name, organization identifiers, and content technology.\n\
    \n5.  Click in the Product Name text field and type a descriptive name for your\
    \ project, such as `PlaneDetection`. (The exact name does not matter.)\n\n6. \
    \ Click the Next button. Xcode asks where you want to store your project.\n\n\
    7.  Choose a folder and click the Create button. Xcode creates an iOS project.\n\
    \nNow modify the `Info.plist` file to allow access to the camera and to use ARKit\
    \ by following these steps:\n\n1.  Click the `Info.plist` file in the Navigator\
    \ pane. Xcode displays a list of keys, types, and values.\n\n2.  Click the disclosure\
    \ triangle to expand the Required Device Capabilities category to display Item\
    \ 0.\n\n3.  Move the mouse pointer over Item 0 to display a plus (+) icon.\n\n\
    4.  Click this plus (+) icon to display a blank Item 1.\n\n5.  Type `arkit` under\
    \ the Value category in the Item 1 row.\n\n6.  Move the mouse pointer over the\
    \ last row to display a plus (+) icon.\n\n7.  Click on the plus (+) icon to create\
    \ a new row. A popup menu appears.\n\n8.  Choose Privacy – Camera Usage Description.\n\
    \n9.  Type `AR needs to use the camera` under the Value category in the Privacy –\
    \ Camera Usage Description row.\n\nNow it’s time to modify the `ViewController.swift`\
    \ file to use ARKit and SceneKit by following these steps:\n\n1.  Click on the\
    \ `ViewController.swift` file in the Navigator pane.\n\n2.  Edit the `ViewController.swift`\
    \ file so it looks like this:\n\n```\n    import UIKit\n    import SceneKit\n\
    \    import ARKit\n    class ViewController: UIViewController, ARSCNViewDelegate\
    \ {\n    let configuration = ARWorldTrackingConfiguration()\n    override func\
    \ viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional setup after\
    \ loading the view, typically from a nib.\n    }\n    }\n    ```\n\nTo view augmented\
    \ reality in our app, add a single ARKit SceneKit View (ARSCNView) so the user\
    \ interface looks similar to Figure [11-1](#469983_1_En_11_Chapter.xhtml#Fig1).\n\
    \n![../images/469983_1_En_11_Chapter/469983_1_En_11_Fig1_HTML.jpg](images/469983_1_En_11_Chapter/469983_1_En_11_Fig1_HTML.jpg)\n\
    \nFigure 11-1\n\nThe user interface includes a single ARSCNView\n\nAfter you’ve\
    \ designed your user interface, you need to add constraints. To add constraints,\
    \ choose Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints\
    \ at the bottom half of the menu under the All Views in Container category.\n\n\
    The next step is to connect the user interface items to the Swift code in the\
    \ `ViewController.swift` file . To do this, follow these steps:\n\n1.  Click the\
    \ `Main.storyboard` file in the Navigator pane."
