    4.  移动 iOS 设备以捕捉更多水平平面。每次 ARKit 识别出水平平面的新部分时，Xcode 调试区域会显示消息“updating plane anchor”。\n\
    5.  点击“停止”按钮或选择“产品”➤“停止”。\n"
- fmt: "## Displaying Planes as Images\n\nOnce we can get ARKit to recognize horizontal\
    \ surfaces, we can place an image on that horizontal surface. First, you need\
    \ to get an image such as searching for \"texture image public domain\" in your\
    \ favorite search engine. Now you can download any texture image you want, such\
    \ as a brick sidewalk, wooden floor, or the rippling surface of water.\n\nTo add\
    \ a .png or .jpg image to an Xcode project, simply drag and drop that image into\
    \ the Navigator pane of your Xcode project, as shown in Figure 11-2.\n\n![../images/469983_1_En_11_Chapter/469983_1_En_11_Fig2_HTML.jpg](images/469983_1_En_11_Chapter/469983_1_En_11_Fig2_HTML.jpg)\n\
    \nFigure 11-2 Drag and drop an image into the Navigator pane\n\nOnce you've added\
    \ a texture image for a plane, the next step is to create a plane, with a texture,\
    \ and add it to the `sceneView` rootnode inside the `didAdd renderer` function\
    \ like this:\n\n```\nlet planeNode = displayTexture()\nsceneView.scene.rootNode.addChildNode(planeNode)\n\
    ```\n\n### Creating the Plane\n\nTo create the plane, we'll need to create a function\
    \ called `displayTexture`, which creates a `SCNNode`, defines that node as an\
    \ `SCNPlane` with a width and height of 0.5 meters, and appears at the position\
    \ 0, 0, -0.5. Most importantly, the `SCNPlane` needs to use the texture image\
    \ you dragged into the Navigator pane such as an image named `water.jpg` (change\
    \ this name to the name of the image you dragged into your Xcode Navigator pane).\
    \ The `displayTexture` function should look like this:\n\n```\nfunc displayTexture()\
    \ -> SCNNode {\n    let planeNode = SCNNode()\n    planeNode.geometry = SCNPlane(width:\
    \ 0.5, height: 0.5)\n    planeNode.geometry?.firstMaterial?.diffuse.contents =\
    \ UIImage(named: \"water.jpg\")\n    planeNode.position = SCNVector3(0, 0, -0.5)\n\
    \    return planeNode\n}\n```\n\nIf you run this code, it will create a plane\
    \ that displays `water.jpg` as a vertical plane, as shown in Figure 11-3.\n\n\
    ![../images/469983_1_En_11_Chapter/469983_1_En_11_Fig3_HTML.jpg](images/469983_1_En_11_Chapter/469983_1_En_11_Fig3_HTML.jpg)\n\
    \nFigure 11-3 Displaying an image on a plane\n\n### Making the Plane Double-Sided\
    \ and Horizontal\n\nBesides rotating the plane 90 degrees along the x-axis so\
    \ it appears flat, another problem is that if you look behind the plane, the image\
    \ only appears on one side. To make the image appear on both sides of the plane,\
    \ we need to define the plane as double-sided like this:\n\n```\nplaneNode.geometry?.firstMaterial?.isDoubleSided\
    \ = true\n```\n\nThen we need to rotate the plane around the x-axis by 90 degrees.\
    \ Remember, Xcode measures everything in radians, so we'll first need to convert\
    \ 90 degrees into radians like this:\n\n```\nlet ninetyDegrees = GLKMathDegreesToRadians(90)\n\
    ```\n\nThen we can rotate the plane around its x-axis by defining its `eulerAngles`\
    \ position like this:\n\n```\nplaneNode.eulerAngles = SCNVector3(ninetyDegrees,\
    \ 0, 0)\n```\n\nThe entire `displayTexture` function should look like this:\n\n\
    ```\nfunc displayTexture() -> SCNNode {\n    let planeNode = SCNNode()\n    planeNode.geometry\
    \ = SCNPlane(width: 0.5, height: 0.5)\n    planeNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIImage(named: \"water.jpg\")\n    planeNode.position = SCNVector3(0, 0, -0.5)\n\
    \    let ninetyDegrees = GLKMathDegreesToRadians(90)\n    planeNode.eulerAngles\
    \ = SCNVector3(ninetyDegrees, 0, 0)\n    planeNode.geometry?.firstMaterial?.isDoubleSided\
    \ = true\n    return planeNode\n}\n```\n\nThe entire `ViewController.swift` file\
    \ should look like this to display a horizontal plane with an image:\n\n```\n\
    import UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController: UIViewController,\
    \ ARSCNViewDelegate {\n    @IBOutlet var sceneView: ARSCNView!\n    let configuration\
    \ = ARWorldTrackingConfiguration()\n\n    override func viewDidLoad() {\n    \
    \    super.viewDidLoad()\n        sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
    \ ARSCNDebugOptions.showFeaturePoints]\n        sceneView.delegate = self\n  \
    \      configuration.planeDetection = .horizontal\n        sceneView.session.run(configuration)\n\
    \n        let planeNode = displayTexture()\n        sceneView.scene.rootNode.addChildNode(planeNode)\n\
    \    }\n\n    func displayTexture() -> SCNNode {\n        let planeNode = SCNNode()\n\
    \        planeNode.geometry = SCNPlane(width: 0.5, height: 0.5)\n        planeNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIImage(named: \"water.jpg\")\n        planeNode.position = SCNVector3(0,\
    \ 0, -0.5)\n        let ninetyDegrees = GLKMathDegreesToRadians(90)\n        planeNode.eulerAngles\
    \ = SCNVector3(ninetyDegrees, 0, 0)\n        planeNode.geometry?.firstMaterial?.isDoubleSided\
    \ = true\n        return planeNode\n    }\n\n    func renderer(_ renderer: SCNSceneRenderer,\
    \ didAdd node: SCNNode, for anchor: ARAnchor) {\n        guard anchor is ARPlaneAnchor\
    \ else { return }\n        print (\"plane detected\")\n    }\n\n    func renderer(_\
    \ renderer: SCNSceneRenderer, didUpdate node: SCNNode, for anchor: ARAnchor) {\n\
    \        guard anchor is ARPlaneAnchor else { return }\n        print(\"updating\
    \ plane anchor\")\n    }\n}\n```\n\nIf you run this code, you'll see a horizontal\
    \ plane displaying the texture image on both the top and bottom, as shown in Figure\
    \ 11-4.\n\n![../images/469983_1_En_11_Chapter/469983_1_En_11_Fig4_HTML.jpg](images/469983_1_En_11_Chapter/469983_1_En_11_Fig4_HTML.jpg)\n\
    \nFigure 11-4 The plane appearing horizontally\n\n### Attaching the Plane to Detected\
    \ Surfaces\n\nRight now the plane appears at an arbitrary size and position. What\
    \ we want is to make that plane appear where ARKit detects a horizontal plane,\
    \ such as a floor or table top.\n\nFirst, delete these two lines from the `viewDidLoad`\
    \ function:\n\n```\nlet planeNode = displayTexture()\nsceneView.scene.rootNode.addChildNode(planeNode)\n\
    ```\n\nNow, in the `didAdd renderer` function, add the following two lines:\n\n\
    ```\nlet planeNode = displayTexture(anchor: anchor as! ARPlaneAnchor)\nnode.addChildNode(planeNode)\n\
    ```\n\nThe entire `didAdd renderer` function should look like this:\n\n```\nfunc\
    \ renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor: ARAnchor)\
    \ {\n    guard anchor is ARPlaneAnchor else { return }\n    let planeNode = displayTexture(anchor:\
    \ anchor as! ARPlaneAnchor)\n    node.addChildNode(planeNode)\n    print (\"plane\
    \ detected\")\n}\n```\n\nWhat this `didAdd renderer` function does now is that\
    \ once it detects a horizontal plane, it stores the size and position of that\
    \ horizontal plane as an `ARPlaneAnchor`. So we take this size and position information\
    \ and pass it to the `displayTexture` function that creates the actual plane.\n\
