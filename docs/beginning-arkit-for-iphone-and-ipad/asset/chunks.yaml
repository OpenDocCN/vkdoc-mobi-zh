- fmt: '# 理解增强现实与ARKit


    你可能听说过虚拟现实（VR），但有一种类似的创新技术正在iPhone和iPad等移动设备上出现，它被称为增强现实（AR）。尽管它们可能依赖相似的技术，但虚拟现实和增强现实在日常生活中的用途大不相同。


    虚拟现实的工作原理是强迫用户将一个设备像异形抱脸虫一样绑在头上。这种VR头显完全将用户与周围环境隔离开，并让用户沉浸在一个完全虚构的世界中。NASA使用虚拟现实来训练宇航员探索火星表面，而美国橄榄球队正在尝试使用虚拟现实来训练四分卫重新体验比赛，而无需真正走上球场并冒着身体受伤的风险。通过在虚拟现实世界中练习技能，用户可以安全地犯错并从中学习，而不会有任何身体上的后果。


    虚拟现实的巨大缺点在于，要使用它，你必须在一个安全的地方，比如家里或办公室。因为VR头显将你与周围环境隔离开，使用虚拟现实实质上就是蒙住你的眼睛。你不能在驾驶、步行或操作任何类型的车辆时使用虚拟现实。因为你需要佩戴VR头显，所以你只能在你能够安全站立或坐下而不受外界干扰（如其他人或移动车辆）的地方使用虚拟现实。因此，虚拟现实的用途仅限于固定的位置，用户可以在那里沉浸于另一个世界的同时保持安全。


    另一方面，增强现实则旨在与你周围的世界互动。增强现实让你查看真实世界，但在现实之上叠加了额外信息，以帮助你更好地理解你所看到的内容。


    例如，量杯是增强现实的一个简单版本。通过将液体倒入一个外部印有测量单位的透明杯子中，你可以准确测量杯中液体的量，如图1-1所示。如果没有印在透明杯外部的测量单位，你永远无法确切知道杯子中含有多少液体。


    ![../images/469983_1_En_1_Chapter/469983_1_En_1_Fig1_HTML.jpg](images/469983_1_En_1_Chapter/469983_1_En_1_Fig1_HTML.jpg)


    图1-1


    量杯是增强现实的一个简单版本


    猎人在瞄准步枪时使用类似类型的增强现实。瞄准镜放大了猎人正在观察的物体的视野，而刻在镜头中的十字线则显示了猎人步枪子弹将击中的确切位置，如图1-2所示。


    ![../images/469983_1_En_1_Chapter/469983_1_En_1_Fig2_HTML.jpg](images/469983_1_En_1_Chapter/469983_1_En_1_Fig2_HTML.jpg)


    图1-2


    猎枪瞄准镜是另一种形式的静态增强现实


    量杯和步枪瞄准镜都代表了简单但固定类型的增强现实。量杯只能测量倒入该杯中的液体量，而步枪瞄准镜只能放大目标。计算机帮助使增强现实更加多功能，以便在您周围的现实世界变化时显示信息。


    在航空业的早期，飞行员必须扫视仪表板以获取其速度、方向和位置的信息。不幸的是，低头看仪表板意味着将视线从周围的现实世界中移开，即使是短暂的一瞬间。这种将视线从外部世界移开的短暂瞬间可能是危险的，因为它让您的眼睛离开了附近任何可能的威胁或障碍物。在战争时期，这些障碍物可能是试图击落您的敌机，而在和平时期，这些障碍物可能是您需要避开的建筑物或其他飞机。这就是为什么现代飞机提供一种称为平视显示器（HUD）的增强现实形式。


    平视显示器将飞行信息直接投射到驾驶舱玻璃上。飞行员可以关闭平视显示器以获得外部世界的清晰视野，或者打开平视显示器以同时看到现实世界和关键的飞行信息，如图1-3所示。


    ![../images/469983_1_En_1_Chapter/469983_1_En_1_Fig3_HTML.jpg](images/469983_1_En_1_Chapter/469983_1_En_1_Fig3_HTML.jpg)


    图1-3


    飞机平视显示器提供了一种更复杂的增强现实形式


    与量杯或步枪瞄准镜显示的固定信息不同，飞机的平视显示器可以显示不断变化的信息，例如高度和速度。因为平视显示器只是投射在驾驶舱窗户上的投影，计算机可以根据飞行员的需求显示不同类型的信息。显示动态、变化的数据并选择显示哪种类型的数据的能力，使增强现实比像量杯或猎人的步枪瞄准镜这样的粗糙增强现实设备显示的固定类型信息更加有用和多功能。'
