    \    }\n}\n```\n\n## 总结\n\n在增强现实视图中放置虚拟对象时，每个虚拟对象都必须分配给一个节点，并且该节点需要x、y和z坐标来定义其位置。至少有一个虚拟对象需要根据其与`rootnode`的距离来定位，`rootnode`代表世界原点\
    \ (0, 0, 0)。在根据`rootnode`放置至少一个虚拟对象后，你可以基于`rootnode`或任何现有的虚拟对象放置额外的虚拟对象。\n\n基于`rootnode`放置虚拟对象允许你定义它们的位置，独立于任何其他虚拟对象。然而，如果你希望一个虚拟对象出现在距离第二个虚拟对象固定距离的位置，使用相对定位会更容易。不是根据虚拟对象到`rootnode`的位置来定义它，而是根据它到另一个虚拟对象的位置来定义它。\n\
    \n没有相对定位，你将不得不根据`rootnode`计算距离，这可能不准确且繁琐。相对定位使得定义虚拟对象彼此之间的固定距离变得容易。\n\n# 7. 旋转对象\n\
    \n当你在增强现实视图中放置一个虚拟对象时，它总是以其默认方向出现，例如圆柱体或金字塔垂直出现。然而，有时你可能希望虚拟对象以不同的方向出现。为了实现这一点，你可能需要围绕虚拟对象的x、y和z轴旋转它。\n\
    \n旋转虚拟对象涉及更改虚拟对象围绕其x、y和z轴的欧拉角。除了学习如何围绕x、y和z轴旋转虚拟对象外，你还将了解Xcode如何旋转相对于现有虚拟对象定位的附加虚拟对象。例如，如果你创建一个盒子并相对于盒子放置一个金字塔，旋转盒子也会改变金字塔的位置。"
