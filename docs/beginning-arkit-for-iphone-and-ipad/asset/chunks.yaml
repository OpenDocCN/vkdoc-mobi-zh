    import UIKit

    import SceneKit

    import ARKit

    class ViewController: UIViewController, ARSCNViewDelegate{

    @IBOutlet var sceneView: ARSCNView!

    let configuration = ARWorldTrackingConfiguration()

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]

    sceneView.delegate = self

    guard let storedObjects =  ARReferenceObject.referenceObjects(inGroupNamed: "AR
    Resources", bundle: nil) else {

    fatalError("Missing AR Resources images")

    }

    configuration.detectionObjects = storedObjects

    sceneView.session.run(configuration)

    }

    func renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:
    ARAnchor) {

    if let objectAnchor = anchor as? ARObjectAnchor {

    let movingImage = SCNText(string: "Object Detected", extrusionDepth: 0.0)

    movingImage.flatness = 0.1

    movingImage.font = UIFont.boldSystemFont(ofSize: 10)

    let titleNode = SCNNode()

    titleNode.geometry = movingImage

    titleNode.geometry?.firstMaterial?.diffuse.contents = UIColor.white

    titleNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)

    node.addChildNode(titleNode)

    }

    }

    }

    ```


    To test this app, place the item that you scanned and stored in the `AR Resources`
    folder as an .arobject file and put that item on a table or floor. Then follow
    these steps:


    1.  Click the Stop button or choose Product ➤ Stop.


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig11_HTML.jpg](images/469983_1_En_16_Chapter/469983_1_En_16_Fig11_HTML.jpg)


    Figure 16-11


    Detecting an object


    1.  Connect an iOS device to your Macintosh through its USB cable.


    2.  Click the Run button or choose Product ➤ Run. The first time you run this
    app, it will ask permission to access the camera so give it permission.


    3.  Place the object you want to detect on a flat surface.


    4.  Aim the iOS device’s camera at the object you want ARKit to recognize. When
    ARKit recognizes the object, it displays the text “Object Detected” near the detected
    object, as shown in Figure [16-11](#469983_1_En_16_Chapter.xhtml#Fig11).


    ## Summary


    Image tracking lets your app not only recognize an image and display a virtual
    object nearby, but also keep that virtual object linked to that image even if
    that image moves. Object detection lets your app detect a pre-scanned object and
    display virtual objects around it, such as text.


    When using image tracking, make sure you use `ARImageTrackingConfiguration` (not
    `ARWorldTrackingConfiguration`) like this:


    ```

    let configuration = ARImageTrackingConfiguration()

    ```


    Then use a `guard` statement to look for stored images in a special `AR Resources`
    folder:


    ```

    guard let storedImages =  ARReferenceImage.referenceImages(inGroupNamed: "AR Resources",
    bundle: nil) else {

    fatalError("Missing AR Resources images")

    }

    ```


    Finally, use `trackingImages` to access the stored images in the `AR Resources`
    folder:


    ```

    configuration.trackingImages = storedImages

    ```


    When using object detection, use a `guard` statement to define stored .arobject
    files in the `AR Resources` folder. Make sure you use `ARReferenceObject.referenceObjects`
    like this:


    ```

    guard let storedObjects =  ARReferenceObject.referenceObjects(inGroupNamed: "AR
    Resources", bundle: nil) else {

    fatalError("Missing AR Resources images")

    }

    ```


    This code looks for a folder named `AR Resources`. If it fails to find it, it
    ends the program and displays `"Missing AR Resources images"`. If it finds an
    `AR Resources` folder, then we can define where the detected .arobject files are
    stored like this:


    ```

    configuration.detectionObjects = storedObjects

    ```


    With both image tracking and object detection available in ARKit 2.0, augmented
    reality apps can become far more versatile than ever before.


    # 17. Persistence


    Up until now, every augmented reality view project we’ve created has had one problem.
    While you might be able to add virtual objects to an augmented reality view, the
    moment you close the app and start it again, any virtual objects you added would
    now be gone.


    In many cases, this is exactly what you want, so starting the app again creates
    a blank augmented reality view for the user. However, sometimes you may want to
    retain any virtual objects placed in the view. To save an augmented reality view
    so it appears in another person’s app or in your own app if you start it up again
    at a later time, you need to use *persistence*.


    Persistence simply saves any virtual objects placed in an augmented reality view
    in a world map. By saving this world map, you can retain the placement of virtual
    objects. By loading this world map later, you can restore an augmented reality
    view to a previous state.


    To learn about persistence, let’s create a new Xcode project by following these
    steps:


    1.  Start Xcode. (Make sure you’re using Xcode 10 or greater.)


    2.  Choose File ➤ New ➤ Project. Xcode asks you to choose a template.


    3.  Click the iOS category.


    4.  Click the Single View App icon and click the Next button. Xcode asks for a
    product name, organization name, organization identifiers, and content technology.


    5.  Click in the Product Name text field and type a descriptive name for your
    project, such as `Persistence`. (The exact name does not matter.)


    6.  Click the Next button. Xcode asks where you want to store your project.


    7.  Choose a folder and click the Create button. Xcode creates an iOS project.


    Now modify the `Info.plist` file to allow access to the camera and to use ARKit
    by following these steps:


    1.  Click the `Info.plist` file in the Navigator pane. Xcode displays a list of
    keys, types, and values.


    2.  Click the disclosure triangle to expand the Required Device Capabilities category
    to display Item 0.


    3.  Move the mouse pointer over Item 0 to display a plus (+) icon.


    4.  Click this plus (+) icon to display a blank Item 1.


    5.  Type `arkit` under the Value category in the Item 1 row.


    6.  Move the mouse pointer over the last row to display a plus (+) icon.


    7.  Click on the plus (+) icon to create a new row. A popup menu appears.


    8.  Choose Privacy – Camera Usage Description.


    9.  Type `AR needs to use the camera` under the Value category in the Privacy –
    Camera Usage Description row.


    Now it’s time to modify the `ViewController.swift` file to use ARKit and SceneKit
    by following these steps:


    1.  Click on the `ViewController.swift` file in the Navigator pane.


    2.  Edit the `ViewController.swift` file so it looks like this:


    ```

    import UIKit

    import SceneKit

    import ARKit

    class ViewController: UIViewController, ARSCNViewDelegate , ARSessionDelegate  {

    let configuration = ARWorldTrackingConfiguration()

    override func viewDidLoad() {

    super.viewDidLoad()

