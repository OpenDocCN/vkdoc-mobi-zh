    ## Summary


    In many cases, you can simply display virtual objects through an augmented reality
    view but if you want to create interesting visual effects, you can define different
    types of light sources. Think of a theater where you can place multiple lights
    in different locations and colors to shine on different objects.


    By altering the color, intensity, and temperature, you can make a light appear
    brighter or dimmer. By using a spotlight, you can shine a light in different directions
    after placing a light anywhere within your augmented reality view.


    Experiment with lights and the placement of virtual objects. Lights can give you
    multiple ways to change the appearance of what users see in your augmented reality
    app.


    # 6. Positioning Objects


    Virtual objects appear in an augmented reality view when you specify their x,
    y, and z coordinates. Such virtual objects remain fixed in place unless the user
    resets the world origin so they appear based on the new world origin’s location.


    However, sometimes you may not want to specify exact coordinates to display a
    virtual object. Instead, you might want to place one virtual object a specific
    distance based on the current position of another virtual object. Rather than
    define exact coordinates, you really want to define relative coordinates such
    as always placing a second virtual object a fixed distance to the left of another
    virtual object.


    Often times you’ll need to combine multiple virtual objects to create a single
    image, such as a box with a pyramid on top to create a house image. When working
    with multiple virtual objects that create a single object, relative positioning
    makes it easy to display all virtual objects correctly so they create a unified
    visual appearance.'
  trans: "\n```swift\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController:\
    \ UIViewController, ARSCNViewDelegate {\n@IBOutlet var sceneView: ARSCNView!\n\
    let configuration = ARWorldTrackingConfiguration()\nlet showLight = SCNNode()\n\
    var currentX : Float = 0\nvar currentY : Float = 0\nvar currentZ : Float = 0\n\
    override func viewDidLoad() {\nsuper.viewDidLoad()\n// Do any additional setup\
    \ after loading the view, typically from a nib.\nsceneView.delegate = self\nsceneView.showsStatistics\
    \ = true\nsceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    }\noverride func viewWillAppear(_ animated: Bool) {\nsuper.viewWillAppear(animated)\n\
    showShape()\nlightOn()\nsceneView.session.run(configuration)\n}\nfunc showShape()\
    \ {\nlet plane = SCNPlane(width: 0.75, height: 0.75)\nplane.firstMaterial?.diffuse.contents\
    \ = UIColor.yellow\nlet node = SCNNode()\nnode.geometry = plane\nnode.position\
    \ = SCNVector3(0, 0, -0.3)\nsceneView.scene.rootNode.addChildNode(node)\n}\nfunc\
    \ lightOn() {\nshowLight.light = SCNLight()\nshowLight.light?.type = .spot\nshowLight.light?.color\
    \ = UIColor(white: 0.6, alpha: 1.0)\nshowLight.position = SCNVector3(0, 0, 0)\n\
    showLight.eulerAngles = SCNVector3(0, 0, 0)\nsceneView.scene.rootNode.addChildNode(showLight)\n\
    }\n@IBAction func pitchChanged(_ sender: UISlider) {\ncurrentX = GLKMathDegreesToRadians(sender.value)\n\
    showLight.eulerAngles = SCNVector3(currentX, currentY, currentZ)\n}\n@IBAction\
    \ func yawChanged(_ sender: UISlider) {\ncurrentY = GLKMathDegreesToRadians(sender.value)\n\
    showLight.eulerAngles = SCNVector3(currentX, GLKMathDegreesToRadians(sender.value),\
    \ currentZ)\n}\n@IBAction func rollChanged(_ sender: UISlider) {\ncurrentZ = GLKMathDegreesToRadians(sender.value)\n\
    showLight.eulerAngles = SCNVector3(currentX, currentY, currentZ)\n}\n}\n```\n\n\
    要在 iOS 设备上测试此应用，请遵循以下步骤：\n\n1.  点击 **Stop** 按钮或选择 **Product** ➤ **Stop**。\n\n\
    \    ![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig12_HTML.jpg](img/469983_1_En_5_Fig12_HTML.jpg)\n\
    \n    图 5-12\n\n    白色聚光灯照射在黄色平面上\n\n2.  通过 USB 数据线将 iOS 设备连接到 Macintosh。\n3.\
    \  点击 **Run** 按钮或选择 **Product** ➤ **Run**。\n4.  左右滑动 **Pitch (x 轴)**, **Yaw (y\
    \ 轴)**, 和 **Roll (z 轴)** 滑块，观察聚光灯如何照射在平面的不同区域。虽然聚光灯是白色的，但平面是黄色的，因此聚光灯看起来是黄色的光，如图\
    \ 5-12 所示。\n\n## 小结\n\n在许多情况下，你可以通过增强现实视图简单地显示虚拟对象。但是，如果你想创建有趣的视觉效果，可以定义不同类型的光源。想象一下剧院，你可以在不同位置放置多个不同颜色的灯光来照射不同的物体。\n\
    \n通过改变颜色、强度和色温，你可以使灯光显得更亮或更暗。通过使用聚光灯，将灯光放置在增强现实视图中的任意位置后，你可以让它朝不同方向照射。\n\n尝试灯光和虚拟物体的摆放。灯光可以为你提供多种方式来改变用户在你增强现实应用中看到的内容的外观。\n\
    \n# 第六章 定位物体\n\n当你指定虚拟物体的 x、y 和 z 坐标时，它们就会出现在增强现实视图中。这些虚拟物体会保持固定位置，除非用户重置世界原点，否则它们将基于新的世界原点位置出现。\n\
    \n然而，有时你可能不想通过指定精确坐标来显示虚拟物体。相反，你可能希望根据另一个虚拟物体的当前位置，以特定距离放置一个虚拟物体。与其定义精确坐标，不如定义相对坐标，例如始终将第二个虚拟物体放置在另一个虚拟物体左侧的固定距离处。\n\
    \n很多时候，你需要组合多个虚拟物体来创建一个单一图像，例如一个盒子上放一个金字塔来创建一个房子的图像。在处理由多个虚拟物体构成的单一对象时，相对定位可以轻松正确地显示所有虚拟物体，从而形成统一的视觉外观。\n"
- fmt: '## Defining Relative Positions


    Normally when you place a virtual object in an augmented reality view, you need
    to define two items. First, you need to define the virtual object’s x, y, and
    z coordinates like this:


    ```

    node.position = SCNVector3(0, 0, -0.3)

    ```


    This code places a virtual object 0 distance along the x-axis, 0 distance along
    the y-axis, and -0.3 meters along the z-axis. Once you define the x, y, and z
    coordinates of a virtual object, the second step is to place that virtual object
    based on the position of the `rootnode` like this:


    ```

    sceneView.scene.rootNode.addChildNode(node)

    ```


    The `rootnode` appears at the world origin (0, 0, 0) so the `addChildNode` command
    simply adds a node based on its position of the `rootnode`.


    To learn how to place two virtual objects in an augmented reality view, let’s
    start by creating a new Xcode project by following these steps:


    1. Start Xcode. (Make sure you’re using Xcode 10 or greater.)

    2. Choose File ➤ New ➤ Project. Xcode asks you to choose a template.

    3. Click the iOS category.

    4. Click the Single View App icon and click the Next button. Xcode asks for a
    product name, organization name, organization identifiers, and content technology.

    5. Click in the Product Name text field and type a descriptive name for your project
    such as Positioning. (The exact name does not matter.)

    6. Click the Next button. Xcode asks where you want to store your project.

    7. Choose a folder and click the Create button. Xcode creates an iOS project.


    Now modify the `Info.plist` to allow access to the camera and to use ARKit by
    following these steps:


    1. Click the `Info.plist` file in the Navigator pane. Xcode displays a list of
    keys, types, and values.

    2. Click the disclosure triangle to expand the Required Device Capabilities category
    to display Item 0.

    3. Move the mouse pointer over Item 0 to display a plus (`+`) icon.

    4. Click this plus (`+`) icon to display a blank Item 1.

    5. Type `arkit` under the Value category in the Item 1 row.

    6. Move the mouse pointer over the last row to display a plus (`+`) icon.

    7. Click on the plus (`+`) icon to create a new row. A popup menu appears.

    8. Choose Privacy – Camera Usage Description.

    9. Type `AR needs to use the camera` under the Value category in the Privacy –
    Camera Usage Description row.


    Now it’s time to modify the `ViewController.swift` file to use ARKit and SceneKit
    by following these steps:


    1. Click on the `ViewController.swift` file in the Navigator pane.

    2. Edit the `ViewController.swift` file so it looks like this:


    ```

    import UIKit

    import SceneKit

    import ARKit

    class ViewController: UIViewController, ARSCNViewDelegate {

    let configuration = ARWorldTrackingConfiguration()

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    }

    }

    ```


    To view augmented reality in our app, add a single ARKit SceneKit View (`ARSCNView`)
    for displaying augmented reality with the camera view, as shown in Figure [6-1](#469983_1_En_6_Chapter.xhtml#Fig1).
    The exact size of the `ARSCNView` doesn’t matter.


    ![../images/469983_1_En_6_Chapter/469983_1_En_6_Fig1_HTML.jpg](images/469983_1_En_6_Chapter/469983_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    The user interface just needs a single `ARSCNView`


    After you’ve added a single ARKit SceneView to the user interface, you need to
    put constraints on those user interface items. To add constraints, choose Editor
    ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints at the bottom half
    of the menu under the All Views in Container category.


    After designing the user interface, the next step is to connect the user interface
    items to the Swift code in the `ViewController.swift` file. To do this, follow
    these steps:


    1. Click the `Main.storyboard` file in the Navigator pane.

    2. Click the Assistant Editor icon or choose View ➤ Assistant Editor ➤ Show Assistant
    Editor to display the `Main.storyboard` and the `ViewController.swift` file side
    by side.

    3. Move the mouse pointer over the `ARSCNView`, hold down the Control key, and
    Ctrl-drag under the `class ViewController` line.

    4. Release the Control key and the left mouse button. A popup menu appears.

    5. Click in the Name text field and type `sceneView`, then click the Connect button.
    Xcode creates an IBOutlet, as shown here:


    ```

    @IBOutlet var sceneView: ARSCNView!

    ```


    6. Edit the `viewDidLoad` function so it looks like this:


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    sceneView.delegate = self

    sceneView.showsStatistics = true

    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]

    showShape()

    }

    ```


    7. Edit the `viewWillAppear` function so it looks like this:


    ```

    override func viewWillAppear(_ animated: Bool) {

    super.viewWillAppear(animated)

    sceneView.session.run(configuration)

    }

    ```


    This `viewDidLoad` function calls on a `showShape` function. The `showShape` function
    displays a sphere.


    8. Type the following underneath the `viewWillAppear` function:


    ```

    func showShape() {

    let sphere = SCNSphere(radius: 0.05)

    sphere.firstMaterial?.diffuse.contents = UIColor.orange

    let node = SCNNode()

    node.geometry = sphere

    node.position = SCNVector3(0.2, 0.1, -0.1)

    sceneView.scene.rootNode.addChildNode(node)

    }

    ```


    The entire `ViewController.swift` file should look like this:


    ```

    import UIKit

    import SceneKit

    import ARKit

    class ViewController: UIViewController, ARSCNViewDelegate  {

    @IBOutlet var sceneView: ARSCNView!

    let configuration = ARWorldTrackingConfiguration()

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    sceneView.delegate = self

    sceneView.showsStatistics = true

    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]

    showShape()

    }

    override func viewWillAppear(_ animated: Bool) {

    super.viewWillAppear(animated)

    sceneView.session.run(configuration)

    }

    func showShape() {

    let sphere = SCNSphere(radius: 0.05)

    sphere.firstMaterial?.diffuse.contents = UIColor.orange

    let node = SCNNode()

    node.geometry = sphere

    node.position = SCNVector3(0.2, 0.1, -0.1)

    sceneView.scene.rootNode.addChildNode(node)

    }

    }

    ```


    This app places an orange sphere at (0.2, 0.1, -0.1). To run this app, follow
    these steps:


    1. Connect an iOS device to your Macintosh through its USB cable.

    2. Click the Run button or choose Product ➤ Run.

    3. When the app runs, an orange sphere appears.

    4. Click the Stop button or choose Product ➤ Stop.


    Now let’s add a second virtual object, such as a green box, except we want it
    to appear 0.4 meters to the left (the x-axis), 0.3 meters lower (the y-axis),
    and 0.2 meters in front (the z-axis). To do this, we have to use math.


    To make a virtual object appear 0.4 meters to the left of the first virtual object,
    we need to use a value of -0.2 (`0.2 – 0.4`). To make it appear 0.3 meters lower,
    we need to use a value of -0.2 (`0.1 – 0.3`), and to make it appear 0.2 meters
    in front, we need to use a value of 0.1 (`-0.1 + 0.2`).


    Edit the `showShape` function so it looks like this:


    ```

    func showShape() {

    let sphere = SCNSphere(radius: 0.05)

    sphere.firstMaterial?.diffuse.contents = UIColor.orange

    let box = SCNBox(width: 0.2, height: 0.2, length: 0.2, chamferRadius: 0.0)

    box.firstMaterial?.diffuse.contents = UIColor.green

    let boxNode = SCNNode()

    boxNode.geometry = box

    boxNode.position = SCNVector3(-0.2, -0.2, 0.1) //0.4 meters to the left (the x-axis),
    0.3 meters lower (the y-axis), and 0.2 meters in front (the z-axis)

    sceneView.scene.rootNode.addChildNode(boxNode)

    let node = SCNNode()

    node.geometry = sphere

    node.position = SCNVector3(0.2, 0.1, -0.1)

    sceneView.scene.rootNode.addChildNode(node)

    }

    ```'
