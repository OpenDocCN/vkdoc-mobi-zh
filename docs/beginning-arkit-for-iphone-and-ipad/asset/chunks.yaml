  trans: "\n# 在半空中显示虚拟对象\n\n目标是让 ARKit 使用图像检测来识别现实世界中的图像。一旦识别出图像，它便会在该图像前方显示一个虚拟对象。所有代码都将写在\
    \ `nodeFor(renderer:)` 函数中的 `switch` 语句内。要在识别图像后显示虚拟对象，请遵循以下步骤：\n\n1.  在 `switch`\
    \ 语句的第一个 `case` 中编写以下代码，以创建一个代表 `ship.scn` 虚拟对象的变量，具体如下：\n    ```\n    let item\
    \ = SCNScene(named: \"ship.scn\")\n    ```\n\n2.  现在，我们需要通过编写以下代码行来识别虚拟对象的父节点或根节点：\n\
    \    ```\n    let itemNode = item?.rootNode.childNode(withName: \"ship\", recursively:\
    \ true)\n    ```\n\n3.  接下来，我们需要通过从 `ARImageAnchor` 中获取位置，将虚拟对象节点放置在增强现实视图中：\n\
    \    ```\n    itemNode?.position = SCNVector3(anchor.transform.columns.3.x, anchor.transform.columns.3.y,\
    \ anchor.transform.columns.3.z)\n    sceneView.scene.rootNode.addChildNode(itemNode!)\n\
    \    ```\n\n到目前为止，代码会识别第一张图像，然后在半空中显示 `ship.scn`。然而，为了创造更有趣的视觉效果，我们还可以让虚拟对象旋转。\n\
    \n4.  在第 3 步的代码上方添加以下两行代码。以下代码定义了围绕 x、y 和 z 轴的旋转，并让此旋转动画永远持续：\n    ```\n    let\
    \ rotateMe = SCNAction.rotateBy(x: 0.5, y: 0.1, z: 0.2, duration: 1)\n    let\
    \ repeatMe = SCNAction.repeatForever(rotateMe)\n    itemNode?.runAction(repeatMe)\n\
    \    ```\n\n![../images/469983_1_En_15_Chapter/469983_1_En_15_Fig2_HTML.jpg](img/469983_1_En_15_Fig2_HTML.jpg)\n\
    \n图 15-2 – 识别图像的根节点名称\n\n1.  在导航窗格中点击 `ship.scn` 文件。Xcode 会同时显示该图像以及构成该图像的节点列表，如图\
    \ 15-2 所示。`ship.scn` 文件的根节点名称是“ship”。\n\nx、y 和 z 轴的旋转值是任意的，因此，请随意尝试不同的值，以便观察它们如何改变虚拟对象的旋转。\n\
    \n整个 `ViewController.swift` 文件应如下所示：\n```\nimport UIKit\nimport SceneKit\nimport\
    \ ARKit\nclass ViewController: UIViewController, ARSCNViewDelegate  {\n@IBOutlet\
    \ var sceneView: ARSCNView!\nlet configuration = ARWorldTrackingConfiguration()\n\
    struct Images {\nvar title: String\nvar info: String\n}\nvar imageArray: [Images]\
    \ = []\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n// Do any additional\
    \ setup after loading the view, typically from a nib.\nsceneView.debugOptions\
    \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    sceneView.delegate = self\nguard let storedImages =  ARReferenceImage.referenceImages(inGroupNamed:\
    \ \"AR Resources\", bundle: nil) else {\nfatalError(\"Missing AR Resources images\"\
    )\n}\nconfiguration.detectionImages = storedImages\ngetData()\nsceneView.session.run(configuration)\n\
    }\nfunc renderer(_ renderer: SCNSceneRenderer, nodeFor anchor: ARAnchor) -> SCNNode?\
    \ {\nguard let imageAnchor = anchor as? ARImageAnchor else { return nil }\nlet\
    \ plane = SCNPlane(width: imageAnchor.referenceImage.physicalSize.width, height:\
    \ imageAnchor.referenceImage.physicalSize.height)\nplane.firstMaterial?.diffuse.contents\
    \ = UIColor.clear\nlet planeNode = SCNNode()\nplaneNode.geometry = plane\nlet\
    \ ninetyDegrees = GLKMathDegreesToRadians(-90)\nplaneNode.eulerAngles = SCNVector3(ninetyDegrees,\
    \ 0, 0)\nswitch imageAnchor.referenceImage.name {\ncase \"CRS-15\":\nprint(\"\
    1st image\")\nlet item = SCNScene(named: \"ship.scn\")\nlet itemNode = item?.rootNode.childNode(withName:\
    \ \"ship\", recursively: true)\nlet rotateMe = SCNAction.rotateBy(x: 0.5, y: 0.1,\
    \ z: 0.2, duration: 1)\nlet repeatMe = SCNAction.repeatForever(rotateMe)\nitemNode?.runAction(repeatMe)\n\
    itemNode?.position = SCNVector3(anchor.transform.columns.3.x, anchor.transform.columns.3.y,anchor.transform.columns.3.z)\n\
    sceneView.scene.rootNode.addChildNode(itemNode!)\ncase \"SaturnV\":\nprint(\"\
    2nd image\")\ndefault:\nprint(\"Nothing found\")\n}\nlet node = SCNNode()\nnode.addChildNode(planeNode)\n\
    return node\n}\nfunc getData() {\nlet item1 = Images(title: \"CRS-15 SpaceX rocket\"\
    , info: \"Commercial Resupply Service\")\nlet item2 = Images(title: \"Saturn V\
    \ rocket\", info: \"Apollo moon launch vehicle\")\nimageArray.append(item1)\n\
    imageArray.append(item2)\n}\n}\n```\n\n要测试此应用，请遵循以下步骤：\n\n1.  点击停止按钮，或选择“产品” ➤\
    \ “停止”。\n\n![../images/469983_1_En_15_Chapter/469983_1_En_15_Fig3_HTML.jpg](img/469983_1_En_15_Fig3_HTML.jpg)\n\
    \n图 15-3 – 当应用识别出第一张图像时，`ship.scn` 虚拟对象出现并旋转\n\n2.  通过 USB 线缆将 iOS 设备连接到你的 Macintosh。\n\
    3.  点击运行按钮，或选择“产品” ➤ “运行”。\n4.  在电脑上加载你存储在项目“AR Resources”文件夹中的第一张图片。\n5.  将 iOS\
    \ 设备的摄像头对准显示你想要 ARKit 识别的图片的屏幕。当 ARKit 识别出图像时，它会显示 `ship.scn` 虚拟对象，该对象会在空中缓慢旋转，如图\
    \ 15-3 所示。\n\n重复上述步骤，但将 iOS 设备的摄像头对准存储在“AR Resources”文件夹中的第二张图像。注意，第二个虚拟对象不会出现。\n"
- fmt: '# Displaying Video on a Plane


    After detecting an image, an app can present additional information through text
    or by displaying a virtual object. Yet another way an app can respond is by displaying
    a video where the video appears over the detected image so the image appears to
    come to life.


    The first step is to convert any video file into a QuickTime `.mov` file format.
    To do that, simply load the `QuickTime Player` program and load the video file
    that you currently have stored in a different file format, such as `.mp4`. Now
    choose File ➤ Export. Choose a video resolution such as 480p or 720p, as shown
    in Figure 15-4. Keep in mind that higher resolution means a larger video file
    size. After choosing a video resolution, `QuickTime Player` will save your video
    as a QuickTime movie.


    ![../images/469983_1_En_15_Chapter/469983_1_En_15_Fig4_HTML.jpg](images/469983_1_En_15_Chapter/469983_1_En_15_Fig4_HTML.jpg)


    **Figure 15-4** The `QuickTime Player` program can export QuickTime `.mov` files


    Before we even attempt to display video, we need to make sure we can view the
    augmented reality view through the iOS device''s camera:


    ```

    guard let currentFrame = sceneView.session.currentFrame else { return nil }

    ```


    To play video, we can use a SceneKit class called `SKVideoNode` that allows us
    to load a QuickTime `.mov` file and play it immediately, like this:


    ```

    let videoNode = SKVideoNode(fileNamed: "SaturnV.mov")

    videoNode.play()

    ```


    Next, we need to define this `videoNode` in a `SKScene` class where we define
    the video size, its scale such as `aspectFill` to maintain the aspect ratio of
    the original video regardless of the size of the plane it appears on, and then
    add that `videoNode` to the `SKScene`. Finally, we need to position the `videoNode`
    in the middle like this:


    ```

    let videoScene = SKScene(size: CGSize(width: 640, height: 480))

    videoScene.scaleMode = .aspectFit

    videoScene.addChild(videoNode)

    videoNode.position = CGPoint(x: videoScene.size.width/2, y: videoScene.size.height/2)

    ```


    Now we need to create a plane that will appear over the detected image. This plane
    needs to be the exact same size as the detected image and then display the video.
    The video also needs to play on both sides of the plane since we''re going to
    be flipping the plane:


    ```

    let videoPlane = SCNPlane(width: imageAnchor.referenceImage.physicalSize.width,
    height: imageAnchor.referenceImage.physicalSize.height)

    videoPlane.firstMaterial?.diffuse.contents = videoScene

    videoPlane.firstMaterial?.isDoubleSided = true

    ```


    Now we need to create an `SCNNode` to contain the plane (which displays the video).
    This `SCNNode` will hold the plane and then we need to flip the plane and position
    it over the plane that covers the detected image. Finally, we need to add the
    plane to the `planeNode`:


    ```

    let tvPlaneNode = SCNNode(geometry: videoPlane)

    var translation = matrix_identity_float4x4

    translation.columns.3.z = -1.0

    tvPlaneNode.simdTransform = matrix_multiply(currentFrame.camera.transform, translation)

    tvPlaneNode.eulerAngles = SCNVector3(Double.pi, 0, 0)

    tvPlaneNode.position = SCNVector3(0,0,0)

    planeNode.addChildNode(tvPlaneNode)

    ```


    The complete `ViewController.swift` file should look like this:


    ```

    import UIKit

    import SceneKit

    import ARKit

    class ViewController: UIViewController, ARSCNViewDelegate  {

    @IBOutlet var sceneView: ARSCNView!

    let configuration = ARWorldTrackingConfiguration()

    struct Images {

    var title: String

    var info: String

    }

    var imageArray: [Images] = []

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]

    sceneView.delegate = self

    guard let storedImages =  ARReferenceImage.referenceImages(inGroupNamed: "AR Resources",
    bundle: nil) else {

    fatalError("Missing AR Resources images")

    }

    configuration.detectionImages = storedImages

    getData()

    sceneView.session.run(configuration)

    }

    func renderer(_ renderer: SCNSceneRenderer, nodeFor anchor: ARAnchor) -> SCNNode?
    {

    guard let imageAnchor = anchor as? ARImageAnchor else { return nil }

    let plane = SCNPlane(width: imageAnchor.referenceImage.physicalSize.width, height:
    imageAnchor.referenceImage.physicalSize.height)

    plane.firstMaterial?.diffuse.contents = UIColor.clear

    let planeNode = SCNNode()

    planeNode.geometry = plane

    let ninetyDegrees = GLKMathDegreesToRadians(-90)

    planeNode.eulerAngles = SCNVector3(ninetyDegrees, 0, 0)

    switch imageAnchor.referenceImage.name {

    case "CRS-15":

    print("1st image")

    let item = SCNScene(named: "ship.scn")

    let itemNode = item?.rootNode.childNode(withName: "ship", recursively: true)

    let rotateMe = SCNAction.rotateBy(x: 0.5, y: 0.1, z: 0.2, duration: 1)

    let repeatMe = SCNAction.repeatForever(rotateMe)

    itemNode?.runAction(repeatMe)

    itemNode?.position = SCNVector3(anchor.transform.columns.3.x, anchor.transform.columns.3.y,anchor.transform.columns.3.z)

    sceneView.scene.rootNode.addChildNode(itemNode!)

    case "SaturnV":

    print("2nd image")

    guard let currentFrame = sceneView.session.currentFrame else { return nil }

    let videoNode = SKVideoNode(fileNamed: "SaturnV.mov")

    videoNode.play()

    let videoScene = SKScene(size: CGSize(width: 640, height: 480))

    videoScene.scaleMode = .aspectFit

    videoScene.addChild(videoNode)

    videoNode.position = CGPoint(x: videoScene.size.width/2, y: videoScene.size.height/2)

    let videoPlane = SCNPlane(width: imageAnchor.referenceImage.physicalSize.width,
    height: imageAnchor.referenceImage.physicalSize.height)

    videoPlane.firstMaterial?.diffuse.contents = videoScene

    videoPlane.firstMaterial?.isDoubleSided = true

    let tvPlaneNode = SCNNode(geometry: videoPlane)

    var translation = matrix_identity_float4x4

    translation.columns.3.z = -1.0

    tvPlaneNode.simdTransform = matrix_multiply(currentFrame.camera.transform, translation)

    tvPlaneNode.eulerAngles = SCNVector3(Double.pi, 0, 0)

    tvPlaneNode.position = SCNVector3(0,0,0)

    planeNode.addChildNode(tvPlaneNode)

    default:

    print("Nothing found")

    }

    let node = SCNNode()

    node.addChildNode(planeNode)

    return node

    }

    func getData() {

    let item1 = Images(title: "CRS-15 SpaceX rocket", info: "Commercial Resupply Service")

    let item2 = Images(title: "Saturn V rocket", info: "Apollo moon launch vehicle")

    imageArray.append(item1)

    imageArray.append(item2)

    }

    }

    ```


    To test this code, follow these steps:


    1. Connect an iOS device to your Macintosh through its USB cable.

    2. Click the Run button or choose Product ➤ Run.

    3. Display one of the images, stored in the app''s `AR Resources` folder, on to
    your computer screen.

    4. Point the iOS device''s camera at one of the images stored in the app''s `AR
    Resources` folder.

    5. Your video starts playing over the detected image. Notice that the video is
    the same size as the detected image.

    6. Click the Stop button or choose Product ➤ Stop.


    ## Summary


    Image detection can identify recognized images, but your app still needs a way
    to respond to the user who provides more information. Displaying text can be suitable
    in many cases, but two other ways to provide additional information is by displaying
    virtual objects or by playing video.


    Displaying a virtual object can provide a three-dimensional view of an item while
    also using animation to make an augmented reality view come to life. Displaying
    video can make a detected image change from a static image to a video that provides
    further information.


    Virtual objects and video are just two more ways an augmented reality can respond
    to detected images and provide additional information about a particular image.'
