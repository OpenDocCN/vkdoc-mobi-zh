    \n如您所见，检测垂直平面与检测水平平面的方法是相同的。\n\n## 总结\n\n当您想在现实世界中添加虚拟对象时，检测水平或垂直平面至关重要。您只需要使用一行代码即可检测水平或垂直平面：\n\
    \n```swift\nconfiguration.planeDetection = .horizontal\n```\n\n或者\n\n```swift\n\
    configuration.planeDetection = .vertical\n```\n\n一旦ARKit检测到水平或垂直平面，它就可以用纹理图像（例如水、砖块或沙子）来定义该平面。当您移动iOS设备的摄像头时，检测到的平面尺寸会逐渐增大。\n\
    \n# 12. 虚拟对象的物理特性\n\n到目前为止，当我们将虚拟对象添加到增强现实视图时，这些虚拟对象只是漂浮在半空中。虽然在某些情况下这可能适用，但在其他情况下，您可能希望虚拟对象的行为更接近真实物体，能够下落、反弹并相互碰撞。\n\
    \n为了让虚拟对象具有与真实物体相同的特性，您可以为任何虚拟对象定义物理特性。这意味着您可以定义虚拟对象如何与其他对象交互（静态、动态或运动学）、虚拟对象的形状（如盒子或球体）以及施加在虚拟对象上的力。\n\
    \n虚拟对象可以以以下三种方式之一表现：\n\n*   **静态**——无法移动，不受碰撞或力的影响。\n*   **动态**——受力和碰撞的影响。\n*\
    \   **运动学**——不受力或碰撞的影响，但可以影响动态虚拟对象。\n\n静态虚拟对象适用于简单存在的场景。到目前为止，我们创建的所有虚拟对象都是静态的，因为它们不移动也不影响任何其他虚拟对象。\n\
    \n动态虚拟对象更有趣，因为它们可以移动并受重力影响，这意味着它们会沿着y轴掉落到地面。动态虚拟对象可以移动并与其他动态或运动学虚拟对象发生碰撞并反弹。\n\
    \n运动学虚拟对象不移动，但它们可以与动态虚拟对象发生碰撞。在视频游戏中，像道路或障碍物这样的固定物品可以是运动学虚拟对象。\n\n为了了解如何将物理特性应用于虚拟对象，让我们按照以下步骤创建一个新的Xcode项目：\n\
    \n1.  启动Xcode。（请确保您使用的是Xcode 10或更高版本。）\n2.  选择 File ➤ New ➤ Project。Xcode会要求您选择一个模板。\n\
    3.  单击iOS类别。\n4.  单击 Single View App 图标，然后单击 Next 按钮。Xcode会询问产品名称、组织名称、组织标识符和内容技术。\n\
    5.  在 Product Name 文本框中单击并输入项目的描述性名称，例如 `Physics`。（具体名称无关紧要。）\n6.  单击 Next 按钮。Xcode会询问您想要将项目存储在何处。\n\
    7.  选择一个文件夹并单击 Create 按钮。Xcode会创建一个iOS项目。\n\n现在，按照以下步骤修改 `Info.plist` 文件以允许访问相机并使用ARKit：\n\
    \n1.  在导航器窗格中单击 `Info.plist` 文件。Xcode会显示一个键、类型和值的列表。\n2.  单击展开三角形以展开 Required\
    \ Device Capabilities 类别，显示 Item 0。\n3.  将鼠标指针移到 Item 0 上以显示加号（+）图标。\n4.  单击此加号（+）图标以显示一个空的\
    \ Item 1。\n5.  在 Item 1 行的 Value 类别下输入 `arkit`。\n6.  将鼠标指针移到最后一行以显示一个加号（+）图标。\n\
    7.  单击加号（+）图标以创建新行。会出现一个弹出菜单。\n8.  选择 Privacy – Camera Usage Description。\n9.\
    \  在 Privacy – Camera Usage Description 行的 Value 类别下输入 `AR needs to use the camera`。\n\
    \n现在，按照以下步骤修改 `ViewController.swift` 文件以使用ARKit和SceneKit：\n\n1.  在导航器窗格中单击 `ViewController.swift`\
    \ 文件。\n2.  编辑 `ViewController.swift` 文件，使其如下所示：\n\n```swift\nimport UIKit\nimport\
    \ SceneKit\nimport ARKit\n\nclass ViewController: UIViewController, ARSCNViewDelegate\
    \ {\n    let configuration = ARWorldTrackingConfiguration()\n    override func\
    \ viewDidLoad() {\n        super.viewDidLoad()\n    }\n}\n```\n\n要在我们的应用中查看增强现实，请添加一个\
    \ ARKit SceneKit View (`ARSCNView`) 并将其展开以填充整个用户界面。然后添加约束：选择 Editor ➤ Resolve\
    \ Auto Layout Issues ➤ Reset to Suggested Constraints（在菜单下半部分的 All Views in Container\
    \ 类别下）。"
