- fmt: "# 16. Image Tracking and Object Detection\n\nIn previous chapters, we learned\
    \ about image detection. That's where an app can detect an image, stored in its\
    \ `AR Resources` folder, and then respond when the iOS device camera recognizes\
    \ that image in the real world. Image detection works with two-dimensional items\
    \ such as pictures and photographs, but ARKit 2.0 and iOS 12 offer two additional\
    \ features that expand on image detection: image tracking and object detection.\n\
    \nRight now, image detection works by linking text, a virtual object, or a video\
    \ to the location of a detected image. However, if that detected image moves,\
    \ then the displayed text, virtual object, or video won't move. That's why ARKit\
    \ 2.0 offers image tracking, which allows text, a virtual object, or video to\
    \ move if the detected image also moves.\n\nWhile image detection might be impressive,\
    \ it's limited to two-dimensional items such as pictures or photographs. To overcome\
    \ this limitation, ARKit 2.0 offers object detection. First, you can scan in a\
    \ three-dimensional object. Then you can store this three-dimensional object scan\
    \ in your augmented reality app.\n\nAs soon as the user scans the same item, the\
    \ augmented reality app can recognize the three-dimensional object and respond\
    \ by displaying text, virtual objects, or video, just like image detection. Where\
    \ image detection works with two-dimensional, flat items, object detection works\
    \ with three-dimensional objects, allowing the user to get information about that\
    \ object no matter which position or angle of the iOS camera.\n\nFor this chapter,\
    \ let's create a new Xcode project by following these steps:\n\n1. Start Xcode.\
    \ (Make sure you're using Xcode 10 or greater.)\n2. Choose File ➤ New ➤ Project.\
    \ Xcode asks you to choose a template.\n3. Click the iOS category.\n4. Click the\
    \ Single View App icon and click the Next button. Xcode asks for a product name,\
    \ organization name, organization identifiers, and content technology.\n5. Click\
    \ in the Product Name text field and type a descriptive name for your project,\
    \ such as `ImageTracking`. (The exact name does not matter.)\n6. Click the Next\
    \ button. Xcode asks where you want to store your project.\n7. Choose a folder\
    \ and click the Create button. Xcode creates an iOS project.\n\nNow modify the\
    \ `Info.plist` file to allow access to the camera and to use ARKit by following\
    \ these steps:\n\n1. Click the `Info.plist` file in the Navigator pane. Xcode\
    \ displays a list of keys, types, and values.\n2. Click the disclosure triangle\
    \ to expand the Required Device Capabilities category to display Item 0.\n3. Move\
    \ the mouse pointer over Item 0 to display a plus (+) icon.\n4. Click this plus\
    \ (+) icon to display a blank Item 1.\n5. Type `arkit` under the Value category\
    \ in the Item 1 row.\n6. Move the mouse pointer over the last row to display a\
    \ plus (+) icon.\n7. Click on the plus (+) icon to create a new row. A popup menu\
    \ appears.\n8. Choose Privacy – Camera Usage Description.\n9. Type `AR needs to\
    \ use the camera` under the Value category in the Privacy – Camera Usage Description\
    \ row.\n\nNow it's time to modify the `ViewController.swift` file to use ARKit\
    \ and SceneKit by following these steps:\n\n1. Click on the `ViewController.swift`\
    \ file in the Navigator pane.\n2. Edit the `ViewController.swift` file so it looks\
    \ like this:\n\n```\n    import UIKit\n    import SceneKit\n    import ARKit\n\
    \    class ViewController: UIViewController, ARSCNViewDelegate {\n    let configuration\
    \ = ARImageTrackingConfiguration()\n    override func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    }\n```\n\nThe most important line to notice is the one that defines\
    \ an `ARImageTrackingConfiguration`:\n\n```\nlet configuration = ARImageTrackingConfiguration()\n\
    ```\n\nPreviously, we've only defined an `ARWorldTrackingConfiguration` but we\
    \ need `ARImageTrackingConfiguration` to let our augmented reality app track a\
    \ detected image when it moves.\n\nTo view augmented reality in our app, add a\
    \ single ARKit SceneKit View (`ARSCNView`) so it fills the entire view. After\
    \ you've designed your user interface, you need to add constraints. To add constraints,\
    \ choose Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints\
    \ at the bottom half of the menu under the All Views in Container category.\n\n\
    The next step is to connect the user interface items to the Swift code in the\
    \ `ViewController.swift` file. To do this, follow these steps:\n\n1. Click the\
    \ `Main.storyboard` file in the Navigator pane.\n2. Click the Assistant Editor\
    \ icon or choose View ➤ Assistant Editor ➤ Show Assistant Editor to display the\
    \ `Main.storyboard` and the `ViewController.swift` file side by side.\n3. Move\
    \ the mouse pointer over the `ARSCNView`, hold down the Control key, and Ctrl-drag\
    \ under the `class ViewController` line.\n4. Release the Control key and the left\
    \ mouse button. A popup menu appears.\n5. Click in the Name text field and type\
    \ `sceneView`, then click the Connect button. Xcode creates an `IBOutlet` as shown\
    \ here:\n\n```\n    @IBOutlet var sceneView: ARSCNView!\n```\n\n6. Edit the `viewDidLoad`\
    \ function so it looks like this:\n\n```\n    override func viewDidLoad() {\n\
    \    super.viewDidLoad()\n    // Do any additional setup after loading the view,\
    \ typically from a nib.\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
    \ ARSCNDebugOptions.showFeaturePoints]\n    sceneView.delegate = self\n    sceneView.session.run(configuration)\n\
    \    }\n```\n\nRemember, ARKit can only recognize physical objects in the real\
    \ world after you have stored images of those items in your app. In addition to\
    \ storing an image, you must also specify the width and height of that real-world\
    \ object. That way, when ARKit spots that actual item through the iOS device's\
    \ camera, it can compare that image with its stored image. If they match in both\
    \ appearance and size, then ARKit can recognize that real-world item.\n\nFirst,\
    \ you must capture an image of the item you want to detect. Since these images\
    \ need to be high resolution, you can capture public domain images off the Internet,\
    \ such as at NASA (`www.nasa.gov`). Then you can display these images on your\
    \ laptop or iPad screen for your iOS device to recognize.\n\nTo store one or more\
    \ images that you want ARKit to recognize, follow these steps:\n\n1. Click in\
    \ the Width and Height text fields and type the actual width and height of the\
    \ real item. You can also click the Units popup menu to change the default measurement\
    \ unit from meters to something else, such as inches or centimeters.\n\n![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig1_HTML.jpg](images/469983_1_En_16_Chapter/469983_1_En_16_Fig1_HTML.jpg)\n\
    \nFigure 16-1 Defining the width and height of the item to recognize\n\n2. Click\
    \ the `Assets.xcassets` folder in the Navigator pane.\n3. Click the plus (+) icon\
    \ in the bottom of the pane. A popup menu appears.\n4. Choose New AR Resource\
    \ Group. Xcode creates an `AR Resources` folder.\n5. Drag and drop the images\
    \ you want ARKit to recognize in the real world. Xcode displays a yellow alert\
    \ icon in the bottom-right corner of your images.\n6. Click the Attributes Inspector\
    \ icon or choose View ➤ Inspectors ➤ Show Attributes Inspector. An AR Reference\
    \ Image pane appears, as shown in Figure 16-1.\n\nOnce we've added one or more\
    \ images of the real objects we want ARKit to recognize, we need to write actual\
    \ Swift code to recognize the image when spotted through an iOS device's camera.\n\
    \nFirst, we need to access the folder containing the images of items to recognize.\
    \ This folder can be called anything, such as `AR Resources`. This means using\
    \ a `guard` statement to verify that the image folder even exists like this:\n\
    \n```\nguard let storedImages =  ARReferenceImage.referenceImages(inGroupNamed:\
    \ \"AR Resources\", bundle: nil) else {\nfatalError(\"Missing AR Resources images\"\
    )\n}\n```"
  raw: "# 16. Image Tracking and Object Detection\n\nIn previous chapters, we learned\
    \ about image detection. That’s where an app can detect an image, stored in its\
    \ `AR Resources` folder, and then respond when the iOS device camera recognizes\
    \ that image in the real world. Image detection works with two-dimensional items\
    \ such as pictures and photographs, but ARKit 2.0 and iOS 12 offer two additional\
    \ features that expand on image detection: image tracking and object detection.\n\
    \nRight now, image detection works by linking text, a virtual object, or a video\
    \ to the location of a detected image. However, if that detected image moves,\
    \ then the displayed text, virtual object, or video won’t move. That’s why ARKit\
    \ 2.0 offers image tracking, which allows text, a virtual object, or video to\
    \ move if the detected image also moves.\n\nWhile image detection might be impressive,\
    \ it’s limited to two-dimensional items such as pictures or photographs. To overcome\
    \ this limitation, ARKit 2.0 offers object detection. First, you can scan in a\
    \ three-dimensional object. Then you can store this three-dimensional object scan\
    \ in your augmented reality app.\n\nAs soon as the user scans the same item, the\
    \ augmented reality app can recognize the three-dimensional object and respond\
    \ by displaying text, virtual objects, or video, just like image detection. Where\
    \ image detection works with two-dimensional, flat items, object detection works\
    \ with three-dimensional objects, allowing the user to get information about that\
    \ object no matter which position or angle of the iOS camera.\n\nFor this chapter,\
    \ let’s create a new Xcode project by following these steps:\n\n1.  Start Xcode.\
    \ (Make sure you’re using Xcode 10 or greater.)\n\n2.  Choose File ➤ New ➤ Project.\
    \ Xcode asks you to choose a template.\n\n3.  Click the iOS category.\n\n4.  Click\
    \ the Single View App icon and click the Next button. Xcode asks for a product\
    \ name, organization name, organization identifiers, and content technology.\n\
    \n5.  Click in the Product Name text field and type a descriptive name for your\
    \ project, such as `ImageTracking`. (The exact name does not matter.)\n\n6.  Click\
    \ the Next button. Xcode asks where you want to store your project.\n\n7.  Choose\
    \ a folder and click the Create button. Xcode creates an iOS project.\n\nNow modify\
    \ the `Info.plist` file to allow access to the camera and to use ARKit by following\
    \ these steps:\n\n1.  Click the `Info.plist` file in the Navigator pane. Xcode\
    \ displays a list of keys, types, and values.\n\n2.  Click the disclosure triangle\
    \ to expand the Required Device Capabilities category to display Item 0.\n\n3.\
    \  Move the mouse pointer over Item 0 to display a plus (+) icon.\n\n4.  Click\
    \ this plus (+) icon to display a blank Item 1.\n\n5.  Type `arkit` under the\
    \ Value category in the Item 1 row.\n\n6.  Move the mouse pointer over the last\
    \ row to display a plus (+) icon.\n\n7.  Click on the plus (+) icon to create\
    \ a new row. A popup menu appears.\n\n8.  Choose Privacy – Camera Usage Description.\n\
    \n9.  Type `AR needs to use the camera` under the Value category in the Privacy –\
    \ Camera Usage Description row.\n\nNow it’s time to modify the `ViewController.swift`\
    \ file to use ARKit and SceneKit by following these steps:\n\n1.  Click on the\
    \ `ViewController.swift` file in the Navigator pane.\n\n2.  Edit the `ViewController.swift`\
    \ file so it looks like this:\n\n```\n    import UIKit\n    import SceneKit\n\
    \    import ARKit\n    class ViewController: UIViewController, ARSCNViewDelegate\
    \ {\n    let configuration = ARImageTrackingConfiguration()\n    override func\
    \ viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional setup after\
    \ loading the view, typically from a nib.\n    }\n    }\n    ```\n\nThe most important\
    \ line to notice is the one that defines an `ARImageTrackingConfiguration` :\n\
    \n```\nlet configuration = ARImageTrackingConfiguration()\n```\n\nPreviously,\
    \ we’ve only defined an `ARWorldTrackingConfiguration` but we need `ARImageTrackingConfiguration`\
    \ to let our augmented reality app track a detected image when it moves.\n\nTo\
    \ view augmented reality in our app, add a single ARKit SceneKit View (ARSCNView)\
    \ so it fills the entire view. After you’ve designed your user interface, you\
    \ need to add constraints. To add constraints, choose Editor ➤ Resolve Auto Layout\
    \ Issues ➤ Reset to Suggested Constraints at the bottom half of the menu under\
    \ the All Views in Container category.\n\nThe next step is to connect the user\
    \ interface items to the Swift code in the `ViewController.swift` file. To do\
    \ this, follow these steps:\n\n1.  Click the `Main.storyboard` file in the Navigator\
    \ pane.\n\n2.  Click the Assistant Editor icon or choose View ➤ Assistant Editor\
    \ ➤ Show Assistant Editor to display the `Main.storyboard` and the `ViewController.swift`\
    \ file side by side.\n\n3.  Move the mouse pointer over the ARSCNView, hold down\
    \ the Control key, and Ctrl-drag under the `class ViewController` line.\n\n4.\
    \  Release the Control key and the left mouse button. A popup menu appears.\n\n\
    5.  Click in the Name text field and type `sceneView`, then click the Connect\
    \ button. Xcode creates an IBOutlet as shown here:\n\n```\n    @IBOutlet var sceneView:\
    \ ARSCNView!\n    ```\n\n6.  Edit the `viewDidLoad` function so it looks like\
    \ this:\n\n```\n    override func viewDidLoad() {\n    super.viewDidLoad()\n \
    \   // Do any additional setup after loading the view, typically from a nib.\n\
    \    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    sceneView.delegate = self\n    sceneView.session.run(configuration)\n   \
