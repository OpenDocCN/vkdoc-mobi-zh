- fmt: '## Detecting Collisions


    Turning virtual objects into `.dynamic` and `.static` physics bodies lets them
    collide against each other. However, in many cases you may want to identify when
    a virtual object collides with another one. To do that, you must first create
    an enumeration structure that assigns each virtual object to an arbitrary numeric
    value.


    In our example, we have a purple sphere that acts as a projectile, an orange pyramid,
    a blue torus, and a green box. So we can define an enumeration structure underneath
    the `IBOutlet` like this:


    ```

    enum contactType : Int {

    case projectile = 1

    case target = 2

    }

    ```


    Next we have to assign the `enum` value of each virtual object to its `categoryBitMask`
    property inside the `addTargets` function like this:


    ```

    projectile.physicsBody?.categoryBitMask = contactType.projectile.rawValue

    pyramidNode.physicsBody?.categoryBitMask = contactType.target.rawValue

    torusNode.physicsBody?.categoryBitMask = contactType.target.rawValue

    boxNode.physicsBody?.categoryBitMask = contactType.target.rawValue

    ```


    Once we’ve identified all the virtual objects with an arbitrary value for its
    `categoryBitMask` property, we need to use the `SCNPhysicsContactDelegate` for
    our class like this:


    ```

    class ViewController: UIViewController, ARSCNViewDelegate, SCNPhysicsContactDelegate  {

    ```


    This delegate allows us to get notifications when virtual objects collide. After
    defining the `SCNPhysicsContactDelegate`, we must also assign the class as the
    contact delegate like this:


    ```

    sceneView.scene.physicsWorld.contactDelegate = self

    ```


    We also need to define the `contactTestBitMask` for the projectile in the `tapResponse`
    function . This defines what type of collisions we want to track. Since we want
    to be notified when the projectile hits any of the three virtual objects (pyramid,
    torus, or box), we can use the following:


    ```

    projectile.physicsBody?.contactTestBitMask = contactType.target.rawValue

    ```


    Since all of our targets (pyramid, torus, and box) are assigned the same `contactType.target`
    enumerated value, we need to identify when the projectile hits each different
    virtual object. That means we need to give each virtual object a unique name in
    the `addTargets` function like this:


    ```

    projectile.name = "Projectile"

    pyramidNode.name = "Pyramid"

    torusNode.name = "Torus"

    boxNode.name = "Box"

    ```


    Now we need to use the `didBegin physicsWorld` function to detect collisions like
    this:


    ```

    func physicsWorld(_ world: SCNPhysicsWorld, didBegin contact: SCNPhysicsContact)
    {

    }

    ```


    This function runs every time two virtual objects collide. When two virtual objects
    collide, the `didBegin physicsWorld` identifies the two objects as `nodeA` and
    `nodeB`. Unfortunately, we don’t know which node represents the projectile and
    which node represents the target. First, we need to declare a variable to hold
    the node containing the target:


    ```

    var targetNode : SCNNode!

    ```


    Now we need to determine if `nodeA` is the projectile or the target that was hit.
    To determine this information, we just need to look for the name of the node:


    ```

    if contact.nodeA.name == "Projectile" {

    targetNode = contact.nodeB

    } else {

    targetNode = contact.nodeA

    }

    ```


    If `nodeA` is named `Projectile`, then we know that `nodeB` contains the target.
    If `nodeA` is not named `Projectile`, then we know `nodeA` contains the target.


    Now depending on the `targetNode`’s name, we can change the color of the virtual
    object that the projectile hit using a `switch` statement . If the projectile
    hit the pyramid, the pyramid will change color to magenta. If the projectile hits
    the torus, then the torus will change color to yellow. If the projectile hits
    the box, the box will change color to red:


    ```

    switch targetNode.name {

    case "Pyramid":

    targetNode.geometry?.firstMaterial?.diffuse.contents = UIColor.magenta

    case "Torus":

    targetNode.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow

    case "Box":

    targetNode.geometry?.firstMaterial?.diffuse.contents = UIColor.red

    default:

    return

    }

    ```


    The entire `ViewController.swift` file should look like this:'
  raw: '## Detecting Collisions


