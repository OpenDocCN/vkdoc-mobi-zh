- fmt: "# Image Detection\n\nAnother way ARKit can interact with the real world is\
    \ through image detection. Image detection involves storing images and then using\
    \ the camera to recognize those exact same images when viewed through an augmented\
    \ reality view.\n\nImage detection is similar but different from machine learning\
    \ image recognition. With image recognition, an app can recognize items it has\
    \ never seen before such as different varieties of cars, pencils, or computers.\
    \ Image detection simply recognizes a stored image. If you don’t store an image\
    \ ahead of time, image detection can never recognize it.\n\nImage detection can\
    \ be handy because it allows an app to recognize a fixed image and then respond\
    \ in different ways, such as displaying more information about that image. For\
    \ example, a museum might offer an augmented reality app that lets users point\
    \ an iPhone at a painting. As soon as the app recognizes that painting, it can\
    \ display additional information about that painting in the user’s native language\
    \ such as English, Spanish, Arabic, or Japanese.\n\nTo learn about image detection,\
    \ let’s create a new Xcode project by following these steps:\n\n1. Start Xcode.\
    \ (Make sure you’re using Xcode 10 or greater.)\n2. Choose File ➤ New ➤ Project.\
    \ Xcode asks you to choose a template.\n3. Click the iOS category.\n4. Click the\
    \ Single View App icon and click the Next button. Xcode asks for a product name,\
    \ organization name, organization identifiers, and content technology.\n5. Click\
    \ in the Product Name text field and type a descriptive name for your project,\
    \ such as `ImageDetection`. (The exact name does not matter.)\n6. Click the Next\
    \ button. Xcode asks where you want to store your project.\n7. Choose a folder\
    \ and click the Create button. Xcode creates an iOS project.\n\nNow modify the\
    \ `Info.plist` file to allow access to the camera and to use ARKit by following\
    \ these steps:\n\n1. Click the `Info.plist` file in the Navigator pane. Xcode\
    \ displays a list of keys, types, and values.\n2. Click the disclosure triangle\
    \ to expand the Required Device Capabilities category to display Item 0.\n3. Move\
    \ the mouse pointer over Item 0 to display a plus (+) icon.\n4. Click this plus\
    \ (+) icon to display a blank Item 1.\n5. Type `arkit` under the Value category\
    \ in the Item 1 row.\n6. Move the mouse pointer over the last row to display a\
    \ plus (+) icon.\n7. Click on the plus (+) icon to create a new row. A popup menu\
    \ appears.\n8. Choose Privacy – Camera Usage Description.\n9. Type `AR needs to\
    \ use the camera` under the Value category in the Privacy – Camera usage Description\
    \ row.\n\nNow it’s time to modify the `ViewController.swift` file to use ARKit\
    \ and SceneKit by following these steps:\n\n1. Click on the `ViewController.swift`\
    \ file in the Navigator pane.\n2. Edit the `ViewController.swift` file so it looks\
    \ like this:\n\n```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController:\
    \ UIViewController, ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
    \ any additional setup after loading the view, typically from a nib.\n    }\n\
    }\n```\n\nTo view augmented reality in our app, add a single `ARSCNView` and expand\
    \ it so it fills the entire user interface. Then add constraints by choosing Editor\
    \ ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints at the bottom\
    \ half of the menu under the All Views in Container category.\n\nThe next step\
    \ is to connect the user interface items to the Swift code in the `ViewController.swift`\
    \ file. To do this, follow these steps:\n\n1. Click the `Main.storyboard` file\
    \ in the Navigator pane.\n2. Click the Assistant Editor icon or choose View ➤\
    \ Assistant Editor ➤ Show Assistant Editor to display the `Main.storyboard` and\
    \ the `ViewController.swift` file side by side.\n3. Move the mouse pointer over\
    \ the `ARSCNView`, hold down the Control key, and Ctrl-drag under the class `ViewController`\
    \ line.\n4. Release the Control key and the left mouse button. A popup menu appears.\n\
    5. Click in the Name text field and type `sceneView`, then click the Connect button.\
    \ Xcode creates an `IBOutlet` as shown here:\n\n```\n@IBOutlet var sceneView:\
    \ ARSCNView!\n```\n\nEdit the `viewDidLoad` function so it looks like this:\n\n\
    ```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n    sceneView.debugOptions\
    \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    sceneView.delegate = self\n    sceneView.session.run(configuration)\n}\n\
    ```"
