    camera on the iPhone and iPad now rivals dedicated digital cameras of just a few
    years ago. Many professional photographers and even filmmakers use the iPhone
    camera instead of expensive, dedicated digital or film cameras. The high quality
    resolution of today’s mobile cameras have also helped make augmented reality possible.


    Finally, the displays on mobile devices also offer high resolution. Not only can
    the iPhone and iPad screens display sharp images of the real world around you,
    but they can also display augmented reality data on the screens as well. The combination
    of fast and small processors and high-resolution cameras and displays has made
    augmented reality possible on mobile devices such as the iPhone and iPad. Combine
    these features with motion tracking and iOS devices have all the technical capabilities
    necessary to display augmented reality on an iPhone or iPad.


    One of the earliest uses for augmented reality appeared with the game Pokemon
    GO. Instead of limiting the game to a virtual cartoon world trapped within the
    confines of your screen, Pokemon GO lets players hunt for cartoon Pokemon characters
    in the real world. By simply holding up your iPhone or iPad, you could aim your
    iOS device’s camera at the ground, in a tree, or on a couch to look for cartoon
    Pokemon characters, as shown in Figure [1-4](#469983_1_En_1_Chapter.xhtml#Fig4).


    ![../images/469983_1_En_1_Chapter/469983_1_En_1_Fig4_HTML.jpg](images/469983_1_En_1_Chapter/469983_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Pokemon GO displays cartoon Pokemon characters overlaid on the real world


    ### Introducing ARKit


    With the technical capabilities available in the latest iOS devices, augmented
    reality was ready for mobile devices. The big problem was tackling the complexity
    of creating apps that could use augmented reality. To create an augmented reality
    app, you had to create your own algorithms for detecting objects in the real world
    and displaying virtual objects in that image. That also meant tracking camera
    positioning and movement of the iOS device itself. Because of this complexity,
    augmented reality was possible, but too difficult for most developers to use.


    That’s why Apple created ARKit as a software framework to make creating augmented
    reality apps much simpler. ARKit takes care of the complexity of making augmented
    reality so you can focus on the actual use of your app, such as displaying cartoon
    monsters on the screen like Pokemon GO or displaying data on the screen like a
    pilot’s heads-up display.


    Apple didn’t invent augmented reality, nor did they create ARKit on their own.
    Instead, Apple has been buying augmented reality companies over the years and
    incorporating these other companies’ technologies into a unified framework called
    ARKit specifically designed to help iOS developers create augmented reality apps.


    One of Apple’s major augmented reality acquisitions happened in 2015 when they
    acquired a German augmented reality company called Metaio. To this day you can
    still search for “Metaio” on search engines like Google or Bing and find old videos
    and images showing Metaio’s technology in action, much of which will continue
    being integrated into Apple’s ARKit framework.


    IKEA initially used Metaio’s technology to create their augmented reality app
    that allowed you to place furniture to see how it would look in your own home.
    By aiming your camera at the floor, you can place a virtual image of furniture
    in your home so you can see how a piece of furniture might look before you buy
    it and bring it home. You can download the IKEA Place app and try it out in your
    house, as shown in Figure [1-5](#469983_1_En_1_Chapter.xhtml#Fig5).


    ![../images/469983_1_En_1_Chapter/469983_1_En_1_Fig5_HTML.jpg](images/469983_1_En_1_Chapter/469983_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    IKEA Place is an augmented reality app that lets you place virtual furniture in
    the real world


    Ferrari used Metaio’s augmented reality technology to let prospective buyers view
    a Ferrari in the showroom, but use augmented reality to display that car in different
    colors. By simply pointing an iPhone or iPad at a Ferrari in the showroom, you
    could change the color on that car to see what color you might like best, even
    if that particular color car wasn’t available to examine physically in the showroom.


    Since many car enthusiasts want to know what’s inside a car, Ferrari’s augmented
    reality app also let users aim an iPhone or iPad at a car and view the internal
    features such as what the engine looks like, as shown in Figure [1-6](#469983_1_En_1_Chapter.xhtml#Fig6).


    ![../images/469983_1_En_1_Chapter/469983_1_En_1_Fig6_HTML.jpg](images/469983_1_En_1_Chapter/469983_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Ferrari’s augmented reality app lets users view the internal features of a car


    The Berlin Wall Memorial created an interesting augmented reality app with Metaio’s
    technology that let you point an iPhone or iPad at a static image such as a window
    in a boarded-up building that bordered the Berlin Wall. Then the augmented reality
    app would show a historical video showing how people climbed out of that specific
    window in their attempt to escape East Berlin and make it to freedom in West Berlin.'
