  trans: '

    # 4. 使用形状


    在上一章中，我们使用了一个调试选项，让我们的增强现实应用能够显示世界原点，该原点基于 iOS 设备的当前位置展示 x、y 和 z 轴。基于这个世界原点，我们可以通过定义其
    x、y 和 z 坐标，将虚拟物体放置在增强现实视图中。


    ARKit 提供了另一个调试选项，称为特征点。与世界原点类似，你只会使用特征点来调试你的应用。当需要发布应用时，你将移除世界原点和特征点的显示。


    要让特征点出现，请如下修改 `debugOptions` 行：


    ```

    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]

    ```


    这行代码告诉 Xcode 同时显示世界原点（`.showWorldOrigin`）和特征点（`.showFeaturePoints`）。


    在我们之前的应用中，我们可以与世界原点一起创建黄色球体，然后重置跟踪，让世界原点出现在 iOS 设备的新当前位置。通常，当你重置跟踪并删除任何现有的虚拟对象（比如我们的黄色球体）时，你也希望移除锚点。


    锚点定义了虚拟对象在增强现实视图中的位置。我们之前的应用只是从视图中移除了虚拟对象，但是一旦我们删除了黄色球体，我们也不再需要知道球体之前的位置或锚点，所以我们也应该删除它。


    为了让虚拟对象的锚点消失，我们只需要在重置世界跟踪时修改 `session.run` 行，如下所示：


    ```

    sceneView.session.run(configuration, options: [.resetTracking, .removeExistingAnchors])

    ```


    这段代码重置了世界原点（`.resetTracking`）并移除了定义虚拟对象位置的任何不可见锚点（`.removeExistingAnchors`）。


    要了解如何显示特征点（以及删除黄色球体的不可见锚点），请修改之前应用的代码，使整个 `ViewController.swift` 文件看起来像这样：


    ```

    import UIKit

    import SceneKit

    import ARKit

    class ViewController: UIViewController, ARSCNViewDelegate {

    @IBOutlet var sceneView: ARSCNView!

    @IBOutlet var Xslider: UISlider!

    @IBOutlet var Yslider: UISlider!

    @IBOutlet var Zslider: UISlider!

    let configuration = ARWorldTrackingConfiguration()

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    sceneView.delegate = self

    sceneView.showsStatistics = true

    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]

    }

    override func viewWillAppear(_ animated: Bool) {

    super.viewWillAppear(animated)

    sceneView.session.run(configuration)

    }

    @IBAction func addButton(_ sender: UIButton) {

    showShape()

    }

    @IBAction func resetButton(_ sender: UIButton) {

    sceneView.session.pause()

    sceneView.scene.rootNode.enumerateChildNodes { (node, _) in

    if node.name == "sphere" {

    node.removeFromParentNode()

    }

    }

    sceneView.session.run(configuration, options: [.resetTracking, .removeExistingAnchors])

    }

    func showShape() {

    let node = SCNNode()

    node.geometry = SCNSphere(radius: 0.05)

    node.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow

    node.position = SCNVector3(Xslider.value,Yslider.value,Zslider.value)

    node.name = "sphere"

    sceneView.scene.rootNode.addChildNode(node)

    }

    }

    ```


    点击运行按钮或选择 产品 ➤ 运行，同时通过 USB 线将 iOS 设备连接到你的 Macintosh。当应用运行时，你将看到特征点显示为黄色圆点，这表明
    ARKit 何时检测到现实世界中物体的表面。出现的点越多，ARKit 对该表面的检测就越好。


    如果你将增强现实应用的摄像头对准一个清晰可见的表面，比如桌面，以及对比鲜明的邻近物体，比如垂直的墙壁和水平的地板，你会看到更多的特征点出现，如图 4-1 所示。如果你从不同角度将摄像头对准同一区域，你可以看到
    ARKit 显示的特征点较少，这意味着它对附近区域的识别效果较差。


    ![../images/469983_1_En_4_Chapter/469983_1_En_4_Fig1_HTML.jpg](img/469983_1_En_4_Fig1_HTML.jpg)


    图 4-1 特征点显示了 ARKit 如何识别现实世界中的表面


    点击停止按钮或选择 产品 ➤ 停止 以停止应用运行。

    '
- fmt: '## Displaying Different Geometric Shapes


    Geometric shapes are the simplest types of virtual objects you can display in
    an augmented reality view. In the previous chapter, we created a sphere, but SceneKit
    actually offers several different types of geometric shapes to use. Each geometric
    shape may require you to specify different dimensions.


    For example, you can create a sphere by defining its radius, but to create a box,
    you need to define its width, height, and depth. The different geometric shapes
    available are:


    * `SCNFloor`

    * `SCNBox`

    * `SCNCapsule`

    * `SCNCone`

    * `SCNCylinder`

    * `SCNPlane`

    * `SCNPyramid`

    * `SCNTorus`

    * `SCNTube`


    All of these geometric shapes work alike in that you can define a color for their
    surface, as `UIColor.blue` or `UIColor.red`. By combining multiple geometric shapes,
    you can create simple virtual objects that appear within an augmented reality
    view.


    To create a sphere, we just needed to define its radius like this:


    ```

    node.geometry = SCNSphere(radius: 0.05)

    ```


    To create a box, we need to define its height, width, and length. In addition,
    you can also define the edges of the box to make them sharp or round. To modify
    the corner of a box, you need to define its chamfer radius. A radius of zero creates
    a sharp edge while non-zero values create a rounded edge. The higher the value,
    the rounder the edge.


    To see how to display a box instead of a sphere, follow these steps:


    1. Click the Stop button or choose Product ➤ Stop.

    2. Click on the `ViewController.swift` file of the current app that displays three
    sliders for defining the x, y, and z coordinates of a shape.

    3. Move the cursor to the front of the `node.geometry = SCNSphere(radius: 0.05)`
    line and type `//`, which turns the line into a comment. As soon as you type `//`
    in front of the line, Xcode dims the code like this:


    ```

    // node.geometry = SCNSphere(radius: 0.05)

    ```


    4. Type underneath this line the following code:


    ```

    node.geometry = SCNBox(width: 0.1, height: 0.2, length: 0.1, chamferRadius: 0)

    ```


    5. Replace where text `"sphere"` with `"shape"` in two places like this:


    ```

    if node.name == "shape" {

    node.removeFromParentNode()

    }

    ```


    and


    ```

    node.name = "shape"

    ```


    6. Connect an iOS device to your Macintosh through its USB cable.

    7. Click the Run button or choose Product ➤ Run.

    8. Adjust the x, y, and z sliders to change the location of the shape.

    9. Tap the Add button to see a yellow box appear in the augmented reality view.


    Notice that the `chamferRadius` is zero, which creates a sharp edge. If the `chamferRadius`
    is non-zero, this will create a more rounded edge. Change this value to 0.05 to
    create a rounded edge.


    Try defining different shapes with their dimensions as follows:


    * `node.geometry = SCNSphere(radius: 0.05)`

    * `node.geometry = SCNBox(width: 0.1, height: 0.2, length: 0.1, chamferRadius:
    0.05)`

    * `node.geometry = SCNTorus(ringRadius: 0.2, pipeRadius: 0.05)`

    * `node.geometry = SCNTube(innerRadius: 0.08, outerRadius: 0.1, height: 0.2)`

    * `node.geometry = SCNCapsule(capRadius: 0.06, height: 0.4)`

    * `node.geometry = SCNCylinder(radius: 0.04, height: 0.3)`

    * `node.geometry = SCNCone(topRadius: 0, bottomRadius: 0.05, height: 0.2)`

    * `node.geometry = SCNPyramid(width: 0.2, height: 0.4, length: 0.2)`

    * `node.geometry = SCNPlane(width: 0.2, height: 0.3)`


    Remember, just use one of these lines in your code at a time, not all of them.
    By experimenting with different shapes and dimensions, you can see how to create
    geometric objects of any size.


    Besides displaying a yellow color, try other colors such as brown, cyan, darkGray,
    gray, green, lightGray, magenta, orange, purple, red, or white like this:


    ```

    node.geometry?.firstMaterial?.diffuse.contents = UIColor.purple

    ```


    ## Displaying Text


    Besides displaying geometric shapes in augmented reality, you can also display
    text. When displaying text you can define a string to display along with the text’s
    font, size, and color.


    The first part to creating text is to define the string you want to display and
    its extrusion depth. The extrusion depth defines the thickness of the letters.
    An extrusion depth of zero creates a flat appearance while a non-zero value for
    the extrusion depth creates a thickness that makes letters visible when viewed
    from the side. To define a string and an extrusion depth, you need to use code
    like this:


    ```

    let text = SCNText(string: "Hello", extrusionDepth: 1)

    ```


    At this point, we’ve created text but we can’t see it. Just as we applied a color
    to a geometric shape, we need to choose a color for text as well. To do that,
    we need to define a material class like this:


    ```

    let material = SCNMaterial()

    ```


    Next, we need to choose a color for the material and diffuse it across the entire
    surface like this:


    ```

    material.diffuse.contents = UIColor.orange

    ```


    Finally, we need to apply this material color on the text itself. We can actually
    apply multiple materials to text where each item appears in an array. Since we’re
    just defining a single color, the array only contains the material color:


    ```

    text.materials = [material]

    ```


    Now that we’ve defined text and its outer appearance, the next step is to place
    that text in the augmented reality view as a node. That involves defining a node,
    the node’s x, y, and z coordinates, and its scale that defines a node’s width,
    height, and depth:


    ```

    let node = SCNNode()

    node.position = SCNVector3(Xslider.value, Yslider.value, Zslider.value)

    node.scale = SCNVector3(0.01, 0.01, 0.01)

    ```


    Finally, we need to define the node’s geometry as the text we defined using `SCNText`
    like this:


    ```

    node.geometry = text

    ```


    Finally, we need to add this node to the root node of the augmented reality scene:


    ```

    sceneView.scene.rootNode.addChildNode(node)

    ```


    To see how this code works to display orange text at x, y, and z coordinates you
    specify, follow these steps:


    1. Click the Stop button or choose Product ➤ Stop.

    2. Modify the World Tracking project or create a new project identical to the
    World Tracking project except give it a different name such as Node Placement
    Text.

    3. Modify the `ViewController.swift` file so the code looks like this:'
