  trans: "\n# 图像检测\n\nARKit 与现实世界交互的另一种方式是通过**图像检测**。图像检测涉及存储图像，然后在通过增强现实视图观看时，利用摄像头识别这些完全相同的图像。\n\
    \n图像检测与机器学习图像识别相似但又有不同。通过图像识别，应用可以识别从未见过的物品，例如不同款式的汽车、铅笔或电脑。而图像检测仅能识别已存储的图像。如果事先没有存储某张图像，图像检测就永远无法识别它。\n\
    \n图像检测非常实用，因为它能让应用识别一张固定图像，然后以不同方式做出响应，例如显示关于该图像的更多信息。举例来说，博物馆可能会提供一款增强现实应用，让用户将\
    \ iPhone 对准一幅画作。一旦应用识别出那幅画，它就能以用户的母语（如英语、西班牙语、阿拉伯语或日语）显示关于该画作的附加信息。\n\n为了学习图像检测，让我们按照以下步骤创建一个新的\
    \ Xcode 项目：\n\n1. 启动 Xcode。（请确保你使用的是 Xcode 10 或更高版本。）\n2. 选择“文件”➤“新建”➤“项目”。Xcode\
    \ 会要求你选择一个模板。\n3. 点击“iOS”类别。\n4. 点击“单视图应用”图标，然后点击“下一步”按钮。Xcode 会要求输入产品名称、组织名称、组织标识符和内容技术。\n\
    5. 点击“产品名称”文本字段，输入项目的描述性名称，例如`ImageDetection`。（具体名称不重要。）\n6. 点击“下一步”按钮。Xcode 会询问你希望将项目存储在哪里。\n\
    7. 选择一个文件夹，然后点击“创建”按钮。Xcode 会创建一个 iOS 项目。\n\n现在，按照以下步骤修改`Info.plist`文件，以允许访问摄像头并使用\
    \ ARKit：\n\n1. 在导航器面板中点击`Info.plist`文件。Xcode 会显示一个键、类型和值的列表。\n2. 点击展开三角形，展开“必需的设备功能”类别，以显示“项目\
    \ 0”。\n3. 将鼠标指针移动到“项目 0”上，显示一个加号（+）图标。\n4. 点击这个加号（+）图标，显示一个空白的“项目 1”。\n5. 在“项目\
    \ 1”行的“值”类别下输入`arkit`。\n6. 将鼠标指针移动到最后一行，显示一个加号（+）图标。\n7. 点击加号（+）图标以创建一个新行。会出现一个弹出菜单。\n\
    8. 选择“隐私 - 相机使用说明”。\n9. 在“隐私 - 相机使用说明”行的“值”类别下输入`AR 需要使用摄像头`。\n\n现在是时候按照以下步骤修改`ViewController.swift`文件以使用\
    \ ARKit 和 SceneKit 了：\n\n1. 在导航器面板中点击`ViewController.swift`文件。\n2. 编辑`ViewController.swift`文件，使其看起来像这样：\n\
    \n```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController: UIViewController,\
    \ ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // 在这里进行视图加载后的任何额外设置，通常来自\
    \ nib 文件\n    }\n}\n```\n\n为了在我们的应用中显示增强现实视图，需要添加一个`ARSCNView`，并将其扩展以填满整个用户界面。然后通过选择“编辑器”➤“解决自动布局问题”➤“重置为建议的约束”（位于菜单下半部分的“容器中的所有视图”类别下）来添加约束。\n\
    \n下一步是将用户界面元素连接到`ViewController.swift`文件中的 Swift 代码。为此，请按照以下步骤操作：\n\n1. 在导航器面板中点击`Main.storyboard`文件。\n\
    2. 点击“助理编辑器”图标，或选择“视图”➤“助理编辑器”➤“显示助理编辑器”，以并排显示`Main.storyboard`和`ViewController.swift`文件。\n\
    3. 将鼠标指针移动到`ARSCNView`上，按住 Control 键，然后从该类`ViewController`行下方 Ctrl-拖拽。\n4. 松开\
    \ Control 键和鼠标左键。会出现一个弹出菜单。\n5. 点击“名称”文本字段，输入`sceneView`，然后点击“连接”按钮。Xcode 会创建一个`IBOutlet`，如下所示：\n\
    \n```\n@IBOutlet var sceneView: ARSCNView!\n```\n\n编辑`viewDidLoad`函数，使其看起来像这样：\n\
    \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // 在这里进行视图加载后的任何额外设置，通常来自\
    \ nib 文件\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    sceneView.delegate = self\n    sceneView.session.run(configuration)\n}\n\
    ```\n"
- fmt: "# Storing Images\n\nBefore ARKit can recognize physical objects in the real\
    \ world, you need to store images of those items in your app. In addition to storing\
    \ an image, you must also specify the width and height of that real-world object.\
    \ That way when ARKit spots that actual item through the iOS device’s camera,\
    \ it can compare that image with its stored image. If they match in both appearance\
    \ and size, then ARKit can recognize that real-world item.\n\nFirst, you must\
    \ capture an image of the item you want to detect. Since these images need to\
    \ be high resolution, you can capture public domain images off the Internet such\
    \ as at NASA (`www.nasa.gov`). Then you can display these images on your computer\
    \ screen for your iOS device to recognize. Once you have an image on your Macintosh,\
    \ you’ll need to store it in your Xcode project.\n\nTo store one or more images\
    \ that you want ARKit to recognize, follow these steps:\n\n1. Click in the Width\
    \ and Height text fields and type the actual width and height of the real item.\
    \ You can also click the Units popup menu to change the default measurement unit\
    \ from meters to something else, such as inches or centimeters.\n\n![images/469983_1_En_14_Chapter/469983_1_En_14_Fig2_HTML.jpg](images/469983_1_En_14_Chapter/469983_1_En_14_Fig2_HTML.jpg)\n\
    \n**Figure 14-2** Defining the width and height of the item to recognize\n\n2.\
    \ Drag and drop the images into your newly added AR Resource folder that you want\
    \ ARKit to recognize in the real world. Xcode displays a yellow alert icon in\
    \ the bottom-right corner of your images.\n\n3. Click the Attributes Inspector\
    \ icon or choose View ➤ Inspectors ➤ Show Attributes Inspector. An AR Reference\
    \ Image pane appears, as shown in Figure 14-2.\n\n![images/469983_1_En_14_Chapter/469983_1_En_14_Fig1_HTML.jpg](images/469983_1_En_14_Chapter/469983_1_En_14_Fig1_HTML.jpg)\n\
    \n**Figure 14-1** The yellow plane blocks the green box from view\n\n4. Click\
    \ the `Assets.xcassets` folder in the Navigator pane.\n\n5. Click + icon in the\
    \ bottom of the pane. A popup menu appears.\n\n6. Choose New AR Resource Group,\
    \ as shown in Figure 14-1. Xcode creates an AR Resources folder.\n\nOnce we’ve\
    \ added one or more images of the real objects we want ARKit to recognize, we\
    \ need to write actual Swift code to recognize the image when spotted through\
    \ an iOS device’s camera.\n\nFirst, we need to access the folder containing the\
    \ images of items to recognize. This folder can be called anything such as “AR\
    \ Resources”. This means using a `guard` statement to verify that the image folder\
    \ even exists like this:\n\n```\nguard let storedImages = ARReferenceImage.referenceImages(inGroupNamed:\
    \ \"AR Resources\", bundle: nil) else {\n    fatalError(\"Missing AR Resources\
    \ images\")\n}\n```\n\nThis code looks for a folder named `AR Resources`. If it\
    \ fails to find it, it ends the program and displays “Missing AR Resources Images.”\
    \ If it finds an `AR Resources` folder, then we can define where the detected\
    \ images are stored like this:\n\n```\nconfiguration.detectionImages = storedImages\n\
    ```\n\nFinally, we need to use the `didAdd renderer` function, which runs every\
    \ time the camera updates its view. If the camera detects a recognized image (`ARImageAnchor`)\
    \ then we can verify this by printing `\"Item recognized\"` like this:\n\n```\n\
    func renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:\
    \ ARAnchor) {\n    if anchor is ARImageAnchor {\n        print(\"Item recognized\"\
    )\n    }\n}\n```\n\nThe entire `ViewController.swift` file should look like this:\n\
    \n```\nimport UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController: UIViewController,\
    \ ARSCNViewDelegate {\n    @IBOutlet var sceneView: ARSCNView!\n    let configuration\
    \ = ARWorldTrackingConfiguration()\n\n    override func viewDidLoad() {\n    \
    \    super.viewDidLoad()\n        // Do any additional setup after loading the\
    \ view, typically from a nib.\n        sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
    \ ARSCNDebugOptions.showFeaturePoints]\n        sceneView.delegate = self\n\n\
    \        guard let storedImages = ARReferenceImage.referenceImages(inGroupNamed:\
    \ \"AR Resources\", bundle: nil) else {\n            fatalError(\"Missing AR Resources\
    \ images\")\n        }\n\n        configuration.detectionImages = storedImages\n\
    \        sceneView.session.run(configuration)\n    }\n\n    func renderer(_ renderer:\
    \ SCNSceneRenderer, didAdd node: SCNNode, for anchor: ARAnchor) {\n        if\
    \ anchor is ARImageAnchor {\n            print(\"Item recognized\")\n        }\n\
    \    }\n}\n```\n\nTo test this app, place the item that you took a picture of\
    \ and stored in the `AR Resources` folder and put that item on a table or floor.\
    \ Then follow these steps:\n\n1. Connect an iOS device to your Macintosh through\
    \ its USB cable.\n\n2. Click the Run button or choose Product ➤ Run. The first\
    \ time you run this app, it will ask permission to access the camera so give it\
    \ permission.\n\n3. Load the picture on your computer that you stored in your\
    \ project’s `AR Resources` folder.\n\n4. Aim the iOS device’s camera at the screen\
    \ that displays the picture you want ARKit to recognize. When ARKit recognizes\
    \ the image, it displays `\"Item recognized\"` in the debug area of Xcode.\n\n\
    5. Click the Stop button or choose Product ➤ Stop."
  raw: '## Storing Images


    Before ARKit can recognize physical objects in the real world, you need to store
    images of those items in your app. In addition to storing an image, you must also
    specify the width and height of that real-world object. That way when ARKit spots
    that actual item through the iOS device’s camera, it can compare that image with
    its stored image. If they match in both appearance and size, then ARKit can recognize
    that real-world item.


    First, you must capture an image of the item you want to detect. Since these images
    need to be high resolution, you can capture public domain images off the Internet
    such as at NASA ( [`www.nasa.gov`](http://www.nasa.gov) ). Then you can display
    these images on your computer screen for your iOS device to recognize. Once you
    have an image on your Macintosh, you’ll need to store it in your Xcode project.


    To store one or more images that you want ARKit to recognize, follow these steps:


    1.  Click in the Width and Height text fields and type the actual width and height
    of the real item. You can also click the Units popup menu to change the default
    measurement unit from meters to something else, such as inches or centimeters.


    ![../images/469983_1_En_14_Chapter/469983_1_En_14_Fig2_HTML.jpg](images/469983_1_En_14_Chapter/469983_1_En_14_Fig2_HTML.jpg)


    Figure 14-2


    Defining the width and height of the item to recognize


    1.  Drag and drop the images into your newly added AR Resource folder that you
    want ARKit to recognize in the real world. Xcode displays a yellow alert icon
    in the bottom-right corner of your images.


    2.  Click the Attributes Inspector icon or choose View ➤ Inspectors ➤ Show Attributes
    Inspector. An AR Reference Image pane appears, as shown in Figure [14-2](#469983_1_En_14_Chapter.xhtml#Fig2).


    ![../images/469983_1_En_14_Chapter/469983_1_En_14_Fig1_HTML.jpg](images/469983_1_En_14_Chapter/469983_1_En_14_Fig1_HTML.jpg)


    Figure 14-1


    The yellow plane blocks the green box from view


    1.  Click the `Assets.xcassets` folder in the Navigator pane.


    2.  Click + icon in the bottom of the pane. A popup menu appears.


    3.  Choose New AR Resource Group, as shown in Figure [14-1](#469983_1_En_14_Chapter.xhtml#Fig1).
    Xcode creates an AR Resources folder.


    Once we’ve added one or more images of the real objects we want ARKit to recognize,
    we need to write actual Swift code to recognize the image when spotted through
    an iOS device’s camera.


    First, we need to access the folder containing the images of items to recognize.
    This folder can be called anything such as “AR Resources”. This means using a
    `guard` statement to verify that the image folder even exists like this:


    ```

    guard let storedImages =  ARReferenceImage.referenceImages(inGroupNamed: "AR Resources",
    bundle: nil) else {

    fatalError("Missing AR Resources images")

    }

    ```


    This code looks for a folder named `AR Resources` . If it fails to find it, it
    ends the program and displays “Missing AR Resources Images.” If it finds an `AR
    Resources` folder, then we can define where the detected images are stored like
    this:


    ```

    configuration.detectionImages = storedImages

    ```


    Finally, we need to use the `didAdd renderer` function, which runs every time
    the camera updates its view. If the camera detects a recognized image (`ARImageAnchor`)
    then we can verify this by printing `"Item recognized"` like this:


    ```

    func renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:
    ARAnchor) {

    if anchor is ARImageAnchor {

    print("Item recognized")

    }

    }

    ```


    The entire `ViewController.swift` file should look like this:


    ```

    import UIKit

    import SceneKit

    import ARKit

    class ViewController: UIViewController, ARSCNViewDelegate  {

    @IBOutlet var sceneView: ARSCNView!

    let configuration = ARWorldTrackingConfiguration()

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]

    sceneView.delegate = self

    guard let storedImages =  ARReferenceImage.referenceImages(inGroupNamed: "AR Resources",
    bundle: nil) else {

    fatalError("Missing AR Resources images")

    }

    configuration.detectionImages = storedImages

    sceneView.session.run(configuration)

    }

    func renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:
    ARAnchor) {

    if anchor is ARImageAnchor {

    print("Item recognized")

    }

    }

    }

    ```


    To test this app, place the item that you took a picture of and stored in the
    `AR Resources` folder and put that item on a table or floor. Then follow these
    steps:


    1.  Connect an iOS device to your Macintosh through its USB cable.


    2.  Click the Run button or choose Product ➤ Run. The first time you run this
    app, it will ask permission to access the camera so give it permission.


    3.  Load the picture on your computer that you stored in your project’s `AR Resources`
    folder.


    4.  Aim the iOS device’s camera at the screen that displays the picture you want
    ARKit to recognize. When ARKit recognizes the image, it displays `"Item recognized"`
    in the debug area of Xcode.


    5.  Click the Stop button or choose Product ➤ Stop.'
  trans: "\n# 存储图像\n\n在 ARKit 能够识别现实世界中的物理对象之前，你需要在应用中存储这些物品的图像。除了存储图像，你还必须指定该现实世界物品的宽度和高度。这样，当\
    \ ARKit 通过 iOS 设备的摄像头发现实际物品时，它就可以将该图像与存储的图像进行比较。如果外观和尺寸都匹配，那么 ARKit 就能识别出该现实世界物品。\n\
    \n首先，你必须捕获要检测物品的图像。由于这些图像需要高分辨率，你可以从互联网上获取公共领域的图像，例如 NASA 官网（`www.nasa.gov`）。然后，你可以将这些图像显示在电脑屏幕上，供\
    \ iOS 设备识别。当你的 Mac 上有了图像后，你需要将其存储到 Xcode 项目中。\n\n要存储一个或多个你希望 ARKit 识别的图像，请遵循以下步骤：\n\
    \n1.  点击宽度和高度文本字段，并输入实际物品的宽度和高度。你也可以点击单位弹出菜单，将默认的测量单位从米更改为其他单位，例如英寸或厘米。\n\n![images/469983_1_En_14_Chapter/469983_1_En_14_Fig2_HTML.jpg](img/469983_1_En_14_Fig2_HTML.jpg)\n\
    \n**图 14-2** 定义要识别物品的宽度和高度\n\n2.  将你希望 ARKit 在现实世界中识别的图像拖放到新添加的 AR 资源文件夹中。Xcode\
    \ 会在图像右下角显示一个黄色警告图标。\n\n3.  点击属性检查器图标，或选择 视图 ➤ 检查器 ➤ 显示属性检查器。将出现一个 AR 参考图像面板，如图\
    \ 14-2 所示。\n\n![images/469983_1_En_14_Chapter/469983_1_En_14_Fig1_HTML.jpg](img/469983_1_En_14_Fig1_HTML.jpg)\n\
    \n**图 14-1** 黄色平面遮挡了绿色盒子\n\n4.  在导航面板中点击 `Assets.xcassets` 文件夹。\n\n5.  点击面板底部的\
    \ + 图标。将出现一个弹出菜单。\n\n6.  选择新建 AR 资源组，如图 14-1 所示。Xcode 会创建一个 AR 资源文件夹。\n\n一旦我们添加了期望\
    \ ARKit 识别的现实物品的一个或多个图像，就需要编写实际的 Swift 代码，使其在通过 iOS 设备摄像头检测到图像时进行识别。\n\n首先，我们需要访问包含要识别物品图像的文件夹。这个文件夹可以命名为任何名称，例如\"\
    AR Resources\"。这意味着要使用一个 `guard` 语句来验证图像文件夹是否存在，如下所示：\n\n```\nguard let storedImages\
    \ = ARReferenceImage.referenceImages(inGroupNamed: \"AR Resources\", bundle: nil)\
    \ else {\n    fatalError(\"Missing AR Resources images\")\n}\n```\n\n这段代码会查找名为\
    \ `AR Resources` 的文件夹。如果找不到，程序将终止并显示\"Missing AR Resources Images\"。如果找到了 `AR\
    \ Resources` 文件夹，那么我们可以像这样定义检测到的图像的存储位置：\n\n```\nconfiguration.detectionImages\
    \ = storedImages\n```\n\n最后，我们需要使用 `didAdd renderer` 函数，该函数在摄像头每次更新其视图时运行。如果摄像头检测到已识别的图像（`ARImageAnchor`），那么我们可以通过打印\
    \ `\"Item recognized\"` 来验证这一点，操作如下：\n\n```\nfunc renderer(_ renderer: SCNSceneRenderer,\
    \ didAdd node: SCNNode, for anchor: ARAnchor) {\n    if anchor is ARImageAnchor\
    \ {\n        print(\"Item recognized\")\n    }\n}\n```\n\n整个 `ViewController.swift`\
    \ 文件应如下所示：\n\n```\nimport UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController:\
    \ UIViewController, ARSCNViewDelegate {\n    @IBOutlet var sceneView: ARSCNView!\n\
    \    let configuration = ARWorldTrackingConfiguration()\n\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        // 加载视图后的其他设置（通常来自 nib 文件）\n       \
    \ sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \        sceneView.delegate = self\n\n        guard let storedImages = ARReferenceImage.referenceImages(inGroupNamed:\
    \ \"AR Resources\", bundle: nil) else {\n            fatalError(\"Missing AR Resources\
    \ images\")\n        }\n\n        configuration.detectionImages = storedImages\n\
    \        sceneView.session.run(configuration)\n    }\n\n    func renderer(_ renderer:\
    \ SCNSceneRenderer, didAdd node: SCNNode, for anchor: ARAnchor) {\n        if\
    \ anchor is ARImageAnchor {\n            print(\"Item recognized\")\n        }\n\
    \    }\n}\n```\n\n要测试此应用，请将你拍摄并存储在 `AR Resources` 文件夹中的物品放置在桌子或地板上。然后按照以下步骤操作：\n\
    \n1.  通过 USB 线缆将 iOS 设备连接到 Mac。\n\n2.  点击运行按钮，或选择 产品 ➤ 运行。首次运行此应用时，系统会请求访问摄像头的权限，请授予该权限。\n\
    \n3.  在你的电脑上加载存储在你的项目的 `AR Resources` 文件夹中的图片。\n\n4.  将 iOS 设备的摄像头对准显示你希望 ARKit\
    \ 识别的图片的屏幕。当 ARKit 识别出图像时，它会在 Xcode 的调试区域中显示 `\"Item recognized\"`。\n\n5.  点击停止按钮，或选择\
    \ 产品 ➤ 停止。\n"
- fmt: "# Detecting Multiple Images\n\nJust recognizing a single image would be limiting.\
    \ That’s why to recognize multiple images, an app just needs to store multiple\
    \ images in its `AR Resources` folder. Now an app will be able to recognize different\
    \ images and respond based on what image it recognizes.\n\nTo identify which particular\
    \ image ARKit recognizes, you can give each image a unique name. Now each time\
    \ the app recognizes an image, it can retrieve the name of that image to determine\
    \ exactly which image is in front of the iOS device’s camera.\n\nWhen you store\
    \ an image in the `AR Resources` folder, you must not only define its width and\
    \ height, but also its name, which can be any arbitrary, descriptive name, as\
    \ shown in Figure 14-3.\n\n![../images/469983_1_En_14_Chapter/469983_1_En_14_Fig3_HTML.jpg](images/469983_1_En_14_Chapter/469983_1_En_14_Fig3_HTML.jpg)\n\
    \n**Figure 14-3** Every image needs a unique name\n\nOnce you’ve added two or\
    \ more images into the `AR Resources` folder, you can retrieve the `name` property\
    \ of a recognized image to determine which image currently appears in front of\
    \ the iOS device’s camera.\n\nTo see how to identify a recognized image, let’s\
    \ modify the `ImageDetection` project by following these steps:\n\n1.  Drag and\
    \ drop a second image into the `AR Resources` folder. Make sure you give that\
    \ second image a unique name so both stored images have different names.\n\n2.\
    \  Underneath the `class ViewController` line, create a structure like this:\n\
    \n```\nstruct Images {\n    var title: String\n    var info: String\n}\n```\n\n\
    3.  Next, create an empty array to hold this structure like this:\n\n```\nvar\
    \ imageArray: [Images] = []\n```\n\n4.  In the `viewDidLoad` function, add the\
    \ following function call:\n\n```\ngetData()\n```\n\n5.  At the bottom of the\
    \ `ViewController.swift` file, write the following `getData` function. In this\
    \ example, the project contains two pictures of rockets so the text in the `getData`\
    \ function reflects this, but you can type any text you want that best corresponds\
    \ with the two images stored in your project:\n\n```\nfunc getData() {\n    let\
    \ item1 = Images(title: \"CRS-15 SpaceX rocket\", info: \"Commercial Resupply\
    \ Service\")\n    let item2 = Images(title: \"Saturn V rocket\", info: \"Apollo\
    \ moon launch vehicle\")\n    imageArray.append(item1)\n    imageArray.append(item2)\n\
    }\n```\n\nThe `getData` function creates two structures and fills the elements\
    \ of those structures with text for the `title` and `info` properties. Then it\
    \ stores that structure into an array. Now we need to use the `name` property\
    \ of each image to identify what image the app currently recognizes.\n\n6.  Write\
    \ the following `nodeFor renderer` function:\n\n```\nfunc renderer(_ renderer:\
    \ SCNSceneRenderer, nodeFor anchor: ARAnchor) -> SCNNode? {\n    guard let imageAnchor\
    \ = anchor as? ARImageAnchor else { return nil }\n    switch imageAnchor.referenceImage.name\
    \ {\n    case \"CRS-15\":\n        print(imageArray[0].title)\n        print(imageArray[0].info)\n\
    \    case \"SaturnV\":\n        print(imageArray[1].title)\n        print(imageArray[1].info)\n\
    \    default:\n        print(\"Nothing found\")\n    }\n    return node\n}\n```\n\
    \nThis function runs when it recognizes an image (`ARImageAnchor`). Then it uses\
    \ the `name` property of the recognized image to determine which information to\
    \ display. The entire `ViewController.swift` file should look like this:\n\n```\n\
    import UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController: UIViewController,\
    \ ARSCNViewDelegate  {\n    @IBOutlet var sceneView: ARSCNView!\n    let configuration\
    \ = ARWorldTrackingConfiguration()\n    \n    struct Images {\n        var title:\
    \ String\n        var info: String\n    }\n    \n    var imageArray: [Images]\
    \ = []\n    \n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        // Do any additional setup after loading the view, typically from a nib.\n\
    \        sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \        sceneView.delegate = self\n        \n        guard let storedImages =\
    \ ARReferenceImage.referenceImages(inGroupNamed: \"AR Resources\", bundle: nil)\
    \ else {\n            fatalError(\"Missing AR Resources images\")\n        }\n\
    \        configuration.detectionImages = storedImages\n        \n        getData()\n\
    \        sceneView.session.run(configuration)\n    }\n    \n    func renderer(_\
    \ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor: ARAnchor) {\n\
    \        if anchor is ARImageAnchor {\n            print(\"Item recognized\")\n\
    \        }\n    }\n    \n    func renderer(_ renderer: SCNSceneRenderer, nodeFor\
    \ anchor: ARAnchor) -> SCNNode? {\n        guard let imageAnchor = anchor as?\
    \ ARImageAnchor else { return nil }\n        switch imageAnchor.referenceImage.name\
    \ {\n        case \"CRS-15\":\n            print(imageArray[0].title)\n      \
    \      print(imageArray[0].info)\n        case \"SaturnV\":\n            print(imageArray[1].title)\n\
    \            print(imageArray[1].info)\n        default:\n            print(\"\
    Nothing found\")\n        }\n        let node = SCNNode()\n        node.addChildNode(planeNode)\n\
    \        return node\n    }\n    \n    func getData() {\n        let item1 = Images(title:\
    \ \"CRS-15 SpaceX rocket\", info: \"Commercial Resupply Service\")\n        let\
    \ item2 = Images(title: \"Saturn V rocket\", info: \"Apollo moon launch vehicle\"\
    )\n        imageArray.append(item1)\n        imageArray.append(item2)\n    }\n\
    }\n```\n\nTo test this code, follow these steps:\n\n1.  Connect an iOS device\
    \ to your Macintosh through its USB cable.\n\n2.  Click the Run button or choose\
    \ **Product ➤ Run**.\n\n3.  Point the iOS device’s camera at one of the images\
    \ stored in the app’s `AR Resources` folder.\n\n4.  The Xcode debug area displays\
    \ text related to your image.\n\n5.  Click the Stop button or choose **Product\
    \ ➤ Stop**."
