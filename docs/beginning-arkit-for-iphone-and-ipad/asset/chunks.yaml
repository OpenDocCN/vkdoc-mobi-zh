- fmt: '# Scanning an Object


    The quality of your app’s ability to detect an object depends on accurate scanning
    of that object beforehand. Scanning requires a device capable of running iOS 12
    with at least an A9 processor (iPhone 6s, iPhone 6s Plus, iPhone SE, and iPad
    2017). The more current the device (higher resolution camera, faster processor,
    etc.), the better the reference data the scanning will capture.


    To increase the accuracy of your scanning, place the object you want to detect
    on a flat surface free of any additional items. That way the scanning can focus
    solely on the object you want to detect.


    First, you need to install Apple’s ARKit Scanner app on an iOS 12 device. To get
    this ARKit Scanner app, follow these steps:


    1. Visit `https://developer.apple.com/documentation/arkit/scanning_and_detecting_3d_objects`
    and download the `ScanningApp`, which includes the Swift source code.

    2. Open this `ScanningApp` project into Xcode.

    3. Connect an iOS 12 device to your Macintosh using a USB cable.

    4. Click the Run button or choosing Product ➤ Run. This installs the ARKit Scanner
    app on your iOS device.

    5. Click the Stop button or choose Product ➤ Stop. At this point, you can disconnect
    the iOS 12 device from your Macintosh.


    Once you have Apple’s ARKit Scanner installed on an iOS 12 device, you can start
    scanning objects. To scan an item, follow these steps:


    1. Place the object you want your app to detect on a flat, well-lit surface that’s
    free of any other objects.

    2. Run the ARKit Scanner app on your iOS 12 device.

    3. Point the iOS device’s camera at the object until a cartoon bounding box encloses
    the object you want to detect, as shown in Figure 16-3.


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig3_HTML.jpg](images/469983_1_En_16_Chapter/469983_1_En_16_Fig3_HTML.jpg)


    Figure 16-3: A bounding box defines the area of the object to detect


    4. When the object appears centered inside the bounding box, tap the Next button.
    The ARKit Scanner app displays the bounding box around your object along with
    measurement information about that object, as shown in Figure 16-4.


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig4_HTML.jpg](images/469983_1_En_16_Chapter/469983_1_En_16_Fig4_HTML.jpg)


    Figure 16-4: The bounding box encloses the object you want to detect


    5. Tap the Scan button and move around the object. As you move, the app displays
    yellow planes along the sides and top of the bounding box to let you know which
    angles it can detect, as shown in Figure 16-5. The goal is to move your iOS device’s
    camera along all sides and the top of the object until yellow planes completely
    cover the bounding box.


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig5_HTML.jpg](images/469983_1_En_16_Chapter/469983_1_En_16_Fig5_HTML.jpg)


    Figure 16-5: As you scan the object, yellow planes show you which areas you’ve
    already scanned


    6. When yellow planes completely cover all sides of the bounding box, tap the
    Finish button. The ARKit Scanner app now displays the origin of the detected object
    that you can move if you wish, as shown in Figure 16-6.


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig6_HTML.jpg](images/469983_1_En_16_Chapter/469983_1_En_16_Fig6_HTML.jpg)


    Figure 16-6: After scanning an object, you can move its origin


    7. Move the origin by swiping your finger on the origin and then tap the Test
    button.

    8. Move the object to a new location and aim the iOS device’s camera at it to
    make sure the ARKit Scanner app can recognize the object, as shown in Figure 16-7.


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig7_HTML.jpg](images/469983_1_En_16_Chapter/469983_1_En_16_Fig7_HTML.jpg)


    Figure 16-7: Testing if object detection is successful or not


    9. On your Macintosh, open a Finder window and choose Go ➤ AirDrop to open an
    AirDrop window, as shown in Figure 16-8.


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig8_HTML.jpg](images/469983_1_En_16_Chapter/469983_1_En_16_Fig8_HTML.jpg)


    Figure 16-8: Turning on AirDrop on a Macintosh


    10. Tap the Share button in the ARKit Scanner screen. A popup window appears,
    letting you choose how you want to share the `.arobject` file, as shown in Figure
    16-9.


    ![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig9_HTML.jpg](images/469983_1_En_16_Chapter/469983_1_En_16_Fig9_HTML.jpg)


    Figure 16-9: Accessing AirDrop from an iOS device


    11. Tap the top gray circle that represents your Macintosh to transfer the `.arobject`
    file to the `Downloads` folder of your Macintosh.'
