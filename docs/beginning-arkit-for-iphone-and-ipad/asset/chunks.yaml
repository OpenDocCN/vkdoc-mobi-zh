- fmt: "### Detecting Objects in an App\n\nOnce you’ve transferred the `.arobject`\
    \ file to your Macintosh, you need to create an app that can detect the object\
    \ captured in that `.arobject` file. To detect objects, let’s create a new Xcode\
    \ project by following these steps:\n\n1. Start Xcode. (Make sure you’re using\
    \ Xcode 10 or greater.)\n2. Choose **File** ➤ **New** ➤ **Project**. Xcode asks\
    \ you to choose a template.\n3. Click the **iOS** category.\n4. Click the **Single\
    \ View App** icon and click the **Next** button. Xcode asks for a product name,\
    \ organization name, organization identifiers, and content technology.\n5. Click\
    \ in the **Product Name** text field and type a descriptive name for your project,\
    \ such as `ObjectDetection`. (The exact name does not matter.)\n6. Click the **Next**\
    \ button. Xcode asks where you want to store your project.\n7. Choose a folder\
    \ and click the **Create** button. Xcode creates an iOS project.\n\nNow modify\
    \ the `Info.plist` file to allow access to the camera and to use ARKit by following\
    \ these steps:\n\n1. Click the `Info.plist` file in the Navigator pane. Xcode\
    \ displays a list of keys, types, and values.\n2. Click the disclosure triangle\
    \ to expand the **Required Device Capabilities** category to display **Item 0**.\n\
    3. Move the mouse pointer over **Item 0** to display a plus (+) icon.\n4. Click\
    \ this plus (+) icon to display a blank **Item 1**.\n5. Type `arkit` under the\
    \ **Value** category in the **Item 1** row.\n6. Move the mouse pointer over the\
    \ last row to display a plus (+) icon.\n7. Click on the plus (+) icon to create\
    \ a new row. A popup menu appears.\n8. Choose **Privacy – Camera Usage Description**.\n\
    9. Type `AR needs to use the camera` under the **Value** category in the **Privacy\
    \ – Camera Usage Description** row.\n\nNow it’s time to modify the `ViewController.swift`\
    \ file to use ARKit and SceneKit by following these steps:\n\n1. Click on the\
    \ `ViewController.swift` file in the Navigator pane.\n2. Edit the `ViewController.swift`\
    \ file so it looks like this:\n\n```swift\nimport UIKit\nimport SceneKit\nimport\
    \ ARKit\n\nclass ViewController: UIViewController, ARSCNViewDelegate {\n    let\
    \ configuration = ARWorldTrackingConfiguration()\n    \n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        // Do any additional setup after loading\
    \ the view, typically from a nib.\n    }\n}\n```\n\nTo view augmented reality\
    \ in our app, add a single **ARKit SceneKit View** (`ARSCNView`) so it fills the\
    \ entire view. After you’ve designed your user interface, you need to add constraints.\
    \ To add constraints, choose **Editor** ➤ **Resolve Auto Layout Issues** ➤ **Reset\
    \ to Suggested Constraints** at the bottom half of the menu under the **All Views\
    \ in Container** category.\n\nThe next step is to connect the user interface items\
    \ to the Swift code in the `ViewController.swift` file. To do this, follow these\
    \ steps:\n\n![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig10_HTML.jpg](images/469983_1_En_16_Chapter/469983_1_En_16_Fig10_HTML.jpg)\n\
    \n**Figure 16-10** – Displaying an `.arobject` file in the AR Resources folder\n\
    \n1. Click the `Main.storyboard` file in the Navigator pane.\n2. Click the **Assistant\
    \ Editor** icon or choose **View** ➤ **Assistant Editor** ➤ **Show Assistant Editor**\
    \ to display the `Main.storyboard` and the `ViewController.swift` file side by\
    \ side.\n3. Move the mouse pointer over the `ARSCNView`, hold down the **Control**\
    \ key, and Ctrl-drag under the `class ViewController` line.\n4. Release the **Control**\
    \ key and the left mouse button. A popup menu appears.\n5. Click in the **Name**\
    \ text field and type `sceneView`, then click the **Connect** button. Xcode creates\
    \ an `IBOutlet`, as shown here:\n\n```swift\n@IBOutlet var sceneView: ARSCNView!\n\
    ```\n\n6. Edit the `viewDidLoad` function so it looks like this:\n\n```swift\n\
    override func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n    sceneView.debugOptions\
    \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    sceneView.delegate = self\n    sceneView.session.run(configuration)\n}\n\
    ```\n\nARKit can only recognize physical objects in the real world after you have\
    \ stored `.arobject` files of those items in your app. To store one or more `.arobject`\
    \ files that you want ARKit to recognize, follow these steps:\n\n1. Click the\
    \ `Assets.xcassets` folder in the Navigator pane.\n2. Click **+** icon in the\
    \ bottom of the pane. A popup menu appears.\n3. Choose **New AR Resource Group**.\
    \ Xcode creates an `AR Resources` folder.\n4. Drag and drop the `.arobject` file\
    \ into the `AR Resources` folder, as shown in **Figure 16-10**.\n\nOnce we’ve\
    \ added one or more `.arobject` files of the real objects we want ARKit to recognize,\
    \ we need to write actual Swift code to recognize the object when spotted through\
    \ an iOS device’s camera.\n\nFirst, we need to access the folder containing the\
    \ images of items to recognize. This folder can be called anything, such as `AR\
    \ Resources`. This means using a `guard` statement to verify that the `AR Resources`\
    \ folder even exists like this:\n\n```swift\nguard let storedObjects = ARReferenceObject.referenceObjects(inGroupNamed:\
    \ \"AR Resources\", bundle: nil) else {\n    fatalError(\"Missing AR Resources\
    \ images\")\n}\n```\n\nThis code looks for a folder named `AR Resources`. If it\
    \ fails to find it, it ends the program and displays `\"Missing AR Resources images\"\
    `. If it finds an `AR Resources` folder, then we can define where the detected\
    \ `.arobject` files are stored like this:\n\n```swift\nconfiguration.detectionObjects\
    \ = storedObjects\n```\n\nNotice that this line of code uses `detectionObjects`\
    \ and the `guard` statement uses `ARReferenceObject.referenceObjects`.\n\nFinally,\
    \ we need to use the `didAdd renderer` function, which runs every time the camera\
    \ updates its view. If the camera detects a recognized object (`ARObjectAnchor`),\
    \ then we want to display a virtual object that appears near the detected object.\n\
    \nFirst, we need to make sure we detected a stored `.arobject` as an `ARObjectAnchor`\
    \ like this:\n\n```swift\nfunc renderer(_ renderer: SCNSceneRenderer, didAdd node:\
    \ SCNNode, for anchor: ARAnchor) {\n    if let objectAnchor = anchor as? ARObjectAnchor\
    \ {\n    }\n}\n```\n\nThen we can create a virtual object to appear over the detected\
    \ image. In this example, we’ll create text as follows:\n\n```swift\nlet movingImage\
    \ = SCNText(string: \"Object Detected\", extrusionDepth: 0.0)\nmovingImage.flatness\
    \ = 0.1\nmovingImage.font = UIFont.boldSystemFont(ofSize: 10)\n```\n\nNext, we’ll\
    \ need to store this `SCNText` in a node, so we need to define a node by defining\
    \ its color and scale:\n\n```swift\nlet titleNode = SCNNode()\ntitleNode.geometry\
    \ = movingImage\ntitleNode.geometry?.firstMaterial?.diffuse.contents = UIColor.white\n\
    titleNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)\n```\n\nThen we just need\
    \ to add the node containing our `SCNText` to the detected image:\n\n```swift\n\
    node.addChildNode(titleNode)\n```\n\nThe entire `ViewController.swift` file should\
    \ look like this:"
