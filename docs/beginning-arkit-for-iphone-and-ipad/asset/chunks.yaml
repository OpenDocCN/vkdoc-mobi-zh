    \n每次运行增强现实应用时，它都会在 iOS 设备的当前位置定义世界坐标。当然，你可能不希望世界坐标系只在应用运行时你手持 iOS 设备的位置出现。这就是为什么\
    \ ARKit 为你提供了重置世界坐标系的选项，以便你可以将 iOS 设备移动到新位置，并将世界坐标重置为 iOS 设备的新位置。\n\n要重置世界坐标，我们需要一个供用户点击的\
    \ UIButton。然后，我们需要编写一个 IBAction 方法，将世界坐标重置为 iOS 设备的当前位置。要创建 UIButton 并编写用于重置世界跟踪坐标的\
    \ IBAction 方法，请按照以下步骤操作：\n\n1.  在 Name 字段中键入`resetButton`并按 Return 键。\n\n2.  点击\
    \ Type 弹出菜单并选择 UIButton。\n\n3.  点击 Connect 按钮。Xcode 会显示一个空的 IBAction 方法。\n\n4.\
    \  点击 Standard Editor 图标或选择 View ➤ Standard Editor ➤ Show Standard Editor。如果 Xcode\
    \ 未显示`ViewController.swift`文件，请在 Navigator 窗格中点击`ViewController.swift`文件。\n\n\
    5.  编辑`IBAction resetButton`函数如下：\n\n    ```\n    @IBAction func resetButton(_\
    \ sender: UIButton) {\n        sceneView.session.pause()\n        sceneView.session.run(configuration,\
    \ options: [.resetTracking])\n    }\n    ```\n\n6.  将`let configuration = ARWorldTrackingConfiguration`行移到`IBOutlet`行的下方，如下所示：\n\
    \n    ```\n    @IBOutlet var sceneView: ARSCNView!\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    ```\n\n整个`ViewController.swift`文件应如下所示：\n\n```\nimport UIKit\nimport SceneKit\n\
    import ARKit\nclass ViewController: UIViewController, ARSCNViewDelegate {\n  \
    \  @IBOutlet var sceneView: ARSCNView!\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    @IBAction func resetButton(_ sender: UIButton) {\n        sceneView.session.pause()\n\
    \        sceneView.session.run(configuration, options: [.resetTracking])\n   \
    \ }\n    override func viewDidLoad() {\n        super.viewDidLoad()\n        sceneView.delegate\
    \ = self\n        sceneView.showsStatistics = true\n        sceneView.debugOptions\
    \ = [ARSCNDebugOptions.showWorldOrigin]\n    }\n    override func viewWillAppear(_\
    \ animated: Bool) {\n        super.viewWillAppear(animated)\n        sceneView.session.run(configuration)\n\
    \    }\n}\n```\n\n7.  使用 USB 数据线将 iOS 设备连接到 Macintosh。\n\n8.  点击 Run 按钮或选择 Product\
    \ ➤ Run。当应用运行时，后退以查看浮在空中的 x 轴、y 轴和 z 轴世界坐标。\n\n9.  移动到新位置，然后点击 iOS 屏幕上的 Reset\
    \ 按钮。\n\n10. 后退，你会看到当你点击 Reset 按钮时，iOS 设备所在位置处的 x 轴、y 轴和 z 轴世界坐标。\n\n11. 点击 Stop\
    \ 按钮或选择 Product ➤ Stop。\n    ![../images/469983_1_En_3_Chapter/469983_1_En_3_Fig7_HTML.jpg](img/469983_1_En_3_Fig7_HTML.jpg)\n\
    \    **图 3-7** 创建 IBAction 方法\n\n12. 松开 Control 键和鼠标。Xcode 会显示一个弹出菜单。\n\n13. 点击\
    \ Connection 弹出菜单并选择 Action，如图 3-7 所示。\n    ![../images/469983_1_En_3_Chapter/469983_1_En_3_Fig6_HTML.jpg](img/469983_1_En_3_Fig6_HTML.jpg)\n\
    \    **图 3-6** 从 UIButton 控件拖拽到 ViewController.swift 文件\n\n14. 按住 Shift 键并点击 ARSCNView\
    \ 对象。现在，ARSCNView 和 UIButton 周围应出现手柄。\n\n15. 在 All Views in View Controller 类别下，选择\
    \ Editor ➤ Resolve AutoLayout Issues ➤ Reset to Suggested Constraints。Xcode 会为\
    \ ARSCNView 和 UIButton 添加约束。\n\n16. 点击 Assistant Editor 图标或选择 View ➤ Assistant\
    \ Editor ➤ Show Assistant Editor。Xcode 会并排显示`ViewController.swift`文件和故事板。\n"
- fmt: "# Displaying Shapes at Coordinates\n\nDisplaying the world origin lets you\
    \ see where you can define virtual objects to appear in your augmented reality\
    \ view. By specifying x, y, and z coordinates, you can display virtual objects\
    \ appear in relation to the current position of the user’s iOS device. Besides\
    \ displaying virtual objects like spaceships or dinosaurs, the simplest virtual\
    \ objects ARKit can display at specific coordinates are shapes like spheres, boxes,\
    \ and planes.\n\nTo create a shape, you must start by creating a node based on\
    \ the `SCNNode` class like this:\n\n```\nlet node = SCNNode()\n```\n\nAt this\
    \ point, you need to define a shape for the node. SceneKit provides boxes, planes,\
    \ spheres, toruses, and other shapes, so let’s choose a sphere and define its\
    \ radius as 0.05 meters like this:\n\n```\nnode.geometry = SCNSphere(radius: 0.05)\n\
    ```\n\nTo make the sphere visible, let’s give it a color. To do this, we need\
    \ to define the node’s material that defines its outer surface such as:\n\n```\n\
    node.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n```\n\nThese\
    \ three lines of Swift code create a node, define the geometry of that node as\
    \ a sphere, and then color the outside surface of that sphere with yellow. Now\
    \ the only remaining task is to place that node at a specific location based on\
    \ the world origin. To do this, we need to define the node’s position like this:\n\
    \n```\nnode.position = SCNVector3(0,0,0)\n```\n\nSince the node needs an x, y,\
    \ and z coordinate, the position of the node must be defined by three specific\
    \ values as well. Defining the x, y, and z positions as 0 means that the node\
    \ will appear at the world origin where the x-, y-, and z-axes intersect.\n\n\
    After defining a geometric shape, its dimensions, its color, and its position,\
    \ the final step is to add that node to the existing scene so it actually appears\
    \ in the augmented reality view. To do this, you just need one final line of code\
    \ as follows:\n\n```\nsceneView.scene.rootNode.addChildNode(node)\n```\n\nThis\
    \ line of code adds the node (the sphere) to the root node of the augmented reality\
    \ scene. The root node defines the hierarchy of items displayed in an augmented\
    \ reality view. To see how this code works to display a yellow sphere at the world\
    \ origin, follow these steps:\n\n## Preparing the Project\n\n1.  Click on the\
    \ `Main.storyboard` file in the Navigator pane.\n2.  Resize the `ARSCNView` so\
    \ there’s a blank space between the bottom of the `ARSCNView` and the bottom of\
    \ the iOS device screen.\n3.  Click the Object Library icon to open the Object\
    \ Library window.\n4.  Type `UIButton`. The Object Library window displays the\
    \ `UIButton`, as shown in Figure 3-4.\n\n![images/469983_1_En_3_Chapter/469983_1_En_3_Fig4_HTML.jpg](images/469983_1_En_3_Chapter/469983_1_En_3_Fig4_HTML.jpg)\n\
    Figure 3-4 Finding the `UIButton` in the Object Library\n\n5.  Drag the `UIButton`\
    \ underneath the `ARSCNView`.\n6.  Resize the width of the `UIButton`.\n7.  Double-click\
    \ on the `UIButton` to highlight its caption and type a new caption, such as `Reset`.\
    \ Your user interface should look similar to Figure 3-5.\n\n![images/469983_1_En_3_Chapter/469983_1_En_3_Fig5_HTML.jpg](images/469983_1_En_3_Chapter/469983_1_En_3_Fig5_HTML.jpg)\n\
    Figure 3-5 Adding a `UIButton` to the user interface\n\n8.  Move the mouse over\
    \ the `UIButton` on the storyboard, hold down the Control key, and drag the mouse\
    \ underneath the IBOutlet in the `ViewController.swift` file, as shown in Figure\
    \ 3-6.\n9.  Modify the World Tracking project or create a new project identical\
    \ to the World Tracking project except give it a name of `Node Placement`.\n10.\
    \ Modify the `ViewController.swift` file so the code looks like this:\n\n    ```\n\
    \    import UIKit\n    import SceneKit\n    import ARKit\n    class ViewController:\
    \ UIViewController, ARSCNViewDelegate {\n    @IBOutlet var sceneView: ARSCNView!\n\
    \    let configuration = ARWorldTrackingConfiguration()\n    override func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    // Do any additional setup after loading the\
    \ view, typically from a nib.\n    sceneView.delegate = self\n    sceneView.showsStatistics\
    \ = true\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin]\n \
    \   showShape()\n    }\n    override func viewWillAppear(_ animated: Bool) {\n\
    \    super.viewWillAppear(animated)\n    sceneView.session.run(configuration)\n\
    \    }\n    @IBAction func resetButton(_ sender: UIButton) {\n    sceneView.session.pause()\n\
    \    sceneView.session.run(configuration, options: [.resetTracking])\n    showShape()\n\
    \    }\n    func showShape() {\n    let node = SCNNode()\n    node.geometry =\
    \ SCNSphere(radius: 0.05)\n    node.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.yellow\n    node.position = SCNVector3(0,0,0)\n    sceneView.scene.rootNode.addChildNode(node)\n\
    \    }\n    }\n    ```\n\n11. Connect an iOS device to your Macintosh through\
    \ its USB cable.\n12. Click the Run button or choose Product ➤ Run. A yellow sphere\
    \ appears at the world origin, as shown in Figure 3-8.\n\n![images/469983_1_En_3_Chapter/469983_1_En_3_Fig8_HTML.jpg](images/469983_1_En_3_Chapter/469983_1_En_3_Fig8_HTML.jpg)\n\
    Figure 3-8 Displaying a yellow sphere at the world origin\n\n## Testing the Application\n\
    \n1.  Move your iOS device to a new location and tap the Reset button. Notice\
    \ that the world coordinates now appear in a different location with a yellow\
    \ sphere at the origin.\n2.  Click the Stop button or choose Product ➤ Stop.\n\
    \n## Experimenting with Coordinates\n\nMaking a yellow sphere appear at the origin\
    \ is fine, but you can experiment with different values for the x, y, and z coordinates\
    \ of the sphere besides `0,0,0`. Try modifying the following line of code with\
    \ different values for the node’s position, such as:\n\n```\nnode.position = SCNVector3(0.2,\
    \ -0.4, 0.1)\n```\n\nRemember, these values define meters so if you choose too\
    \ large a value, such as 10 meters, the yellow sphere will appear too far away\
    \ to see within the augmented reality view, so experiment with low values such\
    \ as `-0.4` or `0.2`."
