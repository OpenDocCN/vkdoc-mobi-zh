    ## Identifying Swipe Gestures on Virtual Objects


    Besides detecting taps on a virtual object, you may also want to allow the user
    to swipe across a virtual object. Swiping can involve one or more fingertips that
    move up, down, left, or right. For each swipe gesture you want to detect (up,
    down, left, or right), you have to define a separate `UISwipeGestureRecognizer`
    like this:


    ```

    let swipeRightGesture = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipe))

    let swipeLeftGesture = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipe))

    let swipeUpGesture = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipe))

    let swipeDownGesture = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipe))

    ```


    Each Swipe Gesture Recognizer can define the same function to handle the swipe.
    In these examples, all four gestures are handled by a function called `handleSwipe`.


    By default, each swipe gesture only requires a single fingertip. If you want,
    you can require two or more fingertips by defining a `numberOfTouchesRequired`
    property , such as:


    ```

    let swipeRightGesture = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipe))

    swipeRightGesture.direction = .right

    swipeRightGesture.numberOfTouchesRequired = 2

    ```


    If you don’t define the `numberofTouchesRequired`, Xcode defaults to 1 for a single
    fingertip to swipe. Most importantly, you must define a direction for the swipe
    gesture and add it to the scene. So if you want to detect all four swipe gestures,
    you need to define each swipe gestures separately like this:


    ```

    let swipeRightGesture = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipe))

    swipeRightGesture.direction = .right

    sceneView.addGestureRecognizer(swipeRightGesture)

    let swipeLeftGesture = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipe))

    swipeLeftGesture.direction = .left

    sceneView.addGestureRecognizer(swipeLeftGesture)

    let swipeUpGesture = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipe))

    swipeUpGesture.direction = .up

    sceneView.addGestureRecognizer(swipeUpGesture)

    let swipeDownGesture = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipe))

    swipeDownGesture.direction = .down

    sceneView.addGestureRecognizer(swipeDownGesture)

    ```


    Once we’ve defined the four swipe gestures, the next step is to write the `handleSwipe`
    function to respond to the swipe. For this example, we’ll detect both the swipe
    gesture and the object that the swipe gesture occurred on, such as on a virtual
    object.


    The `handleSwipe` function needs to receive the `UISwipeGestureRecognizer` data
    like this:


    ```

    @objc func handleSwipe(sender: UISwipeGestureRecognizer) {

    }

    ```


