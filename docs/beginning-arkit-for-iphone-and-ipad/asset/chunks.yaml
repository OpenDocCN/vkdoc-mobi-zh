- fmt: "# Creating Augmented Reality with the Single View App Template\n\nThe Augmented\
    \ Reality App template provides the basic Swift code needed to display augmented\
    \ reality. Rather than use the Augmented Reality App template, you can create\
    \ an augmented reality app using the simple Single View App template instead.\
    \ By creating an augmented reality app through the Single View App template, you\
    \ can get a better idea what code you need to write and what user interface elements\
    \ you need to give any app augmented reality capabilities.\n\n1.  Start Xcode.\
    \ (Make sure you’re using Xcode 10 or greater.)\n2.  Choose File ➤ New ➤ Project.\
    \ Xcode asks you to choose a template (see Figure [2-1](#469983_1_En_2_Chapter.xhtml#Fig1)).\n\
    3.  Click the Single View App icon and click the Next button. Xcode asks for a\
    \ product name, organization name, organization identifiers, and content technology\
    \ (see Figure [2-2](#469983_1_En_2_Chapter.xhtml#Fig2)). Make sure all check boxes\
    \ are clear for additional options such as Use Core Data or Include Unit Tests.\n\
    4.  Click in the Product Name text field and type a descriptive name for your\
    \ project, such as `ARExample2`. (The exact name does not matter, but make sure\
    \ it’s different from the project you created using the Augmented Reality App\
    \ template.)\n5.  Click the Next button. Xcode asks where you want to store your\
    \ project.\n6.  Choose a folder and click the Create button. Xcode creates a basic\
    \ iOS project that’s ready to run.\n\nAt this point, you have a basic iOS app\
    \ with no augmented reality features. To add augmented reality to an app, we need\
    \ to write Swift code, modify the user interface, and define settings in the `Info.plist`\
    \ file to allow access to the camera and run only on ARKit-compatible iOS devices\
    \ such as the iPad Pro or iPhone 6s and higher.\n\nFirst, we need to make sure\
    \ our iOS app can access the ARKit framework and use the camera. To do this, we\
    \ need to modify the `Info.plist` file.\n1.  Click the `Info.plist` file in the\
    \ Navigator pane. Xcode displays a list of keys, types, and values.\n2.  Click\
    \ the disclosure triangle to expand the Required Device Capabilities category\
    \ to display Item 0.\n3.  Move the mouse pointer over Item 0 to display a plus\
    \ (`+`) icon.\n4.  Click this plus (`+`) icon to display a blank Item 1.\n5. \
    \ Type `arkit` under the Value category in the Item 1 row (see Figure [2-10](#469983_1_En_2_Chapter.xhtml#Fig10)).\n\
    6.  Move the mouse pointer over the last row to display a plus (`+`) icon.\n7.\
    \  Click on the plus (`+`) icon to create a new row. A popup menu appears.\n8.\
    \  Choose Privacy – Camera Usage Description, as shown in Figure [2-11](#469983_1_En_2_Chapter.xhtml#Fig11).\n\
    9.  Type `AR needs to use the camera` under the Value category in the Privacy\
    \ – Camera Usage Description row.\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig11_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig11_HTML.jpg)\n\
    \n**Figure 2-11**  \nThe Privacy – Camera Usage Description line lets your app\
    \ access an iOS device’s camera\n\nWith `arkit` and `Privacy – Camera Usage Description`\
    \ defined in the `Info.plist` file, our app can now access ARKit and use an iOS\
    \ device’s camera. The next step is to modify the `ViewController.swift` file\
    \ and write Swift code to display augmented reality.\n\n## Modifying the `ViewController.swift`\
    \ File\n\n1.  Click on the `ViewController.swift` file in the Navigator pane of\
    \ Xcode.\n2.  Add the following two lines under the `Import UIKit` line, as follows:\n\
    \n    ```\n    import SceneKit\n    import ARKit\n    ```\n\n3.  Modify the class\
    \ `ViewController` line to add the `ARSCNViewDelegate` as follows:\n\n    ```\n\
    \    class ViewController: UIViewController, ARSCNViewDelegate {\n    ```\n\n\
    4.  At the bottom of the `ViewController.swift` file, add the `viewWillAppear`\
    \ and `viewWillDisappear` functions as follows:\n\n    ```\n    override func\
    \ viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
    \        let configuration = ARWorldTrackingConfiguration()\n        sceneView.session.run(configuration)\n\
    \    }\n    override func viewWillDisappear(_ animated: Bool) {\n        super.viewWillDisappear(animated)\n\
    \        sceneView.session.pause()\n    }\n    ```\n\nIn this code, we’re referencing\
    \ `sceneView`, which hasn’t been defined yet. This `sceneView` variable name will\
    \ represent the user interface view that displays augmented reality in our app.\
    \ The user interface object that displays augmented reality is called ARKit Scene\
    \ View.\n\n## Adding the ARKit Scene View\n\nTo add the ARKit Scene View object,\
    \ we need to drag it to the `Main.storyboard` file and create an IBOutlet for\
    \ it in the `ViewController.swift` file. To do this, follow these steps:\n\n1.\
    \  Click the `Main.storyboard` file in the Navigator pane.\n2.  Click the View\
    \ As option to choose different iOS devices for a storyboard (see Figure [2-12](#469983_1_En_2_Chapter.xhtml#Fig12)).\n\
    ![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig12_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig12_HTML.jpg)\n\
    **Figure 2-12**  \nThe View As option lets you choose different iOS devices for\
    \ a storyboard\n3.  Click the Object Library icon to display the Object Library\
    \ window (see Figure [2-13](#469983_1_En_2_Chapter.xhtml#Fig13)).\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig13_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig13_HTML.jpg)\n\
    **Figure 2-13**  \nThe Object Library icon opens the Object Library window\n4.\
    \  Click in the search field at the top of the Object Library window and type\
    \ `ARKit`. The Object Library window displays all ARKit objects available, as\
    \ shown in Figure [2-14](#469983_1_En_2_Chapter.xhtml#Fig14).\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig14_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig14_HTML.jpg)\n\
    **Figure 2-14**  \nDisplaying ARKit objects in the Object Library window\n5. \
    \ Drag the ARKit SceneKit View from the Object Library on to the storyboard.\n\
    6.  Resize the ARKit SceneKit View on the storyboard, as shown in Figure [2-15](#469983_1_En_2_Chapter.xhtml#Fig15).\
    \ The exact size and position of the ARKit SceneKit View isn’t important but make\
    \ it large enough because the size of the ARKit SceneKitView defines how large\
    \ the image will appear when viewed through the iOS device’s camera.\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig15_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig15_HTML.jpg)\n\
    **Figure 2-15**  \nResizing the ARKit SceneKit View\n7.  Click on the ARKit SceneKit\
    \ View to select it and then choose Editor ➤ Resolve AutoLayout Issues ➤ Reset\
    \ to Suggested Constraints. Xcode adds constraints to keep your ARKit SceneKit\
    \ View properly aligned no matter which size or orientation the user holds the\
    \ iOS device.\n8.  Click the Show Assistant Editor icon, as shown in Figure [2-16](#469983_1_En_2_Chapter.xhtml#Fig16),\
    \ or choose View ➤ Assistant Editor ➤ Use Assistant Editor. Xcode displays the\
    \ `ViewController.swift` file side by side with the storyboard.\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig16_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig16_HTML.jpg)\n\
    **Figure 2-16**  \nThe Show Assistant Editor icon lets you view a storyboard and\
    \ Swift controller file at the same time\n9.  Move the mouse over the ARKit SceneKit\
    \ View, hold down the Control key, and drag the mouse underneath the class `ViewController`\
    \ line, as shown in Figure [2-17](#469983_1_En_2_Chapter.xhtml#Fig17).\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig17_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig17_HTML.jpg)\n\
    **Figure 2-17**  \nControl-dragging from the ARKit SceneKit View to the ViewController.swift\
    \ file\n10. Release the Control key and the mouse. Xcode displays a popup menu\
    \ to define a name for the IBOutlet, as shown in Figure [2-18](#469983_1_En_2_Chapter.xhtml#Fig18).\n\
    ![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig18_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig18_HTML.jpg)\n\
    **Figure 2-18**  \nDefining a name for an IBOutlet\n11. Click in the Name field,\
    \ type `sceneView`, and press Return. Xcode creates an IBOutlet in the `ViewController.swift`\
    \ file."
  raw: "## Creating Augmented Reality with the Single View App Template\n\nThe Augmented\
    \ Reality App template provides the basic Swift code needed to display augmented\
    \ reality. Rather than use the Augmented Reality App template, you can create\
    \ an augmented reality app using the simple Single View App template instead.\
    \ By creating an augmented reality app through the Single View App template, you\
    \ can get a better idea what code you need to write and what user interface elements\
    \ you need to give any app augmented reality capabilities.\n\n1.  Start Xcode.\
    \ (Make sure you’re using Xcode 10 or greater.)\n\n2.  Choose File ➤ New ➤ Project.\
    \ Xcode asks you to choose a template (see Figure [2-1](#469983_1_En_2_Chapter.xhtml#Fig1)).\n\
    \n3.  Click the Single View App icon and click the Next button. Xcode asks for\
    \ a product name, organization name, organization identifiers, and content technology\
    \ (see Figure [2-2](#469983_1_En_2_Chapter.xhtml#Fig2)). Make sure all check boxes\
    \ are clear for additional options such as Use Core Data or Include Unit Tests.\n\
    \n4.  Click in the Product Name text field and type a descriptive name for your\
    \ project, such as `ARExample2`. (The exact name does not matter, but make sure\
    \ it’s different from the project you created using the Augmented Reality App\
    \ template.)\n\n5.  Click the Next button. Xcode asks where you want to store\
    \ your project.\n\n6.  Choose a folder and click the Create button. Xcode creates\
    \ a basic iOS project that’s ready to run.\n\nAt this point, you have a basic\
    \ iOS app with no augmented reality features. To add augmented reality to an app,\
    \ we need to write Swift code, modify the user interface, and define settings\
    \ in the `Info.plist` file to allow access to the camera and run only on ARKit-compatible\
    \ iOS devices such as the iPad Pro or iPhone 6s and higher.\n\nFirst, we need\
    \ to make sure our iOS app can access the ARKit framework and use the camera.\
    \ To do this, we need to modify the `Info.plist` file .\n\n1.  Type `AR needs\
    \ to use the camera` under the Value category in the Privacy – Camera Usage Description\
    \ row.\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig11_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig11_HTML.jpg)\n\
    \nFigure 2-11\n\nThe Privacy – Camera Usage Description line lets your app access\
    \ an iOS device’s camera\n\n1.  Click the `Info.plist` file in the Navigator pane.\
    \ Xcode displays a list of keys, types, and values.\n\n2.  Click the disclosure\
    \ triangle to expand the Required Device Capabilities category to display Item\
    \ 0.\n\n3.  Move the mouse pointer over Item 0 to display a plus (+) icon.\n\n\
    4.  Click this plus (+) icon to display a blank Item 1.\n\n5.  Type `arkit` under\
    \ the Value category in the Item 1 row (see Figure [2-10](#469983_1_En_2_Chapter.xhtml#Fig10)).\n\
    \n6.  Move the mouse pointer over the last row to display a plus (+) icon.\n\n\
    7.  Click on the plus (+) icon to create a new row. A popup menu appears.\n\n\
    8.  Choose Privacy – Camera Usage Description, as shown in Figure [2-11](#469983_1_En_2_Chapter.xhtml#Fig11).\n\
    \nWith “arkit” and “Privacy – Camera Usage Description” defined in the `Info.plist`\
    \ file, our app can now access ARKit and use an iOS device’s camera. The next\
    \ step is to modify the `ViewController.swift` file and write Swift code to display\
    \ augmented reality.\n\n1.  Click on the `ViewController.swift` file in the Navigator\
    \ pane of Xcode.\n\n2.  Add the following two lines under the `Import UIKit` line,\
    \ as follows:\n\n```\n    import SceneKit\n    import ARKit\n    ```\n\n3.  Modify\
    \ the class `ViewController` line to add the `ARSCNViewDelegate` as follows:\n\
    \n```\n    class ViewController: UIViewController, ARSCNViewDelegate {\n    ```\n\
    \n4.  At the bottom of the `ViewController.swift` file, add the `viewWillAppear`\
    \ and `viewWillDisappear` functions as follows:\n\n```\n    override func viewWillAppear(_\
    \ animated: Bool) {\n    super.viewWillAppear(animated)\n    let configuration\
    \ = ARWorldTrackingConfiguration()\n    sceneView.session.run(configuration)\n\
    \    }\n    override func viewWillDisappear(_ animated: Bool) {\n    super.viewWillDisappear(animated)\n\
    \    sceneView.session.pause()\n    }\n    ```\n\nIn this code, we’re referencing\
    \ `sceneView`, which hasn’t been defined yet. This `sceneView` variable name will\
    \ represent the user interface view that displays augmented reality in our app.\
    \ The user interface object that displays augmented reality is called ARKit Scene\
    \ View.\n\nTo add the ARKit Scene View object, we need to drag it to the `Main.storyboard`\
    \ file and create an IBOutlet for it in the `ViewController.swift` file. To do\
    \ this, follow these steps:\n\n1.  Click in the Name field, type `sceneView`,\
    \ and press Return. Xcode creates an IBOutlet in the `ViewController.swift` file\
    \ as follows:\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig18_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig18_HTML.jpg)\n\
    \nFigure 2-18\n\nDefining a name for an IBOutlet\n\n1.  Release the Control key\
    \ and the mouse. Xcode displays a popup menu to define a name for the IBOutlet,\
    \ as shown in Figure [2-18](#469983_1_En_2_Chapter.xhtml#Fig18).\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig17_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig17_HTML.jpg)\n\
    \nFigure 2-17\n\nControl-dragging from the ARKit SceneKit View to the ViewController.swift\
    \ file\n\n1.  Move the mouse over the ARKit SceneKIt View, hold down the Control\
    \ key, and drag the mouse underneath the class `ViewController` line, as shown\
    \ in Figure [2-17](#469983_1_En_2_Chapter.xhtml#Fig17).\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig16_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig16_HTML.jpg)\n\
    \nFigure 2-16\n\nThe Show Assistant Editor icon lets you view a storyboard and\
    \ Swift controller file at the same time\n\n1.  Click on the ARKit SceneKit View\
    \ to select it and then choose Editor ➤ Resolve AutoLayout Issues ➤ Reset to Suggested\
    \ Constraints. Xcode adds constraints to keep your ARKit SceneKit View properly\
    \ aligned no matter which size or orientation the user holds the iOS device.\n\
    \n2.  Click the Show Assistant Editor icon, as shown in Figure [2-16](#469983_1_En_2_Chapter.xhtml#Fig16),\
    \ or choose View ➤ Assistant Editor ➤ Use Assistant Editor. Xcode displays the\
    \ `ViewController.swift` file side by side with the storyboard.\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig15_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig15_HTML.jpg)\n\
    \nFigure 2-15\n\nResizing the ARKit SceneKit View\n\n1.  Drag the ARKit SceneKit\
    \ View from the Object Library on to the storyboard.\n\n2.  Resize the ARKit SceneKit\
    \ View on the storyboard, as shown in Figure [2-15](#469983_1_En_2_Chapter.xhtml#Fig15).\
    \ The exact size and position of the ARKit SceneKit View isn’t important but make\
    \ it large enough because the size of the ARKit SceneKitView defines how large\
    \ the image will appear when viewed through the iOS device’s camera.\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig14_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig14_HTML.jpg)\n\
    \nFigure 2-14\n\nDisplaying ARKit objects in the Object Library window\n\n1. \
    \ Click in the search field at the top of the Object Library window and type `ARKit`.\
    \ The Object Library window displays all ARKit objects available, as shown in\
    \ Figure [2-14](#469983_1_En_2_Chapter.xhtml#Fig14).\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig13_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig13_HTML.jpg)\n\
    \nFigure 2-13\n\nThe Object Library icon opens the Object Library window\n\n1.\
    \  Click the Object Library icon to display the Object Library window , as shown\
    \ in Figure [2-13](#469983_1_En_2_Chapter.xhtml#Fig13).\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig12_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig12_HTML.jpg)\n\
    \nFigure 2-12\n\nThe View As option lets you choose different iOS devices for\
    \ a storyboard"
  trans: "\n# 使用单视图 App 模板创建增强现实应用\n\n增强现实 App 模板提供了显示增强现实所需的基础 Swift 代码。不过，你也可以不使用增强现实\
    \ App 模板，而是改用简单的单视图 App 模板来创建增强现实应用。通过单视图 App 模板创建增强现实应用，你能更清楚地了解需要编写哪些代码以及需要为任意应用添加哪些用户界面元素来赋予其增强现实功能。\n\
    \n1.  启动 Xcode。（请确保你使用的是 Xcode 10 或更高版本。）\n2.  选择“文件”➤“新建”➤“项目”。Xcode 会要求你选择一个模板（见图\
    \ 2-1）。\n3.  点击“单视图 App”图标，然后点击“下一步”按钮。Xcode 会要求提供产品名称、组织名称、组织标识符以及内容技术（见图 2-2）。确保所有复选框（如“使用\
    \ Core Data”或“包含单元测试”等附加选项）均未勾选。\n4.  点击“产品名称”文本框，为你的项目输入一个描述性名称，例如`ARExample2`。（具体名称无关紧要，但确保它与你在增强现实\
    \ App 模板中创建的项目的名称不同。）\n5.  点击“下一步”按钮。Xcode 会询问你希望将项目存储在哪里。\n6.  选择一个文件夹，然后点击“创建”按钮。Xcode\
    \ 会创建一个可以立即运行的基础 iOS 项目。\n\n至此，你已拥有一个基础 iOS 应用，但它不具备任何增强现实功能。要为应用添加增强现实功能，我们需要编写\
    \ Swift 代码、修改用户界面，并在`Info.plist`文件中定义设置，以允许访问摄像头并使其仅在兼容 ARKit 的 iOS 设备（如 iPad\
    \ Pro 或 iPhone 6s 及更高版本）上运行。\n\n首先，我们需要确保 iOS 应用能够访问 ARKit 框架并使用摄像头。为此，我们需要修改`Info.plist`文件。\n\
    1.  在导航器窗格中点击`Info.plist`文件。Xcode 会显示键、类型和值的列表。\n2.  点击展开三角形以展开“必需设备功能”类别，显示“项目\
    \ 0”。\n3.  将鼠标指针移到“项目 0”上，显示一个加号（`+`）图标。\n4.  点击此加号（`+`）图标以显示一个空白的“项目 1”。\n5.\
    \  在“项目 1”行的“值”类别下输入`arkit`（见图 2-10）。\n6.  将鼠标指针移到最后一行，显示一个加号（`+`）图标。\n7.  点击加号（`+`）图标以创建一个新行。此时会弹出一个菜单。\n\
    8.  选择“隐私 - 相机使用说明”，如图 2-11 所示。\n9.  在“隐私 - 相机使用说明”行的“值”类别下输入`AR needs to use\
    \ the camera`。\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig11_HTML.jpg](img/469983_1_En_2_Fig11_HTML.jpg)\n\
    \n**图 2-11**  \n“隐私 - 相机使用说明”这一行允许你的应用访问 iOS 设备的摄像头\n\n在`Info.plist`文件中定义了`arkit`和“隐私\
    \ - 相机使用说明”后，我们的应用现在可以访问 ARKit 并使用 iOS 设备的摄像头了。下一步是修改`ViewController.swift`文件并编写\
    \ Swift 代码来显示增强现实。\n\n## 修改`ViewController.swift`文件\n\n1.  在 Xcode 的导航器窗格中点击`ViewController.swift`文件。\n\
    2.  在`Import UIKit`一行下方添加以下两行代码，如下所示：\n\n    ```\n    import SceneKit\n    import\
    \ ARKit\n    ```\n\n3.  修改`class ViewController`这一行，添加`ARSCNViewDelegate`，如下所示：\n\
    \n    ```\n    class ViewController: UIViewController, ARSCNViewDelegate {\n \
    \   ```\n\n4.  在`ViewController.swift`文件的末尾，添加`viewWillAppear`和`viewWillDisappear`函数，如下所示：\n\
    \n    ```\n    override func viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
    \        let configuration = ARWorldTrackingConfiguration()\n        sceneView.session.run(configuration)\n\
    \    }\n    override func viewWillDisappear(_ animated: Bool) {\n        super.viewWillDisappear(animated)\n\
    \        sceneView.session.pause()\n    }\n    ```\n\n在这段代码中，我们引用了`sceneView`，但它尚未定义。这个`sceneView`变量名将代表我们的应用中用于显示增强现实的用户界面视图。用于显示增强现实的用户界面对象被称为“ARKit\
    \ 场景视图”。\n\n## 添加 ARKit 场景视图\n\n要添加 ARKit 场景视图对象，我们需要将其拖拽到`Main.storyboard`文件中，并在`ViewController.swift`文件中为其创建一个\
    \ IBOutlet。具体步骤如下：\n\n1.  在导航器窗格中点击`Main.storyboard`文件。\n2.  点击“视图为”选项，为故事板选择不同的\
    \ iOS 设备（见图 2-12）。\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig12_HTML.jpg](img/469983_1_En_2_Fig12_HTML.jpg)\n\
    **图 2-12**  \n“视图为”选项允许你为故事板选择不同的 iOS 设备\n3.  点击“对象库”图标以显示“对象库”窗口（见图 2-13）。\n\
    ![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig13_HTML.jpg](img/469983_1_En_2_Fig13_HTML.jpg)\n\
    **图 2-13**  \n“对象库”图标可打开“对象库”窗口\n4.  点击“对象库”窗口顶部的搜索字段，输入`ARKit`。“对象库”窗口会显示所有可用的\
    \ ARKit 对象，如图 2-14 所示。\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig14_HTML.jpg](img/469983_1_En_2_Fig14_HTML.jpg)\n\
    **图 2-14**  \n在“对象库”窗口中显示 ARKit 对象\n5.  将“ARKit SceneKit 视图”从“对象库”拖拽到故事板上。\n6.\
    \  在故事板上调整“ARKit SceneKit 视图”的大小，如图 2-15 所示。“ARKit SceneKit 视图”的具体大小和位置并不重要，但请确保将其设置得足够大，因为该视图的大小决定了通过\
    \ iOS 设备摄像头观看时图像的显示尺寸。\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig15_HTML.jpg](img/469983_1_En_2_Fig15_HTML.jpg)\n\
    **图 2-15**  \n调整 ARKit SceneKit 视图的大小\n7.  点击“ARKit SceneKit 视图”将其选中，然后选择“编辑器”➤“解决自动布局问题”➤“重置为建议的约束”。Xcode\
    \ 会添加约束，确保无论用户手持 iOS 设备的尺寸或方向如何，你的“ARKit SceneKit 视图”都能正确对齐。\n8.  点击“显示辅助编辑器”图标，如图\
    \ 2-16 所示，或者选择“视图”➤“辅助编辑器”➤“使用辅助编辑器”。Xcode 会并排显示`ViewController.swift`文件和故事板。\n\
    ![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig16_HTML.jpg](img/469983_1_En_2_Fig16_HTML.jpg)\n\
    **图 2-16**  \n“显示辅助编辑器”图标允许你同时查看故事板和 Swift 控制器文件\n9.  将鼠标移到“ARKit SceneKit 视图”上，按住\
    \ Control 键，然后将鼠标拖拽到`class ViewController`这一行的下方，如图 2-17 所示。\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig17_HTML.jpg](img/469983_1_En_2_Fig17_HTML.jpg)\n\
    **图 2-17**  \n从 ARKit SceneKit 视图 Control 拖拽到 ViewController.swift 文件\n10. 松开\
    \ Control 键和鼠标。Xcode 会显示一个弹出菜单，用于定义 IBOutlet 的名称，如图 2-18 所示。\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig18_HTML.jpg](img/469983_1_En_2_Fig18_HTML.jpg)\n\
    **图 2-18**  \n为 IBOutlet 定义名称\n11. 点击“名称”字段，输入`sceneView`，然后按 Return 键。Xcode 会在`ViewController.swift`文件中创建一个\
    \ IBOutlet。\n"
- fmt: "# 在 Xcode 中导入并使用 COLLADA (.dae) 文件\n\n## 准备 Swift 代码与用户界面\n\n1.  在 Xcode 的\
    \ Navigator 窗格中点击`Main.storyboard`文件。在故事板屏幕底部，可以点击“View As”来更改显示的 iOS 设备，如图 [2-12](#469983_1_En_2_Chapter.xhtml#Fig12)\
    \ 所示。\n2.  点击“Use Standard Editor”图标或选择 View ➤ Standard Editor ➤ Use Standard\
    \ Editor。\n3.  在 Navigator 窗格中点击`ViewController.swift`文件。Xcode 将显示存储在`ViewController.swift`文件中的\
    \ Swift 代码。\n4.  编辑`viewDidLoad`函数如下：\n\n```\noverride func viewDidLoad() {\n\
    \    super.viewDidLoad()\n    sceneView.delegate = self\n    sceneView.showsStatistics\
    \ = true\n    let scene = SCNScene(named: \"\")!\n    sceneView.scene = scene\n\
    }\n```\n\n```\n@IBOutlet var sceneView: ARSCNView!\n```\n\n这些代码修改基本上复制了 ARKit\
    \ iOS 模板。然而，我们仍然需要一个对象放置在我们的增强现实视图中。当我们使用增强现实模板创建应用时，模板包含一个`ship.scn`文件（`.scn`文件扩展名代表\
    \ SceneKit）。\n\n我们最初需要的是存储在 `.dae` COLLADA 文件格式中的文件（COLLADA 代表 COLLAborative Design\
    \ Activity）。此文件格式用作共享三维程序图形设计的标准文件格式。\n\n要查找 `.dae` COLLADA 文件，请访问你喜爱的搜索引擎，搜索可以下载的\
    \ “`.dae` public domain” 文件。（对于有艺术倾向的用户，你可以使用图形编辑器（例如免费的 Blender 程序，可从 [`www.blender.org`](http://www.blender.org)\
    \ 获取）创建自己的三维对象。）大多数 COLLADA 文件包含一个定义对象形状的 `.dae` 文件和一个定义该形状外部设计的纹理文件。提供免费（和付费）COLLADA\
    \ 文件的两个网站包括 Free3D ([`https://free3d.com`](https://free3d.com)) 和 TurboSquid ([`www.turbosquid.com`](http://www.turbosquid.com))。\n\
    \n下载 `.dae` COLLADA 文件及其任何伴随的纹理文件后，必须创建一个特殊的 `scnassets` 文件夹来存储这些图像。要创建 `scnassets`\
    \ 文件夹，请按照以下步骤操作：\n\n1.  选择 File ➤ New ➤ File。Xcode 显示不同的文件模板。\n2.  点击模板窗口顶部的 iOS，向下滚动并在\
    \ Resource 类别下点击 SceneKit Catalog 图标，如图 [2-19](#469983_1_En_2_Chapter.xhtml#Fig19)\
    \ 所示。\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig19_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig19_HTML.jpg)\n\
    \n图 2-19\n选择 SceneKit Catalog 图标\n\n3.  将文件夹名称更改为 `art.scnassets` 并按 Return。\n\
    \n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig20_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig20_HTML.jpg)\n\
    \n图 2-20\n更改 SceneKit Assets Catalog 文件夹的名称\n\n4.  点击 Next 按钮。Xcode 询问你想将此文件夹存储在何处。\n\
    5.  点击 Create 按钮。Xcode 在 Navigator 窗格中创建一个 `SceneKit Asset Catalog.scnassets`\
    \ 文件夹。\n6.  点击 `SceneKit Asset Catalog.scnassets` 文件夹并按 Return。Xcode 会高亮显示整个文件夹名称，如图\
    \ [2-20](#469983_1_En_2_Chapter.xhtml#Fig20) 所示。\n\n## 导入 3D 图像到 Xcode\n\n现在，我们已经编写了`ViewController.swift`文件中所需的大部分\
    \ Swift 代码，并设计了通过 ARKit SceneKit 视图显示增强现实的用户界面，最后一步是将 `.dae` 文件及其纹理文件导入到你在 Xcode\
    \ Navigator 窗格中创建的 `.scnassets` 文件夹中。\n\n要向 Xcode 添加 3D 图像，请按照以下步骤操作：\n\n1.  将\
    \ `.dae` 文件和伴随的纹理文件图像从 Finder 窗口拖放到 Xcode 的 `scnassets` 文件夹中，如图 [2-21](#469983_1_En_2_Chapter.xhtml#Fig21)\
    \ 所示。\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig21_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig21_HTML.jpg)\n\
    \n图 2-21\n从 Finder 窗口拖放 `.dae` 和纹理文件到 Xcode 的 `scnassets` 文件夹\n\n2.  在 `scnassets`\
    \ 文件夹中点击 `.dae` 文件以选中它。\n3.  选择 Editor ➤ Convert to SceneKit scene file format\
    \ (.scn)。将出现一个对话框，要求你确认是否要将 `.dae` 文件转换为 `.scn` 文件，如图 [2-22](#469983_1_En_2_Chapter.xhtml#Fig22)\
    \ 所示。\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig22_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig22_HTML.jpg)\n\
    \n图 2-22\nXcode 请求确认将 `.dae` 文件转换为 `.scn` 文件\n\n4.  点击 Convert 按钮。Xcode 会将你的 `.dae`\
    \ 文件转换为 `.scn` 文件。\n5.  （可选）点击 `.scn` 文件并按 Return，将文件名编辑为简单且具描述性的内容。\n6.  编辑`viewDidLoad`函数中的以下行以包含你的\
    \ `.scn` 文件的名称。如果你的 `.scn` 文件名为`satellite.scn`，则代码应如下所示：\n\n```\nlet scene = SCNScene(named:\
    \ \"art.scnassets/satellite.scn\")!\n```\n\n此 Swift 代码会将 `.dae` 文件（已转换为 `.scn`\
    \ 文件）加载到你的增强现实视图中。然而，还有最后一步。对于大多数 `.dae` 文件，都有一个伴随的纹理文件来定义三维对象的外观或“皮肤”。最后一步是将此纹理或“皮肤”应用到\
    \ `.scn` 文件。为此，请按照以下步骤操作：\n\n1.  在 Navigator 窗格中点击 `scnassets` 文件夹中显示的 `.scn`\
    \ 文件。Xcode 会将你的图像显示为一个通用形状，但没有外观。\n2.  点击 Xcode 窗口底部附近的“Show Scene Graph View”图标，如图\
    \ [2-23](#469983_1_En_2_Chapter.xhtml#Fig23) 所示。Xcode 将显示 Scene Graph View。\n\n\
    ![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig23_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig23_HTML.jpg)\n\
    \n图 2-23\n“Show Scene Graph View”图标\n\n3.  点击 Scene Graph View 窗格中显示的每个项目，然后点击“Show\
    \ the Material Inspector”图标，如图 [2-24](#469983_1_En_2_Chapter.xhtml#Fig24) 所示。或者选择\
    \ View ➤ inspectors ➤ Show Material Inspector。\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig24_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig24_HTML.jpg)\n\
    \n图 2-24\n“Show Material Inspector”图标\n\n4.  点击 Diffuse 弹出菜单，选择纹理文件的名称，例如`texture.jpg`，如图\
    \ [2-25](#469983_1_En_2_Chapter.xhtml#Fig25) 所示。\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig25_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig25_HTML.jpg)\n\
    \n图 2-25\nDiffuse 弹出菜单允许你选择纹理图像\n\n如果你的原始 `.dae` 文件附带两个或更多纹理文件，则可能需要将这些多个纹理文件包含在\
    \ `scnassets` 文件夹中，并使用 Diffuse 弹出菜单为三维对象的不同部分选择每个相应的纹理文件。\n\n现在，通过 USB 线将 iOS\
    \ 设备连接到 Macintosh，然后点击 Run 图标或选择 Product ➤ Run。你现在应该会看到你的 `.scn` 文件显示在 iOS 设备摄像头捕获的图像之上。"
  raw: "1.  Click on the Main.storyboard file in the Navigator pane of Xcode. Xcode\
    \ displays an iOS device on the storyboard screen that you can change by clicking\
    \ View As at the bottom of the storyboard screen, as shown in Figure [2-12](#469983_1_En_2_Chapter.xhtml#Fig12).\n\
    \n1.  Click the Use Standard Editor icon or choose View ➤ Standard Editor ➤ Use\
    \ Standard Editor.\n\n2.  Click the `ViewController.swift` file in the Navigator\
    \ pane. Xcode displays the Swift code stored in the `ViewController.swift` file.\n\
    \n3.  Edit the `viewDidLoad` function as follows:\n\n```\n    override func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    sceneView.delegate = self\n    sceneView.showsStatistics\
    \ = true\n    let scene = SCNScene(named: \"\")!\n    sceneView.scene = scene\n\
    \    }\n    ```\n\n```\n@IBOutlet var sceneView: ARSCNView!\n```\n\nThese code\
    \ changes essentially duplicate the ARKit iOS template. However, we still need\
    \ an object to place in our augmented reality view. When we created an augmented\
    \ reality app from the augmented reality template, that template included a `ship.scn`\
    \ file, where the .scn file extension stands for SceneKit.\n\nWhat we need initially\
    \ are files stored in the .dae COLLADA file format, which stands for COLLAborative\
    \ Design Activity. This file format is used as a standard file format for sharing\
    \ graphic designs for three-dimensional programs.\n\nTo find .dae COLLADA files,\
    \ visit your favorite search engine and look for “.dae public domain” files that\
    \ you can download. (For the artistically-inclined, you can create your own three-dimensional\
    \ objects using graphics editors, such as the free Blender program available at\
    \ [`www.blender.org`](http://www.blender.org) .) Most COLLADA files consist of\
    \ a .dae file that defines the shape of the object and a texture file that defines\
    \ the outer design of that shape. Two sites that offer free (and paid) COLLADA\
    \ files include Free3D ( [`https://free3d.com`](https://free3d.com) ) and TurboSquid\
    \ ( [`www.turbosquid.com`](http://www.turbosquid.com) ).\n\nOnce you’ve downloaded\
    \ a .dae COLLADA file along with any accompanying texture files, you must create\
    \ a special scnassets folder to store those images. To create an scnassets folder,\
    \ follow these steps:\n\n1.  Change the name of the folder to art.scnassets and\
    \ press Return.\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig20_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig20_HTML.jpg)\n\
    \nFigure 2-20\n\nChanging the name of the SceneKit Assets Catalog folder\n\n1.\
    \  Click the Next button. Xcode asks where you want to store this folder.\n\n\
    2.  Click the Create button. Xcode creates a SceneKit Asset Catalog.scnassets\
    \ folder in the Navigator pane.\n\n3.  Click on the SceneKit Asset Catalog.scnassets\
    \ folder and press Return. Xcode highlights the entire folder name, as shown in\
    \ Figure [2-20](#469983_1_En_2_Chapter.xhtml#Fig20).\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig19_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig19_HTML.jpg)\n\
    \nFigure 2-19\n\nChoosing the SceneKit Catalog icon\n\n1.  Choose File ➤ New ➤\
    \ File. Xcode displays different file templates.\n\n2.  Click iOS at the top of\
    \ the template window and scroll down to click on the SceneKit Catalog icon under\
    \ the Resource category, as shown in Figure [2-19](#469983_1_En_2_Chapter.xhtml#Fig19).\n\
    \nNow that we’ve written the bulk of the Swift code needed in the `ViewController.swift`\
    \ file and designed the user interface to display augmented reality through the\
    \ ARKit SceneKit View, the last step is to import a .dae file and its texture\
    \ file into the .scnassets folder you created in the Xcode Navigator pane.\n\n\
    To do add 3D images to Xcode, follow these steps:\n\n1.  Click the Convert button.\
    \ Xcode converts your .dae file to an .scn file.\n\n2.  (Optional) Click on the\
    \ .scn file and press Return to edit the filename to something simple and descriptive.\n\
    \n3.  Edit the following line in the `viewDidLoad` function to include the name\
    \ of your .scn file. If your .scn file was named `satellite.scn`, the code would\
    \ look like this:\n\n```\n    let scene = SCNScene(named: \"art.scnassets/satellite.scn\"\
    )!\n    ```\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig22_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig22_HTML.jpg)\n\
    \nFigure 2-22\n\nXcode asks for confirmation to convert the .dae file to an .scn\
    \ file\n\n1.  Click on the .dae file in the scnassets folder to select it.\n\n\
    2.  Choose Editor ➤ Convert to SceneKit scene file format (.scn). A dialog appears,\
    \ asking you to verify you want to convert the .dae file to a .scn file, as shown\
    \ in Figure [2-22](#469983_1_En_2_Chapter.xhtml#Fig22).\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig21_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig21_HTML.jpg)\n\
    \nFigure 2-21\n\nDrag and drop a .dae and texture file from the Finder window\
    \ to the scnassets folder in Xcode\n\n1.  Drag and drop the .dae and accompanying\
    \ texture file image from the Finder window to the scnassets folder, as shown\
    \ in Figure [2-21](#469983_1_En_2_Chapter.xhtml#Fig21).\n\nThis Swift code will\
    \ load the .dae file (converted to an .scn file) into your augmented reality view.\
    \ However, there’s still one last step. With most .dae files, there’s an accompanying\
    \ texture file that defines the outer appearance or “skin” of the three-dimensional\
    \ object. The final step is to apply this texture or “skin” to the .scn file.\
    \ To do this, follow these steps:\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig25_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig25_HTML.jpg)\n\
    \nFigure 2-25\n\nThe Diffuse popup menu lets you choose the texture image\n\n\
    1.  Click on the Diffuse popup menu and choose the name of your texture file,\
    \ such as `texture.jpg`, as shown in Figure [2-25](#469983_1_En_2_Chapter.xhtml#Fig25).\n\
    \n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig24_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig24_HTML.jpg)\n\
    \nFigure 2-24\n\nThe Show Material Inspector icon\n\n1.  Click on each item displayed\
    \ in the Scene Graph View pane and then click on the Show the Material Inspector\
    \ icon, as shown in Figure [2-24](#469983_1_En_2_Chapter.xhtml#Fig24). Or choose\
    \ View ➤ inspectors ➤ Show Material Inspector.\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig23_HTML.jpg](images/469983_1_En_2_Chapter/469983_1_En_2_Fig23_HTML.jpg)\n\
    \nFigure 2-23\n\nThe Show Scene Graph View icon\n\n1.  Click on the .scn file\
    \ in your scnassets folder displayed in the Navigator pane. Xcode displays your\
    \ image as a general shape but with no outer appearance.\n\n2.  Click the Show\
    \ Scene Graph View icon near the bottom of the Xcode window, as shown in Figure\
    \ [2-23](#469983_1_En_2_Chapter.xhtml#Fig23). Xcode displays the Scene Graph View.\n\
    \nIf your original .dae file came with two or more texture files, you may need\
    \ to include those multiple texture files in the scnassets folder and use the\
    \ Diffuse popup menu to select each appropriate texture file for different parts\
    \ of your three-dimensional object.\n\nNow attach an iOS device to your Macintosh\
    \ through its USB cable and click the Run icon or choose Product ➤ Run. You should\
    \ now see your .scn file displayed over the image captured by your iOS device’s\
    \ camera."
