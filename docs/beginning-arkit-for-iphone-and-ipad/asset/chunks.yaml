    \n当您想在现实世界中添加虚拟对象时，检测水平或垂直平面至关重要。您只需使用一行代码即可检测水平或垂直平面：\n\n```swift\nconfiguration.planeDetection\
    \ = .horizontal\n```\n\n或\n\n```swift\nconfiguration.planeDetection = .vertical\n\
    ```\n\n一旦 ARKit 检测到水平或垂直平面，它就可以使用纹理图像（例如水、砖块或沙子）来定义该平面。当您移动 iOS 设备的摄像头时，检测到的平面尺寸会逐渐增大。\n\
    \n# 12. 虚拟对象的物理特性\n\n迄今为止，当我们向增强现实视图中添加虚拟对象时，这些对象只是漂浮在半空中。虽然在某些情况下这或许可行，但在其他情况下，您可能希望虚拟对象的行为更接近真实物体，能够下落、反弹并相互碰撞。\n\
    \n为了让虚拟对象具备与真实物体相同的特性，您可以为任何虚拟对象定义物理特性。这意味着您可以定义虚拟对象如何与其他对象交互（静态、动态或运动学）、虚拟对象的形状（如盒子或球体）以及施加在虚拟对象上的力。\n\
    \n虚拟对象可以表现为以下三种方式之一：\n\n*   **静态** —— 无法移动，不受碰撞或力的影响。\n*   **动态** —— 受力和碰撞的影响。\n\
    *   **运动学** —— 不受力或碰撞的影响，但可以影响动态虚拟对象。\n\n静态虚拟对象适用于简单存在的场景。到目前为止，我们创建的所有虚拟对象都是静态的，因为它们不移动，也不影响任何其他虚拟对象。\n\
    \n动态虚拟对象则有趣得多，因为它们可以移动并受重力影响，这意味着它们会沿 y 轴下落至地面。动态虚拟对象可以移动，并与其他动态或运动学虚拟对象发生碰撞并反弹。\n\
    \n运动学虚拟对象本身不移动，但它们可以与动态虚拟对象发生碰撞。在视频游戏中，像道路或障碍物这样的固定物品可以是运动学虚拟对象。\n\n为了了解如何将物理特性应用于虚拟对象，请按照以下步骤创建一个新的\
    \ Xcode 项目：\n\n1.  启动 Xcode。（请确保您使用的是 Xcode 10 或更高版本。）\n2.  选择 File（文件）➤ New（新建）➤\
    \ Project（项目）。Xcode 将要求您选择一个模板。\n3.  单击 iOS 类别。\n4.  单击 Single View App（单视图应用）图标，然后单击\
    \ Next（下一步）按钮。Xcode 会询问产品名称、组织名称、组织标识符和内容技术。\n5.  在 Product Name（产品名称）文本框中单击并输入项目的描述性名称，例如\
    \ `Physics`。（具体名称不重要。）\n6.  单击 Next（下一步）按钮。Xcode 会询问您希望将项目存储在何处。\n7.  选择一个文件夹并单击\
    \ Create（创建）按钮。Xcode 将创建一个 iOS 项目。\n\n现在，按照以下步骤修改 `Info.plist` 文件以允许访问相机并使用 ARKit：\n\
    \n1.  在导航窗格中单击 `Info.plist` 文件。Xcode 将显示一个包含键、类型和值的列表。\n2.  单击展开三角形以展开 Required\
    \ Device Capabilities（必需的设备功能）类别，显示 Item 0。\n3.  将鼠标指针悬停在 Item 0 上以显示加号 (+) 图标。\n\
    4.  单击此加号 (+) 图标以显示一个空的 Item 1。\n5.  在 Item 1 行的 Value（值）类别下输入 `arkit`。\n6.  将鼠标指针移到最后一行以显示一个加号\
    \ (+) 图标。\n7.  单击加号 (+) 图标以创建新行。将出现一个弹出菜单。\n8.  选择 Privacy – Camera Usage Description（隐私\
    \ - 相机使用说明）。\n9.  在 Privacy – Camera Usage Description（隐私 - 相机使用说明）行的 Value（值）类别下输入\
    \ `AR 需要访问相机`。\n\n现在，按照以下步骤修改 `ViewController.swift` 文件以使用 ARKit 和 SceneKit：\n\
    \n1.  在导航窗格中单击 `ViewController.swift` 文件。\n2.  编辑 `ViewController.swift` 文件，使其如下所示：\n\
    \n```swift\nimport UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController:\
    \ UIViewController, ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n    }\n}\n```\n\
    \n要在我们的应用中查看增强现实内容，请添加一个 ARKit SceneKit View (`ARSCNView`) 并将其展开以填充整个用户界面。然后添加约束：选择\
    \ Editor（编辑器）➤ Resolve Auto Layout Issues（解决自动布局问题）➤ Reset to Suggested Constraints（重置为建议约束）（在菜单下半部分的\
    \ All Views in Container（容器中的所有视图）类别下）。\n"
- fmt: "# 连接用户界面与代码\n\n下一步是将用户界面项连接到 `ViewController.swift` 文件中的 Swift 代码。为此，请按照以下步骤操作：\n\
    \n1.  在导航器窗格中单击 `Main.storyboard` 文件。\n2.  单击“助手编辑器”图标，或选择“视图”➤“助手编辑器”➤“显示助手编辑器”，以并排显示\
    \ `Main.storyboard` 和 `ViewController.swift` 文件。\n3.  将鼠标指针移到 `ARSCNView` 上，按住\
    \ Control 键，然后按住 Control 键并拖动到 `class ViewController` 行的下方。\n4.  释放 Control 键和鼠标左键。将出现一个弹出菜单。\n\
    5.  在“名称”文本字段中单击并键入 `sceneView`，然后单击“连接”按钮。Xcode 会创建一个 IBOutlet，如下所示：\n\n```\n\
    @IBOutlet var sceneView: ARSCNView!\n```\n\n6.  编辑 `viewDidLoad` 函数，使其如下所示：\n\n\
    ```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n    sceneView.debugOptions\
    \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    sceneView.delegate = self\n    configuration.planeDetection = .horizontal\n\
    \    sceneView.session.run(configuration)\n    let tapGesture = UITapGestureRecognizer(target:\
    \ self, action: #selector(tapResponse))\n    sceneView.addGestureRecognizer(tapGesture)\n\
    }\n```\n\n`viewDidLoad` 函数的最后两行创建了一个点击手势，这意味着我们需要一个名为 `tapGesture` 的函数来处理该点击手势。\n\
    \n7.  在 `viewDidLoad` 函数下方，编写以下 `tapResponse` 函数：\n\n```\n@objc func tapResponse(sender:\
    \ UITapGestureRecognizer) {\n    let scene = sender.view as! ARSCNView\n    let\
    \ tapLocation = sender.location(in: scene)\n    let hitTest = scene.hitTest(tapLocation,\
    \ types: .existingPlaneUsingExtent)\n    if hitTest.isEmpty{\n        print (\"\
    no plane detected\")\n    } else {\n        print(\"found a horizontal plane\"\
    )\n        guard let hitResult = hitTest.first else { return }\n        addObject(hitResult:\
    \ hitResult)\n    }\n}\n```\n\n此 `tapResponse` 函数标识用户点击的屏幕位置，然后将此信息发送到一个 `addObject`\
    \ 函数，这意味着接下来我们需要编写 `addObject` 函数。\n\n8.  在 `tapResponse` 函数下方，编写以下 `addObject`\
    \ 函数：\n\n```\nfunc addObject(hitResult: ARHitTestResult) {\n    let objectNode\
    \ = SCNNode()\n    objectNode.geometry = SCNSphere(radius: 0.1)\n    objectNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.orange\n    objectNode.position = SCNVector3(hitResult.worldTransform.columns.3.x,\
    \ hitResult.worldTransform.columns.3.y + 0.5, hitResult.worldTransform.columns.3.z)\n\
    \    objectNode.physicsBody = SCNPhysicsBody(type: .dynamic, shape: nil)\n   \
    \ sceneView.scene.rootNode.addChildNode(objectNode)\n}\n```\n\n`addObject` 函数创建一个橙色球体。通常，这个橙色球体会悬浮在半空中，但我们通过以下代码行为其赋予了\
    \ `physicsBody`：\n\n```\nobjectNode.physicsBody = SCNPhysicsBody(type: .dynamic,\
    \ shape: nil)\n```\n\n此代码将橙色球体定义为动态物体，这意味着它可以受到力和与其他虚拟对象碰撞的影响。同时，其形状被定义为 `nil`，这意味着\
    \ ARKit 在计算与其他虚拟对象的碰撞时，会将球体的边界视为其物理体。\n\n## 检测并绘制虚拟平面\n\n现在我们需要检测水平面并在该位置绘制一个虚拟平面。为此，我们需要一个\
    \ `didAdd renderer` 函数，如下所示：\n\n```\nfunc renderer(_ renderer: SCNSceneRenderer,\
    \ didAdd node: SCNNode, for anchor: ARAnchor) {\n    guard anchor is ARPlaneAnchor\
    \ else { return }\n    let planeNode = displayPlane(anchor: anchor as! ARPlaneAnchor)\n\
    \    node.addChildNode(planeNode)\n}\n```\n\n请注意，这个 `renderer` 函数会通过持续寻找水平面而多次运行。当它识别到一个水平面时，它会调用\
    \ `displayPlane` 函数来创建该虚拟平面。这意味着我们需要编写一个如下所示的 `displayPlane` 函数：\n\n```\nfunc\
    \ displayPlane(anchor: ARPlaneAnchor) -> SCNNode {\n    let planeNode = SCNNode()\n\
    \    planeNode.geometry = SCNPlane(width: CGFloat(anchor.extent.x), height: CGFloat(anchor.extent.z))\n\
    \    planeNode.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n  \
    \  planeNode.position = SCNVector3(anchor.center.x, anchor.center.y, anchor.center.z)\n\
    \    let ninetyDegrees = GLKMathDegreesToRadians(90)\n    planeNode.eulerAngles\
    \ = SCNVector3(ninetyDegrees, 0, 0)\n    planeNode.physicsBody = SCNPhysicsBody(type:\
    \ .kinematic, shape: nil)\n    planeNode.geometry?.firstMaterial?.isDoubleSided\
    \ = true\n    return planeNode\n}\n```\n\n这个 `displayPlane` 函数接收存储在 `ARPlaneAnchor`\
    \ 中的水平面信息，该锚点定义了平面的大小和位置。因此，我们需要创建一个平面节点，并根据 `ARPlaneAnchor` 信息赋予其大小：\n\n```\n\
    planeNode.geometry = SCNPlane(width: CGFloat(anchor.extent.x), height: CGFloat(anchor.extent.z))\n\
    ```\n\n然后我们将虚拟平面着色为黄色，并将其定位在 ARKit 识别的水平面的中心。接下来，我们需要将平面围绕 x 轴旋转 90 度，使其像地板一样水平显示，而不是像墙一样垂直显示。\n\
    \n最重要的是，我们需要像这样为这个虚拟平面赋予物理体：\n\n```\nplaneNode.physicsBody = SCNPhysicsBody(type:\
    \ .kinematic, shape: nil)\n```\n\n这段代码将虚拟平面定义为运动学类型，这意味着它在与虚拟对象碰撞时不会移动，但会影响与其碰撞的任何虚拟对象。我们将形状定义为\
    \ `nil`，这会告诉 ARKit 在计算与其他虚拟对象的碰撞时，将整个虚拟平面视为其物理体。\n\n## 更新虚拟平面\n\n最后，如果用户移动 iOS\
    \ 设备的摄像头以捕捉更多的水平面，我们需要一个 `renderer didUpdate` 函数来扩展虚拟平面的大小。这个 `renderer didUpdate`\
    \ 函数如下所示：\n\n```\nfunc renderer(_ renderer: SCNSceneRenderer, didUpdate node:\
    \ SCNNode, for anchor: ARAnchor) {\n    guard anchor is ARPlaneAnchor else { return\
    \ }\n    node.enumerateChildNodes { (childNode, _) in\n        childNode.removeFromParentNode()\n\
    \    }\n    let planeNode = displayPlane(anchor: anchor as! ARPlaneAnchor)\n \
    \   node.addChildNode(planeNode)\n}\n```\n\n这个 `didUpdate renderer` 函数在每次检测到水平面比最初计算的大时，都会移除虚拟平面并重新绘制一个新的虚拟平面。然后它会调用\
    \ `displayPlane` 函数，在增强现实视图中绘制一个虚拟平面。\n\n## 测试项目\n\n要测试此项目，请按照以下步骤操作：\n\n1.  单击“停止”按钮或选择“产品”➤“停止”。\n\
    2.  将 iOS 设备通过 USB 数据线连接到 Macintosh。\n3.  单击“运行”按钮或选择“产品”➤“运行”。第一次运行此应用程序时，它会请求访问摄像头的权限，请授予该权限。\n\
    4.  将 iOS 设备的摄像头对准水平面（例如桌子或地板）。ARKit 第一次识别水平面时，Xcode 调试区域会显示“found a horizontal\
    \ plane”消息。\n5.  移动 iOS 设备以捕捉更多的水平面。每次 ARKit 识别到水平面的新部分时，黄色平面都会变大。\n\n![../images/469983_1_En_12_Chapter/469983_1_En_12_Fig1_HTML.jpg](images/469983_1_En_12_Chapter/469983_1_En_12_Fig1_HTML.jpg)\n\
    \n图 12-1：橙色球体可以下落并撞击黄色平面"
  raw: "The next step is to connect the user interface items to the Swift code in\
    \ the `ViewController.swift` file. To do this, follow these steps:\n\n1.  Click\
    \ the `Main.storyboard` file in the Navigator pane.\n\n2.  Click the Assistant\
    \ Editor icon or choose View ➤ Assistant Editor ➤ Show Assistant Editor to display\
    \ the `Main.storyboard` and the `ViewController.swift` file side by side.\n\n\
    3.  Move the mouse pointer over the ARSCNView, hold down the Control key, and\
    \ Ctrl-drag under the `class ViewController` line.\n\n4.  Release the Control\
    \ key and the left mouse button. A popup menu appears.\n\n5.  Click in the Name\
    \ text field and type `sceneView`, then click the Connect button. Xcode creates\
    \ an IBOutlet as shown here:\n\n```\n    @IBOutlet var sceneView: ARSCNView!\n\
    \    ```\n\n6.  Edit the `viewDidLoad` function so it looks like this:\n\n```\n\
    \    override func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n    sceneView.debugOptions\
    \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    sceneView.delegate = self\n    configuration.planeDetection = .horizontal\n\
    \    sceneView.session.run(configuration)\n    let tapGesture = UITapGestureRecognizer(target:\
    \ self, action: #selector(tapResponse))\n    sceneView.addGestureRecognizer(tapGesture)\n\
    \    }\n    ```\n\nThe last two lines in the `viewDidLoad` function create a tap\
    \ gesture, which means we’ll need a function to handle the tap gesture, called\
    \ `tapGesture`.\n\n7.  Underneath the `viewDidLoad` function, write the following\
    \ `tapResponse` function :\n\n```\n    @objc func tapResponse(sender: UITapGestureRecognizer)\
    \ {\n    let scene = sender.view as! ARSCNView\n    let tapLocation = sender.location(in:\
    \ scene)\n    let hitTest = scene.hitTest(tapLocation, types: .existingPlaneUsingExtent)\n\
    \    if hitTest.isEmpty{\n    print (\"no plane detected\")\n    } else {\n  \
    \  print(\"found a horizontal plane\")\n    guard let hitResult = hitTest.first\
    \ else { return }\n    addObject(hitResult: hitResult)\n    }\n    }\n    ```\n\
    \nThis `tapResponse` function identifies the location on the screen where the\
    \ user tapped and then sends this information to an `addObject` function, which\
    \ means we need to write the `addObject` function next.\n\n8.  Underneath the\
    \ `tapResponse` function, write the following `addObject` function:\n\n```\n \
    \   func addObject(hitResult: ARHitTestResult) {\n    let objectNode = SCNNode()\n\
    \    objectNode.geometry = SCNSphere(radius: 0.1)\n    objectNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.orange\n    objectNode.position = SCNVector3(hitResult.worldTransform.columns.3.x,\
    \ hitResult.worldTransform.columns.3.y + 0.5, hitResult.worldTransform.columns.3.z)\n\
    \    objectNode.physicsBody = SCNPhysicsBody(type: .dynamic, shape: nil)\n   \
    \ sceneView.scene.rootNode.addChildNode(objectNode)\n    }\n    ```\n\nThe `addObject`\
    \ function creates an orange sphere. Normally this orange sphere would float in\
    \ mid-air but we’ve given it a `physicsBody` with this line:\n\n```\nobjectNode.physicsBody\
    \ = SCNPhysicsBody(type: .dynamic, shape: nil)\n```\n\nThis code defines the orange\
    \ sphere as dynamic, which means it can be affected by forces and collisions with\
    \ other virtual objects. Also its shape is defined as nil, which means ARKit will\
    \ treat the sphere’s boundaries as its body when calculating collisions with other\
    \ virtual objects.\n\nNow we need to detect a horizontal plane and draw a virtual\
    \ plane in that spot. To do that, we need a `didAdd renderer` function like this:\n\
    \n```\nfunc renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:\
    \ ARAnchor) {\nguard anchor is ARPlaneAnchor else { return }\nlet planeNode =\
    \ displayPlane(anchor: anchor as! ARPlaneAnchor)\nnode.addChildNode(planeNode)\n\
    }\n```\n\nNotice that this `renderer` function runs multiple times by constantly\
    \ looking for a horizontal plane. When it identifies a horizontal plane, then\
    \ it calls a `displayPlane` function to create that virtual plane. That means\
    \ we need to write a `displayPlane` function like this:\n\n```\nfunc displayPlane(anchor:\
    \ ARPlaneAnchor) -> SCNNode {\nlet planeNode = SCNNode()\nplaneNode.geometry =\
    \ SCNPlane(width: CGFloat(anchor.extent.x), height: CGFloat(anchor.extent.z))\n\
    planeNode.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\nplaneNode.position\
    \ = SCNVector3(anchor.center.x, anchor.center.y, anchor.center.z)\nlet ninetyDegrees\
    \ = GLKMathDegreesToRadians(90)\nplaneNode.eulerAngles = SCNVector3(ninetyDegrees,\
    \ 0, 0)\nplaneNode.physicsBody = SCNPhysicsBody(type: .kinematic, shape: nil)\n\
    planeNode.geometry?.firstMaterial?.isDoubleSided = true\nreturn planeNode\n}\n\
    ```\n\nThis `displayPlane` function receives information about horizontal plane\
    \ stored in `ARPlaneAnchor`, which defines a plane’s size and position. So we\
    \ need to create a plane node and give it a size based on the `ARPlaneAnchor`\
    \ information:\n\n```\nplaneNode.geometry = SCNPlane(width: CGFloat(anchor.extent.x),\
    \ height: CGFloat(anchor.extent.z))\n```\n\nThen we color the virtual plane yellow\
    \ and position it in the center of the horizontal plane that ARKit recognized.\
    \ Next, we need to rotate the plane 90 degrees around the x-axis, so instead of\
    \ appearing vertically like a wall, it appears horizontally like a floor.\n\n\
    Most importantly, we need to give this virtual plane a physics body like this:\n\
    \n```\nplaneNode.physicsBody = SCNPhysicsBody(type: .kinematic, shape: nil)\n\
    ```\n\nThis code defines the virtual plane as kinematic, which means it won’t\
    \ move when colliding with virtual objects, but it will affect any virtual objects\
    \ colliding with it. We define its shape as nil, which tells ARKit to define the\
    \ entire virtual plane as its physical body when calculating collisions with other\
    \ virtual objects.\n\nFinally, we need a `renderer didUpdate` function to expand\
    \ the size of the virtual plane if the user moves the iOS device’s camera to capture\
    \ more of the horizontal plane. This `renderer didUpdate` function looks like\
    \ this:\n\n```\nfunc renderer(_ renderer: SCNSceneRenderer, didUpdate node: SCNNode,\
    \ for anchor: ARAnchor) {\nguard anchor is ARPlaneAnchor else { return }\nnode.enumerateChildNodes\
    \ { (childNode, _) in\nchildNode.removeFromParentNode()\n}\nlet planeNode = displayPlane(anchor:\
    \ anchor as! ARPlaneAnchor)\nnode.addChildNode(planeNode)\n}\n```\n\nThis `didUpdate\
    \ renderer` function removes the virtual plane and redraws a new virtual plane\
    \ each time it detects that the horizontal plane is larger than it initially calculated.\
    \ Then it calls the `displayPlane` function to draw a virtual plane in the augmented\
    \ reality view.\n\nTo test this project, follow these steps:\n\n1.  Click the\
    \ Stop button or choose Product ➤ Stop.\n\n![../images/469983_1_En_12_Chapter/469983_1_En_12_Fig1_HTML.jpg](images/469983_1_En_12_Chapter/469983_1_En_12_Fig1_HTML.jpg)\n\
    \nFigure 12-1\n\nThe orange sphere can fall and hit the yellow plane\n\n1.  Connect\
    \ an iOS device to your Macintosh through its USB cable.\n\n2.  Click the Run\
    \ button or choose Product ➤ Run. The first time you run this app, it will ask\
    \ permission to access the camera so give it permission.\n\n3.  Aim the iOS device’s\
    \ camera at a horizontal plane such as a table or the floor. The first time ARKit\
    \ identifies a horizontal plane, the Xcode debug area displays the message “found\
    \ a horizontal plane”.\n\n4.  Move the iOS device around to capture more of the\
    \ horizontal plane. Each time ARKit recognizes a new part of the horizontal plane,\
    \ the yellow plane grows in size."
  trans: "\n# 连接用户界面与代码\n\n下一步是将用户界面项连接到 `ViewController.swift` 文件中的 Swift 代码。为此，请按照以下步骤操作：\n\
    \n1.  在导航器窗格中单击 `Main.storyboard` 文件。\n2.  单击“助手编辑器”图标，或选择“视图”➤“助手编辑器”➤“显示助手编辑器”，以并排显示\
    \ `Main.storyboard` 和 `ViewController.swift` 文件。\n3.  将鼠标指针移到 `ARSCNView` 上，按住\
    \ Control 键，然后按住 Control 键并拖动到 `class ViewController` 行的下方。\n4.  释放 Control 键和鼠标左键。将出现一个弹出菜单。\n\
    5.  在“名称”文本字段中单击并键入 `sceneView`，然后单击“连接”按钮。Xcode 会创建一个 IBOutlet，如下所示：\n\n```\n\
    @IBOutlet var sceneView: ARSCNView!\n```\n\n6.  编辑 `viewDidLoad` 函数，使其如下所示：\n\n\
    ```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n    sceneView.debugOptions\
    \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    sceneView.delegate = self\n    configuration.planeDetection = .horizontal\n\
    \    sceneView.session.run(configuration)\n    let tapGesture = UITapGestureRecognizer(target:\
    \ self, action: #selector(tapResponse))\n    sceneView.addGestureRecognizer(tapGesture)\n\
    }\n```\n\n`viewDidLoad` 函数的最后两行创建了一个点击手势，这意味着我们需要一个名为 `tapGesture` 的函数来处理该点击手势。\n\
    \n7.  在 `viewDidLoad` 函数下方，编写以下 `tapResponse` 函数：\n\n```\n@objc func tapResponse(sender:\
    \ UITapGestureRecognizer) {\n    let scene = sender.view as! ARSCNView\n    let\
    \ tapLocation = sender.location(in: scene)\n    let hitTest = scene.hitTest(tapLocation,\
    \ types: .existingPlaneUsingExtent)\n    if hitTest.isEmpty{\n        print (\"\
    no plane detected\")\n    } else {\n        print(\"found a horizontal plane\"\
    )\n        guard let hitResult = hitTest.first else { return }\n        addObject(hitResult:\
    \ hitResult)\n    }\n}\n```\n\n此 `tapResponse` 函数标识用户点击的屏幕位置，然后将此信息发送到一个 `addObject`\
    \ 函数，这意味着接下来我们需要编写 `addObject` 函数。\n\n8.  在 `tapResponse` 函数下方，编写以下 `addObject`\
    \ 函数：\n\n```\nfunc addObject(hitResult: ARHitTestResult) {\n    let objectNode\
    \ = SCNNode()\n    objectNode.geometry = SCNSphere(radius: 0.1)\n    objectNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.orange\n    objectNode.position = SCNVector3(hitResult.worldTransform.columns.3.x,\
    \ hitResult.worldTransform.columns.3.y + 0.5, hitResult.worldTransform.columns.3.z)\n\
    \    objectNode.physicsBody = SCNPhysicsBody(type: .dynamic, shape: nil)\n   \
    \ sceneView.scene.rootNode.addChildNode(objectNode)\n}\n```\n\n`addObject` 函数创建一个橙色球体。通常，这个橙色球体会悬浮在半空中，但我们通过以下代码行为其赋予了\
    \ `physicsBody`：\n\n```\nobjectNode.physicsBody = SCNPhysicsBody(type: .dynamic,\
    \ shape: nil)\n```\n\n此代码将橙色球体定义为动态物体，这意味着它可以受到力和与其他虚拟对象碰撞的影响。同时，其形状被定义为 `nil`，这意味着\
    \ ARKit 在计算与其他虚拟对象的碰撞时，会将球体的边界视为其物理体。\n\n## 检测并绘制虚拟平面\n\n现在我们需要检测水平面并在该位置绘制一个虚拟平面。为此，我们需要一个\
    \ `didAdd renderer` 函数，如下所示：\n\n```\nfunc renderer(_ renderer: SCNSceneRenderer,\
    \ didAdd node: SCNNode, for anchor: ARAnchor) {\n    guard anchor is ARPlaneAnchor\
    \ else { return }\n    let planeNode = displayPlane(anchor: anchor as! ARPlaneAnchor)\n\
    \    node.addChildNode(planeNode)\n}\n```\n\n请注意，这个 `renderer` 函数会通过持续寻找水平面而多次运行。当它识别到一个水平面时，它会调用\
    \ `displayPlane` 函数来创建该虚拟平面。这意味着我们需要编写一个如下所示的 `displayPlane` 函数：\n\n```\nfunc\
    \ displayPlane(anchor: ARPlaneAnchor) -> SCNNode {\n    let planeNode = SCNNode()\n\
    \    planeNode.geometry = SCNPlane(width: CGFloat(anchor.extent.x), height: CGFloat(anchor.extent.z))\n\
    \    planeNode.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n  \
    \  planeNode.position = SCNVector3(anchor.center.x, anchor.center.y, anchor.center.z)\n\
    \    let ninetyDegrees = GLKMathDegreesToRadians(90)\n    planeNode.eulerAngles\
    \ = SCNVector3(ninetyDegrees, 0, 0)\n    planeNode.physicsBody = SCNPhysicsBody(type:\
    \ .kinematic, shape: nil)\n    planeNode.geometry?.firstMaterial?.isDoubleSided\
    \ = true\n    return planeNode\n}\n```\n\n这个 `displayPlane` 函数接收存储在 `ARPlaneAnchor`\
    \ 中的水平面信息，该锚点定义了平面的大小和位置。因此，我们需要创建一个平面节点，并根据 `ARPlaneAnchor` 信息赋予其大小：\n\n```\n\
    planeNode.geometry = SCNPlane(width: CGFloat(anchor.extent.x), height: CGFloat(anchor.extent.z))\n\
    ```\n\n然后我们将虚拟平面着色为黄色，并将其定位在 ARKit 识别的水平面的中心。接下来，我们需要将平面围绕 x 轴旋转 90 度，使其像地板一样水平显示，而不是像墙一样垂直显示。\n\
    \n最重要的是，我们需要像这样为这个虚拟平面赋予物理体：\n\n```\nplaneNode.physicsBody = SCNPhysicsBody(type:\
    \ .kinematic, shape: nil)\n```\n\n这段代码将虚拟平面定义为运动学类型，这意味着它在与虚拟对象碰撞时不会移动，但会影响与其碰撞的任何虚拟对象。我们将形状定义为\
    \ `nil`，这会告诉 ARKit 在计算与其他虚拟对象的碰撞时，将整个虚拟平面视为其物理体。\n\n## 更新虚拟平面\n\n最后，如果用户移动 iOS\
    \ 设备的摄像头以捕捉更多的水平面，我们需要一个 `renderer didUpdate` 函数来扩展虚拟平面的大小。这个 `renderer didUpdate`\
    \ 函数如下所示：\n\n```\nfunc renderer(_ renderer: SCNSceneRenderer, didUpdate node:\
    \ SCNNode, for anchor: ARAnchor) {\n    guard anchor is ARPlaneAnchor else { return\
    \ }\n    node.enumerateChildNodes { (childNode, _) in\n        childNode.removeFromParentNode()\n\
    \    }\n    let planeNode = displayPlane(anchor: anchor as! ARPlaneAnchor)\n \
    \   node.addChildNode(planeNode)\n}\n```\n\n这个 `didUpdate renderer` 函数在每次检测到水平面比最初计算的大时，都会移除虚拟平面并重新绘制一个新的虚拟平面。然后它会调用\
    \ `displayPlane` 函数，在增强现实视图中绘制一个虚拟平面。\n\n## 测试项目\n\n要测试此项目，请按照以下步骤操作：\n\n1.  单击“停止”按钮或选择“产品”➤“停止”。\n\
    2.  将 iOS 设备通过 USB 数据线连接到 Macintosh。\n3.  单击“运行”按钮或选择“产品”➤“运行”。第一次运行此应用程序时，它会请求访问摄像头的权限，请授予该权限。\n\
    4.  将 iOS 设备的摄像头对准水平面（例如桌子或地板）。ARKit 第一次识别水平面时，Xcode 调试区域会显示“found a horizontal\
    \ plane”消息。\n5.  移动 iOS 设备以捕捉更多的水平面。每次 ARKit 识别到水平面的新部分时，黄色平面都会变大。\n\n![../images/469983_1_En_12_Chapter/469983_1_En_12_Fig1_HTML.jpg](img/469983_1_En_12_Fig1_HTML.jpg)\n\
    \n图 12-1：橙色球体可以下落并撞击黄色平面\n"
- fmt: "5. Tap the screen. Each time you tap the screen, an orange sphere should appear,\
    \ as shown in Figure [12-1](#469983_1_En_12_Chapter.xhtml#Fig1). Because the orange\
    \ sphere was defined as a `.dynamic` physics body, it’s affected by forces such\
    \ as gravity, which causes the orange sphere to drop. If the orange sphere hits\
    \ the yellow plane, it either bounces off it or rests on top of it. If you keep\
    \ tapping the screen to add more orange spheres, the orange spheres will bounce\
    \ off each other and the yellow plane. That’s because the yellow sphere is defined\
    \ as a `.kinematic` physics body, which means forces such as gravity do not affect\
    \ it, but it can collide with other virtual objects such as the orange spheres.\n\
    \nBecause the orange sphere is defined as a `.dynamic` physics body, it’s affected\
    \ by gravity. Because the yellow plane is defined as a `.kinematic` physics body,\
    \ it is not affected by gravity but can interact with other virtual objects like\
    \ the orange spheres.\n\nIf you ever create a virtual object defined as a `.dynamic`\
    \ physics body and don’t want it affected by gravity, you can set its `isAffectedByGravity`\
    \ property to `false` like this:\n\n```\nobjectNode.physicsBody?.isAffectedByGravity\
    \ = false\n```\n\nIf you add this line to the `addObject` function, each time\
    \ you tap on the screen to add an orange sphere, the orange sphere will just hover\
    \ in mid-air because it won’t be affected by gravity, even though it’s defined\
    \ as a `.dynamic` physics body.\n\n## Applying Force on Virtual Objects\n\nSo\
    \ far, we’ve created virtual objects that either hover in mid-air or respond to\
    \ gravity by falling. Another way to interact with virtual objects is by applying\
    \ a force to them. To apply a force on a virtual object, you need to define the\
    \ force’s direction and whether you want it to be instantaneous or not.\n\nLet’s\
    \ create a new Xcode project to display three targets and fire a projectile at\
    \ those three targets by following these steps:\n\n1. Start Xcode. (Make sure\
    \ you’re using Xcode 10 or greater.)\n2. Choose File ➤ New ➤ Project. Xcode asks\
    \ you to choose a template.\n3. Click the iOS category.\n4. Click the Single View\
    \ App icon and click the Next button. Xcode asks for a product name, organization\
    \ name, organization identifiers, and content technology.\n5. Click in the Product\
    \ Name text field and type a descriptive name for your project, such as `PhysicsForce`.\
    \ (The exact name does not matter.)\n6. Click the Next button. Xcode asks where\
    \ you want to store your project.\n7. Choose a folder and click the Create button.\
    \ Xcode creates an iOS project.\n\nNow modify the `Info.plist` file to allow access\
    \ to the camera and to use ARKit by following these steps:\n\n1. Click the `Info.plist`\
    \ file in the Navigator pane. Xcode displays a list of keys, types, and values.\n\
    2. Click the disclosure triangle to expand the Required Device Capabilities category\
    \ to display Item 0.\n3. Move the mouse pointer over Item 0 to display a plus\
    \ (`+`) icon.\n4. Click this plus (`+`) icon to display a blank Item 1.\n5. Type\
    \ `arkit` under the Value category in the Item 1 row.\n6. Move the mouse pointer\
    \ over the last row to display a plus (`+`) icon.\n7. Click on the plus (`+`)\
    \ icon to create a new row. A popup menu appears.\n8. Choose Privacy – Camera\
    \ Usage Description.\n9. Type `AR needs to use the camera` under the Value category\
    \ in the Privacy – Camera Usage Description row.\n\nNow it’s time to modify the\
    \ `ViewController.swift` file to use ARKit and SceneKit by following these steps:\n\
    \n1. Click on the `ViewController.swift` file in the Navigator pane.\n2. Edit\
    \ the `ViewController.swift` file so it looks like this:\n\n```\nimport UIKit\n\
    import SceneKit\nimport ARKit\nclass ViewController: UIViewController, ARSCNViewDelegate\
    \ {\n    let configuration = ARWorldTrackingConfiguration()\n    override func\
    \ viewDidLoad() {\n        super.viewDidLoad()\n        // Do any additional setup\
    \ after loading the view, typically from a nib.\n    }\n}\n```\n\nTo view augmented\
    \ reality in our app, add a single ARKit SceneKit View (`ARSCNView`) so it fills\
    \ the entire user interface (see Figure [11-1](#469983_1_En_11_Chapter.xhtml#Fig1)\
    \ in Chapter [11](#469983_1_En_11_Chapter.xhtml)).\n\nAfter you’ve designed your\
    \ user interface, you need to add constraints. To add constraints, choose Editor\
    \ ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints at the bottom\
    \ half of the menu under the All Views in Container category.\n\nThe next step\
    \ is to connect the user interface items to the Swift code in the `ViewController.swift`\
    \ file. To do this, follow these steps:\n\n1. Click the `Main.storyboard` file\
    \ in the Navigator pane.\n2. Click the Assistant Editor icon or choose View ➤\
    \ Assistant Editor ➤ Show Assistant Editor to display the `Main.storyboard` and\
    \ the `ViewController.swift` file side by side.\n3. Move the mouse pointer over\
    \ the `ARSCNView`, hold down the Control key, and Ctrl-drag under the `class ViewController`\
    \ line.\n4. Release the Control key and the left mouse button. A popup menu appears.\n\
    5. Click in the Name text field and type `sceneView`, then click the Connect button.\
    \ Xcode creates an IBOutlet as shown here:\n\n```\n@IBOutlet var sceneView: ARSCNView!\n\
    ```\n\n6. Edit the `viewDidLoad` function so it looks like this:"
