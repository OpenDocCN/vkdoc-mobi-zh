    \ of the `ViewController.swift` file, write the following `getData` function.\
    \ In this example, the project contains two pictures of rockets so the text in\
    \ the `getData` function reflects this, but you can type any text you want that\
    \ best corresponds with the two images stored in your project:\n\n```\n    func\
    \ getData() {\n    let item1 = Images(title: \"CRS-15 SpaceX rocket\", info: \"\
    Commercial Resupply Service\")\n    let item2 = Images(title: \"Saturn V rocket\"\
    , info: \"Apollo moon launch vehicle\")\n    imageArray.append(item1)\n    imageArray.append(item2)\n\
    \    }\n    ```\n\nThe `getData` function creates two structures and fills the\
    \ elements of those structures with text for the title and info properties. Then\
    \ it stores that structure into an array. Now we need to use the `name` property\
    \ of each image to identify what image the app currently recognizes.\n\n6.  Write\
    \ the following `nodeFor renderer` function :\n\n```\n    func renderer(_ renderer:\
    \ SCNSceneRenderer, nodeFor anchor: ARAnchor) -> SCNNode? {\n    guard let imageAnchor\
    \ = anchor as? ARImageAnchor else { return nil }\n    switch imageAnchor.referenceImage.name\
    \ {\n    case \"CRS-15\":\n    print(imageArray[0].title)\n    print(imageArray[0].info)\n\
    \    case \"SaturnV\":\n    print(imageArray[1].title)\n    print(imageArray[1].info)\n\
    \    default:\n    print(\"Nothing found\")\n    }\n    return node\n    }\n \
    \   ```\n\nThis function runs when it recognizes an image (`ARImageAnchor`). Then\
    \ it uses the `name` property of the recognized image to determine which information\
    \ to display. The entire `ViewController.swift` file should look like this:\n\n\
    ```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController: UIViewController,\
    \ ARSCNViewDelegate  {\n@IBOutlet var sceneView: ARSCNView!\nlet configuration\
    \ = ARWorldTrackingConfiguration()\nstruct Images {\nvar title: String\nvar info:\
    \ String\n}\nvar imageArray: [Images] = []\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n\
    // Do any additional setup after loading the view, typically from a nib.\nsceneView.debugOptions\
    \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    sceneView.delegate = self\nguard let storedImages =  ARReferenceImage.referenceImages(inGroupNamed:\
    \ \"AR Resources\", bundle: nil) else {\nfatalError(\"Missing AR Resources images\"\
    )\n}\nconfiguration.detectionImages = storedImages\ngetData()\nsceneView.session.run(configuration)\n\
    }\nfunc renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:\
    \ ARAnchor) {\nif anchor is ARImageAnchor {\nprint(\"Item recognized\")\n}\n}\n\
    func renderer(_ renderer: SCNSceneRenderer, nodeFor anchor: ARAnchor) -> SCNNode?\
    \ {\nguard let imageAnchor = anchor as? ARImageAnchor else { return nil }\nswitch\
    \ imageAnchor.referenceImage.name {\ncase \"CRS-15\":\nprint(imageArray[0].title)\n\
    print(imageArray[0].info)\ncase \"SaturnV\":\nprint(imageArray[1].title)\nprint(imageArray[1].info)\n\
    default:\nprint(\"Nothing found\")\n}\nlet node = SCNNode()\nnode.addChildNode(planeNode)\n\
    return node\n}\nfunc getData() {\nlet item1 = Images(title: \"CRS-15 SpaceX rocket\"\
    , info: \"Commercial Resupply Service\")\nlet item2 = Images(title: \"Saturn V\
    \ rocket\", info: \"Apollo moon launch vehicle\")\nimageArray.append(item1)\n\
    imageArray.append(item2)\n}\n}\n```\n\nTo test this code, follow these steps:\n\
    \n1.  Connect an iOS device to your Macintosh through its USB cable.\n\n2.  Click\
    \ the Run button or choose Product ➤ Run.\n\n3.  Point the iOS device’s camera\
    \ at one of the images stored in the app’s `AR Resources` folder .\n\n4.  The\
    \ Xcode debug area displays text related to your image.\n\n5.  Click the Stop\
    \ button or choose Product ➤ Stop."
  trans: "\n# 检测多张图像\n\n仅识别单张图像会有局限性。因此，要让应用识别多张图像，只需在`AR Resources`文件夹中存储多张图像即可。现在，应用将能够识别不同的图像，并根据识别到的图像做出响应。\n\
    \n为了识别 ARKit 具体识别的是哪张图像，你可以为每张图像赋予一个唯一的名称。这样，每次应用识别到图像时，它就能检索该图像的名称，从而精确判断 iOS\
    \ 设备摄像头前的是哪张图像。\n\n当你在`AR Resources`文件夹中存储图像时，不仅需要定义其宽度和高度，还必须定义其名称。这个名称可以是任意描述性的文字，如图\
    \ 14-3 所示。\n\n![../images/469983_1_En_14_Chapter/469983_1_En_14_Fig3_HTML.jpg](img/469983_1_En_14_Fig3_HTML.jpg)\n\
    \n**图 14-3** 每张图像都需要一个唯一名称\n\n一旦你在`AR Resources`文件夹中添加了两张或更多图像，就可以通过检索已识别图像的`name`属性，来判断当前位于\
    \ iOS 设备摄像头前的是哪张图像。\n\n为了了解如何识别已识别的图像，让我们按照以下步骤修改`ImageDetection`项目：\n\n1.  将第二张图像拖放至`AR\
    \ Resources`文件夹中。确保为这第二张图像赋予一个唯一名称，这样存储的两张图像就拥有不同的名字。\n\n2.  在`class ViewController`一行下方，创建如下结构体：\n\
    \n```\nstruct Images {\n    var title: String\n    var info: String\n}\n```\n\n\
    3.  接着，创建一个空数组来存放这个结构体，如下所示：\n\n```\nvar imageArray: [Images] = []\n```\n\n4.\
    \  在`viewDidLoad`函数中，添加以下函数调用：\n\n```\ngetData()\n```\n\n5.  在`ViewController.swift`文件的底部，编写如下`getData`函数。在本示例中，项目包含两张火箭图片，因此`getData`函数中的文本也相应体现这一点。当然，你也可以输入任何与你项目中存储的两张图像最匹配的文本：\n\
    \n```\nfunc getData() {\n    let item1 = Images(title: \"CRS-15 SpaceX rocket\"\
    , info: \"Commercial Resupply Service\")\n    let item2 = Images(title: \"Saturn\
    \ V rocket\", info: \"Apollo moon launch vehicle\")\n    imageArray.append(item1)\n\
    \    imageArray.append(item2)\n}\n```\n\n`getData`函数创建了两个结构体，并用文本填充了这些结构体的`title`和`info`属性。然后，它将这个结构体存入一个数组。现在我们需要使用每张图像的`name`属性来识别应用当前识别到的是哪张图像。\n\
    \n6.  编写以下`nodeFor renderer`函数：\n\n```\nfunc renderer(_ renderer: SCNSceneRenderer,\
    \ nodeFor anchor: ARAnchor) -> SCNNode? {\n    guard let imageAnchor = anchor\
    \ as? ARImageAnchor else { return nil }\n    switch imageAnchor.referenceImage.name\
    \ {\n    case \"CRS-15\":\n        print(imageArray[0].title)\n        print(imageArray[0].info)\n\
    \    case \"SaturnV\":\n        print(imageArray[1].title)\n        print(imageArray[1].info)\n\
    \    default:\n        print(\"Nothing found\")\n    }\n    return node\n}\n```\n\
    \n当识别到图像（`ARImageAnchor`）时，此函数会运行。然后，它使用已识别图像的`name`属性来决定显示哪条信息。整个`ViewController.swift`文件应如下所示：\n\
    \n```\nimport UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController: UIViewController,\
    \ ARSCNViewDelegate  {\n    @IBOutlet var sceneView: ARSCNView!\n    let configuration\
    \ = ARWorldTrackingConfiguration()\n    \n    struct Images {\n        var title:\
    \ String\n        var info: String\n    }\n    \n    var imageArray: [Images]\
    \ = []\n    \n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        // Do any additional setup after loading the view, typically from a nib.\n\
    \        sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \        sceneView.delegate = self\n        \n        guard let storedImages =\
    \ ARReferenceImage.referenceImages(inGroupNamed: \"AR Resources\", bundle: nil)\
    \ else {\n            fatalError(\"Missing AR Resources images\")\n        }\n\
    \        configuration.detectionImages = storedImages\n        \n        getData()\n\
    \        sceneView.session.run(configuration)\n    }\n    \n    func renderer(_\
    \ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor: ARAnchor) {\n\
    \        if anchor is ARImageAnchor {\n            print(\"Item recognized\")\n\
    \        }\n    }\n    \n    func renderer(_ renderer: SCNSceneRenderer, nodeFor\
    \ anchor: ARAnchor) -> SCNNode? {\n        guard let imageAnchor = anchor as?\
    \ ARImageAnchor else { return nil }\n        switch imageAnchor.referenceImage.name\
    \ {\n        case \"CRS-15\":\n            print(imageArray[0].title)\n      \
    \      print(imageArray[0].info)\n        case \"SaturnV\":\n            print(imageArray[1].title)\n\
    \            print(imageArray[1].info)\n        default:\n            print(\"\
    Nothing found\")\n        }\n        let node = SCNNode()\n        node.addChildNode(planeNode)\n\
    \        return node\n    }\n    \n    func getData() {\n        let item1 = Images(title:\
    \ \"CRS-15 SpaceX rocket\", info: \"Commercial Resupply Service\")\n        let\
    \ item2 = Images(title: \"Saturn V rocket\", info: \"Apollo moon launch vehicle\"\
    )\n        imageArray.append(item1)\n        imageArray.append(item2)\n    }\n\
    }\n```\n\n要测试此代码，请按以下步骤操作：\n\n1.  通过 USB 线将 iOS 设备连接到你的 Macintosh 电脑。\n\n2.  点击运行按钮，或选择\
    \ **产品 ➤ 运行**。\n\n3.  将 iOS 设备的摄像头对准存储在该应用`AR Resources`文件夹中的其中一张图像。\n\n4.  Xcode\
    \ 的调试区域会显示与你的图像相关的文本。\n\n5.  点击停止按钮，或选择 **产品 ➤ 停止**。\n"
- fmt: "# Displaying Information in Augmented Reality\n\nRight now, our app only displays\
    \ information about each image in the Xcode debug area, which users will never\
    \ see. What we really need to do is take the information about each recognized\
    \ image and display it within the augmented reality view.\n\nFirst, we need to\
    \ identify the boundaries of the image that the app recognizes. We can do that\
    \ be creating a plane that’s the exact width and height of the recognized image\
    \ like this:\n\n```\nlet plane = SCNPlane(width: imageAnchor.referenceImage.physicalSize.width,\
    \ height: imageAnchor.referenceImage.physicalSize.height)\n```\n\nNow we need\
    \ to give the plane a color so we can see it. Later we’ll make this plane clear,\
    \ but for now, we want to make sure that the plane completely covers any recognized\
    \ image:\n\n```\nplane.firstMaterial?.diffuse.contents = UIColor.yellow\n```\n\
    \nNext we need to create a node to hold the plane. Since the plane will appear\
    \ flat, we also need to rotate it -90 degrees so it faces the camera:\n\n```\n\
    let planeNode = SCNNode()\nplaneNode.geometry = plane\nlet ninetyDegrees = GLKMathDegreesToRadians(-90)\n\
    planeNode.eulerAngles = SCNVector3(ninetyDegrees, 0, 0)\n```\n\nFinally, we need\
    \ to add this `planeNode` to the augmented reality view:\n\n```\nlet node = SCNNode()\n\
    node.addChildNode(planeNode)\n```\n\nThe entire `nodeFor renderer` function should\
    \ look like this:\n\n```\nfunc renderer(_ renderer: SCNSceneRenderer, nodeFor\
    \ anchor: ARAnchor) -> SCNNode? {\n    guard let imageAnchor = anchor as? ARImageAnchor\
    \ else { return nil }\n    let plane = SCNPlane(width: imageAnchor.referenceImage.physicalSize.width,\
    \ height: imageAnchor.referenceImage.physicalSize.height)\n    plane.firstMaterial?.diffuse.contents\
    \ = UIColor.yellow\n    let planeNode = SCNNode()\n    planeNode.geometry = plane\n\
    \    let ninetyDegrees = GLKMathDegreesToRadians(-90)\n    planeNode.eulerAngles\
    \ = SCNVector3(ninetyDegrees, 0, 0)\n    switch imageAnchor.referenceImage.name\
    \ {\n    case \"CRS-15\":\n        print(imageArray[0].title)\n        print(imageArray[0].info)\n\
    \    case \"SaturnV\":\n        print(imageArray[1].title)\n        print(imageArray[1].info)\n\
    \    default:\n        print(\"Nothing found\")\n    }\n    return node\n}\nlet\
    \ node = SCNNode()\nnode.addChildNode(planeNode)\nreturn node\n}\n```\n\nIf you\
    \ test this code, you’ll see that as soon as you point an iOS device’s camera\
    \ at an image that the app can recognize, it immediately covers the entire image\
    \ with a yellow plane, as shown in Figure 14-4. Try this with different size images\
    \ to see that the yellow plane correctly recognizes the shape of every image stored\
    \ in its `AR Resources` folder.\n\n![../images/469983_1_En_14_Chapter/469983_1_En_14_Fig4_HTML.jpg](images/469983_1_En_14_Chapter/469983_1_En_14_Fig4_HTML.jpg)\n\
    \n**Figure 14-4**  \nA yellow plane completely masks a recognized image\n\nThe\
    \ reason for knowing the recognized image’s size is so we can properly display\
    \ text in the lower-left corner of that image. We’ll be displaying both title\
    \ and info of each image based on the structure we created earlier:\n\n```\nstruct\
    \ Images {\n    var title: String\n    var info: String\n}\n```\n\nBefore we write\
    \ any more code and we know that the plane completely covers up any recognized\
    \ images, we don’t need to see the plane any more, so we can make it clear like\
    \ this:\n\n```\nplane.firstMaterial?.diffuse.contents = UIColor.clear\n```\n\n\
    Although the plane still exists, it’s hidden from the user. We just need to use\
    \ the plane as a reference so we know where to place text. First, we want to place\
    \ the title text in the lower-right corner of each recognized image. This involves\
    \ creating `SCNText` using the title text stored in our structure, defining a\
    \ flatness value for our `SCNText` as 0.1, and a font size of 10 points like this:\n\
    \n```\nlet title = SCNText(string: imageArray[0].title, extrusionDepth: 0.0)\n\
    title.flatness = 0.1\ntitle.font = UIFont.boldSystemFont(ofSize: 10)\n```\n\n\
    Now we need to create an `SCNNode`, assign the `SCNText` to that node, and color\
    \ it white while scaling its size smaller:\n\n```\nlet titleNode = SCNNode()\n\
    titleNode.geometry = title\ntitleNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.white\ntitleNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)\n```\n\
    \nFeel free to experiment with other scaling values besides 0.0015 until you achieve\
    \ the text appearance you like best. Finally, we need to place this title text\
    \ relative to the plane and add it to the `planeNode` like this:\n\n```\ntitleNode.position.x\
    \ = -Float(plane.width) / 2.2\ntitleNode.position.y = -Float(plane.height) / 2.2\n\
    planeNode.addChildNode(titleNode)\n```\n\nThe x and y positions are defined by\
    \ the plane’s width and height divided by 2.2. Experiment with different values\
    \ so you can see how higher or lower values affect the location of text.\n\nDisplaying\
    \ the info text for each image is similar like this:\n\n```\nlet info = SCNText(string:\
    \ imageArray[0].info, extrusionDepth: 0.0)\ninfo.flatness = 0.1\ninfo.font = UIFont.boldSystemFont(ofSize:\
    \ 8)\nlet infoNode = SCNNode()\ninfoNode.geometry = info\ninfoNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.gray\ninfoNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)\ninfoNode.position.x\
    \ = -Float(plane.width) / 2.2\ninfoNode.position.y = -Float(plane.height) / 1.8\n\
    planeNode.addChildNode(infoNode)\n```\n\nThe entire `ViewController.swift` file\
    \ should look similar to the following except you may choose different text to\
    \ match the specific images you stored in your `AR Resources` folder."
  raw: '## Displaying Information in Augmented Reality


    Right now, our app only displays information about each image in the Xcode debug
    area, which users will never see. What we really need to do is take the information
    about each recognized image and display it within the augmented reality view.


    First, we need to identify the boundaries of the image that the app recognizes.
    We can do that be creating a plane that’s the exact width and height of the recognized
    image like this:


    ```

    let plane = SCNPlane(width: imageAnchor.referenceImage.physicalSize.width, height:
    imageAnchor.referenceImage.physicalSize.height)

    ```


    Now we need to give the plane a color so we can see it. Later we’ll make this
    plane clear, but for now, we want to make sure that the plane completely covers
    any recognized image:


    ```

    plane.firstMaterial?.diffuse.contents = UIColor.yellow

    ```


    Next we need to create a node to hold the plane. Since the plane will appear flat,
    we also need to rotate it -90 degrees so it faces the camera:


    ```

    let planeNode = SCNNode()

    planeNode.geometry = plane

    let ninetyDegrees = GLKMathDegreesToRadians(-90)

    planeNode.eulerAngles = SCNVector3(ninetyDegrees, 0, 0)

    ```


    Finally, we need to add this `planeNode` to the augmented reality view:


    ```

    let node = SCNNode()

    node.addChildNode(planeNode)

    ```


    The entire `nodeFor renderer` function should look like this:


    ```

    func renderer(_ renderer: SCNSceneRenderer, nodeFor anchor: ARAnchor) -> SCNNode?
    {

    guard let imageAnchor = anchor as? ARImageAnchor else { return nil }

    let plane = SCNPlane(width: imageAnchor.referenceImage.physicalSize.width, height:
    imageAnchor.referenceImage.physicalSize.height)

    plane.firstMaterial?.diffuse.contents = UIColor.yellow

    let planeNode = SCNNode()

    planeNode.geometry = plane

    let ninetyDegrees = GLKMathDegreesToRadians(-90)

    planeNode.eulerAngles = SCNVector3(ninetyDegrees, 0, 0)

    switch imageAnchor.referenceImage.name {

    case "CRS-15":

    print(imageArray[0].title)

    print(imageArray[0].info)

    case "SaturnV":

    print(imageArray[1].title)

    print(imageArray[1].info)

    default:

    print("Nothing found")

    }

    return node

    }

    let node = SCNNode()

    node.addChildNode(planeNode)

    return node

    }

    ```


    If you test this code, you’ll see that as soon as you point an iOS device’s camera
    at an image that the app can recognize, it immediately covers the entire image
    with a yellow plane, as shown in Figure [14-4](#469983_1_En_14_Chapter.xhtml#Fig4).
    Try this with different size images to see that the yellow plane correctly recognizes
    the shape of every image stored in its `AR Resources` folder .


    ![../images/469983_1_En_14_Chapter/469983_1_En_14_Fig4_HTML.jpg](images/469983_1_En_14_Chapter/469983_1_En_14_Fig4_HTML.jpg)


    Figure 14-4


    A yellow plane completely masks a recognized image


    The reason for knowing the recognized image’s size is so we can properly display
    text in the lower-left corner of that image. We’ll be displaying both title and
    info of each image based on the structure we created earlier:


    ```

    struct Images {

    var title: String

    var info: String

    }

    ```


    Before we write any more code and we know that the plane completely covers up
    any recognized images, we don’t need to see the plane any more, so we can make
    it clear like this:


    ```

    plane.firstMaterial?.diffuse.contents = UIColor.clear

    ```


    Although the plane still exists, it’s hidden from the user. We just need to use
    the plane as a reference so we know where to place text. First, we want to place
    the title text in the lower-right corner of each recognized image. This involves
    creating `SCNText` using the title text stored in our structure, defining a flatness
    value for our `SCNText` as 0.1, and a font size of 10 points like this:


    ```

    let title = SCNText(string: imageArray[0].title, extrusionDepth: 0.0)

    title.flatness = 0.1

    title.font = UIFont.boldSystemFont(ofSize: 10)

    ```


    Now we need to create an `SCNNode` , assign the `SCNText` to that node, and color
    it white while scaling its size smaller:


    ```

    let titleNode = SCNNode()

    titleNode.geometry = title

    titleNode.geometry?.firstMaterial?.diffuse.contents = UIColor.white

    titleNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)

    ```


    Feel free to experiment with other scaling values besides 0.0015 until you achieve
    the text appearance you like best. Finally, we need to place this title text relative
    to the plane and add it to the `planeNode` like this:


    ```

    titleNode.position.x = -Float(plane.width) / 2.2

    titleNode.position.y = -Float(plane.height) / 2.2

    planeNode.addChildNode(titleNode)

    ```


    The x and y positions are defined by the plane’s width and height divided by 2.2\.
    Experiment with different values so you can see how higher or lower values affect
    the location of text.


    Displaying the info text for each image is similar like this


    ```

    let info = SCNText(string: imageArray[0].info, extrusionDepth: 0.0)

    info.flatness = 0.1

    info.font = UIFont.boldSystemFont(ofSize: 8)

    let infoNode = SCNNode()

    infoNode.geometry = info

    infoNode.geometry?.firstMaterial?.diffuse.contents = UIColor.gray

    infoNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)

    infoNode.position.x = -Float(plane.width) / 2.2

    infoNode.position.y = -Float(plane.height) / 1.8

    planeNode.addChildNode(infoNode)

    ```


    The entire `ViewController.swift` file should look similar to the following except
    you may choose different text to match the specific images you stored in your
    `AR Resources` folder:'
  trans: "\n# 在增强现实中显示信息\n\n目前，我们的应用仅将每张图片的信息显示在 Xcode 调试区中，用户是看不到的。我们真正需要做的是，获取每张已识别图片的信息，并在增强现实视图中将其显示出来。\n\
    \n首先，我们需要确定应用所识别图片的边界。我们可以通过创建一个与识别图片精确等宽等高的平面来实现，具体操作如下：\n\n```\nlet plane =\
    \ SCNPlane(width: imageAnchor.referenceImage.physicalSize.width, height: imageAnchor.referenceImage.physicalSize.height)\n\
    ```\n\n现在，我们需要为这个平面赋予颜色，以便我们能够看到它。稍后我们会将该平面设为透明，但现阶段，我们想确保这个平面能完全覆盖任何已识别的图片：\n\
    \n```\nplane.firstMaterial?.diffuse.contents = UIColor.yellow\n```\n\n接下来，我们需要创建一个节点来承载这个平面。由于这个平面会平铺显示，我们还需要将其旋转\
    \ -90 度，以便正面朝向摄像头：\n\n```\nlet planeNode = SCNNode()\nplaneNode.geometry = plane\n\
    let ninetyDegrees = GLKMathDegreesToRadians(-90)\nplaneNode.eulerAngles = SCNVector3(ninetyDegrees,\
    \ 0, 0)\n```\n\n最后，我们需要将这个 `planeNode` 添加到增强现实视图中：\n\n```\nlet node = SCNNode()\n\
    node.addChildNode(planeNode)\n```\n\n整个 `nodeFor renderer` 函数应该如下所示：\n\n```\n\
    func renderer(_ renderer: SCNSceneRenderer, nodeFor anchor: ARAnchor) -> SCNNode?\
    \ {\n    guard let imageAnchor = anchor as? ARImageAnchor else { return nil }\n\
    \    let plane = SCNPlane(width: imageAnchor.referenceImage.physicalSize.width,\
    \ height: imageAnchor.referenceImage.physicalSize.height)\n    plane.firstMaterial?.diffuse.contents\
