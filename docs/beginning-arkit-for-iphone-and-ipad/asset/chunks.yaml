    \        sphere.firstMaterial?.diffuse.contents = UIColor.red\n        let node\
    \ = SCNNode()\n        node.geometry = sphere\n        node.position = SCNVector3(0.05,\
    \ 0.05, -0.05)\n        sceneView.scene.rootNode.addChildNode(node)\n        let\
    \ middleSphere = SCNSphere(radius: 0.03)\n        middleSphere.firstMaterial?.diffuse.contents\
    \ = UIColor.blue\n        let middleNode = SCNNode()\n        middleNode.geometry\
    \ = middleSphere\n        middleNode.position = SCNVector3(0, 0.06, 0)\n     \
    \   node.addChildNode(middleNode)\n        let topSphere = SCNSphere(radius: 0.02)\n\
    \        topSphere.firstMaterial?.diffuse.contents = UIColor.white\n        let\
    \ topNode = SCNNode()\n        topNode.geometry = topSphere\n        topNode.position\
    \ = SCNVector3(0, 0.04, 0)\n        middleNode.addChildNode(topNode)\n       \
    \ let hatRim = SCNCylinder(radius: 0.03, height: 0.002)\n        hatRim.firstMaterial?.diffuse.contents\
    \ = UIColor.black\n        let rimNode = SCNNode()\n        rimNode.geometry =\
    \ hatRim\n        rimNode.position = SCNVector3(0, 0.016, 0)\n        topNode.addChildNode(rimNode)\n\
    \        let hatTop = SCNCylinder(radius: 0.015, height: 0.025)\n        hatTop.firstMaterial?.diffuse.contents\
    \ = UIColor.black\n        let hatNode = SCNNode()\n        hatNode.geometry =\
    \ hatTop\n        hatNode.position = SCNVector3(0, 0.01, 0)\n        rimNode.addChildNode(hatNode)\n\
    \    }\n}\n```\n\n## 总结\n\n在增强现实视图中放置虚拟对象时，每个虚拟对象都必须分配给一个节点，并且该节点需要 x、y 和 z 坐标来定义其位置。至少有一个虚拟对象需要根据其与`rootnode`的距离来定位，`rootnode`代表世界原点\
    \ (0, 0, 0)。在根据`rootnode`放置至少一个虚拟对象后，你可以基于`rootnode`或任何现有的虚拟对象放置额外的虚拟对象。\n\n基于`rootnode`放置虚拟对象允许你定义它们的位置，独立于任何其他虚拟对象。然而，如果你希望一个虚拟对象出现在距离第二个虚拟对象固定距离的位置，使用相对定位会更容易。不是根据虚拟对象到`rootnode`的位置来定义它，而是根据它到另一个虚拟对象的位置来定义它。\n\
    \n没有相对定位，你将不得不根据`rootnode`计算距离，这可能不准确且繁琐。相对定位使得定义虚拟对象彼此之间的固定距离变得容易。\n\n# 7. 旋转对象\n\
    \n当你在增强现实视图中放置一个虚拟对象时，它总是以其默认方向出现，例如圆柱体或金字塔垂直出现。然而，有时你可能希望虚拟对象以不同的方向出现。为了实现这一点，你可能需要围绕虚拟对象的\
    \ x、y 和 z 轴旋转它。\n\n旋转虚拟对象涉及更改虚拟对象围绕其 x、y 和 z 轴的欧拉角。除了学习如何围绕 x、y 和 z 轴旋转虚拟对象外，你还将了解\
    \ Xcode 如何旋转相对于现有虚拟对象定位的附加虚拟对象。例如，如果你创建一个盒子并相对于盒子放置一个金字塔，旋转盒子也会改变金字塔的位置。\n"
- fmt: "## 使用欧拉角旋转对象\n\n要旋转虚拟对象，你需要像这样定义该虚拟对象的欧拉角：\n\n```\nnode.eulerAngles = SCNVector3(x,\
    \ y, z)\n```\n\n通过为 `x`、`y` 和 `z` 指定不同的值，`eulerAngles` 可以定义虚拟对象围绕 x、y 和 z 轴的旋转。在为\
    \ x、y 和 z 轴指定 `SCNVector3` 值时，请确保使用 `Float` 值，并以弧度指定旋转量。\n\n由于大多数人更熟悉度数，我们需要借助\
    \ GLKit 将度数转换为弧度，GLKit 提供了包括度到弧度转换函数在内的数学库。首先，像这样导入 GLKit：\n\n```\nimport GLKit\n\
    ```\n\n现在使用 `GLKMathDegreesToRadians` 函数，并像这样以度数指定旋转：\n\n```\nGLKMathDegreesToRadians(degrees)\n\
    ```\n\n此代码将度数转换为弧度。一旦度数被转换为弧度，你就可以使用这些弧度来定义围绕 x、y 和 z 轴的旋转。\n\n为了学习如何在增强现实视图中旋转虚拟对象，让我们从按照以下步骤创建一个新的\
    \ Xcode 项目开始：\n\n1.  启动 Xcode。（确保你使用的是 Xcode 10 或更高版本。）\n2.  选择 File ➤ New ➤ Project。Xcode\
    \ 会要求你选择一个模板。\n3.  点击 iOS 类别。\n4.  点击 Single View App 图标，然后点击 Next 按钮。Xcode 要求你输入产品名称、组织名称、组织标识符和内容技术。\n\
    5.  在 Product Name 文本字段中点击，并输入项目的描述性名称，例如 Rotation。（确切名称不重要。）\n6.  点击 Next 按钮。Xcode\
    \ 询问你希望将项目存储在何处。\n7.  选择一个文件夹并点击 Create 按钮。Xcode 创建一个 iOS 项目。\n\n现在按照以下步骤修改 `Info.plist`\
    \ 以允许访问摄像头并使用 ARKit：\n\n1.  在导航器窗格中点击 `Info.plist` 文件。Xcode 会显示一个键、类型和值的列表。\n\
    2.  点击展开三角形以展开 Required device capabilities 类别，显示 Item 0。\n3.  将鼠标指针悬停在 Item 0\
    \ 上以显示一个加号 (`+`) 图标。\n4.  点击此加号 (`+`) 图标以显示一个空白的 Item 1。\n5.  在 Item 1 行的 Value\
    \ 类别下输入 `arkit`。\n6.  将鼠标指针悬停在最后一行上以显示一个加号 (`+`) 图标。\n7.  点击加号 (`+`) 图标创建一个新行。会出现一个弹出菜单。\n\
    8.  选择 Privacy – Camera Usage Description。\n9.  在 Privacy – Camera Usage Description\
    \ 行的 Value 类别下输入 `AR Needs to Use the Camera`。\n\n现在是时候按照以下步骤修改 `ViewController.swift`\
    \ 文件以使用 ARKit 和 SceneKit了：\n\n1.  在导航器窗格中点击 `ViewController.swift` 文件。\n2.  编辑\
    \ `ViewController.swift` 文件，使其看起来像这样：\n\n```\nimport UIKit\nimport SceneKit\n\
    import ARKit\nimport GLKit\nclass ViewController: UIViewController, ARSCNViewDelegate\
    \ {\n    let configuration = ARWorldTrackingConfiguration()\n    let node = SCNNode()\n\
    \    var currentX : Float = 0\n    var currentY : Float = 0\n    var currentZ\
    \ : Float = 0\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n}\n```\n\n为了在我们的应用程序中查看增强现实内容，请将以下内容添加到 `Main.storyboard` 文件的用户界面上：\n\n\
    *   一个 ARKit SceneKit View (`ARSCNView`)\n*   三个 `UILabel`\n*   三个 `UISlider`\n\
    \n用户界面应类似于图 [7-1](#469983_1_En_7_Chapter.xhtml#Fig1)。\n\n![../images/469983_1_En_7_Chapter/469983_1_En_7_Fig1_HTML.jpg](images/469983_1_En_7_Chapter/469983_1_En_7_Fig1_HTML.jpg)\n\
    \n图 7-1\n\n用户界面包含一个 `ARSCNView`、三个标签和三个滑块\n\n设计好用户界面后，需要为这些用户界面项添加约束。要添加约束，请选择\
    \ Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints，在菜单底部 All\
    \ Views in Container 类别下。\n\n设计完用户界面后，下一步是将用户界面项连接到 `ViewController.swift` 文件中的\
    \ Swift 代码。为此，请按照以下步骤操作：\n\n1.  在导航器窗格中点击 `Main.storyboard` 文件。\n2.  点击 Assistant\
    \ Editor 图标或选择 View ➤ Assistant Editor ➤ Show Assistant Editor，以并排显示 `Main.storyboard`\
    \ 和 `ViewController.swift` 文件。\n3.  将鼠标指针移动到 `ARSCNView` 上，按住 Control 键，然后按住 Control\
    \ 键拖动到 `class ViewController` 行下方。\n4.  释放 Control 键和鼠标左键。会出现一个弹出菜单。\n5.  在 Name\
    \ 文本字段中点击并输入 `sceneView`，然后点击 Connect 按钮。Xcode 创建一个 `IBOutlet`，如下所示：\n\n```\n\
    @IBOutlet var sceneView: ARSCNView!\n```\n\n6.  编辑 `viewDidLoad` 函数，使其看起来像这样：\n\
    \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n    sceneView.delegate\
    \ = self\n    sceneView.showsStatistics = true\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
    \ ARSCNDebugOptions.showFeaturePoints]\n    showShape()\n}\n```\n\n7.  编辑 `viewWillAppear`\
    \ 函数，使其看起来像这样：\n\n```\noverride func viewWillAppear(_ animated: Bool) {\n    super.viewWillAppear(animated)\n\
    \    sceneView.session.run(configuration)\n}\n```\n\n这个 `viewDidLoad` 函数调用了一个\
    \ `showShape` 函数。`showShape` 函数会显示一个绿色的金字塔。\n\n8.  在 `viewWillAppear` 函数下方输入以下内容：\n\
    \n```\nfunc showShape() {\n    let pyramid = SCNPyramid(width: 0.05, height: 0.1,\
    \ length: 0.05)\n    pyramid.firstMaterial?.diffuse.contents = UIColor.green\n\
    \    node.geometry = pyramid\n    node.position = SCNVector3(0.05, 0.05, -0.05)\n\
    \    sceneView.scene.rootNode.addChildNode(node)\n}\n```\n\n9.  点击顶部的滑块（x 轴），按住\
    \ Control 键，然后按住 Control 键拖动到 `ViewController.swift` 文件底部最后一个花括号的上方。\n10. 释放 Control\
    \ 键和鼠标左键。会出现一个弹出菜单。\n11. 在 Connection 弹出菜单中点击并选择 Action。\n12. 在 Name 文本字段中点击并输入\
    \ `XChanged`。\n13. 在 Type 弹出菜单中点击并选择 `UISlider`。\n14. 点击 Connect 按钮。Xcode 创建一个\
    \ `IBAction` 方法，如下所示：\n\n```\n@IBAction func XChanged(_ sender: UISlider) {\n\
    \    currentX = GLKMathDegreesToRadians(sender.value)\n    node.eulerAngles =\
    \ SCNVector3(currentX, currentY, currentZ)\n}\n```\n\n15. 点击中间的滑块（y 轴），按住 Control\
    \ 键，然后按住 Control 键拖动到 `ViewController.swift` 文件底部最后一个花括号的上方。\n16. 释放 Control 键和鼠标左键。会出现一个弹出菜单。\n\
    17. 在 Connection 弹出菜单中点击并选择 Action。\n18. 在 Name 文本字段中点击并输入 `YChanged`。\n19. 在\
    \ Type 弹出菜单中点击并选择 `UISlider`。\n20. 点击 Connect 按钮。Xcode 创建一个 `IBAction` 方法，如下所示：\n\
    \n```\n@IBAction func YChanged(_ sender: UISlider) {\n    currentY = GLKMathDegreesToRadians(sender.value)\n\
    \    node.eulerAngles = SCNVector3(currentX, currentY, currentZ)\n}\n```\n\n21.\
    \ 点击底部的滑块（z 轴），按住 Control 键，然后按住 Control 键拖动到 `ViewController.swift` 文件底部最后一个花括号的上方。\n\
    22. 释放 Control 键和鼠标左键。会出现一个弹出菜单。\n23. 在 Connection 弹出菜单中点击并选择 Action。\n24. 在 Name\
    \ 文本字段中点击并输入 `ZChanged`。\n25. 在 Type 弹出菜单中点击并选择 `UISlider`。\n26. 点击 Connect 按钮。Xcode\
    \ 创建一个 `IBAction` 方法，如下所示："
  raw: "## Rotating Objects Using Euler Angles\n\nTo rotate a virtual object, you\
    \ need to define that virtual object’s Euler angles like this:\n\n```\nnode.eulerAngles\
    \ = SCNVector3(x, y, z)\n```\n\nBy specifying different values for x, y, and z,\
    \ `eulerAngles` can define a virtual object’s rotation around the x-, y-, and\
    \ z-axes. When specifying `SCNVector3` values for the x-, y-, and z-axes, make\
    \ sure you use `Float` values and that you specify the amount of rotation in radians.\n\
    \nSince degrees are more familiar for most people to understand, we’ll need to\
    \ convert degrees to radians by relying on GLKit, which provides math libraries\
    \ including a degree to radian conversion function. First, import GLKit like this:\n\
    \n```\nimport GLKit\n```\n\nNow use the `GLKMathDegreesToRadians` function and\
    \ specify the rotation in degrees like this:\n\n```\nGLKMathDegreesToRadians(degrees)\n\
    ```\n\nThis code converts degrees to radians. Once the degrees have been converted\
    \ into radians, you can use those radians to define the rotation around the x-,\
    \ y-, and z-axes.\n\nTo learn how to rotate a virtual object in an augmented reality\
    \ view, let’s start by creating a new Xcode project by following these steps:\n\
    \n1.  Start Xcode. (Make sure you’re using Xcode 10 or greater.)\n\n2.  Choose\
    \ File ➤ New ➤ Project. Xcode asks you to choose a template.\n\n3.  Click the\
    \ iOS category.\n\n4.  Click the Single View App icon and click the Next button.\
    \ Xcode asks for a product name, organization name, organization identifiers,\
    \ and content technology.\n\n5.  Click in the Product Name text field and type\
    \ a descriptive name for your project, such as Rotation. (The exact name does\
    \ not matter.)\n\n6.  Click the Next button. Xcode asks where you want to store\
    \ your project.\n\n7.  Choose a folder and click the Create button. Xcode creates\
    \ an iOS project.\n\nNow modify the Info.plist to allow access to the camera and\
    \ to use ARKit by following these steps:\n\n1.  Click the `Info.plist` file in\
    \ the Navigator pane. Xcode displays a list of keys, types, and values.\n\n2.\
    \  Click the disclosure triangle to expand the Required device capabilities category\
    \ to display Item 0.\n\n3.  Move the mouse pointer over Item 0 to display a plus\
    \ (+) icon.\n\n4.  Click this plus (+) icon to display a blank Item 1.\n\n5. \
    \ Type `arkit` under the Value category in the Item 1 row.\n\n6.  Move the mouse\
    \ pointer over the last row to display a plus (+) icon.\n\n7.  Click on the plus\
    \ (+) icon to create a new row. A popup menu appears.\n\n8.  Choose Privacy –\
    \ Camera Usage Description.\n\n9.  Type **AR Needs to Use the Camera** under the\
    \ Value category in the Privacy – Camera Usage Description row.\n\nNow it’s time\
    \ to modify the `ViewController.swift` file to use ARKit and SceneKit by following\
    \ these steps:\n\n1.  Click on the `ViewController.swift` file in the Navigator\
    \ pane.\n\n2.  Edit the `ViewController.swift` file so it looks like this:\n\n\
    ```\n    import UIKit\n    import SceneKit\n    import ARKit\n    import GLKit\n\
    \    class ViewController: UIViewController, ARSCNViewDelegate {\n    let configuration\
    \ = ARWorldTrackingConfiguration()\n    let node = SCNNode()\n    var currentX\
    \ : Float = 0\n    var currentY : Float = 0\n    var currentZ : Float = 0\n  \
    \  override func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n    }\n    }\n    ```\n\
    \nTo view augmented reality in our app, add the following to the user interface\
    \ on the `Main.storyboard` file:\n\n*   A single ARKit SceneKit View (ARSCNView)\n\
    \n*   Three UILabels\n\n*   Three UISliders\n\nThe user interface should look\
    \ similar to Figure [7-1](#469983_1_En_7_Chapter.xhtml#Fig1).\n\n![../images/469983_1_En_7_Chapter/469983_1_En_7_Fig1_HTML.jpg](images/469983_1_En_7_Chapter/469983_1_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1\n\nThe user interface includes an ARSCNView, three labels, and three\
    \ sliders\n\nAfter you’ve designed your user interface, you need to put constraints\
    \ on those user interface items. To add constraints, choose Editor ➤ Resolve Auto\
    \ Layout Issues ➤ Reset to Suggested Constraints at the bottom half of the menu\
    \ under the All Views in Container category.\n\nAfter designing the user interface,\
    \ the next step is to connect the user interface items to the Swift code in the\
    \ `ViewController.swift` file . To do this, follow these steps:\n\n1.  Click the\
    \ `Main.storyboard` file in the Navigator pane.\n\n2.  Click the Assistant Editor\
    \ icon or choose View ➤ Assistant Editor ➤ Show Assistant Editor to display the\
    \ `Main.storyboard` and the `ViewController.swift` file side by side.\n\n3.  Move\
    \ the mouse pointer over the ARSCNView, hold down the Control key, and Ctrl-drag\
    \ under the `class ViewController` line.\n\n4.  Release the Control key and the\
    \ left mouse button. A popup menu appears.\n\n5.  Click in the Name text field\
    \ and type sceneView, then click the Connect button. Xcode creates an IBOutlet,\
    \ as shown here:\n\n```\n    @IBOutlet var sceneView: ARSCNView!\n    ```\n\n\
    6.  Edit the `viewDidLoad` function so it looks like this:\n\n```\n    override\
    \ func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional setup\
    \ after loading the view, typically from a nib.\n    sceneView.delegate = self\n\
    \    sceneView.showsStatistics = true\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
    \ ARSCNDebugOptions.showFeaturePoints]\n    showShape()\n    }\n    ```\n\n7.\
    \  Edit the `viewWillAppear` function so it looks like this:\n\n```\n    override\
    \ func viewWillAppear(_ animated: Bool) {\n    super.viewWillAppear(animated)\n\
    \    sceneView.session.run(configuration)\n    }\n    ```\n\nThis `viewDidLoad`\
    \ function calls on a `showShape` function. The `showShape` function displays\
    \ a green pyramid.\n\n8.  Type the following underneath the `viewWillAppear` function:\n\
    \n```\n    func showShape() {\n    let pyramid = SCNPyramid(width: 0.05, height:\
    \ 0.1, length: 0.05)\n    pyramid.firstMaterial?.diffuse.contents = UIColor.green\n\
    \    node.geometry = pyramid\n    node.position = SCNVector3(0.05, 0.05, -0.05)\n\
    \    sceneView.scene.rootNode.addChildNode(node)\n    }\n    ```\n\n9.  Click\
    \ on the top slider (x-axis), hold down the Control key, and Ctrl-drag above the\
    \ last curly bracket at the bottom of the `ViewController.swift` file.\n\n10.\
    \  Release the Control key and the left mouse button. A popup menu appears.\n\n\
    11.  Click in the Connection popup menu and choose Action.\n\n12.  Click in the\
    \ Name text field and type `XChanged`.\n\n13.  Click in the Type popup menu and\
    \ choose UISlider.\n\n14.  Click the Connect button. Xcode creates an `IBAction`\
    \ method like this:\n\n```\n    @IBAction func XChanged(_ sender: UISlider) {\n\
    \    currentX = GLKMathDegreesToRadians(sender.value)\n    node.eulerAngles =\
    \ SCNVector3(currentX, currentY, currentZ)\n    }\n    ```\n\n15.  Click on the\
    \ middle slider (y-axis), hold down the Control key, and Ctrl-drag above the last\
    \ curly bracket at the bottom of the `ViewController.swift` file.\n\n16.  Release\
    \ the Control key and the left mouse button. A popup menu appears.\n\n17.  Click\
    \ in the Connection popup menu and choose Action.\n\n18.  Click in the Name text\
    \ field and type `YChanged`.\n\n19.  Click in the Type popup menu and choose UISlider.\n\
    \n20.  Click the Connect button. Xcode creates an `IBAction` method like this:\n\
    \n```\n    @IBAction func YChanged(_ sender: UISlider) {\n    currentY = GLKMathDegreesToRadians(sender.value)\n\
    \    node.eulerAngles = SCNVector3(currentX, currentY, currentZ)\n    }\n    ```\n\
    \n21.  Click on the bottom slider (z-axis), hold down the Control key, and Ctrl-drag\
    \ above the last curly bracket at the bottom of the `ViewController.swift` file.\n\
    \n22.  Release the Control key and the left mouse button. A popup menu appears.\n\
    \n23.  Click in the Connection popup menu and choose Action.\n\n24.  Click in\
    \ the Name text field and type `ZChanged`.\n\n25.  Click in the Type popup menu\
    \ and choose UISlider.\n\n26.  Click the Connect button. Xcode creates an `IBAction`\
    \ method like this:"
