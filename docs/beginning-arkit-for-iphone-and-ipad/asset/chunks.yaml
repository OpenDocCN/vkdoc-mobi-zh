    \ the Run button or choose Product ➤ Run.\n\n3.  When the app runs, a sphere appears\
    \ on the x-axis. Click on any of the color buttons at the bottom of the screen\
    \ to change the light source color.\n\n4.  Slide the Temperature and Intensity\
    \ sliders left and right to see how it alters the appearance of the light, as\
    \ shown in Figure [5-8](#469983_1_En_5_Chapter.xhtml#Fig8).\n\nTry running this\
    \ app again except in the `lightOn` function , change the light type from `.omni`\
    \ to `.directional` like this:\n\n```\nshowLight.light?.type = .directional\n\
    ```\n\nAlso comment out the `showLight.position` command like this:\n\n```\n//showLight.position\
    \ = SCNVector3(0,0,0)\n```\n\nA directional light illuminates virtual objects\
    \ from the positive z-axis so there’s no need to define a position for a directional\
    \ light. When you run the app with a directional light instead of an omni light,\
    \ you’ll notice a different lighting effect that only illuminates the half of\
    \ the sphere in the positive z-axis direction, as shown in Figure [5-9](#469983_1_En_5_Chapter.xhtml#Fig9).\n\
    \n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig9_HTML.jpg](images/469983_1_En_5_Chapter/469983_1_En_5_Fig9_HTML.jpg)\n\
    \nFigure 5-9\n\nUsing directional light instead of omni light\n\n## Using a Spotlight\n\
    \nIn a theater, people can position one or more spotlights in different locations\
    \ and aim them at different angles to create interesting visual effects. When\
    \ you create a spotlight, you need to define its location and angle.\n\nBy default,\
    \ the spotlight aims down the negative z-axis so if you place a spotlight at the\
    \ world origin (0, 0, 0), then the spotlight will shine down the z-axis away from\
    \ the user. If a virtual object off the z-axis, the spotlight will miss it completely.\n\
    \nTo verify this, rewrite the Swift code in the `ViewController.swift` file and\
    \ position the spotlight at the world origin (0, 0, 0) like this:\n\n```\nshowLight.position\
    \ = SCNVector3(0,0,0)\nshowLight.light?.type = .spot\n```\n\nIf you run this code,\
    \ the spotlight will appear at the world origin (0, 0, 0) and shine down the z-axis,\
    \ missing the sphere completely, leaving the sphere completely unlit.\n\nTo make\
    \ sure a spotlight shines on a virtual object, you can do one or more of the following:\n\
    \n*   Change the spotlight’s position relative to any virtual objects you want\
    \ to illuminate\n\n*   Change the angle that the spotlight points\n\nTo change\
    \ the angle that the spotlight points, you need to define the `eulerAngles` property\
    \ of the spotlight that defines the following axes of rotation:\n\n*   Pitch (the\
    \ x component) is the rotation about the node’s x-axis.\n\n*   Yaw (the y component)\
    \ is the rotation about the node’s y-axis.\n\n*   Roll (the z component) is the\
    \ rotation about the node’s z-axis.\n\nTo see how the spotlight’s position and\
    \ angle alter the way it shines on virtual objects, follow these steps:\n\n1.\
    \  Start Xcode. (Make sure you’re using Xcode 10 or greater.)\n\n2.  Choose File\
    \ ➤ New ➤ Project. Xcode asks you to choose a template.\n\n3.  Click the iOS category.\n\
    \n4.  Click the Single View App icon and click the Next button. Xcode asks for\
    \ a product name, organization name, organization identifiers, and content technology.\n\
    \n5.  Click in the Product Name text field and type a descriptive name for your\
    \ project such as Spotlight. (The exact name does not matter.)\n\n6.  Click the\
    \ Next button. Xcode asks where you want to store your project.\n\n7.  Choose\
    \ a folder and click the Create button. Xcode creates an iOS project.\n\nNow modify\
    \ the `Info.plist` file to allow access to the camera and to use ARKit by following\
    \ these steps:\n\n1.  Click the `Info.plist` file in the Navigator pane. Xcode\
    \ displays a list of keys, types, and values.\n\n2.  Click the disclosure triangle\
    \ to expand the Required device capabilities category to display Item 0.\n\n3.\
    \  Move the mouse pointer over Item 0 to display a plus (+) icon.\n\n4.  Click\
    \ this plus (+) icon to display a blank Item 1.\n\n5.  Type `arkit` under the\
    \ Value category in the Item 1 row.\n\n6.  Move the mouse pointer over the last\
    \ row to display a plus (+) icon.\n\n7.  Click on the plus (+) icon to create\
    \ a new row. A popup menu appears.\n\n8.  Choose Privacy – Camera Usage Description.\n\
    \n9.  Type `AR needs to use the camera` under the Value category in the Privacy –\
    \ Camera Usage Description row.\n\nNow modify the `ViewController.swift` file\
    \ to use ARKit and SceneKit by following these steps:\n\n1.  Click on the `ViewController.swift`\
    \ file in the Navigator pane.\n\n2.  Edit the `ViewController.swift` file so it\
    \ looks like this:\n\n```\n    import UIKit\n    import SceneKit\n    import ARKit\n\
    \    class ViewController: UIViewController, ARSCNViewDelegate {\n    let configuration\
    \ = ARWorldTrackingConfiguration()\n    override func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    }\n    ```\n\nTo view the effects of a spotlight in augmented reality\
    \ within our app, we need to add the following objects to the `Main.storyboard`\
    \ user interface:\n\n*   One ARKit SceneKit View (ARSCNView)—For displaying augmented\
    \ reality with the camera view\n\n*   Three UISliders—For controlling the pitch,\
    \ yaw, and roll of the spotlight\n\n*   Three UILabels—For identifying the pitch,\
    \ yaw, and roll sliders"
  trans: "\n```swift\nimport UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController:\
    \ UIViewController, ARSCNViewDelegate {\n    @IBOutlet var sceneView: ARSCNView!\n\
    \    let configuration = ARWorldTrackingConfiguration()\n    let showLight = SCNNode()\n\
    \n    override func viewDidLoad() {\n        super.viewDidLoad()\n        sceneView.delegate\
    \ = self\n        sceneView.showsStatistics = true\n        sceneView.debugOptions\
    \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    }\n\n    override func viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
    \        showShape()\n        lightOn()\n        sceneView.session.run(configuration)\n\
    \    }\n\n    func showShape() {\n        let sphere = SCNSphere(radius: 0.03)\n\
    \        sphere.firstMaterial?.diffuse.contents = UIColor.white\n        let node\
    \ = SCNNode()\n        node.geometry = sphere\n        node.position = SCNVector3(0.1,\
    \ 0, 0)\n        sceneView.scene.rootNode.addChildNode(node)\n    }\n\n    func\
    \ lightOn() {\n        showLight.light = SCNLight()\n        showLight.light?.type\
    \ = .omni\n        showLight.light?.color = UIColor(white: 0.6, alpha: 1.0)\n\
    \        showLight.position = SCNVector3(0,0,0)\n        sceneView.scene.rootNode.addChildNode(showLight)\n\
    \    }\n\n    @IBAction func temperatureChange(_ sender: UISlider) {\n       \
    \ showLight.light?.temperature = CGFloat(sender.value)\n    }\n\n    @IBAction\
    \ func intensityChange(_ sender: UISlider) {\n        showLight.light?.intensity\
    \ = CGFloat(sender.value)\n    }\n\n    @IBAction func colorButton(_ sender: UIButton)\
    \ {\n        showLight.light?.color = sender.backgroundColor!\n    }\n}\n```\n\
    \n此应用将一个光源放置在`(0, 0, 0)`世界原点，并将一个白色球体放置在`(0.1, 0, 0)`处，使其出现在 x 轴上。要运行此应用，请遵循以下步骤：\n\
    \n1.  点击停止按钮或选择 Product ➤ Stop。\n2.  通过 USB 数据线将 iOS 设备连接到 Mac。\n3.  点击运行按钮或选择\
    \ Product ➤ Run。\n4.  应用运行时，x 轴上会出现一个球体。点击屏幕底部的任意颜色按钮可更改光源颜色。\n5.  左右滑动**温度**和**强度**滑块，查看它们如何改变光源的外观，如图\
    \ 5-8 所示。\n\n尝试再次运行此应用，但在 `lightOn` 函数中将光源类型从 `.omni` 更改为 `.directional`，像这样：\n\
    \n```swift\nshowLight.light?.type = .directional\n```\n\n同时注释掉 `showLight.position`\
    \ 命令，像这样：\n\n```swift\n//showLight.position = SCNVector3(0,0,0)\n```\n\n**定向光**从正\
    \ z 轴方向照射虚拟物体，因此无需为定向光定义位置。当使用定向光而非泛光灯运行应用时，你会注意到不同的照明效果，它只照亮球体在正 z 轴方向的一半，如图\
    \ 5-9 所示。\n\n![图 5-9 使用定向光替代泛光灯](img/469983_1_En_5_Fig9_HTML.jpg)\n\n## 使用聚光灯\n\
    \n在剧院中，人们可以在不同位置放置一个或多个聚光灯，并调整其角度以创建有趣的视觉效果。创建聚光灯时，需要定义其**位置**和**角度**。\n\n默认情况下，聚光灯指向**负\
    \ z 轴**方向。因此，如果你将聚光灯放在世界原点 `(0, 0, 0)`，聚光灯将沿着 z 轴远离用户照射。如果虚拟物体不在 z 轴上，聚光灯将完全无法照射到它。\n\
    \n为了验证这一点，请重写 `ViewController.swift` 文件中的 Swift 代码，并将聚光灯放置在世界原点 `(0, 0, 0)`，像这样：\n\
    \n```swift\nshowLight.position = SCNVector3(0,0,0)\nshowLight.light?.type = .spot\n\
    ```\n\n如果你运行此代码，聚光灯将出现在世界原点 `(0, 0, 0)` 并沿 z 轴照射，完全错过球体，使球体完全未被照亮。\n\n要确保聚光灯照亮虚拟物体，你可以执行以下一项或多项操作：\n\
    *   改变聚光灯相对于你想照亮的任何虚拟物体的位置。\n*   改变聚光灯指向的角度。\n\n要改变聚光灯指向的角度，你需要定义聚光灯的 `eulerAngles`\
    \ 属性，该属性定义以下旋转轴：\n*   **俯仰角**（x 分量）是绕节点的 x 轴旋转。\n*   **偏航角**（y 分量）是绕节点的 y 轴旋转。\n\
    *   **滚转角**（z 分量）是绕节点的 z 轴旋转。\n\n要查看聚光灯的位置和角度如何改变它照射虚拟物体的方式，请遵循以下步骤：\n\n1.  启动\
    \ Xcode。（确保你使用的是 Xcode 10 或更高版本。）\n2.  选择 File ➤ New ➤ Project。Xcode 要求你选择一个模板。\n\
    3.  点击 iOS 类别。\n4.  点击 Single View App 图标，然后点击 Next 按钮。Xcode 要求提供产品名称、组织名称、组织标识符和内容技术。\n\
    5.  点击 Product Name 文本框，为你的项目输入一个描述性名称，例如 `Spotlight`。（确切的名称不重要。）\n6.  点击 Next\
    \ 按钮。Xcode 询问你想将项目存储在何处。\n7.  选择一个文件夹并点击 Create 按钮。Xcode 创建 iOS 项目。\n\n现在按照以下步骤修改\
    \ `Info.plist` 文件以允许访问摄像头并使用 ARKit：\n\n1.  在导航器窗格中点击 `Info.plist` 文件。Xcode 显示一个键、类型和值的列表。\n\
    2.  点击展开三角形以展开 Required device capabilities 类别，显示 Item 0。\n3.  将鼠标指针移到 Item 0\
    \ 上，显示一个加号（+）图标。\n4.  点击这个加号（+）图标，显示一个空白的 Item 1。\n5.  在 Item 1 行的 Value 类别下输入\
    \ `arkit`。\n6.  将鼠标指针移到最后一行，显示一个加号（+）图标。\n7.  点击加号（+）图标创建一个新行。出现一个弹出菜单。\n8.  选择\
    \ Privacy – Camera Usage Description。\n9.  在 Privacy – Camera Usage Description\
    \ 行的 Value 类别下输入 `AR needs to use the camera`。\n\n现在按照以下步骤修改 `ViewController.swift`\
    \ 文件以使用 ARKit 和 SceneKit：\n\n1.  在导航器窗格中点击 `ViewController.swift` 文件。\n2.  编辑\
    \ `ViewController.swift` 文件，使其看起来像这样：\n\n```swift\nimport UIKit\nimport SceneKit\n\
    import ARKit\n\nclass ViewController: UIViewController, ARSCNViewDelegate {\n\
    \    let configuration = ARWorldTrackingConfiguration()\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        // Do any additional setup after loading\
    \ the view, typically from a nib.\n    }\n}\n```\n\n要在我们的应用中查看增强现实中聚光灯的效果，我们需要向\
    \ `Main.storyboard` 用户界面添加以下对象：\n*   一个 ARKit SceneKit View (`ARSCNView`)——用于显示带摄像头视图的增强现实。\n\
    *   三个 `UISlider`——用于控制聚光灯的俯仰、偏航和滚转。\n*   三个 `UILabel`——用于标识俯仰、偏航和滚转滑块。\n"
- fmt: "# 设计用户界面\n\n要设计用户界面，请在导航器窗格中点击`Main.storyboard`文件，然后点击对象库按钮以打开对象库。接着，将不同的用户界面项拖放到用户界面上。最终，用户界面应与[图5-10](#469983_1_En_5_Chapter.xhtml#Fig10)类似。\n\
    \n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig10_HTML.jpg](images/469983_1_En_5_Chapter/469983_1_En_5_Fig10_HTML.jpg)\n\
    \n*图 5-10：设计用户界面*\n\n设计好用户界面后，需要为这些用户界面项添加约束。要添加约束，请选择**Editor ➤ Resolve Auto\
    \ Layout Issues ➤ Reset to Suggested Constraints**，该选项位于菜单下半部分的\"All Views in\
    \ Container\"类别下。\n\n添加约束后，下一步是修改用户界面对象。双击三个`UILabel`，将它们的标题更改为**Pitch (x-axis)**、**Yaw\
    \ (y-axis)**和**Roll (z-axis)**（参见[图5-10](#469983_1_En_5_Chapter.xhtml#Fig10)）。\n\
    \n现在按照以下步骤修改**Pitch (x-axis)**标签旁边的`UISlider`：\n\n1.  点击**Pitch (x-axis)** `UISlider`。\n\
    2.  点击属性检查器图标，或选择**View ➤ Inspectors ➤ Show Attributes Inspector**。\n3.  在**Value**文本框中输入数字`0`。\n\
    4.  在**Minimum**文本框中输入`-360`。\n5.  在**Maximum**文本框中输入`360`，如[图5-11](#469983_1_En_5_Chapter.xhtml#Fig11)所示。\n\
    \n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig11_HTML.jpg](images/469983_1_En_5_Chapter/469983_1_En_5_Fig11_HTML.jpg)\n\
    \n*图 5-11：自定义 UISlider*\n\n6.  对**Yaw (y-axis)**和**Roll (z-axis)** `UISlider`重复步骤1-5。\n\
    \n## 连接用户界面与代码\n\n设计好用户界面后，下一步是将用户界面项连接到`ViewController.swift`文件中的Swift代码。为此，请按照以下步骤操作：\n\
    \n1.  在导航器窗格中点击`Main.storyboard`文件。\n2.  点击助手编辑器图标，或选择**View ➤ Assistant Editor\
    \ ➤ Show Assistant Editor**，以并排显示`Main.storyboard`和`ViewController.swift`文件。\n\
    3.  将鼠标指针移动到`ARSCNView`上，按住**Control**键，然后按住鼠标左键拖拽到`class ViewController`行下方。\n\
    4.  松开**Control**键和鼠标左键。会弹出一个菜单。\n5.  在**Name**文本框中输入`sceneView`，然后点击**Connect**按钮。Xcode将创建一个IBOutlet，如下所示：\n\
    \    ```\n    @IBOutlet var sceneView: ARSCNView!\n    ```\n6.  在此IBOutlet下方，输入以下代码：\n\
    \    ```\n    let configuration = ARWorldTrackingConfiguration()\n    let showLight\
    \ = SCNNode()\n    var currentX : Float = 0\n    var currentY : Float = 0\n  \
    \  var currentZ : Float = 0\n    ```\n7.  编辑`viewDidLoad`函数，使其如下所示：\n    ```\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
    \ any additional setup after loading the view, typically from a nib.\n       \
    \ sceneView.delegate = self\n        sceneView.showsStatistics = true\n      \
    \  sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    }\n    override func viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
    \        showShape()\n        lightOn()\n        sceneView.session.run(configuration)\n\
    \    }\n    ```\n    此`viewWillAppear`函数调用了`showShape`和`lightOn`函数。`showShape`函数显示一个球体，`lightOn`函数定义一个光源。\n\
    8.  在`viewWillAppear`函数下方输入以下代码：\n    ```\n    func showShape() {\n        let\
    \ plane = SCNPlane(width: 0.75, height: 0.75)\n        plane.firstMaterial?.diffuse.contents\
    \ = UIColor.yellow\n        let node = SCNNode()\n        node.geometry = plane\n\
    \        node.position = SCNVector3(0, 0, -0.3)\n        sceneView.scene.rootNode.addChildNode(node)\n\
    \    }\n    func lightOn() {\n        showLight.light = SCNLight()\n        showLight.light?.type\
    \ = .spot\n        showLight.light?.color = UIColor(white: 0.6, alpha: 1.0)\n\
    \        showLight.position = SCNVector3(0, 0, 0)\n        showLight.eulerAngles\
    \ = SCNVector3(0, 0, 0)\n        sceneView.scene.rootNode.addChildNode(showLight)\n\
    \    }\n    ```\n    这段代码创建了一个黄色平面，出现在世界原点(0, 0, 0)后方-0.03的位置。然后代码在世界原点创建一个聚光灯，对准平面。虽然聚光灯是白色的，但由于平面是黄色的，光线照射在平面上会显示出黄色。\n\
    9.  将鼠标指针移动到**Pitch (x-axis)** `UISlider`上，按住**Control**键，然后按住鼠标左键拖拽到`lightOn`函数下方。\n\
    10. 松开**Control**键和鼠标左键。会弹出一个菜单。\n11. 点击**Connection**弹出菜单，选择**Action**。\n12.\
    \ 在**Name**文本框中输入`pitchChange`。\n13. 在**Type**弹出菜单中选择**UISlider**，然后点击**Connect**按钮。这将创建一个IBAction方法。\n\
    14. 按如下方式编辑此`pitchChange` IBAction方法：\n    ```\n    @IBAction func pitchChanged(_\
    \ sender: UISlider) {\n        currentX = GLKMathDegreesToRadians(sender.value)\n\
    \        showLight.eulerAngles = SCNVector3(currentX, currentY, currentZ)\n  \
    \  }\n    ```\n15. 将鼠标指针移动到**Yaw (y-axis)** `UISlider`上，按住**Control**键，然后按住鼠标左键拖拽到`lightOn`函数下方。\n\
    16. 松开**Control**键和鼠标左键。会弹出一个菜单。\n17. 点击**Connection**弹出菜单，选择**Action**。\n18.\
    \ 在**Name**文本框中输入`yawChange`。\n19. 在**Type**弹出菜单中选择**UISlider**，然后点击**Connect**按钮。这将创建一个IBAction方法。\n\
    20. 按如下方式编辑此`yawChange` IBAction方法：\n    ```\n    @IBAction func yawChanged(_\
    \ sender: UISlider) {\n        currentY = GLKMathDegreesToRadians(sender.value)\n\
    \        showLight.eulerAngles = SCNVector3(currentX, GLKMathDegreesToRadians(sender.value),\
    \ currentZ)\n    }\n    ```\n21. 将鼠标指针移动到**Roll (z-axis)** `UISlider`上，按住**Control**键，然后按住鼠标左键拖拽到`lightOn`函数下方。\n\
    22. 松开**Control**键和鼠标左键。会弹出一个菜单。\n23. 点击**Connection**弹出菜单，选择**Action**。\n24.\
    \ 在**Name**文本框中输入`rollChange`。\n25. 在**Type**弹出菜单中选择**UISlider**，然后点击**Connect**按钮。这将创建一个IBAction方法。\n\
    26. 按如下方式编辑此`rollChange` IBAction方法：\n    ```\n    @IBAction func rollChanged(_\
    \ sender: UISlider) {\n        currentZ = GLKMathDegreesToRadians(sender.value)\n\
    \        showLight.eulerAngles = SCNVector3(currentX, currentY, currentZ)\n  \
    \  }\n    ```\n\n整个`ViewController.swift`文件应如下所示："
  raw: "To design the user interface, click on the `Main.storyboard` file in the Navigator\
    \ pane and click on the Object Library button to open the Object Library. Then\
    \ drag and drop the different user interface items on to the user interface. The\
    \ user interface should eventually look similar to Figure [5-10](#469983_1_En_5_Chapter.xhtml#Fig10).\n\
    \n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig10_HTML.jpg](images/469983_1_En_5_Chapter/469983_1_En_5_Fig10_HTML.jpg)\n\
    \nFigure 5-10\n\nDesigning the user interface\n\nAfter you’ve designed the user\
    \ interface, you need to put constraints on those user interface items. To add\
    \ constraints, choose Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested\
    \ Constraints at the bottom half of the menu under the All Views in Container\
    \ category.\n\nAfter adding constraints, the next step is to modify the user interface\
    \ objects. Double-click on the three UILabels and change their titles to Pitch\
    \ (x-axis), Yaw (y-axis), and Roll (z-axis) (see Figure [5-10](#469983_1_En_5_Chapter.xhtml#Fig10)).\n\
    \nNow modify the UISlider next to the Pitch (x-axis) label by following these\
    \ steps:\n\n1.  Repeat Steps 1-5 for the Yaw (y-axis) and Roll (z-axis) UISliders.\n\
