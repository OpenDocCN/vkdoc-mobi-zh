    \ world after you have stored images of those items in your app. In addition to\
    \ storing an image, you must also specify the width and height of that real-world\
    \ object. That way, when ARKit spots that actual item through the iOS device’s\
    \ camera, it can compare that image with its stored image. If they match in both\
    \ appearance and size, then ARKit can recognize that real-world item.\n\nFirst,\
    \ you must capture an image of the item you want to detect. Since these images\
    \ need to be high resolution, you can capture public domain images off the Internet,\
    \ such as at NASA ( [`www.nasa.gov`](http://www.nasa.gov) ). Then you can display\
