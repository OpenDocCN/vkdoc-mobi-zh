- fmt: '# 相对定位虚拟对象


    如果你运行修改后的 `showShape` 函数，你的应用应该会显示一个橙色球体和一个绿色立方体。这种基于另一个虚拟对象的位置来定位第二个虚拟对象的方法存在一个巨大的问题：你必须手动计算两个虚拟对象之间的距离，这使得该方法容易出错。


    与手动计算并期望结果正确相比，一个更好的解决方案是简单地定义你希望一个虚拟对象出现在另一个对象多远的位置。


    请记住，当你使用 `SCNVector3` 命令为节点（虚拟对象）定义位置时，你只是基于根节点的位置（即世界原点 `(0, 0, 0)`）来定义虚拟对象的位置，就像这样：


    ```

    node.position = SCNVector3(0.2, 0.1, -0.1)

    sceneView.scene.rootNode.addChildNode(node)

    ```


    你可以让一个虚拟对象（节点）相对于另一个虚拟对象定位，而不是相对于根节点（世界原点）。这样做可以避免仅基于世界原点来计算 x、y 和 z 坐标的麻烦。


    因此，如果我们想将一个立方体放置在一个虚拟对象的左侧 0.4 米、下方 0.3 米、前方 0.2 米的位置，我们可以简单地使用这些数字，就像这样：


    ```

    boxNode.position = SCNVector3(-0.4, -0.3, 0.2)

    ```


    在定义了这个虚拟对象的位置之后，我们就可以将其相对于另一个虚拟对象放置。我们可以将节点添加到另一个虚拟对象上，而不是添加到根节点，就像这样：


    ```

    node.addChildNode(boxNode)

    ```


    如下修改 `showShape` 函数：


    ```

    func showShape() {

    let sphere = SCNSphere(radius: 0.05)

    sphere.firstMaterial?.diffuse.contents = UIColor.orange

    let box = SCNBox(width: 0.2, height: 0.2, length: 0.2, chamferRadius: 0.0)

    box.firstMaterial?.diffuse.contents = UIColor.green

    let boxNode = SCNNode()

    boxNode.geometry = box

    boxNode.position = SCNVector3(-0.4, -0.3, 0.2)

    let node = SCNNode()

    node.geometry = sphere

    node.position = SCNVector3(0.2, 0.1, -0.1)

    sceneView.scene.rootNode.addChildNode(node)

    node.addChildNode(boxNode)

    }

    ```


    这将创建完全相同的结果：绘制一个距离橙色球体特定距离的绿色立方体。最大的区别在于，我们不是将绿色立方体添加到根节点并计算它与橙色球体的距离，而是直接将绿色立方体添加到橙色球体上，并定义了沿
    x、y 和 z 轴放置绿色立方体的距离。


    相对定位使得将虚拟对象以固定距离放置于另一个虚拟对象旁边变得容易。最初，你需要将一个虚拟对象相对于根节点（世界原点 `(0, 0, 0)`）放置，但在此之后，你可以将虚拟对象相对于其他虚拟对象的位置进行放置。


    ## 组合几何形状


    一旦你知道如何将虚拟对象相对于彼此定位，你就可以轻松地组合多个几何形状，以创建使用单一几何形状无法创建的有趣对象。例如，你可以将棱锥放在立方体顶部来创建一个房屋对象，用多个圆柱体和一个球体来创建一个简笔画人物，或者用一个平面和一个圆环来创建一个篮球框。


    为了了解如何使用相对定位将多个几何形状组合在一起，让我们来创建一个雪人。雪人将由三个球体堆叠而成，顶部戴着一顶帽子，这顶帽子由两个圆柱体组成。


    首先，我们需要创建三个相互堆叠的球体。让我们从一个相对于根节点（世界原点 `(0, 0, 0)`）定位的大球体开始。然后，我们将使用相对定位在其顶部添加越来越小的球体。


    第一个球体基于根节点定位在 x 轴 0.05 米、y 轴 0.05 米、z 轴 -0.05 米的位置，如下所示：


    ```

    let sphere = SCNSphere(radius: 0.04)

    sphere.firstMaterial?.diffuse.contents = UIColor.red

    let node = SCNNode()

    node.geometry = sphere

    node.position = SCNVector3(0.05, 0.05, -0.05)

    sceneView.scene.rootNode.addChildNode(node)

    ```


    这将创建一个基于根节点定位的红色球体，它出现在世界原点 `(0, 0, 0)`。现在，让我们创建第二个蓝色球体，它出现在红色球体的顶部。我们将使用相对定位，基于红色球体的位置来放置这个蓝色球体，而不是通过根节点（世界原点）在增强现实视图中定位它。


    当将虚拟对象相对于另一个虚拟对象放置时，你需要反复试验来定义特定的距离，直到虚拟对象以你想要的方式彼此呈现。


    要将这个第二个蓝色球体放置在当前的红色球体顶部，我们可以使用以下代码：


    ```

    let middleSphere = SCNSphere(radius: 0.03)

    middleSphere.firstMaterial?.diffuse.contents = UIColor.blue

    let middleNode = SCNNode()

    middleNode.geometry = middleSphere

    middleNode.position = SCNVector3(0, 0.06, 0)

    node.addChildNode(middleNode)

    ```


    这段代码创建了一个半径为 0.03 米的球体，并将其着色为蓝色。然后，它基于红色球体的相对位置将其定位在 `(0, 0.06, 0)`。这意味着它出现在红色球体中心上方
    0.06 米处。


    接下来，我们需要创建第三个也是顶部的球体。这个顶部球体的半径为 0.02 米，颜色为白色。我们将把这个球体放置在中间球体的顶部，距离中间球体中心上方 0.04
    米的位置，如下所示：


    ```

    let topSphere = SCNSphere(radius: 0.02)

    topSphere.firstMaterial?.diffuse.contents = UIColor.white

    let topNode = SCNNode()

    topNode.geometry = topSphere

    topNode.position = SCNVector3(0, 0.04, 0)

    middleNode.addChildNode(topNode)

    ```


    最后，让我们为构成虚拟雪人的三个球体添加一顶黑色帽子。这顶帽子将由两个圆柱体组成。一个宽而扁平的圆柱体将构成帽檐，一个更窄更高的圆柱体将构成帽子的其余部分。帽檐需要相对于顶部球体定位，如下所示：


    ```

    let hatRim = SCNCylinder(radius: 0.03, height: 0.002)

    hatRim.firstMaterial?.diffuse.contents = UIColor.black

    let rimNode = SCNNode()

    rimNode.geometry = hatRim

    rimNode.position = SCNVector3(0, 0.016, 0)

    topNode.addChildNode(rimNode)

    ```


    帽檐的半径为 0.03 米，高度仅为 0.002 米。这段代码将圆柱体着色为黑色，并将其放置在顶部球体中心上方 0.016 米处。


    最后，我们需要用第二个黑色圆柱体来完成帽子。这个圆柱体需要位于帽檐上方 0.01 米处，半径为 0.015 米，高度为 0.025 米，如下所示：'
  raw: 'If you run this modified `showShape` function , your app should show an orange
    sphere and a green box. The huge problem with this method of positioning a second
    virtual object based on the position of another virtual object is that you must
    calculate the distances between the two virtual objects manually, which makes
    this method error-prone.


    Rather than calculate distances manually and hope you did it right, a far better
    solution is to simply define the distance you want one virtual object to appear
    away from another one.


    Remember, when you define a position for a node (virtual object), using the `SCNVector3`
    command , you’re just defining the virtual object’s position based on the rootnode’s
    position, which is the world origin (0, 0, 0) like this:


    ```

    node.position = SCNVector3(0.2, 0.1, -0.1)

    sceneView.scene.rootNode.addChildNode(node)

    ```


    Rather than place a virtual object (node) in relation to the rootnode (world origin),
    you can just place a virtual object in relation to another virtual object. Doing
    so avoids the hassle of doing the math to determine x, y, and z coordinates solely
    based on the world origin.


    So if we want to place the box 0.4 meters to the left, 0.3 meters lower, and 0.2
    meters in front of a virtual object, we can simply use those numbers like this:


    ```

    boxNode.position = SCNVector3(-0.4, -0.3, 0.2)

    ```


    After defining the position of this virtual object, we can then place it relative
    to another virtual object. Instead of adding the node to the rootnode, we can
    add it to the other virtual object like this:


    ```

    node.addChildNode(boxNode)

    ```


    Modify the `showShape` function like this:


    ```

    func showShape() {

    let sphere = SCNSphere(radius: 0.05)

    sphere.firstMaterial?.diffuse.contents = UIColor.orange

    let box = SCNBox(width: 0.2, height: 0.2, length: 0.2, chamferRadius: 0.0)

    box.firstMaterial?.diffuse.contents = UIColor.green

    let boxNode = SCNNode()

    boxNode.geometry = box

    boxNode.position = SCNVector3(-0.4, -0.3, 0.2)

    let node = SCNNode()

    node.geometry = sphere

    node.position = SCNVector3(0.2, 0.1, -0.1)

    sceneView.scene.rootNode.addChildNode(node)

    node.addChildNode(boxNode)

    }

    ```


    This creates the exact same result of drawing a green box a specific distance
    from an orange sphere. The big difference is that instead of adding the green
    box to the rootnode and calculating its distance from the orange sphere, we just
    added the green box to the orange sphere and defined the distance along the x,
    y, and z axis to place the green box.


    Relative positioning makes it easy to place virtual objects a fixed distance from
    another virtual object. Initially, you’ll need to place one virtual object relative
    to the rootnode (the world origin of 0, 0, 0), but after that, you can place virtual
    objects relative to the location of other virtual objects.


    ## Combining Geometric Shapes


    Once you know how to position virtual objects relative to one another, you can
    easily combine multiple geometric shapes to create interesting objects that you
    could never create using a single geometric shape. For example, you could create
    a pyramid on top of a box to create a house object, multiple cylinders with a
    sphere to create a stick figure, or a plane with a torus to create a basketball
    hoop.


    To see how to use relative positioning to combine multiple geometric shapes together,
    let’s create a snowman. The snowman will consist of three spheres stacked on top
    of each other with a hat on top, which we’ll create with two cylinders.


    First, we’ll need to create three spheres stacked on top of each other. Let’s
    start with one large sphere that will be positioned relative to the rootnode (the
    world origin at 0, 0, 0). Then we’ll add progressively smaller spheres on top
    using relative positioning.


    The first sphere gets positioned based on the rootnode 0.05 meters on the x-axis,
    0.05 on the y-axis, and -0.05 on the z-axis like this:


    ```

    let sphere = SCNSphere(radius: 0.04)

    sphere.firstMaterial?.diffuse.contents = UIColor.red

    let node = SCNNode()

    node.geometry = sphere

    node.position = SCNVector3(0.05, 0.05, -0.05)

    sceneView.scene.rootNode.addChildNode(node)

    ```


    This creates a red sphere positioned based on the rootnode, which appears at the
    world origin (0, 0, 0). Now let’s create a second sphere in blue that appears
    on top of the red sphere. Instead of positioning this blue sphere in the augmented
    reality view by the rootnode (world origin), we’ll use relative positioning and
    place it based on the location of the red sphere.


    When placing virtual objects relative to another virtual object, you need to use
    trial and error to define specific distances until the virtual objects appear
    the way you want in relation to one another.


    To place this second, blue sphere on top of the current red sphere, we can use
    the following code:


    ```

    let middleSphere = SCNSphere(radius: 0.03)

    middleSphere.firstMaterial?.diffuse.contents = UIColor.blue

    let middleNode = SCNNode()

    middleNode.geometry = middleSphere

    middleNode.position = SCNVector3(0, 0.06, 0)

    node.addChildNode(middleNode)

    ```


    This code creates a sphere with a radius of 0.03 meters and colors it blue. Then
    it positions it at 0, 0.06, 0 based on the relative position of the red sphere.
    That means it appears 0.06 meters above the center of the red sphere.


    Next, we need to create the third and top sphere. This top sphere has a radius
    of 0.02 meters and is colored white. We’ll place this sphere on top of the middle
    sphere 0.04 meters above the middle sphere’s center like this:


    ```

    let topSphere = SCNSphere(radius: 0.02)

    topSphere.firstMaterial?.diffuse.contents = UIColor.white

    let topNode = SCNNode()

    topNode.geometry = topSphere

    topNode.position = SCNVector3(0, 0.04, 0)

    middleNode.addChildNode(topNode)

    ```


    Finally, let’s add a black hat to the three spheres that make up a virtual snowman.
    The hat will consist of two cylinders. A wide, flattened cylinder will create
    the hat brim and a narrower and taller cylinder will make up the rest of the hat.
    The hat rim needs to be positioned relative to the top sphere like this:


    ```

    let hatRim = SCNCylinder(radius: 0.03, height: 0.002)

    hatRim.firstMaterial?.diffuse.contents = UIColor.black

    let rimNode = SCNNode()

    rimNode.geometry = hatRim

    rimNode.position = SCNVector3(0, 0.016, 0)

    topNode.addChildNode(rimNode)

    ```


    The radius of the hat rim is 0.03 meters and its height is just 0.002 meters tall.
    This code colors the cylinder black and places it 0.016 meters above the center
    of the top sphere.


    Finally, we need to complete the hat with a second black cylinder. This cylinder
    needs to be 0.01 meters above the hat rim with a smaller radius of 0.015 and a
    taller height of 0.025 meters like this:'
