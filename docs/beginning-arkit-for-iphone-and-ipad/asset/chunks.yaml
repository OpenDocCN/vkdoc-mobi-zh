    \ Object Rotation\n\nBy using Euler angles, it’s easy to rotate a virtual object\
    \ around its `x`-, `y`-, or `z`-axis. If you rotate an object, you may wonder\
    \ what happens to any neighboring objects that are positioned relative to the\
    \ rotating object. If you use relative positioning to place one virtual object\
    \ next to another one, then rotating an object also causes any nearby objects\
    \ to change their position too.\n\nSo if you have a green pyramid and use relative\
    \ positioning to place an orange box next to the green pyramid, then rotating\
    \ the green pyramid also moves the orange box. That’s because the orange box uses\
    \ relative positioning to place it a specific distance from the green pyramid.\
    \ When the green pyramid rotates, the orange box changes its position as well.\n\
    \nLet’s add a second virtual object, such as an orange box, and use relative positioning\
    \ to place it 0.15 meters to the left (the `x`-axis), 0 meters on the `y`-axis,\
    \ and 0 meters on the `z`-axis.\n\nEdit the `showShape` function so it looks like\
    \ this:\n\n```swift\nfunc showShape() {\n    let pyramid = SCNPyramid(width: 0.05,\
    \ height: 0.1, length: 0.05)\n    pyramid.firstMaterial?.diffuse.contents = UIColor.green\n\
    \    node.geometry = pyramid\n    node.position = SCNVector3(0.05, 0.05, -0.05)\n\
    \    sceneView.scene.rootNode.addChildNode(node)\n    let box = SCNBox (width:\
    \ 0.05, height: 0.05, length: 0.05, chamferRadius: 0)\n    box.firstMaterial?.diffuse.contents\
    \ = UIColor.orange\n    let boxNode = SCNNode()\n    boxNode.geometry = box\n\
    \    boxNode.position = SCNVector3(-0.15, 0, 0)\n    node.addChildNode(boxNode)\n\
    }\n```\n\nThis code creates an orange box that appears 0.15 meters to the left\
    \ of the green pyramid. Since the orange box uses relative positioning based on\
    \ the green pyramid’s location, rotating the green pyramid automatically forces\
    \ the orange box to change its position to maintain its fixed position to the\
    \ green pyramid.\n\nRun this revised app and slide the `x`-axis, `y`-axis, and\
    \ `z`-axis sliders left and right. Notice that the green pyramid rotates and forces\
    \ the orange box to change its location based on the green pyramid’s rotation.\n\
    \nBecause the orange box is positioned relative to the green pyramid, rotating\
    \ the green pyramid forces the orange box to move as well. What happens if we\
    \ create a third virtual object that uses relative positioning with the orange\
    \ box? Then rotating the pyramid will move the orange box, which in turn will\
    \ move our third virtual object. Let’s see how that works.\n\nRewrite the `showShape`\
    \ function so it adds a red cylinder that uses relative positioning to orient\
    \ itself according to the orange box’s position. Now rotating the green pyramid\
    \ moves the orange box, which maintains its position to the green pyramid, and\
    \ also moves the red cylinder, which maintains its position to the orange box.\n\
    \nThe `showShape` function should look like this:\n\n```swift\nfunc showShape()\
    \ {\n    let pyramid = SCNPyramid(width: 0.05, height: 0.1, length: 0.05)\n  \
