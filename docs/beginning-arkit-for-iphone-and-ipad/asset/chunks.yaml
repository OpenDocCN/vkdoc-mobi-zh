    \ hatNode = SCNNode()\nhatNode.geometry = hatTop\nhatNode.position = SCNVector3(0,\
    \ 0.01, 0)\nrimNode.addChildNode(hatNode)\n}\n}\n```\n\n## Summary\n\nWhen placing\
    \ virtual objects in an augmented reality view, each virtual object must be assigned\
    \ to a node and that node needs x, y, and z coordinates to define its location.\
    \ At least one virtual object needs to be located based on its distance from the\
    \ rootnode, which represents the world origin (0, 0, 0). After placing at least\
    \ one virtual object based on the rootnode, you can place additional virtual objects\
    \ based on either the rootnode or any existing virtual objects.\n\nPlacing virtual\
    \ objects based on the rootnode lets you define their location independent of\
    \ any other virtual objects. However, if you want one virtual object to appear\
    \ a fixed distance from a second virtual object, it’s easier to use relative positioning.\
    \ Instead of defining a virtual object based on its location to the rootnode,\
    \ you define it based on its location to another virtual object.\n\nWithout relative\
    \ positioning, you would have to calculate distances based on the rootnode, which\
    \ can be inaccurate and cumbersome to do. Relative positioning makes it easy to\
    \ define virtual objects a fixed distance from one another.\n\n# 7. Rotating Objects\n\
    \nWhen you place a virtual object in an augmented reality view, it always appears\
    \ in its default orientation such as a cylinder or pyramid appearing vertically.\
    \ However, sometimes you may want a virtual object to appear in a different orientation.\
    \ To achieve this, you may need to rotate the virtual object around its x-, y-,\
    \ and z-axes.\n\nRotating a virtual object involves changing a virtual object’s\
    \ Euler angle around its x-, y-, and z-axes. In addition to learning how to rotate\
    \ virtual objects around the x-, y-, and z-axes, you’ll also learn how Xcode rotates\
    \ additional virtual objects positioned relative to an existing virtual object.\
    \ For example, if you create a box and place a pyramid relative to box, rotating\
    \ the box will also change the position of the pyramid."
