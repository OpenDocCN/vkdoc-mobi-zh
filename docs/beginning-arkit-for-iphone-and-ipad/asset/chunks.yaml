    \ SCNScene, atTime time: TimeInterval) {\n    }\n    ```\n\n`renderer(_:willRenderScene:atTime:)`函数会在每次应用更新增强现实视图时运行，通常为每秒\
    \ 60 帧。\n\n## 绘制增强现实视图\n\n要在增强现实视图上进行绘制，首先需要在`willRenderScene`函数中获取 iOS 设备摄像头的位置。为此，我们可以使用以下代码来获取摄像头的位置和方向：\n\
    ```\nguard let pov = sceneView.pointOfView else {return}\n```\n`guard`语句确保我们从\
    \ iOS 设备获取了摄像头信息。如果由于某些原因未能获取，`guard`语句会立即退出`willRenderScene`函数。\n\n假设我们成功从 iOS\
    \ 设备获取了摄像头信息，下一步是将此信息转换为一个包含摄像头各种信息的 4x4 矩阵：\n```\nlet transform = pov.transform\n\
    ```\n\n### 获取摄像头旋转与位置\n\n这个 4x4 矩阵的第三行包含了摄像头的 x、y、z 旋转信息。要获取这些信息，我们需要使用以下代码：\n\
    ```\nlet rotation = SCNVector3(-transform.m31, -transform.m32, -transform.m33)\n\
