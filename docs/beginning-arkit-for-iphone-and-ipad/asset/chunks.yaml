    \n然而，如果我们不断添加绿线，最终屏幕会充满绿线。因此，让我们添加一个简单的功能来清除整个屏幕，步骤如下：\n\n1.  选择 Editor ➤ Resolve\
    \ AutoLayout Issues ➤ Reset to Suggested Constraints。\n2.  点击“显示助理编辑器”图标或选择 View\
    \ ➤ Assistant Editor ➤ Show Assistant Editor。Xcode 并排显示您的`Main.storyboard`文件和`ViewController.swift`文件。\n\
    3.  将鼠标指针悬停在`UIButton`上，按住 Control 键，然后 Ctrl-拖拽到 IBOutlet 下方。出现一个弹出窗口。\n4.  在\
    \ Name 文本字段中键入`clearButton`。\n5.  点击 Connect 按钮。Xcode 创建一个 IBOutlet，如下所示：\n\n\
    ![](img/469983_1_En_8_Fig5_HTML.jpg)\n\n图 8-5：更改 UIButton 的背景颜色\n\n1.  在 Navigator\
    \ 窗格中点击`Main.storyboard`文件。\n2.  向用户界面添加一个`UIButton`。\n3.  将`UIButton`的标题更改为“Clear”。您可能还想调整按钮大小使其更宽。\n\
    4.  点击“显示属性检查器”图标或选择 View ➤ Inspectors ➤ Show Attributes Inspector。\n5.  将`UIButton`的背景颜色更改为白色（见图\
    \ 8-5）。\n6.  点击“显示标准编辑器”图标或选择 View ➤ Standard Editor ➤ Show Standard Editor。\n\
    7.  点击`ViewController.swift`文件。\n8.  将以下代码添加到`DispatchQueue`代码的底部：\n\n```\nif\
    \ self.clearButton.isHighlighted {\n    self.sceneView.scene.rootNode.enumerateChildNodes({\
    \ (node, _) in\n        node.removeFromParentNode()\n    })\n}\n```\n\n完整的`ViewController.swift`文件应如下所示：\n\
    \n```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController: UIViewController,\
    \ ARSCNViewDelegate {\n    @IBOutlet var sceneView: ARSCNView!\n    @IBOutlet\
    \ var switchDraw: UISwitch!\n    @IBOutlet var clearButton: UIButton!\n    let\
    \ configuration = ARWorldTrackingConfiguration()\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        // Do any additional setup after loading\
    \ the view, typically from a nib.\n        sceneView.delegate = self\n       \
    \ sceneView.showsStatistics = true\n        sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
    \ ARSCNDebugOptions.showFeaturePoints]\n    }\n    override func viewWillAppear(_\
    \ animated: Bool) {\n        super.viewWillAppear(animated)\n        sceneView.session.run(configuration)\n\
    \    }\n    func renderer(_ renderer: SCNSceneRenderer, willRenderScene scene:\
    \ SCNScene, atTime time: TimeInterval) {\n        guard let pov = sceneView.pointOfView\
    \ else {return}\n        let transform = pov.transform\n        let rotation =\
    \ SCNVector3(-transform.m31, -transform.m32, -transform.m33)\n        let location\
    \ = SCNVector3(transform.m41, transform.m42, transform.m43)\n        let currentPosition\
    \ = SCNVector3(rotation.x + location.x, rotation.y + location.y, rotation.z +\
    \ location.z)\n        DispatchQueue.main.async {\n            if self.switchDraw.isOn\
    \ {\n                let drawNode = SCNNode()\n                drawNode.geometry\
    \ = SCNSphere(radius: 0.01)\n                drawNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.green\n                drawNode.position = currentPosition\n     \
    \           self.sceneView.scene.rootNode.addChildNode(drawNode)\n           \
    \ } else {\n                let point = SCNNode()\n                point.name\
    \ = \"aiming point\"\n                point.geometry = SCNSphere(radius: 0.005)\n\
    \                point.position = currentPosition\n                point.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.red\n                self.sceneView.scene.rootNode.enumerateChildNodes({\
    \ (node, _) in\n                    if node.name == \"aiming point\" {\n     \
    \                   node.removeFromParentNode()\n                    }\n     \
    \           })\n                self.sceneView.scene.rootNode.addChildNode(point)\n\
    \            }\n            if self.clearButton.isHighlighted {\n            \
    \    self.sceneView.scene.rootNode.enumerateChildNodes({ (node, _) in\n      \
    \              node.removeFromParentNode()\n                })\n            }\n\
    \        }\n    }\n}\n```\n\n# 运行应用程序\n\n要查看应用程序的运行，请执行以下操作：\n\n1.  通过 USB 线缆将\
    \ iOS 设备连接到 Macintosh。\n2.  点击运行按钮或选择 Product ➤ Run。\n3.  当应用运行时，移动 iOS 设备以查看屏幕中央的红色指针。\n\
    4.  点击`UISwitch`将其打开。\n5.  移动 iOS 设备，注意到现在会绘制一条绿线。\n6.  点击`UISwitch`将其关闭。\n7.\
    \  将 iOS 设备移动到一个新的位置。\n8.  点击`UISwitch`将其打开。\n9.  移动 iOS 设备以绘制另一条独立的绿线。\n10. 点击\
    \ Clear 按钮。注意，应用现在会清除您绘制的所有绿线。\n11. 点击停止按钮或选择 Product ➤ Stop。\n\n# 总结\n\n增强现实应用依赖于\
    \ iOS 设备中的摄像头。此摄像头通常以每秒 60 帧（fps）的速度刷新图像。您可以通过添加这行代码来查看应用每秒显示的帧数：\n\n```\nsceneView.showsStatistics\
    \ = true)\n```\n\n每次应用更新显示图像时，`renderer`函数都会运行，即每秒 60 次。通过在`renderer`函数内绘制对象，您的应用可以持续绘制图像。在我们的示例应用中，我们绘制了一个球体，但由于`renderer`函数持续绘制球体，它绘制了多个球体。当用户移动摄像头时，这会绘制多个绿色球体，从而产生绘制线条的错觉。\n\
    \n要清除虚拟对象，我们可以使用`enumerateChildNodes`循环来检查每个节点：\n\n```\nself.sceneView.scene.rootNode.enumerateChildNodes({\
    \ (node, _) in\n})\n```\n\n为了避免移除所有节点，我们可以为节点命名，然后使用`if`语句仅移除某些指定名称的节点。在增强现实视图中进行绘制需要获取相机的当前旋转和位置，以便应用可以在用户指向摄像头的任何地方绘制虚拟对象。\n"
- fmt: "# 9. Adding Touch Gestures to Augmented Reality\n\nUp until now, we’ve created\
    \ augmented reality apps that display virtual objects on the screen. What gives\
    \ augmented reality a greater sense of existing in front of your eyes is when\
    \ you can interact with virtual objects.\n\nNaturally, you won’t be able to touch\
    \ or manipulate any virtual objects with your hand, but you can touch and manipulate\
    \ virtual objects through the augmented reality view on your iOS screen. This\
    \ means you can tap, drag, and manipulate items on the screen with your fingertips.\
    \ Interacting with augmented reality can create a greater sense of realism.\n\n\
    Some of the different kinds of gestures available include:\n*   Tap—A brief touch\
    \ on the screen before lifting the finger up\n*   Long press—Press a finger on\
    \ the screen and hold it there for a period of time\n*   Swipe—Slide a finger\
    \ left or right across an area\n*   Pan—Press a finger on the screen and then\
    \ slide it across the screen\n*   Pinch—A two-finger gesture that moves the two\
    \ fingertips closer or farther apart\n*   Rotation—A two-finger gesture that moves\
    \ the two fingertips in a circular motion\n\nTo interact with virtual objects\
    \ in augmented reality, we must first detect a touch gesture such as a tap or\
    \ a swipe. Once we can detect a touch gesture, our next step is to identify if\
    \ the touch gesture touched a virtual object or not.\n\nTo detect a touch gesture\
    \ in an augmented reality view, we need to create a new Xcode project by following\
    \ these steps:\n1.  Start Xcode. (Make sure you’re using Xcode 10 or greater.)\n\
    2.  Choose File ➤ New ➤ Project. Xcode asks you to choose a template.\n3.  Click\
    \ the iOS category.\n4.  Click the Single View App icon and click the Next button.\
    \ Xcode asks for a product name, organization name, organization identifiers,\
    \ and content technology.\n5.  Click in the Product Name text field and type a\
    \ descriptive name for your project such as `TouchGesture`. (The exact name does\
    \ not matter.)\n6.  Click the Next button. Xcode asks where you want to store\
    \ your project.\n7.  Choose a folder and click the Create button. Xcode creates\
    \ an iOS project.\n\nNow modify the `Info.plist` file to allow access to the camera\
    \ and to use ARKit by following these steps:\n1.  Click the `Info.plist` file\
    \ in the Navigator pane. Xcode displays a list of keys, types, and values.\n2.\
    \  Click the disclosure triangle to expand the Required device capabilities category\
    \ to display Item 0.\n3.  Move the mouse pointer over Item 0 to display a plus\
    \ (`+`) icon.\n4.  Click this plus (`+`) icon to display a blank Item 1.\n5. \
    \ Type `arkit` under the Value category in the Item 1 row.\n6.  Move the mouse\
    \ pointer over the last row to display a plus (`+`) icon.\n7.  Click on the plus\
    \ (`+`) icon to create a new row. A popup menu appears.\n8.  Choose Privacy –\
    \ Camera Usage Description.\n9.  Type `AR needs to use the camera` under the Value\
    \ category in the Privacy – Camera Usage Description row.\n\nNow it’s time to\
    \ modify the `ViewController.swift` file to use ARKit and SceneKit by following\
    \ these steps:\n1.  Click on the `ViewController.swift` file in the Navigator\
    \ pane.\n2.  Edit the `ViewController.swift` file so it looks like this:\n\n```\n\
    import UIKit\nimport SceneKit\nimport ARKit\nclass ViewController: UIViewController,\
    \ ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
    \ any additional setup after loading the view, typically from a nib.\n    }\n\
    }\n```\n\nTo view augmented reality in our app, add a single ARKit SceneKit View\
    \ (`ARSCNView`) so the user interface looks similar to Figure [9-1](#469983_1_En_9_Chapter.xhtml#Fig1).\n\
    \n![../images/469983_1_En_9_Chapter/469983_1_En_9_Fig1_HTML.jpg](images/469983_1_En_9_Chapter/469983_1_En_9_Fig1_HTML.jpg)\n\
    Figure 9-1\nThe user interface includes a single ARSCNView\n\nAfter you’ve designed\
    \ your user interface , you need to add constraints. To add constraints, choose\
    \ Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints at the\
    \ bottom half of the menu under the All Views in Container category.\n\nThe next\
    \ step is to connect the user interface items to the Swift code in the `ViewController.swift`\
    \ file. To do this, follow these steps:\n1.  Click the `Main.storyboard` file\
    \ in the Navigator pane.\n2.  Click the Assistant Editor icon or choose View ➤\
    \ Assistant Editor ➤ Show Assistant Editor to display the `Main.storyboard` and\
    \ the `ViewController.swift` file side by side.\n3.  Move the mouse pointer over\
    \ the ARSCNView, hold down the Control key, and Ctrl-drag under the `class ViewController`\
    \ line.\n4.  Release the Control key and the left mouse button. A popup menu appears.\n\
    5.  Click in the Name text field and type `sceneView`, then click the Connect\
    \ button. Xcode creates an IBOutlet as shown here:\n\n```\n@IBOutlet var sceneView:\
    \ ARSCNView!\n```\n\n6.  Edit the `viewDidLoad` function so it looks like this:\n\
    \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n    sceneView.delegate\
    \ = self\n    sceneView.showsStatistics = true\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
    \ ARSCNDebugOptions.showFeaturePoints]\n}\n```\n\n7.  Edit the `viewWillAppear`\
    \ function so it looks like this:\n\n```\noverride func viewWillAppear(_ animated:\
    \ Bool) {\n    super.viewWillAppear(animated)\n    sceneView.session.run(configuration)\n\
    }\n```"
  raw: "# 9. Adding Touch Gestures to Augmented Reality\n\nUp until now, we’ve created\
