    \ or more child nodes:\n\n```\n    sceneView.scene.rootNode.addChildNode(node)\n\
    \    ```\n\n11.  Modify the `resetButton` function like this:\n\n```\n    @IBAction\
    \ func resetButton(_ sender: UIButton) {\n    sceneView.session.pause()\n    sceneView.scene.rootNode.enumerateChildNodes\
    \ { (node, _) in\n    if node.name == \"sphere\" {\n    node.removeFromParentNode()\n\
    \    }\n    }\n    sceneView.session.run(configuration, options: [.resetTracking])\n\
    \    }\n    ```\n\n![../images/469983_1_En_3_Chapter/469983_1_En_3_Fig11_HTML.jpg](images/469983_1_En_3_Chapter/469983_1_En_3_Fig11_HTML.jpg)\n\
    \nFigure 3-11\n\nCreating an IBOutlet for a slider\n\n1.  Click on the Assistant\
    \ Editor icon or choose View ➤ Assistant Editor ➤ Show Assistant Editor. Xcode\
    \ displays the `ViewController.swift` file side by side with the `Main.storyboard`\
    \ file.\n\n2.  Click on each slider, hold down the Control key, and drag the mouse\
    \ to the `ViewController.swift` file under the existing IBOutlet, as shown in\
    \ Figure [3-11](#469983_1_En_3_Chapter.xhtml#Fig11).\n\nThis `resetButton` function\
    \ first pauses the current augmented reality session, then it checks each child\
    \ node. If the name of that child node happens to be `sphere`, then it removes\
    \ that node from the root node.\n\nThis `if` statement to check if a node’s name\
    \ is `sphere` is important because, when the app displays the world origin, that’s\
    \ also a child node connected to the root node. Suppose you just had the following\
    \ code:\n\n```\nsceneView.scene.rootNode.enumerateChildNodes { (node, _) in\n\
    node.removeFromParentNode()\n}\n```\n\nThis code would remove all nodes from the\
    \ root node, including the world origin. By only removing nodes named `sphere`,\
    \ we can keep the world origin displayed while removing all yellow spheres displayed\
    \ in the augmented reality view.\n\nThe complete `ViewController.swift` file should\
    \ look like this:\n\n```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController:\
    \ UIViewController, ARSCNViewDelegate {\n@IBOutlet var sceneView: ARSCNView!\n\
    @IBOutlet var Xslider: UISlider!\n@IBOutlet var Yslider: UISlider!\n@IBOutlet\
    \ var Zslider: UISlider!\nlet configuration = ARWorldTrackingConfiguration()\n\
    override func viewDidLoad() {\nsuper.viewDidLoad()\n// Do any additional setup\
    \ after loading the view, typically from a nib.\nsceneView.delegate = self\nsceneView.showsStatistics\
    \ = true\nsceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin]\n}\noverride\
    \ func viewWillAppear(_ animated: Bool) {\nsuper.viewWillAppear(animated)\nsceneView.session.run(configuration)\n\
    }\n@IBAction func addButton(_ sender: UIButton) {\nshowShape()\n}\n@IBAction func\
    \ resetButton(_ sender: UIButton) {\nsceneView.session.pause()\nsceneView.scene.rootNode.enumerateChildNodes\
    \ { (node, _) in\nif node.name == \"sphere\" {\nnode.removeFromParentNode()\n\
    }\n}\nsceneView.session.run(configuration, options: [.resetTracking])\n}\nfunc\
    \ showShape() {\nlet node = SCNNode()\nnode.geometry = SCNSphere(radius: 0.05)\n\
    node.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\nnode.position\
    \ = SCNVector3(Xslider.value,Yslider.value,Zslider.value)\nnode.name = \"sphere\"\
    \nsceneView.scene.rootNode.addChildNode(node)\n}\n}\n```\n\nAttach an iOS device\
    \ to your Macintosh through a USB cable and then click the Run button or choose\
    \ Product ➤ Run. After a few moments, step back and you should see the world origin\
    \ appear. Move the sliders left or right and then tap the Add button. Your app\
    \ should display a yellow sphere at the x, y, and z coordinates defined by the\
    \ three sliders, as shown in Figure [3-12](#469983_1_En_3_Chapter.xhtml#Fig12).\n\
    \n![../images/469983_1_En_3_Chapter/469983_1_En_3_Fig12_HTML.jpg](images/469983_1_En_3_Chapter/469983_1_En_3_Fig12_HTML.jpg)\n\
    \nFigure 3-12\n\nDisplaying multiple yellow spheres\n\nYou can repeat this process\
    \ of changing the slider values and tapping the Add button to keep adding more\
    \ yellow spheres. Move your iOS device to a new location and tap the Reset button.\
    \ Your app will remove all yellow spheres and display the world origin at the\
    \ current location of your iOS device.\n\n## Summary\n\nIn this chapter, you learned\
    \ how to display a world origin for debugging purposes in helping you verify that\
    \ your app is placing objects correctly in an augmented reality view. Once your\
    \ app is finished, you’ll need to remove the code that makes the world origin\
    \ appear each time your app displays its augmented reality view.\n\nThe world\
    \ origin helps you position objects by defining its x, y, and z coordinates. To\
    \ display items in an augmented reality view, you need to create a node and define\
    \ a shape for that node, such as a sphere, box, or torus. Next, you need to define\
    \ an object’s appearance, such as yellow or red, along with its size.\n\nTo make\
    \ augmented reality more versatile, you can reset the world origin based on a\
    \ new location the user may hold an iOS device. This ability to reset the world\
    \ origin lets your app display virtual objects wherever the user decides to move\
    \ and point an iOS device.\n\nIn the next chapter, we go into more details about\
    \ creating geometric shapes and applying different textures to a shape beyond\
    \ solid colors."
  trans: "\n8.  点击“连接”按钮。Xcode 会创建一个 `IBAction` 方法。\n9.  像这样编辑这个 `addButton IBAction`\
    \ 方法：\n```\n    @IBAction func addButton(_ sender: UIButton) {\n    showShape()\n\
    \    }\n```\n10. 像这样修改 `showShape()` 函数：\n```\n    func showShape() {\n    let\
    \ node = SCNNode()\n    node.geometry = SCNSphere(radius: 0.05)\n    node.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.yellow\n    node.position = SCNVector3(Xslider.value,Yslider.value,Zslider.value)\n\
    \    node.name = \"sphere\"\n    sceneView.scene.rootNode.addChildNode(node)\n\
    \    }\n```\n`showShape()` 函数会创建黄色的球体，这些球体基于用户界面上的三个滑块（`Xslider`、`Yslider` 和 `Zslider`）定义的\
    \ x、y 和 z 坐标放置在增强现实视图中。创建虚拟对象的第一步是定义一个节点：\n```\n    let node = SCNNode()\n```\n\
    `SCNNode` 定义了一个 SceneKit 节点，节点简单来说就代表一个虚拟对象。定义好节点后，我们需要定义要显示的实际对象。SceneKit 提供了几种不同的几何形状可供选择，但在本例中，我们将使用球体并将其半径定义为\
    \ 0.05 米：\n```\n    node.geometry = SCNSphere(radius: 0.05)\n```\n`geometry` 属性定义了节点的形状，这里是一个球体。为了让该对象可见，我们需要定义其材质。在本例中，我们选择黄色并将其漫反射到球体的整个表面：\n\
    ```\n    node.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n```\n\
    接下来，我们需要定义节点的位置，这需要 x、y 和 z 浮点数值。我们不定义固定值，而是从用户界面上的三个滑块中获取值：\n```\n    node.position\
    \ = SCNVector3(Xslider.value,Yslider.value,Zslider.value)\n```\n每次我们添加一个新节点（球体）时，给它起个名字。这个名字在后面我们需要从增强现实视图中移除所有球体时将非常重要。名字可以是任何内容，这里就叫它\
    \ `sphere`：\n```\n    node.name = \"sphere\"\n```\n最后，我们需要将这个节点添加到根节点。ARKit 将所有显示内容组织成层级结构，每个增强现实视图都带有一个根节点。每次你在增强现实视图中创建一个要显示的新对象时，该新对象就是一个节点，它会成为根节点的子节点。每个增强现实视图包含一个根节点和零个或多个子节点：\n\
    ```\n    sceneView.scene.rootNode.addChildNode(node)\n```\n11. 像这样修改 `resetButton`\
    \ 函数：\n```\n    @IBAction func resetButton(_ sender: UIButton) {\n    sceneView.session.pause()\n\
    \    sceneView.scene.rootNode.enumerateChildNodes { (node, _) in\n    if node.name\
    \ == \"sphere\" {\n    node.removeFromParentNode()\n    }\n    }\n    sceneView.session.run(configuration,\
    \ options: [.resetTracking])\n    }\n```\n![图 3-11](img/469983_1_En_3_Fig11_HTML.jpg)\n\
    \n### 为滑块创建 IBOutlet\n1.  点击“助理编辑器”图标或选择 **视图** ➤ **助理编辑器** ➤ **显示助理编辑器**。Xcode\
    \ 会并排显示 `ViewController.swift` 文件和 `Main.storyboard` 文件。\n2.  点击每个滑块，按住 **Control**\
    \ 键，并将鼠标拖到现有 `IBOutlet` 下方的 `ViewController.swift` 文件中，如图 3-11 所示。\n\n这个 `resetButton`\
    \ 函数首先暂停当前的增强现实会话，然后检查每个子节点。如果该子节点的名字恰好是 `sphere`，则将其从根节点中移除。\n\n这个检查节点名称是否为 `sphere`\
    \ 的 `if` 语句很重要，因为当应用程序显示世界原点时，那也是一个连接到根节点的子节点。假设你只有以下代码：\n```\nsceneView.scene.rootNode.enumerateChildNodes\
    \ { (node, _) in\nnode.removeFromParentNode()\n}\n```\n这段代码会从根节点移除所有节点，包括世界原点。通过仅移除名为\
    \ `sphere` 的节点，我们可以在移除增强现实视图中显示的所有黄色球体的同时，保持世界原点的显示。\n\n完整的 `ViewController.swift`\
    \ 文件应如下所示：\n```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController:\
    \ UIViewController, ARSCNViewDelegate {\n@IBOutlet var sceneView: ARSCNView!\n\
    @IBOutlet var Xslider: UISlider!\n@IBOutlet var Yslider: UISlider!\n@IBOutlet\
    \ var Zslider: UISlider!\nlet configuration = ARWorldTrackingConfiguration()\n\
    override func viewDidLoad() {\nsuper.viewDidLoad()\n// Do any additional setup\
    \ after loading the view, typically from a nib.\nsceneView.delegate = self\nsceneView.showsStatistics\
    \ = true\nsceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin]\n}\noverride\
    \ func viewWillAppear(_ animated: Bool) {\nsuper.viewWillAppear(animated)\nsceneView.session.run(configuration)\n\
    }\n@IBAction func addButton(_ sender: UIButton) {\nshowShape()\n}\n@IBAction func\
    \ resetButton(_ sender: UIButton) {\nsceneView.session.pause()\nsceneView.scene.rootNode.enumerateChildNodes\
    \ { (node, _) in\nif node.name == \"sphere\" {\nnode.removeFromParentNode()\n\
    }\n}\nsceneView.session.run(configuration, options: [.resetTracking])\n}\nfunc\
    \ showShape() {\nlet node = SCNNode()\nnode.geometry = SCNSphere(radius: 0.05)\n\
    node.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\nnode.position\
    \ = SCNVector3(Xslider.value,Yslider.value,Zslider.value)\nnode.name = \"sphere\"\
    \nsceneView.scene.rootNode.addChildNode(node)\n}\n}\n```\n通过 USB 数据线将 iOS 设备连接到\
    \ Macintosh，然后点击“运行”按钮或选择 **产品** ➤ **运行**。片刻之后，后退一步，你应该能看到世界原点出现。向左或向右移动滑块，然后点击\
    \ **添加** 按钮。你的应用程序应该在三个滑块定义的 x、y 和 z 坐标处显示一个黄色球体，如图 3-12 所示。\n![图 3-12](img/469983_1_En_3_Fig12_HTML.jpg)\n\
    你可以重复更改滑块值并点击 **添加** 按钮的过程，以不断添加更多黄色球体。将你的 iOS 设备移动到一个新位置，然后点击 **重置** 按钮。你的应用程序将移除所有黄色球体，并在\
    \ iOS 设备的当前位置显示世界原点。\n\n## 总结\n在本章中，你学习了如何为了调试目的显示世界原点，以帮助你验证应用程序是否正确地将对象放置在增强现实视图中。一旦你的应用程序完成，你需要移除那些导致每次显示增强现实视图时世界原点出现的代码。\n\
    \n世界原点通过定义 x、y 和 z 坐标来帮助你定位对象。要在增强现实视图中显示项目，你需要创建一个节点并为该节点定义一个形状，例如球体、盒子或环面。接下来，你需要定义对象的外观，例如黄色或红色，以及其大小。\n\
    \n为了让增强现实更加灵活，你可以基于用户持有 iOS 设备的新位置来重置世界原点。这种重置世界原点的能力使你的应用程序可以在用户决定移动并指向 iOS 设备的任何位置显示虚拟对象。\n\
    \n在下一章中，我们将更详细地讨论创建几何形状以及为形状应用除纯色之外的不同纹理。\n"
- fmt: '# 4. Working with Shapes


    In the previous chapter, we used a debugging option that allowed our augmented
    reality app to display the world origin, which showed the x-, y-, and z-axes based
    on the iOS device’s current location. Based on this world origin, we can place
    virtual objects in the augmented reality view by defining its x, y, and z coordinates.


    ARKit offers another debugging option, called feature points. Like the world origin,
    you’ll only use feature points to debug your app. When it’s time to ship your
    app, you’ll remove both the world origin and feature points from appearing.


    To make feature points appear, modify the `debugOptions` line like this:


    ```

    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]

    ```


    This line tells Xcode to display both the world origin (`.showWorldOrigin`) and
    feature points (`.showFeaturePoints`).


    In our previous app, we could create yellow spheres along with the world origin,
    and then reset tracking to make the world origin appear in the new current location
    of the iOS device. Generally when you reset tracking and delete any existing virtual
    objects (such as our yellow spheres), you’ll also want to remove anchors.


    Anchors define the position of virtual objects in an augmented reality view. Our
    previous app just removed the virtual objects from view, but once we delete the
    yellow sphere, we also don’t need to know the sphere’s previous position or anchor
    anymore, so we should delete that as well.


    To make anchors of virtual objects disappear, we just need to modify the `session.run`
    line when we reset world tracking like this:


    ```

    sceneView.session.run(configuration, options: [.resetTracking, .removeExistingAnchors])

    ```


    This code resets the world origin (`.resetTracking`) and removes any invisible
    anchors defining the position of virtual objects (`.removeExistingAnchors`).


    To see how to make feature points appear (and delete invisible anchor points of
    the yellow spheres), modify the previous app’s code so the entire `ViewController.swift`
    file looks like this:


    ```

    import UIKit

    import SceneKit

    import ARKit

    class ViewController: UIViewController, ARSCNViewDelegate {

    @IBOutlet var sceneView: ARSCNView!

    @IBOutlet var Xslider: UISlider!

    @IBOutlet var Yslider: UISlider!

    @IBOutlet var Zslider: UISlider!

    let configuration = ARWorldTrackingConfiguration()

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    sceneView.delegate = self

    sceneView.showsStatistics = true

    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]

    }

    override func viewWillAppear(_ animated: Bool) {

    super.viewWillAppear(animated)

    sceneView.session.run(configuration)

    }

    @IBAction func addButton(_ sender: UIButton) {

    showShape()

    }

    @IBAction func resetButton(_ sender: UIButton) {

    sceneView.session.pause()

    sceneView.scene.rootNode.enumerateChildNodes { (node, _) in

    if node.name == "sphere" {

    node.removeFromParentNode()

    }

    }

    sceneView.session.run(configuration, options: [.resetTracking, .removeExistingAnchors])

    }

    func showShape() {

    let node = SCNNode()

    node.geometry = SCNSphere(radius: 0.05)

    node.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow

    node.position = SCNVector3(Xslider.value,Yslider.value,Zslider.value)

    node.name = "sphere"

    sceneView.scene.rootNode.addChildNode(node)

    }

    }

    ```


    Click the Run button or choose Product ➤ Run with an iOS device connected to your
    Macintosh through its USB cable. When the app runs, you’ll see feature points
    displayed as yellow dots that show you when ARKit detects surfaces of objects
    in the real world. The more dots that appear, the better ARKit detects that surface.


    If you point an augmented reality app at a clearly visible surface, such as a
    table top, along with contrasting neighboring objects like a vertical wall and
    horizontal floor, you’ll see more feature point dots appear, as shown in Figure
    4-1. If you point the camera at the same area but from a different angle, you
    can see how ARKit displays fewer feature points, meaning it doesn’t recognize
    the nearby area as well.


    ![../images/469983_1_En_4_Chapter/469983_1_En_4_Fig1_HTML.jpg](images/469983_1_En_4_Chapter/469983_1_En_4_Fig1_HTML.jpg)


    Figure 4-1 Feature points show how ARKit recognizes surfaces in the real world


    Click the Stop button or choose Product ➤ Stop to stop your app from running.'
