  trans: "\n# 9. 为增强现实添加触控手势\n\n到目前为止，我们已经创建了在屏幕上显示虚拟对象的增强现实应用。真正让增强现实更具临场感的是，你能够与虚拟对象进行交互。\n\
    \n当然，你无法用手直接触摸或操控任何虚拟对象，但你可以通过 iOS 屏幕上的增强现实视图来触摸和操控虚拟对象。这意味着你可以用指尖在屏幕上点击、拖动和操作物品。与增强现实的交互能创造出更强的真实感。\n\
    \n可用的手势类型包括以下几种：\n*   **轻点**——在屏幕上短暂触碰后抬起手指\n*   **长按**——用手指按压屏幕并保持一段时间\n*   **轻扫**——用手指在某个区域内向左或向右滑动\n\
    *   **平移**——用手指按压屏幕，然后在屏幕上滑动\n*   **捏合**——一种双指手势，将两个指尖并拢或分开\n*   **旋转**——一种双指手势，使两个指尖做圆周运动\n\
    \n要与增强现实中的虚拟对象交互，我们必须首先检测触控手势，例如轻点或轻扫。一旦能检测到触控手势，下一步就是判断该手势是否触碰到了虚拟对象。\n\n要在增强现实视图中检测触控手势，我们需要按照以下步骤创建一个新的\
    \ Xcode 项目：\n1.  启动 Xcode。（请确保你使用的是 Xcode 10 或更高版本。）\n2.  选择“文件”➤“新建”➤“项目”。Xcode\
    \ 会要求你选择一个模板。\n3.  点击“iOS”类别。\n4.  点击“单视图应用”图标，然后点击“下一步”按钮。Xcode 会要求输入产品名称、组织名称、组织标识符和内容技术。\n\
    5.  点击“产品名称”文本框，为你的项目输入一个描述性名称，例如 `TouchGesture`。（具体名称并不重要。）\n6.  点击“下一步”按钮。Xcode\
    \ 会询问你想要将项目存储在何处。\n7.  选择一个文件夹并点击“创建”按钮。Xcode 将创建一个 iOS 项目。\n\n现在按照以下步骤修改 `Info.plist`\
    \ 文件，以允许访问摄像头并使用 ARKit：\n1.  在导航器面板中点击 `Info.plist` 文件。Xcode 会显示键、类型和值的列表。\n2.\
    \  点击展开三角形以展开“必需设备功能”类别，显示“Item 0”。\n3.  将鼠标指针悬停在“Item 0”上，会出现一个加号 (`+`) 图标。\n\
    4.  点击此加号 (`+`) 图标，将显示一个空白的“Item 1”。\n5.  在“Item 1”行的“值”类别下输入 `arkit`。\n6.  将鼠标指针悬停在最后一行上，会出现一个加号\
    \ (`+`) 图标。\n7.  点击加号 (`+`) 图标以创建新行。会出现一个弹出菜单。\n8.  选择“Privacy – Camera Usage\
    \ Description”（隐私 - 相机使用说明）。\n9.  在“Privacy – Camera Usage Description”行的“值”类别下输入\
    \ `AR needs to use the camera`。\n\n现在按照以下步骤修改 `ViewController.swift` 文件以使用 ARKit\
    \ 和 SceneKit：\n1.  在导航器面板中点击 `ViewController.swift` 文件。\n2.  编辑 `ViewController.swift`\
    \ 文件，使其内容如下：\n\n```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController:\
    \ UIViewController, ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
    \ any additional setup after loading the view, typically from a nib.\n    }\n\
    }\n```\n\n要在我们的应用中查看增强现实，添加一个 ARKit SceneKit 视图 (`ARSCNView`)，使用户界面类似于图 9-1。\n\
    \n![../images/469983_1_En_9_Chapter/469983_1_En_9_Fig1_HTML.jpg](img/469983_1_En_9_Fig1_HTML.jpg)\n\
    图 9-1\n用户界面包含一个单独的 ARSCNView\n\n设计好用户界面后，需要添加约束。要添加约束，请选择“Editor”（编辑器）➤“Resolve\
    \ Auto Layout Issues”（解决自动布局问题）➤“Reset to Suggested Constraints”（重置为建议的约束），此选项位于菜单下半部分的“All\
    \ Views in Container”（容器中的所有视图）类别下。\n\n下一步是将用户界面项连接到 `ViewController.swift` 文件中的\
    \ Swift 代码。为此，请按照以下步骤操作：\n1.  在导航器面板中点击 `Main.storyboard` 文件。\n2.  点击“Assistant\
    \ Editor”（辅助编辑器）图标，或选择“View”（视图）➤“Assistant Editor”（辅助编辑器）➤“Show Assistant Editor”（显示辅助编辑器），以并排显示\
    \ `Main.storyboard` 和 `ViewController.swift` 文件。\n3.  将鼠标指针悬停在 ARSCNView 上，按住\
    \ Control 键，然后在 `class ViewController` 行下方进行 Ctrl-拖动。\n4.  松开 Control 键和鼠标左键。会出现一个弹出菜单。\n\
    5.  点击“Name”（名称）文本框，输入 `sceneView`，然后点击“Connect”（连接）按钮。Xcode 将创建一个 IBOutlet，如下所示：\n\
    \n```\n@IBOutlet var sceneView: ARSCNView!\n```\n\n6.  编辑 `viewDidLoad` 函数，使其内容如下：\n\
    \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional\
    \ setup after loading the view, typically from a nib.\n    sceneView.delegate\
    \ = self\n    sceneView.showsStatistics = true\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
    \ ARSCNDebugOptions.showFeaturePoints]\n}\n```\n\n7.  编辑 `viewWillAppear` 函数，使其内容如下：\n\
    \n```\noverride func viewWillAppear(_ animated: Bool) {\n    super.viewWillAppear(animated)\n\
    \    sceneView.session.run(configuration)\n}\n```\n"
- fmt: "## 识别触摸手势\n\n在应用中识别触摸手势包含三步：\n\n*   创建一个函数，用于在识别到触摸手势时进行处理\n*   定义一个`UIGestureRecognizer`类，用于指定处理触摸手势的函数\n\
    *   将触摸手势识别器添加到 ARKit 场景视图中\n\n首先，你需要创建一个函数，当你的应用识别到触摸手势时运行该函数。与其他函数不同，这个触摸手势处理函数前面需要加上`@objc`关键字。这允许该函数访问用于创建\
    \ Apple 框架的 Objective-C 代码，其中一些框架仍在使用 Objective-C。处理触摸手势的函数基本结构如下所示，其中`handleTap`是你可以任意选择的函数名：\n\
    \n```\n@objc func handleTap() {\n}\n```\n\n其次，你需要使用`UITapGestureRecognizer`类来定义将处理点击手势的函数，如下所示：\n\
    \n```\nlet tapGesture = UITapGestureRecognizer(target: self, action: #selector(handleTap))\n\
    ```\n\n如果你想检测其他类型的手势，例如旋转或平移，则需要使用不同的类，例如`UIRotationGestureRecognizer`或`UIPanGestureRecognizer`。\n\
    \n`#selector`关键字标识了将处理触摸手势的函数名。实际名称（例如`tapGesture`）是任意的。\n\n最后，第三步是将手势识别器添加到增强现实场景中，如下所示：\n\
    \n```\nsceneView.addGestureRecognizer(tapGesture)\n```\n\n这段代码将触摸手势（例如`tapGesture`）添加到场景（`sceneView`）中，但两者都是你可以替换为其他任何名称的任意名称。然后，这行代码使得场景（`sceneView`）能够识别触摸手势并通过你定义的`@objc`函数进行处理。\n\
    \n检测触摸手势可以相当简单，让我们通过以下步骤来看看它是如何工作的：\n\n1.  在导航窗格中点击`Main.storyboard`文件，用户界面会出现。\n\
    2.  点击助手编辑器图标或选择 视图 ➤ 助手编辑器 ➤ 显示助手编辑器，以并排显示`Main.storyboard`和`ViewController.swift`文件。\n\
    3.  将鼠标指针移动到 ARSCNView 上，按住 Control 键，并按住 Control 键将鼠标拖动到`ViewController.swift`文件中的`class\
    \ ViewController`行下方。\n4.  释放 Control 键和鼠标左键。会弹出一个窗口。\n5.  点击名称文本字段，输入`sceneView`。\n\
    6.  点击连接按钮。Xcode 会创建一个如下所示的 IBOutlet：\n\n    ```\n    @IBOutlet var sceneView:\
    \ ARSCNView!\n    ```\n\n7.  编辑`viewDidLoad`函数，使其看起来像这样：\n\n    ```\n    override\
    \ func viewDidLoad() {\n        super.viewDidLoad()\n        // 加载视图后（通常是从 nib\
    \ 文件加载）进行任何其他设置。\n        sceneView.delegate = self\n        sceneView.showsStatistics\
    \ = true\n        sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
    \ ARSCNDebugOptions.showFeaturePoints]\n        let tapGesture = UITapGestureRecognizer(target:\
    \ self, action: #selector(handleTap))\n        sceneView.addGestureRecognizer(tapGesture)\n\
    \    }\n    ```\n\n8.  在这个`viewDidLoad`函数下方，添加以下两个函数：\n\n    ```\n    override\
    \ func viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
    \        sceneView.session.run(configuration)\n    }\n    @objc func handleTap()\
    \ {\n        print (\"tap detected\")\n    }\n    ```\n\n9.  通过 USB 线将 iOS 设备连接到\
    \ Mac。\n10.  点击运行按钮或选择 产品 ➤ 运行。\n11.  当相机视图出现时，点击屏幕任意位置。请注意，每次点击屏幕时，Xcode 会在其窗口底部窗格打印\
    \ \"tap detected\"。\n12.  点击停止按钮或选择 产品 ➤ 停止。\n\n一旦应用能够识别增强现实视图上任意位置的点击，下一步就是检测这些点击手势何时发生在虚拟对象（如球体或盒子）上。\n\
    \n## 识别虚拟对象上的触摸手势\n\n一旦你能识别增强现实视图上的触摸手势，下一步就是识别这些触摸手势何时发生在虚拟对象上。为此，我们需要修改处理触摸手势的函数。目前它看起来像这样：\n\
    \n```\n@objc func handleTap() {\n}\n```\n\n我们需要稍微修改它，使函数接收关于用户实际在屏幕上点击了什么的信息：\n\
    \n```\n@objc func handleTap(sender: UITapGestureRecognizer) {\n}\n```\n\n来自`UITapGestureRecognizer`的这则信息可以告诉我们用户是否点击了虚拟对象。首先，我们需要获取屏幕被点击区域或视图，如下所示：\n\
    \n```\nlet areaTapped = sender.view as! SCNView\n```\n\n一旦知道了被点击的区域，我们就需要获取该区域的实际坐标，如下所示：\n\
    \n```\nlet tappedCoordinates = sender.location(in: areaTapped)\n```\n\n现在我们需要使用一个名为`hitTest`的函数来确定在点击区域内是否存在任何虚拟对象。这个`hitTest`函数负责识别特定坐标集内的虚拟对象：\n\
    \n```\nlet hitTest = areaTapped.hitTest(tappedCoordinates)\n```\n\n我们需要一个`if-else`语句，根据`hitTest`是否识别出虚拟对象来做出响应：\n\
    \n```\nif hitTest.isEmpty {\n} else {\n}\n```\n\n如果`hitTest`函数未能识别出虚拟对象，`isEmpty`应为\
    \ true，所以我们在里面放一个简单的`print`语句来验证这一点：\n\n```\nif hitTest.isEmpty {\n    print (\"\
    Nothing\")\n} else {\n}\n```\n\n如果`hitTest`函数识别出一个虚拟对象，它会将此信息存储在一个数组中，因此我们需要从这个数组中检索第一项：\n\
    \n```\nlet results = hitTest.first!\n```\n\n现在我们将检索`hitTest`函数识别的虚拟对象的名称并打印它：\n\
    \n```\nlet name = results.node.name\nprint(name ?? \"background\")\n```\n\n第二行的`print`语句要么打印找到的虚拟对象的名称，要么如果虚拟对象没有分配名称，则默认打印\
    \ \"background\"。这是因为`hitTest`函数并不总是准确的，所以如果你点击远离虚拟对象（如金字塔或盒子）的地方，它可能会将背景图像检测为虚拟对象。\n\
    \n完整的`handleTap`函数应如下所示：\n\n```\n@objc func handleTap(sender: UITapGestureRecognizer)\
    \ {\n    let areaTapped = sender.view as! SCNView\n    let tappedCoordinates =\
    \ sender.location(in: areaTapped)\n    let hitTest = areaTapped.hitTest(tappedCoordinates)\n\
    \    if hitTest.isEmpty {\n        print (\"Nothing\")\n    } else {\n       \
    \ let results = hitTest.first!\n        let name = results.node.name\n       \
    \ print(name ?? \"background\")\n    }\n}\n```\n\n为了了解`hitTest`函数的工作原理，我们需要创建一个或多个虚拟对象，为每个虚拟对象指定一个名称，并将其放置在增强现实视图中。这意味着需要创建一个`addShapes`函数，如下所示：\n\
    \n```\nfunc addShapes() {\n    let node = SCNNode(geometry: SCNBox(width: 0.05,\
    \ height: 0.05, length: 0.05, chamferRadius: 0))\n    node.position = SCNVector3(0.1,0,-0.1)\n\
    \    node.geometry?.firstMaterial?.diffuse.contents = UIColor.blue\n    node.name\
    \ = \"box\"\n    sceneView.scene.rootNode.addChildNode(node)\n\n    let node2\
    \ = SCNNode(geometry: SCNPyramid(width: 0.05, height: 0.06, length: 0.05))\n \
    \   node2.position = SCNVector3(0.1,0.1,-0.1)\n    node2.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.red\n    node2.name = \"pyramid\"\n    sceneView.scene.rootNode.addChildNode(node2)\n\
    }\n```\n\n修改整个`ViewController.swift`文件，使其看起来像这样："
  raw: "## Recognizing Touch Gestures\n\nThere’s a three-step process to recognizing\
    \ touch gestures in an app:\n\n*   Create a function to handle the touch gesture\
    \ when it’s recognized\n\n*   Define a `UIGestureRecognizer` class that identifies\
    \ the function to handle touch gestures\n\n*   Add the Touch Gesture Recognizer\
    \ to the ARKit Scene View\n\nFirst, you need to create a function that will run\
    \ when your app recognizes a touch gesture. Unlike other functions, this touch\
    \ gesture function needs the `@objc` keyword in front of it. This allows the function\
    \ to access Objective-C code used to create Apple’s frameworks, some of which\
    \ still use Objective-C. The basic structure of a function to handle touch gestures\
    \ looks like this, where `handleTap` is any arbitrary function name you choose:\n\
    \n```\n@objc func handleTap() {\n}\n```\n\nSecond, you need to use the `UITapGestureRecognizer`\
    \ class to define the function that will handle the tap gesture like this:\n\n\
    ```\nlet tapGesture = UITapGestureRecognizer(target: self, action: #selector(handleTap))\n\
    ```\n\nIf you want to detect other types of gestures such as rotation or pan,\
    \ then you would need to use a different class such as `UIRotationGestureRecognizer`\
    \ or `UIPanGestureRecognizer`.\n\nThe `#selector` keyword identifies the function\
    \ name that will handle the touch gesture. The actual name, such as `tapGesture`,\
    \ is arbitrary.\n\nFinally, the third step is to add the gesture recognizer to\
    \ the augmented reality scene like this:\n\n```\nsceneView.addGestureRecognizer(tapGesture)\n\
    ```\n\nThis code adds the touch gesture (such as `tapGesture`) to the scene (`sceneView`),\
    \ but both are arbitrary names that you can replace with anything else. This line\
    \ then makes the scene (`sceneView`) able to recognize touch gestures and handle\
    \ them through the `@obj` function you defined.\n\nDetecting touch gestures can\
    \ be fairly simple, so let’s see how that works by following these steps:\n\n\
    1.  Click the `Main.storyboard` file in the Navigator pane. The user interface\
    \ appears.\n\n2.  Click the Assistant Editor icon or choose View ➤ Assistant Editor\
    \ ➤ Show Assistant Editor to show the `Main.storyboard` and `ViewController.swift`\
    \ file side by side.\n\n3.  Move the mouse pointer over the ARSCNView, hold down\
    \ the Control key, and Ctrl-drag under the `class ViewController` line in the\
    \ `ViewController.swift` file.\n\n4.  Release the Control key and the left mouse\
    \ button. A window pops up.\n\n5.  Click in the Name text field and type `sceneView`.\n\
    \n6.  Click the Connect button. Xcode creates an IBOutlet as follows:\n\n    ```\n\
    \    @IBOutlet var sceneView: ARSCNView!\n    ```\n\n7.  Edit the `viewDidLoad`\
    \ function so it looks like this:\n\n    ```\n    override func viewDidLoad()\
    \ {\n    super.viewDidLoad()\n    // Do any additional setup after loading the\
    \ view, typically from a nib.\n    sceneView.delegate = self\n    sceneView.showsStatistics\
    \ = true\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    let tapGesture = UITapGestureRecognizer(target: self, action: #selector(handleTap))\n\
    \    sceneView.addGestureRecognizer(tapGesture)\n    }\n    ```\n\n8.  Underneath\
    \ this `viewDidLoad` function , add the following two functions:\n\n    ```\n\
    \    override func viewWillAppear(_ animated: Bool) {\n    super.viewWillAppear(animated)\n\
    \    sceneView.session.run(configuration)\n    }\n    @objc func handleTap() {\n\
    \    print (\"tap detected\")\n    }\n    ```\n\n9.  Connect an iOS device to\
    \ your Macintosh through its USB cable.\n\n10.  Click the Run button or choose\
    \ Product ➤ Run.\n\n11.  Tap anywhere on the screen when the camera view appears.\
    \ Notice that each time you tap the screen, Xcode prints “tap detected” in the\
    \ bottom pane of the Xcode window.\n\n12.  Click the Stop button or choose Product\
    \ ➤ Stop.\n\nOnce we have the app to recognize taps anywhere on augmented reality\
    \ view, the next step is to detect when those tap gestures occur over a virtual\
    \ object such as a sphere or a box.\n\n## Identifying Touch Gestures on Virtual\
    \ Objects\n\nOnce you can identify touch gestures on an augmented reality view,\
    \ the next step is to identify when those touch gestures occur on a virtual object.\
    \ To do this, we need to modify our function that handles touch gestures. Currently,\
    \ it looks like this:\n\n```\n@objc func handleTap() {\n}\n```\n\nWe need to modify\
    \ this slightly so the function receives information about what the user actually\
    \ tapped on the screen:\n\n```\n@objc func handleTap(sender: UITapGestureRecognizer)\
    \ {\n}\n```\n\nThis information from the `UITapGestureRecognizer` can tell us\
    \ whether the user tapped on a virtual object or not. First, we need to get the\
    \ area or view of the tapped portion of the screen like this:\n\n```\nlet areaTapped\
    \ = sender.view as! SCNView\n```\n\nOnce we know the area tapped, we need to get\
    \ the actual coordinates of that area like this:\n\n```\nlet tappedCoordinates\
    \ = sender.location(in: areaTapped)\n```\n\nNow we need to determine if there\
    \ is any virtual objects in the tapped area using a function called `hitTest`.\
    \ This `hitTest` function does the hard work of identifying virtual objects within\
    \ a specific set of coordinates:\n\n```\nlet hitTest = areaTapped.hitTest(tappedCoordinates)\n\
    ```\n\nWe need an `if-else` statement to respond depending if the `hitTest` identified\
    \ a virtual object or not:\n\n```\nif hitTest.isEmpty {\n} else {\n}\n```\n\n\
    If the `hitTest` function fails to identify a virtual object, `isEmpty` should\
    \ be true, so let’s put a simple `print` statement inside to verify this:\n\n\
    ```\nif hitTest.isEmpty {\nprint (\"Nothing\")\n} else {\n}\n```\n\nIf the `hitTest`\
    \ function identifies a virtual object, it stores this information in an array,\
    \ so we need to retrieve the first item from this array:\n\n```\nlet results =\
    \ hitTest.first!\n```\n\nNow we’ll retrieve the name of the virtual object identified\
    \ by the `hitTest` function and print it:\n\n```\nlet name = results.node.name\n\
    print(name ?? \"background\")\n```\n\nThe `print` statement on the second line\
    \ either prints the name of the virtual object found or if a name hasn’t been\
    \ assigned to the virtual object, it defaults to printing “background” instead.\
    \ That’s because the `hitTest` function isn’t always accurate so if you tap away\
    \ from a virtual object like the pyramid or box, it might detect a background\
    \ image as a virtual object.\n\nThe entire `handleTap` function should look like\
    \ this:\n\n```\n@objc func handleTap(sender: UITapGestureRecognizer) {\nlet areaTapped\
    \ = sender.view as! SCNView\nlet tappedCoordinates = sender.location(in: areaTapped)\n\
    let hitTest = areaTapped.hitTest(tappedCoordinates)\nif hitTest.isEmpty {\nprint\
    \ (\"Nothing\")\n} else {\nlet results = hitTest.first!\nlet name = results.node.name\n\
    print(name ?? \"background\")\n}\n}\n```\n\nTo see how the `hitTest` function\
    \ works, we need to create one or more virtual objects, give each virtual object\
    \ a name, and place it in the augmented reality view. This means creating an `addShapes`\
    \ function like this:\n\n```\nfunc addShapes() {\nlet node = SCNNode(geometry:\
    \ SCNBox(width: 0.05, height: 0.05, length: 0.05, chamferRadius: 0))\nnode.position\
    \ = SCNVector3(0.1,0,-0.1)\nnode.geometry?.firstMaterial?.diffuse.contents = UIColor.blue\n\
    node.name = \"box\"\nsceneView.scene.rootNode.addChildNode(node)\nlet node2 =\
    \ SCNNode(geometry: SCNPyramid(width: 0.05, height: 0.06, length: 0.05))\nnode2.position\
    \ = SCNVector3(0.1,0.1,-0.1)\nnode2.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.red\nnode2.name = \"pyramid\"\nsceneView.scene.rootNode.addChildNode(node2)\n\
    }\n```\n\nModify the entire `ViewController.swift` file so it looks like this:"
