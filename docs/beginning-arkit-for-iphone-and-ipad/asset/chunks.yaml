    \ = SCNSphere(radius: 0.01)\n    drawNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.green\n    drawNode.position = currentPosition\n    self.sceneView.scene.rootNode.addChildNode(drawNode)\n\
    }\n```\n\n这段代码在屏幕上连续绘制绿色球体，创造出线条的错觉。当然，只有当`UISwitch`设置为 **打开** 时，应用才会绘制这条绿线。\n\
    \n### 显示指针\n\n如果用户将`UISwitch`设置为 **关闭**，则`if-else`语句的`else`部分必须运行，显示指针。\n\n让我们将指针创建为一个红色球体，如下所示：\n\
    \n```swift\nlet point = SCNNode()\npoint.geometry = SCNSphere(radius: 0.005)\n\
    point.position = currentPosition\npoint.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.red\n```\n\n现在我们需要将其添加到根节点：\n\n```swift\nself.sceneView.scene.rootNode.addChildNode(point)\n\
    ```\n\n与绘制绿线类似，如果仅这样做，这段代码将显示一个红色球体并绘制一条线，这不是我们想要的。问题是当用户移动相机时，应用会不断绘制红色球体，从而形成一条线的错觉。\n\
    \n我们需要的是绘制一个红色球体，然后删除前一个红色球体，这样就不会在屏幕上创建一条线。为此，需要以下代码：\n\n```swift\nself.sceneView.scene.rootNode.enumerateChildNodes({\
    \ (node, _) in\n    if node.name == \"aiming point\" {\n        node.removeFromParentNode()\n\
    \    }\n})\n```\n\n`enumerateChildNodes`创建一个循环，检查连接到根节点的每个节点。然后在这个循环内部，我们使用`removeFromParentNode`命令来移除节点。这将删除连接到根节点的所有节点，包括我们的绿线，因此我们需要一个`if`语句来检查节点是否名为\
    \ `“aiming point”`。如果是，则只删除该节点。\n\n这意味着我们需要将指针节点命名为 `“aiming point”`：\n\n```swift\n\
    point.name = \"aiming point\"\n```\n\n### 完整的 DispatchQueue 代码\n\n完整的`DispatchQueue`代码应如下所示：\n\
    \n```swift\nDispatchQueue.main.async {\n    if self.switchDraw.isOn {\n      \
    \  let drawNode = SCNNode()\n        drawNode.geometry = SCNSphere(radius: 0.01)\n\
    \        drawNode.geometry?.firstMaterial?.diffuse.contents = UIColor.green\n\
    \        drawNode.position = currentPosition\n        self.sceneView.scene.rootNode.addChildNode(drawNode)\n\
    \    } else {\n        let point = SCNNode()\n        point.name = \"aiming point\"\
    \n        point.geometry = SCNSphere(radius: 0.005)\n        point.position =\
    \ currentPosition\n        point.geometry?.firstMaterial?.diffuse.contents = UIColor.red\n\
    \        self.sceneView.scene.rootNode.enumerateChildNodes({ (node, _) in\n  \
    \          if node.name == \"aiming point\" {\n                node.removeFromParentNode()\n\
    \            }\n        })\n        self.sceneView.scene.rootNode.addChildNode(point)\n\
    \    }\n}\n```\n\n## 完整的 ViewController.swift 文件\n\n现在整个`ViewController.swift`文件应如下所示：\n\
    \n```swift\nimport UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController:\
    \ UIViewController, ARSCNViewDelegate {\n\n    @IBOutlet var sceneView: ARSCNView!\n\
    \    @IBOutlet var switchDraw: UISwitch!\n    let configuration = ARWorldTrackingConfiguration()\n\
    \n    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
    \ any additional setup after loading the view, typically from a nib.\n       \
    \ sceneView.delegate = self\n        sceneView.showsStatistics = true\n      \
    \  sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    }\n\n    override func viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
    \        sceneView.session.run(configuration)\n    }\n\n    func renderer(_ renderer:\
    \ SCNSceneRenderer, willRenderScene scene: SCNScene, atTime time: TimeInterval)\
    \ {\n        guard let pov = sceneView.pointOfView else {return}\n        let\
    \ transform = pov.transform\n        let rotation = SCNVector3(-transform.m31,\
    \ -transform.m32, -transform.m33)\n        let location = SCNVector3(transform.m41,\
    \ transform.m42, transform.m43)\n        let currentPosition = SCNVector3(rotation.x\
    \ + location.x, rotation.y + location.y, rotation.z + location.z)\n\n        DispatchQueue.main.async\
    \ {\n            if self.switchDraw.isOn {\n                let drawNode = SCNNode()\n\
    \                drawNode.geometry = SCNSphere(radius: 0.01)\n               \
    \ drawNode.geometry?.firstMaterial?.diffuse.contents = UIColor.green\n       \
    \         drawNode.position = currentPosition\n                self.sceneView.scene.rootNode.addChildNode(drawNode)\n\
    \            } else {\n                let point = SCNNode()\n               \
    \ point.name = \"aiming point\"\n                point.geometry = SCNSphere(radius:\
    \ 0.005)\n                point.position = currentPosition\n                point.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.red\n                self.sceneView.scene.rootNode.enumerateChildNodes({\
    \ (node, _) in\n                    if node.name == \"aiming point\" {\n     \
    \                   node.removeFromParentNode()\n                    }\n     \
    \           })\n                self.sceneView.scene.rootNode.addChildNode(point)\n\
    \            }\n        }\n    }\n}\n```\n\n## 运行应用\n\n修改你的`ViewController.swift`文件中的代码以匹配上述代码。然后，要查看应用运行，请执行以下操作：\n\
    \n![../images/469983_1_En_8_Chapter/469983_1_En_8_Fig4_HTML.jpg](img/469983_1_En_8_Fig4_HTML.jpg)\n\
    \n**图 8-4：在增强现实中绘制线条**\n\n1.  通过 USB 线将 iOS 设备连接到 Mac。\n2.  点击 **运行** 按钮或选择 **产品**\
    \ ➤ **运行**。\n"
- fmt: "# 3. 应用程序运行步骤\n\n当应用运行时，移动iOS设备以查看屏幕中央的红色指针。\n\n点击`UISwitch`将其打开。\n\n移动iOS设备，注意到现在会绘制一条绿线。\n\
    \n点击`UISwitch`将其关闭。\n\n将iOS设备移动到一个新的位置。\n\n点击`UISwitch`将其打开。\n\n移动iOS设备以绘制另一条独立的绿线（见图[8-4](#469983_1_En_8_Chapter.xhtml#Fig4)）。\n\
    \n点击停止按钮或选择Product ➤ Stop。\n\n# 功能完善\n\n为了完善这个应用，我们还需要一个功能。您可能注意到，您可以打开`UISwitch`来绘制绿线，然后再次关闭`UISwitch`将相机移动到新位置。现在，如果您再次打开`UISwitch`，可以在增强现实视图的其他地方绘制绿线。\n\
    \n然而，如果我们不断添加绿线，最终屏幕会充满绿线。因此，让我们添加一个简单的功能来清除整个屏幕，步骤如下：\n\n1.  选择Editor ➤ Resolve\
    \ AutoLayout Issues ➤ Reset to Suggested Constraints。\n2.  点击“显示助理编辑器”图标或选择View\
    \ ➤ Assistant Editor ➤ Show Assistant Editor。Xcode并排显示您的`Main.storyboard`文件和`ViewController.swift`文件。\n\
    3.  将鼠标指针悬停在`UIButton`上，按住Control键，然后Ctrl-拖拽到IBOutlet下方。出现一个弹出窗口。\n4.  在Name文本字段中键入`clearButton`。\n\
    5.  点击Connect按钮。Xcode创建一个IBOutlet，如下所示：\n\n![](images/469983_1_En_8_Chapter/469983_1_En_8_Fig5_HTML.jpg)\n\
    \n图8-5：更改UIButton的背景颜色\n\n1.  在Navigator窗格中点击`Main.storyboard`文件。\n2.  向用户界面添加一个`UIButton`。\n\
    3.  将`UIButton`的标题更改为“Clear”。您可能还想调整按钮大小使其更宽。\n4.  点击“显示属性检查器”图标或选择View ➤ Inspectors\
    \ ➤ Show Attributes Inspector。\n5.  将`UIButton`的背景颜色更改为白色（见图[8-5](#469983_1_En_8_Chapter.xhtml#Fig5)）。\n\
    6.  点击“显示标准编辑器”图标或选择View ➤ Standard Editor ➤ Show Standard Editor。\n7.  点击`ViewController.swift`文件。\n\
    8.  将以下代码添加到`DispatchQueue`代码的底部：\n\n```\nif self.clearButton.isHighlighted {\n\
    \    self.sceneView.scene.rootNode.enumerateChildNodes({ (node, _) in\n      \
    \  node.removeFromParentNode()\n    })\n}\n```\n\n```\n@IBOutlet var clearButton:\
    \ UIButton!\n```\n\n完整的`ViewController.swift`文件应如下所示：\n\n```\nimport UIKit\nimport\
    \ SceneKit\nimport ARKit\nclass ViewController: UIViewController, ARSCNViewDelegate\
    \ {\n    @IBOutlet var sceneView: ARSCNView!\n    @IBOutlet var switchDraw: UISwitch!\n\
    \    @IBOutlet var clearButton: UIButton!\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
    \ any additional setup after loading the view, typically from a nib.\n       \
    \ sceneView.delegate = self\n        sceneView.showsStatistics = true\n      \
    \  sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    }\n    override func viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
    \        sceneView.session.run(configuration)\n    }\n    func renderer(_ renderer:\
    \ SCNSceneRenderer, willRenderScene scene: SCNScene, atTime time: TimeInterval)\
    \ {\n        guard let pov = sceneView.pointOfView else {return}\n        let\
    \ transform = pov.transform\n        let rotation = SCNVector3(-transform.m31,\
    \ -transform.m32, -transform.m33)\n        let location = SCNVector3(transform.m41,\
    \ transform.m42, transform.m43)\n        let currentPosition = SCNVector3(rotation.x\
    \ + location.x, rotation.y + location.y, rotation.z + location.z)\n        DispatchQueue.main.async\
    \ {\n            if self.switchDraw.isOn {\n                let drawNode = SCNNode()\n\
    \                drawNode.geometry = SCNSphere(radius: 0.01)\n               \
    \ drawNode.geometry?.firstMaterial?.diffuse.contents = UIColor.green\n       \
    \         drawNode.position = currentPosition\n                self.sceneView.scene.rootNode.addChildNode(drawNode)\n\
    \            } else {\n                let point = SCNNode()\n               \
    \ point.name = \"aiming point\"\n                point.geometry = SCNSphere(radius:\
    \ 0.005)\n                point.position = currentPosition\n                point.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.red\n                self.sceneView.scene.rootNode.enumerateChildNodes({\
    \ (node, _) in\n                    if node.name == \"aiming point\" {\n     \
    \                   node.removeFromParentNode()\n                    }\n     \
    \           })\n                self.sceneView.scene.rootNode.addChildNode(point)\n\
    \            }\n            if self.clearButton.isHighlighted {\n            \
    \    self.sceneView.scene.rootNode.enumerateChildNodes({ (node, _) in\n      \
    \              node.removeFromParentNode()\n                })\n            }\n\
    \        }\n    }\n}\n```\n\n# 运行应用程序\n\n要查看应用程序的运行，请执行以下操作：\n\n1.  通过USB线缆将iOS设备连接到Macintosh。\n\
    2.  点击运行按钮或选择Product ➤ Run。\n3.  当应用运行时，移动iOS设备以查看屏幕中央的红色指针。\n4.  点击`UISwitch`将其打开。\n\
    5.  移动iOS设备，注意到现在会绘制一条绿线。\n6.  点击`UISwitch`将其关闭。\n7.  将iOS设备移动到一个新的位置。\n8.  点击`UISwitch`将其打开。\n\
    9.  移动iOS设备以绘制另一条独立的绿线。\n10. 点击Clear按钮。注意，应用现在会清除您绘制的所有绿线。\n11. 点击停止按钮或选择Product\
    \ ➤ Stop。\n\n# 总结\n\n增强现实应用依赖于iOS设备中的摄像头。此摄像头通常以每秒60帧（fps）的速度刷新图像。您可以通过添加这行代码来查看应用每秒显示的帧数：\n\
    \n```\nsceneView.showsStatistics = true)\n```\n\n每次应用更新显示图像时，`renderer`函数都会运行，即每秒60次。通过在`renderer`函数内绘制对象，您的应用可以持续绘制图像。在我们的示例应用中，我们绘制了一个球体，但由于`renderer`函数持续绘制球体，它绘制了多个球体。当用户移动摄像头时，这会绘制多个绿色球体，从而产生绘制线条的错觉。\n\
    \n要清除虚拟对象，我们可以使用`enumerateChildNodes`循环来检查每个节点：\n\n```\nself.sceneView.scene.rootNode.enumerateChildNodes({\
    \ (node, _) in\n})\n```\n\n为了避免移除所有节点，我们可以为节点命名，然后使用`if`语句仅移除某些指定名称的节点。在增强现实视图中进行绘制需要获取相机的当前旋转和位置，以便应用可以在用户指向摄像头的任何地方绘制虚拟对象。"
  raw: "3.  When the app runs, move the iOS device around to see the red pointer in\
    \ the middle of the screen.\n\n4.  Tap the UISwitch to turn it On.\n\n5.  Move\
    \ the iOS device around and notice that it now draws a green line.\n\n6.  Tap\
    \ the UISwitch to turn it Off.\n\n7.  Move the iOS device to a new location.\n\
    \n8.  Tap the UISwitch to turn it On.\n\n9.  Move the iOS device to draw a separate\
    \ green line (see Figure [8-4](#469983_1_En_8_Chapter.xhtml#Fig4)).\n\n10.  Click\
    \ the Stop button or choose Product ➤ Stop.\n\nTo polish this app, we need one\
    \ more feature. You may notice that you can turn the UISwitch on to draw a green\
    \ line, then turn the UISwitch off again to move the camera to a new location.\
    \ Now if you turn the UISwitch back on again, you can draw a green line somewhere\
    \ else in the augmented reality view.\n\nHowever, if we keep adding green lines,\
    \ eventually the screen gets filled with green lines. So let’s add a simple feature\
    \ to let us clear the entire screen by following these steps:\n\n1.  Choose Editor\
    \ ➤ Resolve AutoLayout Issues ➤ Reset to Suggested Constraints.\n\n2.  Click the\
    \ Show Assistant Editor icon or choose View ➤ Assistant Editor ➤ Show Assistant\
    \ Editor. Xcode displays your `Main.storyboard` file and `ViewController.swift`\
    \ file side by side.\n\n3.  Move the mouse pointer over the UIButton, hold down\
    \ the Control key, and Ctrl-drag underneath the IBOutlet. A popup window appears.\n\
    \n4.  Click in the Name text field and type `clearButton`.\n\n5.  Click the Connect\
    \ button. Xcode creates an IBOutlet as follows:\n\n![../images/469983_1_En_8_Chapter/469983_1_En_8_Fig5_HTML.jpg](images/469983_1_En_8_Chapter/469983_1_En_8_Fig5_HTML.jpg)\n\
    \nFigure 8-5\n\nChanging the background color of a UIButton\n\n1.  Click the `Main.storyboard`\
    \ file in the Navigator pane.\n\n2.  Add a UIButton to the user interface.\n\n\
    3.  Change the title of the UIButton to Clear. You may also want to resize the\
    \ button to make it wider.\n\n4.  Click the Show the Attributes Inspector icon\
    \ or choose View ➤ Inspectors ➤ Show Attributes Inspector.\n\n5.  Change the background\
    \ color of the UIButton to white (see Figure [8-5](#469983_1_En_8_Chapter.xhtml#Fig5)).\n\
    \n1.  Click the Show Standard Editor icon or choose View ➤ Standard Editor ➤ Show\
    \ Standard Editor.\n\n2.  Click on the `ViewController.swift` file.\n\n3.  Add\
    \ the following code to the bottom of the `DispatchQueue` code:\n\n```\n    if\
    \ self.clearButton.isHighlighted {\n    self.sceneView.scene.rootNode.enumerateChildNodes({\
    \ (node, _) in\n    node.removeFromParentNode()\n    })\n    }\n    ```\n\n```\n\
    @IBOutlet var clearButton: UIButton!\n```\n\nThe entire `ViewController.swift`\
    \ file should look like this:\n\n```\nimport UIKit\nimport SceneKit\nimport ARKit\n\
    class ViewController: UIViewController, ARSCNViewDelegate {\n@IBOutlet var sceneView:\
    \ ARSCNView!\n@IBOutlet var switchDraw: UISwitch!\n@IBOutlet var clearButton:\
    \ UIButton!\nlet configuration = ARWorldTrackingConfiguration()\noverride func\
    \ viewDidLoad() {\nsuper.viewDidLoad()\n// Do any additional setup after loading\
    \ the view, typically from a nib.\nsceneView.delegate = self\nsceneView.showsStatistics\
    \ = true\nsceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    }\noverride func viewWillAppear(_ animated: Bool) {\nsuper.viewWillAppear(animated)\n\
    sceneView.session.run(configuration)\n}\nfunc renderer(_ renderer: SCNSceneRenderer,\
    \ willRenderScene scene: SCNScene, atTime time: TimeInterval) {\nguard let pov\
    \ = sceneView.pointOfView else {return}\nlet transform = pov.transform\nlet rotation\
    \ = SCNVector3(-transform.m31, -transform.m32, -transform.m33)\nlet location =\
    \ SCNVector3(transform.m41, transform.m42, transform.m43)\nlet currentPosition\
    \ = SCNVector3(rotation.x + location.x, rotation.y + location.y, rotation.z +\
    \ location.z)\nDispatchQueue.main.async {\nif self.switchDraw.isOn {\nlet drawNode\
    \ = SCNNode()\ndrawNode.geometry = SCNSphere(radius: 0.01)\ndrawNode.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.green\ndrawNode.position = currentPosition\nself.sceneView.scene.rootNode.addChildNode(drawNode)\n\
    } else {\nlet point = SCNNode()\npoint.name = \"aiming point\"\npoint.geometry\
    \ = SCNSphere(radius: 0.005)\npoint.position = currentPosition\npoint.geometry?.firstMaterial?.diffuse.contents\
    \ = UIColor.red\nself.sceneView.scene.rootNode.enumerateChildNodes({ (node, _)\
    \ in\nif node.name == \"aiming point\" {\nnode.removeFromParentNode()\n}\n})\n\
    self.sceneView.scene.rootNode.addChildNode(point)\n}\nif self.clearButton.isHighlighted\
    \ {\nself.sceneView.scene.rootNode.enumerateChildNodes({ (node, _) in\nnode.removeFromParentNode()\n\
    })\n}\n}\n}\n}\n```\n\nTo see the app run, do the following:\n\n1.  Connect an\
    \ iOS device to your Macintosh through its USB cable.\n\n2.  Click the Run button\
    \ or choose Product ➤ Run.\n\n3.  When the app runs, move the iOS device around\
    \ to see the red pointer in the middle of the screen.\n\n4.  Tap the UISwitch\
    \ to turn it On.\n\n5.  Move the iOS device around and notice that it now draws\
    \ a green line.\n\n6.  Tap the UISwitch to turn it Off.\n\n7.  Move the iOS device\
    \ to a new location.\n\n8.  Tap the UISwitch to turn it On.\n\n9.  Move the iOS\
    \ device to draw a separate green line.\n\n10.  Tap the Clear button. Notice that\
    \ the app now clears all the green lines you’ve drawn.\n\n11.  Click the Stop\
    \ button or choose Product ➤ Stop.\n\n## Summary\n\nAn augmented reality app relies\
    \ on the camera in an iOS device. This camera typically refreshes images at the\
    \ rate of 60 frames per second (fps). You can view the number of frames per second\
    \ that your app displays by adding this line of code:\n\n```\nsceneView.showsStatistics\
    \ = true)\n```\n\nThe `renderer` function runs each time the app updates the image\
    \ displayed, which is 60 frames per second. By drawing objects inside the `renderer`\
    \ function, your app can constantly draw an image. In our example app, we drew\
    \ a sphere but since the `renderer` function constantly drew a sphere, it drew\
    \ multiple spheres. When the user moves the camera, this draws multiple green\
    \ spheres that create the illusion of drawing a line.\n\nTo clear virtual objects,\
    \ we can use the `enumerateChildNodes` loop that examines each node:\n\n```\n\
    self.sceneView.scene.rootNode.enumerateChildNodes({ (node, _) in\n})\n```\n\n\
    To avoid removing all nodes, we can name a node and then use an `if` statement\
    \ to remove only certain named nodes. Drawing in an augmented reality view requires\
    \ getting the camera’s current rotation and location so that the app can draw\
    \ virtual objects wherever the user points the camera."
  trans: "\n# 3. 应用程序运行步骤\n\n当应用运行时，移动 iOS 设备以查看屏幕中央的红色指针。\n\n点击`UISwitch`将其打开。\n\n\
