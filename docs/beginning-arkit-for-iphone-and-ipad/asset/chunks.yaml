- fmt: "```swift\nimport UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController:\
    \ UIViewController, ARSCNViewDelegate {\n    @IBOutlet var sceneView: ARSCNView!\n\
    \    let configuration = ARWorldTrackingConfiguration()\n    let showLight = SCNNode()\n\
    \n    override func viewDidLoad() {\n        super.viewDidLoad()\n        sceneView.delegate\
    \ = self\n        sceneView.showsStatistics = true\n        sceneView.debugOptions\
    \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    }\n\n    override func viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
    \        showShape()\n        lightOn()\n        sceneView.session.run(configuration)\n\
    \    }\n\n    func showShape() {\n        let sphere = SCNSphere(radius: 0.03)\n\
    \        sphere.firstMaterial?.diffuse.contents = UIColor.white\n        let node\
    \ = SCNNode()\n        node.geometry = sphere\n        node.position = SCNVector3(0.1,\
    \ 0, 0)\n        sceneView.scene.rootNode.addChildNode(node)\n    }\n\n    func\
    \ lightOn() {\n        showLight.light = SCNLight()\n        showLight.light?.type\
    \ = .omni\n        showLight.light?.color = UIColor(white: 0.6, alpha: 1.0)\n\
    \        showLight.position = SCNVector3(0,0,0)\n        sceneView.scene.rootNode.addChildNode(showLight)\n\
    \    }\n\n    @IBAction func temperatureChange(_ sender: UISlider) {\n       \
    \ showLight.light?.temperature = CGFloat(sender.value)\n    }\n\n    @IBAction\
    \ func intensityChange(_ sender: UISlider) {\n        showLight.light?.intensity\
    \ = CGFloat(sender.value)\n    }\n\n    @IBAction func colorButton(_ sender: UIButton)\
    \ {\n        showLight.light?.color = sender.backgroundColor!\n    }\n}\n```\n\
    \n这个应用将一个光源放置在`(0, 0, 0)`世界原点，并将一个白色球体放置在`(0.1, 0, 0)`处，使其出现在 x 轴上。要运行此应用，请遵循以下步骤：\n\
    \n1.  单击停止按钮或选择 Product ➤ Stop。\n2.  通过 USB 数据线将 iOS 设备连接到 Mac。\n3.  单击运行按钮或选择\
    \ Product ➤ Run。\n4.  应用运行时，x 轴上会出现一个球体。点击屏幕底部的任意颜色按钮可更改光源颜色。\n5.  左右滑动温度和强度滑块，查看它如何改变光源的外观，如图\
    \ [5-8](#469983_1_En_5_Chapter.xhtml#Fig8) 所示。\n\n尝试再次运行此应用，但在 `lightOn` 函数中将光源类型从\
    \ `.omni` 更改为 `.directional`，像这样：\n\n```swift\nshowLight.light?.type = .directional\n\
    ```\n\n同时注释掉 `showLight.position` 命令，像这样：\n\n```swift\n//showLight.position =\
    \ SCNVector3(0,0,0)\n```\n\n定向光从正 z 轴方向照射虚拟物体，因此无需为定向光定义位置。当使用定向光而非泛光灯运行应用时，你会注意到不同的照明效果，它只照亮球体在正\
    \ z 轴方向的一半，如图 [5-9](#469983_1_En_5_Chapter.xhtml#Fig9) 所示。\n\n![图 5-9 使用定向光替代泛光灯](../images/469983_1_En_5_Chapter/469983_1_En_5_Fig9_HTML.jpg)\n\
    \n## 使用聚光灯\n\n在剧院中，人们可以在不同位置放置一个或多个聚光灯，并调整其角度以创建有趣的视觉效果。创建聚光灯时，需要定义其位置和角度。\n\n\
    默认情况下，聚光灯指向负 z 轴方向。因此，如果你将聚光灯放在世界原点 `(0, 0, 0)`，聚光灯将沿着 z 轴远离用户照射。如果虚拟物体不在 z 轴上，聚光灯将完全无法照射到它。\n\
    \n为了验证这一点，请重写 `ViewController.swift` 文件中的 Swift 代码，并将聚光灯放置在世界原点 `(0, 0, 0)`，像这样：\n\
    \n```swift\nshowLight.position = SCNVector3(0,0,0)\nshowLight.light?.type = .spot\n\
    ```\n\n如果你运行此代码，聚光灯将出现在世界原点 `(0, 0, 0)` 并沿 z 轴照射，完全错过球体，使球体完全未被照亮。\n\n要确保聚光灯照亮虚拟物体，你可以执行以下一项或多项操作：\n\
    *   改变聚光灯相对于你想照亮的任何虚拟物体的位置。\n*   改变聚光灯指向的角度。\n\n要改变聚光灯指向的角度，你需要定义聚光灯的 `eulerAngles`\
    \ 属性，该属性定义以下旋转轴：\n*   俯仰角（x 分量）是绕节点的 x 轴旋转。\n*   偏航角（y 分量）是绕节点的 y 轴旋转。\n*   滚转角（z\
    \ 分量）是绕节点的 z 轴旋转。\n\n要查看聚光灯的位置和角度如何改变它照射虚拟物体的方式，请遵循以下步骤：\n\n1.  启动 Xcode。（确保你使用的是\
    \ Xcode 10 或更高版本。）\n2.  选择 File ➤ New ➤ Project。Xcode 要求你选择一个模板。\n3.  点击 iOS 类别。\n\
    4.  点击 Single View App 图标，然后点击 Next 按钮。Xcode 要求提供产品名称、组织名称、组织标识符和内容技术。\n5.  点击\
    \ Product Name 文本框，为你的项目输入一个描述性名称，例如 `Spotlight`。（确切的名称不重要。）\n6.  点击 Next 按钮。Xcode\
    \ 询问你想将项目存储在何处。\n7.  选择一个文件夹并点击 Create 按钮。Xcode 创建 iOS 项目。\n\n现在按照以下步骤修改 `Info.plist`\
    \ 文件以允许访问摄像头并使用 ARKit：\n\n1.  在导航器窗格中点击 `Info.plist` 文件。Xcode 显示一个键、类型和值的列表。\n\
    2.  点击展开三角形以展开 Required device capabilities 类别，显示 Item 0。\n3.  将鼠标指针移到 Item 0\
    \ 上，显示一个加号（+）图标。\n4.  点击这个加号（+）图标，显示一个空白的 Item 1。\n5.  在 Item 1 行的 Value 类别下输入\
    \ `arkit`。\n6.  将鼠标指针移到最后一行，显示一个加号（+）图标。\n7.  点击加号（+）图标创建一个新行。出现一个弹出菜单。\n8.  选择\
    \ Privacy – Camera Usage Description。\n9.  在 Privacy – Camera Usage Description\
    \ 行的 Value 类别下输入 `AR needs to use the camera`。\n\n现在按照以下步骤修改 `ViewController.swift`\
    \ 文件以使用 ARKit 和 SceneKit：\n\n1.  在导航器窗格中点击 `ViewController.swift` 文件。\n2.  编辑\
    \ `ViewController.swift` 文件，使其看起来像这样：\n\n```swift\nimport UIKit\nimport SceneKit\n\
    import ARKit\n\nclass ViewController: UIViewController, ARSCNViewDelegate {\n\
    \    let configuration = ARWorldTrackingConfiguration()\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        // Do any additional setup after loading\
    \ the view, typically from a nib.\n    }\n}\n```\n\n要在我们的应用中查看增强现实中聚光灯的效果，我们需要向\
    \ `Main.storyboard` 用户界面添加以下对象：\n*   一个 ARKit SceneKit View（`ARSCNView`）——用于显示带摄像头视图的增强现实。\n\
    *   三个 `UISlider`——用于控制聚光灯的俯仰、偏航和滚转。\n*   三个 `UILabel`——用于标识俯仰、偏航和滚转滑块。"
