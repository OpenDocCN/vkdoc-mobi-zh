    \ Item 1 row.\n\n6.  Move the mouse pointer over the last row to display a plus\
    \ (+) icon.\n\n7.  Click on the plus (+) icon to create a new row. A popup menu\
    \ appears.\n\n8.  Choose Privacy – Camera Usage Description.\n\n9.  Type **AR\
    \ needs to use the camera** under the Value category in the Privacy – Camera Usage\
    \ Description row.\n\nNow it’s time to modify the `ViewController.swift` file\
    \ to use ARKit and SceneKit by following these steps:\n\n1.  Click on the `ViewController.swift`\
    \ file in the Navigator pane.\n\n2.  Edit the `ViewController.swift` file so it\
    \ looks like this:\n\n```\n    import UIKit\n    import SceneKit\n    import ARKit\n\
    \    class ViewController: UIViewController, ARSCNViewDelegate {\n    let configuration\
    \ = ARWorldTrackingConfiguration()\n    override func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    // Do any additional setup after loading the view, typically from a nib.\n\
    \    }\n    }\n    ```\n\nTo view augmented reality in our app, we need to add\
    \ the following objects to the `Main.storyboard` user interface:\n\n*   One ARKit\
    \ SceneKit View (ARSCNView)—For displaying augmented reality with the camera view\n\
    \n*   Two UISliders—For controlling the temperature and intensity of the light\n\
    \n*   Two UILabels—For identifying the purpose of each slider\n\n*   Five UIButtons—For\
    \ choosing different colors for the light\n\nTo design the user interface, click\
    \ on the `Main.storyboard` file in the Navigator pane and click on the Object\
    \ Library button to open the Object Library. Then drag and drop the different\
    \ user interface items on to the user interface. The user interface should eventually\
    \ look similar to Figure [5-2](#469983_1_En_5_Chapter.xhtml#Fig2).\n\n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig2_HTML.jpg](images/469983_1_En_5_Chapter/469983_1_En_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2\n\nDesigning the user interface"
  trans: "\n## 使用颜色、强度与色温\n\n彩色光能以不同方式照亮虚拟物体，特别是当虚拟物体本身带有颜色时。虽然改变颜色是调整光源最直观的方法，但还有另外两种方式可以改变光的表现效果，即色温与强度。\n\
    \n色温的作用是将光的颜色值乘以一个与光源色温相对应的色彩值。默认值`6500`代表纯白光，而较低的值（最低至零）会为光源增添一种“较暖”的黄色或橙色效果。反之，较高的值（最高至`40000`）则会添加一种“较冷”的蓝色效果。\n\
    \n强度通过调亮或调暗光线来改变光源，值设为`1000`时光线保持不变。较低的值会使光线变暗，而较高的值则会使光线更亮。\n\n要学习如何使用光线来改变虚拟物体的外观，我们首先按照以下步骤创建一个新的\
    \ Xcode 项目：\n\n1.  启动 Xcode。（请确保您使用的是 Xcode 10 或更高版本。）\n2.  选择`文件` ➤ `新建` ➤ `项目`。Xcode\
    \ 会提示您选择一个模板。\n3.  点击 iOS 类别。\n4.  点击“单视图应用”图标，然后点击“下一步”按钮。Xcode 会要求输入产品名称、组织名称、组织标识符和内容技术。\n\
    5.  点击“产品名称”文本框，为您的项目输入一个描述性名称，例如`光源`。（具体名称无关紧要。）\n6.  点击“下一步”按钮。Xcode 会询问您希望将项目存储在哪里。\n\
    7.  选择一个文件夹并点击“创建”按钮。Xcode 将创建一个 iOS 项目。\n\n现在，按照以下步骤修改`Info.plist`文件，以允许访问相机并使用\
    \ ARKit：\n\n1.  在导航器窗格中点击`Info.plist`文件。Xcode 会显示一个键、类型和值的列表。\n2.  点击展开三角形以展开“必需设备功能”类别，显示\
    \ Item 0。\n3.  将鼠标指针悬停在 Item 0 上，会显示一个加号（`+`）图标。\n4.  点击这个加号（`+`）图标，会显示一个空白的 Item\
    \ 1。\n5.  在 Item 1 行的“值”类别下输入`arkit`。\n6.  将鼠标指针悬停在最后一行上，会显示一个加号（`+`）图标。\n7. \
    \ 点击加号（`+`）图标以创建新行。会弹出一个菜单。\n8.  选择`隐私 - 相机使用说明`。\n9.  在`隐私 - 相机使用说明`行的“值”类别下输入`AR\
    \ 需要使用相机`。\n\n现在，按照以下步骤修改`ViewController.swift`文件以使用 ARKit 和 SceneKit：\n\n1. \
    \ 在导航器窗格中点击`ViewController.swift`文件。\n2.  编辑`ViewController.swift`文件，使其看起来如下所示：\n\
    \n```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController: UIViewController,\
    \ ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
    \ any additional setup after loading the view, typically from a nib.\n    }\n\
    }\n```\n\n为了在我们的应用中查看增强现实效果，我们需要向`Main.storyboard`用户界面添加以下对象：\n\n*   一个 ARKit\
    \ SceneKit 视图（`ARSCNView`）——用于结合相机视图显示增强现实\n*   两个`UISlider`——用于控制光源的色温和强度\n*\
    \   两个`UILabel`——用于标识每个滑块的作用\n*   五个`UIButton`——用于选择光源的不同颜色\n\n要设计用户界面，请在导航器窗格中点击`Main.storyboard`文件，并点击对象库按钮以打开对象库。然后将不同的用户界面项目拖放到用户界面上。最终的用户界面应类似于图\
    \ 5-2。\n\n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig2_HTML.jpg](img/469983_1_En_5_Fig2_HTML.jpg)\n\
    \n**图 5-2** 设计用户界面\n"
- fmt: "# 添加约束和修改用户界面对象\n\n设计好用户界面后，你需要为这些界面项目添加约束。要添加约束，请选择 **Editor** ➤ **Resolve\
    \ Auto Layout Issues** ➤ **Reset to Suggested Constraints**（位于 **All Views in\
    \ Container** 类别下的菜单下半部分）。\n\n添加约束后，下一步是修改用户界面对象。双击两个 `UILabel` 并将它们的标题更改为 `Temperature`\
    \ 和 `Intensity`。\n\n现在按照以下步骤修改 `Temperature` 标签旁边的 `UISlider`：\n\n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig3_HTML.jpg](images/469983_1_En_5_Chapter/469983_1_En_5_Fig3_HTML.jpg)\n\
    \n**Figure 5-3**：为温度滑块定义值\n\n1.  点击 `Temperature` `UISlider`。\n2.  点击 **Attributes\
    \ Inspector** 图标或选择 **View** ➤ **Inspectors** ➤ **Show Attributes Inspector**。\n\
    3.  在 **Value** 文本框中输入数字 `6500`。\n4.  在 **Minimum** 文本框中输入 `0`。\n5.  在 **Maximum**\
    \ 文本框中输入 `40000`。\n\n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig4_HTML.jpg](images/469983_1_En_5_Chapter/469983_1_En_5_Fig4_HTML.jpg)\n\
    \n**Figure 5-4**：为强度滑块定义值\n\n1.  点击 `Intensity` `UISlider`。\n2.  在 **Value** 文本框中输入数字\
    \ `1000`。\n3.  在 **Minimum** 文本框中输入 `0`。\n4.  在 **Maximum** 文本框中输入 `10000`。\n\n\
    现在，需要通过调整每个按钮的大小、移除标题并设置背景颜色来修改屏幕底部的 `UIButtons`。为此，请按照以下步骤操作：\n\n1.  点击 `UIButton`。\n\
    2.  点击 **Size Inspector** 图标或选择 **View** ➤ **Navigators** ➤ **Show Size Inspector`。\n\
    3.  在 **View** 类别的 **Width** 和 **Height** 文本框中输入 `30`。\n\n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig5_HTML.jpg](images/469983_1_En_5_Chapter/469983_1_En_5_Fig5_HTML.jpg)\n\
    \n**Figure 5-5**：为 `UIButton` 定义宽度和高度\n\n1.  点击 **Attributes Inspector** 图标或选择\
    \ **View** ➤ **Navigators** ➤ **Show Attributes Inspector`。\n2.  从 `UIButton`\
    \ 中删除标题。\n3.  在 **View** 类别下点击 **Background** 弹出菜单并选择一种颜色。\n\n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig6_HTML.jpg](images/469983_1_En_5_Chapter/469983_1_En_5_Fig6_HTML.jpg)\n\
    \n**Figure 5-6**：为 `UIButton` 定义背景颜色\n\n1.  为每个 `UIButton` 重复步骤 2-6，但在步骤 5 中为每个\
    \ `UIButton` 选择不同的颜色。（选择的具体颜色不重要，但确保不要为两个或多个 `UIButton` 选择相同的颜色。）\n\n# 将用户界面连接到\
    \ Swift 代码\n\n设计好用户界面后，下一步是将用户界面项目连接到 `ViewController.swift` 文件中的 Swift 代码。为此，请按照以下步骤操作：\n\
    \n1.  在 **Navigator** 窗格中点击 `Main.storyboard` 文件。\n2.  点击 **Assistant Editor**\
    \ 图标或选择 **View** ➤ **Assistant Editor** ➤ **Show Assistant Editor** 以并排显示 `Main.storyboard`\
    \ 和 `ViewController.swift` 文件。\n3.  将鼠标指针移到 `ARSCNView` 上，按住 **Control** 键，并 Ctrl-拖动到\
    \ `class ViewController` 行下方。\n4.  释放 **Control** 键和鼠标左键。会出现一个弹出菜单。\n5.  点击 **Name**\
    \ 文本字段并输入 `sceneView`，然后点击 **Connect** 按钮。Xcode 将创建一个 `IBOutlet`，如下所示：\n\n```\n\
    @IBOutlet var sceneView: ARSCNView!\n```\n\n6.  在此 `IBOutlet` 下方，输入以下代码：\n\n```\n\
    let showLight = SCNNode()\n```\n\n7.  编辑 `viewDidLoad` 函数，使其如下所示：\n\n```\noverride\
    \ func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional setup\
    \ after loading the view, typically from a nib.\n    sceneView.delegate = self\n\
    \    sceneView.showsStatistics = true\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
    \ ARSCNDebugOptions.showFeaturePoints]\n}\n```\n\n8.  编辑 `viewWillAppear` 函数，使其如下所示：\n\
    \n```\noverride func viewWillAppear(_ animated: Bool) {\n    super.viewWillAppear(animated)\n\
    \    showShape()\n    lightOn()\n    sceneView.session.run(configuration)\n}\n\
    ```\n\n此 `viewWillAppear` 函数调用了 `showShape` 和 `lightOn` 函数。`showShape` 函数显示一个球体，而\
    \ `lightOn` 函数定义光源。\n\n9.  在 `viewWillAppear` 函数下方输入以下代码：\n\n```\nfunc showShape()\
    \ {\n    let sphere = SCNSphere(radius: 0.03)\n    sphere.firstMaterial?.diffuse.contents\
    \ = UIColor.white\n    let node = SCNNode()\n    node.geometry = sphere\n    node.position\
    \ = SCNVector3(0.1, 0, 0)\n    sceneView.scene.rootNode.addChildNode(node)\n}\n\
    func lightOn() {\n    showLight.light = SCNLight()\n    showLight.light?.type\
    \ = .omni\n    showLight.light?.color = UIColor(white: 0.6, alpha: 1.0)\n    showLight.position\
    \ = SCNVector3(0,0,0)\n    sceneView.scene.rootNode.addChildNode(showLight)\n\
    }\n```\n\n10. 将鼠标指针移到 `Temperature` `UISlider` 上，按住 **Control** 键，并 Ctrl-拖动到 `lightOn`\
    \ 函数下方。\n11. 释放 **Control** 键和鼠标左键。会出现一个弹出菜单。\n12. 点击 **Connection** 弹出菜单并选择 **Action**。\n\
    13. 点击 **Name** 文本字段并输入 `temperatureChange`。\n14. 点击 **Type** 弹出菜单并选择 `UISlider`，然后点击\
    \ **Connect** 按钮。这将创建一个 `IBAction` 方法。\n15. 编辑此 `temperatureChange` `IBAction`\
    \ 方法如下：\n\n```\n@IBAction func temperatureChange(_ sender: UISlider) {\n    showLight.light?.temperature\
    \ = CGFloat(sender.value)\n}\n```\n\n16. 将鼠标指针移到 `Intensity` `UISlider` 上，按住 **Control**\
    \ 键，并 Ctrl-拖动到 `lightOn` 函数下方。\n17. 释放 **Control** 键和鼠标左键。会出现一个弹出菜单。\n18. 点击 **Connection**\
    \ 弹出菜单并选择 **Action**。\n19. 点击 **Name** 文本字段并输入 `intensityChange`。\n20. 点击 **Type**\
    \ 弹出菜单并选择 `UISlider`，然后点击 **Connect** 按钮。这将创建一个 `IBAction` 方法。\n21. 编辑此 `intensityChange`\
    \ `IBAction` 方法如下：\n\n```\n@IBAction func intensityChange(_ sender: UISlider)\
    \ {\n    showLight.light?.intensity = CGFloat(sender.value)\n}\n```\n\n22. 将鼠标指针移到任意一个\
    \ `UIButton` 上，按住 **Control** 键，并 Ctrl-拖动到 `ViewController.swift` 文件底部最后一个 `}`\
    \ 括号上方。\n23. 释放 **Control** 键和鼠标左键。会出现一个弹出菜单。\n24. 点击 **Connection** 弹出菜单并选择 **Action**。\n\
    25. 点击 **Name** 文本字段并输入 `colorButton`。\n26. 点击 **Type** 弹出菜单并选择 `UIButton`，然后点击\
    \ **Connect** 按钮。这将创建一个 `IBAction` 方法。\n27. 编辑此 `colorButton` `IBAction` 方法如下：\n\
    \n```\n@IBAction func colorButton(_ sender: UIButton) {\n    //colorMe.backgroundColor\
    \ = sender.backgroundColor\n    showLight.light?.color = sender.backgroundColor!\n\
    }\n```\n\n28. 将鼠标指针移到另一个 `UIButton` 上（不要使用最初用来 Ctrl-拖动到 `ViewController.swift`\
    \ 文件中创建 `colorButton` `IBAction` 方法的那个按钮），按住 **Control** 键，并 Ctrl-拖动鼠标到刚刚创建的 `colorButton`\
    \ `IBAction` 方法上方，直到它被高亮显示，如图 5-7 所示。\n\n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig7_HTML.jpg](images/469983_1_En_5_Chapter/469983_1_En_5_Fig7_HTML.jpg)\n\
    \n**Figure 5-7**：将其他 `UIButtons` 连接到现有的 `IBAction` 方法\n\n29. 当整个 `colorButton`\
    \ `IBAction` 方法高亮显示时，释放 **Control** 键和鼠标左键。\n30. 为每个额外的 `UIButton` 重复步骤 28-29，直到所有\
    \ `UIButtons` 都连接到同一个 `colorButton` `IBAction` 方法。\n\n整个 `ViewController.swift`\
    \ 文件应如下所示："
  raw: "After you’ve designed the user interface, you need to put constraints on those\
    \ user interface items. To add constraints, choose Editor ➤ Resolve Auto Layout\
    \ Issues ➤ Reset to Suggested Constraints at the bottom half of the menu under\
    \ the All Views in Container category.\n\nAfter adding constraints, the next step\
    \ is to modify the user interface objects. Double-click on the two UILabels and\
    \ change their titles to Temperature and Intensity (see Figure [5-2](#469983_1_En_5_Chapter.xhtml#Fig2)).\n\
    \nNow modify the UISlider next to the Temperature label by following these steps:\n\
    \n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig4_HTML.jpg](images/469983_1_En_5_Chapter/469983_1_En_5_Fig4_HTML.jpg)\n\
    \nFigure 5-4\n\nDefining values for the Intensity slider\n\n1.  Click on the Intensity\
    \ UISlider.\n\n2.  Type in the Value text field the number 1000.\n\n3.  Type in\
    \ the Minimum text field 0.\n\n4.  Type in the Maximum text field 10000, as shown\
    \ in Figure [5-4](#469983_1_En_5_Chapter.xhtml#Fig4).\n\n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig3_HTML.jpg](images/469983_1_En_5_Chapter/469983_1_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3\n\nDefining values for the Temperature slider\n\n1.  Click on the\
    \ Temperature UISlider.\n\n2.  Click the Attributes Inspector icon or choose View\
    \ ➤ Inspectors ➤ Show Attributes Inspector.\n\n3.  Type in the Value text field\
    \ the number 6500.\n\n4.  Type in the Minimum text field 0.\n\n5.  Type in the\
    \ Maximum text field 40000, as shown in Figure [5-3](#469983_1_En_5_Chapter.xhtml#Fig3).\n\
    \nNow it’s time to modify the UIButtons at the bottom of the screen by resizing\
    \ each button, removing the title, and displaying a background color. To do this,\
    \ follow these steps:\n\n1.  Repeat Steps 2-6 for each UIButton except choose\
    \ a different color for each UIButton in Step 5\\. (The specific colors you choose\
    \ won’t matter but make sure you don’t choose the same color for two or more UIButtons.)\n\
    \n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig6_HTML.jpg](images/469983_1_En_5_Chapter/469983_1_En_5_Fig6_HTML.jpg)\n\
    \nFigure 5-6\n\nDefining a background color for a UIButton\n\n1.  Click on the\
    \ Attributes Inspector icon or choose View ➤ Navigators ➤ Show Attributes Inspector.\n\
    \n2.  Delete the title from the UIButton.\n\n3.  Click on the Background popup\
    \ menu under the View category and choose a color, as shown in Figure [5-6](#469983_1_En_5_Chapter.xhtml#Fig6).\n\
    \n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig5_HTML.jpg](images/469983_1_En_5_Chapter/469983_1_En_5_Fig5_HTML.jpg)\n\
    \nFigure 5-5\n\nDefining a width and height for the UIButton\n\n1.  Click on UIButton.\n\
    \n2.  Click on the Size Inspector icon or choose View ➤ Navigators ➤ Show Size\
    \ Inspector.\n\n3.  Type 30 in the Width and Height text fields in the View category,\
    \ as shown in Figure [5-5](#469983_1_En_5_Chapter.xhtml#Fig5).\n\nAfter designing\
    \ the user interface, the next step is to connect the user interface items to\
    \ the Swift code in the `ViewController.swift` file. To do this, follow these\
    \ steps:\n\n1.  When the entire `colorButton IBAction` method appears highlighted,\
    \ release the Control key and the left mouse button.\n\n2.  Repeat Steps 28-29\
    \ for each additional UIButton until all UIButtons are connected to the same `colorButton\
    \ IBAction` method.\n\n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig7_HTML.jpg](images/469983_1_En_5_Chapter/469983_1_En_5_Fig7_HTML.jpg)\n\
    \nFigure 5-7\n\nConnecting additional UIButtons to an existing IBAction method\n\
    \n1.  Click the `Main.storyboard` file in the Navigator pane.\n\n2.  Click the\
    \ Assistant Editor icon or choose View ➤ Assistant Editor ➤ Show Assistant Editor\
    \ to display the `Main.storyboard` and the `ViewController.swift` file side by\
    \ side.\n\n3.  Move the mouse pointer over the ARSCNView, hold down the Control\
    \ key, and Ctrl-drag under the `class ViewController` line.\n\n4.  Release the\
    \ Control key and the left mouse button. A popup menu appears.\n\n5.  Click in\
    \ the Name text field and type `sceneView`, then click the Connect button. Xcode\
    \ creates an IBOutlet as shown here:\n\n```\n    @IBOutlet var sceneView: ARSCNView!\n\
    \    ```\n\n6.  Underneath this IBOutlet, type the following:\n\n```\n    let\
    \ showLight = SCNNode()\n    ```\n\n7.  Edit the `viewDidLoad` function so it\
    \ looks like this:\n\n```\n    override func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    // Do any additional setup after loading the view, typically from a nib.\n\
    \    sceneView.delegate = self\n    sceneView.showsStatistics = true\n    sceneView.debugOptions\
    \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
    \    }\n    ```\n\n8.  Edit the `viewWillAppear` function so it looks like this:\n\
    \n```\n    override func viewWillAppear(_ animated: Bool) {\n    super.viewWillAppear(animated)\n\
    \    showShape()\n    lightOn()\n    sceneView.session.run(configuration)\n  \
    \  }\n    ```\n\nThis `viewWillAppear` function calls on a showShape and a `lightOn`\
    \ function. The `showShape` function displays a sphere and the `lightOn` function\
    \ defines a light source.\n\n9.  Type the following underneath the `viewWillAppear`\
    \ function :\n\n```\n    func showShape() {\n    let sphere = SCNSphere(radius:\
    \ 0.03)\n    sphere.firstMaterial?.diffuse.contents = UIColor.white\n    let node\
    \ = SCNNode()\n    node.geometry = sphere\n    node.position = SCNVector3(0.1,\
    \ 0, 0)\n    sceneView.scene.rootNode.addChildNode(node)\n    }\n    func lightOn()\
    \ {\n    showLight.light = SCNLight()\n    showLight.light?.type = .omni\n   \
    \ showLight.light?.color = UIColor(white: 0.6, alpha: 1.0)\n    showLight.position\
    \ = SCNVector3(0,0,0)\n    sceneView.scene.rootNode.addChildNode(showLight)\n\
    \    }\n    ```\n\n10.  Move the mouse pointer over the Temperature UISlider,\
    \ hold down the Control key, and Ctrl-drag underneath the `lightOn` function.\n\
    \n11.  Release the control key and left mouse button. A popup menu appears.\n\n\
