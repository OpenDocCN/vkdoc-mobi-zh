  raw: '## Displaying Planes as Images


    Once we can get ARKit to recognize horizontal surfaces, we can place an image
    on that horizontal surface. First, you need to get an image such as searching
    for “texture image public domain” in your favorite search engine. Now you can
    download any texture image you want, such as a brick sidewalk, wooden floor, or
    the rippling surface of water.


    To add a .png or .jpg image to an Xcode project, simply drag and drop that image
    into the Navigator pane of your Xcode project, as shown in Figure [11-2](#469983_1_En_11_Chapter.xhtml#Fig2).


    ![../images/469983_1_En_11_Chapter/469983_1_En_11_Fig2_HTML.jpg](images/469983_1_En_11_Chapter/469983_1_En_11_Fig2_HTML.jpg)


    Figure 11-2


    Drag and drop an image into the Navigator pane


    Once you’ve added a texture image for a plane, the next step is to create a plane,
    with a texture, and add it to the `sceneView` rootnode inside the `didAdd renderer`
    function like this:


    ```

    let planeNode = displayTexture()

    sceneView.scene.rootNode.addChildNode(planeNode)

    ```


    To create the plane, we’ll need to create a function called `displayTexture`,
    which creates a `SCNNode`, defines that node as an `SCNPlane` with a width and
    height of 0.5 meters, and appears at the position 0, 0, -0.5\. Most importantly,
    the `SCNPlane` needs to use the texture image you dragged into the Navigator pane
    such as an image named `water.jpg` (change this name to the name of the image
    you dragged into your Xcode Navigator pane). The `displayTexture` function should
    look like this:


    ```

    func displayTexture() -> SCNNode {

    let planeNode = SCNNode()

    planeNode.geometry = SCNPlane(width: 0.5, height: 0.5)

    planeNode.geometry?.firstMaterial?.diffuse.contents = UIImage(named: "water.jpg")

    planeNode.position = SCNVector3(0, 0, -0.5)

    return planeNode

    }

    ```


    If you run this code, it will create a plane that displays `water.jpg` as a vertical
    plane, as shown in Figure [11-3](#469983_1_En_11_Chapter.xhtml#Fig3).


    ![../images/469983_1_En_11_Chapter/469983_1_En_11_Fig3_HTML.jpg](images/469983_1_En_11_Chapter/469983_1_En_11_Fig3_HTML.jpg)


    Figure 11-3


    Displaying an image on a plane


    Besides rotating the plane 90 degrees along the x-axis so it appears flat, another
    problem is that if you look behind the plane, the image only appears on one side.
    To make the image appear on both sides of the plane, we need to define the plane
    as double-sided like this:


    ```

    planeNode.geometry?.firstMaterial?.isDoubleSided = true

    ```


    Then we need to rotate the plane around the x-axis by 90 degrees. Remember, Xcode
    measures everything in radians, so we’ll first need to convert 90 degrees into
    radians like this:


    ```

    let ninetyDegrees = GLKMathDegreesToRadians(90)

    ```


    Then we can rotate the plane around its x-axis by defining its `eulerAngles` position
    like this:


    ```

    planeNode.eulerAngles = SCNVector3(ninetyDegrees, 0, 0)

    ```


    The entire `displayTexture` function should look like this:


    ```

    func displayTexture() -> SCNNode {

    let planeNode = SCNNode()

    planeNode.geometry = SCNPlane(width: 0.5, height: 0.5)

    planeNode.geometry?.firstMaterial?.diffuse.contents = UIImage(named: "water.jpg")

    planeNode.position = SCNVector3(0, 0, -0.5)

    let ninetyDegrees = GLKMathDegreesToRadians(90)

    planeNode.eulerAngles = SCNVector3(ninetyDegrees, 0, 0)

    planeNode.geometry?.firstMaterial?.isDoubleSided = true

    return planeNode

    }

    ```


    The entire `ViewController.swift` file should look like this to display a horizontal
    plane with an image:


    ```

    import UIKit

    import SceneKit

    import ARKit

    class ViewController: UIViewController, ARSCNViewDelegate {

    @IBOutlet var sceneView: ARSCNView!

    let configuration = ARWorldTrackingConfiguration()

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]

    sceneView.delegate = self

    configuration.planeDetection = .horizontal

    sceneView.session.run(configuration)

    let planeNode = displayTexture()

    sceneView.scene.rootNode.addChildNode(planeNode)

    }

    func displayTexture() -> SCNNode {

    let planeNode = SCNNode()

    planeNode.geometry = SCNPlane(width: 0.5, height: 0.5)

    planeNode.geometry?.firstMaterial?.diffuse.contents = UIImage(named: "water.jpg")

    planeNode.position = SCNVector3(0, 0, -0.5)

    let ninetyDegrees = GLKMathDegreesToRadians(90)

    planeNode.eulerAngles = SCNVector3(ninetyDegrees, 0, 0)

    planeNode.geometry?.firstMaterial?.isDoubleSided = true

    return planeNode

    }

    func renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:
    ARAnchor) {

    guard anchor is ARPlaneAnchor else { return }

    print ("plane detected")

    }

    func renderer(_ renderer: SCNSceneRenderer, didUpdate node: SCNNode, for anchor:
    ARAnchor) {

    guard anchor is ARPlaneAnchor else { return }

    print("updating plane anchor")

    }

    }

    ```


    If you run this code, you’ll see a horizontal plane displaying the texture image
    on both the top and bottom, as shown in Figure [11-4](#469983_1_En_11_Chapter.xhtml#Fig4).


    ![../images/469983_1_En_11_Chapter/469983_1_En_11_Fig4_HTML.jpg](images/469983_1_En_11_Chapter/469983_1_En_11_Fig4_HTML.jpg)


    Figure 11-4


    The plane appearing horizontally


    Right now the plane appears at an arbitrary size and position. What we want is
    to make that plane appear where ARKit detects a horizontal plane, such as a floor
    or table top.


    First, delete these two lines from the `viewDidLoad` function:


    ```

    let planeNode = displayTexture()

    sceneView.scene.rootNode.addChildNode(planeNode)

    ```


    Now, in the `didAdd renderer` function, add the following two lines:


    ```

    let planeNode = displayTexture(anchor: anchor as! ARPlaneAnchor)

    node.addChildNode(planeNode)

    ```


    The entire `didAdd renderer` function should look like this:


    ```

    func renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:
    ARAnchor) {

    guard anchor is ARPlaneAnchor else { return }

    let planeNode = displayTexture(anchor: anchor as! ARPlaneAnchor)

    node.addChildNode(planeNode)

    print ("plane detected")

    }

    ```


    What this `didAdd renderer` function does now is that once it detects a horizontal
    plane, it stores the size and position of that horizontal plane as an `ARPlaneAnchor`.
    So we take this size and position information and pass it to the `displayTexture`
    function that creates the actual plane.


    That means we need to change the `displayTexture` function so it can accept a
    parameter like this:


    ```

    func displayTexture(anchor: ARPlaneAnchor) -> SCNNode {

    ```


    Within the `displayTexture` function, we need to modify both the size of the plane
    and the position, both of which come from the `anchor` parameter that gets passed
    into the `displayTexture` function. First, we need to define the plane’s size
    based on the anchor. To do that, we need to change the plane’s size dimensions
    from an arbitrary fixed value to the size of the anchor like this:


    ```

    planeNode.geometry = SCNPlane(width: CGFloat(anchor.extent.x), height: CGFloat(anchor.extent.z))

    ```


    Next, we need to define the horizontal plane’s position based on the anchor like
    this:


    ```

    planeNode.position = SCNVector3(anchor.center.x, anchor.center.y, anchor.center.z)

    ```


    The entire modified `ViewController.swift` file should now look like this:'
