    print(name ?? "background")

    }

    }

    @objc func handleSwipe(sender: UISwipeGestureRecognizer) {

    let areaSwiped = sender.view as! SCNView

    let tappedCoordinates = sender.location(in: areaSwiped)

    let hitTest = areaSwiped.hitTest(tappedCoordinates)

    if hitTest.isEmpty {

    print ("Nothing")

    } else {

    let results = hitTest.first!

    let name = results.node.name

    print(name ?? "background")

    }

    switch sender.direction {

    case.up:

    print("Up")

    case .down:

    print("Down")

    case .right:

    print("Right")

    case .left:

    print("Left")

    default:

    break

    }

    }

    @objc func handlePan(sender: UIPanGestureRecognizer) {

    //        let location = sender.location(in: view)

    //        print(location.x, location.y)

    //        let velocity = sender.velocity(in: view)

    //        print(velocity.x, velocity.y)

    let translation = sender.translation(in: view)

    let areaPanned = sender.view as! SCNView

    let tappedCoordinates = sender.location(in: areaPanned)

    let hitTest = areaPanned.hitTest(tappedCoordinates)

    if hitTest.isEmpty {

    print ("Nothing")

    } else {

    let results = hitTest.first!

    let name = results.node.name

    print(name ?? "background")

    if sender.state == .began {

    print("Gesture began")

    } else if sender.state == .changed {

    print("Gesture is changing")

    print(translation.x, translation.y)

    } else if sender.state == .ended {

    print("Gesture ended")

    }

    }

    }

    }

    ```


    修改`ViewController.swift`文件中的代码以匹配此代码。然后要运行应用程序，请执行以下操作：


    1.  通过USB数据线将iOS设备连接到Macintosh。

    2.  点击运行按钮或选择 Product ➤ Run。

    3.  将一根手指放在屏幕上的盒子或金字塔上并滑动它。注意Xcode中的调试区域会识别出平移经过的区域、平移手势何时开始、停止和改变，以及位移值是多少。

    4.  点击停止按钮或选择 Product ➤ Stop。'
  raw: '## Identifying Virtual Objects with Pan Gestures


    Another touch gesture that iOS can recognize is the pan, which essentially means
    placing one or more fingertips on the screen and sliding them around. A pan gesture
    is similar to a swipe except a swipe gesture slides up/down or right/left. A pan
    gesture can also move in a straight line but could also move in a squiggly line
    instead.


    Creating a Pan Gesture Recognizer involves defining a function to handle pan gestures
    and then assigning the pan gesture to the scene like this:


    ```

    let panGesture = UIPanGestureRecognizer(target: self, action: #selector(handlePan))

    sceneView.addGestureRecognizer(panGesture)

    ```


    To further customize the pan gesture, we can define the minimum number of fingertips
    to start panning along with a maximum number. So if we wanted to detect one, two,
    or three fingers in a pan gesture, we could define a `minimumNumberOfTouches`
    as `1` and a `maximumNumberOfTouches` as `3` like this:


    ```

    panGesture.maximumNumberOfTouches = 3

    panGesture.minimumNumberOfTouches = 1

    ```


    If we don’t define either property, Xcode simply allows any number of fingertips
    to initiate a pan gesture with a minimum of at least one fingertip.


    The function to handle the pan gesture can respond to three parts of a pan gesture:


    *   Location—Where the pan gesture started on the iOS device screen, where the
    upper-left corner is the origin (0, 0)


    *   Velocity—How fast the pan gesture moves in the x- and y-axes, measured in
    points per second


    *   Translation—How far the pan gesture moves in the x- and y-axes


    We can retrieve the location, velocity, and translation information in a function
    that handles pan gestures like this:


    ```

    @objc func handlePan(sender: UIPanGestureRecognizer) {

    let location = sender.location(in: view)

    let velocity = sender.velocity(in: view)

    let translation = sender.translation(in: view)

    }

    ```


    Then we can retrieve the x and y values of each item like this:


    ```

    print(location.x, location.y)

    print(velocity.x, velocity.y)

    print(translation.x, translation.y)

    ```


    For our app, we’ll only use the translation property to identify how far the pan
    gesture moves. We need to identify whether the pan gesture occurs over a virtual
    object or not, so we need to get the coordinates panned over like this:


    ```

    let areaPanned = sender.view as! SCNView

    let tappedCoordinates = sender.location(in: areaPanned)

    let hitTest = areaPanned.hitTest(tappedCoordinates)

    ```


    Then we need to check if the pan gesture occurred over the box or pyramid like
    this:


    ```

    if hitTest.isEmpty {

    print ("Nothing")

    } else {

    let results = hitTest.first!

    let name = results.node.name

    print(name ?? "background")

    if sender.state == .began {

    print("Gesture began")

    } else if sender.state == .changed {

    print("Gesture is changing")

    print(translation.x, translation.y)

    } else if sender.state == .ended {

    print("Gesture ended")

    }

    }

    ```


