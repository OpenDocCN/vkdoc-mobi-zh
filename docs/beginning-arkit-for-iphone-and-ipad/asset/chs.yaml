  \    }\n    func showShape() {\n        let pyramid = SCNPyramid(width: 0.05, height:\
  \ 0.1, length: 0.05)\n        pyramid.firstMaterial?.diffuse.contents = UIColor.green\n\
  \        node.geometry = pyramid\n        node.position = SCNVector3(0.05, 0.05,\
  \ -0.05)\n        sceneView.scene.rootNode.addChildNode(node)\n    }\n    @IBAction\
  \ func XChanged(_ sender: UISlider) {\n        currentX = GLKMathDegreesToRadians(sender.value)\n\
  \        node.eulerAngles = SCNVector3(currentX, currentY, currentZ)\n    }\n  \
  \  @IBAction func YChanged(_ sender: UISlider) {\n        currentY = GLKMathDegreesToRadians(sender.value)\n\
  \        node.eulerAngles = SCNVector3(currentX, currentY, currentZ)\n    }\n  \
  \  @IBAction func ZChanged(_ sender: UISlider) {\n        currentZ = GLKMathDegreesToRadians(sender.value)\n\
  \        node.eulerAngles = SCNVector3(currentX, currentY, currentZ)\n    }\n}\n\
  ```\n\n此应用将一个绿色的金字塔放置在 `SCNVector3(0.05, 0.05, -0.05)` 位置。要运行此应用，请按照以下步骤操作：\n\n\
  1.  通过 USB 线缆将 iOS 设备连接到您的 Macintosh。\n2.  点击运行按钮或选择**产品** ➤ **运行**。\n3.  当应用运行时，会出现一个绿色的金字塔。\n\
  4.  左右滑动 `x`、`y` 和 `z` 轴滑块。请注意，绿色的金字塔会围绕 `x`、`y` 或 `z` 轴旋转，具体取决于您当前正在移动哪个滑块。\n5.\
  \  点击停止按钮或选择**产品** ➤ **停止**。\n\n## 关联对象的旋转\n\n通过使用欧拉角，可以轻松地使虚拟对象围绕其 `x`、`y` 或 `z`\
  \ 轴旋转。如果您旋转一个对象，可能会想知道位于旋转对象旁边的任何相邻对象会发生什么变化。如果您使用相对定位将一个虚拟对象放置在另一个虚拟对象旁边，那么旋转一个对象也会导致附近的任何对象改变其位置。\n\
  \n因此，如果您有一个绿色的金字塔，并使用相对定位在绿色金字塔旁边放置一个橙色的盒子，那么旋转绿色金字塔也会移动橙色的盒子。这是因为橙色的盒子使用相对定位，使其与绿色金字塔保持特定的距离。当绿色金字塔旋转时，橙色的盒子也会改变其位置。\n\
  \n让我们添加第二个虚拟对象，例如一个橙色的盒子，并使用相对定位将其放置在绿色金字塔左侧 0.15 米处（`x` 轴），在 `y` 轴上为 0 米，在 `z`\
  \ 轴上为 0 米。\n\n编辑 `showShape` 函数，使其看起来像这样：\n\n```swift\nfunc showShape() {\n    let\
  \ pyramid = SCNPyramid(width: 0.05, height: 0.1, length: 0.05)\n    pyramid.firstMaterial?.diffuse.contents\
  \ = UIColor.green\n    node.geometry = pyramid\n    node.position = SCNVector3(0.05,\
  \ 0.05, -0.05)\n    sceneView.scene.rootNode.addChildNode(node)\n    let box = SCNBox\
  \ (width: 0.05, height: 0.05, length: 0.05, chamferRadius: 0)\n    box.firstMaterial?.diffuse.contents\
  \ = UIColor.orange\n    let boxNode = SCNNode()\n    boxNode.geometry = box\n  \
  \  boxNode.position = SCNVector3(-0.15, 0, 0)\n    node.addChildNode(boxNode)\n\
  }\n```\n\n这段代码创建了一个橙色的盒子，出现在绿色金字塔左侧 0.15 米处。由于橙色的盒子使用基于绿色金字塔位置的相对定位，旋转绿色金字塔会自动迫使橙色的盒子改变其位置，以维持其相对于绿色金字塔的固定位置。\n\
  \n运行这个修改后的应用，并左右滑动 `x` 轴、`y` 轴和 `z` 轴滑块。请注意，绿色金字塔会旋转，并迫使橙色的盒子根据绿色金字塔的旋转而改变其位置。\n\
  \n由于橙色的盒子是相对于绿色金字塔定位的，旋转绿色金字塔也会迫使橙色的盒子移动。如果我们创建第三个虚拟对象，该对象使用相对于橙色盒子的定位，会发生什么情况？那么旋转金字塔将移动橙色的盒子，而橙色的盒子又会移动我们的第三个虚拟对象。让我们看看这是如何工作的。\n\
  \n重写 `showShape` 函数，使其添加一个红色的圆柱体，该圆柱体使用相对定位来根据橙色盒子的位置确定自身方向。现在旋转绿色金字塔会移动橙色的盒子（它维持相对于绿色金字塔的位置），也会移动红色的圆柱体（它维持相对于橙色盒子的位置）。\n\
  \n`showShape` 函数应如下所示：\n\n```swift\nfunc showShape() {\n    let pyramid = SCNPyramid(width:\
  \ 0.05, height: 0.1, length: 0.05)\n    pyramid.firstMaterial?.diffuse.contents\
  \ = UIColor.green\n    node.geometry = pyramid\n    node.position = SCNVector3(0.05,\
  \ 0.05, -0.05)\n    sceneView.scene.rootNode.addChildNode(node)\n    let box = SCNBox\
  \ (width: 0.05, height: 0.05, length: 0.05, chamferRadius: 0)\n    box.firstMaterial?.diffuse.contents\
  \ = UIColor.orange\n    let boxNode = SCNNode()\n    boxNode.geometry = box\n  \
  \  boxNode.position = SCNVector3(-0.15, 0, 0)\n    node.addChildNode(boxNode)\n\
  \    let cylinder = SCNCylinder(radius: 0.04, height: 0.06)\n    cylinder.firstMaterial?.diffuse.contents\
  \ = UIColor.red\n    let thirdNode = SCNNode()\n    thirdNode.geometry = cylinder\n\
  \    thirdNode.position = SCNVector3(0, -0.15, 0.1)\n    boxNode.addChildNode(thirdNode)\n\
  }\n```\n\n\n\n## 相对定位移动所有相关的虚拟对象\n\n这段代码创建了一个半径为 0.04 米、高度为 0.06 米的红色圆柱体。然后将其放置在橙色盒子下方\
  \ 0.15 米、前方 0.1 米的位置。当你运行此版本的应用时，移动 x、y 和 z 轴的滑块，你将看到绿色金字塔旋转并影响橙色盒子的位置，进而影响红色圆柱体的位置，如图\
  \ 7-4 所示。\n\n![images/469983_1_En_7_Chapter/469983_1_En_7_Fig4_HTML.jpg](img/469983_1_En_7_Fig4_HTML.jpg)\n\
  \n图 7-4\n相对定位移动所有相关的虚拟对象\n\n此时，我们有三个虚拟对象——一个绿色金字塔、一个橙色盒子和一个红色圆柱体。但是，我们只旋转绿色金字塔。橙色盒子移动以保持其相对于绿色金字塔的位置，而红色圆柱体移动以保持其相对于橙色盒子的位置。\n\
  \n如果我们添加一个仅相对于`rootnode`定位的第四个虚拟对象会怎样？在这种情况下，旋转绿色金字塔对这个第四个虚拟对象没有影响，因为它仅依赖于`rootnode`（世界原点）。让我们看看这是如何工作的。\n\
  \n编辑`showShape`函数以添加第四个虚拟对象，这次将其设为一个蓝色的圆环，如下所示：\n\n```\nlet torus = SCNTorus(ringRadius:\
  \ 0.02, pipeRadius: 0.004)\ntorus.firstMaterial?.diffuse.contents = UIColor.blue\n\
  let fourthNode = SCNNode()\nfourthNode.geometry = torus\nfourthNode.position = SCNVector3(0,\
  \ -0.02, 0.1)\nsceneView.scene.rootNode.addChildNode(fourthNode)\n```\n\n修改`showShape`函数如下：\n\
  \n```\nfunc showShape() {\n    let pyramid = SCNPyramid(width: 0.05, height: 0.1,\
  \ length: 0.05)\n    pyramid.firstMaterial?.diffuse.contents = UIColor.green\n \
  \   node.geometry = pyramid\n    node.position = SCNVector3(0.05, 0.05, -0.05)\n\
  \    sceneView.scene.rootNode.addChildNode(node)\n\n    let box = SCNBox (width:\
  \ 0.05, height: 0.05, length: 0.05, chamferRadius: 0)\n    box.firstMaterial?.diffuse.contents\
  \ = UIColor.orange\n    let boxNode = SCNNode()\n    boxNode.geometry = box\n  \
  \  boxNode.position = SCNVector3(-0.15, 0, 0)\n    node.addChildNode(boxNode)\n\n\
  \    let cylinder = SCNCylinder(radius: 0.04, height: 0.06)\n    cylinder.firstMaterial?.diffuse.contents\
  \ = UIColor.red\n    let thirdNode = SCNNode()\n    thirdNode.geometry = cylinder\n\
  \    thirdNode.position = SCNVector3(0, -0.15, 0.1)\n    boxNode.addChildNode(thirdNode)\n\
  \n    let torus = SCNTorus(ringRadius: 0.02, pipeRadius: 0.004)\n    torus.firstMaterial?.diffuse.contents\
  \ = UIColor.blue\n    let fourthNode = SCNNode()\n    fourthNode.geometry = torus\n\
  \    fourthNode.position = SCNVector3(0, -0.02, 0.1)\n    sceneView.scene.rootNode.addChildNode(fourthNode)\n\
  }\n```\n\n由于圆环是相对于`rootnode`定位，而不是相对于其他任何虚拟对象，因此旋转绿色金字塔不会影响圆环的位置。这说明了在增强现实视图中移动虚拟对象时，相对定位与相对于`rootnode`定位的区别。\n\
  \n## 总结\n\n有两种方法可以在增强现实视图中定义虚拟对象的位置。第一种，你可以相对于`rootnode`定义对象的位置，`rootnode`出现在世界原点(0,\
  \ 0, 0)。第二种，你可以相对于另一个对象的位置来定义对象的位置。\n\n要旋转一个对象，你需要定义其围绕 x、y 和 z 轴的欧拉角。欧拉角使用弧度，因此你需要使用存储在`GLKit`框架中的函数将度转换为弧度。通过使用`GLKMathDegreesToRadians`函数，你可以轻松地将度转换为弧度。\n\
  \n旋转一个对象也会改变任何定义为相对于该旋转对象的附近对象的位置。只有相对于`rootnode`定位的对象在旋转其他对象时不会改变。\n\n"
- "# 8. 在屏幕上绘图\n\n你已经了解了如何在增强现实中绘制常见的几何形状，如圆柱体、盒子、金字塔和球体。你也已经了解了如何通过定义起点和终点来绘制自定义几何形状。在屏幕上创建和显示虚拟对象通常通过代码完成。\n\
  \n但是，如果你想让用户选择在屏幕上绘制物品呢？这就是你将在本章学到的：如何让用户直接在增强现实视图上绘制线条。\n\n首先，解释一下你一直使用的另一个调试功能：\n\
  \n```\nsceneView.showsStatistics = true\n```\n\n这行代码显示了相机显示的每秒帧数，如图 8-1 所示。\n\n\
  ![images/469983_1_En_8_Chapter/469983_1_En_8_Fig1_HTML.jpg](img/469983_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\n查看增强现实应用中的每秒帧数\n\n每秒帧数定义了相机更新或渲染其视图的频率。每次相机更新或渲染其视图时（通常为每秒 60 帧），它都会运行一个`willRenderScene`函数，如下所示：\n\
  \n```\nfunc renderer(_ renderer: SCNSceneRenderer, willRenderScene scene: SCNScene,\
  \ atTime time: TimeInterval) {\n}\n```\n\n因此，要在增强现实视图中绘制某些内容，我们需要使用这个`willRenderScene`函数来更新或渲染屏幕上的图像。\n\
  \n要在增强现实中绘制一个项目，我们需要按照以下步骤创建一个新的 Xcode 项目：\n\n1.  启动 Xcode。（确保你使用的是 Xcode 10 或更高版本。）\n\
  2.  选择 File ➤ New ➤ Project。Xcode 会要求你选择一个模板。\n3.  点击 iOS 类别。\n4.  点击 Single View\
  \ App 图标，然后点击 Next 按钮。Xcode 要求输入产品名称、组织名称、组织标识符和内容技术。\n5.  点击 Product Name 文本字段，为你的项目输入一个描述性名称，例如`Drawing`。（确切的名称不重要。）\n\
  6.  点击 Next 按钮。Xcode 询问你要将项目存储在哪里。\n7.  选择一个文件夹并点击 Create 按钮。Xcode 创建一个 iOS 项目。\n\
  \n现在按照以下步骤修改`Info.plist`文件以允许访问相机并使用 ARKit：\n\n1.  点击 Navigator 窗格中的`Info.plist`文件。Xcode\
  \ 显示一个键、类型和值的列表。\n2.  点击展开三角形以展开 Required Device Capabilities 类别，显示 Item 0。\n3.\
  \  将鼠标指针移到 Item 0 上以显示加号(+)图标。\n4.  点击这个加号(+)图标以显示一个空白的 Item 1。\n5.  在 Item 1 行的\
  \ Value 类别下输入`arkit`。\n6.  将鼠标指针移到最后一行以显示加号(+)图标。\n7.  点击加号(+)图标创建一个新行。会弹出一个菜单。\n\
  8.  选择 Privacy – Camera Usage Description。\n9.  在 Privacy – Camera Usage Description\
  \ 行的 Value 类别下输入`AR needs to use the camera`。\n\n现在按照以下步骤修改`ViewController.swift`文件以使用\
  \ ARKit 和 SceneKit：\n\n1.  点击 Navigator 窗格中的`ViewController.swift`文件。\n2.  编辑`ViewController.swift`文件，使其看起来像这样：\n\
  \n```\nimport UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController: UIViewController,\
  \ ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
  \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do any\
  \ additional setup after loading the view, typically from a nib.\n    }\n}\n```\n\
  \n要在我们的应用中查看增强现实，添加一个单独的 ARKit SceneKit 视图(`ARSCNView`)和一个`UISwitch`，使用户界面类似于图 8-2。\n\
  \n![images/469983_1_En_8_Chapter/469983_1_En_8_Fig2_HTML.jpg](img/469983_1_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2\n用户界面包括一个放置在`ARSCNView`上的`UISwitch`\n\n\n\n## 添加约束与连接界面\n\n设计好用户界面后，下一步是添加约束。要添加约束，请在底部菜单的“All\
  \ Views in Container”分类下选择 **Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested\
  \ Constraints**。\n\n用户界面设计完成后，接下来需要将界面元素连接到`ViewController.swift`文件中的 Swift 代码。请按照以下步骤操作：\n\
  \n1.  在导航窗格中点击`Main.storyboard`文件。\n2.  点击助理编辑器图标，或选择 **View ➤ Assistant Editor\
  \ ➤ Show Assistant Editor**，以并排显示`Main.storyboard`和`ViewController.swift`文件。\n3.\
  \  将鼠标指针悬停在`ARSCNView`上，按住 Control 键，然后按住 Control 键并拖动到`class ViewController`代码行下方。\n\
  4.  松开 Control 键和鼠标左键。此时会弹出一个菜单。\n5.  在 Name 文本框中点击并输入`sceneView`，然后点击 Connect 按钮。Xcode\
  \ 将创建一个 IBOutlet，如下所示：\n    ```\n    @IBOutlet var sceneView: ARSCNView!\n    ```\n\
  6.  将鼠标指针悬停在`UISwitch`上，按住 Control 键，然后按住 Control 键并拖动到`@IBOutlet sceneView`代码行下方。\n\
  7.  松开 Control 键和鼠标左键。此时会弹出一个菜单。\n8.  在 Name 文本框中点击并输入`switchDraw`，然后点击 Connect\
  \ 按钮。Xcode 将创建一个 IBOutlet，如下所示：\n    ```\n    @IBOutlet var switchDraw: UISwitch!\n\
  \    ```\n9.  编辑`viewDidLoad`函数，使其内容如下：\n    ```\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        // 视图加载后（通常是从 nib 文件加载）进行任何其他设置。\n   \
  \     sceneView.delegate = self\n        sceneView.showsStatistics = true\n    \
  \    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
  \    }\n    ```\n10. 编辑`viewWillAppear`函数，使其内容如下：\n    ```\n    override func viewWillAppear(_\
  \ animated: Bool) {\n        super.viewWillAppear(animated)\n        sceneView.session.run(configuration)\n\
  \    }\n    ```\n11. 在`viewWillAppear`函数下方键入以下代码：\n    ```\n    func renderer(_\
  \ renderer: SCNSceneRenderer, willRenderScene scene: SCNScene, atTime time: TimeInterval)\
  \ {\n    }\n    ```\n\n`renderer(_:willRenderScene:atTime:)`函数会在每次应用更新增强现实视图时运行，通常为每秒\
  \ 60 帧。\n\n## 绘制增强现实视图\n\n要在增强现实视图上进行绘制，首先需要在`willRenderScene`函数中获取 iOS 设备摄像头的位置。为此，我们可以使用以下代码来获取摄像头的位置和方向：\n\
  ```\nguard let pov = sceneView.pointOfView else {return}\n```\n`guard`语句确保我们从 iOS\
  \ 设备获取了摄像头信息。如果由于某些原因未能获取，`guard`语句会立即退出`willRenderScene`函数。\n\n假设我们成功从 iOS 设备获取了摄像头信息，下一步是将此信息转换为一个包含摄像头各种信息的\
  \ 4x4 矩阵：\n```\nlet transform = pov.transform\n```\n\n### 获取摄像头旋转与位置\n\n这个 4x4 矩阵的第三行包含了摄像头的\
  \ x、y、z 旋转信息。要获取这些信息，我们需要使用以下代码：\n```\nlet rotation = SCNVector3(-transform.m31,\
  \ -transform.m32, -transform.m33)\n```\n请注意，从矩阵第三行获取的每个项前面都有一个负号。这个负号反转了旋转信息。如果没有它，在\
  \ x 轴上向右移动将为负值（而不是正值），在 y 轴上向上移动将为负值（而不是正值），在 z 轴上向后移动也将为负值（而不是正值）。\n\n旋转定义了摄像头所面对的方向。接下来，我们需要从\
  \ 4x4 矩阵的第四行获取摄像头的位置，如下所示：\n```\nlet location = SCNVector3(transform.m41, transform.m42,\
  \ transform.m43)\n```\n一旦获取了摄像头的旋转和位置，就需要将它们的 x、y 和 z 坐标相加，从而得出摄像头的朝向方位。\n\n\n```swift\n\
  let currentPosition = SCNVector3(rotation.x + location.x, rotation.y + location.y,\
  \ rotation.z + location.z)\n```\n\n## 应用功能与设置\n\n此应用旨在在屏幕中央显示一个红色指针。当用户将`UISwitch`切换到开启位置时，应用将在用户相机指向的任何地方绘制一条绿线。为防止应用立即开始绘制，请按照以下步骤将`UISwitch`切换到关闭位置：\n\
  \n![../images/469983_1_En_8_Chapter/469983_1_En_8_Fig3_HTML.jpg](img/469983_1_En_8_Fig3_HTML.jpg)\n\
  \n**图 8-3：将 UISwitch 状态值改为 Off**\n\n1.  在导航器面板中点击`Main.storyboard`文件，用户界面将出现。\n\
  2.  点击`UISwitch`以选中它。\n3.  点击“显示属性检查器”图标或选择 **查看** ➤ **检查器** ➤ **显示属性检查器**。\n4.\
  \  点击状态弹出菜单并选择 **关闭**（参见图 8-3）。\n\n### 编写渲染器函数代码\n\n现在我们需要在`renderer`函数内部编写额外的代码，它目前应该如下所示：\n\
  \n```swift\nfunc renderer(_ renderer: SCNSceneRenderer, willRenderScene scene: SCNScene,\
  \ atTime time: TimeInterval) {\n    guard let pov = sceneView.pointOfView else {return}\n\
  \    let transform = pov.transform\n    let rotation = SCNVector3(-transform.m31,\
  \ -transform.m32, -transform.m33)\n    let location = SCNVector3(transform.m41,\
  \ transform.m42, transform.m43)\n    let currentPosition = SCNVector3(rotation.x\
  \ + location.x, rotation.y + location.y, rotation.z + location.z)\n}\n```\n\n我们需要在这个`renderer`函数内部添加代码，以决定是显示指针还是绘制线条。由于这段额外代码需要在应用显示相机增强现实视图的同时运行，我们需要使用`DispatchQueue`。这允许应用同时显示相机和绘制线条。一个`DispatchQueue`简单定义了与主代码分开运行的代码，如下所示：\n\
  \n```swift\nDispatchQueue.main.async {\n}\n```\n\n在这个`DispatchQueue`内部，我们需要一个`if-else`语句。如果`UISwitch`是打开的，则绘制线条；否则，显示一个指针来指示当开关打开时线条将开始出现的位置。这使得`DispatchQueue`的代码看起来像这样：\n\
  \n```swift\nDispatchQueue.main.async {\n    if self.switchDraw.isOn {\n        //\
  \ 绘制线条\n    } else {\n        // 显示指针\n    }\n}\n```\n\n#### 绘制绿线\n\n首先，让我们添加在增强现实视图中绘制绿线的代码。第一步是创建一个节点并将其定义为球体，如下所示：\n\
  \n```swift\nlet drawNode = SCNNode()\ndrawNode.geometry = SCNSphere(radius: 0.01)\n\
  ```\n\n接下来，我们将球体着色为绿色，并将其放置在相机当前位置（结合位置和旋转），使其出现在增强现实视图的中心：\n\n```swift\ndrawNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.green\ndrawNode.position = currentPosition\n```\n\n然后，我们需要将这个绿色球体添加到根节点（世界原点），如下所示：\n\
  \n```swift\nself.sceneView.scene.rootNode.addChildNode(drawNode)\n```\n\n`DispatchQueue`的`if`部分应如下所示：\n\
  \n```swift\nif self.switchDraw.isOn {\n    let drawNode = SCNNode()\n    drawNode.geometry\
  \ = SCNSphere(radius: 0.01)\n    drawNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.green\n    drawNode.position = currentPosition\n    self.sceneView.scene.rootNode.addChildNode(drawNode)\n\
  }\n```\n\n这段代码在屏幕上连续绘制绿色球体，创造出线条的错觉。当然，只有当`UISwitch`设置为 **打开** 时，应用才会绘制这条绿线。\n\n\
  #### 显示指针\n\n如果用户将`UISwitch`设置为 **关闭**，则`if-else`语句的`else`部分必须运行，显示指针。\n\n让我们将指针创建为一个红色球体，如下所示：\n\
  \n```swift\nlet point = SCNNode()\npoint.geometry = SCNSphere(radius: 0.005)\npoint.position\
  \ = currentPosition\npoint.geometry?.firstMaterial?.diffuse.contents = UIColor.red\n\
  ```\n\n现在我们需要将其添加到根节点：\n\n```swift\nself.sceneView.scene.rootNode.addChildNode(point)\n\
  ```\n\n与绘制绿线类似，如果仅这样做，这段代码将显示一个红色球体并绘制一条线，这不是我们想要的。问题是当用户移动相机时，应用会不断绘制红色球体，从而形成一条线的错觉。\n\
  \n我们需要的是绘制一个红色球体，然后删除前一个红色球体，这样就不会在屏幕上创建一条线。为此，需要以下代码：\n\n```swift\nself.sceneView.scene.rootNode.enumerateChildNodes({\
  \ (node, _) in\n    if node.name == \"aiming point\" {\n        node.removeFromParentNode()\n\
  \    }\n})\n```\n\n`enumerateChildNodes`创建一个循环，检查连接到根节点的每个节点。然后在这个循环内部，我们使用`removeFromParentNode`命令来移除节点。这将删除连接到根节点的所有节点，包括我们的绿线，因此我们需要一个`if`语句来检查节点是否名为\
  \ `“aiming point”`。如果是，则只删除该节点。\n\n这意味着我们需要将指针节点命名为 `“aiming point”`：\n\n```swift\n\
  point.name = \"aiming point\"\n```\n\n#### 完整的 DispatchQueue 代码\n\n完整的`DispatchQueue`代码应如下所示：\n\
  \n```swift\nDispatchQueue.main.async {\n    if self.switchDraw.isOn {\n        let\
  \ drawNode = SCNNode()\n        drawNode.geometry = SCNSphere(radius: 0.01)\n  \
  \      drawNode.geometry?.firstMaterial?.diffuse.contents = UIColor.green\n    \
  \    drawNode.position = currentPosition\n        self.sceneView.scene.rootNode.addChildNode(drawNode)\n\
  \    } else {\n        let point = SCNNode()\n        point.name = \"aiming point\"\
  \n        point.geometry = SCNSphere(radius: 0.005)\n        point.position = currentPosition\n\
  \        point.geometry?.firstMaterial?.diffuse.contents = UIColor.red\n       \
  \ self.sceneView.scene.rootNode.enumerateChildNodes({ (node, _) in\n           \
  \ if node.name == \"aiming point\" {\n                node.removeFromParentNode()\n\
  \            }\n        })\n        self.sceneView.scene.rootNode.addChildNode(point)\n\
  \    }\n}\n```\n\n## 完整的 ViewController.swift 文件\n\n现在整个`ViewController.swift`文件应如下所示：\n\
  \n```swift\nimport UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController:\
  \ UIViewController, ARSCNViewDelegate {\n\n    @IBOutlet var sceneView: ARSCNView!\n\
  \    @IBOutlet var switchDraw: UISwitch!\n    let configuration = ARWorldTrackingConfiguration()\n\
  \n    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
  \ any additional setup after loading the view, typically from a nib.\n        sceneView.delegate\
  \ = self\n        sceneView.showsStatistics = true\n        sceneView.debugOptions\
  \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n \
  \   }\n\n    override func viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
  \        sceneView.session.run(configuration)\n    }\n\n    func renderer(_ renderer:\
  \ SCNSceneRenderer, willRenderScene scene: SCNScene, atTime time: TimeInterval)\
  \ {\n        guard let pov = sceneView.pointOfView else {return}\n        let transform\
  \ = pov.transform\n        let rotation = SCNVector3(-transform.m31, -transform.m32,\
  \ -transform.m33)\n        let location = SCNVector3(transform.m41, transform.m42,\
  \ transform.m43)\n        let currentPosition = SCNVector3(rotation.x + location.x,\
  \ rotation.y + location.y, rotation.z + location.z)\n\n        DispatchQueue.main.async\
  \ {\n            if self.switchDraw.isOn {\n                let drawNode = SCNNode()\n\
  \                drawNode.geometry = SCNSphere(radius: 0.01)\n                drawNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.green\n                drawNode.position = currentPosition\n       \
  \         self.sceneView.scene.rootNode.addChildNode(drawNode)\n            } else\
  \ {\n                let point = SCNNode()\n                point.name = \"aiming\
  \ point\"\n                point.geometry = SCNSphere(radius: 0.005)\n         \
  \       point.position = currentPosition\n                point.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.red\n                self.sceneView.scene.rootNode.enumerateChildNodes({\
  \ (node, _) in\n                    if node.name == \"aiming point\" {\n       \
  \                 node.removeFromParentNode()\n                    }\n         \
  \       })\n                self.sceneView.scene.rootNode.addChildNode(point)\n\
  \            }\n        }\n    }\n}\n```\n\n## 运行应用\n\n修改你的`ViewController.swift`文件中的代码以匹配上述代码。然后，要查看应用运行，请执行以下操作：\n\
  \n![../images/469983_1_En_8_Chapter/469983_1_En_8_Fig4_HTML.jpg](img/469983_1_En_8_Fig4_HTML.jpg)\n\
  \n**图 8-4：在增强现实中绘制线条**\n\n1.  通过 USB 线将 iOS 设备连接到 Mac。\n2.  点击 **运行** 按钮或选择 **产品**\
  \ ➤ **运行**。\n\n\n\n"
- "# 3. 应用程序运行步骤\n\n当应用运行时，移动 iOS 设备以查看屏幕中央的红色指针。\n\n点击`UISwitch`将其打开。\n\n移动 iOS 设备，注意到现在会绘制一条绿线。\n\
  \n点击`UISwitch`将其关闭。\n\n将 iOS 设备移动到一个新的位置。\n\n点击`UISwitch`将其打开。\n\n移动 iOS 设备以绘制另一条独立的绿线（见图\
  \ 8-4）。\n\n点击停止按钮或选择 Product ➤ Stop。\n\n### 功能完善\n\n为了完善这个应用，我们还需要一个功能。您可能注意到，您可以打开`UISwitch`来绘制绿线，然后再次关闭`UISwitch`将相机移动到新位置。现在，如果您再次打开`UISwitch`，可以在增强现实视图的其他地方绘制绿线。\n\
  \n然而，如果我们不断添加绿线，最终屏幕会充满绿线。因此，让我们添加一个简单的功能来清除整个屏幕，步骤如下：\n\n1.  选择 Editor ➤ Resolve\
  \ AutoLayout Issues ➤ Reset to Suggested Constraints。\n2.  点击“显示助理编辑器”图标或选择 View\
  \ ➤ Assistant Editor ➤ Show Assistant Editor。Xcode 并排显示您的`Main.storyboard`文件和`ViewController.swift`文件。\n\
  3.  将鼠标指针悬停在`UIButton`上，按住 Control 键，然后 Ctrl-拖拽到 IBOutlet 下方。出现一个弹出窗口。\n4.  在 Name\
  \ 文本字段中键入`clearButton`。\n5.  点击 Connect 按钮。Xcode 创建一个 IBOutlet，如下所示：\n\n![](img/469983_1_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5：更改 UIButton 的背景颜色\n\n1.  在 Navigator 窗格中点击`Main.storyboard`文件。\n2.  向用户界面添加一个`UIButton`。\n\
  3.  将`UIButton`的标题更改为“Clear”。您可能还想调整按钮大小使其更宽。\n4.  点击“显示属性检查器”图标或选择 View ➤ Inspectors\
  \ ➤ Show Attributes Inspector。\n5.  将`UIButton`的背景颜色更改为白色（见图 8-5）。\n6.  点击“显示标准编辑器”图标或选择\
  \ View ➤ Standard Editor ➤ Show Standard Editor。\n7.  点击`ViewController.swift`文件。\n\
  8.  将以下代码添加到`DispatchQueue`代码的底部：\n\n```\nif self.clearButton.isHighlighted {\n\
  \    self.sceneView.scene.rootNode.enumerateChildNodes({ (node, _) in\n        node.removeFromParentNode()\n\
  \    })\n}\n```\n\n完整的`ViewController.swift`文件应如下所示：\n\n```\nimport UIKit\nimport\
  \ SceneKit\nimport ARKit\nclass ViewController: UIViewController, ARSCNViewDelegate\
  \ {\n    @IBOutlet var sceneView: ARSCNView!\n    @IBOutlet var switchDraw: UISwitch!\n\
  \    @IBOutlet var clearButton: UIButton!\n    let configuration = ARWorldTrackingConfiguration()\n\
  \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do any\
  \ additional setup after loading the view, typically from a nib.\n        sceneView.delegate\
  \ = self\n        sceneView.showsStatistics = true\n        sceneView.debugOptions\
  \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n \
  \   }\n    override func viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
  \        sceneView.session.run(configuration)\n    }\n    func renderer(_ renderer:\
  \ SCNSceneRenderer, willRenderScene scene: SCNScene, atTime time: TimeInterval)\
  \ {\n        guard let pov = sceneView.pointOfView else {return}\n        let transform\
  \ = pov.transform\n        let rotation = SCNVector3(-transform.m31, -transform.m32,\
  \ -transform.m33)\n        let location = SCNVector3(transform.m41, transform.m42,\
  \ transform.m43)\n        let currentPosition = SCNVector3(rotation.x + location.x,\
  \ rotation.y + location.y, rotation.z + location.z)\n        DispatchQueue.main.async\
  \ {\n            if self.switchDraw.isOn {\n                let drawNode = SCNNode()\n\
  \                drawNode.geometry = SCNSphere(radius: 0.01)\n                drawNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.green\n                drawNode.position = currentPosition\n       \
  \         self.sceneView.scene.rootNode.addChildNode(drawNode)\n            } else\
  \ {\n                let point = SCNNode()\n                point.name = \"aiming\
  \ point\"\n                point.geometry = SCNSphere(radius: 0.005)\n         \
  \       point.position = currentPosition\n                point.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.red\n                self.sceneView.scene.rootNode.enumerateChildNodes({\
  \ (node, _) in\n                    if node.name == \"aiming point\" {\n       \
  \                 node.removeFromParentNode()\n                    }\n         \
  \       })\n                self.sceneView.scene.rootNode.addChildNode(point)\n\
  \            }\n            if self.clearButton.isHighlighted {\n              \
  \  self.sceneView.scene.rootNode.enumerateChildNodes({ (node, _) in\n          \
  \          node.removeFromParentNode()\n                })\n            }\n    \
  \    }\n    }\n}\n```\n\n### 运行应用程序\n\n要查看应用程序的运行，请执行以下操作：\n\n1.  通过 USB 线缆将 iOS\
  \ 设备连接到 Macintosh。\n2.  点击运行按钮或选择 Product ➤ Run。\n3.  当应用运行时，移动 iOS 设备以查看屏幕中央的红色指针。\n\
  4.  点击`UISwitch`将其打开。\n5.  移动 iOS 设备，注意到现在会绘制一条绿线。\n6.  点击`UISwitch`将其关闭。\n7.  将\
  \ iOS 设备移动到一个新的位置。\n8.  点击`UISwitch`将其打开。\n9.  移动 iOS 设备以绘制另一条独立的绿线。\n10. 点击 Clear\
  \ 按钮。注意，应用现在会清除您绘制的所有绿线。\n11. 点击停止按钮或选择 Product ➤ Stop。\n\n## 总结\n\n增强现实应用依赖于 iOS\
  \ 设备中的摄像头。此摄像头通常以每秒 60 帧（fps）的速度刷新图像。您可以通过添加这行代码来查看应用每秒显示的帧数：\n\n```\nsceneView.showsStatistics\
  \ = true)\n```\n\n每次应用更新显示图像时，`renderer`函数都会运行，即每秒 60 次。通过在`renderer`函数内绘制对象，您的应用可以持续绘制图像。在我们的示例应用中，我们绘制了一个球体，但由于`renderer`函数持续绘制球体，它绘制了多个球体。当用户移动摄像头时，这会绘制多个绿色球体，从而产生绘制线条的错觉。\n\
  \n要清除虚拟对象，我们可以使用`enumerateChildNodes`循环来检查每个节点：\n\n```\nself.sceneView.scene.rootNode.enumerateChildNodes({\
  \ (node, _) in\n})\n```\n\n为了避免移除所有节点，我们可以为节点命名，然后使用`if`语句仅移除某些指定名称的节点。在增强现实视图中进行绘制需要获取相机的当前旋转和位置，以便应用可以在用户指向摄像头的任何地方绘制虚拟对象。\n\
  \n\n\n"
- "# 9. 为增强现实添加触控手势\n\n到目前为止，我们已经创建了在屏幕上显示虚拟对象的增强现实应用。真正让增强现实更具临场感的是，你能够与虚拟对象进行交互。\n\
  \n当然，你无法用手直接触摸或操控任何虚拟对象，但你可以通过 iOS 屏幕上的增强现实视图来触摸和操控虚拟对象。这意味着你可以用指尖在屏幕上点击、拖动和操作物品。与增强现实的交互能创造出更强的真实感。\n\
  \n可用的手势类型包括以下几种：\n*   **轻点**——在屏幕上短暂触碰后抬起手指\n*   **长按**——用手指按压屏幕并保持一段时间\n*   **轻扫**——用手指在某个区域内向左或向右滑动\n\
  *   **平移**——用手指按压屏幕，然后在屏幕上滑动\n*   **捏合**——一种双指手势，将两个指尖并拢或分开\n*   **旋转**——一种双指手势，使两个指尖做圆周运动\n\
  \n要与增强现实中的虚拟对象交互，我们必须首先检测触控手势，例如轻点或轻扫。一旦能检测到触控手势，下一步就是判断该手势是否触碰到了虚拟对象。\n\n要在增强现实视图中检测触控手势，我们需要按照以下步骤创建一个新的\
  \ Xcode 项目：\n1.  启动 Xcode。（请确保你使用的是 Xcode 10 或更高版本。）\n2.  选择“文件”➤“新建”➤“项目”。Xcode\
  \ 会要求你选择一个模板。\n3.  点击“iOS”类别。\n4.  点击“单视图应用”图标，然后点击“下一步”按钮。Xcode 会要求输入产品名称、组织名称、组织标识符和内容技术。\n\
  5.  点击“产品名称”文本框，为你的项目输入一个描述性名称，例如 `TouchGesture`。（具体名称并不重要。）\n6.  点击“下一步”按钮。Xcode\
  \ 会询问你想要将项目存储在何处。\n7.  选择一个文件夹并点击“创建”按钮。Xcode 将创建一个 iOS 项目。\n\n现在按照以下步骤修改 `Info.plist`\
  \ 文件，以允许访问摄像头并使用 ARKit：\n1.  在导航器面板中点击 `Info.plist` 文件。Xcode 会显示键、类型和值的列表。\n2. \
  \ 点击展开三角形以展开“必需设备功能”类别，显示“Item 0”。\n3.  将鼠标指针悬停在“Item 0”上，会出现一个加号 (`+`) 图标。\n4.\
  \  点击此加号 (`+`) 图标，将显示一个空白的“Item 1”。\n5.  在“Item 1”行的“值”类别下输入 `arkit`。\n6.  将鼠标指针悬停在最后一行上，会出现一个加号\
  \ (`+`) 图标。\n7.  点击加号 (`+`) 图标以创建新行。会出现一个弹出菜单。\n8.  选择“Privacy – Camera Usage Description”（隐私\
  \ - 相机使用说明）。\n9.  在“Privacy – Camera Usage Description”行的“值”类别下输入 `AR needs to use\
  \ the camera`。\n\n现在按照以下步骤修改 `ViewController.swift` 文件以使用 ARKit 和 SceneKit：\n1.\
  \  在导航器面板中点击 `ViewController.swift` 文件。\n2.  编辑 `ViewController.swift` 文件，使其内容如下：\n\
  \n```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController: UIViewController,\
  \ ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
  \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do any\
  \ additional setup after loading the view, typically from a nib.\n    }\n}\n```\n\
  \n要在我们的应用中查看增强现实，添加一个 ARKit SceneKit 视图 (`ARSCNView`)，使用户界面类似于图 9-1。\n\n![../images/469983_1_En_9_Chapter/469983_1_En_9_Fig1_HTML.jpg](img/469983_1_En_9_Fig1_HTML.jpg)\n\
  图 9-1\n用户界面包含一个单独的 ARSCNView\n\n设计好用户界面后，需要添加约束。要添加约束，请选择“Editor”（编辑器）➤“Resolve\
  \ Auto Layout Issues”（解决自动布局问题）➤“Reset to Suggested Constraints”（重置为建议的约束），此选项位于菜单下半部分的“All\
  \ Views in Container”（容器中的所有视图）类别下。\n\n下一步是将用户界面项连接到 `ViewController.swift` 文件中的\
  \ Swift 代码。为此，请按照以下步骤操作：\n1.  在导航器面板中点击 `Main.storyboard` 文件。\n2.  点击“Assistant\
  \ Editor”（辅助编辑器）图标，或选择“View”（视图）➤“Assistant Editor”（辅助编辑器）➤“Show Assistant Editor”（显示辅助编辑器），以并排显示\
  \ `Main.storyboard` 和 `ViewController.swift` 文件。\n3.  将鼠标指针悬停在 ARSCNView 上，按住 Control\
  \ 键，然后在 `class ViewController` 行下方进行 Ctrl-拖动。\n4.  松开 Control 键和鼠标左键。会出现一个弹出菜单。\n\
  5.  点击“Name”（名称）文本框，输入 `sceneView`，然后点击“Connect”（连接）按钮。Xcode 将创建一个 IBOutlet，如下所示：\n\
  \n```\n@IBOutlet var sceneView: ARSCNView!\n```\n\n6.  编辑 `viewDidLoad` 函数，使其内容如下：\n\
  \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional\
  \ setup after loading the view, typically from a nib.\n    sceneView.delegate =\
  \ self\n    sceneView.showsStatistics = true\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
  \ ARSCNDebugOptions.showFeaturePoints]\n}\n```\n\n7.  编辑 `viewWillAppear` 函数，使其内容如下：\n\
  \n```\noverride func viewWillAppear(_ animated: Bool) {\n    super.viewWillAppear(animated)\n\
  \    sceneView.session.run(configuration)\n}\n```\n\n\n\n## 识别触摸手势\n\n在应用中识别触摸手势包含三步：\n\
  \n*   创建一个函数，用于在识别到触摸手势时进行处理\n*   定义一个`UIGestureRecognizer`类，用于指定处理触摸手势的函数\n*  \
  \ 将触摸手势识别器添加到 ARKit 场景视图中\n\n首先，你需要创建一个函数，当你的应用识别到触摸手势时运行该函数。与其他函数不同，这个触摸手势处理函数前面需要加上`@objc`关键字。这允许该函数访问用于创建\
  \ Apple 框架的 Objective-C 代码，其中一些框架仍在使用 Objective-C。处理触摸手势的函数基本结构如下所示，其中`handleTap`是你可以任意选择的函数名：\n\
  \n```\n@objc func handleTap() {\n}\n```\n\n其次，你需要使用`UITapGestureRecognizer`类来定义将处理点击手势的函数，如下所示：\n\
  \n```\nlet tapGesture = UITapGestureRecognizer(target: self, action: #selector(handleTap))\n\
  ```\n\n如果你想检测其他类型的手势，例如旋转或平移，则需要使用不同的类，例如`UIRotationGestureRecognizer`或`UIPanGestureRecognizer`。\n\
  \n`#selector`关键字标识了将处理触摸手势的函数名。实际名称（例如`tapGesture`）是任意的。\n\n最后，第三步是将手势识别器添加到增强现实场景中，如下所示：\n\
  \n```\nsceneView.addGestureRecognizer(tapGesture)\n```\n\n这段代码将触摸手势（例如`tapGesture`）添加到场景（`sceneView`）中，但两者都是你可以替换为其他任何名称的任意名称。然后，这行代码使得场景（`sceneView`）能够识别触摸手势并通过你定义的`@objc`函数进行处理。\n\
  \n检测触摸手势可以相当简单，让我们通过以下步骤来看看它是如何工作的：\n\n1.  在导航窗格中点击`Main.storyboard`文件，用户界面会出现。\n\
  2.  点击助手编辑器图标或选择 视图 ➤ 助手编辑器 ➤ 显示助手编辑器，以并排显示`Main.storyboard`和`ViewController.swift`文件。\n\
  3.  将鼠标指针移动到 ARSCNView 上，按住 Control 键，并按住 Control 键将鼠标拖动到`ViewController.swift`文件中的`class\
  \ ViewController`行下方。\n4.  释放 Control 键和鼠标左键。会弹出一个窗口。\n5.  点击名称文本字段，输入`sceneView`。\n\
  6.  点击连接按钮。Xcode 会创建一个如下所示的 IBOutlet：\n\n    ```\n    @IBOutlet var sceneView: ARSCNView!\n\
  \    ```\n\n7.  编辑`viewDidLoad`函数，使其看起来像这样：\n\n    ```\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        // 加载视图后（通常是从 nib 文件加载）进行任何其他设置。\n   \
  \     sceneView.delegate = self\n        sceneView.showsStatistics = true\n    \
  \    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
  \        let tapGesture = UITapGestureRecognizer(target: self, action: #selector(handleTap))\n\
  \        sceneView.addGestureRecognizer(tapGesture)\n    }\n    ```\n\n8.  在这个`viewDidLoad`函数下方，添加以下两个函数：\n\
  \n    ```\n    override func viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
  \        sceneView.session.run(configuration)\n    }\n    @objc func handleTap()\
  \ {\n        print (\"tap detected\")\n    }\n    ```\n\n9.  通过 USB 线将 iOS 设备连接到\
  \ Mac。\n10.  点击运行按钮或选择 产品 ➤ 运行。\n11.  当相机视图出现时，点击屏幕任意位置。请注意，每次点击屏幕时，Xcode 会在其窗口底部窗格打印\
  \ \"tap detected\"。\n12.  点击停止按钮或选择 产品 ➤ 停止。\n\n一旦应用能够识别增强现实视图上任意位置的点击，下一步就是检测这些点击手势何时发生在虚拟对象（如球体或盒子）上。\n\
  \n## 识别虚拟对象上的触摸手势\n\n一旦你能识别增强现实视图上的触摸手势，下一步就是识别这些触摸手势何时发生在虚拟对象上。为此，我们需要修改处理触摸手势的函数。目前它看起来像这样：\n\
  \n```\n@objc func handleTap() {\n}\n```\n\n我们需要稍微修改它，使函数接收关于用户实际在屏幕上点击了什么的信息：\n\n\
  ```\n@objc func handleTap(sender: UITapGestureRecognizer) {\n}\n```\n\n来自`UITapGestureRecognizer`的这则信息可以告诉我们用户是否点击了虚拟对象。首先，我们需要获取屏幕被点击区域或视图，如下所示：\n\
  \n```\nlet areaTapped = sender.view as! SCNView\n```\n\n一旦知道了被点击的区域，我们就需要获取该区域的实际坐标，如下所示：\n\
  \n```\nlet tappedCoordinates = sender.location(in: areaTapped)\n```\n\n现在我们需要使用一个名为`hitTest`的函数来确定在点击区域内是否存在任何虚拟对象。这个`hitTest`函数负责识别特定坐标集内的虚拟对象：\n\
  \n```\nlet hitTest = areaTapped.hitTest(tappedCoordinates)\n```\n\n我们需要一个`if-else`语句，根据`hitTest`是否识别出虚拟对象来做出响应：\n\
  \n```\nif hitTest.isEmpty {\n} else {\n}\n```\n\n如果`hitTest`函数未能识别出虚拟对象，`isEmpty`应为\
  \ true，所以我们在里面放一个简单的`print`语句来验证这一点：\n\n```\nif hitTest.isEmpty {\n    print (\"\
  Nothing\")\n} else {\n}\n```\n\n如果`hitTest`函数识别出一个虚拟对象，它会将此信息存储在一个数组中，因此我们需要从这个数组中检索第一项：\n\
  \n```\nlet results = hitTest.first!\n```\n\n现在我们将检索`hitTest`函数识别的虚拟对象的名称并打印它：\n\n\
  ```\nlet name = results.node.name\nprint(name ?? \"background\")\n```\n\n第二行的`print`语句要么打印找到的虚拟对象的名称，要么如果虚拟对象没有分配名称，则默认打印\
  \ \"background\"。这是因为`hitTest`函数并不总是准确的，所以如果你点击远离虚拟对象（如金字塔或盒子）的地方，它可能会将背景图像检测为虚拟对象。\n\
  \n完整的`handleTap`函数应如下所示：\n\n```\n@objc func handleTap(sender: UITapGestureRecognizer)\
  \ {\n    let areaTapped = sender.view as! SCNView\n    let tappedCoordinates = sender.location(in:\
  \ areaTapped)\n    let hitTest = areaTapped.hitTest(tappedCoordinates)\n    if hitTest.isEmpty\
  \ {\n        print (\"Nothing\")\n    } else {\n        let results = hitTest.first!\n\
  \        let name = results.node.name\n        print(name ?? \"background\")\n \
  \   }\n}\n```\n\n为了了解`hitTest`函数的工作原理，我们需要创建一个或多个虚拟对象，为每个虚拟对象指定一个名称，并将其放置在增强现实视图中。这意味着需要创建一个`addShapes`函数，如下所示：\n\
  \n```\nfunc addShapes() {\n    let node = SCNNode(geometry: SCNBox(width: 0.05,\
  \ height: 0.05, length: 0.05, chamferRadius: 0))\n    node.position = SCNVector3(0.1,0,-0.1)\n\
  \    node.geometry?.firstMaterial?.diffuse.contents = UIColor.blue\n    node.name\
  \ = \"box\"\n    sceneView.scene.rootNode.addChildNode(node)\n\n    let node2 =\
  \ SCNNode(geometry: SCNPyramid(width: 0.05, height: 0.06, length: 0.05))\n    node2.position\
  \ = SCNVector3(0.1,0.1,-0.1)\n    node2.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.red\n    node2.name = \"pyramid\"\n    sceneView.scene.rootNode.addChildNode(node2)\n\
  }\n```\n\n修改整个`ViewController.swift`文件，使其看起来像这样：\n\n\n\n```\nimport UIKit\nimport\
  \ SceneKit\nimport ARKit\nclass ViewController: UIViewController, ARSCNViewDelegate\
  \ {\n@IBOutlet var sceneView: ARSCNView!\nlet configuration = ARWorldTrackingConfiguration()\n\
  override func viewDidLoad() {\nsuper.viewDidLoad()\n// Do any additional setup after\
  \ loading the view, typically from a nib.\nsceneView.delegate = self\nsceneView.showsStatistics\
  \ = true\nsceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
  let tapGesture = UITapGestureRecognizer(target: self, action: #selector(handleTap))\n\
  sceneView.addGestureRecognizer(tapGesture)\naddShapes()\n}\noverride func viewWillAppear(_\
  \ animated: Bool) {\nsuper.viewWillAppear(animated)\nsceneView.session.run(configuration)\n\
  }\nfunc addShapes() {\nlet node = SCNNode(geometry: SCNBox(width: 0.05, height:\
  \ 0.05, length: 0.05, chamferRadius: 0))\nnode.position = SCNVector3(0.1,0,-0.1)\n\
  node.geometry?.firstMaterial?.diffuse.contents = UIColor.blue\nnode.name = \"box\"\
  \nsceneView.scene.rootNode.addChildNode(node)\nlet node2 = SCNNode(geometry: SCNPyramid(width:\
  \ 0.05, height: 0.06, length: 0.05))\nnode2.position = SCNVector3(0.1,0.1,-0.1)\n\
  node2.geometry?.firstMaterial?.diffuse.contents = UIColor.red\nnode2.name = \"pyramid\"\
  \nsceneView.scene.rootNode.addChildNode(node2)\n}\n@objc func handleTap(sender:\
  \ UITapGestureRecognizer) {\nlet areaTapped = sender.view as! SCNView\nlet tappedCoordinates\
  \ = sender.location(in: areaTapped)\nlet hitTest = areaTapped.hitTest(tappedCoordinates)\n\
  if hitTest.isEmpty {\nprint (\"Nothing\")\n} else {\nlet results = hitTest.first!\n\
  let name = results.node.name\nprint(name ?? \"background\")\n}\n}\n}\n```\n\n##\
  \ 测试应用\n\n请按照以下步骤测试此应用：\n\n1.  通过 USB 线将 iOS 设备连接到 Mac。\n2.  点击`Run`按钮或选择`Product`\
  \ ➤ `Run`。\n3.  点击屏幕任意位置。Xcode 底部的调试面板应显示“Nothing”或“background”。\n4.  点击金字塔。Xcode\
  \ 底部的调试面板应显示“pyramid”。\n5.  点击立方体。Xcode 底部的调试面板应显示“box”。请注意，每次点击金字塔或立方体时，你的应用都会按其名称识别。每次点击远离金字塔和立方体的位置时，应用会将其识别为“Nothing”或“background”。\n\
  6.  点击`Stop`按钮或选择`Product` ➤ `Stop`。\n\n## 识别虚拟物体上的滑动手势\n\n除了检测对虚拟物体的点击外，你可能还希望允许用户在虚拟物体上滑动。滑动手势可以包含一个或多个手指向上、下、左或右移动。对于你想要检测的每种滑动手势（上、下、左、右），你都必须单独定义一个`UISwipeGestureRecognizer`，如下所示：\n\
  \n```\nlet swipeRightGesture = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipe))\n\
  let swipeLeftGesture = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipe))\n\
  let swipeUpGesture = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipe))\n\
  let swipeDownGesture = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipe))\n\
  ```\n\n每个滑动手势识别器都可以定义相同的函数来处理滑动。在这些例子中，所有四个手势都由一个名为`handleSwipe`的函数处理。\n\n默认情况下，每个滑动手势只需要一个手指。如果你需要，可以通过定义`numberOfTouchesRequired`属性来要求两个或更多手指，例如：\n\
  \n```\nlet swipeRightGesture = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipe))\n\
  swipeRightGesture.direction = .right\nswipeRightGesture.numberOfTouchesRequired\
  \ = 2\n```\n\n如果你不定义`numberOfTouchesRequired`，Xcode 会默认为 1，即单指滑动。最重要的是，你必须为滑动手势定义一个方向并将其添加到场景中。因此，如果你想检测所有四个方向的滑动手势，你需要像这样单独定义每个滑动手势：\n\
  \n```\nlet swipeRightGesture = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipe))\n\
  swipeRightGesture.direction = .right\nsceneView.addGestureRecognizer(swipeRightGesture)\n\
  let swipeLeftGesture = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipe))\n\
  swipeLeftGesture.direction = .left\nsceneView.addGestureRecognizer(swipeLeftGesture)\n\
  let swipeUpGesture = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipe))\n\
  swipeUpGesture.direction = .up\nsceneView.addGestureRecognizer(swipeUpGesture)\n\
  let swipeDownGesture = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipe))\n\
  swipeDownGesture.direction = .down\nsceneView.addGestureRecognizer(swipeDownGesture)\n\
  ```\n\n定义了四个滑动手势后，下一步就是编写`handleSwipe`函数来响应滑动。在这个例子中，我们将检测滑动手势本身以及滑动手势发生的对象，例如虚拟物体。\n\
  \n`handleSwipe`函数需要接收`UISwipeGestureRecognizer`数据，如下所示：\n\n```\n@objc func handleSwipe(sender:\
  \ UISwipeGestureRecognizer) {\n}\n```\n\n现在我们需要通过接收视图、获取触摸区域的坐标，然后使用`hitTest`方法来识别用户在视图中的滑动位置：\n\
  \n```\n@objc func handleSwipe(sender: UISwipeGestureRecognizer) {\nlet areaSwiped\
  \ = sender.view as! SCNView\nlet tappedCoordinates = sender.location(in: areaSwiped)\n\
  let hitTest = areaSwiped.hitTest(tappedCoordinates)\n}\n```\n\n一旦我们获得了滑动的区域，就可以通过判断用户可能滑过了什么以及用户的滑动方向来做出响应，如下所示：\n\
  \n```\n@objc func handleSwipe(sender: UISwipeGestureRecognizer) {\nlet areaSwiped\
  \ = sender.view as! SCNView\nlet tappedCoordinates = sender.location(in: areaSwiped)\n\
  let hitTest = areaSwiped.hitTest(tappedCoordinates)\nif hitTest.isEmpty {\nprint\
  \ (\"Nothing\")\n} else {\nlet results = hitTest.first!\nlet name = results.node.name\n\
  print(name ?? \"background\")\n}\nswitch sender.direction {\ncase.up:\nprint(\"\
  Up\")\ncase .down:\nprint(\"Down\")\ncase .right:\nprint(\"Right\")\ncase .left:\n\
  print(\"Left\")\ndefault:\nbreak\n}\n}\n```\n\n## 测试滑动检测应用\n\n请按照以下步骤测试此应用：\n\n\
  1.  通过 USB 线将 iOS 设备连接到 Mac。\n2.  点击`Run`按钮或选择`Product` ➤ `Run`。\n3.  在屏幕上任意位置滑动。Xcode\
  \ 底部的调试面板应显示你滑动的方向。如果你滑过立方体或金字塔，则还应看到虚拟物体的名称。\n4.  在金字塔上滑动。Xcode 底部的调试面板应显示“pyramid”。\n\
  5.  在立方体上滑动。Xcode 底部的调试面板应显示“box”。请注意，每次滑过金字塔或立方体时，你的应用都会按其名称识别。每次在远离金字塔和立方体的位置滑动时，应用会将其识别为“Nothing”或“background”。\n\
  6.  点击`Stop`按钮或选择`Product` ➤ `Stop`。\n\n\n\n## 识别虚拟物体的平移手势\n\niOS 可以识别的另一种触摸手势是平移（pan），这本质上意味着将一个或多个指尖放在屏幕上并滑动它们。平移手势与轻扫（swipe）手势类似，但轻扫手势是向上/下或向右/左滑动。平移手势也可以沿直线移动，但也可以是曲线移动。\n\
  \n创建平移手势识别器需要定义一个函数来处理平移手势，然后将该手势分配给场景，如下所示：\n\n```\nlet panGesture = UIPanGestureRecognizer(target:\
  \ self, action: #selector(handlePan))\nsceneView.addGestureRecognizer(panGesture)\n\
  ```\n\n为了进一步定制平移手势，我们可以定义开始平移所需的最少指尖数量以及最多数量。因此，如果我们想在平移手势中检测一根、两根或三根手指，我们可以将 `minimumNumberOfTouches`\
  \ 定义为 `1`，将 `maximumNumberOfTouches` 定义为 `3`，如下所示：\n\n```\npanGesture.maximumNumberOfTouches\
  \ = 3\npanGesture.minimumNumberOfTouches = 1\n```\n\n如果我们不定义这些属性，Xcode 将简单地允许任意数量的指尖（至少一个）来发起平移手势。\n\
  \n处理平移手势的函数可以对平移手势的三个部分做出响应：\n\n*   **位置（Location）** —— 平移手势在 iOS 设备屏幕上开始的位置，其中左上角是原点\
  \ (0, 0)\n*   **速度（Velocity）** —— 平移手势在 x 轴和 y 轴上移动的速度，以点/秒为单位\n*   **位移（Translation）**\
  \ —— 平移手势在 x 轴和 y 轴上移动的距离\n\n我们可以在一个处理平移手势的函数中获取位置、速度和位移信息，如下所示：\n\n```\n@objc func\
  \ handlePan(sender: UIPanGestureRecognizer) {\nlet location = sender.location(in:\
  \ view)\nlet velocity = sender.velocity(in: view)\nlet translation = sender.translation(in:\
  \ view)\n}\n```\n\n然后我们可以像这样获取每个项的 x 和 y 值：\n\n```\nprint(location.x, location.y)\n\
  print(velocity.x, velocity.y)\nprint(translation.x, translation.y)\n```\n\n对于我们的应用程序，我们将只使用\
  \ `translation` 属性来识别平移手势移动了多远。我们需要识别平移手势是否发生在虚拟对象上，所以我们需要获取平移经过的坐标，如下所示：\n\n```\n\
  let areaPanned = sender.view as! SCNView\nlet tappedCoordinates = sender.location(in:\
  \ areaPanned)\nlet hitTest = areaPanned.hitTest(tappedCoordinates)\n```\n\n然后我们需要检查平移手势是否发生在盒子或金字塔上，如下所示：\n\
  \n```\nif hitTest.isEmpty {\nprint (\"Nothing\")\n} else {\nlet results = hitTest.first!\n\
  let name = results.node.name\nprint(name ?? \"background\")\nif sender.state ==\
  \ .began {\nprint(\"Gesture began\")\n} else if sender.state == .changed {\nprint(\"\
  Gesture is changing\")\nprint(translation.x, translation.y)\n} else if sender.state\
  \ == .ended {\nprint(\"Gesture ended\")\n}\n}\n```\n\n整个 `ViewController.swift`\
  \ 代码应该如下所示：\n\n```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController:\
  \ UIViewController, ARSCNViewDelegate {\n@IBOutlet var sceneView: ARSCNView!\nlet\
