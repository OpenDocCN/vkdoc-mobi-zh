  8.  在`viewWillAppear`函数下方输入以下代码：\n    ```\n    func showShape() {\n        let plane\
  \ = SCNPlane(width: 0.75, height: 0.75)\n        plane.firstMaterial?.diffuse.contents\
  \ = UIColor.yellow\n        let node = SCNNode()\n        node.geometry = plane\n\
  \        node.position = SCNVector3(0, 0, -0.3)\n        sceneView.scene.rootNode.addChildNode(node)\n\
