  if hitTest.isEmpty {\nprint (\"Nothing\")\n} else {\nlet results = hitTest.first!\n\
  let name = results.node.name\nprint(name ?? \"background\")\n}\nswitch sender.direction\
  \ {\ncase.up:\nprint(\"Up\")\ncase .down:\nprint(\"Down\")\ncase .right:\nprint(\"\
  Right\")\ncase .left:\nprint(\"Left\")\ndefault:\nbreak\n}\n}\n@objc func handlePan(sender:\
