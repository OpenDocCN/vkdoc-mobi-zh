- "# 使用单视图 App 模板创建增强现实应用\n\n增强现实 App 模板提供了显示增强现实所需的基础 Swift 代码。不过，你也可以不使用增强现实 App\
  \ 模板，而是改用简单的单视图 App 模板来创建增强现实应用。通过单视图 App 模板创建增强现实应用，你能更清楚地了解需要编写哪些代码以及需要为任意应用添加哪些用户界面元素来赋予其增强现实功能。\n\
  \n1.  启动 Xcode。（请确保你使用的是 Xcode 10 或更高版本。）\n2.  选择“文件”➤“新建”➤“项目”。Xcode 会要求你选择一个模板（见图\
  \ 2-1）。\n3.  点击“单视图 App”图标，然后点击“下一步”按钮。Xcode 会要求提供产品名称、组织名称、组织标识符以及内容技术（见图 2-2）。确保所有复选框（如“使用\
  \ Core Data”或“包含单元测试”等附加选项）均未勾选。\n4.  点击“产品名称”文本框，为你的项目输入一个描述性名称，例如`ARExample2`。（具体名称无关紧要，但确保它与你在增强现实\
  \ App 模板中创建的项目的名称不同。）\n5.  点击“下一步”按钮。Xcode 会询问你希望将项目存储在哪里。\n6.  选择一个文件夹，然后点击“创建”按钮。Xcode\
  \ 会创建一个可以立即运行的基础 iOS 项目。\n\n至此，你已拥有一个基础 iOS 应用，但它不具备任何增强现实功能。要为应用添加增强现实功能，我们需要编写\
  \ Swift 代码、修改用户界面，并在`Info.plist`文件中定义设置，以允许访问摄像头并使其仅在兼容 ARKit 的 iOS 设备（如 iPad Pro\
  \ 或 iPhone 6s 及更高版本）上运行。\n\n首先，我们需要确保 iOS 应用能够访问 ARKit 框架并使用摄像头。为此，我们需要修改`Info.plist`文件。\n\
  1.  在导航器窗格中点击`Info.plist`文件。Xcode 会显示键、类型和值的列表。\n2.  点击展开三角形以展开“必需设备功能”类别，显示“项目\
  \ 0”。\n3.  将鼠标指针移到“项目 0”上，显示一个加号（`+`）图标。\n4.  点击此加号（`+`）图标以显示一个空白的“项目 1”。\n5.  在“项目\
  \ 1”行的“值”类别下输入`arkit`（见图 2-10）。\n6.  将鼠标指针移到最后一行，显示一个加号（`+`）图标。\n7.  点击加号（`+`）图标以创建一个新行。此时会弹出一个菜单。\n\
  8.  选择“隐私 - 相机使用说明”，如图 2-11 所示。\n9.  在“隐私 - 相机使用说明”行的“值”类别下输入`AR needs to use the\
  \ camera`。\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig11_HTML.jpg](img/469983_1_En_2_Fig11_HTML.jpg)\n\
  \n**图 2-11**  \n“隐私 - 相机使用说明”这一行允许你的应用访问 iOS 设备的摄像头\n\n在`Info.plist`文件中定义了`arkit`和“隐私\
  \ - 相机使用说明”后，我们的应用现在可以访问 ARKit 并使用 iOS 设备的摄像头了。下一步是修改`ViewController.swift`文件并编写\
  \ Swift 代码来显示增强现实。\n\n## 修改`ViewController.swift`文件\n\n1.  在 Xcode 的导航器窗格中点击`ViewController.swift`文件。\n\
  2.  在`Import UIKit`一行下方添加以下两行代码，如下所示：\n\n    ```\n    import SceneKit\n    import\
  \ ARKit\n    ```\n\n3.  修改`class ViewController`这一行，添加`ARSCNViewDelegate`，如下所示：\n\
  \n    ```\n    class ViewController: UIViewController, ARSCNViewDelegate {\n   \
  \ ```\n\n4.  在`ViewController.swift`文件的末尾，添加`viewWillAppear`和`viewWillDisappear`函数，如下所示：\n\
  \n    ```\n    override func viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
  \        let configuration = ARWorldTrackingConfiguration()\n        sceneView.session.run(configuration)\n\
  \    }\n    override func viewWillDisappear(_ animated: Bool) {\n        super.viewWillDisappear(animated)\n\
  \        sceneView.session.pause()\n    }\n    ```\n\n在这段代码中，我们引用了`sceneView`，但它尚未定义。这个`sceneView`变量名将代表我们的应用中用于显示增强现实的用户界面视图。用于显示增强现实的用户界面对象被称为“ARKit\
  \ 场景视图”。\n\n## 添加 ARKit 场景视图\n\n要添加 ARKit 场景视图对象，我们需要将其拖拽到`Main.storyboard`文件中，并在`ViewController.swift`文件中为其创建一个\
  \ IBOutlet。具体步骤如下：\n\n1.  在导航器窗格中点击`Main.storyboard`文件。\n2.  点击“视图为”选项，为故事板选择不同的\
  \ iOS 设备（见图 2-12）。\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig12_HTML.jpg](img/469983_1_En_2_Fig12_HTML.jpg)\n\
  **图 2-12**  \n“视图为”选项允许你为故事板选择不同的 iOS 设备\n3.  点击“对象库”图标以显示“对象库”窗口（见图 2-13）。\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig13_HTML.jpg](img/469983_1_En_2_Fig13_HTML.jpg)\n\
  **图 2-13**  \n“对象库”图标可打开“对象库”窗口\n4.  点击“对象库”窗口顶部的搜索字段，输入`ARKit`。“对象库”窗口会显示所有可用的\
  \ ARKit 对象，如图 2-14 所示。\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig14_HTML.jpg](img/469983_1_En_2_Fig14_HTML.jpg)\n\
  **图 2-14**  \n在“对象库”窗口中显示 ARKit 对象\n5.  将“ARKit SceneKit 视图”从“对象库”拖拽到故事板上。\n6. \
  \ 在故事板上调整“ARKit SceneKit 视图”的大小，如图 2-15 所示。“ARKit SceneKit 视图”的具体大小和位置并不重要，但请确保将其设置得足够大，因为该视图的大小决定了通过\
  \ iOS 设备摄像头观看时图像的显示尺寸。\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig15_HTML.jpg](img/469983_1_En_2_Fig15_HTML.jpg)\n\
  **图 2-15**  \n调整 ARKit SceneKit 视图的大小\n7.  点击“ARKit SceneKit 视图”将其选中，然后选择“编辑器”➤“解决自动布局问题”➤“重置为建议的约束”。Xcode\
  \ 会添加约束，确保无论用户手持 iOS 设备的尺寸或方向如何，你的“ARKit SceneKit 视图”都能正确对齐。\n8.  点击“显示辅助编辑器”图标，如图\
  \ 2-16 所示，或者选择“视图”➤“辅助编辑器”➤“使用辅助编辑器”。Xcode 会并排显示`ViewController.swift`文件和故事板。\n\
  ![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig16_HTML.jpg](img/469983_1_En_2_Fig16_HTML.jpg)\n\
  **图 2-16**  \n“显示辅助编辑器”图标允许你同时查看故事板和 Swift 控制器文件\n9.  将鼠标移到“ARKit SceneKit 视图”上，按住\
  \ Control 键，然后将鼠标拖拽到`class ViewController`这一行的下方，如图 2-17 所示。\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig17_HTML.jpg](img/469983_1_En_2_Fig17_HTML.jpg)\n\
  **图 2-17**  \n从 ARKit SceneKit 视图 Control 拖拽到 ViewController.swift 文件\n10. 松开 Control\
  \ 键和鼠标。Xcode 会显示一个弹出菜单，用于定义 IBOutlet 的名称，如图 2-18 所示。\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig18_HTML.jpg](img/469983_1_En_2_Fig18_HTML.jpg)\n\
  **图 2-18**  \n为 IBOutlet 定义名称\n11. 点击“名称”字段，输入`sceneView`，然后按 Return 键。Xcode 会在`ViewController.swift`文件中创建一个\
  \ IBOutlet。\n\n\n\n"
- "# 在 Xcode 中导入并使用 COLLADA (.dae) 文件\n\n## 准备 Swift 代码与用户界面\n\n1.  在 Xcode 的导航器窗格中点击`Main.storyboard`文件。在故事板屏幕底部，可以点击“View\
  \ As”来更改显示的 iOS 设备，如图 2-12 所示。\n2.  点击“使用标准编辑器”图标或选择 视图 ➤ 标准编辑器 ➤ 使用标准编辑器。\n3. \
  \ 在导航器窗格中点击`ViewController.swift`文件。Xcode 将显示存储在`ViewController.swift`文件中的 Swift\
  \ 代码。\n4.  编辑`viewDidLoad`函数如下：\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
  \    sceneView.delegate = self\n    sceneView.showsStatistics = true\n    let scene\
  \ = SCNScene(named: \"\")!\n    sceneView.scene = scene\n}\n```\n\n```\n@IBOutlet\
  \ var sceneView: ARSCNView!\n```\n\n这些代码修改基本上复制了 ARKit iOS 模板。然而，我们仍然需要一个对象放置在我们的增强现实视图中。当我们使用增强现实模板创建应用时，模板包含一个`ship.scn`文件（`.scn`文件扩展名代表\
  \ SceneKit）。\n\n我们最初需要的是存储在 `.dae` COLLADA 文件格式中的文件（COLLADA 代表协作设计活动）。此文件格式被用作共享三维程序图形设计的标准文件格式。\n\
  \n要查找 `.dae` COLLADA 文件，请访问你喜爱的搜索引擎，搜索可以下载的“`.dae` 公有领域”文件。（对于有艺术倾向的用户，你可以使用图形编辑器（例如免费的\
  \ Blender 程序，可从 [`www.blender.org`](http://www.blender.org) 获取）创建自己的三维对象。）大多数 COLLADA\
  \ 文件包含一个定义对象形状的 `.dae` 文件和一个定义该形状外部设计的纹理文件。提供免费（和付费）COLLADA 文件的两个网站包括 Free3D ([`https://free3d.com`](https://free3d.com))\
  \ 和 TurboSquid ([`www.turbosquid.com`](http://www.turbosquid.com))。\n\n下载 `.dae`\
  \ COLLADA 文件及其任何伴随的纹理文件后，必须创建一个特殊的 `scnassets` 文件夹来存储这些图像。要创建 `scnassets` 文件夹，请按照以下步骤操作：\n\
  \n1.  选择 文件 ➤ 新建 ➤ 文件。Xcode 显示不同的文件模板。\n2.  点击模板窗口顶部的 iOS，向下滚动并在 Resource 类别下点击\
  \ SceneKit Catalog 图标，如图 2-19 所示。\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig19_HTML.jpg](img/469983_1_En_2_Fig19_HTML.jpg)\n\
  \n图 2-19\n选择 SceneKit Catalog 图标\n\n3.  将文件夹名称更改为 `art.scnassets` 并按 Return。\n\n\
  ![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig20_HTML.jpg](img/469983_1_En_2_Fig20_HTML.jpg)\n\
  \n图 2-20\n更改 SceneKit 资产目录文件夹的名称\n\n4.  点击 Next 按钮。Xcode 询问你想将此文件夹存储在何处。\n5.  点击\
  \ Create 按钮。Xcode 在导航器窗格中创建一个 `SceneKit Asset Catalog.scnassets` 文件夹。\n6.  点击 `SceneKit\
  \ Asset Catalog.scnassets` 文件夹并按 Return。Xcode 会高亮显示整个文件夹名称，如图 2-20 所示。\n\n## 导入\
  \ 3D 图像到 Xcode\n\n现在，我们已经编写了`ViewController.swift`文件中所需的大部分 Swift 代码，并设计了通过 ARKit\
  \ SceneKit 视图显示增强现实的用户界面，最后一步是将 `.dae` 文件及其纹理文件导入到你在 Xcode 导航器窗格中创建的 `.scnassets`\
  \ 文件夹中。\n\n要向 Xcode 添加 3D 图像，请按照以下步骤操作：\n\n1.  将 `.dae` 文件和伴随的纹理文件图像从 Finder 窗口拖放到\
  \ Xcode 的 `scnassets` 文件夹中，如图 2-21 所示。\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig21_HTML.jpg](img/469983_1_En_2_Fig21_HTML.jpg)\n\
  \n图 2-21\n从 Finder 窗口拖放 `.dae` 和纹理文件到 Xcode 的 `scnassets` 文件夹\n\n2.  在 `scnassets`\
  \ 文件夹中点击 `.dae` 文件以选中它。\n3.  选择 编辑器 ➤ 转换为 SceneKit 场景文件格式 (.scn)。将出现一个对话框，要求你确认是否要将\
  \ `.dae` 文件转换为 `.scn` 文件，如图 2-22 所示。\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig22_HTML.jpg](img/469983_1_En_2_Fig22_HTML.jpg)\n\
  \n图 2-22\nXcode 请求确认将 `.dae` 文件转换为 `.scn` 文件\n\n4.  点击 Convert 按钮。Xcode 会将你的 `.dae`\
  \ 文件转换为 `.scn` 文件。\n5.  （可选）点击 `.scn` 文件并按 Return，将文件名编辑为简单且具描述性的内容。\n6.  编辑`viewDidLoad`函数中的以下行以包含你的\
  \ `.scn` 文件的名称。如果你的 `.scn` 文件名为`satellite.scn`，则代码应如下所示：\n\n```\nlet scene = SCNScene(named:\
  \ \"art.scnassets/satellite.scn\")!\n```\n\n此 Swift 代码会将 `.dae` 文件（已转换为 `.scn` 文件）加载到你的增强现实视图中。然而，还有最后一步。对于大多数\
  \ `.dae` 文件，都有一个伴随的纹理文件来定义三维对象的外观或“皮肤”。最后一步是将此纹理或“皮肤”应用到 `.scn` 文件。为此，请按照以下步骤操作：\n\
  \n1.  在导航器窗格中点击 `scnassets` 文件夹中显示的 `.scn` 文件。Xcode 会将你的图像显示为一个通用形状，但没有外观。\n2. \
  \ 点击 Xcode 窗口底部附近的“显示场景图视图”图标，如图 2-23 所示。Xcode 将显示场景图视图。\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig23_HTML.jpg](img/469983_1_En_2_Fig23_HTML.jpg)\n\
  \n图 2-23\n“显示场景图视图”图标\n\n3.  点击场景图视图窗格中显示的每个项目，然后点击“显示材质检查器”图标，如图 2-24 所示。或者选择 视图\
  \ ➤ 检查器 ➤ 显示材质检查器。\n\n![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig24_HTML.jpg](img/469983_1_En_2_Fig24_HTML.jpg)\n\
  \n图 2-24\n“显示材质检查器”图标\n\n4.  点击漫反射弹出菜单，选择纹理文件的名称，例如`texture.jpg`，如图 2-25 所示。\n\n\
  ![../images/469983_1_En_2_Chapter/469983_1_En_2_Fig25_HTML.jpg](img/469983_1_En_2_Fig25_HTML.jpg)\n\
  \n图 2-25\n漫反射弹出菜单允许你选择纹理图像\n\n如果你的原始 `.dae` 文件附带两个或更多纹理文件，则可能需要将这些多个纹理文件包含在 `scnassets`\
  \ 文件夹中，并使用漫反射弹出菜单为三维对象的不同部分选择每个相应的纹理文件。\n\n现在，通过 USB 线将 iOS 设备连接到 Macintosh，然后点击\
  \ Run 图标或选择 产品 ➤ 运行。你现在应该会看到你的 `.scn` 文件显示在 iOS 设备摄像头捕获的图像之上。\n\n\n\n## 概述\n\n虽然可以独立创建增强现实应用，但依赖苹果的\
  \ `ARKit` 框架要简单得多。`ARKit` 负责处理管理摄像头和周围现实世界物体的细节，从而将现实与虚拟图像融合。\n\n创建增强现实应用最简单的方式，是在新建\
  \ iOS 项目时选择“增强现实”模板。不过，你也可以为现有应用添加增强现实功能。首先，必须导入 `ARKit` 框架以及一个图形框架（例如 `SceneKit`）。接下来，必须在应用的用户界面上创建一个\
  \ `ARKit SceneKit 视图`，以查看实际的增强现实图像。最后，必须将一个三维图像导入 Xcode，并将其转换为 `.scn` 格式的 `SceneKit`\
  \ 文件。\n\n当你希望专注于开发增强现实应用时，最好使用增强现实项目模板来创建新项目。当你希望为现有应用添加增强现实功能时，同样可以随时轻松完成。\n\n\
  现在你已经对如何创建增强现实应用以及所需遵循的各个步骤有了基本了解，是时候更深入地了解通过 `ARKit` 实现的不同增强现实功能的具体组成部分了。\n\n##\
  \ 世界追踪\n\n增强现实通过摄像头追踪现实世界来工作。通过识别现实世界中的实体物体，如地板、桌子和墙壁，增强现实便能在场景中精确放置虚拟物体，营造出它们真实存在的错觉。即使虚拟物体只是一个卡通宝可梦角色，增强现实也必须将该虚拟物体叠加在场景中，使其看起来像是通过摄像头看到的真实世界的一部分。\n\
  \n为了识别现实和虚拟物体的位置，`ARKit` 使用一个坐标系，其中 x 轴指向左右方向，y 轴指向上下方向，z 轴指向朝向和远离摄像头的方向，如图 3-1\
  \ 所示。\n\n![../images/469983_1_En_3_Chapter/469983_1_En_3_Fig1_HTML.jpg](img/469983_1_En_3_Fig1_HTML.jpg)\n\
  \n**图 3-1** 定义 ARKit 坐标系的 x、y 和 z 轴\n\n为了将虚拟物体放置在现实世界中，`ARKit` 使用一种名为 `视觉惯性里程计`\
  \ 的技术，这其实是一种识别现实世界中实体物体（如墙壁和桌面）以及摄像头（iOS 设备）相对于现实世界物体当前位置的复杂方法。利用这些信息，`ARKit` 可以将物体放置在现实世界的物品上（如地板或书桌），或与摄像头当前位置保持固定距离（例如在你前方两米、左侧半米处）。\n\
  \n识别通过摄像头看到的现实物体被称为 `世界追踪`。世界追踪的准确性在光照良好且存在多个易于辨识的对比物体（如房间内的椅子和桌子）时效果最佳。而在昏暗或光照不佳的情况下，或者当观察的物体不易识别时（如一面实心墙或没有其他对比物体的道路），世界追踪的准确性会受到影响。\n\
  \n试想你如何识别现实世界中的物体。识别桌子上的台灯很容易，因为你可以看到台灯的完整轮廓以及桌面和桌边。但如果有人只给你看台灯或桌面的特写，你可能无法分辨自己看到的是墙壁还是地板。一般来说，如果人眼容易识别图像中的物体，那么\
  \ `ARKit` 也容易识别这些物体的形状。\n\n除了识别物体边界外，另一个保证准确性的关键在于用户保持摄像头稳定。这为 `ARKit` 提供了准确绘制周围环境的时间。如果用户过快或毫无规律地移动摄像头，`ARKit`\
  \ 将更难准确识别现实世界物体，就像让你看一段摄像头快速无序移动的视频时，你也难以识别物体一样。\n\n### 显示世界原点\n\n每个增强现实应用都需要导入\
  \ `ARKit` 框架和一个图形框架来显示虚拟物体，例如 `SceneKit`、`SpriteKit` 或 `Metal`，如下所示：\n\n```\nimport\
  \ ARKit\nimport SceneKit\n```\n\n一旦你的应用导入了 `ARKit` 框架和一个像 `SceneKit` 这样的图形框架，下一步就是使用\
  \ `ARWorldTrackingConfiguration` 类，如下所示：\n\n```\nlet configuration = ARWorldTrackingConfiguration()\n\
  ```\n\nAR 世界追踪需要在一个 `ARKit SceneKit 视图` (`ARSCNView`) 内进行，你必须将此视图添加到应用的用户界面中。你必须在该\
  \ `ARSCNView` 内创建一个 `IBOutlet`，例如：\n\n```\n@IBOutlet var sceneView: ARSCNView!\n\
  ```\n\n现在，你需要在此 `ARSCNView` 内运行 AR 世界追踪，如下所示：\n\n```\nsceneView.session.run(configuration)\n\
  ```\n\n此时，通常你会在 `ARSCNView` 中显示一个虚拟物体，例如卡通飞机或椅子。在本练习中，我们将显示 `ARKit` 使用的世界原点。这些世界原点坐标将让你看到定义\
  \ `ARKit` 放置虚拟物体位置的 x、y 和 z 轴。显示世界原点有助于调试你的应用，并确保虚拟物体显示在你期望的确切位置。要了解如何在增强现实应用中显示世界原点，请按照以下步骤操作：\n\
  \n1. 启动 Xcode。（请确保使用 Xcode 10 或更高版本。）\n2. 选择 File ➤ New ➤ Project。Xcode 会要求你选择一个模板。\n\
  3. 点击 iOS 类别。\n4. 点击 Single View App 图标，然后点击 Next 按钮。Xcode 会要求输入产品名称、组织名称、组织标识符和内容技术。\n\
  5. 点击 Product Name 文本框，并为你的项目输入一个描述性名称，例如 `World Tracking`。（具体名称不重要。）\n6. 确保 Content\
  \ Technology 弹出菜单显示 `SceneKit`。\n7. 点击 Next 按钮。Xcode 会询问你希望将项目存储在何处。\n8. 选择一个文件夹并点击\
  \ Create 按钮。Xcode 将创建一个 iOS 项目。\n\n首先，让我们按照以下步骤修改 `Info.plist` 文件，以允许访问摄像头和使用 `ARKit`：\n\
  \n1. 在导航器窗格中点击 `Info.plist` 文件。Xcode 会显示一个键、类型和值的列表。\n2. 点击展开三角形以展开 Required Device\
  \ Capabilities 类别，显示 Item 0。\n3. 将鼠标指针悬停在 Item 0 上，会显示一个加号 (`+`) 图标。\n4. 点击这个加号\
  \ (`+`) 图标，显示一个空白的 Item 1。\n5. 在 Item 1 行的 Value 类别下输入 `arkit`。\n6. 将鼠标指针悬停在最后一行上，会显示一个加号\
  \ (`+`) 图标。\n7. 点击加号 (`+`) 图标以创建一个新行。会出现一个弹出菜单。\n8. 选择 Privacy – Camera Usage Description。\n\
  9. 在 Privacy – Camera Usage Description 行的 Value 类别下输入 `AR needs to use the camera`。\n\
  \n现在我们的应用可以访问摄像头并使用 `ARKit` 了，接下来让我们在 `Main.storyboard` 文件中添加一个 `ARKit SceneKit\
  \ 视图`，以便我们的应用可以显示摄像头图像。要添加 `ARKit SceneKit 视图` 到你的用户界面，请按照以下步骤操作：\n\n1. 在 Xcode\
  \ 的导航器窗格中点击 `Main.storyboard` 文件。Xcode 会在故事板屏幕上显示一个 iOS 设备，你可以通过点击故事板屏幕底部的 View\
  \ As 来更改设备型号。\n2. 点击对象库图标以显示对象库窗口。\n3. 点击对象库窗口顶部的搜索框，输入 `ARKit`。对象库窗口将显示所有可用的 ARKit\
  \ 对象。\n4. 将 `ARKit SceneKit View` 从对象库拖到故事板上。\n5. 在故事板上调整 `ARKit SceneKit View`\
  \ 的大小。`ARKit SceneKit View` 的确切大小和位置不重要，但要使其足够大，因为 `ARKit SceneKit View` 的大小决定了通过\
  \ iOS 设备摄像头查看时图像显示的大小。\n\n\n\n6. 点击 ARKit SceneKit View 以选中它，然后选择 Editor ➤ Resolve\
  \ AutoLayout Issues ➤ Reset to Suggested Constraints。Xcode 会添加约束，以确保无论用户以何种尺寸或方向手持\
  \ iOS 设备，你的 ARKit SceneKit View 都能正确对齐。\n\n7.  点击 Show Assistant Editor 图标，或选择 View\
  \ ➤ Assistant Editor ➤ Use Assistant Editor。Xcode 会在故事板旁边并排显示`ViewController.swift`文件。\n\
  \n8.  将鼠标悬停在 ARKit SceneKit View 上，按住 Control 键，并将鼠标拖到`class ViewController`行的下方。\n\
  \n9.  松开 Control 键和鼠标。Xcode 会显示一个弹出菜单，用于为 IBOutlet 定义名称。\n\n10. 在 Name 字段中键入`sceneView`并按\
  \ Return 键。Xcode 会在`ViewController.swift`文件中创建一个 IBOutlet，如下所示：\n\n    ```\n   \
  \ @IBOutlet var sceneView: ARSCNView!\n    ```\n\n11. 点击 Use Standard Editor 图标或选择\
  \ View ➤ Standard Editor ➤ Use Standard Editor。\n\n12. 在 Navigator 窗格中点击`ViewController.swift`文件。Xcode\
  \ 会显示存储在`ViewController.swift`文件中的 Swift 代码。\n\n13. 编辑`ViewController.swift`文件，如下所示：\n\
  \n    ```\n    import UIKit\n    import SceneKit\n    import ARKit\n    class ViewController:\
  \ UIViewController, ARSCNViewDelegate {\n        @IBOutlet var sceneView: ARSCNView!\n\
  \        override func viewDidLoad() {\n            super.viewDidLoad()\n      \
  \      sceneView.delegate = self\n            sceneView.showsStatistics = true\n\
  \            sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin]\n    \
  \    }\n        override func viewWillAppear(_ animated: Bool) {\n            super.viewWillAppear(animated)\n\
  \            let configuration = ARWorldTrackingConfiguration()\n            sceneView.session.run(configuration)\n\
  \        }\n    }\n    ```\n\n这个应用与之前构建的增强现实应用的主要区别在于这一行：\n\n```\nsceneView.debugOptions\
  \ = [ARSCNDebugOptions.showWorldOrigin]\n```\n\n这行代码告诉 Xcode 显示世界原点坐标系，该坐标系将由红线（x\
  \ 轴）、绿线（y 轴）和蓝线（z 轴）组成。要在增强现实视图中查看世界原点坐标，请按照以下步骤操作：\n\n1.  点击 Stop 按钮或选择 Product\
  \ ➤ Stop。\n    ![../images/469983_1_En_3_Chapter/469983_1_En_3_Fig3_HTML.jpg](img/469983_1_En_3_Fig3_HTML.jpg)\n\
  \    **图 3-3** 通过 iOS 设备摄像头查看世界坐标系\n\n2.  点击 Run 按钮或选择 Product ➤ Run。（首次运行此应用时，需要授予其摄像头访问权限。）\n\
  \n3.  转动并瞄准 iOS 摄像头，直到看到彩色世界坐标浮在半空中，如图 3-3 所示。\n    ![../images/469983_1_En_3_Chapter/469983_1_En_3_Fig2_HTML.jpg](img/469983_1_En_3_Fig2_HTML.jpg)\n\
  \    **图 3-2** Set the Active Scheme 弹出菜单\n\n4.  通过 USB 数据线将 iOS 设备连接到 Macintosh。\n\
  \n5.  点击 Set the Active Scheme 弹出菜单，选择已连接到 Macintosh 的 iOS 设备，如图 3-2 所示。\n\nARKit\
  \ 会在应用运行时，在你 iOS 设备出现的位置显示世界原点坐标系。这就是为什么你可能需要后退，才能在应用启动时看到世界坐标系漂浮在你眼前。\n\n### 重置世界原点\n\
  \n每次运行增强现实应用时，它都会在 iOS 设备的当前位置定义世界坐标。当然，你可能不希望世界坐标系只在应用运行时你手持 iOS 设备的位置出现。这就是为什么\
  \ ARKit 为你提供了重置世界坐标系的选项，以便你可以将 iOS 设备移动到新位置，并将世界坐标重置为 iOS 设备的新位置。\n\n要重置世界坐标，我们需要一个供用户点击的\
  \ UIButton。然后，我们需要编写一个 IBAction 方法，将世界坐标重置为 iOS 设备的当前位置。要创建 UIButton 并编写用于重置世界跟踪坐标的\
  \ IBAction 方法，请按照以下步骤操作：\n\n1.  在 Name 字段中键入`resetButton`并按 Return 键。\n\n2.  点击\
  \ Type 弹出菜单并选择 UIButton。\n\n3.  点击 Connect 按钮。Xcode 会显示一个空的 IBAction 方法。\n\n4. \
  \ 点击 Standard Editor 图标或选择 View ➤ Standard Editor ➤ Show Standard Editor。如果 Xcode\
  \ 未显示`ViewController.swift`文件，请在 Navigator 窗格中点击`ViewController.swift`文件。\n\n5.\
  \  编辑`IBAction resetButton`函数如下：\n\n    ```\n    @IBAction func resetButton(_ sender:\
  \ UIButton) {\n        sceneView.session.pause()\n        sceneView.session.run(configuration,\
  \ options: [.resetTracking])\n    }\n    ```\n\n6.  将`let configuration = ARWorldTrackingConfiguration`行移到`IBOutlet`行的下方，如下所示：\n\
  \n    ```\n    @IBOutlet var sceneView: ARSCNView!\n    let configuration = ARWorldTrackingConfiguration()\n\
  \    ```\n\n整个`ViewController.swift`文件应如下所示：\n\n```\nimport UIKit\nimport SceneKit\n\
  import ARKit\nclass ViewController: UIViewController, ARSCNViewDelegate {\n    @IBOutlet\
  \ var sceneView: ARSCNView!\n    let configuration = ARWorldTrackingConfiguration()\n\
  \    @IBAction func resetButton(_ sender: UIButton) {\n        sceneView.session.pause()\n\
  \        sceneView.session.run(configuration, options: [.resetTracking])\n    }\n\
  \    override func viewDidLoad() {\n        super.viewDidLoad()\n        sceneView.delegate\
  \ = self\n        sceneView.showsStatistics = true\n        sceneView.debugOptions\
  \ = [ARSCNDebugOptions.showWorldOrigin]\n    }\n    override func viewWillAppear(_\
  \ animated: Bool) {\n        super.viewWillAppear(animated)\n        sceneView.session.run(configuration)\n\
  \    }\n}\n```\n\n7.  使用 USB 数据线将 iOS 设备连接到 Macintosh。\n\n8.  点击 Run 按钮或选择 Product\
  \ ➤ Run。当应用运行时，后退以查看浮在空中的 x 轴、y 轴和 z 轴世界坐标。\n\n9.  移动到新位置，然后点击 iOS 屏幕上的 Reset 按钮。\n\
  \n10. 后退，你会看到当你点击 Reset 按钮时，iOS 设备所在位置处的 x 轴、y 轴和 z 轴世界坐标。\n\n11. 点击 Stop 按钮或选择\
  \ Product ➤ Stop。\n    ![../images/469983_1_En_3_Chapter/469983_1_En_3_Fig7_HTML.jpg](img/469983_1_En_3_Fig7_HTML.jpg)\n\
  \    **图 3-7** 创建 IBAction 方法\n\n12. 松开 Control 键和鼠标。Xcode 会显示一个弹出菜单。\n\n13. 点击\
  \ Connection 弹出菜单并选择 Action，如图 3-7 所示。\n    ![../images/469983_1_En_3_Chapter/469983_1_En_3_Fig6_HTML.jpg](img/469983_1_En_3_Fig6_HTML.jpg)\n\
  \    **图 3-6** 从 UIButton 控件拖拽到 ViewController.swift 文件\n\n14. 按住 Shift 键并点击 ARSCNView\
  \ 对象。现在，ARSCNView 和 UIButton 周围应出现手柄。\n\n15. 在 All Views in View Controller 类别下，选择\
  \ Editor ➤ Resolve AutoLayout Issues ➤ Reset to Suggested Constraints。Xcode 会为 ARSCNView\
  \ 和 UIButton 添加约束。\n\n16. 点击 Assistant Editor 图标或选择 View ➤ Assistant Editor ➤ Show\
  \ Assistant Editor。Xcode 会并排显示`ViewController.swift`文件和故事板。\n\n\n\n"
- "# 在坐标处显示形状\n\n显示世界原点可以让你知道能在增强现实视图的哪些位置定义虚拟对象的出现。通过指定 x、y 和 z 坐标，你可以使虚拟对象相对于用户\
  \ iOS 设备的当前位置显示出来。除了显示像宇宙飞船或恐龙这样的虚拟对象，ARKit 能在特定坐标显示的最简单的虚拟对象就是球体、立方体和平面这类形状。\n\n\
  要创建一个形状，你首先必须基于 `SCNNode` 类创建一个节点，如下所示：\n\n```\nlet node = SCNNode()\n```\n\n此时，你需要为节点定义一个形状。SceneKit\
  \ 提供了立方体、平面、球体、圆环体和其他形状，所以让我们选择一个球体，并将其半径定义为 0.05 米，如下所示：\n\n```\nnode.geometry\
  \ = SCNSphere(radius: 0.05)\n```\n\n为了让球体可见，让我们给它一个颜色。为此，我们需要定义节点的材质，该材质定义了其外表面，例如：\n\
  \n```\nnode.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n```\n\n\
  这三行 Swift 代码创建了一个节点，将该节点的几何形状定义为球体，然后用黄色为该球体的外表面上色。现在剩下的唯一任务就是根据世界原点将该节点放置到特定位置。为此，我们需要定义节点的位置，如下所示：\n\
  \n```\nnode.position = SCNVector3(0,0,0)\n```\n\n由于节点需要 x、y 和 z 坐标，因此节点的位置也必须由三个特定值定义。将\
  \ x、y 和 z 位置定义为 0 意味着该节点将出现在 x、y 和 z 轴相交的世界原点。\n\n在定义了几何形状、其尺寸、颜色和位置之后，最后一步是将该节点添加到现有场景中，使其实际出现在增强现实视图中。为此，你只需要最后一行代码，如下所示：\n\
  \n```\nsceneView.scene.rootNode.addChildNode(node)\n```\n\n这行代码将节点（球体）添加到增强现实场景的根节点。根节点定义了增强现实视图中显示项目的层级结构。要了解此代码如何在世界原点显示一个黄色球体，请按照以下步骤操作：\n\
  \n## 准备项目\n\n1.  在导航器窗格中点击 `Main.storyboard` 文件。\n2.  调整 `ARSCNView` 的大小，使得在 `ARSCNView`\
  \ 底部和 iOS 设备屏幕底部之间留出空白区域。\n3.  点击对象库图标以打开对象库窗口。\n4.  输入 `UIButton`。对象库窗口将显示 `UIButton`，如图\
  \ 3-4 所示。\n\n![images/469983_1_En_3_Chapter/469983_1_En_3_Fig4_HTML.jpg](img/469983_1_En_3_Fig4_HTML.jpg)\n\
  图 3-4 在对象库中找到 `UIButton`\n\n5.  将 `UIButton` 拖到 `ARSCNView` 下方。\n6.  调整 `UIButton`\
  \ 的宽度。\n7.  双击 `UIButton` 以高亮其标题，并输入新标题，例如 `Reset`。你的用户界面应类似于图 3-5。\n\n![images/469983_1_En_3_Chapter/469983_1_En_3_Fig5_HTML.jpg](img/469983_1_En_3_Fig5_HTML.jpg)\n\
  图 3-5 向用户界面添加 `UIButton`\n\n8.  将鼠标悬停在故事板上的 `UIButton` 上，按住 Control 键，然后将鼠标拖动到 `ViewController.swift`\
  \ 文件中 IBOutlet 的下方，如图 3-6 所示。\n9.  修改世界跟踪项目，或者创建一个与“世界跟踪”项目相同的新项目，只是将其命名为 `Node\
  \ Placement`。\n10. 修改 `ViewController.swift` 文件，使代码看起来像这样：\n\n    ```\n    import\
  \ UIKit\n    import SceneKit\n    import ARKit\n    class ViewController: UIViewController,\
  \ ARSCNViewDelegate {\n    @IBOutlet var sceneView: ARSCNView!\n    let configuration\
  \ = ARWorldTrackingConfiguration()\n    override func viewDidLoad() {\n    super.viewDidLoad()\n\
  \    // Do any additional setup after loading the view, typically from a nib.\n\
  \    sceneView.delegate = self\n    sceneView.showsStatistics = true\n    sceneView.debugOptions\
  \ = [ARSCNDebugOptions.showWorldOrigin]\n    showShape()\n    }\n    override func\
  \ viewWillAppear(_ animated: Bool) {\n    super.viewWillAppear(animated)\n    sceneView.session.run(configuration)\n\
  \    }\n    @IBAction func resetButton(_ sender: UIButton) {\n    sceneView.session.pause()\n\
  \    sceneView.session.run(configuration, options: [.resetTracking])\n    showShape()\n\
  \    }\n    func showShape() {\n    let node = SCNNode()\n    node.geometry = SCNSphere(radius:\
  \ 0.05)\n    node.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n \
  \   node.position = SCNVector3(0,0,0)\n    sceneView.scene.rootNode.addChildNode(node)\n\
  \    }\n    }\n    ```\n\n11. 通过 USB 数据线将 iOS 设备连接到你的 Macintosh。\n12. 点击运行按钮或选择\
  \ Product ➤ Run。一个黄色球体将出现在世界原点，如图 3-8 所示。\n\n![images/469983_1_En_3_Chapter/469983_1_En_3_Fig8_HTML.jpg](img/469983_1_En_3_Fig8_HTML.jpg)\n\
  图 3-8 在世界原点显示一个黄色球体\n\n## 测试应用程序\n\n1.  将你的 iOS 设备移动到一个新位置，然后点击重置按钮。注意，世界坐标现在出现在不同的位置，并且原点处有一个黄色球体。\n\
  2.  点击停止按钮或选择 Product ➤ Stop。\n\n## 试验坐标\n\n让黄色球体出现在原点固然不错，但除了 `0,0,0` 之外，你还可以尝试为球体的\
  \ x、y 和 z 坐标设置不同的值。尝试用节点位置的不同值修改以下这行代码，例如：\n\n```\nnode.position = SCNVector3(0.2,\
  \ -0.4, 0.1)\n```\n\n请记住，这些值定义的是米，所以如果你选择的值太大，例如 10 米，黄色球体将因距离太远而无法在增强现实视图中看到，因此请尝试使用较低的值，如\
  \ `-0.4` 或 `0.2`。\n\n\n\n## 添加与移除多个物体\n\n在前一个应用示例中，我们显示了世界原点，它出现在当前 iOS 设备的位置。然后，我们在一个特定位置显示了一个黄色球体。遗憾的是，定义黄色球体\
  \ x、y、z 坐标的代码是固定不变的。如果我们希望黄色球体出现在另一个位置，或者想要显示更多的黄色球体，目前还无法实现。\n\n为了获得更高的灵活性，我们在用户界面上添加一个`添加`按钮。每次用户点击`添加`按钮时，都会新增一个黄色球体。当然，如果所有球体都使用相同的\
  \ x、y、z 坐标，那么添加多个黄色球体看起来不会有任何区别，因此我们还需要添加三个滑块，以便在将球体添加到增强现实视图之前，为球体定义新的 x、y、z 坐标。\n\
  \n为此，我们需要调整`ARKit SceneKit 视图`的高度，并在底部添加三个`UISlider`控件以及三个标签，用以标识每个滑块定义的轴。请按以下步骤操作：\n\
  \n![../images/469983_1_En_3_Chapter/469983_1_En_3_Fig9_HTML.jpg](img/469983_1_En_3_Fig9_HTML.jpg)\n\
  \n**图 3-9** 使用三个滑块重新设计的用户界面\n\n1.  在导航器面板中点击`Main.storyboard`文件。\n2.  调整`ARKit SceneKit\
  \ 视图`的高度，为底部留出更多空间。\n3.  在现有`重置`按钮旁边添加一个新的`UIButton`，并为这个新的`UIButton`设置标题名称为`添加`。\n\
  4.  添加三个`UISlider`控件。\n5.  添加三个标签，并修改其标题以显示 X、Y 和 Z。您的用户界面应类似于**图 3-9**。\n\n至此，用户界面的更改已完成。接下来，通过选择`编辑\
  \ ➤ 全选`（或按`Command+A`键）来添加约束。然后选择`编辑器 ➤ 解决自动布局问题 ➤ 重置为建议的约束`。Xcode 会为您的标签、按钮和滑块添加约束。\n\
  \n现在我们需要从两个方面修改这个用户界面。首先，我们需要为滑块定义最小值和最大值以及默认值。其次，我们需要将三个滑块作为`IBOutlet`连接到我们的`ViewController.swift`文件。此外，我们还需要将`添加`按钮连接为`IBAction`方法。\n\
  \n要为每个滑块定义最小值和最大值，请按以下步骤操作：\n\n1.  确保对所有三个滑块以相同的方式更改`当前值`、`最小值`和`最大值`属性。\n\n![../images/469983_1_En_3_Chapter/469983_1_En_3_Fig10_HTML.jpg](img/469983_1_En_3_Fig10_HTML.jpg)\n\
  \n**图 3-10** 修改滑块的属性\n\n1.  点击每个滑块。\n2.  点击`显示属性检查器`图标，或选择`显示 ➤ 检查器 ➤ 显示属性检查器`。Xcode\
  \ 将显示`属性检查器`面板。\n3.  将`当前值`属性更改为`0`。\n4.  将`最小值`属性更改为`-1`。\n5.  将`最大值`属性更改为`1`，如**图\
  \ 3-10**所示。这允许您选择-1 米到 1 米之间的值，用于定义在增强现实视图中放置球体的坐标。\n\n现在我们已经定义了滑块的值，接下来需要将三个滑块和`添加`按钮连接到`ViewController.swift`文件。请按以下步骤操作：\n\
  \n1.  松开`Control`键和鼠标。会出现一个弹出菜单。\n2.  点击`名称`文本字段，并输入描述性名称，例如`Xslider`、`Yslider`或`Zslider`。您应创建三个`IBOutlet`，分别代表\
  \ x、y、z 坐标，如下所示：\n\n```\n@IBOutlet var Xslider: UISlider!\n@IBOutlet var Yslider:\
  \ UISlider!\n@IBOutlet var Zslider: UISlider!\n```\n\n3.  点击`添加`按钮，按住`Control`键，并将鼠标拖动到`ViewController.swift`文件底部附近，以创建一个`IBAction`方法。\n\
  4.  松开`Control`键和鼠标。会出现一个弹出菜单。\n5.  点击`连接`弹出菜单，选择`动作`。\n6.  点击`名称`文本字段，输入`addButton`。\n\
  7.  点击`类型`弹出菜单，选择`UIButton`。\n\n\n\n8.  点击“连接”按钮。Xcode 会创建一个 `IBAction` 方法。\n9.\
  \  像这样编辑这个 `addButton IBAction` 方法：\n```\n    @IBAction func addButton(_ sender:\
  \ UIButton) {\n    showShape()\n    }\n```\n10. 像这样修改 `showShape()` 函数：\n```\n \
  \   func showShape() {\n    let node = SCNNode()\n    node.geometry = SCNSphere(radius:\
  \ 0.05)\n    node.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n \
  \   node.position = SCNVector3(Xslider.value,Yslider.value,Zslider.value)\n    node.name\
  \ = \"sphere\"\n    sceneView.scene.rootNode.addChildNode(node)\n    }\n```\n`showShape()`\
  \ 函数会创建黄色的球体，这些球体基于用户界面上的三个滑块（`Xslider`、`Yslider` 和 `Zslider`）定义的 x、y 和 z 坐标放置在增强现实视图中。创建虚拟对象的第一步是定义一个节点：\n\
  ```\n    let node = SCNNode()\n```\n`SCNNode` 定义了一个 SceneKit 节点，节点简单来说就代表一个虚拟对象。定义好节点后，我们需要定义要显示的实际对象。SceneKit\
  \ 提供了几种不同的几何形状可供选择，但在本例中，我们将使用球体并将其半径定义为 0.05 米：\n```\n    node.geometry = SCNSphere(radius:\
  \ 0.05)\n```\n`geometry` 属性定义了节点的形状，这里是一个球体。为了让该对象可见，我们需要定义其材质。在本例中，我们选择黄色并将其漫反射到球体的整个表面：\n\
  ```\n    node.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n```\n\
  接下来，我们需要定义节点的位置，这需要 x、y 和 z 浮点数值。我们不定义固定值，而是从用户界面上的三个滑块中获取值：\n```\n    node.position\
  \ = SCNVector3(Xslider.value,Yslider.value,Zslider.value)\n```\n每次我们添加一个新节点（球体）时，给它起个名字。这个名字在后面我们需要从增强现实视图中移除所有球体时将非常重要。名字可以是任何内容，这里就叫它\
  \ `sphere`：\n```\n    node.name = \"sphere\"\n```\n最后，我们需要将这个节点添加到根节点。ARKit 将所有显示内容组织成层级结构，每个增强现实视图都带有一个根节点。每次你在增强现实视图中创建一个要显示的新对象时，该新对象就是一个节点，它会成为根节点的子节点。每个增强现实视图包含一个根节点和零个或多个子节点：\n\
  ```\n    sceneView.scene.rootNode.addChildNode(node)\n```\n11. 像这样修改 `resetButton`\
  \ 函数：\n```\n    @IBAction func resetButton(_ sender: UIButton) {\n    sceneView.session.pause()\n\
  \    sceneView.scene.rootNode.enumerateChildNodes { (node, _) in\n    if node.name\
  \ == \"sphere\" {\n    node.removeFromParentNode()\n    }\n    }\n    sceneView.session.run(configuration,\
  \ options: [.resetTracking])\n    }\n```\n![图 3-11](img/469983_1_En_3_Fig11_HTML.jpg)\n\
  \n### 为滑块创建 IBOutlet\n1.  点击“助理编辑器”图标或选择 **视图** ➤ **助理编辑器** ➤ **显示助理编辑器**。Xcode\
  \ 会并排显示 `ViewController.swift` 文件和 `Main.storyboard` 文件。\n2.  点击每个滑块，按住 **Control**\
  \ 键，并将鼠标拖到现有 `IBOutlet` 下方的 `ViewController.swift` 文件中，如图 3-11 所示。\n\n这个 `resetButton`\
  \ 函数首先暂停当前的增强现实会话，然后检查每个子节点。如果该子节点的名字恰好是 `sphere`，则将其从根节点中移除。\n\n这个检查节点名称是否为 `sphere`\
  \ 的 `if` 语句很重要，因为当应用程序显示世界原点时，那也是一个连接到根节点的子节点。假设你只有以下代码：\n```\nsceneView.scene.rootNode.enumerateChildNodes\
  \ { (node, _) in\nnode.removeFromParentNode()\n}\n```\n这段代码会从根节点移除所有节点，包括世界原点。通过仅移除名为\
  \ `sphere` 的节点，我们可以在移除增强现实视图中显示的所有黄色球体的同时，保持世界原点的显示。\n\n完整的 `ViewController.swift`\
  \ 文件应如下所示：\n```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController:\
  \ UIViewController, ARSCNViewDelegate {\n@IBOutlet var sceneView: ARSCNView!\n@IBOutlet\
  \ var Xslider: UISlider!\n@IBOutlet var Yslider: UISlider!\n@IBOutlet var Zslider:\
  \ UISlider!\nlet configuration = ARWorldTrackingConfiguration()\noverride func viewDidLoad()\
  \ {\nsuper.viewDidLoad()\n// Do any additional setup after loading the view, typically\
  \ from a nib.\nsceneView.delegate = self\nsceneView.showsStatistics = true\nsceneView.debugOptions\
  \ = [ARSCNDebugOptions.showWorldOrigin]\n}\noverride func viewWillAppear(_ animated:\
  \ Bool) {\nsuper.viewWillAppear(animated)\nsceneView.session.run(configuration)\n\
  }\n@IBAction func addButton(_ sender: UIButton) {\nshowShape()\n}\n@IBAction func\
  \ resetButton(_ sender: UIButton) {\nsceneView.session.pause()\nsceneView.scene.rootNode.enumerateChildNodes\
  \ { (node, _) in\nif node.name == \"sphere\" {\nnode.removeFromParentNode()\n}\n\
  }\nsceneView.session.run(configuration, options: [.resetTracking])\n}\nfunc showShape()\
  \ {\nlet node = SCNNode()\nnode.geometry = SCNSphere(radius: 0.05)\nnode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.yellow\nnode.position = SCNVector3(Xslider.value,Yslider.value,Zslider.value)\n\
  node.name = \"sphere\"\nsceneView.scene.rootNode.addChildNode(node)\n}\n}\n```\n\
  通过 USB 数据线将 iOS 设备连接到 Macintosh，然后点击“运行”按钮或选择 **产品** ➤ **运行**。片刻之后，后退一步，你应该能看到世界原点出现。向左或向右移动滑块，然后点击\
  \ **添加** 按钮。你的应用程序应该在三个滑块定义的 x、y 和 z 坐标处显示一个黄色球体，如图 3-12 所示。\n![图 3-12](img/469983_1_En_3_Fig12_HTML.jpg)\n\
  你可以重复更改滑块值并点击 **添加** 按钮的过程，以不断添加更多黄色球体。将你的 iOS 设备移动到一个新位置，然后点击 **重置** 按钮。你的应用程序将移除所有黄色球体，并在\
  \ iOS 设备的当前位置显示世界原点。\n\n## 总结\n在本章中，你学习了如何为了调试目的显示世界原点，以帮助你验证应用程序是否正确地将对象放置在增强现实视图中。一旦你的应用程序完成，你需要移除那些导致每次显示增强现实视图时世界原点出现的代码。\n\
  \n世界原点通过定义 x、y 和 z 坐标来帮助你定位对象。要在增强现实视图中显示项目，你需要创建一个节点并为该节点定义一个形状，例如球体、盒子或环面。接下来，你需要定义对象的外观，例如黄色或红色，以及其大小。\n\
  \n为了让增强现实更加灵活，你可以基于用户持有 iOS 设备的新位置来重置世界原点。这种重置世界原点的能力使你的应用程序可以在用户决定移动并指向 iOS 设备的任何位置显示虚拟对象。\n\
  \n在下一章中，我们将更详细地讨论创建几何形状以及为形状应用除纯色之外的不同纹理。\n\n\n\n"
- "# 4. 使用形状\n\n在上一章中，我们使用了一个调试选项，让我们的增强现实应用能够显示世界原点，该原点基于 iOS 设备的当前位置展示 x、y 和 z 轴。基于这个世界原点，我们可以通过定义其\
  \ x、y 和 z 坐标，将虚拟物体放置在增强现实视图中。\n\nARKit 提供了另一个调试选项，称为特征点。与世界原点类似，你只会使用特征点来调试你的应用。当需要发布应用时，你将移除世界原点和特征点的显示。\n\
  \n要让特征点出现，请如下修改 `debugOptions` 行：\n\n```\nsceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
  \ ARSCNDebugOptions.showFeaturePoints]\n```\n\n这行代码告诉 Xcode 同时显示世界原点（`.showWorldOrigin`）和特征点（`.showFeaturePoints`）。\n\
  \n在我们之前的应用中，我们可以与世界原点一起创建黄色球体，然后重置跟踪，让世界原点出现在 iOS 设备的新当前位置。通常，当你重置跟踪并删除任何现有的虚拟对象（比如我们的黄色球体）时，你也希望移除锚点。\n\
  \n锚点定义了虚拟对象在增强现实视图中的位置。我们之前的应用只是从视图中移除了虚拟对象，但是一旦我们删除了黄色球体，我们也不再需要知道球体之前的位置或锚点，所以我们也应该删除它。\n\
  \n为了让虚拟对象的锚点消失，我们只需要在重置世界跟踪时修改 `session.run` 行，如下所示：\n\n```\nsceneView.session.run(configuration,\
  \ options: [.resetTracking, .removeExistingAnchors])\n```\n\n这段代码重置了世界原点（`.resetTracking`）并移除了定义虚拟对象位置的任何不可见锚点（`.removeExistingAnchors`）。\n\
  \n要了解如何显示特征点（以及删除黄色球体的不可见锚点），请修改之前应用的代码，使整个 `ViewController.swift` 文件看起来像这样：\n\n\
  ```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController: UIViewController,\
  \ ARSCNViewDelegate {\n@IBOutlet var sceneView: ARSCNView!\n@IBOutlet var Xslider:\
  \ UISlider!\n@IBOutlet var Yslider: UISlider!\n@IBOutlet var Zslider: UISlider!\n\
  let configuration = ARWorldTrackingConfiguration()\noverride func viewDidLoad()\
  \ {\nsuper.viewDidLoad()\n// Do any additional setup after loading the view, typically\
  \ from a nib.\nsceneView.delegate = self\nsceneView.showsStatistics = true\nsceneView.debugOptions\
  \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n}\n\
  override func viewWillAppear(_ animated: Bool) {\nsuper.viewWillAppear(animated)\n\
  sceneView.session.run(configuration)\n}\n@IBAction func addButton(_ sender: UIButton)\
  \ {\nshowShape()\n}\n@IBAction func resetButton(_ sender: UIButton) {\nsceneView.session.pause()\n\
  sceneView.scene.rootNode.enumerateChildNodes { (node, _) in\nif node.name == \"\
  sphere\" {\nnode.removeFromParentNode()\n}\n}\nsceneView.session.run(configuration,\
  \ options: [.resetTracking, .removeExistingAnchors])\n}\nfunc showShape() {\nlet\
  \ node = SCNNode()\nnode.geometry = SCNSphere(radius: 0.05)\nnode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.yellow\nnode.position = SCNVector3(Xslider.value,Yslider.value,Zslider.value)\n\
  node.name = \"sphere\"\nsceneView.scene.rootNode.addChildNode(node)\n}\n}\n```\n\
  \n点击运行按钮或选择 产品 ➤ 运行，同时通过 USB 线将 iOS 设备连接到你的 Macintosh。当应用运行时，你将看到特征点显示为黄色圆点，这表明\
  \ ARKit 何时检测到现实世界中物体的表面。出现的点越多，ARKit 对该表面的检测就越好。\n\n如果你将增强现实应用的摄像头对准一个清晰可见的表面，比如桌面，以及对比鲜明的邻近物体，比如垂直的墙壁和水平的地板，你会看到更多的特征点出现，如图\
  \ 4-1 所示。如果你从不同角度将摄像头对准同一区域，你可以看到 ARKit 显示的特征点较少，这意味着它对附近区域的识别效果较差。\n\n![../images/469983_1_En_4_Chapter/469983_1_En_4_Fig1_HTML.jpg](img/469983_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1 特征点显示了 ARKit 如何识别现实世界中的表面\n\n点击停止按钮或选择 产品 ➤ 停止 以停止应用运行。\n\n\n\n## 显示不同的几何形状\n\
  \n几何形状是你在增强现实视图中可以显示的最简单的虚拟对象类型。在上一章中，我们创建了一个球体，但实际上 SceneKit 提供了几种不同类型的几何形状可供使用。每种几何形状可能需要你指定不同的尺寸。\n\
  \n例如，你可以通过定义半径来创建一个球体，但要创建一个盒子，你需要定义其宽度、高度和深度。可用的不同几何形状有：\n\n* `SCNFloor`\n* `SCNBox`\n\
  * `SCNCapsule`\n* `SCNCone`\n* `SCNCylinder`\n* `SCNPlane`\n* `SCNPyramid`\n* `SCNTorus`\n\
  * `SCNTube`\n\n所有这些几何形状的工作方式类似，你都可以为其表面定义颜色，例如 `UIColor.blue` 或 `UIColor.red`。通过组合多个几何形状，你可以创建出现在增强现实视图中的简单虚拟对象。\n\
  \n要创建一个球体，我们只需要像这样定义其半径：\n\n```\nnode.geometry = SCNSphere(radius: 0.05)\n```\n\n\
  要创建一个盒子，我们需要定义其高度、宽度和长度。此外，你还可以定义盒子的边缘使其变得锐利或圆润。要修改盒子的角，你需要定义其倒角半径。半径为 0 会创建锐利的边缘，而非零值会创建圆滑的边缘。值越大，边缘越圆滑。\n\
  \n要了解如何显示盒子而不是球体，请按照以下步骤操作：\n\n1.  点击停止按钮或选择 Product ➤ Stop。\n2.  点击当前应用程序的 `ViewController.swift`\
  \ 文件，该文件显示三个滑块，用于定义形状的 x、y 和 z 坐标。\n3.  将光标移动到 `node.geometry = SCNSphere(radius:\
  \ 0.05)` 这一行的前面，输入 `//`，这会将这一行变成注释。一旦你在该行前面输入 `//`，Xcode 就会像这样使代码变暗：\n\n```\n//\
  \ node.geometry = SCNSphere(radius: 0.05)\n```\n\n4.  在该行下方输入以下代码：\n\n```\nnode.geometry\
  \ = SCNBox(width: 0.1, height: 0.2, length: 0.1, chamferRadius: 0)\n```\n\n5.  在两个地方将文本\
  \ `\"sphere\"` 替换为 `\"shape\"`，如下所示：\n\n```\nif node.name == \"shape\" {\nnode.removeFromParentNode()\n\
  }\n```\n\n和\n\n```\nnode.name = \"shape\"\n```\n\n6.  通过 USB 数据线将 iOS 设备连接到你的 Macintosh。\n\
  7.  点击运行按钮或选择 Product ➤ Run。\n8.  调整 x、y 和 z 滑块以更改形状的位置。\n9.  点击添加按钮，查看增强现实视图中是否出现一个黄色盒子。\n\
  \n请注意，`chamferRadius` 为零，这创建了锐利的边缘。如果 `chamferRadius` 不为零，这将创建更圆滑的边缘。将此值更改为 0.05\
  \ 以创建圆滑的边缘。\n\n尝试按照以下方式定义具有不同尺寸的形状：\n\n* `node.geometry = SCNSphere(radius: 0.05)`\n\
  * `node.geometry = SCNBox(width: 0.1, height: 0.2, length: 0.1, chamferRadius: 0.05)`\n\
  * `node.geometry = SCNTorus(ringRadius: 0.2, pipeRadius: 0.05)`\n* `node.geometry\
  \ = SCNTube(innerRadius: 0.08, outerRadius: 0.1, height: 0.2)`\n* `node.geometry\
  \ = SCNCapsule(capRadius: 0.06, height: 0.4)`\n* `node.geometry = SCNCylinder(radius:\
  \ 0.04, height: 0.3)`\n* `node.geometry = SCNCone(topRadius: 0, bottomRadius: 0.05,\
  \ height: 0.2)`\n* `node.geometry = SCNPyramid(width: 0.2, height: 0.4, length:\
  \ 0.2)`\n* `node.geometry = SCNPlane(width: 0.2, height: 0.3)`\n\n请记住，一次在代码中只使用其中一行，而不是全部。通过尝试不同的形状和尺寸，你可以看到如何创建任意大小的几何对象。\n\
  \n除了显示黄色外，还可以尝试其他颜色，如棕色、青色、深灰色、灰色、绿色、浅灰色、洋红色、橙色、紫色、红色或白色，如下所示：\n\n```\nnode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.purple\n```\n\n## 显示文本\n\n除了在增强现实中显示几何形状外，你还可以显示文本。显示文本时，你可以定义要显示的字符串以及文本的字体、大小和颜色。\n\
  \n创建文本的第一步是定义要显示的字符串及其挤压深度。挤压深度定义了字母的厚度。挤压深度为零会创建平坦的外观，而非零的挤压深度会创建一个厚度，使得从侧面查看时字母可见。要定义字符串和挤压深度，需要使用如下代码：\n\
  \n```\nlet text = SCNText(string: \"Hello\", extrusionDepth: 1)\n```\n\n至此，我们已经创建了文本，但我们看不到它。就像我们为几何形状应用颜色一样，我们也需要为文本选择一种颜色。为此，我们需要定义一个材质类，如下所示：\n\
  \n```\nlet material = SCNMaterial()\n```\n\n接下来，我们需要为材质选择一种颜色，并将其漫射到整个表面，如下所示：\n\
  \n```\nmaterial.diffuse.contents = UIColor.orange\n```\n\n最后，我们需要将这个材质颜色应用到文本本身。实际上，我们可以为文本应用多种材质，每种材质都出现在一个数组中。由于我们只定义了一种颜色，所以数组中只包含材质颜色：\n\
  \n```\ntext.materials = [material]\n```\n\n现在我们已经定义了文本及其外观，下一步是将该文本作为节点放置在增强现实视图中。这涉及到定义一个节点、节点的\
  \ x、y 和 z 坐标，以及定义节点宽度、高度和深度的缩放比例：\n\n```\nlet node = SCNNode()\nnode.position =\
  \ SCNVector3(Xslider.value, Yslider.value, Zslider.value)\nnode.scale = SCNVector3(0.01,\
  \ 0.01, 0.01)\n```\n\n最后，我们需要将节点的几何形状定义为使用 `SCNText` 定义的文本，如下所示：\n\n```\nnode.geometry\
  \ = text\n```\n\n最后，我们需要将此节点添加到增强现实场景的根节点：\n\n```\nsceneView.scene.rootNode.addChildNode(node)\n\
  ```\n\n要查看此代码如何在指定的 x、y 和 z 坐标处显示橙色文本，请按照以下步骤操作：\n\n1.  点击停止按钮或选择 Product ➤ Stop。\n\
  2.  修改世界跟踪项目，或者创建一个与该项目相同但名称不同的新项目，例如命名为 Node Placement Text。\n3.  修改 `ViewController.swift`\
  \ 文件，使代码看起来像这样：\n\n\n\n```swift\nimport UIKit\nimport SceneKit\nimport ARKit\n\n\
  class ViewController: UIViewController, ARSCNViewDelegate {\n    @IBOutlet var sceneView:\
  \ ARSCNView!\n    @IBOutlet var Xslider: UISlider!\n    @IBOutlet var Yslider: UISlider!\n\
  \    @IBOutlet var Zslider: UISlider!\n    let configuration = ARWorldTrackingConfiguration()\n\
  \n    override func viewDidLoad() {\n        super.viewDidLoad()\n        sceneView.delegate\
  \ = self\n        sceneView.showsStatistics = true\n        sceneView.debugOptions\
  \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n \
  \   }\n\n    override func viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
  \        sceneView.session.run(configuration)\n    }\n\n    @IBAction func addButton(_\
  \ sender: UIButton) {\n        showShape()\n    }\n\n    @IBAction func resetButton(_\
  \ sender: UIButton) {\n        sceneView.session.pause()\n        sceneView.scene.rootNode.enumerateChildNodes\
  \ { (node, _) in\n            if node.name == \"shape\" {\n                node.removeFromParentNode()\n\
  \            }\n        }\n        sceneView.session.run(configuration, options:\
  \ [.resetTracking, .removeExistingAnchors])\n    }\n\n    func showShape() {\n \
  \       let text = SCNText(string: \"Hello\", extrusionDepth: 1)\n        let material\
  \ = SCNMaterial()\n        material.diffuse.contents = UIColor.orange\n        text.materials\
  \ = [material]\n\n        let node = SCNNode()\n        node.position = SCNVector3(Xslider.value,\
  \ Yslider.value, Zslider.value)\n        node.scale = SCNVector3(0.01, 0.01, 0.01)\n\
  \        node.geometry = text\n        node.name = \"shape\"\n        sceneView.scene.rootNode.addChildNode(node)\n\
  \    }\n}\n```\n\n使用 USB 数据线将一台 iOS 设备连接到您的 Mac 电脑。\n\n点击运行按钮或选择 **Product** ➤ **Run**。\n\
  \n点击 `Add` 按钮。橙色文本将出现在您定义的 `x`、`y` 和 `z` 坐标处，如图 4-5 所示。\n\n尝试使用不同的文本、挤出深度和颜色进行实验。\n\
  \n## 为形状添加纹理\n\n在我们目前创建的示例中，我们只使用了纯色来为增强现实视图中添加的几何形状着色。然而，您可以将图形图像应用于几何形状的表面。这可以创造出有趣的效果，例如将形状显示为行星或看起来像由砖块制成的盒子。\n\
  \n您可以通过在您常用的搜索引擎中搜索“纹理图像”，从互联网上的各种网站找到公共领域的纹理图像。这样的搜索将帮助您找到各种类型的纹理图像，如图 4-6 所示。\n\
  \n![../images/469983_1_En_4_Chapter/469983_1_En_4_Fig6_HTML.jpg](img/469983_1_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6\n\n在互联网上查找纹理图像\n\n下载一个或多个纹理图像后，您需要按照以下步骤将纹理图像添加到您的 Xcode 项目中：\n\n![../images/469983_1_En_4_Chapter/469983_1_En_4_Fig7_HTML.jpg](img/469983_1_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7\n\n向 Xcode 项目中添加文件\n\n1.  修改当前用于显示文本的 Xcode 项目，或者创建一个新项目，该项目允许使用摄像头显示增强现实视图。（这应该是您在本章早些时候创建的\
  \ Xcode 项目。）\n2.  将纹理图像拖动到 Xcode 项目的导航器面板。将出现一个窗口，显示添加文件的不同选项，如图 4-7 所示。\n\n确保选中\
  \ **Copy items if needed** 复选框，然后单击 **Finish** 按钮。\n\n在导航器面板中单击刚刚添加的纹理文件。Xcode 将显示该纹理图像的内容，如图\
  \ 4-8 所示。\n\n![../images/469983_1_En_4_Chapter/469983_1_En_4_Fig8_HTML.jpg](img/469983_1_En_4_Fig8_HTML.jpg)\n\
  \n图 4-8\n\n在 Xcode 中选择纹理文件会显示其内容\n\n将纹理图像添加到 Xcode 项目后，最后一步是定义该纹理图像，使其显示在球体、盒子或金字塔等几何形状的表面上。首先，像这样单独定义几何形状：\n\
  \n```swift\nlet sphere = SCNSphere(radius: 0.05)\n```\n\n接下来，为球体定义一种材质。我们需要先创建一种材质，然后将纹理图像分配给该材质的\
  \ `contents` 属性。最后，我们需要像这样将材质应用于球体：\n\n```swift\nlet material = SCNMaterial()\n\
  material.diffuse.contents = UIImage(named: \"earth.jpg\")\nsphere.materials = [material]\n\
  ```\n\n在这个例子中，纹理图像名为 `earth.jpg`，但您需要将其更改为您特定图像文件的名称，包括文件扩展名，例如 `.jpg`。\n\n定义球体及其材质（纹理图像）后，最后一步是创建一个节点，将该节点的\
  \ `geometry` 属性分配给球体，并将该节点放置在增强现实视图中，如下所示：\n\n```swift\nlet node = SCNNode()\nnode.geometry\
  \ = sphere\nnode.position = SCNVector3(Xslider.value,Yslider.value,Zslider.value)\n\
  ```\n\n要编辑 `ViewController.swift` 文件，请按照以下步骤操作：\n\n1.  在 Xcode 中点击停止按钮或选择 **Product**\
  \ ➤ **Stop**。\n2.  在导航器面板中点击 `ViewController.swift` 文件。\n3.  编辑 `ViewController.swift`\
  \ 文件的内容，使其如下所示：\n\n![../images/469983_1_En_4_Chapter/469983_1_En_4_Fig9_HTML.jpg](img/469983_1_En_4_Fig9_HTML.jpg)\n\
  \n图 4-9\n\n在几何形状上显示纹理文件\n\n\n\n```swift\nimport UIKit\nimport SceneKit\nimport ARKit\n\
  class ViewController: UIViewController, ARSCNViewDelegate {\n@IBOutlet var sceneView:\
  \ ARSCNView!\n@IBOutlet var Xslider: UISlider!\n@IBOutlet var Yslider: UISlider!\n\
  @IBOutlet var Zslider: UISlider!\nlet configuration = ARWorldTrackingConfiguration()\n\
  override func viewDidLoad() {\nsuper.viewDidLoad()\n// Do any additional setup after\
  \ loading the view, typically from a nib.\nsceneView.delegate = self\nsceneView.showsStatistics\
  \ = true\nsceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
  }\noverride func viewWillAppear(_ animated: Bool) {\nsuper.viewWillAppear(animated)\n\
  sceneView.session.run(configuration)\n}\n@IBAction func addButton(_ sender: UIButton)\
  \ {\nshowShape()\n}\n@IBAction func resetButton(_ sender: UIButton) {\nsceneView.session.pause()\n\
  sceneView.scene.rootNode.enumerateChildNodes { (node, _) in\nif node.name == \"\
  shape\" {\nnode.removeFromParentNode()\n}\n}\nsceneView.session.run(configuration,\
  \ options: [.resetTracking, .removeExistingAnchors])\n}\nfunc showShape() {\nlet\
  \ sphere = SCNSphere(radius: 0.05)\nlet material = SCNMaterial()\nmaterial.diffuse.contents\
  \ = UIImage(named: \"earth.jpg\")\nsphere.materials = [material]\nlet node = SCNNode()\n\
  node.geometry = sphere\nnode.position = SCNVector3(Xslider.value,Yslider.value,Zslider.value)\n\
  node.name = \"shape\"\nsceneView.scene.rootNode.addChildNode(node)\n}\n}\n```\n\n\
  3.  使用 USB 数据线将 iOS 设备连接到您的 Macintosh。\n4.  点击运行按钮或选择 Product ➤ Run。\n5.  使用滑块为球体定义\
  \ `x`、`y` 和 `z` 坐标，然后点击 `Add` 按钮。球体会出现并覆盖上您指定的纹理文件，如图 4-9 所示。\n\n尝试使用不同的几何形状和纹理图像，例如一个金字塔和一个木质纹理，如图\
  \ 4-10 所示。\n\n![Figure 4-10](img/469983_1_En_4_Fig10_HTML.jpg)\n图 4-10\n您可以显示不同的几何形状和纹理\n\
  \n```swift\nlet pyramid = SCNPyramid(width: 0.04, height: 0.03, length: 0.04)\n\
  let material = SCNMaterial()\nmaterial.diffuse.contents = UIImage(named: \"wood.jpg\"\
  )\npyramid.materials = [material]\n```\n\n## 更改形状的透明度\n\n通常，当您为几何形状添加纹理或颜色时，该纹理或颜色看起来是实心的。但您可以定义介于\
  \ `0` 和 `1` 之间的透明度值，其中 `1` 创建实心外观，而 `0` 实际上会使纹理或颜色完全不可见，例如：\n\n```swift\nmaterial.transparency\
  \ = 0.6\n```\n\n要查看如何更改透明度，请按照以下步骤操作：\n\n1.  单击停止按钮或选择 Product ➤ Stop。\n\n![Figure\
  \ 4-11](img/469983_1_En_4_Fig11_HTML.jpg)\n图 4-11\n将几何形状和纹理显示为透明\n\n1.  使用之前在几何形状上显示纹理的\
  \ Xcode 项目。\n2.  在导航器窗格中单击 `ViewController.swift` 文件。\n3.  在定义几何形状纹理的那一行下方添加以下行，例如：\n\
  \    ```swift\n    material.diffuse.contents = UIImage(named: \"wood.jpg\")\n  \
  \  material.transparency = 0.6\n    ```\n    请记住将 `\"wood.jpg\"` 替换为您正在使用的纹理文件的文件名和扩展名。完整的\
  \ `ViewController.swift` 文件应如下所示：\n\n    ```swift\n    import UIKit\n    import\
  \ SceneKit\n    import ARKit\n    class ViewController: UIViewController, ARSCNViewDelegate\
  \ {\n    @IBOutlet var sceneView: ARSCNView!\n    @IBOutlet var Xslider: UISlider!\n\
  \    @IBOutlet var Yslider: UISlider!\n    @IBOutlet var Zslider: UISlider!\n  \
  \  let configuration = ARWorldTrackingConfiguration()\n    override func viewDidLoad()\
  \ {\n    super.viewDidLoad()\n    // Do any additional setup after loading the view,\
  \ typically from a nib.\n    sceneView.delegate = self\n    sceneView.showsStatistics\
  \ = true\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
  \    }\n    override func viewWillAppear(_ animated: Bool) {\n    super.viewWillAppear(animated)\n\
  \    sceneView.session.run(configuration)\n    }\n    @IBAction func addButton(_\
  \ sender: UIButton) {\n    showShape()\n    }\n    @IBAction func resetButton(_\
  \ sender: UIButton) {\n    sceneView.session.pause()\n    sceneView.scene.rootNode.enumerateChildNodes\
  \ { (node, _) in\n    if node.name == \"shape\" {\n    node.removeFromParentNode()\n\
  \    }\n    }\n    sceneView.session.run(configuration, options: [.resetTracking,\
  \ .removeExistingAnchors])\n    }\n    func showShape() {\n    //let sphere = SCNSphere(radius:\
  \ 0.05)\n    let pyramid = SCNPyramid(width: 0.04, height: 0.03, length: 0.04)\n\
  \    let material = SCNMaterial()\n    material.diffuse.contents = UIImage(named:\
  \ \"wood.jpg\")\n    material.transparency = 0.6\n    //material.diffuse.contents\
  \ = UIImage(named: \"earth.jpg\")\n    //sphere.materials = [material]\n    pyramid.materials\
  \ = [material]\n    let node = SCNNode()\n    node.geometry = pyramid// sphere\n\
  \    node.position = SCNVector3(Xslider.value,Yslider.value,Zslider.value)\n   \
  \ node.name = \"shape\"\n    sceneView.scene.rootNode.addChildNode(node)\n    }\n\
  \    }\n    ```\n\n4.  使用 USB 数据线将 iOS 设备连接到 Macintosh。\n5.  单击运行按钮或选择 Product ➤\
  \ Run。\n6.  调整滑块以定义形状的 `x`、`y` 和 `z` 坐标。\n7.  点击 `Add` 按钮。请注意，形状现在显示为透明，如图 4-11\
  \ 所示。\n\n\n\n## 绘制形状\n\n通过提供可自定义的不同几何形状，ARKit 可以轻松地将虚拟对象添加到任何增强现实视图中。然而，如果您想要创建一个不适合常见几何形状（如盒子或球体）范围的自定义形状，该怎么办？最简单的解决方案是绘制您自己的形状。\n\
  \n最简单的形状类型是平面，您可以通过定义两组不同的点来创建。要绘制一个形状，必须定义一个 `BezierPath` 对象，如下所示：\n\n```\nlet\
  \ plane = UIBezierPath()\n```\n\n创建 `BezierPath` 对象后，下一步是定义一组起始的 x 和 y 坐标，例如 0,\
  \ 0，如下所示：\n\n```\nplane.move(to: CGPoint(x: 0, y: 0))\n```\n\n请记住，这些 x 和 y 坐标并不定义形状在增强现实视图中的物理位置。定义了起点之后，您可以定义第二组\
  \ x, y 坐标来定义一个平面，如下所示：\n\n```\nplane.addLine(to: CGPoint(x: 0, y: 0.1))\n```\n\n\
  这条 `plane.addLine` 命令告诉 Xcode 从 `plane.move` 命令定义的起始 x 和 y 坐标开始绘制。然后 `plane.addLine`\
  \ 命令绘制一条线，该线沿 x 轴延伸 0 个点，沿 y 轴延伸 0.1 个点。\n\n最后，您需要将形状定义为一个 `SCNShape` 对象，该对象还指定了形状沿\
  \ z 轴的厚度，称为*挤出深度*。为此，您需要定义形状名称及其挤出深度，如下所示：\n\n```\nlet customShape = SCNShape(path:\
  \ plane, extrusionDepth: 0.1)\n```\n\n创建自定义形状后，最后一步是将此形状分配给一个节点，并在特定的 x、y 和 z 坐标处显示该节点，如下所示：\n\
  \n```\nlet node = SCNNode()\nnode.geometry = customShape\nnode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.yellow\nnode.position = SCNVector3(0,0,0)\nsceneView.scene.rootNode.addChildNode(node)\n\
  ```\n\n此代码创建了一个沿 z 轴延伸 0.1 个点、沿 y 轴向上延伸 0.1 个点且完全不沿 x 轴延伸的黄色平面，如图 4-12 所示。\n\n![../images/469983_1_En_4_Chapter/469983_1_En_4_Fig12_HTML.jpg](img/469983_1_En_4_Fig12_HTML.jpg)\n\
  \n**图 4-12**  \n显示一个由其沿 x、y、z 轴的距离定义的平面\n\n通过添加多个 `addLine` 命令，您可以在自定义形状上定义额外的平面。要了解如何创建楔形形状，请按照以下步骤操作：\n\
  \n![../images/469983_1_En_4_Chapter/469983_1_En_4_Fig13_HTML.jpg](img/469983_1_En_4_Fig13_HTML.jpg)\n\
  \n**图 4-13**  \n两个 `addLine` 命令有助于定义楔形形状\n\n1.  使用在几何形状上显示纹理的 Xcode 项目。\n2.  在导航器窗格中单击\
  \ `ViewController.swift` 文件。\n3.  编辑 `showShape` 函数，使整个 `ViewController.swift` 文件看起来像这样：\n\
  \n```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController: UIViewController,\
  \ ARSCNViewDelegate {\n    @IBOutlet var sceneView: ARSCNView!\n    @IBOutlet var\
  \ Xslider: UISlider!\n    @IBOutlet var Yslider: UISlider!\n    @IBOutlet var Zslider:\
  \ UISlider!\n    let configuration = ARWorldTrackingConfiguration()\n    override\
  \ func viewDidLoad() {\n        super.viewDidLoad()\n        // Do any additional\
  \ setup after loading the view, typically from a nib.\n        sceneView.delegate\
  \ = self\n        sceneView.showsStatistics = true\n        sceneView.debugOptions\
  \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n \
  \   }\n    override func viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n\
  \        sceneView.session.run(configuration)\n    }\n    @IBAction func addButton(_\
  \ sender: UIButton) {\n        showShape()\n    }\n    @IBAction func resetButton(_\
  \ sender: UIButton) {\n        sceneView.session.pause()\n        sceneView.scene.rootNode.enumerateChildNodes\
  \ { (node, _) in\n            if node.name == \"shape\" {\n                node.removeFromParentNode()\n\
  \            }\n        }\n        sceneView.session.run(configuration, options:\
  \ [.resetTracking, .removeExistingAnchors])\n    }\n    func showShape() {\n   \
  \     let plane = UIBezierPath()\n        plane.move(to: CGPoint(x: 0, y: 0))\n\
  \        plane.addLine(to: CGPoint(x: 0.1, y: 0.1))\n        plane.addLine(to: CGPoint(x:\
  \ 0.1, y: -0.03))\n        let customShape = SCNShape(path: plane, extrusionDepth:\
  \ 0.1)\n        let node = SCNNode()\n        node.geometry = customShape\n    \
  \    node.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n        node.position\
  \ = SCNVector3(Xslider.value,Yslider.value,Zslider.value)\n        node.name = \"\
  shape\"\n        sceneView.scene.rootNode.addChildNode(node)\n    }\n}\n```\n\n\
  4.  通过 USB 线将 iOS 设备连接到您的 Macintosh。\n5.  单击 `Run` 按钮或选择 `Product` ➤ `Run`。\n6.\
  \  当应用程序运行时，点击 `Add` 按钮。将出现一个黄色楔形，如图 4-13 所示。\n7.  单击 `Stop` 按钮或选择 `Product` ➤ `Stop`。\n\
  \n第一个 `addLine` 命令定义了楔形的左侧，第二个 `addLine` 命令定义了楔形的右侧：\n\n```\nplane.addLine(to: CGPoint(x:\
  \ 0.1, y: 0.1))\nplane.addLine(to: CGPoint(x: 0.1, y: -0.03))\n```\n\n通过使用任意数量的\
  \ `addLine` 命令，您可以定义自己的自定义三维形状，这些形状无法通过球体、盒子或圆锥体等常见几何形状创建。\n\n## 总结\n\n除了显示 3D 图像，ARKit\
  \ 还可以在增强现实视图中显示几何形状。一些常见的几何形状包括盒子、球体、平面和圆柱体。通过指定尺寸和位置，您可以让几何形状出现在任何地方。\n\n定义了几何形状的尺寸后，您可以通过为其表面选择不同的颜色来修改其外观。为了获得更多变化，您还可以应用不同的纹理图像来覆盖您创建的任何几何形状的表面。\n\
  \n如果没有几何形状符合您的需求，您可以绘制单独的线条来创建自己的虚拟对象，以显示在增强现实视图中。通过绘制线条并结合多个几何形状，您可以创造出仅受想象力限制的自定义形状。\n\
  \n颜色和纹理可以让您的几何形状具有独特的外观。在下一章中，我们将学习使用不同光源改变虚拟对象外观的其他方法。\n\n"
- "# 5. 处理光照\n\n改变虚拟对象外观的最简单方法是改变其颜色或纹理。然而，改变虚拟对象外观的一个更微妙的方法是改变光源。想象一下一个典型的摄影棚，摄影师可以将一个或多个灯放置在拍摄对象周围的不同位置。这些灯可以明亮或暗淡，并以不同的强度和颜色照射，以不同的方式突出对象。\n\
  \n增强现实也是如此。为了在增强现实视图中突出虚拟对象，您可以在特定的 x、y 和 z 坐标处放置一个或多个光源。此外，您还可以定义不同类型的光源，例如方向光、环境光或聚光灯，以创建独特的视觉效果，如图\
  \ 5-1 所示。\n\n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig1_HTML.jpg](img/469983_1_En_5_Fig1_HTML.jpg)\n\
  \n**图 5-1**  \n可用的不同光照类型\n\n通过添加光照并通过颜色、强度和色温自定义光照的外观，您可以在增强现实视图中以独特的方式照亮虚拟对象。\n\
  \n\n\n## 使用颜色、强度与色温\n\n彩色光能以不同方式照亮虚拟物体，特别是当虚拟物体本身带有颜色时。虽然改变颜色是调整光源最直观的方法，但还有另外两种方式可以改变光的表现效果，即色温与强度。\n\
  \n色温的作用是将光的颜色值乘以一个与光源色温相对应的色彩值。默认值`6500`代表纯白光，而较低的值（最低至零）会为光源增添一种“较暖”的黄色或橙色效果。反之，较高的值（最高至`40000`）则会添加一种“较冷”的蓝色效果。\n\
  \n强度通过调亮或调暗光线来改变光源，值设为`1000`时光线保持不变。较低的值会使光线变暗，而较高的值则会使光线更亮。\n\n要学习如何使用光线来改变虚拟物体的外观，我们首先按照以下步骤创建一个新的\
  \ Xcode 项目：\n\n1.  启动 Xcode。（请确保您使用的是 Xcode 10 或更高版本。）\n2.  选择`文件` ➤ `新建` ➤ `项目`。Xcode\
  \ 会提示您选择一个模板。\n3.  点击 iOS 类别。\n4.  点击“单视图应用”图标，然后点击“下一步”按钮。Xcode 会要求输入产品名称、组织名称、组织标识符和内容技术。\n\
  5.  点击“产品名称”文本框，为您的项目输入一个描述性名称，例如`光源`。（具体名称无关紧要。）\n6.  点击“下一步”按钮。Xcode 会询问您希望将项目存储在哪里。\n\
  7.  选择一个文件夹并点击“创建”按钮。Xcode 将创建一个 iOS 项目。\n\n现在，按照以下步骤修改`Info.plist`文件，以允许访问相机并使用\
  \ ARKit：\n\n1.  在导航器窗格中点击`Info.plist`文件。Xcode 会显示一个键、类型和值的列表。\n2.  点击展开三角形以展开“必需设备功能”类别，显示\
  \ Item 0。\n3.  将鼠标指针悬停在 Item 0 上，会显示一个加号（`+`）图标。\n4.  点击这个加号（`+`）图标，会显示一个空白的 Item\
  \ 1。\n5.  在 Item 1 行的“值”类别下输入`arkit`。\n6.  将鼠标指针悬停在最后一行上，会显示一个加号（`+`）图标。\n7.  点击加号（`+`）图标以创建新行。会弹出一个菜单。\n\
  8.  选择`隐私 - 相机使用说明`。\n9.  在`隐私 - 相机使用说明`行的“值”类别下输入`AR 需要使用相机`。\n\n现在，按照以下步骤修改`ViewController.swift`文件以使用\
  \ ARKit 和 SceneKit：\n\n1.  在导航器窗格中点击`ViewController.swift`文件。\n2.  编辑`ViewController.swift`文件，使其看起来如下所示：\n\
  \n```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController: UIViewController,\
  \ ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
  \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do any\
  \ additional setup after loading the view, typically from a nib.\n    }\n}\n```\n\
  \n为了在我们的应用中查看增强现实效果，我们需要向`Main.storyboard`用户界面添加以下对象：\n\n*   一个 ARKit SceneKit 视图（`ARSCNView`）——用于结合相机视图显示增强现实\n\
  *   两个`UISlider`——用于控制光源的色温和强度\n*   两个`UILabel`——用于标识每个滑块的作用\n*   五个`UIButton`——用于选择光源的不同颜色\n\
  \n要设计用户界面，请在导航器窗格中点击`Main.storyboard`文件，并点击对象库按钮以打开对象库。然后将不同的用户界面项目拖放到用户界面上。最终的用户界面应类似于图\
  \ 5-2。\n\n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig2_HTML.jpg](img/469983_1_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2** 设计用户界面\n\n\n\n## 添加约束和修改用户界面对象\n\n设计好用户界面后，你需要为这些界面项目添加约束。要添加约束，请选择\
  \ **Editor** ➤ **Resolve Auto Layout Issues** ➤ **Reset to Suggested Constraints**（位于\
  \ **All Views in Container** 类别下的菜单下半部分）。\n\n添加约束后，下一步是修改用户界面对象。双击两个 `UILabel` 并将它们的标题更改为\
  \ `Temperature` 和 `Intensity`。\n\n现在按照以下步骤修改 `Temperature` 标签旁边的 `UISlider`：\n\n\
  ![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig3_HTML.jpg](img/469983_1_En_5_Fig3_HTML.jpg)\n\
  \n**图 5-3**：为温度滑块定义值\n\n1.  点击 `Temperature` `UISlider`。\n2.  点击 **Attributes Inspector**\
  \ 图标或选择 **View** ➤ **Inspectors** ➤ **Show Attributes Inspector**。\n3.  在 **Value**\
  \ 文本框中输入数字 `6500`。\n4.  在 **Minimum** 文本框中输入 `0`。\n5.  在 **Maximum** 文本框中输入 `40000`。\n\
  \n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig4_HTML.jpg](img/469983_1_En_5_Fig4_HTML.jpg)\n\
  \n**图 5-4**：为强度滑块定义值\n\n1.  点击 `Intensity` `UISlider`。\n2.  在 **Value** 文本框中输入数字\
  \ `1000`。\n3.  在 **Minimum** 文本框中输入 `0`。\n4.  在 **Maximum** 文本框中输入 `10000`。\n\n\
  现在，需要通过调整每个按钮的大小、移除标题并设置背景颜色来修改屏幕底部的 `UIButtons`。为此，请按照以下步骤操作：\n\n1.  点击 `UIButton`。\n\
  2.  点击 **Size Inspector** 图标或选择 **View** ➤ **Navigators** ➤ **Show Size Inspector`。\n\
  3.  在 **View** 类别的 **Width** 和 **Height** 文本框中输入 `30`。\n\n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig5_HTML.jpg](img/469983_1_En_5_Fig5_HTML.jpg)\n\
  \n**图 5-5**：为 `UIButton` 定义宽度和高度\n\n1.  点击 **Attributes Inspector** 图标或选择 **View**\
  \ ➤ **Navigators** ➤ **Show Attributes Inspector`。\n2.  从 `UIButton` 中删除标题。\n3.\
  \  在 **View** 类别下点击 **Background** 弹出菜单并选择一种颜色。\n\n![../images/469983_1_En_5_Chapter/469983_1_En_5_Fig6_HTML.jpg](img/469983_1_En_5_Fig6_HTML.jpg)\n\
  \n**图 5-6**：为 `UIButton` 定义背景颜色\n\n1.  为每个 `UIButton` 重复步骤 2-6，但在步骤 5 中为每个 `UIButton`\
  \ 选择不同的颜色。（选择的具体颜色不重要，但确保不要为两个或多个 `UIButton` 选择相同的颜色。）\n\n## 将用户界面连接到 Swift 代码\n\
  \n设计好用户界面后，下一步是将用户界面项目连接到 `ViewController.swift` 文件中的 Swift 代码。为此，请按照以下步骤操作：\n\n\
  1.  在 **Navigator** 窗格中点击 `Main.storyboard` 文件。\n2.  点击 **Assistant Editor** 图标或选择\
  \ **View** ➤ **Assistant Editor** ➤ **Show Assistant Editor** 以并排显示 `Main.storyboard`\
  \ 和 `ViewController.swift` 文件。\n3.  将鼠标指针移到 `ARSCNView` 上，按住 **Control** 键，并 Ctrl-拖动到\
  \ `class ViewController` 行下方。\n4.  释放 **Control** 键和鼠标左键。会出现一个弹出菜单。\n5.  点击 **Name**\
  \ 文本字段并输入 `sceneView`，然后点击 **Connect** 按钮。Xcode 将创建一个 `IBOutlet`，如下所示：\n\n```\n\
  @IBOutlet var sceneView: ARSCNView!\n```\n\n6.  在此 `IBOutlet` 下方，输入以下代码：\n\n```\n\
  let showLight = SCNNode()\n```\n\n7.  编辑 `viewDidLoad` 函数，使其如下所示：\n\n```\noverride\
  \ func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional setup\
  \ after loading the view, typically from a nib.\n    sceneView.delegate = self\n\
  \    sceneView.showsStatistics = true\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
  \ ARSCNDebugOptions.showFeaturePoints]\n}\n```\n\n8.  编辑 `viewWillAppear` 函数，使其如下所示：\n\
  \n```\noverride func viewWillAppear(_ animated: Bool) {\n    super.viewWillAppear(animated)\n\
  \    showShape()\n    lightOn()\n    sceneView.session.run(configuration)\n}\n```\n\
