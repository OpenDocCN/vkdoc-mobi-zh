- "# 11. 平面检测\n\n将虚拟对象悬空放置是可行的，但增强现实在与现实世界互动时效果最佳。增强现实与现实世界互动的最基本方式之一就是检测水平或垂直平面。当\
  \ ARKit 能检测到一个平坦表面时，它就可以随后放置一个虚拟对象，使其看起来像是放置在那个真实的平坦表面上，例如桌子或地板。\n\n每当 ARKit 检测到一个平面时，它就会在该增强现实视图中放置一个锚点。每个平面对应一个锚点，其中包含关于该平面的信息：\n\
  \n*   方向\n*   位置\n*   大小\n\n当你移动 iOS 设备上的摄像头时，ARKit 会不断更新关于平面的信息。通常，这涉及到认识到一个平面可能比最初认为的要大。例如，当你首次将\
  \ iOS 设备的摄像头对准地板时，ARKit 只能识别摄像头看到的那部分地板。当你移动 iOS 设备的摄像头时，ARKit 可以检测到地板的其它部分，迫使其更新关于该平面实际可能有多大的信息。\n\
  \n在本章中，让我们按照以下步骤创建一个新的 Xcode 项目：\n\n1.  启动 Xcode。（请确保你使用的是 Xcode 10 或更高版本。）\n2.\
  \  选择 `File` ➤ `New` ➤ `Project`。Xcode 会要求你选择一个模板。\n3.  点击 `iOS` 类别。\n4.  点击 `Single\
  \ View App` 图标，然后点击 `Next` 按钮。Xcode 会要求输入产品名称、组织名称、组织标识符和内容技术。\n5.  点击 `Product\
  \ Name` 文本字段，并为你的项目输入一个描述性名称，例如 `PlaneDetection`。（确切的名称无关紧要。）\n6.  点击 `Next` 按钮。Xcode\
  \ 会询问你想将项目存储在哪里。\n7.  选择一个文件夹并点击 `Create` 按钮。Xcode 会创建一个 iOS 项目。\n\n现在，按照以下步骤修改\
  \ `Info.plist` 文件以允许访问摄像头并使用 ARKit：\n\n1.  点击导航器窗格中的 `Info.plist` 文件。Xcode 会显示一个键、类型和值的列表。\n\
  2.  点击展开三角形以展开 `Required Device Capabilities` 类别，显示 `Item 0`。\n3.  将鼠标指针悬停在 `Item\
  \ 0` 上，会显示一个加号（`+`）图标。\n4.  点击这个加号（`+`）图标，显示一个空白的 `Item 1`。\n5.  在 `Item 1` 行的 `Value`\
  \ 类别下输入 `arkit`。\n6.  将鼠标指针悬停在最后一行上，会显示一个加号（`+`）图标。\n7.  点击加号（`+`）图标以创建一个新行。会出现一个弹出菜单。\n\
  8.  选择 `Privacy - Camera Usage Description`。\n9.  在 `Privacy - Camera Usage Description`\
  \ 行的 `Value` 类别下输入 `AR needs to use the camera`。\n\n现在，是时候按照以下步骤修改 `ViewController.swift`\
  \ 文件以使用 ARKit 和 SceneKit 了：\n\n1.  点击导航器窗格中的 `ViewController.swift` 文件。\n2.  编辑\
  \ `ViewController.swift` 文件，使其看起来像这样：\n\n```\nimport UIKit\nimport SceneKit\nimport\
  \ ARKit\n\nclass ViewController: UIViewController, ARSCNViewDelegate {\n    let\
  \ configuration = ARWorldTrackingConfiguration()\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        // Do any additional setup after loading\
  \ the view, typically from a nib.\n    }\n}\n```\n\n为了在我们的应用中查看增强现实，添加一个 ARKit SceneKit\
  \ 视图（`ARSCNView`），使用户界面看起来类似于图 11-1。\n\n![../images/469983_1_En_11_Chapter/469983_1_En_11_Fig1_HTML.jpg](img/469983_1_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1 用户界面包含一个单独的 ARSCNView\n\n设计好用户界面后，需要添加约束。要添加约束，请在 `Editor` ➤ `Resolve Auto\
  \ Layout Issues` ➤ `Reset to Suggested Constraints` 菜单的底部（位于 `All Views in Container`\
  \ 类别下）选择。\n\n下一步是将用户界面项连接到 `ViewController.swift` 文件中的 Swift 代码。为此，请按照以下步骤操作：\n\n\
  1.  点击导航器窗格中的 `Main.storyboard` 文件。\n\n\n\n## 连接视图并配置平面检测\n\n2.  点击助手编辑器图标，或选择“视图”➤“助手编辑器”➤“显示助手编辑器”，以并排显示\
  \ `Main.storyboard` 和 `ViewController.swift` 文件。\n\n3.  将鼠标指针悬停在 `ARSCNView` 上，按住\
  \ Control 键，并按住 Ctrl 拖曳到 `class ViewController` 行下方。\n\n4.  松开 Control 键和鼠标左键。将出现一个弹出菜单。\n\
  \n5.  在“名称”文本框中输入 `sceneView`，然后点击“连接”按钮。Xcode 将创建一个 IBOutlet，如下所示：\n\n    ```\n\
  \    @IBOutlet var sceneView: ARSCNView!\n    ```\n\n## 配置视图和平面检测\n\n6.  编辑 `viewDidLoad`\
  \ 函数，使其如下所示：\n\n    ```\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
  \        // 从 nib 加载视图后进行任何其他设置。\n        sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
  \ ARSCNDebugOptions.showFeaturePoints]\n        sceneView.delegate = self\n    \
  \    configuration.planeDetection = .horizontal\n        sceneView.session.run(configuration)\n\
  \    }\n    ```\n\n7.  编辑 `viewWillAppear` 函数，使其如下所示：\n\n    ```\n    override func\
  \ viewWillAppear(_ animated: Bool) {\n        super.viewWillAppear(animated)\n \
  \       sceneView.session.run(configuration)\n    }\n    ```\n\n请注意，要检测水平平面，我们只需要一行代码：\n\
  \n```\nconfiguration.planeDetection = .horizontal\n```\n\n检测水平平面需要 ARKit 在一个平坦的水平表面上识别足够的特征点（那些微小的黄点）。为了提高\
  \ ARKit 检测到水平平面的几率，请将 iOS 设备的摄像头对准具有丰富纹理或颜色变化的平坦表面，例如床、地毯或桌子。相比之下，纯白色的地板将更难识别，因为\
  \ ARKit 可识别的细节要少得多。\n\n## 实现渲染器委托方法\n\n为了检测 ARKit 是否识别出水平平面，我们需要一个 `didAdd renderer`\
  \ 函数。该函数在 ARKit 每次识别出一个水平平面并将其识别为一个名为 `ARPlaneAnchor` 的平面锚定时运行，该锚定定义了平坦表面的位置和方向。在您的\
  \ `ViewController.swift` 文件中添加以下 `didAdd renderer` 函数：\n\n```\nfunc renderer(_ renderer:\
  \ SCNSceneRenderer, didAdd node: SCNNode, for anchor: ARAnchor) {\n    guard anchor\
  \ is ARPlaneAnchor else { return }\n    print (\"plane detected\")\n}\n```\n\nARKit\
  \ 首次识别一个水平平面时，它会假定该水平平面仅为其通过 iOS 设备摄像头看到的大小。当您移动 iOS 设备的摄像头时，ARKit 会发现该水平平面的其他点。当这种情况发生时，它会更新其平面锚点信息，以存储一个更大尺寸的水平平面。\n\
  \n每次 ARKit 通过认识到水平平面可能更大而更新其 `ARPlaneAnchor` 信息时，它都会运行一个 `didUpdate renderer` 函数。在\
  \ `ViewController.swift` 文件中添加以下 `didUpdate renderer` 函数：\n\n```\nfunc renderer(_\
  \ renderer: SCNSceneRenderer, didUpdate node: SCNNode, for anchor: ARAnchor) {\n\
  \    guard anchor is ARPlaneAnchor else { return }\n    print(\"updating plane anchor\"\
  )\n}\n```\n\n在这两个 `renderer` 函数中，都有一个初始的 `guard` 语句，用于检查 `renderer` 函数是否识别到水平平面\
  \ (`ARPlaneAnchor`)。如果没有，则 `renderer` 函数退出。如果 `renderer` 函数确实识别到一个水平平面，那么每个 `renderer`\
  \ 函数都会打印一条语句（`\"plane detected\"` 或 `\"updating plane anchor\"`）。\n\n## 完整的 ViewController.swift\
  \ 文件\n\n完整的 `ViewController.swift` 文件应如下所示：\n\n```\nimport UIKit\nimport SceneKit\n\
  import ARKit\nclass ViewController: UIViewController, ARSCNViewDelegate {\n    @IBOutlet\
  \ var sceneView: ARSCNView!\n    let configuration = ARWorldTrackingConfiguration()\n\
  \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // 从 nib\
  \ 加载视图后进行任何其他设置。\n        sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
  \ ARSCNDebugOptions.showFeaturePoints]\n        sceneView.delegate = self\n    \
  \    configuration.planeDetection = .horizontal\n        sceneView.session.run(configuration)\n\
  \    }\n    func renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for\
  \ anchor: ARAnchor) {\n        guard anchor is ARPlaneAnchor else { return }\n \
  \       print (\"plane detected\")\n    }\n    func renderer(_ renderer: SCNSceneRenderer,\
  \ didUpdate node: SCNNode, for anchor: ARAnchor) {\n        guard anchor is ARPlaneAnchor\
  \ else { return }\n        print(\"updating plane anchor\")\n    }\n}\n```\n\n##\
  \ 测试项目\n\n要测试此项目，请按照以下步骤操作：\n\n1.  通过 USB 数据线将 iOS 设备连接到 Macintosh。\n2.  点击“运行”按钮或选择“产品”➤“运行”。首次运行此应用程序时，它会请求访问摄像头的权限，请授予其权限。\n\
  3.  将 iOS 设备的摄像头对准水平平面，例如椅子座面或地板。ARKit 首次识别出水平平面时，Xcode 调试区域会显示消息“plane detected”。\n\
  4.  移动 iOS 设备以捕捉更多水平平面。每次 ARKit 识别出水平平面的新部分时，Xcode 调试区域会显示消息“updating plane anchor”。\n\
  5.  点击“停止”按钮或选择“产品”➤“停止”。\n\n\n\n## 在平面上显示图像\n\n一旦能让 ARKit 识别水平面，我们就可以在该水平面上放置图像。首先，你需要获取一张图片，比如在你常用的搜索引擎中搜索“纹理图像\
  \ 公共领域”。现在，你可以下载任何想要的纹理图像，例如砖砌人行道、木地板或波光粼粼的水面。\n\n要将 .png 或 .jpg 图像添加到 Xcode 项目中，只需将该图像拖放到\
  \ Xcode 项目的导航器面板中，如图 11-2 所示。\n\n![../images/469983_1_En_11_Chapter/469983_1_En_11_Fig2_HTML.jpg](img/469983_1_En_11_Fig2_HTML.jpg)\n\
  \n图 11-2 将图像拖放到导航器面板中\n\n为平面添加纹理图像后，下一步就是创建一个带纹理的平面，并将其添加到 `didAdd renderer` 函数内的\
  \ `sceneView` 根节点中，如下所示：\n\n```\nlet planeNode = displayTexture()\nsceneView.scene.rootNode.addChildNode(planeNode)\n\
  ```\n\n### 创建平面\n\n要创建平面，我们需要创建一个名为 `displayTexture` 的函数，该函数会创建一个 `SCNNode`，将该节点定义为宽度和高度均为\
  \ 0.5 米的 `SCNPlane`，并使其出现在位置 (0, 0, -0.5) 处。最重要的是，`SCNPlane` 需要使用你拖入导航器面板的纹理图像，例如一个名为\
  \ `water.jpg` 的图像（请将此名称更改为你拖入 Xcode 导航器面板的图像名称）。`displayTexture` 函数应如下所示：\n\n```\n\
  func displayTexture() -> SCNNode {\n    let planeNode = SCNNode()\n    planeNode.geometry\
  \ = SCNPlane(width: 0.5, height: 0.5)\n    planeNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIImage(named: \"water.jpg\")\n    planeNode.position = SCNVector3(0, 0, -0.5)\n\
  \    return planeNode\n}\n```\n\n如果运行此代码，它将创建一个平面，将 `water.jpg` 显示为一个垂直平面，如图 11-3\
  \ 所示。\n\n![../images/469983_1_En_11_Chapter/469983_1_En_11_Fig3_HTML.jpg](img/469983_1_En_11_Fig3_HTML.jpg)\n\
  \n图 11-3 在平面上显示图像\n\n### 使平面变为双面且水平\n\n除了将平面沿 x 轴旋转 90 度使其平放外，另一个问题是，如果你看向平面后方，图像只出现在一侧。为了使图像出现在平面的两面，我们需要将平面定义为双面，如下所示：\n\
  \n```\nplaneNode.geometry?.firstMaterial?.isDoubleSided = true\n```\n\n然后，我们需要将平面绕\
  \ x 轴旋转 90 度。请记住，Xcode 使用弧度度量所有角度，因此我们首先需要将 90 度转换为弧度，如下所示：\n\n```\nlet ninetyDegrees\
  \ = GLKMathDegreesToRadians(90)\n```\n\n然后，我们可以通过定义其 `eulerAngles` 位置来将平面绕其 x 轴旋转，如下所示：\n\
  \n```\nplaneNode.eulerAngles = SCNVector3(ninetyDegrees, 0, 0)\n```\n\n整个 `displayTexture`\
  \ 函数应如下所示：\n\n```\nfunc displayTexture() -> SCNNode {\n    let planeNode = SCNNode()\n\
  \    planeNode.geometry = SCNPlane(width: 0.5, height: 0.5)\n    planeNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIImage(named: \"water.jpg\")\n    planeNode.position = SCNVector3(0, 0, -0.5)\n\
  \    let ninetyDegrees = GLKMathDegreesToRadians(90)\n    planeNode.eulerAngles\
  \ = SCNVector3(ninetyDegrees, 0, 0)\n    planeNode.geometry?.firstMaterial?.isDoubleSided\
  \ = true\n    return planeNode\n}\n```\n\n整个 `ViewController.swift` 文件应如下所示，以显示带图像的水平平面：\n\
  \n```\nimport UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController: UIViewController,\
  \ ARSCNViewDelegate {\n    @IBOutlet var sceneView: ARSCNView!\n    let configuration\
  \ = ARWorldTrackingConfiguration()\n\n    override func viewDidLoad() {\n      \
  \  super.viewDidLoad()\n        sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
  \ ARSCNDebugOptions.showFeaturePoints]\n        sceneView.delegate = self\n    \
  \    configuration.planeDetection = .horizontal\n        sceneView.session.run(configuration)\n\
  \n        let planeNode = displayTexture()\n        sceneView.scene.rootNode.addChildNode(planeNode)\n\
  \    }\n\n    func displayTexture() -> SCNNode {\n        let planeNode = SCNNode()\n\
  \        planeNode.geometry = SCNPlane(width: 0.5, height: 0.5)\n        planeNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIImage(named: \"water.jpg\")\n        planeNode.position = SCNVector3(0, 0,\
  \ -0.5)\n        let ninetyDegrees = GLKMathDegreesToRadians(90)\n        planeNode.eulerAngles\
  \ = SCNVector3(ninetyDegrees, 0, 0)\n        planeNode.geometry?.firstMaterial?.isDoubleSided\
  \ = true\n        return planeNode\n    }\n\n    func renderer(_ renderer: SCNSceneRenderer,\
  \ didAdd node: SCNNode, for anchor: ARAnchor) {\n        guard anchor is ARPlaneAnchor\
  \ else { return }\n        print (\"plane detected\")\n    }\n\n    func renderer(_\
  \ renderer: SCNSceneRenderer, didUpdate node: SCNNode, for anchor: ARAnchor) {\n\
  \        guard anchor is ARPlaneAnchor else { return }\n        print(\"updating\
  \ plane anchor\")\n    }\n}\n```\n\n如果运行此代码，你将看到一个水平平面，其顶部和底部都显示纹理图像，如图 11-4 所示。\n\
  \n![../images/469983_1_En_11_Chapter/469983_1_En_11_Fig4_HTML.jpg](img/469983_1_En_11_Fig4_HTML.jpg)\n\
  \n图 11-4 水平显示的平面\n\n### 将平面附加到检测到的表面\n\n目前平面以任意大小和位置出现。我们希望的是让该平面出现在 ARKit 检测到水平面的位置，例如地板或桌面。\n\
  \n首先，从 `viewDidLoad` 函数中删除这两行：\n\n```\nlet planeNode = displayTexture()\nsceneView.scene.rootNode.addChildNode(planeNode)\n\
  ```\n\n现在，在 `didAdd renderer` 函数中，添加以下两行：\n\n```\nlet planeNode = displayTexture(anchor:\
  \ anchor as! ARPlaneAnchor)\nnode.addChildNode(planeNode)\n```\n\n整个 `didAdd renderer`\
  \ 函数应如下所示：\n\n```\nfunc renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode,\
  \ for anchor: ARAnchor) {\n    guard anchor is ARPlaneAnchor else { return }\n \
  \   let planeNode = displayTexture(anchor: anchor as! ARPlaneAnchor)\n    node.addChildNode(planeNode)\n\
  \    print (\"plane detected\")\n}\n```\n\n这个 `didAdd renderer` 函数现在的作用是，一旦检测到水平面，它就会将该水平面的大小和位置存储为\
  \ `ARPlaneAnchor`。因此，我们获取此大小和位置信息并将其传递给创建实际平面的 `displayTexture` 函数。\n\n这意味着我们需要修改\
  \ `displayTexture` 函数，使其能够接受一个参数，如下所示：\n\n```\nfunc displayTexture(anchor: ARPlaneAnchor)\
  \ -> SCNNode {\n```\n\n在 `displayTexture` 函数内部，我们需要修改平面的大小和位置，这两者都来自传入 `displayTexture`\
  \ 函数的 `anchor` 参数。首先，我们需要根据锚点定义平面的大小。为此，我们需要将平面的尺寸从任意的固定值更改为锚点的大小，如下所示：\n\n```\n\
  planeNode.geometry = SCNPlane(width: CGFloat(anchor.extent.x), height: CGFloat(anchor.extent.z))\n\
  ```\n\n接下来，我们需要根据锚点定义水平面的位置，如下所示：\n\n```\nplaneNode.position = SCNVector3(anchor.center.x,\
  \ anchor.center.y, anchor.center.z)\n```\n\n整个修改后的 `ViewController.swift` 文件现在应如下所示：\n\
  \n\n\n```swift\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController:\
  \ UIViewController, ARSCNViewDelegate {\n@IBOutlet var sceneView: ARSCNView!\nlet\
  \ configuration = ARWorldTrackingConfiguration()\noverride func viewDidLoad() {\n\
  super.viewDidLoad()\n// 视图加载后执行任何额外的设置，通常是从 nib 文件加载。\nsceneView.debugOptions =\
  \ [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\nsceneView.delegate\
  \ = self\nconfiguration.planeDetection = .horizontal\nsceneView.session.run(configuration)\n\
  }\nfunc displayTexture(anchor: ARPlaneAnchor) -> SCNNode {\nlet planeNode = SCNNode()\n\
  planeNode.geometry = SCNPlane(width: CGFloat(anchor.extent.x), height: CGFloat(anchor.extent.z))\n\
  planeNode.geometry?.firstMaterial?.diffuse.contents = UIImage(named: \"water.jpg\"\
  )\nplaneNode.position = SCNVector3(anchor.center.x, anchor.center.y, anchor.center.z)\n\
  let ninetyDegrees = GLKMathDegreesToRadians(90)\nplaneNode.eulerAngles = SCNVector3(ninetyDegrees,\
  \ 0, 0)\nplaneNode.geometry?.firstMaterial?.isDoubleSided = true\nreturn planeNode\n\
  }\nfunc renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:\
  \ ARAnchor) {\nguard anchor is ARPlaneAnchor else { return }\nlet planeNode = displayTexture(anchor:\
  \ anchor as! ARPlaneAnchor)\nnode.addChildNode(planeNode)\nprint (\"plane detected\"\
  )\n}\nfunc renderer(_ renderer: SCNSceneRenderer, didUpdate node: SCNNode, for anchor:\
  \ ARAnchor) {\nguard anchor is ARPlaneAnchor else { return }\nprint(\"updating plane\
  \ anchor\")\n}\n}\n```\n\n如果你运行这段代码，你会注意到当应用识别出一个水平面时，它会在那个位置放置一个显示纹理图像的平面。然而，还有一个额外的问题。`didUpdate\
  \ renderer`函数会不断扫描现实世界，并更新它所识别的水平面的`ARPlaneAnchor`。\n\n这意味着我们需要在这个`didUpdate renderer`函数内部添加代码，以便当它识别出水平面更大时，会在该区域显示一个更大的虚拟平面。\n\
  \n`didUpdate renderer`函数每次在 ARKit 检测到水平面更大时都会运行。每次它都需要在添加更新的水平面之前移除当前显示的水平面。为此，我们使用`enumeratechildNodes`循环来不断移除旧的水平平面，如下所示：\n\
  \n```swift\nnode.enumerateChildNodes { (childNode, _) in\nchildNode.removeFromParentNode()\n\
  }\n```\n\n在移除了旧的水平平面之后，我们需要添加一个新的，所以整个`didUpdate renderer`函数应该如下所示：\n\n```swift\n\
  func renderer(_ renderer: SCNSceneRenderer, didUpdate node: SCNNode, for anchor:\
  \ ARAnchor) {\nguard anchor is ARPlaneAnchor else { return }\nnode.enumerateChildNodes\
  \ { (childNode, _) in\nchildNode.removeFromParentNode()\n}\nlet planeNode = displayTexture(anchor:\
  \ anchor as! ARPlaneAnchor)\nnode.addChildNode(planeNode)\nprint(\"updating plane\
  \ anchor\")\n}\n```\n\n现在整个`ViewController.swift`文件应该如下所示：\n\n```swift\nimport UIKit\n\
  import SceneKit\nimport ARKit\nclass ViewController: UIViewController, ARSCNViewDelegate\
  \ {\n@IBOutlet var sceneView: ARSCNView!\nlet configuration = ARWorldTrackingConfiguration()\n\
  override func viewDidLoad() {\nsuper.viewDidLoad()\n// 视图加载后执行任何额外的设置，通常是从 nib 文件加载。\n\
  sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
  sceneView.delegate = self\nconfiguration.planeDetection = .horizontal\nsceneView.session.run(configuration)\n\
  }\nfunc displayTexture(anchor: ARPlaneAnchor) -> SCNNode {\nlet planeNode = SCNNode()\n\
  planeNode.geometry = SCNPlane(width: CGFloat(anchor.extent.x), height: CGFloat(anchor.extent.z))\n\
  planeNode.geometry?.firstMaterial?.diffuse.contents = UIImage(named: \"water.jpg\"\
  )\nplaneNode.position = SCNVector3(anchor.center.x, anchor.center.y, anchor.center.z)\n\
  let ninetyDegrees = GLKMathDegreesToRadians(90)\nplaneNode.eulerAngles = SCNVector3(ninetyDegrees,\
  \ 0, 0)\nplaneNode.geometry?.firstMaterial?.isDoubleSided = true\nreturn planeNode\n\
  }\nfunc renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:\
  \ ARAnchor) {\nguard anchor is ARPlaneAnchor else { return }\nlet planeNode = displayTexture(anchor:\
  \ anchor as! ARPlaneAnchor)\nnode.addChildNode(planeNode)\nprint (\"plane detected\"\
  )\n}\nfunc renderer(_ renderer: SCNSceneRenderer, didUpdate node: SCNNode, for anchor:\
  \ ARAnchor) {\nguard anchor is ARPlaneAnchor else { return }\nnode.enumerateChildNodes\
  \ { (childNode, _) in\nchildNode.removeFromParentNode()\n}\nlet planeNode = displayTexture(anchor:\
  \ anchor as! ARPlaneAnchor)\nnode.addChildNode(planeNode)\nprint(\"updating plane\
  \ anchor\")\n}\n}\n```\n\n要测试此代码，请按照以下步骤操作：\n\n1.  通过 USB 线缆将 iOS 设备连接到 Mac。\n2.\
  \  点击运行按钮或选择 **Product** ➤ **Run**。第一次运行此应用时，它会请求访问摄像头的权限，请授予权限。\n3.  将 iOS 设备的摄像头对准水平面，例如椅子座面或地板。当\
  \ ARKit 第一次识别出水平面时，Xcode 调试区会显示消息“plane detected”。这是 ARKit 第一次显示虚拟平面，该平面会显示你拖放到\
  \ Xcode 导航器窗格中的纹理图像。\n4.  移动 iOS 设备以捕捉更多的水平面区域。每次 ARKit 识别出水平面的新部分时，Xcode 调试区会显示消息“updating\
  \ plane anchor”。请注意，水平虚拟平面的尺寸会不断增大。\n5.  点击停止按钮或选择 **Product** ➤ **Stop**。\n\n\n\
  \n## 在水平面上放置虚拟对象\n\n用户与增强现实互动的一种方式是将虚拟对象放置在现实世界中识别的水平面上，例如地板或桌面。这首先需要检测水平面，然后将虚拟对象放置在该检测到的水平面上。\n\
  \n让我们按照以下步骤创建一个新的 Xcode 项目：\n\n1. 启动 Xcode。（请确保您使用的是 Xcode 10 或更高版本。）\n2. 选择 `文件`\
  \ ➤ `新建` ➤ `项目`。Xcode 会要求您选择一个模板。\n3. 点击 `iOS` 类别。\n4. 点击 `单视图应用` 图标，然后点击 `下一步`\
  \ 按钮。Xcode 会要求输入产品名称、组织名称、组织标识符和内容技术。\n5. 在 `产品名称` 文本框中点击并为您项目输入一个描述性名称，例如 `PlacingObjects`。（具体名称并不重要。）\n\
  6. 点击 `下一步` 按钮。Xcode 会询问您希望将项目存储在哪里。\n7. 选择一个文件夹并点击 `创建` 按钮。Xcode 会创建一个 iOS 项目。\n\
  \n## 修改 `Info.plist` 文件\n\n现在按照以下步骤修改 `Info.plist` 文件以允许访问相机并使用 ARKit：\n\n1. 在导航器面板中点击\
  \ `Info.plist` 文件。Xcode 会显示一个键、类型和值的列表。\n2. 点击展开三角形展开 `必需设备功能` 类别以显示 `Item 0`。\n\
  3. 将鼠标指针悬停在 `Item 0` 上会显示一个加号 (`+`) 图标。\n4. 点击这个加号 (`+`) 图标会显示一个空白的 `Item 1`。\n\
  5. 在 `Item 1` 行的 `Value` 类别下输入 `arkit`。\n6. 将鼠标指针悬停在最后一行上会显示一个加号 (`+`) 图标。\n7. 点击加号\
  \ (`+`) 图标创建一个新行。会出现一个弹出菜单。\n8. 选择 `隐私 - 相机使用说明`。\n9. 在 `隐私 - 相机使用说明` 行的 `Value`\
  \ 类别下输入 `AR 需要使用相机`。\n\n## 修改 `ViewController.swift` 文件\n\n现在该修改 `ViewController.swift`\
  \ 文件以使用 ARKit 和 SceneKit 了，请按照以下步骤操作：\n\n1. 在导航器面板中点击 `ViewController.swift` 文件。\n\
  2. 编辑 `ViewController.swift` 文件，使其内容如下：\n\n```\nimport UIKit\nimport SceneKit\n\
  import ARKit\nclass ViewController: UIViewController, ARSCNViewDelegate {\nlet configuration\
  \ = ARWorldTrackingConfiguration()\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n\
  // Do any additional setup after loading the view, typically from a nib.\n}\n}\n\
  ```\n\n要在我们的应用中查看增强现实，添加一个 ARKit SceneKit 视图 (`ARSCNView`)，使其填满整个用户界面。\n\n设计好用户界面后，需要添加约束。要添加约束，请选择\
  \ `编辑器` ➤ `解决自动布局问题` ➤ `重置为建议约束`，在菜单下半部分的 `容器中的所有视图` 类别下。\n\n下一步是将用户界面项连接到 `ViewController.swift`\
  \ 文件中的 Swift 代码。为此，请按照以下步骤操作：\n\n1. 在导航器面板中点击 `Main.storyboard` 文件。\n2. 点击 `助理编辑器`\
  \ 图标或选择 `视图` ➤ `助理编辑器` ➤ `显示助理编辑器`，以并排显示 `Main.storyboard` 和 `ViewController.swift`\
  \ 文件。\n3. 将鼠标指针悬停在 `ARSCNView` 上，按住 `Control` 键，然后按住 Control 键并拖拽到 `class ViewController`\
  \ 行下方。\n4. 松开 `Control` 键和鼠标左键。会出现一个弹出菜单。\n5. 在 `名称` 文本框中点击并输入 `sceneView`，然后点击\
  \ `连接` 按钮。Xcode 会创建一个 IBOutlet，如下所示：\n\n```\n@IBOutlet var sceneView: ARSCNView!\n\
  ```\n\n6. 编辑 `viewDidLoad` 函数，使其内容如下：\n\n```\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n\
  // Do any additional setup after loading the view, typically from a nib.\nsceneView.debugOptions\
  \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\nsceneView.delegate\
  \ = self\nconfiguration.planeDetection = .horizontal\nsceneView.session.run(configuration)\n\
  }\n```\n\n## 添加点击手势识别\n\n此应用目前可以检测水平面，但我们还需要它能接受点击手势，以便在检测到的水平面上放置虚拟对象。要在我们的应用中放置一个点击手势识别器，请按照以下步骤操作：\n\
  \n1. 在导航器面板中点击 `ViewController.swift` 文件。\n2. 在 `viewDidLoad` 函数的末尾添加以下两行代码：\n\n\
  ```\nlet tapGesture = UITapGestureRecognizer(target: self, action: #selector(tapResponse))\n\
  sceneView.addGestureRecognizer(tapGesture)\n```\n\n3. 在 `viewDidLoad` 函数下方输入以下内容：\n\
  \n```\n@objc func tapResponse(sender: UITapGestureRecognizer) {\nlet scene = sender.view\
  \ as! ARSCNView\nlet tapLocation = sender.location(in: scene)\nlet hitTest = scene.hitTest(tapLocation,\
  \ types: .existingPlaneUsingExtent)\nif hitTest.isEmpty{\nprint (\"no plane detected\"\
  )\n} else {\nprint(\"found a horizontal plane\")\n}\n}\n```\n\n4. 通过 USB 线缆将 iOS\
  \ 设备连接到您的 Macintosh。\n5. 点击 `运行` 按钮或选择 `产品` ➤ `运行`。\n6. 将 iOS 设备的摄像头对准一个平坦的水平表面，直到看到大量黄色特征点出现。然后点击屏幕。Xcode\
  \ 的调试区域应显示 `\"found a horizontal plane\"` 消息。\n7. 将 iOS 设备的摄像头对准一面墙。然后点击屏幕。Xcode\
  \ 的调试区域应显示 `\"no plane detected\"` 消息。\n8. 点击 `停止` 按钮或选择 `产品` ➤ `停止`。\n\n这段代码表明我们可以检测水平面并识别点击手势。当\
  \ ARKit 识别到水平面时，这个点击手势将用于放置虚拟对象。为此，我们首先需要用另外两行代码修改 `tapResponse` 函数，添加在 `print(\"\
  found a horizontal plane\")` 行下方，如下所示：\n\n```\nguard let hitResult = hitTest.first\
  \ else { return }\naddObject(hitResult: hitResult)\n```\n\n这第一行 `guard` 代码检查以确保用户点击在水平面上。然后第二行调用\
  \ `addObject` 函数并发送用户点击的位置。\n\n## 创建 `addObject` 函数\n\n接下来，我们需要创建一个像这样的 `addObject`\
  \ 函数：\n\n```\nfunc addObject(hitResult: ARHitTestResult) {\n}\n```\n\n此函数接收由 `tapResponse`\
  \ 函数发送的水平面位置。我们将在用户每次在水平面上点击屏幕时添加一个橙色金字塔，因此我们可以在 `addObject` 函数内编写以下代码：\n\n```\n\
  func addObject(hitResult: ARHitTestResult) {\nlet objectNode = SCNNode()\nobjectNode.geometry\
  \ = SCNPyramid(width: 0.1, height: 0.2, length: 0.1)\nobjectNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.orange\n}\n```\n\n最后，我们需要定义每个金字塔的位置。用户点击的 x、y 和 z 位置存储在一个名为 `worldTransform`\
  \ 的 4x4 矩阵中。x、y 和 z 位置存储在此 `worldTransform` 矩阵的第三列中，因此 `addObject` 函数的最后两行代码如下：\n\
  \n```\nobjectNode.position = SCNVector3(hitResult.worldTransform.columns.3.x, hitResult.worldTransform.columns.3.y,\
  \ hitResult.worldTransform.columns.3.z)\nsceneView.scene.rootNode.addChildNode(objectNode)\n\
  ```\n\n第一行代码获取屏幕上点击位置的 x、y 和 z 坐标，而第二行代码将虚拟对象（橙色金字塔）放置在用户点击的位置。完整的 `ViewController.swift`\
  \ 文件应如下所示。\n\n\n\n```swift\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController:\
  \ UIViewController, ARSCNViewDelegate {\n    @IBOutlet var sceneView: ARSCNView!\n\
  \    let configuration = ARWorldTrackingConfiguration()\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        // Do any additional setup after loading\
  \ the view, typically from a nib.\n        sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
  \ ARSCNDebugOptions.showFeaturePoints]\n        sceneView.delegate = self\n    \
  \    configuration.planeDetection = .horizontal\n        sceneView.session.run(configuration)\n\
  \        let tapGesture = UITapGestureRecognizer(target: self, action: #selector(tapResponse))\n\
  \        sceneView.addGestureRecognizer(tapGesture)\n    }\n    @objc func tapResponse(sender:\
  \ UITapGestureRecognizer) {\n        let scene = sender.view as! ARSCNView\n   \
  \     let tapLocation = sender.location(in: scene)\n        let hitTest = scene.hitTest(tapLocation,\
  \ types: .existingPlaneUsingExtent)\n        if hitTest.isEmpty{\n            print\
  \ (\"no plane detected\")\n        } else {\n            print(\"found a horizontal\
  \ plane\")\n            guard let hitResult = hitTest.first else { return }\n  \
  \          addObject(hitResult: hitResult)\n        }\n    }\n    func addObject(hitResult:\
  \ ARHitTestResult) {\n        let objectNode = SCNNode()\n        objectNode.geometry\
  \ = SCNPyramid(width: 0.1, height: 0.2, length: 0.1)\n        objectNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.orange\n        objectNode.position = SCNVector3(hitResult.worldTransform.columns.3.x,\
  \ hitResult.worldTransform.columns.3.y, hitResult.worldTransform.columns.3.z)\n\
  \        sceneView.scene.rootNode.addChildNode(objectNode)\n    }\n}\n```\n\n要测试此代码，请按照以下步骤操作：\n\
  \n1.  点击 **Stop** 按钮或选择 **Product** ➤ **Stop**。\n    ![图 11-5: 在水平平面上添加橙色金字塔](img/469983_1_En_11_Fig5_HTML.jpg)\n\
  2.  通过 USB 数据线将 iOS 设备连接到 Mac。\n3.  点击 **Run** 按钮或选择 **Product** ➤ **Run**。首次运行此应用时，它会请求访问摄像头的权限，请授予权限。\n\
  4.  将 iOS 设备的摄像头对准一个水平平面，例如椅子座面或地板。当 ARKit 首次识别出水平平面时，Xcode 调试区域会显示消息“plane detected”。\n\
  5.  点击屏幕。一个橙色金字塔会出现在你点击的位置，如图 11-5 所示。重复步骤 3 和 4 可在检测到的水平平面上添加更多橙色金字塔。\n\n## 检测垂直平面\n\
  \n检测垂直平面与检测水平平面类似。只需将 `configuration.planeDetection` 定义为 `.vertical` 而非 `.horizontal`，如下所示：\n\
  \n```swift\nconfiguration.planeDetection = .vertical\n```\n\n现在你的应用可以检测诸如墙壁之类的垂直平面，而不仅仅是像地板这样的水平平面。要了解检测垂直平面的效果，只需修改\
  \ `PlacingObjects` 项目，编辑 `viewDidLoad` 函数使其检测垂直平面。整个 `viewDidLoad` 函数应如下所示：\n\n\
  ```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any\
  \ additional setup after loading the view, typically from a nib.\n    sceneView.debugOptions\
  \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n \
  \   sceneView.delegate = self\n    configuration.planeDetection = .vertical\n  \
  \  sceneView.session.run(configuration)\n    let tapGesture = UITapGestureRecognizer(target:\
  \ self, action: #selector(tapResponse))\n    sceneView.addGestureRecognizer(tapGesture)\n\
  }\n```\n\n在 `tapResponse` 函数中，只需将 `print` 语句中的 `horizontal` 替换为 `vertical`。整个 `tapResponse`\
  \ 函数应如下所示：\n\n```swift\n@objc func tapResponse(sender: UITapGestureRecognizer) {\n\
  \    let scene = sender.view as! ARSCNView\n    let tapLocation = sender.location(in:\
  \ scene)\n    let hitTest = scene.hitTest(tapLocation, types: .existingPlaneUsingExtent)\n\
  \    if hitTest.isEmpty{\n        print (\"no plane detected\")\n    } else {\n\
  \        print(\"found a vertical plane\")\n        guard let hitResult = hitTest.first\
  \ else { return }\n        addObject(hitResult: hitResult)\n    }\n}\n```\n\n在互联网上搜索你最喜欢的画作图片，并将其拖入\
  \ **Navigator** 窗格，如图 11-6 所示。\n![图 11-6: 添加一幅画作的图像](img/469983_1_En_11_Fig6_HTML.jpg)\n\
  \n大部分修改需要在 `addObject` 函数中进行。首先，我们需要创建一个要添加的平面，定义平面尺寸，并将画作图像显示在该平面上，如下所示：\n\n```swift\n\
  let objectNode = SCNNode()\nobjectNode.geometry = SCNPlane(width: 0.3, height: 0.3)\n\
  objectNode.geometry?.firstMaterial?.diffuse.contents = UIImage(named: \"Mona_Lisa.jpg\"\
  )\n```\n\n这段代码将名为 `Mona_Lisa.jpg` 的图像添加到平面上，但你需要将此图像名称替换为你拖放到 **Navigator** 窗格中的图像名称。\n\
  \n整个 `addObject` 函数应如下所示：\n\n```swift\nfunc addObject(hitResult: ARHitTestResult)\
  \ {\n    let objectNode = SCNNode()\n    objectNode.geometry = SCNPlane(width: 0.3,\
  \ height: 0.3)\n    objectNode.geometry?.firstMaterial?.diffuse.contents = UIImage(named:\
  \ \"Mona_Lisa.jpg\")\n    objectNode.position = SCNVector3(hitResult.worldTransform.columns.3.x,\
  \ hitResult.worldTransform.columns.3.y, hitResult.worldTransform.columns.3.z)\n\
  \    sceneView.scene.rootNode.addChildNode(objectNode)\n}\n```\n\n整个 `ViewController.swift`\
  \ 文件应如下所示：\n\n\n\n```swift\nimport UIKit\nimport SceneKit\nimport ARKit\n\nclass\
  \ ViewController: UIViewController, ARSCNViewDelegate {\n    @IBOutlet var sceneView:\
  \ ARSCNView!\n    let configuration = ARWorldTrackingConfiguration()\n\n    override\
  \ func viewDidLoad() {\n        super.viewDidLoad()\n        sceneView.debugOptions\
  \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n \
  \       sceneView.delegate = self\n        configuration.planeDetection = .vertical\n\
  \        sceneView.session.run(configuration)\n        let tapGesture = UITapGestureRecognizer(target:\
  \ self, action: #selector(tapResponse))\n        sceneView.addGestureRecognizer(tapGesture)\n\
  \    }\n\n    @objc func tapResponse(sender: UITapGestureRecognizer) {\n       \
  \ let scene = sender.view as! ARSCNView\n        let tapLocation = sender.location(in:\
  \ scene)\n        let hitTest = scene.hitTest(tapLocation, types: .existingPlaneUsingExtent)\n\
  \        if hitTest.isEmpty {\n            print (\"no plane detected\")\n     \
  \   } else {\n            print(\"found a vertical plane\")\n            guard let\
  \ hitResult = hitTest.first else { return }\n            addObject(hitResult: hitResult)\n\
  \        }\n    }\n\n    func addObject(hitResult: ARHitTestResult) {\n        let\
  \ objectNode = SCNNode()\n        objectNode.geometry = SCNPlane(width: 0.3, height:\
  \ 0.3)\n        objectNode.geometry?.firstMaterial?.diffuse.contents = UIImage(named:\
  \ \"Mona_Lisa.jpg\")\n        objectNode.position = SCNVector3(hitResult.worldTransform.columns.3.x,\
  \ hitResult.worldTransform.columns.3.y, hitResult.worldTransform.columns.3.z)\n\
  \        sceneView.scene.rootNode.addChildNode(objectNode)\n    }\n}\n```\n\n要测试此代码，请按照以下步骤操作：\n\
  \n1.  单击停止按钮或选择 Product（产品）➤ Stop（停止）。\n    ![../images/469983_1_En_11_Chapter/469983_1_En_11_Fig7_HTML.jpg](img/469983_1_En_11_Fig7_HTML.jpg)\n\
  \    图 11-7\n    向垂直表面添加平面\n2.  使用 USB 数据线将您的 iOS 设备连接到 Mac。\n3.  单击运行按钮或选择 Product（产品）➤\
  \ Run（运行）。首次运行此应用时，它将请求访问相机权限，请授予权限。\n4.  将 iOS 设备的摄像头对准一个垂直平面，例如墙壁或门。选择一个不平坦但具有大量鲜明特征的垂直表面，以便应用能够在屏幕上识别为黄色特征点。ARKit\
  \ 在垂直平面上识别的特征点越多，检测到该垂直平面的可能性就越大。当 ARKit 首次识别到垂直平面时，Xcode 调试区域将显示“plane detected”消息。\n\
  5.  点击屏幕。如图 11-7 所示，您的画作图像将出现在垂直平面上。\n\n正如您所见，检测垂直平面与检测水平平面的方法是相同的。\n\n## 总结\n\n\
  当您想在现实世界中添加虚拟对象时，检测水平或垂直平面至关重要。您只需使用一行代码即可检测水平或垂直平面：\n\n```swift\nconfiguration.planeDetection\
  \ = .horizontal\n```\n\n或\n\n```swift\nconfiguration.planeDetection = .vertical\n\
  ```\n\n一旦 ARKit 检测到水平或垂直平面，它就可以使用纹理图像（例如水、砖块或沙子）来定义该平面。当您移动 iOS 设备的摄像头时，检测到的平面尺寸会逐渐增大。\n\
  \n"
- "# 12. 虚拟对象的物理特性\n\n迄今为止，当我们向增强现实视图中添加虚拟对象时，这些对象只是漂浮在半空中。虽然在某些情况下这或许可行，但在其他情况下，您可能希望虚拟对象的行为更接近真实物体，能够下落、反弹并相互碰撞。\n\
  \n为了让虚拟对象具备与真实物体相同的特性，您可以为任何虚拟对象定义物理特性。这意味着您可以定义虚拟对象如何与其他对象交互（静态、动态或运动学）、虚拟对象的形状（如盒子或球体）以及施加在虚拟对象上的力。\n\
  \n虚拟对象可以表现为以下三种方式之一：\n\n*   **静态** —— 无法移动，不受碰撞或力的影响。\n*   **动态** —— 受力和碰撞的影响。\n\
  *   **运动学** —— 不受力或碰撞的影响，但可以影响动态虚拟对象。\n\n静态虚拟对象适用于简单存在的场景。到目前为止，我们创建的所有虚拟对象都是静态的，因为它们不移动，也不影响任何其他虚拟对象。\n\
  \n动态虚拟对象则有趣得多，因为它们可以移动并受重力影响，这意味着它们会沿 y 轴下落至地面。动态虚拟对象可以移动，并与其他动态或运动学虚拟对象发生碰撞并反弹。\n\
  \n运动学虚拟对象本身不移动，但它们可以与动态虚拟对象发生碰撞。在视频游戏中，像道路或障碍物这样的固定物品可以是运动学虚拟对象。\n\n为了了解如何将物理特性应用于虚拟对象，请按照以下步骤创建一个新的\
  \ Xcode 项目：\n\n1.  启动 Xcode。（请确保您使用的是 Xcode 10 或更高版本。）\n2.  选择 File（文件）➤ New（新建）➤\
  \ Project（项目）。Xcode 将要求您选择一个模板。\n3.  单击 iOS 类别。\n4.  单击 Single View App（单视图应用）图标，然后单击\
  \ Next（下一步）按钮。Xcode 会询问产品名称、组织名称、组织标识符和内容技术。\n5.  在 Product Name（产品名称）文本框中单击并输入项目的描述性名称，例如\
  \ `Physics`。（具体名称不重要。）\n6.  单击 Next（下一步）按钮。Xcode 会询问您希望将项目存储在何处。\n7.  选择一个文件夹并单击\
  \ Create（创建）按钮。Xcode 将创建一个 iOS 项目。\n\n现在，按照以下步骤修改 `Info.plist` 文件以允许访问相机并使用 ARKit：\n\
  \n1.  在导航窗格中单击 `Info.plist` 文件。Xcode 将显示一个包含键、类型和值的列表。\n2.  单击展开三角形以展开 Required\
  \ Device Capabilities（必需的设备功能）类别，显示 Item 0。\n3.  将鼠标指针悬停在 Item 0 上以显示加号 (+) 图标。\n\
  4.  单击此加号 (+) 图标以显示一个空的 Item 1。\n5.  在 Item 1 行的 Value（值）类别下输入 `arkit`。\n6.  将鼠标指针移到最后一行以显示一个加号\
  \ (+) 图标。\n7.  单击加号 (+) 图标以创建新行。将出现一个弹出菜单。\n8.  选择 Privacy – Camera Usage Description（隐私\
  \ - 相机使用说明）。\n9.  在 Privacy – Camera Usage Description（隐私 - 相机使用说明）行的 Value（值）类别下输入\
  \ `AR 需要访问相机`。\n\n现在，按照以下步骤修改 `ViewController.swift` 文件以使用 ARKit 和 SceneKit：\n\n\
  1.  在导航窗格中单击 `ViewController.swift` 文件。\n2.  编辑 `ViewController.swift` 文件，使其如下所示：\n\
  \n```swift\nimport UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController:\
  \ UIViewController, ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
  \    override func viewDidLoad() {\n        super.viewDidLoad()\n    }\n}\n```\n\
  \n要在我们的应用中查看增强现实内容，请添加一个 ARKit SceneKit View (`ARSCNView`) 并将其展开以填充整个用户界面。然后添加约束：选择\
  \ Editor（编辑器）➤ Resolve Auto Layout Issues（解决自动布局问题）➤ Reset to Suggested Constraints（重置为建议约束）（在菜单下半部分的\
  \ All Views in Container（容器中的所有视图）类别下）。\n\n\n\n## 连接用户界面与代码\n\n下一步是将用户界面项连接到 `ViewController.swift`\
  \ 文件中的 Swift 代码。为此，请按照以下步骤操作：\n\n1.  在导航器窗格中单击 `Main.storyboard` 文件。\n2.  单击“助手编辑器”图标，或选择“视图”➤“助手编辑器”➤“显示助手编辑器”，以并排显示\
  \ `Main.storyboard` 和 `ViewController.swift` 文件。\n3.  将鼠标指针移到 `ARSCNView` 上，按住 Control\
  \ 键，然后按住 Control 键并拖动到 `class ViewController` 行的下方。\n4.  释放 Control 键和鼠标左键。将出现一个弹出菜单。\n\
  5.  在“名称”文本字段中单击并键入 `sceneView`，然后单击“连接”按钮。Xcode 会创建一个 IBOutlet，如下所示：\n\n```\n@IBOutlet\
  \ var sceneView: ARSCNView!\n```\n\n6.  编辑 `viewDidLoad` 函数，使其如下所示：\n\n```\noverride\
  \ func viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional setup\
  \ after loading the view, typically from a nib.\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
  \ ARSCNDebugOptions.showFeaturePoints]\n    sceneView.delegate = self\n    configuration.planeDetection\
  \ = .horizontal\n    sceneView.session.run(configuration)\n    let tapGesture =\
  \ UITapGestureRecognizer(target: self, action: #selector(tapResponse))\n    sceneView.addGestureRecognizer(tapGesture)\n\
  }\n```\n\n`viewDidLoad` 函数的最后两行创建了一个点击手势，这意味着我们需要一个名为 `tapGesture` 的函数来处理该点击手势。\n\
  \n7.  在 `viewDidLoad` 函数下方，编写以下 `tapResponse` 函数：\n\n```\n@objc func tapResponse(sender:\
  \ UITapGestureRecognizer) {\n    let scene = sender.view as! ARSCNView\n    let\
  \ tapLocation = sender.location(in: scene)\n    let hitTest = scene.hitTest(tapLocation,\
  \ types: .existingPlaneUsingExtent)\n    if hitTest.isEmpty{\n        print (\"\
  no plane detected\")\n    } else {\n        print(\"found a horizontal plane\")\n\
  \        guard let hitResult = hitTest.first else { return }\n        addObject(hitResult:\
  \ hitResult)\n    }\n}\n```\n\n此 `tapResponse` 函数标识用户点击的屏幕位置，然后将此信息发送到一个 `addObject`\
  \ 函数，这意味着接下来我们需要编写 `addObject` 函数。\n\n8.  在 `tapResponse` 函数下方，编写以下 `addObject`\
  \ 函数：\n\n```\nfunc addObject(hitResult: ARHitTestResult) {\n    let objectNode =\
  \ SCNNode()\n    objectNode.geometry = SCNSphere(radius: 0.1)\n    objectNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.orange\n    objectNode.position = SCNVector3(hitResult.worldTransform.columns.3.x,\
  \ hitResult.worldTransform.columns.3.y + 0.5, hitResult.worldTransform.columns.3.z)\n\
  \    objectNode.physicsBody = SCNPhysicsBody(type: .dynamic, shape: nil)\n    sceneView.scene.rootNode.addChildNode(objectNode)\n\
  }\n```\n\n`addObject` 函数创建一个橙色球体。通常，这个橙色球体会悬浮在半空中，但我们通过以下代码行为其赋予了 `physicsBody`：\n\
  \n```\nobjectNode.physicsBody = SCNPhysicsBody(type: .dynamic, shape: nil)\n```\n\
  \n此代码将橙色球体定义为动态物体，这意味着它可以受到力和与其他虚拟对象碰撞的影响。同时，其形状被定义为 `nil`，这意味着 ARKit 在计算与其他虚拟对象的碰撞时，会将球体的边界视为其物理体。\n\
  \n## 检测并绘制虚拟平面\n\n现在我们需要检测水平面并在该位置绘制一个虚拟平面。为此，我们需要一个 `didAdd renderer` 函数，如下所示：\n\
  \n```\nfunc renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:\
  \ ARAnchor) {\n    guard anchor is ARPlaneAnchor else { return }\n    let planeNode\
  \ = displayPlane(anchor: anchor as! ARPlaneAnchor)\n    node.addChildNode(planeNode)\n\
  }\n```\n\n请注意，这个 `renderer` 函数会通过持续寻找水平面而多次运行。当它识别到一个水平面时，它会调用 `displayPlane` 函数来创建该虚拟平面。这意味着我们需要编写一个如下所示的\
  \ `displayPlane` 函数：\n\n```\nfunc displayPlane(anchor: ARPlaneAnchor) -> SCNNode\
  \ {\n    let planeNode = SCNNode()\n    planeNode.geometry = SCNPlane(width: CGFloat(anchor.extent.x),\
  \ height: CGFloat(anchor.extent.z))\n    planeNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.yellow\n    planeNode.position = SCNVector3(anchor.center.x, anchor.center.y,\
  \ anchor.center.z)\n    let ninetyDegrees = GLKMathDegreesToRadians(90)\n    planeNode.eulerAngles\
  \ = SCNVector3(ninetyDegrees, 0, 0)\n    planeNode.physicsBody = SCNPhysicsBody(type:\
  \ .kinematic, shape: nil)\n    planeNode.geometry?.firstMaterial?.isDoubleSided\
  \ = true\n    return planeNode\n}\n```\n\n这个 `displayPlane` 函数接收存储在 `ARPlaneAnchor`\
  \ 中的水平面信息，该锚点定义了平面的大小和位置。因此，我们需要创建一个平面节点，并根据 `ARPlaneAnchor` 信息赋予其大小：\n\n```\nplaneNode.geometry\
  \ = SCNPlane(width: CGFloat(anchor.extent.x), height: CGFloat(anchor.extent.z))\n\
  ```\n\n然后我们将虚拟平面着色为黄色，并将其定位在 ARKit 识别的水平面的中心。接下来，我们需要将平面围绕 x 轴旋转 90 度，使其像地板一样水平显示，而不是像墙一样垂直显示。\n\
  \n最重要的是，我们需要像这样为这个虚拟平面赋予物理体：\n\n```\nplaneNode.physicsBody = SCNPhysicsBody(type:\
  \ .kinematic, shape: nil)\n```\n\n这段代码将虚拟平面定义为运动学类型，这意味着它在与虚拟对象碰撞时不会移动，但会影响与其碰撞的任何虚拟对象。我们将形状定义为\
  \ `nil`，这会告诉 ARKit 在计算与其他虚拟对象的碰撞时，将整个虚拟平面视为其物理体。\n\n## 更新虚拟平面\n\n最后，如果用户移动 iOS 设备的摄像头以捕捉更多的水平面，我们需要一个\
  \ `renderer didUpdate` 函数来扩展虚拟平面的大小。这个 `renderer didUpdate` 函数如下所示：\n\n```\nfunc\
  \ renderer(_ renderer: SCNSceneRenderer, didUpdate node: SCNNode, for anchor: ARAnchor)\
  \ {\n    guard anchor is ARPlaneAnchor else { return }\n    node.enumerateChildNodes\
  \ { (childNode, _) in\n        childNode.removeFromParentNode()\n    }\n    let\
  \ planeNode = displayPlane(anchor: anchor as! ARPlaneAnchor)\n    node.addChildNode(planeNode)\n\
  }\n```\n\n这个 `didUpdate renderer` 函数在每次检测到水平面比最初计算的大时，都会移除虚拟平面并重新绘制一个新的虚拟平面。然后它会调用\
  \ `displayPlane` 函数，在增强现实视图中绘制一个虚拟平面。\n\n## 测试项目\n\n要测试此项目，请按照以下步骤操作：\n\n1.  单击“停止”按钮或选择“产品”➤“停止”。\n\
  2.  将 iOS 设备通过 USB 数据线连接到 Macintosh。\n3.  单击“运行”按钮或选择“产品”➤“运行”。第一次运行此应用程序时，它会请求访问摄像头的权限，请授予该权限。\n\
  4.  将 iOS 设备的摄像头对准水平面（例如桌子或地板）。ARKit 第一次识别水平面时，Xcode 调试区域会显示“found a horizontal\
  \ plane”消息。\n5.  移动 iOS 设备以捕捉更多的水平面。每次 ARKit 识别到水平面的新部分时，黄色平面都会变大。\n\n![../images/469983_1_En_12_Chapter/469983_1_En_12_Fig1_HTML.jpg](img/469983_1_En_12_Fig1_HTML.jpg)\n\
  \n图 12-1：橙色球体可以下落并撞击黄色平面\n\n\n\n5.  点击屏幕。每次点击屏幕，会出现一个橙色球体，如图 12-1 所示。因为橙色球体被定义为\
  \ `.dynamic` 物理体，它会受到重力等力的影响，导致球体下落。如果橙色球体撞到黄色平面，它要么弹开，要么停留在平面上。如果你持续点击屏幕添加更多橙色球体，这些球体会相互之间以及和黄色平面发生碰撞。这是因为黄色平面被定义为\
  \ `.kinematic` 物理体，这意味着重力等力不会影响它，但它可以与其他虚拟对象（如橙色球体）发生碰撞。\n\n由于橙色球体被定义为 `.dynamic`\
  \ 物理体，它会受到重力影响。而黄色平面被定义为 `.kinematic` 物理体，它不受重力影响，但能与橙色球体等其他虚拟对象交互。\n\n如果你创建了一个定义为\
  \ `.dynamic` 物理体的虚拟对象，但又不想让它受重力影响，你可以将其 `isAffectedByGravity` 属性设置为 `false`，如下所示：\n\
  \n```\nobjectNode.physicsBody?.isAffectedByGravity = false\n```\n\n如果你在 `addObject`\
  \ 函数中添加这行代码，那么每次点击屏幕添加橙色球体时，橙色球体都将悬浮在半空中，因为它不再受重力影响，尽管它被定义为 `.dynamic` 物理体。\n\n\
  ## 对虚拟对象施加力\n\n目前，我们创建的虚拟对象要么悬浮在半空中，要么在重力作用下下落。与虚拟对象交互的另一种方式是对其施加一个力。要对虚拟对象施加力，你需要定义力的方向以及施加方式是瞬时的还是持续的。\n\
  \n让我们按照以下步骤创建一个新的 Xcode 项目，用于显示三个目标并向这些目标发射一个抛射物：\n\n1.  启动 Xcode。（确保你使用的是 Xcode\
  \ 10 或更高版本。）\n2.  选择 File ➤ New ➤ Project。Xcode 会要求你选择一个模板。\n3.  点击 iOS 类别。\n4.\
  \  点击 Single View App 图标，然后点击 Next 按钮。Xcode 会询问产品名称、组织名称、组织标识符和内容技术。\n5.  在 Product\
  \ Name 文本框中点击并输入项目描述性名称，例如 `PhysicsForce`。（具体名称无关紧要。）\n6.  点击 Next 按钮。Xcode 会询问你想将项目存储在何处。\n\
  7.  选择一个文件夹并点击 Create 按钮。Xcode 将创建一个 iOS 项目。\n\n现在按照以下步骤修改 `Info.plist` 文件，以允许访问相机并使用\
  \ ARKit：\n\n1.  在导航面板中点击 `Info.plist` 文件。Xcode 会显示一个键、类型和值的列表。\n2.  点击展开三角形以展开 Required\
  \ Device Capabilities 类别，显示 Item 0。\n3.  将鼠标指针悬停在 Item 0 上，会显示一个加号 (`+`) 图标。\n4.\
  \  点击这个加号 (`+`) 图标以显示空白的 Item 1。\n5.  在 Item 1 行的 Value 类别下输入 `arkit`。\n6.  将鼠标指针悬停在最后一行上，会显示一个加号\
  \ (`+`) 图标。\n7.  点击加号 (`+`) 图标创建一个新行。会出现一个弹出菜单。\n8.  选择 Privacy – Camera Usage Description。\n\
  9.  在 Privacy – Camera Usage Description 行的 Value 类别下输入 `AR needs to use the camera`。\n\
  \n现在按照以下步骤修改 `ViewController.swift` 文件以使用 ARKit 和 SceneKit：\n\n1.  在导航面板中点击 `ViewController.swift`\
  \ 文件。\n2.  编辑 `ViewController.swift` 文件，使其如下所示：\n\n```\nimport UIKit\nimport SceneKit\n\
  import ARKit\nclass ViewController: UIViewController, ARSCNViewDelegate {\n    let\
  \ configuration = ARWorldTrackingConfiguration()\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        // Do any additional setup after loading\
  \ the view, typically from a nib.\n    }\n}\n```\n\n为了在我们的应用中查看增强现实，添加一个单一的 ARKit\
  \ SceneKit 视图 (`ARSCNView`)，使其填满整个用户界面（参见第 11 章的图 11-1）。\n\n设计好用户界面后，你需要添加约束。要添加约束，请选择\
  \ Editor ➤ Resolve Auto Layout Issues ➤ Reset to Suggested Constraints，菜单下半部分位于\
  \ All Views in Container 类别下。\n\n下一步是将用户界面项连接到 `ViewController.swift` 文件中的 Swift\
  \ 代码。为此，请按照以下步骤操作：\n\n1.  在导航面板中点击 `Main.storyboard` 文件。\n2.  点击 Assistant Editor\
  \ 图标，或选择 View ➤ Assistant Editor ➤ Show Assistant Editor，以并排显示 `Main.storyboard`\
  \ 和 `ViewController.swift` 文件。\n3.  将鼠标指针悬停在 `ARSCNView` 上，按住 Control 键，然后在 `class\
  \ ViewController` 行下方进行 Ctrl-拖拽。\n4.  松开 Control 键和鼠标左键。会出现一个弹出菜单。\n5.  在 Name 文本框中点击并输入\
  \ `sceneView`，然后点击 Connect 按钮。Xcode 将创建一个 IBOutlet，如下所示：\n\n```\n@IBOutlet var sceneView:\
  \ ARSCNView!\n```\n\n6.  编辑 `viewDidLoad` 函数，使其如下所示：\n\n\n\n```swift\noverride func\
  \ viewDidLoad() {\n    super.viewDidLoad()\n    // Do any additional setup after\
  \ loading the view, typically from a nib.\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
  \ ARSCNDebugOptions.showFeaturePoints]\n    sceneView.delegate = self\n    sceneView.session.run(configuration)\n\
  \    let tapGesture = UITapGestureRecognizer(target: self, action: #selector(tapResponse))\n\
  \    sceneView.addGestureRecognizer(tapGesture)\n}\n```\n\n## 处理点击手势\n\n此时，我们已经添加了一个点击手势识别器，因此需要按照以下步骤编写一个函数来处理这个点击手势：\n\
  \n1.  在导航器窗格中点击`ViewController.swift`文件。\n2.  在`viewDidLoad`函数下方键入以下代码：\n\n```swift\n\
  @objc func tapResponse(sender: UITapGestureRecognizer) {\n}\n```\n\n每当用户点击屏幕时，我们希望一个球体从屏幕中心射出并远离用户。要做到这一点，我们必须首先获取摄像机的当前朝向和位置。这意味着要确保用户点击的是增强现实视图，然后使用以下三行代码检索关于摄像机当前朝向和位置的信息（存储在矩阵中）：\n\
  \n```swift\nguard let scene = sender.view as? ARSCNView else { return }\nguard let\
  \ pov = scene.pointOfView else { return }\nlet transform = pov.transform\n```\n\n\
  `transform`常量存储了一个 4x4 矩阵，包含摄像机位置和朝向的信息。要检索朝向信息，我们需要访问此矩阵的第三列：\n\n```swift\nlet\
  \ orientation = SCNVector3(-transform.m31, -transform.m32, -transform.m33)\n```\n\
  \n所有这些信息都需要反转（因此使用负号），因为朝向是面向我们的，而我们需要它面向相反的方向远离我们。\n\n摄像机的位置可以从矩阵的第四列这样获取：\n\n\
  ```swift\nlet location = SCNVector3(transform.m41, transform.m42, transform.m43)\n\
  ```\n\n要获得摄像机的最终位置，我们需要将朝向与位置相结合，如下所示：\n\n```swift\nlet position = SCNVector3(orientation.x\
  \ + location.x, orientation.y + location.y, orientation.z + location.z)\n```\n\n\
  一旦我们知道了摄像机的位置，就需要创建一个投射物，它将是一个紫色球体，出现在屏幕中心（即摄像机位置）：\n\n```swift\nlet projectile\
  \ = SCNNode()\nprojectile.geometry = SCNSphere(radius: 0.35)\nprojectile.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.purple\nprojectile.position = position\n```\n\n这创建了一个紫色球体，当用户点击屏幕时，它会悬浮在屏幕中央的半空中。我们需要给投射物一个物理体，将其类型定义为`.dynamic`，这意味着它可以与其他虚拟对象碰撞：\n\
  \n```swift\nprojectile.physicsBody = SCNPhysicsBody(type: .dynamic, shape: SCNPhysicsShape(node:\
  \ projectile, options: nil))\nprojectile.physicsBody?.isAffectedByGravity = false\n\
  ```\n\n第一行将紫色球体定义为一个能够移动和碰撞的物理体，第二行关闭了它的重力。否则，重力只会让紫色球体坠落到地面。\n\n现在是对紫色球体施加力的时候了。首先，声明一个名为`force`的常量，并将其值设置为任意值\
  \ 50。然后使用`applyForce`方法对该投射物施加该力，如下所示：\n\n```swift\nlet force: Float = 50\nprojectile.physicsBody?.applyForce(SCNVector3(orientation.x\
  \ * force, orientation.y * force, orientation.z * force), asImpulse: true)\n```\n\
  \n这段代码对投射物施加了一个力，但这个力相对较弱，因此我们需要将其乘以任意的`force`常数（50）。`asImpulse`值设为`true`，以便对投射物创建一个瞬时力。如果这个`asImpulse`值是`false`，那么这个力将持续施加在投射物上。\n\
  \n完整的`tapResponse`函数应如下所示：\n\n```swift\n@objc func tapResponse(sender: UITapGestureRecognizer)\
  \ {\n    guard let scene = sender.view as? ARSCNView else { return }\n    guard\
  \ let pov = scene.pointOfView else { return }\n    let transform = pov.transform\n\
  \    let orientation = SCNVector3(-transform.m31, -transform.m32, -transform.m33)\n\
  \    let location = SCNVector3(transform.m41, transform.m42, transform.m43)\n  \
  \  let position = SCNVector3(orientation.x + location.x, orientation.y + location.y,\
  \ orientation.z + location.z)\n    let projectile = SCNNode()\n    projectile.geometry\
  \ = SCNSphere(radius: 0.35)\n    projectile.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.purple\n    projectile.position = position\n    projectile.physicsBody\
  \ = SCNPhysicsBody(type: .dynamic, shape: SCNPhysicsShape(node: projectile, options:\
  \ nil))\n    projectile.physicsBody?.isAffectedByGravity = false\n    let force:\
  \ Float = 50\n    projectile.physicsBody?.applyForce(SCNVector3(orientation.x *\
  \ force, orientation.y * force, orientation.z * force), asImpulse: true)\n    sceneView.scene.rootNode.addChildNode(projectile)\n\
  }\n```\n\n## 测试代码\n\n要测试此代码，请按照以下步骤操作：\n\n1.  通过 USB 线缆将 iOS 设备连接到 Mac。\n2.  点击运行按钮或选择\
  \ Product ➤ Run。首次运行此应用程序时，它会请求访问摄像机的权限，请授予权限。\n3.  对准 iOS 设备的摄像头并点击屏幕。每次点击屏幕时，都应有一个紫色球体射出并逐渐消失。\n\
  4.  点击停止按钮或选择 Product ➤ Stop。\n\n尝试使用不同的值（如 20 或 75）修改`force`常数，观察它对施加在紫色球体上的力的影响。\n\
  \n\n\n## 与虚拟物体发生碰撞\n\n为了使一个虚拟物体与另一个虚拟物体发生碰撞，这两个相互碰撞的虚拟物体必须是`.static`（静态）或`.dynamic`（动态）物理体类型。在`viewDidLoad`函数的末尾，添加下面这行代码来调用一个名为`addTargets`的函数：\n\
  \n```\naddTargets()\n```\n\n作为发射物的紫色球体被定义为`.dynamic`物理体，这意味着任何我们想要与之发生碰撞的其他虚拟物体必须是`.dynamic`或`.static`物理体。首先，让我们创建一个`addTargets`函数：\n\
  \n```\nfunc addTargets() {\n}\n```\n\n在`addTargets`函数中添加一个金字塔，定义其颜色为橙色，指定其尺寸，并设置一个基于世界原点的位置。然后将这个金字塔定义为一个`.static`物理体，并将其添加到场景中，如下所示：\n\
  \n```\nlet pyramidNode = SCNNode()\npyramidNode.geometry = SCNPyramid(width: 4,\
  \ height: 4.5, length: 4)\npyramidNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.orange\npyramidNode.position = SCNVector3(-3, 1, -15)\npyramidNode.physicsBody\
  \ = SCNPhysicsBody(type: .static, shape: nil)\nsceneView.scene.rootNode.addChildNode(pyramidNode)\n\
  ```\n\n创建一个具有特定尺寸的绿色盒子，并将其放置在附近的位置，如下所示：\n\n```\nlet boxNode = SCNNode()\nboxNode.geometry\
  \ = SCNBox(width: 3.5, height: 3.5, length: 3.5, chamferRadius: 0)\nboxNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.green\nboxNode.position = SCNVector3(5, 1, -15)\nboxNode.physicsBody\
  \ = SCNPhysicsBody(type: .static, shape: nil)\nsceneView.scene.rootNode.addChildNode(boxNode)\n\
  ```\n\n请注意，当定义金字塔和盒子的物理体时，形状被定义为`nil`，这意味着使用虚拟物体本身的形状作为其碰撞边界，如下所示：\n\n```\npyramidNode.physicsBody\
  \ = SCNPhysicsBody(type: .static, shape: nil)\nboxNode.physicsBody = SCNPhysicsBody(type:\
  \ .static, shape: nil)\n```\n\n在`addTargets`函数内部要创建的最后一个虚拟物体是一个圆环体，它看起来像一个甜甜圈或一个环。创建一个蓝色的圆环体需要定义物理尺寸、颜色和位置：\n\
  \n```\nlet torusNode = SCNNode()\ntorusNode.geometry = SCNTorus(ringRadius: 2, pipeRadius:\
  \ 0.5)\ntorusNode.geometry?.firstMaterial?.diffuse.contents = UIColor.blue\ntorusNode.position\
  \ = SCNVector3(0, -2, -15)\n```\n\n首先，我们需要将这个圆环体绕 x 轴旋转 90 度，否则它会显示为一个扁平的圆盘。要旋转圆环体，我们需要先将\
  \ 90 度转换为弧度，然后将该弧度值应用于绕其 x 轴的旋转，如下所示：\n\n```\nlet ninetyDegrees = GLKMathDegreesToRadians(90)\n\
  torusNode.eulerAngles = SCNVector3(ninetyDegrees, 0, 0)\n```\n\n现在我们需要定义圆环体的物理体。如果我们像这样简单地将其形状定义为`nil`：\n\
  \n```\ntorusNode.physicsBody = SCNPhysicsBody(type: .static, shape: nil)\n```\n\n\
  这会创建一个看起来中间有洞但实际上并没有洞的圆环体。这是因为将其形状设置为`nil`值会简单地使用圆环体的整个边界（包括内部空洞）作为检测碰撞的边界。为了使中间的洞表现得像空的空气一样，我们需要定义圆环体的物理体，使其使用实际形状本身的边界，而不仅仅是外部边界。为此，我们可以使用以下代码：\n\
  \n```\ntorusNode.physicsBody = SCNPhysicsBody(type: .static, shape: SCNPhysicsShape(node:\
  \ torusNode, options: [SCNPhysicsShape.Option.type: SCNPhysicsShape.ShapeType.concavePolyhedron]))\n\
  ```\n\n整个`ViewController.swift`文件应该如下所示：\n\n```\nimport UIKit\nimport SceneKit\n\
  import ARKit\nclass ViewController: UIViewController, ARSCNViewDelegate  {\n@IBOutlet\
  \ var sceneView: ARSCNView!\nlet configuration = ARWorldTrackingConfiguration()\n\
  override func viewDidLoad() {\nsuper.viewDidLoad()\n// Do any additional setup after\
  \ loading the view, typically from a nib.\nsceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
  \ ARSCNDebugOptions.showFeaturePoints]\nsceneView.delegate = self\nsceneView.session.run(configuration)\n\
  let tapGesture = UITapGestureRecognizer(target: self, action: #selector(tapResponse))\n\
  sceneView.addGestureRecognizer(tapGesture)\naddTargets()\n}\n@objc func tapResponse(sender:\
  \ UITapGestureRecognizer) {\nguard let scene = sender.view as? ARSCNView else {\
  \ return }\nguard let pov = scene.pointOfView else { return }\nlet transform = pov.transform\n\
  let orientation = SCNVector3(-transform.m31, -transform.m32, -transform.m33)\nlet\
  \ location = SCNVector3(transform.m41, transform.m42, transform.m43)\nlet position\
  \ = SCNVector3(orientation.x + location.x, orientation.y + location.y, orientation.z\
  \ + location.z)\nlet projectile = SCNNode()\nprojectile.geometry = SCNSphere(radius:\
  \ 0.35)\nprojectile.geometry?.firstMaterial?.diffuse.contents = UIColor.purple\n\
  projectile.position = position\nprojectile.physicsBody = SCNPhysicsBody(type: .dynamic,\
  \ shape: SCNPhysicsShape(node: projectile, options: nil))\nprojectile.physicsBody?.isAffectedByGravity\
  \ = false\nlet force: Float = 50\nprojectile.physicsBody?.applyForce(SCNVector3(orientation.x\
  \ * force, orientation.y * force, orientation.z * force), asImpulse: true)\nsceneView.scene.rootNode.addChildNode(projectile)\n\
  }\nfunc addTargets() {\nlet pyramidNode = SCNNode()\npyramidNode.geometry = SCNPyramid(width:\
  \ 4, height: 4.5, length: 4)\npyramidNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.orange\npyramidNode.position = SCNVector3(-3, 1, -15)\npyramidNode.physicsBody\
  \ = SCNPhysicsBody(type: .static, shape: nil)\nsceneView.scene.rootNode.addChildNode(pyramidNode)\n\
  let torusNode = SCNNode()\ntorusNode.geometry = SCNTorus(ringRadius: 2, pipeRadius:\
  \ 0.5)\ntorusNode.geometry?.firstMaterial?.diffuse.contents = UIColor.blue\ntorusNode.position\
  \ = SCNVector3(0, -2, -15)\ntorusNode.physicsBody = SCNPhysicsBody(type: .static,\
  \ shape: SCNPhysicsShape(node: torusNode, options: [SCNPhysicsShape.Option.type:\
  \ SCNPhysicsShape.ShapeType.concavePolyhedron]))\nlet ninetyDegrees = GLKMathDegreesToRadians(90)\n\
  torusNode.eulerAngles = SCNVector3(ninetyDegrees, 0, 0)\nsceneView.scene.rootNode.addChildNode(torusNode)\n\
  let boxNode = SCNNode()\nboxNode.geometry = SCNBox(width: 3.5, height: 3.5, length:\
  \ 3.5, chamferRadius: 0)\nboxNode.geometry?.firstMaterial?.diffuse.contents = UIColor.green\n\
  boxNode.position = SCNVector3(5, 1, -15)\nboxNode.physicsBody = SCNPhysicsBody(type:\
  \ .static, shape: nil)\nsceneView.scene.rootNode.addChildNode(boxNode)\n}\n}\n```\n\
  \n要测试此代码，请按照以下步骤操作：\n1.  点击停止按钮或选择 **Product** ➤ **Stop**（产品 ➤ 停止）。\n\n![../images/469983_1_En_12_Chapter/469983_1_En_12_Fig2_HTML.jpg](img/469983_1_En_12_Fig2_HTML.jpg)\n\
  \n图 12-2\n当紫色球体与其他三个虚拟物体碰撞时，它应该会被弹开\n\n2.  通过 USB 数据线将 iOS 设备连接到您的 Macintosh。\n\
  3.  点击运行按钮或选择 **Product** ➤ **Run**（产品 ➤ 运行）。\n4.  世界原点应该会出现，同时还有一个橙色的金字塔、一个蓝色的圆环体和一个绿色的盒子。将屏幕中心对准目标并点击屏幕以发射出紫色发射物。每次紫色发射物击中虚拟物体时，它都应该被弹开，如图\
  \ 12-2 所示。确保瞄准所有三个虚拟物体，并瞄准圆环体的中心，以观察紫色球体从其中间穿过。\n\n\n\n## 碰撞检测\n\n将虚拟对象设置为 `.dynamic`\
  \ 和 `.static` 物理体会使它们相互碰撞。然而，在许多情况下，您可能希望知道虚拟对象何时与另一个发生碰撞。要做到这一点，您首先需要创建一个枚举结构，为每个虚拟对象分配一个任意的数值。\n\
  \n在我们的示例中，有一个用作投射物的紫色球体、一个橙色棱锥体、一个蓝色圆环体和一个绿色立方体。因此，我们可以在 `IBOutlet` 下方像这样定义一个枚举结构：\n\
  \n```\nenum contactType : Int {\ncase projectile = 1\ncase target = 2\n}\n```\n\n\
  接下来，我们需要在 `addTargets` 函数内，将每个虚拟对象的 `enum` 值赋值给它的 `categoryBitMask` 属性，如下所示：\n\n\
  ```\nprojectile.physicsBody?.categoryBitMask = contactType.projectile.rawValue\n\
  pyramidNode.physicsBody?.categoryBitMask = contactType.target.rawValue\ntorusNode.physicsBody?.categoryBitMask\
  \ = contactType.target.rawValue\nboxNode.physicsBody?.categoryBitMask = contactType.target.rawValue\n\
  ```\n\n一旦我们为所有虚拟对象的 `categoryBitMask` 属性分配了任意值，我们需要让我们的类使用 `SCNPhysicsContactDelegate`，像这样：\n\
  \n```\nclass ViewController: UIViewController, ARSCNViewDelegate, SCNPhysicsContactDelegate\
  \  {\n```\n\n这个委托允许我们在虚拟对象碰撞时收到通知。定义了 `SCNPhysicsContactDelegate` 之后，我们还必须将类设置为接触委托，如下所示：\n\
  \n```\nsceneView.scene.physicsWorld.contactDelegate = self\n```\n\n我们还需要在 `tapResponse`\
  \ 函数中为投射物定义 `contactTestBitMask`。这定义了我们要跟踪的碰撞类型。由于我们希望当投射物击中三个虚拟对象（棱锥体、圆环体或立方体）中的任何一个时得到通知，我们可以使用以下代码：\n\
  \n```\nprojectile.physicsBody?.contactTestBitMask = contactType.target.rawValue\n\
  ```\n\n由于我们所有的目标（棱锥体、圆环体和立方体）都被分配了相同的 `contactType.target` 枚举值，我们需要识别投射物何时击中每个不同的虚拟对象。这意味着我们需要在\
  \ `addTargets` 函数中为每个虚拟对象指定一个唯一的名称，如下所示：\n\n```\nprojectile.name = \"Projectile\"\
  \npyramidNode.name = \"Pyramid\"\ntorusNode.name = \"Torus\"\nboxNode.name = \"\
  Box\"\n```\n\n现在我们需要使用 `didBegin physicsWorld` 函数来检测碰撞，如下所示：\n\n```\nfunc physicsWorld(_\
  \ world: SCNPhysicsWorld, didBegin contact: SCNPhysicsContact) {\n}\n```\n\n每当两个虚拟对象碰撞时，这个函数就会运行。当两个虚拟对象碰撞时，`didBegin\
  \ physicsWorld` 将这两个对象识别为 `nodeA` 和 `nodeB`。不幸的是，我们不知道哪个节点代表投射物，哪个节点代表目标。首先，我们需要声明一个变量来保存包含目标的节点：\n\
  \n```\nvar targetNode : SCNNode!\n```\n\n现在我们需要确定 `nodeA` 是被击中的投射物还是目标。要确定这些信息，我们只需要查看节点的名称：\n\
  \n```\nif contact.nodeA.name == \"Projectile\" {\ntargetNode = contact.nodeB\n}\
  \ else {\ntargetNode = contact.nodeA\n}\n```\n\n如果 `nodeA` 的名称为 `Projectile`，那么我们知道\
  \ `nodeB` 包含目标。如果 `nodeA` 的名称不是 `Projectile`，那么我们知道 `nodeA` 包含目标。\n\n现在根据 `targetNode`\
  \ 的名称，我们可以使用 `switch` 语句来改变投射物击中的虚拟对象的颜色。如果投射物击中棱锥体，棱锥体将变为品红色。如果投射物击中圆环体，圆环体将变为黄色。如果投射物击中立方体，立方体将变为红色：\n\
  \n```\nswitch targetNode.name {\ncase \"Pyramid\":\ntargetNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.magenta\ncase \"Torus\":\ntargetNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.yellow\ncase \"Box\":\ntargetNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.red\ndefault:\nreturn\n}\n```\n\n完整的 `ViewController.swift` 文件应该如下所示：\n\
  \n\n\n```swift\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController:\
  \ UIViewController, ARSCNViewDelegate, SCNPhysicsContactDelegate  {\n@IBOutlet var\
  \ sceneView: ARSCNView!\nlet configuration = ARWorldTrackingConfiguration()\nenum\
  \ contactType : Int {\ncase projectile = 1\ncase target = 2\n}\noverride func viewDidLoad()\
  \ {\nsuper.viewDidLoad()\n// 在视图加载后执行额外设置，通常从 nib 文件加载\nsceneView.debugOptions =\
  \ [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\nsceneView.delegate\
  \ = self\nsceneView.scene.physicsWorld.contactDelegate = self\nsceneView.session.run(configuration)\n\
  let tapGesture = UITapGestureRecognizer(target: self, action: #selector(tapResponse))\n\
  sceneView.addGestureRecognizer(tapGesture)\naddTargets()\n}\n@objc func tapResponse(sender:\
  \ UITapGestureRecognizer) {\nguard let scene = sender.view as? ARSCNView else {\
  \ return }\nguard let pov = scene.pointOfView else { return }\nlet transform = pov.transform\n\
  let orientation = SCNVector3(-transform.m31, -transform.m32, -transform.m33)\nlet\
  \ location = SCNVector3(transform.m41, transform.m42, transform.m43)\nlet position\
  \ = SCNVector3(orientation.x + location.x, orientation.y + location.y, orientation.z\
  \ + location.z)\nlet projectile = SCNNode()\nprojectile.geometry = SCNSphere(radius:\
  \ 0.35)\nprojectile.geometry?.firstMaterial?.diffuse.contents = UIColor.purple\n\
  projectile.position = position\nprojectile.physicsBody = SCNPhysicsBody(type: .dynamic,\
  \ shape: SCNPhysicsShape(node: projectile, options: nil))\nprojectile.physicsBody?.isAffectedByGravity\
  \ = false\nprojectile.physicsBody?.categoryBitMask = contactType.projectile.rawValue\n\
  projectile.physicsBody?.contactTestBitMask = contactType.target.rawValue\nprojectile.name\
  \ = \"Projectile\"\nlet force: Float = 50\nprojectile.physicsBody?.applyForce(SCNVector3(orientation.x\
  \ * force, orientation.y * force, orientation.z * force), asImpulse: true)\nsceneView.scene.rootNode.addChildNode(projectile)\n\
  }\nfunc addTargets() {\nlet pyramidNode = SCNNode()\npyramidNode.geometry = SCNPyramid(width:\
  \ 4, height: 4.5, length: 4)\npyramidNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.orange\npyramidNode.position = SCNVector3(-3, 1, -15)\npyramidNode.physicsBody\
  \ = SCNPhysicsBody(type: .static, shape: nil)\npyramidNode.physicsBody?.categoryBitMask\
  \ = contactType.target.rawValue\npyramidNode.name = \"Pyramid\"\nsceneView.scene.rootNode.addChildNode(pyramidNode)\n\
  let torusNode = SCNNode()\ntorusNode.geometry = SCNTorus(ringRadius: 2, pipeRadius:\
  \ 0.5)\ntorusNode.geometry?.firstMaterial?.diffuse.contents = UIColor.blue\ntorusNode.position\
  \ = SCNVector3(0, -2, -15)\ntorusNode.physicsBody = SCNPhysicsBody(type: .static,\
  \ shape: SCNPhysicsShape(node: torusNode, options: [SCNPhysicsShape.Option.type:\
  \ SCNPhysicsShape.ShapeType.concavePolyhedron]))\ntorusNode.physicsBody?.categoryBitMask\
  \ = contactType.target.rawValue\ntorusNode.name = \"Torus\"\nlet ninetyDegrees =\
  \ GLKMathDegreesToRadians(90)\ntorusNode.eulerAngles = SCNVector3(ninetyDegrees,\
  \ 0, 0)\nsceneView.scene.rootNode.addChildNode(torusNode)\nlet boxNode = SCNNode()\n\
  boxNode.geometry = SCNBox(width: 3.5, height: 3.5, length: 3.5, chamferRadius: 0)\n\
  boxNode.geometry?.firstMaterial?.diffuse.contents = UIColor.green\nboxNode.position\
  \ = SCNVector3(5, 1, -15)\nboxNode.physicsBody = SCNPhysicsBody(type: .static, shape:\
  \ nil)\nboxNode.physicsBody?.categoryBitMask = contactType.target.rawValue\nboxNode.name\
  \ = \"Box\"\nsceneView.scene.rootNode.addChildNode(boxNode)\n}\nfunc physicsWorld(_\
  \ world: SCNPhysicsWorld, didBegin contact: SCNPhysicsContact) {\nvar targetNode\
  \ : SCNNode!\nif contact.nodeA.name == \"Projectile\" {\ntargetNode = contact.nodeB\n\
  } else {\ntargetNode = contact.nodeA\n}\nswitch targetNode.name {\ncase \"Pyramid\"\
  :\ntargetNode.geometry?.firstMaterial?.diffuse.contents = UIColor.magenta\ncase\
  \ \"Torus\":\ntargetNode.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n\
  case \"Box\":\ntargetNode.geometry?.firstMaterial?.diffuse.contents = UIColor.red\n\
  default:\nreturn\n}\n}\n}\n```\n\n要测试此代码，请按以下步骤操作：\n\n1.  通过 USB 线将 iOS 设备连接到 Macintosh。\n\
  2.  点击“运行”按钮，或选择**产品** ➤ **运行**。\n3.  世界原点应出现，同时还有一个橙色金字塔、一个蓝色圆环和一个绿色盒子。将屏幕中心对准目标，然后点击屏幕即可发射一个紫色抛射体。每当紫色抛射体击中一个虚拟对象时，该虚拟对象会变为不同颜色，让你直观地看到它被击中了。\n\
  4.  点击“停止”按钮，或选择**产品** ➤ **停止**。\n\n## 小结\n\n默认情况下，虚拟对象只是悬浮在增强现实视图的半空中。通过为虚拟对象应用物理实体，你可以让它受重力影响而下落，或者让它与其他虚拟对象交互并发生碰撞。\n\
  \n你可以用不同类型的物理实体定义虚拟对象，这些实体决定了它如何响应碰撞。要发起碰撞，你可以沿 x、y 和 z 轴对虚拟对象施加一个力。要确定虚拟对象可能击中了什么，你需要定义一个枚举结构来标识可能发生碰撞的不同虚拟对象。然后你需要编写一个\
  \ `didBegin physicsWorld` 函数来响应这一碰撞。\n\n添加物理、受力及碰撞检测功能，能让你的应用中的虚拟对象像真实物体一样做出反应，并在它们因碰撞而发生物理接触时通知你。\n\
  \n\n"
- "# 13. 与现实世界互动\n\n当我们在增强现实视图中放置虚拟对象时，这些虚拟对象可以以不同方式相互交互。两个虚拟对象交互的最简单方法是将一个放在另一个前面。然后，最近的虚拟对象会遮挡您对第二个虚拟对象的视线。\n\
  \n为了在增强现实视图中实现更高的真实感，您还可以让现实世界中的物体看起来遮挡住虚拟对象，这称为*遮挡*。我们可以通过创建一个与现实世界物体位置和大小匹配的不可见虚拟对象，来模拟现实物体遮挡虚拟对象的效果。\n\
  \n另一种交互形式是虚拟对象与现实世界物体的交互。最简单的例子是水平或垂直平面检测，`ARKit` 可以识别墙壁或地板。当然，`ARKit` 也能识别现实世界中的点。例如，它可以比较现实世界中存在的两个点之间的距离，比如桌子一个角落到另一个角落的距离。\n\
  \n为了学习如何通过虚拟对象实现遮挡，让我们按照以下步骤创建一个新的 Xcode 项目：\n\n1.  启动 Xcode。（确保您的 Xcode 版本为 10\
  \ 或更高。）\n2.  选择“文件”➤“新建”➤“项目”。Xcode 会要求您选择一个模板。\n3.  点击“iOS”类别。\n4.  点击“单视图 App”图标，然后点击“下一步”按钮。Xcode\
  \ 会要求您提供产品名称、组织名称、组织标识符和内容技术。\n5.  点击“产品名称”文本框，为您的项目输入一个描述性名称，例如 `Occlusion`。（确切名称无关紧要。）\n\
  6.  点击“下一步”按钮。Xcode 会询问您想要存储项目的位置。\n7.  选择一个文件夹，然后点击“创建”按钮。Xcode 会创建一个 iOS 项目。\n\
  \n现在，按照以下步骤修改 `Info.plist` 文件，以允许访问摄像头并使用 `ARKit`：\n\n1.  在导航器窗格中点击 `Info.plist`\
  \ 文件。Xcode 会显示键、类型和值的列表。\n2.  点击展开三角形，展开“所需设备功能”类别以显示“项目 0”。\n3.  将鼠标指针移到“项目 0”上，显示一个加号\
  \ (+) 图标。\n4.  点击此加号 (+) 图标，显示一个空白的“项目 1”。\n5.  在“项目 1”行的“值”类别下输入 `arkit`。\n6. \
  \ 将鼠标指针移到最后一行，显示一个加号 (+) 图标。\n7.  点击加号 (+) 图标创建一个新行。会弹出一个菜单。\n8.  选择“隐私 – 相机使用说明”。\n\
  9.  在“隐私 – 相机使用说明”行的“值”类别下输入 `AR 需要使用摄像头`。\n\n现在是时候按照以下步骤修改 `ViewController.swift`\
  \ 文件，以使用 `ARKit` 和 `SceneKit` 了：\n\n1.  在导航器窗格中点击 `ViewController.swift` 文件。\n2.\
  \  编辑 `ViewController.swift` 文件，使其内容如下：\n\n```\nimport UIKit\nimport SceneKit\n\
  import ARKit\nclass ViewController: UIViewController, ARSCNViewDelegate {\n    let\
  \ configuration = ARWorldTrackingConfiguration()\n    var x : Float = 0\n    var\
  \ y : Float = 0\n    var z : Float = 0\n    override func viewDidLoad() {\n    \
  \    super.viewDidLoad()\n        // Do any additional setup after loading the view,\
  \ typically from a nib.\n    }\n}\n```\n\n这段代码声明了三个变量 `x`、`y` 和 `z`。这些变量将用于存储水平平面的位置。一旦我们的应用检测到水平平面，我们将使用这些\
  \ `x`、`y` 和 `z` 变量在水平平面下方绘制一个虚拟对象。\n\n要在我们的应用中查看增强现实，请添加一个单独的 `ARKit SceneKit 视图`（`ARSCNView`），并将其展开以填满整个用户界面。然后，通过选择“编辑器”➤“解决自动布局问题”➤“重置为建议的约束”（位于菜单下半部分“容器中所有视图”类别下）来添加约束。\n\
  \n下一步是将用户界面项连接到 `ViewController.swift` 文件中的 Swift 代码。为此，请按照以下步骤操作：\n\n1.  在导航器窗格中点击\
  \ `Main.storyboard` 文件。\n2.  点击“助理编辑器”图标，或选择“视图”➤“助理编辑器”➤“显示助理编辑器”，以并排显示 `Main.storyboard`\
  \ 和 `ViewController.swift` 文件。\n3.  将鼠标指针移到 `ARSCNView` 上，按住 Control 键，然后按 Ctrl\
  \ 键拖拽至 `class ViewController` 行下方。\n4.  松开 Control 键和鼠标左键。会弹出一个菜单。\n5.  点击“名称”文本框，输入\
  \ `sceneView`，然后点击“连接”按钮。Xcode 会创建一个 `IBOutlet`，如下所示：\n\n```\n@IBOutlet var sceneView:\
  \ ARSCNView!\n```\n\n6.  编辑 `viewDidLoad` 函数，使其内容如下：\n\n```\noverride func viewDidLoad()\
  \ {\n    super.viewDidLoad()\n    // Do any additional setup after loading the view,\
  \ typically from a nib.\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
  \ ARSCNDebugOptions.showFeaturePoints]\n    sceneView.delegate = self\n    configuration.planeDetection\
  \ = .horizontal\n    sceneView.session.run(configuration)\n    let tapGesture =\
  \ UITapGestureRecognizer(target: self, action: #selector(tapResponse))\n    sceneView.addGestureRecognizer(tapGesture)\n\
  }\n```\n\n`viewDidLoad` 函数中的最后两行创建了一个点击手势，这意味着我们需要一个名为 `tapGesture` 的函数来处理此点击手势。\n\
  \n7.  在 `viewDidLoad` 函数下方，编写以下 `tapResponse` 函数：\n\n```\n@objc func tapResponse(sender:\
  \ UITapGestureRecognizer) {\n    let boxNode = SCNNode()\n    boxNode.geometry =\
  \ SCNBox(width: 0.08, height: 0.08, length: 0.08, chamferRadius: 0)\n    boxNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.green\n    boxNode.position = SCNVector3(x, y, z)\n    sceneView.scene.rootNode.addChildNode(boxNode)\n\
  }\n```\n\n这个 `tapResponse` 函数会识别用户点击屏幕的位置，然后在代表水平平面中心坐标的 `x`、`y` 和 `z` 坐标处显示一个绿色方块。\n\
  \n8.  在 `tapResponse` 函数下方，编写以下 `didAdd renderer` 函数：\n\n```\nfunc renderer(_ renderer:\
  \ SCNSceneRenderer, didAdd node: SCNNode, for anchor: ARAnchor) {\n    guard anchor\
  \ is ARPlaneAnchor else { return }\n    let planeNode = detectPlane(anchor: anchor\
  \ as! ARPlaneAnchor)\n    node.addChildNode(planeNode)\n}\n```\n\n这个 `renderer`\
  \ 函数在 `ARKit` 首次检测到水平平面时运行。一旦检测到水平平面，它就会运行 `detectPlane` 函数（我们需要稍后编写）。\n\n9.  编写以下\
  \ `didUpdate renderer` 函数：\n\n```\nfunc renderer(_ renderer: SCNSceneRenderer, didUpdate\
  \ node: SCNNode, for anchor: ARAnchor) {\n    guard anchor is ARPlaneAnchor else\
  \ { return }\n    node.enumerateChildNodes { (childNode, _) in\n        childNode.removeFromParentNode()\n\
  \    }\n    let planeNode = detectPlane(anchor: anchor as! ARPlaneAnchor)\n    node.addChildNode(planeNode)\n\
  \    print(\"updating plane anchor\")\n}\n```\n\n这个 `didUpdate renderer` 函数会在 iOS\
  \ 摄像头检测到水平平面的更多部分时，不断调整水平平面的大小。请注意，此函数还会调用 `detectPlane` 函数，并在每次检测到平面扩展时打印 \"updating\
  \ plane anchor\"。\n\n10. 最后，编写以下 `detectPlane` 函数：\n\n```\nfunc detectPlane(anchor:\
  \ ARPlaneAnchor) -> SCNNode {\n    let planeNode = SCNNode()\n    planeNode.geometry\
  \ = SCNPlane(width: CGFloat(anchor.extent.x), height: CGFloat(anchor.extent.z))\n\
  \    planeNode.geometry?.firstMaterial?.diffuse.contents = UIColor.yellow\n    planeNode.position\
  \ = SCNVector3(anchor.center.x, anchor.center.y, anchor.center.z)\n    x = anchor.center.x\n\
  \    y = anchor.center.y - 0.4\n    z = anchor.center.z\n    let ninetyDegrees =\
  \ GLKMathDegreesToRadians(90)\n    planeNode.eulerAngles = SCNVector3(ninetyDegrees,\
  \ 0, 0)\n    planeNode.geometry?.firstMaterial?.isDoubleSided = true\n    return\
  \ planeNode\n}\n```\n\n\n\n`detectPlane`函数的前两行创建了一个节点，然后根据检测到的平面的宽度和高度定义平面的大小。`extent`属性包含检测到的水平平面的宽度和高度。\n\
  \n接下来的两行定义平面的颜色为黄色，并将该平面定位在检测到的平面锚点的中心。\n\n接下来的三行存储平面`x`、`y`和`z`位置的值，但会从平面的`y`位置减去\
  \ 0.4 米。这创建了一个位于水平平面下方且低于该平面的`y`值。\n\n接下来的两行使用`GLKMathDegreesToRadians`将 90 度转换为弧度。然后，它将平面绕`x`轴旋转\
  \ 90 度，因为该平面最初是垂直绘制的。将平面绕`x`轴旋转 90 度可以使平面水平显示。\n\n最后，最后一行将平面定义为双面，以便黄色出现在顶部和底部。\n\
  \n要测试此项目，请按照以下步骤操作：\n\n1. 点击“停止”按钮，或选择“产品”➤“停止”。\n\n![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig1_HTML.jpg](img/469983_1_En_13_Fig1_HTML.jpg)\n\
  \n图 13-1\n\n黄色平面遮挡了绿色盒子的视线\n\n1. 通过 USB 线将 iOS 设备连接到 Macintosh。\n\n2. 点击“运行”按钮，或选择“产品”➤“运行”。首次运行此应用时，它会请求访问相机的权限，因此请授予权限。\n\
  \n3. 将 iOS 设备的摄像头对准一个下方有空间（例如桌子）的水平平面。当 ARKit 识别出足够的特征点时，它会在 iOS 摄像头对准的水平表面上绘制一个黄色平面。\n\
  \n4. 点击屏幕。这将在黄色平面下方 0.4 米处放置一个绿色盒子。您可能需要移动到侧面才能看到黄色平面下方的绿色盒子。请注意，如图 13-1 所示，当黄色平面出现在绿色盒子上方时，它会遮挡您对绿色盒子的视线。\n\
  \n遮挡功能的实现方式是在检测到的水平表面（例如桌面）上显示一个不可见的水平平面。由于不可见的水平平面不可见，因此看起来像不存在。然而，除非您移动到侧面，否则它会遮挡绿色盒子的视线。这营造出一种错觉，即水平表面（例如桌面）实际上遮挡了绿色盒子的视线。\n\
  \n要创建不可见的水平平面，只需注释掉`detectPlane`函数中显示平面为黄色的那一行。然后，用以下两行替换它：\n\n```\nplaneNode.geometry?.firstMaterial?.colorBufferWriteMask\
  \ = []\nplaneNode.renderingOrder = -1\n```\n\n这会创建一个没有颜色且渲染顺序为`-1`的平面。大多数虚拟对象的默认`renderingOrder`值为`0`，但更高的`renderingOrder`值意味着虚拟对象会最后绘制。因此，`-1`的`renderingOrder`值意味着该虚拟对象始终显示在其他虚拟对象之上。这有助于营造一种错觉，即真实的水平平面会遮挡绿色虚拟盒子的视线，尽管实际上是一个不可见的水平平面在起作用。\n\
  \n整个`detectPlane`函数应如下所示：\n\n```\nfunc detectPlane(anchor: ARPlaneAnchor) -> SCNNode\
  \ {\nlet planeNode = SCNNode()\n//planeNode.geometry = SCNPlane(width: CGFloat(anchor.extent.x),\
  \ height: CGFloat(anchor.extent.z))\nplaneNode.geometry?.firstMaterial?.colorBufferWriteMask\
  \ = []\nplaneNode.renderingOrder = -1\nplaneNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.yellow\nplaneNode.position = SCNVector3(anchor.center.x, anchor.center.y,\
  \ anchor.center.z)\nx = anchor.center.x\ny = anchor.center.y - 0.4\nz = anchor.center.z\n\
  let ninetyDegrees = GLKMathDegreesToRadians(90)\nplaneNode.eulerAngles = SCNVector3(ninetyDegrees,\
  \ 0, 0)\nplaneNode.geometry?.firstMaterial?.isDoubleSided = true\nreturn planeNode\n\
  }\n```\n\n要测试此项目，请按照以下步骤操作：\n\n1. 点击“停止”按钮，或选择“产品”➤“停止”。\n\n![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig3_HTML.jpg](img/469983_1_En_13_Fig3_HTML.jpg)\n\
  \n图 13-3\n\n绿色盒子看起来被真实的水平表面遮挡了\n\n1. 直接移动到绿色盒子上方。请注意，如图 13-3 所示，真实的水平表面似乎切断了您对绿色盒子的视线。\n\
  \n![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig2_HTML.jpg](img/469983_1_En_13_Fig2_HTML.jpg)\n\
  \n图 13-2\n\n绿色盒子出现在真实的水平表面下方\n\n1. 通过 USB 线将 iOS 设备连接到 Macintosh。\n\n2. 点击“运行”按钮，或选择“产品”➤“运行”。首次运行此应用时，它会请求访问相机的权限，因此请授予权限。\n\
