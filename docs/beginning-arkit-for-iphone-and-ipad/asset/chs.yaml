  1.  通过 USB 数据线将 iOS 设备连接到 Macintosh。\n2.  点击运行按钮或选择 **Product ➤ Run**。\n3.  将一根手指放在屏幕上的盒子或金字塔上并滑动它。注意\
  \ Xcode 中的调试区域会识别出平移经过的区域、平移手势何时开始、停止和改变，以及位移值是多少。\n4.  点击停止按钮或选择 **Product ➤ Stop**。\n\
  \n\n\n## 识别虚拟物体上的长按手势\n\n轻点手势发生在用户用手指按压屏幕然后松开时。长按手势与之类似，但允许用户将一个或多个手指按压在屏幕上并保持，然后再松开。你可以修改长按手势的四个属性：\n\
  \n*   `minimumPressDuration` —— 定义用户必须按压屏幕多长时间。默认值为 0.5 秒。\n*   `numberOfTouchesRequired`\
  \ —— 定义用户必须用几个手指按压屏幕。默认值为 1。\n*   `numberOfTapsRequired` —— 定义用户必须按压并抬起手指多少次来触发长按手势。默认值为\
  \ 0。\n*   `allowableMovement` —— 定义用户滑动手指多远的距离仍可触发长按手势。默认值为 10 个点。\n\n要定义一个长按手势及其任意四个属性，你只需定义一个函数来处理长按手势，然后将长按手势添加到场景中，如下所示：\n\
  \n```\nlet longPressGesture = UILongPressGestureRecognizer(target: self, action:\
  \ #selector(handleLongPress))\nlongPressGesture.minimumPressDuration = 1\nsceneView.addGestureRecognizer(longPressGesture)\n\
  ```\n\n这段代码将 `minimumPressDuration` 定义为 1 秒，但如果你省略此行，它将使用默认的 0.5 秒 `minimumPressDuration`。这段代码还定义了一个名为\
  \ `handleLongPress` 的函数来响应长按手势，因此我们需要这样创建这个函数：\n\n```\n@objc func handleLongPress(sender:\
  \ UILongPressGestureRecognizer) {\n}\n```\n\n要确定用户按压的位置，我们需要像这样识别区域：\n\n```\nlet\
  \ areaPressed = sender.view as! SCNView\nlet tappedCoordinates = sender.location(in:\
  \ areaPressed)\nlet hitTest = areaPressed.hitTest(tappedCoordinates)\n```\n\n然后我们需要使用\
  \ `hitTest` 函数来识别用户是否按压在立方体或金字塔上，像这样：\n\n```\nif hitTest.isEmpty {\n    print (\"\
  Nothing\")\n} else {\n    let results = hitTest.first!\n    let name = results.node.name\
  \ ?? \"background\"\n    print(\"Long press on \\(name)\")\n}\n```\n\n完整的 `handleLongPress`\
  \ 函数应如下所示：\n\n```\n@objc func handleLongPress(sender: UILongPressGestureRecognizer)\
  \ {\n    let areaPressed = sender.view as! SCNView\n    let tappedCoordinates =\
  \ sender.location(in: areaPressed)\n    let hitTest = areaPressed.hitTest(tappedCoordinates)\n\
  \    if hitTest.isEmpty {\n        print (\"Nothing\")\n    } else {\n        let\
  \ results = hitTest.first!\n        let name = results.node.name ?? \"background\"\
  \n        print(\"Long press on \\(name)\")\n    }\n}\n```\n\n将 `handleLongPress`\
  \ 函数添加到你的 `ViewController.swift` 文件中，并按如下方式定义长按识别器：\n\n```\nlet longPressGesture\
  \ = UILongPressGestureRecognizer(target: self, action: #selector(handleLongPress))\n\
  sceneView.addGestureRecognizer(longPressGesture)\n```\n\n然后，要运行应用，请执行以下操作：\n\n1.\
  \  通过 USB 数据线将 iOS 设备连接到 Macintosh。\n2.  点击运行按钮或选择 Product ➤ Run。\n3.  在屏幕上用一根手指按压立方体或金字塔。注意，调试区域会显示“Long\
  \ press on box”或“Long press on pyramid”。\n4.  点击停止按钮或选择 Product ➤ Stop。\n\n## 添加捏合与旋转手势\n\
  \n到目前为止，我们已通过编写至少两行代码以编程方式添加了手势识别器。首先，我们创建了一个常量来表示手势识别器，并定义了一个处理该手势的函数，如下所示：\n\n\
  ```\nlet tapGesture = UITapGestureRecognizer(target: self, action: #selector(handleTap))\n\
  ```\n\n其次，我们这样将手势识别器添加到视图中：\n\n```\nsceneView.addGestureRecognizer(tapGesture)\n\
  ```\n\n向应用添加手势识别器的第二种方法是使用对象库，并直接将手势识别器拖放到场景中。如果你点击对象库并搜索“gesture recognizer”，Xcode\
  \ 会显示所有可用手势识别器的列表，如图 9-2 所示。\n\n![../images/469983_1_En_9_Chapter/469983_1_En_9_Fig2_HTML.jpg](img/469983_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2\n\n在对象库窗口中查看手势识别器列表\n\n将手势识别器拖放到视图上等同于编写代码将手势识别器添加到视图：\n\n```\nsceneView.addGestureRecognizer(tapGesture)\n\
  ```\n\n现在，如果你打开 Assistant Editor，可以按住 Control 键从手势识别器拖动到 `ViewController.swift`\
  \ 文件。如果你按住 Control 键拖动以创建一个 IBOutlet，这等同于声明一个手势识别器，如下所示：\n\n```\nlet tapGesture\
  \ = UITapGestureRecognizer(target: self, action: #selector(handleTap))\n```\n\n\
  当然，每个手势识别器都需要一个包含代码来处理手势的函数，因此你还需要按住 Control 键拖动以创建一个 IBAction 方法。通过将手势识别器拖放到视图上，你可以避免编写代码。让我们看看旋转和捏合手势识别器如何通过以下步骤实现这一点：\n\
  \n1.  重复步骤 3-5，但将 Pinch Gesture Recognizer 拖放到 `ARSCNView` 上，这样 Pinch Gesture Recognizer\
  \ 也会出现在 Document Outline 窗口中。\n2.  点击 Assistant Editor 图标或选择 View ➤ Assistant Editor\
  \ ➤ Show Assistant Editor。Xcode 会并排显示 Document Outline、`Main.storyboard` 文件和 `ViewController.swift`\
  \ 文件。\n3.  在 Document Outline 中点击 Rotation Gesture Recognizer，然后按住 Control 键拖动到\
  \ `ViewController.swift` 文件的底部。\n4.  松开 Control 键和鼠标左键。出现一个弹出窗口。\n5.  确保 Connection\
  \ 弹出菜单显示 Action。\n6.  点击 Name 文本字段并输入 `handleRotation`。\n7.  点击 Type 弹出菜单并选择 `UIRotationGestureRecognizer`。\n\
  8.  点击 Connect 按钮。Xcode 创建一个空的 IBAction 方法，如下所示：\n\n    ```\n    @IBAction func\
  \ handleRotation(_ sender: UIRotationGestureRecognizer) {\n    }\n    ```\n\n9.\
  \  在 Document Outline 中点击 Pinch Gesture Recognizer，然后按住 Control 键拖动到 `ViewController.swift`\
  \ 文件的底部。\n10.  松开 Control 键和鼠标左键。出现一个弹出窗口。\n11.  确保 Connection 弹出菜单显示 Action。\n\
  12.  点击 Name 文本字段并输入 `handlePinch`。\n13.  点击 Type 弹出菜单并选择 `UIPinchGestureRecognizer`。\n\
  14.  点击 Connect 按钮。Xcode 创建一个空的 IBAction 方法，如下所示：\n\n    ```\n    @IBAction func\
  \ handlePinch(_ sender: UIPinchGestureRecognizer) {\n    }\n    ```\n\n15.  编辑这两个函数，添加\
  \ `print` 语句，如下所示：\n\n    ```\n    @IBAction func handleRotation(_ sender: UIRotationGestureRecognizer)\
  \ {\n        print(\"Rotation detected\")\n    }\n    @IBAction func handlePinch(_\
  \ sender: UIPinchGestureRecognizer) {\n        print(\"Pinch detected\")\n    }\n\
  \    ```\n\n16.  通过 USB 数据线将 iOS 设备连接到 Macintosh。\n17.  点击运行按钮或选择 Product ➤ Run。\n\
  18.  用两根手指按压屏幕并以圆周运动旋转它们。Xcode 调试区域应显示“Rotation detected”。\n19.  用两根手指按压屏幕并将它们捏合。Xcode\
  \ 调试区域应显示“Pinch detected”。\n\n\n\n20.  点击 `Stop` 按钮或选择 `Product` ➤ `Stop`。\n\n![图\
  \ 9-5](img/469983_1_En_9_Fig5_HTML.jpg)\n\n**图 9-5**\n\n文档大纲窗格显示所有用户界面项目。\n\n1.\
  \  将 `Rotation Gesture Recognizer` 拖拽到 `ARSCNView` 上。Xcode 会在文档大纲中显示 `Rotation Gesture\
  \ Recognizer`，如图 9-5 所示。（你可以通过选择 `Editor` ➤ `Show/Hide Document Outline` 来切换隐藏或显示文档大纲。）\n\
  \n![图 9-4](img/469983_1_En_9_Fig4_HTML.jpg)\n\n**图 9-4**\n\n对象库窗口中的旋转手势识别器。\n\n\
  1.  在对象库窗口中输入 `Rotation`。对象库窗口会显示 `Rotation Gesture Recognizer`。\n\n![图 9-3](img/469983_1_En_9_Fig3_HTML.jpg)\n\
  \n**图 9-3**\n\n对象库图标。\n\n1.  确保你的 `TouchGestures` 项目已打开。\n2.  在导航器窗格中点击 `Main.storyboard`\
  \ 文件。\n3.  点击 `Object Library` 图标以显示对象库窗口。\n\n请注意，通过将手势识别器拖放到 `ARSCNView` 上，我们省去了编写代码的工作。你可以使用其中一种方法或两种方法结合使用。\n\
  \n## 总结\n\niOS 设备的触摸屏可以识别多种类型的触摸手势，从简单的点击到旋转、轻扫和拖拽。要识别手势，你有两种方法。首先，你可以通过编写如下代码来为你的应用添加手势识别器：\n\
  \n```\nlet panGesture = UIPanGestureRecognizer(target: self, action: #selector(handlePan))\n\
  sceneView.addGestureRecognizer(panGesture)\n```\n\n然后你需要编写一个函数来处理触摸手势，例如：\n\n```\n\
  @objc func handlePan(sender: UIPanGestureRecognizer) {\n}\n```\n\n另一种方法是，我们可以直接从对象库中拖放手势识别器到\
  \ `ARSCNView` 上。然后我们可以通过 Ctrl-拖拽来为手势识别器创建一个 `IBOutlet`，并创建一个 `IBAction` 方法来处理检测到的手势。\n\
  \n"
- "# 10. 与增强现实交互\n\n触摸手势让用户能够仅通过手指动作（如点击、轻扫、旋转和捏合）来控制增强现实应用。一旦你为增强现实应用添加了触摸手势，下一步就是利用这些触摸手势来操控显示在增强现实视图中的虚拟对象。\n\
  \n在上一章中，我们学习了如何识别虚拟对象上发生的简单触摸手势，如点击、长按或轻扫。在本章中，我们将学习如何使用捏合、旋转和拖拽触摸手势来缩放、旋转和移动虚拟对象。\n\
  \n对于本章的示例，我们将通过对象库创建不同的手势识别器。让我们按照以下步骤创建一个新的 Xcode 项目：\n\n1.  启动 Xcode。（确保你使用的是\
  \ Xcode 10 或更高版本。）\n2.  选择 `File` ➤ `New` ➤ `Project`。Xcode 会要求你选择一个模板。\n3.  点击\
  \ `iOS` 类别。\n4.  点击 `Augmented Reality App` 图标并点击 `Next` 按钮。Xcode 会要求输入产品名称、组织名称、组织标识符和内容技术。\n\
  5.  点击 `Product Name` 文本框，为你的项目输入一个描述性名称，例如 `RotatePinch`。（具体名称无关紧要。）\n6.  确保 `Content\
  \ Technology` 弹出菜单显示 `SceneKit`。\n7.  点击 `Next` 按钮。Xcode 会询问你想将项目存储在何处。\n8.  选择一个文件夹并点击\
  \ `Create` 按钮。Xcode 会创建一个 iOS 项目。\n\n这将创建一个简单的增强现实应用，显示一个卡通飞机。既然我们已经自动获得了显示的飞机模型，让我们从学习使用捏合手势在增强现实视图中缩放或调整飞机虚拟对象的大小开始。\n\
  \n捏合手势包括将两个指尖放在屏幕上，然后以捏合动作将它们分开或合拢。要在我们的应用中放置一个捏合手势识别器，请按照以下步骤操作：\n\n1.  点击 `Assistant\
  \ Editor` 图标或选择 `View` ➤ `Assistant Editor` ➤ `Show Assistant Editor`，以并排显示 `Main.storyboard`\
  \ 和 `ViewController.swift` 文件。\n2.  将鼠标指针移动到文档大纲中的 `Pinch Gesture Recognizer` 上，按住\
  \ `Control` 键，然后 Ctrl-拖拽到 `ViewController.swift` 文件底部最后一个大括号的上方。\n3.  松开 `Control`\
  \ 键和鼠标左键。会出现一个弹出菜单。\n4.  确保 `Connection` 弹出菜单显示 `Action`。\n5.  点击 `Name` 文本框，输入\
  \ `pinchGesture`。\n6.  点击 `Type` 弹出菜单，选择 `UIPinchGestureRecognizer`。然后点击 `Connect`\
  \ 按钮。Xcode 会创建一个 `IBAction` 方法，如下所示：\n\n```\n@IBAction func pinchGesture(_ sender:\
  \ UIPinchGestureRecognizer) {\n}\n```\n\n7.  按如下方式编辑这个 `IBAction` 方法 `pinchGesture`：\n\
  \n```\n@IBAction func pinchGesture(_ sender: UIPinchGestureRecognizer) {\n    print(\"\
  Pinch gesture\")\n}\n```\n\n8.  通过 USB 线缆将 iOS 设备连接到你的 Macintosh。\n9.  点击 `Run`\
  \ 按钮或选择 `Product` ➤ `Run`。首次运行此应用时，它会请求访问摄像头的权限，请授予权限。\n10. 将两个指尖放在屏幕上并进行捏合或张开操作。Xcode\
  \ 调试区域应显示 `Pinch Gesture`，让你知道它已成功检测到捏合手势。\n11. 点击 `Stop` 按钮或选择 `Product` ➤ `Stop`。\n\
  \n![图 10-2](img/469983_1_En_10_Fig2_HTML.jpg)\n\n**图 10-2**\n\n文档大纲显示你放置在用户界面上的任何手势识别器。\n\
  \n1.  从对象库窗口中拖拽 `Pinch Gesture Recognizer` 并放到用户界面上的 `ARSCNView` 上。尽管你将捏合手势识别器拖放到了用户界面上，但除了在文档大纲中（如图\
  \ 10-2 所示），你在其他地方都看不到它的任何迹象。如果文档大纲不可见，点击 `Show Document Outline` 图标或选择 `Editor`\
  \ ➤ `Show Document Outline`。\n\n![图 10-1](img/469983_1_En_10_Fig1_HTML.jpg)\n\n\
  **图 10-1**\n\n在对象库窗口中查找捏合手势识别器。\n\n1.  在导航器窗格中点击 `Main.storyboard` 文件。\n2.  点击 `Object\
  \ Library` 图标以显示对象库窗口。\n3.  在对象库中输入 `pinch`。对象库会显示捏合手势识别器，如图 10-1 所示。\n\n\n\n##\
  \ 使用捏合触摸手势进行缩放\n\n捏合手势是一种常见的触摸手势，用于放大或缩小屏幕上显示的图像，例如在查看数码照片时。同样，这一捏合手势也可用于缩放增强现实视图中出现的虚拟平面。\n\
  \n触摸手势包含三种状态：\n*   `.began` — 当应用首次检测到特定触摸手势时发生\n*   `.changed` — 当触摸手势仍在进行时发生\n\
  *   `.ended` — 当应用检测到触摸手势已停止时发生\n\n对于捏合手势，我们只关心它何时正在改变，因为随着用户向内或向外捏合，我们希望按比例缩放增强现实视图中虚拟平面的大小。像这样编辑\
  \ `pinchGesture` 函数：\n\n```\n@IBAction func pinchGesture(_ sender: UIPinchGestureRecognizer)\
  \ {\n    if sender.state == .changed {\n        print(\"Pinch gesture\")\n    }\n\
  }\n```\n\n如果你运行此代码并在屏幕上进行捏合操作，应该仍然能在 Xcode 的调试区域看到“Pinch gesture”出现。这验证了应用仍然识别捏合手势。\n\
  \n我们只希望当用户在虚拟平面上直接捏合（而不是在增强现实视图的其他任何部分）时，捏合手势才调整虚拟平面的大小。为了检测用户在屏幕的哪个部分进行了捏合，我们首先需要像这样获取整个增强现实视图：\n\
  \n```\nlet areaPinched = sender.view as? SCNView\n```\n\n现在我们需要获取用户在屏幕上捏合的具体位置：\n\
  \n```\nlet location = sender.location(in: areaPinched)\n```\n\n最后，我们需要使用 `hitTest`\
  \ 方法来确定用户是否触摸到了虚拟平面：\n\n```\nlet hitTestResults = sceneView.hitTest(location, options:\
  \ nil)\nif let hitTest = hitTestResults.first {\n}\n```\n\n如果用户触摸了增强现实视图中的第一个节点（该平面是唯一的节点），那么我们可以用一个任意的名称来标识这个\
  \ `hitTest` 节点，例如：\n\n```\nif let hitTest = hitTestResults.first {\n    let plane\
  \ = hitTest.node\n}\n```\n\n现在，根据用户移动捏合手势的距离，我们可以将此值乘以虚拟平面的当前缩放比例。如果用户向外捏合（两指分开），缩放比例会变大，虚拟平面应该增大尺寸。如果用户向内捏合（两指并拢），缩放比例会变小，虚拟平面应该减小尺寸。以下三行代码测量了虚拟平面在\
  \ x、y 和 z 方向上应如何改变尺寸：\n\n```\nlet scaleX = Float(sender.scale) * plane.scale.x\n\
  let scaleY = Float(sender.scale) * plane.scale.y\nlet scaleZ = Float(sender.scale)\
  \ * plane.scale.z\n```\n\n一旦我们知道虚拟平面在 x、y 和 z 方向上的缩放量，就可以将这些值应用到虚拟平面本身，如下所示：\n\n\
  ```\nplane.scale = SCNVector3(scaleX, scaleY, scaleZ)\n```\n\n最后，我们需要将虚拟平面的新尺寸重置为缩放比例为\
  \ 1：\n\n```\nsender.scale = 1\n```\n\n完整的 `pinchGesture` IBAction 方法应如下所示：\n\n```\n\
  @IBAction func pinchGesture(_ sender: UIPinchGestureRecognizer) {\n    if sender.state\
  \ == .changed {\n        let areaPinched = sender.view as? SCNView\n        let\
  \ location = sender.location(in: areaPinched)\n        let hitTestResults = sceneView.hitTest(location,\
  \ options: nil)\n        if let hitTest = hitTestResults.first {\n            let\
  \ plane = hitTest.node\n            let scaleX = Float(sender.scale) * plane.scale.x\n\
  \            let scaleY = Float(sender.scale) * plane.scale.y\n            let scaleZ\
  \ = Float(sender.scale) * plane.scale.z\n            plane.scale = SCNVector3(scaleX,\
  \ scaleY, scaleZ)\n            sender.scale = 1\n        }\n    }\n}\n```\n\n通过连接的\
  \ iOS 设备运行此应用，并直接在虚拟平面上进行捏合（不要在虚拟平面周围的区域）。你应该能够根据捏合的方向将虚拟平面缩放得更大或更小。\n\n![图 10-3](img/469983_1_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3 捏合手势使虚拟平面放大或缩小\n\n## 使用旋转触摸手势进行旋转\n\n旋转手势也使用两根手指，很像捏合手势。最大的区别在于，捏合手势涉及将两根手指指尖移近或移远，而旋转触摸手势则是将两根手指指尖放在屏幕上并顺时针或逆时针旋转，同时保持两指指尖之间的距离不变。\n\
  \n要在我们的应用中放置旋转手势识别器，请按照以下步骤操作：\n1.  从对象库窗口中拖动 Rotation Gesture Recognizer（旋转手势识别器），并将其放到用户界面上的\
  \ `ARSCNView` 上。尽管你将 Rotation Gesture Recognizer 拖放到了用户界面上，但除了在文档大纲中，你在其他地方看不到它的任何痕迹。\n\
  2.  点击 Assistant Editor 图标或选择 View（视图） ➤ Assistant Editor（助理编辑器） ➤ Show Assistant\
  \ Editor（显示助理编辑器）以并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n3.  将鼠标指针移到文档大纲中的\
  \ Rotation Gesture Recognizer 上，按住 Control 键，然后按住 Control 键并拖动到 `ViewController.swift`\
  \ 文件底部最后一个花括号的上方。\n4.  释放 Control 键和鼠标左键。会出现一个弹出菜单。\n5.  确保 Connection（连接）弹出菜单显示为\
  \ Action（动作）。\n6.  点击 Name（名称）文本字段，输入 `rotationGesture`。\n7.  点击 Type（类型）弹出菜单，选择\
  \ `UIRotationGestureRecognizer`。然后点击 Connect（连接）按钮。Xcode 将创建一个如下所示的 IBAction 方法：\n\
  \    ```\n    @IBAction func rotationGesture(_ sender: UIRotationGestureRecognizer)\
  \ {\n    }\n    ```\n8.  按如下方式编辑这个 IBAction 方法 `rotationGesture`：\n    ```\n   \
  \ @IBAction func rotationGesture(_ sender: UIRotationGestureRecognizer) {\n    \
  \    print(\"Rotation gesture\")\n    }\n    ```\n9.  通过 USB 数据线将 iOS 设备连接到你的 Macintosh。\n\
  10. 点击 Run（运行）按钮或选择 Product（产品）➤ Run（运行）。\n11. 将两根手指指尖放在屏幕上，并顺时针或逆时针旋转。Xcode 调试区域应显示“Rotation\
  \ Gesture”，让你知道它成功检测到了旋转手势。\n12. 点击 Stop（停止）按钮或选择 Product（产品）➤ Stop（停止）。\n\n![图\
  \ 10-4](img/469983_1_En_10_Fig4_HTML.jpg)\n\n图 10-4 在对象库窗口中查找旋转手势识别器\n\n对于旋转手势，我们需要识别旋转实际何时发生以及旋转最终何时停止。当旋转手势正在进行时，我们需要旋转虚拟平面。一旦旋转结束，我们需要将旋转后的角度存储为虚拟平面的当前角度。\n\
  \n首先，我们需要在 `ARSCNView` 的 IBOutlet 下方创建两个变量，如下所示：\n\n```\nvar newAngleZ : Float =\
  \ 0.0\nvar currentAngleZ : Float = 0.0\n```\n\n在这个例子中，我们将围绕虚拟平面的 z 轴进行旋转，因此 `currentAngleZ`\
  \ 存储虚拟平面的当前角度。然后，我们将基于旋转手势计算一个新角度，并将这个新角度存储在 `newAngleZ` 变量中。\n\n一旦这两个变量可用，我们就可以编写检测旋转何时正在发生（`.changed`）以及旋转何时已停止（`.ended`）的代码：\n\
  \n```\n@IBAction func rotationGesture(_ sender: UIRotationGestureRecognizer) {\n\
  \    if sender.state == .changed {\n    } else if sender.state == .ended {\n   \
  \     currentAngleZ = newAngleZ\n    }\n}\n```\n\n一旦旋转手势结束，我们希望将新的旋转角度（`newAngleZ`）存储到\
  \ `currentAngleZ` 变量中。\n\n\n\n## 旋转虚拟平面\n\n一旦检测到旋转手势，我们需要确认该手势是否发生在虚拟平面上。为此，我们需要获取被触摸的视图、用户指尖的位置，并使用\
  \ `hitTest` 方法来判断是否触摸到了增强现实视图中的任何虚拟对象：\n\n```\nlet areaTouched = sender.view as?\
  \ SCNView\nlet location = sender.location(in: areaTouched)\nlet hitTestResults =\
  \ sceneView.hitTest(location, options: nil)\n```\n\n接下来，我们需要检查旋转手势是否发生在增强现实视图中的第一个（且唯一的）虚拟对象上：\n\
  \n```\nif let hitTest = hitTestResults.first {\n}\n```\n\n然后，我们将创建一个名为 `plane` 的常量来代表用户触摸的节点（即虚拟平面），并将手势的旋转角度存储在\
  \ `newAngleZ` 变量中。\n\n```\nlet plane = hitTest.node\nnewAngleZ = Float(-sender.rotation)\n\
  ```\n\n负号对于协调屏幕上的旋转手势与增强现实视图中虚拟平面的旋转是必需的。如果没有这个负号，虚拟平面将朝与旋转手势相反的方向旋转。\n\n我们将把这个新的旋转角度加到虚拟平面的当前角度上，然后将这个新角度赋值以围绕\
  \ z 轴旋转虚拟平面。为此，我们需要使用 `eulerAngles` 属性，该属性定义了虚拟对象围绕 x、y 和 z 轴的旋转。由于我们只围绕 z 轴旋转虚拟平面，我们只需要将新的旋转角度赋值给\
  \ z 轴，如下所示：\n\n```\nnewAngleZ += currentAngleZ\nplane.eulerAngles.z = newAngleZ\n\
  ```\n\n完整的旋转手势 `IBAction` 方法应如下所示：\n\n```\n@IBAction func rotationGesture(_ sender:\
  \ UIRotationGestureRecognizer) {\n    if sender.state == .changed {\n        let\
  \ areaTouched = sender.view as? SCNView\n        let location = sender.location(in:\
  \ areaTouched)\n        let hitTestResults = sceneView.hitTest(location, options:\
  \ nil)\n        if let hitTest = hitTestResults.first {\n            let plane =\
  \ hitTest.node\n            newAngleZ = Float(-sender.rotation)\n            newAngleZ\
  \ += currentAngleZ\n            plane.eulerAngles.z = newAngleZ\n        }\n   \
  \ } else if sender.state == .ended {\n        currentAngleZ = newAngleZ\n    }\n\
  }\n```\n\n请记住，你还必须通过在 `ViewController.swift` 类的顶部附近声明两个 `Float` 类型的变量（`newAngleZ`\
  \ 和 `currentAngleZ`）来添加它们，如下所示：\n\n```\nvar newAngleZ : Float = 0.0\nvar currentAngleZ\
  \ : Float = 0.0\n```\n\n如果你运行此应用，可以将两个手指放在虚拟平面上并进行旋转。然后虚拟平面将朝相同方向旋转，如图 [10-5] 所示。\n\
  \n![../images/469983_1_En_10_Chapter/469983_1_En_10_Fig5_HTML.jpg](img/469983_1_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5\n使用旋转手势旋转虚拟平面\n\n## 使用平移手势移动虚拟对象\n\n平移手势发生在用户用一个手指在屏幕上沿任意方向滑动时。你可以为平移手势定义最少和最多的手指数量，例如至少两个但不超过四个。默认情况下，检测平移手势的最少手指数量是\
  \ 1。\n\nXcode 提供两种类型的平移手势识别器。我们将使用的那个简称为“平移手势识别器”，它检测屏幕上任意位置的手指移动。另一个平移手势识别器称为“屏幕边缘平移手势识别器”。如果你曾经从\
  \ iPhone 屏幕底部向上滑动以显示诸如将 iPhone 变为手电筒之类的选项，那么你就使用了屏幕边缘平移手势识别器，它检测从屏幕边缘开始的平移。\n\n\
