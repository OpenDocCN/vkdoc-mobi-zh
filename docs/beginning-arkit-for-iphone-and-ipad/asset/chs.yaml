  \ anchor”时，您就知道 ARKit 已检测到一个水平平面，并在其上放置了一个不可见的虚拟平面。\n\n4. 点击屏幕。这将在不可见水平平面下方 0.4\
  \ 米处绘制一个绿色盒子，但除非您移动到侧面，否则您将看不到它，如图 13-2 所示。\n\n\n\n## 检测现实世界中的点\n\n`ARKit` 可以检测水平面和垂直面，但你也可以让它检测单个点。例如，一款测量应用可以让你将\
  \ iOS 设备摄像头的中心对准一个物体来记录该位置。然后，当你移动 iOS 设备摄像头并点击确定另一个位置时，这样的测量应用就能计算出两点之间的距离。\n\n\
  让我们创建一个 Xcode 项目来识别现实世界中的两个点，并通过以下步骤计算它们之间的距离：\n\n1. 启动 Xcode。（确保你使用的是 Xcode 10\
  \ 或更高版本。）\n2. 选择 文件 ➤ 新建 ➤ 项目。Xcode 会要求你选择一个模板。\n3. 点击 iOS 类别。\n4. 点击“单视图应用”图标，然后点击“下一步”按钮。Xcode\
  \ 会要求输入产品名称、组织名称、组织标识符和内容技术。\n5. 在“产品名称”文本框中点击，然后为你的项目输入一个描述性名称，例如 `Ruler`。（具体名称无关紧要。）\n\
  6. 点击“下一步”按钮。Xcode 会询问你想将项目存储在哪里。\n7. 选择一个文件夹，然后点击“创建”按钮。Xcode 会创建一个 iOS 项目。\n\n\
  现在按照以下步骤修改 `Info.plist` 文件，以允许访问摄像头并使用 `ARKit`：\n\n1. 在导航器窗格中点击 `Info.plist` 文件。Xcode\
  \ 会显示一个键、类型和值的列表。\n2. 点击展开三角形，展开“所需的设备功能”类别，以显示“项目 0”。\n3. 将鼠标指针移到“项目 0”上，显示一个加号（+）图标。\n\
  4. 点击这个加号（+）图标，显示一个空白的“项目 1”。\n5. 在“项目 1”行的“值”类别下输入 `arkit`。\n6. 将鼠标指针移到最后一行，显示一个加号（+）图标。\n\
  7. 点击加号（+）图标创建一个新行。会出现一个弹出菜单。\n8. 选择“隐私 - 相机使用说明”。\n9. 在“隐私 - 相机使用说明”行的“值”类别下输入\
  \ `AR 需要使用摄像头`。\n\n现在是时候按照以下步骤修改 `ViewController.swift` 文件以使用 `ARKit` 和 `SceneKit`\
  \ 了：\n\n![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig6_HTML.jpg](img/469983_1_En_13_Fig6_HTML.jpg)\n\
  \n图 13-6 在水平和垂直方向上对齐 `UILabel`\n\n1. 在“大小”文本框中点击并输入 `24`。然后点击“完成”按钮。\n2. 点击 Xcode\
  \ 屏幕底部附近的“对齐”图标，显示一个弹出窗口。\n3. 选中“在容器中水平居中”和“在容器中垂直居中”复选框。然后点击“添加 2 个约束”按钮。Xcode\
  \ 会将你的 `UILabel` 居中，并在屏幕中央显示加号，如图 13-6 所示。\n\n![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig5_HTML.jpg](img/469983_1_En_13_Fig5_HTML.jpg)\n\
  \n图 13-5 为 `UILabel` 中的文本定义大小\n\n1. 点击“添加 4 个约束”按钮，为 `ARSCNView` 定义约束。\n2. 将一个 `UILabel`\
  \ 拖放到 `ARSCNView` 上。\n3. 点击该 `UILabel`，然后点击“属性检查器”图标，或者选择 视图 ➤ 检查器 ➤ 显示属性检查器。\n\
  4. 在显示“标签”的文本框中点击，并输入一个加号（+）。按 Return 键。\n5. 点击字体弹出菜单最右侧出现的 T 图标。会显示一个弹出窗口，如图 13-5\
  \ 所示。\n\n![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig4_HTML.jpg](img/469983_1_En_13_Fig4_HTML.jpg)\n\
  \n图 13-4 为 `ARSCNView` 定义约束\n\n1. 在导航器窗格中点击 `ViewController.swift` 文件。\n2. 编辑 `ViewController.swift`\
  \ 文件，使其看起来像这样：\n\n```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController:\
  \ UIViewController, ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
  \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // 在此处执行任何额外的视图加载后设置，通常来自\
  \ nib 文件。\n    }\n}\n```\n\n3. 在导航器窗格中点击 `Main.storyboard` 文件。\n4. 拖放一个 `ARSCNView`\
  \ 并将其展开以填充整个视图。\n5. 点击 Xcode 屏幕底部附近的“添加新约束”图标。会显示一个弹出窗口。\n6. 确保顶部、底部、左侧和右侧边缘的值都为\
  \ 0。然后点击每个方向的约束，使其显示为红色，如图 13-4 所示。\n\n标签中加号的整个目的是为了向我们显示，当通过增强现实视图观看时，摄像头的中心在哪里。\n\
  \n下一步是将用户界面元素连接到 `ViewController.swift` 文件中的 Swift 代码。请按照以下步骤操作：\n\n1. 在导航器窗格中点击\
  \ `Main.storyboard` 文件。\n2. 点击“助理编辑器”图标，或选择 视图 ➤ 助理编辑器 ➤ 显示助理编辑器，以并排显示 `Main.storyboard`\
  \ 和 `ViewController.swift` 文件。\n3. 将鼠标指针移到 `ARSCNView` 上，按住 Control 键，然后将 Control\
  \ 键拖到 `class ViewController` 行下方。\n4. 松开 Control 键和鼠标左键。会出现一个弹出菜单。\n5. 在“名称”文本框中点击并输入\
  \ `sceneView`，然后点击“连接”按钮。Xcode 会创建一个 `IBOutlet`，如下所示：\n\n```\n@IBOutlet var sceneView:\
  \ ARSCNView!\n```\n\n6. 编辑 `viewDidLoad` 函数，使其看起来像这样：\n\n```\noverride func viewDidLoad()\
  \ {\n    super.viewDidLoad()\n    // 在此处执行任何额外的视图加载后设置，通常来自 nib 文件。\n    sceneView.debugOptions\
  \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n \
  \   sceneView.delegate = self\n    sceneView.session.run(configuration)\n    let\
  \ tapGesture = UITapGestureRecognizer(target: self, action: #selector(tapResponse))\n\
  \    sceneView.addGestureRecognizer(tapGesture)\n}\n```\n\n此时，我们添加了一个点击手势识别器，因此我们需要按照以下步骤编写一个函数来处理此点击手势：\n\
  \n1. 在导航器窗格中点击 `ViewController.swift` 文件。\n2. 在 `viewDidLoad` 函数下面输入以下内容：\n\n```\n\
  @objc func tapResponse(sender: UITapGestureRecognizer) {\n    print (\"已点击屏幕\")\n\
  }\n```\n\n如果你测试这个应用，你会看到加号作为一个微小的黑色十字准线出现在屏幕中央。这个中心就是我们想要用来定义现实世界中要测量的两个点的位置。目前，点击屏幕只会将“已点击屏幕”显示在\
  \ Xcode 的调试区域中。\n\n\n\n## 在现实世界中定义点\n\n为了让我们的尺子应用能够工作，我们需要在现实世界中定义两个点，然后测量它们之间的距离。这意味着要在现实世界中放置两个点，并存储这些点的位置。\n\
  \n每次用户点击屏幕时，我们希望显示一个小球体来定义现实世界中的一个点。然后用户需要将 iOS 设备对准另一个点并点击，以便应用能够测量这两个点之间的距离。\n\
  \n在 `tapResponse` 函数中，我们需要获取屏幕的中心点，也就是摄像头中心所指向的地方，即屏幕上出现加号的位置。为此，我们需要获取用户点击的场景并像这样确定中心点：\n\
  \n```\nlet scene = sender.view as! ARSCNView\nlet location = scene.center\n```\n\
  \n接下来，我们需要使用 `hitTest` 方法来识别摄像头所指向的一个特征点。特征点代表 ARKit 能够识别的现实世界表面，因此代码如下所示：\n\n```\n\
  let hitTestResults = scene.hitTest(location, types: .featurePoint)\n```\n\n只要 ARKit\
  \ 能够识别到一个特征点，我们就可以继续处理，因此我们需要一个如下的 `if` 语句：\n\n```\nif hitTestResults.isEmpty ==\
  \ false {\n}\n```\n\n在这个 `if` 语句内部，我们需要获取从 `hitTestResults` 常量中检索到的第一个元素：\n\n```\n\
  guard let hitTestResults = hitTestResults.first else { return }\n```\n\n一旦我们确定了摄像头指向的一个点，就可以创建一个绿色球体出现在该点上：\n\
  \n```\nlet sphereNode = SCNNode()\nsphereNode.geometry = SCNSphere(radius: 0.003)\n\
  sphereNode.geometry?.firstMaterial?.diffuse.contents = UIColor.green\n```\n\n要将绿色球体放置在摄像头中心指向的位置，我们需要通过其\
  \ `worldTransform` 属性（一个矩阵）来获取摄像头的 x、y 和 z 坐标。矩阵的第三列包含我们需要的位置，因此我们可以像这样定义绿色球体的位置：\n\
  \n```\nsphereNode.position = SCNVector3(hitTestResults.worldTransform.columns.3.x,\
  \ hitTestResults.worldTransform.columns.3.y, hitTestResults.worldTransform.columns.3.z)\n\
  ```\n\n最后，我们需要将球体添加到场景中，如下所示：\n\n```\nsceneView.scene.rootNode.addChildNode(sphereNode)\n\
  ```\n\n整个 `tapResponse` 函数应该如下所示：\n\n```\n@objc func tapResponse(sender: UITapGestureRecognizer)\
  \ {\n    let scene = sender.view as! ARSCNView\n    let location = scene.center\n\
  \    let hitTestResults = scene.hitTest(location, types: .featurePoint)\n    if\
  \ hitTestResults.isEmpty == false {\n        guard let hitTestResults = hitTestResults.first\
  \ else { return }\n        let sphereNode = SCNNode()\n        sphereNode.geometry\
  \ = SCNSphere(radius: 0.003)\n        sphereNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.green\n        sphereNode.position = SCNVector3(hitTestResults.worldTransform.columns.3.x,\
  \ hitTestResults.worldTransform.columns.3.y, hitTestResults.worldTransform.columns.3.z)\n\
  \        sceneView.scene.rootNode.addChildNode(sphereNode)\n    }\n}\n```\n\n如果你测试这个应用，你将能够将屏幕中央的加号指向任何真实物体，并点击屏幕来放置一个绿色球体。\n\
  \n## 测量虚拟物体之间的距离\n\n我们的尺子应用将定义在现实世界中检测到的两个特征点，显示绿色球体来标记它们的位置，然后计算这两个虚拟物体之间的距离。最后，它将在屏幕上显示结果。首先，我们需要使用一个\
  \ `SCNNode` 数组来跟踪这两个点：\n\n```\nvar realPoints = [SCNNode]()\n```\n\n这个数组将存储由绿色球体标识的两个特征点的位置。在增强现实视图中放置一个绿色球体后，我们需要使用\
  \ `append` 方法将该球体的位置存储到数组中，如下所示：\n\n```\nrealPoints.append(sphereNode)\n```\n\n\
  如果添加到增强现实视图中的球体数量恰好是两个，那么我们就可以计算这两个点之间的距离。如果添加的球体数量只有一个或零个，那么我们不需要做任何操作，因此我们需要一个\
  \ `if` 语句来统计数组中的球体数量，如下所示：\n\n```\nif realPoints.count == 2 {\n}\n```\n\n在这个 `if`\
  \ 语句内部，我们需要检索两个已存储的球体：\n\n```\nif realPoints.count == 2 {\n    let pointOne = realPoints.first!\n\
  \    let pointTwo = realPoints.last!\n}\n```\n\n这段代码会检索 `realPoints` 数组中存储的第一个和最后一个元素。现在，我们需要通过将第二个球体\
  \ (`pointTwo`) 的位置减去第一个球体 (`pointOne`) 的位置来获取 x、y 和 z 坐标：\n\n```\nif realPoints.count\
  \ == 2 {\n    let pointOne = realPoints.first!\n    let pointTwo = realPoints.last!\n\
  \    let x = pointTwo.position.x - pointOne.position.x\n    let y = pointTwo.position.y\
  \ - pointOne.position.y\n    let z = pointTwo.position.z - pointOne.position.z\n\
  }\n```\n\n我们可以使用这些 x、y 和 z 值来定义位置：\n\n```\nif realPoints.count == 2 {\n    let pointOne\
  \ = realPoints.first!\n    let pointTwo = realPoints.last!\n    let x = pointTwo.position.x\
  \ - pointOne.position.x\n    let y = pointTwo.position.y - pointOne.position.y\n\
  \    let z = pointTwo.position.z - pointOne.position.z\n    let position = SCNVector3(x,\
  \ y, z)\n}\n```\n\n现在我们可以使用勾股定理来计算距离。由于我们在三维空间中工作，我们需要使用 x、y 和 z 坐标来定义距离，如下所示：\n\
  \n![$$ distance=\\sqrt{x²+{y}²+{z}²} $$](img/469983_1_En_13_Chapter_TeX_Equa.png)\n\
  \n在 Swift 中，这个公式如下所示：\n\n```\nlet distance = sqrt(position.x * position.x + position.y\
  \ * position.y + position.z * position.z)\n```\n\n因此完整的 `if` 语句如下所示：\n\n```\nif\
  \ realPoints.count == 2 {\n    let pointOne = realPoints.first!\n    let pointTwo\
  \ = realPoints.last!\n    let x = pointTwo.position.x - pointOne.position.x\n  \
  \  let y = pointTwo.position.y - pointOne.position.y\n    let z = pointTwo.position.z\
  \ - pointOne.position.z\n    let position = SCNVector3(x, y, z)\n    let distance\
  \ = sqrt(position.x * position.x + position.y * position.y + position.z * position.z)\n\
  }\n```\n\n现在我们已经能够精确计算由增强现实视图中的绿色球体定义的两个点之间的距离，最后一步是在屏幕上显示结果。为此，我们可以创建 `SCNText`，它将文本作为虚拟对象显示。\n\
  \n我们希望将距离显示在两个绿色球体之间。为此，我们需要计算两个绿色球体之间的中点位置，以便显示距离结果。在 `if` 语句的末尾，我们需要像这样计算一个位置：\n\
  \n```\nlet x1 = (pointOne.position.x + pointTwo.position.x) / 2\nlet y1 = pointOne.position.y\
  \ + pointTwo.position.y\nlet z1 = pointOne.position.z + pointTwo.position.z\nlet\
  \ centerPosition = SCNVector3(x1, y1, z1)\n```\n\n然后，我们需要调用一个 `displayText` 函数，该函数接受两点之间的距离和一个位置，以将实际答案显示为虚拟文本：\n\
  \n```\ndisplayText(answer: distance, position: centerPosition)\n```\n\n这意味着我们需要创建一个\
  \ `displayText` 函数，该函数定义 `SCNText` 并将距离显示为在增强现实视图中漂浮的黄色文本。\n\n\n\n```swift\nfunc\
  \ displayText(answer: Float, position: SCNVector3) {\nlet textDisplay = SCNText(string:\
  \ \"\\(answer) meters\", extrusionDepth: 0.5)\ntextDisplay.firstMaterial?.diffuse.contents\
  \ = UIColor.yellow\nlet textNode = SCNNode()\ntextNode.geometry = textDisplay\n\
  textNode.position = position\ntextNode.scale = SCNVector3(0.003, 0.003, 0.003)\n\
  sceneView.scene.rootNode.addChildNode(textNode)\n}\n```\n\n整个`ViewController.swift`文件应如下所示：\n\
  \n```swift\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController: UIViewController,\
  \ ARSCNViewDelegate {\n@IBOutlet var sceneView: ARSCNView!\nvar realPoints = [SCNNode]()\n\
  let configuration = ARWorldTrackingConfiguration()\noverride func viewDidLoad()\
  \ {\nsuper.viewDidLoad()\n// Do any additional setup after loading the view, typically\
  \ from a nib.\nsceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
  sceneView.delegate = self\nsceneView.session.run(configuration)\nlet tapGesture\
  \ = UITapGestureRecognizer(target: self, action: #selector(tapResponse))\nsceneView.addGestureRecognizer(tapGesture)\n\
  }\n@objc func tapResponse(sender: UITapGestureRecognizer) {\nlet scene = sender.view\
  \ as! ARSCNView\nlet location = scene.center\nlet hitTestResults = scene.hitTest(location,\
  \ types: .featurePoint)\nif hitTestResults.isEmpty == false {\nguard let hitTestResults\
  \ = hitTestResults.first else { return }\nlet sphereNode = SCNNode()\nsphereNode.geometry\
  \ = SCNSphere(radius: 0.003)\nsphereNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.green\nsphereNode.position = SCNVector3(hitTestResults.worldTransform.columns.3.x,\
  \ hitTestResults.worldTransform.columns.3.y, hitTestResults.worldTransform.columns.3.z)\n\
  sceneView.scene.rootNode.addChildNode(sphereNode)\nrealPoints.append(sphereNode)\n\
  if realPoints.count == 2 {\nlet pointOne = realPoints.first!\nlet pointTwo = realPoints.last!\n\
  let x = pointTwo.position.x - pointOne.position.x\nlet y = pointTwo.position.y -\
  \ pointOne.position.y\nlet z = pointTwo.position.z - pointOne.position.z\nlet position\
  \ = SCNVector3(x, y, z)\nlet distance = sqrt(position.x * position.x + position.y\
  \ * position.y + position.z * position.z)\nlet x1 = (pointOne.position.x + pointTwo.position.x)\
  \ / 2\nlet y1 = pointOne.position.y + pointTwo.position.y\nlet z1 = pointOne.position.z\
  \ + pointTwo.position.z\nlet centerPosition = SCNVector3(x1, y1, z1)\ndisplayText(answer:\
  \ distance, position: centerPosition)\n}\n}\n}\nfunc displayText(answer: Float,\
  \ position: SCNVector3) {\nlet textDisplay = SCNText(string: \"\\(answer) meters\"\
  , extrusionDepth: 0.5)\ntextDisplay.firstMaterial?.diffuse.contents = UIColor.yellow\n\
  let textNode = SCNNode()\ntextNode.geometry = textDisplay\ntextNode.position = position\n\
  textNode.scale = SCNVector3(0.003, 0.003, 0.003)\nsceneView.scene.rootNode.addChildNode(textNode)\n\
  }\n}\n```\n\n要测试此应用，请按照以下步骤操作：\n\n1.  点击停止按钮，或选择产品（Product）➤ 停止（Stop）。\n\n![../images/469983_1_En_13_Chapter/469983_1_En_13_Fig7_HTML.jpg](img/469983_1_En_13_Fig7_HTML.jpg)\n\
  \n**图 13-7** 测量现实世界中的物体\n\n2.  通过 USB 数据线将 iOS 设备连接到 Macintosh。\n3.  点击运行按钮，或选择产品（Product）➤\
  \ 运行（Run）。\n4.  将屏幕中央的加号移动到要测量的物体（如铅笔、书籍或桌子）的角或尖端。\n5.  点击屏幕，放置第一个绿色球体。\n6.  将屏幕中央的加号移动到要测量物体的另一个角或尖端。\n\
  7.  点击屏幕，放置第二个绿色球体。此时应用将显示距离结果，如图 13-7 所示。\n\n## 总结\n\n增强现实将现实与虚拟对象结合在一起。为了营造虚拟物体能与现实世界互动的错觉，可以使用遮挡技术。通过在现实世界中放置不可见平面，遮挡可以产生一种错觉，即水平或垂直表面等真实物体实际上可以覆盖并隐藏虚拟物体。如果不放置不可见平面来阻挡用户视线，无论现实世界中存在什么物体看似遮挡，虚拟物体始终悬浮在半空中。\n\
  \n与现实世界互动的另一种方法是使用特征点来识别现实世界中的点。通过在这些真实点上放置虚拟对象，可以模仿使用虚拟对象测量两个真实点之间的距离。\n\n通过让虚拟物体看起来能与现实世界的物品进行交互，你可以为应用的用户创造更逼真的增强现实体验。\n\
  \n\n\n"
- "# 图像检测\n\nARKit 与现实世界交互的另一种方式是通过**图像检测**。图像检测涉及存储图像，然后在通过增强现实视图观看时，利用摄像头识别这些完全相同的图像。\n\
  \n图像检测与机器学习图像识别相似但又有不同。通过图像识别，应用可以识别从未见过的物品，例如不同款式的汽车、铅笔或电脑。而图像检测仅能识别已存储的图像。如果事先没有存储某张图像，图像检测就永远无法识别它。\n\
  \n图像检测非常实用，因为它能让应用识别一张固定图像，然后以不同方式做出响应，例如显示关于该图像的更多信息。举例来说，博物馆可能会提供一款增强现实应用，让用户将\
  \ iPhone 对准一幅画作。一旦应用识别出那幅画，它就能以用户的母语（如英语、西班牙语、阿拉伯语或日语）显示关于该画作的附加信息。\n\n为了学习图像检测，让我们按照以下步骤创建一个新的\
  \ Xcode 项目：\n\n1. 启动 Xcode。（请确保你使用的是 Xcode 10 或更高版本。）\n2. 选择“文件”➤“新建”➤“项目”。Xcode\
  \ 会要求你选择一个模板。\n3. 点击“iOS”类别。\n4. 点击“单视图应用”图标，然后点击“下一步”按钮。Xcode 会要求输入产品名称、组织名称、组织标识符和内容技术。\n\
  5. 点击“产品名称”文本字段，输入项目的描述性名称，例如`ImageDetection`。（具体名称不重要。）\n6. 点击“下一步”按钮。Xcode 会询问你希望将项目存储在哪里。\n\
  7. 选择一个文件夹，然后点击“创建”按钮。Xcode 会创建一个 iOS 项目。\n\n现在，按照以下步骤修改`Info.plist`文件，以允许访问摄像头并使用\
  \ ARKit：\n\n1. 在导航器面板中点击`Info.plist`文件。Xcode 会显示一个键、类型和值的列表。\n2. 点击展开三角形，展开“必需的设备功能”类别，以显示“项目\
  \ 0”。\n3. 将鼠标指针移动到“项目 0”上，显示一个加号（+）图标。\n4. 点击这个加号（+）图标，显示一个空白的“项目 1”。\n5. 在“项目 1”行的“值”类别下输入`arkit`。\n\
  6. 将鼠标指针移动到最后一行，显示一个加号（+）图标。\n7. 点击加号（+）图标以创建一个新行。会出现一个弹出菜单。\n8. 选择“隐私 - 相机使用说明”。\n\
  9. 在“隐私 - 相机使用说明”行的“值”类别下输入`AR 需要使用摄像头`。\n\n现在是时候按照以下步骤修改`ViewController.swift`文件以使用\
  \ ARKit 和 SceneKit 了：\n\n1. 在导航器面板中点击`ViewController.swift`文件。\n2. 编辑`ViewController.swift`文件，使其看起来像这样：\n\
  \n```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController: UIViewController,\
  \ ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
  \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // 在这里进行视图加载后的任何额外设置，通常来自\
  \ nib 文件\n    }\n}\n```\n\n为了在我们的应用中显示增强现实视图，需要添加一个`ARSCNView`，并将其扩展以填满整个用户界面。然后通过选择“编辑器”➤“解决自动布局问题”➤“重置为建议的约束”（位于菜单下半部分的“容器中的所有视图”类别下）来添加约束。\n\
  \n下一步是将用户界面元素连接到`ViewController.swift`文件中的 Swift 代码。为此，请按照以下步骤操作：\n\n1. 在导航器面板中点击`Main.storyboard`文件。\n\
  2. 点击“助理编辑器”图标，或选择“视图”➤“助理编辑器”➤“显示助理编辑器”，以并排显示`Main.storyboard`和`ViewController.swift`文件。\n\
  3. 将鼠标指针移动到`ARSCNView`上，按住 Control 键，然后从该类`ViewController`行下方 Ctrl-拖拽。\n4. 松开 Control\
  \ 键和鼠标左键。会出现一个弹出菜单。\n5. 点击“名称”文本字段，输入`sceneView`，然后点击“连接”按钮。Xcode 会创建一个`IBOutlet`，如下所示：\n\
  \n```\n@IBOutlet var sceneView: ARSCNView!\n```\n\n编辑`viewDidLoad`函数，使其看起来像这样：\n\
  \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    // 在这里进行视图加载后的任何额外设置，通常来自\
  \ nib 文件\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
  \    sceneView.delegate = self\n    sceneView.session.run(configuration)\n}\n```\n\
  \n\n\n## 存储图像\n\n在 ARKit 能够识别现实世界中的物理对象之前，你需要在应用中存储这些物品的图像。除了存储图像，你还必须指定该现实世界物品的宽度和高度。这样，当\
  \ ARKit 通过 iOS 设备的摄像头发现实际物品时，它就可以将该图像与存储的图像进行比较。如果外观和尺寸都匹配，那么 ARKit 就能识别出该现实世界物品。\n\
  \n首先，你必须捕获要检测物品的图像。由于这些图像需要高分辨率，你可以从互联网上获取公共领域的图像，例如 NASA 官网（`www.nasa.gov`）。然后，你可以将这些图像显示在电脑屏幕上，供\
  \ iOS 设备识别。当你的 Mac 上有了图像后，你需要将其存储到 Xcode 项目中。\n\n要存储一个或多个你希望 ARKit 识别的图像，请遵循以下步骤：\n\
  \n1.  点击宽度和高度文本字段，并输入实际物品的宽度和高度。你也可以点击单位弹出菜单，将默认的测量单位从米更改为其他单位，例如英寸或厘米。\n\n![images/469983_1_En_14_Chapter/469983_1_En_14_Fig2_HTML.jpg](img/469983_1_En_14_Fig2_HTML.jpg)\n\
  \n**图 14-2** 定义要识别物品的宽度和高度\n\n2.  将你希望 ARKit 在现实世界中识别的图像拖放到新添加的 AR 资源文件夹中。Xcode\
  \ 会在图像右下角显示一个黄色警告图标。\n\n3.  点击属性检查器图标，或选择 视图 ➤ 检查器 ➤ 显示属性检查器。将出现一个 AR 参考图像面板，如图\
  \ 14-2 所示。\n\n![images/469983_1_En_14_Chapter/469983_1_En_14_Fig1_HTML.jpg](img/469983_1_En_14_Fig1_HTML.jpg)\n\
  \n**图 14-1** 黄色平面遮挡了绿色盒子\n\n4.  在导航面板中点击 `Assets.xcassets` 文件夹。\n\n5.  点击面板底部的 +\
  \ 图标。将出现一个弹出菜单。\n\n6.  选择新建 AR 资源组，如图 14-1 所示。Xcode 会创建一个 AR 资源文件夹。\n\n一旦我们添加了期望\
  \ ARKit 识别的现实物品的一个或多个图像，就需要编写实际的 Swift 代码，使其在通过 iOS 设备摄像头检测到图像时进行识别。\n\n首先，我们需要访问包含要识别物品图像的文件夹。这个文件夹可以命名为任何名称，例如\"\
  AR Resources\"。这意味着要使用一个 `guard` 语句来验证图像文件夹是否存在，如下所示：\n\n```\nguard let storedImages\
  \ = ARReferenceImage.referenceImages(inGroupNamed: \"AR Resources\", bundle: nil)\
  \ else {\n    fatalError(\"Missing AR Resources images\")\n}\n```\n\n这段代码会查找名为 `AR\
  \ Resources` 的文件夹。如果找不到，程序将终止并显示\"Missing AR Resources Images\"。如果找到了 `AR Resources`\
  \ 文件夹，那么我们可以像这样定义检测到的图像的存储位置：\n\n```\nconfiguration.detectionImages = storedImages\n\
  ```\n\n最后，我们需要使用 `didAdd renderer` 函数，该函数在摄像头每次更新其视图时运行。如果摄像头检测到已识别的图像（`ARImageAnchor`），那么我们可以通过打印\
  \ `\"Item recognized\"` 来验证这一点，操作如下：\n\n```\nfunc renderer(_ renderer: SCNSceneRenderer,\
  \ didAdd node: SCNNode, for anchor: ARAnchor) {\n    if anchor is ARImageAnchor\
  \ {\n        print(\"Item recognized\")\n    }\n}\n```\n\n整个 `ViewController.swift`\
  \ 文件应如下所示：\n\n```\nimport UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController:\
  \ UIViewController, ARSCNViewDelegate {\n    @IBOutlet var sceneView: ARSCNView!\n\
  \    let configuration = ARWorldTrackingConfiguration()\n\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        // 加载视图后的其他设置（通常来自 nib 文件）\n        sceneView.debugOptions\
  \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n \
  \       sceneView.delegate = self\n\n        guard let storedImages = ARReferenceImage.referenceImages(inGroupNamed:\
  \ \"AR Resources\", bundle: nil) else {\n            fatalError(\"Missing AR Resources\
  \ images\")\n        }\n\n        configuration.detectionImages = storedImages\n\
  \        sceneView.session.run(configuration)\n    }\n\n    func renderer(_ renderer:\
  \ SCNSceneRenderer, didAdd node: SCNNode, for anchor: ARAnchor) {\n        if anchor\
  \ is ARImageAnchor {\n            print(\"Item recognized\")\n        }\n    }\n\
  }\n```\n\n要测试此应用，请将你拍摄并存储在 `AR Resources` 文件夹中的物品放置在桌子或地板上。然后按照以下步骤操作：\n\n1.  通过\
  \ USB 线缆将 iOS 设备连接到 Mac。\n\n2.  点击运行按钮，或选择 产品 ➤ 运行。首次运行此应用时，系统会请求访问摄像头的权限，请授予该权限。\n\
  \n3.  在你的电脑上加载存储在你的项目的 `AR Resources` 文件夹中的图片。\n\n4.  将 iOS 设备的摄像头对准显示你希望 ARKit\
  \ 识别的图片的屏幕。当 ARKit 识别出图像时，它会在 Xcode 的调试区域中显示 `\"Item recognized\"`。\n\n5.  点击停止按钮，或选择\
  \ 产品 ➤ 停止。\n\n\n\n## 检测多张图像\n\n仅识别单张图像会有局限性。因此，要让应用识别多张图像，只需在`AR Resources`文件夹中存储多张图像即可。现在，应用将能够识别不同的图像，并根据识别到的图像做出响应。\n\
  \n为了识别 ARKit 具体识别的是哪张图像，你可以为每张图像赋予一个唯一的名称。这样，每次应用识别到图像时，它就能检索该图像的名称，从而精确判断 iOS 设备摄像头前的是哪张图像。\n\
  \n当你在`AR Resources`文件夹中存储图像时，不仅需要定义其宽度和高度，还必须定义其名称。这个名称可以是任意描述性的文字，如图 14-3 所示。\n\
  \n![../images/469983_1_En_14_Chapter/469983_1_En_14_Fig3_HTML.jpg](img/469983_1_En_14_Fig3_HTML.jpg)\n\
  \n**图 14-3** 每张图像都需要一个唯一名称\n\n一旦你在`AR Resources`文件夹中添加了两张或更多图像，就可以通过检索已识别图像的`name`属性，来判断当前位于\
  \ iOS 设备摄像头前的是哪张图像。\n\n为了了解如何识别已识别的图像，让我们按照以下步骤修改`ImageDetection`项目：\n\n1.  将第二张图像拖放至`AR\
  \ Resources`文件夹中。确保为这第二张图像赋予一个唯一名称，这样存储的两张图像就拥有不同的名字。\n\n2.  在`class ViewController`一行下方，创建如下结构体：\n\
  \n```\nstruct Images {\n    var title: String\n    var info: String\n}\n```\n\n\
  3.  接着，创建一个空数组来存放这个结构体，如下所示：\n\n```\nvar imageArray: [Images] = []\n```\n\n4.  在`viewDidLoad`函数中，添加以下函数调用：\n\
  \n```\ngetData()\n```\n\n5.  在`ViewController.swift`文件的底部，编写如下`getData`函数。在本示例中，项目包含两张火箭图片，因此`getData`函数中的文本也相应体现这一点。当然，你也可以输入任何与你项目中存储的两张图像最匹配的文本：\n\
  \n```\nfunc getData() {\n    let item1 = Images(title: \"CRS-15 SpaceX rocket\"\
  , info: \"Commercial Resupply Service\")\n    let item2 = Images(title: \"Saturn\
  \ V rocket\", info: \"Apollo moon launch vehicle\")\n    imageArray.append(item1)\n\
  \    imageArray.append(item2)\n}\n```\n\n`getData`函数创建了两个结构体，并用文本填充了这些结构体的`title`和`info`属性。然后，它将这个结构体存入一个数组。现在我们需要使用每张图像的`name`属性来识别应用当前识别到的是哪张图像。\n\
  \n6.  编写以下`nodeFor renderer`函数：\n\n```\nfunc renderer(_ renderer: SCNSceneRenderer,\
  \ nodeFor anchor: ARAnchor) -> SCNNode? {\n    guard let imageAnchor = anchor as?\
  \ ARImageAnchor else { return nil }\n    switch imageAnchor.referenceImage.name\
  \ {\n    case \"CRS-15\":\n        print(imageArray[0].title)\n        print(imageArray[0].info)\n\
  \    case \"SaturnV\":\n        print(imageArray[1].title)\n        print(imageArray[1].info)\n\
  \    default:\n        print(\"Nothing found\")\n    }\n    return node\n}\n```\n\
  \n当识别到图像（`ARImageAnchor`）时，此函数会运行。然后，它使用已识别图像的`name`属性来决定显示哪条信息。整个`ViewController.swift`文件应如下所示：\n\
  \n```\nimport UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController: UIViewController,\
  \ ARSCNViewDelegate  {\n    @IBOutlet var sceneView: ARSCNView!\n    let configuration\
  \ = ARWorldTrackingConfiguration()\n    \n    struct Images {\n        var title:\
  \ String\n        var info: String\n    }\n    \n    var imageArray: [Images] =\
  \ []\n    \n    override func viewDidLoad() {\n        super.viewDidLoad()\n   \
  \     // Do any additional setup after loading the view, typically from a nib.\n\
  \        sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
  \        sceneView.delegate = self\n        \n        guard let storedImages = ARReferenceImage.referenceImages(inGroupNamed:\
  \ \"AR Resources\", bundle: nil) else {\n            fatalError(\"Missing AR Resources\
  \ images\")\n        }\n        configuration.detectionImages = storedImages\n \
  \       \n        getData()\n        sceneView.session.run(configuration)\n    }\n\
  \    \n    func renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for\
  \ anchor: ARAnchor) {\n        if anchor is ARImageAnchor {\n            print(\"\
  Item recognized\")\n        }\n    }\n    \n    func renderer(_ renderer: SCNSceneRenderer,\
  \ nodeFor anchor: ARAnchor) -> SCNNode? {\n        guard let imageAnchor = anchor\
  \ as? ARImageAnchor else { return nil }\n        switch imageAnchor.referenceImage.name\
  \ {\n        case \"CRS-15\":\n            print(imageArray[0].title)\n        \
  \    print(imageArray[0].info)\n        case \"SaturnV\":\n            print(imageArray[1].title)\n\
  \            print(imageArray[1].info)\n        default:\n            print(\"Nothing\
  \ found\")\n        }\n        let node = SCNNode()\n        node.addChildNode(planeNode)\n\
  \        return node\n    }\n    \n    func getData() {\n        let item1 = Images(title:\
  \ \"CRS-15 SpaceX rocket\", info: \"Commercial Resupply Service\")\n        let\
  \ item2 = Images(title: \"Saturn V rocket\", info: \"Apollo moon launch vehicle\"\
  )\n        imageArray.append(item1)\n        imageArray.append(item2)\n    }\n}\n\
  ```\n\n要测试此代码，请按以下步骤操作：\n\n1.  通过 USB 线将 iOS 设备连接到你的 Macintosh 电脑。\n\n2.  点击运行按钮，或选择\
  \ **产品 ➤ 运行**。\n\n3.  将 iOS 设备的摄像头对准存储在该应用`AR Resources`文件夹中的其中一张图像。\n\n4.  Xcode\
  \ 的调试区域会显示与你的图像相关的文本。\n\n5.  点击停止按钮，或选择 **产品 ➤ 停止**。\n\n\n\n## 在增强现实中显示信息\n\n目前，我们的应用仅将每张图片的信息显示在\
  \ Xcode 调试区中，用户是看不到的。我们真正需要做的是，获取每张已识别图片的信息，并在增强现实视图中将其显示出来。\n\n首先，我们需要确定应用所识别图片的边界。我们可以通过创建一个与识别图片精确等宽等高的平面来实现，具体操作如下：\n\
  \n```\nlet plane = SCNPlane(width: imageAnchor.referenceImage.physicalSize.width,\
  \ height: imageAnchor.referenceImage.physicalSize.height)\n```\n\n现在，我们需要为这个平面赋予颜色，以便我们能够看到它。稍后我们会将该平面设为透明，但现阶段，我们想确保这个平面能完全覆盖任何已识别的图片：\n\
  \n```\nplane.firstMaterial?.diffuse.contents = UIColor.yellow\n```\n\n接下来，我们需要创建一个节点来承载这个平面。由于这个平面会平铺显示，我们还需要将其旋转\
  \ -90 度，以便正面朝向摄像头：\n\n```\nlet planeNode = SCNNode()\nplaneNode.geometry = plane\n\
  let ninetyDegrees = GLKMathDegreesToRadians(-90)\nplaneNode.eulerAngles = SCNVector3(ninetyDegrees,\
  \ 0, 0)\n```\n\n最后，我们需要将这个 `planeNode` 添加到增强现实视图中：\n\n```\nlet node = SCNNode()\n\
  node.addChildNode(planeNode)\n```\n\n整个 `nodeFor renderer` 函数应该如下所示：\n\n```\nfunc\
  \ renderer(_ renderer: SCNSceneRenderer, nodeFor anchor: ARAnchor) -> SCNNode? {\n\
  \    guard let imageAnchor = anchor as? ARImageAnchor else { return nil }\n    let\
  \ plane = SCNPlane(width: imageAnchor.referenceImage.physicalSize.width, height:\
  \ imageAnchor.referenceImage.physicalSize.height)\n    plane.firstMaterial?.diffuse.contents\
  \ = UIColor.yellow\n    let planeNode = SCNNode()\n    planeNode.geometry = plane\n\
  \    let ninetyDegrees = GLKMathDegreesToRadians(-90)\n    planeNode.eulerAngles\
  \ = SCNVector3(ninetyDegrees, 0, 0)\n    switch imageAnchor.referenceImage.name\
  \ {\n    case \"CRS-15\":\n        print(imageArray[0].title)\n        print(imageArray[0].info)\n\
  \    case \"SaturnV\":\n        print(imageArray[1].title)\n        print(imageArray[1].info)\n\
  \    default:\n        print(\"Nothing found\")\n    }\n    return node\n}\nlet\
  \ node = SCNNode()\nnode.addChildNode(planeNode)\nreturn node\n}\n```\n\n如果你测试这段代码，你会发现，只要将\
  \ iOS 设备的摄像头对准应用能够识别的图片，它就会立即用黄色平面覆盖整张图片，如图 14-4 所示。尝试用不同尺寸的图片进行测试，你会发现黄色平面能正确识别其\
  \ `AR Resources` 文件夹中存储的每张图片的形状。\n\n![../images/469983_1_En_14_Chapter/469983_1_En_14_Fig4_HTML.jpg](img/469983_1_En_14_Fig4_HTML.jpg)\n\
  \n**图 14-4**  \n黄色平面完全覆盖了已识别的图片\n\n了解已识别图片尺寸的原因在于，我们可以在该图片的左下角正确显示文本。我们将基于之前创建的结构体来显示每张图片的标题和详细信息：\n\
  \n```\nstruct Images {\n    var title: String\n    var info: String\n}\n```\n\n\
  在编写更多代码之前，既然我们知道这个平面会完全覆盖任何已识别的图片，那我们就不再需要看到这个平面了，因此可以将其设为透明，如下所示：\n\n```\nplane.firstMaterial?.diffuse.contents\
  \ = UIColor.clear\n```\n\n尽管这个平面仍然存在，但它对用户是隐藏的。我们只需将这个平面用作参考，这样就能知道文本放置的位置。首先，我们想要将标题文本放置在每个已识别图片的右下角。这涉及到使用我们结构体中存储的标题文本创建\
  \ `SCNText`，为其定义 `flatness` 值为 0.1，以及设置字体大小为 10 磅，具体操作如下：\n\n```\nlet title = SCNText(string:\
  \ imageArray[0].title, extrusionDepth: 0.0)\ntitle.flatness = 0.1\ntitle.font =\
  \ UIFont.boldSystemFont(ofSize: 10)\n```\n\n现在，我们需要创建一个 `SCNNode`，将 `SCNText` 赋值给该节点，并将其颜色设置为白色，同时按比例缩小其尺寸：\n\
  \n```\nlet titleNode = SCNNode()\ntitleNode.geometry = title\ntitleNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.white\ntitleNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)\n```\n\n\
  你可以尝试使用 0.0015 之外的其他缩放值，直到获得你最喜欢的文本外观。最后，我们需要将这个标题文本相对于平面进行定位，并将其添加到 `planeNode`\
  \ 中，具体操作如下：\n\n```\ntitleNode.position.x = -Float(plane.width) / 2.2\ntitleNode.position.y\
  \ = -Float(plane.height) / 2.2\nplaneNode.addChildNode(titleNode)\n```\n\nx 和 y\
  \ 位置由平面的宽度和高度除以 2.2 定义。尝试不同的值，这样你就能了解更高或更低的值如何影响文本的位置。\n\n为每张图片显示详细信息文本的方式与此类似：\n\
  \n```\nlet info = SCNText(string: imageArray[0].info, extrusionDepth: 0.0)\ninfo.flatness\
  \ = 0.1\ninfo.font = UIFont.boldSystemFont(ofSize: 8)\nlet infoNode = SCNNode()\n\
  infoNode.geometry = info\ninfoNode.geometry?.firstMaterial?.diffuse.contents = UIColor.gray\n\
  infoNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)\ninfoNode.position.x = -Float(plane.width)\
  \ / 2.2\ninfoNode.position.y = -Float(plane.height) / 1.8\nplaneNode.addChildNode(infoNode)\n\
  ```\n\n整个 `ViewController.swift` 文件的内容应类似于以下内容，但你可以选择不同的文本来匹配你在 `AR Resources` 文件夹中存储的特定图片。\n\
  \n\n```swift\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController:\
  \ UIViewController, ARSCNViewDelegate  {\n@IBOutlet var sceneView: ARSCNView!\n\
  let configuration = ARWorldTrackingConfiguration()\nstruct Images {\nvar title:\
  \ String\nvar info: String\n}\nvar imageArray: [Images] = []\noverride func viewDidLoad()\
  \ {\nsuper.viewDidLoad()\n// 在加载视图后执行任何额外的设置，通常从 nib 文件加载\nsceneView.debugOptions\
  \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\nsceneView.delegate\
  \ = self\nguard let storedImages =  ARReferenceImage.referenceImages(inGroupNamed:\
  \ \"AR Resources\", bundle: nil) else {\nfatalError(\"缺少 AR Resources 图片\")\n}\n\
  configuration.detectionImages = storedImages\ngetData()\nsceneView.session.run(configuration)\n\
  }\nfunc renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:\
  \ ARAnchor) {\nif anchor is ARImageAnchor {\nprint(\"已识别物品\")\n}\n}\nfunc renderer(_\
  \ renderer: SCNSceneRenderer, nodeFor anchor: ARAnchor) -> SCNNode? {\nguard let\
  \ imageAnchor = anchor as? ARImageAnchor else { return nil }\nlet plane = SCNPlane(width:\
  \ imageAnchor.referenceImage.physicalSize.width, height: imageAnchor.referenceImage.physicalSize.height)\n\
  plane.firstMaterial?.diffuse.contents = UIColor.clear\nlet planeNode = SCNNode()\n\
  planeNode.geometry = plane\nlet ninetyDegrees = GLKMathDegreesToRadians(-90)\nplaneNode.eulerAngles\
  \ = SCNVector3(ninetyDegrees, 0, 0)\nswitch imageAnchor.referenceImage.name {\n\
  case \"CRS-15\":\nlet title = SCNText(string: imageArray[0].title, extrusionDepth:\
  \ 0.0)\ntitle.flatness = 0.1\ntitle.font = UIFont.boldSystemFont(ofSize: 10)\nlet\
  \ titleNode = SCNNode()\ntitleNode.geometry = title\ntitleNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.white\ntitleNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)\ntitleNode.position.x\
  \ = -Float(plane.width) / 2.2\ntitleNode.position.y = -Float(plane.height) / 2.2\n\
  planeNode.addChildNode(titleNode)\nlet info = SCNText(string: imageArray[0].info,\
  \ extrusionDepth: 0.0)\ninfo.flatness = 0.1\ninfo.font = UIFont.boldSystemFont(ofSize:\
  \ 8)\nlet infoNode = SCNNode()\ninfoNode.geometry = info\ninfoNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.gray\ninfoNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)\ninfoNode.position.x\
  \ = -Float(plane.width) / 2.2\ninfoNode.position.y = -Float(plane.height) / 1.8\n\
  planeNode.addChildNode(infoNode)\ncase \"SaturnV\":\nlet title = SCNText(string:\
  \ imageArray[1].title, extrusionDepth: 0.0)\ntitle.flatness = 0.1\ntitle.font =\
  \ UIFont.boldSystemFont(ofSize: 10)\nlet titleNode = SCNNode()\ntitleNode.geometry\
  \ = title\ntitleNode.geometry?.firstMaterial?.diffuse.contents = UIColor.white\n\
  titleNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)\ntitleNode.position.x = -Float(plane.width)\
  \ / 2.2\ntitleNode.position.y = -Float(plane.height) / 2.2\nplaneNode.addChildNode(titleNode)\n\
  let info = SCNText(string: imageArray[1].info, extrusionDepth: 0.0)\ninfo.flatness\
  \ = 0.1\ninfo.font = UIFont.boldSystemFont(ofSize: 8)\nlet infoNode = SCNNode()\n\
  infoNode.geometry = info\ninfoNode.geometry?.firstMaterial?.diffuse.contents = UIColor.gray\n\
  infoNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)\ninfoNode.position.x = -Float(plane.width)\
  \ / 2.2\ninfoNode.position.y = -Float(plane.height) / 1.8\nplaneNode.addChildNode(infoNode)\n\
  default:\nprint(\"未发现任何内容\")\n}\nlet node = SCNNode()\nnode.addChildNode(planeNode)\n\
  return node\n}\nfunc getData() {\nlet item1 = Images(title: \"CRS-15 SpaceX 火箭\"\
  , info: \"商业补给服务\")\nlet item2 = Images(title: \"土星五号火箭\", info: \"阿波罗登月运载火箭\")\n\
  imageArray.append(item1)\nimageArray.append(item2)\n}\n}\n```\n\n如果你运行这个应用，你会看到标题文本出现在图像的右下角，而信息文本则显示在下方，如图\
  \ 14-5 所示。\n\n![../images/469983_1_En_14_Chapter/469983_1_En_14_Fig5_HTML.jpg](img/469983_1_En_14_Fig5_HTML.jpg)\n\
  \n图 14-5\n\n在增强现实视图中显示文本\n\n## 总结\n\n图像检测的工作原理是将一张或多张图像存储在专门的`AR Resources`文件夹中，然后当\
  \ ARKit 识别到其中任何一张存储的图像时，利用 iOS 设备的摄像头运行多个渲染器函数。当你将图像拖放到`AR Resources`文件夹时，必须定义该图像的物理宽度和高度。此外，你还需要为每张图像赋予一个独特的名称，以便之后能使用该名称来识别\
  \ iOS 设备摄像头当前找到的是哪张被识别的图像。\n\n一旦你能够利用每张被识别图像的名称来指定具体识别了哪张图像，就可以在增强现实视图中显示与该图像相关的文本。这些文本可以出现在被识别图像的边界之内或之外。\n\
  \n图像检测在高分辨率图片上效果最佳。通过使用图像检测，你的增强现实应用可以响应真实世界中的物体，并以虚拟文本的形式提供关于该物体的信息，这些文本只有通过 iOS\
  \ 设备的摄像头才能看到。\n\n"
- "# 15. 显示视频和虚拟模型\n\n在第 14 章中，我们学习了如何使用图像检测来识别特定物品，然后通过显示与该图像相关的文本来进行响应。在本章中，我们将继续使用图像检测，但不再以虚拟对象的形式显示文本，而是学习如何显示视频或虚拟模型。\n\
  \n当在图像检测中使用视频时，用户可以将 iOS 设备的摄像头对准一张静态图像，增强现实视图会在该图像上显示一个视频。\n\n当在图像检测中使用虚拟模型时，用户可以将\
  \ iOS 设备的摄像头对准一张静态图像，并看到一个三维虚拟模型漂浮在图像前方的半空中。\n\n为了学习如何在图像检测中使用视频和虚拟模型，我们将修改在第 14\
  \ 章中创建的图像检测项目。你可以复制该项目，或者直接修改现有的代码。\n\n首先，让我们编辑项目中的代码，为添加显示视频和虚拟模型的代码腾出空间。删除`nodeFor\
  \ renderer`函数中`switch`语句内的所有代码，使其看起来像这样：\n\n```\nswitch imageAnchor.referenceImage.name\
  \ {\ncase \"CRS-15\":\nprint(\"第一张图片\")\ncase \"SaturnV\":\nprint(\"第二张图片\")\ndefault:\n\
  print(\"未发现任何内容\")\n}\n```\n\n现在我们需要将一个`.scn`文件拖放到我们的 Xcode 项目中。最简单的做法是选择“文件”➤“新建”➤“项目”来创建一个增强现实应用。这会创建一个示例增强现实应用，其中在`art.scnassets`文件夹内包含`ship.scn`\
  \ SceneKit 文件。\n\n将两个 Xcode 窗口并排放置，从示例增强现实项目的 Xcode 窗口中，将`ship.scn`及其附带的`texture.png`文件拖放到当前项目\
  \ Xcode 窗口的导航器窗格中。\n\n现在你还需要将一个`.mov`视频文件拖放到导航器窗格中。这个视频可以是任何你想要的，比如从你的 iPhone 上捕获的视频，或者从互联网上下载的视频文件。\n\
  \n当你将`ship.scn`和一个`.mov`文件都放入当前项目的导航器窗格后，点击每个文件，并确保在“目标成员”类别下选中了复选框，如图 15-1 所示。如果“目标成员”复选框未被选中，即使文件出现在导航器窗格中，Xcode\
  \ 也不会将其包含在当前项目中。\n\n![../images/469983_1_En_15_Chapter/469983_1_En_15_Fig1_HTML.jpg](img/469983_1_En_15_Fig1_HTML.jpg)\n\
  \n图 15-1\n\n必须为你的`.scn`和`.mp4`文件选中“目标成员”复选框\n\n\n## 在半空中显示虚拟对象\n\n目标是让 ARKit 使用图像检测来识别现实世界中的图像。一旦识别出图像，它便会在该图像前方显示一个虚拟对象。所有代码都将写在\
  \ `nodeFor(renderer:)` 函数中的 `switch` 语句内。要在识别图像后显示虚拟对象，请遵循以下步骤：\n\n1.  在 `switch`\
  \ 语句的第一个 `case` 中编写以下代码，以创建一个代表 `ship.scn` 虚拟对象的变量，具体如下：\n    ```\n    let item\
  \ = SCNScene(named: \"ship.scn\")\n    ```\n\n2.  现在，我们需要通过编写以下代码行来识别虚拟对象的父节点或根节点：\n\
  \    ```\n    let itemNode = item?.rootNode.childNode(withName: \"ship\", recursively:\
  \ true)\n    ```\n\n3.  接下来，我们需要通过从 `ARImageAnchor` 中获取位置，将虚拟对象节点放置在增强现实视图中：\n \
  \   ```\n    itemNode?.position = SCNVector3(anchor.transform.columns.3.x, anchor.transform.columns.3.y,\
  \ anchor.transform.columns.3.z)\n    sceneView.scene.rootNode.addChildNode(itemNode!)\n\
  \    ```\n\n到目前为止，代码会识别第一张图像，然后在半空中显示 `ship.scn`。然而，为了创造更有趣的视觉效果，我们还可以让虚拟对象旋转。\n\
  \n4.  在第 3 步的代码上方添加以下两行代码。以下代码定义了围绕 x、y 和 z 轴的旋转，并让此旋转动画永远持续：\n    ```\n    let\
  \ rotateMe = SCNAction.rotateBy(x: 0.5, y: 0.1, z: 0.2, duration: 1)\n    let repeatMe\
  \ = SCNAction.repeatForever(rotateMe)\n    itemNode?.runAction(repeatMe)\n    ```\n\
  \n![../images/469983_1_En_15_Chapter/469983_1_En_15_Fig2_HTML.jpg](img/469983_1_En_15_Fig2_HTML.jpg)\n\
  \n图 15-2 – 识别图像的根节点名称\n\n1.  在导航窗格中点击 `ship.scn` 文件。Xcode 会同时显示该图像以及构成该图像的节点列表，如图\
  \ 15-2 所示。`ship.scn` 文件的根节点名称是“ship”。\n\nx、y 和 z 轴的旋转值是任意的，因此，请随意尝试不同的值，以便观察它们如何改变虚拟对象的旋转。\n\
  \n整个 `ViewController.swift` 文件应如下所示：\n```\nimport UIKit\nimport SceneKit\nimport\
  \ ARKit\nclass ViewController: UIViewController, ARSCNViewDelegate  {\n@IBOutlet\
  \ var sceneView: ARSCNView!\nlet configuration = ARWorldTrackingConfiguration()\n\
  struct Images {\nvar title: String\nvar info: String\n}\nvar imageArray: [Images]\
  \ = []\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n// Do any additional\
  \ setup after loading the view, typically from a nib.\nsceneView.debugOptions =\
  \ [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\nsceneView.delegate\
  \ = self\nguard let storedImages =  ARReferenceImage.referenceImages(inGroupNamed:\
  \ \"AR Resources\", bundle: nil) else {\nfatalError(\"Missing AR Resources images\"\
  )\n}\nconfiguration.detectionImages = storedImages\ngetData()\nsceneView.session.run(configuration)\n\
  }\nfunc renderer(_ renderer: SCNSceneRenderer, nodeFor anchor: ARAnchor) -> SCNNode?\
  \ {\nguard let imageAnchor = anchor as? ARImageAnchor else { return nil }\nlet plane\
  \ = SCNPlane(width: imageAnchor.referenceImage.physicalSize.width, height: imageAnchor.referenceImage.physicalSize.height)\n\
  plane.firstMaterial?.diffuse.contents = UIColor.clear\nlet planeNode = SCNNode()\n\
  planeNode.geometry = plane\nlet ninetyDegrees = GLKMathDegreesToRadians(-90)\nplaneNode.eulerAngles\
  \ = SCNVector3(ninetyDegrees, 0, 0)\nswitch imageAnchor.referenceImage.name {\n\
  case \"CRS-15\":\nprint(\"1st image\")\nlet item = SCNScene(named: \"ship.scn\"\
  )\nlet itemNode = item?.rootNode.childNode(withName: \"ship\", recursively: true)\n\
  let rotateMe = SCNAction.rotateBy(x: 0.5, y: 0.1, z: 0.2, duration: 1)\nlet repeatMe\
  \ = SCNAction.repeatForever(rotateMe)\nitemNode?.runAction(repeatMe)\nitemNode?.position\
  \ = SCNVector3(anchor.transform.columns.3.x, anchor.transform.columns.3.y,anchor.transform.columns.3.z)\n\
  sceneView.scene.rootNode.addChildNode(itemNode!)\ncase \"SaturnV\":\nprint(\"2nd\
  \ image\")\ndefault:\nprint(\"Nothing found\")\n}\nlet node = SCNNode()\nnode.addChildNode(planeNode)\n\
  return node\n}\nfunc getData() {\nlet item1 = Images(title: \"CRS-15 SpaceX rocket\"\
  , info: \"Commercial Resupply Service\")\nlet item2 = Images(title: \"Saturn V rocket\"\
  , info: \"Apollo moon launch vehicle\")\nimageArray.append(item1)\nimageArray.append(item2)\n\
  }\n}\n```\n\n要测试此应用，请遵循以下步骤：\n\n1.  点击停止按钮，或选择“产品” ➤ “停止”。\n\n![../images/469983_1_En_15_Chapter/469983_1_En_15_Fig3_HTML.jpg](img/469983_1_En_15_Fig3_HTML.jpg)\n\
  \n图 15-3 – 当应用识别出第一张图像时，`ship.scn` 虚拟对象出现并旋转\n\n2.  通过 USB 线缆将 iOS 设备连接到你的 Macintosh。\n\
  3.  点击运行按钮，或选择“产品” ➤ “运行”。\n4.  在电脑上加载你存储在项目“AR Resources”文件夹中的第一张图片。\n5.  将 iOS\
  \ 设备的摄像头对准显示你想要 ARKit 识别的图片的屏幕。当 ARKit 识别出图像时，它会显示 `ship.scn` 虚拟对象，该对象会在空中缓慢旋转，如图\
  \ 15-3 所示。\n\n重复上述步骤，但将 iOS 设备的摄像头对准存储在“AR Resources”文件夹中的第二张图像。注意，第二个虚拟对象不会出现。\n\
  \n\n\n## 在平面上显示视频\n\n在检测到图像后，应用可以通过文本或显示虚拟对象来呈现附加信息。应用的另一种响应方式，是在检测到的图像上播放视频，使图像仿佛有了生命。\n\
  \n第一步是将任何视频文件转换为 QuickTime 的 `.mov` 格式。为此，只需加载 `QuickTime Player` 程序，并加载当前存储为其他格式（例如\
  \ `.mp4`）的视频文件。然后选择“文件”➤“导出”。选择一个视频分辨率，如 480p 或 720p，如图 15-4 所示。请注意，更高的分辨率意味着更大的视频文件大小。选择视频分辨率后，`QuickTime\
  \ Player` 会将视频保存为 QuickTime 影片。\n\n![../images/469983_1_En_15_Chapter/469983_1_En_15_Fig4_HTML.jpg](img/469983_1_En_15_Fig4_HTML.jpg)\n\
  \n**图 15-4** `QuickTime Player` 程序可以导出 QuickTime `.mov` 文件\n\n在尝试显示视频之前，我们需要确保能通过\
  \ iOS 设备的摄像头看到增强现实视图：\n\n```\nguard let currentFrame = sceneView.session.currentFrame\
  \ else { return nil }\n```\n\n要播放视频，我们可以使用一个名为 `SKVideoNode` 的 SceneKit 类，它可以加载\
  \ QuickTime `.mov` 文件并立即播放，如下所示：\n\n```\nlet videoNode = SKVideoNode(fileNamed:\
  \ \"SaturnV.mov\")\nvideoNode.play()\n```\n\n接下来，我们需要在一个 `SKScene` 类中定义这个 `videoNode`，在该类中定义视频大小、缩放比例（如\
  \ `aspectFill` 以保持原始视频的宽高比，无论其所在的平面大小如何），然后将该 `videoNode` 添加到 `SKScene` 中。最后，我们需要将\
  \ `videoNode` 定位在中间，如下所示：\n\n```\nlet videoScene = SKScene(size: CGSize(width: 640,\
  \ height: 480))\nvideoScene.scaleMode = .aspectFit\nvideoScene.addChild(videoNode)\n\
  videoNode.position = CGPoint(x: videoScene.size.width/2, y: videoScene.size.height/2)\n\
  ```\n\n现在，我们需要创建一个将覆盖在检测到的图像上的平面。该平面需要与检测到的图像尺寸完全相同，然后显示视频。视频还需要在平面的两侧播放，因为我们将要翻转这个平面：\n\
  \n```\nlet videoPlane = SCNPlane(width: imageAnchor.referenceImage.physicalSize.width,\
  \ height: imageAnchor.referenceImage.physicalSize.height)\nvideoPlane.firstMaterial?.diffuse.contents\
  \ = videoScene\nvideoPlane.firstMaterial?.isDoubleSided = true\n```\n\n现在，我们需要创建一个\
  \ `SCNNode` 来容纳该平面（它显示视频）。这个 `SCNNode` 将持有该平面，然后我们需要翻转该平面，并将其定位在覆盖检测到的图像的平面上方。最后，我们需要将该平面添加到\
  \ `planeNode` 上：\n\n```\nlet tvPlaneNode = SCNNode(geometry: videoPlane)\nvar translation\
  \ = matrix_identity_float4x4\ntranslation.columns.3.z = -1.0\ntvPlaneNode.simdTransform\
  \ = matrix_multiply(currentFrame.camera.transform, translation)\ntvPlaneNode.eulerAngles\
  \ = SCNVector3(Double.pi, 0, 0)\ntvPlaneNode.position = SCNVector3(0,0,0)\nplaneNode.addChildNode(tvPlaneNode)\n\
  ```\n\n完整的 `ViewController.swift` 文件应如下所示：\n\n```\nimport UIKit\nimport SceneKit\n\
  import ARKit\nclass ViewController: UIViewController, ARSCNViewDelegate  {\n@IBOutlet\
  \ var sceneView: ARSCNView!\nlet configuration = ARWorldTrackingConfiguration()\n\
  struct Images {\nvar title: String\nvar info: String\n}\nvar imageArray: [Images]\
  \ = []\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n// 在此处添加视图加载后的任何其他设置，通常从\
  \ nib 文件加载。\nsceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
  sceneView.delegate = self\nguard let storedImages =  ARReferenceImage.referenceImages(inGroupNamed:\
  \ \"AR Resources\", bundle: nil) else {\nfatalError(\"缺少 AR 资源图像\")\n}\nconfiguration.detectionImages\
  \ = storedImages\ngetData()\nsceneView.session.run(configuration)\n}\nfunc renderer(_\
  \ renderer: SCNSceneRenderer, nodeFor anchor: ARAnchor) -> SCNNode? {\nguard let\
  \ imageAnchor = anchor as? ARImageAnchor else { return nil }\nlet plane = SCNPlane(width:\
  \ imageAnchor.referenceImage.physicalSize.width, height: imageAnchor.referenceImage.physicalSize.height)\n\
  plane.firstMaterial?.diffuse.contents = UIColor.clear\nlet planeNode = SCNNode()\n\
  planeNode.geometry = plane\nlet ninetyDegrees = GLKMathDegreesToRadians(-90)\nplaneNode.eulerAngles\
  \ = SCNVector3(ninetyDegrees, 0, 0)\nswitch imageAnchor.referenceImage.name {\n\
  case \"CRS-15\":\nprint(\"第一张图片\")\nlet item = SCNScene(named: \"ship.scn\")\nlet\
  \ itemNode = item?.rootNode.childNode(withName: \"ship\", recursively: true)\nlet\
  \ rotateMe = SCNAction.rotateBy(x: 0.5, y: 0.1, z: 0.2, duration: 1)\nlet repeatMe\
  \ = SCNAction.repeatForever(rotateMe)\nitemNode?.runAction(repeatMe)\nitemNode?.position\
  \ = SCNVector3(anchor.transform.columns.3.x, anchor.transform.columns.3.y,anchor.transform.columns.3.z)\n\
  sceneView.scene.rootNode.addChildNode(itemNode!)\ncase \"SaturnV\":\nprint(\"第二张图片\"\
  )\nguard let currentFrame = sceneView.session.currentFrame else { return nil }\n\
  let videoNode = SKVideoNode(fileNamed: \"SaturnV.mov\")\nvideoNode.play()\nlet videoScene\
  \ = SKScene(size: CGSize(width: 640, height: 480))\nvideoScene.scaleMode = .aspectFit\n\
  videoScene.addChild(videoNode)\nvideoNode.position = CGPoint(x: videoScene.size.width/2,\
  \ y: videoScene.size.height/2)\nlet videoPlane = SCNPlane(width: imageAnchor.referenceImage.physicalSize.width,\
  \ height: imageAnchor.referenceImage.physicalSize.height)\nvideoPlane.firstMaterial?.diffuse.contents\
  \ = videoScene\nvideoPlane.firstMaterial?.isDoubleSided = true\nlet tvPlaneNode\
  \ = SCNNode(geometry: videoPlane)\nvar translation = matrix_identity_float4x4\n\
  translation.columns.3.z = -1.0\ntvPlaneNode.simdTransform = matrix_multiply(currentFrame.camera.transform,\
  \ translation)\ntvPlaneNode.eulerAngles = SCNVector3(Double.pi, 0, 0)\ntvPlaneNode.position\
  \ = SCNVector3(0,0,0)\nplaneNode.addChildNode(tvPlaneNode)\ndefault:\nprint(\"未发现任何内容\"\
  )\n}\nlet node = SCNNode()\nnode.addChildNode(planeNode)\nreturn node\n}\nfunc getData()\
  \ {\nlet item1 = Images(title: \"CRS-15 SpaceX 火箭\", info: \"商业补给服务\")\nlet item2\
  \ = Images(title: \"土星五号火箭\", info: \"阿波罗月球发射运载火箭\")\nimageArray.append(item1)\n\
  imageArray.append(item2)\n}\n}\n```\n\n要测试此代码，请按照以下步骤操作：\n\n1. 通过 USB 线缆将 iOS 设备连接到\
  \ Macintosh 电脑。\n2. 点击“运行”按钮，或选择“产品”➤“运行”。\n3. 在电脑屏幕上显示一张存储在应用 `AR Resources` 文件夹中的图像。\n\
  4. 将 iOS 设备的摄像头对准存储在应用 `AR Resources` 文件夹中的一张图像。\n5. 视频开始在检测到的图像上播放。请注意，视频大小与检测到的图像大小相同。\n\
  6. 点击“停止”按钮，或选择“产品”➤“停止”。\n\n## 总结\n\n图像检测可以识别出已识别的图像，但应用仍需一种方式来响应用户并提供更多信息。在许多情况下，显示文本是合适的，但提供附加信息的另外两种方式是通过显示虚拟对象或播放视频。\n\
  \n显示虚拟对象可以提供物品的三维视图，同时使用动画让增强现实视图变得生动。显示视频可以使检测到的图像从静态图像变为提供进一步信息的视频。\n\n虚拟对象和视频只是增强现实针对检测到图像进行响应并提供特定图像附加信息的两种方式。\n\
  \n\n\n"
- "# 16. 图像跟踪与物体检测\n\n在前面的章节中，我们学习了图像检测技术。它能够让应用识别存储在 `AR Resources` 文件夹中的图像，并在 iOS\
  \ 设备摄像头识别到现实世界中的该图像时做出响应。图像检测适用于图片和照片等二维物品，但 ARKit 2.0 和 iOS 12 在图像检测基础上增加了两项新功能：**图像跟踪**和**物体检测**。\n\
  \n目前的图像检测技术是通过将文本、虚拟物体或视频链接到被检测图像的位置来实现的。但是，如果被检测的图像发生了移动，那么所显示的文本、虚拟物体或视频并不会随之移动。正因如此，ARKit\
  \ 2.0 推出了图像跟踪功能，它允许文本、虚拟物体或视频随着被检测图像的移动而移动。\n\n尽管图像检测功能令人印象深刻，但它仅限于图片或照片等二维物品。为了克服这个限制，ARKit\
  \ 2.0 提供了物体检测功能。首先，你可以扫描一个三维物体。然后，你可以将这个三维物体的扫描数据存储在你的增强现实应用中。\n\n一旦用户扫描到同一个物品，增强现实应用就能识别出这个三维物体，并像图像检测一样，通过显示文本、虚拟物体或视频来做出响应。图像检测针对的是二维平面物品，而物体检测则针对三维物体，这使得用户无论从\
  \ iOS 摄像头的哪个位置或角度，都能获取到该物体的相关信息。\n\n在本章中，让我们按照以下步骤创建一个新的 Xcode 项目：\n\n1.  启动 Xcode。（请确保你使用的是\
  \ Xcode 10 或更高版本。）\n2.  选择“文件”➤“新建”➤“项目”。Xcode 会要求你选择一个模板。\n3.  点击 iOS 类别。\n4. \
  \ 点击“单视图应用”图标，然后点击“下一步”按钮。Xcode 会要求输入产品名称、组织名称、组织标识符以及内容技术。\n5.  点击“产品名称”文本框，为你的项目输入一个描述性名称，例如\
  \ `ImageTracking`。（具体的名称不重要。）\n6.  点击“下一步”按钮。Xcode 会询问你项目的存储位置。\n7.  选择一个文件夹，然后点击“创建”按钮。Xcode\
  \ 会创建一个 iOS 项目。\n\n现在，按照以下步骤修改 `Info.plist` 文件，以允许访问摄像头并使用 ARKit：\n\n1.  在导航窗格中点击\
  \ `Info.plist` 文件。Xcode 会显示一个包含键、类型和值的列表。\n2.  点击展开三角标，展开“所需设备功能”类别，以显示 Item 0。\n\
  3.  将鼠标指针移动到 Item 0 上，显示一个加号（+）图标。\n4.  点击这个加号（+）图标，显示一个空白的 Item 1。\n5.  在 Item\
  \ 1 行的“值”类别下输入 `arkit`。\n6.  将鼠标指针移动到最后一行上，显示一个加号（+）图标。\n7.  点击加号（+）图标创建一个新行。会弹出一个菜单。\n\
  8.  选择“隐私 - 相机使用说明”。\n9.  在“隐私 - 相机使用说明”行的“值”类别下输入 `AR 需要使用摄像头`。\n\n现在，是时候按照以下步骤修改\
  \ `ViewController.swift` 文件来使用 ARKit 和 SceneKit 了：\n\n1.  在导航窗格中点击 `ViewController.swift`\
  \ 文件。\n2.  编辑 `ViewController.swift` 文件，使其内容如下：\n\n```\n    import UIKit\n    import\
  \ SceneKit\n    import ARKit\n    class ViewController: UIViewController, ARSCNViewDelegate\
  \ {\n    let configuration = ARImageTrackingConfiguration()\n    override func viewDidLoad()\
  \ {\n    super.viewDidLoad()\n    // 在此处执行视图加载后的任何额外设置，通常从 nib 文件加载。\n    }\n  \
  \  }\n```\n\n需要注意的最重要的一行是定义了 `ARImageTrackingConfiguration` 的那一行：\n\n```\nlet configuration\
  \ = ARImageTrackingConfiguration()\n```\n\n之前，我们只定义过 `ARWorldTrackingConfiguration`，但我们需要\
  \ `ARImageTrackingConfiguration` 来让我们的增强现实应用在检测到的图像移动时对其进行跟踪。\n\n要在我们的应用中查看增强现实效果，请添加一个\
  \ ARKit SceneKit 视图（`ARSCNView`），使其充满整个视图。设计好用户界面后，需要添加约束。要添加约束，请选择“编辑器”➤“解决自动布局问题”➤“重置为建议的约束”，该选项位于菜单底部“容器中的所有视图”类别下。\n\
  \n下一步是将用户界面元素连接到 `ViewController.swift` 文件中的 Swift 代码。为此，请遵循以下步骤：\n\n1.  在导航窗格中点击\
  \ `Main.storyboard` 文件。\n2.  点击助理编辑器图标，或者选择“视图”➤“助理编辑器”➤“显示助理编辑器”，以便并排显示 `Main.storyboard`\
  \ 和 `ViewController.swift` 文件。\n3.  将鼠标指针移动到 `ARSCNView` 上，按住 Control 键，然后从 `class\
  \ ViewController` 行下方开始 Control-拖拽。\n4.  释放 Control 键和鼠标左键。会弹出一个菜单。\n5.  点击“名称”文本框，输入\
  \ `sceneView`，然后点击“连接”按钮。Xcode 会创建一个 `IBOutlet`，如下所示：\n\n```\n    @IBOutlet var\
  \ sceneView: ARSCNView!\n```\n\n6.  编辑 `viewDidLoad` 函数，使其内容如下：\n\n```\n    override\
  \ func viewDidLoad() {\n    super.viewDidLoad()\n    // 在此处执行视图加载后的任何额外设置，通常从 nib\
  \ 文件加载。\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
  \    sceneView.delegate = self\n    sceneView.session.run(configuration)\n    }\n\
  ```\n\n请记住，只有在你将物品的图像存储到应用中之后，ARKit 才能识别现实世界中的实物。除了存储图像，你还必须指定该实物在现实世界中的宽度和高度。这样，当\
  \ ARKit 通过 iOS 设备的摄像头发现实际物品时，它可以将其图像与存储的图像进行比较。如果外观和尺寸都匹配，那么 ARKit 就能识别出这个实物。\n\n\
  首先，你必须捕捉要检测物品的图像。由于这些图像需要高分辨率，你可以从互联网上获取公有领域的图像，例如从 NASA（`www.nasa.gov`）获取。然后，你可以将这些图像显示在笔记本电脑或\
  \ iPad 屏幕上，供你的 iOS 设备识别。\n\n要按照以下步骤存储一个或多个希望 ARKit 识别的图像：\n\n1.  在“宽度”和“高度”文本框中点击并输入实物的实际宽度和高度。你也可以点击“单位”弹出菜单，将默认的测量单位从米更改为其他单位，例如英寸或厘米。\n\
  \n![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig1_HTML.jpg](img/469983_1_En_16_Fig1_HTML.jpg)\n\
  \n图 16-1 定义待识别物品的宽度和高度\n\n2.  在导航窗格中点击 `Assets.xcassets` 文件夹。\n3.  点击窗格底部的加号（+）图标。会弹出一个菜单。\n\
  4.  选择“新建 AR 资源组”。Xcode 会创建一个 `AR Resources` 文件夹。\n5.  拖拽你希望 ARKit 在现实世界中识别的图像到该文件夹中。Xcode\
  \ 会在图像右下角显示一个黄色警告图标。\n6.  点击属性检查器图标，或者选择“视图”➤“检查器”➤“显示属性检查器”。会出现一个“AR 参考图像”窗格，如图\
  \ 16-1 所示。\n\n一旦我们添加了一个或多个希望 ARKit 识别的实物图像，就需要编写实际的 Swift 代码，以便在通过 iOS 设备摄像头发现图像时进行识别。\n\
  \n首先，我们需要访问包含待识别物品图像的文件夹。这个文件夹可以任意命名，例如 `AR Resources`。这意味着需要使用一个 `guard` 语句来验证图像文件夹是否存在，如下所示：\n\
  \n```\nguard let storedImages =  ARReferenceImage.referenceImages(inGroupNamed:\
  \ \"AR Resources\", bundle: nil) else {\nfatalError(\"缺少 AR Resources 图像\")\n}\n\
  ```\n\n\n\n该代码会查找名为`AR Resources`的文件夹。如果未能找到，程序会终止并显示`\"Missing AR Resources images\"\
  `。若找到`AR Resources`文件夹，我们便可以定义检测到的图像存储位置，如下所示：\n\n```\nconfiguration.trackingImages\
  \ = storedImages\n```\n\n请注意，这行代码使用的是`trackingImages`而非`detectionImages`。使用`detectionImages`时，只有当图像保持静止时应用才能识别。而使用`trackingImages`，如果被检测图像发生移动，应用也能随之追踪。\n\
  \n最后，我们需要使用`didAdd renderer`函数，该函数在摄像头每次更新视图时运行。如果摄像头检测到已识别的图像（`ARImageAnchor`），我们就要在被检测图像附近显示一个虚拟物体。\n\
  \n在前面示例中，我们通过将虚拟物体附加到场景的`rootNode`上来向检测到的图像显示虚拟物体，方式如下：\n\n```\nsceneView.scene.rootNode.addChildNode(objectNode)\n\
  ```\n\n然而，这会将虚拟物体绑定到增强现实视图中的特定位置。我们期望的是将虚拟物体绑定到检测到的图像上，如下所示：\n\n```\nnode.addChildNode(objectNode)\n\
  ```\n\n这样一来，如果被检测图像移动，虚拟物体也会随之移动。要检测和追踪已存储的图像，我们需要使用`didAdd renderer`函数。首先，要确保我们将检测到的存储图像识别为`ARImageAnchor`，具体做法如下：\n\
  \n```\nfunc renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:\
  \ ARAnchor) {\nif anchor is ARImageAnchor {\n}\n}\n```\n\n然后，我们可以创建一个虚拟物体，使其出现在检测到的图像上方。在本示例中，我们将按如下方式创建文本：\n\
  \n```\nlet movingImage = SCNText(string: \"Moving Text\", extrusionDepth: 0.0)\n\
  movingImage.flatness = 0.1\nmovingImage.font = UIFont.boldSystemFont(ofSize: 10)\n\
  ```\n\n接下来，我们需要将这个`SCNText`存储在一个节点中，因此需通过定义颜色和缩放来定义节点：\n\n```\nlet titleNode = SCNNode()\n\
  titleNode.geometry = movingImage\ntitleNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.white\ntitleNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)\n```\n\n\
  然后，我们只需将包含`SCNText`的节点添加到检测到的图像上：\n\n```\nnode.addChildNode(titleNode)\n```\n\n\
  完整的`ViewController.swift`文件应如下所示：\n\n```\nimport UIKit\nimport SceneKit\nimport\
  \ ARKit\nclass ViewController: UIViewController, ARSCNViewDelegate {\n@IBOutlet\
  \ var sceneView: ARSCNView!\nlet configuration = ARImageTrackingConfiguration()\n\
  override func viewDidLoad() {\nsuper.viewDidLoad()\n// 在加载视图后，进行任何额外的设置，通常是从 nib\
  \ 文件加载。\nsceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
  sceneView.delegate = self\nguard let storedImages =  ARReferenceImage.referenceImages(inGroupNamed:\
  \ \"AR Resources\", bundle: nil) else {\nfatalError(\"Missing AR Resources images\"\
  )\n}\nconfiguration.trackingImages = storedImages\nsceneView.session.run(configuration)\n\
  }\nfunc renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:\
  \ ARAnchor) {\nif anchor is ARImageAnchor {\nlet movingImage = SCNText(string: \"\
  Moving Text\", extrusionDepth: 0.0)\nmovingImage.flatness = 0.1\nmovingImage.font\
  \ = UIFont.boldSystemFont(ofSize: 10)\nlet titleNode = SCNNode()\ntitleNode.geometry\
  \ = movingImage\ntitleNode.geometry?.firstMaterial?.diffuse.contents = UIColor.white\n\
  titleNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)\nnode.addChildNode(titleNode)\n\
  }\n}\n}\n```\n\n要测试此应用，请将你已拍照并存储在`AR Resources`文件夹中的物品，放在笔记本电脑或 iPad 上展示，并将这些设备置于桌子或地板上。然后按照以下步骤操作：\n\
  \n1. 移动正在显示已检测图像的笔记本电脑或 iPad 屏幕。注意，移动检测图像时，虚拟物体（`\"Moving Text\"`）会随之移动，始终保持与检测图像的距离和方向一致。\n\
  \n2. 点击“停止”按钮，或选择“产品”>“停止”。\n\n![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig2_HTML.jpg](img/469983_1_En_16_Fig2_HTML.jpg)\n\
  \n图 16-2\n\n即使移动检测图像，文本仍在检测到的图像上方显示。\n\n3. 通过 USB 线将 iOS 设备连接到 Macintosh。\n\n4.\
  \ 点击“运行”按钮，或选择“产品”>“运行”。首次运行此应用时，会请求访问摄像头的权限，请授予权限。\n\n5. 使用你存储在项目`AR Resources`文件夹中的图片，在笔记本电脑或\
  \ iPad 屏幕上显示该图片。\n\n6. 将 iOS 设备的摄像头对准显示该图片的屏幕，以便 ARKit 识别。当 ARKit 识别出图像时，它会在检测到的图像上方显示文本`\"\
  Moving Text\"`，如图 16-2 所示。\n\n## 检测物体\n\n在图像检测中，我们需要将应用要检测的实际图像存储在一个专门的`AR Resources`文件夹中。物体检测的工作原理与此类似，区别在于物体检测不是存储单张图像，而是将物体的三维空间特征存储在`AR\
  \ Resources`文件夹中。要获取日后要检测的物体的三维空间特征，我们必须提前扫描该图像，并将扫描得到的图像表示存储在应用中。\n\n要在应用中启用物体检测，必须遵循以下步骤：\n\
  \n1. 使用苹果的扫描应用扫描你希望应用检测的物体。这会将该物体的三维空间表示存储为`.arobject`文件格式。\n\n2. 将这个`.arobject`文件存储在你自己的应用的`AR\
  \ Resources`文件夹中。\n\n3. 编写 Swift 代码，使应用在检测到由`.arobject`文件定义的物体时做出响应。\n\n\n\n## 扫描对象\n\
  \n你的应用检测物体的能力，其质量取决于事先对该物体的准确扫描。进行扫描需要使用一台运行**iOS 12**且至少配备**A9 处理器**的设备（iPhone\
  \ 6s、iPhone 6s Plus、iPhone SE 以及 2017 款 iPad）。设备越新（摄像头分辨率更高、处理器速度更快等），扫描捕获的参考数据质量就越好。\n\
  \n为了提高扫描精度，请将你想要检测的物体放在一个平坦且无任何其他物品的表面上。这样扫描就能仅专注于你想要的检测对象。\n\n首先，你需要在 iOS 12 设备上安装\
  \ Apple 的 ARKit Scanner 应用。要获取此 ARKit Scanner 应用，请按照以下步骤操作：\n\n1.  访问 `https://developer.apple.com/documentation/arkit/scanning_and_detecting_3d_objects`\
  \ 并下载 `ScanningApp`，其中包含 Swift 源代码。\n2.  在 Xcode 中打开这个 `ScanningApp` 项目。\n3.  使用\
  \ USB 线将 iOS 12 设备连接到你的 Macintosh 电脑。\n4.  点击“运行”按钮或选择“产品”➤“运行”。这会将 ARKit Scanner\
  \ 应用安装到你的 iOS 设备上。\n5.  点击“停止”按钮或选择“产品”➤“停止”。此时，你可以断开 iOS 12 设备与 Macintosh 的连接。\n\
  \n一旦你在 iOS 12 设备上安装了 Apple 的 ARKit Scanner，就可以开始扫描物体了。要扫描一个项目，请按照以下步骤操作：\n\n1. \
  \ 将你想要应用检测的物体放在一个平坦、光线良好且无其他物品的表面上。\n2.  在 iOS 12 设备上运行 ARKit Scanner 应用。\n3.  将\
  \ iOS 设备的摄像头对准物体，直到一个卡通样式的边界框包围住你想要检测的物体，如图 16-3 所示。\n\n![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig3_HTML.jpg](img/469983_1_En_16_Fig3_HTML.jpg)\n\
  \n图 16-3：边界框定义了待检测物体的区域\n\n4.  当物体出现在边界框内并居中时，点击“下一步”按钮。ARKit Scanner 应用会在物体周围显示边界框以及关于该物体的测量信息，如图\
  \ 16-4 所示。\n\n![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig4_HTML.jpg](img/469983_1_En_16_Fig4_HTML.jpg)\n\
  \n图 16-4：边界框包围了你要检测的物体\n\n5.  点击“扫描”按钮并围绕物体移动。当你移动时，应用会在边界框的侧面和顶部显示黄色平面，以提示它可以检测到的角度，如图\
  \ 16-5 所示。目标是移动你的 iOS 设备摄像头，覆盖物体的所有侧面和顶部，直到黄色平面完全覆盖整个边界框。\n\n![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig5_HTML.jpg](img/469983_1_En_16_Fig5_HTML.jpg)\n\
  \n图 16-5：当你扫描物体时，黄色平面会显示你已经扫描过的区域\n\n6.  当黄色平面完全覆盖边界框的所有侧面时，点击“完成”按钮。ARKit Scanner\
  \ 应用现在会显示检测到的物体的原点，您可以根据需要移动它，如图 16-6 所示。\n\n![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig6_HTML.jpg](img/469983_1_En_16_Fig6_HTML.jpg)\n\
  \n图 16-6：扫描物体后，你可以移动它的原点\n\n7.  通过在原点上滑动手指来移动原点，然后点击“测试”按钮。\n8.  将物体移动到一个新位置，并将\
  \ iOS 设备的摄像头对准它，以确保 ARKit Scanner 应用能够识别该物体，如图 16-7 所示。\n\n![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig7_HTML.jpg](img/469983_1_En_16_Fig7_HTML.jpg)\n\
  \n图 16-7：测试物体检测是否成功\n\n9.  在你的 Macintosh 上，打开一个 Finder 窗口并选择“前往”➤“隔空投送”以打开一个隔空投送窗口，如图\
  \ 16-8 所示。\n\n![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig8_HTML.jpg](img/469983_1_En_16_Fig8_HTML.jpg)\n\
  \n图 16-8：在 Macintosh 上开启隔空投送\n\n10. 在 ARKit Scanner 界面中点击“共享”按钮。会弹出一个窗口，让你选择如何共享\
  \ `.arobject` 文件，如图 16-9 所示。\n\n![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig9_HTML.jpg](img/469983_1_En_16_Fig9_HTML.jpg)\n\
  \n图 16-9：从 iOS 设备访问隔空投送\n\n11. 点击代表你 Macintosh 的顶部灰色圆形图标，将 `.arobject` 文件传输到 Macintosh\
  \ 的 `Downloads`（下载）文件夹中。\n\n\n\n### 在应用中检测物体\n\n将 `.arobject` 文件传输到 Mac 后，您需要创建一个能检测该文件中捕捉到的物体的应用。请按照以下步骤创建一个新的\
  \ Xcode 项目来检测物体：\n\n1. 启动 Xcode。（请确保使用的是 Xcode 10 或更高版本。）\n2. 选择 **File** ➤ **New**\
  \ ➤ **Project**。Xcode 会要求您选择一个模板。\n3. 点击 **iOS** 分类。\n4. 点击 **Single View App**\
  \ 图标，然后点击 **Next** 按钮。Xcode 会要求您填写产品名称、组织名称、组织标识符和内容技术。\n5. 在 **Product Name** 文本框中点击，然后输入一个描述性项目名称，例如\
  \ `ObjectDetection`。（具体名称无关紧要。）\n6. 点击 **Next** 按钮。Xcode 会询问您希望将项目存储在哪里。\n7. 选择一个文件夹，然后点击\
  \ **Create** 按钮。Xcode 会创建一个 iOS 项目。\n\n现在，按照以下步骤修改 `Info.plist` 文件以允许访问摄像头并使用 ARKit：\n\
  \n1. 在导航面板中点击 `Info.plist` 文件。Xcode 会显示键、类型和值的列表。\n2. 点击展开三角形以展开 **Required Device\
  \ Capabilities** 类别，显示 **Item 0**。\n3. 将鼠标指针移到 **Item 0** 上以显示加号 (+) 图标。\n4. 点击此加号\
  \ (+) 图标以显示空白的 **Item 1**。\n5. 在 **Item 1** 行的 **Value** 类别下输入 `arkit`。\n6. 将鼠标指针移到最后一行以显示加号\
  \ (+) 图标。\n7. 点击加号 (+) 图标以创建一个新行。会出现一个弹出菜单。\n8. 选择 **Privacy – Camera Usage Description**。\n\
  9. 在 **Privacy – Camera Usage Description** 行的 **Value** 类别下输入 `AR needs to use\
  \ the camera`。\n\n现在，按照以下步骤修改 `ViewController.swift` 文件以使用 ARKit 和 SceneKit：\n\n\
  1. 在导航面板中点击 `ViewController.swift` 文件。\n2. 编辑 `ViewController.swift` 文件，使其内容如下：\n\
  \n```swift\nimport UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController:\
  \ UIViewController, ARSCNViewDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
  \    \n    override func viewDidLoad() {\n        super.viewDidLoad()\n        //\
  \ Do any additional setup after loading the view, typically from a nib.\n    }\n\
  }\n```\n\n为了在应用中查看增强现实，添加一个单一的 **ARKit SceneKit View**（`ARSCNView`），使其填满整个视图。设计好用户界面后，需要添加约束。要添加约束，请选择\
  \ **Editor** ➤ **Resolve Auto Layout Issues** ➤ **Reset to Suggested Constraints**，该选项位于菜单下半部分的\
  \ **All Views in Container** 类别下。\n\n下一步是将用户界面项连接到 `ViewController.swift` 文件中的 Swift\
  \ 代码。请按照以下步骤操作：\n\n![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig10_HTML.jpg](img/469983_1_En_16_Fig10_HTML.jpg)\n\
  \n**图 16-10** – 在 AR Resources 文件夹中显示 `.arobject` 文件\n\n1. 在导航面板中点击 `Main.storyboard`\
  \ 文件。\n2. 点击 **Assistant Editor** 图标或选择 **View** ➤ **Assistant Editor** ➤ **Show\
  \ Assistant Editor**，以并排显示 `Main.storyboard` 和 `ViewController.swift` 文件。\n3. 将鼠标指针移到\
  \ `ARSCNView` 上，按住 **Control** 键，然后按住 Control 键拖动到 `class ViewController` 行下方。\n\
  4. 松开 **Control** 键和鼠标左键。会出现一个弹出菜单。\n5. 在 **Name** 文本框中点击，输入 `sceneView`，然后点击 **Connect**\
  \ 按钮。Xcode 会创建一个 `IBOutlet`，如下所示：\n\n```swift\n@IBOutlet var sceneView: ARSCNView!\n\
  ```\n\n6. 编辑 `viewDidLoad` 函数，使其内容如下：\n\n```swift\noverride func viewDidLoad() {\n\
  \    super.viewDidLoad()\n    // Do any additional setup after loading the view,\
  \ typically from a nib.\n    sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
  \ ARSCNDebugOptions.showFeaturePoints]\n    sceneView.delegate = self\n    sceneView.session.run(configuration)\n\
  }\n```\n\n只有在应用中存储了物体的 `.arobject` 文件后，ARKit 才能识别现实世界中的物理物体。要存储一个或多个希望 ARKit 识别的\
  \ `.arobject` 文件，请按照以下步骤操作：\n\n1. 在导航面板中点击 `Assets.xcassets` 文件夹。\n2. 点击面板底部的 **+**\
  \ 图标。会出现一个弹出菜单。\n3. 选择 **New AR Resource Group**。Xcode 会创建一个 `AR Resources` 文件夹。\n\
  4. 将 `.arobject` 文件拖放到 `AR Resources` 文件夹中，如**图 16-10** 所示。\n\n添加了一个或多个希望 ARKit\
  \ 识别的真实物体的 `.arobject` 文件后，我们需要编写实际的 Swift 代码，以便在通过 iOS 设备摄像头捕捉到物体时进行识别。\n\n首先，我们需要访问包含待识别物体图像的文件夹。该文件夹可以任意命名，例如\
  \ `AR Resources`。这意味着要使用 `guard` 语句来验证 `AR Resources` 文件夹是否存在，如下所示：\n\n```swift\n\
  guard let storedObjects = ARReferenceObject.referenceObjects(inGroupNamed: \"AR\
  \ Resources\", bundle: nil) else {\n    fatalError(\"Missing AR Resources images\"\
  )\n}\n```\n\n这段代码会查找名为 `AR Resources` 的文件夹。如果查找失败，则终止程序并显示 `\"Missing AR Resources\
  \ images\"`。如果找到了 `AR Resources` 文件夹，我们可以这样定义检测到的 `.arobject` 文件的存储位置：\n\n```swift\n\
  configuration.detectionObjects = storedObjects\n```\n\n请注意，这行代码使用了 `detectionObjects`，而\
  \ `guard` 语句使用了 `ARReferenceObject.referenceObjects`。\n\n最后，我们需要使用 `didAdd renderer`\
  \ 函数，该函数在摄像头每次更新视图时运行。如果摄像头检测到已识别的物体（`ARObjectAnchor`），我们希望在检测到的物体附近显示一个虚拟物体。\n\n\
  首先，我们需要确保检测到的 `.arobject` 文件以 `ARObjectAnchor` 的形式存储，如下所示：\n\n```swift\nfunc renderer(_\
  \ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor: ARAnchor) {\n  \
  \  if let objectAnchor = anchor as? ARObjectAnchor {\n    }\n}\n```\n\n然后，我们可以创建一个虚拟物体，使其覆盖在检测到的图像上。在此示例中，我们将创建如下文本：\n\
  \n```swift\nlet movingImage = SCNText(string: \"Object Detected\", extrusionDepth:\
  \ 0.0)\nmovingImage.flatness = 0.1\nmovingImage.font = UIFont.boldSystemFont(ofSize:\
  \ 10)\n```\n\n接下来，我们需要将这个 `SCNText` 存储到一个节点中，因此我们需要定义一个节点，并定义其颜色和缩放比例：\n\n```swift\n\
  let titleNode = SCNNode()\ntitleNode.geometry = movingImage\ntitleNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.white\ntitleNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)\n```\n\n\
  然后，我们只需将包含 `SCNText` 的节点添加到检测到的图像上：\n\n```swift\nnode.addChildNode(titleNode)\n\
  ```\n\n完整的 `ViewController.swift` 文件应如下所示：\n\n\n\n```swift\nimport UIKit\nimport\
  \ SceneKit\nimport ARKit\n\nclass ViewController: UIViewController, ARSCNViewDelegate\
  \ {\n    @IBOutlet var sceneView: ARSCNView!\n    let configuration = ARWorldTrackingConfiguration()\n\
  \    \n    override func viewDidLoad() {\n        super.viewDidLoad()\n        //\
  \ 视图加载后的其他设置，通常来自 nib 文件\n        sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin,\
  \ ARSCNDebugOptions.showFeaturePoints]\n        sceneView.delegate = self\n    \
  \    guard let storedObjects = ARReferenceObject.referenceObjects(inGroupNamed:\
  \ \"AR Resources\", bundle: nil) else {\n            fatalError(\"缺少 AR Resources\
  \ 图片\")\n        }\n        configuration.detectionObjects = storedObjects\n   \
  \     sceneView.session.run(configuration)\n    }\n    \n    func renderer(_ renderer:\
  \ SCNSceneRenderer, didAdd node: SCNNode, for anchor: ARAnchor) {\n        if let\
  \ objectAnchor = anchor as? ARObjectAnchor {\n            let movingImage = SCNText(string:\
  \ \"物体已检测\", extrusionDepth: 0.0)\n            movingImage.flatness = 0.1\n    \
  \        movingImage.font = UIFont.boldSystemFont(ofSize: 10)\n            let titleNode\
  \ = SCNNode()\n            titleNode.geometry = movingImage\n            titleNode.geometry?.firstMaterial?.diffuse.contents\
  \ = UIColor.white\n            titleNode.scale = SCNVector3(0.0015, 0.0015, 0.0015)\n\
  \            node.addChildNode(titleNode)\n        }\n    }\n}\n```\n\n要测试这个应用，请将您扫描并存储在\
  \ `AR Resources` 文件夹中作为 `.arobject` 文件的物品放在桌子或地板上。然后按照以下步骤操作：\n\n1. 点击停止按钮，或选择 产品\
  \ ➤ 停止。\n\n![../images/469983_1_En_16_Chapter/469983_1_En_16_Fig11_HTML.jpg](img/469983_1_En_16_Fig11_HTML.jpg)\n\
  \n*图 16-11 检测一个物体*\n\n2. 通过 USB 线缆将 iOS 设备连接到您的 Macintosh。\n3. 点击运行按钮，或选择 产品 ➤ 运行。首次运行此应用时，它会请求访问相机的权限，请授予权限。\n\
  4. 将您想要检测的物体放在一个平坦的表面上。\n5. 将 iOS 设备的摄像头对准您希望 ARKit 识别的物体。当 ARKit 识别到该物体时，它会在检测到的物体附近显示文本“物体已检测”，如图\
  \ 16-11 所示。\n\n## 小结\n\n图像跟踪不仅能让您的应用识别图像并在附近显示虚拟物体，还能在图像移动时保持虚拟物体与该图像的关联。物体检测则能让您的应用检测预扫描的物体，并在其周围显示虚拟物体（如文本）。\n\
  \n使用图像跟踪时，请确保像下面这样使用 `ARImageTrackingConfiguration`（而不是 `ARWorldTrackingConfiguration`）：\n\
  \n```\nlet configuration = ARImageTrackingConfiguration()\n```\n\n然后，使用 `guard`\
  \ 语句在特定的 `AR Resources` 文件夹中查找存储的图像：\n\n```\nguard let storedImages = ARReferenceImage.referenceImages(inGroupNamed:\
  \ \"AR Resources\", bundle: nil) else {\n    fatalError(\"缺少 AR Resources 图片\")\n\
  }\n```\n\n最后，使用 `trackingImages` 访问 `AR Resources` 文件夹中存储的图像：\n\n```\nconfiguration.trackingImages\
  \ = storedImages\n```\n\n使用物体检测时，使用 `guard` 语句定义 `AR Resources` 文件夹中存储的 `.arobject`\
  \ 文件。请确保像下面这样使用 `ARReferenceObject.referenceObjects`：\n\n```\nguard let storedObjects\
  \ = ARReferenceObject.referenceObjects(inGroupNamed: \"AR Resources\", bundle: nil)\
  \ else {\n    fatalError(\"缺少 AR Resources 图片\")\n}\n```\n\n这段代码会查找名为 `AR Resources`\
  \ 的文件夹。如果找不到，程序将终止并显示`\"缺少 AR Resources 图片\"`。如果找到了 `AR Resources` 文件夹，我们就可以像下面这样定义已检测\
  \ `.arobject` 文件的存储位置：\n\n```\nconfiguration.detectionObjects = storedObjects\n\
  ```\n\n随着 ARKit 2.0 中同时引入了图像跟踪和物体检测，增强现实应用可以变得比以往任何时候都更加通用。\n\n"
- "# 17. 持久化\n\n到目前为止，我们创建的每个增强现实视图项目都有一个共同的问题。虽然您可能能够在增强现实视图中添加虚拟物体，但一旦关闭应用并重新启动，之前添加的所有虚拟物体都将消失。\n\
  \n在许多情况下，这正是您所需要的功能，因此重新启动应用会为用户创建一个空白的增强现实视图。然而，有时您可能希望保留视图中放置的任何虚拟物体。为了保存增强现实视图，使其出现在其他人的应用中，或者当您在稍后时间重新启动应用时出现在您自己的应用中，您需要使用*持久化*。\n\
  \n持久化会简单地将增强现实视图中放置的所有虚拟物体保存到一个世界地图中。通过保存这个世界地图，您可以保留虚拟物体的位置。通过稍后加载这个世界地图，您可以将增强现实视图恢复到之前的状态。\n\
  \n要了解持久化，让我们按照以下步骤创建一个新的 Xcode 项目：\n\n1. 启动 Xcode。（确保您使用的是 Xcode 10 或更高版本。）\n2.\
  \ 选择 文件 ➤ 新建 ➤ 项目。Xcode 会要求您选择一个模板。\n3. 点击 iOS 类别。\n4. 点击单视图应用图标，然后点击下一步按钮。Xcode\
  \ 会要求提供产品名称、组织名称、组织标识符和内容技术。\n5. 在产品名称文本框中点击，并输入一个描述性的项目名称，例如 `Persistence`。（具体名称无关紧要。）\n\
  6. 点击下一步按钮。Xcode 会询问您希望将项目存储在哪里。\n7. 选择一个文件夹，然后点击创建按钮。Xcode 会创建一个 iOS 项目。\n\n现在，按照以下步骤修改\
  \ `Info.plist` 文件，以允许访问相机并使用 ARKit：\n\n1. 在导航器面板中点击 `Info.plist` 文件。Xcode 会显示一个键、类型和值的列表。\n\
  2. 点击展开三角形以展开“所需的设备功能”类别，显示项目 0。\n3. 将鼠标指针移到项目 0 上，显示一个加号 (+) 图标。\n4. 点击此加号 (+)\
  \ 图标，显示一个空白的项目 1。\n5. 在项目 1 行的“值”类别下输入 `arkit`。\n6. 将鼠标指针移到最后一行，显示一个加号 (+) 图标。\n\
  7. 点击加号 (+) 图标创建一个新行。会弹出一个菜单。\n8. 选择“隐私 - 相机使用说明”。\n9. 在“隐私 - 相机使用说明”行的“值”类别下输入\
  \ `AR 需要使用相机`。\n\n现在是时候按照以下步骤修改 `ViewController.swift` 文件来使用 ARKit 和 SceneKit 了：\n\
  \n1. 在导航器面板中点击 `ViewController.swift` 文件。\n2. 编辑 `ViewController.swift` 文件，使其看起来像这样：\n\
  \n```\nimport UIKit\nimport SceneKit\nimport ARKit\n\nclass ViewController: UIViewController,\
  \ ARSCNViewDelegate, ARSessionDelegate {\n    let configuration = ARWorldTrackingConfiguration()\n\
  \    \n    override func viewDidLoad() {\n        super.viewDidLoad()\n        //\
  \ 视图加载后的其他设置，通常来自 nib 文件\n    }\n}\n```\n\n需要特别注意的最重要的一行是添加了 `ARSCNViewDelegate`\
  \ 的那一行，因为它包含了我们保存和恢复世界地图所需的函数。\n\n要在我们的应用中查看增强现实，请将以下内容添加到 `Main.storyboard`，如图\
  \ 17-1 所示：\n\n![../images/469983_1_En_17_Chapter/469983_1_En_17_Fig1_HTML.jpg](img/469983_1_En_17_Fig1_HTML.jpg)\n\
  \n*图 17-1 用户界面上的三个按钮、一个标签和一个 ARKit SceneKit 视图*\n\n- 一个 ARKit SceneKit 视图（`ARSCNView`）\n\
  - 三个 `UIButton`\n- 一个 `UILabel`\n\n设计好用户界面后，您需要添加约束。要添加约束，请选择 编辑器 ➤ 解决自动布局问题 ➤ 重置为建议的约束（位于“容器中所有视图”类别下的菜单底部）。\n\
  \n下一步是将用户界面项连接到 `ViewController.swift` 文件中的 Swift 代码。为此，请按照以下步骤操作：\n\n1. 在导航器面板中点击\
  \ `Main.storyboard` 文件。\n\n\n2. 点击“助理编辑器”图标，或选择“视图”➤“助理编辑器”➤“显示助理编辑器”，将`Main.storyboard`和`ViewController.swift`文件并排显示。\n\
  \n3. 将鼠标指针移到 ARSCNView 上，按住 Control 键，然后在`class ViewController`行下方按住 Control 键拖动。\n\
  \n4. 松开 Control 键和鼠标左键。此时会弹出一个菜单。\n\n5. 点击“名称”文本字段，输入`sceneView`，然后点击“连接”按钮。Xcode\
  \ 会创建一个如下的 IBOutlet：\n\n    ```\n    @IBOutlet var sceneView: ARSCNView!\n    ```\n\
  \n6. 将鼠标移到标签上，按住 Control 键，然后在刚创建的 IBOutlet 下方按住 Control 键拖动。\n\n7. 松开 Control 键和鼠标左键。此时会弹出一个菜单。\n\
  \n8. 点击“名称”文本字段，输入`lblMessage`，然后点击“连接”按钮。Xcode 会创建一个如下的 IBOutlet：\n\n    ```\n\
  \    @IBOutlet var lblMessage: UILabel!\n    ```\n\n9. 在两个 IBOutlet 下方，输入以下代码：\n\
  \n    ```\n    let configuration = ARWorldTrackingConfiguration()\n    ```\n\n10.\
  \ 编辑`viewDidLoad`函数，使其代码如下：\n\n    ```\n    override func viewDidLoad() {\n    \
  \    super.viewDidLoad()\n        // 加载视图后的其他设置，通常来自 nib 文件\n        sceneView.debugOptions\
  \ = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n \
  \       sceneView.delegate = self\n        sceneView.session.delegate = self\n \
  \       configuration.planeDetection = .horizontal\n        let tapGesture = UITapGestureRecognizer(target:\
  \ self, action: #selector(handleTap))\n        sceneView.addGestureRecognizer(tapGesture)\n\
  \        self.lblMessage.text = \"点击以放置虚拟对象\"\n        sceneView.session.run(configuration)\n\
  \    }\n    ```\n\n至此，我们定义了一个点按手势，但还需要创建一个函数来处理该点按手势。在`viewDidLoad`函数下方，添加名为`handleTap`的函数：\n\
  \n```\n@objc func handleTap(sender: UITapGestureRecognizer) {\n    guard let sceneView\
  \ = sender.view as? ARSCNView else {\n        return\n    }\n    let touch = sender.location(in:\
  \ sceneView)\n    let hitTestResults = sceneView.hitTest(touch, types: [.featurePoint,\
  \ .estimatedHorizontalPlane])\n    if hitTestResults.isEmpty == false {\n      \
  \  if let hitTestResult = hitTestResults.first {\n            let virtualAnchor\
  \ = ARAnchor(transform: hitTestResult.worldTransform)\n            self.sceneView.session.add(anchor:\
  \ virtualAnchor)\n        }\n    }\n}\n```\n\n每次用户点击屏幕时，都会向增强现实视图添加一个`ARAnchor`。这也会触发`didAdd\
  \ renderer`函数，我们需要编写该函数以在屏幕上显示一个蓝色方块。在`handleTap`函数下方，按如下方式编写`didAdd renderer`函数：\n\
  \n```\nfunc renderer(_ renderer: SCNSceneRenderer, didAdd node: SCNNode, for anchor:\
  \ ARAnchor) {\n    if anchor is ARPlaneAnchor {\n        return\n    }\n    let\
  \ newNode = SCNNode(geometry: SCNBox(width: 0.05, height: 0.05, length: 0.05, chamferRadius:\
  \ 0))\n    newNode.geometry?.firstMaterial?.diffuse.contents = UIColor.blue\n  \
  \  node.addChildNode(newNode)\n}\n```\n\n最后，按如下方式添加`viewWillDisappear`函数：\n\n```\n\
  override func viewWillDisappear(_ animated: Bool) {\n    sceneView.session.pause()\n\
  }\n```\n\n## 保存世界地图\n\n至此，该应用允许用户点击屏幕并在增强现实视图中放置蓝色方块。然而，你目前还不能保存增强现实视图。要保存增强现实视图，我们需要将当前增强现实视图存储为世界地图。\n\
  \n我们可以将世界地图保存到任何数据库中，但由于世界地图数据量较小，我们将把它存储在用户默认数据库中，该数据库通常用于存储应用设置。要保存世界地图，请按照以下步骤操作：\n\
  \n1. 在导航窗格中点击`Main.storyboard`文件。\n\n2. 点击“助理编辑器”图标，或选择“视图”➤“助理编辑器”➤“显示助理编辑器”，将`Main.storyboard`和`ViewController.swift`文件并排显示。\n\
  \n3. 将鼠标指针移到用户界面上显示“保存”的按钮上，按住 Control 键，然后在`class ViewController`行下方按住 Control\
  \ 键拖动。\n\n4. 松开 Control 键和鼠标左键。此时会弹出一个菜单。\n\n5. 确保“连接”弹出菜单显示为“操作”，然后点击“名称”文本字段，输入`saveButton`。\n\
  \n6. 点击“类型”弹出菜单，选择 UIButton，然后点击“连接”按钮。Xcode 会创建一个如下的`IBAction`方法：\n\n    ```\n\
  \    @IBAction func saveButton(_ sender: UIButton) {\n    }\n    ```\n\n7. 按如下方式编辑这个`saveButton\
  \ IBAction`方法：\n\n    ```\n    @IBAction func saveButton(_ sender: UIButton) {\n\
  \        saveMap()\n    }\n    ```\n\n每当用户点击“保存”按钮时，该按钮会运行`saveMap()`函数，我们需要按如下方式编写该函数：\n\
  \n```\nfunc saveMap() {\n}\n```\n\n保存世界地图的第一步是获取增强现实视图的当前状态：\n\n```\nself.sceneView.session.getCurrentWorldMap\
  \ { worldMap, error in\n}\n```\n\n这段代码要么获取当前状态（`worldMap`），要么显示错误。如果保存当前增强现实状态时出现错误，我们需要显示一条错误消息并停止尝试保存世界地图：\n\
  \n```\nif error != nil {\n    print(error?.localizedDescription ?? \"未知错误\")\n \
  \   return\n}\n```\n\n如果成功获取当前状态（`worldMap`），那么我们可以创建一个“map”变量来表示当前的世界地图：\n\n```\n\
  if let map = worldMap {\n}\n```\n\n接下来，我们需要按如下方式归档这个世界地图：\n\n```\nlet data = try!\
  \ NSKeyedArchiver.archivedData(withRootObject: map, requiringSecureCoding: true)\n\
  ```\n\n现在，我们需要将这些数据保存到用户默认数据库中，并为其指定一个任意字符串作为键，以便稍后检索：\n\n```\nlet savedMap = UserDefaults.standard\n\
  savedMap.set(data, forKey: \"worldmap\")\nsavedMap.synchronize()\n```\n\n最后，我们需要向用户发送一条消息，告知世界地图已保存：\n\
  \n```\nDispatchQueue.main.async {\n    self.lblMessage.text = \"世界地图已保存\"\n}\n```\n\
  \n完整的`saveMap`函数应如下所示：\n\n```\nfunc saveMap() {\n    self.sceneView.session.getCurrentWorldMap\
  \ { worldMap, error in\n        if error != nil {\n            print(error?.localizedDescription\
  \ ?? \"未知错误\")\n            return\n        }\n        if let map = worldMap {\n\
  \            let data = try! NSKeyedArchiver.archivedData(withRootObject: map, requiringSecureCoding:\
  \ true)\n            // 保存到用户默认数据库\n            let savedMap = UserDefaults.standard\n\
  \            savedMap.set(data, forKey: \"worldmap\")\n            savedMap.synchronize()\n\
  \            DispatchQueue.main.async {\n                self.lblMessage.text =\
  \ \"世界地图已保存\"\n            }\n        }\n    }\n}\n```\n\n\n## 加载世界地图\n\n保存世界地图后，下一步需要将该地图重新加载到增强现实视图中。这需要使用用户默认项键（定义为`worldmap`）。要检索已存储的世界地图，我们需要将用户界面上的“加载”按钮连接到一个`IBAction`方法，然后编写代码来检索存储在用户默认项数据库中的任何数据。\n\
  \n要加载世界地图，请遵循以下步骤：\n\n1.  在导航器面板中点击`Main.storyboard`文件。\n2.  点击“助理编辑器”图标，或选择“视图”➤“助理编辑器”➤“显示助理编辑器”，以并排显示`Main.storyboard`和`ViewController.swift`文件。\n\
  3.  将鼠标指针移动到用户界面上显示为“加载”的按钮上，按住 Control 键，并将其 Control 拖拽到`class ViewController`行下方。\n\
  4.  松开 Control 键和鼠标左键。此时会出现一个弹出菜单。\n5.  确保“连接”弹出菜单显示“操作”，然后点击“名称”文本字段并输入`saveButton`。\n\
  6.  点击“类型”弹出菜单并选择`UIButton`，然后点击“连接”按钮。Xcode 会创建一个`IBAction`方法，如下所示：\n\n```\n@IBAction\
  \ func loadButton(_ sender: UIButton) {\n}\n```\n\n7.  按如下方式编辑这个`saveButton` `IBAction`方法：\n\
  \n```\n@IBAction func loadButton(_ sender: UIButton) {\nloadMap()\n}\n```\n\n每次用户点击“加载”按钮时，该按钮都会运行`loadMap()`函数，该函数需要检索之前保存的世界地图，或者在没有保存过世界地图的情况下，直接启动一个普通的增强现实会话。\n\
  \n首先，像这样创建`loadMap`函数：\n\n```\nfunc loadMap() {\n}\n```\n\n现在，我们需要从用户默认项数据库中检索存储的数据：\n\
  \n```\nlet storedData = UserDefaults.standard\n```\n\n接下来，我们需要一个`if-else`语句：如果找到世界地图（使用自定义的`worldmap`键），则运行第一组代码；如果未找到世界地图，则运行第二组代码：\n\
  \n```\nif let data = storedData.data(forKey: \"worldmap\") {\n} else {\n}\n```\n\
  \n如果找到了`worldmap`键，那么我们需要检索并解档它：\n\n```\nif let unarchived = try? NSKeyedUnarchiver.unarchivedObject(ofClasses:\
  \ [ARWorldMap.classForKeyedUnarchiver()], from: data), let worldMap = unarchived\
  \ as? ARWorldMap {\n}\n```\n\n然后，我们可以将之前保存的世界地图存储到`initialWorldMap`属性中，并向用户显示世界地图已加载的消息。最后，我们可以运行该配置：\n\
  \n```\nlet configuration = ARWorldTrackingConfiguration()\nconfiguration.initialWorldMap\
  \ = worldMap\nconfiguration.planeDetection = .horizontal\nself.lblMessage.text =\
  \ \"已加载之前的世界地图\"\nsceneView.session.run(configuration)\n```\n\n如果使用我们自定义的`worldmap`键未能找到世界地图，我们只需要为增强现实视图加载一个常规配置即可。因此，完整的`loadMap`函数如下所示：\n\
  \n```\nfunc loadMap() {\nlet storedData = UserDefaults.standard\nif let data = storedData.data(forKey:\
  \ \"worldmap\") {\nif let unarchived = try? NSKeyedUnarchiver.unarchivedObject(ofClasses:\
  \ [ARWorldMap.classForKeyedUnarchiver()], from: data), let worldMap = unarchived\
  \ as? ARWorldMap {\nlet configuration = ARWorldTrackingConfiguration()\nconfiguration.initialWorldMap\
  \ = worldMap\nconfiguration.planeDetection = .horizontal\nself.lblMessage.text =\
  \ \"已加载之前的世界地图\"\nsceneView.session.run(configuration)\n}\n} else {\nlet configuration\
  \ = ARWorldTrackingConfiguration()\nconfiguration.planeDetection = .horizontal\n\
  sceneView.session.run(configuration)\n}\n}\n```\n\n## 清除增强现实视图\n\n至此，我们的应用程序可以保存世界地图并重新加载它，但我们还要进行最后一项调整，创建一个“清除”按钮。当用户点击“清除”按钮时，我们需要移除所有虚拟对象，以便能够创建并保存一个新的增强现实视图。\n\
  \n要清除增强现实视图，请遵循以下步骤：\n\n1.  在导航器面板中点击`Main.storyboard`文件。\n2.  点击“助理编辑器”图标，或选择“视图”➤“助理编辑器”➤“显示助理编辑器”，以并排显示`Main.storyboard`和`ViewController.swift`文件。\n\
  3.  将鼠标指针移动到用户界面上显示为“清除”的按钮上，按住 Control 键，并将其 Control 拖拽到`class ViewController`行下方。\n\
  4.  松开 Control 键和鼠标左键。此时会出现一个弹出菜单。\n5.  确保“连接”弹出菜单显示“操作”，然后点击“名称”文本字段并输入`saveButton`。\n\
  6.  点击“类型”弹出菜单并选择`UIButton`，然后点击“连接”按钮。Xcode 会创建一个`IBAction`方法，如下所示：\n\n```\n@IBAction\
  \ func clearButton(_ sender: UIButton) {\n}\n```\n\n7.  按如下方式编辑这个`saveButton` `IBAction`方法：\n\
  \n```\n@IBAction func clearButton(_ sender: UIButton) {\nclearMap()\n}\n```\n\n\
  每次用户点击“清除”按钮时，该按钮都会运行`clearMap()`函数，该函数会重置追踪并移除任何存在的锚点（这些锚点所在位置包含了平面和虚拟对象），从而清除增强现实视图。添加如下`clearMap`函数：\n\
  \n```\nfunc clearMap() {\nlet configuration = ARWorldTrackingConfiguration()\nconfiguration.planeDetection\
  \ = .horizontal\nself.lblMessage.text = \"点击放置虚拟对象\"\nsceneView.debugOptions = [.showWorldOrigin,\
  \ .showFeaturePoints]\nlet options: ARSession.RunOptions = [.resetTracking, .removeExistingAnchors]\n\
  sceneView.session.run(configuration, options: options)\n}\n```\n\n完整的`ViewController.swift`文件应如下所示：\n\
  \n\n\n```\nimport UIKit\nimport SceneKit\nimport ARKit\nclass ViewController: UIViewController,\
  \ ARSCNViewDelegate , ARSessionDelegate {\n@IBOutlet var sceneView: ARSCNView!\n\
  @IBOutlet var lblMessage: UILabel!\nlet configuration = ARWorldTrackingConfiguration()\n\
  override func viewDidLoad() {\nsuper.viewDidLoad()\n// 在此处添加视图加载后的其他设置（通常从 nib 文件加载）\n\
  sceneView.debugOptions = [ARSCNDebugOptions.showWorldOrigin, ARSCNDebugOptions.showFeaturePoints]\n\
  sceneView.delegate = self\nsceneView.session.delegate = self\nconfiguration.planeDetection\
  \ = .horizontal\nlet tapGesture = UITapGestureRecognizer(target: self, action: #selector(handleTap))\n\
  sceneView.addGestureRecognizer(tapGesture)\nself.lblMessage.text = \"轻点以放置虚拟对象\"\
  \nsceneView.session.run(configuration)\n}\n@objc func handleTap(sender: UITapGestureRecognizer)\
  \ {\nguard let sceneView = sender.view as? ARSCNView else {\nreturn\n}\nlet touch\
  \ = sender.location(in: sceneView)\nlet hitTestResults = sceneView.hitTest(touch,\
  \ types: [.featurePoint, .estimatedHorizontalPlane])\nif hitTestResults.isEmpty\
  \ == false {\nif let hitTestResult = hitTestResults.first {\nlet virtualAnchor =\
  \ ARAnchor(transform: hitTestResult.worldTransform)\nself.sceneView.session.add(anchor:\
  \ virtualAnchor)\n}\n}\n}\nfunc renderer(_ renderer: SCNSceneRenderer, didAdd node:\
  \ SCNNode, for anchor: ARAnchor) {\nif anchor is ARPlaneAnchor {\nreturn\n}\nlet\
  \ newNode = SCNNode(geometry: SCNBox(width: 0.05, height: 0.05, length: 0.05, chamferRadius:\
  \ 0))\nnewNode.geometry?.firstMaterial?.diffuse.contents = UIColor.blue\nnode.addChildNode(newNode)\n\
  }\nfunc saveMap() {\nself.sceneView.session.getCurrentWorldMap { worldMap, error\
  \ in\nif error != nil {\nprint(error?.localizedDescription ?? \"未知错误\")\nreturn\n\
  }\nif let map = worldMap {\nlet data = try! NSKeyedArchiver.archivedData(withRootObject:\
  \ map, requiringSecureCoding: true)\n// 保存到用户默认设置中\nlet savedMap = UserDefaults.standard\n\
  savedMap.set(data, forKey: \"worldmap\")\nsavedMap.synchronize()\nDispatchQueue.main.async\
  \ {\nself.lblMessage.text = \"世界地图已保存\"\n}\n}\n}\n}\noverride func viewWillDisappear(_\
  \ animated: Bool) {\nsceneView.session.pause()\n}\nfunc loadMap() {\nlet storedData\
  \ = UserDefaults.standard\nif let data = storedData.data(forKey: \"worldmap\") {\n\
  if let unarchived = try? NSKeyedUnarchiver.unarchivedObject(ofClasses: [ARWorldMap.classForKeyedUnarchiver()],\
  \ from: data), let worldMap = unarchived as? ARWorldMap {\nlet configuration = ARWorldTrackingConfiguration()\n\
  configuration.initialWorldMap = worldMap\nconfiguration.planeDetection = .horizontal\n\
  self.lblMessage.text = \"已加载之前的世界地图\"\nsceneView.session.run(configuration)\n}\n\
  } else {\nlet configuration = ARWorldTrackingConfiguration()\nconfiguration.planeDetection\
  \ = .horizontal\nsceneView.session.run(configuration)\n}\n}\n@IBAction func saveButton(_\
  \ sender: UIButton) {\nsaveMap()\n}\nfunc clearMap() {\nlet configuration = ARWorldTrackingConfiguration()\n\
  configuration.planeDetection = .horizontal\nself.lblMessage.text = \"轻点以放置虚拟对象\"\
  \nsceneView.debugOptions = [.showWorldOrigin, .showFeaturePoints]\nlet options:\
  \ ARSession.RunOptions = [.resetTracking, .removeExistingAnchors]\nsceneView.session.run(configuration,\
  \ options: options)\n}\n@IBAction func clearButton(_ sender: UIButton) {\nclearMap()\n\
  }\n@IBAction func loadButton(_ sender: UIButton) {\nloadMap()\n}\n}\n```\n\n要测试此应用，请遵循以下步骤：\n\
  \n1. 在“持久化”应用中轻点 `加载` 按钮。出现“已加载之前的世界地图”消息。\n\n2. 将 iOS 设备的摄像头对准之前放置过蓝色方块的平坦表面（增强现实视图中）。当应用识别出同一区域后，便会显示你之前放置的虚拟对象。（你必须将虚拟对象放置在有大量显著特征的平坦表面上，以便\
  \ ARKit 轻松识别同一区域，并在同一位置再次显示已保存的虚拟对象。如果 ARKit 无法识别该区域，它将无法显示已保存的世界地图。）\n\n3. 轻点 `清除`\
  \ 按钮，从增强现实视图中移除所有虚拟对象。此时，你可以再次重复步骤 3–8。\n\n4. 点击 `停止` 按钮，或选择“产品”➤“停止”。\n\n![../images/469983_1_En_17_Chapter/469983_1_En_17_Fig4_HTML.jpg](img/469983_1_En_17_Fig4_HTML.jpg)\n\
  \n图 17-4\n\n再次在 iOS 设备屏幕上找到“持久化”图标\n\n1. 向上滑动“持久化”应用的缩略图（或对于没有主屏幕按钮的 iOS 设备，用力按压“持久化”应用缩略图，然后轻点红色圆圈内的减号）。\n\
  \n2. 返回主屏幕，轻点“持久化”图标以重新加载应用，如图 17-4 所示。\n\n![../images/469983_1_En_17_Chapter/469983_1_En_17_Fig3_HTML.jpg](img/469983_1_En_17_Fig3_HTML.jpg)\n\
  \n图 17-3\n\n以缩略图形式显示当前运行的应用\n\n1. 在 iOS 设备上按两次主屏幕按钮，以显示当前运行的应用列表（或在主屏幕向上滑动并暂停（对于没有主屏幕按钮的\
  \ iOS 设备））。所有当前运行的应用将以缩略图形式显示，如图 17-3 所示。\n\n![../images/469983_1_En_17_Chapter/469983_1_En_17_Fig2_HTML.jpg](img/469983_1_En_17_Fig2_HTML.jpg)\n\
  \n图 17-2\n\n在具有显著特征的平坦表面上放置虚拟对象\n\n1. 通过 USB 线缆将 iOS 设备连接到 Macintosh。\n\n2. 点击 `运行`\
  \ 按钮，或选择“产品”➤“运行”。\n\n3. 将 iOS 设备的摄像头对准具有大量显著特征的平坦表面，并轻点屏幕在增强现实视图中放置蓝色方块，如图 17-2\
  \ 所示。\n\n## 总结\n\n持久化功能为你的应用提供了一种保存当前增强现实视图的方式，以便用户稍后可以加载并再次查看。如果增强现实会话可能持续较长时间（例如用户可以在增强现实游戏中保存进度并稍后返回），这将非常有用。\n\
  \n将世界地图保存到用户默认设置中是存储增强现实视图的最简单方法。关键在于赋予用户保存世界地图、稍后加载以及清除增强现实视图的能力。\n\n"
