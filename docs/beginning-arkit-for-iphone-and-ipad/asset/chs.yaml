  ## 连接用户界面与代码\n\n设计好用户界面后，下一步是将用户界面项连接到`ViewController.swift`文件中的 Swift 代码。为此，请按照以下步骤操作：\n\
  \n1.  在导航器窗格中点击`Main.storyboard`文件。\n2.  点击助手编辑器图标，或选择**视图 ➤ 助手编辑器 ➤ 显示助手编辑器**，以并排显示`Main.storyboard`和`ViewController.swift`文件。\n\
