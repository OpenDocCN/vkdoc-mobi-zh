    Figure 9-1. The folder structure


    ## Writing the Tests


    This section shows you how to write a couple of Cucumber scenarios. Since it is
    simple English, the scenarios don''t need extra explanation.


    ### Cucumber Scenarios (`ci_android.feature`)


    First consider the Cucumber scenario (see Figure [9-2](#A435441_1_En_9_Chapter.html#Fig2)).


    ![A435441_1_En_9_Fig2_HTML.jpg](A435441_1_En_9_Fig2_HTML.jpg)


    Figure 9-2. Feature file location in the folder structure


    ```

    Feature: CI Android

    All screens should launch fine

    @non-ci

    Scenario: Settings

    Given I click about phone

    Then the Android version is a number

    @ci_smoke

    Scenario: Open ci app and navigate to login screen

    Given I open login screen on app

    And I click add contact

    Then I verify contact screen is displayed

    @ci_add_contact

    Scenario: Add contact

    Given I open login screen on app

    And I click add contact

    Then I successfully add a contact

    And verify that it was added

    @ci_smoke

    Scenario: Take screenshots

    Given I open login screen on app

    And I click add contact

    Then take screenshot of contact form

    ```


    ### `hooks.rb`


    The values for `appActivity` and `appPackage` were retrieved using the `aapt`
    command, as described in Chapter [8](#A435441_1_En_8_Chapter.html).


    ```

    require ''./lib/capabilities''

    include DesiredCapabilities

    Before(''@ci_smoke'') do

    caps = local_capabilities(app=''app-debug.apk'',appActivity=''com.example.android.contactmanager.ContactManager'',

    appPackage=''com.example.android.contactmanager'')

    @driver = Appium::Driver.new(caps)

    Appium.promote_appium_methods AppiumWorld

    puts "Execute anything before scenario/test case"

    @driver.start_driver

    end

    Before(''@ci_add_contact'') do

    caps = local_capabilities(app=''app-debug.apk'',appActivity=''com.example.android.contactmanager.ContactManager'',

    appPackage=''com.example.android.contactmanager'')

    @driver= Appium::Driver.new(caps)

    Appium.promote_appium_methods AppiumWorld

    puts "Execute anything before scenario/test case"

    @driver.start_driver

    end

    Before(''@non-ci'') do

    caps = local_capabilities(app='''',appActivity=''.Settings'',appPackage=''com.android.settings'')

    @driver = Appium::Driver.new(caps)

    Appium.promote_appium_methods AppiumWorld

    puts "Execute anything before scenario/test case"

    @driver.start_driver

    end

    After do |scenario|

    if scenario.failed?

    @driver.screenshot("#{scenario.name}_failed.png")

    end

    @driver.driver_quit

    puts "Execute anything after scenario/test case"

    end

    ```


    ### `env.rb`


    As you can see, you create a custom `World` class, which is used in `hooks.rb`.


    ```

    require ''rspec/expectations''

    require ''appium_lib''

    require ''cucumber/ast''

    require ''yaml''

    require ''active_support/core_ext/hash''

    # Create a custom World class so we don''t pollute `Object` with Appium methods

    class AppiumWorld

    end

    World do

    AppiumWorld.new

    end

    $devices = YAML.load(File.open(''./lib/config/devices.yaml''))

    $emulators = YAML.load(File.open(''./lib/config/emulators.yaml''))

    ```


    ### Devices Lab


    My device lab is shown in Figure [9-3](#A435441_1_En_9_Chapter.html#Fig3). At
    this point, there are only three devices; however, you can connect many more by
    purchasing an USB extension cord.


