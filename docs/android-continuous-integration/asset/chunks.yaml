    Much like how Microsoft, Redhat, Canonical, et al. represent ecosystems in the
    operating systems space, there are ecosystems that are present in the mobile apps
    domain too. Ecosystems are entry points into the platforms on which mobile applications
    are developed, maintained, delivered, and enhanced.


    At the time of writing this book, the ecosystems are broadly classified into the
    following categories.


    * Apple

    * Google

    * Windows


    Within each ecosystem, there can be many more categories, especially in the Google
    Android ecosystem (based on phone manufacturer, such as Huawei), as it provides
    more flexibility than Apple to tinker with the hardware architecture.


