- fmt: '# Test Automation Libraries


    Over the past few years, the test automation tools that got some traction for
    Android apps included `MonkeyTalk`, `Robotium`, `UiAutomator` (uses UI Automation
    library), `calabash-android`, `selendroid`, `Appium`, etc.


    `Android Espresso`, a unit testing library that promises to do UI testing, is
    also relatively new as of writing this book. Let''s wait and see how `Espresso`
    does; however, the fact that it is inside-out (unit testing) means that it might
    not cover the scope of integration testing (i.e., testing the exact path that
    an end user experiences).


    This book uses `Appium` as the test automation tool/framework because I found
    it aligned with my needs of testing native, web, and hybrid apps. It also follows
    the `WebDriver` protocol. You can read `Appium`''s philosophy and competitive
    analysis with other tools and frameworks on its web site ( [`http://appium.io/introduction.html?lang=en`](http://appium.io/introduction.html?lang=en)
    ).


    Some tradeoffs between `Appium` and `Espresso` are as follows:


    - `Android Espresso` is good because the tests are in the same language as the
    source code, which makes it easier to debug/troubleshoot and fosters collaboration
    among the technical staff (the dev and test engineers).

    - If you need access to the source code, executing the tests may work fine, but
    requires multiple vetting of build pipelines. CI (and hence testing from outside)
    gives relatively higher confidence before release. `Appium` is a better choice
    in this regard.

    - Use ATDD/BDD style because it lets lesser technical staff product owners/business
    stakeholders define “executable” acceptance criteria. This helps the three amigos
    (dev, test, and product) be on same page and fosters collaboration.

    - Availability of developer’s time, test coverage, etc., is also a tradeoff. `Appium`,
    with its support for most programming stacks, is a better choice in this regard.


    # Why Automate?


    It should be a no-brainer why you automate processes. In fact, continuous integration
    and/or continuous delivery (see [`https://martinfowler.com/bliki/ContinuousDelivery.html`](https://martinfowler.com/bliki/ContinuousDelivery.html)
    ) is not possible without automating the repeatable/mundane activities. Humans
    are not great compared to machines for computing repetitive tasks and performing
    all permutations and combinations on a certain problem.


    That said, a human still has to architect and design the overall system, so should
    understand what a machine does and, more importantly, be able to troubleshoot
    when expected outcomes do not transpire.


    For the mobile app space, this `article` shows the costs associated with resubmitting
    a mobile app. The numbers are only suggestive; in fact, the costs might be higher
    than what is displayed in the table. The point is to say that the costs associated
    with defects/bugs are very dear and include lost customers, countless developer
    hours, and brand image, to name a few.


    # Mobile Test Strategy


    Software testers are familiar with writing test plans, test cases, and test release
    documents. A test strategy document is generally written by taking into account
    the application’s operating environment, the release cycle, test coverage, defect
    tracking, and overall a document that can be presented to executive management
    for approval of budget and timelines. Mobile test strategy aims to carve out the
    how, why, and what aspects that affect mobile testing. The following sections
    include a few considerations for creating a mobile test strategy.


    ## Manual Testing vs. Automation


    There are very rare scenarios in which the human eye does significantly better
    than an automated program when validating software, such as the aesthetics of
    a web site. That gap is also getting narrower by the day. AI (artificial intelligence)
    and ML (machine learning), for example, provide a much better ROI in the age of
    speed and continuous delivery. Visual test automation by tools like `Applitools`
    is a great example. This is not to say that we should make manual testing function
    redundant in an organization, rather it is to say that testing capabilities should
    include both automation and manual approaches, with a focus on automation.


    In the context of mobile testing, it is almost impossible for a human to manually
    test permutations and combinations across the dimensions of devices, SDKs, API
    levels, and ecosystems. Hence, your testing strategy should include (but not be
    limited to):


    - Automate early and often in the bottom-up order of the testing pyramid (see
    the “Test Pyramid” section later in this chapter).

    - Use BDD/TDD frameworks in the early stages when acceptance criteria are not
    clear and an automation script cannot be run (use mock frameworks to mitigate
    the absence of a real system).

    - Building and deploying an app should be self-serviced and automated without
    any exceptions.

    - Collaborate with other roles on the team and, in rare circumstances (such as
    during sprint demos), manually walk through workflows of the system (otherwise,
    the automation script should be run as a demo).

    - The programming language should start with known, and tend toward the most collaborative.

    - Inside-out/outside-in (focus on end users).

    - Don’t boil the ocean—pick one and pivot.

    - Interoperability—cloud and on-premises infrastructures.

    - Tend toward using real devices.

    - Use `Appium`, `Espresso`, and `XCTest`.


    ## Speed of Testing


    High-speed testing is a mandatory requirement in the mobile space because a mobile
    app is successful in the market based on how fast it is delivered in the face
    of competition. There have been research studies suggesting that mobile users
    have an attention span of minutes before they uninstall an app. Releasing bug-free
    apps often is a make-or-break situation.


    ## Scaling


    Think of AWS and Netflix. The services can respond by scaling the systems based
    on load, performance, user traffic, and so on. While testing mobile apps, the
    testing capability should also be scalable across the three Vs (volume, variety,
    and velocity) with a tradeoff against cost. In the beginning of developing a project,
    it is advisable to rely on open source and cloud services before investing heavily
    on paid solutions.


    ## Cost


    Cost is a constraint in every decision you make when resources are required. Resources
    can be human, machine, time, etc. Hence, investing in open source solutions at
    the beginning is less risky because there is no vendor lock-in. It is a tradeoff
    decision because if you spend too much time on not-so-mature open source solutions,
    you might lose time. When it’s all said and done, open source solutions have come
    a long way and are mature in many ways. In fact, they are much more mature than
    some paid solutions in some cases. Your strategy should be to spend a week or
    two and scour the web for solutions and frameworks that are already built and
    use one as a starting point.'
