    \n### Installing Nexus\n\nThe version of `Nexus` installed at the time of writing\
    \ this book is 2.11.4-01.\n\nUse the following steps to install Nexus:\n\n1. Log\
    \ in to your machine that has Docker installed on it (installation instructions\
    \ for Docker, which are machine dependent, are found at [https://docs.docker.com/engine/installation/](https://docs.docker.com/engine/installation/)).\
    \ This example uses Ubuntu 14.04 OS. \n2. Run the command `docker run –d –name\
    \ \"mynexus\" –p 8081:8081 sonatype/nexus:oss` (the latest at the time of this\
    \ writing is 2.11.4-01). \n3. Access the Nexus URL using `http://localhost:8081`\
    \ (the default credentials are `admin/admin123`). \n\nNexus is successfully installed\
    \ now, and the UI is shown in Figure [1-5](#A435441_1_En_1_Chapter.html#Fig5).\n\
    \n![A435441_1_En_1_Fig5_HTML.jpg](A435441_1_En_1_Fig5_HTML.jpg)\n\nFigure 1-5.\
