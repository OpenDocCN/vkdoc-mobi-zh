    # 启用 USB 调试


    在通过 USB 将真实设备连接到计算机之前，必须先启用开发者选项，只有这样 ADB 才能与该设备通信。


    要访问这些设置，请在系统设置中打开开发者选项。在 Android 4.2 及更高版本中，开发者选项屏幕默认是隐藏的。要使其可见，请转到“设置”➤“关于手机”，然后连续点击“版本号”七次。返回上一个屏幕即可在底部找到“开发者选项”（参见图
    6-4）。有关此过程的更多详细信息，请参阅 [`https://developer.android.com/studio/run/device.html`](https://developer.android.com/studio/run/device.html)。


    ![A435441_1_En_6_Fig4_HTML.jpg](img/A435441_1_En_6_Fig4_HTML.jpg)


    图 6-4.


    USB 调试启用屏幕


    根据你的设备型号，图 6-4 中的图像版本可能有所不同。


    # 连接设备


    现在，你可以使用 USB 数据线将设备连接到计算机。打开命令提示符（如果你使用的是 Mac，则打开终端）并输入：


    ```

    adb devices

    ```


    此命令将列出所有已连接并启用了 USB 调试的设备。


    如果一切顺利，你应该会看到设备已被识别，如图 6-5 所示。


    ![A435441_1_En_6_Fig5_HTML.jpg](img/A435441_1_En_6_Fig5_HTML.jpg)


    图 6-5.


    `adb devices` 输出


    # 故障排除技巧


    有时，你可能不会看到设备列出，而是看到 `unauthorized`，如下列代码所示。出现这种情况通常是因为设备与 Mac 之间的握手过程不正确。应该生成本地
    RSA 指纹，并且 Mac 应该拥有公钥。你会在设备上看到一个弹出窗口，要求你接受连接。`unauthorized` 的影响是，任何后续命令都会抛出错误，例如
    `$ADB_VENDOR_KEYS` 未设置：


    ```

    pradeep@seleniumframework.com: $ adb devices

    List of devices attached

    209c6111 unauthorized

    pradeep@seleniumframework.com: $ adb tcpip 5555

    error: device unauthorized

    This adbd''s $ADB_VENDOR_KEYS is not set; try ''adb kill-server'' if that seems
    wrong. Otherwise check for a confirmation dialog on your device

    ```


    要解决这个未授权问题，请从以下所有位置删除 `adbkey`、`adbkey.pub` 文件。（这样做是安全的，因为如果找不到这些文件，每次连接设备时都会重新生成它们。）


    ```

    ~/.android

    ~/.AndroidStudioXX/.android

    ```


    删除这些文件后，使用 `adb kill-server` 然后使用 `adb start-server` 重启 ADB。此时，你应该会在设备上看到一个弹出窗口，要求你接受连接。点击“是”。有关此问题的完整详细信息，请参阅
    [`http://forum.xda-developers.com/verizon-lg-g3/help/unable-to-access-adb-t2830087`](http://forum.xda-developers.com/verizon-lg-g3/help/unable-to-access-adb-t2830087)。


    # 通过 WiFi 进行调试


    本节仅在你对探索 WiFi 调试感兴趣时适用。作为初学者，USB 有线连接能更快地帮助你实现最小可行产品（MVP）。


    可以通过 WiFi 连接 Android 设备。虽然体验可能不如连接 USB 数据线那么流畅，但理解网络概念的基础知识有助于你调试和排查任何连接问题。


    我发现以下两个链接对初学者很有帮助：


    *   [`http://codetheory.in/android-debug-bridge-adb-wireless-debugging-over-wi-fi/`](http://codetheory.in/android-debug-bridge-adb-wireless-debugging-over-wi-fi/)

    *   [`https://stackoverflow.com/questions/2604727/how-can-i-connect-to-android-with-adb-over-tcp`](https://stackoverflow.com/questions/2604727/how-can-i-connect-to-android-with-adb-over-tcp)


    ## ADB 命令


    在此上下文中，`adb` 命令非常有用。


    `adb` 有许多选项。只需在命令行中输入 `adb` 即可查看这些选项。我尝试过的一些命令如下：


    ```

    adb get-serialno

    adb get-devpath

    adb get-state (打印：offline | bootloader | device)

    adb usb (回到监听 USB 模式)

    adb tcp (监听 TCP 协议模式)

    ```


    所有选项也可以通过输入 `adb help` 在命令行中看到，如图 6-6 所示。


    ![A435441_1_En_6_Fig6_HTML.jpg](img/A435441_1_En_6_Fig6_HTML.jpg)


    图 6-6.


    ADB 帮助


    ## 通过 WiFi 连接


    如果移动设备和电脑处于同一网络中（`adb` 客户端需要与移动设备上运行的 `adbd` 守护进程通信），那么体验会容易得多。在执行以下步骤之前，请确保两者都已连接到同一个
    WiFi。


    1. 手动发现设备 IP 地址：导航至“设置”➤“关于手机”➤“状态”。

    2. 通过 `adb shell`... 命令自动发现 IP 地址。任何正在监听 `adbd`（`adb` 守护进程）的设备都会显示在这里。（你也可以通过进入“设置”➤“开发者选项”➤“调试”部分➤“Android
    调试”来检查设备上是否启用了 Android 调试接口。）


    ```

    C:\Users\pmacharl>adb tcpip 5555

    C:\Users\pmacharl>adb devices

    List of devices attached

    C:\Users\pmacharl>adb connect 192.168.1.141:5555

    connected to 192.168.1.141:5555

    C:\Users\pmacharl>adb devices

    List of devices attached

    192.168.1.141:5555 device

    C:\Users\pmacharl>adb shell ip -f inet addr show wlan0

    wlan0:  mtu 1500 qdisc mq state UP qlen 1000 inet 192.168.1.141/24 brd 192.168.1.255
    scope global wlan0

    C:\Users\pmacharl>adb usb

    restarting in USB mode

    C:\Users\pmacharl>adb devices

    List of devices attached

    ```


    你也可以选择让 `adb` 监听其他端口，例如 4455。


    如下列代码所示，首先设备通过 USB 和 TCP/IP（网络）两种模式连接到 PC/Mac，因此列出了两行。但当我拔掉 USB 数据线后，只剩下 TCP/IP
    模式被启用，因此只显示了一行。


    ```

    C:\Users\pmacharl>adb tcpip 4455

    restarting in TCP mode port: 4455

    C:\Users\pmacharl>adb shell ip -f inet addr show wlan0

    wlan0:  mtu 1500 qdisc mq state UP qlen 1000 inet 192.168.1.141/24 brd 192.168.1.255
    scope global wlan0

    C:\Users\pmacharl>adb connect 192.168.1.141:5555

    unable to connect to 192.168.1.141:5555

    C:\Users\pmacharl>adb connect 192.168.1.141:4455

    connected to 192.168.1.141:4455

    C:\Users\pmacharl>adb devices

    List of devices attached

    209c6111 device

    192.168.1.141:4455 device

    C:\Users\pmacharl>adb devices

    List of devices attached

    192.168.1.141:4455 device

    ```


    # 远程调试 Chrome


    当你开始编写自动化脚本并需要识别 UI 元素定位器时，本部分内容会更有用；否则，USB 有线连接将有助于实现 MVP。


    要使用远程调试，你需要以下内容：


    * 电脑上安装了 Chrome（版本 32 或更高版本）

    * 运行 Android 4.4+ 的 Android 设备

    * 已启用 USB 调试

    * USB 数据线


    基础工作准备就绪后，使用 USB 数据线将设备连接到电脑。启动 Chrome 并打开一个标签页，目标地址为 `chrome://inspect`。Chrome
    屏幕应类似于图 6-7。


    ![A435441_1_En_6_Fig7_HTML.jpg](img/A435441_1_En_6_Fig7_HTML.jpg)


    图 6-7.


    Chrome 连接


    点击“确定”后，你的设备将显示在浏览器标签页中，如图 6-8 所示。


    ![A435441_1_En_6_Fig8_HTML.jpg](img/A435441_1_En_6_Fig8_HTML.jpg)


    图 6-8.


    设备已连接到 Chrome


    你也可以使用屏幕广播选项，方法是单击远程调试 DevTools 窗口右上角的“屏幕广播”图标。参见图 6-9。


    ![A435441_1_En_6_Fig9_HTML.jpg](img/A435441_1_En_6_Fig9_HTML.jpg)


    图 6-9.


    屏幕广播选项

