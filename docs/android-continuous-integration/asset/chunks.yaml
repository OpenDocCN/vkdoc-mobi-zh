- fmt: "### Testing Pyramid\n\nThe testing pyramid helps in terms of having conversations\
    \ around how much and what priorities do different kinds of testing have in a\
    \ project. See Figure [2-3](#A435441_1_En_2_Chapter.html#Fig3).\n\n![A435441_1_En_2_Fig3_HTML.jpg](A435441_1_En_2_Fig3_HTML.jpg)\n\
    \nFigure 2-3. The testing pyramid\n\nIn the context of mobile testing (most mobile\
    \ apps at the time of writing this book focus on the GUI layer), the pyramid can\
    \ be read as follows:\n\n- The confidence while building the app (work-in-progress)\
    \ is enhanced with more tests at the bottom of the pyramid. Hence, automated unit\
    \ tests that execute successfully give confidence that the unit/component is a\
    \ higher quality.\n- Since a software application is a network of components,\
    \ integration points between the components become important as you race toward\
    \ release to production.\n- Finally, the user experiences the GUI of the mobile\
    \ app, hence from a user’s perspective, automated GUI tests give the highest confidence\
    \ in quality. (For example, if a component at the lower layer breaks, the user’s\
    \ experience will be felt at the GUI layer.)\n- The confidence in the overall\
    \ system is enhanced by successfully running tests from lower to higher layers\
    \ in the testing pyramid.\n- The testing pyramid also articulates the relative\
    \ volume of tests to be written at various layers of the application.\n\nFurther\
    \ reading on the testing pyramid can be found at [`http://www.seleniumframework.com/decision-models/choose-automation-solution-2/`](http://www.seleniumframework.com/decision-models/choose-automation-solution-2/).\n\
    \n## Mobile Test Environment\n\nMobile apps like web apps need an environment\
    \ to run on. The environment is a function of hardware and software. To test a\
    \ mobile app’s functionality, you need a mobile lab that can emulate a real-world\
    \ scenario—i.e., a user operating on a mobile app and the workflows being executed.\
    \ Mobile test environments can be complex to emulate, because the experience is\
    \ controlled in a chain, and the individual links are owned by multiple entities.\
    \ For example, the network bandwidth is controlled by the telecom providers, the\
    \ software experience is controlled by Google and its Android partners, and so\
    \ on. You’ll explore the considerations that matter while interacting with a mobile\
    \ test environment in the following sections.\n\n### Real Devices vs. Emulators/Simulators\n\
    \nOne of the biggest challenges with mobile testing is device support. The number\
    \ of models and the types of smartphones are increasing by the day and growing\
    \ at an accelerating pace. There are differences between devices and which devices\
    \ to test is not an easy challenge to solve. It is dependent on identifying the\
    \ compatibility matrix as early as possible in the project, yet that becomes a\
    \ challenge to collect as it is not static.\n\nHowever, you need to start narrowing\
    \ it all down with an initial list.\n\n`Emulators`/`simulators` cannot emulate\
    \ every feature of a real device—pixel perfect, phone hardware quirks, etc. In\
    \ general, the software representation of underlying hardware in Android world\
    \ is called an `emulator` (as opposed to a `simulator` in the iOS world).\n\n\
    The test environment for mobile devices involves a mix of real devices and `emulators`/`simulators`\
    \ to get the test coverage you expect—of course, the tradeoff is with cost.\n\n\
    ### Initial Manual Testing on a Local Android Real Device\n\nIn the case of a\
    \ local Android device, use the following steps to experience the first build\
    \ of an app.\n\nAndroid SDK installed on a Windows or Mac:\n\n1.  Insure that\
    \ the SDK is updated with the latest device drivers. For the Mac, my experience\
    \ has been relatively easier with the device drivers; however, with Windows, I\
    \ had to explicitly install the driver by going to the handset device manufacturer's\
    \ web site.\n2.  From the source code perspective, the attribute `android:debuggable=true`\
    \ should be set.\n3.  On the actual device, navigate to Settings ➤ Developer Options\
    \ ➤ Enable USB Debugging and set that to True. If the setting is not found, navigate\
    \ to Settings ➤ About Phone and click Build Number seven times. That should bring\
    \ up the option.\n4.  Once the device is connected, a dialog box will appear on\
    \ the device. Accept the message to allow communication.\n5.  A quick verification\
    \ step is to type `adb devices` from the terminal (the `adb` binary is located\
    \ inside the SDK folder inside `platform-tools` directory).\n\n### Initial Manual\
    \ Testing on a Local Android Emulator\n\nUse the Android Virtual Device Manager\
    \ to create various Android virtual devices with different devices, SDK versions,\
    \ and many more hardware characteristics.\n\nInvoke the `emulator` as follows:\n\
    \n- Navigate to Android SDK `folder/tools/` to locate the `emulator` binary.\n\
    - The `emulator -avd avd_name` command invokes the previously created AVD.\n-\
    \ I found it easier to first create an AVD configuration from IDE like Eclipse\
    \ or IntelliJ, because the workflow is easier and the complex details are abstracted.\n\
    \n### Further Manual Testing in the Cloud\n\nYou already know that it is almost\
    \ impossible to have every device, hardware, and software and maintain a full-blown\
    \ heterogeneous mobile test environment, as well as certify all devices and `emulators`\
    \ for your mobile app. As you scale, you have to depend on cloud services.\n\n\
    - Start using Sauce Labs. Sauce Labs natively supports `Appium` and that helps\
    \ you be familiar with the tool for the next phase of automation.\n- Perfecto\
    \ mobile is a fast growing service in terms of its coverage for mobile real devices\
    \ and worth taking a look if you are an enterprise, as the cost vs. benefit analysis\
    \ works well for large companies.\n- Amazon Device Lab has many options since\
    \ early 2017 and the service is maturing with support for `Appium` and similar\
    \ automation tools without leaving the context of Amazon Web Services Console.\n\
    - Google Device Lab is a great option, if you are invested fully in Android mobile\
    \ apps. The Google quality of experience is instantly realized, but bear in mind\
    \ that the Google Cloud is slowly adding support for software automation frameworks\
    \ like `Appium` and `Calabash` and would take a little bit more time as that is\
    \ not the core area they focused on. The purpose of Device Lab is to provide access\
    \ to real devices in the cloud, not necessarily compete with Sauce Labs and Perfecto.\n\
    \n# 3. CI Pattern with Jenkins and Android\n\nThis chapter introduces architectural\
    \ patterns and covers a specific continuous integration pattern that you will\
    \ learn to implement in subsequent chapters. The chapter goes through high-level\
    \ architecture images of the pattern to help you picture it mentally. As you progress\
    \ through the chapter, you’ll see the steps needed to configure the feedback loop(s)\
    \ that help you model and implement the pattern. It is important to complete the\
    \ tools installation described in Chapter [1](#A435441_1_En_1_Chapter.html) before\
    \ starting this chapter.\n\n## What Is Continuous Integration?\n\nContinuous integration\
    \ (CI) is a development practice that requires developers to integrate code into\
    \ a shared repository several times a day. Each check-in is then verified by an\
    \ automated build, allowing teams to detect problems early. There are similar\
    \ concepts, such as continuous deployment and continuous delivery. However, to\
    \ keep this conversation simple, what I mean by continuous integration in this\
    \ book involves integration of changes into the source code, building and deploying\
    \ the binaries, and delivering the binaries to a target environment where end\
    \ users can interact with the app.\n\n## Feedback Loops\n\nAs discussed in Chapter\
    \ [1](#A435441_1_En_1_Chapter.html), feedback loops can be implemented using the\
    \ `Jenkins` tool. Images are provided to give you an idea about each build step\
    \ inside the `Jenkins` UI interface.\n\n> **Note**  \n> I used `Jenkins 1.642.1`\
    \ version. If you installed a different version of `Jenkins`, make sure you select\
    \ the free style job. The interface should be the same."
  raw: '### Testing Pyramid


    The testing pyramid helps in terms of having conversations around how much and
    what priorities do different kinds of testing have in a project. See Figure [2-3](#A435441_1_En_2_Chapter.html#Fig3).


    ![A435441_1_En_2_Fig3_HTML.jpg](A435441_1_En_2_Fig3_HTML.jpg)


    Figure 2-3.


    The testing pyramid


    In the context of mobile testing (most mobile apps at the time of writing this
    book focus on the GUI layer), the pyramid can be read as follows:


    *   The confidence while building the app (work-in-progress) is enhanced with
    more tests at the bottom of the pyramid. Hence, automated unit tests that execute
    successfully give confidence that the unit/component is a higher quality.

    *   Since a software application is a network of components, integration points
    between the components become important as you race toward release to production.

    *   Finally, the user experiences the GUI of the mobile app, hence from a user’s
    perspective, automated GUI tests give the highest confidence in quality. (For
    example, if a component at the lower layer breaks, the user’s experience will
    be felt at the GUI layer.)

    *   The confidence in the overall system is enhanced by successfully running tests
    from lower to higher layers in the testing pyramid.

    *   The testing pyramid also articulates the relative volume of tests to be written
    at various layers of the application.


    Further reading on the testing pyramid can be found at [`http://www.seleniumframework.com/decision-models/choose-automation-solution-2/`](http://www.seleniumframework.com/decision-models/choose-automation-solution-2/)
    .


    ## Mobile Test Environment


    Mobile apps like web apps need an environment to run on. The environment is a
    function of hardware and software. To test a mobile app’s functionality, you need
    a mobile lab that can emulate a real-world scenario—i.e., a user operating on
    a mobile app and the workflows being executed. Mobile test environments can be
    complex to emulate, because the experience is controlled in a chain, and the individual
    links are owned by multiple entities. For example, the network bandwidth is controlled
    by the telecom providers, the software experience is controlled by Google and
    its Android partners, and so on. You’ll explore the considerations that matter
    while interacting with a mobile test environment in the following sections.


    ### Real Devices vs. Emulators/Simulators


    One of the biggest challenges with mobile testing is device support. The number
    of models and the types of smartphones are increasing by the day and growing at
    an accelerating pace. There are differences between devices and which devices
    to test is not an easy challenge to solve. It is dependent on identifying the
    compatibility matrix as early as possible in the project, yet that becomes a challenge
    to collect as it is not static.


    However, you need to start narrowing it all down with an initial list.


    Emulators/simulators cannot emulate every feature of a real device—pixel perfect,
    phone hardware quirks, etc. In general, the software representation of underlying
    hardware in Android world is called an emulator (as opposed to a simulator in
    the iOS world).


    The test environment for mobile devices involves a mix of real devices and emulators/simulators
    to get the test coverage you expect—of course , the tradeoff is with cost.


    ### Initial Manual Testing on a Local Android Real Device


    In the case of a local Android device, use the following steps to experience the
    first build of an app .


    Android SDK installed on a Windows or Mac:


    1.  Insure that the SDK is updated with the latest device drivers. For the Mac,
    my experience has been relatively easier with the device drivers; however, with
    Windows, I had to explicitly install the driver by going to the handset device
    manufacturer''s web site.  

    2.  From the source code perspective, the attribute `android:debuggable=true`
    should be set.  

    3.  On the actual device, navigate to Settings ➤ Developer Options ➤ Enable USB
    Debugging and set that to True. If the setting is not found, navigate to Settings
    ➤ About Phone and click Build Number seven times. That should bring up the option.
     

    4.  Once the device is connected, a dialog box will appear on the device. Accept
    the message to allow communication.  

    5.  A quick verification step is to type `adb` devices from the terminal (the
    `adb` binary is located inside the SDK folder inside `platform-tools` directory).


    ### Initial Manual Testing on a Local Android Emulator


    Use the Android Virtual Device Manager to create various Android virtual devices
    with different devices, SDK versions, and many more hardware characteristics.


    Invoke the emulator as follows:


    *   Navigate to Android SDK `folder/tools/` to locate the emulator binary.

    *   The `emulator -avd avd_name` command invokes the previously created AVD.

    *   I found it easier to first create an AVD configuration from IDE like Eclipse
    or IntelliJ, because the workflow is easier and the complex details are abstracted.


    ### Further Manual Testing in the Cloud


    You already know that it is almost impossible to have every device, hardware,
    and software and maintain a full-blown heterogeneous mobile test environment,
    as well as certify all devices and emulators for your mobile app. As you scale,
    you have to depend on cloud services .


    *   Start using Sauce Labs. Sauce Labs natively supports Appium and that helps
    you be familiar with the tool for the next phase of automation.

    *   Perfecto mobile is a fast growing service in terms of its coverage for mobile
    real devices and worth taking a look if you are an enterprise, as the cost vs.
    benefit analysis works well for large companies.

    *   Amazon Device Lab has many options since early 2017 and the service is maturing
    with support for Appium and similar automation tools without leaving the context
    of Amazon Web Services Console.

    *   Google Device Lab is a great option, if you are invested fully in Android
    mobile apps. The Google quality of experience is instantly realized, but bear
    in mind that the Google Cloud is slowly adding support for software automation
    frameworks like Appium and Calabash and would take a little bit more time as that
    is the not the core area they focused on. The purpose of Device Lab is to provide
    access to real devices in the cloud, not necessarily compete with Sauce Labs and
    Perfecto .


    # 3. CI Pattern with Jenkins and Android


    This chapter introduces architectural patterns and covers a specific continuous
    integration pattern that you will learn to implement in subsequent chapters. The
    chapter goes through high-level architecture images of the pattern to help you
    picture it mentally. As you progress through the chapter, you’ll see the steps
    needed to configure the feedback loop(s) that help you model and implement the
    pattern. It is important to complete the tools installation described in Chapter
    [1](#A435441_1_En_1_Chapter.html) before starting this chapter.


    ## What Is Continuous Integration?


    Continuous integration (CI) is a development practice that requires developers
    to integrate code into a shared repository several times a day. Each check-in
    is then verified by an automated build, allowing teams to detect problems early.
    There are similar concepts, such as continuous deployment and continuous delivery
    . However, to keep this conversation simple, what I mean by continuous integration
    in this book involves integration of changes into the source code, building and
    deploying the binaries, and delivering the binaries to a target environment where
    end users can interact with the app.


    ## Feedback Loops


    As discussed in Chapter [1](#A435441_1_En_1_Chapter.html), feedback loops can
    be implemented using the Jenkins tool . Images are provided to give you an idea
    about each build step inside the Jenkins UI interface.


    Note


    I used Jenkins 1.642.1 version. If you installed a different version of Jenkins,
    make sure you select the free style job. The interface should be the same.'
  trans: "\n### 测试金字塔\n\n测试金字塔有助于团队讨论项目中不同类型测试的投入比例和优先级。请参见图 2-3。\n\n![A435441_1_En_2_Fig3_HTML.jpg](img/A435441_1_En_2_Fig3_HTML.jpg)\n\
    \n图 2-3. 测试金字塔\n\n在移动测试的背景下（撰写本书时，大多数移动应用都聚焦于 GUI 层），该金字塔可以解读如下：\n\n-   处于金字塔底层的测试越多，构建应用过程中的信心就越强。因此，成功执行的自动化单元测试能带来更高品质的单元/组件的信心。\n\
    -   由于软件应用是组件的网络，在向生产环境发布冲刺时，组件之间的集成点变得至关重要。\n-   最终，用户通过移动应用的 GUI 获得体验，因此从用户角度来看，自动化\
    \ GUI 测试能带来对质量最高的信心。（例如，如果底层某个组件出现故障，用户将在 GUI 层感受到影响。）\n-   通过成功运行从金字塔底层到顶层的测试，可以增强对整个系统的信心。\n\
    -   测试金字塔还明确了在应用各层应编写的测试的相对数量。\n\n关于测试金字塔的更多内容，可以参阅 [`http://www.seleniumframework.com/decision-models/choose-automation-solution-2/`](http://www.seleniumframework.com/decision-models/choose-automation-solution-2/)。\n\
    \n## 移动测试环境\n\n移动应用和网页应用一样，需要运行环境。该环境是硬件和软件的函数。要测试移动应用的功能，你需要一个能够模拟真实世界场景的移动实验室——即模拟用户操作移动应用并执行工作流程。移动测试环境可能难以模拟，因为体验由一条链控制，而各个环链由多个实体负责。例如，网络带宽由电信运营商控制，软件体验由谷歌及其\
    \ Android 合作伙伴控制，等等。在接下来的章节中，你将探讨与移动测试环境交互时的关键注意事项。\n\n### 真实设备 vs. 模拟器\n\n移动测试面临的最大挑战之一是设备支持。智能手机的型号和种类与日俱增，且增长速度正在加快。设备之间存在差异，测试哪些设备并非一个容易解决的挑战。这取决于在项目中尽早确定兼容性矩阵，但由于其并非静态，收集起来也颇具挑战。\n\
    \n不过，你需要从初步列表开始缩小范围。\n\n`模拟器`无法模拟真实设备的所有特性——如像素级精度、手机硬件 quirks 等。通常，Android 世界中底层硬件的软件表示被称为`模拟器`（与\
    \ iOS 世界中的`模拟器`相对）。\n\n移动设备的测试环境需要混合使用真实设备和`模拟器`，以达到你期望的测试覆盖率——当然，这需要权衡成本。\n\n\
    ### 在本地 Android 真实设备上进行初始手动测试\n\n对于本地 Android 设备，请使用以下步骤体验应用的第一个构建版本。\n\n在 Windows\
    \ 或 Mac 上安装 Android SDK：\n\n1.  确保 SDK 已更新为最新的设备驱动程序。在 Mac 上，设备驱动程序的体验相对简单；但在\
    \ Windows 上，我必须前往手机设备制造商的网站手动安装驱动程序。\n2.  从源代码角度来看，应设置属性 `android:debuggable=true`。\n\
    3.  在真实设备上，导航至“设置” ➤ “开发者选项” ➤ “启用 USB 调试”并设置为“开启”。如果找不到该设置，请导航至“设置” ➤ “关于手机”，并连续点击“版本号”七次。随后应会出现该选项。\n\
    4.  连接设备后，设备上会弹出一个对话框。接受该消息以允许通信。\n5.  快速验证步骤是在终端中键入 `adb devices`（`adb` 二进制文件位于\
    \ SDK 文件夹内的 `platform-tools` 目录中）。\n\n### 在本地 Android 模拟器上进行初始手动测试\n\n使用 Android\
    \ 虚拟设备管理器创建各种具有不同设备、SDK 版本和更多硬件特性的 Android 虚拟设备。\n\n按如下方式调用`模拟器`：\n\n-   导航至 Android\
    \ SDK `folder/tools/` 以找到 `emulator` 二进制文件。\n-   `emulator -avd avd_name` 命令会调用之前创建的\
    \ AVD。\n-   我发现先从 Eclipse 或 IntelliJ 等 IDE 创建 AVD 配置更容易，因为工作流程更简单，且复杂细节已被抽象。\n\
    \n### 在云端进行进一步手动测试\n\n你已经知道，几乎不可能拥有每一种设备、硬件和软件，维护一个全面的异构移动测试环境，并为移动应用认证所有设备和`模拟器`。随着规模扩大，你必须依赖云服务。\n\
    \n-   开始使用 Sauce Labs。Sauce Labs 原生支持 `Appium`，这有助于你熟悉该工具，为下一阶段的自动化做准备。\n-   Perfecto\
    \ mobile 在移动真实设备覆盖范围方面增长迅速，如果你是大型企业，值得考虑，因为其成本效益分析对大型公司很有利。\n-   Amazon Device\
    \ Lab 自 2017 年初起提供了许多选项，该服务正在不断成熟，支持 `Appium` 及类似自动化工具，且无需脱离 Amazon Web Services\
    \ 控制台环境。\n-   如果你专注于 Android 移动应用，Google Device Lab 是一个极佳选择。谷歌的品质体验立即可感知，但请记住，Google\
    \ Cloud 正在缓慢增加对 `Appium` 和 `Calabash` 等软件自动化框架的支持，这需要更多时间，因为这不是其核心关注领域。Device\
    \ Lab 的目的是提供云端真实设备的访问权限，而非与 Sauce Labs 和 Perfecto 竞争。\n\n# 3. 使用 Jenkins 和 Android\
    \ 的 CI 模式\n\n本章介绍架构模式，并涵盖一个具体的持续集成模式，你将在后续章节中学习如何实现它。本章通过模式的高层架构图帮助你建立直观印象。随着章节的深入，你将看到配置反馈回路所需的步骤，这些步骤有助于你建模并实现该模式。在开始本章之前，务必先完成第\
    \ 1 章中描述的工具安装。\n\n## 什么是持续集成？\n\n持续集成是一种开发实践，要求开发者每天多次将代码集成到共享仓库中。每次代码提交都会通过自动化构建进行验证，使团队能够尽早发现问题。还有一些类似的概念，如持续部署和持续交付。但为了保持简单，本书中持续集成的含义包括：将变更集成到源代码、构建和部署二进制文件，并将二进制文件交付到目标环境，让最终用户能够与应用交互。\n\
    \n## 反馈回路\n\n如第 1 章所述，可以使用 `Jenkins` 工具实现反馈回路。文中提供了图片，让你了解 `Jenkins` UI 界面中每个构建步骤。\n\
    \n> **注意**  \n> 我使用的是 `Jenkins 1.642.1` 版本。如果你安装了不同版本的 `Jenkins`，请确保选择自由风格项目。界面应该相同。\n"
- fmt: '### Feedback Loop 1: Build


    Figure [3-1](#A435441_1_En_3_Chapter.html#Fig1) shows the build feedback loop
    in the overall architecture diagram. This is where you build the app.


    ![A435441_1_En_3_Fig1_HTML.jpg](A435441_1_En_3_Fig1_HTML.jpg)


    Figure 3-1. The build feedback loop


    Based on the overall architecture, the first feedback loop does the following:


    1. Checks out the code.

    2. Applies (any) configuration.

    3. Compiles.

    4. Runs the unit tests (if any).

    5. Packages and uploads the code.

    6. Triggers the code quality analysis.


    #### Jenkins Job1 Configuration


    Figure [3-2](#A435441_1_En_3_Chapter.html#Fig2) shows how a Jenkins Job is configured
    for the first feedback loop.


    ![A435441_1_En_3_Fig2_HTML.jpg](A435441_1_En_3_Fig2_HTML.jpg)


    Figure 3-2. The build job rotation


    Name the Jenkins job and specify the `Log Rotation` strategy.


    Define an optional Boolean flag called `UPLOAD` to control the decision of uploading
    the build artifact to Nexus. The default value is unchecked. If you check it,
    then the build artifact gets uploaded to Nexus. See Figure [3-3](#A435441_1_En_3_Chapter.html#Fig3).


    ![A435441_1_En_3_Fig3_HTML.jpg](A435441_1_En_3_Fig3_HTML.jpg)


    Figure 3-3. The build Nexus flag


    Enter the Nexus credentials to interact with Nexus; see Figure [3-4](#A435441_1_En_3_Chapter.html#Fig4).


    ![A435441_1_En_3_Fig4_HTML.jpg](A435441_1_En_3_Fig4_HTML.jpg)


    Figure 3-4. The build Nexus credentials


    Enter the GitHub repository URL representing the source code, as shown in Figure
    [3-5](#A435441_1_En_3_Chapter.html#Fig5).


    ![A435441_1_En_3_Fig5_HTML.jpg](A435441_1_En_3_Fig5_HTML.jpg)


    Figure 3-5. The build source control


    Check the boxes to delete the workspace before the build starts and to mask passwords,
    as shown in Figure [3-6](#A435441_1_En_3_Chapter.html#Fig6).


    ![A435441_1_En_3_Fig6_HTML.jpg](A435441_1_En_3_Fig6_HTML.jpg)


    Figure 3-6. The build workspace and mask password checkboxes


    Set the Nexus password as shown in Figure [3-7](#A435441_1_En_3_Chapter.html#Fig7),
    so that it can be masked.


    ![A435441_1_En_3_Fig7_HTML.jpg](A435441_1_En_3_Fig7_HTML.jpg)


    Figure 3-7. The build Nexus password


    Set `JAVA_HOME`, `ANDROID_HOME`, `GRADLE_HOME` (see Figure [3-8](#A435441_1_En_3_Chapter.html#Fig8)
    and the following code) and build the project. If any unit tests are written,
    execute that as the next build step. In this case, there are no unit tests. (Note:
    `SONAR_RUNNER` in this job is redundant; you’ll use Sonar in a downstream Jenkins
    job.)


    ![A435441_1_En_3_Fig8_HTML.jpg](A435441_1_En_3_Fig8_HTML.jpg)


    Figure 3-8. The build Nexus password


    ```bash

    #!/bin/bash

    ## uncomment set -xv for debugging

    #set -xv

    export PATH=$PATH:$HOME/.rvm/bin

    [[ -s "$HOME/.rvm/scripts/rvm" ]] && source "$HOME/.rvm/scripts/rvm"

    pwd

    rvm list

    curl -u $NEXUS_USERNAME:$NEXUS_PASSWORD -O https://nexus.com/nexus/service/local/repositories/snapshots/content-mobile/MOBILE_SNAPSHOT

    tar xvzf MOBILE_SNAPSHOT

    cp app-debug.apk ./features/support/resources

    bundle exec cucumber features/android.feature DEVICE=$DEVICE -t @tag_name

    ```


    Upload the build artifact (i.e., `app-debug.apk`) to Nexus so that it can be used
    further.


    This example does not version this artifact with the Jenkins build number, because
    this is a snapshot. However, feel free to name the artifact aligned with your
    versioning strategy. See Figure [3-9](#A435441_1_En_3_Chapter.html#Fig9).


    ![A435441_1_En_3_Fig9_HTML.jpg](A435441_1_En_3_Fig9_HTML.jpg)


    Figure 3-9. The build upload artifact


    Kick off the downstream job to trigger SonarQube analysis, which is feedback loop
    2.


    The `UPSTREAM_BUILD_NUMBER` strategy is to pass the value to the downstream job
    to pull the "correct" Nexus build artifact, as shown in Figure [3-10](#A435441_1_En_3_Chapter.html#Fig10).


    ![A435441_1_En_3_Fig10_HTML.jpg](A435441_1_En_3_Fig10_HTML.jpg)


    Figure 3-10. The build trigger job


    Finally, save the job, as shown in Figure [3-11](#A435441_1_En_3_Chapter.html#Fig11).


    ![A435441_1_En_3_Fig11_HTML.jpg](A435441_1_En_3_Fig11_HTML.jpg)


    Figure 3-11. The build save job


    #### Feedback (Execution Results)


    After running the Jenkins job, the console output looks like this (see Figure
    [3-12](#A435441_1_En_3_Chapter.html#Fig12) also):


    ![A435441_1_En_3_Fig12_HTML.jpg](A435441_1_En_3_Fig12_HTML.jpg)


    Figure 3-12. Build results


    ```bash

