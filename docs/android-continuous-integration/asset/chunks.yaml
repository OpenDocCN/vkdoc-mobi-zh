- fmt: '# 7. Deploy or Install Android App


    In Chapters [5](#A435441_1_En_5_Chapter.html) and [6](#A435441_1_En_6_Chapter.html),
    you learned that the output of the build is the `.apk` file and the target where
    you want to install the `.apk` file has to be connected first. In this chapter,
    you will learn how to deploy the Android app to the target device that is connected
    to the Mac.


    ## Connect and Identify the Target


    You can identify the emulators or devices that are connected to the machine using
    these commands:


    ```

    Anyones-mac-mini: pmacharl$ adb devices

    List of devices attached

    emulator-5554 device

    emulator-5556 device

    emulator-5558 device

    00a219ae09d05912 device

    ```


    Each line after the `List of devices attached` line represents either an emulator
    or a device. Emulator has the word `emulator-xx` prefixed and the device has a
    serial number.


    ### Direct Commands to Target


    `adb` can direct commands to a specific target using this syntax:


    ```

    adb -s <deviceSerialNumber>

    ```


    If there is only one device connected, use the `-d` switch. Similarly, if there
    is only one emulator connected, use the `-e` switch.


    To be on the safe side, using the `-s` switch will ensure that there is only one
    matched target.


    ### Install on the Emulator


    Install on `emulator-5554`:


    ```

    adb -s emulator-5556 install myapp.apk

    ```


    ### Install on Real Device


    Install on device `<deviceSerialNumber>`:


    ```

    adb -s 00a219ae09d05912 install myapp.apk

    ```


    ## Command-Line Demonstration


    The commands are shown as follows.


    ```

    adb -s <deviceSerialNumber> install app-debug.apk

    adb kill-server

    adb start-server

    adb devices

    ```


    Sometimes, if there is too much delay (more than 5 min), you might have to kill
    `adb` and start over again. Most of the time, you don’t have to do that, except
    if you leave the device running for a week or so. That should anyways be handled
    as part of your mobile device lab set up, where you refresh/reset the `adb` connections
    at a certain interval. Figure [7-1](#A435441_1_En_7_Chapter.html#Fig1) shows the
    demo.


    ![A435441_1_En_7_Fig1_HTML.jpg](A435441_1_En_7_Fig1_HTML.jpg)


    Figure 7-1. `adb` commands demo


    ## Android Studio Demonstration


    If you decided to use Android Studio, click the Run button next to the app icon.
    The dialog box shown in Figure [7-2](#A435441_1_En_7_Chapter.html#Fig2) should
    appear.


    ![A435441_1_En_7_Fig2_HTML.jpg](A435441_1_En_7_Fig2_HTML.jpg)


    Figure 7-2. Android Studio app installation


    Click OK. You will be able to see the exact commands in the terminal, as shown
    in Figure [7-3](#A435441_1_En_7_Chapter.html#Fig3). Copy the `.apk` file to the
    `/data/*` folder in the device and then install the app. Automatically attach
    the debugger to the running process and so on. The output should look similar
    to Figure [7-3](#A435441_1_En_7_Chapter.html#Fig3). You have plenty of information
    here to munge, like `logcat tab`, `adb log` files, and so on.


    ![A435441_1_En_7_Fig3_HTML.jpg](A435441_1_En_7_Fig3_HTML.jpg)


    Figure 7-3. Installation console


    At this point, you should be able to see activity on your mobile device and the
    app should be launched with the home activity screen displayed.


    # 8. Working with Appium


    This chapter covers more about the Appium `tool/framework/` library and explains
    the what, why and how, so that you will be ready to automate the testing in Chapter
    [9](#A435441_1_En_9_Chapter.html). For detailed information, you can visit Appium''s
    web site at [`http://appium.io/`](http://appium.io/).


    ## Why Appium?


    This section explains the reasons behind why Appium is my choice for an automated
    testing platform. You’ve looked at Appium a little in Chapter [2](#A435441_1_En_2_Chapter.html),
    and this chapter gets into much more detail.


    * **WebDriver JSON wire protocol**: Appium is designed based on the WebDriver
    protocol, which is set to become a W3C protocol and aligns with the various frameworks
    that exist with Selenium.

    * **Multiple programming languages**: Since WebDriver is HTTP over wire, a WebDriver
    compatible language can work with Appium. Hence, much like Selenium, Appium client
    libraries exist for Ruby, Java, Python, PHP, JavaScript, and so on. Even with
    a newer programming language like Go, you have to implement the contract as defined
    by WebDriver protocol and it works.

    * **Release app vs. Debug app**: While unit testing tests the paths having access
    to source code, the end user experience has to be tested with a release app build.
    Appium works on release app builds, which means you’ll have relatively greater
    confidence in integration and end user test automation scenarios.

    * **Open source**: Since it is open source, there is a huge community supporting
    and resolving issues. While some might consider this tough initially, open source
    with crowd sourcing is the way the software world is moving. It makes sense to
    invest in such technologies that are flexible and put the decision power in the
    hands of the developer.


    ## Appium Concepts


    In the next few sections, you’ll learn about the fundamental architectural paradigms
    on which Appium is built. As you read these sections, you might not be surprised
    to find a strong correlation between Selenium Web Driver Architecture and Appium
    (i.e., assuming that you are not just a user of Selenium library, but at some
    point had to dig deep enough into the Selenium source code or its architecture).
    It is not a prerequisite to understand this analogy, but it will help you when
    debugging intricate details. (For example, try capturing the remote IP address
    of the node on which the test is executing.)


    ### Client/Server Architecture


    Appium is at its heart a web server that exposes a REST API. It receives connections
    from a client, listens for commands, executes those commands on a mobile device,
    and responds with an HTTP response representing the result of the command execution.
    The fact that you have a client/server architecture leads to a lot of possibilities.
    You can write your test code in any language that has a HTTP client API, but it
    is easier to use one of the Appium client libraries. You can put the server on
    a different machine than your tests are running on. You can write test code and
    rely on a cloud services like Sauce Labs to receive and interpret the commands.


    ### Session


    Automation is always performed in the context of a session. Clients initiate a
    session with a server in ways specific to each library, but they all end up sending
    a `POST /session` request to the server, with a JSON object called the "desired
    capabilities" object. At this point, the server will start the automation session
    and respond with a session ID, which is used for sending additional commands.


    ### Desired Capabilities


    Desired capabilities are a set of keys and values (i.e., a map or hash) sent to
    the Appium server to tell it what kind of automation session you''re interested
    in starting up. There are also various capabilities that can modify the behavior
    of the server during automation. For example, you might set the `platformName`
    capability to Android to tell Appium that you want an Android session. Or you
    might set the `chromeAllowPopups` capability to `true` in order to ensure that,
    during a Safari automation session, you''re allowed to use JavaScript to open
    new windows. See the capabilities document for the complete list of capabilities
    available for Appium.


    ### Appium Server


    Appium is a server written in Node.js. It can be built and installed from source
    or installed directly from NPM.


    ### Appium Clients


    There are client libraries (in Java, Ruby, Python, PHP, JavaScript, and C#) that
    support Appium''s extensions to the WebDriver protocol. When using Appium, you
    might want to use these client libraries instead of your regular WebDriver client
    because the community has already implemented most of the calls. You can view
    the full list of libraries at [`https://github.com/appium/appium/blob/master/docs/en/about-appium/appium-clients.md`](https://github.com/appium/appium/blob/master/docs/en/about-appium/appium-clients.md).'
