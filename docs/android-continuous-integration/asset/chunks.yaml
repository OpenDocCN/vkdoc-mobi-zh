    图 9-4. 执行过程与代码对应关系


    要观看完整的执行视频，请访问 [`https://www.youtube.com/watch?v=In9sCFrv-D0&feature=youtu.be`](https://www.youtube.com/watch%3Fv=In9sCFrv-D0%26feature=youtu.be)。


    设备屏幕被导出，您可以在一个屏幕上看到服务器和目标执行情况。这是在移动端展示自动化价值时面临的挑战之一。对于 Web 端，由于浏览器在机器本地启动，因此相对更容易。


    ## 在 Sauce Labs 上执行测试


    当您继续执行测试并尝试增加在各设备上的覆盖率时，外形尺寸成为了一个关键问题。当然，您可以不断购买设备；但这样做没有太多的规模经济效益。如果能将维护设备这一非核心能力外包给服务提供商，岂不是很好？


    确实，市场上有许多提供商提供此类服务，包括 Sauce Labs、Perfecto Mobile 和 ExperiTest。本章以 Sauce Labs 为例，因为他们与
    Appium 保持一致。

