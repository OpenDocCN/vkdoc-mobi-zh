  trans: "\n### Appium.txt 文件\n\n使用 `appium.txt` 配置文件，在包含 `appium.txt` 的文件夹中键入 `arc`：\n\
    \n```\n# appium.txt\n[caps]\nplatformName = \"Android\"\ndeviceName = \"Android\"\
    \navd = \"Nexus_4_API_23\"\napp = \"\"\nappPackage = \"com.android.settings\"\n\
    appActivity = \".Settings\"\n[appium_lib]\nsauce_username = \"\"\nsauce_access_key\
    \ = \"\"\n```\n\n在命令行中一输入 `arc`，就会看到它开始处理，并且 AVD 将启动。（这里耐心是美德，AVD 的启动时间取决于你的机器配置。）\n\
    \n在命令行中，控制权会返回给 ARC (`pry`)，然后你可以通过 `appium_lib` 提供的 API 调用与 AVD 进行交互。参见图 8-12。\n\
    \n1.  所有可用命令的完整列表可在 [`https://github.com/appium/ruby_console`](https://github.com/appium/ruby_console)\
    \ 找到，并且该列表在不断更新。\n2.  `page_class`：\n\n    ```\n    Anyones-Mac-mini:arc_android\
    \ pmacharl$ arc\n    [1] pry(main)> page_class\n    22x android.widget.LinearLayout\n\
    \    10x android.widget.FrameLayout\n    10x android.widget.TextView\n    6x android.view.View\n\
    \    6x android.widget.RelativeLayout\n    6x android.widget.ImageView\n    4x\
    \ android.view.ViewGroup\n    1x android.widget.ScrollView\n    1x hierarchy\n\
    \    ```\n\n3.  Source:\n\n    ```\n    [2] pry(main)> source\n\n     id('android:id/decor_content_parent')\n\
    \    #\n    [4] pry(main)> id('android:id/decor_content_parent').methods\n   \
    \ [\n    [ 0] !() Selenium::WebDriver::Element\n    (BasicObject)\n    [ 1] !=(arg1)\
    \ Selenium::WebDriver::Element\n    (BasicObject)\n    [30] pry(main)> xpath('//android.widget.FrameLayout').get_page_class\n\
    \    \"15x android.widget.FrameLayout\\n11x android.widget.LinearLayout\\n8x android.widget.\n\
    \    TextView\\n6x android.view.View\\n6x android.widget.ImageView\\n1x android.widget.GridLayout\n\
    \    \\n1x android.widget.ScrollView\\n1x android.view.ViewGroup\\n1x android.widget.Relative\n\
    \    Layout\\n1x hierarchy\"\n    [31] pry(main)> xpath('//android.widget.FrameLayout').get_android_inspect\n\
    \    \"\\nandroid.widget.FrameLayout (1)\\n id: com.android.systemui:id/panel_holder\\\
    n\\nandroid\n    .widget.FrameLayout (2)\\n\n    ```\n\n![A435441_1_En_8_Fig12_HTML.jpg](img/A435441_1_En_8_Fig12_HTML.jpg)\n\
    \n图 8-12.\n\nAppium Ruby 控制台 (ARC)\n\n最后，如果你更倾向于直接使用 driver 对象（Selenium driver）而不是使用封装方法（例如之前使用的\
    \ `d()`），你可以直接访问该 driver 对象。\n\n```\ndriver.textfields\ndriver.find_element(:xpath,\
    \ \"//android.widget.FrameLayout\")\n```\n\n本节的要点是，你对 Appium 暴露的 API 练习得越多，掌握得越熟练，在编写脚本时用代码实现这些功能就会越容易。\n\
    \n### 使用 uiautomatorviewer\n\n在介绍 `uiautomatorviewer` 的章节中，我已经介绍了这个工具。现在我们来看看如何使用它来检查一个应用。\n\
    \n1.  在命令行中键入 `uiautomatorviewer` 以启动程序（`$ANDROID_HOME/platform-tools` 应在 `$PATH`\
    \ 中）。\n2.  点击“Device Screenshot (uiautomator Dump)”图标。\n3.  选择 `uiautomatorviewer`\
    \ 应从中获取 XML 屏幕截图的 Android 目标（`avd/device`）。\n4.  对于 AVD，所需时间比真机稍长。\n5.  之后，你可以看到树形层次结构，并在编写自动化脚本时使用这些属性进一步识别元素。参见图\
    \ 8-13。\n\n    ![A435441_1_En_8_Fig13_HTML.jpg](img/A435441_1_En_8_Fig13_HTML.jpg)\n\
    \n    图 8-13.\n\n    对目标设备进行内省\n\n在图 8-14 中，你可以使用以下任一定位器来识别 Appium 中显示时间的元素：\n\
    \n![A435441_1_En_8_Fig14_HTML.jpg](img/A435441_1_En_8_Fig14_HTML.jpg)\n\n图 8-14.\n\
    \n遍历应用程序 DOM\n\n```\nid('com.android.systemui:id/clock_view')\ntag('android.widget.TextView')\
    \ # 注意：在移动应用中，classname 就是 tag。\n```\n\n# 测试策略与执行\n\n在前面的章节中，你已经学会了如何在 Android\
    \ 设备上构建和部署应用。\n\n本章将详细介绍如何针对目标设备执行自动化测试（使用 Cucumber Gherkin 框架编写）。这是获取应用变更完整反馈的最后一步。\n\
    \n**注意**\n我们在这里讨论的是由外而内的测试。由内而外的测试（即单元测试）仅涉及开发人员。CI 的目标是获取最终用户感知的最大价值。因此，这里提到的测试是集成/端到端测试。\n\
    \n## 使用 Cucumber 进行持续测试自动化\n\n你可以选择任何你喜欢的测试框架。作为一个例子，我选择了 Cucumber（使用 Ruby），因为它让我能够先描述“做什么”（特性），然后再编写“怎么做”这一层（步骤定义），即技术细节部分。根据我的经验，我认为这能促进多角色之间的良好协作。如果你是一名开发人员并且是孤立地工作，请选择适合你需求的框架（`JUnit`、`rspec`、`testing`\
    \ 等）。以下链接可以帮助你理解 Cucumber 基础知识：\n\n-   为何使用 Cucumber：[`http://www.seleniumframework.com/cucumber-2/make-a-case/why-cucumber/`](http://www.seleniumframework.com/cucumber-2/make-a-case/why-cucumber/)\n\
    -   关于 ATDD、BDD 和 TDD 的信息：[`http://www.seleniumframework.com/cucumber-2/make-a-case/atdd-tdd-bdd/`](http://www.seleniumframework.com/cucumber-2/make-a-case/atdd-tdd-bdd/)\n\
    -   使用持续测试自动化：[`http://www.seleniumframework.com/cucumber-2/make-a-case/continuous-test-automation/`](http://www.seleniumframework.com/cucumber-2/make-a-case/continuous-test-automation/)\n\
    -   了解 Cucumber 的工作原理：[`http://www.seleniumframework.com/cucumber-2/make-a-case/how-cucumber-works-2/`](http://www.seleniumframework.com/cucumber-2/make-a-case/how-cucumber-works-2/)\n\
    -   安装 Cucumber：[`http://www.seleniumframework.com/cucumber-2/install-cucumber/`](http://www.seleniumframework.com/cucumber-2/install-cucumber/)\n\
    -   学习 Cucumber 的关键字：[`http://www.seleniumframework.com/cucumber-2/cucumber-keywords/`](http://www.seleniumframework.com/cucumber-2/cucumber-keywords/)\n\
    -   步骤定义：[`http://www.seleniumframework.com/cucumber-2/step-definitions/`](http://www.seleniumframework.com/cucumber-2/step-definitions/)\n\
    -   面向 Web 的基本 Ruby 教程：[`http://www.seleniumframework.com/introduction/what-is-ruby/`](http://www.seleniumframework.com/introduction/what-is-ruby/)\n\
    \n我不打算解释 Cucumber 及其基础知识，并假设你已具备基本了解并已访问过这些链接。\n\n## 高层思维导图\n\n在接下来的几个章节中，你将看到的代码的高层解释如下：\n\
    \n1.  你的 Android 构建过程将 `app-debug.apk` 放入 `./features/support/resources` 文件夹中。\n\
    2.  编写 Cucumber 特性。\n3.  完成上下文代码（`env.rb` 和 `hooks.rb`）。\n4.  在 `devices.yaml`\
    \ 中列出你的目标设备。\n5.  在 `emulators.yaml` 中列出你的目标模拟器。\n6.  定义一个模块，该模块返回所需的能力对象（代表设备/模拟器）以便与\
    \ Appium 服务器通信。\n7.  默认的 Cucumber 配置文件会生成 HTML 和 JSON 结果。\n8.  编写测试并为其添加标签，以便\
    \ `appPackage` 和 `appActivity` 既能针对待测应用，也能针对 Android 设备上的通用设置进行定义。（实际上不需要测试设置，但我们以此为示例来入门）。\n\
    \n## 测试框架\n\n这里使用的测试框架基于 Cucumber、Ruby 和`Appium_lib` gem。因此，我在特性/场景中描述“做什么”，在后台代码（`step_definitions`）中描述“怎么做”。\n\
    \n这与 ATDD（验收测试驱动开发）非常契合。\n"
- fmt: '### Git Repo and Folder Structure


    The git repository used for demonstrating test automation in this book can be
    found at [`https://github.com/machzqcq/ci_android_acceptancetests.git`](https://github.com/machzqcq/ci_android_acceptancetests.git).


    Figure [9-1](#A435441_1_En_9_Chapter.html#Fig1) shows the folder structure.


    - `ci_android_acceptancetests` is the Cucumber project root.

    - The `features` folder contains features.

    - The `step_definitions` folder contains the code-behind. In this case, it has
    two Ruby files. There can be any number and can be spread across files.

    - The `support` folder is the standard Cucumber support folder, i.e., the code
    in this folder is executed when the Cucumber process starts and the `resources`
    folder contains `app-debug.apk`, which is the output of the build process.

    - `env.rb` is usually the file where modules for the Cucumber project and any
    other context must be loaded.

    - `hooks.rb` contains the pre- and post-conditions for scenarios. You can put
    this in `env.rb` instead, but by convention, I use `hooks`.

    - `ci_android.feature` contains the scenarios or tests.

    - The `lib` folder is defined by this framework to store the code that is mixed
    in. It also contains configuration definitions for devices and emulators.

    - `devices.yaml` contains device definitions.

    - `emulators.yaml` contains emulator definitions.

    - `capabilities.rb` contains the module that returns the desired capabilities
    object.

    - The `screen_helper.rb` module is for future use to apply page object patterns.

    - The `scripts` folder is to quickly test something before you formalize it in
    features. It’s not necessary, but it’s helpful for writing quick snippets of code.

    - `contact_screen.png` was a screenshot taken by one of the scenarios.

    - `cucumber.yml` is the configuration file for Cucumber.

    - `example.mp4` is the screen capture taken when executing the scenario. (See
    the `adb` tutorial section on how to take a screen recording).

    - `Gemfile` contains the gems used in this project.

    - `Gemfile.lock` is created when you run `bundle install`.

    - `Rakefile` is not used at this point, although you can define higher-level tasks.

    - `README.md` contains the readme file for this project.

    - `reports.json` is the JSON-formatted output of Cucumber.

    - `reports.html` is the HTML-formatted output of Cucumber.


