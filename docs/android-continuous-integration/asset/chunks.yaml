    # 4. Android 系统设置


    第 3 章重点介绍了如何快速实现快速反馈循环，而本章将介绍最小可行产品（MVP）所需的内容。Android 世界拥有能够满足开发者各种需求的优秀工具和实用程序。


    你将安装以下内容，以便学习构建应用：


    - Java

    - Android SDK

    - Android Studio

    - Gradle


    ## 安装 Java


    本节将介绍 Java 平台以及如何安装它。


    ### JRE 与 JDK 与 SE


    在本节中，你将下载并安装 Java 开发工具包（`JDK`）。作为快速复习，你可能会疑惑需要哪个 Java 包。


    - `JDK`：软件开发人员通常倾向于使用 `JDK`。它包含用于故障排除和监控应用程序的 Java 运行时和库。

    - `SE`（标准版）：管理员通常使用 `SE` 版本。

    - `JRE`（Java 运行时环境）：这是最终用户运行 Java 应用程序所使用的最低版本。

