- fmt: '## Types of Mobile Apps


    There are different types of mobile apps that meet various needs. The decision
    on the type of mobile app is based on multiple factors. Here are the types that
    exist at the time of writing this book (see Figure [1-8](#A435441_1_En_1_Chapter.html#Fig8)).


    ![A435441_1_En_1_Fig8_HTML.jpg](A435441_1_En_1_Fig8_HTML.jpg)


    Figure 1-8. Comparing mobile app types


    - **Native apps**: Mobile apps that are entirely developed using the tool stack
    available in the respective ecosystem (Apple, Google, Windows, etc.) are called
    native apps. The tool stack could mean the programming language, the SDK, the
    underlying platform, and so on. Native apps by far give the best user experience
    and performance.

    - **Web apps/HTML5 apps**: Apps that use web technologies like HTML5, JavaScript,
    and CSS that align with w3c standards are called web apps. Web apps do not heavily
    rely on native platform support and hence are more cross-platform and portable.
    That said, there is significant opportunity for improvement in the areas of secure
    local storage and access to device functionalities, like accelerometers, scanners,
    cameras, etc.

    - **Hybrid apps**: Hybrid, as the name suggests, takes the positives of both web
    and native apps and brings them together.


    You can read more at [`https://dzone.com/articles/state-native-vs-web-vs-hybrid`](https://dzone.com/articles/state-native-vs-web-vs-hybrid).
    This book covers native Android mobile apps.


    # 2. Mobile Test Automation


    This chapter makes a case for mobile test automation and why it makes sense to
    invest in automation from the onset of your mobile app development process. The
    chapter also compares and contrasts the benefits of automation over manual testing
    practices. But first, you’ll learn about a few evolutionary concepts, some of
    which are borrowed from web application test automation.


    ## The WebDriver Protocol


    WebDriver is a remote control interface that enables introspection and control
    of user agents. It provides a platform and language-neutral wire protocol as a
    way for out-of-process programs to remotely instruct the behavior of web browsers.
    A brief processing model is explained.


    The remote end (see [`https://www.w3.org/TR/webdriver/#dfn-remote-end`](https://www.w3.org/TR/webdriver/%23dfn-remote-end))
    is an HTTP server reading requests from the client and writing responses, typically
    over a TCP socket. For the purposes of this discussion, I model the data transmission
    between a particular local end and remote end with a connection to which the remote
    end may write and read bytes.


    After such a connection has been established, a remote end must run the following
    steps:


    1. Read bytes from the connection until an HTTP request can be constructed from
    the data.

    2. The HTTP request is matched with the request’s method and URL as parameters.

    3. If the request match is of type `error`, send an error and error code, then
    return to Step 1.

    4. Let the session ID be the corresponding variable from the URL variables.

    5. If the command is `New Session` (and doesn’t match the existing session’s ID),
    then go back to Step 1.

    6. Execute the request and collect the response object.

    7. Send the response code and the results to the local end and return to Step
    1.


    For further details on WebDriver Protocol, see [`https://w3c.github.io/webdriver/webdriver-spec.html`](https://w3c.github.io/webdriver/webdriver-spec.html).


    Selenium, the popular web test automation software, is based on the WebDriver
    protocol as its base layer. In fact, as you progress in the book, you will notice
    that the Appium communication also follows the WebDriver protocol.


    ## Why Are We Talking About These Protocols?


    Much like how micro-service APIs over monolithic applications are preferred in
    distributed systems, to take advantage of horizontal scaling, a similar innovation
    has happened in the past decade. Selenium (see [`https://en.wikipedia.org/wiki/Selenium_(software`](https://en.wikipedia.org/wiki/Selenium_(software)),
    with its relatively lightweight architecture, is fast replacing many licensed
    and enterprise tools.


    There are web sites that have covered the web test automation use cases at [`http://www.seleniumframework.com/`](http://www.seleniumframework.com/).


    Many mobile automation tools and frameworks adopt principles of web test automation
    tools. That means that understanding the history of web test automation tools
    helps you connect the evolution tools like Appium, Calabash, and other open source
    mobile automation tools.


    ## How Does It Work?


    The client library (the test automation scripts) communicates with an intermediary
    server, which in turn translates into commands understood by the browser. This
    eventually emulates an end user''s actions on the browser (actually it operates
    on the DOM). See Figure [2-1](#A435441_1_En_2_Chapter.html#Fig1).


    ![A435441_1_En_2_Fig1_HTML.jpg](A435441_1_En_2_Fig1_HTML.jpg)


    Figure 2-1. Selenium WebDriver architecture


    So, as you can see in Figure [2-1](#A435441_1_En_2_Chapter.html#Fig1), as long
    as you write automation scripts that the intermediary server can understand (WebDriver),
    the server takes care of translating them into actual commands that emulate user
    actions on the browser.


    ## How Does It Scale?


    In Figure [2-1](#A435441_1_En_2_Chapter.html#Fig1), you can see that a single
    intermediary server (`chromedriver.exe`, `Driver Server.exe`) can maintain the
    session with an active browser and execute commands that you direct in the automation
    scripts.


    What if you want to execute tests in parallel? How about multiple instances of
    browsers on the same machine or on remote machines, and so on?


    To solve the problem of parallel execution and leverage horizontal scaling, the
    Selenium Grid came into existence. Its architecture is shown in Figure [2-2](#A435441_1_En_2_Chapter.html#Fig2).


    ![A435441_1_En_2_Fig2_HTML.jpg](A435441_1_En_2_Fig2_HTML.jpg)


    Figure 2-2. The Selenium Grid


    A couple of noteworthy points:


    - The HUB is an HTTP server that listens on a port and redirects the requests
    to the appropriate Grid node (which maps to a WebDriver).

    - Since the communication happens on HTTP over TCP/IP, you can scale this model
    to the boundaries of the ports available on each machine in the control chain.

    - The HUB is the entry point and communication between HUB and nodes is purely
    over REST APIs (`GET`, `POST`, etc.)

    - The matching of a request from a client is done by the HUB based on the WebDriver
    protocol algorithm (a `DesiredCapabilities` object).


    ## How Does It Relate to Mobile Automation?


    Now, you can remotely execute commands on a browser as long as you have the intermediary
    server translating it to the right commands emulating user behavior.


    The same concept is applied to mobile test automation. The Appium server is like
    a ChromeDriver, IEDriverServer, or Safari driver, in that it can communicate with
    the UI Automation library for the Android or iOS ecosystems.


    Internally, Appium knows how to talk to the UIAutomation library for Android.
    The UIAutomation library will take commands from the Appium server and execute
    them on the app, which eventually translates to set, get, click, and all user
    actions.


    As the author of automation scripts, as long as you know how to identify elements
    (various locator/selector strategies; this space is quite mature now) and perform
    operations on those elements, the intended behavior is automated.'
  raw: '## Types of Mobile Apps


    There are different types of mobile apps that meet various needs. The decision
    on the type of mobile app is based on multiple factors. Here are the types that
    exist at the time of writing this book (see Figure [1-8](#A435441_1_En_1_Chapter.html#Fig8)).


    ![A435441_1_En_1_Fig8_HTML.jpg](A435441_1_En_1_Fig8_HTML.jpg)


    Figure 1-8.


    Comparing mobile app types


    *   Native apps: Mobile apps that are entirely developed using the tool stack
    available in the respective ecosystem (Apple, Google, Windows, etc.) are called
    native apps . The tool stack could mean the programming language, the SDK, the
    underlying platform, and so on. Native apps by far give the best user experience
    and performance.

    *   Web apps/HTML5 apps: Apps that use web technologies like HTML5, JavaScript,
    and CSS that align with w3c standards are called web apps . Web apps do not heavily
    rely on native platform support and hence are more cross-platform and portable.
    That said, there is significant opportunity for improvement in the areas of secure
    local storage and access to device functionalities, like accelerometers, scanners,
    cameras, etc.

    *   Hybrid apps: Hybrid , as the name suggests, takes the positives of both web
    and native apps and brings them together.


    You can read more at [`https://dzone.com/articles/state-native-vs-web-vs-hybrid`](https://dzone.com/articles/state-native-vs-web-vs-hybrid)
    . This book covers native Android mobile apps.


    # 2. Mobile Test Automation


    This chapter makes a case for mobile test automation and why it makes sense to
    invest in automation from the onset of your mobile app development process. The
    chapter also compares and contrasts the benefits of automation over manual testing
    practices. But first, you’ll learn about a few evolutionary concepts, some of
    which are borrowed from web application test automation.


    ## The WebDriver Protocol


    WebDriver is a remote control interface that enables introspection and control
    of user agents. It provides a platform and language-neutral wire protocol as a
    way for out-of-process programs to remotely instruct the behavior of web browsers.
    A brief processing model is explained.


    The remote end (see [`https://www.w3.org/TR/webdriver/#dfn-remote-end`](https://www.w3.org/TR/webdriver/%23dfn-remote-end))
    `)` is an HTTP server reading requests from the client and writing responses,
    typically over a TCP socket. For the purposes of this discussion, I model the
    data transmission between a particular local end and remote end with a connection
    to which the remote end may write and read bytes.


    After such a connection has been established, a remote end must run the following
    steps:


    1.  Read bytes from the connection until an HTTP request can be constructed from
    the data.  

    2.  The HTTP request is matched with the request’s method and URL as parameters.
     

    3.  If the request match is of type `error`, send an error and error code, then
    return to Step 1.  

    4.  Let the session ID be the corresponding variable from the URL variables .
     

    5.  If the command is `New Session` (and doesn’t match the existing session’s
    ID), then go back to Step 1.  

    6.  Execute the request and collect the response object.  

    7.  Send the response code and the results to the local end and return to Step
    1.  


    For further details on WebDriver Protocol, see [`https://w3c.github.io/webdriver/webdriver-spec.html`](https://w3c.github.io/webdriver/webdriver-spec.html)
    .


    Selenium, the popular web test automation software, is based on the WebDriver
    protocol as its base layer. In fact, as you progress in the book, you will notice
    that the Appium communication also follows the WebDriver protocol.


    ### Why Are We Talking About These Protocols?


    Much like how micro-service APIs over monolithic applications are preferred in
    distributed systems, to take advantage of horizontal scaling, a similar innovation
    has happened in the past decade. Selenium (see [`https://en.wikipedia.org/wiki/Selenium_(software`](https://en.wikipedia.org/wiki/Selenium_(software)
    ), with its relatively lightweight architecture, is fast replacing many licensed
    and enterprise tools.


    There are web sites that have covered the web test automation use cases at [`http://www.seleniumframework.com/`](http://www.seleniumframework.com/)
    .


    Many mobile automation tools and frameworks adopt principles of web test automation
    tools. That means that understanding the history of web test automation tools
    helps you connect the evolution tools like Appium, Calabash, and other open source
    mobile automation tools.


    ### How Does It Work?


    The client library (the test automation scripts) communicates with an intermediary
    server, which in turn translates into commands understood by the browser. This
    eventually emulates an end user''s actions on the browser (actually it operates
    on the DOM). See Figure [2-1](#A435441_1_En_2_Chapter.html#Fig1).


    ![A435441_1_En_2_Fig1_HTML.jpg](A435441_1_En_2_Fig1_HTML.jpg)


    Figure 2-1.


    Selenium WebDriver architecture


    So, as you can see in Figure [2-1](#A435441_1_En_2_Chapter.html#Fig1), as long
    as you write automation scripts that the intermediary server can understand (WebDriver),
    the server takes care of translating them into actual commands that emulate user
    actions on the browser.


    ### How Does It Scale?


    In Figure [2-1](#A435441_1_En_2_Chapter.html#Fig1), you can see that a single
    intermediary server (`chromedriver.exe`, `Driver Server.exe`) can maintain the
    session with an active browser and execute commands that you direct in the automation
    scripts .


    What if you want to execute tests in parallel? How about multiple instances of
    browsers on the same machine or on remote machines, and so on?


    To solve the problem of parallel execution and leverage horizontal scaling, the
    Selenium Grid came into existence. Its architecture is shown in Figure [2-2](#A435441_1_En_2_Chapter.html#Fig2).


    ![A435441_1_En_2_Fig2_HTML.jpg](A435441_1_En_2_Fig2_HTML.jpg)


    Figure 2-2.


    The Selenium Grid


    A couple of noteworthy points:


    *   The HUB is an HTTP server that listens on a port and redirects the requests
    to the appropriate Grid node (which maps to a WebDriver).

    *   Since the communication happens on HTTP over TCP/IP, you can scale this model
    to the boundaries of the ports available on each machine in the control chain.

    *   The HUB is the entry point and communication between HUB and nodes is purely
    over REST APIs (`GET`, `POST`, etc.)

    *   The matching of a request from a client is done by the HUB based on the WebDriver
    protocol algorithm (a `DesiredCapabilities` object).


    ### How Does It Relate to Mobile Automation?


    Now, you can remotely execute commands on a browser as long as you have the intermediary
    server translating it to the right commands emulating user behavior.


    The same concept is applied to mobile test automation. The Appium server is like
    a ChromeDriver, IEDriverServer, or Safari driver, in that it can communicate with
    the UI Automation library for the Android or iOS ecosystems.


    Internally, Appium knows how to talk to the UIAutomation library for Android.
    The UIAutomation library will take commands from the Appium server and execute
    them on the app, which eventually translates to set, get, click, and all user
    actions.


    As the author of automation scripts, as long as you know how to identify elements
    (various locator/selector strategies; this space is quite mature now) and perform
    operations on those elements, the intended behavior is automated.'
  trans: '

    ## 移动应用的类型


    移动应用有不同类型，可满足各种需求。选择哪种类型的移动应用取决于多种因素。以下是本书撰写时存在的类型（见图 1-8）。


    ![A435441_1_En_1_Fig8_HTML.jpg](img/A435441_1_En_1_Fig8_HTML.jpg)


    图 1-8. 移动应用类型对比


    - **原生应用**：完全使用各自生态系统（苹果、谷歌、Windows 等）提供的工具栈开发的移动应用被称为原生应用。工具栈可能包括编程语言、SDK、底层平台等。原生应用能提供最佳的用户体验和性能。

    - **Web 应用/HTML5 应用**：使用符合 w3c 标准的 HTML5、JavaScript 和 CSS 等网络技术构建的应用被称为 Web 应用。Web
    应用不重度依赖原生平台支持，因此具有更强的跨平台性和可移植性。尽管如此，在安全本地存储以及访问加速计、扫描仪、摄像头等设备功能方面，仍有很大的改进空间。

    - **混合应用**：顾名思义，混合应用融合了 Web 应用和原生应用的优点。


    更多信息可参阅 [`https://dzone.com/articles/state-native-vs-web-vs-hybrid`](https://dzone.com/articles/state-native-vs-web-vs-hybrid)。本书主要介绍原生安卓移动应用。


    # 2. 移动测试自动化


    本章将阐述移动测试自动化的必要性，以及为何从移动应用开发之初就投入自动化是合理的。本章还会对比和对照自动化相对于手动测试实践的优势。但首先，你将了解一些演进中的概念，其中部分借鉴自
    Web 应用测试自动化。


    ## WebDriver 协议


    WebDriver 是一种远程控制接口，能够对用户代理进行内省和控制。它提供了一种平台和语言无关的线路协议，使进程外程序能够远程指令网络浏览器的行为。下面简要说明其处理模型。


    远程端（见 [`https://www.w3.org/TR/webdriver/#dfn-remote-end`](https://www.w3.org/TR/webdriver/%23dfn-remote-end)）是一个
    HTTP 服务器，它从客户端读取请求并写入响应，通常通过 TCP 套接字进行。为了便于讨论，我将某个本地端和远程端之间的数据传输建模为：远程端可通过一个连接写入和读取字节。


    建立此类连接后，远程端必须执行以下步骤：


    1.  从连接中读取字节，直到能够根据数据构建出一个 HTTP 请求。

    2.  根据请求的方法和 URL 匹配该 HTTP 请求。

    3.  如果请求匹配结果为 `error` 类型，则发送错误和错误码，然后返回步骤 1。

    4.  将会话 ID 设为 URL 变量中的对应变量。

    5.  如果命令为 `New Session`（且与现有会话的 ID 不匹配），则返回步骤 1。

    6.  执行请求并收集响应对象。

    7.  将响应码和结果发送给本地端，然后返回步骤 1。


    有关 WebDriver 协议的更多详情，请参阅 [`https://w3c.github.io/webdriver/webdriver-spec.html`](https://w3c.github.io/webdriver/webdriver-spec.html)。


    流行的 Web 测试自动化软件 Selenium 便是基于 WebDriver 协议作为其底层架构的。事实上，随着你阅读本书的深入，你会注意到 Appium
    的通信也遵循 WebDriver 协议。


    ## 我们为何要讨论这些协议？


    正如在分布式系统中，相对于单体应用更倾向于使用微服务 API 以充分利用水平扩展一样，过去十年中也出现了类似的创新。Selenium（见 [`https://en.wikipedia.org/wiki/Selenium_(software`](https://en.wikipedia.org/wiki/Selenium_(software)）凭借其相对轻量级的架构，正迅速取代许多许可式和商业工具。


    有一些网站已经涵盖了 Web 测试自动化的用例，例如 [`http://www.seleniumframework.com/`](http://www.seleniumframework.com/)。


    许多移动自动化工具和框架都采用了 Web 测试自动化工具的原则。这意味着，了解 Web 测试自动化工具的发展史，有助于你理解 Appium、Calabash
    以及其他开源移动自动化工具等演化工具的来龙去脉。


    ## 它是如何工作的？


    客户端库（测试自动化脚本）与一个中间服务器通信，该服务器再将脚本转换为浏览器能够理解的命令。这最终在浏览器上模拟出最终用户的操作（实际上它操作的是 DOM）。见图
    2-1。


    ![A435441_1_En_2_Fig1_HTML.jpg](img/A435441_1_En_2_Fig1_HTML.jpg)


    图 2-1. Selenium WebDriver 架构


    因此，如图 2-1 所示，只要编写出中间服务器（WebDriver）能够理解的自动化脚本，服务器就会负责将这些脚本转换为模拟用户在浏览器上操作的实际命令。


    ## 它是如何扩展的？


    在图 2-1 中，你可以看到单个中间服务器（`chromedriver.exe`、`Driver Server.exe`）能够维持与活跃浏览器的会话，并执行你在自动化脚本中指定的命令。


    如果你想并行执行测试怎么办？在同一台机器或远程机器上运行多个浏览器实例又该如何处理？


    为了解决并行执行的问题并充分利用水平扩展，Selenium Grid 应运而生。其架构如图 2-2 所示。


    ![A435441_1_En_2_Fig2_HTML.jpg](img/A435441_1_En_2_Fig2_HTML.jpg)


    图 2-2. Selenium Grid


    几点值得注意的地方：


    - HUB 是一个 HTTP 服务器，它监听某个端口并将请求重定向到相应的 Grid 节点（该节点映射到一个 WebDriver）。

    - 由于通信是通过 TCP/IP 上的 HTTP 进行的，因此可以将此模型扩展到控制链中每台机器上可用的端口范围边界。

    - HUB 是入口点，HUB 与节点之间的通信纯通过 REST API（`GET`、`POST` 等）进行。

    - 来自客户端的请求匹配由 HUB 根据 WebDriver 协议算法（一个 `DesiredCapabilities` 对象）完成。


    ## 这与移动自动化有何关联？


    现在，只要拥有将其转换为模拟用户行为的正确命令的中间服务器，你就可以远程在浏览器上执行命令。


    同样的概念也应用于移动测试自动化。Appium 服务器就像一个 ChromeDriver、IEDriverServer 或 Safari driver，因为它能够与安卓或
    iOS 生态系统的 UI Automation 库进行通信。


    在内部，Appium 知道如何与安卓的 UIAutomation 库对话。UIAutomation 库将从 Appium 服务器接收命令并在应用上执行，这些命令最终转化为设置、获取、点击以及所有用户操作。


    作为自动化脚本的作者，只要你知道如何识别元素（各种定位器/选择器策略；这方面现在已经相当成熟）并对这些元素执行操作，预期的行为就能被自动化。

