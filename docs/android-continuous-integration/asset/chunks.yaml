    Figure 9-3. Mini device lab


    You need to start the Appium server(s) on the available network ports to talk
    to each of these devices. For this example, I execute on only one device.


    ### `devices.yaml`


    You define the devices configuration in a YAML file, as shown in the following
    code. If you have a new device to be connected, copy and paste the block and then
    replace the values (`serial`, `name`, and `port`) as needed.


    Ensure that you provide a different port for each device.


    > **Note:** This port should be the same value that the Appium server starts on
    (the default Appium server port is 4723).


    ```

    devices:

    huawei-nexus_6p-84B5T15A17000142:

    caps:

    platformName : Android

    deviceName : huawei-nexus_6p-84B5T15A17000142

    app: app-debug.apk

    appActivity : .Settings

    appPackage : com.android.settings

    appium_lib:

    sauce_username:

    sauce_access_key:

    port: 4768

    motorola-google-ZX1B222FCD:

    caps:

    platformName : Android

    deviceName : motorola-google-ZX1B222FCD

    app: app-debug.apk

    appActivity : .Settings

    appPackage : com.android.settings

    appium_lib:

    sauce_username:

    sauce_access_key:

    port: 4778

    ```


    ### `emulators.yaml`


    Similar to the devices, you must also define the emulators’ configuration. You
    should have already defined the AVDs by this time. See the AVD Manager to learn
    how to add AVDs.


    ```

