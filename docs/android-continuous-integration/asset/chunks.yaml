    \ useful (from the perspective of CI) are:\n\n*   ADB (Android Debug Bridge)\n\
    *   Record Video\n*   uiautomatorviewer\n*   AVD Manager\n*   SDK Manager\n* \
    \  Device Monitor\n\nThe next few sections cover how to use these tools.\n\n###\
    \ ADB\n\nAndroid Debug Bridge (`adb`) is a client that runs on a developer box\
    \ and instructs a component that runs on the developer box, which in turn communicates\
    \ with a daemon that runs either on an emulator or on a real device.\n\nHere is\
    \ an example of an `adb` command. It lists the number of devices connected to\
    \ the machine on which `adb` is executed.\n\n```\npradeep@seleniumframework.com:∼\
    \ pmacharl$ adb devices\nList of devices attached\n00a219ae09d05912    device\n\
    ```\n\nThis is one of the most important tools that I recommend you learn to use.\
    \ You will use `adb` to communicate with the app on the emulator/real device,\
    \ to install the app, and to accomplish many other feats.\n\nHere are some `adb`\
    \ commands that I use extensively:\n\n*   `adb devices` lists all emulators and\
    \ devices that can communicate with this `adb` server.\n*   `adb install <apk>`\
    \ installs `apk` on the one emulator/device that is available to the `adb` server.\n\
    *   `adb install -e <serial_number> <apk>` installs `apk` on a targeted emulator\
    \ or device.\n*   `adb kill-server` kills the `adb` server. I use this when the\
    \ server is in an unstable state.\n*   `adb start-server` starts the `adb` server.\n\
    \nIt will be very beneficial to go over the complete list of options that `adb`\
    \ provides, especially when you’re troubleshooting. I recommend the official page,\
    \ found at [`https://www.gitbook.com/book/machzqcq/ci-automation-mobileapps/edit`](https://www.gitbook.com/book/machzqcq/ci-automation-mobileapps/edit)\
    \ .\n\nYou will use the previous commands when you build-deploy-test the CI pattern\
    \ in a later chapter.\n\n### Record Video\n\nFrom Android Kitkat, i.e. 4.4 version\
    \ and above, `adb` provides a way to record screen video and save it to the device\
    \ storage. You can pull the video to the local system from there.\n\nHere are\
    \ the steps for screen recording and saving:\n\n1.  Start `adb shell screenrecord\
    \ /path`.  \n2.  Recording starts and waits until you no longer need to record\
    \ the screen.  \n3.  Press Ctrl+C in the shell to stop recording.  \n4.  Pull\
    \ the video to your local filesystem.\n\n    ```\n    pradeep@seleniumframework.com\
    \ $ adb shell screenrecord /sdcard/example.mp4\n    ^C\n    pradeep@seleniumframework.com\
    \ $ adb pull /sdcard/example.mp4\n    4972 KB/s (2900775 bytes in 0.569s)\n  \
    \  ```\n\n### uiautomatorviewer\n\nFrom the perspective of an automation engineer,\
    \ `uiautomatorviewer` is very similar to Chrome’s `dev-tools`, Firefox’s `dev-tools`,\
    \ etc. Writing web-based automation code (such as with Selenium), identifying\
    \ HTML elements (like ID, name, and other properties), and passing that as input\
    \ to identify objects is very similar to what you can achieve with `uiautomatorviewer`,\
    \ but on the mobile side. Figure [4-15](#A435441_1_En_4_Chapter.html#Fig15) shows\
    \ the interface.\n\n![A435441_1_En_4_Fig15_HTML.jpg](A435441_1_En_4_Fig15_HTML.jpg)\n\
    \nFigure 4-15.\n\nuiautomatorviewer\n\nSome notes about `uiautomatorviewer`:\n\
    \n*   It’s generally located in the `$ANDROID_HOME/tools` directory.\n*   You\
    \ launch it by typing `uiautomatorviewer`.\n*   Figure [4-15](#A435441_1_En_4_Chapter.html#Fig15)\
    \ is taken by clicking the Device Screenshot button, which is the second icon\
    \ from the left.\n*   You can see the XML hierarchy of the elements and each node\
    \ property in the node detail. This is useful when you’re writing Appium automated\
    \ tests (if you want to use `uiautomatorviewer`).\n*   You can save a screenshot\
    \ using this tool .\n\n### AVD Manager\n\nThe AVD Manager provides a graphical\
    \ user interface in which you can create and manage Android Virtual Devices (AVDs),\
    \ which are required by the Android Emulator.\n\nLaunch AVD Manager using either\
    \ of these options (one is from the command line and the other is from Android\
    \ Studio):\n\n*   Run the `android avd` command at the command line. It launches\
    \ `avd` (shell variables should be set so that the executables are in `PATH`).\n\
    *   Click the AVD Manager icon in Android Studio IDE, as shown in Figure [4-16](#A435441_1_En_4_Chapter.html#Fig16).\
    \ Figure [4-17](#A435441_1_En_4_Chapter.html#Fig17) shows the AVDs.\n\n    ![A435441_1_En_4_Fig17_HTML.jpg](A435441_1_En_4_Fig17_HTML.jpg)\n\
    \n    Figure 4-17.\n\n    AVD Manager with AVDs\n\n    ![A435441_1_En_4_Fig16_HTML.jpg](A435441_1_En_4_Fig16_HTML.jpg)\n\
    \n    Figure 4-16.\n\n    AVD Manager\n\nWhen you start to understand the Android\
    \ world, you want a sandbox to play with. Android Virtual Device Manager lets\
    \ you create AVDs/emulators for different hardware and software configurations.\
    \ I found the following features beneficial while learning the platform:\n\n*\
    \   You can create emulators for phones, tablets, wearing, TV, etc.\n*   You can\
    \ play with different form factors, screen resolutions, and sizes.\n*   You can\
    \ experiment with different memory sizes, API levels of software, cameras, sensors,\
    \ etc.\n\nSure, there is no substitute for a real device, but emulators at least\
    \ help you understand the various configuration(s) available, as well as identify\
    \ which ones matter while developing, building, and testing the apps. More domain\
    \ knowledge for the engineers means a higher chance of a better quality app.\n\
    \n### SDK Manager\n\nThe Android SDK Manager (see Figure [4-18](#A435441_1_En_4_Chapter.html#Fig18))\
    \ separates the SDK tools, platforms, and other components into packages for easy\
    \ access and management.\n\n![A435441_1_En_4_Fig18_HTML.jpg](A435441_1_En_4_Fig18_HTML.jpg)\n\
    \nFigure 4-18.\n\nSDK Manager\n\nLaunch SDK Manager using one of these options\
    \ (one is from the command line and the other is from Android Studio):\n\n*  \
    \ Run the `android sdk` command from the command line. It launches the SDK manager\
    \ (the shell variables should be set so that the executables are in `PATH`). See\
    \ [`https://www.gitbook.com/book/machzqcq/ci-automation-mobileapps/edit`](https://www.gitbook.com/book/machzqcq/ci-automation-mobileapps/edit)\
    \ for more information.\n*   Click the SDK Manager icon in the Android Studio\
    \ IDE, as shown in Figure [4-19](#A435441_1_En_4_Chapter.html#Fig19). Figure [4-20](#A435441_1_En_4_Chapter.html#Fig20)\
    \ shows the result.\n\n    ![A435441_1_En_4_Fig20_HTML.jpg](A435441_1_En_4_Fig20_HTML.jpg)\n\
    \n    Figure 4-20.\n\n    SDK Manager: Android Studio\n\n    ![A435441_1_En_4_Fig19_HTML.jpg](A435441_1_En_4_Fig19_HTML.jpg)\n\
    \n    Figure 4-19.\n\n    SDK Manager: Android Studio icon"
  trans: "\n# Gradle 任务\n\nGradle 通过执行任务来工作。任务可分为两种类型：\n\n- 内置任务：默认提供\n- Gradle 自定义任务：自行创建任务\n\
    \n你将首先使用内置任务。编写自定义任务的详细内容超出了本章的讨论范围。\n\n内置任务按以下领域分类：\n\n- Android 任务\n- 构建任务\n\
    - 构建设置任务\n- 帮助任务\n- 安装任务\n- 验证任务\n- 其他任务\n\n要查看所有任务及更多详情，请运行 `gradle tasks --all`。\n\
    \n要查看任务的更多详细信息，请运行 `gradle help --task`。\n\n## 构建应用\n\nGradle 通常会在当前目录中查找 `build.gradle`\
    \ 文件，并解析该文件以遵循其中的指令。\n\n在本书中，你将使用以下命令构建应用，该命令在 Android 项目根目录下运行：\n\n```\ngradle\
    \ clean assembleDebug\n```\n\n我将在后续章节中详细介绍如何从项目构建应用。\n\n> **注意**：如果你不想操心管理 Gradle\
    \ 版本（下载、解压并确保使用正确的版本），可以使用 Gradle 包装器。Gradle 包装器与 Gradle 捆绑在一起。唯一的变化是，你不再使用 `gradle`\
    \ 二进制文件，而是使用同一文件夹中的 `gradlew` 二进制文件。\n\n# 需要了解的工具\n\n以下是一些我认为（从持续集成的角度）有用的 Android\
    \ SDK 工具：\n\n- ADB（Android 调试桥）\n- 录制视频\n- uiautomatorviewer\n- AVD 管理器\n- SDK\
    \ 管理器\n- 设备监视器\n\n接下来的几节将介绍如何使用这些工具。\n\n## ADB\n\nAndroid 调试桥（`adb`）是一个在开发者机器上运行的客户端，它向同样运行在开发者机器上的一个组件发送指令，该组件再与运行在模拟器或真实设备上的守护进程进行通信。\n\
    \n下面是一个 `adb` 命令的示例。它列出执行了 `adb` 命令的机器上连接的设备数量。\n\n```\npradeep@seleniumframework.com:∼\
    \ pmacharl$ adb devices\nList of devices attached\n00a219ae09d05912    device\n\
    ```\n\n这是我最推荐你学习使用的工具之一。你将使用 `adb` 与模拟器/真实设备上的应用进行通信、安装应用以及完成许多其他任务。\n\n以下是我经常使用的一些\
    \ `adb` 命令：\n\n- `adb devices` 列出所有能够与此 `adb` 服务器通信的模拟器和设备。\n- `adb install <apk>`\
    \ 将 `apk` 安装到 `adb` 服务器可用的一个模拟器/设备上。\n- `adb install -e <serial_number> <apk>`\
    \ 将 `apk` 安装到目标模拟器或设备上。\n- `adb kill-server` 终止 `adb` 服务器。当服务器处于不稳定状态时，我会使用此命令。\n\
    - `adb start-server` 启动 `adb` 服务器。\n\n通读 `adb` 提供的完整选项列表将非常有益，尤其是在你进行故障排除时。我建议访问官方页面，网址为\
    \ [`www.gitbook.com/book/machzqcq/ci-automation-mobileapps/edit`](https://www.gitbook.com/book/machzqcq/ci-automation-mobileapps/edit)。\n\
    \n在后续章节中，当你按照构建-部署-测试的持续集成模式进行操作时，将会用到前面提到的命令。\n\n## 录制视频\n\n从 Android Kitkat（即\
    \ 4.4 版本及更高版本）开始，`adb` 提供了一种录制屏幕视频并将其保存到设备存储中的方法。你可以从那里将视频拉取到本地系统。\n\n以下是屏幕录制和保存的步骤：\n\
    \n1. 启动 `adb shell screenrecord /path`。\n2. 开始录制并等待，直到你不再需要录制屏幕。\n3. 在 shell 中按\
    \ Ctrl+C 停止录制。\n4. 将视频拉取到你的本地文件系统。\n\n    ```\n    pradeep@seleniumframework.com\
    \ $ adb shell screenrecord /sdcard/example.mp4\n    ^C\n    pradeep@seleniumframework.com\
    \ $ adb pull /sdcard/example.mp4\n    4972 KB/s (2900775 bytes in 0.569s)\n  \
    \  ```\n\n## uiautomatorviewer\n\n从自动化工程师的角度来看，`uiautomatorviewer` 与 Chrome 的\
    \ `dev-tools`、Firefox 的 `dev-tools` 等非常相似。编写基于 Web 的自动化代码（例如使用 Selenium）、识别 HTML\
    \ 元素（如 ID、名称及其他属性）并将其作为输入来定位对象，与使用 `uiautomatorviewer` 所能实现的功能非常相似，只不过是在移动端。图\
    \ 4-15 展示了其界面。\n\n![A435441_1_En_4_Fig15_HTML.jpg](img/A435441_1_En_4_Fig15_HTML.jpg)\n\
    \n图 4-15. uiautomatorviewer\n\n关于 `uiautomatorviewer` 的一些说明：\n\n- 它通常位于 `$ANDROID_HOME/tools`\
    \ 目录下。\n- 通过输入 `uiautomatorviewer` 来启动它。\n- 图 4-15 是通过点击“设备截图”按钮（从左数第二个图标）获取的。\n\
    - 你可以在节点详情中看到元素的 XML 层级结构和每个节点的属性。这在编写 Appium 自动化测试时非常有用（如果你打算使用 `uiautomatorviewer`）。\n\
    - 你可以使用此工具保存截图。\n\n## AVD 管理器\n\nAVD 管理器提供了一个图形用户界面，你可以在其中创建和管理 Android 虚拟设备（AVD），这是\
    \ Android 模拟器所必需的。\n\n使用以下任一选项启动 AVD 管理器（一种是从命令行启动，另一种是从 Android Studio 启动）：\n\
    \n- 在命令行运行 `android avd` 命令。它将启动 `avd`（应设置 shell 变量，以便可执行文件位于 `PATH` 中）。\n- 点击\
    \ Android Studio IDE 中的 AVD 管理器图标，如图 4-16 所示。图 4-17 显示了 AVD。\n\n    ![A435441_1_En_4_Fig17_HTML.jpg](img/A435441_1_En_4_Fig17_HTML.jpg)\n\
    \n    图 4-17. 带有 AVD 的 AVD 管理器\n\n    ![A435441_1_En_4_Fig16_HTML.jpg](img/A435441_1_En_4_Fig16_HTML.jpg)\n\
    \n    图 4-16. AVD 管理器\n\n当你开始了解 Android 世界时，你会需要一个沙盒来实验。Android 虚拟设备管理器允许你为不同的硬件和软件配置创建\
    \ AVD/模拟器。我在学习该平台时发现了以下有用的功能：\n\n- 你可以为手机、平板电脑、可穿戴设备、电视等创建模拟器。\n- 你可以尝试不同的外形、屏幕分辨率和尺寸。\n\
    - 你可以尝试不同的内存大小、软件 API 级别、摄像头、传感器等。\n\n当然，真实设备是无法替代的，但模拟器至少能帮助你了解各种可用的配置，以及在开发、构建和测试应用时哪些配置是重要的。工程师掌握更多的领域知识，意味着更有可能产出更高质量的应用。\n\
    \n## SDK 管理器\n\nAndroid SDK 管理器（见图 4-18）将 SDK 工具、平台和其他组件分离到不同的包中，以便于访问和管理。\n\n\
    ![A435441_1_En_4_Fig18_HTML.jpg](img/A435441_1_En_4_Fig18_HTML.jpg)\n\n图 4-18.\
    \ SDK 管理器\n\n使用以下任一选项启动 SDK 管理器（一种是从命令行启动，另一种是从 Android Studio 启动）：\n\n- 在命令行运行\
    \ `android sdk` 命令。它将启动 SDK 管理器（应设置 shell 变量，以便可执行文件位于 `PATH` 中）。更多信息请参见 [`www.gitbook.com/book/machzqcq/ci-automation-mobileapps/edit`](https://www.gitbook.com/book/machzqcq/ci-automation-mobileapps/edit)。\n\
    - 点击 Android Studio IDE 中的 SDK 管理器图标，如图 4-19 所示。图 4-20 显示了结果。\n\n    ![A435441_1_En_4_Fig20_HTML.jpg](img/A435441_1_En_4_Fig20_HTML.jpg)\n\
    \n    图 4-20. SDK 管理器：Android Studio\n\n    ![A435441_1_En_4_Fig19_HTML.jpg](img/A435441_1_En_4_Fig19_HTML.jpg)\n\
    \n    图 4-19. SDK 管理器：Android Studio 图标\n"
- fmt: "# Android Device Monitor\n\n`Android Device Monitor` is a standalone tool\
    \ that provides a graphical user interface for several Android application debugging\
    \ and analysis tools.\n\nLaunch SDK Manager using one of these options (one is\
    \ from the command line and the other is from Android Studio):\n\n*   Run the\
    \ `monitor` command from the command line. It launches the device monitor (shell\
    \ variables should be set so that the executables are in `PATH`). See [`https://www.gitbook.com/book/machzqcq/ci-automation-mobileapps/edit`](https://www.gitbook.com/book/machzqcq/ci-automation-mobileapps/edit)\
    \ for more information.\n*   Click the Device Monitor icon in the Android Studio\
    \ IDE, as shown in Figure 4-21.\n\n    ![A435441_1_En_4_Fig21_HTML.jpg](A435441_1_En_4_Fig21_HTML.jpg)\n\
    \n    Figure 4-21. Device Monitor: Android Studio\n\nYou can see the view when\
    \ one device is connected in Figure 4-22.\n\n![A435441_1_En_4_Fig22_HTML.jpg](A435441_1_En_4_Fig22_HTML.jpg)\n\
    \nFigure 4-22. Device Monitor: device connected\n\n# 5. Build the Android App\n\
    \nThe Android app can be built in debug or release mode—the difference being the\
    \ keystore used to sign the app. If you build the app in release mode, the keystore\
    \ will let you push to Google Play (assuming that the keystore associated with\
    \ the user ID has already been registered through Google Play).\n\nSince the CI\
    \ process requires building many times before being ready to be release, this\
    \ chapter shows you how to build the app in debug mode and use the `.apk` that’s\
    \ generated to pass it to the CI test automation step.\n\n## The Android Build\
    \ Process\n\nThe following section contains a quick, high-level architecture overview\
    \ of the Android app build process. Minor variations might exist in your specific\
    \ projects.\n\n### Overview\n\nUnderstanding the build process and being able\
    \ to tweak it to suit your requirements is necessary once you have an MVP. I am\
    \ a big fan of building the thin slice first, although there are many inefficiencies\
    \ that can exist in the process. Once you see the result, the confidence and optimism\
    \ will motivate you to go back and optimize the process. This is a good way to\
    \ keep the stakeholders happy too, because it demonstrates continuous progress.\
    \ Figure 5-1 shows an overview of the build process.\n\n![A435441_1_En_5_Fig1_HTML.jpg](A435441_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1. The Android build process\n\n### Another Perspective on the Build\
    \ Process\n\nConsider another perspective with `Gradle`, which is a build and\
    \ packaging tool that drives the build process.\n\nFigure 5-2 shows this build\
    \ process.\n\n![A435441_1_En_5_Fig2_HTML.jpg](A435441_1_En_5_Fig2_HTML.jpg)\n\n\
    Figure 5-2. Android build process with `Gradle`\n\n### Output of the Build Process\n\
    \nAfter successfully building the app from the source code, you’ll generally be\
    \ interested in the `.apk` file, which is the app ready to be deployed. There\
    \ are other folders created in the `./app` folder inside the project too. Figure\
    \ 5-3 shows the folder contents for reference.\n\n![A435441_1_En_5_Fig3_HTML.jpg](A435441_1_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3. Build output folders\n\n## Building from the Command Line\n\nYou\
    \ can build your Android app in two main ways:\n\n*   IDEs such as Android Studio\
    \ and Xamarin have a menu option for building the app once the project is imported.\n\
    *   Open a shell command and start calling Android build binaries (that are part\
    \ of the SDK).\n\nNote\n\nEven the IDE calls into SDK binaries internally, but\
    \ it is abstracted from the user, hence it seems easier.\n\n### Gradle Tasks\n\
    \nThe `Gradle` task that you are interested in here is the one that enables you\
    \ to build, compile, and output the `.apk` file. This falls under the category\
    \ of `Gradle` tasks viz. build tasks. Figure 5-4 shows the tasks available from\
    \ the `gradle tasks` command. Type `gradle tasks` in the command line and check\
    \ out the output. It is not necessary to remember all the tasks; however, the\
    \ more you practice the commands, the easier and faster it gets to script it out.\n\
    \n![A435441_1_En_5_Fig4_HTML.jpg](A435441_1_En_5_Fig4_HTML.jpg)\n\nFigure 5-4.\
    \ `Gradle` tasks\n\n### The `Gradle Clean AssembleDebug` Task\n\nThe `assembleDebug\
    \ gradle` task follows the build process, as mentioned in the architecture view,\
    \ and the `clean` task cleans the build folder in the project.\n\nFigure 5-5 shows\
    \ how the process would look when building an app with the following command:\n\
    \n![A435441_1_En_5_Fig5_HTML.jpg](A435441_1_En_5_Fig5_HTML.jpg)\n\nFigure 5-5.\
    \ `Gradle clean assembleDebug`\n\n```\ngradle clean assembleDebug\n```\n\nA successful\
    \ build should look like Figure 5-6.\n\n![A435441_1_En_5_Fig6_HTML.jpg](A435441_1_En_5_Fig6_HTML.jpg)\n\
    \nFigure 5-6. `assembleDebug` is successful\n\n### The `.apk` File in Debug Mode\n\
    \nThe output you are interested in is the `.apk` file, which is generally found\
    \ in the relative folder path `/app/build/outputs/apk`.\n\nThe debug app is typically\
    \ named `app-debug.apk` and found in the folder structure shown in Figure 5-7.\n\
    \n![A435441_1_En_5_Fig7_HTML.jpg](A435441_1_En_5_Fig7_HTML.jpg)\n\nFigure 5-7.\
    \ Apk debug file\n\n### The `.apk` File in Release Mode\n\nThe following command\
    \ puts the `.apk` file in `app/output/apk/release`:\n\n```\n./gradlew assembleRelease\n\
    ```\n\nNote\n\nTo build the app in release mode, you need to sign the app in release\
    \ mode with keystore and private keys, as detailed at [`https://developer.android.com/studio/publish/app-signing.html`](https://developer.android.com/studio/publish/app-signing.html).\n\
    \n## Building from Android Studio\n\nThis section explains how you can build the\
    \ Android app from Android Studio IDE.\n\n### Import the Project\n\nFigure 5-8\
    \ shows a sample Android project imported into Android Studio. You would simply\
    \ click the Play button to build the Android app.\n\n![A435441_1_En_5_Fig8_HTML.jpg](A435441_1_En_5_Fig8_HTML.jpg)\n\
    \nFigure 5-8. Build the Android app in Android Studio\n\nThe Play button will\
    \ run the last run configuration. To see a list of all configurations, click the\
    \ App dropdown, as shown in Figure 5-9. Choose Edit Configurations to see the\
    \ screen in Figure 5-10.\n\n![A435441_1_En_5_Fig10_HTML.jpg](A435441_1_En_5_Fig10_HTML.jpg)\n\
    \nFigure 5-10. Edit Configuration screen in Android Studio\n\n![A435441_1_En_5_Fig9_HTML.jpg](A435441_1_En_5_Fig9_HTML.jpg)\n\
    \nFigure 5-9. Edit Configurations in Android Studio\n\nFeel free to click each\
    \ of the tabs and customize as needed. This example uses the defaults.\n\n###\
    \ Android Studio Views\n\nAndroid Studio provides different views for the project\
    \ viz.\n\n*   Project\n*   Packages\n*   Scratches\n*   Android\n*   Project files\n\
    *   Problems\n*   Production\n*   Tests\n\nThe version of Android Studio that\
    \ is stable and works with the code in this book is illustrated in Figure 5-11.\n\
    \n![A435441_1_En_5_Fig11_HTML.jpg](A435441_1_En_5_Fig11_HTML.jpg)\n\nFigure 5-11.\
    \ About Android Studio"
  raw: "### Android Device Monitor\n\nAndroid Device Monitor is a standalone tool\
    \ that provides a graphical user interface for several Android application debugging\
    \ and analysis tools.\n\nLaunch SDK Manager using one of these options (one is\
    \ from the command line and the other is from Android Studio):\n\n*   Run the\
    \ `monitor` command from the command line. It launches the device monitor (shell\
    \ variables should be set so that the executables are in `PATH`). See [`https://www.gitbook.com/book/machzqcq/ci-automation-mobileapps/edit`](https://www.gitbook.com/book/machzqcq/ci-automation-mobileapps/edit)\
    \ for more information).\n*   Click the Device Monitor icon in the Android Studio\
    \ IDE, as shown in Figure [4-21](#A435441_1_En_4_Chapter.html#Fig21).\n\n    ![A435441_1_En_4_Fig21_HTML.jpg](A435441_1_En_4_Fig21_HTML.jpg)\n\
    \n    Figure 4-21.\n\n    Device Monitor: Android Studio\n\nYou can see the view\
    \ when one device is connected in Figure [4-22](#A435441_1_En_4_Chapter.html#Fig22).\n\
    \n![A435441_1_En_4_Fig22_HTML.jpg](A435441_1_En_4_Fig22_HTML.jpg)\n\nFigure 4-22.\n\
    \nDevice Monitor: device connected\n\n# 5. Build the Android App\n\nThe Android\
    \ app can be built in debug or release mode—the difference being the keystore\
    \ used to sign the app. If you build the app in release mode, the keystore will\
    \ let you push to Google Play (assuming that the keystore associated with the\
    \ user ID has already been registered through Google Play).\n\nSince the CI process\
    \ requires building many times before being ready to be release, this chapter\
    \ shows you how to build the app in debug mode and use the `.apk` that’s generated\
    \ to pass it to the CI test automation step.\n\n## The Android Build Process\n\
    \nThe following section contains a quick, high-level architecture overview of\
    \ the Android app build process . Minor variations might exist in your specific\
    \ projects.\n\n### Overview\n\nUnderstanding the build process and being able\
    \ to tweak it to suit your requirements is necessary once you have an MVP. I am\
    \ a big fan of building the thin slice first, although there are many inefficiencies\
    \ that can exist in the process. Once you see the result, the confidence and optimism\
    \ will motivate you to go back and optimize the process. This is a good way to\
    \ keep the stakeholders happy too, because it demonstrates continuous progress.\
    \ Figure [5-1](#A435441_1_En_5_Chapter.html#Fig1) shows an overview of the build\
    \ process.\n\n![A435441_1_En_5_Fig1_HTML.jpg](A435441_1_En_5_Fig1_HTML.jpg)\n\n\
    Figure 5-1.\n\nThe Android build process\n\n### Another Perspective on the Build\
    \ Process\n\nConsider another perspective with Gradle , which is a build and packaging\
    \ tool that drives the build process.\n\nFigure [5-2](#A435441_1_En_5_Chapter.html#Fig2)\
    \ shows this build process.\n\n![A435441_1_En_5_Fig2_HTML.jpg](A435441_1_En_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2.\n\nAndroid build process with Gradle\n\n### Output of the Build\
    \ Process\n\nAfter successfully building the app from the source code, you’ll\
    \ generally be interested in the `.apk` file, which is the app ready to be deployed.\
    \ There are other folders created in the `./app` folder inside the project too.\
    \ Figure [5-3](#A435441_1_En_5_Chapter.html#Fig3) shows the folder contents for\
    \ reference.\n\n![A435441_1_En_5_Fig3_HTML.jpg](A435441_1_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3.\n\nBuild output folders\n\n## Building from the Command Line\n\n\
    You can build your Android app in two main ways:\n\n*   IDEs such as Android Studio\
    \ and Xamarin have a menu option for building the app once the project is imported.\n\
    *   Open a shell command and start calling Android build binaries (that are part\
    \ of the SDK).\n\nNote\n\nEven the IDE calls into SDK binaries internally, but\
    \ it is abstracted from the user, hence it seems easier.\n\n### Gradle Tasks\n\
    \nThe Gradle task that you are interested in here is the one that enables you\
    \ to build, compile, and output the `.apk` file. This falls under the category\
    \ of Gradle tasks viz. build tasks. Figure [5-4](#A435441_1_En_5_Chapter.html#Fig4)\
    \ shows the tasks available from the `gradle tasks` command. Type `gradle tasks`\
    \ in the command line and check out the output. It is not necessary to remember\
    \ all the tasks; however, the more you practice the commands, the easier and faster\
    \ it gets to script it out.\n\n![A435441_1_En_5_Fig4_HTML.jpg](A435441_1_En_5_Fig4_HTML.jpg)\n\
    \nFigure 5-4.\n\nGradle tasks\n\n### The Gradle Clean AssembleDebug Task\n\nThe\
    \ `assembleDebug gradle` task follows the build process, as mentioned in the architecture\
    \ view, and the `clean` task cleans the build folder in the project.\n\nFigure\
    \ [5-5](#A435441_1_En_5_Chapter.html#Fig5) shows how the process would look when\
    \ building an app with the following command:\n\n![A435441_1_En_5_Fig5_HTML.jpg](A435441_1_En_5_Fig5_HTML.jpg)\n\
    \nFigure 5-5.\n\nGradle clean assembleDebug\n\n```\ngradle clean assembleDebug\n\
    ```\n\nA successful build should look like Figure [5-6](#A435441_1_En_5_Chapter.html#Fig6).\n\
    \n![A435441_1_En_5_Fig6_HTML.jpg](A435441_1_En_5_Fig6_HTML.jpg)\n\nFigure 5-6.\n\
    \nassembleDebug is successful\n\n### The .apk File in Debug Mode\n\nThe output\
    \ you are interested in is the `.apk` file , which is generally found in the relative\
    \ folder path `/app/build/outputs/apk`.\n\nThe debug app is typically named `app-debug.apk`\
    \ and found in the folder structure shown in Figure [5-7](#A435441_1_En_5_Chapter.html#Fig7).\n\
    \n![A435441_1_En_5_Fig7_HTML.jpg](A435441_1_En_5_Fig7_HTML.jpg)\n\nFigure 5-7.\n\
    \nApk debug file\n\n### The .apk File in Release Mode\n\nThe following command\
    \ puts the `.ap`k file in `app/output/apk/release`:\n\n```\n./gradlew assembleRelease\n\
    ```\n\nNote\n\nTo build the app in release mode, you need to sign the app in release\
    \ mode with keystore and private keys, as detailed at [`https://developer.android.com/studio/publish/app-signing.html`](https://developer.android.com/studio/publish/app-signing.html)\
    \ .\n\n## Building from Android Studio\n\nThis section explains how you can build\
    \ the Android app from Android Studio IDE.\n\n### Import the Project\n\nFigure\
    \ [5-8](#A435441_1_En_5_Chapter.html#Fig8) shows a sample Android project imported\
    \ into Android Studio. You would simply click the Play button to build the Android\
    \ app.\n\n![A435441_1_En_5_Fig8_HTML.jpg](A435441_1_En_5_Fig8_HTML.jpg)\n\nFigure\
    \ 5-8.\n\nBuild the Android app in Android Studio\n\nThe Play button will run\
    \ the last run configuration. To see a list of all configurations, click the App\
    \ dropdown , as shown in Figure [5-9](#A435441_1_En_5_Chapter.html#Fig9). Choose\
    \ Edit Configurations to see the screen in Figure [5-10](#A435441_1_En_5_Chapter.html#Fig10).\n\
    \n![A435441_1_En_5_Fig10_HTML.jpg](A435441_1_En_5_Fig10_HTML.jpg)\n\nFigure 5-10.\n\
    \nEdit Configuration screen in Android Studio\n\n![A435441_1_En_5_Fig9_HTML.jpg](A435441_1_En_5_Fig9_HTML.jpg)\n\
    \nFigure 5-9.\n\nEdit Configurations in Android Studio\n\nFeel free to click each\
    \ of the tabs and customize as needed. This example uses the defaults.\n\n###\
    \ Android Studio Views\n\nAndroid Studio provides different views for the project\
    \ viz.\n\n*   Project\n*   Packages\n*   Scratches\n*   Android\n*   Project files\n\
    *   Problems\n*   Production\n*   Tests\n\nThe version of Android Studio that\
    \ is stable and works with the code in this book is illustrated in Figure [5-11](#A435441_1_En_5_Chapter.html#Fig11).\n\
    \n![A435441_1_En_5_Fig11_HTML.jpg](A435441_1_En_5_Fig11_HTML.jpg)\n\nFigure 5-11.\n\
    \nAbout Android Studio"
  trans: "\n# Android 设备监视器\n\n`Android Device Monitor` 是一个独立工具，为多种 Android 应用程序调试和分析工具提供图形用户界面。\n\
    \n使用以下任一选项启动 SDK 管理器（一种方式通过命令行，另一种通过 Android Studio）：\n\n*   在命令行中运行 `monitor`\
    \ 命令。这将启动设备监视器（需设置好 shell 变量，使可执行文件位于 `PATH` 中）。更多信息，请参阅 [`https://www.gitbook.com/book/machzqcq/ci-automation-mobileapps/edit`](https://www.gitbook.com/book/machzqcq/ci-automation-mobileapps/edit)。\n\
    *   点击 Android Studio IDE 中的设备监视器图标，如图 4-21 所示。\n\n    ![A435441_1_En_4_Fig21_HTML.jpg](img/A435441_1_En_4_Fig21_HTML.jpg)\n\
    \n    图 4-21. 设备监视器：Android Studio\n\n当连接一台设备时，您可以看到如图 4-22 所示的视图。\n\n![A435441_1_En_4_Fig22_HTML.jpg](img/A435441_1_En_4_Fig22_HTML.jpg)\n\
    \n图 4-22. 设备监视器：已连接设备\n\n# 5. 构建 Android 应用\n\nAndroid 应用可以构建为调试模式或发布模式——区别在于用于签署应用的密钥库。如果以发布模式构建应用，该密钥库将允许您将应用推送至\
    \ Google Play（假设与该用户 ID 关联的密钥库已在 Google Play 上注册）。\n\n由于持续集成过程在准备发布之前需要多次构建，因此本章将向您展示如何以调试模式构建应用，并使用生成的\
    \ `.apk` 文件将其传递给持续集成测试自动化步骤。\n\n## Android 构建流程\n\n以下部分简要概述了 Android 应用构建流程的高层架构。您的具体项目可能存在细微差异。\n\
    \n### 概览\n\n一旦您有了最小可行产品（MVP），理解构建流程并能根据需求进行调整是必要的。我十分推崇先构建出基本功能点，尽管过程中可能存在许多低效之处。一旦看到成果，信心和乐观情绪将激励您回过头来优化流程。这也是保持利益相关者满意的好方法，因为它展现了持续的进展。图\
    \ 5-1 展示了构建流程的概览。\n\n![A435441_1_En_5_Fig1_HTML.jpg](img/A435441_1_En_5_Fig1_HTML.jpg)\n\
    \n图 5-1. Android 构建流程\n\n### 构建流程的另一个视角\n\n结合 `Gradle`（一个驱动构建流程的构建和打包工具）来考虑另一个视角。\n\
    \n图 5-2 展示了此构建流程。\n\n![A435441_1_En_5_Fig2_HTML.jpg](img/A435441_1_En_5_Fig2_HTML.jpg)\n\
    \n图 5-2. 使用 `Gradle` 的 Android 构建流程\n\n### 构建流程的输出\n\n从源代码成功构建应用后，您通常会对 `.apk`\
    \ 文件感兴趣，该文件是准备部署的应用。项目内的 `./app` 文件夹中也会创建其他文件夹。图 5-3 显示了文件夹内容以供参考。\n\n![A435441_1_En_5_Fig3_HTML.jpg](img/A435441_1_En_5_Fig3_HTML.jpg)\n\
    \n图 5-3. 构建输出文件夹\n\n## 从命令行构建\n\n您可以通过两种主要方式构建您的 Android 应用：\n\n*   Android Studio\
    \ 和 Xamarin 等 IDE 在导入项目后，都会有用于构建应用的菜单选项。\n*   打开一个 shell 命令并开始调用 Android 构建二进制文件（这些文件是\
    \ SDK 的一部分）。\n\n注意\n\n即使 IDE 在内部调用了 SDK 二进制文件，但这对用户来说是抽象的，因此看起来更简单。\n\n### Gradle\
    \ 任务\n\n您这里感兴趣的 `Gradle` 任务是能够构建、编译并输出 `.apk` 文件的任务。这属于 `Gradle` 任务类别，即构建任务。图\
    \ 5-4 显示了 `gradle tasks` 命令提供的任务。在命令行中输入 `gradle tasks` 并查看输出。没有必要记住所有任务；然而，您练习命令越多，编写脚本就会越容易、越快。\n\
    \n![A435441_1_En_5_Fig4_HTML.jpg](img/A435441_1_En_5_Fig4_HTML.jpg)\n\n图 5-4.\
    \ `Gradle` 任务\n\n### `Gradle Clean AssembleDebug` 任务\n\n`assembleDebug gradle`\
    \ 任务遵循前文架构视图中提到的构建流程，而 `clean` 任务则清理项目中的构建文件夹。\n\n图 5-5 展示了使用以下命令构建应用时的流程：\n\n\
    ![A435441_1_En_5_Fig5_HTML.jpg](img/A435441_1_En_5_Fig5_HTML.jpg)\n\n图 5-5. `Gradle\
    \ clean assembleDebug`\n\n```\ngradle clean assembleDebug\n```\n\n一次成功的构建应如图 5-6\
    \ 所示。\n\n![A435441_1_En_5_Fig6_HTML.jpg](img/A435441_1_En_5_Fig6_HTML.jpg)\n\n\
    图 5-6. `assembleDebug` 成功\n\n### 调试模式下的 `.apk` 文件\n\n您关心的输出是 `.apk` 文件，它通常位于相对路径\
    \ `/app/build/outputs/apk` 下。\n\n调试应用通常命名为 `app-debug.apk`，位于图 5-7 所示的文件夹结构中。\n\
    \n![A435441_1_En_5_Fig7_HTML.jpg](img/A435441_1_En_5_Fig7_HTML.jpg)\n\n图 5-7.\
    \ Apk 调试文件\n\n### 发布模式下的 `.apk` 文件\n\n以下命令会将 `.apk` 文件放置在 `app/output/apk/release`\
    \ 目录中：\n\n```\n./gradlew assembleRelease\n```\n\n注意\n\n要构建发布模式的应用，您需要使用密钥库和私钥以发布模式签署应用，详情请参阅\
    \ [`https://developer.android.com/studio/publish/app-signing.html`](https://developer.android.com/studio/publish/app-signing.html)。\n\
    \n## 从 Android Studio 构建\n\n本节说明如何从 Android Studio IDE 构建 Android 应用。\n\n### 导入项目\n\
    \n图 5-8 显示了一个导入 Android Studio 的示例 Android 项目。您只需点击“播放”按钮即可构建 Android 应用。\n\n\
    ![A435441_1_En_5_Fig8_HTML.jpg](img/A435441_1_En_5_Fig8_HTML.jpg)\n\n图 5-8. 在\
    \ Android Studio 中构建 Android 应用\n\n“播放”按钮将运行上一次的运行配置。要查看所有配置的列表，请点击“应用”下拉菜单，如图\
    \ 5-9 所示。选择“编辑配置”可看到图 5-10 中的界面。\n\n![A435441_1_En_5_Fig10_HTML.jpg](img/A435441_1_En_5_Fig10_HTML.jpg)\n\
    \n图 5-10. Android Studio 中的编辑配置界面\n\n![A435441_1_En_5_Fig9_HTML.jpg](img/A435441_1_En_5_Fig9_HTML.jpg)\n\
    \n图 5-9. Android Studio 中的编辑配置\n\n可随意点击各个选项卡并根据需要进行自定义。此示例使用默认设置。\n\n### Android\
    \ Studio 视图\n\nAndroid Studio 为项目提供了不同的视图，包括：\n\n*   项目\n*   包\n*   草稿\n*   Android\n\
    *   项目文件\n*   问题\n*   生产\n*   测试\n\n图 5-11 展示了稳定且能与本书代码配合使用的 Android Studio 版本。\n\
    \n![A435441_1_En_5_Fig11_HTML.jpg](img/A435441_1_En_5_Fig11_HTML.jpg)\n\n图 5-11.\
    \ 关于 Android Studio\n"
