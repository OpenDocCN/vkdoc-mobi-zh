  raw: '### JDK on Mac


    To install the JDK on your Mac , you simply accept the license agreement, download
    the `.dmg` file, and install it, as shown in Figure [4-1](#A435441_1_En_4_Chapter.html#Fig1).


    ![A435441_1_En_4_Fig1_HTML.jpg](A435441_1_En_4_Fig1_HTML.jpg)


    Figure 4-1.


    JDK download for the Mac


    After installing and making modifications to `∼/.profile`, you’ll see something
    similar to the output shown in Figure [4-2](#A435441_1_En_4_Chapter.html#Fig2).
    Ensure that the Java executable is available on the path and that the shell variables
    `$JAVA_HOME`, `$JDK_HOME`, and `$PATH` are updated as shown.


    ![A435441_1_En_4_Fig2_HTML.jpg](A435441_1_En_4_Fig2_HTML.jpg)


    Figure 4-2.


    Shell variables


    ```

    export JDK_HOME=/Library/Java/JavaVirtualMachines/jdk1.8.0_60.jdk/Contents/Home

    export JAVA_HOME=$(usr/libexec/java_home)

    export PATH=$PATH:$JDK_HOME/bin

    ```


    ## Installing Android SDK


    Android SDK tools can be installed from the Android developer site. If you are
    a developer, it makes more sense to download Android Studio (which comes bundled
    with the SDK). However, if you are a devops/build/release/CI engineer, you might
    want to do things headless, so it makes more sense to download the standalone
    tools.


    This book focuses more on doing things headless, because IDEs in the background
    mostly call the commands.


    ### Standalone SDK


    Download the standalone SDK from [`https://developer.android.com/studio/index.html`](https://developer.android.com/studio/index.html)
    .


    Navigate to the bottom of the page for installing the tools, as shown in Figure
    [4-3](#A435441_1_En_4_Chapter.html#Fig3).


    ![A435441_1_En_4_Fig3_HTML.jpg](A435441_1_En_4_Fig3_HTML.jpg)


    Figure 4-3.


    Android SDK download


    The contents are extracted to the `/Users/pmacharl/Library/Android/sdk` folder,
    as shown in Figure [4-4](#A435441_1_En_4_Chapter.html#Fig4).


    ![A435441_1_En_4_Fig4_HTML.jpg](A435441_1_En_4_Fig4_HTML.jpg)


    Figure 4-4.


    Android SDK folder view


    Now add these shell variables to the `∼/.profile` path (see Figure [4-5](#A435441_1_En_4_Chapter.html#Fig5)):


    ![A435441_1_En_4_Fig5_HTML.jpg](A435441_1_En_4_Fig5_HTML.jpg)


    Figure 4-5.


    Update shell variables


    *   `ANDROID_HOME=/Users/pmacharl/Library/Android/sdk`

    *   `PATH=$PATH:$ANDROID_HOME/platform-tools`

    *   `PATH=$PATH:$ANDROID_HOME/tools`


    ### Quick Checks


    Since you will use the `adb` and `uiautomatorviewer` executables in subsequent
    sections, it’s smart to check that they are available in the `PATH` now.


    Type `uiatomatorviewer`, as shown in Figure [4-6](#A435441_1_En_4_Chapter.html#Fig6).


    ![A435441_1_En_4_Fig6_HTML.jpg](A435441_1_En_4_Fig6_HTML.jpg)


    Figure 4-6.


    uiautomatorviewer


    Press Ctrl+C in the shell or close `uiautomatorviewer` directly.


    This ensures that you have Android SDK set up and ready for building apps.


    ## Installing Android Studio


    In the previous section, you installed the Android SDK as a standalone and made
    it available to your build environments by setting the `PATH` variables.


    In this section, you will learn how to install and set up Android Studio.


    Note


    Android Studio is not required for building, deploying, or testing apps. It is
    a developer environment that enables you to develop apps.


    There are many benefits to having Android Studio, because the IDE centralizes
    accessibility of features like updating the SDK, `adb`, the device monitor, looking
    at logs, and more. Hence, it is strongly recommended that you install Android
    Studio even though it’s not required.


    Download it from [`https://developer.android.com/studio/index.html`](https://developer.android.com/studio/index.html)
    . See Figure [4-7](#A435441_1_En_4_Chapter.html#Fig7).


    ![A435441_1_En_4_Fig7_HTML.jpg](A435441_1_En_4_Fig7_HTML.jpg)


    Figure 4-7.


    Install Android Studio


    Follow the instructions from the installer and go with the defaults.


    ### Android Studio Basics


    In this section , you will walk through some of the functionalities in Android
    Studio that matter to the use cases in this book. Just follow along and click
    through at this stage in the book.


    Open an Android project. Point to the Android project that you are working on,
    as shown in Figure [4-8](#A435441_1_En_4_Chapter.html#Fig8).


    ![A435441_1_En_4_Fig8_HTML.jpg](A435441_1_En_4_Fig8_HTML.jpg)


    Figure 4-8.


    Open the Android project


    Hover over the icons shown in Figure [4-9](#A435441_1_En_4_Chapter.html#Fig9)
    and click each to get a feel for navigating in Android Studio.


    ![A435441_1_En_4_Fig9_HTML.jpg](A435441_1_En_4_Fig9_HTML.jpg)


    Figure 4-9.


    Android Studio subtools


    Hovering over the icons highlighted in Figure [4-9](#A435441_1_En_4_Chapter.html#Fig9)
    shows you options related to the following:


    *   AVD Manager: This will launch AVD manager. You will learn how to create emulators
    and manage Android virtual devices in another section.

    *   SDK Manager: This will help you manage all updates to the Android SDK.

    *   Android Device Monitor: This will let you monitor your Android device when
    connected and talking to `adb`.


    ### Associate the System SDK with Android Studio


    By default, Android Studio comes bundled with Android SDK. However, if you are
    already using an SDK bundle (as mentioned in previous section, if you already
    have SDK downloaded and set in another folder), then point it to that.


    Note


    Remember that this book uses an SDK downloaded separately because you need the
    flexibility to be able to build, deploy, and test the examples with and without
    Android Studio.


    At the top left, choose Android Studio ➤ Preferences to open up this page. Edit
    the value to point to the folder where you downloaded the Android SDK. See Figure
    [4-10](#A435441_1_En_4_Chapter.html#Fig10).


    ![A435441_1_En_4_Fig10_HTML.jpg](A435441_1_En_4_Fig10_HTML.jpg)


    Figure 4-10.


    Associate SDK with Android Studio


    ## Installing Gradle


    Gradle is a build package manager that helps dependency management when building
    Android apps. Compare it with Ant, Maven, npm, Rake, etc.


    ### Download and Install


    Download the binary from [`https://gradle.org/gradle-download/`](https://gradle.org/gradle-download/)
    . It is an archive, so you need to extract the contents to a folder on your machine.
    See Figure [4-11](#A435441_1_En_4_Chapter.html#Fig11).


    ![A435441_1_En_4_Fig11_HTML.jpg](A435441_1_En_4_Fig11_HTML.jpg)


    Figure 4-11.


    Download Gradle


    Figure [4-12](#A435441_1_En_4_Chapter.html#Fig12) shows where it looks after it’s
    extracted. The version being used is 2.7, but you should download the latest version
    you can. There are not too many differences that will affect your Android app
    build.


    ![A435441_1_En_4_Fig12_HTML.jpg](A435441_1_En_4_Fig12_HTML.jpg)


    Figure 4-12.


    Gradle folder structure


    ### Set Gradle Shell Variables


    Add the following code to your `∼/.profile` so that the Gradle binary is available
    in `$PATH` and `$GRADLE_HOME` is available when building the Android app. See
    Figure [4-13](#A435441_1_En_4_Chapter.html#Fig13).


    ![A435441_1_En_4_Fig13_HTML.jpg](A435441_1_En_4_Fig13_HTML.jpg)


    Figure 4-13.


    Gradle shell variables


    ```

    GRADLE_HOME=/Users/pmacharl/Installations/gradle-2.7

    export GRADLE_HOME

    export PATH=$PATH:$GRADLE_HOME/bin

    ```


    ### Android Studio with Gradle


    Android Studio comes bundled with Gradle and uses its own version internally.
    If you are a developer, you might find it more comfortable to use the built-in
    version so that you don’t have to manage yet another tool.


    Since you need the flexibility to do this with an IDE and do it in the CI (headless)
    way for this book’s examples, I suggest you direct Android Studio to use the Gradle
    downloaded previously, as shown in Figure [4-14](#A435441_1_En_4_Chapter.html#Fig14).


    ![A435441_1_En_4_Fig14_HTML.jpg](A435441_1_En_4_Fig14_HTML.jpg)


    Figure 4-14.


    Gradle setting in Android Studio


    ### Gradle Quick Commands


    `gradle --help` will give you the options for quick commands .'
  trans: "\n### 在 Mac 上安装 JDK\n\n要在 Mac 上安装 JDK，您只需接受许可协议、下载 `.dmg` 文件并安装即可，如图 4-1\
