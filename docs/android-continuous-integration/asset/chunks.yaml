- fmt: '### Feedback Loop 2: Code Quality Analysis


    The second feedback loop is the code quality analysis process using `SonarQube`,
    as shown in Figure [3-13](#A435441_1_En_3_Chapter.html#Fig13).


    ![A435441_1_En_3_Fig13_HTML.jpg](A435441_1_En_3_Fig13_HTML.jpg)


    Figure 3-13. Sonar feedback loop


    #### Jenkins Job 2: Sonar


    Name the Jenkins job and define the `Log Rotation` strategy, as shown in Figure
    [3-14](#A435441_1_En_3_Chapter.html#Fig14).


    ![A435441_1_En_3_Fig14_HTML.jpg](A435441_1_En_3_Fig14_HTML.jpg)


    Figure 3-14. Sonar job rotation


    Specify where the Sonar runner is available, as shown in Figure [3-15](#A435441_1_En_3_Chapter.html#Fig15).


    ![A435441_1_En_3_Fig15_HTML.jpg](A435441_1_En_3_Fig15_HTML.jpg)


    Figure 3-15. Sonar runner


    Restrict where the project can be run and then download the source code. See Figure
    [3-16](#A435441_1_En_3_Chapter.html#Fig16).


    ![A435441_1_En_3_Fig16_HTML.jpg](A435441_1_En_3_Fig16_HTML.jpg)


    Figure 3-16. Sonar source code


    Specify the checkout strategy, as shown in Figure [3-17](#A435441_1_En_3_Chapter.html#Fig17).


    ![A435441_1_En_3_Fig17_HTML.jpg](A435441_1_En_3_Fig17_HTML.jpg)


    Figure 3-17. Sonar checkout


    Here you don''t have `sonar-project.properties` inside the source code, so you
    can download it from Jenkins config file store and then add it to the check-out
    folder. See Figure [3-18](#A435441_1_En_3_Chapter.html#Fig18).


    ![A435441_1_En_3_Fig18_HTML.jpg](A435441_1_En_3_Fig18_HTML.jpg)


    Figure 3-18. Sonar project properties


    Since the config files are generally copied to the Jenkins master, you can move
    them to the build machine and hence use the `$sonar` variable as a carrier. See
    Figure [3-19](#A435441_1_En_3_Chapter.html#Fig19).


    ![A435441_1_En_3_Fig19_HTML.jpg](A435441_1_En_3_Fig19_HTML.jpg)


    Figure 3-19. Sonar job rotation


    You add a build step using the SonarQube plugin for Jenkins and configure it to
    use the `sonar-runner`, as defined on the Jenkins System configuration page. See
    Figure [3-20](#A435441_1_En_3_Chapter.html#Fig20).


    ![A435441_1_En_3_Fig20_HTML.jpg](A435441_1_En_3_Fig20_HTML.jpg)


    Figure 3-20. Sonar job rotation feedback (execution results)


    After you run the job, the Jenkins console log looks like Figure [3-21](#A435441_1_En_3_Chapter.html#Fig21).


    ![A435441_1_En_3_Fig21_HTML.jpg](A435441_1_En_3_Fig21_HTML.jpg)


    Figure 3-21. Sonar console output


    Click the SonarQube icon. It will open the SonarQube home page/dashboard as you
    have configured it on the server. See Figure [3-22](#A435441_1_En_3_Chapter.html#Fig22).


    ![A435441_1_En_3_Fig22_HTML.jpg](A435441_1_En_3_Fig22_HTML.jpg)


    Figure 3-22. Sonar icon link


    Figure [3-23](#A435441_1_En_3_Chapter.html#Fig23) shows the Sonar Dashboard and
    each of the orange highlights (and many more hyperlinks) opens information that
    contains great feedback for developers.


    ![A435441_1_En_3_Fig23_HTML.jpg](A435441_1_En_3_Fig23_HTML.jpg)


    Figure 3-23. Sonar Dashboard


    ### Feedback Loop 3: Test


    This feedback loop is the integration automation test—i.e., the acceptance tests
    that an end user would experience (see Figure [3-24](#A435441_1_En_3_Chapter.html#Fig24)).
    This is the relative difficult part to automate, so I discuss it in detail in
    Chapter [8](#A435441_1_En_8_Chapter.html).


    ![A435441_1_En_3_Fig24_HTML.jpg](A435441_1_En_3_Fig24_HTML.jpg)


    Figure 3-24. Test feedback loop


    #### Jenkins Job 3: Acceptance Tests


    Name the Jenkins job as smoke tests/acceptance tests, depending on how many you
    want to execute. This example uses smoke tests, as shown in Figure [3-25](#A435441_1_En_3_Chapter.html#Fig25).


    ![A435441_1_En_3_Fig25_HTML.jpg](A435441_1_En_3_Fig25_HTML.jpg)


    Figure 3-25. Test job rotation


    Enter the Nexus username if you want to upload the results of the test execution
    (this example does not). Then define the `DEVICE` string parameter and add all
    the devices that are defined in the `devices.yaml` file in the acceptance tests
    projects. See Figure [3-26](#A435441_1_En_3_Chapter.html#Fig26).


    ![A435441_1_En_3_Fig26_HTML.jpg](A435441_1_En_3_Fig26_HTML.jpg)


    Figure 3-26. Test Nexus and device parameters


    Specify where the project should run and download the acceptance tests code, as
    shown in Figure [3-27](#A435441_1_En_3_Chapter.html#Fig27).


    ![A435441_1_En_3_Fig27_HTML.jpg](A435441_1_En_3_Fig27_HTML.jpg)


    Figure 3-27. Test source code


    Specify the master branch for code checkout, as shown in Figure [3-28](#A435441_1_En_3_Chapter.html#Fig28).


    ![A435441_1_En_3_Fig28_HTML.jpg](A435441_1_En_3_Fig28_HTML.jpg)


    Figure 3-28. Test Nexus and device parameters


    For Ruby dependencies, pull gems from the Nexus repo. You must then specify the
    Nexus access credentials, as shown in Figure [3-29](#A435441_1_En_3_Chapter.html#Fig29).


    ![A435441_1_En_3_Fig29_HTML.jpg](A435441_1_En_3_Fig29_HTML.jpg)


    Figure 3-29. Test Nexus access for Jenkins


    Download the app from Nexus, place it in the `resources` folder, and then execute
    the acceptance tests. See Figure [3-30](#A435441_1_En_3_Chapter.html#Fig30).


    ![A435441_1_En_3_Fig30_HTML.jpg](A435441_1_En_3_Fig30_HTML.jpg)


    Figure 3-30. Test Nexus and device parameters


    ```bash

    #!/bin/bash

    ## uncomment set -xv for debuging

    #set -xv

    export PATH=$PATH:$HOME/.rvm/bin

    [[ -s "$HOME/.rvm/scripts/rvm" ]] && source "$HOME/.rvm/scripts/rvm"

    pwd

    echo $UPSTREAM_BUILD_NUMBER

    rvm list

    curl -u$NEXUS_USERNAME:$NEXUS_PASSWORD -O https://nexus.inmar.com/nexus/service/local/repositories/snapshots/content-mobile/HOPSTER_MOBILE_SNAPSHOT_$UPSTREAM_BUILD_NUMBER

    ls -l

    bundle exec cucumber features/android.feature:19 DEVICE=$DEVICE

    ```


    Choose `Publish Cucumber Results` as a Report, as shown in Figure [3-31](#A435441_1_En_3_Chapter.html#Fig31).


    ![A435441_1_En_3_Fig31_HTML.jpg](A435441_1_En_3_Fig31_HTML.jpg)


    Figure 3-31. Test publish Cucumber results


    #### Feedback (Execution Results)


    Since you choose to publish the Cucumber results as a report, you can get reports,
    as shown in Figures [3-32](#A435441_1_En_3_Chapter.html#Fig32) and [3-33](#A435441_1_En_3_Chapter.html#Fig33).


    ![A435441_1_En_3_Fig33_HTML.jpg](A435441_1_En_3_Fig33_HTML.jpg)


    Figure 3-33. Test cucumber graphical reports-2


    ![A435441_1_En_3_Fig32_HTML.jpg](A435441_1_En_3_Fig32_HTML.jpg)


    Figure 3-32. Test Cucumber graphical reports-1


    # 4. Android System Setup


    Chapter [3](#A435441_1_En_3_Chapter.html) focused on how fast you can get to a
    quick feedback loop, and this chapter covers what is needed for an MVP. The Android
    world has great tools and utilities that address the varied needs of a developer.


    You will install the following so that you can learn to build an app:


    - Java

    - Android SDK

    - Android Studio

    - Gradle


    ## Installing Java


    This section explains the Java platform and how to install it.


    ### JRE vs. JDK vs. SE


    You will download and install the Java Development Kit (`JDK`) in this section.
    As a quick refresher, you might wonder which Java package you need.


    - `JDK`: Software developers generally tend to use the `JDK`. It includes the
    Java runtime and libraries for troubleshooting and monitoring applications.

    - `SE` (Standard Edition): Administrators typically use the `SE` version.

    - `JRE` (Java Runtime Environment): This is the minimal version used by end users
    to run Java applications.'
