    ### Direct Commands to Target\n\n`adb` can direct commands to a specific target\
    \ using this syntax:\n\n```\nadb -s  \n```\n\nIf there is only one device connected,\
    \ use the `-d` switch. Similarly, if there is only one emulator connected, use\
    \ the `-e` switch.\n\nTo be on the safe side, using the `-s` switch will ensure\
