- fmt: '# Enable USB Debug


    Before connecting your real device via USB to the computer, you have to enable
    the Developer options, since only then will ADB be able to talk to this device.


    To access these settings, open the Developer options in the system settings. On
    Android 4.2 and higher, the Developer options screen is hidden by default. To
    make it visible, go to Settings ➤ About Phone and click Build Number seven times.
    Return to the previous screen to find the Developer options at the bottom (see
    Figure [6-4](#A435441_1_En_6_Chapter.html#Fig4)). For more details about this
    process, see [`https://developer.android.com/studio/run/device.html`](https://developer.android.com/studio/run/device.html).


    ![A435441_1_En_6_Fig4_HTML.jpg](A435441_1_En_6_Fig4_HTML.jpg)


    Figure 6-4.


    USB Debug enable screen


    Your version of the image in Figure [6-4](#A435441_1_En_6_Chapter.html#Fig4) might
    differ, depending on your device.


    # Connect the Device


    Now you can connect the device using a USB cable to your computer. Open a command
    prompt (or shell if you are on a Mac) and type:


    ```

    adb devices

    ```


    This command will list all the devices that are connected and have USB debugging
    enabled.


    If all goes well, you should see that your device is recognized, as shown in Figure
    [6-5](#A435441_1_En_6_Chapter.html#Fig5).


    ![A435441_1_En_6_Fig5_HTML.jpg](A435441_1_En_6_Fig5_HTML.jpg)


    Figure 6-5.


    `adb devices` output


    # Troubleshooting Tips


    Sometimes, you might see `unauthorized` instead of the device listed, as shown
    in the following code. The reason this generally happens is because of an improper
    handshake between the device and the Mac. The RSA fingerprint should be generated
    and the Mac should have the public key. You should see a pop-up on the device
    to accept the connection. The effect of `unauthorized` is that any subsequent
    commands will throw an error, such as the `$ADB_VENDOR_KEYS` not being set:


    ```

    pradeep@seleniumframework.com: $ adb devices

    List of devices attached

    209c6111 unauthorized

    pradeep@seleniumframework.com: $ adb tcpip 5555

    error: device unauthorized

    This adbd''s $ADB_VENDOR_KEYS is not set; try ''adb kill-server'' if that seems
    wrong. Otherwise check for a confirmation dialog on your device

    ```


    To solve this unauthorized problem, delete the files `adbkey`, `adbkey.pub` from
    all of these locations. (It is okay to do this, because the files are generated
    every time the device is connected if one is not found).


    ```

    ~/.android

    ~/.AndroidStudioXX/.android

    ```


    After deleting these files, restart ADB with `adb kill-server` and then `adb start-server`.
    At this point, you should see a pop-up on the device to accept the connection.
    Click Yes. For full details of this problem, see [`http://forum.xda-developers.com/verizon-lg-g3/help/unable-to-access-adb-t2830087`](http://forum.xda-developers.com/verizon-lg-g3/help/unable-to-access-adb-t2830087).


    # Debugging the WiFi


    This section is applicable only if you are interested in exploring with WiFi.
    As a beginner, a USB wired connection will get you the MVP faster.


    It is possible to connect an Android device over WiFi. While the experience is
    not as smooth as connecting to a USB cable, understanding the fundamentals of
    networking concepts helps you debug and troubleshoot any connection issues.


    I find these two links to be helpful for first timers:


    *   [`http://codetheory.in/android-debug-bridge-adb-wireless-debugging-over-wi-fi/`](http://codetheory.in/android-debug-bridge-adb-wireless-debugging-over-wi-fi/)

    *   [`https://stackoverflow.com/questions/2604727/how-can-i-connect-to-android-with-adb-over-tcp`](https://stackoverflow.com/questions/2604727/how-can-i-connect-to-android-with-adb-over-tcp)


    ## ADB Commands


    `adb` commands are quite helpful in this context.


    There are many options for `adb`. Simply type `adb` in the command line to see
    the options. A few I tried were:


    ```

    adb get-serialno

    adb get-devpath

    adb get-state (prints: offline | bootloader | device)

    adb usb (back to listening on usb)

    adb tcp (listen on tcp protocol)

    ```


    All these options can also be seen on the command line by typing `adb help`, as
    shown in Figure [6-6](#A435441_1_En_6_Chapter.html#Fig6).


    ![A435441_1_En_6_Fig6_HTML.jpg](A435441_1_En_6_Fig6_HTML.jpg)


    Figure 6-6.


    ADB help


    ## Connect Over WiFi


    If the mobile device and machine are in the same network (the `adb` client has
    to communicate with the `adbd` daemon running on mobile devices), then the experience
    will be much easier. Ensure that both of them are connected to the same WiFi connection
    before following these steps.


    1. Manually discover the IP address of the device by navigating to Settings ➤
    About Phone ➤ Status.

    2. Auto discover the IP address with the `adb shell`... command. Any devices that
    have `adbd` (the `adb` daemon) listening will show up here. (You can also check
    if the Android debug interface is enabled on your device by going to Settings
    ➤ Developer Options ➤ Debugging section ➤ Android Debugging.)


    ```

    C:\Users\pmacharl>adb tcpip 5555

    C:\Users\pmacharl>adb devices

    List of devices attached

    C:\Users\pmacharl>adb connect 192.168.1.141:5555

    connected to 192.168.1.141:5555

    C:\Users\pmacharl>adb devices

    List of devices attached

    192.168.1.141:5555 device

    C:\Users\pmacharl>adb shell ip -f inet addr show wlan0

    wlan0:  mtu 1500 qdisc mq state UP qlen 1000 inet 192.168.1.141/24 brd 192.168.1.255
    scope global wlan0

    C:\Users\pmacharl>adb usb

    restarting in USB mode

    C:\Users\pmacharl>adb devices

    List of devices attached

    ```


    You can also choose to make `adb` listen on another port, such as 4455.


    As you can see in the following code, first the device was connected to the PC/Mac
    in both USB and TCP/IP (network) mode, hence, there were two rows listed. But
    when I unplugged the USB cable, only the TCP/IP mode was enabled and hence only
    one row is shown.


    ```

    C:\Users\pmacharl>adb tcpip 4455

    restarting in TCP mode port: 4455

    C:\Users\pmacharl>adb shell ip -f inet addr show wlan0

    wlan0:  mtu 1500 qdisc mq state UP qlen 1000 inet 192.168.1.141/24 brd 192.168.1.255
    scope global wlan0

    C:\Users\pmacharl>adb connect 192.168.1.141:5555

    unable to connect to 192.168.1.141:5555

    C:\Users\pmacharl>adb connect 192.168.1.141:4455

    connected to 192.168.1.141:4455

    C:\Users\pmacharl>adb devices

    List of devices attached

    209c6111 device

    192.168.1.141:4455 device

    C:\Users\pmacharl>adb devices

    List of devices attached

    192.168.1.141:4455 device

    ```


    # Remote Debug Chrome


    This section is more useful when you start writing automation scripts and have
    to identify UI element locators; otherwise, the USB wired connection will help
    with MVP.


    To use remote debugging, you need the following:


    * Chrome (version 32) or later installed on your machine

    * Android device running Android 4.4+

    * USB debugging enabled

    * USB cable


    Once the basic things are in place, connect your device to the machine using a
    USB cable. Launch Chrome and open a tab with target `chrome://inspect`. The Chrome
    screen should resemble Figure [6-7](#A435441_1_En_6_Chapter.html#Fig7).


    ![A435441_1_En_6_Fig7_HTML.jpg](A435441_1_En_6_Fig7_HTML.jpg)


    Figure 6-7.


    Chrome connect


    Once you click OK, your device will show up in the browser tab, as shown in Figure
    [6-8](#A435441_1_En_6_Chapter.html#Fig8).


    ![A435441_1_En_6_Fig8_HTML.jpg](A435441_1_En_6_Fig8_HTML.jpg)


    Figure 6-8.


    Device connected to Chrome


    You can also use the screencast option by clicking the Screencast icon in the
    upper-right corner of your remote debugging DevTools window. See Figure [6-9](#A435441_1_En_6_Chapter.html#Fig9).


    ![A435441_1_En_6_Fig9_HTML.jpg](A435441_1_En_6_Fig9_HTML.jpg)


    Figure 6-9.


    Screencast option'
