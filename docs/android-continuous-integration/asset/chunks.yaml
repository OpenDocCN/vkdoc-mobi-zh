    你需要在可用的网络端口上启动 Appium 服务器，以便与这些设备通信。在此示例中，我只在一台设备上执行。


    ### `devices.yaml`


    设备的配置定义在 YAML 文件中，如下代码所示。如果有新设备需要连接，复制粘贴该代码块，然后根据需要替换值（`serial`、`name` 和 `port`）。


    请确保为每台设备提供不同的端口。


    > **注意：** 此端口应与 Appium 服务器启动时使用的端口相同（Appium 服务器默认端口为 4723）。


