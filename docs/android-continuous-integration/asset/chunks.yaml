    # 7. 部署或安装 Android 应用


    在第 5 章和第 6 章中，你了解到构建的输出是 `.apk` 文件，并且需要先连接你想要安装 `.apk` 文件的目标设备。在本章中，你将学习如何将 Android
    应用部署到连接到 Mac 的目标设备上。


    ## 连接并识别目标


    你可以使用以下命令识别连接到机器的模拟器或设备：


    ```

    Anyones-mac-mini: pmacharl$ adb devices

    List of devices attached

    emulator-5554 device

    emulator-5556 device

    emulator-5558 device

    00a219ae09d05912 device

    ```


    `List of devices attached` 行之后的每一行代表一个模拟器或一个设备。模拟器的名称前缀为 `emulator-xx`，而设备则有一个序列号。


    ### 向目标发送直接命令


    `adb` 可以使用以下语法向特定目标发送命令：


    ```

    adb -s <设备序列号>

    ```


    如果只连接了一个设备，请使用 `-d` 开关。类似地，如果只连接了一个模拟器，请使用 `-e` 开关。


    为了安全起见，使用 `-s` 开关可以确保只匹配一个目标。


    ### 在模拟器上安装


    在 `emulator-5554` 上安装：


    ```

    adb -s emulator-5556 install myapp.apk

    ```


    ### 在真机上安装


    在设备 `<设备序列号>` 上安装：


    ```

    adb -s 00a219ae09d05912 install myapp.apk

    ```


    ## 命令行演示


    命令如下所示。


    ```

    adb -s <设备序列号> install app-debug.apk

    adb kill-server

    adb start-server

    adb devices

    ```


    有时，如果延迟过长（超过 5 分钟），你可能需要终止 `adb` 并重新启动。大多数情况下，你不需要这样做，除非设备持续运行了一周左右。这通常应作为移动设备实验室设置的一部分来处理，即在特定时间间隔刷新/重置
    `adb` 连接。图 7-1 展示了演示过程。


    ![A435441_1_En_7_Fig1_HTML.jpg](img/A435441_1_En_7_Fig1_HTML.jpg)


    图 7-1. `adb` 命令演示


    ## Android Studio 演示


    如果你决定使用 Android Studio，请点击应用图标旁边的“运行”按钮。应该会出现如图 7-2 所示的对话框。


    ![A435441_1_En_7_Fig2_HTML.jpg](img/A435441_1_En_7_Fig2_HTML.jpg)


    图 7-2. Android Studio 应用安装


    点击“确定”。你将能够在终端中看到确切的命令，如图 7-3 所示。将 `.apk` 文件复制到设备中的 `/data/*` 文件夹，然后安装应用。自动将调试器附加到正在运行的进程等。输出应类似于图
    7-3。这里提供了大量可供处理的信息，例如 `logcat tab`、`adb log` 文件等。


    ![A435441_1_En_7_Fig3_HTML.jpg](img/A435441_1_En_7_Fig3_HTML.jpg)


    图 7-3. 安装控制台


    此时，你应该能够在移动设备上看到活动，并且应用应该已启动，并显示主活动界面。


    # 8. 使用 Appium


    本章将进一步介绍 Appium `工具/框架/库`，并解释其是什么、为什么以及如何使用，以便你为第 9 章中的自动化测试做好准备。有关详细信息，你可以访问
    Appium 的网站 [`http://appium.io/`](http://appium.io/)。


    ## 为什么选择 Appium？


    本节解释了我选择 Appium 作为自动化测试平台的原因。在第 2 章中，你已经简单了解了 Appium，本章将进行更详细的介绍。


    *   **WebDriver JSON Wire 协议**：Appium 基于 WebDriver 协议设计，该协议将成为 W3C 协议，并与 Selenium
    现有的各种框架保持一致。

    *   **多种编程语言**：由于 WebDriver 是基于 HTTP 的有线协议，任何与 WebDriver 兼容的语言都可以与 Appium 配合使用。因此，与
    Selenium 非常相似，Appium 客户端库支持 Ruby、Java、Python、PHP、JavaScript 等。即使使用像 Go 这样的较新编程语言，你也需要实现
    WebDriver 协议定义的契约，它就可以工作。

    *   **发布版应用 vs. 调试版应用**：单元测试可以测试具有源代码访问权限的路径，但最终用户体验需要使用发布版应用构建进行测试。Appium 适用于发布版应用构建，这意味着你将在集成和最终用户测试自动化场景中获得相对更高的信心。

    *   **开源**：由于它是开源的，因此有一个庞大的社区支持并解决问题。虽然有些人可能认为这最初很困难，但带有众包模式的开源是软件世界发展的方向。投资于这种灵活且将决策权交到开发者手中的技术是明智的。


    ## Appium 概念


    在接下来的几节中，你将了解 Appium 所基于的基本架构范式。当你阅读这些部分时，你可能会发现 Selenium WebDriver 架构与 Appium
    之间存在强相关性（假设你不仅仅是 Selenium 库的用户，而是曾在某个时候深入了解过 Selenium 的源代码或其架构）。理解这种类比并非先决条件，但它将有助于你调试复杂的细节。（例如，尝试捕获测试执行所在节点的远程
    IP 地址。）


    ### 客户端/服务器架构


    Appium 本质上是一个暴露 REST API 的 Web 服务器。它接收来自客户端的连接，监听命令，在移动设备上执行这些命令，并返回一个表示命令执行结果的
    HTTP 响应。拥有客户端/服务器架构会带来许多可能性。你可以使用任何具有 HTTP 客户端 API 的语言编写测试代码，但使用 Appium 客户端库之一会更简单。你可以将服务器放在与运行测试不同的机器上。你可以编写测试代码，并依赖像
    Sauce Labs 这样的云服务来接收和解释命令。


    ### 会话


    自动化总是在会话的上下文中执行的。客户端以每种库特有的方式向服务器发起会话，但最终都会向服务器发送一个 `POST /session` 请求，并附带一个称为“所需功能”对象的
    JSON 对象。此时，服务器将启动自动化会话，并响应一个会话 ID，该 ID 用于发送后续命令。


    ### 所需功能


    所需功能是一组键值对（即映射或哈希），发送给 Appium 服务器，以告知它你想要启动哪种自动化会话。还有各种功能可以在自动化期间修改服务器的行为。例如，你可以将
    `platformName` 功能设置为 Android，以告诉 Appium 你想要一个 Android 会话。或者，你可以将 `chromeAllowPopups`
    功能设置为 `true`，以确保在 Safari 自动化会话期间，允许你使用 JavaScript 打开新窗口。有关 Appium 可用功能的完整列表，请参阅功能文档。


    ### Appium 服务器


    Appium 是一个用 Node.js 编写的服务器。它可以从源代码构建和安装，也可以直接从 NPM 安装。


    ### Appium 客户端


    有一些客户端库（Java、Ruby、Python、PHP、JavaScript 和 C#）支持 Appium 对 WebDriver 协议的扩展。使用 Appium
    时，你可能希望使用这些客户端库而不是常规的 WebDriver 客户端，因为社区已经实现了大部分调用。你可以在 [`https://github.com/appium/appium/blob/master/docs/en/about-appium/appium-clients.md`](https://github.com/appium/appium/blob/master/docs/en/about-appium/appium-clients.md)
    查看库的完整列表。

