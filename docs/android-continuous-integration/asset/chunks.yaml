  trans: '

    ### 什么是 Sauce Labs？


    Sauce Labs 提供基础设施和平台两种云服务。


    -   **基础设施**：超过 700 种浏览器和操作系统平台的组合。包括移动端模拟器和仿真器，以及真实设备。

    -   **平台**：Selenium Grid 平台，使采用 WebDriver 协议进行通信的自动化测试能够针对底层基础设施执行测试。

    -   **用户界面**：一个用于手动测试的友好图形界面，可按需提供浏览器、模拟器、仿真器和真实移动设备。Sauce Labs 的功能远不止于此，但我鼓励您在线了解更多信息。


    ### 针对 Sauce Labs 运行测试


    您可以在真实设备或模拟器上运行 Sauce Labs。


    #### 在真实设备上运行


    将您的应用上传到 Sauce 存储。将以下值替换为您的 Sauce 凭证：


    ```

    $ curl -u $SAUCE_USERNAME:$SAUCE_ACCESS_KEY -X POST "http://saucelabs.com/rest/v1/storage/$SAUCE_USERNAME/my_app.zip?overwrite=true"
    -H "Content-Type: application/octet-stream" -data-binary @my_app.zip

    ```


    现在，在 `devices.yaml` 中添加真实设备配置。示例如图 9-5 所示。


    ![A435441_1_En_9_Fig5_HTML.jpg](img/A435441_1_En_9_Fig5_HTML.jpg)


    图 9-5. `devices.yaml` 中的 Sauce Labs 配置


    ##### 特性文件 (ci_android.feature)


    以下是特性文件：


    ```

    @ci_add_contact_sauce

    Scenario: Contact on sauce

    Given I open login screen on app

    And I click add contact

    Then I successfully add a contact

    ```


    ##### Hooks.rb 文件


    以下是 `Hooks.rb` 文件：


    ```

    Before(''@ci_add_contact_sauce'') do

    caps = sauce_capabilities(app=''http://saucelabs.com/example_files/app-debug.apk'',
    appActivity=''com.example.android.contactmanager.ContactManager'', appPackage=''com.example.android.contactmanager'')

    @driver= Appium::Driver.new(caps)

    Appium.promote_appium_methods AppiumWorld

    puts "Execute anything before scenario/test case"

    @driver.start_driver

    end

    ```


    ##### 执行文件


    现在运行它：


    ```

    bundle exec cucumber features/ci_android.feature:26 DEVICE=saucelabs_samsung_galaxy_s4

    ```


    ##### 反馈


    一旦您启动执行，您应该会立即在 Sauce 仪表板上看到一行表示执行会话的记录。参见图 9-6。


    ![A435441_1_En_9_Fig6_HTML.jpg](img/A435441_1_En_9_Fig6_HTML.jpg)


    图 9-6. Sauce Labs 控制台


    当执行完成时，结果应如图 9-7 所示。


    ![A435441_1_En_9_Fig7_HTML.jpg](img/A435441_1_En_9_Fig7_HTML.jpg)


    图 9-7. Sauce Labs 执行结果


    点击该执行会话行，您可以找到有助于分析结果的信息（包括视频、Appium 日志、截图和详细日志）。图 9-8 展示了 Sauce Labs 的执行视频。


    ![A435441_1_En_9_Fig8_HTML.jpg](img/A435441_1_En_9_Fig8_HTML.jpg)


    图 9-8. Sauce Labs 执行视频


    结果也可以在根文件夹的 `results.html` 文件中找到（见图 9-9），因为示例会按照 `cucumber.yaml` 配置文件中的指定输出 HTML
    结果。


    ![A435441_1_En_9_Fig9_HTML.jpg](img/A435441_1_En_9_Fig9_HTML.jpg)


    图 9-9. Cucumber 结果


    #### 在模拟器上运行


    由于 Sauce Labs 提供了模拟器，区别在于构建期望功能对象的方式，因此请替换 `emulators.yaml` 中的值。这些值可以从他们的文档中读取，该文档位于
    [`https://wiki.saucelabs.com/display/DOCS/Platform+Configurator#/`](https://wiki.saucelabs.com/display/DOCS/Platform+Configurator#/)。


    ## 多设备并行自动化


    本节简要介绍如何在多个设备上并行执行测试。


    并行执行自动化测试取决于以下任一条件（见图 9-10）：


    ![A435441_1_En_9_Fig10_HTML.jpg](img/A435441_1_En_9_Fig10_HTML.jpg)


    图 9-10. 多设备并行执行架构


    -   应用支持并行会话

    -   测试自动化框架能否启动并行测试

    -   是否有多个 Appium 服务器，每个设备一个，并配有专用端口


    并行执行也可能导致竞态条件，因此在确认并行测试可行之前，理解应用域和调用路径至关重要。


    ### 在不同端口上启动 Appium 服务器


    以下是启动多个 Appium 服务器的命令。请确保为每个 Appium 服务器打开一个新的 shell。


    ```

    appium -p 4724 -bp 4726 -U EGxxxxxxxxx

    appium -p 4734 -bp 4736 -U EGxxxxxxxxx

    ```


    如果您的目标设备/模拟器的 SDK 版本低于 4.2 或 API 级别低于 16，Appium 将使用 `selendroid`。在这种情况下，您需要在前面的命令中追加
    `--selendroid-port`（通常端口间隔保持 10 个，因为 Appium 会使用 `-p` 端口加 1 的端口）：


    ```

    appium -p 4724 -bp 4726 --selendroid-port 4737 -U EGxxxxxxxxx

    appium -p 4734 -bp 4736 --selendroid-port 4747 -U EGxxxxxxxxx

    ```


    如果您从 `Appium.exe` 路径运行 Appium，请使用：


    ```

    node appium --nodeconfig path\to\nodeconfig.json -p 4724 -bp 5724

    ```


    或者，如果您使用 `cmd`，请使用以下命令：


    ```

    appium --nodeconfig path\to\nodeconfig1.json -p 4724 -bp 5724

    ```

