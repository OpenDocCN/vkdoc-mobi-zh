    \ 项目。指向您正在处理的 Android 项目，如图 4-8 所示。\n\n![A435441_1_En_4_Fig8_HTML.jpg](img/A435441_1_En_4_Fig8_HTML.jpg)\n\
    \n**图 4-8.** 打开 Android 项目\n\n将鼠标悬停在图 4-9 所示的图标上，并单击每个图标以熟悉 Android Studio 的导航。\n\
    \n![A435441_1_En_4_Fig9_HTML.jpg](img/A435441_1_En_4_Fig9_HTML.jpg)\n\n**图 4-9.**\
    \ Android Studio 子工具\n\n将鼠标悬停在图 4-9 中高亮显示的图标上，会显示与以下内容相关的选项：\n\n*   **AVD 管理器**：这将启动\
    \ AVD 管理器。您将学习如何在另一节中创建模拟器和管理 Android 虚拟设备。\n*   **SDK 管理器**：这将帮助您管理 Android SDK\
    \ 的所有更新。\n*   **Android 设备监视器**：这将让您在 Android 设备连接并与 `adb` 通信时对其进行监控。\n\n### 将系统\
    \ SDK 与 Android Studio 关联\n\n默认情况下，Android Studio 捆绑了 Android SDK。但是，如果您已经在使用一个\
    \ SDK 包（如上一节所述，如果您已经下载了 SDK 并将其设置在另一个文件夹中），那么就将其指向该位置。\n\n> **注意**\n> \n> 请记住，本书使用单独下载的\
    \ SDK，因为您需要有或没有 Android Studio 的情况下都能灵活地构建、部署和测试示例。\n\n在左上角，选择 **Android Studio**\
    \ ➤ **偏好设置**以打开此页面。编辑该值，将其指向您下载 Android SDK 的文件夹。见图 4-10。\n\n![A435441_1_En_4_Fig10_HTML.jpg](img/A435441_1_En_4_Fig10_HTML.jpg)\n\
    \n**图 4-10.** 将 SDK 与 Android Studio 关联\n\n## 安装 Gradle\n\nGradle 是一个构建包管理器，可在构建\
    \ Android 应用程序时帮助进行依赖管理。将其与 Ant、Maven、npm、Rake 等进行比较。\n\n### 下载与安装\n\n从 [`gradle.org/gradle-download/`](https://gradle.org/gradle-download/)\
    \ 下载二进制文件。它是一个归档文件，因此您需要将内容解压到您机器上的一个文件夹中。见图 4-11。\n\n![A435441_1_En_4_Fig11_HTML.jpg](img/A435441_1_En_4_Fig11_HTML.jpg)\n\
    \n**图 4-11.** 下载 Gradle\n\n图 4-12 显示了它解压后的位置。所使用的版本是 2.7，但您应下载可用的最新版本。不会有很多差异会影响您的\
    \ Android 应用程序构建。\n\n![A435441_1_En_4_Fig12_HTML.jpg](img/A435441_1_En_4_Fig12_HTML.jpg)\n\
    \n**图 4-12.** Gradle 文件夹结构\n\n### 设置 Gradle Shell 变量\n\n将以下代码添加到您的 `~/.profile`\
    \ 中，以便在构建 Android 应用程序时，`Gradle` 二进制文件在 `$PATH` 中可用，并且 `$GRADLE_HOME` 可用。见图 4-13。\n\
    \n![A435441_1_En_4_Fig13_HTML.jpg](img/A435441_1_En_4_Fig13_HTML.jpg)\n\n**图 4-13.**\
    \ Gradle shell 变量\n\n```\nGRADLE_HOME=/Users/pmacharl/Installations/gradle-2.7\n\
    export GRADLE_HOME\nexport PATH=$PATH:$GRADLE_HOME/bin\n```\n\n### 在 Android Studio\
    \ 中使用 Gradle\n\nAndroid Studio 捆绑了 Gradle 并在内部使用它自己的版本。如果您是开发者，您可能会发现使用内置版本更舒适，这样您就不必再管理另一个工具。\n\
    \n由于您需要既能使用 IDE 也能以 CI（无头）方式处理本书的示例，我建议您指示 Android Studio 使用之前下载的 Gradle，如图 4-14\
    \ 所示。\n\n![A435441_1_En_4_Fig14_HTML.jpg](img/A435441_1_En_4_Fig14_HTML.jpg)\n\
    \n**图 4-14.** Android Studio 中的 Gradle 设置\n\n### Gradle 快速命令\n\n`gradle --help`\
    \ 将为您提供快速命令的选项。\n"
- fmt: "# Gradle Tasks\n\nGradle works by executing tasks. There can be two types:\n\
    \n- Built-in tasks: Come by default\n- Gradle custom tasks: Craft your own tasks\n\
    \nYou will use the built-in tasks to start with. It’s beyond the scope of this\
    \ chapter to go into the details of writing custom tasks.\n\nBuilt-in tasks are\
    \ categorized into the following areas:\n\n- Android tasks\n- Build tasks\n- Build\
    \ Setup tasks\n- Help tasks\n- Install tasks\n- Verification tasks\n- Other tasks\n\
    \nTo see all the tasks and more detail, run `gradle tasks --all`.\n\nTo see more\
    \ details about a task, run `gradle help --task`.\n\n## Build the App\n\nGradle\
    \ generally looks for a `build.gradle` file in the current directory and parses\
    \ the file to follow the instructions.\n\nIn this book, you will build the app\
    \ using the following command, which runs inside the Android project root directory:\n\
    \n```\ngradle clean assembleDebug\n```\n\nI will go into details about building\
    \ the app from the project in subsequent chapters.\n\n> **Note**: If you do not\
    \ want to worry about managing Gradle versions (downloading, extracting, and ensuring\
    \ the right version is used), you can use the Gradle wrapper. The Gradle wrapper\
    \ comes bundled with Gradle. The only change is, instead of using the `gradle`\
    \ binary, you use the `gradlew` binary in the same folder.\n\n# Tools to Know\n\
    \nSome of the Android SDK tools that I found useful (from the perspective of CI)\
    \ are:\n\n- ADB (Android Debug Bridge)\n- Record Video\n- uiautomatorviewer\n\
    - AVD Manager\n- SDK Manager\n- Device Monitor\n\nThe next few sections cover\
    \ how to use these tools.\n\n## ADB\n\nAndroid Debug Bridge (`adb`) is a client\
    \ that runs on a developer box and instructs a component that runs on the developer\
    \ box, which in turn communicates with a daemon that runs either on an emulator\
    \ or on a real device.\n\nHere is an example of an `adb` command. It lists the\
    \ number of devices connected to the machine on which `adb` is executed.\n\n```\n\
    pradeep@seleniumframework.com:∼ pmacharl$ adb devices\nList of devices attached\n\
    00a219ae09d05912    device\n```\n\nThis is one of the most important tools that\
    \ I recommend you learn to use. You will use `adb` to communicate with the app\
    \ on the emulator/real device, to install the app, and to accomplish many other\
    \ feats.\n\nHere are some `adb` commands that I use extensively:\n\n- `adb devices`\
    \ lists all emulators and devices that can communicate with this `adb` server.\n\
    - `adb install <apk>` installs `apk` on the one emulator/device that is available\
    \ to the `adb` server.\n- `adb install -e <serial_number> <apk>` installs `apk`\
    \ on a targeted emulator or device.\n- `adb kill-server` kills the `adb` server.\
    \ I use this when the server is in an unstable state.\n- `adb start-server` starts\
    \ the `adb` server.\n\nIt will be very beneficial to go over the complete list\
    \ of options that `adb` provides, especially when you’re troubleshooting. I recommend\
    \ the official page, found at [https://www.gitbook.com/book/machzqcq/ci-automation-mobileapps/edit](https://www.gitbook.com/book/machzqcq/ci-automation-mobileapps/edit).\n\
    \nYou will use the previous commands when you build-deploy-test the CI pattern\
    \ in a later chapter.\n\n## Record Video\n\nFrom Android Kitkat, i.e. 4.4 version\
    \ and above, `adb` provides a way to record screen video and save it to the device\
    \ storage. You can pull the video to the local system from there.\n\nHere are\
    \ the steps for screen recording and saving:\n\n1. Start `adb shell screenrecord\
    \ /path`.\n2. Recording starts and waits until you no longer need to record the\
    \ screen.\n3. Press Ctrl+C in the shell to stop recording.\n4. Pull the video\
    \ to your local filesystem.\n\n    ```\n    pradeep@seleniumframework.com $ adb\
    \ shell screenrecord /sdcard/example.mp4\n    ^C\n    pradeep@seleniumframework.com\
    \ $ adb pull /sdcard/example.mp4\n    4972 KB/s (2900775 bytes in 0.569s)\n  \
    \  ```\n\n## uiautomatorviewer\n\nFrom the perspective of an automation engineer,\
    \ `uiautomatorviewer` is very similar to Chrome’s `dev-tools`, Firefox’s `dev-tools`,\
    \ etc. Writing web-based automation code (such as with Selenium), identifying\
    \ HTML elements (like ID, name, and other properties), and passing that as input\
    \ to identify objects is very similar to what you can achieve with `uiautomatorviewer`,\
    \ but on the mobile side. Figure [4-15](#A435441_1_En_4_Chapter.html#Fig15) shows\
    \ the interface.\n\n![A435441_1_En_4_Fig15_HTML.jpg](A435441_1_En_4_Fig15_HTML.jpg)\n\
    \nFigure 4-15. uiautomatorviewer\n\nSome notes about `uiautomatorviewer`:\n\n\
    - It’s generally located in the `$ANDROID_HOME/tools` directory.\n- You launch\
    \ it by typing `uiautomatorviewer`.\n- Figure [4-15](#A435441_1_En_4_Chapter.html#Fig15)\
    \ is taken by clicking the Device Screenshot button, which is the second icon\
    \ from the left.\n- You can see the XML hierarchy of the elements and each node\
    \ property in the node detail. This is useful when you’re writing Appium automated\
    \ tests (if you want to use `uiautomatorviewer`).\n- You can save a screenshot\
    \ using this tool.\n\n## AVD Manager\n\nThe AVD Manager provides a graphical user\
    \ interface in which you can create and manage Android Virtual Devices (AVDs),\
    \ which are required by the Android Emulator.\n\nLaunch AVD Manager using either\
    \ of these options (one is from the command line and the other is from Android\
    \ Studio):\n\n- Run the `android avd` command at the command line. It launches\
    \ `avd` (shell variables should be set so that the executables are in `PATH`).\n\
    - Click the AVD Manager icon in Android Studio IDE, as shown in Figure [4-16](#A435441_1_En_4_Chapter.html#Fig16).\
    \ Figure [4-17](#A435441_1_En_4_Chapter.html#Fig17) shows the AVDs.\n\n    ![A435441_1_En_4_Fig17_HTML.jpg](A435441_1_En_4_Fig17_HTML.jpg)\n\
    \n    Figure 4-17. AVD Manager with AVDs\n\n    ![A435441_1_En_4_Fig16_HTML.jpg](A435441_1_En_4_Fig16_HTML.jpg)\n\
    \n    Figure 4-16. AVD Manager\n\nWhen you start to understand the Android world,\
    \ you want a sandbox to play with. Android Virtual Device Manager lets you create\
    \ AVDs/emulators for different hardware and software configurations. I found the\
    \ following features beneficial while learning the platform:\n\n- You can create\
    \ emulators for phones, tablets, wearing, TV, etc.\n- You can play with different\
    \ form factors, screen resolutions, and sizes.\n- You can experiment with different\
    \ memory sizes, API levels of software, cameras, sensors, etc.\n\nSure, there\
    \ is no substitute for a real device, but emulators at least help you understand\
    \ the various configuration(s) available, as well as identify which ones matter\
    \ while developing, building, and testing the apps. More domain knowledge for\
    \ the engineers means a higher chance of a better quality app.\n\n## SDK Manager\n\
    \nThe Android SDK Manager (see Figure [4-18](#A435441_1_En_4_Chapter.html#Fig18))\
    \ separates the SDK tools, platforms, and other components into packages for easy\
    \ access and management.\n\n![A435441_1_En_4_Fig18_HTML.jpg](A435441_1_En_4_Fig18_HTML.jpg)\n\
    \nFigure 4-18. SDK Manager\n\nLaunch SDK Manager using one of these options (one\
    \ is from the command line and the other is from Android Studio):\n\n- Run the\
    \ `android sdk` command from the command line. It launches the SDK manager (the\
    \ shell variables should be set so that the executables are in `PATH`). See [https://www.gitbook.com/book/machzqcq/ci-automation-mobileapps/edit](https://www.gitbook.com/book/machzqcq/ci-automation-mobileapps/edit)\
    \ for more information.\n- Click the SDK Manager icon in the Android Studio IDE,\
    \ as shown in Figure [4-19](#A435441_1_En_4_Chapter.html#Fig19). Figure [4-20](#A435441_1_En_4_Chapter.html#Fig20)\
    \ shows the result.\n\n    ![A435441_1_En_4_Fig20_HTML.jpg](A435441_1_En_4_Fig20_HTML.jpg)\n\
    \n    Figure 4-20. SDK Manager: Android Studio\n\n    ![A435441_1_En_4_Fig19_HTML.jpg](A435441_1_En_4_Fig19_HTML.jpg)\n\
    \n    Figure 4-19. SDK Manager: Android Studio icon"
