    \ 更新 Shell 变量\n\n*   `ANDROID_HOME=/Users/pmacharl/Library/Android/sdk`\n*   `PATH=$PATH:$ANDROID_HOME/platform-tools`\n\
    *   `PATH=$PATH:$ANDROID_HOME/tools`\n\n### 快速检查\n\n由于您将在后续章节中使用 `adb` 和 `uiautomatorviewer`\
    \ 可执行文件，因此明智的做法是立即检查它们是否在 `PATH` 中可用。\n\n输入 `uiautomatorviewer`，如图 4-6 所示。\n\n\
    ![A435441_1_En_4_Fig6_HTML.jpg](img/A435441_1_En_4_Fig6_HTML.jpg)\n\n**图 4-6.**\
    \ `uiautomatorviewer`\n\n在 shell 中按 `Ctrl+C` 或直接关闭 `uiautomatorviewer`。\n\n这确保了您已经设置好\
    \ Android SDK，并准备好构建应用程序。\n\n## 安装 Android Studio\n\n在上一节中，您以独立方式安装了 Android SDK，并通过设置\
    \ `PATH` 变量使其可用于您的构建环境。\n\n在本节中，您将学习如何安装和设置 Android Studio。\n\n> **注意**\n> \n\
    > Android Studio 并非构建、部署或测试应用程序所必需。它是一个开发者环境，使您能够开发应用程序。\n> \n> 拥有 Android Studio\
    \ 有很多好处，因为该 IDE 集中了各种功能的访问，例如更新 SDK、`adb`、设备监视器、查看日志等。因此，强烈建议您安装 Android Studio，即使它不是必需的。\n\
    \n从 [`developer.android.com/studio/index.html`](https://developer.android.com/studio/index.html)\
