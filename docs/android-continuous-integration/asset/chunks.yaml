    ### Git 仓库与文件夹结构


    本书用于演示测试自动化的 Git 仓库位于 [`https://github.com/machzqcq/ci_android_acceptancetests.git`](https://github.com/machzqcq/ci_android_acceptancetests.git)。


    图 9-1 展示了文件夹结构。


    - `ci_android_acceptancetests` 是 Cucumber 项目根目录。

    - `features` 文件夹包含特性文件。

    - `step_definitions` 文件夹包含后台代码。本例中有两个 Ruby 文件。文件数量不限，且可分散在多个文件中。

    - `support` 文件夹是标准的 Cucumber 支持文件夹，即当 Cucumber 进程启动时，该文件夹中的代码会被执行；而 `resources`
    文件夹包含 `app-debug.apk`，这是构建过程的输出产物。

    - `env.rb` 通常是加载 Cucumber 项目模块及其他上下文所需的文件。

    - `hooks.rb` 包含场景的前置与后置条件。你也可以将其放入 `env.rb`，但按惯例，我使用 `hooks`。

    - `ci_android.feature` 包含场景或测试用例。

    - `lib` 文件夹由本框架定义，用于存放混入的代码。它还包含设备和模拟器的配置定义。

    - `devices.yaml` 包含设备定义。

    - `emulators.yaml` 包含模拟器定义。

    - `capabilities.rb` 包含返回所需能力对象的模块。

    - `screen_helper.rb` 模块为将来应用页面对象模式预留。

    - `scripts` 文件夹用于在将内容正式纳入特性文件前快速测试。虽然并非必需，但它有助于编写快速代码片段。

    - `contact_screen.png` 是某个场景截取的屏幕截图。

    - `cucumber.yml` 是 Cucumber 的配置文件。

    - `example.mp4` 是执行场景时录制的屏幕录像。（关于如何录制屏幕，请参阅`adb`教程部分。）

    - `Gemfile` 包含本项目使用的 Gem 包。

    - `Gemfile.lock` 在运行 `bundle install` 时创建。

    - `Rakefile` 目前未使用，但你可以在此定义更高级别的任务。

    - `README.md` 包含本项目的自述文件。

    - `reports.json` 是 Cucumber 的 JSON 格式输出。

    - `reports.html` 是 Cucumber 的 HTML 格式输出。


    ![A435441_1_En_9_Fig1_HTML.jpg](img/A435441_1_En_9_Fig1_HTML.jpg)


    图 9-1. 文件夹结构


