    ### 反馈循环 1：构建


    图 3-1 展示了整体架构图中的构建反馈循环。这是你构建应用的地方。


    ![A435441_1_En_3_Fig1_HTML.jpg](img/A435441_1_En_3_Fig1_HTML.jpg)


    图 3-1. 构建反馈循环


    基于整体架构，第一个反馈循环执行以下操作：


    1.  检出代码。

    2.  应用（任何）配置。

    3.  编译。

    4.  运行单元测试（如果有）。

    5.  打包并上传代码。

    6.  触发代码质量分析。


    #### Jenkins Job1 配置


    图 3-2 展示了如何为第一个反馈循环配置 Jenkins Job。


    ![A435441_1_En_3_Fig2_HTML.jpg](img/A435441_1_En_3_Fig2_HTML.jpg)


    图 3-2. 构建任务轮转


    命名 Jenkins 任务并指定 `Log Rotation` 策略。


    定义一个名为 `UPLOAD` 的可选布尔标志，用于控制是否将构建产物上传到 Nexus。默认值为未选中。如果勾选，则构建产物会上传到 Nexus。参见图
    3-3。


    ![A435441_1_En_3_Fig3_HTML.jpg](img/A435441_1_En_3_Fig3_HTML.jpg)


    图 3-3. 构建 Nexus 标志


    输入与 Nexus 交互所需的 Nexus 凭据；参见图 3-4。


    ![A435441_1_En_3_Fig4_HTML.jpg](img/A435441_1_En_3_Fig4_HTML.jpg)


    图 3-4. 构建 Nexus 凭据


    输入代表源代码的 GitHub 仓库 URL，如图 3-5 所示。


    ![A435441_1_En_3_Fig5_HTML.jpg](img/A435441_1_En_3_Fig5_HTML.jpg)


    图 3-5. 构建源代码控制


    勾选“在构建开始前删除工作区”和“屏蔽密码”复选框，如图 3-6 所示。


    ![A435441_1_En_3_Fig6_HTML.jpg](img/A435441_1_En_3_Fig6_HTML.jpg)


    图 3-6. 构建工作区与屏蔽密码复选框


    如图 3-7 所示设置 Nexus 密码，以便能够被屏蔽。


    ![A435441_1_En_3_Fig7_HTML.jpg](img/A435441_1_En_3_Fig7_HTML.jpg)


    图 3-7. 构建 Nexus 密码


    设置 `JAVA_HOME`、`ANDROID_HOME`、`GRADLE_HOME`（参见图 3-8 及以下代码）并构建项目。如果编写了任何单元测试，则将其作为下一个构建步骤执行。在此情况下，没有单元测试。（注意：此任务中的
    `SONAR_RUNNER` 是多余的；你将在下游的 Jenkins 任务中使用 Sonar。）


    ![A435441_1_En_3_Fig8_HTML.jpg](img/A435441_1_En_3_Fig8_HTML.jpg)


    图 3-8. 构建 Nexus 密码


    ```bash

    #!/bin/bash

    ## uncomment set -xv for debugging

    #set -xv

    export PATH=$PATH:$HOME/.rvm/bin

    [[ -s "$HOME/.rvm/scripts/rvm" ]] && source "$HOME/.rvm/scripts/rvm"

    pwd

    rvm list

    curl -u $NEXUS_USERNAME:$NEXUS_PASSWORD -O https://nexus.com/nexus/service/local/repositories/snapshots/content-mobile/MOBILE_SNAPSHOT

    tar xvzf MOBILE_SNAPSHOT

    cp app-debug.apk ./features/support/resources

    bundle exec cucumber features/android.feature DEVICE=$DEVICE -t @tag_name

    ```


    将构建产物（即 `app-debug.apk`）上传到 Nexus，以便后续使用。


    此示例没有用 Jenkins 构建编号对该产物进行版本控制，因为它是一个快照。不过，你可以根据版本策略自由命名该产物。参见图 3-9。


    ![A435441_1_En_3_Fig9_HTML.jpg](img/A435441_1_En_3_Fig9_HTML.jpg)


    图 3-9. 构建上传产物


    触发下游任务以启动 SonarQube 分析，即反馈循环 2。


    `UPSTREAM_BUILD_NUMBER` 策略是向下游任务传递值，以便拉取“正确”的 Nexus 构建产物，如图 3-10 所示。


    ![A435441_1_En_3_Fig10_HTML.jpg](img/A435441_1_En_3_Fig10_HTML.jpg)


    图 3-10. 构建触发任务


    最后，保存任务，如图 3-11 所示。


    ![A435441_1_En_3_Fig11_HTML.jpg](img/A435441_1_En_3_Fig11_HTML.jpg)


    图 3-11. 构建保存任务


    #### 反馈（执行结果）


    运行 Jenkins 任务后，控制台输出如下所示（同时参见图 3-12）：


    ![A435441_1_En_3_Fig12_HTML.jpg](img/A435441_1_En_3_Fig12_HTML.jpg)


