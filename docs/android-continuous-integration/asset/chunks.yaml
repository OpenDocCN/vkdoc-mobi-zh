    ### Explanation of Key Concepts


    This section explains the key concepts.


    *   The locators are retrieved through `uiautomator` or `arc` or by printing the
    source. See the section entitled “Introspecting App” to learn about retrieving
    locators.

    *   In the step definitions, you must identify the elements, then retrieve the
    text and assert it against the expected text.

    *   You also need to perform actions like clicking and setting text by filling
    in the contact form and verifying that the contact was saved.

    *   It is also possible to take a screenshot at any point by calling the method
    on the driver object.


    ## Executing the Test from the Local Lab


    Now that you have written your tests, you can execute them. These examples assume
    that you connected your devices through USB or WiFi.


    ### Start the Appium Server


    To start the Appium server, follow these steps:


    1.  Identify the device using `adb devices`. (You should have connected the device
    either through USB or WiFi).  

    2.  Start the Appium server on the port (the same port that was defined for the
    device in the `devices.yaml` file) and specify the bootstrap port (must be at
    least 10 ports apart).  


    ```

    Anyones-Mac-mini:∼ pmacharl$ adb devices

    List of devices attached

    ZX1B222FCD device

    Anyones-Mac-mini:∼ pmacharl$ appium -p 4778 -bp 4789 -U ZX1B222FCD

    info: Welcome to Appium v1.4.11 (REV 8cf8311f00e59a2b10fde1834fcf6d5ace6fbcd0)

    info: Appium REST http interface listener started on 0.0.0.0:4778

    info: [debug] Non-default server args: {"udid":"ZX1B222FCD","port":4778,"bootstrapPort":4789}

    info: Console LogLevel: debug

    ```


    ### Execute the Test


    The `DEVICE` or `EMULATOR` parameters are mandatory since a target is required
    to run the test. If none is specified, a validation error is raised. The permissible
    values are the keys inside the `devices.yaml`/`emulators.yaml` file.


    *   Example 1: `DEVICE=motorola-google-ZX1B222FCD`

    *   Example 2: `EMULATOR=Nexus_4_API_23_x86`


    Execute settings scenario on a device:


    ```

    bundle exec cucumber features/ci_android.feature:5 DEVICE=motorola-google-ZX1B222FCD

    ```


    Execute open login screen:


    ```

    bundle exec cucumber features/ci_android.feature:9 DEVICE=motorola-google-ZX1B222FCD

    ```


    Add contact scenario:


    ```

    bundle exec cucumber features/ci_android.feature:15 DEVICE=motorola-google-ZX1B222FCD

    ```


    Take screenshot scenario:


    ```

    bundle exec cucumber features/ci_android.feature:21 DEVICE=motorola-google-ZX1B222FCD

    ```


    Figure [9-4](#A435441_1_En_9_Chapter.html#Fig4) shows the execution alongside
    the code.


    ![A435441_1_En_9_Fig4_HTML.jpg](A435441_1_En_9_Fig4_HTML.jpg)


    Figure 9-4.


    Execution alongside code


    To see a full video of the execution, visit [`https://www.youtube.com/watch?v=In9sCFrv-D0&feature=youtu.be`](https://www.youtube.com/watch%3Fv=In9sCFrv-D0%26feature=youtu.be).


    The device screen is exported and you can see the server and target execution
    in one screen. That is one of the challenges in demonstrating the automation value
    on the mobile side. For the web, since the browser launches on the machine itself,
    it is relatively easier.


    ## Executing the Test from Sauce Labs


    As you continue executing tests and attempt to increase the coverage on various
    devices, form factors become a critical issue. Sure, you can keep buying devices;
    however, there is not much economy of scale in doing so. Wouldn''t it be nice
    to have that non-core competency of maintaining the devices offloaded to a service
    provider?


    Sure enough, there are many providers out there that do just that, including Sauce
    Labs, Perfecto Mobile, and ExperiTest. This chapter provides an example of Sauce
    Labs, because they are aligned with Appium.'
