- fmt: '### What Is Sauce Labs?


    Sauce Labs provides both infrastructure and platform cloud services.


    - **Infrastructure**: Over 700 combinations of browsers and OS platforms. Includes
    mobile emulators and simulators, as well as real devices.

    - **Platform**: Selenium Grid platform, so that automation tests that talk in
    the WebDriver protocol can execute tests against the underlying infrastructure.

    - **User Interface**: A nice GUI for manual testing and on-demand availability
    of browsers, emulators, simulators, and real mobile devices. Sauce Labs’ features
    cannot be summed up here, but I encourage you to read more about it online.


    ### Running Against Sauce Labs


    You can run Sauce Labs on real devices or emulators.


    #### Running on Real Devices


    Upload your app to the Sauce storage. Replace the values with your Sauce credentials:


    ```

    $ curl -u $SAUCE_USERNAME:$SAUCE_ACCESS_KEY -X POST "http://saucelabs.com/rest/v1/storage/$SAUCE_USERNAME/my_app.zip?overwrite=true"
    -H "Content-Type: application/octet-stream" -data-binary @my_app.zip

    ```


    Now add the real device configuration in `devices.yaml`. An example is shown in
    Figure [9-5](#A435441_1_En_9_Chapter.html#Fig5).


    ![A435441_1_En_9_Fig5_HTML.jpg](A435441_1_En_9_Fig5_HTML.jpg)


    Figure 9-5. Sauce Labs configuration in `devices.yaml`


    ##### Feature Files (ci_android.feature)


    Here is the feature file:


    ```

    @ci_add_contact_sauce

    Scenario: Contact on sauce

    Given I open login screen on app

    And I click add contact

    Then I successfully add a contact

    ```


    ##### Hooks.rb File


    Here is the `Hooks.rb` file:


    ```

    Before(''@ci_add_contact_sauce'') do

    caps = sauce_capabilities(app=''http://saucelabs.com/example_files/app-debug.apk'',
    appActivity=''com.example.android.contactmanager.ContactManager'', appPackage=''com.example.android.contactmanager'')

    @driver= Appium::Driver.new(caps)

    Appium.promote_appium_methods AppiumWorld

    puts "Execute anything before scenario/test case"

    @driver.start_driver

    end

    ```


    ##### Execute the File


    Now run it:


    ```

    bundle exec cucumber features/ci_android.feature:26 DEVICE=saucelabs_samsung_galaxy_s4

    ```


    ##### Feedback


    Once you kick off the execution, you should instantly see a row on the Sauce dashboard
    that represents the execution session. See Figure [9-6](#A435441_1_En_9_Chapter.html#Fig6).


    ![A435441_1_En_9_Fig6_HTML.jpg](A435441_1_En_9_Fig6_HTML.jpg)


    Figure 9-6. The Sauce Labs console


    When the execution is complete, the results should look like Figure [9-7](#A435441_1_En_9_Chapter.html#Fig7).


    ![A435441_1_En_9_Fig7_HTML.jpg](A435441_1_En_9_Fig7_HTML.jpg)


    Figure 9-7. Sauce Labs execution results


    Clicking the execution session row, you can find information that will help you
    analyze the results (including videos, Appium logs, screenshots, and detailed
    logs). Figure [9-8](#A435441_1_En_9_Chapter.html#Fig8) shows the Sauce Labs execution
    video.


    ![A435441_1_En_9_Fig8_HTML.jpg](A435441_1_En_9_Fig8_HTML.jpg)


    Figure 9-8. Sauce Labs execution video


    The results can also be found in the `results.html` file in the root folder (see
    Figure [9-9](#A435441_1_En_9_Chapter.html#Fig9)), since the example outputs the
    HTML results as specified in the `cucumber.yaml` configuration file.


    ![A435441_1_En_9_Fig9_HTML.jpg](A435441_1_En_9_Fig9_HTML.jpg)


    Figure 9-9. Cucumber results


    #### Running on Emulators


    Since Sauce Labs provides emulators, the difference is the way you construct the
    desired capabilities object, and therefore replace the values in `emulators.yaml`.
    The values can be read from their documentation, found at [`https://wiki.saucelabs.com/display/DOCS/Platform+Configurator#/`](https://wiki.saucelabs.com/display/DOCS/Platform+Configurator#/).


    ## Parallel Devices Automation


    This section contains a brief description on how to execute tests in parallel
    across devices.


    Executing automated tests in parallel is dependent on any of the following (see
    Figure [9-10](#A435441_1_En_9_Chapter.html#Fig10)):


    ![A435441_1_En_9_Fig10_HTML.jpg](A435441_1_En_9_Fig10_HTML.jpg)


    Figure 9-10. Parallel devices execution architecture


    - App support of parallel sessions

    - Whether the test automation framework can initiate parallel tests

    - Whether there are multiple Appium servers, one for each device, with dedicated
    ports


    Parallel execution also might result in race conditions, so understanding the
    application domain and call path is extremely important before you can certify
    parallel tests.


    ### Start Appium Servers on Different Ports


    Here is the command to start multiple Appium servers. Be sure to open a new shell
    for each of these Appium servers.


    ```

    appium -p 4724 -bp 4726 -U EGxxxxxxxxx

    appium -p 4734 -bp 4736 -U EGxxxxxxxxx

    ```


    If your target device/emulator has an SDK less than 4.2 or an API level less than
    16, Appium uses `selendroid`. In that case, you have to append `--selendroid-port`
    to the previous command (generally stay 10 ports apart, because Appium uses +1
    port of `-p`):


    ```

    appium -p 4724 -bp 4726 --selendroid-port 4737 -U EGxxxxxxxxx

    appium -p 4734 -bp 4736 --selendroid-port 4747 -U EGxxxxxxxxx

    ```


    If you are running Appium from the `Appium.exe` path, then use:


    ```

    node appium --nodeconfig path\to\nodeconfig.json -p 4724 -bp 5724

    ```


    Or if you’re using `cmd`, use this command:


    ```

    appium --nodeconfig path\to\nodeconfig1.json -p 4724 -bp 5724

    ```'
