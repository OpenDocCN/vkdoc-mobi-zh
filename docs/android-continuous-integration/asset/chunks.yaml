    # 6. 连接 Android 目标设备


    本章基于第 [5](#A435441_1_En_5_Chapter.html) 章的内容，你在该章中学习了如何成功构建一个`.apk`文件（无论是通过调试还是发布
    APK）。一旦`.apk`文件在你的文件系统上准备就绪，你必须确保已连接到打算部署该`.apk`文件的目标设备/模拟器。


    ## 使用模拟器与真实设备进行测试


    关于何时使用模拟器与真实设备，网上有大量信息。在与充分利用 Android 功能的移动应用合作之后，我坚信在将应用发布到生产环境时，真实设备测试能提供显著更高的信心。


    你可以在模拟器上开始应用测试，但由于模拟器无法完全模拟硬件、平台和软件条件，因此如果没有在真实设备上进行测试，你的测试将不完整。


    对于模拟器，AVD（Android 虚拟设备）管理器有助于创建虚拟设备。


    对于真实设备，你需要购买并维护它们，或者从设备云租赁它们。


    ## 使用 Android 模拟器


    Android 模拟器，顾名思义，是模拟 Android 设备的工具。该工具致力于模拟移动硬件组件以及手势（滑动、点击等）。你将应用部署到模拟器中，然后像在真实设备上一样启动和测试它。


    模拟器无法模拟的功能包括地理位置、蜂窝塔的实际测试、网络带宽条件等。


    有关使用 Android 模拟器的更多信息，请参见 [`https://developer.android.com/studio/run/emulator.html`](https://developer.android.com/studio/run/emulator.html)。


    ### 硬件加速


    在启动和配置 AVD 时，启用硬件虚拟化将显著提升性能。你可以在创建 AVD 后，通过选择“验证配置”页面上的“模拟性能：图形”来启用此设置。


    要启用硬件加速，请在配置 AVD 时选择“GPU 模拟：真”。


    请注意，GPU 模拟与快照：启用是互斥的。


    前面提到的 URL 提供了更多信息和细节，并解释了各种可能的配置。


    ### 创建新的 AVD


