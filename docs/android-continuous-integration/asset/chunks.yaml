    clear and an automation script cannot be run (use mock frameworks to mitigate
    the absence of a real system).

    *   Building and deploying an app should be self-serviced and automated without
    any exceptions.

    *   Collaborate with other roles on the team and, in rare circumstances (such
    as during sprint demos), manually walk through workflows of the system (otherwise,
    the automation script should be run as a demo).

    *   The programming language should start with known, and tend toward the most
    collaborative.

    *   Inside-out/outside-in (focus on end users).

    *   Don’t boil the ocean—pick one and pivot.

    *   Interoperability—cloud and on-premises infrastructures.

    *   Tend toward using real devices.

    *   Use Appium, Espresso, and XCTest.


    ### Speed of Testing


    High-speed testing is a mandatory requirement in the mobile space because a mobile
    app is successful in the market based on how fast it is delivered in the face
    of competition. There have been research studies suggesting that mobile users
    have an attention span of minutes before they uninstall an app. Releasing bug-free
    apps often is a make-or-break situation.


    ### Scaling


    Think of AWS and Netflix. The services can respond by scaling the systems based
    on load , performance, user traffic, and so on. While testing mobile apps, the
    testing capability should also be scalable across the three Vs (volume, variety,
    and velocity) with a tradeoff against cost. In the beginning of developing a project,
    it is advisable to rely on open source and cloud services before investing heavily
    on paid solutions.


    ### Cost


    Cost is a constraint in every decision you make when resources are required. Resources
    can be human, machine, time, etc. Hence, investing in open source solutions at
    the beginning is less risky because there is no vendor lock-in. It is a tradeoff
    decision because if you spend too much time on not-so-mature open source solutions,
    you might lose time. When it’s all said and done, open source solutions have come
    a long way and are mature in many ways. In fact, they are much more mature than
    some paid solutions in some cases. Your strategy should be to spend a week or
    two and scour the web for solutions and frameworks that are already built and
    use one as a starting point.'
  trans: '

    # 测试自动化库


    在过去几年中，获得一定关注度的 Android 应用测试自动化工具包括`MonkeyTalk`、`Robotium`、`UiAutomator`（使用 UI
    自动化库）、`calabash-android`、`selendroid`、`Appium`等。


    `Android Espresso`是一个致力于进行 UI 测试的单元测试库，在编写本书时它也算是相对较新的工具。我们拭目以待，看看`Espresso`表现如何；然而，它由内而外（单元测试）的特性意味着它可能无法覆盖集成测试的范围（即测试最终用户实际经历的完整路径）。


    本书选择`Appium`作为测试自动化工具/框架，因为我发现它符合我测试原生应用、Web 应用和混合应用的需求。它也遵循`WebDriver`协议。你可以在其官网上阅读`Appium`的设计理念及与其他工具和框架的竞品分析（
    [`http://appium.io/introduction.html?lang=en`](http://appium.io/introduction.html?lang=en)
    ）。


    `Appium`与`Espresso`之间的一些权衡如下：


    - `Android Espresso`的优势在于测试代码与源代码使用同一种语言，这使得调试/排查问题更容易，并促进了技术人员（开发工程师和测试工程师）之间的协作。

    - 如果需要访问源代码，执行测试可能没问题，但需要对构建流水线进行多重审查。在发布前，CI（以及因此带来的外部测试）能提供相对更高的信心。在这方面，`Appium`是更好的选择。

    - 采用 ATDD/BDD 风格，因为它能让技术能力较弱的项目负责人/业务相关方定义“可执行的”验收标准。这有助于“三剑客”（开发、测试和产品）达成共识，并促进协作。

    - 开发人员的可用时间、测试覆盖率等也是需要权衡的因素。`Appium`支持大多数编程语言栈，在这方面是更好的选择。


    # 为什么要自动化？


    为什么需要实现流程自动化，这应该是不言而喻的。事实上，如果不将重复性/单调的活动自动化，持续集成和/或持续交付（参见 [`https://martinfowler.com/bliki/ContinuousDelivery.html`](https://martinfowler.com/bliki/ContinuousDelivery.html)
    ）是根本不可能的。在计算重复性任务以及对特定问题执行所有排列组合方面，人类远不如机器。


    话虽如此，人类仍然需要架构和设计整个系统，因此必须理解机器的行为，更重要的是，当预期结果没有出现时，要能够进行故障排查。


    在移动应用领域，本文（`article`）展示了重新提交移动应用的相关成本。这些数字仅供参考；实际上，成本可能比表格中显示的要高。关键是要说明与缺陷/错误相关的成本非常高昂，包括客户流失、无数的开发工时以及品牌形象等等。


    # 移动测试策略


    软件测试人员熟悉编写测试计划、测试用例和测试发布文档。测试策略文档通常需要综合考虑应用的运行环境、发布周期、测试覆盖率、缺陷跟踪等因素，最终形成一份可供高管层批准预算和时间表的文档。移动测试策略旨在明确影响移动测试的“如何做”、“为什么做”以及“做什么”等方面。以下各部分包含了制定移动测试策略时需要考虑的一些因素。


    ## 手动测试与自动化


    在验证软件时，人眼比自动化程序明显做得更好的情况非常罕见，例如网站的美观性。而且，这一差距正日益缩小。例如，人工智能（AI）和机器学习（ML）在追求速度和持续交付的时代提供了更好的投资回报率（ROI）。像`Applitools`这样的工具实现的视觉测试自动化就是一个很好的例子。这并非是说我们应该让组织中的手动测试功能变得多余，而是说测试能力应同时包括自动化和手动方法，并以自动化为重点。


    在移动测试的背景下，人工手动测试跨越设备、SDK、API 级别和生态系统等维度的排列组合几乎是不可能的。因此，你的测试策略应包括（但不限于）：


    - 按照测试金字塔自下而上的顺序尽早并频繁地进行自动化（参见本章后面的“测试金字塔”部分）。

    - 在验收标准不明确且自动化脚本无法运行的早期阶段，使用 BDD/TDD 框架（使用模拟框架来弥补真实系统的缺失）。

    - 应用的构建和部署应实现自助服务和自动化，无一例外。

    - 与团队中的其他角色协作，在极少数情况下（例如冲刺演示期间），手动走查系统的工作流程（否则，应运行自动化脚本作为演示）。

    - 编程语言应从大家熟悉的开始，并倾向于最具协作性的语言。

    - 由内而外/由外而内（关注最终用户）。

    - 不要贪多嚼不烂——选准一个方向，然后灵活转向。

    - 互操作性——云和本地基础设施。

    - 倾向于使用真实设备。

    - 使用`Appium`、`Espresso`和`XCTest`。


    ## 测试速度


    高速测试是移动领域的强制性要求，因为在竞争激烈的市场中，移动应用的成功取决于交付速度。有研究表明，移动用户在卸载应用前的注意力持续时间仅有几分钟。频繁发布无错误的应用是成败的关键。


    ## 可扩展性


    想想 AWS 和 Netflix。这些服务能够根据负载、性能、用户流量等因素扩展系统规模。在测试移动应用时，测试能力也应该能够跨三个 V（数量、多样性和速度）进行扩展，同时平衡成本。在项目开发初期，建议在重金投入付费解决方案之前，先依赖开源和云服务。


    ## 成本


    在需要资源时，成本是你做每一个决策的限制因素。资源可以是人力、机器、时间等。因此，在初期投资于开源解决方案风险较低，因为没有供应商锁定。这是一个权衡决策，因为如果你在不够成熟的开源解决方案上花费太多时间，可能会浪费时间。总而言之，开源解决方案已经取得了长足的进步，并且在很多方面都已成熟。事实上，在某些情况下，它们甚至比一些付费解决方案更加成熟。你的策略应该是花一两个星期在网络上搜索已经构建好的解决方案和框架，并以此作为起点。

