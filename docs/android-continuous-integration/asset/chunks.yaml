- fmt: "### Appium.app and Appium.exe\n\nThese GUI wrappers around the Appium server\
    \ can be downloaded. These come bundled with everything required to run the Appium\
    \ server, so you don’t need to worry about Node. They also come with an Inspector,\
    \ which enables you to check out the hierarchy of your app. This can come in handy\
    \ when writing tests.\n\n### Appium Design\n\nAppium uses vendor-provided automation\
    \ frameworks under the hood. That way, you don’t need to compile any Appium-specific\
    \ or third-party code or frameworks in your app. This means you’re testing the\
    \ same app you’re shipping. The vendor-provided frameworks are:\n\n- iOS: Apple’s\
    \ UIAutomation  \n- Android 4.2+: Google’s UiAutomator  \n- Android 2.3+: Google’s\
    \ Instrumentation  \n\nInstrumentation support is provided by bundling a separate\
    \ project, called Selendroid. More information can be found at `appium.io`.\n\n\
    The architecture diagram shown in Figure [8-1](#A435441_1_En_8_Chapter.html#Fig1)\
    \ depicts the control flow of the automated test script actions.\n\n1. The left\
    \ side of the blue dotted line is the users’ concern.  \n2. The right side of\
    \ the blue dotted line is abstracted by Appium.  \n3. The Appium server talks\
    \ to the necessary native libraries of Android (`adb`, UI Automator, etc.) and\
    \ ensures that the commands are passed to the target device/emulator.  \n4. `adb`\
    \ is part of Android SDK and hence the `adb` server keeps running inside the device\
    \ and listens to the commands sent by Appium server.  \n5. On the host machine\
    \ that the target device is connected to, `adb-server` communicates with `adbd`\
    \ (`adb daemon`) on either the emulator or on the real device.  \n6. The Appium\
    \ server communicates with the `adb` server through the `adb` client that comes\
    \ as part of the Android SDK. (None of this is mentioned in the architecture owing\
    \ to granular details.)  \n7. The Appium server also talks to the UI Automator\
    \ using its internal bootstrap `npm` module. Prior to Android 4.2, Appium used\
    \ Selendroid to communicate with the UI Automator. Hence, when you connect to\
    \ an Android device that’s older (i.e., older than the 4.2 SDK), you have to start\
    \ the Appium server by specifying `--selendroid-port`.\n\n![A435441_1_En_8_Fig1_HTML.jpg](A435441_1_En_8_Fig1_HTML.jpg)\n\
    \nFigure 8-1. Appium Android architecture\n\n### Appium Android\n\nThis chapter\
    \ shows you how to work with a test automation framework that combines Cucumber,\
    \ Ruby, and Appium and helps you write automation test cases.\n\nThis chapter\
    \ follows the ATDD (acceptance test driven development) methodology and hence\
    \ first writes features and scenarios and subsequently writes the code-behind.\n\
    \n### Appium\n\nOn the client side, you will use the `appium_lib` client library\
    \ and the exposed APIs. It is also possible to use the Selenium WebDriver and\
    \ create desired capabilities that specify Appium as the WebDriver. Having a background\
    \ on the WebDriver protocol will greatly help you understand the Appium client\
    \ library.\n\n## Installing the Appium Server\n\nIn this section, you install\
    \ the Appium server and navigate some screens (the default screens and Android-specific\
    \ ones).\n\n### Download and Install the Appium Server\n\nFollow the instructions\
    \ on the Appium home page at [`http://appium.io/`](http://appium.io/). (You can\
    \ see that it is a Node.js server, and hence you can start the server from the\
    \ command line. However, to keep it simple initially, I just download the `.dmg`\
    \ file and double-click to install and start. Eventually with CI alignment, you\
    \ will want to go with the Node.js server, though.) Click the Launch button.\n\
    \n### GUI Start Android Mode\n\nFigure [8-2](#A435441_1_En_8_Chapter.html#Fig2)\
    \ shows Appium Android mode.\n\n![A435441_1_En_8_Fig2_HTML.jpg](A435441_1_En_8_Fig2_HTML.jpg)\n\
    \nFigure 8-2. Appium Android mode\n\nSome notes about the Appium server:\n\n-\
    \ The Appium server is started in Android mode (note that the radio button for\
    \ Android is checked).  \n- By default, the Appium server listens on port `:4723`\
    \ on all network interfaces (`0.0.0.0`).  \n- It is assumed that you have completed\
    \ the Android System setup section in Chapter [1](#A435441_1_En_1_Chapter.html)\
    \ (the Android SDK should be available in the `PATH`, including its Android tools).\
    \  \n- The Appium server version, as you can see, is 1.4.13.\n\n## Appium Server\
    \ Configuration\n\nNow that you have installed the Appium server, it’s time to\
    \ learn about the configuration options that Appium provides. I do not go into\
    \ all the options, but instead focus on the ones that matter to the test automation\
    \ scripts and the debugging context discussed in this book.\n\n### Appium Doctor\n\
    \nThe mobile environment set up is a little more complex than the web development\
    \ environment because of the dependencies on various SDKs, emulator/simulators,\
    \ and their versions. The permutations and combinations increase and there are\
    \ often questions that come up for an automation engineer in terms of application\
    \ compatibility. Such questions include:\n\n- What version of Android SDK is running?\
    \  \n- What versions of emulators/simulators are running?  \n- What mobile devices\
    \ are attached?\n\nAs you can see, setting up a build environment is dependent\
    \ on how much clarity you have on these questions. You also need to understand\
    \ any “backward compatibility” vs. “forward compatibility” issues. Unless you\
    \ are clear about these issues, you are not sure what you are testing. Sure, you\
    \ can go ahead and test on the developer’s environment. But that is not guaranteed\
    \ to be the same on another developer’s machine. Hence, certifying/validating\
    \ and running the automation tests are heavily dependent on understanding the\
    \ environment.\n\nFor the Appium environment, these settings are necessary and\
    \ the Appium server can set most of those values. To be precise, it is always\
    \ advisable to run the Appium Doctor, which does basic checks on the availability\
    \ of the Android environment. (Clicking the stethoscope icon will run Appium Doctor\
    \ from the UI.) See Figure [8-3](#A435441_1_En_8_Chapter.html#Fig3).\n\n![A435441_1_En_8_Fig3_HTML.jpg](A435441_1_En_8_Fig3_HTML.jpg)\n\
    \nFigure 8-3. Appium Doctor\n\n### Developer Mode\n\nBecause of the many incompatibilities\
    \ between items in the tuple (such as OS, platform SDKs, Appium server versions,\
    \ etc.), you should get comfortable playing and installing multiple Appium server\
    \ versions. The developer mode enables you to use the Appium source, as shown\
    \ in Figure [8-4](#A435441_1_En_8_Chapter.html#Fig4).\n\n![A435441_1_En_8_Fig4_HTML.jpg](A435441_1_En_8_Fig4_HTML.jpg)\n\
    \nFigure 8-4. Appium developer mode\n\nIn this case, the Appium source was downloaded\
    \ to `/Users/pmacharl/gitprojects/appium`.\n\n### Server Command Line\n\nWhile\
    \ GUI is one way to start the Appium server, for CI, you need to be able to start\
    \ the server from the command line. `cmd` is also necessary so that you can code\
    \ away the process of starting the server. It’s also important to be able to programmatically\
    \ (through Bash or PowerShell scripts) kick off the server (such as through a\
    \ Jenkins CI job).\n\nYou can start the command line server by typing `appium`,\
    \ as shown in Figure [8-5](#A435441_1_En_8_Chapter.html#Fig5).\n\n![A435441_1_En_8_Fig5_HTML.jpg](A435441_1_En_8_Fig5_HTML.jpg)\n\
    \nFigure 8-5. Command line start\n\nYou can also start the command line server\
    \ from source code.\n\nNavigate to `~/appium/bin` and type `./appium.js`, as shown\
    \ in Figure [8-6](#A435441_1_En_8_Chapter.html#Fig6).\n\n![A435441_1_En_8_Fig6_HTML.jpg](A435441_1_En_8_Fig6_HTML.jpg)\n\
    \nFigure 8-6. Start Appium from the source code"
  raw: '### Appium.app and Appium.exe


    These GUI wrappers around the Appium server can be downloaded. These come bundled
    with everything required to run the Appium server, so you don’t need to worry
    about Node. They also come with an Inspector, which enables you to check out the
    hierarchy of your app. This can come in handy when writing tests.


    ### Appium Design


    Appium uses vendor-provided automation frameworks under the hood. That way, you
    don’t need to compile any Appium-specific or third-party code or frameworks in
    your app. This means you’re testing the same app you’re shipping. The vendor-provided
    frameworks are:


    *   iOS: Apple’s UIAutomation

    *   Android 4.2+: Google’s UiAutomator

    *   Android 2.3+: Google’s Instrumentation


    Instrumentation support is provided by bundling a separate project, called Selendroid.
    More information can be found at `appium.io`.


    The architecture diagram shown in Figure [8-1](#A435441_1_En_8_Chapter.html#Fig1)
    depicts the control flow of the automated test script actions.


    1.  The left side of the blue dotted line is the users’ concern.  

    2.  The right side of the blue dotted line is abstracted by Appium.  

    3.  The Appium server talks to the necessary native libraries of Android (`adb`,
    UI Automator, etc.) and ensures that the commands are passed to the target device/emulator.
     

    4.  `adb` is part of Android SDK and hence the `adb` server keeps running inside
    the device and listens to the commands sent by Appium server.  

    5.  On the host machine that the target device is connected to, `adb-server` communicates
    with `adbd` (`adb daemon`) on either the emulator or on the real device.  

    6.  The Appium server communicates with the `adb` server through the `adb` client
    that comes as part of the Android SDK. (None of this is mentioned in the architecture
    owing to granular details.)  

    7.  The Appium server also talks to the UI Automator using its internal bootstrap
    `npm` module. Prior to Android 4.2, Appium used Selendroid to communicate with
    the UI Automator. Hence, when you connect to an Android device that’s older (i.e.,
    older than the 4.2 SDK), you have to start the Appium server by specifying `--selendroid-port`.
     


    ![A435441_1_En_8_Fig1_HTML.jpg](A435441_1_En_8_Fig1_HTML.jpg)


    Figure 8-1.


    Appium Android architecture


    ### Appium Android


    This chapter shows you how to work with a test automation framework that combines
    Cucumber, Ruby, and Appium and helps you write automation test cases.


    This chapter follows the ATDD (acceptance test driven development ) methodology
    and hence first writes features and scenarios and subsequently writes the code-behind.


    ### Appium


    On the client side, you will use the `appium_lib` client library and the exposed
    APIs. It is also possible to use the Selenium WebDriver and create desired capabilities
    that specify Appium as the WebDriver . Having a background on the WebDriver protocol
    will greatly help you understand the Appium client library.


    ## Installing the Appium Server


    In this section, you install the Appium server and navigate some screens (the
    default screens and Android-specific ones).


    ### Download and Install the Appium Server


    Follow the instructions on the Appium home page at [`http://appium.io/`](http://appium.io/)
    . (You can see that it is a Node.js server, and hence you can start the server
    from the command line. However, to keep it simple initially, I just download the
    `.dmg` file and double-click to install and start. Eventually with CI alignment,
    you will want to go with the Node.js server, though. Click the Launch button.


    ### GUI Start Android Mode


    Figure [8-2](#A435441_1_En_8_Chapter.html#Fig2) shows Appium Android mode .


    ![A435441_1_En_8_Fig2_HTML.jpg](A435441_1_En_8_Fig2_HTML.jpg)


    Figure 8-2.


    Appium Android mode


    Some notes about the Appium server:


    *   The Appium server is started in Android mode (note that the radio button for
    Android is checked).

    *   By default, the Appium server listens on port `:4723` on all network interfaces
    (0.0.0.0).

    *   It is assumed that you have completed the Android System setup section in
    Chapter [1](#A435441_1_En_1_Chapter.html) (the Android SDK should be available
    in the `PATH`, including its Android tools).

    *   The Appium server version , as you can see, is 1.4.13.


    ## Appium Server Configuration


    Now that you have installed the Appium server , it’s time to learn about the configuration
    options that Appium provides. I do not go into all the options, but instead focus
    on the ones that matter to the test automation scripts and the debugging context
    discussed in this book.


    ### Appium Doctor


    The mobile environment set up is a little more complex than the web development
    environment because of the dependencies on various SDKs, emulator/simulators,
    and their versions. The permutations and combinations increase and there are often
    questions that come up for an automation engineer in terms of application compatibility.
    Such questions include:


    *   What version of Android SDK is running?

    *   What versions of emulators/simulators are running?

    *   What mobile devices are attached?


    As you can see, setting up a build environment is dependent on how much clarity
    you have on these questions. You also need to understand any “backward compatibility”
    vs. “forward compatibility” issues. Unless you are clear about these issues, you
    are not sure what you are testing. Sure, you can go ahead and test on the developer’s
    environment. But that is not guaranteed to be the same on another developer’s
    machine. Hence, certifying/validating and running the automation tests are heavily
    dependent on understanding the environment.


    For the Appium environment, these settings are necessary and the Appium server
    can set most of those values. To be precise, it is always advisable to run the
    Appium Doctor, which does basic checks on the availability of the Android environment.
    (Clicking the stethoscope icon will run Appium Doctor from the UI.) See Figure
    [8-3](#A435441_1_En_8_Chapter.html#Fig3).


    ![A435441_1_En_8_Fig3_HTML.jpg](A435441_1_En_8_Fig3_HTML.jpg)


    Figure 8-3.


    Appium Doctor


    ### Developer Mode


    Because of the many incompatibilities between items in the tuple (such as OS,
    platform SDKs, Appium server versions, etc.), you should get comfortable playing
    and installing multiple Appium server versions. The developer mode enables you
    to use the Appium source, as shown in Figure [8-4](#A435441_1_En_8_Chapter.html#Fig4).


    ![A435441_1_En_8_Fig4_HTML.jpg](A435441_1_En_8_Fig4_HTML.jpg)


    Figure 8-4.


    Appium developer mode


    In this case, the Appium source was downloaded to `/Users/pmacharl/gitprojects/appium`.


    ### Server Command Line


    While GUI is one way to start the Appium server, for CI, you need to be able to
    start the server from the command line . `cmd` is also necessary so that you can
    code away the process of starting the server. It’s also important to be able to
    programmatically (through Bash or PowerShell scripts) kick off the server (such
    as through a Jenkins CI job).


    You can start the command line server by typing `appium`, as shown in Figure [8-5](#A435441_1_En_8_Chapter.html#Fig5).


    ![A435441_1_En_8_Fig5_HTML.jpg](A435441_1_En_8_Fig5_HTML.jpg)


    Figure 8-5.


    Command line start


    You can also start the command line server from source code.


    Navigate to `∼/appium/bin` and type `./appium.js`, as shown in Figure [8-6](#A435441_1_En_8_Chapter.html#Fig6).


    ![A435441_1_En_8_Fig6_HTML.jpg](A435441_1_En_8_Fig6_HTML.jpg)


    Figure 8-6.


    Start Appium from the source code'
  trans: "\n### Appium.app 和 Appium.exe\n\n这些 Appium 服务器的图形界面封装包可供下载。它们已捆绑运行 Appium\
    \ 服务器所需的一切组件，因此您无需担心 Node 环境。此外，它们还附带一个检查器，使您可以检视应用的层次结构。这在编写测试时非常有用。\n\n### Appium\
    \ 设计原理\n\nAppium 底层使用厂商提供的自动化框架。这样一来，您无需在应用中编译任何 Appium 专属或第三方代码及框架。这意味着您测试的就是即将发布的应用本身。厂商提供的框架包括：\n\
    \n- iOS：Apple 的 UIAutomation  \n- Android 4.2+：Google 的 UiAutomator  \n- Android\
    \ 2.3+：Google 的 Instrumentation  \n\nInstrumentation 的支持是通过捆绑一个名为 Selendroid 的独立项目来实现的。更多信息请访问\
    \ `appium.io`。\n\n图 8-1 所示的架构图描绘了自动化测试脚本动作的控制流。\n\n1. 蓝色虚线的左侧是用户关注的部分。  \n2. 蓝色虚线的右侧由\
    \ Appium 进行抽象处理。  \n3. Appium 服务器与 Android 必要的原生库（`adb`、UI Automator 等）进行通信，并确保命令被传递到目标设备/模拟器。\
    \  \n4. `adb` 是 Android SDK 的一部分，因此 `adb` 服务器持续在设备内部运行，并监听 Appium 服务器发送的命令。  \n\
    5. 在目标设备所连接的主机上，`adb-server` 与模拟器或真实设备上的 `adbd`（即 `adb 守护进程`）进行通信。  \n6. Appium\
    \ 服务器通过作为 Android SDK 一部分的 `adb` 客户端与 `adb` 服务器进行通信。（由于涉及粒度细节，架构图中未提及此内容。）  \n\
    7. Appium 服务器还使用其内部的 bootstrap `npm` 模块与 UI Automator 进行通信。在 Android 4.2 之前，Appium\
    \ 使用 Selendroid 与 UI Automator 通信。因此，当您连接到较旧（即低于 4.2 SDK）的 Android 设备时，必须通过指定\
    \ `--selendroid-port` 来启动 Appium 服务器。\n\n![A435441_1_En_8_Fig1_HTML.jpg](img/A435441_1_En_8_Fig1_HTML.jpg)\n\
    \n图 8-1. Appium Android 架构\n\n### Appium Android\n\n本章将向您展示如何使用结合了 Cucumber、Ruby\
    \ 和 Appium 的测试自动化框架，并帮助您编写自动化测试用例。\n\n本章遵循 ATDD（验收测试驱动开发）方法，因此先编写功能和场景，随后再编写后台代码。\n\
    \n### Appium\n\n在客户端，您将使用 `appium_lib` 客户端库和暴露的 API。也可以使用 Selenium WebDriver 并创建指定\
    \ Appium 作为 WebDriver 的期望能力。了解 WebDriver 协议将极大地帮助您理解 Appium 客户端库。\n\n## 安装 Appium\
    \ 服务器\n\n在本节中，您将安装 Appium 服务器并浏览一些界面（默认界面和 Android 专用界面）。\n\n### 下载并安装 Appium\
    \ 服务器\n\n请按照 [`http://appium.io/`](http://appium.io/) 上 Appium 主页的说明进行操作。（您可以看到它是一个\
    \ Node.js 服务器，因此可以从命令行启动服务器。不过，为了初始阶段简单起见，我直接下载 `.dmg` 文件并双击安装启动。但最终为了与 CI 集成，您将希望使用\
    \ Node.js 服务器。）点击 **启动** (Launch) 按钮。\n\n### GUI 启动 Android 模式\n\n图 8-2 展示了 Appium\
    \ Android 模式。\n\n![A435441_1_En_8_Fig2_HTML.jpg](img/A435441_1_En_8_Fig2_HTML.jpg)\n\
    \n图 8-2. Appium Android 模式\n\n关于 Appium 服务器的一些说明：\n\n- Appium 服务器以 Android 模式启动（注意\
    \ Android 单选按钮已被选中）。  \n- 默认情况下，Appium 服务器在所有网络接口（`0.0.0.0`）上监听端口 `:4723`。  \n\
    - 假定您已完成第 1 章的 Android 系统设置部分（Android SDK 应已存在于 `PATH` 环境变量中，包括其 Android 工具）。\
    \  \n- 如您所见，Appium 服务器版本为 1.4.13。\n\n## Appium 服务器配置\n\n既然您已经安装了 Appium 服务器，是时候了解\
    \ Appium 提供的配置选项了。我不会深入介绍所有选项，而是重点介绍与本书讨论的测试自动化脚本和调试上下文相关的选项。\n\n### Appium Doctor\n\
    \n移动环境设置比 Web 开发环境稍微复杂一些，因为它依赖于各种 SDK、模拟器及其版本。排列组合增加了，自动化工程师经常遇到关于应用兼容性的问题。这些问题包括：\n\
    \n- 当前运行的是哪个版本的 Android SDK？  \n- 当前运行的是哪个版本的模拟器？  \n- 连接了哪些移动设备？\n\n如您所见，构建环境的设置取决于您对这些问题的了解程度。您还需要理解任何“向后兼容”与“向前兼容”的问题。除非您清楚这些问题，否则您不确定自己在测试什么。当然，您可以继续在开发者的环境中进行测试。但这并不能保证另一台开发者机器上的环境相同。因此，认证/验证和运行自动化测试在很大程度上取决于对环境理解。\n\
    \n对于 Appium 环境，这些设置是必要的，并且 Appium 服务器可以设置其中大部分值。准确地说，始终建议运行 Appium Doctor，它会对\
    \ Android 环境的可用性进行基本检查。（点击听诊器图标可以从 UI 运行 Appium Doctor。）见图 8-3。\n\n![A435441_1_En_8_Fig3_HTML.jpg](img/A435441_1_En_8_Fig3_HTML.jpg)\n\
    \n图 8-3. Appium Doctor\n\n### 开发者模式\n\n由于元组中各项目（如操作系统、平台 SDK、Appium 服务器版本等）之间存在许多不兼容性，您应该熟悉如何尝试和安装多个\
    \ Appium 服务器版本。开发者模式使您能够使用 Appium 源码，如图 8-4 所示。\n\n![A435441_1_En_8_Fig4_HTML.jpg](img/A435441_1_En_8_Fig4_HTML.jpg)\n\
    \n图 8-4. Appium 开发者模式\n\n在这种情况下，Appium 源码被下载到 `/Users/pmacharl/gitprojects/appium`。\n\
    \n### 服务器命令行\n\n虽然 GUI 是启动 Appium 服务器的一种方式，但对于 CI，您需要能够从命令行启动服务器。`cmd` 也是必要的，这样您就可以通过编码方式处理启动服务器的过程。能够通过编程方式（通过\
    \ Bash 或 PowerShell 脚本）启动服务器（例如通过 Jenkins CI 任务）也很重要。\n\n您可以通过键入 `appium` 来启动命令行服务器，如图\
    \ 8-5 所示。\n\n![A435441_1_En_8_Fig5_HTML.jpg](img/A435441_1_En_8_Fig5_HTML.jpg)\n\
    \n图 8-5. 命令行启动\n\n您也可以从源码启动命令行服务器。\n\n导航到 `~/appium/bin` 并键入 `./appium.js`，如图\
    \ 8-6 所示。\n\n![A435441_1_En_8_Fig6_HTML.jpg](img/A435441_1_En_8_Fig6_HTML.jpg)\n\
    \n图 8-6. 从源码启动 Appium\n"
- fmt: "### Appium Android Settings\n\nAppium server provides many settings for Android.\
    \ It is beyond the scope of this book to go into each field; however, I want to\
    \ mention that you can set each of the field values programmatically (which you\
    \ will see during scripting). Try playing with different settings to get comfortable.\
    \ See Figure [8-7](#A435441_1_En_8_Chapter.html#Fig7).\n\n![A435441_1_En_8_Fig7_HTML.jpg](A435441_1_En_8_Fig7_HTML.jpg)\n\
    \nFigure 8-7. Appium Android settings\n\nThe `app` path can point to an `.apk`\
    \ file, for example.\n\nSimilarly in Advanced settings, you can point the Android\
    \ SDK to a specific location instead of the default, which Appium server might\
    \ look to. This way, you are sure to use only one version of Android SDK and can\
    \ make updates to that version only. See Figure [8-8](#A435441_1_En_8_Chapter.html#Fig8).\n\
    \n![A435441_1_En_8_Fig8_HTML.jpg](A435441_1_En_8_Fig8_HTML.jpg)\n\nFigure 8-8.\
    \ Appium Android Advanced settings\n\n### Appium Server Settings\n\nFinally, the\
    \ Appium server itself has settings that can be changed, as shown in Figure [8-9](#A435441_1_En_8_Chapter.html#Fig9).\n\
    \n![A435441_1_En_8_Fig9_HTML.jpg](A435441_1_En_8_Fig9_HTML.jpg)\n\nFigure 8-9.\
    \ Appium server settings\n\nNote: All of these settings are also available as\
    \ server arguments and you can access them by typing `appium --help` at the command\
    \ line.\n\nThe information you've read at this point might seem overwhelming with\
    \ respect to the number of options available; however, it will become easier once\
    \ you start coding away all these complexities. That is one of benefits of CI—it\
    \ helps automate away mundane and repetitive tasks.\n\n## Inspecting an App\n\n\
    Much like how you identify elements of DOM for a web page using Selenium, you\
    \ follow a similar process for an app. That is, you need to first uniquely identify\
    \ the locator for an element, before performing an action on it. There are various\
    \ strategies for that. To get a refresher, check out [`http://www.seleniumframework.com/basic-tutorial/html-dom/`](http://www.seleniumframework.com/basic-tutorial/html-dom/).\n\
    \nMost of the UI automation tools and web scrapers have an element identification\
    \ strategy and knowing it helps you automate actions. It is a good idea to spend\
    \ some time inspecting your mobile app's \"view\" as it gets rendered onto the\
    \ screen. More importantly, understanding the HTML representation and various\
    \ attributes will help you write automation scripts faster.\n\nThis is very similar\
    \ to using Chrome's dev tools (inspect element), Firefox Inspect Element/Firepath/Firebug,\
    \ or IE Developer tools. While writing web application automation scripts using\
    \ Selenium, it is essential that you use these developer tools. Figure [8-10](#A435441_1_En_8_Chapter.html#Fig10)\
    \ is an illustration.\n\n![A435441_1_En_8_Fig10_HTML.jpg](A435441_1_En_8_Fig10_HTML.jpg)\n\
    \nFigure 8-10. DOM (document object model)\n\n## Appium Ruby Console\n\nThe Appium\
    \ Ruby console (ARC) is a handy tool for quickly looking at the screen HTML. Follow\
    \ these steps to start using it:\n\n1. Install Ruby 2.0 or higher. Follow the\
    \ instructions at [`http://www.seleniumframework.com/basic-tutorial/setup-ruby-and-components/`](http://www.seleniumframework.com/basic-tutorial/setup-ruby-and-components/)\
    \ if you need help. It is a good idea to have RubyMine IDE installed too, as you\
    \ will use it in the subsequent chapters.\n\n2. Install `arc` gems.\n\n    ```\n\
    \    # Fresh installation\n    gem uninstall -aIx appium_lib ;\\\n    gem uninstall\
    \ -aIx appium_console ;\\\n    gem install --no-rdoc --no-ri appium_console bond\n\
    \    ```\n\n    For troubleshooting instructions, follow this link at [`https://github.com/appium/ruby_console`](https://github.com/appium/ruby_console).\
    \ If you are upgrading, here is what you should expect:\n\n    ```\n    Anyones-Mac-mini:∼\
    \ pmacharl$ pwd\n    /Users/pmacharl\n    Anyones-Mac-mini:∼ pmacharl$ mkdir arc_tests\n\
    \    Anyones-Mac-mini:∼ pmacharl$ cd arc_tests/\n    Anyones-Mac-mini:arc_tests\
    \ pmacharl$ arc upgrade\n    gem uninstall -aIx appium_lib; gem uninstall -aIx\
    \ appium_console; gem install --no\n    -rdoc --no-ri appium_console\n    Upgrade\
    \ complete.\n    ```\n\n3. The ARC configuration file. ARC looks for an `appium.txt`\
    \ file, which has key/value pairs as defined by ARC. There are certain key/value\
    \ pairs expected for Android versus for iOS. Here is an example of how you can\
    \ get started quickly:\n    * The `sauce_username` and `sauce_access_key` can\
    \ be safely ignored until you plan to use Sauce Labs infrastructure for execution.\n\
    \    * Access the `appPackage` and `appActivity` values for Android either by\
    \ talking to the developer of the app or by using the following commands.\n\n\
    \    ```\n    Anyones-Mac-mini:arc_tests pmacharl$ arc version\n    appium_console:\
    \ v1.0.4\n    appium_lib: v8.0.1\n    Anyones-Mac-mini:arc_tests pmacharl$ arc\
    \ setup android\n    Anyones-Mac-mini:arc_tests pmacharl$ ls\n    appium.txt\n\
    \    Anyones-Mac-mini:arc_tests pmacharl$ cat appium.txt\n    [caps]\n    platformName\
    \ = \"android\"\n    deviceName = \"Nexus 7\"\n    app = \"./api.apk\"\n    appPackage\
    \ = \"io.appium.android.apis\"\n    appActivity = \".ApiDemos\"\n    [appium_lib]\n\
    \    sauce_username = \"\"\n    sauce_access_key = \"\"\n    ```\n\n### Method\
    \ 1\n\nThere are two ways to look at the app. The first method executes the following\
    \ code on the command line:\n\n```\n# Returns the package's name, versionCode\
    \ and so on\naapt dump badging app-debug.apk | grep package:\\ name\n# Returns\
    \ all launchable activities. Generally the main entry point to app will be named\
    \ as *.MainActivity (but that may change as per developer's decision)\naapt dump\
    \ badging app-debug.apk | grep launchable-activity\n```\n\n### Method 2\n\nThe\
    \ package name and activity can also be read from the manifest file. You can see\
    \ the full content of the manifest file by executing the following command. This\
    \ will output the topology (the metadata and its hierarchy) of your app. The activity\
    \ that doesn't have any `ParentActivity` will be the `MainActivity` in general.\
    \ The rest of the activities will have `ParentActivity`. (An activity is a single\
    \ screen with the user interface.)\n\n```\naapt l -a app-debug.apk\n```\n\nNote:\
    \ The `aapt` binary is located in the `$ANDROID_HOME/build-tools/x.y.z` directory.\n\
    \nFor the full list of `appium.txt` capabilities (key/value pairs), see [`https://github.com/appium/appium/blob/master/docs/en/writing-running-appium/caps.md`](https://github.com/appium/appium/blob/master/docs/en/writing-running-appium/caps.md).\n\
    \nNote: On Android, the `deviceName` capability is currently ignored.\n\n## Inspecting\
    \ Using ARC\n\nUnderstanding the composition of the application from the UI helps\
    \ you identify the elements and the operations to be performed on them later.\
    \ This section looks at the app and identifies the HTML elements.\n\n### Prerequisites\n\
    \nBefore you start, you need to do the following:\n\n1. Set up an AVD and name\
    \ it `Nexus_4_API_23`. The base images are already available with the SDK. See\
    \ Figure [8-11](#A435441_1_En_8_Chapter.html#Fig11).\n\n    ![A435441_1_En_8_Fig11_HTML.jpg](A435441_1_En_8_Fig11_HTML.jpg)\n\
    \n    Figure 8-11. Set up AVD\n\n2. Notice that Use Host GPU is selected and Snapshot\
    \ is not. These two fields are mutually exclusive.\n\n3. The Appium server should\
    \ be running. If not, start it on the default `4723` port."
  raw: "### Appium Android Settings\n\nAppium server provides many settings for Android\
    \ . It is beyond the scope of this book to go into each field; however, I want\
    \ to mention that you can set each of the field values programmatically (which\
    \ you will see during scripting). Try playing with different settings to get comfortable.\
    \ See Figure [8-7](#A435441_1_En_8_Chapter.html#Fig7).\n\n![A435441_1_En_8_Fig7_HTML.jpg](A435441_1_En_8_Fig7_HTML.jpg)\n\
    \nFigure 8-7.\n\nAppium Android settings\n\nThe `app` path can point to an `.apk`\
    \ file, for example.\n\nSimilarly in Advanced settings , you can point the Android\
    \ SDK to a specific location instead of the default, which Appium server might\
    \ look to. This way, you are sure to use only one version of Android SDK and can\
    \ make updates to that version only. See Figure [8-8](#A435441_1_En_8_Chapter.html#Fig8).\n\
    \n![A435441_1_En_8_Fig8_HTML.jpg](A435441_1_En_8_Fig8_HTML.jpg)\n\nFigure 8-8.\n\
    \nAppium Android Advanced settings\n\n### Appium Server Settings\n\nFinally, the\
    \ Appium server itself has settings that can be changed, as shown in Figure [8-9](#A435441_1_En_8_Chapter.html#Fig9).\n\
    \n![A435441_1_En_8_Fig9_HTML.jpg](A435441_1_En_8_Fig9_HTML.jpg)\n\nFigure 8-9.\n\
    \nAppium server settings Note\n\nAll of these settings are also available as server\
    \ arguments and you can access them by typing `appium -- help` at the command\
    \ line.\n\nThe information you’ve read at this point might seem overwhelming with\
    \ respect to the number of options available; however, it will become easier once\
    \ you start coding away all these complexities . That is one of benefits of CI—it\
    \ helps automate away mundane and repetitive tasks.\n\n## Inspecting an App\n\n\
    Much like how you identify elements of DOM for a web page using Selenium, you\
    \ follow a similar process for an app . That is, you need to first uniquely identify\
    \ the locator for an element, before performing an action on it. There are various\
    \ strategies for that. To get a refresher, check out [`http://www.seleniumframework.com/basic-tutorial/html-dom/`](http://www.seleniumframework.com/basic-tutorial/html-dom/)\
    \ .\n\nMost of the UI automation tools and web scrapers have an element identification\
    \ strategy and knowing it helps you automate actions. It is a good idea to spend\
    \ some time inspecting your mobile app’s “view” as it gets rendered onto the screen.\
    \ More importantly, understanding the HTML representation and various attributes\
    \ will help you write automation scripts faster.\n\nThis is very similar to using\
    \ Chrome’s dev tools (inspect element), Firefox Inspect Element/Firepath/Firebug,\
    \ or IE Developer tools. While writing web application automation scripts using\
    \ Selenium, it is essential that you use these developer tools. Figure [8-10](#A435441_1_En_8_Chapter.html#Fig10)\
    \ is an illustration.\n\n![A435441_1_En_8_Fig10_HTML.jpg](A435441_1_En_8_Fig10_HTML.jpg)\n\
    \nFigure 8-10.\n\nDOM (document object model)\n\n## Appium Ruby Console\n\nThe\
    \ Appium Ruby console (ARC) is a handy tool for quickly looking at the screen\
    \ HTML. Follow these steps to start using it:\n\n1.  Install Ruby 2.0 or higher.\
    \ Follow the instructions at [`http://www.seleniumframework.com/basic-tutorial/setup-ruby-and-components/`](http://www.seleniumframework.com/basic-tutorial/setup-ruby-and-components/)\
    \ if you need help. It is a good idea to have RubyMine IDE installed too, as you\
    \ will use it in the subsequent chapters.  \n2.  Install `arc gems`.\n\n    ```\n\
    \    # Fresh installation\n    gem uninstall -aIx appium_lib ;\\\n    gem uninstall\
    \ -aIx appium_console ;\\\n    gem install --no-rdoc --no-ri appium_console bond\n\
    \    ```\n\n    For troubleshooting instructions, follow this link at [`https://github.com/appium/ruby_console`](https://github.com/appium/ruby_console)\
    \ . If you are upgrading, here is what you should expect:\n\n    ```\n    Anyones-Mac-mini:∼\
    \ pmacharl$ pwd\n    /Users/pmacharl\n    Anyones-Mac-mini:∼ pmacharl$ mkdir arc_tests\n\
    \    Anyones-Mac-mini:∼ pmacharl$ cd arc_tests/\n    Anyones-Mac-mini:arc_tests\
    \ pmacharl$ arc upgrade\n    gem uninstall -aIx appium_lib; gem uninstall -aIx\
    \ appium_console; gem install --no\n    -rdoc --no-ri appium_console\n    Upgrade\
    \ complete .\n    ```\n\n3.  The ARC configuration file. ARC looks for an `appium.txt`\
    \ file, which has key/value pairs as defined by ARC. There are certain key/value\
    \ pairs expected for Android versus for iOS. Here is an example of how you can\
    \ get started quickly:\n    *   The `sauce_username` and `sauce_access_key` can\
    \ be safely ignored until you plan to use Sauce Labs infrastructure for execution.\n\
    \    *   Access the `appPackage` and `appActivity` values for Android either by\
    \ talking to the developer of the app or by using the following commands.\n\n\
    \    ```\n    Anyones-Mac-mini:arc_tests pmacharl$ arc version\n    appium_console:\
    \ v1.0.4\n    appium_lib: v8.0.1\n    Anyones-Mac-mini:arc_tests pmacharl$ arc\
    \ setup android\n    Anyones-Mac-mini:arc_tests pmacharl$ ls\n    appium.txt\n\
    \    Anyones-Mac-mini:arc_tests pmacharl$ cat appium.txt\n    [caps]\n    platformName\
    \ = \"android\"\n    deviceName = \"Nexus 7\"\n    app = \"./api.apk\"\n    appPackage\
    \ = \"io.appium.android.apis\"\n    appActivity = \".ApiDemos\"\n    [appium_lib]\n\
    \    sauce_username = \"\"\n    sauce_access_key = \"\"\n    ```\n\n### Method1\n\
    \nThere are two ways to look at the app. The first method executes the following\
    \ code on the command line:\n\n```\n# Returns the package's name, versionCode\
    \ and so on\naapt dump badging app-debug.apk | grep package:\\ name\n# Returns\
    \ all launchable activities. Generally the main entry point to app will be named\
    \ as *.MainActivity (but that may change as per developer's decision) aapt dump\
    \ badging app-debug.apk | grep launchable-activity\n```\n\n### Method2\n\nThe\
    \ package name and activity can also be read from the manifest file. You can see\
    \ the full content of the manifest file by executing the following command. This\
    \ will output the topology (the metadata and its hierarchy) of your app. The activity\
    \ that doesn’t have any `ParentActivity` will be the `MainActivity` in general.\
    \ The rest of the activities will have `ParentActivity`. (An activity is a single\
    \ screen with the user interface.)\n\n```\naapt l -a app-debug.apk\n```\n\nNote\n\
    \nThe `aapt` binary is located in the `$ANDROID_HOME/build-tools/x.y.z` directory.\n\
    \nFor full list of `appium.txt` capabilities (key/value pairs), see [`https://github.com/appium/appium/blob/master/docs/en/writing-running-appium/caps.md`](https://github.com/appium/appium/blob/master/docs/en/writing-running-appium/caps.md)\
    \ .\n\nNote\n\nOn Android, the `deviceName` capability is currently ignored.\n\
    \n## Inspecting Using ARC\n\nUnderstanding the composition of the application\
    \ from the UI helps you identify the elements and the operations to be performed\
    \ on them later. This section looks at the app and identifies the HTML elements.\n\
    \n### Prerequisites\n\nBefore you start , you need to do the following:\n\n1.\
    \  Set up an AVD and name it `Nexus_4_API_23`. The base images are already available\
    \ with the SDK. See Figure [8-11](#A435441_1_En_8_Chapter.html#Fig11).\n\n   \
    \ ![A435441_1_En_8_Fig11_HTML.jpg](A435441_1_En_8_Fig11_HTML.jpg)\n\n    Figure\
    \ 8-11.\n\n    Set up AVD  \n2.  Notice that Use Host GPU is selected and Snapshot\
    \ is not. These two fields are mutually exclusive.  \n3.  The Appium server should\
    \ be running . If not, start it on the default `4723` port."
  trans: "\n### Appium Android 设置\n\nAppium 服务器为 Android 提供了许多设置。逐一讲解每个字段超出了本书的范围；不过，我想提一下，你可以通过编程方式设置每个字段的值（你将在脚本编写过程中看到这一点）。尝试使用不同的设置以熟悉它们。请见图\
    \ 8-7。\n\n![A435441_1_En_8_Fig7_HTML.jpg](img/A435441_1_En_8_Fig7_HTML.jpg)\n\n\
    图 8-7. Appium Android 设置\n\n例如，`app` 路径可以指向一个 `.apk` 文件。\n\n同样，在高级设置中，你可以将 Android\
    \ SDK 指向一个特定位置，而不是 Appium 服务器可能查找的默认位置。这样，你可以确保只使用一个版本的 Android SDK，并且只对该版本进行更新。请见图\
    \ 8-8。\n\n![A435441_1_En_8_Fig8_HTML.jpg](img/A435441_1_En_8_Fig8_HTML.jpg)\n\n\
    图 8-8. Appium Android 高级设置\n\n### Appium 服务器设置\n\n最后，Appium 服务器本身也有一些可以更改的设置，如图\
    \ 8-9 所示。\n\n![A435441_1_En_8_Fig9_HTML.jpg](img/A435441_1_En_8_Fig9_HTML.jpg)\n\
    \n图 8-9. Appium 服务器设置\n\n注意：所有这些设置也可以作为服务器参数使用，你可以在命令行输入 `appium --help` 来访问它们。\n\
    \n到目前为止，你读到的信息可能因为涉及的选项数量而感到不知所措；不过，一旦你开始编写代码来处理所有这些复杂性，就会变得容易得多。这就是持续集成的好处之一——它有助于自动化那些单调且重复的任务。\n\
    \n## 检查应用程序\n\n就像使用 Selenium 识别网页的 DOM 元素一样，对应用程序也需要遵循类似的过程。也就是说，你需要先唯一地标识一个元素的定位器，然后才能对其执行操作。有多种策略可以实现这一点。如需复习，请查看\
    \ [`http://www.seleniumframework.com/basic-tutorial/html-dom/`](http://www.seleniumframework.com/basic-tutorial/html-dom/)。\n\
    \n大多数 UI 自动化工具和网络爬虫都有元素识别策略，了解这些策略有助于你自动化操作。花费一些时间检查移动应用渲染到屏幕上的“视图”是一个好主意。更重要的是，理解\
    \ HTML 表示和各种属性将帮助你更快地编写自动化脚本。\n\n这与使用 Chrome 开发者工具（检查元素）、Firefox 检查元素/Firepath/Firebug\
    \ 或 IE 开发者工具非常相似。在使用 Selenium 编写 Web 应用程序自动化脚本时，使用这些开发者工具是必不可少的。图 8-10 是一个示例。\n\
    \n![A435441_1_En_8_Fig10_HTML.jpg](img/A435441_1_En_8_Fig10_HTML.jpg)\n\n图 8-10.\
    \ DOM（文档对象模型）\n\n## Appium Ruby 控制台\n\nAppium Ruby 控制台（ARC）是一个方便的工具，用于快速查看屏幕 HTML。按照以下步骤开始使用它：\n\
    \n1. 安装 Ruby 2.0 或更高版本。如果需要帮助，请按照 [`http://www.seleniumframework.com/basic-tutorial/setup-ruby-and-components/`](http://www.seleniumframework.com/basic-tutorial/setup-ruby-and-components/)\
    \ 上的说明操作。最好也安装 RubyMine IDE，因为你将在后续章节中使用它。\n\n2. 安装 `arc` gems。\n\n    ```\n \
    \   # 全新安装\n    gem uninstall -aIx appium_lib ;\\\n    gem uninstall -aIx appium_console\
    \ ;\\\n    gem install --no-rdoc --no-ri appium_console bond\n    ```\n\n    如需故障排除说明，请访问此链接：[`https://github.com/appium/ruby_console`](https://github.com/appium/ruby_console)。如果你正在升级，以下是预期结果：\n\
    \n    ```\n    Anyones-Mac-mini:∼ pmacharl$ pwd\n    /Users/pmacharl\n    Anyones-Mac-mini:∼\
    \ pmacharl$ mkdir arc_tests\n    Anyones-Mac-mini:∼ pmacharl$ cd arc_tests/\n\
    \    Anyones-Mac-mini:arc_tests pmacharl$ arc upgrade\n    gem uninstall -aIx\
    \ appium_lib; gem uninstall -aIx appium_console; gem install --no\n    -rdoc --no-ri\
    \ appium_console\n    Upgrade complete.\n    ```\n\n3. ARC 配置文件。ARC 会查找一个 `appium.txt`\
    \ 文件，该文件包含由 ARC 定义的键/值对。Android 和 iOS 所期望的某些键/值对有所不同。以下是一个快速上手的示例：\n    * 在计划使用\
    \ Sauce Labs 基础设施进行执行之前，可以安全地忽略 `sauce_username` 和 `sauce_access_key`。\n    *\
    \ 通过与应用的开发人员沟通，或使用以下命令，获取 Android 的 `appPackage` 和 `appActivity` 值。\n\n    ```\n\
    \    Anyones-Mac-mini:arc_tests pmacharl$ arc version\n    appium_console: v1.0.4\n\
    \    appium_lib: v8.0.1\n    Anyones-Mac-mini:arc_tests pmacharl$ arc setup android\n\
    \    Anyones-Mac-mini:arc_tests pmacharl$ ls\n    appium.txt\n    Anyones-Mac-mini:arc_tests\
    \ pmacharl$ cat appium.txt\n    [caps]\n    platformName = \"android\"\n    deviceName\
    \ = \"Nexus 7\"\n    app = \"./api.apk\"\n    appPackage = \"io.appium.android.apis\"\
    \n    appActivity = \".ApiDemos\"\n    [appium_lib]\n    sauce_username = \"\"\
    \n    sauce_access_key = \"\"\n    ```\n\n### 方法 1\n\n有两种查看应用的方式。第一种方法是在命令行上执行以下代码：\n\
    \n```\n# 返回包的名称、versionCode 等\naapt dump badging app-debug.apk | grep package:\\\
    \ name\n# 返回所有可启动的活动。通常应用的主入口点会被命名为 *.MainActivity（但这可能根据开发人员的决定而改变）\naapt dump\
    \ badging app-debug.apk | grep launchable-activity\n```\n\n### 方法 2\n\n包名和活动也可以从清单文件中读取。可以通过执行以下命令查看清单文件的完整内容。这将输出你应用的拓扑结构（元数据及其层次结构）。通常，没有任何\
    \ `ParentActivity` 的活动将是 `MainActivity`。其余的活动将具有 `ParentActivity`。（活动是一个带有用户界面的单个屏幕。）\n\
    \n```\naapt l -a app-debug.apk\n```\n\n注意：`aapt` 二进制文件位于 `$ANDROID_HOME/build-tools/x.y.z`\
    \ 目录中。\n\n有关 `appium.txt` 功能（键/值对）的完整列表，请参阅 [`https://github.com/appium/appium/blob/master/docs/en/writing-running-appium/caps.md`](https://github.com/appium/appium/blob/master/docs/en/writing-running-appium/caps.md)。\n\
    \n注意：在 Android 上，`deviceName` 功能目前被忽略。\n\n## 使用 ARC 进行检查\n\n从 UI 角度理解应用的组成，有助于你识别元素以及稍后要对其执行的操作。本节将查看应用并识别\
    \ HTML 元素。\n\n### 先决条件\n\n在开始之前，你需要执行以下操作：\n\n1. 设置一个 AVD，并将其命名为 `Nexus_4_API_23`。基础镜像已随\
    \ SDK 提供。请见图 8-11。\n\n    ![A435441_1_En_8_Fig11_HTML.jpg](img/A435441_1_En_8_Fig11_HTML.jpg)\n\
    \n    图 8-11. 设置 AVD\n\n2. 注意，已选择“使用主机 GPU”，而未选择“快照”。这两个字段是互斥的。\n\n3. Appium 服务器应该正在运行。如果没有，请在默认的\
    \ `4723` 端口启动它。\n"
- fmt: "### The Appium.txt File\n\nUsing the `appium.txt` configuration file, type\
    \ `arc` in the folder that contains `appium.txt`:\n\n```\n# appium.txt\n[caps]\n\
    platformName = \"Android\"\ndeviceName = \"Android\"\navd = \"Nexus_4_API_23\"\
    \napp = \"\"\nappPackage = \"com.android.settings\"\nappActivity = \".Settings\"\
    \n[appium_lib]\nsauce_username = \"\"\nsauce_access_key = \"\"\n```\n\nAs soon\
    \ you type `arc` in the command line, you should see it processing and AVD will\
    \ be launched. (Patience is a virtue here and AVD's time to launch is based on\
    \ your machine configuration.)\n\nIn the command line, the control returns to\
    \ ARC (`pry`), where you can now interact with AVD through `appium_lib`-provided\
    \ API calls. See Figure [8-12](#A435441_1_En_8_Chapter.html#Fig12).\n\n1.  The\
    \ full list of available commands is found at [`https://github.com/appium/ruby_console`](https://github.com/appium/ruby_console)\
    \ and is always evolving.  \n2.  `page_class`:\n\n    ```\n    Anyones-Mac-mini:arc_android\
    \ pmacharl$ arc\n    [1] pry(main)> page_class\n    22x android.widget.LinearLayout\n\
    \    10x android.widget.FrameLayout\n    10x android.widget.TextView\n    6x android.view.View\n\
    \    6x android.widget.RelativeLayout\n    6x android.widget.ImageView\n    4x\
    \ android.view.ViewGroup\n    1x android.widget.ScrollView\n    1x hierarchy\n\
    \    ```\n\n3.  Source:\n\n    ```\n    [2] pry(main)> source\n\n     id('android:id/decor_content_parent')\n\
    \    #\n    [4] pry(main)> id('android:id/decor_content_parent').methods\n   \
    \ [\n    [ 0] !() Selenium::WebDriver::Element\n    (BasicObject)\n    [ 1] !=(arg1)\
    \ Selenium::WebDriver::Element\n    (BasicObject)\n    [30] pry(main)> xpath('//android.widget.FrameLayout').get_page_class\n\
    \    \"15x android.widget.FrameLayout\\n11x android.widget.LinearLayout\\n8x android.widget.\n\
    \    TextView\\n6x android.view.View\\n6x android.widget.ImageView\\n1x android.widget.GridLayout\n\
    \    \\n1x android.widget.ScrollView\\n1x android.view.ViewGroup\\n1x android.widget.Relative\n\
    \    Layout\\n1x hierarchy\"\n    [31] pry(main)> xpath('//android.widget.FrameLayout').get_android_inspect\n\
    \    \"\\nandroid.widget.FrameLayout (1)\\n id: com.android.systemui:id/panel_holder\\\
    n\\nandroid\n    .widget.FrameLayout (2)\\n\n    ```\n\n![A435441_1_En_8_Fig12_HTML.jpg](A435441_1_En_8_Fig12_HTML.jpg)\n\
    \nFigure 8-12.\n\nAppium Ruby console (ARC)\n\nFinally, if you prefer to use the\
    \ driver object (the Selenium driver) directly instead of using wrapped methods\
    \ (like `d()` used previously), you can access the driver object directly.\n\n\
    ```\ndriver.textfields\ndriver.find_element(:xpath, \"//android.widget.FrameLayout\"\
    )\n```\n\nThe takeaway from this section is that the more practice and comfort\
    \ you get with the APIs exposed by Appium, the easier it will be to code the same\
    \ during scripting.\n\n### Using uiautomatorviewer\n\nIn the chapter that covers\
    \ `uiautomatorviewer`, I introduced the tool. Now let's see how to use it to look\
    \ at an app.\n\n1.  Type `uiautomatorviewer` in the command line to launch the\
    \ program (`$ANDROID_HOME/platform-tools` should be in `$PATH`).  \n2.  Click\
    \ the Device Screenshot, uiautomator Dump icon.  \n3.  Select the Android target\
    \ (`avd/device`) that `uiautomatorviewer` should take the XML screenshot from.\
    \  \n4.  For AVD, it takes a little bit more time than a real device.  \n5.  After\
    \ this, you can see the tree hierarchy and use the attributes to further identify\
    \ elements during automation script writing. See Figure [8-13](#A435441_1_En_8_Chapter.html#Fig13).\n\
    \n    ![A435441_1_En_8_Fig13_HTML.jpg](A435441_1_En_8_Fig13_HTML.jpg)\n\n    Figure\
    \ 8-13.\n\n    Introspecting on the target device  \n\nIn Figure [8-14](#A435441_1_En_8_Chapter.html#Fig14),\
    \ you can identify the element that displays the time in Appium using any of the\
    \ following locator(s):\n\n![A435441_1_En_8_Fig14_HTML.jpg](A435441_1_En_8_Fig14_HTML.jpg)\n\
    \nFigure 8-14.\n\nTraversing the application DOM\n\n```\nid('com.android.systemui:id/clock_view')\n\
    tag('android.widget.TextView') # Observe that classname is tag in mobile app.\n\
    ```\n\n# Test Strategy and Execution\n\nIn the previous chapters, you learned\
    \ how to build and deploy an app on an Android device.\n\nThis chapter covers\
    \ the details of executing automated tests (written in the Cucumber Gherkin framework)\
    \ against a target device. This is the final step in getting the full feedback\
    \ on changes introduced in the app.\n\n**Note**  \nWe are talking about outside-in\
    \ tests here. Inside-out, i.e. unit, tests involve only a developer. The goal\
    \ with CI is to get the maximum value as perceived by the end consumer. Hence,\
    \ the tests mentioned here are integration/end-end tests.\n\n## Continuous Test\
    \ Automation with Cucumber\n\nYou can choose any testing framework you like. As\
    \ an example, I chose Cucumber (with Ruby), because it lets me describe the \"\
    what\" piece (the features) first. Then I write the \"how\" layer (the step definitions),\
    \ i.e. the technical piece, later. In my experience, I feel that this results\
    \ in good collaboration between multiple roles. If you are a developer and are\
    \ working in a silo, choose whatever framework fits your needs (`JUnit`, `rspec`,\
    \ `testing`, et al.). The following links can help you understand the Cucumber\
    \ basics:\n\n-   Why use Cucumber at [`http://www.seleniumframework.com/cucumber-2/make-a-case/why-cucumber/`](http://www.seleniumframework.com/cucumber-2/make-a-case/why-cucumber/)\n\
    -   Information about ATDD, BDD, and TDD at [`http://www.seleniumframework.com/cucumber-2/make-a-case/atdd-tdd-bdd/`](http://www.seleniumframework.com/cucumber-2/make-a-case/atdd-tdd-bdd/)\n\
    -   Using continuous test automation at [`http://www.seleniumframework.com/cucumber-2/make-a-case/continuous-test-automation/`](http://www.seleniumframework.com/cucumber-2/make-a-case/continuous-test-automation/)\n\
    -   Learn how Cucumber works at [`http://www.seleniumframework.com/cucumber-2/make-a-case/how-cucumber-works-2/`](http://www.seleniumframework.com/cucumber-2/make-a-case/how-cucumber-works-2/)\n\
    -   Installing Cucumber at [`http://www.seleniumframework.com/cucumber-2/install-cucumber/`](http://www.seleniumframework.com/cucumber-2/install-cucumber/)\n\
    -   Learn Cucumber's keywords at [`http://www.seleniumframework.com/cucumber-2/cucumber-keywords/`](http://www.seleniumframework.com/cucumber-2/cucumber-keywords/)\n\
    -   Step definitions at [`http://www.seleniumframework.com/cucumber-2/step-definitions/`](http://www.seleniumframework.com/cucumber-2/step-definitions/)\n\
    -   The basic Ruby tutorial for the web at [`http://www.seleniumframework.com/introduction/what-is-ruby/`](http://www.seleniumframework.com/introduction/what-is-ruby/)\n\
    \nI am not going to explain Cucumber and its fundamentals and will assume that\
    \ you have a basic understanding and have visited these links.\n\n## High-Level\
    \ Mindmap\n\nThe high-level explanation of the code you are going to see in the\
    \ next few sections is as follows:\n\n1.  Your Android build process puts the\
    \ `app-debug.apk` in the `./features/support/resources` folder.  \n2.  Write the\
    \ Cucumber features.  \n3.  Complete the context code (`env.rb` and `hooks.rb`).\
    \  \n4.  List your target devices in `devices.yaml`.  \n5.  List your target emulators\
    \ in `emulators.yaml`.  \n6.  Define a module that returns the desired capabilities\
    \ object (representing the device/emulator) to talk to the Appium server.  \n\
    7.  The default Cucumber profile writes HTML and JSON results.  \n8.  Write tests\
    \ and tag them so that `appPackage` and `appActivity` are defined both for the\
    \ app to be tested and for the generic settings on the Android device. (The settings\
    \ needn't be tested in actuality, but we have this example to get started).\n\n\
    ## Test Framework\n\nThe test framework used here is based on Cucumber, Ruby,\
    \ and the `Appium_lib` gem. Hence, I describe the \"what\" in features/scenarios\
    \ and the \"how\" in the code-behind (`step_definitions`).\n\nThis aligns very\
    \ well with ATDD (acceptance test-driven development)."
  raw: "### The Appium.txt File\n\nUsing the `appium.txt` configuration file, type\
