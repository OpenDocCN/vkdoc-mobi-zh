    # 6. Connect Android Target


    This chapter builds on Chapter [5](#A435441_1_En_5_Chapter.html), in which you
    learned how to successfully build an `.apk` file (either through the debug or
    release APK). Once the `.apk` file is ready on your filesystem, you have to ensure
    that you are connected to the target device/emulator where you intend to deploy
    the `.apk` file.


    ## Testing with Emulators versus Real Devices


    There is lots of information online about when to use emulators versus real devices
    . After working with mobile apps that utilize Android to the fullest extent, I
    have come to believe that real-device testing provides significantly higher confidence
    when releasing the app to production.


    You can start your app testing on an emulator, but because emulators cannot fully
    emulate the hardware, platform, and software conditions, your testing will be
    incomplete without testing on real devices too.


    For emulators, AVD (Android Virtual Device ) Manager helps create virtual devices.


    For real devices, you have to purchase and maintain them or lease them from device
    clouds .


    ## Using the Android Emulator


    The Android Emulator , as the name suggests, emulates an Android device. The utility
    strives to emulate the mobile hardware components, as well as the gestures (swipe,
    tap, etc.). You deploy your app into the emulator and then launch and test it
    as if it were running on a real device.


    Features that the emulator cannot imitate are geo-location, actual testing of
    cell towers, network bandwidth conditions, etc.


    For more information about using the Android Emulator, see [`https://developer.android.com/studio/run/emulator.html`](https://developer.android.com/studio/run/emulator.html)
    .


    ### Hardware Acceleration


    When launching and configuring AVD, enabling hardware virtualization will greatly
    improve performance. You can enable this setting by choosing Emulated Performance:
    Graphics on the Verify Configuration page after you create the AVD.


    To enable hardware acceleration, choose GPU Emulation: True when configuring the
    AVD.


    Note that GPU Emulation and Snapshot: Enabled are mutually exclusive.


    The URL mentioned previously has more information and details and explains the
    various configurations possible.


