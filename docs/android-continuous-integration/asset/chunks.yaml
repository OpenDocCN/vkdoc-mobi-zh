  raw: '# 1. Introduction


    This chapter sets the context and the current mobile landscape. We start by introducing
    the overall architectural pattern and the definition of Continuous Integration
    (CI) and subsequently list the installation steps of the tools and software that
    form the platform. The underlying software platform (Jenkins, Nexus, SonarQube,
    and Docker, et al.) form the foundation on which we build automation concepts.


    ## Architecture


    In this book , I present a pattern for CI,a.k.a. quick feedback as soon as the
    developer checks in the code. Although the term CI for some involves merging and
    building code in a distributed model, in this book, you will not only merge code,
    but also build, deploy, and test it. Only when you complete the loop of build-deploy-test
    (the key piece is testing) will you be confident about the quality of the code
    you checked in.


    You will start with a minimum viable product (MVP) that follows the architecture
    shown in Figure [1-1](#A435441_1_En_1_Chapter.html#Fig1). All steps in the process
    are completely automated—no exceptions!


    ![A435441_1_En_1_Fig1_HTML.jpg](A435441_1_En_1_Fig1_HTML.jpg)


    Figure 1-1.


    Overall architecture


    As you reach initial maturity with the CI feedback loop and see continuous builds
    and feedback, you will continue to push the envelope and achieve parallel device
    testing. Figure [1-2](#A435441_1_En_1_Chapter.html#Fig2) shows the Test Runner
    architecture.


    ![A435441_1_En_1_Fig2_HTML.jpg](A435441_1_En_1_Fig2_HTML.jpg)


    Figure 1-2.


    Test Runner architecture


    ## Prerequisites


    The following sections cover the software tools needed to follow the code patterns
    in this book.


    ### Windows vs. Mac


    To develop an Android app , you can use either Mac or Windows platforms. However,
    I recommend using Mac over Windows because of the following experiences I had:


    *   Device drivers are easier to obtain on a Mac (as opposed to Windows, where
    you have to identify the hardware and go to the vendor’s web site)

    *   System resources (CPU, RAM, etc.) perform better on a Mac

    *   The emulator performs relatively better on a Mac

    *   Most online examples refer to the Mac environment

    *   Android OS is a *nix core underneath, hence the experience of developing,
    debugging, and testing feels better on a Mac


    Note


    This book uses a Mac for the hardware and for the underlying OS.


    ### The Mac Environment


    The Mac environment shown in Figure [1-3](#A435441_1_En_1_Chapter.html#Fig3) was
    used to run all the examples in this book.


    ![A435441_1_En_1_Fig3_HTML.jpg](A435441_1_En_1_Fig3_HTML.jpg)


    Figure 1-3.


    Mac environment used for the book’s examples


    ### Mobile Devices


    You should have at least one real Android device . It’s best to have an Android
    4.4 operating system or above, API 17 or above. With Android 4.2 and earlier,
    the `appium` server needs to be started with `selendroid-port` in addition to
    `bootstrap-port`. Details of port values are listed in Chapter [8](#A435441_1_En_8_Chapter.html)
    , “Work with Appium”.


    ### Network


    It’s best if all the servers (Jenkins, Nexus, Sonar, Appium, etc.) and the build
    machine were in the same network segment. At a minimum , they should be able to
    ping (assuming ICMP is not disabled) and be able to reach each other on the ports
    that the processes listen (mostly TCP). (For example, if Jenkins were running
    on web 8080, you should be able to reach `http://jenkins_url:8080` from all other
    machines.)


    ### Platform


    The following domain knowledge is required to a certain extent.


    *   Java programming language and runtime (the Android app source is in Java)

    *   Ruby programming language (understand the automation framework written with
    Cucumber and Ruby)

    *   Usage of *nix operating systems (the Mac aligns with *nix style)


    ## Programming Language


    The test automation framework uses the Ruby programming language . I chose Ruby
    with Gherkin, since it’s close to reading the English language.


    ## Installation Processes


    For each software program you need, the installation instructions are provided.
    At the end of each section, you’ll find a link to a video demonstrating the installation
    process .


    ### Installing Jenkins


    The version of Jenkins installed at the time of writing this book is 1.642.1.


    Use the following steps to install Jenkins:


    1.  Log in to a machine that has Docker installed on it (installation instructions
    for Docker, which are machine dependent, are found at [`https://docs.docker.com/engine/installation/`](https://docs.docker.com/engine/installation/)
    ). This example uses Ubuntu 14.04 OS.  

    2.  Run the command `docker run –d –name "myjenkins" –p 8083:8080 jenkins:` `latest`
    (latest at the time of this writing is the 1.642.1 version of Jenkins).  

    3.  Access the Jenkins URL using `http://hostname:8083`.  

    4.  Navigate to Manage Jenkins ➤ Manager Users. Add a user with the name `admin`
    and provide a password.  

    5.  Navigate to Manage Jenkins ➤ Configure Global Security. Check the Enable Security
    checkbox. On the same page, under Access Control, select Jenkin’s Own User Database.
    Under Authorization, select Matrix-Based Security.  

    6.  Add a user called `admin` and check all the boxes in all the columns (for
    more detailed instructions, watch the video).  

    7.  Now save the page. This will focus the page to the user login.  

    8.  Log in as the `admin` user.  

    9.  Click New Item in the left menu, provide an Item Name of `HelloWorld`, and
    click OK.  

    10.  Go to Build ➤ Add Build Step ➤ Execute Shell.  

    11.  In the text area, type `echo "hello world"` and click Save.  

    12.  Click Build Now in the left menu.  

    13.  The build passes in and a blue ball shows up against the entry in Build History
    .  

    14.  If you want to see the console output, click the build number (#1) and then
    click Console Output.  


    Jenkins is successfully installed now. Figure [1-4](#A435441_1_En_1_Chapter.html#Fig4)
    shows the UI.


    ![A435441_1_En_1_Fig4_HTML.jpg](A435441_1_En_1_Fig4_HTML.jpg)


    Figure 1-4.


    Jenkins UI


    The link to the video demonstrating the steps is [`https://vimeo.com/154497273`](https://vimeo.com/154497273)
    .


    ### Installing Nexus


    The version of Nexus installed at the time of writing this book is 2.11.4-01.


    Use the following steps to install Nexus:


    1.  Log in to your machine that has Docker installed on it (installation instructions
    for Docker, which are machine dependent, are found at [`https://docs.docker.com/engine/installation/`](https://docs.docker.com/engine/installation/)
    ). This example uses Ubuntu 14.04 OS.  

    2.  Run the command `docker run –d –name "mynexus" –p 8081:8081 sonatype/nexus:oss`
    (the latest at the time of this writing is 2.11.4-01) .  

    3.  Access the Nexus URL using `http://localhost:8081` (the default credentials
    are `admin/admin123`).  


    Nexus is successfully installed now, and the UI is shown in Figure [1-5](#A435441_1_En_1_Chapter.html#Fig5).


    ![A435441_1_En_1_Fig5_HTML.jpg](A435441_1_En_1_Fig5_HTML.jpg)


    Figure 1-5.


    Nexus UI


    Check out [`https://vimeo.com/154500108`](https://vimeo.com/154500108) to see
    how to install Nexus.'
  trans: '

    # 1. 引言


    本章将介绍背景和当前的移动开发现状。我们首先介绍整体架构模式及持续集成（CI）的定义，随后列出构成该平台的工具和软件的安装步骤。底层软件平台（`Jenkins`、`Nexus`、`SonarQube`
    和 `Docker` 等）是我们构建自动化概念的基础。


    ## 架构


    在本书中，我将介绍一种 CI 模式，即开发人员提交代码后立即获得快速反馈。尽管对于某些人来说，CI 一词涉及分布式模型中的代码合并与构建，但在本书中，你不仅要合并代码，还要构建、部署和测试它。只有当你完成构建-部署-测试（关键部分是测试）的循环后，你才会对自己提交的代码质量充满信心。


    您将从遵循图 1-1 所示架构的最小可行产品（MVP）开始。过程中的所有步骤都是完全自动化的——无一例外！


    ![A435441_1_En_1_Fig1_HTML.jpg](img/A435441_1_En_1_Fig1_HTML.jpg)


    图 1-1. 整体架构


    当您初步掌握 CI 反馈循环并看到持续构建和反馈后，您将继续突破极限，实现并行设备测试。图 1-2 展示了测试运行器架构。


    ![A435441_1_En_1_Fig2_HTML.jpg](img/A435441_1_En_1_Fig2_HTML.jpg)


    图 1-2. 测试运行器架构


    ## 先决条件


    以下部分涵盖了遵循本书代码模式所需的软件工具。


    ### Windows 与 Mac 的选择


    要开发 Android 应用，您可以使用 Mac 或 Windows 平台。然而，基于以下经验，我推荐使用 Mac 而非 Windows：


    - 在 Mac 上更容易获得设备驱动（相比之下，Windows 需要您识别硬件并前往供应商网站）

    - 系统资源（CPU、RAM 等）在 Mac 上表现更佳

    - 模拟器在 Mac 上运行相对更好

    - 大多数在线示例都引用 Mac 环境

    - Android 操作系统底层是 *nix 内核，因此在 Mac 上进行开发、调试和测试的体验更佳


    **注意：** 本书使用的硬件和底层操作系统均为 Mac。


    ### Mac 环境


    图 1-3 所示的 Mac 环境用于运行本书中的所有示例。


    ![A435441_1_En_1_Fig3_HTML.jpg](img/A435441_1_En_1_Fig3_HTML.jpg)


    图 1-3. 本书示例使用的 Mac 环境


    ### 移动设备


    您应至少拥有一台真实的 Android 设备。最好使用 Android 4.4 及以上操作系统，API 17 及以上。对于 Android 4.2 及更早版本，除了
    `bootstrap-port` 之外，还需要使用 `selendroid-port` 启动 `appium` 服务器。端口值的详细信息请参阅第 8 章“使用
    Appium”。


    ### 网络


    最好将所有服务器（`Jenkins`、`Nexus`、`Sonar`、`Appium` 等）和构建机器置于同一网段。至少，它们应该能够 `ping` 通（假设
    ICMP 未被禁用），并且能够通过进程监听的端口（主要为 TCP）相互访问。（例如，如果 `Jenkins` 运行在 web 8080 端口上，您应该能够从其他所有机器访问
    `http://jenkins_url:8080`。）


    ### 平台


    需要具备一定程度的以下领域知识：


    - Java 编程语言及运行时（Android 应用源码为 Java 编写）

    - Ruby 编程语言（理解使用 `Cucumber` 和 Ruby 编写的自动化框架）

    - *nix 操作系统的使用（Mac 与 *nix 风格相符）


    ## 编程语言


    测试自动化框架使用 Ruby 编程语言。我选择 Ruby 搭配 `Gherkin`，因为它接近英语的阅读习惯。


    ## 安装流程


    针对您需要的每个软件程序，均提供了安装说明。每节末尾都附有演示安装过程的视频链接。


    ### 安装 Jenkins


    本书编写时安装的 `Jenkins` 版本为 1.642.1。


    请按照以下步骤安装 Jenkins：


    1. 登录一台已安装 Docker 的机器（Docker 的安装说明（依赖于机器）请参见 [`docs.docker.com/engine/installation/`](https://docs.docker.com/engine/installation/)）。本例使用
    Ubuntu 14.04 操作系统。

    2. 运行命令 `docker run –d –name "myjenkins" –p 8083:8080 jenkins:latest`（编写本文时最新版本为
    Jenkins 1.642.1）。

    3. 使用 `http://hostname:8083` 访问 Jenkins URL。

    4. 导航至 Manage Jenkins ➤ Manager Users。添加一个名为 `admin` 的用户并提供密码。

    5. 导航至 Manage Jenkins ➤ Configure Global Security。勾选 Enable Security 复选框。在同一页面的
    Access Control 下，选择 Jenkin''s Own User Database。在 Authorization 下，选择 Matrix-Based
    Security。

    6. 添加一个名为 `admin` 的用户，并勾选所有列中的所有复选框（更详细的说明请观看视频）。

    7. 现在保存页面。页面将跳转到用户登录界面。

    8. 以 `admin` 用户身份登录。

    9. 点击左侧菜单中的 New Item，提供项目名称 `HelloWorld`，然后点击 OK。

    10. 进入 Build ➤ Add Build Step ➤ Execute Shell。

    11. 在文本区域输入 `echo "hello world"`，然后点击 Save。

    12. 点击左侧菜单中的 Build Now。

    13. 构建通过，Build History 条目旁会显示蓝色球体。

    14. 如果您想查看控制台输出，请点击构建编号（#1），然后点击 Console Output。


    Jenkins 现已成功安装。图 1-4 显示了其用户界面。


    ![A435441_1_En_1_Fig4_HTML.jpg](img/A435441_1_En_1_Fig4_HTML.jpg)


    图 1-4. Jenkins 用户界面


    演示这些步骤的视频链接为 [`vimeo.com/154497273`](https://vimeo.com/154497273)。


    ### 安装 Nexus


    本书编写时安装的 `Nexus` 版本为 2.11.4-01。


    请按照以下步骤安装 Nexus：


    1. 登录一台已安装 Docker 的机器（Docker 的安装说明（依赖于机器）请参见 [`docs.docker.com/engine/installation/`](https://docs.docker.com/engine/installation/)）。本例使用
    Ubuntu 14.04 操作系统。

    2. 运行命令 `docker run –d –name "mynexus" –p 8081:8081 sonatype/nexus:oss`（编写本文时最新版本为
    2.11.4-01）。

    3. 使用 `http://localhost:8081` 访问 Nexus URL（默认凭据为 `admin/admin123`）。


    Nexus 现已成功安装，其用户界面如图 1-5 所示。


    ![A435441_1_En_1_Fig5_HTML.jpg](img/A435441_1_En_1_Fig5_HTML.jpg)


    图 1-5. Nexus 用户界面


    请访问 [`vimeo.com/154500108`](https://vimeo.com/154500108) 查看如何安装 Nexus。

    '
- fmt: '### Installing SonarQube


    The version of SonarQube installed at the time of writing this book is 5.1.


    Use the following steps to install SonarQube:


    1. Log in to your machine that has Docker installed on it (installation instructions
    for Docker, which are machine dependent, are found at [`https://docs.docker.com/engine/installation/`](https://docs.docker.com/engine/installation/)).
    This example uses Ubuntu 14.04 OS.

    2. Run the command `docker run –d –name "mysonarqube" –p 9000:9000 sonarqube:5.1`
    (the latest version at the time of writing is 5.1).

    3. Access the SonarQube URL using `http://localhost:9000` (the default credentials
    are `admin/admin`).


    SonarQube is successfully installed now, and its UI is shown in Figure [1-6](#A435441_1_En_1_Chapter.html#Fig6).


    ![A435441_1_En_1_Fig6_HTML.jpg](A435441_1_En_1_Fig6_HTML.jpg)


    Figure 1-6. SonarQube UI


    Check out [`https://vimeo.com/154499186`](https://vimeo.com/154499186) to see
    how to install SonarQube.


    ### Installing the CI Tool Stack


    Until now, you have installed the tools individually; however, there is another
    option to install all of them at once (if you prefer). This section is optional.


    1. Log in to your machine that has Docker installed on it (installation instructions
    for Docker, which are machine dependent, are found at [`https://docs.docker.com/engine/installation/`](https://docs.docker.com/engine/installation/)).
