    Component Structure of Applications


    The Android application framework provides APIs for developers. Because the application
    is built in Java, the first level of the program contains the UI needs of the
    various controls. For example, views (`View` components) contain lists, grids,
    text boxes, buttons, and even an embedded web browser.


    An Android application usually consists of five components:


    *   Activity

    *   Intent receiver

    *   Service

    *   Content provider

    *   Intent and intent filters


    The following sections discuss each components a bit more.


    Activity


    Applications with visual UIs are implemented using activities. When a user selects
    an application from the main screen or an application launcher, it starts an action
    or an activity. Each activity program typically takes the form of a separate interface
    (screen). Each activity is a separate class that extends and implements the activity’s
    base class. This class is shown as the UI, consisting of `View` components responding
    to events.


    Most programs have multiple activities (in other words, an Android application
    is composed of one or more activities). Switching to another interface loads a
    new activity. In some cases, a previous activity may give a return value. For
    example, an activity that lets the user select a photo returns the photo to the
    caller.


    When a user opens a new interface, the old interface is suspended and placed in
    the history stack (interface-switching history stack). The user can go back to
    an activity that has been opened in the history stack interface. A stack that
    has no historical value can be removed from the history stack interface. Android
    retains all generated interfaces in the history stack for running the application,
    from the first interface to the last one.


    An activity is a container, which itself is not displayed in the UI. You can roughly
    imagine an activity as a window in the Windows OS, but the view window is not
    only for displaying but also for completing a task.


    Intent and Intent Filters


    Android achieves interface switching through a special class called `intent`.
    An `intent` describes what the program does. The two most important parts of the
    data structure are the action and the data processed in accordance with established
    rules (data). Typical operations are `MAIN` (activity entrance), `VIEW`, `PICK`,
    and `EDIT`. Data to be used in the operation is presented using a Universal Resource
    Identifier (URI). For example, to view a person’s contact information, you need
    to create an `intent` using the `VIEW` operation, and the data is a pointer to
    the person’s URI.


    A class associated with an `intent` is called an `IntentFilter`. An `intent` encapsulates
    a request as an object; `IntentFilter` then describes what intentions an activity
    (or, say, an intent receiver, explained in a moment) can process. In the previous
    example, the activity that shows a person’s contact information uses an `IntentFilter`,
    and it knows how to handle the data `VIEW` operation applied to this person. The
    activity in the `AndroidManifest.xml` file using `IntentFilter` is usually accomplished
    by parsing the `intent` activity switch. First, it uses the `startActivity (myIntent)`
    function to start the new activity, next it systematically checks the `IntentFilter`
    of all installed programs, and then it finds the activity that is the best match
    with the `myIntent` corresponding to `IntentFilter`. This new activity receives
    the message from `intent` and then starts. The `intent`-resolution process occurs
    in real time in the `startActivity` called. This process has two advantages:


    *   The activity emits only one `intent` request and can reuse the function of
    other components.

    *   The activity can always be replaced by an equivalent new activity of the `IntentFilter`.


    Service


    A *service* is a resident system program that has no UI. You should use a service
    for any application that needs to run continuously, such as a network monitor
    or checking for application updates.


    The two ways of using a service are *start-stop mode* and *bind-unbind mode*.
    The process flow chart and functions are shown in [Table 1-3](#9781484203835_Ch01.xhtml#Tab3).


    [Table 1-3](#9781484203835_Ch01.xhtml#_Tab3). The Usage Model of a Service


    ![Table1-3.jpg](images/Table1-3.jpg)


    When two modes are in mixed use—for example, one mode calls `startService()` and
    other modes call `bindService()`—then only when both the `stopService` call and
    the `unbindService` call occur will the service be terminated.


    A service process has its own life cycle, and Android tries to keep a service
    process that has been started or bound. The service process is described as follows:


    *   If the service is the implementation process of the method `onCreate()`, `onStart`,
    or `onDestroy()`, then the main process becomes a foreground process to ensure
    that this code is not stopped.

    *   If the service has started, the value of its importance is lower than that
    of the visible process but above all invisible processes. Because only a few processes
    are visible to the user, as long as the memory is not particularly low, the service
    does not stop.

    *   If multiple clients have bound to the service, as long as any one of the clients
    is visible to the user, that service is visible.


    Broadcast Intent Receiver


    When you want to execute some code associated with external events, such as have
    a task performed in the middle of the night or respond to a phone ringing, use
    `IntentReceiver`. Intent receivers have no UI and use `NotificationManager` to
    inform users that their event has happened. An intent receiver is declared in
    the `AndroidManifest.xml` file but can also be declared using `Context.registerReceiver()`.
    The program does not have to run continuously to wait for `IntentReceiver` to
    be called. When an intent receiver is triggered, the system starts your program.
    Programs can also use `Context.broadcastIntent()` to send their intent broadcast
    to other programs.


    Android applications can be used to handle a data element or to respond to an
    event (such as receiving text messages). Android applications are deployed to
    the device together with an `AndroidManifest.xml` file. `AndroidManifest.xml`
    contains the necessary configuration information, so the application is properly
    installed on the device. `AndroidManifest.xml` also includes the necessary class
    names and the types of events that can be handled by the application, as well
    as the necessary permissions to run the application. For example, if an application
    needs to access the network—to, say, download a file—the manifest file must be
    explicitly listed in the license. Many applications may enable this particular
    license. This declarative security can help reduce the possibility of damage to
    equipment from malicious applications.


    Content Provider


    You can think of content providers as database servers. A content provider’s task
    is to manage persistent data access, such as a SQLite database. If the application
    is very simple, you might not need to create a content-provider application. If
    you want to build a larger application or need to build applications to provide
    data for multiple activities or applications, you can use the content provider
    for data access.


    If you want other programs to use their own programs’ data, a content provider
    is very useful. The content-provider class implements a series of standard methods
    that allows other programs to store and read data that can be processed by the
    content provider.


