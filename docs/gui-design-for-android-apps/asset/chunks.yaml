- fmt: "# Beginners' Confusion: Applications vs. Activities\n\nBeginners tend to get\
    \ confused between applications and activities—in particular, the main activities\
    \ (those that occur when the application starts). In fact, they are two completely\
    \ different objects. The behaviors, attributes, and so forth are not the same.\
    \ Following is a list of differences between applications and activities:\n\n\
    *   No matter how many times an application starts, as long as it is not shut\
    \ down, its value (that is, the object) is constant. It has only one instance.\n\
    *   No matter where an application starts, as long as it is not closed, its value\
    \ (that is, the object) is constant. It has only one instance.\n*   When an activity\
    \ is not finished, its value (that is, the object) is constant. Each time `onStart()`\
    \ is called, the activity displays on the screen front.\n*   The objects that\
    \ `startActivity` starts are different each time. You can say that `startActivity`\
    \ actually contains new objects.\n    *   Although you cannot get a new activity\
    \ object after `startActivity`, the Android framework can send parameter values\
    \ (similar to the actual parameter of the function call) when `startActivity`\
    \ starts its corresponding activity objects.\n    *   Even more surprising is\
    \ that Android can have an activity coexist in multiple objects. When an activity\
    \ is closed, Android returns the results to the main activity started through\
    \ `startActivity`. As a result, it automatically calls the `onActivityResult()`\
    \ method that starts its activity object, and random distribution can be avoided.\n\
    *   An application can have multiple objects of an activity.\n\n## The Basic Android\
    \ Application Interface\n\nIn this section, you use an example to learn about\
    \ Android development using the Android SDK integrated in the Eclipse IDE. You\
    \ create an application named `GuiExam` using the Android SDK and learn about\
    \ the Android interface design by following the steps of the process.\n\n## GuiExam\
    \ Application Code Analysis\n\nThis section provides analysis of the `GuiExam`\
    \ sample application. First, let’s create the `GuiExam` application using the\
    \ Android SDK in Eclipse. For the application name, type `GuiExam`. For the Build\
    \ SDK, choose API 19, which includes the x86 instructions. As shown in [Figure\
    \ 2-2](#9781484203835_Ch02.xhtml#Fig2), select the system default configurations\
    \ for all other entries.\n\n![9781484203835_Fig02-02.jpg](images/9781484203835_Fig02-02.jpg)\n\
    \n[Figure 2-2](#9781484203835_Ch02.xhtml#_Fig2). Initial setup when generating\
    \ the GuiExam project\n\nThe file structure of the project is shown in [Figure\
    \ 2-3](#9781484203835_Ch02.xhtml#Fig3), and the user interface is shown in [Figure\
    \ 2-4](#9781484203835_Ch02.xhtml#Fig4).\n\n![9781484203835_Fig02-03.jpg](images/9781484203835_Fig02-03.jpg)\n\
    \n[Figure 2-3](#9781484203835_Ch02.xhtml#_Fig3). File structure of the GuiExam\
    \ application\n\n![9781484203835_Fig02-04.jpg](images/9781484203835_Fig02-04.jpg)\n\
    \n[Figure 2-4](#9781484203835_Ch02.xhtml#_Fig4). The application interface of\
