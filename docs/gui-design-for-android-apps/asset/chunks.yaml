    \n## 内置 Activity 的隐式匹配\n\n在前两节的示例中，在你通过 `Activity.startActivity()` 函数或 `Activity.startActivityForResult()`\
    \ 函数触发同一应用程序或不同应用程序的 Activity 之前，`Intent` 对象的构造函数会显式指定类，要么通过 `.class` 属性，要么通过字符串形式的类名。这样，系统就能找到要触发的类。这种方法称为*显式\
    \ Intent 匹配*。下一个示例展示了如何触发一个未被指定的类。相反，系统会使用一种称为*隐式 Intent 匹配*的方法来找到它。\n\n此外，Android\
    \ 内置了许多已经实现好的 Activity，例如拨号、发送短信等。本节中的示例说明了如何使用隐式匹配来触发这些内置的 Activity。应用程序界面如 图\
    \ 3-14 所示。\n\n![9781484203835_Fig03-14.jpg](img/9781484203835_Fig03-14.jpg)\n\n\
