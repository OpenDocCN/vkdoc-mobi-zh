  raw: '[Figure 2-9](#9781484203835_Ch02.xhtml#_Fig9). Interface structure of the
    activity


    You may be wondering why Android introduced this layout concept. In fact, this
    is a developer-favored feature of Android, compared to the programming interface
    of Windows Microsoft Foundation Class (MFC). The layout isolates differences in
    screen size, orientation, and other details on the device, which makes the interface
    screen adaptive to a variety of devices. So, applications running on different
    device platforms can automatically adjust the size and position of the widget
    without the need for user intervention or code modification.


    For example, the application you created can run on different Android phones,
    tablets, and television device platforms without your needing to change any code.
    The location and size of the widget are automatically adjusted. Even when you
    rotate a phone 90 degrees, the interface for portrait or landscape mode is automatically
    resized and maintained in its relative position. The layout also allows widgets
    to be arranged according to local national habits (most countries arrange them
    from left to right, but some countries arrange them from right to left). The details
    that need to be considered for the interface design are all completed by the layout.
    You can imagine what would happen if there were no layout classes—you would have
    to write code for each Android interface layout for each device. The complexity
    of this level of work is unthinkable.


    Using the View Directly as an Interface


    Earlier you saw an interface structure and code framework for activities. You
    also saw that most of the UI is implemented by the view and view subclasses. So,
    you can use the `setContentView` function to specify a view object, instead of
    a layout. The prototype of the `setContentView` function of the activity class
    includes the following.


    This function sets a layout resource as the interface of the activity:


    ```

    void setContentView(int layoutResID)

    ```


    The first type of the function sets an explicit view as the interface of the activity:


    ```

    void setContentView(View view)

    ```


    The 2^(nd) type f the function sets an explicit view as the interface of the activity,
    according to the specified format:


    ```

    setContentView(View view, ViewGroup.LayoutParams params)

    ```


    Here you work through an application example that uses the view directly as an
    activity interface, using the second function setContentView()You can modify the
    code of the `MainActivity.java` file as follows:


    ```

    ......

    import android.widget.TextView;


    public class MainActivity extends Activity {

        @Override

        public void onCreate(Bundle savedInstanceState) {

            super.onCreate(savedInstanceState);

            TextView tv = new TextView(this);    // Create a TextView Object that
    belongs to current Activity

            tv.setText("Hello My friends!");     // Set Display text of TextView

            setContentView(tv);                  // Set View as the main display of
    the Activity

    }

    ```


    The application interface is shown in [Figure 2-10](#9781484203835_Ch02.xhtml#Fig10).


    ![9781484203835_Fig02-10.jpg](images/9781484203835_Fig02-10.jpg)


    [Figure 2-10](#9781484203835_Ch02.xhtml#_Fig10). GuiExam sets the view directly
    as the interface


    In this case you have `TextView` widgets, which are direct descendant classes
    of the view, as the application interface; they are set directly in the `setContentView`
    function. This way, the text displayed by the `TextView` becomes the output of
    the application interface. To use the `TextView` class, you use an `import android.widget.TextView`
    statement at the beginning of the file to import the package of the class.


    Component ID


    Now let’s go back and look at the application layout shown in [Figure 2-6](#9781484203835_Ch02.xhtml#Fig6).
    The ID attribute of the added text-edit widget in the layout is `@ + id/editText1`,
    and the button’s ID property is `@ + id/button1` (as shown in [Figure 2-5](#9781484203835_Ch02.xhtml#Fig5)).
    What does that mean?


    Let’s look at the `R.java` file (excerpted):


    ```

    Line #    Source Code

        ......

    8 package com.example.guiexam;


    10 public final class R {

        ......

    22     public static final class id {

    23         public static final int button1=0x7f080001;

    24         public static final int editText1=0x7f080002;

    25         public static final int menu_settings=0x7f080003;

    26         public static final int textView1=0x7f080000;

    27     }

    28     public static final class layout {

    29         public static final int activity_main=0x7f030000;

    30     }

        ......

    43 }

    ```


    Compared with the `R.java` file in the “GuiExam Application” section, you can
    see that lines 23 and 24 are new; they are the resource ID number of the newly
    added button and text-edit box. The type is `int`, which corresponds to the ID
    attribute values of these widgets. From the `R.java` file, you can find the ID
    of these widgets—the static constant `R.id.button1` is the resource ID of the
    widgets (buttons) for which the ID attribute value is `@ + id/button1`, and the
    static constant `R.id.editText1` is the resource ID of the widgets (text edit)
    for which the ID attribute value is `@ + id/editText1`. What’s the reason for
    this? Let’s see.


    Android components (including widgets and activities) need to use a value of type
    `int` as a tag This value is the ID attribute value of the component tag. The
    ID attribute can only accept a value of `resources` type. That is, the value must
    start with `@`, ; for example, `@ id/abc`, `@+id/xyz`, and so on.


    The `@` symbol is used to prompt the parser for XML files to parse the name behind
    the `@`. For example, for `@string/button1`, the parser reads the `button1` value
    of this variable from `values/string.xml`.


    If the `+` symbol is used right after the `@`, it means that when you modify and
    save a layout file, the system will automatically generate the corresponding type
    `int` variables in `R.java`. The variable name is the value after the `/` symbol;
    for example, `@+id/xyz` generates `int xyz = value` in `R.java`, where the value
    is a hexadecimal number. If the same variable name `xyz` already exists in `R.java`,
    the systemdoes not generate a new variable; instead, the component uses this existing
    variable.


    In other words, if you use the `@+id/name` format and a variable named `name`
    exists in `R.java`, the component will use the value of the variable as an identifier.
    If the variable does not exist, the system adds a new variable, and the corresponding
    value for the variable is assigned (not repeated).


    Because the component’s ID attribute can be a resource ID, you can set any existing
    resource ID value: for example, `@drawable/icon`, `@string/ok`, or `@+string/`.
    Of course, you can also set a resource ID that already exists in the Android system,
    such as `@id/android:list`, in which the `android:` modifier in the ID indicates
    the package where the R class of the system is located (in the `R.java` file).
    You can enter `android.R.id` in the Java code-editing zone, which lists the corresponding
    resource ID. For example, you can set the ID property value this way.


    For the reason just described, you generally set the ID attributes of Android
    components (including widgets, activities, and so on) to the `@+id/XXX` format.
    And you use `R.id.XXX` to represent the component’s resource ID number in the
    program.


    Buttons and Events


    In the example in the section “Using Layouts as Interfaces,” you created an application
    that includes `Button`, `EditText`, and other widgets, but nothing happens when
    the button is clicked. This is because you did not assign a response to the `click`
    event. This section first introduces Android events and the basics of the listener
    functions. You review and further explore more advanced knowledge about events
    in future chapters covering Android’s multithreaded design.'
  trans: '好的，作为高级文档工程师和翻译员，我将遵循您的注意事项和示例，将给定的英文文本翻译成中文。



    图 2-9. 活动的界面结构


    您可能会好奇为什么 Android 要引入布局这个理念。实际上，相比 Windows 微软基础类库（MFC）的编程接口，这是 Android 深受开发者喜爱的一个特性。布局隔离了设备屏幕大小、方向和其他细节上的差异，使得界面屏幕能够自适应各种设备。因此，运行在不同设备平台上的应用程序可以自动调整控件的大小和位置，无需用户干预或修改代码。


    例如，您创建的应用程序可以运行在不同的 Android 手机、平板电脑和电视设备平台上，而无需您更改任何代码。控件的位置和大小会自动调整。甚至当您将手机旋转
    90 度时，竖屏或横屏模式的界面也会自动调整大小并保持其相对位置。布局还允许根据当地国家习惯来排列控件（大多数国家从左到右排列，但有些国家从右到左排列）。界面设计需要考虑的细节都由布局来完成。您可以想象一下，如果没有布局类会发生什么——您将不得不为每个设备上的每个
    Android 界面布局编写代码。这种工作量的复杂性是难以想象的。


    ## 直接使用 View 作为界面


    前面您看到了活动的界面结构和代码框架。您也看到大多数 UI 是由视图及视图子类实现的。因此，您可以使用 `setContentView` 函数来指定一个视图对象，而不是一个布局。活动类
    `setContentView` 函数的原型包括以下内容。


    该函数将一个布局资源设置为活动的界面：


    ```

    void setContentView(int layoutResID)

    ```


    第一种类型的函数将一个显式的视图设置为活动的界面：


    ```

    void setContentView(View view)

    ```


    第二种类型的函数根据指定的格式，将一个显式的视图设置为活动的界面：


    ```

    setContentView(View view, ViewGroup.LayoutParams params)

    ```


    这里我们通过一个应用程序示例来实践直接使用视图作为活动界面的方法，使用第二种函数 `setContentView()`。您可以修改 `MainActivity.java`
    文件的代码如下：


    ```

    ......

    import android.widget.TextView;


    public class MainActivity extends Activity {

        @Override

        public void onCreate(Bundle savedInstanceState) {

            super.onCreate(savedInstanceState);

            TextView tv = new TextView(this);    // 创建一个属于当前 Activity 的 TextView 对象

            tv.setText("Hello My friends!");     // 设置 TextView 的显示文本

            setContentView(tv);                  // 将 View 设置为 Activity 的主显示

    }

    ```


    应用程序界面如 图 2-10 所示。


    ![9781484203835_Fig02-10.jpg](img/9781484203835_Fig02-10.jpg)


    图 2-10. GuiExam 直接设置视图作为界面


    在这个例子中，我们将 `TextView` 控件（视图的直接子类）作为应用程序界面；它们直接被设置在 `setContentView` 函数中。这样，`TextView`
    显示的文本就成为应用程序界面的输出。要使用 `TextView` 类，您需要在文件开头使用 `import android.widget.TextView`
    语句来导入该类的包。


    ## 组件 ID


    现在，让我们回过头来看看 图 2-6 中显示的应用程序布局。布局中添加的文本编辑控件的 ID 属性是 `@+id/editText1`，按钮的 ID 属性是
    `@+id/button1`（如 图 2-5 所示）。这是什么意思呢？


    让我们看看 `R.java` 文件（节选）：


    ```

    行号    源代码

        ......

    8 package com.example.guiexam;


    10 public final class R {

        ......

    22     public static final class id {

    23         public static final int button1=0x7f080001;

    24         public static final int editText1=0x7f080002;

    25         public static final int menu_settings=0x7f080003;

    26         public static final int textView1=0x7f080000;

    27     }

    28     public static final class layout {

    29         public static final int activity_main=0x7f030000;

    30     }

        ......

    43 }

    ```


    与“GuiExam 应用程序”一节中的 `R.java` 文件相比，您可以看到第 23 和 24 行是新增的；它们是新添加的按钮和文本编辑框的资源 ID 编号。类型是
    `int`，对应于这些控件的 ID 属性值。从 `R.java` 文件中，您可以找到这些控件的 ID——静态常量 `R.id.button1` 是 ID 属性值为
    `@+id/button1` 的控件（按钮）的资源 ID，静态常量 `R.id.editText1` 是 ID 属性值为 `@+id/editText1`
    的控件（文本编辑框）的资源 ID。这是为什么呢？让我们来看看。


    Android 组件（包括控件和活动）需要使用 `int` 类型的值作为标签。这个值就是组件标签的 ID 属性值。ID 属性只能接受 `resources`
    类型的值。也就是说，这个值必须以 `@` 开头；例如，`@id/abc`、`@+id/xyz` 等等。


    `@` 符号用于提示 XML 文件的解析器解析 `@` 后面的名称。例如，对于 `@string/button1`，解析器会从 `values/string.xml`
    中读取这个变量的 `button1` 值。


    如果在 `@` 后面紧接着使用 `+` 符号，则意味着当您修改并保存布局文件时，系统会在 `R.java` 中自动生成相应的 `int` 类型变量。变量名是
    `/` 符号后面的值；例如，`@+id/xyz` 会在 `R.java` 中生成 `int xyz = value`，其中 `value` 是一个十六进制数。如果
    `R.java` 中已经存在相同的变量名 `xyz`，则系统不会生成新变量；相反，组件会使用这个已存在的变量。


    换句话说，如果您使用 `@+id/name` 格式，并且 `R.java` 中存在名为 `name` 的变量，则组件会使用该变量的值作为标识符。如果该变量不存在，系统会添加一个新变量，并为该变量分配相应的值（不重复）。


    因为组件的 ID 属性可以是一个资源 ID，所以您可以设置任何现有的资源 ID 值：例如，`@drawable/icon`、`@string/ok` 或 `@+string/`。当然，您也可以设置
    Android 系统中已存在的资源 ID，例如 `@id/android:list`，其中的 `android:` 修饰符指明了系统 R 类所在的包（在 `R.java`
    文件中）。您可以在 Java 代码编辑区输入 `android.R.id`，它会列出相应的资源 ID。例如，您可以这样设置 ID 属性值。


    基于上述原因，通常将 Android 组件（包括控件、活动等）的 ID 属性设置为 `@+id/XXX` 格式。并且在程序中使用 `R.id.XXX` 来表示该组件的资源
    ID 编号。


    ## 按钮和事件


    在“使用布局作为界面”一节的示例中，您创建了一个包含 `Button`、`EditText` 等控件的应用程序，但是点击按钮时没有任何反应。这是因为您没有为
    `click` 事件分配响应。本节首先介绍 Android 事件和监听器函数的基础知识。在后续关于 Android 多线程设计的章节中，您将回顾并进一步探索与事件相关的更高级知识。

    '
- fmt: '在 Android 中，每个应用都维护着一个事件循环。当应用启动时，它完成必要的初始化，然后进入事件循环状态，等待用户操作，例如点击触摸屏、按键（按钮）或其它输入操作。用户操作会触发程序生成对*事件*的响应；系统会根据事件位置（如`Activity`或`View`）生成并分发相应的事件类来处理。回调方法被整合到一个名为*事件监听器*的接口中。你可以通过重写该接口的抽象函数来实现指定的事件响应。


    不同类接收事件的作用域各不相同。例如，`Activity`类可以接收`keypress`事件，但不能接收`touch`事件；而`View`类既能接收`touch`事件也能接收`keypress`事件。此外，不同类接收到的事件属性细节也有所不同。例如，`View`类接收的`touch`事件包含触摸点数量、坐标值等信息，并可细分为按下、弹起和移动事件。但`View`类的子类`Button`只检测按下动作，且事件不提供触摸点坐标等信息。换句话说，`Button`处理了视图的原始事件，并将所有触摸事件整合为一个仅记录是否被*点击*的事件。


    `View`类的大部分事件响应接口都以`Listener`为后缀，因此很容易记住它们与事件监听器接口的关联。[表2-4](#9781484203835_Ch02.xhtml#Tab4)展示了一些类及其事件响应函数的示例。


    [表2-4](#9781484203835_Ch02.xhtml#_Tab4). 类及其事件响应函数示例


    | 类 | 事件 | 监听器接口与函数 |

    | --- | --- | --- |

    | `Button` | 点击 | `onClickListener`接口的`onClick()`函数 |

    | `RadioGroup` | 点击 | `onCheckChangeListener`接口的`onCheckChange()`函数 |

    | `View` | 下拉列表 | `TouchListener`接口的`onTouch()`函数 |

    | | 输入焦点变化 | `onFocusChangeListener`接口的`onFocusChange()`函数 |

    | | 按键 | `onKeyListener`接口的`onKey()`函数 |


    响应事件的流程如下：首先，定义监听器接口的实现类并重写抽象函数。其次，调用如`set ... Listener()`之类的函数。然后，将自定义监视器接口的实现类设置为对应对象的事件监听器。


    例如，你可以修改应用源码来执行事件响应。实现 Java 接口有多种编码风格。接下来的部分将讨论几种方式，这些方式下代码运行的结果是相同的。


    ## 内部类监听器


    修改`MainActivity.java`代码如下（粗体部分为新增或修改的内容）：


    ```

    行号    源代码

    1 package com.example.guiexam;

    2 import android.os.Bundle;

    3 import android.app.Activity;

    4 import android.view.Menu;

    5 import android.view.MenuItem;

    6 import android.support.v4.app.NavUtils;

    7 import android.widget.TextView;


    8 import android.widget.Button;                // 使用 Button 类


    10 import android.view.View;                  // 使用 View 类

    11 import android.view.View.OnClickListener;  // 使用 View.OnClickListener 类

    12 import android.util.Log;

    13 // 使用 Log.d 调试函数

       public class MainActivity extends Activity {

    14     private int iClkTime = 1;


    16 // Button 点击次数


    @Override

    18     public void onCreate(Bundle savedInstanceState) {

    19         super.onCreate(savedInstanceState);

    20         setContentView(R.layout.activity_main);


    22          Button btn = (Button) findViewById(R.id.button1);

    23 // 根据资源 ID 编号获取 Button 对象

    24         final String prefixPrompt ="This is No. ";

    25 // 定义并设置传递变量的值

    26         final String suffixPrompt ="time(s) that Button is clicked";


    27 // 定义并设置传递变量的值

    28         btn.setOnClickListener(new /*View.*/OnClickListener(){

    29 // 设置 Button 点击事件响应类


    31             public void onClick(View v) {

    32                 Log.d("ProgTraceInfo",prefixPrompt + (iClkTime++) + suffixPrompt);


    }

            });

        }


    @Override

        public boolean onCreateOptionsMenu(Menu menu) {

            getMenuInflater().inflate(R.menu.activity_main, menu);

            return true;

        }

    }

    ```


    在第 18-22 行，你分别根据`EditText`和`TextView`的资源 ID 获取了对应的对象。要将`OnClickListener`用作内部类，需要在变量前添加`final`修饰符。在第
    23 和 24 行，作为`Button`点击的响应代码，你首先使用`EditText.getText()`获取`EditText`的内容。由于该函数返回`Editable`类型的值，你需要通过`CharSequence.toString()`函数将`Editable`类型转换为`String`类型（`CharSequence`是`Editable`的超类）。然后，调用`TextView.setText(CharSequence
    text)`函数来刷新`TextView`的显示。


    在 Android 中，类属性的访问器函数通常以`set`/`get`开头，例如`EditText`内容的读写函数：


    ```

    Editable  getText()

    void  setText(CharSequence text, TextView.BufferType type)

    ```


    该应用的界面如[图2-11](#9781484203835_Ch02.xhtml#Fig11)所示；(a) 是启动屏幕，(b) 是在编辑文本框中输入文本后的屏幕，(c)
    是点击按钮后的应用屏幕。


    ![9781484203835_Fig02-11.jpg](images/9781484203835_Fig02-11.jpg)


    [图2-11](#9781484203835_Ch02.xhtml#_Fig11). 包含`TextView`、`Button`和`EditText`的应用界面


    ## 使用`ImageView`


    前几节讨论了小部件的典型用法，并展示了小部件编程的基本概念。图像是多媒体应用的基础，因此也是 Android 应用的主要组成部分。本节介绍图像/图片显示小部件`ImageView`的使用。通过本节中的示例，你将学习如何使用`ImageView`以及如何将文件添加到项目的资源中。


    以下示例最初是在创建`GuiExam`应用时开发的。请按照以下步骤将图片文件添加到项目中：


    1. 将图片文件（本例中为`morphing.png`）复制到相应的`/res/drawable-XXX`项目目录（用于存储不同分辨率图像项目文件的目录），如[图2-12](#9781484203835_Ch02.xhtml#Fig12)所示。


    ![9781484203835_Fig02-12.jpg](images/9781484203835_Fig02-12.jpg)


    [图2-12](#9781484203835_Ch02.xhtml#_Fig12). 将图片文件复制到项目的`res`目录中


    2. 在 Eclipse 中打开项目，按 F5 键刷新项目。你可以在 Package Explorer 中看到添加到项目中的文件（本例中为`morphing.png`），如[图2-13](#9781484203835_Ch02.xhtml#Fig13)所示。


    ![9781484203835_Fig02-13.jpg](images/9781484203835_Fig02-13.jpg)


    [图2-13](#9781484203835_Ch02.xhtml#_Fig13). 添加图像后的 Package Explorer 窗口


    要放置`ImageView`小部件到布局中，请按照以下步骤操作：'
  raw: 'In Android, each application maintains an event loop. When an application
    starts, it completes the appropriate initialization and then enters the event
    loop state, where it waits for a user action such as clicking the touch screen,
    pressing a key (a button), or some other input operation. User action triggers
    the program to generate a response to the *event*; the system generates and distributes
    the corresponding event class to handle it according to the event location, such
    as `Activity` or `View`. The callback methods are integrated into an interface
    called the *event listener*. You can achieve the specified event response by overriding
    the abstraction functions of the interface.


    The scope of the event received by different classes is different for each class.
    For example, the `Activity` class can receive `keypress` events but not `touch`
    events, whereas the `View` class can receive both `touch` and `keypress` events.
    In addition, the event attribute details received by different classes also vary.
    For example, the `touch` event received by the `View` class consists of a number
    of touch points, coordinate values, and other information. It is subdivided into
    pressing down, bouncing, and moving events. But the `Button` class, which is a
    descendent of the `View` class, only detects a pressing action, and the event
    does not provide the coordinates of touch points or other information. In other
    words, `Button` processes the original event of the view and integrates all touch
    events into one event that records whether it is *clicked* or not.


    Most of the incident-response interfaces of the `View` class use `Listener` as
    a suffix, so it is easy to remember their association with the event-listener
    interface. [Table 2-4](#9781484203835_Ch02.xhtml#Tab4) shows examples of a number
    of classes and their incident-response functions.


    [Table 2-4](#9781484203835_Ch02.xhtml#_Tab4). Examples of Classes and Their Incident-Response
    Functions


    | Class | Event | Listener Interface and Function |

    | --- | --- | --- |

    | `Button` | Click | `onClick()` function of the `onClickListener` Interface |

    | `RadioGroup` | Click | `onCheckChange()` function of the `onCheckChangeListener`
    Interface |

    | `View` | Drop-down list | `onTouch()` function of the `TouchListener` interface
    |

    | Input focus changes | `onFocusChange()` function of the `onFocusChangeListener`
    interface |

    | Button | `onKey()` function of the `onKeyListener` interface |


    The process to respond to events is as follows. First, define the implementation
    class of your listener interface and override the abstract function. Second, call
    functions such as `set ... Listener()`. Then set the implementation class of the
    custom monitor interface to the event listener of the corresponding objects.


    For example, you can modify the application source to execute an incident response.
    There are many coding styles to implement a Java interface. The next section discusses
    several ways in which the results of the code running these styles is the same.


