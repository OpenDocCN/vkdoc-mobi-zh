    The code in line 16 defines an *indirect intent* (that is, intent of implicit
    match. It is called an indirect intent because the class that needs to be triggered
    is not specified in the constructor of the object; the constructor only describes
    the function of the class that needs to be triggered to complete dialing. The
    constructor functions for the indirect intent are as follows:


    ```

    Intent(String action)

    Intent(String action, Uri uri)

    ```


    These functions require the classes (activities) that can complete the specified
    action when they are called. The only difference between the two is that the second
    function also comes with data.


    This example uses the second constructor, which requires the activity that can
    complete the dialing and extra data as a string of phone numbers. Because the
    application does not specify the trigger type, Android finds the class to handle
    this action (for example, `Activity`) from the registered class list and triggers
    the start of the event.


    If multiple classes can handle the specified action, Android pops up a selection
    menu, and users can select which one to run.


    The parameter `action` can use the system-predefined string. In the previous example,
    `Intent.ACTION_DIAL` is the string constant of `ACTION_DIAL`, which is defined
    by the `Intent` class. Some system-predefined `ACTION` examples are shown in [Table
    3-1](#9781484203835_Ch03.xhtml#Tab1).


    [Table 3-1](#9781484203835_Ch03.xhtml#_Tab1). Some System-Predefined `ACTION`
    Constants


    | ACTION Constant Name | Value | Description |

    | --- | --- | --- |

    | `ACTION_MAIN` | `android.intent.` `action.MAIN` | Start up as the initial activity
    of a task with no data input and no returned output. |

    | `ACTION_VIEW` | `android.intent.` `action.VIEW` | Display the data in the intent
    URI. |

    | `ACTION_EDIT` | `android.intent.` `action.EDIT` | Request an activity to edit
    data. |

    | `ACTION_DIAL` | `android.intent.` `action.DIAL` | Start a phone dialer, and
    use preset numbers in the data to dial. |

    | `ACTION_CALL` | `android.intent.` `action.CALL` | Initiate a phone call, and
    immediately use the number in the data URI to initiate a call. |

    | `ACTION_SEND` | `android.intent.` `action.SEND` | Start an activity to send
    specific data (the recipient is selected by activity resolution). |

    | `ACTION_SENDTO` | `android.intent.` `action.SENDTO` | Generally, start an activity
    to send a message to a contact designated in the URI. |

    | `ACTION_ANSWER` | `android.intent.` `action.ANSWER` | Open an activity to process
    an incoming call. Currently it is handled by a local phone-dialing tool. |

    | `ACTION_INSERT` | `android.intent.` `action.INSERT` | Open an activity that
    can insert a new project at the addition cursor in a specific data field. When
    it is called as the child activity, it must return the URI of the newly inserted
    project. |

    | `ACTION_DELETE` | `android.intent.` `action.DELETE` | Start an activity to delete
    a data port at the URI position. |

    | `ACTION_WEB_SEARCH` | `android.intent.` `action.WEB_SEARCH` | Open an activity,
    and run a web page search based on the text in the URI data. |


    The `ACTION` constant name is the first parameter used in the constructor of the
    implicit-match intent. The value of the `ACTION` constant, used in the `AndroidManifest.xml`
    statement of the activity that receives this action, is not used in this section,
    but is used in the next section. You can find more information about predefined
    `ACTION` values in the `android.content.Intent` help documentation.


