    \n![9781484203835_Fig03-19.jpg](images/9781484203835_Fig03-19.jpg)\n\n[Figure\
    \ 3-19](#9781484203835_Ch03.xhtml#_Fig19). New class for the custom activity of\
    \ the corresponding implicit intent\n\n5.  Edit the class file for the newly added\
    \ layout file (`TheActivityToImplicitIntent.java`), which reads as follows:\n\n\
    ```\n    Line#        Source Code\n    1  package com.example.helloandroid;\n\
    \    2  import android.os.Bundle;\n    3  import android.app.Activity;\n    4\
    \  import android.widget.Button;           // Use Button Class\n    5  import\
    \ android.view.View;               // Use View class\n    6  import android.view.View.OnClickListener;\
    \ // Use View.OnClickListener class\n\n    7  public class TheActivityToImplicitIntent\
    \ extends Activity {\n    8  @Override\n    9  public void onCreate(Bundle savedInstanceState)\
    \ {\n    10         super.onCreate(savedInstanceState);\n    11         setContentView(R.layout.implicit_act);\n\
    \    12         Button btn = (Button) findViewById(R.id.closeActivity);\n    13\
    \         btn.setOnClickListener(new /*View.*/OnClickListener(){\n    14 // Set\
    \ response code for <Close Activity> Click\n    15             public void onClick(View\
    \ v) {\n    16                 finish();\n    17             }\n    18       \
    \  });\n    19     }\n       }\n    ```\n\n6.  Modify the `AndroidManifest.xml`\
    \ file of the `HelloAndroid` custom application containing the corresponding implicit\
    \ intent, as follows:\n\n```\n    Line#        Source Code\n    1  <manifest xmlns:android=\"\
    http://schemas.android.com/apk/res/android\"\n\n    3      package=\"com.example.helloandroid\"\
    \n\n    5      android:versionCode=\"1\"\n\n    7      android:versionName=\"\
    1.0\" >\n\n    9      <uses-sdk\n    10         android:minSdkVersion=\"8\"\n\
    \    11         android:targetSdkVersion=\"15\" />\n\n    13     <application\n\
    \    14         android:icon=\"@drawable/ic_launcher\"\n    15         android:label=\"\
    @string/app_name\"\n    16         android:theme=\"@style/AppTheme\" >\n    17\
    \         <activity\n    18             android:name=\".MainActivity\"\n    19\
    \             android:label=\"@string/title_activity_main\" >\n    20        \
    \     <intent-filter>\n    21                 <action android:name=\"android.intent.action.MAIN\"\
    \ />\n\n    23                 <category android:name=\"android.intent.category.LAUNCHER\"\
    \ />\n    24             </intent-filter>\n    25         </activity>\n    26\
    \         <activity\n    27             android:name=\"TheActivityToImplicitIntent\"\
    >\n    28             <intent-filter>\n    29                 <action android:name=\"\
    android.intent.action.DEFAULT\" />\n    30                 <action android:name=\"\
    android.intent.action.EDIT\" />\n    31                 <category android:name=\"\
    android.intent.category.DEFAULT\" />\n    32             </intent-filter>\n  \
    \  33         </activity>\n           </application>\n\n</manifest>\n    ```\n\
    \nThe code in lines 24–32 (in bold) gives the activity information for receiving\
    \ the implicit intent. Line 26 specifies that you can receive an `android.intent.action.EDIT`\
    \ action. This value corresponds to the constant value of the `ACTION` parameter\
    \ `Intent.ACTION_EDIT` of the trigger’s intent constructor function (the `MainActivity`\
    \ class of `GuiExam`). This is a predetermined contact signal between the trigger\
    \ and the callee. Line 27 further specifies that the default data type can also\
    \ be received.\n\n7.  Run the application `HelloAndroid`, which now contains a\
    \ custom activity for the corresponding implicit intent and registers its `AndroidManifest.xml`\
    \ file in the system.\n\nSo far, three chapters have covered Android interface\
    \ design. The simple `GuiExam` application has demonstrated the state transition\
    \ of an activity, the `Context` class, intents, and the relationship between applications\
    \ and activities. You also learned how to use a layout as an interface and how\
    \ the button, event, and inner event listener work. Examples with multiple activities\
    \ introduced the explicit and implicit trigger mechanisms for activities. You\
    \ saw an example of an application with parameters triggered by an activity in\
    \ a different application, and you now understand the exchange mechanism for the\
    \ activity’s parameters."
