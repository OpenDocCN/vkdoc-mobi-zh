    # 第二章


    ![image](img/frontdot.jpg)


    ## Android 应用 GUI 设计，第二部分：Android 特有的 GUI


    本章描述活动的状态转换，并讨论`Context`类、意图以及应用与活动之间的关系。


    ## 活动的状态转换


    如第一章所述，活动是最重要的组件。活动有其自身的状态和转换规则，它们是理解如何编写 Android 应用的基础。


    ### 活动状态


    当活动被创建或销毁时，它们进入或退出活动栈。在此过程中，它们在四种可能的状态之间转换：


    - **活跃（Active）**：处于活跃状态的活动在栈顶时可见。通常，它是响应用户输入的前台活动。Android 将确保其以最高优先级执行。如有需要，Android
    会销毁栈中更靠下的活动，以确保为活跃活动提供所需资源。当另一个活动变为活跃时，当前活动被暂停。

    - **暂停（Paused）**：在某些情况下，活动可见但没有焦点。此时它被挂起。当前台活动是完全透明的或非全屏活动时，其下方的活动进入此状态。暂停的活动被视为活跃，但不接受用户输入事件。在极端情况下，Android
    会杀死暂停的活动以恢复资源给活跃活动。当活动完全不可见时，它变为停止状态。

    - **停止（Stopped）**：当活动不可见时，它被停止。此活动保留在内存中以保存所有状态和成员信息。但当系统需要内存时，此活动会被“移除”。当活动停止时，保存数据和当前
    UI 状态非常重要。一旦活动退出或关闭，它变为非活跃状态。

    - **非活跃（Inactive）**：当活动被杀死时，它变为非活跃状态。非活跃活动会从活动栈中移除。当你需要使用或显示该活动时，需要重新启动它。


    活动状态转换图如图 2-1 所示。


    ![9781484203835_Fig02-01.jpg](img/9781484203835_Fig02-01.jpg)


    **图 2-1 Android 活动状态转换图**


    状态变化并非人为控制，而是完全由 Android 内存管理器控制。Android 首先关闭包含非活跃活动的应用，然后是那些包含停止活动的应用。在极端情况下，它会移除暂停的活动。


    为了确保无瑕疵的用户体验，这些状态的转换对用户是不可见的。当活动从暂停、停止或非活跃状态恢复到活跃状态时，UI 必须保持一致。因此，当活动停止时，保存 UI
    状态和数据非常重要。一旦活动变为活跃，它需要恢复已保存的值。


    ## 活动的重要函数

