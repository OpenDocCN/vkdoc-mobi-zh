    Responding to Keyboard Input


    Most Android devices have a number of hardware buttons, such as Volume +, Volume
    -, Power, Home, Menu, Back, Search, and so on. Some Android devices are also equipped
    with keyboards. Keyboards, including the device’s hardware buttons, are important
    input methods for Android applications. Keyboard input corresponds to keyboard
    events, named `KeyEvent` (also known as a *pressing key event*). In this section,
    you learn about the methods to respond to keyboard input.


    In Android, both the `Activity` and `View` classes can receive pressed-key events.
    Key events trigger calls to the `onKeyDown` function of the `Activity` or `View`
    class. The function prototype is


    ```

    boolean    Activity.onKeyDown(int keyCode, KeyEvent event);

    boolean    View.onKeyDown(int keyCode, KeyEvent event);

    ```


    The `keyCode` parameter is the index code of the key that is pressed. Each key
    in Android has a unique number, which is the `keyCode`. Some of the key codes
    were described in [Table 1-1](#9781484203835_Ch01.xhtml#Tab1). The key event,
    `KeyEvent`, contains properties related to buttons, such as the frequency with
    which they are pressed. To handle key events, you need to override the `onKeyDown`
    function and add your own response-handling code.


    Interestingly, although the `Activity` and `View` classes can receive key events,
    the view is often included in the activity. When the button is pressed, the event
    first sends external activity; that is, the activity receives the event sooner.
    The following example shows how you respond to the button press by rewriting the
    activity’s `onKeyDown` function.


    This example shows how to use the arrow keys to move the circle in the application.
    The application interface is shown in [Figure 4-5](#9781484203835_Ch04.xhtml#Fig5).


    ![9781484203835_Fig04-05.jpg](images/9781484203835_Fig04-05.jpg)


    [Figure 4-5](#9781484203835_Ch04.xhtml#_Fig5). Using keys to control the movement
    of the circle in the application interface


    The Lenovo phone on which we are testing has no keypad, so we chose to run the
    application on a virtual machine. The virtual machine has Left, Down, Right, and
    Up keys to achieve these circle movements. The application startup interface is
    shown in [Figure 4-5(a)](#9781484203835_Ch04.xhtml#Fig5). Pressing the Left, Down,
    Right, or Up button makes the circle move in the corresponding direction. The
    interface examples are shown in [Figure 4-5(b)](#9781484203835_Ch04.xhtml#Fig5)
    through [(e)](#9781484203835_Ch04.xhtml#Fig5).


    This application is based on the example, created at the beginning of this chapter
    ([Figure 4-1](#9781484203835_Ch04.xhtml#Fig1)) and modified per the following
    procedure:


    4.    Modify the source code of `MyView.java` as follows:


    ```

              Line#        Source Code

