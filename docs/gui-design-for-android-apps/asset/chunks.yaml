    CHAPTER 2


    ![image](images/frontdot.jpg)


    GUI Design for Android Apps, Part 2: The Android-Specific GUI


    This chapter describes the state transitions of activities and discusses the `Context`
    class, intent, and the relationship between applications and activities.


    State Transitions of Activities


    As mentioned in [Chapter 1](#9781484203835_Ch01.xhtml), the activity is the most
    important component. Activities have their own state and transition rules, and
    they are the basis of what you need to understand to write Android applications.


    Activity States


    When activities are created or destroyed, they enter or exit the activity stack.
    And as they do, they transition among four possible states:


    *   *Active*: An activity in the active state is visible when it is on the top
    of the stack. Typically, it is the foreground activity that is responding to user
    input. Android will ensure that it executes at all costs. If required, Android
    will destroy stack activities further down to ensure required resources for the
    active activity. When another activity becomes active, this activity is paused.

    *   *Paused*: In some cases, an activity is visible but does not have focus. At
    this moment, it is suspended. When the active activity is fully transparent or
    is the non-full screen activity, the activity below reaches this state. Paused
    activities are considered active but do not accept user input events. In extreme
    cases, Android will kill a paused activity to restore resources to the active
    activity. When an activity is completely invisible, it becomes stopped.

    *   *Stopped*: When an activity is not visible, it is stopped. This activity remains
    in memory to save all state and member information. But when the system needs
    memory, this activity is “taken out and shot.” When an activity stops, it is very
    important to save the data and the current UI state. Once the activity exits or
    is closed, it becomes inactive.

    *   *Inactive*: When an activity is killed, it becomes inactive. Inactive activities
    are removed from the activity stack. When you need to use or display the activity,
    it needs to be started again.


    The activity state transition diagram is shown in [Figure 2-1](#9781484203835_Ch02.xhtml#Fig1).


    ![9781484203835_Fig02-01.jpg](images/9781484203835_Fig02-01.jpg)


    [Figure 2-1](#9781484203835_Ch02.xhtml#_Fig1). Android activity state transition
    diagram


    State change is not artificial and is controlled entirely by the Android memory
    manager. Android first closes applications that contain inactive activities, followed
    by those with stopped activities. In extreme cases, it removes paused activities.


    To ensure a flawless user experience, transition of these states is invisible
    to users. When an activity returns to active status from the paused, stopped,
    or inactive state, the UI must be nondiscriminatory. So, when an activity is stopped,
    it is very important to save the UI state and data. Once an activity becomes active,
    it needs to recover the saved values.


    Important Functions of Activities'
