  raw: "The application interface discussed so far is basically similar to a dialog\
    \ interface. The drawback of this mode is that it is difficult to obtain accurate\
    \ touchscreen input, making it difficult to display accurate images based on the\
    \ input interface. The next chapter, which covers the last part of Android interface\
    \ design, introduces the view-based interaction style interface. In this interface,\
    \ you can enter information with accurate touchscreen input and display detailed\
    \ images, as required by many game applications.\n\nCHAPTER 4\n\n![image](images/frontdot.jpg)\n\
    \nGUI Design for Android Apps, Part 4: Graphic Interface and Touchscreen Input\n\
    \nSo far, three chapters have been devoted to Android interface design. The application\
    \ interface discussed so far is similar to a dialog interface. The drawback is\
    \ that it is difficult to obtain accurate touchscreen input information, so it\
    \ is hard to display accurate images based on the input interface. This chapter\
    \ introduces the view-based interaction style interface. In this mode, you can\
    \ enter information with accurate touchscreen input and display detailed images,\
    \ which happen to be requirements for lots of game applications.\n\nDisplay Output\
    \ Framework\n\nUnlike the dialog box–style interface, which consists of `TextView`,\
    \ `EditText`, `Button`, and other window components, an interactive UI display\
    \ directly uses a `View` class. This section introduces the basic framework of\
    \ drawing in the view (that is, displaying images or graphics).\n\nTo display\
    \ images and graphics in a view, you need to put drawing code into its `onDraw`\
    \ function. The `onDraw` function is called whenever images need to be redrawn\
    \ in a view, such as when the view is displayed when the application starts, when\
    \ the front cover object (such as a view, an event, or a dialog box) on top of\
    \ the graphic view is moved away, when the view from the bottom layer is moved\
    \ into the top layer with the activity, or in similar circumstances. You’re advised\
    \ to put the drawing code in the `View.onDraw` function, so you can ensure when\
    \ the view needs to be displayed to the user. The view window can also immediately\
    \ be displayed in its total output; otherwise, certain graphic view areas may\
    \ not be refreshed or repainted.\n\nAndroid drawing functions such as draw rectangle,\
    \ draw oval, draw straight line, and display text are usually integrated into\
    \ the `Canvas` class. When the `View.onDraw` callback executes, it brings with\
    \ it a `Canvas` parameter that is used to get the `Canvas` object.\n\nAndroid\
    \ uses the `Paint` class to draw a variety of graphics. `Paint` contains a variety\
    \ of brush attributes, such as color, fill style, font, and font size.\n\nAs described\
    \ earlier in the book, the interface configuration style of the application code\
    \ generated in Eclipse is as follows: an activity includes layouts, and a layout\
    \ contains two layers of widget structures. For this reason, you set parameters\
    \ for the `setContentView` function in the `onCreate` function of the activity\
    \ as the layout to achieve this effect. To use the view-based interface, you need\
    \ to change the default parameter layout of the `setContentView` function to a\
    \ custom view class.\n\nHere is an example that illustrates the process. Modify\
    \ the `GuiExam`  example project by using the following steps:\n\n1.  Using the\
    \ same steps as in the section “Triggering an Explicit Match of Activities with\
    \ No Parameters” in [Chapter 3](#9781484203835_Ch03.xhtml), create a new class\
    \ (`MyView`), as shown in [Figure 4-1](#9781484203835_Ch04.xhtml#Fig1).\n\n![9781484203835_Fig04-01.jpg](images/9781484203835_Fig04-01.jpg)\n\
    \n[Figure 4-1](#9781484203835_Ch04.xhtml#_Fig1). Create a new class in the project\n\
    \n2.  Edit the source code of the newly added class (`MyView.java`). The content\
    \ is shown next.\n\n```\n    Line#        Source Code\n    1 package com.example.guiexam;\n\
    \n3 import android.view.View;\n    4 import android.graphics.Canvas;\n    5 import\
    \ android.graphics.Paint;\n    6 import android.content.Context;\n\n7 import android.graphics.Color;\n\
    \    8 import android.graphics.Paint.Style;\n    9 import android.graphics.Rect;\n\
    \    10 import android.graphics.Bitmap;\n    11 import android.graphics.BitmapFactory;\n\
    \    12 import android.graphics.Typeface;\n\n13 public class MyView extends View\
    \ {\n    14    MyView(Context context) {\n    15        super(context);\n    16    }\n\
    \n17    @Override\n    18    public void onDraw(Canvas canvas) {\n    19    Paint\
    \ paint = new Paint();\n    20    paint.setAntiAlias(true); //  Sett anti-aliasing\n\
    \    21 // paint.setColor(Color.BLACK);  // Set Color Black\n    22 // paint.setStyle(Style.FILL);  //\
    \ Set Fill Style\n    23    canvas.drawCircle(250, 250, 120, paint); // Draw Circle\n\
    \n24    paint.setColor(Color.RED); // Set color red\n    25    paint.setStyle(Style.STROKE);\
    \ // Set style-Stroke ( no fill)\n    26    canvas.drawRect(new Rect(10, 10, 120,\
    \ 100), paint); // draw rect\n\n27    paint.setColor(0xff0000ff /*Color.BLUE*/\
    \ );\n    28    String str = \"Hello!\";\n    29    canvas.drawText(str, 150,\
    \ 20, paint);        // display text\n\n30    paint.setTextSize(50); // Set Text\
    \ Size\n    31    paint.setTypeface(Typeface.SERIF);    // Set Typeface: Serif\n\
    \    32    paint.setUnderlineText(true); // Set Underline Text\n    33    canvas.drawText(str,\
    \ 150, 70, paint);        // Display text\n\nBitmap bitmap = BitmapFactory.\n\
    \          decodeResource(getResources(),R.drawable.ic_launcher);\n          canvas.drawBitmap(bitmap,\
    \ 0, 250, paint);   // Display image\n                }\n            }\n    ```\n\
    \nThe code in line 13 adds `extends View`, which makes a custom class; in this\
    \ case, `MyView` inherits from the `View` category. Lines 13–16 create a custom\
    \ class constructor function that calls the superclass. This constructor function\
    \ is essential to prevent the following compilation error:\n\n```\nImplicit super\
    \ constructor View() is undefined. Must explicitly invoke another constructor\n\
    ```\n\nLines 17–34 override the `View.onDraw` function to program various pieces\
    \ of drawing code. You construct a brush—that is, a `Paint` object—for drawing\
    \ in line 16, and you set it to eliminate jagged edges in line 17\\. Line 23 draws\
    \ a circle (x = 250, y = 250); line 24 sets the brush color to red, and so forth.\n\
    \nThe prototype of the `setColor` function is\n\n```\nvoid Paint.setColor(int\
    \ color);\n```\n\nIn Android, a four-byte integer is used to represent a color,\
    \ based on α, red, green, and blue. This integer data format looks like this:\n\
    \n![pg108.jpg](images/pg108.jpg)\n\nFrom left to right, the first four bytes represent\
    \ α, red, green, and blue values. For example, blue is 0xff0000ff, as is also\
    \ reflected in line 27\\. In addition, the Android `Color` class also defines\
    \ a constant for some colors, such as `BLACK`, `RED`, `GREEN`, `BLUE`, and so\
    \ on, as reflected in line 24.\n\nThe `setStyle` function sets the fill mode of\
    \ the brush. The function prototype is\n\n```\nvoid Paint.setStyle(Paint.Style\
    \ style)\n```\n\nThe parameter `style` can take `Paint.Style.STROKE` (hollow fill),\
    \ `Paint.Style.FILL` (filled), or `Paint.Style.FILL_AND_STROKE` (solid and filled).\
    \ These values are constants defined in the `Paint.Style` class; their corresponding\
    \ display styles are shown in [Table 4-1](#9781484203835_Ch04.xhtml#Tab1).\n\n\
    [Table 4-1](#9781484203835_Ch04.xhtml#_Tab1). Fill Mode Parameters and Examples\n\
    \n| Image Displayed | Graphic Function Parameter Setting |\n| --- | --- |\n| ![9781484203835_unFig04-01.jpg](images/9781484203835_unFig04-01.jpg)\
    \ | `Color=BLACK, Style=FILL` |\n| ![9781484203835_unFig04-02.jpg](images/9781484203835_unFig04-02.jpg)\
    \ | `Color=BLACK, Style=STROKE` |\n| ![9781484203835_unFig04-03.jpg](images/9781484203835_unFig04-03.jpg)\
    \ | `Color=BLACK`,`Style=FILL_AND_STROKE` |\n\n3.    Modify the main `Activity`\
    \ class (`MainActivity.java`) as follows:"
  trans: "\n# 安卓应用 GUI 设计（第四部分）：图形界面与触摸屏输入\n\n到目前为止，我们已经用了三章的篇幅来讨论安卓的界面设计。之前讨论的应用界面类似于对话框界面。这种模式的缺点在于难以获取精确的触摸屏输入信息，因此也就很难根据输入接口显示准确的图像。下一章作为安卓界面设计的最后一部分，将介绍基于视图的交互式风格界面。在这种界面中，您可以利用精确的触摸屏输入来录入信息，并显示详细的图像，这正符合许多游戏应用的需求。\n\
    \n## 显示输出框架\n\n与由 `TextView`、`EditText`、`Button` 等窗口组件构成的对话框风格界面不同，交互式 UI 显示直接使用\
    \ `View` 类。本节介绍在视图中绘图（即显示图像或图形）的基本框架。\n\n要在视图中显示图像和图形，需要将绘制代码放入其 `onDraw` 函数中。每当需要重新绘制视图中的图像时（例如，应用程序启动时视图显示、图形视图顶部的覆盖对象（如视图、事件或对话框）被移开、底层视图随\
    \ Activity 移至顶层等类似情况），都会调用 `onDraw` 函数。建议将绘制代码放在 `View.onDraw` 函数中，这样可以确保在需要向用户显示视图时，视图窗口也能立即显示其全部输出；否则，某些图形视图区域可能无法刷新或重绘。\n\
    \n安卓的绘图函数，如绘制矩形、绘制椭圆、绘制直线和显示文本，通常都集成在 `Canvas` 类中。当 `View.onDraw` 回调执行时，会携带一个\
    \ `Canvas` 参数，用于获取 `Canvas` 对象。\n\n安卓使用 `Paint` 类来绘制各种图形。`Paint` 包含了多种画笔属性，例如颜色、填充样式、字体和字体大小。\n\
    \n正如本书前面所述，在 Eclipse 中生成的应用程序代码，其界面配置风格如下：一个 Activity 包含布局，而布局又包含两层小部件结构。因此，您在\
    \ Activity 的 `onCreate` 函数中将参数设置为布局，并传递给 `setContentView` 函数，以实现这种效果。要使用基于视图的界面，您需要将\
    \ `setContentView` 函数的默认参数布局更改为自定义的视图类。\n\n以下是一个说明该过程的示例。按照以下步骤修改 `GuiExam` 示例项目：\n\
    \n1. 采用与第 3 章中“触发无参数 Activity 的显式匹配”部分相同的步骤，创建一个新类（`MyView`），如图 4-1 所示。\n\n![9781484203835_Fig04-01.jpg](img/9781484203835_Fig04-01.jpg)\n\
    \n图 4-1. 在项目中创建一个新类\n\n2. 编辑新添加的类（`MyView.java`）的源代码。内容如下所示。\n\n```\n    行号  \
    \      源代码\n    1 package com.example.guiexam;\n\n    3 import android.view.View;\n\
    \    4 import android.graphics.Canvas;\n    5 import android.graphics.Paint;\n\
    \    6 import android.content.Context;\n\n    7 import android.graphics.Color;\n\
    \    8 import android.graphics.Paint.Style;\n    9 import android.graphics.Rect;\n\
    \    10 import android.graphics.Bitmap;\n    11 import android.graphics.BitmapFactory;\n\
    \    12 import android.graphics.Typeface;\n\n    13 public class MyView extends\
    \ View {\n    14    MyView(Context context) {\n    15        super(context);\n\
    \    16    }\n\n    17    @Override\n    18    public void onDraw(Canvas canvas)\
    \ {\n    19    Paint paint = new Paint();\n    20    paint.setAntiAlias(true);\
    \ // 设置抗锯齿\n    21 // paint.setColor(Color.BLACK);  // 设置颜色为黑色\n    22 // paint.setStyle(Style.FILL);\
    \  // 设置填充样式\n    23    canvas.drawCircle(250, 250, 120, paint); // 绘制圆形\n\n \
    \   24    paint.setColor(Color.RED); // 设置颜色为红色\n    25    paint.setStyle(Style.STROKE);\
    \ // 设置样式为描边（无填充）\n    26    canvas.drawRect(new Rect(10, 10, 120, 100), paint);\
    \ // 绘制矩形\n\n    27    paint.setColor(0xff0000ff /*Color.BLUE*/ );\n    28   \
    \ String str = \"Hello!\";\n    29    canvas.drawText(str, 150, 20, paint);  \
    \      // 显示文本\n\n    30    paint.setTextSize(50); // 设置文本大小\n    31    paint.setTypeface(Typeface.SERIF);\
    \    // 设置字体：衬线体\n    32    paint.setUnderlineText(true); // 设置文本下划线\n    33 \
    \   canvas.drawText(str, 150, 70, paint);        // 显示文本\n\n    Bitmap bitmap\
    \ = BitmapFactory.\n          decodeResource(getResources(),R.drawable.ic_launcher);\n\
    \          canvas.drawBitmap(bitmap, 0, 250, paint);   // 显示图像\n             \
    \   }\n            }\n```\n\n第 13 行代码添加了 `extends View`，这使得自定义类（此处为 `MyView`）继承自\
    \ `View` 类别。第 13 至 16 行创建了一个自定义类构造函数，该函数调用父类。此构造函数对于避免以下编译错误至关重要：\n\n```\nImplicit\
    \ super constructor View() is undefined. Must explicitly invoke another constructor\n\
    ```\n\n第 17 至 34 行重写了 `View.onDraw` 函数，以编写各种绘制代码。您在第 16 行构造了一支画笔——即一个 `Paint`\
    \ 对象——并在第 17 行设置以消除锯齿。第 23 行绘制了一个圆形（x = 250, y = 250）；第 24 行将画笔颜色设置为红色，依此类推。\n\
    \n`setColor` 函数的原型是：\n\n```\nvoid Paint.setColor(int color);\n```\n\n在安卓中，使用一个四字节整数来表示颜色，基于α、红、绿、蓝。该整数数据格式如下所示：\n\
    \n![pg108.jpg](img/pg108.jpg)\n\n从左到右，前四个字节分别代表α、红、绿、蓝的值。例如，蓝色是 `0xff0000ff`，这也在第\
    \ 27 行中有所体现。此外，安卓的 `Color` 类也为某些颜色定义了常量，例如 `BLACK`、`RED`、`GREEN`、`BLUE` 等，如第 24\
    \ 行所示。\n\n`setStyle` 函数设置画笔的填充模式。函数原型是：\n\n```\nvoid Paint.setStyle(Paint.Style\
    \ style)\n```\n\n参数 `style` 可以取 `Paint.Style.STROKE`（空心填充）、`Paint.Style.FILL`（实心填充）或\
    \ `Paint.Style.FILL_AND_STROKE`（实心加描边）。这些值是在 `Paint.Style` 类中定义的常量；它们对应的显示样式如表\
    \ 4-1 所示。\n\n表 4-1. 填充模式参数及示例\n\n| 显示图像 | 图形函数参数设置 |\n| --- | --- |\n| ![9781484203835_unFig04-01.jpg](img/9781484203835_unFig04-01.jpg)\
    \ | `Color=BLACK, Style=FILL` |\n| ![9781484203835_unFig04-02.jpg](img/9781484203835_unFig04-02.jpg)\
    \ | `Color=BLACK, Style=STROKE` |\n| ![9781484203835_unFig04-03.jpg](img/9781484203835_unFig04-03.jpg)\
    \ | `Color=BLACK`, `Style=FILL_AND_STROKE` |\n\n3. 按如下方式修改主 `Activity` 类（`MainActivity.java`）：\n"
- fmt: "```java\n          Line#        Source Code\n          1 package com.example.guiexam;\n\
    \          2 import android.os.Bundle;\n          3 import android.app.Activity;\n\
    \          4 import android.view.Menu;\n          5 public class MainActivity\
    \ extends Activity {\n          6     @Override\n          7     public void onCreate(Bundle\
    \ savedInstanceState) {\n          8          super.onCreate(savedInstanceState);\n\
    \          9 //        setContentView(R.layout.activity_main);\n          10 \
    \        setContentView(new MyView(this));\n          11 }\n          12 ......\n\
    ```\n\nThe system automatically overrides the code in line 7 with the code in\
    \ line 8. This allows a custom view class instead of the default layout as the\
    \ interface of the activity.\n\nThe application interface is as shown in [Figure\
    \ 4-2](#9781484203835_Ch04.xhtml#Fig2); [(a)](#9781484203835_Ch04.xhtml#Fig2)\
    \ shows the entire interface, and [(b)](#9781484203835_Ch04.xhtml#Fig2) is the\
    \ enlarged section of the graphical display.\n\n![9781484203835_Fig04-02.jpg](images/9781484203835_Fig04-02.jpg)\n\
    \n[Figure 4-2](#9781484203835_Ch04.xhtml#_Fig2). The interface of the display\
    \ output framework of the `GuiExam` application\n\n## Drawing Framework for Responding\
    \ to Touchscreen Input\n\nThe previous example application only displays images/graphics\
    \ and cannot respond to touchscreen input. In this section, you see how to respond\
    \ to touchscreen input and control the view display.\n\n`View` has an `onTouchEvent`\
    \ function with the following function prototype:\n\n```\nboolean View.onTouchEvent(MotionEvent\
    \ event);\n```\n\nWhen a user clicks, releases, moves, or does other interactive\
    \ actions on the touchscreen, a touch input event is generated. This touch input\
    \ event triggers the call to `View.onTouchEvent`. To allow users to process touchscreen\
    \ input, you need to rewrite this function. The response code needs to be written\
    \ in the function’s body.\n\n`View.onTouchEvent` has a parameter of type `MotionEvent`\
    \ that defines the coordinate position of the touch point, event type, and so\
    \ on of the `MotionEvent` class. The event types can be `MotionEvent.ACTION_DOWN`,\
    \ `MotionEvent.ACTION_MOVE`, `MotionEvent.ACTION_UP`, or equivalent, as defined\
    \ constants in the `MotionEvent` class. The constants represent interactive actions\
    \ such as a touchscreen press, touchscreen move, touchscreen pop-up, and so on.\n\
    \nAs discussed earlier, whenever the view needs to be redrawn, the `View.onDraw`\
    \ function is called, so the drawing code needs to be put into the function. Most\
    \ of the time, the system can automatically trigger redraw events; but because\
    \ users design their own redraws, the system does not know when they need to be\
    \ triggered. For example, perhaps a user updates the display content, but the\
    \ location, size, and levels of the content are not changed; as a result, the\
    \ system does not trigger the redraw event. In this situation, the user needs\
    \ to call the class function `postInvalidate` or `invalidate` of the `View` class\
    \ to proactively generate the redraw events. The function prototype is\n\n```\n\
    void  View.invalidate(Rect dirty)\nvoid  View.invalidate(int l, int t, int r,\
    \ int b)\nvoid  View.invalidate()\nvoid  View.postInvalidate(int left, int top,\
    \ int right, int bottom)\nvoid  View.postInvalidate()\n```\n\nThe `postInvalidate`\
    \ and `invalidate` functions with no parameters redraw the entire view; the `postInvalidate`\
    \ and `invalidate` functions with parameters redraw the designated area (or certain\
    \ area) of the view. The difference between `postInvalidate` and `invalidate`\
    \ with and without constants is that the first case requires an event loop until\
    \ the next issue to produce the redraw event, whereas the second one immediately\
    \ issues a redraw.\n\nThe following example illustrates the framework of drawing\
    \ code that responds to touchscreen input. The interface of the application is\
    \ shown in [Figure 4-3](#9781484203835_Ch04.xhtml#Fig3).\n\n![9781484203835_Fig04-03.jpg](images/9781484203835_Fig04-03.jpg)\n\
    \n[Figure 4-3](#9781484203835_Ch04.xhtml#_Fig3). The interface of a `GuiExam`\
    \ input graphics framework that responds to the touchscreen\n\nThe application\
    \ starts in [Figure 4-3(a)](#9781484203835_Ch04.xhtml#Fig3). When the user clicks\
