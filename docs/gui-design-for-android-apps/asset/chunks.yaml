  raw: "Beginners tend to get confused between applications and activities—in particular,\
    \ the main activities (those that occur when the application starts). In fact,\
    \ they are two completely different objects. The behaviors, attributes, and so\
    \ forth are not the same. Following is a list of differences between applications\
    \ and activities:\n\n*   No matter how many times an application starts, as long\
    \ as it is not shut down, its value (that is, the object) is constant. It has\
    \ only one instance.\n*   No matter where an application starts, as long as it\
    \ is not closed, its value (that is, the object) is constant. It has only one\
    \ instance.\n*   When an activity is not finished, its value (that is, the object)\
    \ is constant. Each time `onStart()` is called, the activity displays on the screen\
    \ front.\n*   The objects that `startActivity` starts are different each time.\
    \ You can say that `startActivity` actually contains new objects.\n    *   Although\
    \ you cannot get a new activity object after `startActivity`, the Android framework\
    \ can send parameter values (similar to the actual parameter of the function call)\
    \ when `startActivity` starts its corresponding activity objects.\n    *   Even\
    \ more surprising is that Android can have an activity coexist in multiple objects.\
    \ When an activity is closed, Android returns the results to the main activity\
    \ started through `startActivity`. As a result, it automatically calls the `onActivityResult()`\
    \ method that starts its activity object, and random distribution can be avoided.\n\
    *   An application can have multiple objects of an activity.\n\nThe Basic Android\
    \ Application Interface\n\nIn this section, you use an example to learn about\
    \ Android development using the Android SDK integrated in the Eclipse IDE. You\
    \ create an application named GuiExam using the Android SDK and learn about the\
    \ Android interface design by following the steps of the process.\n\nGuiExam Application\
    \ Code Analysis\n\nThis section provides analysis of the GuiExam sample application.\
    \ First, let’s create the GuiExam application using the Android SDK in Eclipse.\
    \ For the application name, type `GuiExam`. For the Build SDK, choose API 19,\
    \ which includes the x86 instructions. As shown in [Figure 2-2](#9781484203835_Ch02.xhtml#Fig2),\
    \ select the system default configurations for all other entries.\n\n![9781484203835_Fig02-02.jpg](images/9781484203835_Fig02-02.jpg)\n\
    \n[Figure 2-2](#9781484203835_Ch02.xhtml#_Fig2). Initial setup when generating\
    \ the GuiExam project\n\nThe file structure of the project is shown in [Figure\
    \ 2-3](#9781484203835_Ch02.xhtml#Fig3), and the user interface is shown in [Figure\
    \ 2-4](#9781484203835_Ch02.xhtml#Fig4).\n\n![9781484203835_Fig02-03.jpg](images/9781484203835_Fig02-03.jpg)\n\
    \n[Figure 2-3](#9781484203835_Ch02.xhtml#_Fig3). File structure of the GuiExam\
    \ application\n\n![9781484203835_Fig02-04.jpg](images/9781484203835_Fig02-04.jpg)\n\
    \n[Figure 2-4](#9781484203835_Ch02.xhtml#_Fig4). The application interface of\
    \ GuiExam\n\nThe source code of the application’s only Java file (`MainActivity.java`)\
    \ is shown in [Figure 2-5](#9781484203835_Ch02.xhtml#Fig5):\n\n![9781484203835_Fig02-05.jpg](images/9781484203835_Fig02-05.jpg)\n\
    \n[Figure 2-5](#9781484203835_Ch02.xhtml#_Fig5). The typical source codes in Java\
    \ file MainActivity.java\n\nYou know the `MainActivity.OnCreate()` function is\
    \ called when the event is created. The source code of the function is very simple.\
    \ The superclass function is called in line 12, and the `setContentView` function\
    \ is called in line 13\\. This function sets the UI display of the activity. In\
    \ the Android project, most of the UI is realized by the view and view subclasses.\
    \ `View` represents a region that can handle the event and can also render this\
    \ region.\n\nThe code in line 13 indicates that the view is `R.layout.activity_main`.\
    \ The auto-generated `R.Java` file under the `gen` directory of the project includes\
    \ code such as this (excerpted):\n\n```\nLine #    Source Code\n......\n8 package\
    \ com.example.guiexam;\n\n10 public final class R {\n    ......\n26     public\
    \ static final class layout {\n27         public static final int activity_main=0x7f030000;\n\
    28     }\n29     public static final class id {\n30         public static final\
    \ int menu_settings=0x7f080000;\n31     }\n32     public static final class string\
    \ {\n33         public static final int app_name=0x7f050000;\n34         public\
    \ static final int hello_world=0x7f050001;\n35         public static final int\
    \ menu_settings=0x7f050002;\n36         public static final int title_activity_main=0x7f050003;\n\
    37    }\n    ......\n41    }\n```\n\nYou can see that `R.layout.activity_main`\
    \ is the resource ID of the main layout file `activity_main.xml`. This file reads\
    \ as follows:\n\n```\nLine#    Source Code\n1 <RelativeLayout xmlns:android=\"\
    http://schemas.android.com/apk/res/android\"\n2     xmlns:tools=\"http://schemas.android.com/tools\"\
    \n3     android:layout_width=\"match_parent\"\n4     android:layout_height=\"\
    match_parent\" >\n\n6     <TextView\n7         android:layout_width=\"wrap_content\"\
    \n8         android:layout_height=\"wrap_content\"\n9         android:layout_centerHorizontal=\"\
    true\"\n10         android:layout_centerVertical=\"true\"\n11         android:padding=\"\
    @dimen/padding_medium\"\n12         android:text=\"@string/hello_world\"\n13        \
    \ tools:context=\".MainActivity\" />14\n15 </RelativeLayout>\n```\n\nThe first\
    \ line of this code indicates that the content is a `RelativeLayout` class. By\
    \ checking the Android help documentation, you can see that the inheritance relationship\
    \ of `RelativeLayout` is\n\n```\njava.lang.Object\n    android.view.View\n    \
    \  android.view.ViewGroup\n        android.widget.RelativeLayout\n```\n\nThis\
    \ class is indeed seen as a view class. This layout contains a `TextView` class,\
    \ which is also the offspring class of the view. Line 12 indicates that its `text`\
    \ property is `@string/hello_world` and its display text is the contents of the\
    \ variable `hello_world` in `strings.xml`: “Hello world!”\n\nAs a superclass of\
    \ the layout, `ViewGroup` is a special view that can contain other view objects\
    \ or even `ViewGroup` itself. In other words, the `ViewGroup` object treats the\
    \ objects of other views or `ViewGroup`s as member variables (called *properties*\
    \ in Java). The internal view objects contained in `ViewGroup` objects are called\
    \ *widgets*. Because of the particularity of the `ViewGroup`, Android makes it\
    \ possible for a variety of complex interfaces for applications to be automatically\
    \ set.\n\nUsing Layouts as Interfaces\n\nYou can modify or design layouts as part\
    \ of the application interface design. For example, you can modify the `activity_main.xml`\
    \ file as follows:\n\n1.  Change `TextView`’s `Text` property to “Type Here”.\n\
    2.  Pick a button widget from the Form Widgets column, and drop it into the `activity_main`\
    \ screen. Set its `Text` property to “Click Me”, as shown in [Figure 2-6](#9781484203835_Ch02.xhtml#Fig6).\n\
    \n![9781484203835_Fig02-06.jpg](images/9781484203835_Fig02-06.jpg)\n\n[Figure\
    \ 2-6](#9781484203835_Ch02.xhtml#_Fig6). Modifying the GuiExam layout to add a\
    \ button\n\n3.  Drag a plain text widget from the Text Fields section of the left\
    \ column and drop it into the `activity_main` screen. Change the `Width` property\
    \ under the layout parameters branch to `fill_parent`, and then drag plain text\
    \ until it fills the entire layout, as shown in [Figure 2-7](#9781484203835_Ch02.xhtml#Fig7).\n\
    \n![9781484203835_Fig02-07.jpg](images/9781484203835_Fig02-07.jpg)\n\n[Figure\
    \ 2-7](#9781484203835_Ch02.xhtml#_Fig7). Modifying the GuiExam layout to add a\
    \ text-edit widget\n\n![9781484203835_Fig02-08.jpg](images/9781484203835_Fig02-08.jpg)\n\
    \nFigure 2-8\\. The user interface of GuiExam after the layout has been modified\n\
    \nFrom these examples, you can see the general structure of the interface. The\
    \ activity set through `setContentView` (layout file resource ID) is: the activity\
    \ contains a layout, and the layout contains various widgets, as shown in [Figure\
    \ 2-9](#9781484203835_Ch02.xhtml#Fig9).\n\n![9781484203835_Fig02-09.jpg](images/9781484203835_Fig02-09.jpg)"
  trans: "\n# 初学者困惑：应用程序与 Activity\n\n初学者往往容易混淆应用程序与 Activity——特别是主 Activity（即应用程序启动时发生的那些）。实际上，它们是两个完全不同的对象，其行为、属性等均不相同。以下是应用程序与\
    \ Activity 之间的一些区别：\n\n*   无论应用程序启动多少次，只要不被关闭，它的值（即对象）就是恒定的。它只拥有一个实例。\n*   无论应用程序从哪里启动，只要不被关闭，它的值（即对象）就是恒定的。它只拥有一个实例。\n\
    *   当一个 Activity 未结束时，它的值（即对象）是恒定的。每次调用`onStart()`时，该 Activity 都会显示在屏幕前端。\n* \
    \  `startActivity`启动的对象每次都不相同。可以说，`startActivity`实际上包含了新的对象。\n    *   虽然你在`startActivity`之后无法获取新的\
    \ Activity 对象，但 Android 框架可以在`startActivity`启动其对应的 Activity 对象时传递参数值（类似于函数调用的实际参数）。\n\
    \    *   更令人惊讶的是，Android 可以让一个 Activity 以多个对象的形式共存。当一个 Activity 关闭时，Android 会将结果返回给通过`startActivity`启动的主\
    \ Activity。因此，它会自动调用启动其 Activity 对象的`onActivityResult()`方法，从而可以避免随机分配。\n*   一个应用程序可以拥有一个\
    \ Activity 的多个对象。\n\n## 基本的 Android 应用程序界面\n\n在本节中，你将通过一个示例了解如何使用集成在 Eclipse IDE\
    \ 中的 Android SDK 进行 Android 开发。你将使用 Android SDK 创建一个名为`GuiExam`的应用程序，并通过遵循流程步骤来了解\
    \ Android 界面设计。\n\n## GuiExam 应用程序代码分析\n\n本节将对`GuiExam`示例应用程序进行分析。首先，在 Eclipse\
    \ 中使用 Android SDK 创建`GuiExam`应用程序。应用程序名称输入`GuiExam`。对于 Build SDK，选择 API 19，它包含\
    \ x86 指令。如图 2-2 所示，所有其他条目选择系统默认配置。\n\n![9781484203835_Fig02-02.jpg](img/9781484203835_Fig02-02.jpg)\n\
    \n图 2-2. 生成 GuiExam 项目时的初始设置\n\n项目的文件结构如图 2-3 所示，用户界面如图 2-4 所示。\n\n![9781484203835_Fig02-03.jpg](img/9781484203835_Fig02-03.jpg)\n\
    \n图 2-3. GuiExam 应用程序的文件结构\n\n![9781484203835_Fig02-04.jpg](img/9781484203835_Fig02-04.jpg)\n\
    \n图 2-4. GuiExam 的应用程序界面\n\n该应用程序唯一的 Java 文件（`MainActivity.java`）的源代码如图 2-5 所示：\n\
    \n![9781484203835_Fig02-05.jpg](img/9781484203835_Fig02-05.jpg)\n\n图 2-5. Java\
    \ 文件 MainActivity.java 中的典型源代码\n\n你知道，当事件被创建时会调用`MainActivity.OnCreate()`函数。该函数的源代码非常简单。第\
    \ 12 行调用了父类函数，第 13 行调用了`setContentView`函数。此函数设置了 Activity 的 UI 显示。在 Android 项目中，大多数\
    \ UI 由视图及视图子类实现。`View`代表一个可以处理事件并对该区域进行渲染的区域。\n\n第 13 行的代码表明视图是`R.layout.activity_main`。项目`gen`目录下自动生成的`R.java`文件包含如下代码（节选）：\n\
    \n```\n行号    源代码\n......\n8 package com.example.guiexam;\n\n10 public final class\
    \ R {\n    ......\n26     public static final class layout {\n27         public\
    \ static final int activity_main=0x7f030000;\n28     }\n29     public static final\
    \ class id {\n30         public static final int menu_settings=0x7f080000;\n31    \
    \ }\n32     public static final class string {\n33         public static final\
    \ int app_name=0x7f050000;\n34         public static final int hello_world=0x7f050001;\n\
    35         public static final int menu_settings=0x7f050002;\n36         public\
    \ static final int title_activity_main=0x7f050003;\n37    }\n    ......\n41    }\n\
    ```\n\n你可以看到，`R.layout.activity_main`是主布局文件`activity_main.xml`的资源 ID。该文件内容如下：\n\
    \n```\n行号    源代码\n1 <RelativeLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n2     xmlns:tools=\"http://schemas.android.com/tools\"\n3     android:layout_width=\"\
    match_parent\"\n4     android:layout_height=\"match_parent\" >\n\n6     <TextView\n\
    7         android:layout_width=\"wrap_content\"\n8         android:layout_height=\"\
    wrap_content\"\n9         android:layout_centerHorizontal=\"true\"\n10        \
    \ android:layout_centerVertical=\"true\"\n11         android:padding=\"@dimen/padding_medium\"\
    \n12         android:text=\"@string/hello_world\"\n13         tools:context=\"\
    .MainActivity\" />14\n15 </RelativeLayout>\n```\n\n这段代码的第一行表明内容是`RelativeLayout`类。通过查阅\
    \ Android 帮助文档，可以看到`RelativeLayout`的继承关系是：\n\n```\njava.lang.Object\n    android.view.View\n\
          android.view.ViewGroup\n        android.widget.RelativeLayout\n```\n\n这个类确实被视为一个视图类。该布局包含一个`TextView`类，它也是视图的子类。第\
    \ 12 行表明其`text`属性为`@string/hello_world`，其显示文本是`strings.xml`中变量`hello_world`的内容：“Hello\
    \ world!”\n\n作为布局的父类，`ViewGroup`是一种特殊的视图，它可以包含其他视图对象，甚至`ViewGroup`本身。换句话说，`ViewGroup`对象将其他视图或`ViewGroup`的对象作为成员变量（在\
    \ Java 中称为*属性*）。`ViewGroup`对象中包含的内部视图对象被称为*控件*。由于`ViewGroup`的特殊性，Android 使得应用程序的各种复杂界面能够自动设置。\n\
    \n## 使用布局作为界面\n\n你可以修改或设计布局，作为应用程序界面设计的一部分。例如，你可以如下修改`activity_main.xml`文件：\n\n\
    1.  将`TextView`的`Text`属性更改为“Type Here”。\n2.  从“Form Widgets”栏目中选取一个按钮控件，将其拖放到`activity_main`屏幕上。将其`Text`属性设置为“Click\
    \ Me”，如图 2-6 所示。\n\n![9781484203835_Fig02-06.jpg](img/9781484203835_Fig02-06.jpg)\n\
    \n图 2-6. 修改 GuiExam 布局以添加按钮\n\n3.  从左侧栏的“Text Fields”部分拖拽一个纯文本控件，并将其放入`activity_main`屏幕。将布局参数分支下的`Width`属性更改为`fill_parent`，然后拖拽纯文本直到它填满整个布局，如图\
    \ 2-7 所示。\n\n![9781484203835_Fig02-07.jpg](img/9781484203835_Fig02-07.jpg)\n\n\
    图 2-7. 修改 GuiExam 布局以添加文本编辑控件\n\n![9781484203835_Fig02-08.jpg](img/9781484203835_Fig02-08.jpg)\n\
    \n图 2-8. 布局修改后的 GuiExam 用户界面\n\n通过这些示例，你可以看到界面的一般结构。通过`setContentView`（布局文件资源\
    \ ID）设置的 Activity 是：Activity 包含一个布局，布局包含各种控件，如图 2-9 所示。\n\n![9781484203835_Fig02-09.jpg](img/9781484203835_Fig02-09.jpg)\n"
- fmt: '[Figure 2-9](#9781484203835_Ch02.xhtml#_Fig9). Interface structure of the
    activity


    You may be wondering why Android introduced this layout concept. In fact, this
    is a developer-favored feature of Android, compared to the programming interface
    of Windows Microsoft Foundation Class (MFC). The layout isolates differences in
    screen size, orientation, and other details on the device, which makes the interface
    screen adaptive to a variety of devices. So, applications running on different
    device platforms can automatically adjust the size and position of the widget
    without the need for user intervention or code modification.


    For example, the application you created can run on different Android phones,
    tablets, and television device platforms without your needing to change any code.
    The location and size of the widget are automatically adjusted. Even when you
    rotate a phone 90 degrees, the interface for portrait or landscape mode is automatically
    resized and maintained in its relative position. The layout also allows widgets
    to be arranged according to local national habits (most countries arrange them
    from left to right, but some countries arrange them from right to left). The details
    that need to be considered for the interface design are all completed by the layout.
    You can imagine what would happen if there were no layout classes—you would have
    to write code for each Android interface layout for each device. The complexity
    of this level of work is unthinkable.


    ## Using the View Directly as an Interface


    Earlier you saw an interface structure and code framework for activities. You
    also saw that most of the UI is implemented by the view and view subclasses. So,
    you can use the `setContentView` function to specify a view object, instead of
    a layout. The prototype of the `setContentView` function of the activity class
    includes the following.


    This function sets a layout resource as the interface of the activity:


    ```

    void setContentView(int layoutResID)

    ```


    The first type of the function sets an explicit view as the interface of the activity:


    ```

    void setContentView(View view)

    ```


    The 2^(nd) type of the function sets an explicit view as the interface of the
    activity, according to the specified format:


    ```

    setContentView(View view, ViewGroup.LayoutParams params)

    ```


    Here you work through an application example that uses the view directly as an
    activity interface, using the second function `setContentView()`. You can modify
    the code of the `MainActivity.java` file as follows:


    ```

    ......

    import android.widget.TextView;


    public class MainActivity extends Activity {

        @Override

        public void onCreate(Bundle savedInstanceState) {

            super.onCreate(savedInstanceState);

            TextView tv = new TextView(this);    // Create a TextView Object that
    belongs to current Activity

            tv.setText("Hello My friends!");     // Set Display text of TextView

            setContentView(tv);                  // Set View as the main display of
    the Activity

    }

    ```


    The application interface is shown in [Figure 2-10](#9781484203835_Ch02.xhtml#Fig10).


    ![9781484203835_Fig02-10.jpg](images/9781484203835_Fig02-10.jpg)


    [Figure 2-10](#9781484203835_Ch02.xhtml#_Fig10). GuiExam sets the view directly
    as the interface


    In this case you have `TextView` widgets, which are direct descendant classes
    of the view, as the application interface; they are set directly in the `setContentView`
    function. This way, the text displayed by the `TextView` becomes the output of
    the application interface. To use the `TextView` class, you use an `import android.widget.TextView`
    statement at the beginning of the file to import the package of the class.


    ## Component ID


    Now let’s go back and look at the application layout shown in [Figure 2-6](#9781484203835_Ch02.xhtml#Fig6).
    The ID attribute of the added text-edit widget in the layout is `@ + id/editText1`,
    and the button’s ID property is `@ + id/button1` (as shown in [Figure 2-5](#9781484203835_Ch02.xhtml#Fig5)).
    What does that mean?


    Let’s look at the `R.java` file (excerpted):


    ```

    Line #    Source Code

        ......

    8 package com.example.guiexam;


    10 public final class R {

        ......

    22     public static final class id {

    23         public static final int button1=0x7f080001;

    24         public static final int editText1=0x7f080002;

    25         public static final int menu_settings=0x7f080003;

    26         public static final int textView1=0x7f080000;

    27     }

    28     public static final class layout {

    29         public static final int activity_main=0x7f030000;

    30     }

        ......

    43 }

    ```


    Compared with the `R.java` file in the “GuiExam Application” section, you can
    see that lines 23 and 24 are new; they are the resource ID number of the newly
    added button and text-edit box. The type is `int`, which corresponds to the ID
    attribute values of these widgets. From the `R.java` file, you can find the ID
    of these widgets—the static constant `R.id.button1` is the resource ID of the
    widgets (buttons) for which the ID attribute value is `@ + id/button1`, and the
    static constant `R.id.editText1` is the resource ID of the widgets (text edit)
    for which the ID attribute value is `@ + id/editText1`. What’s the reason for
    this? Let’s see.


    Android components (including widgets and activities) need to use a value of type
    `int` as a tag. This value is the ID attribute value of the component tag. The
    ID attribute can only accept a value of `resources` type. That is, the value must
    start with `@`, ; for example, `@ id/abc`, `@+id/xyz`, and so on.


    The `@` symbol is used to prompt the parser for XML files to parse the name behind
    the `@`. For example, for `@string/button1`, the parser reads the `button1` value
    of this variable from `values/string.xml`.


    If the `+` symbol is used right after the `@`, it means that when you modify and
    save a layout file, the system will automatically generate the corresponding type
    `int` variables in `R.java`. The variable name is the value after the `/` symbol;
    for example, `@+id/xyz` generates `int xyz = value` in `R.java`, where the value
    is a hexadecimal number. If the same variable name `xyz` already exists in `R.java`,
    the system does not generate a new variable; instead, the component uses this
    existing variable.


    In other words, if you use the `@+id/name` format and a variable named `name`
    exists in `R.java`, the component will use the value of the variable as an identifier.
    If the variable does not exist, the system adds a new variable, and the corresponding
    value for the variable is assigned (not repeated).


    Because the component’s ID attribute can be a resource ID, you can set any existing
    resource ID value: for example, `@drawable/icon`, `@string/ok`, or `@+string/`.
    Of course, you can also set a resource ID that already exists in the Android system,
    such as `@id/android:list`, in which the `android:` modifier in the ID indicates
    the package where the R class of the system is located (in the `R.java` file).
    You can enter `android.R.id` in the Java code-editing zone, which lists the corresponding
    resource ID. For example, you can set the ID property value this way.


    For the reason just described, you generally set the ID attributes of Android
    components (including widgets, activities, and so on) to the `@+id/XXX` format.
    And you use `R.id.XXX` to represent the component’s resource ID number in the
    program.


    ## Buttons and Events


    In the example in the section “Using Layouts as Interfaces,” you created an application
    that includes `Button`, `EditText`, and other widgets, but nothing happens when
    the button is clicked. This is because you did not assign a response to the `click`
    event. This section first introduces Android events and the basics of the listener
    functions. You review and further explore more advanced knowledge about events
