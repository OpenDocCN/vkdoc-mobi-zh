  trans: "\n# Activity 生命周期与状态转换函数\n\nActivity 状态转换会触发相应 `activity` 类的函数（即 Java 方法）。Android\
    \ 会调用这些函数；开发者无需显式调用它们。这些函数被称为*状态转换函数*。您可以重写状态转换函数，使其在指定时间完成相应工作。还有一些函数用于控制 activity\
    \ 的状态。这些函数构成了 activity 编程的基础。让我们来了解这些函数。\n\n## `onCreate` 状态转换函数\n\n`onCreate`\
    \ 函数原型如下：\n\n```\nvoid  onCreate(Bundle savedInstanceState);\n```\n\n该函数在 Activity\
    \ 首次加载时运行。当您启动一个新程序时，其主 Activity 的 `onCreate` 事件会被执行。如果 Activity 被销毁（`OnDestroy`，后文会详述）后又重新加载到任务中，其\
    \ `onCreate` 事件参与者会重新执行。\n\nActivity 很可能会被强制切换到后台。（切换到后台的 Activity 对用户不再可见，但它仍然存在于任务中，例如当启动一个新的\
    \ Activity 来“覆盖”当前 Activity 时；或者用户按下 Home 键返回主屏幕时；或者当前 Activity 之上出现新 Activity\
    \ 的其他事件，如来电界面。）如果用户在一段时间后不再查看该 Activity，该 Activity 可能会随任务和进程一起被系统自动销毁。如果您再次查看该\
    \ Activity，则必须重新运行 `onCreate` 事件来初始化 Activity。\n\n有时，您可能希望用户能够从 Activity 上次打开时的操作状态继续，而不是从头开始。例如，当用户在编辑短信时突然接到电话，用户可能在通话后需要立即做其他事情，比如将来电号码保存到联系人。如果用户没有立即返回短信编辑界面，该编辑界面就会被销毁。因此，当用户返回短信程序时，可能希望从上次编辑处继续。在这种情况下，您可以重写\
    \ Activity 的 `void onSaveInstanceState(Bundle outState)` 事件，通过 `outState` 写入您希望在\
    \ Activity 状态销毁前保存的数据或信息，这样当 Activity 再次执行 `onCreate` 事件时，会通过 `savedInstanceState`\
    \ 传递之前保存的信息。此时，您可以选择性地使用这些信息来初始化 Activity，而不是从头开始。\n\n## `onStart` 状态转换函数\n\n\
    `onStart` 函数原型如下：\n\n```\nvoid onStart();\n```\n\n`onStart` 函数在 `onCreate` 事件之后，或者当前\
    \ Activity 被切换到后台后执行。当用户通过切换面板选择返回此 Activity 时，如果它尚未被销毁，且仅执行了 `onStop` 事件，那么 Activity\
    \ 会跳过 `onCreate` 事件活动，直接执行 `onStart` 事件。\n\n## `onResume` 状态转换函数\n\n`onResume`\
    \ 函数原型如下：\n\n```\nvoid onResume()\n```\n\n`onResume` 函数在 `OnStart` 事件之后，或者当前 Activity\
    \ 被切换到后台后执行。当用户再次查看此 Activity 时，如果它尚未被销毁，且 `onStop` 事件未被执行（Activity 继续存在于任务中），那么\
    \ Activity 会跳过 `onCreate` 和 `onStart` 事件活动，直接执行 `onResume` 事件。\n\n## `onPause`\
    \ 状态转换函数\n\n`onPause` 函数原型如下：\n\n```\nvoid onPause()\n```\n\n`onPause` 函数在当前 Activity\
    \ 被切换到后台时执行。\n\n## `onStop` 状态转换函数\n\n`onStop` 函数原型如下：\n\n```\nvoid onStop()\n\
    ```\n\n`onStop` 函数在 `onPause` 事件之后执行。如果用户在一段时间内不再查看该 Activity，则会执行该 Activity 的\
    \ `onStop` 事件。如果用户按下返回键，并且该 Activity 从当前任务列表中被移除，`onStop` 事件也会被执行。\n\n## `onRestart`\
    \ 状态转换函数\n\n`onRestart` 函数原型如下：\n\n```\nvoid onRestart()\n```\n\n在 `onStop` 事件执行后，如果\
    \ Activity 及其所在的进程尚未被系统销毁，或者用户再次查看该 Activity，则会执行该 Activity 的 `onRestart` 事件。`onRestart`\
    \ 事件会跳过 `onCreate` 事件活动，直接执行 `onStart` 事件。\n\n## `onDestroy` 状态转换函数\n\n`onDestroy`\
    \ 函数原型如下：\n\n```\nvoid onDestroy()\n```\n\n在 Activity 的 `onStop` 事件之后，如果用户不再查看该\
    \ Activity，则它会被销毁。\n\n## `finish` 函数\n\n`finish` 函数原型如下：\n\n```\nvoid finish()\n\
    ```\n\n`finish` 函数会关闭 Activity 并将其从栈中移除，这会导致调用 `onDestroy()` 状态转换函数。解决此问题的一种方法是让用户使用返回按钮导航到上一个\
    \ Activity。\n\n除了 Activity 切换之外，`finish` 函数还会触发 Activity 的状态转换函数，而上下文类（将在后续章节中介绍）的\
    \ `startActivity` 和 `startActivityForResult` 方法也会触发这些函数。像 `Context.startActivity`\
    \ 这样的函数也会导致 `activity` 对象的构造（即创建新的对象）。\n\n典型的触发原因及对应函数列于表 2-1。\n\n表 2-1. 触发原因及其对应函数\n\
    \n| 典型触发原因 | 执行的 Activity 对应方法 | 说明 |\n| --- | --- | --- |\n| `Context.startActivity[ForResult]()`\
    \ 注意：只要 Activity 在屏幕上显示并可见，此方法就会被调用。 | `new Activity()`<br>`onCreate()` | 完成构造函数，将\
    \ `activity` 对象保存到应用程序对象，并初始化各种控件（如 `View`）。 |\n| | `onStart()` | 类似于 `View.onDraw()`。\
    \ |\n| `Activity.finish()` | `onDestroy()` | 完成构造函数，例如从应用程序中移除 `activity` 对象。\
    \ |\n\n表 2-1 中的 `Context.startActivity` 等函数会触发三个动作：构造新的 `Activity` 对象、`onCreate`\
    \ 和 `onStart`。当一个从屏幕外移入到屏幕顶层显示的 Activity（即显示在用户面前）时，通常只包含由 `onStart` 调用的函数。\n\n\
    ## `Context` 类\n\n`Context` 类是一个需要了解的 Android 重要概念。该类继承自 `Object` 函数，其继承关系如下：\n\
    \n```\njava.lang.Object\n    android.content.Context\n```\n\n*上下文*的字面意思是邻近区域中的文本，它位于框架包中的\
    \ `android.content.Context` 中。`Context` 类是一个 `LONG` 类型，类似于 Win32 中的 `Handle` 处理器。`Context`\
    \ 提供了关于应用程序环境的全局信息接口。它是一个抽象类，其执行由 Android 系统提供。它允许访问资源以及应用程序的特征类型。同时，它可以启动应用级操作，例如启动\
    \ Activity 以及广播和接收 Intent。\n"
- fmt: "Many methods require the caller to be identified through a context instance.\
    \ For example, the first parameter of `Toast` is `Context`; and usually you use\
    \ `this` to replace the activity, which indicates that the caller’s instance is\
    \ an activity. But other methods, such as a button’s `onClick` (`View` view),\
    \ cause errors if you use `this`. In this case, you may use `ActivityName.this`\
    \ to solve the problem, because the class implements the context of several major\
    \ Android-specific models like activities, services, and broadcast receivers.\n\
    \nIf the parameter—especially the constructor parameter of the class (such as\
    \ `Dialog`)—is the `Context` type, the actual parameters are typically activity\
    \ objects, generally `[this]`. For example, the `Dialog` constructor prototype\
    \ is\n\n```\nDialog.Dialog(Context context)\n```\n\nHere’s an example:\n\n```\n\
    public class MyActivity extends Activity{\n    Dialog d = new Dialog(this);\n\
    ```\n\n`Context` is the ancestor of most classes of Android, such as broadcasting,\
    \ intents, and so on, and it provides the interface of the global information\
    \ application environment. [Table 2-2](#9781484203835_Ch02.xhtml#Tab2) lists the\
    \ important subclasses of `Context`. You can find a detailed description in the\
    \ help documentation for the Android `Context` class.\n\n[Table 2-2](#9781484203835_Ch02.xhtml#_Tab2).\
    \ Important Subclasses of `Context`\n\n| Subclass | Explanation |\n| --- | ---\
    \ |\n| `Activity` | User-friendly interface class |\n| `Application` | Base class\
    \ that provides global application state maintenance |\n| `IntentService` | Base\
    \ class used to handle asynchronous requests for the service (expressed in an\
    \ `Intent` way) |\n| `Service` | A component of the application that represents\
    \ either a time-consuming operation that has no interaction with the user or a\
    \ task that provides functionality for other application tasks |\n\nClasses are\
    \ called *offspring classes* because they are direct or indirect subclasses of\
    \ `Context` and have an inheritance relationship like activities:\n\n```\njava.lang.Object\n\
    \    android.content.Context\n      android.content.ContextWrapper\n        android.view.ContextThemeWrapper\n\
    \          android.app.Activity\n```\n\n`Context` can be used for many operations\
    \ in Android, but its main function is to load and access resources. There are\
    \ two commonly used contexts: the application context and the activity context.\
    \ The activity context is usually passed between a variety of classes and methods,\
    \ similar to the code of `onCreate` for an activity, as follows:\n\n```\nprotected\
    \ void onCreate(Bundle state) {\n    super.onCreate(state);\n    TextView label\
    \ = new TextView(this); // Pass context to view control\n    setContentView(label);\n\
    }\n```\n\nWhen the activity context is passed to the view, it means that view\
    \ has a reference pointed to an activity and references resources taken by the\
    \ activity: view hierarchy, resource, and so on.\n\nYou can also use the application\
    \ context, which always accompanies the application’s life but has nothing to\
    \ do with the activity life cycle. The application context can be acquired with\
    \ the `Context.getApplicationContext` or `Activity.getApplication` method.\n\n\
    Java usually uses a static variable (singleton and the like) to synchronize states\
    \ between activities (between classes inside a program). Android’s more reliable\
    \ approach is to use the application context to associate these states.\n\nEach\
    \ activity has a context, which contains the runtime state. Similarly, an application\
    \ has a context that Android uses to ensure that it is the only instance of that\
    \ context.\n\nIf you need to make a custom application context, first you must\
    \ define a custom class that inherits from `android.app.Application`; then describe\
    \ the class in the application’s `AndroidManifest.xml` file. Android automatically\
    \ creates an instance of this class. By using the `Context.getApplicationContext()`\
    \ method, you can get the application context inside each activity. The following\
    \ example code gets the application context in the activity:\n\n```\nclass MyApp\
    \ extends Application {\n// MyApp is a custom class inherited from android.app.Application\n\
    \    public String aCertainFunc () {\n        ......\n    }\n}\n\nclass Blah extends\
    \ Activity {\n      public void onCreate(Bundle b){\n        ... ...\n      MyApp\
    \ appState = ((MyApp)getApplicationContext());\n// Get Application Context\n \
    \       appState.aCertainFunc();\n//Use properties and methods of the application\n\
    \        ... ...\n      }\n}\n```\n\nYou can get global information about the\
    \ application environment using the `get` function of `Context`. The main functions\
    \ are shown in [Table 2-3](#9781484203835_Ch02.xhtml#Tab3) and are either `ContextWrapper`\
    \ or direct context methods.\n\n[Table 2-3](#9781484203835_Ch02.xhtml#_Tab3).\
    \ Commonly Used Methods for Obtaining Context\n\n| Function Prototype | Function\
    \ |\n| --- | --- |\n| `abstract Context ContextWrapper.getApplicationContext ()`\
    \ | Returns the current process corresponding to the global context of a single\
    \ application. |\n| `abstract ApplicationInfo ContextWrapper.getApplicationInfo\
    \ ()` | Returns the context package corresponding to the information of the entire\
    \ application. |\n| `abstract ContentResolver ContextWrapper.getContentResolver\
    \ ()` | Returns the content-resolver instance of the corresponding application\
    \ package. |\n| `abstract PackageManager ContextWrapper.getPackageManager ()`\
    \ | Returns the package-manager instance for finding all package information.\
    \ |\n| `abstract String ContextWrapper.getPackageName ()` | Returns the current\
    \ package name. |\n| `abstract Resources ContextWrapper.getResources ()` | Returns\
    \ the resource instance of the (user) application package. |\n| `abstract SharedPreferences\
    \ ContextWrapper.getSharedPreferences (String name, int mode)` | Finds and holds\
    \ the contents of the preference file whose name is specified by the parameter\
    \ name. Returns the value of the shared preferences (`SharedPreferences`) that\
    \ you can find and modify. When using a proper name, only one instance of `SharedPreferences`\
    \ is returned to the caller, which means once the changes are complete, the results\
    \ are shared with each other. |\n| `public final String Context.getString (int\
    \ resId)` | Returns a localized string from the application package’s default\
    \ string table. |\n| `abstract Object ContextWrapper.getSystemService (String\
    \ name)` | Returns processing system-level services according to the name specified\
    \ by the variable name. The returned object classes vary based on the name of\
    \ the request. |\n\n## Introduction to Intent\n\n`Intent` can be used as a message-passing\
    \ mechanism to allow you to declare intent to take an action, usually with specific\
    \ data. You can use intent to implement interaction between components of any\
    \ application on Android devices. `Intent` turns a group of independent components\
    \ into systems with one-to-one interactions.\n\nIt can also be used to broadcast\
    \ messages. Any application can register a broadcast receiver to listen and respond\
    \ to these intent broadcasts. `Intent` can be used to create internal, system,\
    \ or third-party event-driven applications.\n\n`Intent` is responsible for the\
    \ description of an operation and the action data of the application. Android\
    \ is responsible for finding the corresponding component described under the sub-intent,\
    \ passing intent to the component being called, and completing the component calls.\
    \ `Intent` plays the decoupling role between the caller and the one who is called."
  raw: 'Many methods require the caller to be identified through a context instance.
    For example, the first parameter of `Toast` is `Context`; and usually you use
    `this` to replace the activity, which indicates that the caller’s instance is
    an activity. But other methods, such as a button’s `onClick` (`View` view), cause
    errors if you use `this`. In this case, you may use `ActivityName.this` to solve
    the problem, because the class implements the context of several major Android-specific
    models like activities, services, and broadcast receivers.


    If the parameter—especially the constructor parameter of the class (such as `Dialog`)—is
    the `Context` type, the actual parameters are typically activity objects, generally
    `[this]`. For example, the `Dialog` constructor prototype is


    ```

    Dialog.Dialog(Context context)

    ```


    Here’s an example:


    ```

    public class MyActivity extends Activity{

        Dialog d = new Dialog(this);

    ```


    `Context` is the ancestor of most classes of Android, such as broadcasting, intents,
    and so on, and it provides the interface of the global information application
    environment. [Table 2-2](#9781484203835_Ch02.xhtml#Tab2) lists the important subclasses
    of `Context`. You can find a detailed description in the help documentation for
    the Android `Context` class.


    [Table 2-2](#9781484203835_Ch02.xhtml#_Tab2). Important Subclasses of *Context*


    | Subclass | Explanation |

    | --- | --- |

    | `Activity` | User-friendly interface class |

    | `Application` | Base class that provides global application state maintenance
    |

    | `IntentService` | Base class used to handle asynchronous requests for the service
    (expressed in an `Intent` way) |

    | `Service` | A component of the application that represents either a time-consuming
    operation that has no interaction with the user or a task that provides functionality
    for other application tasks |


    Classes are called *offspring classes* because they are direct or indirect subclasses
    of `Context` and have an inheritance relationship like activities:


    ```

    java.lang.Object

        android.content.Context

          android.content.ContextWrapper

            android.view.ContextThemeWrapper

              android.app.Activity

    ```


    `Context` can be used for many operations in Android, but it main function is
    to load and access resources. There are two commonly used contexts: the application
    context and the activity context. The activity context is usually passed between
    a variety of classes and methods, similar to the code of `onCreate` for an activity,
    as follows:


    ```

    protected void onCreate(Bundle state) {

        super.onCreate(state);

        TextView label = new TextView(this); // Pass context to view control

        setContentView(label);

    }

    ```


    When the activity context is passed to the view, it means that view has a reference
    pointed to an activity and references resources taken by the activity: view hierarchy,
    resource, and so on.


    You can also use the application context, which always accompanies the application’s
    life but has nothing to do with the activity life cycle. The application context
    can be acquired with the `Context.getApplicationContext` or `Activity.getApplication`
    method.


    Java usually uses a static variable (singleton and the like) to synchronize states
    between activities (between classes inside a program). Android’s more reliable
    approach is to use the application context to associate these states.


    Each activity has a context, which contains the runtime state. Similarly, an application
    has a context that Android uses to ensure that it is the only instance of that
    context.


    If you need to make a custom application context, first you must define a custom
    class that inherits from `android.app.Application`; then describe the class in
    the application’s `AndroidManifest.xml` file. Android automatically creates an
    instance of this class. By using the `Context.getApplicationContext()` method,
    you can get the application context inside each activity. The following example
    code gets the application context in the activity:


    ```

    class MyApp extends Application {

    // MyApp is a custom class inherited from android.app.Application

        public String aCertainFunc () {

            ......

        }

    }


    class Blah extends Activity {

          public void onCreate(Bundle b){

            ... ...

          MyApp appState = ((MyApp)getApplicationContext());

    // Get Application Context

            appState.aCertainFunc();

    //Use properties and methods of the application

            ... ...

          }

    }

    ```


    You can get global information about the application environment using the `get`
    function of `Context`. The main functions are shown in [Table 2-3](#9781484203835_Ch02.xhtml#Tab3)
    and are either `ContextWrapper` or direct context methods.


    [Table 2-3](#9781484203835_Ch02.xhtml#_Tab3). Commonly Used Methods for Obtaining
    Context


    | Function Prototype | Function |

    | --- | --- |

    | `abstract Context ContextWrapper.getApplicationContext ()` | Returns the current
    process corresponding to the global context of a single application. |

    | `abstract ApplicationInfo ContextWrapper.getApplicationInfo ()` | Returns the
    context package corresponding to the information of the entire application. |

    | `abstract ContentResolver ContextWrapper.getContentResolver ()` | Returns the
    content-resolver instance of the corresponding application package. |

    | `abstract PackageManager ContextWrapper.getPackageManager ()` | Returns the
    package-manager instance for finding all package information. |

    | `abstract String ContextWrapper.getPackageName ()` | Returns the current package
    name. |

    | `abstract Resources ContextWrapper.getResources ()` | Returns the resource instance
    of the (user) application package. |

    | `abstract SharedPreferences ContextWrapper.getSharedPreferences (String name,
    int mode)` | Finds and holds the contents of the preference file whose name is
    specified by the parameter name. Returns the value of the shared preferences (`SharedPreferences`)
    that you can find and modify. When using a proper name, only one instance of `SharedPreferences`
    is returned to the caller, which means once the changes are complete, the results
    are shared with each other. |

    | `public final String Context.getString (int resId)` | Returns a localized string
    from the application package’s default string table. |

    | `abstract Object ContextWrapper.getSystemService (String name)` | Returns processing
    system-level services according to the name specified by the variable name. The
    returned object classes vary based on the name of the request. |


    Introduction to Intent


    *Intent* can be used as a message-passing mechanism to allow you to declare intent
    to take an action, usually with specific data. You can use intent to implement
    interaction between components of any application on Android devices. Intent turns
    a group of independent components into systems with one-to-one interactions.


    It can also be used to broadcast messages. Any application can register a broadcast
    receiver to listen and respond to these intent broadcasts. Intent can be used
    to create internal, system, or third-party event-driven applications.


    Intent is responsible for the description of an operation and the action data
    of the application. Android is responsible for finding the corresponding component
    described under the sub-intent, passing intent to the component being called,
    and completing the component calls. Intent plays the decoupling role between the
    caller and the one who is called.'
  trans: "\n许多方法需要通过上下文实例来识别调用者。例如，`Toast`的第一个参数是`Context`；通常你会使用`this`来代替活动（Activity），这表明调用者的实例是一个活动。但其他方法，例如按钮的`onClick`（`View`\
    \ view），如果使用`this`会导致错误。在这种情况下，你可以使用`ActivityName.this`来解决此问题，因为该类实现了几个主要的 Android\
    \ 特定模型的上下文，例如活动、服务和广播接收器。\n\n如果参数——特别是类的构造函数参数（如`Dialog`）——是`Context`类型，那么实际参数通常是活动对象，一般来说是`[this]`。例如，`Dialog`构造函数的原型是\n\
    \n```\nDialog.Dialog(Context context)\n```\n\n示例如下：\n\n```\npublic class MyActivity\
    \ extends Activity{\n    Dialog d = new Dialog(this);\n```\n\n`Context`是 Android\
    \ 大多数类的祖先，例如广播、意图等，它提供了全局信息应用环境的接口。表 2-2 列出了`Context`的重要子类。你可以在 Android `Context`类的帮助文档中找到详细描述。\n\
    \n表 2-2. `Context`的重要子类\n\n| 子类 | 说明 |\n| --- | --- |\n| `Activity` | 用户友好的界面类\
    \ |\n| `Application` | 提供全局应用状态维护的基类 |\n| `IntentService` | 用于处理服务的异步请求（以`Intent`方式表示）的基类\
    \ |\n| `Service` | 应用程序的一个组件，代表要么是与用户无交互的耗时操作，要么是为其他应用程序任务提供功能的任务 |\n\n这些类被称为*后代类*，因为它们是`Context`的直接或间接子类，并具有像活动一样的继承关系：\n\
    \n```\njava.lang.Object\n    android.content.Context\n      android.content.ContextWrapper\n\
    \        android.view.ContextThemeWrapper\n          android.app.Activity\n```\n\
    \n`Context`可用于 Android 中的许多操作，但其主要功能是加载和访问资源。有两种常用的上下文：应用上下文和活动上下文。活动上下文通常在各类和方法之间传递，类似于活动的`onCreate`代码，如下所示：\n\
    \n```\nprotected void onCreate(Bundle state) {\n    super.onCreate(state);\n \
    \   TextView label = new TextView(this); // 将上下文传递给视图控件\n    setContentView(label);\n\
    }\n```\n\n当活动上下文被传递给视图时，意味着该视图拥有一个指向活动的引用，并引用了该活动占用的资源：视图层次结构、资源等。\n\n你也可以使用应用上下文，它始终伴随应用程序的生命周期，但与活动生命周期无关。应用上下文可以通过`Context.getApplicationContext`或`Activity.getApplication`方法获取。\n\
    \nJava 通常使用静态变量（单例等）在活动之间（程序内部的类之间）同步状态。Android 更可靠的方法是使用应用上下文来关联这些状态。\n\n每个活动都有一个上下文，其中包含运行时状态。同样，应用程序也有一个上下文，Android\
    \ 用它来确保该上下文是唯一的实例。\n\n如果你需要自定义应用上下文，首先必须定义一个继承自`android.app.Application`的自定义类；然后在应用的`AndroidManifest.xml`文件中描述这个类。Android\
    \ 会自动创建该类的实例。通过使用`Context.getApplicationContext()`方法，你可以在每个活动内部获取应用上下文。以下示例代码演示了如何在活动中获取应用上下文：\n\
    \n```\nclass MyApp extends Application {\n// MyApp 是一个继承自 android.app.Application\
    \ 的自定义类\n    public String aCertainFunc () {\n        ......\n    }\n}\n\nclass\
    \ Blah extends Activity {\n      public void onCreate(Bundle b){\n        ...\
    \ ...\n      MyApp appState = ((MyApp)getApplicationContext());\n// 获取应用上下文\n\
    \        appState.aCertainFunc();\n//使用应用的属性和方法\n        ... ...\n      }\n}\n\
    ```\n\n你可以使用`Context`的`get`函数获取应用环境的全局信息。主要函数如表 2-3 所示，它们要么是`ContextWrapper`的方法，要么是直接上下文的方法。\n\
    \n表 2-3. 获取上下文的常用方法\n\n| 函数原型 | 功能 |\n| --- | --- |\n| `abstract Context ContextWrapper.getApplicationContext\
    \ ()` | 返回当前进程对应的单个应用的全局上下文。 |\n| `abstract ApplicationInfo ContextWrapper.getApplicationInfo\
    \ ()` | 返回上下文包对应的整个应用的信息。 |\n| `abstract ContentResolver ContextWrapper.getContentResolver\
    \ ()` | 返回对应应用包的内容解析器实例。 |\n| `abstract PackageManager ContextWrapper.getPackageManager\
    \ ()` | 返回用于查找所有包信息的包管理器实例。 |\n| `abstract String ContextWrapper.getPackageName\
    \ ()` | 返回当前包名。 |\n| `abstract Resources ContextWrapper.getResources ()` | 返回（用户）应用包的资源实例。\
    \ |\n| `abstract SharedPreferences ContextWrapper.getSharedPreferences (String\
    \ name, int mode)` | 查找并保存由参数 name 指定名称的首选项文件的内容。返回你可以查找和修改的共享首选项（`SharedPreferences`）的值。使用正确的名称时，只会向调用者返回一个`SharedPreferences`实例，这意味着一旦修改完成，结果将在各调用者之间共享。\
    \ |\n| `public final String Context.getString (int resId)` | 从应用包的默认字符串表中返回本地化的字符串。\
    \ |\n| `abstract Object ContextWrapper.getSystemService (String name)` | 根据变量\
    \ name 指定的名称返回处理系统级服务的对象。返回的对象类因请求的名称而异。 |\n\n## Intent 介绍\n\n`Intent` 可以作为一种消息传递机制，允许你声明执行某项操作的意图，通常带有特定数据。你可以使用意图来实现\
    \ Android 设备上任何应用组件之间的交互。`Intent` 将一组独立的组件转化为具有一对一交互的系统。\n\n它也可用于广播消息。任何应用都可以注册广播接收器来监听并响应这些意图广播。`Intent`\
    \ 可用于创建内部、系统或第三方事件驱动的应用程序。\n\n`Intent` 负责描述一个操作以及该操作的应用数据。Android 负责在子意图描述下找到相应的组件，将意图传递给被调用的组件，并完成组件调用。`Intent`\
    \ 在调用者和被调用者之间起到了解耦作用。\n"
- fmt: '```markdown

    `Intent` is a mechanism of runtime binding; it can connect two different components
    in the process of running the program. Through `intent`, the program can request
    or express willingness to Android; Android selects the appropriate components
    to handle the request based on the contents of the `intent`. For example, suppose
    an activity wants to open a web browser to view the content of a page; this activity
    only needs to issue a `WEB_SEARCH_ACTION` request to Android. Based on the content
    request, Android will check the intent filter declared in the component registration
    statement and find an activity for a web browser.


    When an `intent` is issued, Android finds one or more exact matches for the activity,
    service, or `broadcastReceiver` as a response. Therefore, different types of intent
    messages do not overlap and are not simultaneously sent to an activity or service,
    because `startActivity()` messages can be sent only to an activity and `startService()`
    intents can only be sent to a service.


    ## The Main Roles of Intent


    The main roles of `intent` are as follows.


    ### Triggering a New Activity or Letting an Existing Activity Implement the New
    Operation


    In Android, `intent` directly interacts with the activity. The most common use
    of `intent` is to bind application components. `Intent` is used to start, stop,
    and transfer application activities. In other words, `intent` can activate a new
    activity or make an existing activity perform a new operation. This can be accomplished
    by calling the `Context.startActivity()` or `Context.startActivityForResult()`
    method.


    To open a different interface (corresponding to an activity) in an application,
    you call the `Context.startActivity()` function to pass an `intent`. `Intent`
    can either explicitly specify a specific class to open or include an action required
    to achieve the goals. In the latter case, the runtime will choose which activity
    to open, using a well-known process of intent resolution in which the `Context.startActivity()`
    finds and starts a single activity that best matches the `intent`.


    ### Triggering a New Service or Sending New Requests to Existing Services


    Opening a service or sending a request to an existing service is also completed
    by the `intent` class.


    ### Trigger BroadcastReceiver


    You can send `BroadcastIntent` using three different methods: `Context.sendBroadcast()`,
    `Context.sendOrderedBroadcast()`, and `Context.sendStickyBroadcast()`.


    ## Intent Resolution


    The intent transfer process has two ways to match target consumers (such as another
    activity, `IntentReceiver`, or service) with the respondents of the `intent`.


    The first is *explicit matching*, also known as *direct intent*. When constructing
    an `intent` object, you must specify the recipient as one of the `intent`’s component
    properties (by calling `setComponent(ComponentName)` or `setClass(Context, Class)`).
    By specifying a component class, the application notification starts the corresponding
    components. This method is similar to an ordinary function call but varies in
    the reuse of the granularity.


    The second is *implicit matching*, also known as *indirect intent*. The sender
    of the `intent` does not know or care who the recipient is when constructing an
    `intent` object. The attribute is not specified in the component intent. This
    intent needs to contain sufficient information so that the system can determine
    which components to use out of all those available to meet this intent. This method
    differs significantly from function calls and helps to reduce coupling between
    the sender and receiver. Implicit matching resolves to a single activity. If there
    are multiple activities that can implement a given action based on particular
    data, Android selects the best one to start.


    For direct intent, Android does not need to do parsing because the target component
    is very clear. However, Android needs to resolve indirect intent. Through analysis,
    it maps the indirect intent to the activity, `IntentReceiver`, or service that
    processes the intent.


    The mechanism of intent resolution mainly consists of the following:


    *   Looking for all `<intent-filter>`s and the intent defined by those filters,
    which are registered in `AndroidManifest.xml`

    *   Finding and handling the component of the intent through `PackageManager`
    (`PackageManager` can get information about the application package installed
    on the current device)


    Intent filters are very important. A non-declared `<intent-filter>` component
    can only respond to explicit intent requests that the component name matches,
    but it cannot respond to implicit intent requests. A declared `<intent-filter>`
    component can respond to either explicit intent or implicit intent requests. When
    resolving implicit intent requests, Android uses three attributes of the intent—action,
    type, and category—to make the resolution. The specific resolution methods are
    described next.


    ### Action Test


    A `<intent-filter>` element should contain at least one `<action>`, or no intent
    requests can be matched to the `<intent-filter>`. If the action requested by an
    intent has at least one match of an `<action>` in `<intent-filter>`, then the
    intent passed the action test of this `<intent-filter>`.


    If there is no description of a specific action type in the intent request or
    `<intent-filter>`, then one of the two following tests applies:


    *   If `<intent-filter>` does not contain any action type, regardless of what
    the intent requests are, there is no match to this `<intent-filter>`.

    *   If the intent request has no set action type, as long as the `<intent-filter>`
    contains an action type, this intent request will successfully pass the action
    test of `<intent-filter>`.


    ### Category Test


    For an intent to pass the category test, every category in the Intent must match
    a category in the filter. When every category of intent requests have exact matches
    with the `<category>` of one `<intent-filter>` of the components the intent request
    pass the test. The excess `<category>` declaration of `<intent-filter>` does not
    cause the match failure. Any `<intent-filter>` that does not specify a category
    test only matches intent requests that the configuration is not set for.


    ### Data Test


    The `<data>` element specifies a data URI and data type of the intent request
    that you want to receive. A URI is divided into three parts that match: scheme,
    authority, and path. The URI data type and scheme of the Internet request set
    by `setData()` must be the same as specified in `<intent-filter>`. If `<intent-filter>`
    also specifies authority or path, they have to match to pass the test.


    This decision process can be expressed as follows:


    *   If the intent specifies the action, then the action list of the `<intent-filter>`
    of the target component must contain this action. Otherwise, it is not considered
    matched.

    *   If the intent does not provide a type, the system gets the data types from
    the data. And for some action methods, the target component’s data-type list must
    contain the data type of the intent. Otherwise it cannot be matched.

    *   If the data for the intent is not the URI of the content, and the category
    and intent also do not specify its type, the matching is based on the data scheme
    of the intent (for instance, `http:` or `mailto:`), and the intent’s scheme must
    appear in the scheme list of the target component.

    *   If the intent specifies one or more categories, these categories must all
    appear in the category list of the component. For instance, if the intent contains
    two categories, `LAUNCHER_CATEGORY` and `ALTERNATIVE_CATEGORY`, the target component
    obtained by the parsing must contain at least these two categories.


    ## The Relationship between Applications and Activities

