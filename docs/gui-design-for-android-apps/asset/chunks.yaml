    the user clicks inside a circle (touches the screen within the circle area), the
    color of the circle changes: it cycles through black, red, green, and blue, as
    shown in [Figure 4-3(a)](#9781484203835_Ch04.xhtml#Fig3)–[(d)](#9781484203835_Ch04.xhtml#Fig3).
    If you click outside the circle, the circle does not change colors.


