    59             case KeyEvent.KEYCODE_DPAD_UP:

    60                 vertical = 1;

    61                 break;

    62             case KeyEvent.KEYCODE_DPAD_DOWN:

    63                 vertical = -1;

    64                 break;

    65             case KeyEvent.KEYCODE_BACK:

    66                 if (event.getRepeatCount() == 0) {

    67                     dlgExitApp.show();

    68 // Display AlertDialog.Builder dialog box

    69                 }

    70                 break;

    71             default:

    72                 super.onKeyDown(keyCode, event);

               }

               if (!(horizon == 0 && vertical == 0))

                   theView.moveCircleByPressKey(horizon,vertical);

               return true;

           }

       }

    ```


    Lines 11 and 12 define the `AlertDialog.Builder` class and its associated variable
    for the `Dialog` class in the `Activity` class. You modify the `onCreate` function
    code in lines 18–36 and define the code to prepare the dialog box. In line 18,
    you construct the `AlertDialog.Builder` class object; the prototype of this constructor
    function is


    ```

    AlertDialog.Builder(Context context)

    AlertDialog.Builder(Context context, int theme)

    ```


    You use the first prototype in this example to pass the `Activity` object, which
    constructs the dialog box as the context of the constructor function. This is
    followed by setting the title display text, icons, and other attributes of the
    dialog box in lines 19 and 21.


    The `AlertDialog.Builder` dialog box can take up to three buttons: left, middle,
    and right. They are set up by the `setPositiveButton`, `setNeutralButton`, and
    `setNegativeButton` functions, respectively. You can specify how many dialog box
    buttons you need. This example uses two buttons: left and right.


    Lines 23–29 set the left button of the dialog box and click-response code. The
    prototype of the `setPositiveButton` function of the `AlertDialog.Builder` class
    is


    ```

    AlertDialog.Builder  setPositiveButton(int textId, DialogInterface.OnClickListener
    listener)

    AlertDialog.Builder  setPositiveButton(CharSequence text, DialogInterface.OnClickListener
    listener)

    ```


    You use a second prototype in the example, where the first parameter is text displayed
    by the button, and the second parameter is the interface object of the click response.


    In line 25, you first call the dismissal or cancel function of the `DialogInterface`
    class to close the dialog box. `DialogInterface` is the operating interface of
    the dialog class (`AlertDialog`, `Dialog`, and so on). You use the `dismiss` function
    to close the dialog box in line 25 and use a `cancel` function to close the dialog
    box in line 33.


    Lines 26–27 close the activity and application, as described in the section “Exit
    Activities and Application.” in [Chapter 2](#9781484203835_Ch02.xhtml), [Figure
    2-16](#9781484203835_Ch02.xhtml#Fig16). Interestingly, the internal class `DialogInterface.OnClickListener`
    uses a member function of the non-dot external class `MainActivity` and does not
    need to add the prefix in front of “class name.”


    You set the dialog box for the right button and click-response code in lines 36–35\.
    The click-response code is relatively simple, using the `cancel` function of the
    `DialogInterface` class to close the dialog box in line 33.


    Finally, line 36 calls the `create` function of the `AlertDialog.Builder` class
    to create the exit dialog box object `dlgExitApp`. The function returns an `AlertDialog`
    object, and its prototype is


    ```

    AlertDialog  create()

    ```


    Because `AlertDialog` is derived from the `Dialog` class, the return value can
    be assigned to the `Dialog` variable.


    You add the Back key response code for the `OnKeyDown` response function on lines
    60–64\. The code is relatively simple: you determine whether duplicate keys are
    pressed on line 61, and then you call the `show` function of the `Dialog` class
    to display a dialog box.


    Application Property Settings


    In Android device, there are two difference places where you can find out the
    information about the applications installed. One is the menu list (the interface
    after you press the setting button), the other is by going to the Settings ![image](images/arrow.jpg)
    Applications ![image](images/arrow.jpg)  Manage Applications ![image](images/arrow.jpg)
    Downloaded menu item. See [Figure 4-7](#9781484203835_Ch04.xhtml#Fig7):


    ![9781484203835_Fig04-07.jpg](images/9781484203835_Fig04-07.jpg)


    [Figure 4-7](#9781484203835_Ch04.xhtml#_Fig7). The difference of Menulist and
    Application Setting display on target device


    So far, almost all the examples have been based on the code framework of two applications:
    `GuiExam` and `HelloAndroid`. But it is difficult to distinguish between them
    in the menu on the target device. These applications are indistinguishable in
    the menu list because you used the default settings instead of applying their
    own property settings. This section shows you how to apply property settings.


    [Figure 4-8](#9781484203835_Ch04.xhtml#Fig8) shows the applications setting interface
    before and after applying property settings.


    ![9781484203835_Fig04-08.jpg](images/9781484203835_Fig04-08.jpg)


    [Figure 4-8](#9781484203835_Ch04.xhtml#_Fig8). The application on the target device
    before and after applying property setting


    This example uses the `GuiExam` application to show the steps for changing the
    application settings:


    1.  Modify the icon of the application in the menu on the target machine. Based
    on the `ic_launcher.png` file size under the application `res\drawable-XXX` directory
    (where `XXX` represents different resolutions—for example, `drawable-hdpi` represents
    the directory for high-resolution images), edit your image file, and name it `ic_launcher.png`.


    The common screen resolutions for Android devices and the directories where application
    icon files are stored are shown in [Table 4-2](#9781484203835_Ch04.xhtml#Tab2).


    [Table 4-2](#9781484203835_Ch04.xhtml#_Tab2). Common Android Device Screen Resolutions
    and the Directories Containing Application Icon Sizes'
