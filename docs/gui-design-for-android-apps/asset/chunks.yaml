    \             }\n22         });\n       }\n\n24     @Override\n25     public boolean\
    \ onCreateOptionsMenu(Menu menu) {\n26         getMenuInflater().inflate(R.menu.activity_main,\
    \ menu);\n27         return true;\n28     }\n   }\n```\n\n第 16 行的代码定义了一个*间接意图*（即隐式匹配的意图）。之所以称之为间接意图，是因为在对象的构造函数中没有指定需要触发的类；构造函数仅描述了需要触发以完成拨号功能的类。间接意图的构造函数如下所示：\n\
    \n```java\nIntent(String action)\nIntent(String action, Uri uri)\n```\n\n这些函数要求其被调用时，能够找到可以完成指定动作的类（活动）。两者的唯一区别在于，第二个函数还附带了数据。\n\
    \n本例使用了第二个构造函数，它要求找到一个能够完成拨号功能并附带电话号码字符串作为额外数据的活动。由于应用程序未指定触发类型，Android 会从已注册的类列表中查找能够处理此动作的类（例如\
    \ `Activity`），并触发该事件的启动。\n\n如果有多个类可以处理指定的动作，Android 会弹出一个选择菜单，供用户选择运行哪一个。\n\n\
    `action` 参数可以使用系统预定义的字符串。在前面的示例中，`Intent.ACTION_DIAL` 是 `ACTION_DIAL` 的字符串常量，由\
    \ `Intent` 类定义。表 3-1 展示了一些系统预定义的 `ACTION` 示例。\n\n表 3-1. 部分系统预定义的 `ACTION` 常量\n\
    \n| `ACTION` 常量名 | 值 | 描述 |\n| --- | --- | --- |\n| `ACTION_MAIN` | `android.intent.action.MAIN`\
    \ | 作为任务的初始活动启动，无数据输入和返回输出。 |\n| `ACTION_VIEW` | `android.intent.action.VIEW`\
    \ | 显示意图 URI 中的数据。 |\n| `ACTION_EDIT` | `android.intent.action.EDIT` | 请求一个活动来编辑数据。\
    \ |\n| `ACTION_DIAL` | `android.intent.action.DIAL` | 启动电话拨号器，并使用数据中预设的号码进行拨号。\
    \ |\n| `ACTION_CALL` | `android.intent.action.CALL` | 发起电话呼叫，并立即使用数据 URI 中的号码进行呼叫。\
    \ |\n| `ACTION_SEND` | `android.intent.action.SEND` | 启动一个活动以发送特定数据（接收方由活动解析选择）。\
    \ |\n| `ACTION_SENDTO` | `android.intent.action.SENDTO` | 通常启动一个活动以向 URI 中指定的联系人发送消息。\
    \ |\n| `ACTION_ANSWER` | `android.intent.action.ANSWER` | 打开一个活动来处理来电。目前由本地电话拨号工具处理。\
    \ |\n| `ACTION_INSERT` | `android.intent.action.INSERT` | 打开一个活动，该活动可以在特定数据字段的添加光标处插入新项目。当作为子活动调用时，它必须返回新插入项目的\
    \ URI。 |\n| `ACTION_DELETE` | `android.intent.action.DELETE` | 启动一个活动，删除 URI 位置的数据端口。\
    \ |\n| `ACTION_WEB_SEARCH` | `android.intent.action.WEB_SEARCH` | 打开一个活动，并根据 URI\
    \ 数据中的文本运行网页搜索。 |\n\n`ACTION` 常量名是隐式匹配意图构造函数中使用的第一个参数。`ACTION` 常量的值用于接收此动作的活动在\
    \ `AndroidManifest.xml` 声明中，在本节中不会用到，而是在下一节中使用。你可以在 `android.content.Intent` 帮助文档中找到更多关于预定义\
    \ `ACTION` 值的信息。\n\n## 使用自定义活动的隐式匹配\n\n前面的示例使用了隐式匹配来触发 Android 系统自带的的活动。在本节中，你将看到一个使用隐式匹配触发自定义活动的示例。\n\
    \n此示例应用程序的配置与“触发不同应用程序带参数活动的显式匹配”一节中的配置类似。触发应用程序位于 `GuiExam` 项目中，而由隐式匹配触发的自定义活动位于\
    \ `HelloAndroid` 应用程序中。其界面如 图 3-16 所示。\n\n![9781484203835_Fig03-16a.jpg](img/9781484203835_Fig03-16a.jpg)\n\
