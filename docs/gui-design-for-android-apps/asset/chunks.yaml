    \n    2. 选择左侧面板中的`Layouts`子目录，然后将布局控件（此处为`RelativeLayout`）拖到右侧面板的窗口中。您会立即看到一个可见的（手机屏幕形状的）界面，如图\
    \ 3-4 所示。\n\n    ![9781484203835_Fig03-04.jpg](img/9781484203835_Fig03-04.jpg)\n\
    \n    Figure 3-4. 新添加布局文件的拖放布局\n\n    3. 基于第 2 章“使用 ImageView”一节中描述的相同方法，在新的布局文件中放置一个`ImageView`和一个按钮。将`ImageView`控件的`ID`属性设置为`@+id/picture`，将`Button`控件的`ID`属性设置为`@+id/closeActivity`。`Text`属性设置为“Close\
    \ Activity”，如图 3-5 所示。最后，保存布局文件。\n\n    ![9781484203835_Fig03-05.jpg](img/9781484203835_Fig03-05.jpg)\n\
    \n    Figure 3-5. 新添加布局文件的最终配置\n\n2. 为布局文件添加相应的`Activity`类（Java 源文件）。为此，右键单击项目目录下的`\\\
    src\\com.example.XXX`，然后选择 New ![image](img/arrow.jpg) Class。在 New Java Class\
    \ 对话框中，在 Name 处输入与新布局文件对应的`Activity`类名（此处为`TheNoParameterOtherActivity`）。单击 Finish\
    \ 关闭对话框。整个过程如图 3-6 所示。\n\n    ![9781484203835_Fig03-06.jpg](img/9781484203835_Fig03-06.jpg)\n\
    \n    Figure 3-6. 新添加布局文件对应的类\n\n    您可以看到新添加的 Java 文件（此处为`TheNoParameterOtherActivity.java`）和初始代码，如图\
    \ 3-7 所示。\n\n    ![9781484203835_Fig03-07.jpg](img/9781484203835_Fig03-07.jpg)\n\
    \n    Figure 3-7. 新添加布局对应的类和初始源代码\n\n3. 编辑新添加的`.java`文件（`TheNoParameterOtherActivity.java`）。此类执行被触发的\
    \ Activity（被调用者）的活动。其源代码如下（粗体文本为添加或修改的内容）：\n\n    ```\n        Line #        Source\
    \ Code\n        1  package com.example.guiexam;\n        2  import android.os.Bundle;\
    \                 // 使用 Bundle 类\n        3  import android.app.Activity;    \
    \          // 使用 Activity 类\n        4  import android.widget.Button;        \
    \     // 使用 Button 类\n        5  import android.view.View;                 //\
    \ 使用 View 类\n        6  import android.view.View.OnClickListener; // 使用 OnClickListener\
    \ 类\n\n        7  public class TheNoParameterOtherActivity extends Activity {\n\
    \        8  // 定义 Activity 子类\n        9     @Override\n        10 protected void\
    \ onCreate(Bundle savedInstanceState) {\n        11 // 定义 onCreate 方法\n      \
    \  12        super.onCreate(savedInstanceState);\n        13 // 调用父类的 onCreate\
    \ 方法\n        14        setContentView(R.layout.noparam_otheract);\n        15\
    \ // 设置布局文件\n        16        Button btn = (Button) findViewById(R.id.closeActivity);\n\
    \        17 // 为 <Close Activity> 按钮设置响应代码\n        18        btn.setOnClickListener(new\
    \ /*View.*/OnClickListener(){\n        19          public void onClick(View v)\
    \ {\n                   finish();\n           // 关闭此 Activity\n              }\n\
    \              });\n           }\n           }\n    ```\n\n    在第 7 行，您为新创建的类添加了父类`Activity`。第\
    \ 8 到 18 行的代码与应用程序的主 Activity 类似。请注意，在第 14 行，代码调用`setContentView()`函数来设置`Activity`的布局，其参数是在第一步中创建的新布局\
    \ XML 文件的前缀名称。\n\n4. 编辑触发器（调用者）Activity 的代码。触发器 Activity 是应用程序的主 Activity。源代码是`MainActivity.java`，布局文件是`activity_main.xml`。编辑步骤如下：\n\
    \    1. 编辑布局文件，删除原始的`TextView`控件，并添加一个按钮。将其`ID`属性设置为`@+id/goTONoParamNewAct`，`Text`属性设置为“Change\
    \ to interface without Parameter”，如图 3-8 所示。\n\n    ![9781484203835_Fig03-08.jpg](img/9781484203835_Fig03-08.jpg)\n\
    \n    Figure 3-8. 触发器 Activity 的布局配置\n\n    2. 编辑触发器 Activity 的源代码文件（此处为`MainActivity.java`），如下所示（粗体文本为添加或修改的内容）：\n\
    \n    ```\n            Line #        Source Code\n            1  package com.example.guiexam;\n\
    \            2  import android.os.Bundle;\n            3  import android.app.Activity;\n\
    \            4  import android.view.Menu;\n            5  import android.content.Intent;\
    \            // 使用 Intent 类\n            6  import android.widget.Button;    \
    \         // 使用 Button 类\n            7  import android.view.View.OnClickListener;\n\
    \            8  import android.view.View;\n\n            9  public class MainActivity\
    \ extends Activity {\n            10     @Override\n            11     public\
    \ void onCreate(Bundle savedInstanceState) {\n            12         super.onCreate(savedInstanceState);\n\
    \            13         setContentView(R.layout.activity_main);\n            14\
    \     Button btn = (Button) findViewById(R.id.goTONoParamNewAct);\n          \
    \  15     btn.setOnClickListener(new /*View.*/OnClickListener(){\n           \
    \ 16         public void onClick(View v) {\n            17             Intent\
    \ intent = new Intent(MainActivity.this,\n                                   \
    \            TheNoParameterOtherActivity.class);\n            18             startActivity(intent);\n\
    \            19         }\n            20     });\n            21     }\n    \
    \        22     @Override\n            23     public boolean onCreateOptionsMenu(Menu\
    \ menu) {\n            24         getMenuInflater().inflate(R.menu.activity_main,\
    \ menu);\n            25         return true;\n            26     }\n        \
    \    27 }\n    ```\n\n    第 17 行的代码定义了一个意图。此处的构造函数原型为：\n\n    ```\n          \
    \  Intent(Context packageContext, Class<?> cls)\n    ```\n"
- fmt: "第一个参数是触发活动（trigger activity），在本例中为主活动；`this`由于在内部类中使用，因此需要加上类名修饰符。第二个参数是被触发活动（callee\
    \ activity）的类。它使用`.class`属性来构造对象（所有Java类都有`.class`属性）。\n\n第18行调用`startActivity`来运行该意图（intent）。该函数不会向被触发活动传递任何参数。函数原型如下：\n\
    \n`void Activity.startActivity(Intent intent)`\n\n5.  编辑`AndroidManifest.xml`文件。为被触发活动添加描述性信息（添加的文本以粗体显示），以注册新的`Activity`类：\n\
    \n```\nLine #        Source Code\n1  <manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n2      package=\"com.example.guiexam\"\n3      android:versionCode=\"1\"\n4      android:versionName=\"\
    1.0\" >\n...      ... ...\n10     <application\n11         android:icon=\"@drawable/ic_launcher\"\
    \n12         android:label=\"@string/app_name\"\n13         android:theme=\"@style/AppTheme\"\
    \ >\n14         <activity\n15             android:name=\".MainActivity\"\n16            \
    \ android:label=\"@string/title_activity_main\" >\n17             <intent-filter>\n\
    18                 <action android:name=\"android.intent.action.MAIN\" />\n\n\
    20                 <category android:name=\"android.intent.category.LAUNCHER\"\
    \ />\n21             </intent-filter>\n22         </activity>\n23         <activity\
    \ android:name=\".TheNoParameterOtherActivity\"\n            android:label=\"\
    the other Activity\"/>\n24         </application>\n\n26 </manifest>\n```\n\n你也可以用以下方法替换这段XML代码：\n\
    \n*   方法 1：\n\n```\n    <activity android:name=\"TheNoParameterOtherActivity\"\
    \ android:label=\" the other Activity\"> </activity>\n    ```\n\n*   方法 2：\n\n\
    ```\n    <activity android:name=\".TheNoParameterOtherActivity \" />\n    ```\n\
    \n*   方法 3：\n\n```\n    <activity android:name=\".TheNoParameterOtherActivity\"\
    ></activity>\n    ```\n\n`android:name`文本字段的内容是被触发活动的类名：`TheNoParameterOtherActivity`。\n\
    \n请注意，如果在`Activity`类`android:name`的名称前加上句点（`.`），编译器会在XML文件的这一行给出以下警告（仅是警告，不是编译错误）：\n\
    \n```\nExported activity does not require permission\n```\n\n### 触发不同应用程序中带参数活动的显式匹配\n\
    \n前面几节介绍了在同一应用程序中触发不带参数的活动。触发活动的特点是被触发活动允许参数交换：触发活动可以向被触发活动指定某些参数，而被触发活动在退出时可以将这些参数值返回给触发活动。此外，被触发活动和触发活动可以位于完全不同的应用程序中。本节展示了一个示例，该示例中的活动被不同应用程序中的活动触发并带有参数。本示例将帮助你理解活动参数的交换机制。\n\
    \n使用[第2章](#9781484203835_Ch02.xhtml)中相同的`GuiExam`应用程序。界面如[图3-9](#9781484203835_Ch03.xhtml#Fig9)所示。\n\
    \n![9781484203835_Fig03-09.jpg](images/9781484203835_Fig03-09.jpg)\n\n[图3-9](#9781484203835_Ch03.xhtml#_Fig9).\
    \ 不同应用程序中多个活动的界面\n\n如[图3-9](#9781484203835_Ch03.xhtml#Fig9)所示，触发活动位于`GuiExam`应用程序中，其中有一个变量用于接收天气状况输入。打开`GuiExam`应用程序时，显示的是[图3-9(a)](#9781484203835_Ch03.xhtml#Fig9)中的界面。点击“Enter\
    \ New Interface To Modify The Weather”框，会触发`HelloAndroid`中的活动。当该活动启动时，它会显示传入“Set\
    \ New Weather”文本框的新天气状况，如[图3-9(b)](#9781484203835_Ch03.xhtml#Fig9)所示。现在，在“Set\
    \ New Weather”中输入一个新的天气状况值，然后点击“OK Change”关闭触发活动。从“Set New Weather”返回的新值会刷新触发活动中的`Weather`变量，如[图3-9(d)](#9781484203835_Ch03.xhtml#Fig9)所示。如果点击“Cancel\
    \ Change”，它会执行相同操作并关闭活动，但`Weather`的值不会改变，如[图3-9(f)](#9781484203835_Ch03.xhtml#Fig9)所示。\n\
    \n正在执行的应用程序的进程列表如[图3-10](#9781484203835_Ch03.xhtml#Fig10)所示（显示在 Eclipse 主机机器的\
    \ DDMS 窗口中）。\n\n![9781484203835_Fig03-10.jpg](images/9781484203835_Fig03-10.jpg)\n\
    \n[图3-10](#9781484203835_Ch03.xhtml#_Fig10). 多活动应用程序在 DDMS 中的进程列表\n\n[图3-10](#9781484203835_Ch03.xhtml#Fig10)显示，当应用程序启动时，只有触发活动`GuiExam`的进程在运行。但是，当你点击“Enter\
    \ New Interface To Modify The Weather”时，新活动被触发，新活动`HelloAndroid`的进程也开始运行，如[图3-10(b)](#9781484203835_Ch03.xhtml#Fig10)所示。当你点击“Confirm\
    \ Change”或“Cancel Change”时，被触发活动关闭，但`HelloAndroid`进程并未退出，如[图3-10(c)](#9781484203835_Ch03.xhtml#Fig10)所示。有趣的是，即使`GuiExam`触发进程退出，被触发活动所属的`HelloAndroid`进程仍然处于运行状态。\n\
    \n构建步骤如下：\n\n1.  修改触发应用程序的`GuiExam`代码：\n    1.  编辑主布局文件（本例中为`activity_main.xml`），删除原始的`TextView`小部件；然后添加三个新的`TextView`小部件和一个按钮。按如下方式设置它们的属性：将两个`TextView`的`Text`属性分别设置为“This\
    \ interface is the activity of the Caller in GuiExam application”和“Today’s Weather:”。将第三个`TextView`的`ID`属性设置为`@+id/weatherInfo`。按钮的`Text`属性为“Enter\
    \ New Interface to Change Weather”，其`ID`属性为`@+id/modifyWeather`。调整每个小部件的大小和位置，如[图3-11](#9781484203835_Ch03.xhtml#Fig11)所示。\n\
    \n![9781484203835_Fig03-11.jpg](images/9781484203835_Fig03-11.jpg)\n\n[图3-11](#9781484203835_Ch03.xhtml#_Fig11).\
    \ `GuiExam`触发应用程序的主布局设计\n\n2.  修改`MainActivity.java`的内容，如下所示：\n\n```\n       \
    \ Line#        Source Code\n        1  package com.example.guiexam;\n        2  import\
    \ android.os.Bundle;\n        3  import android.app.Activity;\n        4  import\
    \ android.view.Menu;\n        5  import android.widget.Button;             //\
    \ Use Button class\n        6  import android.view.View;                 // Use\
    \ View class\n        7  import android.view.View.OnClickListener; // Use View.OnClickListener\
    \ class\n        8  import android.widget.TextView;           // Use TextView\
    \ class\n        9  import android.content.Intent;            // Use Intentclass\n\
    ```"
  raw: "The first parameter is the trigger activity, in this case the main activity;\
    \ `this`, because it is used inside the inner classes, is preceded by class-name\
    \ modifiers. The second parameter is the class of the callee (being triggered)\
    \ activity. It uses the `.class` attribute to construct its object (all Java classes\
    \ have the `.class` attribute).\n\nLine 18 calls `startActivity`, which runs the\
    \ intent. This function does not pass any parameters to the triggered activity.\
    \ The function prototype is\n\n`void Activity.startActivity(Intent intent)`\n\n\
    5.  Edit the `AndroidManifest.xml` file. Add descriptive information for the callee\
    \ activity (bold text is added) to register the new `Activity` class:\n\n```\n\
    Line #        Source Code\n1  <manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n2      package=\"com.example.guiexam\"\n3      android:versionCode=\"1\"\n4      android:versionName=\"\
    1.0\" >\n...      ... ...\n10     <application\n11         android:icon=\"@drawable/ic_launcher\"\
    \n12         android:label=\"@string/app_name\"\n13         android:theme=\"@style/AppTheme\"\
    \ >\n14         <activity\n15             android:name=\".MainActivity\"\n16            \
    \ android:label=\"@string/title_activity_main\" >\n17             <intent-filter>\n\
    18                 <action android:name=\"android.intent.action.MAIN\" />\n\n\
    20                 <category android:name=\"android.intent.category.LAUNCHER\"\
    \ />\n21             </intent-filter>\n22         </activity>\n23         <activity\
    \ android:name=\".TheNoParameterOtherActivity\"\n            android:label=\"\
    the other Activity\"/>\n24     </application>\n\n26 </manifest>\n```\n\nYou can\
    \ also replace this XML code with the following methods:\n\n*   Method 1:\n\n\
    ```\n    <activity android:name=\"TheNoParameterOtherActivity\" android:label=\"\
    \ the other Activity\"> </activity>\n    ```\n\n*   Method 2:\n\n```\n    <activity\
    \ android:name=\".TheNoParameterOtherActivity \" />\n    ```\n\n*   Method 3:\n\
    \n```\n    <activity android:name=\".TheNoParameterOtherActivity\"></activity>\n\
    \    ```\n\nThe content of the `android: name` text field is the class name of\
    \ the callee’s activity: `TheNoParameterOtherActivity`.\n\nNote that if a period\
    \ (`.`) is added before the name of the `Activity` class `android: name`, the\
    \ compiler will give you the following warning at this line in the XML file (only\
    \ a warning, not a compile error):\n\n```\nExported activity does not require\
    \ permission\n```\n\nTriggering Explicit Matching of an Activity with Parameters\
    \ of Different Applications\n\nThe previous sections introduced triggering another\
    \ activity without parameters in the same application. The activity of the trigger\
    \ is that the callee allows the exchange of parameters: the trigger can specify\
    \ certain parameters to the callee, and the callee can return those parameter\
    \ values to the trigger on exit. Additionally, the callee and the trigger can\
    \ be in completely different applications. This section shows an example of an\
    \ application with parameters triggered by an activity in a different application.\
    \ This example will help you understand the exchange mechanism for the activity’s\
    \ parameters.\n\nUse the same `GuiExam` application from [Chapter 2](#9781484203835_Ch02.xhtml).\
    \ The interface is shown in [Figure 3-9](#9781484203835_Ch03.xhtml#Fig9).\n\n\
    ![9781484203835_Fig03-09.jpg](images/9781484203835_Fig03-09.jpg)\n\n[Figure 3-9](#9781484203835_Ch03.xhtml#_Fig9).\
    \ The interface of multiple activities in different applications\n\nAs shown in\
    \ [Figure 3-9](#9781484203835_Ch03.xhtml#Fig9), the trigger activity is in the\
    \ `GuiExam` application, where there is a variable to accept the weather condition\
    \ entry. The interface in [Figure 3-9(a)](#9781484203835_Ch03.xhtml#Fig9) displays\
    \ when the `GuiExam` application is opened. Click the Enter New Interface To Modify\
    \ The Weather box to trigger the activity in `HelloAndroid`. When this activity\
    \ starts, it displays the new weather condition passed in the Set New Weather\
    \ text box, as shown in [Figure 3-9(b)](#9781484203835_Ch03.xhtml#Fig9). Now enter\
    \ a new weather condition value in the Set New Weather, and click OK Change to\
    \ close the trigger’s activity. The new value returned from Set New Weather refreshes\
    \ the `Weather` variable in the trigger’s activity, as shown in [Figure 3-9(d)](#9781484203835_Ch03.xhtml#Fig9).\
    \ If you click Cancel Change, it does the same thing and closes the activity,\
    \ but the value `Weather` does not change, as shown in [Figure 3-9(f)](#9781484203835_Ch03.xhtml#Fig9).\n\
    \nThe process list for the executing application is shown in [Figure 3-10](#9781484203835_Ch03.xhtml#Fig10)\
    \ (displayed in the DDMS window of the host machine in Eclipse).\n\n![9781484203835_Fig03-10.jpg](images/9781484203835_Fig03-10.jpg)\n\
    \n[Figure 3-10](#9781484203835_Ch03.xhtml#_Fig10). Process list in DDMS for the\
    \ multiple-activity application\n\n[Figure 3-10](#9781484203835_Ch03.xhtml#Fig10)\
    \ shows that when the application starts, only the process for the trigger, `GuiExam`,\
    \ is running. But when you click Enter New Interface To Modify The Weather, the\
    \ new activity is triggered and the process for the new activity `HelloAndroid`\
    \ runs, as shown in [Figure 3-10(b)](#9781484203835_Ch03.xhtml#Fig10). When you\
    \ click Confirm Change or Cancel Change, the triggered activity turns off, but\
    \ the `HelloAndroid` process does not quit, as shown in [Figure 3-10(c)](#9781484203835_Ch03.xhtml#Fig10).\
    \ Interestingly, even though the `GuiExam` trigger process exits, the `HelloAndroid`\
    \ process to which the triggered activity belongs is still in the running state.\n\
    \nThe build steps are as follows:\n\n1.  Modify the `GuiExam` code of the trigger\
    \ application:\n    1.  Edit the main layout file (`activity_main.xml` in this\
    \ case) by deleting the original `TextView` widgets; then add three new `TextView`\
    \ widgets and a button. Set their properties as follows: set the `Text` property\
    \ for two `TextView`s to “This interface is the activity of the Caller in GuiExam\
    \ application” and “Today’s Weather:”. Set the third `TextView`’s `ID` property\
    \ to `@+id/weatherInfo`. The `Text` property of the button is “Enter New Interface\
    \ to Change Weather”, and its `ID` attribute is `@+id/modifyWeather`. Adjust the\
    \ size and position of each widget as shown in [Figure 3-11](#9781484203835_Ch03.xhtml#Fig11).\n\
    \n![9781484203835_Fig03-11.jpg](images/9781484203835_Fig03-11.jpg)\n\n[Figure\
    \ 3-11](#9781484203835_Ch03.xhtml#_Fig11). The main layout design for the `GuiExam`\
    \ trigger application\n\n2.  Modify the content of `MainActivity.java` as shown\
    \ here:\n\n```\n        Line#        Source Code\n        1  package com.example.guiexam;\n\
    \        2  import android.os.Bundle;\n        3  import android.app.Activity;\n\
    \        4  import android.view.Menu;\n        5  import android.widget.Button;            \
    \ // Use Button class\n        6  import android.view.View;                 //\
    \ Use View class\n        7  import android.view.View.OnClickListener; // Use\
    \ View.OnClickListener class\n        8  import android.widget.TextView;          \
    \ // Use TextView class\n        9  import android.content.Intent;            //\
    \ Use Intentclass"
