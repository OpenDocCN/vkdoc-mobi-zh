- fmt: '# User Interface and User Experience Design for Android


    These days, the user interface (UI) and user experience (UX) of software are increasingly
    important factors in determining whether software will be accepted by users and
    achieve market success. UX designs are based on the types of input/output or interaction
    devices and must comply with their characteristics. Compared to desktop computer
    systems, Android systems have different interaction devices and modalities. If
    a desktop’s UI designs are copied indiscriminately, an Android device will present
    a terrible UI and unbearable UX, unacceptable to users. In addition, with greater
    expectations for compelling user experiences, developers must be more meticulous
    and careful in designing system UIs and UXs, making them comply with the characteristics
    of embedded applications.


    This chapter first introduces the general GUI design method for desktop systems
    and then shows how designing UIs for embedded systems is different. The aim is
    to help you quickly master general methods and principles of GUI design for Android
    applications.


    ## Characteristics of Interaction Modalities of Android Devices


    A general-purpose desktop computer has powerful input/output (or interaction)
    devices such as a large, high-resolution screen, a full keyboard and mouse, and
    diverse interaction modalities. Typical desktop computer screens are at least
    17 inches, with resolutions of at least 1,280 × 960 pixels. The keyboard is generally
    a full keyboard or an enhanced keyboard. On full keyboards, letters, numbers,
    and other characters are located on corresponding keys—that is, full keyboards
    provide keys corresponding to all characters. Enhanced keyboards have additional
    keys. The distance between keys on a full keyboard is about 19 mm, which is convenient
    for users to make selections.


    The GUI interactive mode of desktop computers based on screen, keyboard, and mouse
    is referred to as WIMP (windows, icons, menus, and pointers), which is a style
    of GUI using these elements as well as interactive elements including buttons,
    toolbars, and dialog boxes. WIMP depends on screen, keyboard, and mouse devices
    to complete the interaction. For example, a mouse (or a device similar to a mouse,
    such as a light pen) is used for pointing, a keyboard is used to input characters,
    and a screen shows the output.


    In addition to screens, keyboards, mice, and other standard interaction hardware,
    desktop computers can be equipped with joysticks, helmets, data gloves, and other
    multimedia interactive devices to achieve multimedia computing functions. By installing
    cameras, microphones, speakers, and other devices, and by virtue of their powerful
    computing capabilities, users can interact with desktop computers in the form
    of voice, gestures, facial expressions, and other modalities.


    Desktop computers are also generally equipped with CD-ROM/DVDs and other large-capacity
    portable external storage devices. With these external storage devices, desktop
    computers can release software and verify ownership and certificates through CD/DVD.


    As a result of the embeddability and limited resources of embedded systems, as
    well as user demand for portability and mobility, Android systems have interaction
    modalities, methods, and capabilities that are distinct from those of desktop
    systems. Due to these characteristics and conditions, interaction on Android systems
    is more demanding and more difficult to achieve than it is on desktop systems.


    The main differences between Android devices and desktop computers are described
    next.


    ### Screens of Various Sizes, Densities, and Specifications


    Instead of large, high-resolution screens like those on desktop computers, Android
    device screens are smaller and have various dimensions and densities measured
    in dots per inch (DPI). For example, the K900 smartphone’s screen is 5.5 inches
    with a resolution of 1920 ×1080 pixels, and some smartphone screens are only 3.2
    inches.


    The aspect ratio of Android device screens is not the conventional aspect ration
    of 16:9 or 4:3 used by desktop computers. If Android devices adopted the interaction
    mode of desktop computers, many problems would result, such as a blurry display
    and errors in selecting targets.


    ### Keypads and Special Keys


    Desktop computers have full keyboards, where a key corresponds to every character
    and the generous distance between keys makes typing convenient. If an Android
    device has a keyboard, it’s usually a keypad instead of the full keyboard. Keypads
    have fewer keys than full keyboards; several characters generally share one key.
    A keypad’s keys are smaller and more tightly spaced than on full keyboards, making
    it harder to select and type characters. As a result, keypads are less convenient
    to use than full keyboards. In addition, some keypads provide special keys that
    are not found on standard full keyboards, so users must adjust their input on
    the Android device.


    Generally speaking, on Android devices, keys and buttons are a unified concept.
    Whether you press a button or a key, the action is processed as a keyboard event
    with a uniform numbering scheme. Keyboard events in Android have corresponding
    `android.view.KeyEvent` classes. [Figure 1-1](#9781484203835_Ch01.xhtml#Fig1)’s
    button/key callouts correspond to the event information listed in [Table 1-1](#9781484203835_Ch01.xhtml#Tab1).


    ![9781484203835_Fig01-01.jpg](images/9781484203835_Fig01-01.jpg)


    [Figure 1-1](#9781484203835_Ch01.xhtml#_Fig1). Keyboard and buttons of an Android
    phone


    [Table 1-1](#9781484203835_Ch01.xhtml#_Tab1). Android Event Information Corresponding
    to Key and Button Events


    ![Table1-1.jpg](images/Table1-1.jpg)


    See help documents like that for `android.view.KeyEvent` for details. [Table 1-1](#9781484203835_Ch01.xhtml#Tab1)’s
    contents are excerpts.


    ### Touch Screens and Styluses, in Place of Mice


    A *touch screen* is an input device covering a display device to record touch
    positions. By using the touch screen, users can have a more intuitive reaction
    to the information displayed. Touch screens are widely applied to Android devices
    and replace a mouse for user input. The most common types of touch screens are
    resistive touch screens, capacitive touch screens, surface acoustic wave touch
    screens, and infrared touch screens, with resistive and capacitive touch screens
    being most often applied to Android devices. Users can directly click videos and
    images on the screen to watch them.


    A stylus can be used to perform functions similar to touch. Some styluses are
    auxiliary tools for touch screens and replace fingers, helping users complete
    elaborate pointing, selecting, line drawing, and other operations, especially
    when the touch screen is small. Other styluses implement touch and input functions
    along with other system components. With the first type of auxiliary tool styluses,
    users can touch and input characters with fingers. But the second type of stylus
    is an indispensable input tool and is used instead of fingers.


    Touch and styluses can perform most functions that mice typically do, such as
    click and drag, but can’t achieve all the functions of mice, such as right-click
    and left-click/right-click at the same time. When designing embedded applications,
    you should control the interaction mode within the range of functions that touch
    screens or styluses can provide and avoid operations that are not available.


    ### Onscreen Keyboards


    *Onscreen keyboards*, also known as *virtual keyboards* or *soft keyboards*, are
    displayed on the screen via software. Users tap the virtual keys like they would
    tap the keys on physical keyboards.


    ### Few Multimodal Interactions


    *Multimodal interaction* refers to human-computer interaction with the modes involving
    the five human senses. It allows the user to interact through input modalities
    such as speech, handwriting, and hand gesture. Because computing capability is
    limited, Android devices generally do not adopt multimodal interaction.'
