    \ property of the `Button`: `@+id/closeActivity`.\n\n    Then adjust their respective\
    \ size and position, as shown in [Figure 3-18](#9781484203835_Ch03.xhtml#Fig18).\n\
    \n![9781484203835_Fig03-18.jpg](images/9781484203835_Fig03-18.jpg)\n\n[Figure\
    \ 3-18](#9781484203835_Ch03.xhtml#_Fig18). Layout file for the custom activity\
    \ of the corresponding implicit intent\n\n4.  Similar to the process described\
    \ in the section of this chapter “Triggering an Explicit Match of Activities with\
