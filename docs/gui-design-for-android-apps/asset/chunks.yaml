    Dialog Boxes in Android


    There are three different ways to use dialog boxes in Android, as discussed in
    this section.


    Using an Activity’s Dialog Theme


    The `Dialog` class implements a simple floating window that can be created in
    an activity. By using a basic `Dialog` class, you can create a new instance and
    set its title and layout. Dialog themes can be applied to a normal activity to
    make it look similar to a dialog box.


    In addition, the `Activity` class provides a convenient mechanism to create, save,
    and restore dialogs, such as `onCreateDialog(int)`, `onPrepareDialog(int, Dialog)`,
    `showDialog(int)`, `dismissDialog(int)`, and other functions. If you use these
    functions, the activity can return the `Activity` object that manages the dialog
    through the `getOwnerActivity()` method.


    The following are specific instructions for using these functions.


    onCreateDialog(int) Function


    When you use this callback function, Android sets this activity as the owner of
    each dialog box, which automatically manages the state of each dialog box and
    anchors it to the activity. In this way, each dialog inherits the specific attributes
    of this activity. For example, when a dialog box is opened, the menu button displays
    the option menu defined for the activity. For example, you can use the volume
    keys to modify the audio stream that the activity uses.


    showDialog(int) Function


    When you want to display a dialog box, you call the `showDialog(intid)` method
    and pass an integer through this function call that uniquely identifies this dialog.
    When the dialog box is first requested, Android calls `onCreateDialog(intid)`
    from the activity. You should initialize this dialog box. This callback method
    is passed to the same ID that `showDialog(intid)` has. When you create the dialog
    box, the object is returned at the end of the activity.


    onPrepareDialog(int, Dialog) Function


    Before the dialog box is displayed, Android also calls the optional callback function
    `onPrepareDialog(int id, Dialog)`. If you want the properties to be changed every
    time a dialog box is opened, you can define this method. Unlike the `onCreateDialog(int)`
    function, which can only be called the first time you open the dialog box, this
    method is called each time you open the dialog box. If you do not define `onPrepareDialog()`,
    then the dialog remains the same as the last time it was opened. The dialog box’s
    ID and the dialog object created in `onCreateDialog()` can also be passed to the
    function by this method.


    dismissDialog(int) Function


    When you are ready to close the dialog box, you can call `dismiss()` through this
    dialog box method to eliminate it. If desired, you can also call `dismissDialog(int
    id)` method from the activity. If you want to use the `onCreateDialog(int id)`
    method to retain the state of your dialog box, then each time the dialog box is
    eliminated, the status of the object of this dialog box object is kept in the
    activity. If you decide that you no longer need this object or clear the state,
    then you should call `removeDialog(intid)`. This removes any internal object references,
    and even if the dialog box is being displayed, it is eliminated.


    Using a Specific Dialog Class


    Android provides multiple classes that are expansions of the `Dialog` class, such
    as `AlertDialog`, .`ProgressDialog`, .and so on. Each class is designed to provide
    specific dialog box functions. The screen interface based on the `Dialog` class
    is created in all activities that then call the specific class. So it does not
    need to be registered in the manifest file, and its life cycle is controlled by
    the activity that calls the class.


    Using Toast Reminders


    Toasts are special, nonmodular, transient message dialog boxes, usually used in
    the broadcast receiver and backgroundservices, and used to prompt user events..


    Dialog Box Example


    Of the dialog box methods discussed, if it is measured by how the implementation
    of the function is done, the first function is the most powerful, followed by
    the second and third. In terms of the degree of sophistication of the implementation
    code, the third method is the simplest, and the first and the second are more
    complex.


    The following example demonstrates the second method. See Android’s help documentation
    and samples (in the `samples` directory located under the Android SDK installation
    directory) to learn more about the other implementation methods.


