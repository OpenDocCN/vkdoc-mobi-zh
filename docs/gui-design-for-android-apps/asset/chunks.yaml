    \ activity）的类。它使用`.class`属性来构造对象（所有 Java 类都有`.class`属性）。\n\n第 18 行调用`startActivity`来运行该意图（intent）。该函数不会向被触发活动传递任何参数。函数原型如下：\n\
    \n`void Activity.startActivity(Intent intent)`\n\n5.  编辑`AndroidManifest.xml`文件。为被触发活动添加描述性信息（添加的文本以粗体显示），以注册新的`Activity`类：\n\
    \n```\nLine #        Source Code\n1  <manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    \n2      package=\"com.example.guiexam\"\n3      android:versionCode=\"1\"\n4\
    \      android:versionName=\"1.0\" >\n...      ... ...\n10     <application\n\
    11         android:icon=\"@drawable/ic_launcher\"\n12         android:label=\"\
    @string/app_name\"\n13         android:theme=\"@style/AppTheme\" >\n14       \
    \  <activity\n15             android:name=\".MainActivity\"\n16             android:label=\"\
    @string/title_activity_main\" >\n17             <intent-filter>\n18          \
    \       <action android:name=\"android.intent.action.MAIN\" />\n\n20         \
    \        <category android:name=\"android.intent.category.LAUNCHER\" />\n21  \
    \           </intent-filter>\n22         </activity>\n23         <activity android:name=\"\
    .TheNoParameterOtherActivity\"\n            android:label=\"the other Activity\"\
    />\n24         </application>\n\n26 </manifest>\n```\n\n你也可以用以下方法替换这段 XML 代码：\n\
    \n*   方法 1：\n\n```\n    <activity android:name=\"TheNoParameterOtherActivity\"\
    \ android:label=\" the other Activity\"> </activity>\n    ```\n\n*   方法 2：\n\n\
    ```\n    <activity android:name=\".TheNoParameterOtherActivity \" />\n    ```\n\
    \n*   方法 3：\n\n```\n    <activity android:name=\".TheNoParameterOtherActivity\"\
    ></activity>\n    ```\n\n`android:name`文本字段的内容是被触发活动的类名：`TheNoParameterOtherActivity`。\n\
    \n请注意，如果在`Activity`类`android:name`的名称前加上句点（`.`），编译器会在 XML 文件的这一行给出以下警告（仅是警告，不是编译错误）：\n\
    \n```\nExported activity does not require permission\n```\n\n### 触发不同应用程序中带参数活动的显式匹配\n\
    \n前面几节介绍了在同一应用程序中触发不带参数的活动。触发活动的特点是被触发活动允许参数交换：触发活动可以向被触发活动指定某些参数，而被触发活动在退出时可以将这些参数值返回给触发活动。此外，被触发活动和触发活动可以位于完全不同的应用程序中。本节展示了一个示例，该示例中的活动被不同应用程序中的活动触发并带有参数。本示例将帮助你理解活动参数的交换机制。\n\
    \n使用第 2 章中相同的`GuiExam`应用程序。界面如图 3-9 所示。\n\n![9781484203835_Fig03-09.jpg](img/9781484203835_Fig03-09.jpg)\n\
    \n图 3-9. 不同应用程序中多个活动的界面\n\n如图 3-9 所示，触发活动位于`GuiExam`应用程序中，其中有一个变量用于接收天气状况输入。打开`GuiExam`应用程序时，显示的是图\
    \ 3-9(a)中的界面。点击“Enter New Interface To Modify The Weather”框，会触发`HelloAndroid`中的活动。当该活动启动时，它会显示传入“Set\
    \ New Weather”文本框的新天气状况，如图 3-9(b)所示。现在，在“Set New Weather”中输入一个新的天气状况值，然后点击“OK\
    \ Change”关闭触发活动。从“Set New Weather”返回的新值会刷新触发活动中的`Weather`变量，如图 3-9(d)所示。如果点击“Cancel\
    \ Change”，它会执行相同操作并关闭活动，但`Weather`的值不会改变，如图 3-9(f)所示。\n\n正在执行的应用程序的进程列表如图 3-10\
    \ 所示（显示在 Eclipse 主机机器的 DDMS 窗口中）。\n\n![9781484203835_Fig03-10.jpg](img/9781484203835_Fig03-10.jpg)\n\
    \n图 3-10. 多活动应用程序在 DDMS 中的进程列表\n\n图 3-10 显示，当应用程序启动时，只有触发活动`GuiExam`的进程在运行。但是，当你点击“Enter\
    \ New Interface To Modify The Weather”时，新活动被触发，新活动`HelloAndroid`的进程也开始运行，如图 3-10(b)所示。当你点击“Confirm\
    \ Change”或“Cancel Change”时，被触发活动关闭，但`HelloAndroid`进程并未退出，如图 3-10(c)所示。有趣的是，即使`GuiExam`触发进程退出，被触发活动所属的`HelloAndroid`进程仍然处于运行状态。\n\
    \n构建步骤如下：\n\n1.  修改触发应用程序的`GuiExam`代码：\n    1.  编辑主布局文件（本例中为`activity_main.xml`），删除原始的`TextView`小部件；然后添加三个新的`TextView`小部件和一个按钮。按如下方式设置它们的属性：将两个`TextView`的`Text`属性分别设置为“This\
    \ interface is the activity of the Caller in GuiExam application”和“Today’s Weather:”。将第三个`TextView`的`ID`属性设置为`@+id/weatherInfo`。按钮的`Text`属性为“Enter\
    \ New Interface to Change Weather”，其`ID`属性为`@+id/modifyWeather`。调整每个小部件的大小和位置，如图\
    \ 3-11 所示。\n\n![9781484203835_Fig03-11.jpg](img/9781484203835_Fig03-11.jpg)\n\n\
    图 3-11. `GuiExam`触发应用程序的主布局设计\n\n2.  修改`MainActivity.java`的内容，如下所示：\n\n```\n \
    \       Line#        Source Code\n        1  package com.example.guiexam;\n  \
    \      2  import android.os.Bundle;\n        3  import android.app.Activity;\n\
    \        4  import android.view.Menu;\n        5  import android.widget.Button;\
    \             // Use Button class\n        6  import android.view.View;      \
    \           // Use View class\n        7  import android.view.View.OnClickListener;\
    \ // Use View.OnClickListener class\n        8  import android.widget.TextView;\
    \           // Use TextView class\n        9  import android.content.Intent; \
    \           // Use Intentclass\n```\n"
- fmt: "# 代码示例与解释\n\n```java\npublic class MainActivity extends Activity {\n    public\
    \ static final String INITWEATHER = \"Sunny\"; // /Initial Weather\n    public\
    \ static final int MYREQUESTCODE = 100; // Request Code of triggered Activity\n\
    \    private TextView tv_weather; // The TextView Widget that displays Weather\
    \ info\n\n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n\
    \        super.onCreate(savedInstanceState);\n        setContentView(R.layout.activity_main);\n\
    \        tv_weather = (TextView) findViewById(R.id.weatherInfo);\n        tv_weather.setText(INITWEATHER);\n\
    \        Button btn = (Button) findViewById(R.id.modifyWeather); // Get Button\
    \ object according to resource ID\n        btn.setOnClickListener(new /* View.*/\
    \ OnClickListener() { // Set responding code click event\n            public void\
    \ onClick(View v) {\n                Intent intent = new Intent();\n         \
    \       intent.setClassName(\"com.example.helloandroid\", // the package (application)\
    \ that the triggered Activity is located\n                    \"com.example.helloandroid.TheWithParameterOtherActivity\"\
    ); // triggered class (full name)\n                String wthr = tv_weather.getText().toString();\
    \ // Acquire the value of weather TextView\n                intent.putExtra(\"\
    weather\", wthr); // Set parameter being passed to Activity\n                startActivityForResult(intent,\
    \ MYREQUESTCODE); // Trigger Activity\n            }\n        });\n    }\n\n \
    \   @Override\n    protected void onActivityResult(int requestCode, int resultCode,\
    \ Intent data) { // Triggered Activity finish return\n        super.onActivityResult(requestCode,\
    \ resultCode, data);\n        if (requestCode == MYREQUESTCODE) { // Determine\
    \ whether the specified Activity end of the run\n            if (resultCode ==\
    \ RESULT_CANCELED) {\n                // Select \"Cancel\" to exit the code, this\
    \ case is empty\n            } else if (resultCode == RESULT_OK) { // Select <OK>\
    \ to exit code\n                String wthr = null;\n                wthr = data.getStringExtra(\"\
    weather\"); // Get return value\n                if (wthr != null)\n         \
    \           tv_weather.setText(wthr); // Update TextView display of weather content\n\
    \            }\n        }\n    }\n\n    @Override\n    public boolean onCreateOptionsMenu(Menu\
    \ menu) {\n        getMenuInflater().inflate(R.menu.activity_main, menu);\n  \
    \      return true;\n    }\n}\n```\n\n代码中的第23–28行触发了其他应用程序中带有参数的活动。第23–25行建立了触发意图，它使用了`Intent.setClassName()`函数。其原型如下：\n\
    \n```java\nIntent Intent.setClassName(String packageName, String className);\n\
    ```\n\n第一个参数是被触发活动所在包的名称，第二个参数是被触发活动的类名（需要使用完整名称）。通过使用`startActivityForResult()`函数来触发活动，系统可以准确定位应用程序和活动类。\n\
    \n第28行将参数作为附加数据附加到`Intent`中。`Intent`有一系列`putExtra()`函数用于附加数据，以及另一系列`getXXXExtra()`函数用于从`Intent`中提取数据。附加数据也可以通过`Bundle`类来组装。`Intent`提供了`putExtras()`函数来添加数据，以及`getExtras()`函数来获取数据。`putExtra()`使用“属性-值”数据配对或“变量名-值”数据配对来添加和检索数据。在本例中，`Intent.putExtra(\"\
    weather\", \"XXX\")`保存了由`weather`变量名称和值“XXX”组成的数据对，作为意图的附加数据。\n\n代码中的`Intent.getStringExtra(\"\
    weather\")`从附加的意图数据中获取`weather`变量的值，并返回字符串类型。\n\n关于这些函数和`Bundle`类的更多详细信息可以在Android官方网站的文档中找到，此处不再进一步讨论。\n\
    \n在第33–46行中，重写了`Activity`类的`onActivityResult()`函数。当被触发的活动关闭时，会调用此函数。在第36行中，首先根据请求码确定是哪个活动关闭并返回。然后根据结果码和请求码判断是通过“确定”还是“取消”按钮返回的。第40–50行从返回的意图中获取协商好的变量值。第42行根据变量的返回值更新界面。在此函数中，如果用户点击“取消”返回，则什么都不做。\n\
    \n## 修改调用方应用程序`HelloAndroid`的代码\n\n修改调用方应用程序`HelloAndroid`的代码，如图3-12所示：\n\n1.\
    \ 使用本章前面“触发不同应用程序中带有参数的活动的显式匹配”一节中描述的方法，添加一个布局文件（本例中命名为`param_otheract.xml`），并将一个`RelativeLayout`布局拖放到该文件中。\n\
    2. 编辑此布局文件，添加两个`TextView`小部件、一个`EditText`和两个`Button`小部件。设置它们的属性如下：\n   - 两个`TextView`小部件的`Text`属性：“This\
    \ interface is the activity of the caller in HelloAndroid application”和“Set new\
    \ weather as:”\n   - `EditText`的`ID`属性：`@+id/editText_NewWeather`\n   - 两个`Button`的`Text`属性：“Confirm\
    \ Changes”和“Cancel Changes”\n   - 两个`Button`的`ID`属性：`@+id/button_Modify`和`@+id/button_Cancel`\n\
    \n   ![9781484203835_Fig03-12.jpg](images/9781484203835_Fig03-12.jpg)\n\n   **图3-12.**\
    \ 被触发（被调用方）应用程序`HelloAndroid`的新布局设计\n\n   然后调整它们的大小和位置。\n\n3. 按照“触发不同应用程序中带有参数的活动的显式匹配”一节中的描述，为新的布局文件添加相应的类（本例中为`TheWithParameterOtherActivity`），如图3-13所示。\n\
    \n   ![9781484203835_Fig03-13.jpg](images/9781484203835_Fig03-13.jpg)\n\n   **图3-13.**\
    \ 在`HelloAndroid`项目中为新添加的布局文件添加相应的类\n\n4. 编辑新布局文件的类文件（本例中为`TheWithParameterOtherActivity.java`）。内容如下：\n\
    \n```java\nLine#        Source Code\n1  package com.example.helloandroid;\n2 \
    \ import android.os.Bundle;                // Use Bundle Class\n3  import android.app.Activity;\
