    ```markdown

    `Intent` 是一种运行时绑定的机制；它能在程序运行过程中连接两个不同的组件。通过 `intent`，程序可以向 Android 发出请求或表达意愿；Android
    会根据 `intent` 的内容选择合适的组件来处理该请求。例如，假设一个活动想要打开一个网页浏览器来查看页面内容；这个活动只需向 Android 发出一个
    `WEB_SEARCH_ACTION` 请求。Android 会根据内容请求，检查组件注册声明中的 intent 过滤器，并找到一个用于网页浏览器的活动。


    当发出一个 `intent` 时，Android 会找到一个或多个精确匹配的活动、服务或 `broadcastReceiver` 作为响应。因此，不同类型的
    intent 消息不会重叠，也不会同时发送给一个活动或服务，因为 `startActivity()` 消息只能发送给活动，而 `startService()`
    的 intent 只能发送给服务。


    ## Intent 的主要作用


    `intent` 的主要作用如下。


    ### 触发新活动或让现有活动执行新操作


    在 Android 中，`intent` 直接与活动进行交互。`intent` 最常见的用途是绑定应用组件。`intent` 用于启动、停止和传输应用活动。换句话说，`intent`
    可以激活一个新的活动，或者让一个现有的活动执行新的操作。这可以通过调用 `Context.startActivity()` 或 `Context.startActivityForResult()`
    方法来实现。


    要在应用中打开一个不同的界面（对应一个活动），可以调用 `Context.startActivity()` 函数来传递一个 `intent`。`Intent`
    既可以显式指定要打开的特定类，也可以包含实现目标所需的操作。在后一种情况下，运行时会使用一个众所周知的 intent 解析过程来选择要打开的活动，在此过程中，`Context.startActivity()`
    会找到并启动一个与 `intent` 最佳匹配的单个活动。


    ### 触发新服务或向现有服务发送新请求


    打开一个服务或向现有服务发送请求也是通过 `intent` 类完成的。


    ### 触发 BroadcastReceiver


    可以通过三种不同的方法发送 `BroadcastIntent`：`Context.sendBroadcast()`、`Context.sendOrderedBroadcast()`
    和 `Context.sendStickyBroadcast()`。


    ## Intent 解析


    intent 传递过程有两种方式将目标消费者（例如另一个活动、`IntentReceiver` 或服务）与 `intent` 的响应者进行匹配。


    第一种是*显式匹配*，也称为*直接 intent*。在构造 `intent` 对象时，必须将接收者指定为 `intent` 的组件属性之一（通过调用 `setComponent(ComponentName)`
    或 `setClass(Context, Class)`）。通过指定组件类，应用程序通知启动相应的组件。这种方法类似于普通的函数调用，但在粒度的复用方面有所不同。


    第二种是*隐式匹配*，也称为*间接 intent*。`intent` 的发送者在构造 `intent` 对象时不知道也不关心接收者是谁。组件的 intent
    属性中未指定该属性。这种 intent 需要包含足够的信息，以便系统能够从所有可用的组件中确定使用哪些组件来满足该 intent。这种方法与函数调用有显著区别，有助于减少发送者和接收者之间的耦合。隐式匹配会解析为单个活动。如果有多个活动可以基于特定数据执行给定的操作，Android
    会选择最佳的一个来启动。


    对于直接 intent，Android 无需进行解析，因为目标组件非常明确。然而，Android 需要解析间接 intent。通过分析，它将间接 intent
    映射到处理该 intent 的活动、`IntentReceiver` 或服务。


    intent 解析机制主要包括以下内容：


    *   查找所有注册在 `AndroidManifest.xml` 中的 `<intent-filter>` 以及这些过滤器定义的 intent

    *   通过 `PackageManager`（`PackageManager` 可以获取当前设备上安装的应用程序包的信息）查找并处理该 intent 的组件


    Intent 过滤器非常重要。一个未声明 `<intent-filter>` 的组件只能响应组件名称匹配的显式 intent 请求，但不能响应隐式 intent
    请求。一个声明了 `<intent-filter>` 的组件既可以响应显式 intent 请求，也可以响应隐式 intent 请求。在解析隐式 intent
    请求时，Android 使用 intent 的三个属性——action、type 和 category 来进行解析。具体的解析方法如下所述。


    ### 操作测试


    一个 `<intent-filter>` 元素应至少包含一个 `<action>`，否则没有 intent 请求能够匹配该 `<intent-filter>`。如果一个
    intent 请求的操作与 `<intent-filter>` 中的至少一个 `<action>` 匹配，则该 intent 通过了此 `<intent-filter>`
    的操作测试。


    如果 intent 请求或 `<intent-filter>` 中没有描述特定的操作类型，则适用以下两种测试之一：


    *   如果 `<intent-filter>` 不包含任何操作类型，无论 intent 请求是什么，都无法匹配此 `<intent-filter>`。

    *   如果 intent 请求没有设置操作类型，只要 `<intent-filter>` 包含一个操作类型，该 intent 请求就会成功通过 `<intent-filter>`
    的操作测试。


    ### 类别测试


    要使一个 intent 通过类别测试，Intent 中的每个类别都必须与过滤器中的某个类别匹配。当 intent 请求的每个类别都与某个组件的 `<intent-filter>`
    的 `<category>` 精确匹配时，该 intent 请求通过测试。`<intent-filter>` 中多余的 `<category>` 声明不会导致匹配失败。任何未指定类别测试的
    `<intent-filter>` 仅匹配未设置类别配置的 intent 请求。


    ### 数据测试


    `<data>` 元素指定了你想要接收的 intent 请求的数据 URI 和数据类型。一个 URI 分为三个匹配部分：scheme、authority 和
    path。通过 `setData()` 设置的互联网请求的 URI 数据类型和 scheme 必须与 `<intent-filter>` 中指定的一致。如果
    `<intent-filter>` 还指定了 authority 或 path，它们也必须匹配才能通过测试。


    这个决策过程可以表示如下：


    *   如果 intent 指定了操作，那么目标组件的 `<intent-filter>` 的操作列表必须包含此操作。否则，认为不匹配。

    *   如果 intent 没有提供类型，系统会从数据中获取数据类型。并且对于某些操作方法，目标组件的数据类型列表必须包含 intent 的数据类型。否则无法匹配。

    *   如果 intent 的数据不是 content 的 URI，并且类别和 intent 也没有指定其类型，则匹配基于 intent 的数据 scheme（例如
    `http:` 或 `mailto:`），并且 intent 的 scheme 必须出现在目标组件的 scheme 列表中。

    *   如果 intent 指定了一个或多个类别，这些类别必须全部出现在目标组件的类别列表中。例如，如果 intent 包含两个类别，`LAUNCHER_CATEGORY`
    和 `ALTERNATIVE_CATEGORY`，那么通过解析得到的目标组件必须至少包含这两个类别。


    ## 应用与活动之间的关系

