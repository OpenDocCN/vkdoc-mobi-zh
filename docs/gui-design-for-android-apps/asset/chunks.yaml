    \ is:\n\n```\nvoid Paint.setColor(int color);\n```\n\nIn Android, a four-byte\
    \ integer is used to represent a color, based on α, red, green, and blue. This\
    \ integer data format looks like this:\n\n![pg108.jpg](images/pg108.jpg)\n\nFrom\
    \ left to right, the first four bytes represent α, red, green, and blue values.\
    \ For example, blue is `0xff0000ff`, as is also reflected in line 27. In addition,\
    \ the Android `Color` class also defines a constant for some colors, such as `BLACK`,\
