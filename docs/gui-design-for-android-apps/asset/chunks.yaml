    Layout Files


    Layout files describe the size, location, and arrangement of each screen *widget*
    (combination of *window* and *gadget*). A layout file is the “face” of the application.
    Layout files are text files in XML format.


    Widgets are visual UI elements, such as buttons and text boxes. They are equivalent
    to controls and containers in the Windows system terminology. Buttons, text boxes,
    scroll bars, and so forth are widgets. In the Android OS, widgets generally belong
    to the `View` class and its descendant classes and are stored in the `android.widget`
    package.


    An application has a main layout file corresponding to the application’s screen
    display at startup. For example, the layout file and the main interface of the
    HelloAndroid example are shown in [Figure 1-7](#9781484203835_Ch01.xhtml#Fig7).
    When an application is created, Eclipse automatically generates a layout file
    for the application’s main screen display. The file is located in the project
    folder’s `res\layout` directory. The file name in the generated application projects
    is specified in the next section: in this case, the source code file name corresponds
    to the `[Layout Name]` key, so the file is named `activity_main.xml`.


