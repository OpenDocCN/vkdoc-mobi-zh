- fmt: "# In this code, you want the `Activity` class to receive and respond to key-down\
    \ events, so you overwrite the `onKeyDown` function in lines 19–42 with the button-response\
    \ code. Although the response function for key buttons is located in the `Activity`\
    \ class, the display updates are to be implemented in the view `MyView` class,\
    \ so you must make the `Activity` class aware of its corresponding view object.\
    \ To do so, you add a record-view object variable `theView` in line 7. In lines\
    \ 11 and 12, you let `theView` record this object when constructing the view object.\n\
    \nIn the key-down response function `onKeyDown`, you use a `switchcase` statement\
    \ (lines 22–38) and take different actions according to the different keys. The\
    \ function’s `keyCode` parameter specifies the key number of the key that is pressed.\
    \ For example, the code in lines 24–26 is the handling code for the Left key.\
    \ It sets a horizontal flag to “left” and then calls the self-defined function\
    \ `moveCircleByPressKey` of the view class to move the circle in lines 39 and\
    \ 40. To allow other key-press-down events to be addressed, you call the system’s\
    \ default handler to deal with other keys in lines 36 and 37.\n\n# Dialog Boxes\
    \ in Android\n\nThere are three different ways to use dialog boxes in Android,\
    \ as discussed in this section.\n\n## Using an Activity’s Dialog Theme\n\nThe\
    \ `Dialog` class implements a simple floating window that can be created in an\
    \ activity. By using a basic `Dialog` class, you can create a new instance and\
    \ set its title and layout. Dialog themes can be applied to a normal activity\
    \ to make it look similar to a dialog box.\n\nIn addition, the `Activity` class\
    \ provides a convenient mechanism to create, save, and restore dialogs, such as\
    \ `onCreateDialog(int)`, `onPrepareDialog(int, Dialog)`, `showDialog(int)`, `dismissDialog(int)`,\
    \ and other functions. If you use these functions, the activity can return the\
    \ `Activity` object that manages the dialog through the `getOwnerActivity()` method.\n\
    \nThe following are specific instructions for using these functions.\n\n### `onCreateDialog(int)`\
    \ Function\n\nWhen you use this callback function, Android sets this activity\
    \ as the owner of each dialog box, which automatically manages the state of each\
    \ dialog box and anchors it to the activity. In this way, each dialog inherits\
    \ the specific attributes of this activity. For example, when a dialog box is\
    \ opened, the menu button displays the option menu defined for the activity. For\
    \ example, you can use the volume keys to modify the audio stream that the activity\
    \ uses.\n\n### `showDialog(int)` Function\n\nWhen you want to display a dialog\
    \ box, you call the `showDialog(intid)` method and pass an integer through this\
    \ function call that uniquely identifies this dialog. When the dialog box is first\
    \ requested, Android calls `onCreateDialog(intid)` from the activity. You should\
    \ initialize this dialog box. This callback method is passed to the same ID that\
    \ `showDialog(intid)` has. When you create the dialog box, the object is returned\
    \ at the end of the activity.\n\n### `onPrepareDialog(int, Dialog)` Function\n\
    \nBefore the dialog box is displayed, Android also calls the optional callback\
    \ function `onPrepareDialog(int id, Dialog)`. If you want the properties to be\
    \ changed every time a dialog box is opened, you can define this method. Unlike\
    \ the `onCreateDialog(int)` function, which can only be called the first time\
    \ you open the dialog box, this method is called each time you open the dialog\
    \ box. If you do not define `onPrepareDialog()`, then the dialog remains the same\
    \ as the last time it was opened. The dialog box’s ID and the dialog object created\
    \ in `onCreateDialog()` can also be passed to the function by this method.\n\n\
    ### `dismissDialog(int)` Function\n\nWhen you are ready to close the dialog box,\
    \ you can call `dismiss()` through this dialog box method to eliminate it. If\
    \ desired, you can also call `dismissDialog(int id)` method from the activity.\
    \ If you want to use the `onCreateDialog(int id)` method to retain the state of\
    \ your dialog box, then each time the dialog box is eliminated, the status of\
    \ the object of this dialog box object is kept in the activity. If you decide\
    \ that you no longer need this object or clear the state, then you should call\
    \ `removeDialog(intid)`. This removes any internal object references, and even\
    \ if the dialog box is being displayed, it is eliminated.\n\n## Using a Specific\
    \ Dialog Class\n\nAndroid provides multiple classes that are expansions of the\
    \ `Dialog` class, such as `AlertDialog`, `ProgressDialog`, and so on. Each class\
    \ is designed to provide specific dialog box functions. The screen interface based\
    \ on the `Dialog` class is created in all activities that then call the specific\
    \ class. So it does not need to be registered in the manifest file, and its life\
    \ cycle is controlled by the activity that calls the class.\n\n## Using Toast\
    \ Reminders\n\nToasts are special, nonmodular, transient message dialog boxes,\
    \ usually used in the broadcast receiver and background services, and used to\
    \ prompt user events.\n\n## Dialog Box Example\n\nOf the dialog box methods discussed,\
    \ if it is measured by how the implementation of the function is done, the first\
    \ function is the most powerful, followed by the second and third. In terms of\
    \ the degree of sophistication of the implementation code, the third method is\
    \ the simplest, and the first and the second are more complex.\n\nThe following\
    \ example demonstrates the second method. See Android’s help documentation and\
    \ samples (in the `samples` directory located under the Android SDK installation\
    \ directory) to learn more about the other implementation methods.\n\nThe specific\
    \ dialog box class that this sample application uses is the `Builder` inner class\
    \ of `AlertDialog`. When you press the Back button, a dialog box pops up, allowing\
    \ you to decide whether to exit the application. The application interface is\
    \ shown in [Figure 4-6](#9781484203835_Ch04.xhtml#Fig6). Using the Android dialog\
    \ box in this example will help you understand its usage.\n\n![9781484203835_Fig04-06.jpg](images/9781484203835_Fig04-06.jpg)\n\
    \n[Figure 4-6](#9781484203835_Ch04.xhtml#_Fig6). The application interface with\
    \ an Exit dialog box\n\nThe application starts and displays the main activity\
    \ interface, as shown in [Figure 4-6(a)](#9781484203835_Ch04.xhtml#Fig6). When\
    \ you press the device’s Back button, the Exit dialog box pops up, as shown in\
    \ [Figure 4-6(b)](#9781484203835_Ch04.xhtml#Fig6). When you click the Exit button,\
    \ the application exits, and the interface is also closed. When you click the\
    \ Cancel button, the application returns to the previous screen, similar to [Figure\
    \ 4-6(a)](#9781484203835_Ch04.xhtml#Fig6).\n\nModify the source code of the activity\
    \ class `MainActivity.java` to read as follows:\n\n```\nLine#        Source Code\n\
    1  package com.example.guiexam;\n2  import android.os.Bundle;\n3  import android.app.Activity;\n\
    4  import android.view.Menu;\n5  import android.view.KeyEvent;            // Key\
    \ event class\n6  import android.app.Dialog;               // Use Dialog class\n\
    7  import android.app.AlertDialog;          // Use AlertDialog class\n8  import\
    \ android.content.DialogInterface;  // Use DialogInterface interface\n\n9  public\
    \ class MainActivity extends Activity {\n10     private MyView theView = null;\
    \        // View objects stored inside\n       the variable\n11     private AlertDialog.Builder\
