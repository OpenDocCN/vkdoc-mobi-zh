    ## 关于首席项目编辑


    ![9781484203835_unFM-01.jpg](img/9781484203835_unFM-01.jpg)


    **瑞安·科恩**是负责领导创建此英特尔学习资源的国际内容贡献者团队的责任编辑；他也是一名 Android 爱好者，毕业于波特兰州立大学。自 2011 年从苹果
    iOS 平台转向 Android 以来，他一直关注 Android 的发展。在不撰写 Android 相关内容时，他会花时间研究 Android 世界中的一切新事物。


    ## 关于首席贡献作者


    ![9781484203835_unFM-02.jpg](img/9781484203835_unFM-02.jpg)


    **王涛**于 1993 年作为博士生来到美国，就读于俄勒冈州立大学。自 2002 年起，他一直是英特尔公司的软件工程师。王涛自 2008 年开始撰写关于
    Android 的博客和文章；自 2011 年起，他担任英特尔 Android 开发者专区（英特尔所有 Android 相关内容的开发者资源）的技术资料经理。在业余时间，王涛还经营着一家名为
    E-k12 的移动应用/客户端教育初创公司。他密切关注应用程序开发的最新进展，以及针对移动设备和 x86 平台上的 Android 进行测试/调试/性能优化。王涛精通多种平台，包括
    Android SDK 和 NDK；英特尔 Android 工具；游戏引擎如 Cocos2D-x、AndEngine 和 libgdx；OpenGL ES；RenderScript
    以及 Android Runtime。他的其他兴趣领域包括移动互联网技术，如在线内容管理、基于云的移动技术、嵌入式设备、机器人技术以及移动学习。


    ## 关于技术审校


    ![9781484203835_unFM-03.jpg](img/9781484203835_unFM-03.jpg)


    **泽维尔·阿拉德**是法国巴黎英特尔软件与服务集团的首席开发者布道师。自 2012 年基于英特尔平台的首款 Android 智能手机公开发布以来，他一直致力于帮助
    Android 开发者们更好地支持由英特尔制造或支持的新硬件和技术。


    ## 引言


    这本迷你书汇集了从《基于英特尔平台的 Android 应用程序开发》一书中抽取的四个章节，旨在向开发者介绍如何为其 Android 应用程序创建出色的用户界面。这些章节涵盖的主题包括：为桌面系统和嵌入式系统开发用户界面的差异，以及如何为触摸屏优化应用程序的用户界面。


    ## 第 1 章


    本章首先介绍了桌面系统通用的 GUI 设计方法，然后阐述了嵌入式系统的 UI 和 UX 设计有何不同。接着，讨论了 Android 应用程序 GUI 设计的一般方法和原则，以及如何为用户在
    Android 智能手机和平板电脑上的典型交互开发合适的用户界面。


    ## 第 2 章


    本章将通过引导你创建一个名为 `GuiExam` 的简单应用程序，来介绍 Android 的界面设计。你将学习活动（Activity）的状态转换、`Context`（上下文）类、意图（Intent）以及应用程序与活动（Activity）之间的关系。最后，本章展示了如何通过修改布局文件
    `activity_main.xml` 来使用布局作为界面，以及按钮、事件和内部事件监听器是如何工作的。


    ## 第 3 章


    在本章中，你将学习如何创建一个包含多个活动（Activity）的应用程序。该应用程序将用于介绍活动（Activity）的显式和隐式触发机制。接下来，你将看到一个由不同应用程序中的活动（Activity）触发并带有参数的应用程序示例，这将帮助你理解活动（Activity）参数的交换机制。


    ## 第 4 章


    本章介绍了在视图中进行绘制的基本框架、绘制框架如何响应触摸屏输入、如何控制视图的显示以及多点触控代码框架。示例将说明多点触控编程框架和键盘输入响应。你还将学习如何响应
    Android 设备上的硬件按钮，例如音量 +、音量 -、电源键、主页键、菜单键、返回键和搜索键。之后，你将了解 Android 中三种不同的对话框，包括活动（Activity）对话框主题、特定的对话框类和
    Toast 提醒。最后，你将学习如何更改应用程序的属性设置。


    # 第 1 章


    ![image](img/frontdot.jpg)


    ## Android 应用 GUI 设计，第 1 部分：总览


    自 20 世纪 80 年代问世以来，*图形用户界面*（GUI）的概念已成为*人机交互*（HCI）中不可或缺的一部分。随着嵌入式系统的发展，它也逐步采纳了这一概念。运行在英特尔凌动硬件平台上的
    Android 嵌入式操作系统正引领着这一潮流。


    由于资源有限，Android 系统的 GUI 设计比桌面系统更具挑战性。此外，用户对高质量用户体验有着更严格的要求和期望。界面设计已成为决定系统和应用在市场上成败的关键因素之一。本章介绍如何为
    Android 嵌入式系统开发适合典型用户交互的用户界面。


    ### 嵌入式应用 GUI 概述

