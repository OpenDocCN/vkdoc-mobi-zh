    toolbars, and dialog boxes. WIMP depends on screen, keyboard, and mouse devices
    to complete the interaction. For example, a mouse (or a device similar to a mouse,
    such as a light pen) is used for pointing, a keyboard is used to input characters,
    and a screen shows the output.


    In addition to screens, keyboards, mice, and other standard interaction hardware,
    desktop computers can be equipped with joysticks, helmets, data gloves, and other
    multimedia interactive devices to achieve multimedia computing functions. By installing
    cameras, microphones, speakers, and other devices, and by virtue of their powerful
    computing capabilities, users can interact with desktop computers in the form
    of voice, gestures, facial expressions, and other modalities.


    Desktop computers are also generally equipped with CD-ROM/DVDs and other large-capacity
    portable external storage devices. With these external storage devices, desktop
    computers can release software and verify ownership and certificates through CD/DVD.


    As a result of the embeddability and limited resources of embedded systems, as
    well as user demand for portability and mobility, Android systems have interaction
    modalities, methods, and capabilities that are distinct from those of desktop
    systems. Due to these characteristics and conditions, interaction on Android systems
    is more demanding and more difficult to achieve than it is on desktop systems.


    The main differences between Android devices and desktop computers are described
    next.


    Screens of Various Sizes, Densities, and Specifications


    Instead of large, high-resolution screens like those on desktop computers, Android
    device screens are smaller and have various dimensions and densities measured
    in dots per inch (DPI). For example, the K900 smartphone’s screen is 5.5 inches
    with a resolution of 1920 ×1080 pixels, and some smartphone screens are only 3.2
    inches.


    The aspect ratio of Android device screens is not the conventional aspect ration
    of 16:9 or 4:3 used by desktop computers. If Android devices adopted the interaction
    mode of desktop computers, many problems would result, such as a blurry display
    and errors in selecting targets.


    Keypads and Special Keys


    Desktop computers have full keyboards, where a key corresponds to every character
    and the generous distance between keys makes typing convenient. If an Android
    device has a keyboard, it’s usually a keypad instead of the full keyboard. Keypads
    have fewer keys than full keyboards; several characters generally share one key.
    A keypad’s keys are smaller and more tightly spaced than on full keyboards, making
    it harder to select and type characters. As a result, keypads are less convenient
    to use than full keyboards. In addition, some keypads provide special keys that
    are not found on standard full keyboards, so users must adjust their input on
    the Android device.


    Generally speaking, on Android devices, keys and buttons are a unified concept.
    Whether you press a button or a key, the action is processed as a keyboard event
    with a uniform numbering scheme. Keyboard events in Android have corresponding
    `android.view.KeyEvent` classes. [Figure 1-1](#9781484203835_Ch01.xhtml#Fig1)’s
    button/key callouts correspond to the event information listed in [Table 1-1](#9781484203835_Ch01.xhtml#Tab1).


    ![9781484203835_Fig01-01.jpg](images/9781484203835_Fig01-01.jpg)


    [Figure 1-1](#9781484203835_Ch01.xhtml#_Fig1). Keyboard and buttons of an Android
    phone


    [Table 1-1](#9781484203835_Ch01.xhtml#_Tab1). Android Event Information Corresponding
    to Key and Button Events


    ![Table1-1.jpg](images/Table1-1.jpg)


    See help documents like that for `android.view.KeyEvent` for details. [Table 1-1](#9781484203835_Ch01.xhtml#Tab1)’s
    contents are excerpts.


    Touch Screens and Styluses, in Place of Mice


    A *touch screen* is an input device covering a display device to record touch
    positions. By using the touch screen, users can have a more intuitive reaction
    to the information displayed. Touch screens are widely applied to Android devices
    and replace a mouse for user input. The most common types of touch screens are
    resistive touch screens, capacitive touch screens, surface acoustic wave touch
    screens, and infrared touch screens, with resistive and capacitive touch screens
    being most often applied to Android devices. Users can directly click videos and
    images on the screen to watch them.


    A stylus can be used to perform functions similar to touch. Some styluses are
    auxiliary tools for touch screens and replace fingers, helping users complete
    elaborate pointing, selecting, line drawing, and other operations, especially
    when the touch screen is small. Other styluses implement touch and input functions
    along with other system components. With the first type of auxiliary tool styluses,
    users can touch and input characters with fingers. But the second type of stylus
    is an indispensable input tool and is used instead of fingers.


    Touch and styluses can perform most functions that mice typically do, such as
    click and drag, but can’t achieve all the functions of mice, such as right-click
    and left-click/right-click at the same time. When designing embedded applications,
    you should control the interaction mode within the range of functions that touch
    screens or styluses can provide and avoid operations that are not available.


    Onscreen Keyboards


    *Onscreen keyboards*, also known as *virtual keyboards* or *soft keyboards*, are
    displayed on the screen via software. Users tap the virtual keys like they would
    tap the keys on physical keyboards.


    Few Multimodal Interactions


    *Multimodal interaction* refers to human-computer interaction with the modes involving
    the five human senses. It allows the user to interact through input modalities
    such as speech, handwriting, and hand gesture. Because computing capability is
    limited, Android devices generally do not adopt multimodal interaction.'
  trans: '

    # Android 用户界面与用户体验设计


    如今，软件的用户界面（UI）和用户体验（UX）正日益成为决定软件能否被用户接受并取得市场成功的关键因素。UX 设计需基于输入/输出或交互设备的类型，并必须符合其特性。与桌面计算机系统相比，Android
    系统拥有不同的交互设备和交互方式。如果盲目照搬桌面系统的 UI 设计，Android 设备将呈现糟糕的 UI 和难以忍受的 UX，令用户无法接受。此外，随着用户对出色用户体验的期望越来越高，开发者在设计系统
    UI 和 UX 时必须更加细致和谨慎，使其符合嵌入式应用的特点。


    本章首先介绍桌面系统通用的 GUI 设计方法，然后阐述嵌入式系统的 UI 设计有何不同，旨在帮助你快速掌握 Android 应用 GUI 设计的通用方法和原则。


    ## Android 设备交互方式的特点


    通用的桌面计算机拥有强大的输入/输出（或称交互）设备，例如大尺寸高分辨率屏幕、完整键盘和鼠标，以及多种交互方式。典型的桌面计算机屏幕至少 17 英寸，分辨率至少为
    1280 × 960 像素。键盘通常是完整键盘或增强型键盘。在完整键盘上，字母、数字和其他字符位于对应的按键上——即完整键盘提供了对应所有字符的按键。增强型键盘则带有额外的按键。完整键盘上按键间距约为
    19 毫米，便于用户进行选择。


    基于屏幕、键盘和鼠标的桌面计算机 GUI 交互模式被称为 WIMP（窗口、图标、菜单和指针），这是一种使用这些元素以及按钮、工具栏和对话框等交互元素的 GUI
    风格。WIMP 依赖屏幕、键盘和鼠标设备来完成交互。例如，鼠标（或类似鼠标的设备，如光笔）用于定位，键盘用于输入字符，屏幕显示输出。


    除了屏幕、键盘、鼠标等标准交互硬件外，桌面计算机还可以配备操纵杆、头盔、数据手套等多媒体交互设备，以实现多媒体计算功能。通过安装摄像头、麦克风、扬声器等设备，并借助其强大的计算能力，用户可以通过语音、手势、面部表情等方式与桌面计算机进行交互。


    桌面计算机通常还配备 CD-ROM/DVD 等大容量便携式外部存储设备。借助这些外部存储设备，桌面计算机可以通过 CD/DVD 发布软件并验证所有权和证书。


    由于嵌入式系统的嵌入性和资源有限性，以及用户对便携性和移动性的需求，Android 系统的交互方式、方法和能力与桌面系统截然不同。受这些特性和条件影响，Android
    系统上的交互比桌面系统要求更高，实现难度也更大。


    接下来将介绍 Android 设备与桌面计算机的主要区别。


    ### 多种尺寸、密度和规格的屏幕


    与桌面计算机的大尺寸高分辨率屏幕不同，Android 设备屏幕更小，且具有多种尺寸和密度（以每英寸点数 DPI 衡量）。例如，K900 智能手机的屏幕为 5.5
    英寸，分辨率为 1920×1080 像素，而有些智能手机的屏幕仅为 3.2 英寸。


    Android 设备屏幕的宽高比并非桌面计算机常用的 16:9 或 4:3。如果 Android 设备沿用桌面计算机的交互模式，将会导致许多问题，例如显示模糊和选择目标时出现错误。


    ### 键盘与特殊按键


    桌面计算机拥有完整键盘，每个字符对应一个按键，且按键间距宽敞，便于打字。如果 Android 设备配有键盘，通常是小键盘而非完整键盘。小键盘的按键比完整键盘少；通常多个字符共用一个按键。小键盘的按键比完整键盘更小、排列更紧密，导致选择和输入字符更加困难。因此，小键盘使用起来不如完整键盘方便。此外，某些小键盘还提供标准完整键盘上没有的特殊按键，因此用户必须在
    Android 设备上调整输入方式。


    一般而言，在 Android 设备上，按键和按钮是统一的概念。无论按下按钮还是按键，该操作都会以具有统一编号方案的键盘事件方式处理。Android 中的键盘事件对应
    `android.view.KeyEvent` 类。图 1-1 中的按钮/按键标识对应着表 1-1 中列出的事件信息。


    ![9781484203835_Fig01-01.jpg](img/9781484203835_Fig01-01.jpg)


    图 1-1. Android 手机的键盘与按钮


    表 1-1. 按键与按钮事件对应的 Android 事件信息


    ![Table1-1.jpg](img/Table1-1.jpg)


    详细信息请参阅 `android.view.KeyEvent` 等帮助文档。表 1-1 的内容为摘录。


    ### 触摸屏与触控笔替代鼠标


    *触摸屏*是一种覆盖在显示设备上、用于记录触摸位置的输入设备。通过使用触摸屏，用户可以对显示的信息做出更直观的反应。触摸屏广泛应用于 Android 设备，并取代鼠标进行用户输入。最常见的触摸屏类型有电阻式触摸屏、电容式触摸屏、表面声波触摸屏和红外触摸屏，其中电阻式和电容式触摸屏最常应用于
    Android 设备。用户可以直接点击屏幕上的视频和图像进行观看。


    触控笔可用于实现类似触摸的功能。某些触控笔是触摸屏的辅助工具，替代手指，帮助用户完成精细的定位、选择、画线等操作，尤其是在触摸屏较小时。另一些触控笔则与其他系统组件共同实现触摸和输入功能。对于第一类辅助工具型触控笔，用户可以用手指进行触摸和字符输入。但第二类触控笔是不可或缺的输入工具，用于替代手指。


    触摸和触控笔可以执行大多数鼠标的典型功能，例如点击和拖拽，但无法实现鼠标的所有功能，例如右键单击以及同时左键/右键单击。在设计嵌入式应用时，应将交互方式控制在触摸屏或触控笔能够提供的功能范围内，并避免使用不可用的操作。


    ### 屏幕键盘


    *屏幕键盘*，也称为*虚拟键盘*或*软键盘*，通过软件显示在屏幕上。用户像敲击物理键盘上的按键一样点击虚拟按键。


    ### 有限的多模态交互


    *多模态交互*指涉及人类五种感官模式的人机交互。它允许用户通过语音、手写、手势等输入方式与系统交互。由于计算能力有限，Android 设备通常不采用多模态交互。

    '
- fmt: '# 少数大容量便携式外部存储设备


    大多数 Android 设备没有 CD-ROM/DVD 驱动器、硬盘或其它大容量便携式存储外设（例如固态硬盘，SSD），而这些通常是台式计算机的标准配置。这些设备无法在
    Android 设备上用于安装软件或验证所有权和证书。然而，Android 设备通常支持容量高达 128 GB 的 microSD 卡；并且越来越多基于云的存储解决方案（如
    Dropbox、One Drive 和 Google Drive）正在为 Android 设备开发，其兼容的 Android 客户端应用程序可从 Google
    Play Store 下载。


    # 嵌入式系统的 UI 设计原则


    本节介绍将传统桌面应用程序转换为嵌入式应用程序时的交互设计问题及纠正措施。


    ## 屏幕尺寸的考量


    与台式计算机系统相比，Android 系统的屏幕较小，且具有不同的显示密度和纵横比。这种屏幕差异导致将应用程序从桌面系统迁移到 Android 系统时出现许多问题。如果开发者按比例缩小桌面系统的屏幕，图形元素会变得太小而无法清晰可见。特别是，通常难以看清文本和图标、选择和点击某些按钮，以及将某些应用程序图片适当地放置在屏幕上。如果开发者在不改变尺寸的情况下将应用程序的图形元素迁移到
    Android 系统，屏幕空间有限，只能容纳少量图形元素。


    ## 文本和图标的大小


    另一个问题是文本和图标的大小。当应用程序从典型的 15 英寸台式机屏幕缩小到典型的 5 英寸或 7 英寸手机或平板电脑屏幕时，其文本会变得太小而无法看清。除了文本字体的大小，文本窗口（例如聊天窗口）也会变得太小而无法阅读文本。试图缩小字体大小以适配更小的窗口会使文本难以识别。


    因此，嵌入式系统的设计应尽可能少地使用文本提示信息；例如，用图形或声音信息替代文本。此外，在必要使用文本的地方，文本大小应可调整。在 Android 上，`res`目录中提供了一些预定义的字体和图标，例如`drawable-hdpi`、`drawable-mdpi`和`drawable-xhdpi`。


    ## 按钮及其它图形元素的可点击性


    与文本过小的问题类似，按钮和其它图形元素在迁移应用程序时也会带来交互问题。在桌面系统上，按钮的大小是为鼠标点击设计的，而在 Android 系统上，按钮的大小应适合手指（在触摸屏上）或触控笔。因此，在移植基于
    Windows 的应用程序以支持 Android 设备时，需要重新设计应用 UI；并且应选择 Android SDK 提供的预定义可绘制对象，以适应手指或触控笔。


    开发者应使用更大、更清晰的按钮或图形元素来避免此类问题，并在图形元素之间留出足够的间隙以避免错误——这些错误在使用小型触摸屏通过手指或触控笔进行选择时很常见。此外，如果应用程序在按钮附近有文本标签，这些标签应是按钮所连接的可点击区域的一部分，以便按钮更易于点击。


    ## 应用程序窗口的大小


    许多应用程序（例如游戏）使用固定大小的窗口，而不是自动调整以填满任何尺寸屏幕的窗口。当这些应用程序迁移到 Android 系统时，由于屏幕的纵横比与其分辨率不匹配，部分图片可能无法显示，或部分区域可能无法触及。


    这些问题在智能手机和平板电脑上可能更加复杂，因为它们的屏幕具有各种密度，例如 small（426 dp × 320 dp）、normal（470 dp ×
    320 dp）、large（640 dp × 480 dp）和 extra large（960 dp × 720 dp）。它们的纵横比多种多样，且与桌面系统常用的纵横比不同。


    解决此类问题的一个好方法是，将整个应用程序窗口按比例放置在智能手机或平板电脑屏幕上，例如 large 和 extra large 屏幕（通常为 640 ×
    480 像素和 960 × 720 像素）；或者重新排列 UI 以充分利用整个宽屏区域；或者使整个应用窗口成为可滚动视图。此外，您可以允许用户使用多点触控手指来放大、缩小或在屏幕上移动应用程序窗口。


    ## 由触摸屏和触控笔引发的考量


    如前所述，许多 Android 系统使用触摸屏和触控笔来执行一些传统的鼠标功能。此类输入设备被称为*仅轻触式触摸屏*。然而，仅轻触式触摸屏无法提供所有鼠标功能。没有右键，并且当屏幕未被触摸时，无法捕获当前手指/触控笔的位置。因此，允许诸如无点击移动光标、左键点击与右键点击的不同操作等功能的桌面应用程序，无法在使用触摸屏和触控笔的
    Android 系统上实现。


    以下部分讨论了将应用程序从桌面系统迁移到使用仅轻触式触摸屏的 Android 系统时常见的几个问题。


    ### 在仅轻触式触摸屏上正确解释光标（鼠标）的移动和输入


    许多应用程序在未按下鼠标键时需要鼠标移动信息。此操作称为*无点击移动光标*。例如，许多 PC 射击游戏[¹](#9781484203835_Ch01.xhtml#Fn1)模拟用户的视野，使得无点击移动鼠标被解释为移动游戏玩家的视野；但光标应始终位于新视野的中央。然而，配备仅轻触式触摸屏的嵌入式设备不支持无点击移动光标的操作。一旦用户的手指触摸屏幕，就会触发一个轻触事件。当用户在屏幕上移动手指时，会触发一系列不同位置的轻触事件；这些事件被现有游戏代码解释为额外的交互事件（即移动游戏玩家枪支的瞄准位置）。


    在将此类型应用程序迁移到 Android 系统时，需要修改原始的交互模式。例如，可以将此问题修改为点击操作：一旦用户触摸屏幕，游戏屏幕应立即切换到光标位于屏幕中央的视野。这样，光标始终显示在屏幕中央，而不是用户实际触摸的位置。在移动平台上您受益的一个优势是，市面上的大多数智能手机和平板电脑都配备了加速计、陀螺仪、GPS
    传感器和指南针等传感器，并且允许应用程序从传感器读取数据。因此，开发者除了触摸输入之外还有更多选择。


    更一般地，如果应用程序需要跟踪光标从点 A 到点 B 的移动，仅轻触式触摸屏可以将此输入定义为用户先点击点 A，然后点击点 B，而无需跟踪点 A 与点 B
    之间的移动。


    ### 正确设置屏幕映射


    许多应用程序以全屏模式运行。如果此类应用程序不能完美地填满整个仅轻触式触摸屏（即，它们比屏幕小或大），则会导致输入映射错误：显示位置与点击位置之间存在偏差。'
  raw: 'Few Large-Capacity Portable External Storage Devices


    Most Android devices do not have the CD-ROM/DVD drives, hard disks, or other large-capacity
    portable storage peripherals such as solid-state drives (SSDs) that are usually
    configured on desktop computers. These devices cannot be used on Android devices
    to install software or verify ownership and certificates. However, Android devices
    usually support microSD cards, which now have capacities of up to 128 GB; and
    more and more cloud-based storage solutions such as Dropbox, One Drive, and Google
    Drive are being developed for Android devices, with Android-compatible client
    apps available for download from Google Play Store.


    UI Design Principles for Embedded Systems


    This section introduces interactive design issues and corrective measures to take
    when transforming traditional desktop applications to embedded applications.


    Considerations of Screen Size


    Compared to desktop computer systems, Android systems have smaller screens with
    different display densities and aspect ratios. Such screen differences result
    in many problems when migrating applications from desktop systems to Android systems.
    If developers reduce desktop system screens proportionally, the graphic elements
    become too small to be seen clearly. In particular, it is often difficult to see
    the text and icons, select and click some buttons, and place some application
    pictures on the screen appropriately. If developers migrate application graphic
    elements to Android systems without changing their sizes, the screen space is
    limited and can only accommodate a few of the graphic elements.


    Size of Text and Icons


    Another problem is the size of text and icons. When an application is reduced
    from a typical 15-inch desktop screen to a typical 5- or 7-inch phone or tablet
    screen, its text is too small to be seen clearly. In addition to the size of the
    text font, the text window (such as a chat window) also becomes too small to read
    the text. Trying to reduce the font size to suit smaller windows makes the text
    hard to recognize.


    Therefore, the design of embedded systems should use as few text prompt messages
    as possible; for example, replace the text with graphic or sound information.
    In addition, where text is necessary, the text size should be adjustable. On Android,
    some predefined fonts and icons are available in the `res` directory, such as
    `drawable-hdpi`, `drawable-mdpi`, and `drawable-xhdpi`.


    Clickability of Buttons and Other Graphical Elements


    Similar to the problem of small text, buttons and other graphical elements also
    bring interaction problems when migrating applications. On desktop systems, the
    size of buttons is designed for mouse clicks, whereas on Android systems, the
    button size should be suitable for fingers (on touch screens) or styluses. Therefore,
    when porting a Windows-based app to support Android devices, the application UI
    needs to be redesigned; and predefined drawables provided by the Android SDK should
    be selected in order to suit fingers or styluses.


    Developers should use bigger and clearer buttons or graphic elements to avoid
    such problems and leave enough gap between graphic elements to avoid errors, which
    are common when a small touch screen is used for selecting by fingers or styluses.
    In addition, if an application has text labels near buttons, the labels should
    be part of the clickable area connected with the buttons, so the buttons are easier
    to click.


    Size of Application Windows


    Many applications, such as games, use windows with fixed sizes instead of windows
    that automatically adjust to fill any size screen. When these applications are
    migrated to Android systems, because the screen’s aspect ratio does not match
    its resolution, part of the picture may not be seen, or part of the area may not
    be reachable.


    These problems may be more complicated on smartphones and tablets because their
    screens have various densities such as small (426 dp × 320 dp), normal (470 dp
    × 320 dp), large (640 dp × 480 dp), and extra large (960 dp × 720 dp). Their aspect
    ratios are diverse and different from those commonly adopted by desktop systems.


    One good way to solve such problems is to place the entire application window
    proportionally on the smartphone or tablet screen, such as the large and extra-large
    screens, which are typically 640 × 480 pixels and 960 × 720 pixels; or rearrange
    the UI to make full use of the entire widescreen area; or make the entire app
    window a scrollable view. In addition, you can allow users to use multiple touch
    fingers touch to zoom in, zoom out, or move the application window on the screen.


    Considerations Arising from Touch Screens and Styluses


    As mentioned earlier, touch screens and styluses are used on many Android systems
    to perform some traditional mouse functions. Such input devices are called *tap-only
    touch screens*. However, tap-only touch screens cannot provide all mouse functions.
    There is no right button, and the current finger/stylus location cannot be captured
    when the screen is not touched. So, desktop applications that allow functions
    such as cursor moves without clicking, different operations for left-clicks and
    right-clicks, and so on, cannot be realized on Android systems using touch screens
    and styluses.


    The following sections talk about several problems often seen when migrating applications
    from desktop systems to Android systems using tap-only touch screens.


    Correctly Interpreting the Movement and Input of the Cursor (Mouse) on Tap-Only
    Touch Screens


    Many applications need mouse movement information when no mouse key is pressed.
    This operation is called *moving the cursor without clicking*. For example, a
    lot of PC shooting games[¹](#9781484203835_Ch01.xhtml#Fn1) simulate the user’s
    field of vision such that moving the mouse without clicking is interpreted as
    moving the game player’s vision field; but the cursor should always stay in the
    middle of the new vision field. However, an embedded device with a tap-only touch
    screen does not support the operation of moving the cursor without clicking. Once
    the user’s finger touches the screen, a tap event is triggered. When the user
    moves a finger on the screen, a series of tap events at different positions is
    triggered; these events are interpreted by the existing game code as additional
    interaction events (that is, moving the aiming position of the game player’s gun).


    The original interaction mode needs to be modified when migrating this type of
    application to Android systems. For example, this problem can be modified into
    a click operation: once the user touches the screen, the game screen should immediately
    switch to the vision field, in which the cursor is located at the screen center.
    This way, the cursor is always displayed at the screen center and not at the position
    the user actually touched. One advantage you benefit from on mobile platforms
    is that most smartphones and tablets on the market are equipped with sensors such
    as accelerometers, gyroscopes, GPS sensors, and compasses, and they allow applications
    to read data from the sensors. As a result, developers have more options than
    just touch input.


    More generally, if an application needs to track the cursor’s movement from point
    A to point B, the tap-only touch screen can define this input by the user clicking
    first point A and then point B, without the need to track the movement between
    point A and point B.


    Setting Screen Mapping Correctly


    Many applications run in full-screen mode. If such applications do not perfectly
    fill the entire tap-only touch screen (that is, they are smaller or bigger than
    the screen), input mapping errors result: there is a deviation between the display
    position and the click position.'
  trans: '

    # 少数大容量便携式外部存储设备


    大多数 Android 设备没有 CD-ROM/DVD 驱动器、硬盘或其它大容量便携式存储外设（例如固态硬盘，SSD），而这些通常是台式计算机的标准配置。这些设备无法在
    Android 设备上用于安装软件或验证所有权和证书。然而，Android 设备通常支持容量高达 128 GB 的 microSD 卡；并且越来越多基于云的存储解决方案（如
    Dropbox、One Drive 和 Google Drive）正在为 Android 设备开发，其兼容的 Android 客户端应用程序可从 Google
    Play Store 下载。


    # 嵌入式系统的 UI 设计原则


    本节介绍将传统桌面应用程序转换为嵌入式应用程序时的交互设计问题及纠正措施。


    ## 屏幕尺寸的考量


    与台式计算机系统相比，Android 系统的屏幕较小，且具有不同的显示密度和纵横比。这种屏幕差异导致将应用程序从桌面系统迁移到 Android 系统时出现许多问题。如果开发者按比例缩小桌面系统的屏幕，图形元素会变得太小而无法清晰可见。特别是，通常难以看清文本和图标、选择和点击某些按钮，以及将某些应用程序图片适当地放置在屏幕上。如果开发者在不改变尺寸的情况下将应用程序的图形元素迁移到
    Android 系统，屏幕空间有限，只能容纳少量图形元素。


    ## 文本和图标的大小


    另一个问题是文本和图标的大小。当应用程序从典型的 15 英寸台式机屏幕缩小到典型的 5 英寸或 7 英寸手机或平板电脑屏幕时，其文本会变得太小而无法看清。除了文本字体的大小，文本窗口（例如聊天窗口）也会变得太小而无法阅读文本。试图缩小字体大小以适配更小的窗口会使文本难以识别。


    因此，嵌入式系统的设计应尽可能少地使用文本提示信息；例如，用图形或声音信息替代文本。此外，在必要使用文本的地方，文本大小应可调整。在 Android 上，`res`目录中提供了一些预定义的字体和图标，例如`drawable-hdpi`、`drawable-mdpi`和`drawable-xhdpi`。


    ## 按钮及其它图形元素的可点击性


    与文本过小的问题类似，按钮和其它图形元素在迁移应用程序时也会带来交互问题。在桌面系统上，按钮的大小是为鼠标点击设计的，而在 Android 系统上，按钮的大小应适合手指（在触摸屏上）或触控笔。因此，在移植基于
    Windows 的应用程序以支持 Android 设备时，需要重新设计应用 UI；并且应选择 Android SDK 提供的预定义可绘制对象，以适应手指或触控笔。


    开发者应使用更大、更清晰的按钮或图形元素来避免此类问题，并在图形元素之间留出足够的间隙以避免错误——这些错误在使用小型触摸屏通过手指或触控笔进行选择时很常见。此外，如果应用程序在按钮附近有文本标签，这些标签应是按钮所连接的可点击区域的一部分，以便按钮更易于点击。


    ## 应用程序窗口的大小


    许多应用程序（例如游戏）使用固定大小的窗口，而不是自动调整以填满任何尺寸屏幕的窗口。当这些应用程序迁移到 Android 系统时，由于屏幕的纵横比与其分辨率不匹配，部分图片可能无法显示，或部分区域可能无法触及。


    这些问题在智能手机和平板电脑上可能更加复杂，因为它们的屏幕具有各种密度，例如 small（426 dp × 320 dp）、normal（470 dp ×
    320 dp）、large（640 dp × 480 dp）和 extra large（960 dp × 720 dp）。它们的纵横比多种多样，且与桌面系统常用的纵横比不同。


    解决此类问题的一个好方法是，将整个应用程序窗口按比例放置在智能手机或平板电脑屏幕上，例如 large 和 extra large 屏幕（通常为 640 ×
    480 像素和 960 × 720 像素）；或者重新排列 UI 以充分利用整个宽屏区域；或者使整个应用窗口成为可滚动视图。此外，您可以允许用户使用多点触控手指来放大、缩小或在屏幕上移动应用程序窗口。


    ## 由触摸屏和触控笔引发的考量


    如前所述，许多 Android 系统使用触摸屏和触控笔来执行一些传统的鼠标功能。此类输入设备被称为*仅轻触式触摸屏*。然而，仅轻触式触摸屏无法提供所有鼠标功能。没有右键，并且当屏幕未被触摸时，无法捕获当前手指/触控笔的位置。因此，允许诸如无点击移动光标、左键点击与右键点击的不同操作等功能的桌面应用程序，无法在使用触摸屏和触控笔的
    Android 系统上实现。


    以下部分讨论了将应用程序从桌面系统迁移到使用仅轻触式触摸屏的 Android 系统时常见的几个问题。


    ### 在仅轻触式触摸屏上正确解释光标（鼠标）的移动和输入


    许多应用程序在未按下鼠标键时需要鼠标移动信息。此操作称为*无点击移动光标*。例如，许多 PC 射击游戏¹模拟用户的视野，使得无点击移动鼠标被解释为移动游戏玩家的视野；但光标应始终位于新视野的中央。然而，配备仅轻触式触摸屏的嵌入式设备不支持无点击移动光标的操作。一旦用户的手指触摸屏幕，就会触发一个轻触事件。当用户在屏幕上移动手指时，会触发一系列不同位置的轻触事件；这些事件被现有游戏代码解释为额外的交互事件（即移动游戏玩家枪支的瞄准位置）。


    在将此类型应用程序迁移到 Android 系统时，需要修改原始的交互模式。例如，可以将此问题修改为点击操作：一旦用户触摸屏幕，游戏屏幕应立即切换到光标位于屏幕中央的视野。这样，光标始终显示在屏幕中央，而不是用户实际触摸的位置。在移动平台上您受益的一个优势是，市面上的大多数智能手机和平板电脑都配备了加速计、陀螺仪、GPS
    传感器和指南针等传感器，并且允许应用程序从传感器读取数据。因此，开发者除了触摸输入之外还有更多选择。


    更一般地，如果应用程序需要跟踪光标从点 A 到点 B 的移动，仅轻触式触摸屏可以将此输入定义为用户先点击点 A，然后点击点 B，而无需跟踪点 A 与点 B
    之间的移动。


    ### 正确设置屏幕映射


    许多应用程序以全屏模式运行。如果此类应用程序不能完美地填满整个仅轻触式触摸屏（即，它们比屏幕小或大），则会导致输入映射错误：显示位置与点击位置之间存在偏差。

    '
- fmt: '在将全屏应用程序迁移到低宽高比的纯触摸屏时，一种常见情况是应用程序窗口在屏幕上居中显示，两侧出现空白区域。例如，当一个分辨率为`640 × 480`（或`800
    × 600`）像素的桌面应用程序窗口被迁移到分辨率为`960 × 720`（或`1280 × 800`，即戴尔 Venue 8 上的 WXGA）像素的纯触摸屏时，其在屏幕上的显示效果如[图
    1-2](#9781484203835_Ch01.xhtml#Fig2)所示。由此产生的映射错误会导致应用程序无法正确响应用户交互。当用户点击黄色箭头（目标）的位置时，应用程序识别到的位置是红色爆炸图标所在的点。当用户点击按钮时，也会出现类似的错误。


    ![9781484203835_Fig01-02.jpg](images/9781484203835_Fig01-02.jpg)


    [图 1-2](#9781484203835_Ch01.xhtml#_Fig2). 低宽高比导致的屏幕映射错误


    即使空白区域不属于迁移应用程序的窗口，您也应考虑位置映射逻辑并将此空白区域纳入考量。通过进行这些更改，纯触摸屏可以正确映射触摸位置。


    另一种情况发生在桌面全屏窗口迁移到较高宽高比的纯触摸屏时。原始应用程序窗口的高度无法适配纯触摸屏，映射错误会发生在垂直方向而非水平方向。


    [图 1-3](#9781484203835_Ch01.xhtml#Fig3)展示了原始应用程序窗口在水平方向上填满屏幕，但在较高宽高比的纯触摸屏上垂直方向未能填满的情况。此时，当用户点击黄色箭头（目标）的位置时，应用程序识别到的位置是红色爆炸图标所在的点。这些错误是由物理显示屏与应用程序窗口之间的形状差异造成的。


    ![9781484203835_Fig01-03.jpg](images/9781484203835_Fig01-03.jpg)


    [图 1-3](#9781484203835_Ch01.xhtml#_Fig3). 高宽高比导致的屏幕映射错误


    一种解决方案是确保操作系统能够将纯触摸屏准确映射到屏幕的整个可视区域。操作系统提供特殊服务来完成屏幕拉伸和鼠标位置映射。另一种解决方案是在应用程序开发之初，就考虑允许配置选项以支持
    Android SDK 提供的预置显示密度和宽高比，例如分辨率为`640 × 480`、`960 × 720`或`1,080 × 800`像素的屏幕。这样，如果最终尺寸变形在可接受范围内，应用程序可以自动拉伸窗口以覆盖整个屏幕。


    ## 如何解决悬停问题


    许多应用程序支持悬停操作：即用户可以将鼠标悬停在某个对象上，或将鼠标定位在应用程序图标上，以触发动画项目或显示工具提示。此操作通常用于为游戏中的新玩家提供指导；但它与纯触摸屏的特性不兼容，因为纯触摸屏不支持鼠标悬停操作。


    您应考虑选择替代事件来触发动画或提示。例如，当用户触摸应用程序的操作时，相关的动画主题和提示会自动触发。另一种方法是设计一种界面交互模式，将触摸事件临时解释为鼠标悬停事件。例如，按下某个按钮并移动光标的操作将不会被解释为点击操作。


    ## 提供右键单击功能


    如前所述，纯触摸屏通常不支持鼠标右键单击操作。一种常用的替代方案是使用延迟触摸（比点击时间长得多）来表示右键单击。如果用户过早松开手指，这可能导致错误的操作。此外，这种方法无法同时执行左键单击和右键单击（也称为*双击*）。


    您应提供一个可以替代右键单击功能的用户交互界面：例如，使用双击或在屏幕上安装一个可点击控件来替代右键单击。


    ## 键盘输入问题


    如前所述，台式计算机使用全尺寸键盘，而 Android 系统通常拥有更简单的键盘、按钮面板、用户可编程按钮以及有限数量的其他输入设备。这些限制在嵌入式应用程序设计时导致了一些在桌面系统中不会出现的问题。


    ### 限制各种命令的输入


    Android 系统上的键盘限制使用户难以输入大量字符。因此，要求用户输入大量字符的应用程序，特别是那些依赖于命令输入的应用程序，在迁移到 Android
    系统时需要进行适当的调整。


    一种解决方案是提供一种输入模式，通过减少命令数量或选择性地使用便捷工具（如菜单项快捷键）来限制字符数量。一种更灵活的解决方案是在屏幕上创建命令按钮，尤其是上下文相关按钮（即仅在需要时才出现的按钮）。


    ### 满足键盘需求


    应用程序需要键盘输入，例如命名文件、创建个人数据、保存进度以及支持在线聊天。大多数应用程序倾向于使用屏幕键盘输入字符，但屏幕键盘并不总是在应用程序界面前端运行或显示，这使得字符输入问题难以解决。


    一种解决方案是为应用程序设计一种与屏幕键盘应用程序没有明显冲突的模式（例如，不使用全屏默认操作模式），或者在 UI 中提供一个仅在需要时出现的屏幕键盘。另一种减少键盘输入的简单方法是提供默认文本字符串值，例如个人数据的默认名称和已保存文件的默认名称，并允许用户通过触摸来选择。要获取文本字符串所需的其他信息（例如，文件名的前缀和后缀），可以添加一个选择按钮，该按钮提供您已建立的字符串列表，用户可从中选择。保存文件的名称也可以通过组合从屏幕提取的各种用户信息项来唯一获取，甚至可以使用日期时间戳。某些文本输入服务（如聊天服务）如果并非应用程序的核心功能，则应禁用。这不会对用户体验造成负面影响。


    ## 软件分发和版权保护问题


    台式计算机通常配备 CD-ROM/DVD 驱动器，其软件通常通过 CD/DVD 分发。此外，出于反盗版目的，CD/DVD 安装通常要求用户验证光盘所有权或从
    CD/DVD 动态加载内容，尤其是视频文件。然而，Android 系统（例如智能手机和平板电脑）通常没有 CD-ROM/DVD 驱动器；Android 确实支持外部
    microSD 卡，但仍不支持从中直接安装应用程序。'
  raw: 'One situation that often occurs in migrating a full-screen application to
    a tap-only touch screen with a low aspect ratio is the application window being
    centered on the screen with blank space showing on both sides. For example, when
    a desktop application window with a resolution of 640 × 480 (or 800 × 600) pixels
    is migrated to a tap-only touch screen with a resolution of 960 × 720 (or 1280
    × 800, a WXGA on Dell Venue 8) pixels, it appears on the screen as shown in [Figure
    1-2](#9781484203835_Ch01.xhtml#Fig2). The resulting mapping errors cause the app
    to incorrectly respond to user interaction. When the user taps the position of
    the yellow arrow (the target), the position identified by the application is the
    point where the red explosion icon is located. These kinds of errors also occur
    when the user taps a button.


    ![9781484203835_Fig01-02.jpg](images/9781484203835_Fig01-02.jpg)


    [Figure 1-2](#9781484203835_Ch01.xhtml#_Fig2). Screen-mapping errors due to a
    low aspect ratio


    You should consider the position-mapping logic and take this blank space into
    consideration, even if the blank space is not part of the migrating application’s
    window. By making these changes, the tap-only touch screen can map the touch position
    correctly.


    Another situation occurs when the desktop full-screen window is migrated to a
    tap-only touch screen with a higher aspect ratio. The height of the original application
    window does not fit on the tap-only touch screen, and mapping errors occur in
    the vertical direction instead of the horizontal direction.


    [Figure 1-3](#9781484203835_Ch01.xhtml#Fig3) shows the original application window
    filling the screen horizontally but not vertically on a tap-only touch screen
    with a higher aspect ratio. Here, when the user taps the position of the yellow
    arrow (the target), the position identified by the application is the point where
    the red explosion icon is located. These errors are caused by the difference in
    shape between the physical display and the application window.


    ![9781484203835_Fig01-03.jpg](images/9781484203835_Fig01-03.jpg)


    [Figure 1-3](#9781484203835_Ch01.xhtml#_Fig3). Screen-mapping errors due to a
    high aspect ratio


    One solution is to ensure that the OS accurately maps the tap-only touch screen
    to the entire visible area of the screen. The OS provides special services to
    complete the screen stretching and mouse position mapping. Another solution is
    to consider, at the beginning of application development, allowing configuration
    options to support preconfigured display densities and aspect ratios provided
    by the Android SDK, such as screens with a resolution of 640 × 480, 960 × 720,
    or 1,080 × 800 pixels. This way, if the final dimension deformation is acceptable,
    the application may automatically stretch the window to cover the whole screen.


    How to Solve Hover-Over Problems


    Many applications allow hover-over operations: that is, users can place the mouse
    over a certain object or locate the mouse over an application icon to trigger
    an animated item or display a tooltip. This operation is commonly used to provide
    instructions for new players in games; but it is not compatible with the characteristics
    of tap-only touch screens, because they do not support the mouse hover-over operation.


    You should consider selecting an alternative event to trigger animations or tips.
    For example, when the user touches the operation of applications, relevant animated
    themes and tips are triggered automatically. Another method is to design an interface
    interaction mode that temporarily interprets tap events as mouse hover-over events.
    For example, the action of pressing a certain button and moving the cursor would
    not be interpreted as a tap operation.


    Providing Right-Click Functionality


    As mentioned before, tap-only touch screens generally do not support right-click
    operations on mice. A commonly used alternative is a delayed touch (much longer
    than the tap time) to represent a right-click. This could result in the wrong
    operation occurring if the user accidentally releases their finger too soon. In
    addition, this method cannot perform simultaneous left-click and right-click (also
    known as *double-click*).


    You should provide a user-interaction interface that can replace the right-click
    function: for example, using double-click or installing a clickable control on
    the screen to replace the right-click.


    Keyboard Input Problems


    As mentioned earlier, desktop computers use full keyboards, whereas Android systems
    usually have much simpler keypads, button panels, user-programmable buttons, and
    a limited number of other input devices. These limitations cause some problems
    when designing embedded applications that are not seen in desktop systems.


    Restricting the Input of Various Commands


    The keyboard limitations on Android systems make it difficult for users to type
    a large number of characters. Therefore, applications that require users to input
    many characters, especially those depending on command input, need appropriate
    adjustments when migrating to an Android system.


    One solution is to provide an input mode that restricts the number of characters
    by reducing the number of commands or selectively using convenient tools like
    menu item shortcut keys. A more flexible solution is to create command buttons
    on the screen, especially context-sensitive buttons (that is, buttons that appear
    only when needed).


    Meeting Keyboard Demand


    Applications need keyboard input, such as naming a file, creating personal data,
    saving progress, and supporting online chat. Most applications tend to use the
    screen keyboard to input characters, but the screen keyboard does not always run
    or show at the front of the application interface, making character-input problems
    hard to solve.


    One solution is to either design a mode without explicit conflict with the onscreen
    keyboard application (for example, not using the full-screen default operation
    mode) for applications, or provide an onscreen keyboard in the UI that appears
    only when needed. Another simple way of minimizing keyboard input is to provide
    default text string values, such as default names of personal data and default
    names of saved files, and allow users to select by touching. To obtain other information
    required by the text string (for example, prefix and suffix of file names), you
    can add a selection button that provides a list of character strings you’ve established,
    from which the user can select. The name of a saved file can also be uniquely
    obtained by combining various user information items extracted from the screen
    or even using the date-time stamp. Some text input services (such as a chat service)
    should be disabled if they are not the core functions of an application. This
    will not cause any negative impact on the user experience.


    Software Distribution and Copyright Protection Problems


    Desktop computers are generally equipped with CD-ROM/DVD drives, and their software
    is generally distributed via CD/DVD. In addition, for anti-piracy purposes, CD/DVD
    installation usually requires users to verify the ownership of the disk or load
    contents dynamically from the CD/DVD, especially video files. However, Android
    systems (smartphones and tablets, for instance) generally do not have CD-ROM/DVD
    drives; Android does support an external microSD card, but directly installing
    an application from it is still not supported.'
