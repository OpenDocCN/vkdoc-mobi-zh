  trans: "\n# 使用隐式意图设计安卓应用\n\n1.  编辑主布局文件（`activity_main.xml`）。删除原有的 `TextView` 控件，然后添加一个\
    \ `TextView` 和一个按钮。将 `TextView` 的 `Text` 属性设置为“此应用是由调用者通过隐式意图触发的活动”。将按钮的 `Text`\
    \ 属性设置为“显示由隐式意图触发的活动”，并将其 `ID` 属性设置为 `@+id/goToIndirectAct`，如图 3-17 所示。\n\n![9781484203835_Fig03-17.jpg](img/9781484203835_Fig03-17.jpg)\n\
    \n图 3-17。`GuiExam` 触发应用的主布局设计\n\n2.  按如下方式编辑 `MainActivity.java`：\n\n```\n   \
    \ 行号        源码\n    1  package com.example.guiexam;\n    2  import android.os.Bundle;\n\
    \    3  import android.app.Activity;\n    4  import android.view.Menu;\n    5\
    \  import android.widget.Button;            // 使用按钮类\n    6  import android.view.View;\
    \                // 使用视图类\n    7  import android.view.View.OnClickListener; //\
    \ 使用 View.OnClickListener 类\n    8  import android.content.Intent;           //\
    \ 使用意图类\n\n    9  public class MainActivity extends Activity {\n    10     @Override\n\
    \    11     public void onCreate(Bundle savedInstanceState) {\n    12        \
    \ super.onCreate(savedInstanceState);\n    13         setContentView(R.layout.activity_main);\n\
    \    14         Button btn = (Button) findViewById(R.id.goToIndirectAct);\n  \
    \  15         btn.setOnClickListener(new /*View.*/OnClickListener(){\n    16 //\
    \ 为按钮点击事件设置响应代码\n    17             public void onClick(View v) {\n    18    \
    \             Intent intent = new Intent(Intent.ACTION_EDIT);\n    19 //构建隐式意图\n\
    \    20                 startActivity(intent); // 触发活动\n    21             }\n\
    \             });\n    22     }\n\n    24     @Override\n    25     public boolean\
    \ onCreateOptionsMenu(Menu menu) {\n    26         getMenuInflater().inflate(R.menu.activity_main,\
    \ menu);\n    27         return true;\n           }\n       }\n    ```\n\n第 16\
    \ 和 17 行的代码定义了隐式意图并触发相应的活动，这与之前触发隐式活动的代码基本相同，但这里使用了不带数据的意图构造函数。\n\n3.  修改包含自定义活动及其对应隐式意图的\
    \ `HelloAndroid` 应用：\n    1.  根据本章前面“触发不带参数的活动显式匹配”一节中描述的方法，向项目中添加一个布局文件（`implicit_act.xml`），并将一个\
    \ `RelativeLayout` 布局拖放到该文件中。\n    2.  编辑布局文件，并添加 `TextView`、`ImageView` 和 `Button`\
    \ 控件。按如下方式设置属性：\n\n        *   `TextView` 的 `Text` 属性：“此界面是 HelloAndroid 的一个活动，负责处理由\
    \ ACTION_EDIT 触发的操作”\n        *   `ImageView`：按照第 2 章中“使用 ImageView”一节的说明进行设置。\n\
    \        *   `Button` 的 `Text` 属性：“关闭活动”\n        *   `Button` 的 `ID` 属性：`@+id/closeActivity`。\n\
    \n    然后调整它们各自的大小和位置，如图 3-18 所示。\n\n![9781484203835_Fig03-18.jpg](img/9781484203835_Fig03-18.jpg)\n\
    \n图 3-18。对应隐式意图的自定义活动的布局文件\n\n4.  类似于本章“触发不带参数的活动显式匹配”一节中描述的过程，为新的布局文件（`TheActivityToImplicitIntent`）向项目中添加对应的类，如图\
    \ 3-19 所示。\n\n![9781484203835_Fig03-19.jpg](img/9781484203835_Fig03-19.jpg)\n\n\
    图 3-19。对应隐式意图的自定义活动的新类\n\n5.  编辑新添加的布局文件的类文件（`TheActivityToImplicitIntent.java`），内容如下：\n\
    \n```\n    行号        源码\n    1  package com.example.helloandroid;\n    2  import\
    \ android.os.Bundle;\n    3  import android.app.Activity;\n    4  import android.widget.Button;\
    \           // 使用按钮类\n    5  import android.view.View;               // 使用视图类\n\
    \    6  import android.view.View.OnClickListener; // 使用 View.OnClickListener 类\n\
    \n    7  public class TheActivityToImplicitIntent extends Activity {\n    8  @Override\n\
    \    9  public void onCreate(Bundle savedInstanceState) {\n    10         super.onCreate(savedInstanceState);\n\
    \    11         setContentView(R.layout.implicit_act);\n    12         Button\
    \ btn = (Button) findViewById(R.id.closeActivity);\n    13         btn.setOnClickListener(new\
    \ /*View.*/OnClickListener(){\n    14 // 为 <关闭活动> 点击设置响应代码\n    15           \
    \  public void onClick(View v) {\n    16                 finish();\n    17   \
    \          }\n    18         });\n    19     }\n       }\n    ```\n\n6.  修改包含对应隐式意图的自定义应用\
    \ `HelloAndroid` 的 `AndroidManifest.xml` 文件，如下所示：\n\n```\n    行号        源码\n \
    \   1  <manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"\n\
    \n    3      package=\"com.example.helloandroid\"\n\n    5      android:versionCode=\"\
    1\"\n\n    7      android:versionName=\"1.0\" >\n\n    9      <uses-sdk\n    10\
    \         android:minSdkVersion=\"8\"\n    11         android:targetSdkVersion=\"\
    15\" />\n\n    13     <application\n    14         android:icon=\"@drawable/ic_launcher\"\
    \n    15         android:label=\"@string/app_name\"\n    16         android:theme=\"\
    @style/AppTheme\" >\n    17         <activity\n    18             android:name=\"\
    .MainActivity\"\n    19             android:label=\"@string/title_activity_main\"\
    \ >\n    20             <intent-filter>\n    21                 <action android:name=\"\
    android.intent.action.MAIN\" />\n\n    23                 <category android:name=\"\
    android.intent.category.LAUNCHER\" />\n    24             </intent-filter>\n \
    \   25         </activity>\n    26         <activity\n    27             android:name=\"\
    TheActivityToImplicitIntent\">\n    28             <intent-filter>\n    29   \
    \              <action android:name=\"android.intent.action.DEFAULT\" />\n   \
    \ 30                 <action android:name=\"android.intent.action.EDIT\" />\n\
    \    31                 <category android:name=\"android.intent.category.DEFAULT\"\
    \ />\n    32             </intent-filter>\n    33         </activity>\n      \
    \     </application>\n\n</manifest>\n    ```\n\n第 24 至 32 行（粗体部分）的代码提供了接收隐式意图的活动信息。第\
    \ 26 行指定了可以接收 `android.intent.action.EDIT` 操作。该值对应于触发器的意图构造函数（`GuiExam` 的 `MainActivity`\
    \ 类）中 `ACTION` 参数 `Intent.ACTION_EDIT` 的常量值。这是触发方与被调用方之间预定的联系信号。第 27 行进一步指定了也可以接收默认数据类型。\n\
    \n7.  运行 `HelloAndroid` 应用，该应用现在包含一个对应隐式意图的自定义活动，并将其 `AndroidManifest.xml` 文件注册到系统中。\n\
    \n到目前为止，前三章已经涵盖了安卓界面设计。简单的 `GuiExam` 应用演示了活动的状态转换、`Context` 类、意图以及应用与活动之间的关系。你还学习了如何使用布局作为界面，以及按钮、事件和内部事件监听器的工作原理。包含多个活动的示例介绍了活动的显式和隐式触发机制。你看到了一个由不同应用中的活动触发带参数的应用示例，并且现在了解了活动参数的交换机制。\n"
- fmt: "# GUI Design for Android Apps, Part 4: Graphic Interface and Touchscreen Input\n\
    \nSo far, three chapters have been devoted to Android interface design. The application\
    \ interface discussed so far is similar to a dialog interface. The drawback of\
    \ this mode is that it is difficult to obtain accurate touchscreen input information,\
    \ so it is hard to display accurate images based on the input interface. The next\
    \ chapter, which covers the last part of Android interface design, introduces\
    \ the view-based interaction style interface. In this interface, you can enter\
    \ information with accurate touchscreen input and display detailed images, as\
    \ required by many game applications.\n\n## Display Output Framework\n\nUnlike\
    \ the dialog box–style interface, which consists of `TextView`, `EditText`, `Button`,\
    \ and other window components, an interactive UI display directly uses a `View`\
    \ class. This section introduces the basic framework of drawing in the view (that\
    \ is, displaying images or graphics).\n\nTo display images and graphics in a view,\
    \ you need to put drawing code into its `onDraw` function. The `onDraw` function\
    \ is called whenever images need to be redrawn in a view, such as when the view\
    \ is displayed when the application starts, when the front cover object (such\
    \ as a view, an event, or a dialog box) on top of the graphic view is moved away,\
    \ when the view from the bottom layer is moved into the top layer with the activity,\
    \ or in similar circumstances. You’re advised to put the drawing code in the `View.onDraw`\
    \ function, so you can ensure when the view needs to be displayed to the user.\
    \ The view window can also immediately be displayed in its total output; otherwise,\
    \ certain graphic view areas may not be refreshed or repainted.\n\nAndroid drawing\
    \ functions such as draw rectangle, draw oval, draw straight line, and display\
    \ text are usually integrated into the `Canvas` class. When the `View.onDraw`\
    \ callback executes, it brings with it a `Canvas` parameter that is used to get\
    \ the `Canvas` object.\n\nAndroid uses the `Paint` class to draw a variety of\
    \ graphics. `Paint` contains a variety of brush attributes, such as color, fill\
    \ style, font, and font size.\n\nAs described earlier in the book, the interface\
    \ configuration style of the application code generated in Eclipse is as follows:\
    \ an activity includes layouts, and a layout contains two layers of widget structures.\
    \ For this reason, you set parameters for the `setContentView` function in the\
    \ `onCreate` function of the activity as the layout to achieve this effect. To\
    \ use the view-based interface, you need to change the default parameter layout\
    \ of the `setContentView` function to a custom view class.\n\nHere is an example\
    \ that illustrates the process. Modify the `GuiExam` example project by using\
    \ the following steps:\n\n1. Using the same steps as in the section “Triggering\
    \ an Explicit Match of Activities with No Parameters” in [Chapter 3](#9781484203835_Ch03.xhtml),\
    \ create a new class (`MyView`), as shown in [Figure 4-1](#9781484203835_Ch04.xhtml#Fig1).\n\
    \n![9781484203835_Fig04-01.jpg](images/9781484203835_Fig04-01.jpg)\n\n[Figure\
    \ 4-1](#9781484203835_Ch04.xhtml#_Fig1). Create a new class in the project\n\n\
    2. Edit the source code of the newly added class (`MyView.java`). The content\
    \ is shown next.\n\n```\n    Line#        Source Code\n    1 package com.example.guiexam;\n\
    \n    3 import android.view.View;\n    4 import android.graphics.Canvas;\n   \
    \ 5 import android.graphics.Paint;\n    6 import android.content.Context;\n\n\
    \    7 import android.graphics.Color;\n    8 import android.graphics.Paint.Style;\n\
    \    9 import android.graphics.Rect;\n    10 import android.graphics.Bitmap;\n\
    \    11 import android.graphics.BitmapFactory;\n    12 import android.graphics.Typeface;\n\
    \n    13 public class MyView extends View {\n    14    MyView(Context context)\
    \ {\n    15        super(context);\n    16    }\n\n    17    @Override\n    18\
    \    public void onDraw(Canvas canvas) {\n    19    Paint paint = new Paint();\n\
    \    20    paint.setAntiAlias(true); //  Sett anti-aliasing\n    21 // paint.setColor(Color.BLACK);\
    \  // Set Color Black\n    22 // paint.setStyle(Style.FILL);  // Set Fill Style\n\
    \    23    canvas.drawCircle(250, 250, 120, paint); // Draw Circle\n\n    24 \
    \   paint.setColor(Color.RED); // Set color red\n    25    paint.setStyle(Style.STROKE);\
    \ // Set style-Stroke ( no fill)\n    26    canvas.drawRect(new Rect(10, 10, 120,\
    \ 100), paint); // draw rect\n\n    27    paint.setColor(0xff0000ff /*Color.BLUE*/\
    \ );\n    28    String str = \"Hello!\";\n    29    canvas.drawText(str, 150,\
    \ 20, paint);        // display text\n\n    30    paint.setTextSize(50); // Set\
    \ Text Size\n    31    paint.setTypeface(Typeface.SERIF);    // Set Typeface:\
    \ Serif\n    32    paint.setUnderlineText(true); // Set Underline Text\n    33\
    \    canvas.drawText(str, 150, 70, paint);        // Display text\n\n    Bitmap\
    \ bitmap = BitmapFactory.\n          decodeResource(getResources(),R.drawable.ic_launcher);\n\
    \          canvas.drawBitmap(bitmap, 0, 250, paint);   // Display image\n    \
    \            }\n            }\n```\n\nThe code in line 13 adds `extends View`,\
    \ which makes a custom class; in this case, `MyView` inherits from the `View`\
    \ category. Lines 13–16 create a custom class constructor function that calls\
    \ the superclass. This constructor function is essential to prevent the following\
    \ compilation error:\n\n```\nImplicit super constructor View() is undefined. Must\
    \ explicitly invoke another constructor\n```\n\nLines 17–34 override the `View.onDraw`\
    \ function to program various pieces of drawing code. You construct a brush—that\
    \ is, a `Paint` object—for drawing in line 16, and you set it to eliminate jagged\
    \ edges in line 17. Line 23 draws a circle (x = 250, y = 250); line 24 sets the\
