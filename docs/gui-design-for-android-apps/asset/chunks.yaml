    Play和Amazon Appstore）购买和安装应用程序。这种流行的软件发布模式允许移动开发者使用证书、在线账户或其他基于软件的方式来验证所有权，而无需使用实体CD/DVD。同样，您应考虑提供将内容放置于在线云服务的选项，而非要求用户从CD/DVD下载视频和其他内容。


    ## Android应用概述


    以下章节描述了Android应用的文件框架和组件结构。


    ### 应用文件框架


    [图1-4](#9781484203835_Ch01.xhtml#Fig4)展示了`HelloAndroid`应用生成后的文件结构（这是Eclipse的截图）。


    ![9781484203835_Fig01-04.jpg](images/9781484203835_Fig01-04.jpg)


    [图1-4](#9781484203835_Ch01.xhtml#_Fig4) 一个Android项目的示例文件结构


    即使您不使用Eclipse，也可以直接访问项目文件夹，看到相同的文件结构，如下所列：


    ![pg14-16.jpg](images/pg14.jpg)


    ![pg14-16.jpg](images/pg15-16.jpg)


    下面我们来解释这个Android项目文件结构的特点：


    *   `src`目录：包含所有源文件。

    *   `R.java`文件：由Eclipse集成的Android SDK自动生成。您无需修改其内容。

    *   Android库：Android应用使用的一组Java库。

    *   `assets`目录：主要存储多媒体文件和其他文件。

    *   `res`目录：存储预配置的资源文件，如应用使用的`drawable`布局。

    *   `values`目录：主要存储`strings.xml`、`colors.xml`和`arrays.xml`。

    *   `AndroidManifest.xml`：相当于应用配置文件。包含应用的名称、活动、服务、提供者、接收器、权限等。

    *   `drawable`目录：主要存储应用使用的图像资源。

    *   `layout`目录：主要存储应用使用的布局文件。这些布局文件是XML文件。


    与常规的Java项目类似，`src`文件夹包含项目的所有`.java`文件；`res`文件夹包含所有项目资源，如应用图标（`drawable`）、布局文件和常量值。


    接下来的章节将介绍每个Android项目必需的`AndroidManifest.xml`文件，以及`gen`文件夹中的`R.java`文件（该文件也包含在其他Java项目中）。


    ### `AndroidManifest.xml`


    `AndroidManifest.xml`文件包含对Android系统至关重要的应用信息，系统在运行任何应用代码之前必须先获得这些信息。这些信息包括项目中使用的活动、服务、权限、提供者和接收器。示例如[图1-5](#9781484203835_Ch01.xhtml#Fig5)所示。


    ![9781484203835_Fig01-05.jpg](images/9781484203835_Fig01-05.jpg)


    [图1-5](#9781484203835_Ch01.xhtml#_Fig5) 在Eclipse中显示的`AndroidManifest.xml`内容


    该文件的代码如下：


    ```

    <manifest xmlns:android="http://schemas.android.com/apk/res/android"

        package="com.example.helloandroid"

        android:versionCode="1"

        android:versionName="1.0" >

        <uses-sdk

            android:minSdkVersion="8"

            android:targetSdkVersion="15" />

        <application

            android:icon="@drawable/ic_launcher"

            android:label="@string/app_name"

            android:theme="@style/AppTheme" >

            <activity

                android:name=".MyMainActivity"

                android:label="@string/title_activity_my_main" >

                <intent-filter>

                    <action android:name="android.intent.action.MAIN" />

                    <category android:name="android.intent.category.LAUNCHER" />

                </intent-filter>

            </activity>

        </application>

    </manifest>

    ```


    `AndroidManifest.xml`文件是一个XML格式的文本文件，每个属性由`name = value`对定义。例如，在Android中，`label
    = "@ string / title_activity_my_main"`，`label`表示Android应用的名称`activity_my_main`。


    一个元素由一个或多个属性组成，每个元素由开始标签（`<`）和结束标签（`/>`）包围：


    ```

    <Type Name [attribute set]> Content </ type name>

    <Type Name Content />

    ```


    格式`[attribute set]`可以省略；例如，`<intent-filter> ... </ intent-filter>`文本段对应于元素的活动内容，`<action...
    />`对应于`action`元素。


    如前面的示例所示，XML元素以层级方式嵌套以表示其从属关系。`action`元素嵌套在`intent-filter`元素内，这说明了`intent-filter`的某些属性或设置方面。关于XML的详细信息超出了本书的范围，但市面上有许多优秀的XML书籍可供参考。


    在该示例中，`intent-filter`描述了活动启动的位置和时间，每当一个活动（或操作系统）要执行操作时，会创建一个`intent`对象。`intent`对象携带的信息可以描述您想做什么、要处理的数据及数据类型等信息。Android会对比每个应用暴露的`intent-filter`数据，并找到最合适的活动来处理调用者指定的数据和操作。


    `AndroidManifest.xml`文件中主要属性条目的描述列于[表1-2](#9781484203835_Ch01.xhtml#Tab2)中。


    [表1-2](#9781484203835_Ch01.xhtml#_Tab2) `AndroidManifest.xml`文件中的主要属性条目


    | 参数 | 描述 |

    | --- | --- |

    | `Manifest` | 根节点，包含包中的所有内容。 |

    | `xmlns:android` | 包含清单的命名空间。`xmlns:android=``http://schemas.android.com/apk/res/android`。使得文件中可以使用各种标准属性，并为大多数元素提供数据。
    |

    | `package` | 清单应用的包。 |

    | `Application` | 包含包中应用级组件清单的根节点。该元素也可以包含应用的某些全局和默认属性，如`label`、`icon`、`theme`和必要的权限。一个清单可以包含零个或一个（不超过一个）该元素。
    |

    | `android:icon` | 应用的图标。 |

    | `android:label` | 应用的名称。 |

    | `Activity` | 用户启动应用时加载的初始页面名称。它是用户交互的重要工具。大多数其他页面是在执行其他活动或由其他活动标记显示时呈现的。注意：每个活动，无论它在外部使用还是在其自身包中使用，都必须有一个对应的`<activity>`标记。如果某个活动没有对应的标记，则无法操作它。此外，为了支持搜索活动，一个活动可以包含一个或多个`<intent-filter>`元素来描述它支持的操作。
    |

    | `android:name` | 应用启动的默认活动。 |

    | `intent-filter` | 通过声明指定组件支持的`intent`值形成。除了指定不同类型的值外，`intent-filter`还可以指定属性来描述唯一的标签、图标或操作所需的其他信息。
    |

    | `Action` | 组件支持的Intent动作。 |

    | `Category` | 组件支持的Intent类别。应用启动的默认活动在此处指定。 |

    | `uses-sdk` | 与应用使用的SDK版本相关。 |


    ### `R.java`


    `R.java`文件在创建项目时自动生成。它是一个只读文件，无法修改。`R.java`是一个索引文件，定义了项目的所有资源。例如：'
