- fmt: "# Activity 生命周期与状态转换函数\n\nThe activity state transition triggers the function\
    \ of the corresponding `activity` class (that is, the Java method). Android calls\
    \ these functions; developers do not have to explicitly call them. They are called\
    \ *state-transition functions*. You can override the state-transition functions\
    \ so they can complete their work at the specified time. There are also some functions\
    \ that are used to control the state of the activity. These functions constitute\
    \ the basis of activity programming. Let’s learn about those functions.\n\n##\
    \ `onCreate` State-Transition Function\n\nThe `onCreate` function prototype is\
    \ as follows:\n\n```\nvoid  onCreate(Bundle savedInstanceState);\n```\n\nThis\
    \ function is run when the activity is first loaded. When you start a new program,\
    \ its main activity’s `onCreate` event is executed. If the activity is destroyed\
    \ (`OnDestroy`, explained later) and then reloaded into the task, its `onCreate`\
    \ event participants are re-executed.\n\nAn activity is likely to be forced to\
    \ switch to the background. (An activity switched to the background is no longer\
    \ visible to the user, but it still exists in the middle of a task, such as when\
    \ a new activity is started to “cover” the current activity; or the user presses\
    \ the Home button to return to the home screen; or other events occur in the new\
    \ activity on top of the current activity, such as an incoming caller interface.)\
    \ If the user does not view the activity again after a period of time, the activity\
    \ may be automatically destroyed by the system along with the task and process.\
    \ If you check the activity again, the `onCreate` event initialization activity\
    \ will have to be rerun.\n\nAnd sometimes you may want users to continue from\
    \ the last open operating state of the activity, rather than starting from scratch.\
    \ For example, when the user receives a sudden incoming call while editing a text\
    \ message, the user may have to do other things immediately after the call, such\
    \ as saving the incoming phone number to a contact. If the user does not immediately\
    \ return to the text-editing interface, the text-editing interface is destroyed.\
    \ As a result, when the user returns to the SMS program, that user may want to\
    \ continue from the last edit. In this case, you can override the activity’s `void\
    \ onSaveInstanceState (Bundle outState)` events by writing the data you want to\
    \ be saved before the destruction of the state of activity or information through\
    \ `outState`, so that when the activity executes the `onCreate` event again, it\
    \ transmits information previously saved through the `savedInstanceState`. At\
    \ this point, you can selectively use the information to initialize the activity,\
    \ instead of starting it from scratch.\n\n## `onStart` State-Transition Function\n\
    \nThe `onStart` function prototype is as follows:\n\n```\nvoid onStart();\n```\n\
    \nThe `onStart` function executes after the `onCreate` event or when the current\
    \ activity is switched to the background. When the user switches back to this\
    \ activity by selecting it from switch panel, if it has not been destroyed, and\
    \ only the `onStop` event has been performed, the activity will skip `onCreate`\
    \ event activities and directly execute `onStart` events.\n\n## `onResume` State-Transition\
    \ Function\n\nThe `onResume` function prototype is as follows:\n\n```\nvoid onResume()\n\
    ```\n\nThe `onResume` function is executed after the `OnStart` event or after\
    \ the current activity is switched to the background. When the user views this\
    \ activity again, if it has not been destroyed, and if `onStop` events have not\
    \ been performed (activities continue to exist in the task), the activity will\
    \ skip `onCreate` and `onStart` event activities and directly execute `onResume`\
    \ events.\n\n## `onPause` State-Transition Function\n\nThe `onPause` function\
    \ prototype is as follows:\n\n```\nvoid onPause()\n```\n\nThe `onPause` function\
    \ is executed when the current activity is switched to the background.\n\n## `onStop`\
    \ State-Transition Function\n\nThe `onStop` function prototype is as follows:\n\
    \n```\nvoid onStop()\n```\n\nThe `onStop` function is executed after the `onPause`\
    \ event. If the user does not view the activity again for some time, the `onStop`\
    \ event of the activity is executed. The `onStop` events are also executed if\
    \ the user presses the Back key, and the activity is removed from the current\
    \ task list.\n\n## `onRestart` State-Transition Function\n\nThe `onRestart` function\
    \ prototype is as follows:\n\n```\nvoid onRestart()\n```\n\nAfter the `onStop`\
    \ event is executed, if the activity and the process it resides in have not been\
    \ systematically destroyed, or if the user views the activity again, the `onRestart`\
    \ event(s) of the activity are executed. The `onRestart` event skips the `onCreate`\
    \ event activities and directly executes the `onStart` events.\n\n## `onDestroy`\
    \ State-Transition Function\n\nThe `onDestroy` function prototype is as follows:\n\
    \n```\nvoid onDestroy()\n```\n\nAfter an `onStop` event of the activity, if the\
    \ user does not view the activity again, it is destroyed.\n\n## The `finish` Function\n\
    \nThe `finish` function prototype is as follows:\n\n```\nvoid finish()\n```\n\n\
    The `finish` function closes the activity and removes it from the stack, which\
    \ leads to a call to the `onDestroy()` state-transition function. One way to resolve\
    \ this is for the user to navigate to the previous activity using the Back button.\n\
    \nIn addition to the activity switch, the `finish` function triggers the activity’s\
    \ state-transition function, and the `startActivity` and `startActivityForResult`\
    \ methods of the context class (described in the next sections) also activate\
    \ it. Functions such as `Context.startActivity` also cause the construction of\
    \ `activity` objects (that is, create new ones).\n\nTypical causes of the triggers\
    \ and corresponding functions are listed in [Table 2-1](#9781484203835_Ch02.xhtml#Tab1).\n\
    \n[Table 2-1](#9781484203835_Ch02.xhtml#_Tab1). Triggers and Their Functions\n\
    \n| Typical Trigger Cause | Corresponding Method of Activity Executed | Explanations\
    \ |\n| --- | --- | --- |\n| `Context.startActivity[ForResult]()` Note: As long\
    \ as the activity is displayed and viewable on the screen, this method will be\
    \ called. | `new Activity()`<br>`onCreate()` | Completes the constructor function,\
    \ Saves the `activity` object to the application object, and initializes the various\
    \ controls (such as `View`). |\n| | `onStart()` | Similar to `View.onDraw()`.\
    \ |\n| `Activity.finish()` | `onDestroy()` | Completes the constructor function,\
    \ such as removing the `activity` object from the application. |\n\nFunctions\
    \ such as `Context.startActivity` in [Table 2-1](#9781484203835_Ch02.xhtml#Tab1)\
    \ trigger three actions: constructing new `Activity` objects, `onCreate`, and\
    \ `onStart`. When an activity that is moved from off screen places to the top\
    \ of the screen display (that is, displayed in front of the user), it generally\
    \ only includes functions being called by `onStart`.\n\n## The `Context` Class\n\
    \nThe `Context` class is an important Android concept to know. The class is inherited\
    \ from the `Object` function, whose inheritance is as follows:\n\n```\njava.lang.Object\n\
    \    android.content.Context\n```\n\nThe literal meaning of *context* is the text\
    \ in the adjacent area, which is located in the `android.content.Context` of the\
    \ framework package. The `Context` class is a `LONG` type, similar to the `Handle`\
    \ handler in Win32. `Context` provides the global information interface about\
    \ the application environment. It is an abstract class, and its execution is provided\
    \ by the Android system. It allows access to resources and characterized types\
    \ of applications. At the same time, it can start application-level operations,\
    \ such as starting activities and broadcasting and receiving intents."
