    Android Application Overview


    The following sections describe the application file framework and component structure
    of Android applications.


    Application File Framework


    [Figure 1-4](#9781484203835_Ch01.xhtml#Fig4) shows the file structure after the
    generation of the HelloAndroid app (this is an Eclipse screen shot).


    ![9781484203835_Fig01-04.jpg](images/9781484203835_Fig01-04.jpg)


    [Figure 1-4](#9781484203835_Ch01.xhtml#_Fig4). Example file structure of an Android
    project


    Even if you are not using Eclipse, you can directly access the project folder
    and see the same file structure, as listed next:


    ![pg14-16.jpg](images/pg14.jpg)


    ![pg14-16.jpg](images/pg15-16.jpg)


    Let’s explain the features of this Android project file structure:


    *   `src` *directory*: Contains all source files.

    *   `R.java` *file*: Is automatically generated by the Android SDK integrated
    in Eclipse. You do not need to modify its contents.

    *   *Android library*: A set of Java libraries used by Android applications.

    *   `assets` *directory*: Stores mostly multimedia files and other files.

    *   `res` *directory*: Stores preconfigured resource files such as drawable layouts
    used by applications.

    *   `values` *directory*: Stores mostly `strings.xml`, `colors.xml`, and `arrays.xml`.

    *   `AndroidManifest.xml`: Equivalent to an application configuration file. Contains
    the application’s name, activity, services, providers, receivers, permissions,
    and so on.

    *   `drawable` *directory*: Stores mostly image resources used by applications.

    *   `layout` *directory*: Stores mostly layout files used by applications. These
    layout files are XML files.


    Similar to general Java projects, a `src` folder contains all the `.java` files
    for a project; and a `res` folder contains all the project resources, such as
    application icons (drawable), layout files, and constant values.


    The next sections introduce the `AndroidManifest.xml` file, a must-have of every
    Android project, and the `R.java` file in the `gen` folder, which is included
    in other Java projects.


    AndroidManifest.xml


    The `AndroidManifest.xml` file contains information about your app essential to
    the Android system, which the system must have before it can run any of the app’s
    code. This information includes activities, services, permissions, providers,
    and receivers used in the project. An example is shown in [Figure 1-5](#9781484203835_Ch01.xhtml#Fig5).


    ![9781484203835_Fig01-05.jpg](images/9781484203835_Fig01-05.jpg)


    [Figure 1-5](#9781484203835_Ch01.xhtml#_Fig5). The content of `AndroidManifest.xml`
    displayed in Eclipse


    The file’s code is as follows:


    ```

    <manifest xmlns:android="http://schemas.android.com/apk/res/android"

        package="com.example.helloandroid"

        android:versionCode="1"

        android:versionName="1.0" >

        <uses-sdk

            android:minSdkVersion="8"

            android:targetSdkVersion="15" />

        <application

            android:icon="@drawable/ic_launcher"

            android:label="@string/app_name"

            android:theme="@style/AppTheme" >

            <activity

                android:name=".MyMainActivity"

                android:label="@string/title_activity_my_main" >

                <intent-filter>

                    <action android:name="android.intent.action.MAIN" />

                    <category android:name="android.intent.category.LAUNCHER" />

                </intent-filter>

            </activity>

        </application>

    </manifest>

    ```


    The `AndroidManifest.xml` file is a text file in XML format, with each attribute
    defined by a `name = value` pair. For example, in Android, `label = "@ string
    / title_activity_my_main", label` indicates the name of the Android application
    as `activity_my_main`.


    An element consists of one or more attributes, and each element is enclosed by
    the start (`<`) and end (`/>`) tags:


    ```

    <Type Name [attribute set]> Content </ type name>

    <Type Name Content />

    ```


    The format `[attribute set]` can be omitted; for example, the `<intent-filter>
    ... </ intent-filter>` text segment corresponds to the activity content of the
    element, and `<action... />`corresponds to the `action` element.


    XML elements are nested in layers to indicate their affiliation, as shown in the
    previous example. The `action` element is nested within the `intent-filter` element,
    which illustrates certain aspects of the properties or settings of `intent-filter`.
    Detailed information about XML is beyond the scope of this book, but many excellent
    XML books are available.


    In the example, `intent-filter` describes the location and time when an activity
    is launched and creates an `intent` object whenever an activity (or OS) is to
    execute an operation. The information carried by the `intent` object can describe
    what you want to do, which data and type of data you want to process, and other
    information. Android compares the `intent-filter` data exposed by each application
    and finds the most suitable activity to handle the data and operations specified
    by the caller.


    Descriptions for the main attribute entries in the `AndroidManifest.xml` file
    are listed in [Table 1-2](#9781484203835_Ch01.xhtml#Tab2).


    [Table 1-2](#9781484203835_Ch01.xhtml#_Tab2). The Main Attribute Entries in the
    `AndroidManifest.xml` File


    | Parameter | Description |

    | --- | --- |

    | `Manifest` | Root node that contains all contents in the package. |

    | `xmlns:android` | Contains the manifest of the namespace.`xmlns:android=``http://schemas.android.com/apk/res/android`.
    Makes various standard properties usable in the file and provides data to most
    elements. |

    | `package` | Package of manifest application. |

    | `Application` | Contains the root node of the application-level component manifest
    in the package. This element can also contain some global and default properties
    for the application, such as label, icon, theme, and necessary permissions. One
