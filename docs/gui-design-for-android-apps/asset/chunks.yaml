    Drawing Framework for Responding to Touchscreen Input


    The previous example application only displays images/graphics and cannot respond
    to touchscreen input. In this section, you see how to respond to touchscreen input
    and control the view display.


    `View` has an `onTouchEvent` function with the following function prototype:


    ```

    boolean View.onTouchEvent(MotionEvent event);

    ```


    When a user clicks, releases, moves, or does other interactive actions on the
    touchscreen, a touch input event is generated. This touch input event triggers
    the call to `View.onTouchEvent`. To allow users to process touchscreen input,
    you need to rewrite this function. The response code needs to be written in the
    function’s body.


    `View.onTouchEvent` has a parameter of type `MotionEvent` that defines the coordinate
    position of the touch point, event type, and so on of the `MotionEvent` class.
    The event types can be `MotionEvent.ACTION_DOWN`, `MotionEvent.ACTION_MOVE`, `MotionEvent.ACTION_UP`,
    or equivalent, as defined constants in the `MotionEvent` class. The constants
    represent interactive actions such as a touchscreen press, touchscreen move, touchscreen
    pop-up, and so on.


    As discussed earlier, whenever the view needs to be redrawn, the `View.onDraw`
    function is called, so the drawing code needs to be put into the function. Most
    of the time, the system can automatically trigger redraw events; but because users
    design their own redraws, the system does not know when they need to be triggered.
    For example, perhaps a user updates the display content, but the location, size,
    and levels of the content are not changed; as a result, the system does not trigger
    the redraw event. In this situation, the user needs to call the class function
    `postInvalidate` or `invalidate` of the `View` class to proactively generate the
    redraw events. The function prototype is


    ```

    void  View.invalidate(Rect dirty)

    void  View.invalidate(int l, int t, int r, int b)

    void  View.invalidate()

    void  View.postInvalidate(int left, int top, int right, int bottom)

    void  View.postInvalidate()

    ```


    The `postInvalidate` and `invalidate` functions with no parameters redraw the
    entire view; the `postInvalidate` and `invalidate` functions with parameters redraw
    the designated area (or certain area) of the view. The difference between `postInvalidate`
    and `invalidate` with and without constants is that the first case requires an
    event loop until the next issue to produce the redraw event, whereas the second
    one immediately issues a redraw.


    The following example illustrates the framework of drawing code that responds
    to touchscreen input. The interface of the application is shown in [Figure 4-3](#9781484203835_Ch04.xhtml#Fig3).


    ![9781484203835_Fig04-03.jpg](images/9781484203835_Fig04-03.jpg)


    [Figure 4-3](#9781484203835_Ch04.xhtml#_Fig3). The interface of a `GuiExam` input
    graphics framework that responds to the touchscreen


