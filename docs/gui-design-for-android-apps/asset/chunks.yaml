    \ Web 浏览器。\n\n一个 Android 应用程序通常由以下五个部分组成：\n\n*   Activity（活动）\n*   Intent Receiver（意图接收器）\n\
    *   Service（服务）\n*   Content Provider（内容提供器）\n*   Intent 与 Intent Filters（意图与意图过滤器）\n\
    \n以下章节将对每个组件进行更详细的讨论。\n\n### Activity（活动）\n\n具有可视 UI 的应用程序是通过活动来实现的。当用户从主屏幕或应用程序启动器中选择一个应用程序时，它会启动一个动作或一个活动。每个活动程序通常以独立的界面（屏幕）形式出现。每个活动都是一个独立的类，它继承并实现了活动基类。该类以\
    \ UI 的形式呈现，由响应事件的 `View` 组件组成。\n\n大多数程序都有多个活动（换句话说，一个 Android 应用程序由一个或多个活动组成）。切换到另一个界面会加载一个新的活动。在某些情况下，前一个活动可能会返回一个值。例如，一个让用户选择照片的活动会将照片返回给调用者。\n\
    \n当用户打开一个新界面时，旧界面会被挂起并放入历史堆栈（界面切换历史堆栈）中。用户可以通过历史堆栈界面返回到已打开的活动。没有历史价值的堆栈可以从历史堆栈界面中移除。Android\
    \ 会在历史堆栈中保留运行应用程序所生成的所有界面，从第一个界面到最后一个界面。\n\n活动是一个容器，它本身不会显示在 UI 中。你可以将活动大致想象为\
    \ Windows 操作系统中的一个窗口，但视图窗口不仅用于显示，还用于完成任务。\n\n### Intent（意图）与 Intent Filters（意图过滤器）\n\
    \nAndroid 通过一个名为`intent`的特殊类来实现界面切换。一个`intent`描述了程序要做什么。该数据结构最重要的两个部分是动作和按照既定规则处理的数据（`data`）。典型的操作有\
    \ `MAIN`（活动入口）、`VIEW`（查看）、`PICK`（选取）和 `EDIT`（编辑）。操作中要使用的数据使用通用资源标识符（URI）来表示。例如，要查看一个人的联系信息，你需要使用\
    \ `VIEW` 操作创建一个`intent`，而数据则是指向此人 URI 的指针。\n\n与`intent`相关联的一个类称为`IntentFilter`。`intent`将一个请求封装为一个对象；而`IntentFilter`则描述某个活动（或者说，意图接收器，稍后解释）可以处理哪些意图。在前面的例子中，显示某个人联系信息的活动使用了一个`IntentFilter`，它知道如何处理应用于这个人的数据\
    \ `VIEW` 操作。在`AndroidManifest.xml`文件中使用`IntentFilter`的活动通常是通过解析`intent`的活动切换来完成的。首先，它使用`startActivity(myIntent)`函数启动新活动，接着系统会检查所有已安装程序的`IntentFilter`，然后找到与`myIntent`对应的`IntentFilter`最匹配的活动。这个新活动接收来自`intent`的消息并启动。意图解析过程在`startActivity`调用时实时发生。这个过程有两个优点：\n\
    \n*   活动只需发出一个`intent`请求，就能重用其他组件的功能。\n*   该活动始终可以被一个具有相同`IntentFilter`的新活动所替代。\n\
    \n### Service（服务）\n\n*服务*是一种没有 UI 的常驻系统程序。对于任何需要持续运行的应用程序，例如网络监控或检查应用程序更新，都应使用服务。\n\
    \n使用服务的两种模式是*启动-停止模式*和*绑定-解绑模式*。其流程和功能说明见表 1-3。\n\n**表 1-3.** 服务的使用模型\n\n![Table1-3.jpg](img/Table1-3.jpg)\n\
    \n当两种模式混合使用时——例如，一种模式调用了`startService()`，而其他模式调用了`bindService()`——则只有当`stopService`调用和`unbindService`调用都发生时，服务才会被终止。\n\
    \n服务进程有其自身的生命周期，Android 会尽量保持已启动或已绑定的服务进程。服务进程描述如下：\n\n*   如果服务是方法 `onCreate()`、`onStart`\
    \ 或 `onDestroy()` 的执行进程，那么主进程会变为前台进程，以确保这些代码不被停止。\n*   如果服务已启动，其重要性低于可见进程，但高于所有不可见进程。由于只有少数进程对用户是可见的，只要内存不是特别低，服务就不会停止。\n\
    *   如果多个客户端已绑定到该服务，只要其中任何一个客户端对用户是可见的，那么该服务就是可见的。\n\n### Broadcast Intent Receiver（广播意图接收器）\n\
    \n当你希望执行一些与外部事件相关的代码时，例如在半夜执行某项任务或响应电话响铃，请使用 `IntentReceiver`。意图接收器没有 UI，它使用 `NotificationManager`\
    \ 来通知用户其事件已发生。意图接收器在 `AndroidManifest.xml` 文件中声明，但也可以使用 `Context.registerReceiver()`\
    \ 来声明。程序不必持续运行等待 `IntentReceiver` 被调用。当意图接收器被触发时，系统会启动你的程序。程序也可以使用 `Context.broadcastIntent()`\
    \ 将它们的意图广播发送给其他程序。\n\nAndroid 应用程序可用于处理一个数据元素或响应一个事件（例如接收短信）。Android 应用程序会与一个\
    \ `AndroidManifest.xml` 文件一起部署到设备上。`AndroidManifest.xml` 包含必要的配置信息，以便应用程序能够在设备上正确安装。`AndroidManifest.xml`\
    \ 还包含必要的类名、应用程序可以处理的事件类型，以及运行应用程序所需的权限。例如，如果一个应用程序需要访问网络——比如下载一个文件——那么清单文件中必须明确列出该许可。许多应用程序可能会启用这个特定的许可。这种声明式安全性有助于降低恶意应用程序对设备造成损害的可能性。\n\
    \n### Content Provider（内容提供器）\n\n你可以将内容提供器视为数据库服务器。内容提供器的任务是管理持久化数据的访问，例如 SQLite\
    \ 数据库。如果应用程序非常简单，你可能不需要创建内容提供器应用程序。如果你要构建一个较大的应用程序，或者需要构建应用程序来为多个活动或应用程序提供数据，那么你可以使用内容提供器进行数据访问。\n\
    \n如果你希望其他程序使用自己程序的数据，内容提供器就非常有用。内容提供器类实现了一系列标准方法，允许其他程序存储和读取内容提供器可以处理的数据。\n\n\
    ### Android Emulator（Android 模拟器）\n```"
- fmt: '# Android与Dalvik虚拟机


    Android不使用普通的Java虚拟机（JVM），而是使用Dalvik虚拟机（DVM）。DVM与JVM有根本性的不同。DVM占用内存更少，专门针对移动设备进行了优化，更适合嵌入式环境中的手机使用。其他差异如下：


    - 普通JVM基于栈式虚拟机，而DVM是基于寄存器的虚拟机。后者更优，因为应用程序可以基于硬件实现最大程度的优化，这更符合移动设备的特点。

    - DVM可以在有限的内存中同时运行多个虚拟机实例，使得每个DVM应用作为独立的Linux进程执行。在普通JVM中，所有应用运行在共享的JVM中，因此单个应用不作为独立进程运行。由于每个应用作为独立进程运行，DVM可以防止在虚拟机崩溃时关闭所有程序。

    - DVM提供比普通JVM限制更少的许可平台。DVM和JVM支持不同的通用代码。DVM不运行标准Java字节码，而是运行Dalvik可执行格式（`.dex`）。Android应用的Java代码编译实际上包含两个过程。第一步是将Java源代码编译为普通JVM可执行代码，使用文件名后缀`.class`。第二步是将字节码编译为Dalvik执行代码，使用文件名后缀`.dex`。第一步将项目目录中`src`子目录下的源代码文件编译为`bin\class`目录中的`.class`文件；第二步将文件从`bin\class`子目录迁移到`bin`目录中的`classes.dex`文件。编译过程集成在Eclipse构建过程中；不过，你也可以使用命令行手动编译。


    ## 引入Android运行时（ART）


    ART是一种Android运行时，首次作为预览功能出现在Google Android KitKat（4.4）中。它也被称为Dalvik版本2，目前在Android开源项目（AOSP）中处于活跃开发状态。所有搭载Android
    KitKat的智能手机和平板电脑仍将Dalvik作为默认运行时。这是因为一些原始设备制造商（OEM）在Android实现中仍未支持ART，且大多数第三方应用仍基于Dalvik构建，尚未添加对ART的支持。


    正如Google在Android开发者网站上所述，大多数现有应用在使用ART运行时应当可以正常工作。然而，一些在Dalvik上可行的技术在ART上无法工作。Dalvik与ART的差异如表1-4所示。


    **表1-4 Dalvik与ART对比**


    |          | Dalvik                              | ART                                          |

    | -------- | ----------------------------------- | --------------------------------------------
    |

    | 应用     | 包含DEX类文件的APK包                | 与Dalvik相同                                 |

    | 编译类型 | 动态编译（JIT）                     | 预编译（AOT）                                |

    | 功能性   | 稳定且经过全面质量保证测试          | 基本功能和稳定性                             |

    | 安装时间 | 较快                                | 较慢（由于编译过程）                         |

    | 应用启动时间 | 通常较慢（由于JIT编译和解释执行） | 通常较快（由于AOT编译）                      |

    | 存储占用 | 较小                                | 较大（包含预编译二进制文件）                 |

    | 内存占用 | 较大（由于JIT代码缓存）             | 较小                                         |


    ART提供了一些新特性来帮助应用开发、性能优化和调试，例如支持采样分析器以及监控和垃圾回收等调试功能。从Dalvik向ART的过渡可能需要一段时间，Android将同时提供Dalvik和ART，以允许智能手机和平板电脑用户选择和切换。然而，未来的64位Android将基于ART。


    ## 总结


    本章介绍了桌面系统的一般GUI设计方法，然后展示了嵌入式系统的UI和UX设计有何不同。现在你应该了解Android应用GUI设计的一般方法和原则，并准备好学习Android特有的GUI。下一章将描述活动的状态转换、`Context`类、意图以及应用与活动之间的关系。


    _____________________


    ¹一个典型例子是游戏《反恐精英》（CS）。


    # 第二章


    ![image](images/frontdot.jpg)


    ## Android应用GUI设计，第二部分：Android特有的GUI


    本章描述活动的状态转换，并讨论`Context`类、意图以及应用与活动之间的关系。


    ## 活动的状态转换


    如第一章所述，活动是最重要的组件。活动有其自身的状态和转换规则，它们是理解如何编写Android应用的基础。


    ### 活动状态


    当活动被创建或销毁时，它们进入或退出活动栈。在此过程中，它们在四种可能的状态之间转换：


    - **活跃（Active）**：处于活跃状态的活动在栈顶时可见。通常，它是响应用户输入的前台活动。Android将确保其以最高优先级执行。如有需要，Android会销毁栈中更靠下的活动，以确保为活跃活动提供所需资源。当另一个活动变为活跃时，当前活动被暂停。

    - **暂停（Paused）**：在某些情况下，活动可见但没有焦点。此时它被挂起。当前台活动是完全透明的或非全屏活动时，其下方的活动进入此状态。暂停的活动被视为活跃，但不接受用户输入事件。在极端情况下，Android会杀死暂停的活动以恢复资源给活跃活动。当活动完全不可见时，它变为停止状态。

    - **停止（Stopped）**：当活动不可见时，它被停止。此活动保留在内存中以保存所有状态和成员信息。但当系统需要内存时，此活动会被“移除”。当活动停止时，保存数据和当前UI状态非常重要。一旦活动退出或关闭，它变为非活跃状态。

    - **非活跃（Inactive）**：当活动被杀死时，它变为非活跃状态。非活跃活动会从活动栈中移除。当你需要使用或显示该活动时，需要重新启动它。


    活动状态转换图如图2-1所示。


    ![9781484203835_Fig02-01.jpg](images/9781484203835_Fig02-01.jpg)


    **图2-1 Android活动状态转换图**


    状态变化并非人为控制，而是完全由Android内存管理器控制。Android首先关闭包含非活跃活动的应用，然后是那些包含停止活动的应用。在极端情况下，它会移除暂停的活动。


    为了确保无瑕疵的用户体验，这些状态的转换对用户是不可见的。当活动从暂停、停止或非活跃状态恢复到活跃状态时，UI必须保持一致。因此，当活动停止时，保存UI状态和数据非常重要。一旦活动变为活跃，它需要恢复已保存的值。


    ## 活动的重要函数'
  raw: 'Android does not use the ordinary Java virtual machine (JVM); it uses the
    Dalvik virtual machine (DVM) instead. The DVM and JVM are fundamentally different.
    The DVM takes up less memory, is specifically optimized for mobile devices, and
    is more suitable for mobile phones used in embedded environments. Other differences
    are as follows:


    *   The general JVM is based on the stack-based virtual machine, but the DVM is
    a register-based virtual machine. The latter is better because applications can
    achieve maximum optimization based on the hardware, which is more in line with
    the characteristics of mobile devices.

    *   The DVM can run multiple virtual machine instances simultaneously in limited
    memory, so that each DVM application executes as a separate Linux process. In
    the general JVM, all applications run in a shared JVM, and therefore individual
    applications are not running as separate processes. With each application running
    as a separate process, the DVM can be prevented from closing all programs in the
    event of the collapse of the virtual machine.

    *   The DVM provides a less restrictive license platform than the general JVM.
    The DVM and JVM support different generic code. The DVM does not run standard
    Java bytecode, but rather Dalvik executable format (`.dex`). Java code compilation
    of Android applications actually consists of two processes. The first step is
    to compile the Java source code into normal JVM executable code, which uses the
    file-name suffix `.class.` The second step is to compile the bytecode into Dalvik
    execution code, which uses the file-name suffix `.dex`. The first step compiles
    the source code files under the `src` subdirectory in the project directory into
    `.class` files in the `bin\class` directory; and the second step moves the files
    from the `bin\class` subdirectory to `classes.dex` files in the `bin` directory.
    The compilation process is integrated into the Eclipse build process; however,
    you can also use the command line to compile manually.


    Introducing Android Runtime (ART)


    ART is an Android runtime that first became available in Google Android KitKat
    (4.4) as a preview feature. It is also called Dalvik version 2 and is under active
    development in the Android Open Source Project (AOSP). All smartphones and tablets
    with Android KitKat keep Dalvik as the default runtime. This is because some OEMs
    still do not support ART in Android implementations, and most third-party applications
    are still built based on Dalvik and have not yet added support for the new ART.


    As described by Google on the Android developer site, most existing apps should
    work when running with ART. However, some techniques that work on Dalvik do not
    work on ART. The differences between Dalvik and ART are shown in [Table 1-4](#9781484203835_Ch01.xhtml#Tab4).


    [Table 1-4](#9781484203835_Ch01.xhtml#_Tab4). Dalvik vs. ART Summary


    |  | Dalvik | ART |

    | --- | --- | --- |

    | **Application** | APK package with DEX class file | Same as Dalvik |

    | **Compile Type** | Dynamic compilation (JIT) | Ahead-of-time compilation (AOT)
    |

    | **Functionality** | Stable and went through extensive QA | Basic functionality
    and stability |

    | **Installation Time** | Faster | Slower due to compilation |

    | **App Launch Time** | Mostly slower due to JIT compilation and interpretation
    | Mostly faster due to AOT compilation |

    | **Storage Footprint** | Smaller | Larger, with precompiled binary |

    | **Memory Footprint** | Larger due to JIT code cache | Smaller |


    ART offers some new features to help with application development, performance
    optimization, and debugging, such as support for the sampling profiler and debugging
    features like monitoring and garbage collection. Transitioning from Dalvik to
    ART is likely to take some time, and Dalvik and ART will both be provided in Android
    to allow smartphone and tablet users to select and switch. However, future 64-bit
    Android will be based on ART.


    Summary


    This chapter introduced the general GUI design method for desktop systems and
    then showed how designing the UI and UX for embedded systems is different. You
    should now understand the general methods and principles of GUI design for Android
    applications and be ready to learn about the Android-specific GUI. The next chapter
    describes the state transition of activities, the `Context` class, intent, and
    the relationship between applications and activities.


