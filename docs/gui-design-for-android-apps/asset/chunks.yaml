    \ (solid and filled). These values are constants defined in the `Paint.Style`\
    \ class; their corresponding display styles are shown in [Table 4-1](#9781484203835_Ch04.xhtml#Tab1).\n\
    \n[Table 4-1](#9781484203835_Ch04.xhtml#_Tab1). Fill Mode Parameters and Examples\n\
    \n| Image Displayed | Graphic Function Parameter Setting |\n| --- | --- |\n| ![9781484203835_unFig04-01.jpg](images/9781484203835_unFig04-01.jpg)\
