  raw: 'Intent is a mechanism of runtime binding; it can connect two different components
    in the process of running the program. Through intent, the program can request
    or express willingness to Android; Android selects the appropriate components
    to handle the request based on the contents of the intent. For example, suppose
    an activity wants to open a web browser to view the content of a page; this activity
    only needs to issue a `WEB_SEARCH_ACTION` request to Android. Based on the content
    request, Android will check the intent filter declared in the component registration
    statement and find an activity for a web browser.


    When an intent is issued, Android finds one or more exact matches for the activity,
    service, or `broadcastReceiver` as a response. Therefore, different types of intent
    messages do not overlap and are not simultaneously sent to an activity or service,
    because `startActivity()` messages can be sent only to an activity and `startService()`
    intents can only be sent to a service.


    The Main Roles of Intent


    The main roles of intent are as follows.


    Triggering a New Activity or Letting an Existing Activity Implement the New Operation


    In Android, intent directly interacts with the activity. The most common use of
    intent is to bind application components. Intent is used to start, stop, and transfer
    application activities. In other words, intent can activate a new activity or
    make an existing activity perform a new operation. This can be accomplished by
    calling the `Context.startActivity()` or `Context.startActivityForResult()` method.


    To open a different interface (corresponding to an activity) in an application,
    you call the `Context.startActivity()` function to pass an intent. Intent can
    either explicitly specify a specific class to open or include an action required
    to achieve the goals. In the latter case, the runtime will choose which activity
    to open, using a well-known process of intent resolution in which the `Context.startActivity()`
    finds and starts a single activity that best matches the intent.


    Triggering a New Service or Sending New Requests to Existing Services


    Opening a service or sending a request to an existing service is also completed
    by the intent class.


    Trigger BroadcastReceiver


    You can send `BroadcastIntent` using three different methods: `Context.sendBroadcast()`,
    `Context.sendOrderedBroadcast()`, and `Context.sendStickyBroadcast()`.


    Intent Resolution


    The intent transfer process has two ways to match target consumers (such as another
    activity, `IntentReceiver`, or service) with the respondents of the intent.


    The first is *explicit matching*, also known as *direct intent*. When constructing
    an `intent` object, you must specify the recipient as one of the intent’s component
    properties (by calling `setComponent (ComponentName)` or `setClass (Context, Class)`).
    By specifying a component class, the application notification starts the corresponding
    components. This method is similar to an ordinary function call but varies in
    the reuse of the granularity.


    The second is *implicit matching*, also known as *indirect intent*. The sender
    of the intent does not know or care who the recipient is when constructing an
    `intent` object. The attribute is not specified in the component intent. This
    intent needs to contain sufficient information so that the system can determine
    which components to use out of all those available to meet this intent. This method
    differs significantly from function calls and helps to reduce coupling between
    the sender and receiver. Implicit matching resolves to a single activity. If there
    are multiple activities that can implement a given action based on particular
    data, Android selects the best one to start.


    For direct intent, Android does not need to do parsing because the target component
    is very clear. However, Android needs to resolve indirect intent. Through analysis,
    it maps the indirect intent to the activity, `IntentReceiver`, or service that
    processes the intent.


    The mechanism of intent resolution mainly consists of the following:


    *   Looking for all `<intent-filter>`s and the intent defined by those filters,
    which are registered in `AndroidManifest.xml`

    *   Finding and handling the component of the intent through `PackageManager`
    (`PackageManager` can get information about the application package installed
    on the current device)


