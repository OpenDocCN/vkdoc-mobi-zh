    the Internet instead of installing from CD/DVD. Consumers buy and install applications
    directly from application stores such as the Apple App store, Google Play, and
    Amazon Appstore. This popular software release model allows mobile developers
    to use certificates, online accounts, or other software-based ways to verify ownership,
    instead of physical CD/DVDs. Similarly, you should consider providing the option
    of placing content on an online cloud service instead of requiring users to download
