    \ class MainActivity extends Activity {\n    12     @Override\n    13     public\
    \ void onCreate(Bundle savedInstanceState) {\n    14         super.onCreate(savedInstanceState);\n\
    \    15         setContentView(R.layout.activity_main);\n    16         Button\
    \ btn = (Button) findViewById(R.id.closeActivity);\n    17 // Get Button object\
    \ of <Closed activity>\n    18         btn.setOnClickListener(new /*View.*/OnClickListener(){\n\
    \    19 // Set response code for Clicking\n    20             public void onClick(View\
    \ v) {\n    21                 finish();\n       // Close main activity\n    22            \
    \ }\n    23         });\n    24         btn = (Button) findViewById(R.id.exitApplication);\n\
    \    25 // Get Button object of <Exit Application>\n    26 // Set the response\
    \ code to Clicking\n    27             public void onClick(View v) {\n    28                \
    \ finish();\n       // close main activity\n    29                 Process.killProcess(Process.myPid());\n\
    \       // Exit application process\n\n30             }\n\n35         });\n  \
    \      }\n\n@Override\n        public boolean onCreateOptionsMenu(Menu menu) {\n\
    \            getMenuInflater().inflate(R.menu.activity_main, menu);\n            return\
    \ true;\n        }\n    }\n    ```\n\nIn lines 5 and 6, you remove the unused\
    \ `import` statements. You set the response code for the Close Activity button\
    \ in lines 16‒21 and set the response code for the Exit Application button in\
    \ lines 22‒28\\. The only difference is that the latter adds the application-exit\
    \ code `Process.killProcess (Process.myPid ())`*.* Both buttons use the same `finish()`\
    \ function of the `Activity` class to close the activity. The code in lines 7‒10\
    \ imports related classes.\n\nThe application interface is shown in [Figure 2-18](#9781484203835_Ch02.xhtml#Fig18).\n\
    \n![9781484203835_Fig02-18.jpg](images/9781484203835_Fig02-18.jpg)\n\n[Figure\
    \ 2-18](#9781484203835_Ch02.xhtml#_Fig18). The Close Activity and Exit Application\
    \ interface of the application\n\nWhen you click the Close Activity or Exit Application\
    \ button, the main interface of the application is turned off. The difference\
    \ is that the application process (`com.example.guiexam`) does not quit for Close\
    \ Activity; but for Exit Application, the process closes. This is clearly shown\
    \ in the Devices pane of the DDMS view in Eclipse, in which you can see a list\
    \ of processes on the target machine, as shown in [Figure 2-19](#9781484203835_Ch02.xhtml#Fig19).\n\
    \n![9781484203835_Fig02-19.jpg](images/9781484203835_Fig02-19.jpg)\n\n[Figure\
    \ 2-19](#9781484203835_Ch02.xhtml#_Fig19). The process in DDMS when the Close\
    \ Activity and Exit Application application is running\n\nSummary\n\nThis chapter\
    \ introduced Android interface design by having you create a simple application\
    \ called GuiExam. You learned about the state transitions of activities, the `Context`\
    \ class, intent, and the relationship between applications and activities. You\
    \ also saw how to use the layout as an interface by changing the layout file `activity_main.xml`,\
    \ and you saw how the button, event, and inner event listeners work. The next\
    \ chapter describes how to create an application with multiple activities using\
    \ the activity-intent mechanism and shows the changes needed in the `AndroidManifest.xml`\
    \ file.\n\nCHAPTER 3\n\n![image](images/frontdot.jpg)\n\nGUI Design for Android\
    \ Apps, Part 3: Designing Complex Applications"
  trans: "\n1.  点击选择“Hello world!”项目中的 `TextView` 控件，然后按 Del 键将其从布局中移除。\n2.  在 `layout.xml`\
    \ 的编辑窗口中，找到 Image & Media 分支，将该分支下的 `ImageView` 拖放至布局文件。当资源选择器对话框弹出时，点击并选择项目资源，在项目下选择刚导入的图片文件，点击确定完成操作。该过程如图\
    \ 2-14 所示。\n\n![9781484203835_Fig02-14.jpg](img/9781484203835_Fig02-14.jpg)\n\n\
    图 2-14 将 `ImageView` 控件放入布局中\n\n3.  调整 `ImageView` 的大小和位置，并设置其属性。此步骤可使用图 2-15\
    \ 所示的默认值。\n\n![9781484203835_Fig02-15.jpg](img/9781484203835_Fig02-15.jpg)\n\n\
    图 2-15 `ImageView` 的属性设置\n\n4.  保存布局文件。\n\n通常，此时需要编译 Java 代码。不过，在本例中无需编译。图 2-16\
    \ 展示了该应用的界面。\n\n![9781484203835_Fig02-16.jpg](img/9781484203835_Fig02-16.jpg)\n\
    \n图 2-16 `ImageView` 的应用界面\n\n## 退出活动与应用程序\n\n在上一个示例中，你可以按手机的返回键来隐藏活动，但这并不会关闭活动。正如你在“活动的状态转换”一节中所见，当按下返回键时，已启动的活动只会从活动状态变为非活动状态，并保留在系统栈中。要关闭这些活动并将其从栈中移除，应使用\
    \ `Activity` 类的 `finish` 函数。\n\n然而，关闭活动并不意味着应用程序进程结束。即使应用程序的所有组件（活动、服务、广播意图接收器等）都已关闭，应用程序进程仍然存在。退出应用程序进程主要有两种方法。\n\
    \n一种是 Java 提供的静态函数 `System.exit`，用于强制结束进程；另一种是 Android 提供的静态函数 `Process.killProcess(pid)`，用于终止指定的进程\
    \ ID (PID)。你可以通过 `Process.myPid()` 静态函数获取应用程序的进程 ID。\n\n你可以将上述方法用于“使用 ImageView”一节中的示例。具体步骤如下：\n\
    \n1.  在布局文件中添加两个按钮，`Text` 属性分别设置为“关闭活动”和“退出应用程序”，ID 属性分别设置为 `@+id/closeActivity`\
    \ 和 `@+id/exitApplication`。调整按钮的大小和位置，如图 2-17 所示。\n\n![9781484203835_Fig02-17.jpg](img/9781484203835_Fig02-17.jpg)\n\
    \n图 2-17 在布局中添加“关闭活动”和“退出应用程序”按钮\n\n2.  按如下方式修改 `MainActivity.java` 文件的源代码（粗体代码为新增或修改部分，带删除线的行表示已删除的代码）：\n\
    \n```\n    行号    源代码\n    1  package com.example.guiexam;\n    2  import android.os.Bundle;\n\
    \    3  import android.app.Activity;\n    4  import android.view.Menu;\n    5\
    \  //import android.view.MenuItem;\n    6  //import android.support.v4.app.NavUtils;\n\
    \    7  import android.widget.Button;            //使用 Button 类\n    8  import\
    \ android.view.View;                //使用 View 类\n    9  import android.view.View.OnClickListener;\n\
    \       // 使用 View.OnClickListener 类\n    10 import android.os.Process;\n    \
    \   // 使用 killProcess 方法\n\n11 public class MainActivity extends Activity {\n\
    \    12     @Override\n    13     public void onCreate(Bundle savedInstanceState)\
    \ {\n    14         super.onCreate(savedInstanceState);\n    15         setContentView(R.layout.activity_main);\n\
    \    16         Button btn = (Button) findViewById(R.id.closeActivity);\n    17\
    \ // 获取 <关闭活动> 的 Button 对象\n    18         btn.setOnClickListener(new /*View.*/OnClickListener(){\n\
    \    19 // 设置点击响应代码\n    20             public void onClick(View v) {\n    21\
    \                 finish();\n       // 关闭主活动\n    22             }\n    23   \
    \      });\n    24         btn = (Button) findViewById(R.id.exitApplication);\n\
    \    25 // 获取 <退出应用程序> 的 Button 对象\n    26 // 设置点击响应代码\n    27             public\
    \ void onClick(View v) {\n    28                 finish();\n       // 关闭主活动\n\
    \    29                 Process.killProcess(Process.myPid());\n       // 退出应用程序进程\n\
    \n30             }\n\n35         });\n        }\n\n@Override\n        public boolean\
    \ onCreateOptionsMenu(Menu menu) {\n            getMenuInflater().inflate(R.menu.activity_main,\
    \ menu);\n            return true;\n        }\n    }\n```\n\n在第 5 行和第 6 行，移除了未使用的\
    \ `import` 语句。在第 16 至 21 行中，为“关闭活动”按钮设置了响应代码，并在第 22 至 28 行中，为“退出应用程序”按钮设置了响应代码。两者的唯一区别在于，后者新增了退出应用程序的代码\
    \ `Process.killProcess(Process.myPid())`。两个按钮均使用 `Activity` 类中相同的 `finish()` 函数来关闭活动。第\
    \ 7 至 10 行的代码导入了相关类。\n\n应用程序界面如图 2-18 所示。\n\n![9781484203835_Fig02-18.jpg](img/9781484203835_Fig02-18.jpg)\n\
    \n图 2-18 应用程序的“关闭活动”和“退出应用程序”界面\n\n当你点击“关闭活动”或“退出应用程序”按钮时，应用程序的主界面会被关闭。区别在于，点击“关闭活动”时，应用程序进程（`com.example.guiexam`）不会退出；而点击“退出应用程序”时，进程会被关闭。这在\
    \ Eclipse 中 DDMS 视图的 Devices 面板中清晰可见，你可以在此查看目标机器上的进程列表，如图 2-19 所示。\n\n![9781484203835_Fig02-19.jpg](img/9781484203835_Fig02-19.jpg)\n\
    \n图 2-19 “关闭活动”与“退出应用程序”应用运行时 DDMS 中的进程\n\n## 本章小结\n\n本章通过创建一个名为 GuiExam 的简单应用，介绍了\
    \ Android 界面设计。你了解了活动的状态转换、`Context` 类、意图以及应用程序与活动之间的关系。你还学习了如何通过修改布局文件 `activity_main.xml`\
    \ 将布局用作界面，并了解了按钮、事件和内部事件监听器的工作方式。下一章将介绍如何使用活动-意图机制创建包含多个活动的应用，并展示 `AndroidManifest.xml`\
    \ 文件中所需进行的更改。\n\n## 第 3 章\n\n![image](img/frontdot.jpg)\n\nAndroid 应用的 GUI 设计，第\
    \ 3 部分：设计复杂应用程序\n"
- fmt: "# 多活动应用与Intent机制\n\n在上一章中，您通过创建一个名为`GuiExam`的简单应用程序学习了Android界面设计。该章节还涵盖了活动的状态转换、`Context`类、以及Intent的介绍和应用程序与活动之间的关系。您学习了如何使用布局作为界面，以及按钮、事件和内部事件监听器的工作原理。在本章中，您将学习如何创建包含多个活动的应用程序；示例将介绍活动的显式和隐式触发机制。您将看到一个由不同应用程序中的活动触发的带有参数的应用程序示例，这将帮助您理解活动参数的交换机制。\n\
    \n## 包含多个活动的应用程序\n\n上一示例中的应用程序只有一个活动：主活动，它在应用程序启动时显示。本章将演示一个包含多个活动的应用程序，使用活动-Intent机制，并展示`AndroidManifest.xml`文件中所需的更改。\n\
    \n如前所述，活动由Intent触发。有两种Intent解析方法：*显式匹配*（也称为*直接Intent*）和*隐式匹配*（也称为*间接Intent*）。触发活动也可以带有参数和返回值。此外，Android自带了许多内置活动，因此被触发的活动可以来自Android本身，也可以是自定义的。基于这些情况，本章使用四个示例来说明不同的活动。对于显式匹配，您将看到带有或不带参数和返回值的应用程序。对于隐式匹配，您将看到使用来自Android系统或用户定义的活动。\n\
    \n## 触发不带参数的显式匹配活动\n\n使用不带参数的显式匹配是最简单的活动Intent触发机制。本节首先通过一个示例介绍这种机制，然后在后续部分介绍更复杂的机制。\n\
    \n显式匹配的活动-Intent触发机制的代码框架包括两个部分：被调用者（被触发）的活动和调用者（触发）的活动。触发器不仅限于活动；它也可以是服务，例如广播Intent接收器。但由于您目前只接触了活动的使用，本节中所有示例的触发器都是活动。\n\
    \n1.  被调用者活动的源代码框架执行以下操作：\n    1.  定义一个继承自`Activity`的类。\n    2.  如果需要传递参数，则在`onCreate`函数中调用`Activity.getIntent()`函数来获取触发此活动的`Intent`对象，然后通过`Intent.getData()`、`Intent.getXXXExtra()`、`Intent.getExtras()`等函数获取传递的参数。\n\
    \    3.  编写正常活动模式的代码。\n    4.  如果需要向触发器返回值，则在退出活动前执行以下操作：\n        1.  定义一个`Intent`对象\n\
    \        2.  使用`Intent.putExtras()`等函数为Intent设置数据值\n        3.  调用`Activity.setResult()`函数设置活动的返回码\n\
    \    5.  在`AndroidManifest.xml`文件中添加被调用者活动的代码。\n2.  调用者活动的代码框架执行以下操作：\n    1.\
    \  定义`Intent`对象，并指定触发器的上下文和触发活动的`class`属性。\n    2.  如果需要向活动传递参数，则通过调用Intent的`setData()`、`putExtras()`等函数为`Intent`对象设置参数。\n\
    \    3.  调用`Activity.startActivity(Intent intent)`函数触发不带参数的活动，或调用`Activity.startActivityForResult(Intent\
    \ intent, int requestCode)`触发带参数的活动。\n    4.  如果需要通过返回值触发活动，则代码框架重写`Activity`类的`onActivityResult()`函数，该函数根据请求码（`requestCode`）、结果码（`resultCode`）和Intent值采取不同的操作。\n\
    \n在步骤2a中，使用了被触发活动的`class`属性，这涉及一种称为*反射*的Java机制。这种机制可以根据类名创建并返回该类的对象。被触发活动的对象在触发之前不会被构造；因此触发活动也意味着创建该类的对象，以便后续操作可以继续。也就是说，触发活动包括新创建类对象的操作。\n\
    \n以下两个示例详细说明了代码框架。本节描述第一个示例。在这个示例中，被触发的活动与触发活动属于同一个应用程序，并且被触发的活动不需要任何参数，也不返回任何值。新活动通过按钮触发，其活动界面类似于[第2章](#9781484203835_Ch02.xhtml)中“退出活动和应用程序”部分的示例界面（[图2-16](#9781484203835_Ch02.xhtml#Fig16)）。整个应用程序界面如[图3-1](#9781484203835_Ch03.xhtml#Fig1)所示。\n\
    \n![9781484203835_Fig03-01.jpg](images/9781484203835_Fig03-01.jpg)\n\n[图3-1](#9781484203835_Ch03.xhtml#_Fig1).\
    \ 同一应用程序中不带参数的多个活动界面\n\n应用程序启动后，显示应用程序的主活动，如[图3-1(a)](#9781484203835_Ch03.xhtml#Fig1)所示。当点击“切换到不带参数的新界面”按钮时，应用程序显示新活动，如[图3-1(b)](#9781484203835_Ch03.xhtml#Fig1)所示。点击“关闭活动”按钮会使界面返回应用程序的主活动，如[图3-1(c)](#9781484203835_Ch03.xhtml#Fig1)所示。\n\
    \n通过修改和重写[第2章](#9781484203835_Ch02.xhtml)中`GuiExam`部分的示例来创建此示例，具体如下："
  raw: "In the previous chapter, you learned about Android interface design by creating\
    \ a simple application called `GuiExam`. The chapter also covered the state transition\
    \ of activities, the `Context` class, and an introduction to intents and the relationship\
    \ between applications and activities. You learned how to use a layout as an interface,\
    \ and how button, event, and inner event listeners work. In this chapter, you\
    \ learn how to create an application with multiple activities; examples introduce\
    \ the explicit and implicit trigger mechanisms of activities. You see an example\
    \ of an application with parameters triggered by an activity in a different application,\
    \ which will help you understand the exchange mechanism for the activity’s parameters.\n\
    \nApplications with Multiple Activities\n\nThe application in the previous example\
    \ has only one activity: the main activity, which is displayed when the application\
    \ starts. This chapter demonstrates an application with multiple activities, using\
    \ the activity-intent mechanism, and shows the changes needed in the `AndroidManifest.xml`\
    \ file.\n\nAs previously described, an activity is triggered by an intent. There\
    \ are two kinds of intent-resolution methods: *explicit match* (also known as\
    \ *direct intent*) and *implicit match* (also known as *indirect intent*). A triggering\
    \ activity can also have parameters and return values. Additionally, Android comes\
    \ with a number of built-in activities, and therefore a triggered activity can\
    \ come from Android itself, or it can be customized. Based on these situations,\
    \ this chapter uses four examples to illustrate different activities. For the\
    \ explicit match, you see an application with or without parameters and return\
    \ values. For the implicit match, you see an application that uses activities\
    \ that come from the Android system or are user defined.\n\nTriggering an Explicit\
    \ Match of Activities with No Parameters\n\nUsing explicit match without parameters\
    \ is the simplest trigger mechanism of the activity intent. This section first\
    \ uses an example to introduce this mechanism and later covers more complex mechanisms.\n\
    \nThe code framework of the activity-intent triggering mechanism for explicit\
    \ matching includes two parts: the activities of the callee (being triggered)\
    \ and those of the caller (trigger). The trigger is not limited to activities;\
    \ it can also be a service, such as a broadcast intent receiver. But because you\
    \ have only seen the use of activities so far, the triggers for all the examples\
    \ in this section are activities.\n\n1.  The source code framework for the activity\
    \ of the callee does the following:\n    1.  Defines a class that inherits from\
    \ the activity.\n    2.  If there are parameters that need to be passed, then\
    \ the source code framework of the activity calls the `Activity.getIntent()` function\
    \ in the `onCreate` function to obtain the `Intent` object that triggers this\
    \ activity, and then gets the parameters being passed through functions like `Intent.getData\
    \ ()`, `Intent.getXXXExtra ()`, `Intent.getExtras ()`, and so on.\n    3.  Writes\
    \ code for the normal activity patterns.\n    4.  If the trigger returns values,\
    \ does the following before exiting the activity:\n        1.  Defines an `Intent`\
    \ object\n        2.  Sets data values for the intent with functions like `Intent.putExtras()`\n\
    \        3.  Sets the return code of the activity by calling the `Activity.setResult()`\
    \ function\n    5.  Adds the code for the activity of the callee in the `AndroidManifest.xml`\
    \ file.\n2.  The code framework for the activity of the callee does the following:\n\
    \    1.  Defines the `Intent` object, and specifies the trigger’s context and\
    \ the `class` attribute of the triggered activity.\n    2.  If parameters need\
    \ to be passed to the activity, sets the parameters for the `Intent` object by\
    \ calling functions of the intent like `setData()`, `putExtras()`, and so on.\n\
    \    3.  Calls `Activity.startActivity(Intent intent)` function to trigger an\
    \ activity without parameters, or call `Activity.startActivityForResult(Intent\
    \ intent, int requestCode)` to trigger an activity with parameters.\n    4.  If\
    \ the activity needs to be triggered by the return value, then the code framework\
    \ rewrites the `onActivityResult()` function of the `Activity` class, which takes\
    \ different actions depending on the request code (`requestCode`), result code\
    \ (`resultCode`), and intentions (`Intent`) values.\n\nIn step 2a, the class attribute\
    \ of the triggered activity is used, which involves a Java mechanism called *reflection.*\
    \ This mechanism can create and return an object of the class according to the\
    \ class name. The object of the triggered activity is not constructed before the\
    \ triggering; therefore triggering the activity also means creating an object\
    \ of that class so that subsequent operations can continue. That is, triggering\
    \ the activity includes the operation of the newly created class objects.\n\n\
    The following two examples illustrate the code framework in detail. This section\
    \ describes the first one. In this example, the triggered activity belongs to\
    \ the same application as the activity of the trigger, and the triggered activity\
    \ does not require any parameters and does not return any values. The new activity\
    \ is triggered via a button, and its activity interface is similar to the interface\
    \ of the example in the section “Exit Activities and Application.” in [Chapter\
    \ 2](#9781484203835_Ch02.xhtml), [Figure 2-16](#9781484203835_Ch02.xhtml#Fig16).\
    \ The entire application interface is shown in [Figure 3-1](#9781484203835_Ch03.xhtml#Fig1).\n\
    \n![9781484203835_Fig03-01.jpg](images/9781484203835_Fig03-01.jpg)\n\n[Figure\
    \ 3-1](#9781484203835_Ch03.xhtml#_Fig1). The application interface with multiple\
    \ activities in the same application without parameters\n\nAfter the application\
    \ starts, the application’s main activity is displayed, as shown in [Figure 3-1(a)](#9781484203835_Ch03.xhtml#Fig1).\
    \ When the Change To The New Interface Without Parameters button is clicked, the\
    \ app displays the new activity, as shown in [Figure 3-1(b)](#9781484203835_Ch03.xhtml#Fig1).\
    \ Clicking the Close Activity button causes the interface to return to the application’s\
    \ main activity, as shown in [Figure 3-1(c)](#9781484203835_Ch03.xhtml#Fig1).\n\
    \nCreate this example by modifying and rewriting the example in the `GuiExam`\
    \ section in [Chapter 2](#9781484203835_Ch02.xhtml), as follows:"
  trans: "\n# 多活动应用与 Intent 机制\n\n在上一章中，您通过创建一个名为`GuiExam`的简单应用程序学习了 Android 界面设计。该章节还涵盖了活动的状态转换、`Context`类、以及\
    \ Intent 的介绍和应用程序与活动之间的关系。您学习了如何使用布局作为界面，以及按钮、事件和内部事件监听器的工作原理。在本章中，您将学习如何创建包含多个活动的应用程序；示例将介绍活动的显式和隐式触发机制。您将看到一个由不同应用程序中的活动触发的带有参数的应用程序示例，这将帮助您理解活动参数的交换机制。\n\
    \n## 包含多个活动的应用程序\n\n上一示例中的应用程序只有一个活动：主活动，它在应用程序启动时显示。本章将演示一个包含多个活动的应用程序，使用活动-Intent\
    \ 机制，并展示`AndroidManifest.xml`文件中所需的更改。\n\n如前所述，活动由 Intent 触发。有两种 Intent 解析方法：*显式匹配*（也称为*直接\
    \ Intent*）和*隐式匹配*（也称为*间接 Intent*）。触发活动也可以带有参数和返回值。此外，Android 自带了许多内置活动，因此被触发的活动可以来自\
    \ Android 本身，也可以是自定义的。基于这些情况，本章使用四个示例来说明不同的活动。对于显式匹配，您将看到带有或不带参数和返回值的应用程序。对于隐式匹配，您将看到使用来自\
    \ Android 系统或用户定义的活动。\n\n## 触发不带参数的显式匹配活动\n\n使用不带参数的显式匹配是最简单的活动 Intent 触发机制。本节首先通过一个示例介绍这种机制，然后在后续部分介绍更复杂的机制。\n\
    \n显式匹配的活动-Intent 触发机制的代码框架包括两个部分：被调用者（被触发）的活动和调用者（触发）的活动。触发器不仅限于活动；它也可以是服务，例如广播\
    \ Intent 接收器。但由于您目前只接触了活动的使用，本节中所有示例的触发器都是活动。\n\n1.  被调用者活动的源代码框架执行以下操作：\n   \
    \ 1.  定义一个继承自`Activity`的类。\n    2.  如果需要传递参数，则在`onCreate`函数中调用`Activity.getIntent()`函数来获取触发此活动的`Intent`对象，然后通过`Intent.getData()`、`Intent.getXXXExtra()`、`Intent.getExtras()`等函数获取传递的参数。\n\
    \    3.  编写正常活动模式的代码。\n    4.  如果需要向触发器返回值，则在退出活动前执行以下操作：\n        1.  定义一个`Intent`对象\n\
    \        2.  使用`Intent.putExtras()`等函数为 Intent 设置数据值\n        3.  调用`Activity.setResult()`函数设置活动的返回码\n\
    \    5.  在`AndroidManifest.xml`文件中添加被调用者活动的代码。\n2.  调用者活动的代码框架执行以下操作：\n    1.\
    \  定义`Intent`对象，并指定触发器的上下文和触发活动的`class`属性。\n    2.  如果需要向活动传递参数，则通过调用 Intent 的`setData()`、`putExtras()`等函数为`Intent`对象设置参数。\n\
    \    3.  调用`Activity.startActivity(Intent intent)`函数触发不带参数的活动，或调用`Activity.startActivityForResult(Intent\
    \ intent, int requestCode)`触发带参数的活动。\n    4.  如果需要通过返回值触发活动，则代码框架重写`Activity`类的`onActivityResult()`函数，该函数根据请求码（`requestCode`）、结果码（`resultCode`）和\
    \ Intent 值采取不同的操作。\n\n在步骤 2a 中，使用了被触发活动的`class`属性，这涉及一种称为*反射*的 Java 机制。这种机制可以根据类名创建并返回该类的对象。被触发活动的对象在触发之前不会被构造；因此触发活动也意味着创建该类的对象，以便后续操作可以继续。也就是说，触发活动包括新创建类对象的操作。\n\
    \n以下两个示例详细说明了代码框架。本节描述第一个示例。在这个示例中，被触发的活动与触发活动属于同一个应用程序，并且被触发的活动不需要任何参数，也不返回任何值。新活动通过按钮触发，其活动界面类似于第\
    \ 2 章中“退出活动和应用程序”部分的示例界面（图 2-16）。整个应用程序界面如图 3-1 所示。\n\n![9781484203835_Fig03-01.jpg](img/9781484203835_Fig03-01.jpg)\n\
    \n图 3-1. 同一应用程序中不带参数的多个活动界面\n\n应用程序启动后，显示应用程序的主活动，如图 3-1(a)所示。当点击“切换到不带参数的新界面”按钮时，应用程序显示新活动，如图\
    \ 3-1(b)所示。点击“关闭活动”按钮会使界面返回应用程序的主活动，如图 3-1(c)所示。\n\n通过修改和重写第 2 章中`GuiExam`部分的示例来创建此示例，具体如下：\n"
- fmt: "1. 为触发的 Activity 生成相应的布局文件：\n    1. 在应用程序的`res\\layout`子目录中右键单击快捷菜单，选择 New\
    \ ![image](images/arrow.jpg) Other Items。弹出 New 对话框。选择`\\XML\\XML File`子目录，然后单击\
    \ Next 继续。在 New XML File 对话框中，输入文件名（此处为`noparam_otheract.xml`），然后单击 Finish。整个过程如图\
    \ 3-2 所示。\n\n    ![9781484203835_Fig03-02.jpg](images/9781484203835_Fig03-02.jpg)\n\
    \n    [Figure 3-2](#9781484203835_Ch03.xhtml#_Fig2). 触发的 Activity 的布局文件\n\n  \
    \  ![Image](images/sq.jpg) **注意**：文件名是布局文件的名称。编译时必须仅使用小写字母，否则将出现错误“Invalid file\
    \ name: must contain only a-z0-9_.”\n\n    您可以在项目的 Package Explorer 中看到新添加的`xxx.xml`文件（此处为`noparam_otheract.xml`），如图\
    \ 3-3 所示。\n\n    ![9781484203835_Fig03-03.jpg](images/9781484203835_Fig03-03.jpg)\n\
    \n    [Figure 3-3](#9781484203835_Ch03.xhtml#_Fig3). 应用程序新添加的布局文件的初始界面\n\n   \
    \ ![Image](images/sq.jpg) **注意**：右侧的布局编辑器窗口仍然是空的，目前没有可见的界面。\n\n    2. 选择左侧面板中的`Layouts`子目录，然后将布局控件（此处为`RelativeLayout`）拖到右侧面板的窗口中。您会立即看到一个可见的（手机屏幕形状的）界面，如图\
    \ 3-4 所示。\n\n    ![9781484203835_Fig03-04.jpg](images/9781484203835_Fig03-04.jpg)\n\
    \n    [Figure 3-4](#9781484203835_Ch03.xhtml#_Fig4). 新添加布局文件的拖放布局\n\n    3. 基于第\
    \ 2 章“使用 ImageView”一节中描述的相同方法，在新的布局文件中放置一个`ImageView`和一个按钮。将`ImageView`控件的`ID`属性设置为`@+id/picture`，将`Button`控件的`ID`属性设置为`@+id/closeActivity`。`Text`属性设置为“Close\
    \ Activity”，如图 3-5 所示。最后，保存布局文件。\n\n    ![9781484203835_Fig03-05.jpg](images/9781484203835_Fig03-05.jpg)\n\
    \n    [Figure 3-5](#9781484203835_Ch03.xhtml#_Fig5). 新添加布局文件的最终配置\n\n2. 为布局文件添加相应的`Activity`类（Java\
    \ 源文件）。为此，右键单击项目目录下的`\\src\\com.example.XXX`，然后选择 New ![image](images/arrow.jpg)\
    \ Class。在 New Java Class 对话框中，在 Name 处输入与新布局文件对应的`Activity`类名（此处为`TheNoParameterOtherActivity`）。单击\
    \ Finish 关闭对话框。整个过程如图 3-6 所示。\n\n    ![9781484203835_Fig03-06.jpg](images/9781484203835_Fig03-06.jpg)\n\
    \n    [Figure 3-6](#9781484203835_Ch03.xhtml#_Fig6). 新添加布局文件对应的类\n\n    您可以看到新添加的\
    \ Java 文件（此处为`TheNoParameterOtherActivity.java`）和初始代码，如图 3-7 所示。\n\n    ![9781484203835_Fig03-07.jpg](images/9781484203835_Fig03-07.jpg)\n\
    \n    [Figure 3-7](#9781484203835_Ch03.xhtml#_Fig7). 新添加布局对应的类和初始源代码\n\n3. 编辑新添加的`.java`文件（`TheNoParameterOtherActivity.java`）。此类执行被触发的\
    \ Activity（被调用者）的活动。其源代码如下（粗体文本为添加或修改的内容）：\n\n    ```\n        Line #        Source\
    \ Code\n        1  package com.example.guiexam;\n        2  import android.os.Bundle;\
    \                 // 使用 Bundle 类\n        3  import android.app.Activity;    \
    \          // 使用 Activity 类\n        4  import android.widget.Button;        \
    \     // 使用 Button 类\n        5  import android.view.View;                 //\
    \ 使用 View 类\n        6  import android.view.View.OnClickListener; // 使用 OnClickListener\
    \ 类\n\n        7  public class TheNoParameterOtherActivity extends Activity {\n\
    \        8  // 定义 Activity 子类\n        9     @Override\n        10 protected void\
    \ onCreate(Bundle savedInstanceState) {\n        11 // 定义 onCreate 方法\n      \
    \  12        super.onCreate(savedInstanceState);\n        13 // 调用父类的 onCreate\
    \ 方法\n        14        setContentView(R.layout.noparam_otheract);\n        15\
    \ // 设置布局文件\n        16        Button btn = (Button) findViewById(R.id.closeActivity);\n\
    \        17 // 为 <Close Activity> 按钮设置响应代码\n        18        btn.setOnClickListener(new\
    \ /*View.*/OnClickListener(){\n        19          public void onClick(View v)\
    \ {\n                   finish();\n           // 关闭此 Activity\n              }\n\
    \              });\n           }\n           }\n    ```\n\n    在第 7 行，您为新创建的类添加了父类`Activity`。第\
    \ 8 到 18 行的代码与应用程序的主 Activity 类似。请注意，在第 14 行，代码调用`setContentView()`函数来设置`Activity`的布局，其参数是在第一步中创建的新布局\
    \ XML 文件的前缀名称。\n\n4. 编辑触发器（调用者）Activity 的代码。触发器 Activity 是应用程序的主 Activity。源代码是`MainActivity.java`，布局文件是`activity_main.xml`。编辑步骤如下：\n\
    \    1. 编辑布局文件，删除原始的`TextView`控件，并添加一个按钮。将其`ID`属性设置为`@+id/goTONoParamNewAct`，`Text`属性设置为“Change\
    \ to interface without Parameter”，如图 3-8 所示。\n\n    ![9781484203835_Fig03-08.jpg](images/9781484203835_Fig03-08.jpg)\n\
    \n    [Figure 3-8](#9781484203835_Ch03.xhtml#_Fig8). 触发器 Activity 的布局配置\n\n  \
    \  2. 编辑触发器 Activity 的源代码文件（此处为`MainActivity.java`），如下所示（粗体文本为添加或修改的内容）：\n\n \
    \   ```\n            Line #        Source Code\n            1  package com.example.guiexam;\n\
    \            2  import android.os.Bundle;\n            3  import android.app.Activity;\n\
    \            4  import android.view.Menu;\n            5  import android.content.Intent;\
    \            // 使用 Intent 类\n            6  import android.widget.Button;    \
    \         // 使用 Button 类\n            7  import android.view.View.OnClickListener;\n\
    \            8  import android.view.View;\n\n            9  public class MainActivity\
    \ extends Activity {\n            10     @Override\n            11     public\
    \ void onCreate(Bundle savedInstanceState) {\n            12         super.onCreate(savedInstanceState);\n\
    \            13         setContentView(R.layout.activity_main);\n            14\
    \     Button btn = (Button) findViewById(R.id.goTONoParamNewAct);\n          \
    \  15     btn.setOnClickListener(new /*View.*/OnClickListener(){\n           \
    \ 16         public void onClick(View v) {\n            17             Intent\
    \ intent = new Intent(MainActivity.this,\n                                   \
    \            TheNoParameterOtherActivity.class);\n            18             startActivity(intent);\n\
    \            19         }\n            20     });\n            21     }\n    \
    \        22     @Override\n            23     public boolean onCreateOptionsMenu(Menu\
    \ menu) {\n            24         getMenuInflater().inflate(R.menu.activity_main,\
    \ menu);\n            25         return true;\n            26     }\n        \
    \    27 }\n    ```\n\n    第 17 行的代码定义了一个意图。此处的构造函数原型为：\n\n    ```\n          \
    \  Intent(Context packageContext, Class<?> cls)\n    ```"
  raw: "1.  Generate the corresponding layout file for the triggered activity:\n \
    \   1.  Right-click the shortcut menu in the `res\\layout` subdirectory of the\
    \ application, and select New ![image](images/arrow.jpg) Other Items. A New dialog\
    \ box pops up. Select the `\\XML\\XML File` subdirectory, and click Next to continue.\
    \ In the New XML File dialog box, enter the file name (in this case `noparam_otheract.xml`),\
    \ and click Finish. The entire process is shown in [Figure 3-2](#9781484203835_Ch03.xhtml#Fig2).\n\
    \n![9781484203835_Fig03-02.jpg](images/9781484203835_Fig03-02.jpg)\n\n[Figure\
    \ 3-2](#9781484203835_Ch03.xhtml#_Fig2). The layout file for the triggered activity\n\
    \n![Image](images/sq.jpg) **Note**  The file name is the name of the layout file.\
    \ You must use only lowercase letters for compilation to be successful; otherwise\
    \ you will get the error “Invalid file name: must contain only a-z0-9_.”\n\nYou\
    \ can see the newly added `xxx.xml` file (in this case, `noparam_otheract.xml`)\
    \ in the project’s Package Explorer, as shown in [Figure 3-3](#9781484203835_Ch03.xhtml#Fig3).\n\
    \n![9781484203835_Fig03-03.jpg](images/9781484203835_Fig03-03.jpg)\n\n[Figure\
    \ 3-3](#9781484203835_Ch03.xhtml#_Fig3). Initial interface of the application’s\
    \ newly added layout file\n\n![Image](images/sq.jpg) **Note**  The layout editor\
    \ window on the right is still empty, and there is no visible interface so far.\n\
    \n2.  Select the `Layouts` subdirectory in the left palette, and drag the layout\
    \ control (in this case, `RelativeLayout`) onto the window in the right pane.\
    \ You immediately see a visible (phone-screen shaped) interface, as shown in [Figure\
    \ 3-4](#9781484203835_Ch03.xhtml#Fig4).\n\n![9781484203835_Fig03-04.jpg](images/9781484203835_Fig03-04.jpg)\n\
    \n[Figure 3-4](#9781484203835_Ch03.xhtml#_Fig4). Drag-and-drop layout for the\
    \ newly added layout file\n\n3.  Based on the same methodology described in the\
    \ section “Using ImageView” in [Chapter 2](#9781484203835_Ch02.xhtml), place an\
    \ `ImageView` and a button in the new layout file. Set the `ImageView` widget’s\
    \ `ID` attribute to `@+id/picture` and the `Button` widget’s `ID` attribute to\
    \ `@+id/closeActivity`. The `Text` property is “Close Activity,” as shown in [Figure\
    \ 3-5](#9781484203835_Ch03.xhtml#Fig5). Finally, save the layout file.\n\n![9781484203835_Fig03-05.jpg](images/9781484203835_Fig03-05.jpg)\n\
    \n[Figure 3-5](#9781484203835_Ch03.xhtml#_Fig5). Final configuration of the newly\
    \ added layout file\n\n2.  Add the corresponding `Activity` class for the layout\
    \ file (Java source files). To do so, right-click `\\src\\com.example.XXX` under\
    \ the project directory, and select New ![image](images/arrow.jpg) Class on the\
    \ shortcut menu. In the New Java Class dialog box, for Name, enter the `Activity`\
    \ class name corresponding to the new layout file (in this case, `TheNoParameterOtherActivity`).\
    \ Click Finish to close the dialog box. The whole process is shown in [Figure\
    \ 3-6](#9781484203835_Ch03.xhtml#Fig6).\n\n![9781484203835_Fig03-06.jpg](images/9781484203835_Fig03-06.jpg)\n\
    \n[Figure 3-6](#9781484203835_Ch03.xhtml#_Fig6). Corresponding class for the newly\
    \ added layout file\n\nYou can see the newly added Java files (in this case, `TheNoParameterOtherActivity.java`)\
    \ and the initial code, as shown in [Figure 3-7](#9781484203835_Ch03.xhtml#Fig7).\n\
    \n![9781484203835_Fig03-07.jpg](images/9781484203835_Fig03-07.jpg)\n\n[Figure\
    \ 3-7](#9781484203835_Ch03.xhtml#_Fig7). Corresponding class and initial source\
    \ code of the newly added layout\n\n3.  Edit the newly added `.java` file (`TheNoParameterOtherActivity.java`).\
    \ This class executes the activity of the triggered activity (callee). Its source\
    \ code is as follows (bold text is added or modified):\n\n```\n    Line #        Source\
    \ Code\n    1  package com.example.guiexam;\n    2  import android.os.Bundle;                \
    \ // Use Bundle class\n    3  import android.app.Activity;              // Use\
    \ Activity Class\n    4  import android.widget.Button;             // Use Button\
    \ class\n    5  import android.view.View;                 // Use View class\n\
    \    6  import android.view.View.OnClickListener; // Use OnClickListener Class\n\
    \n7  public class TheNoParameterOtherActivity extends Activity {\n    8  // Define\
    \ Activity subclass\n    9     @Override\n    10 protected void onCreate(Bundle\
    \ savedInstanceState) {\n    11 // Define onCreate method\n    12        super.onCreate(savedInstanceState);\n\
    \    13 // onCreate method of calling parent class\n    14        setContentView(R.layout.noparam_otheract);\n\
    \    15 // Set layout file\n    16        Button btn = (Button) findViewById(R.id.closeActivity);\n\
    \    17 // Set responding code for <Close Activity> Button\n    18        btn.setOnClickListener(new\
    \ /*View.*/OnClickListener(){\n    19          public void onClick(View v) {\n\
    \                   finish();\n       // Close this activity\n              }\n\
    \              });\n       }\n       }\n    ```\n\nIn line 7, you add the superclass\
    \ `Activity` for the newly created class. The code in lines 8 through 18 is similar\
    \ to the application’s main activity. Note that in line 14, the code calls the\
    \ `setContentView()` function to set the layout for `Activity`, where the parameter\
    \ is the prefix name of the new layout XML file created in the first step.\n\n\
    4.  Edit the code for the trigger (caller) activity. The trigger activity is the\
    \ main activity of the application. The source code is `MainActivity.java`, and\
    \ the layout file is `activity_main.xml`. The steps for editing are as follows:\n\
    \    1.  Edit the layout file, delete the original `TextView` widgets, and add\
    \ a button. Set its `ID` property to `@+id/goTONoParamNewAct` and its `Text` property\
    \ to “Change to interface without Parameter,” as shown in [Figure 3-8](#9781484203835_Ch03.xhtml#Fig8).\n\
    \n![9781484203835_Fig03-08.jpg](images/9781484203835_Fig03-08.jpg)\n\n[Figure\
    \ 3-8](#9781484203835_Ch03.xhtml#_Fig8). Layout configuration for the trigger\
    \ activity\n\n2.  Edit the source code file of the trigger activity (in this case,\
    \ `MainActivity.java`) as follows (bold text is either added or modified):\n\n\
    ```\n        Line #        Source Code\n        1  package com.example.guiexam;\n\
    \        2  import android.os.Bundle;\n        3  import android.app.Activity;\n\
    \        4  import android.view.Menu;\n        5  import android.content.Intent;          \
    \ // Use Intent class\n        6  import android.widget.Button;            //\
    \ Use Button class\n        7  import android.view.View.OnClickListener;\n   \
    \     8  import android.view.View;\n\n9  public class MainActivity extends Activity\
    \ {\n        10     @Override\n        11     public void onCreate(Bundle savedInstanceState)\
    \ {\n        12         super.onCreate(savedInstanceState);\n        13        \
    \ setContentView(R.layout.activity_main);\n        14     Button btn = (Button)\
    \ findViewById(R.id.goTONoParamNewAct);\n        15     btn.setOnClickListener(new\
    \ /*View.*/OnClickListener(){\n        16         public void onClick(View v)\
    \ {\n        17             Intent intent = new Intent(MainActivity.this,\n  \
    \                                         TheNoParameterOtherActivity.class);\n\
    \        18             startActivity(intent);\n        19         }\n       \
    \ 20     });\n        21     }\n        22     @Override\n        23     public\
    \ boolean onCreateOptionsMenu(Menu menu) {\n        24         getMenuInflater().inflate(R.menu.activity_main,\
    \ menu);\n        25         return true;\n        26     }\n        27 }\n  \
    \      ```\n\nThe code in line 17 defines an intent. The constructor function\
    \ prototype in this case is\n\n```\n        Intent(Context packageContext, Class<?>\
    \ cls)\n        ```"
