    In this last chapter covering Android GUI design, you are introduced to the basic
    framework of drawings in the view, the concept of how the drawing framework responds
    to touch screen input, and how to control the display of the view as well as the
    multi-touch code framework. You use an example that illustrates the multi-touch
    programming framework and keyboard input response. You learn the methods to respond
    to keyboard input and hardware buttons that are available on Android devices,
    such as `Volume +`, `Volume -`, `Power`, `Home`, `Menu`, `Back`, `Search`, and
    so on. You are introduced to the three different dialog boxes for Android, which
    include the activity dialog theme, a specific class dialog, and `Toast` reminder.
    At the end of the chapter, you learn how to change the application property settings.


