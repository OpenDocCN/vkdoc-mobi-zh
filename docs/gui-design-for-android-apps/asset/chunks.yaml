    37                                                break;\n38        case MotionEvent.ACTION_MOVE:\
    \          // 屏幕触摸移动\n39            if (event.getPointerCount() == 2 ) {\n40 \
    \               px1 = event.getX(0);     // 获取第一个触摸点的 X、Y 坐标\n41             \
    \   py1 = event.getY(0);\n42                px2 = event.getX(1);         // 获取第二个触摸点的\
    \ X、Y 坐标\n43                py2 = event.getY(1);\n44                interPointDistance\
    \ = (float) Math.sqrt((px6-px2)*(px6-\n                  px2)+(py1 - py2)*(py1\
    \ - py2));\n45                if (!bScreenPress){\n46                    bScreenPress\
    \ = true;\n47                    preInterPointDistance = interPointDistance;\n\
    48                } else {\n49                    graphScale = interPointDistance\n\
    \                                        // preInterPointDistance;\n50       \
    \             invalidate();      // 重绘图形\n51                }\n52            \
    \    } else {\n53                bScreenPress = false;\n54                radius\
    \ = (int)(radius * graphScale);\n55 // 一次缩小/放大圆形结束。记录最终缩放因子\n56            }\n\
    57            break;\n58        case MotionEvent.ACTION_UP:            // 屏幕触摸抬起\n\
    59            bScreenPress = false;\n60            radius = (int)(radius * graphScale);\n\
    61 // 一次缩小/放大圆形结束。记录最终缩放因子\n62            break;\n63        }\n64        return\
    \ true;\n     }\n   }\n```\n\n这段代码在第 15 行定义了用于双点触控的缩放因子`graphScale`，并在第 16 行定义了变量`preInterPointDistance`来记录两个触摸点之间的距离。第\
    \ 17 行定义了屏幕被按下时的标志变量`bScreenPress`。\n\n第 26 和 27 行在`onDraw`函数中调用了`Canvas`类的`getWidth`和`getHeight`方法，以获取视图的宽度和高度，然后将圆心设置在视图中心。这样做的优点在于，当屏幕旋转\
    \ 90 度时，圆形仍保持在视图中心，如图 4-4(d) 所示。这些示例与之前示例的区别在于，这次绘制的圆形半径等于原始半径乘以缩放因子`graphScale`。\n\
    \n第 32–61 行包含了基于上一节修改后的示例的`onDraw`内容。第 38–56 行是触摸移动事件的响应代码。第 39 行判断是否有两个触摸点；如果有，则执行第\
    \ 40–51 行的代码；否则，执行第 53–54 行。在双点首次按下时，你将标志`bScreenPress`设为`false`，然后将最终半径记录为当前半径值乘以缩放因子`graphScale`。你在第\
    \ 40–43 行获取两个触摸点的位置坐标。第 44 行计算两个触摸点之间的距离。第 45 行判断是否为首次按下；如果是，则执行第 46 和 47 行，并记录两个触摸点之间的距离；否则，执行第\
    \ 49–50 行的代码。在这里，你根据当前两点的距离与上一次移动时的距离来计算缩放因子。之后，图形会被重绘。"
  raw: 'Most Android devices support multi-touch touchscreens. The good news is that
    the Android system software also provides multi-touch support. This section covers
    the multi-touch code framework.


    The touch event class `MotionEvent` has a `getPointerCount()` function that returns
    the current number of touch points on the screen. The function prototype is


    ```

    final int MotionEvent.getPointerCount();

    ```


    You can also use the `getX` and `getY` functions discussed earlier to obtain the
    coordinates of the touch point. The prototypes are as follows:


    ```

    final float  MotionEvent.getX(int pointerIndex)

    final float  MotionEvent.getX()

    final float  MotionEvent.getY(int pointerIndex)

    final float  MotionEvent.getY()

    ```


    In the previous section, you got the coordinates of a single touch point using
    a function with no parameters. The `getX`/`getY` functions with parameters are
    used to get the position of the touch point in the multi-point touch situation,
    where the parameter `pointerIndex` is the index number for the touch point. This
    is an integer number starting at 0.


    Here is an example to illustrate the multi-touch programming framework. This example
    is a two-point touch application that zooms a circle in and out. The application
    interface is shown in [Figure 4-4](#9781484203835_Ch04.xhtml#Fig4).


    ![9781484203835_Fig04-04.jpg](images/9781484203835_Fig04-04.jpg)


    [Figure 4-4](#9781484203835_Ch04.xhtml#_Fig4). The interface of the two-point
    touch zoom-in/zoom-out GuiExam graphic application


    The application’s launch interface is shown in [Figure 4-4(a)](#9781484203835_Ch04.xhtml#Fig4).
    The circle is always at the center of the view, but the size of the circle (its
    radius) can be controlled by a two-point touch. The center is the center of the
    view, not the center of the activity or the center of the screen. The so-called
    two-point touchscreen means there are two touch points, or two fingers moving
    on the screen at the same time, either in an expand gesture where the circle becomes
    larger (b) or in squeeze gesture where the circle becomes smaller (c). The code
    is as follows:


    ```

    Line#        Source Code

    1  package com.example.guiexam;


    3  import android.view.View;

    4  import android.graphics.Canvas;

    5  import android.graphics.Paint;

    6  import android.content.Context;


    8  import android.view.MotionEvent;

    9  import java.lang.Math;


    10 public class MyView extends View {

    11    private static final int initRadius = 120; // initial value ofthe radius

    12    private float cx;                     // X coordinate of the circle

    13    private float cy;                     // Y coordinate of the circle

    14    private int radius = initRadius;      // Set initial value of

                                                   the radius

    15    public float graphScale = 1;          // Set Scale factor for one

                                                   two-point touch move

    16    private float preInterPointDistance;  // Pre-distance of two touch

                                                   points

    17    private boolean bScreenPress = false; // The sign of the screen being

                                                   pressed down

    18    private Paint paint;                  // Define paintbrush


    19    public MyView(Context context) {

    20     super(context);

    21     paint = new Paint();                 // Initialize paintbrush

    22     paint.setAntiAlias(true);            // Set Anti Alias

    23 }


    24    @Override

    25    protected void onDraw(Canvas canvas) {

    26     cx = canvas.getWidth()/2;            // Let circle center positioned

                                                   at the screen of the screen

    27     cy = canvas.getHeight()/2;

    28     canvas.drawCircle(cx, cy, radius*graphScale, paint);

    29 }


    30    @Override

    31    public boolean onTouchEvent(MotionEvent event) {

    32        float px1, py1;         // Define the X,Y coordinates of 1st touch

                                         point

    33        float px2, py2;        // Define the X,Y coordinates of 2nd touch

                                        point

    34        float interPointDistance;    //distance between two  touch points

    35        switch (event.getAction()) {

    36        case MotionEvent.ACTION_DOWN:         // Screen touch pressed

    37                                                 break;

    38        case MotionEvent.ACTION_MOVE:         // Screen touch move

    39            if (event.getPointerCount() == 2 ) {

    40                px1 = event.getX(0);    //Get the X,Y coordinate of the

                                                first touch point

    41                py1 = event.getY(0);

    42                px2 = event.getX(1);        // Get the X,Y coordinate of

                                                     the second touch point

    43                py2 = event.getY(1);

    44                interPointDistance = (float) Math.sqrt((px6-px2)*(px6-

                      px2)+(py1 - py2)*(py1 - py2));

    45                if (!bScreenPress){

    46                    bScreenPress = true;

    47                    preInterPointDistance = interPointDistance;

    48                } else {

    49                    graphScale = interPointDistance

                                            // preInterPointDistance;

    50                    invalidate();     // Redraw graphics

    51                }

    52                } else {

    53                bScreenPress = false;

    54                radius = (int)(radius * graphScale);

    55 // One downsize/enlarge circle end. Record final scale factor

    56            }

    57            break;

    58        case MotionEvent.ACTION_UP:         // Screen touch lift up

    59            bScreenPress = false;

    60            radius = (int)(radius * graphScale);

    61 // One downsize/enlarge circle end. Record final scale factor

    62            break;

    63        }

    64        return true;

        }

     }

    ```


    This code defines a scaling factor `graphScale` for a two-point touch in line
    15 and a variable `preInterPointDistance` in line 16 to record the distance between
    the two touch points. Line 17 defines the flag variable `bScreenPress` when the
    screen is pressed.


    Lines 26 and 27 call `getWidth` and `getHeight` of the `Canvas` class in the `onDraw`
    function to get the view’s width and height, and then allocate the center of the
    circle in the center of the view. The advantage of this step is that, when the
    screen rotates 90 degrees, the circle remains in the center of the view, as shown
    in [Figure 4-4(d)](#9781484203835_Ch04.xhtml#Fig4). The difference between these
    examples and the previous one is that this time the radius of the circle being
    drawn is equal to the radius of the circle multiplied by the scaling factor `graphScale`.


    Lines 32–61 contain `onDraw` based on the modified example in the previous section.
    Lines 38–56 are the response code for a touch-move activity. Line 3 determines
    whether there are two touch points; if there are, you run code lines 40–51; otherwise,
    you run lines 53–54\. You set the flag `bScreenPress` to false to indicate when
    the two touch points are first pressed, and then you record the final radius as
    equal to the current value of the radius multiplied by the scaling factor `graphScale`.
    You get the position coordinates of the two touch points in lines 40–43\. Line
    44 calculates the distance between the two touch points. Line 45 determines whether
    it is the first press; if it is, lines 46 and 47 run, and record the distance
    between the two touch points; otherwise, the code in lines 49–50 runs. Here you
    calculate the scaling factor based on the current distance between the points
    and the distance in the previous movement. After this, the graphic is redrawn.'
  trans: "\n大多数 Android 设备都支持多点触控触摸屏。好消息是，Android 系统软件也提供了多点触控支持。本节将介绍多点触控代码框架。\n\n\
    触控事件类 `MotionEvent` 有一个 `getPointerCount()` 函数，用于返回当前屏幕上的触摸点数量。该函数原型如下：\n\n```\n\
    final int MotionEvent.getPointerCount();\n```\n\n你还可以使用前面讨论过的 `getX` 和 `getY`\
    \ 函数来获取触摸点的坐标。其原型如下：\n\n```\nfinal float  MotionEvent.getX(int pointerIndex)\n\
    final float  MotionEvent.getX()\nfinal float  MotionEvent.getY(int pointerIndex)\n\
    final float  MotionEvent.getY()\n```\n\n在上一节中，你使用了无参数的函数来获取单个触摸点的坐标。带参数的 `getX`/`getY`\
    \ 函数用于获取多点触摸情况下触摸点的位置，其中参数 `pointerIndex` 是触摸点的索引编号。这是一个从 0 开始的整数。\n\n下面是一个示例，用于说明多点触控编程框架。该示例是一个双点触控应用，用于放大和缩小一个圆形。应用界面如图\
    \ 4-4 所示。\n\n![9781484203835_Fig04-04.jpg](img/9781484203835_Fig04-04.jpg)\n\n\
    **图 4-4.** 双点触控缩放 GuiExam 图形应用的界面\n\n应用的启动界面如图 4-4(a) 所示。圆形始终位于视图的中心，但其大小（半径）可以通过双点触控来控制。这里的中心指的是视图的中心，而不是\
    \ Activity 的中心或屏幕的中心。所谓的双点触控屏幕，意味着有两个触摸点，或者两根手指同时在屏幕上移动，可以是展开手势（圆形变大，如图 b），也可以是捏合手势（圆形变小，如图\
    \ c）。代码如下：\n\n```\nLine#        Source Code\n1   package com.example.guiexam;\n\
    \n3   import android.view.View;\n4   import android.graphics.Canvas;\n5   import\
    \ android.graphics.Paint;\n6   import android.content.Context;\n\n8   import android.view.MotionEvent;\n\
    9   import java.lang.Math;\n\n10  public class MyView extends View {\n11     private\
    \ static final int initRadius = 120; // 半径初始值\n12     private float cx;      \
    \               // 圆心的 X 坐标\n13     private float cy;                     // 圆心的\
    \ Y 坐标\n14     private int radius = initRadius;      // 设置半径初始值\n15     public\
    \ float graphScale = 1;          // 为一次双点触控移动设置缩放因子\n16     private float preInterPointDistance;\
    \  // 两触摸点之间的前一次距离\n17     private boolean bScreenPress = false; // 屏幕被按下的标志\n\
    18     private Paint paint;                  // 定义画笔\n\n19     public MyView(Context\
    \ context) {\n20      super(context);\n21      paint = new Paint();          \
    \      // 初始化画笔\n22      paint.setAntiAlias(true);           // 设置抗锯齿\n   }\n\n\
    24     @Override\n25     protected void onDraw(Canvas canvas) {\n26      cx =\
    \ canvas.getWidth()/2;           // 让圆心位于屏幕中心\n27      cy = canvas.getHeight()/2;\n\
    28      canvas.drawCircle(cx, cy, radius*graphScale, paint);\n   }\n\n30     @Override\n\
    31     public boolean onTouchEvent(MotionEvent event) {\n32        float px1,\
    \ py1;          // 定义第一个触摸点的 X、Y 坐标\n33        float px2, py2;          // 定义第二个触摸点的\
    \ X、Y 坐标\n34        float interPointDistance;       // 两个触摸点之间的距离\n35        switch\
    \ (event.getAction()) {\n36        case MotionEvent.ACTION_DOWN:          // 屏幕触摸按下\n\
    37                                                break;\n38        case MotionEvent.ACTION_MOVE:\
    \          // 屏幕触摸移动\n39            if (event.getPointerCount() == 2 ) {\n40 \
    \               px1 = event.getX(0);     // 获取第一个触摸点的 X、Y 坐标\n41             \
    \   py1 = event.getY(0);\n42                px2 = event.getX(1);         // 获取第二个触摸点的\
    \ X、Y 坐标\n43                py2 = event.getY(1);\n44                interPointDistance\
    \ = (float) Math.sqrt((px6-px2)*(px6-\n                  px2)+(py1 - py2)*(py1\
    \ - py2));\n45                if (!bScreenPress){\n46                    bScreenPress\
    \ = true;\n47                    preInterPointDistance = interPointDistance;\n\
    48                } else {\n49                    graphScale = interPointDistance\n\
    \                                        // preInterPointDistance;\n50       \
    \             invalidate();      // 重绘图形\n51                }\n52            \
    \    } else {\n53                bScreenPress = false;\n54                radius\
    \ = (int)(radius * graphScale);\n55 // 一次缩小/放大圆形结束。记录最终缩放因子\n56            }\n\
    57            break;\n58        case MotionEvent.ACTION_UP:            // 屏幕触摸抬起\n\
    59            bScreenPress = false;\n60            radius = (int)(radius * graphScale);\n\
    61 // 一次缩小/放大圆形结束。记录最终缩放因子\n62            break;\n63        }\n64        return\
    \ true;\n     }\n   }\n```\n\n这段代码在第 15 行定义了用于双点触控的缩放因子 `graphScale`，并在第 16 行定义了变量\
    \ `preInterPointDistance` 来记录两个触摸点之间的距离。第 17 行定义了屏幕被按下时的标志变量 `bScreenPress`。\n\
    \n第 26 和 27 行在 `onDraw` 函数中调用了 `Canvas` 类的 `getWidth` 和 `getHeight` 方法，以获取视图的宽度和高度，然后将圆心设置在视图中心。这样做的优点在于，当屏幕旋转\
    \ 90 度时，圆形仍保持在视图中心，如图 4-4(d) 所示。这些示例与之前示例的区别在于，这次绘制的圆形半径等于原始半径乘以缩放因子 `graphScale`。\n\
    \n第 32–61 行包含了基于上一节修改后的示例的 `onDraw` 内容。第 38–56 行是触摸移动事件的响应代码。第 39 行判断是否有两个触摸点；如果有，则执行第\
    \ 40–51 行的代码；否则，执行第 53–54 行。在双点首次按下时，你将标志 `bScreenPress` 设为 `false`，然后将最终半径记录为当前半径值乘以缩放因子\
    \ `graphScale`。你在第 40–43 行获取两个触摸点的位置坐标。第 44 行计算两个触摸点之间的距离。第 45 行判断是否为首次按下；如果是，则执行第\
    \ 46 和 47 行，并记录两个触摸点之间的距离；否则，执行第 49–50 行的代码。在这里，你根据当前两点的距离与上一次移动时的距离来计算缩放因子。之后，图形会被重绘。\n"
- fmt: "为了处理`bScreenPress`标志的位置，你在第58-60行执行了屏幕触摸抬起活动的响应代码，这与第53和54行中非两点触摸的代码类似。\n\n\
    ## 响应键盘输入\n\n大多数Android设备都有许多硬件按钮，例如音量+、音量-、电源、主页、菜单、返回、搜索等。一些Android设备还配备了键盘。键盘（包括设备的硬件按钮）是Android应用程序的重要输入方法。键盘输入对应于键盘事件，名为`KeyEvent`（也称为*按键事件*）。在本节中，你将学习响应键盘输入的方法。\n\
    \n在Android中，`Activity`和`View`类都可以接收按键事件。按键事件会触发调用`Activity`或`View`类的`onKeyDown`函数。函数原型为：\n\
    \n```\nboolean    Activity.onKeyDown(int keyCode, KeyEvent event);\nboolean  \
    \  View.onKeyDown(int keyCode, KeyEvent event);\n```\n\n`keyCode`参数是所按下按键的索引代码。Android中的每个按键都有一个唯一的编号，即`keyCode`。部分按键代码已在[表1-1](#9781484203835_Ch01.xhtml#Tab1)中描述。按键事件`KeyEvent`包含与按钮相关的属性，例如其被按下的频率。要处理按键事件，你需要重写`onKeyDown`函数并添加你自己的响应处理代码。\n\
    \n有趣的是，尽管`Activity`和`View`类都可以接收按键事件，但视图通常包含在活动中。当按下按钮时，事件首先发送给外部活动；也就是说，活动会更早地接收到事件。以下示例展示了如何通过重写活动的`onKeyDown`函数来响应按钮按下。\n\
    \n本示例演示了如何使用方向键在应用程序中移动圆形。应用程序界面如图[4-5](#9781484203835_Ch04.xhtml#Fig5)所示。\n\n\
    ![9781484203835_Fig04-05.jpg](images/9781484203835_Fig04-05.jpg)\n\n[图4-5](#9781484203835_Ch04.xhtml#_Fig5).\
    \ 使用按键控制应用程序界面中圆形的移动\n\n我们测试用的联想手机没有键盘，因此我们选择在虚拟机上运行该应用程序。虚拟机具有左、下、右、上方向键来实现这些圆形移动。应用程序启动界面如图[4-5(a)](#9781484203835_Ch04.xhtml#Fig5)所示。按下左、下、右或上按钮会使圆形向相应方向移动。界面示例如图[4-5(b)](#9781484203835_Ch04.xhtml#Fig5)至[(e)](#9781484203835_Ch04.xhtml#Fig5)所示。\n\
    \n此应用程序基于本章开头创建的示例（[图4-1](#9781484203835_Ch04.xhtml#Fig1)），并按以下步骤进行了修改：\n\n4.\
    \ 修改`MyView.java`的源代码，如下所示：\n\n```\n          Line#        Source Code\n     \
    \     1  package com.example.guiexam;\n\n3  import android.view.View;\n      \
    \    4  import android.graphics.Canvas;\n          5  import android.graphics.Paint;\n\
    \          6  import android.content.Context;\n\n7  public class MyView extends\
    \ View {\n          8      private float cx = 250;      // X coordinate of the\
    \ circle\n          9      private float cy = 250;      // Y coordinate of the\
    \ circle\n          10     private static final int radius = 120; // Radius of\
    \ the circle\n          11     private Paint paint;                 // define\
    \ paint brush\n          12     private static final int MOVESTEP = 10;    //\
    \ the step\n                 length for pressing direction key\n\n13     public\
    \ MyView(Context context) {\n          14        super(context);\n          15\
    \         paint = new Paint();                // Paint brush\n               \
    \      initialization\n          16         paint.setAntiAlias(true);        \
    \   // Set Anti Alias\n          17     }\n\n18     @Override\n          19  \
    \   protected void onDraw(Canvas canvas) {\n          20         canvas.drawCircle(cx,\
    \ cy, radius, paint);\n          21     }\n\n22     ////// Self-define function:press\
    \ key to move graphic\n                 (circle) //////\n          23     public\
    \ void moveCircleByPressKey(int horizon, int\n                 vertical){\n  \
    \        24         if (horizon < 0)                // horizontal move\n     \
    \     25             cx -= MOVESTEP;\n          26         else if (horizon >\
    \ 0)\n          27             cx += MOVESTEP;\n          28          if (vertical\
    \ < 0)\n          29             cy += MOVESTEP;            // vertical move\n\
    \          30         else if (vertical > 0)\n          31             cy -= MOVESTEP;\n\
    \          32         postInvalidate();              // note to repaint\n    \
    \      33     }\n          34  }\n```\n\n在第23－33行中，你向视图类添加了一个函数，通过按水平或垂直方向键来移动图像（圆形）。该函数接受两个参数：`horizon`和`vertical`。如果`horizon`小于0，则减小圆形的X坐标值，结果圆形向左移动。如果`horizon`大于0，则增大圆形的X坐标值，这会使圆形向右移动。你对垂直参数执行类似的操作以向上和向下移动圆形。第32行用新参数更新图形例程并触发视图重绘。\n\
