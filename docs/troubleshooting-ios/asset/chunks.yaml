- fmt: "### A Photo’s Colors Look Wrong\n\nYour photo’s colors might end up looking\
    \ off somehow. For example, they might lack intensity, they might look too similar,\
    \ or the photo overall might look too blue or too red.\n\n**Solution:** The Photos\
    \ app offers several tools you can use to improve your photo’s colors. The easiest\
    \ of these tools is the `Enhance` feature, which can adjust the photo’s colors\
    \ automatically. To apply the `Enhance` tool, use the Photos app to open the photo\
    \ you want to fix, tap the photo to display the controls (if you don’t see them),\
    \ tap `Edit` (shown earlier in Figure [7-6](#A429116_1_En_7_Chapter.html#Fig6)),\
    \ tap `Enhance` (shown earlier in Figure [7-7](#A429116_1_En_7_Chapter.html#Fig7)),\
    \ and then tap `Done`.\n\nIf the `Enhance` feature didn’t improve your photo’s\
    \ colors, or if you prefer a more detailed edit, the Photos app also offers editing\
    \ tools that can help you solve specific problems related to color. There are\
    \ three sliders that you can use to adjust the colors in a photo:\n\n- **Saturation.**\
    \ Use this slider to adjust the intensity of the photo’s colors. If your photo\
    \ lacks dynamism, try increasing the saturation.\n- **Contrast.** Use this slider\
    \ to adjust the distribution of the photo’s color tones. If the colors all kind\
    \ of blend together, increase the contrast to make the colors stand apart.\n-\
    \ **Cast.** Use this slider to adjust a photo that has too much red or too much\
    \ blue.\n\nTo adjust a photo’s colors using these tools, follow these steps:\n\
    \n1.  In the Photos app, open the photo you want to fix.  \n2.  Tap the photo\
    \ to display the controls, if you don’t see them already.  \n3.  Tap `Edit` (pointed\
    \ out earlier in Figure [7-6](#A429116_1_En_7_Chapter.html#Fig6)). The Photos\
    \ app displays its editing tools.  \n4.  Tap `Light` (see Figure [7-8](#A429116_1_En_7_Chapter.html#Fig8),\
    \ earlier).  \n5.  Tap the `Color` list. (In some cases, you might need to first\
    \ tap the `List` icon, which is similar to the icon pointed out earlier in Figure\
    \ [7-10](#A429116_1_En_7_Chapter.html#Fig10).) The Photos app displays the available\
    \ settings, as shown in Figure [7-11](#A429116_1_En_7_Chapter.html#Fig11)).\n\n\
    \    ![A429116_1_En_7_Fig11_HTML.jpg](A429116_1_En_7_Fig11_HTML.jpg)\n\n    **Figure\
    \ 7-11.** Tap the `Color` list to see the available color-related adjustments\
    \ you can make to your photo  \n6.  Tap the setting you want to adjust. Photos\
    \ displays a slider for the setting.  \n7.  Drag the setting left or right until\
    \ you get the look you want.  \n8.  Tap the `List` icon (see Figure [7-10](#A429116_1_En_7_Chapter.html#Fig10),\
    \ shown earlier) to return to the `Color` list.  \n9.  Repeat steps 6 to 8 to\
    \ make other color adjustments as needed.  \n10.  Tap `Done`. The Photos app saves\
    \ your changes.\n\n### You Think Your Black and White Photos Could Look Better\n\
    \nEarlier you learned that applying one of the iOS black and white photo filters\
    \ — `Mono`, `Tonal`, or `Noir` — could improve your low-light images. Of course,\
    \ you can also apply a black and white filter to any photo when you’re looking\
    \ for that certain starkness, simplicity, or intensity that comes with black and\
    \ white. Unfortunately, it’s sometimes just as likely that your black and white\
    \ efforts will end up looking uninspired, bland, or messy.\n\n**Solution:** It’s\
    \ possible that you simply picked the wrong subject, since not all scenes are\
    \ suitable for the black and white treatment. Assuming that’s not the case, however,\
    \ you might be able to enhance your black and white photos by taking advantage\
    \ of four settings in the Photos app’s `B&W` category:\n\n- **Intensity.** Use\
    \ this slider to adjust the intensity of those parts of the photo that were converted\
    \ from color to black and white. If your black and white photo lacks punch, try\
    \ increasing the intensity.\n- **Neutrals.** Use this slider to adjust the intensity\
    \ of those parts of the photo that were converted from white or a shade of gray.\
    \ If those parts of your black and white aren’t prominent, try increasing the\
    \ neutral value.\n- **Tone.** Use this slider to adjust the overall intensity\
    \ of the photo. If your black and white photo looks washed out, try increasing\
    \ the tone.\n- **Grain.** Use this slider to add graininess to your photo. If\
    \ you want your photo to have a vintage look, try increasing the grain.\n\nTo\
    \ adjust a black and white photo using these tools, follow these steps:\n\n1.\
    \  In the Photos app, open the photo you want to fix.  \n2.  Tap the photo to\
    \ display the controls, if you don’t see them already.  \n3.  Tap `Edit` (pointed\
    \ out earlier in Figure [7-6](#A429116_1_En_7_Chapter.html#Fig6)). The Photos\
    \ app displays its editing tools.  \n4.  Tap `Light` (see Figure [7-8](#A429116_1_En_7_Chapter.html#Fig8),\
    \ earlier).  \n5.  Tap the `B&W` list. (In some cases, you might need to first\
    \ tap the `List` icon, which is similar to the icon pointed out earlier in Figure\
    \ [7-10](#A429116_1_En_7_Chapter.html#Fig10).) The Photos app displays the available\
    \ settings, as shown in Figure [7-12](#A429116_1_En_7_Chapter.html#Fig12)).\n\n\
    \    ![A429116_1_En_7_Fig12_HTML.jpg](A429116_1_En_7_Fig12_HTML.jpg)\n\n    **Figure\
    \ 7-12.** Tap the `B&W` list to see the available black and white-related adjustments\
    \ you can make to your photo  \n6.  Tap the setting you want to adjust. Photos\
    \ displays a slider for the setting.  \n7.  Drag the setting left or right until\
    \ you get the look you want.  \n8.  Tap the `List` icon (see Figure [7-10](#A429116_1_En_7_Chapter.html#Fig10),\
    \ shown earlier) to return to the `B&W` list.  \n9.  Repeat steps 6 to 8 to make\
    \ other black and white adjustments as needed.  \n10.  Tap `Done`. The Photos\
    \ app saves your changes.\n\n### A Photo Contains One or More Instances of Red-Eye\n\
    \nWhen you use a flash to take a picture of one or more people or animals, in\
    \ some cases the flash may reflect off the subjects’ retinas. The result is the\
    \ common phenomenon of red-eye, where the subject’s pupils appear red instead\
    \ of black.\n\n**Solution:** If you have a photo on your iOS device where one\
    \ or more people or animals have red-eye due to the camera flash, you can use\
    \ the Photos app to remove it and give your subjects a more natural look. Here’s\
    \ how:\n\n1.  In the Photos app, open the photo that contains the red-eye you\
    \ want to remove.  \n2.  Tap the photo to display the controls, if you don’t see\
    \ them already.  \n3.  Tap `Edit` (pointed out earlier in Figure [7-6](#A429116_1_En_7_Chapter.html#Fig6)).\
    \ The Photos app displays its editing tools.  \n4.  Tap `Red-Eye`, shown in Figure\
    \ [7-13](#A429116_1_En_7_Chapter.html#Fig13).\n\n    ![A429116_1_En_7_Fig13_HTML.jpg](A429116_1_En_7_Fig13_HTML.jpg)\n\
    \n    **Figure 7-13.** Tap the `Red-Eye` icon to display the Photos app's red-eye\
    \ removal tool  \n5.  Tap the red-eye that you want to remove. The Photos app\
    \ removes the red-eye.  \n6.  Repeat Step 5 until you’ve removed all the red-eye\
    \ in the photo.  \n7.  Tap `Done`. The Photos app applies the changes to the photo."
