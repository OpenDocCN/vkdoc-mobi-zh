  trans: "\n# 6\\. 修复手机问题\n\n本书大部分章节都聚焦于 iOS 及其设备与数据相关的功能：Wi-Fi、应用、网页、电子邮件、照片等。这很恰当，因为我们的\
    \ iOS 设备归根结底是电脑，所以将重点放在解决计算任务上是合理的。但 iPhone 与众不同。诚然，它是一款出色的移动电脑，但其核心也是一部移动电话。虽然电话通话开始显得有些过时，但这部智能手机的“电话”功能仍被几乎所有\
    \ iPhone 用户使用，即使是二十多岁的年轻人也不例外。（皮尤研究中心最近的一项调查发现，18 至 29 岁的智能手机用户中，有 93%曾使用过语音或视频通话。）电话通话经久不衰的吸引力源于多个因素：即时性（假设对方接听！）、私密性和高效性。但这一切都只有在\
    \ iPhone 的通话功能正常工作且你知道如何充分利用它们时才成立。本章将介绍一些常见的通话问题，并告诉你如何修复或应对它们。\n\n## 排查来电问题\n\
    \n### 你需要将来电静音\n\n当有来电时，有时你可能无法立即接听电话。例如，如果你正在开会，你可能会希望先离开房间再接听电话，以尽可能减少对其他与会者的干扰。当然，如果你在走向门口的过程中电话一直响，那你仍然会打扰到所有人。\n\
    \n解决方法：听到来电铃声后，立即按下`睡眠/唤醒`按钮一次。这会暂时关闭铃声，这意味着如果你决定接听，你仍有标准次数的响铃机会。如果你不接听，你的 iPhone\
    \ 会将此呼叫转接到语音信箱。\n\n### 你无法使用音量按钮调节铃声音量\n\n你可能更希望调低音量，而不是将来电静音。然而，当你按下设备侧面的`音量减小`按钮时，铃声的音量保持不变。\n\
    \n解决方法：如果你无法使用音量按钮调高或调低铃声音量，说明此功能已被禁用。要重新开启，请遵循以下步骤：\n\n1.  打开`设置`应用。\n2.  点击`声音与触感`。\n\
    3.  将`用按钮调整`开关切换到`开`，如图 6-1 所示。\n\n    ![A429116_1_En_6_Fig1_HTML.jpg](img/A429116_1_En_6_Fig1_HTML.jpg)\n\
    \n    图 6-1.\n\n    将`用按钮调整`开关切换到`开`，即可使用 iPhone 的音量按钮控制铃声音量\n\n警告\n\n另一方面，锁定铃声音量是个好主意，因为它能避免一个主要的\
    \ iPhone 烦恼：因铃声音量被意外静音（例如，iPhone 在包或口袋中被碰撞）而错过电话。\n\n### 你想要将来电直接发送到语音信箱\n\n你的\
    \ iPhone 收到一个电话，但你现在无法接听。然而，你也不想让电话一直响到语音信箱启动而打扰周围的人。\n\n解决方法：使用以下任一技巧：\n\n* \
    \  如果手机未锁定，点击触摸屏上的红色`拒绝`按钮。\n*   如果你正在使用 EarPods，按住中央按钮两秒钟。\n*   快速连续按下`睡眠/唤醒`按钮两次。\n\
    \n无论使用哪种方法，iOS 都会将此呼叫直接发送到语音信箱。但请注意，如果你改变主意，将无法接听此电话。\n\n### 你想要能够使用其他设备接听电话\n\
    \n我们都遇到过这种情况：你在一个房间，听到 iPhone 在另一个房间响铃，然后你疯狂冲刺试图在电话转入语音信箱前接听。如果这种冲刺不必发生，而你只需使用与\
    \ iPhone 在同一 Wi-Fi 网络上的 iPad 或 Mac 就能接听电话，那该多好。\n\n解决方法：iOS 支持一项功能，使你能够使用其他设备（包括\
    \ iPad、iPhone 甚至 Mac）来接听来电。要确保此功能已激活并控制可用于接听电话的设备，请遵循以下步骤：\n\n1.  打开`设置`应用，然后点击`电话`以显示`电话`设置。\n\
    2.  点击`在其他设备上通话`。如果你看不到此设置，请参阅下一个问题。\n3.  确保`允许在其他设备上通话`开关已设置为`开`，如图 6-2 所示。\n\
    \n    ![A429116_1_En_6_Fig2_HTML.jpg](img/A429116_1_En_6_Fig2_HTML.jpg)\n\n  \
    \  图 6-2.\n\n    将`允许在其他设备上通话`开关切换到`开`，然后在你想要用来接听电话的每个设备旁边将开关切换到`开`\n4.  在设备列表中，对于你想要用来接听电话的每个设备，将其开关切换到`开`。\n\
    \n### 你无法访问“在其他设备上通话”设置\n\n如果你想要配置 iPhone 以允许在其他 iOS 设备上接听来电，你可能会发现，在`设置`应用中点击`电话`后，该设置并未出现。\n\
    \n解决方法：你必须使用同一个 Apple ID 同时登录 iCloud 和 FaceTime，才能看到`在其他设备上通话`设置。请遵循以下步骤登录这些服务：\n\
    \n1.  打开`设置`应用。\n2.  点击`iCloud`。\n3.  如果你尚未登录 iCloud，请输入你的 Apple ID 电子邮件地址和密码，然后点击`登录`。\n\
    4.  点击`设置`返回主`设置`屏幕。\n5.  点击`FaceTime`以打开`FaceTime`设置。\n6.  将`FaceTime`开关切换到`开`。\n\
    7.  如果你尚未登录，请点击`使用 Apple ID 登录 FaceTime`，输入你的 Apple ID 电子邮件地址和密码，然后点击`登录`。\n"
- fmt: "### You Want to Respond to a Call without Answering It\n\nEarlier in this\
    \ chapter you learned how to send an unwanted call directly to voicemail. That’s\
    \ great for calls you want to ignore, but there are plenty of situations where\
    \ you can’t answer the phone, but you also don’t want to ignore the caller. For\
    \ example, if you’re expecting a call but get dragged into a meeting in the meantime,\
    \ it would be rude to still answer the call when it comes in, but if you just\
    \ send the call to voicemail your caller might wonder what’s going on. Similarly,\
    \ you might be a bit late for an appointment, and on your way there you see a\
    \ call come in from the person you’re meeting. Again, it might not be convenient\
    \ to answer the call, but letting voicemail handle it might lead your caller to\
    \ wonder if you’re going to show up for the meeting.\n\nSolution: iOS offers a\
    \ feature that gives you an easy way to handle these sticky phone situations.\
    \ It’s called `Respond with Text` and it enables you to simultaneously decline\
    \ a call and send the caller a prefab text message. That way, you avoid a voice\
    \ conversation (which, depending on your current situation, might be rude or inconvenient),\
    \ but you give the caller some feedback.\n\nBy default, `Respond with Text` comes\
    \ with three ready-to-send messages:\n\n- `Sorry, I can’t talk right now.`\n-\
    \ `I’m on my way.`\n- `Can l call you later?`\n\nThere’s also an option to send\
    \ a custom message if none of these is quite right. Here’s how to decline an incoming\
    \ call and send the caller a text message:\n\n1.  When the call comes in, tap\
    \ `Message`, shown in Figure [6-3](#A429116_1_En_6_Chapter.html#Fig3). Your iPhone\
    \ displays a button for each of the prefab text messages.\n\n    ![A429116_1_En_6_Fig3_HTML.jpg](A429116_1_En_6_Fig3_HTML.jpg)\n\
    \n    Figure 6-3.\n    Tap `Message` to reply to the caller with a text message\
    \ Note  You must have call display on your phone plan to see the `Message` button.\
    \  \n\n2.  Tap the reply you want to send. If you want to send a different message,\
    \ tap `Custom`, type your message, and then tap `Send`.  \n\nThe caller sees `User\
    \ Busy` in the Phone app and then receives a text message.\n\nNote\n\nIf you’re\
    \ not all that fond of the default replies, you can forge your own. Tap `Settings`,\
    \ tap `Phone`, tap `Respond with Text`, and then use the three text boxes to type\
    \ your own messages.\n\n### You Want to Set a Reminder to Return a Phone Call\n\
    \nThe `Respond with Text` feature is a handy trick to have up your iPhone sleeve,\
    \ but it suffers from the same problem that plagues straight-up declining a call:\
    \ if you want to talk to that person later, you have to remember to call back.\n\
    \nSolution: You could use the Reminders app to nudge yourself in an hour (or whenever)\
    \ to make the return call. Fortunately, however, you don’t need to perform that\
    \ extra step because you can get the Phone app to do it for you. The Phone app\
    \ has a feature that lets you decline a call and automatically create a callback\
    \ reminder. You can set up the reminder to fire in one hour or when you leave\
    \ your current location.\n\nHere’s how to decline an incoming call and set a callback\
    \ reminder:\n\n1.  When the call comes in, tap `Remind Me` (see Figure [6-3](#A429116_1_En_6_Chapter.html#Fig3),\
    \ earlier). Your iPhone displays the callback reminder options shown in Figure\
    \ [6-4](#A429116_1_En_6_Chapter.html#Fig4).\n\n    ![A429116_1_En_6_Fig4_HTML.jpg](A429116_1_En_6_Fig4_HTML.jpg)\n\
    \n    Figure 6-4.\n    When a call comes in, tap `Remind Me` to see the reminder\
    \ options shown here  \n\n2.  Tap the type of reminder you want to set:\n    -\
    \ `When I leave`. Tap this option to set a location-based reminder that triggers\
    \ when you leave your current location.\n    - `In 1 hour`. Tap this option to\
    \ set a time-based reminder. \n\nTip\n\nIf you don’t see the `When I leave` reminder\
    \ option, you need to turn on `Location Services`.\n\n### You Only Want to Allow\
    \ Calls from Certain People\n\nRather than declining all incoming calls, you might\
    \ be in a situation where you want to decline all calls except for those from\
    \ a particular person or group.\n\nSolution: You can do this by activating the\
    \ `Do Not Disturb` feature and configuring it to allow calls from only the people\
    \ you want to talk with.\n\nThis part of `Do Not Disturb` works with groups of\
    \ people, not individuals. So your first task is to create or configure a group\
    \ that consists of the people you want to allow to call you. You have two choices:\n\
    \n- In the Phone app, add each person to the `Favorites` list. Tap `Contacts`\
    \ and then, for each person, tap the contact, tap `Add to Favorites`, and then\
    \ tap `Call`. If the person has multiple numbers, tap the number you want to use\
    \ as a favorite.\n- Create a Contacts app group for the people you want to allow.\
    \ Note, however, that the Contacts app doesn’t offer a feature for creating groups.\
    \ Instead, you need to sign into `icloud.com`, open Contacts, and then click the\
    \ `Add` (`+`) button at the bottom of the Groups pane.\n\nWith your group set\
    \ up, follow these steps to configure `Do Not Disturb` to allow calls only from\
    \ the group:\n\n1.  Tap `Settings` to open the Settings app.  \n2.  Tap `Do Not\
    \ Disturb`. The `Do Not Disturb` screen appears.  \n3.  Tap the `Manual` switch\
    \ to `On` to activate `Do Not Disturb`.  \n4.  Tap `Allow Calls From` to open\
    \ the `Allow Calls From` screen, shown in Figure [6-5](#A429116_1_En_6_Chapter.html#Fig5).\n\
    \n    ![A429116_1_En_6_Fig5_HTML.jpg](A429116_1_En_6_Fig5_HTML.jpg)\n\n    Figure\
    \ 6-5.\n    Use the `Allow Calls From` screen to choose the group that is allowed\
    \ to call you while `Do Not Disturb` is activated  \n\n5.  Either tap `Favorites`\
    \ or tap a contact group.  \n\niOS will now allow a call through only if the caller\
    \ is in the group you chose. When you want to accept all calls again, follow steps\
    \ 1 to 3 to set the `Manual` switch to `Off` and deactivate `Do Not Disturb`.\
    \ (Alternatively, if you want to keep the other `Do Not Disturb` features in place,\
    \ follow steps 1 to 4 and then tap `Everyone`.)\n\n### You Don’t Want to See Info\
    \ about Other Calls While You’re on a Call\n\nIf you’re already on a call and\
    \ another one comes in, your iPhone springs into action and displays the person’s\
    \ name or number, as well as three options: `Decline Incoming Call`, `Answer &\
    \ Hold Current Call`, and `Answer & End Current Call`. This is part of the call\
    \ waiting feature on your iPhone, and it’s great if you’re expecting an important\
    \ call or if you want to add the caller to a conference call that you’ve set up.\
    \ (Note that you only see the call waiting info if you have this feature as part\
    \ of your cellular plan.)\n\nHowever, the rest of the time you might just find\
    \ it annoying and intrusive (and anyone you put on hold or hang up on to take\
    \ the new call probably finds it rude and insulting).\n\nSolution: You can turn\
    \ off call waiting by following these steps:\n\n1.  On the Home screen, tap `Settings`.\
    \ The Settings app appears.  \n2.  Tap `Phone`. The Phone screen appears.  \n\
    3.  Tap `Call Waiting`. The `Call Waiting` screen appears.  \n4.  Tap the `Call\
    \ Waiting` switch to `Off`, as shown in Figure [6-6](#A429116_1_En_6_Chapter.html#Fig6).\
    \ Your iPhone disables call waiting.\n\n    ![A429116_1_En_6_Fig6_HTML.jpg](A429116_1_En_6_Fig6_HTML.jpg)\n\
    \n    Figure 6-6.\n    To avoid being disturbed while on a call, turn off the\
    \ `Call Waiting` feature"
  raw: "### You Want to Respond to a Call without Answering It\n\nEarlier in this\
    \ chapter you learned how to send an unwanted call directly to voicemail. That’s\
    \ great for calls you want to ignore, but there are plenty of situations where\
    \ you can’t answer the phone, but you also don’t want to ignore the caller. For\
    \ example, if you’re expecting a call but get dragged into a meeting in the meantime,\
    \ it would be rude to still answer the call when it comes in, but if you just\
    \ send the call to voicemail your caller might wonder what’s going on. Similarly,\
    \ you might be a bit late for an appointment, and on your way there you see a\
    \ call come in from the person you’re meeting. Again, it might not be convenient\
    \ to answer the call, but letting voicemail handle it might lead your caller to\
    \ wonder if you’re going to show up for the meeting.\n\nSolution: iOS offers a\
    \ feature that gives you an easy way to handle these sticky phone situations.\
    \ It’s called Respond with Text and it enables you to simultaneously decline a\
    \ call and send the caller a prefab text message. That way, you avoid a voice\
    \ conversation (which, depending on your current situation, might be rude or inconvenient),\
    \ but you give the caller some feedback.\n\nBy default, Respond with Text comes\
    \ with three ready-to-send messages:\n\n*   Sorry, I can’t talk right now.\n*\
    \   I’m on my way.\n*   Can l call you later?\n\nThere’s also an option to send\
    \ a custom message if none of these is quite right. Here’s how to decline an incoming\
    \ call and send the caller a text message:\n\n1.  When the call comes in, tap\
    \ Message, shown in Figure [6-3](#A429116_1_En_6_Chapter.html#Fig3). Your iPhone\
    \ displays a button for each of the prefab text messages.\n\n    ![A429116_1_En_6_Fig3_HTML.jpg](A429116_1_En_6_Fig3_HTML.jpg)\n\
    \n    Figure 6-3.\n\n    Tap Message to reply to the caller with a text message\
    \ Note  You must have call display on your phone plan to see the Message button.\
    \  \n2.  Tap the reply you want to send. If you want to send a different message,\
    \ tap Custom, type your message, and then tap Send.  \n\nThe caller sees User\
    \ Busy in the Phone app and then receives a text message.\n\nNote\n\nIf you’re\
    \ not all that fond of the default replies, you can forge your own. Tap Settings,\
    \ tap Phone, tap Respond with Text, and then use the three text boxes to type\
    \ your own messages.\n\n### You Want to Set a Reminder to Return a Phone Call\n\
    \nThe Respond with Text feature is a handy trick to have up your iPhone sleeve,\
    \ but it suffers from the same problem that plagues straight-up declining a call:\
    \ if you want to talk to that person later, you have to remember to call back.\n\
    \nSolution: You could use the Reminders app to nudge yourself in an hour (or whenever)\
    \ to make the return call. Fortunately, however, you don’t need to perform that\
    \ extra step because you can get the Phone app to do it for you. The Phone app\
    \ has a feature that lets you decline a call and automatically create a callback\
    \ reminder. You can set up the reminder to fire in one hour or when you leave\
    \ your current location.\n\nHere’s how to decline an incoming call and set a callback\
    \ reminder:\n\n1.  When the call comes in, tap Remind Me (see Figure [6-3](#A429116_1_En_6_Chapter.html#Fig3),\
    \ earlier). Your iPhone displays the callback reminder options shown in Figure\
    \ [6-4](#A429116_1_En_6_Chapter.html#Fig4).\n\n    ![A429116_1_En_6_Fig4_HTML.jpg](A429116_1_En_6_Fig4_HTML.jpg)\n\
    \n    Figure 6-4.\n\n    When a call comes in, tap Remind Me to see the reminder\
    \ options shown here  \n2.  Tap the type of reminder you want to set:\n    * \
    \  When I leave. Tap this option to set a location-based reminder that triggers\
    \ when you leave your current location.\n    *   In 1 hour. Tap this option to\
    \ set a time-based reminder. \n\nTip\n\nIf you don’t see the When I leave reminder\
    \ option, you need to turn on Location Services.\n\n### You Only Want to Allow\
    \ Calls from Certain People\n\nRather than declining all incoming calls, you might\
    \ be in a situation where you want to decline all calls except for those from\
    \ a particular person or group.\n\nSolution: You can do this by activating the\
    \ Do Not Disturb feature and configuring it to allow calls from only the people\
    \ you want to talk with.\n\nThis part of Do Not Disturb works with groups of people,\
    \ not individuals. So your first task is to create or configure a group that consists\
    \ of the people you want to allow to call you. You have two choices:\n\n*   In\
    \ the Phone app, add each person to the Favorites list. Tap Contacts and then,\
    \ for each person, tap the contact, tap Add to Favorites, and then tap Call. If\
    \ the person has multiple numbers, tap the number you want to use as a favorite.\n\
    *   Create a Contacts app group for the people you want to allow. Note, however,\
    \ that the Contacts app doesn’t offer a feature for creating groups. Instead,\
    \ you need to sign into icloud.com, open Contacts, and then click the Add (+)\
    \ button at the bottom of the Groups pane.\n\nWith your group set up, follow these\
    \ steps to configure Do Not Disturb to allow calls only from the group:\n\n1.\
    \  Tap Settings to open the Settings app.  \n2.  Tap Do Not Disturb. The Do Not\
    \ Disturb screen appears.  \n3.  Tap the Manual switch to On to activate Do Not\
    \ Disturb.  \n4.  Tap Allow Calls From to open the Allow Calls From screen, shown\
    \ in Figure [6-5](#A429116_1_En_6_Chapter.html#Fig5).\n\n    ![A429116_1_En_6_Fig5_HTML.jpg](A429116_1_En_6_Fig5_HTML.jpg)\n\
    \n    Figure 6-5.\n\n    Use the Allow Calls From screen to choose the group that\
    \ is allowed to call you while Do Not Disturb is activated  \n5.  Either tap Favorites\
    \ or tap a contact group.  \n\niOS will now allow a call through only if the caller\
    \ is in the group you chose. When you want to accept all calls again, follow steps\
    \ 1 to 3 to set the Manual switch to Off and deactivate Do Not Disturb. (Alternatively,\
    \ if you want to keep the other Do Not Disturb features in place, follow steps\
    \ 1 to 4 and then tap Everyone.)\n\n### You Don’t Want to See Info about Other\
    \ Calls While You’re on a Call\n\nIf you’re already on a call and another one\
    \ comes in, your iPhone springs into action and displays the person’s name or\
    \ number, as well as three options: Decline Incoming Call, Answer & Hold Current\
    \ Call, and Answer & End Current Call. This is part of the call waiting feature\
    \ on your iPhone, and it’s great if you’re expecting an important call or if you\
    \ want to add the caller to a conference call that you’ve set up. (Note that you\
    \ only see the call waiting info if you have this feature as part of your cellular\
    \ plan.)\n\nHowever, the rest of the time you might just find it annoying and\
    \ intrusive (and anyone you put on hold or hang up on to take the new call probably\
    \ finds it rude and insulting).\n\nSolution: You can turn off call waiting by\
    \ following these steps:\n\n1.  On the Home screen, tap Settings. The Settings\
    \ app appears.  \n2.  Tap Phone. The Phone screen appears.  \n3.  Tap Call Waiting.\
    \ The Call Waiting screen appears.  \n4.  Tap the Call Waiting switch to Off,\
    \ as shown in Figure [6-6](#A429116_1_En_6_Chapter.html#Fig6). Your iPhone disables\
    \ call waiting.\n\n    ![A429116_1_En_6_Fig6_HTML.jpg](A429116_1_En_6_Fig6_HTML.jpg)\n\
    \n    Figure 6-6.\n\n    To avoid being disturbed while on a call, turn off the\
    \ Call Waiting feature"
  trans: "\n### 你想在不接听电话的情况下回复来电\n\n在本章前面部分，你已经学会了如何将来电直接发送到语音信箱。这对于你想忽略的电话来说非常有用，但在很多情况下，你既无法接听电话，又不想忽略来电者。例如，如果你正在等一个电话，但同时又不得不去开会，那么来电时接听电话会显得不礼貌；但如果你只是将电话转到语音信箱，来电者可能会感到困惑。同样，你可能会在赴约时稍微迟到，而在路上你看到来电者正是你要见的人。此时，接听电话可能不太方便，但让语音信箱处理又会让对方怀疑你是否会赴约。\n\
    \n解决方案：iOS 提供了一项功能，可以轻松处理这些棘手的电话情况。它叫做`用信息回复`，允许你同时拒接来电并向来电者发送一条预设的短信。这样一来，你避免了语音通话（根据你当时的情况，这可能会显得不礼貌或不方便），但同时给了来电者一些反馈。\n\
    \n默认情况下，`用信息回复`提供了三条可立即发送的消息：\n\n- `抱歉，我现在不方便接听电话。`\n- `我正在路上。`\n- `我稍后打给你好吗？`\n\
    \n如果这些消息都不太合适，你还可以选择发送自定义信息。以下是拒接来电并向来电者发送短信的方法：\n\n1.  当来电时，点击`信息`按钮，如图 6-3 所示。你的\
    \ iPhone 会为每条预设短信显示一个按钮。\n\n    ![A429116_1_En_6_Fig3_HTML.jpg](img/A429116_1_En_6_Fig3_HTML.jpg)\n\
    \n    图 6-3.\n    点击`信息`按钮，通过短信回复来电者 注意 你的手机套餐必须开通来电显示功能，才能看到`信息`按钮。  \n\n2. \
    \ 点击你想要发送的回复。如果你想发送其他信息，请点击`自定义`，输入你的信息，然后点击`发送`。  \n\n来电者会在电话应用中看到“用户忙”的提示，随后收到一条短信。\n\
    \n注意\n\n如果你不喜欢默认回复，可以自行创建。依次点击`设置`> `电话`> `用信息回复`，然后使用三个文本框输入你自己的信息。\n\n### 你想设置提醒稍后回电\n\
    \n`用信息回复`功能是你 iPhone 上一个实用的技巧，但它存在与直接拒接来电相同的问题：如果你之后想和那个人通话，你必须记得回拨。\n\n解决方案：你可以使用“提醒事项”应用来在一小时后（或任何时间）提醒自己回电。不过，幸运的是，你不需要执行这个额外的步骤，因为你可以让电话应用替你完成。电话应用有一项功能，允许你在拒接来电的同时自动创建回电提醒。你可以将提醒设置为在一小时后触发，或者在离开当前所在位置时触发。\n\
    \n以下是拒接来电并设置回电提醒的方法：\n\n1.  当来电时，点击`稍后提醒我`（参见前面的图 6-3）。你的 iPhone 会显示回电提醒选项，如图\
    \ 6-4 所示。\n\n    ![A429116_1_En_6_Fig4_HTML.jpg](img/A429116_1_En_6_Fig4_HTML.jpg)\n\
    \n    图 6-4.\n    来电时，点击`稍后提醒我`可查看此处显示的提醒选项  \n\n2.  点击你想要设置的提醒类型：\n    - `我离开时`。点击此选项可设置基于位置的提醒，当你离开当前位置时触发。\n\
    \    - `1 小时后`。点击此选项可设置基于时间的提醒。 \n\n提示\n\n如果你没有看到`我离开时`提醒选项，你需要打开`定位服务`。\n\n###\
    \ 你只想允许特定人群的来电\n\n你可能在某些情况下希望拒接所有来电，但除了来自某个特定人或群组的电话。\n\n解决方案：你可以通过激活`勿扰模式`并将其配置为只允许来自你想通话之人的来电来实现。\n\
    \n`勿扰模式`的这一功能是针对人群组而非个人起作用的。因此，你的首要任务是创建或配置一个群组，其中包含你允许来电的人。你有两个选择：\n\n- 在电话应用中，将每个人添加到`个人收藏`列表。点击`通讯录`，然后对于每个人，点击该联系人，点击`添加到个人收藏`，再点击`电话`。如果该联系人有多个号码，请点击你希望作为收藏的号码。\n\
    - 为你允许来电的人创建一个通讯录应用群组。但请注意，通讯录应用本身不提供创建群组的功能。你需要登录`icloud.com`，打开通讯录，然后点击群组窗格底部的`添加`（`+`）按钮。\n\
    \n设置好群组后，按照以下步骤配置`勿扰模式`，使其仅允许来自该群组的来电：\n\n1.  点击`设置`以打开“设置”应用。  \n2.  点击`勿扰模式`。此时会出现“勿扰模式”屏幕。\
    \  \n3.  将`手动`开关拨至`开启`以激活`勿扰模式`。  \n4.  点击`允许来电`以打开“允许来电”屏幕，如图 6-5 所示。\n\n   \
    \ ![A429116_1_En_6_Fig5_HTML.jpg](img/A429116_1_En_6_Fig5_HTML.jpg)\n\n    图 6-5.\n\
    \    使用“允许来电”屏幕选择在`勿扰模式`激活时允许向你呼叫的群组  \n\n5.  点击`个人收藏`或点击某个联系人群组。  \n\n现在，iOS\
    \ 将只允许你选择的群组中的来电通过。当你想要再次接听所有来电时，请重复步骤 1 到 3，将`手动`开关拨至`关闭`以停用`勿扰模式`。（或者，如果你希望保留其他`勿扰模式`功能，请重复步骤\
    \ 1 到 4，然后点击`所有人`。）\n\n### 你不想在通话时看到其他来电的信息\n\n如果你正在通话中，另一个电话打进来，你的 iPhone 会立即显示来电者的姓名或号码，以及三个选项：`拒绝来电`、`保留当前通话并接听`和`结束当前通话并接听`。这是你\
    \ iPhone 上呼叫等待功能的一部分。如果你正在等待一个重要电话，或者想将来电者加入到你已设置好的电话会议中，这个功能非常有用。（请注意，只有当你的手机套餐中包含此功能时，你才会看到呼叫等待信息。）\n\
    \n然而，在其他时候，你可能会觉得这个功能很烦人且具有侵入性（而任何被你保持通话或挂断以接听新电话的人，可能也会觉得这种行为粗鲁无礼）。\n\n解决方案：你可以按照以下步骤关闭呼叫等待功能：\n\
    \n1.  在主屏幕上，点击`设置`。此时会出现“设置”应用。  \n2.  点击`电话`。此时会出现“电话”屏幕。  \n3.  点击`呼叫等待`。此时会出现“呼叫等待”屏幕。\
    \  \n4.  将`呼叫等待`开关拨至`关闭`，如图 6-6 所示。你的 iPhone 将禁用呼叫等待功能。\n\n    ![A429116_1_En_6_Fig6_HTML.jpg](img/A429116_1_En_6_Fig6_HTML.jpg)\n\
    \n    图 6-6.\n    为避免在通话时被打扰，请关闭`呼叫等待`功能\n"
- fmt: '### You are Receiving Unwelcome Calls


    Using your iPhone is a blast until you get your first call from a telemarketer,
    cold-calling salesperson, or someone similarly annoying. You might also find that
    you’re getting unwanted calls from an old flame, an old schoolmate, or anyone
    else you used to know but no longer want to. One-time calls you can handle, but
    if you receive unwelcome calls from a person or company regularly, your iPhone
    becomes a lot less fun.


    **Solution:** iOS offers a call-blocking feature that prevents specified phone
    numbers from calling you. Follow these steps to block a number that has recently
    called you:


    1. Open the `Phone` app.

    2. Tap the `Recents` icon in the menu bar.

    3. Tap the blue `Info` button to the right of the phone number or person you want
    to block.

    4. Tap `Block this Caller`. The `Phone` app asks you to confirm.

    5. Tap `Block Contact`.


    If the person you want to block isn’t in the `Phone` app’s `Recents` list, but
    they are in your `Contacts` list, follow these steps to block that person:


    1. Open the `Phone` app.

    2. Tap the `Contacts` icon in the menu bar.

    3. Tap the contact you want to block.

    4. Tap `Block this Caller`. The `Phone` app asks you to confirm.

    5. Tap `Block Contact`.


    **Note:** To remove a person or number from the blocked list, open `Settings`,
    tap `Phone`, tap `Call Blocking and Identification`, and then tap `Edit`. Tap
    the red `Delete` icon to the left of the name or number, then tap `Delete`.


    ### You Prefer to Answer iPhone Calls on Another Number


    What do you do about incoming calls if you can’t use your iPhone for a while?
    For example, if you’re going on a flight, you must either turn off your iPhone
    or put it in `Airplane mode` so incoming calls won’t go through. Similarly, if
    you have to return your iPhone to Apple for repairs or battery replacement, the
    phone won’t be available if anyone tries to call you, so everything goes to voicemail.


    **Solution:** For these and other situations where your iPhone can’t accept incoming
    calls, you can work around the problem by having your calls forwarded to another
    number, such as your work or home number. Note that the availability of this feature
    depends on whether your cellular provider supports it.


    Here’s how it’s done:


    1. On the `Home` screen, tap `Settings`. The `Settings` app appears.

    2. Tap `Phone`. The `Phone` screen appears.

    3. Tap `Call Forwarding`. The `Call Forwarding` screen appears.

    4. Tap the `Call Forwarding` switch to `On`. Your iPhone displays the `Forward
    To` screen.

    5. Tap the phone number to use for the forwarded calls.

    6. Tap `Back` to return to the `Call Forwarding` screen. Figure [6-7](#A429116_1_En_6_Chapter.html#Fig7)
    shows the `Call Forwarding` screen set up to forward calls. In the status bar
    at the top of the screen, note the little `Phone` icon with an arrow that appears
    to the left of the time to let you know that call forwarding is on.


    ![A429116_1_En_6_Fig7_HTML.jpg](A429116_1_En_6_Fig7_HTML.jpg)


    **Figure 6-7.** Activate call forwarding to have your iPhone calls forwarded to
    another number.


    ## Troubleshooting Outgoing Calls


    ### You Want to Make a Call, but You Have Only a Few Minutes Left on Your Plan


    If you’re getting low on minutes with your cellular plan, the last thing you want
    to do is go beyond your time because those extra minutes are usually quite expensive.


    **Solution:** You might still be able to make a call without using up what little
    time you have left. That’s because iOS supports `Wi-Fi calling`, which enables
    you to place a call using a Wi-Fi Internet connection instead of a cellular connection.
    Check with your cellular provider to see if it supports `Wi-Fi calling`. If so,
    then you should be able to follow these steps to enable `Wi-Fi calling` on your
    iPhone:


    1. On the `Home` screen, tap `Settings`. The `Settings` app appears.

    2. Tap `Phone`. The `Phone` screen appears.

    3. Tap `Wi-Fi Calling`. The `Wi-Fi Calling` screen appears.

    4. Tap the `Wi-Fi Calling on This iPhone` switch to `On`, as shown in Figure [6-8](#A429116_1_En_6_Chapter.html#Fig8).
    iOS asks you to confirm.


    ![A429116_1_En_6_Fig8_HTML.jpg](A429116_1_En_6_Fig8_HTML.jpg)


    **Figure 6-8.** Tap the `Enable Wi-Fi Calling on This iPhone` switch to `On` to
    make calls over Wi-Fi.


    5. Tap `Enable`.


    ### You Want to Include Extensions or Menu Options in Phone Numbers


    If you’re calling a family member or friend at work, or if you’re phoning a particular
    department or person in a company, chances are you have to dial an extension after
    the main number connects. Similarly, many businesses require you to negotiate
    a series of menus to get information or connect with a particular employee or
    section (“Press 1 for Sales; press 2 for Customer Service,” and so on). This normally
    requires you to display the keyboard, listen for the prompts, enter the numbers,
    and repeat as necessary, which is inefficient.


    **Solution:** If you know the extension or phone menu sequence, you can program
    it into the number and have the `Phone` app do all the hard work for you. The
    `Phone` app can do either of the following:


    * `Pause`. This option, which is represented by a comma (`,`) in the phone number,
    means that the `Phone` app dials the main number, waits for two seconds, then
    dials whatever extension or menu value that appears after the comma. You can add
    multiple commas to the number if you need a longer delay.

    * `Wait`. This option, which is represented by a semicolon (`;`) in the phone
    number, means that the `Phone` app dials just the main number and also displays
    a button labeled `Dial "extension"`, where `extension` is whatever digits appear
    after the semicolon. When the phone system prompts you to enter the extension,
    you tap the `Dial` button.


    You can set these up in two ways:


    * `Contacts list`. When you’re entering a phone number using the `Contacts` list,
    type the full number and then tap the `+*#` key that appears in the lower left
    corner of the onscreen keyboard. This temporarily adds two new keys: `pause` and
    `wait`. Tap `pause` to add a comma, then tap the extension or menu value, and
    repeat as needed; tap `wait` to add a semicolon, and then tap the extension.

    * `Keypad`. Using the keypad in the `Phone` app, type the full number. To add
    a comma to tell the `Phone` app to `pause`, tap and hold the `*` key until a comma
    appears, then tap the extension or menu value; to add a semicolon to tell the
    `Phone` app to `wait`, tap and hold the `#` key until a semicolon appears, then
    tap the extension.


    ### You Don’t Want to Be Identified When Making a Call


    Although people often think that hiding one’s calling identity is a feature only
    needed by miscreants and others up to no good, there are many legitimate reasons
    why someone might not want her identity to be revealed when making a call. Connecting
    with a crisis hotline, acting as a whistleblower, revealing or seeking sensitive
    information are all scenarios where privacy is valued, even required.


    **Solution:** You can configure your device not to show your `caller ID`, assuming
    that feature is supported by your cellular provider. Here are the steps to follow:


    1. Open the `Settings` app.

    2. Tap `Phone`.

    3. Tap `Show My Caller ID`.

    4. Tap the `Show My Caller ID` switch to `Off`, as shown in Figure [6-9](#A429116_1_En_6_Chapter.html#Fig9).


    ![A429116_1_En_6_Fig9_HTML.jpg](A429116_1_En_6_Fig9_HTML.jpg)


    **Figure 6-9.** To hide your identity when calling, tap the `Show My Caller ID`
    switch to `Off`.


    **Caution:** You might have good reasons to hide your `caller ID` when making
    a call, but just beware that many people automatically ignore incoming calls that
    don’t specify the caller’s name.'
  raw: "### You are Receiving Unwelcome Calls\n\nUsing your iPhone is a blast until\
    \ you get your first call from a telemarketer, cold-calling salesperson, or someone\
    \ similarly annoying. You might also find that you’re getting unwanted calls from\
    \ an old flame, an old schoolmate, or anyone else you used to know but no longer\
    \ want to. One-time calls you can handle, but if you receive unwelcome calls from\
    \ a person or company regularly, your iPhone becomes a lot less fun.\n\nSolution:\
    \ iOS offers a call-blocking feature that prevents specified phone numbers from\
    \ calling you. Follow these steps to block a number that has recently called you:\n\
    \n1.  Open the Phone app.  \n2.  Tap the Recents icon in the menu bar.  \n3. \
    \ Tap the blue Info button to the right of the phone number or person you want\
    \ to block.  \n4.  Tap Block this Caller. The Phone app asks you to confirm.  \n\
    5.  Tap Block Contact.  \n\nIf the person you want to block isn’t in the Phone\
    \ app’s Recents list, but they are in your Contacts list, follow these steps to\
    \ block that person:\n\n1.  Open the Phone app.  \n2.  Tap the Contacts icon in\
    \ the menu bar.  \n3.  Tap the contact you want to block.  \n4.  Tap Block this\
    \ Caller. The Phone app asks you to confirm.  \n5.  Tap Block Contact.  \n\nNote\n\
    \nTo remove a person or number from the blocked list, open Settings, tap Phone,\
