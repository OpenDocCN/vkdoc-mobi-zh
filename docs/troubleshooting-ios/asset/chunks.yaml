    \n- 你的`ISP`可能会阻止使用第三方账户发送的邮件，因为它认为你试图通过`ISP`的服务器中继邮件（这是垃圾邮件发送者常用的技术）。\n- 如果你的`ISP`每月只允许一定量的`SMTP`带宽或一定数量的已发送邮件，而第三方账户提供了更高的限制或完全没有限制，你可能会产生额外费用。\n\
    - 你可能会遇到性能问题，`ISP`路由邮件所需的时间比第三方主机长得多。\n\n解决方案：为了解决这些问题，许多第三方主机提供通过标准端口`25`以外的端口访问其`SMTP`服务器的权限。例如，`iCloud`的`SMTP`服务器（`smtp.icloud.com`）也接受端口`465`和`587`上的连接。请咨询你的邮件托管提供商，了解他们支持哪个（或哪些）端口。\n\
    \n以下是配置电子邮件账户以使用非标准 SMTP 端口的方法：\n\n1.  在“主屏幕”上，点击“设置”。你会看到“设置”应用。\n2.  点击“邮件”。出现“邮件”设置屏幕。\n\
    3.  点击你想要配置的`POP`账户。出现该账户的设置屏幕。\n4.  在屏幕底部附近，点击`SMTP`。`iOS`会显示`SMTP`屏幕。\n5.  在“主服务器”部分，点击该服务器。`iOS`会显示服务器设置。\n\
    6.  在“外发邮件服务器”部分，点击“服务器端口”，然后输入端口号。\n7.  点击“完成”。\n\n注意\n\n你可能还会发现通过蜂窝网络连接发送邮件时遇到问题。要了解如何排查该问题，请参阅第\
    \ 2 章的“你可以通过 Wi-Fi 发送电子邮件，但无法通过蜂窝网络发送”部分。\n"
- fmt: "### Mail Cannot Send POP Messages Using a Particular Account\n\nWhen you send\
    \ a POP message using `Mail`, you might find that the message either stays in\
    \ the `Outbox` folder (meaning it never gets sent) or is never delivered (in which\
    \ case, you might or might not receive a bounce message). There are many reasons\
    \ why a message doesn’t get sent, but it usually boils down to one or more of\
    \ the following misconfigured POP account settings.\n\n- Using an incorrect SMTP\
    \ host name.\n- Using an incorrect user name or password.\n- Not using SSL (Secure\
    \ Sockets Layer) encryption if your email host requires it (or, conversely, using\
    \ SSL when your host does not require it).\n- Not using authentication. To reduce\
    \ spam, many ISPs now require SMTP authentication for outgoing mail, which means\
    \ that you must log on to the SMTP server to confirm that you’re the person sending\
    \ the mail (as opposed to some spammer spoofing your address). If your ISP requires\
    \ authentication on outgoing messages, you need to configure your email account\
    \ to provide the proper credentials.\n- Using a server port that is not supported\
    \ by the email host.\n\nIf you’re not too sure about any of this, check with your\
    \ email host.\n\n**Solution:** Follow these steps to configure your email account\
    \ with the correct settings:\n\n1.  On the Home screen, tap `Settings`. iOS displays\
    \ the Settings app.\n2.  Tap `Mail`. The Mail settings screen appears.\n3.  Tap\
    \ the POP account you want to configure. The account’s settings screen appears.\n\
    4.  Near the bottom of the screen, tap `SMTP`. iOS displays the SMTP screen.\n\
    5.  In the Primary Server section, tap the server. iOS displays the server’s settings\
    \ screen.\n6.  Check the values in the `Host Name` and `User Name` fields to ensure\
    \ they’re correct.\n7.  Retype the correct password.\n8.  Tap the `SSL` switch\
    \ to On if your host requires SSL; otherwise, tap this switch to Off.\n9.  Tap\
    \ `Authentication` to open the Authentication screen, tap the type of authentication\
    \ required by your host (usually `Password`), and then tap Back to return to the\
    \ server settings screen.\n10. Check that the `Server Port` setting is a port\
    \ value supported by your host.\n11. Tap `Done`.\n\n### You’re Having Trouble\
    \ Sending Email Using Siri Voice Commands\n\nYou can use the `Siri` voice recognition\
    \ app to check, compose, send, and reply to messages, all with simple voice commands.\
    \ Tap and hold the Home button (or press and hold the Mic button of the device\
    \ headphones, or the equivalent button on a Bluetooth headset) until `Siri` appears.\
    \ `Siri` is handy, but you might have trouble getting it to do what you want.\n\
    \n**Solution:** Make sure you’re using commands that `Siri` recognizes.\n\nTo\
    \ check for new email messages on your iCloud account, you need only say “Check\
    \ email” (or just “Check mail”). You can also view a list of iCloud messages as\
    \ follows:\n\n- To display unread messages, say “Show new email.”\n- To display\
    \ messages from a particular person, say “Show email from *name*,” where *name*\
    \ is the name of the sender.\n\nTo start a new email message, `Siri` gives you\
    \ several options:\n\n- To create a new message addressed to a particular person,\
    \ say “Email *name*,” where *name* is the name of the recipient. This name can\
    \ be a name from your Contacts list or someone with a defined relationship, such\
    \ as “Mom” or “my brother.”\n- To create a new message with a particular subject\
    \ line, say “Email *name* about *subject*,” where *name* defines the recipient,\
    \ and *subject* is the subject line text.\n- To create a new message and also\
    \ specify the body text, say “Email *name* about *subject* and say *text*,” where\
    \ *name* is the recipient, *subject* is the subject line, and *text* is the message\
    \ body text.\n\nIn each case, `Siri` creates the new message, displays it, and\
    \ then asks if you want to send it. If you do, you can either say “Send” or tap\
    \ the `Send` button.\n\nIf you have a message displayed, you can send back a response\
    \ by saying “Reply.” If you want to add some text to the response, say “Reply\
    \ *text*,” where *text* is your response.\n\nYou can also use `Siri` within `Mail`\
    \ to dictate a message. When you tap inside the body of a new message, the keyboard\
    \ that appears shows a `Mic` icon beside the spacebar. Tap the `Mic` icon and\
    \ then start dictating. Here are some notes:\n\n- For punctuation, you can say\
    \ the name of the mark you need, such as “comma” (`,`), “semicolon” (`;`), “colon”\
    \ (`:`), “period” or “full stop” (`.`), “question mark” (`?`), “exclamation point”\
    \ (`!`), “dash” (`-`), or “at sign” (`@`).\n- You can enclose text in parentheses\
    \ by saying “open parenthesis,” then the text, and then “close parenthesis.”\n\
    - To surround text with quotation marks, say “open quote,” then the text, then\
    \ “close quote.”\n- To render a word in all uppercase letters, say “all caps”\
    \ and then say the word.\n- To start a new paragraph, say “new line.”\n- You can\
    \ have some fun by saying “smiley face” for `:-)`, “wink face” for `;-)`, and\
    \ “frown face” for `:-(`.\n\nWhen you’re finished, tap `Done`.\n\n## Troubleshooting\
    \ Receiving Email\n\n### You Receive Email on Your Device, but Not on Your Computer\n\
    \nIf you need to check email on multiple devices, you first need to understand\
    \ how POP email messages are delivered over the Internet. (This does not apply\
    \ to iCloud, Gmail, and other services that use IMAP.) When someone sends you\
    \ a message, it doesn’t come directly to your iOS device or computer. Instead,\
    \ it goes to the server that your Internet service provider (or your company)\
    \ has set up to handle incoming messages. When you ask `Mail` to check for new\
    \ messages, it communicates with the POP server to see if any messages are waiting\
    \ in your account. If so, `Mail` downloads those messages and then instructs the\
    \ server to delete the copies of the messages stored on the server. So if you\
    \ retrieve messages on your iOS device, they will no longer be available to download\
    \ to your computer.\n\n**Solution:** You need to configure `Mail` so that it leaves\
    \ a copy of the messages on the POP server after you download them. That way,\
    \ the messages are still available when you check messages using another device.\
    \ Note that this is the default behavior for POP accounts that you add to iOS.\
    \ Therefore, if you find that you’re receiving messages on your iOS device but\
    \ not elsewhere, then you need to follow these steps to prevent iOS from deleting\
    \ messages from the server:\n\n1.  On the Home screen, tap `Settings`.\n2.  Tap\
    \ `Mail` to open the Mail screen to display the Mail screen.\n3.  Tap the POP\
    \ account you want to configure. The account’s settings screen appears.\n4.  Near\
    \ the bottom of the screen, tap `Advanced`. iOS displays the Advanced screen.\n\
    5.  Tap `Delete from server`. The Delete from server screen appears.\n6.  Tap\
    \ `Never`, as shown in Figure [5-6](#A429116_1_En_5_Chapter.html#Fig6).\n\n  \
    \  ![A429116_1_En_5_Fig6_HTML.jpg](A429116_1_En_5_Fig6_HTML.jpg)\n\n    **Figure\
    \ 5-6.** To ensure that `Mail` leaves a copy of downloaded messages on the POP\
    \ server, tap `Never` in the `Delete from server` screen."
