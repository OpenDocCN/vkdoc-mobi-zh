  trans: "\n# Safari 不会询问是否存储网站密码\n\n记住数十个用户名和密码来登录常用网站，是现代人必备的技能。`Safari` 通过询问是否存储网站的账户数据并在后续访问时自动填入来提供帮助。这能极大节省时间，但有时\
    \ `Safari` 并不会询问是否存储网站的登录信息。\n\n**解决方法：** `Safari` 不询问是否存储网站用户名和密码主要有三个原因：\n\n\
    * 某些网站要求浏览器不要保存密码，而 `Safari` 会遵从这些请求。在这种情况下，你可以按照下文所示的方法手动添加密码。\n* `Safari` 可能被设置为不保存用户名和密码。要检查此设置，请打开\
    \ `设置`，点击 `Safari`，再点击 `自动填充`，然后将 `名称和密码` 开关打开至 `开启` 状态。\n* `Safari` 可能处于 `无痕浏览`\
    \ 模式，在此模式下它不会保存任何数据，包括网站登录数据。要检查此模式，请打开 `Safari` 并查看菜单栏。如果菜单栏显示为黑色或深灰色（见图 4-6）而非白色或浅灰色，则表示\
    \ `Safari` 处于 `无痕浏览` 模式。要解决此问题，请点击 `标签页` 图标，然后点击 `无痕浏览` 按钮以停用该模式，从而退出 `无痕浏览` 模式。\n\
    \n![A429116_1_En_4_Fig6_HTML.jpg](img/A429116_1_En_4_Fig6_HTML.jpg)\n\n图 4-6.\
    \  \n若菜单栏显示为黑色或深灰色，则 `Safari` 处于 `无痕浏览` 模式，不会询问是否存储网站用户名或密码。\n\n以下是手动输入网站用户名和密码的操作步骤：\n\
    \n1. 点击 `设置` 以显示 `设置` 应用。\n2. 点击 `Safari`。此时出现 `Safari` 屏幕。\n3. 点击 `密码`。`设置` 会提示你输入锁屏密码或进行\
    \ `Touch ID` 验证。\n4. 输入你的锁屏密码或完成 `Touch ID` 验证。此时出现 `密码` 屏幕。\n5. 点击 `添加密码`。此时出现\
    \ `添加密码` 屏幕。\n6. 填写网站的地址、你的用户名和密码。密码会以常规文本而非常见的圆点形式显示，因此操作时请确保无人偷窥。\n7. 点击 `完成`。`iOS`\
    \ 会保存该网站的登录数据。\n\n# 你想保存信用卡数据\n\n网购是最受欢迎的线上消遣方式之一，但如果你网购足够频繁，手动输入信用卡号及有效期可能会变得令人厌烦。\n\
    \n**解决方法：** 你可以将信用卡数据保存在 `Safari` 中，这样就不必反复输入你的信用卡详细信息。请按照以下步骤配置 `Safari`，使其在你进行在线购物时保存你的信用卡数据：\n\
    \n1. 在主屏幕中，点击 `设置` 以打开 `设置` 应用。\n2. 点击 `Safari`。此时出现 `Safari` 屏幕。\n3. 点击 `自动填充`\
    \ 以打开 `自动填充` 屏幕。\n4. 将 `信用卡` 开关打开至 `开启` 状态。\n\n> **提示：** `Safari` 让你无需手动输入信用卡数据，而是可以直接使用相机自动录入。在\
    \ `自动填充` 屏幕中，点击 `已保存的信用卡`，输入锁屏密码（如果你正在向你的 `iOS` 设备添加信用卡信息，强烈建议使用锁屏密码或 `Touch ID`；参见第\
    \ 9 章），然后点击 `添加信用卡`。接着点击 `使用相机`，将信用卡对准相机取景框，等待卡片信息被识别即可。\n\n# 你想查看网站的弹出式窗口\n\n\
    弹出式广告几乎是自互联网诞生以来就存在的一大祸害。这些烦人广告带来的困扰如此之大，以至于所有现代浏览器早已默认内置了弹出式窗口拦截器，`iOS Safari`\
    \ 也不例外。\n\n然而，并非所有弹出式窗口都令人厌烦。有些弹出式窗口可能显示有用信息，或者呈现网站界面的关键功能。但是，在弹出式窗口被拦截的情况下，你就会错过这些信息或功能。\n\
    \n**解决方法：** 在访问包含你想要查看的弹出式窗口的网站时，你可以暂时关闭 `Safari` 的弹出式窗口拦截器。请按以下步骤操作：\n\n1. 在主屏幕中，点击\
    \ `设置` 以显示 `设置` 应用。\n2. 点击 `Safari`。此时出现 `Safari` 屏幕。\n3. 将 `拦截弹窗` 开关关闭至 `关闭`\
    \ 状态，如图 4-7 所示。\n\n![A429116_1_En_4_Fig7_HTML.jpg](img/A429116_1_En_4_Fig7_HTML.jpg)\n\
    \n图 4-7.  \n要临时允许某个网站的弹出式窗口，请将 `拦截弹窗` 开关关闭至 `关闭`，然后访问该网站。\n\n现在你可以使用 `Safari`\
    \ 访问该网站，其弹出式窗口会出现在一个新标签页中。处理完该网站后，再次按照以上步骤将 `拦截弹窗` 开关打开至 `开启` 状态。\n\n# 你想在点击链接前查看其地址\n\
    \n如你所知，在 `iOS Safari` 中，你可以通过点击来“单击”网页上的链接。然而如今，精明的上网者在点击链接前总会先检查其地址，因为你永远不知道它最终会把你带到何处。地址并不总是代表恶意或可疑的网站，但检查一下总没有坏处。\n\
    \n在常规网页浏览器中，你可以通过将鼠标指针悬停在链接上，并在状态栏中查看链接地址来了解该链接将把你带到何处（即查看链接的 URL）。但这个方法在 `iOS\
    \ Safari` 中行不通，那么如何在点击链接前查看其地址呢？\n\n**解决方法：** 长按该链接几秒钟。`Safari` 随后会显示一个弹出屏幕，其中包含链接文本，更重要的是，还会显示其\
    \ URL，如图 4-8 所示。如果链接看起来没问题，请点击 `打开` 以在当前浏览器页面中访问，或点击 `在新页面中打开` 以开启一个新页面。如果你决定不点击该链接，请在菜单外部点击一下。\n\
    \n![A429116_1_En_4_Fig8_HTML.jpg](img/A429116_1_En_4_Fig8_HTML.jpg)\n\n图 4-8.\
    \  \n长按链接以检查其地址，再决定是否访问该网站。\n\n# 搜索问题故障排除\n\n## 你想使用不同的搜索引擎\n\n`Google` 是 `iOS`\
    \ 上的默认搜索引擎。当然，几乎所有人都在使用 `Google`，但如果你对它有所不满，可能会想切换到另一个不同的搜索引擎。例如，许多人不喜欢 `Google`\
    \ 的广告追踪，因此转而使用不追踪用户的 `DuckDuckGo`。\n\n**解决方法：** 你可以使用 `Safari` 导航到其他搜索引擎的 URL\
    \ 并在此进行搜索。不过，`Safari` 的默认搜索引擎使用起来更为便捷，因为它允许你直接从地址栏进行搜索。虽然 `Google` 是 `iOS` 的默认搜索引擎，但它并非\
    \ `iOS` 唯一支持的搜索引擎。以下是设置其他搜索引擎为 `Safari` 默认搜索引擎的步骤：\n\n1. 打开 `设置` 应用。\n2. 点击 `Safari`。此时出现\
    \ `Safari` 屏幕。\n3. 点击 `搜索引擎`。`iOS` 会打开 `搜索引擎` 屏幕。\n4. 点击你想要使用的搜索引擎。如图 4-9 所示，你有四种选择：`Google`、`Yahoo`、`Bing`\
    \ 或 `DuckDuckGo`。\n\n![A429116_1_En_4_Fig9_HTML.jpg](img/A429116_1_En_4_Fig9_HTML.jpg)\n\
    \n图 4-9.  \n在 `搜索引擎` 屏幕中，点击你希望设为 `Safari` 默认使用的搜索引擎。\n"
- fmt: "# It Is Difficult to Find Specific Information within a Web Page\n\nWhen you’re\
    \ perusing a page on the web, it’s not unusual to be looking for specific information.\
    \ In those situations, rather than reading through the entire page to find the\
    \ info you seek, it would be a lot easier to search for the data. You can easily\
    \ do this in the desktop version of Safari or any other computer browser, but,\
    \ at first glance, the Safari app doesn’t seem to have a “Find” feature anywhere.\n\
    \n**Solution:** Safari does offer such a feature, but you need to know where to\
    \ look:\n\n1. Use the Safari app to navigate to the web page that contains the\
    \ information you seek.\n2. Tap the web page title bar (or swipe down on the screen)\
    \ to display the menu bar, and then tap inside the address/search box at the top\
    \ of the Safari window.\n3. Type the search text you want to use. Safari displays\
    \ the web page matches, but at the bottom of those matches it also displays “On\
    \ This Page (X matches),” where X is the number of times your search text appears\
    \ on the web page.\n4. Flick the search results up to hide the keyboard.\n5. Tap\
    \ `Find “search”` (where `search` is the search text you entered). Safari highlights\
    \ the first instance of the search term. The `On This Page` message now appears\
    \ at the bottom of the results screen, as shown in Figure [4-10](#A429116_1_En_4_Chapter.html#Fig10).\n\
    \n    ![A429116_1_En_4_Fig10_HTML.jpg](A429116_1_En_4_Fig10_HTML.jpg)\n\n    **Figure\
    \ 4-10.** The `On This Page` message tells you the number of matches that appear\
    \ on the current web page\n\n6. Tap the down-pointing arrow to cycle forward through\
    \ the instances of the search term that appear on the page. Note that you can\
    \ also cycle backward through the results by tapping the up-pointing arrow. Also,\
    \ when you tap the down-pointing arrow after the last result appears, Safari returns\
    \ you to the first result.\n7. When you’re finished with the search, tap `Done`.\n\
    \n## You Want to Search the Web Using Voice Commands\n\nYou can use Safari to\
    \ type search queries either directly into the search box or by navigating to\
    \ a search engine site. However, these days typing suddenly seems like such a\
    \ quaint pastime thanks to the voice-recognition prowess of the Siri app. So why\
    \ type a search query when you can just tell Siri what you’re looking for?\n\n\
    **Solution:** Launch Siri by pressing and holding the `Home` button (or pressing\
    \ and holding the `Mic` button of the device headphones, or the equivalent button\
    \ on a Bluetooth headset). Here are some general tips for web searching with Siri:\n\
    \n- **Searching the entire web.** Say “Search the web for `topic`,” where `topic`\
    \ is your search criteria.\n- **Searching Wikipedia.** Say “Search Wikipedia for\
    \ `topic`,” where `topic` is the subject you want to look up.\n- **Searching with\
    \ a particular search engine.** Say “`Engine topic`,” where `Engine` is the name\
    \ of the search engine, such as Google or Bing (although not DuckDuckGo, for some\
    \ reason), and `topic` is your search criteria.\n\nSiri also understands commands\
    \ related to searching for businesses and restaurants through its partnership\
    \ with Yelp. To look for businesses and restaurants using Siri, the general syntax\
    \ to use is the following (although, as usual with Siri, you don’t have to be\
    \ too rigid about this):\n\n“Find (or Look for) `something` `somewhere`.”\n\n\
    Here, the `something` part can be the name of a business (such as “Starbucks”),\
    \ a type of business (such as “gas station”), a type of restaurant (such as “Thai\
    \ restaurants”), or a generic product (such as “coffee”). The `somewhere` part\
    \ can be something relative to your current location (such as “around here” or\
    \ “near me” or “within walking distance”) or a specific location (such as “in\
    \ Indianapolis” or “in Broad Ripple”). Here are some examples:\n\n- “Find a gas\
    \ station within walking distance.”\n- “Look for pizza restaurants in Indianapolis.”\n\
    - “Find coffee around here.”\n- “Look for a grocery store near me.”\n\nNote, too,\
    \ that if you add a qualifier such as “good” or “best” before the `something`\
    \ portion of the command, Siri returns the results organized by their Yelp ratings.\n\
    \n# Overcoming Email Glitches\n\nThese days, we have an impressive number of ways\
    \ to communicate with each other: texting, SnapChatting, video calling, Facebook\
    \ messaging, Twitter direct messaging, and so many more. These newfangled (more\
    \ or less) communications technologies get all the press and all the glory, not\
    \ surprisingly. But when it comes to day-to-day, bread-and-butter communications,\
    \ most of us fall back on good old email. It’s not sexy, it hasn’t changed all\
    \ that much in a couple of decades, and whatever bells and whistles a developer\
    \ adds to an email client are usually ignored. Email just gets the job done.\n\
    \nOr, I should say, email usually gets the job done. Like any technology, email\
    \ suffers from its share of glitches and bugs, so you might find that you have\
    \ trouble sending or receiving email messages using the iOS Mail app. The good\
    \ news is that most of these problems are readily fixable and you can usually\
    \ get Mail back on its feet in short order. To help you do that, this chapter\
    \ offers a collection of the most common email complaints, as well as their solutions.\n\
    \n## Troubleshooting Sending Email\n\n### Mail Uses the Wrong Account When Sending\n\
    \nWhen you add more than one email account, how does Mail decide which of those\
    \ to use when you send a new message? It designates one of those accounts – specifically,\
    \ the first account you added to the Mail app – as the default, and it then automatically\
    \ uses that address as the sending account each time you compose a new message.\
    \ It also uses that address as the default sending account when you share content\
    \ such as a link, photo, or map via email.\n\n**Note:** Mail does not use the\
    \ default account automatically when you reply to or forward a message. In those\
    \ cases, Mail configures the reply or forward to be sent from the account to which\
    \ the original message was addressed.\n\nIf the default account is the one you\
    \ want to use to send a message, then this behavior isn’t a problem, but you might\
    \ prefer to use one of your other accounts.\n\n**Solution:** First, note that\
    \ you’re not restricted to using the default account for every message. If you\
    \ need to use a different account when sending a message, follow these steps:\n\
    \n1. In the Mail app, start a new message.\n2. Tap the `Cc/Bcc, From` line in\
    \ the New Message screen.\n3. Tap the `From` line. Mail displays a list of the\
    \ available email addresses, as shown in Figure [5-1](#A429116_1_En_5_Chapter.html#Fig1).\n\
    \n    ![A429116_1_En_5_Fig1_HTML.jpg](A429116_1_En_5_Fig1_HTML.jpg)\n\n    **Figure\
    \ 5-1.** You can use the `From` list to select a different sending address\n\n\
    4. Tap the address you want to use to send the message.\n\nChanging the sending\
    \ account as needed works well if you only have to use that technique occasionally,\
    \ but it’s not something you’ll want to run through each time you send a message.\
    \ If there’s a particular account that you prefer to use for sending all or most\
    \ of the time, then you need to set up that account as the default. Here are the\
    \ steps to follow:\n\n1. On the Home screen, tap `Settings`. The Settings app\
    \ appears.\n2. Tap `Mail` to open the Mail screen. iOS displays the Mail screen.\n\
    3. Near the bottom of the Mail section, tap `Default Account`. This opens the\
    \ Default Account screen, which displays a list of your accounts. The current\
    \ default account is shown with a check mark beside it.\n4. Tap the account you\
    \ want to use as the default. iOS places a check mark beside the account, as shown\
    \ in Figure [5-2](#A429116_1_En_5_Chapter.html#Fig2).\n\n    ![A429116_1_En_5_Fig2_HTML.jpg](A429116_1_En_5_Fig2_HTML.jpg)\n\
    \n    **Figure 5-2.** In the Default Account screen, tap the account you want\
    \ Mail to use as the default for sending messages"
