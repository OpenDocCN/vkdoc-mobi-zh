    - 你想使用语音命令搜索网页\n\n## 第 5 章：解决电子邮件故障\n\n- 排查发送电子邮件问题\n- 发送邮件时，“邮件”应用使用了错误的账户\n\
    - 你想阻止某个账户接收邮件\n- 你不再需要某个账户\n- 你想保存一封未完成的电子邮件\n- 排查使用第三方账户时发送外发邮件的问题\n- “邮件”应用无法使用特定账户发送\
    \ POP 邮件\n- 使用 Siri 语音命令发送电子邮件时遇到问题\n- 排查接收电子邮件问题\n- 你在设备上收到邮件，但在电脑上却没有\n- 你收到大量垃圾邮件\n\
    - 你想禁用邮件中的远程图片\n- 你不再希望“邮件”应用按邮件主题整理邮件\n- 已删除邮件正在从“废纸篓”文件夹中移除\n- 你没有看到“所有收件箱”文件夹\n\
    \n## 第 6 章：修复电话问题\n\n- 排查来电问题\n- 你需要将来电静音\n- 你无法使用音量按钮调节铃声音量\n- 你想将来电直接发送到语音信箱\n\
    - 你想能够使用另一台设备接听电话\n- 你无法访问“在其他设备上通话”设置\n- 你想在不接听的情况下回复来电\n- 你想设置提醒事项以回拨电话\n- 你只想允许特定联系人打来电话\n\
    - 通话时你不想看到其他来电的信息\n- 你正在接收不受欢迎的电话\n- 你更喜欢用另一个号码接听 iPhone 来电\n- 排查拨出电话问题\n- 你想打电话，但套餐剩余时间只有几分钟\n\
    - 你想在电话号码中包含分机号或菜单选项\n- 打电话时你不想被识别身份\n- 你想保持电话通话状态\n\n## 第 7 章：解决相机与照片相关问题\n\n\
    - 排查相机问题\n- 很多照片很模糊\n- 弱光照片通常太暗、颗粒感重或模糊不清\n- 你难以保持焦点或曝光设置\n- 你想把自己也拍进后置相机拍摄的照片中\n\
    - 你难以拍出端端正正的照片\n- 排查照片问题\n- 照片曝光不当或存在类似的光线问题\n- 照片颜色看起来不对\n- 你觉得黑白照片可以拍得更好\n-\
    \ 照片中包含一处或多处红眼\n- 照片中包含你想移除的元素\n- 照片不端正\n\n## 第 8 章：保护你的设备\n\n- 锁定设备\n- 你想用密码锁定设备\n\
    - 你想确保数据不会落入恶意之手\n- 在 iPhone 锁定状态下需要拨打紧急电话\n- 你正在使用密码，但解锁设备时却不总是需要输入\n- 你想能够用指纹解锁设备\n\
    - 你无法用指纹解锁 iOS 设备\n- 你不想忘记为 Touch ID 配置了哪个指纹\n- 你想将设备设置为自动锁定\n- 备份设备\n- 你想在不进行同步的情况下备份设备\n\
    - 你想让 iOS 自动备份设备\n- 你遇到了 iCloud 备份问题\n- 保护丢失的设备\n- 你想确保能够找到丢失的设备\n- 你想在地图上定位丢失的设备\n\
    - [你想通过播放声音来定位丢失的设备"
- fmt: "# Learning Some General Troubleshooting Techniques\n\nWhen you’re using a\
    \ computer — particularly a Windows PC, but also a Mac — there’s a weird nervousness\
    \ that operates just below the surface of your awareness. That trepidation comes\
    \ from experience: your computer almost certainly has crashed not only many times\
    \ in the past, but also some time recently. So in a sense you’re just waiting\
    \ for things to go south because you know they eventually will.\n\nWhen you’re\
    \ using your iPhone, iPad, or other iOS device, that underlying unease is nowhere\
    \ to be found. This blissfully anxiety-free state also comes from experience:\
    \ your iOS device almost never crashes, so you’re not expecting it to. Notice,\
    \ however, that I said almost never. The reality is that, although they occur\
    \ far less frequently than with Windows or macOS, iOS problems do occur. That\
    \ shouldn’t come as a surprise because the iPhone, iPad, and iPod touch are extremely\
    \ sophisticated devices — they’re full-blown computers, really. And any sophisticated\
    \ device will always have problems, thanks to its sheer complexity. Fortunately,\
    \ iOS devices have fewer moving parts than regular computers, so overall there’s\
    \ less to go wrong with the hardware. You also see fewer problems on the software\
    \ side because app developers only have to build their products to work with a\
    \ relatively small collection of devices, all of which are manufactured by a single\
    \ company. This really simplifies things, and the result is fewer problems. Again,\
    \ however, not zero problems.\n\nTo help you troubleshoot any hardware or software\
    \ glitches that come up, this chapter offers you some general troubleshooting\
    \ techniques that apply to all iOS devices: the iPhone, the iPad, and the iPod\
    \ touch.\n\n## Restarting and Rebooting\n\nIf your iOS device is behaving oddly\
    \ or erratically, it’s possible that a specific component inside the device is\
    \ the cause. In that case, you don’t have much choice but to leave your device\
    \ at the Genius Bar, or ship it back to Apple for repairs. Fortunately, however,\
    \ most glitches are temporary and can often be fixed by employing a few standard\
    \ techniques, particularly restarting or rebooting your device.\n\nIf your iPhone\
    \ is behaving oddly or erratically, it’s possible that a specific component inside\
    \ the phone is the cause. In that case, you don’t have much choice but to ship\
    \ your iPhone back to Apple for repairs. Fortunately, however, most glitches are\
    \ temporary and can often be fixed by using one or more of the following techniques:\n\
    \n### Restarting Your Device\n\nBy far the most common solution to an iOS device\
    \ problem is to shut it down and then restart it. By rebooting the device, you\
    \ reset the entire system, which is often enough to solve many problems.\n\nYou\
    \ restart an iOS device using the `Sleep/Wake` button, the location of which depends\
    \ on your device:\n\n*   For the iPhone 6 and later, the button appears on the\
    \ right edge of the phone, near the top.\n*   For all other iOS devices, the button\
    \ appears on the top edge of the device, toward the right side.\n\nPress and hold\
    \ the `Sleep/Wake` button for a few seconds until you see the Slide to Power Off\
    \ screen (at which point you can release the button). Drag the Slide to Power\
    \ Off slider to the right to start the shutdown. When the screen goes completely\
    \ black, your device is off. To restart, press and hold the `Sleep/Wake` button\
    \ until you see the Apple logo and then release the button.\n\n### Rebooting Your\
    \ Device Hardware\n\nWhen you restart your iOS device by pressing and holding\
    \ `Sleep/Wake` for a few seconds, what you’re really doing is rebooting the system\
    \ software. If that still doesn’t solve the problem, you might need to reboot\
    \ the device hardware as well. To do that, press and hold down the `Sleep/Wake`\
    \ and `Home` buttons at the same time. Keep them pressed until you see the Apple\
    \ logo (it takes about 8 seconds or so), which indicates a successful restart.\n\
    \n**Note**\n\nA hardware reboot is also the way to go if your iOS device is really\
    \ stuck and holding down just the `Sleep/Wake` button doesn’t do anything. It\
    \ happens.\n\n## Updating Software\n\niOS checks for available updates from time\
    \ to time when it’s connected to the Internet. If an update is available, you\
    \ see a badge on the `Settings` app icon, as shown in Figure 1-1. You might also\
    \ see a Software Update notification telling you that a new version of iOS is\
    \ ready to install.\n\n![A429116_1_En_1_Fig1_HTML.jpg](A429116_1_En_1_Fig1_HTML.jpg)\n\
    \n**Figure 1-1.** When iOS detects that an update is available, it alerts you\
    \ with a badge on the `Settings` app icon\n\nTo proceed with the update, follow\
    \ these steps:\n\n1.  If the Software Update alert is displayed, tap Install Now.\
    \ Otherwise, on the Home screen, tap Settings. The `Settings` app appears.\n2.\
    \  Tap General. iOS displays the General screen. As you can see in Figure 1-2,\
    \ when an update is available, you also see badges on the General tab and the\
    \ Software Update command.\n\n    ![A429116_1_En_1_Fig2_HTML.jpg](A429116_1_En_1_Fig2_HTML.jpg)\n\
    \n    **Figure 1-2.** When an update is ready for you, iOS displays badges on\
    \ the `Settings` app's General tab and Software Update command\n3.  Tap Download\
    \ and Install. iOS downloads the update and then proceeds with the installation,\
    \ which takes a few minutes.\n\n**Caution**\n\nYour iOS device only goes through\
    \ with the update if it will have more than 50-percent battery life through the\
    \ entire update operation. To ensure the update is a success, either plug your\
    \ device into an AC outlet or only run the update when the battery is fully charged.\n\
    \n## Restoring Your Device from a Backup\n\nIt’s often the case that simply changing\
    \ a setting or adding an app or some data can cause your iOS device to act wonky.\
    \ Ideally the fix would be to return the setting to its previous state or remove\
    \ the app or data, but it’s not always obvious which setting or bit of content\
    \ is the culprit.\n\nOne solution is to return your device to an earlier state\
    \ by restoring a recent backup. If you go back far enough, you should restore\
    \ to a state in which the problem doesn’t exist. (Ideally, you shouldn’t go back\
    \ any further than necessary because then you run too great a risk of losing other\
    \ settings, apps, and data.)\n\nFollow these steps to restore a recent backup:\n\
    \n1.  On your device, turn off Find My iPhone, if it’s turned on. You do this\
    \ by opening `Settings`, tapping iCloud, tapping `Find My Device` (where `Device`\
    \ is iPhone, iPad or iPod), tapping the `Find My Device` switch to Off, and then\
    \ entering your Apple password.\n2.  Connect your device to your computer.\n3.\
    \  In iTunes, click the device icon.\n4.  Click the Summary tab.\n5.  Click Restore\
    \ Backup. iTunes asks you to select a backup to restore, as shown in Figure 1-3.\n\
    \n    ![A429116_1_En_1_Fig3_HTML.jpg](A429116_1_En_1_Fig3_HTML.jpg)\n\n    **Figure\
    \ 1-3.** Select an earlier backup that was made before you began experiencing\
    \ problems on your device\n6.  Select the older backup that you want to restore.\
    \ This should be the most recent backup that was made before the problem first\
    \ occurred.\n7.  Click Restore. iTunes restores the backup and restarts the device.\n\
    \n## Restoring Factory Settings\n\nSometimes your iOS device goes down for the\
    \ count because its settings have become corrupted. In that case, you can fix\
    \ the problem by restoring the device to its default factory settings."
