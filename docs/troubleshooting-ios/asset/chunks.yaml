- fmt: "# You Want iOS to Back Up your Device Automatically\n\nUsing iTunes to back\
    \ up your iOS device is handy, but it requires that you connect your device to\
    \ your computer, open iTunes, and run the backup. These are not onerous steps,\
    \ but they present enough of a hurdle that you might not back up your device regularly.\
    \ That's a problem because the key to restoring your data successfully should\
    \ it come to that is to have a recent backup available.\n\nTo make sure this happens,\
    \ it would be nice to have a way to automatically back up your iOS device on a\
    \ regular schedule.\n\nSolution: If you have an iCloud account, you can configure\
    \ your iOS device to use iCloud as the backup location.\n\nIf you regularly use\
    \ iTunes to sync your iOS device, you can tell iTunes to use iCloud as the backup\
    \ location. To configure this, follow these steps:\n\n1. Connect your iOS device\
    \ to your computer.\n2. In iTunes, click your iOS device when it appears in the\
    \ Devices list.\n3. Click the Summary tab.\n4. In the Automatically Back Up section,\
    \ select iCloud, as shown in Figure [8-10](#A429116_1_En_8_Chapter.html#Fig10).\n\
    \n   ![A429116_1_En_8_Fig10_HTML.jpg](A429116_1_En_8_Fig10_HTML.jpg)\n\n   Figure\
    \ 8-10. In iTunes, click your connected iOS device, click the Summary tab, and\
    \ then click iCloud in the Automatically Back Up section\n\nIf you never use iTunes,\
    \ you can still configure iOS to back up your data to iCloud directly from your\
    \ iOS device:\n\n1. On the Home screen, tap Settings to launch the Settings app.\n\
    2. Tap iCloud.\n3. Tap Backup.\n4. Tap the iCloud Backup switch to On, as shown\
    \ in Figure [8-11](#A429116_1_En_8_Chapter.html#Fig11), and then tap OK when iCloud\
    \ confirms the setting. This tells iOS to make automatic backups whenever the\
    \ device is locked, connected to a Wi-Fi network, and plugged in to a power source.\n\
    \n   ![A429116_1_En_8_Fig11_HTML.jpg](A429116_1_En_8_Fig11_HTML.jpg)\n\n   Figure\
    \ 8-11. Tap iCloud Backup to On to set up automatic iCloud backups\n\n5. To run\
    \ a backup right away, tap Back Up Now. Your iOS device backs up its data to your\
    \ iCloud account.\n\n# You're Having iCloud Backup Problems\n\nAfter you've set\
    \ up iCloud backups, you might find that the backups don't complete or don't run\
    \ at all.\n\nSolution: There are a number of possible reasons why iCloud backups\
    \ won't run. Here are some things to look for:\n\n- Make sure that iCloud backups\
    \ are activated. Open the Settings app, tap iCloud, tap Backup, and then tap the\
    \ iCloud Backup switch to On.\n- Make sure your iOS device is connected to a Wi-Fi\
    \ network. iCloud backups do not work if there is no Internet connection, nor\
    \ do they work over a cellular connection.\n- Make sure your iOS device is plugged\
    \ in to a power source.\n- Make sure your device is locked.\n- Check that you\
    \ have free space on your iCloud account. To check this, open the Settings app,\
    \ tap iCloud, and then examine the Available value beside the Storage command,\
    \ as shown in Figure [8-12](#A429116_1_En_8_Chapter.html#Fig12).\n\n  ![A429116_1_En_8_Fig12_HTML.jpg](A429116_1_En_8_Fig12_HTML.jpg)\n\
    \n  Figure 8-12. In the Settings app's iCloud screen, the Storage command shows\
    \ you how much free space is left in your iCloud account\n\nNote: How do you know\
    \ whether you have enough free space on iCloud? Backup size varies according to\
    \ device and capacity, but expect your backup to require anywhere from 400 MB\
    \ to 1 GB.\n\nIf your iCloud backup is failing because storage space is low, you\
    \ can free up some space by deleting one or more backups from devices you no long\
    \ own or use:\n\n1. On the Home screen, tap Settings to launch the Settings app.\n\
    2. Tap iCloud.\n3. Tap Storage.\n4. Tap Manage Storage.\n5. In the Backups section,\
    \ tap the device whose backups you want to delete.\n6. Tap Delete Backup. iOS\
    \ asks you to confirm that you want to turn off backups for this device and delete\
    \ its backup data.\n7. Tap Turn Off & Delete.\n\n# Protecting a Lost Device\n\n\
    If there's a downside to using an iOS device, it's that you end up with a pretty\
    \ large chunk of your life on that device. Initially, that may sound like a good\
    \ thing, but if you happen to lose your device, you've also lost that chunk of\
    \ your life. Plus, assuming you haven't configured your iOS device with a passcode\
    \ lock, as described earlier, you've opened a gaping privacy hole because anyone\
    \ can now delve into your data.\n\nIf you've been backing up your iOS device regularly,\
    \ then you can probably recover most, or even all, of that data. However, I'm\
    \ sure you'd probably rather find your device because it's expensive and there's\
    \ just something creepy about the thought of some stranger flicking through your\
    \ stuff.\n\nThe old way of finding your missing iOS device consisted of scouring\
    \ every nook and cranny that you visited before losing it, and calling up various\
    \ lost-and-found departments to see if anyone turned it in. The new way to find\
    \ your iOS device is via a feature called Find My iPhone. (You can use this feature\
    \ through your iCloud account, if you have one, or through the Find My iPhone\
    \ app.) Find My iPhone uses the GPS sensor embedded inside your iOS device to\
    \ locate the device. You can also use Find My iPhone to play a sound on your iOS\
    \ device, remotely lock it and send a message, or, in a real pinch, remotely delete\
    \ your data.\n\nNote: You might think that a fatal flaw with Find My iPhone is\
    \ that someone who has your iOS device can easily turn off the feature and disable\
    \ it. Fortunately, that's not the case because iOS comes with a feature called\
    \ Activation Lock, which means that a person can turn off Find My iPhone only\
    \ by entering your Apple ID password.\n\n## You Want to Ensure That You Can Find\
    \ a Lost Device\n\nFind My iPhone works by looking for a particular signal that\
    \ your iOS device beams out into the ether. This signal is turned off by default,\
    \ so you need to turn it on if you ever plan to use Find My iPhone.\n\nSolution:\
    \ Follow these steps to activate Find My iPhone:\n\n1. On the Home screen, tap\
    \ Settings. The Settings app appears.\n2. Tap iCloud. Your iCloud account settings\
    \ appear.\n3. Tap Find My Device (where Device is iPhone, iPad, or iPod).\n4.\
    \ Tap the Find My Device switch to On. iOS asks you to confirm.\n5. Tap Allow.\n\
    \nTip: Your lost iOS device might just be lying somewhere where no one can find\
    \ it. In that case, the danger is that the iOS device battery will die before\
    \ you have a chance to locate it using Find My iPhone. To make this less likely,\
    \ be sure to activate the Send Last Location switch. This configures iOS to send\
    \ you the device's last known location as soon as it detects that its battery\
    \ is nearly done.\n\n## You Want to Locate a Lost Device on a Map\n\nTo get a\
    \ general idea of where your lost device is located, you might prefer to see its\
    \ location visually, by using a map.\n\nSolution: You can use the Find My iPhone\
    \ feature of `icloud.com` to locate your device. Here are the steps to follow:\n\
    \n1. Use a web browser to navigate to [`www.icloud.com`](http://www.icloud.com).\
    \ Note: Rather than using `icloud.com`, you can also use the Find My iPhone app\
    \ to locate your lost iOS device.\n2. Sign in to your iCloud account.\n3. Click\
    \ Find My iPhone. The iCloud Find My iPhone application appears.\n4. Click All\
    \ Devices. iCloud displays a list of your iOS devices.\n5. Click your lost iOS\
    \ device in the list. iCloud locates your iOS device on a map, as shown in Figure\
    \ [8-13](#A429116_1_En_8_Chapter.html#Fig13).\n\n   ![A429116_1_En_8_Fig13_HTML.jpg](A429116_1_En_8_Fig13_HTML.jpg)\n\
    \n   Figure 8-13. You can use iCloud's Find My iPhone application to locate your\
    \ lost iOS device on a map\n\nTip: To see if the device's location has changed,\
    \ click the Refresh Location button (pointed out in Figure [8-13](#A429116_1_En_8_Chapter.html#Fig13))."
