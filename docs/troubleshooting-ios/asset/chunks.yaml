- fmt: "### You Want to Make Text Easier to Read\n\nIf your [20/20] vision is available\
    \ only in hindsight, you may be asking yourself a simple question: Why does everything\
    \ on my device screen look so tiny? The icons are miniature, the buttons are minute,\
    \ and the text is miniscule.\n\nSolution: I’m happy to report that these things\
    \ are not set in stone (electronically speaking). iOS offers several settings\
    \ that can enlarge what you see on your screen, or make it clearer. Follow these\
    \ steps to modify some or all of these settings:\n\n1. On the Home screen, tap\
    \ `Settings` to open the `Settings` app.\n2. Tap `General` to display the `General`\
    \ screen.\n3. Tap `Accessibility` to display the `Accessibility` screen.\n4. Tap\
    \ `Display Accommodations` and then tap `Reduce White Point` to `On` to make whites\
    \ less intense.\n5. Tap `Larger Text`, then use the slider to set the text size\
    \ you’d prefer (see Figure [11-1](#A429116_1_En_11_Chapter.html#Fig1)). You can\
    \ also tap the `Larger Accessibility Sizes` switch to `On` to take advantage of\
    \ apps that support a feature called `Dynamic Type`, which enables the apps to\
    \ resize text according to the slider value you set.\n\n   ![A429116_1_En_11_Fig1_HTML.jpg](A429116_1_En_11_Fig1_HTML.jpg)\n\
    \n   Figure 11-1. You can use the `Larger Text` settings to increase the text\
    \ size used by iOS and some apps\n\n6. Tap `Bold Text` to `On` to render all screen\
    \ text in an easier-to-see bold font. Note iOS requires you to restart your device\
    \ to put the `Bold Text` setting into effect.\n7. Tap `Button Shapes` to `On`\
    \ to apply a fill color to all buttons (for example, see the `General` button\
    \ in Figure [11-2](#A429116_1_En_11_Chapter.html#Fig2)), which make them easier\
    \ to see and tap.\n\n   ![A429116_1_En_11_Fig2_HTML.jpg](A429116_1_En_11_Fig2_HTML.jpg)\n\
    \n   Figure 11-2. Activate the `Button Shapes` setting to apply a fill that shows\
    \ the shape of buttons, such as the `General` button shown here\n\n8. Tap `Increase\
    \ Contrast` to improve overall screen contrast. Tap `Reduce Transparency` to `On`\
    \ to minimize transparency and blur effects; tap `Darken Colors` to `On` to make\
    \ non-white colors darker.\n9. Tap `Reduce Motion` and then tap the `Reduce Motion`\
    \ switch to `On` to tell iOS to use fewer user interface motion effects, which\
    \ can make it easier to follow what’s happening onscreen.\n10. Tap the `On/Off\
    \ Labels` switch to `On` to supplement each `On/Off` switch with a `1` that appears\
    \ when the switch is on, or a `0` that appears when the switch is `Off`, as shown\
    \ in Figure [11-3](#A429116_1_En_11_Chapter.html#Fig3). This is useful if you\
    \ have trouble distinguishing between the `On` and `Off` states of an iOS switch.\n\
    \n    ![A429116_1_En_11_Fig3_HTML.jpg](A429116_1_En_11_Fig3_HTML.jpg)\n\n    Figure\
    \ 11-3. When the `On/Off Labels` setting is activated, you see a `1` in a switch\
    \ that’s set to `On`, and a `0` in a switch that’s set to `Off`\n\n### You Want\
    \ a Quick Way to Zoom in on the Screen\n\nYou may find that although you can make\
    \ out most of the items on the screen, the occasional icon or bit of text is just\
    \ too diminutive to decipher. Some of the settings mentioned in the previous section\
    \ might help, but they affect all of iOS, which might be overkill.\n\nSolution:\
    \ You could always grab a nearby magnifying glass to get a closer look at the\
    \ section you can’t make out, but iOS offers an electronic version of the same\
    \ thing. It’s called `Zoom`, and it enables you to see a magnified portion of\
    \ the screen. Here’s how you enable it:\n\n1. On the Home screen, tap `Settings`\
    \ to open the `Settings` app.\n2. Tap `General` to display the `General` screen.\n\
    3. Tap `Accessibility` to display the `Accessibility` screen.\n4. Tap `Zoom` to\
    \ display the `Zoom` screen.\n5. Tap the `Zoom` switch to `On`, as shown in Figure\
    \ [11-4](#A429116_1_En_11_Chapter.html#Fig4). iOS adds the `Zoom` window, within\
    \ which the underlying screen text and elements are magnified.\n\n   ![A429116_1_En_11_Fig4_HTML.jpg](A429116_1_En_11_Fig4_HTML.jpg)\n\
    \n   Figure 11-4. Tap the `Zoom` switch to `On` to see the `Zoom` window, which\
    \ magnifies a portion of the screen\n\nHere are some pointers for using the `Zoom`\
    \ window:\n\n- To toggle the `Zoom` window off and on, double-tap the screen with\
    \ three fingers.\n- To move the `Zoom` window, drag the oval handle that appears\
    \ in the middle of its bottom border.\n- To move the screen within the `Zoom`\
    \ window, drag three fingers inside the window.\n- To adjust the magnification,\
    \ double-tap the screen with three fingers and then drag on the screen with three\
    \ fingers.\n- To zoom the entire screen instead of just a portion of it, return\
    \ to the `Accessibility` settings, tap `Zoom`, tap `Zoom Region`, and then tap\
    \ `Full Screen Zoom`.\n\n> **Note**  \n> By default, `Zoom` automatically magnifies\
    \ that portion of the screen that has the focus (that is, the portion of the screen\
    \ with whatever control you’re currently working with). If you find this jarring,\
    \ you can disable it by displaying the `Zoom` screen and tapping the `Follow Focus`\
    \ switch to `Off`.\n\n### You Want to Hear What’s Shown on the Screen\n\nIf you\
    \ find that you’re really having trouble making out what’s on the screen, you\
    \ might prefer to have the screen text read to you.\n\nSolution: iOS comes with\
    \ an assistive technology called `VoiceOver` that can help. `VoiceOver`’s job\
    \ is to read aloud whatever text appears in the current screen or dialog. `VoiceOver`\
    \ also does many other things, including the following:\n\n- Tells you the name\
    \ of the current app, as well as the name of the app’s current screen or dialog.\n\
    - Tells you the name of the control that currently has the focus, the type of\
    \ control (for example, a switch), and the control’s current state (for example,\
    \ `On`).\n- Echoes your most recent keystroke. For example, if you press `Delete`\
    \ to delete a character, `VoiceOver` says `\"Delete\"`.\n- Tells you the text\
    \ of the current item, such as a text message.\n\nFollow these steps to activate\
    \ `VoiceOver`:\n\n1. On the Home screen, tap `Settings` to open the `Settings`\
    \ app.\n2. Tap `General` to display the `General` screen.\n3. Tap `Accessibility`\
    \ to display the `Accessibility` screen.\n4. Tap `VoiceOver` to display the `VoiceOver`\
    \ screen.\n5. Tap the `VoiceOver` switch to `On`, as shown in Figure [11-5](#A429116_1_En_11_Chapter.html#Fig5).\
    \ `VoiceOver` describes the current screen, including the alert button that `Settings`\
    \ displays to ask you to confirm.\n\n   ![A429116_1_En_11_Fig5_HTML.jpg](A429116_1_En_11_Fig5_HTML.jpg)\n\
    \n   Figure 11-5. Tap the `VoiceOver` switch to `On` to hear what’s displayed\
    \ on the screen\n\n6. Tap `OK` twice.\n\n> **Note**  \n> `VoiceOver` offers an\
    \ extensive collection of customization settings that enable you to control how\
    \ verbose `VoiceOver` is; whether you want to hear sound effects; whether you\
    \ want to hear characters, words, or both when typing; and more. You’ll find all\
    \ these settings on the `VoiceOver` screen.\n\nNote that activating `VoiceOver`\
    \ changes how you use the iOS interface as follows:\n\n- Tap a screen item to\
    \ select it and have `VoiceOver` tell you its name and optionally its state or\
    \ text. iOS places a black border around the item to show you that it’s selected.\
    \ For an example, see the `Accessibility` button in Figure [11-5](#A429116_1_En_11_Chapter.html#Fig5).\n\
    - To run, activate, or choose a screen item that you’ve already selected, double-tap\
    \ it.\n- To scroll, slide three fingers on the screen."
  raw: "### You Want to Make Text Easier to Read\n\nIf your [20/20] vision is available\
    \ only in hindsight, you may be asking yourself a simple question: Why does everything\
    \ on my device screen look so tiny? The icons are miniature, the buttons are minute,\
    \ and the text is miniscule.\n\nSolution: I’m happy to report that these things\
    \ are not set in stone (electronically speaking). iOS offers several settings\
    \ that can enlarge what you see on your screen, or make it clearer. Follow these\
    \ steps to modify some or all of these settings:\n\n1.  On the Home screen, tap\
    \ Settings to open the Settings app.  \n2.  Tap General to display the General\
    \ screen.  \n3.  Tap Accessibility to display the Accessibility screen.  \n4.\
    \  Tap Display Accommodations and then tap Reduce White Point to On to make whites\
    \ less intense.  \n5.  Tap Larger Text , then use the slider to set the text size\
    \ you’d prefer (see Figure [11-1](#A429116_1_En_11_Chapter.html#Fig1)). You can\
    \ also tap the Larger Accessibility Sizes switch to On to take advantage of apps\
    \ that support a feature called Dynamic Type, which enables the apps to resize\
    \ text according to the slider value you set.\n\n    ![A429116_1_En_11_Fig1_HTML.jpg](A429116_1_En_11_Fig1_HTML.jpg)\n\
    \n    Figure 11-1.\n\n    You can use the Larger Text settings to increase the\
    \ text size used by iOS and some apps  \n6.  Tap Bold Text to On to render all\
    \ screen text in an easier-to-see bold font. Note iOS requires you to restart\
    \ your device to put the Bold Text setting into effect.  \n7.  Tap Button Shapes\
    \ to On to apply a fill color to all buttons (for example, see the General button\
    \ in Figure [11-2](#A429116_1_En_11_Chapter.html#Fig2)), which make them easier\
    \ to see and tap.\n\n    ![A429116_1_En_11_Fig2_HTML.jpg](A429116_1_En_11_Fig2_HTML.jpg)\n\
    \n    Figure 11-2.\n\n    Activate the Button Shapes setting to apply a fill that\
    \ shows the shape of buttons, such as the General button shown here  \n8.  Tap\
    \ Increase Contrast to improve overall screen contrast. Tap Reduce Transparency\
    \ On to minimize transparency and blur effects; tap Darken Colors on to make non-white\
    \ colors darker.  \n9.  Tap Reduce Motion and then tap the Reduce Motion switch\
    \ to On to tell iOS to use fewer user interface motion effects, which can make\
    \ it easier to follow what’s happening onscreen.  \n10.  Tap the On/Off Labels\
    \ switch to On to supplement each On/Off switch with a 1 that appears when the\
    \ switch is on, or a 0 that appears when the switch is Off, as shown in Figure\
    \ [11-3](#A429116_1_En_11_Chapter.html#Fig3). This is useful if you have trouble\
    \ distinguishing between the On and Off states of an iOS switch.\n\n    ![A429116_1_En_11_Fig3_HTML.jpg](A429116_1_En_11_Fig3_HTML.jpg)\n\
    \n    Figure 11-3.\n\n    When the On/Off Labels setting is activated, you see\
    \ a 1 in a switch that’s set to On, and a 0 in a switch that’s set to Off\n\n\
    ### You Want a Quick Way to Zoom in on the Screen\n\nYou may find that although\
    \ you can make out most of the items on the screen, the occasional icon or bit\
    \ of text is just too diminutive to decipher. Some of the settings mentioned in\
    \ the previous section might help, but they affect all of iOS, which might be\
    \ overkill.\n\nSolution: You could always grab a nearby magnifying glass to get\
    \ a closer look at the section you can’t make out, but iOS offers an electronic\
    \ version of the same thing. It’s called Zoom, and it enables you to see a magnified\
    \ portion of the screen. Here’s how you enable it:\n\n1.  On the Home screen,\
    \ tap Settings to open the Settings app.  \n2.  Tap General to display the General\
    \ screen.  \n3.  Tap Accessibility to display the Accessibility screen.  \n4.\
    \  Tap Zoom to display the Zoom screen.  \n5.  Tap the Zoom switch to On, as shown\
    \ in Figure [11-4](#A429116_1_En_11_Chapter.html#Fig4). iOS adds the Zoom window,\
    \ within which the underlying screen text and elements are magnified.\n\n    ![A429116_1_En_11_Fig4_HTML.jpg](A429116_1_En_11_Fig4_HTML.jpg)\n\
    \n    Figure 11-4.\n\n    Tap the Zoom switch to On to see the Zoom window, which\
    \ magnifies a portion of the screen  \n\nHere are some pointers for using the\
    \ Zoom window:\n\n*   To toggle the Zoom window off and on, double-tap the screen\
    \ with three fingers.\n*   To move the Zoom window, drag the oval handle that\
    \ appears in the middle of its bottom border.\n*   To move the screen within the\
    \ Zoom window, drag three fingers inside the window.\n*   To adjust the magnification,\
    \ double-tap the screen with three fingers and then drag on the screen with three\
    \ fingers.\n*   To zoom the entire screen instead of just a portion of it, return\
    \ to the Accessibility settings, tap Zoom, tap Zoom Region, and then tap Full\
    \ Screen Zoom.\n\nNote\n\nBy default, Zoom automatically magnifies that portion\
    \ of the screen that has the focus (that is, the portion of the screen with whatever\
    \ control you’re currently working with). If you find this jarring, you can disable\
    \ it by displaying the Zoom screen and tapping the Follow Focus switch to Off.\n\
    \n### You Want to Hear What’s Shown on the Screen\n\nIf you find that you’re really\
    \ having trouble making out what’s on the screen, you might prefer to have the\
    \ screen text read to you.\n\nSolution: iOS comes with an assistive technology\
    \ called VoiceOver that can help. VoiceOver’s job is to read aloud whatever text\
    \ appears in the current screen or dialog. VoiceOver also does many other things,\
    \ including the following:\n\n*   Tells you the name of the current app, as well\
    \ as the name of the app’s current screen or dialog.\n*   Tells you the name of\
    \ the control that currently has the focus, the type of control (for example,\
    \ a switch), and the control’s current state (for example, On).\n*   Echoes your\
    \ most recent keystroke. For example, if you press Delete to delete a character,\
    \ VoiceOver says \"Delete.\"\n*   Tells you the text of the current item, such\
    \ as a text message.\n\nFollow these steps to activate VoiceOver:\n\n1.  On the\
    \ Home screen, tap Settings to open the Settings app.  \n2.  Tap General to display\
    \ the General screen.  \n3.  Tap Accessibility to display the Accessibility screen.\
    \  \n4.  Tap VoiceOver to display the VoiceOver screen.  \n5.  Tap the VoiceOver\
    \ switch to On, as shown in Figure [11-5](#A429116_1_En_11_Chapter.html#Fig5).\
    \ VoiceOver describes the current screen, including the alert button that Settings\
    \ displays to ask you to confirm.\n\n    ![A429116_1_En_11_Fig5_HTML.jpg](A429116_1_En_11_Fig5_HTML.jpg)\n\
    \n    Figure 11-5.\n\n    Tap the VoiceOver switch to On to hear what’s displayed\
    \ on the screen  \n6.  Tap OK twice.  \n\nNote\n\nVoiceOver overs an extensive\
    \ collection of customization settings that enable you to control how verbose\
    \ VoiceOver is; whether you want to hear sound effects; whether you want to hear\
    \ characters, words, or both when typing; and more. You’ll find all these settings\
    \ on the VoiceOver screen.\n\nNote that activating VoiceOver changes how you use\
    \ the iOS interface as follows:\n\n*   Tap a screen item to select it and have\
    \ VoiceOver tell you its name and optionally its state or text. iOS places a black\
    \ border around the item to show you that it’s selected. For an example, see the\
    \ Accessibility button in Figure [11-5](#A429116_1_En_11_Chapter.html#Fig5).\n\
    *   To run, activate, or choose a screen item that you’ve already selected, double-tap\
    \ it.\n*   To scroll, slide three fingers on the screen."
  trans: "### 你想让文本更易阅读\n\n如果你的“事后诸葛亮”视力还算不错，那你可能会问自己一个简单的问题：为什么我设备屏幕上的所有东西看起来都这么小？图标小、按钮小、文本也小得可怜。\n\
    \n解决方法：我很高兴地告诉你，这些并非一成不变（从电子设备角度来说）。iOS 提供了几项设置，可以放大屏幕上的内容，或使其更清晰。请按照以下步骤修改部分或全部设置：\n\
    \n1.  在主屏幕上，轻点 `设置` 以打开“设置”应用。\n2.  轻点 `通用` 以显示“通用”屏幕。\n3.  轻点 `辅助功能` 以显示“辅助功能”屏幕。\n\
    4.  轻点 `显示与文字大小`，然后轻点 `降低白点值` 开关将其打开，以减弱白色强度。\n5.  轻点 `更大字体`，然后使用滑块设置你偏好的字体大小（见图\
    \ 11-1）。你也可以将 `更大辅助功能字体` 开关打开，以利用支持 `动态字体` 功能的 App，该功能允许 App 根据你设定的滑块值调整文本大小。\n\
    \n   ![A429116_1_En_11_Fig1_HTML.jpg](img/A429116_1_En_11_Fig1_HTML.jpg)\n\n \
    \  图 11-1. 你可以使用 `更大字体` 设置来增大 iOS 和某些 App 使用的文本大小\n\n6.  将 `粗体文本` 开关打开，以使所有屏幕文本以更易看清的粗体字体呈现。请注意，iOS\
    \ 需要你重启设备才能使 `粗体文本` 设置生效。\n7.  将 `按钮形状` 开关打开，以便为所有按钮应用填充颜色（例如，见图 11-2 中的 `通用`\
    \ 按钮），这使它们更容易看清和轻点。\n\n   ![A429116_1_En_11_Fig2_HTML.jpg](img/A429116_1_En_11_Fig2_HTML.jpg)\n\
    \n   图 11-2. 激活 `按钮形状` 设置，为按钮（如此处显示的 `通用` 按钮）应用填充以显示其形状\n\n8.  轻点 `增强对比度` 以改善整体屏幕对比度。将\
    \ `降低透明度` 开关打开以最大程度减少透明和模糊效果；将 `加深颜色` 开关打开以使非白色颜色更深。\n9.  轻点 `减弱动态效果`，然后将 `减弱动态效果`\
    \ 开关打开，以指示 iOS 减少使用用户界面动态效果，这有助于更轻松地跟踪屏幕上发生的事情。\n10. 将 `开/关标签` 开关打开，以便在每个 `开/关`\
    \ 开关上补充显示 `1`（当开关打开时）或 `0`（当开关关闭时），如图 11-3 所示。如果你难以区分 iOS 开关的“开”和“关”状态，这会很有用。\n\
    \n    ![A429116_1_En_11_Fig3_HTML.jpg](img/A429116_1_En_11_Fig3_HTML.jpg)\n\n\
    \    图 11-3. 激活 `开/关标签` 设置后，你会看到设置为 `开` 的开关上显示 `1`，设置为 `关` 的开关上显示 `0`\n\n### 你想要一种快速放大屏幕的方法\n\
    \n你可能会发现，虽然你能看清屏幕上的大部分项目，但偶尔有图标或一小段文本太小而无法辨认。上一节提到的一些设置可能会有所帮助，但它们会影响整个 iOS，可能有些小题大做。\n\
    \n解决方法：你总是可以拿个放大镜来凑近看你无法辨认的部分，但 iOS 提供了电子版的解决方案。它叫做 `缩放`，可以让你看到屏幕的放大区域。以下是启用它的方法：\n\
    \n1.  在主屏幕上，轻点 `设置` 以打开“设置”应用。\n2.  轻点 `通用` 以显示“通用”屏幕。\n3.  轻点 `辅助功能` 以显示“辅助功能”屏幕。\n\
    4.  轻点 `缩放` 以显示“缩放”屏幕。\n5.  将 `缩放` 开关打开，如图 11-4 所示。iOS 会添加一个“缩放”窗口，其内部的底层屏幕文本和元素会被放大。\n\
    \n   ![A429116_1_En_11_Fig4_HTML.jpg](img/A429116_1_En_11_Fig4_HTML.jpg)\n\n \
    \  图 11-4. 将 `缩放` 开关打开，即可看到“缩放”窗口，它会放大屏幕的一部分\n\n以下是使用“缩放”窗口的一些提示：\n\n-   要切换“缩放”窗口的开关，请用三根手指在屏幕上双击。\n\
    -   要移动“缩放”窗口，请拖动其底部边框中间出现的椭圆形手柄。\n-   要移动“缩放”窗口内的屏幕内容，请用三根手指在窗口内拖动。\n-   要调整放大倍率，请用三根手指在屏幕上双击，然后用三根手指在屏幕上拖动。\n\
    -   要放大整个屏幕而非仅放大一部分，请返回“辅助功能”设置，轻点 `缩放`，轻点 `缩放区域`，然后轻点 `全屏幕缩放`。\n\n> **注**  \n\
    > 默认情况下，`缩放` 会自动放大屏幕上有焦点的部分（即你当前正在操作的控件所在的屏幕区域）。如果你觉得这很突兀，可以通过显示“缩放”屏幕并将 `跟随焦点`\
    \ 开关关闭来禁用它。\n\n### 你想要听到屏幕上的内容\n\n如果你发现自己确实很难看清屏幕上的内容，你可能更希望有人将屏幕文本读给你听。\n\n解决方法：iOS\
    \ 内置了一款名为 `旁白` 的辅助技术，可以帮到你。`旁白` 的工作是朗读当前屏幕或对话框中的任何文本。`旁白` 还能做许多其他事情，包括以下内容：\n\n\
    -   告诉你当前 App 的名称，以及该 App 当前屏幕或对话框的名称。\n-   告诉你当前获得焦点的控件名称、控件类型（例如，开关）以及控件的当前状态（例如\
    \ `开`）。\n-   复述你最近的按键操作。例如，如果你按下 `删除` 键来删除一个字符，`旁白` 会说出 `“删除”`。\n-   告诉你当前项目的文本内容，例如一条短信。\n\
    \n按照以下步骤激活 `旁白`：\n\n1.  在主屏幕上，轻点 `设置` 以打开“设置”应用。\n2.  轻点 `通用` 以显示“通用”屏幕。\n3. \
    \ 轻点 `辅助功能` 以显示“辅助功能”屏幕。\n4.  轻点 `旁白` 以显示“旁白”屏幕。\n5.  将 `旁白` 开关打开，如图 11-5 所示。`旁白`\
    \ 会描述当前屏幕，包括“设置”App 为请求你确认而显示的提醒按钮。\n\n   ![A429116_1_En_11_Fig5_HTML.jpg](img/A429116_1_En_11_Fig5_HTML.jpg)\n\
    \n   图 11-5. 将 `旁白` 开关打开，即可听到屏幕上的显示内容\n\n6.  轻点 `好` 两次。\n\n> **注**  \n> `旁白` 提供了大量的自定义设置，使你可以控制\
    \ `旁白` 的详细程度；是否要听到音效；打字时是想要听到字符、单词，还是两者都听到；以及更多。你可以在“旁白”屏幕上找到所有这些设置。\n\n请注意，激活\
    \ `旁白` 会像下面这样改变你使用 iOS 界面的方式：\n\n-   轻点一个屏幕项目以选中它，并让 `旁白` 告诉你它的名称以及可选的状态或文本。iOS\
    \ 会在该项目周围放置一个黑色边框，以表明它已被选中。有关示例，请参见图 11-5 中的 `辅助功能` 按钮。\n-   要运行、激活或选择已选中的屏幕项目，请双击它。\n\
    -   要滚动，请在屏幕上用三根手指滑动。"
- fmt: "# You Want to Use Your iOS Device to Magnify Real-World Items\n\nThe `Camera`\
    \ app comes with a zoom feature that, by spreading your fingers on the screen,\
    \ lets you see a magnified version of the current frame. Besides being a useful\
    \ photography feature, the zoom is handy for getting a closer look at items in\
    \ the real world, such as tiny text or far-off signs. Unfortunately, the spread\
    \ gesture isn’t easy to use if you also have mobility challenges.\n\n**Solution:**\
    \ iOS offers a `Magnifier` tool that automatically launches the `Camera` app and\
    \ activates its zoom feature. Here are the steps to follow to enable `Magnifier`:\n\
    \n1. On the Home screen, tap `Settings` to open the `Settings` app.\n2. Tap `General`\
    \ to display the `General` screen.\n3. Tap `Accessibility` to display the `Accessibility`\
    \ screen.\n4. Tap `Magnifier` to display the `Magnifier` screen.\n5. Tap the `Magnifier`\
    \ switch to `On`, as shown in Figure [11-6](#A429116_1_En_11_Chapter.html#Fig6).\n\
    \n    ![A429116_1_En_11_Fig6_HTML.jpg](A429116_1_En_11_Fig6_HTML.jpg)\n\n    Figure\
    \ 11-6. Tap the `Magnifier` switch to `On` to easily use the `Camera` app’s zoom\
    \ feature to get a closer look at real-world items\n\n**Tip:** If you find the\
    \ zoomed screen too dark or too light at times, you can configure iOS to adjust\
    \ automatically. In the `Magnifier` screen, tap the `Auto-Brightness` switch to\
    \ `On`.\n\nWith `Magnifier` activated, you invoke it by triple-pressing the `Home`\
    \ button.\n\n## Overcoming Physical Challenges\n\nUsing your iOS device may seem\
    \ at first blush to be more of a mental exercise. After all, you spend lots of\
    \ time in front of the screen reading things, looking at things, and thinking\
    \ about things.\n\nHowever, if you mapped out your device time, you’d almost certainly\
    \ find that you spend great chunks of time on physical tasks: typing, tapping,\
    \ double-tapping, and all the gestures – swiping, sliding, pinching, spreading,\
    \ and so on – that are needed to make your device do your bidding.\n\nThis surprisingly\
    \ physical side of iOS means that if you have physical challenges of your own,\
    \ you may find it hard to perform certain tasks (and a few may be pretty much\
    \ impossible). Fortunately, it doesn’t have to be that way. iOS has quite a few\
    \ settings and tools that either make using your device less of a burden or that\
    \ enable you to work around any problems you might encounter.\n\n### Double-Clicking\
    \ the Home Button Doesn’t Display the Multitasking Screen\n\nYou switch between\
    \ apps in iOS by double-clicking the `Home` button to open the multitasking screen,\
    \ swiping until the app you want to switch to comes into view, and then tapping\
    \ the app. Switching between apps is much more difficult if you can’t access the\
    \ multitasking screen.\n\n**Solution:** If double-clicking the `Home` button doesn’t\
    \ display the multitasking screen, you might be taking too long between each press,\
    \ so try a faster double-click.\n\nIf that’s a persistent problem for you, you\
    \ can slow down the Home-click speed. Here are the steps to follow:\n\n1. On the\
    \ Home screen, tap `Settings` to open the `Settings` app.\n2. Tap `General` to\
    \ display the `General` screen.\n3. Tap `Accessibility` to display the `Accessibility`\
    \ screen.\n4. Tap `Home Button` to display the `Home Button` screen.\n5. Tap `Slow`,\
    \ as shown in Figure [11-7](#A429116_1_En_11_Chapter.html#Fig7). iOS flashes the\
    \ `Slow` option and vibrates the device at the new Home-click speed.\n\n    ![A429116_1_En_11_Fig7_HTML.jpg](A429116_1_En_11_Fig7_HTML.jpg)\n\
    \n    Figure 11-7. If you’re having trouble getting iOS to recognize `Home` button\
    \ double-clicks, try the `Slow` speed\n6. If you find that speed still causes\
    \ problems, try using the `Slowest` speed, instead.\n\n**Tip:** Once you get your\
    \ `Home` button clicking problem solved, you can make your favorite accessibility\
    \ tool easier to use by configuring iOS to launch it when you triple-click the\
    \ `Home` button. Open `Settings`, tap `General`, tap `Accessibility`, and then\
    \ tap `Accessibility Shortcut` (it’s at the bottom of the screen). Tap one of\
    \ the assistive technologies — such as `VoiceOver` or `Zoom` — in the list that\
    \ appears. You can now invoke that tool by triple-clicking `Home`.\n\n### You\
    \ Find It Difficult to Unlock Your Device Using Touch ID\n\nYou learned in Chapter\
    \ [8](#A429116_1_En_8_Chapter.html), \"Protecting Your Device,\" that you can\
    \ use `Touch ID` to unlock your iOS device (see \"You Want to Unlock Your Device\
    \ with Your Fingerprint\"). In iOS 9 and earlier, you unlocked the device by resting\
    \ a digit with a saved fingerprint on the `Home` button. In iOS 10, however, you\
    \ now have to press the `Home` button with that finger. You might find that a\
    \ physical limitation makes it difficult to perform this technique.\n\n**Solution:**\
    \ You can tell iOS to allow a finger resting on the `Home` button to unlock your\
    \ device. Here are the steps to follow:\n\n1. On the Home screen, tap `Settings`\
    \ to open the `Settings` app.\n2. Tap `General` to display the `General` screen.\n\
    3. Tap `Accessibility` to display the `Accessibility` screen.\n4. Scroll down\
    \ and tap `Home Button` to display the `Home Button` screen.\n5. Tap the `Rest\
    \ Finger to Open` switch to `On`, as shown in Figure [11-8](#A429116_1_En_11_Chapter.html#Fig8).\n\
    \n    ![A429116_1_En_11_Fig8_HTML.jpg](A429116_1_En_11_Fig8_HTML.jpg)\n\n    Figure\
    \ 11-8. Tap `Rest Finger to Open` to return to unlocking your iOS device just\
    \ by resting a `Touch ID` finger on the `Home` button\n\n### You’re Getting Unwanted\
    \ Keystrokes When You Type\n\nIf you want to enter a key multiple times, you can\
    \ tap the key as many times as you need. However, when you press and hold a key,\
    \ iOS assumes you want to enter that key multiple times. iOS first accepts the\
    \ initial keystroke and then waits briefly (about half a second) to see whether\
    \ you leave the key held down. If you do, iOS accepts multiple versions of the\
    \ key until you release it.\n\nThese are useful techniques if, say, you’re using\
    \ the arrow keys to navigate a document or the `Backspace` key to delete a number\
    \ of characters. They’re decidedly not useful if you have mobility challenges\
    \ that cause you to frequently bounce your finger on a key or hold down a key\
    \ that you meant to press only once.\n\n**Solution:** If you tend to press keys\
    \ multiple times or hold keys down too long, the `Key Repeat` feature lets you\
    \ filter out the extra characters that appear in these situations.\n\nTo use this\
    \ feature, follow these steps to activate and configure it:\n\n1. On the Home\
    \ screen, tap `Settings` to open the `Settings` app.\n2. Tap `General` to display\
    \ the `General` screen.\n3. Tap `Accessibility` to display the `Accessibility`\
    \ screen.\n4. Tap `Keyboard` to display the `Keyboard` screen.\n5. Tap `Key Repeat`\
    \ to display the `Key Repeat` screen.\n6. If you don’t want iOS to repeat characters\
    \ when you press and hold a key, tap the `Key Repeat` switch to `Off`. Otherwise,\
    \ tap this switch to `On`, as shown in Figure [11-9](#A429116_1_En_11_Chapter.html#Fig9).\n\
    \n    ![A429116_1_En_11_Fig9_HTML.jpg](A429116_1_En_11_Fig9_HTML.jpg)\n\n    Figure\
    \ 11-9. Tap `Key Repeat` to `On` to configure how iOS handles repeated keystrokes\n\
    7. If `Key Repeat` is `On`, use the `Key Repeat Interval` setting to set the amount\
    \ of time that iOS waits between repeated keystrokes.\n8. If `Key Repeat` is `On`,\
    \ use the `Delay Until Repeat` setting to set the amount of time that iOS waits\
    \ after the initial keystroke to begin repeating the keystroke."
  raw: "### You Want to Use your iOS Device to Magnify Real-World Items\n\nThe Camera\
    \ app comes with a zoom feature that, by spreading your fingers on the screen,\
    \ lets you see a magnified version of the current frame. Besides being a useful\
    \ photography feature, the zoom is handy for getting a closer look at items in\
    \ the real world, such as tiny text or far-off signs. Unfortunately, the spread\
    \ gesture isn’t easy to use if you also have mobility challenges.\n\nSolution:\
    \ iOS offers a Magnifier tool that automatically launches the Camera app and activates\
    \ its zoom feature. Here are the steps to follow to enable Magnifier:\n\n1.  On\
    \ the Home screen, tap Settings to open the Settings app.  \n2.  Tap General to\
    \ display the General screen.  \n3.  Tap Accessibility to display the Accessibility\
    \ screen.  \n4.  Tap Magnifier to display the Magnifier screen.  \n5.  Tap the\
    \ Magnifier switch to On, as shown in Figure [11-6](#A429116_1_En_11_Chapter.html#Fig6).>\n\
    \n    ![A429116_1_En_11_Fig6_HTML.jpg](A429116_1_En_11_Fig6_HTML.jpg)\n\n    Figure\
    \ 11-6.\n\n    Tap the Magnifier switch to On to easily use the Camera app’s zoom\
    \ feature to get a closer look at real-world items  \n\nTip\n\nIf you find the\
    \ zoomed screen too dark or too light at times, you can configure iOS to adjust\
    \ automatically. In the Magnifier screen, tap the Auto-Brightness switch to On.\n\
    \nWith Magnifier activated, you invoke it by triple-pressing the Home button.\n\
    \n## Overcoming Physical Challenges\n\nUsing your iOS device may seem at first\
    \ blush to be more of a mental exercise. After all, you spend lots of time in\
    \ front of the screen reading things, looking at things, and thinking about things.\n\
    \nHowever, if you mapped out your device time, you’d almost certainly find that\
    \ you spend great chunks of time on physical tasks : typing, tapping, double-tapping,\
    \ and all the gestures – swiping, sliding, pinching, spreading, and so on – that\
    \ are needed to make your device do your bidding.\n\nThis surprisingly physical\
    \ side of iOS means that if you have physical challenges of your own, you may\
    \ find it hard to perform certain tasks (and a few may be pretty much impossible).\
    \ Fortunately, it doesn’t have to be that way. iOS has quite a few settings and\
    \ tools that either make using your device less of a burden or that enable you\
    \ to work around any problems you might encounter.\n\n### Double-Clicking the\
    \ Home Button Doesn’t Display the Multitasking Screen\n\nYou switch between apps\
    \ in iOS by double-clicking the Home button to open the multitasking screen, swiping\
    \ until the app you want to switch to comes into view, and then tapping the app.\
    \ Switching between apps is much more difficult if you can’t access the multitasking\
    \ screen.\n\nSolution: If double-clicking the Home button doesn’t display the\
    \ multitasking screen, you might be taking too long between each press, so try\
    \ a faster double-click.\n\nIf that’s a persistent problem for you, you can slow\
    \ down the Home-click speed. Here are the steps to follow:\n\n1.  On the Home\
    \ screen, tap Settings to open the Settings app.  \n2.  Tap General to display\
    \ the General screen.  \n3.  Tap Accessibility to display the Accessibility screen.\
    \  \n4.  Tap Home Button to display the Home Button screen.  \n5.  Tap Slow, as\
    \ shown in Figure [11-7](#A429116_1_En_11_Chapter.html#Fig7). iOS flashes the\
    \ Slow option and vibrates the device at the new Home-click speed.\n\n    ![A429116_1_En_11_Fig7_HTML.jpg](A429116_1_En_11_Fig7_HTML.jpg)\n\
    \n    Figure 11-7.\n\n    If you’re having trouble getting iOS to recognize Home\
    \ button double-clicks, try the Slow speed  \n6.  If you find that speed still\
    \ causes problems, try using the Slowest speed, instead.  \n\nTip\n\nOnce you\
    \ get your Home button clicking problem solved, you can make your favorite accessibility\
    \ tool easier to use by configuring iOS to launch it when you triple-click the\
    \ Home button. Open Settings, tap General, tap Accessibility, and then tap Accessibility\
    \ Shortcut (it’s at the bottom of the screen). Tap one of the assistive technologies\
    \ — such as VoiceOver or Zoom — in the list that appears. You can now invoke that\
    \ tool by triple-clicking Home.\n\n### You Find It Difficult to Unlock Your Device\
    \ Using Touch ID\n\nYou learned in Chapter [8](#A429116_1_En_8_Chapter.html),\
    \ \"Protecting Your Device,\" that you can use Touch ID to unlock your iOS device\
    \ (see \"You Want to Unlock Your Device with Your Fingerprint\"). In iOS 9 and\
    \ earlier, you unlocked the device by resting a digit with a saved fingerprint\
    \ on the Home button. In iOS 10, however, you now have to press the Home button\
    \ with that finger. You might find that a physical limitation makes it difficult\
    \ to perform this technique.\n\nSolution: You can tell iOS to allow a finger resting\
    \ on the Home button to unlock your device. Here are the steps to follow:\n\n\
    1.  On the Home screen, tap Settings to open the Settings app.  \n2.  Tap General\
    \ to display the General screen.  \n3.  Tap Accessibility to display the Accessibility\
    \ screen.  \n4.  Scroll down and tap Home Button to display the Home Button screen.\
    \  \n5.  Tap the Rest Finger to Open switch to On, as shown in Figure [11-8](#A429116_1_En_11_Chapter.html#Fig8).\n\
    \n    ![A429116_1_En_11_Fig8_HTML.jpg](A429116_1_En_11_Fig8_HTML.jpg)\n\n    Figure\
    \ 11-8.\n\n    Tap Rest Finger to Open to return to unlocking your iOS device\
    \ just by resting a Touch ID finger on the Home button\n\n### You’re Getting Unwanted\
    \ Keystrokes When You Type\n\nIf you want to enter a key multiple times, you can\
    \ tap the key as many times as you need. However, when you press and hold a key,\
    \ iOS assumes you want to enter that key multiple times. iOS first accepts the\
    \ initial keystroke and then waits briefly (about half a second) to see whether\
    \ you leave the key held down. If you do, iOS accepts multiple versions of the\
    \ key until you release it.\n\nThese are useful techniques if, say, you’re using\
    \ the arrow keys to navigate a document or the Backspace key to delete a number\
    \ of characters. They’re decidedly not useful if you have mobility challenges\
    \ that cause you to frequently bounce your finger on a key or hold down a key\
    \ that you meant to press only once.\n\nSolution: If you tend to press keys multiple\
    \ times or hold keys down too long, the Key Repeat feature lets you filter out\
    \ the extra characters that appear in these situations.\n\nTo use this feature,\
    \ follow these steps to activate and configure it:\n\n1.  On the Home screen,\
    \ tap Settings to open the Settings app.  \n2.  Tap General to display the General\
    \ screen.  \n3.  Tap Accessibility to display the Accessibility screen.  \n4.\
    \  Tap Keyboard to display the Keyboard screen.  \n5.  Tap Key Repeat to display\
    \ the Key Repeat screen.  \n6.  If you don’t want iOS to repeat characters when\
    \ you press and hold a key, tap the Key Repeat switch to Off. Otherwise, tap this\
    \ switch to On, as shown in Figure [11-9](#A429116_1_En_11_Chapter.html#Fig9).\n\
    \n    ![A429116_1_En_11_Fig9_HTML.jpg](A429116_1_En_11_Fig9_HTML.jpg)\n\n    Figure\
    \ 11-9.\n\n    Tap Key Repeat Finger to Open to return to unlocking your iOS device\
    \ just by resting a Touch ID finger on the Home button  \n7.  If Key Repeat is\
    \ On, use the Key Repeat Interval setting to set the amount of time that iOS waits\
    \ between repeated keystrokes.  \n8.  If Key Repeat is On, use the Delay Until\
    \ Repeat setting to set the amount of time that iOS waits after the initial keystroke\
    \ to begin repeating the keystroke."
  trans: "\n# 你想用 iOS 设备放大现实世界中的物品\n\n`相机` App 自带一个缩放功能，通过在屏幕上张开手指，你可以看到当前画面的放大版本。除了作为一个有用的摄影功能外，该缩放功能也便于更仔细地查看现实世界中的物品，比如微小的文字或远处的标志。不幸的是，如果你同时有行动障碍，这个张手手势并不容易使用。\n\
    \n**解决方案：** iOS 提供了一个`放大器`工具，它可以自动启动`相机` App 并激活其缩放功能。以下是启用`放大器`需要遵循的步骤：\n\n1.\
    \  在主屏幕上，轻点`设置`以打开`设置` App。\n2.  轻点`通用`以显示`通用`屏幕。\n3.  轻点`辅助功能`以显示`辅助功能`屏幕。\n\
    4.  轻点`放大器`以显示`放大器`屏幕。\n5.  将`放大器`开关轻点至`打开`，如图 11-6 所示。\n\n    ![A429116_1_En_11_Fig6_HTML.jpg](img/A429116_1_En_11_Fig6_HTML.jpg)\n\
    \n    图 11-6. 将`放大器`开关轻点至`打开`，以便轻松使用`相机` App 的缩放功能来更仔细地查看现实世界中的物品\n\n**提示：** 如果有时你觉得缩放后的屏幕太暗或太亮，你可以配置\
    \ iOS 让其自动调整。在`放大器`屏幕中，将`自动亮度`开关轻点至`打开`。\n\n激活`放大器`后，你可以通过三次按下`主屏幕按钮`来调用它。\n\n\
    ## 克服身体挑战\n\n使用你的 iOS 设备乍一看似乎更像是一种脑力活动。毕竟，你花大量时间在屏幕前阅读、查看和思考。\n\n然而，如果你仔细规划一下你的设备使用时间，你几乎肯定会发现你花了大把时间在体力任务上：打字、轻点、双击，以及所有手势——滑动、拖移、捏合、张合等等——这些操作都是让你的设备按你指令行事所必需的。\n\
    \niOS 这个出人意料的体力操作特性意味着，如果你自身有身体挑战，你可能会发现执行某些任务很困难（而且有些任务可能几乎不可能完成）。幸运的是，不一定非得这样。iOS\
    \ 有不少设置和工具，要么能减轻你使用设备的负担，要么能让你绕过可能遇到的任何问题。\n\n### 双击主屏幕按钮不显示多任务屏幕\n\n在 iOS 中切换\
    \ App 需要双击`主屏幕按钮`打开多任务屏幕，滑动直到你想要切换到的 App 出现在视野中，然后轻点该 App。如果你无法访问多任务屏幕，那么切换 App\
    \ 会变得非常困难。\n\n**解决方案：** 如果双击`主屏幕按钮`没有显示多任务屏幕，可能是因为你两次按压之间的间隔太长，所以尝试更快地双击。\n\n\
    如果这对你来说是一个持续存在的问题，你可以降低主屏幕按钮点击速度。以下是需要遵循的步骤：\n\n1.  在主屏幕上，轻点`设置`以打开`设置` App。\n\
    2.  轻点`通用`以显示`通用`屏幕。\n3.  轻点`辅助功能`以显示`辅助功能`屏幕。\n4.  轻点`主屏幕按钮`以显示`主屏幕按钮`屏幕。\n5.\
    \  轻点`慢速`，如图 11-7 所示。iOS 会闪烁`慢速`选项，并在新的主屏幕按钮点击速度下震动设备。\n\n    ![A429116_1_En_11_Fig7_HTML.jpg](img/A429116_1_En_11_Fig7_HTML.jpg)\n\
    \n    图 11-7. 如果让 iOS 识别`主屏幕按钮`双击有困难，请尝试`慢速`\n6.  如果你觉得那个速度仍然有问题，试着改用`最慢速`。\n\n\
    **提示：** 一旦你解决了`主屏幕按钮`点击问题，你可以配置 iOS 在三次按下`主屏幕按钮`时启动你常用的辅助功能，使其更易于使用。打开`设置`，轻点`通用`，轻点`辅助功能`，然后轻点`辅助功能快捷键`（它在屏幕底部）。在出现的列表中，轻点一种辅助技术——比如`旁白`或`缩放`。现在，你可以通过三次按下`主屏幕按钮`来调用该工具。\n\
    \n### 你发现使用触控 ID 解锁设备很困难\n\n你在第 8 章“保护你的设备”中了解到，你可以使用`触控 ID`来解锁你的 iOS 设备（参见“你想用指纹解锁设备”）。在\
    \ iOS 9 及更早版本中，你将存有已保存指纹的手指放在`主屏幕按钮`上即可解锁设备。然而，在 iOS 10 中，你现在必须用那个手指按下`主屏幕按钮`。你可能会发现身体限制使得执行这个操作很困难。\n\
    \n**解决方案：** 你可以让 iOS 允许手指轻放在`主屏幕按钮`上即可解锁设备。以下是需要遵循的步骤：\n\n1.  在主屏幕上，轻点`设置`以打开`设置`\
    \ App。\n2.  轻点`通用`以显示`通用`屏幕。\n3.  轻点`辅助功能`以显示`辅助功能`屏幕。\n4.  向下滚动并轻点`主屏幕按钮`以显示`主屏幕按钮`屏幕。\n\
    5.  将`手指轻触打开`开关轻点至`打开`，如图 11-8 所示。\n\n    ![A429116_1_En_11_Fig8_HTML.jpg](img/A429116_1_En_11_Fig8_HTML.jpg)\n\
    \n    图 11-8. 轻点`手指轻触打开`，恢复到只需将注册了`触控 ID`的手指放在`主屏幕按钮`上即可解锁 iOS 设备的模式\n\n### 你打字时会出现不必要的按键\n\
    \n如果你想多次输入同一个键，你可以根据需要多次轻点该键。但是，当你按住一个键时，iOS 会假设你想要多次输入该键。iOS 首先接受最初的按键，然后短暂等待（大约半秒钟），看你是否继续保持按键按下状态。如果你继续按住，iOS\
    \ 就会接受该键的多次输入，直到你松开为止。\n\n如果你正在使用方向键浏览文档，或者使用`退格键`删除多个字符，这些技术都很有用。如果你有行动障碍，导致你的手指经常在键上弹跳或按住你本打算只按一次的键，那么这些技术绝对没有用处。\n\
    \n**解决方案：** 如果你倾向于多次按下按键或按键时间过长，`按键重复`功能可以帮你过滤掉在这些情况下出现的多余字符。\n\n要使用此功能，请按照以下步骤激活并配置它：\n\
    \n1.  在主屏幕上，轻点`设置`以打开`设置` App。\n2.  轻点`通用`以显示`通用`屏幕。\n3.  轻点`辅助功能`以显示`辅助功能`屏幕。\n\
    4.  轻点`键盘`以显示`键盘`屏幕。\n5.  轻点`按键重复`以显示`按键重复`屏幕。\n6.  如果你不希望 iOS 在你按住一个键时重复字符，请将`按键重复`开关轻点至`关闭`。否则，将此开关轻点至`打开`，如图\
    \ 11-9 所示。\n\n    ![A429116_1_En_11_Fig9_HTML.jpg](img/A429116_1_En_11_Fig9_HTML.jpg)\n\
    \n    图 11-9. 将`按键重复`轻点至`打开`，以配置 iOS 如何处理重复按键\n7.  如果`按键重复`是`打开`状态，使用`按键重复间隔`设置来设定\
    \ iOS 在重复按键之间等待的时间。\n8.  如果`按键重复`是`打开`状态，使用`重复前延迟`设置来设定 iOS 在初次按键后、开始重复按键之前的等待时间。\n"
- fmt: "# iOS Sometimes Misinterprets or Does Not Recognize Your Taps\n\nThe touchscreen\
    \ on your iOS device is a marvel of modern electronics: sensitive, versatile,\
    \ and powerful. It’s hard to imagine using iOS without it, so perhaps that’s why\
    \ touchscreen problems are so frustrating. If you find it difficult to control\
    \ your hands, or if your dexterity isn’t what it used to be, then you might run\
    \ up against one or more of the following touchscreen troubles:\n\n- If you tend\
    \ to keep your tapping finger on the screen a bit too long, iOS interprets the\
    \ gesture as a tap-and-hold rather than a simple tap.\n- If you tend to bounce\
    \ your tapping finger on the screen, iOS interprets the gesture as multiple taps\
    \ rather than a single tap.\n- If you tend to move your tapping finger along the\
    \ screen, iOS interprets the gesture as a slide or swipe rather than a tap.\n\n\
    **Solution:** iOS comes with several so-called touch accommodations that you can\
    \ activate and adjust as needed to get your taps recognized and/or interpreted\
    \ correctly. Follow these steps:\n\n1. On the `Home` screen, tap `Settings` to\
    \ open the `Settings` app.\n2. Tap `General` to display the `General` screen.\n\
    3. Tap `Accessibility` to display the `Accessibility` screen.\n4. Tap `Touch Accommodations`\
    \ to display the `Touch Accommodations` screen.\n5. If you tend to keep your tapping\
    \ finger on the screen too long, tap the `Hold Duration` switch to `On`, as shown\
    \ in Figure [11-10](#A429116_1_En_11_Chapter.html#Fig10), and then use the `Seconds`\
    \ setting to specify how long iOS should allow you to hold the screen before it\
    \ assumes you’re performing a tap-and-hold gesture.\n\n![A429116_1_En_11_Fig10_HTML.jpg](A429116_1_En_11_Fig10_HTML.jpg)\n\
    \n*Figure 11-10.* Tap `Hold Duration` to `On` to prevent long presses from being\
    \ interpreted as tap-and-holds\n\n6. If you tend to bounce your tapping finger\
    \ on the screen, tap the `Ignore Repeat` switch to `On`, and then use the `Seconds`\
    \ setting to specify how long iOS should wait before it interprets the gesture\
    \ as multiple taps rather than a single tap.\n7. If you tend to move your tapping\
    \ finger along the screen, tell iOS to interpret the gesture as a tap rather than\
    \ a slide by tapping one of the following in the `Tap Assistance` section:\n \
    \   - `Use Initial Touch Location`. Tap this setting to use the position where\
    \ your tapping finger first touches the screen as the tap location.\n    - `Use\
    \ Final Touch Location`. Tap this setting to use the position where your tapping\
    \ finger stops or leaves the screen as the tap location.\n\n## Surmounting Hearing\
    \ Challenges\n\nIf your hearing has deteriorated over the years, or if you have\
    \ a hearing impairment in one or both ears, detecting device sounds and enjoying\
    \ music and movies can be a challenge. Fortunately, help is at hand. iOS has a\
    \ few settings and tools that you can configure to help or work around your hearing\
    \ issues.\n\n### Headphone Sounds Are Unbalanced\n\nSometimes, hearing troubles\
    \ in one ear are particularly bad. Adjusting the device volume is problematic\
    \ in these cases, because turning up the sound enough to hear things in your bad\
    \ ear can make those sounds too loud in your other ear.\n\n**Solution:** iOS can\
    \ help by enabling you to balance the sound in each ear. That is, you can turn\
    \ up the sound for your bad ear and/or turn down the sound for your good ear.\n\
    \nHere are the steps to follow:\n\n1. On the `Home` screen, tap `Settings` to\
    \ open the `Settings` app.\n2. Tap `General` to display the `General` screen.\n\
    3. Tap `Accessibility` to display the `Accessibility` screen.\n4. Under the `Hearing`\
    \ section, use the slider shown in Figure [11-11](#A429116_1_En_11_Chapter.html#Fig11)\
    \ to adjust the balance between the left and right channels.\n\n![A429116_1_En_11_Fig11_HTML.jpg](A429116_1_En_11_Fig11_HTML.jpg)\n\
    \n*Figure 11-11.* To compensate for poor hearing in one ear, use this slider to\
    \ adjust the audio balance between the left and right channels\n\n### You Can’t\
    \ Hear Alerts\n\nWhen iOS displays a notification for a text message or incoming\
    \ email message, it often displays a banner for a few seconds and plays a sound.\
    \ If you’re not near your device to see the banner, and if your hearing is impaired,\
    \ then you might easily miss the alert.\n\n**Solution:** On your iPhone (this\
    \ feature isn’t available on other iOS devices), you can tell iOS to flash the\
    \ camera’s LED light a few times, which gives you a visual signal that an alert\
    \ has occurred.\n\nFollow these steps to set this up:\n\n1. On the `Home` screen,\
    \ tap `Settings` to open the `Settings` app.\n2. Tap `General` to display the\
    \ `General` screen.\n3. Tap `Accessibility` to display the `Accessibility` screen.\n\
    4. In the `Hearing` section, tap `LED Flash for Alerts`.\n5. Tap the `LED Flash\
    \ for Alerts` switch to `On`, as shown in Figure [11-12](#A429116_1_En_11_Chapter.html#Fig12).\n\
    \n![A429116_1_En_11_Fig12_HTML.jpg](A429116_1_En_11_Fig12_HTML.jpg)\n\n*Figure\
    \ 11-12.* Tap `LED Flash for Alerts` to `On` to have iOS flash the camera’s LED\
    \ light when an alert comes in\n\n6. If you also want iOS to flash the LED even\
    \ when you have the `Ring/Silent` switch set to `Silent`, tap the `Flash on Silent`\
    \ switch to `On`.\n\n# Troubleshooting Other iOS Problems\n\nSo far in this book\
    \ you have learned not only a number of general problem-solving techniques, but\
    \ also how to troubleshoot and work around a wide variety of issues. To make it\
    \ easier to find these problems (or, in many cases, to prevent problems before\
    \ they happen), these issues have been focused and grouped according to specific\
    \ topic areas. These have included cellular, Wi-Fi, apps, web browsing, email,\
    \ phone calls, cameras, photos, device protection, privacy, the battery, and accessibility.\
    \ That's a wide-ranging list, but there are plenty of iOS troubles that don't\
    \ fit into any of these categories.\n\nThe purpose of this chapter is to gather\
    \ together a selection of the most common of these miscellaneous problems, annoyances,\
    \ and head-scratchers, and to provide solutions and workarounds to complete your\
    \ iOS troubleshooting education.\n\n## Troubleshooting Miscellaneous Problems\n\
    \nI'll begin this chapter with a look at a few miscellaneous problems that can\
    \ make your iOS device easier to use and more efficient.\n\n### You Find It Difficult\
    \ to Reach Items at the Top of the iPhone Screen\n\nThe large height of the iPhone\
    \ 6, 6s, and 7 (not to mention their even bigger Plus versions) means that even\
    \ people with average-size hands can find it quite a stretch to reach items at\
    \ or near the top of the screen when they're using the device one-handed.\n\n\
    **Solution:** Double-tap the `Home` button, by which I mean you lightly tap the\
    \ button rather than firmly pressing it. This slides the current screen's contents\
    \ down about half way, making it much easier to access those items at top, especially\
    \ when you're using the phone one-handed. To push the screen back up, either double-tap\
    \ the `Home` button once again or tap in the blank area above the screen contents\
    \ (you can also wait about eight seconds and the screen will restore itself automatically)."
  raw: "### iOS Sometimes Misinterprets or Does Not Recognize Your Taps\n\nThe touchscreen\
    \ on your iOS device is a marvel of modern electronics: sensitive, versatile,\
    \ and powerful. It’s hard to imagine using iOS without it, so perhaps that’s why\
    \ touchscreen problems are so frustrating. If you find it difficult to control\
    \ your hands, or if your dexterity isn’t what it used to be, then you might run\
    \ up against one or more of the following touchscreen troubles:\n\n*   If you\
    \ tend to keep your tapping finger on the screen a bit too long, iOS interprets\
    \ the gesture as a tap-and-hold rather than a simple tap.\n*   If you tend to\
    \ bounce your tapping finger on the screen, iOS interprets the gesture as multiple\
    \ taps rather than a single tap.\n*   If you tend to move your tapping finger\
    \ along the screen, iOS interprets the gesture as a slide or swipe rather than\
    \ a tap.\n\nSolution: iOS comes with several so-called touch accommodations that\
    \ you can activate and adjust as needed to get your taps recognized and/or interpreted\
    \ correctly. Follow these steps:\n\n1.  On the Home screen, tap Settings to open\
    \ the Settings app.  \n2.  Tap General to display the General screen.  \n3.  Tap\
    \ Accessibility to display the Accessibility screen.  \n4.  Tap Touch Accommodations\
    \ Keys to display the Touch Accommodations screen.  \n5.  If you tend to keep\
    \ your tapping finger on the screen too long, tap the Hold Duration switch to\
    \ On, as shown in Figure [11-10](#A429116_1_En_11_Chapter.html#Fig10), and then\
    \ use the Seconds setting to specify how long iOS should allow you to hold the\
    \ screen before it assumes you’re performing a tap-and-hold gesture.\n\n    ![A429116_1_En_11_Fig10_HTML.jpg](A429116_1_En_11_Fig10_HTML.jpg)\n\
    \n    Figure 11-10.\n\n    Tap Hold Duration to On to prevent long presses from\
    \ being interpreted as tap-and-holds  \n6.  If you tend to bounce your tapping\
    \ finger on the screen, tap the Ignore Repeat switch to On, and then use the Seconds\
    \ setting to specify how long iOS should wait before it interprets the gesture\
    \ as multiple taps rather than a single tap.  \n7.  If you tend to move your tapping\
    \ finger along the screen, tell iOS to interpret the gesture as a tap rather than\
    \ a slide by tapping one of the following in the Tap Assistance section:\n   \
    \ *   Use Initial Touch Location. Tap this setting to use the position where your\
    \ tapping finger first touches the screen as the tap location.\n    *   Use Final\
    \ Touch Location. Tap this setting to use the position where your tapping finger\
    \ stops or leaves the screen as the tap location.\n\n## Surmounting Hearing Challenges\n\
    \nIf your hearing has deteriorated over the years, or if you have a hearing impairment\
    \ in one or both ears, detecting device sounds and enjoying music and movies can\
    \ be a challenge. Fortunately, help is at hand. iOS has a few settings and tools\
    \ that you can configure to help or work around your hearing issues.\n\n### Headphone\
    \ Sounds Are Unbalanced\n\nSometimes, hearing troubles in one ear are particularly\
    \ bad. Adjusting the device volume is problematic in these cases, because turning\
    \ up the sound enough to hear things in your bad ear can make those sounds too\
    \ loud in your other ear.\n\nSolution: iOS can help by enabling you to balance\
    \ the sound in each ear. That is, you can turn up the sound for your bad ear and/or\
    \ turn down the sound for your good ear.\n\nHere are the steps to follow:\n\n\
    1.  On the Home screen, tap Settings to open the Settings app.  \n2.  Tap General\
    \ to display the General screen.  \n3.  Tap Accessibility to display the Accessibility\
    \ screen.  \n4.  Under the Hearing section, use the slider shown in Figure [11-11](#A429116_1_En_11_Chapter.html#Fig11)\
    \ to adjust the balance between the left and right channels.\n\n    ![A429116_1_En_11_Fig11_HTML.jpg](A429116_1_En_11_Fig11_HTML.jpg)\n\
    \n    Figure 11-11.\n\n    To compensate for poor hearing in one ear, use this\
    \ slider to adjust the audio balance between the left and right channels\n\n###\
    \ You Can’t Hear Alerts\n\nWhen iOS displays a notification for a text message\
    \ or incoming email message, it often displays a banner for a few seconds and\
    \ plays a sound. If you’re not near your device to see the banner, and if your\
    \ hearing is impaired, then you might easily miss the alert.\n\nSolution: On your\
    \ iPhone (this feature isn’t available on other iOS devices), you can tell iOS\
    \ to flash the camera’s LED light a few times, which gives you a visual signal\
    \ that an alert has occurred.\n\nFollow these steps to set this up:\n\n1.  On\
    \ the Home screen, tap Settings to open the Settings app.  \n2.  Tap General to\
    \ display the General screen.  \n3.  Tap Accessibility to display the Accessibility\
    \ screen.  \n4.  In the Hearing section, tap LED Flash for Alerts.  \n5.  Tap\
    \ the LED Flash for Alerts switch to On, as shown in Figure [11-12](#A429116_1_En_11_Chapter.html#Fig12).\n\
    \n    ![A429116_1_En_11_Fig12_HTML.jpg](A429116_1_En_11_Fig12_HTML.jpg)\n\n  \
    \  Figure 11-12.\n\n    Tap LED Flash for Alerts to On to have iOS flash the camera’s\
    \ LED light when an alert comes in  \n6.  If you also want iOS to flash the LED\
    \ even when you have the Ring/Silent switch set to Silent, tap the Flash on Silent\
    \ switch to On.\n\n# 12. Troubleshooting Other iOS Problems\n\nSo far in this\
    \ book you have learned not only a number of general problem-solving techniques,\
    \ but also how to troubleshoot and work around a wide variety of issues. To make\
    \ it easier to find these problems (or, in many cases, to prevent problems before\
    \ they happen), these issues have been focused and grouped according to specific\
    \ topic areas. These have included cellular, Wi-Fi, apps, web browsing, email,\
    \ phone calls, cameras, photos, device protection, privacy, the battery, and accessibility.\
    \ That's a wide-ranging list, but there are plenty of iOS troubles that don't\
    \ it fit into any of these categories.\n\nThe purpose of this chapter is to gather\
    \ together a selection of the most common of these miscellaneous problems, annoyances,\
    \ and head-scratchers, and to provide solution and workarounds to complete your\
    \ iOS troubleshooting education.\n\n## Troubleshooting Miscellaneous Problems\n\
    \nI'll begin this chapter with a look at a few miscellaneous problems that can\
    \ make your iOS device easier to use and more efficient.\n\n### You Find It Difficult\
    \ to Reach Items at the Top of the iPhone Screen\n\nThe large height of the iPhone\
    \ 6, 6s, and 7 (not to mention their even bigger Plus versions) means that even\
    \ people with average-size hands can find it quite a stretch to reach items at\
    \ or near the top of the screen when they're using the device one-handed.\n\n\
    Solution: Double-tap the Home button, by which I mean you lightly tap the button\
    \ rather than firmly pressing it. This slides the current screen's contents down\
    \ about half way, making it much easier to access those items at top, especially\
    \ when you're using the phone one-handed. To push the screen back up, either double-tap\
    \ the Home button once again or tap in the blank area above the screen contents\
    \ (you can also wait about eight seconds and the screen will restore itself automatically)."
  trans: "\n# iOS 有时会误解或无法识别您的轻点操作\n\niOS 设备上的触摸屏是现代电子技术的奇迹：灵敏、多功能且强大。很难想象没有它如何使用\
    \ iOS，因此触摸屏问题如此令人沮丧也就不足为奇了。如果您觉得难以控制手指，或者您的灵活度不如从前，那么您可能会遇到以下一种或多种触摸屏问题：\n\n-\
    \   如果您倾向于在屏幕上按住手指稍长时间，iOS 会将此手势解释为长按而非简单轻点。\n-   如果您倾向于在屏幕上让手指弹跳，iOS 会将此手势解释为多次轻点而非单次轻点。\n\
    -   如果您倾向于让手指在屏幕上移动，iOS 会将此手势解释为滑动而非轻点。\n\n**解决方案：** iOS 提供了几种所谓的“触控调节”功能，您可以根据需要激活和调整这些功能，以使您的轻点操作被正确识别和/或解释。请按照以下步骤操作：\n\
    \n1.  在“`主屏幕`”上，轻点“`设置`”以打开“`设置`”应用。\n2.  轻点“`通用`”以显示“`通用`”屏幕。\n3.  轻点“`辅助功能`”以显示“`辅助功能`”屏幕。\n\
    4.  轻点“`触控调节`”以显示“`触控调节`”屏幕。\n5.  如果您倾向于在屏幕上按住手指时间过长，请将“`按住持续时间`”开关轻点至“`开启`”，如图\
    \ 11-10 所示，然后使用“`秒`”设置来指定 iOS 在认定您正在执行长按手势之前，允许您按住屏幕的时间长度。\n\n![A429116_1_En_11_Fig10_HTML.jpg](img/A429116_1_En_11_Fig10_HTML.jpg)\n\
    \n*图 11-10.* 将“`按住持续时间`”轻点至“`开启`”，以防止长按被解释为长按手势\n\n6.  如果您倾向于在屏幕上让手指弹跳，请将“`忽略重复`”开关轻点至“`开启`”，然后使用“`秒`”设置来指定\
    \ iOS 在将此手势解释为多次轻点（而非单次轻点）之前应等待的时间。\n7.  如果您倾向于让手指在屏幕上移动，请通过在“`轻点辅助`”部分轻点以下选项之一，告知\
    \ iOS 将此手势解释为轻点而非滑动：\n    -   `使用初始触控位置`。轻点此设置以使用您的轻点手指首次接触屏幕的位置作为轻点位置。\n    -\
    \   `使用最终触控位置`。轻点此设置以使用您的轻点手指停止或离开屏幕的位置作为轻点位置。\n\n## 克服听觉挑战\n\n如果您多年来听力下降，或者您的一只或两只耳朵有听力障碍，那么检测设备声音以及欣赏音乐和电影可能会成为一项挑战。幸运的是，有现成的帮助。iOS\
    \ 提供了一些设置和工具，您可以对其进行配置以帮助或规避您的听力问题。\n\n### 耳机声音不平衡\n\n有时，一只耳朵的听力问题特别严重。在这些情况下，调整设备音量会很麻烦，因为将音量调高到足以让听力较差的耳朵听清时，可能会使另一只耳朵听到的声音过大。\n\
    \n**解决方案：** iOS 可以通过让您平衡每只耳朵的音量来提供帮助。也就是说，您可以调高听力较差耳朵的音量和/或调低听力较好耳朵的音量。\n\n以下是需要遵循的步骤：\n\
    \n1.  在“`主屏幕`”上，轻点“`设置`”以打开“`设置`”应用。\n2.  轻点“`通用`”以显示“`通用`”屏幕。\n3.  轻点“`辅助功能`”以显示“`辅助功能`”屏幕。\n\
    4.  在“`听觉`”部分下，使用图 11-11 中所示的滑块来调节左右声道之间的平衡。\n\n![A429116_1_En_11_Fig11_HTML.jpg](img/A429116_1_En_11_Fig11_HTML.jpg)\n\
    \n*图 11-11.* 要补偿一只耳朵的听力不佳，请使用此滑块调节左右声道之间的音频平衡\n\n### 您听不到提醒\n\n当 iOS 显示短信或电子邮件通知时，通常会显示一条横幅几秒钟并播放声音。如果您离设备较远看不到横幅，并且您的听力受损，那么您可能很容易错过提醒。\n\
    \n**解决方案：** 在您的 iPhone 上（此功能在其他 iOS 设备上不可用），您可以告诉 iOS 让摄像头 LED 灯闪烁几次，这为您提供了发生提醒的视觉信号。\n\
    \n请按照以下步骤进行设置：\n\n1.  在“`主屏幕`”上，轻点“`设置`”以打开“`设置`”应用。\n2.  轻点“`通用`”以显示“`通用`”屏幕。\n\
    3.  轻点“`辅助功能`”以显示“`辅助功能`”屏幕。\n4.  在“`听觉`”部分，轻点“`LED 闪烁以示提醒`”。\n5.  将“`LED 闪烁以示提醒`”开关轻点至“`开启`”，如图\
    \ 11-12 所示。\n\n![A429116_1_En_11_Fig12_HTML.jpg](img/A429116_1_En_11_Fig12_HTML.jpg)\n\
    \n*图 11-12.* 将“`LED 闪烁以示提醒`”轻点至“`开启`”，以便在有提醒时让 iOS 闪烁摄像头 LED 灯\n\n6.  如果您还希望即使在将“`响铃/静音`”开关设置为“`静音`”时\
    \ iOS 也能闪烁 LED，请将“`静音时闪烁`”开关轻点至“`开启`”。\n\n# 排查其他 iOS 问题\n\n到目前为止，在本书中您不仅学习了许多通用的解决问题的技巧，还学习了如何排查和解决各种问题。为了更容易找到这些问题（或者，在许多情况下，在问题发生前预防它们），这些问题已根据特定的主题领域进行了分类和分组。这些领域包括蜂窝网络、无线局域网、应用、网页浏览、电子邮件、电话、相机、照片、设备保护、隐私、电池和辅助功能。这是一个范围广泛的列表，但还有很多\
    \ iOS 问题不属于这些类别。\n\n本章的目的是汇集一系列最常见的不属于上述分类的问题、烦恼和令人困惑的情况，并提供解决方案和变通方法，以完成您的 iOS\
    \ 故障排除学习。\n\n## 排查杂项问题\n\n我将从探讨几个能让您的 iOS 设备更易用、更高效的杂项问题开始本章。\n\n### 您发现很难触及 iPhone\
    \ 屏幕顶部的项目\n\niPhone 6、6s 和 7 的大高度（更不用说它们更大的 Plus 版本了）意味着即使是手型一般的人，在单手使用设备时，也会觉得触及屏幕顶部或靠近顶部的项目相当费力。\n\
    \n**解决方案：** 双击“`主屏幕`”按钮，我指的是轻轻点击按钮而不是用力按下它。这会将当前屏幕的内容向下滑动大约一半，使得更容易触及顶部的项目，尤其是在单手使用手机时。要将屏幕推回原位，请再次双击“`主屏幕`”按钮，或点击屏幕内容上方的空白区域（您也可以等待大约八秒钟，屏幕将自动恢复原状）。\n"
- fmt: "# Double-Tapping the Home Button Doesn’t Do Anything\n\nIn the previous section\
    \ you learned that you can reach items at the top of the big iPhone 6 (and later)\
    \ screen by double-tapping the `Home` button. However, you might find that this\
    \ technique doesn’t work for you.\n\n**Solution:** Here are a few troubleshooting\
    \ techniques to try:\n\n- Remember that this feature is only available on the\
    \ iPhone, not the iPad or iPod touch. And, as of this writing, the only iPhone\
    \ models that support this feature are the 6, 6 Plus, 6s, 6s Plus, 7, and 7 Plus.\n\
    - If you see the multitasking screen (that is, the screen that shows all your\
    \ running or recently run apps), it means you’re double-clicking the `Home` button\
    \ rather than double-tapping it. Two light taps are all you need.\n- This feature\
    \ is called `Reachability` and it’s an accessibility setting. If it doesn’t work\
    \ for you, it might mean that the setting has been turned off. To check, follow\
    \ these steps:\n\n1. On the Home screen, tap `Settings` to open the `Settings`\
    \ app.\n2. Tap `General` to open the `General` screen.\n3. Tap `Accessibility`\
    \ to open the `Accessibility` screen.\n4. Tap the `Reachability` switch to `On`,\
    \ as shown in Figure [12-1](#A429116_1_En_12_Chapter.html#Fig1).\n\n    ![A429116_1_En_12_Fig1_HTML.jpg](A429116_1_En_12_Fig1_HTML.jpg)\n\
    \n    **Figure 12-1.** Make sure the `Reachability` setting is `On` to enable\
    \ Home button double-tapping.\n\n# Your iOS Device Disturbs You at Inconvenient\
    \ Times\n\nIf you’re in a meeting, at a movie, or going to sleep, you don’t want\
    \ your iOS device disturbing the peace with incoming phone calls or alerts. Most\
    \ people handle this by activating `Airplane` mode, which turns off all the antennas\
    \ on the device. That ensures you’re distraction free for a while, but it suffers\
    \ from a major drawback: Without any working antennas, your device can’t communicate\
    \ with the world, so it doesn’t download messages or perform any other online\
    \ activities. That might be what you want, but it’s less than optimum if you’re\
    \ expecting something important. Plus, you have to remember to activate `Airplane`\
    \ mode, something you can’t always do when you’re busy.\n\n**Solution:** Configure\
    \ `Do Not Disturb` mode, which silences all device distractions – including `Notification\
    \ Center` alerts and phone calls – but keeps your device online so that it can\
    \ continue to receive data. That way, when you’re ready to get back to the action,\
    \ all your new data is already on your device, so you can get back up to speed\
    \ quickly.\n\nTo activate `Do Not Disturb`, open `Settings`, tap `Do Not Disturb`,\
    \ and then tap the `Manual` switch to `On`.\n\nYou can get the most out of `Do\
    \ Not Disturb` by configuring it to suit the way you work. Here are the steps\
    \ to follow:\n\n1. On the Home screen, tap `Settings` to open the `Settings` app.\n\
    2. Tap `Do Not Disturb` to display the `Do Not Disturb` screen.\n3. To set a time\
    \ to automatically activate and deactivate `Do Not Disturb`, tap the `Scheduled`\
    \ switch to `On`, as shown in Figure [12-2](#A429116_1_En_12_Chapter.html#Fig2).\
    \ You then tap the `From/To` control; use `From` to set the start time and use\
    \ `To` to set the end time, then tap `Back` to return to the `Do Not Disturb`\
    \ screen.\n\n    ![A429116_1_En_12_Fig2_HTML.jpg](A429116_1_En_12_Fig2_HTML.jpg)\n\
    \n    **Figure 12-2.** Tap the `Scheduled` switch to `On` and then set a start\
    \ and end time for `Do Not Disturb`.\n\n    **Note:** Rather than scheduling `Do\
    \ Not Disturb` mode, you can invoke it at any time by following steps 1 and 2\
    \ to display the `Do Not Disturb` screen, then tapping the `Manual` switch to\
    \ `On`.\n\n4. If you want to allow certain calls even when `Do Not Disturb` is\
    \ activated, tap `Allow Calls From` and then tap who you want to get through:\
    \ `Everyone`, `No One`, `Favorites` (that is, anyone in the `Phone` app’s `Favorites`\
    \ list), or a particular contact group.\n5. If you want `Do Not Disturb` to allow\
    \ a call through when the same person calls twice within three minutes, leave\
    \ the `Repeated Calls` switch in the `On` position. If you don’t want to allow\
    \ this exception, tap the `Repeated Calls` switch to `Off`.\n6. If you want `Do\
    \ Not Disturb` to handle calls and notifications normally (that is, non-silently)\
    \ when your device is unlocked, tap the `Only While Device is Locked` option (where\
    \ `Device` is iPhone, iPad, or iPod).\n\n# The Onscreen Keyboard Clicks Are Driving\
    \ You (and Everyone Near You) Crazy\n\nBy default, the iOS onscreen keyboard makes\
    \ a clicking noise each time you tap a key. Apple must think this aural feedback\
    \ is useful since the clicks are on by default, but I don’t know anyone who doesn’t\
    \ find them annoying and purposeless. Even if you don’t mind the incessant clicking,\
    \ I guarantee that every person within earshot of your device is cursing you silently\
    \ (or perhaps not so silently).\n\n**Solution:** Turn off the keyboard clicks\
    \ by following these steps:\n\n1. On the Home screen, tap `Settings` to open the\
    \ `Settings` app.\n2. Tap `Sounds` to display the `Sounds` screen.\n3. Tap the\
    \ `Keyboard Clicks` switch to `Off`, as shown in Figure [12-3](#A429116_1_En_12_Chapter.html#Fig3).\n\
    \n    ![A429116_1_En_12_Fig3_HTML.jpg](A429116_1_En_12_Fig3_HTML.jpg)\n\n    **Figure\
    \ 12-3.** To type blissfully noise free, tap the `Keyboard Clicks` switch to `Off`.\n\
    \n# When You Type Two or More Spaces, iOS Always Adds a Period (.) Before the\
    \ Spaces\n\nThis is actually, as the programmers say, a feature, not a bug. It’s\
    \ a built-in shortcut that enables you to end most sentences efficiently with\
    \ a quick double-tap on the space key.\n\n**Solution:** If you’d rather be able\
    \ to enter multiple spaces without the period showing up, you can turn off the\
    \ shortcut. Here are the steps to follow:\n\n1. On the Home screen, tap `Settings`\
    \ to open the `Settings` app.\n2. Tap `General` to display the `General` screen.\n\
    3. Tap `Keyboard` to display the `Keyboards` screen.\n4. Tap the `\".\" Shortcut`\
    \ switch to `Off`, as shown in Figure [12-4](#A429116_1_En_12_Chapter.html#Fig4).\n\
    \n    ![A429116_1_En_12_Fig4_HTML.jpg](A429116_1_En_12_Fig4_HTML.jpg)\n\n    **Figure\
    \ 12-4.** To type two spaces without getting a period (`.`), tap the `\".\" Shortcut`\
    \ switch to `Off`.\n\n# You Can’t Type in Another Language\n\nYour iOS device\
    \ is set up with a default keyboard appropriate to your location, and it also\
    \ comes with a keyboard of Emoji symbols. If you want to type in another language\
    \ such as Arabic, Greek, or Russian, there is no direct way to do it using the\
    \ default keyboard.\n\n**Solution:** You need to install a new keyboard layout\
    \ for the language (or languages) you want to use. Here are the steps to follow:\n\
    \n1. On the Home screen, tap `Settings` to open the `Settings` app.\n2. Tap `General`\
    \ to display the `General` screen.\n3. Tap `Keyboard` to display the `Keyboards`\
    \ screen.\n4. Tap `Keyboards` to open the `Keyboards` screen, which displays a\
    \ list of installed keyboards.\n5. Tap `Add New Keyboard` to display the `Add\
    \ New Keyboard` screen.\n6. Tap the keyboard layout you want to use.\n\nTo switch\
    \ from one layout to another, display the onscreen keyboard and then tap and hold\
    \ the `Keyboard` button (which is to the right of the `123` or `?123` button).\
    \ This displays a list of the installed keyboards, as shown in Figure [12-5](#A429116_1_En_12_Chapter.html#Fig5),\
    \ and you then tap the layout you want to use.\n\n![A429116_1_En_12_Fig5_HTML.jpg](A429116_1_En_12_Fig5_HTML.jpg)\n\
    \n**Figure 12-5.** Tap and hold the `Keyboard` button to see a list of your installed\
    \ keyboard layouts."
  raw: "### Double-Tapping the Home Button Doesn't Do Anything\n\nIn the previous\
    \ section you learned that you can reach items at the top of the big iPhone 6\
    \ (and later) screen by double-tapping the Home button. However, you might find\
    \ that this technique doesn't work for you.\n\nSolution: Here are a few troubleshooting\
    \ techniques to try:\n\n*   Remember that this feature is only available on the\
    \ iPhone, not the iPad or iPod touch. And, as of this writing, the only iPhone\
    \ models that support this feature are the 6, 6 Plus, 6s, 6s Plus, 7, and 7 Plus.\n\
    *   If you see the multitasking screen (that is, the screen that shows all your\
    \ running or recently run apps), it means you're double-clicking the Home button\
    \ rather than double-tapping it. Two light taps are all you need.\n*   This feature\
    \ is called Reachability and it's an accessibility setting. If it doesn't work\
    \ for you, it might mean that the setting has been turned off. To check, follow\
    \ these steps:\n    1.  On the Home screen, tap Settings to open the Settings\
    \ app.  \n    2.  Tap General to open the General screen.  \n    3.  Tap Accessibility\
    \ to open the Accessibility screen.  \n    4.  Tap the Reachability switch to\
    \ On, as shown in Figure [12-1](#A429116_1_En_12_Chapter.html#Fig1).\n\n     \
    \   ![A429116_1_En_12_Fig1_HTML.jpg](A429116_1_En_12_Fig1_HTML.jpg)\n\n      \
    \  Figure 12-1.\n\n        Make sure the Reachability setting is On to enable\
    \ Home button double-tapping\n\n### Your iOS Device Disturbs You at Inconvenient\
    \ Times\n\nIf you're in a meeting, at a movie, or going to sleep, you don't want\
    \ your iOS device disturbing the peace with incoming phone calls or alerts. Most\
    \ people handle this by activating Airplane mode, which turns off all the antennas\
    \ on the device. That ensures you're distraction free for a while, but it suffers\
    \ from a major drawback: Without any working antennas, your device can't communicate\
    \ with the world, so it doesn't download messages or perform any other online\
    \ activities. That might be what you want, but it's less than optimum if you're\
    \ expecting something important. Plus, you have to remember to activate Airplane\
    \ mode, something you can't always do when you're busy.\n\nSolution: Configure\
    \ Do Not Disturb mode, which silences all device distractions – including Notification\
    \ Center alerts and phone calls – but keeps your device online so that it can\
    \ continue to receive data. That way, when you're ready to get back to the action,\
    \ all your new data is already on your device, so you can get back up to speed\
    \ quickly. To activate Do Not Disturb, open Settings, tap Do Not Disturb, and\
    \ then tap the Manual switch to On.\n\nYou can get the most out of Do Not Disturb\
    \ by configuring it to suit the way you work. Here are the steps to follow:\n\n\
    1.  On the Home screen, tap Settings to open the Settings app.  \n2.  Tap Do Not\
    \ Disturb to display the Do Not Disturb screen.  \n3.  To set a time to automatically\
    \ activate and deactivate Do Not Disturb, tap the Scheduled switch to On, as shown\
    \ in Figure [12-2](#A429116_1_En_12_Chapter.html#Fig2). You then tap the From/To\
    \ control; use From to set the start time and use To to set the end time, then\
    \ tap Back to return to the Do Not Disturb screen.\n\n    ![A429116_1_En_12_Fig2_HTML.jpg](A429116_1_En_12_Fig2_HTML.jpg)\n\
    \n    Figure 12-2.\n\n    Tap the Scheduled switch to On and then set a start\
    \ and end time for Do Not Disturb Note  Rather than scheduling Do Not Disturb\
    \ mode, you can invoke it at any time by following steps 1 and 2 to display the\
    \ Do Not Disturb screen, then tapping the Manual switch to On.  \n4.  If you want\
    \ to allow certain calls even when Do Not Disturb is activated, tap Allow Calls\
    \ From and then tap who you want to get through: Everyone, No One, Favorites (that\
    \ is, anyone in the Phone app's Favorites list), or a particular contact group.\
    \  \n5.  If you want Do Not Disturb to allow a call through when the same person\
    \ calls twice within three minutes, leave the Repeated Calls switch in the On\
    \ position. If you don't want to allow this exception, tap the Repeated Calls\
    \ switch to Off.  \n6.  If you want Do Not Disturb to handle calls and notifications\
    \ normally (that is, non-silently) when your device is unlocked, tap the Only\
    \ While Device is Locked option (where Device is iPhone, iPad, or iPod).\n\n###\
    \ The Onscreen Keyboard Clicks Are Driving You (and Everyone Near You) Crazy\n\
    \nBy default, the iOS onscreen keyboard makes a clicking noise each time you tap\
    \ a key. Apple must think this aural feedback is useful since the clicks are on\
    \ by default, but I don't know anyone who doesn't find them annoying and purposeless.\
    \ Even if you don't mind the incessant clicking, I guarantee that every person\
    \ within earshot of your device is cursing you silently (or perhaps not so silently).\n\
    \nSolution: Turn off the keyboard clicks by following these steps:\n\n1.  On the\
    \ Home screen, tap Settings to open the Settings app.  \n2.  Tap Sounds to display\
    \ the Sounds screen.  \n3.  Tap the Keyboard Clicks switch to Off, as shown in\
    \ Figure [12-3](#A429116_1_En_12_Chapter.html#Fig3).\n\n    ![A429116_1_En_12_Fig3_HTML.jpg](A429116_1_En_12_Fig3_HTML.jpg)\n\
    \n    Figure 12-3.\n\n    To type blissfully noise free, tap the Keyboard Clicks\
    \ switch to Off\n\n### When You Type Two or More Spaces, iOS Always Adds a Period\
    \ (.) Before the Spaces\n\nThis is actually, as the programmers say, a feature,\
    \ not a bug. It's a built-in shortcut that enables you to end most sentences efficiently\
    \ with a quick double-tap on the space key.\n\nSolution: If you'd rather be able\
    \ to enter multiple spaces without the period showing up, you can turn off the\
    \ shortcut. Here are the steps to follow:\n\n1.  On the Home screen, tap Settings\
    \ to open the Settings app.  \n2.  Tap General to display the General screen.\
    \  \n3.  Tap Keyboard to display the Keyboards screen.  \n4.  Tap the \".\" Shortcut\
    \ switch to Off, as shown in Figure [12-4](#A429116_1_En_12_Chapter.html#Fig4).\n\
    \n    ![A429116_1_En_12_Fig4_HTML.jpg](A429116_1_En_12_Fig4_HTML.jpg)\n\n    Figure\
    \ 12-4.\n\n    To type two spaces without getting a period (.), tap the \".\"\
    \ Shortcut switch to Off\n\n### You Can't Type in Another Language\n\nYour iOS\
    \ device is set up with a default keyboard appropriate to your location, and it\
    \ also comes with a keyboard of Emoji symbols. If you want to type in another\
    \ language such as Arabic, Greek, or Russian, there is no direct way to do it\
    \ using the default keyboard.\n\nSolution: You need to install a new keyboard\
    \ layout for the language (or languages) you want to use. Here are the steps to\
    \ follow:\n\n1.  On the Home screen, tap Settings to open the Settings app.  \n\
    2.  Tap General to display the General screen.  \n3.  Tap Keyboard to display\
    \ the Keyboards screen.  \n4.  Tap Keyboards to open the Keyboards screen, which\
    \ displays a list of installed keyboards.  \n5.  Tap Add New Keyboard to display\
    \ the Add New Keyboard screen.  \n6.  Tap the keyboard layout you want to use.\
    \  \n\nTo switch from one layout to another, display the onscreen keyboard and\
    \ then tap and hold the Keyboard button (which is to the right of the 123 or ?123\
    \ button). This displays a list of the installed keyboards, as shown in Figure\
    \ [12-5](#A429116_1_En_12_Chapter.html#Fig5), and you then tap the layout you\
    \ want to use.\n\n![A429116_1_En_12_Fig5_HTML.jpg](A429116_1_En_12_Fig5_HTML.jpg)\n\
    \nFigure 12-5.\n\nTap and hold the Keyboard button to see a list of your installed\
    \ keyboard layouts"
  trans: "\n# 双击主屏幕按钮无反应\n\n在前一节中，您已经了解到，在 iPhone 6（及后续机型）的大屏幕上，可以通过双击`主屏幕`按钮来触及屏幕顶部的项目。不过，您可能会发现这个技巧对您并不奏效。\n\
    \n**解决方法：** 以下是可供尝试的几种故障排查技巧：\n\n-   请记住，此功能仅在 iPhone 上可用，iPad 或 iPod touch 不支持。截至撰写本文时，支持此功能的\
    \ iPhone 机型仅有 6、6 Plus、6s、6s Plus、7 和 7 Plus。\n-   如果您看到了多任务屏幕（即显示所有正在运行或近期运行的应用的屏幕），说明您是在**连按两次**`主屏幕`按钮，而不是**轻点两下**。您只需要**轻快地触碰两下**即可。\n\
    -   此功能称为`便捷访问`，是一项辅助功能设置。如果它无法正常工作，可能意味着该设置已被关闭。如需检查，请按以下步骤操作：\n\n1.  在主屏幕中，轻点`设置`以打开`设置`应用。\n\
    2.  轻点`通用`以打开`通用`屏幕。\n3.  轻点`辅助功能`以打开`辅助功能`屏幕。\n4.  将`便捷访问`开关轻点至`开启`，如图 12-1 所示。\n\
    \n    ![A429116_1_En_12_Fig1_HTML.jpg](img/A429116_1_En_12_Fig1_HTML.jpg)\n\n\
    \    **图 12-1.** 确保`便捷访问`设置已`开启`以启用主屏幕按钮轻点两下功能。\n\n# 您的 iOS 设备在不恰当的时间打扰您\n\n当您正在开会、看电影或准备睡觉时，您肯定不希望\
    \ iOS 设备被来电或提醒打扰。大多数人通过激活`飞行`模式来处理这种情况，这会关闭设备上的所有天线。这能确保您暂时不受干扰，但它有一个重大缺陷：没有天线工作，设备就无法与外界通信，因此无法下载信息或执行任何其他在线活动。这可能是您想要的，但如果您在等待重要事情，这就不是最佳方案了。此外，您还必须记得激活`飞行`模式，在忙碌时这并非总能做到。\n\
    \n**解决方法：** 配置`勿扰模式`，它能使所有设备干扰静音——包括`通知中心`的提醒和电话——但保持设备在线，以便继续接收数据。这样一来，当您准备好重新投入使用时，所有新数据都已存在于设备上，您可以快速跟上进度。\n\
    \n要激活`勿扰模式`，请打开`设置`，轻点`勿扰模式`，然后将`手动`开关轻点至`开启`。\n\n通过根据您的工作方式配置`勿扰模式`，可以充分发挥其作用。请按以下步骤操作：\n\
    \n1.  在主屏幕中，轻点`设置`以打开`设置`应用。\n2.  轻点`勿扰模式`以显示`勿扰模式`屏幕。\n3.  若要设置自动启用和停用`勿扰模式`的时间，请将`设定时间`开关轻点至`开启`，如图\
    \ 12-2 所示。然后轻点`自定时间`控制项；使用`自`来设置开始时间，使用`至`来设置结束时间，然后轻点`返回`回到`勿扰模式`屏幕。\n\n    ![A429116_1_En_12_Fig2_HTML.jpg](img/A429116_1_En_12_Fig2_HTML.jpg)\n\
    \n    **图 12-2.** 将`设定时间`开关轻点至`开启`，然后为`勿扰模式`设置开始和结束时间。\n\n    **注意：** 除了定时启用`勿扰模式`，您也可以随时通过步骤\
    \ 1 和 2 显示`勿扰模式`屏幕，然后轻点`手动`开关至`开启`来手动启用。\n\n4.  如果您希望即使在`勿扰模式`激活时也允许某些来电，请轻点`允许以下来电`，然后轻点您允许通过的人：`所有人`、`没有人`、`个人收藏`（即`电话`应用中`个人收藏`列表里的联系人），或某个特定的联系人分组。\n\
    5.  如果您希望`勿扰模式`允许同一人在三分钟内第二次来电时接通，请将`重复来电`开关保持在`开启`位置。如果您不希望允许此例外，请将`重复来电`开关轻点至`关闭`。\n\
    6.  如果您希望`勿扰模式`在设备已解锁时正常处理（即非静音）来电和通知，请轻点`仅在设备已锁定时`选项（其中`设备`指 iPhone、iPad 或 iPod）。\n\
    \n# 屏幕键盘的咔嗒声让你（和你附近的人）抓狂\n\n默认情况下，iOS 的屏幕键盘每次按键都会发出咔嗒声。苹果公司肯定认为这种声音反馈很有用，所以默认开启了此声音，但据我所知，没人不觉得它烦人且毫无意义。即使您不介意这持续不断的咔嗒声，我敢保证您设备周围能听到声音的每个人都在（或许不是那么）默默地咒骂您。\n\
    \n**解决方法：** 按照以下步骤关闭键盘咔嗒声：\n\n1.  在主屏幕中，轻点`设置`以打开`设置`应用。\n2.  轻点`声音`以显示`声音`屏幕。\n\
    3.  将`按键音`开关轻点至`关闭`，如图 12-3 所示。\n\n    ![A429116_1_En_12_Fig3_HTML.jpg](img/A429116_1_En_12_Fig3_HTML.jpg)\n\
    \n    **图 12-3.** 要享受无噪音的舒爽输入体验，请将`按键音`开关轻点至`关闭`。\n\n# 输入两个或更多空格时，iOS 总会在空格前添加一个句点\
    \ (.)\n\n实际上，正如程序员所说，这是一个功能，而非错误。这是一个内置快捷方式，让您可以通过轻点两下空格键来高效地结束大多数句子。\n\n**解决方法：**\
    \ 如果您希望能够输入多个空格而不出现句点，可以关闭这个快捷方式。请按照以下步骤操作：\n\n1.  在主屏幕中，轻点`设置`以打开`设置`应用。\n2.\
    \  轻点`通用`以显示`通用`屏幕。\n3.  轻点`键盘`以显示`键盘`屏幕。\n4.  将`“.”快捷键`开关轻点至`关闭`，如图 12-4 所示。\n\
    \n    ![A429116_1_En_12_Fig4_HTML.jpg](img/A429116_1_En_12_Fig4_HTML.jpg)\n\n\
    \    **图 12-4.** 要输入两个空格而不出现句点 (`.`)，请将`“.”快捷键`开关轻点至`关闭`。\n\n# 您无法用另一种语言输入\n\n\
    您的 iOS 设备已设置适合您所在地区的默认键盘，并且还附带了一个表情符号键盘。如果您想用其他语言（如阿拉伯语、希腊语或俄语）输入，则无法使用默认键盘直接进行。\n\
    \n**解决方法：** 您需要为想要使用的语言安装一个新的键盘布局。请按照以下步骤操作：\n\n1.  在主屏幕中，轻点`设置`以打开`设置`应用。\n2.\
    \  轻点`通用`以显示`通用`屏幕。\n3.  轻点`键盘`以显示`键盘`屏幕。\n4.  轻点`键盘`以打开`键盘`屏幕，该屏幕会显示已安装键盘的列表。\n\
    5.  轻点`添加新键盘`以显示`添加新键盘`屏幕。\n6.  轻点您想要使用的键盘布局。\n\n要从一种布局切换到另一种，请调出屏幕键盘，然后按住`键盘`按钮（位于`123`或`?123`按钮右侧）。这会显示已安装键盘的列表，如图\
    \ 12-5 所示，然后轻点您想要使用的布局。\n\n![A429116_1_En_12_Fig5_HTML.jpg](img/A429116_1_En_12_Fig5_HTML.jpg)\n\
    \n**图 12-5.** 按住`键盘`按钮可查看已安装的键盘布局列表。\n"
- fmt: "### Your Device Display Is Too Harsh for Night Use\n\nMany of us keep our\
    \ iOS device at our bedside to use as a clock or alarm. Dimming the display is\
    \ a must for nighttime use, but for many people the screen colors are still too\
    \ harsh and they can make it hard to get to sleep.\n\n**Solution:** You can use\
    \ the `Night Shift` feature to shift the screen colors toward the red end of the\
    \ spectrum. This gives the screen a \"warmer\" feel overall, which makes it less\
    \ harsh for night viewing and is more conducive to sleep.\n\nFollow these steps\
    \ to activate and configure `Night Shift`:\n\n1. On the Home screen, tap `Settings`\
    \ to open the `Settings` app.\n2. Tap `Display & Brightness` to display the `Display\
    \ & Brightness` screen.\n3. Tap `Night Shift` to display the `Night Shift` screen.\n\
    4. To set a time to automatically activate and deactivate `Night Shift`, tap the\
    \ `Scheduled` switch to `On`, as shown in Figure [12-6](#A429116_1_En_12_Chapter.html#Fig6).\
    \ You then tap the `From/To` control; use `From` to set the start time and use\
    \ `To` to set the end time, then tap `Back` to return to the `Night Shift` screen.\n\
    \n   ![A429116_1_En_12_Fig6_HTML.jpg](A429116_1_En_12_Fig6_HTML.jpg)\n\n   **Figure\
    \ 12-6.** Tap the `Scheduled` switch to `On` and then set a start and end time\
    \ for `Night Shift`\n\n   **Note:** Rather than scheduling `Night Shift`, you\
    \ can invoke it at any time by following steps 1 to 3 to display the `Night Shift`\
    \ screen, then tapping the `Manually Enable Until Tomorrow` switch to `On`.\n\n\
    5. Use the `Color Temperature` slider to adjust the screen colors to make them\
    \ more warm (slide to the right) or less warm (slide to the left).\n\n### You\
    \ Want to Control What Your Children See and Do on an iOS Device\n\nIf your children\
    \ have access to your iOS device, or if they have devices of their own, then you\
    \ might be a bit worried about some of the content they might be exposed to on\
    \ the Web, on YouTube, or in iTunes. Similarly, you might not want them installing\
    \ apps or giving away their current location.\n\n**Solution:** For all those and\
    \ similar parental worries, you can sleep better at night by activating the iOS\
    \ parental controls. These controls restrict the content and activities that kids\
    \ can see and do. Here's how to set them up:\n\n1. On the Home screen, tap `Settings`.\
    \ The `Settings` app appears.\n2. Tap `General`. The `General` screen appears.\n\
    3. Tap `Restrictions`. The `Restrictions` screen appears.\n4. Tap `Enable Restrictions`.\
    \ iOS displays the `Enable Restrictions` screen, which you use to specify a four-digit\
    \ code that you can use to make changes to the parental controls. (Note that this\
    \ code is not the same as the passcode lock that I discuss earlier in this book;\
    \ see Chapter [8](#A429116_1_En_8_Chapter.html), \"Protecting Your Device.\")\n\
    5. Tap the four-digit restrictions passcode and then retype the code. iOS returns\
    \ you to the `Restrictions` screen and makes the controls available, as shown\
    \ in Figure [12-7](#A429116_1_En_12_Chapter.html#Fig7).\n\n   ![A429116_1_En_12_Fig7_HTML.jpg](A429116_1_En_12_Fig7_HTML.jpg)\n\
    \n   **Figure 12-7.** Use the `Restrictions` screen to configure the parental\
    \ controls you want to use\n\n6. In the `Allow` section, for each app or task,\
    \ tap the `On/Off` switch to allow or disallow your child to use the app or task.\n\
    7. Under `Allowed Content`, tap `Ratings For` and then tap the country with the\
    \ ratings you want to use.\n8. For each of the content controls – `Music`, `Podcasts\
    \ & News`, `Movies`, `TV Shows`, `Books`, `Apps`, `Siri`, and `Websites` – tap\
    \ the control and then tap the highest rating for the content you want your children\
    \ to use.\n9. If you don't want your children to make changes to certain settings,\
    \ such as `Location Services` and `Contacts`, tap the corresponding setting types\
    \ in the `Privacy` section and then tap `Don't Allow Changes`.\n10. If you don't\
    \ want your children to make changes to the current `Mail`, `Calendar`, or `Contacts`\
    \ account settings, tap `Accounts` under `Allow Changes`, and then tap `Don't\
    \ Allow Changes`.\n11. If you don't want your children to adjust the maximum volume\
    \ limit you've set, tap `Volume Limit`, and then tap `Don't Allow Changes`.\n\n\
    \    **Tip:** To set the maximum volume on the iOS device, open the `Settings`\
    \ app, tap `Music`, tap `Volume Limit`, and then use the `Max Volume` slider to\
    \ set the limit.\n\n12. In the `Game Center` section, tap the `On/Off` switches\
    \ to enable or disable multiplayer games, adding friends, and recording the screen.\n\
    \n## Troubleshooting Connection and Syncing Problems\n\nWith most syncing running\
    \ through iCloud these days, many people find they rarely have to connect their\
    \ iOS device to their computer. However, if you don't have an iCloud account,\
    \ then connecting to your computer and syncing through iTunes is required, so\
    \ all the more reason to make sure things are working properly.\n\n### iTunes\
    \ Doesn't See Your Device\n\nWhen you connect your iOS device to your computer,\
    \ iTunes should start and you should see the device in the Devices list. If iTunes\
    \ doesn't start when you connect your device, or if iTunes is already running\
    \ but the device doesn't appear in the Devices list, it means that iTunes doesn't\
    \ recognize your device.\n\n**Solution:** Here are some possible fixes:\n\n* **Trust\
    \ the computer.** You can't connect to iTunes until you've told iOS that you trust\
    \ the computer that's running iTunes. On your device, tap `Trust`.\n* **Check\
    \ the connections.** Make sure the USB connector and the Lightning connector are\
    \ fully seated.\n* **Try a different USB port.** The port you're using might not\
    \ work, so try another one. If you're using a port on a USB hub, try using one\
    \ of the computer's built-in USB ports.\n* **Try a different cable.** It's possible\
    \ that the USB cable is defective, so try a different cable if you have one.\n\
    * **Restart your device.** Press and hold the `Sleep/Wake` button for a few seconds\
    \ until the device shuts down. Press and hold `Sleep/Wake` again until you see\
    \ the Apple logo.\n* **Restart your computer.** This should reset the computer's\
    \ USB ports, which might solve the problem.\n* **Check your iTunes version.**\
    \ You need at least iTunes version 12.5.1 to work with iOS 10.\n* **Check your\
    \ operating system version.** On a Mac, your iOS device running iOS 10 requires\
    \ OS X Mavericks (10.9) or later. On a Windows PC, your iOS device requires Windows\
    \ 7.\n\n### iTunes Won't Sync Your Device\n\niTunes might see your iOS device,\
    \ but it might refuse to sync the device.\n\n**Solution:** It could be a couple\
    \ of things. First, connect your device, switch to iTunes on your computer, and\
    \ then click your device in the Devices list. On the `Summary` tab (see Figure\
    \ [12-8](#A429116_1_En_12_Chapter.html#Fig8)), make sure the `Automatically sync\
    \ when this device is connected` check box is selected (where device is iPhone,\
    \ iPad, or iPod).\n\n![A429116_1_En_12_Fig8_HTML.jpg](A429116_1_En_12_Fig8_HTML.jpg)\n\
    \n**Figure 12-8.** Select the `Automatically sync when this device is connected`\
    \ check box\n\nIf that check box was already selected, then you need to delve\
    \ a bit deeper to solve the mystery. Follow these steps:\n\n1. Open the iTunes\
    \ preferences:\n   * **Mac.** Click `iTunes` and then click `Preferences`.\n \
    \  * **Windows.** Click `Edit` and then click `Preferences`.\n2. Click the `Devices`\
    \ tab.\n3. Deselect the `Prevent iPods, iPhones, and iPads from syncing automatically`\
    \ check box.\n4. Click `OK` to put the new setting into effect and enable automatic\
    \ syncing once again.\n\nAnother possibility is that your iOS device is currently\
    \ locked. That's not usually a problem for iTunes, but it sometimes gets confused\
    \ by a locked device. The easy remedy is to disconnect the device, unlock it,\
    \ and then connect it in again."
  raw: "### Your Device Display Is Too Harsh for Night Use\n\nMany of us keep our\
    \ iOS device at our bedside to use as a clock or alarm. Dimming the display is\
    \ a must for nighttime use, but for many people the screen colors are still too\
    \ harsh and they can make it hard to get to sleep.\n\nSolution: You can use the\
    \ Night Shift feature to shift the screen colors toward the red end of the spectrum.\
    \ This gives the screen a \"warmer\" feel overall, which makes it less harsh for\
    \ night viewing and is more conducive to sleep.\n\nFollow these steps to activate\
    \ and configure Night Shift:\n\n1.  On the Home screen, tap Settings to open the\
    \ Settings app.  \n2.  Tap Display & Brightness to display the Display & Brightness\
    \ screen.  \n3.  Tap Night Shift to display the Night Shift screen.  \n4.  To\
    \ set a time to automatically activate and deactivate Night Shift, tap the Scheduled\
    \ switch to On, as shown in Figure [12-6](#A429116_1_En_12_Chapter.html#Fig6).\
    \ You then tap the From/To control; use From to set the start time and use To\
    \ to set the end time, then tap Back to return to the Night Shift screen.\n\n\
    \    ![A429116_1_En_12_Fig6_HTML.jpg](A429116_1_En_12_Fig6_HTML.jpg)\n\n    Figure\
    \ 12-6.\n\n    Tap the Scheduled switch to On and then set a start and end time\
    \ for Night Shift Note  Rather than scheduling Night Shift, you can invoke it\
    \ at any time by following steps 1 to 3 to display the Night Shift screen, then\
    \ tapping the Manually Enable Until Tomorrow switch to On.  \n5.  Use the Color\
    \ Temperature slider to adjust the screen colors to make them more warm (slide\
    \ to the right) or less warm (slide to the left).\n\n### You Want to Control What\
    \ Your Children See and Do on an iOS Device\n\nIf your children have access to\
    \ your iOS device, or if they have devices of their own, then you might be a bit\
    \ worried about some of the content they might be exposed to on the Web, on YouTube,\
    \ or in iTunes. Similarly, you might not want them installing apps or giving away\
    \ their current location.\n\nSolution: For all those and similar parental worries,\
    \ you can sleep better at night by activating the iOS parental controls. These\
    \ controls restrict the content and activities that kids can see and do. Here's\
    \ how to set them up:\n\n1.  On the Home screen, tap Settings. The Settings app\
    \ appears.  \n2.  Tap General. The General screen appears.  \n3.  Tap Restrictions.\
    \ The Restrictions screen appears.  \n4.  Tap Enable Restrictions. iOS displays\
    \ the Enable Restrictions screen, which you use to specify a four-digit code that\
    \ you can use to make changes to the parental controls. (Note that this code is\
    \ not the same as the passcode lock that I discuss earlier in this book; see Chapter\
    \ [8](#A429116_1_En_8_Chapter.html), \"Protecting Your Device.\")  \n5.  Tap the\
    \ four-digit restrictions passcode and then retype the code. iOS returns you to\
    \ the Restrictions screen and makes the controls available, as shown in Figure\
    \ [12-7](#A429116_1_En_12_Chapter.html#Fig7).\n\n    ![A429116_1_En_12_Fig7_HTML.jpg](A429116_1_En_12_Fig7_HTML.jpg)\n\
    \n    Figure 12-7.\n\n    Use the Restrictions screen to configure the parental\
    \ controls you want to use  \n6.  In the Allow section, for each app or task,\
    \ tap the On/Off switch to allow or disallow your child to use the app or task.\
    \  \n7.  Under Allowed Content, tap Ratings For and then tap the country with\
    \ the ratings you want to use.  \n8.  For each of the content controls – Music,\
    \ Podcasts & News, Movies, TV Shows, Books, Apps, Siri, and Websites – tap the\
    \ control and then tap the highest rating for the content you want your children\
    \ to use.  \n9.  If you don't want your children to make changes to certain settings,\
    \ such as Location Services and Contacts, tap the corresponding setting types\
    \ in the Privacy section and then tap Don't Allow Changes.  \n10.  If you don't\
    \ want your children to make changes to the current Mail, Calendar, or Contacts\
    \ account settings, tap Accounts under Allow Changes, and then tap Don't Allow\
    \ Changes.  \n11.  If you don't want your children to adjust the maximum volume\
    \ limit you've set, tap Volume Limit, and then tap Don't Allow Changes. Tip  To\
    \ set the maximum volume on the iOS device, open the Settings app, tap Music,\
    \ tap Volume Limit, and then use the Max Volume slider to set the limit.  \n12.\
    \  In the Game Center section, tap the On/Off switches to enable or disable multiplayer\
    \ games, adding friends, and recording the screen.\n\n## Troubleshooting Connection\
    \ and Syncing Problems\n\nWith most syncing running through iCloud these days,\
    \ many people find they rarely have to connect their iOS device to their computer.\
    \ However, if you don't have an iCloud account, then connecting to your computer\
    \ and syncing through iTunes is required, so all the more reason to make sure\
    \ things are working properly.\n\n### iTunes Doesn't See Your Device\n\nWhen you\
    \ connect your iOS device to your computer, iTunes should start and you should\
    \ see the device in the Devices list. If iTunes doesn't start when you connect\
    \ your device, or if iTunes is already running but the device doesn't appear in\
    \ the Devices list, it means that iTunes doesn't recognize your device.\n\nSolution:\
    \ Here are some possible fixes:\n\n*   Trust the computer. You can't connect to\
    \ iTunes until you've told iOS that you trust the computer that's running iTunes.\
    \ On your device, tap Trust.\n*   Check the connections. Make sure the USB connector\
    \ and the Lightning connector are fully seated.\n*   Try a different USB port.\
    \ The port you're using might not work, so try another one. If you're using a\
    \ port on a USB hub, try using one of the computer's built-in USB ports.\n*  \
    \ Try a different cable. It's possible that the USB cable is defective, so try\
    \ a different cable if you have one.\n*   Restart your device. Press and hold\
    \ the Sleep/Wake button for a few seconds until the device shuts down. Press and\
    \ hold Sleep/Wake again until you see the Apple logo.\n*   Restart your computer.\
    \ This should reset the computer's USB ports, which might solve the problem.\n\
    *   Check your iTunes version. You need at least iTunes version 12.5.1 to work\
    \ with iOS 10.\n*   Check your operating system version. On a Mac, your iOS device\
    \ running iOS 10 requires OS X Mavericks (10.9) or later. On a Windows PC, your\
    \ iOS device requires Windows 7.\n\n### iTunes Won't Sync Your Device\n\niTunes\
    \ might see your iOS device, but it might refuse to sync the device.\n\nSolution:\
    \ It could be a couple of things. First, connect your device, switch to iTunes\
    \ on your computer, and then click your device in the Devices list. On the Summary\
    \ tab (see Figure [12-8](#A429116_1_En_12_Chapter.html#Fig8)), make sure the Automatically\
    \ sync when this device is connected check box is selected (where device is iPhone,\
    \ iPad, or iPod).\n\n![A429116_1_En_12_Fig8_HTML.jpg](A429116_1_En_12_Fig8_HTML.jpg)\n\
    \nFigure 12-8.\n\nSelect the Automatically sync when this device is connected\
    \ check box\n\nIf that check box was already selected, then you need to delve\
    \ a bit deeper to solve the mystery. Follow these steps:\n\n1.  Open the iTunes\
    \ preferences:\n    *   Mac. Click iTunes and then click Preferences.\n    * \
    \  Windows. Click Edit and then click Preferences. \n2.  Click the Devices tab.\
    \  \n3.  Deselect the Prevent iPods, iPhones, and iPads from syncing automatically\
    \ check box.  \n4.  Click OK to put the new setting into effect and enable automatic\
    \ syncing once again.  \n\nAnother possibility is that your iOS device is currently\
    \ locked. That's not usually a problem for iTunes, but it sometimes gets confused\
    \ by a locked device. The easy remedy is to disconnect the device, unlock it,\
    \ and then connect it in again."
  trans: "\n### 您的设备显示屏在夜间使用时亮度过于刺眼\n\n许多人会将 iOS 设备放在床头用作时钟或闹钟。夜间使用时调暗屏幕是必须的，但对很多人来说，屏幕色彩仍然过于刺眼，可能导致难以入睡。\n\
    \n**解决方案：** 您可以使用`Night Shift`（夜览）功能，将屏幕色彩向光谱的红色端偏移。这能让屏幕整体感觉更\"温暖\"，从而减轻夜间观看时的刺眼感，更有利于入睡。\n\
    \n请按照以下步骤激活并配置`Night Shift`：\n\n1. 在主屏幕上，轻点`设置`以打开`设置`应用。\n2. 轻点`显示与亮度`以显示`显示与亮度`屏幕。\n\
    3. 轻点`夜览`以显示`夜览`屏幕。\n4. 若要设定自动开启和关闭`夜览`的时间，请将`设定时间`开关轻点至`开`，如图 12-6 所示。然后轻点`时间`控制项；使用`自`设定开始时间，使用`至`设定结束时间，然后轻点`返回`回到`夜览`屏幕。\n\
    \n   ![A429116_1_En_12_Fig6_HTML.jpg](img/A429116_1_En_12_Fig6_HTML.jpg)\n\n \
    \  **图 12-6.** 将`设定时间`开关轻点至`开`，然后为`夜览`设定开始和结束时间\n\n   **注意：** 您也可以不设定`夜览`的计划时间，而是按照步骤\
    \ 1 至 3 显示`夜览`屏幕，然后将`手动启用至明天`开关轻点至`开`，随时手动启用该功能。\n\n5. 使用`色温`滑块调整屏幕色彩，使其更暖（向右滑动）或更冷（向左滑动）。\n\
    \n### 您想控制孩子在 iOS 设备上能看到和能操作的内容\n\n如果您的孩子能接触到您的 iOS 设备，或者他们有自己的设备，那么您可能会有些担心他们在网页、YouTube\
    \ 或 iTunes 上可能接触到某些内容。同样，您可能也不希望他们安装应用或泄露当前的位置信息。\n\n**解决方案：** 针对所有这些以及类似的育儿担忧，您可以激活\
    \ iOS 的家长控制功能，从而在夜间睡得更安稳。这些控制功能将限制孩子们能看到和能操作的内容及活动。设置方法如下：\n\n1. 在主屏幕上，轻点`设置`。将显示`设置`应用。\n\
    2. 轻点`通用`。将显示`通用`屏幕。\n3. 轻点`限制`。将显示`限制`屏幕。\n4. 轻点`启用限制`。iOS 将显示`启用限制`屏幕，您需要在此指定一个四位数字的密码，用于日后修改家长控制设置。（请注意，此密码与本书之前讨论的锁屏密码不同；请参阅第\
    \ 8 章\"保护您的设备\"。）\n5. 输入四位数的限制密码，然后再次输入该密码进行确认。iOS 将返回`限制`屏幕并使各项控制功能可用，如图 12-7\
    \ 所示。\n\n   ![A429116_1_En_12_Fig7_HTML.jpg](img/A429116_1_En_12_Fig7_HTML.jpg)\n\
    \n   **图 12-7.** 使用`限制`屏幕配置您想要使用的家长控制功能\n\n6. 在`允许`部分，针对每个应用或任务，轻点其`开/关`开关，以允许或禁止您的孩子使用该应用或任务。\n\
    7. 在`允许的内容`下，轻点`分级区域`，然后轻点您想使用其分级制度的国家或地区。\n8. 针对每个内容控制项——`音乐`、`播客与新闻`、`影片`、`电视节目`、`图书`、`App`、`Siri`和`网站`——轻点该控制项，然后轻点您希望孩子能访问的内容所允许的最高分级。\n\
    9. 如果您不希望孩子更改某些设置（例如`定位服务`和`通讯录`），请在`隐私`部分轻点相应的设置类型，然后轻点`不允许更改`。\n10. 如果您不希望孩子更改当前的`邮件`、`日历`或`通讯录`账户设置，请轻点`允许更改`下的`账户`，然后轻点`不允许更改`。\n\
    11. 如果您不希望孩子调整您已设定的最大音量限制，请轻点`音量限制`，然后轻点`不允许更改`。\n\n    **提示：** 要在 iOS 设备上设置最大音量，请打开`设置`应用，轻点`音乐`，轻点`音量限制`，然后使用`最大音量`滑块设定限制。\n\
    \n12. 在`游戏中心`部分，轻点`开/关`开关以启用或禁用多人游戏、添加好友以及录制屏幕功能。\n\n## 故障排除：连接与同步问题\n\n如今大多数同步都通过\
    \ iCloud 进行，许多人发现自己很少需要将 iOS 设备连接到电脑。不过，如果您没有 iCloud 账户，那就有必要连接电脑并通过 iTunes 进行同步了，因此确保一切正常运作就更加重要。\n\
    \n### iTunes 无法识别您的设备\n\n当您将 iOS 设备连接到电脑时，iTunes 应该会启动，并且您应该在设备列表中看到该设备。如果连接设备时\
    \ iTunes 没有启动，或者 iTunes 已在运行但设备没有出现在设备列表中，这意味着 iTunes 无法识别您的设备。\n\n**解决方案：** 以下是一些可能的修复方法：\n\
    \n* **信任此电脑。** 只有在 iOS 中告知您信任运行 iTunes 的这台电脑后，才能连接到 iTunes。在您的设备上，轻点`信任`。\n* **检查连接。**\
    \ 确保 USB 连接器和 Lightning 接口都已完全插好。\n* **尝试其他 USB 端口。** 您当前使用的端口可能无法正常工作，请尝试其他端口。如果您使用的是\
    \ USB 集线器上的端口，请尝试使用电脑内置的 USB 端口之一。\n* **尝试其他线缆。** USB 线缆可能有缺陷，因此请尝试更换一条线缆（如果有的话）。\n\
    * **重启设备。** 按住`睡眠/唤醒`按钮几秒钟，直到设备关机。再次按住`睡眠/唤醒`按钮，直到看到 Apple 标志。\n* **重启电脑。** 这应该能重置电脑的\
    \ USB 端口，可能会解决问题。\n* **检查您的 iTunes 版本。** 使用 iOS 10 至少需要 iTunes 12.5.1 版本。\n* **检查您的操作系统版本。**\
    \ 在 Mac 上，运行 iOS 10 的 iOS 设备要求 OS X Mavericks (10.9)或更高版本。在 Windows PC 上，您的 iOS\
    \ 设备要求 Windows 7。\n\n### iTunes 无法同步您的设备\n\niTunes 或许能识别您的 iOS 设备，但可能拒绝同步该设备。\n\
    \n**解决方案：** 可能涉及几个原因。首先，连接您的设备，切换到电脑上的 iTunes，然后在设备列表中点击您的设备。在`摘要`标签页（见图 12-8）中，确保选中了`连接此设备时自动同步`复选框（其中\
    \ device 指 iPhone、iPad 或 iPod）。\n\n![A429116_1_En_12_Fig8_HTML.jpg](img/A429116_1_En_12_Fig8_HTML.jpg)\n\
    \n**图 12-8.** 选中`连接此设备时自动同步`复选框\n\n如果该复选框已被选中，那么您需要更深入探究以解决问题。请按照以下步骤操作：\n\n1.\
    \ 打开 iTunes 偏好设置：\n   * **Mac。** 点击`iTunes`，然后点击`偏好设置`。\n   * **Windows。** 点击`编辑`，然后点击`偏好设置`。\n\
    2. 点击`设备`标签页。\n3. 取消选中`阻止 iPod、iPhone 和 iPad 自动同步`复选框。\n4. 点击`确定`以应用新设置并再次启用自动同步。\n\
    \n另一种可能性是您的 iOS 设备当前处于锁定状态。这通常对 iTunes 来说不是问题，但它有时会被锁定设备搞混淆。简单的解决方法是断开设备连接，解锁设备，然后重新连接。"
- fmt: "### You Have Trouble Syncing Music or Videos\n\nYou may run into a problem\
    \ syncing your music or videos to your iOS device.\n\n**Solution:** The most likely\
    \ culprit here is that your files are in a format that iOS can't read, such as\
    \ `WMA`, `MPEG-1`, or `MPEG-2`. First, convert the files to a format that iOS\
    \ does understand using converter software (such as Format Factory; see [`www.pcfreetime.com/`](http://www.pcfreetime.com/)).\
    \ Then put them back on iTunes and try to sync again. This should solve the problem.\n\
    \niOS-supported audio formats include `AAC`, Protected `AAC`, `HE-AAC`, `MP3`,\
    \ `MP3 VBR`, Audible (formats 2, 3, and 4; Audible Enhanced Audio; `AAX`; and\
    \ `AAX+`), Apple Lossless, `AIFF`, and `WAV`. iOS-supported video formats include\
    \ `H.264`, `MPEG-4`, and `Motion JPEG`.\n\n### An App Opens Each Time You Connect\
    \ Your Device\n\nEach time you connect your iOS device to your computer, you might\
    \ see the Photos app (on your Mac) or the AutoPlay dialog box (in Windows). This\
    \ is certainly convenient if you actually want to send photos to your computer,\
    \ but you might find that you do that only once in a blue moon. In that case,\
    \ having to deal with iPhoto or a dialog box every time is frustrating and time\
    \ consuming.\n\n**Solution:** You can configure your computer not to pester you\
    \ about getting photos from your iOS device.\n\n**Note**\n\nConfiguring your computer\
    \ not to download photos from your iOS device means that in the future, you'll\
    \ either need to reverse the setting to get photos or manually import them.\n\n\
    Here's how you set this up on your Mac:\n\n1.  Click Spotlight, type **image**,\
    \ and then click **Image Capture**. The **Image Capture** application opens.\n\
    2.  In the **Devices** list, click your iOS device.\n3.  At the bottom of the\
    \ **Devices** pane, click the **Connecting this camera opens** menu, and then\
    \ choose **No application**, as shown in Figure 12-9.\n\n![A429116_1_En_12_Fig9_HTML.jpg](A429116_1_En_12_Fig9_HTML.jpg)\
    \  \nFigure 12-9. In the Mac's Image Capture program, choose **No application**\
    \ to prevent Photos from starting when you connect your iOS device\n\n4.  Click\
    \ **Image Capture** and then click **Quit Image Capture**. Image Capture saves\
    \ the new setting and then shuts down. The next time you connect your iOS device,\
    \ Photos ignores it.\n\nFollow these steps to convince Windows not to open the\
    \ AutoPlay dialog box each time you connect your iOS device:\n\n1.  Open the **Default\
    \ Programs** window:\n    *   Windows 10. In the taskbar's Search box, type **default**\
    \ and then click **Default Programs**.\n    *   Windows 8. In the Start screen,\
    \ type **default** and then click **Default Programs**.\n    *   Windows 7. Click\
    \ **Start** and then click **Default Programs** to open the **Default Programs**\
    \ window.\n2.  Click **Change AutoPlay settings**. The **AutoPlay** dialog box\
    \ appears.\n3.  In the **Devices** section, open the list for your iOS device\
    \ and choose **Take no action**, as shown in Figure 12-10.\n\n![A429116_1_En_12_Fig10_HTML.jpg](A429116_1_En_12_Fig10_HTML.jpg)\
