  trans: "\n# iOS 自动连接到了你不再想用的网络\n\n当你加入一个 Wi-Fi 网络时，iOS 会记住你的连接详情，并在下次进入该网络范围内时自动连接。这对于你想用的网络来说很方便，但对于你不再需要的网络来说却是个麻烦。一个常见的困境是，有多个网络可用，其中某一个更理想（例如，因为它更快或更便宜）。如果你之前连接过其他部分或全部网络，那么\
    \ iOS 很有可能会选择其中之一进行自动连接，让你不得不手动连接到你想要的那个网络，平添麻烦。\n\n**解决方案：** 让 iOS 忽略你不想使用的网络：\n\
    \n1.  打开 `设置` app，然后轻点 `无线局域网` 以打开 `无线局域网` 界面。\n2.  轻点你想忘记的网络右侧的蓝色 `更多信息` 图标。iOS\
    \ 会显示该网络的设置界面。\n3.  轻点 `忽略此网络`，如图 2-2 所示。iOS 会要求你确认。\n\n   ![A429116_1_En_2_Fig2_HTML.jpg](img/A429116_1_En_2_Fig2_HTML.jpg)\n\
    \n   **图 2-2.** 如果你不再想连接某个特定网络，请轻点 `忽略此网络` 按钮\n\n4.  轻点 `忽略`。iOS 会丢弃该网络的登录数据，并且不再自动连接到该网络。\n\
    \n## 你频繁收到加入附近 Wi-Fi 网络的提示\n\n默认情况下，当你的设备需要网络连接，而你又尚未连接到任何 Wi-Fi 网络时，iOS 会显示 `选取无线局域网`\
    \ 对话框，列出附近网络。然而，当你穿梭于城镇之间时，可能会发现随着新的 Wi-Fi 网络进入范围，这个对话框弹出得过于频繁（尽管 iOS 足够智能，当你快速移动时——例如开车时——不会弹出提示）。这些不断的提示既烦人又不便。\n\
    \n**解决方案：** 让 iOS 停止提示你加入附近网络。打开 `设置` app，轻点 `无线局域网`，然后将 `询问是否加入网络` 开关轻点至 `关闭`，如图\
    \ 2-3 所示。\n\n![A429116_1_En_2_Fig3_HTML.jpg](img/A429116_1_En_2_Fig3_HTML.jpg)\n\
    \n**图 2-3.** 要关闭加入附近 Wi-Fi 网络的不停提示，请将 `询问是否加入网络` 开关轻点至 `关闭`\n\n## 你想要连接到一个隐藏的\
    \ Wi-Fi 网络\n\n每个 Wi-Fi 网络都有一个网络名称——通常称为服务集标识符或 SSID——用于向 Wi-Fi 设备标识该网络。默认情况下，Wi-Fi\
    \ 网络会广播其网络名称，以便你在 `选取无线局域网` 对话框或 `设置` app 的 `无线局域网` 界面中看到它。然而，有些 Wi-Fi 网络会出于安全考虑禁用网络名称广播。这是为什么呢？其思路是，如果未经授权的用户看不到该网络，就无法尝试连接。（但是，当授权计算机连接时，某些设备仍然可以捕获网络名称，因此这并非万无一失的安全措施。）然而，如果你是授权用户，又如何连接一个你看不到的网络呢？\n\
    \n**解决方案：** 你可以通过手动输入连接设置来连接隐藏的 Wi-Fi 网络。你需要知道网络名称、其安全性和加密类型以及网络密码。操作步骤如下：\n\n\
    1.  打开 `设置` app，然后轻点 `无线局域网`。\n2.  在附近网络列表中，轻点 `其他`。iOS 会显示 `其他网络` 界面。\n3.  在\
    \ `名称` 文本框中输入网络名称。\n4.  轻点 `安全性` 以打开 `安全性` 界面，然后轻点该 Wi-Fi 网络使用的安全类型：`无`、`WEP`、`WPA`、`WPA2`、`WPA\
    \ 企业级` 或 `WPA2 企业级`。如果不确定，大多数安全网络都使用 `WPA2`。\n5.  轻点 `其他网络` 以返回 `其他网络` 界面。如果你选择了\
    \ `WEP`、`WPA`、`WPA2`、`WPA 企业级` 或 `WPA2 企业级`，iOS 会提示你输入网络密码。\n6.  在 `密码` 文本框中输入密码，如图\
    \ 2-4 所示。\n\n   ![A429116_1_En_2_Fig4_HTML.jpg](img/A429116_1_En_2_Fig4_HTML.jpg)\n\
    \n   **图 2-4.** 要加入隐藏网络，请输入网络名称，选择安全类型，然后输入密码\n\n7.  轻点 `加入`。iOS 会连接到该网络。\n\n\
    ## 你通过隔空投送发送文件时遇到问题\n\n你可以通过 iTunes 同步在 Mac 和 iOS 设备之间传输文件。但是，如果你只想将单个文件从一台设备发送到另一台，同步过程就显得大材小用了。相反，如果你的\
    \ Mac 运行的是 OS X Yosemite 或更高版本，你的 iPhone 运行的是 iOS 8 或更高版本，并且你的 Mac 和 iPhone 连接到同一个\
    \ Wi-Fi 网络，你可以使用一个名为 `隔空投送` 的工具在 Mac 和你的设备之间直接发送文件。\n\n但是，你可能会发现这两个设备互相看不到，或者文件无法传输。\n\
    \n**解决方案：** 如果你在 Mac 上看不到你的 iOS 设备，或者在 iOS 设备上看不到你的 Mac，请检查以下几点：\n\n*   确保你的 Mac\
    \ 和 iOS 设备都连接到同一个 Wi-Fi 网络。\n*   `隔空投送` 需要蓝牙和 Wi-Fi，因此请确保你的 Mac 和 iOS 设备都已启用蓝牙：\n\
    \    *   在 iOS 中，从屏幕底部向上轻扫以显示 `控制中心`，然后轻点以激活 `蓝牙` 图标。轻点 `控制中心` 外部以关闭它。\n    *\
    \   在 macOS（或 OS X）中，打开 `系统偏好设置`，点按 `蓝牙`，然后确保 `蓝牙` 设置为 `打开`。（如果显示 `关闭`，请点按 `打开蓝牙`。）\n\
    \n> **提示：** 如果在 iOS 中关闭了 Wi-Fi 和/或蓝牙，快速同时打开它们的方法是打开任何共享表单并轻点 `隔空投送` 图标。你也可以从屏幕底部向上轻扫以显示\
    \ `控制中心`，轻点 `隔空投送`，然后轻点 `仅限联系人`。轻点 `控制中心` 外部以关闭它。\n\n*   确保你的 iOS 设备和 Mac 彼此相距不超过\
    \ 33 英尺，这样它们才能通过蓝牙发现彼此。\n*   确保 iOS 设备已打开 `隔空投送`。从屏幕底部向上轻扫以显示 `控制中心`，轻点 `隔空投送`，然后轻点\
    \ `仅限联系人`（见图 2-5）。如果在 Mac 上仍然看不到你的设备，请改为轻点 `所有人`。\n\n  ![A429116_1_En_2_Fig5_HTML.jpg](img/A429116_1_En_2_Fig5_HTML.jpg)\n\
    \n  **图 2-5.** 在 iOS `控制中心`中，轻点 `隔空投送`，然后轻点 `仅限联系人` 或 `所有人`\n\n*   确保你的 Mac 可被发现。打开\
    \ `隔空投送` 窗口（在 `访达` 中，点按 `前往` 然后点按 `隔空投送`，或按下 `Shift+Cmd+R`）。在 `允许我被发现的方式` 列表中，选择\
    \ `仅限联系人`。如果仍然无法从 iOS 看到你的 Mac，请改为选择 `所有人`。\n*   如果你已将 `隔空投送` 设置为 `仅限联系人`，请确保你的\
    \ iOS 设备和 Mac 都已登录到同一个 iCloud 帐户。\n*   确保你的 iOS 设备和 Mac 都未处于睡眠模式。\n\n如果 `隔空投送`\
    \ 文件传输失败，请尝试这些解决方案。\n"
- fmt: "# Troubleshooting iOS and macOS Connectivity Issues\n\n- Make sure neither\
    \ your iOS device nor your Mac are in Do Not Disturb mode:\n  - In iOS, swipe\
    \ up from the bottom of the screen to display the Control Center, and then tap\
    \ to deactivate the Do Not Disturb icon.\n  - In OS X or macOS, click the Notifications\
    \ icon to display the Notification Center, click the Notifications tab, scroll\
    \ to the top of the tab, and then click to set the Do Not Disturb switch to Off.\n\
    - Make sure your iOS device doesn’t have the Personal Hotspot feature activated.\
    \ Open the Settings app, tap Personal Hotspot, and then tap the Personal Hotspot\
    \ switch to Off.\n- Do not try to send multiple files of different file types.\
    \ For example, while it’s okay to send two or more image files, you can’t send,\
    \ say, an image file and a PDF at the same time.\n- Make sure your Mac isn’t in\
    \ legacy mode, where it’s configured to only send files to Macs issued in 2012\
    \ or earlier. On the Mac, open the AirDrop window. If you see the text “Searching\
    \ for older Macs…,” click Cancel to exit legacy mode.\n- Make sure the Mac Firewall\
    \ isn’t configured to block all incoming connections. Open System Preferences,\
    \ click Security & Privacy, click Firewall, click the lock icon, and then enter\
    \ your Mac’s administrative password. Click to deactivate the Block all incoming\
    \ connections check box, if necessary, and then click OK.\n\nIf all else fails,\
    \ reset your iOS network settings. In the Settings app, tap General, tap Reset,\
    \ tap Reset Network Settings, and then when iOS asks you to confirm, tap Reset\
    \ Network Settings.\n\n## Troubleshooting Cellular Issues\n\nIf you have an iPhone\
    \ or an iPad with a cellular antenna, you know the freedom and efficiency of having\
    \ an always-on data connection as long as there’s a cellular network within range.\
    \ That convenience doesn’t come cheap, unfortunately, so most cellular problems\
    \ center around keeping your data and roaming charges in check. This section takes\
    \ you through these and other cellular-related problems.\n\n### You Can Send E-Mail\
    \ over Wi-Fi but Not over Cellular\n\nYou might find that you can send e-mail\
    \ messages just fine at home or at work, but e-mails sent while you’re walking\
    \ around town or in transit just sit in the Mail app’s Outbox. This feels like\
    \ a bug, but it’s actually a feature because many cellular providers don’t allow\
    \ mail to be sent through third-party servers. That’s not a problem when you’re\
    \ on Wi-Fi because your messages don’t get sent via the cellular network, but\
    \ as soon as you’re off Wi-Fi, the cellular network kicks in and your provider\
    \ prevents third-party messages from being sent.\n\nSolution: Your cellular provider\
    \ will have set up an outgoing server to handle sent messages, so you need to\
    \ set up that server as a secondary SMTP server for your e-mail account. iOS will\
    \ try sending messages using the account’s default server, but if that fails (when\
    \ you’re on the cellular network instead of a Wi-Fi network, for example), it\
    \ will fall back to the secondary server and your message will get sent.\n\nTo\
    \ set up a secondary SMTP server, follow these steps:\n\n1. Open the Settings\
    \ app and then tap Mail, Contacts, Calendars.\n2. Tap your e-mail account.\n3.\
    \ Tap your outgoing mail server.\n4. Tap Add Server.\n5. Enter your cellular provider’s\
    \ SMTP host name, as well as your user name and password.\n6. Tap Save.\n\n###\
    \ You Are Not Sure How Much Data You Are Using\n\nIf you’re using your iOS device\
    \ with a plan that comes with a maximum amount of monthly data and you exceed\
    \ that monthly cap, you’ll almost certainly pay big bucks for the privilege. To\
    \ avoid that, most cellular providers are kind enough to send you a message when\
    \ you approach your cap. However, if you don’t trust that process, or if you’re\
    \ just paranoid about these things (justly, in my view), then you might prefer\
    \ to keep an eye on your data usage yourself.\n\nSolution: iOS keeps track of\
    \ the cellular network data it has sent or received, as well as the roaming data\
    \ it has sent or received if you’ve used your iPhone out of your coverage area.\
    \ First, take a look at your most recent bill from your cellular provider and,\
    \ in particular, look for the dates the bill covers. For example, the bill might\
    \ run from the 24th of one month to the 23rd of the next month. This is important\
    \ because it tells you when you need to reset the usage data on your device.\n\
    \nNow follow these steps to check your cellular data usage:\n\n1. Open the Settings\
    \ app and then tap Cellular to display the Cellular screen.\n2. In the Cellular\
    \ Data Usage section, read the Current Period and Current Period Roaming values\
    \ (see Figure [2-6](#A429116_1_En_2_Chapter.html#Fig6)).\n\n   ![A429116_1_En_2_Fig6_HTML.jpg](A429116_1_En_2_Fig6_HTML.jpg)\n\
    \n   Figure 2-6. Read the values in the Cellular Data Usage section\n\n3. If you’re\
    \ at the end of your data period, tap Reset Statistics at the bottom of the screen\
    \ to start with fresh values for the new period.\n\n### You Want to Prevent Your\
    \ iOS Device from Using Cellular Data\n\nIf you’ve reached the limit of your cellular\
    \ data plan, you almost certainly want to avoid going over the cap because the\
    \ charges are usually prohibitively expensive. As long as you have a Wi-Fi network\
    \ in range, or you’re disciplined enough not to surf the Web or cruise YouTube\
    \ when there’s no Wi-Fi in sight, you’ll be okay. Still, accidents can happen.\
    \ For example, you might accidentally tap a link in an e-mail message or text\
    \ message, or someone in your household might use your phone without knowing about\
    \ your restrictions.\n\nSolution: To prevent these sorts of accidents (or if you\
    \ simply don’t trust yourself when it comes to YouTube), you can turn off cellular\
    \ data altogether, which means your device accesses Internet data only if it has\
    \ a Wi-Fi signal. To turn off cellular data on your iOS device, open the Settings\
    \ app, tap Cellular, and then tap the Cellular Data switch to Off.\n\n### You\
    \ Want More Control over How Your iOS Device Uses Cellular Data\n\nRather than\
    \ turning off cellular data completely, as I described in the previous section,\
    \ you can take a more targeted approach. For example, if you’re a bit worried\
    \ about going over your cellular plan’s data ceiling, it makes sense to avoid\
    \ relatively high-bandwidth items, such as FaceTime and iTunes, but not relatively\
    \ low-bandwidth content, such as iCloud documents and the Safari reading list.\n\
    \nSolution: You could just police this yourself but, hey, you’re a busy person\
    \ and you might forget the next time a FaceTime call comes in and you’re in a\
    \ cellular-only neighborhood. I say leave the details to iOS by configuring it\
    \ to not allow certain content types over a cellular connection. To do that, open\
    \ the Settings app and tap Cellular. In the Use Cellular Data For section, shown\
    \ in Figure [2-7](#A429116_1_En_2_Chapter.html#Fig7), tap the switch to Off for\
    \ each type of content you want to ban from cellular.\n\n![A429116_1_En_2_Fig7_HTML.jpg](A429116_1_En_2_Fig7_HTML.jpg)\n\
    \nFigure 2-7. Tap the switch to Off beside each app you want to keep off your\
    \ cellular connection"
