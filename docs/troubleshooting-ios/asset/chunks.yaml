  trans: "\n# 你想要通过播放声音定位丢失的设备\n\n在地图上定位丢失的设备通常很方便（例如，它可能显示你的设备在家中或工作场所），但大多数时候，它不够具体，无法准确告诉你设备在哪里。\n\
    \n如果你把 iPhone 放错了地方，首先要尝试的是用另一部设备拨打你的号码，这样你就能听到手机铃声。\n\n但如果你手机开启了静音模式、飞行模式，或者手头没有其他设备，这种方法就行不通了。如果无论如何都能在\
    \ iPhone 上听到声音就好了，同样，如果能听到丢失的 iPad 或 iPod touch 发出声音也不错。\n\n解决方案：你可以使用“查找我的 iPhone”在设备上播放声音。即使你的\
    \ iOS 设备处于静音模式或飞行模式，这个声音也会播放；即使设备音量已调低或静音，它也会大声播放。操作步骤如下：\n\n1.  登录 iCloud 并打开“查找我的\
    \ iPhone”应用。\n2.  显示“我的设备”列表。\n3.  在列表中点击你丢失的 iOS 设备。“查找我的 iPhone”会在地图上定位你的 iOS\
    \ 设备。\n4.  点击“播放声音”。“查找我的 iPhone”开始在设备上播放声音并显示一条提醒信息。\n5.  找到你的 iOS 设备后，在提醒信息中轻点“好”（如果需要，输入你的密码或使用触控\
    \ ID）来关闭声音。\n\n# 你想要锁定丢失设备上的数据\n\n如果通过播放声音无法立即找到你的 iOS 设备，下一步应该是确保其他发现该设备的人无法翻看你的私密内容。\n\
    \n解决方案：你可以将 iOS 设备置于丢失模式，该模式会使用你之前设置的密码远程锁定 iOS 设备。（如果你没有为 iOS 设备设置密码保护，则无法远程锁定设备。）你还可以提供一个联系电话号码，并为找到你\
    \ iOS 设备的人发送一条信息。\n\n按照以下步骤将 iOS 设备置于丢失模式：\n\n1.  登录 iCloud 并打开“查找我的 iPhone”应用。\n\
    2.  显示“我的设备”列表。\n3.  在列表中点击你丢失的 iOS 设备。“查找我的 iPhone”会在地图上定位该设备。\n4.  点击“丢失模式”。“查找我的\
    \ iPhone”会显示“丢失模式”对话框，提示你输入一个可以联系到你的电话号码。\n5.  输入你的电话号码，然后点击“下一步”。“查找我的 iPhone”提示你输入一条信息，该信息将与电话号码一起显示在\
    \ iOS 设备上。\n6.  输入信息，然后轻点或点击“完成”。“查找我的 iPhone”远程锁定 iOS 设备并显示这条信息。\n\n**警告**\n\n\
    如果你的设备已被锁定但仍未找到，请留意是否有邮件或短信告知你设备已找到。当你点击链接时，系统会要求你提供 Apple 登录凭证。这看起来像是一条合法的 Apple\
    \ 消息，但实际上是一个旨在获取你 Apple ID 登录信息的骗局，以便骗子解锁你的设备。\n\n# 你想要擦除丢失设备上的数据\n\n如果你无法让对方归还你的\
    \ iOS 设备，并且设备包含敏感或机密数据，你可能需要采取进一步措施，确保对方无法访问你的数据。\n\n解决方案：你可以使用“查找我的 iPhone”采取严厉措施，远程擦除\
    \ iOS 设备上的所有数据。请按照以下步骤操作：\n\n1.  登录 iCloud 并打开“查找我的 iPhone”应用。\n2.  显示“我的设备”列表。\n\
    3.  在列表中点击你丢失的 iOS 设备。“查找我的 iPhone”会在地图上定位该设备。\n4.  点击“抹掉此设备”（其中“设备”指 iPhone、iPad\
    \ 或 iPod）。“查找我的 iPhone”会提示你输入 Apple ID 密码。\n5.  输入你的密码，然后点击“下一步”。“查找我的 iPhone”要求你输入一个可选的联系电话号码，该号码会在设备被抹掉后显示在\
    \ iOS 设备上。\n6.  输入你的电话号码，然后点击“下一步”。“查找我的 iPhone”提示你输入一条信息，该信息会在设备被抹掉后与电话号码一同显示。\n\
    7.  输入信息，然后点击“完成”。“查找我的 iPhone”会远程擦除 iOS 设备上的所有数据。\n\n**注意**\n\n如果你在擦除设备后找到了它，你可以将设备连接到电脑，然后使用\
    \ iTunes 恢复最新的备份来恢复你的设置、应用和数据。\n\n# 9. 解决隐私问题\n\n移动设备革命带来的一个意想不到的后果是，我们现在经常在公共场合使用计算机。是的，长期以来一直有人在咖啡店里敲击笔记本电脑，但如今我们更有可能在公交车、公园、电影放映前或课后使用手机和平板电脑。这意味着隐私成为一个潜在问题，因为现在人们可以在我们工作时看到我们的屏幕。移动设备革命的另一个意外后果是，我们现在随身携带大量个人或机密信息。这带来了另一个潜在的隐私问题：如果有人能够访问你的设备，那个人就可以随意查看你的应用、常去地点、浏览历史等等。在第\
    \ 8 章中，你学会了如何锁定你的 iOS 设备，但并不难想象有人在你设备未锁定时仍能访问它的场景。这一切意味着，认真对待隐私问题，并保持一种审慎的警惕心态至关重要：假设在公共场合有人正盯着你的屏幕；假设有人可以在设备未锁定时访问它。本章将向你展示如何采取措施解决这些及类似的隐私问题。\n\
    \n## 解决通用隐私问题\n\n让我们从解决一些与通用隐私问题相关的问题开始。\n\n### 输入时每个字符都会弹出，造成隐私风险\n\niPhone 屏幕键盘有一个名为“字符预览”的功能，它在点击每个字符时会显示该字符的弹出版本。（iPad\
    \ 上不会出现此情况。）这对 iOS 键盘新手来说很棒，因为它能帮助他们确认输入准确，但老手往往会觉得它分散注意力。无论如何，当你在任何附近的人都能看到屏幕的地方输入时，每个字符弹出都会带来潜在的隐私风险。\n\
    \n解决方案：Apple 在 iOS 9 中默认关闭了字符预览，但如果你在 iPhone 上输入时看到字符弹出，则需要自己将其关闭，步骤如下：\n\n1.\
    \  打开“设置”应用。\n2.  轻点“通用”。\n3.  轻点“键盘”。\n4.  将“字符预览”开关拨至关闭位置，如图 9-1 所示。\n\n   \
    \ ![A429116_1_En_9_Fig1_HTML.jpg](img/A429116_1_En_9_Fig1_HTML.jpg)\n\n    图 9-1.\
    \ 为防止输入时字符弹出，请关闭“字符预览”设置\n\n**警告**\n\n即使“字符预览”设置为开启状态，iOS 也不再显示密码字符的弹出版本。这很好，但它仍会在最多三秒内显示你最新点击的密码字符！无法关闭此功能，因此在公共场所输入密码时，请尽量遮挡。"
- fmt: "### You Want to Stop an App from Using Another App's Data\n\nThird-party apps\
    \ occasionally request permission to use the data from another app. For example,\
    \ an app might need access to your contacts, your calendars, your photos, or your\
    \ Twitter and Facebook accounts. You can always deny these requests, of course,\
    \ but if you've allowed access to an app in the past, you might later change your\
    \ mind and decide you'd prefer to revoke that access.\n\n**Solution:** iOS offers\
    \ a privacy feature that enables you to control which apps have access to your\
    \ data. Here's how it works:\n\n1.  Open the `Settings` app.\n2.  Tap `Privacy`.\
    \ The `Privacy` screen appears.\n3.  Tap the app or feature for which you want\
    \ to control access. iOS displays a list of third-party apps that have requested\
    \ access to the app or feature. Figure [9-2](#A429116_1_En_9_Chapter.html#Fig2)\
    \ shows an example for the `Photos` app.\n\n    ![A429116_1_En_9_Fig2_HTML.jpg](A429116_1_En_9_Fig2_HTML.jpg)\n\
    \    Figure 9-2. In `Settings`, tap `Privacy` and then tap an app or feature to\
    \ see the third-party apps that have requested access to that item\n\n4.  To revoke\
    \ a third-party app's access to the app or feature, tap its switch to `Off`.\n\
    \n### You Do Not Want Your Location Tracked\n\nIn iOS, `Location Services` refers\
    \ to the features and technologies that provide apps and system tools with access\
    \ to the current geographical coordinates of the device. This is a handy thing,\
    \ but it's also something that you need to keep under your control because your\
    \ location data, particularly your current location, is fundamentally private\
    \ and shouldn't be given out `willy-nilly`. Fortunately, iOS comes with a few\
    \ tools for controlling and configuring `Location Services`.\n\nThe next couple\
    \ of sections show you how to turn off `Location Services` for individual apps\
    \ as well as individual system services. That fine-grained control is the best\
    \ way to handle `Location Services`, but there may be times when you prefer a\
    \ broader approach that turns off `Location Services` altogether. For example,\
    \ if you're heading to a secret rendezvous (how exciting!) and you're bringing\
    \ your iOS device with you, you might feel more comfortable knowing that no app\
    \ or service on your device is tracking your whereabouts.\n\n**Note**\n\nOn a\
    \ more mundane level, `Location Services` use up battery power, so if your iOS\
    \ device is getting low or if you just want to maximize the battery (for a long\
    \ bus ride, for example), then turning off `Location Services` completely will\
    \ help.\n\n**Solution:** Follow these steps to turn off all `Location Services`\
    \ on your iOS device:\n\n1.  Open the `Settings` app.\n2.  Tap `Privacy`. The\
    \ `Privacy` settings appear.\n3.  Tap `Location Services`. The `Location Services`\
    \ settings appear.\n4.  Tap the `Location Services` switch to the `Off` position.\
    \ iOS asks you to confirm.\n5.  Tap `Turn Off`. iOS shuts off all `Location Services`\
    \ (see Figure [9-3](#A429116_1_En_9_Chapter.html#Fig3)).\n\n    ![A429116_1_En_9_Fig3_HTML.jpg](A429116_1_En_9_Fig3_HTML.jpg)\n\
    \    Figure 9-3. To prevent your location from being used by any app or service,\
    \ set the `Location Services` switch to `Off`\n\n### You Want to Stop an App from\
    \ Using Your Location\n\nWhen you open an app that comes with a GPS component,\
    \ the app displays a dialog like the one shown in Figure [9-4](#A429116_1_En_9_Chapter.html#Fig4)\
    \ to ask your permission to use the GPS hardware in your device to determine your\
    \ current location. Notice that iOS only allows apps to access your location while\
    \ you use the app. Once you exit the app, it can no longer access your location.\
    \ Tap `Don't Allow` if you think that your current location is none of the app's\
    \ business, or tap `Allow` if that's just fine with you.\n\n![A429116_1_En_9_Fig4_HTML.jpg](A429116_1_En_9_Fig4_HTML.jpg)\n\
    Figure 9-4. When you first launch a GPS-aware app, it asks your permission to\
    \ access your current location while you use the app\n\nA slightly different scenario\
    \ is when an app must use your location to function. A good example is `Foursquare`,\
    \ which requires your location to show you nearby businesses and to let you \"\
    check in\" to those places. In this case, iOS automatically gives the app access\
    \ to your location while you're using the app, but the app might request access\
    \ to your location even when you're not using it, as shown in Figure [9-5](#A429116_1_En_9_Chapter.html#Fig5).\
    \ Again, tap `Don't Allow` if you think the app is overstepping its bounds, or\
    \ tap `Allow` if it's all good.\n\n![A429116_1_En_9_Fig5_HTML.jpg](A429116_1_En_9_Fig5_HTML.jpg)\n\
    Figure 9-5. An app that must access your location while you use the app might\
    \ also seek permission to access your location when you're not using it\n\nWhatever\
    \ type of permission you choose, after you make your decision, you might change\
    \ your mind. For example, if you deny your location to an app, that app might\
    \ lack some crucial functionality. Similarly, if you allow an app to use your\
    \ location, you might have second thoughts about compromising your privacy.\n\n\
    **Solution:** Whatever the reason, you can control an app's access to your location\
    \ by following these steps:\n\n1.  Open the `Settings` app.\n2.  Tap `Privacy`.\
    \ The `Privacy` settings appear.\n3.  Tap `Location Services`. The `Location Services`\
    \ screen appears.\n4.  Tap the app for which you want to configure access to GPS.\
    \ The app's location access options appear. Figure [9-6](#A429116_1_En_9_Chapter.html#Fig6)\
    \ shows the options for the `Foursquare` app.\n\n    ![A429116_1_En_9_Fig6_HTML.jpg](A429116_1_En_9_Fig6_HTML.jpg)\n\
    \    Figure 9-6. Use these options to configure an app's access to your location\n\
    \n5.  Tap one of the following options to configure the app's access to your location:\n\
    \    - `Never`. Tap this option if you want to deny your current location to the\
    \ app.\n    - `While Using the App`. Tap this option if you want to allow a specific\
    \ app to access your current location only when you are actively using the app.\n\
    \    - `Always`. Tap this option if the app requires your location to function\
    \ even when you're not using it. (Note that this option is only available for\
    \ apps that require full-time access to GPS.)\n\n### You Want to Stop One or More\
    \ System Services from Using Your Location\n\niOS also provides `Location Services`\
    \ to various internal system services that perform tasks, such as calibrating\
    \ the compass, setting the time zone, and serving up Apple Ads that change depending\
    \ on location data. You might prefer that iOS not provide your location to one\
    \ or more of these services.\n\n**Solution:** If you don't want iOS providing\
    \ your location to some of these services, you can prevent this by following these\
    \ steps:\n\n1.  Open the `Settings` app.\n2.  Tap `Privacy`. The `Privacy` screen\
    \ appears.\n3.  Tap `Location Services`. The `Location Services` screen appears.\n\
    4.  Tap `System Services`. iOS displays the `System Services` screen. The iPhone\
    \ version of this screen is shown in Figure [9-7](#A429116_1_En_9_Chapter.html#Fig7).\n\
    \n    ![A429116_1_En_9_Fig7_HTML.jpg](A429116_1_En_9_Fig7_HTML.jpg)\n    Figure\
    \ 9-7. Tap the switch to `Off` beside any system service that you want to deny\
    \ access to your location\n\n5.  For any system service to which you don't want\
    \ to provide access to location data, tap its switch to `Off`.\n\n**Tip**\n\n\
    It's also important to know when a system service is using your location. To set\
    \ this up, scroll to the bottom of the `System Services` screen and tap the `Status\
    \ Bar Icon` switch to `On`. iOS will now use the status bar to display one of\
    \ the icons shown above this switch whenever a system service is using your location."
