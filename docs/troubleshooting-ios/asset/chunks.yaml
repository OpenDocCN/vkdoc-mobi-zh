  trans: "\n### 您收到大量垃圾邮件\n\n遗憾的是，如今已不存在完全免受垃圾邮件侵扰的区域。只要您拥有基于互联网的电子邮件账户，就一定会收到垃圾邮件，仅此而已。事实上，您很可能每天收到的垃圾邮件不是一两封，而是一两打。这并不奇怪，因为如今垃圾邮件已占据每天发送的数十亿封邮件中的大多数，在某些日子里甚至占到所有发送邮件的\
    \ 90%！互联网服务提供商和电子邮件托管公司过滤垃圾邮件的能力在不断提升，但这些防御措施仍然不够完善。\n\n**解决方案：** 虽然无法完全避免垃圾邮件，但您可以采取一些措施来尽量减少每天需要处理的垃圾邮件数量：\n\
    \n- 切勿在论坛或博客评论中输入您的真实电子邮件地址。垃圾邮件发送者收集地址的最常见方法就是从网络帖子中获取。一种常用的策略是修改您的电子邮件地址，例如添加一些使地址无效但他人仍能轻易识别的文字。示例如下：`yourname@yourisp.remove-this-to-email-me.com`。\n\
    - 考虑创建一个专门用于登录、邮件列表、新闻简报及其他网络用途的电子邮件地址。这个地址最终很可能也会收到垃圾邮件，但总比让您的主邮箱沦陷要好。\n- 如果您在收件箱中看到确定是垃圾邮件的邮件，请勿点开它。这样做有时会通知垃圾邮件发送者您已打开邮件，从而确认您的地址是有效的。您可以通过禁用远程图片来防止这种情况，具体方法将在下一节介绍。\n\
    \n> **提示：** 如果您在收件箱中发现明确的垃圾邮件，可以直接删除而无需点开。只需在邮件上向左短划，然后点击`废纸篓`，或者向左长划直至邮件从收件箱中消失。\n\
    \n- 切勿回复垃圾邮件。即使邮件中包含声称是“退订”地址的链接，也不要回复。回复垃圾邮件会证明您的地址是有效的，最终只会招致更多的垃圾邮件。\n- 如果您的某个邮箱收到了大量垃圾邮件，可以考虑宣布“垃圾邮件破产”，并删除该账户——不仅从您的\
    \ iOS 设备上删除，还要从您的互联网服务提供商或邮件托管商处删除。\n\n### 您想禁用邮件中的远程图片\n\n网络爬虫是一种驻留在远程服务器上的图片，它通过在\
    \ HTML 格式的电子邮件中引用远程服务器地址来加入邮件中。当您打开邮件时，`邮件`应用会使用该地址下载图片并显示在邮件内。这听起来似乎无害，但如果邮件是垃圾邮件，这个地址很可能也包含您的电子邮件地址或指向您电子邮箱的代码。因此，当远程服务器收到加载图片的请求时，它不仅能知道您已打开邮件，还能确认您的邮箱地址是有效的。所以，垃圾邮件发送者会频繁使用网络爬虫也就不足为奇了，因为对他们来说，有效的邮箱地址如同金子一般珍贵。\n\
    \n**解决方案：** iOS 的“邮件”应用默认会显示远程图片。要禁用远程图片，请按照以下步骤操作：\n\n1. 在主屏幕上，点击`设置`。iOS 将打开`设置`应用。\n\
    2. 点击`邮件`以打开`邮件`设置屏幕。\n3. 将`载入远程图像`开关滑动至`关闭`位置，如图 5-7 所示。`邮件`应用将保存此设置，不再在您的电子邮件中显示远程图片——尤其是网络爬虫。\n\
    \n   ![A429116_1_En_5_Fig7_HTML.jpg](img/A429116_1_En_5_Fig7_HTML.jpg)\n\n   **图\
    \ 5-7.** 要屏蔽网络爬虫，请将`载入远程图像`开关滑动至`关闭`位置\n\n> **提示：** 要在非垃圾邮件中显示远程图片，请点击该邮件，然后点击`载入所有图像`。\n\
    \n### 您不再希望邮件应用按主题整理邮件\n\n在`邮件`应用中，您的邮件会按主题进行分组，这意味着原始邮件及其所有回复都集中在该账户的`收件箱`文件夹中。\n\
    \n按主题整理邮件通常很方便，但并非总是如此。例如，如果您使用 iPhone 或 iPod touch，有时您可能通过点击`下一封`（右箭头）和`上一封`（左箭头）按钮来浏览邮件。当您遇到一个主题对话时，`邮件`应用会跳入该对话中，然后您需要在其中逐封浏览邮件，如果该对话包含大量回复，这会非常麻烦。\n\
    \n**解决方案：** 如果您发现主题对话带来的麻烦大于便利，可以按照以下步骤将`邮件`应用配置为不再按主题整理邮件：\n\n1. 在主屏幕上，点击`设置`。iOS\
    \ 将打开`设置`应用。\n2. 点击`邮件`以打开`邮件`设置屏幕。\n3. 将`按主题整理`开关滑动至`关闭`位置。\n\n### 已删除的邮件正在从废纸篓文件夹中移除\n\
    \n当您删除一封邮件时，`邮件`应用并不会完全移除该邮件，而只是将其转移到该账户的`废纸篓`文件夹。这很有用，因为如果您误删了邮件，可以在`废纸篓`文件夹中找到它，并将其移回`收件箱`（或其原始文件夹）。也就是说，只要邮件仍在`废纸篓`文件夹中，您就可以恢复它。不幸的是，`邮件`应用会将每个账户配置为一周后自动删除`废纸篓`文件夹中的项目。\n\
    \n**解决方案：** 请按照以下步骤来控制`邮件`应用何时从`废纸篓`文件夹中删除邮件：\n\n1. 在主屏幕上，点击`设置`以显示`设置`应用。\n2.\
    \ 点击`邮件`以显示`邮件`设置屏幕。\n3. 点击您想要配置的账户。\n4. 显示该账户的高级邮件选项：\n   - 对于 iCloud 账户，点击`邮件`，然后点击`高级`。\n\
    \   - 对于 POP 账户，点击`高级`。\n   - 对于大多数其他账户类型，点击`账户`，然后点击`高级`。\n5. 点击`移除`以打开`移除`屏幕。\n\
    6. 点击`永不`以防止`邮件`应用自动从该账户的`废纸篓`文件夹中移除邮件，如图 5-8 所示。\n\n   ![A429116_1_En_5_Fig8_HTML.jpg](img/A429116_1_En_5_Fig8_HTML.jpg)\n\
    \n   **图 5-8.** 在`移除`屏幕中，点击`永不`可防止`邮件`应用自动从该账户的`废纸篓`文件夹中删除邮件\n\n### 您看不到“所有收件箱”文件夹\n\
    \n如果您在 iOS 中设置了多个账户，`邮件`应用会包含一个名为`所有收件箱`的文件夹，它会显示您所有账户中收到的邮件合并列表。在升级 iOS 后，此文件夹有时会消失。\n\
    \n**解决方案：** 请按照以下步骤将`所有收件箱`文件夹恢复到`邮件`界面中：\n\n1. 在`邮件`应用中，显示`邮箱`屏幕。\n2. 点击`编辑`。\n\
    3. 点击`所有收件箱`项目以将其激活，如图 5-9 所示。\n\n   ![A429116_1_En_5_Fig9_HTML.jpg](img/A429116_1_En_5_Fig9_HTML.jpg)\n\
    \n   **图 5-9.** 要将`所有收件箱`文件夹恢复到`邮箱`屏幕，请点击`编辑`，然后点击以激活`所有收件箱`项目\n4. 点击`完成`。\n"
- fmt: "# 6\\. Fixing Phone Troubles\n\nMost of the chapters in this book focus on\
    \ the data-related features of iOS and its devices: Wi-Fi, apps, the Web, email,\
    \ photos, and so on. That’s apt because our iOS devices are computers, after all,\
    \ so it makes sense to concentrate on troubleshooting computing tasks. But the\
    \ iPhone is different. Sure, it makes an excellent mobile computer, but at its\
    \ heart it’s also a mobile phone. And while it’s true that the phone call is beginning\
    \ to feel more than a little like an anachronism, the “phone” part of this smartphone\
    \ is still used by almost every iPhone owner, even those in their twenties. (A\
    \ recent Pew Research poll found that 93 percent of smartphone owners aged 18\
    \ to 29 had used either voice or video calling.) The phone call’s enduring appeal\
    \ comes from a number of factors: it’s immediate (assuming the other person picks\
    \ up!), intimate, and efficient. But all this only applies if the iPhone’s calling\
    \ features are working properly and you know how to get the most out of them.\
    \ This chapter looks at a few common calling concerns and shows you how to fix\
    \ them or work around them.\n\n## Troubleshooting Incoming Calls\n\n### You Need\
    \ to Silence an Incoming Call\n\nWhen a call comes in, there might be times when\
    \ you can’t answer the phone right away. For example, if you’re in a meeting,\
    \ you might prefer to leave the room before answering the call to disturb the\
    \ other meeting participants as little as possible. Of course, if the phone keeps\
    \ ringing while you’re making your way to the door, then you’re still disturbing\
    \ everyone.\n\nSolution: As soon as you hear the incoming call, press the `Sleep/Wake`\
    \ button once. This temporarily turns off the ringer, meaning that you still have\
    \ the standard number of rings to answer, should you decide to. If you don’t answer,\
    \ your iPhone sends the call to your voicemail.\n\n### You Can’t Adjust the Volume\
    \ of the Ringer Using the Volume Buttons\n\nRather than silencing an incoming\
    \ call you might prefer just to turn the volume down a bit. However, when you\
    \ press the `Volume Down` button on the side of the device, the ringer stays at\
    \ the same volume.\n\nSolution: If you can't turn the volume of the ringer up\
    \ or down using the volume buttons, it means this feature has been disabled. To\
    \ turn it back on, follow these steps:\n\n1.  Open the `Settings` app.  \n2. \
    \ Tap `Sounds`.  \n3.  Tap the `Change with Buttons` switch to `On`, as shown\
    \ in Figure [6-1](#A429116_1_En_6_Chapter.html#Fig1).\n\n    ![A429116_1_En_6_Fig1_HTML.jpg](A429116_1_En_6_Fig1_HTML.jpg)\n\
    \n    Figure 6-1.\n\n    Tap the `Change with Buttons` switch to `On` to control\
    \ the ringer volume using the iPhone's volume buttons  \n\nCaution\n\nOn the other\
    \ hand, locking the ringer volume is a good idea because it prevents one of the\
    \ major iPhone frustrations: missing a call because the ringer volume has been\
    \ muted accidentally (for example, by your iPhone getting jostled in a purse or\
    \ pocket).\n\n### You Want to Send an Incoming Call Directly to Voicemail\n\n\
    You receive a phone call on your iPhone, but you can't answer it right now. However,\
    \ you also don’t want to disturb your neighbors by letting the phone ring until\
    \ voicemail kicks in.\n\nSolution: Use any of the following techniques:\n\n* \
    \  If the phone isn’t locked, tap the red `Decline` button on the touchscreen.\n\
    *   If you’re using the EarPods, squeeze and hold the center button for two seconds.\n\
    *   Press the `Sleep/Wake` button twice in quick succession.\n\nWhichever method\
    \ you use, iOS sends the call directly to voicemail. Note, however, that if you\
    \ change your mind, you won’t be able to answer the call.\n\n### You want to Be\
    \ Able to Answer a Call Using Another Device\n\nIt has happened to all of us:\
    \ you’re in one room when you hear your iPhone ring in another room, and a mad\
    \ dash ensues to try and answer the call before it goes to voicemail. It would\
    \ be nice if that mad dash didn’t have to take place and you could just answer\
    \ the call using a handy iPad or Mac that’s on the same Wi-Fi network as your\
    \ iPhone.\n\nSolution: iOS supports a feature that enables you to answer incoming\
    \ calls on your other devices, including iPads, iPhones, and even Macs. To ensure\
    \ this feature is activated and to control which devices you can use to answer\
    \ calls, follow these steps:\n\n1.  Open the `Settings` app, and then tap `Phone`\
    \ to display the `Phone` settings.  \n2.  Tap `Calls on Other Devices`. If you\
    \ don’t see this setting, see the next problem.  \n3.  Make sure the `Allow Calls\
    \ on Other Devices` switch is set to `On`, as shown in Figure [6-2](#A429116_1_En_6_Chapter.html#Fig2).\n\
    \n    ![A429116_1_En_6_Fig2_HTML.jpg](A429116_1_En_6_Fig2_HTML.jpg)\n\n    Figure\
    \ 6-2.\n\n    Tap the `Allow Calls on Other Devices` switch to `On`, then tap\
    \ the switch to `On` beside each device you want to use to answer calls  \n4.\
    \  In the list of devices, tap the switch to `On` for each device that you want\
    \ to use to answer calls.\n\n### You Can’t Access the Calls on Other Devices Setting\n\
    \nIf you want to configure your iPhone to allow calls to appear on other iOS devices,\
    \ you might find that the setting doesn’t appear when you tap `Phone` in the `Settings`\
    \ app.\n\nSolution: You must be signed in to both iCloud and FaceTime using the\
    \ same Apple ID before the `Calls on Other Devices` setting will appear. Follow\
    \ these steps to sign in to these services:\n\n1.  Open the `Settings` app.  \n\
    2.  Tap `iCloud`.  \n3.  If you are not already signed in to iCloud, type your\
    \ Apple ID email address and password, then tap `Sign In`.  \n4.  Tap `Settings`\
    \ to return to the main `Settings` screen.  \n5.  Tap `FaceTime` to open the `FaceTime`\
    \ settings.  \n6.  Tap the `FaceTime` switch to `On`.  \n7.  If you are not signed\
    \ in, tap `Use your Apple ID for FaceTime`, type your Apple ID email address and\
    \ password, then tap `Sign In`."
