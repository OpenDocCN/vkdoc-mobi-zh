  trans: "\n### 无法启动 iOS 时的恢复出厂设置\n\n在极少数情况下，你的 iOS 设备会彻底失控，不仅`iTunes`无法识别该设备，甚至无法启动\
    \ iOS。如果出现这种情况，你仍然可以恢复所有内容，但必须使用一种名为设备固件升级（`DFU`）的特殊硬件模式。此模式实质上是绕过手机上当前安装的操作系统（这很好，因为在这种情况下你当前的操作系统已经报废），并指示`iTunes`安装一个全新出厂版本的\
    \ iOS。然后，你可以按照本章前面所述的方法（参见“从备份恢复你的设备”）来恢复你的数据。\n\n请按照以下步骤将你的设备置于`DFU`模式：\n\n1.\
    \  关闭设备电源。\n2.  将设备连接到你的 Mac 或 Windows PC。\n3.  启动`iTunes`。\n4.  同时按住`睡眠/唤醒`按钮和`主屏幕`按钮，保持整整\
    \ 10 秒钟。\n5.  10 秒后，松开`睡眠/唤醒`按钮，但继续按住`主屏幕`按钮，再保持 10 秒钟。\n6.  10 秒后，松开`主屏幕`按钮。此时`iTunes`会识别出你的设备，并显示如图\
    \ 1-5 所示的对话框。\n\n    ![A429116_1_En_1_Fig5_HTML.jpg](img/A429116_1_En_1_Fig5_HTML.jpg)\n\
    \n    图 1-5. 当你在`DFU`模式下启动 iOS 设备时，`iTunes`会识别该设备并显示此对话框，提示你进行恢复。\n\n7.  点击`好`。\n\
    8.  点击`恢复设备`（其中`设备`指`iPhone`、`iPad`或`iPod`）。`iTunes`会要求你确认是否要恢复。\n9.  点击`恢复并更新`。`iTunes`会下载并安装\
    \ iOS，然后将你的设备恢复到出厂默认设置。\n\n### 抹掉你的设备\n\n如果恢复出厂设置未能解决问题，那么可能是某些顽固的内容导致了问题。在这种情况下，你不仅需要重置所有\
    \ iOS 设置，还需要重置所有内容。操作方法如下：\n\n1.  轻点`设置`。\n2.  轻点`通用`。\n3.  轻点`还原`。\n4.  轻点`抹掉所有内容和设置`。\n\
    5.  如果设置了设备密码，请输入密码。\n6.  当 iOS 要求你确认时，轻点`抹掉设备`（其中`设备`指`iPhone`、`iPad`或`iPod`）。\n\
    \n警告\n\n除非你确实想要从原始设置和无内容的状态重新开始，否则只有在你的设备已备份的情况下才能运行“抹掉所有内容和设置”命令。请参见第 8 章“保护你的设备”。\n\
    \n# 2. 修复网络和蜂窝网络故障\n\n你的 iOS 设备让你在离线状态下也能执行大量令人满意的、有趣且有用的任务。你可以玩游戏、阅读已保存的文章、收听已下载的音乐或播客、阅读电子书、更新联系人等等。但是，iOS\
    \ 和 iPhone、iPad 以及 iPod touch 只有在能够通过 Wi-Fi 网络或蜂窝信号访问外部世界时才真正大放异彩。建立连接后，你可以上网冲浪、收发邮件、发消息、发帖、上传、下载，以及执行所有其他在线活动——这些正是当今互联生活方式的标志性行为。\n\
    \n唉，如果你在将 iOS 设备连接到网络时遇到困难，你可能不得不回到令人满意但受限的离线娱乐世界。即使你能上网，iOS 处理网络或蜂窝连接的方式也可能让你头疼。本章将带你了解许多连接问题，并提供解决方案，帮助你让\
    \ iOS 和你的网络再次顺畅运行。\n\n## 解决 Wi-Fi 问题\n\n如果你的网络变成了“非网络”（有些人也把瘫痪的网络称为“无网络”），本章提供了一些可能有用的解决方案。不过，我并没有声称这里的内容是全面的；毕竟，大多数网络问题都是由多种因素共同造成的，相对比较复杂，难以复现。相反，我只是介绍一些排查问题的一般策略，并为一些最常见的网络故障提供解决方案。\n\
    \n### 你无法访问 Wi-Fi 网络：第一部分\n\n如果你在连接本地 Wi-Fi 网络时遇到问题，问题可能出在你的设备上，也可能出在网络本身。（这里我假设你拥有该网络的密码——如果需要的话。）我们在第一部分先假设问题出在你的设备上。\n\
    \n解决方案：先关闭 Wi-Fi 天线，然后再重新打开。这会重置天线，通常足以使连接成功。要切换天线，请打开`设置`，轻点`Wi-Fi`，将 Wi-Fi 开关（见图\
    \ 2-1）拨到`关闭`，然后再将同一个开关拨回`打开`。\n\n![A429116_1_En_2_Fig1_HTML.jpg](img/A429116_1_En_2_Fig1_HTML.jpg)\n\
    \n图 2-1. 将 Wi-Fi 开关关闭再重新打开通常可以解决 Wi-Fi 问题。\n\n提示\n\n你还可以通过从屏幕底部向上滑动打开控制中心，然后轻点两次\
    \ Wi-Fi 图标来切换 Wi-Fi 天线的开关。轻点控制中心外部即可将其关闭。\n\n### 你无法访问 Wi-Fi 网络：第二部分\n\n如果你的 iOS\
    \ 设备仍然无法连接到 Wi-Fi 热点，那么问题可能出在网络本身。不幸的是，由于干扰、兼容性和设备信号范围等问题，无线网络给故障排查工作带来了全新的一系列潜在问题。\n\
    \n解决方案：以下是一些你应该检查的故障排查项，以解决你遇到的任何无线连接问题：\n\n*   **重启设备。** 关闭 Wi-Fi 网络的路由器，然后再重新打开，以此重置你的硬件。如果你的网络有单独的宽带调制解调器，也应该将其重启。\n\
    *   **检查干扰。** 使用 2.4GHz 射频（RF）频段的设备，例如婴儿监视器和无绳电话，可能会对无线信号造成严重干扰。如果这些设备靠近你的无线路由器，请尝试移开或关闭它们。\n\
    \n警告\n\n你还应将无线路由器远离微波炉；微波炉可能会干扰无线信号。\n\n*   **检查信号范围。** 如果你没有收到信号或信号很弱，可能是因为你的\
    \ iOS 设备距离 Wi-Fi 路由器太远。通常，一旦距离任何 Wi-Fi 接入点超过约 115 英尺，信号就会开始衰减（如果你使用的是 802.11n\
    \ 设备，则约为 230 英尺）。要么靠近路由器，要么打开路由器的信号范围增强功能（如果有的话）。你也可以安装一个无线信号扩展器。\n*   **更改信道。**\
    \ 你可以配置你的无线路由器在特定信道上广播信号。有时一个信道比另一个信道信号更强，所以尝试更换信道。你可以通过登录路由器的配置页面，查找决定广播信道的设置来执行此操作。\n\
    *   **升级路由器的固件。** 某些网络问题是由路由器的漏洞引起的。如果制造商已经修复了这些漏洞，修复程序将出现在最新版本的路由器固件中，因此你应该升级到新版本。请查阅路由器文档了解如何执行升级。\n\
    *   **重置路由器。** 作为最后的手段，将路由器重置为出厂默认设置（请参阅设备文档了解操作方法）。请注意，如果执行此操作，你将需要从头开始设置你的网络。\n"
- fmt: "# iOS Automatically Connects to a Network You No Longer Want to Use\n\nWhen\
    \ you join a Wi-Fi network, iOS remembers your connection details and joins that\
    \ network automatically the next time it comes within range. This is convenient\
    \ for networks you want to use, but it’s a pain for networks you no longer need.\
    \ A common dilemma is having multiple networks available, one of which is more\
    \ desirable (because, say, it’s faster or cheaper). If you’ve previously connected\
    \ to some or all of the other networks, then there’s a good chance iOS will choose\
    \ one of them for its automatic connection, leaving you with the hassle of connecting\
    \ to the network you want manually.\n\n**Solution:** Tell iOS to forget the network\
    \ (or networks) you don’t want to use:\n\n1. Run the `Settings` app and then tap\
    \ `Wi-Fi` to open the `Wi-Fi Networks` screen.\n2. Tap the blue `More Info` icon\
    \ to the right of the network you want to forget. iOS displays the network’s settings\
    \ screen.\n3. Tap `Forget this Network`, shown in Figure [2-2](#A429116_1_En_2_Chapter.html#Fig2).\
    \ iOS asks you to confirm.\n\n   ![A429116_1_En_2_Fig2_HTML.jpg](A429116_1_En_2_Fig2_HTML.jpg)\n\
    \n   **Figure 2-2.** If you no longer want to connect to a particular network,\
    \ tap the `Forget This Network` button\n\n4. Tap `Forget`. iOS discards the login\
    \ data for the network and no longer connects to the network automatically.\n\n\
    ## You’re Getting Frequent Prompts to Join Nearby Wi-Fi Networks\n\nBy default,\
    \ when your device requires a network connection and you’re not already connected\
    \ to a Wi-Fi network, iOS displays the `Select a Wireless Network` dialog to show\
    \ you nearby networks. However, as you move around town, you may find that dialog\
    \ popping up all too frequently as new Wi-Fi networks come within range (although\
    \ iOS is smart enough not to prompt when you’re moving quickly — such as when\
    \ you’re driving). These constant prompts are both annoying and inconvenient.\n\
    \n**Solution:** Tell iOS to stop prompting you to join nearby networks. Open the\
    \ `Settings` app, tap `Wi-Fi`, and then tap the `Ask to Join Networks` switch\
    \ to `Off`, as shown in Figure [2-3](#A429116_1_En_2_Chapter.html#Fig3).\n\n![A429116_1_En_2_Fig3_HTML.jpg](A429116_1_En_2_Fig3_HTML.jpg)\n\
    \n**Figure 2-3.** To turn off the constant prompts to join nearby Wi-Fi networks,\
    \ tap the `Ask to Join Networks` switch to `Off`\n\n## You Want to Connect to\
    \ a Hidden Wi-Fi Network\n\nEach Wi-Fi network has a network name — often called\
    \ the Service Set Identifier, or SSID — which identifies the network to Wi-Fi\
    \ devices. By default, Wi-Fi networks broadcast the network name so that you can\
    \ see it in the `Select a Wireless Network` dialog or the `Wi-Fi` screen in the\
    \ `Settings` app. However, some Wi-Fi networks disable network name broadcasting\
    \ as a security precaution. Why? The thinking is that if an unauthorized user\
    \ can’t see the network, he or she can’t attempt to connect to it. (However, some\
    \ devices can still pick up the network name when authorized computers connect\
    \ to it, so this is not a foolproof security measure.) If you’re an authorized\
    \ user, however, how do you connect to a network you can’t see?\n\n**Solution:**\
    \ You can connect to a hidden Wi-Fi network by entering the connection settings\
    \ by hand. You need to know the network name, its security and encryption types,\
    \ and the network password. Here’s how it’s done:\n\n1. Open the `Settings` app\
    \ and then tap `Wi-Fi`.\n2. In the list of nearby networks, tap `Other`. iOS displays\
    \ the `Other Network` screen.\n3. Type the network name in the `Name` text box.\n\
    4. Tap `Security` to open the `Security` screen and then tap the type of security\
    \ the Wi-Fi network uses: `None`, `WEP`, `WPA`, `WPA2`, `WPA Enterprise`, or `WPA2\
    \ Enterprise`. If you’re not sure, most secure networks use `WPA2`.\n5. Tap `Other\
    \ Network` to return to the `Other Network` screen. If you chose `WEP`, `WPA`,\
    \ `WPA2`, `WPA Enterprise`, or `WPA2 Enterprise`, iOS prompts you to enter the\
    \ network password.\n6. Type the password in the `Password` text box, as shown\
    \ in Figure [2-4](#A429116_1_En_2_Chapter.html#Fig4).\n\n   ![A429116_1_En_2_Fig4_HTML.jpg](A429116_1_En_2_Fig4_HTML.jpg)\n\
    \n   **Figure 2-4.** To join a hidden network, type the network name, select the\
    \ security type, and then enter the password\n\n7. Tap `Join`. iOS connects to\
    \ the network.\n\n## You’re Having Trouble Sending a File via AirDrop\n\nYou can\
    \ transfer files between your Mac and your iOS device by syncing via iTunes. However,\
    \ if you just want to pass along a single file from your device to the other,\
    \ the sync procedure is overkill. Instead, if your Mac is running OS X Yosemite\
    \ or later and your iPhone is running iOS 8 or later, and your Mac and iPhone\
    \ are connected to the same Wi-Fi network, you can use a tool called `AirDrop`\
    \ to send a file directly between your Mac and your device.\n\nHowever, you might\
    \ find that the two devices don’t see each other or that the file does not transfer.\n\
    \n**Solution:** If you don’t see your iOS device from your Mac, or if you don’t\
    \ see your Mac from your iOS device, here are some things to check:\n\n* Make\
    \ sure that both your Mac and your iOS device are connected to the same Wi-Fi\
    \ network.\n* `AirDrop` requires Bluetooth as well as Wi-Fi, so make sure both\
    \ your Mac and your iOS device have Bluetooth enabled:\n  * In iOS, swipe up from\
    \ the bottom of the screen to display the `Control Center`, and then tap to activate\
    \ the `Bluetooth` icon. Tap outside the `Control Center` to close it.\n  * In\
    \ macOS (or OS X), open `System Preferences`, click `Bluetooth`, and then make\
    \ sure the `Bluetooth` setting is `On`. (If it says `Off`, click `Turn Bluetooth\
    \ On`.)\n\n> **Tip:** If you have Wi-Fi and/or Bluetooth turned off in iOS, a\
    \ quick way to turn them both on is to open any share sheet and tap the `AirDrop`\
    \ icon. You can also swipe up from the bottom of the screen to display the `Control\
    \ Center`, tap `AirDrop`, and then tap `Contacts Only`. Tap outside the `Control\
    \ Center` to close it.\n\n* Make sure your iOS device and your Mac are within\
    \ 33 feet of each other so that they can discover each other via Bluetooth.\n\
    * Make sure the iOS device has `AirDrop` turned on. Swipe up from the bottom of\
    \ the screen to display the `Control Center`, tap `AirDrop`, and then tap `Contacts\
    \ Only` (see Figure [2-5](#A429116_1_En_2_Chapter.html#Fig5)). If you still don’t\
    \ see your device on your Mac, tap `Everyone`, instead.\n\n  ![A429116_1_En_2_Fig5_HTML.jpg](A429116_1_En_2_Fig5_HTML.jpg)\n\
    \n  **Figure 2-5.** In the iOS `Control Center`, tap `AirDrop` and then tap either\
    \ `Contacts Only` or `Everyone`\n\n* Make sure your Mac is discoverable. Open\
    \ the `AirDrop` window (in `Finder`, click `Go` and then click `AirDrop`, or press\
    \ `Shift+Cmd+R`). In the `Allow me to be discovered by` list, select `Contacts\
    \ Only`. If you still don’t see your Mac from iOS, select `Everyone`, instead.\n\
    * If you’ve set `AirDrop` to `Contacts Only`, make sure both your iOS device and\
    \ your Mac are signed in to the same iCloud account.\n* Make sure neither your\
    \ iOS device nor your Mac are in sleep mode.\n\nIf an `AirDrop` file transfer\
    \ fails, try these solutions."
