  trans: "\n### 你想阻止某个应用使用其他应用的数据\n\n第三方应用有时会请求使用其他应用数据的权限。例如，某个应用可能需要访问你的通讯录、日历、照片，或者你的\
    \ Twitter 和 Facebook 账户。当然，你始终可以拒绝这些请求，但如果你过去曾允许某个应用访问，之后可能会改变主意，希望撤销该权限。\n\n\
    **解决方案：** iOS 提供了一项隐私功能，让你能够控制哪些应用有权访问你的数据。具体操作如下：\n\n1.  打开 `设置` 应用。\n2.  轻点\
    \ `隐私`。此时会显示 `隐私` 屏幕。\n3.  轻点你想要控制访问权限的应用或功能。iOS 会显示已请求访问该应用或功能的第三方应用列表。图 9-2\
    \ 展示了 `照片` 应用的示例。\n\n    ![A429116_1_En_9_Fig2_HTML.jpg](img/A429116_1_En_9_Fig2_HTML.jpg)\n\
    \    图 9-2. 在 `设置` 中，轻点 `隐私`，然后轻点某个应用或功能，即可查看已请求访问该项的第三方应用\n\n4.  若要撤销第三方应用对该应用或功能的访问权限，请将其开关轻点为\
    \ `关闭`。\n\n### 你不想让位置被追踪\n\n在 iOS 中，`定位服务` 指的是为应用和系统工具提供设备当前地理坐标访问权限的功能与技术。这是一项方便的功能，但你也需要将其置于掌控之下，因为你的位置数据，特别是当前位置，本质上是私密的，不应随意对外提供。幸运的是，iOS\
    \ 自带了一些用于控制和配置 `定位服务` 的工具。\n\n接下来的几节将向你展示如何为单个应用以及单个系统服务关闭 `定位服务`。这种精细化的控制是管理\
    \ `定位服务` 的最佳方式，但有时你可能更倾向于采用更宽泛的方法，即完全关闭 `定位服务`。例如，如果你正前往一个秘密约会地点（真令人兴奋！）并随身携带了\
    \ iOS 设备，那么知道设备上没有应用或服务在追踪你的行踪，可能会让你感觉更安心。\n\n**注意**\n\n从更平常的角度来说，`定位服务` 会消耗电池电量，因此如果你的\
    \ iOS 设备电量不足，或者你只是想最大程度地延长电池续航（例如在长途公交车上），那么完全关闭 `定位服务` 会有所帮助。\n\n**解决方案：** 按照以下步骤关闭\
    \ iOS 设备上的所有 `定位服务`：\n\n1.  打开 `设置` 应用。\n2.  轻点 `隐私`。此时会显示 `隐私` 设置。\n3.  轻点 `定位服务`。此时会显示\
    \ `定位服务` 设置。\n4.  将 `定位服务` 开关轻点至 `关闭` 位置。iOS 会要求你确认。\n5.  轻点 `关闭`。iOS 会关闭所有 `定位服务`（见图\
    \ 9-3）。\n\n    ![A429116_1_En_9_Fig3_HTML.jpg](img/A429116_1_En_9_Fig3_HTML.jpg)\n\
    \    图 9-3. 若要防止任何应用或服务使用你的位置，请将 `定位服务` 开关设置为 `关闭`\n\n### 你想阻止某个应用使用你的位置\n\n当你打开一个带有\
    \ GPS 组件的应用时，该应用会显示一个类似图 9-4 所示的对话框，请求你允许它使用设备中的 GPS 硬件来确定你的当前位置。请注意，iOS 仅允许应用在你使用它时访问你的位置。一旦你退出应用，它便无法再访问你的位置。如果你认为应用无权知晓你的当前位置，请轻点\
    \ `不允许`；如果你觉得没问题，则轻点 `允许`。\n\n![A429116_1_En_9_Fig4_HTML.jpg](img/A429116_1_En_9_Fig4_HTML.jpg)\n\
    图 9-4. 当你首次启动一个使用 GPS 功能的应用时，它会请求你的许可，以便在使用该应用时访问你的当前位置\n\n另一种略有不同的情况是，某个应用必须使用你的位置才能运行。一个很好的例子是\
    \ `Foursquare`，它需要你的位置来向你显示附近的商家，并让你能够“签到”那些地点。在这种情况下，iOS 会自动允许该应用在你使用它时访问你的位置，但该应用可能还会请求在你未使用它时访问你的位置，如图\
    \ 9-5 所示。同样，如果你认为该应用越界了，请轻点 `不允许`；如果没问题，则轻点 `允许`。\n\n![A429116_1_En_9_Fig5_HTML.jpg](img/A429116_1_En_9_Fig5_HTML.jpg)\n\
    图 9-5. 一个必须在你使用应用时访问你位置的应用，也可能寻求在你未使用它时访问你位置的权限\n\n无论你选择了哪种权限类型，在做出决定后，你都有可能改变主意。例如，如果你拒绝某个应用获取你的位置，该应用可能会缺少某些关键功能。同样，如果你允许某个应用使用你的位置，你可能会对隐私受到侵犯而感到后悔。\n\
    \n**解决方案：** 无论出于何种原因，你可以按照以下步骤来控制应用对你位置的访问权限：\n\n1.  打开 `设置` 应用。\n2.  轻点 `隐私`。此时会显示\
    \ `隐私` 设置。\n3.  轻点 `定位服务`。此时会显示 `定位服务` 屏幕。\n4.  轻点你想要配置 GPS 访问权限的应用。该应用的位置访问选项会显示出来。图\
    \ 9-6 展示了 `Foursquare` 应用的选项。\n\n    ![A429116_1_En_9_Fig6_HTML.jpg](img/A429116_1_En_9_Fig6_HTML.jpg)\n\
    \    图 9-6. 使用这些选项配置应用对你位置的访问权限\n\n5.  轻点以下选项之一来配置该应用对你位置的访问权限：\n    - `永不`。如果你想拒绝该应用获取你的当前位置，请轻点此选项。\n\
    \    - `使用期间`。如果你想允许某个应用仅在你主动使用时访问你的当前位置，请轻点此选项。\n    - `始终`。如果该应用需要你的位置才能运行，即使你未使用它时也需要（请注意，此选项仅适用于需要全天候访问\
    \ GPS 的应用），请轻点此选项。\n\n### 你想阻止一个或多个系统服务使用你的位置\n\niOS 还向各类内部系统服务提供 `定位服务`，这些服务执行诸如校准指南针、设置时区以及提供根据位置数据变化的\
    \ Apple 广告等任务。你可能更希望 iOS 不向一个或多个此类服务提供你的位置信息。\n\n**解决方案：** 如果你不想让 iOS 向其中某些服务提供你的位置信息，可以按照以下步骤阻止：\n\
    \n1.  打开 `设置` 应用。\n2.  轻点 `隐私`。此时会显示 `隐私` 屏幕。\n3.  轻点 `定位服务`。此时会显示 `定位服务` 屏幕。\n\
    4.  轻点 `系统服务`。iOS 会显示 `系统服务` 屏幕。iPhone 上的此屏幕如图 9-7 所示。\n\n    ![A429116_1_En_9_Fig7_HTML.jpg](img/A429116_1_En_9_Fig7_HTML.jpg)\n\
    \    图 9-7. 将你希望拒绝其访问你位置的任何系统服务旁的开关轻点至 `关闭`\n\n5.  对于你不想提供位置数据访问权限的任何系统服务，请将其开关轻点至\
    \ `关闭`。\n\n**提示**\n\n了解系统服务何时正在使用你的位置也很重要。要进行设置，请滚动到 `系统服务` 屏幕底部，然后将 `状态栏图标` 开关轻点至\
    \ `打开`。此后，每当系统服务使用你的位置时，iOS 都会在状态栏中显示该开关上方所列图标之一。\n"
- fmt: "# 防止 iOS 存储常用位置列表\n\niOS 会跟踪您最常访问的物理位置，并将此数据提供给“地图”和“日历”等应用。这使得这些应用能够根据您的位置历史记录提供建议，但出于隐私原因，您可能更希望\
    \ iOS 不跟踪您的常用位置。\n\n解决方案：您不仅可以清除常用位置列表，还可以完全阻止 iOS 维护此列表，从而增强隐私。请按照以下步骤操作：\n\n\
    1.  打开“设置”应用。\n2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“定位服务”。此时将显示“定位服务”屏幕。\n4.  轻点“系统服务”。iOS\
    \ 将显示“系统服务”屏幕。\n5.  轻点“常去地点”以打开“常去地点”屏幕。\n6.  若要删除当前的常用位置列表，请轻点“清除历史记录”，然后在系统要求确认时，再次轻点“清除历史记录”。\n\
    7.  若要阻止 iOS 存储您经常使用的位置，请将“常去地点”开关轻点至“关闭”，如图 [9-8](#A429116_1_En_9_Chapter.html#Fig8)\
    \ 所示。\n\n    ![A429116_1_En_9_Fig8_HTML.jpg](A429116_1_En_9_Fig8_HTML.jpg)\n\n\
    \    图 9-8。若要阻止 iOS 跟踪您最常使用的位置，请将“常去地点”开关轻点至“关闭”。\n\n# 不想与家人和朋友共享您的位置\n\n当您在 iCloud\
    \ 账户上设置“家人共享”时，其中一个设置屏幕会询问您是否希望通过“信息”和“查找我的朋友”应用与家人共享您的位置。如果您最初决定共享位置，之后可能会改变主意，希望保持位置隐私。\n\
    \n解决方案：您可以按照以下步骤禁用此功能：\n\n1.  打开“设置”应用。\n2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“定位服务”。此时将显示“定位服务”屏幕。\n\
    4.  轻点“共享我的位置”以打开“共享我的位置”屏幕。\n5.  将“共享我的位置”开关轻点至“关闭”，如图 [9-9](#A429116_1_En_9_Chapter.html#Fig9)\
    \ 所示。\n\n    ![A429116_1_En_9_Fig9_HTML.jpg](A429116_1_En_9_Fig9_HTML.jpg)\n\n\
    \    图 9-9。若要停止允许家人和朋友看到您的位置，请将“共享我的位置”开关轻点至“关闭”。\n\n# 不想将设备使用信息发送给 Apple\n\n\
    iOS 会持续监控您的设备资源，以防范不良事件。这些事件可能包括内存过低、处理器使用率过高、应用崩溃或系统意外重启。当检测到此类事件时，iOS 会记录当前系统状态并将此数据写入诊断文件。图\
    \ [9-10](#A429116_1_En_9_Chapter.html#Fig10) 显示了一个典型条目。\n\n![A429116_1_En_9_Fig10_HTML.jpg](A429116_1_En_9_Fig10_HTML.jpg)\n\
    \n图 9-10。一个典型的诊断条目\n\n如您所见，这些数据大部分是高度技术性的。这是因为它们旨在供 Apple 工程师在诊断您的设备或应用问题时使用。\n\
    \n注意：要查看您的诊断和使用条目，请打开“设置”，轻点“隐私”，轻点“诊断与用量”，然后轻点“诊断与用量数据”。\n\n然而，iOS 也会定期创建诊断日志并将其发送给\
    \ Apple 进行分析。这些日志对于 Apple 修复错误和改进产品很有用，但它们是匿名的，通常不包含任何个人数据。我在这里说“通常”，是因为 Apple\
    \ 确实会在这些日志中包含位置数据。\n\n尽管如此，您可能会对将使用情况和诊断数据（特别是您的位置）发送给 Apple 感到不安。\n\n解决方案：您可以按照以下步骤阻止\
    \ iOS 在其诊断和使用日志中包含您的位置：\n\n1.  打开“设置”应用。\n2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“定位服务”。此时将显示“定位服务”屏幕。\n\
    4.  轻点“系统服务”。iOS 将显示“系统服务”屏幕。\n5.  将“诊断与用量”开关轻点至“关闭”，如图 [9-11](#A429116_1_En_9_Chapter.html#Fig11)\
    \ 所示。\n\n    ![A429116_1_En_9_Fig11_HTML.jpg](A429116_1_En_9_Fig11_HTML.jpg)\n\
    \n    图 9-11。若要阻止 iOS 将您的位置随诊断日志一起发送，请将“诊断与用量”开关轻点至“关闭”。\n\n如果您不希望 iOS 向 Apple\
    \ 发送任何诊断和使用日志，可以按照以下步骤禁用此功能：\n\n1.  打开“设置”应用。\n2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“诊断与用量”。此时将显示“诊断与用量”屏幕。\n\
    4.  轻点“不发送”，如图 [9-12](#A429116_1_En_9_Chapter.html#Fig12) 所示。\n\n    ![A429116_1_En_9_Fig12_HTML.jpg](A429116_1_En_9_Fig12_HTML.jpg)\n\
    \n    图 9-12。若要阻止 iOS 向 Apple 发送任何诊断和使用日志，请显示“诊断与用量”屏幕，然后轻点“不发送”。\n\n# 不想接收定向广告\n\
    \n类似于在线广告商可以使用 Cookie（广告商存储在您计算机上的小型文本文件）在网络上跟踪您，应用广告商可以使用名为“广告标识符”的数据片段来跟踪您的兴趣。这是一个匿名的设备标识符，当您执行某些操作（例如在\
    \ App Store 中搜索）时，iOS 会使用它。广告商可以访问“广告标识符”，并利用它向您投放基于您的使用情况选择的广告。您可能更希望不接收这些定向广告。\n\
    \n解决方案：您可以配置隐私设置，告知广告商不要使用“广告标识符”来跟踪您的兴趣和操作。您还可以重置“广告标识符”值，这类似于删除计算机上的跟踪 Cookie。\n\
    \n请按照以下步骤操作：\n\n1.  打开“设置”应用。\n2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“广告”。此时将显示“广告”屏幕。\n\
    4.  将“限制广告跟踪”开关轻点至“开启”，如图 [9-13](#A429116_1_En_9_Chapter.html#Fig13) 所示。\n\n \
    \   ![A429116_1_En_9_Fig13_HTML.jpg](A429116_1_En_9_Fig13_HTML.jpg)\n\n    图 9-13。若要阻止广告商使用“广告标识符”向您发送定向广告，请激活“限制广告跟踪”设置。\n\
    5.  轻点“还原广告标识符”，然后在 iOS 要求您确认时，轻点“还原标识符”。\n\n另一种 iOS 向您投放定向广告的方式是通过您的位置。以下是关闭此隐私漏洞的步骤：\n\
    \n1.  打开“设置”应用。\n2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“定位服务”。此时将显示“定位服务”屏幕。\n4.  轻点“系统服务”。iOS\
    \ 将显示“系统服务”屏幕。\n5.  将“基于位置的 Apple 广告”开关轻点至“关闭”，如图 [9-14](#A429116_1_En_9_Chapter.html#Fig14)\
    \ 所示。\n\n    ![A429116_1_En_9_Fig14_HTML.jpg](A429116_1_En_9_Fig14_HTML.jpg)\n\
    \n    图 9-14。将“基于位置的 Apple 广告”轻点至“关闭”，以防止看到基于您位置的定向广告。\n\n# 不想被显示您所在地区的热门应用\n\n\
    App Store 会使用您的位置来告诉您附近哪些应用最受欢迎。出于隐私考虑，您可能不希望以这种方式被定位。\n\n解决方案：请按照以下步骤关闭此跟踪功能：\n\
    \n1.  打开“设置”应用。\n2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“定位服务”。此时将显示“定位服务”屏幕。\n4.  轻点“系统服务”。iOS\
    \ 将显示“系统服务”屏幕。\n5.  将“附近的热门应用”开关轻点至“关闭”，如图 [9-15](#A429116_1_En_9_Chapter.html#Fig15)\
    \ 所示。\n\n    ![A429116_1_En_9_Fig15_HTML.jpg](A429116_1_En_9_Fig15_HTML.jpg)\n\
    \n    图 9-15。若要阻止 iOS 使用您的位置来确定附近的热门应用，请将“附近的热门应用”开关轻点至“关闭”。\n\n# 解决网页浏览隐私问题\n\
    \n本章的其余部分将向您介绍一些与增强网页浏览会话隐私相关的故障排除技巧。"
  raw: "### You Want to Prevent iOS from Storing a List of Your Frequent Locations\n\
    \niOS keeps track of the physical locations you visit most frequently, and it\
    \ offers this data to apps such as Maps and Calendar. This enables these apps\
    \ to make suggestions based on your location history, but you might prefer that\
    \ iOS not keep track of your frequent locations for privacy reasons.\n\nSolution:\
    \ You can enhance your privacy not only by clearing the list of frequent locations,\
    \ but also by preventing iOS from maintaining this list at all. Here are the steps\
    \ to follow:\n\n1.  Open the Settings app.  \n2.  Tap Privacy. The Privacy screen\
    \ appears.  \n3.  Tap Location Services. The Location Services screen appears.\
    \  \n4.  Tap System Services. iOS displays the System Services screen.  \n5. \
    \ Tap Frequent Locations to open the Frequent Locations screen.  \n6.  To remove\
    \ the current list of frequent locations, tap Clear History, and then when asked\
    \ to confirm, tap Clear History once again.  \n7.  To prevent iOS from storing\
    \ your oft-used location, tap the Frequent Locations switch to Off, as shown in\
    \ Figure [9-8](#A429116_1_En_9_Chapter.html#Fig8).\n\n    ![A429116_1_En_9_Fig8_HTML.jpg](A429116_1_En_9_Fig8_HTML.jpg)\n\
    \n    Figure 9-8.\n\n    To prevent iOS from tracking your most-used locations,\
    \ tap the Frequent Locations switch to Off\n\n### You Do Not Want to Share Your\
    \ Location with your Family and Friends\n\nWhen you set up Family Sharing on your\
    \ iCloud account, one of the setup screens asks if you want to share your location\
    \ with your family using the Messages and Find My Friends apps. If you initially\
    \ decided to share your location, you might later decide to change your mind and\
    \ keep your location private.\n\nSolution: You can disable this feature by following\
    \ these steps:\n\n1.  Open the Settings app.  \n2.  Tap Privacy. The Privacy screen\
    \ appears.  \n3.  Tap Location Services. The Location Services screen appears.\
    \  \n4.  Tap Share My Location to open the Share My Location screen.  \n5.  Tap\
    \ the Share My Location switch to Off, as shown in Figure [9-9](#A429116_1_En_9_Chapter.html#Fig9).\n\
    \n    ![A429116_1_En_9_Fig9_HTML.jpg](A429116_1_En_9_Fig9_HTML.jpg)\n\n    Figure\
    \ 9-9.\n\n    To no longer allow family and friends to see your location, tap\
    \ the Share My Location switch to Off\n\n### You Do Not Want Uour Device Usage\
    \ Information Being Sent to Apple\n\niOS constantly monitors your device resources\
    \ to watch out for adverse events. Then can include memory getting too low, processor\
    \ usage getting too high, an app crashing, or the system spontaneously rebooting.\
    \ When it detects such events, iOS records the current system state and writes\
    \ this data to a diagnostics file. Figure [9-10](#A429116_1_En_9_Chapter.html#Fig10)\
    \ shows a typical entry.\n\n![A429116_1_En_9_Fig10_HTML.jpg](A429116_1_En_9_Fig10_HTML.jpg)\n\
    \nFigure 9-10.\n\nA typical diagnostics entry\n\nAs you can see, the data is for\
    \ the most part highly technical. That's because it's meant to be used by Apple\
    \ engineers when diagnosing a problem with your device or an app.\n\nNote\n\n\
    To view your diagnostics and usage entries, open Settings, tap Privacy, tap Diagnostics\
    \ and Usage, and then tap Diagnostics & Usage Data.\n\nHowever, iOS also periodically\
    \ creates diagnostic logs and sends them to Apple for analysis. These logs are\
    \ useful to Apple for fixing bugs and improving their products, but they are anonymous\
    \ and generally do not contain any personal data. I say \"generally\" here because\
    \ Apple does include location data in these logs.\n\nDespite this, you might feel\
    \ uncomfortable sending your usage and diagnostics data to Apple, particularly\
    \ your location.\n\nSolution: You can prevent iOS from including your location\
    \ in its diagnostic and usage logs by following these steps:\n\n1.  Open the Settings\
    \ app.  \n2.  Tap Privacy. The Privacy screen appears.  \n3.  Tap Location Services.\
    \ The Location Services screen appears.  \n4.  Tap System Services. iOS displays\
    \ the System Services screen.  \n5.  Tap the Diagnostics & Usage switch to Off,\
    \ as shown in Figure [9-11](#A429116_1_En_9_Chapter.html#Fig11).\n\n    ![A429116_1_En_9_Fig11_HTML.jpg](A429116_1_En_9_Fig11_HTML.jpg)\n\
    \n    Figure 9-11.\n\n    To prevent iOS from sending your location along with\
    \ its diagnostics logs, tap the Diagnostics & Usage switch to Off  \n\nIf you\
    \ don't want iOS to send any diagnostics and usage logs to Apple, you can disable\
    \ this feature by following these steps:\n\n1.  Open the Settings app.  \n2. \
    \ Tap Privacy. The Privacy screen appears.  \n3.  Tap Diagnostics & Usage. The\
    \ Diagnostics & Usage screen appears.  \n4.  Tap Don't Send, as shown in Figure\
    \ [9-12](#A429116_1_En_9_Chapter.html#Fig12).\n\n    ![A429116_1_En_9_Fig12_HTML.jpg](A429116_1_En_9_Fig12_HTML.jpg)\n\
    \n    Figure 9-12.\n\n    To prevent iOS from sending any diagnostic and usage\
    \ logs to Apple, display the Diagnostics & Usage screen and then tap Don't Send\n\
    \n### You Do Not Want to Receive Targeted Ads\n\nIn much the same way that online\
    \ advertisers can track you across the Web using cookies (small text files that\
    \ the advertisers store on your computer), app advertisers can track your interests\
    \ using a piece of data called the Advertising Identifier. This is an anonymous\
    \ device identifier that iOS uses when you perform certain actions, such as searching\
    \ the App Store. Advertisers have access to the Advertising Identifier and can\
    \ use it to serve you ads that are selected based on your usage. You might prefer\
    \ not to receive these targeted ads.\n\nSolution: You can configure your privacy\
    \ settings to tell advertisers not to use the Advertising Identifier to track\
    \ your interests and actions. You can also reset the Advertising Identifier value,\
    \ which is similar to deleting the tracking cookies on your computer.\n\nFollow\
    \ these steps:\n\n1.  Open the Settings app.  \n2.  Tap Privacy. The Privacy screen\
    \ appears.  \n3.  Tap Advertising. The Advertising screen appears.  \n4.  Tap\
    \ the Limit Add Tracking switch to On, as shown in Figure [9-13](#A429116_1_En_9_Chapter.html#Fig13).\n\
    \n    ![A429116_1_En_9_Fig13_HTML.jpg](A429116_1_En_9_Fig13_HTML.jpg)\n\n    Figure\
    \ 9-13.\n\n    To prevent advertisers from using the Advertising Identifier to\
    \ send you targeted ads, activate the Limit Ad Tracking setting  \n5.  Tap Reset\
    \ Advertising Identifier and, when iOS asks you to confirm, tap Reset Identifier.\
    \  \n\nAnother way that iOS serves you targeted ads is via your location. Here\
    \ are the steps to follow to turn off this privacy breach:\n\n1.  Open the Settings\
    \ app.  \n2.  Tap Privacy. The Privacy screen appears.  \n3.  Tap Location Services.\
    \ The Location Services screen appears.  \n4.  Tap System Services. iOS displays\
    \ the System Services screen.  \n5.  Tap the Location-Based Apple Ads switch to\
    \ Off, as shown in Figure [9-14](#A429116_1_En_9_Chapter.html#Fig14).\n\n    ![A429116_1_En_9_Fig14_HTML.jpg](A429116_1_En_9_Fig14_HTML.jpg)\n\
    \n    Figure 9-14.\n\n    Tap Location-Based Apple Ads to Off to prevent seeing\
    \ targeted ads based on your location.\n\n### You Do Not Want to Be Shown Apps\
    \ That Are Popular in Your Area\n\nThe App Store uses your location to tell you\
    \ which apps are the most popular near you. You might prefer not to be targeted\
    \ in this way due to privacy concerns.\n\nSolution: Follow these steps to turn\
    \ off this tracking feature:\n\n1.  Open the Settings app.  \n2.  Tap Privacy.\
    \ The Privacy screen appears.  \n3.  Tap Location Services. The Location Services\
    \ screen appears.  \n4.  Tap System Services. iOS displays the System Services\
    \ screen.  \n5.  Tap the Popular Near Me switch to Off, as shown in Figure [9-15](#A429116_1_En_9_Chapter.html#Fig15).\n\
    \n    ![A429116_1_En_9_Fig15_HTML.jpg](A429116_1_En_9_Fig15_HTML.jpg)\n\n    Figure\
    \ 9-15.\n\n    To prevent iOS from using your location to determine popular nearby\
    \ apps, tap the Popular Near Me switch to Off\n\n## Troubleshooting Web Browsing\
    \ Privacy Issues\n\nThe rest of this chapter takes you through a few troubleshooting\
    \ techniques related to enhancing the privacy of your web browsing sessions."
  trans: "\n# 防止 iOS 存储常用位置列表\n\niOS 会跟踪您最常访问的物理位置，并将此数据提供给“地图”和“日历”等应用。这使得这些应用能够根据您的位置历史记录提供建议，但出于隐私原因，您可能更希望\
    \ iOS 不跟踪您的常用位置。\n\n解决方案：您不仅可以清除常用位置列表，还可以完全阻止 iOS 维护此列表，从而增强隐私。请按照以下步骤操作：\n\n\
    1.  打开“设置”应用。\n2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“定位服务”。此时将显示“定位服务”屏幕。\n4.  轻点“系统服务”。iOS\
    \ 将显示“系统服务”屏幕。\n5.  轻点“常去地点”以打开“常去地点”屏幕。\n6.  若要删除当前的常用位置列表，请轻点“清除历史记录”，然后在系统要求确认时，再次轻点“清除历史记录”。\n\
    7.  若要阻止 iOS 存储您经常使用的位置，请将“常去地点”开关轻点至“关闭”，如图 9-8 所示。\n\n    ![A429116_1_En_9_Fig8_HTML.jpg](img/A429116_1_En_9_Fig8_HTML.jpg)\n\
    \n    图 9-8。若要阻止 iOS 跟踪您最常使用的位置，请将“常去地点”开关轻点至“关闭”。\n\n# 不想与家人和朋友共享您的位置\n\n当您在\
    \ iCloud 账户上设置“家人共享”时，其中一个设置屏幕会询问您是否希望通过“信息”和“查找我的朋友”应用与家人共享您的位置。如果您最初决定共享位置，之后可能会改变主意，希望保持位置隐私。\n\
    \n解决方案：您可以按照以下步骤禁用此功能：\n\n1.  打开“设置”应用。\n2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“定位服务”。此时将显示“定位服务”屏幕。\n\
    4.  轻点“共享我的位置”以打开“共享我的位置”屏幕。\n5.  将“共享我的位置”开关轻点至“关闭”，如图 9-9 所示。\n\n    ![A429116_1_En_9_Fig9_HTML.jpg](img/A429116_1_En_9_Fig9_HTML.jpg)\n\
    \n    图 9-9。若要停止允许家人和朋友看到您的位置，请将“共享我的位置”开关轻点至“关闭”。\n\n# 不想将设备使用信息发送给 Apple\n\n\
    iOS 会持续监控您的设备资源，以防范不良事件。这些事件可能包括内存过低、处理器使用率过高、应用崩溃或系统意外重启。当检测到此类事件时，iOS 会记录当前系统状态并将此数据写入诊断文件。图\
    \ 9-10 显示了一个典型条目。\n\n![A429116_1_En_9_Fig10_HTML.jpg](img/A429116_1_En_9_Fig10_HTML.jpg)\n\
    \n图 9-10。一个典型的诊断条目\n\n如您所见，这些数据大部分是高度技术性的。这是因为它们旨在供 Apple 工程师在诊断您的设备或应用问题时使用。\n\
    \n注意：要查看您的诊断和使用条目，请打开“设置”，轻点“隐私”，轻点“诊断与用量”，然后轻点“诊断与用量数据”。\n\n然而，iOS 也会定期创建诊断日志并将其发送给\
    \ Apple 进行分析。这些日志对于 Apple 修复错误和改进产品很有用，但它们是匿名的，通常不包含任何个人数据。我在这里说“通常”，是因为 Apple\
    \ 确实会在这些日志中包含位置数据。\n\n尽管如此，您可能会对将使用情况和诊断数据（特别是您的位置）发送给 Apple 感到不安。\n\n解决方案：您可以按照以下步骤阻止\
    \ iOS 在其诊断和使用日志中包含您的位置：\n\n1.  打开“设置”应用。\n2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“定位服务”。此时将显示“定位服务”屏幕。\n\
    4.  轻点“系统服务”。iOS 将显示“系统服务”屏幕。\n5.  将“诊断与用量”开关轻点至“关闭”，如图 9-11 所示。\n\n    ![A429116_1_En_9_Fig11_HTML.jpg](img/A429116_1_En_9_Fig11_HTML.jpg)\n\
    \n    图 9-11。若要阻止 iOS 将您的位置随诊断日志一起发送，请将“诊断与用量”开关轻点至“关闭”。\n\n如果您不希望 iOS 向 Apple\
    \ 发送任何诊断和使用日志，可以按照以下步骤禁用此功能：\n\n1.  打开“设置”应用。\n2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“诊断与用量”。此时将显示“诊断与用量”屏幕。\n\
    4.  轻点“不发送”，如图 9-12 所示。\n\n    ![A429116_1_En_9_Fig12_HTML.jpg](img/A429116_1_En_9_Fig12_HTML.jpg)\n\
    \n    图 9-12。若要阻止 iOS 向 Apple 发送任何诊断和使用日志，请显示“诊断与用量”屏幕，然后轻点“不发送”。\n\n# 不想接收定向广告\n\
    \n类似于在线广告商可以使用 Cookie（广告商存储在您计算机上的小型文本文件）在网络上跟踪您，应用广告商可以使用名为“广告标识符”的数据片段来跟踪您的兴趣。这是一个匿名的设备标识符，当您执行某些操作（例如在\
    \ App Store 中搜索）时，iOS 会使用它。广告商可以访问“广告标识符”，并利用它向您投放基于您的使用情况选择的广告。您可能更希望不接收这些定向广告。\n\
    \n解决方案：您可以配置隐私设置，告知广告商不要使用“广告标识符”来跟踪您的兴趣和操作。您还可以重置“广告标识符”值，这类似于删除计算机上的跟踪 Cookie。\n\
    \n请按照以下步骤操作：\n\n1.  打开“设置”应用。\n2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“广告”。此时将显示“广告”屏幕。\n\
    4.  将“限制广告跟踪”开关轻点至“开启”，如图 9-13 所示。\n\n    ![A429116_1_En_9_Fig13_HTML.jpg](img/A429116_1_En_9_Fig13_HTML.jpg)\n\
    \n    图 9-13。若要阻止广告商使用“广告标识符”向您发送定向广告，请激活“限制广告跟踪”设置。\n5.  轻点“还原广告标识符”，然后在 iOS\
    \ 要求您确认时，轻点“还原标识符”。\n\n另一种 iOS 向您投放定向广告的方式是通过您的位置。以下是关闭此隐私漏洞的步骤：\n\n1.  打开“设置”应用。\n\
    2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“定位服务”。此时将显示“定位服务”屏幕。\n4.  轻点“系统服务”。iOS 将显示“系统服务”屏幕。\n\
    5.  将“基于位置的 Apple 广告”开关轻点至“关闭”，如图 9-14 所示。\n\n    ![A429116_1_En_9_Fig14_HTML.jpg](img/A429116_1_En_9_Fig14_HTML.jpg)\n\
    \n    图 9-14。将“基于位置的 Apple 广告”轻点至“关闭”，以防止看到基于您位置的定向广告。\n\n# 不想被显示您所在地区的热门应用\n\n\
    App Store 会使用您的位置来告诉您附近哪些应用最受欢迎。出于隐私考虑，您可能不希望以这种方式被定位。\n\n解决方案：请按照以下步骤关闭此跟踪功能：\n\
    \n1.  打开“设置”应用。\n2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“定位服务”。此时将显示“定位服务”屏幕。\n4.  轻点“系统服务”。iOS\
    \ 将显示“系统服务”屏幕。\n5.  将“附近的热门应用”开关轻点至“关闭”，如图 9-15 所示。\n\n    ![A429116_1_En_9_Fig15_HTML.jpg](img/A429116_1_En_9_Fig15_HTML.jpg)\n\
    \n    图 9-15。若要阻止 iOS 使用您的位置来确定附近的热门应用，请将“附近的热门应用”开关轻点至“关闭”。\n\n# 解决网页浏览隐私问题\n\
    \n本章的其余部分将向您介绍一些与增强网页浏览会话隐私相关的故障排除技巧。\n"
- fmt: "### You Want to Delete the List of Websites You’ve Visited\n\nSafari’s History\
    \ list – the collection of sites you’ve recently surfed – is a great feature when\
    \ you need it, and it’s an innocuous feature when you don’t. However, there are\
    \ times when the History list is just plain uncool. For example, if you visit\
    \ a private corporate site, a financial site, or any other site you wouldn’t want\
    \ others to see, the History list might betray you.\n\nAnd sometimes unsavory\
    \ sites can end up in your History list by accident. For example, you might tap\
    \ a legitimate-looking link in a web page or email message, only to end up in\
    \ some dark, unpleasant web neighborhood. Of course, you high-tail it out of there\
    \ right away with a quick tap of the Back button, but that nasty site is now lurking\
    \ in your history.\n\n**Caution**\n\nAs of iOS 9, clearing your Safari history\
    \ also clears your cookies and website data. Clearing cookies might present problems\
    \ since many of them store site login data or site customizations. Therefore,\
    \ when clearing your history, consider only clearing recent data (such as data\
    \ from the previous hour).\n\n**Solution:** Whether you’ve got sites on the History\
    \ list that you wouldn’t want anyone to see, or you just find the idea of Safari\
    \ tracking your movements on the Web to be a bit sinister, follow these steps\
    \ to wipe out the History list:\n\n1. In Safari, tap the `Bookmarks` button. Safari\
    \ opens the Bookmarks list.\n2. Tap `Back` until you get to the Bookmarks screen.\n\
    3. Tap `History`. Safari opens the History screen.\n4. Tap `Clear`. Safari asks\
    \ how much of your history you want to clear, as shown in Figure 9-16.\n   - `![A429116_1_En_9_Fig16_HTML.jpg](A429116_1_En_9_Fig16_HTML.jpg)`\n\
    \   - **Figure 9-16.** Tap `Clear` and then tap how much of your web browsing\
    \ history you want to delete.\n5. Tap a time period: `The Last Hour`, `Today`,\
    \ `Today and Yesterday`, or `All Time`. Safari deletes every site from the History\
    \ list for that time period.\n\n**Note**\n\nSafari uses your history (as well\
    \ as your bookmarks) to analyze each page you view and determine the most likely\
    \ link you’ll tap — the so-called top hit — and preloads that link. If you do\
    \ tap that link, the page loads lickety-split. However, if you’re not comfortable\
    \ having Safari send your history and bookmarks to Apple, you can turn this feature\
    \ off. Tap `Settings`, tap `Safari`, and then tap the `Preload Top Hit` switch\
    \ to `Off` (see Figure 9-17).\n   - `![A429116_1_En_9_Fig17_HTML.jpg](A429116_1_En_9_Fig17_HTML.jpg)`\n\
    \   - **Figure 9-17.** You can prevent Safari from making suggestions that other\
    \ people might be able to see.\n\n### You Do Not Want Safari to Show Suggestions\
    \ When You Search\n\nAnother way Safari might compromise your online privacy is\
    \ by displaying suggestions as you enter search text into the address bar. If\
    \ someone is looking over your shoulder or simply borrows your device for a quick\
    \ search, she might see these suggestions.\n\n**Solution:** To turn these suggestions\
    \ off, follow these steps:\n\n1. Open the `Settings` app.\n2. Tap `Safari` to\
    \ open the Safari screen.\n3. Tap both the `Search Engine Suggestions` switch\
    \ and the `Safari Suggestions` switch to `Off`, as shown in Figure 9-17.\n\n###\
    \ You Want to Browse the Web without Storing Data About the Sites You Visit\n\n\
    If you find yourself constantly deleting your browsing history or website data,\
    \ you can save yourself a bit of time by configuring Safari to do this automatically.\
    \ This is called private browsing and it means that Safari doesn’t save any data\
    \ as you browse. Specifically, it doesn’t save the following:\n\n- Sites aren’t\
    \ added to the history (although the `Back` and `Forward` buttons still work for\
    \ navigating sites that you’ve visited in the current session).\n- Web page text\
    \ and images aren’t saved.\n- Search text isn’t saved with the search box.\n-\
    \ AutoFill passwords aren’t saved.\n\n**Solution:** To activate private browsing,\
    \ follow these steps:\n\n1. In Safari, tap the `Tabs` button.\n2. Tap `Private`.\
    \ Safari creates a separate set of tabs for private browsing.\n3. Tap `Add Tab\
    \ (+)`. Safari creates a new private tab.\n\nWhen you’re done browsing privately,\
    \ tap the `Tabs` icon and then tap the `Private` button to turn off Private Browsing.\n\
    \n### You Want to Ensure You’re Not Being Tracked by Online Advertisers\n\nUnder\
    \ the guise of providing you with the “benefit” of targeted ads, online advertisers\
    \ use cookies to track the websites you visit, the searches you conduct, and so\
    \ on. This data isn’t linked to you personally, but no one likes to be tracked\
    \ in this way. Fortunately, iOS Safari is configured by default to minimize this\
    \ kind of tracking, but you might want to confirm – or even strengthen – these\
    \ settings.\n\n**Solution:** Preventing online tracking involves two things. First,\
    \ make sure Safari’s `Do Not Track` setting is activated, which tells advertisers\
    \ not to track you online. Note, however, that it does not force advertisers not\
    \ to track you. Compliance is voluntary, but you should activate the setting anyway\
    \ for the few advertisers who do honor it.\n\nSecond, you need to decide the level\
    \ at which you want to block cookies. You have four choices:\n\n- **Always Block.**\
    \ This level tells Safari not to accept any cookies. I don’t recommend this level\
    \ because it disables functionality on many websites (for example, a site’s ability\
    \ to save your login data and customizations).\n- **Allow from Current Website\
    \ Only.** This level tells Safari to only accept cookies that are set by whatever\
    \ website you are currently visiting. No other website – in particular, no online\
    \ advertising site – can set a cookie. If you want to strengthen Safari’s ad-blocking,\
    \ this is the setting to use, although there’s a chance you might lose some functionality\
    \ (see the next item).\n- **Allow from Websites I Visit.** This level tells Safari\
    \ to only accept cookies not only from the current website, but also from any\
    \ website you’ve visited in the past. For example, suppose you have earlier visited\
    \ the YouTube site. If the current site wants to set a YouTube cookie, then this\
    \ setting will allow it. If you’ve never visited a site in the past – which will\
    \ be the case for the vast majority of online advertising sites – then Safari\
    \ blocks cookies from that site. This is the default setting, and it’s a good\
    \ compromise because sites you’ve previously visited might need to access a cookie\
    \ to implement some functionality on your current site (such as account data).\n\
    - **Always Allow.** This level tells Safari to accept any cookie from any site.\
    \ Avoid this setting because it means that any online advertiser who does not\
    \ honor the `Do Not Track` setting (which is, alas, the vast majority of them)\
    \ will use cookies to track you.\n\nFollow these steps to configure Safari to\
    \ ensure you’re not being tracked by online advertisers:\n\n1. Open the `Settings`\
    \ app.\n2. Tap `Safari` to open the Safari screen.\n3. If needed, tap the `Do\
    \ Not Track` switch to `On`.\n4. Tap `Block Cookies` to open the `Block Cookies`\
    \ screen, shown in Figure 9-18.\n   - `![A429116_1_En_9_Fig18_HTML.jpg](A429116_1_En_9_Fig18_HTML.jpg)`\n\
    \   - **Figure 9-18.** Safari’s cookie-blocking settings.\n5. Tap the cookie-blocking\
    \ setting you prefer to use."
