    \ battery usage by app, so you can see which apps have been draining your battery.\n\
    \n### You Want to Know Exactly How Much Battery Power You Have Left\n\nBy default,\
    \ iOS displays a battery icon in the status bar (see Figure [10-1](#A429116_1_En_10_Chapter.html#Fig1)).\
    \ As the battery drains, the amount of white inside the icon gets smaller, and\
    \ the level turns red when the amount of battery power gets low enough that you\
    \ need to start paying attention. This is useful information, to be sure, but\
    \ it's all a bit vague and imprecise.\n\n![A429116_1_En_10_Fig1_HTML.jpg](A429116_1_En_10_Fig1_HTML.jpg)\n\
    \nFigure 10-1.\n\nThe iOS battery icon appears in the status bar\n\nSolution:\
    \ To keep closer tabs on your device battery life, you need to tell iOS to also\
    \ display the percentage of battery power remaining. Here are the steps to follow:\n\
    \n1.  On the Home screen, tap Settings to open the Settings app.  \n2.  Tap Battery\
    \ to open the Battery screen.  \n3.  Tap the Battery Percentage switch to On,\
    \ as shown in Figure [10-2](#A429116_1_En_10_Chapter.html#Fig2).\n\n    ![A429116_1_En_10_Fig2_HTML.jpg](A429116_1_En_10_Fig2_HTML.jpg)\n\
    \n    Figure 10-2.\n\n    Tap the Battery Percentage switch to On to add the percentage\
    \ of battery power remaining to the status bar icon\n\n### You Want to Know How\
    \ Much You're Using Your Device on Battery Power\n\nApple puts out lots of battery\
    \ life numbers that include both usage mode (that is, when your device is on)\
    \ and standby mode (when your device is asleep). But if you need to know whether\
    \ your device will have enough battery power for, say, a long plane ride or some\
    \ similar extended time away from a power outlet, can you really trust Apple numbers?\n\
    \nSolution: Fortunately, you don't have to trust Apple on this because iOS keeps\
    \ track of your devices overall battery use. Specifically, it tracks the amount\
    \ of time since the last full charge that your device has been in usage mode and\
    \ in standby mode. By tracking these numbers over time and over several charging\
    \ cycles, you'll get to know how much battery life your iOS device gets when you\
    \ use it.\n\nFollow these steps to view these numbers:\n\n1.  On the Home screen,\
    \ tap Settings to open the Settings app.  \n2.  Tap Battery to open the Battery\
    \ screen.  \n3.  Scroll to the bottom of the screen and read the Usage and Standby\
    \ values, as shown in Figure [10-3](#A429116_1_En_10_Chapter.html#Fig3).\n\n \
    \   ![A429116_1_En_10_Fig3_HTML.jpg](A429116_1_En_10_Fig3_HTML.jpg)\n\n    Figure\
    \ 10-3.\n\n    Scroll to the bottom of the Battery screen to read the total time\
    \ since the last full charge that your iOS device has been in usage and standby\
    \ modes\n\n### You Suspect an App Has Been Using Too Much Battery Power\n\nOne\
    \ of the benefits of adding the percentage value to the status bar's battery icon\
    \ and monitoring the Usage time in the Battery screen of the Settings app is that\
    \ you get to know how your apps use battery power. In particular, you might notice\
    \ that your battery seems to drain a little faster than normal when you use a\
    \ particular app. That's useful to know, but how can you be sure?\n\nSolution:\
    \ iOS can help by breaking down your device's battery usage by app. For both the\
    \ last 24 hours and the last 7 days, you see the percentage of total battery power\
    \ that each app has used. You can also display the total amount of time each app\
    \ has used the battery both when the app was onscreen and when it was running\
    \ in the background.\n\nIf you see that a particular app has been using far more\
    \ battery life than you think it should – particularly if you don't use the app\
    \ much more than your other apps – it might indicate a problem. For example, the\
    \ app might have a memory leak, or it might be running tasks in the background.\n\
    \nFollow these steps to view battery usage by app:\n\n1.  On the Home screen,\
    \ tap Settings to open the Settings app.  \n2.  Tap Battery to open the Battery\
    \ screen.  \n3.  In the Battery Usage section (see Figure [10-4](#A429116_1_En_10_Chapter.html#Fig4)),\
    \ tap to switch between seeing usage for the Last 24 Hours and the Last 7 Days.\n\
    \n    ![A429116_1_En_10_Fig4_HTML.jpg](A429116_1_En_10_Fig4_HTML.jpg)\n\n    Figure\
    \ 10-4.\n\n    In the Battery screen, the Battery Usage section breaks down battery\
    \ percentage and, optionally, battery usage times, by app  \n4.  Tap the Time\
    \ icon (pointed out in Figure [10-4](#A429116_1_En_10_Chapter.html#Fig4)) to toggle\
    \ the total onscreen and background usage times for each app.\n\n## Extending\
    \ Battery Life\n\nReducing battery consumption as much as possible on your iOS\
    \ device not only extends the time between charges but also extends the overall\
    \ life of your battery. The Battery Usage screen usually offers a suggestion or\
    \ two for extending battery life, but there are many other steps you can take."
