    \n### 网页浏览问题故障排除\n\n#### 您无法正常查看页面文本或其他信息\n\n我们身处移动网页革命已有多年，令人惊讶的是，仍有大量网站未针对移动浏览进行优化。这意味着您经常访问一些为桌面浏览器设计的网站，导致文本、图像和其他数据小得无法辨认，尤其是在较小的\
    \ iPhone 或 iPod touch 屏幕上。\n\n**解决方案**：许多网站支持您通过将两根手指放在屏幕上并分开来放大页面。要快速放大页面上有不同区域的部分，您可以双击要放大的特定区域——可以是图片、段落、表格或文本列。Safari\
    \ 会将此区域放大以填满屏幕宽度。再次双击可恢复常规视图。\n\n> **注**：双击缩放技巧并非在所有页面上都有效。如果网页开发者将页面的 `maximum-scale`\
    \ 属性设置为 `1`，则表示您无法将页面放大到超过其原始尺寸。\n"
- fmt: "### It Takes a Long Time to Scroll Back to the Top of a Long Web Page\n\n\
    Although most web pages contain only a screenful or two of text and images, some\
    \ pages are quite lengthy and consist of many screens. If you’re reading a particularly\
    \ long-winded web page and you’re near the bottom, you may have quite a long way\
    \ to scroll if you need to head back to the top to get to the address/search bar.\n\
    \nSolution: Save the wear and tear on your flicking finger! Instead, tap the status\
    \ bar at the top of the screen once to display the address/search bar, then tap\
    \ the status bar a second time; Safari immediately transports you to the top of\
    \ the page.\n\nTip\n\nIf you’re using any model of the iPhone 6 or later, you\
    \ might find it hard to reach the top of the screen if you’re surfing one-handed.\
    \ Remember that you can lightly double-tap the `Home` button to drop the Safari\
    \ screen down halfway and bring its top bar within easy reach.\n\n### You Want\
    \ to View a Website’s Desktop Version\n\nMany websites recognize that you’re surfing\
    \ with an iOS device and display a “mobile” version of the site. This version\
    \ is usually easier to read and navigate, but that ease almost always comes at\
    \ the cost of having access to fewer site features.\n\nSolution: If a site isn’t\
    \ displaying the feature you want, you can request the site’s “desktop” version\
    \ (that is, the full version that you’d see if you were using a desktop browser).\
    \ Follow these steps:\n\n1.  Swipe down on the screen to reveal the menu bar.\n\
    2.  Tap the `Share` button.\n3.  In the bottom list of share actions, tap `Request\
    \ Desktop Site`, as shown in Figure 4-1.\n\n    ![A429116_1_En_4_Fig1_HTML.jpg](A429116_1_En_4_Fig1_HTML.jpg)\n\
    \n    Figure 4-1. To switch a site from mobile to desktop, tap `Share`, then tap\
    \ `Request Desktop Site`\n\n### You Find a Web Page’s Extra Features Too Distracting\n\
    \nReading an article or essay online is no picnic. The problem is the sheer amount\
    \ of distraction on almost any page: background colors or images that clash with\
    \ the text; ads above, to the side of, and within the text; site features such\
    \ as search boxes, feed links, and content lists; and those ubiquitous icons for\
    \ sharing the article with your friends on Facebook, Twitter, Pinterest, and on\
    \ and on. Even worse, many of these features blink or change, so reading the page\
    \ content is a real challenge.\n\nSolution: Safari can help you solve this problem\
    \ by offering the `Reader` feature for pages that support it. `Reader` removes\
    \ all those extraneous page distractions that just get in the way of your reading\
    \ pleasure. So, instead of a cacophony of text, icons, and images, you see pure,\
    \ simple, large-enough-to-be-easily-read text. How do you arrive at this blissful\
    \ state? By tapping the title bar at the top of the Safari screen and then tapping\
    \ the `Reader` button, which appears on the left side of the address bar, as pointed\
    \ out in Figure 4-2. Safari instantly transforms the page, and you see something\
    \ similar to the page shown in Figure 4-3 (which is the `Reader` version of the\
    \ page shown in Figure 4-2).\n\n![A429116_1_En_4_Fig3_HTML.jpg](A429116_1_En_4_Fig3_HTML.jpg)\n\
    \nFigure 4-3. The `Reader` version of a web page is a simple and easy-to-read\
    \ text affair\n\n![A429116_1_En_4_Fig2_HTML.jpg](A429116_1_En_4_Fig2_HTML.jpg)\n\
    \nFigure 4-2. Today’s web pages are all too often festooned with ads, icons, and\
    \ other bric-a-brac\n\n### You Want to Open New Tabs in the Background\n\nDepending\
    \ on your iOS device and your version of iOS, when you tap and hold a link and\
    \ then tap `Open in New Tab`, you might find that Safari immediately switches\
    \ to the new tab and loads the link while you wait. That’s often the behavior\
    \ you want because it lets you view the new web page as soon as it loads. However,\
    \ you might find that most of the time you prefer to stay on the current web page\
    \ and check out the new tab later.\n\nSolution: Having to perform the extra tap\
    \ to get back to the current tab gets old in a hurry. The solution is to configure\
    \ Safari to always open new tabs in the background. (This setting is off by default\
    \ on the iPhone and iPod touch, but on by default on the iPad.) Follow these steps:\n\
    \n1.  On the Home screen, tap `Settings`. The Settings app slides in.\n2.  Tap\
    \ `Safari`. iOS displays the Safari screen.\n3.  On the iPhone or iPod touch,\
    \ tap `Open Links` and then tap `In Background`, as shown in Figure 4-4. On the\
    \ iPad, tap the `Open New Tabs in Background` switch to On.\n\n    ![A429116_1_En_4_Fig4_HTML.jpg](A429116_1_En_4_Fig4_HTML.jpg)\n\
    \n    Figure 4-4. On the iPhone or iPod touch, tap `In Background` in the `Open\
    \ Links` screen\n\n### You Want to Read One or More Pages While You’re Offline\n\
    \nIn your web travels, you’ll often come upon a page with fascinating content\
    \ that you can’t wait to read. Unfortunately, a quick look at the length of the\
    \ article tells you that you’re going to need more time than you currently have\
    \ available. You have a long flight or other stretch of offline time coming up,\
    \ so that would be perfect, but how do you save web content for offline reading?\n\
    \nSolution: You can take advantage of a Safari feature called the Reading List.\
    \ As the name implies, this is a simple list of things to read. When you don’t\
    \ have time to read something now, add it to your Reading List and you can read\
    \ it at your leisure, even when you’re not connected to the Internet.\n\nThere\
    \ are a couple of techniques you can use to add a page to your Reading List:\n\
    \n*   Use Safari to navigate to the page that you want to read later, tap the\
    \ `Share` button, and then tap `Add to Reading List`.\n*   Tap and hold a link\
    \ for the page that you want to read later and then tap `Add to Reading List`.\n\
    \nWhen you’re ready to read, open Safari, tap the `Bookmarks` button, and then\
    \ tap the `Reading List` tab, shown in Figure 4-5. Safari displays all the items\
    \ you’ve added to the list and you just tap the article you want to read. To make\
    \ the list a bit easier to manage, tap `Show Unread` to see just the pages you\
    \ haven’t yet perused.\n\n![A429116_1_En_4_Fig5_HTML.jpg](A429116_1_En_4_Fig5_HTML.jpg)\n\
    \nFigure 4-5. Safari’s Reading List tab contains the web pages you’ve saved for\
    \ later"
