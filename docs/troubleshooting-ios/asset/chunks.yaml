    \ calls won’t go through. Similarly, if you have to return your iPhone to Apple\
    \ for repairs or battery replacement, the phone won’t be available if anyone tries\
    \ to call you, so everything goes to voicemail.\n\nSolution: For these and other\
    \ situations where your iPhone can’t accept incoming calls, you can work around\
    \ the problem by having your calls forwarded to another number, such as your work\
    \ or home number. Note that the availability of this feature depends on whether\
    \ your cellular provider supports it.\n\nHere’s how it’s done:\n\n1.  On the Home\
