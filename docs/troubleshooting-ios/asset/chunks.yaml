  raw: "### You Have Trouble Syncing Music or Videos\n\nYou may run into a problem\
    \ syncing your music or videos to your iOS device.\n\nSolution: The most likely\
    \ culprit here is that your files are in a format that iOS can't read, such as\
    \ WMA, MPEG-1, or MPEG-2\\. First, convert the files to a format that iOS does\
    \ understand using converter software (such as Format Factory; see [`www.pcfreetime.com/`](http://www.pcfreetime.com/)\
    \ ). Then put them back on iTunes and try to sync again. This should solve the\
    \ problem.\n\niOS-supported audio formats include AAC, Protected AAC, HE-AAC,\
    \ MP3, MP3 VBR, Audible (formats 2, 3, and 4; Audible Enhanced Audio; AAX; and\
    \ AAX+), Apple Lossless, AIFF, and WAV. iOS-supported video formats include H.264,\
    \ MPEG-4, and Motion JPEG.\n\n### An App Opens Each Time You Connect Your Device\n\
    \nEach time you connect your iOS device to your computer, you might see the Photos\
    \ app (on your Mac) or the AutoPlay dialog box (in Windows). This is certainly\
    \ convenient if you actually want to send photos to your computer, but you might\
    \ find that you do that only once in a blue moon. In that case, having to deal\
    \ with iPhoto or a dialog box every time is frustrating and time consuming.\n\n\
    Solution: You can configure your computer not to pester you about getting photos\
    \ from your iOS device.\n\nNote\n\nConfiguring your computer not to download photos\
    \ from your iOS device means that in the future, you'll either need to reverse\
    \ the setting to get photos or manually import them.\n\nHere's how you set this\
    \ up on your Mac:\n\n1.  Click Spotlight, type image, and then click Image Capture.\
    \ The Image Capture application opens.  \n2.  In the Devices list, click your\
    \ iOS device.  \n3.  At the bottom of the Devices pane, click the Connecting this\
    \ camera opens menu, and then choose No application, as shown in Figure [12-9](#A429116_1_En_12_Chapter.html#Fig9).\n\
    \n![A429116_1_En_12_Fig9_HTML.jpg](A429116_1_En_12_Fig9_HTML.jpg)\n\nFigure 12-9.\n\
    \nIn the Mac's Image Capture program, choose No application to prevent Photos\
    \ from starting when you connect your iOS device  \n4.  Click Image Capture and\
    \ then click Quit Image Capture. Image Capture saves the new setting and then\
    \ shuts down. The next time you connect your iOS device, Photos ignores it.\n\n\
    Follow these steps to convince Windows not to open the AutoPlay dialog box each\
    \ time you connect your iOS device:\n\n1.  Open the Default Programs window:\n\
    \    *   Windows 10\\. In the taskbar's Search box, type default and then click\
    \ Default Programs.\n    *   Windows 8\\. In the Start screen, type default and\
    \ then click Default Programs.\n    *   Windows 7\\. Click Start and then click\
    \ Default Programs to open the Default Programs window. \n2.  Click Change AutoPlay\
    \ settings. The AutoPlay dialog box appears.  \n3.  In the Devices section, open\
    \ the list for your iOS device and choose Take no action, as shown in Figure [12-10](#A429116_1_En_12_Chapter.html#Fig10).\n\
    \n![A429116_1_En_12_Fig10_HTML.jpg](A429116_1_En_12_Fig10_HTML.jpg)\n\nFigure\
    \ 12-10.\n\nIn the list for your iOS device, choose Take no action to prevent\
    \ the AutoPlay dialog box from appearing when you connect your iOS device  \n\
    4.  Click Save. Windows saves the new setting. The next time you connect your\
    \ iOS device, you won't be bothered by the AutoPlay dialog box.\n\nIndex A Accessibility\
