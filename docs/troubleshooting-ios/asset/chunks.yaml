  trans: "\n# 你想让 iOS 自动备份你的设备\n\n使用 iTunes 备份你的 iOS 设备很方便，但需要将设备连接到电脑、打开 iTunes 并运行备份。这些步骤并不繁琐，但足以成为一道障碍，可能导致你无法定期备份设备。这是一个问题，因为成功恢复数据的关键在于拥有一个最近的备份可用。\n\
    \n为了确保这一点，如果能有一种方法按定期计划自动备份你的 iOS 设备，那将非常理想。\n\n解决方案：如果你有 iCloud 账户，可以将 iOS 设备配置为使用\
    \ iCloud 作为备份位置。\n\n如果你经常使用 iTunes 同步 iOS 设备，可以告诉 iTunes 使用 iCloud 作为备份位置。请按照以下步骤进行配置：\n\
    \n1. 将你的 iOS 设备连接到电脑。\n2. 在 iTunes 中，当你的 iOS 设备出现在设备列表时，点击它。\n3. 点击“摘要”标签页。\n\
    4. 在“自动备份”部分，选择“iCloud”，如图 8-10 所示。\n\n   ![A429116_1_En_8_Fig10_HTML.jpg](img/A429116_1_En_8_Fig10_HTML.jpg)\n\
    \n   图 8-10. 在 iTunes 中，点击已连接的 iOS 设备，点击“摘要”标签页，然后在“自动备份”部分点击“iCloud”\n\n如果你从不使用\
    \ iTunes，你仍然可以通过 iOS 设备本身直接配置 iOS 将数据备份到 iCloud：\n\n1. 在主屏幕上，点击“设置”以启动“设置”应用。\n\
    2. 点击“iCloud”。\n3. 点击“备份”。\n4. 将“iCloud 云备份”开关拨到“开”，如图 8-11 所示，然后在 iCloud 确认设置时点击“好”。这会告诉\
    \ iOS 在设备锁定、连接到 Wi-Fi 网络并接入电源时进行自动备份。\n\n   ![A429116_1_En_8_Fig11_HTML.jpg](img/A429116_1_En_8_Fig11_HTML.jpg)\n\
    \n   图 8-11. 将“iCloud 云备份”拨到“开”，以设置自动 iCloud 备份\n\n5. 若要立即运行备份，请点击“立即备份”。你的 iOS\
    \ 设备会将数据备份到你的 iCloud 账户。\n\n# 你遇到 iCloud 备份问题\n\n设置 iCloud 备份后，你可能会发现备份无法完成或根本不会运行。\n\
    \n解决方案：导致 iCloud 备份无法运行的可能原因有多种。以下是一些需要检查的事项：\n\n-   确保 iCloud 备份已激活。打开“设置”应用，点击“iCloud”，点击“备份”，然后将“iCloud\
    \ 云备份”开关拨到“开”。\n-   确保你的 iOS 设备已连接到 Wi-Fi 网络。如果没有互联网连接，iCloud 备份无法运行，也无法通过蜂窝网络连接运行。\n\
    -   确保你的 iOS 设备已接入电源。\n-   确保你的设备已锁定。\n-   检查你的 iCloud 账户是否有可用空间。要检查这一点，请打开“设置”应用，点击“iCloud”，然后查看“存储空间”命令旁边的“可用”值，如图\
    \ 8-12 所示。\n\n  ![A429116_1_En_8_Fig12_HTML.jpg](img/A429116_1_En_8_Fig12_HTML.jpg)\n\
    \n  图 8-12. 在“设置”应用的 iCloud 界面中，“存储空间”命令会显示你的 iCloud 账户中剩余多少可用空间\n\n注意：如何知道你的\
    \ iCloud 是否有足够的可用空间？备份大小因设备和容量而异，但预计你的备份需要 400 MB 到 1 GB 的空间。\n\n如果你的 iCloud 备份因存储空间不足而失败，你可以通过删除不再拥有或使用的设备上的一个或多个备份来释放一些空间：\n\
    \n1. 在主屏幕上，点击“设置”以启动“设置”应用。\n2. 点击“iCloud”。\n3. 点击“存储空间”。\n4. 点击“管理存储空间”。\n5.\
    \ 在“备份”部分，点击你想要删除备份的设备。\n6. 点击“删除备份”。iOS 会要求你确认是否要关闭此设备的备份并删除其备份数据。\n7. 点击“关闭并删除”。\n\
    \n# 保护丢失的设备\n\n如果使用 iOS 设备有缺点的话，那就是你生活中相当大的一部分内容都会集中在这台设备上。起初，这听起来可能是件好事，但如果你不小心丢失了设备，你生活的这部分内容也可能随之丢失。此外，假设你之前没有为\
    \ iOS 设备配置密码锁，那么你的隐私就会出现一个大漏洞，因为任何人都可以随意查看你的数据。\n\n如果你一直在定期备份 iOS 设备，那么你很可能可以恢复大部分甚至全部数据。然而，我相信你更愿意找到你的设备，因为它价格昂贵，而且想到陌生人在翻阅你的东西，总会让人感到有些毛骨悚然。\n\
    \n以往寻找丢失的 iOS 设备的方法包括仔细搜索你丢失前到过的每一个角落，并给各个失物招领处打电话，看是否有人上交。现在寻找 iOS 设备的新方法是通过一个叫做“查找我的\
    \ iPhone”的功能。（如果你有 iCloud 账户，可以通过 iCloud 账户使用该功能，或者通过“查找我的 iPhone”应用来使用。）“查找我的\
    \ iPhone”利用内置在 iOS 设备中的 GPS 传感器来定位设备。你还可以使用“查找我的 iPhone”在 iOS 设备上播放声音、远程锁定设备并发送信息，或者在紧急情况下远程删除你的数据。\n\
    \n注意：你可能会认为“查找我的 iPhone”的一个致命缺陷是，拿到你 iOS 设备的人可以轻松关闭该功能并禁用它。幸运的是，情况并非如此，因为 iOS\
    \ 带有一个名为“激活锁”的功能，这意味着只有输入你的 Apple ID 密码，才能关闭“查找我的 iPhone”。\n\n## 你想确保能够找到丢失的设备\n\
    \n“查找我的 iPhone”的工作原理是寻找你的 iOS 设备向外界发送的特定信号。此信号默认是关闭的，因此如果你计划使用“查找我的 iPhone”，需要先将其打开。\n\
    \n解决方案：按照以下步骤激活“查找我的 iPhone”：\n\n1. 在主屏幕上，点击“设置”。出现“设置”应用。\n2. 点击“iCloud”。显示你的\
    \ iCloud 账户设置。\n3. 点击“查找我的设备”（其中“设备”指 iPhone、iPad 或 iPod）。\n4. 将“查找我的设备”开关拨到“开”。iOS\
    \ 会要求你确认。\n5. 点击“允许”。\n\n提示：你丢失的 iOS 设备可能只是躺在某个无人能找到的地方。这种情况下，风险在于你还没来得及通过“查找我的\
    \ iPhone”定位它之前，iOS 设备电池就已耗尽。为了降低这种可能性，请务必激活“发送最后位置”开关。这会配置 iOS 在其检测到电池电量即将耗尽时，向你发送设备的最后已知位置。\n\
    \n## 你想在地图上定位丢失的设备\n\n为了大致了解丢失设备的位置，你可能更倾向于通过地图直观地查看其位置。\n\n解决方案：你可以使用 `icloud.com`\
    \ 的“查找我的 iPhone”功能来定位你的设备。请按照以下步骤操作：\n\n1. 使用网页浏览器导航至 [`www.icloud.com`](http://www.icloud.com)。注意：除了使用\
    \ `icloud.com`，你也可以使用“查找我的 iPhone”应用来定位你丢失的 iOS 设备。\n2. 登录到你的 iCloud 账户。\n3. 点击“查找我的\
    \ iPhone”。出现 iCloud“查找我的 iPhone”应用。\n4. 点击“所有设备”。iCloud 会显示你的 iOS 设备列表。\n5. 在列表中点击你丢失的\
    \ iOS 设备。iCloud 会将你的 iOS 设备定位到地图上，如图 8-13 所示。\n\n   ![A429116_1_En_8_Fig13_HTML.jpg](img/A429116_1_En_8_Fig13_HTML.jpg)\n\
    \n   图 8-13. 你可以使用 iCloud 的“查找我的 iPhone”应用将丢失的 iOS 设备定位到地图上\n\n提示：要查看设备的位置是否已发生变化，请点击“刷新位置”按钮（如图\
    \ 8-13 中所指）。\n"
- fmt: "# You Want to Locate a Lost Device by Playing a Sound\n\nLocating your lost\
    \ device on a map is often handy (for example, it might show you that your device\
    \ is in your house or your workplace), but most of the time it's not specific\
    \ enough to tell you exactly where your device can be found.\n\nIf you misplace\
    \ your iPhone, the first thing you should try is calling your number using another\
    \ device so you can hear it ringing.\n\nThe solution won't work if, for example,\
    \ your phone has Ring/Silent switched to silent mode, if it's in Airplane mode,\
    \ or if you don't have another device handy. It would be nice to be able to hear\
    \ a sound on your iPhone anyway, and it would be nice to be able to hear a sound\
    \ on a lost iPad or iPod touch.\n\nSolution: You can use Find My iPhone to play\
    \ a sound on your device. This sound plays even if your iOS device is in silent\
    \ mode or Airplane mode, and it plays loudly even if your iOS device has its volume\
    \ turned down or muted. Here's how it works:\n\n1.  Sign in to iCloud and open\
    \ the Find My iPhone application.\n2.  Display the My Devices list.\n3.  Click\
    \ your lost iOS device in the list. Find My iPhone locates your iOS device on\
    \ a map.\n4.  Click Play Sound. Find My iPhone begins playing the sound on your\
    \ iOS device and displays an alert message.\n5.  When you find your iOS device,\
    \ tap OK in the alert message (and, if needed, enter your passcode or Touch ID)\
    \ to silence the sound.\n\n# You Want to Lock the Data on a Lost Device\n\nIf\
    \ you can't find your iOS device right away by playing a sound, your next step\
    \ should be to ensure that some other person who finds the device can't rummage\
    \ around in your stuff.\n\nSolution: You do that by putting your iOS device into\
    \ lost mode, which remotely locks the iOS device using the passcode that you set\
    \ earlier. (If you didn't protect your iOS device with a passcode, you can't remotely\
    \ lock the device.) You can also provide a phone number where you can be reached\
    \ and send a message for whoever finds your iOS device.\n\nFollow these steps\
    \ to put your iOS device into lost mode:\n\n1.  Sign in to iCloud and open the\
    \ Find My iPhone application.\n2.  Display the My Devices list.\n3.  Click your\
    \ lost iOS device in the list. Find My iPhone locates the device on a map.\n4.\
    \  Click Lost Mode. Find My iPhone displays the Lost Mode dialog, which prompts\
    \ you for a phone number where you can be reached.\n5.  Type your phone number\
    \ and then click Next. Find My iPhone prompts you to type a message that will\
    \ appear on the iOS device along with the phone number.\n6.  Type the message\
    \ and then tap or click Done. Find My iPhone remotely locks the iOS device and\
    \ displays the message.\n\n**Caution**\n\nIf you do not locate your device after\
    \ it has been locked, keep an eye out for an email or text message telling you\
    \ that your device has been found. When you click the link, you're asked to provide\
    \ your Apple sign-in credentials. This will look like a legitimate Apple message,\
    \ but it's really a scam set up to obtain your Apple ID sign-in data, so that\
    \ the scammer can unlock your device.\n\n# You Want to Erase the Data on a Lost\
    \ Device\n\nIf you can't get the other person to return your iOS device and it\
    \ contains sensitive or confidential data, you might want to take further steps\
    \ to ensure that the other person cannot access your data.\n\nSolution: You can\
    \ use Find My iPhone to take the drastic step of remotely wiping all the data\
    \ from your iOS device. Here are the steps to follow:\n\n1.  Sign in to iCloud\
    \ and open the Find My iPhone application.\n2.  Display the My Devices list.\n\
    3.  Click your lost iOS device in the list. Find My iPhone locates the device\
    \ on a map.\n4.  Click Erase Device (where Device is iPhone, iPad, or iPod). Find\
    \ My iPhone prompts you for your Apple ID password.\n5.  Type your password and\
    \ then click Next. Find My iPhone asks you to enter an optional phone number where\
    \ you can be reached, which will appear on the iOS device after it has been erased.\n\
    6.  Type your phone number, and then click Next. Find My iPhone prompts you to\
    \ type a message that will appear on the iOS device along with the phone number,\
    \ after it has been erased.\n7.  Type the message, and then click Done. Find My\
    \ iPhone remotely wipes all data from the iOS device.\n\n**Note**\n\nIf you locate\
    \ your device after you have erased it, you can restore your settings, apps, and\
    \ data by connecting the device to your computer and then using iTunes to restore\
    \ your most recent backup.\n\n# 9. Solving Privacy Problems\n\nOne of the unforeseen\
    \ consequences of the mobile device revolution is that we now often do our computing\
    \ in public. Yes, there have long been people tapping on laptops in coffee shops,\
    \ but these days we're more likely to also be tapping on our phones and tablets\
    \ on buses, in parks, before movies, and after classes. This means that privacy\
    \ is a potential problem because now people can see our screens as we work. Another\
    \ unforeseen consequence of the mobile device revolution is that we now carry\
    \ with us a great deal of personal or confidential information. This opens up\
    \ another potential privacy problem because if someone gained access to your device,\
    \ that person would be free to view your apps, your oft-visited locations, your\
    \ browsing history, and much more. In Chapter 8 you learned how to lock your iOS\
    \ device, but it isn't difficult to imagine scenarios where someone could still\
    \ access your device while it is unlocked. All this means that it's important\
    \ to take privacy seriously and to embrace a prudent paranoia: Assume someone\
    \ is watching your screen when you're in public; assume someone could gain unlocked\
    \ access to your device. This chapter shows you how to take steps to solve these\
    \ and similar privacy problems.\n\n## Troubleshooting General Privacy Issues\n\
    \nLet's begin by troubleshooting a few issues related to general privacy concerns.\n\
    \n### As You Type, Each Character Pops Up on the Screen, Creating a Privacy Risk\n\
    \nThe iPhone onscreen keyboard comes with a feature called character preview,\
    \ which displays a pop-up version of each character as you tap it. (This doesn't\
    \ happen on the iPad.) This is great for iOS keyboard rookies because it helps\
    \ them be sure they're typing accurately, but veterans often find it distracting.\
    \ Either way, it's a potential privacy risk to have each character pop up when\
    \ you're typing where anyone nearby can see your screen.\n\nSolution: Apple chose\
    \ to turn off character preview by default in iOS 9, but if you're seeing characters\
    \ as you type on your iPhone, then you need to turn it off yourself by following\
    \ these steps:\n\n1.  Open the Settings app.\n2.  Tap General.\n3.  Tap Keyboard.\n\
    4.  Tap the Character Preview switch to Off, as shown in Figure 9-1.\n\n    ![A429116_1_En_9_Fig1_HTML.jpg](A429116_1_En_9_Fig1_HTML.jpg)\n\
    \n    Figure 9-1. To prevent characters from popping up as you type them, turn\
    \ off the Character Preview setting\n\n**Caution**\n\nEven with Character Preview\
    \ set to On, iOS no longer shows pop-up versions of password characters. That's\
    \ nice, but it still shows your most recently tapped password character for as\
    \ long as three seconds! There's no way to turn that off, so try to cover your\
    \ password typing when you're in a public place."
