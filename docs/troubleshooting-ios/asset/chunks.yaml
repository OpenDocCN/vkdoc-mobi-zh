    \ default, and iOS Safari is no exception.\n\nHowever, not all pop-up windows\
    \ are annoyances. Some might show useful information or a key feature of a website’s\
    \ interface. With pop-ups blocked, however, you miss out on this information or\
    \ feature.\n\nSolution: You can temporarily turn off Safari’s pop-up blocker when\
    \ you visit a site that has a pop-up window you want to see. Here are the steps\
    \ to follow:\n\n1.  In the Home screen, tap Settings to display the Settings app.\
    \  \n2.  Tap Safari. The Safari screen appears.  \n3.  Tap the Block Pop-ups switch\
    \ to Off, as shown in Figure [4-7](#A429116_1_En_4_Chapter.html#Fig7).\n\n   \
    \ ![A429116_1_En_4_Fig7_HTML.jpg](A429116_1_En_4_Fig7_HTML.jpg)\n\n    Figure\
