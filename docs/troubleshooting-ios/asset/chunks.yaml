  trans: "\n### 尽量节省电池电量\n\n如果电池电量不足，附近又找不到电源插座，但你确实需要使用 iOS 设备，那么就需要最大限度地降低设备的耗电量。\n\
    \n**解决方案：** 以下是一些建议，可帮助你将设备电池消耗降至最低，同时仍保留部分功能：\n\n-   **尽量减少运行的应用数量。** 如果暂时无法给\
    \ iOS 设备充电，请避免后台任务（例如播放音乐）或次要任务（例如整理联系人）。如果你的唯一目标是阅读所有电子邮件，请专注于此事直至完成，因为你无法预知还有多少时间。\n\
    -   **确保“自动锁定”功能生效。** 你肯定不希望 iOS 设备在闲置时消耗电池电量，所以要确保“自动锁定”在正常工作。打开`设置`，轻点`显示与亮度`，轻点`自动锁定`，然后选择较短的时长（例如\
    \ iPhone 上选 1 分钟，iPad 上选 2 分钟）。\n-   **必要时，手动让 iOS 设备进入睡眠模式。** 如果你被打断——例如送披萨的小哥准时出现——不要等待\
    \ iOS 设备自动休眠，因为这几秒或几分钟会消耗宝贵的电池电量。相反，请立即按下`睡眠/唤醒`按钮，手动让设备进入睡眠模式。\n-   **不需要时关闭\
    \ Wi-Fi。** Wi-Fi 开启时会定期检查可用的无线网络，这会消耗电池电量。如果无需连接无线网络，请关闭 Wi-Fi 以节省电量。打开`设置`，轻点`无线局域网`，然后将`无线局域网`开关滑至`关闭`。\n\
    -   **不需要时关闭蜂窝数据。** 你的 iPhone 或支持蜂窝网络的 iPad 会持续搜索附近的蜂窝基站以维持信号，这会快速消耗电池电量。如果你在使用\
    \ Wi-Fi 网络上网，就不需要蜂窝数据，所以请将其关闭。打开`设置`，轻点`蜂窝网络`，然后将`蜂窝数据`开关滑至`关闭`。\n-   **不需要时关闭\
    \ GPS。** GPS 开启时，接收器会定期与 GPS 系统交换数据，这会消耗电池电量。如果暂时不需要 GPS 功能，请关闭 GPS 天线。打开`设置`，轻点`隐私与安全性`，轻点`定位服务`，然后将`定位服务`开关滑至`关闭`。\n\
    -   **不需要时关闭蓝牙。** 蓝牙运行时，会持续检查附近的蓝牙设备，这也会消耗电池电量。如果你没有使用任何蓝牙设备，请关闭蓝牙以节省电量。打开`设置`，轻点`蓝牙`，然后将`蓝牙`开关滑至`关闭`。\n\
    -   **降低电子邮件自动检查频率。** 让电子邮件频繁轮询服务器以获取新邮件会消耗电池。将其设置为每小时检查一次，或者，理想情况下，如果可以的话设置为`手动`检查。操作方法：轻点`设置`，轻点`邮件`，轻点`账户`，然后轻点`获取新数据`。在`获取`部分，轻点`每小时`或`手动`。\n\
    -   **关闭推送。** 如果你没有使用低电量模式，并且拥有 iCloud 或 Exchange 账户，请考虑关闭推送功能以节省电池电量。轻点`设置`，轻点`邮件`，轻点`账户`，然后轻点`获取新数据`。在“获取新数据”屏幕上，将`推送`开关滑至`关闭`，并在`获取`部分轻点`手动`。参见图\
    \ 10-10。\n\n    ![A429116_1_En_10_Fig10_HTML.jpg](img/A429116_1_En_10_Fig10_HTML.jpg)\n\
    \    **图 10-10.** 关闭推送以确保这个后台任务不会耗尽电池电量\n\n-   **停用后台应用刷新。** 当你急需电量时，可能不需要应用在后台运行。请参阅“你想阻止所有应用在后台运行”部分，了解如何关闭`后台应用刷新`。或者，你也可以考虑保持该开关打开，但针对个别应用（特别是像\
    \ Facebook 和 Gmail 这类活跃应用）关闭`后台应用刷新`；请参见“你想阻止特定应用在后台运行”部分。\n-   **开启低电量模式。** 不要等到电池电量降至\
    \ 20%（iOS 会自动提示你开启`低电量模式`）时再操作。尽早手动开启，以延长电池续航时间。我在“你想让 iOS 设备更省电”部分中展示了如何手动激活`低电量模式`。\n\
    -   **调暗屏幕。** 触摸屏会消耗大量电池电量，因此调暗屏幕可以减少能耗。在主屏幕上，轻点`设置`，轻点`显示与亮度`，然后将`亮度`滑块向左拖动以调暗屏幕。此外，将`自动亮度调节`开关滑至`关闭`，如图\
    \ 10-9 所示。\n\n    ![A429116_1_En_10_Fig9_HTML.jpg](img/A429116_1_En_10_Fig9_HTML.jpg)\n\
    \    **图 10-9.** 将屏幕亮度调至仍能看清内容的最低水平，并关闭“自动亮度调节”功能\n\n> **注：** 如果你暂时不需要使用设备的全部四个天线——Wi-Fi、蜂窝网络、GPS\
    \ 和蓝牙——更快的关闭方法是将 iOS 设备切换到飞行模式。可以打开`设置`，然后将`飞行模式`开关滑至`开启`；或者从屏幕底部向上滑动以打开控制中心，然后轻点`飞行模式`图标。\n\
    \n## 排查其他电池问题\n\n在本章结束前，我将快速介绍另外两个与电池相关问题的解决方案。\n"
- fmt: '### You Want to Maximize your Battery''s Lifespan


    It''s important to maximize battery life on days when you don''t have nearby power,
    but it''s also important to ensure that you maximize your battery''s entire lifespan.


    **Solution:** The lithium-ion (li-on) battery in your iOS device is much more
    forgiving than older battery technologies such as nickel-cadmium (NiCad). With
    just a few simple techniques and precautions, you can ensure that your battery
    gives good performance throughout the life of your iOS device:


    - **Minimize the number of cycles the battery has to charge.** Your iOS device
    battery is designed to maintain up to 80 percent of its original capacity after
    500 complete discharge and charge cycles. Discharging down to zero percent and
    recharging counts as one cycle, discharging to 50 percent and recharging counts
    as half a cycle, and so on. Your iOS device will reach that 500-cycle mark slower
    if you plug it into a power source as often as it’s convenient.

    - **Use the battery.** Don''t think, however, that you''ll keep the battery pristine
    by never using it. Li-on batteries require regular use or they''ll refuse to charge.

    - **Don''t cycle the battery.** Cycling – also called reconditioning or recalibrating
    – a battery means letting it completely discharge and then fully recharging it
    again. This was important in earlier battery technologies, but not with the Li-on
    battery in your iOS device. Letting the battery percentage drop to around 50 percent
    before recharging seems to be the sweet spot for maximizing battery life.

    - **Avoid temperature extremes.** Exposing your iOS device to extremely hot or
    cold temperatures reduces the long-term effectiveness of the battery. Try to keep
    your iOS device at a reasonable temperature.

    - **Try not to drop your iOS device.** Dropping the device can damage the battery,
    resulting in poor battery performance or even eventual failure.

    - **Use a high-quality charger.** Cheap chargers can damage batteries beyond repair.
    Either use the charger that came with your iOS device, or use a third-party charger
    that was designed to work with your specific make and model of iOS device.

    - **Don''t store your iOS device at full charge.** If you won''t be using your
    iOS device for a few weeks, or even longer, you''ll likely be tempted to give
    it a full charge before putting it in storage. However, for longer life, it''s
    better to store the device with the battery partially discharged – to, say, between
    40 and 60 percent.


    **Caution**: It''s even more important not to store your iOS device with its battery
    fully discharged. This can damage the battery to the point where it won''t charge
    at all when you plug the device back in.


    ### Your Battery Won''t Charge


    When you plug your iOS device into a power outlet, you might find that it does
    not charge.


    **Solution:** If you find that your battery won''t charge, here are some possible
    solutions:


    - If the iOS device is plugged in to a computer to charge via the USB port, it
    may be that the computer has gone into standby. Waking the computer should solve
    the problem.

    - The USB port might not be transferring enough power. For example, the USB ports
    on most keyboards and hubs don''t offer much in the way of power. If you have
    your iOS device plugged in to a USB port on a keyboard or hub, plug it in to a
    USB port on your Mac or PC.

    - Attach the USB cable to the USB power adapter, and then plug the adapter in
    to a power outlet.

    - Double-check all connections to make sure everything is plugged in properly.

    - Try another Lightning cable if you have one.

    - If the iOS device hasn''t been charged in a long time, its battery might have
    gone into sleep mode to protect itself from long-term damage. In this case, it
    will take a few minutes – perhaps as long as ten minutes – before the battery
    wakes up and starts charging in the normal manner.


    If none of these suggestions solves the problem, you may need to send your iOS
    device in for service.


    # 11. Getting Around Accessibility Issues


    The promise of an iPhone, iPad, or iPod touch is information at your fingertips.
    But what if mobility challenges make it difficult to control your hands, much
    less your fingertips? What if visual challenges make it hard to even see the information?
    Whether you’ve had to overcome physical disabilities since you were young or you’re
    discovering new physical limitations almost daily as you get older, that doesn’t
    mean you have to be shut out of the digital device revolution. True, iOS devices
    can be difficult or impossible to use if you have visual, aural, or physical challenges.
    But that’s only because the default settings seem to have been chosen to benefit
    twenty-somethings in perfect health. The good news is that you don’t have to settle
    for these defaults. iOS is chock full of useful settings, options, and techniques
    that can turn any device from being a pain (literally, in some cases) to use,
    to a pleasure (at least relatively speaking). In this chapter, I take you through
    various problems related to using an iOS device while dealing with visual, hearing,
    and physical limitations, and you learn how to configure iOS to enable you to
    work around those limitations and get the most out of your device.


    ## Working Around Visual Challenges


    Those of you who are no longer spring chickens (or even summer chickens, for that
    matter) know one thing for certain: the older you get, the worse your eyesight
    becomes. Sure, you can ramp up your eyeglass prescription or invest in extra-strength
    reading glasses, but even that may not be enough when it comes to reading text
    and deciphering icons on your iOS device screen. And, of course, if your eyesight
    problems go beyond simple afflictions such as farsightedness or astigmatism, then
    a change of eyewear isn’t going to help you make sense of what’s happening on
    your screen.


    Whatever the source of your visual challenges, you can’t work with iOS if you
    can’t see what iOS is trying to show you onscreen. Fortunately, you can put iOS
    to work, making it easier to see text, icons, and images. As you learn in this
    section, iOS offers a number of tools for enlarging screen items, making things
    easier to see, reducing visual distractions, and even hearing audio translations
    of what’s on the screen.'
