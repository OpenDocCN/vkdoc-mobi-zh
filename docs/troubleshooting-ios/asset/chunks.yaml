  trans: "\n### 你想要阻止 iOS 使用数据漫游\n\n数据漫游是一项常常很方便的功能，它让你在离开正常网络覆盖区域时，也能拨打电话——并且，在你的\
    \ iOS 设备上，还可以上网、查看和发送电子邮件以及互发短信。它的缺点是，除非你从移动运营商那里购买了固定费率的漫游套餐，否则漫游费用几乎总是高得令人瞠目结舌。根据你所在的位置和使用的服务类型，费用通常按每分钟或每兆字节几美元计算。这可不好！\n\
    \n不幸的是，如果你开启了 iOS 的`数据漫游`功能，即使你从未使用过你的设备，也可能会产生巨额漫游费用！这是因为 iOS 仍然会为接收新电子邮件和短信等内容执行后台检查，所以，在某个遥远的地方待上一周，即使你根本没碰手机，也可能花费你数百美元。\n\
    \n**解决方法：** 为避免这种情况，请在不需要时关闭设备上的`数据漫游`功能。操作方法如下：打开`设置`应用，轻点`蜂窝网络`，轻点`蜂窝数据选项`，然后将`数据漫游`开关轻点至`关闭`。\n\
    \n---\n\n## 蓝牙问题故障排除\n\niOS 支持一种名为蓝牙的无线技术，它让你能够与其他支持蓝牙的设备（如耳机、键盘和游戏手柄）建立无线连接。理论上，连接蓝牙设备应该极其简单，但在实际中往往并非如此，因此本节为你提供一些常见的故障排除技巧。\n\
    \n### 你找不到蓝牙设备\n\n不出意外，如果你在`设置`应用的蓝牙窗口中看不到该设备，你就无法建立蓝牙连接。\n\n**解决方法：** 如果你在`设置`应用中看不到某个蓝牙设备，请尝试以下方法：\n\
    - 确保该设备已开启且电量充足。\n- 确保该设备处于可发现模式。与持续广播信号的 Wi-Fi 设备不同，大多数蓝牙设备只有在得到你指示时才会广播其可用性——也就是说，它们会让自己变得可被发现。大多数蓝牙设备都有一个你可以打开的开关或可以按下的按钮，以使其可被发现。\n\
    - 确保蓝牙设备与你的 iOS 设备之间的距离远小于 33 英尺（约 10 米），因为这是大多数蓝牙设备的最大有效范围。（某些所谓的 1 级蓝牙设备的有效范围是此距离的\
    \ 10 倍。）\n- 确保 iOS 已启用蓝牙。在`设置`应用中，轻点`蓝牙`，然后将`蓝牙`开关轻点至`开启`，如图 2-8 所示。\n\n  ![A429116_1_En_2_Fig8_HTML.jpg](img/A429116_1_En_2_Fig8_HTML.jpg)\n\
    \n  **图 2-8.** 在`设置`应用中，确保`蓝牙`开关设置为`开启`\n\n- 如果可能，请重启蓝牙设备。如果你无法重启该设备，或者重启后问题仍未解决，请重启你的\
    \ iOS 设备。\n- 咨询蓝牙设备制造商，确保该设备能够与 iOS 设备配对。\n\n### 你无法与蓝牙设备配对\n\n出于安全考虑，许多蓝牙设备在建立连接前需要与另一台设备进行配对。在某些情况下，配对是通过输入一个多位数字通行密钥来完成的——iOS\
    \ 称之为`PIN`——然后你必须在蓝牙设备上输入该密钥（当然，前提是该设备有某种键盘）。对于所有其他蓝牙设备，你可以在`设置`应用的蓝牙屏幕中轻点该设备来发起配对。无论哪种方式，你可能会发现，即使该设备能在蓝牙屏幕中正常显示，你也无法将其与你的\
    \ iOS 设备配对。\n\n**解决方法：** 首先尝试上一节中的解决方案。如果你仍然无法成功配对，请让 iOS 忘记该设备的信息并重新开始配对：\n\n\
    1.  打开`设置`应用，然后轻点`蓝牙`。\n2.  轻点蓝牙设备名称右侧的蓝色`更多信息`图标。\n3.  轻点`忽略此设备`。iOS 会要求你确认。\n\
    4.  轻点`好`。\n5.  当该设备重新出现在`蓝牙`窗口中时，再次尝试与之配对。\n\n### 通过已配对耳机听不到声音\n\n在你配对蓝牙耳机后，iOS\
    \ 通常会足够智能地通过耳机播放音乐，而不是通过设备的内置扬声器。这里的关键词是“通常”，因为 iOS 偶尔会无法做到这一点。\n\n**解决方法：** 你需要手动将已配对的耳机指定为输出设备。从屏幕底部向上轻扫以打开`控制中心`，轻点播放控制下方显示的`隔空播放`图标（位于`隔空投送`区域的右侧），然后轻点你已配对的蓝牙耳机（见图\
    \ 2-9）。现在，iOS 就会通过耳机播放你设备的音频了。\n\n![A429116_1_En_2_Fig9_HTML.jpg](img/A429116_1_En_2_Fig9_HTML.jpg)\n\
    \n**图 2-9.** 打开`隔空播放`屏幕，然后轻点你已配对的蓝牙耳机\n\n---\n\n# 3. 解决应用问题\n\n你的 iPhone、iPad\
    \ 或 iPod touch 是一件令人印象深刻的工业设计产品。从响应灵敏的触摸屏到强大的摄像头，再到整体时尚的设计，iOS 设备既是一件艺术品，也是一项工程杰作。但如果没有软件让它焕发生机，所有这些硬件都毫无用处；而在\
    \ iOS 世界中，这些软件以应用的形式存在。这不仅包括 iOS 默认安装的各种应用，还包括那些可通过`App Store`下载的苹果及第三方应用。\n\n\
    简而言之，尽管硬件一流，但你的 iOS 设备的功能和限制都是由其上安装的应用决定的。为何说是限制？因为一个残酷的事实是：如果你的应用无法正常工作，那么你的\
    \ iOS 设备也无法正常工作。如果你找不到某个应用、应用崩溃，或者应用的行为与开发者的预期不符，那么你的 iOS 体验将大打折扣。为了帮助你避免这种情况——或帮助你摆脱困境——本章将介绍一些与应用相关的常见问题及解决方案。\n\
    \n## 常规应用故障排除\n\n应用问题的范围很广，从找不到应用或它的数据（令人困扰），到应用行为异常（令人烦恼），再到应用完全无法工作（让人恼火）。好消息是，除非该应用的开发者极其无能，否则大多数应用问题都可以快速或至少直接地解决。\n\
    \n### 你发现搜索困难，因为 iOS 从太多应用中返回结果\n\n当你在 iOS 设备上执行`聚焦搜索`时，根据搜索文本的不同，你可能会看到来自各种应用的结果。如果进行更一般的搜索，你很容易看到来自二十多个甚至更多应用的结果。\n\
    \n**解决方法：** 配置`聚焦搜索`，使其不显示来自你很少使用或从不搜索的应用的结果。要配置`聚焦搜索`，请打开`设置`应用，轻点`通用`，然后轻点`聚焦搜索`。在`搜索结果`部分，将你希望从搜索中排除的每个应用旁边的开关轻点至`关闭`（见图\
    \ 3-1）。\n\n![A429116_1_En_3_Fig1_HTML.jpg](img/A429116_1_En_3_Fig1_HTML.jpg)\n\
    \n**图 3-1.** 在`设置`中，使用`聚焦搜索`屏幕告诉 iOS 要从搜索结果中排除哪些应用\n"
- fmt: "### You Find It Difficult to Locate an App\n\nIf you get a bit carried away\
    \ at the App Store, you can easily end up with a couple of hundred icons scattered\
    \ over a dozen or more pages (the max is 15 pages). Since the apps were most likely\
    \ installed in no particular order, finding a single app icon can be frustratingly\
    \ time consuming.\n\n**Solution:** You can reset your Home screen layout, which\
    \ does two things:\n\n- It restores the main Home screen and possibly part of\
    \ the second Home screen (depending on the device and iOS version) to the factory\
    \ default icon arrangement.\n- It displays all your third-party app icons in alphabetical\
    \ order.\n\n**Caution:** Resetting the Home screen layout also deletes any custom\
    \ app folders that you created.\n\nTo reset your Home screen layout, open `Settings`,\
    \ tap `General`, tap `Reset`, tap `Reset Home Screen Layout`, and then when iOS\
    \ asks for confirmation, tap `Reset Home Screen`.\n\n---\n\n### An App Is Displaying\
    \ Too Many Notifications\n\nLike a noisy or rude houseguest, some apps respond\
    \ to being invited into your iOS home by displaying notifications that are too\
    \ frequent or too insistent.\n\n**Solution:** Take control of the app’s notifications\
    \ by configuring them to your liking. Open the `Settings` app, tap `Notifications`,\
    \ and then tap the app you want to work with. iOS displays the app’s notification\
    \ options, as shown in Figure 3-2. Note that some apps — such as `Calendar` —\
    \ divide their notifications into categories, so you might need to tap a category\
    \ before you see options such as those shown in Figure 3-2.\n\n![A429116_1_En_3_Fig2_HTML.jpg](A429116_1_En_3_Fig2_HTML.jpg)\n\
    \n*Figure 3-2.* Use an app’s notification settings to control how often and where\
    \ you see its notifications.\n\nYou now have the following choices for configuring\
    \ the app’s notifications:\n\n- To stop the app’s notifications altogether, tap\
    \ the `Allow Notifications` switch to `Off`.\n- To not see the app’s notification\
    \ in the Notification Center, tap the `Show in Notification Center` switch to\
    \ `Off`.\n- To not hear the app’s notification sounds, tap the `Sounds` switch\
    \ to `Off`. For some apps, you turn off notification sounds by tapping `Sounds`\
    \ to see a list of sounds, then tapping `None`.\n- To not see the app’s badge\
    \ icon, tap the `Badge App Icon` switch to `Off`.\n- To not see the app’s notifications\
    \ on the Lock screen, tap the `Show on Lock Screen` switch to `Off`.\n- Use the\
    \ `Alert Style When Unlocked` section to choose the style you prefer for the app’s\
    \ notifications. Tap `None` to turn off alerts, or tap the style you want: `Banners`\
    \ (which disappear automatically after a few seconds) or `Alerts` (which don’t\
    \ disappear until you dismiss them).\n\n---\n\n### Your Facebook Data Doesn’t\
    \ Appear in the Contacts or Calendar App\n\niOS comes with Facebook support built\
    \ right in to the system. You can easily post links, photos, and other content\
    \ to your Facebook Timeline, and even send simple status updates without having\
    \ to load the Facebook app. However, this baked-in Facebook support is far less\
    \ of a convenience if you can’t see your Facebook friends in the `Contacts` app\
    \ or your Facebook events in the `Calendar` app.\n\n**Solution:** If you’re not\
    \ seeing your Facebook friends in the `Contacts` app, here are two things to try:\n\
    \n- In the `Settings` app, tap `Facebook` and then tap the `Contacts` switch to\
    \ `On`.\n- In the `Contacts` app, tap `Groups` and then tap to activate the `All\
    \ Facebook` group.\n\nIf you’re not seeing your Facebook events in the `Calendar`\
    \ app, try the following:\n\n- In the `Settings` app, tap `Facebook` and then\
    \ tap the `Calendar` switch to `On`.\n- In the `Calendar` app, tap `Calendars`\
    \ and then tap to activate the `Facebook Events` calendar.\n\n---\n\n### An App\
    \ is Frozen\n\nIf your iOS device screen freezes, the cause could be an app that\
    \ has crashed.\n\n**Solution:** You can usually get your device back in the saddle\
    \ by forcing the app to quit. There are two techniques you can try:\n\n- Press\
    \ and hold the `Sleep/Wake` button until you see the `Slide to Power Off` screen;\
    \ then press and hold the `Home` button for about 6 seconds. iOS shuts down the\
    \ app and returns you to the Home screen.\n- If an app is frozen but your device\
    \ still works fine otherwise, double-press the `Home` button to display the multitasking\
    \ screen, scroll right or left as needed to bring the app’s thumbnail screen into\
    \ view, then drag the app thumbnail up to the top of the screen. Your iPhone sends\
    \ the thumbnail off the screen and shuts down the app.\n\n---\n\n### Your Screen\
    \ Won’t Respond to Taps\n\nEvery now and then, your iOS device might freeze and\
    \ no amount of tapping, swiping, or threatening will get the phone to respond.\
    \ The most likely problem is that the touchscreen has become temporarily stuck.\
    \ To fix that, press the `Sleep/Wake` button to put the device to sleep, press\
    \ `Sleep/Wake` again to wake the device, and then drag `Slide to Unlock`. In most\
    \ cases, you should now be able to resume normal iOS operations.\n\nIf that doesn’t\
    \ work, then it’s possible that the app you’re using has crashed, so you need\
    \ to shut it down as I described in the “An app is frozen” section.\n\n---\n\n\
    ### An App Is Taking up a Large Amount of Space\n\nYour iOS device is so useful\
    \ and so much fun, it’s easy to forget that it has limitations, especially when\
    \ it comes to storage. This is particularly true if you have a 16GB device, but\
    \ even a device with greater capacity can fill up in a hurry if you stuff it with\
    \ movies, TV shows, and tons of magazine subscriptions.\n\nYou can tell how much\
    \ free space your device has left either by connecting it to `iTunes` or by tapping\
    \ `Settings`, then `General`, and then `Storage & iCloud Usage`. The `Storage\
    \ & iCloud Usage` screen not only shows you how much storage space you have available\
    \ but also lets you tap `Manage Storage` to see how much space each app is using.\n\
    \nIf you see that your device is running low on space, check the apps to see if\
    \ any of them are taking up more than their fair share of hard drive real estate.\n\
    \n**Solution:** If you see a hard drive hog, you have two ways to delete its data\
    \ and give your device some room to breathe:\n\n- **Third-party apps.** For an\
    \ app you picked up via the App Store, tap the app, tap `Delete App`, and then\
    \ tap `Delete App` when your iPhone asks you to confirm.\n- **Built-in apps.**\
    \ For an app that came with iOS (such as `Music` or `Video`), tap the app to display\
    \ a list of the data it’s storing on your device, and then tap `Edit`. This puts\
    \ the list in Edit mode. To remove an item, tap the red `Delete` button to the\
    \ left of the item, and then tap the `Delete` button that appears (see Figure\
    \ 3-3).\n\n    ![A429116_1_En_3_Fig3_HTML.jpg](A429116_1_En_3_Fig3_HTML.jpg)\n\
    \n    *Figure 3-3.* To remove data from a built-in app, tap the red `Delete` button\
    \ and then tap the `Delete` button that appears.\n\n---\n\n### You Want to Control\
    \ Third-Party Usage of Your Apps\n\nEvery so often an app will request access\
    \ to another app on your device, such as `Contacts`, `Calendars`, or `Photos`.\
    \ If you’ve installed a lot of apps, you might have lost track which of these\
    \ third-party programs have access to your other apps.\n\n**Solution:** You can\
    \ allow or revoke third-party app permission to specific apps by following these\
    \ steps:\n\n1. Open the `Settings` app and then tap `Privacy`.\n2. Tap the app\
    \ for which you want to control access. iOS displays a list of apps that have\
    \ requested access to the app, as shown in Figure 3-4.\n\n    ![A429116_1_En_3_Fig4_HTML.jpg](A429116_1_En_3_Fig4_HTML.jpg)\n\
    \n    *Figure 3-4.* You can allow or revoke third-party access to your apps.\n\
    \n3. Beside each app, tap the switch to `Off` to revoke access, or `On` to allow\
    \ access."
  raw: "### You Find It Difficult to Locate an App\n\nIf you get a bit carried away\
    \ at the App Store, you can easily end up with a couple of hundred icons scattered\
    \ over a dozen or more pages (the max is 15 pages). Since the apps were most likely\
    \ installed in no particular order, finding a single app icon can be frustratingly\
    \ time consuming.\n\nSolution: You can reset your Home screen layout , which does\
    \ two things:\n\n*   It restores the main Home screen and possibly part of the\
    \ second Home screen (depending on the device and iOS version) to the factory\
    \ default icon arrangement.\n*   It displays all your third-party app icons in\
    \ alphabetical order.\n\nCaution\n\nResetting the Home screen layout also deletes\
    \ any custom app folders that you created.\n\nTo reset your Home screen layout\
    \ , open Settings, tap General, tap Reset, tap Reset Home Screen Layout, and then\
