  trans: "\n### 滚动回长网页顶部需要很长时间\n\n虽然大多数网页只包含一两个屏幕的文字和图片，但有些页面相当冗长，包含多个屏幕。如果你正在阅读一个特别长的网页，且接近页面底部，那么当你需要返回顶部使用地址/搜索栏时，你可能需要滚动很长一段距离。\n\
    \n解决方案：别再让你的手指受累啦！只需轻点屏幕顶部的状态栏一次，即可显示地址/搜索栏，然后再次轻点状态栏；Safari 会立即将你带到页面顶部。\n\n\
    提示\n\n如果你使用的是 iPhone 6 或更高版本的任何机型，在单手浏览网页时可能会发现很难够到屏幕顶部。请记住，你可以轻点两下 `Home` 按钮，将\
    \ Safari 屏幕向下移动一半，使其顶部工具栏触手可及。\n\n### 你想查看网站的桌面版\n\n许多网站会识别出你正在使用 iOS 设备浏览，并显示该网站的“移动”版本。这个版本通常更易于阅读和导航，但这种便利几乎总是以牺牲网站部分功能为代价的。\n\
    \n解决方案：如果某个网站没有显示你想要的功能，你可以请求该网站的“桌面”版本（即，你在使用桌面浏览器时会看到的完整版本）。请按照以下步骤操作：\n\n1.\
    \  在屏幕上向下滑动以显示菜单栏。\n2.  轻点`共享`按钮。\n3.  在底部的共享操作列表中，轻点`请求桌面站点`，如图 4-1 所示。\n\n \
    \   ![A429116_1_En_4_Fig1_HTML.jpg](img/A429116_1_En_4_Fig1_HTML.jpg)\n\n    图\
    \ 4-1。要将网站从移动版切换为桌面版，请轻点`共享`，然后轻点`请求桌面站点`\n\n### 你觉得网页的额外功能过于干扰\n\n在线阅读文章或随笔绝非易事。问题在于几乎每个页面上都有大量的干扰项：与文字冲突的背景颜色或图片；位于文字上方、侧边以及其中的广告；诸如搜索框、订阅链接和内容列表等网站功能；还有那些用于在\
    \ Facebook、Twitter、Pinterest 等平台与朋友分享文章的无处不在的图标。更糟糕的是，其中许多功能还会闪烁或变化，使得阅读页面内容成为一项真正的挑战。\n\
    \n解决方案：Safari 可以通过为支持的页面提供`阅读器`功能来帮你解决这个问题。`阅读器`会移除所有那些妨碍你阅读乐趣的无关页面干扰项。因此，你看到的将不再是杂乱无章的文字、图标和图片，而是纯粹、简单、足够大且易于阅读的文字。如何达到这种愉悦状态呢？轻点\
    \ Safari 屏幕顶部的标题栏，然后轻点地址栏左侧的`阅读器`按钮，如图 4-2 所示。Safari 会立即转换页面，你会看到类似于图 4-3 所示的页面（这是图\
    \ 4-2 所示页面的`阅读器`版本）。\n\n![A429116_1_En_4_Fig3_HTML.jpg](img/A429116_1_En_4_Fig3_HTML.jpg)\n\
    \n图 4-3。网页的`阅读器`版本是一种简洁且易于阅读的文字界面\n\n![A429116_1_En_4_Fig2_HTML.jpg](img/A429116_1_En_4_Fig2_HTML.jpg)\n\
    \n图 4-2。如今的网页往往充斥着广告、图标和其他小玩意儿\n\n### 你想在后台打开新标签页\n\n根据你的 iOS 设备和 iOS 版本，当你长按一个链接然后轻点`在新标签页中打开`时，你可能会发现\
    \ Safari 会立即切换到新标签页并在你等待时加载该链接。这通常是你想要的行为，因为它能让你在新网页加载完成后立即查看。然而，你可能会发现大多数时候你更希望留在当前网页，稍后再查看新标签页。\n\
    \n解决方案：每次都多做一个额外的点击来返回当前标签页，很快就会让人感到厌烦。解决方案是配置 Safari，使其始终在后台打开新标签页。（此设置在 iPhone\
    \ 和 iPod touch 上默认关闭，但在 iPad 上默认开启。）请按照以下步骤操作：\n\n1.  在主屏幕上，轻点`设置`。设置应用会滑入。\n\
    2.  轻点`Safari`。iOS 会显示 Safari 界面。\n3.  在 iPhone 或 iPod touch 上，轻点`打开链接`，然后轻点`在后台`，如图\
    \ 4-4 所示。在 iPad 上，将`在后台打开新标签页`开关打开。\n\n    ![A429116_1_En_4_Fig4_HTML.jpg](img/A429116_1_En_4_Fig4_HTML.jpg)\n\
    \n    图 4-4。在 iPhone 或 iPod touch 上，在`打开链接`界面中轻点`在后台`\n\n### 你想在离线时阅读一个或多个页面\n\
    \n在浏览网页时，你经常会遇到内容引人入胜、让你迫不及待想阅读的页面。不幸的是，快速瞥一眼文章的长度，你就会意识到你需要的时间比你当前拥有的要多。你即将进行一次长途飞行或其他一段离线时间，那将是完美的阅读时机，但你如何保存网页内容以便离线阅读呢？\n\
    \n解决方案：你可以利用 Safari 的一个名为“阅读列表”的功能。顾名思义，这是一个简单的待读事项列表。当你现在没有时间阅读某内容时，将其添加到你的阅读列表，你就可以在闲暇时阅读它，即使你没有连接到互联网。\n\
    \n有几种技巧可以将页面添加到你的阅读列表：\n\n*   使用 Safari 导航到你稍后想阅读的页面，轻点`共享`按钮，然后轻点`添加到阅读列表`。\n\
    *   长按你稍后想阅读的页面的链接，然后轻点`添加到阅读列表`。\n\n当你准备好阅读时，打开 Safari，轻点`书签`按钮，然后轻点`阅读列表`标签页，如图\
    \ 4-5 所示。Safari 会显示你添加到列表中的所有项目，你只需轻点你想阅读的文章即可。为了使列表更易于管理，请轻点`显示未读`以仅查看你尚未浏览过的页面。\n\
    \n![A429116_1_En_4_Fig5_HTML.jpg](img/A429116_1_En_4_Fig5_HTML.jpg)\n\n图 4-5。Safari\
    \ 的“阅读列表”标签页包含你保存以供稍后阅读的网页\n"
- fmt: "# Safari Does Not Offer to Save Website Passwords\n\nA quintessential modern\
    \ skill is remembering the dozens of usernames and passwords that give us entry\
    \ into our favorite websites. `Safari` can help here by offering to store a website’s\
    \ account data and then enter it automatically each subsequent time. That’s a\
    \ major timesaver, but sometimes `Safari` doesn’t offer to save a site’s login\
    \ data.\n\n**Solution:** There are three main reasons why `Safari` might not be\
    \ offering to save a site’s username and password:\n\n* Some websites request\
    \ that browsers not save passwords, and `Safari` honors those requests. In this\
    \ case, you can add the password manually, as shown below.\n* `Safari` might be\
    \ configured to not save usernames and passwords. To check, open `Settings`, tap\
    \ `Safari`, tap `AutoFill`, and then tap the `Names and Passwords` switch to `On`.\n\
    * `Safari` might be in `Private Browsing` mode, in which case it does not save\
    \ any data, including website login data. To check, open `Safari` and examine\
    \ the menu bar. If the menu bar appears black or dark gray (see Figure [4-6](#A429116_1_En_4_Chapter.html#Fig6))\
    \ instead of white or light gray, then `Safari` is in `Private Browsing` mode.\
    \ To fix this, exit `Private Browsing` mode by tapping the `Tabs` icon and then\
    \ tapping the `Private` button to deactivate it.\n\n![A429116_1_En_4_Fig6_HTML.jpg](A429116_1_En_4_Fig6_HTML.jpg)\n\
    \nFigure 4-6.  \nIf the menu bar is black or dark gray, `Safari` is in `Private\
    \ Browsing` mode and it won’t offer to save website username or passwords.\n\n\
    Here are the steps to follow to enter a website’s username and password manually:\n\
    \n1. Tap `Settings` to display the `Settings` app.\n2. Tap `Safari`. The `Safari`\
    \ screen appears.\n3. Tap `Passwords`. `Settings` prompts you for your passcode\
    \ or `Touch ID`.\n4. Enter your passcode or `Touch ID`. The `Passwords` screen\
    \ appears.\n5. Tap `Add Password`. The `Add Password` screen appears.\n6. Fill\
    \ in the website’s address, your username, and your password. The password appears\
    \ in regular text instead of the usual dots, so make sure no one’s peeking over\
    \ your shoulder as you do this.\n7. Tap `Done`. `iOS` saves the login data for\
    \ the site.\n\n# You Want to Save Your Credit Card Data\n\nShopping is a favorite\
    \ online pastime, and it’s one where, if you do it often enough, entering your\
    \ credit card’s number and expiration data by hand get can tiresome.\n\n**Solution:**\
    \ You can save your credit card data in `Safari` so you don’t have to constantly\
    \ enter your card’s particulars. Follow these steps to configure `Safari` to save\
    \ your credit card data when you make online purchases:\n\n1. In the Home screen,\
    \ tap `Settings` to open the `Settings` app.\n2. Tap `Safari`. The `Safari` screen\
    \ appears.\n3. Tap `AutoFill` to open the `AutoFill` screen.\n4. Tap the `Credit\
    \ Cards` switch to `On`.\n\n> **Tip:** Instead of adding your credit card data\
    \ by hand, `Safari` enables you to enter the data automatically using the camera.\
    \ In the `AutoFill` screen, tap `Saved Credit Cards`, enter your passcode (you\
    \ really should use a passcode or `Touch ID` if you’re adding credit cards to\
    \ your `iOS` device; see Chapter [9](#A429116_1_En_9_Chapter.html)), then tap\
    \ `Add Credit Card`. Tap `Use Camera`, position the credit card within the camera\
    \ field, and then wait until the card info is recognized.\n\n# You Want to View\
    \ a Site’s Pop-up Window\n\nPop-up ads have been a scourge on the web for almost\
    \ as long as there has been a web. The frustration caused by these irritants was\
    \ so great that, for a while now, all modern browsers have included a pop-up blocker\
    \ that is activated by default, and `iOS Safari` is no exception.\n\nHowever,\
    \ not all pop-up windows are annoyances. Some might show useful information or\
    \ a key feature of a website’s interface. With pop-ups blocked, however, you miss\
    \ out on this information or feature.\n\n**Solution:** You can temporarily turn\
    \ off `Safari`’s pop-up blocker when you visit a site that has a pop-up window\
    \ you want to see. Here are the steps to follow:\n\n1. In the Home screen, tap\
    \ `Settings` to display the `Settings` app.\n2. Tap `Safari`. The `Safari` screen\
    \ appears.\n3. Tap the `Block Pop-ups` switch to `Off`, as shown in Figure [4-7](#A429116_1_En_4_Chapter.html#Fig7).\n\
    \n![A429116_1_En_4_Fig7_HTML.jpg](A429116_1_En_4_Fig7_HTML.jpg)\n\nFigure 4-7.\
    \  \nTo temporarily allow a site’s pop-up windows, tap the `Block Pop-ups` switch\
    \ to `Off`, then visit the site.\n\nYou can now use `Safari` to visit the site,\
    \ and its pop-up window will appear in a new tab. When you’re done with that site,\
    \ follow the above steps once again to tap the `Block Pop-ups` switch back to\
    \ `On`.\n\n# You Want to View a Link’s Address Before Tapping It\n\nAs you know,\
    \ in `iOS Safari` you “click” a link in a web page by tapping it. These days,\
    \ however, a savvy surfer always checks a link’s address before clicking it because\
    \ you just never know where you might end up. The address doesn’t always indicate\
    \ a nefarious or shady site, but it doesn’t hurt to check.\n\nIn a regular web\
    \ browser, you can see where a link takes you (that is, you can see the link’s\
    \ URL) by hovering the mouse pointer over the link and checking out the link address\
    \ in the status bar. That doesn’t work in `iOS Safari`, so how can you find out\
    \ the address of a link before tapping it?\n\n**Solution:** Tap and hold the link\
    \ for a few seconds. `Safari` then displays a pop-up screen showing the link text\
    \ and, more importantly, the URL, as shown in Figure [4-8](#A429116_1_En_4_Chapter.html#Fig8).\
    \ If the link looks legit, either tap `Open` to surf there in the current browser\
    \ page or tap `Open in New Page` to start a fresh page. If you decide not to follow\
    \ the link, tap outside the menu.\n\n![A429116_1_En_4_Fig8_HTML.jpg](A429116_1_En_4_Fig8_HTML.jpg)\n\
    \nFigure 4-8.  \nTap and hold a link to check its address for surfing to the site.\n\
    \n# Troubleshooting Searching Problems\n\n## You Want to Use a Different Search\
    \ Engine\n\n`Google` is the default search engine on `iOS`. Almost everyone uses\
    \ `Google`, of course, but if you have something against it, you might want to\
    \ switch and use a different search engine. For example, many people dislike `Google`’s\
    \ add-tracking, so they switch to `DuckDuckGo`, which doesn’t track its users.\n\
    \n**Solution:** You can use `Safari` to navigate to another search engine’s URL\
    \ and search from there. However, `Safari`’s default search engine is more convenient\
    \ because it means you can search directly from the address box. Although `Google`\
    \ is the default search engine for `iOS`, it’s not the only one it supports. Here\
    \ are the steps to follow to set up a different search engine as the `Safari`\
    \ default:\n\n1. Open the `Settings` app.\n2. Tap `Safari`. The `Safari` screen\
    \ appears.\n3. Tap `Search Engine`. `iOS` opens the `Search Engine` screen.\n\
    4. Tap the search engine you want to use. As shown in Figure [4-9](#A429116_1_En_4_Chapter.html#Fig9),\
    \ you have four choices: `Google`, `Yahoo`, `Bing`, or `DuckDuckGo`.\n\n![A429116_1_En_4_Fig9_HTML.jpg](A429116_1_En_4_Fig9_HTML.jpg)\n\
    \nFigure 4-9.  \nIn the `Search Engine` screen, tap the search engine you want\
    \ to use as the default in `Safari`."
  raw: "### Safari Does Not Offer to Save Website Passwords\n\nA quintessential modern\
    \ skill is remembering the dozens of usernames and passwords that give us entry\
    \ into our favorite websites. Safari can help here by offering to store a website’s\
    \ account data and then enter it automatically each subsequent time. That’s a\
    \ major timesaver, but sometimes Safari doesn’t offer to save a site’s login data.\n\
    \nSolution: There are three main reasons why Safari might not be offering to save\
    \ a site’s username and password:\n\n*   Some websites request that browsers not\
    \ save passwords, and Safari honors those requests. In this case, you can add\
    \ the password manually, as shown below.\n*   Safari might be configured to not\
    \ save usernames and passwords. To check, open Settings, tap Safari, tap AutoFill,\
    \ and then tap the Names and Passwords switch to On.\n*   Safari might be in Private\
    \ Browsing mode, in which case it does not save any data, including website login\
    \ data. To check, open Safari and examine the menu bar. If the menu bar appears\
    \ black or dark gray (see Figure [4-6](#A429116_1_En_4_Chapter.html#Fig6)) instead\
    \ of white or light gray, then Safari is in Private Browsing mode. To fix this,\
    \ exit Private Browsing mode by tapping the Tabs icon and then tapping the Private\
    \ button to deactivate it.\n\n    ![A429116_1_En_4_Fig6_HTML.jpg](A429116_1_En_4_Fig6_HTML.jpg)\n\
    \n    Figure 4-6.\n\n    If the menu bar is black or dark gray, Safari is in Private\
    \ Browsing mode and it won’t offer to save website username or passwords\n\nHere\
    \ are the steps to follow to enter a website’s username and password manually:\n\
    \n1.  Tap Settings to display the Settings app.  \n2.  Tap Safari. The Safari\
    \ screen appears.  \n3.  Tap Passwords. Settings prompts you for your passcode\
    \ or Touch ID.  \n4.  Enter your passcode or Touch ID. The Passwords screen appears.\
    \  \n5.  Tap Add Password. The Add Password screen appears.  \n6.  Fill in the\
    \ website’s address, your username, and your password. The password appears in\
    \ regular text instead of the usual dots, so make sure no one’s peeking over your\
    \ shoulder as you do this.  \n7.  Tap Done. iOS saves the login data for the site.\n\
