  trans: "\n### 照片颜色显示异常\n\n照片的颜色有时会显得不太对劲。例如，它们可能缺乏饱和度、颜色过于接近，或者整张照片偏蓝或偏红。\n\n**解决方案：**\
    \ “照片”应用提供了多种工具，可用来改善照片颜色。其中最简单的工具是`增强`功能，它可以自动调整照片的颜色。要使用`增强`工具，请通过“照片”应用打开要修复的照片，轻点照片以显示控制项（如果未显示），轻点`编辑`（如图\
    \ 7-6 所示），轻点`增强`（如图 7-7 所示），然后轻点`完成`。\n\n如果`增强`功能未能改善照片颜色，或者你希望进行更精细的编辑，“照片”应用还提供了编辑工具，可帮助你解决与颜色相关的特定问题。以下三个滑块可用于调整照片中的颜色：\n\
    \n-   **饱和度。** 使用此滑块可调整照片颜色的鲜艳程度。如果照片缺乏活力，请尝试提高饱和度。\n-   **对比度。** 使用此滑块可调整照片色调的分布。如果颜色混在一起，请增加对比度以使颜色区分开来。\n\
    -   **色偏。** 使用此滑块可调整偏红或偏蓝的照片。\n\n要使用这些工具调整照片颜色，请遵循以下步骤：\n\n1.  在“照片”应用中，打开要修复的照片。\n\
    2.  轻点照片以显示控制项（如果尚未显示）。\n3.  轻点`编辑`（如图 7-6 所示）。“照片”应用会显示其编辑工具。\n4.  轻点`光线`（参见图\
    \ 7-8）。\n5.  轻点`颜色`列表。（在某些情况下，你可能需要先轻点`列表`图标，该图标与图 7-10 中指出的图标类似。） “照片”应用会显示可用的设置，如图\
    \ 7-11 所示。\n\n    ![A429116_1_En_7_Fig11_HTML.jpg](img/A429116_1_En_7_Fig11_HTML.jpg)\n\
    \n    **图 7-11.** 轻点`颜色`列表，查看可对照片进行的颜色相关调整\n6.  轻点要调整的设置项。“照片”应用会显示该设置的滑块。\n7.\
    \  向左或向右拖动设置滑块，直到获得想要的效果。\n8.  轻点`列表`图标（参见前面的图 7-10）以返回`颜色`列表。\n9.  根据需要重复步骤 6\
    \ 至 8 进行其他颜色调整。\n10.  轻点`完成`。“照片”应用会保存你的更改。\n\n### 你的黑白照片效果有待提升\n\n前面你了解到，应用 iOS\
    \ 黑白照片滤镜（如`单色`、`色调`或`怀旧`)可以改善弱光图像。当然，当你寻求黑白照片特有的鲜明、简洁或强烈感时，也可以对任何照片应用黑白滤镜。不幸的是，有时你的黑白作品最终可能会显得缺乏创意、平淡无奇或杂乱无章。\n\
    \n**解决方案：** 可能是因为你选错了拍摄对象，因为并非所有场景都适合处理成黑白效果。不过，如果并非这个原因，那么你可以通过“照片”应用中`黑白`类别下的四项设置来优化你的黑白照片：\n\
    \n-   **强度。** 使用此滑块可调整照片中从彩色转换为黑白部分的强度。如果黑白照片冲击力不足，请尝试增加强度。\n-   **中性色。** 使用此滑块可调整照片中从白色或灰色调转换而来的部分的强度。如果黑白照片的这些部分不够突出，请尝试增加中性色数值。\n\
    -   **色调。** 使用此滑块可调整照片的整体强度。如果黑白照片看起来发白，请尝试增加色调。\n-   **颗粒。** 使用此滑块可为照片添加颗粒感。如果你想要照片具有复古效果，请尝试增加颗粒。\n\
    \n要使用这些工具调整黑白照片，请遵循以下步骤：\n\n1.  在“照片”应用中，打开要修复的照片。\n2.  轻点照片以显示控制项（如果尚未显示）。\n\
    3.  轻点`编辑`（如图 7-6 所示）。“照片”应用会显示其编辑工具。\n4.  轻点`光线`（参见图 7-8）。\n5.  轻点`黑白`列表。（在某些情况下，你可能需要先轻点`列表`图标，该图标与图\
    \ 7-10 中指出的图标类似。） “照片”应用会显示可用的设置，如图 7-12 所示。\n\n    ![A429116_1_En_7_Fig12_HTML.jpg](img/A429116_1_En_7_Fig12_HTML.jpg)\n\
    \n    **图 7-12.** 轻点`黑白`列表，查看可对照片进行的黑白相关调整\n6.  轻点要调整的设置项。“照片”应用会显示该设置的滑块。\n7.\
    \  向左或向右拖动设置滑块，直到获得想要的效果。\n8.  轻点`列表`图标（参见前面的图 7-10）以返回`黑白`列表。\n9.  根据需要重复步骤 6\
    \ 至 8 进行其他黑白调整。\n10.  轻点`完成`。“照片”应用会保存你的更改。\n\n### 照片中出现一处或多处红眼\n\n当你使用闪光灯拍摄人物或动物照片时，在某些情况下，闪光灯可能会在拍摄对象的视网膜上形成反光。结果就产生了常见的红眼现象，即拍摄对象的瞳孔呈现红色而非黑色。\n\
    \n**解决方案：** 如果你的 iOS 设备上有一张照片，其中人物或动物因相机闪光灯出现了红眼，你可以使用“照片”应用将其移除，让拍摄对象看起来更自然。具体操作如下：\n\
    \n1.  在“照片”应用中，打开包含你想要移除的红眼的照片。\n2.  轻点照片以显示控制项（如果尚未显示）。\n3.  轻点`编辑`（如图 7-6 所示）。“照片”应用会显示其编辑工具。\n\
    4.  轻点`红眼`，如图 7-13 所示。\n\n    ![A429116_1_En_7_Fig13_HTML.jpg](img/A429116_1_En_7_Fig13_HTML.jpg)\n\
    \n    **图 7-13.** 轻点`红眼`图标以显示“照片”应用的红眼移除工具\n5.  轻点你想要移除的红眼区域。“照片”应用会移除红眼。\n6.\
    \  重复步骤 5，直到移除照片中所有红眼。\n7.  轻点`完成`。“照片”应用会将更改应用到照片。\n"
- fmt: "# A Photo Contains Elements You Want to Remove\n\nWhen you frame a scene before\
    \ taking a photo, you likely try to avoid certain elements that could detract\
    \ from the final image, such as a light pole or the top of the fence over which\
    \ you’re shooting. Despite your best efforts, you’ll find that it’s not uncommon\
    \ to see unwanted parts of the scene in your photo.\n\n**Solution:** When you\
    \ have a photo containing elements that you do not want or need to see, you can\
    \ often cut them out. This is called cropping and you can use the `Photos` app\
    \ to do it. When you crop a photo, you specify a rectangular area of the image\
    \ that you want to keep. The `Photos` app then discards everything outside of\
    \ the rectangle. Cropping is a useful skill for removing extraneous elements that\
    \ appear on or near the edges of a photo, but you can also use it to help you\
    \ give prominence to the true subject of a photo.\n\nFollow these steps to crop\
    \ a photo:\n\n1.  In the `Photos` app, open the photo that you want to crop.  \n\
    2.  Tap the photo to display the controls, if you don’t see them already.  \n\
    3.  Tap `Edit` (pointed out earlier in Figure [7-6](#A429116_1_En_7_Chapter.html#Fig6)).\
    \ The `Photos` app displays its editing tools.  \n4.  Tap `Crop & Straighten`\
    \ (shown in Figure [7-14](#A429116_1_En_7_Chapter.html#Fig14)). The `Photos` app\
    \ displays a grid for cropping, as shown in Figure [7-15](#A429116_1_En_7_Chapter.html#Fig15).\n\
    \n    ![A429116_1_En_7_Fig15_HTML.jpg](A429116_1_En_7_Fig15_HTML.jpg)\n\n    Figure\
    \ 7-15.\n\n    Tap and drag the corners to crop the photo\n\n    ![A429116_1_En_7_Fig14_HTML.jpg](A429116_1_En_7_Fig14_HTML.jpg)\n\
    \n    Figure 7-14.\n\n    Tap the `Crop & Straighten` icon to display the `Photos`\
    \ app's cropping tool  \n5.  Tap and drag a corner of the grid to set the area\
    \ you want to keep.  \n6.  Tap `Done`. The `Photos` app applies the changes to\
    \ the photo.  \n\n**Tip**\n\nThe fastest way to crop some photos is to tell the\
    \ `Photos` app the dimensions you want to use for the resulting photo. Tap `Aspect`\
    \ (pointed out in Figure [7-14](#A429116_1_En_7_Chapter.html#Fig14)), and then\
    \ tap either a specific shape (Original or Square) or a specific ratio, such as\
    \ 5:7 or 4:5. You then drag the photo (not the grid!) so the portion you want\
    \ to keep is within the grid.\n\n# A Photo Is Not Straight\n\nAs you probably\
    \ know from hard-won experience, getting an iPhone camera perfectly level when\
    \ you take a shot is very difficult. It requires a lot of practice and a steady\
    \ hand. (You can also activate the Camera app’s grid feature; see the section\
    \ “You Have Trouble Taking a Straight Photo.”) Despite your best efforts, you\
    \ might still end up with a photo that is not quite level.\n\n**Solution:** To\
    \ fix this problem, you can use the `Photos` app to rotate the photo clockwise\
    \ or counterclockwise so that the subject appears straight. Follow these steps\
    \ to crop and straighten a photo:\n\n1.  In the `Photos` app, open the photo that\
    \ you want to straighten.  \n2.  Tap the photo to display the controls, if you\
    \ don’t see them already.  \n3.  Tap `Edit` (pointed out earlier in Figure [7-6](#A429116_1_En_7_Chapter.html#Fig6)).\
    \ The `Photos` app displays its editing tools.  \n4.  Tap `Crop & Straighten`\
    \ (see Figure [7-14](#A429116_1_En_7_Chapter.html#Fig14)). The `Photos` app displays\
    \ the Straightening tool (the arc with the degree markings; see Figure [7-15](#A429116_1_En_7_Chapter.html#Fig15)).\
    \  \n5.  Drag the Straightening tool left or right until the photo is level.  \n\
    6.  Tap `Done`. The `Photos` app applies the changes to the photo.  \n\n**Note**\n\
    \nThe `Crop & Straighten` feature also enables you to rotate a photo 90 degrees,\
    \ say, from portrait to landscape. To do this, tap the `Rotate` icon (see Figure\
    \ [7-14](#A429116_1_En_7_Chapter.html#Fig14)) until the photo is in the orientation\
    \ you want.\n\n# 8. Protecting Your Device\n\nThe iPhone has only been around\
    \ since 2007, and the iPad since 2010, but already these devices have become indispensable\
    \ parts of many people's lives. That indispensability comes from the sheer versatility\
    \ of these devices. In a typical day, you probably use your iOS device to surf\
    \ the Web, exchange emails and text messages, make calls, manage your contacts\
    \ and calendar, listen to music, play games, check the weather or the stock market,\
    \ and a dozen other tasks large and small. However, that insanely great power\
    \ and convenience come with a price: your iOS device is loaded with information\
    \ about you. To be sure, most of that data is likely trivial or ephemeral, but\
    \ much of it is private and sensitive. Losing your iOS device would be a major\
    \ inconvenience, but someone else getting access to your information could lead\
    \ to big problems. So, yes, the notion of protecting your iOS device might not\
    \ sound like a troubleshooting topic. But taking steps to ensure that you can\
    \ find your device if it gets lost, and that while your device is lost no one\
    \ else can see or mess with your information, can be viewed as a form of preventative\
    \ maintenance. And preventing trouble before it happens is the best type of troubleshooting.\n\
    \n## Locking Your Device\n\nWhen your iOS device is asleep, it's locked in the\
    \ sense that tapping the touchscreen or pressing the volume controls does nothing.\
    \ This sensible arrangement prevents accidental taps when the phone is in your\
    \ pocket, or rattling around in your backpack or handbag. To unlock the device,\
    \ you either press the Home button twice, or press the Sleep/Wake button and then\
    \ the Home button. Just like that, you're back in business.\n\nUnfortunately,\
    \ this simple technique means that anyone else who gets his or her hands on your\
    \ iOS device can also be quickly back in business – your business! If you have\
    \ sensitive or confidential information on your device, or if you want to avoid\
    \ digital joyrides that run up massive roaming or data charges, you need to truly\
    \ lock your iOS device.\n\n### You Want to Lock Your Device with a Passcode\n\n\
    In the same way that you \"lock\" your user account and your many online accounts\
    \ with a password, you might prefer to lock your iOS device with something similar.\n\
    \n**Solution:** You can do that by specifying a passcode that must be entered\
    \ before anyone can use the device. The default in iOS is a six-digit passcode,\
    \ but you can change that to either a simple four-digit passcode, or to a custom\
    \ code that is longer and more complex and uses any combination of numbers, letters,\
    \ and symbols.\n\nFollow these steps to set up your passcode:\n\n1.  On the Home\
    \ screen, tap `Settings`. The `Settings` app appears.  \n2.  Tap `Touch ID & Passcode`\
    \ to open the `Touch ID & Passcode` screen. If your iOS device doesn't support\
    \ Touch ID, tap `Passcode`, instead, to open the `Passcode Lock` screen.  \n3.\
    \  Tap `Turn Passcode On`. The `Set Passcode` screen appears.  \n4.  If you prefer\
    \ to use something other than a six-digit passcode, tap `Passcode Options` and\
    \ then tap the type of passcode you want to use (see Figure [8-1](#A429116_1_En_8_Chapter.html#Fig1)).\n\
    \n    ![A429116_1_En_8_Fig1_HTML.jpg](A429116_1_En_8_Fig1_HTML.jpg)\n\n    Figure\
    \ 8-1.\n\n    iOS gives you several options for the type of passcode you want\
    \ to use  \n5.  Tap your passcode. For security, the characters appear in the\
    \ passcode box as dots.  \n6.  If you're entering a custom passcode, tap `Next`.\
    \ Your iOS device prompts you to reenter the passcode.  \n7.  Tap your passcode\
    \ again.  \n8.  If you're entering a custom passcode, tap `Done`.  \n\n**Caution**\n\
    \nYou really, really need to remember your iOS device passcode. If you forget\
    \ it, you're locked out of your own device. The only way to get back in is to\
    \ use `iTunes` to restore the data and settings to your iOS device from an existing\
    \ backup (as described in Chapter [1](#A429116_1_En_1_Chapter.html))."
