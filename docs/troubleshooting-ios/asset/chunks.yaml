    while a higher value means more of the photo’s dark patches will appear black.


    Note


    Depending on your iOS device and the version of iOS on that device, you might
    not see all of these photo editing tools.


    To adjust a photo’s lighting using these tools, follow these steps:


    1.  In the Photos app, open the photo you want to fix.  

    2.  Tap the photo to display the controls, if you don’t see them already.  

    3.  Tap Edit (pointed out earlier in Figure [7-6](#A429116_1_En_7_Chapter.html#Fig6)).
    The Photos app displays its editing tools.  

    4.  Tap Light (see Figure [7-8](#A429116_1_En_7_Chapter.html#Fig8)).


    ![A429116_1_En_7_Fig8_HTML.jpg](A429116_1_En_7_Fig8_HTML.jpg)


    Figure 7-8.


    To apply specific light fixes to your photo, tap the Light icon  

    5.  Tap the Light list. (In some cases, you might need to first tap the List icon,
    which is similar to the icon pointed out in Figure [7-10](#A429116_1_En_7_Chapter.html#Fig10).)
    The Photos app displays the available settings, as shown in Figure [7-9](#A429116_1_En_7_Chapter.html#Fig9).


    ![A429116_1_En_7_Fig10_HTML.jpg](A429116_1_En_7_Fig10_HTML.jpg)


    Figure 7-10.


    Each setting in the Light list displays a slider, such as the Exposure slider
    shown here


    ![A429116_1_En_7_Fig9_HTML.jpg](A429116_1_En_7_Fig9_HTML.jpg)


    Figure 7-9.


    Tap the Light list to see the available light-related adjustments you can make
    to your photo  

    6.  Tap the setting you want to adjust. Photos displays a slider for the setting.
    For example, Figure [7-10](#A429116_1_En_7_Chapter.html#Fig10) shows the Exposure
    slider.  

    7.  Drag the setting left or right until you get the look you want.  

    8.  Tap the List icon (see Figure [7-10](#A429116_1_En_7_Chapter.html#Fig10))
    to return to the Light list.  

    9.  Repeat steps 6 to 8 to make other lighting adjustments as needed.  

    10.  Tap Done. The Photos app saves your changes.'
