    \ However, if you're not comfortable having Safari send your history and bookmarks\
    \ to Apple, you can turn this feature off. Tap Settings, tap Safari, and then\
    \ tap the Preload Top Hit switch to Off (see Figure [9-17](#A429116_1_En_9_Chapter.html#Fig17)).\n\
    \n![A429116_1_En_9_Fig17_HTML.jpg](A429116_1_En_9_Fig17_HTML.jpg)\n\nFigure 9-17.\n\
    \nYou can prevent Safari from making suggestions that other people might be able\
    \ to see\n\n### You Do Not Want Safari to Show Suggestions When You Search\n\n\
    Another way Safari might compromise your online privacy is by displaying suggestions\
    \ as you enter search text into the address bar. If someone is looking over your\
    \ shoulder or simply borrows your device for a quick search, she might see these\
    \ suggestions.\n\nSolution: To turn these suggestions off, follow these steps:\n\
    \n1.  Open the Settings app.  \n2.  Tap Safari to open the Safari screen.  \n\
    3.  Tap both the Search Engine Suggestions switch and the Safari Suggestions switch\
    \ to Off, as shown in Figure [9-17](#A429116_1_En_9_Chapter.html#Fig17).\n\n###\
    \ You Want to Browse the Web without Storing Data About the Sites You Visit\n\n\
    If you find yourself constantly deleting your browsing history or website data,\
    \ you can save yourself a bit of time by configuring Safari to do this automatically.\
    \ This is called private browsing and it means that Safari doesn't save any data\
    \ as you browse. Specifically, it doesn't save the following:\n\n*   Sites aren't\
    \ added to the history (although the Back and Forward buttons still work for navigating\
    \ sites that you've visited in the current session).\n*   Web page text and images\
    \ aren't saved.\n*   Search text isn't saved with the search box.\n*   AutoFill\
    \ passwords aren't saved.\n\nSolution: To activate private browsing, follow these\
    \ steps:\n\n1.  In Safari, tap the Tabs button.  \n2.  Tap Private. Safari creates\
    \ a separate set of tabs for private browsing.  \n3.  Tap Add Tab (+). Safari\
    \ creates a new private tab.  \n\nWhen you're done browsing privately, tap the\
    \ Tabs icon and then tap the Private button to turn off Private Browsing.\n\n\
    ### You Want to Ensure You're Not Being Tracked by Online Advertisers\n\nUnder\
    \ the guise of providing you with the \"benefit\" of targeted ads, online advertisers\
    \ use cookies to track the websites you visit, the searches you conduct, and so\
    \ on. This data isn't linked to you personally, but no one likes to be tracked\
    \ in this way. Fortunately, iOS Safari is configured by default to minimize this\
    \ kind of tracking, but you might want to confirm – or even strengthen – these\
    \ settings.\n\nSolution: Preventing online tracking involves two things. First,\
    \ make sure Safari's Do Not Track setting is activated, which tells advertisers\
    \ not to track you online. Note, however, that it does not force advertisers not\
    \ to track you. Compliance is voluntary, but you should activate the setting anyway\
    \ for the few advertisers who do honor it.\n\nSecond, you need to decide the level\
    \ at which you want to block cookies. You have four choices:\n\n*   Always Block.\
    \ This level tells Safari not to accept any cookies. I don't recommend this level\
    \ because it disables functionality on many websites (for example, a site's ability\
    \ to save your login data and customizations).\n*   Allow from Current Website\
    \ Only. This level tells Safari to only accept cookies that are set by whatever\
    \ website you are currently visiting. No other website – in particular, no online\
    \ advertising site – can set a cookie. If you want to strengthen Safari's ad-blocking,\
    \ this is the setting to use, although there's a chance you might lose some functionality\
    \ (see the next item).\n*   Allow from Websites I Visit. This level tells Safari\
    \ to only accept cookies not only from the current website, but also from any\
    \ website you've visited in the past. For example, suppose you have earlier visited\
    \ the YouTube site. If the current site wants to set a YouTube cookie, then this\
    \ setting will allow it. If you've never visited a site in the past – which will\
    \ be the case for the vast majority of online advertising sites – then Safari\
    \ blocks cookies from that site. This is the default setting, and it's a good\
    \ compromise because sites you've previously visited might need to access a cookie\
    \ to implement some functionality on your current site (such as account data).\n\
    *   Always Allow. This level tells Safari to accept any cookie from any site.\
    \ Avoid this setting because it means that any online advertiser who does not\
    \ honor the Do Not Track setting (which is, alas, the vast majority of them) will\
    \ use cookies to track you.\n\nFollow these steps to configure Safari to ensure\
    \ you're not being tracked by online advertisers:\n\n1.  Open the Settings app.\
    \  \n2.  Tap Safari to open the Safari screen.  \n3.  If needed, tap the Do Not\
    \ Track switch to On.  \n4.  Tap Block Cookies to open the Block Cookies screen,\
    \ shown in Figure [9-18](#A429116_1_En_9_Chapter.html#Fig18).\n\n    ![A429116_1_En_9_Fig18_HTML.jpg](A429116_1_En_9_Fig18_HTML.jpg)\n\
    \n    Figure 9-18.\n\n    Safari's cookie-blocking settings  \n5.  Tap the cookie-blocking\
    \ setting you prefer to use."
  trans: "\n### 想要删除已访问的网站列表\n\nSafari 的“历史记录”列表（即你最近浏览过的网站集合）在需要时是一个很棒的功能，不需要时也无伤大雅。但有时，“历史记录”列表确实会带来不便。例如，如果你访问了一个私人公司网站、金融网站或任何其他不想让别人看到的网站，历史记录可能会暴露你的行踪。\n\
    \n有时，一些不良网站也可能意外出现在你的历史记录中。例如，你可能在网页或邮件中点了一个看似合法的链接，结果却进入了某个阴暗、令人不快的网络角落。当然，你会立刻点击“返回”按钮迅速离开那里，但那个讨厌的网站已经潜伏在你的历史记录里了。\n\
    \n**注意**\n\n从 iOS 9 开始，清除 Safari 历史记录也会同时清除你的 cookie 和网站数据。清除 cookie 可能会带来一些问题，因为许多\
    \ cookie 存储了网站的登录数据或个性化设置。因此，在清除历史记录时，请考虑只清除最近的数据（例如，前一小时的数据）。\n\n**解决方法：** 无论你的历史记录列表中有不想让别人看到的网站，还是你觉得\
    \ Safari 跟踪你在网络上的行踪这个想法本身有些不妥，都可以按照以下步骤清除历史记录列表：\n\n1.  在 Safari 中，轻点“`书签`”按钮。Safari\
    \ 会打开“书签”列表。\n2.  轻点“`返回`”，直到回到“书签”屏幕。\n3.  轻点“`历史记录`”。Safari 会打开“历史记录”屏幕。\n4.\
    \  轻点“`清除`”。Safari 会询问你要清除多久之前的历史记录，如图 9-16 所示。\n    -   `![A429116_1_En_9_Fig16_HTML.jpg](img/A429116_1_En_9_Fig16_HTML.jpg)`\n\
    \    -   **图 9-16.** 轻点“`清除`”，然后选择要删除多长时间的网页浏览历史记录。\n5.  轻点一个时间段：`最后一小时`、`今天`、`今天和昨天`或`所有历史记录`。Safari\
    \ 会删除该时间段内历史记录列表中的所有网站。\n\n**注意**\n\nSafari 会利用你的历史记录（以及书签）来分析你查看的每个页面，并确定你最可能点击的链接——即所谓的“最常点选”——然后预加载该链接。如果你确实点击了该链接，页面加载速度会非常快。但是，如果你不放心让\
    \ Safari 把你的历史记录和书签发送给 Apple，可以关闭此功能。依次轻点“`设置`”、“`Safari`”，然后将“`预载最常点选`”开关切换至“`关闭`”（参见图\
    \ 9-17）。\n    -   `![A429116_1_En_9_Fig17_HTML.jpg](img/A429116_1_En_9_Fig17_HTML.jpg)`\n\
    \    -   **图 9-17.** 你可以阻止 Safari 显示可能被别人看到的建议。\n\n### 不希望 Safari 在搜索时显示建议\n\n\
    Safari 可能影响你在线隐私的另一种方式，是在你在地址栏输入搜索文字时显示建议。如果有人从你肩膀后面偷看，或者只是借用你的设备快速搜索一下，她就有可能看到这些建议。\n\
    \n**解决方法：** 要关闭这些建议，请按以下步骤操作：\n\n1.  打开“`设置`”应用。\n2.  轻点“`Safari`”以打开 Safari 设置屏幕。\n\
    3.  将“`搜索引擎建议`”开关和“`Safari 建议`”开关都切换至“`关闭`”，如图 9-17 所示。\n\n### 希望浏览网页时不存储关于所访问网站的数据\n\
    \n如果你发现自己经常要手动清除浏览历史记录或网站数据，那么可以通过配置 Safari 自动完成此操作来节省一些时间。这就是所谓的“无痕浏览”，意味着 Safari\
    \ 在浏览时不会保存任何数据。具体来说，它不会保存以下内容：\n\n-   网站不会被添加到历史记录中（但在当前会话中，“`返回`”和“`前进`”按钮仍然可以用于导航已访问过的网站）。\n\
    -   网页文本和图像不会被保存。\n-   搜索文本不会保存在搜索框中。\n-   自动填充的密码不会被保存。\n\n**解决方法：** 要激活无痕浏览，请按以下步骤操作：\n\
    \n1.  在 Safari 中，轻点“`标签页`”按钮。\n2.  轻点“`无痕浏览`”。Safari 会为无痕浏览创建一组单独的标签页。\n3.  轻点“`添加标签页\
    \ (+)`”。Safari 会创建一个新的无痕浏览标签页。\n\n完成无痕浏览后，轻点“`标签页`”图标，然后轻点“`无痕浏览`”按钮即可关闭无痕浏览。\n\
    \n### 希望确保不被在线广告商追踪\n\n在线广告商以提供“个性化广告”这一“好处”为幌子，利用 cookie 来追踪你访问过的网站、进行的搜索等等。这些数据虽然不会与你的个人身份信息直接关联，但没人喜欢被这样追踪。幸运的是，iOS\
    \ 上的 Safari 默认配置已经可以最大程度地减少此类追踪，但你或许仍想确认——甚至加强——这些设置。\n\n**解决方法：** 防止在线追踪涉及两个方面。首先，确保\
    \ Safari 的“`不跟踪`”功能已激活，这会告知广告商不要在线追踪你。但请注意，这并不能强制广告商不追踪你。是否遵守全靠自愿，但为了那些为数不多的会遵守这一设定的广告商，你仍然应该激活此设置。\n\
    \n其次，你需要决定在什么级别上阻止 Cookie。你有四种选择：\n\n-   **总是阻止。** 此级别告知 Safari 不接受任何 Cookie。我不推荐此级别，因为它会禁用许多网站的功能（例如，网站无法保存你的登录数据和个性化设置）。\n\
    -   **仅允许来自当前网站。** 此级别告知 Safari 只接受你当前正在访问的网站设置的 Cookie。其他任何网站——尤其是在线广告网站——都不能设置\
    \ Cookie。如果你想加强 Safari 的广告拦截功能，可以考虑使用此设置，尽管它可能会导致某些功能丢失（请参阅下一项）。\n-   **允许我访问的网站。**\
    \ 此级别告知 Safari 不仅接受当前网站的 Cookie，还接受你过去访问过的任何网站的 Cookie。例如，假设你之前访问过 YouTube 网站。如果当前网站想要设置一个\
    \ YouTube 的 Cookie，那么此设置将允许它这样做。如果你从未访问过某个网站（对于绝大多数在线广告网站来说都是如此），那么 Safari 就会阻止该网站的\
    \ Cookie。这是默认设置，是一个很好的折衷方案，因为你之前访问过的网站可能需要访问 Cookie 来为你当前访问的网站实现某些功能（例如账户数据）。\n\
    -   **总是允许。** 此级别告知 Safari 接受来自任何网站的任何 Cookie。请避免使用此设置，因为这意味着任何不遵守“`不跟踪`”设置的在线广告商（遗憾的是，这占了绝大多数）都会使用\
    \ Cookie 来追踪你。\n\n按照以下步骤配置 Safari，以确保你不会被在线广告商追踪：\n\n1.  打开“`设置`”应用。\n2.  轻点“`Safari`”以打开\
    \ Safari 设置屏幕。\n3.  如有必要，将“`不跟踪`”开关切换至“`开启`”。\n4.  轻点“`阻止 Cookie`”以打开“`阻止 Cookie`”屏幕，如图\
    \ 9-18 所示。\n    -   `![A429116_1_En_9_Fig18_HTML.jpg](img/A429116_1_En_9_Fig18_HTML.jpg)`\n\
    \    -   **图 9-18.** Safari 的 Cookie 阻止设置。\n5.  轻点你想要使用的 Cookie 阻止级别设置。\n"
- fmt: '### You Want to Remove Your Saved Credit Card Data


    In Chapter 4, "Resolving Web Issues," you learned how to save time and effort
    by storing your credit card data inside `Safari`. That''s convenient, but it''s
    also dangerous if you lend your device or if someone obtains your device while
    it''s unlocked.


    **Solution:** You can follow these steps to remove a saved credit card:


    1. Open the `Settings` app.

    2. Tap `Safari` to open the Safari screen.

    3. Tap `AutoFill` to open the AutoFill screen.

    4. Tap `Saved Credit Cards`. iOS prompts you to enter your passcode or `Touch
    ID`, if either is set up.

    5. Type your passcode or apply your fingerprint to open the Credit Cards screen.

    6. Tap `Edit`.

    7. Tap the credit card you want to remove, then tap `Delete`.


    ### You Want to Remove Your Saved Website Passwords


    You can configure `Safari`''s AutoFill feature to save website usernames and passwords.
    That''s a real convenience, but it means that anyone who has access to your unlocked
    device will be able to log in to any of those sites.


    **Solution:** To avoid this problem, you can delete one or more of your saved
    website passwords. Here are the steps to follow:


    1. Open the `Settings` app.

    2. Tap `Safari` to open the Safari screen.

    3. Tap `Passwords`. iOS prompts you to enter your passcode or `Touch ID`, if either
    is set up.

    4. Type your passcode or apply your fingerprint to open the Passwords screen.

    5. Tap `Edit`.

    6. Tap each password you want to remove, then tap `Delete`.


    # 10. Repairing Battery and Charging Problems


    One of the oddities of the modern digital world is that while our devices have
    undergone mind‑blowing increases in performance, miniaturization, and overall
    technical sophistication over the past decade or so, the battery life of those
    devices has increased comparatively slowly. For example, from the `iPhone 4s`
    to the `iPhone 6` – four generations – battery life for using the Internet over
    Wi‑Fi increased from 9 hours to 11 hours. Apple claims the `iPhone 7 Plus` will
    get 15 hours, but even a 67 percent increase over six generations is nothing to
    brag about. Given the importance we place on our iOS devices, it''s no wonder
    that the number one gripe by far among users is poor battery life and the number
    one request by far for each new generation is better – much better – battery performance.
    Unfortunately, there are many technical reasons why we won''t see a radical increase
    in battery life for our iOS devices any time soon. That means we need to take
    steps now to monitor and maximize the batteries that we have.


    ## Tracking Battery Use


    iOS doesn''t give a ton of battery data, but you can monitor both the total usage
    time (this includes all activities: calling, surfing, playing media, and so on)
    and standby time (time when your iOS device was in sleep mode). Also, one of the
    nice features in iOS is a breakdown of recent (the last three hours) battery usage
    by app, so you can see which apps have been draining your battery.


    ### You Want to Know Exactly How Much Battery Power You Have Left


    By default, iOS displays a battery icon in the status bar (see Figure 10-1). As
    the battery drains, the amount of white inside the icon gets smaller, and the
    level turns red when the amount of battery power gets low enough that you need
    to start paying attention. This is useful information, to be sure, but it''s all
    a bit vague and imprecise.


    ![A429116\_1\_En\_10\_Fig1\_HTML.jpg](A429116_1_En_10_Fig1_HTML.jpg)


    *Figure 10-1. The iOS battery icon appears in the status bar*


    **Solution:** To keep closer tabs on your device battery life, you need to tell
    iOS to also display the percentage of battery power remaining. Here are the steps
    to follow:


    1. On the Home screen, tap `Settings` to open the Settings app.

    2. Tap `Battery` to open the Battery screen.

    3. Tap the `Battery Percentage` switch to `On`, as shown in Figure 10-2.


    ![A429116\_1\_En\_10\_Fig2\_HTML.jpg](A429116_1_En_10_Fig2_HTML.jpg)


    *Figure 10-2. Tap the `Battery Percentage` switch to `On` to add the percentage
    of battery power remaining to the status bar icon*


    ### You Want to Know How Much You''re Using Your Device on Battery Power


    Apple puts out lots of battery life numbers that include both usage mode (that
    is, when your device is on) and standby mode (when your device is asleep). But
    if you need to know whether your device will have enough battery power for, say,
    a long plane ride or some similar extended time away from a power outlet, can
    you really trust Apple numbers?


    **Solution:** Fortunately, you don''t have to trust Apple on this because iOS
    keeps track of your device''s overall battery use. Specifically, it tracks the
    amount of time since the last full charge that your device has been in usage mode
    and in standby mode. By tracking these numbers over time and over several charging
    cycles, you''ll get to know how much battery life your iOS device gets when you
    use it.


    Follow these steps to view these numbers:


    1. On the Home screen, tap `Settings` to open the Settings app.

    2. Tap `Battery` to open the Battery screen.

    3. Scroll to the bottom of the screen and read the `Usage` and `Standby` values,
    as shown in Figure 10-3.


    ![A429116\_1\_En\_10\_Fig3\_HTML.jpg](A429116_1_En_10_Fig3_HTML.jpg)


    *Figure 10-3. Scroll to the bottom of the Battery screen to read the total time
    since the last full charge that your iOS device has been in usage and standby
    modes*


    ### You Suspect an App Has Been Using Too Much Battery Power


    One of the benefits of adding the percentage value to the status bar''s battery
    icon and monitoring the `Usage` time in the Battery screen of the `Settings` app
    is that you get to know how your apps use battery power. In particular, you might
    notice that your battery seems to drain a little faster than normal when you use
    a particular app. That''s useful to know, but how can you be sure?


    **Solution:** iOS can help by breaking down your device''s battery usage by app.
    For both the last 24 hours and the last 7 days, you see the percentage of total
    battery power that each app has used. You can also display the total amount of
    time each app has used the battery both when the app was onscreen and when it
    was running in the background.


    If you see that a particular app has been using far more battery life than you
    think it should – particularly if you don''t use the app much more than your other
    apps – it might indicate a problem. For example, the app might have a memory leak,
    or it might be running tasks in the background.


    Follow these steps to view battery usage by app:


    1. On the Home screen, tap `Settings` to open the Settings app.

    2. Tap `Battery` to open the Battery screen.

    3. In the `Battery Usage` section (see Figure 10-4), tap to switch between seeing
    usage for the `Last 24 Hours` and the `Last 7 Days`.


    ![A429116\_1\_En\_10\_Fig4\_HTML.jpg](A429116_1_En_10_Fig4_HTML.jpg)


    *Figure 10-4. In the Battery screen, the `Battery Usage` section breaks down battery
    percentage and, optionally, battery usage times, by app*

    4. Tap the `Time` icon (pointed out in Figure 10-4) to toggle the total onscreen
    and background usage times for each app.


    ## Extending Battery Life


    Reducing battery consumption as much as possible on your iOS device not only extends
    the time between charges but also extends the overall life of your battery. The
    `Battery Usage` screen usually offers a suggestion or two for extending battery
    life, but there are many other steps you can take.'
