    \ icon to the left of the name or number, then tap Delete.\n\n### You Prefer to\
    \ Answer iPhone Calls on Another Number\n\nWhat do you do about incoming calls\
    \ if you can’t use your iPhone for a while? For example, if you’re going on a\
