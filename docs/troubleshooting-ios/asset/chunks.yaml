  trans: "\n# 学习一些常规故障排除技巧\n\n当你使用电脑时——尤其是 Windows PC，但 Mac 也不例外——一种莫名的紧张感始终潜藏在你的意识表层之下。这种惶恐源于经验：你的电脑过去不仅崩溃过很多次，而且最近也发生过。所以从某种意义上说，你只是在等待情况变糟，因为你知道它们终究会来。\n\
    \n而当你使用 iPhone、iPad 或其他 iOS 设备时，那种潜在的不安感却无迹可寻。这种令人愉悦的无焦虑状态同样源于经验：你的 iOS 设备几乎从不崩溃，所以你也不会期待它崩溃。不过请注意，我说的是“几乎从不”。现实情况是，尽管其发生频率远低于\
    \ Windows 或 macOS，但 iOS 问题确实存在。这并不意外，因为 iPhone、iPad 和 iPod touch 是极其精密的设备——实际上，它们是功能齐全的计算机。而任何精密设备由于其极高的复杂性，总会出现问题。幸运的是，iOS\
    \ 设备的活动部件比常规电脑更少，所以总体上硬件出问题的可能性更小。你在软件方面也会遇到更少的问题，因为应用开发者只需让自己的产品适配相对少量的设备，而这些设备都是由同一家公司制造的。这确实简化了事情，结果就是更少的问题。但再次强调，并非零问题。\n\
    \n为了帮助你排查可能出现的任何硬件或软件故障，本章提供了一些适用于所有 iOS 设备（iPhone、iPad 和 iPod touch）的通用故障排除技巧。\n\
    \n## 重启与重新启动\n\n如果你的 iOS 设备行为异常或运行不稳，可能是设备内部的某个特定组件导致的。这种情况下，你除了将设备留在天才吧，或寄回给\
    \ Apple 维修外，没有太多选择。不过幸运的是，大多数故障都是暂时性的，通常可以通过使用一些标准技巧来修复，特别是重启或重新启动你的设备。\n\n如果你的\
    \ iPhone 行为异常或运行不稳，可能是手机内部的某个特定组件导致的。这种情况下，你除了将 iPhone 寄回给 Apple 维修外，没有太多选择。不过幸运的是，大多数故障都是暂时性的，通常可以通过使用以下一种或多种技巧来修复：\n\
    \n### 重启你的设备\n\n迄今为止，解决 iOS 设备问题最常用的方法是将其关机，然后再启动。通过重新启动设备，你重置了整个系统，这通常足以解决许多问题。\n\
    \n你可以使用`休眠/唤醒`按钮来重启 iOS 设备，该按钮的位置取决于你的设备：\n\n*   对于 iPhone 6 及更新机型，该按钮位于手机右侧边缘，靠近顶部。\n\
    *   对于所有其他 iOS 设备，该按钮位于设备顶部边缘，靠右侧。\n\n按住`休眠/唤醒`按钮几秒钟，直到出现“滑动来关机”屏幕（此时你可以松开按钮）。向右拖动“滑动来关机”滑块以开始关机。当屏幕完全变黑时，你的设备已关机。要重新启动，按住`休眠/唤醒`按钮直到看到\
    \ Apple 标志，然后松开按钮。\n\n### 重新启动你的设备硬件\n\n当你通过按住`休眠/唤醒`按钮几秒钟来重启 iOS 设备时，你实际上是在重新启动系统软件。如果这仍然不能解决问题，你可能还需要重新启动设备硬件。为此，请同时按住`休眠/唤醒`按钮和`主屏幕`按钮。保持按住状态直到看到\
    \ Apple 标志（大约需要 8 秒左右），这表明重启成功。\n\n**注意**\n\n如果你的 iOS 设备真的卡住了，仅仅按住`休眠/唤醒`按钮无效时，硬件重启也是可行的方法。这种情况确实会发生。\n\
    \n## 更新软件\n\n当 iOS 连接到互联网时，它会时不时地检查可用更新。如果有可用更新，你会在`设置`应用图标上看到一个角标，如图 1-1 所示。你也可能会看到一条“软件更新”通知，告知你新版本的\
    \ iOS 已准备好安装。\n\n![A429116_1_En_1_Fig1_HTML.jpg](img/A429116_1_En_1_Fig1_HTML.jpg)\n\
    \n**图 1-1.** 当 iOS 检测到有可用更新时，它会通过在`设置`应用图标上显示角标来提醒你\n\n要开始更新，请遵循以下步骤：\n\n1.  如果显示了“软件更新”提醒，请轻点“立即安装”。否则，在主屏幕上，轻点“设置”。`设置`应用会打开。\n\
    2.  轻点“通用”。iOS 会显示“通用”屏幕。如图 1-2 所示，当有可用更新时，你也会在“通用”标签和“软件更新”命令上看到角标。\n\n    ![A429116_1_En_1_Fig2_HTML.jpg](img/A429116_1_En_1_Fig2_HTML.jpg)\n\
    \n    **图 1-2.** 当更新就绪时，iOS 会在`设置`应用的“通用”标签和“软件更新”命令上显示角标\n3.  轻点“下载并安装”。iOS 会下载更新，然后继续安装，这需要几分钟时间。\n\
    \n**警告**\n\n仅当你的 iOS 设备在整个更新操作期间保持超过 50% 的电量时，它才会完成更新。为确保更新成功，请将设备插入交流电源插座，或仅在电池充满电时运行更新。\n\
    \n## 从备份恢复你的设备\n\n通常，仅仅更改一个设置、添加一个应用或一些数据就可能导致你的 iOS 设备行为异常。理想情况下，修复方法是将设置恢复到之前的状态，或移除应用或数据，但并不总是能明确找出是哪个设置或内容片段出了问题。\n\
    \n一个解决方案是通过恢复最近的备份将设备恢复到较早的状态。如果追溯到足够早的时间，你应该能恢复到问题不存在的状态。（理想情况下，你不应回溯到超出必要的时间点，因为那样你冒失去其他设置、应用和数据等过多内容的风险。）\n\
    \n请遵循以下步骤来恢复最近的备份：\n\n1.  在你的设备上，关闭“查找我的 iPhone”（如果已开启）。操作方法：打开`设置`，轻点 iCloud，轻点`查找我的设备`（其中`设备`是\
    \ iPhone、iPad 或 iPod），将`查找我的设备`开关轻点至关闭，然后输入你的 Apple 密码。\n2.  将你的设备连接到电脑。\n3. \
    \ 在 iTunes 中，点击设备图标。\n4.  点击“摘要”标签。\n5.  点击“恢复备份”。iTunes 会要求你选择一个要恢复的备份，如图 1-3\
    \ 所示。\n\n    ![A429116_1_En_1_Fig3_HTML.jpg](img/A429116_1_En_1_Fig3_HTML.jpg)\n\
    \n    **图 1-3.** 选择在设备开始出现问题之前创建的较早备份\n6.  选择你想要恢复的较早备份。这应该是在问题首次出现之前创建的最新备份。\n\
    7.  点击“恢复”。iTunes 会恢复备份并重新启动设备。\n\n## 恢复出厂设置\n\n有时你的 iOS 设备会完全瘫痪，因为其设置已损坏。在这种情况下，你可以通过将设备恢复为默认出厂设置来解决问题。\n"
- fmt: "### Restoring Factory Defaults Via iTunes\n\nThe best way to restore factory\
    \ settings is to use the `Restore` feature in iTunes because that enables you\
    \ to back up and restore any settings you’ve changed on the device. There are\
    \ a couple of things to think about here:\n\n- If the corrupted setting is an\
    \ iOS default that you never changed, then the restore operation will overwrite\
    \ that corrupted setting and your problem should be solved. In that case, you\
    \ should back up and restore your own settings.\n- If the corrupted setting is\
    \ one that you changed, then backing up and restoring your settings will likely\
    \ re-create the problem. In that case, you should not back up and restore your\
    \ settings.\n\nSo what route should you take? First, try running the restore procedure\
    \ by backing up and restoring your settings. If the problem goes away, you’re\
    \ set; if the problem recurs, then it means one of your changed settings is the\
    \ culprit, so you should repeat the restore, but this time don’t back up your\
    \ settings.\n\nBefore proceeding, note that these steps require that your device\
    \ be able to connect to your computer and be visible in iTunes. If that’s not\
    \ the case, see the instructions for resetting the device in the next section.\
    \ Otherwise, follow these steps to restore your device:\n\n1.  On your device,\
    \ turn off `Find My iPhone`, if it’s turned on. You do this by opening `Settings`,\
    \ tapping `iCloud`, tapping `Find My Device` (where Device is iPhone, iPad, or\
    \ iPod), tapping the `Find My Device` switch to `Off`, and then entering your\
    \ Apple password.\n2.  Connect your device to your computer.\n3.  In iTunes, click\
    \ the device icon.\n4.  Click the `Summary` tab.\n5.  Click `Back Up Now`. This\
    \ ensures that iTunes has a backup copy of your device data and settings. Caution:\
    \ By default, iTunes doesn’t back up sensitive information such as saved passwords,\
    \ web site history, and health data. To back up that data, select the `Encrypt\
    \ device backup` check box (where device is iPhone, iPad, or iPod) and then run\
    \ the backup.\n6.  Click `Restore Device` (where Device is iPhone, iPad, or iPod).\
    \ iTunes asks you to confirm you want to restore.\n7.  Click `Restore` and then\
    \ follow the prompts on the screen. iTunes downloads iOS and restores the original\
    \ settings. When your device restarts, iTunes connects to it and might ask you\
    \ to enter your Apple ID credentials. After you've done that, iTunes displays\
    \ the `Welcome to Your New Device` screen, as shown in Figure [1-4](#A429116_1_En_1_Chapter.html#Fig4).\n\
    \n    ![A429116_1_En_1_Fig4_HTML.jpg](A429116_1_En_1_Fig4_HTML.jpg)\n\n    **Figure\
    \ 1-4.** When your factory-fresh device restarts, iTunes offers to restore your\
    \ backed-up settings and data\n\n8.  Select the `Restore from this backup` option.\n\
    9.  If you happen to have more than one device backed up, use the list to choose\
    \ yours.\n10. Click `Continue`. iTunes restores your backed-up data, restarts\
    \ your device, and syncs it.\n11. Go through the tabs and check the sync settings\
    \ to make sure they’re set up the way you want.\n12. If you made any changes to\
    \ the settings, click `Apply`. This ensures that your device has all its data\
    \ restored.\n\n### Restoring Factory Settings on the Device\n\nIf your device\
    \ is having problems that prevent it from connecting to your computer or being\
    \ recognized by iTunes, you can still restore the factory default settings directly\
    \ on the device. Here are the steps to follow:\n\n1.  Tap `Settings` in the Home\
    \ screen.\n2.  Tap `General`.\n3.  Tap `Reset`.\n4.  Tap `Reset All Settings`.\n\
    5.  If your device is protected by a passcode, enter the passcode to continue.\n\
    6.  When iOS asks you to confirm, tap `Reset All Settings`.\n\n## Troubleshooting\
    \ Connected Accessories\n\nThere are only a few ways that you can connect accessories\
    \ to your iOS device: using the headset jack, the Lightning connector, or Bluetooth.\
    \ Although the number of accessories you can connect is relatively limited, that\
    \ doesn’t mean you might never have problems with those accessories.\n\nIf you’re\
    \ having trouble with an accessory attached to your iOS device, the good news\
    \ is that a fair chunk of those problems have a relatively limited set of causes.\
    \ You may be able to get the accessory back on its feet by attempting a few tried-and-true\
    \ remedies. If it’s not immediately obvious what the problem is, then your hardware\
    \ troubleshooting routine should always start with these very basic techniques:\n\
    \n- **Check connections, power switches, and so on.** Some of the most common\
    \ (and most embarrassing) causes of hardware problems are the simple physical\
    \ things, so make sure that the connected accessory is turned on and check that\
    \ the cables (if any) are seated properly. For example, if you can’t access the\
    \ Internet through the Wi-Fi connection on your iOS device, make sure your network’s\
    \ router is turned on. Also make sure that the cable between your router and the\
    \ ISP’s modem (if they aren’t a single device, as is often the case these days)\
    \ is properly connected.\n- **Replace the batteries.** Wireless devices such as\
    \ headsets really chew through batteries, so if such a device is working intermittently\
    \ (or not at all), always try replacing the batteries to see if that solves the\
    \ problem.\n- **Turn the accessory off and then on again.** You power cycle a\
    \ device by turning it off, waiting a few seconds for its innards to stop spinning,\
    \ and then turning it back on. You’d be amazed how often this simple procedure\
    \ can get a device back up and running. For a device that doesn’t have an On/Off\
    \ switch, try either unplugging it from the power outlet or removing and replacing\
    \ the batteries.\n- **Reset the accessory's default settings.** If you can configure\
    \ the accessory, then perhaps some new setting is causing the problem. If you\
    \ recently made a change, try returning the setting back to its original value.\
    \ If that doesn’t do the trick, most configurable devices have some kind of `Restore\
    \ Default Settings` option that enables you to quickly return them to their factory\
    \ settings.\n- **Upgrade the accessory’s firmware.** Some devices come with firmware\
    \ — a small program that runs inside the device and controls its internal functions.\
    \ For example, all routers have firmware. Check with the manufacturer to see if\
    \ a new version exists. If it does, download the new version and then see the\
    \ device’s manual to learn how to upgrade the firmware.\n\n## Advanced Troubleshooting\
    \ Techniques\n\nThe techniques you’ve seen so far will in many cases get your\
    \ iOS device back up and running. If not, there are still a couple of other techniques\
    \ you can try."
