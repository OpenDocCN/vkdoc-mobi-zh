- fmt: "### You Want to Put a Phone Call on Hold\n\nWhen you’re on a call, you might\
    \ want to put the caller on hold while you do something else. That’s a standard\
    \ phone feature, but the `Phone` app doesn’t appear to offer it.\n\n**Solution:**\
    \ For reasons that remain mysterious, iOS hides this useful feature. To see it,\
    \ press and hold the mute button. After several seconds, your iPhone replaces\
    \ this icon with a hold icon and puts the caller on hold, as shown in Figure [6-10](#A429116_1_En_6_Chapter.html#Fig10).\
    \ To take the caller off hold, tap that icon.\n\n![A429116_1_En_6_Fig10_HTML.jpg](A429116_1_En_6_Fig10_HTML.jpg)\n\
    \nFigure 6-10. To put a phone call on hold, tap and hold the mute button for several\
    \ seconds until you see the hold icon\n\n# 7. Solving Problems Related to Cameras\
    \ and Photos\n\nThere’s a photography revolution underway, and the leader of this\
    \ revolution isn’t a traditional camera company such as Canon or Nikon, but a\
    \ computer company. I speak, of course, of Apple and its `iPhone`, `iPod touch`,\
    \ and `iPad`. These devices have long had cameras, but in the last generation\
    \ or two those cameras have become extremely good. Add the fact that we also carry\
    \ these devices with us wherever we go, and you now have hundreds of millions\
    \ of people walking around with high-quality photographic equipment at hand. That\
    \ is revolutionary, to say the least. And while using the camera on an iOS device\
    \ doesn’t come with the learning curve of, say, a digital single-lens reflex camera,\
    \ it does require knowledge of how the camera works and some behind-the-scenes\
    \ settings to get the most out of it and to overcome some pesky problems.\n\n\
    ## Troubleshooting Camera Problems\n\n### Many of Your Photos Are Blurry\n\nThe\
    \ iOS device camera hardware is gradually getting better and the `iPhone`, `iPad`,\
    \ and `iPod touch` generally take pretty good shots. However, probably the biggest\
    \ problem most people have with iOS photos is blurry images, which are caused\
    \ by not holding the device steady while taking the shot.\n\n**Solution:** The\
    \ `iPhone 6` and later do offer optical image stabilization, which means the camera\
    \ automatically compensates for subtle hand shaking and other small movements.\
    \ But even if you have an earlier `iPhone` or some other iOS device, there are\
    \ a few things you can do to minimize or hopefully eliminate blurred shots:\n\n\
    *   Widen your stance to stabilize your body.\n*   Lean your shoulder (at least)\
    \ or your entire side (at best) against any nearby object, such as a wall, doorframe,\
    \ or car.\n*   Place your free arm across your torso with your forearm parallel\
    \ to the ground, then rest the elbow of your “shooting” arm (that is, the one\
    \ holding the device) on the free arm, which should help steady your shooting\
    \ arm.\n*   Hold your breath while taking the shot.\n*   Remember that your device\
    \ takes the shot when you release the `Shutter` button, not when you press it.\
    \ Therefore, keep your subject composed and yourself steadied as best you can\
    \ until you lift your finger off the `Shutter` button.\n\n> **Note:** You might\
    \ be tempted to press and hold the `Shutter` button and release it only when you’re\
    \ steady. Unfortunately, that technique no longer works because pressing and holding\
    \ the `Shutter` button initiates burst mode, which takes photos at a rate of 10\
    \ per second.\n\n*   After you release the `Shutter` button, keep the phone steady\
    \ until the photo thumbnail appears in the lower-left corner of the screen. If\
    \ you move while the device is finalizing the photo, you’ll blur the shot.\n\n\
    Keep some or all of these pointers in mind while shooting with your iOS device,\
    \ and you’ll soon find that blurry photos are a thing of the past.\n\n### Your\
    \ Low-Light Photos Are Often Too Dark, Grainy, or Blurry\n\nPhotos taken in low-light\
    \ conditions are difficult because any camera requires light, and the less light\
    \ the camera has to work with, the more likely the photos will turn out too dark,\
    \ too grainy, or too blurry.\n\nThe `iPhone 7 Plus` comes with two cameras, one\
    \ of which offers a lens with an aperture of `f/1.8`, compared to the `f/2.2`\
    \ lens in the `iPhone 6s` and `6s Plus`. In the topsy-turvy world of camera specs,\
    \ a lower aperture number translates to a larger lens area – in this case, an\
    \ `f/1.8` lens offers 50 percent greater area than an `f/2.2` lens. The greater\
    \ the available lens area, the more light the camera can collect, so the better\
    \ the low-light photos it can take.\n\n**Solution:** If you don’t have an `iPhone\
    \ 7 Plus`, you can still take steps to improve your low-light photos. Here are\
    \ some tips:\n\n*   Take advantage of any light source that’s available. If you’re\
    \ outdoors, look for street lamps, brightly lit signs, or even a bright moon.\
    \ If you’re indoors and it’s daytime, take your shots near a window. At night,\
    \ turn on lamps and other light sources.\n*   Hold the device as steady as possible\
    \ while shooting, particularly by using many of the same techniques I mentioned\
    \ in the previous section. When the `Camera` app senses that there is low light\
    \ available, it slows down the shutter speed – that is, keeps the shutter open\
    \ longer – to allow more light to hit the lens. However, that slower shutter speed\
    \ means it takes longer to expose the photo, so you’re more likely to get camera\
    \ shake.\n    > **Tip:** For very dark conditions, consider investing in a tripod\
    \ for your iOS device. This is the best way to ensure that the camera remains\
    \ steady during long exposures.\n*   Adjust the exposure level, which controls\
    \ the overall brightness of the photo. In dark conditions, the `Camera` app will\
    \ often set the exposure to compensate, which means increasing the exposure. Unfortunately,\
    \ this usually means that brighter areas of the scene get overexposed and appear\
    \ washed out. Similarly, a single bright object in the scene can cause the `Camera`\
    \ app to reduce the exposure, which can cause shadows and other dark areas to\
    \ be underexposed. To adjust the exposure, compose your shot and then tap the\
    \ screen to set the focus. You can now drag up on the screen to increase exposure\
    \ (make the image brighter), or drag down to decrease exposure (make the image\
    \ darker).\n*   Take advantage of the flash. Many people don’t like to use the\
    \ built-in camera flash because it can make subjects look washed out. But in very\
    \ low-light conditions, you might not have any choice since the flash might be\
    \ the only useful light source you have. The `Camera` app’s `Flash` feature is\
    \ set on `Auto` by default, meaning that the app determines whether or not it\
    \ needs to use the flash. You can leave it at that, or you can set the `Flash`\
    \ to `On` so that the `Camera` app always uses it. In the `Camera` app, tap the\
    \ `Flash` icon (the lightning bolt; see Figure [7-1](#A429116_1_En_7_Chapter.html#Fig1))\
    \ and then tap either `Auto` or `On`.\n\n![A429116_1_En_7_Fig1_HTML.jpg](A429116_1_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1."
  raw: '### You Want to Put a Phone Call on Hold


    When you’re on a call, you might want to put the caller on hold while you do something
    else. That’s a standard phone feature, but the Phone app doesn’t appear to offer
    it.


    Solution: For reasons that remain mysterious, iOS hides this useful feature. To
    see it, press and hold the mute button. After several seconds, your iPhone replaces
    this icon with a hold icon and puts the caller on hold, as shown in Figure [6-10](#A429116_1_En_6_Chapter.html#Fig10).
    To take the caller off hold, tap that icon.


    ![A429116_1_En_6_Fig10_HTML.jpg](A429116_1_En_6_Fig10_HTML.jpg)


    Figure 6-10.


    To put a phone call on hold, tap and hold the mute button for several seconds
    until you see the hold icon


    # 7. Solving Problems Related to Cameras and Photos


    There’s a photography revolution underway, and the leader of this revolution isn’t
    a traditional camera company such as Canon or Nikon, but a computer company. I
    speak, of course, of Apple and its iPhone, iPod touch, and iPad. These devices
    have long had cameras, but in the last generation or two those cameras have become
    extremely good. Add the fact that we also carry these devices with us wherever
    we go, and you now have hundreds of millions of people walking around with high-quality
    photographic equipment at hand. That is revolutionary, to say the least. And while
    using the camera on an iOS device doesn’t come with the learning curve of, say,
    a digital single-lens reflex camera, it does require knowledge of how the camera
    works and some behind-the-scenes settings to get the most out of it and to overcome
    some pesky problems.


    ## Troubleshooting Camera Problems


    ### Many of Your Photos Are Blurry


    The iOS device camera hardware is gradually getting better and the iPhone, iPad,
    and iPod touch generally take pretty good shots. However, probably the biggest
    problem most people have with iOS photos is blurry images, which are caused by
    not holding the device steady while taking the shot.


    Solution: The iPhone 6 and later do offer optical image stabilization, which means
    the camera automatically compensates for subtle hand shaking and other small movements.
    But even if you have an earlier iPhone or some other iOS device, there are a few
    things you can do to minimize or hopefully eliminate blurred shots:


    *   Widen your stance to stabilize your body.

    *   Lean your shoulder (at least) or your entire side (at best) against any nearby
    object, such as a wall, doorframe, or car.

    *   Place your free arm across your torso with your forearm parallel to the ground,
    then rest the elbow of your “shooting” arm (that is, the one holding the device)
    on the free arm, which should help steady your shooting arm.

    *   Hold your breath while taking the shot.

    *   Remember that your device takes the shot when you release the Shutter button,
    not when you press it. Therefore, keep your subject composed and yourself steadied
    as best you can until you lift your finger off the Shutter button.


    Note


    You might be tempted to press and hold the Shutter button and release it only
    when you’re steady. Unfortunately, that technique no longer works because pressing
    and holding the Shutter button initiates burst mode, which takes photos at a rate
    of 10 per second.


    *   After you release the Shutter button, keep the phone steady until the photo
    thumbnail appears in the lower-left corner of the screen. If you move while the
    device is finalizing the photo, you’ll blur the shot.


    Keep some or all of these pointers in mind while shooting with your iOS device,
    and you’ll soon find that blurry photos are a thing of the past.


    ### Your Low-Light Photos Are Often Too Dark, Grainy, or Blurry


    Photos taken in low-light conditions are difficult because any camera requires
    light, and the less light the camera has to work with, the more likely the photos
    will turn out too dark, too grainy, or too blurry.


    The iPhone 7 Plus comes with two cameras, one of which offers a lens with an aperture
    of f/1.8, compared to the f/2.2 lens in the iPhone 6s and 6s Plus. In the topsy-turvy
    world of camera specs, a lower aperture number translates to a larger lens area
    – in this case, an f/1.8 lens offers 50 percent greater area than an f/2.2 lens.
    The greater the available lens area, the more light the camera can collect, so
    the better the low-light photos it can take.


    Solution: If you don’t have an iPhone 7 Plus, you can still take steps to improve
    your low-light photos. Here are some tips:


    *   Take advantage of any light source that’s available. If you’re outdoors, look
    for street lamps, brightly lit signs, or even a bright moon. If you’re indoors
    and it’s daytime, take your shots near a window. At night, turn on lamps and other
    light sources.

    *   Hold the device as steady as possible while shooting, particularly by using
    many of the same techniques I mentioned in the previous section. When the Camera
    app senses that there is low light available, it slows down the shutter speed
    – that is, keeps the shutter open longer – to allow more light to hit the lens.
    However, that slower shutter speed means it takes longer to expose the photo,
    so you’re more likely to get camera shake.


    Tip


    For very dark conditions, consider investing in a tripod for your iOS device.
    This is the best way to ensure that the camera remains steady during long exposures.


    *   Adjust the exposure level, which controls the overall brightness of the photo.
    In dark conditions, the Camera app will often set the exposure to compensate,
    which means increasing the exposure. Unfortunately, this usually means that brighter
    areas of the scene get overexposed and appear washed out. Similarly, a single
    bright object in the scene can cause the Camera app to reduce the exposure, which
    can cause shadows and other dark areas to be underexposed. To adjust the exposure,
    compose your shot and then tap the screen to set the focus. You can now drag up
    on the screen to increase exposure (make the image brighter), or drag down to
    decrease exposure (make the image darker).

    *   Take advantage of the flash. Many people don’t like to use the built-in camera
    flash because it can make subjects look washed out. But in very low-light conditions,
    you might not have any choice since the flash might be the only useful light source
    you have. The Camera app’s Flash feature is set on Auto by default, meaning that
    the app determines whether or not it needs to use the flash. You can leave it
    at that, or you can set the Flash to On so that the Camera app always uses it.
    In the Camera app, tap the Flash icon (the lightning bolt; see Figure [7-1](#A429116_1_En_7_Chapter.html#Fig1))
    and then tap either Auto or On.


    ![A429116_1_En_7_Fig1_HTML.jpg](A429116_1_En_7_Fig1_HTML.jpg)


    Figure 7-1.'
  trans: "\n### 你想将通话置于保持状态\n\n通话时，你可能想将对方置于保持状态，先处理其他事情。这是电话的标配功能，但“`电话`”应用似乎并未提供此选项。\n\
    \n**解决方法：** 出于某种神秘原因，iOS 将此实用功能隐藏了起来。要启用它，请长按静音按钮。几秒钟后，你的 iPhone 会将此图标替换为保持图标，并将通话方置于保持状态，如图\
    \ 6-10 所示。要取消保持，请再次点击该图标。\n\n![A429116_1_En_6_Fig10_HTML.jpg](img/A429116_1_En_6_Fig10_HTML.jpg)\n\
    \n图 6-10. 要将通话置于保持状态，请长按静音按钮几秒钟，直到看到保持图标\n\n# 7. 解决相机和照片相关问题\n\n一场摄影革命正在进行，而这场革命的领导者并非佳能或尼康这样的传统相机公司，而是一家计算机公司。我说的当然是苹果公司及其\
    \ `iPhone`、`iPod touch` 和 `iPad`。这些设备长期以来都配有摄像头，但在过去的一两代产品中，其摄像头的性能已变得极为出色。再加上我们无论走到哪里都会随身携带这些设备，如今已有数亿人身边随时带着高质量的摄影设备。至少可以说，这是革命性的。虽然使用\
    \ iOS 设备上的相机不像使用数码单反相机那样需要学习曲线，但要充分发挥其性能并解决一些恼人的问题，确实需要了解相机的工作原理以及一些幕后设置。\n\n\
    ## 相机问题故障排除\n\n### 你的很多照片都模糊不清\n\niOS 设备的相机硬件正在逐步改进，`iPhone`、`iPad` 和 `iPod touch`\
    \ 通常能拍出相当不错的照片。然而，大多数人在使用 iOS 拍照时遇到的最大问题可能是图像模糊，这通常是由于拍照时未能保持设备稳定所致。\n\n**解决方法：**\
    \ `iPhone 6` 及更新机型确实提供了光学图像防抖功能，这意味着相机会自动补偿微小的手部抖动和其他小幅移动。但即使你使用的是较旧的 `iPhone`\
    \ 或其他 iOS 设备，也可以采取以下一些措施来尽量减少甚至避免照片模糊：\n\n*   扩大站姿以稳定身体。\n*   将至少一个肩膀（或整个身体一侧）靠住附近的物体，例如墙壁、门框或汽车。\n\
    *   将空闲的手臂横过躯干，前臂与地面平行，然后将握持设备的那只手的手肘放在空闲的手臂上，这有助于稳定握持手臂。\n*   在拍照时屏住呼吸。\n*  \
    \ 记住，设备是在你松开 `快门` 按钮时拍照，而不是在按下时。因此，请尽量保持构图稳定并稳住身体，直到手指从 `快门` 按钮上抬起。\n\n> **注意：**\
    \ 你可能会想先按住 `快门` 按钮，待身体稳定后再松开。但这种方法已不再适用，因为按住 `快门` 按钮会启动连拍模式，以每秒 10 张的速度拍照。\n\n\
    *   松开 `快门` 按钮后，请保持手机稳定，直到照片缩略图出现在屏幕左下角。如果在设备最终处理照片时移动，照片就会变模糊。\n\n在使用 iOS 设备拍照时记住部分或全部这些要点，你很快就会发现模糊照片已成为过去。\n\
    \n### 你的弱光照片通常太暗、有颗粒感或模糊不清\n\n在弱光条件下拍摄照片很困难，因为任何相机都需要光线，而相机可用的光线越少，拍出的照片就越容易显得太暗、有颗粒感或模糊不清。\n\
    \n`iPhone 7 Plus` 配备了两个摄像头，其中一个镜头的孔径为 `f/1.8`，而 `iPhone 6s` 和 `6s Plus` 的镜头孔径为\
    \ `f/2.2`。在相机规格这个看似颠倒的世界里，更小的光圈数值意味着更大的镜头通光面积——在本例中，`f/1.8` 镜头的通光面积比 `f/2.2` 镜头大\
    \ 50%。镜头可用的通光面积越大，相机能收集到的光线就越多，因此其弱光拍摄能力也就越强。\n\n**解决方法：** 即使你没有 `iPhone 7 Plus`，仍然可以采取一些措施来改善弱光照片。以下是一些提示：\n\
    \n*   利用所有可用的光源。如果在户外，寻找路灯、明亮的标志牌，甚至是明亮的月光。如果在室内且是白天，请靠近窗户拍照。在夜晚，打开台灯和其他光源。\n\
    *   拍照时尽量保持设备稳定，尤其要使用我在上一部分提到的许多相同技巧。当“`相机`”应用检测到光线较暗时，它会降低快门速度——即延长快门开启时间——以让更多光线到达镜头。然而，较慢的快门速度意味着曝光时间更长，因此更容易出现相机抖动。\n\
    \    > **提示：** 对于非常黑暗的环境，考虑为你的 iOS 设备投资一个三脚架。这是确保相机在长时间曝光期间保持稳定的最佳方法。\n*   调整曝光级别，它控制着照片的整体亮度。在黑暗条件下，“`相机`”应用通常会调整曝光进行补偿，这意味着增加曝光。不幸的是，这通常会导致场景中较亮的区域过度曝光，显得发白。同样，场景中单个明亮的物体也可能导致“`相机`”应用减少曝光，从而使阴影和其他暗部区域曝光不足。要调整曝光，请先构图，然后点击屏幕设置对焦点。现在你可以向上拖动屏幕增加曝光（使图像变亮），或向下拖动减少曝光（使图像变暗）。\n\
    *   利用闪光灯。许多人不喜欢使用内置相机闪光灯，因为它会让拍摄对象看起来苍白。但在光线非常暗的情况下，你可能别无选择，因为闪光灯可能是你唯一有效的光源。“`相机`”应用的“`闪光灯`”功能默认设置为“`自动`”，这意味着应用会自行判断是否需要使用闪光灯。你可以保持此设置，也可以将“`闪光灯`”设置为“`打开`”，这样“`相机`”应用就会始终使用它。在“`相机`”应用中，点击“`闪光灯`”图标（闪电符号；参见图\
    \ 7-1），然后点击“`自动`”或“`打开`”。\n\n![A429116_1_En_7_Fig1_HTML.jpg](img/A429116_1_En_7_Fig1_HTML.jpg)\n\
    \n图 7-1.\n"
- fmt: "Tap `Flash` and then tap the setting you want to use.\n\n- Shoot in black\
    \ and white. Shadows and other darker parts of a low-light image will usually\
    \ look grainy, but that grain really stands out when the photo is in color. You\
    \ can improve the look of grainy parts of the photo by shooting in black and white\
    \ instead of color. In the Camera app, tap the Filters icon (the three overlapping\
    \ circles), and then tap one of the following filters (see Figure [7-2](#A429116_1_En_7_Chapter.html#Fig2)):\n\
    \  - `Mono` — This filter converts all the colors to shades of black and white,\
    \ but does no other processing. This is a good all-around filter for most low-light\
    \ conditions.\n  - `Tonal` — This filter is the same as `Mono`, except that it\
    \ also increases the brightness and contrast. This is a good filter to use when\
    \ it’s quite dark or when there isn’t much contrast in the scene.\n  - `Noir`\
    \ — This filter is the same as `Mono`, except that it also boosts a number of\
    \ other levels, including the contrast, brilliance, and intensity. This can make\
    \ some very dramatic photos, but you might find that some images look overprocessed.\n\
    \n![A429116_1_En_7_Fig2_HTML.jpg](A429116_1_En_7_Fig2_HTML.jpg)\n\nFigure 7-2.\n\
    \nTo shoot your low-light photo in black and white, tap Filters and then tap either\
    \ `Mono`, `Tonal`, or `Noir`\n\nWhen you’re done with your low-light shooting,\
    \ be sure to remove the filter by tapping the Filters icon once again, and then\
    \ tapping `None`.\n\n**Tip**  \nYou can also apply one of the black and white\
    \ filters to a photo you have already shot. Open the Photo using the Photos app;\
    \ tap Edit (it’s the icon that looks like a set of three equalizer bars); tap\
    \ Filters; and then tap `Mono`, `Tonal`, or `Noir`.\n\n### You Have Trouble Keeping\
    \ the Focus or Exposure Set\n\nThe Camera app offers a feature called `AutoFocus`,\
    \ which enables the camera to automatically focus on whatever subject is in the\
    \ middle of the frame.\n\nAlternatively, you can do this yourself by tapping the\
    \ screen to set the focus and exposure. If the subject you want to focus on is\
    \ not in the middle of the frame, you can tap the subject and the iOS device automatically\
    \ moves the focus to that object. It also automatically adjusts the white balance\
    \ and exposure. If the exposure seems off, you can drag up or down anywhere on\
    \ the screen to increase or decrease, respectively, the brightness.\n\nMost people\
    \ rely on `AutoFocus`, which is certainly a handy feature, except when you’ve\
    \ got the perfect shot lined up and `AutoFocus` kicks in and wrecks the focus\
    \ or exposure (or both!).\n\n**Solution**: To prevent this, compose your shot\
    \ and then tap and hold on the person or object you want to focus on for about\
    \ three seconds (or until the focus rectangle pulses). When you release your finger,\
    \ you see `AE/AF Lock` (short for `AutoExposure/AutoFocus`) at the top of the\
    \ screen, as shown in Figure [7-3](#A429116_1_En_7_Chapter.html#Fig3). Your current\
    \ focus and exposure settings are now locked, meaning they won’t change if you\
    \ move the camera. To release the exposure and focus, tap the screen.\n\n![A429116_1_En_7_Fig3_HTML.jpg](A429116_1_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3.\n\nTo lock the exposure and focus, tap and hold the screen until\
    \ you see `AE/AF Lock`\n\n### You Want to Include Yourself in a Photo Taken with\
    \ the Rear Camera\n\nThe term selfie (that is, a photo that you take of yourself,\
    \ possibly with a friend or two included) was named Oxford Dictionaries’ Word\
    \ of the Year for 2013, which I’m sure isn’t even remotely shocking news to you.\
    \ You only have to look around at any event or occasion to realize that each of\
    \ us has become our favorite photo subject. To make selfies even easier to shoot,\
    \ just switch to the front camera, which seems nearly tailor-made for taking selfies.\n\
    \nI say “nearly” because the front camera method for taking selfies does come\
    \ with a couple of drawbacks:\n\n- The front camera is low resolution compared\
    \ to the rear camera, and it doesn’t support flash.\n- All shots must be taken\
    \ more or less at arm’s length, which gives every such photo a characteristic\
    \ “This is me taking a selfie” look.\n\nCreative selfie-takers have worked around\
    \ these limitations by using mirrors and other tricks, but iOS offers a simpler\
    \ alternative: time delay. This feature tells the Camera to wait for several seconds\
    \ after you tap the Shutter button before taking the photo. This means your photo-taking\
    \ steps change as follows:\n\n1.  In the Camera app, use the Switch Camera icon\
    \ (shown in Figure [7-4](#A429116_1_En_7_Chapter.html#Fig4)) to select the rear\
    \ camera.\n\n    ![A429116_1_En_7_Fig4_HTML.jpg](A429116_1_En_7_Fig4_HTML.jpg)\n\
    \n    Figure 7-4.\n\n    Use the Camera app's Switch Camera button to choose the\
    \ rear camera\n\n2.  Tap the Time Delay button (shown in Figure [7-5](#A429116_1_En_7_Chapter.html#Fig5))\
    \ and then tap the number of seconds you want to use for the delay: 3 seconds\
    \ or 10 seconds.\n\n    ![A429116_1_En_7_Fig5_HTML.jpg](A429116_1_En_7_Fig5_HTML.jpg)\n\
    \n    Figure 7-5.\n\n    In the Camera app's menu bar, tap the Time Delay icon\n\
    \n3.  Position your iOS device (on, say, a desk or chair) so that it’s pointing\
    \ toward the background that you want to use in your selfie.\n\n4.  Tap Shutter.\n\
    \n5.  Move into the frame before the shot is taken.\n\nNote that the Camera app\
    \ takes not one photo, but a burst of 11 photos. To choose which photo you want\
    \ to keep, tap the photo thumbnail in the bottom left corner, tap the photo burst,\
    \ tap Select, tap the photo you want to keep, tap Done, and then tap `Keep Only\
    \ 1 Favorite`.\n\n**Tip**  \n`Burst` mode isn’t only available when you’re taking\
    \ time-delayed photos. You can snap a burst of photos any time you want by tapping\
    \ and holding the Shutter button.\n\n### You Have Trouble Taking a Straight Photo\n\
    \nAlthough you’ll occasionally want to take a photo at a fun or interesting angle,\
    \ most of the time our photos look their best when they’re straight. However,\
    \ when you’re taking quick or casual shots, getting them straight can be a challenge.\
    \ You can always straighten photos after you take them (see “A photo is not straight,”\
    \ later in this chapter), but it’s better to get them straight right from the\
    \ beginning.\n\n**Solution**: A useful way to ensure your photos are straight\
    \ is to display the Camera app’s grid, which divides the frame into nine rectangles\
    \ (that is, a 3x3 grid) by displaying two horizontal and two vertical lines. These\
    \ lines don’t show up in your photo, but you can use them to make sure your subject\
    \ is aligned both horizontally and vertically. Follow these steps to activate\
    \ the grid:\n\n1.  Open the Settings app.\n\n2.  Tap Photos & Camera.\n\n3.  Tap\
    \ the Grid switch to On.\n\n**Tip**  \nThe grid is also useful for composing pictures\
    \ using the Rule of Thirds, where you place your subject on one of the grid lines\
    \ (or on the intersection of two grid lines) instead of in the middle of the screen.\n\
    \n## Troubleshooting Photo Problems"
  raw: "Tap Flash and then tap the setting you want to use\n*   Shoot in black and\
    \ white. Shadows and other darker parts of a low-light image will usually look\
    \ grainy, but that grain really stands out when the photo is in color. You can\
    \ improve the look of grainy parts of the photo by shooting in black and white\
    \ instead of color. In the Camera app, tap the Filters icon (the three overlapping\
    \ circles), and then tap one of the following filters (see Figure [7-2](#A429116_1_En_7_Chapter.html#Fig2)):\n\
    \    *   Mono — This filter converts all the colors to shades of black and white,\
    \ but does no other processing. This is a good all-around filter for most low-light\
    \ conditions.\n    *   Tonal — This filter is the same as Mono, except that it\
    \ also increases the brightness and contrast. This is a good filter to use when\
    \ it’s quite dark or when there isn’t much contrast in the scene.\n    *   Noir\
    \ — This filter is the same as Mono, except that it also boosts a number of other\
    \ levels, including the contrast, brilliance, and intensity. This can make some\
    \ very dramatic photos, but you might find that some images look overprocessed.\n\
    \n![A429116_1_En_7_Fig2_HTML.jpg](A429116_1_En_7_Fig2_HTML.jpg)\n\nFigure 7-2.\n\
    \nTo shoot your low-light photo in black and white, tap Filters and then tap either\
    \ Mono, Tonal, or Noir\n\nWhen you’re done with your low-light shooting, be sure\
    \ to remove the filter by tapping the Filters icon once again, and then tapping\
    \ None.\n\nTip\n\nYou can also apply one of the black and white filters to a photo\
    \ you have already shot. Open the Photo using the Photos app; tap Edit (it’s the\
    \ icon that looks like a set of three equalizer bars); tap Filters; and then tap\
    \ Mono, Tonal, or Noir.\n\n### You Have Trouble Keeping the Focus or Exposure\
    \ Set\n\nThe Camera app offers a feature called AutoFocus, which enables the camera\
    \ to automatically focus on whatever subject is in the middle of the frame.\n\n\
    Alternatively, you can do this yourself by tapping the screen to set the focus\
    \ and exposure. If the subject you want to focus on is not in the middle of the\
    \ frame, you can tap the subject and the iOS device automatically moves the focus\
    \ to that object. It also automatically adjusts the white balance and exposure.\
    \ If the exposure seems off, you can drag up or down anywhere on the screen to\
    \ increase or decrease, respectively, the brightness.\n\nMost people rely on AutoFocus,\
    \ which is certainly a handy feature, except when you’ve got the perfect shot\
    \ lined up and AutoFocus kicks in and wrecks the focus or exposure (or both!).\n\
    \nSolution: To prevent this, compose your shot and then tap and hold on the person\
    \ or object you want to focus on for about three seconds (or until the focus rectangle\
    \ pulses). When you release your finger, you see AE/AF Lock (short for AutoExposure/AutoFocus)\
    \ at the top of the screen, as shown in Figure [7-3](#A429116_1_En_7_Chapter.html#Fig3).\
    \ Your current focus and exposure settings are now locked, meaning they won’t\
    \ change if you move the camera. To release the exposure and focus, tap the screen.\n\
    \n![A429116_1_En_7_Fig3_HTML.jpg](A429116_1_En_7_Fig3_HTML.jpg)\n\nFigure 7-3.\n\
    \nTo lock the exposure and focus, tap and hold the screen until you see AE/AF\
    \ Lock\n\n### You Want to Include Yourself in a Photo Taken with the Rear Camera\n\
    \nThe term selfie (that is, a photo that you take of yourself, possibly with a\
    \ friend or two included) was named Oxford Dictionaries’ Word of the Year for\
    \ 2013, which I’m sure isn’t even remotely shocking news to you. You only have\
    \ to look around at any event or occasion to realize that each of us has become\
    \ our favorite photo subject. To make selfies even easier to shoot, just switch\
    \ to the front camera, which seems nearly tailor-made for taking selfies.\n\n\
    I say “nearly” because the front camera method for taking selfies does come with\
    \ a couple of drawbacks:\n\n*   The front camera is low resolution compared to\
    \ the rear camera, and it doesn’t support flash.\n*   All shots must be taken\
    \ more or less at arm’s length, which gives every such photo a characteristic\
    \ “This is me taking a selfie” look.\n\nCreative selfie-takers have worked around\
    \ these limitations by using mirrors and other tricks, but iOS offers a simpler\
    \ alternative: time delay. This feature tells the Camera to wait for several seconds\
    \ after you tap the Shutter button before taking the photo. This means your photo-taking\
    \ steps change as follows:\n\n1.  In the Camera app, use the Switch Camera icon\
    \ (shown in Figure [7-4](#A429116_1_En_7_Chapter.html#Fig4)) to select the rear\
    \ camera.\n\n    ![A429116_1_En_7_Fig4_HTML.jpg](A429116_1_En_7_Fig4_HTML.jpg)\n\
    \n    Figure 7-4.\n\n    Use the Camera app's Switch Camera button to choose the\
    \ rear camera  \n2.  Tap the Time Delay button (shown in Figure [7-5](#A429116_1_En_7_Chapter.html#Fig5))\
    \ and then tap the number of seconds you want to use for the delay: 3 seconds\
    \ or 10 seconds.\n\n    ![A429116_1_En_7_Fig5_HTML.jpg](A429116_1_En_7_Fig5_HTML.jpg)\n\
    \n    Figure 7-5.\n\n    In the Camera app's menu bar, tap the Time Delay icon\
    \  \n3.  Position your iOS device (on, say, a desk or chair) so that it’s pointing\
    \ toward the background that you want to use in your selfie.  \n4.  Tap Shutter.\
    \  \n5.  Move into the frame before the shot is taken.  \n\nNote that the Camera\
    \ app takes not one photo, but a burst of 11 photos. To choose which photo you\
    \ want to keep, tap the photo thumbnail in the bottom left corner, tap the photo\
    \ burst, tap Select, tap the photo you want to keep, tap Done, and then tap Keep\
    \ Only 1 Favorite.\n\nTip\n\nBurst mode isn’t only available when you’re taking\
    \ time-delayed photos. You can snap a burst of photos any time you want by tapping\
    \ and holding the Shutter button.\n\n### You Have Trouble Taking a Straight Photo\n\
    \nAlthough you’ll occasionally want to take a photo at a fun or interesting angle,\
    \ most of the time our photos look their best when they’re straight. However,\
    \ when you’re taking quick or casual shots, getting them straight can be a challenge.\
    \ You can always straighten photos after you take them (see “A photo is not straight,”\
    \ later in this chapter), but it’s better to get them straight right from the\
    \ beginning.\n\nSolution: A useful way to ensure your photos are straight is to\
    \ display the Camera app’s grid, which divides the frame into nine rectangles\
    \ (that is, a 3x3 grid) by displaying two horizontal and two vertical lines. These\
    \ lines don’t show up in your photo, but you can use them to make sure your subject\
    \ is aligned both horizontally and vertically. Follow these steps to activate\
    \ the grid:\n\n1.  Open the Settings app.  \n2.  Tap Photos & Camera.  \n3.  Tap\
    \ the Grid switch to On.  \n\nTip\n\nThe grid is also useful for composing pictures\
    \ using the Rule of Thirds, where you place your subject on one of the grid lines\
    \ (or on the intersection of two grid lines) instead of in the middle of the screen.\n\
    \n## Troubleshooting Photo Problems"
  trans: "\n轻点`闪光灯`，然后轻点你要使用的设置。\n\n- 以黑白模式拍摄。弱光照片中的阴影及其他较暗部分通常会显得颗粒感重，但当照片为彩色时，这种颗粒感会格外突出。通过采用黑白而非彩色拍摄，你可以改善照片中颗粒感部分的外观。在“相机”应用中，轻点“滤镜”图标（三个重叠的圆圈），然后轻点以下任一滤镜（见图\
    \ 7-2）：\n  - `单色` — 此滤镜将所有颜色转换为黑白色调，不进行其他处理。对于大多数弱光环境而言，这是一款全能型好滤镜。\n  - `色调`\
    \ — 此滤镜与`单色`相同，但还额外提升了亮度和对比度。当环境相当暗或场景缺乏对比度时，这款滤镜很好用。\n  - `黑白` — 此滤镜与`单色`相同，但额外增强了多项其他参数，包括对比度、亮度和强度。这可以拍出一些非常戏剧性的照片，但你可能会觉得某些图像显得处理过度。\n\
    \n![A429116_1_En_7_Fig2_HTML.jpg](img/A429116_1_En_7_Fig2_HTML.jpg)\n\n图 7-2.\n\
    \n要以黑白模式拍摄弱光照片，轻点“滤镜”，然后轻点`单色`、`色调`或`黑白`\n\n弱光拍摄完成后，请务必再次轻点“滤镜”图标，然后轻点`无`，以移除滤镜。\n\
    \n**提示**  \n你也可以将黑白滤镜应用于已拍摄的照片。使用“照片”应用打开照片；轻点“编辑”（图标看起来像三个均衡器条）；轻点“滤镜”；然后轻点`单色`、`色调`或`黑白`。\n\
    \n### 对焦或曝光设置难以固定\n\n“相机”应用提供了一项名为`自动对焦`的功能，可使相机自动对焦于画面中央的任何主体。\n\n或者，你也可以通过轻点屏幕自行设置对焦和曝光。如果希望聚焦的主体不在画面中央，可以轻点该主体，iOS\
    \ 设备便会自动将对焦点移至该物体。它还会自动调整白平衡和曝光。如果曝光似乎不准确，你可以在屏幕任意位置向上或向下拖动，分别增加或减少亮度。\n\n大多数人依赖`自动对焦`，这确实是一项便捷功能，但当你已完美构图时，`自动对焦`一旦介入，可能会破坏对焦或曝光（或两者兼具！）。\n\
    \n**解决方案**：为预防此情况，请先构图，然后长按你希望对焦的人物或物体约三秒钟（或直到对焦矩形闪烁）。松开手指后，你会看到屏幕顶部显示`AE/AF 锁定`（即`自动曝光/自动对焦`的缩写），如图\
    \ 7-3 所示。你当前的对焦和曝光设置现已锁定，即使移动相机也不会改变。若要解除曝光和对焦锁定，请轻点屏幕。\n\n![A429116_1_En_7_Fig3_HTML.jpg](img/A429116_1_En_7_Fig3_HTML.jpg)\n\
    \n图 7-3.\n\n要锁定曝光和对焦，长按屏幕直至看到`AE/AF 锁定`\n\n### 你想让自己出现在后置摄像头拍摄的照片中\n\n“自拍”（即拍一张自己的照片，可能包含一两位朋友）这个词曾被牛津词典评为\
    \ 2013 年度词汇，我相信这对你来说一点都不意外。只需看看任何活动或场合，你就会发现我们每个人都成了自己最喜欢的拍摄对象。为了让自拍更简单，只需切换到前置摄像头即可，这几乎像是为自拍量身定做的。\n\
    \n我说“几乎”，是因为用前置摄像头自拍的方法确实存在几个缺点：\n\n- 前置摄像头相比后置摄像头分辨率低，且不支持闪光灯。\n- 所有照片基本都必须在手臂长度的距离内拍摄，这让每张照片都带有一种“这是我正在自拍”的独特外观。\n\
    \n富有创意的自拍者通过使用镜子和其他技巧绕过了这些限制，但 iOS 提供了一个更简单的替代方案：延时拍摄。此功能让相机在您轻点快门按钮后等待几秒再拍摄照片。这意味着你的拍照步骤变化如下：\n\
    \n1.  在“相机”应用中，使用“切换相机”图标（如图 7-4 所示）选择后置摄像头。\n\n    ![A429116_1_En_7_Fig4_HTML.jpg](img/A429116_1_En_7_Fig4_HTML.jpg)\n\
    \n    图 7-4.\n\n    使用“相机”应用的“切换相机”按钮选择后置摄像头\n\n2.  轻点“延时拍摄”按钮（如图 7-5 所示），然后轻点你想要设置的延迟秒数：3\
    \ 秒或 10 秒。\n\n    ![A429116_1_En_7_Fig5_HTML.jpg](img/A429116_1_En_7_Fig5_HTML.jpg)\n\
    \n    图 7-5.\n\n    在“相机”应用的菜单栏中，轻点“延时拍摄”图标\n\n3.  放置你的 iOS 设备（例如，放在桌子或椅子上），使其指向你自拍时想要使用的背景。\n\
    \n4.  轻点快门。\n\n5.  在拍摄前进入画面。\n\n请注意，“相机”应用不会只拍一张照片，而是连拍 11 张。若要选择要保留的照片，请轻点左下角的照片缩略图，轻点连拍照片，轻点“选择”，轻点你想要保留的照片，轻点“完成”，然后轻点`仅保留一张喜欢的`。\n\
    \n**提示**  \n`连拍`模式并非仅在拍摄延时照片时可用。你可以在任何想要的时候，通过长按快门按钮来拍摄一组连拍照片。\n\n### 难以拍出笔直的照片\n\
    \n尽管你偶尔会想从一个有趣或刁钻的角度拍照，但大多数时候，照片拍得笔直会看起来效果最好。然而，当你快速或随意拍照时，让照片变直可能是一个挑战。你总可以在拍完照片后再进行校正（请参阅本章后面的“照片不直”一节），但最好从一开始就拍直。\n\
    \n**解决方案**：确保照片笔直的一个有用方法是显示“相机”应用的网格，它会显示两条水平线和两条垂直线，将画面分成九个矩形（即 3x3 网格）。这些线条不会显示在你的照片中，但你可以用它们来确保你的主体在水平和垂直方向上都对齐。请按照以下步骤激活网格：\n\
    \n1.  打开“设置”应用。\n\n2.  轻点“照片与相机”。\n\n3.  将“网格”开关轻点至打开。\n\n**提示**  \n网格对于运用“三分法”构图也很有用。使用三分法时，你将主体放在某条网格线上（或两条网格线的交点上），而不是放在屏幕正中央。\n\
    \n## 照片问题故障排除\n"
- fmt: '### A Photo Has the Wrong Exposure or Similar Light Problems


    Even if you take quite a bit of care setting up and taking your shot, you might
    still end up with a photo that is under- or overexposed, has shadows that are
    too dark or too light, or has poor overall contrast. Of course, most of our shots
    are taken quickly to capture a moment, so these on-the-fly photos are even more
    likely to suffer from light problems.


    **Solution:** The Photos app comes with an `Enhance` feature that can analyze
    a photo and apply several fixes automatically. Here’s how to use it:


    1.  In the Photos app, open the photo you want to fix.  

    2.  Tap the photo to display the controls, if you don’t see them already.  

    3.  Tap `Edit`, shown in Figure [7-6](#A429116_1_En_7_Chapter.html#Fig6). The
    Photos app displays its editing tools.


    ![A429116_1_En_7_Fig6_HTML.jpg](A429116_1_En_7_Fig6_HTML.jpg)


    **Figure 7-6.** In the Photos app’s menu bar, tap `Edit` to load the photo editing
    tools


    4.  Tap `Enhance` (the magic wand icon in the upper-right corner; see Figure [7-7](#A429116_1_En_7_Chapter.html#Fig7)).
    The Photos app adjusts the color and brightness.


    ![A429116_1_En_7_Fig7_HTML.jpg](A429116_1_En_7_Fig7_HTML.jpg)


    **Figure 7-7.** To apply automatic fixes to your photo, tap the `Enhance` icon


    5.  Tap `Done`. The Photos app saves your changes.


    > **Note:** If your photo edits have made the image worse, you can restore the
    original. Tap to display the controls (if needed), tap `Edit`, tap `Revert`, and
    when Photos asks you to confirm, tap `Revert to Original`.


    If the `Enhance` feature didn’t improve your photo, or if you prefer a more detailed
    approach, the Photos app also offers editing tools that can help you solve specific
    problems related to light. It offers seven sliders that you can use to adjust
    the lighting in a photo:


    *   **Brilliance.** Use this slider to adjust the lighting of some parts of the
    photo, particularly by adjusting the lighting of the darker parts of the photo.
    If your photo is well exposed except for the darker parts, increase the brilliance.

    *   **Exposure.** Use this slider to set the overall lighting of the photo. If
    your entire photo is washed out because it’s too light, decrease the exposure
    to get a darker image; if your entire photo is muddy because it’s too dark, increase
    the exposure to get a lighter image.

    *   **Highlights.** Use this slider to adjust how intense the brightest parts
    of the image appear. If your photo has one or more areas that are washed out because
    they’re too bright, reduce the `Highlights` value to counter that effect.

    *   **Shadows.** Use this slider to adjust how intense the darkest parts of the
    image appear. If your photo has one or more areas that show no detail because
    they’re too dark, reduce the `Shadows` value to try and bring back some of that
    detail.

    *   **Brightness.** Use this slider to adjust all the photo’s tones toward white
    or black. Unlike `Brilliance`, which mostly affects the darker parts of the photo,
    `Brightness` affects all the photo’s tones. If your photo is too dark, increase
    the brightness; if your photo is too light, decrease the brightness.

    *   **Contrast.** Use this slider to adjust the distribution of the photo’s tones.
    If the tones in your photo are starkly different, lower the contrast to make them
    more alike; if your photo is bland because the tones are all alike, increase the
    contrast to make the tones stand out.

    *   **Black Point.** Use this slider to set the limit for the blackest part of
    the image. A lower value means even the darkest parts of the image will appear
    gray, while a higher value means more of the photo’s dark patches will appear
    black.


    > **Note:** Depending on your iOS device and the version of iOS on that device,
    you might not see all of these photo editing tools.


    To adjust a photo’s lighting using these tools, follow these steps:


    1.  In the Photos app, open the photo you want to fix.  

    2.  Tap the photo to display the controls, if you don’t see them already.  

    3.  Tap `Edit` (pointed out earlier in Figure [7-6](#A429116_1_En_7_Chapter.html#Fig6)).
    The Photos app displays its editing tools.  

    4.  Tap `Light` (see Figure [7-8](#A429116_1_En_7_Chapter.html#Fig8)).


    ![A429116_1_En_7_Fig8_HTML.jpg](A429116_1_En_7_Fig8_HTML.jpg)


    **Figure 7-8.** To apply specific light fixes to your photo, tap the `Light` icon


    5.  Tap the `Light` list. (In some cases, you might need to first tap the `List`
    icon, which is similar to the icon pointed out in Figure [7-10](#A429116_1_En_7_Chapter.html#Fig10).)
    The Photos app displays the available settings, as shown in Figure [7-9](#A429116_1_En_7_Chapter.html#Fig9).


    ![A429116_1_En_7_Fig10_HTML.jpg](A429116_1_En_7_Fig10_HTML.jpg)


    **Figure 7-10.** Each setting in the `Light` list displays a slider, such as the
    `Exposure` slider shown here


    ![A429116_1_En_7_Fig9_HTML.jpg](A429116_1_En_7_Fig9_HTML.jpg)


    **Figure 7-9.** Tap the `Light` list to see the available light-related adjustments
    you can make to your photo


    6.  Tap the setting you want to adjust. Photos displays a slider for the setting.
    For example, Figure [7-10](#A429116_1_En_7_Chapter.html#Fig10) shows the `Exposure`
    slider.  

    7.  Drag the setting left or right until you get the look you want.  

    8.  Tap the `List` icon (see Figure [7-10](#A429116_1_En_7_Chapter.html#Fig10))
    to return to the `Light` list.  

    9.  Repeat steps 6 to 8 to make other lighting adjustments as needed.  

    10.  Tap `Done`. The Photos app saves your changes.'
