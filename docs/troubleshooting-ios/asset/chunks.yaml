  trans: "\n# 在网页中查找特定信息并非易事\n\n当你在浏览网页时，想要查找特定信息的情况并不少见。此时，与其通读整页来寻找所需内容，不如直接搜索数据来得方便。在桌面版的\
    \ Safari 或任何其他电脑浏览器中，你可以轻松做到这一点，但乍看之下，Safari 应用程序似乎找不到“查找”功能。\n\n**解决方案：** Safari\
    \ 确实提供了这一功能，但你需要知道在哪里找到它：\n\n1.  使用 Safari 应用导航到包含你想要查找信息的网页。\n2.  点击网页标题栏（或向下滑动屏幕）以显示菜单栏，然后点击\
    \ Safari 窗口顶部地址/搜索框的内部。\n3.  输入你想要使用的搜索文本。Safari 会显示网页匹配项，但在这些匹配项的底部还会显示“在此页上（X\
    \ 个匹配项）”，其中 X 是你的搜索文本在网页上出现的次数。\n4.  向上轻扫搜索结果以隐藏键盘。\n5.  点击 `查找“搜索词”`（其中 `搜索词`\
    \ 是你输入的搜索文本）。Safari 会高亮显示搜索词的第一个匹配项。此时，“在此页上”消息会出现在结果屏幕的底部，如图 4-10 所示。\n\n   \
    \ ![A429116_1_En_4_Fig10_HTML.jpg](img/A429116_1_En_4_Fig10_HTML.jpg)\n\n    **图\
    \ 4-10.** “在此页上”消息告诉你当前网页上出现的匹配项数量\n\n6.  点击向下箭头，可以向前循环浏览页面上出现的搜索词实例。请注意，你也可以通过点击向上箭头向后循环浏览结果。此外，当你在最后一个结果出现后点击向下箭头时，Safari\
    \ 会返回到第一个结果。\n7.  完成搜索后，点击 `完成`。\n\n## 你想使用语音命令搜索网络\n\n你可以使用 Safari 直接在搜索框中输入搜索查询，或通过导航到搜索引擎网站来输入。然而，如今由于\
    \ Siri 应用的语音识别能力，输入似乎突然变成了一种过时的消遣。那么，当你可以直接告诉 Siri 你要找什么的时候，为什么还要输入搜索查询呢？\n\n\
    **解决方案：** 按住 `主屏幕` 按钮（或按住设备耳机上的 `麦克风` 按钮，或蓝牙耳机上的等效按钮）来启动 Siri。以下是一些使用 Siri 进行网络搜索的通用技巧：\n\
    \n- **搜索整个网络。** 说“搜索网络查找 `主题`”，其中 `主题` 是你的搜索条件。\n- **搜索维基百科。** 说“搜索维基百科查找 `主题`”，其中\
    \ `主题` 是你想要查询的条目。\n- **使用特定搜索引擎搜索。** 说“`引擎 主题`”，其中 `引擎` 是搜索引擎的名称，例如 Google 或 Bing（但由于某种原因，不包括\
    \ DuckDuckGo），而 `主题` 是你的搜索条件。\n\nSiri 还能理解与其通过 Yelp 合作相关的、用于搜索商家和餐厅的命令。要使用 Siri\
    \ 查找商家和餐厅，通常使用以下通用语法（当然，和 Siri 打交道时，不必过于拘泥于此）：\n\n“查找（或寻找）`某物` `某处`。”\n\n在这里，`某物`\
    \ 部分可以是商家名称（例如“星巴克”）、商家类型（例如“加油站”）、餐厅类型（例如“泰国餐厅”）或通用产品（例如“咖啡”）。`某处` 部分可以是相对于你当前位置的某个地点（例如“附近”或“我周围”或“步行可达”）或一个具体位置（例如“在印第安纳波利斯”或“在宽河区”）。以下是一些示例：\n\
    \n- “查找步行可达的加油站。”\n- “寻找印第安纳波利斯的披萨餐厅。”\n- “在附近找咖啡。”\n- “在我周围找一家杂货店。”\n\n另外请注意，如果你在命令的\
    \ `某物` 部分之前添加一个限定词，例如“好的”或“最好的”，Siri 会按照 Yelp 评分排序返回结果。\n\n# 解决电子邮件故障\n\n如今，我们拥有数量惊人的沟通方式：短信、SnapChat、视频通话、Facebook\
    \ 消息、Twitter 私信等等。毫不奇怪，这些新颖的（或多或少）通信技术获得了所有的报道和赞誉。但说到日常的、基础的沟通，我们大多数人还是会依赖老牌且好用的电子邮件。它不性感，几十年来也没怎么改变，而且开发者给邮件客户端添加的任何花哨功能通常都被忽略了。电子邮件就是能完成任务。\n\
    \n或者，我应该说，电子邮件通常能完成任务。和任何技术一样，电子邮件也少不了各种各样的小毛病和漏洞，因此你可能会发现使用 iOS 的“邮件”应用发送或接收电子邮件时遇到麻烦。好消息是，大多数这些问题都容易解决，你通常可以很快让“邮件”恢复正常工作。为了帮助你做到这一点，本章汇集了最常见的电子邮件抱怨及其解决方案。\n\
    \n## 发送电子邮件故障排除\n\n### 发送邮件时“邮件”使用了错误的账户\n\n当你添加了多个电子邮件账户时，在发送新邮件时，“邮件”应用如何决定使用哪一个？它会指定其中一个账户——具体来说，是你添加到“邮件”应用的第一个账户——作为默认账户，然后每次你撰写新邮件时，它都会自动使用该地址作为发件账户。当您通过电子邮件共享链接、照片或地图等内容时，它也会使用该地址作为默认的发件账户。\n\
    \n**注意：** 当你回复或转发邮件时，“邮件”不会自动使用默认账户。在这些情况下，“邮件”会将回复或转发配置为从原始邮件发送到的账户发出。\n\n如果默认账户正是你想要用来发送邮件的账户，那么这个行为就不是问题，但你可能会更倾向于使用你的其他账户之一。\n\
    \n**解决方案：** 首先，请注意，你不必局限于为每封邮件都使用默认账户。如果你在发送邮件时需要改用其他账户，请按以下步骤操作：\n\n1.  在“邮件”应用中，开始一封新邮件。\n\
    2.  在新邮件屏幕上，点击“`抄送/密送，发件人`”行。\n3.  点击“`发件人`”行。“邮件”会显示可用的电子邮件地址列表，如图 5-1 所示。\n\n\
    \    ![A429116_1_En_5_Fig1_HTML.jpg](img/A429116_1_En_5_Fig1_HTML.jpg)\n\n   \
    \ **图 5-1.** 你可以使用“发件人”列表选择不同的发送地址\n\n4.  点击你想用来发送邮件的地址。\n\n如果你只是偶尔需要使用这种技巧，那么按需更换发送账户效果不错，但你肯定不希望每次发送邮件时都重复这个操作。如果你有一个特别偏好的账户，希望全部或大部分时间都使用它来发送邮件，那么你需要将该账户设置为默认账户。请按以下步骤操作：\n\
    \n1.  在主屏幕上，点击 `设置`。设置应用随即打开。\n2.  点击 `邮件` 以打开邮件屏幕。iOS 会显示邮件屏幕。\n3.  在邮件部分的底部附近，点击\
    \ `默认账户`。这将打开默认账户屏幕，其中显示你的账户列表。当前默认账户旁边会显示一个勾选标记。\n4.  点击你想设置为默认账户的账户。iOS 会在该账户旁边放置一个勾选标记，如图\
    \ 5-2 所示。\n\n    ![A429116_1_En_5_Fig2_HTML.jpg](img/A429116_1_En_5_Fig2_HTML.jpg)\n\
    \n    **图 5-2.** 在默认账户屏幕中，点击你希望“邮件”用作发送邮件的默认账户\n"
- fmt: "### 你想阻止某个账户接收电子邮件\n\n你可能希望`Mail`暂时阻止某个特定账户接收电子邮件的原因有很多：\n\n- `Mail`应用会按固定间隔检查新邮件，因此，如果你在`Mail`中配置了多个账户，这种不断的检查会严重消耗设备电池。通过阻止一个或多个账户接收邮件，可以减少这种消耗。\n\
    - 某个账户可能会在短时间内收到大量邮件。与其浪费时间和资源在设备上接收所有这些邮件，你可能更希望阻止它们在`iOS`中被接收，然后在常规的邮件客户端中处理它们。\n\
    - 某个账户可能会收到一封或多封非常大的邮件。与其让设备承受这些“庞然大物”，你可能更希望阻止它们被下载，以便你能更轻松地使用桌面或网页邮件客户端处理这些邮件。\n\
    \n或者，你可能希望永远不让某个特定账户接收电子邮件，但仍然希望使用该账户的其他数据，例如日历或联系人。\n\n注意\n\n仅对以下账户类型可以关闭邮件接收功能，同时保留日历和联系人等其他类型的数据：`iCloud`、`Exchange`、`Google`、`Yahoo!`、`AOL`和`Outlook.com`。你不能对`POP`（邮局协议）或`IMAP`（互联网消息访问协议）账户执行此操作。\n\
    \n解决方案：首先，我假设你仍然想保留该账户。也就是说，你要么想临时停止接收特定账户的邮件，要么想永久停止接收邮件但仍然接收其他数据。如果这两种情况都不是，那么你可能想删除该账户，如下一节所述。否则，您需要禁用该账户的邮件接收功能。操作方法如下：\n\
    \n1.  在“主屏幕”上，点击“设置”以打开“设置”应用。\n2.  点击“邮件”以打开“邮件”屏幕。\n3.  点击你想要禁用的账户。`iOS`会显示该账户的设置。\n\
    4.  根据账户类型，使用以下方法之一临时禁用该账户：\n    - 对于`iCloud`、`Exchange`、`Google`、`Yahoo!`、`AOL`或`Outlook.com`账户，将“邮件”开关点击为“关闭”，如图[5-3](#A429116_1_En_5_Chapter.html#Fig3)所示。\n\
    \n        ![A429116_1_En_5_Fig3_HTML.jpg](A429116_1_En_5_Fig3_HTML.jpg)\n\n  \
    \      图 5-3.\n        对于`iCloud`、`Exchange`、`Google`、`Yahoo!`、`AOL`或`Outlook.com`账户，将“邮件”开关点击为“关闭”\n\
    \    - 对于`POP`或`IMAP`账户，将“账户”开关点击为“关闭”。\n\n当你准备再次使用该账户时，重复这些步骤，将“邮件”开关或“账户”开关重新点击为“开启”。\n\
    \n### 你不再需要某个账户\n\n一个你不再使用的电子邮件账户会弄乱你的“邮件收件箱”，占用存储空间，并因不断检查新邮件而浪费电池电量。\n\n解决方案：如果你不再使用某个电子邮件账户，则应将其删除。这将从`Mail`中移除该账户及其邮件，释放一些存储空间，加快同步时间，并节省电池电量。\n\
    \n注意\n\n如果你发现即使尝试了本章中的故障排除步骤后，仍无法使用特定账户发送电子邮件，那么一种通常有效的方法是删除该账户，然后重新添加。\n\n按照以下步骤删除账户：\n\
    \n1.  打开“设置”应用。\n2.  点击“邮件”以打开“邮件”屏幕。\n3.  点击你想要删除的账户。这将打开该账户的设置。\n4.  在屏幕底部，点击“删除账户”。`iOS`会要求你确认。\n\
    5.  点击“删除”，如图[5-4](#A429116_1_En_5_Chapter.html#Fig4)所示。`iOS`会移除该账户。\n\n    ![A429116_1_En_5_Fig4_HTML.jpg](A429116_1_En_5_Fig4_HTML.jpg)\n\
    \n    图 5-4.\n    点击该账户，然后点击“删除账户”，将其从`Mail`中移除\n\n### 你想保存一封未完成的电子邮件\n\n如果你在电脑上撰写一封邮件，并决定稍后处理，你的邮件程序会将该邮件存储为草稿，你可以随时重新打开。`Mail`应用似乎没有这个选项，那么如何保存一封未完成的邮件呢？\n\
    \n解决方案：`Mail`应用似乎不提供保存邮件草稿的选项，但它确实有，尽管方式非常不直观。在邮件窗口中，点击“取消”，然后点击“存储草稿”（见图[5-5](#A429116_1_En_5_Chapter.html#Fig5)）。当你准备继续编辑时，在“邮箱”屏幕中打开该账户，点击“草稿”，然后点击你保存的邮件。\n\
    \n![A429116_1_En_5_Fig5_HTML.jpg](A429116_1_En_5_Fig5_HTML.jpg)\n\n图 5-5.\n要保存一封未完成的邮件，请点击“取消”，然后点击“存储草稿”\n\
    \n### 排查使用第三方账户时的外发电子邮件问题\n\n出于安全原因，一些互联网服务提供商（`ISP`）要求其所有客户的出站邮件必须通过该`ISP`的`SMTP`（简单邮件传输协议）服务器进行路由。如果你使用的是由`ISP`维护的电子邮件账户，这通常不是什么大问题，但如果你使用的是由第三方（例如你的网站主机）提供的账户，则可能导致以下问题：\n\
    \n- 你的`ISP`可能会阻止使用第三方账户发送的邮件，因为它认为你试图通过`ISP`的服务器中继邮件（这是垃圾邮件发送者常用的技术）。\n- 如果你的`ISP`每月只允许一定量的`SMTP`带宽或一定数量的已发送邮件，而第三方账户提供了更高的限制或完全没有限制，你可能会产生额外费用。\n\
    - 你可能会遇到性能问题，`ISP`路由邮件所需的时间比第三方主机长得多。\n\n解决方案：为了解决这些问题，许多第三方主机提供通过标准端口`25`以外的端口访问其`SMTP`服务器的权限。例如，`iCloud`的`SMTP`服务器（`smtp.icloud.com`）也接受端口`465`和`587`上的连接。请咨询你的邮件托管提供商，了解他们支持哪个（或哪些）端口。\n\
    \n以下是配置电子邮件账户以使用非标准SMTP端口的方法：\n\n1.  在“主屏幕”上，点击“设置”。你会看到“设置”应用。\n2.  点击“邮件”。出现“邮件”设置屏幕。\n\
    3.  点击你想要配置的`POP`账户。出现该账户的设置屏幕。\n4.  在屏幕底部附近，点击`SMTP`。`iOS`会显示`SMTP`屏幕。\n5.  在“主服务器”部分，点击该服务器。`iOS`会显示服务器设置。\n\
    6.  在“外发邮件服务器”部分，点击“服务器端口”，然后输入端口号。\n7.  点击“完成”。\n\n注意\n\n你可能还会发现通过蜂窝网络连接发送邮件时遇到问题。要了解如何排查该问题，请参阅第[2](#A429116_1_En_2_Chapter.html)章的“你可以通过Wi-Fi发送电子邮件，但无法通过蜂窝网络发送”部分。"
  raw: "### You Want to Prevent an Account from Receiving Email\n\nThere are many\
    \ reasons why you might want Mail to prevent a particular account from receiving\
    \ email temporarily:\n\n*   The Mail app checks for new messages at a regular\
    \ interval, so if you have several accounts configured in Mail, this incessant\
    \ checking can put quite a strain on your device battery. By preventing one or\
    \ more accounts from receiving messages, you reduce that strain.\n*   An account\
    \ might receive a large number of messages in a short time. Rather than wasting\
    \ time and resources receiving all those messages on your device, you might prefer\
    \ to prevent them from being received in iOS and then handle them in your regular\
    \ email client.\n*   An account might receive one or more very large messages.\
    \ Rather than subjecting your device to these behemoths, you might want to prevent\
    \ them from being downloaded so you can process the messages more easily using\
    \ your desktop or web email client.\n\nAlternatively, you might want to never\
    \ receive email on a particular account, but you still might want to work with\
    \ that account’s other data, such as its calendars or contacts.\n\nNote\n\nTurning\
    \ off email while still retaining other types of data such as calendars and contacts\
    \ only works for the following account types: iCloud, Exchange, Google, Yahoo!,\
    \ AOL, and Outlook.com. You can’t do this with POP (Post Office Protocol) or IMAP\
    \ (Internet Message Access Protocol) accounts.\n\nSolution: First, I assume you\
    \ still want to keep the account. That is, you either want to stop receiving messages\
    \ on a particularly account temporarily, or you want to stop receiving email permanently\
    \ but still want to receive other data. If neither of these is the case, then\
    \ you probably want to delete the account, as described in the next section. Otherwise,\
    \ you want to disable the account’s email receiving capability. Here’s how you\
    \ do it:\n\n1.  On the Home screen, tap Settings to open the Settings app.  \n\
    2.  Tap Mail to open the Mail screen.  \n3.  Tap the account you want to disable.\
    \ iOS displays the account’s settings.  \n4.  Depending on the type of account,\
    \ use one of the following techniques to temporarily disable the account:\n  \
    \  *   For an iCloud, Exchange, Google, Yahoo!, AOL, or Outlook.com account, tap\
    \ the Mail switch to Off, as shown in Figure [5-3](#A429116_1_En_5_Chapter.html#Fig3).\n\
    \n        ![A429116_1_En_5_Fig3_HTML.jpg](A429116_1_En_5_Fig3_HTML.jpg)\n\n  \
    \      Figure 5-3.\n\n        For an iCloud, Exchange, Google, Yahoo!, AOL, or\
    \ Outlook.com account, tap the Mail switch to Off\n    *   For a POP or IMAP account,\
    \ tap the Account switch to Off. \n\nWhen you’re ready to work with the account\
    \ again, repeat these steps to tap the Mail switch or the Account switch back\
    \ to On.\n\n### You No Longer Need an Account\n\nAn email account you no longer\
    \ use is cluttering your Mail Inbox, taking up storage space, and wasting battery\
    \ power with constant checks for new messages.\n\nSolution: If don’t use an email\
    \ account any longer, you should delete it. This will remove the account and its\
    \ messages from Mail, free up some storage space, speed up sync times, and save\
    \ battery power.\n\nNote\n\nIf you find that you can’t send email using a particular\
    \ account, even after trying the troubleshooting steps found throughout this chapter,\
    \ then one technique that often works is to delete the account and then add it\
    \ back again.\n\nFollow these steps to delete an account:\n\n1.  Open the Settings\
    \ app.  \n2.  Tap Mail to open the Mail screen.  \n3.  Tap the account you want\
    \ to delete. This opens the account’s settings.  \n4.  At the bottom of the screen,\
    \ tap Delete Account. iOS asks you to confirm.  \n5.  Tap Delete, as shown in\
    \ Figure [5-4](#A429116_1_En_5_Chapter.html#Fig4). iOS removes the account.\n\n\
    \    ![A429116_1_En_5_Fig4_HTML.jpg](A429116_1_En_5_Fig4_HTML.jpg)\n\n    Figure\
    \ 5-4.\n\n    Tap the account and then tap Delete Account to remove it from Mail\n\
    \n### You Want to Save an Unfinished Email Message\n\nIf you’re composing a message\
    \ on your computer and decide to work on it later, your mail program stores the\
    \ message as a draft that you can reopen any time. The Mail app doesn’t appear\
    \ to have that option, so how can you save an unfinished message?\n\nSolution:\
    \ The Mail app doesn’t appear to offer the option of saving a draft of a message,\
    \ but it does, albeit in a very unintuitive way. In the message window, tap Cancel\
    \ and then tap Save Draft (see Figure [5-5](#A429116_1_En_5_Chapter.html#Fig5)).\
    \ When you’re ready to resume editing, open the account in the Mailboxes screen,\
    \ tap Drafts, and then tap your saved message.\n\n![A429116_1_En_5_Fig5_HTML.jpg](A429116_1_En_5_Fig5_HTML.jpg)\n\
    \nFigure 5-5.\n\nTo save an unfinished message, tap Cancel and then tap Save Draft\n\
    \n### Troubleshooting Outgoing Email Problems When Using a Third-Party Account\n\
    \nFor security reasons, some Internet service providers (ISPs) insist that all\
    \ their customers’ outgoing mail must be routed through the ISP’s SMTP (Simple\
    \ Mail Transport Protocol) server. This usually isn’t a big deal if you’re using\
    \ an email account maintained by the ISP, but it can lead to the following problems\
    \ if you are using an account provided by a third party (such as your website\
    \ host):\n\n*   Your ISP might block messages sent using the third-party account\
    \ because it thinks you’re trying to relay the message through the ISP’s server\
    \ (a technique often used by spammers).\n*   You might incur extra charges if\
    \ your ISP allows only a certain amount of SMTP bandwidth per month or a certain\
    \ number of sent messages, whereas the third-party account offers higher limits\
    \ or no restrictions at all.\n*   You might have performance problems, with the\
    \ ISP taking much longer to route messages than the third-party host.\n\nSolution:\
    \ To work around these problems, many third-party hosts offer access to their\
    \ SMTP server via a port other than the standard port 25\\. For example, the iCloud\
    \ SMTP server (smtp.icloud.com) also accepts connections on ports 465 and 587.\
    \ Ask your mail hosting provider which port (or ports) they support.\n\nHere’s\
    \ how to configure an email account to use a nonstandard SMTP port:\n\n1.  On\
    \ the Home screen, tap Settings. You see the Settings app.  \n2.  Tap Mail. The\
    \ Mail settings screen appears.  \n3.  Tap the POP account you want to configure.\
    \ The account’s settings screen appears.  \n4.  Near the bottom of the screen,\
    \ tap SMTP. iOS displays the SMTP screen.  \n5.  In the Primary Server section,\
    \ tap the server. iOS displays the server settings.  \n6.  In the Outgoing Mail\
    \ Server section, tap Server Port and then type the port number.  \n7.  Tap Done.\
    \  \n\nNote\n\nYou might also find you have trouble sending email over a cellular\
    \ connection. To learn how to troubleshoot that problem, see Chapter [2](#A429116_1_En_2_Chapter.html)’s\
    \ “You Can send Email Over Wi-Fi But Not Over Cellular” section."
