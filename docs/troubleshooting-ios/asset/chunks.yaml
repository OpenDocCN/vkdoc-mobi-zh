    \  \n4.  Tap the Call Forwarding switch to On. Your iPhone displays the Forward\
    \ To screen.  \n5.  Tap the phone number to use for the forwarded calls.  \n6.\
    \  Tap Back to return to the Call Forwarding screen. Figure [6-7](#A429116_1_En_6_Chapter.html#Fig7)\
