- fmt: '### You Can''t Unlock Your iOS Device Using Your Fingerprint


    Using `Touch ID` to unlock your iOS device is a major convenience, particularly
    if you''d otherwise have to enter a custom numeric or alphanumeric passcode that''s
    fairly long. However, that convenience goes out the window if your iOS devices
    refuses to unlock when you apply your finger to the Home button.


    **Solution:** There are a number of reasons why you can''t unlock your iOS device
    using your fingerprint:

    - If your device is running iOS 10, remember that you might have to unlock the
    device by pressing the Home button with the digit that you saved as a fingerprint.
    On some devices, and in earlier versions of iOS, you unlocked the device by resting
    that finger on the Home button.

    - `Touch ID` does not work if you''ve just restarted your device or if you haven''t
    unlocked the device in the last 48 hours. In these cases, iOS forces you to use
    your passcode to unlock the device. iOS also insists on a passcode if your fingerprint
    isn''t recognized after five consecutive tries.

    - Make sure you''re using a digit that has been added to iOS as a `Touch ID` fingerprint.
    It''s not unusual for people to add, say, a right thumb or forefinger and then
    try to unlock the device using the left thumb or forefinger.

    - Make sure your finger completely covers the Home button.

    - Do not move your finger while it''s on the Home button.

    - Make sure your finger is clean and dry.

    - `Touch ID` will sometimes fail if your finger is very cold, so try warming up
    the finger.

    - Make sure your finger doesn''t have any cuts or swelling.

    - If you have recently been swimming or in the shower, your finger might have
    absorbed enough water to change its print (resulting in so-called raisin fingers).
    In this case, you have no choice but to wait until the fingerprint returns to
    its normal state.

    - Use a soft cloth to clean the Home button.

    - Make sure a case or other protective covering isn''t obscuring part of the Home
    button.

    - Make sure iOS is configured to unlock the device using a fingerprint. Run the
    `Settings` app, tap `Touch ID & Passcode`, then type your passcode to open the
    `Touch ID & Passcode` screen. Make sure the `Device Unlock` switch (where `Device`
    is `iPhone` or `iPad`) is set to `On`, as shown in Figure [8-6](#A429116_1_En_8_Chapter.html#Fig6).


    ![A429116_1_En_8_Fig6_HTML.jpg](A429116_1_En_8_Fig6_HTML.jpg)


    **Figure 8-6.** To unlock your device using a saved fingerprint, make sure the
    `Device Unlock` switch is `On`


    If none of these solutions work for you, then you should delete all your fingerprints
    and add them again. Follow these steps to delete fingerprints:

    1. On the Home screen, tap `Settings`. The `Settings` app appears.

    2. Tap `Touch ID & Passcode` and then type your passcode to open the `Touch ID
    & Passcode` screen.

    3. Tap the fingerprint you want to remove.

    4. Tap `Delete Fingerprint`. iOS deletes the fingerprint and returns you to the
    `Touch ID & Passcode` screen.

    5. Repeat steps 3 and 4 to remove all your fingerprints.


    **Tip:** An easier way to delete a fingerprint is to follow steps 1 and 2, swipe
    left on the fingerprint, and then tap the `Delete` button that appears.


    ### You Don''t Want to Forget Which Fingerprint You''ve Configured for Touch ID


    If you don''t use `Touch ID` that often, it''s possible that you might forget
    which finger or fingers you''ve added as fingerprints in iOS.


    **Solution:** To help you remember, you can provide a descriptive name for each
    fingerprint (such as `"Right thumb"` or `"Left forefinger"`). Here''s how you
    do this:

    1. On the Home screen, tap `Settings`. The `Settings` app appears.

    2. Tap `Touch ID & Passcode` and then type your passcode to open the `Touch ID
    & Passcode` screen.

    3. Tap a saved fingerprint (which will have a generic name such as `"Finger 1"`).
    **Tip:** If iOS has given your fingerprints generic names such as `"Finger 1"`
    and `"Finger 2"`, how do you know which is which? With the `Touch ID & Passcode`
    screen displayed, rest a finger on the Home button. If iOS recognizes that finger,
    it highlights the corresponding fingerprint name.

    4. Type a new name for the fingerprint, as shown in Figure [8-7](#A429116_1_En_8_Chapter.html#Fig7)
    and then tap `Done`.


    ![A429116_1_En_8_Fig7_HTML.jpg](A429116_1_En_8_Fig7_HTML.jpg)


    **Figure 8-7.** To help you remember which digits you''ve added as fingerprints,
    supply each fingerprint with a descriptive name

    5. Repeat steps 3 and 4 for each saved fingerprint.


    ### You Want to Configure Your Device to Lock Automatically


    You can lock your iOS device at any time by pressing the `Sleep/Wake` button once.
    However, if your iOS device is on but you''re not using it, it automatically goes
    into standby mode after two minutes. This is called `Auto-Lock` and it''s a handy
    feature because it saves battery power (and prevents accidental taps) when your
    iOS device is just sitting there. It''s also a crucial feature if you''ve protected
    your iOS device with a passcode or fingerprint lock, as I describe earlier, because
    if your iOS device is never locked, then these security features are useless.
    You might find, however, that your iOS device does not lock itself automatically
    after a period of inactivity.


    **Solution:** To make sure your iOS device locks automatically, you must configure
    the `Auto-Lock` feature to shut off the device after a specified period of inactivity.
    Here are the steps to follow:

    1. On the Home screen, tap `Settings`. The `Settings` app appears.

    2. In iOS 10, tap `Display & Brightness`. In earlier versions of iOS, tap `General`.

    3. Tap `Auto-Lock`. The `Auto-Lock` screen appears.

    4. Tap the interval you want to use. Note that the available options depend on
    your device. Figure [8-8](#A429116_1_En_8_Chapter.html#Fig8) shows the options
    available for the iPhone: 30 seconds, 1 Minute, 2 Minutes, 3 Minutes, 4 Minutes,
    or 5 Minutes.


    ![A429116_1_En_8_Fig8_HTML.jpg](A429116_1_En_8_Fig8_HTML.jpg)


    **Figure 8-8.** To ensure your passcode and/or fingerprint lock can do their jobs,
    use `Auto-Lock` to automatically lock your device after it has been inactive for
    the specified time


    ## Backing Up Your Device


    If something bad happens to your iOS device – for example, it crashes and will
    no longer start normally, it gets damaged or lost, or you forget your passcode
    – you can get back on your feet by restoring the device''s default settings (as
    described in Chapter [1](#A429116_1_En_1_Chapter.html)). What about all that data
    you''ve stored on your device? To restore that, you need to have a backup available,
    either on your computer or on iCloud.


    ### You Want to Back Up Your Device without Syncing


    When you sync your iOS device with your computer, iTunes automatically creates
    a backup of your current iOS device data before performing the sync. Note, however,
    that iTunes doesn''t back up your entire iOS device, which makes sense because
    most of what''s on your device – music, photos, videos, apps, and so on – is already
    on your computer. Instead, iTunes backs up only data unique to the iOS device,
    including your call history, text messages, web clips, network settings, app settings
    and data, and Safari history and cookies.


    However, if you''ve configured iTunes not to sync your iOS device automatically,
    you might want to back up your iOS device without performing a sync.


    **Solution:** Follow these steps to back up your iOS device using iTunes:

    1. Connect your iOS device to your computer.

    2. Open iTunes, if it doesn''t launch automatically.

    3. If your iOS device asks whether you trust this computer, tap `Trust` and, on
    your computer, click `Continue`.

    4. In the Devices list, click your iOS device.

    5. Click the `Summary` tab.

    6. Click `Back Up Now`, as shown in Figure [8-9](#A429116_1_En_8_Chapter.html#Fig9).
    iTunes backs up the iOS device data.


    ![A429116_1_En_8_Fig9_HTML.jpg](A429116_1_En_8_Fig9_HTML.jpg)


    **Figure 8-9.** In iTunes, click your connected iOS device, click the `Summary`
    tab, and then click `Back Up Now`'
