  trans: "\n# 照片中包含你想去除的元素\n\n在拍照取景时，你可能会尽量避开某些会破坏最终画面的元素，例如灯柱或栅栏顶部。即便你费尽心思，照片中仍然难免出现不想要的画面部分。\n\
    \n**解决方法：** 当照片中包含你不需要或不希望看到的元素时，通常可以将其裁切掉。这称为裁剪，你可以使用“照片”应用来完成。裁剪照片时，你需要指定一个矩形区域作为保留部分，“照片”应用会自动舍弃矩形外的所有内容。对于移除照片边缘或边缘附近的冗余元素，裁剪是一项非常有用的技能，同时你也能借此突出照片的真正主体。\n\
    \n请按照以下步骤裁剪照片：\n\n1.  在“照片”应用中，打开需要裁剪的照片。\n2.  如果尚未显示控制项，请轻点照片以将其调出。\n3.  轻点“编辑”（此前已在图\
    \ 7-6 中标注）。“照片”应用将显示其编辑工具。\n4.  轻点“裁剪与校正”（如图 7-14 所示）。“照片”应用会显示用于裁剪的网格，如图 7-15\
    \ 所示。\n\n    ![A429116_1_En_7_Fig15_HTML.jpg](img/A429116_1_En_7_Fig15_HTML.jpg)\n\
    \n    图 7-15.\n    轻点并拖动角落以裁剪照片\n\n    ![A429116_1_En_7_Fig14_HTML.jpg](img/A429116_1_En_7_Fig14_HTML.jpg)\n\
    \n    图 7-14.\n    轻点“裁剪与校正”图标以显示“照片”应用的裁剪工具\n5.  轻点并拖动网格的一角来设定要保留的区域。\n6.  轻点“完成”。“照片”应用会将修改应用到照片上。\n\
    \n**提示**\n\n对某些照片进行裁剪的最快方法是直接告诉“照片”应用你希望最终照片的尺寸。轻点“比例”（如图 7-14 中标注），然后轻点一个具体的形状（“原始”或“正方形”）或具体的宽高比，例如\
    \ 5:7 或 4:5。接着拖动照片（而不是网格！），使得你要保留的部分位于网格内。\n\n# 照片不水平\n\n你可能从惨痛的经验中得知，用 iPhone\
    \ 相机拍摄出完全水平的照片非常困难。这需要大量的练习和稳定的双手。（你也可以激活相机应用的网格功能；请参阅章节“你很难拍出水平的照片”。）即使你尽了最大努力，最终得到的照片仍可能不太水平。\n\
    \n**解决方法：** 你可以使用“照片”应用将照片顺时针或逆时针旋转，直到主体看起来是水平的。请按照以下步骤裁剪并校正照片：\n\n1.  在“照片”应用中，打开需要校正的照片。\n\
    2.  如果尚未显示控制项，请轻点照片以将其调出。\n3.  轻点“编辑”（此前已在图 7-6 中标注）。“照片”应用将显示其编辑工具。\n4.  轻点“裁剪与校正”（见图\
    \ 7-14）。“照片”应用会显示校正工具（带有角度标记的弧形；见图 7-15）。\n5.  向左或向右拖动校正工具，直到照片水平。\n6.  轻点“完成”。“照片”应用会将修改应用到照片上。\n\
    \n**注意**\n\n“裁剪与校正”功能还可以让你将照片旋转 90 度，例如从竖屏方向旋转为横屏方向。为此，请轻点“旋转”图标（见图 7-14），直到照片达到你想要的朝向。\n\
    \n# 8. 保护你的设备\n\niPhone 自 2007 年问世，iPad 自 2010 年问世以来，这些设备已成为许多人生活中不可或缺的一部分。这种不可或缺性来自于这些设备的多功能性。在典型的一天里，你可能会用\
    \ iOS 设备浏览网页、收发电子邮件和短信、拨打电话、管理联系人和日历、听音乐、玩游戏、查看天气或股市，以及处理其它大大小小的事务。然而，这种无比强大的功能和便利性也是有代价的：你的\
    \ iOS 设备上存储了大量关于你的信息。诚然，这些数据大多可能微不足道或转瞬即逝，但其中许多是私密且敏感的。丢失 iOS 设备会造成极大的不便，但他人获取你的信息则可能导致大问题。所以，没错，保护\
    \ iOS 设备的概念听起来可能不像一个故障排除话题。但采取措施确保设备丢失后能够找到它，并确保设备丢失期间无人能查看或篡改你的信息，可被视为一种预防性维护。而防患于未然正是最好的故障排除方式。\n\
    \n## 锁定你的设备\n\n当 iOS 设备处于睡眠状态时，即使轻触屏幕或按音量键也不会产生任何反应，此时设备处于锁定状态。这种合理的安排可以防止手机放在口袋里，或在背包或手提包里晃动时意外触碰。要解锁设备，你可以按两次主屏幕按钮，或者按一次睡眠/唤醒按钮，然后再按主屏幕按钮。就这么简单，你便能继续使用了。\n\
    \n不幸的是，这个简单的方法意味着任何拿到你 iOS 设备的人也能迅速恢复使用——使用你的设备！如果你的设备上有敏感或机密信息，或者想避免因数字漫游而产生巨额费用，你需要真正锁定你的\
    \ iOS 设备。\n\n### 你想用密码锁定设备\n\n就像你用密码“锁定”用户账户和众多在线账户一样，你可能也希望用类似的方式来锁定 iOS 设备。\n\
    \n**解决方法：** 你可以通过设置密码来实现，任何人在使用设备前都必须输入该密码。iOS 的默认设置是六位数字密码，但你可以将其改为简单的四位数字密码，或者更长、更复杂、使用数字、字母和符号任意组合的自定义密码。\n\
    \n请按照以下步骤设置密码：\n\n1.  在主屏幕上，轻点“设置”。系统将显示“设置”应用。\n2.  轻点“触控 ID 与密码”以打开“触控 ID 与密码”屏幕。如果您的\
    \ iOS 设备不支持触控 ID，则轻点“密码”以打开“密码锁定”屏幕。\n3.  轻点“开启密码”。系统将显示“设置密码”屏幕。\n4.  如果你希望使用六位数字密码以外的密码，请轻点“密码选项”，然后轻点你想要使用的密码类型（见图\
    \ 8-1）。\n\n    ![A429116_1_En_8_Fig1_HTML.jpg](img/A429116_1_En_8_Fig1_HTML.jpg)\n\
    \n    图 8-1.\n    iOS 为你提供了几种密码类型选项\n5.  输入你的密码。出于安全考虑，字符在密码框中会显示为圆点。\n6.  如果你在输入自定义密码，请轻点“下一步”。你的\
    \ iOS 设备会提示你重新输入密码。\n7.  再次输入你的密码。\n8.  如果你在输入自定义密码，请轻点“完成”。\n\n**注意**\n\n你必须牢牢记住\
    \ iOS 设备的密码。如果忘记，你将被自己的设备拒之门外。重新访问设备的唯一方法是使用 iTunes 通过现有备份来恢复 iOS 设备的数据和设置（如第\
    \ 1 章所述）。\n"
- fmt: '### You Want to Guarantee That Your Data Won''t Fall into Malicious Hands


    If your iOS device falls into another person''s hands, your passcode will prevent
    that person from accessing your data and apps. You might be wondering what happens
    when that person tries guessing the password:


    - After a seventh failed attempt, `iOS` locks the device for five minutes.

    - After an eighth failed attempt, `iOS` locks the device for fifteen minutes.

    - After a ninth failed attempt, `iOS` locks the device for one hour.

    - After a tenth failed attempt, `iOS` locks the device completely and you must
    sync with `iTunes` to restore your data.


    - After six failed passcodes, `iOS` locks the device — that is, prevents any further
    passcode attempts — for one minute, as shown in Figure [8-2](A429116_1_En_8_Chapter.html#Fig2).


    ![A429116_1_En_8_Fig2_HTML.jpg](A429116_1_En_8_Fig2_HTML.jpg)


    Figure 8-2. After a person tries to guess your passcode six times incorrectly,
    iOS prevents further attempts for one minute


    If your device contains extremely sensitive or private data, you might be concerned
    that someone could still somehow access the data.


    **Solution:** You can configure your iOS device to not only lock completely after
    the tenth failed passcode attempt, but also to erase all of its data. Here''s
    how to set this up:


    1. On the Home screen, tap `Settings`. The `Settings` app appears.

    2. Tap `Touch ID & Passcode`. If your iOS device doesn''t support `Touch ID`,
    tap `Passcode`, instead. `iOS` prompts you to enter your passcode.

    3. Type your passcode and, if you''re using a custom passcode, tap `Done`.

    4. Tap the `Erase Data` switch to `On`. `iOS` asks you to confirm that you want
    to enable this feature.

    5. Tap `Enable`. `iOS` enables `Erase Data`, as shown in Figure [8-3](A429116_1_En_8_Chapter.html#Fig3).


    ![A429116_1_En_8_Fig3_HTML.jpg](A429116_1_En_8_Fig3_HTML.jpg)


    Figure 8-3. With `Erase Data` enabled, your iOS device automatically erases all
    of its data after it detects ten consecutive failed passcodes


    ### You Need to Make an Emergency Call While Your iPhone Is Locked


    If an emergency arises and you need to make a call for help, you probably don''t
    want to mess around with entering a passcode. Similarly, if something happens
    to you, another person who doesn''t know your passcode may need to use your iPhone
    device to call for assistance.


    **Solution:** In both cases, you can temporarily bypass the passcode by tapping
    the `Emergency` button on the `Enter Passcode` screen, shown in Figure [8-4](A429116_1_En_8_Chapter.html#Fig4).


    ![A429116_1_En_8_Fig4_HTML.jpg](A429116_1_En_8_Fig4_HTML.jpg)


    Figure 8-4. In the `Enter Passcode` screen, you can tap `Emergency` to make an
    emergency phone call without unlocking the iPhone


    ### You Are Using a Passcode, but It Does Not Always Appear When You Unlock Your
    Device


    By default, `iOS` puts the passcode into effect as soon as you lock your device,
    or as soon as the device locks itself after a period of inactivity. This is a
    sensible default because your passcode cannot protect your device if your device
    is unlocked. However, you might find that you can lock your device and `iOS` does
    not request the passcode when you unlock it.


    **Solution:** This problem means that your iOS device has been configured to not
    require a passcode immediately after it has been locked. Some people set up the
    passcode to not kick in until the device has been locked for at least one minute
    to avoid having to constantly retype the passcode each time the device locks itself
    due to inactivity. However, any delay in requiring the passcode makes your device
    that much less secure.


    To ensure that the passcode is required as soon as your iOS device is locked,
    follow these steps:


    1. On the Home screen, tap `Settings`. The `Settings` app appears.

    2. Tap `Touch ID & Passcode`. If your iOS device doesn''t support `Touch ID`,
    tap `Passcode`, instead. `iOS` prompts you to enter your passcode.

    3. Type your passcode and, if you''re using a custom passcode, tap `Done`.

    4. Tap the `Require Passcode` to open the `Require Passcode` screen.

    5. Tap `Immediately`, as shown in Figure [8-5](A429116_1_En_8_Chapter.html#Fig5).


    ![A429116_1_En_8_Fig5_HTML.jpg](A429116_1_En_8_Fig5_HTML.jpg)


    Figure 8-5. To ensure that your passcode is always protecting your locked device,
    set the `Require Passcode` setting to `Immediately`


    ### You Want to Be Able to Unlock Your Device with Your Fingerprint


    Protecting your iOS device with a passcode is just good sense in this age of so-called
    iCrime, where thieves routinely go "Apple picking" by snatching iPhones and other
    Apple devices from the unwary. With a passcode acting as a digital barrier between
    the crook and your iOS device, at least your personal data is safe from prying
    eyes. Yes, a passcode is a smart safety precaution, but it''s not always a convenient
    one. First, having to tap that four (or more) character code many times during
    the day adds a small but nevertheless unwelcome annoyance to using the device.
    Second, because `iOS`, perhaps unwisely, highlights each character as you type
    your passcode, it''s at least theoretically possible that some shoulder-surfing
    snoop could discern your code.


    **Solution:** If you have an iOS device that supports `Touch ID` — that is, if
    you have an iPhone 5s or later, an iPad Pro, an iPad Air 2, or an iPad mini 3
    or later — you can take advantage of `Touch ID`, the fingerprint sensor built
    into the Home button of these iOS devices. By teaching the device your unique
    fingerprint, you can unlock your device merely by pressing the Home button. That''s
    right: No more passcode tapping to get to your Home screen. As an added bonus,
    you can use the same fingerprint to approve purchases you make in the `iTunes
    Store`, the `App Store`, the `iBooks Store`, `Apple Pay`, and even some third-party
    apps, so you no longer have to enter your Apple ID password.


    Here''s how to set up `Touch ID`:


    1. On the Home screen, tap `Settings`. The `Settings` app appears.

    2. Tap `Touch ID & Passcode` and then type your passcode (if you have one) to
    open the `Touch ID & Passcode` screen.

    3. Tap `Add a Fingerprint`. The `Touch ID` screen appears.

    4. Lightly rest your thumb – or whatever finger you most often use to press the
    Home button when you''re unlocking your iOS device – on the Home button.

    5. Repeatedly lift and place your finger as `Touch ID` learns your fingerprint
    pattern.

    6. When you see the `Adjust Your Grip` screen, tap `Continue`.

    7. Once again, repeatedly lift and place your finger, this time emphasizing the
    edges of the finger.

    8. When you see the `Complete` screen, tap `Continue`. If you haven''t yet specified
    a passcode, your iOS device prompts you to do so now.

    9. Tap your passcode and then tap it again when you''re asked to confirm. `Settings`
    returns you to the `Touch ID & Passcode` screen.

    10. To specify another fingerprint, repeat Steps 3 to 8.'
