  trans: "\n### 通过 iTunes 恢复出厂设置\n\n恢复出厂设置的最佳方法是使用 iTunes 中的`恢复`功能，因为这样你既可以备份，也能恢复你在设备上更改过的任何设置。这里有几点需要考虑：\n\
    \n- 如果损坏的设置是某个你从未更改过的 iOS 默认设置，那么恢复操作将会覆盖该损坏的设置，你的问题应该会得到解决。在这种情况下，你应该进行备份并恢复你自己的设置。\n\
    - 如果损坏的设置是你曾经更改过的，那么备份并恢复你的设置很可能会导致问题再次出现。在这种情况下，你不应该备份并恢复你的设置。\n\n那么你应该选择哪条路径呢？首先，尝试通过备份并恢复你的设置来运行恢复流程。如果问题消失了，那你就搞定了；如果问题再次出现，则意味着你更改的某个设置是罪魁祸首，所以你应该重复恢复操作，但这次不要备份你的设置。\n\
    \n在继续之前，请注意，这些步骤要求你的设备能够连接到电脑，并在 iTunes 中可见。如果不是这种情况，请参阅下一节中重置设备的说明。否则，请按照以下步骤恢复你的设备：\n\
    \n1.  在你的设备上，如果`查找我的 iPhone`已打开，请将其关闭。你可以通过依次打开`设置`、轻点`iCloud`、轻点`查找我的设备`（其中“设备”指\
    \ iPhone、iPad 或 iPod）、将`查找我的设备`开关滑到`关闭`位置，然后输入你的 Apple 密码来完成此操作。\n2.  将你的设备连接到电脑。\n\
    3.  在 iTunes 中，点击设备图标。\n4.  点击`摘要`标签页。\n5.  点击`立即备份`。这确保了 iTunes 拥有你设备和设置数据的备份副本。**注意：**\
    \ 默认情况下，iTunes 不会备份敏感信息，例如保存的密码、网站历史记录和健康数据。要备份这些数据，请选中`加密设备备份`复选框（其中“设备”指 iPhone、iPad\
    \ 或 iPod），然后运行备份。\n6.  点击`恢复设备`（其中“设备”指 iPhone、iPad 或 iPod）。iTunes 会要求你确认要恢复。\n\
    7.  点击`恢复`，然后按照屏幕上的提示操作。iTunes 会下载 iOS 并恢复原始设置。当你的设备重新启动时，iTunes 会连接到它，并可能要求你输入你的\
    \ Apple ID 凭据。完成此操作后，iTunes 会显示`欢迎使用您的新设备`屏幕，如图 1-4 所示。\n\n    ![A429116_1_En_1_Fig4_HTML.jpg](img/A429116_1_En_1_Fig4_HTML.jpg)\n\
    \n    **图 1-4.** 当您恢复出厂设置的设备重新启动时，iTunes 会提供恢复您已备份的设置和数据选项\n\n8.  选择`从此备份恢复`选项。\n\
    9.  如果你碰巧备份了多个设备，请使用列表选择你的设备。\n10. 点击`继续`。iTunes 会恢复你备份的数据，重新启动你的设备，并同步它。\n11.\
    \ 浏览各标签页，检查同步设置，确保它们按你想要的方式配置。\n12. 如果你对设置做了任何更改，请点击`应用`。这确保你的设备恢复了所有数据。\n\n###\
    \ 在设备上恢复出厂设置\n\n如果你的设备出现问题，无法连接到电脑或被 iTunes 识别，你仍然可以直接在设备上恢复出厂默认设置。以下是操作步骤：\n\n\
    1.  在主屏幕上轻点`设置`。\n2.  轻点`通用`。\n3.  轻点`还原`。\n4.  轻点`还原所有设置`。\n5.  如果你的设备受密码保护，请输入密码以继续。\n\
    6.  当 iOS 要求你确认时，轻点`还原所有设置`。\n\n## 排除已连接配件的故障\n\n将配件连接到 iOS 设备的方式只有几种：使用耳机插孔、Lightning\
    \ 接口或蓝牙。尽管你可以连接的配件数量相对有限，但这并不意味着你可能永远不会遇到这些配件的问题。\n\n如果你连接到 iOS 设备的配件出现故障，好消息是很多这类问题的原因相对有限。你可以尝试一些经过验证的补救措施，或许能让配件恢复正常工作。如果问题原因不明显，那么你的硬件故障排除步骤应始终从这些非常基本的方法开始：\n\
    \n- **检查连接、电源开关等。** 一些最常见（也最令人尴尬）的硬件问题原因就是简单的物理因素，因此请确保已连接的配件已打开，并检查线缆（如果有）是否正确插入。例如，如果你无法通过\
    \ iOS 设备上的 Wi-Fi 连接访问互联网，请确保你的网络路由器已打开。同时确保路由器与 ISP 调制解调器之间的线缆（如果它们不是像现在常见的那样集成在一个设备中）正确连接。\n\
    - **更换电池。** 像耳机这样的无线设备确实很费电，因此如果此类设备工作不稳定（或完全不工作），请始终尝试更换电池，看看是否能解决问题。\n- **先关闭配件再重新打开。**\
    \ 你通过关闭设备，等待几秒钟让其内部完全停止运转，然后再重新打开来对设备进行断电重启。你会惊讶于这个简单的操作能让多少设备恢复运行。对于没有开/关按钮的设备，可以尝试将其从电源插座上拔下，或者取出并重新安装电池。\n\
    - **重置配件的默认设置。** 如果你可以配置该配件，那么可能是某个新设置导致了问题。如果你最近进行了更改，请尝试将该设置恢复为其原始值。如果这不起作用，大多数可配置设备都有某种`恢复默认设置`选项，让你可以快速将其恢复为出厂设置。\n\
    - **升级配件的固件。** 一些设备带有固件——一个在设备内部运行并控制其内部功能的小程序。例如，所有路由器都有固件。向制造商查询是否有新版本。如有，请下载新版本，然后参阅设备手册了解如何升级固件。\n\
    \n## 高级故障排除技巧\n\n到目前为止，你看到的这些技巧在许多情况下能让你的 iOS 设备恢复运行。如果不行，你仍然可以尝试其他一些技巧。\n"
- fmt: "### Restoring Factory Settings When You Can’t Launch iOS\n\nIn some rare cases,\
    \ your iOS device goes utterly haywire, where not only does `iTunes` not recognize\
    \ the device, but you can’t even launch iOS. If this happens, you can still recover\
    \ everything, but you have to do it using a special hardware mode called Device\
    \ Firmware Upgrade (`DFU`). This mode essentially bypasses the current OS installed\
    \ on the phone (which is good because in this scenario your current OS is toast)\
    \ and tells `iTunes` to install a factory-fresh version of iOS. You can then restore\
    \ your stuff as described earlier in this chapter (see “Restoring Your Device\
    \ from a Backup”).\n\nFollow these steps to put your device into `DFU` mode:\n\
    \n1.  Turn off your device.\n2.  Connect your device to your Mac or your Windows\
    \ PC.\n3.  Launch `iTunes`.\n4.  Press and hold down the `Sleep/Wake` and `Home`\
    \ buttons for exactly 10 seconds.\n5.  After 10 seconds, release the `Sleep/Wake`\
    \ button, but continue to hold down the `Home` button for another 10 seconds.\n\
    6.  After 10 seconds, release the `Home` button. `iTunes` now recognizes your\
    \ device and displays the dialog shown in Figure [1-5](#A429116_1_En_1_Chapter.html#Fig5).\n\
    \n    ![A429116_1_En_1_Fig5_HTML.jpg](A429116_1_En_1_Fig5_HTML.jpg)\n\n    Figure\
    \ 1-5. When you boot your iOS device in `DFU` mode, `iTunes` recognizes the device\
    \ and displays this dialog to remind you to restore it.\n\n7.  Click `OK`.\n8.\
    \  Click `Restore Device` (where `device` is `iPhone`, `iPad`, or `iPod`). `iTunes`\
    \ asks you to confirm you want to restore.\n9.  Click `Restore and Update`. `iTunes`\
    \ downloads and installs iOS and then restores your device to the factory defaults.\n\
    \n### Erasing Your Device\n\nIf restoring the factory settings doesn’t get the\
    \ job done, it could be some recalcitrant bit of content that’s causing the problem.\
    \ In that case, you need to reset not only all your iOS settings, but all your\
    \ content, as well. Here’s how it’s done:\n\n1.  Tap `Settings`.\n2.  Tap `General`.\n\
    3.  Tap `Reset`.\n4.  Tap `Reset All Content and Settings`.\n5.  Enter your device\
    \ passcode, if it’s set.\n6.  When iOS asks you to confirm, tap `Erase Device`\
    \ (where `Device` is `iPhone`, `iPad`, or `iPod`).\n\nCaution\n\nUnless you really\
    \ do want to start over with original settings and no content, only run the `Erase\
    \ All Content and Settings` command if you have your device backed up. See Chapter\
    \ [8](#A429116_1_En_8_Chapter.html), “Protecting Your Device.”\n\n# 2. Fixing\
    \ Networking and Cellular Woes\n\nYour iOS device lets you perform a satisfyingly\
    \ large range of fun and interesting tasks while you’re offline. You can play\
    \ games, read saved articles, listen to downloaded music or podcasts, crack open\
    \ an e-book, update your contacts, and much more. But iOS and the iPhone, iPad,\
    \ and iPod touch really shine when they have access to the outside world, either\
    \ via a Wi-Fi network or a cellular signal. With a link established, you can surf,\
    \ e-mail, message, post, upload, download, and perform all the other online verbs\
    \ that are the watchwords of today’s connected lifestyle.\n\nAlas, you might find\
    \ yourself having to revert to the satisfying-but-limited world of offline pastimes\
    \ if you have trouble connecting your iOS device to a network. Even if you can\
    \ get online, iOS might still cause you grief with the way it handles network\
    \ or cellular connections. This chapter takes you through quite a few connectivity\
    \ problems and offers solutions that will help you get iOS and your network working\
    \ smoothly again.\n\n## Troubleshooting Wi-Fi Issues\n\nIf your network has become\
    \ a “notwork” (some wags also refer to a downed network as a nyetwork), this chapter\
    \ offers a few solutions that might help. I don’t make any claim to completeness\
    \ here, however; after all, most network ills are a combination of several factors\
    \ and therefore are relatively obscure and difficult to reproduce. Instead, I\
    \ just go through a few general strategies for tracking down problems and pose\
    \ solutions for some of the most common network afflictions.\n\n### You Have Trouble\
    \ Accessing a Wi-Fi Network: Part I\n\nIf you’re having trouble connecting to\
    \ a local Wi-Fi network, the problem might be with your device or it might be\
    \ with the network itself. (I’m assuming here that you have a password for the\
    \ network, if it requires one.) Let’s begin here in Part I by assuming that the\
    \ problem rests with your device.\n\nSolution: Turn the Wi-Fi antenna off and\
    \ then on again. This resets the antenna, which is often enough to make the connection\
    \ go through. To toggle the antenna, open `Settings`, tap `Wi-Fi`, tap the Wi-Fi\
    \ switch (see Figure [2-1](#A429116_1_En_2_Chapter.html#Fig1)) to `Off`, and then\
    \ tap the same switch back to `On`.\n\n![A429116_1_En_2_Fig1_HTML.jpg](A429116_1_En_2_Fig1_HTML.jpg)\n\
    \nFigure 2-1. Toggling the W-Fi switch off and then on again can often solve Wi-Fi\
    \ woes.\n\nTip\n\nYou can also toggle the Wi-Fi antenna off and on by swiping\
    \ up from the bottom of the screen to open the Control Center and then tapping\
    \ the Wi-Fi icon twice. Tap outside the Control Center to close it.\n\n### You\
    \ Have Trouble Accessing a Wi-Fi Network: Part II\n\nIf your iOS device still\
    \ won’t connect to the Wi-Fi hotspot, then it’s possible the problem lies with\
    \ the network itself. Unfortunately, wireless networking adds a whole new set\
    \ of potential snags to your troubleshooting chores because of problems such as\
    \ interference, compatibility, and device ranges.\n\nSolution: Here’s a list of\
    \ a few troubleshooting items that you should check to solve any wireless connectivity\
    \ problems you’re having:\n\n*   **Reboot devices.** Reset your hardware by turning\
    \ off the Wi-Fi network’s router and then turning it back on again. If your network\
    \ has a separate broadband modem, you should reboot that as well.\n*   **Look\
    \ for interference.** Devices such as baby monitors and cordless phones that use\
    \ the 2.4GHz radio frequency (RF) band can play havoc with wireless signals. Try\
    \ either moving or turning off such devices if they’re near your wireless router.\n\
    \nCaution\n\nYou should also keep your wireless router well away from a microwave\
    \ oven; microwaves can jam wireless signals.\n\n*   **Check your range.** If you’re\
    \ getting no signal or a weak signal, it could be that your iOS device is too\
    \ far away from the Wi-Fi router. You usually can’t get much farther than about\
    \ 115 feet away from any Wi-Fi access point before the signal begins to degrade\
    \ (230 feet if you’re using 802.11n devices). Either move closer to the router,\
    \ or turn on the router’s range booster feature, if it has one. You could also\
    \ install a wireless range extender.\n*   **Change the channel.** You can configure\
    \ your wireless router to broadcast signals on a specific channel. Sometimes one\
    \ channel gives a stronger signal than another, so try changing the channel. You\
    \ do this by logging on to the router’s configuration pages and looking for a\
    \ setting that determines the broadcast channel.\n*   **Upgrade the router’s firmware.**\
    \ Some network problems are caused by router bugs. If the manufacturer has corrected\
    \ these bugs, the fixes will appear in the latest version of the router firmware,\
    \ so you should upgrade to the new version. See your router documentation to learn\
    \ how to perform an upgrade.\n*   **Reset the router.** As a last resort, reset\
    \ the router to its default factory settings (see the device documentation to\
    \ learn how to do this). Note if you do this you’ll need to set up your network\
    \ from scratch."
