  trans: "\n### 使用特定账户无法发送 POP 邮件\n\n当你使用 `Mail` 发送 POP 邮件时，可能会发现邮件要么停留在`收件箱`文件夹中（意味着从未发出），要么从未送达（此时你可能会或不会收到退信）。邮件无法发送的原因有很多，但通常可归结为以下一项或多项\
    \ POP 账户设置错误。\n\n- 使用了错误的 SMTP 主机名。\n- 使用了错误的用户名或密码。\n- 如果你的邮件主机要求 SSL（安全套接层）加密，但你未使用（反之，在主机不要求时你却使用了\
    \ SSL 加密）。\n- 未使用身份验证。为了减少垃圾邮件，许多互联网服务提供商现在要求对发件邮件进行 SMTP 身份验证，这意味着你必须登录 SMTP\
    \ 服务器以确认你是邮件的发送者（而非冒充你地址的垃圾邮件发送者）。如果你的互联网服务提供商要求对发件进行身份验证，你需要配置你的电子邮件账户以提供正确的凭据。\n\
    - 使用了邮件主机不支持的服务器端口。\n\n如果你对此不太确定，请咨询你的邮件主机。\n\n**解决方法：** 按照以下步骤使用正确设置配置你的电子邮件账户：\n\
    \n1.  在主页面上，轻点`设置`。iOS 将显示“设置”应用。\n2.  轻点`邮件`。将出现“邮件”设置屏幕。\n3.  轻点你要配置的 POP 账户。将出现该账户的设置屏幕。\n\
    4.  在屏幕底部附近，轻点`SMTP`。iOS 将显示 SMTP 屏幕。\n5.  在“主服务器”部分，轻点该服务器。iOS 将显示该服务器的设置屏幕。\n\
    6.  检查`主机名`和`用户名`字段中的值，确保其正确无误。\n7.  重新输入正确的密码。\n8.  如果你的主机要求 SSL，则将`SSL`开关轻点至“开”；否则，将此开关轻点至“关”。\n\
    9.  轻点`身份验证`以打开“身份验证”屏幕，轻点你的主机所要求的身份验证类型（通常为`密码`），然后轻点“返回”返回到服务器设置屏幕。\n10. 检查`服务器端口`设置是否为你的主机支持的端口值。\n\
    11. 轻点`完成`。\n\n### 使用 Siri 语音命令发送电子邮件时遇到问题\n\n你可以使用 `Siri` 语音识别应用通过简单的语音命令检查、撰写、发送和回复信息。按住主屏幕按钮（或按住设备耳机上的麦克风按钮，或蓝牙耳机上的相应按钮），直到出现\
    \ `Siri`。`Siri` 虽然方便，但你可能难以让它按你的意愿行事。\n\n**解决方法：** 确保你使用的是 `Siri` 能识别的命令。\n\n\
    要检查 iCloud 账户上的新电子邮件，你只需说“检查电子邮件”（或仅说“检查邮件”）。你也可以按以下方式查看 iCloud 邮件列表：\n\n-   要显示未读信息，请说“显示新邮件”。\n\
    -   要显示某个特定人员的邮件，请说“显示来自*姓名*的邮件”，其中*姓名*是发件人的名字。\n\n要开始撰写新电子邮件，`Siri` 为你提供了几个选项：\n\
    \n-   要创建发送给特定人员的新邮件，请说“发送邮件给*姓名*”，其中*姓名*是收件人的名字。此姓名可以是通讯录中的姓名，也可以是具有已定义关系的某人，例如“妈妈”或“我的兄弟”。\n\
    -   要创建带有特定主题行的新邮件，请说“发送关于*主题*的邮件给*姓名*”，其中*姓名*指定收件人，*主题*是主题行文本。\n-   要创建新邮件并指定正文文本，请说“发送关于*主题*的邮件给*姓名*，内容为*文本*”，其中*姓名*是收件人，*主题*是主题行，*文本*是邮件正文文本。\n\
    \n在每种情况下，`Siri` 都会创建新邮件、显示它，然后询问你是否要发送。如果要发送，你可以说“发送”或轻点`发送`按钮。\n\n如果你正在查看某封邮件，可以说“回复”来发送回复。如果你想在回复中添加一些文本，请说“回复*文本*”，其中*文本*是你的回复内容。\n\
    \n你也可以在 `Mail` 中使用 `Siri` 来听写信息。当你在新邮件的正文内轻点时，出现的键盘会在空格键旁边显示一个`麦克风`图标。轻点`麦克风`图标，然后开始听写。以下是一些说明：\n\
    \n-   对于标点符号，你可以说出所需符号的名称，例如“逗号”（`,`）、“分号”（`;`）、“冒号”（`:`）、“句号”（`.`）、“问号”（`?`）、“感叹号”（`!`）、“破折号”（`-`）或“@符号”（`@`）。\n\
    -   你可以通过说“左括号”，然后说出文本，再说“右括号”来将文本括在括号中。\n-   要用引号将文本括起来，请说“左引号”，然后说出文本，再说“右引号”。\n\
    -   要将单词全部呈现为大写字母，请说“全大写”，然后说出该单词。\n-   要开始新段落，请说“换行”。\n-   你可以通过说“笑脸”来输入 `:-)`，说“眨眼”来输入\
    \ `;-)`，说“苦脸”来输入 `:-(`，增添一些趣味。\n\n完成后，轻点`完成`。\n\n## 接收电子邮件疑难解答\n\n### 你在设备上能收到邮件，但在电脑上却收不到\n\
    \n如果你需要在多台设备上检查电子邮件，首先需要了解 POP 邮件是如何通过互联网传递的。（这不适用于 iCloud、Gmail 以及其他使用 IMAP 的服务。）当有人给你发送信息时，它不会直接发送到你的\
    \ iOS 设备或电脑。相反，它会发送到你的互联网服务提供商（或你的公司）为处理收到的邮件而设置的服务器上。当你请求 `Mail` 检查新邮件时，它会与 POP\
    \ 服务器通信，查看你的账户中是否有邮件在等待。如果有，`Mail` 会下载这些邮件，然后指示服务器删除存储在服务器上的邮件副本。因此，如果你在 iOS 设备上收取了邮件，这些邮件将无法再下载到你的电脑上。\n\
    \n**解决方法：** 你需要配置 `Mail`，使其在下载邮件后，在 POP 服务器上保留一份邮件副本。这样，当你使用另一台设备检查邮件时，这些邮件仍然可用。请注意，对于添加到\
    \ iOS 的 POP 账户，这是默认行为。因此，如果你发现 iOS 设备能收到邮件，但其他地方收不到，则需要按照以下步骤阻止 iOS 从服务器删除邮件：\n\
    \n1.  在主页面上，轻点`设置`。\n2.  轻点`邮件`以打开“邮件”屏幕，显示“邮件”屏幕。\n3.  轻点你要配置的 POP 账户。将出现该账户的设置屏幕。\n\
    4.  在屏幕底部附近，轻点`高级`。iOS 将显示“高级”屏幕。\n5.  轻点`从服务器删除`。将出现“从服务器删除”屏幕。\n6.  轻点`永不`，如图\
    \ 5-6 所示。\n\n    ![A429116_1_En_5_Fig6_HTML.jpg](img/A429116_1_En_5_Fig6_HTML.jpg)\n\
    \n    **图 5-6.** 为确保 `Mail` 在 POP 服务器上保留下载邮件的副本，请在“从服务器删除”屏幕中轻点`永不`。\n"
- fmt: "### You Receive a Great Deal of Spam\n\nIt’s sad to say that there are no\
    \ longer any spam-free zones. If you have an Internet-based email account, you\
    \ get spam. End of story. In fact, you most likely don’t get only one or two spams\
    \ a day, but more like one or two dozen. That’s not surprising because spam now\
    \ accounts for the majority of the billions of messages sent every day, and on\
    \ some days it even accounts for 90 percent of all sent messages! ISPs and email\
    \ hosting companies are getting better at filtering out spam before it gets to\
    \ you, but these defenses remain sadly incomplete.\n\n**Solution:** It’s no longer\
    \ possible to avoid spam, but there are some things you can do to minimize how\
    \ much of it you have to wade through each day:\n\n- Never type your actual email\
    \ address in a forum or blog post comment. The most common method that spammers\
    \ use to gather addresses is to harvest them from online posts. One common tactic\
    \ you can use is to alter your email address by adding text that invalidates the\
    \ address, but is still obvious for other people to figure out. Here’s an example:\
    \ `yourname@yourisp.remove-this-to-email-me.com`.\n- Consider creating an email\
    \ address to use exclusively for logins, mailing lists, newsletters, and other\
    \ online uses. That address will likely attract spam eventually, but it’s better\
    \ than compromising your main email address.\n- If you see a message in your Inbox\
    \ that you’re sure is spam, don’t tap it. Doing so can sometimes notify the spammer\
    \ that you’ve opened the message, which confirms that your address is legitimate.\
    \ You can prevent this by disabling remote images, as described in the next section.\n\
    \n> **Tip:** If you see a definite spam message in your Inbox, you can delete\
    \ it without tapping it. Either perform a short swipe left on the message and\
    \ then tap `Trash`, or perform a long swipe left on the message until it disappears\
    \ from the Inbox.\n\n- Never respond to spam. Don’t respond, even to an address\
    \ within the spam that claims to be a “removal” address. By responding to the\
    \ spam, you prove that your address is legitimate, so you just end up getting\
    \ more spam.\n- If you have an email address that gets a ton of spam, consider\
    \ declaring “spam bankruptcy” and deleting the account, not only from your iOS\
    \ device, but also from your ISP or mail host.\n\n### You Want to Disable Remote\
    \ Images in Messages\n\nA web bug is an image that resides on a remote server\
    \ and is added to a HTML-formatted email message by referencing an address on\
    \ the remote server. When you open the message, `Mail` uses the address to download\
    \ the image for display within the message. That sounds harmless enough, but if\
    \ the message is junk email, it’s likely that the address also contains either\
    \ your email address or a code that points to your email address. So when the\
    \ remote server gets a request to load the image, it knows not only that you’ve\
    \ opened the message but also that your email address is legitimate. So, not surprisingly,\
    \ spammers use web bugs all the time because, for them, valid email addresses\
    \ are a form of gold.\n\n**Solution:** The iOS Mail app displays remote images\
    \ by default. To disable remote images, follow these steps:\n\n1. On the Home\
    \ screen, tap `Settings`. iOS opens the `Settings` app.\n2. Tap `Mail` to open\
    \ the `Mail` settings screen.\n3. Tap the `Load Remote Images` switch to `Off`,\
    \ as shown in Figure [5-7](#A429116_1_En_5_Chapter.html#Fig7). `Mail` saves the\
    \ setting and no longer displays remote images – particularly web bugs – in your\
    \ email messages.\n\n   ![A429116_1_En_5_Fig7_HTML.jpg](A429116_1_En_5_Fig7_HTML.jpg)\n\
    \n   **Figure 5-7.** To squash web bugs, tap the `Load Remote Images` switch to\
    \ `Off`\n\n> **Tip:** To display remote images in a non-spam message, tap the\
    \ message and then tap `Load All Images`.\n\n### You No Longer Want Mail to Organize\
    \ Your Messages by Thread\n\nIn the `Mail` app, your messages get grouped by thread,\
    \ which means the original message and all the replies you’ve received are grouped\
    \ together in the account’s `Inbox` folder.\n\nOrganizing messages by thread is\
    \ usually convenient, but not always. For example, if your using an iPhone or\
    \ iPod touch, sometimes you might view your messages and scroll through them by\
    \ tapping the `Next` (right-pointing arrow) and `Previous` (left-pointing arrow)\
    \ buttons. When you come to a thread, `Mail` jumps into the thread and you then\
    \ scroll through each message in the thread, which can be a real hassle if the\
    \ thread contains a large number of replies.\n\n**Solution:** If you find that\
    \ threads are more hassle than they’re worth, you can follow these steps to configure\
    \ `Mail` to no longer organize messages by thread:\n\n1. On the Home screen, tap\
    \ `Settings`. iOS opens the `Settings` app.\n2. Tap `Mail` to open the `Mail`\
    \ settings screen.\n3. Tap the `Organize By Thread` switch to `Off`.\n\n### Deleted\
    \ Messages Are Being Removed from the Trash Folder\n\nWhen you delete a message,\
    \ `Mail` doesn’t remove the message completely, but only transfers it to the account’s\
    \ `Trash` folder. This is useful because if you delete a message by accident,\
    \ you can recover the message by locating it in the `Trash` folder and moving\
    \ it back to the `Inbox` (or its original folder). That is, you can recover the\
    \ message if it still exists in the `Trash` folder. Unfortunately, `Mail` configures\
    \ each account to automatically delete items from the `Trash` folder after one\
    \ week.\n\n**Solution:** Follow these steps to control when `Mail` deletes messages\
    \ from the `Trash` folder:\n\n1. On the Home screen, tap `Settings` to display\
    \ the `Settings` app.\n2. Tap `Mail` to display the `Mail` settings screen.\n\
    3. Tap the account you want to configure.\n4. Display the account’s advanced mail\
    \ options:\n   - For an iCloud account, tap `Mail` and then tap `Advanced`.\n\
    \   - For a POP account, tap `Advanced`.\n   - For most other account types, tap\
    \ `Account` and then tap `Advanced`.\n5. Tap `Remove` to open the `Remove` screen.\n\
    6. Tap `Never` to prevent `Mail` from removing messages automatically from the\
    \ account’s `Trash` folder, as shown in Figure [5-8](#A429116_1_En_5_Chapter.html#Fig8).\n\
    \n   ![A429116_1_En_5_Fig8_HTML.jpg](A429116_1_En_5_Fig8_HTML.jpg)\n\n   **Figure\
    \ 5-8.** In the `Remove` screen, tap `Never` to prevent `Mail` from automatically\
    \ deleting messages from the account's `Trash` folder\n\n### You Do Not See the\
    \ All Inboxes Folder\n\nIf you have multiple accounts set up in iOS, `Mail` includes\
    \ a folder named `All Inboxes` that shows a combined list of all the messages\
    \ you’ve received on your accounts. This folder sometimes disappears after upgrading\
    \ iOS.\n\n**Solution:** Follow these steps to restore the `All Inboxes` folder\
    \ to the `Mail` interface:\n\n1. In the `Mail` app, display the `Mailboxes` screen.\n\
    2. Tap `Edit`.\n3. Tap the `All Inboxes` item to activate it, as shown in Figure\
    \ [5-9](#A429116_1_En_5_Chapter.html#Fig9).\n\n   ![A429116_1_En_5_Fig9_HTML.jpg](A429116_1_En_5_Fig9_HTML.jpg)\n\
    \n   **Figure 5-9.** To restore the `All Inboxes` folder to the `Mailboxes` screen,\
    \ tap `Edit` and then tap to activate the `All Inboxes` item\n4. Tap `Done`."
