    Delaware corporation. Introduction


    More than ever, tens of millions of people rely on iOS to perform many of their
    daily tasks. These include not only typical mobile phone tasks such as calling
    and texting, but also smartphone/tablet tasks such as surfing the Web, sending
    and receiving email, taking photos and videos, getting directions, scheduling
    appointments, and using apps. Our iOS devices also contain crucial information
    that we need to access regularly, including our contacts, bookmarks, notes, and
    calendars. Increasingly, each of us sees our device as an extension of our self,
    making this the most crucial tool in our day-to-day lives and, so, the one indispensable
    device.


    So it is no wonder that our lives are upset, possibly even derailed temporarily,
    when our iOS device doesn’t work the way it should (or the way we think it should).
    If an email doesn’t go through, web page text is difficult to read, or an app
    freezes, our productivity (and possibly our sanity) suffers. In such situations,
    all we want is for things to return to normal so our lives can get back on track.


    But how do we get our iOS device to act normally again? After all, the iPhone
    and the iPad are the devices that are supposed to “just work.” Glitches and hiccups
    and crashes just aren’t supposed to happen with iOS. Alas, they happen all too
    often and most of the time it isn’t obvious not only why the problem occurred,
    but what can be done to fix it (and prevent it from happening again in the future).


    ## Welcome


    Welcome, therefore, to Troubleshooting iOS . In this book, you learn how to prevent
    iOS problems from occurring and (just in case your preventative measures are for
    naught) how to fix many common problems yourself. It is those nonobvious fixes,
    workarounds, and preventative measures that form the core of this book. In clear,
    straightforward, easy-to-understand prose, this book takes you through dozens
    of iOS problems, in each case giving you both some background about why the problem
    occurred and one or more ways to solve the problem and get the device (and you
    ) back in business.


    ## Who Should Read This Book?


    When an iOS problem occurs, there are a number of troubleshooting resources available.
    These include contacting Apple Support, searching Apple discussion forums, taking
    the device to the Genius Bar, or self-diagnosing the problem. You should read
    this book if you’re an iOS user who has some experience with the device, but who,
    due to a lack of time, interest, or inclination, isn’t willing or able to perform
    these standard troubleshooting steps. For people like you, this book is an efficient
    and handy resource that enables you to resolve a problem quickly and without recourse
    to complicated, time-consuming, or expensive solutions.'
