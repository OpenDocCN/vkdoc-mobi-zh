  trans: "\n### 你找不到某个应用\n\n如果你在 App Store 里有点忘乎所以，很容易就会让几十个图标散落在十几个甚至更多页面上（最多 15\
    \ 页）。由于这些应用大多安装时没有特定顺序，要找到某个应用的图标可能会非常耗时，令人沮丧。\n\n**解决方案：** 你可以重置主屏幕布局，这会执行两个操作：\n\
    \n-   将主屏幕（可能还有部分第二屏幕，取决于设备和 iOS 版本）恢复为出厂默认图标排列。\n-   按字母顺序显示你所有的第三方应用图标。\n\n\
    **注意：** 重置主屏幕布局也会删除你创建的所有自定义应用文件夹。\n\n要重置主屏幕布局，请打开 `设置`，点击 `通用`，点击 `还原`，点击 `还原主屏幕布局`，然后在\
    \ iOS 要求确认时，点击 `还原主屏幕布局`。\n\n---\n\n### 某个应用显示太多通知\n\n就像一位吵闹或粗鲁的客人，有些应用在进入你的 iOS\
    \ 系统后，会通过过频繁或过强硬的弹窗通知来回应你的邀请。\n\n**解决方案：** 通过按你的喜好配置应用的通知来控制它。打开 `设置` 应用，点击 `通知`，然后点击你想要操作的应用。iOS\
    \ 会显示该应用的通知选项，如图 3-2 所示。请注意，某些应用（例如 `日历`）会将通知分成几类，因此你可能需要先点击一个类别，才能看到类似图 3-2 所示的选项。\n\
    \n![A429116_1_En_3_Fig2_HTML.jpg](img/A429116_1_En_3_Fig2_HTML.jpg)\n\n*图 3-2.*\
    \ 使用应用的通知设置来控制你看到其通知的频率和位置。\n\n现在，你可以通过以下选项配置该应用的通知：\n\n-   要完全停止该应用的通知，请将 `允许通知`\
    \ 开关点击为 `关闭`。\n-   要不在“通知中心”看到该应用的通知，请将 `在“通知中心”显示` 开关点击为 `关闭`。\n-   要听不到该应用的通知声音，请将\
    \ `声音` 开关点击为 `关闭`。对于某些应用，你需要点击 `声音` 查看声音列表，然后点击 `无` 来关闭通知声音。\n-   要看不到该应用的标记图标，请将\
    \ `标记` 开关点击为 `关闭`。\n-   要不在“锁定屏幕”上看到该应用的通知，请将 `在锁定屏幕上显示` 开关点击为 `关闭`。\n-   使用 `解锁时的提醒样式`\
    \ 部分，选择你喜欢的该应用通知样式。点击 `无` 关闭提醒，或点击你想要的样式：`横幅`（几秒钟后自动消失）或 `提醒`（在你关闭前不会消失）。\n\n\
    ---\n\n### 你的 Facebook 数据未出现在“通讯录”或“日历”应用中\n\niOS 系统内置了 Facebook 支持。你可以轻松地将链接、照片和其他内容发布到你的\
    \ Facebook 时间线，甚至无需加载 Facebook 应用即可发送简单的状态更新。但是，如果你在 `通讯录` 应用中看不到你的 Facebook 好友，或在\
    \ `日历` 应用中看不到你的 Facebook 活动，那么这种内置的 Facebook 支持就远没有那么方便了。\n\n**解决方案：** 如果你在 `通讯录`\
    \ 应用中看不到你的 Facebook 好友，可以尝试以下两种方法：\n\n-   在 `设置` 应用中，点击 `Facebook`，然后将 `通讯录` 开关点击为\
    \ `开启`。\n-   在 `通讯录` 应用中，点击 `群组`，然后点击以激活 `所有 Facebook` 群组。\n\n如果你在 `日历` 应用中看不到你的\
    \ Facebook 活动，请尝试以下操作：\n\n-   在 `设置` 应用中，点击 `Facebook`，然后将 `日历` 开关点击为 `开启`。\n\
    -   在 `日历` 应用中，点击 `日历`，然后点击以激活 `Facebook 活动` 日历。\n\n---\n\n### 某个应用卡住了\n\n如果你的\
    \ iOS 设备屏幕冻结，原因可能是某个应用崩溃了。\n\n**解决方案：** 通常可以通过强制退出应用来让设备恢复正常。你可以尝试两种方法：\n\n- \
    \  按住 `睡眠/唤醒` 按钮直到出现 `滑动来关机` 屏幕；然后按住 `主屏幕` 按钮约 6 秒钟。iOS 会关闭该应用并返回主屏幕。\n-   如果某个应用卡住了，但你的设备其他方面运行正常，请双击\
    \ `主屏幕` 按钮显示多任务屏幕，根据需要向左或向右滚动以显示应用的缩略图屏幕，然后将应用缩略图向上拖到屏幕顶部。你的 iPhone 会将缩略图移出屏幕并关闭该应用。\n\
    \n---\n\n### 你的屏幕对触摸无响应\n\n有时，你的 iOS 设备可能会冻结，无论怎么点击、滑动或威胁都无法让手机做出响应。最可能的问题是触摸屏暂时卡住了。要解决此问题，请按\
    \ `睡眠/唤醒` 按钮使设备进入睡眠状态，再次按 `睡眠/唤醒` 唤醒设备，然后拖拽 `滑动来解锁`。在大多数情况下，你现在应该可以恢复正常的 iOS 操作了。\n\
    \n如果这不起作用，那么可能是你正在使用的应用崩溃了，因此你需要按照我在“某个应用卡住了”一节中描述的方法将其关闭。\n\n---\n\n### 某个应用占用大量空间\n\
    \n你的 iOS 设备既实用又有趣，以至于很容易忘记它也有局限性，尤其是在存储方面。如果你使用的是 16GB 设备，这一点尤为明显，但即使是容量更大的设备，如果你塞满了电影、电视节目和大量杂志订阅，也会很快被填满。\n\
    \n你可以通过连接 `iTunes` 或依次点击 `设置`、`通用`、`储存空间与 iCloud 用量` 来查看设备还剩多少可用空间。`储存空间与 iCloud\
    \ 用量` 屏幕不仅会显示你有多少可用存储空间，还允许你点击 `管理储存空间` 查看每个应用使用了多少空间。\n\n如果你发现设备空间不足，请检查各个应用，看看是否有某个应用占用了过多的硬盘空间。\n\
    \n**解决方案：** 如果发现某个占空间的“大户”，你有两种方法可以删除其数据，为设备腾出空间：\n\n-   **第三方应用。** 对于从 App Store\
    \ 下载的应用，点击该应用，点击 `删除 App`，然后在你的 iPhone 要求确认时，再次点击 `删除 App`。\n-   **内置应用。** 对于\
    \ iOS 自带的应用（例如 `音乐` 或 `视频`），点击该应用以显示其存储在设备上的数据列表，然后点击 `编辑`。这会将列表置于编辑模式。要移除某个项目，请点击该项目左侧的红色\
    \ `删除` 按钮，然后点击出现的 `删除` 按钮（见图 3-3）。\n\n    ![A429116_1_En_3_Fig3_HTML.jpg](img/A429116_1_En_3_Fig3_HTML.jpg)\n\
    \n    *图 3-3.* 要从内置应用中移除数据，请点击红色的 `删除` 按钮，然后点击出现的 `删除` 按钮。\n\n---\n\n### 你想控制第三方对你的应用的使用权限\n\
    \n不时会有某个应用请求访问你设备上的其他应用，例如 `通讯录`、`日历` 或 `照片`。如果你安装了很多应用，你可能已经不清楚哪些第三方程序有权访问你的其他应用。\n\
    \n**解决方案：** 你可以按照以下步骤允许或撤销特定应用的第三方权限：\n\n1.  打开 `设置` 应用，然后点击 `隐私`。\n2.  点击你想要控制访问权限的应用。iOS\
    \ 会显示已请求访问该应用的应用列表，如图 3-4 所示。\n\n    ![A429116_1_En_3_Fig4_HTML.jpg](img/A429116_1_En_3_Fig4_HTML.jpg)\n\
    \n    *图 3-4.* 你可以允许或撤销第三方对你应用的访问权限。\n\n3.  在每个应用旁边，将开关点击为 `关闭` 以撤销访问权限，或点击为 `开启`\
    \ 以允许访问。\n"
- fmt: "### 您在使用 Handoff 功能时遇到问题\n\n您可以使用 Handoff 功能在 iOS 设备上开始一项任务，然后在附近的 Mac 上继续该任务。（Handoff\
    \ 也支持反向操作：您可以在 Mac 上开始任务，然后在 iOS 设备上继续。）但您可能会发现 Handoff 无法正常工作，导致您无法继续任务。\n\n\
    **解决方案**：首先，确保您的设备符合以下使用 Handoff 的指南：\n\n- 您的 Mac 必须运行 OS X Yosemite 或更高版本，或任何版本的\
    \ `macOS`。\n- 您的 Mac 必须支持蓝牙 4.0。若要检查，请点击苹果图标，点击“关于本机”，点击“系统报告”，点击“蓝牙”，然后查看 LMP\
    \ 版本。如果显示为 `0x6`，则您的 Mac 支持蓝牙 4.0。\n\n> **提示**  \n> 如果您的 Mac 不支持蓝牙 4.0，您可能仍可以通过安装第三方工具“Continuity\
    \ Activation Tool”来使用 Continuity 功能。该工具可从 [`https://github.com/dokterdok/Continuity-Activation-Tool`](https://github.com/dokterdok/Continuity-Activation-Tool)\
    \ 获取。\n\n- 您的 iOS 设备必须运行 iOS 8 或更高版本。\n- 您的 Mac 和设备必须登录到同一个 iCloud 账户。\n- 您的 iOS\
    \ 设备与 Mac 之间的距离应保持在约 33 英尺（约 10 米）以内。\n\n如果以上条件均已满足，请确保您的 Mac 已配置为允许 Handoff 连接：\n\
    \n1. 打开“系统偏好设置”。\n2. 点击“通用”。\n3. 勾选“允许在这台 Mac 和 iCloud 设备之间使用 Handoff”复选框。\n\n\
    最后，确保 iOS 已配置为允许 Handoff 连接：\n\n1. 打开“设置”应用。\n2. 点击“通用”。\n3. 点击“Handoff”。\n4.\
    \ 将“Handoff”开关打开。\n\n## 高级应用故障排除\n\n一般来说，您完全不必担心“打开太多”iOS 应用，因为系统会自动管理您的应用及其消耗的资源。不过，我在此加入以下“问题”，以便您更深入地了解\
    \ iOS 如何管理应用的打开与关闭。\n\n### 您打开了太多应用\n\n在 Mac 或 PC 上，打开太多程序可能会导致系统资源（尤其是内存）出现问题。然而，尽管\
    \ iOS 支持多任务处理，但它并不会像桌面电脑那样遭遇“太多应用”带来的困扰。\n\n要理解其原因，首先需要知道，在 iOS 中，多任务处理最基本的含义是：当您运行一个应用并切换到另一个应用时，设备会将第一个应用保留在后台。在大多数情况下，第一个应用在后台不执行任何操作——它不会占用当前应用的处理器时间，也不会消耗电池电量。这意味着您可以随意打开任意数量的应用。但是，如果第一个应用正在执行某项任务而您切换到另一个应用，则第一个应用会继续在后台执行该任务。\n\
    \n要深入理解 iOS 的多任务处理机制，您需要了解应用在 iOS 中的四种状态：\n\n- **运行状态**：应用已打开并拥有系统焦点。\n- **关闭状态**：此模式表示应用已完全关闭。如果您重启设备（通过关机再开机），所有应用都会进入关闭状态。\n\
    - **挂起状态**：如果您启动一个应用，然后按下主屏幕按钮返回主屏幕，iOS 通常会将正在运行的应用置于挂起状态。这意味着该应用仍保留在内存中，但没有运行，不占用处理器时间，也不消耗电池。然而，应用仍保持其当前状态，因此当您返回时，应用会从您离开的地方继续运行。\n\
    - **后台状态**：如果您启动一个应用，开始某个进程（如播放音乐），然后按下主屏幕按钮返回主屏幕，您的 iPhone 会将应用置于后台状态，这意味着它让应用的进程在后台继续运行。当您返回应用时，您会看到进程仍在运行或已经完成。\n\
    \n值得注意的是，绝大多数应用在您切换到另一个应用时会进入挂起状态。但是，如果您启动一个应用而设备没有足够的可用内存，iOS 会开始将挂起的应用置为关闭状态，以释放内存。\n\
    \n这种内置的资源管理机制，正是为什么在多任务屏幕（即双击主屏幕按钮时出现的屏幕；参见图 3-5）中“打开”了很多应用，但几乎所有这些应用都处于关闭状态，它们丝毫不会影响系统性能。（因此，您完全可以将多任务屏幕视为“最近使用的应用”屏幕。）\n\
    \n![A429116_1_En_3_Fig5_HTML.jpg](A429116_1_En_3_Fig5_HTML.jpg)\n\n**图 3-5** iPhone\
    \ 的多任务屏幕可能看起来有很多“打开”的应用，但其中很少有应用在使用系统资源。\n\n# 4. 解决网页问题\n\n我们生活在一个这样的世界：10 或 15\
    \ 年前“信息触手可及”（内行人士称之为 IAYF）的承诺，如今已从遥不可及的白日梦变成了“让我帮你查一下”的现实。这是因为我们的指尖离接入互联网、拥有海量信息的设备——尤其是\
    \ iPhone 或支持蜂窝网络的 iPad——从未如此之近。无论您是需要解决一场争论、查找最近咖啡馆的路线，还是想起出演过《绽放》的女演员名字，您的 iOS\
    \ 设备随时都能提供帮助。\n\n值得庆幸的是，iOS 自带的 Safari 应用是一款功能齐全的浏览器，具备您可能需要的一切功能。它是一款出色的浏览器，但遗憾的是它并非完美无缺，因此您可能会遇到大小不一的困扰，影响您的上网体验。本章将解决许多最常见的\
    \ Safari 烦扰和问题，并展示如何规避它们或一劳永逸地修复它们。因此，下次您在晚宴上听到有人声称达斯汀·霍夫曼出演了《星球大战》时，您就能以创纪录的速度纠正这一说法。\n\
    \n### 网页浏览问题故障排除\n\n#### 您无法正常查看页面文本或其他信息\n\n我们身处移动网页革命已有多年，令人惊讶的是，仍有大量网站未针对移动浏览进行优化。这意味着您经常访问一些为桌面浏览器设计的网站，导致文本、图像和其他数据小得无法辨认，尤其是在较小的\
    \ iPhone 或 iPod touch 屏幕上。\n\n**解决方案**：许多网站支持您通过将两根手指放在屏幕上并分开来放大页面。要快速放大页面上有不同区域的部分，您可以双击要放大的特定区域——可以是图片、段落、表格或文本列。Safari\
    \ 会将此区域放大以填满屏幕宽度。再次双击可恢复常规视图。\n\n> **注**：双击缩放技巧并非在所有页面上都有效。如果网页开发者将页面的 `maximum-scale`\
    \ 属性设置为 `1`，则表示您无法将页面放大到超过其原始尺寸。"
  raw: '### You’re Having Trouble Using the Handoff Feature


    You can use the Handoff feature to start a task on your iOS device and then continue
    that task using a nearby Mac. (Handoff works the other way, as well: You can start
    a task on your Mac and then continue the task on your iOS device.) You might find,
    however, that Handoff doesn’t work and you can’t continue a task.


    Solution: First, make sure that your devices meet the following guidelines to
    use Handoff:


    *   Your Mac must be running OS X Yosemite or later, or any version of macOS.

    *   Your Mac must support Bluetooth 4.0\. To check, click the Apple icon, click
    About This Mac, click System Report, click Bluetooth, then read the LMP Version.
    If it says 0x6, then your Mac supports Bluetooth 4.0.


    Tip


    If your Mac doesn’t support Bluetooth 4.0, you might still be able to use Continuity
    if you install the third-party Continuity Activation Tool, available from [`https://github.com/dokterdok/Continuity-Activation-Tool`](https://github.com/dokterdok/Continuity-Activation-Tool)
    .


    *   Your iOS device must be running iOS 8 or later.

    *   Both your Mac and your device must be signed in to the same iCloud account.

    *   Your iOS device must be within about 33 feet of your Mac.


    If that all checks out, make sure your Mac is configured to accept Handoff connections:


    1.  Open System Preferences.  

    2.  Click General.  

    3.  Click to select the Allow Handoff between this Mac and your iCloud devices
    check box.  


    Finally, make sure iOS is configured to accept Handoff connections:


    1.  Open the Settings app.  

    2.  Tap General.  

    3.  Tap Handoff.  

    4.  Tap the Handoff switch to On.


    ## Advanced App Troubleshooting


    As a general rule, you never have to worry about opening “too many” iOS apps,
    because the system takes care of managing your apps and the resources they consume.
    However, I’ve included the following “problem” to give you a more advanced look
    at how iOS handles app opening and closing.


    ### You Have Too Many Apps Open


    On a Mac or PC, having too many programs open can cause problems with system resources,
    particularly memory. However, even though iOS supports multitasking , it doesn’t
    suffer from the same too-many-apps troubles that plague desktop machines.


    To understand why, first know that, at its most basic, multitasking on iOS means
    that whenever you run an app and then switch to another app, your device keeps
    the first app available in the background. In most cases, the first app does nothing
    while it’s in the background — it doesn’t take any processor time away from your
    current app and it doesn’t use battery power. This means that you’re free to open
    as many apps as you like. However, if the first app is performing some task and
    you switch to another app, the first app continues to perform the task in the
    background.


    To get a firm grip on how iOS multitasking works, you need to understand the four
    modes an app can have on iOS:


    *   Running State . The app is open and has the focus of the system.

    *   Closed State . This mode means the app is completely shut down. If you reboot
    your device (by turning it off and then back on), all your apps are then in the
    Closed State.

    *   Suspended State . If you launch an app, then press the Home button to return
    to the Home screen, usually iOS places the running app into the Suspended State.
    This means the app remains loaded into memory, but it’s not running, it’s not
    using up processor time, and it’s not draining the battery. However, the app still
    maintains its current conditions, so that when you return to it, the app resumes
    where you left off.

    *   Background State . If you launch an app, start some process such as playing
    music, and then press the Home button to return to the Home screen, your iPhone
    puts the app into the Background State, which means it keeps the app’s process
    running in the background. When you return to the app, either you see the process
    still running or it has been completed.


    It’s important to note that the vast majority of apps go into the Suspended State
    when you switch to another app. However, if you launch an app and your device
    doesn’t have enough free memory available, iOS starts putting suspended apps into
    the Closed State to free up memory.


    This built-in resource management is why having a lot of apps “open” in the multitasking
    screen (that is, the screen that appears when you double-tap the Home button;
    see Figure [3-5](#A429116_1_En_3_Chapter.html#Fig5)). Almost all of those apps
    are in the Closed State, so they’re not affecting system performance in the least.
    (For this reason, you should really think of the multitasking screen as the “most
    recently used apps” screen.)


    ![A429116_1_En_3_Fig5_HTML.jpg](A429116_1_En_3_Fig5_HTML.jpg)


    Figure 3-5.


    The iPhone multitasking screen can be quite busy with “open” apps, but few of
    them are using any system resources


    # 4. Resolving Web Issues


    We live in a world where the promise of “information at your fingertips” (IAYF,
    to those in the know) has gone from a pie-in-the-sky daydream just 10 or 15 years
    ago to let-­me-look-that-up-for-you reality now. That’s because our fingertips
    are never far from a device – particularly an iPhone or cellular-enabled iPad
    – that’s connected to the Internet and its vast supply of information. Whether
    you need to resolve an argument, get directions to the nearest café, or remember
    the name of the actress who starred in Blossom, your iOS device is right there
    to help.


    It helps that the Safari app that comes with iOS is a solid web browser that has
    all the features you’re likely to need. It’s a great browser, but unfortunately
    it’s not a perfect one, so you might encounter frustrations both small and large
    that can get in the way of your web surfing. This chapter tackles many of the
    most common Safari irritations and annoyances and shows you how to either work
    around them or fix them once and for all. So the next time you’re at a dinner
    party and someone claims that Dustin Hoffman was in Star Wars, you’ll be able
    to set the record straight in record time.


    ## Troubleshooting Web Surfing Problems


    ### You Have Trouble Viewing the Page Text or Other Information


    We’re quite a number of years into the mobile web revolution, so it’s surprising
    how many websites are still not optimized for mobile viewing. This means you’ll
    often visit a site that was built with a desktop browser in mind, so the text,
    images and other data appear unreadably tiny, especially on a smaller iPhone or
    iPod touch screen.


    Solution: Many websites enable you to zoom in on the page by placing two fingers
    on the screen and spreading them apart. A quick way to zoom in on a page that
    has various sections is to double-tap on the specific section – it could be an
    image, a paragraph, a table, or a column of text – that you want magnified. Safari
    zooms the section to fill the width of the screen. Double-tap again to return
    the page to the regular view.


    Note


    The double-tap-to-zoom trick doesn’t work on all pages. If the web page developer
    has set the page’s maximum-scale property to 1, it means you can’t zoom the page
    to anything larger than its original size.'
