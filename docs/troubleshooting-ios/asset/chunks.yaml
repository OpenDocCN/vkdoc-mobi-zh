  trans: "\n# iOS 与 macOS 连接问题故障排除\n\n- 确保你的 iOS 设备和 Mac 均未处于“勿扰模式”：\n  - 在 iOS 设备上，从屏幕底部向上滑动以显示控制中心，然后轻点以关闭“勿扰模式”图标。\n\
    \  - 在 OS X 或 macOS 中，点击“通知”图标显示通知中心，点击“通知”标签，滚动到该标签顶部，然后点击将“勿扰模式”开关设为关闭。\n- 确保你的\
    \ iOS 设备未开启“个人热点”功能。打开“设置”应用，轻点“个人热点”，然后将“个人热点”开关设为关闭。\n- 不要尝试发送多种不同类型的文件。例如，虽然可以发送两个或更多图像文件，但不能同时发送一个图像文件和一个\
    \ PDF 文件。\n- 确保你的 Mac 未处于“旧款模式”（即配置为仅能向 2012 年或更早发布的 Mac 发送文件）。在 Mac 上，打开“隔空投送”窗口。如果你看到文字“正在搜索旧款\
    \ Mac…”，请点击“取消”以退出旧款模式。\n- 确保 Mac 防火墙未配置为阻止所有传入连接。打开“系统偏好设置”，点击“安全性与隐私”，点击“防火墙”，点击锁形图标，然后输入\
    \ Mac 的管理员密码。如有必要，点击以取消勾选“阻止所有传入连接”复选框，然后点击“确定”。\n\n如果以上方法均无效，请重置 iOS 网络设置。在“设置”应用中，依次轻点“通用”、“还原”、“还原网络设置”，然后在\
    \ iOS 要求确认时轻点“还原网络设置”。\n\n## 蜂窝网络问题故障排除\n\n如果你拥有带蜂窝天线的 iPhone 或 iPad，你就会知道只要在蜂窝网络覆盖范围内，就能拥有始终在线的数据连接所带来的自由与高效。遗憾的是，这种便利并不便宜，因此大多数蜂窝网络问题都集中在控制数据和漫游费用上。本节将带你了解这些及其他与蜂窝网络相关的问题。\n\
    \n### 可通过 Wi-Fi 发送电子邮件，但无法通过蜂窝网络发送\n\n你可能会发现，在家或办公室可以顺利发送电子邮件，但在街上或乘车途中发送的邮件却一直停留在“邮件”应用的“发件箱”中。这虽然感觉像是一个\
    \ bug，但实际上是一项功能，因为许多蜂窝网络提供商不允许通过第三方服务器发送邮件。当你使用 Wi-Fi 时，这不是问题，因为你的信息不会通过蜂窝网络发送；但一旦离开\
    \ Wi-Fi，蜂窝网络启动，你的提供商就会阻止发送第三方邮件。\n\n解决方法：你的蜂窝网络提供商会设置一个外发服务器来处理已发送的邮件，因此你需要将该服务器设置为邮件账户的辅助\
    \ SMTP 服务器。iOS 会尝试使用账户的默认服务器发送信息，但如果失败（例如，当你处于蜂窝网络而非 Wi-Fi 网络时），系统会回退到辅助服务器，你的信息就能成功发送。\n\
    \n要设置辅助 SMTP 服务器，请遵循以下步骤：\n\n1. 打开“设置”应用，然后轻点“邮件、通讯录、日历”。\n2. 轻点你的电子邮件账户。\n3.\
    \ 轻点你的外发邮件服务器。\n4. 轻点“添加服务器”。\n5. 输入你蜂窝网络提供商的 SMTP 主机名，以及你的用户名和密码。\n6. 轻点“存储”。\n\
    \n### 不确定自己使用了多少数据\n\n如果你使用 iOS 设备所对应的套餐设有每月数据流量上限，且你超出了该月度上限，那么你几乎肯定要为此特权支付高昂费用。为避免这种情况，大多数蜂窝网络提供商在你接近上限时会友善地发送一条消息。然而，如果你不信任这个过程，或者只是对这些事情过度担忧（在我看来，这是合理的），那么你可能更愿意自己留意数据使用情况。\n\
    \n解决方法：iOS 会追踪其发送或接收的蜂窝网络数据，以及如果你在覆盖区域外使用 iPhone 时发送或接收的漫游数据。首先，查看一下蜂窝网络提供商最近一次账单，特别留意账单覆盖的日期范围。例如，账单可能从上个月的\
    \ 24 号开始，到本月的 23 号结束。这很重要，因为它告诉你何时需要重置设备上的使用数据。\n\n现在按照以下步骤检查蜂窝数据使用情况：\n\n1. 打开“设置”应用，然后轻点“蜂窝网络”，显示蜂窝网络屏幕。\n\
    2. 在“蜂窝数据用量”部分，读取“当前时段”和“当前时段漫游”的值（见图 2-6）。\n\n   ![A429116_1_En_2_Fig6_HTML.jpg](img/A429116_1_En_2_Fig6_HTML.jpg)\n\
    \n   图 2-6. 读取“蜂窝数据用量”部分的值\n\n3. 如果你已处于数据周期的末尾，请轻点屏幕底部的“还原统计数据”以开始新周期的新数值。\n\n\
    ### 想要阻止 iOS 设备使用蜂窝数据\n\n如果你已达到蜂窝数据套餐的限制，你几乎肯定想避免超额，因为费用通常高得令人望而却步。只要你在 Wi-Fi\
    \ 网络覆盖范围内，或者你能自律到在没有 Wi-Fi 时不浏览网页或查看 YouTube，就没什么问题。不过，意外仍有可能发生。例如，你可能不小心轻点了电子邮件或短信中的链接，或者你家里的某个人在不知情的情况下使用了你的手机。\n\
    \n解决方法：为防止这类意外（或者仅仅是在 YouTube 方面信不过自己），你可以完全关闭蜂窝数据，这意味着你的设备只有在有 Wi-Fi 信号时才能访问互联网数据。要在你的\
    \ iOS 设备上关闭蜂窝数据，请打开“设置”应用，轻点“蜂窝网络”，然后将“蜂窝数据”开关设为关闭。\n\n### 希望更精细地控制 iOS 设备如何使用蜂窝数据\n\
    \n与其像我上一节所述那样完全关闭蜂窝数据，你可以采取更有针对性的方法。例如，如果你有点担心超出蜂窝套餐的数据上限，那么避开相对高带宽的项目（如 FaceTime\
    \ 和 iTunes）是合理的，但可以继续使用相对低带宽的内容（如 iCloud 文稿和 Safari 阅读列表）。\n\n解决方法：你可以自行管理，但嘿，你是个大忙人，下次有\
    \ FaceTime 通话接入且你身处只有蜂窝网络的区域时，你可能会忘记。我建议将细节交由 iOS 处理，配置它不允许某些内容类型通过蜂窝连接使用。为此，请打开“设置”应用并轻点“蜂窝网络”。在“使用蜂窝数据”部分（如图\
    \ 2-7 所示），针对你希望禁止使用蜂窝网络的每种内容类型，将其开关轻点设为关闭。\n\n![A429116_1_En_2_Fig7_HTML.jpg](img/A429116_1_En_2_Fig7_HTML.jpg)\n\
    \n图 2-7. 在每个你希望禁止使用蜂窝网络的应用程序旁，将开关轻点设为关闭\n"
- fmt: "### You Want to Prevent iOS from Using Data Roaming\n\nData roaming is an\
    \ often-convenient feature that enables you to make calls — and, with your iOS\
    \ device, surf the Web, check and send e-mail, and exchange text messages — when\
    \ you’re outside of your normal coverage area. The downside is that, unless you’ve\
    \ got a fixed-rate roaming package from your cellular provider, roaming charges\
    \ are almost always eye-poppingly expensive. You’re often talking several dollars\
    \ per minute or megabyte, depending on where you are and what type of service\
    \ you’re using. Not good!\n\nUnfortunately, if you have the iOS `Data Roaming`\
    \ feature turned on, you may incur massive roaming charges even if you never use\
    \ your device! That’s because iOS still performs background checks for things\
    \ like incoming e-mail messages and text messages, so a week in some far-off land\
    \ could cost you hundreds of dollars without even using your phone.\n\n**Solution:**\
    \ To avoid this, turn off the `Data Roaming` feature on your device when you don’t\
    \ need it. To do this, open the `Settings` app, tap `Cellular`, tap `Cellular\
    \ Data Options`, and then tap the `Data Roaming` switch to `Off`.\n\n---\n\n##\
    \ Troubleshooting Bluetooth Issues\n\niOS supports a wireless technology called\
    \ Bluetooth, which enables you to make wireless connections to other Bluetooth-friendly\
    \ devices, such as headsets, keyboards, and game controllers. In theory, connecting\
    \ Bluetooth devices is supposed to be criminally easy, but in practice that’s\
    \ often not the case, so this section provides you with a few common troubleshooting\
    \ techniques.\n\n### You Don’t See a Bluetooth Device\n\nNot surprisingly, you\
    \ can’t make a Bluetooth connection if you can’t see the device in the `Settings`\
    \ app’s Bluetooth window.\n\n**Solution:** If you don’t see a Bluetooth device\
    \ in the `Settings` app, try the following:\n\n- Make sure the device is turned\
    \ on and fully charged.\n- Make sure the device is discoverable. Unlike Wi-Fi\
    \ devices that broadcast their signals constantly, most Bluetooth devices broadcast\
    \ their availability — that is, they make themselves discoverable — only when\
    \ you say so. Most Bluetooth devices have a switch you can turn on or a button\
    \ you can press to make them discoverable.\n- Make sure the Bluetooth device is\
    \ well within 33 feet of your iOS device, since that’s the maximum range for most\
    \ Bluetooth devices. (Some so-called Class 1 Bluetooth devices have a maximum\
    \ range 10 times as long.)\n- Make sure iOS has Bluetooth enabled. In the `Settings`\
    \ app, tap `Bluetooth`, and then tap the `Bluetooth` switch to `On`, as shown\
    \ in Figure [2-8](#A429116_1_En_2_Chapter.html#Fig8).\n\n  ![A429116_1_En_2_Fig8_HTML.jpg](A429116_1_En_2_Fig8_HTML.jpg)\n\
    \n  **Figure 2-8.** In the `Settings` app, make sure the `Bluetooth` switch is\
    \ set to `On`\n\n- If possible, reboot the Bluetooth device. If you can’t reboot\
    \ the device, or the reboot doesn’t solve the problem, reboot your iOS device.\n\
    - Check with the Bluetooth device manufacturer to ensure the device is capable\
    \ of being paired with iOS devices.\n\n### You Can’t Pair with a Bluetooth Device\n\
    \nAs a security precaution, many Bluetooth devices need to be paired with another\
    \ device before the connection is established. In some cases, the pairing is accomplished\
    \ by entering a multidigit passkey — iOS calls it a `PIN` — that you must then\
    \ enter into the Bluetooth device (assuming, of course, that it has some kind\
    \ of keypad). For all other Bluetooth devices, you initiate the pairing by tapping\
    \ the device in the `Settings` app’s Bluetooth screen. Either way, you might find\
    \ that even though the device shows up fine in the Bluetooth screen, you cannot\
    \ pair it with your iOS device.\n\n**Solution:** First try the solutions in the\
    \ previous section. If you still can’t get the pairing to work, tell iOS to start\
    \ over by forgetting what it knows about the device:\n\n1.  Open the `Settings`\
    \ app, and then tap `Bluetooth`.  \n2.  Tap the blue `More Info` icon to the right\
    \ of the Bluetooth device name.  \n3.  Tap `Forget this Device`. iOS asks you\
    \ to confirm.  \n4.  Tap `OK`.  \n5.  When the device reappears in the `Bluetooth`\
    \ window, try pairing with it again.\n\n### You Don’t Hear Audio through a Paired\
    \ Headset\n\nAfter you pair a Bluetooth headset, iOS is usually smart enough to\
    \ start blasting your tunes through the headset instead of the device’s built-in\
    \ speaker. The operative word here is “usually,” since every so often iOS fails\
    \ to do this.\n\n**Solution:** You need to manually specify your paired headset\
    \ as the output device. Swipe up from the bottom of the screen to open the `Control\
    \ Center`, tap the `AirPlay` icon that appears below the playback controls (to\
    \ the right of the `AirDrop` section), and then tap your paired Bluetooth headset\
    \ (see Figure [2-9](#A429116_1_En_2_Chapter.html#Fig9)). iOS now plays your device\
    \ audio through the headset.\n\n![A429116_1_En_2_Fig9_HTML.jpg](A429116_1_En_2_Fig9_HTML.jpg)\n\
    \n**Figure 2-9.** Open the `AirPlay` screen and then tap your paired Bluetooth\
    \ headset\n\n---\n\n# 3. Solving App Problems\n\nYour iPhone, iPad, or iPod touch\
    \ is an impressive piece of industrial design. From the responsive touchscreen\
    \ to the powerful cameras to the overall sleek design, an iOS device is a work\
    \ of art as much as it’s a work of engineering. But all that hardware is useless\
    \ without some software to make it come alive, and in the iOS world, that software\
    \ comes in the form of the app. This includes not only the various apps that are\
    \ installed by default with iOS, but also those Apple and third-party apps that\
    \ are available for download using the `App Store`.\n\nIn short, world-class hardware\
    \ notwithstanding, your iOS device is both defined and constrained by the apps\
    \ that are installed on it. Why constrained? Because it’s the stark truth that\
    \ if your apps don’t work properly, then neither does your iOS device. If you\
    \ can’t find an app, if an app crashes, or if an app behaves in a way the developer\
    \ didn’t intend, then your iOS experience will be compromised. To help you avoid\
    \ that situation — or to help you get out of it — this chapter presents a few\
    \ problems and solutions related to apps.\n\n## General App Troubleshooting\n\n\
    App problems can run the gamut from not being able to locate an app or its data\
    \ (bothersome), to an app behaving strangely (annoying), or to an app not working\
    \ at all (aggravating). The good news is that, unless the app was created by a\
    \ truly incompetent developer, most app problems can be solved quickly or, at\
    \ least, straightforwardly.\n\n### You Find Searching Difficult Because iOS Returns\
    \ Items from Too Many Apps\n\nWhen you run a `Spotlight` search on your iOS device,\
    \ you might see results from a wide variety of apps, depending on the search text.\
    \ For a more general search, you can easily see results from a couple of dozen\
    \ or more apps.\n\n**Solution:** Configure `Spotlight` search to not show results\
    \ from apps you use only rarely or from apps you never search. To configure `Spotlight`\
    \ search, open the `Settings` app, tap `General`, and then tap `Spotlight Search`.\
    \ In the `Search Results` section, tap the switch to `Off` beside each app you\
    \ want to exclude from the search (see Figure [3-1](#A429116_1_En_3_Chapter.html#Fig1)).\n\
    \n![A429116_1_En_3_Fig1_HTML.jpg](A429116_1_En_3_Fig1_HTML.jpg)\n\n**Figure 3-1.**\
    \ In `Settings`, use the `Spotlight Search` screen to tell iOS which apps to exclude\
    \ from the search results"
