    \n# 引言\n\n如今，数以千万计的人比以往任何时候都更依赖 iOS 来完成日常任务。这些任务不仅包括打电话和发短信等典型的手机操作，还包括上网、收发电子邮件、拍照和录像、获取路线、安排约会以及使用应用程序等智能手机/平板电脑功能。我们的\
    \ iOS 设备中还存储着需要定期访问的关键信息，包括联系人、书签、笔记和日历。越来越多的人将我们的设备视为自我的延伸，使其成为我们日常生活中最关键的工具，也是唯一不可或缺的设备。\n\
    \n因此，当我们的 iOS 设备无法正常工作时（或者无法按我们期望的方式工作时），我们的生活就会被打乱，甚至可能暂时偏离轨道。如果一封邮件无法发送、网页文字难以阅读、或者某个应用冻结，我们的工作效率（甚至理智）都会受到影响。在这种情况下，我们唯一想要的就是让一切恢复正常，让生活重回正轨。\n\
    \n但如何才能让我们的 iOS 设备再次正常运行呢？毕竟，iPhone 和 iPad 是理应“即开即用”的设备。小故障、小问题或系统崩溃本不应该发生在 iOS\
    \ 上。然而，这些问题却频频发生，而且大多数时候，不仅问题发生的原因不明确，就连如何修复（以及如何防止未来再次发生）也不清楚。\n\n## 欢迎\n\n因此，欢迎阅读《iOS\
    \ 故障排查》这本书。在本书中，你将学习如何防止 iOS 问题的发生，并且（以防你的预防措施无效）了解如何自行解决许多常见问题。正是这些非显而易见的修复方法、变通方案和预防措施构成了本书的核心。本书以清晰、直接、易于理解的语言，带你了解数十个\
    \ iOS 问题，在每个案例中，你都将了解到问题发生的一些背景知识，以及一种或多种解决问题的方法，让你的设备（和你自己）恢复正常运转。\n\n## 谁应该阅读本书？\n\
    \n当 iOS 问题发生时，有许多故障排查资源可用。这些资源包括联系 Apple 支持、搜索 Apple 讨论论坛、将设备带到 Genius Bar（天才吧），或自行诊断问题。如果你是具有一定\
    \ iOS 设备使用经验的用户，但由于缺乏时间、兴趣或意愿，不愿意或无法执行这些标准的故障排查步骤，那么你应该阅读本书。对于像你这样的人来说，本书是一个高效且便捷的资源，能够让你快速解决问题，而无需借助复杂、耗时或昂贵的解决方案。\n"
- fmt: '## How This Book Is Organized


    This book isn’t meant to be read from cover to cover (although, of course, you’re
    free to do so if you wish). Instead, most of the book divides iOS troubleshooting
    into a number of targeted categories, which I hope will make it easy for you to
    locate the particular problem you want to prevent, solve, or work around.


    To help you find your way around, here’s a summary of the book’s dozen chapters:


    *   Chapter 1, “Learning Some General Troubleshooting Techniques” — This chapter
    takes you through a few useful techniques for troubleshooting most problems. If
    you don’t see a specific fix for a problem you’re having, try one or more of the
    general solutions in this chapter.

    *   Chapter 2, “Fixing Networking and Cellular Woes” — This chapter focuses on
    connectivity problems, especially those related to the cellular network and to
    Wi-Fi networks.

    *   Chapter 3, “Solving App Problems” — This chapter looks at troubles related
    to apps, such as having an app freeze on you.

    *   Chapter 4, “Resolving Web Issues” — This chapter concentrates on problems
    related to use the Safari app to surf the Web and to search for information.

    *   Chapter 5, “Overcoming Email Glitches” — This chapter tackles the Mail app
    and takes you through a number of problems related to sending and receiving email.

    *   Chapter 6, “Fixing Phone Troubles” — If you have an iPhone, this chapter looks
    at issues that might arise when receiving or making phone calls, as well as other
    problems related to the Phone app.

    *   Chapter 7, “Solving Problems Related to Cameras and Photos” — This chapter
    focuses (pun intended) on problems related to using both the Camera app to capture
    images, and the Photos app to process those images.

    *   Chapter 8, “Protecting Your Device” — This chapter shows you how to keep your
    iOS device safe by running through a few preventative maintenance tasks such as
    locking your device, backing up your data, and finding and protecting a lost device.

    *   Chapter 9, “Solving Privacy Problems” — This chapter takes a detailed look
    at how you can maintain privacy when you use iOS, including both general privacy
    issues and concerns related to web browsing privacy.

    *   Chapter 10, “Repairing Battery and Charging Problems” — This chapter looks
    at problems related to the device battery, including tracking battery use and
    extending battery life.

    *   Chapter 11, “Getting Around Accessibility Issues” — This chapter concentrates
    on configuring iOS to work around challenges related to visual, physical, and
    aural impairments or disabilities.

    *   Chapter 12, “Troubleshooting Other iOS Problems” — This chapter completes
    the book with a miscellany of troubleshooting tools, techniques, and workarounds
    for a variety of problems that didn’t fit into any of the other chapters.


    ## Features of This Book


    To help you get the most of the book and to make your troubleshooting chores more
    efficient, this book includes the following features:


    *   Throughout the book, I’ve broken many of the troubleshooting procedures and
    workarounds into easy-to-follow, step-by-step procedures.

    *   Jargon-free explanations of key concepts

    *   Extensive use of screenshots to illustrate many of the book’s procedures

    *   Tips, tricks, and shortcuts to make troubleshooting your iOS device easier
    and faster

    *   A friendly and lightly humorous tone that I hope will help you feel at home
    with the subject and keep boredom at bay


    This book also uses the following boxes to draw your attention to important (or
    merely interesting) information:


    **Note**


    The Note box presents asides that give you more information about the current
    troubleshooting topic. These tidbits provide extra insights that offer a better
    understanding of the task.


    **Tip**


    The Tip box tells you about methods that are easier, faster, or more efficient
    than the standard methods.


    **Caution**


    The all-important Caution box tells you about potential accidents waiting to happen.
    There are always ways to mess things up when you’re working with iOS. These boxes
    help you avoid those traps and pitfalls.'
