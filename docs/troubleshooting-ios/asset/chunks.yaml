- fmt: "### 阻止所有应用在后台运行\n\niOS 提供的最佳电池用量工具之一是“电池”屏幕中的“时间”图标（见图 [10-4](#A429116_1_En_10_Chapter.html#Fig4)）。启用后，此功能不仅会告知你每个应用在屏幕开启时消耗的电量，更重要的是，还会告知每个应用在后台消耗的电量。应用在后台执行任务的能力称为“后台应用刷新”，这很重要，因为虽然你知道应用何时在屏幕上活跃，但\
    \ iOS 通常不会给出提示，因此你并不总是知道它何时在后台活跃。\n\n实际上，这意味着如果电池电量不足，你可以停止使用某些应用，但你不知道这些应用或其他应用是否仍在后台工作——因此仍在消耗宝贵的电池电量。\n\
    \n解决方案：你可以按照以下步骤为所有应用停用“后台应用刷新”：\n\n1.  在主屏幕上，点按“设置”以打开“设置”应用。\n2.  点按“通用”以打开“通用”屏幕。\n\
    3.  点按“后台应用刷新”以打开“后台应用刷新”屏幕。\n4.  将“后台应用刷新”开关点按至“关闭”，如图 [10-5](#A429116_1_En_10_Chapter.html#Fig5)\
    \ 所示。\n\n    ![A429116_1_En_10_Fig5_HTML.jpg](A429116_1_En_10_Fig5_HTML.jpg)\n\
    \n    图 10-5.\n\n    当电量不足时，关闭“后台应用刷新”以防止任何应用在后台运行。\n\n### 阻止特定应用在后台运行\n\n通过定期检查应用的电池用量（包括总体百分比以及屏幕开启和后台的总时间），你最终会识别出耗电大户。特别是，你会知道哪些应用通过运行后台任务来消耗设备电池。在这种情况下，为所有应用关闭“后台应用刷新”似乎有些过度，尤其是如果只是单个应用导致问题。\n\
    \n解决方案：如果你发现某个特定应用在后台任务中消耗的电量高于平均水平，并且你认为该应用无需在后台运行，则可以仅针对该应用停用“后台应用刷新”。\n\n请遵循以下步骤：\n\
    \n1.  在主屏幕上，点按“设置”以打开“设置”应用。\n2.  点按“通用”以打开“通用”屏幕。\n3.  点按“后台应用刷新”以打开“后台应用刷新”屏幕。\n\
    4.  在应用列表中，将你不再希望其在后台运行的应用旁边的开关点按至“关闭”，如图 [10-6](#A429116_1_En_10_Chapter.html#Fig6)\
    \ 所示。\n\n    ![A429116_1_En_10_Fig6_HTML.jpg](A429116_1_En_10_Fig6_HTML.jpg)\n\
    \n    图 10-6.\n\n    你可以为某个在后台运行时消耗过多电池电量的单个应用禁用“后台应用刷新”。\n\n### 希望 iOS 设备使用更少电量\n\
    \n当 iOS 设备电池电量不足，或者虽然电量充足但你知道需要长时间使用设备时，将设备配置为在其他任务上使用更少电量将是有益的。\n\n解决方案：你将在下一节学到许多节省电量的技巧。然而，iOS\
    \ 提供了一种降低设备总功耗的简便方法。它称为“低电量模式”，通过以下方式节省电池寿命：\n\n*   关闭“后台应用刷新”\n*   禁用“邮件”应用的推送功能（应用自动检查新邮件）\n\
    *   停用所有自动内容下载\n*   阻止所有自动应用更新\n*   禁用一些视觉效果\n*   调暗屏幕\n\n当电池电量降至 20% 时，iOS 会询问你是否要切换到“低电量模式”，如图\
    \ [10-7](#A429116_1_En_10_Chapter.html#Fig7) 所示。（当电量降至 10% 时，此消息会再次出现。）点按“低电量模式”以启用此功能。\n\
    \n![A429116_1_En_10_Fig7_HTML.jpg](A429116_1_En_10_Fig7_HTML.jpg)\n\n图 10-7.\n\
    \n当设备电池电量降至 20% 时，iOS 会询问你是否要切换到“低电量模式”\n\n要手动启用“低电量模式”，请执行以下步骤：\n\n1.  在主屏幕上，点按“设置”以打开“设置”应用。\n\
    2.  点按“电池”以打开“电池”屏幕。\n3.  将“低电量模式”开关点按至“开启”，如图 [10-8](#A429116_1_En_10_Chapter.html#Fig8)\
    \ 所示。请注意，查看电池图标可以判断此功能是否处于活动状态，在“低电量模式”下，该图标会变为黄色。\n\n    ![A429116_1_En_10_Fig8_HTML.jpg](A429116_1_En_10_Fig8_HTML.jpg)\n\
    \n    图 10-8.\n\n    要手动启用“低电量模式”，请在“设置”应用中打开“电池”屏幕，然后将“低电量模式”开关点按至“开启”。\n\n注意\n\
    \n在“低电量模式”开启的情况下，iOS 会自动将设备配置为 30 秒后自动锁定，并禁用“自动锁定”设置。"
  raw: "### You Want to Prevent All Your Apps from Running in the Background\n\nOne\
    \ of the best battery usage tools that iOS has to offer is the Time icon in the\
    \ Battery screen (see Figure [10-4](#A429116_1_En_10_Chapter.html#Fig4), earlier).\
    \ When activated, this feature tells you not only how much time each app has been\
    \ using the battery while onscreen but, more importantly, how much time each app\
    \ has been draining battery power in the background. The capability of an app\
    \ to perform tasks in the background is called Background App Refresh and it's\
    \ important because although you know when an app is active onscreen , you don't\
    \ always know when it's active in the background, since iOS usually gives you\
    \ no indication.\n\nIn practical terms, this means that if your battery is running\
    \ low, you can stop using certain apps, but you won't know if those or other apps\
    \ are still working – and therefore using up precious battery power – in the background.\n\
    \nSolution: You can deactivate Background App Refresh for all apps by following\
    \ these steps:\n\n1.  On the Home screen, tap Settings to open the Settings app.\
    \  \n2.  Tap General to open the General screen.  \n3.  Tap Background App Refresh\
    \ to open the Background App Refresh screen.  \n4.  Tap the Background App Refresh\
    \ switch to Off, as shown in Figure [10-5](#A429116_1_En_10_Chapter.html#Fig5)).\n\
    \n    ![A429116_1_En_10_Fig5_HTML.jpg](A429116_1_En_10_Fig5_HTML.jpg)\n\n    Figure\
    \ 10-5.\n\n    When faced with a low battery, turn off Background App Refresh\
    \ to prevent any app from running in the background\n\n### You Want to Prevent\
    \ a Specific App from Running in the Background\n\nBy regularly examining the\
    \ battery usage of your apps – both as an overall percentage and as total time\
    \ onscreen and in the background – you will eventually come to recognize any battery\
    \ hogs. In particular, you'll come to know which apps are using up your device\
    \ battery by running background tasks. Turning off Background App Refresh for\
    \ all apps seems like overkill in this case, particularly if it's just a single\
    \ app that's causing a problem.\n\nSolution: If you see that a particular app\
    \ is using up a higher than average amount of battery power in background tasks,\
    \ and if you don't feel it's necessary for the app to run in the background, you\
    \ can deactivate Background App Refresh for just that app.\n\nHere are the steps\
    \ to follow:\n\n1.  On the Home screen, tap Settings to open the Settings app.\
    \  \n2.  Tap General to open the General screen.  \n3.  Tap Background App Refresh\
    \ to open the Background App Refresh screen.  \n4.  In the list of apps, tap the\
    \ switch to Off beside the app you no longer want to operate in the background,\
    \ as shown in Figure [10-6](#A429116_1_En_10_Chapter.html#Fig6).\n\n    ![A429116_1_En_10_Fig6_HTML.jpg](A429116_1_En_10_Fig6_HTML.jpg)\n\
    \n    Figure 10-6.\n\n    You can disable Background App Refresh for an individual\
    \ app that's been using up too much battery power while running in the background\n\
    \n### You Want Your iOS Device to Use Less Battery Power\n\nWhen your iOS device\
    \ battery is running low, or if you still have plenty of battery power but you\
    \ know you'll need to use the device for a long stretch, it would be advantageous\
    \ to configure the device to use less battery power on other tasks.\n\nSolution:\
    \ You learn quite a few techniques for preserving battery power in the next section.\
    \ However, iOS offers an easy method for reducing the overall power consumption\
    \ of your device. It's called Low Power Mode and it saves battery life by doing\
    \ the following:\n\n*   Turning off Background App Refresh\n*   Disabling the\
    \ Mail app's push feature (where the app checks for new mail automatically)\n\
    *   Deactivating all automatic content downloads\n*   Preventing all automatic\
    \ app upgrade\n*   Disabling a few visual effects\n*   Dimming the screen\n\n\
    iOS asks if you want to switch to Lower Power mode when the battery level falls\
    \ to 20 percent, as shown in Figure [10-7](#A429116_1_En_10_Chapter.html#Fig7).\
    \ (This message appears again when the level falls to 10 percent.) Tap Low Power\
    \ Mode to activate this feature.\n\n![A429116_1_En_10_Fig7_HTML.jpg](A429116_1_En_10_Fig7_HTML.jpg)\n\
    \nFigure 10-7.\n\nWhen your device's battery level falls to 20 percent, iOS asks\
    \ if you want to switch to Low Power Mode\n\nTo activate Low Power Mode manually,\
    \ follow these steps:\n\n1.  On the Home screen, tap Settings to open the Settings\
    \ app.  \n2.  Tap Battery to open the Battery screen.  \n3.  Tap the Low Power\
    \ Mode switch to On, as shown in Figure [10-8](#A429116_1_En_10_Chapter.html#Fig8).\
    \ Note that you can tell when this feature is active by looking at the battery\
    \ icon, which turns yellow during Low Power Mode.\n\n    ![A429116_1_En_10_Fig8_HTML.jpg](A429116_1_En_10_Fig8_HTML.jpg)\n\
    \n    Figure 10-8.\n\n    To activate Low Power Mode manually, open the Battery\
    \ screen in the Settings app and then tap the Low Power Mode switch to On  \n\n\
    Note\n\nWith Low Power mode on, iOS automatically configures your device to auto-lock\
    \ in 30 seconds and it disables the Auto-Lock setting."
  trans: "\n### 阻止所有应用在后台运行\n\niOS 提供的最佳电池用量工具之一是“电池”屏幕中的“时间”图标（见图 10-4）。启用后，此功能不仅会告知你每个应用在屏幕开启时消耗的电量，更重要的是，还会告知每个应用在后台消耗的电量。应用在后台执行任务的能力称为“后台应用刷新”，这很重要，因为虽然你知道应用何时在屏幕上活跃，但\
    \ iOS 通常不会给出提示，因此你并不总是知道它何时在后台活跃。\n\n实际上，这意味着如果电池电量不足，你可以停止使用某些应用，但你不知道这些应用或其他应用是否仍在后台工作——因此仍在消耗宝贵的电池电量。\n\
    \n解决方案：你可以按照以下步骤为所有应用停用“后台应用刷新”：\n\n1.  在主屏幕上，点按“设置”以打开“设置”应用。\n2.  点按“通用”以打开“通用”屏幕。\n\
    3.  点按“后台应用刷新”以打开“后台应用刷新”屏幕。\n4.  将“后台应用刷新”开关点按至“关闭”，如图 10-5 所示。\n\n    ![A429116_1_En_10_Fig5_HTML.jpg](img/A429116_1_En_10_Fig5_HTML.jpg)\n\
    \n    图 10-5.\n\n    当电量不足时，关闭“后台应用刷新”以防止任何应用在后台运行。\n\n### 阻止特定应用在后台运行\n\n通过定期检查应用的电池用量（包括总体百分比以及屏幕开启和后台的总时间），你最终会识别出耗电大户。特别是，你会知道哪些应用通过运行后台任务来消耗设备电池。在这种情况下，为所有应用关闭“后台应用刷新”似乎有些过度，尤其是如果只是单个应用导致问题。\n\
    \n解决方案：如果你发现某个特定应用在后台任务中消耗的电量高于平均水平，并且你认为该应用无需在后台运行，则可以仅针对该应用停用“后台应用刷新”。\n\n请遵循以下步骤：\n\
    \n1.  在主屏幕上，点按“设置”以打开“设置”应用。\n2.  点按“通用”以打开“通用”屏幕。\n3.  点按“后台应用刷新”以打开“后台应用刷新”屏幕。\n\
    4.  在应用列表中，将你不再希望其在后台运行的应用旁边的开关点按至“关闭”，如图 10-6 所示。\n\n    ![A429116_1_En_10_Fig6_HTML.jpg](img/A429116_1_En_10_Fig6_HTML.jpg)\n\
    \n    图 10-6.\n\n    你可以为某个在后台运行时消耗过多电池电量的单个应用禁用“后台应用刷新”。\n\n### 希望 iOS 设备使用更少电量\n\
    \n当 iOS 设备电池电量不足，或者虽然电量充足但你知道需要长时间使用设备时，将设备配置为在其他任务上使用更少电量将是有益的。\n\n解决方案：你将在下一节学到许多节省电量的技巧。然而，iOS\
    \ 提供了一种降低设备总功耗的简便方法。它称为“低电量模式”，通过以下方式节省电池寿命：\n\n*   关闭“后台应用刷新”\n*   禁用“邮件”应用的推送功能（应用自动检查新邮件）\n\
    *   停用所有自动内容下载\n*   阻止所有自动应用更新\n*   禁用一些视觉效果\n*   调暗屏幕\n\n当电池电量降至 20% 时，iOS 会询问你是否要切换到“低电量模式”，如图\
    \ 10-7 所示。（当电量降至 10% 时，此消息会再次出现。）点按“低电量模式”以启用此功能。\n\n![A429116_1_En_10_Fig7_HTML.jpg](img/A429116_1_En_10_Fig7_HTML.jpg)\n\
    \n图 10-7.\n\n当设备电池电量降至 20% 时，iOS 会询问你是否要切换到“低电量模式”\n\n要手动启用“低电量模式”，请执行以下步骤：\n\n\
    1.  在主屏幕上，点按“设置”以打开“设置”应用。\n2.  点按“电池”以打开“电池”屏幕。\n3.  将“低电量模式”开关点按至“开启”，如图 10-8\
    \ 所示。请注意，查看电池图标可以判断此功能是否处于活动状态，在“低电量模式”下，该图标会变为黄色。\n\n    ![A429116_1_En_10_Fig8_HTML.jpg](img/A429116_1_En_10_Fig8_HTML.jpg)\n\
    \n    图 10-8.\n\n    要手动启用“低电量模式”，请在“设置”应用中打开“电池”屏幕，然后将“低电量模式”开关点按至“开启”。\n\n注意\n\
    \n在“低电量模式”开启的情况下，iOS 会自动将设备配置为 30 秒后自动锁定，并禁用“自动锁定”设置。\n"
- fmt: "### You Want to Use as Little Battery Power as Possible\n\nIf battery power\
    \ is scarce, there's no power outlet in sight, but you really need to use your\
    \ iOS device, then you need to minimize the amount of battery power the device\
    \ uses.\n\n**Solution:** Here are a few suggestions to try that should help you\
    \ to reduce your device's battery consumption to a minimal, while still retaining\
    \ some functionality:\n\n- **Minimize the number of apps you run.** If you won't\
    \ be able to charge your iOS device for a while, avoid background chores, such\
    \ as playing music; or secondary chores, such as organizing your contacts. If\
    \ your only goal is to read all your email, stick to that until it's done because\
    \ you don't know how much time you have.\n- **Make sure `Auto-Lock` is working.**\
    \ You don't want your iOS device using up battery power while it's idle, so make\
    \ sure `Auto-Lock` is on the job. Open `Settings`, tap `Display & Brightness`,\
    \ tap `Auto-Lock`, and then tap a short time interval (such as 1 Minute on the\
    \ iPhone or 2 Minutes on the iPad).\n- **Put your iOS device into sleep mode manually,\
    \ if necessary.** If you are interrupted – for example, the pizza delivery guy\
    \ shows up on time – don't wait for your iOS device to put itself to sleep because\
    \ those few seconds or minutes use precious battery time. Instead, put your device\
    \ to sleep manually right away by pressing the `Sleep/Wake` button.\n- **Turn\
    \ off Wi-Fi if you don't need it.** When Wi-Fi is on, it regularly checks for\
    \ available wireless networks, which drains the battery. If you don't need to\
    \ connect to a wireless network, turn off Wi-Fi to conserve energy. Open `Settings`,\
    \ tap `Wi-Fi`, and then tap the `Wi-Fi` switch to `Off`.\n- **Turn off cellular\
    \ data if you don't need it.** Your iPhone or cellular-enabled iPad constantly\
    \ looks for nearby cellular towers to maintain the signal, which can use up battery\
    \ power in a hurry. If you're surfing on a Wi-Fi network, you don't need cellular\
    \ data, so turn it off. Open `Settings`, tap `Cellular`, and then tap the `Cellular\
    \ Data` switch to `Off`.\n- **Turn off GPS if you don't need it.** When GPS is\
    \ on, the receiver exchanges data with the GPS system regularly, which uses up\
    \ battery power. If you don't need the GPS feature for the time being, turn off\
    \ the GPS antenna. Open `Settings`, tap `Privacy`, tap `Location Services`, and\
    \ then tap the `Location Services` switch to `Off`.\n- **Turn off Bluetooth if\
    \ you don't need it.** When Bluetooth is running, it constantly checks for nearby\
    \ Bluetooth devices, and this drains the battery. If you aren't using any Bluetooth\
    \ devices, turn off Bluetooth to save energy. Open `Settings`, tap `Bluetooth`,\
    \ and then tap the `Bluetooth` switch to `Off`.\n- **Slow the auto-check on your\
    \ email.** Having your email frequently poll the server for new messages eats\
    \ up your battery. Set it to check every hour or, ideally, set it to `Manual`\
    \ check if you can. To do this, tap `Settings`, tap `Mail`, tap `Accounts`, and\
    \ then tap `Fetch New Data`. In the `Fetch` section, tap either `Hourly` or `Manually`.\n\
    - **Turn off push.** If you're not using Low Power Mode and if you have an iCloud\
    \ or Exchange account, consider turning off the push feature to save battery power.\
    \ Tap `Settings`, tap `Mail`, tap `Accounts`, and then tap `Fetch New Data`. In\
    \ the `Fetch New Data` screen, tap the `Push` switch to `Off`, and in the `Fetch`\
    \ section, tap `Manually`. See Figure [10-10](#A429116_1_En_10_Chapter.html#Fig10).\n\
    \n    ![A429116_1_En_10_Fig10_HTML.jpg](A429116_1_En_10_Fig10_HTML.jpg)\n    **Figure\
    \ 10-10.** Turn off Push to ensure that this background task doesn't eat up your\
    \ battery\n\n- **Deactivate Background App Refresh.** When you're desperate for\
    \ juice, you probably don't need your apps working in the background. See the\
    \ section \"You want to prevent all your apps from running in the background,\"\
    \ to learn how to turn off `Background App Refresh`. As an alternative, consider\
    \ leaving that switch on but turning off `Background App Refresh` for individual\
    \ apps (particularly active apps such as Facebook and Gmail); see the section\
    \ \"You want to prevent a specific app from running in the background.\"\n- **Turn\
    \ on Low Power Mode.** Don't wait until your battery level falls to 20 percent,\
    \ which is when iOS automatically offers to turn on `Low Power Mode` for you.\
    \ Turn it on manually earlier to increase battery life. I showed you how to activate\
    \ `Low Power Mode` by hand in the section \"You want your iOS device to use less\
    \ battery power.\"\n- **Dim the screen.** The touchscreen drains a lot of battery\
    \ power, so dimming it reduces the amount of power used. On the Home screen, tap\
    \ `Settings`, tap `Display & Brightness`, and then drag the `Brightness` slider\
    \ to the left to dim the screen. Also, tap the `Auto-Brightness` switch to `Off`,\
    \ as shown in Figure [10-9](#A429116_1_En_10_Chapter.html#Fig9).\n\n    ![A429116_1_En_10_Fig9_HTML.jpg](A429116_1_En_10_Fig9_HTML.jpg)\n\
    \    **Figure 10-9.** Dim the screen to the lowest brightness that lets you still\
    \ read the screen, and turn off the Auto-Brightness feature\n\n> **Note:** If\
    \ you don't need all four of the device antennae — Wi-Fi, cellular, GPS, and Bluetooth\
    \ — for a while, a faster way to turn them off is to switch your iOS device to\
    \ airplane mode. Either open `Settings` and then tap the `Airplane Mode` switch\
    \ to `On`, or swipe up from the bottom to reveal the Control Center and then tap\
    \ the `Airplane Mode` icon.\n\n## Troubleshooting Other Battery Problems\n\nI'll\
    \ close this chapter with a quick look at two more solutions to battery-related\
    \ problems."
