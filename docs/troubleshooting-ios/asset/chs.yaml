- "# 学习一些常规故障排除技巧\n\n当你使用电脑时——尤其是 Windows PC，但 Mac 也不例外——一种莫名的紧张感始终潜藏在你的意识表层之下。这种惶恐源于经验：你的电脑过去不仅崩溃过很多次，而且最近也发生过。所以从某种意义上说，你只是在等待情况变糟，因为你知道它们终究会来。\n\
  \n而当你使用 iPhone、iPad 或其他 iOS 设备时，那种潜在的不安感却无迹可寻。这种令人愉悦的无焦虑状态同样源于经验：你的 iOS 设备几乎从不崩溃，所以你也不会期待它崩溃。不过请注意，我说的是“几乎从不”。现实情况是，尽管其发生频率远低于\
  \ Windows 或 macOS，但 iOS 问题确实存在。这并不意外，因为 iPhone、iPad 和 iPod touch 是极其精密的设备——实际上，它们是功能齐全的计算机。而任何精密设备由于其极高的复杂性，总会出现问题。幸运的是，iOS\
  \ 设备的活动部件比常规电脑更少，所以总体上硬件出问题的可能性更小。你在软件方面也会遇到更少的问题，因为应用开发者只需让自己的产品适配相对少量的设备，而这些设备都是由同一家公司制造的。这确实简化了事情，结果就是更少的问题。但再次强调，并非零问题。\n\
  \n为了帮助你排查可能出现的任何硬件或软件故障，本章提供了一些适用于所有 iOS 设备（iPhone、iPad 和 iPod touch）的通用故障排除技巧。\n\
  \n### 重启与重新启动\n\n如果你的 iOS 设备行为异常或运行不稳，可能是设备内部的某个特定组件导致的。这种情况下，你除了将设备留在天才吧，或寄回给 Apple\
  \ 维修外，没有太多选择。不过幸运的是，大多数故障都是暂时性的，通常可以通过使用一些标准技巧来修复，特别是重启或重新启动你的设备。\n\n如果你的 iPhone\
  \ 行为异常或运行不稳，可能是手机内部的某个特定组件导致的。这种情况下，你除了将 iPhone 寄回给 Apple 维修外，没有太多选择。不过幸运的是，大多数故障都是暂时性的，通常可以通过使用以下一种或多种技巧来修复：\n\
  \n#### 重启你的设备\n\n迄今为止，解决 iOS 设备问题最常用的方法是将其关机，然后再启动。通过重新启动设备，你重置了整个系统，这通常足以解决许多问题。\n\
  \n你可以使用`休眠/唤醒`按钮来重启 iOS 设备，该按钮的位置取决于你的设备：\n\n*   对于 iPhone 6 及更新机型，该按钮位于手机右侧边缘，靠近顶部。\n\
  *   对于所有其他 iOS 设备，该按钮位于设备顶部边缘，靠右侧。\n\n按住`休眠/唤醒`按钮几秒钟，直到出现“滑动来关机”屏幕（此时你可以松开按钮）。向右拖动“滑动来关机”滑块以开始关机。当屏幕完全变黑时，你的设备已关机。要重新启动，按住`休眠/唤醒`按钮直到看到\
  \ Apple 标志，然后松开按钮。\n\n#### 重新启动你的设备硬件\n\n当你通过按住`休眠/唤醒`按钮几秒钟来重启 iOS 设备时，你实际上是在重新启动系统软件。如果这仍然不能解决问题，你可能还需要重新启动设备硬件。为此，请同时按住`休眠/唤醒`按钮和`主屏幕`按钮。保持按住状态直到看到\
  \ Apple 标志（大约需要 8 秒左右），这表明重启成功。\n\n**注意**\n\n如果你的 iOS 设备真的卡住了，仅仅按住`休眠/唤醒`按钮无效时，硬件重启也是可行的方法。这种情况确实会发生。\n\
  \n### 更新软件\n\n当 iOS 连接到互联网时，它会时不时地检查可用更新。如果有可用更新，你会在`设置`应用图标上看到一个角标，如图 1-1 所示。你也可能会看到一条“软件更新”通知，告知你新版本的\
  \ iOS 已准备好安装。\n\n![A429116_1_En_1_Fig1_HTML.jpg](img/A429116_1_En_1_Fig1_HTML.jpg)\n\
  \n**图 1-1.** 当 iOS 检测到有可用更新时，它会通过在`设置`应用图标上显示角标来提醒你\n\n要开始更新，请遵循以下步骤：\n\n1.  如果显示了“软件更新”提醒，请轻点“立即安装”。否则，在主屏幕上，轻点“设置”。`设置`应用会打开。\n\
  2.  轻点“通用”。iOS 会显示“通用”屏幕。如图 1-2 所示，当有可用更新时，你也会在“通用”标签和“软件更新”命令上看到角标。\n\n    ![A429116_1_En_1_Fig2_HTML.jpg](img/A429116_1_En_1_Fig2_HTML.jpg)\n\
  \n    **图 1-2.** 当更新就绪时，iOS 会在`设置`应用的“通用”标签和“软件更新”命令上显示角标\n3.  轻点“下载并安装”。iOS 会下载更新，然后继续安装，这需要几分钟时间。\n\
  \n**警告**\n\n仅当你的 iOS 设备在整个更新操作期间保持超过 50% 的电量时，它才会完成更新。为确保更新成功，请将设备插入交流电源插座，或仅在电池充满电时运行更新。\n\
  \n### 从备份恢复你的设备\n\n通常，仅仅更改一个设置、添加一个应用或一些数据就可能导致你的 iOS 设备行为异常。理想情况下，修复方法是将设置恢复到之前的状态，或移除应用或数据，但并不总是能明确找出是哪个设置或内容片段出了问题。\n\
  \n一个解决方案是通过恢复最近的备份将设备恢复到较早的状态。如果追溯到足够早的时间，你应该能恢复到问题不存在的状态。（理想情况下，你不应回溯到超出必要的时间点，因为那样你冒失去其他设置、应用和数据等过多内容的风险。）\n\
  \n请遵循以下步骤来恢复最近的备份：\n\n1.  在你的设备上，关闭“查找我的 iPhone”（如果已开启）。操作方法：打开`设置`，轻点 iCloud，轻点`查找我的设备`（其中`设备`是\
  \ iPhone、iPad 或 iPod），将`查找我的设备`开关轻点至关闭，然后输入你的 Apple 密码。\n2.  将你的设备连接到电脑。\n3.  在\
  \ iTunes 中，点击设备图标。\n4.  点击“摘要”标签。\n5.  点击“恢复备份”。iTunes 会要求你选择一个要恢复的备份，如图 1-3 所示。\n\
  \n    ![A429116_1_En_1_Fig3_HTML.jpg](img/A429116_1_En_1_Fig3_HTML.jpg)\n\n    **图\
  \ 1-3.** 选择在设备开始出现问题之前创建的较早备份\n6.  选择你想要恢复的较早备份。这应该是在问题首次出现之前创建的最新备份。\n7.  点击“恢复”。iTunes\
  \ 会恢复备份并重新启动设备。\n\n### 恢复出厂设置\n\n有时你的 iOS 设备会完全瘫痪，因为其设置已损坏。在这种情况下，你可以通过将设备恢复为默认出厂设置来解决问题。\n\
  \n\n\n#### 通过 iTunes 恢复出厂设置\n\n恢复出厂设置的最佳方法是使用 iTunes 中的`恢复`功能，因为这样你既可以备份，也能恢复你在设备上更改过的任何设置。这里有几点需要考虑：\n\
  \n- 如果损坏的设置是某个你从未更改过的 iOS 默认设置，那么恢复操作将会覆盖该损坏的设置，你的问题应该会得到解决。在这种情况下，你应该进行备份并恢复你自己的设置。\n\
  - 如果损坏的设置是你曾经更改过的，那么备份并恢复你的设置很可能会导致问题再次出现。在这种情况下，你不应该备份并恢复你的设置。\n\n那么你应该选择哪条路径呢？首先，尝试通过备份并恢复你的设置来运行恢复流程。如果问题消失了，那你就搞定了；如果问题再次出现，则意味着你更改的某个设置是罪魁祸首，所以你应该重复恢复操作，但这次不要备份你的设置。\n\
  \n在继续之前，请注意，这些步骤要求你的设备能够连接到电脑，并在 iTunes 中可见。如果不是这种情况，请参阅下一节中重置设备的说明。否则，请按照以下步骤恢复你的设备：\n\
  \n1.  在你的设备上，如果`查找我的 iPhone`已打开，请将其关闭。你可以通过依次打开`设置`、轻点`iCloud`、轻点`查找我的设备`（其中“设备”指\
  \ iPhone、iPad 或 iPod）、将`查找我的设备`开关滑到`关闭`位置，然后输入你的 Apple 密码来完成此操作。\n2.  将你的设备连接到电脑。\n\
  3.  在 iTunes 中，点击设备图标。\n4.  点击`摘要`标签页。\n5.  点击`立即备份`。这确保了 iTunes 拥有你设备和设置数据的备份副本。**注意：**\
  \ 默认情况下，iTunes 不会备份敏感信息，例如保存的密码、网站历史记录和健康数据。要备份这些数据，请选中`加密设备备份`复选框（其中“设备”指 iPhone、iPad\
  \ 或 iPod），然后运行备份。\n6.  点击`恢复设备`（其中“设备”指 iPhone、iPad 或 iPod）。iTunes 会要求你确认要恢复。\n\
  7.  点击`恢复`，然后按照屏幕上的提示操作。iTunes 会下载 iOS 并恢复原始设置。当你的设备重新启动时，iTunes 会连接到它，并可能要求你输入你的\
  \ Apple ID 凭据。完成此操作后，iTunes 会显示`欢迎使用您的新设备`屏幕，如图 1-4 所示。\n\n    ![A429116_1_En_1_Fig4_HTML.jpg](img/A429116_1_En_1_Fig4_HTML.jpg)\n\
  \n    **图 1-4.** 当您恢复出厂设置的设备重新启动时，iTunes 会提供恢复您已备份的设置和数据选项\n\n8.  选择`从此备份恢复`选项。\n\
  9.  如果你碰巧备份了多个设备，请使用列表选择你的设备。\n10. 点击`继续`。iTunes 会恢复你备份的数据，重新启动你的设备，并同步它。\n11. 浏览各标签页，检查同步设置，确保它们按你想要的方式配置。\n\
  12. 如果你对设置做了任何更改，请点击`应用`。这确保你的设备恢复了所有数据。\n\n#### 在设备上恢复出厂设置\n\n如果你的设备出现问题，无法连接到电脑或被\
  \ iTunes 识别，你仍然可以直接在设备上恢复出厂默认设置。以下是操作步骤：\n\n1.  在主屏幕上轻点`设置`。\n2.  轻点`通用`。\n3.  轻点`还原`。\n\
  4.  轻点`还原所有设置`。\n5.  如果你的设备受密码保护，请输入密码以继续。\n6.  当 iOS 要求你确认时，轻点`还原所有设置`。\n\n###\
  \ 排除已连接配件的故障\n\n将配件连接到 iOS 设备的方式只有几种：使用耳机插孔、Lightning 接口或蓝牙。尽管你可以连接的配件数量相对有限，但这并不意味着你可能永远不会遇到这些配件的问题。\n\
  \n如果你连接到 iOS 设备的配件出现故障，好消息是很多这类问题的原因相对有限。你可以尝试一些经过验证的补救措施，或许能让配件恢复正常工作。如果问题原因不明显，那么你的硬件故障排除步骤应始终从这些非常基本的方法开始：\n\
  \n- **检查连接、电源开关等。** 一些最常见（也最令人尴尬）的硬件问题原因就是简单的物理因素，因此请确保已连接的配件已打开，并检查线缆（如果有）是否正确插入。例如，如果你无法通过\
  \ iOS 设备上的 Wi-Fi 连接访问互联网，请确保你的网络路由器已打开。同时确保路由器与 ISP 调制解调器之间的线缆（如果它们不是像现在常见的那样集成在一个设备中）正确连接。\n\
  - **更换电池。** 像耳机这样的无线设备确实很费电，因此如果此类设备工作不稳定（或完全不工作），请始终尝试更换电池，看看是否能解决问题。\n- **先关闭配件再重新打开。**\
  \ 你通过关闭设备，等待几秒钟让其内部完全停止运转，然后再重新打开来对设备进行断电重启。你会惊讶于这个简单的操作能让多少设备恢复运行。对于没有开/关按钮的设备，可以尝试将其从电源插座上拔下，或者取出并重新安装电池。\n\
  - **重置配件的默认设置。** 如果你可以配置该配件，那么可能是某个新设置导致了问题。如果你最近进行了更改，请尝试将该设置恢复为其原始值。如果这不起作用，大多数可配置设备都有某种`恢复默认设置`选项，让你可以快速将其恢复为出厂设置。\n\
  - **升级配件的固件。** 一些设备带有固件——一个在设备内部运行并控制其内部功能的小程序。例如，所有路由器都有固件。向制造商查询是否有新版本。如有，请下载新版本，然后参阅设备手册了解如何升级固件。\n\
  \n### 高级故障排除技巧\n\n到目前为止，你看到的这些技巧在许多情况下能让你的 iOS 设备恢复运行。如果不行，你仍然可以尝试其他一些技巧。\n\n\n\n\
  #### 无法启动 iOS 时的恢复出厂设置\n\n在极少数情况下，你的 iOS 设备会彻底失控，不仅`iTunes`无法识别该设备，甚至无法启动 iOS。如果出现这种情况，你仍然可以恢复所有内容，但必须使用一种名为设备固件升级（`DFU`）的特殊硬件模式。此模式实质上是绕过手机上当前安装的操作系统（这很好，因为在这种情况下你当前的操作系统已经报废），并指示`iTunes`安装一个全新出厂版本的\
  \ iOS。然后，你可以按照本章前面所述的方法（参见“从备份恢复你的设备”）来恢复你的数据。\n\n请按照以下步骤将你的设备置于`DFU`模式：\n\n1. \
  \ 关闭设备电源。\n2.  将设备连接到你的 Mac 或 Windows PC。\n3.  启动`iTunes`。\n4.  同时按住`睡眠/唤醒`按钮和`主屏幕`按钮，保持整整\
  \ 10 秒钟。\n5.  10 秒后，松开`睡眠/唤醒`按钮，但继续按住`主屏幕`按钮，再保持 10 秒钟。\n6.  10 秒后，松开`主屏幕`按钮。此时`iTunes`会识别出你的设备，并显示如图\
  \ 1-5 所示的对话框。\n\n    ![A429116_1_En_1_Fig5_HTML.jpg](img/A429116_1_En_1_Fig5_HTML.jpg)\n\
  \n    图 1-5. 当你在`DFU`模式下启动 iOS 设备时，`iTunes`会识别该设备并显示此对话框，提示你进行恢复。\n\n7.  点击`好`。\n\
  8.  点击`恢复设备`（其中`设备`指`iPhone`、`iPad`或`iPod`）。`iTunes`会要求你确认是否要恢复。\n9.  点击`恢复并更新`。`iTunes`会下载并安装\
  \ iOS，然后将你的设备恢复到出厂默认设置。\n\n#### 抹掉你的设备\n\n如果恢复出厂设置未能解决问题，那么可能是某些顽固的内容导致了问题。在这种情况下，你不仅需要重置所有\
  \ iOS 设置，还需要重置所有内容。操作方法如下：\n\n1.  轻点`设置`。\n2.  轻点`通用`。\n3.  轻点`还原`。\n4.  轻点`抹掉所有内容和设置`。\n\
  5.  如果设置了设备密码，请输入密码。\n6.  当 iOS 要求你确认时，轻点`抹掉设备`（其中`设备`指`iPhone`、`iPad`或`iPod`）。\n\
  \n警告\n\n除非你确实想要从原始设置和无内容的状态重新开始，否则只有在你的设备已备份的情况下才能运行“抹掉所有内容和设置”命令。请参见第 8 章“保护你的设备”。\n\
  \n"
- "# 2. 修复网络和蜂窝网络故障\n\n你的 iOS 设备让你在离线状态下也能执行大量令人满意的、有趣且有用的任务。你可以玩游戏、阅读已保存的文章、收听已下载的音乐或播客、阅读电子书、更新联系人等等。但是，iOS\
  \ 和 iPhone、iPad 以及 iPod touch 只有在能够通过 Wi-Fi 网络或蜂窝信号访问外部世界时才真正大放异彩。建立连接后，你可以上网冲浪、收发邮件、发消息、发帖、上传、下载，以及执行所有其他在线活动——这些正是当今互联生活方式的标志性行为。\n\
  \n唉，如果你在将 iOS 设备连接到网络时遇到困难，你可能不得不回到令人满意但受限的离线娱乐世界。即使你能上网，iOS 处理网络或蜂窝连接的方式也可能让你头疼。本章将带你了解许多连接问题，并提供解决方案，帮助你让\
  \ iOS 和你的网络再次顺畅运行。\n\n### 解决 Wi-Fi 问题\n\n如果你的网络变成了“非网络”（有些人也把瘫痪的网络称为“无网络”），本章提供了一些可能有用的解决方案。不过，我并没有声称这里的内容是全面的；毕竟，大多数网络问题都是由多种因素共同造成的，相对比较复杂，难以复现。相反，我只是介绍一些排查问题的一般策略，并为一些最常见的网络故障提供解决方案。\n\
  \n#### 你无法访问 Wi-Fi 网络：第一部分\n\n如果你在连接本地 Wi-Fi 网络时遇到问题，问题可能出在你的设备上，也可能出在网络本身。（这里我假设你拥有该网络的密码——如果需要的话。）我们在第一部分先假设问题出在你的设备上。\n\
  \n解决方案：先关闭 Wi-Fi 天线，然后再重新打开。这会重置天线，通常足以使连接成功。要切换天线，请打开`设置`，轻点`Wi-Fi`，将 Wi-Fi 开关（见图\
  \ 2-1）拨到`关闭`，然后再将同一个开关拨回`打开`。\n\n![A429116_1_En_2_Fig1_HTML.jpg](img/A429116_1_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1. 将 Wi-Fi 开关关闭再重新打开通常可以解决 Wi-Fi 问题。\n\n提示\n\n你还可以通过从屏幕底部向上滑动打开控制中心，然后轻点两次\
  \ Wi-Fi 图标来切换 Wi-Fi 天线的开关。轻点控制中心外部即可将其关闭。\n\n#### 你无法访问 Wi-Fi 网络：第二部分\n\n如果你的 iOS\
  \ 设备仍然无法连接到 Wi-Fi 热点，那么问题可能出在网络本身。不幸的是，由于干扰、兼容性和设备信号范围等问题，无线网络给故障排查工作带来了全新的一系列潜在问题。\n\
  \n解决方案：以下是一些你应该检查的故障排查项，以解决你遇到的任何无线连接问题：\n\n*   **重启设备。** 关闭 Wi-Fi 网络的路由器，然后再重新打开，以此重置你的硬件。如果你的网络有单独的宽带调制解调器，也应该将其重启。\n\
  *   **检查干扰。** 使用 2.4GHz 射频（RF）频段的设备，例如婴儿监视器和无绳电话，可能会对无线信号造成严重干扰。如果这些设备靠近你的无线路由器，请尝试移开或关闭它们。\n\
  \n警告\n\n你还应将无线路由器远离微波炉；微波炉可能会干扰无线信号。\n\n*   **检查信号范围。** 如果你没有收到信号或信号很弱，可能是因为你的 iOS\
  \ 设备距离 Wi-Fi 路由器太远。通常，一旦距离任何 Wi-Fi 接入点超过约 115 英尺，信号就会开始衰减（如果你使用的是 802.11n 设备，则约为\
  \ 230 英尺）。要么靠近路由器，要么打开路由器的信号范围增强功能（如果有的话）。你也可以安装一个无线信号扩展器。\n*   **更改信道。** 你可以配置你的无线路由器在特定信道上广播信号。有时一个信道比另一个信道信号更强，所以尝试更换信道。你可以通过登录路由器的配置页面，查找决定广播信道的设置来执行此操作。\n\
  *   **升级路由器的固件。** 某些网络问题是由路由器的漏洞引起的。如果制造商已经修复了这些漏洞，修复程序将出现在最新版本的路由器固件中，因此你应该升级到新版本。请查阅路由器文档了解如何执行升级。\n\
  *   **重置路由器。** 作为最后的手段，将路由器重置为出厂默认设置（请参阅设备文档了解操作方法）。请注意，如果执行此操作，你将需要从头开始设置你的网络。\n\
  \n\n\n#### iOS 自动连接到了你不再想用的网络\n\n当你加入一个 Wi-Fi 网络时，iOS 会记住你的连接详情，并在下次进入该网络范围内时自动连接。这对于你想用的网络来说很方便，但对于你不再需要的网络来说却是个麻烦。一个常见的困境是，有多个网络可用，其中某一个更理想（例如，因为它更快或更便宜）。如果你之前连接过其他部分或全部网络，那么\
  \ iOS 很有可能会选择其中之一进行自动连接，让你不得不手动连接到你想要的那个网络，平添麻烦。\n\n**解决方案：** 让 iOS 忽略你不想使用的网络：\n\
  \n1.  打开 `设置` app，然后轻点 `无线局域网` 以打开 `无线局域网` 界面。\n2.  轻点你想忘记的网络右侧的蓝色 `更多信息` 图标。iOS\
  \ 会显示该网络的设置界面。\n3.  轻点 `忽略此网络`，如图 2-2 所示。iOS 会要求你确认。\n\n   ![A429116_1_En_2_Fig2_HTML.jpg](img/A429116_1_En_2_Fig2_HTML.jpg)\n\
  \n   **图 2-2.** 如果你不再想连接某个特定网络，请轻点 `忽略此网络` 按钮\n\n4.  轻点 `忽略`。iOS 会丢弃该网络的登录数据，并且不再自动连接到该网络。\n\
  \n#### 你频繁收到加入附近 Wi-Fi 网络的提示\n\n默认情况下，当你的设备需要网络连接，而你又尚未连接到任何 Wi-Fi 网络时，iOS 会显示 `选取无线局域网`\
  \ 对话框，列出附近网络。然而，当你穿梭于城镇之间时，可能会发现随着新的 Wi-Fi 网络进入范围，这个对话框弹出得过于频繁（尽管 iOS 足够智能，当你快速移动时——例如开车时——不会弹出提示）。这些不断的提示既烦人又不便。\n\
  \n**解决方案：** 让 iOS 停止提示你加入附近网络。打开 `设置` app，轻点 `无线局域网`，然后将 `询问是否加入网络` 开关轻点至 `关闭`，如图\
  \ 2-3 所示。\n\n![A429116_1_En_2_Fig3_HTML.jpg](img/A429116_1_En_2_Fig3_HTML.jpg)\n\
  \n**图 2-3.** 要关闭加入附近 Wi-Fi 网络的不停提示，请将 `询问是否加入网络` 开关轻点至 `关闭`\n\n#### 你想要连接到一个隐藏的\
  \ Wi-Fi 网络\n\n每个 Wi-Fi 网络都有一个网络名称——通常称为服务集标识符或 SSID——用于向 Wi-Fi 设备标识该网络。默认情况下，Wi-Fi\
  \ 网络会广播其网络名称，以便你在 `选取无线局域网` 对话框或 `设置` app 的 `无线局域网` 界面中看到它。然而，有些 Wi-Fi 网络会出于安全考虑禁用网络名称广播。这是为什么呢？其思路是，如果未经授权的用户看不到该网络，就无法尝试连接。（但是，当授权计算机连接时，某些设备仍然可以捕获网络名称，因此这并非万无一失的安全措施。）然而，如果你是授权用户，又如何连接一个你看不到的网络呢？\n\
  \n**解决方案：** 你可以通过手动输入连接设置来连接隐藏的 Wi-Fi 网络。你需要知道网络名称、其安全性和加密类型以及网络密码。操作步骤如下：\n\n1.\
  \  打开 `设置` app，然后轻点 `无线局域网`。\n2.  在附近网络列表中，轻点 `其他`。iOS 会显示 `其他网络` 界面。\n3.  在 `名称`\
  \ 文本框中输入网络名称。\n4.  轻点 `安全性` 以打开 `安全性` 界面，然后轻点该 Wi-Fi 网络使用的安全类型：`无`、`WEP`、`WPA`、`WPA2`、`WPA\
  \ 企业级` 或 `WPA2 企业级`。如果不确定，大多数安全网络都使用 `WPA2`。\n5.  轻点 `其他网络` 以返回 `其他网络` 界面。如果你选择了\
  \ `WEP`、`WPA`、`WPA2`、`WPA 企业级` 或 `WPA2 企业级`，iOS 会提示你输入网络密码。\n6.  在 `密码` 文本框中输入密码，如图\
  \ 2-4 所示。\n\n   ![A429116_1_En_2_Fig4_HTML.jpg](img/A429116_1_En_2_Fig4_HTML.jpg)\n\
  \n   **图 2-4.** 要加入隐藏网络，请输入网络名称，选择安全类型，然后输入密码\n\n7.  轻点 `加入`。iOS 会连接到该网络。\n\n####\
  \ 你通过隔空投送发送文件时遇到问题\n\n你可以通过 iTunes 同步在 Mac 和 iOS 设备之间传输文件。但是，如果你只想将单个文件从一台设备发送到另一台，同步过程就显得大材小用了。相反，如果你的\
  \ Mac 运行的是 OS X Yosemite 或更高版本，你的 iPhone 运行的是 iOS 8 或更高版本，并且你的 Mac 和 iPhone 连接到同一个\
  \ Wi-Fi 网络，你可以使用一个名为 `隔空投送` 的工具在 Mac 和你的设备之间直接发送文件。\n\n但是，你可能会发现这两个设备互相看不到，或者文件无法传输。\n\
  \n**解决方案：** 如果你在 Mac 上看不到你的 iOS 设备，或者在 iOS 设备上看不到你的 Mac，请检查以下几点：\n\n*   确保你的 Mac\
  \ 和 iOS 设备都连接到同一个 Wi-Fi 网络。\n*   `隔空投送` 需要蓝牙和 Wi-Fi，因此请确保你的 Mac 和 iOS 设备都已启用蓝牙：\n\
  \    *   在 iOS 中，从屏幕底部向上轻扫以显示 `控制中心`，然后轻点以激活 `蓝牙` 图标。轻点 `控制中心` 外部以关闭它。\n    *  \
  \ 在 macOS（或 OS X）中，打开 `系统偏好设置`，点按 `蓝牙`，然后确保 `蓝牙` 设置为 `打开`。（如果显示 `关闭`，请点按 `打开蓝牙`。）\n\
  \n> **提示：** 如果在 iOS 中关闭了 Wi-Fi 和/或蓝牙，快速同时打开它们的方法是打开任何共享表单并轻点 `隔空投送` 图标。你也可以从屏幕底部向上轻扫以显示\
  \ `控制中心`，轻点 `隔空投送`，然后轻点 `仅限联系人`。轻点 `控制中心` 外部以关闭它。\n\n*   确保你的 iOS 设备和 Mac 彼此相距不超过\
  \ 33 英尺，这样它们才能通过蓝牙发现彼此。\n*   确保 iOS 设备已打开 `隔空投送`。从屏幕底部向上轻扫以显示 `控制中心`，轻点 `隔空投送`，然后轻点\
  \ `仅限联系人`（见图 2-5）。如果在 Mac 上仍然看不到你的设备，请改为轻点 `所有人`。\n\n  ![A429116_1_En_2_Fig5_HTML.jpg](img/A429116_1_En_2_Fig5_HTML.jpg)\n\
  \n  **图 2-5.** 在 iOS `控制中心`中，轻点 `隔空投送`，然后轻点 `仅限联系人` 或 `所有人`\n\n*   确保你的 Mac 可被发现。打开\
  \ `隔空投送` 窗口（在 `访达` 中，点按 `前往` 然后点按 `隔空投送`，或按下 `Shift+Cmd+R`）。在 `允许我被发现的方式` 列表中，选择\
  \ `仅限联系人`。如果仍然无法从 iOS 看到你的 Mac，请改为选择 `所有人`。\n*   如果你已将 `隔空投送` 设置为 `仅限联系人`，请确保你的\
  \ iOS 设备和 Mac 都已登录到同一个 iCloud 帐户。\n*   确保你的 iOS 设备和 Mac 都未处于睡眠模式。\n\n如果 `隔空投送` 文件传输失败，请尝试这些解决方案。\n\
  \n\n\n#### iOS 与 macOS 连接问题故障排除\n\n- 确保你的 iOS 设备和 Mac 均未处于“勿扰模式”：\n  - 在 iOS 设备上，从屏幕底部向上滑动以显示控制中心，然后轻点以关闭“勿扰模式”图标。\n\
  \  - 在 OS X 或 macOS 中，点击“通知”图标显示通知中心，点击“通知”标签，滚动到该标签顶部，然后点击将“勿扰模式”开关设为关闭。\n- 确保你的\
  \ iOS 设备未开启“个人热点”功能。打开“设置”应用，轻点“个人热点”，然后将“个人热点”开关设为关闭。\n- 不要尝试发送多种不同类型的文件。例如，虽然可以发送两个或更多图像文件，但不能同时发送一个图像文件和一个\
  \ PDF 文件。\n- 确保你的 Mac 未处于“旧款模式”（即配置为仅能向 2012 年或更早发布的 Mac 发送文件）。在 Mac 上，打开“隔空投送”窗口。如果你看到文字“正在搜索旧款\
  \ Mac…”，请点击“取消”以退出旧款模式。\n- 确保 Mac 防火墙未配置为阻止所有传入连接。打开“系统偏好设置”，点击“安全性与隐私”，点击“防火墙”，点击锁形图标，然后输入\
  \ Mac 的管理员密码。如有必要，点击以取消勾选“阻止所有传入连接”复选框，然后点击“确定”。\n\n如果以上方法均无效，请重置 iOS 网络设置。在“设置”应用中，依次轻点“通用”、“还原”、“还原网络设置”，然后在\
  \ iOS 要求确认时轻点“还原网络设置”。\n\n### 蜂窝网络问题故障排除\n\n如果你拥有带蜂窝天线的 iPhone 或 iPad，你就会知道只要在蜂窝网络覆盖范围内，就能拥有始终在线的数据连接所带来的自由与高效。遗憾的是，这种便利并不便宜，因此大多数蜂窝网络问题都集中在控制数据和漫游费用上。本节将带你了解这些及其他与蜂窝网络相关的问题。\n\
  \n#### 可通过 Wi-Fi 发送电子邮件，但无法通过蜂窝网络发送\n\n你可能会发现，在家或办公室可以顺利发送电子邮件，但在街上或乘车途中发送的邮件却一直停留在“邮件”应用的“发件箱”中。这虽然感觉像是一个\
  \ bug，但实际上是一项功能，因为许多蜂窝网络提供商不允许通过第三方服务器发送邮件。当你使用 Wi-Fi 时，这不是问题，因为你的信息不会通过蜂窝网络发送；但一旦离开\
  \ Wi-Fi，蜂窝网络启动，你的提供商就会阻止发送第三方邮件。\n\n解决方法：你的蜂窝网络提供商会设置一个外发服务器来处理已发送的邮件，因此你需要将该服务器设置为邮件账户的辅助\
  \ SMTP 服务器。iOS 会尝试使用账户的默认服务器发送信息，但如果失败（例如，当你处于蜂窝网络而非 Wi-Fi 网络时），系统会回退到辅助服务器，你的信息就能成功发送。\n\
  \n要设置辅助 SMTP 服务器，请遵循以下步骤：\n\n1. 打开“设置”应用，然后轻点“邮件、通讯录、日历”。\n2. 轻点你的电子邮件账户。\n3. 轻点你的外发邮件服务器。\n\
  4. 轻点“添加服务器”。\n5. 输入你蜂窝网络提供商的 SMTP 主机名，以及你的用户名和密码。\n6. 轻点“存储”。\n\n#### 不确定自己使用了多少数据\n\
  \n如果你使用 iOS 设备所对应的套餐设有每月数据流量上限，且你超出了该月度上限，那么你几乎肯定要为此特权支付高昂费用。为避免这种情况，大多数蜂窝网络提供商在你接近上限时会友善地发送一条消息。然而，如果你不信任这个过程，或者只是对这些事情过度担忧（在我看来，这是合理的），那么你可能更愿意自己留意数据使用情况。\n\
  \n解决方法：iOS 会追踪其发送或接收的蜂窝网络数据，以及如果你在覆盖区域外使用 iPhone 时发送或接收的漫游数据。首先，查看一下蜂窝网络提供商最近一次账单，特别留意账单覆盖的日期范围。例如，账单可能从上个月的\
  \ 24 号开始，到本月的 23 号结束。这很重要，因为它告诉你何时需要重置设备上的使用数据。\n\n现在按照以下步骤检查蜂窝数据使用情况：\n\n1. 打开“设置”应用，然后轻点“蜂窝网络”，显示蜂窝网络屏幕。\n\
  2. 在“蜂窝数据用量”部分，读取“当前时段”和“当前时段漫游”的值（见图 2-6）。\n\n   ![A429116_1_En_2_Fig6_HTML.jpg](img/A429116_1_En_2_Fig6_HTML.jpg)\n\
  \n   图 2-6. 读取“蜂窝数据用量”部分的值\n\n3. 如果你已处于数据周期的末尾，请轻点屏幕底部的“还原统计数据”以开始新周期的新数值。\n\n####\
  \ 想要阻止 iOS 设备使用蜂窝数据\n\n如果你已达到蜂窝数据套餐的限制，你几乎肯定想避免超额，因为费用通常高得令人望而却步。只要你在 Wi-Fi 网络覆盖范围内，或者你能自律到在没有\
  \ Wi-Fi 时不浏览网页或查看 YouTube，就没什么问题。不过，意外仍有可能发生。例如，你可能不小心轻点了电子邮件或短信中的链接，或者你家里的某个人在不知情的情况下使用了你的手机。\n\
  \n解决方法：为防止这类意外（或者仅仅是在 YouTube 方面信不过自己），你可以完全关闭蜂窝数据，这意味着你的设备只有在有 Wi-Fi 信号时才能访问互联网数据。要在你的\
  \ iOS 设备上关闭蜂窝数据，请打开“设置”应用，轻点“蜂窝网络”，然后将“蜂窝数据”开关设为关闭。\n\n#### 希望更精细地控制 iOS 设备如何使用蜂窝数据\n\
  \n与其像我上一节所述那样完全关闭蜂窝数据，你可以采取更有针对性的方法。例如，如果你有点担心超出蜂窝套餐的数据上限，那么避开相对高带宽的项目（如 FaceTime\
  \ 和 iTunes）是合理的，但可以继续使用相对低带宽的内容（如 iCloud 文稿和 Safari 阅读列表）。\n\n解决方法：你可以自行管理，但嘿，你是个大忙人，下次有\
  \ FaceTime 通话接入且你身处只有蜂窝网络的区域时，你可能会忘记。我建议将细节交由 iOS 处理，配置它不允许某些内容类型通过蜂窝连接使用。为此，请打开“设置”应用并轻点“蜂窝网络”。在“使用蜂窝数据”部分（如图\
  \ 2-7 所示），针对你希望禁止使用蜂窝网络的每种内容类型，将其开关轻点设为关闭。\n\n![A429116_1_En_2_Fig7_HTML.jpg](img/A429116_1_En_2_Fig7_HTML.jpg)\n\
  \n图 2-7. 在每个你希望禁止使用蜂窝网络的应用程序旁，将开关轻点设为关闭\n\n\n\n#### 你想要阻止 iOS 使用数据漫游\n\n数据漫游是一项常常很方便的功能，它让你在离开正常网络覆盖区域时，也能拨打电话——并且，在你的\
  \ iOS 设备上，还可以上网、查看和发送电子邮件以及互发短信。它的缺点是，除非你从移动运营商那里购买了固定费率的漫游套餐，否则漫游费用几乎总是高得令人瞠目结舌。根据你所在的位置和使用的服务类型，费用通常按每分钟或每兆字节几美元计算。这可不好！\n\
  \n不幸的是，如果你开启了 iOS 的`数据漫游`功能，即使你从未使用过你的设备，也可能会产生巨额漫游费用！这是因为 iOS 仍然会为接收新电子邮件和短信等内容执行后台检查，所以，在某个遥远的地方待上一周，即使你根本没碰手机，也可能花费你数百美元。\n\
  \n**解决方法：** 为避免这种情况，请在不需要时关闭设备上的`数据漫游`功能。操作方法如下：打开`设置`应用，轻点`蜂窝网络`，轻点`蜂窝数据选项`，然后将`数据漫游`开关轻点至`关闭`。\n\
  \n---\n\n### 蓝牙问题故障排除\n\niOS 支持一种名为蓝牙的无线技术，它让你能够与其他支持蓝牙的设备（如耳机、键盘和游戏手柄）建立无线连接。理论上，连接蓝牙设备应该极其简单，但在实际中往往并非如此，因此本节为你提供一些常见的故障排除技巧。\n\
  \n#### 你找不到蓝牙设备\n\n不出意外，如果你在`设置`应用的蓝牙窗口中看不到该设备，你就无法建立蓝牙连接。\n\n**解决方法：** 如果你在`设置`应用中看不到某个蓝牙设备，请尝试以下方法：\n\
  - 确保该设备已开启且电量充足。\n- 确保该设备处于可发现模式。与持续广播信号的 Wi-Fi 设备不同，大多数蓝牙设备只有在得到你指示时才会广播其可用性——也就是说，它们会让自己变得可被发现。大多数蓝牙设备都有一个你可以打开的开关或可以按下的按钮，以使其可被发现。\n\
  - 确保蓝牙设备与你的 iOS 设备之间的距离远小于 33 英尺（约 10 米），因为这是大多数蓝牙设备的最大有效范围。（某些所谓的 1 级蓝牙设备的有效范围是此距离的\
  \ 10 倍。）\n- 确保 iOS 已启用蓝牙。在`设置`应用中，轻点`蓝牙`，然后将`蓝牙`开关轻点至`开启`，如图 2-8 所示。\n\n  ![A429116_1_En_2_Fig8_HTML.jpg](img/A429116_1_En_2_Fig8_HTML.jpg)\n\
  \n  **图 2-8.** 在`设置`应用中，确保`蓝牙`开关设置为`开启`\n\n- 如果可能，请重启蓝牙设备。如果你无法重启该设备，或者重启后问题仍未解决，请重启你的\
  \ iOS 设备。\n- 咨询蓝牙设备制造商，确保该设备能够与 iOS 设备配对。\n\n#### 你无法与蓝牙设备配对\n\n出于安全考虑，许多蓝牙设备在建立连接前需要与另一台设备进行配对。在某些情况下，配对是通过输入一个多位数字通行密钥来完成的——iOS\
  \ 称之为`PIN`——然后你必须在蓝牙设备上输入该密钥（当然，前提是该设备有某种键盘）。对于所有其他蓝牙设备，你可以在`设置`应用的蓝牙屏幕中轻点该设备来发起配对。无论哪种方式，你可能会发现，即使该设备能在蓝牙屏幕中正常显示，你也无法将其与你的\
  \ iOS 设备配对。\n\n**解决方法：** 首先尝试上一节中的解决方案。如果你仍然无法成功配对，请让 iOS 忘记该设备的信息并重新开始配对：\n\n1.\
  \  打开`设置`应用，然后轻点`蓝牙`。\n2.  轻点蓝牙设备名称右侧的蓝色`更多信息`图标。\n3.  轻点`忽略此设备`。iOS 会要求你确认。\n4.\
  \  轻点`好`。\n5.  当该设备重新出现在`蓝牙`窗口中时，再次尝试与之配对。\n\n#### 通过已配对耳机听不到声音\n\n在你配对蓝牙耳机后，iOS\
  \ 通常会足够智能地通过耳机播放音乐，而不是通过设备的内置扬声器。这里的关键词是“通常”，因为 iOS 偶尔会无法做到这一点。\n\n**解决方法：** 你需要手动将已配对的耳机指定为输出设备。从屏幕底部向上轻扫以打开`控制中心`，轻点播放控制下方显示的`隔空播放`图标（位于`隔空投送`区域的右侧），然后轻点你已配对的蓝牙耳机（见图\
  \ 2-9）。现在，iOS 就会通过耳机播放你设备的音频了。\n\n![A429116_1_En_2_Fig9_HTML.jpg](img/A429116_1_En_2_Fig9_HTML.jpg)\n\
  \n**图 2-9.** 打开`隔空播放`屏幕，然后轻点你已配对的蓝牙耳机\n\n---\n\n"
- "# 3. 解决应用问题\n\n你的 iPhone、iPad 或 iPod touch 是一件令人印象深刻的工业设计产品。从响应灵敏的触摸屏到强大的摄像头，再到整体时尚的设计，iOS\
  \ 设备既是一件艺术品，也是一项工程杰作。但如果没有软件让它焕发生机，所有这些硬件都毫无用处；而在 iOS 世界中，这些软件以应用的形式存在。这不仅包括 iOS\
  \ 默认安装的各种应用，还包括那些可通过`App Store`下载的苹果及第三方应用。\n\n简而言之，尽管硬件一流，但你的 iOS 设备的功能和限制都是由其上安装的应用决定的。为何说是限制？因为一个残酷的事实是：如果你的应用无法正常工作，那么你的\
  \ iOS 设备也无法正常工作。如果你找不到某个应用、应用崩溃，或者应用的行为与开发者的预期不符，那么你的 iOS 体验将大打折扣。为了帮助你避免这种情况——或帮助你摆脱困境——本章将介绍一些与应用相关的常见问题及解决方案。\n\
  \n### 常规应用故障排除\n\n应用问题的范围很广，从找不到应用或它的数据（令人困扰），到应用行为异常（令人烦恼），再到应用完全无法工作（让人恼火）。好消息是，除非该应用的开发者极其无能，否则大多数应用问题都可以快速或至少直接地解决。\n\
  \n#### 你发现搜索困难，因为 iOS 从太多应用中返回结果\n\n当你在 iOS 设备上执行`聚焦搜索`时，根据搜索文本的不同，你可能会看到来自各种应用的结果。如果进行更一般的搜索，你很容易看到来自二十多个甚至更多应用的结果。\n\
  \n**解决方法：** 配置`聚焦搜索`，使其不显示来自你很少使用或从不搜索的应用的结果。要配置`聚焦搜索`，请打开`设置`应用，轻点`通用`，然后轻点`聚焦搜索`。在`搜索结果`部分，将你希望从搜索中排除的每个应用旁边的开关轻点至`关闭`（见图\
  \ 3-1）。\n\n![A429116_1_En_3_Fig1_HTML.jpg](img/A429116_1_En_3_Fig1_HTML.jpg)\n\n\
  **图 3-1.** 在`设置`中，使用`聚焦搜索`屏幕告诉 iOS 要从搜索结果中排除哪些应用\n\n\n\n#### 你找不到某个应用\n\n如果你在 App\
  \ Store 里有点忘乎所以，很容易就会让几十个图标散落在十几个甚至更多页面上（最多 15 页）。由于这些应用大多安装时没有特定顺序，要找到某个应用的图标可能会非常耗时，令人沮丧。\n\
  \n**解决方案：** 你可以重置主屏幕布局，这会执行两个操作：\n\n-   将主屏幕（可能还有部分第二屏幕，取决于设备和 iOS 版本）恢复为出厂默认图标排列。\n\
  -   按字母顺序显示你所有的第三方应用图标。\n\n**注意：** 重置主屏幕布局也会删除你创建的所有自定义应用文件夹。\n\n要重置主屏幕布局，请打开 `设置`，点击\
  \ `通用`，点击 `还原`，点击 `还原主屏幕布局`，然后在 iOS 要求确认时，点击 `还原主屏幕布局`。\n\n---\n\n#### 某个应用显示太多通知\n\
  \n就像一位吵闹或粗鲁的客人，有些应用在进入你的 iOS 系统后，会通过过频繁或过强硬的弹窗通知来回应你的邀请。\n\n**解决方案：** 通过按你的喜好配置应用的通知来控制它。打开\
  \ `设置` 应用，点击 `通知`，然后点击你想要操作的应用。iOS 会显示该应用的通知选项，如图 3-2 所示。请注意，某些应用（例如 `日历`）会将通知分成几类，因此你可能需要先点击一个类别，才能看到类似图\
  \ 3-2 所示的选项。\n\n![A429116_1_En_3_Fig2_HTML.jpg](img/A429116_1_En_3_Fig2_HTML.jpg)\n\
  \n*图 3-2.* 使用应用的通知设置来控制你看到其通知的频率和位置。\n\n现在，你可以通过以下选项配置该应用的通知：\n\n-   要完全停止该应用的通知，请将\
  \ `允许通知` 开关点击为 `关闭`。\n-   要不在“通知中心”看到该应用的通知，请将 `在“通知中心”显示` 开关点击为 `关闭`。\n-   要听不到该应用的通知声音，请将\
  \ `声音` 开关点击为 `关闭`。对于某些应用，你需要点击 `声音` 查看声音列表，然后点击 `无` 来关闭通知声音。\n-   要看不到该应用的标记图标，请将\
  \ `标记` 开关点击为 `关闭`。\n-   要不在“锁定屏幕”上看到该应用的通知，请将 `在锁定屏幕上显示` 开关点击为 `关闭`。\n-   使用 `解锁时的提醒样式`\
  \ 部分，选择你喜欢的该应用通知样式。点击 `无` 关闭提醒，或点击你想要的样式：`横幅`（几秒钟后自动消失）或 `提醒`（在你关闭前不会消失）。\n\n---\n\
  \n#### 你的 Facebook 数据未出现在“通讯录”或“日历”应用中\n\niOS 系统内置了 Facebook 支持。你可以轻松地将链接、照片和其他内容发布到你的\
  \ Facebook 时间线，甚至无需加载 Facebook 应用即可发送简单的状态更新。但是，如果你在 `通讯录` 应用中看不到你的 Facebook 好友，或在\
  \ `日历` 应用中看不到你的 Facebook 活动，那么这种内置的 Facebook 支持就远没有那么方便了。\n\n**解决方案：** 如果你在 `通讯录`\
  \ 应用中看不到你的 Facebook 好友，可以尝试以下两种方法：\n\n-   在 `设置` 应用中，点击 `Facebook`，然后将 `通讯录` 开关点击为\
  \ `开启`。\n-   在 `通讯录` 应用中，点击 `群组`，然后点击以激活 `所有 Facebook` 群组。\n\n如果你在 `日历` 应用中看不到你的\
  \ Facebook 活动，请尝试以下操作：\n\n-   在 `设置` 应用中，点击 `Facebook`，然后将 `日历` 开关点击为 `开启`。\n- \
  \  在 `日历` 应用中，点击 `日历`，然后点击以激活 `Facebook 活动` 日历。\n\n---\n\n#### 某个应用卡住了\n\n如果你的 iOS\
  \ 设备屏幕冻结，原因可能是某个应用崩溃了。\n\n**解决方案：** 通常可以通过强制退出应用来让设备恢复正常。你可以尝试两种方法：\n\n-   按住 `睡眠/唤醒`\
  \ 按钮直到出现 `滑动来关机` 屏幕；然后按住 `主屏幕` 按钮约 6 秒钟。iOS 会关闭该应用并返回主屏幕。\n-   如果某个应用卡住了，但你的设备其他方面运行正常，请双击\
  \ `主屏幕` 按钮显示多任务屏幕，根据需要向左或向右滚动以显示应用的缩略图屏幕，然后将应用缩略图向上拖到屏幕顶部。你的 iPhone 会将缩略图移出屏幕并关闭该应用。\n\
  \n---\n\n#### 你的屏幕对触摸无响应\n\n有时，你的 iOS 设备可能会冻结，无论怎么点击、滑动或威胁都无法让手机做出响应。最可能的问题是触摸屏暂时卡住了。要解决此问题，请按\
  \ `睡眠/唤醒` 按钮使设备进入睡眠状态，再次按 `睡眠/唤醒` 唤醒设备，然后拖拽 `滑动来解锁`。在大多数情况下，你现在应该可以恢复正常的 iOS 操作了。\n\
  \n如果这不起作用，那么可能是你正在使用的应用崩溃了，因此你需要按照我在“某个应用卡住了”一节中描述的方法将其关闭。\n\n---\n\n#### 某个应用占用大量空间\n\
  \n你的 iOS 设备既实用又有趣，以至于很容易忘记它也有局限性，尤其是在存储方面。如果你使用的是 16GB 设备，这一点尤为明显，但即使是容量更大的设备，如果你塞满了电影、电视节目和大量杂志订阅，也会很快被填满。\n\
  \n你可以通过连接 `iTunes` 或依次点击 `设置`、`通用`、`储存空间与 iCloud 用量` 来查看设备还剩多少可用空间。`储存空间与 iCloud\
  \ 用量` 屏幕不仅会显示你有多少可用存储空间，还允许你点击 `管理储存空间` 查看每个应用使用了多少空间。\n\n如果你发现设备空间不足，请检查各个应用，看看是否有某个应用占用了过多的硬盘空间。\n\
  \n**解决方案：** 如果发现某个占空间的“大户”，你有两种方法可以删除其数据，为设备腾出空间：\n\n-   **第三方应用。** 对于从 App Store\
  \ 下载的应用，点击该应用，点击 `删除 App`，然后在你的 iPhone 要求确认时，再次点击 `删除 App`。\n-   **内置应用。** 对于 iOS\
  \ 自带的应用（例如 `音乐` 或 `视频`），点击该应用以显示其存储在设备上的数据列表，然后点击 `编辑`。这会将列表置于编辑模式。要移除某个项目，请点击该项目左侧的红色\
  \ `删除` 按钮，然后点击出现的 `删除` 按钮（见图 3-3）。\n\n    ![A429116_1_En_3_Fig3_HTML.jpg](img/A429116_1_En_3_Fig3_HTML.jpg)\n\
  \n    *图 3-3.* 要从内置应用中移除数据，请点击红色的 `删除` 按钮，然后点击出现的 `删除` 按钮。\n\n---\n\n#### 你想控制第三方对你的应用的使用权限\n\
  \n不时会有某个应用请求访问你设备上的其他应用，例如 `通讯录`、`日历` 或 `照片`。如果你安装了很多应用，你可能已经不清楚哪些第三方程序有权访问你的其他应用。\n\
  \n**解决方案：** 你可以按照以下步骤允许或撤销特定应用的第三方权限：\n\n1.  打开 `设置` 应用，然后点击 `隐私`。\n2.  点击你想要控制访问权限的应用。iOS\
  \ 会显示已请求访问该应用的应用列表，如图 3-4 所示。\n\n    ![A429116_1_En_3_Fig4_HTML.jpg](img/A429116_1_En_3_Fig4_HTML.jpg)\n\
  \n    *图 3-4.* 你可以允许或撤销第三方对你应用的访问权限。\n\n3.  在每个应用旁边，将开关点击为 `关闭` 以撤销访问权限，或点击为 `开启`\
  \ 以允许访问。\n\n\n\n#### 您在使用 Handoff 功能时遇到问题\n\n您可以使用 Handoff 功能在 iOS 设备上开始一项任务，然后在附近的\
  \ Mac 上继续该任务。（Handoff 也支持反向操作：您可以在 Mac 上开始任务，然后在 iOS 设备上继续。）但您可能会发现 Handoff 无法正常工作，导致您无法继续任务。\n\
  \n**解决方案**：首先，确保您的设备符合以下使用 Handoff 的指南：\n\n- 您的 Mac 必须运行 OS X Yosemite 或更高版本，或任何版本的\
  \ `macOS`。\n- 您的 Mac 必须支持蓝牙 4.0。若要检查，请点击苹果图标，点击“关于本机”，点击“系统报告”，点击“蓝牙”，然后查看 LMP 版本。如果显示为\
  \ `0x6`，则您的 Mac 支持蓝牙 4.0。\n\n> **提示**  \n> 如果您的 Mac 不支持蓝牙 4.0，您可能仍可以通过安装第三方工具“Continuity\
  \ Activation Tool”来使用 Continuity 功能。该工具可从 [`https://github.com/dokterdok/Continuity-Activation-Tool`](https://github.com/dokterdok/Continuity-Activation-Tool)\
  \ 获取。\n\n- 您的 iOS 设备必须运行 iOS 8 或更高版本。\n- 您的 Mac 和设备必须登录到同一个 iCloud 账户。\n- 您的 iOS\
  \ 设备与 Mac 之间的距离应保持在约 33 英尺（约 10 米）以内。\n\n如果以上条件均已满足，请确保您的 Mac 已配置为允许 Handoff 连接：\n\
  \n1. 打开“系统偏好设置”。\n2. 点击“通用”。\n3. 勾选“允许在这台 Mac 和 iCloud 设备之间使用 Handoff”复选框。\n\n最后，确保\
  \ iOS 已配置为允许 Handoff 连接：\n\n1. 打开“设置”应用。\n2. 点击“通用”。\n3. 点击“Handoff”。\n4. 将“Handoff”开关打开。\n\
  \n### 高级应用故障排除\n\n一般来说，您完全不必担心“打开太多”iOS 应用，因为系统会自动管理您的应用及其消耗的资源。不过，我在此加入以下“问题”，以便您更深入地了解\
  \ iOS 如何管理应用的打开与关闭。\n\n#### 您打开了太多应用\n\n在 Mac 或 PC 上，打开太多程序可能会导致系统资源（尤其是内存）出现问题。然而，尽管\
  \ iOS 支持多任务处理，但它并不会像桌面电脑那样遭遇“太多应用”带来的困扰。\n\n要理解其原因，首先需要知道，在 iOS 中，多任务处理最基本的含义是：当您运行一个应用并切换到另一个应用时，设备会将第一个应用保留在后台。在大多数情况下，第一个应用在后台不执行任何操作——它不会占用当前应用的处理器时间，也不会消耗电池电量。这意味着您可以随意打开任意数量的应用。但是，如果第一个应用正在执行某项任务而您切换到另一个应用，则第一个应用会继续在后台执行该任务。\n\
  \n要深入理解 iOS 的多任务处理机制，您需要了解应用在 iOS 中的四种状态：\n\n- **运行状态**：应用已打开并拥有系统焦点。\n- **关闭状态**：此模式表示应用已完全关闭。如果您重启设备（通过关机再开机），所有应用都会进入关闭状态。\n\
  - **挂起状态**：如果您启动一个应用，然后按下主屏幕按钮返回主屏幕，iOS 通常会将正在运行的应用置于挂起状态。这意味着该应用仍保留在内存中，但没有运行，不占用处理器时间，也不消耗电池。然而，应用仍保持其当前状态，因此当您返回时，应用会从您离开的地方继续运行。\n\
  - **后台状态**：如果您启动一个应用，开始某个进程（如播放音乐），然后按下主屏幕按钮返回主屏幕，您的 iPhone 会将应用置于后台状态，这意味着它让应用的进程在后台继续运行。当您返回应用时，您会看到进程仍在运行或已经完成。\n\
  \n值得注意的是，绝大多数应用在您切换到另一个应用时会进入挂起状态。但是，如果您启动一个应用而设备没有足够的可用内存，iOS 会开始将挂起的应用置为关闭状态，以释放内存。\n\
  \n这种内置的资源管理机制，正是为什么在多任务屏幕（即双击主屏幕按钮时出现的屏幕；参见图 3-5）中“打开”了很多应用，但几乎所有这些应用都处于关闭状态，它们丝毫不会影响系统性能。（因此，您完全可以将多任务屏幕视为“最近使用的应用”屏幕。）\n\
  \n![A429116_1_En_3_Fig5_HTML.jpg](img/A429116_1_En_3_Fig5_HTML.jpg)\n\n**图 3-5**\
  \ iPhone 的多任务屏幕可能看起来有很多“打开”的应用，但其中很少有应用在使用系统资源。\n\n"
- "# 4. 解决网页问题\n\n我们生活在一个这样的世界：10 或 15 年前“信息触手可及”（内行人士称之为 IAYF）的承诺，如今已从遥不可及的白日梦变成了“让我帮你查一下”的现实。这是因为我们的指尖离接入互联网、拥有海量信息的设备——尤其是\
  \ iPhone 或支持蜂窝网络的 iPad——从未如此之近。无论您是需要解决一场争论、查找最近咖啡馆的路线，还是想起出演过《绽放》的女演员名字，您的 iOS\
  \ 设备随时都能提供帮助。\n\n值得庆幸的是，iOS 自带的 Safari 应用是一款功能齐全的浏览器，具备您可能需要的一切功能。它是一款出色的浏览器，但遗憾的是它并非完美无缺，因此您可能会遇到大小不一的困扰，影响您的上网体验。本章将解决许多最常见的\
  \ Safari 烦扰和问题，并展示如何规避它们或一劳永逸地修复它们。因此，下次您在晚宴上听到有人声称达斯汀·霍夫曼出演了《星球大战》时，您就能以创纪录的速度纠正这一说法。\n\
  \n### 网页浏览问题故障排除\n\n#### 您无法正常查看页面文本或其他信息\n\n我们身处移动网页革命已有多年，令人惊讶的是，仍有大量网站未针对移动浏览进行优化。这意味着您经常访问一些为桌面浏览器设计的网站，导致文本、图像和其他数据小得无法辨认，尤其是在较小的\
  \ iPhone 或 iPod touch 屏幕上。\n\n**解决方案**：许多网站支持您通过将两根手指放在屏幕上并分开来放大页面。要快速放大页面上有不同区域的部分，您可以双击要放大的特定区域——可以是图片、段落、表格或文本列。Safari\
  \ 会将此区域放大以填满屏幕宽度。再次双击可恢复常规视图。\n\n> **注**：双击缩放技巧并非在所有页面上都有效。如果网页开发者将页面的 `maximum-scale`\
  \ 属性设置为 `1`，则表示您无法将页面放大到超过其原始尺寸。\n\n\n\n#### 滚动回长网页顶部需要很长时间\n\n虽然大多数网页只包含一两个屏幕的文字和图片，但有些页面相当冗长，包含多个屏幕。如果你正在阅读一个特别长的网页，且接近页面底部，那么当你需要返回顶部使用地址/搜索栏时，你可能需要滚动很长一段距离。\n\
  \n解决方案：别再让你的手指受累啦！只需轻点屏幕顶部的状态栏一次，即可显示地址/搜索栏，然后再次轻点状态栏；Safari 会立即将你带到页面顶部。\n\n提示\n\
  \n如果你使用的是 iPhone 6 或更高版本的任何机型，在单手浏览网页时可能会发现很难够到屏幕顶部。请记住，你可以轻点两下 `Home` 按钮，将 Safari\
  \ 屏幕向下移动一半，使其顶部工具栏触手可及。\n\n#### 你想查看网站的桌面版\n\n许多网站会识别出你正在使用 iOS 设备浏览，并显示该网站的“移动”版本。这个版本通常更易于阅读和导航，但这种便利几乎总是以牺牲网站部分功能为代价的。\n\
  \n解决方案：如果某个网站没有显示你想要的功能，你可以请求该网站的“桌面”版本（即，你在使用桌面浏览器时会看到的完整版本）。请按照以下步骤操作：\n\n1. \
  \ 在屏幕上向下滑动以显示菜单栏。\n2.  轻点`共享`按钮。\n3.  在底部的共享操作列表中，轻点`请求桌面站点`，如图 4-1 所示。\n\n    ![A429116_1_En_4_Fig1_HTML.jpg](img/A429116_1_En_4_Fig1_HTML.jpg)\n\
  \n    图 4-1。要将网站从移动版切换为桌面版，请轻点`共享`，然后轻点`请求桌面站点`\n\n#### 你觉得网页的额外功能过于干扰\n\n在线阅读文章或随笔绝非易事。问题在于几乎每个页面上都有大量的干扰项：与文字冲突的背景颜色或图片；位于文字上方、侧边以及其中的广告；诸如搜索框、订阅链接和内容列表等网站功能；还有那些用于在\
  \ Facebook、Twitter、Pinterest 等平台与朋友分享文章的无处不在的图标。更糟糕的是，其中许多功能还会闪烁或变化，使得阅读页面内容成为一项真正的挑战。\n\
  \n解决方案：Safari 可以通过为支持的页面提供`阅读器`功能来帮你解决这个问题。`阅读器`会移除所有那些妨碍你阅读乐趣的无关页面干扰项。因此，你看到的将不再是杂乱无章的文字、图标和图片，而是纯粹、简单、足够大且易于阅读的文字。如何达到这种愉悦状态呢？轻点\
  \ Safari 屏幕顶部的标题栏，然后轻点地址栏左侧的`阅读器`按钮，如图 4-2 所示。Safari 会立即转换页面，你会看到类似于图 4-3 所示的页面（这是图\
  \ 4-2 所示页面的`阅读器`版本）。\n\n![A429116_1_En_4_Fig3_HTML.jpg](img/A429116_1_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3。网页的`阅读器`版本是一种简洁且易于阅读的文字界面\n\n![A429116_1_En_4_Fig2_HTML.jpg](img/A429116_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2。如今的网页往往充斥着广告、图标和其他小玩意儿\n\n#### 你想在后台打开新标签页\n\n根据你的 iOS 设备和 iOS 版本，当你长按一个链接然后轻点`在新标签页中打开`时，你可能会发现\
  \ Safari 会立即切换到新标签页并在你等待时加载该链接。这通常是你想要的行为，因为它能让你在新网页加载完成后立即查看。然而，你可能会发现大多数时候你更希望留在当前网页，稍后再查看新标签页。\n\
  \n解决方案：每次都多做一个额外的点击来返回当前标签页，很快就会让人感到厌烦。解决方案是配置 Safari，使其始终在后台打开新标签页。（此设置在 iPhone\
  \ 和 iPod touch 上默认关闭，但在 iPad 上默认开启。）请按照以下步骤操作：\n\n1.  在主屏幕上，轻点`设置`。设置应用会滑入。\n2.\
  \  轻点`Safari`。iOS 会显示 Safari 界面。\n3.  在 iPhone 或 iPod touch 上，轻点`打开链接`，然后轻点`在后台`，如图\
  \ 4-4 所示。在 iPad 上，将`在后台打开新标签页`开关打开。\n\n    ![A429116_1_En_4_Fig4_HTML.jpg](img/A429116_1_En_4_Fig4_HTML.jpg)\n\
  \n    图 4-4。在 iPhone 或 iPod touch 上，在`打开链接`界面中轻点`在后台`\n\n#### 你想在离线时阅读一个或多个页面\n\n\
  在浏览网页时，你经常会遇到内容引人入胜、让你迫不及待想阅读的页面。不幸的是，快速瞥一眼文章的长度，你就会意识到你需要的时间比你当前拥有的要多。你即将进行一次长途飞行或其他一段离线时间，那将是完美的阅读时机，但你如何保存网页内容以便离线阅读呢？\n\
  \n解决方案：你可以利用 Safari 的一个名为“阅读列表”的功能。顾名思义，这是一个简单的待读事项列表。当你现在没有时间阅读某内容时，将其添加到你的阅读列表，你就可以在闲暇时阅读它，即使你没有连接到互联网。\n\
  \n有几种技巧可以将页面添加到你的阅读列表：\n\n*   使用 Safari 导航到你稍后想阅读的页面，轻点`共享`按钮，然后轻点`添加到阅读列表`。\n*\
  \   长按你稍后想阅读的页面的链接，然后轻点`添加到阅读列表`。\n\n当你准备好阅读时，打开 Safari，轻点`书签`按钮，然后轻点`阅读列表`标签页，如图\
  \ 4-5 所示。Safari 会显示你添加到列表中的所有项目，你只需轻点你想阅读的文章即可。为了使列表更易于管理，请轻点`显示未读`以仅查看你尚未浏览过的页面。\n\
  \n![A429116_1_En_4_Fig5_HTML.jpg](img/A429116_1_En_4_Fig5_HTML.jpg)\n\n图 4-5。Safari\
  \ 的“阅读列表”标签页包含你保存以供稍后阅读的网页\n\n\n\n#### Safari 不会询问是否存储网站密码\n\n记住数十个用户名和密码来登录常用网站，是现代人必备的技能。`Safari`\
  \ 通过询问是否存储网站的账户数据并在后续访问时自动填入来提供帮助。这能极大节省时间，但有时 `Safari` 并不会询问是否存储网站的登录信息。\n\n**解决方法：**\
  \ `Safari` 不询问是否存储网站用户名和密码主要有三个原因：\n\n* 某些网站要求浏览器不要保存密码，而 `Safari` 会遵从这些请求。在这种情况下，你可以按照下文所示的方法手动添加密码。\n\
  * `Safari` 可能被设置为不保存用户名和密码。要检查此设置，请打开 `设置`，点击 `Safari`，再点击 `自动填充`，然后将 `名称和密码` 开关打开至\
  \ `开启` 状态。\n* `Safari` 可能处于 `无痕浏览` 模式，在此模式下它不会保存任何数据，包括网站登录数据。要检查此模式，请打开 `Safari`\
  \ 并查看菜单栏。如果菜单栏显示为黑色或深灰色（见图 4-6）而非白色或浅灰色，则表示 `Safari` 处于 `无痕浏览` 模式。要解决此问题，请点击 `标签页`\
  \ 图标，然后点击 `无痕浏览` 按钮以停用该模式，从而退出 `无痕浏览` 模式。\n\n![A429116_1_En_4_Fig6_HTML.jpg](img/A429116_1_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6.  \n若菜单栏显示为黑色或深灰色，则 `Safari` 处于 `无痕浏览` 模式，不会询问是否存储网站用户名或密码。\n\n以下是手动输入网站用户名和密码的操作步骤：\n\
  \n1. 点击 `设置` 以显示 `设置` 应用。\n2. 点击 `Safari`。此时出现 `Safari` 屏幕。\n3. 点击 `密码`。`设置` 会提示你输入锁屏密码或进行\
  \ `Touch ID` 验证。\n4. 输入你的锁屏密码或完成 `Touch ID` 验证。此时出现 `密码` 屏幕。\n5. 点击 `添加密码`。此时出现\
  \ `添加密码` 屏幕。\n6. 填写网站的地址、你的用户名和密码。密码会以常规文本而非常见的圆点形式显示，因此操作时请确保无人偷窥。\n7. 点击 `完成`。`iOS`\
  \ 会保存该网站的登录数据。\n\n#### 你想保存信用卡数据\n\n网购是最受欢迎的线上消遣方式之一，但如果你网购足够频繁，手动输入信用卡号及有效期可能会变得令人厌烦。\n\
  \n**解决方法：** 你可以将信用卡数据保存在 `Safari` 中，这样就不必反复输入你的信用卡详细信息。请按照以下步骤配置 `Safari`，使其在你进行在线购物时保存你的信用卡数据：\n\
  \n1. 在主屏幕中，点击 `设置` 以打开 `设置` 应用。\n2. 点击 `Safari`。此时出现 `Safari` 屏幕。\n3. 点击 `自动填充`\
  \ 以打开 `自动填充` 屏幕。\n4. 将 `信用卡` 开关打开至 `开启` 状态。\n\n> **提示：** `Safari` 让你无需手动输入信用卡数据，而是可以直接使用相机自动录入。在\
  \ `自动填充` 屏幕中，点击 `已保存的信用卡`，输入锁屏密码（如果你正在向你的 `iOS` 设备添加信用卡信息，强烈建议使用锁屏密码或 `Touch ID`；参见第\
  \ 9 章），然后点击 `添加信用卡`。接着点击 `使用相机`，将信用卡对准相机取景框，等待卡片信息被识别即可。\n\n#### 你想查看网站的弹出式窗口\n\n\
  弹出式广告几乎是自互联网诞生以来就存在的一大祸害。这些烦人广告带来的困扰如此之大，以至于所有现代浏览器早已默认内置了弹出式窗口拦截器，`iOS Safari`\
  \ 也不例外。\n\n然而，并非所有弹出式窗口都令人厌烦。有些弹出式窗口可能显示有用信息，或者呈现网站界面的关键功能。但是，在弹出式窗口被拦截的情况下，你就会错过这些信息或功能。\n\
  \n**解决方法：** 在访问包含你想要查看的弹出式窗口的网站时，你可以暂时关闭 `Safari` 的弹出式窗口拦截器。请按以下步骤操作：\n\n1. 在主屏幕中，点击\
  \ `设置` 以显示 `设置` 应用。\n2. 点击 `Safari`。此时出现 `Safari` 屏幕。\n3. 将 `拦截弹窗` 开关关闭至 `关闭` 状态，如图\
  \ 4-7 所示。\n\n![A429116_1_En_4_Fig7_HTML.jpg](img/A429116_1_En_4_Fig7_HTML.jpg)\n\
  \n图 4-7.  \n要临时允许某个网站的弹出式窗口，请将 `拦截弹窗` 开关关闭至 `关闭`，然后访问该网站。\n\n现在你可以使用 `Safari` 访问该网站，其弹出式窗口会出现在一个新标签页中。处理完该网站后，再次按照以上步骤将\
  \ `拦截弹窗` 开关打开至 `开启` 状态。\n\n#### 你想在点击链接前查看其地址\n\n如你所知，在 `iOS Safari` 中，你可以通过点击来“单击”网页上的链接。然而如今，精明的上网者在点击链接前总会先检查其地址，因为你永远不知道它最终会把你带到何处。地址并不总是代表恶意或可疑的网站，但检查一下总没有坏处。\n\
  \n在常规网页浏览器中，你可以通过将鼠标指针悬停在链接上，并在状态栏中查看链接地址来了解该链接将把你带到何处（即查看链接的 URL）。但这个方法在 `iOS Safari`\
  \ 中行不通，那么如何在点击链接前查看其地址呢？\n\n**解决方法：** 长按该链接几秒钟。`Safari` 随后会显示一个弹出屏幕，其中包含链接文本，更重要的是，还会显示其\
  \ URL，如图 4-8 所示。如果链接看起来没问题，请点击 `打开` 以在当前浏览器页面中访问，或点击 `在新页面中打开` 以开启一个新页面。如果你决定不点击该链接，请在菜单外部点击一下。\n\
  \n![A429116_1_En_4_Fig8_HTML.jpg](img/A429116_1_En_4_Fig8_HTML.jpg)\n\n图 4-8.  \n\
  长按链接以检查其地址，再决定是否访问该网站。\n\n### 搜索问题故障排除\n\n#### 你想使用不同的搜索引擎\n\n`Google` 是 `iOS` 上的默认搜索引擎。当然，几乎所有人都在使用\
  \ `Google`，但如果你对它有所不满，可能会想切换到另一个不同的搜索引擎。例如，许多人不喜欢 `Google` 的广告追踪，因此转而使用不追踪用户的 `DuckDuckGo`。\n\
  \n**解决方法：** 你可以使用 `Safari` 导航到其他搜索引擎的 URL 并在此进行搜索。不过，`Safari` 的默认搜索引擎使用起来更为便捷，因为它允许你直接从地址栏进行搜索。虽然\
  \ `Google` 是 `iOS` 的默认搜索引擎，但它并非 `iOS` 唯一支持的搜索引擎。以下是设置其他搜索引擎为 `Safari` 默认搜索引擎的步骤：\n\
  \n1. 打开 `设置` 应用。\n2. 点击 `Safari`。此时出现 `Safari` 屏幕。\n3. 点击 `搜索引擎`。`iOS` 会打开 `搜索引擎`\
  \ 屏幕。\n4. 点击你想要使用的搜索引擎。如图 4-9 所示，你有四种选择：`Google`、`Yahoo`、`Bing` 或 `DuckDuckGo`。\n\
  \n![A429116_1_En_4_Fig9_HTML.jpg](img/A429116_1_En_4_Fig9_HTML.jpg)\n\n图 4-9.  \n\
  在 `搜索引擎` 屏幕中，点击你希望设为 `Safari` 默认使用的搜索引擎。\n\n\n\n#### 在网页中查找特定信息并非易事\n\n当你在浏览网页时，想要查找特定信息的情况并不少见。此时，与其通读整页来寻找所需内容，不如直接搜索数据来得方便。在桌面版的\
  \ Safari 或任何其他电脑浏览器中，你可以轻松做到这一点，但乍看之下，Safari 应用程序似乎找不到“查找”功能。\n\n**解决方案：** Safari\
  \ 确实提供了这一功能，但你需要知道在哪里找到它：\n\n1.  使用 Safari 应用导航到包含你想要查找信息的网页。\n2.  点击网页标题栏（或向下滑动屏幕）以显示菜单栏，然后点击\
  \ Safari 窗口顶部地址/搜索框的内部。\n3.  输入你想要使用的搜索文本。Safari 会显示网页匹配项，但在这些匹配项的底部还会显示“在此页上（X\
  \ 个匹配项）”，其中 X 是你的搜索文本在网页上出现的次数。\n4.  向上轻扫搜索结果以隐藏键盘。\n5.  点击 `查找“搜索词”`（其中 `搜索词` 是你输入的搜索文本）。Safari\
  \ 会高亮显示搜索词的第一个匹配项。此时，“在此页上”消息会出现在结果屏幕的底部，如图 4-10 所示。\n\n    ![A429116_1_En_4_Fig10_HTML.jpg](img/A429116_1_En_4_Fig10_HTML.jpg)\n\
  \n    **图 4-10.** “在此页上”消息告诉你当前网页上出现的匹配项数量\n\n6.  点击向下箭头，可以向前循环浏览页面上出现的搜索词实例。请注意，你也可以通过点击向上箭头向后循环浏览结果。此外，当你在最后一个结果出现后点击向下箭头时，Safari\
  \ 会返回到第一个结果。\n7.  完成搜索后，点击 `完成`。\n\n#### 你想使用语音命令搜索网络\n\n你可以使用 Safari 直接在搜索框中输入搜索查询，或通过导航到搜索引擎网站来输入。然而，如今由于\
  \ Siri 应用的语音识别能力，输入似乎突然变成了一种过时的消遣。那么，当你可以直接告诉 Siri 你要找什么的时候，为什么还要输入搜索查询呢？\n\n**解决方案：**\
  \ 按住 `主屏幕` 按钮（或按住设备耳机上的 `麦克风` 按钮，或蓝牙耳机上的等效按钮）来启动 Siri。以下是一些使用 Siri 进行网络搜索的通用技巧：\n\
  \n- **搜索整个网络。** 说“搜索网络查找 `主题`”，其中 `主题` 是你的搜索条件。\n- **搜索维基百科。** 说“搜索维基百科查找 `主题`”，其中\
  \ `主题` 是你想要查询的条目。\n- **使用特定搜索引擎搜索。** 说“`引擎 主题`”，其中 `引擎` 是搜索引擎的名称，例如 Google 或 Bing（但由于某种原因，不包括\
  \ DuckDuckGo），而 `主题` 是你的搜索条件。\n\nSiri 还能理解与其通过 Yelp 合作相关的、用于搜索商家和餐厅的命令。要使用 Siri\
  \ 查找商家和餐厅，通常使用以下通用语法（当然，和 Siri 打交道时，不必过于拘泥于此）：\n\n“查找（或寻找）`某物` `某处`。”\n\n在这里，`某物`\
  \ 部分可以是商家名称（例如“星巴克”）、商家类型（例如“加油站”）、餐厅类型（例如“泰国餐厅”）或通用产品（例如“咖啡”）。`某处` 部分可以是相对于你当前位置的某个地点（例如“附近”或“我周围”或“步行可达”）或一个具体位置（例如“在印第安纳波利斯”或“在宽河区”）。以下是一些示例：\n\
  \n- “查找步行可达的加油站。”\n- “寻找印第安纳波利斯的披萨餐厅。”\n- “在附近找咖啡。”\n- “在我周围找一家杂货店。”\n\n另外请注意，如果你在命令的\
  \ `某物` 部分之前添加一个限定词，例如“好的”或“最好的”，Siri 会按照 Yelp 评分排序返回结果。\n\n"
- "# 解决电子邮件故障\n\n如今，我们拥有数量惊人的沟通方式：短信、SnapChat、视频通话、Facebook 消息、Twitter 私信等等。毫不奇怪，这些新颖的（或多或少）通信技术获得了所有的报道和赞誉。但说到日常的、基础的沟通，我们大多数人还是会依赖老牌且好用的电子邮件。它不性感，几十年来也没怎么改变，而且开发者给邮件客户端添加的任何花哨功能通常都被忽略了。电子邮件就是能完成任务。\n\
  \n或者，我应该说，电子邮件通常能完成任务。和任何技术一样，电子邮件也少不了各种各样的小毛病和漏洞，因此你可能会发现使用 iOS 的“邮件”应用发送或接收电子邮件时遇到麻烦。好消息是，大多数这些问题都容易解决，你通常可以很快让“邮件”恢复正常工作。为了帮助你做到这一点，本章汇集了最常见的电子邮件抱怨及其解决方案。\n\
  \n### 发送电子邮件故障排除\n\n#### 发送邮件时“邮件”使用了错误的账户\n\n当你添加了多个电子邮件账户时，在发送新邮件时，“邮件”应用如何决定使用哪一个？它会指定其中一个账户——具体来说，是你添加到“邮件”应用的第一个账户——作为默认账户，然后每次你撰写新邮件时，它都会自动使用该地址作为发件账户。当您通过电子邮件共享链接、照片或地图等内容时，它也会使用该地址作为默认的发件账户。\n\
  \n**注意：** 当你回复或转发邮件时，“邮件”不会自动使用默认账户。在这些情况下，“邮件”会将回复或转发配置为从原始邮件发送到的账户发出。\n\n如果默认账户正是你想要用来发送邮件的账户，那么这个行为就不是问题，但你可能会更倾向于使用你的其他账户之一。\n\
  \n**解决方案：** 首先，请注意，你不必局限于为每封邮件都使用默认账户。如果你在发送邮件时需要改用其他账户，请按以下步骤操作：\n\n1.  在“邮件”应用中，开始一封新邮件。\n\
  2.  在新邮件屏幕上，点击“`抄送/密送，发件人`”行。\n3.  点击“`发件人`”行。“邮件”会显示可用的电子邮件地址列表，如图 5-1 所示。\n\n\
  \    ![A429116_1_En_5_Fig1_HTML.jpg](img/A429116_1_En_5_Fig1_HTML.jpg)\n\n    **图\
  \ 5-1.** 你可以使用“发件人”列表选择不同的发送地址\n\n4.  点击你想用来发送邮件的地址。\n\n如果你只是偶尔需要使用这种技巧，那么按需更换发送账户效果不错，但你肯定不希望每次发送邮件时都重复这个操作。如果你有一个特别偏好的账户，希望全部或大部分时间都使用它来发送邮件，那么你需要将该账户设置为默认账户。请按以下步骤操作：\n\
  \n1.  在主屏幕上，点击 `设置`。设置应用随即打开。\n2.  点击 `邮件` 以打开邮件屏幕。iOS 会显示邮件屏幕。\n3.  在邮件部分的底部附近，点击\
  \ `默认账户`。这将打开默认账户屏幕，其中显示你的账户列表。当前默认账户旁边会显示一个勾选标记。\n4.  点击你想设置为默认账户的账户。iOS 会在该账户旁边放置一个勾选标记，如图\
  \ 5-2 所示。\n\n    ![A429116_1_En_5_Fig2_HTML.jpg](img/A429116_1_En_5_Fig2_HTML.jpg)\n\
  \n    **图 5-2.** 在默认账户屏幕中，点击你希望“邮件”用作发送邮件的默认账户\n\n\n\n#### 你想阻止某个账户接收电子邮件\n\n你可能希望`Mail`暂时阻止某个特定账户接收电子邮件的原因有很多：\n\
  \n- `Mail`应用会按固定间隔检查新邮件，因此，如果你在`Mail`中配置了多个账户，这种不断的检查会严重消耗设备电池。通过阻止一个或多个账户接收邮件，可以减少这种消耗。\n\
  - 某个账户可能会在短时间内收到大量邮件。与其浪费时间和资源在设备上接收所有这些邮件，你可能更希望阻止它们在`iOS`中被接收，然后在常规的邮件客户端中处理它们。\n\
  - 某个账户可能会收到一封或多封非常大的邮件。与其让设备承受这些“庞然大物”，你可能更希望阻止它们被下载，以便你能更轻松地使用桌面或网页邮件客户端处理这些邮件。\n\
  \n或者，你可能希望永远不让某个特定账户接收电子邮件，但仍然希望使用该账户的其他数据，例如日历或联系人。\n\n注意\n\n仅对以下账户类型可以关闭邮件接收功能，同时保留日历和联系人等其他类型的数据：`iCloud`、`Exchange`、`Google`、`Yahoo!`、`AOL`和`Outlook.com`。你不能对`POP`（邮局协议）或`IMAP`（互联网消息访问协议）账户执行此操作。\n\
  \n解决方案：首先，我假设你仍然想保留该账户。也就是说，你要么想临时停止接收特定账户的邮件，要么想永久停止接收邮件但仍然接收其他数据。如果这两种情况都不是，那么你可能想删除该账户，如下一节所述。否则，您需要禁用该账户的邮件接收功能。操作方法如下：\n\
  \n1.  在“主屏幕”上，点击“设置”以打开“设置”应用。\n2.  点击“邮件”以打开“邮件”屏幕。\n3.  点击你想要禁用的账户。`iOS`会显示该账户的设置。\n\
  4.  根据账户类型，使用以下方法之一临时禁用该账户：\n    - 对于`iCloud`、`Exchange`、`Google`、`Yahoo!`、`AOL`或`Outlook.com`账户，将“邮件”开关点击为“关闭”，如图\
  \ 5-3 所示。\n\n        ![A429116_1_En_5_Fig3_HTML.jpg](img/A429116_1_En_5_Fig3_HTML.jpg)\n\
  \n        图 5-3.\n        对于`iCloud`、`Exchange`、`Google`、`Yahoo!`、`AOL`或`Outlook.com`账户，将“邮件”开关点击为“关闭”\n\
  \    - 对于`POP`或`IMAP`账户，将“账户”开关点击为“关闭”。\n\n当你准备再次使用该账户时，重复这些步骤，将“邮件”开关或“账户”开关重新点击为“开启”。\n\
  \n#### 你不再需要某个账户\n\n一个你不再使用的电子邮件账户会弄乱你的“邮件收件箱”，占用存储空间，并因不断检查新邮件而浪费电池电量。\n\n解决方案：如果你不再使用某个电子邮件账户，则应将其删除。这将从`Mail`中移除该账户及其邮件，释放一些存储空间，加快同步时间，并节省电池电量。\n\
  \n注意\n\n如果你发现即使尝试了本章中的故障排除步骤后，仍无法使用特定账户发送电子邮件，那么一种通常有效的方法是删除该账户，然后重新添加。\n\n按照以下步骤删除账户：\n\
  \n1.  打开“设置”应用。\n2.  点击“邮件”以打开“邮件”屏幕。\n3.  点击你想要删除的账户。这将打开该账户的设置。\n4.  在屏幕底部，点击“删除账户”。`iOS`会要求你确认。\n\
  5.  点击“删除”，如图 5-4 所示。`iOS`会移除该账户。\n\n    ![A429116_1_En_5_Fig4_HTML.jpg](img/A429116_1_En_5_Fig4_HTML.jpg)\n\
  \n    图 5-4.\n    点击该账户，然后点击“删除账户”，将其从`Mail`中移除\n\n#### 你想保存一封未完成的电子邮件\n\n如果你在电脑上撰写一封邮件，并决定稍后处理，你的邮件程序会将该邮件存储为草稿，你可以随时重新打开。`Mail`应用似乎没有这个选项，那么如何保存一封未完成的邮件呢？\n\
  \n解决方案：`Mail`应用似乎不提供保存邮件草稿的选项，但它确实有，尽管方式非常不直观。在邮件窗口中，点击“取消”，然后点击“存储草稿”（见图 5-5）。当你准备继续编辑时，在“邮箱”屏幕中打开该账户，点击“草稿”，然后点击你保存的邮件。\n\
  \n![A429116_1_En_5_Fig5_HTML.jpg](img/A429116_1_En_5_Fig5_HTML.jpg)\n\n图 5-5.\n\
  要保存一封未完成的邮件，请点击“取消”，然后点击“存储草稿”\n\n#### 排查使用第三方账户时的外发电子邮件问题\n\n出于安全原因，一些互联网服务提供商（`ISP`）要求其所有客户的出站邮件必须通过该`ISP`的`SMTP`（简单邮件传输协议）服务器进行路由。如果你使用的是由`ISP`维护的电子邮件账户，这通常不是什么大问题，但如果你使用的是由第三方（例如你的网站主机）提供的账户，则可能导致以下问题：\n\
  \n- 你的`ISP`可能会阻止使用第三方账户发送的邮件，因为它认为你试图通过`ISP`的服务器中继邮件（这是垃圾邮件发送者常用的技术）。\n- 如果你的`ISP`每月只允许一定量的`SMTP`带宽或一定数量的已发送邮件，而第三方账户提供了更高的限制或完全没有限制，你可能会产生额外费用。\n\
  - 你可能会遇到性能问题，`ISP`路由邮件所需的时间比第三方主机长得多。\n\n解决方案：为了解决这些问题，许多第三方主机提供通过标准端口`25`以外的端口访问其`SMTP`服务器的权限。例如，`iCloud`的`SMTP`服务器（`smtp.icloud.com`）也接受端口`465`和`587`上的连接。请咨询你的邮件托管提供商，了解他们支持哪个（或哪些）端口。\n\
  \n以下是配置电子邮件账户以使用非标准 SMTP 端口的方法：\n\n1.  在“主屏幕”上，点击“设置”。你会看到“设置”应用。\n2.  点击“邮件”。出现“邮件”设置屏幕。\n\
  3.  点击你想要配置的`POP`账户。出现该账户的设置屏幕。\n4.  在屏幕底部附近，点击`SMTP`。`iOS`会显示`SMTP`屏幕。\n5.  在“主服务器”部分，点击该服务器。`iOS`会显示服务器设置。\n\
  6.  在“外发邮件服务器”部分，点击“服务器端口”，然后输入端口号。\n7.  点击“完成”。\n\n注意\n\n你可能还会发现通过蜂窝网络连接发送邮件时遇到问题。要了解如何排查该问题，请参阅第\
  \ 2 章的“你可以通过 Wi-Fi 发送电子邮件，但无法通过蜂窝网络发送”部分。\n\n\n\n#### 使用特定账户无法发送 POP 邮件\n\n当你使用\
  \ `Mail` 发送 POP 邮件时，可能会发现邮件要么停留在`收件箱`文件夹中（意味着从未发出），要么从未送达（此时你可能会或不会收到退信）。邮件无法发送的原因有很多，但通常可归结为以下一项或多项\
  \ POP 账户设置错误。\n\n- 使用了错误的 SMTP 主机名。\n- 使用了错误的用户名或密码。\n- 如果你的邮件主机要求 SSL（安全套接层）加密，但你未使用（反之，在主机不要求时你却使用了\
  \ SSL 加密）。\n- 未使用身份验证。为了减少垃圾邮件，许多互联网服务提供商现在要求对发件邮件进行 SMTP 身份验证，这意味着你必须登录 SMTP 服务器以确认你是邮件的发送者（而非冒充你地址的垃圾邮件发送者）。如果你的互联网服务提供商要求对发件进行身份验证，你需要配置你的电子邮件账户以提供正确的凭据。\n\
  - 使用了邮件主机不支持的服务器端口。\n\n如果你对此不太确定，请咨询你的邮件主机。\n\n**解决方法：** 按照以下步骤使用正确设置配置你的电子邮件账户：\n\
  \n1.  在主页面上，轻点`设置`。iOS 将显示“设置”应用。\n2.  轻点`邮件`。将出现“邮件”设置屏幕。\n3.  轻点你要配置的 POP 账户。将出现该账户的设置屏幕。\n\
  4.  在屏幕底部附近，轻点`SMTP`。iOS 将显示 SMTP 屏幕。\n5.  在“主服务器”部分，轻点该服务器。iOS 将显示该服务器的设置屏幕。\n\
  6.  检查`主机名`和`用户名`字段中的值，确保其正确无误。\n7.  重新输入正确的密码。\n8.  如果你的主机要求 SSL，则将`SSL`开关轻点至“开”；否则，将此开关轻点至“关”。\n\
  9.  轻点`身份验证`以打开“身份验证”屏幕，轻点你的主机所要求的身份验证类型（通常为`密码`），然后轻点“返回”返回到服务器设置屏幕。\n10. 检查`服务器端口`设置是否为你的主机支持的端口值。\n\
  11. 轻点`完成`。\n\n#### 使用 Siri 语音命令发送电子邮件时遇到问题\n\n你可以使用 `Siri` 语音识别应用通过简单的语音命令检查、撰写、发送和回复信息。按住主屏幕按钮（或按住设备耳机上的麦克风按钮，或蓝牙耳机上的相应按钮），直到出现\
  \ `Siri`。`Siri` 虽然方便，但你可能难以让它按你的意愿行事。\n\n**解决方法：** 确保你使用的是 `Siri` 能识别的命令。\n\n要检查\
  \ iCloud 账户上的新电子邮件，你只需说“检查电子邮件”（或仅说“检查邮件”）。你也可以按以下方式查看 iCloud 邮件列表：\n\n-   要显示未读信息，请说“显示新邮件”。\n\
  -   要显示某个特定人员的邮件，请说“显示来自*姓名*的邮件”，其中*姓名*是发件人的名字。\n\n要开始撰写新电子邮件，`Siri` 为你提供了几个选项：\n\
  \n-   要创建发送给特定人员的新邮件，请说“发送邮件给*姓名*”，其中*姓名*是收件人的名字。此姓名可以是通讯录中的姓名，也可以是具有已定义关系的某人，例如“妈妈”或“我的兄弟”。\n\
  -   要创建带有特定主题行的新邮件，请说“发送关于*主题*的邮件给*姓名*”，其中*姓名*指定收件人，*主题*是主题行文本。\n-   要创建新邮件并指定正文文本，请说“发送关于*主题*的邮件给*姓名*，内容为*文本*”，其中*姓名*是收件人，*主题*是主题行，*文本*是邮件正文文本。\n\
  \n在每种情况下，`Siri` 都会创建新邮件、显示它，然后询问你是否要发送。如果要发送，你可以说“发送”或轻点`发送`按钮。\n\n如果你正在查看某封邮件，可以说“回复”来发送回复。如果你想在回复中添加一些文本，请说“回复*文本*”，其中*文本*是你的回复内容。\n\
  \n你也可以在 `Mail` 中使用 `Siri` 来听写信息。当你在新邮件的正文内轻点时，出现的键盘会在空格键旁边显示一个`麦克风`图标。轻点`麦克风`图标，然后开始听写。以下是一些说明：\n\
  \n-   对于标点符号，你可以说出所需符号的名称，例如“逗号”（`,`）、“分号”（`;`）、“冒号”（`:`）、“句号”（`.`）、“问号”（`?`）、“感叹号”（`!`）、“破折号”（`-`）或“@符号”（`@`）。\n\
  -   你可以通过说“左括号”，然后说出文本，再说“右括号”来将文本括在括号中。\n-   要用引号将文本括起来，请说“左引号”，然后说出文本，再说“右引号”。\n\
  -   要将单词全部呈现为大写字母，请说“全大写”，然后说出该单词。\n-   要开始新段落，请说“换行”。\n-   你可以通过说“笑脸”来输入 `:-)`，说“眨眼”来输入\
  \ `;-)`，说“苦脸”来输入 `:-(`，增添一些趣味。\n\n完成后，轻点`完成`。\n\n### 接收电子邮件疑难解答\n\n#### 你在设备上能收到邮件，但在电脑上却收不到\n\
  \n如果你需要在多台设备上检查电子邮件，首先需要了解 POP 邮件是如何通过互联网传递的。（这不适用于 iCloud、Gmail 以及其他使用 IMAP 的服务。）当有人给你发送信息时，它不会直接发送到你的\
  \ iOS 设备或电脑。相反，它会发送到你的互联网服务提供商（或你的公司）为处理收到的邮件而设置的服务器上。当你请求 `Mail` 检查新邮件时，它会与 POP\
  \ 服务器通信，查看你的账户中是否有邮件在等待。如果有，`Mail` 会下载这些邮件，然后指示服务器删除存储在服务器上的邮件副本。因此，如果你在 iOS 设备上收取了邮件，这些邮件将无法再下载到你的电脑上。\n\
  \n**解决方法：** 你需要配置 `Mail`，使其在下载邮件后，在 POP 服务器上保留一份邮件副本。这样，当你使用另一台设备检查邮件时，这些邮件仍然可用。请注意，对于添加到\
  \ iOS 的 POP 账户，这是默认行为。因此，如果你发现 iOS 设备能收到邮件，但其他地方收不到，则需要按照以下步骤阻止 iOS 从服务器删除邮件：\n\n\
  1.  在主页面上，轻点`设置`。\n2.  轻点`邮件`以打开“邮件”屏幕，显示“邮件”屏幕。\n3.  轻点你要配置的 POP 账户。将出现该账户的设置屏幕。\n\
  4.  在屏幕底部附近，轻点`高级`。iOS 将显示“高级”屏幕。\n5.  轻点`从服务器删除`。将出现“从服务器删除”屏幕。\n6.  轻点`永不`，如图\
  \ 5-6 所示。\n\n    ![A429116_1_En_5_Fig6_HTML.jpg](img/A429116_1_En_5_Fig6_HTML.jpg)\n\
  \n    **图 5-6.** 为确保 `Mail` 在 POP 服务器上保留下载邮件的副本，请在“从服务器删除”屏幕中轻点`永不`。\n\n\n\n####\
  \ 您收到大量垃圾邮件\n\n遗憾的是，如今已不存在完全免受垃圾邮件侵扰的区域。只要您拥有基于互联网的电子邮件账户，就一定会收到垃圾邮件，仅此而已。事实上，您很可能每天收到的垃圾邮件不是一两封，而是一两打。这并不奇怪，因为如今垃圾邮件已占据每天发送的数十亿封邮件中的大多数，在某些日子里甚至占到所有发送邮件的\
  \ 90%！互联网服务提供商和电子邮件托管公司过滤垃圾邮件的能力在不断提升，但这些防御措施仍然不够完善。\n\n**解决方案：** 虽然无法完全避免垃圾邮件，但您可以采取一些措施来尽量减少每天需要处理的垃圾邮件数量：\n\
  \n- 切勿在论坛或博客评论中输入您的真实电子邮件地址。垃圾邮件发送者收集地址的最常见方法就是从网络帖子中获取。一种常用的策略是修改您的电子邮件地址，例如添加一些使地址无效但他人仍能轻易识别的文字。示例如下：`yourname@yourisp.remove-this-to-email-me.com`。\n\
  - 考虑创建一个专门用于登录、邮件列表、新闻简报及其他网络用途的电子邮件地址。这个地址最终很可能也会收到垃圾邮件，但总比让您的主邮箱沦陷要好。\n- 如果您在收件箱中看到确定是垃圾邮件的邮件，请勿点开它。这样做有时会通知垃圾邮件发送者您已打开邮件，从而确认您的地址是有效的。您可以通过禁用远程图片来防止这种情况，具体方法将在下一节介绍。\n\
  \n> **提示：** 如果您在收件箱中发现明确的垃圾邮件，可以直接删除而无需点开。只需在邮件上向左短划，然后点击`废纸篓`，或者向左长划直至邮件从收件箱中消失。\n\
  \n- 切勿回复垃圾邮件。即使邮件中包含声称是“退订”地址的链接，也不要回复。回复垃圾邮件会证明您的地址是有效的，最终只会招致更多的垃圾邮件。\n- 如果您的某个邮箱收到了大量垃圾邮件，可以考虑宣布“垃圾邮件破产”，并删除该账户——不仅从您的\
  \ iOS 设备上删除，还要从您的互联网服务提供商或邮件托管商处删除。\n\n#### 您想禁用邮件中的远程图片\n\n网络爬虫是一种驻留在远程服务器上的图片，它通过在\
  \ HTML 格式的电子邮件中引用远程服务器地址来加入邮件中。当您打开邮件时，`邮件`应用会使用该地址下载图片并显示在邮件内。这听起来似乎无害，但如果邮件是垃圾邮件，这个地址很可能也包含您的电子邮件地址或指向您电子邮箱的代码。因此，当远程服务器收到加载图片的请求时，它不仅能知道您已打开邮件，还能确认您的邮箱地址是有效的。所以，垃圾邮件发送者会频繁使用网络爬虫也就不足为奇了，因为对他们来说，有效的邮箱地址如同金子一般珍贵。\n\
  \n**解决方案：** iOS 的“邮件”应用默认会显示远程图片。要禁用远程图片，请按照以下步骤操作：\n\n1. 在主屏幕上，点击`设置`。iOS 将打开`设置`应用。\n\
  2. 点击`邮件`以打开`邮件`设置屏幕。\n3. 将`载入远程图像`开关滑动至`关闭`位置，如图 5-7 所示。`邮件`应用将保存此设置，不再在您的电子邮件中显示远程图片——尤其是网络爬虫。\n\
  \n   ![A429116_1_En_5_Fig7_HTML.jpg](img/A429116_1_En_5_Fig7_HTML.jpg)\n\n   **图\
  \ 5-7.** 要屏蔽网络爬虫，请将`载入远程图像`开关滑动至`关闭`位置\n\n> **提示：** 要在非垃圾邮件中显示远程图片，请点击该邮件，然后点击`载入所有图像`。\n\
  \n#### 您不再希望邮件应用按主题整理邮件\n\n在`邮件`应用中，您的邮件会按主题进行分组，这意味着原始邮件及其所有回复都集中在该账户的`收件箱`文件夹中。\n\
  \n按主题整理邮件通常很方便，但并非总是如此。例如，如果您使用 iPhone 或 iPod touch，有时您可能通过点击`下一封`（右箭头）和`上一封`（左箭头）按钮来浏览邮件。当您遇到一个主题对话时，`邮件`应用会跳入该对话中，然后您需要在其中逐封浏览邮件，如果该对话包含大量回复，这会非常麻烦。\n\
  \n**解决方案：** 如果您发现主题对话带来的麻烦大于便利，可以按照以下步骤将`邮件`应用配置为不再按主题整理邮件：\n\n1. 在主屏幕上，点击`设置`。iOS\
  \ 将打开`设置`应用。\n2. 点击`邮件`以打开`邮件`设置屏幕。\n3. 将`按主题整理`开关滑动至`关闭`位置。\n\n#### 已删除的邮件正在从废纸篓文件夹中移除\n\
  \n当您删除一封邮件时，`邮件`应用并不会完全移除该邮件，而只是将其转移到该账户的`废纸篓`文件夹。这很有用，因为如果您误删了邮件，可以在`废纸篓`文件夹中找到它，并将其移回`收件箱`（或其原始文件夹）。也就是说，只要邮件仍在`废纸篓`文件夹中，您就可以恢复它。不幸的是，`邮件`应用会将每个账户配置为一周后自动删除`废纸篓`文件夹中的项目。\n\
  \n**解决方案：** 请按照以下步骤来控制`邮件`应用何时从`废纸篓`文件夹中删除邮件：\n\n1. 在主屏幕上，点击`设置`以显示`设置`应用。\n2. 点击`邮件`以显示`邮件`设置屏幕。\n\
  3. 点击您想要配置的账户。\n4. 显示该账户的高级邮件选项：\n   - 对于 iCloud 账户，点击`邮件`，然后点击`高级`。\n   - 对于 POP\
  \ 账户，点击`高级`。\n   - 对于大多数其他账户类型，点击`账户`，然后点击`高级`。\n5. 点击`移除`以打开`移除`屏幕。\n6. 点击`永不`以防止`邮件`应用自动从该账户的`废纸篓`文件夹中移除邮件，如图\
  \ 5-8 所示。\n\n   ![A429116_1_En_5_Fig8_HTML.jpg](img/A429116_1_En_5_Fig8_HTML.jpg)\n\
  \n   **图 5-8.** 在`移除`屏幕中，点击`永不`可防止`邮件`应用自动从该账户的`废纸篓`文件夹中删除邮件\n\n#### 您看不到“所有收件箱”文件夹\n\
  \n如果您在 iOS 中设置了多个账户，`邮件`应用会包含一个名为`所有收件箱`的文件夹，它会显示您所有账户中收到的邮件合并列表。在升级 iOS 后，此文件夹有时会消失。\n\
  \n**解决方案：** 请按照以下步骤将`所有收件箱`文件夹恢复到`邮件`界面中：\n\n1. 在`邮件`应用中，显示`邮箱`屏幕。\n2. 点击`编辑`。\n\
  3. 点击`所有收件箱`项目以将其激活，如图 5-9 所示。\n\n   ![A429116_1_En_5_Fig9_HTML.jpg](img/A429116_1_En_5_Fig9_HTML.jpg)\n\
  \n   **图 5-9.** 要将`所有收件箱`文件夹恢复到`邮箱`屏幕，请点击`编辑`，然后点击以激活`所有收件箱`项目\n4. 点击`完成`。\n\n\n\
  \n"
- "# 6\\. 修复手机问题\n\n本书大部分章节都聚焦于 iOS 及其设备与数据相关的功能：Wi-Fi、应用、网页、电子邮件、照片等。这很恰当，因为我们的 iOS\
  \ 设备归根结底是电脑，所以将重点放在解决计算任务上是合理的。但 iPhone 与众不同。诚然，它是一款出色的移动电脑，但其核心也是一部移动电话。虽然电话通话开始显得有些过时，但这部智能手机的“电话”功能仍被几乎所有\
  \ iPhone 用户使用，即使是二十多岁的年轻人也不例外。（皮尤研究中心最近的一项调查发现，18 至 29 岁的智能手机用户中，有 93%曾使用过语音或视频通话。）电话通话经久不衰的吸引力源于多个因素：即时性（假设对方接听！）、私密性和高效性。但这一切都只有在\
  \ iPhone 的通话功能正常工作且你知道如何充分利用它们时才成立。本章将介绍一些常见的通话问题，并告诉你如何修复或应对它们。\n\n### 排查来电问题\n\
  \n#### 你需要将来电静音\n\n当有来电时，有时你可能无法立即接听电话。例如，如果你正在开会，你可能会希望先离开房间再接听电话，以尽可能减少对其他与会者的干扰。当然，如果你在走向门口的过程中电话一直响，那你仍然会打扰到所有人。\n\
  \n解决方法：听到来电铃声后，立即按下`睡眠/唤醒`按钮一次。这会暂时关闭铃声，这意味着如果你决定接听，你仍有标准次数的响铃机会。如果你不接听，你的 iPhone\
  \ 会将此呼叫转接到语音信箱。\n\n#### 你无法使用音量按钮调节铃声音量\n\n你可能更希望调低音量，而不是将来电静音。然而，当你按下设备侧面的`音量减小`按钮时，铃声的音量保持不变。\n\
  \n解决方法：如果你无法使用音量按钮调高或调低铃声音量，说明此功能已被禁用。要重新开启，请遵循以下步骤：\n\n1.  打开`设置`应用。\n2.  点击`声音与触感`。\n\
  3.  将`用按钮调整`开关切换到`开`，如图 6-1 所示。\n\n    ![A429116_1_En_6_Fig1_HTML.jpg](img/A429116_1_En_6_Fig1_HTML.jpg)\n\
  \n    图 6-1.\n\n    将`用按钮调整`开关切换到`开`，即可使用 iPhone 的音量按钮控制铃声音量\n\n警告\n\n另一方面，锁定铃声音量是个好主意，因为它能避免一个主要的\
  \ iPhone 烦恼：因铃声音量被意外静音（例如，iPhone 在包或口袋中被碰撞）而错过电话。\n\n#### 你想要将来电直接发送到语音信箱\n\n你的\
  \ iPhone 收到一个电话，但你现在无法接听。然而，你也不想让电话一直响到语音信箱启动而打扰周围的人。\n\n解决方法：使用以下任一技巧：\n\n*   如果手机未锁定，点击触摸屏上的红色`拒绝`按钮。\n\
  *   如果你正在使用 EarPods，按住中央按钮两秒钟。\n*   快速连续按下`睡眠/唤醒`按钮两次。\n\n无论使用哪种方法，iOS 都会将此呼叫直接发送到语音信箱。但请注意，如果你改变主意，将无法接听此电话。\n\
  \n#### 你想要能够使用其他设备接听电话\n\n我们都遇到过这种情况：你在一个房间，听到 iPhone 在另一个房间响铃，然后你疯狂冲刺试图在电话转入语音信箱前接听。如果这种冲刺不必发生，而你只需使用与\
  \ iPhone 在同一 Wi-Fi 网络上的 iPad 或 Mac 就能接听电话，那该多好。\n\n解决方法：iOS 支持一项功能，使你能够使用其他设备（包括\
  \ iPad、iPhone 甚至 Mac）来接听来电。要确保此功能已激活并控制可用于接听电话的设备，请遵循以下步骤：\n\n1.  打开`设置`应用，然后点击`电话`以显示`电话`设置。\n\
  2.  点击`在其他设备上通话`。如果你看不到此设置，请参阅下一个问题。\n3.  确保`允许在其他设备上通话`开关已设置为`开`，如图 6-2 所示。\n\n\
  \    ![A429116_1_En_6_Fig2_HTML.jpg](img/A429116_1_En_6_Fig2_HTML.jpg)\n\n    图\
  \ 6-2.\n\n    将`允许在其他设备上通话`开关切换到`开`，然后在你想要用来接听电话的每个设备旁边将开关切换到`开`\n4.  在设备列表中，对于你想要用来接听电话的每个设备，将其开关切换到`开`。\n\
  \n#### 你无法访问“在其他设备上通话”设置\n\n如果你想要配置 iPhone 以允许在其他 iOS 设备上接听来电，你可能会发现，在`设置`应用中点击`电话`后，该设置并未出现。\n\
  \n解决方法：你必须使用同一个 Apple ID 同时登录 iCloud 和 FaceTime，才能看到`在其他设备上通话`设置。请遵循以下步骤登录这些服务：\n\
  \n1.  打开`设置`应用。\n2.  点击`iCloud`。\n3.  如果你尚未登录 iCloud，请输入你的 Apple ID 电子邮件地址和密码，然后点击`登录`。\n\
  4.  点击`设置`返回主`设置`屏幕。\n5.  点击`FaceTime`以打开`FaceTime`设置。\n6.  将`FaceTime`开关切换到`开`。\n\
  7.  如果你尚未登录，请点击`使用 Apple ID 登录 FaceTime`，输入你的 Apple ID 电子邮件地址和密码，然后点击`登录`。\n\n\n\
  \n#### 你想在不接听电话的情况下回复来电\n\n在本章前面部分，你已经学会了如何将来电直接发送到语音信箱。这对于你想忽略的电话来说非常有用，但在很多情况下，你既无法接听电话，又不想忽略来电者。例如，如果你正在等一个电话，但同时又不得不去开会，那么来电时接听电话会显得不礼貌；但如果你只是将电话转到语音信箱，来电者可能会感到困惑。同样，你可能会在赴约时稍微迟到，而在路上你看到来电者正是你要见的人。此时，接听电话可能不太方便，但让语音信箱处理又会让对方怀疑你是否会赴约。\n\
  \n解决方案：iOS 提供了一项功能，可以轻松处理这些棘手的电话情况。它叫做`用信息回复`，允许你同时拒接来电并向来电者发送一条预设的短信。这样一来，你避免了语音通话（根据你当时的情况，这可能会显得不礼貌或不方便），但同时给了来电者一些反馈。\n\
  \n默认情况下，`用信息回复`提供了三条可立即发送的消息：\n\n- `抱歉，我现在不方便接听电话。`\n- `我正在路上。`\n- `我稍后打给你好吗？`\n\
  \n如果这些消息都不太合适，你还可以选择发送自定义信息。以下是拒接来电并向来电者发送短信的方法：\n\n1.  当来电时，点击`信息`按钮，如图 6-3 所示。你的\
  \ iPhone 会为每条预设短信显示一个按钮。\n\n    ![A429116_1_En_6_Fig3_HTML.jpg](img/A429116_1_En_6_Fig3_HTML.jpg)\n\
  \n    图 6-3.\n    点击`信息`按钮，通过短信回复来电者 注意 你的手机套餐必须开通来电显示功能，才能看到`信息`按钮。  \n\n2.  点击你想要发送的回复。如果你想发送其他信息，请点击`自定义`，输入你的信息，然后点击`发送`。\
  \  \n\n来电者会在电话应用中看到“用户忙”的提示，随后收到一条短信。\n\n注意\n\n如果你不喜欢默认回复，可以自行创建。依次点击`设置`> `电话`>\
  \ `用信息回复`，然后使用三个文本框输入你自己的信息。\n\n#### 你想设置提醒稍后回电\n\n`用信息回复`功能是你 iPhone 上一个实用的技巧，但它存在与直接拒接来电相同的问题：如果你之后想和那个人通话，你必须记得回拨。\n\
  \n解决方案：你可以使用“提醒事项”应用来在一小时后（或任何时间）提醒自己回电。不过，幸运的是，你不需要执行这个额外的步骤，因为你可以让电话应用替你完成。电话应用有一项功能，允许你在拒接来电的同时自动创建回电提醒。你可以将提醒设置为在一小时后触发，或者在离开当前所在位置时触发。\n\
  \n以下是拒接来电并设置回电提醒的方法：\n\n1.  当来电时，点击`稍后提醒我`（参见前面的图 6-3）。你的 iPhone 会显示回电提醒选项，如图 6-4\
  \ 所示。\n\n    ![A429116_1_En_6_Fig4_HTML.jpg](img/A429116_1_En_6_Fig4_HTML.jpg)\n\
  \n    图 6-4.\n    来电时，点击`稍后提醒我`可查看此处显示的提醒选项  \n\n2.  点击你想要设置的提醒类型：\n    - `我离开时`。点击此选项可设置基于位置的提醒，当你离开当前位置时触发。\n\
  \    - `1 小时后`。点击此选项可设置基于时间的提醒。 \n\n提示\n\n如果你没有看到`我离开时`提醒选项，你需要打开`定位服务`。\n\n####\
  \ 你只想允许特定人群的来电\n\n你可能在某些情况下希望拒接所有来电，但除了来自某个特定人或群组的电话。\n\n解决方案：你可以通过激活`勿扰模式`并将其配置为只允许来自你想通话之人的来电来实现。\n\
  \n`勿扰模式`的这一功能是针对人群组而非个人起作用的。因此，你的首要任务是创建或配置一个群组，其中包含你允许来电的人。你有两个选择：\n\n- 在电话应用中，将每个人添加到`个人收藏`列表。点击`通讯录`，然后对于每个人，点击该联系人，点击`添加到个人收藏`，再点击`电话`。如果该联系人有多个号码，请点击你希望作为收藏的号码。\n\
  - 为你允许来电的人创建一个通讯录应用群组。但请注意，通讯录应用本身不提供创建群组的功能。你需要登录`icloud.com`，打开通讯录，然后点击群组窗格底部的`添加`（`+`）按钮。\n\
  \n设置好群组后，按照以下步骤配置`勿扰模式`，使其仅允许来自该群组的来电：\n\n1.  点击`设置`以打开“设置”应用。  \n2.  点击`勿扰模式`。此时会出现“勿扰模式”屏幕。\
  \  \n3.  将`手动`开关拨至`开启`以激活`勿扰模式`。  \n4.  点击`允许来电`以打开“允许来电”屏幕，如图 6-5 所示。\n\n    ![A429116_1_En_6_Fig5_HTML.jpg](img/A429116_1_En_6_Fig5_HTML.jpg)\n\
  \n    图 6-5.\n    使用“允许来电”屏幕选择在`勿扰模式`激活时允许向你呼叫的群组  \n\n5.  点击`个人收藏`或点击某个联系人群组。  \n\
  \n现在，iOS 将只允许你选择的群组中的来电通过。当你想要再次接听所有来电时，请重复步骤 1 到 3，将`手动`开关拨至`关闭`以停用`勿扰模式`。（或者，如果你希望保留其他`勿扰模式`功能，请重复步骤\
  \ 1 到 4，然后点击`所有人`。）\n\n#### 你不想在通话时看到其他来电的信息\n\n如果你正在通话中，另一个电话打进来，你的 iPhone 会立即显示来电者的姓名或号码，以及三个选项：`拒绝来电`、`保留当前通话并接听`和`结束当前通话并接听`。这是你\
  \ iPhone 上呼叫等待功能的一部分。如果你正在等待一个重要电话，或者想将来电者加入到你已设置好的电话会议中，这个功能非常有用。（请注意，只有当你的手机套餐中包含此功能时，你才会看到呼叫等待信息。）\n\
  \n然而，在其他时候，你可能会觉得这个功能很烦人且具有侵入性（而任何被你保持通话或挂断以接听新电话的人，可能也会觉得这种行为粗鲁无礼）。\n\n解决方案：你可以按照以下步骤关闭呼叫等待功能：\n\
  \n1.  在主屏幕上，点击`设置`。此时会出现“设置”应用。  \n2.  点击`电话`。此时会出现“电话”屏幕。  \n3.  点击`呼叫等待`。此时会出现“呼叫等待”屏幕。\
  \  \n4.  将`呼叫等待`开关拨至`关闭`，如图 6-6 所示。你的 iPhone 将禁用呼叫等待功能。\n\n    ![A429116_1_En_6_Fig6_HTML.jpg](img/A429116_1_En_6_Fig6_HTML.jpg)\n\
  \n    图 6-6.\n    为避免在通话时被打扰，请关闭`呼叫等待`功能\n\n\n\n#### 您正收到不受欢迎的来电\n\n使用 iPhone 的乐趣可能会被第一个来自电话推销员、陌生销售或类似烦人者的来电打破。您也可能会发现，自己正收到前任、老同学或任何您曾经认识但不想再有联系的人打来的不受欢迎的电话。一次性来电您可以应付，但如果您定期收到个人或公司的不受欢迎来电，iPhone\
  \ 的乐趣就会大打折扣。\n\n**解决方案：** iOS 提供了一项来电拦截功能，可以阻止特定号码给您打电话。请按照以下步骤阻止最近给您打过电话的号码：\n\n\
  1.  打开`电话`应用。\n2.  点击菜单栏中的`最近通话`图标。\n3.  点击您想要阻止的电话号码或联系人右侧的蓝色`信息`按钮。\n4.  点击`屏蔽此来电号码`。`电话`应用会要求您确认。\n\
  5.  点击`屏蔽联系人`。\n\n如果您要阻止的联系人不在`电话`应用的`最近通话`列表中，但在您的`通讯录`列表中，请按照以下步骤阻止该联系人：\n\n1.\
  \  打开`电话`应用。\n2.  点击菜单栏中的`通讯录`图标。\n3.  点击您要阻止的联系人。\n4.  点击`屏蔽此来电号码`。`电话`应用会要求您确认。\n\
  5.  点击`屏蔽联系人`。\n\n**注意：** 若要从黑名单中移除某个人或号码，请打开`设置`，点击`电话`，点击`来电阻止与身份识别`，然后点击`编辑`。点击姓名或号码左侧的红色`删除`图标，然后点击`删除`。\n\
  \n#### 您更愿意在其他号码上接听 iPhone 来电\n\n如果您暂时无法使用 iPhone，您如何处理来电？例如，当您乘坐飞机时，您必须关闭 iPhone\
  \ 或将其置于`飞行模式`，这样来电就无法接通。同样，如果您必须将 iPhone 送回 Apple 维修或更换电池，那么当有人试图给您打电话时，手机无法使用，所有来电都将转至语音信箱。\n\
  \n**解决方案：** 对于这些以及其它 iPhone 无法接听来电的情况，您可以通过将电话转接到另一个号码（例如您的工作或家庭号码）来解决此问题。请注意，此功能的可用性取决于您的蜂窝网络提供商是否支持。\n\
  \n操作方法如下：\n\n1.  在`主屏幕`上，点击`设置`。将显示`设置`应用。\n2.  点击`电话`。将显示`电话`屏幕。\n3.  点击`呼叫转移`。将显示`呼叫转移`屏幕。\n\
  4.  将`呼叫转移`的开关拨到`开启`。您的 iPhone 将显示`转接至`屏幕。\n5.  点击用于转接来电的电话号码。\n6.  点击`返回`以回到`呼叫转移`屏幕。图\
  \ 6-7 显示了设置好转接来电的`呼叫转移`屏幕。在屏幕顶部的状态栏中，注意时间左侧出现的一个带箭头的小`电话`图标，它表示呼叫转移功能已开启。\n\n![A429116_1_En_6_Fig7_HTML.jpg](img/A429116_1_En_6_Fig7_HTML.jpg)\n\
  \n**图 6-7.** 激活呼叫转移，将您的 iPhone 来电转接到另一个号码。\n\n### 拨出电话故障排除\n\n#### 您想拨打电话，但套餐仅剩几分钟\n\
  \n如果您的蜂窝套餐通话分钟数所剩无几，您最不愿做的就是超出套餐时间，因为那些额外的分钟数通常非常昂贵。\n\n**解决方案：** 您或许仍可以拨打电话而无需耗尽那点剩余的通话时间。这是因为\
  \ iOS 支持`Wi-Fi 通话`，您可以利用 Wi-Fi 互联网连接而不是蜂窝网络连接来拨打电话。请咨询您的蜂窝网络提供商，确认其是否支持`Wi-Fi 通话`。如果支持，您应该能够按照以下步骤在\
  \ iPhone 上启用`Wi-Fi 通话`：\n\n1.  在`主屏幕`上，点击`设置`。将显示`设置`应用。\n2.  点击`电话`。将显示`电话`屏幕。\n\
  3.  点击`Wi-Fi 通话`。将显示`Wi-Fi 通话`屏幕。\n4.  将`在此 iPhone 上启用 Wi-Fi 通话`的开关拨到`开启`，如图 6-8\
  \ 所示。iOS 会要求您确认。\n\n![A429116_1_En_6_Fig8_HTML.jpg](img/A429116_1_En_6_Fig8_HTML.jpg)\n\
  \n**图 6-8.** 将`在此 iPhone 上启用 Wi-Fi 通话`开关拨到`开启`以通过 Wi-Fi 拨打电话。\n\n5.  点击`启用`。\n\n\
  #### 您想在电话号码中包含分机号或菜单选项\n\n如果您要致电工作中的家人或朋友，或者要联系某公司的特定部门或个人，您很可能需要在主号码接通后拨打一个分机号。同样，许多企业要求您通过一系列菜单才能获取信息或联系特定员工或部门（“销售请按\
  \ 1；客服请按 2”，等等）。这通常需要您调出键盘、听取提示、输入号码，并根据需要重复操作，效率很低。\n\n**解决方案：** 如果您知道分机号或电话菜单顺序，您可以将其编辑到电话号码中，让`电话`应用为您完成所有繁琐工作。`电话`应用可以执行以下任一操作：\n\
  \n*   `暂停`。此选项在电话号码中用逗号 (`,`) 表示，意味着`电话`应用会先拨打主号码，等待两秒钟，然后拨打逗号后的任何分机号或菜单值。如果需要更长延迟，您可以在号码中添加多个逗号。\n\
  *   `等待`。此选项在电话号码中用分号 (`;`) 表示，意味着`电话`应用只拨打主号码，并显示一个标有`拨号 \"extension\"` 的按钮，其中\
  \ `extension` 是分号后的任何数字。当电话系统提示您输入分机号时，您只需点按`拨号`按钮即可。\n\n您可以通过两种方式设置这些选项：\n\n* \
  \  `通讯录列表`。当您使用`通讯录`列表输入电话号码时，输入完整号码，然后点按屏幕键盘左下角出现的 `+*#` 键。这会临时添加两个新按键：`暂停`和`等待`。点按`暂停`以添加逗号，然后点按分机号或菜单值，并根据需要重复；点按`等待`以添加分号，然后点按分机号。\n\
  *   `拨号键盘`。使用`电话`应用中的拨号键盘，输入完整号码。要添加逗号以告诉`电话`应用`暂停`，请长按 `*` 键直至出现逗号，然后点按分机号或菜单值；要添加分号以告诉`电话`应用`等待`，请长按\
  \ `#` 键直至出现分号，然后点按分机号。\n\n#### 您打电话时不想被识别身份\n\n尽管人们通常认为隐藏来电身份是只有恶徒和其他不良分子才需要的功能，但一个人在拨打电话时不想泄露身份也有很多合理的原因。联系危机热线、担任举报人、披露或寻求敏感信息，这些都是重视甚至要求保护隐私的场景。\n\
  \n**解决方案：** 您可以配置您的设备不显示您的`来电显示`，前提是您的蜂窝网络提供商支持该功能。请按照以下步骤操作：\n\n1.  打开`设置`应用。\n\
  2.  点击`电话`。\n3.  点击`显示我的来电显示`。\n4.  将`显示我的来电显示`开关拨到`关闭`，如图 6-9 所示。\n\n![A429116_1_En_6_Fig9_HTML.jpg](img/A429116_1_En_6_Fig9_HTML.jpg)\n\
  \n**图 6-9.** 要隐藏来电时的身份，请将`显示我的来电显示`开关拨到`关闭`。\n\n**警告：** 您可能有充分理由在打电话时隐藏您的`来电显示`，但请注意，许多人会自动忽略那些未显示来电者姓名的来电。\n\
  \n\n\n#### 你想将通话置于保持状态\n\n通话时，你可能想将对方置于保持状态，先处理其他事情。这是电话的标配功能，但“`电话`”应用似乎并未提供此选项。\n\
  \n**解决方法：** 出于某种神秘原因，iOS 将此实用功能隐藏了起来。要启用它，请长按静音按钮。几秒钟后，你的 iPhone 会将此图标替换为保持图标，并将通话方置于保持状态，如图\
  \ 6-10 所示。要取消保持，请再次点击该图标。\n\n![A429116_1_En_6_Fig10_HTML.jpg](img/A429116_1_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10. 要将通话置于保持状态，请长按静音按钮几秒钟，直到看到保持图标\n\n"
- "# 7. 解决相机和照片相关问题\n\n一场摄影革命正在进行，而这场革命的领导者并非佳能或尼康这样的传统相机公司，而是一家计算机公司。我说的当然是苹果公司及其\
  \ `iPhone`、`iPod touch` 和 `iPad`。这些设备长期以来都配有摄像头，但在过去的一两代产品中，其摄像头的性能已变得极为出色。再加上我们无论走到哪里都会随身携带这些设备，如今已有数亿人身边随时带着高质量的摄影设备。至少可以说，这是革命性的。虽然使用\
  \ iOS 设备上的相机不像使用数码单反相机那样需要学习曲线，但要充分发挥其性能并解决一些恼人的问题，确实需要了解相机的工作原理以及一些幕后设置。\n\n###\
  \ 相机问题故障排除\n\n#### 你的很多照片都模糊不清\n\niOS 设备的相机硬件正在逐步改进，`iPhone`、`iPad` 和 `iPod touch`\
  \ 通常能拍出相当不错的照片。然而，大多数人在使用 iOS 拍照时遇到的最大问题可能是图像模糊，这通常是由于拍照时未能保持设备稳定所致。\n\n**解决方法：**\
  \ `iPhone 6` 及更新机型确实提供了光学图像防抖功能，这意味着相机会自动补偿微小的手部抖动和其他小幅移动。但即使你使用的是较旧的 `iPhone` 或其他\
  \ iOS 设备，也可以采取以下一些措施来尽量减少甚至避免照片模糊：\n\n*   扩大站姿以稳定身体。\n*   将至少一个肩膀（或整个身体一侧）靠住附近的物体，例如墙壁、门框或汽车。\n\
  *   将空闲的手臂横过躯干，前臂与地面平行，然后将握持设备的那只手的手肘放在空闲的手臂上，这有助于稳定握持手臂。\n*   在拍照时屏住呼吸。\n*   记住，设备是在你松开\
  \ `快门` 按钮时拍照，而不是在按下时。因此，请尽量保持构图稳定并稳住身体，直到手指从 `快门` 按钮上抬起。\n\n> **注意：** 你可能会想先按住 `快门`\
  \ 按钮，待身体稳定后再松开。但这种方法已不再适用，因为按住 `快门` 按钮会启动连拍模式，以每秒 10 张的速度拍照。\n\n*   松开 `快门` 按钮后，请保持手机稳定，直到照片缩略图出现在屏幕左下角。如果在设备最终处理照片时移动，照片就会变模糊。\n\
  \n在使用 iOS 设备拍照时记住部分或全部这些要点，你很快就会发现模糊照片已成为过去。\n\n#### 你的弱光照片通常太暗、有颗粒感或模糊不清\n\n在弱光条件下拍摄照片很困难，因为任何相机都需要光线，而相机可用的光线越少，拍出的照片就越容易显得太暗、有颗粒感或模糊不清。\n\
  \n`iPhone 7 Plus` 配备了两个摄像头，其中一个镜头的孔径为 `f/1.8`，而 `iPhone 6s` 和 `6s Plus` 的镜头孔径为 `f/2.2`。在相机规格这个看似颠倒的世界里，更小的光圈数值意味着更大的镜头通光面积——在本例中，`f/1.8`\
  \ 镜头的通光面积比 `f/2.2` 镜头大 50%。镜头可用的通光面积越大，相机能收集到的光线就越多，因此其弱光拍摄能力也就越强。\n\n**解决方法：**\
  \ 即使你没有 `iPhone 7 Plus`，仍然可以采取一些措施来改善弱光照片。以下是一些提示：\n\n*   利用所有可用的光源。如果在户外，寻找路灯、明亮的标志牌，甚至是明亮的月光。如果在室内且是白天，请靠近窗户拍照。在夜晚，打开台灯和其他光源。\n\
  *   拍照时尽量保持设备稳定，尤其要使用我在上一部分提到的许多相同技巧。当“`相机`”应用检测到光线较暗时，它会降低快门速度——即延长快门开启时间——以让更多光线到达镜头。然而，较慢的快门速度意味着曝光时间更长，因此更容易出现相机抖动。\n\
  \    > **提示：** 对于非常黑暗的环境，考虑为你的 iOS 设备投资一个三脚架。这是确保相机在长时间曝光期间保持稳定的最佳方法。\n*   调整曝光级别，它控制着照片的整体亮度。在黑暗条件下，“`相机`”应用通常会调整曝光进行补偿，这意味着增加曝光。不幸的是，这通常会导致场景中较亮的区域过度曝光，显得发白。同样，场景中单个明亮的物体也可能导致“`相机`”应用减少曝光，从而使阴影和其他暗部区域曝光不足。要调整曝光，请先构图，然后点击屏幕设置对焦点。现在你可以向上拖动屏幕增加曝光（使图像变亮），或向下拖动减少曝光（使图像变暗）。\n\
  *   利用闪光灯。许多人不喜欢使用内置相机闪光灯，因为它会让拍摄对象看起来苍白。但在光线非常暗的情况下，你可能别无选择，因为闪光灯可能是你唯一有效的光源。“`相机`”应用的“`闪光灯`”功能默认设置为“`自动`”，这意味着应用会自行判断是否需要使用闪光灯。你可以保持此设置，也可以将“`闪光灯`”设置为“`打开`”，这样“`相机`”应用就会始终使用它。在“`相机`”应用中，点击“`闪光灯`”图标（闪电符号；参见图\
  \ 7-1），然后点击“`自动`”或“`打开`”。\n\n![A429116_1_En_7_Fig1_HTML.jpg](img/A429116_1_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1.\n\n\n\n轻点`闪光灯`，然后轻点你要使用的设置。\n\n- 以黑白模式拍摄。弱光照片中的阴影及其他较暗部分通常会显得颗粒感重，但当照片为彩色时，这种颗粒感会格外突出。通过采用黑白而非彩色拍摄，你可以改善照片中颗粒感部分的外观。在“相机”应用中，轻点“滤镜”图标（三个重叠的圆圈），然后轻点以下任一滤镜（见图\
  \ 7-2）：\n  - `单色` — 此滤镜将所有颜色转换为黑白色调，不进行其他处理。对于大多数弱光环境而言，这是一款全能型好滤镜。\n  - `色调` —\
  \ 此滤镜与`单色`相同，但还额外提升了亮度和对比度。当环境相当暗或场景缺乏对比度时，这款滤镜很好用。\n  - `黑白` — 此滤镜与`单色`相同，但额外增强了多项其他参数，包括对比度、亮度和强度。这可以拍出一些非常戏剧性的照片，但你可能会觉得某些图像显得处理过度。\n\
  \n![A429116_1_En_7_Fig2_HTML.jpg](img/A429116_1_En_7_Fig2_HTML.jpg)\n\n图 7-2.\n\n\
  要以黑白模式拍摄弱光照片，轻点“滤镜”，然后轻点`单色`、`色调`或`黑白`\n\n弱光拍摄完成后，请务必再次轻点“滤镜”图标，然后轻点`无`，以移除滤镜。\n\
  \n**提示**  \n你也可以将黑白滤镜应用于已拍摄的照片。使用“照片”应用打开照片；轻点“编辑”（图标看起来像三个均衡器条）；轻点“滤镜”；然后轻点`单色`、`色调`或`黑白`。\n\
  \n#### 对焦或曝光设置难以固定\n\n“相机”应用提供了一项名为`自动对焦`的功能，可使相机自动对焦于画面中央的任何主体。\n\n或者，你也可以通过轻点屏幕自行设置对焦和曝光。如果希望聚焦的主体不在画面中央，可以轻点该主体，iOS\
  \ 设备便会自动将对焦点移至该物体。它还会自动调整白平衡和曝光。如果曝光似乎不准确，你可以在屏幕任意位置向上或向下拖动，分别增加或减少亮度。\n\n大多数人依赖`自动对焦`，这确实是一项便捷功能，但当你已完美构图时，`自动对焦`一旦介入，可能会破坏对焦或曝光（或两者兼具！）。\n\
  \n**解决方案**：为预防此情况，请先构图，然后长按你希望对焦的人物或物体约三秒钟（或直到对焦矩形闪烁）。松开手指后，你会看到屏幕顶部显示`AE/AF 锁定`（即`自动曝光/自动对焦`的缩写），如图\
  \ 7-3 所示。你当前的对焦和曝光设置现已锁定，即使移动相机也不会改变。若要解除曝光和对焦锁定，请轻点屏幕。\n\n![A429116_1_En_7_Fig3_HTML.jpg](img/A429116_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3.\n\n要锁定曝光和对焦，长按屏幕直至看到`AE/AF 锁定`\n\n#### 你想让自己出现在后置摄像头拍摄的照片中\n\n“自拍”（即拍一张自己的照片，可能包含一两位朋友）这个词曾被牛津词典评为\
  \ 2013 年度词汇，我相信这对你来说一点都不意外。只需看看任何活动或场合，你就会发现我们每个人都成了自己最喜欢的拍摄对象。为了让自拍更简单，只需切换到前置摄像头即可，这几乎像是为自拍量身定做的。\n\
  \n我说“几乎”，是因为用前置摄像头自拍的方法确实存在几个缺点：\n\n- 前置摄像头相比后置摄像头分辨率低，且不支持闪光灯。\n- 所有照片基本都必须在手臂长度的距离内拍摄，这让每张照片都带有一种“这是我正在自拍”的独特外观。\n\
  \n富有创意的自拍者通过使用镜子和其他技巧绕过了这些限制，但 iOS 提供了一个更简单的替代方案：延时拍摄。此功能让相机在您轻点快门按钮后等待几秒再拍摄照片。这意味着你的拍照步骤变化如下：\n\
  \n1.  在“相机”应用中，使用“切换相机”图标（如图 7-4 所示）选择后置摄像头。\n\n    ![A429116_1_En_7_Fig4_HTML.jpg](img/A429116_1_En_7_Fig4_HTML.jpg)\n\
  \n    图 7-4.\n\n    使用“相机”应用的“切换相机”按钮选择后置摄像头\n\n2.  轻点“延时拍摄”按钮（如图 7-5 所示），然后轻点你想要设置的延迟秒数：3\
  \ 秒或 10 秒。\n\n    ![A429116_1_En_7_Fig5_HTML.jpg](img/A429116_1_En_7_Fig5_HTML.jpg)\n\
  \n    图 7-5.\n\n    在“相机”应用的菜单栏中，轻点“延时拍摄”图标\n\n3.  放置你的 iOS 设备（例如，放在桌子或椅子上），使其指向你自拍时想要使用的背景。\n\
  \n4.  轻点快门。\n\n5.  在拍摄前进入画面。\n\n请注意，“相机”应用不会只拍一张照片，而是连拍 11 张。若要选择要保留的照片，请轻点左下角的照片缩略图，轻点连拍照片，轻点“选择”，轻点你想要保留的照片，轻点“完成”，然后轻点`仅保留一张喜欢的`。\n\
  \n**提示**  \n`连拍`模式并非仅在拍摄延时照片时可用。你可以在任何想要的时候，通过长按快门按钮来拍摄一组连拍照片。\n\n#### 难以拍出笔直的照片\n\
  \n尽管你偶尔会想从一个有趣或刁钻的角度拍照，但大多数时候，照片拍得笔直会看起来效果最好。然而，当你快速或随意拍照时，让照片变直可能是一个挑战。你总可以在拍完照片后再进行校正（请参阅本章后面的“照片不直”一节），但最好从一开始就拍直。\n\
  \n**解决方案**：确保照片笔直的一个有用方法是显示“相机”应用的网格，它会显示两条水平线和两条垂直线，将画面分成九个矩形（即 3x3 网格）。这些线条不会显示在你的照片中，但你可以用它们来确保你的主体在水平和垂直方向上都对齐。请按照以下步骤激活网格：\n\
  \n1.  打开“设置”应用。\n\n2.  轻点“照片与相机”。\n\n3.  将“网格”开关轻点至打开。\n\n**提示**  \n网格对于运用“三分法”构图也很有用。使用三分法时，你将主体放在某条网格线上（或两条网格线的交点上），而不是放在屏幕正中央。\n\
  \n### 照片问题故障排除\n\n\n\n#### 照片曝光不当或存在类似光线问题\n\n即便你在拍摄时倾注了大量心血精心设置，仍可能得到一张曝光不足或过度、阴影过暗或过亮、或整体对比度欠佳的照片。当然，我们大多数照片都是快速抓拍瞬间的，这些即兴拍摄的照片更容易出现光线问题。\n\
  \n**解决方法：**“照片”App 自带一个“`增强`”功能，可以分析照片并自动应用多项修正。使用方法如下：\n\n1.  在“照片”App 中，打开你想要修正的照片。\n\
  2.  轻点照片以显示控制选项（如果尚未显示）。\n3.  如图 7-6 所示，轻点“`编辑`”。“照片”App 会显示其编辑工具。\n\n![A429116_1_En_7_Fig6_HTML.jpg](img/A429116_1_En_7_Fig6_HTML.jpg)\n\
  \n**图 7-6.** 在“照片”App 的菜单栏中，轻点“`编辑`”以载入照片编辑工具\n\n4.  轻点“`增强`”（位于右上角的魔棒图标；参见图 7-7）。“照片”App\
  \ 会调整照片的色彩和亮度。\n\n![A429116_1_En_7_Fig7_HTML.jpg](img/A429116_1_En_7_Fig7_HTML.jpg)\n\
  \n**图 7-7.** 要为你的照片应用自动修正，请轻点“`增强`”图标\n\n5.  轻点“`完成`”。“照片”App 会保存你的更改。\n\n> **注意：**\
  \ 如果你的编辑使照片变得更糟，你可以恢复原始照片。轻点照片以显示控制选项（如需），轻点“`编辑`”，然后轻点“`复原`”，当“照片”App 要求你确认时，轻点“`复原到原始状态`”。\n\
  \n如果“`增强`”功能未能改善你的照片，或者你希望采用更精细的调整方式，“照片”App 还提供了一些编辑工具，可帮助你解决与光线相关的特定问题。它提供了七个滑块，可用于调整照片的光线：\n\
  \n*   **黑曜石。** 使用此滑块可调整照片某些部分的光线，特别是通过调整照片中较暗部分的光线。如果你的照片除了较暗部分以外曝光正常，请增加黑曜石值。\n\
  *   **曝光。** 使用此滑块可设置照片的整体亮度。如果整张照片因过亮而泛白，请降低曝光值以获得较暗的图像；如果整张照片因过暗而模糊，请增加曝光值以获得较亮的图像。\n\
  *   **高光。** 使用此滑块可调整图像中最亮部分的强度。如果你的照片有一个或多个区域因过亮而泛白，请降低“`高光`”值以抵消这种效果。\n*   **阴影。**\
  \ 使用此滑块可调整图像中最暗部分的强度。如果你的照片有一个或多个区域因过暗而缺乏细节，请降低“`阴影`”值以尝试恢复部分细节。\n*   **亮度。** 使用此滑块可调整照片所有色调的明暗程度，使其偏向白色或黑色。与主要影响照片暗部的“`黑曜石`”不同，“`亮度`”会影响照片的所有色调。如果照片过暗，请增加亮度；如果照片过亮，请降低亮度。\n\
  *   **对比度。** 使用此滑块可调整照片色调的分布。如果照片中的色调差异过大，请降低对比度使其趋于一致；如果照片因色调过于相近而显得平淡，请增加对比度以使色调突出。\n\
  *   **黑点。** 使用此滑块可设置图像中最黑部分的界限。较低的值意味着图像中最暗的部分看起来也是灰色的，而较高的值则意味着照片中更多暗部区域会呈现为黑色。\n\
  \n> **注意：** 根据你的 iOS 设备和该设备上运行的 iOS 版本，你可能无法看到所有这些照片编辑工具。\n\n若要使用这些工具调整照片的光线，请按以下步骤操作：\n\
  \n1.  在“照片”App 中，打开你想要修正的照片。\n2.  轻点照片以显示控制选项（如果尚未显示）。\n3.  轻点“`编辑`”（前面在图 7-6 中指出过）。“照片”App\
  \ 会显示其编辑工具。\n4.  轻点“`灯光`”（参见图 7-8）。\n\n![A429116_1_En_7_Fig8_HTML.jpg](img/A429116_1_En_7_Fig8_HTML.jpg)\n\
  \n**图 7-8.** 要为你的照片应用特定的光线修正，请轻点“`灯光`”图标\n\n5.  轻点“`灯光`”列表。（在某些情况下，你可能需要先轻点“`列表`”图标，该图标与图\
  \ 7-10 中指出的图标类似。）“照片”App 会显示可用的设置，如图 7-9 所示。\n\n![A429116_1_En_7_Fig10_HTML.jpg](img/A429116_1_En_7_Fig10_HTML.jpg)\n\
  \n**图 7-10.** “`灯光`”列表中的每项设置都会显示一个滑块，例如此处显示的“`曝光`”滑块\n\n![A429116_1_En_7_Fig9_HTML.jpg](img/A429116_1_En_7_Fig9_HTML.jpg)\n\
  \n**图 7-9.** 轻点“`灯光`”列表，查看可对照片进行的与光线相关的调整选项\n\n6.  轻点你想要调整的设置项。“照片”会为此设置显示一个滑块。例如，图\
  \ 7-10 显示了“`曝光`”滑块。\n7.  向左或向右拖动滑块，直至获得你想要的效果。\n8.  轻点“`列表`”图标（参见图 7-10）返回“`灯光`”列表。\n\
  9.  根据需要重复步骤 6 到 8，进行其他光线调整。\n10.  轻点“`完成`”。“照片”App 会保存你的更改。\n\n\n\n#### 照片颜色显示异常\n\
  \n照片的颜色有时会显得不太对劲。例如，它们可能缺乏饱和度、颜色过于接近，或者整张照片偏蓝或偏红。\n\n**解决方案：** “照片”应用提供了多种工具，可用来改善照片颜色。其中最简单的工具是`增强`功能，它可以自动调整照片的颜色。要使用`增强`工具，请通过“照片”应用打开要修复的照片，轻点照片以显示控制项（如果未显示），轻点`编辑`（如图\
  \ 7-6 所示），轻点`增强`（如图 7-7 所示），然后轻点`完成`。\n\n如果`增强`功能未能改善照片颜色，或者你希望进行更精细的编辑，“照片”应用还提供了编辑工具，可帮助你解决与颜色相关的特定问题。以下三个滑块可用于调整照片中的颜色：\n\
  \n-   **饱和度。** 使用此滑块可调整照片颜色的鲜艳程度。如果照片缺乏活力，请尝试提高饱和度。\n-   **对比度。** 使用此滑块可调整照片色调的分布。如果颜色混在一起，请增加对比度以使颜色区分开来。\n\
  -   **色偏。** 使用此滑块可调整偏红或偏蓝的照片。\n\n要使用这些工具调整照片颜色，请遵循以下步骤：\n\n1.  在“照片”应用中，打开要修复的照片。\n\
  2.  轻点照片以显示控制项（如果尚未显示）。\n3.  轻点`编辑`（如图 7-6 所示）。“照片”应用会显示其编辑工具。\n4.  轻点`光线`（参见图 7-8）。\n\
  5.  轻点`颜色`列表。（在某些情况下，你可能需要先轻点`列表`图标，该图标与图 7-10 中指出的图标类似。） “照片”应用会显示可用的设置，如图 7-11\
  \ 所示。\n\n    ![A429116_1_En_7_Fig11_HTML.jpg](img/A429116_1_En_7_Fig11_HTML.jpg)\n\
  \n    **图 7-11.** 轻点`颜色`列表，查看可对照片进行的颜色相关调整\n6.  轻点要调整的设置项。“照片”应用会显示该设置的滑块。\n7. \
  \ 向左或向右拖动设置滑块，直到获得想要的效果。\n8.  轻点`列表`图标（参见前面的图 7-10）以返回`颜色`列表。\n9.  根据需要重复步骤 6 至\
  \ 8 进行其他颜色调整。\n10.  轻点`完成`。“照片”应用会保存你的更改。\n\n#### 你的黑白照片效果有待提升\n\n前面你了解到，应用 iOS\
  \ 黑白照片滤镜（如`单色`、`色调`或`怀旧`)可以改善弱光图像。当然，当你寻求黑白照片特有的鲜明、简洁或强烈感时，也可以对任何照片应用黑白滤镜。不幸的是，有时你的黑白作品最终可能会显得缺乏创意、平淡无奇或杂乱无章。\n\
  \n**解决方案：** 可能是因为你选错了拍摄对象，因为并非所有场景都适合处理成黑白效果。不过，如果并非这个原因，那么你可以通过“照片”应用中`黑白`类别下的四项设置来优化你的黑白照片：\n\
  \n-   **强度。** 使用此滑块可调整照片中从彩色转换为黑白部分的强度。如果黑白照片冲击力不足，请尝试增加强度。\n-   **中性色。** 使用此滑块可调整照片中从白色或灰色调转换而来的部分的强度。如果黑白照片的这些部分不够突出，请尝试增加中性色数值。\n\
  -   **色调。** 使用此滑块可调整照片的整体强度。如果黑白照片看起来发白，请尝试增加色调。\n-   **颗粒。** 使用此滑块可为照片添加颗粒感。如果你想要照片具有复古效果，请尝试增加颗粒。\n\
  \n要使用这些工具调整黑白照片，请遵循以下步骤：\n\n1.  在“照片”应用中，打开要修复的照片。\n2.  轻点照片以显示控制项（如果尚未显示）。\n3.\
  \  轻点`编辑`（如图 7-6 所示）。“照片”应用会显示其编辑工具。\n4.  轻点`光线`（参见图 7-8）。\n5.  轻点`黑白`列表。（在某些情况下，你可能需要先轻点`列表`图标，该图标与图\
  \ 7-10 中指出的图标类似。） “照片”应用会显示可用的设置，如图 7-12 所示。\n\n    ![A429116_1_En_7_Fig12_HTML.jpg](img/A429116_1_En_7_Fig12_HTML.jpg)\n\
  \n    **图 7-12.** 轻点`黑白`列表，查看可对照片进行的黑白相关调整\n6.  轻点要调整的设置项。“照片”应用会显示该设置的滑块。\n7. \
  \ 向左或向右拖动设置滑块，直到获得想要的效果。\n8.  轻点`列表`图标（参见前面的图 7-10）以返回`黑白`列表。\n9.  根据需要重复步骤 6 至\
  \ 8 进行其他黑白调整。\n10.  轻点`完成`。“照片”应用会保存你的更改。\n\n#### 照片中出现一处或多处红眼\n\n当你使用闪光灯拍摄人物或动物照片时，在某些情况下，闪光灯可能会在拍摄对象的视网膜上形成反光。结果就产生了常见的红眼现象，即拍摄对象的瞳孔呈现红色而非黑色。\n\
  \n**解决方案：** 如果你的 iOS 设备上有一张照片，其中人物或动物因相机闪光灯出现了红眼，你可以使用“照片”应用将其移除，让拍摄对象看起来更自然。具体操作如下：\n\
  \n1.  在“照片”应用中，打开包含你想要移除的红眼的照片。\n2.  轻点照片以显示控制项（如果尚未显示）。\n3.  轻点`编辑`（如图 7-6 所示）。“照片”应用会显示其编辑工具。\n\
  4.  轻点`红眼`，如图 7-13 所示。\n\n    ![A429116_1_En_7_Fig13_HTML.jpg](img/A429116_1_En_7_Fig13_HTML.jpg)\n\
  \n    **图 7-13.** 轻点`红眼`图标以显示“照片”应用的红眼移除工具\n5.  轻点你想要移除的红眼区域。“照片”应用会移除红眼。\n6.  重复步骤\
  \ 5，直到移除照片中所有红眼。\n7.  轻点`完成`。“照片”应用会将更改应用到照片。\n\n\n\n#### 照片中包含你想去除的元素\n\n在拍照取景时，你可能会尽量避开某些会破坏最终画面的元素，例如灯柱或栅栏顶部。即便你费尽心思，照片中仍然难免出现不想要的画面部分。\n\
  \n**解决方法：** 当照片中包含你不需要或不希望看到的元素时，通常可以将其裁切掉。这称为裁剪，你可以使用“照片”应用来完成。裁剪照片时，你需要指定一个矩形区域作为保留部分，“照片”应用会自动舍弃矩形外的所有内容。对于移除照片边缘或边缘附近的冗余元素，裁剪是一项非常有用的技能，同时你也能借此突出照片的真正主体。\n\
  \n请按照以下步骤裁剪照片：\n\n1.  在“照片”应用中，打开需要裁剪的照片。\n2.  如果尚未显示控制项，请轻点照片以将其调出。\n3.  轻点“编辑”（此前已在图\
  \ 7-6 中标注）。“照片”应用将显示其编辑工具。\n4.  轻点“裁剪与校正”（如图 7-14 所示）。“照片”应用会显示用于裁剪的网格，如图 7-15 所示。\n\
  \n    ![A429116_1_En_7_Fig15_HTML.jpg](img/A429116_1_En_7_Fig15_HTML.jpg)\n\n  \
  \  图 7-15.\n    轻点并拖动角落以裁剪照片\n\n    ![A429116_1_En_7_Fig14_HTML.jpg](img/A429116_1_En_7_Fig14_HTML.jpg)\n\
  \n    图 7-14.\n    轻点“裁剪与校正”图标以显示“照片”应用的裁剪工具\n5.  轻点并拖动网格的一角来设定要保留的区域。\n6.  轻点“完成”。“照片”应用会将修改应用到照片上。\n\
  \n**提示**\n\n对某些照片进行裁剪的最快方法是直接告诉“照片”应用你希望最终照片的尺寸。轻点“比例”（如图 7-14 中标注），然后轻点一个具体的形状（“原始”或“正方形”）或具体的宽高比，例如\
  \ 5:7 或 4:5。接着拖动照片（而不是网格！），使得你要保留的部分位于网格内。\n\n#### 照片不水平\n\n你可能从惨痛的经验中得知，用 iPhone\
  \ 相机拍摄出完全水平的照片非常困难。这需要大量的练习和稳定的双手。（你也可以激活相机应用的网格功能；请参阅章节“你很难拍出水平的照片”。）即使你尽了最大努力，最终得到的照片仍可能不太水平。\n\
  \n**解决方法：** 你可以使用“照片”应用将照片顺时针或逆时针旋转，直到主体看起来是水平的。请按照以下步骤裁剪并校正照片：\n\n1.  在“照片”应用中，打开需要校正的照片。\n\
  2.  如果尚未显示控制项，请轻点照片以将其调出。\n3.  轻点“编辑”（此前已在图 7-6 中标注）。“照片”应用将显示其编辑工具。\n4.  轻点“裁剪与校正”（见图\
  \ 7-14）。“照片”应用会显示校正工具（带有角度标记的弧形；见图 7-15）。\n5.  向左或向右拖动校正工具，直到照片水平。\n6.  轻点“完成”。“照片”应用会将修改应用到照片上。\n\
  \n**注意**\n\n“裁剪与校正”功能还可以让你将照片旋转 90 度，例如从竖屏方向旋转为横屏方向。为此，请轻点“旋转”图标（见图 7-14），直到照片达到你想要的朝向。\n\
  \n"
- "# 8. 保护你的设备\n\niPhone 自 2007 年问世，iPad 自 2010 年问世以来，这些设备已成为许多人生活中不可或缺的一部分。这种不可或缺性来自于这些设备的多功能性。在典型的一天里，你可能会用\
  \ iOS 设备浏览网页、收发电子邮件和短信、拨打电话、管理联系人和日历、听音乐、玩游戏、查看天气或股市，以及处理其它大大小小的事务。然而，这种无比强大的功能和便利性也是有代价的：你的\
  \ iOS 设备上存储了大量关于你的信息。诚然，这些数据大多可能微不足道或转瞬即逝，但其中许多是私密且敏感的。丢失 iOS 设备会造成极大的不便，但他人获取你的信息则可能导致大问题。所以，没错，保护\
  \ iOS 设备的概念听起来可能不像一个故障排除话题。但采取措施确保设备丢失后能够找到它，并确保设备丢失期间无人能查看或篡改你的信息，可被视为一种预防性维护。而防患于未然正是最好的故障排除方式。\n\
  \n### 锁定你的设备\n\n当 iOS 设备处于睡眠状态时，即使轻触屏幕或按音量键也不会产生任何反应，此时设备处于锁定状态。这种合理的安排可以防止手机放在口袋里，或在背包或手提包里晃动时意外触碰。要解锁设备，你可以按两次主屏幕按钮，或者按一次睡眠/唤醒按钮，然后再按主屏幕按钮。就这么简单，你便能继续使用了。\n\
  \n不幸的是，这个简单的方法意味着任何拿到你 iOS 设备的人也能迅速恢复使用——使用你的设备！如果你的设备上有敏感或机密信息，或者想避免因数字漫游而产生巨额费用，你需要真正锁定你的\
  \ iOS 设备。\n\n#### 你想用密码锁定设备\n\n就像你用密码“锁定”用户账户和众多在线账户一样，你可能也希望用类似的方式来锁定 iOS 设备。\n\
  \n**解决方法：** 你可以通过设置密码来实现，任何人在使用设备前都必须输入该密码。iOS 的默认设置是六位数字密码，但你可以将其改为简单的四位数字密码，或者更长、更复杂、使用数字、字母和符号任意组合的自定义密码。\n\
  \n请按照以下步骤设置密码：\n\n1.  在主屏幕上，轻点“设置”。系统将显示“设置”应用。\n2.  轻点“触控 ID 与密码”以打开“触控 ID 与密码”屏幕。如果您的\
  \ iOS 设备不支持触控 ID，则轻点“密码”以打开“密码锁定”屏幕。\n3.  轻点“开启密码”。系统将显示“设置密码”屏幕。\n4.  如果你希望使用六位数字密码以外的密码，请轻点“密码选项”，然后轻点你想要使用的密码类型（见图\
  \ 8-1）。\n\n    ![A429116_1_En_8_Fig1_HTML.jpg](img/A429116_1_En_8_Fig1_HTML.jpg)\n\
  \n    图 8-1.\n    iOS 为你提供了几种密码类型选项\n5.  输入你的密码。出于安全考虑，字符在密码框中会显示为圆点。\n6.  如果你在输入自定义密码，请轻点“下一步”。你的\
  \ iOS 设备会提示你重新输入密码。\n7.  再次输入你的密码。\n8.  如果你在输入自定义密码，请轻点“完成”。\n\n**注意**\n\n你必须牢牢记住\
  \ iOS 设备的密码。如果忘记，你将被自己的设备拒之门外。重新访问设备的唯一方法是使用 iTunes 通过现有备份来恢复 iOS 设备的数据和设置（如第 1\
  \ 章所述）。\n\n\n\n#### 你希望确保数据不会落入恶意之手\n\n如果你的 iOS 设备落入他人之手，你的密码可以防止此人访问你的数据和应用程序。你可能会想知道，当此人尝试猜测密码时会发生什么：\n\
  \n- 在第七次尝试失败后，`iOS` 会将设备锁定五分钟。\n- 在第八次尝试失败后，`iOS` 会将设备锁定十五分钟。\n- 在第九次尝试失败后，`iOS`\
  \ 会将设备锁定一小时。\n- 在第十次尝试失败后，`iOS` 会将设备完全锁定，你必须与 `iTunes` 同步才能恢复数据。\n\n- 在六次密码输入错误后，`iOS`\
  \ 会锁定设备——即阻止任何进一步的密码尝试——持续一分钟，如图 8-2 所示。\n\n![A429116_1_En_8_Fig2_HTML.jpg](img/A429116_1_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2. 当有人错误猜测你的密码六次后，iOS 会阻止进一步尝试一分钟\n\n如果你的设备包含极其敏感或私密的数据，你可能会担心有人仍能以某种方式访问这些数据。\n\
  \n**解决方案：** 你可以将 iOS 设备配置为不仅在第十次密码尝试失败后完全锁定，还能擦除其所有数据。具体设置方法如下：\n\n1. 在主屏幕上，轻点 `Settings`。此时会显示\
  \ `Settings` 应用。\n2. 轻点 `Touch ID & Passcode`。如果你的 iOS 设备不支持 `Touch ID`，则改为轻点 `Passcode`。`iOS`\
  \ 会提示你输入密码。\n3. 输入你的密码，如果你使用的是自定义密码，则轻点 `Done`。\n4. 将 `Erase Data` 开关轻点至 `On`。`iOS`\
  \ 会要求你确认是否要启用此功能。\n5. 轻点 `Enable`。`iOS` 会启用 `Erase Data`，如图 8-3 所示。\n\n![A429116_1_En_8_Fig3_HTML.jpg](img/A429116_1_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3. 启用 `Erase Data` 后，你的 iOS 设备在检测到连续十次密码输入错误后，会自动擦除所有数据\n\n#### 你需要在 iPhone\
  \ 锁定时拨打紧急电话\n\n如果遇到紧急情况，你需要拨打电话求助，你可能不希望浪费时间在输入密码上。同样，如果你发生了意外，其他不知道你密码的人可能也需要用你的\
  \ iPhone 设备来寻求帮助。\n\n**解决方案：** 在这两种情况下，你都可以通过轻点“输入密码”屏幕上的 `Emergency` 按钮来临时绕过密码，如图\
  \ 8-4 所示。\n\n![A429116_1_En_8_Fig4_HTML.jpg](img/A429116_1_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4. 在“输入密码”屏幕中，你可以轻点 `Emergency` 在不解锁 iPhone 的情况下拨打紧急电话\n\n#### 你正在使用密码，但解锁设备时密码并不总是出现\n\
  \n默认情况下，一旦你锁定设备，或者设备在闲置一段时间后自动锁定，`iOS` 会立即生效密码。这是一个合理的默认设置，因为如果设备处于解锁状态，密码就无法保护你的设备。然而，你可能会发现，你可以锁定设备，但解锁时\
  \ `iOS` 并不要求输入密码。\n\n**解决方案：** 这个问题意味着你的 iOS 设备被设置为在锁定后不立即要求输入密码。有些人将密码设置为在设备锁定至少一分钟后才生效，以避免每次设备因闲置而自动锁定时都要反复重新输入密码。然而，任何延迟要求输入密码的设置都会降低设备的安全性。\n\
  \n要确保你的 iOS 设备一锁定就必须输入密码，请按照以下步骤操作：\n\n1. 在主屏幕上，轻点 `Settings`。此时会显示 `Settings` 应用。\n\
  2. 轻点 `Touch ID & Passcode`。如果你的 iOS 设备不支持 `Touch ID`，则改为轻点 `Passcode`。`iOS` 会提示你输入密码。\n\
  3. 输入你的密码，如果你使用的是自定义密码，则轻点 `Done`。\n4. 轻点 `Require Passcode` 以打开 `Require Passcode`\
  \ 屏幕。\n5. 轻点 `Immediately`，如图 8-5 所示。\n\n![A429116_1_En_8_Fig5_HTML.jpg](img/A429116_1_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5. 为确保你的密码始终保护着锁定的设备，请将 `Require Passcode` 设置改为 `Immediately`\n\n#### 你希望可以用指纹解锁设备\n\
  \n在所谓的“i 犯罪”时代，用密码保护你的 iOS 设备是明智之举，因为窃贼经常通过抢夺 iPhone 和其他苹果设备来“摘苹果”。有了密码作为窃贼和你 iOS\
  \ 设备之间的数字屏障，至少你的个人数据可以免遭窥探。是的，密码是一种明智的安全预防措施，但它并不总是很方便。首先，一天中需要多次输入那四个（或更多）字符的代码，会给使用设备带来微小但令人不快的烦恼。其次，由于\
  \ `iOS` 可能不明智地在输入密码时高亮每个字符，至少在理论上，一些肩窥者有可能识别出你的密码。\n\n**解决方案：** 如果你有一台支持 `Touch\
  \ ID` 的 iOS 设备——即 iPhone 5s 或更高版本、iPad Pro、iPad Air 2 或 iPad mini 3 或更高版本——你可以利用\
  \ `Touch ID`，即这些 iOS 设备 Home 按钮中内置的指纹传感器。通过让设备学习你独特的指纹，你只需按下 Home 按钮即可解锁设备。没错：无需再输入密码就能进入主屏幕。另一个额外的好处是，你可以使用同一个指纹来批准你在\
  \ `iTunes Store`、`App Store`、`iBooks Store`、`Apple Pay` 甚至一些第三方应用中的购买，这样你就不再需要输入\
  \ Apple ID 密码了。\n\n以下是设置 `Touch ID` 的方法：\n\n1. 在主屏幕上，轻点 `Settings`。此时会显示 `Settings`\
  \ 应用。\n2. 轻点 `Touch ID & Passcode`，然后输入你的密码（如果有的话）以打开 `Touch ID & Passcode` 屏幕。\n\
  3. 轻点 `Add a Fingerprint`。此时会显示 `Touch ID` 屏幕。\n4. 将你的拇指——或解锁 iOS 设备时最常用来按 Home\
  \ 按钮的手指——轻放在 Home 按钮上。\n5. 在 `Touch ID` 学习你的指纹图案时，反复抬起并放下你的手指。\n6. 当看到 `Adjust Your\
  \ Grip` 屏幕时，轻点 `Continue`。\n7. 再次反复抬起并放下你的手指，这次着重于手指的边缘部分。\n8. 当看到 `Complete` 屏幕时，轻点\
  \ `Continue`。如果你尚未指定密码，你的 iOS 设备会提示你现在设置一个。\n9. 输入你的密码，然后在要求确认时再次输入。`Settings` 会带你回到\
  \ `Touch ID & Passcode` 屏幕。\n10. 要添加另一个指纹，重复步骤 3 到 8。\n\n\n\n#### 无法使用指纹解锁 iOS 设备\n\
  \n使用 `Touch ID` 解锁 iOS 设备非常方便，尤其当你需要输入一个很长的自定义数字或字母数字密码时。然而，如果当你将手指放在主屏幕按钮上时，iOS\
  \ 设备拒绝解锁，这种便利性就荡然无存了。\n\n**解决方法：** 无法使用指纹解锁 iOS 设备的原因有很多：\n- 如果你的设备运行的是 iOS 10，请记住，你可能需要用保存为指纹的那根手指按下主屏幕按钮来解锁设备。在某些设备以及更早版本的\
  \ iOS 系统中，你只需将手指放在主屏幕按钮上即可解锁设备。\n- 如果你刚刚重启了设备，或者在过去 48 小时内没有解锁过设备，`Touch ID` 将无法使用。在这些情况下，iOS\
  \ 会强制你使用密码来解锁设备。如果连续五次尝试指纹识别失败，iOS 也会要求输入密码。\n- 确保你使用的是已添加到 iOS 作为 `Touch ID` 指纹的手指。人们常常会添加，比如，右手拇指或食指，然后尝试用左手拇指或食指解锁设备，这种情况并不少见。\n\
  - 确保你的手指完全覆盖住主屏幕按钮。\n- 手指放在主屏幕按钮上时不要移动。\n- 确保你的手指清洁且干燥。\n- 如果你的手指非常冷，`Touch ID`\
  \ 有时会失效，所以可以尝试暖一下手指。\n- 确保你的手指没有伤口或肿胀。\n- 如果你最近游过泳或洗过澡，你的手指可能吸收了足够多的水分导致指纹改变（形成所谓的“泡皱手指”）。在这种情况下，你别无选择，只能等待指纹恢复正常状态。\n\
  - 使用软布清洁主屏幕按钮。\n- 确保保护壳或其他保护套没有遮挡主屏幕按钮的一部分。\n- 确保 iOS 已配置为允许使用指纹解锁设备。运行 `设置` 应用，轻点\
  \ `触控 ID 与密码`，然后输入你的密码以打开 `触控 ID 与密码` 屏幕。确保 `设备解锁` 开关（其中`设备`是 `iPhone` 或 `iPad`）设置为\
  \ `开启`，如图 8-6 所示。\n\n![A429116_1_En_8_Fig6_HTML.jpg](img/A429116_1_En_8_Fig6_HTML.jpg)\n\
  \n**图 8-6.** 要使用保存的指纹解锁设备，请确保 `设备解锁` 开关为 `开启`\n\n如果这些解决方案对你都不起作用，那么你应该删除所有指纹并重新添加。请按照以下步骤删除指纹：\n\
  1. 在主屏幕上，轻点 `设置`。出现 `设置` 应用。\n2. 轻点 `触控 ID 与密码`，然后输入你的密码以打开 `触控 ID 与密码` 屏幕。\n3.\
  \ 轻点你想要删除的指纹。\n4. 轻点 `删除指纹`。iOS 会删除该指纹并返回 `触控 ID 与密码` 屏幕。\n5. 重复步骤 3 和 4 以删除所有指纹。\n\
  \n**提示：** 一种更简单的删除指纹方法是：执行步骤 1 和 2，在要删除的指纹上向左滑动，然后轻点出现的 `删除` 按钮。\n\n#### 不想忘记为 Touch\
  \ ID 配置了哪个指纹\n\n如果你不经常使用 `Touch ID`，你可能会忘记自己将哪根或哪些手指添加为 iOS 中的指纹。\n\n**解决方法：** 为了帮助你记忆，你可以为每个指纹提供一个描述性的名称（例如\
  \ `\"右手拇指\"` 或 `\"左手食指\"`）。操作方法如下：\n1. 在主屏幕上，轻点 `设置`。出现 `设置` 应用。\n2. 轻点 `触控 ID 与密码`，然后输入你的密码以打开\
  \ `触控 ID 与密码` 屏幕。\n3. 轻点一个已保存的指纹（其名称将是通用的，例如 `\"指纹 1\"`）。**提示：** 如果 iOS 给你的指纹起了诸如\
  \ `\"指纹 1\"` 和 `\"指纹 2\"` 之类的通用名称，你怎么知道哪个是哪个呢？在显示 `触控 ID 与密码` 屏幕时，将一根手指放在主屏幕按钮上。如果\
  \ iOS 识别出那根手指，它会高亮显示对应的指纹名称。\n4. 为该指纹输入一个新名称，如图 8-7 所示，然后轻点 `完成`。\n\n![A429116_1_En_8_Fig7_HTML.jpg](img/A429116_1_En_8_Fig7_HTML.jpg)\n\
  \n**图 8-7.** 为了帮助记住你添加了哪些手指作为指纹，请为每个指纹提供一个描述性名称\n5. 对每个已保存的指纹重复步骤 3 和 4。\n\n####\
  \ 想要将设备配置为自动锁定\n\n你可以随时按下 `睡眠/唤醒` 按钮来锁定你的 iOS 设备。但是，如果你的 iOS 设备处于开启状态但你并未使用它，它会在两分钟后自动进入待机模式。这被称为\
  \ `自动锁定`，这是一个方便的功能，因为它可以在你的 iOS 设备闲置时节省电池电量（并防止意外触摸）。正如我之前所述，如果你已通过密码或指纹锁保护你的 iOS\
  \ 设备，这也是一个关键功能，因为如果你的 iOS 设备从不锁定，那么这些安全功能就毫无用处。但是，你可能会发现，你的 iOS 设备在闲置一段时间后并不会自动锁定。\n\
  \n**解决方法：** 要确保你的 iOS 设备自动锁定，你必须配置 `自动锁定` 功能，使其在指定的闲置时间后关闭设备。请遵循以下步骤：\n1. 在主屏幕上，轻点\
  \ `设置`。出现 `设置` 应用。\n2. 在 iOS 10 中，轻点 `显示与亮度`。在更早版本的 iOS 中，轻点 `通用`。\n3. 轻点 `自动锁定`。出现\
  \ `自动锁定` 屏幕。\n4. 轻点你想要使用的时间间隔。请注意，可用选项取决于你的设备。图 8-8 显示了 iPhone 的可用选项：30 秒、1 分钟、2\
  \ 分钟、3 分钟、4 分钟或 5 分钟。\n\n![A429116_1_En_8_Fig8_HTML.jpg](img/A429116_1_En_8_Fig8_HTML.jpg)\n\
  \n**图 8-8.** 为确保你的密码和/或指纹锁能发挥作用，请使用 `自动锁定` 让设备在指定的闲置时间后自动锁定\n\n### 备份你的设备\n\n如果你的\
  \ iOS 设备发生了一些不好的事情——例如，它崩溃了并且无法正常启动、损坏或丢失，或者你忘记了密码——你可以通过恢复设备的默认设置（如第 1 章所述）来恢复。你存储在设备上的所有数据怎么办？要恢复这些数据，你需要在电脑或\
  \ iCloud 上有可用的备份。\n\n#### 想要在不进行同步的情况下备份设备\n\n当你将 iOS 设备与电脑同步时，iTunes 会在执行同步之前自动创建一份你当前\
  \ iOS 设备数据的备份。但请注意，iTunes 不会备份整个 iOS 设备，这是合理的，因为设备上的大部分内容——音乐、照片、视频、应用等——已经在你的电脑上了。相反，iTunes\
  \ 仅备份 iOS 设备独有的数据，包括你的通话记录、短信、网页剪辑、网络设置、应用设置和数据，以及 Safari 浏览器历史和 cookie。\n\n然而，如果你已将\
  \ iTunes 配置为不自动同步你的 iOS 设备，你可能希望在不执行同步的情况下备份你的 iOS 设备。\n\n**解决方法：** 请按照以下步骤使用 iTunes\
  \ 备份你的 iOS 设备：\n1. 将你的 iOS 设备连接到电脑。\n2. 打开 iTunes（如果它没有自动启动）。\n3. 如果你的 iOS 设备询问是否信任此电脑，请轻点\
  \ `信任`，然后在电脑上点击 `继续`。\n4. 在设备列表中，点击你的 iOS 设备。\n5. 点击 `摘要` 选项卡。\n6. 点击 `立即备份`，如图\
  \ 8-9 所示。iTunes 会备份 iOS 设备的数据。\n\n![A429116_1_En_8_Fig9_HTML.jpg](img/A429116_1_En_8_Fig9_HTML.jpg)\n\
  \n**图 8-9.** 在 iTunes 中，点击已连接的 iOS 设备，点击 `摘要` 选项卡，然后点击 `立即备份`\n\n\n\n#### 你想让 iOS\
  \ 自动备份你的设备\n\n使用 iTunes 备份你的 iOS 设备很方便，但需要将设备连接到电脑、打开 iTunes 并运行备份。这些步骤并不繁琐，但足以成为一道障碍，可能导致你无法定期备份设备。这是一个问题，因为成功恢复数据的关键在于拥有一个最近的备份可用。\n\
  \n为了确保这一点，如果能有一种方法按定期计划自动备份你的 iOS 设备，那将非常理想。\n\n解决方案：如果你有 iCloud 账户，可以将 iOS 设备配置为使用\
  \ iCloud 作为备份位置。\n\n如果你经常使用 iTunes 同步 iOS 设备，可以告诉 iTunes 使用 iCloud 作为备份位置。请按照以下步骤进行配置：\n\
  \n1. 将你的 iOS 设备连接到电脑。\n2. 在 iTunes 中，当你的 iOS 设备出现在设备列表时，点击它。\n3. 点击“摘要”标签页。\n4.\
  \ 在“自动备份”部分，选择“iCloud”，如图 8-10 所示。\n\n   ![A429116_1_En_8_Fig10_HTML.jpg](img/A429116_1_En_8_Fig10_HTML.jpg)\n\
  \n   图 8-10. 在 iTunes 中，点击已连接的 iOS 设备，点击“摘要”标签页，然后在“自动备份”部分点击“iCloud”\n\n如果你从不使用\
  \ iTunes，你仍然可以通过 iOS 设备本身直接配置 iOS 将数据备份到 iCloud：\n\n1. 在主屏幕上，点击“设置”以启动“设置”应用。\n\
  2. 点击“iCloud”。\n3. 点击“备份”。\n4. 将“iCloud 云备份”开关拨到“开”，如图 8-11 所示，然后在 iCloud 确认设置时点击“好”。这会告诉\
  \ iOS 在设备锁定、连接到 Wi-Fi 网络并接入电源时进行自动备份。\n\n   ![A429116_1_En_8_Fig11_HTML.jpg](img/A429116_1_En_8_Fig11_HTML.jpg)\n\
  \n   图 8-11. 将“iCloud 云备份”拨到“开”，以设置自动 iCloud 备份\n\n5. 若要立即运行备份，请点击“立即备份”。你的 iOS\
  \ 设备会将数据备份到你的 iCloud 账户。\n\n#### 你遇到 iCloud 备份问题\n\n设置 iCloud 备份后，你可能会发现备份无法完成或根本不会运行。\n\
  \n解决方案：导致 iCloud 备份无法运行的可能原因有多种。以下是一些需要检查的事项：\n\n-   确保 iCloud 备份已激活。打开“设置”应用，点击“iCloud”，点击“备份”，然后将“iCloud\
  \ 云备份”开关拨到“开”。\n-   确保你的 iOS 设备已连接到 Wi-Fi 网络。如果没有互联网连接，iCloud 备份无法运行，也无法通过蜂窝网络连接运行。\n\
  -   确保你的 iOS 设备已接入电源。\n-   确保你的设备已锁定。\n-   检查你的 iCloud 账户是否有可用空间。要检查这一点，请打开“设置”应用，点击“iCloud”，然后查看“存储空间”命令旁边的“可用”值，如图\
  \ 8-12 所示。\n\n  ![A429116_1_En_8_Fig12_HTML.jpg](img/A429116_1_En_8_Fig12_HTML.jpg)\n\
  \n  图 8-12. 在“设置”应用的 iCloud 界面中，“存储空间”命令会显示你的 iCloud 账户中剩余多少可用空间\n\n注意：如何知道你的 iCloud\
  \ 是否有足够的可用空间？备份大小因设备和容量而异，但预计你的备份需要 400 MB 到 1 GB 的空间。\n\n如果你的 iCloud 备份因存储空间不足而失败，你可以通过删除不再拥有或使用的设备上的一个或多个备份来释放一些空间：\n\
  \n1. 在主屏幕上，点击“设置”以启动“设置”应用。\n2. 点击“iCloud”。\n3. 点击“存储空间”。\n4. 点击“管理存储空间”。\n5. 在“备份”部分，点击你想要删除备份的设备。\n\
  6. 点击“删除备份”。iOS 会要求你确认是否要关闭此设备的备份并删除其备份数据。\n7. 点击“关闭并删除”。\n\n### 保护丢失的设备\n\n如果使用\
  \ iOS 设备有缺点的话，那就是你生活中相当大的一部分内容都会集中在这台设备上。起初，这听起来可能是件好事，但如果你不小心丢失了设备，你生活的这部分内容也可能随之丢失。此外，假设你之前没有为\
  \ iOS 设备配置密码锁，那么你的隐私就会出现一个大漏洞，因为任何人都可以随意查看你的数据。\n\n如果你一直在定期备份 iOS 设备，那么你很可能可以恢复大部分甚至全部数据。然而，我相信你更愿意找到你的设备，因为它价格昂贵，而且想到陌生人在翻阅你的东西，总会让人感到有些毛骨悚然。\n\
  \n以往寻找丢失的 iOS 设备的方法包括仔细搜索你丢失前到过的每一个角落，并给各个失物招领处打电话，看是否有人上交。现在寻找 iOS 设备的新方法是通过一个叫做“查找我的\
  \ iPhone”的功能。（如果你有 iCloud 账户，可以通过 iCloud 账户使用该功能，或者通过“查找我的 iPhone”应用来使用。）“查找我的 iPhone”利用内置在\
  \ iOS 设备中的 GPS 传感器来定位设备。你还可以使用“查找我的 iPhone”在 iOS 设备上播放声音、远程锁定设备并发送信息，或者在紧急情况下远程删除你的数据。\n\
  \n注意：你可能会认为“查找我的 iPhone”的一个致命缺陷是，拿到你 iOS 设备的人可以轻松关闭该功能并禁用它。幸运的是，情况并非如此，因为 iOS 带有一个名为“激活锁”的功能，这意味着只有输入你的\
  \ Apple ID 密码，才能关闭“查找我的 iPhone”。\n\n#### 你想确保能够找到丢失的设备\n\n“查找我的 iPhone”的工作原理是寻找你的\
  \ iOS 设备向外界发送的特定信号。此信号默认是关闭的，因此如果你计划使用“查找我的 iPhone”，需要先将其打开。\n\n解决方案：按照以下步骤激活“查找我的\
  \ iPhone”：\n\n1. 在主屏幕上，点击“设置”。出现“设置”应用。\n2. 点击“iCloud”。显示你的 iCloud 账户设置。\n3. 点击“查找我的设备”（其中“设备”指\
  \ iPhone、iPad 或 iPod）。\n4. 将“查找我的设备”开关拨到“开”。iOS 会要求你确认。\n5. 点击“允许”。\n\n提示：你丢失的 iOS\
  \ 设备可能只是躺在某个无人能找到的地方。这种情况下，风险在于你还没来得及通过“查找我的 iPhone”定位它之前，iOS 设备电池就已耗尽。为了降低这种可能性，请务必激活“发送最后位置”开关。这会配置\
  \ iOS 在其检测到电池电量即将耗尽时，向你发送设备的最后已知位置。\n\n#### 你想在地图上定位丢失的设备\n\n为了大致了解丢失设备的位置，你可能更倾向于通过地图直观地查看其位置。\n\
  \n解决方案：你可以使用 `icloud.com` 的“查找我的 iPhone”功能来定位你的设备。请按照以下步骤操作：\n\n1. 使用网页浏览器导航至 [`www.icloud.com`](http://www.icloud.com)。注意：除了使用\
  \ `icloud.com`，你也可以使用“查找我的 iPhone”应用来定位你丢失的 iOS 设备。\n2. 登录到你的 iCloud 账户。\n3. 点击“查找我的\
  \ iPhone”。出现 iCloud“查找我的 iPhone”应用。\n4. 点击“所有设备”。iCloud 会显示你的 iOS 设备列表。\n5. 在列表中点击你丢失的\
  \ iOS 设备。iCloud 会将你的 iOS 设备定位到地图上，如图 8-13 所示。\n\n   ![A429116_1_En_8_Fig13_HTML.jpg](img/A429116_1_En_8_Fig13_HTML.jpg)\n\
  \n   图 8-13. 你可以使用 iCloud 的“查找我的 iPhone”应用将丢失的 iOS 设备定位到地图上\n\n提示：要查看设备的位置是否已发生变化，请点击“刷新位置”按钮（如图\
  \ 8-13 中所指）。\n\n\n\n#### 你想要通过播放声音定位丢失的设备\n\n在地图上定位丢失的设备通常很方便（例如，它可能显示你的设备在家中或工作场所），但大多数时候，它不够具体，无法准确告诉你设备在哪里。\n\
  \n如果你把 iPhone 放错了地方，首先要尝试的是用另一部设备拨打你的号码，这样你就能听到手机铃声。\n\n但如果你手机开启了静音模式、飞行模式，或者手头没有其他设备，这种方法就行不通了。如果无论如何都能在\
  \ iPhone 上听到声音就好了，同样，如果能听到丢失的 iPad 或 iPod touch 发出声音也不错。\n\n解决方案：你可以使用“查找我的 iPhone”在设备上播放声音。即使你的\
  \ iOS 设备处于静音模式或飞行模式，这个声音也会播放；即使设备音量已调低或静音，它也会大声播放。操作步骤如下：\n\n1.  登录 iCloud 并打开“查找我的\
  \ iPhone”应用。\n2.  显示“我的设备”列表。\n3.  在列表中点击你丢失的 iOS 设备。“查找我的 iPhone”会在地图上定位你的 iOS\
  \ 设备。\n4.  点击“播放声音”。“查找我的 iPhone”开始在设备上播放声音并显示一条提醒信息。\n5.  找到你的 iOS 设备后，在提醒信息中轻点“好”（如果需要，输入你的密码或使用触控\
  \ ID）来关闭声音。\n\n#### 你想要锁定丢失设备上的数据\n\n如果通过播放声音无法立即找到你的 iOS 设备，下一步应该是确保其他发现该设备的人无法翻看你的私密内容。\n\
  \n解决方案：你可以将 iOS 设备置于丢失模式，该模式会使用你之前设置的密码远程锁定 iOS 设备。（如果你没有为 iOS 设备设置密码保护，则无法远程锁定设备。）你还可以提供一个联系电话号码，并为找到你\
  \ iOS 设备的人发送一条信息。\n\n按照以下步骤将 iOS 设备置于丢失模式：\n\n1.  登录 iCloud 并打开“查找我的 iPhone”应用。\n\
  2.  显示“我的设备”列表。\n3.  在列表中点击你丢失的 iOS 设备。“查找我的 iPhone”会在地图上定位该设备。\n4.  点击“丢失模式”。“查找我的\
  \ iPhone”会显示“丢失模式”对话框，提示你输入一个可以联系到你的电话号码。\n5.  输入你的电话号码，然后点击“下一步”。“查找我的 iPhone”提示你输入一条信息，该信息将与电话号码一起显示在\
  \ iOS 设备上。\n6.  输入信息，然后轻点或点击“完成”。“查找我的 iPhone”远程锁定 iOS 设备并显示这条信息。\n\n**警告**\n\n\
  如果你的设备已被锁定但仍未找到，请留意是否有邮件或短信告知你设备已找到。当你点击链接时，系统会要求你提供 Apple 登录凭证。这看起来像是一条合法的 Apple\
  \ 消息，但实际上是一个旨在获取你 Apple ID 登录信息的骗局，以便骗子解锁你的设备。\n\n#### 你想要擦除丢失设备上的数据\n\n如果你无法让对方归还你的\
  \ iOS 设备，并且设备包含敏感或机密数据，你可能需要采取进一步措施，确保对方无法访问你的数据。\n\n解决方案：你可以使用“查找我的 iPhone”采取严厉措施，远程擦除\
  \ iOS 设备上的所有数据。请按照以下步骤操作：\n\n1.  登录 iCloud 并打开“查找我的 iPhone”应用。\n2.  显示“我的设备”列表。\n\
  3.  在列表中点击你丢失的 iOS 设备。“查找我的 iPhone”会在地图上定位该设备。\n4.  点击“抹掉此设备”（其中“设备”指 iPhone、iPad\
  \ 或 iPod）。“查找我的 iPhone”会提示你输入 Apple ID 密码。\n5.  输入你的密码，然后点击“下一步”。“查找我的 iPhone”要求你输入一个可选的联系电话号码，该号码会在设备被抹掉后显示在\
  \ iOS 设备上。\n6.  输入你的电话号码，然后点击“下一步”。“查找我的 iPhone”提示你输入一条信息，该信息会在设备被抹掉后与电话号码一同显示。\n\
  7.  输入信息，然后点击“完成”。“查找我的 iPhone”会远程擦除 iOS 设备上的所有数据。\n\n**注意**\n\n如果你在擦除设备后找到了它，你可以将设备连接到电脑，然后使用\
  \ iTunes 恢复最新的备份来恢复你的设置、应用和数据。\n\n"
- "# 9. 解决隐私问题\n\n移动设备革命带来的一个意想不到的后果是，我们现在经常在公共场合使用计算机。是的，长期以来一直有人在咖啡店里敲击笔记本电脑，但如今我们更有可能在公交车、公园、电影放映前或课后使用手机和平板电脑。这意味着隐私成为一个潜在问题，因为现在人们可以在我们工作时看到我们的屏幕。移动设备革命的另一个意外后果是，我们现在随身携带大量个人或机密信息。这带来了另一个潜在的隐私问题：如果有人能够访问你的设备，那个人就可以随意查看你的应用、常去地点、浏览历史等等。在第\
  \ 8 章中，你学会了如何锁定你的 iOS 设备，但并不难想象有人在你设备未锁定时仍能访问它的场景。这一切意味着，认真对待隐私问题，并保持一种审慎的警惕心态至关重要：假设在公共场合有人正盯着你的屏幕；假设有人可以在设备未锁定时访问它。本章将向你展示如何采取措施解决这些及类似的隐私问题。\n\
  \n### 解决通用隐私问题\n\n让我们从解决一些与通用隐私问题相关的问题开始。\n\n#### 输入时每个字符都会弹出，造成隐私风险\n\niPhone 屏幕键盘有一个名为“字符预览”的功能，它在点击每个字符时会显示该字符的弹出版本。（iPad\
  \ 上不会出现此情况。）这对 iOS 键盘新手来说很棒，因为它能帮助他们确认输入准确，但老手往往会觉得它分散注意力。无论如何，当你在任何附近的人都能看到屏幕的地方输入时，每个字符弹出都会带来潜在的隐私风险。\n\
  \n解决方案：Apple 在 iOS 9 中默认关闭了字符预览，但如果你在 iPhone 上输入时看到字符弹出，则需要自己将其关闭，步骤如下：\n\n1.  打开“设置”应用。\n\
  2.  轻点“通用”。\n3.  轻点“键盘”。\n4.  将“字符预览”开关拨至关闭位置，如图 9-1 所示。\n\n    ![A429116_1_En_9_Fig1_HTML.jpg](img/A429116_1_En_9_Fig1_HTML.jpg)\n\
  \n    图 9-1. 为防止输入时字符弹出，请关闭“字符预览”设置\n\n**警告**\n\n即使“字符预览”设置为开启状态，iOS 也不再显示密码字符的弹出版本。这很好，但它仍会在最多三秒内显示你最新点击的密码字符！无法关闭此功能，因此在公共场所输入密码时，请尽量遮挡。\n\
  \n\n#### 你想阻止某个应用使用其他应用的数据\n\n第三方应用有时会请求使用其他应用数据的权限。例如，某个应用可能需要访问你的通讯录、日历、照片，或者你的\
  \ Twitter 和 Facebook 账户。当然，你始终可以拒绝这些请求，但如果你过去曾允许某个应用访问，之后可能会改变主意，希望撤销该权限。\n\n**解决方案：**\
  \ iOS 提供了一项隐私功能，让你能够控制哪些应用有权访问你的数据。具体操作如下：\n\n1.  打开 `设置` 应用。\n2.  轻点 `隐私`。此时会显示\
  \ `隐私` 屏幕。\n3.  轻点你想要控制访问权限的应用或功能。iOS 会显示已请求访问该应用或功能的第三方应用列表。图 9-2 展示了 `照片` 应用的示例。\n\
  \n    ![A429116_1_En_9_Fig2_HTML.jpg](img/A429116_1_En_9_Fig2_HTML.jpg)\n    图 9-2.\
  \ 在 `设置` 中，轻点 `隐私`，然后轻点某个应用或功能，即可查看已请求访问该项的第三方应用\n\n4.  若要撤销第三方应用对该应用或功能的访问权限，请将其开关轻点为\
  \ `关闭`。\n\n#### 你不想让位置被追踪\n\n在 iOS 中，`定位服务` 指的是为应用和系统工具提供设备当前地理坐标访问权限的功能与技术。这是一项方便的功能，但你也需要将其置于掌控之下，因为你的位置数据，特别是当前位置，本质上是私密的，不应随意对外提供。幸运的是，iOS\
  \ 自带了一些用于控制和配置 `定位服务` 的工具。\n\n接下来的几节将向你展示如何为单个应用以及单个系统服务关闭 `定位服务`。这种精细化的控制是管理 `定位服务`\
  \ 的最佳方式，但有时你可能更倾向于采用更宽泛的方法，即完全关闭 `定位服务`。例如，如果你正前往一个秘密约会地点（真令人兴奋！）并随身携带了 iOS 设备，那么知道设备上没有应用或服务在追踪你的行踪，可能会让你感觉更安心。\n\
  \n**注意**\n\n从更平常的角度来说，`定位服务` 会消耗电池电量，因此如果你的 iOS 设备电量不足，或者你只是想最大程度地延长电池续航（例如在长途公交车上），那么完全关闭\
  \ `定位服务` 会有所帮助。\n\n**解决方案：** 按照以下步骤关闭 iOS 设备上的所有 `定位服务`：\n\n1.  打开 `设置` 应用。\n2.\
  \  轻点 `隐私`。此时会显示 `隐私` 设置。\n3.  轻点 `定位服务`。此时会显示 `定位服务` 设置。\n4.  将 `定位服务` 开关轻点至 `关闭`\
  \ 位置。iOS 会要求你确认。\n5.  轻点 `关闭`。iOS 会关闭所有 `定位服务`（见图 9-3）。\n\n    ![A429116_1_En_9_Fig3_HTML.jpg](img/A429116_1_En_9_Fig3_HTML.jpg)\n\
  \    图 9-3. 若要防止任何应用或服务使用你的位置，请将 `定位服务` 开关设置为 `关闭`\n\n#### 你想阻止某个应用使用你的位置\n\n当你打开一个带有\
  \ GPS 组件的应用时，该应用会显示一个类似图 9-4 所示的对话框，请求你允许它使用设备中的 GPS 硬件来确定你的当前位置。请注意，iOS 仅允许应用在你使用它时访问你的位置。一旦你退出应用，它便无法再访问你的位置。如果你认为应用无权知晓你的当前位置，请轻点\
  \ `不允许`；如果你觉得没问题，则轻点 `允许`。\n\n![A429116_1_En_9_Fig4_HTML.jpg](img/A429116_1_En_9_Fig4_HTML.jpg)\n\
  图 9-4. 当你首次启动一个使用 GPS 功能的应用时，它会请求你的许可，以便在使用该应用时访问你的当前位置\n\n另一种略有不同的情况是，某个应用必须使用你的位置才能运行。一个很好的例子是\
  \ `Foursquare`，它需要你的位置来向你显示附近的商家，并让你能够“签到”那些地点。在这种情况下，iOS 会自动允许该应用在你使用它时访问你的位置，但该应用可能还会请求在你未使用它时访问你的位置，如图\
  \ 9-5 所示。同样，如果你认为该应用越界了，请轻点 `不允许`；如果没问题，则轻点 `允许`。\n\n![A429116_1_En_9_Fig5_HTML.jpg](img/A429116_1_En_9_Fig5_HTML.jpg)\n\
  图 9-5. 一个必须在你使用应用时访问你位置的应用，也可能寻求在你未使用它时访问你位置的权限\n\n无论你选择了哪种权限类型，在做出决定后，你都有可能改变主意。例如，如果你拒绝某个应用获取你的位置，该应用可能会缺少某些关键功能。同样，如果你允许某个应用使用你的位置，你可能会对隐私受到侵犯而感到后悔。\n\
  \n**解决方案：** 无论出于何种原因，你可以按照以下步骤来控制应用对你位置的访问权限：\n\n1.  打开 `设置` 应用。\n2.  轻点 `隐私`。此时会显示\
  \ `隐私` 设置。\n3.  轻点 `定位服务`。此时会显示 `定位服务` 屏幕。\n4.  轻点你想要配置 GPS 访问权限的应用。该应用的位置访问选项会显示出来。图\
  \ 9-6 展示了 `Foursquare` 应用的选项。\n\n    ![A429116_1_En_9_Fig6_HTML.jpg](img/A429116_1_En_9_Fig6_HTML.jpg)\n\
  \    图 9-6. 使用这些选项配置应用对你位置的访问权限\n\n5.  轻点以下选项之一来配置该应用对你位置的访问权限：\n    - `永不`。如果你想拒绝该应用获取你的当前位置，请轻点此选项。\n\
  \    - `使用期间`。如果你想允许某个应用仅在你主动使用时访问你的当前位置，请轻点此选项。\n    - `始终`。如果该应用需要你的位置才能运行，即使你未使用它时也需要（请注意，此选项仅适用于需要全天候访问\
  \ GPS 的应用），请轻点此选项。\n\n#### 你想阻止一个或多个系统服务使用你的位置\n\niOS 还向各类内部系统服务提供 `定位服务`，这些服务执行诸如校准指南针、设置时区以及提供根据位置数据变化的\
  \ Apple 广告等任务。你可能更希望 iOS 不向一个或多个此类服务提供你的位置信息。\n\n**解决方案：** 如果你不想让 iOS 向其中某些服务提供你的位置信息，可以按照以下步骤阻止：\n\
  \n1.  打开 `设置` 应用。\n2.  轻点 `隐私`。此时会显示 `隐私` 屏幕。\n3.  轻点 `定位服务`。此时会显示 `定位服务` 屏幕。\n\
  4.  轻点 `系统服务`。iOS 会显示 `系统服务` 屏幕。iPhone 上的此屏幕如图 9-7 所示。\n\n    ![A429116_1_En_9_Fig7_HTML.jpg](img/A429116_1_En_9_Fig7_HTML.jpg)\n\
  \    图 9-7. 将你希望拒绝其访问你位置的任何系统服务旁的开关轻点至 `关闭`\n\n5.  对于你不想提供位置数据访问权限的任何系统服务，请将其开关轻点至\
  \ `关闭`。\n\n**提示**\n\n了解系统服务何时正在使用你的位置也很重要。要进行设置，请滚动到 `系统服务` 屏幕底部，然后将 `状态栏图标` 开关轻点至\
  \ `打开`。此后，每当系统服务使用你的位置时，iOS 都会在状态栏中显示该开关上方所列图标之一。\n\n\n\n#### 防止 iOS 存储常用位置列表\n\n\
  iOS 会跟踪您最常访问的物理位置，并将此数据提供给“地图”和“日历”等应用。这使得这些应用能够根据您的位置历史记录提供建议，但出于隐私原因，您可能更希望 iOS\
  \ 不跟踪您的常用位置。\n\n解决方案：您不仅可以清除常用位置列表，还可以完全阻止 iOS 维护此列表，从而增强隐私。请按照以下步骤操作：\n\n1.  打开“设置”应用。\n\
  2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“定位服务”。此时将显示“定位服务”屏幕。\n4.  轻点“系统服务”。iOS 将显示“系统服务”屏幕。\n\
  5.  轻点“常去地点”以打开“常去地点”屏幕。\n6.  若要删除当前的常用位置列表，请轻点“清除历史记录”，然后在系统要求确认时，再次轻点“清除历史记录”。\n\
  7.  若要阻止 iOS 存储您经常使用的位置，请将“常去地点”开关轻点至“关闭”，如图 9-8 所示。\n\n    ![A429116_1_En_9_Fig8_HTML.jpg](img/A429116_1_En_9_Fig8_HTML.jpg)\n\
  \n    图 9-8。若要阻止 iOS 跟踪您最常使用的位置，请将“常去地点”开关轻点至“关闭”。\n\n#### 不想与家人和朋友共享您的位置\n\n当您在\
  \ iCloud 账户上设置“家人共享”时，其中一个设置屏幕会询问您是否希望通过“信息”和“查找我的朋友”应用与家人共享您的位置。如果您最初决定共享位置，之后可能会改变主意，希望保持位置隐私。\n\
  \n解决方案：您可以按照以下步骤禁用此功能：\n\n1.  打开“设置”应用。\n2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“定位服务”。此时将显示“定位服务”屏幕。\n\
  4.  轻点“共享我的位置”以打开“共享我的位置”屏幕。\n5.  将“共享我的位置”开关轻点至“关闭”，如图 9-9 所示。\n\n    ![A429116_1_En_9_Fig9_HTML.jpg](img/A429116_1_En_9_Fig9_HTML.jpg)\n\
  \n    图 9-9。若要停止允许家人和朋友看到您的位置，请将“共享我的位置”开关轻点至“关闭”。\n\n#### 不想将设备使用信息发送给 Apple\n\n\
  iOS 会持续监控您的设备资源，以防范不良事件。这些事件可能包括内存过低、处理器使用率过高、应用崩溃或系统意外重启。当检测到此类事件时，iOS 会记录当前系统状态并将此数据写入诊断文件。图\
  \ 9-10 显示了一个典型条目。\n\n![A429116_1_En_9_Fig10_HTML.jpg](img/A429116_1_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10。一个典型的诊断条目\n\n如您所见，这些数据大部分是高度技术性的。这是因为它们旨在供 Apple 工程师在诊断您的设备或应用问题时使用。\n\n\
  注意：要查看您的诊断和使用条目，请打开“设置”，轻点“隐私”，轻点“诊断与用量”，然后轻点“诊断与用量数据”。\n\n然而，iOS 也会定期创建诊断日志并将其发送给\
  \ Apple 进行分析。这些日志对于 Apple 修复错误和改进产品很有用，但它们是匿名的，通常不包含任何个人数据。我在这里说“通常”，是因为 Apple 确实会在这些日志中包含位置数据。\n\
  \n尽管如此，您可能会对将使用情况和诊断数据（特别是您的位置）发送给 Apple 感到不安。\n\n解决方案：您可以按照以下步骤阻止 iOS 在其诊断和使用日志中包含您的位置：\n\
  \n1.  打开“设置”应用。\n2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“定位服务”。此时将显示“定位服务”屏幕。\n4.  轻点“系统服务”。iOS\
  \ 将显示“系统服务”屏幕。\n5.  将“诊断与用量”开关轻点至“关闭”，如图 9-11 所示。\n\n    ![A429116_1_En_9_Fig11_HTML.jpg](img/A429116_1_En_9_Fig11_HTML.jpg)\n\
  \n    图 9-11。若要阻止 iOS 将您的位置随诊断日志一起发送，请将“诊断与用量”开关轻点至“关闭”。\n\n如果您不希望 iOS 向 Apple 发送任何诊断和使用日志，可以按照以下步骤禁用此功能：\n\
  \n1.  打开“设置”应用。\n2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“诊断与用量”。此时将显示“诊断与用量”屏幕。\n4.  轻点“不发送”，如图\
  \ 9-12 所示。\n\n    ![A429116_1_En_9_Fig12_HTML.jpg](img/A429116_1_En_9_Fig12_HTML.jpg)\n\
  \n    图 9-12。若要阻止 iOS 向 Apple 发送任何诊断和使用日志，请显示“诊断与用量”屏幕，然后轻点“不发送”。\n\n#### 不想接收定向广告\n\
  \n类似于在线广告商可以使用 Cookie（广告商存储在您计算机上的小型文本文件）在网络上跟踪您，应用广告商可以使用名为“广告标识符”的数据片段来跟踪您的兴趣。这是一个匿名的设备标识符，当您执行某些操作（例如在\
  \ App Store 中搜索）时，iOS 会使用它。广告商可以访问“广告标识符”，并利用它向您投放基于您的使用情况选择的广告。您可能更希望不接收这些定向广告。\n\
  \n解决方案：您可以配置隐私设置，告知广告商不要使用“广告标识符”来跟踪您的兴趣和操作。您还可以重置“广告标识符”值，这类似于删除计算机上的跟踪 Cookie。\n\
  \n请按照以下步骤操作：\n\n1.  打开“设置”应用。\n2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“广告”。此时将显示“广告”屏幕。\n\
  4.  将“限制广告跟踪”开关轻点至“开启”，如图 9-13 所示。\n\n    ![A429116_1_En_9_Fig13_HTML.jpg](img/A429116_1_En_9_Fig13_HTML.jpg)\n\
  \n    图 9-13。若要阻止广告商使用“广告标识符”向您发送定向广告，请激活“限制广告跟踪”设置。\n5.  轻点“还原广告标识符”，然后在 iOS 要求您确认时，轻点“还原标识符”。\n\
  \n另一种 iOS 向您投放定向广告的方式是通过您的位置。以下是关闭此隐私漏洞的步骤：\n\n1.  打开“设置”应用。\n2.  轻点“隐私”。此时将显示“隐私”屏幕。\n\
  3.  轻点“定位服务”。此时将显示“定位服务”屏幕。\n4.  轻点“系统服务”。iOS 将显示“系统服务”屏幕。\n5.  将“基于位置的 Apple 广告”开关轻点至“关闭”，如图\
  \ 9-14 所示。\n\n    ![A429116_1_En_9_Fig14_HTML.jpg](img/A429116_1_En_9_Fig14_HTML.jpg)\n\
  \n    图 9-14。将“基于位置的 Apple 广告”轻点至“关闭”，以防止看到基于您位置的定向广告。\n\n#### 不想被显示您所在地区的热门应用\n\
  \nApp Store 会使用您的位置来告诉您附近哪些应用最受欢迎。出于隐私考虑，您可能不希望以这种方式被定位。\n\n解决方案：请按照以下步骤关闭此跟踪功能：\n\
  \n1.  打开“设置”应用。\n2.  轻点“隐私”。此时将显示“隐私”屏幕。\n3.  轻点“定位服务”。此时将显示“定位服务”屏幕。\n4.  轻点“系统服务”。iOS\
  \ 将显示“系统服务”屏幕。\n5.  将“附近的热门应用”开关轻点至“关闭”，如图 9-15 所示。\n\n    ![A429116_1_En_9_Fig15_HTML.jpg](img/A429116_1_En_9_Fig15_HTML.jpg)\n\
  \n    图 9-15。若要阻止 iOS 使用您的位置来确定附近的热门应用，请将“附近的热门应用”开关轻点至“关闭”。\n\n### 解决网页浏览隐私问题\n\
  \n本章的其余部分将向您介绍一些与增强网页浏览会话隐私相关的故障排除技巧。\n\n\n\n#### 想要删除已访问的网站列表\n\nSafari 的“历史记录”列表（即你最近浏览过的网站集合）在需要时是一个很棒的功能，不需要时也无伤大雅。但有时，“历史记录”列表确实会带来不便。例如，如果你访问了一个私人公司网站、金融网站或任何其他不想让别人看到的网站，历史记录可能会暴露你的行踪。\n\
  \n有时，一些不良网站也可能意外出现在你的历史记录中。例如，你可能在网页或邮件中点了一个看似合法的链接，结果却进入了某个阴暗、令人不快的网络角落。当然，你会立刻点击“返回”按钮迅速离开那里，但那个讨厌的网站已经潜伏在你的历史记录里了。\n\
  \n**注意**\n\n从 iOS 9 开始，清除 Safari 历史记录也会同时清除你的 cookie 和网站数据。清除 cookie 可能会带来一些问题，因为许多\
  \ cookie 存储了网站的登录数据或个性化设置。因此，在清除历史记录时，请考虑只清除最近的数据（例如，前一小时的数据）。\n\n**解决方法：** 无论你的历史记录列表中有不想让别人看到的网站，还是你觉得\
  \ Safari 跟踪你在网络上的行踪这个想法本身有些不妥，都可以按照以下步骤清除历史记录列表：\n\n1.  在 Safari 中，轻点“`书签`”按钮。Safari\
  \ 会打开“书签”列表。\n2.  轻点“`返回`”，直到回到“书签”屏幕。\n3.  轻点“`历史记录`”。Safari 会打开“历史记录”屏幕。\n4. \
  \ 轻点“`清除`”。Safari 会询问你要清除多久之前的历史记录，如图 9-16 所示。\n    -   `![A429116_1_En_9_Fig16_HTML.jpg](img/A429116_1_En_9_Fig16_HTML.jpg)`\n\
  \    -   **图 9-16.** 轻点“`清除`”，然后选择要删除多长时间的网页浏览历史记录。\n5.  轻点一个时间段：`最后一小时`、`今天`、`今天和昨天`或`所有历史记录`。Safari\
  \ 会删除该时间段内历史记录列表中的所有网站。\n\n**注意**\n\nSafari 会利用你的历史记录（以及书签）来分析你查看的每个页面，并确定你最可能点击的链接——即所谓的“最常点选”——然后预加载该链接。如果你确实点击了该链接，页面加载速度会非常快。但是，如果你不放心让\
  \ Safari 把你的历史记录和书签发送给 Apple，可以关闭此功能。依次轻点“`设置`”、“`Safari`”，然后将“`预载最常点选`”开关切换至“`关闭`”（参见图\
  \ 9-17）。\n    -   `![A429116_1_En_9_Fig17_HTML.jpg](img/A429116_1_En_9_Fig17_HTML.jpg)`\n\
  \    -   **图 9-17.** 你可以阻止 Safari 显示可能被别人看到的建议。\n\n#### 不希望 Safari 在搜索时显示建议\n\n\
  Safari 可能影响你在线隐私的另一种方式，是在你在地址栏输入搜索文字时显示建议。如果有人从你肩膀后面偷看，或者只是借用你的设备快速搜索一下，她就有可能看到这些建议。\n\
  \n**解决方法：** 要关闭这些建议，请按以下步骤操作：\n\n1.  打开“`设置`”应用。\n2.  轻点“`Safari`”以打开 Safari 设置屏幕。\n\
  3.  将“`搜索引擎建议`”开关和“`Safari 建议`”开关都切换至“`关闭`”，如图 9-17 所示。\n\n#### 希望浏览网页时不存储关于所访问网站的数据\n\
  \n如果你发现自己经常要手动清除浏览历史记录或网站数据，那么可以通过配置 Safari 自动完成此操作来节省一些时间。这就是所谓的“无痕浏览”，意味着 Safari\
  \ 在浏览时不会保存任何数据。具体来说，它不会保存以下内容：\n\n-   网站不会被添加到历史记录中（但在当前会话中，“`返回`”和“`前进`”按钮仍然可以用于导航已访问过的网站）。\n\
  -   网页文本和图像不会被保存。\n-   搜索文本不会保存在搜索框中。\n-   自动填充的密码不会被保存。\n\n**解决方法：** 要激活无痕浏览，请按以下步骤操作：\n\
  \n1.  在 Safari 中，轻点“`标签页`”按钮。\n2.  轻点“`无痕浏览`”。Safari 会为无痕浏览创建一组单独的标签页。\n3.  轻点“`添加标签页\
  \ (+)`”。Safari 会创建一个新的无痕浏览标签页。\n\n完成无痕浏览后，轻点“`标签页`”图标，然后轻点“`无痕浏览`”按钮即可关闭无痕浏览。\n\n\
  #### 希望确保不被在线广告商追踪\n\n在线广告商以提供“个性化广告”这一“好处”为幌子，利用 cookie 来追踪你访问过的网站、进行的搜索等等。这些数据虽然不会与你的个人身份信息直接关联，但没人喜欢被这样追踪。幸运的是，iOS\
  \ 上的 Safari 默认配置已经可以最大程度地减少此类追踪，但你或许仍想确认——甚至加强——这些设置。\n\n**解决方法：** 防止在线追踪涉及两个方面。首先，确保\
  \ Safari 的“`不跟踪`”功能已激活，这会告知广告商不要在线追踪你。但请注意，这并不能强制广告商不追踪你。是否遵守全靠自愿，但为了那些为数不多的会遵守这一设定的广告商，你仍然应该激活此设置。\n\
  \n其次，你需要决定在什么级别上阻止 Cookie。你有四种选择：\n\n-   **总是阻止。** 此级别告知 Safari 不接受任何 Cookie。我不推荐此级别，因为它会禁用许多网站的功能（例如，网站无法保存你的登录数据和个性化设置）。\n\
  -   **仅允许来自当前网站。** 此级别告知 Safari 只接受你当前正在访问的网站设置的 Cookie。其他任何网站——尤其是在线广告网站——都不能设置\
  \ Cookie。如果你想加强 Safari 的广告拦截功能，可以考虑使用此设置，尽管它可能会导致某些功能丢失（请参阅下一项）。\n-   **允许我访问的网站。**\
  \ 此级别告知 Safari 不仅接受当前网站的 Cookie，还接受你过去访问过的任何网站的 Cookie。例如，假设你之前访问过 YouTube 网站。如果当前网站想要设置一个\
  \ YouTube 的 Cookie，那么此设置将允许它这样做。如果你从未访问过某个网站（对于绝大多数在线广告网站来说都是如此），那么 Safari 就会阻止该网站的\
  \ Cookie。这是默认设置，是一个很好的折衷方案，因为你之前访问过的网站可能需要访问 Cookie 来为你当前访问的网站实现某些功能（例如账户数据）。\n\
  -   **总是允许。** 此级别告知 Safari 接受来自任何网站的任何 Cookie。请避免使用此设置，因为这意味着任何不遵守“`不跟踪`”设置的在线广告商（遗憾的是，这占了绝大多数）都会使用\
  \ Cookie 来追踪你。\n\n按照以下步骤配置 Safari，以确保你不会被在线广告商追踪：\n\n1.  打开“`设置`”应用。\n2.  轻点“`Safari`”以打开\
  \ Safari 设置屏幕。\n3.  如有必要，将“`不跟踪`”开关切换至“`开启`”。\n4.  轻点“`阻止 Cookie`”以打开“`阻止 Cookie`”屏幕，如图\
  \ 9-18 所示。\n    -   `![A429116_1_En_9_Fig18_HTML.jpg](img/A429116_1_En_9_Fig18_HTML.jpg)`\n\
  \    -   **图 9-18.** Safari 的 Cookie 阻止设置。\n5.  轻点你想要使用的 Cookie 阻止级别设置。\n\n\n\n\
  #### 你想要删除已保存的信用卡数据\n\n在第四章“解决网页问题”中，你学习了如何通过将信用卡数据保存在`Safari`中来节省时间和精力。这很方便，但如果你借出设备，或者有人在设备解锁状态下拿到它，这也是很危险的。\n\
  \n**解决方案：** 你可以按照以下步骤删除已保存的信用卡：\n\n1. 打开`设置`应用。\n2. 点击`Safari`，打开 Safari 屏幕。\n3.\
  \ 点击`自动填充`，打开自动填充屏幕。\n4. 点击`已保存的信用卡`。如果设置了密码或`触控 ID`，iOS 会提示你输入。\n5. 输入密码或扫描指纹，打开信用卡屏幕。\n\
  6. 点击`编辑`。\n7. 点击你要删除的信用卡，然后点击`删除`。\n\n#### 你想要删除已保存的网站密码\n\n你可以配置`Safari`的自动填充功能来保存网站用户名和密码。这确实很方便，但这意味着任何能访问你已解锁设备的人都能登录这些网站。\n\
  \n**解决方案：** 要避免这个问题，你可以删除一个或多个已保存的网站密码。以下是操作步骤：\n\n1. 打开`设置`应用。\n2. 点击`Safari`，打开\
  \ Safari 屏幕。\n3. 点击`密码`。如果设置了密码或`触控 ID`，iOS 会提示你输入。\n4. 输入密码或扫描指纹，打开密码屏幕。\n5. 点击`编辑`。\n\
  6. 点击每个你要删除的密码，然后点击`删除`。\n\n"
- "# 10. 修复电池与充电问题\n\n现代数字世界的一个奇特现象是，虽然在过去十几年间，我们的设备在性能、小型化和整体技术复杂性方面取得了惊人的进步，但电池续航能力的提升却相对缓慢。例如，从`iPhone\
  \ 4s`到`iPhone 6`（跨越四代），通过 Wi‑Fi 上网的电池续航时间仅从 9 小时增加到了 11 小时。Apple 声称`iPhone 7 Plus`可以达到\
  \ 15 小时，但即便是跨越六代产品提升了 67%，这也不值得夸耀。考虑到我们对 iOS 设备的重视程度，用户目前最大的抱怨是电池续航差，而对每一代新产品最大的期望就是更好的（甚至是非常好的）电池性能，这并不奇怪。不幸的是，由于许多技术原因，我们短期内无法看到\
  \ iOS 设备电池续航的显著提升。这意味着我们需要立即采取措施，监测并最大化现有电池的性能。\n\n### 追踪电池使用情况\n\niOS 不会提供海量的电池数据，但你可以监控总使用时间（包括所有活动：通话、上网、播放媒体等）和待机时间（你的\
  \ iOS 设备处于休眠模式的时间）。此外，iOS 的一个不错的功能是，它会按应用细分最近（过去三小时）的电池使用情况，这样你就可以看到哪些应用在消耗你的电量。\n\
  \n#### 你想要精确知道剩余电量的百分比\n\n默认情况下，iOS 会在状态栏显示一个电池图标（见图 10-1）。随着电量消耗，图标内部的白色部分会减少，当电量低到需要你留意时，电量水平会变成红色。当然，这确实是有用的信息，但有点模糊和不精确。\n\
  \n![A429116\\_1\\_En\\_10\\_Fig1\\_HTML.jpg](img/A429116_1_En_10_Fig1_HTML.jpg)\n\
  \n*图 10-1. iOS 电池图标显示在状态栏中*\n\n**解决方案：** 为了更密切地关注设备电池续航，你需要让 iOS 同时显示剩余电量的百分比。以下是操作步骤：\n\
  \n1. 在主屏幕上，点击`设置`，打开设置应用。\n2. 点击`电池`，打开电池屏幕。\n3. 将`电池百分比`开关点击为`开启`，如图 10-2 所示。\n\
  \n![A429116\\_1\\_En\\_10\\_Fig2\\_HTML.jpg](img/A429116_1_En_10_Fig2_HTML.jpg)\n\
  \n*图 10-2. 将`电池百分比`开关点击为`开启`，以在状态栏图标上添加剩余电量百分比*\n\n#### 你想要了解在电池供电状态下设备的使用情况\n\n\
  Apple 公布了很多电池续航数据，包括使用模式（即设备开启时）和待机模式（设备休眠时）。但是，如果你需要知道你的设备是否有足够的电量来支撑一次长途飞行或类似长时间远离电源插座的情况，你真的能相信\
  \ Apple 的数据吗？\n\n**解决方案：** 幸运的是，你不需要相信 Apple 的说法，因为 iOS 会记录你设备的整体电池使用情况。具体来说，它会记录自上次完全充电以来，你的设备处于使用模式和待机模式的时间。通过一段时间和几个充电周期的追踪，你就会了解你的\
  \ iOS 设备在使用时能获得多少电池续航时间。\n\n按照以下步骤查看这些数据：\n\n1. 在主屏幕上，点击`设置`，打开设置应用。\n2. 点击`电池`，打开电池屏幕。\n\
  3. 滚动到屏幕底部，查看`使用时间`和`待机时间`的值，如图 10-3 所示。\n\n![A429116\\_1\\_En\\_10\\_Fig3\\_HTML.jpg](img/A429116_1_En_10_Fig3_HTML.jpg)\n\
  \n*图 10-3. 滚动到电池屏幕底部，查看自上次完全充电以来你的 iOS 设备处于使用和待机模式的总时间*\n\n#### 你怀疑某个应用耗电过多\n\n\
  在状态栏电池图标上添加百分比数值，并监控`设置`应用电池屏幕中的`使用时间`，其中一个好处是你能了解应用如何消耗电量。特别是，你可能会注意到在使用某个特定应用时，电池电量似乎比平时消耗得更快。知道这一点很有用，但你如何确定呢？\n\
  \n**解决方案：** iOS 可以按应用细分你的设备电池使用情况来提供帮助。在最近 24 小时和最近 7 天这两个时间段内，你都可以看到每个应用消耗的总电量的百分比。你还可以显示每个应用在屏幕显示时和后台运行时消耗电量的总时长。\n\
  \n如果你发现某个特定应用消耗的电量远远超出你的预期（特别是，如果你使用该应用的频率并没有比其他应用高很多），这可能表明存在问题。例如，该应用可能存在内存泄漏，或者正在后台运行任务。\n\
  \n按照以下步骤查看按应用划分的电池使用情况：\n\n1. 在主屏幕上，点击`设置`，打开设置应用。\n2. 点击`电池`，打开电池屏幕。\n3. 在`电池用量`部分（见图\
  \ 10-4），点击可在查看`最近 24 小时`和`最近 7 天`的使用情况之间切换。\n\n![A429116\\_1\\_En\\_10\\_Fig4\\\
  _HTML.jpg](img/A429116_1_En_10_Fig4_HTML.jpg)\n\n*图 10-4. 在电池屏幕中，`电池用量`部分按应用细分电池百分比，并可选择显示电池使用时长*\n\
  4. 点击`时间`图标（在图 10-4 中指出），以切换显示每个应用在屏幕显示和后台运行的总时长。\n\n### 延长电池续航时间\n\n在 iOS 设备上尽可能减少耗电量，不仅可以延长充电间隔时间，还可以延长电池的整体寿命。`电池用量`屏幕通常会提供一两条延长电池续航的建议，但你还可以采取许多其他措施。\n\
  \n\n\n#### 阻止所有应用在后台运行\n\niOS 提供的最佳电池用量工具之一是“电池”屏幕中的“时间”图标（见图 10-4）。启用后，此功能不仅会告知你每个应用在屏幕开启时消耗的电量，更重要的是，还会告知每个应用在后台消耗的电量。应用在后台执行任务的能力称为“后台应用刷新”，这很重要，因为虽然你知道应用何时在屏幕上活跃，但\
  \ iOS 通常不会给出提示，因此你并不总是知道它何时在后台活跃。\n\n实际上，这意味着如果电池电量不足，你可以停止使用某些应用，但你不知道这些应用或其他应用是否仍在后台工作——因此仍在消耗宝贵的电池电量。\n\
  \n解决方案：你可以按照以下步骤为所有应用停用“后台应用刷新”：\n\n1.  在主屏幕上，点按“设置”以打开“设置”应用。\n2.  点按“通用”以打开“通用”屏幕。\n\
  3.  点按“后台应用刷新”以打开“后台应用刷新”屏幕。\n4.  将“后台应用刷新”开关点按至“关闭”，如图 10-5 所示。\n\n    ![A429116_1_En_10_Fig5_HTML.jpg](img/A429116_1_En_10_Fig5_HTML.jpg)\n\
  \n    图 10-5.\n\n    当电量不足时，关闭“后台应用刷新”以防止任何应用在后台运行。\n\n#### 阻止特定应用在后台运行\n\n通过定期检查应用的电池用量（包括总体百分比以及屏幕开启和后台的总时间），你最终会识别出耗电大户。特别是，你会知道哪些应用通过运行后台任务来消耗设备电池。在这种情况下，为所有应用关闭“后台应用刷新”似乎有些过度，尤其是如果只是单个应用导致问题。\n\
  \n解决方案：如果你发现某个特定应用在后台任务中消耗的电量高于平均水平，并且你认为该应用无需在后台运行，则可以仅针对该应用停用“后台应用刷新”。\n\n请遵循以下步骤：\n\
  \n1.  在主屏幕上，点按“设置”以打开“设置”应用。\n2.  点按“通用”以打开“通用”屏幕。\n3.  点按“后台应用刷新”以打开“后台应用刷新”屏幕。\n\
  4.  在应用列表中，将你不再希望其在后台运行的应用旁边的开关点按至“关闭”，如图 10-6 所示。\n\n    ![A429116_1_En_10_Fig6_HTML.jpg](img/A429116_1_En_10_Fig6_HTML.jpg)\n\
  \n    图 10-6.\n\n    你可以为某个在后台运行时消耗过多电池电量的单个应用禁用“后台应用刷新”。\n\n#### 希望 iOS 设备使用更少电量\n\
  \n当 iOS 设备电池电量不足，或者虽然电量充足但你知道需要长时间使用设备时，将设备配置为在其他任务上使用更少电量将是有益的。\n\n解决方案：你将在下一节学到许多节省电量的技巧。然而，iOS\
  \ 提供了一种降低设备总功耗的简便方法。它称为“低电量模式”，通过以下方式节省电池寿命：\n\n*   关闭“后台应用刷新”\n*   禁用“邮件”应用的推送功能（应用自动检查新邮件）\n\
  *   停用所有自动内容下载\n*   阻止所有自动应用更新\n*   禁用一些视觉效果\n*   调暗屏幕\n\n当电池电量降至 20% 时，iOS 会询问你是否要切换到“低电量模式”，如图\
  \ 10-7 所示。（当电量降至 10% 时，此消息会再次出现。）点按“低电量模式”以启用此功能。\n\n![A429116_1_En_10_Fig7_HTML.jpg](img/A429116_1_En_10_Fig7_HTML.jpg)\n\
  \n图 10-7.\n\n当设备电池电量降至 20% 时，iOS 会询问你是否要切换到“低电量模式”\n\n要手动启用“低电量模式”，请执行以下步骤：\n\n\
  1.  在主屏幕上，点按“设置”以打开“设置”应用。\n2.  点按“电池”以打开“电池”屏幕。\n3.  将“低电量模式”开关点按至“开启”，如图 10-8\
  \ 所示。请注意，查看电池图标可以判断此功能是否处于活动状态，在“低电量模式”下，该图标会变为黄色。\n\n    ![A429116_1_En_10_Fig8_HTML.jpg](img/A429116_1_En_10_Fig8_HTML.jpg)\n\
  \n    图 10-8.\n\n    要手动启用“低电量模式”，请在“设置”应用中打开“电池”屏幕，然后将“低电量模式”开关点按至“开启”。\n\n注意\n\
  \n在“低电量模式”开启的情况下，iOS 会自动将设备配置为 30 秒后自动锁定，并禁用“自动锁定”设置。\n\n\n\n#### 尽量节省电池电量\n\n如果电池电量不足，附近又找不到电源插座，但你确实需要使用\
  \ iOS 设备，那么就需要最大限度地降低设备的耗电量。\n\n**解决方案：** 以下是一些建议，可帮助你将设备电池消耗降至最低，同时仍保留部分功能：\n\n\
  -   **尽量减少运行的应用数量。** 如果暂时无法给 iOS 设备充电，请避免后台任务（例如播放音乐）或次要任务（例如整理联系人）。如果你的唯一目标是阅读所有电子邮件，请专注于此事直至完成，因为你无法预知还有多少时间。\n\
  -   **确保“自动锁定”功能生效。** 你肯定不希望 iOS 设备在闲置时消耗电池电量，所以要确保“自动锁定”在正常工作。打开`设置`，轻点`显示与亮度`，轻点`自动锁定`，然后选择较短的时长（例如\
  \ iPhone 上选 1 分钟，iPad 上选 2 分钟）。\n-   **必要时，手动让 iOS 设备进入睡眠模式。** 如果你被打断——例如送披萨的小哥准时出现——不要等待\
  \ iOS 设备自动休眠，因为这几秒或几分钟会消耗宝贵的电池电量。相反，请立即按下`睡眠/唤醒`按钮，手动让设备进入睡眠模式。\n-   **不需要时关闭 Wi-Fi。**\
  \ Wi-Fi 开启时会定期检查可用的无线网络，这会消耗电池电量。如果无需连接无线网络，请关闭 Wi-Fi 以节省电量。打开`设置`，轻点`无线局域网`，然后将`无线局域网`开关滑至`关闭`。\n\
  -   **不需要时关闭蜂窝数据。** 你的 iPhone 或支持蜂窝网络的 iPad 会持续搜索附近的蜂窝基站以维持信号，这会快速消耗电池电量。如果你在使用\
  \ Wi-Fi 网络上网，就不需要蜂窝数据，所以请将其关闭。打开`设置`，轻点`蜂窝网络`，然后将`蜂窝数据`开关滑至`关闭`。\n-   **不需要时关闭 GPS。**\
  \ GPS 开启时，接收器会定期与 GPS 系统交换数据，这会消耗电池电量。如果暂时不需要 GPS 功能，请关闭 GPS 天线。打开`设置`，轻点`隐私与安全性`，轻点`定位服务`，然后将`定位服务`开关滑至`关闭`。\n\
  -   **不需要时关闭蓝牙。** 蓝牙运行时，会持续检查附近的蓝牙设备，这也会消耗电池电量。如果你没有使用任何蓝牙设备，请关闭蓝牙以节省电量。打开`设置`，轻点`蓝牙`，然后将`蓝牙`开关滑至`关闭`。\n\
  -   **降低电子邮件自动检查频率。** 让电子邮件频繁轮询服务器以获取新邮件会消耗电池。将其设置为每小时检查一次，或者，理想情况下，如果可以的话设置为`手动`检查。操作方法：轻点`设置`，轻点`邮件`，轻点`账户`，然后轻点`获取新数据`。在`获取`部分，轻点`每小时`或`手动`。\n\
  -   **关闭推送。** 如果你没有使用低电量模式，并且拥有 iCloud 或 Exchange 账户，请考虑关闭推送功能以节省电池电量。轻点`设置`，轻点`邮件`，轻点`账户`，然后轻点`获取新数据`。在“获取新数据”屏幕上，将`推送`开关滑至`关闭`，并在`获取`部分轻点`手动`。参见图\
  \ 10-10。\n\n    ![A429116_1_En_10_Fig10_HTML.jpg](img/A429116_1_En_10_Fig10_HTML.jpg)\n\
  \    **图 10-10.** 关闭推送以确保这个后台任务不会耗尽电池电量\n\n-   **停用后台应用刷新。** 当你急需电量时，可能不需要应用在后台运行。请参阅“你想阻止所有应用在后台运行”部分，了解如何关闭`后台应用刷新`。或者，你也可以考虑保持该开关打开，但针对个别应用（特别是像\
  \ Facebook 和 Gmail 这类活跃应用）关闭`后台应用刷新`；请参见“你想阻止特定应用在后台运行”部分。\n-   **开启低电量模式。** 不要等到电池电量降至\
  \ 20%（iOS 会自动提示你开启`低电量模式`）时再操作。尽早手动开启，以延长电池续航时间。我在“你想让 iOS 设备更省电”部分中展示了如何手动激活`低电量模式`。\n\
  -   **调暗屏幕。** 触摸屏会消耗大量电池电量，因此调暗屏幕可以减少能耗。在主屏幕上，轻点`设置`，轻点`显示与亮度`，然后将`亮度`滑块向左拖动以调暗屏幕。此外，将`自动亮度调节`开关滑至`关闭`，如图\
  \ 10-9 所示。\n\n    ![A429116_1_En_10_Fig9_HTML.jpg](img/A429116_1_En_10_Fig9_HTML.jpg)\n\
  \    **图 10-9.** 将屏幕亮度调至仍能看清内容的最低水平，并关闭“自动亮度调节”功能\n\n> **注：** 如果你暂时不需要使用设备的全部四个天线——Wi-Fi、蜂窝网络、GPS\
  \ 和蓝牙——更快的关闭方法是将 iOS 设备切换到飞行模式。可以打开`设置`，然后将`飞行模式`开关滑至`开启`；或者从屏幕底部向上滑动以打开控制中心，然后轻点`飞行模式`图标。\n\
  \n### 排查其他电池问题\n\n在本章结束前，我将快速介绍另外两个与电池相关问题的解决方案。\n\n\n\n#### 你想最大化电池的使用寿命\n\n在附近没有电源的日子里，最大化电池续航固然重要，但确保电池的整个使用寿命也被最大化同样关键。\n\
  \n**解决方案：** 你的 iOS 设备中的锂离子电池比镍镉等老式电池技术宽容得多。只需使用几个简单的技巧和预防措施，你就能确保电池在你的 iOS 设备整个使用周期内提供良好性能：\n\
  \n-   **尽量减少电池需要充电的周期次数。** 你的 iOS 设备电池设计为在经历 500 次完全放电和充电周期后，仍能保持其原始容量的 80%。放电到\
  \ 0% 再充满电算作一个周期，放电到 50% 再充满电算作半个周期，以此类推。如果你尽可能方便地经常将 iOS 设备接入电源，达到 500 个周期的时间就会更慢。\n\
  -   **使用电池。** 不过，不要以为从不使用电池就能让它保持完好如新。锂离子电池需要定期使用，否则它们会拒绝充电。\n-   **不要对电池进行深度充放电。**\
  \ 深度充放电——也称为重新调节或重新校准——是指让电池完全放电，然后再完全充电的过程。这对于早期的电池技术很重要，但不适用于你 iOS 设备中的锂离子电池。在充电前让电池电量下降到大约\
  \ 50% 左右，似乎是最大化电池寿命的最佳平衡点。\n-   **避免极端温度。** 将 iOS 设备暴露在极热或极冷的环境中会降低电池的长期效能。请尽量让你的\
  \ iOS 设备保持在适宜的温度下。\n-   **尽量不要摔落你的 iOS 设备。** 摔落设备可能会损坏电池，导致电池性能不佳甚至最终失效。\n-   **使用高质量的充电器。**\
  \ 廉价充电器可能会对电池造成不可逆的损坏。请使用随 iOS 设备附带的充电器，或使用专为你特定品牌和型号的 iOS 设备设计的第三方充电器。\n-   **不要在满电状态下存放你的\
  \ iOS 设备。** 如果你将有几周或更长时间不使用 iOS 设备，你可能会想在存放前给它充满电。然而，为了延长寿命，最好在电池部分放电的状态下存放设备——比如说，放电到\
  \ 40% 到 60% 之间。\n\n**警告**：更需要注意的是，切勿在电池完全放电的状态下存放你的 iOS 设备。这可能会损坏电池，以至于当你重新插上设备时，电池完全无法充电。\n\
  \n#### 你的电池无法充电\n\n当你将 iOS 设备插入电源插座时，你可能会发现它无法充电。\n\n**解决方案：** 如果你发现电池无法充电，以下是一些可能的解决方法：\n\
  \n-   如果 iOS 设备通过 USB 端口连接到电脑充电，可能是电脑进入了待机状态。唤醒电脑应该可以解决问题。\n-   USB 端口可能无法提供足够的电力。例如，大多数键盘和集线器上的\
  \ USB 端口提供的电力有限。如果你的 iOS 设备插在键盘或集线器的 USB 端口上，请将其插到你的 Mac 或 PC 的 USB 端口上。\n-   将\
  \ USB 线缆连接到 USB 电源适配器，然后将适配器插入电源插座。\n-   仔细检查所有连接，确保一切均已正确插入。\n-   如果你有另一条 Lightning\
  \ 数据线，可以换一条试试。\n-   如果 iOS 设备已经很久没有充电，其电池可能已进入休眠模式以保护自身免受长期损坏。在这种情况下，需要几分钟——甚至可能长达十分钟——电池才会“苏醒”并开始正常充电。\n\
  \n如果这些建议都不能解决问题，你可能需要将你的 iOS 设备送去维修。\n\n"
- "# 11. 解决无障碍访问问题\n\niPhone、iPad 或 iPod touch 的承诺是信息触手可及。但是，如果行动障碍使得控制双手都困难，更不用说指尖了，那该怎么办？如果视觉障碍使得连看清信息都成问题，那又该如何？无论你从小就必须克服身体障碍，还是随着年龄增长几乎每天都发现新的身体限制，这并不意味着你必须被排除在数字设备革命之外。诚然，对于有视觉、听觉或行动障碍的人来说，iOS\
  \ 设备可能难以使用，甚至无法使用。但这仅仅是因为默认设置似乎是为了让二十多岁、身体完全健康的人受益而选择的。好消息是，你不必安于这些默认设置。iOS 系统充满了有用的设置、选项和技巧，它们可以将任何设备从使用起来令人痛苦（在某些情况下是字面意义上的疼痛）转变为一种享受（至少是相对而言）。在本章中，我将带你了解在处理视觉、听觉和行动限制时使用\
  \ iOS 设备相关的各种问题，你将学习如何配置 iOS 以克服这些限制，并充分利用你的设备。\n\n### 应对视觉挑战\n\n那些已不再年轻的人（就此而言，甚至不再是中年人）都确切地知道一件事：你年龄越大，视力就越差。当然，你可以增加眼镜的度数，或者购买加强型老花镜，但在阅读\
  \ iOS 设备屏幕上的文本和辨认图标方面，即使是这些也可能不够。而且，当然，如果你的视力问题超出了远视或散光等简单问题，那么更换眼镜也无法帮助你理解屏幕上发生的事情。\n\
  \n无论你的视觉挑战源于何处，如果你看不到 iOS 试图在屏幕上向你展示的内容，你就无法使用 iOS。幸运的是，你可以让 iOS 发挥作用，让文本、图标和图像更容易被看到。正如你在本部分所学到的，iOS\
  \ 提供了许多工具来放大屏幕元素，让事物更容易看清，减少视觉干扰，甚至让你听到屏幕内容的语音翻译。\n\n\n#### 你想让文本更易阅读\n\n如果你的“事后诸葛亮”视力还算不错，那你可能会问自己一个简单的问题：为什么我设备屏幕上的所有东西看起来都这么小？图标小、按钮小、文本也小得可怜。\n\
  \n解决方法：我很高兴地告诉你，这些并非一成不变（从电子设备角度来说）。iOS 提供了几项设置，可以放大屏幕上的内容，或使其更清晰。请按照以下步骤修改部分或全部设置：\n\
  \n1.  在主屏幕上，轻点 `设置` 以打开“设置”应用。\n2.  轻点 `通用` 以显示“通用”屏幕。\n3.  轻点 `辅助功能` 以显示“辅助功能”屏幕。\n\
  4.  轻点 `显示与文字大小`，然后轻点 `降低白点值` 开关将其打开，以减弱白色强度。\n5.  轻点 `更大字体`，然后使用滑块设置你偏好的字体大小（见图\
  \ 11-1）。你也可以将 `更大辅助功能字体` 开关打开，以利用支持 `动态字体` 功能的 App，该功能允许 App 根据你设定的滑块值调整文本大小。\n\n\
  \   ![A429116_1_En_11_Fig1_HTML.jpg](img/A429116_1_En_11_Fig1_HTML.jpg)\n\n   图\
  \ 11-1. 你可以使用 `更大字体` 设置来增大 iOS 和某些 App 使用的文本大小\n\n6.  将 `粗体文本` 开关打开，以使所有屏幕文本以更易看清的粗体字体呈现。请注意，iOS\
  \ 需要你重启设备才能使 `粗体文本` 设置生效。\n7.  将 `按钮形状` 开关打开，以便为所有按钮应用填充颜色（例如，见图 11-2 中的 `通用` 按钮），这使它们更容易看清和轻点。\n\
  \n   ![A429116_1_En_11_Fig2_HTML.jpg](img/A429116_1_En_11_Fig2_HTML.jpg)\n\n   图\
  \ 11-2. 激活 `按钮形状` 设置，为按钮（如此处显示的 `通用` 按钮）应用填充以显示其形状\n\n8.  轻点 `增强对比度` 以改善整体屏幕对比度。将\
  \ `降低透明度` 开关打开以最大程度减少透明和模糊效果；将 `加深颜色` 开关打开以使非白色颜色更深。\n9.  轻点 `减弱动态效果`，然后将 `减弱动态效果`\
  \ 开关打开，以指示 iOS 减少使用用户界面动态效果，这有助于更轻松地跟踪屏幕上发生的事情。\n10. 将 `开/关标签` 开关打开，以便在每个 `开/关`\
  \ 开关上补充显示 `1`（当开关打开时）或 `0`（当开关关闭时），如图 11-3 所示。如果你难以区分 iOS 开关的“开”和“关”状态，这会很有用。\n\n\
  \    ![A429116_1_En_11_Fig3_HTML.jpg](img/A429116_1_En_11_Fig3_HTML.jpg)\n\n   \
  \ 图 11-3. 激活 `开/关标签` 设置后，你会看到设置为 `开` 的开关上显示 `1`，设置为 `关` 的开关上显示 `0`\n\n#### 你想要一种快速放大屏幕的方法\n\
  \n你可能会发现，虽然你能看清屏幕上的大部分项目，但偶尔有图标或一小段文本太小而无法辨认。上一节提到的一些设置可能会有所帮助，但它们会影响整个 iOS，可能有些小题大做。\n\
  \n解决方法：你总是可以拿个放大镜来凑近看你无法辨认的部分，但 iOS 提供了电子版的解决方案。它叫做 `缩放`，可以让你看到屏幕的放大区域。以下是启用它的方法：\n\
  \n1.  在主屏幕上，轻点 `设置` 以打开“设置”应用。\n2.  轻点 `通用` 以显示“通用”屏幕。\n3.  轻点 `辅助功能` 以显示“辅助功能”屏幕。\n\
  4.  轻点 `缩放` 以显示“缩放”屏幕。\n5.  将 `缩放` 开关打开，如图 11-4 所示。iOS 会添加一个“缩放”窗口，其内部的底层屏幕文本和元素会被放大。\n\
  \n   ![A429116_1_En_11_Fig4_HTML.jpg](img/A429116_1_En_11_Fig4_HTML.jpg)\n\n   图\
  \ 11-4. 将 `缩放` 开关打开，即可看到“缩放”窗口，它会放大屏幕的一部分\n\n以下是使用“缩放”窗口的一些提示：\n\n-   要切换“缩放”窗口的开关，请用三根手指在屏幕上双击。\n\
  -   要移动“缩放”窗口，请拖动其底部边框中间出现的椭圆形手柄。\n-   要移动“缩放”窗口内的屏幕内容，请用三根手指在窗口内拖动。\n-   要调整放大倍率，请用三根手指在屏幕上双击，然后用三根手指在屏幕上拖动。\n\
  -   要放大整个屏幕而非仅放大一部分，请返回“辅助功能”设置，轻点 `缩放`，轻点 `缩放区域`，然后轻点 `全屏幕缩放`。\n\n> **注**  \n>\
  \ 默认情况下，`缩放` 会自动放大屏幕上有焦点的部分（即你当前正在操作的控件所在的屏幕区域）。如果你觉得这很突兀，可以通过显示“缩放”屏幕并将 `跟随焦点`\
  \ 开关关闭来禁用它。\n\n#### 你想要听到屏幕上的内容\n\n如果你发现自己确实很难看清屏幕上的内容，你可能更希望有人将屏幕文本读给你听。\n\n解决方法：iOS\
  \ 内置了一款名为 `旁白` 的辅助技术，可以帮到你。`旁白` 的工作是朗读当前屏幕或对话框中的任何文本。`旁白` 还能做许多其他事情，包括以下内容：\n\n\
  -   告诉你当前 App 的名称，以及该 App 当前屏幕或对话框的名称。\n-   告诉你当前获得焦点的控件名称、控件类型（例如，开关）以及控件的当前状态（例如\
  \ `开`）。\n-   复述你最近的按键操作。例如，如果你按下 `删除` 键来删除一个字符，`旁白` 会说出 `“删除”`。\n-   告诉你当前项目的文本内容，例如一条短信。\n\
  \n按照以下步骤激活 `旁白`：\n\n1.  在主屏幕上，轻点 `设置` 以打开“设置”应用。\n2.  轻点 `通用` 以显示“通用”屏幕。\n3.  轻点\
  \ `辅助功能` 以显示“辅助功能”屏幕。\n4.  轻点 `旁白` 以显示“旁白”屏幕。\n5.  将 `旁白` 开关打开，如图 11-5 所示。`旁白` 会描述当前屏幕，包括“设置”App\
  \ 为请求你确认而显示的提醒按钮。\n\n   ![A429116_1_En_11_Fig5_HTML.jpg](img/A429116_1_En_11_Fig5_HTML.jpg)\n\
  \n   图 11-5. 将 `旁白` 开关打开，即可听到屏幕上的显示内容\n\n6.  轻点 `好` 两次。\n\n> **注**  \n> `旁白` 提供了大量的自定义设置，使你可以控制\
  \ `旁白` 的详细程度；是否要听到音效；打字时是想要听到字符、单词，还是两者都听到；以及更多。你可以在“旁白”屏幕上找到所有这些设置。\n\n请注意，激活 `旁白`\
  \ 会像下面这样改变你使用 iOS 界面的方式：\n\n-   轻点一个屏幕项目以选中它，并让 `旁白` 告诉你它的名称以及可选的状态或文本。iOS 会在该项目周围放置一个黑色边框，以表明它已被选中。有关示例，请参见图\
  \ 11-5 中的 `辅助功能` 按钮。\n-   要运行、激活或选择已选中的屏幕项目，请双击它。\n-   要滚动，请在屏幕上用三根手指滑动。\n\n\n####\
  \ 你想用 iOS 设备放大现实世界中的物品\n\n`相机` App 自带一个缩放功能，通过在屏幕上张开手指，你可以看到当前画面的放大版本。除了作为一个有用的摄影功能外，该缩放功能也便于更仔细地查看现实世界中的物品，比如微小的文字或远处的标志。不幸的是，如果你同时有行动障碍，这个张手手势并不容易使用。\n\
  \n**解决方案：** iOS 提供了一个`放大器`工具，它可以自动启动`相机` App 并激活其缩放功能。以下是启用`放大器`需要遵循的步骤：\n\n1. \
  \ 在主屏幕上，轻点`设置`以打开`设置` App。\n2.  轻点`通用`以显示`通用`屏幕。\n3.  轻点`辅助功能`以显示`辅助功能`屏幕。\n4. \
  \ 轻点`放大器`以显示`放大器`屏幕。\n5.  将`放大器`开关轻点至`打开`，如图 11-6 所示。\n\n    ![A429116_1_En_11_Fig6_HTML.jpg](img/A429116_1_En_11_Fig6_HTML.jpg)\n\
  \n    图 11-6. 将`放大器`开关轻点至`打开`，以便轻松使用`相机` App 的缩放功能来更仔细地查看现实世界中的物品\n\n**提示：** 如果有时你觉得缩放后的屏幕太暗或太亮，你可以配置\
  \ iOS 让其自动调整。在`放大器`屏幕中，将`自动亮度`开关轻点至`打开`。\n\n激活`放大器`后，你可以通过三次按下`主屏幕按钮`来调用它。\n\n###\
  \ 克服身体挑战\n\n使用你的 iOS 设备乍一看似乎更像是一种脑力活动。毕竟，你花大量时间在屏幕前阅读、查看和思考。\n\n然而，如果你仔细规划一下你的设备使用时间，你几乎肯定会发现你花了大把时间在体力任务上：打字、轻点、双击，以及所有手势——滑动、拖移、捏合、张合等等——这些操作都是让你的设备按你指令行事所必需的。\n\
  \niOS 这个出人意料的体力操作特性意味着，如果你自身有身体挑战，你可能会发现执行某些任务很困难（而且有些任务可能几乎不可能完成）。幸运的是，不一定非得这样。iOS\
  \ 有不少设置和工具，要么能减轻你使用设备的负担，要么能让你绕过可能遇到的任何问题。\n\n#### 双击主屏幕按钮不显示多任务屏幕\n\n在 iOS 中切换\
  \ App 需要双击`主屏幕按钮`打开多任务屏幕，滑动直到你想要切换到的 App 出现在视野中，然后轻点该 App。如果你无法访问多任务屏幕，那么切换 App\
  \ 会变得非常困难。\n\n**解决方案：** 如果双击`主屏幕按钮`没有显示多任务屏幕，可能是因为你两次按压之间的间隔太长，所以尝试更快地双击。\n\n如果这对你来说是一个持续存在的问题，你可以降低主屏幕按钮点击速度。以下是需要遵循的步骤：\n\
  \n1.  在主屏幕上，轻点`设置`以打开`设置` App。\n2.  轻点`通用`以显示`通用`屏幕。\n3.  轻点`辅助功能`以显示`辅助功能`屏幕。\n\
  4.  轻点`主屏幕按钮`以显示`主屏幕按钮`屏幕。\n5.  轻点`慢速`，如图 11-7 所示。iOS 会闪烁`慢速`选项，并在新的主屏幕按钮点击速度下震动设备。\n\
  \n    ![A429116_1_En_11_Fig7_HTML.jpg](img/A429116_1_En_11_Fig7_HTML.jpg)\n\n  \
  \  图 11-7. 如果让 iOS 识别`主屏幕按钮`双击有困难，请尝试`慢速`\n6.  如果你觉得那个速度仍然有问题，试着改用`最慢速`。\n\n**提示：**\
  \ 一旦你解决了`主屏幕按钮`点击问题，你可以配置 iOS 在三次按下`主屏幕按钮`时启动你常用的辅助功能，使其更易于使用。打开`设置`，轻点`通用`，轻点`辅助功能`，然后轻点`辅助功能快捷键`（它在屏幕底部）。在出现的列表中，轻点一种辅助技术——比如`旁白`或`缩放`。现在，你可以通过三次按下`主屏幕按钮`来调用该工具。\n\
  \n#### 你发现使用触控 ID 解锁设备很困难\n\n你在第 8 章“保护你的设备”中了解到，你可以使用`触控 ID`来解锁你的 iOS 设备（参见“你想用指纹解锁设备”）。在\
  \ iOS 9 及更早版本中，你将存有已保存指纹的手指放在`主屏幕按钮`上即可解锁设备。然而，在 iOS 10 中，你现在必须用那个手指按下`主屏幕按钮`。你可能会发现身体限制使得执行这个操作很困难。\n\
  \n**解决方案：** 你可以让 iOS 允许手指轻放在`主屏幕按钮`上即可解锁设备。以下是需要遵循的步骤：\n\n1.  在主屏幕上，轻点`设置`以打开`设置`\
  \ App。\n2.  轻点`通用`以显示`通用`屏幕。\n3.  轻点`辅助功能`以显示`辅助功能`屏幕。\n4.  向下滚动并轻点`主屏幕按钮`以显示`主屏幕按钮`屏幕。\n\
  5.  将`手指轻触打开`开关轻点至`打开`，如图 11-8 所示。\n\n    ![A429116_1_En_11_Fig8_HTML.jpg](img/A429116_1_En_11_Fig8_HTML.jpg)\n\
  \n    图 11-8. 轻点`手指轻触打开`，恢复到只需将注册了`触控 ID`的手指放在`主屏幕按钮`上即可解锁 iOS 设备的模式\n\n#### 你打字时会出现不必要的按键\n\
  \n如果你想多次输入同一个键，你可以根据需要多次轻点该键。但是，当你按住一个键时，iOS 会假设你想要多次输入该键。iOS 首先接受最初的按键，然后短暂等待（大约半秒钟），看你是否继续保持按键按下状态。如果你继续按住，iOS\
  \ 就会接受该键的多次输入，直到你松开为止。\n\n如果你正在使用方向键浏览文档，或者使用`退格键`删除多个字符，这些技术都很有用。如果你有行动障碍，导致你的手指经常在键上弹跳或按住你本打算只按一次的键，那么这些技术绝对没有用处。\n\
  \n**解决方案：** 如果你倾向于多次按下按键或按键时间过长，`按键重复`功能可以帮你过滤掉在这些情况下出现的多余字符。\n\n要使用此功能，请按照以下步骤激活并配置它：\n\
  \n1.  在主屏幕上，轻点`设置`以打开`设置` App。\n2.  轻点`通用`以显示`通用`屏幕。\n3.  轻点`辅助功能`以显示`辅助功能`屏幕。\n\
  4.  轻点`键盘`以显示`键盘`屏幕。\n5.  轻点`按键重复`以显示`按键重复`屏幕。\n6.  如果你不希望 iOS 在你按住一个键时重复字符，请将`按键重复`开关轻点至`关闭`。否则，将此开关轻点至`打开`，如图\
  \ 11-9 所示。\n\n    ![A429116_1_En_11_Fig9_HTML.jpg](img/A429116_1_En_11_Fig9_HTML.jpg)\n\
  \n    图 11-9. 将`按键重复`轻点至`打开`，以配置 iOS 如何处理重复按键\n7.  如果`按键重复`是`打开`状态，使用`按键重复间隔`设置来设定\
  \ iOS 在重复按键之间等待的时间。\n8.  如果`按键重复`是`打开`状态，使用`重复前延迟`设置来设定 iOS 在初次按键后、开始重复按键之前的等待时间。\n\
  \n\n\n#### iOS 有时会误解或无法识别您的轻点操作\n\niOS 设备上的触摸屏是现代电子技术的奇迹：灵敏、多功能且强大。很难想象没有它如何使用 iOS，因此触摸屏问题如此令人沮丧也就不足为奇了。如果您觉得难以控制手指，或者您的灵活度不如从前，那么您可能会遇到以下一种或多种触摸屏问题：\n\
  \n-   如果您倾向于在屏幕上按住手指稍长时间，iOS 会将此手势解释为长按而非简单轻点。\n-   如果您倾向于在屏幕上让手指弹跳，iOS 会将此手势解释为多次轻点而非单次轻点。\n\
  -   如果您倾向于让手指在屏幕上移动，iOS 会将此手势解释为滑动而非轻点。\n\n**解决方案：** iOS 提供了几种所谓的“触控调节”功能，您可以根据需要激活和调整这些功能，以使您的轻点操作被正确识别和/或解释。请按照以下步骤操作：\n\
  \n1.  在“`主屏幕`”上，轻点“`设置`”以打开“`设置`”应用。\n2.  轻点“`通用`”以显示“`通用`”屏幕。\n3.  轻点“`辅助功能`”以显示“`辅助功能`”屏幕。\n\
  4.  轻点“`触控调节`”以显示“`触控调节`”屏幕。\n5.  如果您倾向于在屏幕上按住手指时间过长，请将“`按住持续时间`”开关轻点至“`开启`”，如图\
  \ 11-10 所示，然后使用“`秒`”设置来指定 iOS 在认定您正在执行长按手势之前，允许您按住屏幕的时间长度。\n\n![A429116_1_En_11_Fig10_HTML.jpg](img/A429116_1_En_11_Fig10_HTML.jpg)\n\
  \n*图 11-10.* 将“`按住持续时间`”轻点至“`开启`”，以防止长按被解释为长按手势\n\n6.  如果您倾向于在屏幕上让手指弹跳，请将“`忽略重复`”开关轻点至“`开启`”，然后使用“`秒`”设置来指定\
  \ iOS 在将此手势解释为多次轻点（而非单次轻点）之前应等待的时间。\n7.  如果您倾向于让手指在屏幕上移动，请通过在“`轻点辅助`”部分轻点以下选项之一，告知\
  \ iOS 将此手势解释为轻点而非滑动：\n    -   `使用初始触控位置`。轻点此设置以使用您的轻点手指首次接触屏幕的位置作为轻点位置。\n    - \
  \  `使用最终触控位置`。轻点此设置以使用您的轻点手指停止或离开屏幕的位置作为轻点位置。\n\n### 克服听觉挑战\n\n如果您多年来听力下降，或者您的一只或两只耳朵有听力障碍，那么检测设备声音以及欣赏音乐和电影可能会成为一项挑战。幸运的是，有现成的帮助。iOS\
  \ 提供了一些设置和工具，您可以对其进行配置以帮助或规避您的听力问题。\n\n#### 耳机声音不平衡\n\n有时，一只耳朵的听力问题特别严重。在这些情况下，调整设备音量会很麻烦，因为将音量调高到足以让听力较差的耳朵听清时，可能会使另一只耳朵听到的声音过大。\n\
  \n**解决方案：** iOS 可以通过让您平衡每只耳朵的音量来提供帮助。也就是说，您可以调高听力较差耳朵的音量和/或调低听力较好耳朵的音量。\n\n以下是需要遵循的步骤：\n\
  \n1.  在“`主屏幕`”上，轻点“`设置`”以打开“`设置`”应用。\n2.  轻点“`通用`”以显示“`通用`”屏幕。\n3.  轻点“`辅助功能`”以显示“`辅助功能`”屏幕。\n\
  4.  在“`听觉`”部分下，使用图 11-11 中所示的滑块来调节左右声道之间的平衡。\n\n![A429116_1_En_11_Fig11_HTML.jpg](img/A429116_1_En_11_Fig11_HTML.jpg)\n\
  \n*图 11-11.* 要补偿一只耳朵的听力不佳，请使用此滑块调节左右声道之间的音频平衡\n\n#### 您听不到提醒\n\n当 iOS 显示短信或电子邮件通知时，通常会显示一条横幅几秒钟并播放声音。如果您离设备较远看不到横幅，并且您的听力受损，那么您可能很容易错过提醒。\n\
  \n**解决方案：** 在您的 iPhone 上（此功能在其他 iOS 设备上不可用），您可以告诉 iOS 让摄像头 LED 灯闪烁几次，这为您提供了发生提醒的视觉信号。\n\
  \n请按照以下步骤进行设置：\n\n1.  在“`主屏幕`”上，轻点“`设置`”以打开“`设置`”应用。\n2.  轻点“`通用`”以显示“`通用`”屏幕。\n\
  3.  轻点“`辅助功能`”以显示“`辅助功能`”屏幕。\n4.  在“`听觉`”部分，轻点“`LED 闪烁以示提醒`”。\n5.  将“`LED 闪烁以示提醒`”开关轻点至“`开启`”，如图\
  \ 11-12 所示。\n\n![A429116_1_En_11_Fig12_HTML.jpg](img/A429116_1_En_11_Fig12_HTML.jpg)\n\
  \n*图 11-12.* 将“`LED 闪烁以示提醒`”轻点至“`开启`”，以便在有提醒时让 iOS 闪烁摄像头 LED 灯\n\n6.  如果您还希望即使在将“`响铃/静音`”开关设置为“`静音`”时\
  \ iOS 也能闪烁 LED，请将“`静音时闪烁`”开关轻点至“`开启`”。\n\n## 排查其他 iOS 问题\n\n到目前为止，在本书中您不仅学习了许多通用的解决问题的技巧，还学习了如何排查和解决各种问题。为了更容易找到这些问题（或者，在许多情况下，在问题发生前预防它们），这些问题已根据特定的主题领域进行了分类和分组。这些领域包括蜂窝网络、无线局域网、应用、网页浏览、电子邮件、电话、相机、照片、设备保护、隐私、电池和辅助功能。这是一个范围广泛的列表，但还有很多\
  \ iOS 问题不属于这些类别。\n\n本章的目的是汇集一系列最常见的不属于上述分类的问题、烦恼和令人困惑的情况，并提供解决方案和变通方法，以完成您的 iOS\
  \ 故障排除学习。\n\n### 排查杂项问题\n\n我将从探讨几个能让您的 iOS 设备更易用、更高效的杂项问题开始本章。\n\n#### 您发现很难触及 iPhone\
  \ 屏幕顶部的项目\n\niPhone 6、6s 和 7 的大高度（更不用说它们更大的 Plus 版本了）意味着即使是手型一般的人，在单手使用设备时，也会觉得触及屏幕顶部或靠近顶部的项目相当费力。\n\
  \n**解决方案：** 双击“`主屏幕`”按钮，我指的是轻轻点击按钮而不是用力按下它。这会将当前屏幕的内容向下滑动大约一半，使得更容易触及顶部的项目，尤其是在单手使用手机时。要将屏幕推回原位，请再次双击“`主屏幕`”按钮，或点击屏幕内容上方的空白区域（您也可以等待大约八秒钟，屏幕将自动恢复原状）。\n\
  \n\n\n#### 双击主屏幕按钮无反应\n\n在前一节中，您已经了解到，在 iPhone 6（及后续机型）的大屏幕上，可以通过双击`主屏幕`按钮来触及屏幕顶部的项目。不过，您可能会发现这个技巧对您并不奏效。\n\
  \n**解决方法：** 以下是可供尝试的几种故障排查技巧：\n\n-   请记住，此功能仅在 iPhone 上可用，iPad 或 iPod touch 不支持。截至撰写本文时，支持此功能的\
  \ iPhone 机型仅有 6、6 Plus、6s、6s Plus、7 和 7 Plus。\n-   如果您看到了多任务屏幕（即显示所有正在运行或近期运行的应用的屏幕），说明您是在**连按两次**`主屏幕`按钮，而不是**轻点两下**。您只需要**轻快地触碰两下**即可。\n\
  -   此功能称为`便捷访问`，是一项辅助功能设置。如果它无法正常工作，可能意味着该设置已被关闭。如需检查，请按以下步骤操作：\n\n1.  在主屏幕中，轻点`设置`以打开`设置`应用。\n\
  2.  轻点`通用`以打开`通用`屏幕。\n3.  轻点`辅助功能`以打开`辅助功能`屏幕。\n4.  将`便捷访问`开关轻点至`开启`，如图 12-1 所示。\n\
  \n    ![A429116_1_En_12_Fig1_HTML.jpg](img/A429116_1_En_12_Fig1_HTML.jpg)\n\n  \
  \  **图 12-1.** 确保`便捷访问`设置已`开启`以启用主屏幕按钮轻点两下功能。\n\n#### 您的 iOS 设备在不恰当的时间打扰您\n\n当您正在开会、看电影或准备睡觉时，您肯定不希望\
  \ iOS 设备被来电或提醒打扰。大多数人通过激活`飞行`模式来处理这种情况，这会关闭设备上的所有天线。这能确保您暂时不受干扰，但它有一个重大缺陷：没有天线工作，设备就无法与外界通信，因此无法下载信息或执行任何其他在线活动。这可能是您想要的，但如果您在等待重要事情，这就不是最佳方案了。此外，您还必须记得激活`飞行`模式，在忙碌时这并非总能做到。\n\
  \n**解决方法：** 配置`勿扰模式`，它能使所有设备干扰静音——包括`通知中心`的提醒和电话——但保持设备在线，以便继续接收数据。这样一来，当您准备好重新投入使用时，所有新数据都已存在于设备上，您可以快速跟上进度。\n\
  \n要激活`勿扰模式`，请打开`设置`，轻点`勿扰模式`，然后将`手动`开关轻点至`开启`。\n\n通过根据您的工作方式配置`勿扰模式`，可以充分发挥其作用。请按以下步骤操作：\n\
  \n1.  在主屏幕中，轻点`设置`以打开`设置`应用。\n2.  轻点`勿扰模式`以显示`勿扰模式`屏幕。\n3.  若要设置自动启用和停用`勿扰模式`的时间，请将`设定时间`开关轻点至`开启`，如图\
  \ 12-2 所示。然后轻点`自定时间`控制项；使用`自`来设置开始时间，使用`至`来设置结束时间，然后轻点`返回`回到`勿扰模式`屏幕。\n\n    ![A429116_1_En_12_Fig2_HTML.jpg](img/A429116_1_En_12_Fig2_HTML.jpg)\n\
  \n    **图 12-2.** 将`设定时间`开关轻点至`开启`，然后为`勿扰模式`设置开始和结束时间。\n\n    **注意：** 除了定时启用`勿扰模式`，您也可以随时通过步骤\
  \ 1 和 2 显示`勿扰模式`屏幕，然后轻点`手动`开关至`开启`来手动启用。\n\n4.  如果您希望即使在`勿扰模式`激活时也允许某些来电，请轻点`允许以下来电`，然后轻点您允许通过的人：`所有人`、`没有人`、`个人收藏`（即`电话`应用中`个人收藏`列表里的联系人），或某个特定的联系人分组。\n\
  5.  如果您希望`勿扰模式`允许同一人在三分钟内第二次来电时接通，请将`重复来电`开关保持在`开启`位置。如果您不希望允许此例外，请将`重复来电`开关轻点至`关闭`。\n\
  6.  如果您希望`勿扰模式`在设备已解锁时正常处理（即非静音）来电和通知，请轻点`仅在设备已锁定时`选项（其中`设备`指 iPhone、iPad 或 iPod）。\n\
  \n#### 屏幕键盘的咔嗒声让你（和你附近的人）抓狂\n\n默认情况下，iOS 的屏幕键盘每次按键都会发出咔嗒声。苹果公司肯定认为这种声音反馈很有用，所以默认开启了此声音，但据我所知，没人不觉得它烦人且毫无意义。即使您不介意这持续不断的咔嗒声，我敢保证您设备周围能听到声音的每个人都在（或许不是那么）默默地咒骂您。\n\
  \n**解决方法：** 按照以下步骤关闭键盘咔嗒声：\n\n1.  在主屏幕中，轻点`设置`以打开`设置`应用。\n2.  轻点`声音`以显示`声音`屏幕。\n\
  3.  将`按键音`开关轻点至`关闭`，如图 12-3 所示。\n\n    ![A429116_1_En_12_Fig3_HTML.jpg](img/A429116_1_En_12_Fig3_HTML.jpg)\n\
  \n    **图 12-3.** 要享受无噪音的舒爽输入体验，请将`按键音`开关轻点至`关闭`。\n\n#### 输入两个或更多空格时，iOS 总会在空格前添加一个句点\
  \ (.)\n\n实际上，正如程序员所说，这是一个功能，而非错误。这是一个内置快捷方式，让您可以通过轻点两下空格键来高效地结束大多数句子。\n\n**解决方法：**\
  \ 如果您希望能够输入多个空格而不出现句点，可以关闭这个快捷方式。请按照以下步骤操作：\n\n1.  在主屏幕中，轻点`设置`以打开`设置`应用。\n2.  轻点`通用`以显示`通用`屏幕。\n\
  3.  轻点`键盘`以显示`键盘`屏幕。\n4.  将`“.”快捷键`开关轻点至`关闭`，如图 12-4 所示。\n\n    ![A429116_1_En_12_Fig4_HTML.jpg](img/A429116_1_En_12_Fig4_HTML.jpg)\n\
  \n    **图 12-4.** 要输入两个空格而不出现句点 (`.`)，请将`“.”快捷键`开关轻点至`关闭`。\n\n#### 您无法用另一种语言输入\n\
  \n您的 iOS 设备已设置适合您所在地区的默认键盘，并且还附带了一个表情符号键盘。如果您想用其他语言（如阿拉伯语、希腊语或俄语）输入，则无法使用默认键盘直接进行。\n\
  \n**解决方法：** 您需要为想要使用的语言安装一个新的键盘布局。请按照以下步骤操作：\n\n1.  在主屏幕中，轻点`设置`以打开`设置`应用。\n2. \
  \ 轻点`通用`以显示`通用`屏幕。\n3.  轻点`键盘`以显示`键盘`屏幕。\n4.  轻点`键盘`以打开`键盘`屏幕，该屏幕会显示已安装键盘的列表。\n\
  5.  轻点`添加新键盘`以显示`添加新键盘`屏幕。\n6.  轻点您想要使用的键盘布局。\n\n要从一种布局切换到另一种，请调出屏幕键盘，然后按住`键盘`按钮（位于`123`或`?123`按钮右侧）。这会显示已安装键盘的列表，如图\
  \ 12-5 所示，然后轻点您想要使用的布局。\n\n![A429116_1_En_12_Fig5_HTML.jpg](img/A429116_1_En_12_Fig5_HTML.jpg)\n\
  \n**图 12-5.** 按住`键盘`按钮可查看已安装的键盘布局列表。\n\n\n\n#### 您的设备显示屏在夜间使用时亮度过于刺眼\n\n许多人会将 iOS\
  \ 设备放在床头用作时钟或闹钟。夜间使用时调暗屏幕是必须的，但对很多人来说，屏幕色彩仍然过于刺眼，可能导致难以入睡。\n\n**解决方案：** 您可以使用`Night\
  \ Shift`（夜览）功能，将屏幕色彩向光谱的红色端偏移。这能让屏幕整体感觉更\"温暖\"，从而减轻夜间观看时的刺眼感，更有利于入睡。\n\n请按照以下步骤激活并配置`Night\
  \ Shift`：\n\n1. 在主屏幕上，轻点`设置`以打开`设置`应用。\n2. 轻点`显示与亮度`以显示`显示与亮度`屏幕。\n3. 轻点`夜览`以显示`夜览`屏幕。\n\
  4. 若要设定自动开启和关闭`夜览`的时间，请将`设定时间`开关轻点至`开`，如图 12-6 所示。然后轻点`时间`控制项；使用`自`设定开始时间，使用`至`设定结束时间，然后轻点`返回`回到`夜览`屏幕。\n\
  \n   ![A429116_1_En_12_Fig6_HTML.jpg](img/A429116_1_En_12_Fig6_HTML.jpg)\n\n   **图\
  \ 12-6.** 将`设定时间`开关轻点至`开`，然后为`夜览`设定开始和结束时间\n\n   **注意：** 您也可以不设定`夜览`的计划时间，而是按照步骤\
  \ 1 至 3 显示`夜览`屏幕，然后将`手动启用至明天`开关轻点至`开`，随时手动启用该功能。\n\n5. 使用`色温`滑块调整屏幕色彩，使其更暖（向右滑动）或更冷（向左滑动）。\n\
  \n#### 您想控制孩子在 iOS 设备上能看到和能操作的内容\n\n如果您的孩子能接触到您的 iOS 设备，或者他们有自己的设备，那么您可能会有些担心他们在网页、YouTube\
  \ 或 iTunes 上可能接触到某些内容。同样，您可能也不希望他们安装应用或泄露当前的位置信息。\n\n**解决方案：** 针对所有这些以及类似的育儿担忧，您可以激活\
  \ iOS 的家长控制功能，从而在夜间睡得更安稳。这些控制功能将限制孩子们能看到和能操作的内容及活动。设置方法如下：\n\n1. 在主屏幕上，轻点`设置`。将显示`设置`应用。\n\
  2. 轻点`通用`。将显示`通用`屏幕。\n3. 轻点`限制`。将显示`限制`屏幕。\n4. 轻点`启用限制`。iOS 将显示`启用限制`屏幕，您需要在此指定一个四位数字的密码，用于日后修改家长控制设置。（请注意，此密码与本书之前讨论的锁屏密码不同；请参阅第\
  \ 8 章\"保护您的设备\"。）\n5. 输入四位数的限制密码，然后再次输入该密码进行确认。iOS 将返回`限制`屏幕并使各项控制功能可用，如图 12-7 所示。\n\
  \n   ![A429116_1_En_12_Fig7_HTML.jpg](img/A429116_1_En_12_Fig7_HTML.jpg)\n\n   **图\
  \ 12-7.** 使用`限制`屏幕配置您想要使用的家长控制功能\n\n6. 在`允许`部分，针对每个应用或任务，轻点其`开/关`开关，以允许或禁止您的孩子使用该应用或任务。\n\
  7. 在`允许的内容`下，轻点`分级区域`，然后轻点您想使用其分级制度的国家或地区。\n8. 针对每个内容控制项——`音乐`、`播客与新闻`、`影片`、`电视节目`、`图书`、`App`、`Siri`和`网站`——轻点该控制项，然后轻点您希望孩子能访问的内容所允许的最高分级。\n\
  9. 如果您不希望孩子更改某些设置（例如`定位服务`和`通讯录`），请在`隐私`部分轻点相应的设置类型，然后轻点`不允许更改`。\n10. 如果您不希望孩子更改当前的`邮件`、`日历`或`通讯录`账户设置，请轻点`允许更改`下的`账户`，然后轻点`不允许更改`。\n\
  11. 如果您不希望孩子调整您已设定的最大音量限制，请轻点`音量限制`，然后轻点`不允许更改`。\n\n    **提示：** 要在 iOS 设备上设置最大音量，请打开`设置`应用，轻点`音乐`，轻点`音量限制`，然后使用`最大音量`滑块设定限制。\n\
  \n12. 在`游戏中心`部分，轻点`开/关`开关以启用或禁用多人游戏、添加好友以及录制屏幕功能。\n\n### 故障排除：连接与同步问题\n\n如今大多数同步都通过\
  \ iCloud 进行，许多人发现自己很少需要将 iOS 设备连接到电脑。不过，如果您没有 iCloud 账户，那就有必要连接电脑并通过 iTunes 进行同步了，因此确保一切正常运作就更加重要。\n\
  \n#### iTunes 无法识别您的设备\n\n当您将 iOS 设备连接到电脑时，iTunes 应该会启动，并且您应该在设备列表中看到该设备。如果连接设备时\
  \ iTunes 没有启动，或者 iTunes 已在运行但设备没有出现在设备列表中，这意味着 iTunes 无法识别您的设备。\n\n**解决方案：** 以下是一些可能的修复方法：\n\
  \n* **信任此电脑。** 只有在 iOS 中告知您信任运行 iTunes 的这台电脑后，才能连接到 iTunes。在您的设备上，轻点`信任`。\n* **检查连接。**\
  \ 确保 USB 连接器和 Lightning 接口都已完全插好。\n* **尝试其他 USB 端口。** 您当前使用的端口可能无法正常工作，请尝试其他端口。如果您使用的是\
  \ USB 集线器上的端口，请尝试使用电脑内置的 USB 端口之一。\n* **尝试其他线缆。** USB 线缆可能有缺陷，因此请尝试更换一条线缆（如果有的话）。\n\
  * **重启设备。** 按住`睡眠/唤醒`按钮几秒钟，直到设备关机。再次按住`睡眠/唤醒`按钮，直到看到 Apple 标志。\n* **重启电脑。** 这应该能重置电脑的\
  \ USB 端口，可能会解决问题。\n* **检查您的 iTunes 版本。** 使用 iOS 10 至少需要 iTunes 12.5.1 版本。\n* **检查您的操作系统版本。**\
  \ 在 Mac 上，运行 iOS 10 的 iOS 设备要求 OS X Mavericks (10.9)或更高版本。在 Windows PC 上，您的 iOS\
  \ 设备要求 Windows 7。\n\n#### iTunes 无法同步您的设备\n\niTunes 或许能识别您的 iOS 设备，但可能拒绝同步该设备。\n\
  \n**解决方案：** 可能涉及几个原因。首先，连接您的设备，切换到电脑上的 iTunes，然后在设备列表中点击您的设备。在`摘要`标签页（见图 12-8）中，确保选中了`连接此设备时自动同步`复选框（其中\
  \ device 指 iPhone、iPad 或 iPod）。\n\n![A429116_1_En_12_Fig8_HTML.jpg](img/A429116_1_En_12_Fig8_HTML.jpg)\n\
  \n**图 12-8.** 选中`连接此设备时自动同步`复选框\n\n如果该复选框已被选中，那么您需要更深入探究以解决问题。请按照以下步骤操作：\n\n1. 打开\
  \ iTunes 偏好设置：\n   * **Mac。** 点击`iTunes`，然后点击`偏好设置`。\n   * **Windows。** 点击`编辑`，然后点击`偏好设置`。\n\
  2. 点击`设备`标签页。\n3. 取消选中`阻止 iPod、iPhone 和 iPad 自动同步`复选框。\n4. 点击`确定`以应用新设置并再次启用自动同步。\n\
  \n另一种可能性是您的 iOS 设备当前处于锁定状态。这通常对 iTunes 来说不是问题，但它有时会被锁定设备搞混淆。简单的解决方法是断开设备连接，解锁设备，然后重新连接。\n\
  \n\n#### 同步音乐或视频时遇到问题\n\n你可能会遇到将音乐或视频同步到 iOS 设备的问题。\n\n**解决方案：** 最可能的原因是文件采用了 iOS\
  \ 无法读取的格式，例如 `WMA`、`MPEG-1` 或 `MPEG-2`。首先，使用转换软件（例如格式工厂；请参阅 [`www.pcfreetime.com/`](http://www.pcfreetime.com/)）将文件转换为\
  \ iOS 可以识别的格式。然后，将它们放回 iTunes 并尝试再次同步。这应该能解决问题。\n\niOS 支持的音频格式包括 `AAC`、受保护的 `AAC`、`HE-AAC`、`MP3`、`MP3\
  \ VBR`、Audible（格式 2、3 和 4；Audible 增强音频；`AAX` 和 `AAX+`）、Apple 无损、`AIFF` 和 `WAV`。iOS\
  \ 支持的视频格式包括 `H.264`、`MPEG-4` 和 `Motion JPEG`。\n\n#### 每次连接设备时都会打开某个应用\n\n每次将 iOS\
  \ 设备连接到电脑时，都可能会看到“照片”应用（在 Mac 上）或“自动播放”对话框（在 Windows 中）。如果你确实想将照片传输到电脑，这当然很方便，但你可能会发现你只是偶尔才这样做。在这种情况下，每次都要处理\
  \ iPhoto 或对话框会令人沮丧且浪费时间。\n\n**解决方案：** 你可以配置你的电脑，使其不再提示你从 iOS 设备获取照片。\n\n**注意**\n\
  \n配置你的电脑不下载 iOS 设备上的照片意味着将来你需要恢复该设置才能获取照片，或者手动导入它们。\n\n以下是在 Mac 上进行设置的方法：\n\n1.\
  \  点击“聚焦”，输入 **image**，然后点击**图像捕捉**。“图像捕捉”应用随即打开。\n2.  在**设备**列表中，点击你的 iOS 设备。\n\
  3.  在**设备**窗格的底部，点击**连接此相机时打开**菜单，然后选择**无应用程序**，如图 12-9 所示。\n\n![A429116_1_En_12_Fig9_HTML.jpg](img/A429116_1_En_12_Fig9_HTML.jpg)\
  \  \n图 12-9. 在 Mac 的“图像捕捉”程序中，选择**无应用程序**以防止连接 iOS 设备时打开“照片”应用\n\n4.  点击**图像捕捉**，然后点击**退出图像捕捉**。“图像捕捉”保存新设置后关闭。下次连接\
  \ iOS 设备时，“照片”应用将忽略它。\n\n请按照以下步骤让 Windows 在每次连接 iOS 设备时不打开“自动播放”对话框：\n\n1.  打开**默认程序**窗口：\n\
  \    *   Windows 10。在任务栏的“搜索”框中，输入 **default**，然后点击**默认程序**。\n    *   Windows 8。在“开始”屏幕中，输入\
  \ **default**，然后点击**默认程序**。\n    *   Windows 7。点击**开始**，然后点击**默认程序**打开**默认程序**窗口。\n\
  2.  点击**更改自动播放设置**。“自动播放”对话框随即出现。\n3.  在**设备**部分，打开 iOS 设备的列表，并选择**不执行任何操作**，如图\
  \ 12-10 所示。\n\n![A429116_1_En_12_Fig10_HTML.jpg](img/A429116_1_En_12_Fig10_HTML.jpg)\
  \  \n图 12-10. 在 iOS 设备列表中，选择**不执行任何操作**以防止连接 iOS 设备时出现“自动播放”对话框\n\n4.  点击**保存**。Windows\
  \ 保存新设置。下次连接 iOS 设备时，你将不会再受到“自动播放”对话框的打扰。\n\n索引  \nA  \n辅助功能  \n听力 耳机声音  \nLED 闪烁以示提醒\
