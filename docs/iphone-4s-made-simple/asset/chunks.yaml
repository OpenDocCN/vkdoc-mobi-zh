- fmt: "#### Connecting to a Stereo Bluetooth Device\n\nThe first step to using Stereo\
    \ Bluetooth is to connect to a Stereo Bluetooth–capable device. This can be a\
    \ car stereo with this technology built in, a pair of Bluetooth headphones or\
    \ speakers, or even newer headsets like the Jawbone Jambox.\n\nBegin by putting\
    \ the Bluetooth device into pairing mode per the manufacturer’s instructions,\
    \ and then go to the Bluetooth setting page from the `Settings` icon, as shown\
    \ earlier in the chapter.\n\n![images](images/U0515.jpg)\n\n![images](images/U0516.jpg)\n\
    \nOnce connected, you will see the new Stereo Bluetooth device listed under your\
    \ Bluetooth devices. Sometimes you will see the name or part of the name; other\
    \ times you will simply see `Headset`. Tap the `Arrow` icon to the right of the\
    \ device and you will see the actual name of the device next to the `Bluetooth`\
    \ tab in the next screen, as shown here.\n\nNext, tap your `Music` app and start\
    \ any song, playlist, podcast, or video music library.\n\nFollow these steps to\
    \ choose your audio output device:\n\n1. Tap the blue `AirPlay` icon in the lower-right\
    \ corner of the screen.\n2. Choose from the list of available devices for streaming\
    \ your music.\n3. To switch the music back to your iPhone, just tap the `AirPlay`\
    \ icon again and choose `iPhone` from the list.\n\n![images](images/U0517.jpg)\n\
    \n![images](images/U0518.jpg)\n\n**NOTE**: The `AirPlay` icon will bring up a\
    \ list of both Bluetooth and Wi-Fi connected audio devices, such as Apple TV or\
    \ AirPort Express connected speakers. You can choose from either one.\n\nWe selected\
    \ the Jawbone JAMBOX by tapping it. Now, your music will now start to play from\
    \ the selected Bluetooth device. You can verify this by touching the `AirPlay`\
    \ icon on the screen once more. You should see a `Checkmark` icon next to the\
    \ new Stereo Bluetooth device, and you should hear your music coming from that\
    \ sound source, as well.\n\n### Disconnecting or Forgetting a Bluetooth Device\n\
    \nSometimes, you might want to disconnect a Bluetooth device from your iPhone.\
    \ This is easy to do. Enter the Bluetooth settings, as you did earlier in this\
    \ chapter. Next, touch the device you want to disconnect to bring up the next\
    \ screen, tap the `Forget this Device` button, and then confirm your choice.\n\
    \nThis will delete the Bluetooth profile from the iPhone (see [Figure 5–5](#Chapter05.html#fig_5_5)).\n\
    \n**NOTE**: Bluetooth has a range of only about 30 feet. If you are not near a\
    \ Bluetooth device, then you should turn off Bluetooth. You can always turn it\
    \ back on when you are actually ready to use it.\n\n![images](images/0505.jpg)\n\
    \n**Figure 5–5.** *Forgetting or disconnecting a Bluetooth device*\n\n## Chapter\
    \ 6\n\n## Icons and Folders\n\nYour new iPhone is very customizable. In this chapter,\
    \ we will show you how to move icons around and put your favorite icons just where\
    \ you want them. You’ve got up to 11 pages of icons to work with, and you can\
    \ adjust the look and feel of those pages so they reflect your tastes.\n\nLike\
    \ a Mac computer or an iPad, the iPhone has a *Bottom Dock* where you can put\
    \ the icons for your favorite apps. iPhones come with four standard icons in the\
    \ Bottom Dock. You can replace the default icons with the icons for your favorite\
    \ apps, so they are always available at the bottom of your screen. You can even\
    \ move an entire folder of apps to the Bottom Dock.\n\n**TIP**: You can also move\
    \ or delete icons using the `iTunes` app on your computer. Check out [Chapter\
    \ 22](#Chapter22.html#ch22): `iTunes on Your Device` for more information.\n\n\
    ### Moving Icons to the Bottom Dock\n\nWhen you turn your iPhone on, you’ll notice\
    \ four icons locked to the Bottom Dock.\n\nSuppose you decide you want to exchange\
    \ one or more of these icons for apps you use more often. Fortunately, moving\
    \ icons to and from the Bottom Dock is easy.\n\n![images](images/U0601.jpg)\n\n\
    #### Starting the Move\n\nPress the `Home` button to get to your `Home` screen.\
    \ Now touch and hold any icon on the `Home` screen for a couple of seconds. You’ll\
    \ notice that all the icons start to shake.\n\nJust try moving a couple of icons\
    \ around at first. You’ll see that when you move an icon down, the other icons\
    \ in the row move to make space for it.\n\nOnce you have a feel for how the icons\
    \ move, you are ready to replace one of the Bottom Dock icons. While the icons\
    \ are shaking, take the icon you wish to replace from the Bottom Dock and move\
    \ it up to an area covered by other icons. (If you move it to an empty area, it\
    \ will simply jump back to the Bottom Dock).\n\n**NOTE**: You can have up to four\
    \ icons in the Bottom Dock; so if you already have four icons there, you will\
    \ have to remove one to replace it with a new one.\n\nFor example, suppose you\
    \ want to replace the `App Store` icon in our example with the `Skype` icon because\
    \ you like to have `Skype` handy to talk with your children away at college. The\
    \ first thing to do is to make space in the Bottom Dock by removing the `App Store`\
    \ icon from the Bottom Dock, as shown in [Figure 6–1](#Chapter06.html#fig_6_1).\n\
    \n![images](images/0601.jpg)\n\n**Figure 6–1.** *Swapping icons in the Bottom\
    \ Dock*\n\nNext, locate your `Skype` icon and move it down to the Bottom Dock.\
    \ As you’ll see, the icon becomes semi-transparent until you actually set it into\
    \ place.\n\nWhen you are sure that you have the icons just where you want them,\
    \ simply press the `Home` button once and the icons will lock into place. At this\
    \ point, you have the `Skype` icon in the Bottom Dock, where you can easily start\
    \ video calls to your children in college.\n\n### Moving Icons to a Different\
    \ Icon Page\n\niPhones can hold 16 icons on a page (not including the dock). You\
    \ can navigate through these pages by swiping (right to left) on your `Home` screen.\
    \ With all the cool apps available, it is not uncommon to have five, six, or even\
    \ more pages of icons. You can have up to 11 pages filled with icons, if you feel\
    \ adventurous!\n\n**NOTE**: You can also navigate to new pages by swiping from\
    \ left to right on any screen except the `Home` screen. On the `Home` screen,\
    \ swiping left to right takes you to `Spotlight Search`; see [Chapter 2](#Chapter02.html#ch2):\
    \ `Typing, Copy, and Search` for more information.\n\nYou may have an icon that\
    \ you rarely use on your first page, so you want to move it way off to the last\
    \ page. Or you may want to move an icon you often use from the last of the pages\
    \ to the first page. Both tasks are very easy to do; indeed, it’s very much like\
    \ moving icons to the Bottom Dock:\n\n1. Touch and hold any icon to initiate the\
    \ moving process.\n2. Touch and hold the icon you wish to move. For example, let’s\
    \ assume you want to move the `iBooks` icon to the first page (see [Figure 6–2](#Chapter06.html#fig_6_2)).\n\
    \n    ![images](images/0602.jpg)\n\n    **Figure 6–2.** *Moving icons from one\
    \ page to another*\n\n3. Now drag and drop the icon onto another page. To do this,\
    \ touch and hold the `iBooks` icon and drag it to the left. You will see all of\
    \ your pages of icons move by. When you get to the first page, just release the\
    \ icon, and it is now placed at the very beginning.\n4. Press the `Home` key to\
    \ complete the move and stop the icons from shaking."
