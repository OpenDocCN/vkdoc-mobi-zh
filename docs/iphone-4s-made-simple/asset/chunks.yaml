- fmt: "### Buying and Subscribing to Periodicals  \n\nThe newspaper and magazine\
    \ apps in `Newsstand` are typically free; however, they also typically come with\
    \ very little or even no content built in. To get the content, you need to either\
    \ buy individual issues or subscribe to a number of issues.  \n\nBuying issues\
    \ is handled like any other in-app purchase. Typically, you'll be shown a list\
    \ of recent issues with the cover art on the left and a content blurb on the right,\
    \ along with the price of the issue. Tap the price and you'll be asked for your\
    \ iTunes password to confirm the purchase. Once you confirm a purchase, your issue\
    \ will begin to download.  \n\nSubscribing to newspapers and magazines is handled\
    \ like a special in-app purchase that lasts for a specified period of time. For\
    \ example, you can often purchase a year's worth of newspapers for a set price.\
    \ Some newspapers and magazines offer different subscription length options, such\
    \ as three years, six months, and so on. Some also offer bundles that include\
    \ both the print and digital editions. Make sure you read your options carefully\
    \ and figure out which one provides you with the greatest value.  \n\n![images](images/U1402.jpg)\
    \  \n\nYou might wonder what you do if you've bought a subscription or an individual\
    \ issue, and you need to re-install the app that displays the content. If that\
    \ happens, you can simply re-install the app and then restore your subscription\
    \ or re-download any individual issues you've previously purchased. In other words,\
    \ the process of restoring content in `Newsstand` apps is identical to that of\
    \ restoring content for any other in-app purchase.  \n\n![images](images/U1403.jpg)\
    \  \n\n### Newspapers  \n\nRemember the days when newspapers were delivered to\
    \ the house? Invariably, if there was one puddle in the sidewalk, that was where\
    \ the newspaper landed! You took it out of that plastic bag, shook it off, and\
    \ tried to make out what was in the section that got soaked.  \n\nWell, those\
    \ days may be gone forever. You now have the opportunity to interact with the\
    \ news and even get your paper delivered every day—but to your iPhone instead\
    \ of your driveway.  \n\nMany newspapers and news sites are developing apps for\
    \ the iPhone, with new apps seeming to appear every day. Some of these apps provide\
    \ a level of free content, but require you to create an account or subscribe to\
    \ get more. Others apps provide content only with a subscription.  \n\n**NOTE:**\
    \ If you already subscribe to the print edition of your local newspaper, it might\
    \ provide you with discounted or even free access to its iPhone app. Be sure to\
    \ read any registration or subscription offers carefully to see if you qualify.\
    \  \n\nMany newspapers also have dedicated web sites. Some are optimized for the\
    \ iPhone and `Safari`, while others offer a full web experience. Some require\
    \ registration or a paid subscription to view the paper's full content.  \n\n\
    Let's take a quick look at `The New York Times`, one of largest newspapers in\
    \ the U.S., and see how that paper has revolutionized reading the news on the\
    \ iPhone.  \n\n#### The New York Times app  \n\n`The New York Times` provides\
    \ various apps, both free and paid, to bring you the news on the iPhone.  \n\n\
    `The New York Times` offers a slimmed-down version of the paper in its free iPhone\
    \ app.  \n\nThere are four soft keys at the bottom of the page: `Top News`, `Most\
    \ E-Mailed`, `Favorites` and `Sections`. Each section carries a sampling of stories\
    \ from those sections in the current day's paper.  \n\nTouching `Sections` shows\
    \ you tabs for all sections of the `New York Times`.  \n\n![images](images/U1404.jpg)\
    \  \n\nNavigating `The New York Times` app is as simple as touching an article\
    \ and scrolling through the story. While reading a story, just touch the center\
    \ of the screen and the soft keys on the top and bottom will appear.  \n\nTo go\
    \ back to the `Home` page, touch the `Latest News` button in the upper left-hand\
    \ corner.  \n\n**NOTE:** If you were in another section—say `Technology`—the button\
    \ in the upper-left corner would say `Technology`.  \n\n![images](images/U1405.jpg)\
    \  \n\nTo email an article, just touch the `Share` icon in the lower-left corner.\
    \ This button is only available when you are inside an article, not on the `Home`\
    \ page.  \n\nTouch the icon and you can send the article via email, copy the link,\
    \ or Twitter.  \n\n#### Moving Through and Enjoying Content  \n\nAfter you play\
    \ for a while with different newspaper apps, you'll begin to realize that there\
    \ is no real standard for navigating newspaper content. This means you'll need\
    \ to become familiar with each app's own way of navigating articles, as well as\
    \ how to return to the main screen. Here's a short guide for generally navigating\
    \ these types of apps:  \n\n- **Showing or Hiding Control buttons or Captions:**\
    \ Tapping the screen once usually shows hidden controls or picture captions. You\
    \ can tap the screen again to re-hide these elements.  \n- **Getting to the Details\
    \ of an Article:** Usually, you scroll through the articles, just as you would\
    \ on a web page.  \n- **Viewing a Video:** Typically, you just tap a video to\
    \ start playing it. See [Chapter 15](#Chapter15.html#ch15): “Viewing Videos” to\
    \ learn how to navigate videos on the iPhone.  \n- **Expanding a Video or Image\
    \ Size:** You can try pinching open in the video or image and then double-tapping\
    \ it. You can also look for an `Expand` button or try rotating to Landscape mode.\
    \  \n- **Reducing a Video or Image Size:** You can try pinching closed inside\
    \ the video or image to reduce the size of a video. You can also look for a `Close`\
    \ or `Minimize` button or try rotating back to Portrait mode.  \n- **Sharing an\
    \ Article:** Sending an article link via email—or sharing it over a social network\
    \ like Twitter, Facebook, or LinkedIn—is a common feature. Look for an `Action`\
    \ or `Share` button.  \n- **Adjusting Font Sizes:** Many newspaper apps have a\
    \ button or settings option for increasing or decreasing the default font size\
    \ to make the content easier to read.  \n\n### Magazines  \n\nIt is no secret\
    \ that both newspapers and magazines have suffered declines in readership over\
    \ the last few years. The iPhone offers a totally new way of reading magazines\
    \ that might just give the industry the boost it needs.  \n\nPictures are incredibly\
    \ clear and brilliant in magazines on the iPhone. Navigation is usually easy,\
    \ and stories seem to come to life, much more so than in their print counterparts.\
    \ Add video and sound integration right into the magazine, and you can see how\
    \ the iPhone truly enhances the magazine reading experience.  \n\nSome magazines,\
    \ such as `TIME Magazine`, include links to live or frequently updated content.\
    \ These links might be called `Newsfeeds`, `Live Editions`, or `Updates`. Check\
    \ for them in any magazine you purchase—these links will help you access the most\
    \ up-to-date information.  \n\n**TIP:** Make sure to check the user ratings for\
    \ a magazine or other app before you purchase it. Doing so may save you some money\
    \ or grief!  \n\nThe App Store has a couple different kinds of magazine apps.\
    \ First, you can find apps that let you purchase individual magazines or view\
    \ limited content from a given magazine for free. Second, you can find magazine\
    \ readers that provide samples of many magazines; these allow you to subscribe\
    \ to weekly or monthly delivery of a given magazine.  \n\nIf you browse in the\
    \ `App Store` by `Categories` > `Newsstand`, then tap `Top Free` at the top, you\
    \ can check out all the free magazines and newspapers.  \n\n![images](images/U1406.jpg)"
  raw: '### Buying and Subscribing to Periodicals


    The newspaper and magazine apps in **Newsstand** are typically free; however,
    they also typically come with very little or even no content built in. To get
    the content, you need to either buy individual issues or subscribe to a number
    of issues.


    Buying issues is handled like any other in-app purchase. Typically, you''ll be
    shown a list of recent issues with the cover art on the left and a content blurb
    on the right, along with the price of the issue. Tap the price and you''ll be
    asked for your iTunes password to confirm the purchase. Once you confirm a purchase,
    your issue will begin to download.


    Subscribing to newspapers and magazines is handled like a special in-app purchase
    that lasts for a specified period of time. For example, you can often purchase
    a year''s worth of newspapers for a set price. Some newspapers and magazines offer
    different subscription length options, such as three years, six months, and so
    on. Some also offer bundles that include both the print and digital editions.
    Make sure you read your options carefully and figure out which one provides you
    with the greatest value.


    ![images](images/U1402.jpg)


    You might wonder what you do if you''ve bought a subscription or an individual
    issue, and you need to re-install the app that displays the content. If that happens,
    you can simply re-install the app and then restore your subscription or re-download
    any individual issues you''ve previously purchased. In other words, the process
    of restoring content in Newsstand apps is identical to that of restoring content
    for any other in-app purchase.


    ![images](images/U1403.jpg)


    ### Newspapers


    Remember the days when newspapers were delivered to the house? Invariably, if
    there was one puddle in the sidewalk, that was where the newspaper landed! You
    took it out of that plastic bag, shook it off, and tried to make out what was
    in the section that got soaked.


    Well, those days may be gone forever. You now have the opportunity to interact
    with the news and even get your paper delivered every day—but to your iPhone instead
    of your driveway.


    Many newspapers and news sites are developing apps for the iPhone, with new apps
    seeming to appear every day. Some of these apps provide a level of free content,
    but require you to create an account or subscribe to get more. Others apps provide
    content only with a subscription.


    **NOTE:** If you already subscribe to the print edition of your local newspaper,
    it might provide you with discounted or even free access to its iPhone app. Be
    sure to read any registration or subscription offers carefully to see if you qualify.


    Many newspapers also have dedicated web sites. Some are optimized for the iPhone
    and **Safari**, while others offer a full web experience. Some require registration
    or a paid subscription to view the paper''s full content.


    Let''s take a quick look at *The New York Times*, one of largest newspapers in
    the U.S., and see how that paper has revolutionized reading the news on the iPhone.


    #### The New York Times app


    *The New York Times* provides various apps, both free and paid, to bring you the
    news on the iPhone.


    *The New York Times* offers a slimmed-down version of the paper in its free iPhone
    app.


    There are four soft keys at the bottom of the page: **Top News, Most E-Mailed,
    Favorites and Sections.** Each section carries a sampling of stories from those
    sections in the current day''s paper.


    Touching **Sections** shows you tabs for all sections of the *New York Times*.


    ![images](images/U1404.jpg)


    Navigating **The New York Times** app is as simple as touching an article and
    scrolling through the story. While reading a story, just touch the center of the
    screen and the soft keys on the top and bottom will appear.


    To go back to the **Home** page, touch the **Latest News** button in the upper
    left-hand corner.


    **NOTE:** If you were in another section—say *Technology*—the button in the upper-left
    corner would


    say **Technology**. ![images](images/U1405.jpg)


    To email an article, just touch the **Share** icon in the lower-left corner. This
    button is only available when you are inside an article, not on the **Home** page.


    Touch the icon and you can send the article via email, copy the link, or Twitter.


    #### Moving Through and Enjoying Content


    After you play for a while with different newspaper apps, you''ll begin to realize
    that there is no real standard for navigating newspaper content. This means you''ll
    need to become familiar with each app''s own way of navigating articles, as well
    as how to return to the main screen. Here''s a short guide for generally navigating
    these types of apps**:**


    *   **Showing or Hiding Control buttons or Captions:** Tapping the screen once
    usually shows hidden controls or picture captions. You can tap the screen again
    to re-hide these elements.

    *   **Getting to the Details of an Article:** Usually, you scroll through the
    articles, just as you would on a web page.

    *   **Viewing a Video:** Typically, you just tap a video to start playing it.
    See [Chapter 15](#Chapter15.html#ch15): “Viewing Videos” to learn how to navigate
    videos on the iPhone.

    *   **Expanding a Video or Image Size:** You can try pinching open in the video
    or image and then double-tapping it. You can also look for an **Expand** button
    or try rotating to Landscape mode.

    *   **Reducing a Video or Image Size:** You can try pinching closed inside the
    video or image to reduce the size of a video. You can also look for a **Close**
    or **Minimize** button or try rotating back to Portrait mode.

    *   **Sharing an Article:** Sending an article link via email—or sharing it over
    a social network like Twitter, Facebook, or LinkedIn—is a common feature. Look
    for an **Action** or **Share** button.

    *   **Adjusting Font Sizes:** Many newspaper apps have a button or settings option
    for increasing or decreasing the default font size to make the content easier
    to read.


    ### Magazines


    It is no secret that both newspapers and magazines have suffered declines in readership
    over the last few years. The iPhone offers a totally new way of reading magazines
    that might just give the industry the boost it needs.


    Pictures are incredibly clear and brilliant in magazines on the iPhone. Navigation
    is usually easy, and stories seem to come to life, much more so than in their
    print counterparts. Add video and sound integration right into the magazine, and
    you can see how the iPhone truly enhances the magazine reading experience.


    Some magazines, such as *TIME Magazine*, include links to live or frequently updated
    content. These links might be called *Newsfeeds*, *Live Editions*, or *Updates*.
    Check for them in any magazine you purchase—these links will help you access the
    most up-to-date information.


    **TIP:** Make sure to check the user ratings for a magazine or other app before
    you purchase it. Doing so may save you some money or grief!


    The App Store has a couple different kinds of magazine apps. First, you can find
    apps that let you purchase individual magazines or view limited content from a
    given magazine for free. Second, you can find magazine readers that provide samples
    of many magazines; these allow you to subscribe to weekly or monthly delivery
    of a given magazine.


    If you browse in the **App Store** by **Categories** > **Newsstand**, then tap
    Top Free a the top, you can check out all the free magazines and newspapers.


    ![images](images/U1406.jpg)'
  trans: '

    ### 购买与订阅报刊


    `书报摊`中的报纸和杂志应用通常是免费的，但通常内置内容极少甚至完全没有。要获取内容，你需要购买单期或订阅多期。


    购买单期的方式与其他应用内购买类似。通常，你会看到最近各期杂志的列表，左侧是封面图，右侧是内容简介和价格。点击价格后，系统会要求输入 iTunes 密码以确认购买。确认购买后，该期内容将开始下载。


    订阅报纸和杂志则是一种特殊的应用内购买，它会在指定时间内持续有效。例如，你通常可以以固定价格购买一年的报纸。有些报纸和杂志提供不同的订阅时长选项，如三年、半年等。有些还提供包含印刷版和数字版的套餐。请务必仔细阅读你的选项，找出对你来说价值最高的那一款。


    ![图片](img/U1402.jpg)


    你可能会想，如果你已经购买了订阅或单期内容，但需要重新安装显示内容的应用程序，该怎么办。如果发生这种情况，你只需重新安装应用程序，然后恢复你的订阅或重新下载之前购买过的任何单期即可。换句话说，在`书报摊`应用中恢复内容的过程，与恢复其他应用内购买内容的过程完全相同。


    ![图片](img/U1403.jpg)


    ### 报纸


    还记得报纸被送到家里的日子吗？人行道上只要有一个水坑，报纸必定落在那里！你从塑料袋里取出报纸，抖掉水珠，然后努力辨认被浸湿的那一版上写了什么。


    好吧，那样的日子可能一去不复返了。现在，你有了与新闻互动的新机会，甚至每天都能收到报纸——不过是送到你的 iPhone 上，而不是家门口的车道上。


    许多报纸和新闻网站正在为 iPhone 开发应用程序，似乎每天都有新的应用出现。其中一些应用提供一定程度的免费内容，但要求你创建账户或订阅才能获取更多内容。其他应用则只提供付费订阅内容。


    **注意：** 如果你已经订阅了本地报纸的印刷版，你可能可以享受打折甚至免费使用其 iPhone 应用的特权。请务必仔细阅读任何注册或订阅优惠条款，以确认你是否符合条件。


    许多报纸也有专门的网站。有些针对 iPhone 和 `Safari` 进行了优化，而另一些则提供完整的网页体验。有些网站需要注册或付费订阅才能查看报纸的全部内容。


    让我们快速浏览一下美国最大的报纸之一 `纽约时报`，看看这家报纸是如何革新在 iPhone 上阅读新闻的体验的。


    #### 纽约时报应用


    `纽约时报` 提供各种免费和付费的应用程序，让您在 iPhone 上获取新闻。


    `纽约时报` 在其免费的 iPhone 应用中提供了报纸的精简版本。


    页面底部有四个软键：`头条新闻`、`最多电邮`、`收藏` 和 `板块`。每个板块都收录了当天报纸中该板块的部分报道。


    点击 `板块` 会显示 `纽约时报` 所有板块的标签页。


    ![图片](img/U1404.jpg)


    浏览 `纽约时报》应用非常简单，只需点击一篇文章并滚动阅读即可。阅读文章时，只需点击屏幕中央，顶部和底部的软键就会显示出来。


    要返回`主页`，请点击左上角的`最新新闻`按钮。


    **注意：** 如果你在另一个板块——比如 `科技`——那么左上角的按钮会显示为 `科技`。


    ![图片](img/U1405.jpg)


    如需通过电子邮件发送一篇文章，只需点击左下角的`分享`图标。此按钮仅在阅读文章时可用，在`主页`上不可用。


    点击该图标，你可以通过电子邮件发送文章、复制链接或通过 Twitter 分享。


    #### 浏览与享受内容


    当你试用不同的报纸应用时，你会逐渐意识到，浏览报纸内容并没有真正的标准。这意味着你需要熟悉每个应用自身的文章导航方式，以及如何返回主屏幕。以下是浏览这类应用的一般性简短指南：


    - **显示或隐藏控制按钮或说明：** 通常，点击一次屏幕会显示隐藏的控制按钮或图片说明。你可以再次点击屏幕重新隐藏这些元素。

    - **查看文章详情：** 通常，你像浏览网页一样进行滚动。

    - **观看视频：** 通常，只需点击视频即可开始播放。请参阅第 15 章：“观看视频”，了解如何在 iPhone 上浏览视频。

    - **放大视频或图片：** 你可以尝试在视频或图片上使用双指张开手势，然后双击。你也可以寻找`展开`按钮，或者尝试旋转到横屏模式。

    - **缩小视频或图片：** 你可以尝试在视频或图片上使用双指捏合手势来缩小视频尺寸。你也可以寻找`关闭`或`最小化`按钮，或者尝试旋转回竖屏模式。

    - **分享文章：** 通过电子邮件发送文章链接——或通过 Twitter、Facebook 或 LinkedIn 等社交网络分享——是一项常见功能。请寻找`操作`或`分享`按钮。

    - **调整字体大小：** 许多报纸应用都有按钮或设置选项，用于增大或减小默认字体大小，使内容更易于阅读。


    ### 杂志


    过去几年，报纸和杂志的读者数量都在下降，这已不是什么秘密。iPhone 提供了一种全新的杂志阅读方式，这或许正是该行业所需的推动力。


    在 iPhone 上阅读杂志，图片异常清晰亮丽。导航通常很方便，故事仿佛活灵活现，远比印刷版生动。再加上视频和音频的无缝集成，你能真切地感受到 iPhone
    如何提升了杂志阅读体验。


    一些杂志，如 `时代周刊`，包含指向实时或频繁更新内容的链接。这些链接可能被称为 `新闻推送`、`直播版` 或 `更新`。在你购买的任何杂志中请留意它们——这些链接将帮助你获取最新信息。


    **提示：** 在购买杂志或其他应用之前，务必查看其用户评价。这样做可能会为你省下一些钱或免去烦恼！


    App Store 中有几种不同类型的杂志应用。首先，有些应用让你可以购买单本杂志或免费阅读某一杂志的有限内容。其次，还有一些杂志阅读器，提供多种杂志的样本；你可以通过这些应用订阅某本杂志的每周或每月递送。


    如果你在 `App Store` 中通过 `类别` > `书报摊` 浏览，然后点击顶部的`热门免费`，就可以查看所有免费的杂志和报纸。


    ![图片](img/U1406.jpg)

    '
- fmt: '#### The Zinio Magazine App—A Sampler


    The `Zinio` app takes a unique approach. This app is free in the App Store, and
    it gives you the ability to subscribe to hundreds of magazine titles. Reading
    magazines in `Zinio` requires a few simple steps:


    1. Log into the `Zinio` app (You can create a free account).

    2. View and download free samples in the `My Library` section or click the `Shop`
    button at the bottom to purchase magazines.

    3. Some magazines may be giving away full, free issues. Just look in the `My Library`
    section to see what is available.


    ![images](images/U1407.jpg)


    There are many popular magazines you can choose from. The categories cover everything
    from art to sports and more. Prices vary, but often you can buy either a single
    issue or a yearly subscription.


    For example, the latest issue of `Popular Mechanics` was US $1.99 on `Zinio`,
    and a yearly subscription was US $7.99.


    Some of the subscriptions make great sense. A single issue of `Bike Magazine`
    was US $4.99 at the time of writing, while a yearly subscription was only US $9.00.


    A closer look revealed that there were more than 16 cycling magazines you could
    subscribe to at the time of writing.


    ![images](images/U1408.jpg)


    ### Comic Books


    One genre of "new media" poised for a comeback with the advent of the iPhone is
    the comic book. The iPhone, with its high-definition screen and powerful processor,
    makes the pages of comic books come alive.


    There are already a few comic book apps available, including one from the famous
    Marvel Comics. DC Comics has just launched its app, as well. This app was created
    by the same people who make the Marvel app.


    To locate the `Marvel Comics` app in the App Store, go to `Categories` and then
    `Books`. The app is free, and you can purchase comic books from inside the app.


    At the bottom of the `Home` screen, you''ll see five buttons: `My Comics`, `Featured`,
    `Free`, `Top 25`, and `Browse`. Purchases you make will be under the `My Comics`
    heading.


    The App Store gives you the opportunity to download both free comics and individual
    issues for sale. Most sell for $1.99 per issue.


    Each tab takes you to a new list of comics to browse, much like the iTunes store.


    Touch the `Browse` button to browse by `Series`, `Creator`, `Genre`, `Rating`,
    `Storylines/Arcs`, or `Release Date`. Or you can type in a search to find a particular
    comic.


    ![images](images/U1409.jpg)


    You can read a comic book in one of two ways. First, you can swipe through the
    pages and read one page after another. Second, you can double-tap a frame to `Zoom`
    in, and then tap the screen to advance to the next frame in the comic strip. From
    there, you can just swipe from right to left to advance a frame; or, if you want
    to go back, swipe from left to right.


    To return to the `Home` screen or to see the onscreen options, just tap the center
    of the screen. You''ll see a `Settings` button in the top-left corner. Touch this
    and you can `Jump to the First Page`, `Browse to a Page`, or go to the `Settings`
    menu.


    ![images](images/U1410.jpg)


    **NOTE:** The makers of this app, `ComiXology`, also make the app that contains
    the Marvel comics, as well as a bunch of others, including DC, Archie, Image,
    and Top Cow.


    ### The iPhone as a PDF Reader


    There are several programs available that turn the iPhone into a very capable
    PDF viewing program. For example, you can also read PDF files in the `iBooks`
    app. However, another great PDF reader is called `GoodReader for iPhone`.


    **NOTE:** [Chapter 17](#Chapter17.html#ch17): "Communicate with Email" showed
    you how to open attachments, including PDF files. One great benefit of the `GoodReader`
    app is that it lets you use Wi-Fi to transfer large PDF files.


    You can find the `GoodReader for iPhone` app in the `Productivity` section of
    the App Store. At the time of writing, this app costs US $4.99.


    **NOTE:** `iBooks` can also read PDF files that are emailed as attachments. If
    `iBooks` is installed, just choose `Open in iBooks` when opening a PDF.


    ![images](images/U1411.jpg)


    #### Transferring Files to your iPhone


    One of the great things about the `GoodReader for iPhone` app is that you can
    use it to wirelessly transfer large files from your Mac or PC to the iPhone for
    viewing in the `GoodReader` app. You can also use `GoodReader` for document sharing
    in iTunes, as discussed in [Chapter 3](#Chapter03.html#ch3): "Sync with iCloud,
    iTunes, and More." Follow these steps to transfer a file with `GoodReader`:


    1. Touch the small `Wi-Fi` icon at the bottom left of the screen, ![images](images/U1412.jpg)
    and the `Wi-Fi Transfer Utility` pops up. You are prompted either to type in an
    IP address into your browser or a Bonjour address if you use the `Bonjour` service.

    2. Type the address shown in the window from `GoodReader` into a web browser on
    your computer. Now you can make your computer act as a server. You''ll see that
    your computer and iPhone are now connected. You might bookmark this page on your
    browser, however, beware because it can change if you re-start your wireless network
    router and your iPhone gets a different wireless network address.

    3. Click the `Choose File` button in the web browser on your computer to locate
    a file to upload to your iPhone.

    4. Once you''ve selected the file, click `Upload Selected File` and the file will
    be automatically transferred to your iPhone.


    How is this useful? Well, for one of the authors (Gary), the iPhone has become
    a repository for more than 100 pieces of piano sheet music. This means no more
    downloading PDF files, printing them out, putting them into binders, and then
    trying to remember which song is in which binder. Now, all his music is catalogued
    on the iPhone. All he has to do is put the iPhone on the piano, and he has access
    to all his music in one place.


    **NOTE:** `Good Reader` can even unzip files you receive as email attachments.


    Navigating the `GoodReader` PDF viewer is quite easy. This app is more sensitive
    than others, so tap the center of the screen quickly to bring up the onscreen
    controls. You can then go to your library or touch the `Turn Page` icon to turn
    the page.


    The easiest way to move through pages is to touch the lower-right side of the
    screen to advance a page, or touch the upper-left side of the screen to go back
    a page. This becomes quite natural after a while.


    You can also flick up or down to turn pages.


    To go to another PDF file or another piece of sheet music, just touch the center
    of the iPhone quickly and touch the `My Documents` button in the upper-left corner.


    ![images](images/U1413.jpg)


    #### Connecting to Google Docs and other Servers with GoodReader


    You can also connect to `Google Docs` and other servers with `GoodReader`. Follow
    these steps to do so:


    1. In the `Web Downloads` tab, choose `Connect to Servers`.

    2. Select `Google Docs`. (You can select a number of different servers: mail servers,
    MobileMe iDisk, Public iDisk, Dropbox, box.net, FilesAnywhere.com, MyDisk.se,
    WebDAV Server, and FTP Servers.)

    3. Enter your `Google Docs` username and password to log in.

    4. Once you''ve made the connection, a new `Google Docs Server` icon will appear
    under the `Connect to Server` tab on the right side of the page.

    5. Tap the new `Google` tab to connect to the server (an Internet connection is
    required).

    6. Now you''ll see a list of all the documents you have stored on `Google Docs`.
    Tap any document and select the file type to download it. Usually, PDF works well
    for this. (Google docs can do a `Save As…`, and PDF files are easier to work with.)


    Once the file is downloaded, it will appear on the left side of `GoodReader`;
    you can simply touch it to open it.


