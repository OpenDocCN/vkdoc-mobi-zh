- fmt: '# About the Authors


    ![image](images/martin_trautschold.jpg) **Martin Trautschold** is the founder
    and CEO of Made Simple Learning, a leading provider of Apple iPad, iPhone, iPod
    touch, and BlackBerry books and video tutorials. He has been a successful entrepreneur
    in the mobile device training and software business since 2001. His newest venture,
    1 800 Notify, offers automated appointment reminder services to physicians and
    is being very well received. With Made Simple Learning, he has helped to train
    thousands of iPhone, iPad, and BlackBerry smartphone users with short, to-the-point
    video tutorials. Martin has now co-authored seventeen “Made Simple” guide books.
    Prior to this, Martin spent 15 years in technology and business consulting in
    the US and Japan. He holds an engineering degree from Princeton University and
    an MBA from the Kellogg School at Northwestern University. Martin and his wife,
    Julia, have three daughters: Sophie, Olivia, and Cece. He enjoys rowing and cycling.
    Martin can be reached at `martin@madesimplelearning.com`.


    ![image](images/rene_ritchie.jpg) **Rene Ritchie** is editor-in-chief of TiPb.com,
    one of the largest and most influential iPhone, iPod touch, and iPad web sites
    in the world. Part of the Mobile Nations network, TiPb provides daily news, how-tos,
    and app and accessory reviews to help you get the most out of your iOS devices.
    Rene is also co-host over several Mobile Nations shows, including iPhone Live,
    iPad Live, Iterate for mobile design and development, ZENandTECH to help center
    your inner geek, and Superfunctional to keep you healthy and moving. Prior to
    this, Rene worked in product marketing, design, and web development. He can be
    reached on Twitter @reneritchie or by email at `rene@mobilenations.com`.


    ![image](images/gary_mazo.jpg) **Gary Mazo** is Vice President of Made Simple
    Learning. He is also a writer, college professor, gadget nut, and ordained rabbi.
    Gary joined Made Simple Learning in 2007 and has co-authored the last thirteen
    books in the Made Simple series. Along with Martin and Kevin Michaluk from CrackBerry.com,
    Gary co-wrote *CrackBerry: True Tales of BlackBerry Use and Abuse*—a book about
    BlackBerry addiction and how to get a grip on one''s BlackBerry use. The second
    edition of this book will be published by Apress this fall. Gary also teaches
    writing, philosophy, technical writing, and more at the University of Phoenix.
    Gary has been a regular contributor to CrackBerry.com, writing product reviews
    and adding editorial content. He holds a BA in anthropology from Brandeis University.
    Gary earned his M.A.H.L (Masters in Hebrew Letters), as well as ordination as
    Rabbi, from the Hebrew Union College-Jewish Institute of Religion in Cincinnati,
    Ohio. He has served congregations in Dayton, Ohio; Cherry Hill, New Jersey; and
    Cape Cod, Massachusetts. Gary is married to Gloria Schwartz Mazo, and they have
    six children. Gary can be reached at `gary@madesimplelearning.com`.


    # About the Technical Reviewer


    ![image](images/leanna_lofte.jpg) **Leanna Lofte** is the App Editor for the iPhone,
    iPad, and iPod touch blog, TiPb, whom she has been for writing since 2009. She
    is responsible for TiPb''s app content, including news, updates, giveaways, and
    reviews. Leanna also has a master''s degree in Mathematics from the University
    of Denver and teaches college-level mathematics.


    # Part I


    ## Quick Start Guide


    In your hands is one of the most exciting devices to hit the market in quite some
    time: the iPhone 4S. This Quick Start Guide will help get you and your new iPhone
    4S up and running in a hurry. You''ll learn all about the buttons, switches, and
    ports, and how to use the responsive touch screen, multitask and be introduced
    to Siri, the amazing voice-activated personal assistant. Our App Reference Tables
    introduce you to the apps on your iPhone—and serves as a quick way to find out
    how to accomplish a task.


    ## Getting Around Quickly


    This Quick Start Guide is meant to be just that—a tool that can help you jump
    right in and find information in this book, as well as learn the basics of how
    to get around and enjoy your iPhone right away.


    We''ll start with the nuts and bolts in our “Learning Your Way Around” section,
    which covers what all the keys, buttons, switches, and symbols mean and do on
    your iPhone. In this section, you''ll see some handy features such as multitasking
    by double-clicking the `Home` button. We will also introduce you to Siri, the
    amazing new personal assistant function on your iPhone. You''ll also learn how
    to interact with the menus, submenus, and set switches—tasks that are required
    in almost every application on your iPhone. You''ll also find out how to read
    your connectivity status and what to do when you travel on an airplane.


    **TIP:** Check out [Chapter 2](#Chapter02.html#ch2): “Typing, Copy, and Search”
    for great typing tips and more.


    In the “Touch Screen Basics” section, we will help you learn how to touch, swipe,
    flick, zoom, and more.


    Later, in the “App Reference Tables,” section, we''ve organized the app icons
    into general categories, so you can quickly browse through the icons and jump
    to a section in the book to learn more about the app a particular icon represents.
    This guide also includes several handy tables designed to help you get up and
    running with your iPhone quickly:


    *   Getting Started ([Table 2](#Part1.html#pt_1_2))

    *   Stay Organized ([Table 3](#Part1.html#pt_1_3))

    *   Be Entertained ([Table 4](#Part1.html#pt_1_4))

    *   Stay Informed ([Table 5](#Part1.html#pt_1_5))

    *   Network Socially ([Table 6](#Part1.html#pt_1_6))

    *   Be Productive ([Table 7](#Part1.html#pt_1_7))


    Let''s get started!


    ### Learning Your Way Around


    To help you get comfortable with your iPhone, we will start with the basics—what
    the buttons, keys, and switches do—and then move onto how you start apps and navigate
    the menus. Probably the most important status indicator on your iPhone, besides
    the battery, is the one that shows network status in the upper-left corner. Understanding
    what these status icons do is crucial to getting the most out of your iPhone.


    #### Keys, Buttons, and Switches


    [Figure 1](#Part1.html#p_1_1) shows all the things you can do with the buttons,
    keys, switches, and ports on your iPhone. Go ahead and try out a few things to
    see what happens. Swipe left to search, swipe right to see more icons, try double-clicking
    the `Home` button to bring up the multitasking `App Switcher` bar, and then press
    and hold the `Power/Sleep` key to power your phone on or off. Have some fun getting
    acquainted with your device.


    ![images](images/p4-01.jpg)


    **Figure 1.** *The iPhone''s buttons, ports, switches, and keys*


    #### Switching Apps (AKA Multitasking)


    One of the great new features introduced with the iPhone 4 is the ability to multitask
    or jump between applications (see [Figure 2](#Part1.html#p_1_2)).


    Double-click the `Home` button to bring up the `App Switcher` bar in the bottom
    of the screen. Next, swipe right to see more icons and tap any icon of any app
    you want to start. If you don''t see the icon you want, then single-click the
    `Home` button to see the entire `Home` screen. Repeat these steps to jump back
    to the app you just left. The nice thing is that the app you just jumped from
    is always shown as the first app on the `App Switcher` bar.


    ![images](images/p5-01.jpg)


    **Figure 2.** *Multitask (switch apps) by double-clicking the `Home` button.*'
