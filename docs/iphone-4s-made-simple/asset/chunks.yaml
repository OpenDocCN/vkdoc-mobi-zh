  trans: "\n# 同步电子邮件账户\n\n向下滚动页面以同步电子邮件账户设置。\n\n**注意：** 将电子邮件账户设置同步到 iPhone 后，你仍需在\
    \ `设置` ![images](img/U0311a.jpg) `邮件、通讯录、日历` 中为每个电子邮件账户输入密码。每个账户只需在 iPhone 上执行此操作一次。\n\
    \n请按照以下步骤操作：\n\n1.  在 `iTunes` 的同一 `摘要` 选项卡上，向下滚动至 `日历` 设置下方，即可看到 `邮件` 账户设置。\n\
    2.  勾选 `同步邮件账户来自` 旁边的复选框，并调整下拉菜单，选择存储你电子邮件的软件或服务（请参阅 图 3–6）。在 Windows 电脑上，这可能是指\
    \ `Outlook`；在 Mac 上，则可能是 `Entourage` 或 `邮件`。\n\n    ![images](img/0306.jpg)\n\n\
    \    **图 3–6.** *设置要同步的电子邮件账户*\n\n3.  向下滚动页面，继续设置书签、备忘录等。\n4.  如果你不想再同步其他内容，请点击\
    \ `iTunes` 屏幕右下角的 `应用` 按钮以开始同步。\n\n# 同步书签和备忘录\n\niTunes 同步的一个出色功能是，你可以将电脑上的浏览器书签同步到\
    \ iPhone。这样，你可以立即在 iPhone 上浏览所有你喜爱的网站。你还可以将电脑上的备忘录同步到 iPhone，并使用 `iTunes` 在两处保持更新。\n\
    \n**注意：** 在撰写本文时，`iTunes` 仅支持两种浏览器进行同步：`Microsoft Internet Explorer` 和 `Apple\
    \ Safari`。如果你使用 `Mozilla Firefox` 或 `Google Chrome`，你仍然可以同步书签，但需要安装免费的书签同步软件（例如来自\
    \ [`www.xmarks.com`](http://www.xmarks.com) 的 `xmarks`），以便将书签从 `Firefox` 或 `Chrome`\
    \ 同步到 `Safari` 或 `Explorer`。安装此软件后，你就可以通过简单的两步过程同步浏览器书签。对于 `Firefox` 用户来说，`Firefox`\
    \ 的 `Home` 应用是同步书签的一个不错选择（访问 [`http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8`](http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8)\
    \ `了解更多信息`）。\n\n# 将 iPhone 与 iTunes 同步\n\n当你将 iPhone 连接到电脑的 USB 端口时，同步过程通常是自动进行的。唯一的例外是，如果你已禁用了自动同步功能。\n\
    \n## 在 iTunes 中同步应用\n\n请按照以下步骤通过 `iTunes` 应用同步和管理应用：\n\n1.  如同之前设置同步一样，将 iPhone\
    \ 连接到电脑，启动 `iTunes`，然后在左侧导航栏中点击你的 iPhone。\n2.  点击主窗口顶部的 `应用` 选项卡。\n3.  勾选 `同步应用`\
    \ 旁边的复选框，即可查看存储在 iPhone 上的所有应用以及你的 `主屏幕`，如图 3–7 所示。\n\n![images](img/0307.jpg)\n\
    \n**图 3–7.** *`iTunes` 中的 `同步应用` 屏幕*\n\n## 移动应用、使用文件夹或删除应用图标\n\n在 `iTunes` 的 `同步应用`\
    \ 屏幕中（再次参见 图 3–7），移动和整理你的应用图标非常容易。尝试以下操作以完成各种任务：\n\n*   **在屏幕内移动应用：** 点击它并在屏幕内拖动。如果你想一次选择多个应用，可以按住\
    \ `Ctrl` 键（Windows）或 `Command` 键（Mac）并点击选择。\n*   **在主屏幕页面间移动应用：** 点击并将其拖动到右侧列中的新页面。该新页面将在主屏幕中展开，将图标拖放到主屏幕即可。\n\
    *   **将应用固定到底部 Dock：** 点击并将其向下拖放到底部 Dock 上。如果底部 Dock 上已有四个图标，你需要先拖出一个图标为新图标腾出空间。Dock\
    \ 上最多只允许放置四个图标。\n*   **创建新文件夹：** 将一个图标拖放到另一个图标上。\n*   **将应用移入现有文件夹：** 将图标拖放到 `文件夹`\
    \ 图标上。\n*   **将应用移出文件夹：** 点击文件夹将其打开，然后将图标拖放到该文件夹之外。\n*   **查看另一个主屏幕页面：** 点击右侧列中的该页面。\n\
    *   **删除应用：** 点击它，然后点击左上角的 `x` 符号。你只能删除自己安装的应用。在预装应用（如 `iTunes`）上，你不会看到 `x` 符号。\n\
    *   **删除文件夹：** 从该文件夹中移除所有应用（将其拖出），文件夹将会消失。\n\n## 移除或重新安装应用\n\n要从你的 iPhone 上移除应用，只需取消勾选它旁边的复选框并确认你的选择。\n\
    \n**提示：** 即使你从 iPhone 上删除了某个应用，只要你已选择同步应用，可以通过重新勾选它旁边的复选框来重新安装该应用。该应用将在下一次同步时重新加载到你的\
    \ iPhone 上。\n\n# 同步媒体及其他内容\n\n现在，让我们看看如何设置音乐、影片、iBooks、iTunes U 内容等的自动同步。\n\n\
    **注意：** 请确保你在笔记本电脑上和 iPhone 上登录的是同一个 iTunes 账户，以便处理受数字版权管理 (DRM) 保护的内容（例如音乐、视频等）。如果两个账户不匹配，你的内容将无法同步。如有必要，你可以在桌面电脑和\
    \ iPhone 上注销并重新登录 iTunes 服务，以确保登录正确的账户。\n\n## 同步铃声\n\n当你点击 `铃声` 选项卡时，你可以选择同步整个铃声库或特定项目：\n\
    \n1.  将 iPhone 连接到电脑，启动 `iTunes`，然后在左侧导航栏中点击你的 iPhone。\n2.  点击主窗口顶部的 `铃声` 选项卡。\n\
    3.  勾选 `同步铃声` 旁边的复选框，如右图所示。\n4.  默认设置是同步 `所有铃声`。若要仅同步特定铃声，请点击 `所选铃声` 旁边的单选按钮。\n\
    5.  完成选择后，点击 `应用` 按钮开始铃声同步。\n\n![images](img/U0312.jpg)\n\n**提示：** 了解如何在第 9 章：“使用电话”中为联系人分配铃声、购买自定义铃声以及从你的音乐中创建自己的铃声。\n\
    \n## 同步音乐\n\n当你点击 `音乐` 选项卡时，你可以选择同步整个音乐资料库或特定项目。\n\n**注意：** 如果你已经手动将一些音乐、音乐视频或语音备忘录传输到\
    \ iPhone，你会收到一条警告信息，提示 iPhone 上的所有现有内容将被移除，并替换为你从电脑中选择的音乐资料库。\n\n要将音乐从电脑同步到 iPhone，请按照以下步骤操作：\n\
    \n1.  将 iPhone 连接到电脑，启动 `iTunes`，然后在左侧导航栏中点击你的 `iPhone`。\n2.  点击主窗口顶部的 `音乐` 选项卡。\n\
    3.  勾选 `同步音乐` 旁边的复选框。\n4.  只有当你确信你的音乐资料库不会太大以至于 iPhone 无法容纳时，才点击 `整个音乐资料库` 旁边的按钮。\n\
    5.  如果你不确定音乐资料库是否过大，或者只想同步特定的播放列表或表演者，请点击 `所选播放列表、表演者和流派` 旁边的按钮：\n    1.  你可以通过勾选相应的复选框来选择是否包含音乐视频和语音备忘录。\n\
    \    2.  你还可以选择自动用歌曲填满剩余空间。\n\n        **注意：** 我们不建议勾选此选项，因为它会占满 iPhone 的所有空间，导致没有空间安装那些酷炫的应用！\n\
    \n    3.  现在，勾选屏幕底部两列中的任何播放列表或表演者。你甚至可以使用 `表演者` 列顶部的 `搜索` 框来搜索特定的表演者。\n6.  完成选择后，点击\
    \ `应用` 按钮开始音乐同步。\n"
- fmt: "# Syncing Movies\n\nWhen you click the `Movies` tab, you can choose to sync\
    \ specific, recent, or unwatched movies—or all of them.\n\nTo sync movies from\
    \ your computer to your iPhone, follow these steps:\n\n1. Connect your iPhone\
    \ to your computer, start `iTunes`, and click your iPhone in the left nav bar.\n\
    2. Click the `Movies` tab on the top of the main window.\n3. Check the box next\
    \ to `Sync Movies` (see [Figure 3–8](#Chapter03.html#fig_3_8)).\n4. If you’d like\
    \ to sync recent or unwatched movies, check the box next to `Automatically include`\
    \ and use the pull-down menu to select `All`, `1 most recent`, `All unwatched`,\
    \ `5 most recent unwatched`, and so on.\n\n   ![images](images/0308.jpg)\n\n \
    \  **Figure 3–8.** *Configuring the `Movies` tab to automatically sync selections*\n\
    \n5. If you selected any item besides `All`, you have the choice to sync specific\
    \ movies or videos to your iPhone. Simply check the boxes next to the movies you\
    \ want to include in the sync.\n6. When you are done choosing movies, click the\
    \ `Apply` button to save your settings and start the sync.\n\n# Syncing TV Shows\n\
    \nWhen you click the `TV Shows` tab, you can choose to sync specific, recent,\
    \ or unwatched TV shows—or all of them.\n\nTo sync TV shows from your computer\
    \ to your iPhone, follow these steps:\n\n1. Connect your iPhone to your computer,\
    \ start `iTunes`, and click your iPhone in the left nav bar.\n2. Click the `TV\
    \ Shows` tab on the top of the main window.\n3. Check the box next to `Sync TV\
    \ Shows`.\n4. If you’d like to sync recent or unwatched TV shows, check the box\
    \ next to `Automatically include` and use the pull-down menu to select `All`,\
    \ `1 newest`, `All unwatched`, `5 oldest unwatched, 10 newest unwatched`, and\
    \ so on.\n5. Choose `All Shows` or `Selected Shows` next to `episodes of`.\n6.\
    \ If you choose `Selected Shows`, you can choose individual shows and even individual\
    \ episodes in the two sections in the middle of the screen.\n7. If you have playlists\
    \ of TV shows, you can select those for inclusion by checking the boxes in the\
    \ bottom section of the screen.\n8. When you are done choosing individual TV shows,\
    \ click the `Apply` button to save your settings and start the sync.\n\n# Syncing\
    \ Podcasts\n\nWhen you click the `Podcasts` tab, you can choose to sync specific,\
    \ recent, or unplayed podcasts—or all of them.\n\n**TIP:** Podcasts are audio\
    \ or video shows that are usually regularly scheduled (e.g., daily, weekly, or\
    \ monthly). Most are free to subscribe to in the iTunes Store. When you subscribe\
    \ and set up the auto sync as shown in this section, you’ll receive all your favorite\
    \ podcasts on your iPhone.\n\nMany of your favorite radio shows are recorded and\
    \ broadcast as podcasts. We encourage you to check out the `Podcast` section of\
    \ the iTunes Store to see what might interest you. You’ll find podcasts of movie\
    \ reviews, news shows, law school test reviews, game shows, old radio shows, educational\
    \ content, and much more.\n\nTo sync podcasts from your computer to your iPhone,\
    \ follow these steps:\n\n1. Connect your iPhone to your computer, start `iTunes`,\
    \ and click your `iPhone` in the left nav bar.\n2. Click the `Podcasts` tab on\
    \ the top of the main window.\n3. Check the box next to `Sync Podcasts`.\n4. If\
    \ you’d like to sync recent or unplayed podcasts, check the box next to `Automatically\
    \ include` and use the pull-down menu to select `All`, `1 newest`, `All unplayed`,\
    \ `5 newest, 10 most recent unplayed`, and so on.\n5. Choose `All Podcasts` or\
    \ `Selected Podcasts` next to `episodes of`.\n6. If you choose `Selected Podcasts`,\
    \ you can choose individual podcasts and even individual episodes in the two sections\
    \ in the middle of the screen.\n7. If you have playlists of podcasts, you can\
    \ select those for inclusion by checking the boxes in the bottom section of the\
    \ screen.\n8. When you are done choosing podcasts, click the `Apply` button to\
    \ save your settings and start the sync.\n\n**TIP:** After you sync these podcasts,\
    \ you can enjoy them by navigating to the `Podcasts` section of the `Music` app\
    \ on your device.\n\n# Syncing iBooks and Audiobooks\n\nWhen you click the `Books`\
    \ tab, you can choose to sync all or selected books and audiobooks.\n\n**TIP:**\
    \ Books on the iPhone are electronic versions of their paper cousins. They are\
    \ in a specific electronic format called `ePub`. You can buy them in the iBookstore\
    \ on the iPhone or acquire them from other locations and sync them to your iPhone\
    \ using the steps described here. Books you acquire elsewhere must be unprotected\
    \ or “DRM-free” in order to sync them to your iPhone. You read these books in\
    \ the `iBooks` app or in other book reader apps on your iPhone. See [Chapter 13](#Chapter13.html#ch13):\
    \ “iBooks and E-Books” to learn more.\n\nTo sync books or audiobooks between your\
    \ computer and your iPhone, follow these steps:\n\n1. Connect your iPhone to your\
    \ computer, start `iTunes`, and click your `iPhone` in the left nav bar.\n2. Click\
    \ the `Books` tab on the top of the main window.\n3. Check the boxes next to `Sync\
    \ Books` and `Sync Audiobooks`.\n4. If you’d like to sync all books, leave the\
    \ default `All books` selection unchanged.\n5. Otherwise, choose `Selected books`\
    \ and make your choices by checking specific books in the window.\n\n   **TIP:**\
    \ In order to sync iBooks, PDF files, and other, similar documents to your iPhone,\
    \ you need to first drag and drop your file from your computer into your iTunes\
    \ library. Grab the file from any folder on your computer and drag and drop it\
    \ right onto your library in the upper-left column in `iTunes`.\n\n6. If you would\
    \ like to sync all audiobooks, leave the default `All audiobooks` selection unchanged.\n\
    7. Otherwise, choose `Selected audiobooks` and make your choices by checking off\
    \ specific audiobooks in the window below this selection item.\n8. When you are\
    \ done choosing individual books and audiobooks, click the `Apply` button to save\
    \ your settings and start the sync.\n\n**TIP:** After you sync these books, you\
    \ can enjoy them in the `iBooks` app on your device. You can listen to audiobooks\
    \ in the `Music` app, where the `Audiobooks` tab is on the left side.\n\n**NOTE:**\
    \ Audiobooks from Audible require that you first authorize your computer with\
    \ your Audible account before you can sync them to your iPhone from your computer."
