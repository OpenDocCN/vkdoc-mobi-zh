    \ this feature to **OFF** if you would rather not see them or to **ON** if you\
    \ want them displayed.\n*   **Sounds**: This option lets you turn audio (and vibration)\
    \ alerts for incoming notifications on or off. If a notification is urgent, like\
    \ SMS, you might want to keep sounds toggled **ON**.\n*   **Show Preview**: This\
    \ option adds the first few lines of a message associated with a notification,\
    \ so you can get the gist of it at a glance. This feature enables you to see a\
    \ notification’s contents without sliding to tap through to the app, so you can\
    \ read the whole thing. If privacy is more of a concern, you might want to toggle\
    \ this feature to **OFF**.\n*   **View in Lock Screen**: This option allows you\
    \ to turn notifications on or off from the **Lock** screen. Again, if privacy\
    \ is an issue, you might want to toggle this feature to **OFF**.\n\n**NOTE:**\
    \ Not all apps have the same options in Notification Center. For example, some\
    \ may offer sound alerts, while others do not.\n\nWhen you turn off notifications\
    \ for a specific app, it gets put in a separate list under **Settings** called\
    \ *Not in Notification Center*. This lets you easily see which apps are—and aren’t—sending\
    \ you notifications.\n\n#### Accessibility Options For Notification Center\n\n\
    Apple provides various Accessibility options for people with special visual or\
    \ hearing needs, including Custom Vibrations and LED Flash for Alerts.\n\nFollow\
    \ these steps to enable Accessibility options for Notifications:\n\n1.  Tap the\
    \ **Settings** icon.\n2.  Tap **General**.\n3.  Tap **Accessibility** near the\
    \ bottom of the page.\n4.  Toggle **Custom Vibrations** to **ON** to assign unique\
    \ vibration patterns to your Contacts (patterns can be created in the **Sound\
    \ Preferences**).\n5.  Toggle **LED Flash for Alerts** to **ON** to make the camera\
    \ flash go off when a notification comes in.\n\n![images](images/U0128.jpg)\n\n\
    ## Chapter  2\n\n## Typing, Copy, and Search\n\nIn this chapter, we will show\
    \ you some good ways to type on your iPhone and save valuable time when doing\
    \ so. Along the way, we’ll show you how to use the **Portrait** (vertical/smaller)\
    \ and **Landscape** (horizontal/larger) keyboards. We will also teach you how\
    \ to select different language keyboards, how to type symbols, and other tips.\n\
    \nLater in this chapter, we will tell you about the Spotlight search and the Copy\
    \ and Paste function. The Copy and Paste function will save you lots of time,\
    \ as well as increase your accuracy when working with your iPhone.\n\n### Typing\
    \ on Your iPhone\n\nYou will quickly find two on-screen keyboards on your iPhone:\
    \ the smaller **Portrait** keyboard that’s visible when you hold your iPhone in\
    \ a vertical orientation and the larger **Landscape** keyboard that’s visible\
    \ when you hold the iPhone in a horizontal orientation. The nice thing is that\
    \ you can choose whichever keyboard works best for you.\n\n#### Typing on the\
    \ Screen with Two Thumbs\n\nYou will find when you first start out with your iPhone\
    \ that you can most easily type with one finger—usually your index finger—while\
    \ holding the iPhone with the other hand.\n\n![images](images/U0201.jpg)\n\nAfter\
    \ a little while, you should be able to experiment with thumb typing (as you see\
    \ so many people doing with other phones, such as the BlackBerry smartphones).\
    \ Once you practice a little, typing with two thumbs instead of a single finger\
    \ will really boost your speed. Just be patient: it does take practice to become\
    \ proficient typing quickly with your two thumbs.\n\nYou will actually notice\
    \ after a while that the keyboard touch sensitivity assumes you are typing with\
    \ two thumbs. What this means is that the letters on the left side of your keyboard\
    \ are meant to be pressed on their left side, and the keys on the right are meant\
    \ to be pressed on their right side.\n\nSimply turning the iPhone sideways in\
    \ many apps will cause the keyboard to change to the larger **Landscape** keyboard,\
    \ which makes it easier to type.\n\n![images](images/U0202.jpg)\n\n**TIP:** If\
    \ you have larger hands and find typing on the smaller, vertical keyboard challenging,\
    \ then flip your iPhone on its side to get the larger, **Landscape** keyboard.\n\
    \n#### Type Quick Phrases with Shortcuts\n\nOne nice feature on your iPhone is\
    \ the ability to set up shortcuts for typing common phrases or even a few sentences\
    \ like directions to your home or office.\n\n**TIP:** Use Shortcuts to save time\
    \ when typing common phrases on your iPhone. You can even use Shortcuts to type\
    \ a few sentences like steps to get to your home or something you type frequently.\n\
    \nAccess shortcuts in the Settings app. Tap the Settings icon, then General, then\
    \ Keyboard and swipe to the bottom of the screen to see available Shortcuts.\n\
    \nApple has supplied you with an example shortcut for “omw.” When you type omw\
    \ on your iPhone, you will see that the pop-up shows the phrase “On my way!”\n\
    \n![images](images/U0203.jpg)\n\nTap Add New Shortcut to create a new one.\n\n\
    ![images](images/U0204.jpg)\n\n![images](images/U0205.jpg)\n\nType the **Phrase**\
    \ which will replace the shortcut, then type the **Shortcut** itself. In this\
    \ example, we want a shortcut to type directions to our home. So our **Shortcut**\
    \ is “dirh” and the Phrase is step by step directions to get to our house. Save\
    \ your new shortcut and give it a try."
  trans: "\n### 配置通知中心\n\n通知中心可通过 `设置` 应用轻松配置：\n\n1.  在主屏幕上点击 `设置` 应用图标。\n2.  点击 `通知`。\n\
    \n通知中心可以**按时间**排序通知（小组件在上，然后按最新通知的顺序排列），也可以**手动**排序。请按照以下步骤手动重新整理通知：\n\n1.  在\
    \ **排序应用** 下，点击 `手动`。\n2.  在屏幕右上角，点击 `编辑` 按钮。\n3.  每个应用的右侧会出现三个灰色横条形式的手柄。抓住手柄，将应用向上或向下拖动，按您最喜欢的顺序排列。\n\
    4.  当您将所有应用按所需顺序排好后，点击屏幕右上角的蓝色 `完成` 按钮。\n\n![images](img/U0126.jpg)\n\n要显示或隐藏\
    \ `天气` 或 `股票` 小组件，根据需要点击相应小组件将其切换为 `开` 或 `关`。\n\n要选择通知列表的工作方式，请按照以下步骤操作：\n\n1.\
    \  点击您想要编辑的应用（例如 `邮件`）。\n2.  将 `通知中心` 开关切换为 `关`，将该应用从通知中心完全移除。将其切换为 `开` 即可恢复。\n\
    3.  选择在列表中`显示`您偏好的通知数量。在撰写本文时，可供选择的选项限于 **1 个未读项目**、**5 个未读项目** 和 **10 个未读项目**。\n\
    4.  选择您偏好的应用内通知的`提醒样式`。\n    -   `无` 表示您永远不会看到提醒。\n    -   `横幅` 表示您会在屏幕顶部看到微妙的动画通知，不会打断您。如果您愿意，此选项可让您忽略该通知，这对于大多数通信通知（如电子邮件、短信、Facebook\
    \ 等）非常有用。\n    -   `提醒` 表示您会看到一个无法忽略的弹出框。您要么必须手动关闭它，要么立即对其采取行动。这对于闹钟、约会和其他紧急事项非常有用。\n\
    \n![images](img/U0127.jpg)\n\n您还可以设置与通知相关的其他几个选项：\n\n-   `标记应用图标`：此选项会在主屏幕图标的右上角添加一个红色小圆圈。这个红色圆圈表示每个应用包含的未读通知数量。例如，`邮件`图标上的数字\
    \ 10 表示您有 10 封未读邮件在等待您。如果您希望不看到它们，可以将此功能切换为`关`；如果您希望显示它们，则切换为`开`。\n-   `声音`：此选项允许您打开或关闭传入通知的音频（和振动）提醒。如果通知很紧急，比如短信，您可能希望将声音保持为`开`。\n\
    -   `显示预览`：此选项会添加与通知相关的消息的前几行，以便您一目了然地了解其大意。此功能使您无需滑动并点击进入应用即可查看通知内容，从而阅读整条信息。如果更注重隐私，您可能希望将此功能切换为`关`。\n\
    -   `在锁定屏幕中显示`：此选项允许您在`锁定`屏幕上打开或关闭通知。同样，如果涉及隐私问题，您可能希望将此功能切换为`关`。\n\n**注意：** 并非所有应用在通知中心都有相同的选项。例如，有些应用可能提供声音提醒，而其他应用则没有。\n\
    \n当您关闭某个特定应用的通知时，它会被放到`设置`中的*不包含在通知中心内*独立列表里。这可以让您轻松查看哪些应用正在向您发送通知，哪些没有。\n\n###\
    \ 通知中心的辅助功能选项\n\nApple 为有特殊视觉或听力需求的人士提供了各种辅助功能选项，包括自定振动和 LED 闪烁以示提醒。\n\n按照以下步骤启用通知的辅助功能选项：\n\
    \n1.  点击 `设置` 图标。\n2.  点击 `通用`。\n3.  点击页面底部的 `辅助功能`。\n4.  将 `自定振动` 切换为 `开`，可为您的联系人分配独特的振动模式（可在`声音偏好设置`中创建模式）。\n\
    5.  将 `LED 闪烁以示提醒` 切换为 `开`，以便在有通知进来时让相机闪光灯闪烁。\n\n![images](img/U0128.jpg)\n\n\
    ## 第 2 章\n\n## 键入、拷贝和搜索\n\n在本章中，我们将向您展示一些在 iPhone 上键入的好方法，并在此过程中节省宝贵的时间。同时，我们还将向您展示如何使用`竖屏`（垂直/较小）和`横屏`（水平/较大）键盘。我们还会教您如何选择不同的语言键盘、如何键入符号以及其他技巧。\n\
    \n在本章后面，我们将介绍 Spotlight 搜索以及拷贝和粘贴功能。拷贝和粘贴功能将为您节省大量时间，并在您使用 iPhone 时提高准确性。\n\n\
    ### 在 iPhone 上键入\n\n您很快就会在 iPhone 上找到两个屏幕键盘：当您垂直握住 iPhone 时可见的较小`竖屏`键盘，以及当您水平握住\
    \ iPhone 时可见的较大`横屏`键盘。好在您可以选择最适合您的键盘。\n\n#### 用两个拇指在屏幕上键入\n\n您会发现，刚开始使用 iPhone\
    \ 时，最容易的方式是用一根手指（通常是指食指）键入，同时用另一只手握住 iPhone。\n\n![images](img/U0201.jpg)\n\n过一段时间后，您应该能够尝试用拇指键入（就像您看到许多人在使用其他手机时那样，例如\
    \ BlackBerry 智能手机）。一旦稍加练习，用两个拇指代替一个手指键入将大大提高您的速度。请耐心点：要熟练地用两个拇指快速键入确实需要练习。\n\n\
    实际上，过一段时间后您会注意到，键盘的触摸灵敏度会假定您正在用两个拇指键入。这意味着键盘左侧的字母应在其左侧按下，而右侧的键应在其右侧按下。\n\n在许多应用中，只需将\
    \ iPhone 横过来，键盘就会切换成更大的`横屏`键盘，使键入更容易。\n\n![images](img/U0202.jpg)\n\n**提示：** 如果您手比较大，觉得在较小的竖屏键盘上键入有挑战性，那么请将\
    \ iPhone 侧放，即可获得更大的`横屏`键盘。\n\n#### 使用快捷短语键入常用短语\n\niPhone 上一个不错的功能是能够为键入常用短语甚至是一些句子（例如去往您家或公司的路线）设置快捷输入。\n\
    \n**提示：** 在 iPhone 上键入常用短语时，使用快捷输入来节省时间。您甚至可以使用快捷输入来键入一些句子，例如如何到达您家，或者您经常键入的内容。\n\
    \n在`设置`应用中访问快捷短语。点击 `设置` 图标，然后点击 `通用`，再点击 `键盘`，然后向下滑动到屏幕底部以查看可用的快捷短语。\n\nApple\
    \ 为您提供了一个 `omw` 的示例快捷短语。当您在 iPhone 上键入 `omw` 时，您会看到弹出窗口显示短语“在路上！”。\n\n![images](img/U0203.jpg)\n\
    \n点击 `添加新的快捷短语` 以创建一个新的。\n\n![images](img/U0204.jpg)\n\n![images](img/U0205.jpg)\n\
    \n键入将要替换快捷短语的`短语`，然后键入`快捷短语`本身。在这个例子中，我们想要一个快捷短语来键入去往我们家的路线。所以我们设的`快捷短语`是 `dirh`，`短语`是一步一步到达我们家的路线。保存您的新快捷短语并试一下。\n"
- fmt: '# Saving Time with Auto-Correction


    After you have been typing for a while, you will begin to notice a little pop-up
    window directly below some of the words you are typing—this feature is called
    *Auto-Correction*. Any `Shortcuts` that you have defined will also appear as the
    pop-up suggestion.


    **NOTE**: If you never see the `Auto-Correction` pop-up window, then you will
    have to enable the Auto-Correction feature by going into your `Settings` app ![images](images/U001.jpg)
    `General` ![images](images/U001.jpg) `Keyboard`, and then setting `Auto-Correction`
    to `ON`.


    ![images](images/U0206.jpg)


    You can save yourself time when you see the correct word guessed by just pressing
    the `Space` key at the bottom of the keyboard; doing so will select that word.


    In the next example, we start typing the word “especially”; and when we get to
    the “c” in the word, the correct word appears below in a pop-up window. To select
    it, we simply press the `Space` key at the bottom (see [Figure 2–1](#Chapter02.html#fig_2_1)).


    ![images](images/0201.jpg)


    **Figure 2–1.** *Using Auto-Correction and suggested words*


    Your first inclination might be to tap the pop-up word, but that simply erases
    the suggested word from the screen. It is ultimately faster to keep typing or
    press the `Space` key when you see the correct word pop up. In most situations,
    the word will either be correct or will become correct as you keep typing—and
    this means less finger travel in the long run.


    **TIP:** The Auto-Correction feature also looks through your `Contacts` list to
    make suggestions. For example, if Martin Trautschold were in your `Contacts` list,
    you would see “Trautschold” come up as an Auto-Correction suggestion after typing
    “Trauts.”


    After you learn to use the `Space` key, you will see that this pop-up guessing
    can be quite a time saver. After all, you were going to have to type a space at
    the end of the word, anyway.


    Sometimes you accidentally accept an incorrect Auto-Correction word; in this case,
    you simply need to press the `Backspace` key. ![images](images/U0207.jpg) Doing
    so will make a pop-up window appear that contains the original word before the
    Auto-Correction feature changed it. You will also see other suggested replacements
    (see [Figure 2–2](#Chapter02.html#fig_2_2)).


    ![images](images/0202.jpg)


    **Figure 2–2.** *Dealing with Auto-Correction words that are not correct*


    **TIP:** With Auto-Correction, you can save time by avoiding typing the apostrophe
    in many common contractions, such as “wont” and “cant.” Auto-Correction will show
    you a little pop-up window with the contraction spelled correctly; all you need
    to do to select the highlighted correction is press the `Space` key.


    ![images](images/U0208.jpg)


    With some words, you have to add an extra character for the Auto-Correction feature
    to figure out what you mean:


    *   Type “Weree” to get “We’re.”

    *   Type “Welll” to get “We’ll.”


    ## Hearing Auto-Correction Words Out Loud


    You can set your iPhone to speak the Auto-text and Auto-Correction words as they
    appear. This might help you to select the correct word. Follow these steps to
    enable this type of speaking:


    1.  Tap the `Settings` icon.

    2.  Tap `General`.

    3.  Tap `Accessibility` near the bottom of the page (you need to swipe down).

    4.  Set the switch next to `Speak Auto-text` to `ON`.


    After you enable this feature, you will hear the Auto-Correction word that pops
    up spoken aloud as you are typing. If you agree with the word you hear, press
    the `Space` key to accept it; otherwise, keep typing. This can save you some time
    from looking up from the keyboard.


    # Spell Checker


    Working together with the Auto-Correction feature is your built-in iPhone Spell
    Checker. Most of the time, your misspelled words will be caught and corrected
    automatically by Auto-Correction. Other times, a word will not be corrected, but
    it is still misspelled. You will see any words that the iPhone thinks are misspelled
    underlined with a red dotted line, as shown in [Figure 2–3](#Chapter02.html#fig_2_3).


    ![images](images/0203.jpg)


    **Figure 2–3.** *Using the built-in Spell Checker feature*


    **TIP:** If your Spell Checker has too many incorrect words, then you can give
    it a fresh start by clearing out all the custom words. Follow these steps to do
    so:


    1.  Tap your `Settings` icon.

    2.  Tap `General`.

    3.  Tap `Reset` near the bottom.

    4.  Tap `Reset Keyboard Dictionary`.

    5.  Tap `Reset Dictionary` to confirm.


    Following the preceding steps will clear out all custom words that have been added
    to your iPhone’s dictionary.


    # Accessibility Options


    There are a number of useful features on the iPhone to help with accessibility.
    For example, the VoiceOver option will read various things displayed on the screen
    to you. It will tell you what elements you tap, what buttons are selected, and
    all the options available. It will read entire screens of text, as well. If you
    like to see things larger, you can also turn on the Zoom option, as described
    in the “Using Zoom to Magnify the Entire Screen” section later in this chapter.


    ## Getting Your iPhone to Speak To You (VoiceOver)


    One cool iPhone feature is the VoiceOver option. Turning this on will make your
    phone speak anything displayed on the screen. You can even get it to read to you
    from any e-mail, text document, or even an `iBook` page.


    **TIP:** Use your headphones when the `VoiceOver` option is set to `ON` and you
    are in a public place; this will help you hear what is said more easily, but avoid
    bothering others.


    Follow these steps to enable the VoiceOver feature:


    1.  Tap the `Settings` icon.

    2.  Tap `General`.

    3.  Tap `Accessibility` near the bottom of the page.

    4.  Tap `VoiceOver`.

    5.  Set the `VoiceOver` switch to `ON`.


    **CAUTION:** As shown on the screen to the right, the VoiceOver gestures are different
    from the normal gestures. Tap the `Practice VoiceOver Gestures` button to get
    used to them.


    ![images](images/U0209.jpg)


    Here are some additional tips for using the VoiceOver feature:


    *   Scroll down the `VoiceOver` screen to see more settings.

    *   Adjust whether or not hints are spoken by changing the setting for the `Speak
    Hints` option.

    *   When you type with VoiceOver, by default every character you type will be
    spoken. You can change this by tapping `Typing Feedback`. On the next screen,
    you can set this option to `Characters`, `Words`, `Characters and Words`, or `Nothing`.

    *   Adjust the `Speaking Rate` by sliding the bar beneath this option.

    *   Adjust whether `Phonetics` and `Pitch Change` are used by setting the switches.


    ![images](images/U0210.jpg)


    To have an entire page read to you in the `Notes` or `iBooks` app, you need to
    simultaneously tap the bottom and top of the block of text on the screen. If you
    tap in the text with one finger, only a single line is read to you.


    ## Speak Selection and Speak Auto-text


    The `Speak Selection` feature is similar to `VoiceOver`, but it ties into the
    Copy and Paste feature, adding a `Speak` option to the selected text pop-up menu.
    The Speak Auto-text feature will say out loud any text that is automatically capitalized
    or corrected by the spelling dictionary.


    With the `Speak Selection` feature, you can adjust the Speaking Rate using the
    same type of slider that the VoiceOver feature uses. The `Speak Auto-text` option
    can only be toggled `ON` or `OFF`.


    ![images](images/U0211.jpg)'
