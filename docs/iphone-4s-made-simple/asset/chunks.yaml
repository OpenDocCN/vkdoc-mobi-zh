  trans: "\n# 会议邀请\n\n对于经常使用 Microsoft Exchange、`Microsoft Outlook` 或 iCloud 的用户来说，会议邀请已成为生活的一部分。你会在电子邮件中收到会议邀请，接受邀请后，该约会便会自动添加到你的日历中。\n\
    \n在你的 iPhone 上，你接受的邀请会立刻添加到日历中。\n\n如果你在日历中点击该会议邀请，就能看到所需的所有详细信息：拨入号码、会议 ID，以及邀请中可能包含的任何其他细节。\n\
    \n![images](img/U1933.jpg)\n\n# 日历选项\n\n在你的`日历`应用中，只有少数几个选项可供调整。你可以在`设置`应用中找到它们。请按照以下步骤进行调整：\n\
    \n![images](img/U1934.jpg)\n\n1.  从你的`主屏幕`中轻点`设置`\n2.  向下滚动到`邮件、通讯录、日历`并轻点它。\n\
    3.  向下滚动到`日历`（它位于最底部！）以查看几个选项。\n4.  第一个选项是一个简单的开关，用于通知你`新邀请提醒`。如果你收到任何会议邀请，最好将此选项保持为默认的`开启`状态。\n\
    5.  接下来，如果你通过 Exchange 或 iCloud 同步你的`日历`程序，你可能还会看到`同步`选项。你可以调整设置，将事件同步到`往回 2 周`、`往回\
    \ 1 个月`、`往回 3 个月`、`往回 6 个月`，或显示所有`所有事件`。\n6.  接下来，你可以选择你的时区。此设置应反映你设置 iPhone 时的`主屏幕`设置。如果你在旅行中，并希望针对不同时区调整你的约会，你可以将`时区`值更改为任意你偏好的城市。\n\
    \n    ![images](img/U1935.jpg)\n\n7.  可以为生日、事件和全天事件设置默认提醒时间。事件包含常规选项，而生日和全天事件则允许在事件当天、提前\
    \ 1 天或提前 2 天（均在上午 9 点），或提前 1 周\n\n## 更改默认日历\n\n我们之前提到过，你可以在 iPhone 上显示多个日历。`默认日历`屏幕允许你选择哪个日历作为你的默认日历。\n\
    \n![images](img/U1936.jpg)\n\n将一个日历指定为默认日历，意味着当你计划安排新的约会时，此日历将默认被选中。\n\n如果你希望使用另一个日历——比如你的`工作`日历——那么你可以在实际设置约会时更改它，正如本章前面所示。\n\
    \n## 提醒事项\n\n`提醒事项`是 iOS 5 中新增的一款应用，它能让你轻松简单地跟踪需要完成的事项、完成它们的日期和时间，甚至是在何处需要完成。你可以将此应用视为苹果对任务或待办事项列表的回应。\n\
    \n## 提醒事项视图\n\n你的`提醒事项`应用有三个主要视图：`列表`、`日期`和`月`。以下是这些视图的快速概述。\n\n`列表`是`提醒事项`的默认视图，可以让你一目了然地查看所有需要完成的任务。\n\
    \n![images](img/U1937.jpg)\n\n![images](img/U1938.jpg)\n\n**注：** 对于 iCloud 账户，默认的`列表`视图称为`提醒事项`。对于\
    \ Microsoft Exchange 账户，默认的`列表`视图称为`任务`。\n\n如果你有多个列表，可以通过从右向左滑动在它们之间切换，就像在你的 iPhone\
    \ `主屏幕`上在不同应用页面之间切换一样。\n\n从左向右滑动可以查看你的`已完成`列表\n\n`日期`视图让你在提醒事项到期的当天查看它们。你可以轻松地从一天滑动到下一天；你也可以滚动底部的`日期`滑块。按照以下步骤更改显示的日期：\n\
    \n*   **前往下一天**：从右向左滑动。\n*   **前往前一天**：从左向右滑动。\n*   **前往已完成任务列表**：从当前天开始，从左向右滑动。\n\
    \n**提示：** 要返回到`今天`视图，只需轻点右上角的`今天`按钮。\n\n![images](img/U1939.jpg)\n\n要查看`月`视图，轻点位于`日期`视图左上角的`月`按钮\
    \ ![images](img/U1941.jpg)。这将显示整个月的布局。有提醒事项到期的日期会显示为红色。\n\n![images](img/U1940.jpg)\n\
    \n**提示：** 要返回到`今天`视图，只需轻点右上角的`今天`按钮。\n\n![images](img/U1942.jpg)\n\n![images](img/U1943.jpg)\n\
    \n按照以下步骤在月份之间来回切换：\n\n*   **前往下个月**：向下滚动。\n*   **前往上个月**：向上滚动。\n\n## 添加新的提醒事项\n\
    \n要从任何`列表`视图中添加新任务，请按照以下步骤操作：\n\n1.  轻点当前列表末尾的第一个空白行。\n\n    ![images](img/U1944.jpg)\n\
    \n2.  输入你任务的标题。\n3.  完成后，轻点右上角的黑色`完成`按钮。\n\n**注：** 你也可以轻点`添加`按钮来创建一个新任务。![images](img/U1944.jpg)\n\
    \n## 添加提醒事项详情\n\n要向任务添加*详情*，请轻点任务的标题。`详情`屏幕允许你添加`提醒我`的到期日期或位置、提醒的`优先级`、你希望将其附加到哪个`列表`，以及你可能想要添加的任何`备注`。\n\
    \n![images](img/U1945.jpg)\n\n`详情`页面也是你可以删除任务的地方。\n\n**注：** 如果一开始没有看到所有选项，请轻点`显示更多`按钮来展开它们。\n\
    \n## 设置到期日期和位置\n\n`提醒事项`应用包含你可以为提醒设置的标准到期日期。当任务到达到期日期时，你会收到一个弹出通知来提醒你。\n\n`提醒事项`应用还包含强大的地理围栏功能；也就是说，它允许你为提醒设置基于位置的通知。这意味着你可以设置提醒，例如在到达母亲家时更换灯泡，或者在离开办公室时拿牛奶。\n\
    \n**注：** 基于位置的提醒目前仅在你使用 iCloud 并将任务分配到一个与 iCloud 关联的列表时才可用。\n\n![images](img/U1946.jpg)\n\
    \n按照以下步骤设置`提醒我`的日期或位置：\n\n1.  轻点`提醒我`。\n2.  要设置到期日期，将`在某天`选项切换为`开启`。默认情况下，日期将设置为当天。\n\
    3.  要更改日期，轻点它，然后移动底部的旋转拨盘以反映任务的正确日期。\n4.  轻点`完成`返回主`详情`屏幕。\n\n    ![images](img/U1947.jpg)\n\
    \n5.  要设置地点，将`在某个位置`切换为`开启`。默认情况下，位置将设置为你当前的位置。\n6.  要更改你的位置，轻点`在某个位置`下方的字段，然后轻点`选择地址`。\n\
    7.  从你的`通讯录`列表中选择一个地址。\n8.  轻点`完成`返回主`详情`屏幕。\n\n**提示：** 在`提醒事项`中使用某个位置之前，该位置必须存在于你的`通讯录`中。要快速将位置添加到你的`通讯录`，请使用`地图`应用（参见第\
    \ 21 章：\"地图\"）。\n\n1.  如果你希望在离开某个位置时收到提醒，请轻点`当我离开时`。\n2.  如果你希望在到达某个位置时收到提醒，请轻点`当我到达时`。\n\
    3.  轻点`完成`返回主`详情`屏幕。\n\n**注：** 如果你同时设置了到期日期和位置，`提醒事项`将会在最先发生的那个条件满足时向你发送提醒——即你到达或离开某个位置，或者提醒到达设定的时间。\n\
    \n## 重复提醒事项\n\n你的一些提醒事项需要在每天、每周或每月的同一时间或地点触发。如果你正在安排一个重复或循环的任务，请按照以下步骤操作：\n\n\
    1.  轻点`重复`标签页，然后从列表中选择重复事件的间隔时间。\n2.  轻点`完成`返回主`详情`屏幕。\n"
- fmt: "# Changing Lists\n\nEach `treminder` belongs to a list. You can have work\
    \ lists, home lists, vacation lists, shopping lists—anything you like. The **Details**\
    \ page will show the name of the list currently associated with your new task.\
    \ Follow these steps to change your current list:\n\n![images](images/U1948.jpg)\n\
    ![images](images/U1949.jpg)\n\n1. Tap the current list name.\n2. Tap the list\
    \ you want to change to.\n\n## Adding Notes to a Task\n\nFollow these steps if\
    \ you want to add some notes to a task:\n\n![images](images/U1950.jpg)\n\n1. Tap\
    \ **Notes** and type or copy and paste a few notes.\n\n   ![images](images/U1951.jpg)\n\
    \n2. Tap **Done** to finish adding notes.\n\n**TIP:** if this is a shopping list,\
    \ you might want to include extra information like clothing sizes, food brands,\
    \ or anything else that could be helpful.\n\n## Completing Reminders\n\nIt's incredibly\
    \ easy to mark a reminder as Completed. Simply tap the box immediately to the\
    \ left of the reminder's title and a Checkmark icon will appear. That will move\
    \ the reminder from its current list to the special Completed list, so you can\
    \ go back and refer to it later, if necessary.\n\n![images](images/U1952.jpg)\n\
    \nIf you make a mistake, just tap the box again to remove the Checkmark icon and\
    \ return the reminder to its previous status. If the task has already been moved\
    \ to the Completed list, swipe left until you get to the Completed list and then\
    \ tap the box to uncheck it and move the reminder back to its previous list.\n\
    \n## Editing Reminders\n\nSometimes, the details of a task may change and need\
    \ to be adjusted. Luckily, changing any reminder is as simple as following these\
    \ steps:\n\n![images](images/U1953.jpg)\n\n1. Tap the reminder that you want to\
    \ change.\n2. Tap the tabs on the Details page and adjust the details, just as\
    \ you do when setting up a new task.\n\n### Deleting a Reminder\n\nNotice that,\
    \ at the bottom of the **Details** screen, you also have the option to delete\
    \ a task. Simply tap the **Delete** button at the bottom of the screen to do so.\n\
    \n![images](images/U1954.jpg)\n\n## Adding a New List\n\nThe **Reminders** app\
    \ lets you have multiple lists, which is handy for keeping your tasks organized.\
    \ For example, you can make a new list to help you pack for an upcoming trip or\
    \ shop for an upcoming birthday.\n\nYou can create a new list for either iCloud\
    \ Reminders or Exchange Tasks accounts, or local lists On my iPhone. Follow these\
    \ steps to create a new list:\n\n1. Tap the **Lists** button ![images](images/U1955.jpg)\
    \ on the top left of the screen.\n\n   ![images](images/U1956.jpg)\n\n2. On the\
    \ Lists page, tap the **Edit** button at the top right.\n3. If you have more than\
    \ one account syncing with Reminders, choose the one you want to add the new list\
    \ to.\n4. Tap the **Create New List**… tab.\n5. Type in the name of your new list.\n\
    6. Tap the grey **Done** button at the top right.\n\n## Moving and Deleting Lists\n\
    \nFrom the **Lists** page, you can also move and delete lists.\n\nTo move a list,\
    \ touch and hold the **Gripper** icon to the far right, and then drag it to its\
    \ new position.\n\nTo delete a list, tap the red **Circle** icon to the left of\
    \ the list's name, and then tap the **Delete** button to confirm your choice.\n\
    \n## Reminders Options\n\nThere are only two options to adjust in the **Reminders**\
    \ app; you can find these in the **settings** app:\n\n![images](images/U1957.jpg)\n\
    \n1. Tap the **settings** icon from your **Home** screen.\n2. Scroll down to **Mail,\
    \ Contacts, Calendars** and tap it.\n\n   ![images](images/U1958.jpg)\n\n3. Scroll\
    \ down to **Reminders** (it's at the very bottom!) to see the two options.\n\n\
    \   ![images](images/U1959.jpg)\n\n4. The first option is **sync.** You can adjust\
    \ this setting to sync **2 Weeks Back, 1 Month Back, 3 Months Back, 6 Months Back**,\
    \ or to show **All Reminders**.\n\n### Changing the Default List\n\nWe mentioned\
    \ earlier that you can have multiple lists displayed on your iPhone. The **Default\
    \ List** screen allows you to choose which list will be your default list.\n\n\
    ![images](images/U1960.jpg)\n\nSpecifying a list as the default means that, when\
    \ you go to create a new reminder, it will be assigned to the specified list by\
    \ default.\n\n# Chapter 20\n\n# Working with Photos\n\nWhile previous versions\
    \ of the iPhone have included a camera, the camera on the current iPhone is truly\
    \ incredible. The iPhone 4S comes with not one, but two cameras: an 8.0-megapixel,\
    \ `f/`2.4 aperture camera on the back with a LED flash; and a 0.3-megapixel VGA\
    \ camera on the front for video chats and self-portraits. You can learn more about\
    \ using the front-facing camera in the **FaceTime** app in [Chapter 11](#Chapter11.html#ch11):\
    \ “Video Messaging and Skype.”\n\nViewing and sharing your pictures on the iPhone\
    \ is truly a joy, due in large part to its beautiful high-resolution screen. In\
    \ this chapter, we will discuss the many ways to get pictures onto your iPhone.\
    \ We will also show you how you to use the touch screen to navigate through your\
    \ pictures, as well as how to zoom in and out and manipulate your photos.\n\n\
    **TIP:** Did you know you can take a picture of the entire screen of your iPhone\
    \ by pressing two keys simultaneously? This is great to show someone a cool app\
    \ or to prove that you got the high score on **Tetris**!\n\nHere's how to get\
    \ it done: press both the **Home** button and the **On/Off/Sleep** key on the\
    \ top-right edge (you can press one key, hold it, and then press the other). This\
    \ is a little tricky and takes some practice. If you have done this correctly,\
    \ the screen should flash, and you'll hear a camera sound. The screen capture\
    \ you have taken will be in your Camera Roll album in the **Photos** app.\n\n\
    ## Taking Photos Quickly\n\nApple has recently added some great shortcuts to help\
    \ you take photos more quickly and more conveniently. If your child is in the\
    \ middle of an especially adorable or memorable moment, if you come across a rare\
    \ bird in the woods, or if you need to grab a fast photo of something suspicious\
    \ in your neighborhood, then you can use one of the following techniques to snap\
    \ a picture quickly:\n\n* Double-click the **Home** button to bring up a **Camera**\
    \ icon right on the **Lock** screen. Tapping the **Camera** icon will take you\
    \ right to the **Camera** app, ready to take a photo. This means you no longer\
    \ need to unlock your phone, swipe to find the **Camera** app, and then wait for\
    \ it to launch.\n* Use the **Volume Up** hardware button to snap your photo. Rather\
    \ than trying to hit the camera software button on the screen, you can use something\
    \ more tactile and similar to traditional camera controls.\n* Take multiple pictures.\
    \ Apple claims it has gotten the time it takes to shoot the first photo down to\
    \ a remarkable 1.1 seconds; however, the second photo—and every photo thereafter—now\
    \ takes only 0.5 seconds. This is especially handy for sports or any other fast-moving\
    \ activity. Just keep pressing the volume up key as fast as you can.\n* Auto-focus\
    \ and face detection mean snapshots of your friends and family automatically come\
    \ out sharper and with better exposure.\n\n## Using the Camera App\n\nThe **Camera**\
    \ app should be on your **Home** page—usually on the first screen at the top.\
    \ If you don't see it, then swipe left or right until you find it.\n\n![images](images/U2001.jpg)\n\
    \nTouch the **Camera** icon and the shutter of the camera opens with an animation\
    \ on your screen.\n\nOnce the shutter opens, you will find controls along the\
    \ top to set the **Flash** to **On**, **Off**, or **Auto**; **Options** to set\
    \ the **Grid** overlay and **HDR** (high dynamic range) to **On** or **Off**;\
    \ and a toggle to switch between the front-facing and rear-facing cameras. Along\
    \ the bottom, you'll find a thumbnail to take you to the Camera Roll album, the\
    \ **Camera** button to take a picture, and a slider to switch between Still Photography\
    \ and Video Recording modes.\n\n![images](images/U2002.jpg)\n\n**TIP:** You can\
    \ also take a picture or start a video recording by pressing the **Volume Up**\
    \ hardware button."
