    \ confirms that your email was sent. You can learn how to enable or disable this\
    \ sound in the “Adjusting Sounds on your iPhone” section of [Chapter 9](#Chapter09.html#ch9):\
    \ “Personalize and Secure.”\n\n![images](images/U1736.jpg)\n\n##### Save As Draft\
    \ to Send Later\n\nIf you are not ready to send your message, but want to save\
    \ it as a draft message to send later, follow these steps:\n\n1.  Compose your\
    \ message, as described earlier.\n2.  Press the **Cancel** button in the upper-left\
    \ corner.\n3.  Select the **Save Draft** button at the bottom of the screen.\n\
    \n    ![images](images/U1737.jpg)\n\nLater, when you want to locate and send your\
    \ draft message, follow these steps:\n\n1.  Open the **Drafts** folder in the\
    \ email account from which you composed this message. See the “Moving Around in\
    \ Mail Folders” section earlier in this chapter for help getting into the **Drafts**\
    \ folder.\n2.  Tap the email message in the **Drafts** folder to open it.\n3.\
    \  Tap anywhere in the message to edit it.\n4.  Tap the **Send** button."
  trans: "\n# 撰写新邮件\n\n启动`Mail`程序后，首先看到的是`账户`界面。在屏幕右下角，您会看到`撰写`图标。点击`撰写`图标即可开始创建新邮件。\n\
    \n![images](img/U1721.jpg)\n\n## 填写收件人——选择收件人\n\n您有几种选择收件人的方式，具体取决于该联系人是否在您 iPhone\
    \ 的`通讯录`中：\n\n**选项 1**：输入某人名字的前几个字母；按下`空格`键，然后输入该人姓氏的前几个字母。该人的姓名应出现在列表中；点击该姓名即可选择该联系人。\n\
    \n![images](img/U1722.jpg)\n\n**选项 2**：输入电子邮件地址。请注意屏幕底部的`@`和`句号`(`.`)键，它们可以帮助您输入。\n\
    \n**提示：** 长按`句号`键可查看 `.com`、`.edu`、`.org` 及其他电子邮件域名后缀。\n\n![images](img/U1723.jpg)\n\
    \n**选项 3**：点击`加号` (`+`) ![images](img/U1724.jpg) 查看整个`通讯录`列表，并从中搜索或选择一个姓名。\n\n\
    如果您想使用不同的联系人分组，请点击左上角的`群组`按钮。\n\n双击屏幕顶部的`通讯录`可查看`搜索`窗口。接着，输入几个字母来搜索您的联系人。\n\n\
    ![images](img/U1725.jpg)\n\n### 删除收件人\n\n如果需要从收件人列表（`收件人:`、`抄送:` 或 `密送:`）中删除某个姓名，请点击该姓名以选中它\
    \ ![images](img/U1726.jpg)，然后按下`退格`键。![images](img/U1727.jpg)\n\n**提示：** 如果您想删除最后输入的收件人（且光标位于该姓名旁），先按一次`删除`键高亮该姓名，再按一次即可将其删除。\n\
    \n### 添加抄送或密送收件人\n\n![images](img/U1728.jpg) 要添加抄送 (`Cc:`) 或密送 (`Bcc:`) 收件人，需点击邮件顶部`收件人:`字段正下方的`抄送:`或`密送:`字段。点击后，该字段将会展开。\n\
    \n![images](img/U1729.jpg)\n\n### 移动收件人\n\n如果您最初将某收件人添加到`收件人:`字段，但改变主意，希望将其移至`抄送:`或`密送:`字段（反之亦然），只需长按该收件人姓名，然后将其拖拽到目标字段即可。\n\
    \n![images](img/U1730.jpg)\n\n## 更换发送邮件的账户\n\n如果您设置了多个电子邮件账户，iPhone 将使用设置为默认账户的账户发信（此项设置在`设置`\
    \ > `邮件、通讯录、日历` > `默认账户`，位于`邮件`部分底部）。\n\n按以下步骤更换发送邮件的账户：\n\n1.  点击邮件的`发件人:`字段以将其高亮。\n\
    2.  再次点击`发件人:`字段，屏幕底部会以滚轮形式显示您的账户列表。\n3.  上下滚动，然后点击选择一个新的电子邮件账户。\n4.  点击`主题`字段，完成发件地址的更改。\n\
    \n    ![images](img/U1731.jpg)\n\n## 输入主题\n\n现在您需要为邮件输入主题。请按以下步骤操作：\n\n1.  点击`主题:`行，并为邮件的`主题:`字段输入文本。\n\
    2.  按下`回车`键，或点击邮件的`正文`区域，将光标移至`正文`部分。\n\n    ![images](img/U1732.jpg)\n\n## 输入邮件内容\n\
    \n现在光标位于邮件的`正文`部分（主题行下方），您可以开始输入邮件内容了。\n\n**注意：** 您的 iPhone 上只有一个邮件签名，它会自动应用到您从\
    \ iPhone 发出的每一封邮件——即使您设置了多个电子邮件账户。因此，如果您同时经营两家不同的企业，或不希望您的个人邮件签名发送给所有商务联系人，请务必谨慎。最好将邮件签名设置得较为通用。\n\
    \n### 格式化文字、定义词语、引用文本等\n\n您可以点击任意文本以将其选中，并使用蓝色手柄扩大选择范围。然后通过选中文本上方弹出的菜单，执行以下任何操作：\n\
    \n![images](img/U1733.jpg)\n\n-   点击`剪切`、`复制`或`粘贴`执行相应功能。\n-   如果单词带有下划线且您想修正拼写，请点击`建议`。\n\
    -   点击右侧边缘的三角形可查看更多选项。\n-   点击`B / U`可将格式调整为`粗体`、`斜体`或`下划线`。\n\n    ![images](img/U1734.jpg)\n\
    \n-   点击`定义`可在字典中查询所选单词。\n-   点击`朗读`可听取该单词的发音。\n-   点击`引用级别`可增加或减少所选文本的引用级别。\n\
    \n    ![images](img/U1735.jpg)\n\n### 邮件签名\n\n默认的邮件签名如右图所示：`发自 iPhone`。\n\n**提示：**\
    \ 您可以将此签名更改为您想要的任何内容；请参阅本章后面“更改您的电子邮件签名”部分，了解如何更改您的电子邮件签名。\n\n## 键盘选项\n\n输入时，请记住您有两种键盘选项：较小的`竖屏`（纵向）键盘和较大的`横屏`（横向）键盘，请参阅图\
    \ 17–2。\n\n![images](img/1702.jpg)\n\n**图 17–2.** *将设备侧向旋转，即可使用更大的横屏键盘。*\n\n**提示：**\
    \ 如果您手比较大，使用更大的键盘输入可能会更轻松。一旦您习惯用双手在大键盘上输入，就会发现它比单指输入快得多。更多输入技巧，请参阅第 2 章：“输入、拷贝与搜索”。\n\
    \n## 自动更正与自动大写\n\n输入时，您会注意到有些单词会自动大写并被自动更正。拼写检查器会将带有红色下划线的单词标记为拼写错误。请参阅第 2 章：“输入、拷贝与搜索”了解所有这些功能的工作方式；本章还提供了一些额外的输入技巧。\n\
    \n## 发送邮件\n\n输入完邮件后，点击右上角的蓝色`发送`按钮。\n\n您的邮件将会被发送，并且您应该会听到 iPhone 的邮件发送提示音，这确认您的邮件已发送。您可以在第\
    \ 9 章：“个性化与安全”中的“调整 iPhone 声音”部分了解如何启用或禁用此声音。\n\n![images](img/U1736.jpg)\n\n\
    ### 保存为草稿以便稍后发送\n\n如果您尚未准备好发送邮件，但想将其保存为草稿以便稍后发送，请按以下步骤操作：\n\n1.  按照前述方法撰写邮件。\n\
    2.  按下左上角的`取消`按钮。\n3.  选择屏幕底部的`保存草稿`按钮。\n\n    ![images](img/U1737.jpg)\n\n稍后，当您想找到并发送草稿邮件时，请按以下步骤操作：\n\
    \n1.  在您撰写此邮件的电子邮件账户中打开`草稿`文件夹。如需帮助进入`草稿`文件夹，请参阅本章前面的“在邮件文件夹中移动”部分。\n2.  点击`草稿`文件夹中的邮件以将其打开。\n\
    3.  点击邮件中的任意位置进行编辑。\n4.  点击`发送`按钮。\n"
- fmt: "### Checking Sent Messages\n\nFollow these steps to confirm that the email\
    \ was sent correctly:\n\n1.  Tap the **Email account name** button in the upper-left\
    \ corner to see the mail folders for the account you just used to send your message.\n\
    2.  Tap the `Sent` folder.\n3.  Verify that that the top email you see in the\
    \ list is the one you just composed and sent.\n\n    ![images](images/U1738.jpg)\n\
    \n**Note:** You will only see the `Sent` and `Trash` folders if you have actually\
    \ sent or deleted email from that account on the iPhone. If your email account\
    \ is an IMAP account, you may see many folders other than those described in this\
    \ chapter.\n\n### Reading and Replying to Mail\n\nFollow these steps to read your\
    \ email:\n\n1.  Navigate to the inbox of the email account you want to view using\
    \ the steps described earlier in this chapter.\n2.  To read any message, just\
    \ touch it from your inbox.\n3.  New, unread messages are shown with a small blue\
    \ dot to the left of the message.\n4.  Flick your finger up or down in the inbox\
    \ to scroll through your messages.\n5.  When you are reading a message, swipe\
    \ up or down to scroll through it.\n\n    ![images](images/U1739.jpg)\n\n####\
    \ Marking Messages as Unread or Flagged\n\nIf you read a message but want to make\
    \ sure you can quickly find it again later, you can choose to click either `Mark`\
    \ as `Unread` or `Flag`, so it gets your attention later.\n\nFollow these steps\
    \ to `Mark` a message:\n\n1.  Tap the word `Mark` located to the right of the\
    \ time and date.\n2.  Choose `Flag` or `Mark` as `Unread` from the slide up menu.\n\
    \n    ![images](images/U1740.jpg)\n\nA message you `Flag` will have a small red\
    \ `Flag` icon to the left of the `Mark` text. A message you `Mark` as `Unread`\
    \ will have a small blue dot to the right of the `Mark` text.\n\nTo `Unmark` a\
    \ message:\n\n1.  Tap the word `Mark` located to the right of the time and date\n\
    2.  Choose `Unflag` or `Mark as Read` from the slide up menu.\n\n    ![images](images/U1741.jpg)\n\
    \n#### Zooming In or Out\n\nAs when browsing the Web, you can zoom in to see your\
    \ email in larger text. You can also double-tap, just as you do on the Web; and\
    \ you can also `Pinch` to zoom in or out (see the “Zooming” section in the Quick\
    \ Start Guide in Part 1 of this book for more information on these features).\n\
    \n### Email Attachments\n\nSome email attachments are opened automatically by\
    \ the iPhone, so you don't even notice that they were attachments. Examples of\
    \ these include Adobe's portable document format (PDF) files (used by `Adobe Acrobat`\
    \ and `Adobe Reader`, among other apps) and some types of image, video, and audio\
    \ files. You may also receive documents as attachments, such as Apple's `Pages`,\
    \ `Numbers`, and `Keynote` files; or Microsoft's `Word`, `Excel`, and `PowerPoint`\
    \ files. You will need to open these manually.\n\n#### Knowing When You Have an\
    \ Attachment\n\nAny email with an attachment will have a little `Paperclip` icon\
    \ next to the sender's name, as shown to the right. When you see that icon, you\
    \ know you have an attachment.\n\n![images](images/U1742.jpg)\n\n#### Receiving\
    \ an Auto-Open Attachment\n\nSome types of email attachments, like images, Quicktime\
    \ movies, and single-page PDF files are usually opened and displayed for you inline\
    \ in the mail message.\n\n(If you're on a 3G data connection, however, you'll\
    \ have to tap on them to download and display them.)\n\n![images](images/U1743.jpg)\n\
    \n**Tip:** If you want to save or copy an auto-opened attachment, simply press\
    \ and hold it until you see the pop-up window. At this point, you can select `Copy`\
    \ or `Save Image`. When you save an image, it will be placed in your `Photos`\
    \ app in the `Camera Roll` album.\n\n#### Opening Email Attachments\n\nInstead\
    \ of immediately opening in the body of the email as we just described, other\
    \ types of attachments—such as spreadsheets, word processing documents, and presentation\
    \ files—will need to be opened manually.\n\n##### Tap for Quick Look Mode\n\n\
    Follow these steps to open attachments in Quick Look mode:\n\n1.  Open the message\
    \ with an attachment, as shown in [Figure 17–3](#Chapter17.html#fig_17_3).\n2.\
    \  Quickly tap the attachment to instantly open it in Quick Look mode.\n3.  You\
    \ can navigate around the document. Remember you can zoom in or out and swipe\
    \ up or down.\n4.  If you open a spreadsheet with multiple tabs or spreadsheets,\
    \ you will see tabs across the top. Touch another tab to open that spreadsheet.\n\
    5.  When you are done looking at the attachment, tap the document once to bring\
    \ up the controls, and then tap `Done` in the upper-left corner.\n6.  If you have\
    \ apps installed that can open the type of attachment you are viewing (in this\
    \ case, a spreadsheet), then you will see an `Open In` button in the upper-right\
    \ corner. Tap the `Open In` button to open this file in another app.\n\n![images](images/1703.jpg)\n\
    \n**Figure 17–3.** *Viewing email attachments in Quick Look mode.*\n\n##### Opening\
    \ Docs in Other Apps\n\nYou may want to open an attachment in another application.\
    \ For example, you might want to open a spreadsheet in `Numbers`, a PDF file in\
    \ `iBooks`, `Stanza`, or `GoodReader`. Follow these steps to do so:\n\n1.  Open\
    \ the email message.\n2.  Press and hold the attachment until you see the pop-up\
    \ window.\n3.  Select the `Open In…` or `Open in \"Numbers\"` option. You may\
    \ see specific apps listed after `Open In` as `Numbers` is shown here when the\
    \ format of the attachment matches apps on your device.\n\n    ![images](images/U1744.jpg)\n\
    \n4.  Select the application you would like to use from the list.\n5.  Finally,\
    \ you can edit the document, save it, and email it back to the sender.\n\n   \
    \ ![images](images/U1745.jpg)\n\n##### Viewing a Video Attachment\n\nYou may receive\
    \ a video as an attachment to an email. Certain types of videos can be viewed\
    \ on your iPhone (see the “Supported E-Mail Attachment Types” section later in\
    \ this chapter for a list of supported video formats). Follow these steps to open\
    \ a video attachment:\n\n1.  Tap the video attachment to open it and view it in\
    \ the video player.\n2.  When you are done viewing the video, tap the screen to\
    \ bring up the player controls.\n3.  Tap the `Done` button in the upper-left corner\
    \ to return to the email message.\n\n    ![images](images/U1746.jpg)\n\n**Note:**\
    \ This is an image from a video tutorial by Martin Trautschold (one of this book's\
    \ authors) that shows you how to use your iPhone. Check out some free sample tutorials\
    \ at [`www.madesimplelearning.com`](http://www.madesimplelearning.com), Martin's\
    \ web site."
