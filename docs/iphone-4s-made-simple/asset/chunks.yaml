    #### 搜索网页或维基百科


    执行聚焦搜索后，你会看到结果下方有两个选项：**搜索网页**和**搜索维基百科**。


    点击任一选项即可在网页或维基百科中执行搜索。


    #### 自定义聚焦搜索


    你可以通过移除搜索中的特定应用或数据类型来自定义聚焦搜索。你甚至可以更改每种数据类型的搜索顺序。如果你只想搜索**通讯录**和**邮件**中的信息——不搜索其他内容，这个功能会很有用。或者，如果你知道自己总是想先搜索**邮件**，然后是**日历**，接着是**音乐**——你可以按正确顺序设置这些项目。请按照以下步骤操作：


    1.  点击**设置**图标。

    2.  点击**通用**。

    3.  点击**聚焦搜索**。

    4.  若要更改搜索项目的顺序，请触摸并拖拽带有三条灰色横线的项目右侧边缘，向上或向下移动。

    5.  若要从搜索中移除特定项目，点击该项目以移除其旁边的**勾号**图标。未勾选的项目将不会被聚焦搜索搜索到。

    6.  点击左上角的**通用**按钮，返回**设置**应用。


    ![images](img/U0242.jpg)


    ## 第 3 章


    ## 与 iCloud、iTunes 等同步


    在本章中，我们将向你展示如何设置或调整你的存储空间，并将你的信息推送至 Apple 的新 iCloud 服务，以及如何使用 iTunes 在你的 iPhone
    与 Windows 或 Mac 电脑之间同步信息。


    借助 iCloud，你可以无线同步你的邮件、通讯录、日历、提醒事项、书签、备忘录、照片以及文稿与数据，还可以通过无线方式 (空中下载技术 OTA) 备份你的
    iPhone。借助 iTunes，你可以同步或传输通讯录、日历、备忘录、应用、音乐、视频、iBooks、文稿以及图片库，还可以备份你的 iPhone。


    并且，因为没有任何东西能始终完美运行，我们还将向你展示一些简单的故障排除技巧。最后，我们将向你展示如何检查更新并为你的 iPhone 安装更新的操作系统软件。


    ### iCloud


    iCloud 是免费的，易于设置且易于使用。在大多数情况下，它是同步你的个人信息、音乐、电视节目（仅限美国）和应用的最佳方式。它也是处理备份和恢复手机的最佳方式。除非你有非常具体的原因不这样做，否则我们强烈推荐你使用
    iCloud 来处理大多数同步需求，但对于 iCloud 尚未处理的内容（如电影），则使用**iTunes**应用。


    iCloud 还允许你重新下载之前从 iTunes、iBookstore 和 App Store 购买的项目，但你的 iCloud ID 也可用于 iMessage、FaceTime
    和其他免费的 Apple 服务。


    **注：** Apple 在提及 iCloud 时非常小心地避免使用*同步*这个词。取而代之的是*存储*和*推送*。这种差异很大程度上是技术性的，与 Apple
    如何移动你的数据有关。


    需要记住的重要一点是，当你更改 iPhone 上的某些内容时，Apple 会将该更改复制到其服务器，然后将副本推送回你所有其他启用了 iCloud 的 iOS
    设备，以及你的 Windows 或 Mac 电脑。


    ### 设置 iCloud


    在第 1 章：“开始使用”中，我们向你展示了在设置新 iPhone 或从之前的 iCloud 备份恢复时如何启用 iCloud。一旦启用了 iCloud，你就可以轻松地打开或关闭各种服务。


    首先启动**设置**应用，向下滚动到 iCloud。


    **邮件**、**通讯录**、**日历**、**提醒事项**、**书签**、**备忘录**和**查找我的 iPhone** 可以直接在此屏幕上轻松切换为**打开**或**关闭**。


    对于**照片流选项**，你需要先点击该标签页才能进入**打开**/**关闭**切换开关。


    ![images](img/U0301.jpg)


    **注：** 在编写本文时，照片流是一项全有或全无的服务。如果照片流已开启，Apple 会将其服务器上你最近的 1000 张照片保留最多 30 天，并将它们复制到你的
    iPad、Apple TV、Mac 或 Windows 电脑。任何登录 iCloud 的设备都会获得你照片流的副本。如果你拍摄了敏感或私人的照片，你可能希望将**照片流**选项设置为**关闭**。


    同样，你可以点击**文稿与数据**来将此选项切换为**打开**或**关闭**。你还可以选择将**使用蜂窝网络选项**设置为**打开**。这将确保即使你外出并连接到
    3G 数据网络时，你的文稿也能保持最新。


    **注：** 如果你的数据套餐有限，或者在旅行时处于漫游状态，你可能需要关闭此功能以避免产生高昂的超额费用。


    ![images](img/U0302.jpg)


    ### 管理 iCloud 储存空间与备份


    iCloud 提供 5GB 的免费储存空间。来自 iTunes 的音乐、应用、iBooks 以及你的照片流不计入你的 5GB 额度，因此大多数人仍有足够的空间用于应用数据、文稿和备份。


    ![images](img/U0303.jpg)


    要查看你的 iCloud 储存空间，请向下滚动到底部，然后点击**储存空间与备份**。


    ![images](img/U0304.jpg)


    **储存空间**部分会显示**总储存空间**，即你 iCloud 账户的总容量；**可用储存空间**则显示你剩余的总存储容量。


    在屏幕底部，你可以将**iCloud 备份**切换为**打开**或**关闭**。


    **注：** 对于大多数用户来说，在绝大多数情况下，我们强烈建议将**iCloud 备份**选项切换为**打开**并保持该状态。


    如果你需要立即备份你的 iPhone，可以点击**立即备份**按钮。你可能在以下情况执行此操作：想重新安装你的 iPhone、更换为一部备用或新的 iPhone、或者计划出行并希望在出发前确保你的手机已备份。


    要查看你的 iCloud 储存空间使用情况，请点击**管理储存空间**。


    在**管理储存空间**屏幕的顶部，你会看到当前备份到 iCloud 的设备列表。这包括你的 iPhone 以及你可能拥有的任何其他 iOS 设备，例如 iPad
    或 iPod touch。


    点击你想要查看的设备，你会进入**信息**屏幕，该屏幕显示**最新备份**的时间以及**备份大小**。


    **备份选项**部分允许你单独打开或关闭不同类型的备份，包括**相机胶卷**以及你可能已安装的、将其设置或数据与 iCloud 同步的任何应用。此部分还会告诉你每个应用使用了多少储存空间。


    最初，你只会看到几个应用。点击**查看所有应用**以查看完整列表。将某个应用设置为**关闭**意味着你将节省储存空间，但你的数据将不再在你的 iOS 设备之间同步，并且如果你重新安装设备或该应用，数据也不会被恢复。


    ![images](img/U0305.jpg)


    ![images](img/U0306.jpg)


    ![images](img/U0307.jpg)


    **提示：** 你的 iPhone 配备的 800 万像素、1080p 摄像头意味着备份**相机胶卷**会很快消耗大量储存空间，尤其是当你只有免费的 5GB
    套餐时。照片流功能已经备份了你的照片；如果你不担心备份视频，那么你可以将**相机胶卷**备份切换为**关闭**以节省空间。


    ### 购买更多 iCloud 储存空间


    你可能会发现自己经常用尽 iCloud 储存空间、决定开始备份更多照片和视频，或者发现需要备份多个 iOS 设备。如果是这样，你可以从 Apple 购买更多
    iCloud 储存空间。


    只需点击遍布 iCloud **设置**屏幕中的任意一个**购买更多储存空间**按钮即可。在编写本文时，额外的 iCloud 储存空间费用如下：


    * 10GB：20 美元/年

    * 20GB：40 美元/年

    * 50GB：100 美元/年


    ![images](img/U0308.jpg)

