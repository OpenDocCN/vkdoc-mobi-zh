  trans: "\n# 调整或禁用自动锁定超时功能\n\n你会注意到，你的 iPhone 会在短时间后自动锁定并进入睡眠模式（即屏幕变黑）。你可以调整手机进入睡眠模式所需的时间，甚至完全禁用此功能，这些操作都在`设置`应用内完成。请按照以下步骤操作：\n\
    \n1. 在`主屏幕`上轻点`设置`图标。\n2. 轻点`通用`。\n3. 轻点`自动锁定`。\n4. 你会在本页`自动锁定`选项旁边看到当前的睡眠间隔设置。默认设置是\
    \ iPhone 闲置三分钟后锁定（以节省电池电量）。你可以将此间隔设置为`1 分钟`、`2 分钟`、`3 分钟`、`4 分钟`、`5 分钟`或`永不`。\n\
    5. 轻点所需的设置以选中它——当你看到其旁边出现对勾时，即表示已选中。\n6. 最后，轻点左上角的`通用`按钮，返回到`通用`屏幕。现在，你应该会看到你的更改已反映在“自动锁定”设置旁边。\n\
    \n**省电提示：** 将自动锁定功能设置为较短的时间间隔（例如`1 分钟`）将有助于节省电池电量。\n\n# 调整日期、时间、时区和 24 小时制\n\n\
    通常，日期和时间要么会自动为你设置，要么会在你连接 iPhone 到电脑时进行调整；你可以在第 3 章：“与 iCloud、iPhone 等同步”中了解更多相关信息。不过，你也可以非常轻松地手动调整日期和时间。当您携带\
    \ iPhone 旅行并需要在降落后调整时区时，可能需要进行此操作。请按照以下步骤操作：\n\n1. 轻点`设置`图标。\n2. 轻点`通用`。\n3. 向下滚动并轻点`日期与时间`，以查看`日期与时间`设置屏幕。\n\
    4. 如果你希望看到`09:30`和`14:30`，而不是`上午 9:30`和`下午 2:30`，则轻点`24 小时制`选项，将其开关设置为`开`。\n5.\
    \ 要手动设置日期和时间，你需要关闭自动时间设置功能。轻点`自动设置`旁边的开关，将此选项设置为`关`。\n\n    ![images](img/U0113.jpg)\n\
    \n6. 要设置你的时区，请轻点`时区`并输入你所在时区的一个主要城市名称。输入时，iPhone 会显示匹配的城市名称。\n7. 当你看到所在时区的正确城市时，轻点它以将其选中。在下面的图片中，我们输入了“Chicago”的前几个字母，直到它出现。接着，我们轻点了`美国，芝加哥`以将其选中。\n\
    8. 选择城市后，你将返回到主`日期与时间`屏幕，你选择的城市会显示在`时区`选项旁边。\n9. 轻点`设定日期与时间`以调整你的日期和时间。\n\n  \
    \  ![images](img/U0114.jpg)\n\n    ![images](img/U0115.jpg)\n\n    ![images](img/U0116.jpg)\n\
    \n10. 在此屏幕上，你可以设置日期和时间。要调整日期，请轻点屏幕顶部显示的`日期`按钮。\n11. 要调整时间，请轻点屏幕顶部显示的`时间`按钮。\n\
    12. 然后，你可以通过上下触摸并滑动`日期`和`时间`滚轮来调整日期和时间，如下方图片所示。\n13. 完成后，轻点左上角的`日期与时间`按钮。\n\n\
    # 调整亮度\n\n你的 iPhone 配备有自动亮度控制功能；此功能默认处于开启状态。此功能使用内置光线传感器来调节屏幕亮度。当室外较暗或夜晚时，自动亮度控制会调暗屏幕。当天气晴朗明亮时，屏幕会自动变亮，以便于阅读。通常，我们建议你将此功能保持为`开`状态。\n\
    \n如果你想调整亮度，请使用`设置`应用中的控制项。请按照以下步骤操作：\n\n1. 从`主屏幕`轻点`设置`图标。\n2. 轻点`亮度`并移动滑块控件以调整亮度。\n\
    3. 轻点`自动亮度`旁边的开关，将其切换为`开`或`关`。\n\n![images](img/U0117.jpg)\n\n![images](img/U0118.jpg)\n\
    \n**提示：** 将`亮度`选项设置为较低的值有助于节省电池电量。亮度滑块位置略低于中间位置似乎效果不错。\n\n# 通知\n\n作为 iOS 5 的新功能，通知中心引入了一种更好、干扰更少、打扰更少的方式来组织和处理您在一天中收到的所有电话、电子邮件、短信、Twitter、Facebook、日历和其他提醒消息。\n\
    \n通知可以通过以下几种方式显示：\n\n* 作为`锁定`屏幕信息，这样你无需解锁手机即可快速浏览重要提醒。（此选项会牺牲一些隐私。）\n* 作为应用内通知，每当收到新消息时，会以简短、轮转的提醒形式显示在屏幕顶部。\n\
    * 在`通知中心`下拉菜单中，当您的 iPhone 解锁后，您可以随时随地向下一扫即可访问。\n\n![images](img/U0119.jpg)\n\n\
    如果你以前使用过 iPhone，或者在 iOS 5 之前使用过 iPad 或 iPod touch，那么通知中心会在原有的声音/振动、数字标记和弹出式提醒等选项基础上增加新功能。由于它们不会中断操作，提醒不会中断你正在进行的`愤怒的小鸟`游戏或正在撰写的电子邮件，迫使你在继续游戏或写作之前必须关闭或打开它们。但你仍然可以选择处理那些你绝不能错过的事情，比如闹钟。\n"
- fmt: "#### Lock Screen Info\n\nNotifications on the **Lock** screen are displayed\
    \ in two different ways: as a popup with the single, newest notification and as\
    \ a pull-down list of all recent notifications.\n\nIf you receive a single notification\
    \ while your iPhone is locked, the screen will turn on, and it will appear in\
    \ a black box in the center of your **Lock** screen. It will also show an icon\
    \ on the left that represents the app associated with that type of notification.\
    \ For example, an e-mail message will show the **Mail** app icon to the left;\
    \ an SMS text message will show the **Messages** icon; a missed call will show\
    \ the **Phone** icon; a Facebook notice will show the **Facebook** icon; and so\
    \ on. There are several things you can do from here:\n\n* Ignore the notification.\
    \ This will cause your alert to fade away, and your iPhone’s screen will go back\
    \ to sleep.\n\n  ![images](images/U0120.jpg)\n\n* Grab the handle (the three gray\
    \ lines right below the time and date) and drag it down to see a list of all the\
    \ notifications you’ve received since the last time you unlocked your iPhone.\
    \ The list will be sorted by notification type, so all e-mail messages will be\
    \ grouped together, as will all calendar events, all missed phone calls, and so\
    \ on. To the left of each notification, you will also see the appropriate icon\
    \ for each alert.\n\n  **NOTE:** If you don’t see the handle, it’s because you\
    \ don’t have any recent notifications.\n\n* From either the single notification\
    \ box or the list, tap the icon to the left of the notification and **Slide to\
    \ Read** (or listen) to the notification, just as you would normally **Slide to\
    \ Unlock** your iPhone. In most cases, you’ll be taken straight to the appropriate\
    \ app with the full notification displayed. For example, touching the **Mail**\
    \ app icon and sliding it will unlock your iPhone, switch to the **Mail** app,\
    \ and load up the e-mail you just received.\n\n![images](images/U0121.jpg)\n\n\
    **NOTE:** A few notifications—such as alarms and system messages like iTunes sync\
    \ failures—might also show you a button to the left of the notification, such\
    \ as **Snooze** for the alarm or **OK** for the sync failure. Tap the button to\
    \ delay or dismiss the notification.\n\n**TIP:** If you’re concerned about privacy\
    \ and don’t like the idea of anyone being able to see your personal e-mails, texts,\
    \ and other messages or alerts on your **Lock** screen, then you can turn them\
    \ off in the **Settings** app (see the “Configuring Notification Center” section\
    \ later in this chapter).\n\n#### In-App Notifications\n\nWhen your iPhone is\
    \ unlocked and you’re busy using it, a new notification that comes in will animate\
    \ briefly at the top part of the screen, and then rotate down to display the notification.\
    \ This will happen no matter where you are, from the **Home** screen, to the built-in\
    \ **Phone** app, to your favorite video game. The notification covers only a few\
    \ pixels at the very top, so it shouldn’t get in the way of what you’re doing\
    \ (or playing). There are two things you can do with an in-app notification:\n\
    \n![images](images/U0122.jpg)\n\n* Ignore it and it will rotate back up and disappear.\
    \ (Don’t worry: You can see the notification again by clicking the **Notification\
    \ Center** pull-down menu, as described later in this chapter.)\n* Tap the notification\
    \ and you’ll be taken straight to the associated app to see the full message.\
    \ For example, it will take you to the **Mail** app to read an e-mail or the **Messages**\
    \ app to reply to an SMS text.\n\n#### The Notification Center\n\nAny time your\
    \ iPhone is unlocked, you can swipe down from the very top of the screen to pull\
    \ down the **Notification Center** options. Notification Center combines a very\
    \ limited number of *widgets* (two at the time of writing) and a list of notifications\
    \ similar to what you see on the **Lock** screen.\n\nTo get rid of Notification\
    \ Center, swipe back up from the bottom of the screen.\n\nThe two widgets available\
    \ at the time of writing are **Weather** and **Stocks**:\n\n![images](images/U0123.jpg)\n\
    \n* The **Weather** widget displays the local weather for an area (if location-based\
    \ weather is enabled) or whatever city you have set as first in the built-in **Weather**\
    \ app (if location-based weather is turned off or unavailable). It also shows\
    \ the high, low, and current temperature for the day. Tapping anywhere on the\
    \ widget will take you to the **Weather** app.\n* The **Stocks** widget shows\
    \ a ticker of the stocks you follow, along with their recent market cap and an\
    \ arrow showing recent losses or gains. The ticker will contain all stocks you\
    \ currently have set up in the built-in **Stocks** app. Tapping anywhere on the\
    \ widget will take you to the **Stocks** app.\n\nNotification Center listings\
    \ are available for the following apps and services:\n\n* **Calendar**\n* **Reminders**\n\
    * **Phone** (missed calls, voice mail)\n* **Messages** (SMS/MMS/iMessage)\n* **Mail**\n\
    * Game Center\n* Any additional apps or services you install that use notifications\
    \ (e.g., social networks like Twitter, breaking news apps like **CNN**, and task\
    \ managers like OmniFocus)\n\nThe notification list is divided by app, with a\
    \ header bar for each app. On the left of the header bar is the *app icon*, followed\
    \ by the *app name*. At the right of the header bar, you can see an **X** icon.\
    \ Tapping the **X** icon clears all notifications for that app. For example, tapping\
    \ the **X** to the right of the **Mail** icon will clear all e-mail notifications;\
    \ however, this won’t clear any other notifications.\n\n![images](images/U0124.jpg)\n\
    \nBelow a header, you will see all current (unread) notifications for that app,\
    \ along with the time they were received, who they came from (if applicable) and\
    \ a preview of their contents. For example, you might see a list of recent Facebook\
    \ messages or Game Center challenges. Tapping anywhere on any of the notifications\
    \ in the list will switch you to the associated app and show you the full message.\n\
    \n![images](images/U0125.jpg)"
  raw: "#### Lock Screen Info\n\nNotifications on the **Lock** screen are displayed\
    \ in two different ways: as a popup with the single, newest notification and as\
    \ a pull-down list of all recent notifications.\n\nIf you receive a single notification\
    \ while your iPhone is locked, the screen will turn on, and it will appear in\
    \ a black box in the center of your **Lock** screen. It will also show an icon\
    \ on the left that represents the app associated with that type of notification.\
    \ For example, an e-mail message will show the **Mail** app icon to the left;\
    \ an SMS text message will show the **Messages** icon; a missed call will show\
    \ the **Phone** icon; a Facebook notice will show the **Facebook** icon; and so\
    \ on. There are several things you can do from here:\n\n*   Ignore the notification.\
    \ This will cause your alert to fade away, and your iPhone’s screen will go back\
    \ to sleep.\n\n    ![images](images/U0120.jpg)\n\n*   Grab the handle (the three\
    \ gray lines right below the time and date) and drag it down to see a list of\
    \ all the notifications you’ve received since the last time you unlocked your\
    \ iPhone. The list will be sorted by notification type, so all e-mail messages\
    \ will be grouped together, as will all calendar events, all missed phone calls,\
    \ and so on. To the left of each notification, you will also see the appropriate\
    \ icon for each alert.\n\n    **NOTE:** If you don’t see the handle, it’s because\
    \ you don’t have any recent notifications.\n\n*   From either the single notification\
    \ box or the list, tap the icon to the left of the notification and **Slide to\
    \ Read** (or listen) to the notification, just as you would normally **Slide to\
    \ Unlock** your iPhone. In most cases, you’ll be taken straight to the appropriate\
    \ app with the full notification displayed. For example, touching the **Mail**\
    \ app icon and sliding it will unlock your iPhone, switch to the **Mail** app,\
    \ and load up the e-mail you just received.\n\n![images](images/U0121.jpg)\n\n\
    **NOTE:** A few notifications—such as alarms and system messages like iTunes sync\
    \ failures—might also show you a button to the left of the notification, such\
    \ as **Snooze** for the alarm or **OK** for the sync failure. Tap the button to\
    \ delay or dismiss the notification.\n\n**TIP:** If you’re concerned about privacy\
    \ and don’t like the idea of anyone being able to see your personal e-mails, texts,\
    \ and other messages or alerts on your **Lock** screen, then you can turn them\
    \ off in the **Settings** app (see the “Configuring Notification Center” section\
    \ later in this chapter).\n\n#### In-App Notifications\n\nWhen your iPhone is\
    \ unlocked and you’re busy using it, a new notification that comes in will animate\
    \ briefly at the top part of the screen, and then rotate down to display the notification.\
    \ This will happen no matter where you are, from the **Home** screen, to the built-in\
    \ **Phone** app, to your favorite video game. The notification covers only a few\
    \ pixels at the very top, so it shouldn’t get in the way of what you’re doing\
    \ (or playing). There are two things you can do with an in-app notification:\n\
    \n![images](images/U0122.jpg)\n\n*   Ignore it and it will rotate back up and\
    \ disappear. (Don’t worry: You can see the notification again by clicking the\
    \ **Notification Center** pull-down menu, as described later in this chapter.)\n\
    *   Tap the notification and you’ll be taken straight to the associated app to\
    \ see the full message. For example, it will take you to the **Mail** app to read\
    \ an e-mail or the **Messages** app to reply to an SMS text.\n\n#### The Notification\
    \ Center\n\nAny time your iPhone is unlocked, you can swipe down from the very\
    \ top of the screen to pull down the **Notification Center** options. Notification\
    \ Center combines a very limited number of *widgets* (two at the time of writing)\
    \ and a list of notifications similar to what you see on the **Lock** screen.\n\
    \nTo get rid of Notification Center, swipe back up from the bottom of the screen.\n\
    \nThe two widgets available at the time of writing are **Weather** and **Stocks**:\n\
    \n![images](images/U0123.jpg)\n\n*   The **Weather** widget displays the local\
    \ weather for an area (if location-based weather is enabled) or whatever city\
    \ you have set as first in the built-in **Weather** app (if location-based weather\
    \ is turned off or unavailable). It also shows the high, low, and current temperature\
    \ for the day. Tapping anywhere on the widget will take you to the **Weather**\
    \ app.\n*   The **Stocks** widget shows a ticker of the stocks you follow, along\
    \ with their recent market cap and an arrow showing recent losses or gains. The\
    \ ticker will contain all stocks you currently have set up in the built-in **Stocks**\
    \ app. Tapping anywhere on the widget will take you to the **Stocks** app.\n\n\
    Notification Center listings are available for the following apps and services:\n\
    \n*   **Calendar**\n*   **Reminders**\n*   **Phone** (missed calls, voice mail)\n\
    *   **Messages** (SMS/MMS/iMessage)\n*   **Mail**\n*   Game Center\n*   Any additional\
    \ apps or services you install that use notifications (e.g., social networks like\
    \ Twitter, breaking news apps like **CNN**, and task managers like OmniFocus)\n\
    \nThe notification list is divided by app, with a header bar for each app. On\
    \ the left of the header bar is the *app icon*, followed by the *app name*. At\
    \ the right of the header bar, you can see an **X** icon. Tapping the **X** icon\
    \ clears all notifications for that app. For example, tapping the **X** to the\
    \ right of the **Mail** icon will clear all e-mail notifications; however, this\
    \ won’t clear any other notifications.\n\n![images](images/U0124.jpg)\n\nBelow\
    \ a header, you will see all current (unread) notifications for that app, along\
    \ with the time they were received, who they came from (if applicable) and a preview\
    \ of their contents. For example, you might see a list of recent Facebook messages\
    \ or Game Center challenges. Tapping anywhere on any of the notifications in the\
    \ list will switch you to the associated app and show you the full message.\n\n\
    ![images](images/U0125.jpg)"
  trans: "\n#### 锁定屏幕信息\n\n**锁定**屏幕上的通知以两种不同方式显示：作为弹出窗口显示单条最新通知，以及作为下拉列表显示所有近期通知。\n\
    \n如果在 iPhone 锁定时收到单条通知，屏幕会亮起，该通知将出现在**锁定**屏幕中央的黑色方框中。同时，通知左侧会显示一个与该类型通知关联的应用图标。例如，电子邮件会显示**邮件**应用图标；短信会显示**信息**图标；未接来电会显示**电话**图标；Facebook\
    \ 通知会显示**Facebook**图标，以此类推。此时，你可以执行以下几种操作：\n\n* 忽略该通知。这会使你的提醒消失，iPhone 屏幕将重新进入待机状态。\n\
    \n  ![images](img/U0120.jpg)\n\n* 抓住滑块（时间与日期正下方的三条灰色横线）并向下拖动，即可查看自上次解锁 iPhone\
    \ 以来收到的所有通知列表。列表按通知类型排序，因此所有电子邮件会归为一组，所有日历事件、所有未接来电等亦如此。每条通知左侧，你还会看到相应的图标。\n\n\
    \  **注意：** 如果你没有看到滑块，那是因为你没有近期通知。\n\n* 无论是在单条通知框还是列表中，点击通知左侧的图标，然后**滑动以查看**（或收听）该通知，就像你通常**滑动以解锁**\
    \ iPhone 一样。大多数情况下，你会被直接带到相应的应用，并显示完整的通知内容。例如，点击**邮件**应用图标并滑动，将解锁 iPhone、切换到**邮件**应用，并加载你刚刚收到的电子邮件。\n\
    \n![images](img/U0121.jpg)\n\n**注意：** 少数通知（如闹钟和系统消息，例如 iTunes 同步失败）可能还会在通知左侧显示一个按钮，例如闹钟的**稍后提醒**或同步失败的**确定**。点击按钮可延迟或解除通知。\n\
    \n**提示：** 如果你担心隐私问题，不想让任何人看到**锁定**屏幕上的个人电子邮件、短信或其他消息或提醒，可以在**设置**应用中将其关闭（请参阅本章后面的“配置通知中心”部分）。\n\
    \n#### 应用内通知\n\n当 iPhone 解锁且你正在使用时，新收到的通知会短暂地在屏幕顶部以动画形式出现，然后旋转向下显示通知。无论你处于**主屏幕**、内置**电话**应用还是心爱的视频游戏中，都会如此。通知仅覆盖顶部几个像素，因此不会妨碍你正在做的事情（或游戏）。对于应用内通知，你可以执行两种操作：\n\
    \n![images](img/U0122.jpg)\n\n* 忽略它，它会旋转向上并消失。（别担心：你可以通过点击**通知中心**下拉菜单再次查看该通知，后续章节会介绍此功能。）\n\
    * 点击通知，你会被直接带到关联的应用以查看完整消息。例如，点击后你会被带到**邮件**应用阅读电子邮件，或进入**信息**应用回复短信。\n\n####\
    \ 通知中心\n\n任何时候当 iPhone 解锁时，你都可以从屏幕最顶部向下滑动，拉出**通知中心**选项。通知中心结合了数量极为有限的*小组件*（撰写本文时有两个）以及一个与**锁定**屏幕所见类似的通知列表。\n\
    \n要关闭通知中心，从屏幕底部向上滑动即可。\n\n撰写本文时可用的两个小组件是**天气**和**股票**：\n\n![images](img/U0123.jpg)\n\
    \n* **天气**小组件显示某个地区的当地天气（如果启用了基于位置的天气），或者显示你在内置**天气**应用中设置为第一个的城市天气（如果基于位置的天气已关闭或不可用）。它还会显示当天的最高、最低和当前温度。点击小组件上的任意位置，你会被带到**天气**应用。\n\
    * **股票**小组件显示你关注的股票行情，包括其近期市值以及显示近期涨跌的箭头。行情列表包含你在内置**股票**应用中当前设置的所有股票。点击小组件上的任意位置，你会被带到**股票**应用。\n\
    \n通知中心列表可用于以下应用和服务：\n\n* **日历**\n* **提醒事项**\n* **电话**（未接来电、语音邮件）\n* **信息**（短信/彩信/iMessage）\n\
    * **邮件**\n* Game Center\n* 你安装的、使用通知的任何其他应用或服务（例如 Twitter 等社交网络、**CNN** 等突发新闻应用，以及\
    \ OmniFocus 等任务管理器）\n\n通知列表按应用划分，每个应用有一个标题栏。标题栏左侧是*应用图标*，后面跟着*应用名称*。标题栏右侧，你可以看到一个\
    \ **X** 图标。点击 **X** 图标可清除该应用的所有通知。例如，点击**邮件**图标右侧的 **X** 将清除所有电子邮件通知；但这不会清除任何其他通知。\n\
    \n![images](img/U0124.jpg)\n\n在标题栏下方，你会看到该应用的所有当前（未读）通知，包括收到时间、发送者（如适用）以及内容预览。例如，你可能会看到最近的\
    \ Facebook 消息或 Game Center 挑战列表。点击列表中任何通知上的任意位置，都会切换到关联应用并显示完整消息。\n\n![images](img/U0125.jpg)\n"
- fmt: "### Configuring Notification Center\n\nNotification Center can be easily configured\
    \ via the `Settings` app:\n\n1. Tap the `Settings` app icon on the `Home` screen.\n\
    2. Tap `Notifications`.\n\nNotification Center can organize notifications **By\
    \ Time** (widgets on top, then in order of the most recent notifications), or\
    \ you can organize them **Manually**. Follow these steps to manually reorganize\
    \ your notifications:\n\n1. Under **Sort Apps**, tap `Manually`.\n2. At the top\
    \ right of the screen, tap the `Edit` button.\n3. Handles in the form of three\
    \ gray, horizontal stripes will appear to the right of each app. Grab the handles\
    \ and drag the apps up or down to put them in the order you like best.\n4. When\
    \ you’ve got all the apps in just the order you want them, tap the blue `Done`\
    \ button at the top right of the screen.\n\n![images](images/U0126.jpg)\n\nTo\
    \ show or hide the `Weather` or `Stock` widget, tap either widget to toggle it\
    \ `ON` or `OFF`, as desired.\n\nTo choose how the notification lists work, follow\
    \ these steps:\n\n1. Tap the app you want to edit (e.g., `Mail`).\n2. Switch the\
    \ `Notification Center` toggle to `OFF` to remove the app from Notification Center\
    \ completely. Toggle it to `ON` to put it back.\n3. Choose to `Show` the number\
    \ of notifications you prefer in the list. At the time of writing, the choices\
    \ were limited to **1 Unread Item**, **5 Unread Items**, and **10 Unread Items**.\n\
    4. Choose the `Alert Style` of the in-app notification you’d prefer.\n    - `None`\
    \ means you’ll never see an alert.\n    - `Banner` means you’ll get the subtle,\
    \ animated notification at the top of the screen that won’t interrupt you. This\
    \ option lets you ignore the notification, if you so desire, which is useful for\
    \ most communication notifications like e-mail, SMS, Facebook, and so on.\n  \
    \  - `Alert` means you’ll get a pop-up box that you can’t ignore. You will either\
    \ have to manually dismiss it or act on it right away. This is useful for alarms,\
    \ appointments, and other urgent matters.\n\n![images](images/U0127.jpg)\n\nYou\
    \ can also set several other options related to notifications:\n\n- `Badge App\
    \ Icon`: This option adds a little red circle to the top right of `Home` screen\
    \ icons. This red circle indicates how many unread notifications each app contains.\
    \ For example, the number 10 on the `Mail` icon means you have 10 unread e-mail\
    \ messages waiting for you. You can toggle this feature to `OFF` if you would\
    \ rather not see them or to `ON` if you want them displayed.\n- `Sounds`: This\
    \ option lets you turn audio (and vibration) alerts for incoming notifications\
    \ on or off. If a notification is urgent, like SMS, you might want to keep sounds\
    \ toggled `ON`.\n- `Show Preview`: This option adds the first few lines of a message\
    \ associated with a notification, so you can get the gist of it at a glance. This\
    \ feature enables you to see a notification’s contents without sliding to tap\
    \ through to the app, so you can read the whole thing. If privacy is more of a\
    \ concern, you might want to toggle this feature to `OFF`.\n- `View in Lock Screen`:\
    \ This option allows you to turn notifications on or off from the `Lock` screen.\
    \ Again, if privacy is an issue, you might want to toggle this feature to `OFF`.\n\
    \n**NOTE:** Not all apps have the same options in Notification Center. For example,\
    \ some may offer sound alerts, while others do not.\n\nWhen you turn off notifications\
    \ for a specific app, it gets put in a separate list under `Settings` called *Not\
    \ in Notification Center*. This lets you easily see which apps are—and aren’t—sending\
    \ you notifications.\n\n### Accessibility Options For Notification Center\n\n\
    Apple provides various Accessibility options for people with special visual or\
    \ hearing needs, including Custom Vibrations and LED Flash for Alerts.\n\nFollow\
    \ these steps to enable Accessibility options for Notifications:\n\n1. Tap the\
    \ `Settings` icon.\n2. Tap `General`.\n3. Tap `Accessibility` near the bottom\
    \ of the page.\n4. Toggle `Custom Vibrations` to `ON` to assign unique vibration\
    \ patterns to your Contacts (patterns can be created in the `Sound Preferences`).\n\
    5. Toggle `LED Flash for Alerts` to `ON` to make the camera flash go off when\
    \ a notification comes in.\n\n![images](images/U0128.jpg)\n\n## Chapter 2\n\n\
    ## Typing, Copy, and Search\n\nIn this chapter, we will show you some good ways\
    \ to type on your iPhone and save valuable time when doing so. Along the way,\
    \ we’ll show you how to use the `Portrait` (vertical/smaller) and `Landscape`\
    \ (horizontal/larger) keyboards. We will also teach you how to select different\
    \ language keyboards, how to type symbols, and other tips.\n\nLater in this chapter,\
    \ we will tell you about the Spotlight search and the Copy and Paste function.\
    \ The Copy and Paste function will save you lots of time, as well as increase\
    \ your accuracy when working with your iPhone.\n\n### Typing on Your iPhone\n\n\
    You will quickly find two on-screen keyboards on your iPhone: the smaller `Portrait`\
    \ keyboard that’s visible when you hold your iPhone in a vertical orientation\
    \ and the larger `Landscape` keyboard that’s visible when you hold the iPhone\
    \ in a horizontal orientation. The nice thing is that you can choose whichever\
    \ keyboard works best for you.\n\n#### Typing on the Screen with Two Thumbs\n\n\
    You will find when you first start out with your iPhone that you can most easily\
    \ type with one finger—usually your index finger—while holding the iPhone with\
    \ the other hand.\n\n![images](images/U0201.jpg)\n\nAfter a little while, you\
    \ should be able to experiment with thumb typing (as you see so many people doing\
    \ with other phones, such as the BlackBerry smartphones). Once you practice a\
    \ little, typing with two thumbs instead of a single finger will really boost\
    \ your speed. Just be patient: it does take practice to become proficient typing\
    \ quickly with your two thumbs.\n\nYou will actually notice after a while that\
    \ the keyboard touch sensitivity assumes you are typing with two thumbs. What\
    \ this means is that the letters on the left side of your keyboard are meant to\
    \ be pressed on their left side, and the keys on the right are meant to be pressed\
    \ on their right side.\n\nSimply turning the iPhone sideways in many apps will\
    \ cause the keyboard to change to the larger `Landscape` keyboard, which makes\
    \ it easier to type.\n\n![images](images/U0202.jpg)\n\n**TIP:** If you have larger\
    \ hands and find typing on the smaller, vertical keyboard challenging, then flip\
    \ your iPhone on its side to get the larger, `Landscape` keyboard.\n\n#### Type\
    \ Quick Phrases with Shortcuts\n\nOne nice feature on your iPhone is the ability\
    \ to set up shortcuts for typing common phrases or even a few sentences like directions\
    \ to your home or office.\n\n**TIP:** Use Shortcuts to save time when typing common\
    \ phrases on your iPhone. You can even use Shortcuts to type a few sentences like\
    \ steps to get to your home or something you type frequently.\n\nAccess shortcuts\
    \ in the `Settings` app. Tap the `Settings` icon, then `General`, then `Keyboard`\
    \ and swipe to the bottom of the screen to see available Shortcuts.\n\nApple has\
    \ supplied you with an example shortcut for `omw`. When you type `omw` on your\
    \ iPhone, you will see that the pop-up shows the phrase “On my way!”\n\n![images](images/U0203.jpg)\n\
    \nTap `Add New Shortcut` to create a new one.\n\n![images](images/U0204.jpg)\n\
    \n![images](images/U0205.jpg)\n\nType the `Phrase` which will replace the shortcut,\
    \ then type the `Shortcut` itself. In this example, we want a shortcut to type\
    \ directions to our home. So our `Shortcut` is `dirh` and the Phrase is step by\
    \ step directions to get to our house. Save your new shortcut and give it a try."
