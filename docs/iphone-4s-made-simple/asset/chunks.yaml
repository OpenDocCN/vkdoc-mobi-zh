  trans: "\n#### 连接立体声蓝牙设备\n\n使用立体声蓝牙的第一步是连接一台支持立体声蓝牙的设备。这可以是内置该技术的汽车音响、一副蓝牙耳机或蓝牙音箱，甚至是\
    \ Jawbone Jambox 这类较新的耳机。\n\n首先，按照制造商的说明将蓝牙设备置于配对模式，然后从`设置`图标进入蓝牙设置页面，如本章前面所示。\n\
    \n![images](img/U0515.jpg)\n\n![images](img/U0516.jpg)\n\n连接成功后，你会看到新的立体声蓝牙设备列在你的蓝牙设备列表中。有时你会看到设备名称或名称的一部分；其他时候你只会看到`耳机`。点击设备右侧的`箭头`图标，你将在下一个屏幕的`蓝牙`选项卡旁边看到设备的实际名称，如下图所示。\n\
    \n接下来，打开你的`音乐`应用，开始播放任意歌曲、播放列表、播客或视频音乐库。\n\n按照以下步骤选择你的音频输出设备：\n\n1. 点击屏幕右下角的蓝色`AirPlay`图标。\n\
    2. 从可用设备列表中选择用于流媒体播放音乐的设备。\n3. 要将音乐播放切回你的 iPhone，只需再次点击`AirPlay`图标，然后从列表中选择`iPhone`。\n\
    \n![images](img/U0517.jpg)\n\n![images](img/U0518.jpg)\n\n**注意**：点击`AirPlay`图标会弹出一个列表，其中包含通过蓝牙和\
    \ Wi-Fi 连接的音频设备，例如 Apple TV 或 AirPort Express 连接的音箱。你可以从中任选其一。\n\n我们通过点击选择了 Jawbone\
    \ JAMBOX。现在，你的音乐将从选定的蓝牙设备开始播放。你可以再次触摸屏幕上的`AirPlay`图标来验证这一点。你会在新的立体声蓝牙设备旁边看到一个`勾选`图标，同时你也会听到音乐从该音源播放出来。\n\
    \n### 断开或忽略蓝牙设备\n\n有时，你可能想断开 iPhone 与蓝牙设备的连接。这很容易操作。像本章前面所做的那样进入蓝牙设置。接着，触摸你想断开的设备，进入下一个屏幕，点击`忽略此设备`按钮，然后确认你的选择。\n\
    \n这将从 iPhone 中删除该蓝牙配置文件（见图 5–5）。\n\n**注意**：蓝牙的有效范围只有大约 30 英尺（约 9 米）。如果你不在蓝牙设备附近，则应关闭蓝牙。当你准备好使用时，随时可以重新打开它。\n\
    \n![images](img/0505.jpg)\n\n**图 5–5.** *忽略或断开蓝牙设备*\n\n## 第 6 章\n\n## 图标与文件夹\n\
    \n你的新 iPhone 非常个性化。在本章中，我们将向你展示如何移动图标，并将你最喜欢的图标放在你想要的位置。你最多可以有 11 页图标可供使用，并且你可以调整这些页面的外观，使其反映你的品味。\n\
    \n与 Mac 电脑或 iPad 一样，iPhone 有一个*底部程序坞*，你可以将最喜欢应用的图标放在里面。iPhone 出厂时底部程序坞中有四个标准图标。你可以用最喜欢应用的图标替换这些默认图标，这样它们就始终位于屏幕底部。你甚至可以将整个应用文件夹移动到底部程序坞。\n\
    \n**提示**：你也可以使用电脑上的`iTunes`应用来移动或删除图标。请参阅第 22 章：`设备上的 iTunes`以获取更多信息。\n\n### 将图标移至底部程序坞\n\
    \n当你打开 iPhone 时，会注意到底部程序坞中锁定着四个图标。\n\n假设你决定要用自己更常用的应用来替换其中的一个或多个图标。幸运的是，将图标移入或移出底部程序坞非常简单。\n\
    \n![images](img/U0601.jpg)\n\n#### 开始移动\n\n按下`主屏幕`按钮进入你的`主屏幕`。然后触摸并按住`主屏幕`上的任意图标几秒钟。你会注意到所有图标都开始晃动。\n\
    \n先试着移动几个图标。你会看到，当你将一个图标向下移动时，该行中的其他图标会移动为其腾出空间。\n\n一旦你掌握了图标移动的方法，就可以准备替换底部程序坞中的一个图标了。在图标晃动时，将你想从底部程序坞替换的图标向上移动到一个被其他图标覆盖的区域。（如果你将其移动到一个空白区域，它只会直接跳回底部程序坞）。\n\
    \n**注意**：底部程序坞中最多可以放置四个图标；所以，如果那里已经有四个图标，你必须移除一个才能用新图标替换它。\n\n例如，假设你想用`Skype`图标替换我们例子中的`App\
    \ Store`图标，因为你希望随时方便地用`Skype`与在外上大学的孩子通话。首先要做的是从底部程序坞中移除`App Store`图标，以便腾出空间，如图\
    \ 6–1 所示。\n\n![images](img/0601.jpg)\n\n**图 6–1.** *在底部程序坞中交换图标*\n\n接下来，找到你的`Skype`图标并将其向下移动到底部程序坞。你会看到，在你实际将其放置到位之前，该图标会变成半透明状态。\n\
    \n当你确定图标已经放到了你想要的位置后，只需按一次`主屏幕`按钮，图标就会锁定到位。此时，底部程序坞中就有了`Skype`图标，你可以轻松地开始与上大学的孩子们进行视频通话。\n\
    \n### 将图标移动到不同的图标页面\n\niPhone 每页可以容纳 16 个图标（不包括程序坞）。你可以通过在`主屏幕`上滑动（从右向左）来浏览这些页面。有了这么多炫酷的应用，拥有五页、六页甚至更多页图标是很常见的。如果你有冒险精神，最多可以装满\
    \ 11 页图标！\n\n**注意**：你也可以通过在任何屏幕（`主屏幕`除外）上从左向右滑动来导航到新页面。在`主屏幕`上，从左向右滑动会进入`聚焦搜索`；请参阅第\
    \ 2 章：`键入、复制与搜索`以获取更多信息。\n\n你可能在第一页有一个很少使用的图标，想把它移到最后面的一页。或者你可能想将一个常用图标从最后一页移到第一页。这两项任务都非常简单；实际上，这与将图标移到底部程序坞非常相似：\n\
    \n1. 触摸并按住任意图标以启动移动过程。\n2. 触摸并按住你要移动的图标。例如，假设我们要将`iBooks`图标移动到第一页（见图 6–2）。\n\n\
    \    ![images](img/0602.jpg)\n\n    **图 6–2.** *将图标从一页移动到另一页*\n\n3. 现在将图标拖放到另一个页面。为此，触摸并按住`iBooks`图标并将其向左拖动。你会看到你的所有图标页面依次滑过。当你到达第一页时，只需松开图标，它现在就被放置在开头位置。\n\
    4. 按下`主屏幕`按钮以完成移动并停止图标晃动。"
- fmt: "### Deleting Icons\n\nBe careful—it is as easy to delete an icon as it is\
    \ to move it. And when you delete an icon on the iPhone, you are actually deleting\
    \ the program it represents. This means you won’t be able to use the program again\
    \ without reinstalling or redownloading it.\n\nDepending on your Application Sync\
    \ settings in the `iTunes` app, the program may still reside in your Applications\
    \ folder in iTunes. In that case, you would be able to reinstall the deleted app\
    \ simply by checking that application in the list of apps to sync in iTunes.\n\
    \nAs [Figure 6–3](#Chapter06.html#fig_6_3) shows, the process to delete an icon\
    \ is similar to the process for moving it. Touch and hold any icon to initiate\
    \ the deletion process. Just as before, touching and holding makes the icons shake\
    \ and allows you to move or delete them.\n\n**NOTE**: You may delete only programs\
    \ you have downloaded to your iPhone; the preinstalled icons and their associated\
    \ programs can’t be deleted. You can tell which programs can be deleted because\
    \ the icons for apps that can be deleted contain a small black `x` in the upper-left\
    \ corner.\n\nJust tap the `x` on the icon you’d like to delete. You will be prompted\
    \ to either `Delete` the icon or `Cancel` the delete request. If you touch `Delete`,\
    \ the icon and its related app will be removed from your iPhone.\n\n**NOTE:**\
    \ If you delete an icon such as a game where your progress has been tracked and\
    \ saved, your progress will be erased when you delete that game.\n\n![images](images/0603.jpg)\n\
    \n**Figure 6–3.** *Deleting an icon and its associated program*\n\n### Resetting\
    \ All Your Icon Locations (Factory Defaults)\n\nOccasionally, you might want to\
    \ go back to the original, factory default icon settings. This might be the case\
    \ when you’ve moved too many new icons to your first page and want to see all\
    \ the basic icons again.\n\nTo do this, touch the `Settings` icon. Next, touch\
    \ `General`, finally, scroll all the way to the bottom to touch `Reset`.\n\n![images](images/U0602.jpg)\n\
    \n**NOTE**: Built-in apps will be restored to the same order they were in when\
    \ Apple shipped the iPhone.\n\nOn the `Reset` screen, touch `Reset Home Screen\
    \ Layout` near the bottom. Now all your icons will be returned to their original\
    \ settings.\n\n**CAUTION**: Be careful you don’t touch one of the other `Reset`\
    \ options, as you can inadvertently erase your entire iPhone if you touch the\
    \ wrong button. If you do, you’ll have to restore data from your iTunes backup.\n\
    \n![images](images/U0603.jpg)\n\n### Working with Folders\n\nYour iPhone lets\
    \ you organize your apps into folders. When you download new apps, they take up\
    \ a spot on your `Home` page. Once you download many apps, it can become hard\
    \ to find apps and keep them organized.\n\nUsing folders will allow you to keep\
    \ your games, your productivity apps, and other like-functioning apps together\
    \ in folders. Each folder can hold up to 12 apps—which can really help you organize\
    \ your iPhone!\n\n![images](images/U0604.jpg)\n\n#### Creating the Folder\n\n\
    Creating folders is intuitive and fun:\n\n1.  Hold down an app until all the apps\
    \ start shaking (as you did before in the “Moving Icons” section).\n2.  Drag an\
    \ app onto another like-functioning app. For example, drag one productivity app\
    \ onto another similar app. The iPhone will initially create a name for the folder.\n\
    3.  In this example, we dragged all three of the Apple productivity apps (`Numbers`,\
    \ `Keynote` and `Pages`) on top of one another, and the iPhone created a folder\
    \ called “Productivity.”\n4.  You can edit the folder name by touching the `Name`\
    \ field and typing a new name. (see [Figure 6–4](#Chapter06.html#fig_6_4)).\n\
    5.  Press the `Home` button to set the new folder name.\n6.  Press the `Home`\
    \ button again to return to the `Home` screen. At this point, you will see the\
    \ new folder with its new name.\n\n**NOTE:** You can place up to 12 app icons\
    \ in a given folder. If you try to put more than that in a folder, you will see\
    \ the new icon continually being “pushed” out of the folder. This animation indicates\
    \ that the folder is full.\n\n![images](images/0604.jpg)\n\n**Figure 6–4.** *Moving\
    \ icons to create a folder and renaming it.*\n\n#### Moving Folders\n\nJust like\
    \ apps, folders can also be moved from one `Home` page to another:\n\n1.  Press\
    \ and hold a folder until the folder and icons on the `Home` screen start to shake.\n\
    2.  Touch and hold the folder and drag it to your preferred spot on the screen\
    \ (or to another `Home` screen), and then let go.\n3.  When you have the folder\
    \ in the spot you desire, just press the `Home` button to complete the move.\n\
    \n**TIP:** You can even move a folder down to the Bottom Dock if you like. This\
    \ is a very handy way of having lots of apps right at your fingertips (see [Figure\
    \ 6–5](#Chapter06.html#fig_6_5)).\n\n![images](images/0605.jpg)\n\n**Figure 6–5.**\
    \ *Moving a folder to the Bottom Dock*\n\n## Chapter 7\n\n## Multitasking and\
    \ Siri\n\nIn this chapter, we will describe how to multitask and jump between\
    \ apps on your iPhone. Multitasking means you can leave one app running in the\
    \ background while you do something else, such as stream Internet radio, listen\
    \ to turn-by-turn directions, or take Skype calls.\n\nWe’ll also introduce you\
    \ to Apple’s revolutionary Siri service, an artificially intelligent “assistant”\
    \ that will listen to your voice commands and then send your messages, book your\
    \ appointments, and search for the information you need—when you need it.\n\n\
    ### Fast App Switching\n\nThe *Fast App Switcher* enables you to leave many of\
    \ your apps running in the background. It also lets you switch from the current\
    \ app to another without stopping the app you’re currently using.\n\nYou might\
    \ wonder when it might make sense to use the Fast App Switcher. Here are a few\
    \ scenarios when you might want to consider using multitasking on your iPhone:\n\
    \n*   Copy and paste from one app (`Mail`) to another (`Calendar`).\n*   Answer\
    \ a phone call or reply to an `SMS` message while playing a game, and then jump\
    \ back into that game without missing a beat.\n*   Continue listening to Internet\
    \ radio (such as `Pandora` or `Slacker`) while checking your email or browsing\
    \ the Web.\n*   Forego waiting for photos to upload to Facebook or Flikr; your\
    \ photos can be running in the background while you go and do other things on\
    \ your iPhone.\n*   Use `Skype` to call people—now you can leave it running in\
    \ the background to receive incoming calls (this was not possible before).\n\n\
    #### Jumping Between Apps\n\nIn order to multitask, you need to bring up the Fast\
    \ App Switcher bar at the bottom of the screen.\n\n1.  From any app or even the\
    \ Home screen, double-click the Home button to bring up the Fast App Switcher\
    \ bar at the bottom of your screen.\n\n    ![images](images/U0701.jpg)\n\n2. \
    \ All open apps will be shown on the Fast App Switcher bar.\n3.  Swipe right or\
    \ left to find the app you want and tap it.\n4.  If you don’t see the app you\
    \ want on the Fast App Switcher bar, then press the Home button and start it from\
    \ the Home screen.\n5.  Double-click the `Home` button again and tap the app you\
    \ just left to jump back to it.\n\n![images](images/U0702.jpg)"
