- fmt: "# Viewing Videos\n\nThe iPhone gives you an amazing platform to enjoy videos,\
    \ TV shows and movies. Nowhere is this more apparent than in the various video-viewing\
    \ applications available.\n\nIn this chapter, we will show you how you can watch\
    \ movies, TV shows, podcasts, and music videos on your iPhone.\n\nYou can buy\
    \ or download many videos for free from the iTunes store or iTunes University.\
    \ You can also link your iPhone to your Netflix account (and most likely other\
    \ video rental services soon), allowing you to watch streaming TV shows and movies.\n\
    \nWith your iPhone, you can also watch YouTube videos and videos from the Web\
    \ on your `Safari` browser and through various apps from the App Store.\n\n**NOTE:**\
    \ At the time of publishing, the `Netflix` app was only available in the U.S.\
    \ and Canada. We hope similar apps will make their way to the broader international\
    \ market.\n\n## Your iPhone as a Video Player\n\nThe iPhone is more than a capable\
    \ music player; it is also a fantastic portable video-playing system. Its widescreen,\
    \ fast processor, incredible pixel density, and great operating system make watching\
    \ anything from music videos to TV shows and full-length motion pictures a real\
    \ joy. The size of the iPhone is perfect for sitting back in a chair or watching\
    \ on an airplane. It is also great for the kids in the back seat of long car trips.\
    \ The near 10-hour battery life means you can even go on a coast-to-coast flight\
    \ and not run out of power! You can also buy a “power inverter” for your car to\
    \ keep the iPhone charged even longer (see the “Charging Your iPhone and Battery\
    \ Tips” section in [Chapter 1](#Chapter01.html#ch1): “Getting Started”).\n\n###\
    \ Loading Videos onto Your iPhone\n\nYou can load videos on your iPhone just like\
    \ your music by using the `iTunes` app on your computer or right from the `iTunes`\
    \ app on your iPhone.\n\nIf you purchase or rent videos from `iTunes` on your\
    \ computer, then you will manually or automatically sync these videos to your\
    \ iPhone.\n\n### Watching Videos on the iPhone\n\nTo watch videos, simply tap\
    \ your `Videos` app.\n\n**NOTE:** You can also watch videos from the `YouTube`\
    \ app, the `Safari` app, and other video-related apps you load from the App Store.\n\
    \n![images](images/U1501.jpg)\n\n### Video Categories\n\nEach section of the `Videos`\
    \ app under the `Video` tab in the `iPod` app is separated by horizontal bars\
    \ with one of several possible category names inside the bar: `Movies`, `TV Shows`,\
    \ `Podcasts`, and `Music Videos`. The first category is the `Movies` section;\
    \ these will be visible if you have movies loaded on the iPhone.\n\nYou may see\
    \ more or fewer categories depending on the types of videos you have loaded on\
    \ your iPhone. If you have only `Movies` and `iTunes U` videos, then you will\
    \ see only those two category buttons. Just scroll up or down to show the corresponding\
    \ videos in that category.\n\n![images](images/U1502.jpg)\n\n### Searching for\
    \ Videos\n\nIf you have a lot of videos, and other content loaded on your iPhone\
    \ and want to find a particular video, you can do it by following these steps:\n\
    \n1.  Tap the time at the very top of your screen to jump to the search box.\n\
    \n    ![images](images/U1503.jpg)\n\n2.  Type a few letters or a word or two of\
    \ the title of the video.\n3.  In this example we typed “email” to find any videos\
    \ related to using email on our iPhone. Up popped a video tutorial showing how\
    \ to work with email attachments from one of the author's web sites: [www.MadeSimpleLearining.com](http://www.MadeSimpleLearining.com).\n\
    4.  Tap any video that appears in the search results to start playing it.\n\n\
    \    ![images](images/U1504.jpg)\n\n## Playing a Movie\n\nJust tap the movie you\
    \ wish to watch and it will begin to play. Most videos take advantage of the relatively\
    \ large screen real estate of the iPhone by playing in Widescreen (i.e., Landscape)\
    \ mode. Just turn your iPhone on its side to watch them.\n\nA video will begin\
    \ playing automatically. When it first starts, there are no menus, controls, or\
    \ anything else on the screen, except for the video.\n\nYou can tap anywhere on\
    \ the screen to make the control bars and other options become visible. Most options\
    \ in the `Videos` app are very similar to those in the `Music` app. Tap the `Play/Pause`\
    \ button and the video will pause. Tap the `Play`/`Pause` button again and the\
    \ video will resume playing.\n\n### Fast-Forward or Rewind the Video\n\nOn either\
    \ side of the `Play/Pause` button are the usual `Fast-Forward` and `Rewind` buttons.\
    \ To jump to the next chapter-specific part of the video, just touch and hold\
    \ the `Fast-Forward` button (to the right of `Play/Pause`). When you get to the\
    \ desired spot, release the button and the video will begin playing normally.\n\
    \nAfter pressing `Pause` to stop the video, you can press and hold the `Fast-Forward`\
    \ or `Rewind` buttons to do slow motion forward or backward. The fun thing is\
    \ that you can hear the audio slowed down as well.\n\nTo rewind to the beginning\
    \ of the video, tap the `Rewind` button. To rewind to a specific part or location,\
    \ touch and hold as you did while you were fast forwarding the video.\n\n**NOTE:**\
    \ If this is a full-length movie with several chapters, tapping either `Reverse`\
    \ or `Fast-Forward` will move either back or ahead one chapter.\n\n### Using the\
    \ Time Scrubber Bar\n\nAt the top of the video screen is a slider that lets you\
    \ *scrub* through the elapsed time of the video. If you know exactly (or approximately)\
    \ which point in the video you wish to watch, just hold the slider bar and then\
    \ drag it to that location. Some people find this to be a little more exact than\
    \ holding down the `Fast-Forward` or `Rewind` buttons.\n\n![images](images/U1505.jpg)\n\
    \n**TIP:** Drag your finger down to move the slider control more slowly.\n\n###\
    \ Changing the Size of the Video (Widescreen vs. Full Screen)\n\nMost of your\
    \ videos will play in widescreen format. However, if you have a video that was\
    \ not converted for your iPhone or is not optimized for your screen resolution,\
    \ you can touch the `Expand` button, which is to the right of the upper Status\
    \ bar.\n\nYou will notice that there are two arrows on the button. If you are\
    \ in Full Screen mode, the arrows point in, toward each other. If you are in Widescreen\
    \ mode, the arrows point outward.\n\n![images](images/U1506.jpg)\n\nIf a widescreen\
    \ movie is not taking up the full screen of the iPhone, touching this button will\
    \ zoom in a bit. Touching it again will zoom back out.\n\n**NOTE:** You can also\
    \ simply double-tap the screen to zoom in and fill the screen. Be aware that,\
    \ just like on your widescreen TV, trying to force a non-widescreen video into\
    \ Widescreen mode can sometimes cause you to lose part of the picture.\n\n###\
    \ Using AirPlay\n\nApple's AirPlay mirroring feature lets you beam your video\
    \ to an Apple TV, so you can enjoy it on your big screen TV. Just tap the AirPlay\
    \ button on the bottom right and select Apple TV as your output destination. After\
    \ a few moments, your iPhone screen will go dark and your video will start to\
    \ play on your big screen TV, right where you left off.\n\n![images](images/U1507.jpg)\n\
    \nTo return the video to your iPhone, tap AirPlay again and choose iPhone as the\
    \ destination.\n\n![images](images/U1508.jpg)\n\n**TIP:** If you don't have or\
    \ want an Apple TV, you have a couple other ways to watch your movies. For example,\
    \ you can purchase a VGA or HDMI adapter to plug your iPhone into a VGA computer\
    \ monitor or HDTV.\n\nVGA supports video only, requires that the app support this\
    \ feature, and it isn't usually compatible with DRM. HDMI supports video and audio,\
    \ and it also requires that the app support that feature. However, it's also HDCP-compliant,\
    \ so it will work with DRM content like iTunes videos.\n\nApple also makes component\
    \ video cables that are DRM-compliant and work with most TVs.\n\nSee the “Accessories”\
    \ section of the Quick Start Guide for more information."
