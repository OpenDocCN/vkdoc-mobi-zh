- fmt: "# Press and Hold Keyboard Shortcut for Typing Symbols and More\n\nYou might\
    \ wonder how you can type symbols not shown on the keyboard.\n\n**TIP:** You can\
    \ type more symbols than are shown on the screen.\n\n![images](images/U0218.jpg)\n\
    \nAll you do is press and hold a letter, number, or symbol that is related to\
    \ the symbol you want.\n\nFor example, if you want to type the YEN symbol (¥),\
    \ you press and hold the `$` key until you see the other options. Next, slide\
    \ up your finger to highlight the YEN symbol, and then let go.\n\nThis tip also\
    \ works with the `.com` key in the `Safari` web browser and when typing e-mail\
    \ addresses by pressing and holding the `Period` (`.`) key. You can get additional\
    \ web site suffixes by pressing and holding the `.com` or `Period` keys.\n\n![images](images/U0219.jpg)\n\
    \nThe preceding figure shows the `.co`, `uk`, `.ie`, `.de`, `.ca`, and `.eu` keys.\
    \ These keys are not displayed on the standard US keyboard, but they are present\
    \ in this case because we have installed additional international keyboards. You\
    \ will learn how to enable international keyboards in the “Typing in Other Languages—International\
    \ Keyboards” section later in this chapter.\n\n**TIP: A Few More Useful but Hidden\
    \ Symbols**\n\nThere is a good bullet point character on the `Symbols` keyboard\
    \ just above the `Backspace` key. You can also get a degree symbol if you press\
    \ and hold the `Zero` key (`0`). Also, you can press and hold the `?` and `!`\
    \ keys to get their inverted Spanish cousins.\n\n## Caps Lock\n\nYou double-press\
    \ the `Shift` key to turn on the Caps Lock feature. You know it’s turned on when\
    \ the `Shift` key turns blue. ![images](images/U0220.jpg)\n\nTo turn off Caps\
    \ Lock, simply press the `Shift` key ![images](images/U0221.jpg) again.\n\n##\
    \ Quickly Selecting and Deleting or Changing Text\n\nYou may need to quickly change\
    \ or delete some text you are typing. Follow these steps to do so:\n\n1.  Select\
    \ a part of the text you want to change or delete by double-tapping it.\n\n  \
    \  ![images](images/U0222.jpg)\n\n2.  Adjust the selection by dragging the blue\
    \ handles.\n\n    ![images](images/U0223.jpg)\n\n3.  To erase the selected text,\
    \ press the `Backspace` key. ![images](images/U0225.jpg)\n\n    ![images](images/U0224.jpg)\n\
    \n4.  To replace the text, simply start typing. The text will be instantly replaced\
    \ by the letters you type.\n\n## Keyboard Options and Settings\n\nThere are a\
    \ few keyboard options to make typing on your iPhone easier. These keyboard options\
    \ are located in the `General` tab of your `Settings` app. Follow these steps\
    \ to access them:\n\n1.  Tap the `Settings` icon.\n2.  Tap `General`.\n3.  Swipe\
    \ up, then tap `Keyboard` near the bottom of the page.\n\n![images](images/U0226.jpg)\n\
    \n### Setting Auto-Correction to ON or OFF\n\nAs noted earlier in this chapter,\
    \ the Auto-Correction feature will use the iPhone’s built-in dictionary to automatically\
    \ make changes to commonly misspelled words. You need to make sure it is `ON`\
    \ if you want this feature to work. (This is the default setting.)\n\n### Auto-Capitalization\n\
    \nWhen you start a new sentence, words will automatically be capitalized if the\
    \ `Auto-Capitalization` option is set to `ON`.\n\nThis feature will also correctly\
    \ capitalize common proper nouns. For example, if you type “New york,” then you\
    \ will be prompted to change it to “New York”—again, just pressing the `Space`\
    \ key will implement the correction. If you backspace over a capital letter, the\
    \ iPhone will assume the new letter you type should be capitalized, as well. This\
    \ feature is also set to `ON` by default.\n\n![images](images/U0227.jpg)\n\n###\
    \ Enabling Caps Lock\n\nSometimes you may want to type only capital letters; to\
    \ do so, simply double-tap the `Caps` key.\n\nThis feature is set to `OFF` by\
    \ default.\n\n### The “.” Shortcut\n\nIf you double-press the `Space` key, it\
    \ will automatically put in a period at the end of a sentence; this feature is\
    \ set to `ON` by default.\n\n## Typing in Other Languages—International Keyboards\n\
    \nAt the time of writing, the iPhone enables you to type in more than a dozen\
    \ different languages, including everything from Dutch to Spanish. Some of the\
    \ Asian languages, such as Japanese and Chinese, offer two or three keyboards\
    \ for different typing methods.\n\n### Adding a New International Keyboard\n\n\
    Follow these steps to enable various language keyboards:\n\n1.  Tap the `Settings`\
    \ icon.\n2.  Tap `General`.\n3.  Tap `Keyboard` near the bottom of the page.\n\
    4.  Tap `International Keyboards`.\n5.  Tap `Add New Keyboard`.\n6.  Tap any keyboard\
    \ or language listed to add it. You will now see the keyboard appear on the list\
    \ of available keyboards.\n7.  There is a good bullet point character on the `Symbols`\
    \ keyboard just above the `Backspace` key. You can also get a degree symbol if\
    \ you press and hold the `Zero` key (`0`). Also, you can press and hold the `?`\
    \ and `!` keys to get their inverted Spanish cousins.\n\n**TIP:** iOS 5 includes\
    \ a built-in Emoji keyboard. Emoji is an extensive collection of Japanese symbols,\
    \ including various smiley and frowny faces, holiday images, buildings and vehicles,\
    \ and much more. While their meanings are more specific in Japan, people around\
    \ the world have begun using them in SMS, Twitter, and other online messaging\
    \ services.\n\nThe Emoji keyboard can be added in Settings just like any other\
    \ keyboard.\n\n![images](images/U0228.jpg)\n\n### Editing, Re-Ordering, or Deleting\
    \ Keyboards\n\nYou may want to adjust options for a keyboard, re-order how the\
    \ keyboards appear in a list, or simply remove a keyboard that you no longer use.\
    \ Follow these steps to do so:\n\n1.  Follow Steps 1–4 under the “Adding a New\
    \ International Keyboard” section earlier in this chapter; this will let you view\
    \ the list of international keyboards.\n2.  To adjust options for a specific keyboard,\
    \ tap it in the list of keyboards. In our example, we tapped `French (Canada)`.\n\
    3.  Change the `Software Keyboard Layout` by tapping the choice in that section.\n\
    4.  Adjust the `Hardware Keyboard Layout` by tapping a choice in that section.\n\
    5.  Tap the `Keyboards` button in the upper-left corner to save your choices and\
    \ return to the list of keyboards.\n\n    ![images](images/U0229.jpg)\n\n6.  To\
    \ re-order or delete a keyboard, tap the `Edit` button in the upper-right corner.\n\
    7.  To change the order of keyboards, touch and drag the right edge of the keyboard\
    \ with the three gray bars up or down.\n8.  To delete a keyboard, tap the `Red\
    \ Minus Sign` so it swings to the vertical position, then tap `Delete`.\n9.  To\
    \ finish editing your keyboards, tap the `Done` button in the upper-right corner.\n\
    \n![images](images/U0230.jpg)\n\nYou will notice a little `Globe` key appears\
    \ when you install at least one international keyboard. Press the `Globe` key\
    \ to cycle between all the languages.\n\n**TIP:** You can press and hold the `Globe`\
    \ key to see a list of available keyboards. This will enable you to quickly select\
    \ the keyboard you wish to use.\n\n![images](images/U0231.jpg)\n\nJapanese, Chinese,\
    \ and some other languages provide several keyboard options to meet your typing\
    \ preferences.\n\nIn some of the languages (such as Japanese), you will see the\
    \ letters typed change into characters, or you can draw the characters yourself.\
    \ You may also see a row of other character combinations above the keyboard. When\
    \ you see the combination you want, tap it."
