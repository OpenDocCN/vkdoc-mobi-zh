    \ or an Internet radio app like **Pandora**, you'll find you have unprecedented\
    \ control over your music on the iPhone."
  trans: "\n#### 将 Skype 添加到你的电脑\n\n你也可以在电脑上使用 `skype` 应用。接下来我们将向你展示具体操作方法。如果你的电脑连接了网络摄像头，你还可以使用\
    \ `skype` 进行视频通话。\n\n**注意：**当你从电脑呼叫 iPhone 时，将无法进行视频通话。\n\n要创建 Skype 账户并下载适用于电脑的\
    \ `skype` 软件，请按照以下步骤操作：\n\n1. 在电脑上打开一个网页浏览器。\n2. 访问：[www.skype.com](http://www.skype.com)。\n\
    3. 点击页面顶部的 **加入** 链接。\n4. 填写所有必填信息并点击 **继续** 按钮来创建你的账户。请注意，你只需要在带星号（*）标记的必填字段中输入信息。例如，你无需填写性别、出生日期或手机号码。\n\
    5. 到此，账户设置过程就完成了。接下来，你会看到购买 Skype 点数的选项；不过，对于免费的 Skype 对 Skype 通话、视频通话或聊天来说，这并非必需。\n\
    \n   **提示：**只有当你想给未使用 `skype` 的人打电话时才需要付费。例如，拨打固定电话或手机（未使用 `skype`）会收取费用。撰写本文时，即付即用费率约为\
    \ 2.1 美分；不同通话套餐的月订阅费用从大约 3 美元到 14 美元不等。\n\n6. 接下来，点击网站顶部导航栏中的 `Get Skype` 链接，将\
    \ `skype` 下载到你的电脑。\n7. 点击 **获取 Windows 版 Skype** 按钮或 **获取 Mac 版 Skype** 按钮。\n\
    8. 按照说明安装该软件。\n9. 软件安装完成后，启动它并使用你的 Skype 账户登录。\n10. 现在，你可以开始与任何其他使用 `skype` 的人（包括你所有在\
    \ iPhone 上装有 `skype` 的朋友）发起（或接听）电话、视频通话和聊天。\n\n### 视频录制\n\n除了让你进行视频通话和聊天之外，iPhone\
    \ 还允许你使用内置录像机录制功能完整的视频。你可以用 iPhone 拍摄 1080p 高清视频，然后将此视频上传到 Facebook、YouTube 或\
    \ iCloud。你也可以通过彩信或电子邮件发送你的视频。\n\n**注意：**分享视频时，视频会被压缩，因此画质将不再是 1080p。\n\n接下来，我们将展示如何直接在\
    \ iPhone 上录制视频和修剪视频。你还将学习如何直接在 iPhone 上制作高质量的高清视频。\n\n#### 启动录像机\n\n录像机的软件实际上是\
    \ **相机** 应用的一部分（参见 图 11–3）。按照以下步骤使用内置录像机：\n\n1. 启动 **相机** 应用。将右下角的滑块从 **相机** 图标移动到\
    \ **录像机** 图标。\n2. 点击右上角的 **切换摄像头** 按钮，在后置摄像头和前置摄像头之间切换。\n3. 录制场景时尽量保持 iPhone 稳定。\n\
    4. 录制完成后，点击 **停止** 按钮。\n\n![images](img/1103.jpg)\n\n**图 11–3.** *录像机的布局与控件*\n\
    \n##### 调整视频焦点\n\niPhone 可以根据拍摄对象自动调整视频的焦点。按照以下步骤利用此功能：\n\n1. 若要对视频前景中的某个物体进行对焦，请点击屏幕前景区域。此时会显示一个小方框，指示对焦区域。\n\
    2. 若要将焦点切换到背景中的某个对象，请点击屏幕的另一部分。对焦框会临时显示新的对焦区域。\n\n##### 修剪视频\n\niPhone 允许你直接在手机上对视频进行编辑。视频录制完毕并点击\
    \ **停止** 按钮后，视频会立即存入你的 **相机胶卷**。\n\n点击左下角的视频缩略图即可调出该视频。在屏幕顶部，你会看到一个时间线，显示你视频的所有帧（参见\
    \ 图 11–4）。按照以下步骤编辑你刚刚录制的视频：\n\n1. 拖动时间线的任一端，你会看到视频进入修剪模式。\n2. 拖动视频两端的边缘，直至达到你想要的长度。\n\
    3. 当视频长度合适时，点击右上角的 **修剪** 按钮。\n4. 接下来，选择 **修剪原片** 或 **存储为新剪辑**。后一个选项会保存一个经过修剪的新视频版本。\n\
    \n![images](img/1104.jpg)\n\n**图 11–4.** *修剪视频*\n\n##### 发送视频\n\n与照片一样，你也有多种方式可以通过\
    \ iPhone 将录制的视频发送给他人。按照以下步骤从你的 iPhone 发送视频：\n\n1. 点击左下角的 **发送** 图标 ![images](img/U1113.jpg)。\n\
    2. 选择你偏好的视频发送方式：**电子邮件**、**信息** 或 **发送到 YouTube**。\n3. 你接下来看到的屏幕取决于你在第 2 步中所做的选择。如果你选择了\
    \ **电子邮件**，你的 **邮件** 应用将会启动。如果你选择了 **信息**，你的 **信息** 应用将会启动，以此类推。\n\n   **注意：**要将视频上传到\
    \ YouTube，你需要拥有该网站的账户。\n\n## 第 12 章\n\n## 播放音乐\n\n在本章中，我们将向你展示如何将你的 iPhone 变成一台绝佳的音乐播放器。由于\
    \ iPhone 出自苹果公司——正是它让如今家喻户晓的 iPod 电子音乐播放器得以普及——因此，你完全可以期待它具备一些出色的功能，而事实也确实如此。我们将为你介绍如何播放和管理从\
    \ iTunes 购买或从电脑同步的音乐，如何以多种方式查看播放列表，以及如何快速找到歌曲。你将学会如何使用 Genius 功能，让 iPhone 在你的音乐库中定位并归类相似的歌曲——有点像只播放你喜欢音乐的电台。\n\
    \n**提示：**在第 22 章“你设备上的 iTunes”中，你将学习如何直接在 iPhone 上购买音乐以及使用 Ping（音乐爱好者的社交网络）。\n\
    \n你还将了解如何使用一款名为 Pandora 的应用来流播音乐。使用 Pandora，你可以从众多网络电台中进行选择，也可以通过输入你最喜欢的艺术家姓名来创建自己的电台，而且这一切都是免费的。\n\
    \n### 将你的 iPhone 用作音乐播放器\n\n你的 iPhone 可能是当今市场上最好的音乐播放器之一。触控屏使得与音乐、播放列表、专辑封面以及音乐库的组织进行交互和管理变得轻而易举。你甚至可以通过蓝牙将\
    \ iPhone 连接到家庭音响或车载音响，从而通过 iPhone 聆听美妙的立体声音乐！\n\n**提示：**请参阅第 5 章“AirPlay 与蓝牙”，了解如何将你的\
    \ iPhone 连接到蓝牙立体声音箱或车载音响。\n\n无论你是使用内置的 **音乐** 应用，还是像 **Pandora** 这样的网络电台应用，你都会发现在\
    \ iPhone 上对音乐的控制达到了前所未有的程度。\n"
- fmt: '# The Music App


    Most music is handled through the **Music** app—the icon is on the **Home** screen,
    usually in the bottom dock of icons, the last one on the right.


    ![images](images/U1201.jpg)


    **NOTE:** For all you readers familiar with the iPhone before iOS 5, yes, the
    music playing app was called the **iPod** app. Now it is simply the **Music**
    app.


    Touch the `Music` icon and, as [Figure 12–1](#Chapter12.html#fig_12_1) shows,
    you''ll see five soft keys across the bottom:


    *   **Playlists** lets you see synced playlists from your computer, as well as
    playlists created on the iPhone.

    *   **Artists** lets you see an alphabetical list of artists (searchable like
    your Address Book).

    *   **Songs** lets you see an alphabetical list of songs (also searchable).

    *   **Albums** lets you browse your music by album titles.

    *   **More** lets you see audiobooks, compilations, composers, genres, iTunes
    U, and podcasts.


    ![images](images/1201.jpg)


    **Figure 12–1.** *Music app with soft keys at bottom*


    ## Editing the Soft Keys


    One very cool feature on the iPhone is that you can edit the soft keys at the
    bottom of the **Music** app and really customize it to fit your needs and tastes.
    To do so, first touch the **More** button.


    Then touch the **Edit** button at the top left of the screen.


    ![images](images/U1202.jpg)


    The screen changes to show the various icons that can be dragged down to the bottom
    dock.


    ![images](images/1202.jpg)


    **Figure 12–2.** *Change the soft keys in the **Music app**.*


    Let''s say you want to replace the **Albums** icon with the one for **Audiobooks**.
    Just touch and hold the **Audiobooks** icon and drag it to where the **Albums**
    icon is on the bottom dock. When you get there, release the icon and the **Audiobooks**
    icon will now reside where the **Album** icon used to be. You can do this with
    any of the icons on this **Configure** screen. When you are finished, touch the
    **Done** button at the top right of the screen.


    **TIP**: You can also reorder the icons across the bottom by dragging and dropping
    them back and forth along the soft key row.


    ## Playlists View


    **NOTE**: A playlist is a list of songs you create and can include any genre,
    artist, year of recording, or collection of songs that interest you.


    ![images](images/U1203.jpg)


    Many people group together music of a particular genre, like classical or rock.
    Others may create playlists with fast beat music and call it workout or running
    music. You can use playlists to organize your music just about any way you want.


    You can create playlists in iTunes on your computer and then sync to your iPhone
    (see the iTunes Guide), or you can create a playlist right on your iPhone as we
    describe in the next section.


    Once you''ve synced a playlist to your iPhone or created one on your iPhone, it
    shows up on the left-hand side of the **Music** screen, under **Library**.


    If you have several playlists listed along the left side, just touch the name
    of the one you want to listen to.


    **NOTE:** You can edit the contents of some of your playlists on your iPhone.
    However, you can''t edit Genius playlists on the iPhone itself.


    ## Creating Playlists on the iPhone


    The iPhone lets you create unique playlists that can be edited and synced with
    your computer. Let''s say you want to add a new selection of music to your iPhone
    playlist. Just create the playlist as we show below and add songs. You can change
    the playlist whenever you want, removing old songs and adding new ones—it couldn''t
    be easier!


    To create a new playlist on the iPhone, touch the **Add Playlist** tab under **Genius
    Playlist**.


    ![images](images/U1204.jpg)


    Give your playlist a unique name (we''ll call this one “Bike-riding music”), then
    touch **Save**.


    ![images](images/U1205.jpg)


    Now you''ll see the **Songs** screen. Touch the name of any song you want to add
    to the new playlist.


    You know a song is selected and will be added to the playlist when it turns gray.


    **NOTE:** Don''t get frustrated trying to remove or deselect a song you tapped
    by mistake. You can''t remove or deselect songs on this screen; you have to click
    **Done**, then remove them on the next screen, as we describe.


    Select **Done** at the top right and the playlist contents will be displayed.


    ## Searching for Music


    Almost every view from your **Music** app (**Playlists**, **Artists**, **Songs**,
    etc.) has a search window at the top of the screen.


    ![images](images/U1206.jpg)


    If you don''t see the search window, tap the time at the top to instantly make
    it visible.


    Tap once in the search window and type a few letters of the name of an artist,
    album, playlist, or song to instantly see a list of all matching items. This is
    the best way to quickly find something to listen to or watch on your iPhone.


    # Changing the View in the Music App


    The **Music** app is very flexible when it comes to ways of displaying and categorizing
    your music. Sometimes, you might want to look at your songs listed by the artist.
    At other times, you might prefer seeing a particular album or song. The iPhone
    lets you easily change the view to help manage and play just the music you want
    at a given moment.


    In your **Music** app, you have the following views:


    *   **Artists View** - shows you a listing of all your music arranged by artist.

    *   **Songs View** - shows all your music listed by name of each song.

    *   **Albums View** - shows all music arranged by album name.

    *   **Genres View** - shows all music arranged by type or genre.

    *   **Composers View** - shows music arranged by composer name.

    *   **Audiobooks** - shows all your audiobooks.

    *   **Compilations** - shows all compilations.

    *   **iTunes U** - shows all iTunes U content.

    *   **Podcasts** - shows all your podcasts.


    # Viewing Songs in an Album


    When you''re in **Albums** view, just touch an album cover or name and the screen
    will slide, showing you the songs on that album (see [Figure 12–3](#Chapter12.html#fig_12_3)).


    **TIP**: When you start playing an album, the album cover may expand to fill the
    screen. Tap the screen once to bring up (or hide) the controls at the top and
    bottom. You can use these controls to manage the song and screen as we describe
    below.


    To see the songs on an album that is playing, tap the **List** button and the
    album cover will turn over, revealing all the songs on that album. The song that
    is playing will have a small blue arrow next to it.


    ![images](images/U1207.jpg)


    ![images](images/1203.jpg)


    **Figure 12–3.** *Touch the **List** button to see the songs on a particular album.*


    Tap the title bar above the list of songs to return to the album cover view.


    ## Navigating with Cover Flow


    Cover Flow is a proprietary and very cool way of looking at your music by album
    covers. If you''re playing a song in the **Music** app and turn your iPhone horizontal—into
    landscape mode—your iPhone will automatically change to **Cover Flow**.


    ![images](images/U1208.jpg)


    ### Viewing Songs in Cover Flow


    Just touch an album cover and the cover will flip, showing you all the songs on
    that album.


    To see the song that is playing now (in Cover Flow view), tap the album cover
    and it will turn over, revealing the songs on that album ([Figure 12–4](#Chapter12.html#fig_12_4)).
    The song that is currently playing will have a small blue arrow next to it.


    ![images](images/1204.jpg)


    **Figure 12–4.** *You can look at an album''s contents using **Cover Flow**.*


    Tap the title bar (above the list of songs) and the album cover will be displayed
    once more. You can then keep swiping through your music until you find what you
    are searching for.


    **NOTE:** You can also touch the small “i” in the lower right corner and the album
    cover will flip, showing you the songs, just as if you touched the cover.'
