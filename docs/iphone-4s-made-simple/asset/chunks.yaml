  trans: "\n# 同步照片\n\n点击**照片**标签页时，你可以选择同步所有文件夹或选定文件夹中的照片，甚至可以包含视频。\n\n**提示：** 你可以创建一个精美的电子相框，并在\
    \ iPhone 惊艳的屏幕上分享你的照片（参见第 20 章：“处理照片”）。你甚至可以用照片来设置背景墙纸和锁屏墙纸——详见第 8 章：“个性化与安全”。\n\
    \n要将照片从电脑同步到 iPhone，请按以下步骤操作：\n\n1. 将 iPhone 连接到电脑，启动 **iTunes**，然后在左侧导航栏中点击你的\
    \ iPhone。\n\n   **提示：** Mac 用户还可以在 **iPhoto** 中使用多种条件同步照片，包括“事件”（按时间同步）、“面孔”（按人物同步）和“地点”（按位置同步）。\n\
    \n2. 点击主窗口顶部的**照片**标签页。\n3. 勾选**同步照片来源**旁边的复选框。\n4. 点击**同步照片来源**旁边的下拉菜单，从电脑中选择存储照片的文件夹。如果你想同步所有照片，请选择最高层级文件夹（例如\
    \ Windows 电脑上的 **C:** 或 Apple Mac 上的硬盘根目录“**/**”）。\n5. 如果要同步电脑上选定文件夹中的所有照片，请选择**所有文件夹**。\n\
    \n   **警告：** 由于电脑上的照片库可能过大而无法全部放入 iPhone，勾选**所有文件夹**时请务必谨慎。\n\n6. 否则，请选择**选定文件夹**，然后在下方的窗口中勾选特定文件夹进行选择。\n\
    7. 你还可以勾选**包括视频**旁的复选框，以包含文件夹中的任何视频。\n8. 完成要同步的照片选择后，点击**应用**按钮以保存设置并开始同步。\n9.\
    \ 同步开始时，你将在 **iTunes** 中上方的状态窗口看到进度。\n\n## iTunes 与同步的故障排除\n\n有时 **iTunes** 的表现可能不如预期，因此这里提供几个简单的故障排除技巧。\n\
    \n### 查看 Apple 知识库以获取有用文章\n\n遇到问题时，第一步是查看 Apple 的支持页面，那里有大量有用信息。在 iPhone 或电脑的网页浏览器中访问以下网址：\n\
    \n`www.apple.com/support/iPhone/`\n\n接着，点击左侧导航栏中显示的主题。\n\n### iTunes 锁定且无响应（Windows\
    \ 电脑）\n\n有时 **iTunes** 会锁定并完全无响应。如果在 Windows 电脑上发生这种情况，请按以下步骤操作：\n\n1. 同时按下键盘上的\
    \ **Ctrl** + **Alt** + **Del** 键，调出 **Windows 任务管理器**。**任务管理器**应类似图 3–9 所示。\n\n\
    \   ![images](img/0309.jpg)\n\n   **图 3–9.** *在 **Windows 任务管理器**中找到 `iTunes.exe`，以便结束其进程*\n\
    \n2. 要结束进程，请在弹出的窗口中点击**结束进程**。\n3. 现在，**iTunes** 应被强制关闭。\n4. 尝试重新启动 **iTunes**。\n\
    5. 如果 **iTunes** 无法启动或再次锁定，请重启电脑后再试。\n\n### iTunes 锁定且无响应（Mac 电脑）\n\n如果你使用的是 Mac，在\
    \ **iTunes** 应用锁定且完全无响应时，请按以下步骤操作：\n\n**提示：** 按下 **Command** + **Option** + **Escape**\
    \ 是调出**强制退出应用程序**窗口的快捷键（参见图 3–10）。\n\n1. 点击顶部的 **iTunes** 菜单。\n2. 点击**退出 iTunes**。\n\
    3. 如果无效，请切换到其他程序，点击 Mac 左上角的**Apple**小标志。\n4. 点击**强制退出**，会显示正在运行的程序列表。\n5. 选中\
    \ **iTunes**，然后点击**强制退出**按钮。\n6. 如果仍然无效，请尝试重启 Mac。\n\n![images](img/0310.jpg)\n\
    \n**图 3–10.** *Mac 电脑上的**强制退出应用程序**窗口*\n\n## 更新 iPhone 操作系统\n\n通过 iOS5，你现在可以在设备上直接更新\
    \ iPhone 操作系统。有更快、更高效的更新方法，我们建议你尽可能使用它们。但如果需要重新安装整个操作系统，或者想通过 **iTunes** 进行升级，本部分将说明如何操作。\n\
    \n**注：** 请在你愿意让 iPhone 离开身边 30 分钟或更长时间时进行此更新，具体时长取决于 iPhone 上的数据量以及电脑和网络连接的速度。\n\
    \n通常，**iTunes** 会按照设定计划自动检查更新，大约每两周一次。如果未找到更新，**iTunes** 会告知你下次检查更新的时间。请按以下步骤使用\
    \ **iTunes** 手动更新 iPhone：\n\n1. 启动 **iTunes**。\n2. 将 iPhone 连接到电脑。\n3. 在左侧导航栏的**设备**下点击你的\
    \ iPhone。\n4. 点击顶部导航栏中的**摘要**标签页。\n5. 在屏幕中央的**版本**区域，点击**检查更新**按钮。\n6. 如果你的 iPhone\
    \ 已是最新版本，会弹出一个窗口，显示类似“当前 iPhone 软件版本 (5.0) 即为最新版本”的信息。点击**确定**关闭窗口。更新过程完成。\n7.\
    \ 如果你的 **iTunes** 不是最新版本，窗口会提示有新版本可用，并询问是否要更新。点击**是**或**更新**进行更新。\n8. **iTunes**\
    \ 会引导你通过几个屏幕，描述更新内容并要求你同意软件许可。如果同意，请依次点击**下一步**和**同意**，从 Apple 下载最新的 iOS 软件。此过程大约需要五到十分钟。\n\
    \n   **提示：** 我们将在第 26 章：“故障排除”的“重新安装 iPhone 操作系统”部分，展示此更新过程中你可能看到的所有屏幕。\n\n9.\
    \ 接下来，**iTunes** 会备份你的 iPhone，如果 iPhone 存有大量数据，此过程可能耗时十分钟或更久。\n10. 然后新的 iOS 将被安装，你的\
    \ iPhone 数据会被清除。\n11. 最后，你会看到一个屏幕，要求你执行以下操作之一：\n\n    1. **设置为新的 iPhone：** 如果希望在更新过程后清除所有数据，请选择此项。\n\
    \    2. **从以下备份恢复：** 请确保选择正确的备份文件（通常是最新的那个）。\n\n    此时，你的 iPhone 将按照你的选择进行恢复或设置。\n\
    \n12. 如果你已锁定 SIM 卡，则需要输入四位解锁 PIN 码。\n\n    **警告：** 如果你已锁定 SIM 卡，则在更新安装完成后需要输入四位解锁码。如果忘记了\
    \ SIM 解锁码，可以使用 PUK 码解锁 SIM 卡（需从无线运营商处获取）。更多信息请参见第 9 章：“使用电话”中的“设置 SIM 卡安全”部分。\n\
    \n13. 你的 iPhone 操作系统更新完成。\n\n## 其他同步方法\n\n你可以在 iPhone 的**设置**应用中导航至**邮件**、**通讯录**、**日历**应用，以设置并使用\
    \ Exchange。下一部分将说明如何操作。\n"
- fmt: "#### Setting Up Your Google or Exchange Account on Your Device\n\nUse the\
    \ following steps to set up the wireless sync for either your Exchange account\
    \ or your Google contacts and calendar:\n\n1.  Touch the **Settings** icon.\n\
    2.  Touch **Mail, Contacts, Calendar**.\n3.  You’ll see a list of your email accounts\
    \ and, below that, the **Add Account** option.\n\n    If you have no accounts\
    \ set up, you will see only **Add Account**. In either case, tap **Add Account.**\n\
    \n    ![images](images/U0313.jpg)\n\n4.  On the next screen, choose **Microsoft\
    \ Exchange**.\n\n    **NOTE:** You should choose **Microsoft Exchange** if you\
    \ want to have the wireless sync with your Google Contacts and Calendar. If you\
    \ select **Gmail**, you will not be able to sync wirelessly with your Google Contacts.\n\
    \n    ![images](images/U0314.jpg)\n\n5.  Type your email address.\n\n    **TIP:**\
    \ To type the `.com` (or `.net`, `.edu`, `.org`, etc.) in the email address, press\
    \ and hold the **Period** (**.**) key until you see the `.com` key appear above\
    \ it. Slide over and press `.com`.\n\n    ![images](images/U0315.jpg)\n\n    **TIP:**\
    \ Since your email address is also usually your username, save yourself some time\
    \ by copying and pasting it.\n\n    ![images](images/U0316.jpg)\n\n    ![images](images/U0317.jpg)\n\
    \n6.  Copy and paste your email address into the **Username** field (This works\
    \ well when your username is the same as your email or if it is the same as the\
    \ first part of your email address before the `@` sign):\n    1.  Touch and hold\
    \ the **Email** field, then lift your finger to see the black pop-up appear above\
    \ it.\n    2.  Tap **Select All**.\n    3.  Tap **Copy**.\n    4.  Touch and hold\
    \ the **Username** field, then lift your finger to see the pop-up appear. Tap\
    \ **Paste**.\n7.  Leave the **Domain** blank. Type your **Password.** If you want,\
    \ you can adjust the **Description** of the account, which defaults to your email\
    \ address.\n8.  Tap the **Next** button in the upper-right corner.\n9.  You may\
    \ see an **Unable to Verify Certificate** dialog. If you do see it, click **Accept**\
    \ to continue.\n\n    ![images](images/U0318.jpg)\n\n    ![images](images/U0319.jpg)\n\
    \n    ![images](images/U0320.jpg)\n\n10.  In the **Server** field, type `m.google.com`\
    \ to sync to Google. Otherwise, if you are setting up your Exchange Server account,\
    \ enter that server address.\n11.  Click **Next** in the upper-right corner.\n\
    12.  On this screen you have the option to set the wireless sync for **Mail, Contacts,**\
    \ and **Calendars** to **ON** or **OFF**. For each sync you’d like to turn on,\
    \ tap the switch to change it to **ON**.\n\n    ![images](images/U0321.jpg)\n\n\
    **NOTE:** If you already have contacts or calendar items on your iPhone, you may\
    \ see some warnings appear. Your choices are to **Keep on My iPhone** or **Delete**.\
    \ If you choose **Cancel**, your iPhone stops setting up your Exchange account.\
    \ Select **Keep on My iPhone** to keep all existing contacts and calendar events\
    \ on your iPhone. These items will not end up on your Exchange account—they will\
    \ stay on your iPhone.\n\n## Chapter 4\n\n## Connect to the Network\n\nWe live\
    \ in a connected world. Wireless Internet (Wi-Fi) access has become the rule,\
    \ not the exception—and chances are you’re already using Wi-Fi at your home or\
    \ office. You can use it to connect your iPhone to the Internet. And, since your\
    \ iPhone also has a 3G cellular radio, you can also connect to the Internet anywhere\
    \ you have cellular data coverage—a much wider area than Wi-Fi networks.\n\nIn\
    \ this chapter, we’ll talk about the differences between the two types of connections\
    \ for your iPhone: Wi-Fi (wireless local area network) and 3G (cellular service—the\
    \ wide area data network used by your mobile phone). We’ll show you all the ways\
    \ to get connected or disconnected from these two types of networks. For example,\
    \ there will be times you will want to disable or turn off your 3G connection\
    \ and only use Wi-Fi to save money in data connection charges.\n\nWe will also\
    \ show you how to get ready for traveling internationally with your iPhone—what\
    \ you need to do before, during, and after your trip so you don’t get surprised\
    \ with a very large phone bill when you return home.\n\nWe will also show you\
    \ how to use *Internet Tethering*, the ability to make your iPhone become an Internet\
    \ hub for your laptop, whether it’s a PC or Mac. This is a great feature to use\
    \ when you don’t have any other way to connect your laptop to the Internet.\n\n\
    Finally, if you work at an organization with a VPN (*Virtual Private Network*),\
    \ we will show you how to get connected to that network.\n\n### What Can I Do\
    \ When I’m Connected to a Wi-Fi or 3G Network?\n\nHere are some of the things\
    \ you can do when connected to a Wi-Fi or 3G network:\n\n*   Access and download\
    \ apps (programs) from the App Store.\n*   Access and download music, videos,\
    \ podcasts, and more from the **iTunes** app on your iPhone.\n*   Browse the web\
    \ using **Safari**.\n*   Send and receive email messages.\n*   Use social networking\
    \ sites that require an Internet connection like Facebook, Twitter, and so on.\n\
    *   Play games that use a live Internet connection.\n*   Do anything else that\
    \ requires an Internet connection.\n\n### Wi-Fi Connections\n\nEvery iPhone comes\
    \ with Wi-Fi capability built in, so let’s take a look at getting connected to\
    \ the Wi-Fi network. Things to consider about Wi-Fi connections include the following:\n\
    \n*   There is no additional cost for network access and data downloads (if you\
    \ are using your iPhone in your home, office, or a free Wi-Fi hotspot).\n*   Wi-Fi\
    \ tends to be faster than a cellular data 3G connection.\n*   More and more places,\
    \ including some airplanes, provide Wi-Fi access, but you may have to pay a one-time\
    \ or monthly service fee.\n\n**NOTE**: iPhone has support for the faster, longer\
    \ range 802.11n standard. However, it only supports 802.11n on the more crowded\
    \ 2.4 MHz band, not the less crowded 5 MHz band. If you want to use iPhone with\
    \ your 802.11n Wi-Fi router, make sure it’s either a dual-band router or set the\
    \ router to 2.4 MHz.\n\n#### Connecting to a Wi-Fi Network\n\nTo set up your Wi-Fi\
    \ connection, follow these steps:\n\n1.  Tap the **Settings** icon.\n2.  Tap **Wi-Fi**\
    \ near the top.\n3.  Make sure the **Wi-Fi** switch is set to **ON**. If it is\
    \ currently **OFF**, then tap it to turn it **ON**.\n4.  Once Wi-Fi is **ON**,\
    \ the iPhone will automatically start looking for wireless networks.\n5.  The\
    \ list of accessible networks is shown below the **Choose a Network...** option.\
    \ This screenshot shows that we have one network available.\n6.  To connect to\
    \ any network listed, just touch the network name. If the network is unsecure\
    \ (does not have a **Lock** icon), you will be connected automatically.\n\n  \
    \  ![images](images/U0401.jpg)\n\n#### Connecting at a Public Wi-Fi Hotspot with\
    \ Web Login\n\nIn some locations where they offer free Wi-Fi networks, such as\
    \ coffee shops, hotels, or restaurants; you will see a pop-up window appear as\
    \ soon as your iPhone comes into contact with the network. In these cases, simply\
    \ tap the network name. You may be brought to a **Safari** browser screen to complete\
    \ your login to the network:\n\n1.  If you see a pop-up window similar to the\
    \ one shown, tap the network name you wish to join. In the case to the right,\
    \ we tap the **Panera** network.\n\n    ![images](images/U0402.jpg)\n\n2.  In\
    \ some cases, you may see a **Safari** window pop up, which can be quite confusing\
    \ because it is so small on your iPhone’s screen. You need to use the double-tap\
    \ or pinch-open gesture (see the Quick Start Guide for help) to zoom in on the\
    \ Web page. You are looking for a button that says **Login**, **Agree**, or something\
    \ similar. Tap that button to complete the connection.\n\n    ![images](images/U0403.jpg)\n\
    \n**NOTE**: Some places, like coffee shops, use a web-based login instead of a\
    \ username/password screen. In those cases, when you click the network (or try\
    \ to use **Safari**), your iPhone will open a browser screen, and you’ll see the\
    \ web page along with your login options."
