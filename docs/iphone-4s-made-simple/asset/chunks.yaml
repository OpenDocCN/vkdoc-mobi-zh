- fmt: "# Reinstalling the iPhone Operating System (with or Without a Restore)\n\n\
    Sometimes, you might have to do a clean install of your iPhone operating system\
    \ to get your iPhone back up and running smoothly. If an update is currently available,\
    \ then this process will also result in upgrading your iPhone software.\n\n**TIP:**\
    \ This process is virtually identical to the process of updating your iPhone with\
    \ a new version of the operating system.\n\nDuring this process, you will have\
    \ three choices:\n\n- If you want to return the iPhone to its normal state with\
    \ all your data, you will have to use the `Restore` function in the `iTunes` app.\n\
    - If you plan on getting a clean start and tying the iPhone to an iTunes account,\
    \ then you will need to use the `Setup a new iPhone` function at the end of this\
    \ process.\n- If you plan on giving away or selling your iPhone, then you will\
    \ simply need to eject the iPhone from `iTunes` at the end of this process (before\
    \ doing a restore or new setup).\n\n**CAUTION**: This restore process will wipe\
    \ your iPhone totally clean. You will need to resynchronize and reinstall all\
    \ of your apps and enter your account information, such as your email accounts.\
    \ This process could take 30 minutes or longer, depending on how much information\
    \ you have synced to your iPhone.\n\nTo reinstall the iPhone operating system\
    \ software with the option of restoring data to your iPhone from a previous backup,\
    \ follow these steps:\n\n1.  Connect your iPhone to your computer and load the\
    \ `iTunes` app.\n2.  Click your `iPhone` in the `DEVICES` category in the left\
    \ nav bar.\n3.  Click `Summary` in the top nav bar.\n4.  You will see the `Summary`\
    \ screen with all the information about your iPhone. Click the `Restore` button\
    \ in the middle screen, as shown here (see [Figure 26–3](#Chapter26.html#fig_26_3)).\n\
    \n![images](images/2603.jpg)\n\n**Figure 26–3.** *Connecting your iPhone and clicking\
    \ the `Restore` button in the `Summary` screen*\n\n5.  Now you will be asked whether\
    \ you want to back up your phone. Click `Back Up` just to be safe (see [Figure\
    \ 26–4](#Chapter26.html#fig_26_4)).\n\n![images](images/2604.jpg)\n\n**Figure\
    \ 26–4.** *Backing up before you restore in `iTunes`*\n\n6.  On the next screen,\
    \ you are warned that all data will be erased. Click `Restore` or `Restore and\
    \ Update` to continue (see [Figure 26–5](#Chapter26.html#fig_26_5)).\n\n![images](images/2605.jpg)\n\
    \n**Figure 26–5.** *Backing up your iPhone in `iTunes` before a restore*\n\n7.\
    \  You will see an iPhone `Software Update` screen. Click `Next>` to continue.\n\
    8.  Next, you will see the `Software License Agreement` screen. Click `Agree`\
    \ to continue and start the process.\n9.  `iTunes` will download the latest iPhone\
    \ software, back up and sync your iPhone, and then reinstall the iPhone software.\
    \ This process completely erases all data and restores your iPhone to its original,\
    \ “clean” state. You will see status messages at the top of `iTunes` similar to\
    \ the one shown in [Figure 26–6](#Chapter26.html#fig_26_6).\n\n![images](images/2606.jpg)\n\
    \n**Figure 26–6.** *The software update/restore process, with a status window\
    \ at top of `iTunes`*\n\n10.  After the backup and sync, your iPhone screen will\
    \ go black. Next, the `Apple` logo will appear, and you will see a status bar\
    \ under the logo. Finally, a small pop-up window will appear in `iTunes` to tell\
    \ you the update process is complete. Click `OK` to go to the `Set Up Your iPhone`\
    \ screen. You will have a couple options at this point:\n    1.  If you want to\
    \ keep your iPhone clean (i.e., without any of your personal data), then select\
    \ the top option, `Setup as a new iPhone`. You might want to use this option if\
    \ you are setting up this iPhone for someone else (you will need her Apple ID\
    \ and password).\n    2.  If you are giving away or selling your iPhone, simply\
    \ click the `Eject` icon next to the iPhone, and you're done (see [Figure 26–7](#Chapter26.html#fig_26_7)).\n\
    \n![images](images/2607.jpg)\n\n**Figure 26–7.** *Ejecting the iPhone if you are\
    \ giving it away or selling it*\n\n3.  Select `Restore from the backup of:` and\
    \ verify that the pull-down menu is set to the correct device.\n11.  Finally,\
    \ click `Continue` (see [Figure 26–8](#Chapter26.html#fig_26_8)).\n\n![images](images/2608.jpg)\n\
    \n**Figure 26–8.** *Setting up as a new iPhone or restoring from a backup file*\n\
    \n12.  If you chose to restore, then after a little while you will see a `Restore\
    \ in Progress` screen on your iPhone and a status window in `iTunes` that says,\
    \ “Restoring iPhone from backup…” This status window will also show a time estimate.\n\
    13.  Next, you will see a little pop-up window saying, “The settings for your\
    \ iPhone have been restored.” In a few seconds, you will see your iPhone appear\
    \ in the left nav bar under `DEVICES` in `iTunes`.\n    1.  If you sync your information\
    \ with `iTunes`, all data will be synced now.\n    2.  If you use iCloud, Exchange,\
    \ or another sync process, you will probably have to reenter passwords on your\
    \ iPhone to get those sync processes back up and running.\n\n## Additional Troubleshooting\
    \ and Help Resources\n\nSometimes you may encounter a particular issue or question\
    \ that you cannot find an answer to in this book. In the following sections, we\
    \ will provide some good resources that you can access from the iPhone and from\
    \ your computer's web browser. The iPhone's on-device user guide is easy to navigate\
    \ and can quickly provide you with the information you seek. The Apple knowledgebase\
    \ is helpful if you are facing a troubleshooting problem that is proving especially\
    \ difficult to resolve. The iPhone/iPod touch-related web blogs and forums are\
    \ also good places to locate answers and even ask unique questions you might be\
    \ facing.\n\n### On-Device iPhone User Guide\n\nFollow these steps to access the\
    \ on-device iPhone user guide:\n\n1.  Open your `Safari` web browser to view the\
    \ online user guide for your iPhone.\n2.  Tap the `Bookmarks` button ![image](images/U2604.jpg)\
    \ in the bottom row of icons.\n3.  Swipe to the bottom of the list and tap `iPhone\
    \ User Guide`.\n\nIf you don't see that bookmark, then type this URL into `Safari`'s\
    \ `Address` bar on your iPhone: [`http://help.apple.com/iPhone`](http://help.apple.com/iPhone).\n\
    \n**TIP**: To view the manual in PDF format from your computer, go to [`http://support.apple.com/manuals/iphone/`](http://support.apple.com/manuals/iphone/).\n\
    \nOnce you get to the user guide on your iPhone, you should see a screen similar\
    \ to the one shown in [Figure 26–9](#Chapter26.html#fig_26_9).\n\nThe nice thing\
    \ is that you already know how to navigate the guide. Tap any topic to see more\
    \ information about a topic—either another list of subtopics or more detailed\
    \ information.\n\nRead the topic or tap another link to learn more.\n\nYou can\
    \ tap the button to the right of the screen to back out one level.\n\n![images](images/2609.jpg)\n\
    \n**Figure 26–9.** *Using the iPhone manual from `Safari` on your iPhone*\n\n\
    ### The Apple Knowledgebase\n\nOn your iPhone or computer's web browser, go to\
    \ this web page: [`www.apple.com/support/iphone/`](http://www.apple.com/support/iphone/)\n\
    \nFinally, click a topic in the left navbar."
  raw: "#### Reinstalling the iPhone Operating System (with or Without a Restore)\n\
    \nSometimes, you might have to do a clean install of your iPhone operating system\
    \ to get your iPhone back up and running smoothly. If an update is currently available,\
    \ then this process will also result in upgrading your iPhone software.\n\n**TIP:**\
    \ This process is virtually identical to the process of updating your iPhone with\
    \ a new version of the operating system.\n\nDuring this process, you will have\
    \ three choices:\n\n*   If you want to return the iPhone to its normal state with\
    \ all your data, you will have to use the **Restore** function in the **iTunes**\
    \ app.\n*   If you plan on getting a clean start and tying the iPhone to an iTunes\
    \ account, then you will need to use the **Setup a new iPhone** function at the\
    \ end of this process.\n*   If you plan on giving away or selling your iPhone,\
    \ then you will simply need to eject the iPhone from **iTunes** at the end of\
    \ this process (before doing a restore or new setup).\n\n**CAUTION**: This restore\
    \ process will wipe your iPhone totally clean. You will need to resynchronize\
    \ and reinstall all of your apps and enter your account information, such as your\
    \ email accounts. This process could take 30 minutes or longer, depending on how\
    \ much information you have synced to your iPhone.\n\nTo reinstall the iPhone\
    \ operating system software with the option of restoring data to your iPhone from\
    \ a previous backup, follow these steps:\n\n1.  Connect your iPhone to your computer\
    \ and load the **iTunes**app.\n2.  Click your **iPhone** in the **DEVICES** category\
    \ in the left nav bar.\n3.  Click **Summary** in the top nav bar.\n4.  You will\
    \ see the **Summary** screen with all the information about your iPhone. Click\
    \ the **Restore** button in the middle screen, as shown here (see [Figure 26–3](#Chapter26.html#fig_26_3)).\n\
    \n![images](images/2603.jpg)\n\n**Figure 26–3.** *Connecting your iPhone and clicking\
    \ the **Restore** button in the **Summary** screen*\n\n5.  Now you will be asked\
    \ whether you want to back up your phone. Click **Back Up** just to be safe (see\
    \ [Figure 26–4](#Chapter26.html#fig_26_4)).\n\n![images](images/2604.jpg)\n\n\
    **Figure 26–4.** *Backing up before you restore in **iTunes***\n\n6.  On the next\
    \ screen, you are warned that all data will be erased. Click **Restore** or **Restore\
    \ and Update** to continue (see [Figure 26–5](#Chapter26.html#fig_26_5)).\n\n\
    ![images](images/2605.jpg)\n\n**Figure 26–5.** *Backing up your iPhone in **iTunes**\
    \ before a restore*\n\n7.  You will see an iPhone **Software Update** screen.\
    \ Click **Next>** to continue.\n8.  Next, you will see the **Software License\
    \ Agreement** screen. Click **Agree** to continue and start the process.\n9. \
    \ **iTunes** will download the latest iPhone software, back up and sync your iPhone,\
    \ and then reinstall the iPhone software. This process completely erases all data\
    \ and restores your iPhone to its original, “clean” state. You will see status\
    \ messages at the top of **iTunes** similar to the one shown in [Figure 26–6](#Chapter26.html#fig_26_6).\n\
    \n![images](images/2606.jpg)\n\n**Figure 26–6.** *The software update/restore\
    \ process, with a status window at top of **iTunes***\n\n10.  After the backup\
    \ and sync, your iPhone screen will go black. Next, the **Apple** logo will appear,\
    \ and you will see a status bar under the logo. Finally, a small pop-up window\
    \ will appear in **iTunes** to tell you the update process is complete. Click\
    \ **OK** to go to the **Set Up Your iPhone** screen. You will have a couple options\
    \ at this point:\n    1.  If you want to keep your iPhone clean (i.e., without\
    \ any of your personal data), then select the top option, **Setup as a new iPhone**.\
    \ You might want to use this option if you are setting up this iPhone for someone\
    \ else (you will need her Apple ID and password).\n    2.  If you are giving away\
    \ or selling your iPhone, simply click the **Eject** icon next to the iPhone,\
    \ and you're done (see [Figure 26–7](#Chapter26.html#fig_26_7)).\n\n![images](images/2607.jpg)\n\
    \n**Figure 26–7.** *Ejecting the iPhone if you are giving it away or selling it*\n\
    \n3.  Select **Restore from the backup of:** and verify that the pull-down menu\
    \ is set to the correct device.\n11.  Finally, click **Continue** (see [Figure\
    \ 26–8](#Chapter26.html#fig_26_8)).\n\n![images](images/2608.jpg)\n\n**Figure\
    \ 26–8.** *Setting up as a new iPhone or restoring from a backup file*\n\n12.\
    \  If you chose to restore, then after a little while you will see a **Restore\
    \ in Progress** screen on your iPhone and a status window in **iTunes** that says,\
    \ “Restoring iPhone from backup…” This status window will also show a time estimate.\n\
    13.  Next, you will see a little pop-up window saying, “The settings for your\
    \ iPhone have been restored.” In a few seconds, you will see your iPhone appear\
    \ in the left nav bar under **DEVICES** in **iTunes**.\n    1.  If you sync your\
    \ information with **iTunes**, all data will be synced now.\n    2.  If you use\
    \ iCloud, Exchange, or another sync process, you will probably have to reenter\
    \ passwords on your iPhone to get those sync processes back up and running.\n\n\
    ### Additional Troubleshooting and Help Resources\n\nSometimes you may encounter\
    \ a particular issue or question that you cannot find an answer to in this book.\
    \ In the following sections, we will provide some good resources that you can\
    \ access from the iPhone and from your computer's web browser. The iPhone's on-device\
    \ user guide is easy to navigate and canquickly provide you with the information\
    \ you seek. The Apple knowledgebase is helpful if you are facing a troubleshooting\
    \ problem that is proving especially difficult to resolve. The iPhone/iPod touch-related\
    \ web blogs and forums are also good places to locate answers and even ask unique\
    \ questions you might be facing.\n\n#### On-Device iPhone User Guide\n\nFollow\
    \ these steps to access the on-device iPhone user guide:\n\n1.  Open your **Safari**\
    \ web browser to view the online user guide for your iPhone.\n2.  Tap the **Bookmarks**\
    \ button ![image](images/U2604.jpg) in the bottom row of icons.\n3.  Swipe to\
    \ the bottom of the list and tap **iPhone User Guide**.\n\nIf you don't see that\
    \ bookmark, then type this URL into **Safari**'s **Address** bar on your iPhone:\
    \ [`http://help.apple.com/iPhone`](http://help.apple.com/iPhone)`.`\n\n**TIP**:\
    \ To view the manual in PDF format from your computer, go to [`http://support.apple.com/manuals/iphone/`](http://support.apple.com/manuals/iphone/).\n\
    \nOnce you get to the user guide on your iPhone, you should see a screen similar\
    \ to the one shown in [Figure 26–9](#Chapter26.html#fig_26_9).\n\nThe nice thing\
    \ is that you already know how to navigate the guide. Tap any topic to see more\
    \ information about a topic—either another list of subtopics or more detailed\
    \ information.\n\nRead the topic or tap another link to learn more.\n\nYou can\
    \ tap the button to the right of the screen to back out one level.\n\n![images](images/2609.jpg)\n\
    \n**Figure 26–9.** *Using the iPhone manual from **Safari** on your iPhone*\n\n\
    #### The Apple Knowledgebase\n\nOn your iPhone or computer's web browser, go to\
    \ this web page: [`www.apple.com/support/iphone/`](http://www.apple.com/support/iphone/)\n\
    \nFinally, click a topic in the left navbar."
  trans: "\n# 重新安装 iPhone 操作系统（可选择是否恢复数据）\n\n有时，你可能需要执行一次 iPhone 操作系统的纯净安装，以便让 iPhone\
    \ 恢复顺畅运行。如果当前有可用更新，此过程也将同时升级你的 iPhone 软件。\n\n**提示：** 此过程实际上与使用新版本操作系统更新 iPhone\
    \ 的过程完全相同。\n\n在此过程中，你将面临三个选择：\n\n-   如果你想将 iPhone 恢复至包含所有数据的正常状态，则必须使用 `iTunes`\
    \ 应用中的`恢复`功能。\n-   如果你打算全新启动并将 iPhone 关联到一个 iTunes 账户，则需在此过程结束时使用`设置新的 iPhone`功能。\n\
    -   如果你打算赠送或出售你的 iPhone，只需在此过程结束时（在进行恢复或新设置之前）从 `iTunes` 中弹出 iPhone 即可。\n\n**警告**：此恢复过程将彻底清空你的\
    \ iPhone。你需要重新同步和重新安装所有应用程序，并输入你的账户信息，例如电子邮件账户。此过程可能需要 30 分钟或更长时间，具体取决于你同步到 iPhone\
    \ 的信息量。\n\n要按照步骤重新安装 iPhone 操作系统软件，并可以选择从之前的备份中恢复数据到你的 iPhone，请执行以下操作：\n\n1. \
    \ 将你的 iPhone 连接到电脑，并打开 `iTunes` 应用。\n2.  在左侧导航栏的`设备`类别中，点击你的`iPhone`。\n3.  点击顶部导航栏中的`摘要`。\n\
    4.  你会看到显示所有 iPhone 信息的`摘要`屏幕。点击屏幕中央的`恢复`按钮，如下图所示（请参见图 26–3）。\n\n![images](img/2603.jpg)\n\
    \n**图 26–3.** *连接你的 iPhone 并在`摘要`屏幕中点击`恢复`按钮*\n\n5.  现在系统会询问你是否要备份手机。为安全起见，请点击`备份`（请参见图\
    \ 26–4）。\n\n![images](img/2604.jpg)\n\n**图 26–4.** *在 `iTunes` 中恢复前进行备份*\n\n6.\
    \  在下一个屏幕上，你会被警告所有数据都将被抹掉。点击`恢复`或`恢复并更新`以继续（请参见图 26–5）。\n\n![images](img/2605.jpg)\n\
    \n**图 26–5.** *恢复之前在 `iTunes` 中备份你的 iPhone*\n\n7.  你会看到一个 iPhone `软件更新`屏幕。点击`下一步\
    \ >` 以继续。\n8.  接下来，你会看到`软件许可协议`屏幕。点击`同意`以继续并开始该过程。\n9.  `iTunes` 会下载最新的 iPhone\
    \ 软件，备份并同步你的 iPhone，然后重新安装 iPhone 软件。此过程会完全抹掉所有数据，并将你的 iPhone 恢复到原始“干净”状态。你将在\
    \ `iTunes` 顶部看到状态消息，类似于图 26–6 所示。\n\n![images](img/2606.jpg)\n\n**图 26–6.** *软件更新/恢复过程，`iTunes`\
    \ 顶部显示状态窗口*\n\n10.  备份和同步完成后，你的 iPhone 屏幕会变黑。接着，`Apple` 标志会出现，并且你会看到标志下方有一个进度条。最后，`iTunes`\
    \ 中会弹出一个小窗口，告知你更新过程已完成。点击`确定`进入`设置你的 iPhone` 屏幕。此时你将有以下几个选项：\n    1.  如果你希望保持\
    \ iPhone 的干净状态（即不含任何个人数据），请选择第一个选项`设置为新的 iPhone`。如果你正在为他人设置此 iPhone，你可能需要使用此选项（你需要她/他的\
    \ Apple ID 和密码）。\n    2.  如果你要赠送或出售你的 iPhone，只需点击 iPhone 旁边的`弹出`图标，就完成了（请参见图 26–7）。\n\
    \n![images](img/2607.jpg)\n\n**图 26–7.** *如果你要赠送或出售 iPhone，请将其弹出*\n\n3.  选择`从以下备份恢复：`并确认下拉菜单已设置为正确的设备。\n\
    11.  最后，点击`继续`（请参见图 26–8）。\n\n![images](img/2608.jpg)\n\n**图 26–8.** *设置为新 iPhone\
    \ 或从备份文件恢复*\n\n12.  如果你选择恢复，那么稍后你的 iPhone 上会出现`正在恢复`屏幕，并且 `iTunes` 中会显示一个状态窗口，提示“正在从备份恢复\
    \ iPhone…”。此状态窗口还会显示预计时间。\n13.  接下来，你会看到一个小弹出窗口，提示“你的 iPhone 设置已恢复”。几秒钟后，你会看到你的\
    \ iPhone 出现在 `iTunes` 左侧导航栏的`设备`下。\n    1.  如果你将信息与 `iTunes` 同步，则所有数据现在都将被同步。\n\
    \    2.  如果你使用 iCloud、Exchange 或其他同步过程，你可能需要在 iPhone 上重新输入密码以让这些同步过程恢复运行。\n\n\
    ## 其他故障排除和帮助资源\n\n有时，你可能会遇到本书中找不到答案的特定问题或疑问。在以下部分中，我们将提供一些可以从 iPhone 以及从电脑的网页浏览器访问的优质资源。iPhone\
    \ 上的设备端用户指南易于导航，可快速提供你所查找的信息。如果你遇到特别难以解决的故障排除问题时，Apple 知识库会很有帮助。与 iPhone/iPod\
    \ touch 相关的网络博客和论坛也是寻找答案甚至提出你遇到的独特问题的好地方。\n\n### iPhone 设备端用户指南\n\n请按照以下步骤访问 iPhone\
    \ 设备端用户指南：\n\n1.  打开你的 `Safari` 网络浏览器，查看你的 iPhone 的在线用户指南。\n2.  点击底部图标行中的`书签`按钮\
    \ ![image](img/U2604.jpg)。\n3.  滑动到列表底部，然后点击`iPhone 用户指南`。\n\n如果看不到该书签，请在 iPhone\
    \ 上的 `Safari` 的`地址`栏中输入此网址：[`http://help.apple.com/iPhone`](http://help.apple.com/iPhone)。\n\
    \n**提示**：要从电脑查看 PDF 格式的手册，请访问 [`http://support.apple.com/manuals/iphone/`](http://support.apple.com/manuals/iphone/)。\n\
    \n进入 iPhone 上的用户指南后，你应该会看到一个类似于图 26–9 所示的屏幕。\n\n好处在于你已经知道如何浏览该指南。点击任何主题以查看该主题的更多信息——可能是另一个子主题列表，或者是更详细的信息。\n\
    \n阅读该主题，或点击其他链接以了解更多信息。\n\n你可以点击屏幕右侧的按钮返回上一级。\n\n![images](img/2609.jpg)\n\n**图\
    \ 26–9.** *在你的 iPhone 上通过 `Safari` 使用 iPhone 手册*\n\n### Apple 知识库\n\n在你的 iPhone\
    \ 或电脑的网页浏览器中，访问此网页：[`www.apple.com/support/iphone/`](http://www.apple.com/support/iphone/)\n\
    \n最后，点击左侧导航栏中的一个主题。\n"
- fmt: '#### iPhone-Related Blogs


    One of the great things about owning an iPhone is that you immediately join in
    the worldwide camaraderie of iPhone owners. Many iPhone owners would be classified
    as *enthusiasts* and are part of any number of iPhone user groups. These user
    groups, along with various forums and web sites, serve as a great resource for
    iPhone users. Many of these resources are available right from your iPhone, and
    others are web sites that you might want to visit on your computer.


    Sometimes you might want to connect with other iPhone enthusiasts, ask a technical
    question, or keep up with the latest and greatest rumors. The blogs are a great
    place to do that.


    Here are a few popular iPhone (and iPad or iPod touch) blogs:

    *   [`www.tipb.com`](http://www.tipb.com)

    *   [`www.iphonefreak.com`](http://www.iphonefreak.com)

    *   [`www.gizmodo.com`](http://www.gizmodo.com) (iPhone section)


    **TIP**: Before you post a new question on any of these blogs, please do a search
    on the blog to make sure your question has not already been asked and answered.
    Also, make sure you are posting your question on the right section (e.g., iPhone)
    of the blog. Otherwise, you may incur the wrath of the community for not doing
    your homework first!


    You can also do a web search for “iPhone blogs” or “iPhone news and reviews” to
    locate more blogs.


