    \ convenient spot.\n4.  Touch the **switch Camera** button to show the **FaceTime**\
    \ caller you are looking at. The **switch Camera** button will now use the standard\
    \ camera on the back of the iPhone. In [Figure 11–2](#Chapter11.html#fig_11_2),\
    \ I get to see the beautiful vistas of Colorado from Martin's vacation, and he\
    \ gets to see my dog on the couch!\n5.  Touch the **End** button to end the **FaceTime**call.\n\
    6.  Touch the **Mute** button to temporarily mute the call.\n\n![images](images/1102.jpg)\n\
    \n**Figure 11–2.** *Switching camera views on a **FaceTime** call*"
  trans: "\n#### 使用“信息”发送图片或视频\n\n要发送彩信或多媒体 iMessage，你需要使用我们在发送短信时介绍过的同款“信息”应用。按以下步骤操作：\n\
    \n![images](img/U1021.jpg)\n\n1.  轻点“信息”图标开始发信息——就像发短信一样。\n\n    ![images](img/U1022.jpg)\n\
    \n2.  你会注意到文本输入框旁边有一个小小的“相机”图标。轻点此图标，系统会提示你“拍照或录像”或“选取现有内容”。\n\n    ![images](img/U1023.jpg)\n\
    \n3.  若要拍照，请按照第 20 章：“使用照片”中的说明操作。如果选择“选取现有内容”选项，只需浏览你的照片/视频，找到要添加到信息中的项目即可。\n\
    \n    ![images](img/U1024.jpg)\n\n4.  轻点右下角的蓝色“选取”按钮，你会看到图片加载到小窗口中。\n\n    ![images](img/U1025.jpg)\n\
    \n5.  选择收件人（如前所示），如果需要，可以输入一条简短留言。接着，轻点蓝色的“发送”按钮。\n\n    ![images](img/U1026.jpg)\n\
    \n如果你已与该特定联系人有过会话讨论，那么他的图片会出现在该会话讨论中。\n\n![images](img/U1027.jpg)\n\n**注意**：你可以在会话讨论过程中继续交换图片和文字。而且你随时可以滚动查看整个讨论内容——包括图片和所有内容！\n\
    \n#### 从“照片”中选择图片并通过“信息”发送\n\n发送图片或视频信息的第二种方法是直接进入“照片”应用并选择一张图片。按以下步骤操作：\n\n1.\
    \  启动“照片”应用，按照第 21 章：“使用照片”中的说明浏览你的照片。\n\n    ![images](img/U1028.jpg)\n\n2. \
    \ 若要只发送一张图片，轻点你想要发送的图片，然后轻点左下角的“发送”图标。\n3.  现在你会看到“信息”作为第二个选项。选择“信息”，图片就会像之前在“信息”应用中那样加载到气泡中。\n\
    \n#### 发送多张图片\n\n按以下步骤发送多张图片：\n\n1.  启动“照片”应用，就像你在上一节中所做的那样。\n\n    ![images](img/U1029.jpg)\n\
    \n2.  不要轻点单张图片，而是轻点左下角的“操作”按钮。\n3.  现在，只需轻点最多数量的图片。你会看到它们的颜色变浅，并且方框中会出现一个红色勾选标记图标。\n\
    4.  一旦你选择了最大数量的图片（可能是 5 张、9 张或其他数量，具体取决于你的无线运营商），请轻点左下角的“共享”按钮。\n5.  选择“信息”，图片就会出现在信息气泡中。\n\
    \n## 第 11 章\n\n## 视频通话与 Skype\n\n你的 iPhone 为你的生活带来了许多新功能，其中一些在几年前还像是科幻小说中的情节。例如，视频通话如今不仅成为可能，而且借助全新的“FaceTime”功能变得极其易用。只要你和通话对象都使用\
    \ iPhone，并且都连接在 Wi-Fi 网络上，就可以进行无限制的视频通话。在本章中，我们将向你展示如何启用和使用“FaceTime”，以及如何开始享受这一绝佳新功能带来的乐趣。\n\
    \n通过 Wi-Fi 甚至 3G 网络进行通话，也可以通过“skype”实现——这是许多人电脑上使用的流行视频通话和聊天程序。我们还将向你展示如何使用“skype”应用。\n\
    \n说到视频，你的 iPhone 是一款功能强大的视频录像机。你可以录制并导出高达 1080p 分辨率、每秒 30 帧的高清视频。然后，你可以直接将视频发布到\
    \ YouTube 或 iCloud，甚至通过电子邮件发送给收件人。我们还将向你展示如何拍摄并快速“修剪”你的视频，以及如何上传它们。\n\n### 视频通话\n\
    \n多年来，我们在电视剧和电影中看到过像这样的未来技术首次亮相。例如，许多剧集和电影中展示了人们使用小巧便携的手机进行视频对话的场景。甚至 20 世纪 70\
    \ 年代的《摩登原始人》卡通片也将其视为一个未来概念。\n\niPhone 让这种未来构想今天变成了现实。有几款应用可以让你使用 iPhone 的前置摄像头进行视频通话。目前，只有一款应用允许你同时使用前置摄像头和后置摄像头：“FaceTime”。\n\
    \n#### 使用 FaceTime 进行视频通话\n\n“FaceTime”是苹果公司在许多 iPhone 广告中重点宣传的专属应用。本质上，“FaceTime”是一种免费\
    \ Wi-Fi 通话，让你可以通过手机的前置摄像头看到通话另一端的对方。\n\n**注意：** 目前，“FaceTime”仅适用于近期 iOS 设备（如 iPhone\
    \ 4、iPhone 4S、iPad 2 和 iPod touch 4）以及 Mac 电脑之间的视频通话。同时，它仅支持通过 Wi-Fi 网络使用。苹果表示正在探索扩展这项服务，因此不久的将来它也能在标准的\
    \ 3G 网络上运行。不过，运营商也需要参与其中，你才能在特定网络上看到这项功能。\n\n##### 在你的 iPhone 上启用 FaceTime 通话\n\
    \n当你首次使用设备时，“FaceTime”可能尚未启用。要启用 iPhone 接收和拨打“FaceTime”通话，请按以下步骤操作：\n\n1.  启动“设置”应用。\n\
    \n    ![images](img/U1101.jpg)\n\n2.  轻点“FaceTime”。\n3.  将“FaceTime”开关切换至“打开”位置。\n\
    \n系统可能会要求你使用 Apple ID 登录。\n\n**提示：** 你也可以滚动到底部并轻点“来电显示”，以调整你的电话号码或电子邮件地址是否显示为你的“FaceTime”来电显示。\n\
    \n##### 使用 FaceTime\n\n一旦“FaceTime”启用，你会在每次从 iPhone 拨打电话时看到它作为一个选项。“FaceTime”图标将出现在所有电话的选项显示中。然而，只有当通话另一方使用的是支持“FaceTime”的\
    \ iOS 设备或 Mac 时，“FaceTime”才会起作用。\n\n![images](img/U1102.jpg)\n\n要发起“FaceTime”通话，请按以下步骤操作：\n\
    \n1.  像在 iPhone 上正常拨打电话一样。\n2.  轻点“FaceTime”按钮（通常位于“保留”按钮的位置），应用会询问通话另一端的对方是否“接受”“FaceTime”通话。\n\
    3.  或者，你也可以直接“接受”来自另一方的“FaceTime”通话（参见图 11–1）。\n\n![images](img/1101.jpg)\n\n\
    **图 11–1.** *接受“FaceTime”通话*\n\n一旦“FaceTime”通话发起，请按以下步骤进行视频会议：\n\n1.  将手机稍微拿远一些。\n\
    2.  确保你在窗口中的位置*构图*得当。\n3.  你可以将包含自己小图像的画面拖动到屏幕上的方便位置。\n4.  轻点“切换摄像头”按钮，向“FaceTime”通话对象展示你正在观看的内容。“切换摄像头”按钮现在将使用\
    \ iPhone 背面的标准摄像头。在图 11–2 中，我看到了 Martin 度假时科罗拉多州的美景，而他则看到了我的狗在沙发上！\n5.  轻点“结束”按钮以结束“FaceTime”通话。\n\
    6.  轻点“静音”按钮以暂时将通话静音。\n\n![images](img/1102.jpg)\n\n**图 11–2.** *在“FaceTime”通话中切换摄像头视图*\n"
- fmt: "# Making Phone Calls and More with Skype\n\nSocial networking is all about\
    \ keeping in touch with our friends, colleagues, and family. Passive communication\
    \ through sites such as [`www.facebook.com`](http://www.facebook.com) and `Google+`\
    \ is nice, but sometimes there is just no substitute for hearing someone's voice.\n\
    \nAmazingly, you can make phone and video calls using the `skype` app from any\
    \ iPhone. Calls to other Skype users anywhere in the world are free. A nice thing\
    \ about the Skype service is that it works on computers and many mobile devices,\
    \ including the iPhone 4S, older iPhones, iPads and iPod touches, some BlackBerry\
    \ smart phones, and other mobile devices. You will be charged for calls to mobile\
    \ phones and land lines, but the rates are reasonable.\n\n![images](images/U1103.jpg)\n\
    \n![images](images/U1104.jpg)\n\n**NOTE**: Unlike `FaceTime`, the `skype` app\
    \ can place video calls over 3G networks. It can also run in the background, so\
    \ you can answer incoming Skype calls at any time (note that this usually leads\
    \ to faster battery drain).\n\n## Downloading Skype to Your iPhone\n\nYou can\
    \ download the free `skype` app from the App Store by searching for \"Skype\"\
    \ and installing it. If you need help getting this done, please check out [Chapter\
    \ 23](#Chapter23.html#ch23): \"The Amazing App Store.\"\n\n## Creating Your Skype\
    \ Account\n\nIf you need to set up your Skype account and have not already done\
    \ so from your computer (see the \"Using Skype on Your Computer\" section later\
    \ in this chapter).\n\n## Log into the Skype App\n\nAfter you create your account,\
    \ you're ready to log into `skype` on your iPhone. To do so, follow these steps:\n\
    \n1.  If you are not already in `skype`, tap the `skype` icon from your `Home`\
    \ screen.\n\n    ![images](images/U1105.jpg)\n\n2.  Type your Skype Name and Password.\n\
    3.  Tap the `sign In` button in the upper-right corner.\n4.  You should not have\
    \ to enter this login information again; it is saved in `skype`. The next time\
    \ you tap `skype`, it will automatically log you in.\n\n## Finding and Adding\
    \ Skype Contacts\n\nOnce you have logged into the `skype` app, you will want to\
    \ start communicating with people. To do so, you will have to find them and add\
    \ them to your `skype` contacts list:\n\n1.  If you are not already in the `skype`\
    \ app, tap the `skype` icon from your `Home` screen and log in, if asked.\n2.\
    \  Tap the `Contacts` soft key at the bottom.\n3.  Tap the `search` window at\
    \ the top, and then type someone's first and last name or `skype` name. Tap `search`\
    \ to locate that person.\n\n    ![images](images/U1106.jpg)\n\n4.  Once you see\
    \ the person you want to add, tap their name.\n5.  If you are not sure whether\
    \ this is the correct person, tap the `View Full Profile` button.\n\n    ![images](images/U1107.jpg)\n\
    \n6.  Tap `Add Contact` at the bottom.\n7.  Adjust the invitation message appropriately.\n\
    \n    ![images](images/U1108.jpg)\n\n8.  Tap the `send` button to send this person\
    \ an invitation to become one of your `skype` contacts.\n9.  Repeat the procedure\
    \ to add more contacts.\n10. When you are done, tap the `Contacts` soft key at\
    \ the bottom.\n11. Tap `All Contacts` from the `Groups` screen to see all new\
    \ contacts you have added.\n12. Once this person accepts you as a contact, you\
    \ will see him listed as a contact in your `All Contacts` screen.\n\n**TIP:**\
    \ sometimes you want to get rid of a Skype contact. You can remove or block a\
    \ contact by tapping her name from the contact list. Tap the `settings` icon (upper-right\
    \ corner) and select either `Remove from Contacts` or `Block`.\n\n![images](images/U1109.jpg)\n\
    \n## Making Calls with Skype on Your iPhone\n\nSo far you have created your account\
    \ and added your contacts. Now you are ready to finally make that first call with\
    \ `skype` on your iPhone:\n\n1.  Tap the `Contacts` soft key at the bottom.\n\n\
    \    ![images](images/U1110.jpg)\n\n2.  Tap `All Contacts` to see your contacts.\n\
    3.  Tap the contact name you wish to call.\n4.  Tap the `Call` button to make\
    \ a voice call or the `Video Call` button to make a video call.\n5.  You may see\
    \ a Skype button and a Mobile or other phone button. Press the Skype button to\
    \ make the free call. Making any other call requires that you pay for it with\
    \ Skype Credits.\n\n**NOTE:** You can call toll free numbers for free using `skype\
    \ Out` on your iPhone. The following notice comes from the Skype web site at [`www.skype.com`](http://www.skype.com):\n\
    \n\"The following countries and number ranges are supported and are free of charge\
    \ to all users. We're working on the rest of the world. France: +33 800, +33 805,\
    \ +33 809Poland: +48 800UK: +44 500, +44 800, +44 808USA: +1 800, +1 866, +1 877,\
    \ +1 888Taiwan: +886 80\"\n\n## Receiving Calls with Skype on Your iPhone\n\n\
    The iPhone innately supports background VoIP calls. With the new version of `skype`,\
    \ you can have `skype` running in the background and still be able to receive\
    \ a `skype` call when it comes in. You can even, in theory, be on a voice call\
    \ and then answer your `skype` call!\n\n**TIP:** if you don't want to leave `skype`\
    \ running in the background, but still want to call someone whom you know uses\
    \ `skype` on her iPhone, just send her a quick email or give her a quick call\
    \ to alert her to the fact you would like to talk to her using the `skype` app.\n\
    \n### Buying Skype Credits or a Monthly Subscription\n\nSkype-to-Skype calls are\
    \ free. However, if you want to call people on their land lines or mobile phones\
    \ from the `skype` app, then you will need to purchase Skype Credits or purchase\
    \ a monthly subscription plan. If you try to purchase the credits or subscription\
    \ from within the `skype` app, it will take you to the Skype web site. For this\
    \ reason, we recommend using `safari` on your iPhone or using your computer's\
    \ web browser to purchase these credits.\n\n**TIP:** You may want to start with\
    \ a limited amount of Skype Credits to try out the service before you sign up\
    \ for a subscription plan. Subscription plans are the way to go if you plan on\
    \ using Skype a lot for non-Skype callers (e.g., regular landlines and mobile\
    \ phones).\n\nFollow these steps to use `safari` to buy Skype Credits:\n\n1. \
    \ Tap the `safari` icon.\n2.  Type [`www.skype.com`](http://www.skype.com) in\
    \ the top address bar and tap `Go`.\n3.  Tap the `sign In` link at the top of\
    \ the page.\n4.  Enter your Skype Name and Password, and then tap `sign me in`.\n\
    5.  If you are not already on your `Account` screen, tap the `Account` tab in\
    \ the right end of the Top Nav Bar.\n6.  At this point, you can choose to buy\
    \ credits or a subscription:\n    *   Tap the `Buy pre-pay credit` button to purchase\
    \ a fixed amount of credits.\n    *   Tap the `Get a subscription` button to buy\
    \ a monthly subscription account.\n7.  Finally, complete the payment instructions\
    \ for either type of purchase.\n\n## Chatting with Skype\n\nIn addition to making\
    \ phone calls, you can also chat via text with other `skype` users from your iPhone.\
    \ Starting a chat is very similar to starting a call; follow these steps to do\
    \ so:\n\n1.  If you are not already in `skype`, tap the `skype` icon.\n2.  Tap\
    \ the `Contacts` soft key at the bottom.\n\n    ![images](images/U1111.jpg)\n\n\
    3.  Tap `All Contacts` to see all your contacts.\n4.  Tap the name of the contact\
    \ you wish to chat with.\n5.  Tap the `Chat` button.\n6.  Type your chat text\
    \ and press the `send` button. Your chat will appear in the top of the screen.\n\
    \n    ![images](images/U1112.jpg)"
