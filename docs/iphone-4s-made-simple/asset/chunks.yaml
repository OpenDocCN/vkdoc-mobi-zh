  trans: "\n### 复制与粘贴\n\n“复制与粘贴”功能非常实用，既能节省时间，又能提高打字准确度。你可以利用此功能将邮件中的文本（例如会议详情）复制并粘贴到日历中。或者，你也许只是想将表单某处的电子邮件地址复制到另一处，省去重新输入的麻烦。（我们将在第\
    \ 4 章：“其他同步方式”的“设置 Exchange/Google 账户”部分为你演示这一技巧。）复制与粘贴的用途十分广泛；你用得越熟练，就越会频繁使用它。你甚至可以从你的\
    \ `Safari` 网页浏览器中复制文本或图片，然后粘贴到 `Notes` 或 `Mail` 信息中。\n\n#### 通过双击选择文本\n\n如果你正在阅读或输入文本，可以双击它以开始选择要复制的部分文本。这在\
    \ `Mail`、`Messages` 和 `Notes` 应用中效果很好。\n\n你会看到一个带有蓝色圆点（操作柄）的方框，位于对角处。\n\n![images](img/U0232.jpg)\n\
    \n只需拖动这些操作柄，即可选中你想要高亮并复制的文本。\n\n![images](img/U0233.jpg)\n\n**提示：** 如果你想选择所有文本，请点击光标，或在文本上方或下方双击屏幕。这将弹出一个窗口，显示\
    \ `Select` 和 `Select All` 选项。点击 `Select` 选择一个单词，或点击 `Select All` 高亮所有文本。\n\n![images](img/U0234.jpg)\n\
    \n#### 通过双指触摸选择文本\n\n另一种选择文本的方式是同时用两根手指触碰屏幕。如果你用一只手握住 iPhone，用另一只手的拇指和食指触碰屏幕，这种方法效果最佳。你也可以将\
    \ iPhone 放在桌子上，用双手各一根手指触碰屏幕。请按照以下步骤使用此方法：\n\n1.  在你要选择的文本的起始处和结束处同时触碰屏幕。如果第一次触摸时没能精确选中，不必担心。\n\
    2.  双指触摸后，使用蓝色操作柄将选区的起始和结束位置拖拽到正确位置。\n\n#### 通过长按选择网站或其他不可编辑文本\n\n在 `Safari` 网页浏览器以及其他你无法编辑文本的地方，用手指按住某段文本，该段落将被高亮，并在每个角上显示操作柄。\n\
    \n接下来，如果你想选择更多文本，就拖动这些操作柄。\n\n**注意：** 如果拖动范围小于一个段落，选择器将切换为精细文本模式，并在选区两端提供蓝色操作柄，以便你精确选择所需的字符或单词。如果拖动手指超过一个段落，则会启用粗略文本选择器，你可以向上或向下拖动，以选择整段整段的文本和图形。\n\
    \n![images](img/U0235.jpg)\n\n#### 剪切或复制文本\n\n一旦突出显示了你要复制的文本，只需触摸屏幕顶部的`Copy`选项卡。该选项卡会变为蓝色，表示文本已存入剪贴板。\n\
    \n**注意：** 如果你之前已经剪切或复制过文本，那么你还会看到 `Paste` 选项，如右图所示。\n\n![images](img/U0236.jpg)\n\
    \n#### 应用切换与多任务处理\n\n复制文本后，你可能想将其粘贴到另一个应用中。例如，你可能想从 Safari 复制一些文本，然后粘贴到 Notes\
    \ 或 Mail 信息中。在应用之间跳转的最简单方法是使用 `App Switcher` 应用。请按照以下步骤将一个应用中的文本粘贴到另一个应用中：\n\n\
    1.  复制或剪切你的文本。\n2.  双击 `Home` 按钮，调出屏幕底部的 `App Switcher` 应用。\n3.  如果你刚刚让一个应用在后台运行，你可以在\
    \ `App Switcher` 栏中找到它。\n4.  向左或向右滑动，找到你想要的应用并点击它。\n5.  如果你在 `App Switcher` 栏中没有看到想要的应用，则点击\
    \ `Home` 按钮，然后从 `Home` 屏幕启动它。\n6.  现在，长按屏幕，然后从弹出窗口中选择 `Paste` 来粘贴文本。\n7.  再次双击\
    \ `Home` 按钮，点击你刚才离开的应用，即可跳转回去。\n\n#### 粘贴文本\n\n在同一个应用中粘贴文本很简单。例如，只需按照以下步骤将文本粘贴到同一个\
    \ `Notes` 或 `Mail` 信息中：\n\n1.  用手指将光标移动到你想粘贴文本的位置。记住我们本章前面展示的`放大镜`技巧；这可以帮助你定位光标。\n\
    2.  松开屏幕后，你应该会看到一个弹出窗口，询问你是要 `Select`、`Select All` 还是 `Paste`。\n3.  如果你没有看到这个弹出窗口，请双击屏幕。\n\
    4.  选择 `Paste` 以粘贴你的选择内容。\n\n#### 摇动以撤销\n\niPhone 的一大特色功能是能够撤销输入、复制和粘贴，甚至是你刚刚完成的\
    \ Siri 听写。\n\n你只需在粘贴后摇动 iPhone。一个新的弹出窗口将会出现，让你可以选择撤销刚才的操作。\n\n点击`撤销输入`或`撤销粘贴`来纠正错误。\n\
    \n![images](img/U0237.jpg)\n\n![images](img/U0238.jpg)\n\n**提示：快速删除文本**\n\n如果你曾想只点击一两下就快速删除几行文本、一个段落、甚至是你刚刚输入的所有文本，那么这个技巧就是为你准备的。首先，使用前面描述的方法选中你想要删除的文本。接下来，只需按下键盘左下角的\
    \ `Delete` 键 ![images](img/U0239.jpg)，即可删除所有选中的文本。\n\n### 使用聚焦搜索查找内容\n\n聚焦搜索是\
    \ iPhone 上一个很棒的功能，可以帮助你查找信息。这是苹果公司专有的搜索方法，用于在你的 iPhone 上执行全局搜索。你可以使用此功能搜索姓名、事件或主题。\n\
    \n其概念很简单。假设你在寻找与“Martin”相关的内容。你不记得它是电子邮件、`Notes` 中的文档，还是日历事件；但你确定它与 Martin 有关。\n\
    \n这时就是使用聚焦搜索功能来查找 iPhone 上所有与 Martin 相关内容的最佳时机。\n\n#### 激活聚焦搜索\n\n首先，你需要调出位于 `Home`\
    \ 屏幕第一页左侧的 `Spotlight Search` 页面。\n\n![images](img/U0240.jpg)\n\n在第一个圆点（指示 `Home`\
    \ 屏幕第一页）的左侧，你可以看到一个非常小的`放大镜`图标。\n\n在第一页图标上用手指从左向右滑动，即可看到 `Spotlight Search` 页面。你也可以从第一屏图标按下\
    \ `Home` 按钮，以看到相同的搜索页面。\n\n![images](img/U0241.jpg)\n\n请按照以下步骤使用此功能进行搜索：\n\n1.\
    \  在 `Spotlight Search` 页面，输入一个或多个单词作为搜索参数。\n2.  点击右下角的 `Search` 按钮执行搜索。\n\n \
    \   **提示：** 如果你在寻找某个人，请输入他的全名，以便更准确地找到仅与那个人相关的项目（例如，“Martin Trautschold”）。这将排除你\
    \ iPhone 上可能存在的其他名叫 Martin 的人，使你能够只找到与 Martin Trautschold 相关的项目。\n\n3.  在搜索结果中，你会看到搜索找到的所有电子邮件、约会、会议邀请和联系人信息。向下滑动查看更多结果。\n\
    4.  点击列表中的某个结果以查看其内容。\n\n你的搜索结果会一直保留，直到你将其清除。这意味着你可以仅仅通过从 `Home` 屏幕向右滑动，就能返回到\
    \ `Spotlight Search` 页面查看你之前的搜索结果。\n\n要清除 `Search` 字段，只需触摸搜索栏中的 `X` 即可。要退出 `Spotlight\
    \ Search` 页面，只需按下 `Home` 键或向左滑动。"
- fmt: '#### Searching the Web or Wikipedia


    After you perform a Spotlight Search, you will see two options beneath your results:
    **Search Web** and **Search Wikipedia**.


    Tap either of these options to execute your search on the Web or in Wikipedia.


    #### Customizing Spotlight Search


    You can customize your Spotlight Search by removing certain apps or types of data
    from the search. You can even change the order in which each type of data is searched.
    This might be useful if you want to search only your **Contacts** and **Mail**
    messages—and nothing else. Or, if you know that you always want to search **Mail**
    first, then **Calendar**, and then **Music**—you could set those items in the
    proper order. Follow these steps to do so:


    1. Tap the **Settings** icon.

    2. Tap **General**.

    3. Tap **Spotlight Search**.

    4. To change the order of the items searched, touch and drag the right edge of
    the item with the three gray bars up or down.

    5. To remove a specific item from the search, tap it to remove the **Checkmark**
    icon next to it. Unchecked items are not searched by Spotlight Search.

    6. Tap the **General** button in the upper-left corner to return to the **Settings**
    app.


    ![images](images/U0242.jpg)


    ## Chapter 3


    ## Sync with iCloud, iTunes, and More


    In this chapter, we will show you how to set up or adjust your storage and push
    your information to Apple’s new iCloud service, as well as how to synchronize
    information between your iPhone and your Windows or Mac computer using iTunes.


    With iCloud, you can wirelessly sync your mail, contacts, calendars, reminders,
    bookmarks, notes, photos, and documents and data, as well as back up your iPhone
    wirelessly over-the-air (OTA). With iTunes, you can sync or transfer contacts,
    calendar, notes, apps, music, videos, iBooks, documents, and picture libraries,
    as well as back up your iPhone.


    And, because nothing ever works right all the time, we’ll show you a few simple
    troubleshooting tips. Finally, we’ll show you how to check for updates and install
    updated operating system software for your iPhone.


    ### iCloud


    iCloud is free, easy to set up, and easy to use. In most cases, it is the best
    way to sync your personal information, music, TV shows (U.S. only), and apps.
    It is also the best way to handle backups and to restore your phone. Unless you
    have very specific reasons not to, we highly recommend using iCloud for most of
    your syncing needs, but the **iTunes** app for anything iCloud doesn’t yet handle
    (like movies).


    iCloud also lets you re-download previous iTunes, iBookstore, and App Store purchases,
    but your iCloud ID can also be used with iMessage, FaceTime, and other free Apple
    services.


    **NOTE:** Apple is very careful not to use the word *sync* when it comes to iCloud.
    Instead, it says *store* and *push*. The difference is largely technical and has
    to do with how Apple is moving your data around.


    The important thing to remember is that, when you change something on your iPhone,
    Apple copies the change to its servers and then sends copies back down to all
    your other iCloud-enabled iOS devices, as well as to your Windows or Mac PC.


    ### Setting up iCloud


    In [Chapter 1](#Chapter01.html#ch1): “Getting Started,” we showed you how to enable
    iCloud while setting up your new iPhone or restoring from a previous iCloud backup.
    Once iCloud is enabled, you can easily turn various services on or off.


    Start by launching the **Settings** app and scrolling down to iCloud.


    **Mail**, **Contacts**, **Calendars**, **Reminders**, **Bookmarks**, **Notes**,
    and **Find my iPhone** can easily be toggled to **ON** or **OFF** directly from
    this screen.


    For the **Photo Stream option**, you need to tap the tab first to get to the **On**/**Off**
    toggle.


    ![images](images/U0301.jpg)


    **NOTE:** At the time of writing, Photo Stream is an all-or-nothing service. If
    Photo Stream is turned on, Apple will keep 1000 of your most recent photos for
    up to 30 days on its servers, copying them to your iPad, Apple TV, Mac, or Windows
    PC. Anything logged into iCloud will get a copy of your Photo Stream. If you take
    photos of a sensitive or personal nature, you might want to set the **Photo Stream**
    option to **Off**.


    Likewise, you can tap **Documents and Data to toggle** this option **ON or OFF.**
    You also have the option to set the **Use Cellular option to ON**. This will make
    sure your documents stay up to date even when you’re out and connected to a 3G
    data network.


    **NOTE:** If you’re on a limited data plan or are roaming while traveling, then
    you might want to turn this feature off to avoid costly overage charges.


    ![images](images/U0302.jpg)


    ### Managing iCloud Storage and Backup


    iCloud comes with 5GB of free storage. Music from iTunes, apps, iBooks, and your
    Photo Stream don’t count against your 5GB, so most people will still have plenty
    of space left over for app data, documents, and backups.


    ![images](images/U0303.jpg)


    To check your iCloud Storage, scroll down to the bottom and tap **Storage and
    Backup**.


    ![images](images/U0304.jpg)


    The **Storage** section shows you **Total Storage**, or the full size of your
    iCloud account; and **Available Storage** shows how much total storage you have
    left.


    At the bottom of the screen, you can toggle **iCloud Backup** to **ON** or **OFF**.


    **NOTE:** For most users, most of the time, we strongly recommend the **iCloud
    Backup** option be toggled to **ON** and left that way.


    You can tap the **Back Up Now** button if you ever need to back up your iPhone
    immediately. You might do this if you want to reinstall your iPhone, switch to
    a replacement or new iPhone, or intend to go on a trip and want to make sure your
    phone is backed up before you leave.


    To see how your iCloud storage is being used, tap **Manage Storage**.


    At the top of the **Manage Storage** screen, you’ll see a list of devices currently
    backed up to iCloud. This will include your iPhone and any other iOS devices you
    might own, like an iPad or iPod touch.


    Tap the device you want to look at and you’ll be taken to the **Info** screen,
    which shows when your **Latest Backup** took place and the **Backup Size**.


    The **Backup Options** section lets you individually toggle different types of
    backups on or off, including the **Camera Roll** and any apps you might have installed
    that sync their settings or data with iCloud. This section also tells you how
    much storage each app is using.


    Initially, you’ll only see a few apps. Tap **See All Apps** for the full list.
    Setting an app to **OFF** means you’ll save on storage space, but your data will
    no longer be synced between your iOS devices, nor will it be restored if you ever
    reinstall your device or the app.


    ![images](images/U0305.jpg)


    ![images](images/U0306.jpg)


    ![images](images/U0307.jpg)


    **TIP:** Your iPhone’s big, 8 megapixel, 1080p camera means that backing up the
    **Camera Roll** can quickly eat up a lot of storage, especially if you have only
    the free 5GB plan. The Photo Stream feature already backs up your photos; if backing
    up your video isn’t a concern, then you can toggle **Camera Roll** backups to
    **OFF** to save space.


    ### Buying More iCloud Storage


    You might find yourself constantly running out of iCloud storage, decide you want
    to start backing up more photos and videos, or discover you need to back up multiple
    iOS devices. If so, you can buy more iCloud Storage from Apple.


    Simply tap any of the **Buy More Storage** buttons peppered throughout the iCloud’s
    **Settings** screens. At the time of writing, additional iCloud storage costs
    were as follows:


    * 10GB for US $20/year

    * 20GB for US $40/year

    * 50GB for US $100/year


    ![images](images/U0308.jpg)'
