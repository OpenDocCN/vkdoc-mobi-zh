  trans: '

    ### 视频控制


    视频开始播放后，屏幕上的控制按钮会消失，因此你只能看到视频画面。在视频播放过程中，如需停止、暂停或激活其他选项，只需轻点屏幕即可。


    屏幕上的选项与你观看其他视频时看到的基本相同。


    （横屏模式下）要快进视频，请长按`快进`箭头。要快速后退，请长按`后退`箭头。要播放在 YouTube 列表中的下一个视频，请轻点`快进`/`下一个`箭头。要观看列表中的上一个视频，请轻点`后退`/`上一个`箭头。


    ![images](img/U1521.jpg)


    要将视频设为收藏，请轻点最左侧的图标：`收藏夹`。 ![images](img/U1522.jpg)


    要将视频投射到 Apple TV 上，请轻点`AirPlay`按钮。 ![images](img/U1523.jpg)


    ![images](img/U1524.jpg)


    要添加至收藏夹、通过电子邮件发送或发布推文分享该视频，请轻点`共享`图标，即可进行这些操作。


    ![images](img/U1525.jpg)


    ### 查看和清除历史记录


    ![images](img/U1526.jpg)


    轻触`更多`，然后轻触`历史记录`，你最近观看的视频便会显示出来。


    如果你想清除历史记录，只需轻触右上角的`清除`按钮，然后点击底部的按钮确认即可。


    要观看历史记录中的视频，只需轻触该视频，它便会开始播放。


    ![images](img/U1527.jpg)


    **注意：** `Netflix`应用会消耗大量数据，因此，如果你是通过 Wi-Fi 流播放视频，请确保 Wi-Fi 信号强。如果通过 3G 蜂窝网络使用该应用，请确保你的数据套餐足够。


    ## 第 16 章


    ## Safari 网页浏览器


    现在，我们将带你了解 iPhone 上最有趣的体验之一：上网冲浪。你可能听说过，在 iPhone 上浏览网页比以往任何时候都更贴近个人体验——我们同意这一点！我们将向你展示如何通过
    iPhone 上的 `Safari`，以前所未有的方式进行触摸、缩放以及与网页互动。你将学习如何设置和使用书签、通过搜索引擎快速查找内容、打开并切换多个浏览器窗口，甚至能够轻松地从网页中复制文本和图像。


    ### 在 iPhone 上浏览网页


    你可以通过 Wi-Fi 或 iPhone 的 3G 连接随心所欲地浏览网页。与其更大的同类产品 iPad 一样，你的 iPhone 拥有许多人认为目前最强大的移动浏览体验。网页看起来与你在电脑上看到的非常相似。借助
    iPhone 的缩放功能，你甚至无需担心较小的屏幕尺寸会影响你的网页浏览体验。简而言之，在 iPhone 上浏览网页是一种更令人满意的体验。


    你可以根据自己的偏好选择竖屏或横屏模式浏览。通过双击或双指捏合放大的手势快速放大视频——这些操作与你放大文本和图像时的动作相同。


    **为什么有些视频和网站无法显示？（需要 Flash Player）**


    ![images](img/U1601.jpg)


    Apple 在 iOS 上不支持 Flash，并且 Adobe 近期已决定停止开发 Flash Player Mobile。如果你轻点一个视频但无法播放，或者看到类似“需要
    Flash 插件”、“下载最新 Flash 插件以观看此视频”或“需要 Adobe Flash 才能查看此站点”的提示，那么你将无法观看该视频或访问该网页。幸运的是，越来越多的网站开始使用
    HTML5 视频替代 `Flash`，包括 YouTube、Vimeo、TED、《*纽约时报*》和《*时代*杂志》，这些内容都可以在你的 iPhone 上播放。


    解决此限制的一种方法：App Store 上的一些替代浏览器（例如 `Skyfire`）会在其自有服务器上渲染 `Flash` 视频，并将 HTML5 视频发送到
    iPhone。


    #### 需要网络连接


    你的 iPhone 需要处于有效的互联网连接状态（Wi-Fi 或 3G）才能浏览网页（详见第 4 章：“连接到网络”）。


    #### 启动网页浏览器


    你应该在你的`主屏幕`上找到 `Safari`（网页浏览器）应用。通常，`Safari`图标位于底部 Dock 栏中。


    ![images](img/U1602.jpg)


    轻触 `Safari` 图标，你将进入浏览器的`首页`。这很可能是 Apple 的 iPhone 页面。


    只需将 iPhone 侧转，即可在更宽的横屏模式下看到同一个页面。当你找到喜欢的网站时，可以设置书签以便轻松跳转到这些网站。我们将在本章后面介绍如何操作。


    ![images](img/U1603.jpg)


    #### Safari 网页浏览器屏幕布局


    观察你的屏幕，注意地址栏位于屏幕左上方。此栏显示当前网页地址。


    如果你正在查看包含合适文本内容的网页，你会注意到地址栏中会出现“阅读器”按钮。轻触`阅读器`，即可以一种易于阅读的格式查看网页内容。更多相关信息，请参见本章的“Safari
    阅读器”部分。


    `搜索`窗口位于地址栏的右侧。默认设置为 Google 搜索，但如果你愿意，可以将其更改为其他搜索引擎。


    屏幕底部有五个图标：返回、前进、操作、书签和页面视图。


    ![images](img/U1604.jpg)


    #### 输入网址


    你想学习的首要操作是如何访问你最喜欢的网页。就像在电脑上一样，你需要在浏览器中输入网址（URL）。按照以下步骤在 `Safari` 中输入网址：


    1.  首先，轻点浏览器顶部的`地址`栏。你会看到键盘出现，并且`地址`栏的窗口会展开。

    2.  如果窗口中已有地址并且你想删除它，请按地址栏右侧的 ![images](img/U1605.jpg)。

    3.  开始输入你的网址（你不需要输入“`www.`”）。

    4.  开始输入时，你可能会看到`地址`栏下方出现建议；只需轻触任一建议即可前往该页面。这些建议非常完整，因为它们来自你的浏览历史记录、书签、网址（URL）和网页标题。

    5.  记住页面底部的 `.com` 键。如果你长按它，会看到 `.edu`、`.org` 和其他常见的域名后缀。

    6.  输入完毕后，轻点`前往`键即可访问该页面。


    **提示：** 不要输入“`www.`”，因为这不是必需的。记得使用底部的`冒号`、`斜杠`、`下划线`、`点`和 `.com` 键以节省时间。


    **提示：** 长按 `.com` 键可查看所有选项：`.org`、`.edu`、`.net`、`.de` 等。


    #### 在已打开的网页中向前或向后移动


    既然你已经知道如何输入网址，你可能会跳转到不同的网站。屏幕底部的`前进`和`后退`箭头 ![images](img/U1606.jpg) 让你可以非常轻松地向前或向后浏览最近访问过的页面。如果`后退`箭头是灰色的，本章“使用打开页面按钮”部分可以帮助你找出原因。


    假设你正在查看《*纽约时报*》网站上的新闻，然后你跳转到 ESPN 查看体育比分。要返回《*纽约时报*》的页面，只需轻触`后退`箭头。要再次返回 ESPN
    网站，轻触`前进`箭头。

    '
- fmt: "# Using the Open Pages Button\n\nSometimes, when you click a link, the web\
    \ page you were viewing moves to the background and a new window pops up with\
    \ new content (e.g., another web page or a video). You will see the page you were\
    \ on move to the background and a new page being opened. In such cases, the `Back`\
    \ arrow in the new browser window will not work.\n\nInstead, you have to tap the\
    \ `Open Pages` icon ![images](images/U1607.jpg) in the lower-right corner to see\
    \ a list of open web pages, and then tap the one you want. In the example shown\
    \ here, we touched a link that opened a new browser window. The only way to get\
    \ back to the old one was to tap the `Open Pages` icon and select the desired\
    \ page.\n\n![images](images/U1608.jpg)\n\n# Zooming In and Out in Web Pages\n\n\
    Zooming in and out of web pages is very easy on the iPhone. There are two primary\
    \ ways of zooming—double-tapping and pinching.\n\n## Double-tapping\n\nIf you\
    \ tap twice on a column in a web page, the page will zoom in on that particular\
    \ column. This lets you home in on exactly the right place on the web page, which\
    \ is very helpful for pages that aren't formatted for a mobile screen.\n\nTo zoom\
    \ out, just double-tap once more (you can see how this looks in the \"Quick Start\
    \ Guide\" at the beginning of this book).\n\n## Pinching\n\nThis technique lets\
    \ you zoom in on a particular section of a page. It takes a little bit of practice,\
    \ but it will soon become second nature. Check out the \"Quick Start Guide\" to\
    \ see how this looks.\n\nPlace your thumb and forefinger close together at the\
    \ section of the web page you wish to zoom in on. Slowly pinch out, separating\
    \ your fingers. You will see the web page zoom in. It takes a couple of seconds\
    \ for the web page to focus, but it will zoom in and be very clear in a short\
    \ while.\n\nTo zoom out to where you were before, just start with your fingers\
    \ apart and move them slowly together; the page will zoom out to its original\
    \ size.\n\n# Activating Links from Web Pages\n\nWhen you're surfing the Web, often\
    \ you'll come across a link that will take you to another web site. Because `Safari`\
    \ is a full-function browser, you simply touch the link to jump to a new page.\n\
    \n# Working with Safari Bookmarks\n\nAs soon as you start browsing a bit on your\
    \ iPhone, you will want to quickly access your favorite web sites. One good way\
    \ to do this is to add bookmarks for one-tap access to web sites.\n\n**TIP:**\
    \ You can sync your bookmarks from your computer's web browser (`Safari` or `Internet\
    \ Explorer` only) using iCloud over the air or the `iTunes` app on your computer.\
    \ Check out [Chapter 3](#Chapter03.html#ch3): \"Sync with iCloud, iTunes and More\"\
    \ for more details.\n\n## Adding a New Bookmark\n\nAdding new bookmarks on your\
    \ iPhone takes just a few taps:\n\n1.  To add a new bookmark for the web page\
    \ you are currently viewing, tap the `Action` button ![images](images/U1609.jpg)\
    \ at the bottom of the screen.\n2.  Choose `Add Bookmark`.\n\n    ![images](images/U1610.jpg)\n\
    \n3.  We recommend that you edit the bookmark name to something short and recognizable.\n\
    4.  Tap `Bookmarks` if you want to change the folder where your bookmark is stored.\n\
    5.  When you're finished, tap the `Save` button.\n\n    ![images](images/U1611.jpg)\n\
    \n## Using Bookmarks and History\n\nOnce you have set a few bookmarks, it is easy\
    \ to view and work with them. In the same area, you can also see and use your\
    \ web browsing history. A very useful tool on your iPhone is the ability to browse\
    \ the web from your `History`, just as you would on a computer. Follow these steps\
    \ to do so:\n\n1.  Tap the `Bookmarks` icon ![images](images/U1612.jpg) at the\
    \ bottom of the page.\n2.  Swipe up or down to view all your bookmarks.\n3.  Tap\
    \ any bookmark to jump to that web page.\n\n    ![images](images/U1613.jpg)\n\n\
    4.  Tap the `History` folder to view your recent history of visited web pages.\n\
    5.  Notice that, at the bottom of the list, you see additional folders for `Earlier\
    \ Today` and previous days.\n6.  Tap any history item to go to that web page.\n\
    \n**TIP:** To clear your history, tap the `Clear` button in the lower-left corner.\
    \ You can also clear your history, cookies, and cache in the `Settings` app. Tap\
    \ `Settings`; tap `Safari`; scroll to the bottom; and then tap `Clear History`,\
    \ `Clear Cookies`, or `Clear Cache`.\n\n![images](images/U1614.jpg)\n\n## Managing\
    \ Your Bookmarks\n\nIt is very easy to accumulate quite a collection of bookmarks\
    \ because setting them up is so easy. However, you may find you no longer need\
    \ a particular bookmark, or you may want to organize them by adding new folders.\n\
    \nIf you have organized your `Phone Favorites` list, you already know how to organize\
    \ your bookmarks; you use the same steps.\n\nAs with other lists on your iPhone,\
    \ you can reorder your `Bookmarks` list and remove entries. Follow these steps\
    \ to do so:\n\n1.  View your `Bookmarks` list as you did previously.\n2.  Tap\
    \ the `Edit` button in the lower-left corner.\n3.  To reorder the entries, touch\
    \ and drag the right edge with the three gray bars up or down the list. In this\
    \ case, we are dragging the bookmark to the `iPad Made Simple` book page on Amazon.com\
    \ up to the top.\n4.  To create a new folder for bookmarks, tap the `New Folder`\
    \ button in the lower-right corner.\n5.  To delete a bookmark, tap the red `Circle`\
    \ icon to the left of the entry to make it turn vertical.\n6.  Tap the `Delete`\
    \ button.\n7.  When you are finished reordering and deleting entries, tap the\
    \ `Done` button in the upper-left corner.\n8.  To edit a bookmark name, folder,\
    \ or web address, tap the bookmark name itself.\n\n    ![images](images/U1615.jpg)\n\
    \n9.  Now you can make any adjustments to the name, web address, or folder.\n\
    10.  To change the folder where the bookmark is stored, tap the button below the\
    \ web address. In this image, it says `Bookmarks`; but on your iPhone, it may\
    \ be different. This bookmark points to the `iPad Made Simple` page on Amazon.com.\n\
    11.  Tap `Done` when you're finished.\n\n    ![images](images/U1616.jpg)\n\n#\
    \ Reading List\n\n`Reading List` is a special type of bookmark that lets you quickly\
    \ save a web article, so you can read it later at your leisure. The `Reading List`\
    \ feature can sync via iCloud, so it's a great way to quickly mark articles on\
    \ `Safari` on your home or work Mac or Windows PC to read on your iPhone or iPad\
    \ while traveling. You can also use this feature to save a bookmark on your iPhone\
    \ to read more comfortably when you get back to your iPad or PC.\n\nFollow these\
    \ steps to use the `Reading List` feature:\n\n1.  Go to the article you want to\
    \ save in `Safari`.\n2.  Tap the `Action` button ![images](images/U1617.jpg) at\
    \ the bottom middle of the page.\n3.  Tap `Add to Reading List`.\n\nFollow these\
    \ steps to view a `Reading List` article later:\n\n![images](images/U1618.jpg)\n\
    \n1.  Tap the `Bookmark` button ![images](images/U1619.jpg) at the bottom right\
    \ of the page.\n2.  Tap the `Glasses` icon for the `Reading List` option. (If\
    \ you don't see the `Glasses` icon, you might be inside a `Bookmarks` folder.\
    \ Just tap the `Arrow` icon at the top left to back out of the folder or folders\
    \ you're in until the `Arrow` disappears, and you can see the `Glasses` icon.)\n\
    \n![images](images/U1620.jpg)\n\n1.  To see everything in your `Reading List`,\
    \ tap the `All` tab at the top left. To see only the articles you haven't read\
    \ yet, tap the `Unread` tab at the top right.\n2.  Tap the article you want to\
    \ read.\n\n![images](images/U1621.jpg)\n\nFinally, follow these steps to delete\
    \ an article from `Reading List`:\n\n1.  Swipe from left to right across the article\
    \ you'd like to remove from `Reading List`.\n2.  Tap the red `Delete` button.\n\
    \n    ![images](images/U1622.jpg)"
