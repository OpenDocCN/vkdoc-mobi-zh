  trans: "\n# 使用书签\n\n`Maps`中的书签功能与`Safari`中的书签类似。书签只是为你访问或标记过且希望日后记住的地点创建一个记录。查看书签总是比重新执行一次搜索要方便得多。\n\
    \n## 添加新书签\n\n将某个位置添加为书签是简化再次查找该地点的绝佳方法：\n\n1.  在地图上标记一个位置，如图 21-4 所示。\n2.  点击地址旁边的蓝色`信息`图标。\n\
    3.  点击`添加到书签`。\n\n   ![images](img/2104.jpg)\n\n   **图 21-4.** *添加书签*\n\n4.  编辑书签名称，使其简短且易于识别——在此例中，我们将地址编辑为简单的`格洛丽亚的店铺`。\n\
    5.  完成后，只需点击右上角的`存储`即可。\n\n**提示**：你可以像在`通讯录`中搜索姓名一样搜索书签名称。\n\n## 访问和编辑书签\n\n要查看你的书签，请按以下步骤操作：\n\
    \n1.  点击顶部行中`搜索`窗口旁边的`书签`图标。\n2.  点击任意书签即可立即跳转至该位置。\n3.  点击书签顶部的`编辑`按钮来编辑或删除你的书签。\n\
    \    -   要重新排列书签，请触摸并拖动每个书签的右边缘向上或向下移动。\n    -   要编辑书签的名称，请点击它并重新输入名称。编辑完名称后，点击左上角的`书签`按钮返回书签列表。\n\
    \    -   要删除书签，请在书签上向左或向右滑动，然后点击`删除`按钮。\n4.  编辑完书签后，点击`完成`按钮。\n\n![images](img/U2107.jpg)\n\
    \n## 将已标记位置添加到通讯录\n\n将你标记过的位置添加到通讯录列表非常简单：\n\n1.  标记一个地址。\n2.  点击`箭头`/`信息`图标。\n\
    3.  点击`添加到通讯录`。 ![images](img/U2108.jpg)\n4.  点击`创建新联系人`或`添加到现有联系人`。\n5.  如果你选择`添加到现有联系人`，则可以滚动或搜索你的联系人并选择一个姓名。该地址将自动添加到该联系人中。\n\
    \n## 搜索附近商家\n\n按照以下步骤搜索你当前位置附近的商家：\n\n![images](img/U2109.jpg)\n\n1.  在地图上标记一个位置，或使用蓝点表示你的当前位置。\n\
    2.  点击`搜索`窗口。假设你想搜索最近的披萨店，于是输入“披萨”。这将会在地图上标记出所有当地的披萨店。\n3.  请注意，每个标记的位置左侧可能有一个`街景`图标，右侧有一个`信息`图标。\n\
    4.  你可以双击放大，或双指捏合或张开屏幕来缩小或放大。\n5.  与任何已标记的位置一样，点击蓝色的`信息`图标会显示所有详细信息，包括披萨店的电话号码、地址和网站，如图\
    \ 21-5 所示。\n6.  如果你需要前往该餐厅的路线，只需点击`路线到这里`，系统会立即计算出一条路线。\n\n![images](img/2105.jpg)\n\
    \n**图 21-5.** *使用信息屏幕对已标记位置进行更多操作。*\n\n**注**：如果你点击`主页`链接，将会退出`地图`应用，并启动`Safari`。完成后，你需要重新启动`地图`应用。\n\
    \n## 放大和缩小\n\n你可以像往常一样通过双击和双指捏合来进行放大和缩小。要使用双击放大，只需像在网页或图片上那样双击屏幕即可。\n\n## 放置图钉\n\
    \n假设你正在查看地图，发现了一些你想将其设为书签或目的地的东西。\n\n在此示例中，我们正在放大并查看大波士顿地区。我们偶然发现了芬威公园，并决定将它添加到书签中会是个好主意，于是我们在其上放置了一个图钉。按照以下步骤在地图上放置图钉：\n\
    \n1.  标记一个位置，或将地图移动到你想要放置图钉的位置。\n2.  点击地图的右下角。\n\n   ![images](img/U2110.jpg)\n\
    \n   ![images](img/U2111.jpg)\n\n3.  点击`放置图钉`。\n4.  现在，通过触摸并按住图钉，在地图上拖动它。在我们的示例中，我们将其直接移动到了芬威公园上。\n\
    \n   ![images](img/U2112.jpg)\n\n5.  要移除已放置的图钉或执行其他操作，请点击图钉上方弹出窗口旁边的蓝色`箭头`图标![images](img/U2113.jpg)。如果弹出窗口消失了，请点击图钉使其重新出现。\n\
    \n   ![images](img/U2114.jpg)\n\n6.  在`信息`屏幕中，你可以获取`路线`、`移除图钉`、`添加到通讯录`、`共享位置`或`添加到书签`。\n\
    \n**提示**：**查找地图上任意位置的街道地址**\n\n当你放置图钉时，谷歌地图会显示实际的街道地址。如果你通过查看`卫星`或`混合`视图找到了某个位置，但需要获取实际的街道地址，这项功能会非常方便。\n\
    \n放置图钉也是追踪你停车位置的好方法，尤其是在不熟悉的地方，这特别有用。\n\n## 使用街景\n\n谷歌街景（参见图 21-6）是 iPhone 上`地图`应用一个非常有趣的功能。谷歌一直在致力于拍摄美国及其他地区几乎每个地址的照片。这些图片随后被输入其数据库，当你想要查看目的地或航点的图片时，显示的就是这些内容。\n\
    \n**注**：谷歌街景目前仅适用于少数国家：北美大部分地区、西欧、澳大利亚以及现在的南非。\n\n如果某个位置有街景可用，你会在地图上该地址或书签的左侧看到一个橙色的`人物`图标。\n\
    \n![images](img/U2115.jpg)\n\n在这个例子中，我们想要查看位于科德角的加里的妻子格洛丽亚的店铺的街景：\n\n1.  要标记地址，我们点击了通讯录列表中格洛丽亚姓名下的公司地址。我们也可以通过将地址输入`搜索`窗口、搜索某种类型的商家或在`通讯录`应用中点击该地址来标记它。\n\
    2.  `街景`图标显示在格洛丽亚名字的左侧。\n3.  我们点击该图标，立即切换到该地址的街景视图。非常酷的是，我们可以通过向左、向右、甚至向上或向下滑动来\
    \ 360 度旋转浏览屏幕，查看我们目的地旁边和街对面的地方。\n4.  要返回地图，我们只需点击屏幕右下角。\n\n![images](img/2106.jpg)\n\
    \n**图 21-6.** *使用谷歌街景*\n\n## 获取路线\n\n`地图`应用最有用的功能之一就是你可以轻松找到前往或离开任何地点的路线。假设我们想获取从当前位置（格洛丽亚的店铺）到波士顿芬威公园的路线。\n\
    \n### 先点击当前位置按钮\n\n要查找前往或离开你当前所在位置的路线，你无需浪费时间输入当前地址——iPhone 会默认你想从当前位置开始规划路线，除非你另行指定。你可能需要点击`位置`按钮几次，直到屏幕上出现蓝点。\n\
    \n现在你可以执行以下任一操作：\n\n-   点击底部的`路线`按钮。\n-   像我们之前做的那样，点击蓝色的`箭头`，然后选择`从这里出发的路线`（参见图\
    \ 21-7）。\n\n![images](img/2107.jpg)\n\n**图 21-7.** *选择`从这里出发的路线`，然后选择`书签`*\n"
- fmt: "# Choosing Start or End Location\n\nFollow these steps to select a Start or\
    \ End location and then choose a suggested route:\n\n1.  Touch the blue `Arrow`\
    \ icon above the pin.\n2.  Tap `Directions From Here`.\n3.  Tap the `Bookmarks`\
    \ button\n4.  Tap `Bookmarks`, `Recents`, or `Contacts` to find your destination.\
    \ In this case, we tapped `Bookmarks` and then `Fenway Park`.\n\n    ![images](images/U2116.jpg)\n\
    \n    **NOTE**: As soon as you touch the `Directions From Here` button, your recent\
    \ searches will be automatically displayed (see [Figure 21–5](#Chapter21.html#fig_21_5)).\
    \ You can also touch the `Destination` box and type in a destination.\n    ![images](images/U2117.jpg)\n\
    \n5.  After you select your destination, the routing screen takes you to an overview\
    \ screen. In our case, we see the routing screen to get from Apple's 1 Infinite\
    \ Loop headquarters to the Palo Alto Apple Store.\n6.  A green pushpin is dropped\
    \ at the start location, and a red one is dropped at the end location—Fenway Park,\
    \ in our example.\n7.  A bright blue line will connect the two pins, showing you\
    \ the route. If there is more than one route, others will be indicated in light\
    \ blue.\n8.  Tap a gray route to select it. Once it's selected, it will turn bright\
    \ blue, and any other routes will fade to light blue.\n\n![images](images/U2118.jpg)\n\
    \n# Looking at the Route\n\nBefore you start the trip, you will see a `Start`\
    \ button in the upper-right corner of the screen. Tap the `Start` button, and\
    \ the routing directions begin. The `Start` button changes to `Arrow` buttons\
    \ that allow you to move between the steps in the trip.\n\n![images](images/U2119.jpg)\n\
    \n![images](images/U2120.jpg)\n\nAs [Figure 21–8](#Chapter21.html#fig_21_8) shows,\
    \ you can look at the route either as a path on the map or as a list.\n\n![images](images/2108.jpg)\n\
    \n**Figure 21–8.** *Two ways of viewing directions*\n\nYou can move the screen\
    \ with your finger to look at the route, or just touch the `Arrow` buttons ![images](images/U2121.jpg)\
    \ at the bottom to show the route in step-by-step snapshots.\n\nYou can also tap\
    \ the `Page Curl` button on the bottom-right, then the `List` ![images](images/U2122.jpg)\
    \ button, which will show detailed step-by-step directions.\n\n# Switching Between\
    \ Routes\n\nAs noted in Steps 6 and 7 of the preceding example, if more than one\
    \ route is available, the `Maps` app will mark its best recommendation with a\
    \ bright blue line and flag it as `Route 1`. If other routes are also available,\
    \ Maps will mark them with a light blue line. Tapping a gray line will turn it\
    \ bright blue and flag it with its corresponding number—`Route 2`, for example.\n\
    \nIf you know from recent experience that construction or something else is making\
    \ Route 1 less than desirable, or you need to stop somewhere on the way that's\
    \ off the recommended Route 1, then switching to a different route is a great\
    \ option.\n\n![images](images/U2123.jpg)\n\n# Switching Between Driving, Transit,\
    \ and Walking Directions\n\nBefore you start your directions, you can choose whether\
    \ you are driving, using public transportation, or walking by tapping the icons\
    \ on the left side of the blue bar at the top of the directions screen, as shown\
    \ in [Figure 21–9](#Chapter21.html#fig_21_9).\n\n![images](images/2109.jpg)\n\n\
    **Figure 21–9.** *Choosing your mode of transportation*\n\n# Reversing the Route\n\
    \nTo reverse the route, touch the `Reverse` ![images](images/U2124.jpg) button,\
    \ which is at the top, between the `Start` and `End` fields. This can be useful\
    \ if you're not great about reversing directions on your own or if your route\
    \ uses lots of one-way streets.\n\n## Maps Options\n\n![images](images/U2125.jpg)\n\
    \nCurrently, the only setting that affects your `Maps` app is Location Services,\
    \ which is critical for determining your current location. Follow these steps\
    \ to adjust the settings for the `Maps` app:\n\n![images](images/U2126.jpg)\n\n\
    1.  Touch the `Settings` icon.\n2.  Tap the `General` tab\n3.  Now find the `Location\
    \ Services` switch about halfway down. Move this switch to the `ON` position,\
    \ so that `Maps` can approximate your location.\n\n**NOTE:** Keeping the `Location\
    \ Services` switch `ON` will reduce battery life by a small amount. If you never\
    \ use `Maps` or care about your location, then set it to `OFF` to save your battery\
    \ life.\n\n## Using the Digital Compass\n\nThe iPhone has a very cool Digital\
    \ Compass feature built in. This can be helpful when you need to literally get\
    \ your bearings and figure out which way is north.\n\n### Calibrating and Using\
    \ the Digital Compass\n\nBefore you can use the Digital Compass, you need to calibrate\
    \ it. You should only need to calibrate the compass the first time you use it.\
    \ Follow these steps to do so:\n\n1.  Start `Maps` as you normally would.\n2.\
    \  Tap the current location button twice—it changes from ![images](images/U2127.jpg)\
    \ to ![images](images/U2128.jpg).\n3.  You'll see a `Digital Compass` icon appear\
    \ on the screen, as shown in [Figure 21–10](#Chapter21.html#fig_21_10).\n4.  The\
    \ first time you use the Digital Compass feature, the `Calibration` symbol appears\
    \ on the screen.![images](images/U2129.jpg)\n5.  Move your iPhone in a figure-eight\
    \ pattern, as shown on the screen.\n\n    **NOTE**: The iPhone may ask you to\
    \ move away from any source of interference while you go through the calibration\
    \ process.\n\n6.  Hold your iPhone level to the ground. If you calibrated it successfully,\
    \ the compass will rotate and point north.\n\n![images](images/2110.jpg)\n\n**Figure\
    \ 21–10.** *Using the Digital Compass feature*\n\n# Chapter 22\n\n## iTunes on\
    \ Your Device\n\nIn this chapter, you will learn how to locate, buy, and download\
    \ media using the `iTunes` app right on your iPhone. With `iTunes`, you will be\
    \ able to download music, movies, TV shows, podcasts, and audiobooks. You will\
    \ also learn about free educational content from leading universities from the\
    \ `iTunes U` section on iTunes, as well as how to redeem iTunes gift cards.\n\n\
    Some of us still remember going to the record store when that new single or album\
    \ came out. It was an exciting feeling to look at all the music we wanted, browsing\
    \ first through all the vinyl albums, then tapes, and, finally, CDs.\n\nThose\
    \ days are long gone with the iPhone. Music, movies, TV shows, and more are available\
    \ right from the iPhone itself.\n\niTunes is a music, video, TV, podcast, and\
    \ more store. Virtually every type of media you can consume on your iPhone is\
    \ available for purchase or rent (and often for free) right from the iTunes store.\n\
    \n### Getting Started with iTunes\n\nEarlier in this book, we showed you how to\
    \ get your music from iTunes on your computer into your iPhone (see [Chapter 3](#Chapter03.html#ch3):\
    \ \"Sync With iCloud, iTunes, and More\"). One of the great things about iTunes\
    \ is that the store makes it very easy to buy or obtain music, videos, podcasts,\
    \ and audiobooks, and then use them within minutes right on your iPhone.\n\nThe\
    \ iPhone allows you to access the iTunes site (the mobile version) right on your\
    \ device. After you purchase or request free items, they will be downloaded to\
    \ your `Music` or `Videos` app on the iPhone. If you have iCloud and have turned\
    \ on automatic downloads, any music you buy will automatically be downloaded to\
    \ your other iOS devices and iTunes on your PC. Movies will transfer the next\
    \ time you sync with your desktop iTunes library.\n\n#### A Network Connection\
    \ Is Required\n\nYou do need an active Internet connection (either Wi-Fi or 3G/cellular)\
    \ in order to access the iTunes store. Check out [Chapter 4](#Chapter04.html#ch4):\
    \ \"Network Connectivity\" to learn more about this."
