- fmt: "# Finding a Picture to Download\n\nThe iPhone makes it easy to copy and save\
    \ images from web sites. This can be handy when you are looking for a new image\
    \ to use as wallpaper on your iPhone.\n\nFirst, tap the `Safari` web browser icon\
    \ and type a search for iPhone wallpaper to locate a few sites that might have\
    \ some interesting possibilities. (See [Chapter 16](#Chapter16.html#ch16): “Safari\
    \ Web Browser” for help with this topic.)\n\n![images](images/U2040.jpg)\n\nOnce\
    \ you find a picture you want to download and save, tap and hold it to bring up\
    \ a new menu of options that includes `Save Image` (among others), as shown in\
    \ [Figure 21–5](#Chapter21.html#fig_21_5). Choose this option to save the picture\
    \ in your `Saved Photos` album.\n\n![images](images/2005.jpg)\n\n**Figure 20–5.**\
    \ *Saving an image from a web site*\n\nNow touch your `Photo` icon and you should\
    \ see the picture in the `Camera Roll` album.\n\n![images](images/U2041.jpg)\n\
    \n# Chapter 21\n\n# Maps\n\nMapping on your iPhone is very convenient and pretty\
    \ amazing. As we explore the power of the `Maps` app in this chapter, you'll see\
    \ how to find your location on a map and get directions to just about anywhere.\
    \ You'll also learn how to switch between the `Standard`, `Satellite`, and `Hybrid`\
    \ views. You'll also see how, if you need to find the best route to somewhere,\
    \ you can check out the traffic using the `Show Traffic` button in `Maps` options.\
    \ If you want to find the closest pizza restaurant, golf course, or hotel to your\
    \ destination, that's easy, too. And you can use Google's Street View right from\
    \ your iPhone to help you get to your destination. It is easy to add an address\
    \ you have mapped to your contacts. There's also a Digital Compass feature that\
    \ is fun to play with.\n\n## Getting Started with Maps\n\nThe beauty of the iPhone\
    \ is that its apps are designed to work with one another. You've already seen\
    \ how your contacts are linked to the `Maps` app; just look back at [Chapter 18](#Chapter18.html#ch18):\
    \ “Contacts and Notes.”\n\n![images](images/U2101.jpg)\n\nThe `Maps` app is powered\
    \ by Google Maps, the leader in mobile mapping technology. `Maps` lets you locate\
    \ your position, get directions, search for things nearby, see traffic, and much\
    \ more.\n\nSimply touch the `Maps` icon to get started.\n\n### Determining Your\
    \ Location (the Blue Dot)\n\nWhen you start the `Maps` app, you can have it begin\
    \ at your current location. Follow these steps to use your current location as\
    \ the default starting location:\n\n1.  Tap the small blue `Arrow` icon at the\
    \ lower-left corner.\n\n    ![images](images/U2102.jpg)\n\n    ![images](images/U2103.jpg)\n\
    \n2.  `Maps` will ask to use your current location—touch `OK` or `Don't Allow`.\n\
    \n    We suggest choosing `OK`, which makes it much easier to find directions\
    \ from or to your current location.\n\n## Changing Your Map Views\n\nThe default\
    \ view for `Maps` is the `Standard` view, a basic map that shows a generic background\
    \ overlaid with street names. Maps can also show you a `Satellite` view or a combination\
    \ of the `Satellite` and `Standard` views called `Hybrid`. Finally, the `List`\
    \ view is handy if you've searched for something that provided multiple results,\
    \ like local coffee shops. It is also handy if you've asked for directions to\
    \ a location. You can switch among all the views by following these steps:\n\n\
    1.  Tap the turned-up edge of the map in the lower-right corner.\n2.  The corner\
    \ of the map turns up to reveal buttons for views, traffic, pins, and more.\n\
    3.  Tap the view you'd like to switch to (see [Figure 21–1](#Chapter21.html#fig_21_1)):\n\
    \n    *   `Standard` is a regular map with street names.\n    *   `Satellite`\
    \ is a satellite picture with no street names.\n    *   `Hybrid` is a combination\
    \ of the `Satellite` and `Standard` views; that is, a `Satellite` view with street\
    \ names.\n    *   `List` is available only when your search produces multiple\
    \ results (like “starbucks”) or you've asked for directions.\n\n![images](images/2101.jpg)\n\
    \n**Figure 21–1.** *Various views available in the `Maps` app: From upper left:\
    \ Standard, Satellite, Hybrid and List.*\n\n### Checking Traffic\n\nNot only does\
    \ your `Maps` app tell you how to get somewhere, but it can also check traffic\
    \ along the way. This feature is supported only in the United States for now.\
    \ Follow these steps to check the traffic for a given route:\n\n1.  Tap the lower-right\
    \ corner of the map to see the options.\n2.  Tap `Show Traffic`.\n\n![images](images/U2104.jpg)\n\
    \nOn a highway, if there is a traffic situation, you usually see yellow lights\
    \ instead of green ones. Sometimes, the yellow lights might be flashing to alert\
    \ you to traffic delays.\n\nYou may even see `Construction Worker` icons to indicate\
    \ construction zones.\n\n`Maps` uses color on major streets and highways to indicate\
    \ the speed that traffic is moving at:\n\n*   Green = 50 MPH or more\n*   Yellow\
    \ = 25–50 MPH\n*   Red = Less than 25 MPH\n*   Gray (or no color) = No traffic\
    \ data currently available\n\n## Searching for Anything\n\nBecause `Maps` is tied\
    \ to Google Maps, you can search for and find just about anything: a specific\
    \ address, type of business, city, or other point of interest, as shown in [Figure\
    \ 21–2](#Chapter21.html#fig_21_2). Follow these steps to search for a specific\
    \ location:\n\n1.  Touch the `Search` bar in the top-right corner of the screen.\n\
    2.  Type in the address, point of interest, or town and state you would like to\
    \ map on your iPhone.\n\n![images](images/U2105.jpg)\n\n### Google Maps Search\
    \ Tips\n\nYou can enter just about anything in the `Search` bar, including the\
    \ following:\n\n*   First name, last name, or company name (to match your Contacts\
    \ list)\n*   123 Main Street, City (some or all of a street address)\n*   Orlando\
    \ Airport (to find an airport)\n*   Plumber, painter, or roofer (any part of a\
    \ business name or trade)\n*   Golf courses + city (to find local golf courses)\n\
    *   Movies + city or ZIP/postal code (to find local movie theaters)\n*   Pizza\
    \ 32174 (to search for local pizza restaurants in ZIP code 32174)\n*   95014 (the\
    \ ZIP code for Apple Computer's headquarters in California, United States)\n*\
    \   Apress\n\n![images](images/2102.jpg)\n\n**Figure 21–2.** *Searching in the\
    \ `Maps` app*\n\nTo use numbers, tap the `123` key on the keyboard. For letters,\
    \ tap the `ABC` key to switch back to a letter keyboard.\n\n## Mapping Options\n\
    \nNow that your address is on the `Maps` screen, follow these steps to access\
    \ the available options:\n\n1.  Touch the blue `Arrow` icon ![images](images/U2106.jpg)\
    \ next to the address to see some of these options.\n2.  If you have mapped one\
    \ of your contacts, you'll see the contact details, as shown in [Figure 21–3](#Chapter21.html#fig_21_3).\
    \ `Maps` will also pull up contact information for specific searches. You can\
    \ also get directions, share a location, or add a location as a bookmark.\n\n\
    **NOTE:** You can also tap and hold the address to bring up the `Copy` pop-up\
    \ menu.\n\n![images](images/2103.jpg)\n\n**Figure 21–3.** *Touching the `Information`\
    \ button to see the mapped contact details*"
