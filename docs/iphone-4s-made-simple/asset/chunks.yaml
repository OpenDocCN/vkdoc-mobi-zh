  trans: "\n### 删除图标\n\n请注意——删除图标和移动图标一样简单。当你删除 iPhone 上的图标时，实际上是在删除它所代表的程序。这意味着除非重新安装或重新下载，否则你将无法再次使用该程序。\n\
    \n根据你在`iTunes`应用中的“应用同步”设置，该程序可能仍会保留在 iTunes 的“应用”文件夹中。在这种情况下，你只需在 iTunes 的同步应用列表中勾选该应用，即可重新安装被删除的应用。\n\
    \n如图 6-3 所示，删除图标的过程与移动图标类似。长按任意图标即可启动删除流程。和之前一样，长按会使图标抖动，并允许你移动或删除它们。\n\n**注意**：你只能删除已下载到\
    \ iPhone 上的程序；预装的图标及其关联程序无法删除。你可以通过查看图标左上角是否有黑色小`x`来判断哪些程序可以删除。\n\n只需点击你想要删除的图标上的`x`。系统会提示你选择`删除`图标或`取消`删除请求。如果你点击`删除`，该图标及其关联应用将从\
    \ iPhone 上移除。\n\n**注意**：如果你删除一个游戏等记录了进度的图标，删除该游戏时你的进度也会被清除。\n\n![images](img/0603.jpg)\n\
    \n**图 6-3.** *删除图标及其关联程序*\n\n### 重置所有图标位置（恢复出厂默认设置）\n\n有时，你可能会想恢复到原始的出厂默认图标设置。比如当你将太多新图标移到第一页，又想重新看到所有基础图标时。\n\
    \n操作方法是：点击`设置`图标。接着点击`通用`，最后滚动到底部点击`还原`。\n\n![images](img/U0602.jpg)\n\n**注意**：内置应用将恢复到苹果出厂时\
    \ iPhone 上的排列顺序。\n\n在`还原`界面中，点击靠近底部的`还原主屏幕布局`。现在所有图标将恢复到原始设置。\n\n**警告**：请注意不要误触其他`还原`选项，因为按错按钮可能会意外擦除整个\
    \ iPhone。如果发生这种情况，你将需要从 iTunes 备份中恢复数据。\n\n![images](img/U0603.jpg)\n\n### 使用文件夹\n\
    \n你的 iPhone 允许你将应用整理到文件夹中。当你下载新应用时，它们会占据`主屏幕`上的一个位置。一旦下载了大量应用，查找应用和保持其有序就会变得困难。\n\
    \n使用文件夹可以将你的游戏、办公应用以及其他功能相似的应用归类存放。每个文件夹最多可容纳 12 个应用——这能极大地帮助你整理 iPhone！\n\n![images](img/U0604.jpg)\n\
    \n#### 创建文件夹\n\n创建文件夹直观又有趣：\n\n1.  按住某个应用，直到所有应用开始抖动（与之前在“移动图标”部分中的操作相同）。\n2.\
    \  将一个应用拖拽到另一个功能相似的应用上。例如，将一个办公应用拖到另一个类似的应用上。iPhone 会先为文件夹创建一个名称。\n3.  在本例中，我们将三个苹果办公应用（`Numbers`、`Keynote`和`Pages`）互相拖拽叠加，iPhone\
    \ 创建了一个名为“Productivity”的文件夹。\n4.  你可以通过点击`名称`字段并输入新名称来编辑文件夹名称（参见图 6-4）。\n5.  按下`主屏幕`按钮以设置新的文件夹名称。\n\
    6.  再次按下`主屏幕`按钮返回`主屏幕`界面。此时，你将看到带有新名称的新文件夹。\n\n**注意**：每个文件夹最多可放置 12 个应用图标。如果你尝试放入更多图标，会看到新图标不断被“挤出”文件夹。这种动画效果表示文件夹已满。\n\
    \n![images](img/0604.jpg)\n\n**图 6-4.** *移动图标以创建文件夹并重命名*\n\n#### 移动文件夹\n\n与应用一样，文件夹也可以从一个`主屏幕`页面移动到另一个页面：\n\
    \n1.  长按一个文件夹，直到`主屏幕`上的文件夹和图标开始抖动。\n2.  按住文件夹并将其拖拽到你想要的位置（或另一个`主屏幕`页面），然后松开手指。\n\
    3.  当文件夹位于所需位置后，只需按下`主屏幕`按钮即可完成移动。\n\n**提示**：如果你愿意，甚至可以将文件夹移动到底部程序坞。这是一种非常方便的方式，可以让你轻松访问大量应用（参见图\
    \ 6-5）。\n\n![images](img/0605.jpg)\n\n**图 6-5.** *将文件夹移动到底部程序坞*\n\n## 第 7 章\n\n\
    ## 多任务处理与 Siri\n\n在本章中，我们将介绍如何在 iPhone 上进行多任务处理以及在应用间快速切换。多任务处理意味着你可以在做其他事情的同时，让某个应用在后台运行，例如播放网络广播、收听逐向导航，或接听\
    \ Skype 电话。\n\n我们还将向你介绍苹果革命性的 Siri 服务，这是一个人工智能“助手”，它可以听取你的语音指令，发送信息、预约日程，并在你需要时搜索相关信息。\n\
    \n### 快速应用切换\n\n*快速应用切换器*允许你让多个应用在后台运行。它还能让你在不停止当前应用的情况下，切换到另一个应用。\n\n你可能想知道何时适合使用快速应用切换器。以下是你可能需要在\
    \ iPhone 上使用多任务处理的几个场景：\n\n*   从一个应用（`邮件`）复制粘贴内容到另一个应用（`日历`）。\n*   在玩游戏时接听电话或回复`短信`，然后无缝跳回游戏。\n\
    *   在检查电子邮件或浏览网页的同时，继续收听网络广播（如`Pandora`或`Slacker`）。\n*   无需等待照片上传到 Facebook 或\
    \ Flickr；照片可以在后台上传，而你则在 iPhone 上做其他事情。\n*   使用`Skype`拨打电话——现在可以让它在后台运行以接听来电（此前无法实现）。\n\
    \n#### 在应用间切换\n\n要进行多任务处理，你需要调出屏幕底部的快速应用切换器栏。\n\n1.  从任何应用甚至主屏幕，双击主屏幕按钮，调出屏幕底部的快速应用切换器栏。\n\
    \n    ![images](img/U0701.jpg)\n\n2.  所有打开的应用都会显示在快速应用切换器栏上。\n3.  向右或向左滑动找到你想要的应用，然后轻点它。\n\
    4.  如果你在快速应用切换器栏上看不到想要的应用，请按下主屏幕按钮并从主屏幕启动它。\n5.  再次双击`主屏幕`按钮，然后轻点你刚刚离开的应用即可跳回。\n\
    \n![images](img/U0702.jpg)\n"
- fmt: "# Killing Apps from the Fast App Switcher Bar\n\nYour iPhone will automatically\
    \ manage its memory, leaving apps open that are doing useful things like streaming\
    \ music, and putting apps that aren’t doing anything to “sleep,” so they don’t\
    \ waste memory or processor cycles. Sometimes, however, a rogue process can cause\
    \ an app not to close properly; at other times, you might want to make certain\
    \ a GPS or VoIP app closes early to save battery power. In those cases, you can\
    \ use the Fast App Switcher to manually kill apps.\n\nBuilt-in apps like `Mail`\
    \ and `Phone` will immediately restart, so you don’t miss any important messages.\
    \ Apps and games from the App Store will stay closed until the next time you tap\
    \ their icons to launch them. Follow these steps to kill an app from the `Fast\
    \ App Switcher` bar:\n\n1.  Double-click the `Home` button to bring up the `Fast\
    \ App Switcher` bar.\n2.  Press and hold any icon in the `Fast App Switcher` bar\
    \ until they all shake. You will notice that a red `Circle` icon with a minus\
    \ sign appears in the upper-left corner of each app icon.\n3.  Tap a red `Circle`\
    \ icon ![images](images/U0704.jpg) to completely close the app.\n4.  Keep tapping\
    \ the red `Circle` icons to close as many apps as you want.\n\n![images](images/U0703.jpg)\n\
    \n# Media Controls and the Screen Portrait Orientation Lock\n\nSwiping from left\
    \ to right on the `Fast App Switcher` bar will bring up the media controls and\
    \ the `Portrait Orientation Lock` icon. Follow these steps to access these controls\
    \ and use the Portrait Orientation Lock feature:\n\n1.  From any app or even the\
    \ `Home` screen, double-tap the `Home` button to bring up the `Fast App Switcher`\
    \ bar at the bottom of your screen.\n2.  Swipe left to right to see the media\
    \ controls and the `Portrait Orientation Lock` icon.\n3.  Tap the `Portrait Orientation\
    \ Lock` icon to lock the screen in Portrait (i.e., vertical) orientation. Your\
    \ iPhone will maintain this orientation even if you turn it on its side. You know\
    \ the phone is locked when you see a `Lock` icon inside the button and another\
    \ `Lock` icon in the top status bar. ![images](images/U0706.jpg)\n4.  The name\
    \ of the currently playing media is listed at the bottom of the screen.\n\n  \
    \  ![images](images/U0705.jpg)\n\n5.  You can also use the `Previous Track`, `Play/Pause`,\
    \ and `Next Track` buttons in the middle. If you hold down `Previous Track` or\
    \ `Next Track` button, it becomes the `Rewind` or `Fast Forward` button, respectively.\n\
    6.  Or, you can tap the `App` icon to jump to the last app that was playing music\
    \ on your iPhone.\n\n# Volume Controls and AirPlay\n\nIf you keep swiping as far\
    \ left as possible on `Fast App Switcher` bar, you’ll find the volume controls\
    \ and the `AirPlay` button. Follow these steps to manipulate these controls:\n\
    \n1.  From any app or even the `Home` screen, double-tap the `Home` button to\
    \ bring up the `Fast App Switcher` at the bottom of your screen.\n2.  Swipe left\
    \ to right, past the media controls, until you get to the volume controls and\
    \ the `AirPlay` button.\n3.  Tap the `AirPlay` button to beam your iPhone audio\
    \ to `AirPlay` compatible speakers, your video to Apple TV, or to mirror your\
    \ apps on the Apple TV.\n4.  Slide the `Volume` control left to reduce the volume;\
    \ slide it to the right to increase it.\n\n![images](images/U0707.jpg)\n\n# Siri:\
    \ Your Virtual Assistant\n\nSiri is an artificially intelligent virtual personal\
    \ assistant that is context and relationship aware. This means that you can ask\
    \ Siri questions, and it will not only answer you, but do things for you like\
    \ tell you wife you’re running late, wake you up from a nap in 15 minutes, recommend\
    \ you bring a raincoat if you’re going outside, find you a place to get a cup\
    \ of coffee, or tell you who starred in your favorite movie. Siri is neither magic\
    \ nor science fiction, but Apple has given it a personality, so it often feels\
    \ like a little bit of both.\n\n**NOTE:** At the time of writing, Siri is still\
    \ in beta release. Apple is only providing support for English (U.S., U.K., and\
    \ Australian), French, and German. You can turn it on in other places, but your\
    \ results may vary. Also, things like location services (the ability to search\
    \ maps and find places) were not yet working outside the US.\n\nFinally, Siri\
    \ has different voices for different areas. For example, in the US, Siri has a\
    \ female voice. In the U.K., Siri has a male voice.\n\n# Enabling and Configuring\
    \ Siri\n\nBefore you can start using Siri, you need to turn the service on. Follow\
    \ these steps to do so:\n\n1.  Launch the `Settings` app.\n2.  Scroll down and\
    \ tap `General`.\n3.  Tap `Siri`.\n4.  Toggle the `Siri` switch to `ON`.\n\nTo\
    \ change the language, tap Language and choose a language from the list.\n\nAs\
    \ of publishing time, only English in Australia, U.K. and U.S.; French; and German\
    \ are supported.\n\n![images](images/U0708.jpg)\n\nYou can choose whether Siri\
    \ talks back to you `Always` or only when `Hands Free`. If you don’t like the\
    \ idea of your phone speaking out loud, set this option to `Hands Free` only.\
    \ If you want to experience Siri in a more interactive way, leave it set to `Always.`\n\
    \nTo let Siri know who you are, so Siri can call you by name, set `My Info` to\
    \ your own contact card.\n\nSetting the `Raise to Speak` option to `ON` causes\
    \ Siri to activate and ask what you’d like any time you wake your iPhone from\
    \ sleep (by pressing the `Sleep/Wake` button on the top or the `Home` button on\
    \ the front) and bring it up to your ear.\n\n# Using Siri\n\nTo use Siri, press\
    \ and hold the `Home` button. (Or, if your iPhone is on and you enabled the `Raise\
    \ to Speak` option in the `Settings` app as described in the previous section,\
    \ then you can simply bring your phone to your ear.)\n\n![images](images/U0709.jpg)\n\
    \nYour `Home` screen will slide up to reveal a silver `Microphone` icon. Wait\
    \ for Siri to beep before you begin to speak; and then speak in a clear voice,\
    \ at a moderate speed, just as you’d speak to another person. When you’re done\
    \ speaking, wait for Siri to beep again. It is at this point that all the fun\
    \ begins.\n\n![images](images/U0710.jpg)"
