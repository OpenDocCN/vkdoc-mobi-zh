  trans: "\n# 从快速应用切换栏中关闭应用\n\niPhone 会自动管理内存，让正在执行有用操作（如播放流媒体音乐）的应用保持开启，并将闲置的应用置于“休眠”状态，从而避免它们占用内存或处理器资源。但有时，某个异常进程可能导致应用无法正常关闭；另一些时候，你可能希望确保\
    \ GPS 或 VoIP 应用提前关闭以节省电量。在这些情况下，你可以使用快速应用切换栏手动关闭应用。\n\n内置应用如 `Mail` 和 `Phone`\
    \ 会立即重新启动，因此你不会错过任何重要信息。从 App Store 下载的应用和游戏则会保持关闭状态，直到你再次点击它们的图标启动。请按照以下步骤从 `快速应用切换栏`\
    \ 中关闭应用：\n\n1.  双击 `Home` 按钮，调出`快速应用切换栏`。\n2.  长按 `快速应用切换栏` 中的任意图标，直到所有图标开始晃动。你会注意到每个应用图标的左上角会出现一个带减号的红色`圆形`图标。\n\
    3.  点击红色`圆形`图标 ![images](img/U0704.jpg) 以完全关闭应用。\n4.  继续点击红色`圆形`图标，关闭任意多个你想要关闭的应用。\n\
    \n![images](img/U0703.jpg)\n\n# 媒体控制与竖屏方向锁定\n\n在 `快速应用切换栏`上从左向右滑动，将会调出媒体控制和`竖屏方向锁定`图标。请按照以下步骤访问这些控制选项并使用竖屏方向锁定功能：\n\
    \n1.  在任何应用中，甚至在`主屏幕`上，双击`Home`按钮，调出屏幕底部的`快速应用切换栏`。\n2.  从左向右滑动，即可看到媒体控制和`竖屏方向锁定`图标。\n\
    3.  点击`竖屏方向锁定`图标，将屏幕锁定为竖屏（即垂直）方向。即使你将 iPhone 侧放，它也会保持此方向。当你在按钮内部看到一个`锁定`图标，并且在顶部状态栏中也看到一个`锁定`图标时，即表示手机已锁定。\
    \ ![images](img/U0706.jpg)\n4.  当前正在播放的媒体名称会显示在屏幕底部。\n\n    ![images](img/U0705.jpg)\n\
    \n5.  你也可以使用中间的`上一曲`、`播放/暂停`和`下一曲`按钮。如果长按`上一曲`或`下一曲`按钮，它们会分别变为`快退`或`快进`按钮。\n6.\
    \  或者，你可以点击`应用`图标，跳转到你 iPhone 上最后播放音乐的应用。\n\n# 音量控制与 AirPlay\n\n如果在 `快速应用切换栏`上尽可能向左滑动，你会找到音量控制和\
    \ `AirPlay` 按钮。请按照以下步骤操作这些控制选项：\n\n1.  在任何应用中，甚至在`主屏幕`上，双击`Home`按钮，调出屏幕底部的`快速应用切换栏`。\n\
    2.  从左向右滑动，经过媒体控制，直到你看到音量控制和 `AirPlay` 按钮。\n3.  点击 `AirPlay` 按钮，可以将 iPhone 的音频传输到兼容\
    \ `AirPlay` 的扬声器，将视频传输到 Apple TV，或在 Apple TV 上镜像你的应用。\n4.  向左滑动`音量`控制滑块可降低音量；向右滑动可提高音量。\n\
    \n![images](img/U0707.jpg)\n\n# Siri：你的虚拟助理\n\nSiri 是一个具备情境和关系感知能力的人工智能虚拟个人助理。这意味着你可以向\
    \ Siri 提问，它不仅能回答你的问题，还能为你做各种事情，比如告诉你妻子你会迟到，15 分钟后叫醒小憩的你，建议你出门带雨衣，帮你找喝咖啡的地方，或者告诉你最喜欢的电影主演是谁。Siri\
    \ 既不是魔法也不是科幻，但苹果赋予了它个性，因此它常常让人觉得两者兼而有之。\n\n**注意：** 在撰写本文时，Siri 仍处于测试版阶段。苹果仅支持英语（美国、英国和澳大利亚）、法语和德语。你可以在其他地区开启它，但效果可能有所不同。此外，像定位服务（搜索地图和查找地点的功能）在美国境外尚无法使用。\n\
    \n最后，Siri 在不同地区有不同的语音。例如，在美国，Siri 使用女声。在英国，Siri 使用男声。\n\n# 启用与配置 Siri\n\n在开始使用\
    \ Siri 之前，你需要先开启这项服务。请按照以下步骤操作：\n\n1.  启动`设置`应用。\n2.  向下滚动并点击`通用`。\n3.  点击`Siri`。\n\
    4.  将 `Siri` 开关切换到`开启`状态。\n\n要更改语言，点击语言并从列表中选择一种语言。\n\n截至发布时，仅支持澳大利亚、英国和美国的英语、法语以及德语。\n\
    \n![images](img/U0708.jpg)\n\n你可以选择 Siri 是在`始终`回应你，还是仅在`免提`时回应。如果你不喜欢手机大声说话，请将此选项设置为仅\
    \ `免提`。如果你希望以更互动的方式体验 Siri，请将其保持为`始终`。\n\n为了让 Siri 知道你是谁，以便它能够称呼你的名字，请将`我的信息`设置为你自己的联系人名片。\n\
    \n将`抬起唤醒`选项设置为`开启`后，每当你将 iPhone 从睡眠中唤醒（通过按下顶部的`睡眠/唤醒`按钮或正面的`Home`按钮）并将其举到耳边时，Siri\
    \ 就会被激活并询问你的需求。\n\n# 使用 Siri\n\n要使用 Siri，请长按 `Home` 按钮。（或者，如果你的 iPhone 已开启并且你按照上一节所述在`设置`应用中启用了`抬起唤醒`选项，那么你只需将手机举到耳边即可。）\n\
    \n![images](img/U0709.jpg)\n\n你的`主屏幕`会向上滑动，露出一个银色的`麦克风`图标。等待 Siri 发出提示音后再开始说话；然后用清晰的声音、适中的语速说话，就像你在跟另一个人说话一样。说完话后，等待\
    \ Siri 再次发出提示音。此时，所有乐趣便开始了。\n\n![images](img/U0710.jpg)\n"
- fmt: "#### What You Can Ask Siri\n\nApple recommends that you talk to Siri the same\
    \ way you’d talk to another person. Don’t try to remember a set list of commands\
    \ or queries—there are far too many types and variations to remember them all.\
    \ Instead, just ask Siri for what you want. Here are some examples of what Siri\
    \ can do for you:\n\n* Set up reminders, calendar appointments, and clock alarms\
    \ and timers.\n* Send texts, messages, and emails.\n* Play music.\n* Search for\
    \ location-based information like restaurant and business listings. You can also\
    \ search for directions to locations.\n* Search `Yelp` (in the U.S.), `Wolfram\
    \ Alpha`, and `Google` for information.\n* Ask about the weather and stocks.\n\
    * Read your `SMS`/`iMessage` messages.\n* Take dictation in any app.\n* Ask silly\
    \ questions—Apple has actually programmed in funny responses to many of these.\n\
    \nMore impressively, Siri can combine many of these functions to accomplish complex\
    \ interactions. For example, Siri can read a message requesting a dinner date,\
    \ search for a restaurant, get directions, send back a confirmation message, and\
    \ then add an appointment for the dinner—all as part of an interactive confirmation.\n\
    \nHere are just some of the things you can ask, and some of the ways you can ask\
    \ them:\n\n* “Siri, remind me to call my mom at work when I leave home.”\n\n \
    \   This will cause Siri to create a reminder, set the departure location as your\
    \ home address, and pop up an alert with your mom’s work number that’s ready to\
    \ dial when you leave.\n\n* “Siri, tell my boss I’ll be there soon.”\n\n    Siri\
    \ will get the contact that’s defined as your boss, take the mobile phone number,\
    \ and send her an `SMS`/`iMessage` with the following content: “I’ll be there\
    \ soon.”\n\n* “Siri, read my messages.”\n\n    Siri will read any new `SMS` or\
    \ `iMessages` that have come in.\n\n* “Siri, wake me up in 30 minutes.”\n\n  \
    \  Siri will set a clock timer that will go off in 30 minutes (hopefully, when\
    \ your nap is over).\n\n    ![images](images/U0711.jpg)\n\n* “Siri, do I need\
    \ a raincoat today?”\n\n    Siri will check the weather, see if it’s likely to\
    \ rain, and let you know if you need to worry about getting wet.\n\n    ![images](images/U0712.jpg)\n\
    \n* “Siri, tell me a joke.”\n\n    Siri might just start the one about the two\
    \ iPhones that walked into a bar…\n\n    ![images](images/U0713.jpg)\n\n* “Siri,\
    \ where can I get Italian for lunch?”\n\n    Siri will search for nearby restaurants\
    \ and show them to you on a map. In the U.S. it can also order them by `Yelp`\
    \ ranking.\n\n* “Siri, who starred in the movie, *Serenity*?”\n\n    Siri will\
    \ search `Wolfram Alpha` and give you a cast list from the movie.\n\n* “Siri,\
    \ what’s your favorite color?”\n\n    Siri will give you one of several replies,\
    \ perhaps saying that your language lacks the dimensions to properly describe\
    \ the right shade of green.\n\nThe results that Siri returns will sometimes be\
    \ in the form of widgets that you can adjust or disable if you made a mistake.\
    \ For example, you can quickly turn off an `Alarm` widget, check off a `Reminder`\
    \ widget as done, tap an email address into a `Contact` widget, and so on.\n\n\
    Note that Siri isn’t perfect, yet. For example, sometimes it will misunderstand\
    \ you. At other times, the servers will be overly busy. So, Siri will make mistakes\
    \ and do the wrong thing on occasion. But over time, it will get better as it\
    \ learns more about you, and you learn more about how to phrase your questions\
    \ and instructions.\n\nIt’s best just to play with it at first. Experiment with\
    \ it as much as you can to get a sense of what gives you the best results.\n\n\
    #### Changing Names and Setting up Relationships\n\nYou might have noticed in\
    \ the preceding examples that we used words like *mom* and *boss*, and Siri understood\
    \ who we were talking about. Before Siri can do that, however, you need to set\
    \ these people up. Here’s how:\n\n1. Hold down the `Home` button to launch Siri.\n\
    2. Tell Siri whom you want to set up the relationship for, and what the relationship\
    \ is. For example, you might say: “Jane Smith is my mother.”\n3. Siri will ask\
    \ whether you want it to remember “Jane Smith” as your mother.\n4. After the beep,\
    \ say “yes.” (Or, just tap the `Yes` button.)\n5. Siri will confirm with this\
    \ statement: “OK, I’ve added this relationship.” Next, you will see your updated\
    \ contacts card.\n\n![images](images/U0714.jpg)\n\n**NOTE:** Siri can’t remove\
    \ relationships once they’re created. If you make a mistake or want to change\
    \ a relationship later, then you’ll have to go to the `Contacts` app, tap `Edit`,\
    \ and manually `Delete` the relationship yourself.\n\nIf you want Siri to call\
    \ you by a nickname—say, *Bob* instead of *Robert* or even something silly like\
    \ *Master*—you can easily make the change:\n\n1. Hold down the `Home` button to\
    \ launch Siri.\n2. Tell Siri the new name you want to be called by saying something\
    \ like, “Call me Bob.”\n3. Siri will ask if you want it to remember *Bob* as your\
    \ new name.\n4. After the beep, say “yes.” (Or, you can just tap the `Yes` button.)\n\
    \n    ![images](images/U0715.jpg)\n\n5. Siri will confirm the action with a statement\
    \ like this: “OK, I’ve added this name.” You will then see your updated nickname\
    \ on a contacts card.\n\n#### Taking Dictation\n\nThe keyboard of the iPhone 4S\
    \ introduces a new feature: a small Microphone button immediately to the left\
    \ of the `Space` bar.\n\n![images](images/U0716.jpg)\n\nTap it and your screen\
    \ will slide up to reveal a glowing, purple microphone. Speak to it as you would\
    \ to Siri; when you’re finished, tap the `Done` button. Everything you say will\
    \ be transcribed and entered as text.\n\nNo text-to-speech engine is perfect,\
    \ but Siri does a pretty good job transcribing what you said. If it makes any\
    \ mistakes, you can edit the text just as you would text that you type with the\
    \ keyboard.\n\n![images](images/U0717.jpg)\n\nIn addition to basic words and names,\
    \ Siri can understand a wide range of symbols and punctuation. For example, you\
    \ can say “period,” “exclamation point,” or even “open parenthesis” or “close\
    \ square bracket.” You can also say, “new line” or “new paragraph.” Indeed, you\
    \ can use Siri to enter almost any character that you know the proper name of.\n\
    \n#### What Siri Can’t Do\n\nSiri can do so many things right out of the box that\
    \ it can be hard to remember what it can’t do. That said, Siri is an online service,\
    \ and Apple can and will continue to add new functionality over time. Just because\
    \ Siri can’t do something today doesn’t mean it won’t be able to do that same\
    \ task tomorrow. At the time of writing, here are some things that Siri can’t\
    \ do:\n\n* Siri can’t toggle settings. You can’t tell it to turn Wi-Fi on or off,\
    \ or go into Airplane mode.\n* Siri can’t launch apps. You can’t tell it to launch\
    \ `Facebook` or your favorite game.\n\nSiri can’t read emails or Twitter replies\
    \ or anything beyond messages. You’ll have to get a third-party app like `Tweet\
    \ Speaker` if you need that functionality.\n\n## Chapter 8\n\n## Personalize and\
    \ Secure\n\nIn this chapter, you will learn several easy ways to personalize your\
    \ iPhone. You will also learn how to protect your iPhone with passcode security.\
    \ We’ll show you where you can download free wallpaper to change the look of your\
    \ `Lock` and `Home` screens. We’ll also show you how to personalize the sounds\
    \ your iPhone makes by adjusting when and what sound you hear for various activities.\
    \ Many aspects of the iPhone can be fine-tuned to meet your needs and tastes,\
    \ so you can give your iPhone a more personal look and feel."
