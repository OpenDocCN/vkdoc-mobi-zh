- fmt: '#### Powering On/Off and Sleep/Wake


    To power on your iPhone, press and hold the `Power/Sleep` button on the top edge
    of the iPhone for a few seconds. Simply tapping this button quickly won’t power
    on the iPhone if it is completely off—in that case, you need to hold the button
    until you see the iPhone power on.


    When you are no longer using your iPhone, you have two options: you can either
    put it into Sleep mode or turn it off completely.


    The advantage of Sleep mode is this: when you want to use your iPhone again, simply
    tap the `Power/Sleep` button or the `Home` button to bring your iPhone back awake.
    If you want to maximize your battery or if you know you won’t be using your iPhone
    for quite some time—say when you go to sleep—you should turn it off completely.
    The way to do this is to press and hold the `Power/Sleep` button until you see
    the `Slide to Power Off` bar appear. Just slide the bar to the right and the iPhone
    will power off.


    #### Assistive Touch Accessibility


    As part of its excellent Accessibility features, Apple includes the Assistive
    Touch feature for people with special physical or motor skills needs. These include
    touch screen versions of the hardware buttons, as well as common and custom gestures.


    Follow these steps to enable the Assistive Touch feature:


    1.  Tap the `Settings` icon.

    2.  Tap `General`.

    3.  Tap `Accessibility` near the bottom of the page.

    4.  Tap `Assistive Touch`.

    5.  Set the `Assistive Touch` switch to `On`.

    6.  Tap the `Assistive Touch` overlay icon when it appears at the bottom right
    of your screen.

    7.  Tap `Home` to simulate a physical press of the hardware `Home` button.

    8.  Tap `Device` to get access to other hardware button simulators, including
    `Rotate Screen`, `Lock Screen`, `Muted`/`Unmuted`, `Volume Up`, `Volume Down`,
    and `Shake`.

    9.  Tap `Gestures` or `Favorites` (favorite gestures) to access Pinch, Swipe,
    and any custom gestures that have been set up.

    10.  Tap the center of the overlay menu to return to the previous menu or to exit
    Assistive Touch.


    ![images](images/U0110.jpg)


    **NOTE:** Assistive Touch also allows for sophisticated gestures, including custom
    gestures.


    #### Slide to Unlock and Quick Camera and Media Access


    Once your iPhone has been activated, you will see the `Slide to Unlock` screen,
    as shown in [Figure 1–3](#Chapter01.html#fig_1_3).


    Double-click the `Home` button to see media control when you have music playing
    and, more importantly, get instant access to your camera for those times when
    you want to grab a quick picture. Tap the camera icon next to the slider at the
    bottom.


    To get into your iPhone, touch your finger to the screen and follow the path of
    the arrow to move the `Slide to Unlock` button to the right. Once you do that,
    you will see your `Home` screen.


    Notice the four icons in the Bottom Dock. The items in this dock do not move,
    while the rest of the icons can move back and forth in *pages*. You can learn
    how to move your favorite icons into the Bottom Dock in the “Moving Icons” section
    of [Chapter 6](#Chapter06.html#ch6): “Icons and Folders.”


    ![images](images/0103.jpg)


    **Figure 1–3.** *Slide to Unlock,* *Quick Camera and Media Access and your Home
    screen.*


    #### Moving Around Inside Apps and Your Settings Screens


    Getting around the screens inside the apps on your iPhone is as simple as tapping
    the screen:


    1.  Tap the `Settings` icon to start the `Settings` app.

    2.  Touch `General` to see General settings.

    3.  Touch `Network` to see Network settings.

    4.  You can toggle any switch by tapping it. For example, touching the `OFF` switch
    next to `Data Roaming` will toggle it to `ON`.

    5.  To go back a level in the screens, touch the button in the upper-left corner.
    In this case, you would touch the `General` button to leave the `Network Settings`
    screen.


    #### The Home Button


    ![images](images/U0111.jpg)


    The button you will use most often is your `Home` button. This button will initiate
    everything you do with your iPhone. If your iPhone is sleeping, press the `Home`
    button once to wake up your iPhone (assuming it is in Sleep mode).


    Pressing the `Home` button will also take you out of any application program and
    bring you back to your `Home` screen.


    #### Start Siri by Pressing and Holding the Home Button


    Start your personal assistant by pressing and holding the Home button. Then simply
    speak to your iPhone. If you have enabled `Raise to Speak`, you can also simply
    raise your iPhone to your ear and start speaking to Siri. We show you all about
    Siri in [Chapter 7](#Chapter07.html#ch7).


    #### Access the Fast App Switcher by Double-Clicking the Home Button


    Accessing the Fast App Switcher is as simple as double-clicking the `Home` button.


    1.  While in any app or from the `Home` screen, double-click the `Home` button.

    2.  The screen will slide up and you will see a small bar of icons appear in the
    bottom row. These represent the apps that you have started since you powered on
    your iPhone.

    3.  Tap any icon to switch back to that app.

    4.  Swipe your finger to the left to see more apps.

    5.  Swipe your finger to the right to see the orientation lock and media controls.

    6.  Swipe your finger to the right again to see the volume control and AirPlay
    button.


    ![images](images/U0112.jpg)


    Follow these steps to access the Fast App Switcher from a given app:


    #### Volume Keys for Ringer and Audio/Video Playback


    On the upper-left side of the iPhone (see [Figure 1–4](#Chapter01.html#fig_1_4)),
    you can see some simple `Volume Up`/`Volume Down` keys that you will find very
    handy.


    ##### Ringer Volume


    If you are not playing a song, video, or other content, pressing these `Volume`
    keys will adjust the volume of your phone ringer.


    **TIP:** When you’re in the `Camera` app, the `Volume Up` button becomes a camera
    shutter, allowing you to quickly snap a picture.


    ##### Muting the Phone Ringer


    You have a switch just above the `Volume` keys on the left side of your iPhone.
    Slide the `Ringer Mute` switch to the back of the iPhone set it to `ON`. You will
    see a little orange light next to the switch when your sound is muted. To turn
    off the mute, simply slide the switch back toward the front of the iPhone (see
    [Figure 1–4](#Chapter01.html#fig_1_4)).


    ##### Adjusting Playback or Phone Voice Volume


    You can use the `Volume` keys to raise or lower your phone’s volume when you are
    listening to music or a video, enjoying other content, or even on a phone call.
    When listening to music or a video, you can also use the on-screen slider bar
    to adjust volume (see [Figure 1–4](#Chapter01.html#fig_1_4)).


    ![images](images/0104.jpg)


    **Figure 1–4.** *Adjusting the volume on your iPhone or muting the phone ringer*


    #### Locking Your Screen in Portrait (Vertical) Orientation


    If you tilt your iPhone on its side, you will notice that its screen rotates to
    Horizontal (Landscape) orientation in some apps. You might want this behavior,
    so you can see the larger `Landscape` keyboard for typing. However, there may
    be times when you don’t want your screen to rotate from Portrait orientation when
    you turn your iPhone on its side. For these occasions, you can lock the screen
    in Portrait orientation.


    1.  Double-click the `Home` button.

    2.  Swipe left to right to see the media and screen lock controls.

    3.  Touch the `Portrait Orientation Lock` button in the icon on the left.

    4.  To disable the lock, tap the same button again.


    **TIP:** The orientation lock feature can be a great way to read iBooks in bed.
    If you prefer the larger page view in Portrait mode, enable the Portrait Orientation
    Lock feature. This way, when you set your iPhone on your lap or hold it almost
    flat, the screen will not accidentally rotate to Landscape mode. For more information,
    check out [Chapter 13](#Chapter13.html#ch13): “iBooks and e-Books.”'
