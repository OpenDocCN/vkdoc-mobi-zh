    \ access point like Starbucks handy, then you will need to activate your iPhone\
    \ later. (You could choose to set up your iPhone via iTunes on your PC instead;\
    \ however, you will still need Internet access to connect to Apple’s activation\
    \ servers.)\n\nFollow these steps to set up your iPhone with iCloud, as shown\
    \ in the **Welcome** screen pictured earlier:\n\n1.  Swipe to set up by touching\
    \ the **Arrow** button and pulling it across the screen in the direction indicated.\n\
    2.  Choose the language you want to use with your iPhone. Apple will present you\
    \ with the most common options based on where you bought your iPhone; however,\
    \ you can also tap the **Down Arrow** for more language choices.\n3.  When you’ve\
    \ chosen your preferred language, tap the blue **Next** button at the top right\
    \ of the screen.\n\n    ![images](images/U0106.jpg)\n\n4.  Choose your Country\
    \ or Region. Again, Apple will provide you with a default choice based on where\
    \ you bought your iPhone; however, you can tap **Show More...** to expand the\
    \ list. Tap the blue **Next** button to continue.\n5.  Decide if you would like\
    \ to enable or disable Location Services, and then tap the blue **Next** button\
    \ to continue.\n\n    **NOTE:** *Location Services* use GPS, cell-tower triangulation,\
    \ and Wi-Fi router mapping to determine the approximate location of your iPhone.\
    \ This feature is used for turn-by-turn navigation (like TomTom), check-in games\
    \ (like Foursquare), social networks (like Facebook), geo-tagging (in the **Camera**\
    \ app), and utilities (like Find my iPhone). Unless you have a particular need\
    \ to globally disable all location services, you probably want to turn on the\
    \ Location Services feature right now. You can selectively disable or enable these\
    \ services later in the **Settings** app (e.g., turn off your **Camera** app’s\
    \ geo-tagging, but leave on TomTom’s turn-by-turn navigation).\n\n6.  Choose your\
    \ Wi-Fi network, enter your network password, and then tap the blue **Next** button\
    \ to continue.\n7.  Your iPhone will now connect to Apple for activation. This\
    \ can take a few seconds or up to a few minutes, depending on how fast your connection\
    \ is and how busy Apple’s servers are.\n8.  Once activation is complete, you’ll\
    \ be given the option to set up your phone as a new iPhone, restore it from an\
    \ iCloud backup, or restore it from iTunes."
  trans: "\n###### 让每次充电更持久\n\n要延长电池续航时间，请尝试以下建议：\n\n-   **降低屏幕亮度**：轻点**设置** ![images](img/U001.jpg)\
    \ **亮度**，然后使用滑块将亮度降低到仍能正常使用、且不到一半的位置。\n-   **关闭定位服务**：如果你不需要将实际位置信息发送给应用，可以将其关闭。轻点**设置**\
    \ ![images](img/U001.jpg) **通用** ![images](img/U001.jpg) **定位服务**，然后将**定位服务**设置为**关闭**。如果你进入需要你位置信息的应用，系统会提醒你重新开启。\n\
    -   **设置更短的自动锁定**：此功能可缩短 iPhone 在闲置时进入睡眠模式（即关闭屏幕）的时间。缩短此时间有助于节省电池电量。操作方法：轻点**设置**\
    \ ![images](img/U001.jpg) **通用** ![images](img/U001.jpg) **自动锁定**，然后将**自动锁定**设置为尽可能短的时间——如果你愿意，可以将其设置为**1\
    \ 分钟**。\n-   **关闭推送邮件和推送通知。**\n-   **关闭 Siri 的“抬起说话”功能**。轻点**设置** ![images](img/U001.jpg)\
    \ **通用** ![images](img/U001.jpg) **Siri**，然后将**抬起说话**设置为**关闭**。\n\n你可以访问 Apple\
    \ 网站 [`www.apple.com/batteries/iphone.html`](http://www.apple.com/batteries/iphone.html)\
    \ 了解更多关于延长电池续航时间的提示。\n\n###### 让电池更耐用\n\niPhone 使用可充电电池，其使用寿命内充电次数有限；换句话说，随着时间的推移，电池保持电量的能力会逐渐下降。确保每个月至少将电池完全耗尽一次，可以延长\
    \ iPhone 电池的寿命。这样做有助于可充电电池更持久耐用。\n\n###### 寻找更多充电地点\n\n无论如何，如果你真的经常使用 iPhone，你会想找到更多地方和方式来为它充电。除了使用电源线或连接电脑，你还可以利用表\
    \ 1–2 中描述的充电技巧。\n\n![images](img/t0102.jpg)\n\n### 设置你的 iPhone\n\n至此，你已经了解了 iPhone\
    \ 的一些基本知识以及如何充分利用电池。现在，你可以开始享受它了！下一步就是设置你的 iPhone。\n\n#### 判断是否需要设置 iPhone\n\n\
    如果你看到类似于这里显示的**欢迎**屏幕，则需要先设置 iPhone 才能使用。通过 iOS 5，你可以通过几种方式设置 iPhone。首先，你可以利用\
    \ Wi-Fi 网络和 iCloud 进行空中（OTA）设置。或者，你可以使用 USB 底座连接线将手机连接到电脑，并通过 iTunes 服务激活。\n\n\
    如果这是你的第一部 iPhone，或者你想将其设置为全新 iPhone，你可能希望使用 iCloud OTA。\n\n如果你是从 iPhone 4 或更早型号升级，你可能希望使用\
    \ iTunes 服务从备份中恢复。\n\n![images](img/U0105.jpg)\n\n### 使用 iCloud 通过无线方式设置 iPhone\n\
    \n借助 iOS 5，Apple 终于摆脱了 iTunes 的束缚。这意味着你不再需要将 iPhone 连接到电脑来激活或设置它。相反，你可以使用 Apple\
    \ 的全新 `iCloud` 服务，直接从 iPhone 通过 OTA 进行激活。\n\n**注意：** 在初始设置过程中，你将能够连接到任何可用的 Wi-Fi\
    \ 网络，这是使用 iCloud 通过 OTA 设置 iPhone 所必需的。如果你家里、工作单位或学校的 Wi-Fi 网络不可用，并且身边没有像星巴克这样的公共接入点，那么你需要稍后再激活\
    \ iPhone。（你也可以选择通过电脑上的 iTunes 来设置 iPhone；但是，你仍然需要互联网连接来连接到 Apple 的激活服务器。）\n\n\
    按照以下步骤使用 iCloud 设置你的 iPhone，如之前显示的**欢迎**屏幕所示：\n\n1.  触摸**箭头**按钮，并按指示方向在屏幕上滑动来进行设置。\n\
    2.  选择你想在 iPhone 上使用的语言。Apple 会根据你购买 iPhone 的地点提供最常用的选项；不过，你也可以轻点**向下箭头**以获取更多语言选项。\n\
    3.  选好首选语言后，轻点屏幕右上角的蓝色**下一步**按钮。\n\n   ![images](img/U0106.jpg)\n\n4.  选择你的国家或地区。同样，Apple\
    \ 会根据你购买 iPhone 的地点提供默认选项；不过，你可以轻点**显示更多...** 来展开列表。轻点蓝色**下一步**按钮继续。\n5.  决定是否要启用或禁用定位服务，然后轻点蓝色**下一步**按钮继续。\n\
    \n   **注意：** `定位服务`使用 GPS、基站三角定位和 Wi-Fi 路由器映射来确定你 iPhone 的大致位置。此功能用于逐向导航（如 TomTom）、签到游戏（如\
    \ Foursquare）、社交网络（如 Facebook）、地理标记（在**相机**应用中）以及实用工具（如“查找我的 iPhone”）。除非你有特殊需要全局禁用所有定位服务，否则你可能希望现在就开启定位服务功能。稍后你可以在**设置**应用中有选择地禁用或启用这些服务（例如，关闭**相机**应用的地理标记，但保留\
    \ TomTom 的逐向导航）。\n\n6.  选择你的 Wi-Fi 网络，输入网络密码，然后轻点蓝色**下一步**按钮继续。\n7.  你的 iPhone\
    \ 现在将连接到 Apple 进行激活。根据你的连接速度和 Apple 服务器的繁忙程度，这可能需要几秒钟到几分钟的时间。\n8.  激活完成后，你将看到设置手机为新\
    \ iPhone、从 iCloud 备份恢复或从 iTunes 恢复的选项。\n"
- fmt: "### Setting up a New iPhone Using iCloud\n\nIf this is your first iPhone—or\
    \ if you simply want a clean, fresh start—choose **Set up as a new iPhone**.\n\
    \n**TIP:** Restoring from backups—especially from backups of different devices\
    \ (e.g., restoring an iPhone from an iPad backup)—can sometimes lead to problems\
    \ like more frequent app crashes or lower battery life. If you’re experiencing\
    \ problems after restoring from a previous backup, you might want to try setting\
    \ your phone up as a new iPhone. You’ll have to redo all your settings and accounts\
    \ from scratch, and you’ll lose any saved app and game data; however, it’s sometimes\
    \ your only option if your iPhone is no longer stable enough for everyday use.\n\
    \nTo set up your phone as a new iPhone, you’ll either need to sign in with an\
    \ existing Apple ID or create a new, free Apple ID. Apple IDs can be any of the\
    \ following:\n\n- **iTunes ID**: This is the e-mail address and password you use\
    \ to log into iTunes and buy music, TV shows, movies, App Store apps and games,\
    \ and iBooks.\n- **Free Apple ID**: This is the e-mail address and password you\
    \ use to log into Find my iPhone, FaceTime, Game Center, iCloud, or any other\
    \ recent, free Apple service. This can also be the same ID you use to shop at\
    \ the online Apple Store.\n\n**NOTE:** If you’ve been using Apple products and\
    \ services for a while, it’s not uncommon for one person to have multiple Apple\
    \ IDs. For example, you might have an iTunes ID and old MobileMe account and an\
    \ Apple Store ID. Unfortunately, at the time of writing, Apple doesn’t allow IDs\
    \ to be combined, so you’ll have to choose which one you want to use with iCloud.\n\
    \nIf you have an old MobileMe account, Apple will migrate it to iCloud for you.\
    \ Visit [`http://www.me.com/move`](http://www.me.com/move) to begin the process.\n\
    \nOtherwise, the authors recommend you use your iTunes ID because it will have\
    \ all your music, media, app, and games purchases tied to it, and you’ll be able\
    \ to use iCloud’s re-download feature to easily restore these purchases to your\
    \ new devices now and in the future.\n\nIf you have an Apple ID, log in with it\
    \ now, accept the terms and conditions, and then skip ahead to the “Configuring\
    \ iCloud Options” section. If you don’t have an Apple ID, create one now.\n\n\
    ### Creating a Free Apple ID\n\nIf you’ve never used iTunes and don’t have an\
    \ Apple ID, then you’ll need to create one. This can be done quickly, right on\
    \ your iPhone:\n\n1.  Tap **Create a new Apple ID**.\n2.  Enter your birthday\
    \ by spinning the **Year**, **Month**, and **Day** rollers to represent the proper\
    \ date, and then tap the blue **Next** button.\n3.  Enter your first and last\
    \ name in the appropriate fields, then tap the blue **Next** button.\n\n    ![images](images/U0107.jpg)\n\
    \n4.  Choose whether you want to use an existing e-mail address (e.g., a Gmail,\
    \ Hotmail, Yahoo!, or personal e-mail address) or create a new iCloud e-mail address\
    \ (`@me.com`). If you don’t want to be bothered remembering a new e-mail address,\
    \ you’ll probably want to use an existing one. If you like keeping your e-mail\
    \ separate, then you’ll probably want to create a new one.\n5.  If you’re creating\
    \ a new iCloud `@me.com` address, enter your password and click **Verify**. Your\
    \ password must be “strong”; that is, it must contain uppercase and lowercase\
    \ letters, at least one number, and be at least eight characters long.\n6.  Pick\
    \ a **Security Info** question. This is something that should be easy for you\
    \ to remember, but difficult for anyone else to guess easily (which means no one\
    \ else should be able to find the answer just by looking at your blog or Facebook,\
    \ Google, Yahoo!, or other online profile page).\n7.  Choose whether you want\
    \ to receive e-mail updates from Apple at this new address. If not, set this option\
    \ to **OFF**.\n8.  You’ll need to accept the Terms and Conditions twice, first\
    \ by tapping the blue **Agree** button at the bottom left, and then by tapping\
    \ the translucent **Agree** button when the pop-up confirmation appears. Again,\
    \ it might take a few moments to verify.\n9.  Apple will then set up your new\
    \ Apple ID. This can take a few moments.\n\n### Configuring iCloud Options\n\n\
    Once you’ve logged in with your Apple ID, it’s time to configure your iCloud settings:\n\
    \n1.  If you want to use the **Set Up iCloud** feature—and we recommend you do\
    \ this because it’s free and provides a host of useful backup and syncing features—then\
    \ leave the **iCloud** option set to **ON** and tap the blue **Next** button.\n\
    2.  Choose whether you want to use the iCloud Backup service to wirelessly back\
    \ up your iPhone over-the-air to Apple’s data center or to your computer over\
    \ USB with iTunes. Again, we recommend using setting **iCloud** to **ON** because\
    \ it’s automatic, and you won’t have to remember to do it.\n\n    ![images](images/U0108.jpg)\n\
    \n3.  The **Find my iPhone** service is a free part of iCloud that shows you the\
    \ approximate location of your phone (you’ll be able to tell whether it’s at your\
    \ house or at the office, but not the specific room), make it ring so you can\
    \ find it even if it’s fallen under the car seat or behind the sofa, or even wipe\
    \ out all your personal data if it’s lost or stolen. If you want to use this feature,\
    \ leave this option set to **ON**.\n4.  That’s it! Your iPhone is now set up,\
    \ and you can start using it.\n\n### Restoring Your iPhone Using iCloud\n\nIf\
    \ you’ve previously used iCloud to back up your iPhone, you can restore from that\
    \ backup over-the-air right from your device:\n\n1.  Tap **Restore from iCloud\
    \ backup**.\n2.  Enter your iCloud Apple ID e-mail address and password.\n3. \
    \ Select which backup you’d like to restore from. Typically, this will be the\
    \ most recent backup available.\n4.  Your iPhone will reboot, download the backup,\
    \ and restart. This process can take a few minutes, especially if you have a lot\
    \ of data to restore.\n5.  Once your iPhone has been restored, your apps will\
    \ begin to download and install. iCloud can download and install multiple apps\
    \ at once, and you can use your iPhone while the restore process is going on."
