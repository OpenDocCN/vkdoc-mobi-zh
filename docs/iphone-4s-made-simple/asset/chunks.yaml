    \ plug on the other end that you insert into an electrical socket. Just connect\
    \ the USB cable to your iPhone and the other end to a wall plug to charge your\
    \ iPhone from the wall.\n\n#### Removing or Installing the SIM Card\n\nIn order\
    \ to place or receive phone calls on an AT&T/GSM iPhone (currently any iPhone\
    \ except the Verizon iPhone), you need to have a SIM card (Subscriber Identity\
    \ Module card). Every new GSM iPhone should already have a SIM card pre-installed.\n\
    \n**NOTE:** Like the iPad and iPhone 4, iPhone 4S uses the new MicroSIM standard—not\
    \ the MiniSIM that you find on most other phones.\n\nThere may be times when you\
    \ want to remove and replace the SIM card. For example, you might want to do this\
    \ if you are travelling internationally, or if you just received a replacement\
    \ iPhone and want to use the SIM card from your old one.\n\nFollow these steps\
    \ to eject and remove your iPhone’s SIM card:\n\n1.  Insert the paperclip into\
    \ the hole on the right side of your iPhone.Press the paperclip straight into\
    \ the hole until the SIM card tray pops ou**t**.\n2.  Remove the tray, so you\
    \ can remove or repla**ce the SIM ca**rd**.**\n3.  When inserting a SIM card,\
    \ make sure the SIM card is installed with the notch facing the top right of the\
    \ holder. It should sit flush in the holder with the metal contacts facing the\
    \ bottom of the holder.\n4.  Slide the SIM card tray back into the iPhone until\
    \ it clicks into place.\n\n#### Charging Your iPhone and Battery Life Tips\n\n\
    Your iPhone may already have some battery life, but you might want to charge it\
    \ completely, so you can enjoy uninterrupted hours of use after you get it set\
    \ up. This charging time will give you a chance to check out the rest of this\
    \ chapter, install or update the **iTunes** app, or check out all the cool iPhone\
    \ apps available (see [Chapter 23](#Chapter23.html#ch23): “The Amazing App Store”).\n\
    \n##### Charging from a Power Outlet\n\nThe fastest way to charge your iPhone\
    \ is to plug it directly into a wall outlet. You use the same USB connection cable\
    \ you use to connect your iPhone to your computer. As shown here, plug the wide\
    \ end of the cable into the port at the bottom of your iPhone (next to the **Home**\
    \ button) and the end of the USB cable into the wall plug adapter. Finally, plug\
    \ the adapter into any wall outlet.\n\n![images](images/U0102.jpg)\n\nYou can\
    \ tell your iPhone is charging by looking at the screen. You will see a lightning\
    \ bolt or plug icon inside the battery indicator in the upper-right corner.\n\n\
    The **Main Battery** icon will show your charge level. The image to the right\
    \ shows a charging iPhone with an almost full battery.\n\n**TIP:** Some newer\
    \ cars have built-in power outlets (just like in your home) that you can use to\
    \ plug in your iPhone power cord. Some also have a dock option that allows you\
    \ to control the **iPod** app from your car radio headset. These outlets are sometimes\
    \ buried in the middle console behind the front seat.\n\n![images](images/U0103.jpg)\n\
    \n##### Charging from Your Computer\n\nYou can also charge your iPhone when you\
    \ plug it into your computer, albeit a little more slowly than when you connect\
    \ it directly to a wall charger.\n\n**TIP:** Try using different USB ports on\
    \ your computer. Some USB ports share a bus and draw less power, while others\
    \ have their own bus and draw more power.\n\nFor optimal charging, you should\
    \ have your computer plugged into the wall outlet. If your computer is not connected\
    \ to the wall outlet, your iPhone will charge, but at a slower rate. Keep in mind\
    \ that, if your laptop computer goes to sleep or you close the screen, your iPhone\
    \ will stop charging.\n\n**TIP:** You can show the actual percentage of battery\
    \ life remaining. To do this, tap your **Settings** icon ![images](images/U001.jpg)\
    \ **General** ![images](images/U001.jpg) **Usage**. Finally set **Battery Percentage**\
    \ to **ON**.\n\n![images](images/U0104.jpg)\n\n##### Charging from Other Accessories\n\
    \nSome accessories designed to work with your iPhone will also charge it. The\
    \ most common of these are iPhone/iPod music docks. These are speaker systems\
    \ that you plug into your iPhone to listen to music. The only time your iPhone\
    \ will not charge is when you see the following warning message on your screen:\
    \ “Charging is not supported with this accessory.” This occurs on older accessories\
    \ or those not designed specifically for your iPhone.\n\n**TIP: A Case and External\
    \ Battery Combined**\n\nSome cases actually have external batteries built into\
    \ the case. There are several manufacturers available. One provider, mophie ([`www.mophie.com`](http://www.mophie.com)),\
    \ has such cases for the iPhone 4 and iPhone 4S models called a *juice packair*\
    \ and *juice pack plus*.\n\n##### Expected Battery Life\n\nApple says the iPhone\
    \ with its bigger battery and advanced technology should last longer than the\
    \ iPhone 3Gs (see [Table 1–1](#Chapter01.html#tab_1_1)).\n\n![images](images/t0101.jpg)\n\
    \n![images](images/t0101a.jpg)\n\nThese battery life durations are in ideal conditions\
    \ with a new, fully charged battery. You will notice that, over time, your actual\
    \ battery life will diminish.\n\n##### Battery and Charging Tips\n\nThe key question\
    \ is this: how do you get the most out of your battery life and make sure your\
    \ iPhone is charged and ready for you when you need it? In this section, we will\
    \ cover a few tips to help you accomplish this."
  trans: "\n#### 包装盒内包含的物品\n\n如果你初次接触`iPhone`，包装盒里可能看起来内容不多。不过，它确实包含了开始使用和享受你的`iPhone`所需的一切——除了一本详尽的使用手册，而这正是我们撰写本书的原因！以下是包装盒内的物品：\n\
    \n* **`iPhone`**：打开盒子后，最顶层就会看到你的新`iPhone`。\n* **纸质文件夹**：在`iPhone`的塑料托架下方，你会找到一个包含以下物品的纸质文件夹：\n\
    \    * **使用技巧**：一本 4.5 英寸×2.5 英寸的小型折叠手册，共有 19 页，介绍`iPhone`的基本信息。\n    * **`iPhone\
    \ 产品信息指南`**：一本 4.5 英寸×2.5 英寸的小册子，字体太小难以阅读。这本书包含了与你的`iPhone`相关的所有法律条款、条件、警告和免责声明。\n\
    \    * **苹果标志贴纸**：两张漂亮的白色苹果标志贴纸，有时你会看到它们出现在汽车车窗上。尽情享用吧！\n\n在包装盒底部，你会找到如图 1–1 所示的物品：一副耳机、一根`USB`数据线和一个电源插头适配器。\n\
    \n![images](img/0101.jpg)\n\n**图 1–1.** *手机包装盒底部的耳机、USB 数据线和电源插头适配器*\n\n#####\
    \ `iPhone` 耳机\n\n耳机包含两个白色耳塞，用于收听音乐、视频或通话，以及一个附着在右耳塞线上小型控制器。将它插入你`iPhone`左上边缘的孔中。确保完全插入——按下时可能会有点紧。\n\
    \n![images](img/U0101.jpg)\n\n如下图所示，控制器上有**加号**（**`+`**）和**减号**（**`-`**）按键，以及一个**中央**按钮。你可以使用（**`+`**）和（**`-`**）键来调高或调低音量，并使用**中央**按钮来接听或挂断电话。\n\
    \n**注意：** 你可以通过单击两次或三次**中央**按钮来切换歌曲。双击切换至下一曲。三击返回上一曲。\n\n随附的耳机还包含一个用于通话的小型麦克风。\n\
    \n##### `USB` 转底座数据线\n\n`USB`转底座数据线用于将你的`iPhone`连接到电脑；它也可以兼作电源线使用。\n\n##### 电源插头适配器\n\
    \n电源插头适配器的一端是`USB`插口，另一端是插入电源插座的插头。只需将`USB`数据线连接到`iPhone`，再将另一端连接到电源适配器，即可通过墙插为`iPhone`充电。\n\
    \n#### 取出或安装`SIM`卡\n\n为了能够在 AT&T/GSM 网络的`iPhone`（目前除 Verizon 版`iPhone`外的所有`iPhone`）上拨打或接听电话，你需要有一张`SIM`卡（用户身份识别卡）。每部新的\
    \ GSM 版`iPhone`出厂时都应已预装一张`SIM`卡。\n\n**注意：** 与`iPad`和`iPhone 4`一样，`iPhone 4S`使用的是新型\
    \ MicroSIM 标准——而非多数其他手机上常见的 MiniSIM。\n\n在某些情况下，你可能需要取出并更换`SIM`卡。例如，当你在国际旅行时，或者刚收到一部替换的`iPhone`并想使用旧手机中的`SIM`卡时。\n\
    \n请按照以下步骤弹出并取出你`iPhone`的`SIM`卡：\n\n1. 将回形针插入`iPhone`右侧的小孔中。将回形针笔直插入，直到`SIM`卡托盘弹出。\n\
    2. 取出托盘，以便取出或更换`SIM`卡。\n3. 插入`SIM`卡时，确保`SIM`卡的缺口朝向托盘的右上角。它应与托盘齐平放置，金属触点朝向托盘底部。\n\
    4. 将`SIM`卡托盘滑回`iPhone`中，直至其卡入到位。\n\n#### 为`iPhone`充电及电池使用提示\n\n你的`iPhone`可能已有一些电量，但你或许希望将其完全充满，这样在完成设置后就能享受数小时不间断的使用。充电的时间正好让你有机会阅读本章的其余内容、安装或更新`iTunes`应用，或者了解所有酷炫的`iPhone`应用（参见第\
    \ 23 章：“神奇的 App Store”）。\n\n##### 通过电源插座充电\n\n为`iPhone`充电最快的方式是将其直接插入墙上的电源插座。你使用的是连接`iPhone`和电脑的同一根`USB`数据线。如下图所示，将数据线较宽的一端插入`iPhone`底部的端口（靠近**主屏幕**按钮），将`USB`数据线的另一端插入电源插头适配器。最后，将适配器插入任何墙上的电源插座。\n\
    \n![images](img/U0102.jpg)\n\n你可以通过查看屏幕来判断`iPhone`是否正在充电。在屏幕右上角的电池电量指示器中，你会看到一个闪电或插头图标。\n\
    \n**主电池**图标会显示你的充电状态。右侧的图片显示了一部正在充电且电池几乎充满的`iPhone`。\n\n**提示：** 一些新型汽车内置有电源插座（就像你家中一样），可以用来插上`iPhone`的电源线。有些车型还提供了底座选项，让你可以从汽车音响控制器上操作`iPod`应用。这些插座有时隐藏在前排座椅后方的中央扶手箱内。\n\
    \n![images](img/U0103.jpg)\n\n##### 通过电脑充电\n\n你也可以将`iPhone`连接到电脑进行充电，不过速度会比直接连接墙式充电器稍慢一些。\n\
    \n**提示：** 尝试使用电脑上不同的`USB`端口。一些`USB`端口共享总线，消耗的功率较小，而另一些则拥有独立总线，可提供更大的功率。\n\n为了获得最佳充电效果，你的电脑应插入墙上的电源插座。如果电脑未连接电源插座，你的`iPhone`仍然可以充电，但速度会更慢。请记住，如果笔记本电脑进入睡眠状态或你合上屏幕，`iPhone`将会停止充电。\n\
    \n**提示：** 你可以显示剩余电量的具体百分比。操作方法如下：点击`设置`图标![images](img/U001.jpg)`通用`![images](img/U001.jpg)`用量`。最后将`电池百分比`设置为`开`。\n\
    \n![images](img/U0104.jpg)\n\n##### 通过其他配件充电\n\n某些专为`iPhone`设计的配件也可以为其充电。最常见的是\
    \ iPhone/iPod 音乐底座。这些是插入`iPhone`后可以听音乐的扬声器系统。只有当屏幕上出现以下警告信息时，`iPhone`才不会充电：“此配件不支持充电”。这种情况通常出现在较旧的配件或并非专为你的`iPhone`设计的配件上。\n\
    \n**提示：带外置电池的保护壳**\n\n有些保护壳本身就集成了外置电池。市面上有多个制造商提供此类产品。其中一家供应商 mophie（[`www.mophie.com`](http://www.mophie.com)）就为`iPhone\
    \ 4`和`iPhone 4S`型号提供了名为*juice pack air*和*juice pack plus*的保护壳。\n\n##### 预期电池续航时间\n\
    \n苹果公司表示，配备更大容量电池和先进技术的`iPhone`，其续航时间应比`iPhone 3Gs`更长（参见表 1–1）。\n\n![images](img/t0101.jpg)\n\
    \n![images](img/t0101a.jpg)\n\n这些电池续航时间是在理想条件下，使用全新的、完全充满电的电池测得的。你会注意到，随着时间的推移，实际电池续航时间会逐渐缩短。\n\
    \n##### 电池与充电提示\n\n关键问题在于：如何最大限度地利用电池续航时间，并确保你的`iPhone`在你需要时已充满电并准备就绪？在本节中，我们将介绍一些技巧来帮助你实现这一点。\n"
- fmt: "###### Getting More Out of Each Charge\n\nTo extend your battery life, try\
    \ some of the following tips:\n\n- **Lower your screen brightness**: Tap **Settings**\
    \ ![images](images/U001.jpg) **Brightness**, and then use the slider bar to lower\
    \ your brightness to a level less than halfway across that still works for you.\n\
    - **Turn off Location Services**: If you don’t need your actual location to be\
    \ transmitted to your apps, you can turn this off. Tap **Settings** ![images](images/U001.jpg)\
    \ **General** ![images](images/U001.jpg) **Location Services**, and then set **Location\
    \ Services** to **OFF**. If you go into an app that wants your location, you will\
    \ be reminded to turn it back on.\n- **Set a Shorter Auto-Lock**: This feature\
    \ shortens the time your iPhone takes to enter Sleep mode (i.e., turn off the\
    \ screen) when it’s not being used. Shortening this time can help save your battery\
    \ life. To do this, tap **Settings** ![images](images/U001.jpg) **General** ![images](images/U001.jpg)\
    \ **Auto-Lock**, and then set **Auto-Lock** to as short a value as possible—you\
    \ can set it to as short as **1 minute** if you like.\n- **Turn off push email\
    \ and push notifications.**\n- **Turn off Siri's Raise to Speak Feature**. Tap\
    \ **Settings** ![images](images/U001.jpg) **General** ![images](images/U001.jpg)\
    \ **Siri** and set **Raise to Speak** to **OFF**.\n\nYou can learn more battery\
    \ life tips by visiting the Apple web site at [`www.apple.com/batteries/iphone.html`](http://www.apple.com/batteries/iphone.html).\n\
    \n###### Making the Battery Last Longer\n\nThe iPhone uses a rechargeable battery\
    \ that has a limited number of cycles during its useful life; in other words,\
    \ it will gradually lose its ability to maintain a charge over time. You can extend\
    \ the life of your iPhone battery by making sure you run it down completely at\
    \ least once a month. The rechargeable battery will last longer if you do this.\n\
    \n###### Finding More Places to Charge Your Phone\n\nNo matter what you do, you\
    \ will want to find more places and more ways to charge your iPhone if you really\
    \ use it a lot. Besides using your power cord or connecting your iPhone to your\
    \ computer, you can take advantage of the charging tips described in [Table 1–2](#Chapter01.html#tab_1_2).\n\
    \n![images](images/t0102.jpg)\n\n### Setting up Your iPhone\n\nAt this point,\
    \ you know some of the basics about your iPhone and how to get the most out of\
    \ your battery. Now you are ready to start enjoying it! Setting up your iPhone\
    \ is the next step.\n\n#### Knowing If You Need to Set Up Your iPhone\n\nIf you\
    \ see a **Welcome** screen similar to the one shown here, you will need to set\
    \ up your iPhone before you can use it. With iOS 5, you can set up your iPhone\
    \ in a couple of ways. First, you can do so with over-the-air (OTA) using your\
    \ Wi-Fi network and iCloud. Or, you can plug your phone into your PC using the\
    \ USB dock cable and activate it with the iTunes service.\n\nIf this is your first\
    \ iPhone or you want to set it up as a new iPhone, you probably want to use iCloud\
    \ OTA.\n\nIf you are upgrading from an iPhone 4 or previous iPhone model, you\
    \ probably want to restore from a backup using the iTunes service.\n\n![images](images/U0105.jpg)\n\
    \n### Setting up Your iPhone Over-the-Air Using iCloud\n\nWith iOS 5, Apple has\
    \ finally cut the iTunes cord. This means you no longer need to connect your iPhone\
    \ to your PC to activate it or set it up. Instead, you can activate it directly\
    \ from your iPhone OTA using Apple’s new `iCloud` service.\n\n**NOTE:** During\
    \ the initial set up process, you will be able to connect to any available Wi-Fi\
    \ network which will be needed to set up your iPhone OTA using iCloud. If your\
    \ home, work, or school Wi-Fi network isn’t available, and you don’t have a public\
    \ access point like Starbucks handy, then you will need to activate your iPhone\
    \ later. (You could choose to set up your iPhone via iTunes on your PC instead;\
    \ however, you will still need Internet access to connect to Apple’s activation\
    \ servers.)\n\nFollow these steps to set up your iPhone with iCloud, as shown\
    \ in the **Welcome** screen pictured earlier:\n\n1. Swipe to set up by touching\
    \ the **Arrow** button and pulling it across the screen in the direction indicated.\n\
    2. Choose the language you want to use with your iPhone. Apple will present you\
    \ with the most common options based on where you bought your iPhone; however,\
    \ you can also tap the **Down Arrow** for more language choices.\n3. When you’ve\
    \ chosen your preferred language, tap the blue **Next** button at the top right\
    \ of the screen.\n\n   ![images](images/U0106.jpg)\n\n4. Choose your Country or\
    \ Region. Again, Apple will provide you with a default choice based on where you\
    \ bought your iPhone; however, you can tap **Show More...** to expand the list.\
    \ Tap the blue **Next** button to continue.\n5. Decide if you would like to enable\
    \ or disable Location Services, and then tap the blue **Next** button to continue.\n\
    \n   **NOTE:** `Location Services` use GPS, cell-tower triangulation, and Wi-Fi\
    \ router mapping to determine the approximate location of your iPhone. This feature\
    \ is used for turn-by-turn navigation (like TomTom), check-in games (like Foursquare),\
    \ social networks (like Facebook), geo-tagging (in the **Camera** app), and utilities\
    \ (like Find my iPhone). Unless you have a particular need to globally disable\
    \ all location services, you probably want to turn on the Location Services feature\
    \ right now. You can selectively disable or enable these services later in the\
    \ **Settings** app (e.g., turn off your **Camera** app’s geo-tagging, but leave\
    \ on TomTom’s turn-by-turn navigation).\n\n6. Choose your Wi-Fi network, enter\
    \ your network password, and then tap the blue **Next** button to continue.\n\
    7. Your iPhone will now connect to Apple for activation. This can take a few seconds\
    \ or up to a few minutes, depending on how fast your connection is and how busy\
    \ Apple’s servers are.\n8. Once activation is complete, you’ll be given the option\
    \ to set up your phone as a new iPhone, restore it from an iCloud backup, or restore\
    \ it from iTunes."
