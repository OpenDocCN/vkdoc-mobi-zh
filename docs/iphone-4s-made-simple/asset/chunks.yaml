    \ SIM 卡\n\n**注意：** 此步骤仅在您访问国家的运营商支持 iPhone，且您的 iPhone 已解锁的情况下有效。目前，美国运营商 AT&T\
    \ 不解锁 iPhone 设备。您的备用方案，特别是当您需要拨打大量本地电话时，是租用或购买一部便宜的预付费手机，并将您的 iPhone 仅用于 Wi-Fi\
    \ 连接。\n\n如果您确定可以使用国际 SIM 卡，那么您应该在抵达后购买并插入它。我们在第 1 章中向您展示了如何取出 SIM 卡托。您需要使用 Apple\
    \ 的 SIM 卡弹出工具或回形针来取出此卡。\n\n**警告：** iPhone 使用的是 MicroSIM，而许多其他手机使用的是 MiniSIM。这意味着您很可能需要找到一个也在其网络上提供\
    \ iPhone 的国际运营商。\n\n#### 第 3 步：抵达后重置您的数据用量\n\n您一落地，就应该在 iPhone 上重置您的数据用量。这将使您能够密切跟踪您在海外使用的无线数据量。例如，如果您购买了\
    \ 20 MB 的套餐，您需要确保不会超出该用量。在车上使用`地图`约 1 分钟的简短测试就产生了近 1 MB 的数据用量。因此，请务必小心，并尽量在漫游时避免使用诸如`地图`之类极其消耗数据的应用程序。\n\
    \n我们在本章前面的“选择和监控您的蜂窝数据用量”部分中，已经详细解释了如何重置您的用量。\n\n**提示：** 重置用量后，您需要时常返回此屏幕查看当前用量。您必须将`已发送`和`已接收`的值相加，才能得到总用量。如果您的数据总用量为\
    \ 417 MB——在没有国际数据套餐的情况下，按 $20/MB 的费率计算，这需要花费 $8,340！\n\n![图片](img/U0421.jpg)\n\
    \n#### 第 4 步：如果费用过高，请关闭数据漫游\n\n如果您无法找到国际 SIM 卡——或者无法从您的本地电话公司查询到数据漫游的费用——那么您可能希望完全关闭数据漫游。\n\
    \n这不会阻止您使用 Wi-Fi；但是，它可以确保您在旅途中不会因查收电子邮件或意外启动消耗数据的应用程序而收到令人不悦的账单。\n\n**注意：数据漫游**通常默认为`关闭`状态，但在您出发前仔细检查一下总是明智的——以防万一。\n\
    \n请按照以下步骤将`数据漫游`设置为`关闭`：\n\n1.  轻点`设置`图标。\n2.  轻点`通用`。\n3.  轻点`网络`。\n4.  将`数据漫游`旁边的开关设置为`关闭`。\n\
    \n![图片](img/U0422.jpg)\n\n将`数据漫游`的值设置为`关闭`有助于避免任何潜在的高额数据漫游费用。（您仍然需要担心语音漫游费用，但至少可以通过控制通话时长来管理这部分费用。）\n\
    \n将`蜂窝数据`设置为`开启`，同时将`数据漫游`设置为`关闭`的好处在于，您可以在离开本国之前和返回本国之后立即享受所有数据服务，而无需进行任何其他更改。当然，您也可以随时使用\
    \ Wi-Fi 网络连接。\n\n#### 第 5 步：尽可能使用 Wi-Fi\n\n节省蜂窝数据套餐费用的一种好方法是尽可能使用本地 Wi-Fi 网络，尤其是在您准备浏览网页或下载大量电子邮件或大型应用程序时。\n\
    \n**提示：** 您可能可以在网吧、普通咖啡店、公共图书馆、一些酒店大堂以及 Apple 零售店找到免费 Wi-Fi 网络。\n\n### 国际旅行：返回家中\n\
    \n就像您在抵达旅行目的地时所做的那样，一旦您返回家中，需要对 iPhone 的设置进行一些更改，设备才能正常工作。\n\n#### 第 1 步：确保时区正确\n\
    \n当您返回本国时，需要确认您的 iPhone 显示的是正确的当地时间。通常，您的 iPhone 会在您返回家中时自动更新时间。但是，如果没有自动更新，您可以手动调整时区（请参阅第\
    \ 1 章：“开始使用”中的“设置日期和时间”部分）。\n\n#### 第 2 步：关闭您的特殊国际费率套餐\n\n最后一步是可选的。如果您已与 iPhone\
    \ 无线运营商激活了某种特殊的国际漫游费率套餐，并且不再需要它，那么请联系运营商将其关闭以节省费用。\n\n使用我们在您旅行前、旅行中和旅行后描述的所有步骤，应该能帮助您在出国旅行时成功且经济地使用您的\
    \ iPhone。\n\n### 个人热点\n\n您的 iPhone 上有一个不错的功能，就是可以用它来将您的笔记本电脑（PC 或 Mac）连接到互联网。此功能称为`个人热点`，当您恰好在远离\
    \ Wi-Fi 网络，但您的 iPhone 仍在无线蜂窝数据覆盖范围内时，它会非常有用。这极大地扩展了您可以用笔记本电脑连接互联网的地点。\n\n####\
    \ 个人热点 vs. 网络共享\n\n通过您的 iPhone 数据套餐将笔记本电脑或其他设备连接到互联网，过去称为`网络共享`，并且它只能通过蓝牙或插入 USB\
    \ Dock 连接线来工作。\n\n`个人热点`与网络共享类似；但它不是使用蓝牙或 USB，而是将您的 iPhone 变成一个便携式小型 Wi-Fi 路由器，可以将多个设备连接到互联网。例如，您可以连接您的笔记本电脑、朋友的笔记本电脑和您的\
    \ iPad。（可以通过`个人热点`连接的设备确切数量取决于您的运营商，但通常是四到五个。）\n\n**提示：** 如果出于某种原因您不想使用`个人热点`功能，传统的通过蓝牙和\
    \ USB Dock 连接线的网络共享方式仍然可用。\n\n#### 第 1 步：联系您的电话公司\n\n互联网网络共享可能需要从您的电话公司购买并激活一个单独的套餐。请致电您的电话公司或在其网站上检查，以开启`移动热点`或`网络共享`套餐。\n\
    \n**提示：** 当您不再需要`个人热点`或`网络共享`套餐时，将其关闭可以节省一些费用。请向您的电话公司咨询，在日后关闭`网络共享`套餐是否会有任何罚金或隐藏费用。\n\
    \n#### 第 2 步：在 iPhone 上启用个人热点\n\n在您从电话公司购买或激活了`个人热点`或`移动热点`套餐后，您就可以在 iPhone 上进行设置了：\n\
    \n1.  轻点`设置`图标。\n2.  轻点`通用`。\n3.  轻点`网络`。\n4.  向下滚动并轻点`设置个人热点`。（如果您已设置过，或者已为您设置好，那么您将看到`个人热点`。）\n\
    \n   ![图片](img/U0423.jpg)\n\n5.  如果您尚未设置套餐——或者您购买的套餐尚未在 iPhone 上激活——您将看到一个类似于此的弹出消息。如果您确实购买了套餐，那么您可能需要稍等片刻等待套餐激活。\n\
    \n   ![图片](img/U0424.jpg)\n\n6.  如果您的套餐已激活，您应该会在主`设置`屏幕上看到`个人热点`选项。轻点它。\n\n  \
    \ ![图片](img/U0425.jpg)\n\n7.  轻点`个人热点`旁边的开关，将其设置为`开启`。\n\n   ![图片](img/U0426.jpg)\n\
    \n8.  您的 iPhone 会自动为您生成一个`Wi-Fi 密码`。如果您对该密码满意，请跳到下一节。\n\n   ![图片](img/U0427.jpg)\n\
    \n9.  如果您想更改密码，请轻点`Wi-Fi 密码`。\n10. 输入您的新`密码`。确保其至少包含八个字符。最好使用数字、大小写字母和标点符号的组合。\n"
- fmt: "### Step 3: Connect to Your iPhone Personal Hotspot\n\nYour iPhone is now\
    \ a small, mobile Wi-Fi router; and you can connect your Mac or Windows PC, your\
    \ iPad, or any other Wi-Fi enabled device to your iPhone exactly as you connect\
    \ to your home, business, or school Wi-Fi network. Follow these steps to do so:\n\
    \n1. Check for available Wi-Fi networks on your device.\n2. Click the name of\
    \ your iPhone.\n3. Enter the Wi-Fi Password.\n\nIf everything works properly,\
    \ you’ll see a blue bar appear on the top of your iPhone, along with the number\
    \ of devices connected.\n\n![images](images/U0428.jpg)\n\n### Step 4: Set Up Networking\
    \ on Your Computer\n\nAfter you have connected your iPhone to your computer, your\
    \ Windows or Mac computer should recognize your iPhone as a new Internet connection\
    \ and help you set it up automatically. If your computer does not recognize the\
    \ iPhone immediately, then go into your **Network** settings on your computer\
    \ and look for the iPhone as an available connection type.\n\n## VPN: Virtual\
    \ Private Network\n\nYour organization may have what is called a VPN, or *Virtual\
    \ Private Network*. A VPN allows you to securely connect your iPhone, laptop,\
    \ or other device to the corporate network.\n\n### Getting Connected\n\nIn order\
    \ to get connected, you need to determine the type of VPN and specific login instructions\
    \ from your organization’s help desk or network administrator. Then, you will\
    \ type these login details into the **VPN** area in the **Settings** app on your\
    \ iPhone.\n\n**TIP**: You can probably save yourself a call to the help desk and\
    \ skip Step 1 if you have already set up your computer to connect to the VPN.\
    \ This is because your iPhone will most likely use the same VPN login credentials\
    \ as your computer.\n\nAlso, some carriers may require a business account in order\
    \ to use a VPN over their 3G network. If all your settings look correct and the\
    \ VPN is still not working, check with your carrier.\n\n#### Step 1: Contact Your\
    \ Organization’s Help Desk\n\nYou need to ask your help desk or VPN administrator\
    \ for the details about how to log into the VPN. Your iPhone can currently connect\
    \ with the following types of VPNs: **L2TP**, **PPTP**, and **IPSec** (Cisco).\
    \ You also need to know if your VPN uses a **Proxy** and whether the configuration\
    \ is manual or automatic.\n\n#### Step 2: Set Up the VPN Connection on Your iPhone\n\
    \nArmed with the login instructions and type of VPN connection, you are ready\
    \ to connect with your iPhone:\n\n1. Tap the **Settings** icon.\n2. Tap **General**.\n\
    3. Tap **Network**.\n4. Scroll down to the bottom of the screen and tap **VPN**.\n\
    \n   ![images](images/U0429.jpg)\n\n5. On the **VPN** screen, tap the switch next\
    \ to the **VPN** option to set it to **ON**. You should then be taken to the **Add\
    \ Configuration** screen. If not, then tap **Add VPN Configuration** at the bottom\
    \ to set up a new VPN connection.\n\n   ![images](images/U0430.jpg)\n\n6. The\
    \ **Add Configuration** screen is where you set up your VPN login details, using\
    \ the information from your help desk or VPN administrator.\n7. If your VPN is\
    \ an **L2TP** type, then you would use the screen shown here. Scroll to the bottom\
    \ and enter the **Proxy** information as required.\n\n   ![images](images/U0431.jpg)\n\
    \n8. If your VPN is a **PPTP** type, then you would tap **PPTP** at the top and\
    \ use the screen shown here. Scroll to the bottom and enter the **Proxy** information\
    \ as required.\n\n   ![images](images/U0432.jpg)\n\n9. If your VPN is an **IPSec**\
    \ (Cisco) type, then you would tap **IPSec** and use the screen shown here. Scroll\
    \ to the bottom and enter the **Proxy** information as required.\n10. When you\
    \ are done with your setup, tap the **Save** button in the upper-right corner.\n\
    11. If you have trouble logging in, make sure you are in a strong wireless coverage\
    \ area and verify you have typed all your login credentials correctly. It can\
    \ be difficult when passwords disappear as you type them. You may want to try\
    \ re-typing passwords and server information before calling the help desk.\n\n\
    ![images](images/U0433.jpg)\n\n### Knowing When You Are Connected to a VPN Network\n\
    \nYou will see a small **VPN** icon ![images](images/U0434.jpg) just to the right\
    \ of your network connection status display. You will know that you are securely\
    \ connected to the VPN network *only* when you see this icon.\n\n### Switching\
    \ VPN Networks\n\nYou may have several VPN networks to which you need to connect.\
    \ You can select between different VPN configurations on your iPhone by following\
    \ these steps:\n\n1. Tap the **Settings** icon.\n2. Tap **General**.\n3. Tap **Network**.\n\
    4. Scroll down to the bottom of the screen and tap **VPN**.\n5. On the VPN screen,\
    \ tap a different **VPN configuration** to connect to it. Don’t tap the blue **Circle**\
    \ icon with the `>` symbol, unless you want to change the login settings for that\
    \ network.\n\n## Chapter 5\n\n## AirPlay and Bluetooth\n\nIn this chapter, we\
    \ will show you how to connect your iPhone with any AirPlay– or Bluetooth–compatible\
    \ device, whether it’s an Apple TV, stereo speakers, or a wireless headset.\n\n\
    ### Understanding AirPlay\n\n*AirPlay* is Apple’s proprietary video and audio\
    \ streaming protocol. AirPlay works over your local home, school, or office Wi-Fi\
    \ network. Before you can use AirPlay with the iPhone, you have to make sure all\
    \ your devices are connected to the same Wi-Fi network.\n\n![images](images/U0501.jpg)\n\
    \n#### AirPlay Devices That Work with the iPhone\n\nAt the time of writing, only\
    \ the 2010 model Apple TV supports AirPlay video streaming. With it, you can stream\
    \ content right from your iPhone to your big screen TV to share with business\
    \ colleagues, friends, and family alike.\n\nApple’s AirPort Express Wi-Fi router\
    \ has an audio out jack that can be connected to speakers for AirPlay audio. Various\
    \ third-party accessory makers are also introducing AirPlay–compatible speakers.\
    \ With AirPlay, you can remotely control the playback and volume right from your\
    \ iPhone.\n\n### Setting Up and Using AirPlay\n\nAirPlay is built right into the\
    \ iPhone. As long as all your devices are connected to the same Wi-Fi network,\
    \ no additional setup is needed.\n\nSeveral of the built-in iPhone apps support\
    \ AirPlay, including **Videos**, **Music**, and **YouTube**. Several App Store\
    \ apps that use Apple’s default media player (e.g., **Air Video**) also support\
    \ AirPlay. Follow these steps to use AirPlay from an app that supports the feature:\n\
    \n1. Tap the blue **AirPlay** icon at the lower-right corner of the screen.\n\
    2. Choose from the list of available devices for streaming your music.\n3. To\
    \ switch the video or music back to your iPhone, just tap the **AirPlay** icon\
    \ again and choose **iPhone** from the list.\n\n![images](images/U0502.jpg)\n\n\
    ![images](images/U0503.jpg)\n\n**NOTE**: The **AirPlay** icon will bring up a\
    \ list of both Bluetooth and Wi-Fi connected devices. See the next section for\
    \ more on Bluetooth.\n\nYou can select **Apple TV** by tapping it. Now your music\
    \ or video will now start to play from the selected AirPlay device. You can verify\
    \ this by touching the **AirPlay** icon on the screen once more. You should see\
    \ a **Checkmark** icon next to the new AirPlay Stereo Bluetooth device, and you\
    \ should hear your music coming from that sound source, as well.\n\n**TIP**: To\
    \ save battery life on your iPhone, turn off the screen by pressing the **Sleep**\
    \ button while streaming AirPlay content to another device. Your music or video\
    \ will continue to play, but you won’t be wasting battery life by keeping your\
    \ screen lit."
