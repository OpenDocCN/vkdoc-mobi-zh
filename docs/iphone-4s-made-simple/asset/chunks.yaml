    # 音乐应用


    大部分音乐通过**音乐**应用来管理——其图标位于**主屏幕**上，通常在最底部的图标栏中，它是右边最后一个图标。


    ![images](img/U1201.jpg)


    **注意：** 对于所有熟悉 iOS 5 之前 iPhone 的读者来说，是的，音乐播放应用曾被称为 **iPod** 应用。现在它被简称为**音乐**应用。


    轻点 `Music` 图标，如图 12–1 所示，你会看到底部有五个软按键：


    *   **播放列表** 可让你查看从电脑同步的播放列表，以及在 iPhone 上创建的播放列表。

    *   **艺人** 可让你查看按字母顺序排列的艺人列表（像通讯录一样可以搜索）。

    *   **歌曲** 可让你查看按字母顺序排列的歌曲列表（同样可以搜索）。

    *   **专辑** 可让你按专辑标题浏览音乐。

    *   **更多** 可让你查看有声书、选集、作曲家、流派、iTunes U 和播客。


    ![images](img/1201.jpg)


    **图 12–1.** *底部带有软按键的音乐应用*


    ## 编辑软按键


    iPhone 上一个非常酷的功能是，你可以编辑**音乐**应用底部的软按键，真正地对其自定义以满足你的需求和品味。要执行此操作，首先轻点**更多**按钮。


    然后轻点屏幕左上角的**编辑**按钮。


    ![images](img/U1202.jpg)


    屏幕会切换，显示可以拖拽到底部栏的各种图标。


    ![images](img/1202.jpg)


    **图 12–2.** *更改**音乐应用**中的软按键。*


    假设你想用**有声书**图标替换**专辑**图标。只需长按**有声书**图标，并将其拖拽到底部栏中**专辑**图标的位置。到达后，松开图标，**有声书**图标就会取代原来**专辑**图标的位置。你可以在此**配置**屏幕上对任意图标进行此操作。完成后，轻点屏幕右上角的**完成**按钮。


    **提示：** 你也可以通过沿软按键行来回拖放图标来重新排列底部图标的顺序。


    ## 播放列表视图


    **注意：** 播放列表是你创建的一个歌曲列表，可以包含任何你感兴趣的流派、艺人、录制年份或歌曲合集。


    ![images](img/U1203.jpg)


    许多人会将特定流派的音乐归类在一起，比如古典或摇滚。其他人可能会创建快节奏音乐的播放列表，并称之为锻炼或跑步音乐。你可以利用播放列表以几乎任何你想要的方式来组织你的音乐。


    你可以在电脑上的 iTunes 中创建播放列表，然后同步到你的 iPhone（请参阅 iTunes 指南），或者直接在你的 iPhone 上创建播放列表，我们将在下一节中描述。


    一旦你将播放列表同步到 iPhone 或在其上创建了播放列表，它就会显示在**音乐**屏幕左侧的**资料库**下。


    如果左侧列出了多个播放列表，只需轻点你想要收听的那个名称。


    **注意：** 你可以在 iPhone 上编辑某些播放列表的内容。但是，你无法在 iPhone 本身上编辑 Genius 播放列表。


    ## 在 iPhone 上创建播放列表


    iPhone 允许你创建独特的播放列表，这些列表可以与你的电脑编辑和同步。假设你想向 iPhone 播放列表中添加一些新的音乐选择。只需按照我们下面展示的方式创建播放列表并添加歌曲。你可以随时更改播放列表，移除旧歌曲并添加新歌曲——再简单不过了！


    要在 iPhone 上创建新播放列表，轻点 **Genius 播放列表** 下方的**添加播放列表**标签。


    ![images](img/U1204.jpg)


    为你的播放列表起一个独特的名称（我们将其命名为“骑行音乐”），然后轻点**存储**。


    ![images](img/U1205.jpg)


    现在你会看到**歌曲**屏幕。轻点你想添加到新播放列表中的任何歌曲名称。


    当歌曲变灰时，表明它已被选中，将被添加到播放列表中。


    **注意：** 不要因为试图移除或取消选择你误点的歌曲而感到挫败。你无法在此屏幕上移除或取消选择歌曲；你必须点击**完成**，然后在下一个屏幕上移除它们，正如我们所描述的那样。


    选择右上角的**完成**，播放列表的内容将会显示出来。


    ## 搜索音乐


    来自**音乐**应用的几乎所有视图（**播放列表**、**艺人**、**歌曲**等）在屏幕顶部都有一个搜索窗口。


    ![images](img/U1206.jpg)


    如果你看不到搜索窗口，轻点顶部的（时间）即可立即使其可见。


    在搜索窗口中轻点一次，然后输入艺人、专辑、播放列表或歌曲名称的几个字母，即可立即看到所有匹配项目的列表。这是在 iPhone 上快速找到想要收听或观看的内容的最佳方式。


    # 在音乐应用中更改视图


    **音乐**应用在显示和分类音乐的方式上非常灵活。有时，你可能希望按艺人查看列出的歌曲。其他时候，你可能更想查看特定的专辑或歌曲。iPhone 允许你轻松更改视图，以帮助管理和播放你在特定时刻想要的音乐。


    在你的**音乐**应用中，你可以使用以下视图：


    *   **艺人视图** - 显示所有按艺人排列的音乐列表。

    *   **歌曲视图** - 显示所有按每首歌曲名称排列的音乐。

    *   **专辑视图** - 显示所有按专辑名称排列的音乐。

    *   **流派视图** - 显示所有按类型或流派排列的音乐。

    *   **作曲家视图** - 显示按作曲家姓名排列的音乐。

    *   **有声书** - 显示你所有的有声书。

    *   **选集** - 显示所有选集。

    *   **iTunes U** - 显示所有 iTunes U 内容。

    *   **播客** - 显示你所有的播客。


    # 查看专辑中的歌曲


    当你在**专辑**视图中时，只需轻点一张专辑封面或名称，屏幕会滑动，显示该专辑中的歌曲（参见图 12–3）。


    **提示：** 当你开始播放一张专辑时，专辑封面可能会放大以填满屏幕。轻点屏幕一次可调出（或隐藏）顶部和底部的控制项。你可以使用这些控制项来管理歌曲和屏幕，如下所述。


    要查看正在播放的专辑中的歌曲，请轻点**列表**按钮，专辑封面会翻转，显示该专辑中的所有歌曲。正在播放的歌曲旁边会有一个蓝色小箭头。


    ![images](img/U1207.jpg)


    ![images](img/1203.jpg)


    **图 12–3.** *轻点**列表**按钮查看特定专辑中的歌曲。*


    轻点歌曲列表上方的标题栏可返回专辑封面视图。


    ## 使用 Cover Flow 导航


    Cover Flow 是一种专有的、非常酷的通过专辑封面浏览音乐的方式。如果你在**音乐**应用中播放一首歌曲，然后将 iPhone 横向旋转至横屏模式，你的
    iPhone 会自动切换到 **Cover Flow**。


    ![images](img/U1208.jpg)


    ### 在 Cover Flow 中查看歌曲


    只需轻点一张专辑封面，封面就会翻转，显示该专辑中的所有歌曲。


    要查看当前正在播放的歌曲（在 Cover Flow 视图中），轻点专辑封面，它会翻转过来，显示该专辑中的歌曲（图 12–4）。当前正在播放的歌曲旁边会有一个蓝色小箭头。


    ![images](img/1204.jpg)


    **图 12–4.** *你可以使用 **Cover Flow** 查看专辑的内容。*


    轻点（歌曲列表上方的）标题栏，专辑封面将再次显示。然后，你可以继续滑动浏览你的音乐，直到找到你正在寻找的内容。


    **注意：** 你也可以轻点右下角的小“i”图标，专辑封面会翻转，显示歌曲，效果和你轻点封面一样。

    '
- fmt: '### Playing Your Music


    Now that you know how to find your music, it''s time to play it! Find a song or
    browse to a playlist using any of the methods mentioned above. Simply tap the
    song name and it will begin to play.


    This screen shows a picture of the album that the song I chose comes from, with
    the name of the song at the top.


    ![images](images/U1209.jpg)


    Along the bottom of the screen you''ll find the `Volume` slider bar, and the `Previous
    Song`, `Play/Pause`, and `Next Song` buttons.


    To see other songs on the album, just double-tap the album cover and the screen
    will flip, showing all of the other songs.


    You can also touch the `List` button in the upper right corner to view a list
    of songs on the albym.


    #### Pausing and Playing


    Tap the pause symbol (if your song is playing) or the play arrow (if the music
    is paused) to stop or resume your song.


    #### To Play the Previous or Next Song


    If you are in a playlist, touching the `Next Song` arrow (to the right of the
    `Play/Pause` button) advances you to the next song in the list. If you are searching
    through your music by album, touching `Next` moves you to the next song on the
    album. Touching the `Previous Song` button does the reverse.


    **NOTE:** if you''re at the beginning of a song, `Previous` takes you to the precedingsong.
    If the song is already playing, `Previous` goes to the beginning of the current
    song (and a second tap would take you to the previous song).


    #### Adjusting the Volume


    There are two ways to adjust the volume on your iPhone: using the external `Volume`
    buttons or using the `Volume Slider` control on the screen.


    ![images](images/U1210.jpg)


    The external `Volume` buttons are on the upper left side of the device. Press
    the `Volume Up` key (the top button) or the `Volume Down` key to raise or lower
    the volume. You''ll see the `VolumeSlider` control move as you adjust the volume.
    You can also just touch and hold the `VolumeSlider` key to adjust the volume.


    **TIP:** To quickly mute the sound, press and hold the `Volume Down` key and the
    volume eventually reduces to


    #### Double-Click the Home Button for Media Controls


    You can play your music while you are doing other things on your iPhone, like
    reading and responding to e-mail, browsing the Web, or playing a game. With the
    iPhone''s new multitasking function, a quick double-tap to the `Home` button on
    the bottom, followed by a swipe to the right, will bring up the “now playing”
    media controls in the multitasking window. The controls allow you to skip to the
    previous song, pause or play the current song, skip to the next song, or go directly
    to the app playing the song.


    **NOTE:** The widgets show whatever app last played audio or video, so if `Pandora`
    was last, you''ll see that instead of `Music`, and the widgets will control `Pandora`
    instead, same with `Videos`, `YouTube`, etc.


    ![images](images/U1211.jpg)


    **TIP**: If you hold down the `PreviousSong` control, the song will rewind; if
    you hold down the `NextSong` control, it will fast forward.


    #### Repeating, Shuffling, Moving around in a Song


    In play mode, you can activate additional controls by tapping the screen anywhere
    on the album cover. You''ll then see an additional slider (the scrubber bar) at
    the top, along with the symbols for `Repeat`, `shuffle`, and `Genius`.


    ![images](images/U1212.jpg)


    #### Moving to Another Part of a Song


    Slide the scrubber bar to the right and you''ll see the elapsed time of the song
    (displayed to the far right) change accordingly. If you are looking for a specific
    section of the song, drag the slider, then let go and listen to see if you''re
    in the right place.


    ![images](images/U1213.jpg)


    #### Repeat One Song or All Songs


    To repeat the song you''re listening to, touch the `Repeat` symbol at the left
    of the top controls twice until you see it turn blue and display a 1.


    ![images](images/U1214.jpg)


    To repeat all songs in the playlist, song list, or album, touch the `Repeat` icon
    until it turns blue (and does not display a 1).


    ![images](images/U1215.jpg)


    To turn off the `Repeat` feature, press the icon until it turns white again.


    ![images](images/U1216.jpg)


    #### Shuffle


    If you are listening to a playlist or album or any other category or list of music,
    you might decide you don''t want to listen to the songs in order. You can touch
    the `shuffle` symbol so the music will play in random order. You know `shuffle`
    is turned on when the icon is blue, and off when it is white.


    ![images](images/U1217.jpg)


    ##### Shake to Shuffle


    The `shake to Shuffle` feature was introduced in the last iPhone. So, to turn
    on `shuffle` mode, all you have to do to change songs is simply give your iPhone
    a shake, then shake it again. Every time you shake your iPhone, you''ll skip to
    the next randomly selected song in the list.


    ![images](images/U1218.jpg)


    ![images](images/U1219.jpg)


    **TIP**: If you plan on dancing while holding your iPhone, turn off `shake to
    Shuffle`!


    You can turn on `shake to Shuffle` in your `settings` menu.


    1.  Tap the `settings` icon.

    2.  Scroll down and touch the `Music` icon.

    3.  Move the `shake to Shuffle` switch to `ON` or `OFF`.


    #### Now Playing


    Sometimes you''re having so much fun exploring your options for playlists or albums
    that you get deeply buried in a menu—then find yourself just wanting to get back
    to the song you''re listening to. Fortunately, this is always very easy to do—you
    can just touch the `Now Playing` icon at the top right of most of the music screens.


    ![images](images/U1220.jpg)


    #### Viewing Other Songs on the Album


    You may decide you want to listen to another song from the same album rather than
    going to the next song in the playlist or genre list.


    In the upper-right corner of the `Now Playing` screen, you''ll see a small button
    with three lines on it.


    ![images](images/U1222.jpg)


    Tap that button and the view switches to a small image of the album cover. The
    screen now displays all the songs on that album.


    ![images](images/U1223.jpg)


    Touch another song on the list and that song will begin to play.


    **NOTE:** if you were in the middle of a playlist or a `GeniusPlaylist` and you
    jump to another song from an album, you won''t be taken back to that playlist.
    To return to that playlist, you''ll need to either go back to your playlist library
    or tap `Genius` to make a new `GeniusPlaylist`.


    #### Adjusting Music Settings


    There are several settings you can adjust to tweak music-playing on your iPhone.
    You''ll find these in the `settings` menu. Just tap the `settings` icon on your
    `Homes` creen.


    ![images](images/U1224.jpg)


    In the middle of the `settings` screen, touch the `Music` tab to go to the settings
    screen for `Music`. You''ll find six settings you can adjust on this screen: `shake
    to Shuffle`, `sound Check`, `EQ`, `VolumeLimit`, `Lyrics & Podcast Info` and `Groupe
    By Album Artist`.


    You''ll also find the login area for `Home Sharing`, which lets you stream music
    from iTunes on your Windows or Mac PC.


    #### Using Sound Check (Auto Volume Adjust)


    Because songs are recorded at different volumes, sometimes during playback a particular
    song may sound quite loud compared to another. `sound Check` can eliminate this.
    If `sound Check` is set to `ON`, all your songs will play at roughly the same
    volume.


    ![images](images/U1225.jpg)'
