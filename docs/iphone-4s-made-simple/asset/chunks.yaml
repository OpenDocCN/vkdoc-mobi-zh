  trans: "\n#### 在 SIM 卡上设置安全性\n\n作为额外的安全措施，你可以启用 PIN 码来访问存储在 SIM 卡上的信息。如果你的 iPhone\
    \ 不慎丢失或被盗，这将防止他人访问你 SIM 卡上存储的姓名和号码。\n\n**警告：** 设置此 SIM 卡 PIN 码可能会锁定你的手机，使其无法使用，直到你输入\
    \ PUK（*个人解锁密钥*）。你可以从你的无线运营商处获取这个八位数的 PUK 码。对于 AT&T，请登录 AT&T 网站，点击页面顶部的 **我的服务**，然后点击中间的\
    \ **我的手机/设备**。接下来，选择你的 iPhone 并点击 `解锁 SIM 卡` 链接。如果你不是 AT&T 用户，请查看你运营商的网站或致电其客服帮助台。\n\
    \n![图片](img/U0953.jpg)\n\n请按照以下步骤操作：\n\n1.  如前所述，进入**电话**设置菜单。\n2.  向下滚动并轻点 **SIM\
    \ 卡 PIN 码**。\n3.  这将带你进入 **SIM 卡 PIN 码** 屏幕。如果你在此处尝试将 **SIM 卡 PIN 码** 选项设置为**开启**，并看到类似右侧的错误信息，则表明你的\
    \ iPhone 已被锁定。你只能通过输入 PUK 码来解锁它。有关更多详细信息，请参阅前面的警告。\n\n    ![图片](img/U0954.jpg)\n\
    \n4.  如果你将 **SIM 卡 PIN 码** 旁边的开关设置为**开启**后没有看到错误信息，那么你可以轻点**更改 PIN 码**来输入你的新 PIN\
    \ 码。\n\n**注意：** Verizon 的 CDMA 网络不使用 SIM 卡，因此 Verizon 版 iPhone 不提供 SIM 卡 PIN 码锁定功能。\n\
    \n#### 供听障人士使用的 TTY\n\nTTY 代表*文本电话设备*。此类设备允许听障人士通过电话线发送打字的文本信息。你的 iPhone 可以与另一台配备了\
    \ TTY 设备的电话进行通信——只需将 **TTY** 开关设置为**开启**即可。\n\n#### 切换无线运营商\n\n在某些国家，尤其是在无锁版 iPhone\
    \ 更受欢迎的地区，你可能会在**设置**中看到一个**运营商**标签\n\n![图片](img/U0955.jpg)\n\n轻点**运营商**即可看到可以为你的\
    \ iPhone 切换运营商的屏幕。\n\n将其设置为**自动**，让 iPhone 为你选择最佳网络。\n\n如果你想让 iPhone 强制连接到特定网络，例如\
    \ **ROGERS**，请轻点该网络名称\n\n![图片](img/U0956.jpg)\n\n#### 运营商服务\n\n按下**运营商服务**按钮将列出你的无线运营商或电话公司的名称。\n\
    \n例如，如果你在美国的运营商是 AT&T，请轻点**电话**设置屏幕底部的 **AT&T 服务**，即可查看与 AT&T 相关的特殊号码。如果你使用其他运营商，此屏幕将显示你的运营商的特殊接入号码。\n\
    \n![图片](img/U0957.jpg)\n\n**注意：** 并非所有运营商都支持此功能；如果你没有看到这些选项，请访问运营商的网站了解账户详情。\n\
    \n轻点此屏幕上的任意条目即可执行相应的请求。例如，如果你轻点**查看我的剩余分钟数**，你将收到一条短信回复，显示当前计费周期内剩余的分钟数详情。\n\n\
    轻点**查看**按钮可以查看更多详情。\n\n![图片](img/U0958.jpg)\n\n### 铃声、声音与振动\n\n你的 iPhone 可以使用独特的声音或振动来提醒你有来电、新语音邮件以及其他事件。这些设置可以通过**设置**应用轻松调整。\n\
    \n第 8 章：“个性化与安全”中的“在 iPhone 上调整声音”部分向你展示了如何更改铃声、为**静音**和**响铃**模式添加振动，以及开启或关闭语音邮件提示音。\n\
    \n### 为联系人分配专属铃声\n\n有时，为通讯录中的某个联系人设置专属铃声既有趣又实用。这样，你不用看手机就知道是谁在打电话。\n\n你可以使用 iPhone\
    \ 上已有的铃声，也可以通过以下方式之一获取新铃声：\n\n*   在 iPhone 上使用 **iTunes** 应用购买铃声。\n*   在电脑上的 iTunes\
    \ 中使用你的音乐创建并购买铃声。\n*   在电脑上的 iTunes 中使用你的音乐免费创建铃声。\n\n例如，作者之一（加里）为他儿子丹尼尔设置的铃声是埃尔顿·约翰的《丹尼尔》。在本章稍后部分，我们将向你展示如何用你的\
    \ iTunes 音乐制作铃声。\n\n#### 为联系人设置专属铃声\n\n你需要编辑**通讯录**中某人的信息来更改其铃声。请按照以下步骤为联系人设置专属铃声：\n\
    \n1.  轻点**通讯录**图标。\n2.  轻点你想要更改的联系人（此处为**丹尼尔**）。\n3.  轻点**编辑**。\n4.  轻点**铃声**按钮即可看到**铃声**屏幕。\n\
    5.  从列表中轻点任意铃声。在此例中，我们选择了新的自定义铃声**丹尼尔**。\n\n### 从 iTunes 应用购买铃声\n\n在本节中，我们将向你展示如何购买铃声（大多数价格为\
    \ 1.29 美元）。之后，你可以按照以下步骤，直接在 iPhone 的 **iTunes** 应用中将其分配给某个联系人，或将其设置为**默认铃声**：\n\
    \n1.  在 iPhone 上启动 **iTunes** 应用。\n2.  如果你在底部看到**铃声**软键，请轻点它。否则，请轻点**更多**，然后轻点**铃声**。接下来，滚动浏览铃声。或者，你也可以轻点底部的**搜索**软键来搜索铃声。\n\
    \n    ![图片](img/U0959.jpg)\n\n3.  你还可以使用顶部的按钮浏览铃声：**精选**、**热门排行榜**和**类型**。\n4.\
    \  我们选择了**热门排行榜**，然后选择了**另类**，即可看到右侧的图片。\n\n    ![图片](img/U0960.jpg)\n\n5.  轻点任意名称或专辑封面来预览铃声。如果你喜欢，请轻点价格进行购买，然后轻点**立即购买**。\n\
    6.  选择要购买的铃声后，**iTunes** 应用会提示你**设置为默认铃声**（你的主要电话铃声）或**分配给联系人**。\n\n    ![图片](img/U0961.jpg)\n\
    \n7.  如果你选择**分配给联系人**，你的**通讯录**列表将会打开。接下来，滚动浏览或搜索该联系人。此后每当此联系人来电时，你都会听到新的铃声。\n\
    \n### 创建自定义铃声\n\n你的 iTunes 资料库中装满了你喜爱的歌曲。如果能把自己的歌曲变成 iPhone 铃声，那该多好啊？好消息是，你可以将大部分音乐制作成铃声。有两种方法：一种简单的方法，每个铃声大约花费\
    \ 1 美元；另一种更具挑战性但免费的方法。我们将向你展示这两种方法。\n"
- fmt: "#### The Free, But More Challenging Way to Create Ring Tones\n\nLet's begin\
    \ by examining the free but more difficult approach. This method will work on\
    \ any music in iTunes that is not protected with DRM (Digital Rights Management)\
    \ copy protection. Older iTunes purchases might contain DRM. Any music you've\
    \ loaded into iTunes from a CD or other non-DRM music (including newer non-DRM\
    \ music from iTunes) will work.\n\n##### Locating a Song\n\nFollow these steps\
    \ to highlight and select a song in iTunes to use as a basis for your custom ringtone:\n\
    \n1. In the **iTunes** menu, select **File** ![images](images/rtrif.jpg) **Get\
    \ Info**. You can also right-click the song with your mouse and choose **Get Info**.\n\
    2. Click the **Options** tab and put a checkmark in the **start Time:** and **stop\
    \ Time:** boxes.\n\n   ![images](images/U0962.jpg)\n\n   **CAUTION:** Make sure\
    \ the total duration is less than 40 seconds; otherwise, the ringtone will be\
    \ too large.\n\n3. Click **OK** to close the **Get Info** dialog box.\n\n   ![images](images/U0963.jpg)\n\
    \n4. In **iTunes**, click the **Advanced** menu and select **Create AAC Version**.\n\
    5. You should now see a new version of the song that is only a few seconds long\
    \ appear in your iTunes list. For example, the new version of **Daniel** is only\
    \ 30 seconds long.\n\n   ![images](images/U0964.jpg)\n\n6. Once you have your\
    \ new 30-second version, make sure you go back into the original song and uncheck\
    \ the **start Time:** and **stop Time:** boxes via the **Get Info** ![images](images/rtrif.jpg)\
    \ **Options**\n\n   ![images](images/U0965.jpg)\n\n7. Once the new, shorter ringtone\
    \ ACC version of the song is created, just drag it from **iTunes** to your desktop\
    \ or copy and paste it onto the desktop.\n\n   ![images](images/U0966.jpg)\n\n\
    8. You need to change the extension of the file from `m4a` to `m4r`, so it will\
    \ be recognized as a ringtone. You can do so by clicking the file to highlight\
    \ its name and changing it; or you can right-click the file, choose **Get Info**,\
    \ and then change the extension.\n\n   ![images](images/U0967.jpg)\n\n9. You will\
    \ see a warning message that the file may be unusable; just accept the change.\n\
    10. You must now delete the 30-second version that is still in iTunes.\n\n   \
    \ ![images](images/U0968.jpg)\n\n11. Drag the new file with the new `m4r` extension\
    \ back into your iTunes library and drop it there.\n12. If everything went well,\
    \ you should now see your ringtone listed when you click **Ringtones** in the\
    \ left column.\n\n#### Syncing the Ringtone to Your iPhone\n\nSee the “Sync Ringtones”\
    \ section of [Chapter 3](#Chapter03.html#ch3): “Sync with iCloud, iTunes and More”\
    \ to learn how to get the new ringtone onto your iPhone.\n\n#### Using Your New\
    \ Custom Ringtone\n\nIf you want to tie your ringtone to a particular person in\
    \ your **Contacts** list, you will need to edit that contact. Follow the steps\
    \ in the “Giving a Contact a Unique Ringtone” section in this chapter to do so.\
    \ If you want to use your new ringtone for your main phone ringtone, follow the\
    \ steps in the “Sounds” section of [Chapter 8](#Chapter08.html#ch8): “Personalize\
    \ and Secure.”\n\n## Chapter 10\n\n## SMS, MMS, and iMessage\n\n`SMS` stands for\
    \ *short messaging service*, but it is commonly referred to as *text messaging*.\
    \ Text messages are a great way to quickly touch base with people without interrupting\
    \ them with a voice call. Sometimes you can text people and receive a text reply\
    \ when it would be impossible or difficult to do a voice call.\n\n![images](images/U1001.jpg)\n\
    \n`MMS` is short for *multimedia messaging service*, which provides a quick, standard\
    \ way to send pictures, video, voice memos, map locations, and contact cards.\n\
    \n`iMessage` is Apple's new service that does exactly the same thing as `SMS`\
    \ and `MMS`, but works over your data plan and only with other iOS 5 devices.\n\
    \nAll of these services can be found in your iPhone's **Messages** app. In this\
    \ chapter, you will learn how to use these services to send a text message from\
    \ your **Contacts** app and a picture message from your **Photos** app.\n\n###\
    \ SMS/MMS vs. iMessage\n\nWith iOS 5, Apple has built the `iMessage` service right\
    \ into same **Messages** app that has always handled `SMS` and `MMS` messages.\n\
    \nThe advantage to `iMessage` is that it works over your existing data plan, so\
    \ it doesn't require an additional, potentially expensive text messaging plan.\
    \ Nor does `iMessage` open you up to costly per-message charges if you don't have\
    \ a plan or you are travelling without a roaming plan.\n\nThe disadvantage to\
    \ `iMessage` is that it only works with other iOS 5 devices, so you can't use\
    \ it with your friends or family who have non-Apple smartphones like BlackBerrys\
    \ or regular feature phones.\n\n`SMS`, `MMS`, and `iMessage` are all built into\
    \ the same **Messages** app, so you don't have to worry about which one you must\
    \ use once you set it up. Your iPhone will automatically use `iMessage` whenever\
    \ possible, but revert to `SMS` and `MMS` when `iMessage` isn't available (e.g.,\
    \ when you're texting someone who is not on an iOS 5 device).\n\n### Does iMessage\
    \ Count As Text or Data?\n\n`iMessages` are sent over your carrier's data network,\
    \ not its `SMS` channel, so these messages don't count against your `SMS/MMS`\
    \ plan (if you have a limited plan). Instead, they count against your data plan\
    \ cap (if you have limited data).\n\nIf you're sending the message to someone\
    \ who's not using an iPhone, iPod touch, or iPad on iOS 5, then your message is\
    \ sent via `SMS/MMS`, and it counts against your texting plan.\n\n### How Will\
    \ Messages Send?\n\nYou might have limited text messages and want to make sure\
    \ you're using the `iMessage` service as much as possible. Or, you might have\
    \ limited data and want to make sure you're sticking to `SMS/MMS` whenever you\
    \ can. In either case, Apple makes it easy to tell which system you'll be using:\n\
    \n- If `iMessage` is available, everything from the background of the contact\
    \ name to the word bubbles containing the messages will be **blue**, and the text\
    \ entry box will say “iMessage.”\n- If `iMessage` is off or unavailable, everything\
    \ from the background of the contact name to the word bubbles containing the messages\
    \ will be **green**, and the text entry box will say “Text Message.”\n\n### Enabling\
    \ iMessage and Adjusting Settings\n\nSetting up the `iMessage` service is similar\
    \ to setting up **FaceTime**:\n\n1. **Launch Settings.**\n\n   ![images](images/U1002.jpg)\n\
    \n2. **Tap Messages.**\n3. **Toggle iMessages to ON**\n4. Then you may be asked\
    \ for your `iMessage` password -- this is simply your Apple iTunes password.\n\
    \n**TIP:** if you get stuck in the **Waiting for activation** message as shown\
    \ here, then try re-booting your device as shown in [Chapter 26](#Chapter26.html#ch26):\
    \ Troubleshooting.\n\nOnce you've enabled the `iMessages` option, your iPhone\
    \ phone number **and email address** will be registered with the `iMessage` service,\
    \ and anything sent to your phone from another iOS 5 device will be sent via `iMessage`.\n\
    \nIf you tap the **Receive At** near the bottom of the `iMessage` settings screen,\
    \ you will see a screen similar to this one.\n\n![images](images/U1003.jpg)\n\n\
    On this screen, you can adjust which email address is associated with your `iMessage`,\
    \ add new email addresses and change what is shown on the `Caller ID` for `iMessage`."
