  trans: "\n### LinkedIn\n\n`LinkedIn` 的核心功能与 `Facebook` 非常相似，但其侧重点在于商业和职业发展。这与 `Facebook`\
    \ 更侧重于个人好友和游戏形成对比。通过 `LinkedIn`，您可以与现任和前任商业伙伴建立或重新建立联系，发送消息，了解他人的动态，参与讨论等。\n\n\
    在本书写作时，`LinkedIn` 的状况与 `Facebook` 非常相似。您可以通过 `Safari` 浏览器访问常规的 `LinkedIn` 网站，也可以下载适用于\
    \ `iPhone` 的 `LinkedIn` 应用。\n\n哪个更好？我们认为 `iPhone` 上 `LinkedIn` 应用的使用体验略优于在 `Safari`\
    \ 中访问完整的 `LinkedIn.com` 网站。`LinkedIn` 应用拥有大按钮，导航更方便，但 `Safari` 版本在屏幕上可以显示更多内容。我们建议您两种方式都尝试一下，看看哪个更合您的心意——这完全取决于个人偏好。\n\
    \n#### 下载 LinkedIn 应用\n\n下载 `LinkedIn` 应用的过程与下载 `Facebook` 应用类似。在您的 `iPhone` 上启动\
    \ `App Store` 应用，在 `搜索` 窗口中输入“LinkedIn”，然后找到该应用。`LinkedIn` 应用是免费的，因此点击 `免费` 按钮即可安装。\n\
    \n![image](img/U2514.jpg)\n\n##### 登录 LinkedIn 应用\n\n应用安装完成后，点击 `LinkedIn` 图标，然后输入您的登录信息。\n\
    \n![image](img/U2515.jpg)\n\n![image](img/U2516.jpg)\n\n##### 浏览 LinkedIn 应用\n\
    \n`LinkedIn` 采用基于区域的导航系统。点击任意功能卡片即可进入该区域，然后点击顶部的 `LinkedIn` 徽标即可返回主屏幕。\n\n![image](img/U2517.jpg)\n\
    \n##### 与 LinkedIn 联系人沟通\n\n您使用 `LinkedIn` 应用最频繁的操作之一可能就是与您的联系人沟通。最简单的方法是遵循以下步骤：\n\
    \n![image](img/U2518.jpg)\n\n1.  在 `主页` 页面，点击右上角的 `你` 功能卡片。\n2.  点击页面中间位置的 `联系人`\
    \ 按钮。\n3.  浏览您的联系人列表，或点击 `放大镜` 搜索图标，在 `搜索` 框中输入联系人姓名。\n4.  点击您正在查找的联系人。\n5.  点击\
    \ `电话` 图标给他打电话（如果他选择共享了电话号码），或点击 `邮件` 图标给他发送消息。\n\n### Twitter\n\n`Twitter` 成立于\
    \ 2006 年。`Twitter` 本质上是一个基于 `SMS`（短信）的社交网站。它常被称为一个微博客网站，是名人和普通人分享想法的地方。关键在于，您只有\
    \ 140 个字符来表达您的观点。\n\n通过 `Twitter`，您可以订阅关注那些发布推文的人。您也可能发现有人开始关注您。如果您想关注我们，我们在 `Twitter`\
    \ 上的账号是 `@garymadesimple`。\n\n### 设置 Twitter\n\n在 `iOS 5` 中，`Twitter` 应用已内置于您的\
    \ `iPhone` 中。这意味着该应用允许您从其他应用（如 `照片`）内分享图片和帖子等内容。请按照以下步骤设置 `Twitter`：\n\n1.  点击\
    \ `设置` 应用。\n2.  向下滚动并点击 `Twitter`。\n3.  如果 `iPhone` 版 `Twitter` 尚未安装在您的 `iPhone`\
    \ 上，请点击 `Twitter` 图标右侧的“安装”按钮。（如果已安装 `iPhone` 版 `Twitter`，则“安装”按钮将呈灰色不可用状态。）\n\
    4.  点击“用户名”并输入您的 Twitter `@username`。\n5.  点击 `密码` 并输入您的 Twitter 密码。\n6.  点击 `登录`\
    \ 按钮。\n7.  如果您没有 Twitter 帐户，请点击屏幕底部的 `创建新帐户` 按钮，并填写表单来获取一个。\n\n    ![image](img/U2519.jpg)\n\
    \n8.  登录后，点击“帐户”以更改您的选项。\n9.  如果您希望朋友能根据您的电子邮件地址在 Twitter 上找到您，请将 `通过电子邮件找到我`\
    \ 切换至 `开启`。\n10. 如果您希望每次在应用内发推文时都记录您的位置，请将 `推文位置` 切换至 `开启`。\n\n    ![image](img/U2520.jpg)\n\
    \n**注意：** 如果您发布了带有位置信息的推文，Twitter 上的任何人都可能找到您的确切位置——包括发现您不在家或不在公司。如果您担心隐私问题，请将\
    \ `推文位置` 切换至 `关闭`。\n\n#### 使用 Twitter\n\n官方的 `Twitter` 应用采用了一种精简的方式来使用 Twitter。`主页`\
    \ 屏幕会显示您关注的人的推文，完整消息显示得清晰且字号较大。\n\n底部有五个图标，第一个是主要的 `Twitter` 信息流。其他图标分别是 `提及`、`私信`、`搜索`\
    \ 以及 `更多` 按钮，点击 `更多` 按钮可以进入您的 `个人资料`、`喜欢`、`草稿`、`列表` 以及 `帐户和设置`。\n\n`写推文` 图标位于左上角（参见\
    \ 图 25-1）。\n\n![images](img/2501.jpg)\n\n**图 25-1.** `Twitter` 应用 `主页` 页面的布局\n\
    \n#### 刷新推文列表\n\n要刷新您的推文列表，只需下拉主页面，您会在顶部看到 `下拉以刷新` 的提示。当页面被拉下后，您会看到 `释放以刷新` 的提示。释放页面，推文列表就会刷新。\n\
    \n![image](img/U2521.jpg)\n\n#### 您的 Twitter 个人资料\n\n要显示您的 Twitter 个人资料，请点击 `更多`\
    \ 按钮，然后点击 `我的个人资料`。\n\n要查看您的推文，请点击 `推文`。\n\n要查看您标记为喜欢的推文，请点击 `喜欢` 按钮。\n\n要查看您关注的人，请点击\
    \ `正在关注` 按钮。\n\n**注意：** 关于您的粉丝数、关注人数和推文数量的数字会显示在按钮标题的上方。\n\n向下滚动页面以查看您的 `转推`、`列表`\
    \ 以及您可以订阅的 `服务`。\n\n![image](img/U2522.jpg)\n\n#### 写推文按钮\n\n点击 `写推文` 按钮 ![image](img/U2523.jpg)，会弹出\
    \ `新推文` 屏幕。当您输入消息时，字符计数器将从 140 开始倒计数。以下是一些您可以在 `新推文` 屏幕中执行的操作：\n\n*   点击 @ 符号搜索要在推文中提及的其他用户名。\n\
    *   点击 # 符号搜索要在推文中标记的热门话题。\n*   点击 `相机` 图标，使用您的 iPhone 拍照或录制视频，或从您的资料库中选择现有内容添加到推文中。\n\
    *   点击 `箭头` 图标，将您当前的位置添加到推文中。\n\n![image](img/U2524.jpg)\n\n#### 推文内的操作选项\n\n\
    从您的 `Twitter` 应用的 `主页` 屏幕，只需点击您的一条推文即可看到以下选项：\n\n*   点击屏幕左下角的 `返回箭头` 来 `回复` 一条推文。\n\
    *   点击方形的 `双箭头` 来转推或引用一条推文。\n*   点击 `星形` 图标来喜欢一条推文。\n*   点击 `回形针` 图标来查看附件。\n*\
    \   点击 `操作` 按钮来复制推文链接、通过邮件发送推文或翻译推文。\n\n![image](img/U2525.jpg)\n\n**注意：** 与 Facebook\
    \ 和 LinkedIn 不同，您可以在 App Store 中找到各种第三方 Twitter 应用。如果您不喜欢官方的 `iPhone` 版 `Twitter`\
    \ 应用，可以尝试使用 `Tweetbot`、`Twitterrific` 或许多其他应用。\n\n## 第 26 章\n"
- fmt: "# Troubleshooting\n\nThe iPhone is usually highly reliable. Occasionally,\
    \ as with your computer or any complicated electronic device, you might have to\
    \ reset the device or troubleshoot a problem. In this chapter, we will give you\
    \ some useful tools to help get your iPhone back up and running as quickly as\
    \ possible. We will start with some basic quick troubleshooting and move onto\
    \ more in-depth problems and resolutions in the “Advanced Troubleshooting” section.\n\
    \nWe will also cover some other odds and ends related to your iPhone and give\
    \ you a list of resources where you can find help for your iPhone.\n\n## Basic\
    \ Troubleshooting\n\nWe will begin by covering a few basic tips and tricks to\
    \ get your iPhone back up and running when something goes wrong.\n\n### What to\
    \ Do If the iPhone Stops Responding\n\nSometimes, your iPhone won't respond to\
    \ your touch—it simply freezes in the middle of a program. If this happens, try\
    \ these steps to see whether the iPhone will start responding (see [Figure 26–1](#Chapter26.html#fig_26_1)):\n\
    \n![image](images/U2601.jpg)\n\n1. Click the `Home` button once to see whether\
    \ that exits the app to the `Home` screen.\n2. If a particular app is causing\
    \ trouble, try double-clicking the `Home` button to open the `App Switcher` bar.\
    \ Next, press and hold *any* icon in the `App Switcher` bar until they all shake\
    \ and a red `Circle` icon with a minus sign appears in the upper-left corner of\
    \ the app icon.\n\n    ![image](images/U2602.jpg)\n\n3. Tap the red `Circle` icon\
    \ to close the app.\n4. If the iPhone continues to be unresponsive, try pressing\
    \ the `Sleep/Power` key until you see `Slide to Power Off`.\n5. Press and hold\
    \ the `Home` button until you return to the `Home` screen—this should quit the\
    \ program.\n6. Make sure your iPhone isn't running out of power. Try plugging\
    \ it in or attaching it to your computer (if it's plugged in) to see whether it\
    \ will start to respond.\n7. If holding the `Home` button doesn't work, you will\
    \ need to try to turn off your iPhone by pressing and holding the `Power/Sleep`\
    \ button for three to four seconds.\n8. Next, slide the `Slide to Power Off` slider\
    \ at the top of the screen. If you cannot power off the iPhone, then you will\
    \ need to reset the iPhone. Skip ahead to the next section to learn how.\n9. After\
    \ you power off the iPhone, wait a minute or so, and then turn on the iPhone by\
    \ holding the same `Power` button for a few seconds.\n10. You should see the `Apple`\
    \ logo appear on the screen. Wait until the iPhone starts up, and you should be\
    \ able to access your programs and data.\n\n![images](images/2601.jpg)\n\n**Figure\
    \ 26–1.** *Basic troubleshooting steps*\n\nIf these steps don't work, you will\
    \ need to reset your iPhone.\n\n### How to Hard-Reset Your iPhone\n\nResetting\
    \ your device is another option for dealing with an unresponsive iPhone. It is\
    \ perfectly safe to do this, and it usually fixes many problems (see [Figure 26–2](#Chapter26.html#fig_26_2)).\n\
    \n![images](images/2602.jpg)\n\n**Figure 26–2.** *Resetting your iPhone*\n\nFollow\
    \ these steps to hard-reset your iPhone:\n\n1. Using two hands, press and hold\
    \ the `Home` button and the `Power/Sleep` button at the same time.\n2. Keep both\
    \ buttons held down for about eight to ten seconds. You will see the `Slide to\
    \ Power Off` slider. Ignore that and keep holding both buttons until the screen\
    \ goes blank.\n3. After a few more seconds, you should see the `Apple` logo appear.\
    \ When you see the logo, just release the buttons, and your iPhone will be reset.\n\
    \n### How to Soft-Reset Your iPhone\n\nThere are various things you can reset\
    \ in the `Settings` app, from the `Home` screen layout to the network settings\
    \ to all the data on your device:\n\n1. Tap the `Settings` icon.\n2. Tap `General`.\n\
    3. Swipe up to see the bottom of the page.\n4. Tap `Reset`.\n5. Tap `Reset All\
    \ Settings` to reset the network, keyboard, `Home` screen layout, and location\
    \ warnings. Tap `Reset` to confirm in the pop-up window.\n6. Tap `Erase All Content\
    \ and Settings` to erase everything from your iPhone, and then tap `Erase` to\
    \ confirm in the pop-up window.\n7. Tap `Reset Network Settings` to clear all\
    \ your Wi-Fi (and 3G) network settings.\n8. Tap `Reset Keyboard Dictionary` to\
    \ reset the spelling dictionary.\n9. Tap `Reset Home Screen Layout` to return\
    \ to the factory layout; this restores your iPhone's `Home` screen to its original\
    \ layout.\n10. Tap `Reset Location Warnings` to reset the warning messages you\
    \ receive about allowing apps to use your current location.\n\n![image](images/U2603.jpg)\n\
    \n### No Sound in Music, Video, Alerts or Phone Ringer\n\nFew things are more\
    \ frustrating than missing phone calls, hoping to listen to music or watch a video,\
    \ only to find that no sound comes out of the iPhone. Usually, there is an easy\
    \ fix for this problem:\n\n1. If you are not hearing the phone ring or any other\
    \ alerts, then check to make sure your `Mute` switch on the upper left edge of\
    \ your device is not turned on. You know the `Mute` switch is set to on when it's\
    \ switched toward the back of your device and you see a little orange color next\
    \ to the switch. Make sure the `Mute` switch is pushed toward the front of your\
    \ device, which is the off position.\n2. Check the volume by using the `Volume\
    \ Up` key in the upper-left edge of your iPhone. You might have accidentally lowered\
    \ the volume all the way or muted it.\n3. If you are using wired headphones from\
    \ the headphone jack, unplug your headphones, and then put them back in. Sometimes,\
    \ the headset jack isn't connected well.\n4. Follow these steps if you are using\
    \ wireless Bluetooth headphones or a Bluetooth stereo setup:\n   1. Check the\
    \ volume setting (if available on the headphones or stereo).\n   2. Check to make\
    \ sure the Bluetooth device is connected. Tap the `Settings` icon, tap `General`,\
    \ and then tap `Bluetooth`. Make sure you see your device listed and that its\
    \ status is `Connected`. If it is not connected, then tap it and follow the directions\
    \ to pair it with the iPhone.\n\n        **NOTE**: Sometimes you may actually\
    \ be connected to a Bluetooth device and not know it. If you are connected to\
    \ a Bluetooth Stereo device, no sound will come out of the actual iPhone.\n\n\
    5. Make sure the song or video is not in Pause mode.\n6. Open the iPhone music\
    \ or video controls. Double-clicking the `Home` button should open the `App Switcher`\
    \ bar. Swipe from left to right to see your media controls.\n7. Swipe one more\
    \ time to the right to see the volume controls. Verify that the song is not paused\
    \ and that the volume is not turned down all the way.\n8. Finally, check the `Settings`\
    \ icon to see whether you (or someone else) has set the `Volume Limit` on the\
    \ iPhone:\n   1. Tap the `Settings` icon.\n   2. Swipe down the page and tap `Music`.\n\
    \   3. See whether `Volume Limit` is `On`.\n   4. Tap `Volume Limit` to check\
    \ the setting level. If the limit is unlocked, simply slide the volume to a higher\
    \ level.\n   5. If it is locked, you need to unlock it first by tapping the `Unlock\
    \ Volume Limit` button and entering the four-digit code.\n\nIf none of these steps\
    \ helps, check out the “Additional Troubleshooting and Help Resources” section\
    \ later in this chapter. If that doesn't help, then try to restore your iPhone\
    \ from a backup file using the steps in the “Restore Your iPhone from a Backup”\
    \ section in the chapter. Finally, if that does not help, then contact the store\
    \ or business that sold you your iPhone for assistance."
