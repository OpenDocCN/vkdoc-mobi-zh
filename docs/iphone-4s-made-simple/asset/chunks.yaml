    Follow these steps to enable **Airplane Mode**:


    ![images](images/p12-01.jpg)


    1.  Tap the **Settings** icon.

    2.  Set the switch next to **Airplane Mode** in the top of the left column to
    **ON.**

    3.  Notice that the Wi-Fi is automatically turned **Off** and that the **Phone**
