- fmt: '### Reading iBooks


    Touch any title in your library to open it for reading. The book will open to
    the very first page, which is often the title page or other *front matter* in
    the book.


    ![images](images/U1314.jpg)


    In the upper-left corner, next to the `Library` button, you can see a `Table of
    Contents` button. To jump to the table of contents, either touch the `Table of
    Contents` button or simply turn the pages to advance to the table of contents.


    ![images](images/U1315.jpg)


    You can turn pages in one of three ways. First, you can touch the right-hand side
    of the page to turn to the next page. Second, you can slowly touch and hold the
    screen on the right edge of the page; and, while continuing to touch the screen,
    gently and slowly move your finger to the left.


    **TIP**: If you move your finger very slowly you can actually see the words on
    the back of the page as you "turn" it—a very cool visual effect.


    #### Customizing Your Reading Experience: Brightness, Fonts, and Font Sizes


    In the upper center of the book, there are three icons available: `Brightness`,
    `size`, and `search`. These options help to make your reading experience much
    more immersive.


    Touch the `Brightness` icon and you can adjust the brightness of the book.


    ![images](images/U1316.jpg)


    ![images](images/U1317.jpg)


    If you are reading in bed in a very dark room, you might want to dim the tablet
    by sliding the `Brightness` slider all the way to the left. If you are out in
    the sunlight, you may need to slide it all the way to the right. However, you
    should keep in mind that high screen brightness consumes more battery power than
    most other features, so turn this feature back down when you don''t need your
    screen to be so bright.


    **NOTE**: The preceding tip adjusts the brightness only within `iBooks`. To adjust
    the global brightness of the iPhone, use the `settings` app (go to the `settings`
    icon > `Brightness & Wallpaper`).


    The `Font Size and Type` icon lets you adjust font values to suit your preferences.


    Do this to **increase the Font Size:**


    Tap the large `A` icon multiple times.


    Do this to **Decrease the Font Size:**


    Tap the small `a` icon multiple times.


    At the time of writing, there are six available font styles—but there may well
    be more fonts available when you read this book.


    ![images](images/U1318.jpg)


    Have fun and try out some of the various fonts. The default selection is the Palatino
    font, but all of the fonts look great, and a larger font size can make a difference
    for some. The goal is to adjust the font size so the text is as comfortable and
    easy to read as possible.


    #### Grow Your Vocabulary Using the Built-In Dictionary


    `iBooks` contains a very powerful built-in dictionary, which can be quite helpful
    when you run across a word that is new or unfamiliar.


    **NOTE**: The first time you attempt to use the dictionary, your iPhone will need
    to download it. Follow the on-screen prompts to download the dictionary.


    Accessing the dictionary could not be easier. Just touch and hold any word in
    the book. A pop-up will appear with various options that let you highlight a word,
    create a note, or search for other occurrences of this particular word.


    ![images](images/U1319.jpg)


    ![images](images/U1320.jpg)


    Touch `Dictionary` and a pronunciation and definition of the word will be displayed.
    Touch `Done` to leave the dictionary and go back to your book.


    #### Setting an In-Page Bookmark


    There may be times when you wish to set an in-text bookmark for future reference.


    The upper-right corner displays a `Bookmark` icon. Touch the `Bookmark` icon and
    it will change to a red bookmark on the pages.


    To view your bookmarks, just touch the `Table of Contents` icon at the top left
    of the screen (next to the `Library` icon), and then touch `Bookmarks`. Touch
    the bookmark highlighted and you will jump to that section in the book.


    ![images](images/U1321.jpg)


    **TIP**: You do not need to set a bookmark every time you leave `iBooks`. The
    app will automatically remember where you stop reading in a book. This holds true
    no matter how many books you open and read, so you can always return to exactly
    where you stopped reading in a given book. The `iBooks` app will also sync with
    the version of `iBooks` on your iPad, so you can move back and forth between devices
    and keep your place in a given book.


    #### Using Highlighting and Notes


    There are some very nice "added touches" to the `iBooks` app. For example, there
    may be times that you want to highlight a particular word to come back to at another
    time. And there may be other times you want to leave yourself a note in the margin.


    Both of these things are very easy to do in `iBooks`.


    ##### Highlighting Text


    Follow these steps to highlight text in the `iBooks` app:


    ![images](images/U1322.jpg)


    1.  Touch and hold any word to bring up the menu options.

    2.  Choose `Highlight` from the menu options.

    3.  To remove the highlight, tap the word and then select `Remove Highlight`.


    Changing the color of a highlight is as simple as following these steps:


    ![images](images/U1323.jpg)


    1.  Tap the highlighted word.

    2.  Choose `Colors` from the menu.

    3.  Choose a new color.


    ![images](images/U1324.jpg)


    ##### Adding Notes


    It''s also easy to add a note in the margin in `iBooks`:


    1.  Touch and hold any word, as you did previously.

    2.  Choose `Note` from the menu.

    3.  Type in your note and then touch `Done`. The note now appears on the side
    of the page in the margin (see [Figure 13–1](#Chapter13.html#fig_13_1)).


    **TIP:** Your notes will also appear under your bookmarks on the title page. Just
    touch the `Title Page` button and then touch `Bookmarks`. You can find the notes
    you write at the bottom of the page.


    You can change the color of notes the same way you change the color of highlights!


    ![images](images/1301.jpg)


    **Figure 13–1.** *Using the Notes feature in `iBooks`*


    #### Using Search


    `iBooks` contains a powerful search feature built right in. Just touch the `search`
    icon, and (as in other programs on the iPhone) the built-in keyboard will pop
    up. Type in the word or phrase you are searching for and you will see a list of
    chapters where that word occurs.


    Just touch the selection desired and you will jump to that section in the book.
    You also have the option of jumping right to Google or Wikipedia by touching the
    appropriate buttons at the bottom of the `search` window.


    **NOTE**: Using the Wikipedia or Google search will take you out of `iBooks` and
    launch `safari`.


    ### Moving and Deleting Books


    Deleting books from your iBooks library is very similar to deleting applications
    from the iPhone. You can delete or move iBooks by tapping the `Edit` button in
    the `Library` view.


    top-left corner.![images](images/U1325.jpg)


    Once you touch the `Edit` button, you will notice a small black "**x**" in the
    upper-left corner of each book.


    ![images](images/U1326.jpg)


    Just touch the "**x**" and you will be prompted to delete the book. Once you touch
    `Delete`, the book will disappear from the shelf.


    ![images](images/U1327.jpg)'
