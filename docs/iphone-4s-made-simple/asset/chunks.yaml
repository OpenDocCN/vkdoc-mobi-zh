- fmt: "### Maintaining and Updating Your Apps\n\nOften, developers will update their\
    \ apps for the iPhone. You don't need to use your computer to perform the update—you\
    \ can do it right on your iPhone.\n\n![images](images/U2320.jpg)\n\nYou can even\
    \ tell if you have updates, and how many, by looking at the `App Store` icon.\
    \ The one shown here has five app updates available for you to download.\n\nOnce\
    \ you enter the App Store, tap the right-most icon on the bottom row. This is\
    \ the `Updates` icon.\n\n![images](images/U2321.jpg)\n\nIf you have apps with\
    \ updates available, there will be a small number indicated in red. This number\
    \ corresponds to the number of apps with updates.\n\nWhen you tap the `Update`\
    \ button, the iPhone shows you which apps have updates.\n\n![images](images/U2322.jpg)\n\
    \nTo get your updates, you could touch an individual app. However, it is easier\
    \ to touch the `Update All` button ![images](images/U2323.jpg) in the upper-right\
    \ corner to have all your apps updated at once. The iPhone will leave the App\
    \ Store, and you can see the progress of the updates in the little status bars.\
    \ All apps updating will have icons that look grayed out.\n\nSome status messages\
    \ will show `Waiting`, while others will show `Loading` or `Installing`. When\
    \ the update is complete, all your icons will return to their normal colors.\n\
    \n![images](images/U2324.jpg)\n\n**NOTE:** You will need to relaunch the `App\
    \ Store` app to get back in. The update process takes you completely out of the\
    \ store.\n\n#### Redownloading Apps\n\nOnce you've downloaded an app, whether\
    \ free or paid, you can download it again as often as you like at no additional\
    \ charge. For example, assume you buy an app to take with you on vacation. Once\
    \ you've finished your trip, you can safely delete it and then download it again\
    \ the next time you travel. This can help keep your `Home` screen clean and help\
    \ prevent you from running out of storage on your iPhone.\n\nTo get a list of\
    \ apps you've previously bought or downloaded, tap the `Update` button and then\
    \ tap the `Purchased` tab at the very top of the screen.\n\n![images](images/U2325.jpg)\n\
    \nInside the `Purchased` section, you have a choice of two views. First, you can\
    \ view a list of all the apps you've ever bought or downloaded. Alternatively,\
    \ you can view a list of apps that *aren't* currently installed on your iPhone.\n\
    \n**NOTE:** Are you seeing apps listed that you don't remember buying or downloading?\
    \ If so, this might be because you downloaded apps on your iPod touch, purchased\
    \ universal apps on your iPad, or you shared your iTunes account with a spouse\
    \ or family member who has downloaded apps to his device(s).\n\n![images](images/U2326.jpg)\n\
    \n### Automatic Downloads\n\nThe iCloud online service lets you set up your iPhone\
    \ so it automatically downloads and installs any apps you purchase through iTunes\
    \ on your Windows or Mac PC—or even on another iOS device, such as your iPad.\n\
    \n![images](images/U2327.jpg)\n\nFollow these steps to turn on Automatic Downloads:\n\
    \n1.  Tap the `Settings` icon.\n2.  Scroll down and tap `Store`.\n3.  Toggle `Automatic\
    \ Downloads` for `Apps` to `ON`.\n\nIf you no longer wish to download apps automatically,\
    \ simply toggle `Automatic Downloads` for `Apps` back to `OFF`.\n\nYou can also\
    \ choose whether to `Use Cellular Data` to download your purchases. If you're\
    \ on a slow network or have a limited data plan, consider turning this option\
    \ `OFF`.\n\n### Other App Store Settings\n\nInside the settings for the `App Store`\
    \ app, you can also check which account is logged into the store, log out, turn\
    \ off the Genius feature, view your iTunes account, and work with your newsletter\
    \ subscriptions.\n\n**TIP:** If you want to prevent someone from buying apps on\
    \ your iPhone using your iTunes account, you need to sign out of iTunes using\
    \ the steps described next.\n\nFollow these steps to change the other settings\
    \ for the `App Store` app:\n\n1.  Note that you can see the account you are logged\
    \ in with at the top of this screen.\n2.  Tap `Sign Out` if you wish to log out\
    \ of the iTunes service. For example, you might want to give your iPhone to someone\
    \ you don't want using your phone to buy apps with your iTunes account.\n3.  Tap\
    \ `View Account` to see the details of your account (you will need to sign in).\n\
    \n    ![images](images/U2328.jpg)\n\n4.  The figure to the right shows your account\
    \ information. Tap `Payment Information` to adjust your billing information (e.g.,\
    \ your credit card type and number).\n5.  Tap `Billing Address` to update your\
    \ address.\n6.  Tap `Change Country` to change your country.\n\n    ![images](images/U2329.jpg)\n\
    \n7.  Scroll down to see more settings.\n8.  You can `Turn Off Genius for Apps`\
    \ (or if it is off, this button will allow you to turn it on). Or, you can `Subscribe`\
    \ or `Unsubscribe` to the iTunes newsletter from this dialog.\n9.  Tap `Done`\
    \ in the upper-right corner when finished.\n\n![images](images/U2330.jpg)\n\n\
    ## Chapter 24\n\n## Games and Fun\n\nYour iPhone excels at many things. It is\
    \ a multimedia workhorse, and it can keep track of your busy life. Your iPhone\
    \ particularly excels in two areas: as a gaming device and for displaying apps\
    \ that take advantage of its beautiful, high-resolution touch screen and powerful\
    \ graphical processor. You can even find versions of popular games for the device\
    \ that you might expect to find only on dedicated gaming consoles.\n\nThe iPhone\
    \ brings many advantages to portable gaming: the high definition (HD) screen delivers\
    \ realistic visuals; the high quality audio provides great sound effects; and\
    \ the gyroscope and the accelerometer allow you to interact with your games in\
    \ a way that many PCs and dedicated gaming consoles (outside of the Wii) don't.\
    \ For example, in racing games, the last feature lets you steer your car by turning\
    \ the iPhone as you hold it.\n\nWith AirPlay Mirroring, you can even beam your\
    \ game to an Apple TV on the same Wi-Fi network and play on your big screen television.\n\
    \nThe iPhone is also great for lots of other fun stuff such as following your\
    \ local baseball team and even using the iPhone as a musical instrument with great\
    \ apps like `Ocarina` (which we will show you later in the chapter).\n\n### Using\
    \ the iPhone As a Gaming Device\n\nThe iPhone includes a built-in accelerometer\
    \ and *gyroscope*, which is essentially a device that detects movement (acceleration)\
    \ and tilt.\n\nCombine the accelerometer with a fantastic screen, lots of memory,\
    \ and a fast processor, and you have the makings of a great gaming platform. With\
    \ literally thousands of gaming titles to choose from, you can play virtually\
    \ any type of game you wish on your iPhone.\n\nWith multitasking, you can even\
    \ take a phone call and come back to the exact place you left off.\n\n**NOTE:**\
    \ Some games require that you have an active network connection, either Wi-Fi\
    \ or 3G, to engage in multiplayer games.\n\nWith the iPhone, you can play a driving\
    \ game and use the iPhone itself to steer. You do this simply by turning the device.\
    \ You can touch the iPhone to brake or tilt it forward to accelerate.\n\nThis\
    \ game is so realistic that it might make you car sick!\n\nReal Racing also has\
    \ a nice Party Play feature, where you can race against your friends - give it\
    \ a try!\n\n![images](images/U2401.jpg)\n\nOr, you can try a fishing game, where\
    \ you case and reel in fish from the perspective of being on a boat!\n\n![images](images/U2402.jpg)\n\
    \nIf music/rhythm games are your thing, then you will find many such programs\
    \ in the App Store such as `Rock Band`. There are also fantastic fighting games\
    \ like `Infinity Blade`, which is powered by the Epic Unreal 3 Engine; first-person\
    \ shooters (FPS) like `Call of Duty: Zombies`; and some of the most popular casual\
    \ games on the planet, such as `Angry Birds`.\n\n![images](images/U2403.jpg)\n\
    \nThe iPhone also has a very fast processor and a sophisticated graphics chip.\
    \ Bundling these together with the accelerometer gives you a very capable gaming\
    \ device."
