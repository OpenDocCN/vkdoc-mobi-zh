  trans: "\n# 拨打任意带下划线的电话号码\n\n你会注意到，iPhone 几乎会在屏幕上所有它识别出的电话号码下方添加下划线。\n\n![images](img/U0920.jpg)\n\
    \n这种情况会出现在电子邮件（电子邮件签名）、短信与 iMessage、备忘录、网站等页面中。\n\n要拨打任意带下划线的电话号码，只需轻点该号码，然后轻点显示出的`呼叫`按钮即可。\n\
    \n**提示：** 与带下划线的电话号码类似，你的 iPhone 还能识别屏幕上的其他信息，并允许你通过轻点来执行相关操作。此功能称为“数据检测器”。你会看到带下划线的地址（轻点即可在`地图`中显示该地址）、带下划线的日期，例如`明天上午\
    \ 9 点`（轻点即可新建一个`日历`事件），以及快递单号，例如联邦快递或 UPS 的追踪编号（轻点即可在`Safari 浏览器`中显示追踪信息）。\n\n\
    ## 从带下划线的电话号码创建新联系人\n\n如果你长按任意带下划线的电话号码几秒钟，屏幕底部会弹出一系列按钮。轻点`创建新联系人`即可从该号码创建新联系人，或轻点`添加到现有联系人`，将该号码添加到你的`通讯录`列表中已有的联系人。\n\
    \n![images](img/U0921.jpg)\n\n## 使用 Siri 进行语音拨号\n\n你可以使用语音通过 Siri 拨打通讯录中的号码。有关具体步骤，请参见第\
    \ 7 章：“多任务处理与 Siri”中的“Siri”部分。\n\n## 通话中的功能\n\n在你的 iPhone 拨号期间，甚至在你接通对方后，都可以执行许多操作。\n\
    \n所有可用的电话功能都清晰地显示在`电话`屏幕的图标和按钮上。\n\n你可以执行以下所有操作：\n\n![images](img/U0922.jpg)\n\
    \n*   使自己静音。\n*   使用`拨号键盘`拨出其他号码。\n*   轻点`扬声器`以开启手机的免提功能。\n*   轻点`添加通话`以发起电话会议。\n\
    *   通过`FaceTime 通话`开始视频通话（前提是对方也拥有支持`FaceTime 通话`的 iPhone、iPod touch、iPad 或 Mac）。\n\
    *   查看你的`通讯录`列表。\n\n**注意**：为什么你把手机贴近耳朵时屏幕会变黑？当你对着 iPhone 说话（将手机靠近脸部）时，屏幕会感应到并自动变黑，以防止你不小心用脸碰到按钮。一旦你将\
    \ iPhone 从脸旁移开，你就会看到可用的选项。\n\n### 使用拨号键盘\n\n也许你拨打的号码需要你输入分机号。又或者，你正在拨打一个需要根据提示输入数字进行选择的自动应答服务。\n\
    \n![images](img/U0923.jpg)\n\n![images](img/U0924.jpg)\n\n在这些情况下，只需轻点`拨号键盘`图标，键盘就会显示出来。然后你可以根据提示输入数字。\n\
    \n最后，操作完成后，按下底部的`隐藏拨号键盘`按钮即可。\n\n![images](img/U0925.jpg)\n\n### 静音通话\n\n在拨号过程中，你会在左上角看到将通话静音的选项。只需轻点`静音`按钮就可以让自己静音。再次轻点即可取消静音。\n\
    \n![images](img/U0926.jpg)\n\n**提示：** 当你启用了`FaceTime 通话`时，你不会看到`保留`按钮。请使用`静音`图标来保持通话。\n\
    \n### 使用免提\n\n如果你更愿意使用 iPhone 内置的扬声器免提，请轻点`扬声器`图标。\n\n再次轻点同一个图标即可关闭免提。\n\n![images](img/U0927.jpg)\n\
    \n### 保持通话\n\n将来电方置于保持状态很简单。只需轻点`保留`图标即可将来电方保持。\n\n![images](img/U0928.jpg)\n\n\
    **注意：** 只有当你的`FaceTime 通话`应用处于停用状态时，你才会看到`保留`图标（前往`设置` ![images](img/rtrif.jpg)\
    \ `电话`，然后将`FaceTime 通话`设置为`关闭`）。如前所述，如果你没有看到`保留`图标，只需轻点`静音`图标——它能实现相同的效果。\n\n\
    取消保持也同样简单——再次轻点`保留`按钮即可取消保持。\n\n**注意：** 在编写本书时，Verizon 的 CDMA 网络并未正式支持保持通话功能。\n\
    \n### 浏览通讯录\n\n![images](img/U0929.jpg)\n\n假设你在通话过程中需要浏览你的`通讯录`列表。例如，你可能需要查找某人的电子邮件、电话号码或地址，以便与通话对方分享。轻点`通讯录`按钮，然后滚动或搜索联系人。\n\
    \n要返回通话，请轻点顶部绿色的`轻触返回通话`栏。\n\n![images](img/U0930.jpg)\n\n**注意：** 在此过程中，最好使用免提或蓝牙耳机（参见第\
    \ 5 章：“AirPlay 与蓝牙”）；这样你就可以在搜索联系人的同时继续通话。\n\n### FaceTime 视频通话\n\n![images](img/U0931.jpg)\n\
    \n如果你正在通话的对方也拥有较新款的 iPhone、iPod touch、iPad 或 Mac，并且对方已连接 Wi-Fi，那么你可以轻点`FaceTime\
    \ 通话`图标来开始视频通话。（未来你可能可以通过 3G 蜂窝网络连接使用`FaceTime 通话`；但目前此功能需要 Wi-Fi 连接。）你会在窗口左上角看到自己的画面，而对方则会显示在主窗口中。你还会注意到底部有三个按钮：`静音`、`结束通话`和`切换摄像头`，用于在前后摄像头之间切换。\n\
    \n![images](img/U0932.jpg)\n\n关于使用`FaceTime 通话`的更多信息，请参见第 11 章：“视频消息与 Skype”。\n\
    \n**注意：** 只有当你的`FaceTime 通话`应用处于启用状态时，你才会看到这个`FaceTime 通话`图标（你可以在`设置` ![images](img/rtrif.jpg)\
    \ `电话`中将其启用，然后将`FaceTime 通话`设置为`开启`）。\n\n## 设置和使用语音信箱\n\n你的 iPhone 配备了一个增强型语音信箱系统，称为**可视语音信箱**。此功能让你能快速查看所有语音留言，并按任意顺序播放。要收听任何留言，只需轻点它。在右侧的图片中，红色`圆形`图标内的数字`3`表示有三条未听的语音留言。\n\
    \n![images](img/U0933.jpg)\n\n**注意：** 如果你在美国以外地区，你的运营商可能尚未提供可视语音信箱服务。如果未提供，那么你需要像使用其他任何手机一样，按下`语音信箱`软按键，拨号接入来收取留言。\n\
    \n### 设置语音信箱\n\n如果你以前从未设置过语音信箱，那么在新 iPhone 上进行设置很简单；只需按照以下步骤操作：\n\n1.  轻点`电话`图标。\n\
    2.  轻点底部软按键行中的`语音信箱`图标 ![images](img/U0934.jpg)。\n3.  轻点图 9–7 中显示的`立即设置`按钮。\n\
    4.  选择一个四位数的密码，然后重新输入密码。\n\n    ![images](img/0906.jpg)\n\n    **图 9–7.** 设置你的语音信箱\n\
    \n5.  接下来，你可以选择`默认`问候语或`自定`问候语。`默认`问候语会以电子语音读出你的电话号码；同时还会提示你无法接听。\n\n    ![images](img/U0935.jpg)\n\
    \n6.  如果你选择`自定`问候语，则需要轻点`录制`按钮进行录制。录制完成后，轻点`停止`按钮，该按钮与`录制`按钮位于同一位置。\n7.  录制完成后，你可以轻点`播放`按钮，听听看是否喜欢你的`自定`问候语。\n\
    \n**提示：** 如果你将 iPhone 拿得太靠近嘴巴，你的声音可能会听起来有些失真——请务必保持正常距离。\n\n### 更改语音信箱密码\n\n你可能想要更改密码。请按照以下步骤操作：\n\
    \n1.  找到并轻点`设置`图标。\n2.  向下滚动并轻点`电话`。\n3.  向下滚动并轻点`更改语音信箱密码`。\n4.  输入你的当前密码，然后两次输入新密码。\n"
- fmt: "#### Playing Your Voicemail\n\nThe beauty of the Visual Voicemail system is\
    \ that you never have to call in to check your voicemail. All voicemail messages\
    \ will reside on your phone. You can save them, scroll through them, or delete\
    \ them.\n\n![images](images/U0936.jpg)\n\nYou will know how many unheard voicemail\
    \ messages you have by the little number in the red **Circle** icon in the top\
    \ right of the `Voicemail` icon.\n\nUnheard items, like unread e-mail in your\
    \ inbox, are marked with a little blue dot.\n\nThe `Voicemail` icon will show\
    \ the number of voicemails in your mailbox. Tap the `Play` button next to the\
    \ message and the message will play through your handset.\n\n**TIP:** if you cannot\
    \ look at the screen, you can still dial in to listen to your voicemail hands-free\
    \ by pressing and holding the `1` key on your handset.\n\n##### Listening to Voicemail\
    \ Through Your Speaker\n\nIf you would like to hear your voicemail through the\
    \ iPhone's speaker (as opposed to listening through the handset), just touch the\
    \ `speaker` button in the upper-right corner.\n\n![images](images/U0937.jpg)\n\
    \n##### Adjusting Your Greeting\n\nTap the `Greeting` button to adjust your voicemail\
    \ greeting. You can listen to your greeting again, record a new `Custom` greeting,\
    \ or change the greeting back to `Default`.\n\n![images](images/U0938.jpg)\n\n\
    ##### Calling Back a Person Who Left Voice Mail\n\nIf someone leaves you a voicemail\
    \ message, you can call her back by touching the `Call Back` button; this will\
    \ immediately return her call.\n\n![images](images/U0939.jpg)\n\n#### Deleting\
    \ a Voicemail Message\n\nYour iPhone will store all your voicemails if you want\
    \ to listen to them at a later date. Sometimes voicemails can get a bit hard to\
    \ manage if you have too many of them. Highlighting a message and touching the\
    \ red `Delete` button will remove a given message from your iPhone (see [Figure\
    \ 9–7](#Chapter09.html#fig_9_7)).\n\n![images](images/U0940.jpg)\n\n**NOTE:**\
    \ You have the option to save a “deleted” message. Your `Voicemail` screen will\
    \ show your deleted messages in their own `Deleted` tab. If you touch a message\
    \ in this tab, you can tap the `Undelete` button to restore it.\n\n![images](images/0907.jpg)\n\
    \n**Figure 9–7.** *Working with deleted voicemail items*\n\nIf you would like\
    \ to permanently delete all your voicemails, tap `Clear All`.\n\n### Conference\
    \ Calling\n\nIn today's busy world, working with several callers at once has become\
    \ something that we demand from our phones. Fortunately, conference calling is\
    \ very intuitive on the iPhone.\n\n**NOTE:** While the AT&T/GSM iPhone can handle\
    \ up to five-person conference calls, the technical limitations of Verizon's CDMA\
    \ network limit Verizon iPhones to only three-person conference calls.\n\n#####\
    \ Initiating the First Call\n\nAs we showed you earlier in this chapter, you can\
    \ make a call to any number in `Recents`, to a new number, to a contact, to someone\
    \ in your `Favorites` list, and so on.\n\n![images](images/U0941.jpg)\n\nYou don't\
    \ even have to start a call to create a conference call. For example, you can\
    \ receive a call from the first caller instead of placing one to her. At that\
    \ point, you can conference in the second person.\n\nMove the iPhone away from\
    \ your face to see the phone functions available to you. Most of these were covered\
    \ earlier in this chapter.\n\n##### Adding a Second Caller\n\nTouch the `Add Call`\
    \ button to begin adding a second caller. This will immediately put the first\
    \ caller on hold.\n\n![images](images/U0942.jpg)\n\nTouching the `Add Call` button\
    \ brings you to your `Contacts` list. Simply scroll or double-tap the top to search\
    \ for the contact you want to add to this call.\n\n![images](images/U0943.jpg)\n\
    \nYou can also add a new caller by choosing her from your `Favorites` or `Recents`,\
    \ or just by dialing her phone number after pressing the `Keypad` soft key on\
    \ the bottom.\n\n![images](images/0908.jpg)\n\n**Figure 9–8.** *Adding a second\
    \ caller*\n\nIf the contact has more than one phone entry, tap the one you would\
    \ like to call and the call will be initiated.\n\n#### Merging Calls\n\nOnce the\
    \ call to the second caller has been initiated, you will notice that the `Add\
    \ Call` button has now been replaced with a `Merge Calls` button. Tap this button\
    \ to merge both calls into a three-way conference call (see [Figure 9–9](#Chapter09.html#fig_9_9)).\n\
    \n![images](images/0909.jpg)\n\n**Figure 9–9.** *Swapping between callers and\
    \ merging them into a conference call*\n\nThe top of the screen will now scroll\
    \ a list of all the callers on the conference call.\n\n#### Talking Privately\
    \ with or Disconnecting from Individuals\n\nIn order to speak to one caller individually\
    \ or privately from a conference call, perform these steps:\n\n1.  Tap the small\
    \ black `Arrow` icon ![images](images/U0944.jpg) next to the name at the top of\
    \ the `Phone` screen (see [Figure 9–10](#Chapter09.html#fig_9_10)).\n2.  Now you\
    \ will see a list of all callers. Tap the `Private` button ![images](images/U0945.jpg)\
    \ next to a person's name to talk privately with that person. Everyone else is\
    \ put on hold.\n3.  To hang up from any caller, tap the red `Phone` icon ![images](images/U0946.jpg)\
    \ to the left of his name.\n\n![images](images/0910.jpg)\n\n**Figure 9–10.** *Talking\
    \ privately with individual callers or hanging up on them*\n\n### Phone Options\
    \ and Settings\n\nYou can customize many things in your phone by going into the\
    \ `Settings` app:\n\n1.  Tap the `Settings` icon.\n\n    ![images](images/U0947.jpg)\n\
    \n2.  Scroll down and tap `Phone`.\n\nThe sections that follow describe all the\
    \ phone settings found here.\n\n#### Call Forwarding\n\nThere may be times when\
    \ you need to forward your calls to another number. For example, you may be traveling\
    \ to the house of a friend who lives out in the boondocks, where there is very\
    \ poor cell reception. In this case, you could forward calls to that person's\
    \ land line. Follow these steps to do so:\n\n1.  In the `Phone` settings screen,\
    \ tap `Call Forwarding`.\n\n    ![images](images/U0948.jpg)\n\n2.  Set the `Call\
    \ Forwarding` switch to `ON`.\n\n    ![images](images/U0949.jpg)\n\n3.  Tap the\
    \ `Forward to` row to enter the forwarding number.\n\n    ![images](images/U0950.jpg)\n\
    \n4.  Once entered, the number will be stored for future reference. All calls\
    \ will be forwarded from your regular iPhone number to this number until you set\
    \ `Call Forwarding` to `OFF`.\n\n    **CAUTION:** Call forwarding is not always\
    \ free. Call your phone company to see if you will be charged for enabling call\
    \ forwarding.\n\n#### Call Waiting\n\nAnother `Phone` setting is `Call Waiting`.\
    \ This option alerts you to the fact that another call is coming in while you\
    \ are on the phone.\n\n![images](images/U0951.jpg)\n\nYou then have the option\
    \ to take the new call, hang up on the first call, or set up a conference call,\
    \ as described previously.\n\nEnabling call waiting is as simple as making sure\
    \ the `Call Waiting` switch is set to the `ON` position, which is the default\
    \ setting.\n\n#### Show or Block (Hide) Your Caller ID\n\nThere may be certain\
    \ situations where you would prefer that your phone number not show up on the\
    \ caller's phone.\n\n![images](images/U0952.jpg)\n\nFortunately, your iPhone gives\
    \ you the option to block your Caller ID phone number. To do so, set the `Show\
    \ My Caller ID` switch to `OFF`."
