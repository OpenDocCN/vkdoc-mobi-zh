    \n    ![images](img/U0908.jpg)\n\n4.  点击右上角的**加号**按钮![images](img/U0909.jpg)以添加新条目。您的通讯录将打开。\n\
    5.  向上或向下滑动以查找联系人。点击任何联系人以选择它。\n\n    **提示：** 要按名称搜索联系人，请点击屏幕最顶部（时间下方）。这将调出**搜索**窗口，您可以在其中输入几个字母来查找联系人。请记住，您可以通过点击左上角的**群组**按钮来查看不同的联系人群组。\n\
    \n    ![images](img/U0910.jpg)\n\n6.  如果一个条目有多个电话号码，您需要选择其中一个作为个人收藏条目。\n\n   \
    \ ![images](img/U0911.jpg)\n\n7.  点击一个号码后，系统会询问您是否要将该号码设置为**语音呼叫**或**FaceTime**中的**个人收藏**。\n\
    8.  您将返回到**个人收藏**列表，在那里您会看到刚刚添加的新联系人。**FaceTime**中的**个人收藏**会在联系人姓名右侧显示一个小**视频**图标。\n\
    \n    ![images](img/U0912.jpg)\n\n    ![images](img/U0913.jpg)\n\n9.  重复步骤 4-7\
    \ 以添加更多联系人到**个人收藏**。每个新条目都列在列表底部前一个条目之下。\n\n### 整理您的个人收藏\n\n与 iPhone 上的其他列表一样，您可以重新排列**个人收藏**列表并删除条目：\n\
    \n1.  像之前一样查看您的**个人收藏**列表。\n2.  点击左上角的**编辑**按钮。\n3.  要重新排列条目，请触摸并拖动右侧边缘带三条灰色横条的区域，在列表中上下移动。\n\
    \n    ![images](img/U0914.jpg)\n\n4.  要删除条目，请点击条目左侧的红色**圆形**图标，使其变为竖立状态。\n5. \
    \ 点击**删除**按钮。\n6.  完成重新排列和删除条目后，点击左上角的**完成**按钮。\n\n    ![images](img/U0915.jpg)\n\
    \n### 呼叫个人收藏联系人\n\n要呼叫**个人收藏**列表中的任何人，只需触摸该人的姓名。没有提示或确认。一旦您触摸他的名字，手机就会拨打他的号码（参见图\
    \ 9-3）。\n\n![images](img/0903.jpg)\n\n**图 9-3.** *通过点击来拨叫您的**个人收藏**之一*\n\n## 使用最近通话（通话记录）\n\
    \n使用**最近通话**类似于在其他智能手机上查看通话记录。\n\n当您触摸**最近通话**图标时，将显示所有最近通话的列表。您可以点击顶部的**全部**或**未接**按钮来缩小列表范围（参见图\
    \ 9-4）。\n\n![images](img/U0916.jpg)\n\n![images](img/0904.jpg)\n\n**图 9-4.** *使用**最近通话**屏幕*\n\
    \n### 从最近通话拨打电话\n\n从**最近通话**屏幕拨打电话很容易；只需触摸所需的姓名或电话号码，您的 iPhone 就会立即向该联系人发起通话。\n\
    \n### 清除所有最近通话\n\n要清除或删除所有最近通话记录条目，请按右上角的**清除**按钮。\n\n### 通话详情或联系人信息\n\n点击**最近通话**列表中姓名旁边的蓝色**箭头**图标![images](img/U0907.jpg)，您将看到该电话号码的信息，或者如果该联系人在您的**通讯录**中，则会看到其完整的联系人信息。如果有多个通话，您将看到每个通话的历史记录。\n\
    \n![images](img/U0917.jpg)\n\n滚动到联系人**信息**屏幕底部以查看更多选项。您可以发送**短信**、发起**FaceTime**视频通话，或通过电子邮件或彩信发送联系人信息来**共享联系人**。\n\
    \n![images](img/U0918.jpg)\n\n点击**添加到个人收藏**以将此联系人添加到您的**个人收藏**列表。\n\n### 从最近通话将电话号码添加到通讯录\n\
    \n如果**最近通话**条目是一个尚未关联到**通讯录**中联系人的电话号码，那么您将在**信息**屏幕上看到两个不同的按钮：**创建新联系人**和**添加到现有联系人**。\n\
    \n点击**创建新联系人**以从此电话号码创建新联系人。\n\n点击**添加到现有联系人**以将此电话号码添加到您现有的某个联系人中。\n\n![images](img/U0919.jpg)\n\
    \n## 从通讯录拨打电话\n\n将所有的联系人信息保存在手机中的一大好处是，从**通讯录**列表拨打电话非常容易。请按照以下步骤操作：\n\n1.  如果不在**电话**屏幕，请点击**电话**图标启动它（参见图\
    \ 9-5）。\n2.  触摸底部一行软键中的**通讯录**图标。\n3.  使用以下方法之一查找要呼叫的联系人：\n    *   在列表中向上或向下滑动。\n\
    \    *   将手指放在屏幕右侧的字母上，向上或向下滚动。\n    *   点击顶部显示时间的状态栏以跳转到列表顶部。点击**搜索**窗口，输入联系人的名字、姓氏或公司名称的若干字母来查找他。\n\
    4.  找到所需的联系人条目后，点击其姓名。\n5.  触摸您想要呼叫的电话号码。\n\n![images](img/0905.jpg)\n\n**图 9-5.**\
    \ *从**通讯录**列表拨打电话*\n"
- fmt: "# Calling Any Underlined Phone Number\n\nYou will notice that the iPhone underlines\
    \ almost every phone number it recognizes on the screen.\n\n![images](images/U0920.jpg)\n\
    \nThis happens in e-mail messages (e-mail signatures), SMS and iMessages, notes,\
    \ web sites, and more.\n\nTo call to any of these underlined phone numbers, tap\
    \ it, and then tap the `Call` button as shown.\n\n**TIP:** As with underlined\
    \ phone numbers, your iPhone also recognizes other information on the screen and\
    \ allows you to act on it by tapping it. This feature is known as a Data Detector.\
    \ You will see underlined addresses (tap to show the address in `Maps`), underlined\
    \ dates such as `tomorrow at 9am` (tap to schedule a new `Calendar` event), and\
    \ shipping numbers such as a FedEx or UPS tracking number (tap to show the tracking\
    \ information in `Safari`).\n\n## Creating a New Contact from an Underlined Phone\
    \ Number\n\nIf you press and hold any underlined phone number for a few seconds,\
    \ you will see a list of buttons appear from the bottom of the screen. Tap `Create\
    \ New Contact` to create a new contact from the number or tap `Add to Existing\
    \ Contact` if you want to add this number to a person already in your `Contacts`\
    \ list.\n\n![images](images/U0921.jpg)\n\n## Voice Dialing using Siri\n\nYou can\
    \ use your voice to dial contacts using Siri. You can find all the steps for doing\
    \ this in the “Siri” section of [Chapter 7](#Chapter07.html#ch7): “Multitasking\
    \ and Siri.”\n\n## Functions While on a Call\n\nYou can do a number of things\
    \ while your iPhone is dialing and even after you connect to the person you are\
    \ calling.\n\nAll the phone functions available to you are clearly shown with\
    \ the icons and buttons on the `Phone` screen.\n\nYou can do all of the following:\n\
    \n![images](images/U0922.jpg)\n\n*   Mute yourself.\n*   Dial additional numbers\
    \ with the `Keypad`.\n*   Turn on your phone's speakerphone by tapping `Speaker`.\n\
    *   Create a conference call by tapping `Add Call`.\n*   Start a video call with\
    \ `FaceTime` (assuming the other caller also has a `FaceTime`–enabled iPhone,\
    \ iPod touch, iPad, or Mac).\n*   View your `Contacts` list.\n\n**NOTE**: Why\
    \ does the screen go blank when you hold the phone to you ear? When you are talking\
    \ into the iPhone (holding the phone next to your face), the screen senses this\
    \ and goes blank so you can't accidentally press a button with your face. As soon\
    \ as you move the iPhone away from your face, you will see the available options.\n\
    \n### Using the Keypad\n\nPerhaps the number you're calling requires you to dial\
    \ an extension. Or maybe you are calling an automated answering service that requires\
    \ you to input numbers for choices.\n\n![images](images/U0923.jpg)\n\n![images](images/U0924.jpg)\n\
    \nIn these situations, just touch the `Keypad` icon and the keypad will be displayed.\
    \ You can then input numbers as prompted.\n\nFinally, press the `Hide Keypad`\
    \ button at the bottom when you're finished.\n\n![images](images/U0925.jpg)\n\n\
    ### Muting the Call\n\nAs the number is dialing, you will see the option in the\
    \ top-left row to mute the call. Just tap the `Mute` button to mute yourself.\
    \ Tap it again to turn off mute.\n\n![images](images/U0926.jpg)\n\n**TIP:** When\
    \ you have `FaceTime` enabled, you don't see the `Hold` button. Use the `Mute`\
    \ icon to put the call on hold.\n\n### Using the Speakerphone\n\nIf you would\
    \ prefer to use your iPhone's built-in speakerphone, tap the `Speaker` icon.\n\
    \nTap that same icon again to turn off the speakerphone.\n\n![images](images/U0927.jpg)\n\
    \n### Putting a Caller on Hold\n\nIt's a simple matter to put a caller on hold.\
    \ Simply tap the `Hold` icon to put the caller on hold.\n\n![images](images/U0928.jpg)\n\
    \n**NOTE:** You will only see the `Hold` icon if your `FaceTime` app is disabled\
    \ (go to `Settings` ![images](images/rtrif.jpg) `Phone`, and then set `FaceTime`\
    \ to `OFF`). As noted earlier, if you don't see a `Hold` icon, just tap the `Mute`\
    \ icon instead—it will accomplish the same result.\n\nIt's just as easy to take\
    \ someone off hold—tap the `Hold` button again to remove the hold.\n\n**NOTE:**\
    \ At the time of writing, Verizon's CDMA network did not officially support placing\
    \ a call on hold.\n\n### Browsing Your Contacts\n\n![images](images/U0929.jpg)\n\
    \nLet's say you need to browse through your `Contacts` list while on a call. For\
    \ example, you might need to look up someone's e-mail, phone number, or address,\
    \ so you can share it with your caller. Tap the `Contacts` button and scroll through\
    \ or search for a contact.\n\nTo return to the call, tap the green bar at the\
    \ top where it says `Touch to return to call`.\n\n![images](images/U0930.jpg)\n\
    \n**NOTE:** It's a good idea to use the speakerphone or a Bluetooth headset while\
    \ doing this (see [Chapter 5](#Chapter05.html#ch5): “AirPlay and Bluetooth”);\
    \ this will enable you to continue talking on the phone as you search for the\
    \ contact.\n\n### FaceTime Video Call\n\n![images](images/U0931.jpg)\n\nIf you\
    \ are chatting with someone who also has a recent iPhone, iPod touch, iPad, or\
    \ Mac, and this person is on Wi-Fi; then you can tap the `FaceTime` icon to start\
    \ a video call. (You may be able to use `FaceTime` on a 3G cellular connection\
    \ in the future; for now, however, this feature requires a Wi-Fi connection.)\
    \ You will see your picture in the top-left portion of the window and your caller's\
    \ picture in the main window. You will also notice three buttons at the bottom:\
    \ `Mute`, `End` call, and `Switch Camera` to swap between your front-facing and\
    \ rear-facing cameras.\n\n![images](images/U0932.jpg)\n\nSee [Chapter 11](#Chapter11.html#ch11):\
    \ “Video Messaging and Skype” for more on using `FaceTime`.\n\n**NOTE:** You will\
    \ only see this `FaceTime` icon if your `FaceTime` app is enabled (you can enable\
    \ it by going to `Settings` ![images](images/rtrif.jpg) `Phone`, and then setting\
    \ `FaceTime` to `ON`).\n\n## Setting up and Using Voicemail\n\nYour iPhone comes\
    \ with an enhanced voicemail system called *Visual Voicemail*. This feature allows\
    \ you to quickly see all voicemails and play them in any order. To listen to any\
    \ message, just tap it. In the image to the right, the number `3` in the red `Circle`\
    \ icon shows that there are three unheard voicemail messages.\n\n![images](images/U0933.jpg)\n\
    \n**NOTE:** If you live outside the US, your carrier may not have implemented\
    \ Visual Voicemail service. If not, then you will need to dial in to retrieve\
    \ your messages by pressing the `Voicemail` soft key, just as you would with any\
    \ other mobile phone.\n\n### Setting Up Voicemail\n\nIf you've never set up voicemail\
    \ before, setting it up on your new iPhone is straightforward; simply follow these\
    \ steps:\n\n1.  Tap the `Phone` icon.\n2.  Tap the `Voicemail` icon ![images](images/U0934.jpg)\
    \ in the bottom row of soft keys.\n3.  Tap the `Set Up Now` button shown in [Figure\
    \ 9–7](#Chapter09.html#fig_9_7).\n4.  Pick a four-digit password and then re-enter\
    \ the password.\n\n    ![images](images/0906.jpg)\n\n    **Figure 9–7.** Setting\
    \ up your voicemail\n\n5.  Next, you can choose a `Default` or `Custom` greeting.\
    \ The `Default` greeting will say your phone number in a computer-like voice;\
    \ it will also indicate that you are not available.\n\n    ![images](images/U0935.jpg)\n\
    \n6.  If you choose a `Custom` greeting, you will need to record it by tapping\
    \ the `Record` button. When done, tap the `Stop` button, which is in the same\
    \ place as the `Record` button.\n7.  Once recorded, you can tap the `Play` button\
    \ to see if you like your `Custom` greeting.\n\n**TIP:** If you hold the iPhone\
    \ too close to your mouth, your voice may sound a little distorted—be sure to\
    \ hold the iPhone at a normal distance.\n\n### Changing Your Voicemail Password\n\
    \nYou may want to change your password. Follow these steps to do so:\n\n1.  Navigate\
    \ to the `Settings` icon and tap it.\n2.  Scroll down and tap `Phone`.\n3.  Scroll\
    \ down and tap `Change Voicemail Password`.\n4.  Enter your current password,\
    \ and then type your new password twice."
