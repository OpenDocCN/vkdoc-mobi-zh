  trans: "\n# Facebook\n\nFacebook 创立于 2004 年 2 月。自那时起，它便成为用户与朋友、同事和家人联系、重新联络以及分享信息的首要平台。如今，超过\
    \ 8 亿用户将 Facebook 作为了解最重要的人近况的主要来源。\n\n**注意：** *您无法在 iPhone 上的* `Facebook` *应用或通过*\
    \ `Facebook.com` *网站玩 Facebook 游戏。* 如果您是重度 Facebook 游戏玩家，这可能会令您失望；不过，您通常可以从 App\
    \ Store 获取相同的游戏（例如 `FarmVille`），然后将其连接到您的电脑版 Facebook 以保留游戏进度。\n\n在您的 iPhone 上，发布本文时，您主要有三种方式访问您的\
    \ Facebook 页面：\n\n1.  使用 `Safari` 访问标准（完整）网站：[`www.facebook.com`](http://www.facebook.com)。\n\
    2.  使用 `Safari` 访问移动版网站：[`http://touch.facebook.com`](http://touch.facebook.com)。\n\
    3.  使用 iPhone 版 `Facebook` 应用。\n\n![image](img/U2501.jpg)\n\n**注意：** iPhone 版\
    \ `Facebook` 应用的功能比完整网站稍有限制，但导航起来要容易得多。\n\n## 连接 Facebook 的不同方式\n\n您可以使用 iPhone\
    \ 专用应用，或者在 `Safari` 浏览器中使用之前提到的两个 Facebook 网站之一来访问 Facebook。本章我们将重点介绍 iPhone 上的\
    \ `Facebook` 应用。\n\n### 下载并安装 Facebook 应用\n\n要查找该应用，请使用 App Store 中的 `Search`\
    \ 功能，直接输入“Facebook”。\n\n您也可以前往 App Store 的 `Social Networking` 类别，找到官方的 `Facebook`\
    \ 应用以及许多其他与 Facebook 相关的应用。\n\n**注意：** 有些应用看起来可能像是“官方”Facebook 应用，并且可能需要付费。然而，唯一真正的“官方”应用是右侧显示的\
    \ iPhone/iPod 应用。\n\n![image](img/U2502.jpg)\n\n要登录您的 Facebook 账户，您需要找到刚刚安装的图标并点击它。这里我们以\
    \ `Facebook` 为例，但其他应用的操作过程非常类似。\n\n成功下载 `Facebook` 后，图标应如下所示。\n\n![image](img/U2503.jpg)\n\
    \n## Facebook 应用\n\n要在您的 iPhone 上安装 `Facebook` 应用，请启动 `App Store` 并搜索“Facebook”。在\
    \ `Facebook` 应用列表中点击 `Install` 按钮。\n\n### Facebook 应用基础\n\n下载并安装 `Facebook` 后，您首先会看到\
    \ `Login` 屏幕。输入您的账户信息——您的电子邮件地址和密码。\n\n![image](img/U2504.jpg)\n\n首次登录后，您会看到一条\
    \ `Push Notifications` 警告消息。\n\n如果您希望允许这些消息（可能来自其他 Facebook 好友的戳一下、笔记、状态更新通知等），请点击\
    \ `OK`。\n\n登录后，您将看到 `Facebook` 主屏幕。点击 `Facebook` 标志可在应用中导航。\n\n![image](img/U2505.jpg)\n\
    \n### 在 Facebook 中导航\n\n通过点击页面顶部的 `Facebook` 字样，在 `Navigation` 图标和您当前位置之间切换。\n\
    \n例如，如果您在 `News Feed` 中，点击 `Facebook`，您将看到所有图标。再次点击 `Facebook`，您将返回 `News Feed`。\n\
    \n从图标页面，您可以访问您的 `News Feed`、`Profile`、`Friends`、`Messages`、`Places`、`Groups`、`Events`、`Photos`\
    \ 和 `Chat`。\n\n![image](img/U2506.jpg)\n\n### 与朋友交流\n\n请按照以下步骤，通过 iPhone 上的 `Facebook`\
    \ 应用与您 Facebook 上的朋友交流：\n\n1.  点击顶部的 `Facebook` 以查看所有图标。\n2.  点击 `Friends` 图标，将显示您的好友列表。\n\
    3.  点击某位好友，您将进入他的 Facebook 页面，在那里您可以在她的 `Wall` 上留言，并查看她的 `Info` 或 `Photos`。\n\n\
    ![image](img/U2507.jpg)\n\n### 使用 Facebook 应用上传照片\n\n在 Facebook 上上传照片是件简单又有趣的事。在此，我们向您展示如何在\
    \ `Facebook` 应用中上传照片：\n\n![image](img/U2508.jpg)\n\n1.  从 Facebook 主图标中，点击 `Photos`。\n\
    2.  选择一个相册，例如 Mobile Uploads。\n3.  点击 `What’s on your mind?` 框旁边的 `Camera`。\n\
    4.  点击 `Take Photo or Video` 按钮拍照或录制视频进行上传。或者，点击 `Choose From Library` 浏览 iPhone\
    \ 上的照片，直到找到您想要的那张。\n5.  接下来，如有需要，点击 `Write a caption…` 编写说明。\n6.  要完成上传，请点击蓝色的\
    \ `Upload` 按钮，照片将进入您的 Mobile Uploads 文件夹。\n\n**注意：** 上传照片时，图像质量不会与 iPhone 上的原始照片相同。\n\
    \n![image](img/U2509.jpg)\n\n![image](img/U2510.jpg)\n\n## Facebook 通知\n\n根据您的\
    \ Facebook 推送通知设置，您可能会收到大量更新、墙贴和邀请。如果您的 Facebook 好友不多，并且您想知道何时有人在您的墙上留言或评论帖子或照片，只需将推送通知设置为\
    \ `ON`，如下一节所示。\n\n当通知到达时，它会显示在通知中心，或者如果手机处于锁定状态，则会显示为锁屏信息。\n\n要从通知访问 Facebook，只需在屏幕上滑动\
    \ `Facebook` 图标，或滑动 `Arrow` 按钮解锁并阅读消息。\n\n![image](img/U2511.jpg)\n\n### 自定义 Facebook\
    \ 应用的设置\n\n以下是调整 `Facebook` 应用设置的方法：\n\n1.  点击 `Settings` 应用。\n2.  在左侧栏中点击 `Facebook`。\n\
    3.  现在您可以调整各种选项：\n    *   `Shake to Reload`：此功能可在您摇晃 iPhone 时重新加载或更新页面。\n    *\
    \   `Vibrate`：此功能在收到聊天或消息提醒时通过振动通知您。\n    *   `Play Sound`：此功能允许您为聊天和消息提醒添加提示音。\n\
    \n![image](img/U2512.jpg)\n\n请按照以下步骤调整推送通知设置：\n\n1.  点击 `Settings` 应用。\n2.  点击\
    \ `Notifications`。\n3.  向下滚动并点击 `Facebook`。\n4.  将 `Notification Center` 设置为 `ON`\
    \ 以接收推送通知。\n5.  点击 `Show` 选择列表中显示的通知数量。\n6.  将 `Alert Style` 设置为 `None`（无通知）、`Banners`（新通知中心样式的提醒）或\
    \ `Alerts`（旧式弹出通知）。\n7.  将 `Badge App Icon` 设置为 `ON`，以便在 `Facebook` 图标上看到新通知的数量。\n\
    8.  将 `Sounds` 设置为 `ON`，以便在收到通知时听到提示音。\n9.  设置 `View in Lock Screen`，即使手机处于锁定状态也能获取通知信息。\n\
    \n![image](img/U2513.jpg)\n\n**提示：** `Facebook` 应用会将 Facebook 个人资料照片导入到您的 `Contacts`\
    \ 列表中。根据照片的不同，这可能会相当有趣。然而，它也可能将您非 Facebook 联系人的信息上传到 Facebook 的服务器，这可能会引发您、您的家人和朋友的隐私担忧。\n"
- fmt: "### LinkedIn\n\n`LinkedIn` has core functionality very similar to `Facebook`,\
    \ but it tends to be focused on business and career interests. This is in contrast\
    \ to `Facebook`, which is focused more on personal friends and games. With `LinkedIn`,\
    \ you can connect and re-connect with current and past business associates, send\
    \ messages, see what people are up to, have discussions, and more.\n\nAt the time\
    \ of publishing, the status of `LinkedIn` was very similar to `Facebook`. You\
    \ can go to the regular `LinkedIn` site on the `Safari` browser, or you can download\
    \ the `LinkedIn` app for the `iPhone`.\n\nWhich is better? We liked the `LinkedIn`\
    \ app for the `iPhone` slightly better than the full `LinkedIn.com` site in `Safari`.\
    \ It was easier to navigate using the `LinkedIn` app with the large buttons, but\
    \ you could see more on the screen in the `Safari` version. We recommend giving\
    \ both options a try and seeing which you like better—it is really a matter of\
    \ personal preference.\n\n#### Downloading the LinkedIn App\n\nThe process for\
    \ downloading the `LinkedIn` app is similar to the process for downloading the\
    \ `Facebook` app. Start the `App Store` app on your `iPhone`, type \"LinkedIn\"\
    \ into the `Search` window, and then locate the app. The `LinkedIn` app is free,\
    \ so tap the `FREE` button to install it.\n\n![image](images/U2514.jpg)\n\n#####\
    \ Logging In to LinkedIn App\n\nOnce the app is installed, click the `LinkedIn`\
    \ icon and enter your login information.\n\n![image](images/U2515.jpg)\n\n![image](images/U2516.jpg)\n\
    \n##### Navigating Around the LinkedIn App\n\n`LinkedIn` has a zone-based navigation\
    \ system. Tap any stack to move to that zone, and then tap the `LinkedIn` logo\
    \ at the top to return to the Home screen.\n\n![image](images/U2517.jpg)\n\n#####\
    \ Communicating with LinkedIn Connections\n\nOne of the things you will most likely\
    \ do the most with the `LinkedIn` app is communicate with your connections. The\
    \ easiest way to do that is to follow these steps:\n\n![image](images/U2518.jpg)\n\
    \n1.  From the `Home` page, tap the `You` stack at the top right.\n2.  Tap the\
    \ `Connections` button midway down the screen.\n3.  Scroll through your connections\
    \ or tap the `Magnifying Glass` search icon and type in a connection name in the\
    \ `Search` box.\n4.  Tap the connection you are looking for.\n5.  Tap the `Phone`\
    \ icon to call him (if he has chosen to share a phone number) or the `Mail` icon\
    \ to send him a message.\n\n### Twitter\n\n`Twitter` was started in 2006. `Twitter`\
    \ is essentially an `SMS` (text message)–based social networking site. It is often\
    \ referred to as a micro-blogging site, and it is a place where the famous and\
    \ not-so-famous can share what’s on their mind. The catch is that you have only\
    \ 140 characters to get your point across.\n\nWith `Twitter`, you subscribe to\
    \ follow someone who tweets messages. You might also find that people will start\
    \ to follow you. If you want to follow us, we are `@garymadesimple` on `Twitter`.\n\
    \n### Setting up Twitter\n\nWith `iOS 5`, the `Twitter` app is built right into\
    \ your `iPhone`. This means that the app lets you share content like pictures\
    \ and posts from within other apps, like `Photos`. Follow these steps to set up\
    \ `Twitter`:\n\n1.  Tap the `Settings` app.\n2.  Scroll down and tap `Twitter`.\n\
    3.  If `Twitter` for the `iPhone` isn’t already installed on your `iPhone`, tap\
    \ the Install button to the right of the `Twitter` icon. (If `Twitter` for the\
    \ `iPhone` is already installed, the Install button will be grayed out.)\n4. \
    \ Tap User Name and enter your Twitter `@username`.\n5.  Tap `Password` and enter\
    \ your Twitter password.\n6.  Tap the `Sign In` button.\n7.  If you don’t have\
    \ a Twitter account, tap the `Create New Account` button at the bottom of the\
    \ screen and fill in the form to get one.\n\n    ![image](images/U2519.jpg)\n\n\
    8.  Once you’re logged in, tap Account to change your options.\n9.  If you want\
    \ your friends to be able to find you on Twitter based on your email address,\
    \ toggle Find me by `Email` to `ON`.\n10.  If you want your location to be recorded\
    \ every time you tweet from within an app, toggle `Tweet Location` to `ON`.\n\n\
    \    ![image](images/U2520.jpg)\n\n**NOTE:** If you tweet your location, potentially\
    \ anyone on Twitter could find out where you are—including the fact that you’re\
    \ not at home or work. If privacy is a concern, toggle `TweetLocation` to `OFF`.\n\
    \n#### Using Twitter\n\nThe official `Twitter` app takes a streamlined approach\
    \ to using Twitter. The `Home` screen shows you the tweets from those you are\
    \ following, and the full message is nice and large.\n\nAlong the bottom are five\
    \ icons, the first being the main `Twitter` feed. The other icons are `Mentions`,\
    \ `Direct Messages`, `Search`, and the `More` button, which takes you to your\
    \ `Profile`, `Favorites`, `Drafts`, `Lists`, and `Accounts and Settings`.\n\n\
    The `Compose Tweet` icon is in the top-left corner (see [Figure 25–1](#Chapter25.html#fig_25_1)).\n\
    \n![images](images/2501.jpg)\n\n**Figure 25–1.** *The layout of the `Twitter`\
    \ app's `Home` page*\n\n#### Refreshing Your List of Tweets\n\nTo refresh your\
    \ list of tweets, just pull down the main page and you will see the `Pull down\
    \ to refresh` notification at the top. Once the page is pulled down, you will\
    \ see a `Release to refresh` note. Release the page and it will refresh the tweets.\n\
    \n![image](images/U2521.jpg)\n\n#### Your Twitter Profile\n\nTo display your Twitter\
    \ profile, touch the `More` button and then touch `My Profile`.\n\nTo see your\
    \ tweets, just touch `Tweets`.\n\nTo see those tweets you have labeled as favorites,\
    \ touch the `Favorites` button.\n\nTo see those individuals you are following,\
    \ touch the `Following` button.\n\n**NOTE:** The number corresponding to your\
    \ followers, those you are following, and your tweets is displayed above the title\
    \ of the button.\n\nScroll down the page to see your `Retweets`; your `Lists`;\
    \ and `Services` to which you can subscribe.\n\n![image](images/U2522.jpg)\n\n\
    #### The Compose Button\n\nTouch the `Compose` button ![image](images/U2523.jpg)\
    \ and the `New Tweet` screen pops up. The character counter will count down from\
    \ 140 as you type your message. Here are some things you can do from the `New\
    \ Tweet` screen:\n\n*   Tap the @ symbol to search for other usernames to mention\
    \ in your tweet.\n*   Tap the # symbol to search for trending topics to tag in\
    \ your tweet.\n*   Tap the `Camera` icon to take a photo or video with your iPhone\
    \ or choose an existing one from your library to add to your tweet.\n*   Tap the\
    \ `Arrow` icon to add your current location to your tweet.\n\n![image](images/U2524.jpg)\n\
    \n#### Options within Tweet\n\nFrom your `Twitter` app's `Home` screen, just touch\
    \ one of your tweets for the following options:\n\n*   Tap the `Back Arrow` at\
    \ the bottom left of the screen to `Reply` to a tweet.\n*   Tap the square `Double\
    \ Arrows` to retweet or quote a tweet.\n*   Tap the `Star` icon to favorite a\
    \ tweet.\n*   Tap the `Paperclip` icon to view an attachment.\n*   Tap the `Action`\
    \ button to copy a link to tweet, mail a tweet, or translate a tweet.\n\n![image](images/U2525.jpg)\n\
    \n**NOTE:** Unlike with Facebook and LinkedIn, you can find a variety of alternative\
    \ third-party Twitter apps in the App Store. If you don't like the official `Twitter`\
    \ for iPhone app, try out `Tweetbot`, `Twitterrific`, or one of the many other\
    \ apps.\n\n## Chapter 26"
