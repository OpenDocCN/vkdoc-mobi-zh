  trans: "\n### 使用 iCloud 设置新 iPhone\n\n如果这是你的第一部 iPhone，或者你只想有个干净的新开始，请选择**设置为新 iPhone**。\n\
    \n**提示：** 从备份恢复——尤其是从不同设备的备份恢复（例如，从 iPad 备份恢复 iPhone）——有时会导致问题，例如应用崩溃更频繁或电池续航下降。如果你在从之前的备份恢复后遇到问题，可以尝试将手机设置为新\
    \ iPhone。你需要从头重新设置所有账户和偏好，并且会丢失所有已保存的应用和游戏数据；然而，如果你的 iPhone 已不稳定到无法日常使用，这有时是你唯一的选择。\n\
    \n要将手机设置为新 iPhone，你需要登录已有的 Apple ID，或者创建一个新的免费 Apple ID。Apple ID 可以是以下任意一种：\n\n\
    - **iTunes ID**：这是你用于登录 iTunes 并购买音乐、电视节目、电影、App Store 应用和游戏以及 iBooks 的电子邮件地址和密码。\n\
    - **免费 Apple ID**：这是你用于登录“查找我的 iPhone”、FaceTime、Game Center、iCloud 或任何其他近期免费 Apple\
    \ 服务的电子邮件地址和密码。它也可以是你用于在线 Apple Store 购物的同一个 ID。\n\n**注意：** 如果你使用 Apple 产品和服务已有一段时间，一个人拥有多个\
    \ Apple ID 的情况并不少见。例如，你可能有一个 iTunes ID、一个旧的 MobileMe 账户以及一个 Apple Store ID。遗憾的是，截至撰写本文时，Apple\
    \ 不允许合并这些 ID，因此你必须选择其中一个用于 iCloud。\n\n如果你有旧的 MobileMe 账户，Apple 会将其迁移到 iCloud。请访问\
    \ [`http://www.me.com/move`](http://www.me.com/move) 开始此流程。\n\n否则，作者建议你使用你的 iTunes\
    \ ID，因为它会关联你所有的音乐、媒体、应用和游戏购买记录，并且你将能够利用 iCloud 的重新下载功能，现在和将来都能轻松地将这些购买内容恢复到你的新设备上。\n\
    \n如果你已有 Apple ID，请立即登录，接受条款与条件，然后跳转到“配置 iCloud 选项”部分。如果你没有 Apple ID，请立即创建一个。\n\
    \n### 创建免费 Apple ID\n\n如果你从未使用过 iTunes，也没有 Apple ID，则需要创建一个。你可以在 iPhone 上快速完成此操作：\n\
    \n1.  轻点**创建新 Apple ID**。\n2.  滚动**年**、**月**和**日**滚轮输入你的生日以设置正确日期，然后轻点蓝色**下一步**按钮。\n\
    3.  在相应字段中输入你的名字和姓氏，然后轻点蓝色**下一步**按钮。\n\n    ![images](img/U0107.jpg)\n\n4.  选择是使用现有电子邮件地址（例如\
    \ Gmail、Hotmail、Yahoo! 或个人电子邮件地址），还是创建一个新的 iCloud 电子邮件地址（`@me.com`）。如果你不想费心记忆新的电子邮件地址，可能更愿意使用现有地址。如果你希望将电子邮件分开管理，那么可能更愿意创建一个新地址。\n\
    5.  如果你要创建新的 iCloud `@me.com` 地址，请输入密码并点击**验证**。你的密码必须“强”，即必须包含大写和小写字母、至少一个数字，并且长度至少为八个字符。\n\
    6.  选择一个**安全信息**问题。这应该是你容易记住，但别人很难轻易猜到的信息（意味着其他人无法仅通过查看你的博客、Facebook、Google、Yahoo!\
    \ 或其他在线个人资料页面来找到答案）。\n7.  选择是否希望从此新地址接收来自 Apple 的电子邮件更新。如果不想，请将此选项设置为**关闭**。\n\
    8.  你需要接受条款与条件两次：首先轻点左下角的蓝色**同意**按钮，然后在弹出确认框出现时轻点半透明的**同意**按钮。同样，验证可能需要几秒钟。\n\
    9.  随后，Apple 将设置你的新 Apple ID。这可能需要几秒钟。\n\n### 配置 iCloud 选项\n\n使用你的 Apple ID 登录后，即可配置你的\
    \ iCloud 设置：\n\n1.  如果你想使用**设置 iCloud**功能（我们建议你这样做，因为它是免费的，并提供大量有用的备份和同步功能），则保持\
    \ **iCloud** 选项设置为**开启**，然后轻点蓝色**下一步**按钮。\n2.  选择是使用 iCloud 备份服务通过无线方式将你的 iPhone\
    \ 备份到 Apple 的数据中心，还是通过 USB 使用 iTunes 备份到你的电脑。我们再次建议将 **iCloud** 设置为**开启**，因为它是自动的，你无需记住手动操作。\n\
    \n    ![images](img/U0108.jpg)\n\n3.  **查找我的 iPhone** 服务是 iCloud 的免费组成部分，它可以显示你手机的大致位置（你能知道它是在家里还是在办公室，但无法知道具体房间），可以让它响铃以便你在手机掉到汽车座椅下或沙发后面时找到它，甚至在手机丢失或被盗时擦除所有个人数据。如果你想使用此功能，请将此选项保持设置为**开启**。\n\
    4.  大功告成！你的 iPhone 现已设置完毕，可以开始使用了。\n\n### 使用 iCloud 恢复你的 iPhone\n\n如果你之前曾使用 iCloud\
    \ 备份过 iPhone，现在可以直接从你的设备通过无线方式从这个备份恢复：\n\n1.  轻点**从 iCloud 备份恢复**。\n2.  输入你的 iCloud\
    \ Apple ID 电子邮件地址和密码。\n3.  选择你想从中恢复的备份。通常，这将是最新的可用备份。\n4.  你的 iPhone 将重新启动、下载备份并再次重启。此过程可能需要几分钟，特别是当你有大量数据需要恢复时。\n\
    5.  一旦你的 iPhone 恢复完成，你的应用将开始下载和安装。iCloud 可以同时下载和安装多个应用，你可以在恢复过程中继续使用你的 iPhone。\n"
- fmt: '### Setting up Your iPhone Using iTunes


    If you don’t want to use iCloud or you have a previous iTunes back up you’d like
    to restore from, then you can still set up your iPhone over USB with your PC.


    If you do not have iTunes loaded on your computer, then open a web browser and
    go to [`www.itunes.com/download`](http://www.itunes.com/download). Download the
    software from the link provided.


    If you already have iTunes installed on your computer, you should check to see
    if an updated version is available. Version 10.5 was the latest version at the
    time of publishing. Follow these steps to update your version of iTunes:


    1.  Start the `iTunes` app.

    2.  If you are a Windows user, select `Help` from the menu, and then `Check for
    Updates`.

    3.  If you are a Mac user, select `iTunes` from the menu, and then `Check for
    Updates`.

    4.  If an update is available, then follow the instructions to update iTunes.


    #### Restoring Your iPhone From a Previous Backup


    The first time you connect your new iPhone to iTunes, you will see the screen
    shown in [Figure 1–2](#Chapter01.html#fig_1_2).


    ![images](images/0102.jpg)


    **Figure 1–2.** *Setting up your iPhone screen*


    **CAUTION:** We have heard of people experiencing problems (e.g., lock-ups and
    lower battery life) when they restore a backup from a non-iPhone (i.e., an iPad
    or iPod touch) to the iPhone. Also, selecting `Restore` assumes you have first
    made a backup of your old device; otherwise, there is no information to restore
    to your new iPhone.


    Do the following to restore from the backup of another iPhone or device:


    1.  Click the radio button to the left of `Restore from the backup of:`.

    2.  Select the particular backup file from the drop-down menu.

    3.  Click the `Continue` button to restore data to your iPhone from the backup
    file. You are now done with the initial setup of your iPhone.


    **NOTE:** You will still have to sync any apps, games, music, and other media
    you want to use on your new iPhone.


    ### Maintaining Your iPhone


    Now that you have set up your iPhone with iTunes, you will want to know how to
    safely clean the screen and keep it protected with various cases.


    #### Cleaning Your iPhone Screen


    After using your iPhone a little while, you will see that your fingers (or other
    fingers besides yours) have left smudges and oil on the formerly pristine screen.
    You will want to know how to safely clean the screen. One way to keep the screen
    cleaner throughout the day is to place a protective screen cover on the iPhone,
    which may also have the added benefit of cutting down on glare (discussed in the
    next section).


    We also recommend the following steps:


    1.  Turn off your iPhone by pressing and holding the `Sleep/Power` key on the
    top edge, and then use the slider to turn it off.

    2.  Remove any cables, such as the USB sync cable.

    3.  Rub the screen with a dry, soft, lint-free cloth (like a cloth supplied to
    clean eyeglasses or something similar).

    4.  If the dry cloth does not work, then try adding a very little bit of water
    to dampen the cloth. If you use a damp cloth, try not to get any water in the
    openings.

    5.  Another option is the `iKlear` screen cleaner from Klear Screen. This product
    works on your iPhone and other devices such as your computer, laptop or iPad screen.


    **CAUTION:** Never use household cleaners, abrasive cleaners such as Soft Scrub,
    or ammonia-based cleaners such as Windex, alcohol, aerosol sprays, or solvents.


    #### Cases and Protective Covers for Your iPhone


    Once you have your iPhone in your hands, you will notice how beautifully it is
    constructed. You will also notice that it can be fairly slippery, rock around
    a bit, or have the back get scratched when you are typing on it.


    We recommend buying a protective case for your iPhone. Average cases run about
    US $10–40, and fancy leather cases can cost US $100 or more. Spending a little
    to protect your iPhone, which costs $200 or more, makes good sense.


    #### Where to Buy Your Covers


    You can purchase an iPhone protective cover at any of the following locations:


    *   Amazon.com ([`www.amazon.com`](http://www.amazon.com))

    *   The Apple Accessory Store ([`http://store.apple.com`](http://store.apple.com))

    *   iLounge ([`http://ilounge.pricegrabber.com`](http://ilounge.pricegrabber.com))

    *   TiPB – The iPhone + iPad Blog Store ([`http://store.tipb.com/`](http://store.tipb.com/))


    You might also do a web search for "iPhone cases" or "iPhone protective covers."


    **TIP:** You *may* be able to use a case designed for another type of smartphone
    for your iPhone. If you go this route to save some money, just make sure your
    iPhone fits securely in the case or cover you choose.


    #### What to Buy...


    The following sections list some types of cases available for your iPhone and
    the price ranges you can expect to pay.


    ##### Rubber / Silicone Cases ($10–30)


    Rubber and silicone cases provide a cushioned grip, absorb iPhone bumps and bruises,
    and isolate the edges of the phone (antennas) from your fingers.


    **Pros**: These cases are inexpensive, colorful, and comfortable to hold. They
    also prevent your fingers from interfering with the iPhone antennas, which are
    the metal edges of the phone.


    **Cons**: They are not as professional as a leather case.


    ##### Combined Cases with External Battery Packs ($50-80)


    Cases combined with external battery packs serve a couple purposes: they combine
    the protective features of a hard shell case with a rechargeable external battery
    pack. Manufacturers such as Mophie and Case-Mate are busy working on iPhone versions
    of their cases; with some luck, they will be available by the time you read this
    book.


    **Pros:** These cases protect your iPhone and provide a tremendous boost in your
    battery life—in some cases, they boost battery life by more than 50%.


    **Cons:** They add weight and bulk to the phone.


    ##### Waterproof Cases ($10–40)


    Waterproof cases protect for your iPhone from water, allowing you to safely use
    the device in the rain, at the pool, at the beach, on a boat, and so on.


    **TIP:** If you like to row or paddle, then you will want a waterproof case. Check
    out the `SpeedCoach Mobile` app, which you can buy for about $65 from the App
    Store.


    ![images](images/U0109.jpg)


    **Pros**: These cases provide good protection from various sources of water.


    **Cons**: They can make the touch screen harder to use, and they usually do not
    protect from drops or bumps.


    ##### Hard Plastic / Metal Case ($20–40)


    Hard plastic and metal cases provide solid protection against scratches, bumps,
    and short drops.


    **Pros**: These cases provide superior protection for your phone.


    **Cons**: They add some bulk and weight. Also, you may need to remove such cases
    when charging your iPhone, or it might overheat.


    ##### Leather or Special Cases ($50–100+)


    Leather and other special cases provide more of a luxury feel and protect the
    iPhone.


    **Pros**: These cases add a touch of luxury to your phone, while also protecting
    the front and back of the device.


    **Cons**: They are more expensive and add bulk and weight.


    ##### Screen Protectors ($5–40)


    Screen and back glass protectors help you protect the screen and back of the iPhone
    from scratches.


    **Pros**: These cases help prolong the life of your iPhone by protecting it against
    scratches; most such cases also decrease screen glare.


    **Cons**: Some of these cases may increase glare or affect the touch sensitivity
    of the screen.


    ### iPhone Basics


    Now that you have your iPhone charged, with a clean screen, and decked out with
    a new protective case—let’s look at some of the basics for getting around its
    software.'
