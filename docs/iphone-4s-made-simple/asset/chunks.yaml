  trans: "\n# 故障排除\n\niPhone 通常非常可靠。但偶尔，就像你的电脑或任何复杂的电子设备一样，你可能需要重置设备或排除故障。在本章中，我们将为你提供一些有用的工具，帮助你的\
    \ iPhone 尽快恢复正常运行。我们将从一些基本的快速故障排除开始，然后在“高级故障排除”部分深入探讨更复杂的问题和解决方案。\n\n我们还将介绍一些与\
    \ iPhone 相关的其他琐碎事项，并为你提供一个可以寻求帮助的资源列表。\n\n## 基本故障排除\n\n首先，我们将介绍一些基本技巧和窍门，以便在 iPhone\
    \ 出现问题时让它恢复正常。\n\n### iPhone 无响应时该怎么办\n\n有时候，你的 iPhone 会对触摸无响应——它会在运行某个程序时突然死机。如果发生这种情况，请尝试以下步骤，看看\
    \ iPhone 是否会开始响应（参见 图 26-1）：\n\n![image](img/U2601.jpg)\n\n1.  按一次 `Home` 按钮，看看是否能退出应用程序回到\
    \ `Home` 屏幕。\n2.  如果某个特定的应用程序导致问题，尝试双击 `Home` 按钮打开 `App Switcher` 栏。接着，按住 `App\
    \ Switcher` 栏中的 *任意* 图标，直到它们都开始抖动，并且应用程序图标的左上角出现一个带有减号的红色 `Circle` 图标。\n\n   \
    \ ![image](img/U2602.jpg)\n\n3.  点击红色 `Circle` 图标关闭该应用。\n4.  如果 iPhone 仍然无响应，尝试按住\
    \ `Sleep/Power` 键，直到看到 `Slide to Power Off`。\n5.  长按 `Home` 按钮，直到返回 `Home` 屏幕——这应能强制退出程序。\n\
    6.  确保你的 iPhone 电量充足。尝试将其插入电源或连接到电脑（如果已插入），看看是否会开始响应。\n7.  如果长按 `Home` 按钮无效，你需要按住\
    \ `Power/Sleep` 按钮三到四秒钟来尝试关闭 iPhone。\n8.  接着，滑动屏幕顶部的 `Slide to Power Off` 滑块。如果无法关闭\
    \ iPhone，则需要重置 iPhone。请跳至下一节了解操作方法。\n9.  关闭 iPhone 后，等待大约一分钟，然后按住同样的 `Power` 按钮几秒钟来开启\
    \ iPhone。\n10. 你应该会看到屏幕上出现 `Apple` 标志。等待 iPhone 启动，之后你应该就能访问你的程序和数据了。\n\n![images](img/2601.jpg)\n\
    \n**图 26–1.** *基本故障排除步骤*\n\n如果这些步骤不起作用，你需要重置你的 iPhone。\n\n### 如何强制重启你的 iPhone\n\
    \n重置设备是处理 iPhone 无响应问题的另一种方法。执行此操作完全安全，并且通常可以解决许多问题（参见 图 26-2）。\n\n![images](img/2602.jpg)\n\
    \n**图 26–2.** *重置你的 iPhone*\n\n请按照以下步骤强制重启你的 iPhone：\n\n1.  用双手，同时按住 `Home` 按钮和\
    \ `Power/Sleep` 按钮。\n2.  保持按住这两个按钮大约八到十秒钟。你会看到 `Slide to Power Off` 滑块。忽略它，继续按住两个按钮，直到屏幕变黑。\n\
    3.  再过几秒钟，你应该会看到 `Apple` 标志出现。看到标志后，松开按钮，你的 iPhone 将被重置。\n\n### 如何软重置你的 iPhone\n\
    \n你可以在 `设置` 应用中重置多种项目，从 `主屏幕` 布局到网络设置，再到设备上的所有数据：\n\n1.  点击 `设置` 图标。\n2.  点击 `通用`。\n\
    3.  向上滑动以查看页面底部。\n4.  点击 `传输或还原 iPhone`。\n5.  点击 `还原所有设置` 以重置网络、键盘、`主屏幕` 布局和定位警告。在弹出的窗口中点击\
    \ `还原` 以确认。\n6.  点击 `抹掉所有内容和设置` 以清除 iPhone 上的所有内容，然后点击 `抹掉` 在弹出的窗口中确认。\n7.  点击\
    \ `还原网络设置` 以清除你所有的 Wi-Fi（和 3G）网络设置。\n8.  点击 `还原键盘词典` 以重置拼写词典。\n9.  点击 `还原主屏幕布局`\
    \ 以恢复为出厂布局；这会将 iPhone 的 `主屏幕` 恢复到其原始布局。\n10. 点击 `还原定位与隐私` 以重置你收到的关于允许应用使用你当前位置的警告信息。\n\
    \n![image](img/U2603.jpg)\n\n### 音乐、视频、提醒或电话铃声没有声音\n\n没有什么比错过电话、想听音乐或看视频却发现 iPhone\
    \ 没有声音更令人沮丧的了。通常，这个问题有一个简单的解决方法：\n\n1.  如果你听不到电话铃声或其他任何提醒，请检查确保设备左上边缘的 `静音` 开关没有打开。当开关拨向设备背面且旁边显示一点橙色时，你知道\
    \ `静音` 开关已打开。请确保 `静音` 开关被推向了设备正面，即关闭位置。\n2.  使用 iPhone 左上边缘的 `音量增大` 键检查音量。你可能不小心将音量调到了最低或静音。\n\
    3.  如果你正在使用有线耳机，请拔下耳机，然后重新插入。有时，耳机插孔连接不良。\n4.  如果你正在使用无线蓝牙耳机或蓝牙立体声设备，请遵循以下步骤：\n\
    \   1.  检查音量设置（如果耳机或立体声设备上有音量控制）。\n   2.  检查确保蓝牙设备已连接。点击 `设置` 图标，点击 `通用`，然后点击\
    \ `蓝牙`。确保看到你的设备已列出并且其状态为 `已连接`。如果未连接，则点击它并按照指示与 iPhone 配对。\n\n        **注意**：有时你可能实际上已连接到蓝牙设备但并未意识到。如果你连接到蓝牙立体声设备，则实际的\
    \ iPhone 将不会发出声音。\n\n5.  确保歌曲或视频未处于暂停模式。\n6.  打开 iPhone 的音乐或视频控制。双击 `Home` 按钮应打开\
    \ `App Switcher` 栏。从左向右滑动以查看你的媒体控制。\n7.  再向右滑动一次以查看音量控制。确认歌曲未暂停且音量未被调到最低。\n8.\
    \  最后，检查 `设置` 图标，看看是否你（或其他人）在 iPhone 上设置了 `音量限制`：\n   1.  点击 `设置` 图标。\n   2. \
    \ 向下滑动页面并点击 `音乐`。\n   3.  查看 `音量限制` 是否为 `开`。\n   4.  点击 `音量限制` 以检查设置级别。如果限制未锁定，只需将音量滑块滑动到更高水平。\n\
    \   5.  如果已锁定，你需要先点击 `解锁音量限制` 按钮并输入四位数字代码来解锁。\n\n如果这些步骤都无济于事，请查看本章后面的“其他故障排除和帮助资源”部分。如果那也没用，请尝试按照本章中“从备份恢复你的\
    \ iPhone”部分的步骤从备份文件恢复你的 iPhone。最后，如果这仍无帮助，请联系向你出售 iPhone 的商店或商家寻求帮助。\n"
- fmt: '#### If You Can''t Make Purchases from iTunes or the App Store


    You have this cool new device, so you decide to visit the iTunes Store or the
    App Store. But what if you receive an error message, or you are not allowed to
    make a purchase? Try these steps if this happens to you:


    1. Both stores require an active Internet connection. Make sure you have either
    a Wi-Fi connection or a cellular data connection. For assistance, check out [Chapter
    4](#Chapter04.html#ch4): "Connect to the Network."

    2. Verify you have an active iTunes account.


    ### Advanced Troubleshooting


    Thus far we''ve covered the basic troubleshooting steps on your iPhone. In the
    upcoming sections, we will delve into some more advanced troubleshooting steps.


    #### When Your iPhone Does Not Show Up in iTunes


    Occasionally, your iPhone may not be recognized by the `iTunes` app when you connect
    your iPhone to your PC or Mac. Consequently, your iPhone will not appear in the
    left nav bar.


    After you connect your iPhone to your computer, you should see it listed in the
    left nav bar under `DEVICES`. There are a few steps you can take to try and get
    the `iTunes` app to recognize your iPhone:


    1. Check the battery charge of the iPhone by looking at the battery level in the
    top right of the `Home` screen. If you have let the battery run too far down,
    the `iTunes` app won''t see it until the level of the battery rises a bit.

    2. If the battery is charged, try connecting the iPhone to a different USB port
    on your computer. Sometimes, if you have always used one USB port for the iPhone
    and switch it to another port, the computer won''t see it.

    3. If this still does not fix the problem, try disconnecting the iPhone and restarting
    the computer.

    4. Next, reconnect the iPhone to the USB port.

    5. If the `iTunes` app still doesn''t see your iPhone, then download the latest
    update to `iTunes`, or completely uninstall and reinstall the `iTunes` app on
    the computer. If you choose this option, make sure that you back up all the information
    in `iTunes` first.

    6. You also might want to try another sync cable, it could be possible that your
    USB sync cable is defective.


    #### Synchronization Problems


    Sometimes, you might encounter errors when synchronizing your iPhone with your
    computer (PC or Mac). How you address the problem depends on your sync method.


    ##### Using iTunes to Sync


    If you are using iTunes to sync your personal information, then follow these steps
    to resolve synchronization problems:


    1. First, follow all the steps we outlined in the "iPhone Does Not Show Up in
    iTunes" section of this chapter.

    2. If the iPhone still will not sync, but you can see it in the left nav bar of
    your `iTunes` app, go back to [Chapter 3](#Chapter03.html#ch3): "Sync with iCloud,
    iTunes, and More" and review your sync settings very carefully.


    ##### Using Apple''s iCloud or Microsoft Exchange to Sync


    If you are using the iCloud service or Microsoft Exchange method to sync your
    email and personal information, then follow these troubleshooting steps to resolve
    synchronization problems:


    1. Both iCloud and Exchange sync require a wireless Internet data connection in
    order to sync your email and personal information. Verify that you have a live
    data connection by checking Table 1 in the Quick Start Guide''s "Reading the Connectivity
    Status Icons" section.

    2. If you do not have a wireless data signal, then verify your Wi-Fi or 3G connection
    is set up correctly (see [Chapter 4](#Chapter04.html#ch4): "Connect to the Network").

    3. After you have verified your connection, you need to check that your sync settings
    are correct on your computer and iPhone (see [Chapter 3](#Chapter03.html#ch3)).


    **TIP:** Sometimes your problem can be as simple as a changed password. If this
    is the case, then make sure to correct your password on your iPhone for your sync
    settings. These are found by tapping your `Settings` icon, then tapping `Mail,
    Contacts and Calendars`. Finally, tap the account name and adjust the password.'
