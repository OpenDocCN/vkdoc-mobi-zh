  trans: "\n#### 在设备上设置您的 Google 或 Exchange 帐户\n\n请按照以下步骤为您的 Exchange 帐户或 Google 联系人和日历设置无线同步：\n\
    \n1.  轻触**设置**图标。\n2.  轻触**邮件、通讯录、日历**。\n3.  您会看到您的电子邮件帐户列表，其下方是**添加帐户**选项。\n\n\
    \    如果您尚未设置任何帐户，则只会看到**添加帐户**。无论哪种情况，都请轻点**添加帐户**。\n\n    ![images](img/U0313.jpg)\n\
    \n4.  在下一个屏幕上，选择**Microsoft Exchange**。\n\n    **注意：** 如果您希望与 Google 通讯录和日历进行无线同步，则应选择**Microsoft\
    \ Exchange**。如果您选择**Gmail**，将无法与 Google 通讯录进行无线同步。\n\n    ![images](img/U0314.jpg)\n\
    \n5.  输入您的电子邮件地址。\n\n    **提示：** 要输入电子邮件地址中的 `.com`（或 `.net`、`.edu`、`.org` 等），请长按**句号**（**.**）键，直到看到其上方出现\
    \ `.com` 键。滑动手指并按下 `.com`。\n\n    ![images](img/U0315.jpg)\n\n    **提示：** 由于您的电子邮件地址通常也是您的用户名，因此通过复制粘贴可以节省时间。\n\
    \n    ![images](img/U0316.jpg)\n\n    ![images](img/U0317.jpg)\n\n6.  将您的电子邮件地址复制并粘贴到**用户名**字段（当您的用户名与电子邮件地址相同，或者与电子邮件地址中\
    \ `@` 符号之前的部分相同时，此方法非常有效）：\n    1.  长按**电子邮件**字段，然后松开手指，即可看到其上方出现黑色弹出菜单。\n   \
    \ 2.  轻点**全选**。\n    3.  轻点**拷贝**。\n    4.  长按**用户名**字段，然后松开手指，即可看到弹出菜单。轻点**粘贴**。\n\
    7.  将**域**字段留空。输入您的**密码**。如果需要，您可以调整帐户的**描述**，该描述默认为您的电子邮件地址。\n8.  轻点右上角的**下一步**按钮。\n\
    9.  您可能会看到**无法验证证书**对话框。如果看到，请点击**接受**以继续。\n\n    ![images](img/U0318.jpg)\n\n\
    \    ![images](img/U0319.jpg)\n\n    ![images](img/U0320.jpg)\n\n10.  在**服务器**字段中，输入\
    \ `m.google.com` 以同步到 Google。否则，如果您正在设置 Exchange Server 帐户，请输入该服务器地址。\n11.  点击右上角的**下一步**。\n\
    12.  在此屏幕上，您可以选择将**邮件**、**通讯录**和**日历**的无线同步设置为**开**或**关**。对于您想要开启的每个同步，请轻点开关将其切换为**开**。\n\
    \n    ![images](img/U0321.jpg)\n\n**注意：** 如果您的 iPhone 上已有通讯录或日历项，您可能会看到一些警告出现。您的选择是**保留在我的\
    \ iPhone 上**或**删除**。如果您选择**取消**，您的 iPhone 将停止设置您的 Exchange 帐户。选择**保留在我的 iPhone\
    \ 上**以保留 iPhone 上所有现有的通讯录和日历事件。这些项目不会出现在您的 Exchange 帐户中——它们将保留在您的 iPhone 上。\n\n\
    ## 第 4 章\n\n## 连接到网络\n\n我们生活在一个互联的世界。无线互联网（Wi-Fi）接入已成为常态，而非例外——而且您很可能已经在家里或办公室使用\
    \ Wi-Fi。您可以使用它将 iPhone 连接到互联网。此外，由于您的 iPhone 还配备了 3G 蜂窝无线电，您也可以在拥有蜂窝数据覆盖的任何地方连接到互联网——其覆盖范围比\
    \ Wi-Fi 网络广泛得多。\n\n在本章中，我们将讨论 iPhone 的两种连接类型之间的区别：Wi-Fi（无线局域网）和 3G（蜂窝服务——您的手机使用的广域数据网络）。我们将向您展示连接或断开这两种网络的所有方法。例如，有时您会希望禁用或关闭\
    \ 3G 连接，仅使用 Wi-Fi 以节省数据连接费用。\n\n我们还将向您展示如何为携带 iPhone 出国旅行做好准备——您在旅行前、旅行中和旅行后需要做什么，以免回家后收到一张高额话费账单而大吃一惊。\n\
    \n我们还将向您展示如何使用*互联网共享*功能，该功能可以让您的 iPhone 成为笔记本电脑（无论是 PC 还是 Mac）的互联网中枢。当您没有其他方式将笔记本电脑连接到互联网时，这是一个很棒的功能。\n\
    \n最后，如果您在拥有 VPN（*虚拟专用网络*）的组织工作，我们将向您展示如何连接到该网络。\n\n### 连接到 Wi-Fi 或 3G 网络后我可以做什么？\n\
    \n以下是连接到 Wi-Fi 或 3G 网络后可以执行的一些操作：\n\n*   从 App Store 访问和下载应用程序（程序）。\n*   通过 iPhone\
    \ 上的 **iTunes** 应用访问和下载音乐、视频、播客等。\n*   使用 **Safari** 浏览网页。\n*   发送和接收电子邮件。\n*\
    \   使用需要互联网连接的社交网站，如 Facebook、Twitter 等。\n*   玩需要使用实时互联网连接的游戏。\n*   执行任何其他需要互联网连接的操作。\n\
    \n### Wi-Fi 连接\n\n每部 iPhone 都内置了 Wi-Fi 功能，因此让我们来看看如何连接到 Wi-Fi 网络。有关 Wi-Fi 连接需要考虑的事项包括：\n\
    \n*   网络接入和数据下载没有额外费用（如果您在家庭、办公室或免费的 Wi-Fi 热点使用您的 iPhone）。\n*   Wi-Fi 通常比蜂窝数据\
    \ 3G 连接更快。\n*   包括某些飞机在内的越来越多的地方提供 Wi-Fi 接入，但您可能需要支付一次性或月度服务费。\n\n**注意**：iPhone\
    \ 支持速度更快、范围更广的 802.11n 标准。但是，它仅在较为拥挤的 2.4 MHz 频段上支持 802.11n，而不支持不那么拥挤的 5 MHz 频段。如果您希望将\
    \ iPhone 与您的 802.11n Wi-Fi 路由器配合使用，请确保它是双频路由器，或者将路由器设置为 2.4 MHz。\n\n#### 连接到 Wi-Fi\
    \ 网络\n\n要设置您的 Wi-Fi 连接，请按照以下步骤操作：\n\n1.  轻点**设置**图标。\n2.  轻点靠近顶部的 **Wi-Fi**。\n\
    3.  确保 **Wi-Fi** 开关设置为**开**。如果当前为**关**，请轻点将其打开为**开**。\n4.  一旦 Wi-Fi **开启**，iPhone\
    \ 将自动开始搜索无线网络。\n5.  可访问的网络列表显示在**选取网络...** 选项下方。此屏幕截图显示我们有一个可用网络。\n6.  要连接到列出的任何网络，只需轻触网络名称。如果该网络不受保护（没有**锁定**图标），您将自动连接。\n\
    \n    ![images](img/U0401.jpg)\n\n#### 在需要通过网页登录的公共 Wi-Fi 热点进行连接\n\n在某些提供免费 Wi-Fi\
    \ 网络的场所，例如咖啡店、酒店或餐厅；一旦您的 iPhone 与该网络接触，就会弹出一个窗口。在这些情况下，只需轻点网络名称即可。您可能会进入 **Safari**\
    \ 浏览器屏幕以完成网络登录：\n\n1.  如果您看到类似所示窗口，请轻点您想要加入的网络名称。在右侧的案例中，我们轻点 **Panera** 网络。\n\
    \n    ![images](img/U0402.jpg)\n\n2.  在某些情况下，您可能会看到一个 **Safari** 窗口弹出，这可能会让人感到困惑，因为它在您的\
    \ iPhone 屏幕上显得非常小。您需要使用双击或捏合张开手势（请参阅快速入门指南获取帮助）来放大网页。您需要寻找一个写着**登录**、**同意**或类似文字的按钮。点击该按钮以完成连接。\n\
    \n    ![images](img/U0403.jpg)\n\n**注意**：某些地方，如咖啡店，使用基于网页的登录方式，而不是用户名/密码屏幕。在这些情况下，当您点击网络（或尝试使用\
    \ **Safari**）时，您的 iPhone 将打开一个浏览器屏幕，您会看到网页以及您的登录选项。\n"
- fmt: "# Secure Wi-Fi Networks—Entering a Password\n\nSome Wi-Fi networks require\
    \ a password to connect. This is set when the network administrator creates the\
    \ wireless network. You will have to know the exact password, including whether\
    \ it is case-sensitive.\n\nIf the network does require a password, then you will\
    \ be taken to the **Enter Password** screen. Type the password exactly as given\
    \ to you and press the **Enter** key on the on-screen keyboard (which is now labeled\
    \ **Join**).\n\nOn the **Network** screen, you’ll see a **Checkmark** icon showing\
    \ that you are connected to the network.\n\n![images](images/U0404.jpg)\n\n![images](images/U0405.jpg)\n\
    \n**TIP**: You can paste into the password dialog; so for longer, random passwords,\
    \ you can transfer them to your iPhone (in an email message) and just copy and\
    \ paste them. Just remember to delete the email immediately afterwards, so you\
    \ can keep things secure. Tap and hold the password in the mail message, select\
    \ it, and then tap **Copy**. In the Wi-Fi network **Password** field, tap and\
    \ then select **Paste**.\n\n![images](images/U0406.jpg)\n\n## Switching to a Different\
    \ Wi-Fi Network\n\nAt times you may want to change your active Wi-Fi network.\
    \ This might occur if you are in a hotel, apartment, or other place where the\
    \ network selected by the iPhone is not the strongest network, or you want to\
    \ use a secure network instead of an unsecure one.\n\nTo switch from the currently\
    \ selected Wi-Fi network, tap the **Settings** icon, touch **Wi-Fi**, and then\
    \ touch the name of the Wi-Fi network you want to join. If that network requires\
    \ a password, you’ll need to enter it to join.\n\nOnce you type the correct password\
    \ (or if you touched an open network), your iPhone will join that network.\n\n\
    ## Verifying Your Wi-Fi Connection\n\nIt is easy to see if you are connected to\
    \ a network (and which one) by looking next to the **Wi-Fi** setting in your main\
    \ **Settings** screen. Follow these steps to check your Wi-Fi connection status:\n\
    \n1.  Tap your **Settings** icon.\n2.  Look next to the **Wi-Fi** option at the\
    \ top:\n    *   If you see **Not Connected**, you do not have an active Wi-Fi\
    \ connection.\n    *   If you see some other name, such as **Panera**, then you\
    \ are connected to that Wi-Fi network.\n\n![images](images/U0407.jpg)\n\n## Advanced\
    \ Wi-Fi Options (Hidden or Undiscoverable Networks)\n\nSometimes you may not be\
    \ able to see the network you want to join because the name has been hidden (the\
    \ SSID is not being broadcast) by the network administrator. Next, you will learn\
    \ how to join such networks on your iPhone. Once you have joined such a network,\
    \ you will join that network automatically the next time you come into contact\
    \ with it—with no prompt from your iPhone. You can also tell your iPhone to ask\
    \ every time it joins a network; we will show you how to do that, as well. Sometimes\
    \ you may want to erase or forget a network. For example, perhaps you were at\
    \ a one-time convention and want to get rid of the associated network—you’ll learn\
    \ how to do that, too.\n\n### Why Can’t I See the Wi-Fi Network I Want to Join?\n\
    \nSometimes, for security reasons, people don’t make their networks discoverable\
    \ (they hide the network name, called the SSID), and you have to manually enter\
    \ the name and security options to connect to it.\n\n**As you can see, your list\
    \ of available networks includes Other.**\n\n1.  Tap the **Other** button, and\
    \ you can manually enter the name of a network you would like to join.\n\n   \
    \ ![images](images/U0408.jpg)\n\n2.  Type in the Wi-Fi network **Name**.\n3. \
    \ Tap the **Security** tab.\n\n    ![images](images/U0409.jpg)\n\n4.  Choose which\
    \ type of security is being used on that network. If you are unsure, you’ll need\
    \ to find out from the network administrator.\n\n    ![images](images/U0410.jpg)\n\
    \nWhen you have the information you need, enter it along with the proper password,\
    \ and this new network will be saved to your network list for future access.\n\
    \n### Reconnecting to Previously Joined Wi-Fi Networks\n\nThe nice thing about\
    \ the iPhone is that, when you return to an area with a Wi-Fi network you previously\
    \ joined (whether it was an open or a secure, password-protected, network), your\
    \ iPhone will automatically join the network again without asking you first. However,\
    \ you can turn off this automatic-joining feature, as described in the next section.\n\
    \n#### The Ask to Join Networks Main Switch\n\nThere is a main **Ask to Join Networks**\
    \ switch, which is set to **ON** by default. Known networks are joined automatically,\
    \ but this only takes effect if no known networks are available. With this switch\
    \ set to **ON**, you will be asked to join visible Wi-Fi networks. If networks\
    \ are available that are not known to you, you will be asked before being connected.\n\
    \nIf the switch is set to **OFF**, you will have to manually join unknown networks.\n\
    \nWhy might you want to turn off this feature?\n\nDoing so could be a good security\
    \ measure if, for example, you don’t want your kids to be able to join a wireless\
    \ network on the iPhone without your knowledge.\n\nIt can also be annoying if\
    \ your iPhone is continuously popping up the **Join Network** connector screen\
    \ in areas where you don’t want to join Wi-Fi, such as when traveling through\
    \ a place with many hotspots.\n\n![images](images/U0411.jpg)\n\n#### Ask to Join\
    \ and Ask to Login Switch on Each Network\n\nSometimes, you may find that a particular\
    \ Wi-Fi network has additional switches that override the main **Ask to Join Networks**\
    \ switch. Tap the little blue **Arrow** icon ![images](images/U0412.jpg) next\
    \ to the network name to see details about this Wi-Fi network. **Auto-Join** and\
    \ **Auto-Login** are set to **ON** by default.\n\nTo disable **Auto-Join** or\
    \ **Auto-Login**, tap each switch to set it to **OFF**.\n\n![images](images/U0413.jpg)\n\
    \n#### Forget (or Erase) a Network\n\nIf you find that you no longer want to connect\
    \ to a network on your list, you can **Forget it**—i.e., take it off your list\
    \ of networks. Follow these steps to do so:\n\n1.  Tap the **Settings** icon.\n\
    2.  Tap **Wi-Fi** to see your list of networks.\n3.  Tap the small blue **Arrow**\
    \ ![images](images/U0415.jpg) next to the network you want to forget in order\
    \ to see the screen shown here.\n4.  Tap **Forget this Network** at the top of\
    \ the screen.\n\n    ![images](images/U0414.jpg)\n\n    ![images](images/U0416.jpg)\n\
    \n5.  You will be prompted with a warning. Just touch **Forget** and the network\
    \ will no longer show up on your list.\n\n    ![images](images/U0417.jpg)\n\n\
    ## Cellular Data Connection\n\nYour iPhone can also connect to the cellular data\
    \ network—the same network you connect to with other mobile phones. Here are things\
    \ to consider about cellular data connections:\n\n*   They provide wider availability\
    \ than a Wi-Fi connection—you can connect to 3G in a car or away from a city,\
    \ whereas Wi-Fi is not typically available in these locations.\n*   There are\
    \ extra monthly service fees for access to the cellular data network.\n\n**NOTE**:\
    \ Check with your local wireless carrier for iPhone data plan pricing in your\
    \ country."
