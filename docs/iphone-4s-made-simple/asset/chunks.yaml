- fmt: '#### Using AssistiveTouch


    If you have difficulty touching the screen or have a special accessory that helps
    you with the touch screen, you will want to turn on AssistiveTouch. You do this
    in the same Accessibility section of `Settings`.


    Once you turn it on, you will see a small white circle in the lower right corner
    of your screen. Tap the small circle to bring up the `AssistiveTouch` menu.


    ![images](images/U0212.jpg)


    Assistive touch will allow you to do the following:


    * Tap `Gestures` to simulate 2, 3, 4 or 5 finger gestures.

    * Tap `Favorites` to access your custom gestures.

    * Tap `Device` to access common device commands such as screen rotation, mute,
    volume, shake and lock screen.

    * Tap the `Home` icon to simulate actually clicking the `Home` button.


    ![images](images/U0213.jpg)


    You can even set up custom gestures to access from the Favorites menu.


    Tap `Create New Gesture`, then use your fingers to make an on-screen gesture by
    moving your fingers on the screen. You will see white lines follow the location
    of your finger tips.


    Then, tap the `Stop` button.


    Press `Play` to see if your gesture is correct and finally, tap `Save` at the
    top and give your new gesture a name.


    You will then see your new gesture appear in the `Favorites` menu in Assistive
    Touch.


    ![images](images/U0214.jpg)


    #### Using Zoom to Magnify the Entire Screen


    You may want to turn on the Zoom feature if you find the text, icons, buttons,
    or anything else on the screen a little too hard to see. With the Zoom feature
    turned on, you can zoom the entire screen to almost twice its normal size—everything
    is much easier to read.


    **NOTE:** You cannot use VoiceOver and Zoom at the same time; you need to choose
    one or the other. Instead of magnifying the entire screen, you can also increase
    just the font sizes for your major apps using the Large Text feature. We will
    show you how in the "Use Larger Text Size for Easier Reading" section.


    Follow these steps to enable the `Zoom` feature:


    1. Tap the `Settings` icon.

    2. Tap `General`.

    3. Tap `Accessibility` near the bottom of the page.

    4. Tap `Zoom`.

    5. Set the switch next to `Zoom` to `ON`.


    Similar to VoiceOver, Zoom uses three-fingered gestures. Make sure to study these
    before you leave this screen.


    ![images](images/U0215.jpg)


    #### White on Black


    If the contrast and colors on your screen are difficult to see, then you might
    want to set the `White on Black` setting to `ON`. Follow these steps to do so:


    1. Go to the `Accessibility` screen in the `Settings` app, as shown previously.

    2. Set the `White on Black` switch to `ON`. With this option set to `ON`, everything
    that was light on the screen becomes black, and everything that was dark or black
    becomes white.


    ##### Use Larger Text Size for Easier Reading


    You can really expand the size of your fonts in the `Contacts`, `Mail`, `Messages`,
    and `Notes` apps by using the Large Text feature. Follow these steps to do so:


    1. Tap the `Settings` icon.

    2. Tap `General`.

    3. Tap `Accessibility` near the bottom of the page (you need to swipe down).

    4. Tap `Large Text`. You will then see a screen of font size options: `Off`, `20pt
    text`, `24pt text`, `32pt text`, `40pt text`, `48pt text`, and `56pt text`. Tap
    the size you want to use. The image shown to the right uses the 48pt font.

    5. Tap the `Accessibility` button in the upper-left corner to return to the previous
    screen, then tap the `Home` button to exit `Settings`.


    ![images](images/U0216.jpg)


    #### Triple-Click Home Button Options


    You can set a triple-click of the `Home` button to do various things related to
    accessibility. Follow these steps to adjust these options:


    1. Go to the `Accessibility` screen in the `Settings` app, as shown previously.

    2. Tap `Triple-click the Home Button` near the bottom of the page.

    3. Choose from `Off`, `Toggle VoiceOver`, `Toggle White on Black`, or `Ask`.


    ### Using the Magnifying Glass for Editing Text or Placing the Cursor


    How many times have you been typing something and wanted to move the cursor precisely
    between two words or letters?


    This can be hard to do until you figure out the Magnifying Glass trick. What you
    do is this: Touch and hold your finger on the place where you want the cursor
    (see [Figure 2–4](#Chapter02.html#fig_2_4)). After a second or two, you will see
    the `Magnifying Glass` icon appear. Then, as you hold your finger on the screen,
    slide it around to position the cursor. When you let go, you will see the `Copy
    and Paste` pop-up menu, but you can ignore it.


    ![images](images/0204.jpg)


    **Figure 2–4.** *Touch and hold the screen to see the `Magnifying Glass` icon
    and place the cursor.*


    ### Typing Numbers and Symbols


    How do you type a number or a symbol using the iPhone''s on-screen keyboard? When
    you are typing, tap the `123` key in the lower-left corner to see numbers and
    common symbols such as `$ ! ~ & = # . _ - +`. If you need more symbols, from the
    `Numbers` keyboard tap the `#+=` key just above the `ABC` key in the lower-left
    corner (see [Figure 2–5](#Chapter02.html#fig_2_5)).


    ![images](images/0205.jpg)


    **Figure 2–5.** *Switching between the `Letters`, `Numbers`, and `Symbols` keyboards*


    **TIP:** After you type a number or symbol, notice that the `Numbers` keyboard
    will stay active until you either hit the `Space` key or press the key for another
    keyboard, such as the `ABC` key for the `Letters` keyboard.


    #### Touch and Slide Trick


    One cool technique that you can apply in various areas is the touch-and-slide
    trick. We''ll cover what this is and how you can take advantage of it in the next
    couple of sections.


    ##### Typing Uppercase Letters


    To type uppercase letters, you would normally press the `Shift` key, and then
    press the desired letter.


    The faster way to type single uppercase letters and symbols that require the `Shift`
    key is to press the `Shift` key, keep your finger on the keyboard, slide over
    to the key you want, and then release.


    For example, to type an uppercase "D," press the right `Shift` key, then slide
    over to the `D` key and release.


    ![images](images/U0217.jpg)


    ##### Rapidly Typing a Single Number


    If you have to type just a single number, then press the `123` key and slide your
    finger up to the number. However, to type several numbers in a row, it''s best
    to press the `123` key, let go, and then press each number.'
