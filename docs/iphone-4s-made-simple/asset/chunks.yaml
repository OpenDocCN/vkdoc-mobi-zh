  trans: '

    ### 阅读 iBooks


    轻触资料库中的任意标题即可打开阅读。书籍会从第一页打开，通常这一页是扉页或其他称为*前辅文*的内容。


    ![images](img/U1314.jpg)


    在左上角，紧邻`资料库`按钮旁，你可以看到一个`目录`按钮。要跳转到目录，可以轻触`目录`按钮，或者直接翻页到目录处。


    ![images](img/U1315.jpg)


    你可以通过三种方式翻页。首先，轻触页面的右侧可以翻到下一页。其次，可以缓慢地长按页面右边缘，在持续触摸屏幕的同时，轻柔缓慢地将手指向左滑动。


    **提示**：如果你非常缓慢地移动手指，就能在“翻动”页面时看到背面的文字——这是一种非常酷的视觉效果。


    #### 自定义阅读体验：亮度、字体和字号


    在书籍上方中央区域，有三个可用图标：`亮度`、`字号`和`搜索`。这些选项有助于让你的阅读体验更加沉浸。


    轻触`亮度`图标，你可以调节书籍的亮度。


    ![images](img/U1316.jpg)


    ![images](img/U1317.jpg)


    如果你在一个非常昏暗的房间里躺在床上阅读，你可能希望将`亮度`滑块向左滑到底来调暗屏幕。如果你在阳光下阅读，则可能需要将滑块向右滑到底。但请记住，高屏幕亮度比大多数其他功能更耗电，因此在不需要屏幕那么亮时，请将此功能调回较低亮度。


    **注意**：上述提示仅调节`iBooks`内的亮度。要调节 iPhone 的全局亮度，请使用`设置`应用（前往`设置`图标 > `亮度与墙纸`）。


    `字号与字体`图标让你可以根据偏好调整字体数值。


    **增大字号**的操作方法：

    多次轻触大写的`A`图标。


    **减小字号**的操作方法：

    多次轻触小写的`a`图标。


    在本书撰写时，共有六种可用字体样式——但当你阅读此书时，可能会有更多字体可供选择。


    ![images](img/U1318.jpg)


    试试看，体验不同的字体。默认选择是 Palatino 字体，但所有字体看起来都很棒，更大字号对某些人来说会有所不同。目标是调整字号，使文本尽可能舒适易读。


    #### 使用内置词典扩充词汇量


    `iBooks`包含一个非常强大的内置词典，当你遇到生僻或不熟悉的单词时，它会非常有用。


    **注意**：首次尝试使用词典时，你的 iPhone 需要下载它。请按照屏幕上的提示下载词典。


    访问词典再简单不过了。只需长按书中的任意单词。一个弹出窗口会出现，提供多种选项，让你可以高亮单词、创建笔记或搜索该单词的其他出现位置。


    ![images](img/U1319.jpg)


    ![images](img/U1320.jpg)


    轻触`词典`，该单词的发音和释义就会显示出来。轻触`完成`即可退出词典并返回书籍。


    #### 设置页内书签


    有时你可能想设置一个文本内的书签以便日后参考。


    右上角显示了一个`书签`图标。轻触`书签`图标，该页面上的图标会变为红色书签。


    要查看书签，只需轻触屏幕左上角的`目录`图标（紧邻`资料库`图标），然后轻触`书签`。轻触高亮显示的书签，你就会跳转到书中的相应部分。


    ![images](img/U1321.jpg)


    **提示**：你无需在每次离开`iBooks`时都设置书签。该应用会自动记住你在某本书中停止阅读的位置。无论你打开并阅读了多少本书，这一点都适用，因此你总是能准确地返回到某本书中停止阅读的地方。`iBooks`应用还会与
    iPad 上的`iBooks`版本同步，这样你可以在不同设备间切换，并保持在某本书中的阅读位置。


    #### 使用高亮和笔记


    `iBooks`应用中有一些非常棒的“附加功能”。例如，有时你可能想高亮某个特定单词以便日后回顾。还有时候，你可能想在页边给自己留个笔记。


    在`iBooks`中，这两件事都非常容易做到。


    ##### 高亮文本


    按照以下步骤在`iBooks`应用中高亮文本：


    ![images](img/U1322.jpg)


    1.  长按任意单词以调出菜单选项。

    2.  从菜单中选择`高亮`。

    3.  要移除高亮，轻触该单词，然后选择`移除高亮`。


    更改高亮颜色只需按照以下步骤操作：


    ![images](img/U1323.jpg)


    1.  轻触高亮显示的单词。

    2.  从菜单中选择`颜色`。

    3.  选择一种新颜色。


    ![images](img/U1324.jpg)


    ##### 添加笔记


    在`iBooks`的页边添加笔记同样简单：


    1.  像之前一样，长按任意单词。

    2.  从菜单中选择`笔记`。

    3.  输入你的笔记，然后轻触`完成`。笔记现在会出现在页边（参见图 13-1）。


    **提示**：你的笔记也会出现在标题页的书签下方。只需轻触`标题页`按钮，然后轻触`书签`。你可以在页面底部找到你写的笔记。


    你可以像更改高亮颜色一样更改笔记的颜色！


    ![images](img/1301.jpg)


    **图 13-1.** *在`iBooks`中使用笔记功能*


    #### 使用搜索


    `iBooks`内置了强大的搜索功能。只需轻触`搜索`图标，内置键盘就会弹出（与 iPhone 上的其他程序一样）。输入你要搜索的单词或短语，你会看到包含该单词的章节列表。


    只需轻触所选内容，你就会跳转到书中的相应部分。你还可以通过轻触`搜索`窗口底部的相应按钮，直接跳转到 Google 或维基百科进行搜索。


    **注意**：使用维基百科或 Google 搜索会使你离开`iBooks`并启动`safari`。


    ### 移动和删除书籍


    从 iBooks 资料库中删除书籍与从 iPhone 上删除应用非常相似。你可以通过轻触`资料库`视图中的`编辑`按钮来删除或移动 iBooks。


    左上角。![images](img/U1325.jpg)


    一旦你轻触`编辑`按钮，你会注意到每本书的左上角出现了一个小的黑色“**x**”。


    ![images](img/U1326.jpg)


    只需轻触“**x**”，系统就会提示你删除这本书。一旦你轻触`删除`，该书就会从书架上消失。


    ![images](img/U1327.jpg)

    '
- fmt: '# Other E-Book Readers: Kindle and Kobo


    ![images](images/U1328.jpg)


    As we have noted, the `iBooks` app offers an unparalleled e-book reading experience.
    However, there are other e-book reader apps available for the iPhone that are
    worth checking out.


    Many users already have a Kindle and have invested in a Kindle library. Others
    use the `Kobo` e-reader software (formerly called `shortcovers`) and have invested
    in a library of books for that platform.


    ![images](images/U1329.jpg)


    Fortunately, both e-book platforms have apps in the iPhone App Store. When either
    program is downloaded and installed, you can sign in and read your complete library
    for its respective platform on your iPhone.


    **NOTE**: No matter which of these other e-readers you choose, you can always
    just "sign in," see your complete library, and pick up just where you left off
    in your last book—even if you started reading on a different device.


    ## Download E-Reader Apps


    It''s a trivial matter to download alternative e-reader apps. Simply go to the
    AppStore, touch `Categories`, and then touch `Books`. In this section, you will
    find the `Kindle` and `Kobo` apps. Both are free apps, so just touch the `Free`
    button to begin downloading one of them.


    **TIP**: It is usually faster to search by the name of the app if you know which
    one you are looking for.


    Once your desired e-reader software is installed, touch the app''s icon to start
    it.


    ## The Kindle Reader


    Amazon''s Kindle reader is the world''s most popular e-reader. Millions of people
    have Kindle books, and the `Kindle` app allows you to read your Kindle books on
    your iPhone.


    The iPhone and iPad versions of the `Kindle` app have just been updated to support
    audio and video, making these versions even more advanced than the one found on
    the Kindle hardware itself.


    **TIP**: If you use a Kindle device, don''t worry about signing in from your iPhone.
    You can have several devices tied to a single account. You will be able to enjoy
    all the books you''ve purchased for your Kindle right on the `Kindle` app on the
    iPhone.


    To use the `Kindle` app on your iPhone, just touch its icon and either sign in
    to your Kindle account or create a new account with a user name and password.


    ![images](images/U1330.jpg)


    Once you sign in, you will see your Kindle books on the `Home` page. You can touch
    a book to start reading it.


    ![images](images/U1331.jpg)


    **NOTE**: In order to buy or download new books, you need to go to `www.amazon.com`
    in the `safari` web browser. Once you''ve bought or downloaded a new book to your
    account, it will appear in the `Kindle` app.


    To read a Kindle book, touch its cover and it will open.


    ![images](images/U1332.jpg)


    To see the options for reading, just touch the screen and they will be shown along
    the bottom row of icons.


    You can add a bookmark by touching the `Plus` (`+`) button. Once the bookmark
    is set, the `Plus` (`+`) button turns into a `Minus` (`-`) button.


    You can go to the cover, table of contents, or beginning of the book (or specify
    any other location in the book) by touching the `Book` button.


    The font, as well as the color of the page, can be adjusted. One very interesting
    feature is the ability to change the page to `Black`—which is great when reading
    at night.


    To advance pages, either swipe from right to left or touch the right side of the
    page. To go back a page, just swipe from left to right or touch the left side
    of the page.


    Tap the screen and a slider appears at the bottom; you can move this to advance
    to any page in the book.


    To return to your list of books, just touch the `Home` button.


    ## The Kobo Reader


    Like the `Kindle` reader, the `Kobo` reader begins by asking you to sign into
    your existing Kobo Books account. All of your existing Kobo Books will then be
    available for reading.


    ![images](images/U1333.jpg)


    Kobo''s `shelf` view uses a bookshelf metaphor, similar to the one used by `iBooks`.
    Tap the book cover for whichever book you wish to open.


    Or, you can touch the `List` tab to see your books organized in a `List` view.


    Open any book, and you will see two buttons along the top of the Kobo reader:
    `i''m Reading` and `settings`.


    ![images](images/U1334.jpg)


    Touching the `i''m Reading` button places a bookmark where you left off in the
    book and returns the screen to your `shelf` view.


    Touching the `settings` button will display a series of buttons along the bottom
    of the screen for viewing bookmarks, seeing information about the book, and adjusting
    the page transition style and font. Under those buttons are four icons: `Font`,
    `Brightness`, `screen Lock`, and `Nighttime Reading`. Touch any of these buttons
    to make adjustments to your viewing.


    ![images](images/U1335.jpg)


    ![images](images/U1336.jpg)


    To advance pages in the `Kobo` reader, touch the right side of the page. To go
    back a page, just touch the left side of the page. You can also use the slider
    at the bottom to advance through the pages.


    # Chapter 14


    # Newsstand and More


    In the last chapter, we spoke about how the iPhone has revolutionized the world
    of reading with iBooks. Not only is the iPhone unparalleled for reading e-books,
    it''s Newsstand folder is unequaled in dealing with new media such as online newspapers
    and magazines. Plus, the App Store makes it easy to find comic books readers,
    PDF readers, and more. The iPhone is even set to revitalize the comic book industry
    with comic books that look beautiful and are amazingly interactive.


    In this chapter, we''ll explore how to enjoy new media using the iPhone''s vivid
    screen and terrific touch interface.


    ## Newsstand


    The Newsstand is a special folder on your iPhone''s Home screen that looks like
    a bookshelf and collects and organizes all your magazine and newspaper apps. This
    folder does not behave like a regular iPhone folder. If a magazine or newspaper
    app supports Newsstand, then it will show you the latest cover art or front page
    for that periodical sitting on the shelf, rather than the Newsstand Folder icon
    (you will also see this cover or front page in the Fast App Switcher).


    If the magazine or newspaper app offers subscriptions and you''re a subscriber,
    then Newsstand apps can also automatically download the latest issues overnight,
    so you have something new to read when you open it in the morning.


    ![images](images/U1401.jpg)


    The Newsstand folder also has a `Store` button that takes you to a special section
    of the App Store. This section lists all the magazine and newspaper apps that
    currently support Newsstand.


    Other than the special presentation and ability to download new issues automatically,
    a Newsstand app otherwise functions just like any other app.


    **NOTE**: It''s up to each magazine and newspaper app to add Newsstand support.
    At the time of writing, many but not all magazine apps have added Newsstand support.
    If an app doesn''t support Newsstand, it will download to the `Home` screen and
    behave just like any regular, non-Newsstand app.


    Also, magazine and newspaper selection can vary greatly by country. Use the `Store`
    button in Newsstand to see the latest selection in your area.'
