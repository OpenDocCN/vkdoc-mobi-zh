  trans: '

    ### 在地图上显示联系人的地址


    iPhone 的一大亮点是与谷歌地图的集成。这一点在`通讯录`应用中体现得尤为明显。假设你想在地图上查看通讯录中某个联系人的家庭或工作地址。在过去（iPhone
    问世前），你不得不使用谷歌地图、MapQuest 或其他程序，然后费力地重新输入或复制粘贴地址信息。这非常耗时——但在 iPhone 上，你无需这样做。


    只需像之前那样打开联系人。这一次，点击联系人信息底部的地址。


    ![images](img/U1823.jpg)


    你的`地图`应用（由谷歌地图提供支持）会立即加载，并在联系人的精确位置放置一个`图钉`图标。联系人的姓名将显示在`图钉`上方。


    ![images](img/U1824.jpg)


    ![images](img/U1825.jpg)


    点击`图钉`顶部的标签，进入`信息`屏幕。


    现在，你可以选择`路线：到此地`或`路线：从此地出发`。


    接着，输入正确的起点或终点地址，然后点击右下角的`路线`按钮。如果你决定不需要路线，只需点击左上角的`清除`按钮。


    如果你只是直接在`地图`应用中输入地址，而不是通过联系人列表点击，那该怎么办？在这种情况下，你可以点击`添加到通讯录`来添加此地址。


    ![images](img/U1826.jpg)


    **提示**：要返回联系人信息，请点击`地图`按钮，退出`地图`，然后启动`通讯录`。你也可以使用多任务功能（参见第 7 章：“多任务与 Siri”），通过双击`主屏幕`按钮并选择`通讯录`应用。


    ### 更改联系人的排序与显示顺序


    与其他设置一样，`通讯录`应用的选项可通过`设置`图标访问。


    点击`设置`图标，向下滚动到`邮件、通讯录、日历`，然后点击该标签。


    接下来，向下滚动直到看到`通讯录`及其下方的两个选项。要更改排序顺序，请点击`排序顺序`标签，并选择你希望联系人按名字还是姓氏排序。


    ![images](img/U1827.jpg)


    你可能还想更改联系人的显示方式。这正是操作之处；你可以选择`名、姓`或`姓、名`。点击`显示顺序`标签，选择你希望联系人按名字还是姓氏顺序显示。点击左上角的`邮件、通讯录…`按钮以保存设置更改。


    ![images](img/U1828.jpg)


    #### 搜索全球通讯录 (GAL) 联系人


    如果你配置了 Exchange 帐户，你应该有全局通讯录选项。这样，当你连接到组织的服务器时，就可以访问全局通讯录。


    打开你的`通讯录`应用，在 Exchange 下查找名为`Exchange 全局通讯录`的标签。


    ![images](img/U1829.jpg)


    ### 通讯录故障排除


    有时，你的`通讯录`应用可能无法按预期工作。（如果你没有看到所有联系人，请回顾第 3 章：“与 iCloud、iTunes 等同步”中的步骤，了解如何与你的通讯录应用同步。）确保你在`iTunes`应用的设置中选择了`所有群组`。


    **提示**：如果你正在与另一个联系人应用同步，例如 Gmail 中的`通讯录`，那么请确保你选择最接近`所有联系人`的选项，而不是像特定群组这样的子集。


    #### 当全局通讯录联系人未显示时（适用于 Microsoft Exchange 用户）


    有时全局通讯录中的联系人不会显示在你的 iPhone 上。如果发生这种情况，首先确保你已连接到 Wi-Fi 或 3G 蜂窝数据网络。


    接下来，检查你的 Exchange 设置，确认你的服务器和登录信息是否正确。为此，请点击`设置`按钮，然后滚动并点击`邮件、通讯录和日历`。在列表中找到你的
    Exchange 帐户，点击它以查看设置。你可能需要联系你组织的技术支持，以确保你的 Exchange 设置正确。


    ### 备忘录应用


    如果你和许多人一样，办公桌上可能贴满了黄色的小便签——记录着各种待办事项。即使有了电脑，我们仍然倾向于留下这些小纸条作为提醒。iPhone 的一大优点是，你可以在熟悉的黄色便签纸上写下笔记，然后整齐有序地整理分类。你甚至可以将其通过电子邮件发送给自己或他人，以确保信息不会被遗忘。你还可以使用
    iTunes 备份笔记，并且可以选择将笔记同步到电脑或谷歌等其他网站。


    **提示：** iPhone 自带的`备忘录`应用非常基础和实用。如果你需要功能更强大的笔记应用，能够排序、分类、导入项目（PDF、Word 等）、支持文件夹、搜索等，你应该查看
    iPhone 上的 App Store。搜索“笔记”，你会找到至少十几个与笔记相关的应用，价格从免费到 0.99 美元及以上不等。


    ![images](img/U1830.jpg)


    iPhone 上的`备忘录`应用为你提供了一个便捷的地方来保存笔记和简单的“待办事项”列表。你还可以保存简单的列表，例如购物清单，或针对其他商店（如五金店或宠物店）的清单。如果你带着
    iPhone，一旦想到要添加的项目，就可以随时添加到这些列表中，并且这些列表可以随时访问和编辑。


    ![images](img/U1831.jpg)


    #### 同步备忘录


    你可以使用我们在第 3 章：“与 iCloud、iTunes 等同步”中介绍的方法，在 iPhone 和 iPad 等 iOS 设备之间，或与你的电脑或其他网站同步备忘录。同步备忘录的好处在于，你可以在电脑上添加一条备忘录，它就会“出现”在你的
    iPhone 上。然后，当你外出时，你可以编辑那条备忘录，并将其同步回你的电脑。无需重新输入或记忆事情。你的 iPhone 总是随身携带，因此随时随地记笔记是确保不遗忘任何重要事项的好方法。


    #### 备忘录入门


    与所有其他应用一样，只需点击`备忘录`图标即可启动它。启动`备忘录`应用后，你会看到一个类似典型黄色记事本的界面。


    ![images](img/U1832.jpg)


    ##### 多个备忘录帐户


    如果你恰好通过 iCloud、Exchange 或至少一个 IMAP 电子邮件帐户同步，并且通过 iTunes 与电脑同步，那么你会发现来自每个帐户的备忘录都是分开保存的。这很像你的联系人按电子邮件帐户分组，以及你的日历按电子邮件帐户分开的方式。


    要查看多个备忘录帐户，你需要在帐户设置屏幕上设置一个开关。


    当你设置 IMAP 电子邮件帐户时，在`设置` > `邮件、通讯录、日历`中，你会看到打开或关闭备忘录同步的选项。要查看这些备忘录帐户，你必须将`备忘录`开关设置为`开启`，如下面的
    Gmail 帐户所示。


    ![images](img/U1833.jpg)


    要查看不同的备忘录帐户，请点击`备忘录`应用左上角的`帐户`按钮。


    ![images](img/U1834.jpg)


    然后，在下一个屏幕上，你可以点击选择查看`所有备忘录`，或每个帐户的备忘录。在此图中，可选择 Gmail 或 MobileMe 帐户。


    你添加到单个帐户的备忘录将保留在该帐户中。例如，如果你将备忘录添加到 Gmail，那么它们只会显示在你的 Gmail 帐户中。


    ![images](img/U1835.jpg)

    '
- fmt: '### How Are My Notes Sorted?


    You see that all notes are listed in reverse chronological order, with the most
    recently edited notes at the top and the oldest at the bottom.


    The date that is shown is the last time and date that the particular note was
    edited, not when it was first created. So you will notice the order of your notes
    moving around on the screen.


    This sorting can be a good thing because your most recent (or frequently edited)
    notes will be right at the top.


    **TIP:** If you want to keep track of your to-do lists, you can use the built
    in reminders app on your iPhone. If you want something more powerful, check out
    `Things`, `Appigo Todo`, or `OmniFocus` in the App store.


    ### Adding a New Note


    To start a new note, tap the plus sign ![images](images/U1836.jpg) in the upper
    right-hand corner.


    The notepad is blank, and the keyboard pops up for you to begin typing.


    **TIP:** You can turn your iPhone on its side to see the larger, landscape keyboard.


    ![images](images/U1837.jpg)


    ### Adding a Title to the Note


    The first few words you type before you hit the `Return` key will become the title
    of the note. So think about what you want as the title, and type that first. In
    the image shown, `Grocery list` becomes the title of the note.


    Put a new item on each line, and tap the `Return` key to go to the next line.


    When you are done, touch the `Notes` button in the top left-hand corner to return
    to the main Notes screen.


    ![images](images/U1838.jpg)


    ### Viewing or Editing Your Notes


    Your notes appear in the list as tabs to touch. Touch the name of the note you
    wish to view or edit. The contents of the note are then displayed.


    You can scroll in Notes as you do in any program. You will notice that the date
    and time the note was last edited appear in the upper right-hand corner.


    When you are done reading the note, just touch the `Notes` button in the top left-hand
    corner to return to the main Notes screen.


    To advance through multiple notes, just touch the arrows at the bottom of the
    screen. Touch the `Forward` ![images](images/U1840.jpg) arrow. The page turns,
    and you can see the next note. To go back, just hit the `Back` ![images](images/U1841.jpg)
    arrow.


    ![images](images/U1839.jpg)


    ### Using Voice Dictation for Your Notes


    Remember, the iPhone can take dictation for you. When you are editing or starting
    a new note, tap the microphone button to the left of the space key and start talking.


    ![images](images/U1842.jpg)


    You know dictation is working when you see the purple microphone appear at the
    bottom. The amount of purple showing will pulse up and down with the volume of
    your voice.


    When you''re done, tap Done and see how well it works!


    **TIP:** You can use dictation to enter punctuation, symbols, and formatting,
    for example, "period" or "question mark," "open parenthesis" or "close square
    brackets," "new paragraph," or even "smiley face."


    ![images](images/U1843.jpg)


    ### Deleting Notes


    To delete a note, swipe your finger on the note from left to right on the list
    and tap `Delete`. Or, if you are viewing the note, then tap the `Trash Can` icon
    ![images](images/U1845.jpg) at the bottom. The iPhone prompts you to delete the
    note or cancel.


    ![images](images/U1844.jpg)


    ### Emailing or Printing a Note


    One of the `Notes` app''s convenient features is the ability to email or print
    a note. Let''s say you wrote a grocery note and wanted to email it to your spouse,
    or you made a list of gift ideas and want to hand them out. To email or print
    a note, just tap the `Action button` icon ![images](images/U1847.jpg) at the bottom
    of the screen.


    ![images](images/U1846.jpg)


    ### Data Detectors - Cool Things With Underlined Words


    If you type in the words "tomorrow morning" in a note and save it. The next time
    you open that note, you will see that the words have been underlined. If you tap
    and hold the underlined words, you will see a button asking if you want to Create
    Event. Tap the button to create a new calendar event for tomorrow morning.


    ![images](images/U1848.jpg)


    **TIP:** Whenever date and time words are underlined, the iPhone recognizes them
    as potential calendar events. This works in notes, email messages and other places
    on your iPhone. The iPhone also has other "data detectors", for example it can
    recognize phone numbers, web site addresses, and even tracking numbers for packages.


    ## Chapter 19


    ## Calendar and Reminders


    The iPhone makes the old calendar that used to hang on the fridge obsolete. In
    this chapter, we will show you how to utilize the `Calendar` app of the iPhone
    to its full potential. For example, we will show you how to schedule appointments,
    manage multiple calendars, change views on your calendar, and even how to deal
    with meeting invitations.


    In iOS 5, Apple has added the `Reminders` app for easy management of all your
    tasks and to-do lists, which are based on both time and location!


    **NOTE:** For most of this chapter, we will talk about syncing your iPhone calendar
    with another calendar because it is nice to have your calendar accessible on your
    iPhone and in other places. If you choose, you can also use your iPhone in a *standalone*
    mode, where you do not sync to any other calendar. In the latter case, all the
    steps we describe for events, viewing, and managing events still apply equally
    to you. It is critical, however, that you use the iCloud or iTunes automatic backup
    feature to save a copy of your calendar, just in case something happens to your
    iPhone.


    ### Calendars, Reminders and Siri


    Apple''s new, artificially intelligent personal assistant, Siri, can quickly and
    easily create calendar events and reminder items for you. If it''s something relatively
    simple, Siri can even add it more quickly and easily than you could create them
    yourself through "old fashioned" button tapping. Here are some examples of what
    Siri can do with calendars and reminders.


    *   "Show me my calendar for tomorrow". Siri will show all events for any day
    or date you request.

    *   "Schedule an appointment for 9pm tomorrow with my boss." Siri will even alert
    you if you have conflicts.

    *   "Move my appointment at 9pm tomorrow." Siri will even tell you if it''s a
    recurring appointment and offer to change the current one only, or all future
    events.

    *   "Show me my reminders." Siri will give you a list your reminders and you can
    quickly check off any you''ve already completed.

    *   "Remind me to call my wife when I get to work." Siri will create a location-based
    reminder.

    *   "Add cookies to my shopping list." Siri will create a reminder to buy cookies
    on the list named "Shopping".


    ### Managing Your Busy Life on Your iPhone


    The `Calendar` and `Reminders` apps provide powerful, easy-to-use functionality
    that helps you manage your appointments, keep track of what you have to do, set
    reminder alarms, and even create and respond to meeting invitations (for Exchange
    and iCloud users).'
