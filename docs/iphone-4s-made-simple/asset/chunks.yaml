    \ time—this book can help you understand how to best use, work, and have fun with\
    \ your new iPhone 4S. Think back to when you tried to use your first Windows or\
    \ Mac computer. It took a little while to get familiar with how to do things.\
    \ It's the same with the iPhone 4S. Use this book to help you get up to speed\
    \ and learn all the best tips and tricks more quickly.\n\nAlso, remember that\
    \ devices this powerful are not always easy to grasp—at first.\n\nYou will get\
    \ the most out of your iPhone 4S if you can read a section and then try out what\
    \ you read. We all know that reading and then doing an activity gives us a much\
    \ higher retention rate than simply reading alone.\n\nSo, in order to learn and\
    \ remember what you learn, we recommend the following:\n\n***Read a little, try\
    \ a little on your iPhone 4S, and repeat!***\n\n#### How This Book Is Organized\n\
    \nKnowing how this book is organized will help you quickly locate things that\
    \ are important to you. Here we show you the main organization of this book. Remember\
    \ to take advantage of our abridged table of contents, detailed table of contents,\
    \ and our comprehensive index. All of these elements can help you quickly pinpoint\
    \ items of interest to you.\n\n##### A Day in the Life of an iPhone 4S User\n\n\
    Located inside the front and back covers, the “Day in the Life of an iPhone 4S\
    \ User” reference is an excellent guide to your phone's features, providing ideas\
    \ on how to use your iPhone and lots of easy-to-access, cross-referenced chapter\
    \ numbers. So, if you see something you want to learn, simply thumb to that page\
    \ and learn it—all in just a few minutes.\n\n##### [Part 1](#Part1.html#p1): Quick\
    \ Start Guide\n\n> **Touch Screen Basics**: This book's many practical and informative\
    \ screen shots will help you quickly learn how to touch, swipe, flick, zoom, and\
    \ more with your iPhone 4S touch screen.\n> \n> **App Reference Tables**: Quickly\
    \ skim the icons or apps grouped by category. Also get a thumbnail view of what\
    \ all the apps on your iPhone 4S do. Finally, this section includes pointers to\
    \ the relevant chapter numbers, so you can jump right to the details of how to\
    \ get the most out of each app covered in this book.\n\n##### [Part 2](#Part2.html#p2):\
    \ Introduction\n\n> You are here now...\n\n##### [Part 3](#Part3.html#p3): You\
    \ and Your iPhone 4S\n\n> This is the meat of the book, organized in 26 easy-to-understand\
    \ chapters, all of them packed with loads of pictures to guide you every step\
    \ of the way.\n\n#### Quickly Locating Tips, Cautions, and Notes\n\nIf you flip\
    \ through this book, you can instantly see specially formatted **TIPS** **CAUTIONS**,\
    \ and **NOTES** that highlight important facts about using the iPhone 4S. For\
    \ example, if you want to find all the special tips relevant for using the iPhone's\
    \ **Calendar** app, you can flip to [Chapter 19](#Chapter19.html#ch19): “Calendar\
    \ and Reminders” to search for these highlighted nuggets of information.\n\n**TIP:TIPS**,\
    \ **CAUTIONS**, and **NOTES** are all formatted like this, with a gray background,\
    \ to help you see them more quickly.\n\n#### iPhone Video Tutorials\n\nFinally,\
    \ check out the author's web site at [`www.madesimplelearning.com`](http://www.madesimplelearning.com)\
    \ for a set of short, three minute video tutorials to help you or your entire\
    \ organization master your iPhone. Learning in small chunks is a great way to\
    \ master your iPhone 4S!\n\n## Part III\n\n## You and Your iPhone 4S . . .\n\n\
    This is the heart of *iPhone 4S Made Simple*. In this section, you'll find clearly\
    \ labeled chapters—each explaining the key features of your iPhone. You'll see\
    \ that most chapters focus on an individual app or a specific type of application.\
    \ Many of the chapters discuss applications that come with your iPhone, but we\
    \ also include some fun and useful apps you can download from the App Store. Sure,\
    \ the iPhone 4S is for fun, but it's for a whole lot more, too. We finish with\
    \ some handy troubleshooting tips that can help if your iPhone isn't working quite\
    \ right.\n\n## Chapter  1\n\n## Getting Started\n\nIn this chapter, we will take\
    \ you on a step-by-step tour of your new iPhone and everything you get in the\
    \ box. We will also look at the ins and outs of charging it and how to make your\
    \ battery last longer. In order to get started with your iPhone, you need to connect\
    \ it to iTunes to get it activated and registered. In our “iPhone Basics” section\
    \ at the end of this chapter, we will show you the basics of how to maneuver on\
    \ your iPhone, so you can get up and running quickly.\n\n### Getting to Know Your\
    \ iPhone\n\nIn this section, we will show you how to use everything you get in\
    \ the box with your iPhone. We also give you some iPhone battery and charging\
    \ tips, talk about how to determine if your iPhone is already activated, and discuss\
    \ the **Slide to Unlock** feature."
  trans: "\n### 恭喜您拥有全新的 iPhone 4S！\n\n您的 iPhone 4S 不仅仅是一部强大的智能手机；它还是一台媒体播放器、电子书阅读器、游戏机、生活管家，以及当今几乎所有你能想到的设备。\n\
    \niPhone 4S 的功能远超市面上几乎任何其他智能手机。在精美优雅的设计之中，您的 iPhone 4S 能让您立即开始上网冲浪、查看邮件，并管理您繁忙的生活。\n\
    \n**注：** 请参阅第 11 章：“视频消息与 Skype”，我们在其中向您展示了如何使用 `Skype` iPhone 应用程序以及新的 `FaceTime`\
    \ 视频通话功能！\n\n有了 iPhone 4S，您可以查看照片，并通过直观的触摸屏手势与照片进行互动。您可以用简单的手势对照片进行捏合、缩放、旋转以及发送邮件。\n\
    \n您的手机让您以前所未有的方式与内容进行互动。例如，由于令人难以置信的清晰锐利的视网膜显示屏，新闻网站和网页的视觉效果和阅读体验都前所未有。您可以快速浏览新闻、视频和图片，甚至与新闻内容互动。\n\
    \n有史以来第一次，在电子设备上阅读内容时，您能真切地感受到仿佛在阅读一本纸质书。翻页可慢可快——甚至在翻页时，你还能看到背面的文字。\n\n您的手机还让您以前所未有的方式管理您的媒体库。`iTunes`\
    \ 应用程序拥有漂亮的界面，让您能选择音乐、观看视频、整理播放列表等等——所有这些都能在 iPhone 4S 的高清屏幕上轻松而有趣地完成。\n\n您有 Netflix\
    \ 账户吗？如果有，您很快就能整理您的即时播放列表，并在您的 iPhone 4S 上直接流式播放高质量的电影和电视节目。\n\n`Hulu +` 现在也可用。这个应用程序可以让你直接在\
    \ iPhone 上观看您最喜爱的电视节目的完整季（更多信息请参阅第 15 章：“观看视频”）。\n\n您还可以更新您的 Facebook 状态并接收推送通知，并通过手机内置的\
    \ Wi-Fi 或 3G 连接保持与网络和电子邮件的连接。所有最新的高速协议都得到支持，因此您可以随时保持联系并获取最新内容。当您横向使用设备时，iPhone\
    \ 4S 还提供一个横屏键盘来输入电子邮件和备忘录。\n\n### 充分利用 *iPhone 4S Made Simple*\n\n您可以选择从头到尾阅读本书，也可以按章节或主题以模块化的方式翻阅。也许您只想看看\
    \ `App Store` 应用程序，试试 `iBooks`，设置您的电子邮件或联系人，或者只是把音乐装进手机。借助本书，您能做到所有这些，甚至更多。\n\n\
    您很快就会意识到您的 iPhone 4S 是一个非常强大的设备。然而，它内部“锁着”许多秘诀——我们将在本书中帮助您一一“解锁”这些秘诀。\n\n不必着急——这本书可以帮助您了解如何最好地使用、操作您的新\
    \ iPhone 4S，并从中获得乐趣。回想一下您第一次使用 Windows 或 Mac 电脑时的情景。需要花点时间才能熟悉如何操作。iPhone 4S 也是一样。利用这本书帮助您快速上手，并更快地学习所有最佳技巧和窍门。\n\
    \n同时，请记住，如此强大的设备一开始并不总是那么容易掌握。\n\n如果您能阅读一个章节然后尝试实践所读内容，您将从您的 iPhone 4S 中获得最大收益。我们都知道，阅读后进行实践比单纯阅读能获得高得多的知识留存率。\n\
    \n因此，为了学习和记住您所学的内容，我们建议如下：\n\n***读一点，在 iPhone 4S 上试一点，并重复这个过程！***\n\n#### 本书的组织结构\n\
    \n了解本书的组织结构将帮助您快速定位对您重要的内容。这里我们向您展示本书的主要结构。请记住充分利用我们的简版目录、详细目录和全面的索引。所有这些元素都能帮助您快速定位您感兴趣的内容。\n\
    \n##### iPhone 4S 用户的一天\n\n位于封面和封底内侧的“iPhone 4S 用户的一天”参考指南是了解您手机功能的绝佳指南，它提供了如何使用您的\
    \ iPhone 的想法以及大量易于查阅、相互参照的章节编号。因此，如果您看到想学的内容，只需翻到那一页去学习——只需几分钟即可。\n\n##### 第 1\
    \ 部分：快速入门指南\n\n> **触摸屏基础**：本书中大量实用且信息丰富的屏幕截图将帮助您快速学会如何在 iPhone 4S 触摸屏上进行触摸、滑动、轻拂、缩放等操作。\n\
    > \n> **应用程序参考表**：快速浏览按类别分组的图标或应用程序。同时了解 iPhone 4S 上所有应用程序的缩略视图。最后，本节包含指向相关章节编号的指引，因此您可以直接跳转到如何充分利用本书涵盖的每个应用程序的细节。\n\
    \n##### 第 2 部分：引言\n\n> 您现在就在这里……\n\n##### 第 3 部分：您与您的 iPhone 4S\n\n> 这是本书的精华部分，分为\
    \ 26 个易于理解的章节，每个章节都包含大量图片，全程指导您操作。\n\n#### 快速定位技巧、注意事项和备注\n\n如果翻阅本书，您可以立即看到特殊格式的\
    \ `TIPS`、`CAUTIONS` 和 `NOTES`，它们突出显示了使用 iPhone 4S 的重要事实。例如，如果您想找到所有与使用 iPhone\
    \ 的 `Calendar` 应用程序相关的特殊技巧，您可以翻到第 19 章：“日历和提醒事项”来搜索这些突出显示的信息片段。\n\n**提示：** `TIPS`、`CAUTIONS`\
    \ 和 `NOTES` 都采用这种灰色背景的格式，以便您更快地看到它们。\n\n#### iPhone 视频教程\n\n最后，请访问作者的网站 [`www.madesimplelearning.com`](http://www.madesimplelearning.com)\
    \ 以获取一系列简短的三分钟视频教程，帮助您或您的整个团队掌握您的 iPhone。分小块学习是掌握您的 iPhone 4S 的好方法！\n\n## 第三部分\n\
    \n## 您与您的 iPhone 4S . . .\n\n这是《iPhone 4S Made Simple》的核心部分。在本部分中，您将找到标记清晰的章节——每章都解释了您\
    \ iPhone 的关键功能。您会看到大多数章节都侧重于单个应用程序或特定类型的应用程序。许多章节讨论了 iPhone 自带的应用程序，但我们也包含了一些您可以从\
    \ App Store 下载的有用且有趣的应用程序。当然，iPhone 4S 是为了娱乐，但它的用途远不止于此。最后，我们提供了一些方便的故障排除技巧，当您的\
    \ iPhone 无法正常工作时可能会有帮助。\n\n## 第 1 章\n\n## 开始使用\n\n在本章中，我们将带您逐步了解您的新 iPhone 以及包装盒中的所有物品。我们还将研究充电的方方面面以及如何让电池续航更持久。要开始使用您的\
    \ iPhone，您需要将其连接到 iTunes 进行激活和注册。在本章末尾的“iPhone 基础”部分，我们将向您展示如何在 iPhone 上进行基本操作，以便您能快速上手并使用。\n\
    \n### 了解您的 iPhone\n\n在本节中，我们将向您展示如何使用 iPhone 包装盒中的所有物品。我们还会给您一些关于 iPhone 电池和充电的技巧，讨论如何判断您的\
    \ iPhone 是否已经激活，并探讨 `Slide to Unlock` 功能。\n"
- fmt: "#### What Is Included in the Box\n\nThe box your `iPhone` comes in may seem\
    \ skimpy if you’re new to `iPhones`. However, it does contain everything you need\
    \ to get started and enjoy your `iPhone`—except for a good manual, which is why\
    \ we wrote this book! Here is what your box contains:\n\n* **`iPhone`**: On the\
    \ very top, as soon as you open it, you will see your new `iPhone`.\n* **Paper\
    \ folder**: Under the plastic holder for the `iPhone`, you will find a paper folder\
    \ that contains the following:\n    * **Finger Tips**: A 4.5″ × 2.5″ small fold-out\
    \ booklet with 19 panels of basic information about your `iPhone`.\n    * **`iPhone\
    \ Product Information Guide`**: A 4.5″ × 2.5″ booklet with font that is way too\
    \ small to read. This book contains all the legal terms, conditions, warnings,\
    \ and disclaimers related to your `iPhone`.\n    * **Apple Logo Stickers**: Two\
    \ of those nice white Apple logos that you sometimes see on car windows. Enjoy!\n\
    \nIn the bottom of the box, you will find the items shown in [Figure 1–1](#Chapter01.html#fig_1_1):\
    \ a headset, a `USB` cable, and a wall plug adapter.\n\n![images](images/0101.jpg)\n\
    \n**Figure 1–1.** *The headset, USB cable, and wall plug adapter in the bottom\
    \ of your phone’s box*\n\n##### `iPhone` Headset\n\nThe headset consists of two\
    \ white earphones for listening to music, videos, or phone calls, as well as a\
    \ small controller attached to the wire of the right earphone. Plug this into\
    \ the hole on the top-left edge of your `iPhone`. Make sure you insert it all\
    \ the way—it can be a little tough to press in.\n\n![images](images/U0101.jpg)\n\
    \nAs the image here shows, the controller has **Plus** (**`+`**) and **Minus**\
    \ (**`-`**) keys, as well as a **Center** button. You can increase or decrease\
    \ volume with the (**`+`**) and (**`-`**) keys and use the **Center** button to\
    \ answer or hang up phone calls.\n\n**NOTE:** You can move between songs with\
    \ two or three clicks of the **Center** button. Double-click to go to the next\
    \ track. Triple-click to go to the previous track.\n\nThe included headset also\
    \ contains a small microphone for phone calls.\n\n##### `USB` to Dock Cable\n\n\
    The `USB` to dock cable connects your `iPhone` to your computer; it also doubles\
    \ as your power cable.\n\n##### Wall Plug Adapter\n\nThe wall plug adapter has\
    \ a `USB` socket on one end and a plug on the other end that you insert into an\
    \ electrical socket. Just connect the `USB` cable to your `iPhone` and the other\
    \ end to a wall plug to charge your `iPhone` from the wall.\n\n#### Removing or\
    \ Installing the `SIM` Card\n\nIn order to place or receive phone calls on an\
    \ AT&T/GSM `iPhone` (currently any `iPhone` except the Verizon `iPhone`), you\
    \ need to have a `SIM` card (Subscriber Identity Module card). Every new GSM `iPhone`\
    \ should already have a `SIM` card pre-installed.\n\n**NOTE:** Like the `iPad`\
    \ and `iPhone 4`, `iPhone 4S` uses the new MicroSIM standard—not the MiniSIM that\
    \ you find on most other phones.\n\nThere may be times when you want to remove\
    \ and replace the `SIM` card. For example, you might want to do this if you are\
    \ travelling internationally, or if you just received a replacement `iPhone` and\
    \ want to use the `SIM` card from your old one.\n\nFollow these steps to eject\
    \ and remove your `iPhone`’s `SIM` card:\n\n1. Insert the paperclip into the hole\
    \ on the right side of your `iPhone`. Press the paperclip straight into the hole\
    \ until the `SIM` card tray pops out.\n2. Remove the tray, so you can remove or\
    \ replace the `SIM` card.\n3. When inserting a `SIM` card, make sure the `SIM`\
    \ card is installed with the notch facing the top right of the holder. It should\
    \ sit flush in the holder with the metal contacts facing the bottom of the holder.\n\
    4. Slide the `SIM` card tray back into the `iPhone` until it clicks into place.\n\
    \n#### Charging Your `iPhone` and Battery Life Tips\n\nYour `iPhone` may already\
    \ have some battery life, but you might want to charge it completely, so you can\
    \ enjoy uninterrupted hours of use after you get it set up. This charging time\
    \ will give you a chance to check out the rest of this chapter, install or update\
    \ the `iTunes` app, or check out all the cool `iPhone` apps available (see [Chapter\
    \ 23](#Chapter23.html#ch23): “The Amazing App Store”).\n\n##### Charging from\
    \ a Power Outlet\n\nThe fastest way to charge your `iPhone` is to plug it directly\
    \ into a wall outlet. You use the same `USB` connection cable you use to connect\
    \ your `iPhone` to your computer. As shown here, plug the wide end of the cable\
    \ into the port at the bottom of your `iPhone` (next to the **Home** button) and\
    \ the end of the `USB` cable into the wall plug adapter. Finally, plug the adapter\
    \ into any wall outlet.\n\n![images](images/U0102.jpg)\n\nYou can tell your `iPhone`\
    \ is charging by looking at the screen. You will see a lightning bolt or plug\
    \ icon inside the battery indicator in the upper-right corner.\n\nThe **Main Battery**\
    \ icon will show your charge level. The image to the right shows a charging `iPhone`\
    \ with an almost full battery.\n\n**TIP:** Some newer cars have built-in power\
    \ outlets (just like in your home) that you can use to plug in your `iPhone` power\
    \ cord. Some also have a dock option that allows you to control the `iPod` app\
    \ from your car radio headset. These outlets are sometimes buried in the middle\
    \ console behind the front seat.\n\n![images](images/U0103.jpg)\n\n##### Charging\
    \ from Your Computer\n\nYou can also charge your `iPhone` when you plug it into\
    \ your computer, albeit a little more slowly than when you connect it directly\
    \ to a wall charger.\n\n**TIP:** Try using different `USB` ports on your computer.\
    \ Some `USB` ports share a bus and draw less power, while others have their own\
    \ bus and draw more power.\n\nFor optimal charging, you should have your computer\
    \ plugged into the wall outlet. If your computer is not connected to the wall\
    \ outlet, your `iPhone` will charge, but at a slower rate. Keep in mind that,\
    \ if your laptop computer goes to sleep or you close the screen, your `iPhone`\
    \ will stop charging.\n\n**TIP:** You can show the actual percentage of battery\
    \ life remaining. To do this, tap your `Settings` icon ![images](images/U001.jpg)\
    \ `General` ![images](images/U001.jpg) `Usage`. Finally set `Battery Percentage`\
    \ to `ON`.\n\n![images](images/U0104.jpg)\n\n##### Charging from Other Accessories\n\
    \nSome accessories designed to work with your `iPhone` will also charge it. The\
    \ most common of these are iPhone/iPod music docks. These are speaker systems\
    \ that you plug into your `iPhone` to listen to music. The only time your `iPhone`\
    \ will not charge is when you see the following warning message on your screen:\
    \ “Charging is not supported with this accessory.” This occurs on older accessories\
    \ or those not designed specifically for your `iPhone`.\n\n**TIP: A Case and External\
    \ Battery Combined**\n\nSome cases actually have external batteries built into\
    \ the case. There are several manufacturers available. One provider, mophie ([`www.mophie.com`](http://www.mophie.com)),\
    \ has such cases for the `iPhone 4` and `iPhone 4S` models called a *juice packair*\
    \ and *juice pack plus*.\n\n##### Expected Battery Life\n\nApple says the `iPhone`\
    \ with its bigger battery and advanced technology should last longer than the\
    \ `iPhone 3Gs` (see [Table 1–1](#Chapter01.html#tab_1_1)).\n\n![images](images/t0101.jpg)\n\
    \n![images](images/t0101a.jpg)\n\nThese battery life durations are in ideal conditions\
    \ with a new, fully charged battery. You will notice that, over time, your actual\
    \ battery life will diminish.\n\n##### Battery and Charging Tips\n\nThe key question\
    \ is this: how do you get the most out of your battery life and make sure your\
    \ `iPhone` is charged and ready for you when you need it? In this section, we\
    \ will cover a few tips to help you accomplish this."
