  trans: "\n### 调整 Safari 浏览器设置\n\n与我们之前调整的其他设置一样，`Safari` 的设置也位于 `设置` 应用中。\n\n1.\
    \  要访问 `Safari` 的设置，请轻点 `设置` 图标。\n2.  轻点 `Safari`。\n\n![images](img/U1634.jpg)\n\
    \n#### 更改搜索引擎\n\n默认情况下，`Safari` 浏览器的搜索引擎是 `Google`。要将其更改为 `Yahoo` 或 `Bing`，请轻触\
    \ `搜索引擎` 按钮，然后选择新的搜索引擎。\n\n**提示：** 如果你不想更改默认搜索引擎，你也可以使用 `Siri` 来偶尔搜索 `Yahoo!`\
    \ 或 `Bing`。只需激活 `Siri` 并说“用 Yahoo! 搜索...”或“用 Bing 搜索...”，`Siri` 就会为你返回结果。\n\n\
    ![images](img/U1635.jpg)\n\n#### 启用自动填充\n\n正如我们在本章前面所示，`自动填充` 是一种便捷的方式，可以让 `Safari`\
    \ 自动填写要求你输入姓名、地址、电话号码，甚至用户名和密码的网页表单。它可以为你节省大量反复输入姓名和其他信息的时间。\n\n要启用 `自动填充` 选项，请按照以下步骤操作：\n\
    \n1.  从 `设置` 应用中的 `Safari` 菜单，轻点 `自动填充`。\n\n![images](img/U1636.jpg)\n\n2.  将\
    \ `姓名与密码` 旁边的开关设置为 `开启`。\n3.  将 `使用联络信息` 旁边的开关设置为 `开启`。\n\n![images](img/U1637.jpg)\n\
    \n4.  将 `使用联络信息` 设置为 `开启` 后，系统会带你进入 `通讯录` 列表，以选择一个联系人使用。\n5.  上下滑动以找到某人，或双击显示\
    \ `通讯录` 的顶部栏以调出 `搜索` 窗口。\n6.  找到要使用的联系人后，轻点该联系人即可返回 `Safari` 的 `设置` 屏幕。\n\n![images](img/U1638.jpg)\n\
    \n#### 调整隐私选项\n\n开启 `无痕浏览` 选项意味着你访问网站时不会存储任何信息、历史记录或 Cookie。如果你担心他人知道你访问了哪些网站，或担心你访问的网站对你进行跟踪，那么你应该将\
    \ `无痕浏览` 切换到 `开启` 位置。\n\n![images](img/U1639.jpg)\n\n你也可以使用 `清除历史记录` 和 `清除 Cookie\
    \ 与数据` 选项。\n\n![images](img/U1640.jpg)\n\n**提示：** 如果你发现网页浏览速度变慢或变得卡顿——或者 `Safari`\
    \ 频繁崩溃——请尝试分别轻点 `历史记录` 和 `Cookie 与数据` 并确认你的选择来清除它们。\n\n#### 调整安全选项\n\n在 `安全性`\
    \ 标题下，`欺诈警告`、`JavaScript` 和 `拦截弹出式窗口` 选项默认应为 `开启` 状态。你可以通过将任意开关滑动到 `关闭` 来修改这些设置。\n\
    \n**注意：** 许多像 `Facebook` 这样的流行网站要求 `JavaScript` 处于 `开启` 状态。\n\n![images](img/U1641.jpg)\n\
    \n轻点 `接受 Cookie` 按钮，将浏览器接受 Cookie 的能力调整为 `始终`、`永不` 或 `来自访问过的网站`。我们建议将其保留为 `来自访问过的网站`。如果设置为\
    \ `永不`，某些网站将无法正常工作。\n\n![images](img/U1642.jpg)\n\n## 第 17 章\n\n## 使用邮件进行沟通\n\n\
    在本章中，我们将探索 iPhone 上 `邮件` 应用中的电子邮件世界。你将学习如何设置多个电子邮件账户，查看各种阅读选项，打开附件，以及清理收件箱。\n\n\
    ![images](img/U1701.jpg)\n\n并且，当你的电子邮件无法正常工作时，你将学习一些好的故障排查技巧，帮助你重新恢复正常运行。\n\n\
    ### 邮件入门\n\n在 iPhone 上设置电子邮件相当简单。让电子邮件运行起来最快的方法可能是在手机上直接设置你的账户。在本节中，我们将向你展示如何使用\
    \ `邮件、通讯录、日历` 账户设置屏幕。你也可以使用电脑上 `iTunes` 应用中的一个屏幕来复制这些账户设置。要让电子邮件运行起来，你需要一个网络连接。\n\
    \n#### 需要网络连接\n\n移动电子邮件在当今无疑十分流行。即使没有网络连接，你也可以查看、阅读和编写已同步到 iPhone 上的电子邮件的回复；但是，你需要网络连接（无论是\
    \ Wi-Fi 还是 3G/蜂窝网络）才能从 iPhone 发送和/或接收电子邮件。请查看第 4 章：“连接到网络”了解更多信息。同时，请参阅第 1 部分快速入门指南中的“阅读顶部连接状态图标”部分。\n\
    \n**提示：** 如果你正在旅行，请在登机前简单下载所有电子邮件；这可以让你在离线状态下阅读、回复和编写邮件。所有电子邮件将在你着陆并重新建立互联网连接后发送。\n\
    \n### 在 iPhone 上设置电子邮件\n\n正如刚才提到的，你可以在 iPhone 上用两种选项来设置你的电子邮件账户：\n\n1.  在 iPhone\
    \ 上直接设置你的电子邮件账户。\n2.  使用 `iTunes` 同步电子邮件账户设置。\n\n第一个选项，即在 iPhone 上直接设置你的电子邮件账户，如果你希望在\
    \ iPhone 上进行特殊设置，例如通过 `Exchange` 使用 `Gmail`，那么它是最佳选择。如果你在 Windows 或 Mac 电脑上不使用电子邮件程序，这也是一个好方法。\n\
    \n如果你已经在 Windows 或 Mac 电脑上设置了大量 POP3 或 IMAP 账户，你也可以选择通过 USB 底座连接线，借助 `iTunes`\
    \ 将它们同步过来。\n\n#### 输入电子邮件账户密码\n\n在第 3 章中，我们向你展示了如何将你的电子邮件账户设置同步到 iPhone。同步完成后，你应该能够通过打开\
    \ `设置` 应用来查看 iPhone 上的所有电子邮件账户。你只需要输入每个账户的密码。\n\n要为每个同步的电子邮件账户输入密码，请按照以下步骤操作：\n\
    \n1.  轻点 `设置` 图标。\n2.  轻点 `邮件、通讯录、日历` 选项。\n3.  在 `账户` 下，你应该会看到所有已同步的电子邮件账户列表。\n\
    4.  轻点任意列出的电子邮件账户，输入其密码，然后点击 `完成`。\n5.  如果所有信息输入正确，将会出现复选标记，并且你的账户将被启用。\n6.  对所有列出的电子邮件账户重复上述操作。\n\
    \n#### 在 iPhone 上添加新电子邮件账户\n\n要在 iPhone 上添加新电子邮件账户，请按照以下步骤操作：\n\n1.  轻点 `设置` 图标。\n\
    2.  轻点 `邮件、通讯录、日历` 选项。\n3.  轻点你电子邮件账户下方的 `添加账户`。\n\n   如果你没有设置任何账户，你将只会看到 `添加账户`\
    \ 选项。\n\n   **提示：** 要编辑任何电子邮件账户，只需轻触该账户。\n\n   ![images](img/U1702.jpg)\n\n4.\
    \  在此屏幕上选择要添加的电子邮件账户类型：\n   - 如果你使用 iCloud 服务，请选择 `iCloud`。\n   - 如果你使用 Microsoft\
    \ Exchange 电子邮件服务器，请选择 `Microsoft Exchange`。\n   - 如果你使用 `Google 日历` 和 `Google\
    \ 通讯录` 来存储个人信息，并且希望将它们无线同步到 iPhone，你也应该选择 `Microsoft Exchange`。\n\n     **注意：**\
    \ 我们在第 3 章：“与 iCloud、iTunes 等同步”中向你展示了如何设置 Google/Microsoft Exchange 和 iCloud。\n\
    \n   - 如果你使用 Google 电子邮件，但*不*（或*不想*）将电子邮件与你的 `Google 通讯录` 进行无线同步，请选择 `Gmail`。\n\
    \n     ![images](img/U1703.jpg)\n\n   - 如果你使用 `Yahoo!`、`AOL` 或 `Windows Live Hotmail`\
    \ 服务，请选择它们。\n   - 如果以上都不适用，并且你想要同步一个标准的 POP 或 IMAP 电子邮件账户，请选择 `其他`。最后，在下一个屏幕中选择\
    \ `添加邮件账户`。\n\n5.  在 `名称` 字段中，输入你希望收件人在收到你的邮件时看到的姓名。\n6.  接下来，在 `地址`、`密码` 和 `描述`\
    \ 字段中输入相应的信息。\n7.  轻点右上角的 `下一步` 按钮。\n\n![images](img/U1704.jpg)\n"
- fmt: "### Specifying Incoming and Outgoing Servers\n\nSometimes, the iPhone will\
    \ not be able to automatically set up your email account. In these cases, you\
    \ will need to type in a few more settings manually to enable your email account.\n\
    \n**TIP:** You may be able to find the settings for your email provider by doing\
    \ a web search for your email provider's name and email settings.\n\nIf the iPhone\
    \ is unable to log into your server with only your email address and password,\
    \ then you will see a screen similar to this one.\n\nUnder **Incoming Mail Server**,\
    \ type the appropriate information into the **Host Name**, **User Name**, and\
    \ **Password** fields. Usually, your incoming mail server is something like `mail.*name_of_your_isp*.com`.\n\
    \nTo adjust the name of your outgoing server, tap **Outgoing Mail Server.** You\
    \ can adjust the outgoing mail server on the following screen. These server names\
    \ usually look like either `smtp.*name_of_your_isp*.com` or `mail.*name_of_your_isp*.com`.\n\
    \nYou can try to leave the **Server Name** and **Password** fields blank. If that\
    \ doesn't work, you can always go back and change them.\n\n![images](images/U1705.jpg)\n\
    \nYou may be asked if you want to use SSL (secure socket layer), a type of outgoing\
    \ mail security that may be required by your email provider. If you don't know\
    \ whether you need SSL, just check the mail settings with your email provider.\n\
    \n**TIP:** The authors recommend that you use SSL security whenever possible.\
    \ If you do not use SSL, then your login credentials, messages, and any private\
    \ information are sent in plain text (unencrypted), leaving them open to snoopers.\n\
    \n### Verifying that Your Account Is Set Up\n\nOnce all the information is entered,\
    \ the iPhone will attempt to configure your email account. You may get an error\
    \ message; if that happens, you need to review the information you input.\n\n\
    ![images](images/U1706.jpg)\n\nIf you are taken to the screen that shows all your\
    \ email accounts, look for the new account name.\n\nIf you see it, your account\
    \ was set up correctly.\n\n![images](images/U1707.jpg)\n\n### Fixing the Cannot\
    \ Get Mail Error\n\nYou will need to enter your password if you tap **Mail** icon\
    \ and you receive an error that says “Cannot Get Mail—No password provided for\
    \ *(your account)*.”\n\nReview this chapter's “Enter Passwords for E-Mail Accounts\
    \ Synced from iTunes” section for help with this issue.\n\n![images](images/U1708.jpg)\n\
    \n## The Mailboxes Screen—Inboxes and Accounts\n\nThe top-level screen is your\
    \ **Mailboxes** screen. You can always get to it by tapping the button in the\
    \ upper-left corner. Keep tapping this upper-left button until you see no more\
    \ buttons. When that happens, you are in the **Mailboxes** screen.\n\nFrom the\
    \ **Mailboxes** screen, you can access the following items:\n\n*   **The unified\
    \ inbox:** Access this by tapping **All inboxes.**\n*   **The inbox for each individual\
    \ account:** Access this by tapping that email account name in the **Inboxes**\
    \ section.\n\n    ![images](images/U1709.jpg)\n\n*   **The folders for each email\
    \ account in the Accounts section:** Access these by tapping the account name\
    \ to see all folders.\n\n    ![images](images/U1710.jpg)\n\n## Adding or Editing\
    \ Email Folders or Mailboxes\n\nWith iOS 5, you can now add or edit email folders\
    \ right on your iPhone if you are using an iCloud-synced mail account or your\
    \ mail server supports this feature. Say, you wanted to change a mail folder name\
    \ or add a new mail folder to better organize your messages inbox. One example\
    \ might be to create a new folder called “Requires Attention” and put all those\
    \ emails that you cannot get to right now, but need to make sure you address later\
    \ when you back at your desk. To add or edit a mailbox on your device, follow\
    \ these steps:\n\n1.  From the **Mailboxes** screen scroll to the bottom and tap\
    \ any of your email accounts listed under Accounts.\n\n    ![images](images/U1711.jpg)\n\
    \n2.  In this example, we will edit the iCloud account mailboxes. On this screen\
    \ tap **Edit** in the upper right.\n\n    ![images](images/U1712.jpg)\n\n3.  Then,\
    \ you can do the following:\n\n    *   Tap the **New Mailbox** at the bottom to\
    \ create a new mailbox.\n    *   Tap any mailbox folder to edit the name or delete\
    \ it.\n\n    ![images](images/U1713.jpg)\n\n## Inbox, Flagged (Marked) and Threaded\
    \ Messages\n\nYou will notice that any unread messages are marked with a blue\
    \ dot ![images](images/U1715.jpg) to the left of the message.\n\nYou will also\
    \ notice that some messages show a number and a right-facing arrow (>) to the\
    \ right of the message, like this: ![images](images/U1716.jpg). This shows that\
    \ there are **three** related messages (replies and forwards) to the message shown.\n\
    \n![images](images/U1714.jpg)\n\nMessages that are marked have a little flag to\
    \ the left of them like this: ![images](images/U1717.jpg)\n\nTap any message to\
    \ open it. The only time it will not open is if there are related messages. In\
    \ that case, you will first see a screen with all the related messages. Tap any\
    \ of those messages to open and view it.\n\nTo leave the **Inbox** view, tap the\
    \ button in the upper-left corner.\n\nYou can tell which email account you are\
    \ viewing by looking at the button in the upper-left corner:\n\n*   If the button\
    \ says **Mailboxes**, you know you are looking at all your inboxes together.\n\
    *   If the button says an account name, such as **iCloud** or **Exchange**, then\
    \ you know you are only looking at the inbox for that account.\n\n### Move, Delete,\
    \ or Mark (Flag) Multiple Messages\n\nIf you want to move or delete several messages\
    \ at once, you can do so from the Inbox screen. Follow these steps to delete multiple\
    \ messages at once:\n\n1.  Tap the **Edit** button in the upper-right corner while\
    \ you are viewing an Inbox screen.\n2.  Tap to select the desired messages; a\
    \ red **Checkmark** icon next to a message indicates it is selected.\n3.  To delete\
    \ the messages, tap the **Delete** button at the bottom.\n4.  To move the messages\
    \ to another folder, tap the **Move** button and select the folder.\n5.  To Mark\
    \ a message with a Flag or as Unread, tap the **Mark** button. Unread will put\
    \ the blue dot back next to the message. If you flag a message you will see a\
    \ little flag appear next to it like this: ![images](images/U1719.jpg)\n\n   \
    \ ![images](images/U1718.jpg)\n\n## Viewing an Individual Message\n\nWhen you\
    \ tap a message from the **Inbox** screen, you see the **Main** message view.\
    \ You can look at messages in both portrait and landscape modes, see [Figure 17–1](#Chapter17.html#fig_17_1).\
    \ Portrait mode will typically display more text. Landscape mode will typically\
    \ let you enjoy bigger text and images.\n\n![images](images/1701.jpg)\n\n**Figure\
    \ 17–1.** *Viewing email messages in portrait and landscape modes.*\n\n**TIP:**\
    \ If you are setting your iPhone down on a desk or holding it in your lap, then\
    \ you may want to use the **Portrait Lock** icon to lock your view in Portrait\
    \ (vertical) mode. This will prevent the image from flipping around unnecessarily.\
    \ To lock the view, follow these steps:\n\n1.  Double-tap the **Home** button\
    \ and swipe left to right.\n2.  Tap the **Portrait Lock** button to lock the screen\
    \ in Portrait mode.\n\n# Composing and Sending Emails\n\nTo launch the email program,\
    \ tap the **Mail** icon on your **Home** screen.\n\n**TIP:** If you left the **Mail**\
    \ app while viewing a particular email, list of folders, or an account, then you\
    \ will be returned directly to that same location when you return to the **Mail**\
    \ app.\n\nIf you are going into your email for the first time, you may see an\
    \ empty inbox. Hit the **Refresh** button ![images](images/U1720.jpg) in the lower-left\
    \ corner of the window to retrieve the latest email. The iPhone will begin to\
    \ check for new mail and then display the number of new messages for each account."
