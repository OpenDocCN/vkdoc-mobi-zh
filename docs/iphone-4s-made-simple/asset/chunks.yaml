    **TIP**: Do a search for “Project Gutenberg” to see thousands of free, public
    domain titles.


    ### Switching Collections (Books, PDFs, More)


    YouriBooks app has multiple collections of books or PDF files (Adobe PDF format
    reader).


    ![images](images/U1310.jpg)


    You can easily switch collections between these two and add new collections by
    tapping the Collections button at the middle of the top of the library.


    This button will show you the currently visible collection. In this image, **Books**
    is the currently collection. Tap the Books button to see the available collections.


    From this screen, you can tap any collection to view it.


    ![images](images/U1311.jpg)


    Notice that you can also create **New** collections and **Edit** collections you
    have created by using the buttons at the bottom.


    ![images](images/U1312.jpg)


    ### Reading PDFs


    Switch collections to view your PDFs collection as shown above.


    ![images](images/U1313.jpg)


    Tap any book to open it up and start reading. All the same navigation features
    work as described in the “Reading iBooks” section.


    One difference is that you will see thumbnail images of the pages of the PDF file
    at the bottom of the page. Tap any thumbnail to jump to that page. Drag your finger
    back and forth along the thumbnail Images to jump to a specific page.'
  trans: '

    #### 在 Pandora 中创建新电台


    创建新电台再简单不过了。


    ![images](img/U1239.jpg)


    如果你正在收听某个电台，请按下左上角的**返回箭头**返回 Pandora 主屏幕。然后点击底部一行的**新电台**按钮。输入一位艺术家、一首歌曲或一位作曲家的名称。


    找到你想找的内容后，点击该选项，Pandora 便会立即开始围绕你的选择构建一个电台。


    你也可以点击**流派**，围绕一种特定的音乐流派构建电台。


    随后你会看到新电台与你的其他电台一起列出。


    ![images](img/U1240.jpg)


    你可以在 Pandora 中创建多达 100 个电台。


    **提示：**你可以通过点击屏幕顶部的**按日期**或**按字母表**按钮来整理你的电台。


    #### 调整 Pandora 的设置——你的账户、升级等


    你可以通过点击屏幕右下角的设置图标退出你的 Pandora 账户、调整音质，甚至升级到 Pandora One（可去除广告）。（请参见图 12–9。）


    ![images](img/1209.jpg)


    **图 12–9.** *Pandora 中的设置选项*


    要退出登录，请点击**退出**按钮。


    要调整音质，请将**蜂窝网络音频质量**下方的开关移至**开启**或**关闭**。当你在蜂窝网络环境下时，将此设置为关闭可能更好，否则你可能会在播放中听到更多跳转和暂停。


    当你处于稳定的 Wi-Fi 连接时，可以将其设置为**开启**以获得更好的音质。请参阅我们的第 4 章：“连接网络”一章，了解更多关于各种连接的信息。


    为了节省电池电量，你应将**自动锁定**设置为**开启**，这是默认设置。如果你希望强制屏幕保持亮起，则将其切换至**关闭**。


    要去除所有广告，请点击**升级到 Pandora One**按钮。一个网页浏览器窗口将打开，你将被引导至 Pandora 网站输入你的信用卡信息。在本书出版时，年度账户费用为
    36.00 美元，但当你读到本书时，价格可能已有所不同。


    ## iBooks 与电子书


    在本章中，我们将向你展示如何将你的 iPhone 用于获得良好的阅读体验——如果你能接受稍小的屏幕。例如，我们将介绍 iBooks，包括如何购买和下载它们，以及如何找到一些优质的免费经典书籍。我们还将向你展示其他使用
    iPhone 上的第三方**Kindle** 和 **Kobo**（原名 **shortcovers**）阅读器的电子书阅读选项。


    ![images](img/U1301.jpg)


    iPhone 可以使用苹果公司专有的电子书阅读器 **iBooks**。在本章中，我们将向你展示如何下载 **iBooks** 应用，如何在 iBooksStore
    中选购书籍，以及如何阅读 PDF 文件（Adobe PDF 格式）和 iBooks，并充分利用所有 **iBooks** 功能。


    借助 **iBooks**，你可以以前所未有的方式与书籍和 PDF 文件互动。翻页如同真实书籍；你可以调整字体大小、在内置词典中查词，以及搜索文本。


    在 App Store 中，你还可以找到亚马逊 **Kindle** 阅读器、**Barnes and Noble** 阅读器、**stanza** 阅读器和
    **Kobo** 阅读器的应用。**Kindle** 和 **Kobo** 阅读器在 iPhone 上均能提供出色的阅读体验。


    ### 下载 iBooks


    在 App Store 中搜索“iBooks”或“Apple”。你会在所列选项中看到 **iBooks** 应用。


    ![images](img/U1302.jpg)


    **注意：**在一部全新的 iPhone 上，你应该会收到一条通知询问：“你想立即下载 iBooks 吗？”


    如果你没有立即看到这条通知，请点击 **App Store** 应用，该通知应该会弹出。


    选择 **iBooks** 应用，然后点击**免费**按钮进行下载。


    选择**安装**，**iBooks** 将被下载并安装在 iPhone 上。


    ### iBooks 商店


    在你开始享受阅读体验之前，你需要用图书充实你的 iBooks 书库。幸运的是，许多书籍可以在 iBooks 商店免费找到，包括几乎完整的古腾堡经典及公共领域作品集。


    **注意：**付费的 iBooks 内容并非在所有国家/地区都可用。然而，免费内容在各地都可获取，包括古腾堡计划的经典公共领域文学作品。


    只需点击你书架右上角的**商店**按钮，你将被带到 iBooks 商店。


    ![images](img/U1303.jpg)


    iBooksStore 的布局与 App Store 非常相似。左上方有一个**类别**按钮，与**书库**按钮相对。点击它可查看所有可用类别，你可以从中选择书籍。


    ![images](img/U1304.jpg)


    精选图书在商店主页上突出显示，并配有**新书**和**值得关注**的标题供浏览。


    商店底部有五个软键：**精选**、**排行榜**、**浏览**、**搜索**和**已购项目**。


    点击**排行榜**按钮 ![images](img/U1305.jpg) 可查看所有顶级排行榜和《纽约时报》畅销书。点击**已购项目**按钮可查看你已购买或下载到书库中的所有书籍。


    ![images](img/U1306.jpg)


    购买一本书与购买一款应用非常相似。点击你感兴趣的图书标题，浏览其描述和读者评论。当你准备购买该图书时，点击**价格**按钮。


    ![images](img/U1307.jpg)


    **注意：**许多图书提供试读下载。如果你不确定是否要购买该书，查看试读内容是个好主意。如果你下载了试读内容，你随时可以从该试读中购买完整图书。


    一旦你决定下载试读内容或购买一个图书，**iBooks** 会切换到**书架**视图，你可以看到该书被放入你的书架。现在你的书就可以阅读了。


    ![images](img/U1308.jpg)


    #### 使用搜索按钮


    与 iTunes 和 App Store 一样，iBooksStore 为你提供了一个**搜索**窗口，你可以在其中输入几乎任何短语。你可以搜索作者、书名或系列。只需点击屏幕底部的**搜索**，屏幕键盘便会弹出。输入作者、书名、系列或图书类别，然后按**搜索**按钮。


    ![images](img/U1309.jpg)


    你会看到与你搜索相匹配的建议弹出；只需点击相应的建议即可跳转到该图书。


    **提示：**搜索“古腾堡计划”（Project Gutenberg）可查看数千本免费的公共领域图书。


    ### 切换合集（图书、PDF 等）


    你的 iBooks 应用包含多个图书或 PDF 文件（Adobe PDF 格式阅读器）的合集。


    ![images](img/U1310.jpg)


    你可以通过点击书库顶部中央的合集按钮，轻松在这两个合集之间切换，并添加新合集。


    此按钮会显示当前可见的合集。在此图中，**图书**是当前合集。点击“图书”按钮可查看可用的合集。


    在此屏幕上，你可以点击任意合集来查看它。


    ![images](img/U1311.jpg)


    请注意，你还可以使用底部的按钮创建**新**合集和**编辑**你已创建的合集。


    ![images](img/U1312.jpg)


    ### 阅读 PDF


    如上所示，切换合集以查看你的 PDF 合集。


    ![images](img/U1313.jpg)


    点击任意书本将其打开并开始阅读。所有在“阅读 iBooks”部分中描述的导航功能同样适用。


    一个不同之处在于，你会在页面底部看到 PDF 文件的页面缩略图。点击任意缩略图即可跳转到该页。沿着缩略图前后拖动手指可跳转到特定页面。

