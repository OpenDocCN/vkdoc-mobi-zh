  trans: "\n# 打开和查看压缩的 .zip 文件\n\n除非您安装诸如 `GoodReader` 之类的应用，否则您的 iPhone 将无法打开和查看\
    \ `.zip` 格式的压缩文件。在撰写本文时，`GoodReader` 仍是一款免费应用，非常值得安装。\n\n**提示：** 了解如何在第 14 章：“书报亭和更多”中安装和使用\
    \ `GoodReader`。\n\n请按照以下步骤在程序中打开 `.zip` 文件：\n\n1. 从 App Store 安装免费的 `GoodReader`\
    \ 应用。\n2. 打开带有 `.zip` 文件附件的电子邮件。\n3. 长按 `.zip` 附件，直到底部出现一个弹出窗口，其中包含一个显示为 `在“GoodReader”中打开`\
    \ 的按钮。点击该按钮即可在 `GoodReader` 中打开 `.zip` 文件。\n\n   ![images](img/U1747.jpg)\n\n\
    4. 现在应打开 `GoodReader`，您的 `.zip` 文件应位于文件列表顶部。要打开或解压缩 `.zip` 文件，请点击它并选择 `解压` 按钮。\n\
    \n   ![images](img/U1748.jpg)\n\n5. 现在您应该看到解压后的文件——本例中是一个 Adobe `.pdf` 文件，位于 `.zip`\
    \ 文件上方的文件列表中。\n6. 点击该解压后的文件即可查看它。\n\n   ![images](img/U1749.jpg)\n\n7. 阅读完附件后，双击您的\
    \ `主屏幕` 按钮并点击 `邮件` 图标即可返回到阅读邮件。\n\n## 支持的电子邮件附件类型\n\n您的 iPhone 支持以下文件类型作为附件：\n\
    \n*   `.doc` 和 `.docx`（`Microsoft Word` 文档）\n*   `.htm` 和 `.html`（网页）\n*   `.key`（`Keynote`\
    \ 演示文稿文档）\n*   `.numbers`（`Apple Numbers` 电子表格文档）\n*   `.pages`（`Apple Pages`\
    \ 文档）\n*   `.pdf`（Adobe 的便携式文档格式，用于 `Adobe Acrobat` 和 `Adobe Reader` 等程序）\n* \
    \  `.ppt` 和 `.pptx`（`Microsoft PowerPoint` 演示文稿文档）\n*   `.txt`（文本文件）\n*   `.vcf`（联系人文件）\n\
    *   `.xls` 和 `.xlsx`（`Microsoft Excel` 电子表格文档）\n*   `.mp3` 和 `.mov`（音频和视频格式）\n\
    *   `.zip`（压缩文件）：只有安装了可以读取它们的应用（例如 `GoodReader`）才能读取——请参阅本章前面的“打开和查看压缩的 .zip 文件”部分。\n\
    \n# 回复、转发或删除邮件\n\n在您的电子邮件阅读窗格底部有一个工具栏。\n\n通过此工具栏，您可以将邮件移动到不同邮箱或文件夹；删除它；或进行回复、全部回复或转发。\n\
    \n![images](img/U1750.jpg)\n\n点击小的 `箭头` 图标 ![images](img/U1751.jpg) 即可看到这些选项按钮出现：`回复`、`全部回复`\
    \ 和 `转发`。\n\n**注意：** 仅当电子邮件有多个收件人时，才会显示 `全部回复` 按钮。\n\n![images](img/U1752.jpg)\n\
    \n## 回复电子邮件\n\n您可能最常使用 `回复` 命令。请按照以下步骤在您的 iPhone 上回复电子邮件：\n\n1. 点击 `回复` 按钮。\n\n\
    \   您会看到原始发件人现在被列为电子邮件 `收件人：` 行中的收件人。主题将自动显示为：“回复：(原始主题行)”。\n\n2. 输入您的回复。\n3.\
    \ 完成后，只需点击屏幕右上角的蓝色 `发送` 按钮。\n\n   ![images](img/U1753.jpg)\n\n## 使用全部回复\n\n使用\
    \ `全部回复` 选项与使用 `回复` 功能类似，不同之处在于原始邮件的所有收件人和原始发件人都被填入地址行。原始发件人将位于 `收件人：` 行，而原始邮件的所有其他收件人将列在\
    \ `抄送：` 行。只有当原始邮件有多个收件人时，您才会看到 `全部回复` 选项。\n\n**警告：** 使用 `全部回复` 时要小心。如果某些收件人因为超出屏幕边缘而未显示在原始邮件中，这可能会很危险。如果您确实使用了\
    \ `全部回复`，请务必检查 `收件人：` 和 `抄送：` 列表，以确保所有人都应接收您的回复。\n\n## 使用转发按钮\n\n有时，您会收到想要发送给其他人的电子邮件。`转发`\
    \ 命令可让您实现此操作（更多关于处理附件的内容，请参阅本章的“电子邮件附件”部分）。\n\n**注意：** 您需要转发附件才能将它们发送给其他人。如果您想将收到的电子邮件中的附件发送给某人，则必须选择\
    \ `转发` 选项。（请注意，选择 `回复` 和 `全部回复` 选项不会在您外发的邮件中包含原始电子邮件附件。）\n\n当您点击 `转发` 按钮时，可能会提示您选择是否\
    \ `包含或不包含` 原始邮件中的附件。\n\n此时，您按照之前描述的相同步骤输入您的消息、添加收件人并发送。\n\n# 清理和整理您的收件箱\n\n当您越来越习惯将\
    \ iPhone 作为电子邮件设备使用时，您会发现自己越来越多地使用 `邮件` 程序。最终，偶尔进行一些电子邮件清理工作将变得必要。您可以轻松地在 iPhone\
    \ 上删除或移动电子邮件。\n\n## 删除单封邮件\n\n要从收件箱中删除单封邮件，请按以下步骤操作：\n\n1. 在收件箱中向左或向右滑动一封邮件，调出\
    \ `删除` 按钮。\n2. 点击 `删除` 即可移除该邮件。\n\n   ![images](img/U1754.jpg)\n\n## 删除、移动或标记多封邮件\n\
    \n我们之前在本章的“移动、删除或标记（旗帜）多封邮件”部分向您展示了如何完成此操作。\n\n## 从邮件查看屏幕删除\n\n`邮件` 查看屏幕提供了另一种删除邮件的方式。打开任意邮件进行阅读，然后点击屏幕底部中央的\
    \ `垃圾桶` 图标 ![images](img/U1755.jpg)。您会看到邮件缩小并飞入 `垃圾桶` 中，从而被删除。\n\n**提示：** 您可以使用\
    \ `设置` 应用让您的 iPhone 在删除邮件前询问您。为此，请点击 `邮件、通讯录、日历`，然后将 `删除前询问` 旁边的开关设置为 `打开`。\n\n\
    您可以通过将邮件移动到其他文件夹来整理邮件。可以将电子邮件从收件箱移出以便存储或稍后阅读。\n\n**注意：** 如果您使用的是 iCloud 或其他受支持的电子邮件服务器，您可以直接在设备上创建、重命名或删除邮件文件夹，请参阅本章前面的“添加或编辑电子邮件文件夹或邮箱”部分。如果这对您无效，那么您需要在您的主电子邮件帐户中设置它们，并将其同步到您的\
    \ iPhone。我们将在本章的“微调您的电子邮件设置”部分向您展示如何执行此操作。\n\n## 在查看邮件时将其移至文件夹\n\n有时，您可能希望整理电子邮件以便日后轻松检索。例如，您可能会收到一封有关即将到来的旅行的电子邮件，并希望将其移动到“旅行”文件夹。有时您会收到需要稍后处理的电子邮件，在这种情况下，您可以将它们移动到“需要关注”文件夹。这可以帮助您记住稍后处理此类邮件。\n\
    \n请按照以下步骤移动电子邮件：\n\n1. 打开该电子邮件。\n2. 点击右上角的 `移动` 图标。\n3. 选择一个新文件夹，该邮件将从当前收件箱中移出。\n\
    \n   ![images](img/U1756.jpg)\n"
- fmt: "### Copy and Paste from an Email\n\nHere are a few tips to select text or\
    \ pictures and copy them from an email message:\n\n- Double-tap text to select\
    \ a word, then drag the blue handles up or down to adjust the selection. Next,\
    \ select `Copy`.\n\n  ![images](images/U1757.jpg)\n\n- Press and hold text, and\
    \ then choose `Select` or `Select All`.\n\n  ![images](images/U1758.jpg)\n\n-\
    \ Press and hold an image, and then select `Save Image` or `Copy`.\n\n  ![images](images/U1759.jpg)\n\
    \nFor a more complete description, please check out the “Copy and Paste” section\
    \ in [Chapter 2](#Chapter02.html#ch2): “Typing, Copy and Search.”\n\n### Searching\
    \ for Email Messages\n\nThe iPhone has some good built-in search functionality\
    \ to help you find your emails. You can search your inbox by the `From:`, `To:`,\
    \ `Subject`, or `All` fields. This helps you filter your inbox, so you can find\
    \ exactly what you are searching for.\n\n#### Activating Email Search\n\nIt's\
    \ easy to initiate an email search. Begin by navigating to the `inbox` of the\
    \ account you wish to search. If you scroll up to the top, you will now see the\
    \ familiar `Search` bar at the top of your `inbox`.\n\nIf your email account supports\
    \ the feature, you can also search the server for email messages. At the time\
    \ of writing, a few of the supported types of searchable email accounts include\
    \ `Exchange`, iCloud (formerly called `Mobile Me`), and `Gmail IMAP`. Follow these\
    \ steps to search through your email on a server:\n\n1.  `Tap` the `Search` bar\
    \ to see a new menu of soft keys under the `Search` bar.\n2.  Type the text you\
    \ wish to search for.\n3.  `Tap one of the tabs` under the Search window:\n\n\
    \    - `From`: Searches only the sender's email addresses.\n    - `To`: Searches\
    \ only the recipients' email addresses.\n    - `Subject`: Searches only message\
    \ `Subject` fields.\n    - `All`: Searches every part of the message.\n\n    ![images](images/U1760.jpg)\n\
    \nFor example, assume that we want to search an inbox for an email from “Martin.”\
    \ We would type Martin's name into the `Search` box and then touch `From`. The\
    \ inbox would then be filtered to show only the emails from Martin.\n\n### Fine\
    \ Tuning Your Email Settings\n\nYou can fine-tune the email accounts on your iPhone\
    \ with the myriad options available in the `Settings` app. Follow these steps\
    \ to change these settings: tap the `Settings` icon, then tap `Mail, Contacts,\
    \ Calendars.` The sections that follow explain the adjustments you can make.\n\
    \n#### Automatically Retrieve Email (Fetch New Data)\n\nIn addition to the options\
    \ under `Advanced`, you can use the `Email` settings to configure how often your\
    \ email is fetched or pulled to your iPhone. By default, your iPhone automatically\
    \ receives mail or other contact or calendar updates when they are “pushed” from\
    \ the server.\n\nYou can adjust this setting by taking the following steps:\n\n\
    1.  Tap the `Settings` app.\n2.  Tap `Mail, Contacts, Calendars`.\n3.  Tap `Fetch\
    \ New Data` under the email accounts listed.\n\n    ![images](images/U1761.jpg)\n\
    \n4.  Set `Push` to `ON` (default) to automatically have the server push data.\
    \ Set it to `OFF` to conserve your battery life.\n5.  Adjust the timing schedule\
    \ to pull data from the server. This is how frequently applications should pull\
    \ new data from the server.\n\n    **NOTE:** If you set this option to `Every\
    \ 15 Minutes`, you will receive more frequent updates; however, this option sacrifices\
    \ battery life compared to a setting of `Hourly` or `Manually`.\n\n    ![images](images/U1762.jpg)\n\
    \nHaving automatic retrieval is very handy if you just want to turn on your iPhone\
    \ and see that you have messages; otherwise, you need to remember to check.\n\n\
    ##### Advanced Push Options\n\nAt the bottom of the `Fetch New Data` screen, below\
    \ the `Hourly` and `Manually` settings, you can touch the `Advanced` button to\
    \ see a new screen with all your email accounts listed.\n\nTap any email account\
    \ to adjust its settings.\n\n![images](images/U1763.jpg)\n\nMost accounts can\
    \ be `Fetched` on the schedule you set or set to `Manual`. The `Manual` option\
    \ requires that you retrieve data using the `Update` button. This screen gives\
    \ you the ability to adjust `Fetch`, `Manual`, or even `Push` settings for each\
    \ account you have set up.\n\n![images](images/U1764.jpg)\n\n#### Adjusting Your\
    \ Mail Settings\n\nUnder the `Accounts` section, you can see all the email settings\
    \ listed under `Mail`. The `Default` settings may work well for you; but if you\
    \ need to adjust any of these, you can follow these steps:\n\n**Show**: This sets\
    \ how many emails are pulled from the server. You can specify anywhere from 50\
    \ to 1,000 messages (the default is 50 recent messages).\n\n**Preview**: This\
    \ option lets you set how many lines of text in addition to the `Subject` are\
    \ shown in the inbox `Preview`. You can adjust this value from `None` to `5 Lines`\
    \ (the default is `2 Lines`).\n\n![images](images/U1765.jpg)\n\n**Minimum Font\
    \ Size**: This is the default font size shown when opening an email the first\
    \ time. It is also smallest font size that you are allowed to zoom out to when\
    \ viewing an email. Your options are `Small`, `Medium`, `Large`, `Extra Large`,\
    \ and `Giant` (the default is `Medium`).\n\n**TIP:** You can expand the font size\
    \ further in the Accessibility area of settings. Check out [Chapter 2](#Chapter02.html#ch2):\
    \ “Typing, Copy and Search\" for more details.\n\n**Show To/Cc Label**: With this\
    \ option `ON`, you will see a small `To` or `Cc` label in your inbox before the\
    \ subject. This label shows which field your address was placed in (the default\
    \ state of this option is `OFF`).\n\n![images](images/U1766.jpg)\n\n**Ask Before\
    \ Deleting**: Turn this option `ON` to be asked every time you try to delete a\
    \ message (the default is `OFF`).\n\n**Load Remote Images**: This option allows\
    \ your iPhone to load all the graphics (remote images) that are placed in some\
    \ email messages (the default value for this option is `ON`).\n\n![images](images/U1767.jpg)\n\
    \n**Organize by Thread:** This option groups related emails together. It shows\
    \ only one message, with a number next to it. That number indicates how many related\
    \ emails exist. This feature gives you a good way to keep all discussions together\
    \ in one place (the default value of this option is `ON`).\n\n![images](images/U1768.jpg)\n\
    \n**Always Bcc Myself**: This option sends a blind carbon copy (`Bcc:`) of every\
    \ email you send from your iPhone to your email account (the default value of\
    \ this option is `OFF`).\n\n![images](images/U1769.jpg)\n\n#### Changing Your\
    \ Email Signature\n\nBy default, emails you send will say “Sent from my iPhone.”\
    \ Follow these steps to change the `Signature` line of the email:\n\n![images](images/U1770.jpg)\n\
    \n1.  Tap the `Signature` tab and type in the new email signature you want at\
    \ the bottom of emails sent from your iPhone.\n2.  When you are done editing the\
    \ `Signature` field, tap the `Mail, Contacts…` button in the upper-left corner.\
    \ This will return you to the `Mail` settings screen.\n\n    ![images](images/U1771.jpg)\n\
    \n#### Changing Your Default Mail Account (Sent From)\n\nIf you have multiple\
    \ email accounts set up on your iPhone, you should set one of them—usually, the\
    \ one you use most—as your `Default Account`. When you select `Compose` from the\
    \ `Email` screen, the default account is always chosen. Follow these steps to\
    \ change the email account you send from by default:\n\n![images](images/U1772.jpg)\n\
    \n1.  Tap the `Default Account` option, and you will see a list of all your email\
    \ accounts.\n2.  Tap the email account you wish to use as your `Default Account`\
    \ choice.\n3.  When you are done, touch the `Mail, Contacts…` button to return\
    \ to the `Mail` settings menu.\n\n    ![images](images/U1773.jpg)"
