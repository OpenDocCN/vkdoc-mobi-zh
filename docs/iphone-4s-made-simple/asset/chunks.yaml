    ## iTuneson Your Device\n\nIn this chapter, you will learn how to locate, buy,\
    \ and download media using the **iTunes** app right on your iPhone. With **iTunes**,\
    \ you will be able to download music, movies, TV shows, podcasts, and audiobooks.\
    \ You will also learn about free educational content from leading universities\
    \ from the **iTunes U** section on iTunes, as well as how to redeem iTunes gift\
    \ cards.\n\nSome of us still remember going to the record store when that new\
    \ single or album came out. It was an exciting feeling to look at all the music\
    \ we wanted, browsing first through all the vinyl albums, then tapes, and, finally,\
    \ CDs.\n\nThose days are long gone with the iPhone. Music, movies, TV shows, and\
    \ more are available right from the iPhone itself.\n\niTunes is a music, video,\
    \ TV, podcast, and more store. Virtually every type of media you can consume on\
    \ your iPhone is available for purchase or rent (and often for free) right from\
    \ the iTunes store.\n\n### Getting Started with iTunes\n\nEarlier in this book,\
    \ we showed you how to get your music from iTunes on your computer into your iPhone\
    \ (see [Chapter 3](#Chapter03.html#ch3): “Sync With iCloud, iTunes, and More”).\
    \ One of the great things about iTunes is that the store makesit very easy to\
    \ buy or obtain music, videos, podcasts, and audiobooks, and then use them within\
    \ minutes right on your iPhone.\n\nThe iPhone allows you to access the iTunes\
    \ site (the mobile version) right on your device. After you purchase or request\
    \ free items, they will be downloaded to your **Music** or **Videos** app on the\
    \ iPhone. If you have have iCloud and have turned on automatic downloads, any\
    \ music you buy will automatically be downloaded to your other iOS devices and\
    \ iTunes on your PC. Movies will transfer the next time you sync with your desktop\
    \ ITunes library.\n\n#### A Network Connection Is Required\n\nYou do need an active\
    \ Internet connection (either Wi-Fi or 3G/cellular) in order to access the iTunes\
    \ store. Check out [Chapter 4](#Chapter04.html#ch4): “Network Connectivity” to\
    \ learn more about this."
  trans: "\n# 选择起点或终点\n\n按照以下步骤选择起点或终点，然后挑选一条建议路线：\n\n1.  点击图钉上方的蓝色`箭头`图标。\n2.  轻点`路线从这里出发`。\n\
    3.  轻点`书签`按钮。\n4.  轻点`书签`、`最近访问`或`通讯录`以查找目的地。在本例中，我们轻点了`书签`，然后选择`芬威公园`。\n\n  \
    \  ![images](img/U2116.jpg)\n\n    **注意**：一旦你轻点`路线从这里出发`按钮，最近的搜索记录将自动显示（参见图 21-5）。你也可以点击`目的地`框并输入一个地址。\n\
    \    ![images](img/U2117.jpg)\n\n5.  选定目的地后，路线规划界面将带您进入总览屏幕。在我们的示例中，我们看到的是从苹果公司\
    \ 1 Infinite Loop 总部到帕罗奥图苹果商店的路线规划界面。\n6.  起点处会落下一个绿色图钉，终点处（本例中是芬威公园）会落下一个红色图钉。\n\
    7.  一条亮蓝色的线条将连接这两个图钉，为您显示路线。如果存在多条路线，其他路线将以浅蓝色显示。\n8.  轻点一条灰色路线即可将其选中。选中后，它将会变为亮蓝色，而其他任何路线都将褪为浅蓝色。\n\
    \n![images](img/U2118.jpg)\n\n# 查看路线\n\n在开始行程之前，您将在屏幕右上角看到一个`开始`按钮。轻点`开始`按钮，路线指引便会开始。`开始`按钮会变为`箭头`按钮，允许您在行程中的各个步骤之间切换。\n\
    \n![images](img/U2119.jpg)\n\n![images](img/U2120.jpg)\n\n如图 21-8 所示，您可以在地图上以路径形式或列表形式查看路线。\n\
    \n![images](img/2108.jpg)\n\n**图 21-8.** *两种查看路线的方式*\n\n您可以用手指滑动屏幕来查看路线，或者只需轻点底部的`箭头`按钮\
    \ ![images](img/U2121.jpg)，即可分步快照显示路线。\n\n您也可以轻点右下角的`卷页`按钮，然后轻点`列表` ![images](img/U2122.jpg)\
    \ 按钮，这将显示详细的分步路线指引。\n\n# 切换路线\n\n如前面示例中的第 6 和第 7 步所述，如果存在多条路线，`地图`应用会以亮蓝色线标记其最佳推荐路线，并将其标识为`路线\
    \ 1`。如果还有其他可行路线，地图会以浅蓝色线标记它们。轻点一条灰色线会将其变为亮蓝色，并标记其对应的编号——例如`路线 2`。\n\n如果您根据近期经验得知，由于施工或其他原因导致路线\
    \ 1 不太理想，或者您需要在途中某个不在推荐路线 1 上的地方停靠，那么切换到另一条路线是不错的选择。\n\n![images](img/U2123.jpg)\n\
    \n# 切换驾车、公交和步行路线\n\n在开始导航前，您可以通过轻点路线界面顶部蓝色栏左侧的图标来选择您是驾车、使用公共交通还是步行，如图 21-9 所示。\n\
    \n![images](img/2109.jpg)\n\n**图 21-9.** *选择出行方式*\n\n# 反转路线\n\n要反转路线，请点击位于顶部`起点`和`终点`字段之间的`反转`\
    \ ![images](img/U2124.jpg) 按钮。如果您不擅长自行反转方向，或者您的路线包含大量单行道，此功能将会非常有用。\n\n## 地图选项\n\
    \n![images](img/U2125.jpg)\n\n目前，唯一会影响`地图`应用的设置是“定位服务”，这对于确定您当前的位置至关重要。请按照以下步骤调整`地图`应用的设置：\n\
    \n![images](img/U2126.jpg)\n\n1.  轻点`设置`图标。\n2.  轻点`通用`标签页。\n3.  现在，找到大约在页面中间的`定位服务`开关。将此开关拨至`打开`位置，以便`地图`可以大致确定您的位置。\n\
    \n**注意：** 保持`定位服务`开关`打开`会略微缩短电池续航时间。如果您从不使用`地图`或不关心您的位置，请将其设为`关闭`以节省电池电量。\n\n\
    ## 使用数字指南针\n\niPhone 内置了非常酷的数字指南针功能。当您需要确定方位并找出哪个方向是北时，这会很有帮助。\n\n### 校准和使用数字指南针\n\
    \n在使用数字指南针之前，您需要先对其进行校准。通常您只需在首次使用时校准一次。请按照以下步骤操作：\n\n1.  像往常一样启动`地图`。\n2.  轻点两次当前位置按钮——它会从\
    \ ![images](img/U2127.jpg) 变为 ![images](img/U2128.jpg)。\n3.  您会看到屏幕上出现一个`数字指南针`图标，如图\
    \ 21-10 所示。\n4.  首次使用数字指南针功能时，屏幕上会出现`校准`符号。![images](img/U2129.jpg)\n5.  按照屏幕提示，以“8”字形移动您的\
    \ iPhone。\n\n    **注意**：在完成校准过程时，iPhone 可能会要求您远离任何干扰源。\n\n6.  将 iPhone 水平握持，使其与地面平行。如果校准成功，指南针将转动并指向北方。\n\
    \n![images](img/2110.jpg)\n\n**图 21-10.** *使用数字指南针功能*\n\n# 第 22 章\n\n## 您设备上的\
    \ iTunes\n\n在本章中，您将学习如何直接在 iPhone 上使用`iTunes`应用查找、购买和下载媒体内容。通过`iTunes`，您将能够下载音乐、影片、电视节目、播客和有声读物。您还将了解\
    \ iTunes 中`iTunes U`板块提供的来自顶尖大学的免费教育内容，以及如何兑换 iTunes 礼品卡。\n\n我们中的一些人还记得当年新单曲或专辑发行时去唱片店的情景。浏览我们想要的所有音乐——先是黑胶唱片集，然后是磁带，最后是\
    \ CD——那是一种令人兴奋的感觉。\n\n随着 iPhone 的出现，那些日子早已一去不复返。音乐、影片、电视节目以及更多内容都可以直接从 iPhone\
    \ 上获取。\n\niTunes 是一个音乐、视频、电视节目、播客等内容的商店。您能在 iPhone 上消费的几乎所有类型的媒体都可以从 iTunes 商店中购买或租赁（而且通常可以免费获取）。\n\
    \n### iTunes 入门\n\n在本书的前面部分，我们向您展示了如何将电脑上 iTunes 中的音乐导入 iPhone（参见第 3 章：“与 iCloud、iTunes\
    \ 及更多服务同步”）。iTunes 的一大优点是，商店让您很容易就能购买或获取音乐、视频、播客和有声读物，然后在几分钟内直接在 iPhone 上使用它们。\n\
    \niPhone 允许您直接在设备上访问 iTunes 网站（移动版）。在您购买或索取免费项目后，它们将被下载到 iPhone 上的`音乐`或`视频`应用中。如果您有\
    \ iCloud 并开启了自动下载，您购买的任何音乐都会自动下载到您的其他 iOS 设备和电脑上的 iTunes。下次您与桌面 iTunes 资料库同步时，影片也会同步过去。\n\
    \n#### 需要网络连接\n\n您需要一个有效的互联网连接（Wi-Fi 或 3G/蜂窝网络）才能访问 iTunes 商店。有关更多信息，请查阅第 4 章：“网络连接”。\n"
- fmt: "#### Starting iTunes\n\nWhen you first received your iPhone, `iTunes` was\
    \ one of the icons on the first `Home` screen page. Touch the `iTunes` icon, and\
    \ you will be taken to the mobile version of the iTunes Store.\n\n![images](images/U2201.jpg)\n\
    \n**NOTE:** The `iTunes` app changes frequently. Since the `iTunes` app is really\
    \ a web site, it is likely to change somewhat between the time we wrote this book\
    \ and when you are looking at it on your iPhone. Some of the screen images or\
    \ buttons may look slightly different than the ones shown in this book.\n\nAlso,\
    \ `iTunes` content can vary considerably from country to country. Depending on\
    \ where you live, you might not have access to movies, TV shows, or other media.\
    \ However, Apple continues to add `iTunes` content to more and more regions, so\
    \ be sure to check back occasionally.\n\n#### Navigating iTunes\n\nThe `iTunes`\
    \ app uses icons similar to other programs on the iPhone, so getting around is\
    \ quite easy. There are three buttons at the top and five soft keys at the bottom\
    \ to help you. You can customize these soft keys and we show you how in the next\
    \ section. Notice in the image to the right the soft keys at the bottom. Scrolling\
    \ in `iTunes` is just like scrolling in any other program; move your finger up\
    \ or down to look at the selections available.\n\n![images](images/U2202.jpg)\n\
    \n### Customizing iTunes Soft Keys\n\nIt's simple to customize the soft keys shown\
    \ at the bottom of the iTunes screen. Tap the `More` soft key in the lower left\
    \ corner. Then tap `Edit` in the upper right corner.\n\n![images](images/U2203.jpg)\n\
    \nNow, you can change the soft keys by dragging and dropping any of the icons\
    \ from the top down onto the soft key toolbar at the bottom. Any item you drop\
    \ will replace the icon that was currently there.\n\nTap `Done` to complete the\
    \ changes and return to `iTunes`.\n\n![images](images/U2204.jpg)\n\n### Finding\
    \ Music with New Releases, Top Tens, and Genres\n\nAlong the top of the screen\
    \ of the iTunes music store are three buttons: `Featured`, `Top Charts`, and `Genius`.\
    \ By default, you are shown the `Featured` selections when you start `iTunes`.\n\
    \n#### Top Tens: The Popular Stuff\n\nIf you like to know what is popular in a\
    \ particular category, you will want to browse the categories under `Top Tens`.\
    \ Tap `Top Tens` at the top, and then tap a category or genre to see what is popular\
    \ in that category.\n\n**CAUTION:** Items in the `Top Tens` categories are selling\
    \ well, but that doesn't mean that they will necessarily appeal to you. Always\
    \ preview an item and check out its reviews before you pay for it.\n\n![images](images/U2205.jpg)\n\
    \n#### Genres: Types of Music\n\nTouch the `Genres` button to browse music based\
    \ on a genre. This is particularly helpful if you have a favorite type of music\
    \ and would like to browse just that category.\n\nThere is an extensive list of\
    \ genres to browse; just scroll down the list as you would in any other iPhone\
    \ app.\n\n![images](images/U2206.jpg)\n\nGo ahead and browse through the music\
    \ until you see something that you would like to preview or buy.\n\n#### Browsing\
    \ for Videos (Movies)\n\nTouch the `Movies`, `TV Shows`, or `Movie Videos` buttons\
    \ on the top to browse all the video-related items.\n\n![images](images/U2207.jpg)\n\
    \nYou can also use your finger to scroll all the way to the bottom of the page\
    \ to check out the links there, including these links in particular:\n\n*   `Top\
    \ Tens`\n*   `Genres`\n\n**TIP:** At the very bottom of most pages, you can also\
    \ Redeem a gift card or log out of your Apple ID and log into another Apple ID\
    \ account. This is useful if someone (maybe your children) has changed the Apple\
    \ ID and you want to get back to yours.\n\nTap any movie or video to see more\
    \ details or preview the selection. You have the option to rent or buy some movies\
    \ and TV shows:\n\n![images](images/U2208.jpg)\n\n*   `Rentals`: Some movies are\
    \ available for rent for a set number of days. Click this button to rent a title.\n\
    \n    **NOTE:** The rental period in the US is 24 hours, and the rental period\
    \ in Canada is 48 hours. The rental periods for other countries may vary slightly.\n\
    \n*   `Buy`: Clicking this button allows you to purchase and own the movie or\
    \ TV show forever.\n\n![images](images/U2209.jpg)\n\n#### Finding TV Shows\n\n\
    When you're done checking out the movies, tap the `TV Shows` button at the top\
    \ to see what is available from your favorite shows.\n\n![images](images/U2210.jpg)\n\
    \n![images](images/U2211.jpg)\n\nWhen you tap a TV series, you will see the individual\
    \ episodes available. Tap any episode to check out the 30-second preview (see\
    \ [Chapter 15](#Chapter15.html#ch15): “Viewing Videos” for more on watching videos).\
    \ When you're finished with the preview, tap the `Done` button.\n\nWhen you are\
    \ ready, you can buy an individual episode or the entire TV series. Many, but\
    \ not all, TV series allow you to purchase individual episodes as shown in [Figure\
    \ 22–1](#Chapter22.html#fig_22_1).\n\nFor example, you might want to get your\
    \ fix of *Modern Family* and see the pilot episode that you missed. You can do\
    \ this quickly and easily on your iPhone.\n\n![images](images/2201.jpg)\n\n**Figure\
    \ 22–1.** *Buying a TV season or episode*\n\n**NOTE:** There is also a `Free TV\
    \ Episode` category, where you can get samples and bonus content.\n\n#### Audiobooks\
    \ in iTunes\n\nAudiobooks are a great way to enjoy books without having to read\
    \ them. Some of the narrators are so fun to listen to that it is almost like watching\
    \ a movie. For example, the narrator of the Harry Potter series can do dozens\
    \ of truly amazing voices. We recommend that you try out an audiobook on your\
    \ iPhone; audiobooks are especially great when you are on an airplane and want\
    \ to escape from the rest of the passengers, but don't want to have the light\
    \ on.\n\n**TIP:** If you're a big audiobook listener, getting an `Audible.com`\
    \ subscription can get you the same content at cheaper prices.\n\n![images](images/U2212.jpg)\n\
    \nIf you are an audiobook aficionado, be sure to check out the `Audiobooks` section\
    \ in iTunes.\n\nYou can click one of the top three buttons to browse the following\
    \ areas in `Audiobooks`:\n\n*   `Featured`\n*   `Top Tens`\n*   `Categories`\n\
    \n![images](images/U2213.jpg)\n\n### iTunes U: Great Educational Content\n\nIf\
    \ you like educational content, then check out the `iTunes U` section. You will\
    \ be able to see whether your university, college, or school has its own section.\n\
    \n![images](images/U2214.jpg)\n\nOne good example we discovered in just a few\
    \ minutes of browsing was a panel discussion with three Nobel Prize–winning economists\
    \ moderated by Paul Solman (the economic correspondent for the PBS News Hour).\
    \ You can find the podcast by navigating through the following menus: `iTunes\
    \ U` ![images](images/U001.jpg) `Universities & Colleges` ![images](images/U001.jpg)\
    \ `Boston University` ![images](images/U001.jpg) `BUNIVERSE - Business` ![images](images/U001.jpg)\
    \ `Audio`. Like much of the content in `iTunes U`, this podcast is free!\n\nIf\
    \ you are in a location with a good wireless signal, you can tap the title of\
    \ the audio or video item, and then listen to or watch it streaming. If your signal\
    \ gets interrupted, however, you will lose your place in the video. There are\
    \ many advantages to actually downloading the file (if possible) for later viewing,\
    \ not least of which is that you get more control over the video-watching experience."
