  trans: '

    #### 开机/关机与睡眠/唤醒


    要开启你的 iPhone，请按住 iPhone 顶部边缘的 `电源/睡眠` 按钮几秒钟。如果 iPhone 完全关机，仅快速点击此按钮是无法开机的——在这种情况下，你需要按住按钮直到看到
    iPhone 启动。


    当你不再使用 iPhone 时，有两个选项：你可以将其置于睡眠模式，或完全关闭它。


    睡眠模式的优势在于：当你想要再次使用 iPhone 时，只需轻点 `电源/睡眠` 按钮或 `主屏幕` 按钮即可唤醒 iPhone。如果你想最大限度地节省电量，或者知道将有很长一段时间不会使用
    iPhone（例如睡觉时），则应将其完全关闭。操作方法是：按住 `电源/睡眠` 按钮，直到出现 `滑动来关机` 滑块。只需向右滑动滑块，iPhone 便会关机。


    #### 辅助触控功能


    作为其出色的辅助功能的一部分，苹果为有特殊身体或运动技能需求的人士提供了辅助触控功能。这些功能包括硬件按钮的触摸屏版本，以及常见和自定义手势。


    请按照以下步骤启用辅助触控功能：


    1.  轻点 `设置` 图标。

    2.  轻点 `通用`。

    3.  轻点页面底部的 `辅助功能`。

    4.  轻点 `辅助触控`。

    5.  将 `辅助触控` 开关设置为 `开`。

    6.  当屏幕右下角出现 `辅助触控` 悬浮图标时，轻点该图标。

    7.  轻点 `主屏幕` 以模拟物理按压硬件 `主屏幕` 按钮。

    8.  轻点 `设备` 以访问其他硬件按钮模拟器，包括 `旋转屏幕`、`锁定屏幕`、`静音`/`取消静音`、`调高音量`、`调低音量` 和 `摇晃`。

    9.  轻点 `手势` 或 `收藏`（收藏手势）以访问捏合、轻扫以及任何已设置的自定义手势。

    10. 轻点悬浮菜单的中心以返回上一级菜单或退出辅助触控。


    ![images](img/U0110.jpg)


    **注意：** 辅助触控还支持复杂的手势，包括自定义手势。


    #### 滑动来解锁以及快速相机与媒体访问


    你的 iPhone 激活后，你将看到 `滑动来解锁` 屏幕，如图 1–3 所示。


    当有音乐播放时，双击 `主屏幕` 按钮可查看媒体控制，更重要的是，在你想要快速抓拍照片时，可以即时访问相机。轻点底部滑块旁边的相机图标。


    要进入你的 iPhone，请将手指放在屏幕上，并沿着箭头路径向右移动 `滑动来解锁` 按钮。完成此操作后，你将看到 `主屏幕` 屏幕。


    请注意底部 Dock 栏中的四个图标。此 Dock 栏中的项目不会移动，而其余图标可以在 *页面* 之间来回移动。你可以在 第 6 章：“图标与文件夹” 的“移动图标”部分中了解如何将你喜欢的图标移入底部
    Dock 栏。


    ![images](img/0103.jpg)


    **图 1–3.** *滑动来解锁*、*快速相机与媒体访问* 以及你的主屏幕。


    #### 在应用程序和设置屏幕内部导航


    在 iPhone 应用程序的各屏幕之间导航非常简单，只需轻点屏幕即可：


    1.  轻点 `设置` 图标以启动 `设置` 应用。

    2.  轻点 `通用` 以查看通用设置。

    3.  轻点 `网络` 以查看网络设置。

    4.  你可以通过轻点任何开关来切换它。例如，轻点 `数据漫游` 旁边的 `关闭` 开关会将其切换为 `开启`。

    5.  要返回上一级屏幕，请轻点左上角的按钮。在此例中，你应轻点 `通用` 按钮以离开 `网络设置` 屏幕。


    #### 主屏幕按钮


    ![images](img/U0111.jpg)


    你最常使用的按钮是 `主屏幕` 按钮。此按钮将启动你在 iPhone 上执行的所有操作。如果你的 iPhone 处于休眠状态，请按一次 `主屏幕` 按钮以唤醒你的
    iPhone（假设它处于睡眠模式）。


    按下 `主屏幕` 按钮也会使你退出任何应用程序并返回 `主屏幕` 屏幕。


    #### 按住主屏幕按钮启动 Siri


    按住主屏幕按钮即可启动你的个人助理。然后只需对着你的 iPhone 说话即可。如果你已启用 `抬起唤醒`，你也可以简单地将 iPhone 举到耳边并开始对
    Siri 说话。我们将在 第 7 章 中向你全面介绍 Siri。


    #### 双击主屏幕按钮访问快速应用切换器


    访问快速应用切换器只需双击 `主屏幕` 按钮。


    1.  在任何应用程序中或从 `主屏幕` 屏幕，双击 `主屏幕` 按钮。

    2.  屏幕将向上滑动，你将在底部行看到一栏小图标。这些代表你自启动 iPhone 以来已启动的应用程序。

    3.  轻点任意图标即可切换回该应用。

    4.  向左滑动手指可查看更多应用。

    5.  向右滑动手指可查看屏幕旋转锁定和媒体控制。

    6.  再次向右滑动手指可查看音量和 AirPlay 按钮。


    ![images](img/U0112.jpg)


    按照以下步骤从特定应用访问快速应用切换器：


    #### 用于铃声和音频/视频播放的音量键


    在 iPhone 的上左侧（见图 1–4），你可以看到一些简单的 `调高音量`/`调低音量` 键，你会发现它们非常实用。


    ##### 铃声音量


    如果你没有播放歌曲、视频或其他内容，按下这些 `音量` 键将会调整手机铃声的音量。


    **提示：** 当你在 `相机` 应用中时，`调高音量` 按钮会变成相机快门，让你可以快速拍照。


    ##### 静音手机铃声


    在 iPhone 左侧 `音量` 键上方有一个开关。将 `铃声静音` 开关滑向 iPhone 背面可将其设置为 `开启`。当声音静音时，开关旁边会亮起一小块橙色指示灯。要关闭静音，只需将开关滑回
    iPhone 正面方向即可（见图 1–4）。


    ##### 调整播放或通话音量


    你可以使用 `音量` 键在听音乐、看视频、享受其他内容甚至打电话时调高或调低手机音量。听音乐或看视频时，你也可以使用屏幕上的滑块来调整音量（见图 1–4）。


    ![images](img/0104.jpg)


    **图 1–4.** *在你的 iPhone 上调整音量或静音手机铃声*


    #### 在竖屏（垂直）方向上锁定屏幕


    如果你将 iPhone 侧向倾斜，你会注意到在某些应用程序中屏幕会旋转到横屏（水平）方向。你可能需要这种行为，以便使用更大的 `横屏` 键盘进行输入。然而，有时你可能不希望在你侧放
    iPhone 时屏幕从竖屏方向旋转。针对这些情况，你可以将屏幕锁定在竖屏方向。


    1.  双击 `主屏幕` 按钮。

    2.  从左向右滑动以查看媒体和屏幕锁定控制。

    3.  轻点左侧图标中的 `竖排方向锁定` 按钮。

    4.  要禁用锁定，请再次轻点同一按钮。


    **提示：** 方向锁定功能是在床上阅读 iBooks 的好方法。如果你更喜欢竖屏模式下较大的页面视图，请启用竖屏方向锁定功能。这样，当你将 iPhone
    放在腿上或近乎水平地拿着它时，屏幕不会意外地旋转到横屏模式。更多信息，请参阅 第 13 章：“iBooks 与电子书”。

