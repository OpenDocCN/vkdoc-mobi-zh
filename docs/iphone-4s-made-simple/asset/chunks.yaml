  trans: "\n### 第 3 步：连接到你的 iPhone 个人热点\n\n现在你的 iPhone 就变成了一个小型移动 Wi-Fi 路由器；你可以将 Mac\
    \ 或 Windows 电脑、iPad 或其他任何支持 Wi-Fi 的设备连接到你的 iPhone，就像连接到家庭、公司或学校的 Wi-Fi 网络一样。按照以下步骤操作：\n\
    \n1. 在你的设备上检查可用的 Wi-Fi 网络。\n2. 点击你 iPhone 的名称。\n3. 输入 Wi-Fi 密码。\n\n如果一切正常，你会在\
    \ iPhone 屏幕顶部看到一条蓝色横条，并显示已连接的设备数量。\n\n![images](img/U0428.jpg)\n\n### 第 4 步：在你的电脑上设置网络连接\n\
    \n将 iPhone 连接到电脑后，Windows 或 Mac 电脑应将你的 iPhone 识别为新的互联网连接，并自动帮你完成设置。如果电脑没有立即识别出\
    \ iPhone，请进入电脑的**网络**设置，查找名为 iPhone 的可用连接类型。\n\n## VPN：虚拟专用网络\n\n你的组织机构可能拥有一种称为\
    \ VPN 或*虚拟专用网络*的设施。VPN 允许你将 iPhone、笔记本电脑或其他设备安全地连接到公司网络。\n\n### 开始连接\n\n为了建立连接，你需要从组织机构的帮助台或网络管理员处了解\
    \ VPN 的类型和具体的登录说明。然后，你需要在 iPhone 的**设置**应用中的 **VPN** 区域输入这些登录详细信息。\n\n**提示**：如果你已经将电脑设置为连接到\
    \ VPN，那么你可能无需致电帮助台，直接跳过第 1 步。因为你的 iPhone 很可能使用与电脑相同的 VPN 登录凭据。\n\n此外，某些运营商可能要求使用企业账户才能在其\
    \ 3G 网络上使用 VPN。如果所有设置看起来都正确，但 VPN 仍无法正常工作，请咨询你的运营商。\n\n#### 第 1 步：联系组织机构的帮助台\n\
    \n你需要向帮助台或 VPN 管理员询问登录 VPN 的详细信息。你的 iPhone 目前可以连接以下类型的 VPN：**L2TP**、**PPTP** 和\
    \ **IPSec**（Cisco）。你还需要了解你的 VPN 是否使用**代理**，以及配置是手动的还是自动的。\n\n#### 第 2 步：在 iPhone\
    \ 上设置 VPN 连接\n\n有了登录说明和 VPN 连接类型后，你就可以用 iPhone 进行连接了：\n\n1. 轻点**设置**图标。\n2. 轻点**通用**。\n\
    3. 轻点**网络**。\n4. 向下滚动到屏幕底部，然后轻点 **VPN**。\n\n   ![images](img/U0429.jpg)\n\n5.\
    \ 在 **VPN** 屏幕上，轻点 **VPN** 选项旁边的开关，将其设置为**开启**。随后你应该会进入**添加配置**屏幕。如果没有，请轻点底部的**添加\
    \ VPN 配置**来设置新的 VPN 连接。\n\n   ![images](img/U0430.jpg)\n\n6. **添加配置**屏幕用于设置你的\
    \ VPN 登录详细信息，请使用从帮助台或 VPN 管理员处获取的信息。\n7. 如果你的 VPN 是 **L2TP** 类型，则使用此处显示的屏幕。向下滚动到底部，根据需要输入**代理**信息。\n\
    \n   ![images](img/U0431.jpg)\n\n8. 如果你的 VPN 是 **PPTP** 类型，则轻点顶部的 **PPTP**，然后使用此处显示的屏幕。向下滚动到底部，根据需要输入**代理**信息。\n\
    \n   ![images](img/U0432.jpg)\n\n9. 如果你的 VPN 是 **IPSec**（Cisco）类型，则轻点 **IPSec**，然后使用此处显示的屏幕。向下滚动到底部，根据需要输入**代理**信息。\n\
    10. 设置完成后，轻点右上角的**存储**按钮。\n11. 如果登录遇到问题，请确保你处于信号良好的无线网络覆盖区域，并确认你已正确输入所有登录凭据。输入时密码会消失，这可能会带来困难。在致电帮助台之前，不妨尝试重新输入密码和服务器信息。\n\
    \n![images](img/U0433.jpg)\n\n### 了解何时连接到 VPN 网络\n\n你会在网络连接状态显示区的右侧看到一个小 **VPN**\
    \ 图标 ![images](img/U0434.jpg)。*只有*当你看到此图标时，才表示你已安全连接到 VPN 网络。\n\n### 切换 VPN 网络\n\
    \n你可能需要连接到多个 VPN 网络。你可以按照以下步骤在 iPhone 上选择不同的 VPN 配置：\n\n1. 轻点**设置**图标。\n2. 轻点**通用**。\n\
    3. 轻点**网络**。\n4. 向下滚动到屏幕底部，然后轻点 **VPN**。\n5. 在 VPN 屏幕上，轻点另一个 **VPN 配置**以连接到该网络。除非你想更改该网络的登录设置，否则不要轻点带有\
    \ `>` 符号的蓝色**圆圈**图标。\n\n## 第 5 章\n\n## AirPlay 与蓝牙\n\n在本章中，我们将向你展示如何将 iPhone 连接到任何兼容\
    \ AirPlay 或蓝牙的设备，无论是 Apple TV、立体声音箱还是无线耳机。\n\n### 了解 AirPlay\n\n*AirPlay* 是苹果专有的视频和音频流媒体协议。AirPlay\
    \ 通过你本地家庭、学校或办公室的 Wi-Fi 网络工作。在使用 iPhone 的 AirPlay 之前，你必须确保所有设备都连接到同一个 Wi-Fi 网络。\n\
    \n![images](img/U0501.jpg)\n\n#### 可与 iPhone 配合使用的 AirPlay 设备\n\n在撰写本书时，只有 2010\
    \ 款的 Apple TV 支持 AirPlay 视频流播放。借助它，你可以将内容直接从 iPhone 流式传输到大屏幕电视上，与同事、朋友和家人分享。\n\
    \n苹果的 AirPort Express Wi-Fi 路由器带有一个音频输出接口，可以连接音箱用于 AirPlay 音频播放。各种第三方配件制造商也在推出兼容\
    \ AirPlay 的音箱。通过 AirPlay，你可以直接在 iPhone 上远程控制播放和音量。\n\n### 设置和使用 AirPlay\n\nAirPlay\
    \ 内置于 iPhone 中。只要所有设备都连接到同一个 Wi-Fi 网络，就无需额外设置。\n\n几款内置的 iPhone 应用支持 AirPlay，包括**视频**、**音乐**和\
    \ **YouTube**。一些使用苹果默认媒体播放器的 App Store 应用（例如 **Air Video**）也支持 AirPlay。按照以下步骤，在支持该功能的应用中使用\
    \ AirPlay：\n\n1. 轻点屏幕右下角的蓝色 **AirPlay** 图标。\n2. 从可用设备列表中选择用于流式播放音乐的设备。\n3. 要将视频或音乐切换回\
    \ iPhone，只需再次轻点 **AirPlay** 图标，然后从列表中选择 **iPhone**。\n\n![images](img/U0502.jpg)\n\
    \n![images](img/U0503.jpg)\n\n**注意**：**AirPlay** 图标会弹出同时列出了蓝牙和 Wi-Fi 连接设备的菜单。有关蓝牙的更多信息，请参阅下一节。\n\
    \n你可以通过轻点来选择 **Apple TV**。现在，你的音乐或视频将开始从选定的 AirPlay 设备播放。你可以再次触摸屏幕上的 **AirPlay**\
    \ 图标来确认。你会在新的 AirPlay 立体声蓝牙设备旁边看到一个**对勾**图标，并且应该能听到音乐从该音源发出。\n\n**提示**：为了节省 iPhone\
    \ 的电量，在通过 AirPlay 向其他设备流式传输内容时，按下**锁定**按钮关闭屏幕。你的音乐或视频会继续播放，但不会因为屏幕亮着而浪费电量。\n"
- fmt: '# AirPlay Mirroring


    The current iPhone does more than let you stream video or music from your iPhone
    to an Apple TV; it also lets you share the screen of any app—from a business presentation
    at work, to a board game with the family, to a video call with distant relatives.
    Being able to take `Keynote` or `Infinity Blade` or `FaceTime` from the small
    iPhone screen to a giant television set really transforms what was an intimate
    personal experience into a fun social activity.


    Follow these steps to use the AirPlay Mirroring feature:


    1. Tap the app you want to mirror. For this example, we’re using `Infinity Blade`.

    2. Once the app has launched, double-click the Home button to bring up the Fast
    App Switcher.

    3. Swipe from left to right to get to the audio/video controls. (They’re all the
    way at the end, so keep swiping until you can’t swipe any more.)

    4. Tap the `AirPlay button` to bring up the list of AirPlay–enabled devices on
    your Wi-Fi network.

    5. Select `Apple TV`.

    6. Toggle the `Airplay Mirroring` switch to `ON`.

    7. Click the `Home` button again to return to your app.

    8. You should now see `Infinity Blade` on the big screen. Let ’em have it!


    ![images](images/U0504.jpg)

    ![images](images/U0505.jpg)


    To stop AirPlay Mirroring, repeat the same procedure and choose `iPhone` from
    the device list.


    ## Understanding Bluetooth


    Apple’s latest iPhone supports Bluetooth 4.0, which includes traditional Bluetooth
    functionality, along with more advanced high speed and low power capabilities.
    This means you can talk or listen to music with better quality for longer than
    ever before.


    With many states passing laws that require motorists to use a hands-free method
    for talking on their phones, using Bluetooth is now more of a necessity than ever.
    Thanks to the technology known as `A2DP`, you can also stream your music to a
    Bluetooth–capable stereo device, including many newer automotive stereos and car
    kits.


    **NOTE**: You must have a third-party Bluetooth–capable adapter or Bluetooth–capable
    stereo to stream your music via Bluetooth technology.


    ### Understanding Bluetooth


    Bluetooth allows your iPhone to communicate with things wirelessly. Bluetooth
    is a small radio that transmits from each device. Before you can use a peripheral
    with the iPhone, you have to pair that device with your iPhone. Many Bluetooth
    devices can be used up to 30 feet away from the iPhone.


    ![images](images/U0506.jpg)


    #### Bluetooth Devices that Work with the iPhone


    Among other things, the iPhone works with Bluetooth headphones, Bluetooth stereo
    systems and adapters, Bluetooth keyboards, Bluetooth car stereo systems, Bluetooth
    headsets, and hands-free devices. The iPhone supports `A2DP`, which is known as
    Stereo Bluetooth; and `AVRCP`, which allows you to remotely control playback and
    volume.


    ### Pairing with a Bluetooth Device


    Your primary uses for Bluetooth might be with Bluetooth headphones, Bluetooth
    stereo adapters, or a Bluetooth headset. Any Bluetooth headphones should work
    well with your iPhone. To start using any Bluetooth device, you need to first
    pair (connect) it with your iPhone.


    #### Turning On Bluetooth


    ![images](images/U0507.jpg)

    ![images](images/U0508.jpg)


    The first step to using Bluetooth is to turn the Bluetooth radio on. Follow these
    steps to do so:


    1. Tap your `Settings` app.

    2. Then, tap `General`.

    3. Tap `Bluetooth`. By default, Bluetooth is initially set to `Off` on the iPhone.
    Tap the switch to move it to the `On` position.


    **TIP**: Bluetooth is an added drain on your battery. If you don’t plan on using
    Bluetooth for a period of time, think about setting the switch back to `Off`.


    ![images](images/U0509.jpg)


    #### Pairing with a Headset or Any Bluetooth Device


    As soon as you turn Bluetooth on, the iPhone will begin to search for any nearby
    Bluetooth devices, such as a Bluetooth headset or stereo adapter (see [Figure
    5–1](#Chapter05.html#fig_5_1)). For the iPhone to find your Bluetooth headset,
    you need to put that device into *pairing mode*. Read the instructions that came
    with your headset carefully—usually there is a combination of buttons to push
    to achieve this.


    **TIP**: Some headsets require you to press and hold a button for five seconds
    until you see a series of flashing blue or red/blue lights. Some accessories,
    such as the Apple wireless Bluetooth keyboard, automatically start up in pairing
    mode.


    Once the iPhone detects the Bluetooth device, it will attempt to automatically
    pair with it. If pairing takes place automatically, there is nothing more for
    you to do.


    ![images](images/0501.jpg)

    **Figure 5–1.** *Bluetooth device discovered, but not yet paired*


    **NOTE**: Some Bluetooth devices (e.g., a headset) may ask you to enter a series
    of numbers (a *passkey*) on the keyboard itself (see [Figure 5–2](#Chapter05.html#fig_5_2)).


    ![images](images/0502.jpg)

    **Figure 5–2.** *Type in the four-digit passkey when prompted during the pairing
    process.*


    Newer headsets—like the Aliph Jawbone ICON used here—will automatically pair with
    your iPhone. Simply put the headset into pairing mode and set your iPhone’s `Bluetooth`
    option to `ON`—that’s all you have to do!


    ![images](images/U0510.jpg)


    Pairing will be automatic and you should never have to re-pair the headset again.


    #### Using the Bluetooth Headset


    If your headset is properly paired and on, all incoming calls should be routed
    to your headset. Usually, you can just press the main button on the headset to
    answer the call or use the Slide to Answer function on the iPhone.


    If you move the phone away from your face (while the iPhone is dialing), you should
    see an indicator showing that the Bluetooth headset is in use. In the image to
    the right, you can see the `Speaker` icon next to the `Jawbone ICON` Bluetooth
    headset.


    ![images](images/U0511.jpg)


    You will also see options to send the call to your iPhone handset or to the speakerphone
    (`Speaker`). You can change this at any point while you are on the call.


    Touch `Hide Sources` and you will see the iPhone’s normal call screen.


    ##### Options When on a Call


    Once the call is made and you are speaking with your contact, you can still reroute
    the call to either the iPhone or the speakerphone.


    Move the call away from your face (if it is near your face) and you will see `Audio
    Source` ![images](images/U0513.jpg) as one of the options for you to touch. Touch
    that icon and you will see all the options for rerouting the call, as shown previously.


    ![images](images/U0512.jpg)


    Just choose to send the call to any of the options shown and you will see the
    small `Speaker` icon move to the current source being used for the call (see [Figure
    5–3](#Chapter05.html#fig_5_3)).


    ![images](images/0503.jpg)

    **Figure 5–3.** *Changing from Bluetooth headset back to the iPhone while on a
    call*


    ## Bluetooth Stereo (A2DP)


    ![images](images/U0514.jpg)


    One of the great features of today’s advanced Bluetooth technology is the ability
    to stream your music without wires via Bluetooth. The fancy name for this technology
    is `A2DP`, but it is more simply known as *Stereo Bluetooth*.'
