    # 切换收发邮件的声音


    每次收发邮件时，您可能会注意到一点音效。您听到的是 iPhone 上的默认设置。


    如果您想关闭或更改此设置，可在 `设置` 程序中进行操作：


    1. 点击 `设置` 图标。

    2. 点击 `声音`。

    3. 您会看到多个用于开启或关闭声音效果的开关。点击 `新邮件` 和 `发送邮件` 来选取您的邮件铃声选项。


    ![images](img/U1774.jpg)


    ## 高级邮件选项


    **注意：** 设置为 `Exchange`、`IMAP` 或 `iCloud` 的电子邮件账户不会显示此 `高级` 邮件设置屏幕。此设置仅适用于 POP3
    电子邮件账户。


    ![images](img/U1775.jpg)


    要进入每个电子邮件账户的 `高级` 选项，请按照以下步骤操作：


    1. 点击 `设置` 图标。

    2. 点击 `邮件、通讯录、日历`。

    3. 点击 `账户` 下列出的一个电子邮件地址。

    4. 在邮件设置弹出窗口的底部，点击 `高级` 按钮以调出 `高级` 对话框。


    ![images](img/U1776.jpg)


    ### 从 iPhone 上删除邮件后的移除设置


    您可以设置在邮件被删除后，完全从 iPhone 上移除的频率。


    点击 `移除` 标签，然后选择最适合您的选项；默认设置为 `永不`。


    ![images](img/U1777.jpg)


    ### 使用 SSL 和认证


    `SSL` 和 `认证` 功能之前已经讨论过；不过，此屏幕为您提供了另一个位置来为特定电子邮件账户访问这些功能。


    ### 从服务器删除


    您可以配置 iPhone 如何处理从邮件服务器删除邮件。通常，此设置保留为 `永不`，此功能由您的主电脑处理。但是，如果您将 iPhone 作为主邮件设备使用，您可能希望从手机本身处理该功能。请按照以下步骤从
    iPhone 上删除服务器上已删除的邮件。


    1. 点击 `从服务器删除` 标签，选择最符合您需求的功能：`永不`、`七天后` 或 `从收件箱移除时`。

    2. 默认设置为 `永不`。如果您想选择 `七天后`，该选项应为您提供足够的时间在电脑和 iPhone 上检查邮件，然后决定保留和删除哪些邮件。


    ![images](img/U1778.jpg)


    ### 更改收件服务器端口


    正如您之前对 `发件服务器端口` 所做的操作一样，如果您在接收邮件时遇到问题，可以更改 `收件服务器端口`。您遇到与收件端口相关问题的可能性非常小；因此，您很少需要更改此数字。如果您的电子邮件服务提供商给您提供了不同的号码，只需点击数字并输入新的端口。`收件服务器端口`
    的值通常为 `995`、`993` 或 `110`；不过，端口值也可能是其他数字。


    ## 邮件问题故障排除


    通常，您的邮件在 iPhone 上运行完美。然而，有时您的邮件可能无法像您期望的那样完美运行。这可能是由于服务器问题、网络连接问题或电子邮件服务提供商的要求未得到满足所致。


    大多数情况下，只需要调整一个简单的设置或重新输入密码。


    如果您尝试了一些后续的故障排除提示，但您的邮件仍然无法正常工作，那么您的邮件服务器可能只是暂时宕机。请与您的电子邮件服务提供商核实，确保您的邮件服务器正常运行；您还可以检查您的提供商是否进行了任何可能影响您设置的最新更改。


    **提示：** 如果后续的提示未能解决问题，请查看第 26 章：“故障排除”以获取更多有用的提示和资源。


    ### 无法接收或发送邮件


    如果您无法发送或接收邮件，第一步应该是确认您已连接到互联网。可通过查看 `主屏幕` 左上角的网络连接符号来确认（详见第 4 章：“连接到网络”）。


    有时，您需要调整发件端口才能正确发送邮件。请按照以下步骤操作：


    1. 点击 `设置`。

    2. 点击 `邮件、通讯录和日历`。

    3. 在 `账户` 下，点击您在发送邮件时遇到问题的电子邮件账户。

    4. 点击 `SMTP` 并确认您的发件服务器设置正确；同时检查其是否设置为 `开`。

    5. 点击顶部的 `发件服务器` 并确认所有设置，例如 `主机名`、`用户名`、`密码`、`SSL`、`认证` 和 `服务器端口`。您也可以尝试将 `服务器端口`
    值设为 `587`、`995` 或 `110`；有时这会有帮助。

    6. 点击 `完成`，然后点击左上角的电子邮件账户名称，返回此账户的 `邮件` 设置屏幕。

    7. 向下滚动到底部并点击 `高级`。

    8. 在此屏幕上，您也可以尝试为服务器端口设置不同的端口值，例如 `587`、`995` 或 `110`。如果这些值不起作用，请联系您的电子邮件服务提供商以获取不同的端口号并确认您的设置。


    # 第 18 章


    # 通讯录和备忘录


    您的 iPhone 让您能即时访问所有重要信息。就像您的电脑一样，您的 iPhone 可以存储数千个联系人以便轻松查找。在本章中，我们将向您展示如何添加新联系人、通过添加新字段自定义联系人、用群组整理联系人、快速搜索或滚动浏览联系人，甚至使用
    iPhone 的 `地图` 应用查看联系人的位置。我们还将向您展示如何自定义 `通讯录` 视图，使其按您喜欢的方式排序和显示。最后，我们将介绍一些故障排除提示，当您遇到困难时可以节省时间。


    我们还将向您概述 `备忘录` 应用，您可以用它来写笔记、制作购物清单、列出您想看的电影或想读的书籍。我们将向您展示如何整理备忘录，以及如何将备忘录通过电子邮件发送给自己或他人。理想情况下，我们希望
    `备忘录` 在 iPhone 上能变得如此便捷，以至于您最终可以丢弃大部分（即使不是全部）纸质便签！


    同样很棒的是，您可以使用 `iCloud` 来无线同步、共享和备份您的通讯录和备忘录。因此，您再也不用担心丢失重要信息，或担心您的设备或电脑上是否拥有最新信息。


    ## 将通讯录加载到 iPhone 上


    第 3 章：“与 iCloud、iTunes 及更多同步”介绍了如何使用 Mac 或 Windows 电脑上的 `iTunes` 应用将通讯录加载到 iPhone
    上。您也可以使用 Google Sync 或 iCloud 服务将通讯录加载到手机。


    **提示：** 您可以从收到的电子邮件中添加新的联系人条目。了解具体方法请参见第 17 章：“使用电子邮件通信。”


    ## 通讯录列表何时最有用？


    当满足以下两个条件时，`通讯录` 应用最为有用：


    1. 其中存储了大量姓名和地址。

    2. 您可以轻松找到所需信息。

    '
- fmt: '#### Improving Your Contact List


    We have a couple of basic rules that can help you make your contact list on your
    iPhone more useful:


    **Rule 1: Add anything and everything to your contacts.**


    > You never know when you might need that obscure restaurant name, plumber''s
    number, and so on.


    **Rule 2: As you add entries, make sure you think about how to find them in the
    future (first name, last name, company).**


    > We have many tips and tricks in this chapter to help you enter names, so you
    can find them instantly when you need them.


    **TIP**: Here''s a good way to find restaurants. Whenever you enter a restaurant
    into your contacts list, make sure to put the word “restaurant” into the company
    name field, even if it''s not part of the name. When you type the letters “rest,”
    then you should instantly find all your restaurants!


    ### Adding a New Contact on Your iPhone


    You can always add your contacts right on your iPhone. This is handy when you''re
    away from your computer—but have your iPhone—and need to add someone to your contacts.
    It''s very easy to do; the next section will show you how.


    ![images](images/U1801.jpg)


    #### Start the Contacts App


    From your **Home** screen, touch the **Contacts** icon and you''ll see the **All
    Contacts** list. Tap the **Plus Sign** button (**+)** in the upper-right corner
    to add a new contact, as shown in [Figure 18–1](#Chapter18.html#fig_18_1).


    ![images](images/1801.jpg)


    **Figure 18–1.** *Entering a new contact name*


    Tap each field to enter the new contact''s first name, last name and Company name.


    **TIP**: Keep in mind that the contacts search feature uses first, last, and company
    names. When you add or edit contacts, adding a special word to the company name
    can help you find a particular contact later. For example, adding the words “Cece
    friend” to the **Company** field can help you find all of Cece''s friends quickly
    using the search feature.


    Under the **First Last** button are fields for **mobile phone, email, ringtone,
    text tone, home page, add new address** and **add field**. Under that, you can
    Link contacts together.


    #### Adding a New Phone Number


    ![images](images/U1802a.jpg)


    Tap the **Phone** button and use the **Numbers** keyboard to input the phone number.


    **TIP**: Don''t worry about parentheses, dashes, or dots—the iPhone will put the
    number into the correct format. Just type the digits of the area code and number.
    If you know the country code, it''s a good idea to put that in, as well.


    ![images](images/U1802.jpg)


    Next, choose which type of phone number this is—mobile, home, work, or other.
    There are nine fields you can choose from, and there''s also a **Custom** field
    if you find none of the built-in fields apply.


    ![images](images/U1803.jpg)


    **TIP**: Sometimes you need to add a pause to a phone number—for example, when
    the phone number is for someone at an organization where you have to dial the
    main number and then an extension. This is easy to do on the iPhone. You just
    tap the **Symbols** button(`+*#`) and then tap **Pause** or **Wait**. **Pause**
    will add a comma between the main number and the extension, like this: `386-555-7687,
    19323`. When you dial this number (e.g., from your iPhone), your phone will dial
    the main number, pause for two seconds, and then dial the extension. If you need
    more of a pause, simply add more commas. **Wait** will add a semi-colon between
    the main number and the extension (or conference call ID, or whatever extra digits
    you may need to enter). Once the first number is dialed, a second button will
    appear with the extra numbers. Tapping it will dial them.


    #### Adding Email Addresses


    ![images](images/U1804.jpg)


    Touch the **Email** tab and enter the email address for your contact. You can
    also touch the tab to the left of the email address and select whether this is
    a home, work, or other email address.


    After you add one address, you will see another field appear to add more email
    addresses.


    #### Custom Ringtone or Text Tone


    ![images](images/U1805.jpg)


    Touch the **ringtone** or **text tone** tabs to select a custom ringtone or text
    tone when this person calls or sends you a text message.


    #### Entering Web Site Addresses


    ![images](images/U1806.jpg)


    You will also see a **home page** field in which you can enter the address of
    your contact''s web site or even multiple web sites.


    ![images](images/U1807.jpg)


    **NOTE**: If you used iCloud to sync your contacts, iCloud may automatically look
    for a Facebook homepage to integrate into the contact info.


    #### Adding the Street Address


    ![images](images/U1808.jpg)


    Below the **home** field are the fields for adding the address. Input the **Street**,
    **City**, **State**, and **Zip Code**. You can also specify the **Country** and
    whether this is a home or work address.


    ![images](images/U1809.jpg)


    #### Adding New Fields


    ![images](images/U1810.jpg)


    Tap the **Add Field** tab and select any of the suggested fields to add it to
    that particular contact (see [Figure 18–2](#Chapter18.html#fig_18_2)).


    ![images](images/1802.jpg)


    **Figure 18–2.** *New fields available to add to your Contact entry*


    When you touch **Birthday**, you''re presented with a wheel. You can turn the
    wheel to the corresponding date to add the birthday to the contact information.


    When you are finished, just touch the **Done** button in the upper-right corner
    of the **New Contact** form.


    ![images](images/U1811.jpg)


    ![images](images/U1812.jpg)


    **TIP**: Suppose you meet someone at the bus stop—someone you want to remember.
    Of course, you should enter your new friend''s first and last names (if you know
    them); however, you should also enter the words “bus stop” in the **Company name**
    field. Then, when you type the letters “bus” or “stop,” you should instantly find
    everyone you''ve met at the bus stop, even if you can''t remember their names!


    ### Adding a Photo to Contacts


    You may want to associate a photo with a contact. From the **New Contact** screen
    we''ve been working in, simply touch the **Add Photo** button next to the **First
    Last** tab.


    If you are changing a photo when you are in “edit contact” mode, you''ll see **edit**
    at the bottom of the existing photo.


    ![images](images/U1813.jpg)


    After you touch the **add photo** button, you''ll see that you can do the following:


    *   Take Photo

    *   Choose Photo


    If there''s a photo already in place, you can also do these things:


    *   Edit Photo

    *   Delete Photo


    ![images](images/U1814.jpg)


    To choose an existing photo, select the photo album where the picture is located
    and touch the corresponding tab. When you see the picture you want to use, just
    touch it.


    ![images](images/U1815.jpg)


    You''ll notice that the top and bottom of the photo become grayed out and that
    you can manipulate the picture by moving it, pinching to zoom in or out, and then
    arranging it in the **Picture** window.


    Once the picture is sitting where you want it, just touch the **Choose** button
    in the lower-right corner and that picture will be set for the contact.


    ![images](images/U1816.jpg)


    **TIP**: If you just moved into a new neighborhood, it can be quite daunting to
    remember everyone''s name. Therefore, it''s good practice to add the word “neighbor”
    into the **Company name** field for every neighbor you meet. To instantly call
    up all your neighbors, simply type the letters “neigh” to find everyone you''ve
    met!'
