    \ that person's land line. Follow these steps to do so:\n\n1.  In the **Phone**\
    \ settings screen, tap **Call Forwarding.**\n\n    ![images](images/U0948.jpg)\n\
    \n2.  Set the **Call Forwarding** switch to **ON.**\n\n    ![images](images/U0949.jpg)\n\
    \n3.  Tap the **Forward to** row to enter the forwarding number.\n\n    ![images](images/U0950.jpg)\n\
    \n4.  Once entered, the number will be stored for future reference. All calls\
    \ will be forwarded from your regular iPhone number to this number until you set\
    \ **Call Forwarding** to **OFF**.\n\n    **CAUTION:** Call forwarding is not always\
    \ free. Call your phone company to see if you will be charged for enabling call\
    \ forwarding.\n\n#### Call Waiting\n\nAnother **Phone** setting is **Call Waiting**.\
    \ This option alerts you to the fact that another call is coming in while you\
    \ are on the phone.\n\n![images](images/U0951.jpg)\n\nYou then have the option\
    \ to take the new call, hang up on the first call, or set up a conference call,\
    \ as described previously.\n\nEnabling call waiting is as simple as making sure\
    \ the **Call Waiting** switch is set to the **ON** position, which is the default\
    \ setting.\n\n#### Show or Block (Hide) Your Caller ID\n\nThere may be certain\
    \ situations where you would prefer that your phone number not show up on the\
    \ caller's phone.\n\n![images](images/U0952.jpg)\n\nFortunately, your iPhone gives\
    \ you the option to block your Caller ID phone number. To do so, set the **show\
    \ My Caller ID** switch to **OFF**."
  trans: "\n#### 播放语音留言\n\n可视化语音信箱系统的妙处在于，你无需拨号收听留言。所有语音留言都会保存在你的手机上，你可以保存、浏览或删除它们。\n\
    \n![images](img/U0936.jpg)\n\n通过`Voicemail`图标右上角红色**圆形**图标中的小数字，你可以知道有多少条未收听留言。\n\
    \n未收听项目（就像收件箱中未读的电子邮件）会用一个小蓝点标记。\n\n`Voicemail`图标会显示信箱中的留言数量。轻点留言旁边的`播放`按钮，留言将通过听筒播放。\n\
    \n**提示：** 如果你无法查看屏幕，仍可通过按住手机上的`1`键拨入，免提收听语音留言。\n\n##### 通过扬声器收听语音留言\n\n如果你想通过\
    \ iPhone 的扬声器（而非听筒）收听语音留言，只需轻点右上角的`扬声器`按钮。\n\n![images](img/U0937.jpg)\n\n#####\
    \ 调整问候语\n\n轻点`问候语`按钮来调整你的语音信箱问候语。你可以重新收听当前的问候语、录制新的`自定义`问候语，或恢复为`默认`问候语。\n\n![images](img/U0938.jpg)\n\
    \n##### 回拨留言者\n\n如果有人给你留下语音留言，你可以轻点`回拨`按钮回电给她；这将立即回拨。\n\n![images](img/U0939.jpg)\n\
    \n#### 删除语音留言\n\n如果你打算日后重听，你的 iPhone 会保存所有语音留言。但留言太多时，管理起来会有些不便。选中一条留言并轻点红色的`删除`按钮，即可将其从\
    \ iPhone 中移除（参见图 9–7）。\n\n![images](img/U0940.jpg)\n\n**注：** 你可以选择保存“已删除”的留言。你的`Voicemail`屏幕会在独立的`已删除`标签页中显示已删除的留言。如果你在此标签页中轻点某条留言，可以轻点`还原`按钮将其恢复。\n\
    \n![images](img/0907.jpg)\n\n**图 9–7.** *处理已删除的语音留言项目*\n\n如果你想永久删除所有语音留言，请轻点`全部清除`。\n\
    \n### 电话会议\n\n在如今繁忙的世界中，同时与多位通话方沟通已成为我们对手机的一项基本需求。幸运的是，iPhone 上的电话会议功能非常直观。\n\n\
    **注：** AT&T/GSM 版 iPhone 最多支持五方电话会议，但 Verizon 的 CDMA 网络技术限制使 Verizon 版 iPhone\
    \ 仅支持三方电话会议。\n\n##### 发起第一通电话\n\n如本章前面所示，你可以拨打`最近通话`中的任何号码、新号码、联系人、`个人收藏`列表中的联系人等。\n\
    \n![images](img/U0941.jpg)\n\n你甚至不必主动发起呼叫来创建电话会议。例如，你可以接听第一位通话者的来电，然后再将第二个人加入会议。\n\
    \n将 iPhone 从脸前移开，即可查看可用的通话功能。本章前面已介绍了其中的大部分功能。\n\n##### 添加第二位通话者\n\n轻点`添加通话`按钮开始添加第二位通话者。这将立即将第一位通话者置于保持状态。\n\
    \n![images](img/U0942.jpg)\n\n轻点`添加通话`按钮后，系统会跳转到你的`通讯录`列表。只需滚动或双击顶部即可搜索你要添加到此通话中的联系人。\n\
    \n![images](img/U0943.jpg)\n\n你也可以从`个人收藏`或`最近通话`中选择添加新的通话者，或者轻点底部的`拨号键盘`软键后直接拨打其电话号码。\n\
    \n![images](img/0908.jpg)\n\n**图 9–8.** *添加第二位通话者*\n\n如果该联系人有多个电话号码，请轻点你要呼叫的号码，通话将会发起。\n\
    \n#### 合并通话\n\n一旦与第二位通话者的呼叫发起，你会注意到`添加通话`按钮已变为`合并通话`按钮。轻点此按钮即可将两通电话合并为三方通话（参见图\
    \ 9–9）。\n\n![images](img/0909.jpg)\n\n**图 9–9.** *在通话者之间切换并将其合并为电话会议*\n\n屏幕顶部现在会滚动显示电话会议中所有通话者的列表。\n\
    \n#### 与个别通话者私密通话或断开连接\n\n若要在电话会议中单独或私密地与某位通话者交谈，请执行以下步骤：\n\n1.  轻点`电话`屏幕顶部姓名旁边的小型黑色`箭头`图标\
    \ ![images](img/U0944.jpg)（参见图 9–10）。\n2.  现在你会看到所有通话者的列表。轻点某人姓名旁边的`私密`按钮 ![images](img/U0945.jpg)\
    \ 即可与该人私密通话。其他所有人将被置于保持状态。\n3.  若要挂断任何通话者，请轻点其姓名左侧的红色`电话`图标 ![images](img/U0946.jpg)。\n\
    \n![images](img/0910.jpg)\n\n**图 9–10.** *与个别通话者私密通话或将其挂断*\n\n### 电话选项与设置\n\n\
    你可以通过进入`设置`应用自定义手机中的许多功能：\n\n1.  轻点`设置`图标。\n\n    ![images](img/U0947.jpg)\n\n\
    2.  向下滚动并轻点`电话`。\n\n以下部分描述了此处找到的所有电话设置。\n\n#### 呼叫转移\n\n有时你可能需要将呼叫转接到另一个号码。例如，你正在拜访一位住在偏远地区、手机信号极差的朋友家。在这种情况下，你可以将呼叫转接到该朋友的固定电话。请按以下步骤操作：\n\
    \n1.  在`电话`设置屏幕中，轻点`呼叫转移`。\n\n    ![images](img/U0948.jpg)\n\n2.  将`呼叫转移`开关设置为`开启`。\n\
    \n    ![images](img/U0949.jpg)\n\n3.  轻点`转接到`行以输入转接号码。\n\n    ![images](img/U0950.jpg)\n\
    \n4.  输入后，号码将被保存以供将来使用。所有来电将从你的常规 iPhone 号码转接到此号码，直到你将`呼叫转移`设为`关闭`。\n\n    **注意：**\
    \ 呼叫转移并非总是免费的。请致电你的电话公司，确认启用呼叫转移是否会产生费用。\n\n#### 呼叫等待\n\n另一个`电话`设置是`呼叫等待`。此选项可在你通话时提醒你又有另一通来电。\n\
    \n![images](img/U0951.jpg)\n\n然后你可以选择接听新来电、挂断第一通电话或设置电话会议（如前所述）。\n\n启用呼叫等待非常简单，只需确保`呼叫等待`开关处于`开启`位置即可（这是默认设置）。\n\
    \n#### 显示或拦截（隐藏）你的来电显示\n\n在某些情况下，你可能希望自己的电话号码不显示在对方手机上。\n\n![images](img/U0952.jpg)\n\
    \n幸运的是，你的 iPhone 提供了拦截来电显示号码的选项。为此，请将`显示我的来电显示`开关设置为`关闭`。\n"
- fmt: "#### Setting up Security on Your SIM Card\n\nAs an added measure of security,\
    \ you can enable a PIN code to access information stored on your SIM card. If\
    \ your iPhone is ever lost or stolen, this will prevent anyone from accessing\
    \ the names and numbers stored on your SIM card.\n\n**CAUTION:** Setting this\
    \ SIM PIN may lock your phone so that it is unusable until you enter a PUK (*personal\
    \ unlocking key*). You can get this eight-digit PUK from your wireless carrier.\
    \ For AT&T, log into AT&T's web site, click **My Services** at the top of the\
    \ page, and then click **My Phone/Device** in the middle. Next, select your iPhone\
    \ and click the `Unblock SIM Card` link. If you do not have AT&T, then check your\
    \ carrier's web site or call your carrier's help desk.\n\n![images](images/U0953.jpg)\n\
    \nFollow these steps to do so:\n\n1.  Go to the **Phone** settings menu, as described\
    \ previously.\n2.  Scroll down and tap **SIM PIN**.\n3.  This will take you to\
    \ the **SIM PIN** screen. If you try to set the **SIM PIN** option to **ON** here,\
    \ and you see an error message similar to the one shown to the right, then your\
    \ iPhone has been locked. You can only unlock it by entering the PUK. See the\
    \ preceding Caution for more details.\n\n    ![images](images/U0954.jpg)\n\n4.\
    \  If you don't see an error message after setting the switch next to **SIM PIN**\
    \ to **ON**, then you can tap **Change PIN** to enter your new PIN.\n\n**NOTE:**\
    \ Verizon's CDMA network doesn't use SIM cards, so the Verizon iPhone doesn't\
    \ offer SIM PIN locking.\n\n#### TTY for Deaf People\n\nTTY stands for *Text Telephone\
    \ Device*. Such devices let deaf people type messages that are sent over phone\
    \ lines. Your iPhone can communicate with another phone that is equipped with\
    \ a TTY device—simply set the **TTY** switch to **ON** to do so.\n\n#### Switching\
    \ Between Wireless Carriers\n\nIn some countries, especially where unlocked iPhones\
    \ are more popular, you may see a **Carriers** tab in your **Settings**\n\n![images](images/U0955.jpg)\n\
    \nTap **Carrier** to see the screen where you can switch between carriers for\
    \ your iPhone.\n\nLeave it set to **Automatic** to have your iPhone select the\
    \ best network.\n\nIf you want to force your iPhone onto a specific network, such\
    \ as **ROGERS**, then tap that network name\n\n![images](images/U0956.jpg)\n\n\
    #### Carrier Services\n\nPressing the **Carrier Services** button will list the\
    \ name of your wireless carrier or phone company.\n\nFor example, if your carrier\
    \ is AT&T in the US, tap **AT&T Services** at the bottom of the **Phone** settings\
    \ screen to see special numbers related to AT&T. If you use a different carrier,\
    \ this screen will show the special access numbers for your carrier.\n\n![images](images/U0957.jpg)\n\
    \n**NOTE:** Not all carriers support this function; if you don't see these options,\
    \ visit your carrier's website for account details.\n\nTap any of the entries\
    \ on this screen to perform the stated request. For example, if you tap **View\
    \ My Minutes**, you'll receive a text message response showing details of your\
    \ minutes remaining in your current billing cycle.\n\nTap the **View** button\
    \ to see more details.\n\n![images](images/U0958.jpg)\n\n### Ring Tones, Sounds,\
    \ and Vibration\n\nYour iPhone can use unique sounds or vibrations to alert you\
    \ to incoming calls, voice mails received, and other events. These can easily\
    \ be adjusted using the **Settings** app.\n\nThe “Adjusting Sounds on your iPhone”\
    \ section in [Chapter 8](#Chapter08.html#ch8): “Personalize and Secure” shows\
    \ you how to change a ringtone, add vibration to both **Silent** and **Ring**\
    \ modes, and turn on or off the tone for voicemail messages.\n\n### Assigning\
    \ Unique Ringtones to Contacts\n\nSometimes, it is both fun and useful to give\
    \ a unique ringtone to a certain contact in your address book. This way, you can\
    \ know who is calling without looking at your phone.\n\nYou can use ringtones\
    \ that are already on your iPhone, or you can acquire new ringtones by doing one\
    \ of the following:\n\n*   Purchase ringtones using the **iTunes** app on your\
    \ iPhone.\n*   Create and purchase ringtones using your music from iTunes on your\
    \ computer.\n*   Create free ringtones using your music from iTunes on your computer.\n\
    \nFor example, one of the authors (Gary) sets the ring tone for his son Daniel\
    \ to Elton John's “Daniel.” Later in this chapter, we will show you how to make\
    \ a ringtone from your iTunes music.\n\n#### Giving a Contact a Unique Ringtone\n\
    \nYou need to edit a person's information in **Contacts** to change his ringtone.\
    \ Follow these steps to give a contact a unique ringtone:\n\n1.  Tap the **Contacts**\
    \ icon.\n2.  Tap the contact you wish to change (in this case, **Daniel**).\n\
    3.  Tap **Edit**.\n4.  Tap the **Ringtone** button to see the **Ringtones** screen.\n\
    5.  Tap any ringtone from the list. In this case, we chose the new custom ringtone,\
    \ **Daniel**.\n\n### Purchasing a Tone from the iTunes App\n\nIn this section,\
    \ we'll show you how to purchase a ringtone (most are US $1.29). You can then\
    \ follow these steps to immediately attach it to a contact or set it as your **Default\
    \ Ringtone** right from the **iTunes** app on your iPhone:\n\n1.  Start up the\
    \ **iTunes** app on your iPhone.\n2.  If you see the **Tones** soft key at the\
    \ bottom, tap it. Otherwise, tap **More** then **Tones**. Next, scroll through\
    \ the ringtones. Or, you can search for a ringtone by tapping the **Search** soft\
    \ key at the bottom.\n\n    ![images](images/U0959.jpg)\n\n3.  You can also browse\
    \ ringtones by using the buttons at the top: **Featured**, **Top Tens**, and **Genres**.\n\
    4.  We selected **Top Tens** and then **Alternative** to see the image to the\
    \ right.\n\n    ![images](images/U0960.jpg)\n\n5.  Tap any name or album cover\
    \ to preview the ringtone. If you like it, tap the price to buy it, and then tap\
    \ **Buy Now**.\n6.  Once you select the ringtone to purchase, the **iTunes** app\
    \ will prompt you to either **Set as Default Ringtone** (your main phone ringtone)\
    \ or **Assign to a Contact**.\n\n    ![images](images/U0961.jpg)\n\n7.  If you\
    \ choose **Assign to a Contact**, your **Contacts** list will launch. Next, scroll\
    \ through or search for the contact. You will hear the new ringtone each time\
    \ that contact calls.\n\n### Creating Custom Ringtones\n\nYour iTunes library\
    \ is filled with all your favorite songs. Wouldn't it be great if you could turn\
    \ your own songs into ringtones for your iPhone? The good news is that you can\
    \ turn most of your music into a ringtone. There are two ways to do this: an easy\
    \ way that costs about US $1 per ringtone and a more challenging way that is free.\
    \ We will show you both ways."
