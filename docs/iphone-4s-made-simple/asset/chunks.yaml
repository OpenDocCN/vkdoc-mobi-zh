    \ one you use most—as your **Default Account**. When you select **Compose** from\
    \ the **Email** screen, the default account is always chosen. Follow these steps\
    \ to change the email account you send from by default:\n\n![images](images/U1772.jpg)\n\
    \n1.  Tap the **Default Account** option, and you will see a list of all your\
    \ email accounts.\n2.  Tap the email account you wish to use as your **Default\
    \ Account** choice.\n3.  When you are done, touch the **Mail, Contacts…** button\
    \ to return to the **Mail** settings menu.\n\n    ![images](images/U1773.jpg)"
  trans: "\n### 从电子邮件中复制粘贴\n\n以下是从电子邮件中选择文本或图片并复制的一些技巧：\n\n- 双击文本选中一个单词，然后上下拖动蓝色手柄调整选择范围。接着选择\
    \ `Copy`。\n\n  ![图片](img/U1757.jpg)\n\n- 长按文本，然后选择 `Select` 或 `Select All`。\n\n\
    \  ![图片](img/U1758.jpg)\n\n- 长按图片，然后选择 `Save Image` 或 `Copy`。\n\n  ![图片](img/U1759.jpg)\n\
    \n如需更完整的说明，请查阅第 2 章：“打字、复制与搜索”中的“复制和粘贴”部分。\n\n### 搜索电子邮件\n\niPhone 内置了强大的搜索功能，可以帮助您查找电子邮件。您可以按\
    \ `From:`、`To:`、`Subject` 或 `All` 字段搜索收件箱。这有助于筛选收件箱，从而精确找到您想要的内容。\n\n#### 激活电子邮件搜索\n\
    \n启动电子邮件搜索非常简单。首先，导航至您要搜索的账户的 `inbox`。如果向上滚动到顶部，您会在 `inbox` 顶部看到熟悉的 `Search` 栏。\n\
    \n如果您的电子邮件账户支持此功能，您还可以在服务器上搜索电子邮件。在撰写本文时，支持搜索的电子邮件账户类型包括 `Exchange`、iCloud（原名\
    \ `Mobile Me`）和 `Gmail IMAP`。请按照以下步骤在服务器上搜索电子邮件：\n\n1.  `Tap`（轻点）`Search` 栏，在\
    \ `Search` 栏下方会显示一个新的软键菜单。\n2.  输入您要搜索的文本。\n3.  `Tap one of the tabs`（轻点搜索窗口下的其中一个标签）：\n\
    \n    - `From`：仅搜索发件人的电子邮件地址。\n    - `To`：仅搜索收件人的电子邮件地址。\n    - `Subject`：仅搜索邮件`Subject`（主题）字段。\n\
    \    - `All`：搜索邮件的所有部分。\n\n    ![图片](img/U1760.jpg)\n\n例如，假设我们想在收件箱中搜索来自“Martin”的电子邮件。我们可以在\
    \ `Search` 框中输入 Martin 的名字，然后轻点 `From`。收件箱将被筛选，只显示来自 Martin 的电子邮件。\n\n### 精细调整电子邮件设置\n\
    \n您可以通过`设置`应用中的众多选项来精细调整 iPhone 上的电子邮件账户。请按照以下步骤更改这些设置：轻点`设置`图标，然后轻点`邮件、通讯录、日历`。后续部分将解释您可以进行的调整。\n\
    \n#### 自动检索电子邮件（获取新数据）\n\n除了`高级`选项外，您还可以使用`邮件`设置来配置电子邮件获取或拉取到 iPhone 的频率。默认情况下，当服务器“推送”时，您的\
    \ iPhone 会自动接收邮件或其他联系人或日历更新。\n\n您可以通过以下步骤调整此设置：\n\n1.  轻点`设置`应用。\n2.  轻点`邮件、通讯录、日历`。\n\
    3.  在列出的电子邮件账户下轻点`获取新数据`。\n\n    ![图片](img/U1761.jpg)\n\n4.  将`推送`设为`开启`（默认）以自动让服务器推送数据。将其设为`关闭`以节省电池电量。\n\
    5.  调整从服务器拉取数据的时间计划。这决定了应用从服务器拉取新数据的频率。\n\n    **注意：** 如果将此选项设置为`每 15 分钟`，您将更频繁地收到更新；然而，与设置为`每小时`或`手动`相比，此选项会牺牲电池续航。\n\
    \n    ![图片](img/U1762.jpg)\n\n如果您只想打开 iPhone 就能看到有新消息，自动检索功能非常方便；否则，您需要记得手动检查。\n\
    \n##### 高级推送选项\n\n在`获取新数据`屏幕底部，`每小时`和`手动`设置下方，您可以轻点`高级`按钮，查看列出了所有电子邮件账户的新屏幕。\n\
    \n轻点任意电子邮件账户以调整其设置。\n\n![图片](img/U1763.jpg)\n\n大多数账户可以按您设置的时间表进行`获取`或设置为`手动`。`手动`选项要求您使用`更新`按钮来检索数据。此屏幕让您能够为已设置的每个账户调整`获取`、`手动`甚至`推送`设置。\n\
    \n![图片](img/U1764.jpg)\n\n#### 调整邮件设置\n\n在`账户`部分下方，您可以在`邮件`下看到所有电子邮件设置。`默认`设置可能对您来说效果不错；但如果您需要调整其中任何一项，可以按照以下步骤操作：\n\
    \n**显示**：这设定了从服务器拉取的邮件数量。您可以指定 50 到 1,000 条消息（默认值为 50 条最近消息）。\n\n**预览**：此选项让您设置在收件箱`预览`中除了`主题`之外显示的文本行数。您可以将此值从`无`调整为`5\
    \ 行`（默认值为`2 行`）。\n\n![图片](img/U1765.jpg)\n\n**最小字体大小**：这是首次打开邮件时显示的默认字体大小。这也是在查看邮件时允许缩放到的最小字体大小。您的选项有`小`、`中`、`大`、`特大`和`巨大`（默认值为`中`）。\n\
    \n**提示：** 您可以在设置的“辅助功能”区域进一步放大字体大小。更多详情请查看第 2 章：“打字、复制与搜索”。\n\n**显示收件人/抄送标签**：开启此选项后，您会在收件箱中的主题前看到一个小`收件人`或`抄送`标签。此标签显示您的地址位于哪个字段（此选项的默认状态为`关闭`）。\n\
    \n![图片](img/U1766.jpg)\n\n**删除前询问**：开启此选项后，每次尝试删除邮件时都会询问您（默认值为`关闭`）。\n\n**载入远程图像**：此选项允许您的\
    \ iPhone 加载某些电子邮件中包含的所有图形（远程图像）（此选项的默认值为`开启`）。\n\n![图片](img/U1767.jpg)\n\n**按主题整理**：此选项将相关电子邮件分组在一起。它只显示一条消息，并在旁边显示一个数字。该数字表示存在多少封相关邮件。此功能让您能够将所有讨论集中在一个地方（此选项的默认值为`开启`）。\n\
    \n![图片](img/U1768.jpg)\n\n**始终密送给自己**：此选项会将您从 iPhone 发送的每封电子邮件以密件抄送（`Bcc:`）方式发送到您的电子邮件账户（此选项的默认值为`关闭`）。\n\
    \n![图片](img/U1769.jpg)\n\n#### 更改电子邮件签名\n\n默认情况下，您发送的电子邮件会显示“发送自我的 iPhone”。请按照以下步骤更改电子邮件的`签名`行：\n\
    \n![图片](img/U1770.jpg)\n\n1.  轻点`签名`标签，然后在从 iPhone 发送的邮件底部输入您想要的新电子邮件签名。\n2. \
    \ 编辑完`签名`字段后，轻点左上角的`邮件、通讯录…`按钮。这将返回到`邮件`设置界面。\n\n    ![图片](img/U1771.jpg)\n\n\
    #### 更改默认邮件账户（发件账户）\n\n如果您在 iPhone 上设置了多个电子邮件账户，您应将其中的一个——通常是您最常用的那个——设置为`默认账户`。当您从`邮件`界面选择`写邮件`时，默认账户总是被选中。请按照以下步骤更改默认发送邮件的电子邮件账户：\n\
    \n![图片](img/U1772.jpg)\n\n1.  轻点`默认账户`选项，您将看到所有电子邮件账户的列表。\n2.  轻点您想用作`默认账户`的电子邮件账户。\n\
    3.  操作完成后，轻点`邮件、通讯录…`按钮返回到`邮件`设置菜单。\n\n    ![图片](img/U1773.jpg)\n"
- fmt: '# Toggling Sounds for Receiving and Sending Email


    You may notice a little sound effect every time you send or receive email. What
    you hear is the default setting on your iPhone.


    If you want to disable this or change it, you do so in the `Settings` program:


    1. Tap your `Settings` icon.

    2. Tap `Sounds`.

    3. You will see various switches to turn sound effects on or off. Tap `New Mail`
    and `Sent Mail` to select your mail tone options.


    ![images](images/U1774.jpg)


    ## Advanced Email Options


    **NOTE:** Email accounts set up as `Exchange`, `IMAP`, or `iCloud` will not have
    this `Advanced` email settings screen. This only applies to POP3 email accounts.


    ![images](images/U1775.jpg)


    To get to the `Advanced` options for each email account, follow these steps:


    1. Touch the `Settings` icon.

    2. Touch `Mail, Contacts, Calendars`.

    3. Touch an email address listed under `Accounts`.

    4. At the bottom of the mail settings pop-up window, tap the `Advanced` button
    to bring up the `Advanced` dialog.


    ![images](images/U1776.jpg)


    ### Removing Email Messages from Your iPhone After Deletion


    You can select how frequently you want email removed completely from your iPhone
    once it is deleted.


    Touch the `Remove` tab and select the option that is best for you; the default
    setting is `Never`.


    ![images](images/U1777.jpg)


    ### Using SSL and Authentication


    The `SSL` and `Authentication` features were discussed previously; however, this
    screen gives you another location to access these features for a particular email
    account.


    ### Deleting from Server


    You can configure your iPhone to handle the deletion of messages from your email
    server. Usually, this setting is left at `Never`, and this function is handled
    on your main computer. If you use your iPhone as your main email device, however,
    you might want to handle that feature from the phone itself. Follow these steps
    to remove deleted emails on the server from your iPhone.


    1. Touch the `Delete from Server` tab to select the feature that best suits your
    needs: `Never`, `Seven Days`, or `When removed from inbox`.

    2. The default setting is `Never`. If you want to choose `Seven Days`; that option
    should give you enough time to check email on your computer, as well as your iPhone,
    and then decide what to keep and what to get rid of.


    ![images](images/U1778.jpg)


    ### Changing the Incoming Server Port


    As you did with the `Outgoing Server Port` earlier, you can change the `Incoming
    Server Port` if you are having trouble receiving email. It is very rare that your
    troubles will be related to the port you receive mail on; consequently, you will
    rarely need to change this number. If your email service provider gives you a
    different number, just touch the numbers and input a new port. The value for an
    `Incoming Server Port` is usually `995`, `993`, or `110`; however, the port value
    could also be another number.


    ## Troubleshooting Email Problems


    Usually, your email works flawlessly on your iPhone. However, sometimes your email
    may not work as flawlessly as you would hope. This could be due to a server issue,
    a network connectivity issue, or an email service provider requirement that isn''t
    being met.


    More often than not, there is a simple setting that needs to be adjusted or a
    password that needs to be re-entered.


    If you try out some of the troubleshooting tips that follow and your email is
    still not working, then your email server may just be down temporarily. Check
    with your email service provider to make sure your mail server is up and running;
    you might also check whether your provider has made any recent changes that would
    affect your settings.


    **TIP:** If the tips that follow do not solve the problem, please check out [Chapter
    26](#Chapter26.html#ch26): “Troubleshooting” for more helpful tips and resources.


    ### Email Isn''t Being Received or Sent


    If you can''t send or receive email, your first step should be to verify that
    you are connected to the Internet. Check this by looking at your network connectivity
    symbols in the upper-left corner of your `Home` screen (see [Chapter 4](#Chapter04.html#ch4):
    “Connect to the Network” for details).


    Sometimes, you need to adjust the outgoing port for email to be sent properly.
    Do so by following these steps:


    1. Tap `Settings`.

    2. Touch `Mail, Contacts and Calendars`.

    3. Touch your email account that is having trouble sending messages under `Accounts`.

    4. Touch `SMTP` and verify that your outgoing mail server is set correctly; also
    check that it is set to `ON`.

    5. Touch `Outgoing Mail Server` at the top and verify all the settings, such as
    `Host Name`, `User Name`, `Password`, `SSL`, `Authentication`, and `Server Port`.
    You might also try `587`, `995`, or `110` for the `Server Port` value; sometimes
    that helps.

    6. Click `Done` and the email account name in the upper-left corner to return
    to the `Email` settings screen for this account.

    7. Scroll down to the bottom and touch `Advanced`.

    8. You can also try a different port setting for the server port on this screen,
    such as `587`, `995`, or `110`. If those values don''t work, contact your email
    service provider to get a different port number and verify your settings.


    # Chapter 18


    # Contacts and Notes


    Your iPhone gives you immediate access to all your important information. Just
    like your computer, your iPhone can store thousands of contacts for easy retrieval.
    In this chapter, we''ll show you how to add new contact, customize your contacts
    by adding new fields, organize your contacts with groups, quickly search or scroll
    through contacts, and even see a contact''s location with the iPhone''s `Maps`
    app. We will also show you how to customize the `Contacts` view so it is sorted
    and displayed just the way you like it. Finally, we will cover a few troubleshooting
    tips that will save you some time when you run into difficulties.


    We will also give you an overview of the `Notes` app, which you can use to write
    notes, make grocery lists, and make lists of movies you''d like to watch or books
    you''d like to read. We will show you how to organize and email notes to yourself
    or others. Ideally, we hope that `Notes` will become so easy on the iPhone that
    you can eventually get rid of most, if not all, of your paper sticky notes!


    What is also great is that you can use `iCloud` to wirelessly synchronize, share
    and back up your contacts and notes. So you never have to worry about losing your
    important information or whether or not you have the latest information on your
    device or computer.


    ## Loading Your Contacts onto the iPhone


    [Chapter 3](#Chapter03.html#ch3): “Sync with iCloud, iTunes and More” covered
    how to load your contacts onto the iPhone using the `iTunes` app on your Mac or
    Windows computer. You can also load contacts onto your phone using the Google
    Sync or iCloud services.


    **TIP**: You can add new contact entries from email messages you receive. Learn
    how in [Chapter 17](#Chapter17.html#ch17): “Communicate with Email.”


    ## When Is Your Contact List Most Useful?


    The `Contacts` app is most useful when two things are true:


    1. You have many names and addresses in it.

    2. You can easily find what you need.'
