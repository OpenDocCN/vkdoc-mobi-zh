  trans: "\n### 选择并监控你的蜂窝数据用量\n\n当你购买 iPhone 时，必须从运营商处选择一个蜂窝数据套餐。在美国，目前 iPhone 用户可以从\
    \ AT&T、Verizon 和 Sprint 中选择。如果你已选择了一个套餐，现在想尝试其他套餐，请联系你的运营商——你或许可以更换数据套餐。\n\n**提示：节省数据费用的技巧**\n\
    \n你可以通过以下方式节省蜂窝数据套餐的费用：\n\n- 尽量使用 Wi-Fi。\n- 从低成本的蜂窝数据套餐开始（例如，截至出版时，AT&T 的 200MB\
    \ 套餐售价 15 美元）。\n- 整月持续监控你的蜂窝数据用量，确保不会超出低成本数据套餐的限额。\n\n你会发现，如果大部分数据需求都使用 Wi-Fi，低成本的套餐也足够使用。\n\
    \n按照以下步骤检查当前的蜂窝数据用量：\n\n1.  轻点`设置`图标。\n2.  轻点`通用`。\n3.  轻点`用量`。\n4.  向下滚动并轻点`蜂窝网络用量`。\n\
    5.  你的总数据用量将是`发送`和`接收`数值的总和。如果要清空统计数据，请轻点屏幕底部的`还原统计数据`按钮。\n\n![images](img/U0418.jpg)\n\
    \n**注意**：当你的月度数据套餐剩余 20%、10%和 0%时，iPhone 会发出通知。如果有适用的选项，它还会让你选择续订当前套餐或升级到更高数据量的套餐。\n\
    \n### 国际旅行：出发前要做的事\n\n根据你要前往的国家以及当前的 iPhone 语音和数据套餐，你可能已经为国际旅行做好了充分准备。然而，你的 iPhone\
    \ 基本数据和电话套餐很可能无法使用，或导致你在数据和语音漫游费用上花费更多。\n\n我们始终建议你在旅行前尽早致电你的电话服务提供商，询问是否有可以在旅行时为\
    \ iPhone 开通的国际功能。\n\n#### 避免收到巨额账单\n\n旅行时你要避免的一件事是回家后收到异常高昂的语音或数据漫游话费账单。例如，我们曾听说有人在国外旅行回家后发现，仅一个月的数据和语音漫游费合计就达到了\
    \ 1000 美元甚至更多。在接下来的几节中，我们将向你展示如何在旅行前、旅行中和旅行后采取措施，帮助避免意外收费。\n\n这些简单的步骤可以帮助你确保 iPhone\
    \ 能够成功且经济地连接到当地网络——无论你身在世界的哪个角落。\n\n#### 第 1 步：致电你的电话公司\n\n你应该在离家前联系为你提供 iPhone\
    \ 的电话公司。打电话时，你应该核实以下事项：\n\n-   了解旅行中可能产生的任何语音和数据漫游费用。要具体到你要访问的每个国家。\n-   查看出发前是否可以激活任何临时的国际费率套餐。有时，这些特殊套餐需要预付额外的\
    \ 10 或 20 美元，但可以为你节省数百美元的额外费用。\n-   如果你使用电子邮件、SMS 短信、彩信或图片信息、网页浏览以及任何其他数据服务，你还需要专门询问这些服务在国外旅行时是否单独收费。通常，短信和图片信息会产生额外费用。\n\
    \n你可能可以在电话公司的网站上找到一些信息，但通常需要给他们打电话。\n\n#### 第 2 步：检查是否能使用国际 SIM 卡\n\n在某些情况下，你的\
    \ iPhone 无线公司可能不会提供国际数据漫游套餐的优惠——或者其费率不合理地高。在这种情况下，你可能希望要求你的电话公司解锁 iPhone，以便你可以插入在旅行国购买的\
    \ SIM 卡。\n\n**注意**：苹果公司在许多国家/地区出售无锁版、无 SIM 卡的 iPhone，包括美国、加拿大和英国。如果你经常旅行，官方无锁版\
    \ iPhone 可能是一个值得考虑的选择。\n\n插入本地 SIM 卡将消除或大幅降低数据和语音漫游费用。但是，你应该仔细检查使用该 SIM 卡拨打和接听国际电话的费用。\n\
    \n使用国际 SIM 卡可能为你节省数百美元，但在确定采用这种方法之前，最好先在网络上做一些研究，或试着咨询最近去过同一国家的人以获取建议。\n\n**提示：**\
    \ 如果你要去一个没有优惠费率计划的国家，而你的运营商又不愿解锁 iPhone，你可以考虑租用或购买一部当地手机。租用一部手机的费用约为每周 30 美元，语音通话费率会低得多。有许多手机租赁公司，例如\
    \ Travel Cell、Mobal 和 Cellular Abroad。（在网上搜索“International Cell Phone Rental”以获取更多信息。）\n\
    \n你也可以在网上搜索“带着你的 iPhone 去 X、Y、Z 国旅行”的相关信息。\n\n**提示**：在你的行李中放一个回形针——如果你遗失了无锁版 iPhone\
    \ 附带的 SIM 卡弹出工具，你将需要它来取出和更换 iPhone 中的 SIM 卡。\n\n#### 第 3 步：出发前完成所有高数据量操作\n\n如果可能，你应该在离开本国前完成所有高数据量的活动。如果你有许多应用需要更新，请在出发前完成。同时，在旅行前查找并添加你可能需要的任何应用。你还应该在出发前下载任何大文件，例如电影、视频或音乐。\n\
    \n### 乘坐飞机：飞行模式\n\n乘坐飞机时，机组人员通常会要求你在起飞和降落时关闭所有便携式电子设备。然后，当飞机达到一定高度时，机组人员会说“所有经批准的电子设备”可以重新开启。\n\
    \n如果你需要完全关闭 iPhone，请按住右上角的`电源`按钮，然后用手指`滑动来关机`。\n\n要启用`飞行模式`，请按照以下步骤操作：\n\n1. \
    \ 轻点`设置`图标。\n2.  将左侧栏顶部的`飞行模式`旁边的开关设置为`开启`。\n3.  注意，Wi-Fi 会自动`关闭`，并且你的电话将无法使用。\n\
    \n![images](img/U0419.jpg)\n\n**提示**：一些航空公司提供机上 Wi-Fi 网络。在那些航班上，你可能希望在适当的时候将 Wi-Fi\
    \ 重新`开启`。\n\n你可以通过以下步骤打开或关闭 Wi-Fi 连接：\n\n1.  轻点`设置`图标。\n2.  轻点屏幕顶部的`Wi-Fi`。\n\
    3.  要启用 Wi-Fi 连接，将页面顶部的`Wi-Fi`旁边的开关设置为`开启`。\n\n   ![images](img/U0420.jpg)\n\n\
    4.  要禁用 Wi-Fi，将同一开关设置为`关闭`。\n5.  选择 Wi-Fi 网络，并按照乘务员给出的步骤进行连接。\n\n### 国际旅行：抵达后\n\
    \n完成上述为旅行准备的步骤后，抵达目的地时还需要处理一些额外问题。接下来的部分将解释你抵达目的地后需要记住的事项。\n\n#### 第 1 步：确保时区正确\n\
    \n抵达后，你需要确保 iPhone 显示的是正确的当地时间。通常情况下，iPhone 到达新目的地时会自动更新时间区。如果没有更新，你可以手动调整时区（参见第\
    \ 1 章：“入门”中的“设置日期和时间”部分）。\n"
- fmt: "#### Step 2: Buy and Insert Your International SIM Card\n\n**NOTE:** This\
    \ step will only work if the carrier in the country you're visiting offers an\
    \ iPhone, and your iPhone has been unlocked. Currently, the US carrier AT&T will\
    \ not unlock iPhone devices. Your fallback plan, especially if you need to make\
    \ a lot of local in-country calls, is to rent or buy an inexpensive pre-paid mobile\
    \ phone and reserve your iPhone use for Wi-Fi connections only.\n\nIf you have\
    \ determined that you can use an international SIM card, then you should purchase\
    \ and insert it when you arrive. We show you how to remove the SIM card tray in\
    \ [Chapter 1](#Chapter01.html#ch1). You need to use Apple's SIM removal tool or\
    \ a paperclip to remove this card.\n\n**CAUTION:** The iPhone uses a MicroSIM,\
    \ whereas many other phones use a MiniSIM. This means you'll most likely need\
    \ to find an international carrier that also has the iPhone available on their\
    \ network.\n\n#### Step 3: Reset Your Data Usage When You Land\n\nAs soon as you\
    \ land, you should reset your data usage on your iPhone. This will allow you to\
    \ keep close track of the amount of wireless data you are using overseas. For\
    \ example, if you purchased a 20 MB plan, you want to make sure you don't go over\
    \ that amount. A brief test using `Maps` for about 1 minute in the car resulted\
    \ in almost 1 MB of data usage. So be careful and try not to use extremely data-intensive\
    \ apps such as `Maps` while roaming.\n\nWe explained exactly how to reset your\
    \ usage earlier in this chapter's \"Select and Monitor Your Cellular Data Usage\"\
    \ section.\n\n**TIP:** Once you reset your usage, you will want to return to this\
    \ screen from time to time to see your current usage. You have to add the `Sent`\
    \ and `Received` values together to get your total usage. If your data usage was\
    \ 417 MB total—that would cost $8,340 at the $20/MB rate in effect without an\
    \ international data plan!\n\n![images](images/U0421.jpg)\n\n#### Step 4: Turn\
    \ Off Data Roaming If It's Too Expensive\n\nIf you were unable to find an international\
    \ SIM card—or if you were unable to find the cost of data roaming from your local\
    \ phone company—then you might want to turn off the data roaming altogether.\n\
    \nThis won't stop you from using Wi-Fi; however, it will make sure you don't get\
    \ any nasty surprises from checking email or accidentally launching a data hungry\
    \ app while you're away.\n\n**NOTE: Data Roaming** is usually set to `OFF` by\
    \ default, but it always makes sense to double-check—just in case—before you leave\
    \ on a trip.\n\nFollow these steps to set `Data Roaming` to `OFF`:\n\n1. Tap the\
    \ `Settings` icon.\n2. Tap `General`.\n3. Tap `Network`.\n4. Set the switch next\
    \ to `Data Roaming` to `OFF`.\n\n![images](images/U0422.jpg)\n\nSetting the `Data\
    \ Roaming` value to `OFF` should help you avoid any potentially exorbitant data\
    \ roaming charges. (You still need to worry about voice roaming charges, but at\
    \ least you can control those by watching how much you talk on your phone.)\n\n\
    The nice part about setting the `Cellular Data` to `ON` and `Data Roaming` to\
    \ `OFF` is that you can still enjoy all your data services until the time you\
    \ leave your home country and immediately when you return—without making any other\
    \ changes. Of course, you can also use your Wi-Fi network connection any time.\n\
    \n#### Step 5: Use Wi-Fi When Possible\n\nOne good way to save money on cellular\
    \ data plans is to use local Wi-Fi networks whenever possible, especially when\
    \ you are going to browse the Web or download large amounts of email or large\
    \ apps.\n\n**TIP:** You may be able to find free Wi-Fi networks at Internet cafés,\
    \ regular coffee shops, public libraries, some hotel lobbies, and Apple retail\
    \ stores.\n\n### International Travel: Returning Home\n\nAs you did when you arrived\
    \ at your travel destination, you will need to make a few changes to your iPhone's\
    \ settings once you arrive back home before your device will work as expected.\n\
    \n#### Step 1: Make Sure the Time Zone Is Correct\n\nWhen you return to your home\
    \ country, you will need to verify your iPhone is displaying the correct local\
    \ time. Usually, your iPhone will auto-update your time zone when you arrive back\
    \ home. However, if it doesn't, you can manually adjust the time zone (see the\
    \ \"Setting Your Date and Time\" section in [Chapter 1](#Chapter01.html#ch1):\
    \ \"Getting Started\").\n\n#### Step 2: Turn Off Your Special International Rate\
    \ Plan\n\nThe final step is optional. If you have activated some sort of special\
    \ international roaming rate plan with your iPhone wireless company, and you do\
    \ not need it anymore, then contact the company to turn it off to save yourself\
    \ some money.\n\nUsing all the steps we describe before, during, and after your\
    \ trip should help you be able to use your iPhone successfully and economically\
    \ as you travel internationally.\n\n### Personal Hotspot\n\nOne of the nice features\
    \ on your iPhone is that you can use it to connect your laptop—PC or Mac—to the\
    \ Internet. This feature is called `Personal Hotspot`, and it's very useful if\
    \ you happen to be traveling away from a Wi-Fi network, but are still within wireless\
    \ cellular data coverage with your iPhone. This greatly expands the places that\
    \ you can use your laptop to connect to the Internet.\n\n#### Personal Hotspot\
    \ vs. Tethering\n\nConnecting your laptop or other device to the Internet over\
    \ your iPhone's data plan used to be called `tethering`, and it only worked via\
    \ Bluetooth or by plugging in the USB Dock cable.\n\n`Personal Hotspot` is similar\
    \ to tethering; but instead of using Bluetooth or USB, it turns your iPhone into\
    \ a small, portable Wi-Fi router that can connect multiple devices to the Internet.\
    \ For example, you might connect your laptop, your friend's laptop, and your iPad.\
    \ (The exact number of devices that can connect over `Personal Hotspot` will depend\
    \ on your carrier, but it's typically four or five.)\n\n**TIP:** Old-style tethering\
    \ over Bluetooth and the USB Dock cable are still available options if, for some\
    \ reason, you don't want to use the `Personal Hotspot` feature.\n\n#### Step 1:\
    \ Contact Your Phone Company\n\nInternet tethering may require a separate plan\
    \ to be purchased and activated from your phone company. Call your phone company\
    \ or check on its web site to turn on the `Mobile Hotspot` or `Tethering` plan.\n\
    \n**TIP:** You may be able to save yourself some money by turning off the `Personal\
    \ Hotspot` or `Tethering` plan when you no longer need it. Check with your phone\
    \ company to find out if there are any penalties or hidden charges for turning\
    \ off the `Tethering` plan at a later date.\n\n#### Step 2: Enable Personal Hotspot\
    \ on Your iPhone\n\nAfter you have purchased or activated the `Personal Hotspot`\
    \ or `Mobile Hotspot` from your phone company, you are ready to set it up on your\
    \ iPhone:\n\n1. Tap the `Settings` icon.\n2. Tap `General`.\n3. Tap `Network`.\n\
    4. Scroll down and tap `Set Up Personal Hotspot`. (If you have already set this\
    \ up, or if it was set up for you, then you will see `Personal Hotspot` instead.)\n\
    \n   ![images](images/U0423.jpg)\n\n5. If you have not yet set up the plan—or\
    \ the plan you purchased has not yet been activated on your iPhone—you will see\
    \ a pop-up message similar to this one. If you did purchase the plan, then you\
    \ may need to wait a little while for the plan to be activated.\n\n   ![images](images/U0424.jpg)\n\
    \n6. If your plan has been activated, you should see the `Personal Hotspot` option\
    \ right on the main `Settings` screen. Tap it.\n\n   ![images](images/U0425.jpg)\n\
    \n7. Tap the switch next to `Personal Hotspot` to set it to `ON`.\n\n   ![images](images/U0426.jpg)\n\
    \n8. Your iPhone will automatically generate a `Wi-Fi Password` for you. If you're\
    \ okay with this password, skip ahead to the next section.\n\n   ![images](images/U0427.jpg)\n\
    \n9. If you want to change the password, tap `Wi-Fi Password`.\n10. Enter your\
    \ new `Password`. Make sure it contains at least eight characters. A mixture of\
    \ numbers, uppercase and lowercase letters, and punctuation is best."
