  trans: "\n#### 同步或共享日历与提醒事项\n\n如果你在电脑上维护着日历或任务列表，或者在 iCloud 或 Google 日历等网站上维护着日历，那么你可以通过使用\
    \ iTunes 应用和同步线缆，或者设置无线同步（参见第 3 章：“同步 iCloud、iTunes 及其他”，了解同步信息），将数据与你的 iPhone\
    \ 进行同步或共享。\n\n![images](img/U1901.jpg)\n\n设置好日历和任务同步后，根据你的同步设置，电脑上的所有日历约会和待办事项列表将自动与\
    \ iPhone 日历同步（参见图 19–1）。\n\n如果你使用 `iTunes` 与日历同步（例如，Microsoft Outlook 或 Apple\
    \ 的 `iCal`），每次将 iPhone 连接到电脑时，约会和任务都会被传输或同步。\n\n如果你使用其他方法同步（例如 iCloud、Exchange\
    \ 或类似服务），此同步是无线的且自动的，在初始设置过程后，你很可能无需任何操作即可完成同步。\n\n![images](img/1901.jpg)\n\n\
    **图 19–1.** *将 PC 或 Mac 日历同步到 iPhone*\n\n#### 日历图标上显示的当天日期\n\n`日历`图标通常就在 iPhone\
    \ 的`主屏幕`上。你会很快注意到，你的`日历`图标会变化，以显示当天的日期和星期几。右侧的图标显示今天是星期五，也就是本月的第 16^(个) 日。\n\n\
    ![images](img/U1902.jpg)\n\n**提示：** 如果你经常使用 iPhone 的`日历`应用，可以考虑将其固定或移动到底部程序坞；你已在第\
    \ 6 章：“图标与文件夹”的关于固定图标的部分学习了如何操作。\n\n#### 查看约会并在日历中导航\n\n`日历`应用的默认视图是`日`视图。此视图让你一目了然地看到当天所有即将到来的约会。约会会显示在你的日历中。如果你在电脑上设置了多个日历，例如`工作`和`家庭`，那么不同日历的约会将在\
    \ iPhone 日历上以不同颜色显示。\n\n你可以通过多种方式操作日历：\n\n*   **一次移动一天**：如果你轻点顶部当天日期旁边的三角形，可以向前或向后移动一天。\n\
    \n    **提示：** 长按日期旁边的三角形可以快速穿越天数。\n\n*   **更改视图**：轻点底部的`列表`、`日`和`月`按钮来更改视图。\n\
    *   **跳转到今天**：轻点左下角的`今天`按钮。\n\n#### 四种日历视图\n\n你的`日历`应用提供四种视图。`日`、`列表`、`周`和`月`视图在竖屏模式下均可使用；你可以通过轻点屏幕底部的视图名称来切换视图。`周`视图仅在横屏模式下可用，你可以通过将\
    \ iPhone 侧向旋转来切换到该视图。以下是四种视图的快速概览：\n\n*   **日视图**：启动 iPhone 的`日历`应用时，默认视图通常是`日`视图。这让你可以快速查看当天安排的所有事项。你可以在`日历`应用底部找到更改视图的按钮。\n\
    \n    ![images](img/U1903.jpg)\n\n    要移动到下一天，只需从右向左滑动。要回到前一天，则从左向右滑动。\n\n   \
    \ ![images](img/U1904.jpg)\n\n*   **列表视图**（也称为**议程**视图）：轻点底部的`列表`按钮，即可查看约会列表。\n\
    \n    根据你安排的事项多少，你可能会看到接下来一天甚至一周的排程事件。\n\n    向上或向下滑动以查看更多事件。\n\n    ![images](img/U1905.jpg)\n\
    \n*   **月视图**：轻点底部的`月`按钮，即可查看整个月的布局。有约会的日期会显示一个小圆点。当天的圆点会以蓝色高亮显示。\n\n    **提示：**\
    \ 要返回`今天`视图，只需轻点左下角的`今天`按钮。\n\n    ![images](img/U1907.jpg)\n\n    **前往下一个月**：轻点顶部显示的月份右侧的三角形。\n\
    \n    **前往上一个月**：轻点月份左侧的三角形。\n\n    ![images](img/U1906.jpg)\n\n*   **周视图**：将你的\
    \ iPhone 侧向旋转至横屏模式，即可访问周视图。\n\n    ![images](img/U1908.jpg)\n\n*   向左或向右滑动以查看更多天数。\n\
    \n#### 使用多个日历\n\n`日历`应用允许你查看和使用多个日历。你看到的日历数量取决于你同步的数量。例如，你可能同步了 iCloud 或 Google\
    \ 日历用于家庭，Exchange 用于工作。\n\n要一次只查看一个日历，请轻点顶部的`日历`按钮，然后仅选择你想查看的日历。\n\n![images](img/U1909.jpg)\n\
    \n在设置同步参数时，你可以指定要与 iPhone 同步的日历。你可以按照以下说明进一步自定义日历：\n\n*   **更改颜色**：如果你不喜欢 iPhone\
    \ 上某个日历的颜色，可以轻松更改：\n    *   轻点右上角的`日历`按钮。\n\n        ![images](img/U1910.jpg)\n\
    \n    *   轻点右上角的`编辑`按钮。\n    *   轻点要更改的日历。\n    *   系统会显示一个颜色选项列表。轻点你需要的颜色，新的颜色便会生效。\n\
    \n*   **添加新日历**：如果你使用 iCloud 同步，则可以在 iPhone 上添加新日历：\n\n    ![images](img/U1911.jpg)\n\
    \n    *   轻点右上角的`日历`。\n    *   轻点右上角的`编辑`。\n    *   向下滚动并在 iCloud 部分轻点`添加日历…`。\n\
    \    *   为新日历输入名称并选择颜色，然后大功告成！\n\n### 添加新的日历事件\n\n你可以直接在 iPhone 上轻松添加新事件或约会。这些新事件和约会将在下次同步时同步（或共享）到你的电脑。\n\
    \n#### 添加新约会\n\n你的本能可能是尝试在特定时间点触屏幕来设置约会；在 iOS 5 系统中，你终于可以这样做了！\n\n![images](img/U1912.jpg)\n\
    \n![images](img/U1913.jpg)\n\n要从任何`日历`视图添加新日历事件，请按以下步骤操作。\n\n1. 在屏幕上你想要安排约会的位置长按手指，直到出现一个新的彩色气泡。（你仍然可以轻点屏幕右上角的\
    \ `+` 图标来添加新事件。）\n2. 在`添加事件`屏幕上，轻点标有`标题与位置`的框。\n\n    ![images](img/U1914.jpg)\n\
    \n   键入事件的标题和位置（可选）。例如，你可以键入“与马丁会面”作为标题，并将位置输入为“办公室”。或者，你也可以选择键入“与马丁共进午餐”，然后选择一个纽约市非常昂贵的餐厅。\n\
    \n3. 轻点右上角的蓝色`完成`按钮以返回`添加事件`屏幕。\n4. 轻点`开始`或`结束`标签以调整事件时间。要更改开始时间，请轻点`开始`字段将其高亮显示为蓝色。接着，移动底部的旋转拨盘以反映正确的日期和约会的开始时间。\n\
    \n    ![images](img/U1915.jpg)\n\n5. 或者，你可以通过轻点`全天`旁边的开关将其设置为`开`来设置全天事件。\n\n**注意：**\
    \ 只有在你的事件设置于 Exchange/Google 或 iCloud 日历时，你才会在`重复`标签之后看到一个标有`邀请对象`的标签。\n"
- fmt: "# Recurring Events\n\nSome of your appointments happen every day, week, or\
    \ month at the same time. Follow these steps if you are scheduling a recurring\
    \ appointment:\n\n![images](images/U1916.jpg)\n\n1. Touch the `Repeat` tab and\
    \ then select the interval of time for the recurring appointment from the list.\n\
    2. Touch `Done` to return to the main `Event`.\n3. If you set a `Repeat` meeting,\
    \ then you will also have to say when the repeating event ends. Tap the `End Repeat`\
    \ button to set this.\n\n   ![images](images/U1917.jpg)\n\n4. You can select `Repeat\
    \ Forever` or set a date.\n5. Tap `Done` when finished.\n\n# Calendar Alerts\n\
    \nYou can have your iPhone 4 give you an audible reminder, or *alert*, about an\
    \ upcoming appointment. Alerts can help you keep from forgetting an important\
    \ event. Follow these steps to create an alert:\n\n![images](images/U1918.jpg)\n\
    \n1. Touch the `Alert` tab and then select the option for a reminder alarm. You\
    \ can have no alarm (`None`) at all or set a reminder that ranges from `At time\
    \ of event` all the way to `2 days before` the event, depending on what works\
    \ best for you.\n2. Touch `Done` to get back to the main `Event` screen.\n\n##\
    \ Second Alert\n\n**NOTE:** You will see a `second Alert` option if the calendar\
    \ you are using is synced using iTunes or iCloud. However, you will not see a\
    \ second alert if your event is tied to a Google Calendar synced using the Exchange\
    \ setting.\n\n![images](images/U1919.jpg)\n\nIn most cases, you will see a tab\
    \ for a `second Alert` option once you set your first `Alert` option. You can\
    \ set this second alert to another time before or after the first alert. Some\
    \ people find a second alert very helpful for remembering critical events or appointments.\n\
    \n**TIP:** Here's a practical example that illustrates when you might want to\
    \ set up two calendar alerts.\n\nIf your child has a doctor or dentist appointment,\
    \ then you might want to set the first event to go off the night before. This\
    \ will remind you to write a note to the school and give it to your child.\n\n\
    You can then set the second event for 45 minutes prior to the appointment time.\
    \ This will leave you enough time to pick up your child from school and get to\
    \ the appointment.\n\n## Choosing a Calendar\n\n![images](images/U1920.jpg)\n\n\
    If you use more than one calendar, tap on the `Calendar` tab to change the calendar\
    \ to which your new event is assigned.\n\nTouch the `Calendar` button in the upper-left\
    \ corner to see all your calendars.\n\n![images](images/U1921.jpg)\n\nTap the\
    \ calendar you want to use for this particular event. Usually, the calendar selected\
    \ by default is the one you selected the last time you used your iPhone to schedule\
    \ an event.\n\n## Availability\n\nYou can also let others know about your availability\
    \ during the scheduled event. You can choose your availability from the following\
    \ options: `Busy` (default), `Free`, `Tentative`, or `Out of Office`. (`Tentative`\
    \ and `Out of Office` only appear when you sync an account with the Exchange setting.)\n\
    \n![images](images/U1922.jpg)\n\n**NOTE:** You will only see the `Availability`\
    \ or `invitees` fields if the calendar you are using for this event is synced\
    \ with the iCloud, Exchange, or Exchange/Google settings, and each provides slightly\
    \ different options. If you are synced with iCloud, you will also see a `URL`\
    \ field where you can add a website address for later.\n\n## Adding Notes to Calendar\
    \ Events\n\n![images](images/U1923.jpg)\n\nFollow these steps if you want to add\
    \ some notes to a calendar event:\n\n![images](images/U1924.jpg)\n\n1. Tap `Notes`\
    \ and type or copy and paste a few notes.\n2. Tap `Done` to finish adding notes.\n\
    3. Tap `Done` again to save your new calendar event.\n\n**TIP:** If this is a\
    \ meeting somewhere new, you might want to type or copy and paste some driving\
    \ directions.\n\n# Using Copy and Paste Between the Email and Calendar Apps\n\n\
    The iPhone software's new Fast App Switcher means you can now easily jump between\
    \ your `Email` and your `Calendar` programs to copy and paste information. This\
    \ information could be anything, ranging from critical notes you need at your\
    \ fingertips for a meeting to driving directions. Follow these steps to copy and\
    \ paste information between your `Email` and `Calendar` programs:\n\n1. Create\
    \ a new calendar event or edit one, as explained previously in this chapter.\n\
    \n   ![images](images/U1925.jpg)\n\n2. Scroll down to the `Notes` field and tap\
    \ it to open it.\n3. Double-tap the `Home` button to bring up the Fast App Switcher.\n\
    4. If you see the `Mail` icon, tap it. If you don't see the `Mail` icon, swipe\
    \ left or right to look for it. Once you find it, tap it to open the `Mail` app.\n\
    5. Double-tap a word, then use your fingers to drag the blue handles to select\
    \ the text you want to copy.\n\n   ![images](images/U1926.jpg)\n\n6. Tap the `Copy`\
    \ button.\n7. Double-tap the `Home` button to bring up the Fast App Switcher.\n\
    8. Tap the `Calendar` icon. It should be the first icon on the left, since you\
    \ just jumped out of the app.\n\n   ![images](images/U1927.jpg)\n\n9. Now tap\
    \ and hold in the `Notes` field. When you let go, you should see the `Paste` pop-up\
    \ field. If you don't see it, then hold your finger down a bit longer until you\
    \ do see it.\n\n   ![images](images/U1928.jpg)\n\n10. Tap `Paste`.\n11. Now you\
    \ should see the text you copied and pasted into the `Notes` field.\n\n    ![images](images/U1929.jpg)\n\
    \n12. Tap `Done` to save your changes.\n\n# Editing Appointments\n\nSometimes,\
    \ the details of an appointment may change and need to be `adjusted`. Fortunately,\
    \ it's easy to revise an appointment on your iPhone. If all you want to do is\
    \ change the time, you can simply move it on the screen.\n\n![images](images/U1930.jpg)\n\
    \n1. Touch and hold your finger down on the appointment you want to change.\n\
    2. Drag the appointment to its new time slot.\n\n   If you need to change the\
    \ time more drastically than touch-and-drag allows, or if you need to change other\
    \ fields, you can also use the `Edit` button.\n\n3. Tap the appointment that you\
    \ want to change.\n4. Tap the `Edit` button in the upper-right corner to see the\
    \ `Edit` screen that shows the appointment details.\n5. Touch the tab in the field\
    \ you need to adjust, just like you did when creating the event. For example,\
    \ you can change the time of this appointment by touching the `Starts` or `Ends`\
    \ tab, and then adjusting the event's starting or ending time.\n\n## Editing a\
    \ Repeating Event\n\nYou edit a recurring or repeating event in exactly the same\
    \ manner as any other event. The only difference is that you will be asked a question\
    \ after you finish editing the event. You need to answer this question and tap\
    \ the `Done` button.\n\n![images](images/U1931.jpg)\n\nTap `save for this event\
    \ only` if you want to make changes to only this instance of the repeating event.\n\
    \nTap `save for future events` if you want to make changes to all instances of\
    \ this repeating event.\n\n## Switching an Event to a Different Calendar\n\nIf\
    \ you mistakenly set up an event on the wrong calendar, then go ahead and tap\
    \ the `Calendar` button to change the calendar. Next, select one of the different\
    \ calendars you have synced to your iPhone.\n\n**NOTE:** Different fields may\
    \ appear or disappear, depending on the calendar you choose to use.\n\nIf you\
    \ change your event from a calendar synced using `iTunes` to one synced with Exchange,\
    \ then you will see the `second Alert` field disappear. Also, you will see two\
    \ new fields appear with an Exchange, Google, or iCloud calendar: `invitees` and\
    \ `Availability`.\n\n## Deleting an Event\n\nNotice that, at the bottom of the\
    \ `Edit` screen, you also have the option to delete this event. Simply touch the\
    \ `Delete Event` button at the bottom of the screen to do so.\n\n![images](images/U1932.jpg)"
