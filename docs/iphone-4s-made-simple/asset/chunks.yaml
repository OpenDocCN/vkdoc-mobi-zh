  trans: "\n# iPhone 摘要屏幕\n\n在 `iTunes` 中，iPhone 的 `摘要` 选项卡是您查看和更新 iPhone 操作系统软件版本的地方。它还包含一个与同步音乐、视频及其他内容相关的重要开关。您也可以在此选项卡中选择在连接\
    \ iPhone 到电脑时是否自动打开 `iTunes`（以进行同步）。\n\n一旦将 iPhone 连接到电脑，您就能看到重要信息，例如 iPhone 的内存容量、已安装的软件版本和序列号（参见图\
    \ 3–4）。您还可以检查软件版本更新、将数据恢复到 iPhone，并从该屏幕上的多个可用选项中进行选择。\n\n特别是，您可以通过选中此屏幕底部的复选框来决定是否要`手动管理音乐和视频`。\n\
    \n![images](img/0304.jpg)\n\n**图 3–4.** *`iTunes` 中的 iPhone `摘要` 屏幕*\n\n请按照以下步骤查看`摘要`屏幕：\n\
    \n1.  在电脑上启动 `iTunes` 软件。\n2.  使用设备附带的白色 USB 数据线将 iPhone 连接到电脑。将数据线的一端插入靠近 `Home`\
    \ 按钮的 iPhone 底部，另一端插入电脑的 USB 端口。\n3.  如果 iPhone 已成功连接，您应该会在左侧导航栏的 `设备` 下看到您的 iPhone\
    \ 被列出。\n4.  单击左侧导航栏中的 iPhone，然后单击主窗口左上边缘的 `摘要` 选项卡。\n5.  如果您希望能够通过拖放方式将音乐和视频添加到\
    \ iPhone，请勾选`手动管理音乐和视频`旁边的复选框。\n6.  如果您希望在连接 iPhone 到电脑时让 `iTunes` 自动打开并同步，请勾选`连接此\
    \ iPhone 时打开 iTunes` 旁边的复选框。\n\n**提示：**请注意，`iTunes` 软件可能并未安装在您主要（用于同步的）电脑上。例如，它可能安装在您用于给\
    \ iPhone 充电的第二台电脑上。如果是这种情况，您应该勾选`手动管理音乐和视频`旁边的复选框，并取消勾选`连接此 iPhone 时打开 iTunes`\
    \ 旁边的复选框。\n\n# 进入同步设置屏幕（信息选项卡）\n\n假设您想进入 `信息` 选项卡，即用于同步通讯录、日历、电子邮件等的设置屏幕。为此，您需要按照之前进入`摘要`屏幕的相同步骤操作，只是现在您需要单击顶部的\
    \ `信息` 选项卡，以便在主 `iTunes` 窗口中查看通讯录（及其他同步设置）（参见图 3–5）。\n\n![images](img/0305.jpg)\n\
    \n**图 3–5.** *`iTunes` 的 `信息` 选项卡，您可以在此设置通讯录、日历、书签等*\n\n**注意：如果您已设置好使用 iCloud\
    \ 同步信息，您将看到此警告且无法使用 iTunes，因为 iCloud 已在同步您的信息。如果看到此警告，则可以跳过使用 iTunes 同步邮件、通讯录和日历。**\n\
    \n![images](img/U0310.jpg)\n\n# 同步通讯录\n\n让我们从设置同步通讯录开始。第一步是选择一个要进行同步的服务。为此，请勾选`同步通讯录自`旁边的复选框，并调整下拉菜单以选择存储您通讯录的软件或服务。在本书出版时，在\
    \ Windows 电脑上有几种同步选项：Outlook、Google 通讯录、Windows 通讯录和 Yahoo! 通讯录。\n\n**警告：** 无论何时在这些同步设置屏幕中切换软件或服务（称为*同步提供者*），都会影响连接到您\
    \ iTunes 账户的每一个移动设备。例如，如果您将通讯录同步到 iPad 或 iPod touch，这些更改也会影响 MobileMe。您将会改变连接到\
    \ iTunes 账户的其他任何设备的通讯录同步方式。\n\n![images](img/U0311.jpg).\n\n## 与 Google 通讯录同步\n\
    \n如果您选择`Google 通讯录`，系统将提示您输入您的 Google ID 和密码。\n\n若要更改您的 Google ID 或密码，请单击本节顶部看到的`同步通讯录自`选项旁边的`配置`按钮。\n\
    \n## 与 Yahoo! 通讯录同步\n\n如果您选择`Yahoo! 通讯录`，系统将提示您输入您的 Yahoo! ID 和密码。\n\n若要更改您的 Yahoo!\
    \ ID 或密码，请单击本节顶部看到的`同步通讯录自`选项旁边的`配置`按钮。\n\n**注意：** 您在此处以及`信息`选项卡中其他下拉框中看到的选项会略有不同，具体取决于您电脑上安装的软件。例如，在\
    \ Mac 上，通讯录同步没有下拉列表；而是将其他服务（如 Google 通讯录和 Yahoo!）显示为单独的复选框。\n\n一旦选择了要同步的服务或应用，您就可以进行通讯录的同步操作了：\n\
    \n1.  从以下两个选项中选择您要同步的通讯录：\n    1.  `所有通讯录`：同步通讯录中的所有联系人（此为默认设置）。\n    2.  `所选群组`：仅同步您在下方窗口中勾选的特定群组中的联系人。\n\
    2.  您会看到一个复选框，显示`添加在此 iPhone 上创建的、不在群组中的联系人到`（从下拉列表中选择一个群组）。此选项允许您为在 iPhone 上添加的任何未明确分配到群组的新联系人指定一个新群组。\n\
    3.  向下滚动页面，继续设置您的日历、电子邮件等。\n4.  如果您不想设置其他任何内容的同步，请单击 `iTunes` 屏幕右下角的`应用`按钮开始同步。\n\
    \n**注意：** 根据您拥有联系人的数量，首次同步可能需要超过 10 分钟，甚至可能需要 30 分钟或更长时间。因此，您可能希望在可以让 iPhone 随意放置所需时间（例如，午餐时间或晚餐后）的情况下执行此同步。\n\
    \n# 同步日历\n\n同步日历与同步通讯录类似。请按照以下步骤进行操作：\n\n1.  在同一个`信息`选项卡中，向下滚动以查看日历同步设置。\n2. \
    \ 勾选`同步日历自`旁边的复选框，并调整下拉菜单以选择存储您日历的软件或服务。这可能是 Windows 电脑上的 `Outlook` 或其他应用程序，以及\
    \ Mac 上的 `iCal`。\n3.  选择以下选项之一：\n    1.  `所有日历`：同步所有日历（此为默认设置）。\n    2.  `所选日历`：仅同步您在下方窗口中勾选的日历。\n\
    4.  如果您想节省 iPhone 上的空间，请勾选`不同步超过 30 天的日历事件`旁边的复选框。您可以根据需要向上或向下调整天数。\n5.  向下滚动页面，继续设置电子邮件账户、书签等。\n\
    6.  如果您不想设置其他任何内容的同步，请单击 `iTunes` 屏幕右下角的`应用`按钮开始同步。\n\n**注意：** 如果您是使用 `Microsoft\
    \ Entourage` 的 Mac 用户，您需要启用 `Entourage` 与 `iCal` 同步。为此，请进入 `Entourage` 的 `偏好设置`，然后进入\
    \ `同步服务`，并勾选同步 `iCal` 和`通讯录`的复选框。\n\n**注意：** 在本书撰写时，`Entourage` 与 `iCal` 不同，它无法处理多个日历。\n"
- fmt: "# Syncing Email Accounts\n\nScroll down the page to sync email account settings.\n\
    \n**NOTE:** After syncing the email account settings to your iPhone, you’ll still\
    \ have to enter your password for each email account in `Settings` ![images](images/U0311a.jpg)\
    \ `Mail, Contacts, Calendar`. You have to do this only once on your iPhone for\
    \ each account.\n\nFollow these steps to do so:\n\n1.  Scroll down below the `Calendar`\
    \ settings on the same `Info` tab in `iTunes` to see the `Mail` account settings.\n\
    2.  Check the box next to `Sync Mail Accounts from` and adjust the pull-down menu\
    \ to the software or service that stores your email (see [Figure 3–6](#Chapter03.html#fig_3_6)).\
    \ This might be `Outlook` on a Windows computer, or `Entourage` or `Mail` on a\
    \ Mac.\n\n    ![images](images/0306.jpg)\n\n    **Figure 3–6.** *Setting up email\
    \ accounts to sync*\n\n3.  Scroll down the page to continue setting up bookmarks,\
    \ notes, and more.\n4.  If you do not want to set anything else up for sync, then\
    \ click the `Apply` button in the lower-right corner of the `iTunes` screen to\
    \ start the sync.\n\n# Syncing Bookmarks and Notes\n\nOne great feature of the\
    \ iTunes sync is that you can sync the browser bookmarks from your computer to\
    \ your iPhone. This allows you to start browsing on your iPhone with all your\
    \ favorite sites immediately. You can also sync your notes from your computer\
    \ to your iPhone and keep them up-to-date in both places using `iTunes`.\n\n**NOTE:**\
    \ At the time of writing, `iTunes` supports only two web browsers for synchronization:\
    \ `Microsoft Internet Explorer` and `Apple Safari`. If you use `Mozilla Firefox`\
    \ or `Google Chrome`, you can still sync your bookmarks, but you’ll have to install\
    \ free bookmark syncing software (such as `xmarks` from [`www.xmarks.com`](http://www.xmarks.com))\
    \ to sync from `Firefox` or `Chrome` to `Safari` or `Explorer`. Once you install\
    \ this software, you can sync your browser bookmarks in a simple, two-step process.\
    \ `Firefox`’s `Home` app is a nice option for syncing bookmarks for `Firefox`\
    \ users (visit [`http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8`](http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8)\
    \ `for more information`).\n\n# Syncing Your iPhone with iTunes\n\nThe syncing\
    \ process is normally automatic when you plug in your iPhone to your computer’s\
    \ USB port. The only exception is if you have disabled the automatic sync feature.\n\
    \n## Sync Apps in iTunes\n\nFollow these steps to sync and manage apps with the\
    \ `iTunes` app:\n\n1.  As you did to set up the sync previously, connect your\
    \ iPhone to your computer, start `iTunes`, and click your iPhone in the left nav\
    \ bar.\n2.  Click the `Apps` tab on the top of the main window.\n3.  Click the\
    \ checkbox next to `Sync Apps` to see all apps stored on your iPhone and your\
    \ `Home` screens, as shown in [Figure 3–7](#Chapter03.html#fig_3_7).\n\n![images](images/0307.jpg)\n\
    \n**Figure 3–7.** *The `Sync Apps` screen in `iTunes`*\n\n## Move Apps, Work with\
    \ Folders, or Delete App Icons\n\nIt is very easy to move around and organize\
    \ your application icons in `iTunes`’ `Sync Apps` screen (again, see [Figure 3–7](#Chapter03.html#fig_3_7)).\
    \ Try these actions to accomplish various tasks:\n\n*   **Move an app within a\
    \ screen**: Click it and drag it around the screen. If you want to select more\
    \ than one app at a time, you can press and hold the `Ctrl` key (Windows) or `Command`\
    \ key (Mac) and click to select.\n*   **Move an app between Home screen pages:**\
    \ Click and drag it to the new page in the right column. The new page will expand\
    \ in the main screen. Drop the icon onto the main screen.\n*   **Dock an app on\
    \ the bottom dock:** Click and drag it down to drop it on the Bottom Dock. If\
    \ there are already four icons on the bottom dock, you’ll need to drag one off\
    \ to make room for the new icon. Only four icons are allowed.\n*   **Create a\
    \ new folder:** Drag and drop one icon onto another icon.\n*   **Move an app into\
    \ an existing folder:** Drag and drop the icon onto the `Folder` icon.\n*   **Move\
    \ an app out of a folder:** Click the folder to open it. Next, drag and drop the\
    \ icon outside of that folder.\n*   **View another Home screen page:** Click that\
    \ page in the right column.\n*   **Delete an app:** Click it, and then click the\
    \ little `x` in the upper-left corner. You can only delete apps you have installed.\
    \ You won’t see an `x` on preinstalled apps like `iTunes`.\n*   **Delete a folder:**\
    \ Remove all apps from that folder (drag them out) and it will disappear.\n\n\
    ## Removing or Reinstalling Apps\n\nTo remove an app from your iPhone, simply\
    \ uncheck the box next to it and confirm your selection.\n\n**TIP:** Even if you\
    \ delete an app from your iPhone, you can still reinstall that app by rechecking\
    \ the box next to it, as long as you have chosen to sync apps. The app will be\
    \ reloaded onto your iPhone during the next sync.\n\n# Syncing Media and More\n\
    \nNow let’s look at how to set up an automatic sync for music, movies, iBooks,\
    \ iTunes U content, and more.\n\n**CAUTION:** Make sure you’re logged into `iTunes`\
    \ with the same iTunes account you want to use on your iPhone as Digital Rights\
    \ Management (DRM)-protected content (e.g., music, videos, and so on). Your content\
    \ won’t sync unless both accounts match. You can logout and log into the iTunes\
    \ service on both your desktop and your iPhone if you have to make sure you are\
    \ logged into the right accounts.\n\n## Syncing Ringtones\n\nWhen you click the\
    \ `Ringtones` tab, you can choose to sync your entire ringtone library or selected\
    \ items:\n\n1.  Connect your iPhone to your computer, start `iTunes`, and click\
    \ your iPhone in the left nav bar.\n2.  Click the `Ringtones` tab at the top of\
    \ the main window.\n3.  Check the box next to `Sync Ringtones`, as shown to the\
    \ right.\n4.  The default is to sync `All ringtones`. To sync only specific ones,\
    \ click the radio button next to `Selected ringtones`.\n5.  When you are done\
    \ with your selections, click the `Apply` button to start the ringtone sync.\n\
    \n![images](images/U0312.jpg)\n\n**TIP:** Learn how to assign ringtones to your\
    \ contacts, purchase custom ringtones, and create your own ringtones from your\
    \ music in [Chapter 9](#Chapter09.html#ch9): “Using the Phone.”\n\n## Syncing\
    \ Music\n\nWhen you click the `Music` tab, you can choose to sync your entire\
    \ music library or selected items.\n\n**CAUTION:** If you have manually transferred\
    \ some music, music videos, or voice memos to your iPhone already, you’ll receive\
    \ a warning message that all existing content on your iPhone will be removed and\
    \ replaced with the selected music library from your computer.\n\nTo sync music\
    \ from your computer to your iPhone, follow these steps:\n\n1.  Connect your iPhone\
    \ to your computer, start `iTunes`, and click your `iPhone` in the left nav bar.\n\
    2.  Click the `Music` tab on the top of the main window.\n3.  Check the box next\
    \ to `Sync Music`.\n4.  Click next to `Entire music library` only if you are sure\
    \ your music library will not be too large for your iPhone.\n5.  Click next to\
    \ `Selected playlists, artists, and genres` if you are unsure whether your music\
    \ library is too large, or if you want to sync only specific playlists or artists:\n\
    \    1.  You can choose whether to include music videos and voice memos by checking\
    \ those boxes.\n    2.  You can also automatically fill free space with songs.\n\
    \n        **CAUTION:** We don’t recommend checking this option because it will\
    \ take up all the space in your iPhone and leave no room for all those cool apps!\n\
    \n    3.  Now check off any of the playlists or artists in the two columns on\
    \ the bottom of the screen. You can even use the `Search` box at the top of the\
    \ `Artists` column to search for particular artists.\n6.  When you are done with\
    \ your selections, click the `Apply` button to start the music sync."
