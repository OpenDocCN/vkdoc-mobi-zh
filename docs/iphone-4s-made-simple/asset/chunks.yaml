  trans: "\n# 查找并下载图片\n\niPhone 可以轻松地从网页上复制和保存图像。当你正在寻找一张新图片用作 iPhone 墙纸时，这个功能会非常方便。\n\
    \n首先，轻点 `Safari` 网页浏览器图标，输入搜索词“iPhone 壁纸”，找到一些可能包含有趣图片的网站。（关于此主题的更多帮助，请参阅第 16\
    \ 章：“Safari 网页浏览器”。）\n\n![images](img/U2040.jpg)\n\n一旦找到要下载并保存的图片，请长按它，调出包含 `保存图像`（以及其他选项）的新菜单，如图\
    \ 21-5 所示。选择此选项即可将图片保存到你的 `已存储的照片` 相簿中。\n\n![images](img/2005.jpg)\n\n**图 20–5.**\
    \ *从网页保存图像*\n\n现在，轻点你的`照片`图标，你应该就能在`相机胶卷`相簿中看到这张图片了。\n\n![images](img/U2041.jpg)\n\
    \n# 第 21 章\n\n# 地图\n\n在你的 iPhone 上使用地图非常方便，而且相当令人惊叹。在本章探索 `地图` 应用强大功能的过程中，你将了解如何在地图上找到自己的位置，并获取前往几乎任何地方的方向指引。你还会学到如何在`标准`、`卫星`和`混合`视图之间切换。你还会看到，如果需要找到前往某地的最佳路线，你可以通过\
    \ `地图` 选项中的`显示交通状况`按钮查看实时路况。如果你想找到离目的地最近的比萨店、高尔夫球场或酒店，这也非常容易。而且，你可以直接从 iPhone\
    \ 使用谷歌街景来帮助你抵达目的地。你也可以轻松地将已在地图上标注的地址添加到你的联系人中。还有一个好玩的功能——数字指南针。\n\n## 地图入门\n\n\
    iPhone 的美妙之处在于，它的应用程序都是设计成可以协同工作的。你已经看到了你的联系人如何与`地图`应用相关联；只需回顾一下第 18 章：“联系人与备忘录”。\n\
    \n![images](img/U2101.jpg)\n\n`地图`应用由移动地图技术领导者谷歌地图提供技术支持。`地图`让你能够定位自己的位置、获取路线、搜索附近地点、查看路况等等。\n\
    \n只需轻点`地图`图标即可开始使用。\n\n### 确定你的位置（蓝点）\n\n当你启动`地图`应用时，可以令其从你当前的位置开始。按照以下步骤将当前位置设置为默认起始位置：\n\
    \n1.  轻点左下角的蓝色小`箭头`图标。\n\n    ![images](img/U2102.jpg)\n\n    ![images](img/U2103.jpg)\n\
    \n2.  `地图`会请求使用你当前的位置——轻点`允许`或`不允许`。\n\n    我们建议选择`允许`，这将使获取从你当前位置出发或到达你当前位置的路线变得容易得多。\n\
    \n## 更改地图视图\n\n`地图`的默认视图是`标准`视图，这是一种基本地图，显示叠加了街道名称的通用背景。地图还可以显示`卫星`视图，或是`卫星`与`标准`视图的组合，称为`混合`视图。最后，如果你搜索了会提供多个结果的内容（例如当地的咖啡店），`列表`视图会很方便。如果你查询了前往某地的路线，它也同样好用。你可以按照以下步骤在所有视图之间切换：\n\
    \n1.  轻点地图右下角翻起的边缘。\n2.  地图的角落会翘起，显示出用于切换视图、交通状况、图钉等功能的按钮。\n3.  轻点你想要切换到的视图（参见图\
    \ 21–1）：\n\n    *   `标准`是带有街道名称的常规地图。\n    *   `卫星`是不带街道名称的卫星图片。\n    *   `混合`是`卫星`和`标准`视图的结合；即带有街道名称的`卫星`视图。\n\
    \    *   `列表`仅当你的搜索产生多个结果（例如“星巴克”）或你查询了路线时才可用。\n\n![images](img/2101.jpg)\n\n\
    **图 21–1.** *`地图`应用中可用的各种视图：右上起顺时针方向：标准、卫星、混合和列表。*\n\n### 查看交通状况\n\n你的`地图`应用不仅能告诉你如何到达某地，还能沿途查看交通状况。此功能目前仅在美国得到支持。按照以下步骤查看给定路线的交通状况：\n\
    \n1.  轻点地图右下角以查看选项。\n2.  轻点`显示交通状况`。\n\n![images](img/U2104.jpg)\n\n在高速公路上，如果有交通状况，你通常会看到黄色灯光而不是绿色灯光。有时，黄色灯光可能会闪烁，以提醒你注意交通延误。\n\
    \n你甚至可能会看到`施工人员`图标来指示施工区域。\n\n`地图`在主要街道和高速公路上使用颜色来指示交通行驶速度：\n\n*   绿色 = 50 英里/小时或更快\n\
    *   黄色 = 25–50 英里/小时\n*   红色 = 低于 25 英里/小时\n*   灰色（或无色）= 当前无交通数据\n\n## 搜索任何内容\n\
    \n由于`地图`与谷歌地图相连，你可以搜索并找到几乎任何东西：特定的地址、商业类型、城市或其他兴趣点，如图 21–2 所示。按照以下步骤搜索特定地点：\n\n\
    1.  轻点屏幕右上角的`搜索`栏。\n2.  输入你想要在 iPhone 上显示地图的地址、兴趣点或城镇和州。\n\n![images](img/U2105.jpg)\n\
    \n### 谷歌地图搜索技巧\n\n你可以在`搜索`栏中输入几乎任何内容，包括以下内容：\n\n*   名字、姓氏或公司名称（以匹配你的通讯录列表）\n*\
    \   街道地址（部分或全部，例如“123 Main Street, City”）\n*   机场名称（例如“Orlando Airport”，意为寻找奥兰多机场）\n\
    *   职业或行业名称（例如 Plumber, painter, or roofer，意为寻找水管工、油漆工或屋顶工）\n*   高尔夫球场 + 城市（用于查找当地的高尔夫球场）\n\
    *   电影 + 城市或邮政编码（用于查找当地的电影院）\n*   比萨 32174（用于搜索邮政编码为 32174 区域的当地比萨店）\n*   95014（美国加利福尼亚州苹果公司总部的邮政编码）\n\
    *   出版社名称（例如 Apress）\n\n![images](img/2102.jpg)\n\n**图 21–2.** *在`地图`应用中搜索*\n\n\
    要输入数字，请轻点键盘上的 `123` 键。要输入字母，请轻点 `ABC` 键切换回字母键盘。\n\n## 地图选项\n\n现在你的地址已显示在`地图`屏幕上，按照以下步骤访问可用选项：\n\
    \n1.  轻点地址旁边的蓝色`箭头`图标 ![images](img/U2106.jpg) 以查看其中一些选项。\n2.  如果你已为某位联系人标注了地图，你将看到联系人详情，如图\
    \ 21–3 所示。`地图`也会为特定搜索提取联系信息。你还可以获取路线、共享位置或添加位置为书签。\n\n**注意：** 你也可以长按地址以调出`拷贝`弹出菜单。\n\
    \n![images](img/2103.jpg)\n\n**图 21–3.** *轻点`信息`按钮以查看已标注地图的联系人详情*\n"
- fmt: "# Working with Bookmarks\n\nBookmarks in `Maps` work much as they do in `Safari`.\
    \ A bookmark simply creates a record of places you've visited or mapped and want\
    \ to remember in the future. It is always easier to look at a bookmark than to\
    \ perform a new search.\n\n## Adding a New Bookmark\n\nBookmarking a location\
    \ is a great way to simplify finding a place again:\n\n1. Map a location, as shown\
    \ in [Figure 21–4](#Chapter21.html#fig_21_4).\n2. Touch the blue `Information`\
    \ icon next to the address.\n3. Touch `Add to Bookmarks`.\n\n   ![images](images/2104.jpg)\n\
    \n   **Figure 21–4.** *Adding a bookmark*\n\n4. Edit the bookmark name to make\
    \ is short and recognizable—in this case, we edited the address to simply say\
    \ `Gloria's Store`.\n5. When you are done, just touch `Save` in the top-right\
    \ corner.\n\n**TIP**: You can search for bookmark names just as you search for\
    \ names in `Contacts`.\n\n## Accessing and Editing Your Bookmarks\n\nTo view your\
    \ bookmarks, follow these steps:\n\n1. Tap the `Bookmarks` icon next to the `Search`\
    \ window in the top row.\n2. Tap any bookmark to immediately jump to it.\n3. Tap\
    \ the `Edit` button at the top of the bookmarks to edit or delete your bookmarks.\n\
    \   - To reorder the bookmarks, touch and drag the right edge of each bookmark\
    \ up or down.\n   - To edit the name of a bookmark, touch it and retype the name.\
    \ After editing the name, touch the `Bookmarks` button in the top left to get\
    \ back to your list of bookmarks.\n   - To delete a bookmark, swipe to the left\
    \ or right on the bookmark, and then tap the `Delete` button.\n4. Tap the `Done`\
    \ button when you are finished editing your bookmarks.\n\n![images](images/U2107.jpg)\n\
    \n## Adding a Mapped Location to Contacts\n\nIt is easy to add a location you\
    \ mapped to your Contacts list:\n\n1. Map an address.\n2. Tap the `Arrow`/`Information`\
    \ icon.\n3. Tap `Add to Contacts`. ![images](images/U2108.jpg)\n4. Tap either\
    \ `Create a New Contact` or `Add to Existing Contact`.\n5. If you choose `Add\
    \ to Existing Contact`, you can then scroll through or search your contacts and\
    \ select a name. The address will automatically be added to that contact.\n\n\
    ## Searching for Establishments Near You\n\nFollow these steps to search for establishments\
    \ around your current location:\n\n![images](images/U2109.jpg)\n\n1. Map a location\
    \ on the map or use the blue dot for your current location.\n2. Tap the `Search`\
    \ window. Let's say you want to search for the closest pizza restaurants, so you\
    \ type \"pizza.\" This will map all local pizza restaurants.\n3. Notice that each\
    \ mapped location may have a `Street View` icon on the left and an `Information`\
    \ icon on the right.\n4. You can double-tap to zoom in, or pinch the screen open\
    \ or closed to zoom in or out.\n5. Just as with any mapped location, touching\
    \ the blue `Information` icon brings up all the details, including the pizza restaurant's\
    \ phone number, address, and web site as shown in [Figure 21–5](#Chapter21.html#fig_21_5).\n\
    6. If you want directions to the restaurant, just touch `Directions to Here`,\
    \ and a route is instantly calculated.\n\n![images](images/2105.jpg)\n\n**Figure\
    \ 21–5.** *Using the Info screen to do more things with mapped locations.*\n\n\
    **NOTE**: If you touch the `Home Page` link, you will exit `Maps`, and `Safari`\
    \ will start up. You will need to restart `Maps` when you're done.\n\n## Zooming\
    \ In and Out\n\nYou can zoom in and out in the usual way by double-tapping and\
    \ pinching. To zoom in by double-tapping, just double-tap the screen as you would\
    \ on a web page or picture.\n\n## Dropping a Pin\n\nLet's say you're looking at\
    \ the map, and you find something you'd like to set either as a bookmark or as\
    \ a destination.\n\nIn this example, we are zooming in and looking around the\
    \ greater Boston area. We stumble upon Fenway Park and decide it would be great\
    \ to add it to our bookmarks, so we drop a pin on it. Follow these steps to drop\
    \ a pin on a map:\n\n1. Map a location or move the map to a location where you'd\
    \ like to drop the pin.\n2. Tap the lower-right corner of the map.\n\n   ![images](images/U2110.jpg)\n\
    \n   ![images](images/U2111.jpg)\n\n3. Tap `Drop Pin`.\n4. Now, drag the pin around\
    \ the map by touching and holding it. In our example, we moved it right onto Fenway\
    \ Park.\n\n   ![images](images/U2112.jpg)\n\n5. To remove a dropped pin or do\
    \ other things, tap the blue `Arrow` icon ![images](images/U2113.jpg) next to\
    \ the pop-up above the pin. If the pop-up went away, tap the pin to bring it back.\n\
    \n   ![images](images/U2114.jpg)\n\n6. From the `Info` screen, you can get `directions`,\
    \ `Remove Pin`, `Add to Contacts`, `Share Location`, or `Add to Bookmarks`.\n\n\
    **TIP**: **Finding the Street Address of any Location on the Map**\n\nWhen you\
    \ drop a pin, Google Maps will show you the actual street address. This is very\
    \ handy if you find a location by looking at the `Satellite` or `Hybrid` view,\
    \ but need to get the actual street address.\n\nDropping a pin is also a great\
    \ way to keep track of where you parked, which is especially helpful in an unfamiliar\
    \ location.\n\n## Using Street View\n\nGoogle Street View (see [Figure 21–6](#Chapter21.html#fig_21_6))\
    \ is a really fun feature in `Maps` on the iPhone. Google has been hard at work\
    \ photographing just about every address across the United States and elsewhere.\
    \ The pictures are then fed into its database, and that's what shows up when you\
    \ want to see a picture of your destination or waypoint.\n\n**NOTE**: Google Street\
    \ View is in a small number of countries now: much of North America, western Europe,\
    \ Australia, and now South Africa.\n\nIf there is a Street View available, you\
    \ will see a small orange `Person` icon to the left of the address or bookmark\
    \ on the map.\n\n![images](images/U2115.jpg)\n\nIn this example, we wanted to\
    \ check the Street View of the store of Gloria, Gary's wife, on Cape Cod:\n\n\
    1. To map the address, we tapped the work address under Gloria's name on our Contacts\
    \ list. We could have mapped it by typing an address into the `Search` window,\
    \ by searching for a type of business, or by touching the address in the `Contacts`\
    \ app.\n2. The `Street View` icon is shown to the left of Gloria's name.\n3. We\
    \ tapped the icon to immediately shift to a Street View of the address. What is\
    \ very cool is that we can navigate around the screen in a 360-degree rotation\
    \ by swiping left, right, or even up or down, looking at the places next to and\
    \ across the street from our destination.\n4. To return to the map, we just touched\
    \ the lower-right corner of the screen.\n\n![images](images/2106.jpg)\n\n**Figure\
    \ 21–6.** *Using Google Street View*\n\n## Getting Directions\n\nOne of the most\
    \ useful functions of the `Maps` app is that you can easily find directions to\
    \ or from any location. Let's say we want to get directions from our current location\
    \ (Gloria's store) to Fenway Park in Boston.\n\n### Tap the Current Location Button\
    \ First\n\nTo find directions to or from your current location, you don't have\
    \ to waste time typing your current address—the iPhone will assume you want directions\
    \ from where you are unless you specify otherwise. You may need to tap the `Location`\
    \ button a few times until you see the blue dot on the screen.\n\nNow you can\
    \ do one of two things:\n\n- Tap the `Directions` button at the bottom.\n- Touch\
    \ the blue `Arrow` as we did previously, and then select `Directions from Here`\
    \ (see [Figure 21–7](#Chapter21.html#fig_21_7)).\n\n![images](images/2107.jpg)\n\
    \n**Figure 21–7.** *Choosing `Directions From Here` and then `Bookmarks`*"
