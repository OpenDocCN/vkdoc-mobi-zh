  trans: "\n# 观看视频\n\niPhone 为你提供了一个绝佳的平台来欣赏视频、电视节目和电影。这一点在众多可用的视频观看应用中表现得淋漓尽致。\n\n\
    在本章中，我们将向你展示如何在 iPhone 上观看电影、电视节目、播客和音乐视频。\n\n你可以从 iTunes Store 或 iTunes U 免费购买或下载许多视频。你也可以将你的\
    \ iPhone 关联到你的 Netflix 账户（并且很快可能关联其他视频租赁服务），从而能够观看流媒体电视节目和电影。\n\n借助你的 iPhone，你还可以在\
    \ `Safari` 浏览器中，以及通过 App Store 中的各种应用，观看 YouTube 视频和网页视频。\n\n**注意：** 在本书出版时，`Netflix`\
    \ 应用仅在美国和加拿大可用。我们希望类似的应用能够进入更广泛的国际市场。\n\n## 将 iPhone 用作视频播放器\n\niPhone 不仅仅是一款出色的音乐播放器；它还是一个绝佳的视频播放系统。其宽屏设计、高速处理器、令人惊叹的像素密度以及出色的操作系统，使得观看从音乐视频到电视剧和全长度电影的各类内容都成为一种真正的享受。iPhone\
    \ 的尺寸非常适合你靠在椅子上观看，或在飞机上使用。对于长途汽车旅行中后排座位上的孩子来说，它也很棒。近 10 小时的电池续航意味着你甚至可以乘坐跨大陆航班而不用担心电量耗尽！你还可以为你的汽车购买一个“电源逆变器”，让\
    \ iPhone 的充电时间更长（请参阅第 1 章的“为 iPhone 充电及电池使用提示”部分：“入门指南”）。\n\n### 将视频加载到 iPhone\
    \ 上\n\n你可以像加载音乐一样，通过电脑上的 `iTunes` 应用或直接在 iPhone 上的 `iTunes` 应用中将视频加载到 iPhone 上。\n\
    \n如果你在电脑上从 `iTunes` 购买或租借了视频，那么你可以手动或自动将这些视频同步到你的 iPhone 上。\n\n### 在 iPhone 上观看视频\n\
    \n要观看视频，只需轻点你的 `Videos` 应用。\n\n**注意：** 你也可以从 `YouTube` 应用、`Safari` 应用以及从 App Store\
    \ 加载的其他视频相关应用中观看视频。\n\n![images](img/U1501.jpg)\n\n### 视频类别\n\n在 `iPod` 应用中的 `Video`\
    \ 标签页下，`Videos` 应用的每个部分都由水平条分隔，水平条内包含一个或多个可能的类别名称：`Movies`、`TV Shows`、`Podcasts`\
    \ 和 `Music Videos`。第一个类别是 `Movies` 部分；如果你已将电影加载到 iPhone 上，这些电影将会显示。\n\n根据你加载到\
    \ iPhone 上的视频类型，你可能会看到更多或更少的类别。如果你只有 `Movies` 和 `iTunes U` 视频，那么你只会看到这两个类别按钮。只需向上或向下滚动，即可显示该类别中对应的视频。\n\
    \n![images](img/U1502.jpg)\n\n### 搜索视频\n\n如果你的 iPhone 上加载了大量视频和其他内容，并且想要查找某个特定视频，你可以按照以下步骤操作：\n\
    \n1.  轻点屏幕最顶部的时间，即可跳转到搜索框。\n\n    ![images](img/U1503.jpg)\n\n2.  输入视频标题的几个字母或一两个词。\n\
    3.  在此示例中，我们输入了“email”来查找与在 iPhone 上使用电子邮件相关的视频。随即弹出了一个视频教程，演示如何处理来自作者某个网站的电子邮件附件：[www.MadeSimpleLearining.com](http://www.MadeSimpleLearining.com)。\n\
    4.  轻点搜索结果显示的任何视频即可开始播放。\n\n    ![images](img/U1504.jpg)\n\n## 播放电影\n\n只需轻点你想观看的电影，它便会开始播放。大多数视频会利用\
    \ iPhone 相对较大的屏幕空间，以宽屏（即横向）模式播放。只需将 iPhone 侧放即可观看。\n\n视频会自动开始播放。刚开始播放时，屏幕上除了视频外，没有任何菜单、控件或其他内容。\n\
    \n你可以轻点屏幕任意位置，使控制栏和其他选项显示出来。`Videos` 应用中的大多数选项与 `Music` 应用中的非常相似。轻点 `Play/Pause`\
    \ 按钮，视频将暂停。再次轻点 `Play`/`Pause` 按钮，视频将恢复播放。\n\n### 快进或快退视频\n\n在 `Play/Pause` 按钮的两侧，是常规的\
    \ `Fast-Forward` 和 `Rewind` 按钮。要跳转到视频中特定的下一章节部分，只需按住 `Fast-Forward` 按钮（位于 `Play/Pause`\
    \ 右侧）。当到达所需位置时，松开按钮，视频将正常开始播放。\n\n按下 `Pause` 暂停视频后，你可以按住 `Fast-Forward` 或 `Rewind`\
    \ 按钮进行慢速快进或快退。有趣的是，你也能听到音频随之变慢。\n\n要快退到视频的开头，轻点 `Rewind` 按钮。要快退到特定部分或位置，则像快进视频时那样按住按钮。\n\
    \n**注意：** 如果这是一部包含多个章节的全长度电影，轻点 `Reverse` 或 `Fast-Forward` 将向前或向后移动一个章节。\n\n###\
    \ 使用时间进度条\n\n视频屏幕顶部有一个滑块，可以让你*滑动*浏览视频的已播放时间。如果你确切知道（或大致知道）想观看的视频进度点，只需按住滑块并将其拖到该位置。有些人认为这比按住\
    \ `Fast-Forward` 或 `Rewind` 按钮更精确一些。\n\n![images](img/U1505.jpg)\n\n**提示：** 向下拖动手指可以更慢地移动滑块控件。\n\
    \n### 更改视频大小（宽屏与全屏）\n\n你的大部分视频将以宽屏格式播放。但是，如果你的视频未针对 iPhone 进行转换，或者未针对你的屏幕分辨率进行优化，你可以轻点位于顶部状态栏右侧的\
    \ `Expand` 按钮。\n\n你会注意到按钮上有两个箭头。如果你处于全屏模式，箭头指向内侧，相互朝向。如果你处于宽屏模式，箭头指向外侧。\n\n![images](img/U1506.jpg)\n\
    \n如果宽屏电影没有占满 iPhone 的全部屏幕，轻点此按钮会稍微放大。再次轻点则会缩小回原尺寸。\n\n**注意：** 你也可以直接双击屏幕来放大并填满屏幕。请注意，就像在你的宽屏电视上一样，试图强制非宽屏视频进入宽屏模式有时可能会导致部分画面丢失。\n\
    \n### 使用 AirPlay\n\nApple 的 AirPlay 镜像功能可以让你将视频投射到 Apple TV，从而在大屏幕电视上欣赏。只需轻点右下角的\
    \ AirPlay 按钮，然后选择 Apple TV 作为输出目标。片刻之后，你的 iPhone 屏幕会变暗，视频将在大屏幕电视上从你离开的位置开始播放。\n\
    \n![images](img/U1507.jpg)\n\n要将视频恢复到 iPhone 上，再次轻点 AirPlay，然后选择 iPhone 作为目标。\n\
    \n![images](img/U1508.jpg)\n\n**提示：** 如果你没有或不想要 Apple TV，你还有其他几种方式观看电影。例如，你可以购买\
    \ VGA 或 HDMI 适配器，将 iPhone 连接到 VGA 电脑显示器或高清电视上。\n\nVGA 仅支持视频，需要应用支持此功能，并且通常与 DRM\
    \ 不兼容。HDMI 支持视频和音频，也需要应用支持该功能。不过，它符合 HDCP 标准，因此可以兼容 iTunes 视频等受 DRM 保护的内容。\n\n\
    Apple 还提供符合 DRM 要求且适用于大多数电视的色差分量视频线缆。\n\n更多信息，请参阅《快速入门指南》中的“配件”部分。\n"
- fmt: '#### Using the Chapters Feature


    Most full-length movies purchased from the iTunes store—and some that are converted
    for the iPhone—will give you a Chapters feature. Watching one of these on your
    iPhone is very much like watching a DVD on your home TV.


    Just bring up the controls for the video by tapping the screen, and then select
    **Chapters**.


    ![images](images/U1509.jpg)


    This will bring you back to the main page for the movie.


    Tap the **Chapters** button in the upper-right corner, and then scroll through
    to find and then touch the chapter you wish to watch.


    #### Viewing the Chapters


    You can scroll through or flick through quickly to locate the scene or chapter
    that you wish to watch.


    You will also notice that, to the far right of each chapter, is the exact time
    (relative to the start of the movie) that the chapter begins.


    ![images](images/U1510.jpg)


    In addition to the chapter menu mentioned previously, you can also quickly advance
    to the previous or next chapter in a movie by tapping the **Rewind** or **Fast-Forward**
    button. One tap moves you one chapter in either direction.


    **NOTE:** The Chapters feature usually works only with movies that are purchased
    from the iTunes store. Movies that are converted and loaded onto your iPhone usually
    will not have chapters.


    ### Watching a TV Show


    The iPhone is great for watching your favorite TV shows. You can purchase TV shows
    from the iTunes store, and you can download sample shows from some iPhone apps,
    such as the **Hulu Plus** app.


    Just scroll down to the **TV Shows** category separator to see the shows you have
    downloaded on your iPhone. Scroll through your available shows and touch **Play**.
    The video controls work just like the controls for watching a movie.


    **NOTE:** At the time of writing, iTunes in the Cloud allows users in the U.S.
    to re-download previously purchased TV shows directly onto their iPhone (see [Chapter
    22](#Chapter22.html#ch22): “iTunes on Your Device” for more information).


    ![images](images/U1511.jpg)


    ### Watching Podcasts


    We normally think of podcasts as being audio-only broadcasts that you can download
    using iTunes. Video podcasts are now quite prevalent and can be found on any number
    of sites, including many public broadcasting web sites. They can also be found
    in the **iTunes U** section of iTunes; this section lists university podcasts
    and other, related information.


    ![images](images/U1512.jpg)


    Here''s an interesting iTunes U story from Gary Mazo:


    > “Recently, I was browsing the **iTunes U** section inside the **iTunes** app
    on the iPhone with my son, who was just accepted to CalTech. We were wondering
    about the housing situation and, lo and behold, we found a video podcast showing
    a tour of the CalTech dorms. We downloaded it, and the podcast went right into
    the **podcast** directory for future viewing. We were able to do a complete virtual
    tour of the housing without flying out there from the East Coast.”


    ### Watching Music Videos


    Music videos are available for your iPhone from a number of sources. Often, if
    you buy a “Deluxe” album from iTunes, it will include a music video or two. You
    can also purchase music videos from the iTunes store, and many record companies
    and recording artists make them available for free on their web sites.


    Music videos will automatically get sorted into the **Music Videos** section of
    your **Videos** app.


    The **Music Videos** are usually located right under **TV Shows** in the **Videos**
    list. The controls work just as they do in all other video applications.


    ![images](images/U1513.jpg)


    ### Video Options


    As in your music player, there are a few options that you can adjust for the video
    player. These options are accessed through the **Settings** icon from your **Home**
    screen.


    Tap the **Settings** icon, scroll down to tap **Video** to see the available options.


    Here you can also set your Home Sharing settings to be able to watch videos that
    are stored on your computer''s iTunes library right from your iphone.


    ![images](images/U1514.jpg)


    #### The Start Playing Option


    Sometimes, you will have to stop watching a particular video. This option lets
    you decide what to do the next time you want to watch that video. Your options
    are either to watch the video from the beginning or to watch from where you left
    off. Just select the option that you prefer and that will be the action your iPhone
    takes from now on.


    ![images](images/U1515.jpg)


    #### Closed Captioning


    If your video has closed captioning capabilities, setting the **Closed Captioning**
    switch to **ON** will let you see closed captioning on your screen.


    ### Deleting Videos


    To delete a video (to save space on your iPhone), just scroll up or down and select
    the video to delete.


    **NOTE:** If you''re syncing videos from iTunes, make sure to uncheck the video
    you''re deleting from there as well; otherwise, iTunes just might sync it right
    back to your iPhone on the next sync!


    Just touch and swipe to the right on a video you wish to delete. As when deleting
    an email, a red **Delete** button will appear in the top-left corner. Touch the
    **Delete** button and you will be prompted to delete the video.


    Finally, touch the **Delete** button and the video will be deleted from your system.


    **NOTE:** This process deletes the video only from your iPhone—a copy will still
    remain in your video library in iTunes, assuming that you have synced with your
    computer after purchasing the video. You can load it back onto your iPhone at
    a later time, if you so desire. However, if you delete a rented movie from the
    iPhone, it will be deleted permanently!


    ### YouTube on your iPhone


    Watching YouTube videos is certainly one of the most popular things for people
    to do on their computers these days. Now YouTube is as close to you as your iPhone.


    You can see the YouTube icon on your Home screen. Just touch this icon to be taken
    to the YouTube app.


    ![images](images/U1516.jpg)


    #### Searching for YouTube Videos


    When you first start **YouTube**, you usually see the **Featured** videos on YouTube
    that day.


    Just scroll through the video choices as you do in other apps.


    ![images](images/U1517.jpg)


    #### Using the Bottom Icons


    Along the bottom of the **YouTube** app are five icons: **Featured**, **Most Viewed**,
    **Search**, **Favorites**, and **More**. Each option is fairly self-explanatory.


    ![images](images/U1518.jpg)


    To see the videos that YouTube is featuring that day, touch the **Featured** icon.
    To see those videos that are most-viewed online, touch the **Most Viewed** icon.


    After you watch a particular video, you will have the option to set it as a favorite
    on **YouTube** for easy retrieval later. If you have set bookmarks, they will
    appear when you tap the **Favorites** icon.


    ![images](images/U1519.jpg)


    You can also search the huge library of YouTube videos. Tap the **Search** box
    (as in other apps discussed previously), and the keyboard will pop up. Type in
    a phrase, topic, or even the name of a video.


    In this example, I am looking for the newest Made Simple Learning video tutorial—so
    I just type in “Made Simple Learning” to see a list of such videos.


    When I find a video I want to watch, I can touch it to see more information. I
    can even rate the video by touching it during playback and selecting a rating.


    ![images](images/U1520.jpg)


    #### Playing Videos


    Once you have made your choice, tap the video you want to watch. Your iPhone will
    begin playing the YouTube video in Portrait or Landscape mode. To force Portrait
    mode, just turn the iPhone so that the screen orientation is vertical.'
