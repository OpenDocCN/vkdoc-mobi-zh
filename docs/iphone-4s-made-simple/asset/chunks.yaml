- fmt: '#### Touch Screen Gestures


    The iPhone has an amazingly sensitive and intuitive touch screen. Apple—renowned
    for making its iPad, iPod touch, and iPod devices easy-to-use—has come up with
    an excellent, even higher resolution, highly responsive touch screen.


    If you are used to a physical keyboard and a trackball or trackpad, or even an
    iPod''s intuitive scroll wheel, then this touch screen will take a little effort
    to master. With a little practice, though, you''ll soon become comfortable interacting
    with your iPhone.


    You can do almost anything on your iPhone by using a combination of the following:


    - Touch screen “gestures”

    - Touching icons or soft keys on the screen

    - Clicking the `Home` button at the bottom


    The following sections describe the various gestures you can use on your iPhone
    4.


    ### Tapping and Flicking


    To start an app, confirm a selection, select a menu item, or select an answer,
    simply tap the screen. To move quickly through contacts, lists, and the music
    library in `List` mode, flick from side to side or up and down to scroll through
    items. [Figure 6](#Part1.html#p_1_6) shows both of these gestures.


    ![images](images/p14-01.jpg)


    **Figure 6.** *Basic touch-screen gestures*


    ### Swiping


    To swipe, gently touch and move your finger as shown in [Figure 7](#Part1.html#p_1_7).
    You can also do this to move between open `Safari` web pages and pictures. Swiping
    also works in lists, such as the `Contacts` list.


    ![images](images/p15-01.jpg)


    **Figure 7.** *Touch and swipe to move between pictures and web pages.*


    #### Scrolling


    Scrolling is as simple as touching the screen and sliding your finger in the direction
    you want to scroll (see [Figure 8](#Part1.html#p_1_8)). You can use this technique
    in messages (email), newspaper and magazine apps, the `Safari` web browser, menus,
    and more.


    ![images](images/p16-01.jpg)


    **Figure 8.** *Touch and slide your finger to scroll around a web page, a zoomed
    picture, and more.*


    #### Double-Tapping


    You can double-tap the screen to zoom in and then double-tap again to zoom back
    out. This works in many places, such as web pages, mail messages, and pictures
    (see [Figure 9](#Part1.html#p_1_9)).


    ![images](images/p17-01.jpg)


    **Figure 9.** *Double-tapping to zoom in or out*


    #### Pinching


    You can also pinch open or closed to zoom in or out. This works in many places,
    including web pages, mail messages, and pictures (see [Figure 10](#Part1.html#p_1_10)).
    Follow these steps to zoom in using the *pinching* feature:


    1. To zoom in, place two fingers that touch each other on the screen:

    2. Gradually slide your fingers open. The screen zooms in.


    Follow these steps to zoom out using the pinching feature:


    1. To zoom out, place two fingers with space between them on the screen.

    2. Gradually slide your fingers closed, so they touch. The screen zooms out.


    ![images](images/p18-01.jpg)


    **Figure 10.** *Pinch open to zoom in and pinch closed to zoom out.*


    ### App Reference Tables


    This section gives you a number of handy reference tables that group the various
    apps that are pre-installed on your iPhone by their functionality. Also included
    in the tables are other useful apps you can download from the App Store. Each
    table gives you a brief description of the app and tells you where you can find
    more information about it in this book.


    #### Getting Started


    [Table 2](#Part1.html#pt_1_2) provides some quick links to help you connect your
    iPhone to the Web (using Wi-Fior 3G); buy and enjoy songs or videos (using the
    `iTunes`, `Music` and `Video` apps); make your iPhone sleep or power off; unlock
    your iPhone; use the electronic `Picture Frame`; and more.


    ![images](images/p19-01.jpg)


    #### Stay Connected and Organized


    [Table 3](#Part1.html#pt_1_3) provides links for everything from organizing and
    finding your contacts to managing your calendar, working with email, sending messages,
    getting driving directions, calling people, and more.


    ![images](images/p20-01.jpg)


    ![images](images/p21-01.jpg)


    #### Be Entertained


    You can have lots of fun with your iPhone; [Table 4](#Part1.html#pt_1_4) shows
    you how. For example, you can use your iPhone to buy or rent movies, check out
    free Internet radio with `Pandora`, or buy a book and enjoy it in a whole new
    way using `iBooks`. If you already use a Kindle, you can sync all your Kindle
    books to your iPhone and enjoy them right away. You can also choose from hundreds
    of thousands of apps from the App Store to make your iPhone even more amazing,
    fun, and useful. You can also rent a movie from Netflix or iTunes, downloading
    it immediately for later viewing (say on an airplane or train).


    ![images](images/p22-01.jpg)


    ![images](images/p23-01.jpg)


    #### Stay Informed


    You can also use your iPhone to read your favorite magazine or newspaper with
    up-to-the-minute vibrant pictures and videos (see [Table 5](#Part1.html#pt_1_5)).
    Or, you can use it to check out the latest weather reports.


    ![images](images/p24-01.jpg)


    #### Network Socially


    You can also use your iPhone to connect and stay up-to-date with friends, colleagues,
    and professional networks using the social networking tools on your iPhone (see
    [Table 6](#Part1.html#pt_1_6)).


    ![images](images/p25-01.jpg)


    #### Be Productive


    An iPhone can also help you be more productive. You can use it to access and read
    just about any PDF file or other document with the `GoodReader` app. You can take
    notes with the basic `Notes` app or step up to the advanced `Evernote` app, which
    has amazing capabilities for integrating audio, pictures, and text notes, and
    as well as syncing everything to a web site. You can also use your iPhone to set
    an alarm, calculate a tip, see what direction you are walking in, and record a
    voice memo (see [Table 7](#Part1.html#pt_1_7)).


    ![images](images/p26-01.jpg)


    ## Part II


    ## Introduction


    Welcome to your new iPhone 4S—and to the book that tells you what you need to
    know to get the most out of it. In this part we show you how the book is organized
    and where to go to find what you need. We even show you how to get some great
    tips and tricks sent right to your iPhone 4S via short e-mail messages. If you
    are a visual learner, we also point out a resource for learning your iPhone using
    short, to-the-point video tutorials produced by one of the authors.


    ## Introduction


    You hold in your hands perhaps the most powerful and elegant smartphone available!'
  raw: '#### Touch Screen Gestures


    The iPhone has an amazingly sensitive and intuitive touch screen. Apple—renowned
    for making its iPad, iPod touch, and iPod devices easy-to-use—has come up with
    an excellent, even higher resolution, highly responsive touch screen.


    If you are used to a physical keyboard and a trackball or trackpad, or even an
    iPod''s intuitive scroll wheel, then this touch screen will take a little effort
    to master. With a little practice, though, you''ll soon become comfortable interacting
    with your iPhone.


    You can do almost anything on your iPhone by using a combination of the following:


    *   Touch screen “gestures”

    *   Touching icons or soft keys on the screen

    *   Clicking the **Home** button at the bottom


    The following sections describe the various gestures you can use on your iPhone
    4.


    ### Tapping and Flicking


    To start an app, confirm a selection, select a menu item, or select an answer,
    simply tap the screen. To move quickly through contacts, lists, and the music
    library in **List** mode, flick from side to side or up and down to scroll through
    items. [Figure 6](#Part1.html#p_1_6) shows both of these gestures.


    ![images](images/p14-01.jpg)


    **Figure 6.** *Basic touch-screen gestures*


    ### Swiping


    To swipe, gently touch and move your finger as shown in [Figure 7](#Part1.html#p_1_7).
    You can also do this to move between open **Safari** web pages and pictures. Swiping
    also works in lists, such as the **Contacts** list.


    ![images](images/p15-01.jpg)


    **Figure 7.** *Touch and swipe to move between pictures and web pages.*


    #### Scrolling


    Scrolling is as simple as touching the screen and sliding your finger in the direction
    you want to scroll (see [Figure 8](#Part1.html#p_1_8)). You can use this technique
    in messages (email), newspaper and magazine apps, the **Safari** web browser,
    menus, and more.


    ![images](images/p16-01.jpg)


    **Figure 8.** *Touch and slide your finger to scroll around a web page, a zoomed
    picture, and more.*


    #### Double-Tapping


    You can double-tap the screen to zoom in and then double-tap again to zoom back
    out. This works in many places, such as web pages, mail messages, and pictures
    (see [Figure 9](#Part1.html#p_1_9)).


    ![images](images/p17-01.jpg)


    **Figure 9.** *Double-tapping to zoom in or out*


    #### Pinching


    You can also pinch open or closed to zoom in or out. This works in many places,
    including web pages, mail messages, and pictures (see [Figure 10](#Part1.html#p_1_10)).
    Follow these steps to zoom in using the *pinching* feature:


    1.  To zoom in, place two fingers that touch each other on the screen:

    2.  Gradually slide your fingers open. The screen zooms in.


    Follow these steps to zoom out using the pinching feature:


    1.  To zoom out, place two fingers with space between them on the screen.

    2.  Gradually slide your fingers closed, so they touch. The screen zooms out.


    ![images](images/p18-01.jpg)


    **Figure 10.** *Pinch open to zoom in and pinch closed to zoom out.*


    ### App Reference Tables


    This section gives you a number of handy reference tables that group the various
    apps that are pre-installed on your iPhone by their functionality. Also included
    in the tables are other useful apps you can download from the App Store. Each
    table gives you a brief description of the app and tells you where you can find
    more information about it in this book.


    #### Getting Started


    [Table 2](#Part1.html#pt_1_2) provides some quick links to help you connect your
    iPhone to the Web (using Wi-Fior 3G); buy and enjoy songs or videos (using the
    **iTunes**, **Music** and **Video** apps); make your iPhone sleep or power off;
    unlock your iPhone; use the electronic **Picture Frame**; and more.


    ![images](images/p19-01.jpg)


    #### Stay Connected and Organized


    [Table 3](#Part1.html#pt_1_3) provides links for everything from organizing and
    finding your contacts to managing your calendar, working with email, sending messages,
    getting driving directions, calling people, and more.


    ![images](images/p20-01.jpg)


    ![images](images/p21-01.jpg)


    #### Be Entertained


    You can have lots of fun with your iPhone; [Table 4](#Part1.html#pt_1_4) shows
    you how. For example, you can use your iPhone to buy or rent movies, check out
    free Internet radio with **Pandora**, or buy a book and enjoy it in a whole new
    way using **iBooks**. If you already use a Kindle, you can sync all your Kindle
    books to your iPhone and enjoy them right away. You can also choose from hundreds
    of thousands of apps from the App Store to make your iPhone even more amazing,
    fun, and useful. You can also rent a movie from Netflix or iTunes, downloading
    it immediately for later viewing (say on an airplane or train).


    ![images](images/p22-01.jpg)


    ![images](images/p23-01.jpg)


    #### Stay Informed


    You can also use your iPhone to read your favorite magazine or newspaper with
    up-to-the-minute vibrant pictures and videos (see [Table 5](#Part1.html#pt_1_5)).
    Or, you can use it to check out the latest weather reports.


    ![images](images/p24-01.jpg)


    #### Network Socially


    You can also use your iPhone to connect and stay up-to-date with friends, colleagues,
    and professional networks using the social networking tools on your iPhone (see
    [Table 6](#Part1.html#pt_1_6)).


    ![images](images/p25-01.jpg)


    #### Be Productive


    An iPhone can also help you be more productive. You can use it to access and read
    just about any PDF file or other document with the **GoodReader** app. You can
    take notes with the basic **Notes** app or step up to the advanced **Evernote**
    app, which has amazing capabilities for integrating audio, pictures, and text
    notes, and as well as syncing everything to a web site. You can also use your
    iPhone to set an alarm, calculate a tip, see what direction you are walking in,
    and record a voice memo (see [Table 7](#Part1.html#pt_1_7)).


    ![images](images/p26-01.jpg)


    ## Part II


    ## Introduction


    Welcome to your new iPhone 4S—and to the book that tells you what you need to
    know to get the most out of it. In this part we show you how the book is organized
    and where to go to find what you need. We even show you how to get some great
    tips and tricks sent right to your iPhone 4S via short e-mail messages. If you
    are a visual learner, we also point out a resource for learning your iPhone using
    short, to-the-point video tutorials produced by one of the authors.


    ## Introduction


    You hold in your hands perhaps the most powerful and elegant smartphone available!'
  trans: '

    #### 触屏手势


    iPhone 配备了一块极为灵敏且直观的触控屏。以设计易于使用的 iPad、iPod touch 和 iPod 设备而闻名的苹果公司，这次带来了一块分辨率更高、响应更灵敏的出色触控屏。


    如果你习惯了实体键盘和轨迹球或触控板，甚至是 iPod 上直观的滚轮，那么这块触控屏可能需要花些功夫才能掌握。不过，稍加练习，你很快就能熟练地与你的 iPhone
    进行交互体验了。


    你可以通过组合使用以下操作，在 iPhone 上完成几乎所有任务：


    - 触屏“手势”

    - 点击屏幕上的图标或软按键

    - 点击底部的`主屏幕`按钮


    以下各部分将介绍你可以在 iPhone 4 上使用的各种手势。


    ### 轻点与轻拂


    要启动应用、确认选择、选择菜单项或选择答案，只需轻点屏幕。要在通讯录、列表和`列表`模式下的音乐资料库中快速浏览，可以向侧面或上下轻拂以滚动浏览项目。图 6
    展示了这两种手势。


    ![images](img/p14-01.jpg)


    **图 6.** *基本触屏手势*


    ### 轻扫


    要执行轻扫操作，请如图 7 所示，轻轻触摸并移动手指。你也可以用此操作在打开的`Safari`浏览器网页和图片之间切换。在列表（例如`通讯录`列表）中，轻扫同样有效。


    ![images](img/p15-01.jpg)


    **图 7.** *触摸并轻扫以在图片和网页之间切换。*


    #### 滚动


    滚动操作非常简单，只需触摸屏幕，然后朝你想滚动的方向滑动手指即可（参见图 8）。你可以在邮件、报刊杂志应用、`Safari`网页浏览器、菜单等许多地方使用此技巧。


    ![images](img/p16-01.jpg)


    **图 8.** *触摸并滑动手指，即可在网页、放大后的图片等区域中滚动浏览。*


    #### 双击


    你可以双击屏幕来放大视图，然后再双击以缩小复原。此操作在网页、邮件和图片等许多地方都适用（参见图 9）。


    ![images](img/p17-01.jpg)


    **图 9.** *双击放大或缩小*


    #### 捏合


    你也可以通过双指捏合或张开来进行放大或缩小。此操作在网页、邮件和图片等许多地方都适用（参见图 10）。请按照以下步骤使用*捏合*功能进行放大：


    1. 要放大，请将两根手指并拢放在屏幕上：

    2. 逐渐张开手指。屏幕随之放大。


    请按照以下步骤使用捏合功能进行缩小：


    1. 要缩小，请将两根手指分开一定距离放在屏幕上。

    2. 逐渐合拢手指，直至它们接触。屏幕随之缩小。


    ![images](img/p18-01.jpg)


    **图 10.** *双指张开以放大，双指合拢以缩小。*


    ### 应用程序参考表


    本部分提供了一系列便捷的参考表，根据功能对 iPhone 上预装的各种应用程序进行了分类。表中还包含了您可以从 App Store 下载的其他实用应用程序。每个表格都提供了相应应用程序的简要描述，并说明了您可以在本书的何处找到关于它的更多信息。


    #### 快速上手


    表 2 提供了一些快速链接，可帮助您将 iPhone 连接到网络（使用 Wi-Fi 或 3G）；购买和欣赏歌曲或视频（使用`iTunes`、`音乐`和`视频`应用）；让
    iPhone 进入睡眠或关机；解锁 iPhone；使用电子`相框`；以及更多功能。


    ![images](img/p19-01.jpg)


    #### 保持连接与井然有序


    表 3 提供了从整理和查找联系人，到管理日历、处理邮件、发送信息、获取驾车路线、拨打电话等一切相关操作的链接。


    ![images](img/p20-01.jpg)


    ![images](img/p21-01.jpg)


    #### 尽情娱乐


    您可以用 iPhone 获得许多乐趣；表 4 向您展示了具体方法。例如，您可以使用 iPhone 购买或租赁电影，通过`Pandora`收听免费网络电台，或使用`iBooks`以全新的方式购买和阅读一本书。如果您已经在使用
    Kindle，可以将所有 Kindle 书籍同步到 iPhone 上并立即阅读。您还可以从 App Store 的数十万款应用中进行选择，让您的 iPhone
    更出色、更有趣、更实用。您也可以从 Netflix 或 iTunes 租赁电影，立即下载以供日后观看（例如在飞机或火车上）。


    ![images](img/p22-01.jpg)


    ![images](img/p23-01.jpg)


    #### 掌握资讯


    您还可以使用 iPhone 阅读最喜爱的杂志或报纸，享受配有最新鲜生动图片和视频的内容（参见表 5）。或者，您可以用它来查看最新的天气预报。


    ![images](img/p24-01.jpg)


    #### 社交网络


    您还可以使用 iPhone 上的社交网络工具与朋友、同事及专业网络保持联系并获取最新动态（参见表 6）。


    ![images](img/p25-01.jpg)


    #### 高效工作


    iPhone 还能帮助您提高工作效率。您可以使用`GoodReader`应用访问和阅读几乎任何 PDF 文件或其他文档。您可以使用基础的`备忘录`应用做笔记，或升级到功能强大的`印象笔记`高级应用，它拥有集成音频、图片和文本笔记的惊人能力，并能将所有内容同步到网站。您还可以使用
    iPhone 设置闹钟、计算小费、查看行走方向以及录制语音备忘录（参见表 7）。


    ![images](img/p26-01.jpg)


    ## 第二部分


    ## 引言


    欢迎使用您的新款 iPhone 4S——也欢迎您翻开这本教您如何充分利用它的书。在本部分中，我们将向您展示本书的组织结构，以及去哪里查找您需要的信息。我们甚至会向您展示如何通过简短的电子邮件，将一些绝佳的提示和技巧直接发送到您的
    iPhone 4S 上。如果您是视觉学习者，我们还会为您指出一个学习资源，即由本书一位作者制作的简短、精准的视频教程，帮助您学习使用您的 iPhone。


    ## 引言


    您手中握着的，或许是当前市面上最强大、最优雅的智能手机！

    '
- fmt: "### Congratulations on Your New iPhone 4S!\n\nYour iPhone 4S is more than\
    \ a powerful smartphone; it is also a media player, e-book reader, gaming machine,\
    \ life organizer, and just about everything else available today.\n\nThe iPhone\
    \ 4S can do more than just about any other smartphone on the market. In a beautiful\
    \ and elegantly designed package, your iPhone 4S will have you surfing the web,\
    \ checking email, and organizing your busy life in no time.\n\n**NOTE:** Take\
    \ a look at [Chapter 11](http#Chapter11.html#ch11): “Video Messaging and Skype,”\
    \ where we show you how to use the `Skype` iPhone app and the new `FaceTime` video\
    \ chat feature!\n\nWith your iPhone 4S, you can view your photos and interact\
    \ with them using intuitive touch-screen gestures. You can pinch, zoom, rotate,\
    \ and email your photos—all by using simple gestures.\n\nYour phone lets you interact\
    \ with your content like never before. For example, news sites and web sites look\
    \ and read like never before due to the incredibly clear and crisp retina display.\
    \ You can flip through stories, videos, and pictures, and even interact with your\
    \ news.\n\nFor the first time, it's possible to really feel as though you are\
    \ reading a book when you read content on an electronic device. Pages turn slowly\
    \ or quickly—and you can even see the words on the back of the pages when you\
    \ turn them.\n\nYour phone also lets you manage your media library like never\
    \ before. The `iTunes` app features a beautiful interface, letting you choose\
    \ music, watch videos, organize playlists, and more—all in an effortless and fun\
    \ way on the iPhone 4S's high definition–quality screen.\n\nDo you have a Netflix\
    \ account? If so, you will soon be able to organize your instant queue, and stream\
    \ high-quality movies and TV shows right on your iPhone 4S.\n\n`Hulu +` is also\
    \ available now. This app allows you to watch complete seasons of your favorite\
    \ TV shows right on your iPhone (see [Chapter 15](http#Chapter15.html#ch15): “Viewing\
    \ Videos” for more information).\n\nYou can also update your Facebook status and\
    \ receive push alerts, as well as stay connected to the Web and your email with\
    \ your phone's built-in Wi-Fi connection or the 3G connection. All the latest\
    \ high-speed protocols are supported, so you can always be in touch and get the\
    \ latest content. The iPhone 4S also includes a horizontal keyboard to type out\
    \ emails and notes when you use the device in Landscape mode.\n\n### Getting the\
    \ Most out of *iPhone 4S Made Simple*\n\nYou can read this book cover-to-cover\
    \ if you choose, but you can also peruse it in a modular fashion, by chapter or\
    \ topic. Maybe you just want to check out the `App Store` app, try `iBooks`, set\
    \ up with your email or contacts, or just load up your phone with music. You can\
    \ do all this and much more with this book.\n\nYou will soon realize that your\
    \ iPhone 4S is a very powerful device. There are, however, many secrets “locked”\
    \ inside—secrets we will help you “unlock” throughout this book.\n\nTake your\
    \ time—this book can help you understand how to best use, work, and have fun with\
    \ your new iPhone 4S. Think back to when you tried to use your first Windows or\
    \ Mac computer. It took a little while to get familiar with how to do things.\
    \ It's the same with the iPhone 4S. Use this book to help you get up to speed\
    \ and learn all the best tips and tricks more quickly.\n\nAlso, remember that\
    \ devices this powerful are not always easy to grasp—at first.\n\nYou will get\
    \ the most out of your iPhone 4S if you can read a section and then try out what\
    \ you read. We all know that reading and then doing an activity gives us a much\
    \ higher retention rate than simply reading alone.\n\nSo, in order to learn and\
    \ remember what you learn, we recommend the following:\n\n***Read a little, try\
    \ a little on your iPhone 4S, and repeat!***\n\n#### How This Book Is Organized\n\
    \nKnowing how this book is organized will help you quickly locate things that\
    \ are important to you. Here we show you the main organization of this book. Remember\
    \ to take advantage of our abridged table of contents, detailed table of contents,\
    \ and our comprehensive index. All of these elements can help you quickly pinpoint\
    \ items of interest to you.\n\n##### A Day in the Life of an iPhone 4S User\n\n\
    Located inside the front and back covers, the “Day in the Life of an iPhone 4S\
    \ User” reference is an excellent guide to your phone's features, providing ideas\
    \ on how to use your iPhone and lots of easy-to-access, cross-referenced chapter\
    \ numbers. So, if you see something you want to learn, simply thumb to that page\
    \ and learn it—all in just a few minutes.\n\n##### [Part 1](http#Part1.html#p1):\
    \ Quick Start Guide\n\n> **Touch Screen Basics**: This book's many practical and\
    \ informative screen shots will help you quickly learn how to touch, swipe, flick,\
    \ zoom, and more with your iPhone 4S touch screen.\n> \n> **App Reference Tables**:\
    \ Quickly skim the icons or apps grouped by category. Also get a thumbnail view\
    \ of what all the apps on your iPhone 4S do. Finally, this section includes pointers\
    \ to the relevant chapter numbers, so you can jump right to the details of how\
    \ to get the most out of each app covered in this book.\n\n##### [Part 2](http#Part2.html#p2):\
    \ Introduction\n\n> You are here now...\n\n##### [Part 3](http#Part3.html#p3):\
    \ You and Your iPhone 4S\n\n> This is the meat of the book, organized in 26 easy-to-understand\
    \ chapters, all of them packed with loads of pictures to guide you every step\
    \ of the way.\n\n#### Quickly Locating Tips, Cautions, and Notes\n\nIf you flip\
    \ through this book, you can instantly see specially formatted `TIPS`, `CAUTIONS`,\
    \ and `NOTES` that highlight important facts about using the iPhone 4S. For example,\
    \ if you want to find all the special tips relevant for using the iPhone's `Calendar`\
    \ app, you can flip to [Chapter 19](http#Chapter19.html#ch19): “Calendar and Reminders”\
    \ to search for these highlighted nuggets of information.\n\n**TIP:** `TIPS`,\
    \ `CAUTIONS`, and `NOTES` are all formatted like this, with a gray background,\
    \ to help you see them more quickly.\n\n#### iPhone Video Tutorials\n\nFinally,\
    \ check out the author's web site at [`www.madesimplelearning.com`](http://www.madesimplelearning.com)\
    \ for a set of short, three minute video tutorials to help you or your entire\
    \ organization master your iPhone. Learning in small chunks is a great way to\
    \ master your iPhone 4S!\n\n## Part III\n\n## You and Your iPhone 4S . . .\n\n\
    This is the heart of *iPhone 4S Made Simple*. In this section, you'll find clearly\
    \ labeled chapters—each explaining the key features of your iPhone. You'll see\
    \ that most chapters focus on an individual app or a specific type of application.\
    \ Many of the chapters discuss applications that come with your iPhone, but we\
    \ also include some fun and useful apps you can download from the App Store. Sure,\
    \ the iPhone 4S is for fun, but it's for a whole lot more, too. We finish with\
    \ some handy troubleshooting tips that can help if your iPhone isn't working quite\
    \ right.\n\n## Chapter 1\n\n## Getting Started\n\nIn this chapter, we will take\
    \ you on a step-by-step tour of your new iPhone and everything you get in the\
    \ box. We will also look at the ins and outs of charging it and how to make your\
    \ battery last longer. In order to get started with your iPhone, you need to connect\
    \ it to iTunes to get it activated and registered. In our “iPhone Basics” section\
    \ at the end of this chapter, we will show you the basics of how to maneuver on\
    \ your iPhone, so you can get up and running quickly.\n\n### Getting to Know Your\
    \ iPhone\n\nIn this section, we will show you how to use everything you get in\
    \ the box with your iPhone. We also give you some iPhone battery and charging\
    \ tips, talk about how to determine if your iPhone is already activated, and discuss\
    \ the `Slide to Unlock` feature."
