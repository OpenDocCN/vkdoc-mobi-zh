  trans: "\n### 维护与更新应用程序\n\n开发者通常会对 iPhone 应用进行更新。你无需借助电脑即可完成更新——直接在 iPhone 上操作即可。\n\
    \n![images](img/U2320.jpg)\n\n你甚至可以通过查看`App Store`图标判断是否有更新以及更新数量。如图所示，这里有五个应用可供下载更新。\n\
    \n进入 App Store 后，点击底部最右侧的图标，这便是`更新`图标。\n\n![images](img/U2321.jpg)\n\n如果有应用可以更新，图标上会用红色数字显示数量。这个数字对应的是可更新的应用数量。\n\
    \n当你点击`更新`按钮时，iPhone 会显示哪些应用有更新。\n\n![images](img/U2322.jpg)\n\n若要获取更新，你可以逐个点击应用。不过更简便的方法是点击右上角的`全部更新`按钮\
    \ ![images](img/U2323.jpg)，一次性更新所有应用。iPhone 会离开 App Store，你可以在进度条中看到更新进度。正在更新的应用图标会显示为灰色。\n\
    \n部分状态消息会显示“等待中”，另一些则会显示“正在载入”或“正在安装”。更新完成后，所有图标会恢复为正常颜色。\n\n![images](img/U2324.jpg)\n\
    \n**注意：** 你需要重新启动`App Store`应用才能返回商店。更新过程会完全退出商店。\n\n#### 重新下载应用\n\n下载过的应用（无论免费还是付费），你都可以随时再次下载，无需额外付费。例如，假设你购买了一个度假时要用的应用。旅行结束后，你可以放心地删除它，下次旅行时再重新下载。这有助于保持`主屏幕`整洁，并避免\
    \ iPhone 存储空间不足。\n\n要查看你之前购买或下载过的应用列表，请点击`更新`按钮，然后点击屏幕顶部的`已购项目`标签。\n\n![images](img/U2325.jpg)\n\
    \n在`已购项目`中，你可以选择两种视图。第一种是查看你所有曾经购买或下载过的应用列表。另一种是查看当前*未*安装在 iPhone 上的应用列表。\n\n\
    **注意：** 如果看到一些你并不记得购买或下载过的应用？出现这种情况，可能是因为你在 iPod touch 上下载过应用，在 iPad 上购买过通用应用，或者与配偶或家人共享了\
    \ iTunes 账户，而他们曾在自己的设备上下载过应用。\n\n![images](img/U2326.jpg)\n\n### 自动下载\n\n通过 iCloud\
    \ 在线服务，你可以设置 iPhone，使其自动下载并安装在 Windows 或 Mac 电脑上通过 iTunes 购买的任何应用——甚至包括在其它 iOS\
    \ 设备（如 iPad）上购买的应用。\n\n![images](img/U2327.jpg)\n\n按照以下步骤开启自动下载功能：\n\n1.  点击“设置”图标。\n\
    2.  向下滚动并点击“商店”。\n3.  将“应用”的“自动下载”开关切换至“开启”。\n\n如果你不再希望自动下载应用，只需将“应用”的“自动下载”开关切换回“关闭”即可。\n\
    \n你还可以选择是否使用“蜂窝数据”来下载购买内容。如果你的网络速度较慢或数据套餐有限，建议将此选项切换至“关闭”。\n\n### 其他 App Store\
    \ 设置\n\n在`App Store`应用的设置中，你还可以查看当前登录商店的账户、退出登录、关闭 Genius 功能、查看你的 iTunes 账户以及管理订阅邮件。\n\
    \n**提示：** 如果你想防止他人使用你的 iTunes 账户在 iPhone 上购买应用，需要按以下步骤退出 iTunes 登录。\n\n按照以下步骤更改`App\
    \ Store`应用的其他设置：\n\n1.  注意，你可以在本屏幕顶部看到当前登录的账户。\n2.  点击“退出登录”可退出 iTunes 服务。例如，你可能想将\
    \ iPhone 交给某人，但不想让他用你的 iTunes 账户购买应用。\n3.  点击“查看账户”可查看你的账户详情（需要登录）。\n\n    ![images](img/U2328.jpg)\n\
    \n4.  右侧图示显示的是你的账户信息。点击“付款信息”可调整你的账单信息（例如信用卡类型和号码）。\n5.  点击“账单地址”可更新你的地址。\n6.\
    \  点击“更改国家或地区”可更改你的国家。\n\n    ![images](img/U2329.jpg)\n\n7.  向下滚动可查看更多设置。\n8.\
    \  在此对话中，你可以“关闭应用 Genius 推荐”（如果已关闭，此按钮可让你开启）。或者，你可以“订阅”或“取消订阅”iTunes 电子报。\n9.\
    \  完成后点击右上角的“完成”。\n\n![images](img/U2330.jpg)\n\n## 第 24 章\n\n## 游戏与娱乐\n\niPhone\
    \ 在很多方面都表现出色。它是一台多媒体利器，能管理你繁忙的生活。iPhone 在两方面尤其擅长：作为游戏设备，以及运行利用其精美高分辨率触摸屏和强大图形处理器的应用。你甚至能在\
    \ iPhone 上找到一些热门游戏的版本，而这些游戏你可能以为只能在专用游戏机上玩到。\n\niPhone 为便携游戏带来了诸多优势：高清（HD）屏幕呈现逼真视觉效果；高品质音频带来出色的音效；陀螺仪和加速感应器让你能以许多\
    \ PC 和专用游戏机（Wii 除外）所不具备的方式与游戏互动。例如，在赛车游戏中，你可以通过手持 iPhone 时的转动来控制汽车方向。\n\n借助 AirPlay\
    \ 镜像功能，你甚至可以将游戏投射到同一 Wi-Fi 网络上的 Apple TV，并在大屏幕电视上畅玩。\n\niPhone 也适用于许多其他有趣的用途，例如关注你所在的本地棒球队，甚至可以通过像`Ocarina`这样的出色应用将\
    \ iPhone 当作乐器使用（本章稍后会介绍）。\n\n### 将 iPhone 用作游戏设备\n\niPhone 内置了加速感应器和*陀螺仪*，本质上是一种能够检测移动（加速度）和倾斜的装置。\n\
    \n将加速感应器与出色的屏幕、大容量内存以及高速处理器相结合，便构成了一款出色的游戏平台。拥有数以千计的游戏可供选择，你几乎可以在 iPhone 上畅玩任何类型的游戏。\n\
    \n借助多任务功能，你甚至可以接听电话，然后回到你之前离开的位置继续游戏。\n\n**注意：** 部分游戏要求你拥有活跃的网络连接（Wi-Fi 或 3G）才能参与多人游戏。\n\
    \n使用 iPhone，你可以玩驾驶游戏，并利用 iPhone 本身来控制方向。只需转动设备即可。你可以触摸屏幕来刹车，或者向前倾斜设备来加速。\n\n这款游戏非常逼真，甚至可能让你晕车！\n\
    \n《真实赛车》还具备有趣的派对模式，你可以与朋友一起比赛——试试看吧！\n\n![images](img/U2401.jpg)\n\n或者，你可以尝试钓鱼游戏，在游戏中你仿佛置身船上，抛竿收线！\n\
    \n![images](img/U2402.jpg)\n\n如果你对音乐/节奏类游戏情有独钟，那么你会在 App Store 中找到许多此类程序，比如`《摇滚乐队》`。还有像`《无尽之剑》`这样由虚幻引擎\
    \ 3 驱动的精彩格斗游戏；第一人称射击（FPS）游戏如`《使命召唤：僵尸》`；以及一些全球最受欢迎的休闲游戏，例如`《愤怒的小鸟》`。\n\n![images](img/U2403.jpg)\n\
    \niPhone 还拥有非常快速的处理器和精密的图形芯片。将这些与加速感应器相结合，便构成了一个功能强大的游戏设备。\n"
- fmt: "#### Acquiring Games and Other Fun Apps\n\nAs is the case for all iPhone apps,\
    \ games can be found at the App Store (see [Figure 24–1](#Chapter24.html#fig_24_1)).\
    \ You can get them either through the `iTunes` app on your computer or through\
    \ the device's `App Store` app.\n\n![images](images/2401.jpg)\n\n**Figure 24–1.**\
    \ *The layout of the App Store's `Games` section*\n\nTo get a game, fire up the\
    \ `App Store` app, as you did in the previous chapter. Next, use the `Categories`\
    \ icon to go to the `Games` tab. You will also find many games in the `Featured`\
    \ section of the App store, as well as in the `New and Notable` section. [Figure\
    \ 24–2](#Chapter24.html#fig_24_2) shows the app purchase page for a game available\
    \ for the iPhone.\n\n![images](images/U2404.jpg)\n\n![images](images/2402.jpg)\n\
    \n**Figure 24–2.** *The layout of the `App Purchase` page*\n\n#### Reading Reviews\
    \ Before You Buy\n\nMany of the games have user reviews that are worth perusing.\
    \ Sometimes, you can get a good sense of the game before you buy it. If you find\
    \ a game that looks interesting, don't be afraid to do a simple Google search\
    \ to see whether any mainstream media outlets have performed a full review.\n\n\
    ![images](images/U2405.jpg)\n\n#### Looking for Free Trials or Lite Versions\n\
    \nIncreasingly, game developers are giving users free trials of their games to\
    \ see if they like them before they buy. You will find many games have both a\
    \ `Lite` version and a `Full` version in the App Store.\n\nSome “free” games are\
    \ supported by the inclusion of ads within the game. Other games are free to start,\
    \ but require in-app purchases for continued play or additional features.\n\n\
    ![images](images/U2406.jpg)\n\n#### Being Careful When You Play\n\nYou might use\
    \ the iPhone to cast your line in a fishing game, as you would in real life. You\
    \ can also move around a bit in driving and first-person shooter games. The point:\
    \ Be mindful of your surroundings as you play! For example, make sure you have\
    \ a good grip on your device, so it doesn't slip out of your hand; we recommend\
    \ a good silicone case to help with this.\n\n**CAUTION**: Games such as `Real\
    \ Racing` can be quite addictive!\n\n#### Two-Player Games\n\nThe iPhone really\
    \ opens up the possibility for two-player gaming. In this example, we are playing\
    \ checkers against one another, using the iPhone as a game board.\n\nYou can find\
    \ similar two-person gaming apps for other board games, such as chess, Monopoly,\
    \ and Uno.\n\n![images](images/U2407.jpg)\n\n#### Online and Wireless Games\n\n\
    The iPhone also allows online and wireless, peer-to-peer gaming (if the game supports\
    \ it). Many new games are incorporating this technology. In `Scrabble`, for example,\
    \ you can play against multiple players on their own devices. You can even use\
    \ the iPhone as your game board and up to four individual iPhones as wireless\
    \ “racks” to hold the letters of all the players. Just flick the letters off the\
    \ rack, and they go onto the board–very cool!\n\nIn this example, I selected `Online`\
    \ from the `Real Racing` menu. I now have the option to either play against another\
    \ opponent through Wi-Fi or to join an online league race.\n\n![images](images/U2408.jpg)\n\
    \n**NOTE:** If you just want to play against a friend who is nearby, select Wi-Fi\
    \ mode for multiplayer games. If you just want to play against new people, try\
    \ going online for a league race or game.\n\n### Other Fun Stuff: Baseball\n\n\
    There are many great apps that can provide you with endless hours of entertainment\
    \ on the iPhone. Since the iPhone was released on opening day of the Major League\
    \ Baseball season, it is appropriate to highlight an app that was honored as the\
    \ first “App of the Week” in the iPhone App Store.\n\n`At Bat 2010 for iPhone`\
    \ is a US $14.99 application that is well worth the entry fee for any baseball\
    \ fan. It also highlights the iPhone's capabilities.\n\n![images](images/U2409.jpg)\n\
    \nThe main view of the app changes, based on whether there are baseball games\
    \ currently being played. When you first register the app, you pick your favorite\
    \ team. The favorite team on the iPhone in this example is set to the Red Sox.\
    \ So, if this team is playing, then the view automatically goes to that team's\
    \ game first. If the team is not playing, then it displays a recap of the team's\
    \ previous game. Alternatively, it might list the details of the team's next game.\n\
    \nThe main view during game time shows a batter at the plate. This batter represents\
    \ the real batter. Batters will switch sides of the plate, depending on whether\
    \ the batter currently up hits from the left or right side of the plate. The current\
    \ pitch count is shown above the plate, and the score is displayed at the top\
    \ of the screen.\n\nWhen you see a player at the plate or on base, you can touch\
    \ the player's image to bring up his baseball card and view his stats.\n\n![images](images/U2410.jpg)\n\
    \n**TIP**: You can even allow notifications to be sent when something newsworthy\
    \ occurs related to your favorite team. To do this, touch the `Information` icon\
    \ and set `Notifications` to `ON`.\n\n#### AirPlay Mirroring\n\nThe latest iPhone\
    \ comes with the ability to not only stream video or music from your iPhone to\
    \ an Apple TV, but also to share the screen of any app, including games. This\
    \ lets you and your entire family watch and enjoy the game on the big screen while\
    \ using your iPhone as the controller. It can be especially effective with board\
    \ games and multiplayer games where the whole family or group can sit around and\
    \ play together.\n\n![images](images/U2411.jpg)\n\nFollow these steps to use the\
    \ AirPlay Mirroring feature:\n\n1.  Tap the app you want to mirror. For this example,\
    \ we're using Infinity Blade.\n2.  Once the app has launched, double-click the\
    \ Home button to bring up the Fast App Switcher.\n3.  Swipe from left to right\
    \ to get to the audio/video controls. (They're all the way at the end, so keep\
    \ swiping until you can't swipe any more.)\n4.  Tap the AirPlay icon to bring\
    \ up the list of AirPlay–enabled devices on your Wi-Fi network.\n\n    ![images](images/U2412.jpg)\n\
    \n5.  Select Apple TV.\n6.  Click the Home button again to return to your app.\n\
    7.  You should now see Infinity Blade on the big screen. Let 'em have it!\n\n\
    To stop AirPlay Mirroring, repeat the same procedure and choose iPhone from the\
    \ device list.\n\n**NOTE**: Some games allow you to do multiplayer AirPlay Mirroring,\
    \ like `Real Racing 2`'s Party Play feature where up to 4 people can use their\
    \ iPhones or iPads to race against each other on the same big screen TV.\n\n##\
    \ Chapter 25\n\n## Social Networking\n\nSome of the most popular places to “connect”\
    \ these days are those sites that are often called *social networking sites*—places\
    \ that allow you to create your own page and connect with friends and family to\
    \ see what is going in their lives. Some of the biggest web sites for social networking\
    \ are Facebook, Twitter, and LinkedIn.\n\nIn this chapter, we will show you how\
    \ to access these sites. You will learn how to update your status, *tweet*, and\
    \ keep track of those who are both important or simply of interest to you."
