- fmt: '### Finding an App to Download


    If you want to search for an app to download, begin by looking around in the default
    view, which shows the **Featured** apps. Scroll down the page to see all the featured
    apps.


    **NOTE:** As with the iTunes Store, you can only download apps less than 20MB
    in size while on 3G. Downloading larger file sizes requires a Wi-Fi connection.


    #### Viewing the New Apps


    The default view in the App Store shows new and featured apps. This is the view
    shown back in [Figure 23–2](#Chapter23.html#fig_23_2). You can tell that this
    view shows new featured apps because the **Featured** soft key (`images/U2303.jpg`)
    is highlighted at the bottom of the screen, and the **New** button (`images/U2304.jpg`)
    at the top of the page is pressed.


    #### Viewing What''s Hot


    Touch the **What''s Hot** button at the top of the screen, and the “hottest” apps
    in the store will be shown on the screen. Again, just scroll through the hottest
    apps to see if something catches your eye.


    **NOTE:** The fact that an app is in the “What''s Hot” category does not necessarily
    mean you will also believe it is useful or fun. Check out the app descriptions
    and reviews carefully before you purchase anything.


    `images/U2305.jpg`


    #### Genius


    The third button at the top of the **Featured** apps section takes you to the
    **Genius** feature. This feature works like the identically named feature in the
    **iTunes** app that plays music on your computer. For example, it displays apps
    you might like based on apps you already have installed on your iPhone.


    **NOTE:** The first time you use the Genius feature, you will have to accept the
    terms and conditions presented before the feature will be enabled.


    `images/U2306.jpg`


    ##### Based On


    Notice that there is a **Based on (*app name*)** label above each app. This label
    shows you that the suggested app was based on a specific app you''ve installed
    on your iPhone. For example, the **CBS Radio** suggestion was based on the fact
    that **Pandora Radio** is installed. We didn''t know about CBS Radio, but maybe
    we''ll give it a try based on this recommendation.


    `images/U2307.jpg`


    ##### Swipe to Remove


    If you do not like a Genius suggestion, then you can swipe left or right on it
    to bring up the **Delete** button, just as you would to remove email or other
    items from lists on your iPhone. Tap the **Delete** button to remove that app
    from the list.


    `images/U2308.jpg`


    ##### Disable Genius Feature


    To disable the Genius feature, you need to go into your **App Store** settings
    (see the “App Store Settings” section later in this chapter to learn how to disable
    this feature).


    `images/U2309.jpg`


    #### Categories


    `images/U2310.jpg`


    Sometimes, all the choices presented can be a bit overwhelming. If you have a
    sense of what type of app you are looking for, touch the **Categories** button
    along the bottom row of soft keys (see [Figure 23–4](#Chapter23.html#fig_23_4)).


    The current categories available are shown in [Table 23–1](#Chapter23.html#tab_23_1).


    `images/t2301.jpg`


    **NOTE:** The categories listed are fluid and change over time, so it is possible
    that the categories you see will have changed by the time this book finds its
    way into your hands.


    `images/2304.jpg`


    **Figure 23–4.** *Viewing apps by category—**Games**, in this example*


    #### Looking at the Top 25 Charts


    `images/U2311.jpg`


    Touch the **Top Charts** soft key along the bottom row, and the App Store will
    change the view again. This time, you will see the top 25 paid, free, and top-grossing
    apps. Just touch one of the **Top Paid**, **Top Free**, or **Top Grossing** buttons
    at the top to switch between the views.


    **NOTE:** The **Top Grossing** category refers to the highest money-making apps,
    which is sales volume times selling price. This view will help more expensive
    apps get up higher in the charts. For example, a US $4.99 app that sells 10,000
    units will rank much higher on the **Top Grossing** chart than a US $0.99 app
    that sells the same number of units.


    `images/U2312.jpg`


    #### Searching for an App


    `images/U2313.jpg`


    Let''s say you have a specific idea of the type of app you want to find. Touch
    the **Search** soft key and type in either the name of the program or the type
    of program.


    So, if you are looking for an app to help you with rowing, just type in “rowing”
    to see what comes up.


    You may see some suggested search terms appear; tap these to narrow your search.


    `images/U2314.jpg`


    Tapping **Rowing Stats** in the suggested search terms yields only one result.


    `images/U2315.jpg`


    We want to see all the rowing-related apps, so we tap in the **Search** bar and
    use the **Backspace** key to erase the word “stats.” Next, we tap the **Search**
    button in the lower-right corner to see a broader list of rowing-related results.


    **TIP:** If you row on the water (instead of only on a rowing machine), you might
    want to check out **SpeedCoach Mobile**, which sells for $49.99. There is also
    a free (at the time of writing) alternative called **iRowPro**.


    `images/U2316.jpg`


    ### Downloading an App


    Once you find the app you are looking for, you can download it right to your iPhone,
    as shown in [Figure 23–5](#Chapter23.html#fig_23_5).


    `images/U2317.jpg`


    After locating the app you want to buy, notice the small button that says either
    **Free** or **$0.99** (or whatever the price is).


    Just touch that button, and it will change to say **Install** if it is a free
    program or **Buy Now** if it is a paid program.


    `images/2305.jpg`


    **Figure 23–5.** *Buying an app or downloading a free app*


    Once you have read the reviews and the app description (and perhaps visited the
    developer support site), go ahead and download or purchase the app. Once you tap
    the **Download App** button, you will be prompted to input your iTunes password.


    Input your password and tap **OK**; the app will be downloaded to your iPhone.


    #### Finding Free or Discounted Apps


    After browsing around, you will notice a couple of things about the App Store.
    First, there are lots of **free** apps. Sometimes, these are great applications.
    Other times, they are not so useful—but they can still be fun!


    Second, you will notice that there will be sales for some of the apps, while other
    apps will become less expensive over time. If you have a favorite app and it costs
    $6.99 today, you might see its price decrease if you wait a few weeks or a month
    before buying it.


    ### Redeeming Gift Cards or iTunes Codes


    You can redeem gift cards or iTunes codes by swiping all the way to the bottom
    of most pages in the **App Store**.


    At the bottom, tap the **Redeem** button.


    `images/U2318.jpg`


    Enter your code on the next screen. (You may have to scratch off something from
    the back of the gift card to see the code.)


    Tap the **Redeem** button.


    `images/U2319.jpg`'
