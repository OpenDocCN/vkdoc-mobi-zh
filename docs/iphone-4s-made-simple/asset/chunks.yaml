  trans: '

    #### 与 iPhone 相关的博客


    拥有 iPhone 的一大好处是，你立即加入了全球 iPhone 用户的大家庭。许多 iPhone 用户堪称*发烧友*，并且是众多 iPhone 用户小组的成员。这些用户小组，连同各种论坛和网站，为
    iPhone 用户提供了丰富的资源。其中许多资源可以直接在你的 iPhone 上获取，另外也有一些网站你可能想在电脑上浏览。


    有时，你可能想与其他 iPhone 爱好者交流，询问一个技术问题，或者了解最新、最热门的传闻。博客是一个绝佳的去处。


    以下是一些热门的 iPhone（以及 iPad 或 iPod touch）博客：

    *   [`www.tipb.com`](http://www.tipb.com)

    *   [`www.iphonefreak.com`](http://www.iphonefreak.com)

    *   [`www.gizmodo.com`](http://www.gizmodo.com)（iPhone 板块）


    **提示**：在你于任何这些博客上发布新问题之前，请先在博客内搜索一下，确保你的问题尚未被提出和回答。同时，请确保你将问题发布在博客的正确板块（例如，iPhone
    板块）。否则，你可能会因为没有事先做好功课而招致社区成员的愤怒！


    你也可以在网上搜索“iPhone 博客”或“iPhone 新闻与评测”，以找到更多博客。


