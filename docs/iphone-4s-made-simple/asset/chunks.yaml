    # 第一部分


    ## 快速入门指南


    您手中拿着的，是近期市场上最令人兴奋的设备之一：iPhone 4S。本快速入门指南将帮助您和您的新 iPhone 4S 迅速启动并运行起来。您将了解所有的按键、开关和接口，学习如何使用灵敏的触摸屏、实现多任务处理，并认识
    Siri —— 这位令人惊叹的语音激活个人助理。我们的应用参考表格将向您介绍 iPhone 上的应用，并作为一个快速指南，帮您找到完成某项任务的方法。


    ## 快速上手


    本快速入门指南旨在成为一款工具，帮助您直接上手，在本书中找到所需信息，同时学习基本操作，让您立即使用并享受您的 iPhone。


    我们将从“熟悉您的设备”部分的基础知识开始，涵盖 iPhone 上所有按键、按钮、开关和符号的含义及功能。在本部分中，您将看到一些便捷功能，例如通过双击 `Home`
    按钮实现多任务处理。我们还将向您介绍 Siri —— 您 iPhone 上令人惊叹的全新个人助理功能。您还将学习如何与菜单、子菜单交互以及设置开关 —— 这些操作在
    iPhone 上的几乎所有应用中都是必需的。您还会了解如何读取连接状态以及乘坐飞机时的注意事项。


    **提示：** 查阅第 2 章：“打字、复制与搜索”，获取更多出色的打字技巧等内容。


    在“触摸屏基础”部分，我们将帮助您学习如何触摸、滑动、轻扫、缩放等操作。


    稍后，在“应用参考表格”部分，我们将应用图标按常规类别进行组织，以便您可以快速浏览图标，并跳转到书中的相应章节，以了解更多关于该图标所代表的应用的信息。本指南还包含几个方便的表格，旨在帮助您快速上手并运行您的
    iPhone：


    *   起步 (表 2)

    *   有条不紊 (表 3)

    *   娱乐消遣 (表 4)

    *   信息通达 (表 5)

    *   社交网络 (表 6)

    *   高效工作 (表 7)


    让我们开始吧！


    ### 熟悉您的设备


    为了帮助您熟悉 iPhone，我们将从基础知识开始 —— 包括按键、按钮和开关的功能 —— 然后介绍如何启动应用和浏览菜单。在您的 iPhone 上，除了电池之外，最重要的状态指示器可能就是左上角显示网络状态的指示器了。理解这些状态图标的作用对于充分利用您的
    iPhone 至关重要。


    #### 按键、按钮和开关


    图 1 展示了您可以使用 iPhone 上的按钮、按键、开关和接口进行的所有操作。请继续尝试一些操作，看看会发生什么。向左滑动进行搜索，向右滑动查看更多图标，尝试双击
    `Home` 按钮以调出多任务 `App Switcher`（应用切换器）栏，然后按住 `Power/Sleep`（电源/睡眠）键以开启或关闭手机电源。尽情享受熟悉您设备的过程吧。


    ![images](img/p4-01.jpg)


    **图 1.** *iPhone 的按钮、接口、开关和按键*


    #### 切换应用（即多任务处理）


    iPhone 4 引入的出色新功能之一是多任务处理或在应用之间切换的能力（参见图 2）。


    双击 `Home` 按钮，在屏幕底部调出 `App Switcher`（应用切换器）栏。接着，向右滑动查看更多图标，然后轻点您想要启动的任何应用的图标。如果您没有看到想要的图标，请单击
    `Home` 按钮以查看整个 `Home`（主屏幕）屏幕。重复这些步骤即可跳转回您刚离开的应用。好的一点是，您刚刚跳转离开的应用始终显示在 `App Switcher`（应用切换器）栏的第一个位置。


    ![images](img/p5-01.jpg)


    **图 2.** *通过双击 `Home` 按钮进行多任务处理（切换应用）。*

