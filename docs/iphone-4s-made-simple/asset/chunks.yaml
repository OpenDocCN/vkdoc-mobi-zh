- fmt: '### Searching Your Contacts


    Let''s say you need to find a specific phone number or email address. Just touch
    your `Contacts` icon as you did previously, and you''ll see a `Search` box at
    the top of your `All Contacts` list (see [Figure 18–3](#Chapter18.html#fig_18_3)).


    **TIP:** If you are somewhere in the middle or bottom of your `Contacts` list,
    you can quickly jump to the top of the `Contacts` screen and see this `Search`
    window by tapping the time at the very top of your iPhone.


    ![images](images/1803.jpg)


    **Figure 18–3.** *The contacts `Search` box*


    To find a contact, enter the first few letters of any of these three searchable
    fields:


    - First Name

    - Last Name

    - Nickname

    - Company Name


    ![images](images/U1817.jpg)


    The iPhone begins to filter immediately and displays only those contacts that
    match the letters typed.


    **TIP**: To further narrow the search, hit the `Space` key and type a few more
    letters.


    When you see the correct name, just touch it and that individual''s contact information
    will appear.


    #### Quickly Jump to a Letter by Tapping and Sliding on the Alphabet


    If you hold your finger on the alphabet on the left edge of the screen and drag
    it up or down, you can jump to that letter.


    #### Search by Flicking


    If you don''t want to manually input letters, you can just move your finger and
    flick from the bottom up, and you''ll see your contacts move quickly on the screen.
    Just continue to flick or scroll until you see the name you want. Tap a name and
    the contact information for that person will appear.


    #### Search Using Groups


    If you have your contacts sorted by groups on your PC or Mac and you sync your
    iPhone with your computer or over the air using iCloud, then those groups will
    be synced to your iPhone. When you start your `Contacts` app, you will see `Groups`
    at the top. Under the `Groups` heading, you will see `All Contacts`.


    Choose `All Contacts` to search all the available contact information on the iPhone.


    If you have multiple accounts synced, you will see a tab for each individual account
    and one for `All Contacts` at the top.


    This example shows two groups—one is from a Microsoft Exchange account (i.e.,
    a company email account), and one is from a group of iCloud contacts.


    If you have an Exchange ActiveSync account and your company has enabled it, your
    Exchange Global Address List shows up here, under `Groups`, as well. You can search
    to find anyone in your company there.


    ![images](images/U1818.jpg)


    **NOTE**: You can''t create groups in the `Contacts` app on the iPhone—they must
    be created on your computer or synced when you add contact accounts to your iPhone.


    ### Adding Contacts from Email Messages


    Often you''ll receive an email message and realize that the contact is not in
    your address book. Adding a new contact from an email message is easy.


    Open the email message from the contact you''d like to add to your `Contacts`
    list. Next, in the email message''s `From` field, just touch the name of the sender
    next to the `From:` tag.


    If the sender is not in your address book, you''ll be taken to a screen that lets
    you choose whether to add that email address to an existing contact or to create
    a new one.


    ![images](images/U1819.jpg)


    If you select `Create a New Contact`, you''ll be taken to the same `New Contact`
    screen we saw earlier (see [Figure 18–1](#Chapter18.html#fig_18_1)).


    But suppose this is someone''s personal email address, and you already have an
    entry for that person with a work email address. In that case, you would select
    `Add to Existing Contact` and choose the correct person. Next, you''d give this
    email address a new tag—*personal*, in this case.


    ![images](images/U1820.jpg)


    #### Linking a Contact to Another App


    You might have contact information for the sender of the email message in another
    app on the phone. The iPhone makes it easy to link these contacts together.


    For example, assume Steve, the sender of the email message, is in a list of your
    LinkedIn contacts, but not a contact on your iPhone, for some reason. Here is
    how you can link his contact information in your iPhone to the information you
    have in the `LinkedIn` app:


    1.  Add him to your contacts, as shown previously.

    2.  Start the `LinkedIn` app—see [Chapter 25](#Chapter25.html#ch25): “Social Networking”
    for more information on the topic.

    3.  Find your contact information for Steve to verify that he is in your `LinkedIn`
    app.

    4.  Go to the `Connections` icon.

    5.  Choose `Download All` in the top-right corner.

    6.  The `LinkedIn` app will inform you that doing this will add the photo, current
    company and title, email addresses, and web sites associated with this contact
    (see [Figure 18–4](#Chapter18.html#fig_18_4)).

    7.  This is exactly what you want in your iPhone contacts, so choose `Download
    All New Connections`.

    8.  Steve''s picture and updated information are then brought into his contact
    information on your iPhone.


    ![images](images/1804.jpg)


    **Figure 18–4.** *Linking a new contact in an email message to an existing social
    networking contact*


    **TIP**: Learning the names of the parents of a school-age child''s friends can
    be fairly challenging. In the `First` field, however, you can add, not just the
    name of your child''s friend, but also the names of the child''s parents (e.g.,
    `First: Samantha (Mom: Susan, Dad: Ron)`). Next, in the `Company` field, add the
    name of your child and “school friend” (e.g., `Cece school friend`). Now, just
    typing your child''s name in the `Search` box of your `All Contacts` list instantly
    finds every person you ever met at your child''s school. Now you can say, without
    missing a beat: “Hello, Susan, great to see you again!” *Try your best to covertly
    look up the name.*


    ### Sending a Picture to a Contact


    If you want to send a picture to a contact, then you will need to do that from
    the `Photos` app (see [Chapter 20](#Chapter20.html#ch20): “Working with Photos”).


    ### Sending an Email Message from Contacts


    Many of the core apps (e.g., `Contacts`, `Mail`, and `Messages`) are fully integrated,
    so one app can easily trigger another. If you want to send an email message to
    one of your contacts, simply open the contact and tap the email address. The `Mail`
    app will launch, and you can compose and send an email message to this person.


    Start your `Contacts` app by touching the `Contacts` icon. Either search or flick
    through your contacts until you find the contact you need.


    ![images](images/U1821.jpg)


    In the contact information, touch the email address of the contact you''d like
    to use.


    You''ll see that the `Mail` program launches automatically with the contact''s
    name in the `To:` field of the email message. Finally, type and send the message.


    ![images](images/U1822.jpg)'
