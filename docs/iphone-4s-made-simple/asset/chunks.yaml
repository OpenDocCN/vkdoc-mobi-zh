  trans: "\n# 保护 Wi-Fi 网络——输入密码\n\n部分 Wi-Fi 网络需要输入密码才能连接。网络管理员在创建无线网络时会设置这一密码。你需要知道确切的密码，包括是否区分大小写。\n\
    \n如果网络确实需要密码，你将进入**输入密码**屏幕。请严格按照提供给您的密码输入，然后按下屏幕键盘上的**回车**键（此时该键标记为**加入**）。\n\
    \n在**网络**屏幕上，您会看到一个**对勾**图标，表明您已连接到该网络。\n\n![images](img/U0404.jpg)\n\n![images](img/U0405.jpg)\n\
    \n**提示**：您可以在密码对话框中进行粘贴；因此对于较长、随机的密码，您可以将其传输到您的 iPhone 上（例如通过电子邮件），然后直接复制粘贴。请记得之后立即删除该邮件，以确保信息安全。在邮件中长按并选中密码，然后点击**拷贝**。在\
    \ Wi-Fi 网络的**密码**字段中，点击并选择**粘贴**。\n\n![images](img/U0406.jpg)\n\n## 切换到不同的 Wi-Fi\
    \ 网络\n\n有时您可能想要切换当前正在使用的 Wi-Fi 网络。这种情况可能发生在酒店、公寓或其他场所，当 iPhone 自动选择的网络并非信号最强的，或者您希望使用安全网络而非不安全的网络时。\n\
    \n要从当前选中的 Wi-Fi 网络切换，请点击**设置**图标，轻触**Wi-Fi**，然后轻触您想要加入的 Wi-Fi 网络名称。如果该网络需要密码，您需要输入密码才能加入。\n\
    \n一旦您输入了正确的密码（或者您轻触了一个开放网络），您的 iPhone 就会加入该网络。\n\n## 验证您的 Wi-Fi 连接\n\n通过查看主**设置**屏幕中**Wi-Fi**选项旁边的信息，很容易判断您是否已连接到网络（以及连接的是哪个网络）。请按照以下步骤检查您的\
    \ Wi-Fi 连接状态：\n\n1.  点击您的**设置**图标。\n2.  查看顶部**Wi-Fi**选项旁边的信息：\n    *   如果看到**未连接**，则表示您没有活跃的\
    \ Wi-Fi 连接。\n    *   如果看到其他名称，例如**Panera**，则表示您已连接到该 Wi-Fi 网络。\n\n![images](img/U0407.jpg)\n\
    \n## 高级 Wi-Fi 选项（隐藏或不可发现的网络）\n\n有时您可能看不到要加入的网络，因为网络管理员隐藏了其名称（即未广播 SSID）。接下来，您将学习如何在\
    \ iPhone 上加入此类网络。一旦您加入过此类网络，下次再进入其覆盖范围时，iPhone 会自动连接，而不会发出任何提示。您也可以让 iPhone 每次加入网络时都询问您；我们也将向您演示如何做到这一点。有时您可能想要删除或忽略某个网络。例如，您可能参加了一次性会议，想要移除相关的网络——您也将学到如何操作。\n\
    \n### 为什么我看不到要加入的 Wi-Fi 网络？\n\n有时，出于安全考虑，人们不会让他们的网络可被发现（他们隐藏了网络名称，即 SSID），您必须手动输入名称和安全选项才能连接。\n\
    \n**正如您所见，可用网络列表中包含“其他”。**\n\n1.  点击**其他**按钮，您可以手动输入要加入的网络名称。\n\n    ![images](img/U0408.jpg)\n\
    \n2.  输入 Wi-Fi 网络的**名称**。\n3.  点击**安全性**标签。\n\n    ![images](img/U0409.jpg)\n\n\
    4.  选择该网络使用的安全类型。如果不确定，您需要向网络管理员咨询。\n\n    ![images](img/U0410.jpg)\n\n当您获得所需信息后，将其连同正确的密码一起输入，这个新网络将被保存到您的网络列表中，以便将来访问。\n\
    \n### 重新连接到之前加入过的 Wi-Fi 网络\n\niPhone 的妙处在于，当您回到曾连接过 Wi-Fi 网络（无论是开放网络还是需要密码的安全网络）的区域时，您的\
    \ iPhone 会自动重新连接该网络，而不会事先询问您。但是，您可以关闭此自动连接功能，如下一节所述。\n\n#### “询问是否加入网络”主开关\n\n\
    有一个**询问是否加入网络**主开关，默认设置为**打开**。已知网络会自动连接，但此设置仅当没有已知网络可用时才生效。当此开关设为**打开**时，系统会询问您是否加入可见的\
    \ Wi-Fi 网络。如果有您未知的网络可用，连接前会征询您的意见。\n\n如果该开关设为**关闭**，您需要手动加入未知网络。\n\n为什么要关闭此功能？\n\
    \n例如，如果您不希望孩子能在您不知情的情况下通过 iPhone 加入无线网络，这样做可以成为一种良好的安全措施。\n\n同样，当您身处不想加入 Wi-Fi\
    \ 的区域（例如经过许多热点的地方）时，iPhone 持续弹出**加入网络**连接屏幕也会令人烦恼。\n\n![images](img/U0411.jpg)\n\
    \n#### 每个网络上的“询问是否加入”和“询问是否登录”开关\n\n有时，您可能会发现某个特定 Wi-Fi 网络有额外的开关，可以覆盖主**询问是否加入网络**开关。点击网络名称旁边的小蓝色**箭头**图标![images](img/U0412.jpg)，可以查看此\
    \ Wi-Fi 网络的详细信息。**自动加入**和**自动登录**默认设置为**打开**。\n\n要禁用**自动加入**或**自动登录**，请点击每个开关将其设为**关闭**。\n\
    \n![images](img/U0413.jpg)\n\n#### 忽略（或删除）一个网络\n\n如果您发现不再需要连接到列表中的某个网络，您可以将其**忽略**——即将其从您的网络列表中移除。请按照以下步骤操作：\n\
    \n1.  点击**设置**图标。\n2.  点击**Wi-Fi**，查看您的网络列表。\n3.  点击您要忽略的网络旁边的小蓝色**箭头**![images](img/U0415.jpg)，以查看如下所示的屏幕。\n\
    4.  点击屏幕顶部的**忽略此网络**。\n\n    ![images](img/U0414.jpg)\n\n    ![images](img/U0416.jpg)\n\
    \n5.  系统会弹出一个警告提示。只需轻触**忽略**，该网络将不再显示在您的列表中。\n\n    ![images](img/U0417.jpg)\n\
    \n## 蜂窝数据连接\n\n您的 iPhone 也可以连接到蜂窝数据网络——也就是其他手机连接的同一网络。关于蜂窝数据连接，需要考虑以下几点：\n\n*\
    \   它们比 Wi-Fi 连接的可用范围更广——您可以在汽车里或远离城市的地方连接 3G 网络，而这些地点通常没有 Wi-Fi 信号。\n*   访问蜂窝数据网络需要支付额外的月服务费。\n\
    \n**注意**：请向您当地的无线运营商咨询您所在国家的 iPhone 数据套餐价格。\n"
- fmt: "### Select and Monitor Your Cellular Data Usage\n\nWhen you purchased your\
    \ iPhone, you had to select a cellular data plan from your wireless carrier. For\
    \ the iPhone in the US, you can currently choose between AT&T, Verizon, and Sprint.\
    \ If you selected one plan and now wish to try another plan, contact your carrier—you\
    \ may be allowed to switch data plans.\n\n**TIP: Saving Money on Data Charges**\n\
    \nYou might be able to save yourself some money with cellular data plan charges\
    \ by doing the following:\n\n- Always use Wi-Fi when possible.\n- Start with a\
    \ lower cost cellular data plan (e.g., US $15 for 200MB on AT&T – as of publishing\
    \ time).\n- Monitor your cellular data usage throughout the month to make sure\
    \ you are not going to exceed the lower cost data plan.\n\nYou may find that you\
    \ can live with the lower cost plan if you use Wi-Fi for most of your data needs.\n\
    \nFollow these steps to check your current cellular data usage:\n\n1. Tap the\
    \ `Settings` icon.\n2. Tap `General`.\n3. Tap `Usage`.\n4. Scroll to the bottom\
    \ and tap `Cellular Usage`.\n5. Your total data usage will be the sum of the `Sent`\
    \ and `Received` values. If you want to clear out the statistics, tap the `Reset\
    \ Statistics` button at the bottom of the screen.\n\n![images](images/U0418.jpg)\n\
    \n**NOTE**: The iPhone will notify you when you have 20%, 10%, and 0% left on\
    \ your monthly data plan. It will also give you the option of renewing that plan\
    \ or upgrading to a higher data plan, if available.\n\n### International Travel:\
    \ Things to Do Before You Go\n\nDepending on which country you are visiting and\
    \ your current iPhone voice and data plan, you may be well prepared for international\
    \ travel. However, it is quite likely that your basic iPhone data and phone plans\
    \ will either not work or cause you to spend a lot more money on data and voice\
    \ roaming charges.\n\nWe always recommend that you call your phone service provider\
    \ well in advance of a trip to see whether there is an international feature you\
    \ can turn on for your iPhone as you travel.\n\n#### Avoiding a Shockingly Large\
    \ Bill\n\nOne thing you want to avoid when traveling is returning home to an unusually\
    \ high voice or data roaming charge phone bill. For example, we have heard of\
    \ people who returned home after a trip abroad to find a phone bill totaling $1,000\
    \ or more in a single month’s data and voice roaming charges. In the sections\
    \ that follow, we will show you how to take steps before, during, and after your\
    \ trip to help avoid surprise charges.\n\nThese simple steps can help you ensure\
    \ that your iPhone will successfully and economically connect to the local country’s\
    \ network—no matter where you might be in the world.\n\n#### Step 1: Call Your\
    \ Phone Company\n\nYou should contact the phone company that supplies your iPhone\
    \ before you leave home. When you call, you should check the following things:\n\
    \n- Learn about any voice and data roaming charges you might incur when traveling.\
    \ Be specific about each country you plan to visit.\n- Check on any temporary\
    \ international rate plans that you might be able to activate before you leave.\
    \ Sometimes, these special plans will cost an additional US $10 or $20 up front,\
    \ but save you hundreds in additional charges.\n- If you use email, SMS Text,\
    \ MMS or picture messaging, web browsing, and any other data services, then you\
    \ will also want to specifically ask about whether any of these services are charged\
    \ separately when traveling abroad. Usually, text and picture messaging are additional\
    \ charges.\n\nYou might be able to find some information on your phone company’s\
    \ web site, but usually you need to call them.\n\n#### Step 2: Check If You Can\
    \ Use an International SIM Card\n\nIn some cases, your iPhone wireless company\
    \ won’t offer special deals on international data roaming plans—or its rates will\
    \ be unreasonably high. In these cases, you may want to ask your phone company\
    \ to unlock your iPhone, so you can insert a SIM card purchased in the country\
    \ you’re visiting.\n\n**NOTE**: Apple sells an unlocked, SIM-free iPhone in many\
    \ countries, including the US, Canada, and the UK. If you are a frequent traveler,\
    \ an officially unlocked iPhone might be something to consider.\n\nInserting a\
    \ local SIM card will eliminate or greatly reduce data and voice roaming charges.\
    \ However, you should carefully check the cost of placing and receiving international\
    \ calls on that SIM card.\n\nUsing an international SIM card might save you hundreds\
    \ of dollars, but it’s best to do some web research or try to talk to someone\
    \ who has recently traveled to the same country for advice before settling on\
    \ that approach.\n\n**TIP:** If you are going to a country without a good rate\
    \ plan and your carrier will not unlock your iPhone, you might want to consider\
    \ renting or purchasing a local cell phone. You may be able to rent a phone for\
    \ about US $30 / week with much lower voice calling rates. Many cell phone rental\
    \ companies exist, such as Travel Cell, Mobal, and Cellular Abroad. (Do a web\
    \ search for “International Cell Phone Rental” to find more information.)\n\n\
    You may also want to do a web search for traveling to countries X, Y, and Z with\
    \ your iPhone.\n\n**TIP**: Put a paperclip in your luggage—if you lose the SIM\
    \ removal tool that came with your unlocked iPhone, you will need it to remove\
    \ and replace the SIM card in your iPhone.\n\n#### Step 3: Do Any Data Intensive\
    \ Stuff Prior to Leaving\n\nYou should do all your data-intensive activities before\
    \ you leave your home country, if possible. If you have a lot of apps that need\
    \ updating, do that before you leave. Also, look for and add any apps that you\
    \ might need before your trip. You should also download any large files, such\
    \ as movies, videos, or music before you leave.\n\n### Flying on an Airplane:\
    \ Airplane Mode\n\nOften when you are flying on an airplane, the flight crew will\
    \ ask you to turn off all portable electronic devices for takeoff and landing.\
    \ Then, when you get to a certain altitude, the crew will say that “all approved\
    \ electronic devices” can be turned back on.\n\nIf you need to turn off your iPhone\
    \ completely, press and hold the `Power` button on the top-right edge, and then\
    \ `Slide to Power Off` with your finger.\n\nIn order to enable `Airplane Mode`,\
    \ follow these steps:\n\n1. Tap the `Settings` icon.\n2. Set the switch next to\
    \ `Airplane Mode` in the top of the left column to `ON`.\n3. Notice that the Wi-Fi\
    \ is automatically turned `OFF` and that your phone will not work.\n\n![images](images/U0419.jpg)\n\
    \n**TIP**: Some airlines have in-flight Wi-Fi networks. On those flights, you\
    \ may want to turn your Wi-Fi back `ON` at the appropriate time.\n\nYou can turn\
    \ your Wi-Fi connection `OFF` or `ON` by following these steps:\n\n1. Tap the\
    \ `Settings` icon.\n2. Tap `Wi-Fi` near the top of the screen.\n3. To enable the\
    \ Wi-Fi connections, set the switch next to `Wi-Fi` in the top of the page to\
    \ `ON`.\n\n   ![images](images/U0420.jpg)\n\n4. To disable Wi-Fi, set the same\
    \ switch to `OFF`.\n5. Select the Wi-Fi network and follow the steps given by\
    \ the flight attendant to get connected.\n\n### International Travel: When You\
    \ Arrive\n\nOnce you’ve completed the steps described so far to prepare for your\
    \ trip, you will need to address some additional issues when you get to your destination.\
    \ The next sections explain the things you need to keep in mind after you arrive\
    \ at your destination.\n\n#### Step 1: Make Sure the Time Zone Is Correct\n\n\
    When you arrive, you will need to make sure your iPhone is displaying the correct\
    \ local time. Usually, your iPhone will auto-update your time zone when you arrive\
    \ at a new destination. If it doesn’t, you can manually adjust the time zone (see\
    \ the “Setting Your Date and Time” section in [Chapter 1](#Chapter01.html#ch1):\
    \ “Getting Started”)."
