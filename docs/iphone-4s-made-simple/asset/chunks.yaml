  trans: "\n# 使用“打开页面”按钮\n\n有时，当你点击一个链接时，你正在查看的网页会移至后台，并弹出一个包含新内容（例如另一个网页或视频）的新窗口。你会看到先前的页面移至后台，同时打开一个新页面。在这种情况下，新浏览器窗口中的“返回”箭头将不起作用。\n\
    \n相反，你需要点击右下角的“打开页面”图标 ![images](img/U1607.jpg) 来查看已打开网页的列表，然后点击你想要的那个页面。在所示的示例中，我们点击了一个链接，该链接打开了新浏览器窗口。回到旧窗口的唯一方法是点击“打开页面”图标，并选择所需的页面。\n\
    \n![images](img/U1608.jpg)\n\n# 在网页中放大和缩小\n\n在 iPhone 上放大和缩小网页非常容易。主要有两种缩放方式：双击和捏合。\n\
    \n## 双击\n\n如果你双击网页中的某一栏，页面将放大至该特定栏。这让你能够精确定位到网页上的正确位置，对于未针对移动屏幕优化的页面非常有用。\n\n\
    要缩小，只需再双击一次（你可以在本书开头的“快速入门指南”中看到它的效果）。\n\n## 捏合\n\n此技巧可让你放大页面的特定部分。这需要稍加练习，但很快就会变得得心应手。查看“快速入门指南”了解具体效果。\n\
    \n将你的拇指和食指并拢放在你想要放大的网页部分。慢慢地向外捏合，分开你的手指。你会看到网页放大。网页需要几秒钟来聚焦，但很快它就会放大并变得非常清晰。\n\
    \n要缩小到之前的状态，只需将手指分开，然后慢慢靠拢；页面将会缩小到原始大小。\n\n# 激活网页中的链接\n\n上网浏览时，你经常会遇到能带你前往另一个网站的链接。由于\
    \ `Safari` 是一个功能齐全的浏览器，你只需点击链接即可跳转到新页面。\n\n# 使用 Safari 书签\n\n一旦你开始在 iPhone 上进行一些浏览，你自然会希望快速访问你最喜爱的网站。一个很好的方法就是添加书签，以实现一键访问网站。\n\
    \n**提示：** 你可以通过 iCloud 无线方式，或使用电脑上的 `iTunes` 应用，从电脑的浏览器（仅限 `Safari` 或 `Internet\
    \ Explorer`）同步你的书签。更多详情，请查看第 3 章：“与 iCloud、iTunes 等进行同步”。\n\n## 添加新书签\n\n在 iPhone\
    \ 上添加新书签只需轻点几下：\n\n1.  要为当前查看的网页添加新书签，请轻点屏幕底部的“操作”按钮 ![images](img/U1609.jpg)。\n\
    2.  选择“添加书签”。\n\n    ![images](img/U1610.jpg)\n\n3.  我们建议你将书签名称编辑得简短且易于识别。\n4.\
    \  如果你想更改存储书签的文件夹，请轻点“书签”。\n5.  完成后，轻点“存储”按钮。\n\n    ![images](img/U1611.jpg)\n\
    \n## 使用书签和历史记录\n\n一旦你设置了一些书签，查看和使用它们就非常容易了。在同一个区域，你还可以查看和使用你的网页浏览历史记录。iPhone 上一个非常有用的工具是能够像在电脑上一样通过“历史记录”浏览网页。请按照以下步骤操作：\n\
    \n1.  轻点页面底部的“书签”图标 ![images](img/U1612.jpg)。\n2.  向上或向下滑动查看所有书签。\n3.  轻点任何书签，即可跳转到该网页。\n\
    \n    ![images](img/U1613.jpg)\n\n4.  轻点“历史记录”文件夹，查看最近访问过的网页历史记录。\n5.  请注意，在列表底部，你会看到“今天早些时候”和之前日期的其他文件夹。\n\
    6.  轻点任一历史记录条目，即可前往该网页。\n\n**提示：** 要清除历史记录，请轻点左下角的“清除”按钮。你也可以在“设置”应用中清除历史记录、Cookie\
    \ 和缓存。轻点“设置”；轻点“Safari”；滚动到底部；然后轻点“清除历史记录”、“清除 Cookie”或“清除缓存”。\n\n![images](img/U1614.jpg)\n\
    \n## 管理你的书签\n\n因为设置书签非常容易，所以很容易积累大量的书签。但是，你可能会发现不再需要某个特定书签，或者你可能想通过添加新文件夹来整理它们。\n\
    \n如果你已经整理过“电话收藏”列表，你就已经知道如何整理书签了；操作步骤相同。\n\n就像 iPhone 上的其他列表一样，你可以重新排列“书签”列表并删除条目。请按照以下步骤操作：\n\
    \n1.  像之前一样查看你的“书签”列表。\n2.  轻点左下角的“编辑”按钮。\n3.  要重新排列条目，请触摸并拖动带有三条灰色横线的右侧边缘，在列表中向上或向下移动。在此示例中，我们将指向亚马逊网站“iPad\
    \ Made Simple”图书页面的书签拖到顶部。\n4.  要为书签创建新文件夹，请轻点右下角的“新建文件夹”按钮。\n5.  要删除书签，请轻点条目左侧的红色“圆圈”图标使其变为垂直。\n\
    6.  轻点“删除”按钮。\n7.  完成重新排列和删除条目后，轻点左上角的“完成”按钮。\n8.  要编辑书签的名称、文件夹或网址，请轻点书签名称本身。\n\
    \n    ![images](img/U1615.jpg)\n\n9.  现在你可以对名称、网址或文件夹进行任何调整。\n10. 要更改书签的存储文件夹，请轻点网址下方的按钮。在此图中，它显示为“书签”；但在你的\
    \ iPhone 上，可能有所不同。此书签指向亚马逊网站上的“iPad Made Simple”页面。\n11. 完成后轻点“完成”。\n\n    ![images](img/U1616.jpg)\n\
    \n# 阅读列表\n\n`阅读列表` 是一种特殊类型的书签，可让你快速保存一篇网络文章，以便闲暇时阅读。`阅读列表` 功能可以通过 iCloud 同步，因此这是在家庭或工作用的\
    \ Mac 或 Windows PC 上的 `Safari` 中快速标记文章，以便在旅途中通过 iPhone 或 iPad 阅读的绝佳方式。你也可以使用此功能在\
    \ iPhone 上保存书签，以便回到 iPad 或 PC 后更舒适地阅读。\n\n请按照以下步骤使用 `阅读列表` 功能：\n\n1.  前往你想要在 `Safari`\
    \ 中保存的文章。\n2.  轻点页面底部中间的“操作”按钮 ![images](img/U1617.jpg)。\n3.  轻点“添加到阅读列表”。\n\n\
    稍后按照以下步骤查看 `阅读列表` 中的文章：\n\n![images](img/U1618.jpg)\n\n1.  轻点页面右下角的“书签”按钮 ![images](img/U1619.jpg)。\n\
    2.  轻点“阅读列表”选项的“眼镜”图标。（如果你没有看到“眼镜”图标，你可能位于“书签”文件夹内。只需轻点左上角的“箭头”图标退出你所在的文件夹，直到“箭头”消失，你就能看到“眼镜”图标。）\n\
    \n![images](img/U1620.jpg)\n\n1.  要查看你的 `阅读列表` 中的所有内容，请轻点左上角的“全部”标签。要仅查看尚未阅读的文章，请轻点右上角的“未读”标签。\n\
    2.  轻点你想阅读的文章。\n\n![images](img/U1621.jpg)\n\n最后，按照以下步骤从 `阅读列表` 中删除一篇文章：\n\n1.\
    \  在你想要从 `阅读列表` 中移除的文章上从左向右滑动。\n2.  轻点红色的“删除”按钮。\n\n    ![images](img/U1622.jpg)\n"
- fmt: "### Safari Reader\n\n**Safari** 的 Reader 功能让您能够以干净、清晰的页面形式欣赏网页文章，文字大小适中，免去繁杂布局或广告的干扰。\n\
    \n**注意：** 尽管 Safari 能够出色地检测大多数网页文章，但由于内容和格式的多样性，有时可能会遗漏。如果您没有看到 Reader 按钮，说明 Safari\
    \ 无法检测到该文章。\n\n1. 按照以下步骤激活此功能：\n\n   ![images](images/U1623.jpg)\n\n2. 前往您想阅读的文章。\n\
    3. 点击 URL 字段右侧的 Reader 按钮，见图 [16–1](#Chapter16.html#fig_16_1)。\n4. 点击字体大小按钮以放大或缩小文字。\n\
    \n   ![images](images/U1624.jpg)\n\n![images](images/1601.jpg)\n\n**图 16–1.**\
    \ *标准视图（左）与 Reader 视图（右）中的同一网页。*\n\n**提示：** 如果您希望同时拥有“阅读列表”和“Reader”的功能，以及浏览器访问、社交分享等其他特性，请查看\
    \ App Store 中的 **Instapaper** 等应用。\n\n### Safari 浏览技巧与提示\n\n在您掌握了基本浏览方法后，我们将介绍一些实用技巧，帮助您在\
    \ iPhone 上更愉快、更高效地浏览网页。\n\n#### 跳转到网页顶部\n\n有时网页内容很长，手动滚动回顶部会比较费力。一个简单的技巧是点击网页的灰色标题栏，即可自动跳转到顶部。\n\
    \n#### 通过电子邮件或 Twitter 分享网页\n\n浏览时，如果您发现一个非常想分享给朋友或同事的页面，请点击底部栏中间的 **Action**\
    \ 按钮 ![images](images/U1625.jpg)，然后选择 **Mail Link to this Page** 创建一封包含链接的邮件并发送。选择\
    \ **Tweet** 则创建一条包含分享链接的新 Twitter 消息，如图 [16–2](#Chapter16.html#fig_16_2) 所示。\n\
    \n![images](images/1602.jpg)\n\n**图 16–2.** *使用 Action 按钮执行 Safari 网页的各种功能。*\n\
    \n#### 打印网页\n\n使用 iPhone，您可以通过本地 Wi-Fi 网络轻松地将任何网页打印到兼容 **AirPrint** 的打印机。点击 **Action**\
    \ 按钮 ![images](images/U1626.jpg)，然后选择 **Print**。\n\n#### 在 Safari 中观看视频\n\n您经常会在网站上看到视频。您可以播放其中许多视频，但并非全部。例如，采用\
    \ **Adobe Flash** 格式的视频无法在 iPhone 上播放（请参阅本章开头的说明）。\n\n点击 **Play** 按钮后，您将离开 **Safari**\
    \ 并进入 **iPod** 视频播放器。\n\n您可以横置 iPhone，以横向或宽屏模式观看视频。\n\n如果播放控制消失，点击屏幕即可重新显示。\n\n\
    观看完视频并想返回网页时，请点击左上角的 **Done** 按钮。\n\n**提示：** 请参阅第 15 章“观看视频”中的视频播放器技巧与提示。\n\n\
    ![images](images/U1627.jpg)\n\n#### 保存或复制文本与图形\n\n有时您可能想从网站复制文本或图形。本节将简要介绍操作方法；如需了解更深入的步骤，包括如何使用剪切和粘贴功能，请参阅第\
    \ 2 章“键入、复制和搜索”中的“复制和粘贴”部分。以下是从网页复制文本或图形的快速摘要：\n\n*   **复制单个单词：** 长按该单词，直到它被高亮显示且出现\
    \ **Copy** 按钮。然后点击 **Copy**。\n*   **复制几个单词或整个段落：** 长按一个单词直到它被高亮显示。然后向左或向右拖动蓝色圆点以选择更多文本。您可以向上或向下滑动以选择整个段落。最后点击\
    \ **Copy**。\n\n    **提示：** 选定单个单词会使复制功能进入单词选择模式，在此模式下您可以拖动以增加或减少选中的单词数量。如果选择超过一个段落，通常会切换到元素选择模式，此时您会看到可拖动的边缘，用于选择多个段落、图像等。\n\
    \n*   **保存或复制图形：** 长按图片或图像，直到弹出窗口询问您是否要保存或复制该图像。\n\n#### 使用 AutoFill 节省时间\n\n\
    AutoFill 功能是节省输入个人信息（包括网站用户名和密码）的好方法。AutoFill 工具可以记住并自动填写网页表单所需的信息。启用 AutoFill\
    \ 可以节省大量时间。\n\n请参阅本章后面的“启用 AutoFill”部分，了解如何在 iPhone 上设置 AutoFill。\n\n启用 **AutoFill**\
    \ 选项后，只需前往任何需要填写字段的网页。一旦您触摸该字段，键盘就会在屏幕底部弹出。在键盘顶部，您会看到一个写着 **AutoFill** 的小按钮。点击它，网页表单就会自动填写完毕。\n\
    \n**注意：** 自动输入您的姓名和密码意味着任何拿起您 iPhone 的人都能访问您的个人网站和信息。您可能希望按照第 8 章“个性化与安全”中的说明启用密码安全功能。\n\
    \n##### 输入用户名和密码\n\n当您首次访问一个需要输入用户名和密码的网站时，输入它们后点击 **Submit** 或 **Enter**。此时，AutoFill\
    \ 会询问是否希望您的 iPhone 记住它们。\n\n如果希望被记住并在下次访问时自动输入，请点击 **Yes**。\n\n![images](images/U1628.jpg)\n\
    \n下次访问此登录页面时，您的用户名和密码将自动填写。\n\n![images](images/U1629.jpg)\n\n##### 用于个人信息\n\n\
    在网上，您经常需要输入姓名、电子邮件地址、家庭住址等信息。通过将 AutoFill 设置并与 iPhone 上的联系人记录关联，只需轻触一下即可填写这些表单。\n\
    \n您会访问许多需要填写网页表单的网站。例如，查看 [`www.madesimplelearning.com`](http://www.madesimplelearning.com)\
    \ 上关于免费 iPhone 技巧的网页表单示例。手动输入电子邮件地址、名字和姓氏会花费一些时间。\n\n![images](images/U1630.jpg)\n\
    \n一旦您点击第一个字段（此处为 **Email**），您就会看到 **AutoFill** 栏出现在键盘上方。\n\n点击 **AutoFill** 按钮，您的电子邮件地址和姓名便会立即根据联系人记录填写完毕。\n\
    \n![images](images/U1631.jpg)\n\n#### 将网页图标添加到主屏幕\n\n如果您喜欢某个网站或页面，可以轻松地将其作为图标添加到\
    \ **Home** 屏幕。这样，您无需通过 **Safari** 的书签选择过程即可直接访问该网页。将图标放在 **Home** 屏幕上可以节省许多步骤。这对于快速启动\
    \ Web 应用（例如 Google 的 Gmail 或基于 Web 的游戏）尤其有用。\n\n**按照以下步骤添加 Web 应用图标：**\n\n1. \
    \ 点击浏览器底部的 **Action** 按钮 ![images](images/U1632.jpg)。\n2.  点击 **Add to Home Screen**。\n\
    3.  调整名称，将其缩短至十个或更少字符；因为主屏幕上图标名称的空间有限，建议这样做。\n4.  点击右上角的 **Add** 按钮。\n\n   ![images](images/U1633.jpg)"
  raw: "### Safari Reader\n\n**Safari**'s Reader feature allows you to enjoy an article\
    \ on the web as a clean, clear page of nicely sized text, without the distraction\
    \ of busy layouts or ads.\n\n**NOTE:** While Safari does an excellent job detecting\
    \ most web page articles because of the white variety of content and formatting,\
    \ it might occasionally miss one. If you don't see the Reader button, it means\
    \ Safari couldn't detect the article.\n\n1.  Follow these steps to activate this\
    \ feature:\n\n    ![images](images/U1623.jpg)\n\n2.  Go to the article you want\
    \ to read.\n3.  Tap the Reader button on the right side of the URL field, see\
    \ [Figure 16–1](#Chapter16.html#fig_16_1).\n4.  Tap the Font Size button to make\
    \ the type bigger or smaller.\n\n    ![images](images/U1624.jpg)\n\n![images](images/1601.jpg)\n\
    \n**Figure 16–1.** *The same web page in standard view (left) and Reader View\
    \ (right).*\n\n**TIP:** If you find yourself wishing you could get the functionality\
    \ of both Reading List and Reader—along with other features like browser access,\
    \ social sharing, and more—then check out App Store apps like **Instapaper**.\n\
    \n### Safari Browsing Tips and Tricks\n\nNow that you know the basics of how to\
    \ get around, we will cover a few useful tips and tricks for making web browsing\
    \ more enjoyable and faster on your iPhone.\n\n#### Jumping to the Top of the\
    \ Web Page\n\nSometimes, web pages can be quite long, which can make scrolling\
    \ back to the top of the page a bit laborious. One easy trick is to tap the gray\
    \ title bar of the web page; you'll automatically jump to the top of the page.\n\
    \n#### Emailing or Tweeting a Web Page\n\nSometimes while browsing, you find a\
    \ page so compelling you just have to share it with a friend or colleague. Tap\
    \ the **Action** button ![images](images/U1625.jpg) in the middle of the bottom\
    \ bar, and then select **Mail Link to this Page** to create an email message with\
    \ a link that you can send. Select **Tweet** to create a new Twitter message with\
    \ a link you can share, as shown in [Figure 16–2](#Chapter16.html#fig_16_2).\n\
    \n![images](images/1602.jpg)\n\n**Figure 16–2.** *Using the Action button to do\
    \ various functions with a Safari web page.*\n\n#### Printing a Web Page\n\nWith\
    \ the iPhone, you can easily print any web page you come across to any **AirPrint**\
    \ compatible printer over your local Wi-Fi network. Tap the **Action** button\
    \ ![images](images/U1626.jpg) and then select **Print**.\n\n#### Watching Videos\
    \ in Safari\n\nYou will often see videos on web sites. And you will be able to\
    \ play many—but not all—of these videos. For example, videos formatted with **Adobe\
    \ Flash** will not be playable on your iPhone (see our note at the beginning of\
    \ this chapter).\n\nWhen you tap the **Play** button, you will be taken out of\
    \ **Safari** into the **iPod** video player.\n\nYou can then turn your iPhone\
    \ on its side to view the video in Landscape, or wide-screen, mode.\n\nTap the\
    \ screen to bring up the player controls if they have disappeared.\n\nWhen you\
    \ are finished watching the video and want to return to the web page, tap the\
    \ **Done** button in the upper-left corner.\n\n**TIP:** Check out the video player\
    \ tips and tricks in [Chapter 15](#Chapter15.html#ch15): “Viewing Videos.”\n\n\
    ![images](images/U1627.jpg)\n\n#### Saving or Copying Text and Graphics\n\nFrom\
    \ time to time, you may see text or a graphic you want to copy from a web site.\
    \ We tell you briefly how to do this in this section; however, to see how to get\
    \ this done in more depth, including how to use the Cut and Paste functions, please\
    \ see the “Copy and Paste” section in [Chapter 2](#Chapter02.html#ch2): “Typing,\
    \ Copy and Search.” Here's a quick synopsis of how to copy text or a graphic from\
    \ a web page:\n\n*   To copy a single word, touch and hold the word until you\
    \ see it highlighted and the **Copy** button appears. Next, tap **Copy.**\n* \
    \  To copy a few words or entire paragraph, touch and hold a word until it is\
    \ highlighted. Next, drag the blue dots left or right to select more text. You\
    \ can flick up or down to select an entire paragraph. Finally, tap **Copy**.\n\
    \n    **TIP:** Selecting a single word puts the copy feature in word-selection\
    \ mode, where you can drag to increase or decrease the number of words selected.\
    \ If you go past a single paragraph, it will typically switch to element-selection\
    \ mode where, instead of corners, you get edges that you can drag out to select\
    \ multiple paragraphs, images, and so on.\n\n*   To save or copy a graphic, touch\
    \ and hold the picture or image until you see the pop-up asking if you would like\
    \ to save or copy the image.\n\n#### Saving Time with AutoFill\n\nThe AutoFill\
    \ feature gives you a great way to save time typing your personal information,\
    \ including usernames and passwords on web sites. The AutoFill tool can remember\
    \ and fill in information required in web forms. You will save a lot of time by\
    \ enabling AutoFill.\n\nCheck out the steps we show you later in this chapter\
    \ in the “Enabling AutoFill” section to set up AutoFill to work on your iPhone.\n\
    \nOnce you enable the **AutoFill** option, just go to any web page that has a\
    \ field to fill out. As soon as you touch the field, the keyboard will come up\
    \ at the bottom of the screen. At the top of the keyboard, you will see a small\
    \ button that says **AutoFill**. Touch it and the web form should be filled out\
    \ automatically.\n\n**CAUTION:** Having your name and password entered automatically\
    \ means that anyone who picks up your iPhone will be able to access your personal\
    \ sites and information. You may want to enable passcode security, as explained\
    \ in [Chapter 8](#Chapter08.html#ch8): “Personalize and Secure.”\n\n##### Entering\
    \ Usernames and Passwords\n\nThe first time you go to a web site where you have\
    \ to enter a username and password, type them in and press **Submit** or **Enter**.\
    \ At that time, AutoFill will ask if you want your iPhone to remember them.\n\n\
    Tap **Yes** if you want them to be remembered and automatically entered the next\
    \ time you visit the site.\n\n![images](images/U1628.jpg)\n\nThe next time you\
    \ visit this login page, your username and password will be automatically filled\
    \ in.\n\n![images](images/U1629.jpg)\n\n##### For Personal Information\n\nThere\
    \ are many times on the Web where you have to enter your name, email address,\
    \ home address, and more. With AutoFill set up and tied to your contact record\
    \ on the iPhone, filling in these forms just takes a single tap of your finger.\n\
    \nYou will go to many sites with web forms that need to be completed. For example,\
    \ check out this example of a web form on [`www.madesimplelearning.com`](http://www.madesimplelearning.com)\
    \ for free iPhone tips. It would take a while to manually type your email address,\
    \ first name, and last name.\n\n![images](images/U1630.jpg)\n\nAs soon as you\
    \ tap the first field— **Email**, in this case**—**you see the **AutoFill** bar\
    \ appear just above your keyboard.\n\nTap the **AutoFill** button, and your email\
    \ address and name are immediately filled in from your contact record.\n\n![images](images/U1631.jpg)\n\
    \n#### Adding a Web Page Icon to Your Home Screen\n\nIf you love a web site or\
    \ page, it's very easy to add it as an icon to your **Home** screen. That way,\
    \ you can instantly access the web page without going through **Safari** 's bookmark\
    \ selection process. You'll save lots of steps by putting the icon on your **Home**\
    \ screen. This is especially good for quickly launching web apps (e.g., Gmail\
    \ from Google or web-based games).\n\n**Follow these steps to add a web app's\
    \ icon:**\n\n1.  Tap the **Action** button ![images](images/U1632.jpg) at the\
    \ bottom of the browser.\n2.  Tap **Add to Home Screen**.\n3.  Adjust the name\
    \ to shorten it to ten or fewer characters; you should do this because there's\
    \ not much room for the icon's name on your Home screen.\n4.  Tap the **Add**\
    \ button in the upper-right corner.\n\n    ![images](images/U1633.jpg)"
