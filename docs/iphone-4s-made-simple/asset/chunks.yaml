  trans: "\n### 检查已发送的邮件\n\n按以下步骤确认邮件是否已正确发送：\n\n1.  点击左上角的**电子邮箱账号名称**按钮，查看您刚刚用来发送邮件的账号下的邮件文件夹。\n\
    2.  点击`已发送`文件夹。\n3.  确认您在列表中看到的第一封邮件就是您刚刚撰写并发送的那一封。\n\n    ![图片](img/U1738.jpg)\n\
    \n**注：** 只有当您在 iPhone 上确实从该账号发送或删除了邮件后，才会看到`已发送`和`废纸篓`文件夹。如果您的邮箱账号是 IMAP 账号，您可能会看到比本章所述更多的文件夹。\n\
    \n### 阅读与回复邮件\n\n按以下步骤阅读您的邮件：\n\n1.  使用本章前面描述的步骤，导航至您要查看的邮箱账号的收件箱。\n2.  要阅读任意邮件，只需在收件箱中点击它。\n\
    3.  新的、未读的邮件会在邮件左侧显示一个小蓝点。\n4.  在收件箱中向上或向下滑动手指，可以滚动浏览您的邮件。\n5.  阅读邮件时，向上或向下滑动即可滚动查看。\n\
    \n    ![图片](img/U1739.jpg)\n\n#### 将邮件标记为未读或加注旗标\n\n如果您阅读了一封邮件但希望确保稍后能快速找到它，您可以选择将其标记为`未读`或加注`旗标`，以便日后引起您的注意。\n\
    \n按以下步骤`标记`一封邮件：\n\n1.  点击位于时间和日期右侧的`标记`字样。\n2.  从弹出的菜单中选择`旗标`或`标记为未读`。\n\n  \
    \  ![图片](img/U1740.jpg)\n\n被`标记`旗标的邮件会在`标记`文字的左侧显示一个红色小`旗标`图标。被`标记为未读`的邮件会在`标记`文字的右侧显示一个小蓝点。\n\
    \n要`取消标记`一封邮件：\n\n1.  点击位于时间和日期右侧的`标记`字样。\n2.  从弹出的菜单中选择`取消旗标`或`标记为已读`。\n\n  \
    \  ![图片](img/U1741.jpg)\n\n#### 放大或缩小\n\n与浏览网页时一样，您可以放大以查看更大字体的邮件。您也可以像在网页上那样双击；还可以使用`双指捏合`来放大或缩小（有关这些功能的更多信息，请参阅本书第\
    \ 1 部分快速入门指南中的“缩放”章节）。\n\n### 电子邮件附件\n\n某些电子邮件附件会被 iPhone 自动打开，因此您甚至可能没有注意到它们是附件。例如，Adobe\
    \ 的可移植文档格式（PDF）文件（由`Adobe Acrobat`和`Adobe Reader`等应用使用）以及某些类型的图像、视频和音频文件。您也可能会收到文档附件，例如\
    \ Apple 的`Pages`、`Numbers`和`Keynote`文件；或 Microsoft 的`Word`、`Excel`和`PowerPoint`文件。这些文件需要您手动打开。\n\
    \n#### 识别何时有附件\n\n任何带有附件的电子邮件都会在发件人姓名旁边显示一个`回形针`图标，如右图所示。当您看到该图标时，即表示有附件。\n\n\
    ![图片](img/U1742.jpg)\n\n#### 接收自动打开的附件\n\n某些类型的电子邮件附件，如图片、Quicktime 影片和单页 PDF\
    \ 文件，通常会直接在邮件正文中为您打开并显示。\n\n（但是，如果您使用 3G 数据连接，则需要点击它们才能下载并显示。）\n\n![图片](img/U1743.jpg)\n\
    \n**提示：** 如果您想保存或复制自动打开的附件，只需长按它，直到出现弹出窗口。此时，您可以选择`拷贝`或`存储图像`。当您存储图像后，它会被放入`照片`应用的`相机胶卷`相簿中。\n\
    \n#### 手动打开电子邮件附件\n\n与我们刚才描述的会自动在邮件正文中打开的附件不同，其他类型的附件（如电子表格、文字处理文档和演示文稿文件）需要您手动打开。\n\
    \n##### 轻点以进入快速查看模式\n\n按以下步骤在快速查看模式下打开附件：\n\n1.  打开带有附件的邮件，如图 17-3 所示。\n2.  快速轻点附件，即可立即在快速查看模式中打开它。\n\
    3.  您可以在文档中导航。请记住，您可以放大或缩小，以及向上或向下滑动。\n4.  如果您打开了一个包含多个工作表或表格的电子表格，您会在顶部看到工作表标签。点击另一个标签即可打开该工作表。\n\
    5.  查看完附件后，轻点文档一次以调出控制项，然后点击左上角的`完成`。\n6.  如果您安装了可以打开当前查看附件类型（本例中为电子表格）的应用，您会在右上角看到一个`在...中打开`按钮。点击`在...中打开`按钮可在其他应用中打开此文件。\n\
    \n![图片](img/1703.jpg)\n\n**图 17-3.** *在快速查看模式下查看电子邮件附件。*\n\n##### 在其他应用中打开文档\n\
    \n您可能希望在其他应用中打开附件。例如，您可能想在`Numbers`中打开电子表格，在`iBooks`、`Stanza`或`GoodReader`中打开\
    \ PDF 文件。按以下步骤操作：\n\n1.  打开邮件。\n2.  长按附件，直到出现弹出窗口。\n3.  选择`在...中打开`或`在\"Numbers\"\
    中打开`选项。当附件格式与您设备上的应用匹配时，您可能会在`在...中打开`后面看到列出的特定应用，如本例中的`Numbers`。\n\n    ![图片](img/U1744.jpg)\n\
    \n4.  从列表中选择您要使用的应用程序。\n5.  最后，您可以编辑文档、保存它，并通过邮件将其回复给发件人。\n\n    ![图片](img/U1745.jpg)\n\
    \n##### 查看视频附件\n\n您可能会收到带有视频附件的电子邮件。某些类型的视频可以在您的 iPhone 上查看（有关支持格式的列表，请参阅本章后面的“支持的电子邮件附件类型”章节）。按以下步骤打开视频附件：\n\
    \n1.  点击视频附件以在视频播放器中打开并观看它。\n2.  观看完视频后，轻点屏幕以调出播放器控制项。\n3.  点击左上角的`完成`按钮以返回邮件。\n\
    \n    ![图片](img/U1746.jpg)\n\n**注：** 这是一张来自本书作者之一 Martin Trautschold 的视频教程的图片，该教程向您展示如何使用\
    \ iPhone。请在 Martin 的网站 [`www.madesimplelearning.com`](http://www.madesimplelearning.com)\
    \ 上查看一些免费的示例教程。\n"
- fmt: "# Opening and Viewing Compressed .zip Files\n\nYour iPhone will not be able\
    \ to open and view a compressed file in `.zip` format unless you install an app\
    \ such as `GoodReader`. At the time of publishing, `GoodReader` was still a free\
    \ app and well worth installing.\n\n**TIP:** Learn how to install and use `GoodReader`\
    \ it in [Chapter 14](#Chapter14.html#ch14): “Newsstand and More.”\n\nFollow these\
    \ steps to open a `.zip` file in the program:\n\n1. Install the free `GoodReader`\
    \ app from the App Store.\n2. Open up the email message with the `.zip` file attachment.\n\
    3. Touch and hold the `.zip` attachment until you see a pop-up at the bottom with\
    \ a button that says: `Open in “GoodReader.”` Tap that button to open the `.zip`\
    \ file in `GoodReader`.\n\n   ![images](images/U1747.jpg)\n\n4. `GoodReader` should\
    \ now open, and your `.zip` file should be at the top of the list of files. To\
    \ open or decompress the `.zip` file, tap it and select the `Unzip` button.\n\n\
    \   ![images](images/U1748.jpg)\n\n5. Now you should see the uncompressed file—in\
    \ this case, an Adobe `.pdf` file in the list of files above the `.zip` file.\n\
    6. Tap that uncompressed file to view it.\n\n   ![images](images/U1749.jpg)\n\n\
    7. When you are done reading the attachment, double-click your `Home` button and\
    \ tap the `Mail` icon to return to your reading your email.\n\n## Supported Email\
    \ Attachment Types\n\nYour iPhone supports the following file types as attachments:\n\
    \n*   `.doc` and `.docx` (`Microsoft Word` documents)\n*   `.htm` and `.html`\
    \ (web pages)\n*   `.key` (a `Keynote` presentation document)\n*   `.numbers`\
    \ (an `Apple Numbers` spreadsheet document)\n*   `.pages` (an `Apple Pages` document)\n\
    *   `.pdf` (Adobe's portable document format, used by programs such as `Adobe\
    \ Acrobat` and `Adobe Reader`)\n*   `.ppt` and `.pptx` (`Microsoft PowerPoint`\
    \ presentation documents)\n*   `.txt` (a text file)\n*   `.vcf` (a contact file)\n\
    *   `.xls` and `.xlsx` (`Microsoft Excel` spreadsheet documents)\n*   `.mp3` and\
    \ `.mov` (audio and video formats)\n*   `.zip` (compressed files): These are only\
    \ readable if you have an app installed that can read them, such as `GoodReader`—see\
    \ the “Opening and Viewing Compressed .zip Files” section earlier in this chapter.\n\
    \n# Replying, Forwarding, or Deleting a Message\n\nAt the bottom of your email\
    \ reading pane is a toolbar.\n\nFrom this toolbar, you can move the message to\
    \ a different mailbox or folder; delete it; or reply, reply all, or forward it.\n\
    \n![images](images/U1750.jpg)\n\nTouch the small `Arrow` icon ![images](images/U1751.jpg)\
    \ to see these option buttons appear: `Reply`, `Reply All`, and `Forward`.\n\n\
    **NOTE:** The `Reply All` button appears only if there was more than one recipient\
    \ for the email message.\n\n![images](images/U1752.jpg)\n\n## Replying to an Email\n\
    \nYou will probably use the `Reply` command most frequently. Follow these steps\
    \ to respond to an email on your iPhone:\n\n1. Touch the `Reply` button.\n\n \
    \  You will see that the original sender is now listed as the recipient in the\
    \ `To:` line of the email. The subject will automatically state: “Re: *(Original\
    \ subject line)*.”\n\n2. Type your response.\n3. When you are done, just touch\
    \ the blue `Send` button at the top-right corner of the screen.\n\n   ![images](images/U1753.jpg)\n\
    \n## Using Reply All\n\nUsing the `Reply All` option is just like using the `Reply`\
    \ function, except that all of the original recipients of the email and the original\
    \ sender are placed in the address lines. The original sender will be in the `To:`\
    \ line, while all other recipients of the original email will be listed on the\
    \ `Cc:` line. You will only see the `Reply All` option if more than one person\
    \ received the original email.\n\n**CAUTION:** Be careful when you use `Reply\
    \ All`. This can be dangerous if some of the recipients are not shown on the original\
    \ email because they stretch off the edge of the screen. If you do use `Reply\
    \ All`, then make sure you check the `To:` and `Cc:` lists to make sure everyone\
    \ should be receiving your reply.\n\n## Using the Forward Button\n\nSometimes,\
    \ you get an email that you want to send to someone else. The `Forward` command\
    \ will let you do that (see the “E-Mail Attachments” section in this chapter for\
    \ more about working with attachments).\n\n**NOTE:** You need to forward attachments\
    \ to send them to others. If you want to send someone an attachment from an email\
    \ you receive, you must choose the `Forward` option. (Note that choosing the `Reply`\
    \ and `Reply All` options will not include the original email attachment(s) in\
    \ your outgoing message.)\n\nWhen you touch the `Forward` button, you may be prompted\
    \ to address whether you want to `Include or Don't Include` the attachments from\
    \ the original message.\n\nAt this point, you follow the same steps described\
    \ previously to type your message, add addressees, and send it.\n\n# Cleaning\
    \ up and Organizing Your Inbox\n\nAs you get more comfortable with your iPhone\
    \ as an email device, you will increasingly find yourself using the `Mail` program.\
    \ It will eventually become necessary to occasionally do some email house cleaning.\
    \ You can delete or move email messages easily on your iPhone.\n\n## Deleting\
    \ a Single Message\n\nTo delete a single message from your inbox, follow these\
    \ steps:\n\n1. Swipe right or left on a message in the inbox to bring up the `Delete`\
    \ button.\n2. Tap `Delete` to remove the message.\n\n   ![images](images/U1754.jpg)\n\
    \n## Deleting, Moving or Marking Several Messages\n\nWe showed you earlier in\
    \ this chapter how to get this done in the “Move, Delete, or Mark (Flag) Multiple\
    \ Messages” section.\n\n## Deleting from the Message Viewing Screen\n\nThe `Message`\
    \ viewing screen includes another way to delete messages. Open any message to\
    \ read it and tap the `Trash Can` icon ![images](images/U1755.jpg) in the middle\
    \ of the bottom of the screen. You will see the email shrink and fly into the\
    \ `Trash Can`, so it can be deleted.\n\n**TIP:** You can use the `Settings` app\
    \ to make your iPhone ask you before deleting email. To do so, tap `Mail, Contacts,\
    \ Calendars` and set the switch next to `Ask Before Deleting` to `Yes`.\n\nYou\
    \ can organize your mail by moving it into other folders. Email messages can be\
    \ moved out of your inbox for storage or for reading at another time.\n\n**NOTE:**\
    \ If you are using iCloud or another supported email server, you can create, rename\
    \ or delete mail folders right on your device, see section “Adding or Editing\
    \ Email Folders or Mailboxes” earlier in this chapter. If this does not work for\
    \ you, then, you need to set them up in your main email account and sync them\
    \ to your iPhone. We will show you how to do this in this chapter's “Fine Tune\
    \ Your E-Mail Settings” section.\n\n## Moving an Email to a Folder While Viewing\
    \ It\n\nSometimes, you may want to organize your email for easy retrieval later.\
    \ For example, you might receive an email about an upcoming trip and want to move\
    \ it to the Travel folder. Sometimes you receive emails that require attention\
    \ later, in which case you can move them to the Requires Attention folder. This\
    \ can help you remember to work on such emails later.\n\nFollow these steps to\
    \ move an email message:\n\n1. Open the email message.\n2. Tap the `Move` icon\
    \ in the upper-right corner.\n3. Choose a new folder, and the message will be\
    \ moved out of the current inbox.\n\n   ![images](images/U1756.jpg)"
