- fmt: '### Using Siri (Your Personal Assistant)


    There are two ways to launch `Siri`, your personal digital assistant. First, you
    can press and hold the **Home** button. Alternatively, if your `iPhone` is on
    and you''ve enabled the feature in `Settings` (see [Chapter 7](#Chapter07.html#ch7):
    “Multitasking and Siri”), simply bring the device to your ear.


    ![images](images/p6-01.jpg)


    Your **Home** screen will slide up to reveal a silver **Microphone** icon. Wait
    for `Siri` to beep before you begin to speak, and then speak in a clear voice,
    at a moderate speed, just as you''d speak to another person. When you''re done
    speaking, wait for `Siri` to beep again. Then the fun begins.


    Apple recommends you talk to `Siri` the way you''d talk to another person. Don''t
    try to remember a set list of commands or queries—there are far too many types
    and variations. Instead, just ask for what you want. Here are some examples of
    what `Siri` can do for you:


    *   Set up reminders, calendar appointments, and clock alarms and timers.

    *   Send texts, iMessages, and emails.

    *   Play music.

    *   Search for location-based information like restaurant and business listings,
    and then search for directions to those (and other) locations.

    *   Respond to silly questions such as asking your iPhone to marry you!


    ![images](images/p6-02.jpg)


    The fun really begins when you combine these functions together into interactions.
    `Siri` can read a message requesting a dinner date, search for a restaurant, get
    directions, send back a confirmation message, and add an appointment for the dinner—all
    as part of an interactive confirmation. Check out [Chapter 7](#Chapter07.html#ch7):
    “Multitasking and Siri” for more details.


    ### Using Voice Dictation


    New to the `iPhone` Keyboard is a small **Microphone** button immediately to the
    left of the **Space Bar**.


    ![images](images/p7-01.jpg)


    Tap it and your screen will slide up to reveal a glowing, purple microphone. Speak
    to it as you would to `Siri`; and when you''re finished, tap the **Done** button.
    Everything you said will be transcribed and entered as text.


    While no text-to-speech engine is perfect, `Siri` does a pretty good job of transcribing
    what you said. If it makes any mistakes, just edit it as you would text you typed
    with the keyboard. Learn more in [Chapter 7](#Chapter07.html#ch7): “Multitasking
    and Siri.”


    ![images](images/p7-02.jpg)


    ### Music Controls and Portrait Screen Rotation Lock


    You will see a few more icons if you swipe from left to right in the **App Switcher**
    bar. You can lock the screen rotation by tapping the leftmost icon, and the middle
    buttons control the currently playing music or video. The last icon on the right
    will start your **Music** app (see [Figure 3](#Part1.html#p_1_3)).


    ![images](images/p8-01.jpg)


    **Figure 3.** *The **Screen Rotation Lock** button, **Music** app controls, and
    **Music** icon in the **App Switcher** bar*


    ### Starting Apps and Using Soft Keys


    Some apps have soft keys at the bottom of the screen, such as the **Music** app
    shown in [Figure 4](#Part1.html#p_1_4).


    To see and use the soft keys in the **Music** app, you must have some content
    (e.g., music, videos, and podcasts) on your iPhone. See [Chapter 3](#Chapter03.html#ch3):
    “Sync with iCloud. iTunes and More” for help with syncing your music, videos,
    and more to your iPhone. Follow these steps to launch the **Music** app and become
    familiar with using the soft keys to get around:


    1.  Tap the **Music** icon to start the **Music** app.

    2.  Touch the **Songs** soft key at the bottom to view your albums.

    3.  Touch the **Playlists** soft key to view a list of your artists.

    4.  Try all the soft keys in **Music**.

    5.  In some apps, such as the **Music** app, you will see the **More** soft key
    in the lower-right corner. Tap this key to see additional soft keys or even rearrange
    your soft keys.


    **TIP:** You know which soft key is selected because it is highlighted—usually
    with a color. The other soft keys are gray, but can still be touched.


    ![images](images/p9-01.jpg)


    **Figure 4.** *Working with soft keys in apps*


    ### Menus, Submenus, and Switches


    Once you are in an app, you can select any menu item by simply touching it. Using
    the **Settings** app as an example, tap **Sounds**, and then tap **Ringtone**,
    as shown in [Figure 5](#Part1.html#p_1_5).


    Submenus are any menus below the main menu.


    **TIP:** You know there is a submenu or another screen if you see the **Greater
    Than** symbol next to the menu item (`>`).


    How do you get back to the previous screen or menu? Tap the button in the top
    of the menu. If you''re in the **Ringtone** screen, for example, you simply touch
    the **Sounds** button.


    You''ll see a number of switches on the iPhone, such as the one next to **Airplane
    Mode** shown in [Figure 5](#Part1.html#p_1_5). To set a switch (e.g., change the
    switch from **OFF** to **ON**), just touch it.


    ![images](images/p10-01.jpg)


    **Figure 5.** *Selecting menu items, navigating submenus, and setting switches*


    ### Reading the Connectivity Status Icons


    Most of the functions on your iPhone work only when you are connected to the Internet
    (e.g., email, your browser, the App Store, and the **iTunes** app), so you need
    to know when you''re connected. Understanding how to read the status bar can save
    you time and frustration:


    **Cellular Data Signal Strength (1-5 bars):**


    Strong ![images](images/p10-02.jpg) Weak ![images](images/p10-03.jpg) Radio Off
    – Airplane Mode ![images](images/p10-04.jpg)


    **Wi-Fi Network Signal Strength (1-3 symbols):**


    **Strong ![images](images/p10-05.jpg) Weak ![images](images/p10-06.jpg) Off ![images](images/p10-07.jpg)**


    You can tell whether you are connected to a network, as well as the general speed
    of the connection, by looking at the left end of your iPhone''s **Top** status
    bar. [Table 1](#Part1.html#pt_1_1) shows typical examples of what you might see
    on this status bar.


    ![images](images/p11-01.jpg)


    [Chapter 4](#Chapter04.html#ch4): “Connect to the Network” shows you how to connect
    your iPhone to a Wi-Fi or 3G Cellular Data Network.


    ## Flying on an Airplane—Airplane Mode


    Often when you are flying on an airplane, the flight crew will ask you to turn
    off all portable electronic devices for takeoff and landing. Then, when you get
    to altitude, they will say “all approved electronic devices” can be turned back
    on.


    **TIP:** Check out the “International Travel” section of [Chapter 4](#Chapter04.html#ch4):
    “Connect to the Network” for many money saving tips you can take advantage of
    when you travel overseas with your iPhone.


    If you need to turn off your iPhone completely, press and hold the **Power** button
    on the top right edge, and then **Slide to Power Off** with your finger.


    Follow these steps to enable **Airplane Mode**:


    ![images](images/p12-01.jpg)


    1.  Tap the **Settings** icon.

    2.  Set the switch next to **Airplane Mode** in the top of the left column to
    **ON**.

    3.  Notice that the Wi-Fi is automatically turned **Off** and that the **Phone**
    will not work.


    **TIP:** Some airlines have in-flight Wi-Fi networks. On those flights, you may
    want to turn your Wi-Fi back **On** at the appropriate time.


    You can turn your Wi-Fi connection **Off** or **On** by following these steps:


    1.  Tap the **Settings** icon.

    2.  Tap **Wi-Fi** near the top of the screen.

    3.  To enable the Wi-Fi connections, set the switch next to **Wi-Fi** at the top
    of the page to **ON**.

    4.  To disable the Wi-Fi, set the same switch to **OFF**.

    5.  Select the Wi-Fi network and follow the steps the flight attendant provides
    to connect to in-flight Wi-Fi.


    ## Touch Screen Basics


    In this section, we will describe how to interact with the iPhone''s touch screen.'
  raw: '#### Using Siri (Your Personal Assistant)


    There are two ways to launch Siri, your personal digital assistant. First, you
    can press and hold the **Home** button. Alternatively, if your iPhone is on and
    you''ve enabled the feature in Settings (see [Chapter 7](#Chapter07.html#ch7):
    “Multitasking and Siri”), simply bring the device to your ear.


    ![images](images/p6-01.jpg)


    Your **Home** screen will slide up to reveal a silver **Microphone** icon. Wait
    for Siri to beep before you begin to speak, and then speak in a clear voice, at
    a moderate speed, just as you''d speak to another person. When you''re done speaking,
    wait for Siri to beep again. Then the fun begins.


    Apple recommends you talk to Siri the way you''d talk to another person. Don''t
    try to remember a set list of commands or queries—there are far too many types
    and variations. Instead, just ask for what you want. Here are some examples of
    what Siri can do for you:


    *   Set up reminders, calendar appointments, and clock alarms and timers.

    *   Send texts, iMessages, and emails.

    *   Play music.

    *   Search for location-based information like restaurant and business listings,
    and then search for directions to those (and other) locations.

    *   Respond to silly questions such as asking your iPhone to marry you!


    ![images](images/p6-02.jpg)


    The fun really begins when you combine these functions together into interactions.
    Siri can read a message requesting a dinner date, search for a restaurant, get
    directions, send back a confirmation message, and add an appointment for the dinner—all
    as part of an interactive confirmation. Check out [Chapter 7](#Chapter07.html#ch7):
    “Multitasking and Siri” for more details.


    #### Using Voice Dictation


    New to the iPhone Keyboard is a small **Microphone** button immediately to the
    left of the **Space Bar**.


    ![images](images/p7-01.jpg)


    Tap it and your screen will slide up to reveal a glowing, purple microphone. Speak
    to it as you would to Siri; and when you''re finished, tap the **Done** button.
    Everything you said will be transcribed and entered as text.


    While no text-to-speech engine is perfect, Siri does a pretty good job of transcribing
    what you said. If it makes any mistakes, just edit it as you would text you typed
    with the keyboard. Learn more in [Chapter 7](#Chapter07.html#ch7): “Multitasking
    and Siri.”


    ![images](images/p7-02.jpg)


    #### Music Controls and Portrait Screen Rotation Lock


    You will see a few more icons if you swipe from left to right in the **App Switcher**
    bar. You can lock the screen rotation by tapping the leftmost icon, and the middle
    buttons control the currently playing music or video. The last icon on the right
    will start your **Music** app (see [Figure 3](#Part1.html#p_1_3)).


    ![images](images/p8-01.jpg)


    **Figure 3.** *The **Screen Rotation Lock** button, **Music** app controls, and
    **Music** icon in the **App Switcher** bar*


    #### Starting Apps and Using Soft Keys


    Some apps have soft keys at the bottom of the screen, such as the **Music** app
    shown in [Figure 4](#Part1.html#p_1_4).


    To see and use the soft keys in the **Music** app, you must have some content
    (e.g., music, videos, and podcasts) on your iPhone. See [Chapter 3](#Chapter03.html#ch3):
    “Sync with iCloud. iTunes and More” for help with syncing your music, videos,
    and more to your iPhone. Follow these steps to launch the **Music** app and become
    familiar with using the soft keys to get around:


    1.  Tap the **Music** icon to start the **Music** app.

    2.  Touch the **Songs** soft key at the bottom to view your albums.

    3.  Touch the **Playlists** soft key to view a list of your artists.

    4.  Try all the soft keys in **Music.**

    5.  In some apps, such as the **Music** app, you will see the **More** soft key
    in the lower-right corner. Tap this key to see additional soft keys or even rearrange
    your soft keys.


    **TIP:** You know which soft key is selected because it is highlighted—usually
    with a color. The other soft keys are gray, but can still be touched.


    ![images](images/p9-01.jpg)


    **Figure 4.** *Working with soft keys in apps*


    #### Menus, Submenus, and Switches


    Once you are in an app, you can select any menu item by simply touching it. Using
    the **Settings** app as an example, tap **Sounds**, and then tap **Ringtone**,
    as shown in [Figure 5](#Part1.html#p_1_5).


    Submenus are any menus below the main menu.


    **TIP:** You know there is a submenu or another screen if you see the **Greater
    Than** symbol next to the menu item (**>**).


    How do you get back to the previous screen or menu? Tap the button in the top
    of the menu. If you''re in the **Ringtone** screen, for example, you simply touch
    the **Sounds** button.


    You''ll see a number of switches on the iPhone, such as the one next to **Airplane
    Mode** shown in [Figure 5](#Part1.html#p_1_5). To set a switch (e.g., change the
    switch from **OFF** to **ON**), just touch it.


    ![images](images/p10-01.jpg)


    **Figure 5.** *Selecting menu items, navigating submenus, and setting switches*


    #### Reading the Connectivity Status Icons


    Most of the functions on your iPhone work only when you are connected to the Internet
    (e.g., email, your browser, the App Store, and the **iTunes** app), so you need
    to know when you''re connected. Understanding how to read the status bar can save
    you time and frustration:


    **Cellular Data Signal Strength (1-5 bars):**


    Strong ![images](images/p10-02.jpg) Weak ![images](images/p10-03.jpg) Radio Off
    – Airplane Mode ![images](images/p10-04.jpg)


    **Wi-Fi Network Signal Strength (1-3 symbols):**


    **Strong ![images](images/p10-05.jpg) Weak ![images](images/p10-06.jpg) Off ![images](images/p10-07.jpg)**


    You can tell whether you are connected to a network, as well as the general speed
    of the connection, by looking at the left end of your iPhone''s **Top** status
    bar. [Table 1](#Part1.html#pt_1_1) shows typical examples of what you might see
    on this status bar.


    ![images](images/p11-01.jpg)


    [Chapter 4](#Chapter04.html#ch4): “Connect to the Network” shows you how to connect
    your iPhone to a Wi-Fi or 3G Cellular Data Network.


