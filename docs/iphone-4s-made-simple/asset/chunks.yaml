  trans: '

    ### 查找要下载的 App


    如果你想搜索要下载的 App，先从默认视图开始浏览，该视图会显示**精选**（Featured）App。向下滚动页面即可查看所有精选 App。


    **注意：** 与 iTunes Store 一样，在 3G 网络下，你只能下载小于 20MB 的 App。下载更大的文件需要连接 Wi-Fi。


    #### 查看最新 App


    App Store 的默认视图会显示最新和精选的 App。这正是图 23–2 所展示的视图。你可以判断出此视图显示的是最新精选 App，因为屏幕底部的**精选**（Featured）功能键（`images/U2303.jpg`）处于高亮状态，且页面顶部的**最新**（New）按钮（`images/U2304.jpg`）处于按下状态。


    #### 查看热门 App


    点击屏幕顶部的**热门**（What''s Hot）按钮，商店中“最热门”的 App 便会显示在屏幕上。同样，只需滚动浏览最热门的 App，看看是否有让你眼前一亮的。


    **注意：** 一个 App 出现在“热门”分类中，并不一定意味着你也会觉得它有用或有趣。在购买任何 App 之前，请仔细查看其描述和用户评价。


    `images/U2305.jpg`


    #### 天才推荐


    **精选** App 版块顶部的第三个按钮可将你带到**天才推荐**（Genius）功能。此功能的运作方式与 **iTunes** App 中用于在电脑上播放音乐的、同名功能类似。例如，它会根据你
    iPhone 上已安装的 App，为你推荐你可能喜欢的其他 App。


    **注意：** 首次使用天才推荐功能时，你需要先接受出现的条款与条件，之后该功能才会启用。


    `images/U2306.jpg`


    ##### 基于


    请注意，每个推荐 App 上方都有一个**基于（*App 名称*）**的标签。此标签表明，推荐给你的这个 App 是基于你 iPhone 上已安装的某个特定
    App。例如，推荐 **CBS Radio** 是因为已安装了 **Pandora Radio**。我们之前并不知道 CBS Radio，但基于这个推荐，或许会尝试一下。


    `images/U2307.jpg`


    ##### 滑动删除


    如果你不喜欢某个天才推荐，可以向左或向右滑动它，即可调出**删除**（Delete）按钮，操作方式与你在 iPhone 上从列表中删除电子邮件或其他项目一样。点击**删除**按钮即可将该
    App 从列表中移除。


    `images/U2308.jpg`


    ##### 禁用天才推荐功能


    要禁用天才推荐功能，你需要进入 **App Store** 的设置（请参阅本章后面的“App Store 设置”一节，了解如何禁用此功能）。


    `images/U2309.jpg`


    #### 分类


    `images/U2310.jpg`


    有时候，眼前所有的选择可能会让人有点不知所措。如果你大致清楚自己在寻找哪种类型的 App，请点击底部功能键行中的**分类**（Categories）按钮（参见图
    23–4）。


    当前可用的分类显示在表 23–1 中。


    `images/t2301.jpg`


    **注意：** 所列出的分类是动态变化且随时可能更改的，因此当你读到这本书时，你所看到的分类可能已经发生了变化。


    `images/2304.jpg`


    **图 23–4.** *按分类查看 App——本例中为**游戏**（Games）*


    #### 查看 25 强排行榜


    `images/U2311.jpg`


    点击底部功能键行中的**排行榜**（Top Charts）功能键，App Store 将再次切换视图。这次，你将看到付费、免费和收入最高的前 25 名 App。只需点击顶部的**付费排行榜**（Top
    Paid）、**免费排行榜**（Top Free）或**收入榜**（Top Grossing）按钮，即可在不同视图间切换。


    **注意：** **收入榜**（Top Grossing）分类指的是赚钱最多的 App，即销量乘以售价。此视图有助于价格较高的 App 在排行榜上获得更高排名。例如，一个售价
    4.99 美元的 App 销量为 10,000 份，其在**收入榜**上的排名将远高于一个销量相同但售价仅 0.99 美元的 App。


    `images/U2312.jpg`


    #### 搜索 App


    `images/U2313.jpg`


    假设你对自己想要寻找的 App 类型有明确的想法。点击**搜索**（Search）功能键，然后输入程序名称或程序类型。


    因此，如果你正在寻找一个帮助划船的 App，只需输入“rowing（划船）”看看会出现什么结果。


    你可能会看到一些建议的搜索词出现；点击这些词可以缩小搜索范围。


    `images/U2314.jpg`


    在建议的搜索词中点击 **Rowing Stats** 只会得到一个结果。


    `images/U2315.jpg`


    我们想查看所有与划船相关的 App，因此我们点击**搜索**（Search）栏，使用**退格键**（Backspace）擦除“stats”这个词。接着，点击右下角的**搜索**（Search）按钮，查看更广泛的划船相关结果列表。


    **提示：** 如果你是在水面上划船（而不仅仅是在划船机上），你可能会想了解一下 **SpeedCoach Mobile**，售价 49.99 美元。还有一个名为
    **iRowPro** 的免费替代品（在撰写本文时）。


    `images/U2316.jpg`


    ### 下载 App


    一旦找到你想要的 App，你就可以直接将其下载到你的 iPhone 上，如图 23–5 所示。


    `images/U2317.jpg`


    在找到你想购买的 App 后，请注意标有**免费**（Free）或 **$0.99**（或其他价格）的小按钮。


    只需点击那个按钮，如果是免费程序，它会变成**安装**（Install）；如果是付费程序，则会变成**立即购买**（Buy Now）。


    `images/2305.jpg`


    **图 23–5.** *购买付费 App 或下载免费 App*


    在你阅读完评论和 App 描述（或许还访问了开发者支持网站）之后，就可以继续下载或购买该 App 了。点击**下载 App**（Download App）按钮后，系统会提示你输入
    iTunes 密码。


    输入你的密码并点击**好**（OK）；该 App 将被下载到你的 iPhone。


    #### 寻找免费或打折的 App


    浏览一段时间后，你会发现 App Store 的几个特点。首先，这里有很多**免费**的 App。有时，这些都是很棒的应用程序。其他时候，它们可能不太有用——但仍然可能很有趣！


    其次，你会发现有些 App 会打折，而另一些 App 则会随着时间的推移变得便宜。如果你有一个喜欢的 App，今天售价 6.99 美元，如果你等几周或一个月再买，可能会看到它的价格下降。


    ### 兑换礼品卡或 iTunes 兑换码


    你可以通过滚动到 **App Store** 大多数页面的最底部来兑换礼品卡或 iTunes 兑换码。


    在底部，点击**兑换**（Redeem）按钮。


    `images/U2318.jpg`


    在下一个屏幕输入你的兑换码。（你可能需要刮开礼品卡背面的涂层才能看到兑换码。）


    点击**兑换**（Redeem）按钮。


    `images/U2319.jpg`

