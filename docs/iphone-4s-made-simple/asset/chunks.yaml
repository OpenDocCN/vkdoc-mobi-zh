  trans: "\n### 在 iPhone 上调整声音\n\n你可以精细调整 iPhone，使其在特定事件（如来电、新邮件或日历提醒）发生时发出或不发出声音。你还可以自定义发送邮件或键盘打字时的效果。\n\
    \n请按照以下步骤调整 iPhone 上播放的声音：\n\n1.  轻点`设置`图标。\n2.  轻点`声音`。\n\n    ![images](img/U0809.jpg)\n\
    \n3.  你可以调整 iPhone 在`静音`和`铃声`模式下是否振动。将`振动`旁边的开关设置为`打开`或`关闭`。\n4.  要调整铃声和其他提醒的音量，请移动`铃声`上方的滑块。\n\
    5.  要更改手机铃声或短信铃声；接收新邮件、推文、日历提醒或提醒事项时播放的声音；或已发送邮件完成时播放的声音——请轻点你想要更改的项目。\n6.  此屏幕允许你选择新的铃声。轻点任一铃声即可播放并选中它。（你可以通过名称旁边的复选标记来判断铃声是否被选中。右侧图片中已选中`钟楼`。）\n\
    \n    ![images](img/U0810.jpg)\n\n7.  如果没有你喜欢的铃声，可以轻点`购买更多铃声`，进入 iTunes 铃声商店，在那里你可以购买一些喜爱的歌曲作为铃声。\n\
    8.  完成后，轻点左上角的`声音`按钮。\n9.  使用相同的步骤更改短信铃声、新邮件、推文等的声音。\n\n    **提示：** 请参阅第 9 章：“使用电话”了解自定义铃声。\n\
    \n10.  在除`铃声`之外的所有声音类别中，你可以通过选择列表顶部的`无`来关闭播放的声音。\n\n    ![images](img/U0811.jpg)\n\
    \n11.  `锁定声`和`键盘点击声`可通过轻点开关将其设置为`打开`或`关闭`来调整。完成后，按下`主屏幕`按钮退出。\n\n    ![images](img/U0812.jpg)\n\
    \n**提示：** 另外，你可以锁定`音乐`应用的最大可播放音量。方法是进入`设置` ![images](img/U001.jpg) `音乐` ![images](img/U001.jpg)\
    \ `音量限制` ![images](img/U001.jpg) `锁定音量限制`。我们在第 12 章：“播放音乐”中展示了如何操作。\n\n### 键盘选项\n\
    \n你可以通过选择多种语言以及更改`自动纠正`和`自动大写`等设置来精细调整键盘。你甚至可以让 iPhone 在你打字时读出自动纠正建议。请参阅第 2 章：“输入、复制和搜索”，了解各种键盘选项及其使用方法。\n\
    \n### 使用密码保护 iPhone\n\n你的 iPhone 可以存储大量有价值的信息。如果你用它来保存家庭成员的社会安全号码和出生日期等信息，情况尤其如此。确保任何拿起你\
    \ iPhone 的人都无法访问所有这些信息，这是个好主意。此外，如果你的孩子像我们的孩子一样，他们可能会拿起你酷炫的 iPhone 开始上网或玩游戏。你可能希望启用一些安全限制来保护他们。\n\
    \n#### 设置简单的四位数字密码\n\n在你的 iPhone 上，你可以选择设置一个四位数字密码，以防止未经授权访问你的 iPhone 和信息。然而，如果输入了错误的密码，即使是你也无法访问你的信息，因此最好使用一个你容易记住的密码。\n\
    \n请按照以下步骤设置密码来锁定你的 iPhone：\n\n1.  轻点`设置`图标。\n\n    ![images](img/U0813.jpg)\n\n\
    2.  轻点`通用`。\n3.  向下滚动并轻点`密码锁定`。\n4.  轻点`开启密码`以设置密码。\n5.  默认密码是一个简单的四位数字密码。使用键盘输入一个四位数字代码。系统会提示你再次输入代码。\n\
    \n    ![images](img/U0814.jpg)\n\n#### 设置更复杂的密码\n\n如果你希望使用比四位数字更复杂的密码，可以通过将`密码锁定`屏幕上的`简单密码`选项设置为`关闭`来实现。\n\
    \n![images](img/U0815.jpg)\n\n然后你将能够输入包含字母、数字甚至符号的新密码。\n\n**警告：** 请小心！如果你忘记密码，将无法解锁你的\
    \ iPhone。\n\n#### 调整你的密码选项\n\n设置好密码后，你将看到以下几个选项：\n\n![images](img/U0816.jpg)\n\
    \n*   `关闭密码`\n*   `更改密码`\n*   `需要密码`（`立即`、`1 分钟后`、`5 分钟后`、`15 分钟后`、`1 小时后`）\n\
    *   `简单密码`（`打开` = 四位数字；`关闭` = 任意字母、数字或符号）\n*   `Siri`（`打开` = 允许无需输入密码即可使用 Siri；`关闭`\
    \ = 阻止使用 Siri，直到输入密码）\n*   `抹掉数据`（`打开` = 在十次错误密码尝试后抹掉所有数据；`关闭` = 不抹掉数据）\n\n**警告：**\
    \ 如果你有年幼的孩子喜欢在 iPhone 从`睡眠`模式唤醒后猛敲安全键盘试图解锁，你可能希望将`抹掉数据`设置为`关闭`。否则，你的 iPhone 可能会被抹掉。\n\
    \n**注意：** 为`需要密码`设置较短时间更安全。将时间设置为`立即`（默认值）是最安全的。然而，使用`1 分钟`的设置可以避免你意外锁定 iPhone\
    \ 时重新输入密码的麻烦。\n\n### 设置限制\n\n你可能决定不希望孩子在你的 iPhone 上听包含露骨歌词的音乐。你可能还想阻止他们访问 YouTube\
    \ 或任何其他网站。在你的 iPhone 上设置此类限制相当容易。\n\n#### 限制应用\n\n请按照以下步骤限制对 iPhone 内容的访问：\n\n\
    ![images](img/U0817.jpg)\n\n1.  在`设置`应用中轻点`通用`。\n2.  向下滚动页面并轻点`访问限制`。\n3.  轻点`启用访问限制`按钮。\n\
    4.  系统将提示你输入一个访问限制密码——只需选择一个你记得住的四位数字代码即可。\n\n**注意：** 此访问限制密码与你的主 iPhone 密码是分开的。你可以将其设置为相同，这样更容易记住。然而，如果你让家人知道主密码，但又不想让他们调整限制，这可能会造成问题。稍后你需要输入此访问限制密码才能关闭限制。\n\
    \n![images](img/U0818.jpg)\n\n请注意，你可以调整是否允许某些应用或功能运行。例如，右侧的屏幕截图允许你调整以下应用的访问限制：`Safari`、`YouTube`、`相机`、`FaceTime`、`iTunes`\
    \ 和 `Ping`。此屏幕还允许你限制访问`安装应用`或`删除应用以及 Siri 和 Siri 中的露骨语言`。最后，你可以限制对`定位`和`账户`进行更改的能力。\n\
    \n![images](img/U0819.jpg)\n\n在所有情况下，`关闭` = 已限制。\n\n你可能会认为`打开`表示某些内容被限制，但事实恰恰相反。要禁用或限制某内容，你需要触摸其旁边的滑块并将其更改为`关闭`。如果你注意到所有选项上方都有`允许`字样，那么这就说得通了。\n\
    \n**注意：** 你限制的任何应用的图标都会消失。因此，如果你限制了对`YouTube`、`App Store` 和 `FaceTime` 应用的访问，那么`YouTube`\
    \ 和 `App Store` 图标将从`主屏幕`消失，并且你的 iPhone 的 `FaceTime` 图标也将被移除。\n"
- fmt: "### Allowing Changes\n\nSometimes you don't want to turn off access to an\
    \ app completely, but simply stop anyone from making unintended changes. For example,\
    \ the **Location** option comes with a lot of privacy concerns, so you may want\
    \ to exercise more granular control over which apps and functions have access\
    \ to it. Follow these steps to adjust restrictions for the **Location** option:\n\
    \n![images](images/U0820.jpg)\n\n1. Go to the **Restrictions** screen, as described\
    \ in the previous section.\n2. Scroll down to the bottom to see all of the **Allow\
    \ Changes** settings.\n3. Tap **Location**.\n4. Tap **Allow Changes** to make\
    \ changes to **Location Settings**.\n5. Toggle **Location Services** to **OFF**\
    \ to completely prevent your iPhone from using your location. (Note that this\
    \ may greatly reduce the convenience of apps like **Google Maps** and prevent\
    \ turn-by-turn navigation apps from working at all.)\n6. Toggle to **OFF** any\
    \ individual apps that you don't want tracking your location. (For example, set\
    \ **Location Services** for your **Camera** app to **OFF** to prevent GPS coordinates\
    \ from being included on pictures you intend to share publicly on the Internet.)\n\
    7. Tap **System Services** to change the **Location** permissions for built-in\
    \ processes.\n8. If there are any system services that you don't want to use location\
    \ data, then toggle them to **OFF**. Options include **Cell Network Search**,\
    \ **Compass Calibration**, **Diagnostics & Usage**, **Location-Based iAds**, **Setting\
    \ Time Zone**, and **Traffic**.\n\n   ![images](images/U0821.jpg)\n\n9. Tap **Location**\
    \ at the top left to go back when you're done.\n10. If you want to prevent any\
    \ future changes to **Location Services**, tap **Don't Allow Changes**.\n11. Tap\
    \ **Restrictions** to go back when you're done.\n12. Tap **Accounts** and tap\
    \ **Don't Allow Changes** to prevent any future changes to your **Mail**, **Calendar**,\
    \ and **Contact** accounts.\n13. Tap **Restrictions** to go back when you're done.\n\
    \n### Restricting Content\n\nIn addition to setting restrictions for apps, you\
    \ can set restrictions for content that can be downloaded and viewed on your iPhone.\
    \ Follow these steps if you might give your iPhone to a child, and you don't want\
    \ her to have the ability to download music with explicit lyrics or watch movies\
    \ with adult content:\n\n1. Go to the **Restrictions** screen, as described in\
    \ the previous section.\n\n   ![images](images/U0822.jpg)\n\n2. Scroll down to\
    \ the bottom to see all of the **Allowed Content** settings.\n3. To restrict content\
    \ purchased while inside an app, set **In-App Purchases** to **OFF**. This will\
    \ include music and videos purchased from the **iTunes** app.\n4. If you have\
    \ small children and worry about them making expensive in-app purchases after\
    \ you download a new app (e.g., you don't want them to buy **Smurfberries** in\
    \ the **Smurfs** app), then tap **Require Password** and change that setting to\
    \ **Immediately**.\n5. Tap **Ratings For** to adjust the ratings based on the\
    \ country where you live. An extensive list of countries are currently supported,\
    \ including Australia, Austria, Canada, France, Germany, Ireland, Japan, New Zealand,\
    \ the United Kingdom, and the United States.\n6. Tap **Music & Podcasts** to restrict\
    \ access to lyrics with explicit content. Make sure you set the **Explicit** option\
    \ to **OFF**, as shown in the figure to the right.\n\n   ![images](images/U0823.jpg)\n\
    \n7. Tap the **Restrictions** button in the upper-left corner to return to the\
    \ list of options.\n8. You can also set the ratings cutoff for **Movies**, **TV\
    \ Shows**, and **Apps** by tapping each item.\n\n   ![images](images/U0824.jpg)\n\
    \n9. When you tap an item such as **Movies**, you see a list of allowed ratings.\
    \ Tap the highest rating level you want to allow. In this image, we tapped **PG-13**.\
    \ All movies rated above this (**R** and **NC-17**) are not allowed. The red text\
    \ and lack of checkmarks offer visual clues as to which selections are blocked.\n\
    10. Tap **TV Shows** to set those restrictions. Again, tap the highest rating\
    \ you want to allow. The checkmarks show allowed ratings; the red text shows which\
    \ ratings are not allowed. In this example, **TV-Y**, **TV-Y7**, and **TV-G**\
    \ are allowed, but higher ratings are not allowed (i.e., **TV-PG**, **TV-14**,\
    \ and **TV-MA**).\n\n    ![images](images/U0825.jpg)\n\n11. Tap **Apps** to set\
    \ restrictions for various apps.\n\n    ![images](images/U0826.jpg)\n\n12. In\
    \ this screen, we are allowing apps with ratings of **4+**, **9+**, and **12+**\
    \ to be played. Apps with ratings of **17+** cannot be played or downloaded.\n\
    13. Tap the **Restrictions** button in the upper-left corner to return to the\
    \ list of options.\n14. Finally, tap the **Home** button to save your settings.\n\
    \n### Restricting Game Center\n\nGame Center is a great way to enjoy social gaming,\
    \ including match making, challenges, leaderboards, and more. However, if you're\
    \ a parent with young children, you may not be comfortable with them playing multiplayer\
    \ games or accepting friend requests without your supervision. Follow these steps\
    \ to restrict access to Game Center:\n\n1. Go to the **Restrictions** screen,\
    \ as described in the previous section.\n\n   ![images](images/U0827.jpg)\n\n\
    2. Scroll down to **Game Center**.\n3. Toggle to **OFF** the **Multiplayer Games**\
    \ and/or **Adding Friends** options.\n\n## Chapter 9\n\n## Using Your Phone\n\n\
    The iPhone is capable of so many cool things that it's easy to forget that it's\
    \ also a very powerful phone. In this chapter, we will cover the many features\
    \ you would expect to find on a high-end smartphone. We'll begin with the basics,\
    \ showing you how to dial by name, save time by using your recent call logs, dial\
    \ by voice, and use voicemail.\n\n![images](images/U0901.jpg)\n\nNext, we'll explore\
    \ the more advanced capabilities of the iPhone's Phone features. For example,\
    \ we'll show you how to handle multiple callers and set up conference calls. And\
    \ finally, we'll show you how to create new custom ringtones from your music library\
    \ and set separate ringtones for individual callers.\n\n### Getting Started with\
    \ the Phone Features\n\nThe iPhone initially places the **Phone** icon on your\
    \ Bottom Dock. You can move it around or off your dock by using the steps described\
    \ in [Chapter 6](#Chapter06.html#ch6): “Icons and Folders.”\n\n![images](images/U0902.jpg)\n\
    \n#### Finding Your Phone Number\n\nMaybe you just received your new iPhone and\
    \ you don't yet know your phone number. Don't worry; you can find your number\
    \ in the **Settings** app. Tap the **Settings** icon, and then scroll down and\
    \ tap **Phone**. Your number is listed at the top.\n\n![images](images/U0903.jpg)\n\
    \n#### Using the iPhone Headset\n\nIf you are in one of the many states or provinces\
    \ where you cannot legally hold your iPhone while driving a car, you will want\
    \ to use the headphones or a Bluetooth car stereo connection to talk hands-free.\n\
    \n![images](images/U0904.jpg)\n\nThe headset you received with your iPhone works\
    \ well for phone calls. There is a microphone built into the wire of the headset,\
    \ along with volume controls and a **Center** button that allows you to answer\
    \ or hang up a phone call. When you have your headset on, the phone will ring\
    \ in the headset. Click the **Center** button on the headset once to answer, and\
    \ then click it again to hang up.\n\n#### Connecting to a Bluetooth Headset or\
    \ Car Stereo\n\nYou can also connect to a Bluetooth headset or Bluetooth car stereo\
    \ system to place and receive phone calls. We show you the detailed steps in [Chapter\
    \ 5](#Chapter05.html#ch5): “AirPlay and Bluetooth.”"
