    \ into a green **Download** button. Touch **Download** and an animated icon jumps\
    \ into your **Downloads** icon at the bottom bar of soft keys. A small number\
    \ displayed in red reflects the number of files downloading.\n\n![images](images/U2224.jpg)\n\
    \n#### The Download Icon: Stopping and Deleting Downloads\n\nAs you download items,\
    \ they appear in your **Downloads** screen. This behavior is just like the behavior\
    \ of the **iTunes** app on your computer.\n\nYou can tap the **More** soft key\
    \ and then tap the **Downloads** tab to see the progress of all your downloads.\n\
    \n![images](images/U2225.jpg)\n\n#### Where the Downloads Go\n\nYou can see all\
    \ of your downloads in either your **Music** or **Videos** apps by clicking the\
    \ **More** icon, which shows your downloads organized by category. In other words,\
    \ if you download a podcast, you will need to go into your **Music** app, touch\
    \ **More**, and then the **Podcasts** tab to see the downloaded podcast.\n\nSometimes,\
    \ you decide that you do not want the all downloads you selected. If you want\
    \ to stop a download and delete it, swipe your finger over the download to bring\
    \ up the **Delete** button, and then tap **Delete** (see [Figure 22–3](#Chapter22.html#fig_22_3)).\n\
    \n![images](images/2203.jpg)\n\n**Figure 22–3.** *Deleting a file while downloading\
    \ it*\n\n### Redeeming an iTunes Gift Card\n\nOne of the cool things about the\
    \ **iTunes** app on your iPhone is that, just as with the **iTunes** app on your\
    \ computer, you can redeem a gift card and receive credit in your iTunes account\
    \ for your purchases.\n\nAt the bottom of the **iTunes** screen, you should see\
    \ the **Redeem** button (see [Figure 22–4](#Chapter22.html#fig_22_4)).\n\n![images](images/2204.jpg)\n\
    \n**Figure 22–4.** *Redeeming an iTunes gift card*\n\nTap the **Redeem** button\
    \ to start the process of entering your iTunes gift card number for an iTunes\
    \ store credit."
  trans: "\n### 下载以供离线查看\n\n如果你知道自己将要一段时间没有无线网络覆盖，例如在飞机上或地铁里，你会希望将内容下载下来，以便离线后再观看或收听。点击\
    \ `免费` 按钮，它变成 `下载` 按钮，然后再次点击它。接着，你可以通过点击屏幕右下角的 `下载` 按钮来监控下载进度（一些较大的视频文件可能需要十分钟或更长时间才能完成）。下载完成后，该项目会出现在你的“音乐”或“视频”应用中相应的区域。\n\
    \n**注意：** 任何大于 20MB 的文件都无法通过 3G 网络下载；对于较大的文件，你必须使用无线局域网。\n\n### 搜索 iTunes\n\n\
    有时候你很清楚自己想要什么，但不确定它在哪里，或者你不想浏览或翻遍所有菜单。`搜索` 工具就是为你准备的。\n\n在 `iTunes` 应用的右上角（几乎与所有其他\
    \ iPhone 应用一样），有一个 `搜索` 窗口。\n\n触摸 `搜索`，`搜索` 窗口和设备键盘会弹出。一旦你开始输入，iPhone 就会开始将你的输入内容与可能的匹配项进行对照。\n\
    \n![图片](img/U2215.jpg)\n\n输入你正在搜索的艺术家、歌曲名称、视频名称、播客名称或专辑，iPhone 会显示详细的匹配结果。你可以搜索得泛泛，也可以搜索得非常具体。如果你只是想浏览某位艺术家的所有特定歌曲，请输入艺术家的名字。如果你想要某首特定的歌曲或专辑，请输入歌曲或专辑的全名。\n\
    \n当你找到歌曲或专辑的名称时，只需触摸它，你就会被带到购买页面。\n\n### 购买或租借音乐、视频、播客等\n\n一旦你找到一首歌、视频、电视节目或专辑，你可以点击\
    \ `购买` 按钮，或者（如果看到的话）`租借` 按钮。这将使你的媒体开始下载。（如果内容是免费的，那么你会看到 `免费` 按钮，点击后它会变成 `下载`\
    \ 按钮。）\n\n我们建议你先试听或观看预览，并查看客户评论，除非你十分确定要购买该项目。\n\n**注意：** 你还可以从 iTunes 商店为你的手机购买*铃声*。请务必查看第\
    \ 9 章：“使用电话”，我们在那里展示了如何免费创建你自己的铃声！\n\n#### 预览音乐\n\n点击歌曲标题或其左侧的音轨序号；这会将专辑封面翻转过来并启动预览窗口。\n\
    \n你将听到一段 90 秒的代表性歌曲片段。\n\n点击 `停止` 按钮，音轨序号将再次显示。\n\n![图片](img/U2216.jpg)\n\n####\
    \ 查看客户评论\n\niTunes 中的许多项目都提供客户评论。评论从最低的一星到最高的五星不等。\n\n**警告：** *请注意，评论中可能包含不文明语言。*\
    \ 很多评论是干净的；然而，有些确实包含不文明语言，而 iTunes 商店可能不会立即察觉。\n\n阅读评论可以让你很好地了解自己是否喜欢并想购买这个项目。\n\
    \n![图片](img/U2217.jpg)\n\n#### 预览视频、电视节目或音乐视频\n\niTunes 上几乎所有东西都提供预览。有时你会看到一个\
    \ `预览` 按钮，例如音乐视频和电影。电视节目则有些不同；你需要点击剧集标题才能看到 30 秒的预览。\n\n我们强烈建议在 iTunes 上购买项目之前，先查看评论并尝试预览。\n\
    \n典型的电影预告片或预告片会超过 30 秒。有些长达两分半钟或更久。\n\n![图片](img/U2218.jpg)\n\n#### 购买歌曲、视频或其他项目\n\
    \n一旦你确定要购买一首歌、视频或其他项目，请按照以下步骤进行购买：\n\n1. 点击歌曲的 `价格` 按钮或 `购买` 按钮。\n2. 按钮会改变并变成一个绿色的\
    \ `立即购买`、`购买歌曲`、`购买单曲` 或 `购买专辑` 按钮。\n3. 点击 `购买` 按钮。\n\n    ![图片](img/U2219.jpg)\n\
    \n4. 你会看到一个动画图标跳入购物车。输入你的 iTunes 密码，然后点击 `好` 来完成购买。\n\n![图片](img/U2220.jpg)\n\n\
    点击 `更多` 按钮，然后点击 `下载` 来查看专辑中每首歌的下载进度。\n\n然后，这首歌或专辑就会成为你音乐库的一部分，并在你下次将 iPhone 连接到电脑上的\
    \ iTunes 时与电脑同步。注意：iCloud 会自动完成此同步。\n\n下载完成后，你会在你的“音乐”应用中相应的分类里看到新的歌曲、有声书、播客或\
    \ iTunes U 播客。\n\n![图片](img/U2221.jpg)\n\n**注意：** 购买的视频和 iTunes U 视频会进入你 iPhone\
    \ 上的“视频”应用，而播客则会显示在“音乐”应用中。\n\n### iTunes 中的播客\n\n播客通常是一系列音频片段；这些可能会频繁更新（例如国家公共广播电台的每小时新闻播报），或者根本不更新（例如关于特定主题的一次性讲座录音）。\n\
    \n![图片](img/U2222.jpg)\n\n![图片](img/U2223.jpg)\n\n你可以点击顶部三个按钮来浏览 iTunes 中的播客分类：\n\
    \n-   `热门`\n-   `十佳`\n-   `分类`\n\n#### 下载播客\n\n播客有视频和音频两种形式。当你找到某个播客时，只需点击该播客的标题（参见图\
    \ 22–2）。幸运的是，大多数播客是免费的。如果是免费的，你会看到一个 `免费` 按钮，而不是通常的 `购买` 按钮。\n\n![图片](img/2202.jpg)\n\
    \n**图 22–2.** *下载一个 NPR 播客*\n\n当你点击该按钮时，它会变成一个绿色的 `下载` 按钮。点击 `下载`，一个动画图标会跳入底部功能键栏中的\
    \ `下载` 图标中。一个红色小数字显示正在下载的文件数量。\n\n![图片](img/U2224.jpg)\n\n#### 下载图标：停止和删除下载\n\n\
    当你下载项目时，它们会出现在你的 `下载` 屏幕中。这个行为与你电脑上 `iTunes` 应用的行为类似。\n\n你可以点击 `更多` 功能键，然后点击 `下载`\
    \ 标签来查看所有下载的进度。\n\n![图片](img/U2225.jpg)\n\n#### 下载的内容去哪里了\n\n你可以通过点击 `更多` 图标，在你的“音乐”或“视频”应用中看到所有下载内容，该图标会按类别显示你的下载内容。换句话说，如果你下载了一个播客，你需要进入你的“音乐”应用，点击\
    \ `更多`，然后点击 `播客` 标签来查看已下载的播客。\n\n有时，你决定不想要所有已选择的下载内容。如果你想停止下载并删除它，用手指在下载项上滑动以调出\
    \ `删除` 按钮，然后点击 `删除`（参见图 22–3）。\n\n![图片](img/2203.jpg)\n\n**图 22–3.** *在下载过程中删除文件*\n\
    \n### 兑换 iTunes 礼品卡\n\n你 iPhone 上 `iTunes` 应用的酷炫之处在于，就像你电脑上的 `iTunes` 应用一样，你可以兑换一张礼品卡，从而在\
    \ iTunes 账户中收到用于购买的余额。\n\n在 `iTunes` 屏幕的底部，你应该能看到 `兑换` 按钮（参见图 22–4）。\n\n![图片](img/2204.jpg)\n\
    \n**图 22–4.** *兑换 iTunes 礼品卡*\n\n点击 `兑换` 按钮，开始输入你的 iTunes 礼品卡号码以获取 iTunes 商店余额的流程。\n"
- fmt: '### Ping


    `Ping` is Apple''s social network for music. You can access it by tapping the
    **Ping** button at the bottom center of the tab bar.


    With `Ping`, you can see what music is being bought and commented on by the artists
    and people you follow, and your followers can see the music you buy and comment
    on. `Ping` also lets you tweet out your purchases.


    ![images](images/U2226.jpg)


    There are three sections in `Ping`:


    - **Activity:** Shows you all the purchases and comments made by the people you
    follow. You can view either **All** activity, **Artists** activity only, or **People**
    (non-artists) only.

    - **People:** Gives you a list of all the other `Ping` users you **Follow**; a
    list of `Ping` users that **Follow** you; and lists of **Featured**, **Recommended
    Artists**, and **Recommended People** that `Ping` thinks you might like to follow.

    - **My Profile:** Shows you all of your own recent activity and gives you access
    to **My Info**, which displays your profile information and album art from music
    you like.


    **NOTE**: At the time of this writing, `Ping` has not gained significant popularity.
    If you''re a huge music fan, and you and your friends buy a lot of music from
    `iTunes`, then we certainly recommend you at least try it out. However, you might
    also find more established (if more generic) social networks like `Twitter` and
    `Facebook` more to your liking.


    ## Chapter 23


    ## The Amazing App Store


    You have just seen how easy it is to download music, videos, and podcasts from
    `iTunes` right to your `iPhone`. You have also seen how easy it is to download
    `iBooks` from the `iBooks` store.


    It is just as easy to download new applications from Apple''s amazing `App Store`.
    Apps are available for just about any function you can think of: games, productivity
    tools, social networking, and anything else you can imagine. As the advertising
    says, *There''s an app for that*.


    ![images](images/U2301.jpg)


    In this chapter, you will learn how to navigate the `App Store`, as well as how
    to search for and download apps. You will also learn how to maintain and update
    your apps once they are downloaded onto your `iPhone`.


    ### Learning More About Apps and the App Store


    In this chapter, we will focus on accessing the `App Store` directly from your
    `iPhone`. However, you should remember that you can also shop at the `App Store`
    using the **iTunes** program on your `Mac` or `PC` (see [Figure 23–1](#Chapter23.html#fig_23_1)).


    ![images](images/2301.jpg)


    **Figure 23–1.** *Accessing the `App Store` from the **iTunes** program on your
    computer or the **App Store** icon on your `iPhone`*


    In a very short amount of time, the `App Store` has exploded in popularity. There
    are apps for just about anything you can imagine. These apps are available at
    all price levels; in many cases, the apps are even free!


    #### Where to Find Apps News and Reviews


    You can find reviews for many apps in the `App Store` itself, and we recommend
    that you check out the `App Store` reviews. However, sometimes you will probably
    want more information from expert reviewers. If so, blogs are a great place to
    find news and reviews for particular apps or content.


    Here is a list of Apple `iPhone`- and `iPod`-related blogs with reviews of apps:


    - The `iPhone` Blog: [`www.tipb.com`](http://www.tipb.com)

    - Touch Reviews: [`www.touchreviews.net`](http://www.touchreviews.net)

    - Touch Arcade: [`www.toucharcade.com`](http://www.toucharcade.com)

    - The Unofficial Apple Weblog: [`www.tuaw.com`](http://www.tuaw.com)

    - 148apps: [`www.148apps.com`](http://www.148apps.com)

    - App Advice: [`www.appadvice.com`](http://www.appadvice.com)


    ### App Store Basics


    With a little time, you should find the `App Store` to be quite intuitive to navigate.
    We''ll cover some of the basics for getting the most out of the `App Store`, so
    that your experience will be as enjoyable and productive as possible.


    **NOTE:** App availability varies by country. Some apps are only available in
    some countries, and some countries may not have certain games sections due to
    local ratings laws.


    #### A Network Connection Is Required


    After you set up your `App Store` (`iTunes`) account, you still need to have the
    right network connectivity (either `Wi-Fi` or `3G`) to access the `App Store`
    and download apps. Check out [Chapter 4](#Chapter04.html#ch4): "Connect to the
    Network" to learn how to tell whether you are connected.


    #### Starting the App Store


    The **App Store** icon should be on your first page of icons on the **Home** screen.
    Tap the icon to launch the **App Store** app.


    ![images](images/U2302.jpg)


    #### The App Store Home Page


    We''ll look at several parts of the `App Store`''s **Home** page: the top bar,
    middle content, and the bottom soft keys.


    We''ll look at the top bar first. At the top of the page shown in [Figure 23–2](#Chapter23.html#fig_23_2),
    you will see three buttons: **New**, **What''s Hot**, and **Genius**. Tap any
    of these to change the view.


    **TIP:** **Genius** is a feature that suggests apps you might like based on apps
    you have already downloaded and installed on your `iPhone`. It can be quite a
    nice way to filter through the hundreds of thousands of apps to find the ones
    that might interest you.


    The middle of the page is your main content area. This main content area shows
    you a list of apps or the details of a specific app that you are viewing. You
    can swipe up or down to view more apps in a list or details for a specific app.
    You can also swipe left or right when viewing screen shots. On the **Featured**
    apps page, you will notice that there are a few large icons at the top. Clicking
    these icons will show you either types of apps or individual apps. Below the larger
    icons (you have to swipe down), you will see a number of featured apps.


    The bottom of the `App Store`''s **Home** page has five soft key buttons:


    - **Featured**: Shows apps that have been highlighted by the `App Store` or by
    the app developers.

    - **Categories**: Shows a list of categories used to organize the apps, so you
    can browse by category.

    - **Top 25**: Shows top selling or top downloaded apps.

    - **Search**: Finds an app using entered search terms.

    - **Updates**: Lets you update any apps you have installed, and redownload any
    apps you''ve already acquired.


    You can tell that [Figure 23–2](#Chapter23.html#fig_23_2) is showing **Featured**
    apps because the **Featured** soft key is highlighted on the bottom row of soft
    keys. Scrolling is handled the same way as in other programs—just move your finger
    up and down to scroll through the page.


    ![images](images/2302.jpg)


    **Figure 23–2.** *The layout of the `App Store`''s **Home** page*


    **NOTE:** The `App Store` is essentially a web site, so it changes frequently.
    Some of the details and nuances of the `App Store` might look a bit different
    after this book goes to print.


    #### Viewing App Details


    If you see an app in a list that looks interesting, tap it to learn more. The
    **Details** screen for the app includes its price, a description, screen shots,
    and reviews (see [Figure 23–3](#Chapter23.html#fig_23_3)). You can use this information
    to help you determine whether the app will be a good choice for you.


    Swipe down to read more details about the app on the **Info** page. Swipe left
    or right to view more screen shots of the app. Tap the **Rating** button near
    the bottom to read all the reviews for an app.


    You can also see other details about the app, such as its file size, its version
    number, and developer information near the bottom of the **Info** page.


    You can also **Tell a Friend** or **Report a Problem** using the buttons at the
    bottom of the screen.


    ![images](images/2303.jpg)


    **Figure 23–3.** *Viewing details about an app*'
