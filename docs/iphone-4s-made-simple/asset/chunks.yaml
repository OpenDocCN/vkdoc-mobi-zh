  trans: "\n# Wi-Fi 和蜂窝网络连接指南\n\n## 连接到 Wi-Fi 或 3G 网络后可以做什么\n*   连接到 Wi-Fi 或 3G 网络后可以做什么？\n\
    \n## Wi-Fi 连接\n*   Wi-Fi 连接\n*   连接到 Wi-Fi 网络\n*   在需要网页登录的公共 Wi-Fi 热点进行连接\n*\
    \   安全 Wi-Fi 网络——输入密码\n*   切换到不同的 Wi-Fi 网络\n*   验证你的 Wi-Fi 连接\n*   高级 Wi-Fi 选项（隐藏或不可发现的网络）\n\
    *   为什么我看不到想要加入的 Wi-Fi 网络？\n*   重新连接之前加入过的 Wi-Fi 网络\n\n## 蜂窝数据连接\n*   蜂窝数据连接\n\
    *   选择和监控你的蜂窝数据用量\n\n## 国际旅行：出发前准备\n*   国际旅行：出发前要做的事\n*   避免高得惊人的账单\n    *   第\
    \ 1 步：致电你的电话公司\n    *   第 2 步：检查你是否可以使用国际 SIM 卡\n    *   第 3 步：出发前完成所有高数据流量的操作\n\
    *   乘坐飞机：飞行模式\n\n## 国际旅行：抵达后\n*   国际旅行：抵达目的地后\n    *   第 1 步：确保时区设置正确\n    * \
    \  第 2 步：购买并插入你的国际 SIM 卡\n    *   第 3 步：落地后重置你的数据用量统计\n    *   第 4 步：如果费用过高，请关闭数据漫游\n\
    \    *   第 5 步：尽可能使用 Wi-Fi\n\n## 国际旅行：返回家中\n*   国际旅行：返回家中\n    *   第 1 步：确保时区设置正确\n\
    \    *   第 2 步：关闭你的特殊国际资费套餐\n\n## 个人热点\n*   个人热点\n*   个人热点 vs. 网络共享\n    *   第\
    \ 1 步：联系你的电话公司\n    *   第 2 步：在你的 iPhone 上启用个人热点\n    *   第 3 步：连接到你的 iPhone 个人热点\n\
    \    *   第 4 步：在你的电脑上设置网络连接\n\n## VPN：虚拟专用网络\n*   VPN：虚拟专用网络\n*   建立连接\n*   了解何时已连接到\
    \ VPN 网络\n*   切换 VPN 网络\n\n## AirPlay 和蓝牙\n*   ![images](img/square.jpg) 第 5 章：AirPlay\
    \ 和蓝牙\n*   认识 AirPlay\n*   与 iPhone 配合使用的 AirPlay 设备\n*   设置和使用 AirPlay\n"
