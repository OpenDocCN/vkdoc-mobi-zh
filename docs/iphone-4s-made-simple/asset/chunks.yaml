  trans: "\n#### 获取游戏及其他有趣的应用程序\n\n与所有 iPhone 应用程序一样，游戏可以在 App Store 中找到（参见图 24–1）。你可以通过电脑上的\
    \ `iTunes` 应用程序或设备上的 `App Store` 应用程序获取它们。\n\n![images](img/2401.jpg)\n\n**图 24–1.**\
    \ *App Store 中 `Games` 板块的布局*\n\n要获取游戏，请像上一章一样启动 `App Store` 应用。接着，使用 `Categories`\
    \ 图标进入 `Games` 标签页。你还可以在 App Store 的 `Featured` 板块以及 `New and Notable` 板块中找到许多游戏。图\
    \ 24–2 展示了一款 iPhone 游戏的应用购买页面。\n\n![images](img/U2404.jpg)\n\n![images](img/2402.jpg)\n\
    \n**图 24–2.** *`App Purchase` 页面的布局*\n\n#### 购买前阅读评论\n\n许多游戏都有值得细看的用户评论。有时，你可以在购买前对游戏有个好印象。如果你发现一款看起来很有趣的游戏，不妨用谷歌简单搜索一下，看看是否有主流媒体做过完整评测。\n\
    \n![images](img/U2405.jpg)\n\n#### 寻找免费试用版或精简版\n\n如今，越来越多的游戏开发者会提供免费试用版，让用户在购买前看看是否喜欢。你会发现\
    \ App Store 中许多游戏既有 `Lite`（精`简版）也有`Full`（完整版）。\n\n一些“免费”游戏通过内置广告来维持运营。另一些游戏则免费开始，但需要应用内购买才能继续游玩或解锁额外功能。\n\
    \n![images](img/U2406.jpg)\n\n#### 游玩时注意安全\n\n你可能像在现实中一样，用 iPhone 在钓鱼游戏中甩出鱼线。你还可以在驾驶游戏和第一人称射击游戏中四处移动。关键在于：游玩时要注意周围环境！例如，确保你拿稳了设备，免得它从手中滑落；我们推荐使用一个良好的硅胶保护壳来帮助防滑。\n\
    \n**小心**：像 `Real Racing` 这样的游戏可能会让人上瘾！\n\n#### 双人游戏\n\niPhone 真正开启了双人游戏的可能性。在这个例子中，我们以\
    \ iPhone 为棋盘，两人对弈跳棋。\n\n对于其他棋盘游戏，如国际象棋、大富翁和优诺，你也能找到类似的双人游戏应用。\n\n![images](img/U2407.jpg)\n\
    \n#### 在线与无线游戏\n\niPhone 还支持在线和无线点对点游戏（如果游戏支持的话）。许多新游戏都在融入这项技术。例如，在 `Scrabble`\
    \ 中，你可以与多个使用自己设备的玩家对战。你甚至可以用 iPhone 作为游戏棋盘，最多用四部独立的 iPhone 作为无线“字母架”，来存放所有玩家的字母牌。只需将字母牌从架子上弹出，它们就会落到棋盘上——非常酷！\n\
    \n在这个例子中，我从 `Real Racing` 菜单中选择了 `Online`。现在我可以选择通过 Wi-Fi 与另一位对手比赛，或者加入一个在线联赛。\n\
    \n![images](img/U2408.jpg)\n\n**注意：** 如果你只想和身边的朋友对战，请在多人游戏中选择 Wi-Fi 模式。如果你只是想和陌生人玩，可以尝试在线加入联赛或游戏。\n\
    \n### 其他有趣的内容：棒球\n\n有许多出色的应用能为你在 iPhone 上带来无尽欢乐。由于 iPhone 是在美国职业棒球大联盟开赛日发布的，因此突出介绍一款被评为首个\
    \ iPhone App Store“本周应用”的应用是恰如其分的。\n\n`At Bat 2010 for iPhone` 是一款售价 14.99 美元的应用，对于任何棒球迷来说，这笔入场费都物超所值。它也充分展示了\
    \ iPhone 的功能。\n\n![images](img/U2409.jpg)\n\n应用的*主视图会根据当前是否有棒球比赛而改变。当你首次注册应用时，可以选择你最喜欢的球队。在这个例子中，iPhone\
    \ 上喜爱的球队被设定为红袜队。因此，如果这支球队正在比赛，视图会自动首先显示该球队的比赛。如果球队没有比赛，则会显示该队上一场比赛的回顾。或者，它可能列出该队下一场比赛的详细信息。\n\
    \n比赛期间的主视图会显示一位击球手站在本垒板上。这个击球手代表真实的击球手。击球手会切换站位，取决于当前击球手是左打还是右打。本垒板上方显示当前的投球计数，比分则显示在屏幕顶部。\n\
    \n当你看到一名球员站在本垒板或垒上时，你可以点击球员的图像，调出他的棒球卡并查看他的统计数据。\n\n![images](img/U2410.jpg)\n\
    \n**提示：** 你甚至可以设置通知，当与你喜爱的球队相关的有新闻价值的事件发生时，向你发送提醒。为此，请点击 `Information` 图标，并将 `Notifications`\
    \ 设置为 `ON`。\n\n#### AirPlay 镜像\n\n最新的 iPhone 不仅能够将视频或音乐从 iPhone 流式传输到 Apple TV，还能共享任何应用（包括游戏）的屏幕。这让你和全家人可以在大屏幕上观看并享受游戏，同时使用\
    \ iPhone 作为控制器。这对于棋盘游戏和多人游戏尤其有效，全家人或一群人可以围坐在一起共同游玩。\n\n![images](img/U2411.jpg)\n\
    \n请按照以下步骤使用 AirPlay 镜像功能：\n\n1.  点击你想要镜像的应用。在这个例子中，我们使用的是《无尽之剑》。\n2.  应用启动后，双击\
    \ Home 键调出快速应用切换器。\n3.  从左向右滑动，找到音频/视频控制选项。（它们在最末端，所以继续滑动直到无法再滑动为止。）\n4.  点击 AirPlay\
    \ 图标，调出你 Wi-Fi 网络上已启用 AirPlay 的设备列表。\n\n    ![images](img/U2412.jpg)\n\n5.  选择\
    \ Apple TV。\n6.  再次点击 Home 键，返回你的应用。\n7.  现在你应该会在*大屏幕上看到《无尽之剑》。尽情体验吧！\n\n要停止 AirPlay\
    \ 镜像，重复相同步骤，并从设备列表中选择 iPhone。\n\n**注意：** 有些游戏支持多人 AirPlay 镜像，例如 `Real Racing 2`\
    \ 的派对模式，最多可以让 4 个人使用自己的 iPhone 或 iPad，在同一台大屏幕电视上互相竞技。\n\n## 第 25 章\n\n## 社交网络\n\
    \n如今，一些最受欢迎的“联系”场所是那些常被称为*社交网络网站*的站点——这些地方允许你创建自己的页面，与朋友和家人联系，了解他们的生活动态。一些最大的社交网络网站包括\
    \ Facebook、Twitter 和 LinkedIn。\n\n在本章中，我们将向你展示如何访问这些网站。你将学习如何更新状态、*发推文*，并关注那些对你重要或你感兴趣的人。\n"
- fmt: "# Facebook\n\nFacebook was founded in February of 2004. Since that time, it\
    \ has served as the premier site for users to connect, re-connect, and share information\
    \ with friends, co-workers, and family. Today, over 800 million people use Facebook\
    \ as their primary source of “catching up” with the people who matter most to\
    \ them.\n\n**NOTE:** *You cannot play Facebook games inside the* `Facebook` *app\
    \ or via the* `Facebook.com` *website on your iPhone*. This may disappoint you\
    \ if you are a big Facebook game player; however, you can often get the same games\
    \ (e.g., `FarmVille`) from the App Store, and then connect them to your Facebook\
    \ computer version to keep your place.\n\nOn your iPhone, you have three primary\
    \ ways of accessing your Facebook page at the time of publishing:\n\n1. Use `Safari`\
    \ to go to the standard (full) web site: [`www.facebook.com`](http://www.facebook.com).\n\
    2. Use `Safari` to go to the mobile site: [`http://touch.facebook.com`](http://touch.facebook.com).\n\
    3. Use the iPhone `Facebook` app.\n\n![image](images/U2501.jpg)\n\n**NOTE:** The\
    \ iPhone version of the `Facebook` app is a bit more limited than the full web\
    \ site, but it is much easier to navigate.\n\n## Different Ways to Connect to\
    \ Facebook\n\nYou can access Facebook by using its iPhone-specific app or using\
    \ one of the two previously mentioned Facebook web sites in your `Safari` browser.\
    \ We will focus on the `Facebook` app for the iPhone for the duration of this\
    \ chapter.\n\n### Downloading and Installing the Facebook App\n\nIn order to find\
    \ the app, use the `Search` feature in the App Store and simply type in “Facebook.”\n\
    \nYou can also go to the `Social Networking` category in the App Store and find\
    \ the official `Facebook` app, as well as many other Facebook-related apps.\n\n\
    **NOTE:** Some of the apps may look like “official” Facebook apps, and they do\
    \ cost money. However, the only “official” app is the iPhone/iPod app shown to\
    \ the right.\n\n![image](images/U2502.jpg)\n\nIn order to connect to your account\
    \ on Facebook, you will need to locate the icon you just installed and click it.\
    \ We use the example of `Facebook` here, but the process is very similar for the\
    \ rest of the apps.\n\nOnce `Facebook` is successfully downloaded, the icon should\
    \ look something like this.\n\n![image](images/U2503.jpg)\n\n## The Facebook App\n\
    \nTo get the `Facebook` app installed on your iPhone, start up the `App Store`\
    \ and search for “Facebook.” Tap the `Install` button from the `Facebook` app\
    \ listing.\n\n### Facebook App Basics\n\nOnce `Facebook` is downloaded and installed,\
    \ the first thing you will see is the `Login` screen. Input your account information—your\
    \ email address and password.\n\n![image](images/U2504.jpg)\n\nAfter you log in\
    \ the first time, you will see a `Push Notifications` warning message.\n\nClick\
    \ `OK` if you want to allow these messages, which can be pokes from other Facebook\
    \ friends, notes, status update notifications, and more.\n\nOnce you log in, you\
    \ will see the `Facebook` screen main screen. Tap the `Facebook` logo to navigate\
    \ around the app.\n\n![image](images/U2505.jpg)\n\n### Navigating Around Facebook\n\
    \nToggle between the `Navigation` icons and your current location by tapping the\
    \ word `Facebook` at the top of the page.\n\nFor example, if you are in the `News\
    \ Feed` and tap `Facebook`, you will see all the icons. Tap `Facebook` again and\
    \ you will return to the `News Feed`.\n\nFrom the icons page, you can access your\
    \ `News Feed`, `Profile`, `Friends`, `Messages`, `Places`, `Groups`, `Events`,\
    \ `Photos`, and `Chat`.\n\n![image](images/U2506.jpg)\n\n### Communicating with\
    \ Your Friends\n\nFollow these steps to communicate with your friends on Facebook\
    \ from the `Facebook` app on your iPhone:\n\n1. Tap `Facebook` at the top to see\
    \ all the icons.\n2. Tap the `Friends` icon and your list of friends is displayed.\n\
    3. Touch the friend and you will go to his Facebook page, where you can then write\
    \ on her `Wall` and see her `Info` or `Photos`.\n\n![image](images/U2507.jpg)\n\
    \n### Uploading Pictures with the Facebook App\n\nAn easy and fun thing to do\
    \ with Facebook is to upload pictures. Here, we show you how to upload pictures\
    \ in the `Facebook` app:\n\n![image](images/U2508.jpg)\n\n1. From the Facebook\
    \ main icons, tap `Photos`.\n2. Choose an album, such as Mobile Uploads.\n3. Tap\
    \ the `Camera` next to the `What’s on your mind?` box.\n4. Tap the `Take Photo\
    \ or Video` button to snap a picture or take a video to upload. Or, tap `Choose\
    \ From Library` to navigate through the pictures on your iPhone until you find\
    \ the picture you wish to.\n5. Next, tap `Write a caption…` to write a caption,\
    \ if so desired.\n6. To finish the upload, tap the blue `Upload` button and the\
    \ photo will go into your Mobile Uploads folder.\n\n**NOTE:** When you upload\
    \ a photo, the image quality won’t be the same as it was originally on your iPhone.\n\
    \n![image](images/U2509.jpg)\n\n![image](images/U2510.jpg)\n\n## Facebook Notifications\n\
    \nDepending on your settings for Facebook push notifications, you can be inundated\
    \ by updates, wall posts, and invitations. If you don’t have too many Facebook\
    \ friends and you want to know when someone is writing something on your wall\
    \ or commenting on a post or picture, just set your push notification to `ON`,\
    \ as shown in the next section.\n\nWhen a notification comes in, it will appear\
    \ in Notification Center or as Lock Screen Info if your phone is locked.\n\nTo\
    \ access Facebook from the notification, just slide the `Facebook` icon across\
    \ the screen or slide the `Arrow` button to unlock and read the message.\n\n![image](images/U2511.jpg)\n\
    \n### Settings to Customize Your Facebook App\n\nHere’s how to adjust the settings\
    \ for the `Facebook` app:\n\n1. Tap the `Settings` app.\n2. Tap `Facebook` in\
    \ the left column.\n3. You can now adjust various options:\n   * `Shake to Reload`:\
    \ This feature reloads or updates the page when you shake your iPhone.\n   * `Vibrate`:\
    \ This feature vibrates to signal you when chat or message alerts are available.\n\
    \   * `Play Sound`: This feature lets you add an audible tone to chat and message\
    \ alerts.\n\n![image](images/U2512.jpg)\n\nFollow these steps to adjust push notification\
    \ settings:\n\n1. Tap the `Settings` app.\n2. Tap `Notifications`.\n3. Scroll\
    \ down and tap `Facebook`.\n4. Set `Notification Center` to `ON` to receive push\
    \ notifications.\n5. Tap `Show` to choose how many notifications appear in the\
    \ list.\n6. Set the `Alert Style` to `None` for no notifications, `Banners` for\
    \ new Notification Center–style alerts, or `Alerts` for old style pop-up notifications.\n\
    7. Set `Badge App Icon` to `ON` to see the number of new notifications appear\
    \ on the `Facebook` icon.\n8. Set `Sounds` to `ON` to hear an audible tone when\
    \ you get a notification.\n9. Set `View in Lock Screen` to get notification info\
    \ even when your phone is locked.\n\n![image](images/U2513.jpg)\n\n**TIP:** The\
    \ `Facebook` app will bring in Facebook profile pictures to your `Contacts` list.\
    \ This can be quite humorous, depending on the pictures. However, it can also\
    \ upload your own, non-Facebook contacts’ information to Facebook’s servers, which\
    \ might raise privacy concerns for you, your family, and friends."
