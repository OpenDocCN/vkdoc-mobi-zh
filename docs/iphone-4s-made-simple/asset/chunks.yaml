  trans: '

    ### 我的笔记如何排序？


    您会看到所有笔记按时间倒序排列，最近编辑的笔记排在最顶部，最早的笔记排在底部。


    显示的日期是特定笔记的最后编辑时间，而非首次创建时间。因此您会注意到笔记顺序在屏幕上动态变化。


    这种排序方式的好处在于，您最近（或频繁编辑）的笔记会始终排在最顶部。


    **提示：** 如果要管理待办事项列表，可以使用 iPhone 自带的“提醒事项”应用。如果需要更强大的功能，不妨在 App Store 中查看 `Things`、`Appigo
    Todo` 或 `OmniFocus`。


    ### 添加新笔记


    要开始编写新笔记，请点击右上角的加号图标 ![images](img/U1836.jpg)。


    此时记事本为空白状态，键盘会自动弹出供您输入。


    **提示：** 您可以将 iPhone 横屏放置，使用更宽敞的横向键盘。


    ![images](img/U1837.jpg)


    ### 为笔记添加标题


    在按下 `Return` 键之前输入的前几个字将成为笔记的标题。因此请先想好标题内容再输入。如图所示，`购物清单` 便成为了该笔记的标题。


    每行输入一个新项目，按 `Return` 键换行。


    完成后，点击左上角的 `备忘录` 按钮返回主备忘录界面。


    ![images](img/U1838.jpg)


    ### 查看或编辑笔记


    您的笔记会在列表中显示为可点击的标签页。点击要查看或编辑的笔记名称，即可显示该笔记内容。


    您可以在“备忘录”中像操作其他程序一样滚动浏览。请注意，右上角会显示笔记的最后编辑日期和时间。


    阅读完笔记后，只需点击左上角的 `备忘录` 按钮即可返回主备忘录界面。


    要快速浏览多条笔记，请点击屏幕底部的箭头。点击 `前进` 箭头 ![images](img/U1840.jpg) 翻页查看下一条笔记；点击 `返回` 箭头
    ![images](img/U1841.jpg) 则可后退。


    ![images](img/U1839.jpg)


    ### 使用语音听写功能输入笔记


    请记住，iPhone 支持语音听写功能。当您编辑或新建笔记时，轻点空格键左侧的麦克风按钮并开始说话即可。


    ![images](img/U1842.jpg)


    当您看到底部出现紫色麦克风图标时，说明语音听写功能已启动。紫色区域会随您音量高低上下跳动。


    完成后，轻点“完成”即可查看听写效果！


    **提示：** 您可以使用语音指令输入标点符号、特殊符号和格式，例如“句号”或“问号”、“左括号”或“右方括号”、“新段落”，甚至“笑脸”。


    ![images](img/U1843.jpg)


    ### 删除笔记


    要删除笔记，请在列表中用手指在笔记上从左向右滑动，然后点击 `删除`。或者，如果正在查看该笔记，请点击底部的 `垃圾桶` 图标 ![images](img/U1845.jpg)。iPhone
    会提示您确认删除或取消操作。


    ![images](img/U1844.jpg)


    ### 通过电子邮件发送或打印笔记


    `备忘录` 应用的便捷功能之一，是能够通过电子邮件发送或打印笔记。假设您写了一份购物清单想电邮给配偶，或者列了一份礼品创意清单想分发出去。要电邮或打印笔记，只需点击屏幕底部的
    `操作按钮` 图标 ![images](img/U1847.jpg)。


    ![images](img/U1846.jpg)


    ### 数据检测器 - 带下划线文字的酷炫功能


    如果在笔记中输入“明天早上”等词语并保存，下次打开该笔记时，会发现这些词语已添加下划线。长按带有下划线的词语，会看到一个按钮询问是否要“创建事件”。点击该按钮即可为明天早上新建一个日历事件。


    ![images](img/U1848.jpg)


    **提示：** 每当日期和时间词语出现下划线时，iPhone 会将其识别为潜在的日历事件。此功能适用于“备忘录”、电子邮件以及 iPhone 上的其他位置。iPhone
    还具备其他“数据检测器”，例如可以识别电话号码、网址，甚至包裹的追踪编号。


    ## 第 19 章


    ## 日历与提醒事项


    iPhone 让曾经贴在冰箱上的老式日历彻底过时。本章将向您展示如何充分利用 iPhone 的`日历`应用。例如，我们将介绍如何安排约会、管理多个日历、切换日历视图，甚至处理会议邀请。


    在 iOS 5 中，Apple 新增了`提醒事项`应用，用于轻松管理所有基于时间和地点的任务与待办事项列表！


    **注意：** 本章大部分内容将讨论如何将 iPhone 日历与其他日历同步，因为让日历在 iPhone 和其他设备上都能访问非常实用。您也可以选择以*独立*模式使用
    iPhone，即不与任何其他日历同步。在后一种情况下，我们描述的所有关于事件、查看和管理的步骤同样适用于您。但务必使用 iCloud 或 iTunes 的自动备份功能保存日历副本，以防
    iPhone 发生意外。


    ### 日历、提醒事项与 Siri


    Apple 全新的人工智能个人助理 Siri，可以快速轻松地为您创建日历事件和提醒项目。对于相对简单的操作，Siri 甚至比您通过“老式”点击按钮创建更快捷方便。以下是
    Siri 在日历和提醒事项方面的一些功能示例。


    *   “显示我明天的日历”。Siri 会显示您所查询日期或日期的所有事件。

    *   “安排明天晚上 9 点与老板的会面”。如果存在时间冲突，Siri 还会提醒您。

    *   “把我明天晚上 9 点的约会移走”。Siri 会告知您约会是否为重复事件，并提供仅修改当前事件或修改所有未来事件的选项。

    *   “显示我的提醒事项”。Siri 会列出您的提醒，您可以快速勾选已完成的项目。

    *   “提醒我到公司后给妻子打电话”。Siri 会创建一个基于位置的提醒。

    *   “将饼干添加到我的购物清单”。Siri 会创建一个提醒，提示您在名为“购物”的列表中购买饼干。


    ### 在 iPhone 上管理繁忙生活


    `日历`和`提醒事项`应用提供了强大且易用的功能，帮助您管理约会、跟踪待办事项、设置提醒闹钟，甚至创建和回复会议邀请（适用于 Exchange 和 iCloud
    用户）。'
- fmt: "#### Syncing or Sharing Your Calendar and Reminders\n\nIf you maintain a calendar\
    \ or task list on your computer, or a calendar on a web site such as iCloud or\
    \ Google Calendar, then you can synchronize or share that data with your iPhone\
    \ either by using the iTunes app and your sync cable or by setting up a wireless\
    \ synchronization (see [Chapter 3](#Chapter03.html#ch3): “Sync iCloud, iTunes,\
    \ and More” for information on syncing).\n\n![images](images/U1901.jpg)\n\nAfter\
    \ you set up the calendar and task syncing, all of your computer calendar appointments\
    \ and to-do lists will be synced with your iPhone calendar automatically, based\
    \ on your sync settings (see [Figure 19–1](#Chapter19.html#fig_19_1)).\n\nIf you\
    \ use `iTunes` to sync with your calendar (e.g., Microsoft Outlook or Apple's\
    \ `iCal`), your appointments and tasks will be transferred or synced every time\
    \ you connect your iPhone to your computer.\n\nIf you use another method to sync\
    \ (e.g., iCloud, Exchange, or similar), this sync is wireless and automatic, and\
    \ it will most likely happen without you having to do anything after the initial\
    \ setup process.\n\n![images](images/1901.jpg)\n\n**Figure 19–1.** *Syncing a\
    \ PC or Mac calendar to an iPhone*\n\n#### Today's Day and Date Shown on the Calendar\
    \ Icon\n\nThe `Calendar` icon is usually right on your iPhone's `Home` screen.\
    \ You will quickly notice that your `Calendar` icon changes to show today's date\
    \ and the day of the week. The icon to the right shows that it is a Friday, the\
    \ 16^(th) day of the month.\n\n![images](images/U1902.jpg)\n\n**TIP:** if you\
    \ use your iPhone's `Calendar` app often, you might want to think about pinning\
    \ or moving it to the Bottom dock; you learned how to do this in the section on\
    \ docking icons in [Chapter 6](#Chapter06.html#ch6): “Icons and Folders.”\n\n\
    #### Viewing Your Appointments and Getting Around in Calendar\n\nThe default view\
    \ for the `Calendar` app shows your `Day` view. This view shows you at a glance\
    \ any upcoming appointments for your day. Appointments are shown in your calendar.\
    \ If you happen to have multiple calendars set up on your computer, such as `work`\
    \ and `Home`, then appointments from the different calendars will display as different\
    \ colors on your iPhone's calendar.\n\nYou can manipulate the calendar in various\
    \ ways:\n\n* **Move a day at a time**: If you tap the triangles next to today's\
    \ date at the top, you move forward or backward a day.\n\n  **TIP:** Touch and\
    \ hold the triangles next to the date to advance quickly through days.\n\n* **Change\
    \ views**: Tap the `List`, `Day`, and `Month` buttons at the bottom to change\
    \ the view.\n* **Jump to today**: Tap the `Today` button at the bottom-left corner.\n\
    \n#### The Four Calendar Views\n\nYour `Calendar` app comes with four views. `Day`,\
    \ `List`, `Week`, and `Month` are all available in Portrait orientation; and you\
    \ can switch between views by tapping the name of the view at the bottom of the\
    \ screen. `Week` view is only available in Landscape orientation, and you can\
    \ switch to it by turning your iPhone sideways. Here's a quick overview of the\
    \ four views:\n\n* **Day view**: When you start the iPhone's `Calendar` app, the\
    \ default view is usually the `Day` view. This allows you to quickly see everything\
    \ you have scheduled for the day. You can find buttons to change the view at the\
    \ bottom of the `Calendar` app.\n\n  ![images](images/U1903.jpg)\n\n  To move\
    \ from one day to the next, simply swipe from right to left. To move back a day,\
    \ swipe from left to right.\n\n  ![images](images/U1904.jpg)\n\n* **List view**\
    \ (also known as **Agenda** view): Tap the `List` button at the bottom, and you\
    \ can see a list of your appointments.\n\n  Depending on how much you have scheduled,\
    \ you could see the next day or even the next week's worth of scheduled events.\n\
    \n  Swipe up or down to see more events.\n\n  ![images](images/U1905.jpg)\n\n\
    * **Month view**: Tap the `Month` button at the bottom, and you can see a layout\
    \ of the full month. Days with appointments have a small dot in them. Dots for\
    \ the current day will show up highlighted in blue.\n\n  **TIP:** To return to\
    \ the `Today` view, just touch the `Today` button at the bottom left.\n\n  ![images](images/U1907.jpg)\n\
    \n  **Go to the next month**: Tap the triangle to the right of the month shown\
    \ at the top.\n\n  **Go to the previous month**: Tap the triangle to the left\
    \ of the month.\n\n  ![images](images/U1906.jpg)\n\n* **Week view**: Turn your\
    \ iPhone sideways to landscape orientation to access the week view.\n\n  ![images](images/U1908.jpg)\n\
    \n* Swipe left or right to see more days.\n\n#### Working with Several Calendars\n\
    \nThe `Calendar` app lets you view and work with more than one calendar. The number\
    \ of calendars you see depends on how many you are syncing. For example, you may\
    \ have iCloud or Google Calendar syncing for home and Exchange for work.\n\nTo\
    \ view just one calendar at a time, tap the `Calendars` button at the top and\
    \ select only the calendar you wish to see.\n\n![images](images/U1909.jpg)\n\n\
    When you set up your sync settings, you were able to specify which calendars you\
    \ wanted to sync with your iPhone. You can customize your calendar further by\
    \ following these instructions:\n\n* **Changing the colors**: If you don't like\
    \ the color of a calendar on your iPhone, it's easy to change:\n  * Tap on the\
    \ `Calendars` button at the top right.\n\n    ![images](images/U1910.jpg)\n\n\
    \  * Tap on the `Edit` button at the top right.\n  * Tap on the calendar you want\
    \ to change.\n  * You'll be presented with a list of color choices. Tap the one\
    \ you want and your new color will be set.\n\n* **Adding a new calendar**: If\
    \ you are using iCloud to sync, you will be able to add a new calendar on your\
    \ iPhone:\n\n  ![images](images/U1911.jpg)\n\n  * Tap `Calendars` at the top-right.\n\
    \  * Tap `Edit` at the top-right.\n  * Scroll down and tap `Add Calendar…` in\
    \ the iCloud section.\n  * Enter a name and choose a color for your new calendar,\
    \ and you're done!\n\n### Adding New Calendar Events\n\nYou can easily add new\
    \ events or appointments right on your iPhone. These new events and appointments\
    \ will be synced (or shared with) your computer the next time a sync takes place.\n\
    \n#### Adding a New Appointment\n\nYour instinct will most likely be to try to\
    \ touch the screen at a particular time to set an appointment; and with iOS 5,\
    \ you can finally do just that!\n\n![images](images/U1912.jpg)\n\n![images](images/U1913.jpg)\n\
    \nTo add a new calendar event from any `Calendar` view, follow these steps.\n\n\
    1. Tap and hold your finger on the screen at the place where you want the appointment\
    \ until a new colored bubble appears. (You can also still tap the `+` icon at\
    \ the upper-right corner of the screen to add a new event.)\n2. On the `Add Event`\
    \ screen, touch the box marked `Title & Location`.\n\n   ![images](images/U1914.jpg)\n\
    \n   Type in a title for the event and the location (optional). For example, you\
    \ might type “Meet with Martin” as the title and input the location as “Office.”\
    \ Or, you might choose to type “Lunch with Martin” and then choose a very expensive\
    \ restaurant in New York City.\n\n3. Touch the blue `Done` button in the upper-right\
    \ corner to return to the `Add Event` screen.\n4. Touch the `Starts` or `Ends`\
    \ tab to adjust the event timing. To change the start time, touch the `Starts`\
    \ field to highlight it in blue. Next, move the rotating dials at the bottom to\
    \ reflect the correct date and start time of the appointment.\n\n   ![images](images/U1915.jpg)\n\
    \n5. Alternatively, you can set an all-day event by touching the switch next to\
    \ `All-day` to set it to `ON`.\n\n**NOTE:** You will see a tab labeled `invitees`\
    \ after the `Repeat` tab only if your event is set up on an Exchange/Google or\
    \ iCloud calendar."
