    \ then check out the **iTunes U** section.You will be able to see whether your\
    \ university, college, or school has its own section.\n\n![images](images/U2214.jpg)\n\
    \nOne good example we discovered in just a few minutes of browsing was a panel\
    \ discussion with three Nobel Prize–winning economists moderated by Paul Solman\
    \ (the economic correspondent for the PBS News Hour). You can find the podcast\
    \ by navigating through the following menus: **iTunes U** ![images](images/U001.jpg)\
    \ **Universities & Colleges** ![images](images/U001.jpg) **Boston University**\
    \ ![images](images/U001.jpg) **BUNIVERSE - Business** ![images](images/U001.jpg)\
    \ **Audio**. Like much of the content in **iTunes U**, this podcastis free!\n\n\
    If you are in a location with a good wireless signal, you can tap the title of\
    \ the audio or video item, and then listen to or watch it streaming. If your signal\
    \ gets interrupted, however, you will lose your place in the video. There are\
    \ many advantages to actually downloading the file (if possible) for later viewing,\
    \ not least of which is that you get more control over the video-watching experience."
  trans: "\n#### 启动 iTunes\n\n当你第一次拿到 iPhone 时，`iTunes` 是主屏幕（`Home`）第一页上的图标之一。轻点 `iTunes`\
    \ 图标，你将会进入 iTunes Store 的移动版页面。\n\n![images](img/U2201.jpg)\n\n**注意：** `iTunes`\
    \ 应用程序会频繁更新。由于 `iTunes` 应用本质上是一个网站，因此从我们编写本书到你实际在 iPhone 上查看它之间，它可能会发生一些变化。某些屏幕图像或按钮可能会与本书中显示的略有不同。\n\
    \n此外，`iTunes` 的内容在不同国家/地区之间可能存在显著差异。根据你所在的位置，你可能无法访问电影、电视节目或其他媒体内容。不过，苹果公司正持续将\
    \ `iTunes` 内容扩展到越来越多的地区，所以请时不时回来查看一下。\n\n#### 浏览 iTunes\n\n`iTunes` 应用使用的图标与 iPhone\
    \ 上的其他程序类似，因此操作起来相当简单。顶部有三个按钮，底部有五个软键，可为你提供帮助。你可以自定义这些软键，我们将在下一节中向你展示如何操作。请注意右侧图片中底部的软键。在\
    \ `iTunes` 中滚动与其他程序中的滚动方式相同；向上或向下移动手指即可查看可用的选项。\n\n![images](img/U2202.jpg)\n\n\
    ### 自定义 iTunes 软键\n\n自定义 iTunes 屏幕底部显示的软键很简单。轻点左下角的 `More`（更多）软键。然后轻点右上角的 `Edit`（编辑）。\n\
    \n![images](img/U2203.jpg)\n\n现在，你可以通过将顶部任意图标拖放到底部的软键工具栏上来更改软键。你放置的任何项目都会替换掉原来在那个位置上的图标。\n\
    \n轻点 `Done`（完成）以完成更改并返回到 `iTunes`。\n\n![images](img/U2204.jpg)\n\n### 使用“最新发布”、“前十榜单”和“类型”查找音乐\n\
    \n在 iTunes 音乐商店屏幕的顶部有三个按钮：`Featured`（精选）、`Top Charts`（排行）和 `Genius`（天才）。默认情况下，当你启动\
    \ `iTunes` 时，会显示 `Featured`（精选）选项。\n\n#### 前十榜单：热门内容\n\n如果你想知道某个特定类别里的热门内容，可以浏览\
    \ `Top Tens`（前十榜单）下的类别。轻点顶部的 `Top Tens`（前十榜单），然后轻点一个类别或类型，即可查看该类别中的热门内容。\n\n**注意：**\
    \ `Top Tens`（前十榜单）类别中的项目销量很好，但这并不意味着它们一定会符合你的口味。在付费之前，务必先预览项目并查看其评价。\n\n![images](img/U2205.jpg)\n\
    \n#### 类型：音乐的种类\n\n轻点 `Genres`（类型）按钮，可以按类型浏览音乐。如果你有最喜欢的音乐类型，并且只想浏览该类别，这个功能特别有用。\n\
    \n这里有大量的类型可供浏览；就像在其他 iPhone 应用中一样，向下滚动列表即可。\n\n![images](img/U2206.jpg)\n\n继续浏览音乐，直到你找到想要预览或购买的内容。\n\
    \n#### 浏览视频（电影）\n\n轻点顶部的 `Movies`（电影）、`TV Shows`（电视节目）或 `Movie Videos`（音乐视频）按钮，可以浏览所有与视频相关的项目。\n\
    \n![images](img/U2207.jpg)\n\n你也可以用手指一直滚动到页面底部，查看那里的链接，特别是以下链接：\n\n*   `Top Tens`（前十榜单）\n\
    *   `Genres`（类型）\n\n**提示：** 在大多数页面的最底部，你还可以兑换礼品卡，或者退出你的 Apple ID 并登录另一个 Apple\
    \ ID 账户。如果有人（可能是你的孩子）更改了 Apple ID，而你想换回你自己的账户时，这个功能就很有用。\n\n轻点任何电影或视频，可以查看更多详细信息或预览该选项。你可以选择租借或购买某些电影和电视节目：\n\
    \n![images](img/U2208.jpg)\n\n*   `Rentals`（租赁）：某些电影可以按固定天数租借。点击此按钮即可租借一部作品。\n\
    \n    **注意：** 美国的租赁期限是 24 小时，加拿大的租赁期限是 48 小时。其他国家的租赁期限可能略有不同。\n\n*   `Buy`（购买）：点击此按钮，你可以购买并永久拥有该电影或电视节目。\n\
    \n![images](img/U2209.jpg)\n\n#### 查找电视节目\n\n查看完电影后，轻点顶部的 `TV Shows`（电视节目）按钮，即可查看你最喜欢的节目有哪些可用内容。\n\
    \n![images](img/U2210.jpg)\n\n![images](img/U2211.jpg)\n\n当你轻点一个电视剧集时，你会看到可用的单集。轻点任何一集即可查看\
    \ 30 秒的预览（更多关于观看视频的内容，请参见第 15 章：“观看视频”）。预览结束后，轻点 `Done`（完成）按钮。\n\n当你准备好后，可以购买单集或整部电视剧集。许多（但并非全部）电视剧集允许你单独购买单集，如图\
    \ 22–1 所示。\n\n例如，你可能想看一集《摩登家庭》，并补上你错过的首播集。在 iPhone 上可以快速轻松地完成这个操作。\n\n![images](img/2201.jpg)\n\
    \n**图 22–1.** *购买电视剧季或单集*\n\n**注意：** 还有一个 `Free TV Episode`（免费电视单集）类别，你可以在其中获取样本和额外内容。\n\
    \n#### iTunes 中的有声读物\n\n有声读物是享受书籍而无需阅读的好方法。一些朗读者非常有趣，听起来几乎就像在看电影。例如，哈利·波特系列的朗读者能够演绎几十种真正令人惊叹的声音。我们推荐你在\
    \ iPhone 上试听一本有声读物；有声读物尤其适合在飞机上，当你想要逃离其他乘客但又不想开灯的时候收听。\n\n**提示：** 如果你经常听有声读物，订阅\
    \ `Audible.com` 可以让你以更便宜的价格获得相同的内容。\n\n![images](img/U2212.jpg)\n\n如果你是有声读物的爱好者，一定要查看\
    \ iTunes 中的 `Audiobooks`（有声读物）版块。\n\n你可以点击顶部三个按钮之一来浏览 `Audiobooks`（有声读物）中的以下区域：\n\
    \n*   `Featured`（精选）\n*   `Top Tens`（前十榜单）\n*   `Categories`（类别）\n\n![images](img/U2213.jpg)\n\
    \n### iTunes U：优质的教育内容\n\n如果你喜欢教育内容，那么可以查看 `iTunes U` 版块。你将能够看到你的大学、学院或学校是否有自己的专区。\n\
    \n![images](img/U2214.jpg)\n\n我们仅浏览了几分钟就发现了一个很好的例子：一场由三位诺贝尔奖得主经济学家参与的圆桌讨论，由保罗·索尔曼（PBS\
    \ 新闻小时的财经记者）主持。你可以通过以下菜单导航找到这个播客：`iTunes U` ![images](img/U001.jpg) `Universities\
    \ & Colleges`（大学与学院） ![images](img/U001.jpg) `Boston University`（波士顿大学） ![images](img/U001.jpg)\
    \ `BUNIVERSE - Business`（商业） ![images](img/U001.jpg) `Audio`（音频）。和 `iTunes U`\
    \ 中的许多内容一样，这个播客是免费的！\n\n如果你所在位置有良好的无线信号，你可以轻点音频或视频项目的标题，然后在线流式播放收听或观看。但是，如果你的信号中断，你将丢失在视频中的播放位置。实际下载文件（如果可能）以供稍后观看有很多好处，其中最重要的是你可以对观看视频的体验拥有更多控制权。\n"
- fmt: "### Download for Offline Viewing\n\nIf you know you are going to be out of\
    \ wireless coverage for a while, such as on an airplane or in the subway, you\
    \ will want to download the content for later offline viewing or listening. Tap\
    \ the `Free` button to change it to a `Download` button, and then tap it again.\
    \ You can then monitor the download progress (some larger videos may take ten\
    \ minutes or more to complete) by tapping the `Downloads` button at the bottom\
    \ right of the screen. When the download is complete, the item will show up in\
    \ the correct area of your `Music` or `Videos` app.\n\n**NOTE:** Any file larger\
    \ than 20MB cannot be downloaded over the 3G network; you must use Wi-Fi for larger\
    \ files.\n\n### Searching iTunes\n\nSometimes you have a good idea of what you\
    \ want, but you are unsure where it is located or perhaps you don't feel like\
    \ browsing or navigating all the menus. The `Search` tool is for you.\n\nIn the\
    \ top-right corner of the `iTunes` app (as in virtually every other iPhone app),\
    \ you have a `Search` window.\n\nTouch `Search`, and the `Search` window and the\
    \ on-device keyboard will pop up. Once you start typing, the iPhone will begin\
    \ to match your entry with possibilities.\n\n![images](images/U2215.jpg)\n\nType\
    \ in the artist, song name, video name, podcast name, or album you are searching\
    \ for, and the iPhone will display detailed matches. You can be as general or\
    \ as specific as you like. If you are just looking to browse all particular songs\
    \ by an artist, type the artist's name. If you want a specific song or album,\
    \ enter the full name of the song or album.\n\nWhen you locate the song or album\
    \ name, simply touch it and you will be taken to the purchase page.\n\n### Purchasing\
    \ or Renting Music, Videos, Podcasts, and More\n\nOnce you locate a song, video,\
    \ TV show, or album, you can touch the `Buy` or (if you see it) `Rent` button.\
    \ This will cause your media to start downloading. (If the content is free, then\
    \ you will see the `Free` button, which turns into a `Download` button when you\
    \ tap it.)\n\nWe suggest you view or listen to the preview, as well as check out\
    \ the customer reviews first, unless you are absolutely sure you want to purchase\
    \ the item.\n\n**NOTE:** You can also purchase *tones* for your phone from the\
    \ iTunes store. Make sure to check out [Chapter 9](#Chapter09.html#ch9): “Using\
    \ the Phone,” where we show you how to create your own tones for free!\n\n####\
    \ Previewing Music\n\nTouch either the title of the song or its track number to\
    \ the left of the song title; this will flip over the album cover and launch the\
    \ preview window.\n\nYou will hear a representative clip of 90 seconds of the\
    \ song.\n\nTouch the `Stop` button and the track number will again be displayed.\n\
    \n![images](images/U2216.jpg)\n\n#### Check Out Customer Reviews\n\nMany items\
    \ in iTunes offer customer reviews. The reviews range from a low of one star to\
    \ a high of five stars.\n\n**CAUTION:** *Be aware that the reviews can have explicit\
    \ language.* Many of the reviews are clean; however, some do contain explicit\
    \ language that may not be caught by the iTunes store right away.\n\nReading the\
    \ reviews can give you a fairly good idea of whether you would like to buy the\
    \ item.\n\n![images](images/U2217.jpg)\n\n#### Previewing a Video, TV Show, or\
    \ Music Video\n\nPretty much everything on iTunes offers a preview. Sometimes\
    \ you will see a `Preview` button, as with music videos and movies. TV shows are\
    \ a little different; you tap the episode title in order to see the 30-second\
    \ preview.\n\nWe highly recommend checking out the reviews, as well as trying\
    \ the preview before purchasing items on iTunes.\n\nTypical movie previews or\
    \ trailers will be longer than 30 seconds. Some are two and a half minutes or\
    \ longer.\n\n![images](images/U2218.jpg)\n\n#### Purchasing a Song, Video, or\
    \ Other Item\n\nOnce you are sure you want to purchase a song, video, or other\
    \ item, follow these steps to buy it:\n\n1. Touch the `Price` button of the song\
    \ or the `Buy` button.\n2. The button will change and turn into a green `Buy Now`,\
    \ `Buy Song`, `Buy Single`, or `Buy Album` button.\n3. Tap the `Buy` button.\n\
    \n    ![images](images/U2219.jpg)\n\n4. You will see an animated icon jump into\
    \ the shopping cart. Type in your iTunes password and touch `OK` to complete the\
    \ sale.\n\n![images](images/U2220.jpg)\n\nTap the `More` button, then tap `Downloads`\
    \ to see the download progress for each song on the album.\n\nThe song or album\
    \ will then become part of your music library, and it will be synced with your\
    \ computer the next time you connect your iPhone to iTunes on your computer. Note:\
    \ iCloud will do this sync automatically.\n\nAfter the download is complete, you\
    \ will see the new song, audiobook, podcast, or iTunes U podcast inside the correct\
    \ category within your `Music` app.\n\n![images](images/U2221.jpg)\n\n**NOTE:**\
    \ Purchased videos and iTunes U videos go into the `Videos` app on your iPhone\
    \ and podcasts will show up in the `Music` app.\n\n### Podcasts in iTunes\n\n\
    Podcasts are usually a series of audio segments; these may be updated frequently\
    \ (such as hourly news reports from National Public Radio) or not updated at all\
    \ (such as a recording of a one-time lecture on a particular topic).\n\n![images](images/U2222.jpg)\n\
    \n![images](images/U2223.jpg)\n\nYou can click the top three buttons to browse\
    \ the podcast categories in iTunes:\n\n- `What's Hot`\n- `Top Tens`\n- `Categories`\n\
    \n#### Downloading a Podcast\n\nPodcasts are available in video and audio varieties.\
    \ When you locate a podcast, just touch the title of the podcast (see [Figure\
    \ 22–2](#Chapter22.html#fig_22_2)). Luckily, most podcasts are free. If it is\
    \ free, you will see a `Free` button instead of the typical `Buy` button.\n\n\
    ![images](images/2202.jpg)\n\n**Figure 22–2**. *Downloading an NPR podcast*\n\n\
    When you touch the button, it turns into a green `Download` button. Touch `Download`\
    \ and an animated icon jumps into your `Downloads` icon at the bottom bar of soft\
    \ keys. A small number displayed in red reflects the number of files downloading.\n\
    \n![images](images/U2224.jpg)\n\n#### The Download Icon: Stopping and Deleting\
    \ Downloads\n\nAs you download items, they appear in your `Downloads` screen.\
    \ This behavior is just like the behavior of the `iTunes` app on your computer.\n\
    \nYou can tap the `More` soft key and then tap the `Downloads` tab to see the\
    \ progress of all your downloads.\n\n![images](images/U2225.jpg)\n\n#### Where\
    \ the Downloads Go\n\nYou can see all of your downloads in either your `Music`\
    \ or `Videos` apps by clicking the `More` icon, which shows your downloads organized\
    \ by category. In other words, if you download a podcast, you will need to go\
    \ into your `Music` app, touch `More`, and then the `Podcasts` tab to see the\
    \ downloaded podcast.\n\nSometimes, you decide that you do not want all the downloads\
    \ you selected. If you want to stop a download and delete it, swipe your finger\
    \ over the download to bring up the `Delete` button, and then tap `Delete` (see\
    \ [Figure 22–3](#Chapter22.html#fig_22_3)).\n\n![images](images/2203.jpg)\n\n\
    **Figure 22–3.** *Deleting a file while downloading it*\n\n### Redeeming an iTunes\
    \ Gift Card\n\nOne of the cool things about the `iTunes` app on your iPhone is\
    \ that, just as with the `iTunes` app on your computer, you can redeem a gift\
    \ card and receive credit in your iTunes account for your purchases.\n\nAt the\
    \ bottom of the `iTunes` screen, you should see the `Redeem` button (see [Figure\
    \ 22–4](#Chapter22.html#fig_22_4)).\n\n![images](images/2204.jpg)\n\n**Figure\
    \ 22–4.** *Redeeming an iTunes gift card*\n\nTap the `Redeem` button to start\
    \ the process of entering your iTunes gift card number for an iTunes store credit."
