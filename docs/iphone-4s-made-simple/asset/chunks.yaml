  trans: "\n# 长按键盘快捷键输入符号等更多内容\n\n你可能想知道如何输入键盘上未显示的符号。\n\n**提示：** 你可以输入比屏幕上显示的更多的符号。\n\
    \n![images](img/U0218.jpg)\n\n你只需长按与你想要的符号相关的字母、数字或符号即可。\n\n例如，如果你想输入日元符号 (¥)，长按\
    \ `$` 键直到看到其他选项。接着，向上滑动手指以高亮选中日元符号，然后松开手指。\n\n这个技巧在 `Safari` 网络浏览器中的 `.com` 键以及输入电子邮件地址时长按`句号`（`.`）键也同样有效。你可以通过长按\
    \ `.com` 或`句号`键来获取其他网站后缀。\n\n![images](img/U0219.jpg)\n\n上图显示了 `.co`、`uk`、`.ie`、`.de`、`.ca`\
    \ 和 `.eu` 键。这些键在标准美式键盘上并不会显示，但在此例中它们存在，是因为我们安装了额外的国际键盘。你将在本章稍后的“用其他语言输入——国际键盘”部分学习如何启用国际键盘。\n\
    \n**提示：更多实用但隐藏的符号**\n\n在`符号`键盘上，`退格键`正上方有一个很好的项目符号字符。你也可以通过长按`零`键（`0`）获得角度符号。此外，你可以长按\
    \ `?` 和 `!` 键来获取它们在西班牙语中的倒置版本。\n\n## 大写锁定\n\n双击`Shift`键可开启大写锁定功能。当`Shift`键变为蓝色时，即表示已开启。![images](img/U0220.jpg)\n\
    \n要关闭大写锁定，只需再次按下`Shift`键即可。![images](img/U0221.jpg)\n\n## 快速选择、删除或更改文本\n\n你可能需要快速更改或删除正在输入的文本。请按以下步骤操作：\n\
    \n1.  双击选中你想要更改或删除的部分文本。\n\n    ![images](img/U0222.jpg)\n\n2.  拖动蓝色控制柄调整选区。\n\
    \n    ![images](img/U0223.jpg)\n\n3.  要删除选中的文本，按下`退格键`。![images](img/U0225.jpg)\n\
    \n    ![images](img/U0224.jpg)\n\n4.  要替换文本，直接开始输入即可。文本将立即被你输入的字母替换。\n\n## 键盘选项与设置\n\
    \n有一些键盘选项可以让你的 iPhone 输入更轻松。这些键盘选项位于`设置`应用的`通用`选项卡中。请按以下步骤访问：\n\n1.  点击`设置`图标。\n\
    2.  点击`通用`。\n3.  向上滑动，然后点击页面底部的`键盘`。\n\n![images](img/U0226.jpg)\n\n### 开启或关闭自动修正\n\
    \n如本章前面所述，自动修正功能将使用 iPhone 的内置词典自动更改常见拼写错误的单词。如果你希望此功能生效，需要确保它处于`开启`状态。（这是默认设置。）\n\
    \n### 自动大写\n\n当你开始一个新句子时，如果`自动大写`选项设置为`开启`，单词将自动大写。\n\n此功能还会正确大写常见的专有名词。例如，如果你输入“New\
    \ york”，系统会提示你将其更改为“New York”——同样，只需按下`空格键`即可执行修正。如果你用退格键删除一个大写字母，iPhone 会假定你新输入的字母也应大写。此功能默认也设为`开启`。\n\
    \n![images](img/U0227.jpg)\n\n### 启用大写锁定\n\n有时你可能只想输入大写字母；为此，只需双击`大写`键即可。\n\n\
    此功能默认设为`关闭`。\n\n### “.”快捷键\n\n如果你双击`空格键`，它会在句子末尾自动添加一个句号；此功能默认设为`开启`。\n\n## 用其他语言输入——国际键盘\n\
    \n在撰写本文时，iPhone 支持你用十几种不同的语言输入，包括从荷兰语到西班牙语的所有语言。某些亚洲语言，如日语和中文，提供了两种或三种键盘用于不同的输入法。\n\
    \n### 添加新的国际键盘\n\n请按以下步骤启用各种语言键盘：\n\n1.  点击`设置`图标。\n2.  点击`通用`。\n3.  点击页面底部的`键盘`。\n\
    4.  点击`国际键盘`。\n5.  点击`添加新键盘`。\n6.  点击列出的任何键盘或语言以添加它。现在你将看到该键盘出现在可用键盘列表中。\n7. \
    \ 在`符号`键盘上，`退格键`正上方有一个很好的项目符号字符。你也可以通过长按`零`键（`0`）获得角度符号。此外，你可以长按 `?` 和 `!` 键来获取它们在西班牙语中的倒置版本。\n\
    \n**提示：** iOS 5 包含内置的 Emoji 键盘。Emoji 是大量日本符号的集合，包括各种笑脸和哭脸、节日图像、建筑物和车辆等等。虽然这些符号在日本有更具体的含义，但世界各地的人们已经开始在短信、Twitter\
    \ 和其他在线消息服务中使用它们。\n\nEmoji 键盘可以像任何其他键盘一样在“设置”中添加。\n\n![images](img/U0228.jpg)\n\
    \n### 编辑、重新排序或删除键盘\n\n你可能想要调整某个键盘的选项、重新排序键盘在列表中的显示顺序，或者干脆删除不再使用的键盘。请按以下步骤操作：\n\
    \n1.  按照本章前面“添加新的国际键盘”部分中的步骤 1-4 操作；这将让你查看国际键盘列表。\n2.  要调整特定键盘的选项，在键盘列表中点击它。在我们的示例中，我们点击了`加拿大法语`。\n\
    3.  点击相应部分中的选项更改`软件键盘布局`。\n4.  点击相应部分中的选项调整`硬件键盘布局`。\n5.  点击左上角的`键盘`按钮保存你的选择并返回键盘列表。\n\
    \n    ![images](img/U0229.jpg)\n\n6.  要重新排序或删除键盘，点击右上角的`编辑`按钮。\n7.  要更改键盘顺序，触摸并拖动带有三条灰色横线的键盘右侧边缘向上或向下。\n\
    8.  要删除键盘，点击`红色减号`使其摆动到垂直位置，然后点击`删除`。\n9.  要完成键盘编辑，点击右上角的`完成`按钮。\n\n![images](img/U0230.jpg)\n\
    \n当你至少安装了一个国际键盘后，你会注意到出现了一个小小的`地球`键。按下`地球`键可在所有语言之间循环切换。\n\n**提示：** 你可以长按`地球`键来查看可用键盘列表。这将使你能够快速选择你想要使用的键盘。\n\
    \n![images](img/U0231.jpg)\n\n日语、中文和一些其他语言提供了多种键盘选项，以满足你的输入偏好。\n\n在某些语言（如日语）中，你会看到输入的字母变成字符，或者你可以自己手写绘制字符。你还可能在键盘上方看到一行其他字符组合。当你看到想要的组合时，点击它。\n"
- fmt: "### Copy and Paste\n\nThe Copy and Paste feature is very useful for saving\
    \ time and increasing your typing accuracy. You can use this feature to take text\
    \ from your e-mail (such as meeting details) and paste it into your calendar.\
    \ Or you may want to simply copy an e-mail address from one place in a form into\
    \ another to save yourself the time required to retype it. (We show you this technique\
    \ in the “Setup Exchange/Google Account” section of [Chapter 4](#Chapter04.html#ch4):\
    \ “Other Ways to Sync.”) There are many places to use Copy and Paste; the more\
    \ comfortable you are with it, the more you will use it. You can even copy text\
    \ or images from your `Safari` web browser and paste them into a `Notes` or `Mail`\
    \ message.\n\n#### Selecting Text by Double-Tapping It\n\nIf you are reading or\
    \ typing text, you can double-tap it to start selecting some text to copy. This\
    \ works well in the `Mail`, `Messages`, and `Notes` apps.\n\nYou will see a box\
    \ with blue dots (handles) at opposite corners.\n\n![images](images/U0232.jpg)\n\
    \nJust drag the handles to select the text you wish to highlight and copy.\n\n\
    ![images](images/U0233.jpg)\n\n**TIP:** If you want to select all the text, tap\
    \ the cursor or double-tap the screen above or below the text. This will display\
    \ a pop-up window that shows you `Select` and `Select All` options. Tap `Select`\
    \ to select a word or tap `Select All` to highlight all the text.\n\n![images](images/U0234.jpg)\n\
    \n#### Selecting Text with Two-Finger Touch\n\nThe other way to select text requires\
    \ that you touch the screen simultaneously with two fingers. This seems to work\
    \ best if you are holding your iPhone with one hand and use your thumb and forefinger\
    \ from your other hand to touch the screen. You can also set the iPhone down on\
    \ the table and touch the screen with a finger from both hands. Follow these steps\
    \ to use this approach:\n\n1.  Touch the screen simultaneously at the beginning\
    \ and end of the text you want to select. Don’t worry if you cannot get the selection\
    \ exactly on the first touch.\n2.  After the two-finger touch, use the blue handles\
    \ to drag the beginning and end of the selection to the correct positions.\n\n\
    #### Selecting a Web Site or Other Non-Editable Text with Touch and Hold\n\nIn\
    \ the `Safari` web browser and other places where you cannot edit the text, hold\
    \ your finger on some text and the paragraph will become highlighted with handles\
    \ at each of the corners.\n\nNext, drag the handles if you want to select even\
    \ more text.\n\n**NOTE:** If you drag smaller than a paragraph, the selector will\
    \ switch to fine-text mode and give you the blue handles on both ends of the selection\
    \ to pick just the characters or words you want. If you drag your finger beyond\
    \ a paragraph, you get the gross-text selector, which you can drag up or down\
    \ to select whole reams of text and graphics.\n\n![images](images/U0235.jpg)\n\
    \n#### Cut or Copy the Text\n\nOnce you have highlighted the text that you wish\
    \ to copy, just touch the `Copy` tab at the top of the screen. The tab will turn\
    \ blue, indicating that the text is on the clipboard.\n\n**NOTE:** If you have\
    \ previously cut or copied text, then you will also see the `Paste` option, as\
    \ shown to the right.\n\n![images](images/U0236.jpg)\n\n#### App Switching and\
    \ Multitasking\n\nAfter you copy text, you may want to paste it into another app.\
    \ For example, you might want to copy some text from Safari and paste it into\
    \ Notes or a Mail message. The easiest way to jump between apps is to use the\
    \ `App Switcher` app. Follow these steps to paste text from one app into another:\n\
    \n1.  Copy or cut your text.\n2.  Double-tap the `Home` button to bring up the\
    \ `App Switcher` app on the bottom of your screen.\n3.  If you just left an app\
    \ running in the background, you will be able to find it in the `App Switcher`\
    \ bar.\n4.  Swipe right or left to find the app you want and tap it.\n5.  If you\
    \ don’t see the app you want in the `App Switcher` bar, then tap the `Home` button\
    \ and start it from the `Home` screen.\n6.  Now, paste the text by pressing and\
    \ holding the screen, and then selecting `Paste` from the pop-up window.\n7. \
    \ Double-tap the `Home` button again and tap the app you just left to jump back\
    \ to it.\n\n#### Pasting the Text\n\nPasting the text into the same app is easy.\
    \ For example, simply follow these steps to paste the text into the same `Notes`\
    \ or `Mail` message:\n\n1.  Use your finger to move the cursor to where you want\
    \ to paste the text. Remember the `Magnifying Glass` trick we showed earlier in\
    \ this chapter; this can help you position the cursor.\n2.  Once you let go of\
    \ the screen, you should see a pop-up window asking whether you to `Select`, `Select\
    \ All`, or `Paste`.\n3.  If you don’t see this pop-up window, then double-tap\
    \ the screen.\n4.  Select `Paste` to paste your selection.\n\n#### Shake to Undo\n\
    \nOne of the great features of the iPhone is the ability to undo typing, copy\
    \ and pasting, even Siri dictations you just completed.\n\nAll you have to do\
    \ is shake the iPhone after the paste. A new pop-up window will appear that gives\
    \ you the option to undo what you have just done.\n\nTap `Undo Typing` or `Undo\
    \ Paste` to correct the mistake.\n\n![images](images/U0237.jpg)\n\n![images](images/U0238.jpg)\n\
    \n**TIP: Delete Text Quickly**\n\nIf you ever want to delete a number of lines\
    \ of text, a paragraph, or even all the text you just typed quickly with only\
    \ one or two taps, this tip is for you. First, use the techniques described previously\
    \ to select the text you want to delete. Next, simply press the `Delete` key ![images](images/U0239.jpg)\
    \ in the lower-left corner of the keyboard to delete all the selected text.\n\n\
    ### Finding Things with Spotlight Search\n\nThe Spotlight Search is a great feature\
    \ on your iPhone that helps you find information. This is a proprietary search\
    \ method from Apple for performing a global search on your iPhone. You can use\
    \ this feature to search for a name, event, or subject.\n\nThe concept is simple.\
    \ Let’s say you are looking for something related to Martin. You cannot remember\
    \ if it was an e-mail, a document in `Notes`, or a Calendar event; however, you\
    \ do know it was related to Martin.\n\nThis is the perfect time to use the Spotlight\
    \ Search feature to find everything related to Martin on your iPhone.\n\n####\
    \ Activating Spotlight Search\n\nFirst, you need to bring up the `Spotlight Search`\
    \ page, which resides to the left of the first page of the `Home` screen.\n\n\
    ![images](images/U0240.jpg)\n\nOn the left side of the first circle (indicating\
    \ the first page of your `Home` screen), you can see a very small `Magnifying\
    \ Glass` icon.\n\nSwipe your finger from left to right on the first page of icons\
    \ to see the `Spotlight Search` page. You can also press the Home button from\
    \ your first screen of Icons to see this same search page.\n\n![images](images/U0241.jpg)\n\
    \nFollow these steps to perform a search with this feature:\n\n1.  On the `Spotlight\
    \ Search` page, type in one or more words as your search parameters.\n2.  Tap\
    \ the `Search` button in the lower-right corner to execute your search.\n\n  \
    \  **TIP:** If you are looking for a person, type his full name to more accurately\
    \ find items from only that person (for example, “Martin Trautschold”). This will\
    \ eliminate any other Martins who might be in your iPhone, enabling you to find\
    \ items only related to Martin Trautschold.\n\n3.  In the search result, you’ll\
    \ see all e-mails, appointments, meeting invitations, and contact information\
    \ the search finds. Swipe down to see more results.\n4.  Tap one of the results\
    \ in the list to view its contents.\n\nYour search results stay there until you\
    \ clear them. This means you can return to the `Spotlight Search` page to view\
    \ your prior search results simply by swiping to the right from your `Home` screen.\n\
    \nTo clear the `Search` field, just touch the `X` in the Search bar. To exit the\
    \ `Spotlight Search` page, just press the `Home` key or swipe to the left."
