  trans: "\n### 更改锁定屏幕与主屏幕壁纸\n\n实际上，你的 iPhone 上可以个性定制的屏幕有两个，通过更改壁纸来实现。\n\n当你首次开启 iPhone\
    \ 或将其唤醒时，看到的是`锁定`屏幕。此屏幕的壁纸显示在`滑动来解锁`滑块条的后方。\n\n`主`屏幕则展示了你所有的应用图标。你可以在图标后方看到壁纸。你可以使用\
    \ iPhone 自带的壁纸图片，也可以使用自己的图片。\n\n**提示：** 你可能希望`锁定`屏幕的壁纸比`主`屏幕壁纸更少个人色彩。例如，你可以选择在`锁定`屏幕放一张普通的风景图，而在`主`屏幕放一张亲人的照片。此外，你可能更愿意选择一张不那么花哨的`主`屏幕壁纸，以免与应用图标产生冲突。\n\
    \n#### 通过“设置”应用更改壁纸\n\n在 iPhone 上更改壁纸的方法有好几种。第一种方法非常直接：只需通过“设置”应用来调整你的壁纸：\n\n\
    1.  轻点“设置”图标。\n2.  轻点“墙纸”。\n\n    ![images](img/U0801.jpg)\n\n3.  轻点当前所选壁纸的图像。左侧显示的是`锁定`屏幕，右侧是`主`屏幕。\n\
    \n    ![images](img/U0802.jpg)\n\n4.  选择一个相簿：\n\n    ![images](img/U0803.jpg)\n\
    \n    *   轻点“墙纸”以选择预装的壁纸。\n    *   轻点“相机胶卷”（如果在 iCloud 中启用了“我的照片流”，则轻点“我的照片流”），以从你用\
    \ iPhone 拍摄的照片、从网页保存的图片、屏幕截图（通过同时按住`主屏幕`按钮和`电源/睡眠`键截取）甚至壁纸应用中进行选择。\n    *   轻点任何其他相簿以查看你已同步的图片。\n\
    5.  轻点某个相簿后，你将看到该相簿中的所有图片。向上或向下滑动可查看所有图片。你最近添加的图片会位于列表的最底部。\n6.  轻点任意图片以将其选中并全屏查看。\n\
    7.  现在你可以移动和缩放图片：\n\n    ![images](img/U0804.jpg)\n\n    *   通过触摸并拖动手指来移动图片。\n\
    \    *   通过张开或捏合手指来放大或缩小。\n    *   如果不喜欢该图片，轻点“取消”按钮可返回相簿。\n8.  轻点“设定”按钮以将该图片设为你的壁纸。\n\
    9.  选择你想要壁纸应用的位置：\n\n    ![images](img/U0805.jpg)\n\n    *   轻点“设定锁定屏幕”按钮，将图片仅设为你的`锁定`屏幕壁纸。\n\
    \    *   轻点“设定主屏幕”按钮，将图片仅设为你的`主`屏幕壁纸。\n    *   轻点“同时设定”按钮，将图片同时设为`锁定`屏幕和`主`屏幕的壁纸。\n\
    10. 轻点`主屏幕`按钮以退出“设置”应用，并查看你的新壁纸，如图 8–1 所示。\n\n![images](img/0801.jpg)\n\n**图 8–1.**\
    \ *查看你的`锁定`屏幕和`主`屏幕壁纸*\n\n#### 使用任意照片作为壁纸\n\n更改壁纸的第二种方法是：查看“照片”图库中的任意图片，并将其选为壁纸。请按照以下步骤操作：\n\
    \n1.  轻点“照片”图标开始操作。要了解更多关于处理照片的信息，请参见第 20 章：“使用照片”。\n2.  轻点你想要浏览以寻找壁纸的照片相簿。\n\
    3.  当你找到一张想用的照片时，轻点它，它将在屏幕上打开。\n4.  你轻点的缩略图将填满屏幕。如果这是你想要使用的图片，请轻点屏幕左下角的“设定为”图标\
    \ ![images](img/U0806.jpg)。\n5.  轻点“用作墙纸”。\n\n    ![images](img/U0807.jpg)\n\n\
    6.  要移动、缩放图片并将其设为`主`屏幕或`锁定`屏幕壁纸，请按照前一节的步骤 7-9 操作。如果你决定改用另一张图片，请选择“取消”并挑选另一张。\n\
    \n### 从免费应用下载精美的壁纸\n\n前往 App Store 并搜索“backgrounds”或“wallpapers”（参见第 23 章：“神奇的\
    \ App Store”以获取更多信息）。你会找到许多专门为你的 iPhone 设计的免费或低成本应用。在本节中，我们将重点介绍这类应用中的一款，即 Apalon\
    \ 出品的 `Pimp Your Screen`。这款应用有数百张精美的背景图片可供你的 iPhone 下载，且在本书出版时售价仅为 0.99 美元。\n\n\
    **注意：** 使用 `Pimp Your Screen` 时，与大多数壁纸应用一样，你需要保持有效的互联网连接——无论是 Wi-Fi 还是 3G。由于图片文件通常很大，建议你尽量使用\
    \ Wi-Fi，除非你的 3G 蜂窝数据网络套餐是无限流量的。\n\n#### 使用壁纸应用\n\n安装 `Pimp Your Screen` 后，你就可以开始使用了：\n\
    \n1.  轻点 `Pimp Your Screen` 图标以启动应用。\n\n    ![images](img/U0808.jpg)\n\n2.  应用的主屏幕提供了多个类别供你选择：`App\
    \ Shelves`（放置应用的架子——有点像 iBooks 或报摊）、`Neon Combos`（霓虹背景）、`Home Screens`（漂亮的主屏幕）、`Icon\
    \ Skins`（创建背景以突出显示你的图标）。然后你可以使用底部的两个选项——`Lock Screen Maker` 和 `Home Screen Maker`——来创建你自己个性化的锁定屏幕和主屏幕，如图\
    \ 8–2 所示。\n\n    ![images](img/0802.jpg)\n\n    **图 8–2.** *使用 Pimp Your Screen\
    \ 应用。*\n\n3.  轻点任一类别后，你可以向左或向右滑动以查看更多壁纸图片选项。要将壁纸保存到你的`相机胶卷`相簿中，请轻点图片底部中央的“保存”按钮。\n\
    4.  如果你不喜欢该图片，请轻点左下角的`主屏幕`按钮返回到主屏幕菜单。\n\n#### 使用你新保存的壁纸\n\n一旦你选好壁纸图片并保存到 iPhone，你需要按照本章前面“通过‘设置’应用更改壁纸”部分描述的步骤来选中它。\n\
    \n请记住，下载的壁纸会存放在`相机胶卷`相簿中。在你轻点`相机胶卷`将其打开后，你需要一直滚动到底部才能看到最近添加的内容。\n"
- fmt: "### Adjusting Sounds on Your iPhone\n\nYou can fine-tune your iPhone so that\
    \ it does or does not make sounds when certain events happen, such as an incoming\
    \ phone call, a new email, or a calendar alert. You can also customize what happens\
    \ when you send mail or type on the keyboard.\n\nFollow these steps to adjust\
    \ the sounds played on your iPhone:\n\n1.  Tap your `Settings` icon.\n2.  Tap\
    \ `Sounds`.\n\n    ![images](images/U0809.jpg)\n\n3.  You can adjust whether you\
    \ want your iPhone to vibrate in both the `Silent` and `Ring` modes. Set the switches\
    \ to `ON` or `OFF` next to `Vibrate`.\n4.  To adjust the volume of the ringtone\
    \ and other alerts, move the slider bar just above `Ringtone`.\n5.  To change\
    \ your phone's ringtone or text tone; the sound played when you receive a new\
    \ mail, tweet, calendar alert, or reminder alert; or the sound played when a sent\
    \ mail completes—tap the item you wish to change.\n6.  This screen lets you select\
    \ a new ringtone. Tap any ringtone to play it and select it. (You can tell whether\
    \ a ringtone is selected by the checkmark next to its name. `Bell Tower` is selected\
    \ in the image to the right.)\n\n    ![images](images/U0810.jpg)\n\n7.  If none\
    \ of the tones available appeal to you, you can click `Buy More Tones` and be\
    \ taken to the iTunes Ringtone Store, where you can purchase some of your favorite\
    \ songs as tones.\n8.  When you are done, tap the `Sounds` button in the upper-left\
    \ corner.\n9.  Use the same steps to change the sound you hear for a text tone,\
    \ new mail, tweet, and so on.\n\n    **TIP:** See [Chapter 9](#Chapter09.html#ch9):\
    \ \"Using your Phone\" to learn about custom ringtones.\n\n10.  In all sound categories\
    \ except `Ringtone`, you can turn off the sound played by selecting the `None`\
    \ entry at the top of the\n\n    ![images](images/U0811.jpg)\n\n11.  `Lock Sounds`\
    \ and `Keyboard Clicks` can be adjusted by tapping the switches to set them to\
    \ `ON` or `OFF`. When done, press the `Home` button to exit.\n\n    ![images](images/U0812.jpg)\n\
    \n**TIP:** On a related note, you can lock the maximum volume playable from the\
    \ `Music` app. Do so by going into `Settings` ![images](images/U001.jpg) `Music`\
    \ ![images](images/U001.jpg) `Volume Limit` ![images](images/U001.jpg) `Lock Volume\
    \ Limit`. We show you how to do this in [Chapter 12](#Chapter12.html#ch12): \"\
    Playing Music.\"\n\n### Keyboard Options\n\nYou can fine-tune your keyboard by\
    \ selecting various languages and changing settings like `Auto-Correction` and\
    \ `Auto-Capitalization`. You can even have your iPhone speak the auto-correction\
    \ suggestions to you as you type. See [Chapter 2](#Chapter02.html#ch2): \"Typing,\
    \ Copy and Search\" for a description of the various keyboard options and how\
    \ to use them.\n\n### Securing Your iPhone with a Passcode\n\nYour iPhone can\
    \ hold a great deal of valuable information. This is especially true if you use\
    \ it to save information like the Social Security numbers and birth dates of your\
    \ family members. It's a good idea to make sure that anyone who picks up your\
    \ iPhone can't access all that information. Also, if your children are like ours,\
    \ they'll probably pick up your cool iPhone and start surfing the Web or playing\
    \ a game. You might want to enable some security restrictions to keep them safe.\n\
    \n#### Setting a Simple Four-Digit Passcode\n\nOn your iPhone, you have the option\
    \ of setting a four-digit passcode that prevents unauthorized access to your iPhone\
    \ and your information. If the wrong passcode is entered, however, even you won't\
    \ be able to access your information, so it is a good idea to use a code you'll\
    \ remember easily.\n\nFollow these steps to set a passcode to lock your iPhone:\n\
    \n1.  Tap the `Settings` icon.\n\n    ![images](images/U0813.jpg)\n\n2.  Tap `General`.\n\
    3.  Scroll down and tap `Passcode Lock`.\n4.  Tap `Turn Passcode On` to set a\
    \ passcode.\n5.  The default passcode is a simple four-digit passcode. Use the\
    \ keyboard to enter a four-digit code. You will then be prompted to enter your\
    \ code once more.\n\n    ![images](images/U0814.jpg)\n\n#### Setting a More Complex\
    \ Password\n\nIf you prefer to have a password that is more complicated than just\
    \ four digits, you can do so by setting the `Simple Passcode` option on the `Passcode\
    \ Lock` screen to `OFF`.\n\n![images](images/U0815.jpg)\n\nYou will then be able\
    \ to enter a new passcode with letters, numbers, and even symbols.\n\n**CAUTION:**\
    \ Be careful! If you forget your passcode, you cannot unlock your iPhone.\n\n\
    #### Adjusting Your Passcode Options\n\nOnce you have set your passcode, you will\
    \ be presented with a few options:\n\n![images](images/U0816.jpg)\n\n*   `Turn\
    \ Passcode Off`\n*   `Change Passcode`\n*   `Require Passcode` (`Immediately`,\
    \ `After 1 Minute`, `After 5 Minutes`, `After 15 Minutes`, `After 1 Hour`)\n*\
    \   `Simple Passcode` (`ON` = four digits; `OFF` = any letters, numbers, or symbols)\n\
    *   `Siri` (`ON` = allow Siri without entering your passcode; `OFF` = prevent\
    \ Siri until your passcode is entered)\n*   `Erase Data` (`ON` = erase all data\
    \ after ten incorrect password attempts; `OFF` = do not erase data)\n\n**CAUTION:**\
    \ You may want to set `Erase Data` to `OFF` if you have young children who like\
    \ to bang away at the security to unlock the keyboard when it comes out of `Sleep`\
    \ mode. Otherwise, you may end up with your iPhone being erased.\n\n**NOTE:**\
    \ Setting a shorter time for `Require Passcode` is more secure. Setting the time\
    \ as `Immediately` —the default—is most secure. However, using the setting of\
    \ `1 Minute` may save you the headache of retyping your passcode if you accidentally\
    \ lock your iPhone.\n\n### Setting Restrictions\n\nYou might decide you don't\
    \ want your kids listening to explicit lyrics in the music on your iPhone. You\
    \ may also want to block them from visiting YouTube or any other web site. Setting\
    \ such restrictions is quite easy on your iPhone.\n\n#### Restricting Apps\n\n\
    Follow these steps to restrict access to content on your iPhone:\n\n![images](images/U0817.jpg)\n\
    \n1.  Tap `General` in your `Settings` app.\n2.  Scroll down the page and tap\
    \ `Restrictions`.\n3.  Tap the `Enable Restrictions` button.\n4.  You will now\
    \ be prompted to enter a Restrictions Passcode—just pick a four-digit code you\
    \ will remember.\n\n**NOTE:** This Restrictions Passcode is a separate passcode\
    \ from your main iPhone passcode. You can certainly set it to be the same, which\
    \ will make it easier to remember. However, this could be problematic if you let\
    \ your family know the main passcode, but do not want them adjusting the restrictions.\
    \ You will need to enter this Restrictions Passcode to turn off restrictions later.\n\
    \n![images](images/U0818.jpg)\n\nNotice that you can adjust whether to allow certain\
    \ apps or actions to function. For example, the screen shot to the right lets\
    \ you adjust restrictions for the following apps: `Safari`, `YouTube`, `Camera`,\
    \ `FaceTime`, `iTunes`, and `Ping`. This screen also lets you restrict access\
    \ to `Installing Apps` or `Deleting Apps and Siri and Explicit Language in Siri`.\
    \ Finally, you can restrict the ability to make changes to `Location` and `Accounts`.\n\
    \n![images](images/U0819.jpg)\n\nIn all cases, `OFF` = restricted.\n\nYou might\
    \ think that `ON` means something is restricted, but it is the opposite. In order\
    \ to disable or restrict something, you need to touch the slider next to it and\
    \ change it to `OFF`. If you notice the word `Allow` above all the options, then\
    \ it makes sense.\n\n**NOTE:** The icons for any apps you restrict will disappear.\
    \ So if you were to restrict access to `YouTube`, the `App Store`, and the `FaceTime`\
    \ apps; then the `YouTube` and `App Store` icons would disappear from the `Home`\
    \ screen, and your iPhone's `FaceTime` icon would also be removed."
