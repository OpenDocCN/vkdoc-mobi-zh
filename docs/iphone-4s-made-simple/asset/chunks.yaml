  trans: "\n#### 你可以向 Siri 询问什么\n\n苹果建议你像与真人交谈一样与 Siri 对话。不必刻意记住一组固定的指令或查询——它们的种类和变体实在太多，难以全部记住。相反，只需直接告诉\
    \ Siri 你想要什么。以下是 Siri 能为你做的一些示例：\n\n*   设置提醒、日历 appointments*、时钟闹钟和计时器。\n*   发送短信**、信息和电子邮件。\n\
    *   播放音乐。\n*   搜索基于位置的信息，例如餐厅和商家列表。你也可以搜索前往某个位置的路线。\n*   搜索 `Yelp`（美国地区）、`Wolfram\
    \ Alpha` 和 `Google` 以获取信息。\n*   询问天气和股票信息。\n*   朗读你的 `SMS`/`iMessage` 信息。\n* \
    \  在任何应用中听写文字。\n*   问些傻问题——苹果实际上为其中许多问题预设了有趣的回答。\n\n更令人印象深刻的是，Siri 可以组合许多这些功能来完成复杂的交互。例如，Siri\
    \ 可以读取一条约会晚餐的请求信息，搜索餐厅，获取路线，发送确认信息，然后添加晚餐的日程——所有这些都作为交互式确认的一部分。\n\n以下只是你可以询问的一些内容，以及一些提问方式：\n\
    \n*   “Siri，提醒我离开家时给上班的妈妈打电话。”\n\n    这将使 Siri 创建一个提醒，将出发地点设置为你的家庭地址，并在你离开时弹出一个包含你妈妈工作电话的提醒，方便你直接拨号。\n\
    \n*   “Siri，告诉我的老板我马上到。”\n\n    Siri 会找到被定义为“老板”的联系人，获取手机号码，并向她发送一条内容为“我马上到”的\
    \ `SMS`/`iMessage`。\n\n*   “Siri，读一下我的消息。”\n\n    Siri 会朗读所有新收到的 `SMS` 或 `iMessage`。\n\
    \n*   “Siri，30 分钟后叫醒我。”\n\n    Siri 会设置一个时钟计时器，将在 30 分钟后响铃（希望那时你的小憩已经结束）。\n\n\
    \    ![images](img/U0711.jpg)\n\n*   “Siri，我今天需要穿雨衣吗？”\n\n    Siri 会查看天气，判断是否可能下雨，并告知你是否需要担心被淋湿。\n\
    \n    ![images](img/U0712.jpg)\n\n*   “Siri，给我讲个笑话。”\n\n    Siri 可能会开始讲那个关于两部\
    \ iPhone 走进一家酒吧的笑话……\n\n    ![images](img/U0713.jpg)\n\n*   “Siri，我午餐去哪里能吃到意大利菜？”\n\
    \n    Siri 会搜索附近的餐厅，并在地图上显示出来。在美国地区，它还可以按 `Yelp` 排名进行排序。\n\n*   “Siri，电影 *《冲出宁静号》*\
    \ 的主演是谁？”\n\n    Siri 会搜索 `Wolfram Alpha`，并给出该电影的演员表。\n\n*   “Siri，你最喜欢的颜色是什么？”\n\
    \n    Siri 会给出几种可能的回答之一，也许会说你的语言缺乏足够的维度来恰当地描述那种正确的绿色色调。\n\nSiri 返回的结果有时会以小部件的形式呈现，如果你弄错了，可以对其进行调整或禁用。例如，你可以快速关闭一个`闹钟`小部件，将一个`提醒`小部件标记为已完成，点击一个`联系人`小部件中的电子邮件地址，等等。\n\
    \n请注意，Siri 目前并不完美。例如，有时它会误解你的意思。其他时候，服务器可能会过度繁忙。因此，Siri 有时会犯错或做错事。但随着时间的推移，随着它越来越了解你，你也越来越懂得如何组织你的问题和指令，它会变得更好。\n\
    \n起初最好只是玩玩它。尽可能多地试验，感受一下怎样做才能获得最佳效果。\n\n#### 更改名称和设置关系\n\n你可能在前面的例子中注意到，我们使用了诸如*妈妈*和*老板*这样的词，而\
    \ Siri 明白我们在谈论谁。然而，在 Siri 能做到这一点之前，你需要先设置好这些人。操作方法如下：\n\n1.  按住 `主屏幕` 按钮启动 Siri。\n\
    2.  告诉 Siri 你要为谁设置关系，以及是什么关系。例如，你可以说：“简·史密斯是我的妈妈。”\n3.  Siri 会询问你是否要记住“简·史密斯”是你的妈妈。\n\
    4.  听到提示音后，说“是”。（或者，只需轻点`是`按钮。）\n5.  Siri 会用以下语句确认：“好的，我已添加此关系。”接着，你将看到更新后的联系人卡片。\n\
    \n![images](img/U0714.jpg)\n\n**注意：** 关系一旦创建，Siri 就无法移除。如果你犯了错误或以后想更改关系，则必须前往`通讯录`应用，轻点`编辑`，然后手动`删除`该关系。\n\
    \n如果你希望 Siri 用昵称呼叫你——比如，用*鲍勃*而不是*罗伯特*，甚至用像*主人*这样有点傻的称呼——你可以轻松地做出更改：\n\n1.  按住\
    \ `主屏幕` 按钮启动 Siri。\n2.  告诉 Siri 你想被称呼的新名字，说一些像“叫我鲍勃”这样的话。\n3.  Siri 会询问你是否要记住*鲍勃*作为你的新名字。\n\
    4.  听到提示音后，说“是”。（或者，你可以直接轻点`是`按钮。）\n\n    ![images](img/U0715.jpg)\n\n5.  Siri\
    \ 会用这样的语句确认操作：“好的，我已添加此名字。”然后，你会在联系人卡片上看到更新后的昵称。\n\n#### 使用听写功能\n\niPhone 4S 的键盘引入了一项新功能：在`空格`键正左侧有一个小麦克风按钮。\n\
    \n![images](img/U0716.jpg)\n\n轻点它，你的屏幕会向上滑动，显示出一个发光的紫色麦克风。像对 Siri 说话那样对它说话；说完后，轻点`完成`按钮。你所说的所有内容都会被转写并作为文本输入。\n\
    \n没有哪个文本转语音引擎是完美的，但 Siri 在转写你所说内容方面做得相当不错。如果它出了什么错，你可以像编辑用键盘输入的文本那样编辑这些文字。\n\n\
    ![images](img/U0717.jpg)\n\n除了基本的词语和名字，Siri 还能理解广泛的符号和标点。例如，你可以说“句号”、“感叹号”，甚至“左括号”或“右方括号”。你也可以说“换行”或“新段落”。实际上，你可以用\
    \ Siri 输入几乎任何你知道正确名称的字符。\n\n#### Siri 不能做什么\n\nSiri 开箱就能做很多事情，以至于很难记住它不能做什么。话虽如此，Siri\
    \ 是一项在线服务，苹果能够也将会随着时间的推移不断增加新功能。仅仅因为 Siri 今天不能做某事，并不意味着它明天也不能做。在撰写本文时，以下是 Siri\
    \ 尚不能做的一些事情：\n\n*   Siri 无法切换设置。你不能告诉它打开或关闭 Wi-Fi，或进入飞行模式。\n*   Siri 无法启动应用。你不能告诉它启动`Facebook`或你最喜欢的游戏。\n\
    \nSiri 无法阅读电子邮件、Twitter 回复或信息之外的任何内容。如果你需要这项功能，必须使用像 `Tweet Speaker` 这样的第三方应用。\n\
    \n## 第 8 章\n\n## 个性化与安全\n\n在本章中，你将学习几种个性化设置 iPhone 的简单方法。你还将学习如何使用密码保护来确保 iPhone\
    \ 的安全。我们将向你展示在哪里可以下载免费壁纸来改变`锁定`和`主屏幕`的外观。我们还将向你展示如何通过调整各种活动的时间和声音来个性化 iPhone 发出的声音。iPhone\
    \ 的许多方面都可以根据你的需求和品味进行微调，因此你可以赋予 iPhone 更具个性化的外观和感觉。\n"
- fmt: "### Changing Your Lock Screen and Home Screen Wallpapers\n\nThere are actually\
    \ two screens you can personalize on your iPhone by changing the wallpaper.\n\n\
    The `Lock` screen appears when you first turn on your iPhone or wake it up. The\
    \ wallpaper for this screen image is shown behind the `Slide to Unlock` slider\
    \ bar.\n\nThe `Home` screen features all of your icons. You can see the wallpaper\
    \ behind the icons. You can use the wallpaper pictures that come with the iPhone,\
    \ or you can use your own images.\n\n**TIP:** You may want the wallpaper for your\
    \ `Lock` screen to be less personal than your `Home` screen wallpaper. For example,\
    \ you might choose to put a generic landscape image on your `Lock` screen and\
    \ a picture of a loved one on your `Home` screen. Also, you might want to choose\
    \ a `Home` screen wallpaper that is less busy, so it does not clash with the icons.\n\
    \n#### Changing Wallpaper from Your Settings App\n\nThere are a couple of ways\
    \ to change the wallpaper on your iPhone. The first way is very straightforward:\
    \ simply adjust your wallpaper from your `Settings` app:\n\n1.  Tap the `Settings`\
    \ icon.\n2.  Tap `Wallpaper`.\n\n    ![images](images/U0801.jpg)\n\n3.  Tap the\
    \ image of your currently selected wallpapers. The `Lock` screen is shown on the\
    \ left, and the `Home` screen is on the right.\n\n    ![images](images/U0802.jpg)\n\
    \n4.  Choose an album:\n\n    ![images](images/U0803.jpg)\n\n    *   Tap `Wallpaper`\
    \ to select a preloaded wallpaper.\n    *   Tap `Camera Roll` (or `Photo Stream`\
    \ if you have it enabled in iCloud) to select from pictures you've taken with\
    \ your iPhone, images you've saved from the Web; from screenshots (which you take\
    \ by pressing and hold the `Home` button and `Power/Sleep` key); or even from\
    \ wallpaper apps.\n    *   Tap any of the other albums to view pictures you have\
    \ synced.\n5.  Once you tap an album, you will see all the images within that\
    \ album. Swipe up or down to view all images. The images you have most recently\
    \ added will be at the very bottom of the list.\n6.  Tap any image to select it\
    \ and view it full screen.\n7.  Now you can move and scale the image:\n\n    ![images](images/U0804.jpg)\n\
    \n    *   Move the image by touching and dragging your finger.\n    *   Zoom in\
    \ or out by pinching your fingers open or closed.\n    *   Tap the `Cancel` button\
    \ to return to the album if you don't like the image.\n8.  Tap the `Set` button\
    \ to set the image as your wallpaper.\n9.  Select where you want this wallpaper\
    \ to be used:\n\n    ![images](images/U0805.jpg)\n\n    *   Tap the `Set Lock\
    \ Screen` button to set the image only for your `Lock` screen.\n    *   Tap the\
    \ `Set Home Screen` button to set the image only for your `Home` screen.\n   \
    \ *   Tap the `Set Both` button to set the image for both your `Lock` and `Home`\
    \ screens.\n10. Tap the `Home` button to exit the `Settings` app and check out\
    \ your new wallpapers, as shown in [Figure 8–1](#Chapter08.html#fig_8_1).\n\n\
    ![images](images/0801.jpg)\n\n**Figure 8–1.** *Viewing your `Lock` screen and\
    \ `Home` screen wallpapers*\n\n#### Using Any Photo As Wallpaper\n\nThe second\
    \ way to change your wallpaper is to view any picture in your `Photos` collection\
    \ and select it as your wallpaper. Follow these steps to do so:\n\n1.  Tap the\
    \ `Photos` icon to get started. To learn more about working with photos, check\
    \ out [Chapter 20](#Chapter20.html#ch20): “Working with Photos.”\n2.  Touch the\
    \ photo album you want to look through to find your wallpaper.\n3.  When you find\
    \ a photo you want to use, touch it and it will open on your screen.\n4.  The\
    \ thumbnail you tap will fill the screen. If this is the image you want to use,\
    \ tap the `Set as` icon ![images](images/U0806.jpg) on the lower-left corner of\
    \ the screen.\n5.  Tap `Use As Wallpaper`.\n\n    ![images](images/U0807.jpg)\n\
    \n6.  To move, scale, and set an image as your `Home` or `Lock` screen wallpaper,\
    \ follow Steps 7-9 from the previous section. If you decide you'd rather use a\
    \ different picture, choose `Cancel` and pick a different one.\n\n### Downloading\
    \ Great Wallpaper from Free Apps\n\nGo to the App Store and do a search for “backgrounds”\
    \ or “wallpapers” (see [Chapter 23](#Chapter23.html#ch23): “The Amazing App Store”\
    \ for more information on this). You'll find a number of free and low-cost apps\
    \ designed specifically for your iPhone. In this section, we will highlight one\
    \ app of many in this genre called `Pimp Your Screen` from Apalon. This app has\
    \ hundreds of beautiful background images you can download for your iPhone and\
    \ was currently just $0.99 as of publishing time.\n\n**NOTE:** With `Pimp Your\
    \ Screen`, as with most wallpaper apps, you will need a live Internet connection—either\
    \ Wi-Fi or 3G. Because image files tend to be quite large, you should probably\
    \ stick with Wi-Fi unless you have an unlimited monthly data plan for your 3G\
    \ cellular data network.\n\n#### Using the Wallpaper App\n\nAfter you install\
    \ `Pimp Your Screen`, you're ready to get started:\n\n1.  Tap the `Pimp Your Screen`\
    \ icon to start the app.\n\n    ![images](images/U0808.jpg)\n\n2.  The app's home\
    \ screen has a number of categories to choose from: `App Shelves` (shelves to\
    \ hold your apps - sort of like iBooks or Newsstand), `Neon Combos` (neon backgrounds),\
    \ `Home Screens` (nice looking home screens), `Icon Skins` (create backgrounds\
    \ to highlight your icons). Then you can create your own personalized Lock and\
    \ Home screen using the bottom two options; `Lock Screen Maker` and `Home Screen\
    \ Maker` as shown in [Figure 8–2](#Chapter08.html#fig_8_2).\n\n    ![images](images/0802.jpg)\n\
    \n    **Figure 8–2.** *Using the Pimp Your Screen app.*\n\n3.  After touching\
    \ any category, you can swipe left or right to view more wallpaper image options.\
    \ To save the wallpaper in your `Camera Roll` album, tap the `Save` button in\
    \ the middle of the bottom of the image.\n4.  If you don't like the image, click\
    \ the `Home` button in the lower-left corner to get back to the Home screen menu.\n\
    \n#### Using Your Newly Saved Wallpaper\n\nOnce you've chosen a wallpaper image\
    \ and saved it to your iPhone, you need to select it using the steps described\
    \ in the “Changing Wallpaper from Your Settings App” section earlier in this chapter.\n\
    \nRemember that the downloaded wallpaper will be in the `Camera Roll` album. After\
    \ you tap `Camera Roll` to open it, you'll need to flick all the way to the bottom\
    \ to see your recent entries."
