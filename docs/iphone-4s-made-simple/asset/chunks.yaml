- fmt: "# EQ（声音均衡器设置）\n\n声音均衡是非常个人化和主观的。有些人喜欢在音乐中听到更多低音，有些人喜欢更多高音，还有些人喜欢更夸张的中音。无论你的音乐口味如何，总有一款`EQ`设置适合你。\n\
    \n![images](images/U1226.jpg)\n\n**注意：**使用`EQ`设置会在一定程度上降低电池续航能力。\n\n只需轻触`EQ`标签，然后选择你最常听的音乐类型，或者选择一个特定选项来增强高音或低音。尝试、享受乐趣，找到最适合你的设置。\n\
    \n# 音量限制（以合理水平安全听音乐）\n\n这是家长控制孩子 iPhone 音量的好方法。这也是确保你不会通过耳机听得太大声而损伤耳朵的好方法。你只需将滑块移动到音量限制位置，然后锁定该限制即可。\n\
    \n![images](images/U1227.jpg)\n\n要锁定音量限制，请轻触`Lock Volume Limit`按钮并输入一个4位密码。系统会提示你再次输入密码，之后音量限制将被锁定。\n\
    \n# 使用家庭共享\n\n如果你和我们一样，你大电脑硬盘上的音乐可能远多于 iPhone 能容纳的。有了 iPhone 和家庭共享，这都不是问题。\n\n\
    ![images](images/U1228.jpg)\n\n只要你和电脑在同一个 Wi-Fi 网络上，你就可以将桌面 iTunes 资料库中的任何内容直接流式传输到你的\
    \ iPhone 上。\n\n要启用家庭共享，请确保你的电脑已使用你的 iTunes 电子邮件地址和密码登录到家庭共享，然后在你的 iPhone 上使用同一个账户登录家庭共享。\n\
    \n登录后，你可以在本地（iPhone）和远程（桌面 iTunes）资料库之间进行选择。操作方法如下：\n\n1.  启动`Music`应用\n\n   \
    \ ![images](images/U1229.jpg)\n\n2.  轻触右下角的`More`标签\n3.  轻触列表底部的`shared`标签。（如果你没有看到`shared`标签，请仔细检查你的\
    \ iPhone 和电脑是否都使用同一个 iTunes 账户登录了家庭共享）\n4.  从`shared`列表中选择你桌面电脑的名称，在此示例中是`MacPro`。（你可以共享多个\
    \ iTunes 资料库，因此可能会有几个选项供你选择。）\n\n你的 iPhone 资料库将消失，取而代之的是桌面 iTunes 资料库。它的外观与你的\
    \ iPhone 资料库完全相同，只是内容不同。\n\n要切换回你的 iPhone 资料库，只需重复相同的过程，但从`shared`列表中选择`iPhone`即可。\n\
    \n# 在 iPhone 锁定时显示媒体控制\n\n你可能希望在 iPhone 锁定时也能访问媒体控制。操作方法如下：双击`Home`按钮，用于调节音频的控制项就会出现在锁定屏幕的顶部。无需解锁屏幕再进入`Music`程序来寻找这些控制。\n\
    \n![images](images/U1230.jpg)\n\n在右侧的图像中，请注意屏幕仍然处于锁定状态——但音乐控制项现在沿顶部可见。你无需实际解锁\
    \ iPhone 即可暂停、跳过、转到上一首歌曲或调节音量。\n\n**注意：**只有当有音频播放时，你才会看到这些控制。\n\n# 收听免费网络电台（Pandora）\n\
    \n虽然你的 iPhone 能让你对个人音乐资料库拥有前所未有的控制，但有时你可能想要“换换口味”，听一些其他音乐。\n\n**提示：**一个基础的`Pandora`账户是免费的，与从\
    \ iTunes 购买大量新歌相比，可以为你节省不少钱。\n\n`Pandora`源于“音乐基因组计划”。这是一项浩大的工程。一个由音乐分析师组成的大型团队研究了几乎每一首有史以来录制的歌曲，然后开发了一个复杂的属性算法来与每首歌关联。\n\
    \n**注意：**现在有越来越多不断增长的“网络电台”或订阅式音乐应用，包括流行的`slacker Personal Radio`、`spotify`、`Rdio,\
    \ Last.fm`等。另请注意，Pandora 仅限美国使用，Slacker 仅在美国和加拿大可用。Spotify 在美国和欧洲可用，且许多其他应用也按地区有所不同。希望未来能为国际用户提供更多选择。\n\
    \n## 开始使用 Pandora\n\n使用 Pandora，你可以围绕你喜欢的艺术家设计自己独特的电台。最棒的是，它完全免费！\n\n首先从 App Store\
    \ 下载`Pandora`应用。只需进入 App Store 并搜索 Pandora 即可。\n\n![images](images/U1231.jpg)\n\
    \n现在只需轻触 Pandora 图标即可启动。\n\n![images](images/U1232.jpg)\n\n第一次启动 Pandora 时，系统会要求你创建一个账户，或者如果你已有账户则登录。只需填写适当信息——需要一个电子邮件地址和密码——你就可以开始设计自己的音乐收听体验了。\n\
    \nPandora 也可用于你的 Windows 或 Mac 电脑以及大多数智能手机平台。如果你已有 Pandora 账户，只需登录即可。\n\n![images](images/U1233.jpg)\n\
    \n**提示：**记住你可以将应用移入文件夹。正如你在[图12–7](#Chapter12.html#fig_12_7)中看到的，我们将三个音乐应用（包括`Pandora`）放入了一个名为“Music”的文件夹中。有关使用文件夹的更多信息，请参见[第6章](#Chapter06.html#ch6)：“图标和文件夹”。\n\
    \n![images](images/1207.jpg)\n\n**图12–7.** *将类似的音乐应用（如 Pandora）放入一个文件夹以便快速检索。*\n\
    \n## Pandora 的主屏幕\n\n你的电台列表显示在屏幕上，其中`QuickMix`位于顶部。轻触任意电台，它就会开始播放。通常，第一首歌来自你选择的艺术家本人，接下来的歌曲则来自相似的艺术家。\n\
    \n![images](images/U1234.jpg)\n\n一旦你选择了电台，音乐就开始播放。你会看到当前歌曲显示，以及专辑封面——就像你使用`Music`应用播放歌曲时一样。\n\
    \n你还会在右上角看到一个小型的`Now Playing`图标——与`Music`应用中的`Now Playing`图标非常相似。\n\n轻触右上角的`Detail`视图![images](images/U1235.jpg)图标（就像你在`Music`应用中看到的那样），你会看到艺术家的一段精彩简介，该简介会随着每首新歌而变化。（参见[图12–8](#Chapter12.html#fig_12_8)）\n\
    \n![images](images/1208.jpg)\n\n**图12–8.** *Pandora 的专辑封面视图和详情视图。*\n\n## Pandora\
    \ 中的“赞”或“踩”\n\n如果你喜欢某首特定歌曲，请轻触大拇指图标，之后你会听到更多来自该艺术家的音乐。\n\n![images](images/U1236.jpg)\n\
    \n相反，如果你不喜欢该电台的某位艺术家，请轻触大拇指朝下的图标，之后你将不会再听到那位艺术家的音乐。\n\n如果你愿意，你可以暂停一首歌稍后再回来听，或跳过当前电台的下一个曲目。\n\
    \n**注意：**使用免费的 Pandora 账户，你每小时可以跳过的次数是有限的。此外，你偶尔会听到广告。要摆脱这些烦恼，你可以升级到付费的“Pandora\
    \ One”账户，如下所示。\n\n## Pandora 的菜单\n\n在两个大拇指图标之间是一个`Menu`按钮，看起来像一个三角形![images](images/U1237.jpg)。轻触它，你可以收藏艺术家或歌曲，前往\
    \ iTunes 购买该艺术家的音乐，或通过电子邮件将电台发送给`Contacts`中的某个人。\n\n![images](images/U1238.jpg)"
  raw: "#### EQ (Sound Equalizer Setting)\n\nSound equalization is very personal and\
    \ subjective. Some people like to hear more bass in their music, some like more\
    \ treble, and some like more of an exaggerated mid-range. Whatever your music\
    \ tastes, there is an **EQ** setting for you.\n\n![images](images/U1226.jpg)\n\
    \n**NOTE:** Using the **EQ** setting can diminish battery capacity somewhat.\n\
    \nJust touch the **EQ** tab and then select either the type of music you most\
    \ often listen to or a specific option to boost treble or bass. Experiment, have\
    \ fun, and find the setting that's perfect for you.\n\n#### Volume Limit (Safely\
    \ Listen to Music at a Reasonable Level)\n\nThis is a great way for parents to\
    \ control the volume on their kids' iPhones. It is also a good way to make sure\
    \ you don't listen too loudly through headphones so you don't damage your ears.\
    \ You just move the slider to a volume limit and then lock that limit.\n\n![images](images/U1227.jpg)\n\
    \nTo lock the volume limit, touch the **Lock Volume Limit** button and enter a\
    \ 4-digit passcode.You will be prompted to enter your passcode once more and the\
    \ volume limit will then be locked.\n\n#### Using Home Sharing\n\nIf you're like\
    \ us, you probably have far more music on your big computer hard drive than you\
    \ can fit on your iPhone. With iPhone and Home Sharing, that's not a problem.\n\
    \n![images](images/U1228.jpg)\n\nAs long as you're on the same Wi-Fi network as\
    \ your computer, you can stream anything from your desktop iTunes library straight\
    \ to your iPhone.\n\nTo enable Home Sharing, make sure your computer Is logged\
    \ into Home Sharing with your iTunes email address and password, then log into\
    \ Home Sharing on your iPhone with the same account.\n\nOnce you're logged in,\
    \ you'll be able to choose between your local (iPhone) and remote (desktop iTunes)\
    \ libraries. Here's how:\n\n1.  Launch the **Music** app\n\n    ![images](images/U1229.jpg)\n\
    \n2.  Tap the **More** tab at the bottom right\n3.  Tap the **shared** tab at\
    \ the bottom of the list. (If you don't see a **shared** tab, double check to\
    \ make sure both your iPhone and computer are both logged into Home Sharing using\
    \ the same iTunes account)\n4.  Choose the name of your desktop machine from the\
    \ **shared** list, in this example that's **MacPro**. (You can share more than\
    \ one iTunes library so you may have several to choose from.)\n\nYour iPhone library\
    \ will disappear and you'll see your desktop iTunes library instead. It will look\
    \ exactly the same as your iPhone library, only the content will be different.\n\
    \nTo switch back to your iPhone library, just repeat the same process but choose\
    \ **iPhone** from the **shared** list instead.\n\n#### Showing Media Controls\
    \ When Your iPhone is Locked\n\nYou may want to get to your media controls even\
    \ if your iPhone is locked. Here's how: Just double-click the **Home** button\
    \ and the controls for adjusting the audio show up on the top of the locked screen.\
    \ There's no reason to unlock the screen and then go to the Music program to find\
    \ the controls.\n\n![images](images/U1230.jpg)\n\nIn the image to the right, notice\
    \ that the screen is still locked—yet the music controls are now visible along\
    \ the top. You can pause, skip, go to a previous song, or adjust the volume without\
    \ actually unlocking the iPhone.\n\n**NOTE**: You'll only see these controls if\
    \ there is audio playing.\n\n### Listening to Free Internet Radio (Pandora)\n\n\
    While your iPhone gives you unprecedented control over your personal music library,\
    \ there may be times when you want to just “mix it up” and listen to some other\
    \ music.\n\n**TIP:** A basic **Pandora** account is free and can save you considerable\
    \ money compared with buying lots of new songs from iTunes.\n\n**Pandora** grew\
    \ out of the Music Genome Project. This was a huge undertaking. A large team of\
    \ musical analysts looked at just about every song ever recorded and then developed\
    \ a complex algorithm of attributes to associate with each song.\n\n**NOTE:**\
    \ There are an ever-increasing amount of “internet radio” or subscription music\
    \ style apps now available including the popular **slacker Personal Radio**, **spotify**,\
    \ **Rdio, Last.fm**, and others. Please also note that Pandora is a US-only application\
    \ and Slacker available is only in the US and Canada. Spot fly is available in\
    \ the US and Europe, and many others vary by region as well. Hopefully, more options\
    \ will begin to pop up for international users.\n\n#### Getting Started with Pandora\n\
    \nWith Pandora you can design your own unique radio stations built around artists\
    \ you like. Best of all, it is completely free!\n\nStart by downloading the **Pandora**\
    \ app from the App Store. Just go to the App Store and search for Pandora.\n\n\
    ![images](images/U1231.jpg)\n\nNow just touch the Pandora icon to start.\n\n![images](images/U1232.jpg)\n\
    \nThe first time you start Pandora, you'll be asked to either create an account\
    \ or to sign in if you already have an account. Just fill in the appropriate information—an\
    \ email address and a password are required—and you can start designing your own\
    \ music listening experience.\n\nPandora is also available for your Windows or\
    \ Mac computer and for most smartphone platforms. If you already have a Pandora\
    \ account, all you have to do is sign in.\n\n![images](images/U1233.jpg)\n\n**TIP:**\
    \ Remember that you can move apps into folders. As you can see in [Figure 12–7](#Chapter12.html#fig_12_7),\
    \ we've put three Music apps, including **Pandora**, into one folder named Music.\
    \ See more about using folders in [Chapter 6](#Chapter06.html#ch6): “Icons and\
    \ Folders.”\n\n![images](images/1207.jpg)\n\n**Figure 12–7.** *Put like Music\
    \ apps, such as Pandora, into one folder for easy retrieval.*\n\n#### Pandora's\
    \ Main Screen\n\nYour stations are listed down the screen with the **QuickMix**\
    \ at the top. Tap any station and it will begin to play. Usually, the first song\
    \ will be from the actual artist chosen and the next songs will be from similar\
    \ artists.\n\n![images](images/U1234.jpg)\n\nOnce you select a station, the music\
    \ begins to play. You'll see the current song displayed, along with album art—very\
    \ much like when you play a song using the **Music app**.\n\nYou'll also see a\
    \ small **Now Playing** icon in the upper right corner—very much like the **Now\
    \ Playing** icon in the **Music** app.\n\nTouch the **Detail** view ![images](images/U1235.jpg)\
    \ icon in the upper right corner, just like the one you find in the **Music**\
    \ app, and you'll see a nice bio of the artist, which changes with each new song.(See\
    \ [Figure 12–8](#Chapter12.html#fig_12_8)).\n\n![images](images/1208.jpg)\n\n\
    **Figure 12–8.** *Pandora's Album cover view and the Detail view.*\n\n#### Thumbs\
    \ Up or Thumbs Down in Pandora\n\nIf you like a particular song, touch the thumbs-up\
    \ icon and you'll hear more from that artist.\n\n![images](images/U1236.jpg)\n\
    \nConversely, if you don't like an artist on this station, touch the thumbs-down\
    \ icon and you won't hear that artist again.\n\nIf you like, you can pause a song\
    \ and come back later, or skip to the next selection in your station.\n\n**NOTE:**\
    \ with a free Pandora account, you are limited in the number of skips per hour\
    \ you can make. Also, you'll occasionally hear advertising. To get rid of these\
    \ annoyances, you can upgrade to a paid “Pandora One” account as we show you below.\n\
    \n#### Pandora's Menu\n\nBetween the two thumbs is a **Menu** button which looks\
    \ like a triangle ![images](images/U1237.jpg). Touch this and you can bookmark\
    \ the artist or song, go to iTunes to buy music from this artist, or email the\
    \ station to someone in your **Contacts**.\n\n![images](images/U1238.jpg)"
  trans: "\n# EQ（声音均衡器设置）\n\n声音均衡是非常个人化和主观的。有些人喜欢在音乐中听到更多低音，有些人喜欢更多高音，还有些人喜欢更夸张的中音。无论你的音乐口味如何，总有一款`EQ`设置适合你。\n\
    \n![images](img/U1226.jpg)\n\n**注意：**使用`EQ`设置会在一定程度上降低电池续航能力。\n\n只需轻触`EQ`标签，然后选择你最常听的音乐类型，或者选择一个特定选项来增强高音或低音。尝试、享受乐趣，找到最适合你的设置。\n\
    \n# 音量限制（以合理水平安全听音乐）\n\n这是家长控制孩子 iPhone 音量的好方法。这也是确保你不会通过耳机听得太大声而损伤耳朵的好方法。你只需将滑块移动到音量限制位置，然后锁定该限制即可。\n\
    \n![images](img/U1227.jpg)\n\n要锁定音量限制，请轻触`Lock Volume Limit`按钮并输入一个 4 位密码。系统会提示你再次输入密码，之后音量限制将被锁定。\n\
    \n# 使用家庭共享\n\n如果你和我们一样，你大电脑硬盘上的音乐可能远多于 iPhone 能容纳的。有了 iPhone 和家庭共享，这都不是问题。\n\n\
    ![images](img/U1228.jpg)\n\n只要你和电脑在同一个 Wi-Fi 网络上，你就可以将桌面 iTunes 资料库中的任何内容直接流式传输到你的\
    \ iPhone 上。\n\n要启用家庭共享，请确保你的电脑已使用你的 iTunes 电子邮件地址和密码登录到家庭共享，然后在你的 iPhone 上使用同一个账户登录家庭共享。\n\
    \n登录后，你可以在本地（iPhone）和远程（桌面 iTunes）资料库之间进行选择。操作方法如下：\n\n1.  启动`Music`应用\n\n   \
    \ ![images](img/U1229.jpg)\n\n2.  轻触右下角的`More`标签\n3.  轻触列表底部的`shared`标签。（如果你没有看到`shared`标签，请仔细检查你的\
    \ iPhone 和电脑是否都使用同一个 iTunes 账户登录了家庭共享）\n4.  从`shared`列表中选择你桌面电脑的名称，在此示例中是`MacPro`。（你可以共享多个\
    \ iTunes 资料库，因此可能会有几个选项供你选择。）\n\n你的 iPhone 资料库将消失，取而代之的是桌面 iTunes 资料库。它的外观与你的\
    \ iPhone 资料库完全相同，只是内容不同。\n\n要切换回你的 iPhone 资料库，只需重复相同的过程，但从`shared`列表中选择`iPhone`即可。\n\
    \n# 在 iPhone 锁定时显示媒体控制\n\n你可能希望在 iPhone 锁定时也能访问媒体控制。操作方法如下：双击`Home`按钮，用于调节音频的控制项就会出现在锁定屏幕的顶部。无需解锁屏幕再进入`Music`程序来寻找这些控制。\n\
    \n![images](img/U1230.jpg)\n\n在右侧的图像中，请注意屏幕仍然处于锁定状态——但音乐控制项现在沿顶部可见。你无需实际解锁 iPhone\
    \ 即可暂停、跳过、转到上一首歌曲或调节音量。\n\n**注意：**只有当有音频播放时，你才会看到这些控制。\n\n# 收听免费网络电台（Pandora）\n\
    \n虽然你的 iPhone 能让你对个人音乐资料库拥有前所未有的控制，但有时你可能想要“换换口味”，听一些其他音乐。\n\n**提示：**一个基础的`Pandora`账户是免费的，与从\
    \ iTunes 购买大量新歌相比，可以为你节省不少钱。\n\n`Pandora`源于“音乐基因组计划”。这是一项浩大的工程。一个由音乐分析师组成的大型团队研究了几乎每一首有史以来录制的歌曲，然后开发了一个复杂的属性算法来与每首歌关联。\n\
    \n**注意：**现在有越来越多不断增长的“网络电台”或订阅式音乐应用，包括流行的`slacker Personal Radio`、`spotify`、`Rdio,\
    \ Last.fm`等。另请注意，Pandora 仅限美国使用，Slacker 仅在美国和加拿大可用。Spotify 在美国和欧洲可用，且许多其他应用也按地区有所不同。希望未来能为国际用户提供更多选择。\n\
    \n## 开始使用 Pandora\n\n使用 Pandora，你可以围绕你喜欢的艺术家设计自己独特的电台。最棒的是，它完全免费！\n\n首先从 App Store\
    \ 下载`Pandora`应用。只需进入 App Store 并搜索 Pandora 即可。\n\n![images](img/U1231.jpg)\n\n\
    现在只需轻触 Pandora 图标即可启动。\n\n![images](img/U1232.jpg)\n\n第一次启动 Pandora 时，系统会要求你创建一个账户，或者如果你已有账户则登录。只需填写适当信息——需要一个电子邮件地址和密码——你就可以开始设计自己的音乐收听体验了。\n\
    \nPandora 也可用于你的 Windows 或 Mac 电脑以及大多数智能手机平台。如果你已有 Pandora 账户，只需登录即可。\n\n![images](img/U1233.jpg)\n\
    \n**提示：**记住你可以将应用移入文件夹。正如你在图 12–7 中看到的，我们将三个音乐应用（包括`Pandora`）放入了一个名为“Music”的文件夹中。有关使用文件夹的更多信息，请参见第\
    \ 6 章：“图标和文件夹”。\n\n![images](img/1207.jpg)\n\n**图 12–7.** *将类似的音乐应用（如 Pandora）放入一个文件夹以便快速检索。*\n\
    \n## Pandora 的主屏幕\n\n你的电台列表显示在屏幕上，其中`QuickMix`位于顶部。轻触任意电台，它就会开始播放。通常，第一首歌来自你选择的艺术家本人，接下来的歌曲则来自相似的艺术家。\n\
    \n![images](img/U1234.jpg)\n\n一旦你选择了电台，音乐就开始播放。你会看到当前歌曲显示，以及专辑封面——就像你使用`Music`应用播放歌曲时一样。\n\
    \n你还会在右上角看到一个小型的`Now Playing`图标——与`Music`应用中的`Now Playing`图标非常相似。\n\n轻触右上角的`Detail`视图![images](img/U1235.jpg)图标（就像你在`Music`应用中看到的那样），你会看到艺术家的一段精彩简介，该简介会随着每首新歌而变化。（参见图\
    \ 12–8）\n\n![images](img/1208.jpg)\n\n**图 12–8.** *Pandora 的专辑封面视图和详情视图。*\n\n\
    ## Pandora 中的“赞”或“踩”\n\n如果你喜欢某首特定歌曲，请轻触大拇指图标，之后你会听到更多来自该艺术家的音乐。\n\n![images](img/U1236.jpg)\n\
    \n相反，如果你不喜欢该电台的某位艺术家，请轻触大拇指朝下的图标，之后你将不会再听到那位艺术家的音乐。\n\n如果你愿意，你可以暂停一首歌稍后再回来听，或跳过当前电台的下一个曲目。\n\
    \n**注意：**使用免费的 Pandora 账户，你每小时可以跳过的次数是有限的。此外，你偶尔会听到广告。要摆脱这些烦恼，你可以升级到付费的“Pandora\
    \ One”账户，如下所示。\n\n## Pandora 的菜单\n\n在两个大拇指图标之间是一个`Menu`按钮，看起来像一个三角形![images](img/U1237.jpg)。轻触它，你可以收藏艺术家或歌曲，前往\
    \ iTunes 购买该艺术家的音乐，或通过电子邮件将电台发送给`Contacts`中的某个人。\n\n![images](img/U1238.jpg)\n"
- fmt: '#### Creating a New Station in Pandora


    Creating a new station couldn''t be easier.


    ![images](images/U1239.jpg)


    If you are listening to a station, press the **back arrow** in the upper left
    corner to return to the Pandora main screen. Then tap the **New Station** button
    along the bottom row. Type in the name of an artist, song, or composer.


    When you find what you are looking for, touch the selection and Pandora will immediately
    start to build a station around your choice.


    You can also touch **Genre** and build a station around a particular genre of
    music.


    You''ll then see the new station listed with your other stations.


    ![images](images/U1240.jpg)


    You can build up to 100 stations in Pandora.


    **TIP:** You can organize your stations by pressing the **By Date** or **ABC**
    buttons at the top of the screen.


    #### Adjusting Pandora''s Settings—Your Account, Upgrading, and More


    You can sign out of your Pandora account, adjust the audio quality, and even upgrade
    to Pandora One (which removes advertising) by tapping the settings icon in the
    lower right corner of the screen. (See [Figure 12–9](#Chapter12.html#fig_12_9).)


    ![images](images/1209.jpg)


    **Figure 12–9.** *Setting options in Pandora*


    To sign out, tap the **sign Out** button.


    To adjust the sound quality, move the switch under **Cell Network Audio Quality**
    either **ON** or **OFF**. When you are on a cellular network, setting this off
    is probably better, otherwise you may hear more skips and pauses in the playback.


    When you are on a strong Wi-Fi connection, you can set this to **ON** for better
    quality. See our [Chapter 4](#Chapter04.html#ch4): “Connect to the Network”chapter
    to learn more about the various connections.


    To save your battery life, you should set the **Auto-Lock** to **ON**, which is
    the default. If you want the force the screen to stay lit, then switch this to
    **OFF**.


    To remove all advertising, tap the **Upgrade to Pandora One** button. A web browser
    window will open and you''ll be take to Pandora''s web site to enter your credit
    card information. As of publishing time, the annual account cost is $36.00, but
    that may be different by the time you read this book.


    ## iBooks and E-Books


    In this chapter, we will show you how to use your iPhone for a good book-reading
    experience if you''re OK with a slightly smaller screen. For example, we will
    cover iBooks, including how to buy and download them, as well as how to find some
    great free classic books. We will also show you other e-book reading options that
    use the third-party **Kindle** and **Kobo** (formerly **shortcovers**) readers
    on your iPhone.


    ![images](images/U1301.jpg)


    The iPhone can use Apple''s proprietary e-book reader, **iBooks**. In this chapter,
    we will show you how to download the **iBooks** app, how to shop for books in
    the iBooksStore, and how to read both PDF files (Adobe PDF format) and iBooks
    as well as take advantage of all the **iBooks** features.


    With **iBooks**, you can interact with books and PDF files like never before.
    Pages turn like a real book; and you can adjust font sizes, look up words in the
    built-in dictionary, and search through your text.


    In the App Store, you can also find apps for Amazon''s **Kindle** reader, a **Barnes
    and Noble** reader, the **stanza** reader, and the **Kobo** reader. Both the **Kindle**
    and **Kobo** readers offer a great reading experience on the iPhone.


    ### Downloading iBooks


    Search the App Store for "iBooks" or "Apple." You will find the **iBooks** app
    among the selections listed.


    ![images](images/U1302.jpg)


    **NOTE**: On a brand new iPhone, you should get a notice asking: "Do you want
    to download iBooks now?"


    If you don''t see this notice right away, tap the **App Store** app and the notice
    should pop up.


    Select the **iBooks** app and touch the **Free** button to download.


    Select **install** and **iBooks** will be downloaded and installed on the iPhone.


    ### The iBooks Store


    Before you can start enjoying your reading experience, you need to load up your
    iBooks library with titles. Fortunately, many books can be found for free in the
    iBooks store, including the near complete Gutenberg Collection of classics and
    public domain titles.


    **NOTE**: Paid iBooks content is not available in all countries. However, free
    content is available everywhere, including the Project Gutenberg collection of
    classic, public domain literature.


    Just touch the **store** button in the upper-right corner of your bookshelf, and
    you will be taken to the iBooks Store.


    ![images](images/U1303.jpg)


    The iBooksStore is arranged much like the App Store. There is a **Categories**
    button in the top left, opposite the **Library** button. Touch this to see all
    the available categories from which you can choose your books.


    ![images](images/U1304.jpg)


    Featured books are highlighted on the front page of the store, with **New** and
    **Notable** titles displayed for browsing.


    At the bottom of the store are five soft keys: **Featured**, **Charts**, **Browse**,
    **search**, and **Purchases**.


    Touch the **Charts** button ![images](images/U1305.jpg) to see all the top charts
    and New York Times bestselling books. Touch the **Purchases** button to see all
    the books you have purchased or downloaded for your library.


    ![images](images/U1306.jpg)


    Purchasing a book is much like purchasing an app. Touch a book title that interests
    you and browse the description and customer reviews. When you are ready to purchase
    the title, touch the **Price** button.


    ![images](images/U1307.jpg)


    **NOTE**: Many titles have a sample download. It is a great idea to check this
    sample out if you are not sure that you want to purchase the book. If you download
    a sample, you can always purchase the full book from within that sample.


    Once you decide to download a sample or purchase a title, **iBooks** switches
    to the **Bookshelf** view, and you can see the book being deposited onto your
    bookshelf. Your book is now available for reading.


    ![images](images/U1308.jpg)


    #### Using the Search Button


    Just like iTunes and the App Store, the iBooksStore gives you a **search** window
    in which you can type virtually any phrase. You can search for an author, title,
    or series. Just touch **search** at the bottom of the screen, and the on-screen
    keyboard pops up. Type in an author, title, series, or genre of book, and then
    press the **search** button.


    ![images](images/U1309.jpg)


    You will see suggestions pop up that match your search; just touch the appropriate
    suggestion to go to that title.


    **TIP**: Do a search for "Project Gutenberg" to see thousands of free, public
    domain titles.


    ### Switching Collections (Books, PDFs, More)


    Your iBooks app has multiple collections of books or PDF files (Adobe PDF format
    reader).


    ![images](images/U1310.jpg)


    You can easily switch collections between these two and add new collections by
    tapping the Collections button at the middle of the top of the library.


    This button will show you the currently visible collection. In this image, **Books**
    is the current collection. Tap the Books button to see the available collections.


    From this screen, you can tap any collection to view it.


    ![images](images/U1311.jpg)


    Notice that you can also create **New** collections and **Edit** collections you
    have created by using the buttons at the bottom.


    ![images](images/U1312.jpg)


    ### Reading PDFs


    Switch collections to view your PDFs collection as shown above.


    ![images](images/U1313.jpg)


    Tap any book to open it up and start reading. All the same navigation features
    work as described in the "Reading iBooks" section.


    One difference is that you will see thumbnail images of the pages of the PDF file
    at the bottom of the page. Tap any thumbnail to jump to that page. Drag your finger
    back and forth along the thumbnail images to jump to a specific page.'
