  raw: '### iTunes in the Cloud


    iCloud also includes the *iTunes in the Cloud* feature, which lets you re-download
    previously purchased apps. In some countries, it even lets you re-download iBooks,
    music, and even TV shows. This means you can download them to your iPhone whenever
    you like, delete them when you no longer need them, and then re-download them
    again when you want them back.


    To learn more about re-downloading files from iTunes, see [Chapter 22](#Chapter22.html#ch22):
    “iTunes on Your Device,” [Chapter 23](#Chapter23.html#ch23): “The Amazing App
    Store,” and [Chapter 13](#Chapter13.html#ch13): “iBooks and E-Books.”


    You can also set up your iPhone to automatically download any new apps, iBooks,
    subscription Newsstand issues, music, and TV shows purchased on any device or
    computer associated with your iTunes account. If you buy a new song on your PC
    or a new app on your iPod touch, then that song or app will immediately download
    and show up on your iPhone, as well.


    Follow these steps to turn on automatic downloads:


    1.  Launch Settings.

    2.  Tap Store.

    3.  Toggle Music, Apps, and Books to ON.

    4.  If you want to enable automatic downloads on 3G as well, then toggle Use Cellular
    Data to ON.

    5.  If you want to enable automatic Newsstand subscription downloads, then toggle
    the switch next to the name of the newspaper or magazine to ON.


    ![images](images/U0309.jpg)


    **NOTE:** At the time of writing, Apple’s 20MB download limit for 3G networks
    also applied to the iTunes in the Cloud feature. This means that, if you’re away
    from Wi-Fi, you won’t be able to automatically download or re-download any apps
    or files more than 20MB in size until you return to a Wi-Fi connection. This limitation
    applies to iBooks, music, TV shows, and so on.


    ### iCloud on the Computer


    iCloud doesn’t just sync your information between your iPhone and Apple’s servers
    or between your iOS devices. It can also sync information between your iPhone
    and your Windows or Mac PC.


    If you’re a Windows user, you can turn syncing on or off for several apps and
    services in the **iCloud Control Panel for Windows (**see [Figure 3–1](#Chapter03.html#fig_3_1)).
    Apps and services you can sync with include **Mail**, **Contacts**, **Calendars
    & Tasks**, and **Reminders**, among others.


    ![images](images/0301.jpg)


    **Figure 3–1.** *iCloud Control Panel for Windows*


    If you’re a Mac OS X user, you can turn these options on or off in the OS X 7.2
    **Lion iCloud Systems Settings** panel (see [Figure 3–2](#Chapter03.html#fig_3_2)).


    ![images](images/0302.jpg)


    **Figure 3–2.** *The Mac’s **Lion iCloud Systems Settings** panel (OS X 7.2)*


    Automatic app, books, music, and other downloads can be turned on or off in the
    **iTunes** app via the **Store Preferences** screen (see [Figure 3–3](#Chapter03.html#fig_3_3)).


    ![images](images/0303.jpg)


    **Figure 3–3.** *The **iTunes**’ **Store Preferences** screen*


    ### Syncing with iTunes


    There are a few things you need before you can start using **iTunes** to sync.
    In the upcoming sections, we will cover the prerequisites and answer a few common
    questions about the reasons to use iTunes. We will also help you understand what
    happens if you own another Apple device, such as an iPad or iPod, and start syncing
    with your iPhone.


    #### Prerequisites


    There are just a few things you need to do before you sync your iPhone with **iTunes**:


    **TIP:** If you followed all the steps in [Chapter 1](#Chapter01.html#ch1): “Getting
    Started,” chances are you’ve already completed the steps listed below and the
    initial sync of your contacts, calendar, bookmarks, notes, and email accounts
    to your iPhone. If so, you may want to skip ahead to the “Apps: Sync and Manage
    Them” section later in this chapter.


    1.  Make sure you’ve installed version 10.5 or higher of the **iTunes** app on
    your computer. For help with installing or updating **iTunes**, see [Chapter 22](#Chapter22.html#ch22):
    “iTunes on Your Device.”

    2.  Make sure you have your iTunes account ID handy. This is the email address
    and password you use to buy music, apps, and other content from iTunes.

    3.  Get the white sync cable that came with your iPhone. One end plugs into the
    bottom of your iPhone near the **Home** button, and the other plugs into the USB
    port on your computer.


    #### Syncing iTunes with an iPod or iPad *and* Your iPhone?


    You might wonder whether you can sync iTunes with multiple devices, such as your
    iPod or iPad and your iPhone. Yes, you can! As long as you are syncing to the
    same computer, you can sync several Apple devices (Apple says up to five, but
    we’ve heard of people syncing more) to the same iTunes account on a single computer.


    **CAUTION:** You can’t sync the same iPhone, iPad, or iPod to two different computers.
    If you attempt to do this, you’ll see a message like this: “Would you like to
    wipe this device (iPhone, iPad, iPod) and resync the new library?” If you answer
    **Yes**, any music and videos on the device will be erased.


    #### There Are Other Sync Methods—Should I Use iTunes?


    iCloud is both free and the easiest way to keep your iPhone in sync with your
    other devices, while **iTunes** is there to help you with large files, movies,
    and other content that iCloud doesn’t yet handle. You can also use other approaches
    to synchronize certain data, such as your personal information and email (including
    Exchange/Google). Keep in mind, however, that even if you choose one of these
    other approaches, you’ll still need to use iCloud and/or **iTunes** to accomplish
    the following:


    *   Back up and restore files and data on your iPhone

    *   Update the iPhone operating system software

    *   Sync and manage your applications (apps)

    *   Sync your music library and playlists

    *   Sync movies, TV shows, podcasts, and iTunes U content

    *   Sync books

    *   Sync photos


    [Table 3–1](#Chapter03.html#tab_3_1) summarizes your synchronization options.
    What method you choose to use for synchronization should be driven by where you
    currently store your email, contacts, and calendar; your environment; and whether
    you want to have a wireless sync.


    **NOTE:** Some environments let you wirelessly sync your contacts and calendars
    to your iPhone.


    ![images](images/t0301.jpg)


    ![images](images/t0301a.jpg)


    ### Set Up Your iTunes Sync


    Next, we will show you all the steps for using the **iTunes** app to perform both
    automated syncs and manual transfers of information to your iPhone.'
  trans: '

    ### 云端 iTunes


    iCloud 还包含*云端 iTunes*功能，允许你重新下载之前购买的应用。在部分国家或地区，你甚至能重新下载 iBooks、音乐甚至电视节目。这意味着你可以随时将内容下载到
    iPhone，不再需要时删除，想再次使用时可重新下载。


    要了解更多从 iTunes 重新下载文件的信息，请参阅第 22 章：“您的设备上的 iTunes”、第 23 章：“神奇的应用商店”和第 13 章：“iBooks
    与电子书”。


    你还可以设置 iPhone，使其自动下载通过你 iTunes 账户关联的任何设备或电脑所购买的新应用、iBooks、报刊杂志订阅、音乐和电视节目。如果你在
    PC 上购买了一首新歌，或在 iPod touch 上购买了一个新应用，该歌曲或应用也会立即下载并出现在你的 iPhone 上。


    请按照以下步骤开启自动下载：


    1.  启动 `设置`。

    2.  轻点 `商店`。

    3.  将`音乐`、`应用`和`图书`开关切换至`开启`。

    4.  若要在 3G 网络下也启用自动下载，则将`使用蜂窝数据`开关切换至`开启`。

    5.  若要启用报刊杂志订阅的自动下载，则将相关报纸或杂志名称旁的开关切换至`开启`。


    ![images](img/U0309.jpg)


    **注意：** 在撰写本文时，Apple 对 3G 网络设置的 20MB 下载限制同样适用于`云端 iTunes`功能。这意味着，如果你不在 Wi-Fi 环境下，则无法自动下载或重新下载任何超过
    20MB 的应用或文件，直到你重新连接 Wi-Fi。此限制适用于 iBooks、音乐、电视节目等。


    ### 电脑上的 iCloud


    iCloud 不仅能在你的 iPhone 与 Apple 服务器之间或你的 iOS 设备之间同步信息，还能在你的 iPhone 与 Windows 或 Mac
    PC 之间同步信息。


    如果你使用的是 Windows 系统，可以在`Windows 版 iCloud 控制面板`中开启或关闭多个应用和服务的同步功能（请参见图 3–1）。可与之同步的应用和服务包括`邮件`、`通讯录`、`日历与任务`和`提醒事项`等。


    ![images](img/0301.jpg)


    **图 3–1.** *Windows 版 iCloud 控制面板*


    如果你使用的是 Mac OS X 系统，可以在 OS X 7.2 `Lion iCloud 系统设置`面板中开启或关闭这些选项（请参见图 3–2）。


    ![images](img/0302.jpg)


    **图 3–2.** *Mac 的`Lion iCloud 系统设置`面板 (OS X 7.2)*


    应用、图书、音乐及其他内容的自动下载，可在`iTunes`应用的`商店偏好设置`屏幕中开启或关闭（请参见图 3–3）。


    ![images](img/0303.jpg)


    **图 3–3.** *`iTunes`的`商店偏好设置`屏幕*


    ### 与 iTunes 同步


    在开始使用`iTunes`进行同步之前，你需要准备一些事项。在接下来的章节中，我们将介绍前提条件，并回答一些关于使用`iTunes`原因的常见问题。我们还将帮助你了解，如果你拥有其他
    Apple 设备（如 iPad 或 iPod）并与 iPhone 开始同步，会发生什么。


    #### 前提条件


    在将 iPhone 与`iTunes`同步之前，你只需完成以下几项操作：


    **提示：** 如果你已按照第 1 章：“入门指南”中的所有步骤操作，那么很可能已完成下方列出的步骤并已将通讯录、日历、书签、备忘录和电子邮件账户初始同步到
    iPhone。如果已完成，你可以跳到本章稍后的“应用：同步与管理”部分。


    1.  确保你的电脑上已安装 10.5 或更高版本的`iTunes`应用。如需安装或更新`iTunes`的帮助，请参阅第 22 章：“您的设备上的 iTunes”。

    2.  确保手边备有你的 iTunes 账户 ID。即用于从 iTunes 购买音乐、应用和其他内容的电子邮件地址和密码。

    3.  找到随 iPhone 附带的白色同步线缆。线缆一端插入 iPhone 底部靠近`主屏幕`按钮的接口，另一端插入电脑的 USB 端口。


    #### 将 iTunes 与 iPod 或 iPad 以及*你的*iPhone 同步？


    你可能想知道是否可以同步`iTunes`与多个设备，例如你的 iPod 或 iPad 以及 iPhone。是的，可以！只要你是同步到同一台电脑，就可以将多个
    Apple 设备（Apple 官方称最多五个，但我们听闻有人同步了更多设备）同步到一台电脑上的同一个 iTunes 账户。


    **警告：** 你不能将同一部 iPhone、iPad 或 iPod 同步到两台不同的电脑。如果尝试这样做，你会看到类似这样的信息：“是否要抹掉此设备（iPhone、iPad、iPod）并重新同步新资料库？”如果你回答`是`，设备上的所有音乐和视频都将被抹掉。


    #### 还有其他同步方法——应该使用`iTunes`吗？


    iCloud 既免费又便捷，是让 iPhone 与其他设备保持同步的最简单方式；而`iTunes`则能帮助你处理 iCloud 尚不支持的大文件、影片及其他内容。你也可以使用其他方法来同步特定数据，例如个人信息和电子邮件（包括
    Exchange/Google）。但请记住，即使你选择了其他方法，仍需要使用 iCloud 和/或`iTunes`来完成以下操作：


    *   备份和恢复 iPhone 上的文件与数据

    *   更新 iPhone 操作系统软件

    *   同步和管理你的应用程序（应用）

    *   同步你的音乐资料库和播放列表

    *   同步影片、电视节目、播客和 iTunes U 内容

    *   同步图书

    *   同步照片


    表 3–1 总结了你的同步选项。选择何种同步方法，应取决于你当前存储邮件、通讯录和日历的位置、你的使用环境，以及你是否希望进行无线同步。


    **注意：** 某些环境允许你将通讯录和日历通过无线方式同步到 iPhone。


    ![images](img/t0301.jpg)


    ![images](img/t0301a.jpg)


    ### 设置你的 iTunes 同步


    接下来，我们将展示使用`iTunes`应用对 iPhone 执行自动同步和手动传输信息的所有步骤。

