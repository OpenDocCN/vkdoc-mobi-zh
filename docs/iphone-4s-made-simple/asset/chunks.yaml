    ## Pinching


    Also as described in [Chapter 1](#Chapter01.html#ch1): “Getting Started,” pinching
    is a much more precise form of zooming in. While double-tapping zooms in or out
    only to one set level, pinching really allows you to zoom in or out just a little
    bit or quite a lot.


    To pinch, hold your thumb and forefinger close together and then slowly (while
    touching the screen) separate them, making the picture larger. To zoom out, start
    with your thumb and forefinger apart and move them together.


    **NOTE**: Once you have activated the zoom using either method, you will not be
    able to swipe easily through your pictures until you return the picture to its
    standard size.


    ## Viewing a Slideshow


    You can view the pictures in your photo album as a slideshow if you so desire.
    Just tap the screen once to bring up the on-screen soft keys. In the center, you
    will see a `Slideshow Play` button—touch it once to start the slideshow. You can
    start the slideshow from any picture you are viewing.


    ![images](images/U2028.jpg)


    Selecting `Photos` in the `Settings` app lets you adjust how long each picture
    remains on the screen and other settings such as `Repeat` and `Shuffle` (see [Figure
    20–4](#Chapter20.html#fig_20_4)). To end the slideshow, just tap the screen.


    ![images](images/2004.jpg)


    **Figure 20–4.** *Configuring your slideshow*


    ## Using a Picture As Your iPhone Wallpaper


    We show you how to select and use a picture as your iPhone wallpaper (and other
    wallpaper options) in [Chapter 8](#Chapter08.html#ch8): “Personalize and Secure.”


    **NOTE:** You can have different pictures for your `Home` screen and `Lock` screen,
    or you can use the same picture for both.


    ## Emailing or Tweeting a Picture


    As long as you have an active Internet connection (Wi-Fi or 3G; see [Chapter 4](#Chapter04.html#ch4):
    “Connect to the Network”), you can send any picture in your photo collection via
    email or post it to Twitter. Tap the `Options` button on the thumbnail bar—this
    is the button furthest to the left on the bottom row of soft keys. If you don''t
    see the icons, tap the screen once.


    ![images](images/U2029.jpg)


    To mail the picture, choose the `Email Photo` option and the `Mail` app will automatically
    launch.


    Tap the `To` field as you did in [Chapter 17](#Chapter17.html#ch17): “Communicate
    with Email,” and then select the contact to receive the picture. Tap the blue
    `Plus Sign` (**`+`**) button to add a contact.


    Type in a subject and a message, and then touch `Send` in the upper-right corner—that''s
    all there is to it.


    ![images](images/U2030.jpg)


    To tweet the picture, choose the `Tweet` option and a `Twitter` sheet will automatically
    appear. Just fill out the message you want to be shown with your picture and hit
    the `Send` button.


    **NOTE:** The `Tweet` option will only appear if you''ve entered your Twitter
    username and password in the `Settings` app.


    ![images](images/U2031.jpg)


    ## Share, Copy, Print, or Delete Several Pictures at Once


    If you have several pictures you want to email, message, copy, print, or delete
    at the same time, you can do so from the thumbnail view:


    1.  **Tap the `Action` button at the bottom left.**


    ![images](images/U2032.jpg)


    2.  Tap the pictures you want to select.

    3.  If you tap a picture by accident, just tap it again to deselect it.

    4.  Choose an action from the bottom of the screen: `Share` (email, message, or
    print), `Copy`, `Add To` (a different photo album), or `Delete`.


    ![images](images/U2033.jpg)


    **NOTE:** The `Copy` function allows you to copy and paste multiple pictures into
    an email message or other app. `Share` renames the image to `photo.png`, while
    `copy-and-paste` adds `.png` to the DCIM folder filename.


    At the time of publishing, you could not share more than one video, nor could
    you share more than five pictures. This may change in future iterations of the
    software.


    ## Assigning a Picture to a Contact


    [Chapter 18](#Chapter18.html#ch18): “Contacts and Notes” shows you how to add
    a picture when editing a contact. You can also find a picture you like and assign
    it to a contact. Begin by finding the photo you want to use.


    As you did when setting the wallpaper and emailing a photo, tap the `Action` button—the
    one furthest to the right of the upper row of soft keys. If you don''t see the
    icons, tap the screen once.


    When you touch the `Action` button, you''ll see a drop-down list of choices: `Email
    Photo`, `Message`, `Assign to Contact`, `Use as Wallpaper`, `Tweet`, and `Print`.


    ![images](images/U2034.jpg)


    Touch the `Assign to Contact` button.


    You will see your contacts on the screen. You can either perform a search using
    the `Search` bar at the top or just scroll through your contacts.


    Once you find the contact that you would like to add as a recipient to the picture,
    touch that name.


    ![images](images/U2035.jpg)


    You will then see the `Move and Scale` screen. Tap and drag the picture to move
    it; use pinch to zoom in or out.


    When you have this set just how you want it, touch the `Set Photo` button to assign
    the picture to that contact.


    ![images](images/U2036.jpg)


    **NOTE:** You will return to your Photo Library, not to the contact. If you want
    to double-check that the picture was set to your contact, then exit the `Photo`
    app, start the `Contact` app, and search for that contact.


    ## Viewing a Photo on Your Apple TV


    [Chapter 5](#Chapter05.html#ch5): “AirPlay and Bluetooth” shows you how to use
    Apple''s AirPlay feature to stream videos from your iPhone to your Apple TV over
    your local Wi-Fi network. Apple has built the same functionality into the Photos
    app, so you can easily beam your pictures to your big screen TV.


    Follow these steps to send your photos to your Apple TV:


    1.  Tap the `AirPlay` button.

    2.  Choose `Apple TV` from the source list.


    To move to the next photo, simply swipe from right to left, just as you would
    to switch photos on your iPhone. To move to the previous photo, swipe back from
    left to right.


    To go back to viewing photos on your iPhone, tap the `AirPlay` button again and
    choose `iPhone` from the source list.


    ![images](images/U2037.jpg)


    ### Deleting a Picture


    You might wonder why you can''t delete some pictures from your iPhone (the `Trash
    Can` icon is missing).


    For example, you''ll notice that the `Trash Can` icon is not visible for any photo
    that is synced from iTunes. You can delete such pictures only from your computer
    library. The next time you sync your iPhone, they will be deleted.


    ![images](images/U2038.jpg)


    When you are looking through pictures in your Saved Photos (this folder is not
    synced with iTunes, but is instead comprised of pictures you save from email messages
    or download from the Web), then you''ll see the `Trash Can` icon in the bottom
    icon bar. This `Trash Can` icon does not appear when you are viewing pictures
    from your Photos Library or other synced albums.


    If you don''t see the bottom row of icons, tap the photo once to activate them,
    and then tap the `Trash Can` icon. You will be prompted with the option to delete
    the picture.


    Touch `Delete Photo` and the picture will be deleted from your iPhone.


    ![images](images/U2039.jpg)


    ### Downloading Pictures from Web Sites


    We have shown you how you can transfer pictures from your computer to your iPhone
    and save them from email messages. You can also download and save pictures right
    from the Web onto your iPhone.


    **CAUTION:** We strongly encourage you to respect image copyright laws as you
    download and save images from the Web. Unless the web site indicates an image
    is free, you should check with the web site owner before downloading and saving
    any pictures.

