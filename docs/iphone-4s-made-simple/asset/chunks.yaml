  trans: "\n# 重复事件\n\n您有些约好的事项每天、每周或每月在同一时间发生。如果您要安排重复事件，请按照以下步骤操作：\n\n![images](img/U1916.jpg)\n\
    \n1. 轻触`重复`标签，然后从列表中选择重复事件的时间间隔。\n2. 轻触`完成`返回主`事件`界面。\n3. 如果您设置了`重复`会议，那么还需要指定重复事件的结束时间。轻点`结束重复`按钮进行设置。\n\
    \n   ![images](img/U1917.jpg)\n\n4. 您可以选择`永不结束`或设置一个具体日期。\n5. 完成后轻点`完成`。\n\n#\
    \ 日历提醒\n\n您可以让 iPhone 4 在临近约会时发出声音提醒，即*提示*。提醒功能有助于防止您忘记重要事项。请按照以下步骤创建提醒：\n\n![images](img/U1918.jpg)\n\
    \n1. 轻触`提醒`标签，然后选择提醒闹钟选项。您可以选择不设置闹钟（`无`），或者设置提醒时间，范围从`事件发生时`一直延伸到`事件前 2 天`，具体取决于您的需求。\n\
    2. 轻触`完成`返回主`事件`界面。\n\n## 第二提醒\n\n**注意：** 如果您使用的日历是通过 iTunes 或 iCloud 同步的，您将看到`第二提醒`选项。但如果您的活动绑定的是通过\
    \ Exchange 设置同步的 Google 日历，则不会看到第二提醒。\n\n![images](img/U1919.jpg)\n\n大多数情况下，一旦您设置了第一个`提醒`选项，就会出现`第二提醒`选项的标签。您可以将这个第二提醒设置在第一提醒之前或之后的另一个时间。有些人发现第二提醒对记住关键事件或约会非常有帮助。\n\
    \n**提示：** 这里有一个实用示例，说明您何时可能需要设置两个日历提醒。\n\n如果您的孩子有看医生或牙医的预约，您可能想将第一个提醒设置在预约前一晚。这会提醒您写一张假条交给孩子。\n\
    \n然后您可以将第二个提醒设置在预约时间前 45 分钟。这样您就有足够的时间去学校接孩子并赶到预约地点。\n\n## 选择日历\n\n![images](img/U1920.jpg)\n\
    \n如果您使用多个日历，请轻点`日历`标签，更改新事件所属的日历。\n\n轻触左上角的`日历`按钮，可以查看所有日历。\n\n![images](img/U1921.jpg)\n\
    \n轻点您要用于此特定事件的日历。通常，默认选中的是您上次使用 iPhone 安排事件时选择的日历。\n\n## 忙闲状态\n\n您还可以让他人了解您在已安排事件期间的忙闲状态。您可以从以下选项中选择您的忙闲状态：`忙碌`（默认）、`空闲`、`待定`或`外出`。（`待定`和`外出`仅在您使用\
    \ Exchange 设置同步账户时才会显示。）\n\n![images](img/U1922.jpg)\n\n**注意：** 仅当您用于此事件的日历与 iCloud、Exchange\
    \ 或 Exchange/Google 设置同步时，您才会看到`忙闲状态`或`受邀者`字段，并且它们各自提供的选项略有不同。如果您与 iCloud 同步，还会看到一个`URL`字段，您可以在其中添加一个供稍后使用的网址。\n\
    \n## 向日历事件添加备注\n\n![images](img/U1923.jpg)\n\n如果您想向日历事件添加一些备注，请按照以下步骤操作：\n\n![images](img/U1924.jpg)\n\
    \n1. 轻点`备注`，然后输入或复制粘贴一些备注内容。\n2. 轻点`完成`结束添加备注。\n3. 再次轻点`完成`保存您的新日历事件。\n\n**提示：**\
    \ 如果这是要去一个新地点的会议，您可能需要输入或复制粘贴一些驾车路线。\n\n# 在邮件和日历应用之间使用复制粘贴功能\n\niPhone 软件的新型快速应用切换器意味着您现在可以轻松地在`邮件`和`日历`程序之间跳转以复制粘贴信息。这些信息可以是任何内容，从会议所需的要点笔记到驾车路线。请按照以下步骤在`邮件`和`日历`程序之间复制粘贴信息：\n\
    \n1. 创建新日历事件或编辑现有事件，如本章前面所述。\n\n   ![images](img/U1925.jpg)\n\n2. 向下滚动到`备注`字段并轻点它以将其打开。\n\
    3. 双击`主屏幕`按钮以调出快速应用切换器。\n4. 如果您看到`邮件`图标，请轻点它。如果您没有看到`邮件`图标，请向左或向右滑动寻找。找到后，轻点它以打开`邮件`应用。\n\
    5. 双击一个单词，然后用手指拖动蓝色手柄选择要复制的文本。\n\n   ![images](img/U1926.jpg)\n\n6. 轻点`复制`按钮。\n\
    7. 双击`主屏幕`按钮以调出快速应用切换器。\n8. 轻点`日历`图标。它应该是左侧的第一个图标，因为您刚刚跳出该应用。\n\n   ![images](img/U1927.jpg)\n\
    \n9. 现在在`备注`字段中长按。松开手指时，您应该会看到`粘贴`弹出框。如果看不到，请将手指按住稍久一点，直到看见它为止。\n\n   ![images](img/U1928.jpg)\n\
    \n10. 轻点`粘贴`。\n11. 现在您应该会看到复制并粘贴到`备注`字段中的文本。\n\n    ![images](img/U1929.jpg)\n\
    \n12. 轻点`完成`以保存您的更改。\n\n# 编辑约会\n\n有时，约会的详情可能会发生变化而需要`调整`。幸运的是，在 iPhone 上修改约会很简单。如果您只想更改时间，可以像下面这样在屏幕上直接移动它。\n\
    \n![images](img/U1930.jpg)\n\n1. 按住您想要更改的约会不放。\n2. 将此约会拖到新的时间段。\n\n   如果您需要更改的时间范围超出拖放操作所能达到的幅度，或者需要更改其他字段，也可以使用`编辑`按钮。\n\
    \n3. 轻点您要更改的约会。\n4. 轻点右上角的`编辑`按钮，查看显示约会详情的`编辑`屏幕。\n5. 轻触需要调整的字段标签，就像创建事件时那样。例如，您可以通过轻触`开始`或`结束`标签，然后调整事件的开始或结束时间来更改此约会的时间。\n\
    \n## 编辑重复事件\n\n编辑重复事件的方式与编辑其他任何事件完全相同。唯一的区别是，完成编辑后会弹出一个问题。您需要回答此问题并轻点`完成`按钮。\n\
    \n![images](img/U1931.jpg)\n\n如果只想更改此重复事件的当前实例，请轻点`仅对此事件保存`。\n\n如果要更改此重复事件的所有实例，请轻点`对未来事件保存`。\n\
    \n## 将事件切换到其他日历\n\n如果您错误地将事件设置在了错误的日历上，请直接轻点`日历`按钮更改日历。然后，选择您已同步到 iPhone 的其他日历之一。\n\
    \n**注意：** 根据您选择的日历，不同的字段可能会显示或消失。\n\n如果您将事件从使用`iTunes`同步的日历更改为与 Exchange 同步的日历，您会看到`第二提醒`字段消失。同时，使用\
    \ Exchange、Google 或 iCloud 日历时，您会看到两个新字段出现：`受邀者`和`忙闲状态`。\n\n## 删除事件\n\n请注意，在`编辑`屏幕的底部，您还可以选择删除此事件。只需轻触屏幕底部的`删除事件`按钮即可。\n\
    \n![images](img/U1932.jpg)\n"
- fmt: "# Meeting Invitations\n\nFor those who use Microsoft Exchange, `Microsoft\
    \ Outlook`, or iCloud regularly, meeting invitations become a way of life. You\
    \ receive a meeting invitation in your email, you accept the invitation, and then\
    \ the appointment gets automatically placed in your calendar.\n\nOn your iPhone,\
    \ you will see that invitations you accept are placed into your calendar immediately.\n\
    \nIf you touch the meeting invitation in your calendar, you can see all the details\
    \ that you need: the dial in number, the meeting ID, and any other details that\
    \ might be included in the invitation.\n\n![images](images/U1933.jpg)\n\n# Calendar\
    \ Options\n\nThere are only a few options to adjust in your `Calendar` app; you\
    \ can find these in the `settings` app. Follow these steps to adjust these options:\n\
    \n![images](images/U1934.jpg)\n\n1.  Tap `settings` from your `Home`\n2.  Scroll\
    \ down to `Mail, Contacts, Calendars` and tap it.\n3.  Scroll down to `Calendars`\
    \ (it's at the very bottom!) to see a few options.\n4.  The first option is a\
    \ simple switch that notifies you about `New Invitation Alerts`. If you receive\
    \ any meeting invitations, it is good to keep this option set to the default `ON`\
    \ position.\n5.  Next, you may see the `sync` option if you sync your `Calendar`\
    \ program using Exchange or iCloud. You can adjust the setting to sync events\
    \ to `2 Weeks Back`, `1 Month Back`, `3 Months Back`, `6 Months Back`, or to show\
    \ all `All Events`.\n6.  Next, you can choose your time zone. This setting should\
    \ reflect your `Home` settings from when you set up your iPhone. If you are traveling\
    \ and want to adjust your appointments for a different time zone, you can change\
    \ the `Time Zone` value to whatever city you prefer.\n\n    ![images](images/U1935.jpg)\n\
    \n7.  Default alert times can be set for birthdays, events, and all-day events.\
    \ Events contain the usual options while birthdays and all-day events allow for\
    \ the day of the event, 1 day before, or 2 days before (all at 9am), or 1 week\n\
    \n## Changing the Default Calendar\n\nWe mentioned earlier that you can have multiple\
    \ calendars displayed on your iPhone. The `Default Calendar` screen allows you\
    \ to choose which calendar will be your default calendar.\n\n![images](images/U1936.jpg)\n\
    \nSpecifying a calendar as the default means that, when you go to schedule a new\
    \ appointment, this calendar will be selected by default.\n\nIf you wish to use\
    \ a different calendar—say, your `work` calendar—then you can change that when\
    \ you actually set the appointment, as shown earlier in this chapter.\n\n## Reminders\n\
    \n`Reminders` is a new app in iOS 5 that lets you simply and easily keep track\
    \ of the things you need to get done, the dates and times you need to get them\
    \ done by, and even the locations where they need doing. You can think of this\
    \ app as Apple's answer to task or to-do lists.\n\n## Reminder Views\n\nYour `Reminders`\
    \ app has three main views: `List`, `Date`, and `Month`. What follows is a quick\
    \ overview of these views.\n\n`List` is the default view for `Reminders` and shows\
    \ you at a glance all the tasks you need to accomplish.\n\n![images](images/U1937.jpg)\n\
    \n![images](images/U1938.jpg)\n\n**NOTE:** The default `List` view for iCloud\
    \ accounts is called `Reminders`. The default `List` view for Microsoft Exchange\
    \ accounts is called `Tasks`.\n\nIf you have multiple lists, you can move between\
    \ them by swiping from right to left, just as when moving between the different\
    \ app pages on your iPhone's `Home` screen.\n\nSwipe from left to right to see\
    \ a list of your `Completed`\n\n`Date` view lets you see your reminders on the\
    \ day they're due. You can easily swipe from one day to the next; you can also\
    \ scroll along the `Date` slider at the bottom. Follow these steps to change the\
    \ date shown:\n\n*   **Go to the next day**: Swipe from right to left.\n*   **Go\
    \ to the previous day**: Swipe from left to right.\n*   **Go to Completed Tasklist**:\
    \ Swipe from left to right from the current day.\n\n**TIP**: To return to the\
    \ `Today` view, just touch the `Today` button at the top right.\n\n![images](images/U1939.jpg)\n\
    \nTo see the `Month` view, tap the `Month` button ![images](images/U1941.jpg)\
    \ at the top left of the `Date` view. This will show you a layout of the full\
    \ month. Days with reminders due are colored red.\n\n![images](images/U1940.jpg)\n\
    \n**TIP**: To return to the `Today` view, just touch the `Today` button at the\
    \ top right.\n\n![images](images/U1942.jpg)\n\n![images](images/U1943.jpg)\n\n\
    Follow these steps to move back and forth between months:\n\n*   **Go to the next\
    \ month**: scroll down.\n*   **Go to the previous month**: scroll up.\n\n## Adding\
    \ a New Reminder\n\nTo add a new task from any `List` view, follow these steps:\n\
    \n1.  Tap the first blank line at the end of your current list.\n\n    ![images](images/U1944.jpg)\n\
    \n2.  Type in a title for your task.\n3.  When you're finished, tap the black\
    \ `Done` button on the top right.\n\n**NOTE:** You can also tap the `Add` button\
    \ to create a new task. ![images](images/U1944.jpg)\n\n## Adding Reminder Details\n\
    \nTo add *details* to a task, tap the task's title. The `Details` screen lets\
    \ you add the due date or location for `Remind Me`, the `Priority` of the reminder,\
    \ which `List` you'd like it attached to, and any `Notes` you might want to add.\n\
    \n![images](images/U1945.jpg)\n\nThe `Details` page is also where you can delete\
    \ a task.\n\n**NOTE:** if you don't see all the options at first, tap the `show\
    \ More` button to reveal them.\n\n## Setting Due Dates and Locations\n\nThe `Reminders`\
    \ app includes standard due dates you can set for your reminders. When a task\
    \ reaches its due date, you'll receive a popup notification to remind you about\
    \ it.\n\nThe `Reminders` app also includes powerful geo-fencing capabilities;\
    \ that is, it lets you set up location-based alerts for reminders. This means\
    \ you can set reminders to change the light bulb when you arrive at your mother's\
    \ house or to pick up milk when you leave the office.\n\n**NOTE:** Location-based\
    \ reminders are currently available only if you're using iCloud and you assign\
    \ the task to an iCloud associated list.\n\n![images](images/U1946.jpg)\n\nFollow\
    \ these steps to set a `Remind Me` date or location:\n\n1.  Tap `Remind Me`.\n\
    2.  To set a due date, toggle the `On a Day` option to `ON`. By default, the date\
    \ will be set to the current day.\n3.  To change the date, tap it and move the\
    \ rotating dials at the bottom to reflect the correct date for the task.\n4. \
    \ Tap `Done` to return to the main `Details` screen.\n\n    ![images](images/U1947.jpg)\n\
    \n5.  To set a place, toggle `At a Location` to `ON`. By default, the place will\
    \ be set to your current location.\n6.  To change your location, tap the field\
    \ beneath `At a Location` and then tap `Choose Address`.\n7.  Select an address\
    \ from your `Contacts` list.\n8.  Tap `Done` to return to the main `Details` screen.\n\
    \n**TIP:** Before you can use a location in `Reminders`, the location must be\
    \ in your `Contacts`. To quickly add locations to your `Contacts`, use the `Maps`\
    \ app (see [Chapter 21](#Chapter21.html#ch21): \"Maps\").\n\n1.  If you want to\
    \ be reminded when you leave a location, tap `when I Leave`.\n2.  If you want\
    \ to be reminded when you arrive at a location, tap `when I Arrive`.\n3.  Tap\
    \ `Done` to return to the main `Details` screen.\n\n**NOTE:** if you set both\
    \ a due date and a location, `Reminders` will send you an alert for whichever\
    \ occurs first—you arrive at or leave a location or a reminder reaches the set\
    \ time.\n\n## Recurring Reminders\n\nSome of your reminders need to be triggered\
    \ every day, week, or month at the same time or place. Follow these steps if you\
    \ are scheduling a repeating or recurring task:\n\n1.  Tap the `Repeat` tab and\
    \ then select the time interval for the repeated event from the list.\n2.  Tap\
    \ `Done` to return to the main `Details` screen."
