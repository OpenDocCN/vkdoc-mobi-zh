  trans: "\n### 指定接收和发送服务器\n\n有时，iPhone 可能无法自动设置你的电子邮件账户。在这种情况下，你需要手动输入更多设置才能启用你的电子邮件账户。\n\
    \n**提示：** 你可以通过在网上搜索你的电子邮件提供商名称和电子邮件设置来找到相应的设置。\n\n如果 iPhone 仅凭你的电子邮件地址和密码无法登录你的服务器，那么你将看到一个类似于此的屏幕。\n\
    \n在**接收邮件服务器**下，在**主机名**、**用户名**和**密码**字段中键入相应的信息。通常，你的接收邮件服务器类似于 `mail.*你的网络服务商名称*.com`。\n\
    \n要调整你的发送服务器名称，请轻点**发送邮件服务器**。你可以在接下来的屏幕上调整发送邮件服务器。这些服务器名称通常看起来像 `smtp.*你的网络服务商名称*.com`\
    \ 或 `mail.*你的网络服务商名称*.com`。\n\n你可以尝试将**服务器名称**和**密码**字段留空。如果这不起作用，你随时可以返回并更改它们。\n\
    \n![images](img/U1705.jpg)\n\n系统可能会询问你是否要使用 SSL（安全套接层），这是一种发送邮件的安全措施，你的电子邮件提供商可能会要求使用。如果你不确定是否需要\
    \ SSL，请与你的电子邮件提供商核对邮件设置。\n\n**提示：** 作者建议你尽可能使用 SSL 安全协议。如果你不使用 SSL，你的登录凭据、邮件以及任何私人信息都将以明文形式发送（未加密），这会让他们容易受到窥探。\n\
    \n### 验证你的账户是否已设置完成\n\n输入所有信息后，iPhone 将尝试配置你的电子邮件账户。你可能会收到一条错误消息；如果发生这种情况，你需要检查你输入的信息。\n\
    \n![images](img/U1706.jpg)\n\n如果你进入了显示所有电子邮件账户的屏幕，请查找新账户的名称。\n\n如果你看到了它，说明你的账户已设置成功。\n\
    \n![images](img/U1707.jpg)\n\n### 修复无法获取邮件错误\n\n如果你轻点**邮件**图标，并收到一条显示“无法获取邮件——未提供\
    \ *(你的账户)* 的密码”的错误，则需要输入你的密码。\n\n有关此问题的帮助，请参阅本章的“为从 iTunes 同步的电子邮件账户输入密码”部分。\n\
    \n![images](img/U1708.jpg)\n\n## 邮箱屏幕——收件箱和账户\n\n顶层屏幕是你的**邮箱**屏幕。你总是可以通过轻点左上角的按钮进入该屏幕。继续轻点这个左上角的按钮，直到看不到更多按钮。当这种情况发生时，你就处在**邮箱**屏幕中。\n\
    \n从**邮箱**屏幕，你可以访问以下项目：\n\n*   **统一收件箱：** 通过轻点**所有收件箱**来访问。\n*   **每个单独账户的收件箱：**\
    \ 通过轻点**收件箱**部分中该电子邮件账户的名称来访问。\n\n    ![images](img/U1709.jpg)\n\n*   **账户部分中每个电子邮件账户的文件夹：**\
    \ 通过轻点账户名称来查看所有文件夹以访问这些文件夹。\n\n    ![images](img/U1710.jpg)\n\n## 添加或编辑电子邮件文件夹或邮箱\n\
    \n借助 iOS 5，如果你使用的是 iCloud 同步邮件账户，或者你的邮件服务器支持此功能，你现在可以直接在 iPhone 上添加或编辑电子邮件文件夹。例如，你可能想要更改邮件文件夹名称或添加新邮件文件夹，以便更好地组织你的邮件收件箱。一个例子是创建一个名为“需要关注”的新文件夹，并将所有你当前无法处理，但需要确保稍后回到办公桌前处理的电子邮件放入其中。要在你的设备上添加或编辑邮箱，请按照以下步骤操作：\n\
    \n1.  在**邮箱**屏幕上，向下滚动并轻点“账户”下列出的任意电子邮件账户。\n\n    ![images](img/U1711.jpg)\n\n\
    2.  在此示例中，我们将编辑 iCloud 账户邮箱。在此屏幕上，轻点右上角的**编辑**。\n\n    ![images](img/U1712.jpg)\n\
    \n3.  然后，你可以执行以下操作：\n\n    *   轻点底部的**新建邮箱**以创建一个新邮箱。\n    *   轻点任意邮箱文件夹以编辑其名称或将其删除。\n\
    \n    ![images](img/U1713.jpg)\n\n## 收件箱中的已标记邮件和主题相关邮件\n\n你会注意到，所有未读邮件在邮件左侧都会有一个蓝色圆点\
    \ ![images](img/U1715.jpg) 作为标记。\n\n你还会注意到，某些邮件在右侧会显示一个数字和一个指向右方的箭头 (>)，如下所示：![images](img/U1716.jpg)。这表示该邮件具有三条相关的邮件（回复和转发）。\n\
    \n![images](img/U1714.jpg)\n\n已标记的邮件在其左侧会有一个小旗帜，如下所示：![images](img/U1717.jpg)\n\
    \n轻点任意邮件即可将其打开。只有当存在相关邮件时，它才会无法直接打开。在这种情况下，你首先会看到一个包含所有相关邮件的屏幕。轻点其中任意邮件即可打开并查看。\n\
    \n要离开**收件箱**视图，请轻点左上角的按钮。\n\n你可以通过查看左上角的按钮来判断你在查看哪个电子邮件账户：\n\n*   如果按钮显示**邮箱**，则表明你正在查看所有收件箱的汇总。\n\
    *   如果按钮显示一个账户名称，例如**iCloud** 或 **Exchange**，则表明你仅查看该账户的收件箱。\n\n### 移动、删除或标记（标记）多条邮件\n\
    \n如果你想一次移动或删除多条邮件，可以从收件箱屏幕进行操作。按照以下步骤一次删除多条邮件：\n\n1.  在查看收件箱屏幕时，轻点右上角的**编辑**按钮。\n\
    2.  轻点以选择所需的邮件；邮件旁边的红色**勾选标记**图标表示它已被选中。\n3.  要删除邮件，请轻点底部的**删除**按钮。\n4.  要将邮件移动到其他文件夹，请轻点**移动**按钮并选择文件夹。\n\
    5.  要标记邮件为已标记或未读，请轻点**标记**按钮。“未读”将在邮件旁边重新放回蓝色圆点。如果你标记了一封邮件，你会看到其旁边出现一个小旗帜，如下所示：![images](img/U1719.jpg)\n\
    \n    ![images](img/U1718.jpg)\n\n## 查看单条邮件\n\n当你从**收件箱**屏幕轻点一封邮件时，你会看到**主要**邮件视图。你可以在竖屏和横屏模式下查看邮件，请参见图\
    \ 17-1。竖屏模式通常会显示更多文本。横屏模式通常会让你享受更大的文字和图片。\n\n![images](img/1701.jpg)\n\n**图 17-1.**\
    \ *在竖屏和横屏模式下查看电子邮件。*\n\n**提示：** 如果你将 iPhone 放在桌子上或放在膝盖上拿着使用，你可能希望使用**竖屏锁定**图标将视图锁定在竖屏模式。这将防止图像不必要地翻转。要锁定视图，请按照以下步骤操作：\n\
    \n1.  双击**主屏幕**按钮并向左向右滑动。\n2.  轻点**竖屏锁定**按钮以将屏幕锁定在竖屏模式。\n\n# 编写和发送电子邮件\n\n要启动电子邮件程序，请轻点**主屏幕**上的**邮件**图标。\n\
    \n**提示：** 如果你在查看某封特定邮件、文件夹列表或某个账户时退出了**邮件**应用，那么当你返回**邮件**应用时，将直接返回到同一位置。\n\n\
    如果你是第一次进入电子邮件，你可能会看到空的收件箱。轻点窗口左下角的**刷新**按钮 ![images](img/U1720.jpg) 以检索最新电子邮件。iPhone\
    \ 将开始检查新邮件，然后显示每个账户的新邮件数量。\n"
- fmt: "# Composing a New Email Message\n\nWhen you start the `Mail` program, your\
    \ first screen should be your `Accounts` screen. At the bottom-right corner of\
    \ the screen, you will see the `Compose` icon. Touch the `Compose` icon to start\
    \ creating a new message.\n\n![images](images/U1721.jpg)\n\n## Addressing Your\
    \ Message—Choose the Recipients\n\nYou have a few options for selecting recipients,\
    \ depending on whether the person is in your `Contacts` list on your iPhone:\n\
    \n**Option 1**: Type a few letters of someone's first name; hit the `Space` key,\
    \ and then type a few letters of that person's last name. The person's name should\
    \ appear in the list; tap that person's name to select that contact.\n\n![images](images/U1722.jpg)\n\
    \n**Option 2**: Type an email address. Notice the `@` and `Period` (`.)` keys\
    \ on the bottom, which help your typing.\n\n**TIP:** Press and hold the `period`\
    \ key to see `.com`, `.edu`, `.org`, and other email domain name suffixes.\n\n\
    ![images](images/U1723.jpg)\n\n**Option 3**: Hit the `Plus Sign` (`+`) ![images](images/U1724.jpg)\
    \ to view your entire `Contacts` list and search or select a name from it.\n\n\
    If you want to use a different contact group, tap the `Groups` button in the upper-left\
    \ corner.\n\nDouble-tap `Contacts` at the top of the screen to see the `Search`\
    \ window. Next, type a few letters to search for your contact.\n\n![images](images/U1725.jpg)\n\
    \n### Deleting a Recipient\n\nIf you need to delete a name from the recipient\
    \ list (`To:`, `Cc:`, or `Bcc:`), tap the name to select it ![images](images/U1726.jpg)\
    \ and hit the `Backspace` key. ![images](images/U1727.jpg)\n\n**TIP:** If you\
    \ want to delete the last recipient you typed (and the cursor is sitting next\
    \ to that name), hit the `Delete` key once to highlight the name and hit it a\
    \ second time to delete it.\n\n### Adding a CC or BCC Recipient\n\n![images](images/U1728.jpg)\
    \ To add a carbon copy (`Cc:`) or blind carbon copy (`Bcc:`) recipient, you need\
    \ to tap the `Cc:` or `Bcc:` field just under the `To:` field at the top of the\
    \ email message. Doing so opens up the tapped field.\n\n![images](images/U1729.jpg)\n\
    \n### Moving Recipients\n\nIf you originally add a recipient as the `To:` field,\
    \ but change your mind and decide you'd rather add her to a `Cc:` or `Bcc:` field\
    \ (or vice versa), then simply tap and hold the recipient's name and drag it to\
    \ the preferred field.\n\n![images](images/U1730.jpg)\n\n## Changing the Email\
    \ Account to Send From\n\nIf you have more than one email account set up, the\
    \ iPhone will use whichever account is set as the default account. (This is set\
    \ in `Settings` > `Mail, Contacts, Calendars` > `Default Account` at the bottom\
    \ of the `Mail` section.)\n\nFollow these steps to change the email account you\
    \ send from:\n\n1. Tap an email's `From:` field to highlight it.\n2. Tap the `From:`\
    \ field again to see a list of your accounts in a scroll wheel at the bottom of\
    \ the screen.\n3. Scroll up or down, and then tap a new email account to select\
    \ it.\n4. Tap the `Subject` field to finish changing the email address you send\
    \ from.\n\n   ![images](images/U1731.jpg)\n\n## Typing Your Subject\n\nNow you\
    \ need to enter a subject for your email. Follow these steps to do so:\n\n1. Touch\
    \ the `Subject:` line and enter text for the `Subject:` field of the email.\n\
    2. Press the `Return` key or tap the `Body` section of the email to move the cursor\
    \ to the `Body` section.\n\n   ![images](images/U1732.jpg)\n\n## Typing Your Message\n\
    \nNow that the cursor is in the `Body` section of the email (under the subject\
    \ line), you can start typing your email message.\n\n**CAUTION:** There is only\
    \ one email signature on your iPhone, which gets automatically applied to each\
    \ message you send from your iPhone—even if you have multiple email accounts set\
    \ up. So, be careful if you are running two different businesses or don't want\
    \ your personal email signature to go to all your business contacts. It's probably\
    \ best to make your email signature fairly generic.\n\n### Formatting Text, Defining\
    \ Words, Quoting Text and More\n\nYou can tap any text to highlight it, use the\
    \ blue handles to expand the selection. Then using the popup menu above the selection,\
    \ you can do any of the following:\n\n![images](images/U1733.jpg)\n\n- Tap `Cut`,\
    \ `Copy` or `Paste` to perform those functions.\n- Tap `Suggest` if the word is\
    \ underlined and you want to correct the spelling.\n- Tap the triangle at the\
    \ right edge to see more options.\n- Tap `B / U` to adjust formatting to `Bold`,\
    \ `Italics` or `Underline`.\n\n  ![images](images/U1734.jpg)\n\n- Tap `Define`\
    \ to look the selected word up in the dictionary.\n- Tap `Speak` to have the word\
    \ spoken to you.\n- Tap `Quote Level` to increase or decrease the quote level\
    \ of the selected text.\n\n  ![images](images/U1735.jpg)\n\n### Email Signatures\n\
    \nThe default email signature is shown in the image to the right: `Sent from my\
    \ iPhone`.\n\n**TIP:** You can change this signature to be anything you want;\
    \ see the “Changing Your E-Mail Signature” section later in this chapter to learn\
    \ how to change your e-mail signature.\n\n## Keyboard Options\n\nWhile you are\
    \ typing, remember you have two keyboard options: the smaller `Portrait` (vertical)\
    \ keyboard and the larger `Landscape` (horizontal) keyboard, see [Figure 17–2](#Chapter17.html#fig_17_2).\n\
    \n![images](images/1702.jpg)\n\n**Figure 17–2.** *Turn your device on its side\
    \ to get the larger landscape keyboard.*\n\n**TIP:** If you have larger hands,\
    \ it might be easier to type when the keyboard is larger. Once you get the hang\
    \ of typing on the larger keyboard with two hands, you will find that it is much\
    \ faster than typing with one finger. See [Chapter 2](#Chapter02.html#ch2): “Typing,\
    \ Copy and Search” for more typing tips.\n\n## Auto-Correction and Auto-Capitalization\n\
    \nAs you type, you will notice that some words will be auto-capitalized and automatically\
    \ corrected. Red underlined words are flagged as misspelled by the spelling checker.\
    \ See [Chapter 2](#Chapter02.html#ch2): “Typing, Copy and Search” to learn how\
    \ these all functions work; this chapter also provides some additional typing\
    \ tips.\n\n## Send Your Email\n\nOnce you have typed your message, tap the blue\
    \ `Send` button in the top-right corner.\n\nYour email will be sent, and you should\
    \ hear the iPhone's sent mail sound, which confirms that your email was sent.\
    \ You can learn how to enable or disable this sound in the “Adjusting Sounds on\
    \ your iPhone” section of [Chapter 9](#Chapter09.html#ch9): “Personalize and Secure.”\n\
    \n![images](images/U1736.jpg)\n\n### Save As Draft to Send Later\n\nIf you are\
    \ not ready to send your message, but want to save it as a draft message to send\
    \ later, follow these steps:\n\n1. Compose your message, as described earlier.\n\
    2. Press the `Cancel` button in the upper-left corner.\n3. Select the `Save Draft`\
    \ button at the bottom of the screen.\n\n   ![images](images/U1737.jpg)\n\nLater,\
    \ when you want to locate and send your draft message, follow these steps:\n\n\
    1. Open the `Drafts` folder in the email account from which you composed this\
    \ message. See the “Moving Around in Mail Folders” section earlier in this chapter\
    \ for help getting into the `Drafts` folder.\n2. Tap the email message in the\
    \ `Drafts` folder to open it.\n3. Tap anywhere in the message to edit it.\n4.\
    \ Tap the `Send` button."
