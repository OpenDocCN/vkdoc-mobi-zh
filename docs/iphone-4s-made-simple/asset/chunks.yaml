  trans: "\n### 在 iPhone 上发送短信\n\n短信已成为当今手机上最常用的服务之一。尽管它在欧洲和亚洲的使用更为广泛，但在北美也越来越受欢迎。\n\
    \n其概念非常简单：无需拨打电话，而是向对方的手机发送一条简短信息。发送短信比打电话的干扰要小得多；不过，你的朋友、同事或同学中可能有人没有 iPhone，因此电子邮件可能并非总是可行之选。\n\
    \n本书的一位作者经常用短信与他的孩子们交流——这正是他这一代人的沟通方式。“今晚回家吃饭吗？”“嗯。”就这样——与一个十八岁的年轻人完成了一次有意义的对话——简短、即时、轻松。\n\
    \n#### 编写短信\n\n编写短信与发送电子邮件十分相似。短信的妙处在于它几乎可以发送到任何手机上，并且回复起来也非常简单。\n\n#### 从“信息”App\
    \ 编写短信\n\n有几种方法可以启动你的“`信息`”应用。最简单的方法就是轻点“`主屏幕`”上的“`信息`”图标。\n\n当你首次启动“`信息`”应用时，很可能还没有任何信息，因此屏幕会是空白的。一旦你开始使用短信服务，屏幕将显示信息列表以及与你联系人当前的“进行中”对话。请按照以下步骤发送短信：\n\
    \n![图片](img/U1004.jpg)\n\n1.  轻点屏幕右上角的`编写`图标。\n\n    ![图片](img/U1005.jpg)\n\n\
    2.  光标会立即跳转到“`收件人：`”栏。你可以开始输入联系人的姓名，也可以直接轻点“`加号`”（`+`）按钮来搜索或滚动浏览你的联系人列表。\n3. \
    \ 如果你只想直接输入某人的手机号码，可以按下`123`按钮并拨号。\n\n    ![图片](img/U1006.jpg)\n\n    ![图片](img/U1006a.jpg)\n\
    \n4.  当找到你想要使用的联系人时，轻点此人的姓名，它就会出现在“`收件人：`”栏中。\n5.  当你准备好输入短信内容时，请轻点屏幕中间输入框（位于`发送`按钮旁边）的任意位置。\n\
    \n    ![图片](img/U1008.jpg)\n\n6.  键盘将会显示出来。输入你的信息，完成后轻点`发送`。\n\n    **注意**：如果你已在“`设置`”>“`信息`”中启用了字符计数器，它会显示出来。\n\
    \n**提示**：如果你喜欢，也可以使用横屏模式下更大的键盘来发送短信。使用更大的按键输入会更方便，尤其是当你的手指比较大，或者难以看清较小的按键时。\n\n\
    #### 发送短信后的选项\n\n发送短信后，窗口会变为你与联系人之间的一个“*串连*”对话窗口。如果你使用的是短信，发送的信息会显示在屏幕右侧的绿色气泡中。如果你使用\
    \ iMessage，则你发送的信息会出现在蓝色气泡中。当你的联系人回复时，他的信息会显示在屏幕另一侧的灰色气泡中。\n\n![图片](img/U1009.jpg)\n\
    \n若要离开`编写`屏幕，请轻点左上角的“`信息`”，或按下`主屏幕`按钮返回你的“`主屏幕`”。\n\n**注意：**如果信息发送失败，你会看到其旁边有一个感叹号。你还会在“`信息`”应用图标的右上角看到一个`红色感叹号`图标。\n\
    \n![图片](img/U1010.jpg)\n\n如果发生这种情况，你可以像之前一样再发送一条信息。或者，你可以呼叫该联系人，或查看他的联系人信息。\n\n\
    若要给正在与之发短信的联系人打电话，请轻点`呼叫`按钮。若要查看他的联系人信息，请轻点`联系人信息`按钮。\n\n![图片](img/U1012.jpg)\n\
    \n**提示：**虽然短信技术上限是 160 个字符，但许多 GSM 运营商（包括 AT&T）会将较长的文本拆分成多条短信，并在收到后重新组合成一条信息。像\
    \ Verizon 这样的 CDMA 网络有时在重新组合超过 160 个字符的短信时会遇到问题；其他时候，它们可能会乱序送达。如果你遇到这个问题，可以尝试自己将短信拆分成几条较短的信息发送，而不是发送一条长信息。\n\
    \n#### 从“通讯录”编写短信\n\n你还可以启动“`短信`”应用，向 iPhone 通讯录中的任何联系人编写并发送一条短信。请按照以下步骤操作：\n\n\
    1.  通过搜索或浏览“`通讯录`”找到你想要发短信的联系人。\n\n    ![图片](img/U1013.jpg)\n\n2.  在联系人信息的底部，你会看到一个标有“`短信`”的框。轻点该框，系统会提示你选择要使用的号码（如果你为该联系人列了多个号码）。\n\
    3.  选择首选号码，然后按照前面列出的步骤操作。\n\n**注意：**请记住，你只能向手机号码发送短信。\n\n#### 回复短信\n\n当收到一条短信时，你的\
    \ iPhone 会根据你的设置播放提示音、振动，或两者皆有。此外，屏幕顶部的“`通知中心`”会显示一个提示，让你可以选择立即回复。\n\n![图片](img/U1014.jpg)\n\
    \n当你看到和/或听到提示时，只需轻点该通知即可跳转到“`信息`”应用并输入你的回复，如前所示。\n\n如果你错过了通知或想稍后回复，只需从屏幕顶部下拉“`通知中心`”列表，然后轻点你想要回复的信息。\n\
    \n**注意**：如果你的屏幕已锁定，你将看到信息以弹出窗口或“`锁定屏幕`”列表的一部分形式出现。只需滑动“`信息`”图标即可解锁，然后你将进入该信息。\n\
    \n![图片](img/U1015.jpg)\n\n#### 查看已存储的信息\n\n一旦你开始进行一些串连对话，它们就会被存储在“`信息`”应用中。轻点“`信息`”图标，你就可以滚动浏览你的信息线程。\n\
    \n![图片](img/U1016.jpg)\n\n想要继续与某人对话，只需轻点所需的线程，它就会打开，向你展示所有过往信息的往来记录。轻点文本框，输入你的信息，然后轻点`发送`按钮即可继续对话。\n\
    \n![图片](img/U1017.jpg)\n\n#### 短信铃声与声音选项\n\n你的 iPhone 允许你设定收到信息时的反应方式。请按照以下步骤选择你偏好的提醒方式：\n\
    \n1.  启动“`设置`”应用，滚动至“`声音`”，然后轻点“`声音`”标签。\n\n    ![图片](img/U1018.jpg)\n\n2.  如果你在“`声音`”菜单中将`振动`功能设置为`开启`（当手机响铃时，请参阅第\
    \ 10 章：“将你的 iPhone 用作电话”），那么收到短信时也会伴随振动。\n3.  再向下滚动一点，你会看到一个标有“`短信铃声`”的标签。轻点此标签，你就可以选择短信的铃声。你可以选择提供的选项（通常有六个），或者选择“`无`”。\n\
    \n    ![图片](img/U1019.jpg)\n\n4.  为短信通知选择你喜欢的声音，然后轻点左上角的“`声音`”![图片](img/U1019a.jpg)按钮以确认你的选择。\n\
    \n    ![图片](img/U1020.jpg)\n\n### MMS——多媒体信息服务\n\n“`信息`”应用为 iPhone 用户提供了发送和接收\
    \ MMS 信息（包括图片信息、视频信息以及多媒体 iMessage）所需的工具。MMS 信息会像你的短信一样，直接显示在信息窗口中。\n\n**注意**：你可以在“`信息`”应用中发送图像、视频、位置（来自地图）、音频（来自“`语音备忘录`”应用）以及电子名片\
    \ vCard（来自“`通讯录`”应用）文件。\n"
- fmt: "#### Sending a Picture or Video with Messages\n\nTo send an MMS message or\
    \ multimedia iMessage, you use the same `Messages` app we discussed when sending\
    \ text messages. Follow these steps do so:\n\n![images](images/U1021.jpg)\n\n\
    1.  Tap the `Messages` icon to start messaging – just as you did with SMS.\n\n\
    \    ![images](images/U1022.jpg)\n\n2.  You will notice that next to the text\
    \ input bubble is a small `Camera` icon. Tap this icon and you will be prompted\
    \ to `Take a Photo or Video` or `Choose Existing`.\n\n    ![images](images/U1023.jpg)\n\
    \n3.  To take a photo, follow the instructions in [Chapter 20](#Chapter20.html#ch20):\
    \ “Working with Photos.” If you select the `Choose Existing` option, just navigate\
    \ through your pictures/videos and find the item you would like to add to your\
    \ message.\n\n    ![images](images/U1024.jpg)\n\n4.  Touch the blue `Choose` button\
    \ in the lower-right corner and you will see the picture load into the small window.\n\
    \n    ![images](images/U1025.jpg)\n\n5.  Select a recipient (as shown earlier)\
    \ and type in a short note if you like. Next, touch the blue `send` button.\n\n\
    \    ![images](images/U1026.jpg)\n\nIf you already have a threaded discussion\
    \ with that particular contact, then his picture will show up in the midst of\
    \ that threaded discussion.\n\n![images](images/U1027.jpg)\n\n**NOTE**: You can\
    \ continue to exchange images and text in the midst of a threaded discussion.\
    \ And you can always scroll through to see the entire discussion — pictures and\
    \ all!\n\n#### Choosing a Picture from Photos to Send via Messages\n\nThe second\
    \ way to send a picture or video message is to go straight to your `Photos` app\
    \ and choose a picture. Follow these steps to do so:\n\n1.  Start your `Photos`\
    \ app and navigate through your pictures as described in [Chapter 21](#Chapter21.html#ch21):\
    \ “Working with Photos.”\n\n    ![images](images/U1028.jpg)\n\n2.  To send just\
    \ one picture, touch the picture you wish to send and then touch the `send` icon\
    \ in the lower-left corner.\n3.  You will now see `Message` as the second option.\
    \ Choose `Message` and the photo will load into the bubble, just as it did previously\
    \ in the `Messages` app.\n\n#### Sending Multiple Pictures\n\nFollow these steps\
    \ to send multiple pictures:\n\n1.  Start the `Photos` app, as you did in the\
    \ previous section.\n\n    ![images](images/U1029.jpg)\n\n2.  Instead of tapping\
    \ one picture, tap the Action button in the lower-left corner.\n3.  Now, just\
    \ tap up to pictures. You will see them lighten in color, and a Red Checkmark\
    \ icon will appear in the box.\n4.  Once you have chosen a maximum number of pictures\
    \ (this could be 5 or 9, or some other number and will depend on your wireless\
    \ carrier), tap the Share button in the lower-left corner.\n5.  Choose `Message`\
    \ and the pictures will appear in the message bubble.\n\n## Chapter 11\n\n## Video\
    \ Messaging and Skype\n\nYour iPhone brings many new capabilities to your life,\
    \ some of which seemed like science fiction just a few years ago. For example,\
    \ video calling is now not only possible, but extremely easy to use with the new\
    \ `FaceTime` feature. As long as you and your caller are on an iPhone and you're\
    \ both on a Wi-Fi network, you can have unlimited video calls. In this chapter,\
    \ we will show you how to enable and use `FaceTime`, as well as how to start having\
    \ fun with this great new feature.\n\nMaking calls over Wi-Fi and even 3G is also\
    \ possible with `skype`, the popular video calling and chat program that many\
    \ of us use on our computers. We will also show you how to use the `skype` app.\n\
    \nSpeaking of video, your iPhone is a very capable video recorder. You can record\
    \ and export HD video up to 1080p up to 30 frames per second. You can then publish\
    \ that video straight to YouTube or iCloud, or even send it to an email recipient.\
    \ We will also show you how to shoot and quickly “trim” your videos, as well as\
    \ upload them.\n\n### Video Calling\n\nFor many years, we have watched TV episodes\
    \ and movies debut future technology like this. For example, many of these episodes\
    \ and movies show people talking on small, portable phones and having video conversations.\
    \ Even *The Jetsons* cartoon in the 1970s had this as a future concept.\n\nThe\
    \ iPhone makes that future thinking a reality today. There are a few apps that\
    \ enable you to make video calls on your iPhone using the front-facing camera.\
    \ At this time, only one app allows you to use both the front-facing camera and\
    \ the rear camera: `FaceTime`.\n\n#### Video Calling with FaceTime\n\n`FaceTime`\
    \ is the proprietary app highlighted in many Apple commercials for the iPhone.\
    \ Essentially, `FaceTime` is free-over-Wi-Fi calling that allows you to see the\
    \ caller on the other end of the conversation through the phone's front-facing\
    \ camera.\n\n**NOTE:** For now `FaceTime` is only available for video calls between\
    \ recent iOS devices like the iPhone 4, iPhone 4S, iPad 2, and iPod touch 4 as\
    \ well as Mac computers. Also, it's only available over a Wi-Fi network. Apple\
    \ says it is exploring expanding this service, so it will also work over standard\
    \ 3G networks in the near future. The carrier would also have to buy in before\
    \ you would see this feature on a given network.\n\n##### Enabling FaceTime Calling\
    \ on Your iPhone\n\nWhen you first use your device, `FaceTime` may not yet be\
    \ enabled. To enable the iPhone to receive and make `FaceTime` calls, follow these\
    \ steps:\n\n1.  Start your `settings` app.\n\n    ![images](images/U1101.jpg)\n\
    \n2.  Tap `FaceTime`.\n3.  Toggle the `FaceTime` switch to the `ON` position.\n\
    \nYou may be asked to sign in with your Apple ID.\n\n**TIP:** You can also scroll\
    \ to the bottom and tap `Caller ID` to adjust if your phone number or email address\
    \ is shown as your `FaceTime` Caller ID.\n\n##### Using FaceTime\n\nOnce `FaceTime`\
    \ is enabled, you will see it as an option with every call you place from the\
    \ iPhone. The `FaceTime` icon will be part of the option display on all phone\
    \ calls. However, `FaceTime` will only work if the other caller is on an iPhone\
    \ `FaceTime` – enabled iOS device or Mac.\n\n![images](images/U1102.jpg)\n\nTo\
    \ initiate a `FaceTime` call, follow these steps:\n\n1.  Make a call just as you\
    \ normally would on your iPhone.\n2.  Tap the `FaceTime` button (where the `Hold`\
    \ button usually is), and the app will ask the caller on the other end to `Accept`\
    \ the `FaceTime` call.\n3.  Or, you can simply `Accept` the `FaceTime` call from\
    \ the other caller (see [Figure 11–1](#Chapter11.html#fig_11_1)).\n\n![images](images/1101.jpg)\n\
    \n**Figure 11–1.** *Accepting a `FaceTime` call*\n\nOnce a `FaceTime` call is\
    \ initiated, follow these steps to conduct a video conference:\n\n1.  Hold the\
    \ phone away from you a bit.\n2.  Make sure you are *framed* properly in the window.\n\
    3.  You can move the small image of yourself around the screen to a convenient\
    \ spot.\n4.  Touch the `switch Camera` button to show the `FaceTime` caller you\
    \ are looking at. The `switch Camera` button will now use the standard camera\
    \ on the back of the iPhone. In [Figure 11–2](#Chapter11.html#fig_11_2), I get\
    \ to see the beautiful vistas of Colorado from Martin's vacation, and he gets\
    \ to see my dog on the couch!\n5.  Touch the `End` button to end the `FaceTime`\
    \ call.\n6.  Touch the `Mute` button to temporarily mute the call.\n\n![images](images/1102.jpg)\n\
    \n**Figure 11–2.** *Switching camera views on a `FaceTime` call*"
