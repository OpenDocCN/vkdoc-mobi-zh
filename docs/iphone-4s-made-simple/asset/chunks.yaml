  trans: "\n### 允许更改\n\n有时你并不想完全关闭某个应用的访问权限，只是希望阻止任何人进行意外更改。例如，**定位**选项涉及诸多隐私问题，因此你可能希望对哪些应用和功能有权访问它进行更精细的控制。请按照以下步骤调整**定位**选项的限制：\n\
    \n![图片](img/U0820.jpg)\n\n1. 按照上一节所述，前往**限制**屏幕。\n2. 向下滚动到底部，查看所有**允许更改**设置。\n\
    3. 轻点**定位**。\n4. 轻点**允许更改**，对**定位设置**进行更改。\n5. 将**定位服务**开关切换为**关闭**，彻底阻止你的 iPhone\
    \ 使用你的位置。（请注意，这可能会大大降低**谷歌地图**等应用的便利性，并导致逐向导航应用完全无法工作。）\n6. 将你不想让其追踪位置的应用逐一开关切换为**关闭**。（例如，将**相机**应用的**定位服务**设置为**关闭**，以避免你打算在互联网上公开分享的照片中包含\
    \ GPS 坐标。）\n7. 轻点**系统服务**，更改内置进程的**定位**权限。\n8. 如果有任何你不想让其使用位置数据的系统服务，请将其开关切换为**关闭**。选项包括**蜂窝网络搜索**、**指南针校准**、**诊断与用量**、**基于位置的\
    \ iAd**、**设定时区**和**交通状况**。\n\n   ![图片](img/U0821.jpg)\n\n9. 完成后，轻点左上角的**定位**返回。\n\
    10. 如果你想阻止将来对**定位服务**进行任何更改，请轻点**不允许更改**。\n11. 完成后，轻点**限制**返回。\n12. 轻点**账户**，然后轻点**不允许更改**，以防止将来对你的**邮件**、**日历**和**通讯录**账户进行任何更改。\n\
    13. 完成后，轻点**限制**返回。\n\n### 限制内容\n\n除了对应用设置限制外，你还可以对能在 iPhone 上下载和查看的内容设置限制。如果你打算将\
    \ iPhone 交给孩子，并且不希望她能够下载带有露骨歌词的音乐或观看含有成人内容的电影，请按照以下步骤操作：\n\n1. 按照上一节所述，前往**限制**屏幕。\n\
    \n   ![图片](img/U0822.jpg)\n\n2. 向下滚动到底部，查看所有**允许内容**设置。\n3. 要限制在应用内购买的内容，请将**应用内购买**设置为**关闭**。这将包括从**iTunes**应用购买的音乐和视频。\n\
    4. 如果你有年幼的孩子，并且担心他们在你下载新应用后进行昂贵的应用内购买（例如，你不希望他们在**蓝精灵**应用中购买**蓝莓**），请轻点**需要密码**，并将该设置更改为**始终**。\n\
    5. 轻点**评级地区**，根据你所在的国家/地区调整评级。目前支持一个广泛的国家/地区列表，包括澳大利亚、奥地利、加拿大、法国、德国、爱尔兰、日本、新西兰、英国和美国。\n\
    6. 轻点**音乐与播客**，限制访问包含露骨内容的歌词。确保将**露骨**选项设置为**关闭**，如右侧的图所示。\n\n   ![图片](img/U0823.jpg)\n\
    \n7. 轻点左上角的**限制**按钮，返回选项列表。\n8. 你也可以通过轻点每个项目，设置**影片**、**电视节目**和**应用**的评级上限。\n\n\
    \   ![图片](img/U0824.jpg)\n\n9. 当你轻点**影片**等项目时，会看到一个允许的评级列表。轻点你想要允许的最高评级级别。在此图中，我们轻点了**PG-13**。所有高于此评级的电影（**R**\
    \ 和 **NC-17**）均不允许。红色文字和复选标记的缺失提供了哪些选项被阻止的视觉提示。\n10. 轻点**电视节目**设置这些限制。同样，轻点你想要允许的最高评级。复选标记表示允许的评级；红色文字表示不允许的评级。在此示例中，**TV-Y**、**TV-Y7**\
    \ 和 **TV-G** 被允许，但更高的评级不被允许（即 **TV-PG**、**TV-14** 和 **TV-MA**）。\n\n    ![图片](img/U0825.jpg)\n\
    \n11. 轻点**应用**设置各种应用的限制。\n\n    ![图片](img/U0826.jpg)\n\n12. 在此屏幕中，我们允许播放评级为 **4+**、**9+**\
    \ 和 **12+** 的应用。评级为 **17+** 的应用无法播放或下载。\n13. 轻点左上角的**限制**按钮，返回选项列表。\n14. 最后，轻点**主屏幕**按钮以保存你的设置。\n\
    \n### 限制 Game Center\n\nGame Center 是享受社交游戏的绝佳方式，包括配对、挑战、排行榜等。然而，如果你是有年幼孩子的家长，你可能会不放心让他们在没有你监督的情况下玩多人游戏或接受好友请求。请按照以下步骤限制\
    \ Game Center 的访问：\n\n1. 按照上一节所述，前往**限制**屏幕。\n\n   ![图片](img/U0827.jpg)\n\n2.\
    \ 向下滚动到**Game Center**。\n3. 将**多人游戏**和/或**添加好友**选项切换为**关闭**。\n\n## 第 9 章\n\n##\
    \ 使用你的电话\n\niPhone 能干太多酷事了，以至于很容易让人忘记它同时也是一部功能强大的电话。在本章中，我们将介绍你在高端智能手机上期待找到的众多功能。我们将从基础开始，向你展示如何按姓名拨号、通过使用最近通话记录节省时间、语音拨号以及使用语音信箱。\n\
    \n![图片](img/U0901.jpg)\n\n接下来，我们将探索 iPhone 电话功能的更高级能力。例如，我们将向你展示如何处理多个通话者以及设置电话会议。最后，我们将向你展示如何从你的音乐库创建新的自定义铃声，以及为不同的联系人设置不同的铃声。\n\
    \n### 电话功能入门\n\niPhone 最初会将**电话**图标放在底部程序坞上。你可以使用第 6 章：“图标与文件夹”中描述的步骤，移动它或将其从程序坞上移除。\n\
    \n![图片](img/U0902.jpg)\n\n#### 查找你的电话号码\n\n也许你刚拿到你的新 iPhone，还不知道自己的电话号码。别担心；你可以在**设置**应用中找到你的号码。轻点**设置**图标，然后向下滚动并轻点**电话**。你的号码会列在顶部。\n\
    \n![图片](img/U0903.jpg)\n\n#### 使用 iPhone 耳机\n\n如果你所在的国家或省份在法律上不允许在驾驶汽车时手持 iPhone，那么你将需要使用耳机或蓝牙车载音响连接来进行免提通话。\n\
    \n![图片](img/U0904.jpg)\n\n随 iPhone 附带的耳机非常适合通话。耳机线上内置了麦克风，还有音量控制键和一个**中央**按钮，让你可以接听或挂断电话。当你戴好耳机时，电话会在耳机中响铃。按一下耳机上的**中央**按钮接听，再按一下即可挂断。\n\
    \n#### 连接蓝牙耳机或车载音响\n\n你也可以连接到蓝牙耳机或蓝牙车载音响系统来拨打和接听电话。我们在第 5 章：“AirPlay 和蓝牙”中为你展示了详细步骤。\n"
- fmt: "# 从键盘拨号\n\n使用手机最简单的方法就是通过键盘拨号。屏幕上的数字很大，因此很容易拨号。请按照以下步骤拨号：\n\n1.  点击**电话**图标（参见[图9-1](#Chapter09.html#fig_9_1)）。\n\
    2.  如果没有看到拨号键盘，点击底部的**键盘**图标。\n3.  现在，只需点击数字键即可开始拨号。\n4.  如果输错，按**退格**键![images](images/U0905.jpg)。\n\
    5.  如果需要输入国际号码的**加号**（`+`），请长按**零**（`0`）键。\n6.  拨号完成后，按**呼叫**键![images](images/U0906.jpg)。\n\
    \n    **提示：在电话号码中插入暂停**\n\n    有时您需要在电话号码中插入一个暂停，然后输入另一个号码，例如分机号或密码。您可以通过长按**星号**键（`*`）来拨入一个暂停，直到在电话号码旁边出现一个逗号。这会导致两秒钟的暂停。\n\
    \n![images](images/0901.jpg)\n\n**图9-1.** *使用 iPhone 键盘拨打电话号码*\n\n## 不同的电话视图\n\
    \n我们刚刚使用了**键盘**软键。您可以在**电话**屏幕底部看到几个图标，分别是**个人收藏**、**最近通话**、**通讯录**、**键盘**和**语音信箱**，如图[图9-2](#Chapter09.html#fig_9_2)所示。\n\
    \n![images](images/0902.jpg)\n\n**图9-2.** *使用软键查看不同的**电话**屏幕*\n\n## 使用个人收藏（快速拨号）\n\
    \n您的**个人收藏**是您经常呼叫的联系人。您可以将**个人收藏**视为您的快速拨号列表。\n\n**注意：** 您也可以将**FaceTime**联系人添加到**个人收藏**中。\n\
    \n### 添加新的个人收藏\n\n从**通讯录**列表中向个人收藏列表添加新联系人很容易。请按照以下步骤操作：\n\n**提示：** 您也可以从**最近通话**记录中添加**个人收藏**。在**最近通话**中，点击蓝色的**箭头**图标![images](images/U0907.jpg)，然后在下一个屏幕上，滚动到**信息**页面底部，点击**添加到个人收藏**。\n\
    \n1.  如果不在**电话**屏幕，请点击**电话**图标启动它。\n2.  触摸底部一行软键中的**个人收藏**图标。\n3.  首次启动**个人收藏**时，您将看到一个空白屏幕。\n\
    \n    ![images](images/U0908.jpg)\n\n4.  点击右上角的**加号**按钮![images](images/U0909.jpg)以添加新条目。您的通讯录将打开。\n\
    5.  向上或向下滑动以查找联系人。点击任何联系人以选择它。\n\n    **提示：** 要按名称搜索联系人，请点击屏幕最顶部（时间下方）。这将调出**搜索**窗口，您可以在其中输入几个字母来查找联系人。请记住，您可以通过点击左上角的**群组**按钮来查看不同的联系人群组。\n\
    \n    ![images](images/U0910.jpg)\n\n6.  如果一个条目有多个电话号码，您需要选择其中一个作为个人收藏条目。\n\n\
    \    ![images](images/U0911.jpg)\n\n7.  点击一个号码后，系统会询问您是否要将该号码设置为**语音呼叫**或**FaceTime**中的**个人收藏**。\n\
    8.  您将返回到**个人收藏**列表，在那里您会看到刚刚添加的新联系人。**FaceTime**中的**个人收藏**会在联系人姓名右侧显示一个小**视频**图标。\n\
    \n    ![images](images/U0912.jpg)\n\n    ![images](images/U0913.jpg)\n\n9.  重复步骤4-7以添加更多联系人到**个人收藏**。每个新条目都列在列表底部前一个条目之下。\n\
    \n### 整理您的个人收藏\n\n与 iPhone 上的其他列表一样，您可以重新排列**个人收藏**列表并删除条目：\n\n1.  像之前一样查看您的**个人收藏**列表。\n\
    2.  点击左上角的**编辑**按钮。\n3.  要重新排列条目，请触摸并拖动右侧边缘带三条灰色横条的区域，在列表中上下移动。\n\n    ![images](images/U0914.jpg)\n\
    \n4.  要删除条目，请点击条目左侧的红色**圆形**图标，使其变为竖立状态。\n5.  点击**删除**按钮。\n6.  完成重新排列和删除条目后，点击左上角的**完成**按钮。\n\
    \n    ![images](images/U0915.jpg)\n\n### 呼叫个人收藏联系人\n\n要呼叫**个人收藏**列表中的任何人，只需触摸该人的姓名。没有提示或确认。一旦您触摸他的名字，手机就会拨打他的号码（参见[图9-3](#Chapter09.html#fig_9_3)）。\n\
    \n![images](images/0903.jpg)\n\n**图9-3.** *通过点击来拨叫您的**个人收藏**之一*\n\n## 使用最近通话（通话记录）\n\
    \n使用**最近通话**类似于在其他智能手机上查看通话记录。\n\n当您触摸**最近通话**图标时，将显示所有最近通话的列表。您可以点击顶部的**全部**或**未接**按钮来缩小列表范围（参见[图9-4](#Chapter09.html#fig_9_4)）。\n\
    \n![images](images/U0916.jpg)\n\n![images](images/0904.jpg)\n\n**图9-4.** *使用**最近通话**屏幕*\n\
    \n### 从最近通话拨打电话\n\n从**最近通话**屏幕拨打电话很容易；只需触摸所需的姓名或电话号码，您的 iPhone 就会立即向该联系人发起通话。\n\
    \n### 清除所有最近通话\n\n要清除或删除所有最近通话记录条目，请按右上角的**清除**按钮。\n\n### 通话详情或联系人信息\n\n点击**最近通话**列表中姓名旁边的蓝色**箭头**图标![images](images/U0907.jpg)，您将看到该电话号码的信息，或者如果该联系人在您的**通讯录**中，则会看到其完整的联系人信息。如果有多个通话，您将看到每个通话的历史记录。\n\
    \n![images](images/U0917.jpg)\n\n滚动到联系人**信息**屏幕底部以查看更多选项。您可以发送**短信**、发起**FaceTime**视频通话，或通过电子邮件或彩信发送联系人信息来**共享联系人**。\n\
    \n![images](images/U0918.jpg)\n\n点击**添加到个人收藏**以将此联系人添加到您的**个人收藏**列表。\n\n### 从最近通话将电话号码添加到通讯录\n\
    \n如果**最近通话**条目是一个尚未关联到**通讯录**中联系人的电话号码，那么您将在**信息**屏幕上看到两个不同的按钮：**创建新联系人**和**添加到现有联系人**。\n\
    \n点击**创建新联系人**以从此电话号码创建新联系人。\n\n点击**添加到现有联系人**以将此电话号码添加到您现有的某个联系人中。\n\n![images](images/U0919.jpg)\n\
    \n## 从通讯录拨打电话\n\n将所有的联系人信息保存在手机中的一大好处是，从**通讯录**列表拨打电话非常容易。请按照以下步骤操作：\n\n1.  如果不在**电话**屏幕，请点击**电话**图标启动它（参见[图9-5](#Chapter09.html#fig_9_5)）。\n\
    2.  触摸底部一行软键中的**通讯录**图标。\n3.  使用以下方法之一查找要呼叫的联系人：\n    *   在列表中向上或向下滑动。\n    *\
    \   将手指放在屏幕右侧的字母上，向上或向下滚动。\n    *   点击顶部显示时间的状态栏以跳转到列表顶部。点击**搜索**窗口，输入联系人的名字、姓氏或公司名称的若干字母来查找他。\n\
    4.  找到所需的联系人条目后，点击其姓名。\n5.  触摸您想要呼叫的电话号码。\n\n![images](images/0905.jpg)\n\n**图9-5.**\
    \ *从**通讯录**列表拨打电话*"
  raw: "#### Dialing a Number from the Keypad\n\nThe simplest way to use your phone\
    \ is to dial using the keypad. The numbers on the screen are large, so it's easy\
    \ to dial. Follow these steps to dial a number:\n\n1.  Tap the **Phone** icon\
    \ (see [Figure 9–1](#Chapter09.html#fig_9_1)).\n2.  If you do not see the keypad\
    \ to dial, tap the **Keypad** icon at the bottom.\n3.  Now you can simply start\
    \ dialing by tapping number keys.\n4.  If you make a mistake, press the **Backspace**\
    \ key ![images](images/U0905.jpg).\n5.  If you need to type a **Plus Sign** (**+**)\
    \ for an international number, press and hold the **Zero** (**0**) key.\n6.  When\
    \ you are done dialing, press the **Call** key ![images](images/U0906.jpg).\n\n\
    \    **TIP: Dialing Pauses in a Phone Number**\n\n    Sometimes you have to insert\
    \ a pause in a phone number, and then enter another number such as an extension\
    \ or a password. You can dial a pause by pressing and holding the **Asterisk**\
    \ key (*****) until you see a comma appear next to the phone number. This causes\
    \ a two-second pause.\n\n![images](images/0901.jpg)\n\n**Figure 9–1.** *Dialing\
    \ phone numbers with your iPhone keypad*\n\n#### Different Phone Views\n\nWe have\
    \ just used the **Keypad** soft key. You can see several icons along the bottom\
    \ of your **Phone** screen for **Favorites**, **Recents**, **Contacts**, **Keypad**,\
    \ and **Voicemail** as shown in [Figure 9–2](#Chapter09.html#fig_9_2).\n\n![images](images/0902.jpg)\n\
    \n**Figure 9–2.** *Use soft keys to see different **Phone** screens*\n\n#### Using\
    \ Favorites (Speed Dials)\n\nYour **Favorites** are people you callfrequently.\
    \ You can think of **Favorites** as your speed dial list.\n\n**NOTE:** You can\
    \ also add **FaceTime** contacts to **Favorites**.\n\n##### Adding New Favorites\n\
    \nIt is easy to add new favorites to your list from your **Contacts** list. Follow\
    \ these steps to do so:\n\n**TIP:** You can also add a **Favorite** from your\
    \ **Recents** call logs. In **Recents**, tap the blue **Arrow** icon ![images](images/U0907.jpg)\
    \ and, on the next screen, scroll to the bottom of the **Info** page and tap **Add\
    \ to Favorites**.\n\n1.  If you are not in the **Phone** screen, tap the **Phone**\
    \ icon to start it up.\n2.  Touch the **Favorites** icon in the bottom row of\
    \ soft keys.\n3.  The first time you start your **Favorites**, you will see a\
    \ blank screen.\n\n    ![images](images/U0908.jpg)\n\n4.  Tap the **Plus** button\
    \ ![images](images/U0909.jpg) in the upper-right corner to add a new entry. Your\
    \ contact directory will open\n5.  Swipe up or down to locate a contact. Tap any\
    \ contact to select it.\n\n    **TIP:** To search for your contacts by name, tap\
    \ the very top of the screen just under the time. This will bring up the **Search**\
    \ window, where you can type a few letters to find people. Remember that you can\
    \ view different contact groups by tapping the **Groups** button in the upper-left\
    \ corner.\n\n    ![images](images/U0910.jpg)\n\n6.  If an entry has more than\
    \ one phone number, you will need to select one of them as your favorite entry.\n\
    \n    ![images](images/U0911.jpg)\n\n7.  After tapping a number, you will be asked\
    \ if you want to set the number as a **Voice Call** or one of your **Favorites**\
    \ in **FaceTime**.\n8.  You are returned to your list of **Favorites**, where\
    \ you'll see the new person you just added. **Favorites** in **FaceTime** are\
    \ shown with a little **Video** icon to the right of the person's name.\n\n  \
    \  ![images](images/U0912.jpg)\n\n    ![images](images/U0913.jpg)\n\n9.  Repeat\
    \ Steps 4–7 to add more people to your **Favorites**. Each new entry is listed\
    \ below the previous ones at the bottom of the list.\n\n##### Organizing Your\
    \ Favorites\n\nAs with other lists on your iPhone, you can re-order your **Favorites**\
    \ list and remove entries:\n\n1.  View your **Favorites** list as you did previously.\n\
    2.  Tap the **Edit** button in the upper-left corner.\n3.  To re-order the entries,\
    \ touch and drag the right edge with the three gray bars up or down the list.\n\
    \n    ![images](images/U0914.jpg)\n\n4.  To delete an entry, tap the red **Circle**\
    \ icon to the left of the entry to make it turn vertical.\n5.  Tap the **Delete**\
    \ button.\n6.  When you are done re-ordering and deleting entries, tap the **Done**\
    \ button in the upper-left corner.\n\n    ![images](images/U0915.jpg)\n\n#####\
    \ Calling a Favorite\n\nTo call any person in your **Favorites** list **,** just\
    \ touch the name of the individual. There is no prompt or confirmation. As soon\
    \ as you touch his name, the phone will dial his number (see [Figure 9–3](#Chapter09.html#fig_9_3)).\n\
    \n![images](images/0903.jpg)\n\n**Figure 9–3.** *Dialing one of your **Favorites**\
    \ by tapping him*\n\n#### Using Recents (Call Logs)\n\nUsing your **Recents**\
    \ is similar to looking at your call log on other smartphones.\n\nWhen you touch\
    \ the **Recents** icon, a list of all your recent calls will be displayed. You\
    \ can touch the **All** or **Missed** button at the top to narrow down the list\
    \ (see [Figure 9–4](#Chapter09.html#fig_9_4)).\n\n![images](images/U0916.jpg)\n\
    \n![images](images/0904.jpg)\n\n**Figure 9–4.** *Working with your **Recents**\
    \ screen*\n\n##### Placing a Call from Recents\n\nIt's easy to place a call from\
    \ your **Recents** screen; simply touch the desired name or phone number, and\
    \ your iPhone will immediately initiate a phone call to the individual.\n\n#####\
    \ Clearing All Recents\n\nTo clear or erase all your recent call log entries,\
    \ press the **Clear** button in the upper-right corner.\n\n##### Details of a\
    \ Call or Contact Information\n\nTouch the blue **Arrow** icon ![images](images/U0907.jpg)\
    \ next to the name in the **Recents** list, and you will see either the information\
    \ on the phone number or full contact information for that particular contact\
    \ if he is in your **Contacts** list. If there are several calls, you will see\
    \ the history of each call.\n\n![images](images/U0917.jpg)\n\nScroll down to the\
    \ bottom of the contact's **Info** screen to see more options. You can send a\
    \ **Text Message**, start a **FaceTime** video call, or **Share Contact** by sending\
    \ the contact information via e-mail or MMS.\n\n![images](images/U0918.jpg)\n\n\
    Tap **Add to Favorites** to add this person to your **Favorites** list.\n\n#####\
    \ Adding a Phone Number to Contacts from Recents\n\nIf the **Recents** entry is\
    \ a phone number not yet connected to someone who is in your **Contacts** list,\
    \ then you will see two different buttons on the **Info** screen: **Create New\
    \ Contact** and **Add to Existing Contact**.\n\nTap **Create New Contact** to\
    \ create a new contact from this phone number.\n\nTap **Add to Existing Contact**\
    \ to add this phone number to one of your existing contacts.\n\n![images](images/U0919.jpg)\n\
    \n#### Placing Calls from Contacts\n\nOne of the great things about having all\
    \ your contact information in your phone is that it's very easy to place calls\
    \ from your **Contacts** list. Follow these steps to do so:\n\n1.  If you are\
    \ not in your **Phone** screen, tap the **Phone** icon to start it up (see [Figure\
    \ 9–5](#Chapter09.html#fig_9_5)).\n2.  Touch the **Contacts** icon in the bottom\
    \ row of soft keys.\n3.  Locate a contact to call using one of the following methods:\n\
    \    *   Swipe up or down through the list.\n    *   Put your finger on the letters\
    \ along the right side of the screen and scroll up or down.\n    *   Tap the status\
    \ bar on top where it says the time to jump to the top. Tap in the **Search**\
    \ window and type a few letters of the contact's first, last, or company name\
    \ to search for him.\n4.  When you find the contact entry you want, tap his name.\n\
    5.  Touch the phone number you wish to call.\n\n![images](images/0905.jpg)\n\n\
    **Figure 9–5.** *Placing calls from your **Contacts** list*"
  trans: "\n# 从键盘拨号\n\n使用手机最简单的方法就是通过键盘拨号。屏幕上的数字很大，因此很容易拨号。请按照以下步骤拨号：\n\n1.  点击**电话**图标（参见图\
