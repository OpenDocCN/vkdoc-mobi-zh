    apps page, you will notice that there are a few large icons at the top. Clicking
    these icons will show you either types of apps or individual apps. Below the larger
    icons (you have to swipe down), you will see a number of featured apps.


    The bottom of the App Store''s **Home** page has five soft key buttons:


    *   **Featured**: Shows apps that have been highlighted by the App Store or by
    the app developers.

    *   **Categories**: Shows a list of categories used to organize the apps, so you
    can browse by category.

    *   **Top 25**: Shows top selling or top downloaded apps.

    *   **Search**: Finds an app using entered search terms.

    *   **Updates**: Lets you update any apps you have installed, and redownload any
    apps you''ve already acquired.


    You can tell that [Figure 23–2](#Chapter23.html#fig_23_2) is showing **Featured**
    apps because the **Featured** soft key is highlighted on the bottom row of soft
    keys. Scrolling is handled the same way as in other programs—just move your finger
    up and down to scroll through the page.


    ![images](images/2302.jpg)


    **Figure 23–2.** *The layout of the App Store''s **Home** page*


    **NOTE:** The App Store is essentially a web site, so it changes frequently. Some
    of the details and nuances of the App Store might look a bit different after this
    book goes to print.


    #### Viewing App Details


    If you see an app in a list that looks interesting, tap it to learn more. The
    **Details** screen for the app includes its price, a description, screen shots,
    and reviews (see [Figure 23–3](#Chapter23.html#fig_23_3)). You can use this information
    to help you determine whether the app will be a good choice for you.


    Swipe down to read more details about the app on the **Info** page. Swipe left
    or right to view more screen shots of the app. Tap the **Rating** button near
    the bottom to read all the reviews for an app.


    You can also see other details about the app, such as its file size, its version
    number, and developer information near the bottom of the **Info** page.


    You can also **Tell a Friend** or **Report a Problem** using the buttons at the
    bottom of the screen.


    ![images](images/2303.jpg)


    **Figure 23–3.** *Viewing details about an app*'
  trans: '好的，作为一名高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。



    ### Ping


    `Ping` 是 Apple 的音乐社交网络。您可以通过点击标签栏底部中央的 **Ping** 按钮来访问它。


    借助 `Ping`，您可以查看您关注的艺人和好友正在购买和评论哪些音乐，而您的关注者也可以看到您购买和评论的音乐。`Ping` 还允许您将您的购买记录发布到推文上。


    ![images](img/U2226.jpg)


    `Ping` 包含三个板块：


    - **动态：** 显示您关注的所有人的购买和评论活动。您可以查看 **全部** 动态、仅 **艺人** 动态，或仅 **用户**（非艺人）动态。

    - **用户：** 为您提供您 **关注的** 其他 `Ping` 用户的列表；**关注您的** `Ping` 用户列表；以及 `Ping` 认为您可能感兴趣的
    **推荐艺人**、**推荐艺术家** 和 **推荐用户** 列表。

    - **我的个人资料：** 显示您自己的所有近期活动，并允许您访问 **我的信息**，其中会显示您的个人资料信息以及您喜欢的音乐的专辑封面。


    **注意**：在撰写本文时，`Ping` 尚未获得广泛普及。如果您是一位狂热的音乐爱好者，并且您和您的朋友经常从 `iTunes` 购买大量音乐，那么我们当然建议您至少尝试一下。不过，您也可能会发现像
    `Twitter` 和 `Facebook` 这样更成熟（即便更通用）的社交网络更符合您的喜好。


    ## 第 23 章


    ## 神奇的 App Store


    您刚刚看到了从 `iTunes` 直接下载音乐、视频和播客到您的 `iPhone` 是多么简单。您也看到了从 `iBooks` 商店下载 `iBooks`
    是多么容易。


    从 Apple 神奇的 `App Store` 下载新应用程序同样简单。几乎对于您能想到的任何功能，都有相应的应用程序：游戏、生产力工具、社交网络，以及您能想象到的任何其他东西。正如广告所说，*总有一款应用适合你*。


    ![images](img/U2301.jpg)


    在本章中，您将学习如何浏览 `App Store`，以及如何搜索和下载应用程序。您还将学习如何在应用程序下载到您的 `iPhone` 后对其进行维护和更新。


    ### 了解更多关于应用和 App Store 的信息


    在本章中，我们将重点介绍如何直接从您的 `iPhone` 访问 `App Store`。但是，您应该记住，您也可以使用 `Mac` 或 `PC` 上的 **iTunes**
    程序在 `App Store` 中购物（请参见 图 23–1）。


    ![images](img/2301.jpg)


    **图 23–1.** *从您电脑上的 **iTunes** 程序或您 `iPhone` 上的 **App Store** 图标访问 `App Store`*


    在很短的时间内，`App Store` 就迅速流行起来。几乎任何您能想象到的东西都有对应的应用程序。这些应用程序有各种价位；在很多情况下，应用程序甚至是免费的！


    #### 在哪里寻找应用新闻和评论


    您可以在 `App Store` 中找到许多应用程序的评论，我们建议您查看这些 `App Store` 评论。然而，有时您可能想从专家评论者那里获取更多信息。如果是这样，博客是寻找特定应用或内容的新闻和评论的好地方。


    以下是一些与 Apple `iPhone` 和 `iPod` 相关的博客，它们提供应用评论：


    - `iPhone` 博客：[`www.tipb.com`](http://www.tipb.com)

    - Touch Reviews：[`www.touchreviews.net`](http://www.touchreviews.net)

    - Touch Arcade：[`www.toucharcade.com`](http://www.toucharcade.com)

    - The Unofficial Apple Weblog：[`www.tuaw.com`](http://www.tuaw.com)

    - 148apps：[`www.148apps.com`](http://www.148apps.com)

    - App Advice：[`www.appadvice.com`](http://www.appadvice.com)


    ### App Store 基础


    稍加熟悉，您就会发现 `App Store` 的导航非常直观。我们将介绍一些基本知识，帮助您充分利用 `App Store`，从而让您的体验尽可能愉快且富有成效。


    **注意：** 应用程序的可用性因国家/地区而异。某些应用仅在某些国家/地区可用，而某些国家/地区由于当地分级法律可能没有特定的游戏版块。


    #### 需要网络连接


    在您设置好 `App Store` (`iTunes`) 帐户后，您仍然需要具备正确的网络连接（`Wi-Fi` 或 `3G`）才能访问 `App Store`
    并下载应用程序。请查看 第 4 章：“连接到网络”，以了解如何判断您是否已连接。


    #### 启动 App Store


    **App Store** 图标应位于 **主屏幕** 上的第一页图标中。点击该图标即可启动 **App Store** 应用程序。


    ![images](img/U2302.jpg)


    #### App Store 主页


    我们将查看 `App Store` **主页**的几部分：顶部栏、中间内容和底部软键。


    我们先来看顶部栏。在 图 23–2 所示页面的顶部，您会看到三个按钮：**新鲜内容**、**热门内容** 和 **Genius**。点击其中任何一个即可更改视图。


    **提示：** **Genius** 是一项功能，可根据您已在 `iPhone` 上下载和安装的应用来推荐您可能喜欢的应用。这是一种很好的方式，可以帮助您从数十万应用中筛选出可能令您感兴趣的那些。


    页面中间是您的主要内容区域。这个主要内容区域会显示应用列表或您正在查看的特定应用的详细信息。您可以通过上下滑动来查看更多应用列表或某个应用的详细信息。在查看屏幕截图时，您也可以左右滑动。在
    **精选** 应用页面上，您会注意到顶部有一些大图标。点击这些图标将显示应用类型或单个应用。在这些大图标下方（您需要向下滑动），您会看到许多精选应用。


    `App Store` **主页**底部有五个软键按钮：


    - **精选：** 显示由 `App Store` 或应用开发者重点推荐的应用。

    - **类别：** 显示用于组织应用的类别列表，以便您按类别浏览。

    - **排行榜 25：** 显示销量最高或下载量最高的应用。

    - **搜索：** 使用输入的搜索词查找应用。

    - **更新：** 允许您更新已安装的任何应用，并重新下载您已获取的任何应用。


    您可以从 图 23–2 中看出正在显示 **精选** 应用，因为底行的软键中 **精选** 软键是高亮显示的。滚动操作与其他程序相同——只需上下移动手指即可滚动页面。


    ![images](img/2302.jpg)


    **图 23–2.** *`App Store` **主页**的布局*


    **注意：** `App Store` 本质上是一个网站，因此它会频繁更改。本书出版后，`App Store` 的一些细节和细微差别可能会略有不同。


    #### 查看应用详情


    如果您在列表中看到有趣的应用，请点击它以了解更多信息。该应用的 **详细信息** 屏幕包括其价格、描述、屏幕截图和评论（请参见 图 23–3）。您可以使用这些信息来帮助判断该应用是否适合您。


    向下滑动以阅读 **信息** 页面上关于该应用的更多详细信息。向左或向右滑动以查看更多应用截图。点击靠近底部的 **评价** 按钮以阅读该应用的所有评论。


    您还可以在 **信息** 页面底部附近查看该应用的其他详细信息，例如其文件大小、版本号和开发者信息。


    您还可以使用屏幕底部的按钮 **告诉朋友** 或 **报告问题**。


    ![images](img/2303.jpg)


    **图 23–3.** *查看应用的详细信息*

