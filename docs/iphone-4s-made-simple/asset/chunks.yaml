- fmt: "# The iPhone Summary Screen\n\nThe iPhone’s `Summary` tab in `iTunes` is where\
    \ you see and update your version of your iPhone operating system software. It\
    \ also contains an important switch related to syncing music, video, and other\
    \ content. This tab is also where you can choose to automatically open `iTunes`\
    \ (to sync) whenever you connect your iPhone to your computer.\n\nOnce you connect\
    \ your iPhone to your computer, you can see important information, like your iPhone’s\
    \ memory capacity, installed software version, and serial number (see [Figure\
    \ 3–4](#Chapter03.html#fig_3_4)). You can also check for updates to the software\
    \ version, restore data to your iPhone, and choose from the several options available\
    \ on this screen.\n\nIn particular, you can decide whether you want to `Manually\
    \ manage music and videos` using the checkbox at the bottom of this screen.\n\n\
    ![images](images/0304.jpg)\n\n**Figure 3–4.** *The iPhone’s `Summary` screen in\
    \ `iTunes`*\n\nFollow these steps to see the `Summary` screen:\n\n1.  Start the\
    \ `iTunes` software on your computer.\n2.  Connect your iPhone to your computer\
    \ with the white USB cable supplied with the device. Plug one end into the bottom\
    \ of the iPhone near the `Home` button and the other end into a USB port on your\
    \ computer.\n3.  If you’ve successfully connected your iPhone, you should see\
    \ your iPhone listed under `DEVICES` in the left nav bar.\n4.  Click your iPhone\
    \ in the left nav bar, and then click the `Summary` tab on the top-left edge of\
    \ the main window.\n5.  If you want to be able to drag and drop music and videos\
    \ onto your iPhone, check the box next to `Manually manage music and videos`.\n\
    6.  If you want to have `iTunes` open and sync your iPhone automatically whenever\
    \ you connect it to your computer, check the box next to `Open iTunes when this\
    \ iPhone is connected`.\n\n**TIP:** Note that the `iTunes` software might not\
    \ be installed on your primary computer (the one you use for syncing). For example,\
    \ it might be installed on a second computer that you use for charging your iPhone.\
    \ If so, you should check the box next to `Manually manage music and videos` and\
    \ uncheck the box next to `Open iTunes when this iPhone is connected`.\n\n# Getting\
    \ to the Sync Setup Screen (Info Tab)\n\nLet’s assume you want to get to the `Info`\
    \ tab, which is the setup screen for syncing your contacts, calendar, email, and\
    \ so forth. To do so, you follow the same steps described previously for getting\
    \ to the `Summary` screen, except now you click the `Info` tab at the top to see\
    \ the Contacts (and other sync settings) in the main `iTunes` window (see [Figure\
    \ 3–5](#Chapter03.html#fig_3_5)).\n\n![images](images/0305.jpg)\n\n**Figure 3–5.**\
    \ *The `iTunes`’ `Info` tab, where you set up contacts, calendar, bookmarks, and\
    \ more*\n\n**NOTE: If you are already set up to sync your information using iCloud,\
    \ you will see this warning and not be able to use iTunes, because iCloud already\
    \ is syncing your information. If you see this warning, then you can skip syncing\
    \ Mail, Contacts and Calendars using iTunes.**\n\n![images](images/U0310.jpg)\n\
    \n# Sync Your Contacts\n\nLet’s start by setting up syncing for your contacts.\
    \ The first step is to choose a service to sync with. To do so, check the box\
    \ next to `Sync Contacts with` and adjust the pull-down menu to the software or\
    \ service where your contacts are stored. At publication time, you have several\
    \ syncing options on a Windows computer: Outlook, Google Contacts, Windows Contacts,\
    \ and the Yahoo! Address Book.\n\n**CAUTION:** Whenever you switch between a software\
    \ or service (called the *sync provider*) in these sync settings screens, it affects\
    \ every one of the mobile devices connected to your iTunes account. For example,\
    \ if you sync contacts to your iPad or iPod touch, these changes will also affect\
    \ MobileMe. You will be changing the way contacts sync for any other devices connected\
    \ to your iTunes account.\n\n![images](images/U0311.jpg).\n\n## Syncing with Google\
    \ Contacts\n\nIf you select `Google Contacts`, you’ll be prompted to enter your\
    \ Google ID and password.\n\nTo change your Google ID or password, click the `Configure`\
    \ button next to the `Sync Contacts with` option you saw at the top of this section.\n\
    \n## Syncing with the Yahoo! Address Book\n\nIf you select `Yahoo! Contacts`,\
    \ you’ll be prompted to enter your Yahoo! ID and password.\n\nTo change your Yahoo!\
    \ ID or password, click the `Configure` button next to the `Sync Contacts with`\
    \ option you saw at the top of this section.\n\n**NOTE:** The options you see\
    \ in this and other drop-down boxes on the `Info` tab will vary slightly, depending\
    \ on the software installed on your computer. For example, on a Mac the contacts\
    \ sync does not have a drop-down list; instead the other services, such as Google\
    \ Contacts and Yahoo!, are shown as separate checkboxes.\n\nOnce you select a\
    \ service or app to sync with, you’re ready to follow through on syncing your\
    \ contacts:\n\n1.  Select which contacts you will sync with from either of these\
    \ options:\n    1.  `All Contacts`: Sync all contacts in your address book (this\
    \ is the default).\n    2.  `Selected Groups`: Sync contacts only within specific\
    \ groups that you check in the window below.\n2.  You will see a checkbox that\
    \ says `Add contacts created outside of groups on this iPhone to`(select a group\
    \ from the drop-down list). This option lets you specify a new group for any new\
    \ contacts you add on your iPhone that you don’t explicitly assign to a group.\n\
    3.  Scroll down the page to continue setting up your calendar, email, and more.\n\
    4.  If you don’t want to set up anything else for syncing, click the `Apply` button\
    \ in the lower-right corner of the `iTunes` screen to start the sync.\n\n**NOTE:**\
    \ Depending on how many contacts you have, the initial sync could take longer\
    \ than 10 minutes, and may even require 30 or more minutes. So you may want to\
    \ do this sync when you can let your iPhone sit for as long as it takes (e.g.,\
    \ during lunch or after dinner).\n\n# Syncing Your Calendar\n\nSyncing your calendar\
    \ is similar to syncing your contacts. Follow these steps to do so:\n\n1.  Within\
    \ the same `Info` tab, scroll down to see the calendar sync set up.\n2.  Check\
    \ the box next to `Sync Calendars with` and adjust the pull-down menu to the software\
    \ or service that stores your calendars. This might be `Outlook` or another application\
    \ on a Windows computer, and `iCal` on a Mac.\n3.  Select either of these options:\n\
    \    1.  `All Calendars`: Syncs all calendars (this is the default).\n    2. \
    \ `Selected Calendars`: Syncs only calendars you’ve checked in the window below.\n\
    4.  If you want to save space on your iPhone, click the checkbox next to `Do not\
    \ sync events older than 30 days.` You can adjust the days up or down to fit your\
    \ needs.\n5.  Scroll down the page to continue setting up email accounts, bookmarks\
    \ and more.\n6.  If you don’t want to set up anything else for syncing, click\
    \ the `Apply` button in the lower-right corner of the `iTunes` screen to start\
    \ the sync.\n\n**NOTE:** If you’re a Mac user who uses `Microsoft Entourage`,\
    \ you’ll need to enable `Entourage` to sync with `iCal`. To do this, go into the\
    \ `Preferences` settings in `Entourage`, and then go to `Sync Services` and check\
    \ the boxes for synchronizing with `iCal` and the `Address Book`.\n\n**NOTE:**\
    \ At the time of writing, `Entourage`, unlike `iCal`, can’t handle multiple calendars."
