  trans: "\n# 更改列表\n\n每个`treminder`事项都属于一个列表。你可以设置工作列表、家庭列表、度假列表、购物列表——任何你喜欢的列表。**详细信息**页面会显示当前与你新建任务关联的列表名称。请按照以下步骤更改当前列表：\n\
    \n![images](img/U1948.jpg)\n![images](img/U1949.jpg)\n\n1. 点击当前列表名称。\n2. 点击你想要切换到的列表。\n\
    \n## 为任务添加备注\n\n如果你想为任务添加一些备注，请按照以下步骤操作：\n\n![images](img/U1950.jpg)\n\n1. 点击**备注**，然后输入或复制粘贴若干备注。\n\
    \n   ![images](img/U1951.jpg)\n\n2. 点击**完成**以结束添加备注。\n\n**提示：** 如果是购物清单，你可能想添加一些附加信息，比如服装尺码、食品品牌或其他可能有帮助的内容。\n\
    \n## 完成提醒事项\n\n将提醒事项标记为已完成非常简单。只需点击提醒事项标题左侧的方框，就会出现一个勾选标记图标。这会将该提醒事项从其当前列表移至特殊的“已完成”列表，以便你日后必要时可以返回查看。\n\
    \n![images](img/U1952.jpg)\n\n如果操作有误，只需再次点击该方框即可移除勾选标记图标，将提醒事项恢复至之前的状态。如果任务已被移至“已完成”列表，则向左滑动直到进入“已完成”列表，然后点击该方框取消勾选，即可将提醒事项移回之前的列表。\n\
    \n## 编辑提醒事项\n\n有时，任务的细节可能会发生变化，需要进行调整。幸运的是，更改任何提醒事项只需遵循以下简单步骤：\n\n![images](img/U1953.jpg)\n\
    \n1. 点击你要更改的提醒事项。\n2. 点击“详细信息”页面上的标签，并调整细节，就像你设置新任务时一样。\n\n### 删除提醒事项\n\n请注意，在**详细信息**屏幕的底部，你还可以选择删除任务。只需点击屏幕底部的**删除**按钮即可。\n\
    \n![images](img/U1954.jpg)\n\n## 添加新列表\n\n**提醒事项**应用允许你拥有多个列表，这对于保持你的任务井然有序非常方便。例如，你可以创建一个新列表来帮助你为即将到来的旅行打包行李，或为即将到来的生日进行购物。\n\
    \n你可以为 iCloud 提醒事项或 Exchange 任务账户，或者 iPhone 上的本地列表创建新列表。请按照以下步骤创建新列表：\n\n1. 点击屏幕左上角的**列表**按钮\
    \ ![images](img/U1955.jpg)。\n\n   ![images](img/U1956.jpg)\n\n2. 在“列表”页面上，点击右上角的**编辑**按钮。\n\
    3. 如果你有多个账户与“提醒事项”同步，请选择你想要添加新列表的账户。\n4. 点击**创建新列表……**标签。\n5. 输入你的新列表名称。\n6. 点击右上角的灰色**完成**按钮。\n\
    \n## 移动和删除列表\n\n在**列表**页面中，你还可以移动和删除列表。\n\n要移动列表，请长按最右侧的**抓手**图标，然后将其拖拽到新位置。\n\
    \n要删除列表，请点击列表名称左侧的红色**圆圈**图标，然后点击**删除**按钮确认你的选择。\n\n## 提醒事项选项\n\n在**提醒事项**应用中，只有两个选项可以调整；你可以在**设置**应用中找到它们：\n\
    \n![images](img/U1957.jpg)\n\n1. 从你的**主屏幕**点击**设置**图标。\n2. 向下滚动到**邮件、通讯录、日历**并点击它。\n\
    \n   ![images](img/U1958.jpg)\n\n3. 向下滚动到**提醒事项**（它位于最底部！）以查看这两个选项。\n\n   ![images](img/U1959.jpg)\n\
    \n4. 第一个选项是**同步**。你可以调整此设置，以同步**过去 2 周、过去 1 个月、过去 3 个月、过去 6 个月**，或显示**所有提醒事项**。\n\
    \n### 更改默认列表\n\n我们之前提到过，你可以在 iPhone 上显示多个列表。**默认列表**屏幕允许你选择哪个列表作为默认列表。\n\n![images](img/U1960.jpg)\n\
    \n将某个列表指定为默认列表意味着，当你新建一个提醒事项时，它默认会被分配到这个指定的列表。\n\n# 第 20 章\n\n# 使用照片\n\n虽然之前版本的\
    \ iPhone 已包含摄像头，但当前 iPhone 上的摄像头确实令人惊叹。iPhone 4S 配备的不是一个，而是两个摄像头：一个位于背面、拥有`f/`2.4\
    \ 光圈和 LED 闪光灯的 800 万像素摄像头；以及一个位于正面、用于视频聊天和自拍的 30 万像素 VGA 摄像头。你可以在第 11 章“视频消息与\
    \ Skype”中了解有关使用前置摄像头的更多信息。\n\n在 iPhone 上查看和分享照片确实是一种享受，这在很大程度上要归功于其精美的视网膜显示屏。在本章中，我们将讨论将照片导入\
    \ iPhone 的多种方法。我们还将向你展示如何使用触摸屏浏览照片，以及如何放大、缩小和操作照片。\n\n**提示：** 你知道吗，你可以同时按下两个按键来截取\
    \ iPhone 整个屏幕的画面？这对于向别人展示一款炫酷的应用，或者证明你在**俄罗斯方块**中获得了最高分来说非常棒！\n\n操作方法如下：同时按下**主屏幕**按钮和右上角的**开/关/睡眠**键（你可以先按住一个键，再按下另一个键）。这有点技巧性，需要一些练习。如果操作正确，屏幕会闪烁，并且你会听到相机快门声。你所截取的屏幕快照将保存在**照片**应用中的“相机胶卷”相册里。\n\
    \n## 快速拍照\n\n苹果最近添加了一些出色的快捷方式，帮助你更快速、更方便地拍照。如果你的孩子正处于特别可爱或值得纪念的时刻，如果你在树林里遇到一只珍稀鸟类，或者你需要快速抓拍社区里可疑的东西，那么你可以使用以下其中一种技巧来快速拍照：\n\
    \n* 双击**主屏幕**按钮，即可在**锁定**屏幕上直接调出**相机**图标。点击**相机**图标将直接带你进入**相机**应用，准备拍照。这意味着你不再需要解锁手机、滑动屏幕寻找**相机**应用，然后等待它启动。\n\
    * 使用**音量加**硬件按钮拍照。你可以使用更具触感且类似传统相机操控的方式，而不必费劲去按屏幕上的相机软件按钮。\n* 拍摄多张照片。苹果称，拍摄第一张照片的时间已缩短至惊人的\
    \ 1.1 秒；然而，从第二张照片开始——以及此后的每一张照片——现在仅需 0.5 秒。这对于拍摄运动或其他快速移动的场景尤其方便。只需尽可能快地连续按音量加键即可。\n\
    * 自动对焦和人脸识别意味着你拍摄的朋友和家人的快照会自动更清晰，曝光也更好。\n\n## 使用相机应用\n\n**相机**应用应该在你的**主屏幕**页面上——通常位于第一个屏幕的顶部。如果你没有看到它，请向左或向右滑动直到找到它。\n\
    \n![images](img/U2001.jpg)\n\n触摸**相机**图标，相机的快门会以动画效果在你的屏幕上打开。\n\n一旦快门打开，你会看到顶部的控制选项：将**闪光灯**设置为**开**、**关**或**自动**；**选项**用于设置**网格**叠加和**HDR**（高动态范围）为**开**或**关**；以及一个切换前置和后置摄像头的开关。在底部，你会找到一个缩略图，可带你进入“相机胶卷”相册；一个用于拍照的**相机**按钮；以及一个用于在静态照片和视频录制模式之间切换的滑块。\n\
    \n![images](img/U2002.jpg)\n\n**提示：** 你也可以通过按下**音量加**硬件按钮来拍照或开始视频录制。\n"
- fmt: "# Geo-Tagging\n\n`Geo-tagging` is a feature that puts your GPS (geographic\
    \ positioning system) coordinates into the picture file. If you upload your pictures\
    \ to programs like `Flickr`, the coordinates of your picture can be used by your\
    \ friends to locate you and locate the site where the picture was taken.\n\n**NOTE:**\
    \ For Mac users, `iPhoto` uses geo-tagging to put photos into the `Places` category\
    \ of `iPhoto`.\n\nIf you have `Location Services` set to `ON` when you start the\
    \ camera (see [Chapter 1](#Chapter01.html#ch1): “Getting Started”), you will be\
    \ asked if it is OK to use your current location.\n\nTo double-check this setting,\
    \ do the following:\n\n1. Start your `Settings` app.\n2. Go to `General`.\n3.\
    \ Touch `Location Services`. You will see a screen like the one here.\n4. Make\
    \ sure the switch next to `Camera` is toggled to `ON`.\n\n![images](images/U2003.jpg)\n\
    \n# Taking a Picture\n\nTaking a picture is as simple as pointing and shooting,\
    \ but there are some adjustments that you can make if you choose.\n\nOnce your\
    \ camera is on, center your subject in the screen of your iPhone.\n\nWhen you\
    \ are ready to take a picture, just touch the `Camera` button along the bottom\
    \ or press the `Volume Up` hardware button (the one with the + on it) on the side\
    \ of your iPhone. You will hear a shutter sound, and the screen will show an animation\
    \ indicating that the picture is being taken.\n\n![images](images/U2004.jpg) \
    \ \n![images](images/U2005.jpg)\n\nOnce the picture is taken, it will drop down\
    \ into the window in the lower-left corner. Touch that small thumbnail, and the\
    \ `Camera Roll` album of your `Photos` app will load.\n\n## Using the Zoom\n\n\
    The iPhone includes a 5x digital zoom.\n\n**NOTE:** A digital zoom is never as\
    \ clear as an analog zoom, so be aware that picture quality is usually degraded\
    \ slightly when using the zoom.\n\nTo use the zoom, just touch the screen with\
    \ two fingers and pinch to zoom in or out. The further you spread your fingers\
    \ apart, the further you will zoom out. Once the zoom begins, a Zoom slider will\
    \ also appear to help you change the zoom level.\n\n![images](images/U2006.jpg)\n\
    \n## Using the Flash\n\nYour iPhone has a built-in LED flash. The default flash\
    \ setting is `Auto`, but you can also manually turn set it to `On` or `Off`:\n\
    \n![images](images/U2007.jpg)\n\n1. Touch the `Flash` icon in the upper-left corner.\n\
    2. Touch either `On`, `Off`, or `Auto`.\n\n**TIP:** We recommend keeping the `Flash`\
    \ setting on `Auto`; however, if you notice that a photo looks over-exposed, just\
    \ touch the `Flash` icon to set the flash to `Off`.\n\n## Camera Options\n\nTo\
    \ help you take better pictures, Apple has built in both `Grid` lines and a version\
    \ of `HDR` (high dynamic range) photography.\n\nThe `Grid` option overlays two\
    \ horizontal and two vertical lines over the screen. This can help you properly\
    \ compose your shots. It can also help you make sure faces and eyes look great\
    \ for portraits, items look great for still life images, and the scenery is balanced\
    \ for landscapes.\n\n`HDR` takes not only a regular picture, but an underexposed\
    \ version and an overexposed version. It then merges them together to give you\
    \ better detail in both shadowy and lit areas.\n\n![images](images/U2008.jpg)\n\
    \n## Switching Cameras\n\nAs mentioned previously, the iPhone comes with two cameras:\
    \ an 8.0 megapixel camera on the back for most photography and a VGA camera (640\
    \ x 480) on the front for self-portraits or for use in `FaceTime` video calls\
    \ (see [Chapter 11](#Chapter11.html#ch11): “Video Messaging and Skype”).\n\n![images](images/U2009.jpg)\
    \  \n![images](images/U2010.jpg)\n\nTo switch between the cameras, do the following:\n\
    \n1. Touch the `Switch Camera` icon from the `Camera` app.\n2. Wait for the camera\
    \ to switch to the front-facing camera and line up the shot.\n3. Touch the `Switch\
    \ Camera` icon again to switch back to the standard camera.\n\n**TIP:** Because\
    \ of the placement of the front-facing camera, faces can look somewhat distorted.\
    \ Try moving your face back a bit and adjusting the camera angle to get a better\
    \ image.\n\n# Viewing Pictures You Have Taken\n\nYour iPhone will store pictures\
    \ you take on the iPhone in what is called your `Camera Roll`. You can access\
    \ the `Camera Roll` from inside both the `Camera` and `Photos` apps. In the `Camera`\
    \ app, touch the `Pictures` icon in the bottom-left corner of the `Camera` screen.\n\
    \n![images](images/U2011.jpg)\n\nOnce you touch a picture to view, you can swipe\
    \ through your pictures to see all the pictures in the `Camera Roll`.\n\n![images](images/U2012.jpg)\
    \  \n![images](images/U2013.jpg) To get back to the `Camera Roll`, press the `Camera\
    \ Roll` button in the upper-left corner.\n\n![images](images/U2014.jpg) To take\
    \ another picture, touch the `Done` button in the upper-right corner.\n\n# Editing\
    \ Photos\n\nWith iOS 5 you can now do basic photo editing right on your iPhone.\
    \ You can rotate your photos; enhance their exposure, contrast, and levels; crop\
    \ them; and even automatically remove red-eye from pictures of your friends and\
    \ family.\n\nFollow these steps to edit a photo:\n\n1. Browse to the photo you'd\
    \ like to edit.\n2. Tap the `Edit` button at the top right.\n\nFollow these steps\
    \ to rotate a photo:\n\n1. Tap the `Rotate` arrow ![images](images/U2015.jpg)\
    \ button at the bottom left to turn your photo 90 degrees counter-clockwise (to\
    \ the left).\n2. Tap the `Rotate` button again to keep rotating in 90-degree increments.\n\
    3. When you've rotated the image to the position you want, tap the yellow `Save`\
    \ button at the top right.\n\nSimilarly, follow these steps to auto-enhance a\
    \ photo:\n\n1. Tap the `Auto-Enhance` ![images](images/U2016.jpg) magic wand button.\n\
    2. If you like the results, tap the yellow `Save` button at the top right.\n3.\
    \ If you don't like the results, tap `Auto-Enhance` again to set it to `Off`.\n\
    4. Tap `Cancel` to exit `Auto-Enhance` mode.\n\nFollow these steps to remove red-eye\
    \ from a photo:\n\n1. Tap the `Red-Eye` ![images](images/U2017.jpg) button to\
    \ activate red-eye removal.\n2. Tap each red eye in your photo to apply reduction\
    \ (i.e., remove the red color from the eye).\n3. If you like the results, tap\
    \ the `Apply` button at the top left.\n4. If you don't like the results, tap each\
    \ red eye again to remove the reduction.\n5. Tap `Cancel` to exit this mode.\n\
    \nFinally, follow these steps to crop a photo:\n\n1. Tap the `Crop` ![images](images/U2018.jpg)\
    \ button on the bottom right. A nine section grid will appear over the photo.\n\
    2. Touch an edge or corner of the grid and drag to make the crop area taller,\
    \ shorter, thinner, or wider.\n3. Touch inside the grid and drag to move the photo\
    \ around behind the grid.\n4. Pinch and zoom to make the photo bigger or smaller\
    \ inside the grid.\n5. Tap the `Constrain` button to choose from a list of standard\
    \ aspect ratios, including `Original`; `Square`; traditional photo ratios like\
    \ `3 x 2`, `4 x 6`, and `8 x10`; TV ratios like `SD 4 x 3` and `HD 16 x 9`; and\
    \ so on.\n6. If you're happy with the crop, tap the yellow `Crop` button at the\
    \ top right to apply it.\n7. If you don't like the crop, tap the `Cancel` button\
    \ at the top left to return to the `Edit` screen.\n\n![images](images/U2019.jpg)"
  raw: '#### Geo-Tagging


    Geo-tagging is a feature that puts your GPS (geographic positioning system) coordinates
    into the picture file. If you upload your pictures to programs like Flickr, the
    coordinates of your picture can be used by your friends to locate you and locate
    the site where the picture was taken.


    **NOTE:** For Mac users, **iPhoto** uses geo-tagging to put photos into the **Places**
    category of **iPhoto**.


    If you have **Location Services** set to **ON** when you start the camera (see
    [Chapter 1](#Chapter01.html#ch1): “Getting Started”), you will be asked if it
    is OK to use your current location.


    To double-check this setting, do the following:


    1.  Start your **Settings** app.

    2.  Go to **General**.

    3.  Touch **Location Services**. You will see a screen like the one here.

    4.  Make sure the switch next to **Camera** is toggled to **ON**.


    ![images](images/U2003.jpg)


    #### Taking a Picture


    Taking a picture is as simple as pointing and shooting, but there are some adjustments
    that you can make if you choose.


    Once your camera is on, center your subject in the screen of your iPhone.


    When you are ready to take a picture, just touch the **Camera** button along the
    bottom or press the **Volume Up** hardware button (the one with the + on it) on
    the side of your iPhone. You will hear a shutter sound, and the screen will show
    an animation indicating that the picture is being taken.


    ![images](images/U2004.jpg)


    ![images](images/U2005.jpg)


    Once the picture is taken, it will drop down into the window in the lower-left
    corner. Touch that small thumbnail, and the Camera Roll album of your **Photos**
    app will load.


    ##### Using the Zoom


    The iPhone includes a 5x digital zoom..


    **NOTE:** A digital zoom is never as clear as an analog zoom, so be aware that
    picture quality is usually degraded slightly when using the zoom.


    To use the zoom, just touch the screen with two fingers and pinch to zoom in or
    out. The further you spread your fingers apart, the further you will zoom out.
    Once the zoom begins, a Zoom slider will also appear to help you change the zoom
    level.


    ![images](images/U2006.jpg)


    ##### Using the Flash


    Your iPhone has a built-in LED flash. The default flash setting is **Auto**, but
    you can also manually turn set it to **On** or **Off**:


    ![images](images/U2007.jpg)


    1.  Touch the **Flash** icon in the upper-left corner.

    2.  Touch either **On**, **Off**, or **Auto**.


    **TIP:** We recommend keeping the **Flash** setting on **Auto**; however, if you
    notice that a photo looks over-exposed, just touch the **Flash** icon to set the
    flash to **Off**.


    ##### Camera Options


    To help you take better pictures, Apple has built in both **Grid** lines and a
    version of **HDR** (high dynamic range) photography.


    The **Grid** option overlays two horizontal and two vertical lines over the screen.
    This can help you properly compose your shots. It can also help you make sure
    faces and eyes look great for portraits, items look great for still life images,
    and the scenery is balanced for landscapes.


    **HDR** takes not only a regular picture, but an underexposed version and an overexposed
    version. It then merges them together to give you better detail in both shadowy
    and lit areas.


    ![images](images/U2008.jpg)


    ##### Switching Cameras


    As mentioned previously, the iPhone comes with two cameras: an 8.0 megapixel camera
    on the back for most photography and a VGA camera (640 x 480) on the front for
    self-portraits or for use in **FaceTime** video calls (see [Chapter 11](#Chapter11.html#ch11):
    “Video Messaging and Skype”).


    ![images](images/U2009.jpg)


    ![images](images/U2010.jpg)


    To switch between the cameras, do the following:


    1.  Touch the **Switch Camera** icon from the **Camera** app.

    2.  Wait for the camera to switch to the front-facing camera and line up the shot.

    3.  Touch the **Switch Camera** icon again to switch back to the standard camera.


    **TIP:** Because of the placement of the front-facing camera, faces can look somewhat
    distorted. Try moving your face back a bit and adjusting the camera angle to get
    a better image.


    #### Viewing Pictures You Have Taken


    Your iPhone will store pictures you take on the iPhone in what is called your
    *Camera Roll*. You can access the Camera Roll from inside both the **Camera**
    and **Photos** apps. In the **Camera** app, touch the **Pictures** icon in the
    bottom-left corner of the **Camera** screen.


    ![images](images/U2011.jpg)


    Once you touch a picture to view, you can swipe through your pictures to see all
    the pictures in the Camera Roll.


    ![images](images/U2012.jpg)


    ![images](images/U2013.jpg) To get back to the Camera Roll, press the **Camera
    Roll** button in the upper-left corner.


    ![images](images/U2014.jpg) To take another picture, touch the **Done** button
    in the upper-right corner.


    #### Editing Photos


    With iOS 5 you can now do basic photo editing right on your iPhone. You can rotate
    your photos; enhance their exposure, contrast, and levels; crop them; and even
    automatically remove red-eye from pictures of your friends and family.


    Follow these steps to edit a photo:


    1.  Browse to the photo you''d like to edit.

    2.  Tap the **Edit** button at the top right.


    Follow these steps to rotate a photo:


    1.  Tap the **Rotate** arrow ![images](images/U2015.jpg) button at the bottom
    left to turn your photo 90 degrees counter-clockwise (to the left).

    2.  Tap the **Rotate** button again to keep rotating in 90-degree increments.

    3.  When you''ve rotated the image to the position you want, tap the yellow **Save**
    button at the top right.


    Similarly, follow these steps to auto-enhance a photo:


    1.  Tap the **Auto-Enhance** ![images](images/U2016.jpg) magic wand button.

    2.  If you like the results, tap the yellow **Save** button at the top right.

    3.  If you don''t like the results, tap **Auto-Enhance** again to set it to **Off**.

    4.  Tap **Cancel** to exit Auto-Enhance mode.


    Follow these steps to remove red-eye from a photo:


    1.  Tap the **Red-Eye** ![images](images/U2017.jpg) button to activate red-eye
    removal.

    2.  Tap each red eye in your photo to apply reduction (i.e., remove the red color
    from the eye).

    3.  If you like the results, tap the **Apply** button at the top left.

    4.  If you don''t like the results, tap each red eye again to remove the reduction.

    5.  Tap **Cancel** to exit this mode.


    Finally, follow these steps to crop a photo:


    1.  Tap the **Crop** ![images](images/U2018.jpg) button on the bottom right. A
    nine section grid will appear over the photo.

    2.  Touch an edge or corner of the grid and drag to make the crop area taller,
    shorter, thinner, or wider.

    3.  Touch inside the grid and drag to move the photo around behind the grid.

    4.  Pinch and zoom to make the photo bigger or smaller inside the grid.

    5.  Tap the **Constrain** button to choose from a list of standard aspect ratios,
    including **Original**;**Square**; traditional photo ratios like **3 x 2**, **4
    x 6**, and **8 x10**; TV ratios like **SD 4 x 3** and **HD 16 x 9**; and so on.

    6.  If you''re happy with the crop, tap the yellow **Crop** button at the top
    right to apply it.

    7.  If you don''t like the crop, tap the **Cancel** button at the top left to
    return to the **Edit** screen.


