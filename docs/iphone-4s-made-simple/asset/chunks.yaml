    \ 2 章“键入、复制和搜索”中的“复制和粘贴”部分。以下是从网页复制文本或图形的快速摘要：\n\n*   **复制单个单词：** 长按该单词，直到它被高亮显示且出现\
    \ **复制** 按钮。然后点击 **复制**。\n*   **复制几个单词或整个段落：** 长按一个单词直到它被高亮显示。然后向左或向右拖动蓝色圆点以选择更多文本。您可以向上或向下滑动以选择整个段落。最后点击\
    \ **复制**。\n\n    **提示：** 选定单个单词会使复制功能进入单词选择模式，在此模式下您可以拖动以增加或减少选中的单词数量。如果选择超过一个段落，通常会切换到元素选择模式，此时您会看到可拖动的边缘，用于选择多个段落、图像等。\n\
    \n*   **保存或复制图形：** 长按图片或图像，直到弹出窗口询问您是否要保存或复制该图像。\n\n#### 使用自动填充节省时间\n\n自动填充功能是节省输入个人信息（包括网站用户名和密码）的好方法。自动填充工具可以记住并自动填写网页表单所需的信息。启用自动填充可以节省大量时间。\n\
    \n请参阅本章后面的“启用自动填充”部分，了解如何在 iPhone 上设置自动填充。\n\n启用 **自动填充** 选项后，只需前往任何需要填写字段的网页。一旦您触摸该字段，键盘就会在屏幕底部弹出。在键盘顶部，您会看到一个写着\
    \ **自动填充** 的小按钮。点击它，网页表单就会自动填写完毕。\n\n**注意：** 自动输入您的姓名和密码意味着任何拿起您 iPhone 的人都能访问您的个人网站和信息。您可能希望按照第\
    \ 8 章“个性化与安全”中的说明启用密码安全功能。\n\n##### 输入用户名和密码\n\n当您首次访问一个需要输入用户名和密码的网站时，输入它们后点击\
    \ **提交** 或 **回车**。此时，自动填充会询问是否希望您的 iPhone 记住它们。\n\n如果希望被记住并在下次访问时自动输入，请点击 **是**。\n\
    \n![images](img/U1628.jpg)\n\n下次访问此登录页面时，您的用户名和密码将自动填写。\n\n![images](img/U1629.jpg)\n\
    \n##### 用于个人信息\n\n在网上，您经常需要输入姓名、电子邮件地址、家庭住址等信息。通过将自动填充设置并与 iPhone 上的联系人记录关联，只需轻触一下即可填写这些表单。\n\
    \n您会访问许多需要填写网页表单的网站。例如，查看 [`www.madesimplelearning.com`](http://www.madesimplelearning.com)\
    \ 上关于免费 iPhone 技巧的网页表单示例。手动输入电子邮件地址、名字和姓氏会花费一些时间。\n\n![images](img/U1630.jpg)\n\
    \n一旦您点击第一个字段（此处为 **电子邮件**），您就会看到 **自动填充** 栏出现在键盘上方。\n\n点击 **自动填充** 按钮，您的电子邮件地址和姓名便会立即根据联系人记录填写完毕。\n\
    \n![images](img/U1631.jpg)\n\n#### 将网页图标添加到主屏幕\n\n如果您喜欢某个网站或页面，可以轻松地将其作为图标添加到\
    \ **主屏幕**。这样，您无需通过 **Safari** 的书签选择过程即可直接访问该网页。将图标放在 **主屏幕** 上可以节省许多步骤。这对于快速启动\
    \ Web 应用（例如 Google 的 Gmail 或基于 Web 的游戏）尤其有用。\n\n**按照以下步骤添加 Web 应用图标：**\n\n1. \
    \ 点击浏览器底部的 **操作** 按钮 ![images](img/U1632.jpg)。\n2.  点击 **添加到主屏幕**。\n3.  调整名称，将其缩短至十个或更少字符；因为主屏幕上图标名称的空间有限，建议这样做。\n\
    4.  点击右上角的 **添加** 按钮。\n\n   ![images](img/U1633.jpg)\n"
- fmt: "### Adjusting the Safari Browser Settings\n\nAs with other settings we've\
    \ adjusted so far, the settings for `Safari` are found in the `Settings` app.\n\
    \n1. To access settings for `Safari`, tap the `Settings` icon.\n2. Tap `Safari`.\n\
    \n![images](images/U1634.jpg)\n\n#### Changing the Search Engine\n\nBy default,\
    \ the search engine for the `Safari` browser is `Google`. To change this to `Yahoo`\
    \ or `Bing`, touch the `Search Engine` button and then choose the new search engine.\n\
    \n**TIP:** If you don't want to change your default search engine, you can use\
    \ `Siri` as a way to occasionally search `Yahoo!` or `Bing`. Just activate `Siri`\
    \ and say “Search Yahoo! for…” or “Search Bing for…” and `Siri` will get you the\
    \ results.\n\n![images](images/U1635.jpg)\n\n#### Enabling AutoFill\n\nAs we showed\
    \ you earlier in this chapter, `AutoFill` is a convenient way to have `Safari`\
    \ automatically fill out web page forms that ask for your name, address, phone\
    \ number, or even username and password. It can save you a tremendous amount of\
    \ time typing and retyping your name and other information.\n\nTo enable the `AutoFill`\
    \ option, follow these steps:\n\n1. From the `Safari` menu in the `Settings` app,\
    \ tap `AutoFill`.\n\n![images](images/U1636.jpg)\n\n2. Set the switch next to\
    \ `Names & Passwords` to `ON`.\n3. Set the switch next to `Use Contact Info` to\
    \ `ON`.\n\n![images](images/U1637.jpg)\n\n4. After setting `Use Contact Info`\
    \ to `ON`, you will be brought to your `Contacts` list to select a contact to\
    \ use.\n5. Swipe up and down to find someone or double-tap the top bar that says\
    \ `Contacts` to bring up the `Search` window.\n6. Once you find the contact you\
    \ want to use, tap it to be returned to `Safari`'s `Settings` screen.\n\n![images](images/U1638.jpg)\n\
    \n#### Adjusting Privacy Options\n\nTurning on the `Private Browsing` option means\
    \ that no information, history, or cookies will be stored when you visit web sites.\
    \ If you're concerned about other people knowing which websites you visit or about\
    \ the web sites you visit tracking you, then you should toggle `Private Browsing`\
    \ to the `ON` position.\n\n![images](images/U1639.jpg)\n\nYou can also use the\
    \ `Clear History` and `Clear Cookies and Data` options.\n\n![images](images/U1640.jpg)\n\
    \n**TIP:** If you notice your web browsing get slow or sluggish—or if `Safari`\
    \ is crashing on you frequently—then try clearing both your `History` and `Cookies\
    \ and Data` by tapping them and confirming your choices.\n\n#### Adjusting Security\
    \ Options\n\nUnder the `Security` heading, the `Fraud Warning`, `JavaScript`,\
    \ and `Block Pop-ups` options should be set to `ON` by default. You can modify\
    \ any of these settings by sliding a given switch to `OFF`.\n\n**NOTE:** Many\
    \ popular sites like `Facebook` require `JavaScript` to be `ON`.\n\n![images](images/U1641.jpg)\n\
    \nTap the `Accept Cookies` button to adjust your browser's ability to accept cookies\
    \ to `Always`, `Never`, or `From visited`. We recommend keeping it as `From visited`.\
    \ If you make it `Never`, some web sites will not work properly.\n\n![images](images/U1642.jpg)\n\
    \n## Chapter 17\n\n## Communicate with Email\n\nIn this chapter, we will explore\
    \ the world of email in the `Mail` app on your iPhone. You will learn how to set\
    \ up multiple email accounts, check out all the various reading options, open\
    \ attachments, and clean up your inbox.\n\n![images](images/U1701.jpg)\n\nAnd\
    \ for cases when your email is not working quite right, you will learn some good\
    \ troubleshooting tips to help you get back up and running.\n\n### Getting Started\
    \ with Mail\n\nSetting up email on your iPhone is fairly simple. Probably the\
    \ fastest way to get your email up and running is to set up your accounts directly\
    \ on the phone. We show you how using the `Mail, Contacts and Calendar` account\
    \ setup screens in this section. You could also copy these account settings using\
    \ a screen in the `iTunes` app on your computer. You do need a network connection\
    \ to get email up and running.\n\n#### A Network Connection Is Required\n\nMobile\
    \ email is certainly all the rage today. You can view, read, and compose replies\
    \ to emails already synced to your iPhone without a network connection; however,\
    \ you will need to have network connectivity (either Wi-Fi or 3G/cellular) to\
    \ send and/or receive email from your iPhone. Check out [Chapter 4](#Chapter04.html#ch4):\
    \ “Connect to the Network” to learn more. Also, check out the “Reading the Top\
    \ Connectivity Status Icons” section in the Quick Start Guide in Part 1.\n\n**TIP:**\
    \ If you are taking a trip, simply download all your email before you get on the\
    \ airplane; this lets you read, reply, and compose your messages while offline.\
    \ All emails will be sent after you land and re-establish your connection to the\
    \ Internet.\n\n### Setting up Email on the iPhone\n\nAs mentioned a moment ago,\
    \ you have two options for setting up your email accounts on the iPhone:\n\n1.\
    \ Set up your email accounts directly on the iPhone.\n2. Use `iTunes` to sync\
    \ email account settings.\n\nThe first option, setting up your email accounts\
    \ directly on the iPhone, works best if you want a special setup on your iPhone,\
    \ such as `Gmail` over `Exchange`. This is also a good approach if you don't use\
    \ an email program on your Windows or Mac PC.\n\nIf you have a lot of POP3 or\
    \ IMAP accounts already set up on your Windows or Mac computer, you can also choose\
    \ to sync them over your USB dock cable via `iTunes`.\n\n#### Entering Passwords\
    \ for Email Accounts\n\nIn [Chapter 3](#Chapter03.html#ch3), we showed you how\
    \ to sync your email account settings to your iPhone. After this sync completes,\
    \ you should be able to view all of the email accounts on your iPhone by opening\
    \ the `Settings` app. All you will need to do is enter the password for each account.\n\
    \nTo enter your password for each synced email account, follow these steps:\n\n\
    1. Tap the `Settings` icon.\n2. Tap the `Mail, Contacts, and Calendars` option.\n\
    3. Under `Accounts`, you should see all your synced email accounts listed.\n4.\
    \ Tap any listed email account, type its password, and click `Done`.\n5. If all\
    \ the information is entered correctly, checkmarks will appear and your account\
    \ will be enabled.\n6. Repeat for all listed email accounts.\n\n#### Adding a\
    \ New Email Account on the iPhone\n\nTo add a new email account on your iPhone,\
    \ follow these steps:\n\n1. Tap the `Settings` icon.\n2. Tap the `Mail, Contacts,\
    \ and Calendars` option.\n3. Tap `Add Account` below your email accounts.\n\n\
    \   If you have no accounts set up, you will only see the `Add Account` option.\n\
    \n   **TIP:** To edit any email account, just touch that account.\n\n   ![images](images/U1702.jpg)\n\
    \n4. Choose which type of email account to add on this screen:\n   - Choose `iCloud`\
    \ if you use this service.\n   - Choose `Microsoft Exchange` if you use a Microsoft\
    \ Exchange email server.\n   - You should also choose `Microsoft Exchange` if\
    \ you use `Google Calendar` and `Google Contacts` to store your personal information,\
    \ and you want to wirelessly sync them to your iPhone.\n\n     **NOTE:** We show\
    \ you how to set up both Google/Microsoft Exchange and iCloud in [Chapter 3](#Chapter03.html#ch3):\
    \ “Sync with iCloud, iTunes and More.”\n\n   - Choose `Gmail` if you use Google\
    \ for your email, but you do *not* (or do *not* want to) wirelessly sync email\
    \ with your `Google Contacts`.\n\n     ![images](images/U1703.jpg)\n\n   - Choose\
    \ `Yahoo!`, `AOL`, or `Windows Live Hotmail` if you use those services.\n   -\
    \ Choose `Other` if none of the above apply, and you want to sync a standard POP\
    \ or IMAP email account. Finally, choose `Add Mail Account` from the next screen.\n\
    \n5. Type your name as you would like others to see it when they receive mail\
    \ from you into the `Name` field.\n6. Next, add the appropriate information into\
    \ the `Address`, `Password`, and `Description` fields.\n7. Tap the `Next` button\
    \ in the upper-right corner.\n\n![images](images/U1704.jpg)"
