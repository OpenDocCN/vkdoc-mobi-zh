    \ in the top address bar and tap **Go**.\n3.  Tap the **sign In** link at the\
    \ top of the page.\n4.  Enter your Skype Name and Password, and then tap **sign\
    \ me in**.\n5.  If you are not already on your **Account** screen, tap the **Account**\
    \ tab in the right end of the Top Nav Bar.\n6.  At this point, you can choose\
    \ to buy credits or a subscription:\n    *   Tap the **Buy pre-pay credit** button\
    \ to purchase a fixed amount of credits.\n    *   Tap the **Get a subscription**\
    \ button to buy a monthly subscription account.\n7.  Finally, complete the payment\
    \ instructions for either type of purchase.\n\n#### Chatting with Skype\n\nIn\
    \ addition to making phone calls, you can also chat via text with other **skype**\
    \ users from your iPhone. Starting a chat is very similar to starting a call;\
    \ follow these steps to do so:\n\n1.  If you are not already in **skype**, tap\
    \ the **skype** icon.\n2.  Tap the **Contacts** soft key at the bottom.\n\n  \
    \  ![images](images/U1111.jpg)\n\n3.  Tap **All Contacts** to see all your contacts.\n\
    4.  Tap the name of the contact you wish to chat with.\n5.  Tap the **Chat** button.\n\
    6.  Type your chat text and press the **send** button. Your chat will appear in\
    \ the top of the screen.\n\n    ![images](images/U1112.jpg)"
  trans: "\n# 使用 Skype 拨打电话及更多功能\n\n社交网络的核心在于与朋友、同事和家人保持联系。通过像 [`www.facebook.com`](http://www.facebook.com)\
    \ 和 `Google+` 这样的网站进行被动沟通固然不错，但有时没有什么能替代听到对方声音的体验。\n\n令人惊叹的是，你可以使用任何 iPhone 上的\
    \ `skype` 应用拨打语音和视频电话。拨打给全球其他 Skype 用户的电话是免费的。Skype 服务的一个优点是它可以在电脑和许多移动设备上运行，包括\
    \ iPhone 4S、旧款 iPhone、iPad、iPod touch、部分黑莓智能手机以及其他移动设备。拨打给手机和固定电话会收费，但价格合理。\n\n\
    ![images](img/U1103.jpg)\n\n![images](img/U1104.jpg)\n\n**注意**：与 `FaceTime` 不同，`skype`\
    \ 应用可以通过 3G 网络发起视频通话。它还可以在后台运行，因此你可以随时接听来电的 Skype 电话（注意，这通常会导致电池消耗更快）。\n\n## 将\
    \ Skype 下载到你的 iPhone\n\n你可以从 App Store 搜索“Skype”并安装来下载免费的 `skype` 应用。如果在此过程中需要帮助，请查看第\
    \ 23 章：“神奇的 App Store”。\n\n## 创建你的 Skype 账号\n\n如果你需要设置 Skype 账号，并且尚未通过电脑完成（请参阅本章后面的“在电脑上使用\
    \ Skype”部分）。\n\n## 登录 Skype 应用\n\n创建账号后，你就可以在 iPhone 上登录 `skype` 了。请按照以下步骤操作：\n\
    \n1.  如果你尚未进入 `skype`，请从 `Home` 屏幕点击 `skype` 图标。\n\n    ![images](img/U1105.jpg)\n\
    \n2.  输入你的 Skype 用户名和密码。\n3.  点击右上角的 `sign In` 按钮。\n4.  你无需再次输入此登录信息；它已保存在 `skype`\
    \ 中。下次点击 `skype` 时，它将自动为你登录。\n\n## 查找并添加 Skype 联系人\n\n登录 `skype` 应用后，你将希望开始与人沟通。为此，你需要找到他们并将其添加到你的\
    \ `skype` 联系人列表中：\n\n1.  如果你尚未进入 `skype` 应用，请从 `Home` 屏幕点击 `skype` 图标，并在系统提示时登录。\n\
    2.  点击底部的 `Contacts` 软键。\n3.  点击顶部的 `search` 窗口，然后输入某人的姓名或 `skype` 用户名。点击 `search`\
    \ 找到此人。\n\n    ![images](img/U1106.jpg)\n\n4.  看到你想添加的人后，点击其姓名。\n5.  如果不确定此人是否正确，请点击\
    \ `View Full Profile` 按钮。\n\n    ![images](img/U1107.jpg)\n\n6.  点击底部的 `Add Contact`。\n\
    7.  适当调整邀请消息。\n\n    ![images](img/U1108.jpg)\n\n8.  点击 `send` 按钮，向此人发送成为你 `skype`\
    \ 联系人的邀请。\n9.  重复此步骤以添加更多联系人。\n10. 完成后，点击底部的 `Contacts` 软键。\n11. 从 `Groups` 屏幕点击\
    \ `All Contacts`，查看你添加的所有新联系人。\n12. 一旦此人接受你为联系人，你将看到其出现在 `All Contacts` 屏幕的联系人列表中。\n\
    \n**提示：** 有时你想删除某个 Skype 联系人。你可以通过从联系人列表中点击其姓名来移除或阻止联系人。点击 `settings` 图标（右上角），然后选择\
    \ `Remove from Contacts` 或 `Block`。\n\n![images](img/U1109.jpg)\n\n## 在 iPhone\
    \ 上使用 Skype 拨打电话\n\n到目前为止，你已经创建了账号并添加了联系人。现在，你终于可以在 iPhone 上使用 `skype` 拨出第一通电话了：\n\
    \n1.  点击底部的 `Contacts` 软键。\n\n    ![images](img/U1110.jpg)\n\n2.  点击 `All Contacts`\
    \ 查看你的联系人。\n3.  点击你想拨打的联系人姓名。\n4.  点击 `Call` 按钮进行语音通话，或点击 `Video Call` 按钮进行视频通话。\n\
    5.  你可能会看到一个 Skype 按钮和一个移动电话或其他电话按钮。按下 Skype 按钮即可免费通话。拨打任何其他电话都需要使用 Skype 点数付费。\n\
    \n**注意：** 你可以在 iPhone 上使用 `skype Out` 免费拨打免费电话号码。以下说明来自 Skype 网站 [`www.skype.com`](http://www.skype.com)：\n\
    \n“支持以下国家和号码范围，对所有用户免费。我们正在努力覆盖世界其他地区。法国：+33 800、+33 805、+33 809 波兰：+48 800 英国：+44\
    \ 500、+44 800、+44 808 美国：+1 800、+1 866、+1 877、+1 888 台湾：+886 80”\n\n## 在 iPhone\
    \ 上使用 Skype 接听电话\n\niPhone 原生支持后台 VoIP 通话。借助新版 `skype`，你可以让 `skype` 在后台运行，并在有来电时接听\
    \ `skype` 电话。理论上，你甚至可以在进行语音通话时再接听你的 `skype` 电话！\n\n**提示：** 如果你不想让 `skype` 在后台运行，但仍想给某个你知道也在\
    \ iPhone 上使用 `skype` 的人打电话，只需给她发一封简短的电子邮件或快速打个电话，提醒她你想用 `skype` 应用与她通话。\n\n###\
    \ 购买 Skype 点数或月度订阅\n\nSkype 用户之间的通话是免费的。但是，如果你想通过 `skype` 应用拨打固定电话或手机，则需要购买 Skype\
    \ 点数或购买月度订阅套餐。如果你尝试在 `skype` 应用内购买点数或订阅，它会将你带到 Skype 网站。因此，我们建议使用 iPhone 上的 `safari`\
    \ 或电脑的网页浏览器来购买这些点数。\n\n**提示：** 在注册订阅套餐之前，你可能想先购买少量 Skype 点数试用该服务。如果你打算经常使用 Skype\
    \ 与非 Skype 用户（例如，普通固定电话和手机）通话，订阅套餐是更好的选择。\n\n按照以下步骤使用 `safari` 购买 Skype 点数：\n\n\
    1.  点击 `safari` 图标。\n2.  在顶部的地址栏中输入 [`www.skype.com`](http://www.skype.com)，然后点击\
    \ `Go`。\n3.  点击页面顶部的 `sign In` 链接。\n4.  输入你的 Skype 用户名和密码，然后点击 `sign me in`。\n\
    5.  如果你尚未进入 `Account` 屏幕，请点击顶部导航栏右侧的 `Account` 标签。\n6.  此时，你可以选择购买点数或订阅：\n   \
    \ *   点击 `Buy pre-pay credit` 按钮，购买固定金额的点数。\n    *   点击 `Get a subscription` 按钮，购买月度订阅账户。\n\
    7.  最后，根据购买类型完成支付说明。\n\n## 使用 Skype 聊天\n\n除了拨打电话，你还可以通过 iPhone 与其他 `skype` 用户进行文字聊天。开始聊天与开始通话非常相似；请按照以下步骤操作：\n\
    \n1.  如果你尚未进入 `skype`，请点击 `skype` 图标。\n2.  点击底部的 `Contacts` 软键。\n\n    ![images](img/U1111.jpg)\n\
    \n3.  点击 `All Contacts` 查看所有联系人。\n4.  点击你想聊天的联系人姓名。\n5.  点击 `Chat` 按钮。\n6.  输入你的聊天文字，然后按下\
    \ `send` 按钮。你的聊天内容将显示在屏幕顶部。\n\n    ![images](img/U1112.jpg)\n"
- fmt: "#### Adding Skype to Your Computer\n\nYou can use the `skype` app on your\
    \ computer, as well. We will show you how this works next. You can also use `skype`\
    \ to make video calls on your computer if you also have a web cam hooked up.\n\
    \n**NOTE:** when you call from your computer to an iPhone, you will not be able\
    \ to do a video call.\n\nTo create a Skype account and download `skype` software\
    \ for your computer, follow these steps:\n\n1. Open a web browser on your computer.\n\
    2. Go to: [www.skype.com](http://www.skype.com).\n3. Click the **Join** link at\
    \ the top of the page.\n4. Create your account by completing all required information\
    \ and clicking the **Continue** button. Notice that you only have to enter information\
    \ in the required fields, which are denoted with an asterisk. For example, you\
    \ do not need to enter your gender, birth date, or mobile phone number.\n5. You\
    \ are now done with the account setup process. Next, you are presented with the\
    \ option of buying Skype Credits; however, this is not required for the free Skype-to-Skype\
    \ phone calls, video calls, or chats.\n\n   **TIP:** You only need to pay for\
    \ `skype` if you want to call someone who is not using `skype`. For example, calls\
    \ to phones on land lines or mobile phones (not using `skype`) will cost you.\
    \ At the time of writing, pay-as-you-go rates were about US 2.1 cents; monthly\
    \ subscriptions ranged from about US $3 - $14 for various calling plans.\n\n6.\
    \ Next, click the `Get Skype` link in the Top Nav Bar of the site to download\
    \ `skype` to your computer.\n7. Click the **Get Skype for Windows** button or\
    \ the **Get Skype for Mac** button.\n8. Follow the instructions to install the\
    \ software.\n9. Once the software is installed, launch it and log in using your\
    \ Skype account.\n10. You are ready to initiate (or receive) phone calls, video\
    \ calls, and chats to anyone else using `skype`, including all your friends with\
    \ `skype` on their iPhones.\n\n### Video Recording\n\nIn addition to letting you\
    \ make video calls and chat, the iPhone lets you make full-featured videos using\
    \ the built-in video recorder. You can use your iPhone to shoot HD video in 1080p\
    \ and then upload this video to Facebook, YouTube, or iCloud. You can also send\
    \ your videos via MMS or email.\n\n**NOTE:** when you share a video, it will be\
    \ compressed, so the quality will no longer be 1080p.\n\nNext, we will show you\
    \ how to record video and trim your video right on your iPhone. You will also\
    \ learn how to produce a high quality, high definition video right on your iPhone.\n\
    \n#### Starting the Video Recorder\n\nThe software for the video recorder is actually\
    \ part of the **Camera** app (see [Figure 11–3](#Chapter11.html#fig_11_3)). Follow\
    \ these steps to use the built-in video recorder:\n\n1. Start up the **Camera**\
    \ app. Move the slider in the lower-right corner from the **Camera** icon to the\
    \ **Video Recorder** icon.\n2. Tap the **Camera Switch** button at the top right\
    \ to alternate between the rear-facing and front-facing cameras.\n3. Try to keep\
    \ the iPhone steady as you record your scene.\n4. Tap the **stop** button when\
    \ you are done recording.\n\n![images](images/1103.jpg)\n\n**Figure 11–3.** *The\
    \ layout and controls of the video recorder*\n\n##### Focusing the Video\n\nThe\
    \ iPhone can adjust the focus of the video based on the subject. Follow these\
    \ steps to take advantage of this feature:\n\n1. To focus on something in the\
    \ foreground of the video, tap the screen in the foreground. This brings up a\
    \ small box to show the area of focus.\n2. To switch the focus to a subject in\
    \ the background, tap another part of the screen. The box will temporarily display\
    \ the new area of focus.\n\n##### Trimming the Video\n\nThe iPhone allows you\
    \ to perform edits on your video right on the phone. Once the video has been recorded\
    \ and you press the **stop** button, the video immediately goes into your **Camera\
    \ Roll**.\n\nTap the small image of the video in the lower-left corner to bring\
    \ up the video. At the top of the screen, you will see a timeline with all the\
    \ frames of your video at the top of the screen (see [Figure 11–4](#Chapter11.html#fig_11_4)).\
    \ Follow these steps to edit your just-recorded video:\n\n1. Drag either end of\
    \ the timeline and you will see that the video goes into Trim mode.\n2. Drag the\
    \ ends of the video on either end until it is the length you desire.\n3. When\
    \ the video is the correct length, tap the **Trim** button in the upper-right\
    \ corner.\n4. Next, select either **Trim Original** or **save as New Clip**. The\
    \ latter option saves another version of the newly trimmed video.\n\n![images](images/1104.jpg)\n\
    \n**Figure 11–4.** *Trimming a video*\n\n##### Sending the Video\n\nAs with photos,\
    \ you have several options for using your iPhone to send recorded video to others.\
    \ Follow these steps to send a video from your iPhone:\n\n1. Touch the **send**\
    \ icon ![images](images/U1113.jpg) in the lower-left corner.\n2. Choose your preferred\
    \ option for sending the video: **Email**, **Message**, or **send toYouTube**.\n\
    3. The next screen you see will depend on the choice you made in Step 2. If you\
    \ selected **Email**, your **Email** app will launch. If you selected **Message**,\
    \ your **Messaging** app will launch. And so on.\n\n   **NOTE:** To upload a video\
    \ to YouTube, you need to have an account with the site.\n\n## Chapter 12\n\n\
    ## Playing Music\n\nIn this chapter we show you how to turn your iPhone into a\
    \ terrific music player. Since the iPhone comes from Apple—which popularized the\
    \ now famous iPod electronic music player—you'd expect it to have some great capabilities,\
    \ and it does. We'll show you how to play and organize the music you buy from\
    \ iTunes or sync from your computer, how to view playlists in a variety of ways,\
    \ and how to quickly find songs. You'll learn how to use the Genius feature to\
    \ have the iPhone locate and group similar songs in your library—sort of like\
    \ a radio station that plays only music you like.\n\n**TIP:** Learn how to buy\
    \ music and use Ping (social networking for music lovers) right on your iPhone\
    \ in [Chapter 22](#Chapter22.html#ch22): “iTunes on YourDevice.”\n\nAnd you'll\
    \ see how to stream music using an app called Pandora. With Pandora, you can select\
    \ from a number of Internet radio stations, or create your own by typing in your\
    \ favorite artist's name, and it's all free.\n\n### Your iPhone as a Music Player\n\
    \nYour iPhone is probably one of the best music players on the market today. The\
    \ touch screen makes it easy to interact with and manage your music, playlists,\
    \ cover art, and the organization of your music library. You can even connect\
    \ your iPhone to your home or car stereo via Bluetooth, so you can listen to beautiful\
    \ stereo sound from your iPhone!\n\n**TIP:** Check out [Chapter 5](#Chapter05.html#ch5):\
    \ “AirPlay and Bluetooth” to learn how to hook up your iPhone to your Bluetooth\
    \ stereo speakers or car stereo.\n\nWhether you use the built-in **Music** app\
    \ or an Internet radio app like **Pandora**, you'll find you have unprecedented\
    \ control over your music on the iPhone."
