  trans: "\n# 地理标记\n\n`Geo-tagging` 是一项将你的 GPS（全球定位系统）坐标嵌入到图片文件中的功能。如果你将照片上传至 `Flickr`\
    \ 等程序，你的朋友就可以利用照片中的坐标来找到你的位置以及照片的拍摄地点。\n\n**注意：** 对于 Mac 用户而言，`iPhoto` 利用地理标记功能将照片归类到\
    \ `iPhoto` 的 `地点` 分类中。\n\n如果启用了相机时 `定位服务` 设置为 `开`（参见第 1 章：“开始使用”），系统会询问你是否允许使用当前定位。\n\
    \n要再次确认此设置，请按照以下步骤操作：\n\n1.  打开 `设置` 应用。\n2.  进入 `通用`。\n3.  点击 `定位服务`。你会看到如下所示的屏幕。\n\
    4.  确保 `相机` 旁边的开关已切换至 `开`。\n\n![images](img/U2003.jpg)\n\n# 拍摄照片\n\n拍照就像对准目标然后按下快门一样简单，但如果你愿意，也可以进行一些调整。\n\
    \n相机开启后，将拍摄对象对准 iPhone 屏幕中央。\n\n当你准备好拍照时，只需点击底部的 `相机` 按钮，或按下 iPhone 侧面的 `调高音量`\
    \ 硬件按钮（带有 + 标识的按钮）。你会听到快门声，屏幕会显示动画，表示正在拍照。\n\n![images](img/U2004.jpg)  \n![images](img/U2005.jpg)\n\
    \n照片拍摄完成后，它会落入左下角的窗口中。点击该缩略图，即可加载 `照片` 应用中的 `相机胶卷` 相簿。\n\n## 使用变焦\n\niPhone 具备\
    \ 5 倍数码变焦功能。\n\n**注意：** 数码变焦的清晰度永远比不上光学变焦，因此请注意，使用变焦时画质通常会略微下降。\n\n要使用变焦，只需用两根手指触摸屏幕，然后捏合或张开即可放大或缩小。手指张开越大，缩小的程度也越大。开始变焦后，还会出现一个变焦滑块，帮助你调整变焦倍数。\n\
    \n![images](img/U2006.jpg)\n\n## 使用闪光灯\n\n你的 iPhone 内置了 LED 闪光灯。默认闪光灯设置为 `自动`，但你也可以手动将其设置为\
    \ `开` 或 `关`：\n\n![images](img/U2007.jpg)\n\n1.  点击左上角的 `闪光灯` 图标。\n2.  点击 `开`、`关`\
    \ 或 `自动`。\n\n**提示：** 我们建议将 `闪光灯` 设置保留为 `自动`；但是，如果你发现照片曝光过度，只需点击 `闪光灯` 图标将闪光灯设置为\
    \ `关`。\n\n## 相机选项\n\n为了帮助你拍摄更好的照片，苹果内置了`网格`线和 `HDR`（高动态范围）摄影功能。\n\n`网格`选项会在屏幕上叠加两条水平线和两条垂直线，这有助于你合理构图。它还能帮助你在肖像照中确保面孔和眼睛效果出色，在静物照中确保物品效果良好，并在风景照中确保景色平衡。\n\
    \n`HDR` 不仅拍摄一张常规照片，还会拍摄一张欠曝版本和一张过曝版本，然后将它们合并在一起，使你在阴影区域和明亮区域都能获得更好的细节。\n\n![images](img/U2008.jpg)\n\
    \n## 切换摄像头\n\n如前所述，iPhone 配备了两个摄像头：一个用于绝大多数摄影的 800 万像素后置摄像头，以及一个用于自拍或 `FaceTime`\
    \ 视频通话（参见第 11 章：“视频消息与 Skype”）的 VGA（640 x 480）前置摄像头。\n\n![images](img/U2009.jpg)\
    \  \n![images](img/U2010.jpg)\n\n要在摄像头之间切换，请执行以下操作：\n\n1.  在 `相机` 应用中点击 `切换摄像头`\
    \ 图标。\n2.  等待相机切换至前置摄像头并对准拍摄对象。\n3.  再次点击 `切换摄像头` 图标切换回标准摄像头。\n\n**提示：** 由于前置摄像头的放置位置，面部可能会看起来有些变形。尝试将你的面部稍微后移并调整相机角度，以获得更好的图像。\n\
    \n# 查看已拍摄的照片\n\n你的 iPhone 会将你拍摄的照片存储在一个名为`相机胶卷`的地方。你可以在`相机`和`照片`应用中访问`相机胶卷`。在`相机`应用中，点击`相机`屏幕左下角的`照片`图标。\n\
    \n![images](img/U2011.jpg)\n\n点击一张照片进行查看后，你可以滑动浏览照片，以查看`相机胶卷`中的所有照片。\n\n![images](img/U2012.jpg)\
    \  \n![images](img/U2013.jpg) 要返回`相机胶卷`，请按左上角的`相机胶卷`按钮。\n\n![images](img/U2014.jpg)\
    \ 要拍摄另一张照片，请点击右上角的`完成`按钮。\n\n# 编辑照片\n\n借助 iOS 5，你现在可以直接在 iPhone 上进行基本的照片编辑。你可以旋转照片；增强其曝光度、对比度和色阶；裁剪照片；甚至自动去除亲朋好友照片中的红眼。\n\
    \n请按照以下步骤编辑照片：\n\n1.  浏览到你想要编辑的照片。\n2.  点击右上角的`编辑`按钮。\n\n请按照以下步骤旋转照片：\n\n1.  点击左下角的`旋转`箭头\
    \ ![images](img/U2015.jpg) 按钮，将照片逆时针（向左）旋转 90 度。\n2.  再次点击`旋转`按钮，以 90 度为增量继续旋转。\n\
    3.  将图像旋转到所需位置后，点击右上角的黄色`保存`按钮。\n\n同样地，请按照以下步骤自动增强照片：\n\n1.  点击`自动增强` ![images](img/U2016.jpg)\
    \ 魔法棒按钮。\n2.  如果你对结果满意，点击右上角的黄色`保存`按钮。\n3.  如果不喜欢结果，再次点击`自动增强`将其设置为`关闭`。\n4. \
    \ 点击`取消`退出`自动增强`模式。\n\n请按照以下步骤去除照片中的红眼：\n\n1.  点击`红眼` ![images](img/U2017.jpg)\
    \ 按钮以激活红眼去除功能。\n2.  点击照片中的每个红眼以应用校正（即，去除眼睛中的红色）。\n3.  如果你对结果满意，点击左上角的`应用`按钮。\n\
    4.  如果不喜欢结果，再次点击每个红眼以移除校正效果。\n5.  点击`取消`退出此模式。\n\n最后，请按照以下步骤裁剪照片：\n\n1.  点击右下角的`裁剪`\
    \ ![images](img/U2018.jpg) 按钮。照片上会出现一个九宫格网格。\n2.  触摸网格的边缘或角落并拖动，使裁剪区域变高、变矮、变窄或变宽。\n\
    3.  触摸网格内部并拖动，以移动网格背后的照片。\n4.  捏合或张开手指进行缩放，使网格内的照片变大或变小。\n5.  点击`约束`按钮，从标准宽高比列表中进行选择，包括`原始`、`正方形`；传统照片比例如\
    \ `3 x 2`、`4 x 6` 和 `8 x 10`；电视比例如 `SD 4 x 3` 和 `HD 16 x 9`；等等。\n6.  如果对裁剪结果满意，点击右上角的黄色`裁剪`按钮应用裁剪。\n\
    7.  如果不喜欢裁剪结果，点击左上角的`取消`按钮返回`编辑`屏幕。\n\n![images](img/U2019.jpg)\n"
- fmt: "### Getting Photos onto Your iPhone\n\nYou have many options for loading photos\
    \ onto your device:\n\n- **Sync using iCloud or iTunes:** Probably the simplest\
    \ way to load photos onto your iPhone is to use iCloud or iTunes to sync photos\
    \ from your computer (see [Figure 20–1](#Chapter20.html#fig_20_1)). We describe\
    \ this in detail in [Chapter 3](#Chapter03.html#ch3): “Sync with iCloud, iTunes\
    \ and More.”\n- **Receive as email attachments:** While this is not useful for\
    \ large numbers of pictures, it works well for one or even a few photos. Check\
    \ out [Chapter 17](#Chapter17.html#ch17): “Communicate with Email” for more details\
    \ about how to save attachments. (Once saved, these images show up in the Camera\
    \ Roll album.)\n- **Save images from the Web:** Sometimes you'll see a great image\
    \ on a web site. Press and hold it to see the pop-up menu, and then select **Save\
    \ Image**. (Like other saved images, these end up in the Camera Roll album.)\n\
    - **Download images from within an app:** A good example of this is the wallpaper\
    \ image shown in [Chapter 8](#Chapter08.html#ch8): “Personalize and Secure.”\n\
    - **Sync with iPhoto** (for Mac users): If you use a Mac computer, your iPhone\
    \ will most likely sync automatically with `iPhoto`. Here are a few steps to get\
    \ the sync feature in `iPhoto` up and running:\n  1. Connect your iPhone and start\
    \ the `iTunes` app.\n  2. Go to the **Photo** tab along the top row of Sync Options.\n\
    \  3. Choose the **Albums**, **Events**, **Faces**, or **Places** you want to\
    \ keep in sync with the iPhone.\n\n![images](images/2001.jpg)\n\n**Figure 20–1.**\
    \ *Choosing albums, faces, or events from `iTunes` to sync with the iPhone*\n\n\
    - **Drag and drop** (for Windows users): Once you connect your iPhone to your\
    \ Windows computer, it will appear in **Windows Explorer** as a portable device,\
    \ as shown in [Figure 20–2](#Chapter20.html#fig_20_2). Follow these steps to drag\
    \ and drop photos between your iPhone and computer:\n  1. Double-click the **iPhone**\
    \ image under **Portable Devices** to open it.\n  2. Double-click **Internal Storage**\
    \ to open it.\n  3. Double-click **DCIM** to open it.\n  4. Next, you may see\
    \ one or more folders with strange names like: `823WGTMA`, `860OKMZO`, and `965YOKDJ`.\
    \ Try double-clicking to open each one. One of these will have the photos or videos\
    \ you seek.\n  5. You will see all the images in the Saved Photos album on your\
    \ iPhone.\n  6. To copy images from your iPhone, select and then drag and drop\
    \ images out of this folder onto your computer. You cannot copy images to your\
    \ iPhone using this drag-and-drop method. Instead, you can use iTunes or iCloud.\n\
    \n![images](images/2002.jpg)\n\n**Figure 20–2.** *Windows Explorer showing the\
    \ iPhone as a portable device (connected with a USB cable)*\n\n**TIP: Selecting\
    \ Multiple Images in Windows**\n\nYou have several ways to select images in Windows:\
    \ you can draw a box around the images, click a single image, or press `Ctrl+A`\
    \ to select them all. You can also hold down the `Ctrl` key and click individual\
    \ pictures to select them. Right-click one of the selected pictures and choose\
    \ **Cut** (to move) or **Copy** (to copy) all of the selected images. To paste\
    \ the images, press and click any other disk or folder (e.g., **My Documents**),\
    \ and then navigate to where you want to move or copy the files. Finally, right-click\
    \ again and select **Paste**.\n\n### Viewing Your Photos\n\nNow that your photos\
    \ are on your iPhone, you have a few very cool ways to look through them and show\
    \ them to others.\n\n#### Launching from the Photos Icon\n\nIf you like using\
    \ your **Photos** app, you might want to place its icon in your Bottom Dock for\
    \ easy access if it's not already there (see [Chapter 6](#Chapter06.html#ch6):\
    \ “Icons and Folders”).\n\nTo get started with photos, touch the **Photos** icon.\n\
    \n![images](images/U2020.jpg)\n\nThe first screen shows your photo albums, which\
    \ were created when you set up your iPhone and synced with iCloud or iTunes. In\
    \ [Chapter 3](#Chapter03.html#ch3): “Sync with iCloud, iTunes and More,” we showed\
    \ you how to choose which photos to sync with your iPhone. As you make changes\
    \ to the library on your computer, they will be automatically updated on your\
    \ iPhone.\n\nIf you're using iCloud's Photo Stream feature, this is also where\
    \ you'll find your Photo Stream images.\n\n![images](images/U2021.jpg)\n\n####\
    \ Choosing a Library\n\nFrom the **Photo Albums** page, touch one of the library\
    \ buttons to show the photos in that album. In the image to the right, we touched\
    \ a photo library, and the screen immediately changed to show us thumbnails of\
    \ the pictures in this library.\n\nTap and drag your finger up and down to view\
    \ all the pictures in a library. You can also flick up or down to quickly move\
    \ throughout the pictures in a library. You can also flick up or down to quickly\
    \ move throughout the album.\n\n![images](images/U2022.jpg)\n\n#### Managing Libraries\n\
    \niOS 5 introduces the ability to add new albums, move photos between albums,\
    \ and delete albums right on your iPhone.\n\nFollow these steps to add a new album:\n\
    1. Tap the **Edit** button on the top right.\n2. Tap the **Add** button that appears\
    \ on the top left.\n3. Enter a name for your new album.\n4. Tap **Done** at the\
    \ top right.\n\nFollow these steps to delete an album:\n1. Tap the **Edit** button\
    \ on the top right.\n2. Tap the red **Circle** icon to the left of the album you\
    \ want to delete.\n3. Tap the red **Delete** button to confirm.\n\n![images](images/U2023.jpg)\n\
    \nFinally, follow these steps to move photos between albums:\n1. Tap the **Action**\
    \ button at the bottom left.\n2. Tap the pictures you want to move.\n3. If you\
    \ tap a picture by accident, just tap it again to deselect it.\n4. Tap the **Add\
    \ To** button on the bottom.\n5. Choose **Add to Existing Album** if you already\
    \ have an album that you want to move the pictures into. Or, you can choose **Add\
    \ to New Album** if you want to create a new album now.\n\n### Working with Individual\
    \ Pictures\n\nOnce you locate the picture you want to view, just tap it. The picture\
    \ then loads onto the screen.\n\n**NOTE:** Your pictures will not usually take\
    \ up the full screen on your iPhone if they were shot in Landscape mode.\n\n**TIP:**\
    \ The picture here was shot in Landscape mode; to see it in full screen, simply\
    \ turn your iPhone on its side or double-tap.\n\n![images](images/U2024.jpg)\n\
    \n#### Moving Between Pictures\n\nThe swipe gesture is used to move from one picture\
    \ to the next. Just swipe your finger left or right across the screen, and you\
    \ can move through your pictures.\n\n**TIP:** Drag your finger slowly to move\
    \ more gradually through the picture.\n\n![images](images/U2025.jpg)\n\nWhen you\
    \ reach the end of an album, just tap the screen once and you'll see a tab in\
    \ the upper-left corner that has the name of the photo album. Touch that tab and\
    \ you'll return to the thumbnail page of that particular album.\n\n![images](images/U2026.jpg)\n\
    \nTo get back to your main photo album page, touch the button that says **Albums**\
    \ in the top-left corner.\n\n![images](images/U2027.jpg)\n\n### Zooming in and\
    \ out of Pictures\n\nAs described in the “Getting Started” section of the book,\
    \ there are two ways to zoom in and out of pictures on your iPhone: double-tapping\
    \ and pinching.\n\n#### Double-Tapping\n\nAs the name implies, double-tapping\
    \ is a quick double-tap on the screen to zoom in on the picture (see [Figure 20–3](#Chapter20.html#fig_20_3)).\
    \ You will zoom in on the spot where you double-tap. To zoom out, just double-tap\
    \ once more.\n\nSee [Chapter 1](#Chapter01.html#ch1): “Getting Started” for more\
    \ information on double-tapping.\n\n![images](images/2003.jpg)\n\n**Figure 20–3.**\
    \ *Double-tapping a picture to zoom in on it*"
