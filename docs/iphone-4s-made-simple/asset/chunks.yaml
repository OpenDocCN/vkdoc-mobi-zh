- fmt: "# Adjusting or Disabling the Auto-Lock Time-Out Feature\n\nYou will notice\
    \ that your iPhone will auto-lock and go into Sleep mode (i.e., the screen will\
    \ go blank) after a short amount of time. You can change how long it takes your\
    \ phone to enter Sleep mode or even disable this feature altogether inside the\
    \ `Settings` app. Follow these steps to do so:\n\n1. Touch the `Settings` icon\
    \ from your `Home` screen.\n2. Touch `General`.\n3. Touch `Auto-Lock`.\n4. You\
    \ will see your current sleep interval setting next to the `Auto-Lock` option\
    \ on this page. The default setting is that the iPhone locks after three minutes\
    \ of sitting idle (to save battery life). You can set this interval to `1 Minute`,\
    \ `2 Minutes`, `3 Minutes`, `4 Minutes`, `5 Minutes`, or `Never`.\n5. Touch the\
    \ desired setting to select it—you know it’s selected when you see a checkmark\
    \ next to it.\n6. Finally, touch the `General` button in the upper-left corner\
    \ to get back to the `General` screen. You should now see your change reflected\
    \ next to the Auto-Lock setting.\n\n**BATTERY LIFE TIP:** Setting the Auto-Lock\
    \ feature to a shorter interval (e.g., `1 Minute`) will help you save battery\
    \ life.\n\n# Adjusting the Date, Time, Time Zone, and 24-Hour Format\n\nUsually,\
    \ the date and time is either set for you or adjusts when you connect your iPhone\
    \ to your computer; you can learn more about this in in [Chapter 3](#Chapter03.html#ch3):\
    \ “Sync with iCloud, iPhone and More.” However, you can manually adjust your date\
    \ and time quite easily. You may want to do this when you are traveling with your\
    \ iPhone and need to adjust the time zone when you land. Follow these steps to\
    \ do so:\n\n1. Touch the `Settings` icon.\n2. Touch `General`.\n3. Scroll down\
    \ and touch `Date & Time` to seethe `Date & Time` settings screen.\n4. If you\
    \ prefer to see `09:30` and `14:30` instead of `9:30 AM` and `2:30 PM`, respectively,\
    \ then tap the `24-Hour Time` option to set its switch to `ON`.\n5. To set the\
    \ date and time manually, you have to turn off the automatic time setting feature.\
    \ Tap the switch next to `Set Automatically` to set this option to `OFF`.\n\n\
    \    ![images](images/U0113.jpg)\n\n6. To set your time zone, tap `Time Zone`\
    \ and type in the name of a major city in your time zone. The iPhone will show\
    \ you matching city names as you type.\n7. When you see the correct city in your\
    \ time zone, tap it to select it. In the image here, we typed the first few letters\
    \ of “Chicago” until we saw it appear. Next, we tapped `Chicago, U.S.A.` to select\
    \ it.\n8. After selecting the city, you are brought back to the main `Date & Time`\
    \ screen with your selected city shown next to the `Time Zone` option.\n9. Tap\
    \ `Set Date & Time` to adjust your date and time.\n\n    ![images](images/U0114.jpg)\n\
    \n    ![images](images/U0115.jpg)\n\n    ![images](images/U0116.jpg)\n\n10. On\
    \ this screen you can set the date and time. To adjust the date, tap the `Date`\
    \ button shown at the top of the screen.\n11. To adjust the time, tap the `Time`\
    \ button shown at the top of the screen.\n12. You can then adjusting the date\
    \ and time by touching and sliding the `Date` and `Time` wheels up or down, as\
    \ shown in the image here.\n13. When you are done, tap the `Date & Time` button\
    \ in the upper-left corner.\n\n# Adjusting the Brightness\n\nYour iPhone has an\
    \ Auto-Brightness control available; this feature is turned on by default. This\
    \ feature uses the built-in light sensor to adjust the brightness of the screen.\
    \ When it is darker outside or at night, then the Auto-Brightness control will\
    \ dim the screen. When it is bright and sunny, the screen will be automatically\
    \ brightened, so it is easier to read. Generally, we advise that you keep this\
    \ feature set to `ON`.\n\nIf you want to adjust the brightness, use the controls\
    \ in your `Settings` app. Follow these steps to do so:\n\n1. From your `Home`\
    \ screen, touch the `Settings` icon.\n2. Touch `Brightness` and move the slider\
    \ control to adjust the brightness.\n3. Click the switch next to `Auto-Brightness`\
    \ to toggle it `ON` or `OFF`.\n\n![images](images/U0117.jpg)\n\n![images](images/U0118.jpg)\n\
    \n**TIP:** Setting the `Brightness` option to a lower value will help you save\
    \ battery life. A little less than halfway across seems to work fine.\n\n# Notifications\n\
    \nNew to iOS 5, the Notication Center introduces a better, less obtrusive, less\
    \ interruptive way to organize and handle all the phone, e-mail, SMS, Twitter,\
    \ Facebook, calendar, and other alert messages you receive during the day.\n\n\
    Notifications can appear in several ways:\n\n* As `Lock` screen info, so you can\
    \ glance at important alerts without having to unlock your phone. (This option\
    \ does sacrifice some privacy.)\n* As in-app notifications, which display as brief,\
    \ rotating alerts across the top of the screen whenever a new message is received.\n\
    * In the `Notification Center` pull-down menu, which you can access with a single\
    \ swipe anywhere, at any time, when your iPhone is unlocked.\n\n![images](images/U0119.jpg)\n\
    \nIf you’ve had an iPhone before or used an iPad or iPod touch prior to iOS 5,\
    \ then Notification Center adds to the previous options of sound/vibrate, number\
    \ badges, and pop-up alerts. Because they’re non-interruptive, alerts won’t stop\
    \ your game of `Angry Birds` or the e-mail message you’re composing, forcing you\
    \ to dismiss or open them before you can continue playing or writing. However,\
    \ you still have the option to handle things you absolutely don’t want to miss,\
    \ such as alarms."
