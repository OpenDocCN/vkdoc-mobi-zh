  trans: "\n# 同步影片\n\n点击`影片`标签页，您可选择同步特定、近期或未观看的影片，也可选择同步所有影片。\n\n要将影片从电脑同步到 iPhone，请按以下步骤操作：\n\
    \n1. 将 iPhone 连接到电脑，启动`iTunes`，然后在左侧导航栏中点击您的 iPhone。\n2. 点击主窗口顶部的`影片`标签页。\n3.\
    \ 勾选`同步影片`旁的复选框（参见图 3–8）。\n4. 如果您想同步近期或未观看的影片，请勾选`自动包含`旁的复选框，然后使用下拉菜单选择`所有`、`最近\
    \ 1 个`、`所有未观看`、`最近 5 个未观看`等选项。\n\n   ![图片](img/0308.jpg)\n\n   **图 3–8.** *配置`影片`标签页以自动同步所选内容*\n\
    \n5. 如果您选择了除`所有`以外的任何选项，则可以选择将特定影片或视频同步到 iPhone。只需勾选您想包含在同步中的影片旁的复选框即可。\n6. 完成影片选择后，点击`应用`按钮保存设置并开始同步。\n\
    \n# 同步电视节目\n\n点击`电视节目`标签页，您可选择同步特定、近期或未观看的电视节目，也可选择同步所有节目。\n\n要将电视节目从电脑同步到 iPhone，请按以下步骤操作：\n\
    \n1. 将 iPhone 连接到电脑，启动`iTunes`，然后在左侧导航栏中点击您的 iPhone。\n2. 点击主窗口顶部的`电视节目`标签页。\n\
    3. 勾选`同步电视节目`旁的复选框。\n4. 如果您想同步近期或未观看的电视节目，请勾选`自动包含`旁的复选框，然后使用下拉菜单选择`所有`、`最新 1\
    \ 个`、`所有未观看`、`最旧 5 个未观看`、`最新 10 个未观看`等选项。\n5. 在`的剧集`旁选择`所有节目`或`所选节目`。\n6. 如果您选择了`所选节目`，则可在屏幕中间的两个版块中选择特定的节目甚至特定的剧集。\n\
    7. 如果您有电视节目播放列表，可以通过勾选屏幕底部版块中的复选框来选择包含这些列表。\n8. 完成特定电视节目的选择后，点击`应用`按钮保存设置并开始同步。\n\
    \n# 同步播客\n\n点击`播客`标签页，您可选择同步特定、近期或未播放的播客，也可选择同步所有播客。\n\n**提示：** 播客是音频或视频节目，通常定期发布（例如每日、每周或每月）。在\
    \ iTunes Store 中，大多数播客均可免费订阅。当您订阅并按照本节所述设置自动同步后，您喜爱的所有播客都会传输到您的 iPhone 上。\n\n\
    许多您喜爱的广播节目都会被录制并以播客形式播出。我们建议您浏览 iTunes Store 的`播客`版块，查看可能感兴趣的节目。您会发现包括影评、新闻节目、法学院考试复习、游戏节目、老式广播节目、教育内容等在内的多种播客。\n\
    \n要将播客从电脑同步到 iPhone，请按以下步骤操作：\n\n1. 将 iPhone 连接到电脑，启动`iTunes`，然后在左侧导航栏中点击您的`iPhone`。\n\
    2. 点击主窗口顶部的`播客`标签页。\n3. 勾选`同步播客`旁的复选框。\n4. 如果您想同步近期或未播放的播客，请勾选`自动包含`旁的复选框，然后使用下拉菜单选择`所有`、`最新\
    \ 1 个`、`所有未播放`、`最新 5 个`、`最近 10 个未播放`等选项。\n5. 在`的剧集`旁选择`所有播客`或`所选播客`。\n6. 如果您选择了`所选播客`，则可在屏幕中间的两个版块中选择特定的播客甚至特定的单集。\n\
    7. 如果您有播客播放列表，可以通过勾选屏幕底部版块中的复选框来选择包含这些列表。\n8. 完成播客选择后，点击`应用`按钮保存设置并开始同步。\n\n**提示：**\
    \ 同步这些播客后，您可以通过导航到设备上`音乐`应用中的`播客`版块进行收听。\n\n# 同步 iBooks 和有声书\n\n点击`图书`标签页，您可选择同步所有或选定的图书和有声书。\n\
    \n**提示：** iPhone 上的图书是其纸质版本的电子版。它们采用一种名为`ePub`的特定电子格式。您可以在 iPhone 上的 iBookstore\
    \ 购买图书，或从其他来源获取图书，并使用此处描述的步骤将其同步到 iPhone。从其他地方获取的图书必须是无保护或“无 DRM（数字版权管理）”的，才能同步到您的\
    \ iPhone。您可以在 iPhone 上的`iBooks`应用或其他图书阅读应用中阅读这些书。请参阅第 13 章“iBooks 与电子书”了解更多信息。\n\
    \n要在电脑和 iPhone 之间同步图书或有声书，请按以下步骤操作：\n\n1. 将 iPhone 连接到电脑，启动`iTunes`，然后在左侧导航栏中点击您的`iPhone`。\n\
    2. 点击主窗口顶部的`图书`标签页。\n3. 勾选`同步图书`和`同步有声书`旁的复选框。\n4. 如果您想同步所有图书，请保持默认的`所有图书`选项不变。\n\
    5. 否则，请选择`所选图书`，然后通过勾选窗口中的特定图书进行选择。\n\n   **提示：** 为了将 iBooks、PDF 文件及其他类似文档同步到您的\
    \ iPhone，您需要先将文件从电脑拖放到您的 iTunes 资料库中。从电脑的任意文件夹中抓取文件，直接拖放到`iTunes`左上角栏目的资料库中即可。\n\
    \n6. 如果您想同步所有有声书，请保持默认的`所有有声书`选项不变。\n7. 否则，请选择`所选有声书`，然后通过勾选此选项下方窗口中的特定有声书进行选择。\n\
    8. 完成特定图书和有声书的选择后，点击`应用`按钮保存设置并开始同步。\n\n**提示：** 同步这些图书后，您可以在设备上的`iBooks`应用中阅读。您可以在`音乐`应用中收听有声书，其左侧有`有声书`标签页。\n\
    \n**注意：** 来自 Audible 的有声书，需要您先使用您的 Audible 帐户授权您的电脑，然后才能将其从电脑同步到您的 iPhone。\n"
- fmt: "# Sync Photos\n\nWhen you click the **Photos** tab, you can choose to sync\
    \ photos from all folders or selected folders, and you can even include videos.\n\
    \n**TIP:** You can create a beautiful electronic picture frame and share your\
    \ photos on the iPhone’s stunning screen (see [Chapter: 20](#Chapter20.html#ch20):\
    \ “Working with Photos”). You can even use your photos to set the background wallpaper\
    \ and screen-lock wallpaper—see [Chapter 8](#Chapter08.html#ch8): “Personalize\
    \ and Secure” for more information.\n\nTo sync photos from your computer to your\
    \ iPhone, follow these steps:\n\n1. Connect your iPhone to your computer, start\
    \ **iTunes**, and click your iPhone in the left nav bar.\n\n   **TIP:** Mac users\
    \ can also sync photos using various criteria in **iPhoto**, including Events\
    \ (time-based sync), Faces (person-based sync), and Places (location-based sync).\n\
    \n2. Click the **Photos** tab on the top of the main window.\n3. Check the box\
    \ next to **Sync Photos from**.\n4. Click the pull-down menu next to **Sync Photos\
    \ from** and select a folder from your computer where your photos are stored.\
    \ If you want to grab all your photos, go to the highest folder level possible\
    \ (e.g., **C:** on your Windows computer or your hard disk root directory “**/**”\
    \ on your Apple Mac).\n5. If you’d like to sync all photos from the selected folder\
    \ on your computer, select **All folders**.\n\n   **CAUTION:** Because your photo\
    \ library on your computer may be too large to fit on your iPhone, be careful\
    \ about checking **All folders**.\n\n6. Otherwise, choose **Selected folders**\
    \ and make your choices by checking specific folders in the window below.\n7.\
    \ You can also include any videos in the folders by checking the box next to **Include\
    \ videos**.\n8. When you are done choosing your photos to sync, click the **Apply**\
    \ button to save your settings and start the sync.\n9. When the sync starts, you’ll\
    \ see the status in the middle-top status window in **iTunes**.\n\n## Troubleshooting\
    \ iTunes and the Sync\n\nSometimes **iTunes** does not behave exactly as you’d\
    \ expect it to, so here are a few simple troubleshooting tips.\n\n### Check Out\
    \ the Apple Knowledgebase for Helpful Articles\n\nThe first step when you’re having\
    \ a problem is to check out Apple’s support pages, where you’ll find lots of helpful\
    \ information. On your iPhone or computer’s web browser, go to this web page:\n\
    \n`www.apple.com/support/iPhone/`\n\nNext, click a topic shown in the left nav\
    \ bar.\n\n### iTunes Locked Up and Will Not Respond (Windows Computer)\n\nSometimes,\
    \ **iTunes** will lock up and be completely unresponsive. Follow these steps if\
    \ this happens on a Windows computer:\n\n1. Bring up the **Windows Task Manager**\
    \ by simultaneously pressing **Ctrl** + **Alt** + **Del** keys on your keyboard.\
    \ The **Task Manager** should look something like [Figure 3–9](#Chapter03.html#fig_3_9).\n\
    \n   ![images](images/0309.jpg)\n\n   **Figure 3–9.** *Locating `iTunes.exe` in\
    \ the **Windows Task Manager**, so you can terminate it*\n\n2. To end the process,\
    \ click **End process** from the pop-up window.\n3. Now, **iTunes** should be\
    \ forced to close.\n4. Try restarting **iTunes**.\n5. If **iTunes** will not start\
    \ or locks up again, then reboot your computer and try again.\n\n### iTunes Locked\
    \ Up and Will Not Respond (Mac Computer)\n\nIf you’re using a Mac, then follow\
    \ these steps if the **iTunes** app locks up and is completely unresponsive:\n\
    \n**TIP:** Pressing **Command** + **Option** + **Escape** is the shortcut to bring\
    \ up the **Force Quit Applications** window (see [Figure 3–10](#Chapter03.html#fig_3_10)).\n\
    \n1. Click the **iTunes** menu at the top.\n2. Click **Quit iTunes**.\n3. If that\
    \ doesn’t work, go to any other program and click the small **Apple** logo in\
    \ the upper left corner of your Mac.\n4. Click **Force Quit** and the list of\
    \ running programs will be displayed.\n5. Highlight **iTunes** and click the **Force\
    \ Quit** button.\n6. If this does not help, try restarting your Mac.\n\n![images](images/0310.jpg)\n\
    \n**Figure 3–10.** *The **Force Quit Applications** window on Mac computers*\n\
    \n## Updating Your iPhone Operating System\n\nWith iOS5 you can now update your\
    \ iPhone operating system on-device. There are faster, more efficient update methods\
    \ for doing this, and we recommend you use them whenever possible. If you need\
    \ to re-install the entire OS, however, or want to upgrade via **iTunes** instead,\
    \ this section will explain how to do so.\n\n**NOTE:** Do this update when you\
    \ won’t mind being without your iPhone for 30 minutes or more, depending on the\
    \ amount of information on your iPhone and the speed of your computer and Internet\
    \ connection.\n\nNormally, **iTunes** will automatically check for updates on\
    \ a set schedule, about every two weeks. If no update is found, **iTunes** will\
    \ tell you when it will check for another update. Follow these steps to use **iTunes**\
    \ to manually update your iPhone:\n\n1. Start **iTunes**.\n2. Connect your iPhone\
    \ to your computer.\n3. Click your iPhone listed under **DEVICES** in the left\
    \ nav bar.\n4. Click the **Summary** tab in the top nav bar.\n5. Click the **Check\
    \ for Update** button in the center of the screen in the **Version** section.\n\
    6. If you have the latest version, you’ll see a pop-up window saying something\
    \ like this: “This version of the iPhone software (5.0) is the current version.”\
    \ Click **OK** to close the window. You are done with the update process.\n7.\
    \ If you don’t have the latest version of **iTunes**, a window will tell you a\
    \ new version is available and ask if you would like to update. Click **Yes**\
    \ or **Update** to do so.\n8. **iTunes** will take you through a few screens that\
    \ describe the update and ask you to agree to the software license. If you agree,\
    \ click **Next** and **Agree** to download the latest iOS software from Apple.\
    \ This will take about five to ten minutes.\n\n   **TIP:** We show you all the\
    \ screens you might see in this update process in the “Reinstalling the iPhone\
    \ Operating System” section of [Chapter 26](#Chapter26.html#ch26): “Troubleshooting.”\n\
    \n9. Next, **iTunes** will back up your iPhone, a process that might take ten\
    \ minutes or more if your iPhone is filled with data.\n10. Now the new iOS will\
    \ be installed, and your iPhone will be erased.\n11. Finally, you’ll be shown\
    \ a screen asking you to do one of the following:\n\n    1. **Set up as a new\
    \ iPhone:** Choose this if you want to erase all your data after the update process.\n\
    \    2. **Restore from the backup of:** Choose this to make sure you select the\
    \ correct backup file (usually the most recent one).\n\n    At this point, your\
    \ iPhone will be restored or set up as selected.\n\n12. If you have locked your\
    \ SIM card, then you will need to enter the four-digit PIN code required to unlock\
    \ it.\n\n    **CAUTION:** If you have locked your SIM card, then you will need\
    \ to enter the four-digit unlock code after the update is installed. If you’ve\
    \ forgotten the SIM unlock code, then you can use the PUK code to unlock the SIM\
    \ (you need to get that from your wireless carrier). See the “Setting Security\
    \ on Your SIM Card” section in [Chapter 9](#Chapter09.html#ch9): “Using the Phone”\
    \ for more information.\n\n13. Your iPhone OS update is complete.\n\n## Other\
    \ Sync Methods\n\nYou can navigate to the **Mail**, **Contacts**, **Calendar**\
    \ app in your **Settings** app on your iPhone to set up and use Exchange. The\
    \ next section will explain how to do so."
