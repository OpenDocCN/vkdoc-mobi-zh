  trans: "\n#### 免费但更具挑战性的铃声制作方法\n\n我们先来了解这种免费但较为复杂的方法。此方法适用于 iTunes 中所有不受 DRM（数字版权管理）保护的音乐。较早从\
    \ iTunes 购买的音乐可能包含 DRM 保护。而从 CD 或其他非 DRM 音乐（包括 iTunes 中较新的非 DRM 音乐）导入 iTunes 的任何音乐均可使用。\n\
    \n##### 定位歌曲\n\n请按照以下步骤在 iTunes 中高亮并选择一首歌曲，作为自定义铃声的基础：\n\n1. 在**iTunes**菜单中，选择**文件**\
    \ ![images](img/rtrif.jpg) **显示简介**。您也可以右键点击歌曲，然后选择**显示简介**。\n2. 点击**选项**选项卡，勾选**起始时间：**和**停止时间：**复选框。\n\
    \n   ![images](img/U0962.jpg)\n\n   **注意：**确保总时长小于 40 秒；否则铃声文件会过大。\n\n3. 点击**好**关闭**显示简介**对话框。\n\
    \n   ![images](img/U0963.jpg)\n\n4. 在**iTunes**中，点击**高级**菜单，选择**创建 AAC 版本**。\n\
    5. 此时您应能在 iTunes 列表中看到一个仅有几秒钟长的歌曲新版本。例如，**丹尼尔**的新版本只有 30 秒长。\n\n   ![images](img/U0964.jpg)\n\
    \n6. 获得新的 30 秒版本后，务必返回原始歌曲，通过**显示简介** ![images](img/rtrif.jpg) **选项**取消勾选**起始时间：**和**停止时间：**复选框。\n\
    \n   ![images](img/U0965.jpg)\n\n7. 创建好新的较短铃声 AAC 版本后，只需将其从**iTunes**拖拽至桌面，或复制粘贴到桌面上即可。\n\
    \n   ![images](img/U0966.jpg)\n\n8. 您需要将文件的扩展名从`m4a`改为`m4r`，这样才能被识别为铃声。您可以点击文件高亮其名称来修改，也可以右键点击文件，选择**显示简介**，然后更改扩展名。\n\
    \n   ![images](img/U0967.jpg)\n\n9. 系统会显示警告信息，提示该文件可能无法使用；只需接受更改即可。\n10. 现在必须删除仍在\
    \ iTunes 中的 30 秒版本。\n\n    ![images](img/U0968.jpg)\n\n11. 将带有新扩展名`m4r`的文件拖回 iTunes\
    \ 资料库并放入其中。\n12. 如果一切顺利，当您点击左侧栏中的**铃声**时，应该就能看到您的铃声了。\n\n#### 将铃声同步到 iPhone\n\n\
    请参阅第 3 章：“与 iCloud、iTunes 及其他服务同步”中的“同步铃声”部分，了解如何将新铃声传输到您的 iPhone 上。\n\n#### 使用您的新自定义铃声\n\
    \n如果您想将铃声与**通讯录**列表中的特定联系人关联，则需要编辑该联系人。请按照本章“为联系人设置专属铃声”部分中的步骤进行操作。如果您想将新铃声用作手机主铃声，请按照第\
    \ 8 章：“个性化与安全”中“声音”部分的步骤操作。\n\n## 第 10 章\n\n## 短信、彩信和 iMessage\n\n`SMS`代表*短信服务*，但通常也被称为*文本信息*。短信是快速与他人取得联系的好方法，而无需通过语音通话打扰对方。有时，在无法或难以进行语音通话时，您可以发送短信并收到回复。\n\
    \n![images](img/U1001.jpg)\n\n`MMS`是*多媒体信息服务*的缩写，它提供了一种快速、标准的方式，用于发送图片、视频、语音备忘录、地图位置和名片。\n\
    \n`iMessage`是苹果公司的新服务，其功能与`SMS`和`MMS`完全相同，但通过您的数据套餐运行，且仅适用于其他 iOS 5 设备。\n\n所有这些服务都可以在您\
    \ iPhone 的**信息**应用程序中找到。在本章中，您将学习如何使用这些服务，从**通讯录**应用程序发送文本信息，以及从**照片**应用程序发送图片信息。\n\
    \n### 短信/彩信与 iMessage 的对比\n\n在 iOS 5 中，苹果将`iMessage`服务直接整合到了始终处理`SMS`和`MMS`信息的同一款**信息**应用程序中。\n\
    \n`iMessage`的优势在于它使用您现有的数据套餐，因此无需额外购买可能价格不菲的短信套餐。如果您没有短信套餐，或在没有漫游套餐的情况下旅行，`iMessage`也不会让您承担高昂的按条计费。\n\
    \n`iMessage`的缺点在于它仅适用于其他 iOS 5 设备，因此您无法与使用黑莓等非苹果智能手机或普通功能手机的朋友或家人使用该服务。\n\n`SMS`、`MMS`和`iMessage`都集成在同一个**信息**应用程序中，因此设置完成后，您无需担心必须使用哪一种。您的\
    \ iPhone 会尽可能自动使用`iMessage`，但在`iMessage`不可用时（例如，当您与不在 iOS 5 设备上的联系人发信息时），则会回退到使用`SMS`和`MMS`。\n\
    \n### iMessage 算作短信还是数据流量？\n\n`iMessages`通过运营商的移动数据网络发送，而非其`SMS`通道，因此这些信息不计入您的`SMS/MMS`套餐（如果您有有限套餐）。相反，它们会消耗您的数据套餐额度（如果您有有限数据套餐）。\n\
    \n如果您向未使用运行 iOS 5 的 iPhone、iPod touch 或 iPad 的联系人发送信息，则该信息会通过`SMS/MMS`发送，并计入您的短信套餐。\n\
    \n### 信息将如何发送？\n\n您可能拥有有限的短信条数，希望尽可能使用`iMessage`服务。或者，您可能拥有有限的数据流量，希望尽可能使用`SMS/MMS`。无论哪种情况，苹果都让您轻松辨别将使用哪个系统：\n\
    \n- 如果`iMessage`可用，从联系人姓名的背景到包含信息的气泡都将显示为**蓝色**，文本输入框会显示“iMessage”。\n- 如果`iMessage`关闭或不可用，从联系人姓名的背景到包含信息的气泡都将显示为**绿色**，文本输入框会显示“文本信息”。\n\
    \n### 启用 iMessage 并调整设置\n\n设置`iMessage`服务与设置**FaceTime**类似：\n\n1. **启动设置。**\n\n\
    \   ![images](img/U1002.jpg)\n\n2. **轻点“信息”。**\n3. **将 iMessage 开关滑到“打开”**\n4.\
    \ 随后系统可能会要求您输入`iMessage`密码——这实际上就是您的苹果 iTunes 密码。\n\n**提示：**如果您卡在如所示的**正在等待激活**信息界面，请尝试按照第\
    \ 26 章：故障排除中的方法重启您的设备。\n\n一旦您启用了`iMessages`选项，您的 iPhone 手机号码**和电子邮件地址**将在`iMessage`服务中注册，从其他\
    \ iOS 5 设备发送到您手机的任何信息都将通过`iMessage`发送。\n\n如果您轻点`iMessage`设置屏幕底部的**接收方式**，您将看到一个类似这样的屏幕。\n\
    \n![images](img/U1003.jpg)\n\n在此屏幕上，您可以调整与您的`iMessage`关联的电子邮件地址，添加新的电子邮件地址，并更改`iMessage`的“来电显示”中显示的内容。\n"
- fmt: "### Text Messaging on Your iPhone\n\nText messaging has become one of the\
    \ most popular services on cell phones today. While it is still used more extensively\
    \ in Europe and Asia, it is growing in popularity in North America.\n\nThe concept\
    \ is very simple: instead of placing a phone call, you send a short message to\
    \ someone's handset. Sending a text message is much less disruptive than making\
    \ a phone call; however, you may have friends, colleagues, or co-workers who do\
    \ not own an iPhone, so e-mail may not be an option.\n\nOne of this book's authors\
    \ uses text messaging with his children all the time—this is how his generation\
    \ communicates. “R u coming home 4 dinner?” “Yup.” There you have it—meaningful\
    \ dialogue with an eighteen-year-old—short, instant, and easy.\n\n#### Composing\
    \ Text Messages\n\nComposing a message is much like sending an e-mail. The beauty\
    \ of a text message is that it arrives on virtually any handset, and it is quite\
    \ simple to reply to.\n\n#### Composing a Text Message from the Messages App\n\
    \nThere are a couple of ways to start your `Messages` app. The easiest is to just\
    \ tap the `Messages` icon on the `Home` screen.\n\nWhen you first start the `Messages`\
    \ app, you most likely won't have any messages, so the screen will be blank. Once\
    \ you get started with SMS messaging, you will have a list of messages and current\
    \ “open” discussions with your contacts. Follow these steps to send a text message:\n\
    \n![images](images/U1004.jpg)\n\n1.  Touch the `Compose` icon in the top-right\
    \ corner of the screen.\n\n    ![images](images/U1005.jpg)\n\n2.  The cursor will\
    \ immediately go to the `To:` line. You can start typing the name of your contact,\
    \ or you can just touch the `Plus` (`+`) button and search or scroll through your\
    \ contacts.\n3.  If you want to just type someone's mobile phone number, then\
    \ press the `123` button and dial the number.\n\n    ![images](images/U1006.jpg)\n\
    \n    ![images](images/U1006a.jpg)\n\n4.  When you find the contact you wish to\
    \ use, touch the person's name and it will appear in the `To:` line.\n5.  When\
    \ you are ready to type the SMS message, touch anywhere in the box in the middle\
    \ of the screen (next to the `send` button).\n\n    ![images](images/U1008.jpg)\n\
    \n6.  The keyboard will be displayed. Just type in your message and touch `send`\
    \ when you are done.\n\n    **NOTE**: A character counter will appear if you have\
    \ enabled it in `settings` > `Messages`.\n\n**TIP**: If you prefer, you can use\
    \ the larger landscape keyboard for sending text messages. It can be easier to\
    \ type with the larger keys, especially when your fingers are a little larger\
    \ or it is hard to see the smaller keys.\n\n#### Options After Sending a Text\n\
    \nOnce you send the text, the window changes to a *threaded* discussion window\
    \ between you and your contact. If you're using SMS, the text that you sent is\
    \ shown in a green bubble on the right side of the screen. If you're using iMessage,\
    \ the text that you sent appears in a blue bubble. When your contact replies,\
    \ his message will appear on the opposite side of the screen in a gray bubble.\n\
    \n![images](images/U1009.jpg)\n\nTo leave the `Compose` screen, tap `Messages`\
    \ in the upper-left corner or click the `Home` button to go back to your `Home`\
    \ screen.\n\n**NOTE:** if the message fails to send, you'll see an exclamation\
    \ mark beside it. You'll also see a `Red Exclamation Point` icon in the upper-right\
    \ corner of the icon for the `Messages` app.\n\n![images](images/U1010.jpg)\n\n\
    If this happens, you can send another text, just as you did before. Or you can\
    \ call the contact or view his contact info.\n\nTo initiate a call to the contact\
    \ with whom you are texting, touch the `Call` button. To look at his contact info,\
    \ touch the `Contact Info` button.\n\n![images](images/U1012.jpg)\n\n**TIP:**\
    \ while SMS messages are technically limited to 160 characters, many GSM carriers\
    \ (including AT&T) will break longer texts into several messages and then reassemble\
    \ them back into one message when they're received. CDMA networks like Verizon\
    \ sometimes have a problem reassembling texts that are longer than 160 characters;\
    \ other times, they can deliver them out of order. If you experience this problem,\
    \ try breaking your texts up on your own and sending several shorter messages\
    \ rather than one long one.\n\n#### Composing a Text Message from Contacts\n\n\
    You also have the ability to start the `SMS` app and compose an SMS message to\
    \ any contact in your iPhone. Follow these steps to do so:\n\n1.  Find the contact\
    \ you wish to text by searching or scrolling through `Contacts`.\n\n    ![images](images/U1013.jpg)\n\
    \n2.  At the very bottom of the contact info, you will see a box that says `Text\
    \ Message`. Just touch that box and you will be prompted to choose which number\
    \ to use (if you have more than one number listed for the contact).\n3.  Choose\
    \ the preferred number and follow the steps listed previously.\n\n**NOTE:** Remember\
    \ that you can only send SMS messages to a mobile number.\n\n#### Replying to\
    \ a Text Message\n\nWhen a text message is received, your iPhone will play an\
    \ indicator tone, vibrate, or both—depending on your settings. Also, an indicator\
    \ will appear in `Notification Center` at the top of the screen, giving you the\
    \ option of replying right away.\n\n![images](images/U1014.jpg)\n\nWhen you see\
    \ and/or hear the indicator, just tap the notification to go to the `Messages`\
    \ app and type your response, as shown previously.\n\nIf you miss the notification\
    \ or want to reply later, just pull down the `Notification Center` list from the\
    \ top, and then tap the message you want to reply to.\n\n**NOTE**: If your screen\
    \ is locked, you will see the message as either a popup or as part of the `Lock`\
    \ screen list. Just slide the `Messages` icon to unlock and you'll be taken to\
    \ the message.\n\n![images](images/U1015.jpg)\n\n#### Viewing Stored Messages\n\
    \nOnce you begin a few threaded messages, they will be stored in the `Messages`\
    \ app. Touch the `Messages` icon and you can scroll through your message threads.\n\
    \n![images](images/U1016.jpg)\n\nTo continue a conversation with someone, just\
    \ touch the desired thread and it will open up, showing you the back and forth\
    \ of all past messages. Touch the text box, type in your message, and then touch\
    \ the `send` button to continue the conversation.\n\n![images](images/U1017.jpg)\n\
    \n#### Text Tone and Sound Options\n\nYour iPhone lets you dictate how it will\
    \ react when a message comes in. Follow these steps to choose your preferred reaction:\n\
    \n1.  Start your `settings` app, scroll to `sounds`, and tap the `sounds` tab.\n\
    \n    ![images](images/U1018.jpg)\n\n2.  If you have the `Vibrate` feature set\
    \ to `ON` in the `sounds` menu when the phone rings (see [Chapter 10](#Chapter10.html#ch10):\
    \ “Your iPhone as a Phone”), you will also receive a vibration when an SMS message\
    \ comes.\n3.  Scroll down a bit further and you will see a tab that says `Text\
    \ Tone`. Tap this and you can choose the tone for the SMS message. You are limited\
    \ to the choices offered (usually six), or you can choose `None`.\n\n    ![images](images/U1019.jpg)\n\
    \n4.  Choose your preferred sound for an SMS message notification and then touch\
    \ the `sounds` ![images](images/U1019a.jpg) button in the top-left corner to set\
    \ your selection.\n\n    ![images](images/U1020.jpg)\n\n### MMS—Multimedia Messaging\
    \ Service\n\nThe `Messages` app gives iPhone users the tools required to send\
    \ and receive MMS messages—including picture messages and video messages, as well\
    \ as multimedia iMessages. MMS messages appear right in the messaging window,\
    \ just like your text messages.\n\n**NOTE**: You can send image, video, location\
    \ (from maps), audio (from the `Voice Memo` app), and vCard (from the `Contacts`\
    \ app) files from the `Messages` app."
