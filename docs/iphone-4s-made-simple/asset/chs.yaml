- "# 第 6 章\n\n## 图标与文件夹\n\n你的新 iPhone 非常个性化。在本章中，我们将向你展示如何移动图标，并将你最喜欢的图标放在你想要的位置。你最多可以有\
  \ 11 页图标可供使用，并且你可以调整这些页面的外观，使其反映你的品味。\n\n与 Mac 电脑或 iPad 一样，iPhone 有一个*底部程序坞*，你可以将最喜欢应用的图标放在里面。iPhone\
  \ 出厂时底部程序坞中有四个标准图标。你可以用最喜欢应用的图标替换这些默认图标，这样它们就始终位于屏幕底部。你甚至可以将整个应用文件夹移动到底部程序坞。\n\n\
  **提示**：你也可以使用电脑上的`iTunes`应用来移动或删除图标。请参阅第 22 章：`设备上的 iTunes`以获取更多信息。\n\n### 将图标移至底部程序坞\n\
  \n当你打开 iPhone 时，会注意到底部程序坞中锁定着四个图标。\n\n假设你决定要用自己更常用的应用来替换其中的一个或多个图标。幸运的是，将图标移入或移出底部程序坞非常简单。\n\
  \n![images](img/U0601.jpg)\n\n#### 开始移动\n\n按下`主屏幕`按钮进入你的`主屏幕`。然后触摸并按住`主屏幕`上的任意图标几秒钟。你会注意到所有图标都开始晃动。\n\
  \n先试着移动几个图标。你会看到，当你将一个图标向下移动时，该行中的其他图标会移动为其腾出空间。\n\n一旦你掌握了图标移动的方法，就可以准备替换底部程序坞中的一个图标了。在图标晃动时，将你想从底部程序坞替换的图标向上移动到一个被其他图标覆盖的区域。（如果你将其移动到一个空白区域，它只会直接跳回底部程序坞）。\n\
  \n**注意**：底部程序坞中最多可以放置四个图标；所以，如果那里已经有四个图标，你必须移除一个才能用新图标替换它。\n\n例如，假设你想用`Skype`图标替换我们例子中的`App\
  \ Store`图标，因为你希望随时方便地用`Skype`与在外上大学的孩子通话。首先要做的是从底部程序坞中移除`App Store`图标，以便腾出空间，如图\
  \ 6–1 所示。\n\n![images](img/0601.jpg)\n\n**图 6–1.** *在底部程序坞中交换图标*\n\n接下来，找到你的`Skype`图标并将其向下移动到底部程序坞。你会看到，在你实际将其放置到位之前，该图标会变成半透明状态。\n\
  \n当你确定图标已经放到了你想要的位置后，只需按一次`主屏幕`按钮，图标就会锁定到位。此时，底部程序坞中就有了`Skype`图标，你可以轻松地开始与上大学的孩子们进行视频通话。\n\
  \n### 将图标移动到不同的图标页面\n\niPhone 每页可以容纳 16 个图标（不包括程序坞）。你可以通过在`主屏幕`上滑动（从右向左）来浏览这些页面。有了这么多炫酷的应用，拥有五页、六页甚至更多页图标是很常见的。如果你有冒险精神，最多可以装满\
  \ 11 页图标！\n\n**注意**：你也可以通过在任何屏幕（`主屏幕`除外）上从左向右滑动来导航到新页面。在`主屏幕`上，从左向右滑动会进入`聚焦搜索`；请参阅第\
  \ 2 章：`键入、复制与搜索`以获取更多信息。\n\n你可能在第一页有一个很少使用的图标，想把它移到最后面的一页。或者你可能想将一个常用图标从最后一页移到第一页。这两项任务都非常简单；实际上，这与将图标移到底部程序坞非常相似：\n\
  \n1. 触摸并按住任意图标以启动移动过程。\n2. 触摸并按住你要移动的图标。例如，假设我们要将`iBooks`图标移动到第一页（见图 6–2）。\n\n \
  \   ![images](img/0602.jpg)\n\n    **图 6–2.** *将图标从一页移动到另一页*\n\n3. 现在将图标拖放到另一个页面。为此，触摸并按住`iBooks`图标并将其向左拖动。你会看到你的所有图标页面依次滑过。当你到达第一页时，只需松开图标，它现在就被放置在开头位置。\n\
  4. 按下`主屏幕`按钮以完成移动并停止图标晃动。\n\n\n### 删除图标\n\n请注意——删除图标和移动图标一样简单。当你删除 iPhone 上的图标时，实际上是在删除它所代表的程序。这意味着除非重新安装或重新下载，否则你将无法再次使用该程序。\n\
  \n根据你在`iTunes`应用中的“应用同步”设置，该程序可能仍会保留在 iTunes 的“应用”文件夹中。在这种情况下，你只需在 iTunes 的同步应用列表中勾选该应用，即可重新安装被删除的应用。\n\
  \n如图 6-3 所示，删除图标的过程与移动图标类似。长按任意图标即可启动删除流程。和之前一样，长按会使图标抖动，并允许你移动或删除它们。\n\n**注意**：你只能删除已下载到\
  \ iPhone 上的程序；预装的图标及其关联程序无法删除。你可以通过查看图标左上角是否有黑色小`x`来判断哪些程序可以删除。\n\n只需点击你想要删除的图标上的`x`。系统会提示你选择`删除`图标或`取消`删除请求。如果你点击`删除`，该图标及其关联应用将从\
  \ iPhone 上移除。\n\n**注意**：如果你删除一个游戏等记录了进度的图标，删除该游戏时你的进度也会被清除。\n\n![images](img/0603.jpg)\n\
  \n**图 6-3.** *删除图标及其关联程序*\n\n### 重置所有图标位置（恢复出厂默认设置）\n\n有时，你可能会想恢复到原始的出厂默认图标设置。比如当你将太多新图标移到第一页，又想重新看到所有基础图标时。\n\
  \n操作方法是：点击`设置`图标。接着点击`通用`，最后滚动到底部点击`还原`。\n\n![images](img/U0602.jpg)\n\n**注意**：内置应用将恢复到苹果出厂时\
  \ iPhone 上的排列顺序。\n\n在`还原`界面中，点击靠近底部的`还原主屏幕布局`。现在所有图标将恢复到原始设置。\n\n**警告**：请注意不要误触其他`还原`选项，因为按错按钮可能会意外擦除整个\
  \ iPhone。如果发生这种情况，你将需要从 iTunes 备份中恢复数据。\n\n![images](img/U0603.jpg)\n\n### 使用文件夹\n\
  \n你的 iPhone 允许你将应用整理到文件夹中。当你下载新应用时，它们会占据`主屏幕`上的一个位置。一旦下载了大量应用，查找应用和保持其有序就会变得困难。\n\
  \n使用文件夹可以将你的游戏、办公应用以及其他功能相似的应用归类存放。每个文件夹最多可容纳 12 个应用——这能极大地帮助你整理 iPhone！\n\n![images](img/U0604.jpg)\n\
  \n#### 创建文件夹\n\n创建文件夹直观又有趣：\n\n1.  按住某个应用，直到所有应用开始抖动（与之前在“移动图标”部分中的操作相同）。\n2.  将一个应用拖拽到另一个功能相似的应用上。例如，将一个办公应用拖到另一个类似的应用上。iPhone\
  \ 会先为文件夹创建一个名称。\n3.  在本例中，我们将三个苹果办公应用（`Numbers`、`Keynote`和`Pages`）互相拖拽叠加，iPhone\
  \ 创建了一个名为“Productivity”的文件夹。\n4.  你可以通过点击`名称`字段并输入新名称来编辑文件夹名称（参见图 6-4）。\n5.  按下`主屏幕`按钮以设置新的文件夹名称。\n\
  6.  再次按下`主屏幕`按钮返回`主屏幕`界面。此时，你将看到带有新名称的新文件夹。\n\n**注意**：每个文件夹最多可放置 12 个应用图标。如果你尝试放入更多图标，会看到新图标不断被“挤出”文件夹。这种动画效果表示文件夹已满。\n\
  \n![images](img/0604.jpg)\n\n**图 6-4.** *移动图标以创建文件夹并重命名*\n\n#### 移动文件夹\n\n与应用一样，文件夹也可以从一个`主屏幕`页面移动到另一个页面：\n\
  \n1.  长按一个文件夹，直到`主屏幕`上的文件夹和图标开始抖动。\n2.  按住文件夹并将其拖拽到你想要的位置（或另一个`主屏幕`页面），然后松开手指。\n\
  3.  当文件夹位于所需位置后，只需按下`主屏幕`按钮即可完成移动。\n\n**提示**：如果你愿意，甚至可以将文件夹移动到底部程序坞。这是一种非常方便的方式，可以让你轻松访问大量应用（参见图\
  \ 6-5）。\n\n![images](img/0605.jpg)\n\n**图 6-5.** *将文件夹移动到底部程序坞*\n\n"
- "# 第 7 章\n\n## 多任务处理与 Siri\n\n在本章中，我们将介绍如何在 iPhone 上进行多任务处理以及在应用间快速切换。多任务处理意味着你可以在做其他事情的同时，让某个应用在后台运行，例如播放网络广播、收听逐向导航，或接听\
  \ Skype 电话。\n\n我们还将向你介绍苹果革命性的 Siri 服务，这是一个人工智能“助手”，它可以听取你的语音指令，发送信息、预约日程，并在你需要时搜索相关信息。\n\
  \n### 快速应用切换\n\n*快速应用切换器*允许你让多个应用在后台运行。它还能让你在不停止当前应用的情况下，切换到另一个应用。\n\n你可能想知道何时适合使用快速应用切换器。以下是你可能需要在\
  \ iPhone 上使用多任务处理的几个场景：\n\n*   从一个应用（`邮件`）复制粘贴内容到另一个应用（`日历`）。\n*   在玩游戏时接听电话或回复`短信`，然后无缝跳回游戏。\n\
  *   在检查电子邮件或浏览网页的同时，继续收听网络广播（如`Pandora`或`Slacker`）。\n*   无需等待照片上传到 Facebook 或 Flickr；照片可以在后台上传，而你则在\
  \ iPhone 上做其他事情。\n*   使用`Skype`拨打电话——现在可以让它在后台运行以接听来电（此前无法实现）。\n\n#### 在应用间切换\n\n\
  要进行多任务处理，你需要调出屏幕底部的快速应用切换器栏。\n\n1.  从任何应用甚至主屏幕，双击主屏幕按钮，调出屏幕底部的快速应用切换器栏。\n\n    ![images](img/U0701.jpg)\n\
  \n2.  所有打开的应用都会显示在快速应用切换器栏上。\n3.  向右或向左滑动找到你想要的应用，然后轻点它。\n4.  如果你在快速应用切换器栏上看不到想要的应用，请按下主屏幕按钮并从主屏幕启动它。\n\
  5.  再次双击`主屏幕`按钮，然后轻点你刚刚离开的应用即可跳回。\n\n![images](img/U0702.jpg)\n\n\n\n### 从快速应用切换栏中关闭应用\n\
  \niPhone 会自动管理内存，让正在执行有用操作（如播放流媒体音乐）的应用保持开启，并将闲置的应用置于“休眠”状态，从而避免它们占用内存或处理器资源。但有时，某个异常进程可能导致应用无法正常关闭；另一些时候，你可能希望确保\
  \ GPS 或 VoIP 应用提前关闭以节省电量。在这些情况下，你可以使用快速应用切换栏手动关闭应用。\n\n内置应用如 `Mail` 和 `Phone` 会立即重新启动，因此你不会错过任何重要信息。从\
  \ App Store 下载的应用和游戏则会保持关闭状态，直到你再次点击它们的图标启动。请按照以下步骤从 `快速应用切换栏` 中关闭应用：\n\n1.  双击\
  \ `Home` 按钮，调出`快速应用切换栏`。\n2.  长按 `快速应用切换栏` 中的任意图标，直到所有图标开始晃动。你会注意到每个应用图标的左上角会出现一个带减号的红色`圆形`图标。\n\
  3.  点击红色`圆形`图标 ![images](img/U0704.jpg) 以完全关闭应用。\n4.  继续点击红色`圆形`图标，关闭任意多个你想要关闭的应用。\n\
  \n![images](img/U0703.jpg)\n\n### 媒体控制与竖屏方向锁定\n\n在 `快速应用切换栏`上从左向右滑动，将会调出媒体控制和`竖屏方向锁定`图标。请按照以下步骤访问这些控制选项并使用竖屏方向锁定功能：\n\
  \n1.  在任何应用中，甚至在`主屏幕`上，双击`Home`按钮，调出屏幕底部的`快速应用切换栏`。\n2.  从左向右滑动，即可看到媒体控制和`竖屏方向锁定`图标。\n\
  3.  点击`竖屏方向锁定`图标，将屏幕锁定为竖屏（即垂直）方向。即使你将 iPhone 侧放，它也会保持此方向。当你在按钮内部看到一个`锁定`图标，并且在顶部状态栏中也看到一个`锁定`图标时，即表示手机已锁定。\
  \ ![images](img/U0706.jpg)\n4.  当前正在播放的媒体名称会显示在屏幕底部。\n\n    ![images](img/U0705.jpg)\n\
  \n5.  你也可以使用中间的`上一曲`、`播放/暂停`和`下一曲`按钮。如果长按`上一曲`或`下一曲`按钮，它们会分别变为`快退`或`快进`按钮。\n6. \
  \ 或者，你可以点击`应用`图标，跳转到你 iPhone 上最后播放音乐的应用。\n\n### 音量控制与 AirPlay\n\n如果在 `快速应用切换栏`上尽可能向左滑动，你会找到音量控制和\
  \ `AirPlay` 按钮。请按照以下步骤操作这些控制选项：\n\n1.  在任何应用中，甚至在`主屏幕`上，双击`Home`按钮，调出屏幕底部的`快速应用切换栏`。\n\
  2.  从左向右滑动，经过媒体控制，直到你看到音量控制和 `AirPlay` 按钮。\n3.  点击 `AirPlay` 按钮，可以将 iPhone 的音频传输到兼容\
  \ `AirPlay` 的扬声器，将视频传输到 Apple TV，或在 Apple TV 上镜像你的应用。\n4.  向左滑动`音量`控制滑块可降低音量；向右滑动可提高音量。\n\
  \n![images](img/U0707.jpg)\n\n### Siri：你的虚拟助理\n\nSiri 是一个具备情境和关系感知能力的人工智能虚拟个人助理。这意味着你可以向\
  \ Siri 提问，它不仅能回答你的问题，还能为你做各种事情，比如告诉你妻子你会迟到，15 分钟后叫醒小憩的你，建议你出门带雨衣，帮你找喝咖啡的地方，或者告诉你最喜欢的电影主演是谁。Siri\
  \ 既不是魔法也不是科幻，但苹果赋予了它个性，因此它常常让人觉得两者兼而有之。\n\n**注意：** 在撰写本文时，Siri 仍处于测试版阶段。苹果仅支持英语（美国、英国和澳大利亚）、法语和德语。你可以在其他地区开启它，但效果可能有所不同。此外，像定位服务（搜索地图和查找地点的功能）在美国境外尚无法使用。\n\
  \n最后，Siri 在不同地区有不同的语音。例如，在美国，Siri 使用女声。在英国，Siri 使用男声。\n\n### 启用与配置 Siri\n\n在开始使用\
  \ Siri 之前，你需要先开启这项服务。请按照以下步骤操作：\n\n1.  启动`设置`应用。\n2.  向下滚动并点击`通用`。\n3.  点击`Siri`。\n\
  4.  将 `Siri` 开关切换到`开启`状态。\n\n要更改语言，点击语言并从列表中选择一种语言。\n\n截至发布时，仅支持澳大利亚、英国和美国的英语、法语以及德语。\n\
  \n![images](img/U0708.jpg)\n\n你可以选择 Siri 是在`始终`回应你，还是仅在`免提`时回应。如果你不喜欢手机大声说话，请将此选项设置为仅\
  \ `免提`。如果你希望以更互动的方式体验 Siri，请将其保持为`始终`。\n\n为了让 Siri 知道你是谁，以便它能够称呼你的名字，请将`我的信息`设置为你自己的联系人名片。\n\
  \n将`抬起唤醒`选项设置为`开启`后，每当你将 iPhone 从睡眠中唤醒（通过按下顶部的`睡眠/唤醒`按钮或正面的`Home`按钮）并将其举到耳边时，Siri\
  \ 就会被激活并询问你的需求。\n\n### 使用 Siri\n\n要使用 Siri，请长按 `Home` 按钮。（或者，如果你的 iPhone 已开启并且你按照上一节所述在`设置`应用中启用了`抬起唤醒`选项，那么你只需将手机举到耳边即可。）\n\
  \n![images](img/U0709.jpg)\n\n你的`主屏幕`会向上滑动，露出一个银色的`麦克风`图标。等待 Siri 发出提示音后再开始说话；然后用清晰的声音、适中的语速说话，就像你在跟另一个人说话一样。说完话后，等待\
  \ Siri 再次发出提示音。此时，所有乐趣便开始了。\n\n![images](img/U0710.jpg)\n\n\n\n#### 你可以向 Siri 询问什么\n\
  \n苹果建议你像与真人交谈一样与 Siri 对话。不必刻意记住一组固定的指令或查询——它们的种类和变体实在太多，难以全部记住。相反，只需直接告诉 Siri 你想要什么。以下是\
  \ Siri 能为你做的一些示例：\n\n*   设置提醒、日历 appointments*、时钟闹钟和计时器。\n*   发送短信**、信息和电子邮件。\n\
  *   播放音乐。\n*   搜索基于位置的信息，例如餐厅和商家列表。你也可以搜索前往某个位置的路线。\n*   搜索 `Yelp`（美国地区）、`Wolfram\
  \ Alpha` 和 `Google` 以获取信息。\n*   询问天气和股票信息。\n*   朗读你的 `SMS`/`iMessage` 信息。\n*   在任何应用中听写文字。\n\
  *   问些傻问题——苹果实际上为其中许多问题预设了有趣的回答。\n\n更令人印象深刻的是，Siri 可以组合许多这些功能来完成复杂的交互。例如，Siri 可以读取一条约会晚餐的请求信息，搜索餐厅，获取路线，发送确认信息，然后添加晚餐的日程——所有这些都作为交互式确认的一部分。\n\
  \n以下只是你可以询问的一些内容，以及一些提问方式：\n\n*   “Siri，提醒我离开家时给上班的妈妈打电话。”\n\n    这将使 Siri 创建一个提醒，将出发地点设置为你的家庭地址，并在你离开时弹出一个包含你妈妈工作电话的提醒，方便你直接拨号。\n\
  \n*   “Siri，告诉我的老板我马上到。”\n\n    Siri 会找到被定义为“老板”的联系人，获取手机号码，并向她发送一条内容为“我马上到”的 `SMS`/`iMessage`。\n\
  \n*   “Siri，读一下我的消息。”\n\n    Siri 会朗读所有新收到的 `SMS` 或 `iMessage`。\n\n*   “Siri，30\
  \ 分钟后叫醒我。”\n\n    Siri 会设置一个时钟计时器，将在 30 分钟后响铃（希望那时你的小憩已经结束）。\n\n    ![images](img/U0711.jpg)\n\
  \n*   “Siri，我今天需要穿雨衣吗？”\n\n    Siri 会查看天气，判断是否可能下雨，并告知你是否需要担心被淋湿。\n\n    ![images](img/U0712.jpg)\n\
  \n*   “Siri，给我讲个笑话。”\n\n    Siri 可能会开始讲那个关于两部 iPhone 走进一家酒吧的笑话……\n\n    ![images](img/U0713.jpg)\n\
  \n*   “Siri，我午餐去哪里能吃到意大利菜？”\n\n    Siri 会搜索附近的餐厅，并在地图上显示出来。在美国地区，它还可以按 `Yelp` 排名进行排序。\n\
  \n*   “Siri，电影 *《冲出宁静号》* 的主演是谁？”\n\n    Siri 会搜索 `Wolfram Alpha`，并给出该电影的演员表。\n\n\
  *   “Siri，你最喜欢的颜色是什么？”\n\n    Siri 会给出几种可能的回答之一，也许会说你的语言缺乏足够的维度来恰当地描述那种正确的绿色色调。\n\
  \nSiri 返回的结果有时会以小部件的形式呈现，如果你弄错了，可以对其进行调整或禁用。例如，你可以快速关闭一个`闹钟`小部件，将一个`提醒`小部件标记为已完成，点击一个`联系人`小部件中的电子邮件地址，等等。\n\
  \n请注意，Siri 目前并不完美。例如，有时它会误解你的意思。其他时候，服务器可能会过度繁忙。因此，Siri 有时会犯错或做错事。但随着时间的推移，随着它越来越了解你，你也越来越懂得如何组织你的问题和指令，它会变得更好。\n\
  \n起初最好只是玩玩它。尽可能多地试验，感受一下怎样做才能获得最佳效果。\n\n#### 更改名称和设置关系\n\n你可能在前面的例子中注意到，我们使用了诸如*妈妈*和*老板*这样的词，而\
  \ Siri 明白我们在谈论谁。然而，在 Siri 能做到这一点之前，你需要先设置好这些人。操作方法如下：\n\n1.  按住 `主屏幕` 按钮启动 Siri。\n\
  2.  告诉 Siri 你要为谁设置关系，以及是什么关系。例如，你可以说：“简·史密斯是我的妈妈。”\n3.  Siri 会询问你是否要记住“简·史密斯”是你的妈妈。\n\
  4.  听到提示音后，说“是”。（或者，只需轻点`是`按钮。）\n5.  Siri 会用以下语句确认：“好的，我已添加此关系。”接着，你将看到更新后的联系人卡片。\n\
  \n![images](img/U0714.jpg)\n\n**注意：** 关系一旦创建，Siri 就无法移除。如果你犯了错误或以后想更改关系，则必须前往`通讯录`应用，轻点`编辑`，然后手动`删除`该关系。\n\
  \n如果你希望 Siri 用昵称呼叫你——比如，用*鲍勃*而不是*罗伯特*，甚至用像*主人*这样有点傻的称呼——你可以轻松地做出更改：\n\n1.  按住 `主屏幕`\
  \ 按钮启动 Siri。\n2.  告诉 Siri 你想被称呼的新名字，说一些像“叫我鲍勃”这样的话。\n3.  Siri 会询问你是否要记住*鲍勃*作为你的新名字。\n\
  4.  听到提示音后，说“是”。（或者，你可以直接轻点`是`按钮。）\n\n    ![images](img/U0715.jpg)\n\n5.  Siri 会用这样的语句确认操作：“好的，我已添加此名字。”然后，你会在联系人卡片上看到更新后的昵称。\n\
  \n#### 使用听写功能\n\niPhone 4S 的键盘引入了一项新功能：在`空格`键正左侧有一个小麦克风按钮。\n\n![images](img/U0716.jpg)\n\
  \n轻点它，你的屏幕会向上滑动，显示出一个发光的紫色麦克风。像对 Siri 说话那样对它说话；说完后，轻点`完成`按钮。你所说的所有内容都会被转写并作为文本输入。\n\
  \n没有哪个文本转语音引擎是完美的，但 Siri 在转写你所说内容方面做得相当不错。如果它出了什么错，你可以像编辑用键盘输入的文本那样编辑这些文字。\n\n![images](img/U0717.jpg)\n\
  \n除了基本的词语和名字，Siri 还能理解广泛的符号和标点。例如，你可以说“句号”、“感叹号”，甚至“左括号”或“右方括号”。你也可以说“换行”或“新段落”。实际上，你可以用\
  \ Siri 输入几乎任何你知道正确名称的字符。\n\n#### Siri 不能做什么\n\nSiri 开箱就能做很多事情，以至于很难记住它不能做什么。话虽如此，Siri\
  \ 是一项在线服务，苹果能够也将会随着时间的推移不断增加新功能。仅仅因为 Siri 今天不能做某事，并不意味着它明天也不能做。在撰写本文时，以下是 Siri 尚不能做的一些事情：\n\
  \n*   Siri 无法切换设置。你不能告诉它打开或关闭 Wi-Fi，或进入飞行模式。\n*   Siri 无法启动应用。你不能告诉它启动`Facebook`或你最喜欢的游戏。\n\
  \nSiri 无法阅读电子邮件、Twitter 回复或信息之外的任何内容。如果你需要这项功能，必须使用像 `Tweet Speaker` 这样的第三方应用。\n\
  \n"
- "# 第 8 章\n\n## 个性化与安全\n\n在本章中，你将学习几种个性化设置 iPhone 的简单方法。你还将学习如何使用密码保护来确保 iPhone 的安全。我们将向你展示在哪里可以下载免费壁纸来改变`锁定`和`主屏幕`的外观。我们还将向你展示如何通过调整各种活动的时间和声音来个性化\
  \ iPhone 发出的声音。iPhone 的许多方面都可以根据你的需求和品味进行微调，因此你可以赋予 iPhone 更具个性化的外观和感觉。\n\n\n\n\
  ### 更改锁定屏幕与主屏幕壁纸\n\n实际上，你的 iPhone 上可以个性定制的屏幕有两个，通过更改壁纸来实现。\n\n当你首次开启 iPhone 或将其唤醒时，看到的是`锁定`屏幕。此屏幕的壁纸显示在`滑动来解锁`滑块条的后方。\n\
  \n`主`屏幕则展示了你所有的应用图标。你可以在图标后方看到壁纸。你可以使用 iPhone 自带的壁纸图片，也可以使用自己的图片。\n\n**提示：** 你可能希望`锁定`屏幕的壁纸比`主`屏幕壁纸更少个人色彩。例如，你可以选择在`锁定`屏幕放一张普通的风景图，而在`主`屏幕放一张亲人的照片。此外，你可能更愿意选择一张不那么花哨的`主`屏幕壁纸，以免与应用图标产生冲突。\n\
  \n#### 通过“设置”应用更改壁纸\n\n在 iPhone 上更改壁纸的方法有好几种。第一种方法非常直接：只需通过“设置”应用来调整你的壁纸：\n\n1.\
  \  轻点“设置”图标。\n2.  轻点“墙纸”。\n\n    ![images](img/U0801.jpg)\n\n3.  轻点当前所选壁纸的图像。左侧显示的是`锁定`屏幕，右侧是`主`屏幕。\n\
  \n    ![images](img/U0802.jpg)\n\n4.  选择一个相簿：\n\n    ![images](img/U0803.jpg)\n\n\
  \    *   轻点“墙纸”以选择预装的壁纸。\n    *   轻点“相机胶卷”（如果在 iCloud 中启用了“我的照片流”，则轻点“我的照片流”），以从你用\
  \ iPhone 拍摄的照片、从网页保存的图片、屏幕截图（通过同时按住`主屏幕`按钮和`电源/睡眠`键截取）甚至壁纸应用中进行选择。\n    *   轻点任何其他相簿以查看你已同步的图片。\n\
  5.  轻点某个相簿后，你将看到该相簿中的所有图片。向上或向下滑动可查看所有图片。你最近添加的图片会位于列表的最底部。\n6.  轻点任意图片以将其选中并全屏查看。\n\
  7.  现在你可以移动和缩放图片：\n\n    ![images](img/U0804.jpg)\n\n    *   通过触摸并拖动手指来移动图片。\n \
  \   *   通过张开或捏合手指来放大或缩小。\n    *   如果不喜欢该图片，轻点“取消”按钮可返回相簿。\n8.  轻点“设定”按钮以将该图片设为你的壁纸。\n\
  9.  选择你想要壁纸应用的位置：\n\n    ![images](img/U0805.jpg)\n\n    *   轻点“设定锁定屏幕”按钮，将图片仅设为你的`锁定`屏幕壁纸。\n\
  \    *   轻点“设定主屏幕”按钮，将图片仅设为你的`主`屏幕壁纸。\n    *   轻点“同时设定”按钮，将图片同时设为`锁定`屏幕和`主`屏幕的壁纸。\n\
  10. 轻点`主屏幕`按钮以退出“设置”应用，并查看你的新壁纸，如图 8–1 所示。\n\n![images](img/0801.jpg)\n\n**图 8–1.**\
  \ *查看你的`锁定`屏幕和`主`屏幕壁纸*\n\n#### 使用任意照片作为壁纸\n\n更改壁纸的第二种方法是：查看“照片”图库中的任意图片，并将其选为壁纸。请按照以下步骤操作：\n\
  \n1.  轻点“照片”图标开始操作。要了解更多关于处理照片的信息，请参见第 20 章：“使用照片”。\n2.  轻点你想要浏览以寻找壁纸的照片相簿。\n3.\
  \  当你找到一张想用的照片时，轻点它，它将在屏幕上打开。\n4.  你轻点的缩略图将填满屏幕。如果这是你想要使用的图片，请轻点屏幕左下角的“设定为”图标 ![images](img/U0806.jpg)。\n\
  5.  轻点“用作墙纸”。\n\n    ![images](img/U0807.jpg)\n\n6.  要移动、缩放图片并将其设为`主`屏幕或`锁定`屏幕壁纸，请按照前一节的步骤\
  \ 7-9 操作。如果你决定改用另一张图片，请选择“取消”并挑选另一张。\n\n### 从免费应用下载精美的壁纸\n\n前往 App Store 并搜索“backgrounds”或“wallpapers”（参见第\
  \ 23 章：“神奇的 App Store”以获取更多信息）。你会找到许多专门为你的 iPhone 设计的免费或低成本应用。在本节中，我们将重点介绍这类应用中的一款，即\
  \ Apalon 出品的 `Pimp Your Screen`。这款应用有数百张精美的背景图片可供你的 iPhone 下载，且在本书出版时售价仅为 0.99 美元。\n\
  \n**注意：** 使用 `Pimp Your Screen` 时，与大多数壁纸应用一样，你需要保持有效的互联网连接——无论是 Wi-Fi 还是 3G。由于图片文件通常很大，建议你尽量使用\
  \ Wi-Fi，除非你的 3G 蜂窝数据网络套餐是无限流量的。\n\n#### 使用壁纸应用\n\n安装 `Pimp Your Screen` 后，你就可以开始使用了：\n\
  \n1.  轻点 `Pimp Your Screen` 图标以启动应用。\n\n    ![images](img/U0808.jpg)\n\n2.  应用的主屏幕提供了多个类别供你选择：`App\
  \ Shelves`（放置应用的架子——有点像 iBooks 或报摊）、`Neon Combos`（霓虹背景）、`Home Screens`（漂亮的主屏幕）、`Icon\
  \ Skins`（创建背景以突出显示你的图标）。然后你可以使用底部的两个选项——`Lock Screen Maker` 和 `Home Screen Maker`——来创建你自己个性化的锁定屏幕和主屏幕，如图\
  \ 8–2 所示。\n\n    ![images](img/0802.jpg)\n\n    **图 8–2.** *使用 Pimp Your Screen\
  \ 应用。*\n\n3.  轻点任一类别后，你可以向左或向右滑动以查看更多壁纸图片选项。要将壁纸保存到你的`相机胶卷`相簿中，请轻点图片底部中央的“保存”按钮。\n\
  4.  如果你不喜欢该图片，请轻点左下角的`主屏幕`按钮返回到主屏幕菜单。\n\n#### 使用你新保存的壁纸\n\n一旦你选好壁纸图片并保存到 iPhone，你需要按照本章前面“通过‘设置’应用更改壁纸”部分描述的步骤来选中它。\n\
  \n请记住，下载的壁纸会存放在`相机胶卷`相簿中。在你轻点`相机胶卷`将其打开后，你需要一直滚动到底部才能看到最近添加的内容。\n\n\n\n### 在 iPhone\
  \ 上调整声音\n\n你可以精细调整 iPhone，使其在特定事件（如来电、新邮件或日历提醒）发生时发出或不发出声音。你还可以自定义发送邮件或键盘打字时的效果。\n\
  \n请按照以下步骤调整 iPhone 上播放的声音：\n\n1.  轻点`设置`图标。\n2.  轻点`声音`。\n\n    ![images](img/U0809.jpg)\n\
  \n3.  你可以调整 iPhone 在`静音`和`铃声`模式下是否振动。将`振动`旁边的开关设置为`打开`或`关闭`。\n4.  要调整铃声和其他提醒的音量，请移动`铃声`上方的滑块。\n\
  5.  要更改手机铃声或短信铃声；接收新邮件、推文、日历提醒或提醒事项时播放的声音；或已发送邮件完成时播放的声音——请轻点你想要更改的项目。\n6.  此屏幕允许你选择新的铃声。轻点任一铃声即可播放并选中它。（你可以通过名称旁边的复选标记来判断铃声是否被选中。右侧图片中已选中`钟楼`。）\n\
  \n    ![images](img/U0810.jpg)\n\n7.  如果没有你喜欢的铃声，可以轻点`购买更多铃声`，进入 iTunes 铃声商店，在那里你可以购买一些喜爱的歌曲作为铃声。\n\
  8.  完成后，轻点左上角的`声音`按钮。\n9.  使用相同的步骤更改短信铃声、新邮件、推文等的声音。\n\n    **提示：** 请参阅第 9 章：“使用电话”了解自定义铃声。\n\
  \n10.  在除`铃声`之外的所有声音类别中，你可以通过选择列表顶部的`无`来关闭播放的声音。\n\n    ![images](img/U0811.jpg)\n\
  \n11.  `锁定声`和`键盘点击声`可通过轻点开关将其设置为`打开`或`关闭`来调整。完成后，按下`主屏幕`按钮退出。\n\n    ![images](img/U0812.jpg)\n\
  \n**提示：** 另外，你可以锁定`音乐`应用的最大可播放音量。方法是进入`设置` ![images](img/U001.jpg) `音乐` ![images](img/U001.jpg)\
  \ `音量限制` ![images](img/U001.jpg) `锁定音量限制`。我们在第 12 章：“播放音乐”中展示了如何操作。\n\n## 键盘选项\n\
  \n你可以通过选择多种语言以及更改`自动纠正`和`自动大写`等设置来精细调整键盘。你甚至可以让 iPhone 在你打字时读出自动纠正建议。请参阅第 2 章：“输入、复制和搜索”，了解各种键盘选项及其使用方法。\n\
  \n### 使用密码保护 iPhone\n\n你的 iPhone 可以存储大量有价值的信息。如果你用它来保存家庭成员的社会安全号码和出生日期等信息，情况尤其如此。确保任何拿起你\
  \ iPhone 的人都无法访问所有这些信息，这是个好主意。此外，如果你的孩子像我们的孩子一样，他们可能会拿起你酷炫的 iPhone 开始上网或玩游戏。你可能希望启用一些安全限制来保护他们。\n\
  \n#### 设置简单的四位数字密码\n\n在你的 iPhone 上，你可以选择设置一个四位数字密码，以防止未经授权访问你的 iPhone 和信息。然而，如果输入了错误的密码，即使是你也无法访问你的信息，因此最好使用一个你容易记住的密码。\n\
  \n请按照以下步骤设置密码来锁定你的 iPhone：\n\n1.  轻点`设置`图标。\n\n    ![images](img/U0813.jpg)\n\n\
  2.  轻点`通用`。\n3.  向下滚动并轻点`密码锁定`。\n4.  轻点`开启密码`以设置密码。\n5.  默认密码是一个简单的四位数字密码。使用键盘输入一个四位数字代码。系统会提示你再次输入代码。\n\
  \n    ![images](img/U0814.jpg)\n\n#### 设置更复杂的密码\n\n如果你希望使用比四位数字更复杂的密码，可以通过将`密码锁定`屏幕上的`简单密码`选项设置为`关闭`来实现。\n\
  \n![images](img/U0815.jpg)\n\n然后你将能够输入包含字母、数字甚至符号的新密码。\n\n**警告：** 请小心！如果你忘记密码，将无法解锁你的\
  \ iPhone。\n\n#### 调整你的密码选项\n\n设置好密码后，你将看到以下几个选项：\n\n![images](img/U0816.jpg)\n\n\
  *   `关闭密码`\n*   `更改密码`\n*   `需要密码`（`立即`、`1 分钟后`、`5 分钟后`、`15 分钟后`、`1 小时后`）\n*   `简单密码`（`打开`\
  \ = 四位数字；`关闭` = 任意字母、数字或符号）\n*   `Siri`（`打开` = 允许无需输入密码即可使用 Siri；`关闭` = 阻止使用 Siri，直到输入密码）\n\
  *   `抹掉数据`（`打开` = 在十次错误密码尝试后抹掉所有数据；`关闭` = 不抹掉数据）\n\n**警告：** 如果你有年幼的孩子喜欢在 iPhone\
  \ 从`睡眠`模式唤醒后猛敲安全键盘试图解锁，你可能希望将`抹掉数据`设置为`关闭`。否则，你的 iPhone 可能会被抹掉。\n\n**注意：** 为`需要密码`设置较短时间更安全。将时间设置为`立即`（默认值）是最安全的。然而，使用`1\
  \ 分钟`的设置可以避免你意外锁定 iPhone 时重新输入密码的麻烦。\n\n### 设置限制\n\n你可能决定不希望孩子在你的 iPhone 上听包含露骨歌词的音乐。你可能还想阻止他们访问\
  \ YouTube 或任何其他网站。在你的 iPhone 上设置此类限制相当容易。\n\n#### 限制应用\n\n请按照以下步骤限制对 iPhone 内容的访问：\n\
  \n![images](img/U0817.jpg)\n\n1.  在`设置`应用中轻点`通用`。\n2.  向下滚动页面并轻点`访问限制`。\n3.  轻点`启用访问限制`按钮。\n\
  4.  系统将提示你输入一个访问限制密码——只需选择一个你记得住的四位数字代码即可。\n\n**注意：** 此访问限制密码与你的主 iPhone 密码是分开的。你可以将其设置为相同，这样更容易记住。然而，如果你让家人知道主密码，但又不想让他们调整限制，这可能会造成问题。稍后你需要输入此访问限制密码才能关闭限制。\n\
  \n![images](img/U0818.jpg)\n\n请注意，你可以调整是否允许某些应用或功能运行。例如，右侧的屏幕截图允许你调整以下应用的访问限制：`Safari`、`YouTube`、`相机`、`FaceTime`、`iTunes`\
  \ 和 `Ping`。此屏幕还允许你限制访问`安装应用`或`删除应用以及 Siri 和 Siri 中的露骨语言`。最后，你可以限制对`定位`和`账户`进行更改的能力。\n\
  \n![images](img/U0819.jpg)\n\n在所有情况下，`关闭` = 已限制。\n\n你可能会认为`打开`表示某些内容被限制，但事实恰恰相反。要禁用或限制某内容，你需要触摸其旁边的滑块并将其更改为`关闭`。如果你注意到所有选项上方都有`允许`字样，那么这就说得通了。\n\
  \n**注意：** 你限制的任何应用的图标都会消失。因此，如果你限制了对`YouTube`、`App Store` 和 `FaceTime` 应用的访问，那么`YouTube`\
  \ 和 `App Store` 图标将从`主屏幕`消失，并且你的 iPhone 的 `FaceTime` 图标也将被移除。\n\n\n\n### 允许更改\n\n\
  有时你并不想完全关闭某个应用的访问权限，只是希望阻止任何人进行意外更改。例如，**定位**选项涉及诸多隐私问题，因此你可能希望对哪些应用和功能有权访问它进行更精细的控制。请按照以下步骤调整**定位**选项的限制：\n\
  \n![图片](img/U0820.jpg)\n\n1. 按照上一节所述，前往**限制**屏幕。\n2. 向下滚动到底部，查看所有**允许更改**设置。\n3.\
  \ 轻点**定位**。\n4. 轻点**允许更改**，对**定位设置**进行更改。\n5. 将**定位服务**开关切换为**关闭**，彻底阻止你的 iPhone\
  \ 使用你的位置。（请注意，这可能会大大降低**谷歌地图**等应用的便利性，并导致逐向导航应用完全无法工作。）\n6. 将你不想让其追踪位置的应用逐一开关切换为**关闭**。（例如，将**相机**应用的**定位服务**设置为**关闭**，以避免你打算在互联网上公开分享的照片中包含\
  \ GPS 坐标。）\n7. 轻点**系统服务**，更改内置进程的**定位**权限。\n8. 如果有任何你不想让其使用位置数据的系统服务，请将其开关切换为**关闭**。选项包括**蜂窝网络搜索**、**指南针校准**、**诊断与用量**、**基于位置的\
  \ iAd**、**设定时区**和**交通状况**。\n\n   ![图片](img/U0821.jpg)\n\n9. 完成后，轻点左上角的**定位**返回。\n\
  10. 如果你想阻止将来对**定位服务**进行任何更改，请轻点**不允许更改**。\n11. 完成后，轻点**限制**返回。\n12. 轻点**账户**，然后轻点**不允许更改**，以防止将来对你的**邮件**、**日历**和**通讯录**账户进行任何更改。\n\
  13. 完成后，轻点**限制**返回。\n\n### 限制内容\n\n除了对应用设置限制外，你还可以对能在 iPhone 上下载和查看的内容设置限制。如果你打算将\
  \ iPhone 交给孩子，并且不希望她能够下载带有露骨歌词的音乐或观看含有成人内容的电影，请按照以下步骤操作：\n\n1. 按照上一节所述，前往**限制**屏幕。\n\
  \n   ![图片](img/U0822.jpg)\n\n2. 向下滚动到底部，查看所有**允许内容**设置。\n3. 要限制在应用内购买的内容，请将**应用内购买**设置为**关闭**。这将包括从**iTunes**应用购买的音乐和视频。\n\
  4. 如果你有年幼的孩子，并且担心他们在你下载新应用后进行昂贵的应用内购买（例如，你不希望他们在**蓝精灵**应用中购买**蓝莓**），请轻点**需要密码**，并将该设置更改为**始终**。\n\
  5. 轻点**评级地区**，根据你所在的国家/地区调整评级。目前支持一个广泛的国家/地区列表，包括澳大利亚、奥地利、加拿大、法国、德国、爱尔兰、日本、新西兰、英国和美国。\n\
  6. 轻点**音乐与播客**，限制访问包含露骨内容的歌词。确保将**露骨**选项设置为**关闭**，如右侧的图所示。\n\n   ![图片](img/U0823.jpg)\n\
  \n7. 轻点左上角的**限制**按钮，返回选项列表。\n8. 你也可以通过轻点每个项目，设置**影片**、**电视节目**和**应用**的评级上限。\n\n\
  \   ![图片](img/U0824.jpg)\n\n9. 当你轻点**影片**等项目时，会看到一个允许的评级列表。轻点你想要允许的最高评级级别。在此图中，我们轻点了**PG-13**。所有高于此评级的电影（**R**\
  \ 和 **NC-17**）均不允许。红色文字和复选标记的缺失提供了哪些选项被阻止的视觉提示。\n10. 轻点**电视节目**设置这些限制。同样，轻点你想要允许的最高评级。复选标记表示允许的评级；红色文字表示不允许的评级。在此示例中，**TV-Y**、**TV-Y7**\
  \ 和 **TV-G** 被允许，但更高的评级不被允许（即 **TV-PG**、**TV-14** 和 **TV-MA**）。\n\n    ![图片](img/U0825.jpg)\n\
  \n11. 轻点**应用**设置各种应用的限制。\n\n    ![图片](img/U0826.jpg)\n\n12. 在此屏幕中，我们允许播放评级为 **4+**、**9+**\
  \ 和 **12+** 的应用。评级为 **17+** 的应用无法播放或下载。\n13. 轻点左上角的**限制**按钮，返回选项列表。\n14. 最后，轻点**主屏幕**按钮以保存你的设置。\n\
  \n### 限制 Game Center\n\nGame Center 是享受社交游戏的绝佳方式，包括配对、挑战、排行榜等。然而，如果你是有年幼孩子的家长，你可能会不放心让他们在没有你监督的情况下玩多人游戏或接受好友请求。请按照以下步骤限制\
  \ Game Center 的访问：\n\n1. 按照上一节所述，前往**限制**屏幕。\n\n   ![图片](img/U0827.jpg)\n\n2. 向下滚动到**Game\
  \ Center**。\n3. 将**多人游戏**和/或**添加好友**选项切换为**关闭**。\n\n"
- "# 第 9 章\n\n## 使用你的电话\n\niPhone 能干太多酷事了，以至于很容易让人忘记它同时也是一部功能强大的电话。在本章中，我们将介绍你在高端智能手机上期待找到的众多功能。我们将从基础开始，向你展示如何按姓名拨号、通过使用最近通话记录节省时间、语音拨号以及使用语音信箱。\n\
  \n![图片](img/U0901.jpg)\n\n接下来，我们将探索 iPhone 电话功能的更高级能力。例如，我们将向你展示如何处理多个通话者以及设置电话会议。最后，我们将向你展示如何从你的音乐库创建新的自定义铃声，以及为不同的联系人设置不同的铃声。\n\
  \n### 电话功能入门\n\niPhone 最初会将**电话**图标放在底部程序坞上。你可以使用第 6 章：“图标与文件夹”中描述的步骤，移动它或将其从程序坞上移除。\n\
  \n![图片](img/U0902.jpg)\n\n#### 查找你的电话号码\n\n也许你刚拿到你的新 iPhone，还不知道自己的电话号码。别担心；你可以在**设置**应用中找到你的号码。轻点**设置**图标，然后向下滚动并轻点**电话**。你的号码会列在顶部。\n\
  \n![图片](img/U0903.jpg)\n\n#### 使用 iPhone 耳机\n\n如果你所在的国家或省份在法律上不允许在驾驶汽车时手持 iPhone，那么你将需要使用耳机或蓝牙车载音响连接来进行免提通话。\n\
  \n![图片](img/U0904.jpg)\n\n随 iPhone 附带的耳机非常适合通话。耳机线上内置了麦克风，还有音量控制键和一个**中央**按钮，让你可以接听或挂断电话。当你戴好耳机时，电话会在耳机中响铃。按一下耳机上的**中央**按钮接听，再按一下即可挂断。\n\
  \n#### 连接蓝牙耳机或车载音响\n\n你也可以连接到蓝牙耳机或蓝牙车载音响系统来拨打和接听电话。我们在第 5 章：“AirPlay 和蓝牙”中为你展示了详细步骤。\n\
  \n\n\n### 从键盘拨号\n\n使用手机最简单的方法就是通过键盘拨号。屏幕上的数字很大，因此很容易拨号。请按照以下步骤拨号：\n\n1.  点击**电话**图标（参见图\
  \ 9-1）。\n2.  如果没有看到拨号键盘，点击底部的**键盘**图标。\n3.  现在，只需点击数字键即可开始拨号。\n4.  如果输错，按**退格**键![images](img/U0905.jpg)。\n\
  5.  如果需要输入国际号码的**加号**（`+`），请长按**零**（`0`）键。\n6.  拨号完成后，按**呼叫**键![images](img/U0906.jpg)。\n\
  \n    **提示：在电话号码中插入暂停**\n\n    有时您需要在电话号码中插入一个暂停，然后输入另一个号码，例如分机号或密码。您可以通过长按**星号**键（`*`）来拨入一个暂停，直到在电话号码旁边出现一个逗号。这会导致两秒钟的暂停。\n\
  \n![images](img/0901.jpg)\n\n**图 9-1.** *使用 iPhone 键盘拨打电话号码*\n\n## 不同的电话视图\n\n我们刚刚使用了**键盘**软键。您可以在**电话**屏幕底部看到几个图标，分别是**个人收藏**、**最近通话**、**通讯录**、**键盘**和**语音信箱**，如图图\
  \ 9-2 所示。\n\n![images](img/0902.jpg)\n\n**图 9-2.** *使用软键查看不同的**电话**屏幕*\n\n## 使用个人收藏（快速拨号）\n\
  \n您的**个人收藏**是您经常呼叫的联系人。您可以将**个人收藏**视为您的快速拨号列表。\n\n**注意：** 您也可以将**FaceTime**联系人添加到**个人收藏**中。\n\
  \n### 添加新的个人收藏\n\n从**通讯录**列表中向个人收藏列表添加新联系人很容易。请按照以下步骤操作：\n\n**提示：** 您也可以从**最近通话**记录中添加**个人收藏**。在**最近通话**中，点击蓝色的**箭头**图标![images](img/U0907.jpg)，然后在下一个屏幕上，滚动到**信息**页面底部，点击**添加到个人收藏**。\n\
  \n1.  如果不在**电话**屏幕，请点击**电话**图标启动它。\n2.  触摸底部一行软键中的**个人收藏**图标。\n3.  首次启动**个人收藏**时，您将看到一个空白屏幕。\n\
  \n    ![images](img/U0908.jpg)\n\n4.  点击右上角的**加号**按钮![images](img/U0909.jpg)以添加新条目。您的通讯录将打开。\n\
  5.  向上或向下滑动以查找联系人。点击任何联系人以选择它。\n\n    **提示：** 要按名称搜索联系人，请点击屏幕最顶部（时间下方）。这将调出**搜索**窗口，您可以在其中输入几个字母来查找联系人。请记住，您可以通过点击左上角的**群组**按钮来查看不同的联系人群组。\n\
  \n    ![images](img/U0910.jpg)\n\n6.  如果一个条目有多个电话号码，您需要选择其中一个作为个人收藏条目。\n\n    ![images](img/U0911.jpg)\n\
  \n7.  点击一个号码后，系统会询问您是否要将该号码设置为**语音呼叫**或**FaceTime**中的**个人收藏**。\n8.  您将返回到**个人收藏**列表，在那里您会看到刚刚添加的新联系人。**FaceTime**中的**个人收藏**会在联系人姓名右侧显示一个小**视频**图标。\n\
  \n    ![images](img/U0912.jpg)\n\n    ![images](img/U0913.jpg)\n\n9.  重复步骤 4-7 以添加更多联系人到**个人收藏**。每个新条目都列在列表底部前一个条目之下。\n\
  \n### 整理您的个人收藏\n\n与 iPhone 上的其他列表一样，您可以重新排列**个人收藏**列表并删除条目：\n\n1.  像之前一样查看您的**个人收藏**列表。\n\
  2.  点击左上角的**编辑**按钮。\n3.  要重新排列条目，请触摸并拖动右侧边缘带三条灰色横条的区域，在列表中上下移动。\n\n    ![images](img/U0914.jpg)\n\
  \n4.  要删除条目，请点击条目左侧的红色**圆形**图标，使其变为竖立状态。\n5.  点击**删除**按钮。\n6.  完成重新排列和删除条目后，点击左上角的**完成**按钮。\n\
  \n    ![images](img/U0915.jpg)\n\n### 呼叫个人收藏联系人\n\n要呼叫**个人收藏**列表中的任何人，只需触摸该人的姓名。没有提示或确认。一旦您触摸他的名字，手机就会拨打他的号码（参见图\
  \ 9-3）。\n\n![images](img/0903.jpg)\n\n**图 9-3.** *通过点击来拨叫您的**个人收藏**之一*\n\n## 使用最近通话（通话记录）\n\
  \n使用**最近通话**类似于在其他智能手机上查看通话记录。\n\n当您触摸**最近通话**图标时，将显示所有最近通话的列表。您可以点击顶部的**全部**或**未接**按钮来缩小列表范围（参见图\
  \ 9-4）。\n\n![images](img/U0916.jpg)\n\n![images](img/0904.jpg)\n\n**图 9-4.** *使用**最近通话**屏幕*\n\
  \n### 从最近通话拨打电话\n\n从**最近通话**屏幕拨打电话很容易；只需触摸所需的姓名或电话号码，您的 iPhone 就会立即向该联系人发起通话。\n\n\
  ### 清除所有最近通话\n\n要清除或删除所有最近通话记录条目，请按右上角的**清除**按钮。\n\n### 通话详情或联系人信息\n\n点击**最近通话**列表中姓名旁边的蓝色**箭头**图标![images](img/U0907.jpg)，您将看到该电话号码的信息，或者如果该联系人在您的**通讯录**中，则会看到其完整的联系人信息。如果有多个通话，您将看到每个通话的历史记录。\n\
  \n![images](img/U0917.jpg)\n\n滚动到联系人**信息**屏幕底部以查看更多选项。您可以发送**短信**、发起**FaceTime**视频通话，或通过电子邮件或彩信发送联系人信息来**共享联系人**。\n\
  \n![images](img/U0918.jpg)\n\n点击**添加到个人收藏**以将此联系人添加到您的**个人收藏**列表。\n\n### 从最近通话将电话号码添加到通讯录\n\
  \n如果**最近通话**条目是一个尚未关联到**通讯录**中联系人的电话号码，那么您将在**信息**屏幕上看到两个不同的按钮：**创建新联系人**和**添加到现有联系人**。\n\
  \n点击**创建新联系人**以从此电话号码创建新联系人。\n\n点击**添加到现有联系人**以将此电话号码添加到您现有的某个联系人中。\n\n![images](img/U0919.jpg)\n\
  \n## 从通讯录拨打电话\n\n将所有的联系人信息保存在手机中的一大好处是，从**通讯录**列表拨打电话非常容易。请按照以下步骤操作：\n\n1.  如果不在**电话**屏幕，请点击**电话**图标启动它（参见图\
  \ 9-5）。\n2.  触摸底部一行软键中的**通讯录**图标。\n3.  使用以下方法之一查找要呼叫的联系人：\n    *   在列表中向上或向下滑动。\n\
  \    *   将手指放在屏幕右侧的字母上，向上或向下滚动。\n    *   点击顶部显示时间的状态栏以跳转到列表顶部。点击**搜索**窗口，输入联系人的名字、姓氏或公司名称的若干字母来查找他。\n\
  4.  找到所需的联系人条目后，点击其姓名。\n5.  触摸您想要呼叫的电话号码。\n\n![images](img/0905.jpg)\n\n**图 9-5.**\
  \ *从**通讯录**列表拨打电话*\n\n\n\n### 拨打任意带下划线的电话号码\n\n你会注意到，iPhone 几乎会在屏幕上所有它识别出的电话号码下方添加下划线。\n\
  \n![images](img/U0920.jpg)\n\n这种情况会出现在电子邮件（电子邮件签名）、短信与 iMessage、备忘录、网站等页面中。\n\n\
  要拨打任意带下划线的电话号码，只需轻点该号码，然后轻点显示出的`呼叫`按钮即可。\n\n**提示：** 与带下划线的电话号码类似，你的 iPhone 还能识别屏幕上的其他信息，并允许你通过轻点来执行相关操作。此功能称为“数据检测器”。你会看到带下划线的地址（轻点即可在`地图`中显示该地址）、带下划线的日期，例如`明天上午\
  \ 9 点`（轻点即可新建一个`日历`事件），以及快递单号，例如联邦快递或 UPS 的追踪编号（轻点即可在`Safari 浏览器`中显示追踪信息）。\n\n##\
  \ 从带下划线的电话号码创建新联系人\n\n如果你长按任意带下划线的电话号码几秒钟，屏幕底部会弹出一系列按钮。轻点`创建新联系人`即可从该号码创建新联系人，或轻点`添加到现有联系人`，将该号码添加到你的`通讯录`列表中已有的联系人。\n\
  \n![images](img/U0921.jpg)\n\n## 使用 Siri 进行语音拨号\n\n你可以使用语音通过 Siri 拨打通讯录中的号码。有关具体步骤，请参见第\
  \ 7 章：“多任务处理与 Siri”中的“Siri”部分。\n\n## 通话中的功能\n\n在你的 iPhone 拨号期间，甚至在你接通对方后，都可以执行许多操作。\n\
  \n所有可用的电话功能都清晰地显示在`电话`屏幕的图标和按钮上。\n\n你可以执行以下所有操作：\n\n![images](img/U0922.jpg)\n\n\
  *   使自己静音。\n*   使用`拨号键盘`拨出其他号码。\n*   轻点`扬声器`以开启手机的免提功能。\n*   轻点`添加通话`以发起电话会议。\n\
  *   通过`FaceTime 通话`开始视频通话（前提是对方也拥有支持`FaceTime 通话`的 iPhone、iPod touch、iPad 或 Mac）。\n\
  *   查看你的`通讯录`列表。\n\n**注意**：为什么你把手机贴近耳朵时屏幕会变黑？当你对着 iPhone 说话（将手机靠近脸部）时，屏幕会感应到并自动变黑，以防止你不小心用脸碰到按钮。一旦你将\
  \ iPhone 从脸旁移开，你就会看到可用的选项。\n\n### 使用拨号键盘\n\n也许你拨打的号码需要你输入分机号。又或者，你正在拨打一个需要根据提示输入数字进行选择的自动应答服务。\n\
  \n![images](img/U0923.jpg)\n\n![images](img/U0924.jpg)\n\n在这些情况下，只需轻点`拨号键盘`图标，键盘就会显示出来。然后你可以根据提示输入数字。\n\
  \n最后，操作完成后，按下底部的`隐藏拨号键盘`按钮即可。\n\n![images](img/U0925.jpg)\n\n### 静音通话\n\n在拨号过程中，你会在左上角看到将通话静音的选项。只需轻点`静音`按钮就可以让自己静音。再次轻点即可取消静音。\n\
  \n![images](img/U0926.jpg)\n\n**提示：** 当你启用了`FaceTime 通话`时，你不会看到`保留`按钮。请使用`静音`图标来保持通话。\n\
  \n### 使用免提\n\n如果你更愿意使用 iPhone 内置的扬声器免提，请轻点`扬声器`图标。\n\n再次轻点同一个图标即可关闭免提。\n\n![images](img/U0927.jpg)\n\
  \n### 保持通话\n\n将来电方置于保持状态很简单。只需轻点`保留`图标即可将来电方保持。\n\n![images](img/U0928.jpg)\n\n\
  **注意：** 只有当你的`FaceTime 通话`应用处于停用状态时，你才会看到`保留`图标（前往`设置` ![images](img/rtrif.jpg)\
  \ `电话`，然后将`FaceTime 通话`设置为`关闭`）。如前所述，如果你没有看到`保留`图标，只需轻点`静音`图标——它能实现相同的效果。\n\n取消保持也同样简单——再次轻点`保留`按钮即可取消保持。\n\
  \n**注意：** 在编写本书时，Verizon 的 CDMA 网络并未正式支持保持通话功能。\n\n### 浏览通讯录\n\n![images](img/U0929.jpg)\n\
  \n假设你在通话过程中需要浏览你的`通讯录`列表。例如，你可能需要查找某人的电子邮件、电话号码或地址，以便与通话对方分享。轻点`通讯录`按钮，然后滚动或搜索联系人。\n\
  \n要返回通话，请轻点顶部绿色的`轻触返回通话`栏。\n\n![images](img/U0930.jpg)\n\n**注意：** 在此过程中，最好使用免提或蓝牙耳机（参见第\
  \ 5 章：“AirPlay 与蓝牙”）；这样你就可以在搜索联系人的同时继续通话。\n\n### FaceTime 视频通话\n\n![images](img/U0931.jpg)\n\
  \n如果你正在通话的对方也拥有较新款的 iPhone、iPod touch、iPad 或 Mac，并且对方已连接 Wi-Fi，那么你可以轻点`FaceTime\
  \ 通话`图标来开始视频通话。（未来你可能可以通过 3G 蜂窝网络连接使用`FaceTime 通话`；但目前此功能需要 Wi-Fi 连接。）你会在窗口左上角看到自己的画面，而对方则会显示在主窗口中。你还会注意到底部有三个按钮：`静音`、`结束通话`和`切换摄像头`，用于在前后摄像头之间切换。\n\
  \n![images](img/U0932.jpg)\n\n关于使用`FaceTime 通话`的更多信息，请参见第 11 章：“视频消息与 Skype”。\n\n\
  **注意：** 只有当你的`FaceTime 通话`应用处于启用状态时，你才会看到这个`FaceTime 通话`图标（你可以在`设置` ![images](img/rtrif.jpg)\
  \ `电话`中将其启用，然后将`FaceTime 通话`设置为`开启`）。\n\n## 设置和使用语音信箱\n\n你的 iPhone 配备了一个增强型语音信箱系统，称为**可视语音信箱**。此功能让你能快速查看所有语音留言，并按任意顺序播放。要收听任何留言，只需轻点它。在右侧的图片中，红色`圆形`图标内的数字`3`表示有三条未听的语音留言。\n\
  \n![images](img/U0933.jpg)\n\n**注意：** 如果你在美国以外地区，你的运营商可能尚未提供可视语音信箱服务。如果未提供，那么你需要像使用其他任何手机一样，按下`语音信箱`软按键，拨号接入来收取留言。\n\
  \n### 设置语音信箱\n\n如果你以前从未设置过语音信箱，那么在新 iPhone 上进行设置很简单；只需按照以下步骤操作：\n\n1.  轻点`电话`图标。\n\
  2.  轻点底部软按键行中的`语音信箱`图标 ![images](img/U0934.jpg)。\n3.  轻点图 9–7 中显示的`立即设置`按钮。\n4.\
  \  选择一个四位数的密码，然后重新输入密码。\n\n    ![images](img/0906.jpg)\n\n    **图 9–7.** 设置你的语音信箱\n\
  \n5.  接下来，你可以选择`默认`问候语或`自定`问候语。`默认`问候语会以电子语音读出你的电话号码；同时还会提示你无法接听。\n\n    ![images](img/U0935.jpg)\n\
  \n6.  如果你选择`自定`问候语，则需要轻点`录制`按钮进行录制。录制完成后，轻点`停止`按钮，该按钮与`录制`按钮位于同一位置。\n7.  录制完成后，你可以轻点`播放`按钮，听听看是否喜欢你的`自定`问候语。\n\
  \n**提示：** 如果你将 iPhone 拿得太靠近嘴巴，你的声音可能会听起来有些失真——请务必保持正常距离。\n\n### 更改语音信箱密码\n\n你可能想要更改密码。请按照以下步骤操作：\n\
  \n1.  找到并轻点`设置`图标。\n2.  向下滚动并轻点`电话`。\n3.  向下滚动并轻点`更改语音信箱密码`。\n4.  输入你的当前密码，然后两次输入新密码。\n\
  \n\n\n#### 播放语音留言\n\n可视化语音信箱系统的妙处在于，你无需拨号收听留言。所有语音留言都会保存在你的手机上，你可以保存、浏览或删除它们。\n\n\
  ![images](img/U0936.jpg)\n\n通过`Voicemail`图标右上角红色**圆形**图标中的小数字，你可以知道有多少条未收听留言。\n\n\
  未收听项目（就像收件箱中未读的电子邮件）会用一个小蓝点标记。\n\n`Voicemail`图标会显示信箱中的留言数量。轻点留言旁边的`播放`按钮，留言将通过听筒播放。\n\
  \n**提示：** 如果你无法查看屏幕，仍可通过按住手机上的`1`键拨入，免提收听语音留言。\n\n##### 通过扬声器收听语音留言\n\n如果你想通过 iPhone\
  \ 的扬声器（而非听筒）收听语音留言，只需轻点右上角的`扬声器`按钮。\n\n![images](img/U0937.jpg)\n\n##### 调整问候语\n\
  \n轻点`问候语`按钮来调整你的语音信箱问候语。你可以重新收听当前的问候语、录制新的`自定义`问候语，或恢复为`默认`问候语。\n\n![images](img/U0938.jpg)\n\
  \n##### 回拨留言者\n\n如果有人给你留下语音留言，你可以轻点`回拨`按钮回电给她；这将立即回拨。\n\n![images](img/U0939.jpg)\n\
  \n#### 删除语音留言\n\n如果你打算日后重听，你的 iPhone 会保存所有语音留言。但留言太多时，管理起来会有些不便。选中一条留言并轻点红色的`删除`按钮，即可将其从\
  \ iPhone 中移除（参见图 9–7）。\n\n![images](img/U0940.jpg)\n\n**注：** 你可以选择保存“已删除”的留言。你的`Voicemail`屏幕会在独立的`已删除`标签页中显示已删除的留言。如果你在此标签页中轻点某条留言，可以轻点`还原`按钮将其恢复。\n\
  \n![images](img/0907.jpg)\n\n**图 9–7.** *处理已删除的语音留言项目*\n\n如果你想永久删除所有语音留言，请轻点`全部清除`。\n\
  \n### 电话会议\n\n在如今繁忙的世界中，同时与多位通话方沟通已成为我们对手机的一项基本需求。幸运的是，iPhone 上的电话会议功能非常直观。\n\n\
  **注：** AT&T/GSM 版 iPhone 最多支持五方电话会议，但 Verizon 的 CDMA 网络技术限制使 Verizon 版 iPhone 仅支持三方电话会议。\n\
  \n##### 发起第一通电话\n\n如本章前面所示，你可以拨打`最近通话`中的任何号码、新号码、联系人、`个人收藏`列表中的联系人等。\n\n![images](img/U0941.jpg)\n\
  \n你甚至不必主动发起呼叫来创建电话会议。例如，你可以接听第一位通话者的来电，然后再将第二个人加入会议。\n\n将 iPhone 从脸前移开，即可查看可用的通话功能。本章前面已介绍了其中的大部分功能。\n\
  \n##### 添加第二位通话者\n\n轻点`添加通话`按钮开始添加第二位通话者。这将立即将第一位通话者置于保持状态。\n\n![images](img/U0942.jpg)\n\
  \n轻点`添加通话`按钮后，系统会跳转到你的`通讯录`列表。只需滚动或双击顶部即可搜索你要添加到此通话中的联系人。\n\n![images](img/U0943.jpg)\n\
  \n你也可以从`个人收藏`或`最近通话`中选择添加新的通话者，或者轻点底部的`拨号键盘`软键后直接拨打其电话号码。\n\n![images](img/0908.jpg)\n\
  \n**图 9–8.** *添加第二位通话者*\n\n如果该联系人有多个电话号码，请轻点你要呼叫的号码，通话将会发起。\n\n#### 合并通话\n\n一旦与第二位通话者的呼叫发起，你会注意到`添加通话`按钮已变为`合并通话`按钮。轻点此按钮即可将两通电话合并为三方通话（参见图\
  \ 9–9）。\n\n![images](img/0909.jpg)\n\n**图 9–9.** *在通话者之间切换并将其合并为电话会议*\n\n屏幕顶部现在会滚动显示电话会议中所有通话者的列表。\n\
  \n#### 与个别通话者私密通话或断开连接\n\n若要在电话会议中单独或私密地与某位通话者交谈，请执行以下步骤：\n\n1.  轻点`电话`屏幕顶部姓名旁边的小型黑色`箭头`图标\
  \ ![images](img/U0944.jpg)（参见图 9–10）。\n2.  现在你会看到所有通话者的列表。轻点某人姓名旁边的`私密`按钮 ![images](img/U0945.jpg)\
  \ 即可与该人私密通话。其他所有人将被置于保持状态。\n3.  若要挂断任何通话者，请轻点其姓名左侧的红色`电话`图标 ![images](img/U0946.jpg)。\n\
  \n![images](img/0910.jpg)\n\n**图 9–10.** *与个别通话者私密通话或将其挂断*\n\n### 电话选项与设置\n\n你可以通过进入`设置`应用自定义手机中的许多功能：\n\
  \n1.  轻点`设置`图标。\n\n    ![images](img/U0947.jpg)\n\n2.  向下滚动并轻点`电话`。\n\n以下部分描述了此处找到的所有电话设置。\n\
  \n#### 呼叫转移\n\n有时你可能需要将呼叫转接到另一个号码。例如，你正在拜访一位住在偏远地区、手机信号极差的朋友家。在这种情况下，你可以将呼叫转接到该朋友的固定电话。请按以下步骤操作：\n\
  \n1.  在`电话`设置屏幕中，轻点`呼叫转移`。\n\n    ![images](img/U0948.jpg)\n\n2.  将`呼叫转移`开关设置为`开启`。\n\
  \n    ![images](img/U0949.jpg)\n\n3.  轻点`转接到`行以输入转接号码。\n\n    ![images](img/U0950.jpg)\n\
  \n4.  输入后，号码将被保存以供将来使用。所有来电将从你的常规 iPhone 号码转接到此号码，直到你将`呼叫转移`设为`关闭`。\n\n    **注意：**\
  \ 呼叫转移并非总是免费的。请致电你的电话公司，确认启用呼叫转移是否会产生费用。\n\n#### 呼叫等待\n\n另一个`电话`设置是`呼叫等待`。此选项可在你通话时提醒你又有另一通来电。\n\
  \n![images](img/U0951.jpg)\n\n然后你可以选择接听新来电、挂断第一通电话或设置电话会议（如前所述）。\n\n启用呼叫等待非常简单，只需确保`呼叫等待`开关处于`开启`位置即可（这是默认设置）。\n\
  \n#### 显示或拦截（隐藏）你的来电显示\n\n在某些情况下，你可能希望自己的电话号码不显示在对方手机上。\n\n![images](img/U0952.jpg)\n\
  \n幸运的是，你的 iPhone 提供了拦截来电显示号码的选项。为此，请将`显示我的来电显示`开关设置为`关闭`。\n\n\n\n#### 在 SIM 卡上设置安全性\n\
  \n作为额外的安全措施，你可以启用 PIN 码来访问存储在 SIM 卡上的信息。如果你的 iPhone 不慎丢失或被盗，这将防止他人访问你 SIM 卡上存储的姓名和号码。\n\
  \n**警告：** 设置此 SIM 卡 PIN 码可能会锁定你的手机，使其无法使用，直到你输入 PUK（*个人解锁密钥*）。你可以从你的无线运营商处获取这个八位数的\
  \ PUK 码。对于 AT&T，请登录 AT&T 网站，点击页面顶部的 **我的服务**，然后点击中间的 **我的手机/设备**。接下来，选择你的 iPhone\
  \ 并点击 `解锁 SIM 卡` 链接。如果你不是 AT&T 用户，请查看你运营商的网站或致电其客服帮助台。\n\n![图片](img/U0953.jpg)\n\
  \n请按照以下步骤操作：\n\n1.  如前所述，进入**电话**设置菜单。\n2.  向下滚动并轻点 **SIM 卡 PIN 码**。\n3.  这将带你进入\
  \ **SIM 卡 PIN 码** 屏幕。如果你在此处尝试将 **SIM 卡 PIN 码** 选项设置为**开启**，并看到类似右侧的错误信息，则表明你的 iPhone\
  \ 已被锁定。你只能通过输入 PUK 码来解锁它。有关更多详细信息，请参阅前面的警告。\n\n    ![图片](img/U0954.jpg)\n\n4.  如果你将\
  \ **SIM 卡 PIN 码** 旁边的开关设置为**开启**后没有看到错误信息，那么你可以轻点**更改 PIN 码**来输入你的新 PIN 码。\n\n**注意：**\
  \ Verizon 的 CDMA 网络不使用 SIM 卡，因此 Verizon 版 iPhone 不提供 SIM 卡 PIN 码锁定功能。\n\n#### 供听障人士使用的\
  \ TTY\n\nTTY 代表*文本电话设备*。此类设备允许听障人士通过电话线发送打字的文本信息。你的 iPhone 可以与另一台配备了 TTY 设备的电话进行通信——只需将\
  \ **TTY** 开关设置为**开启**即可。\n\n#### 切换无线运营商\n\n在某些国家，尤其是在无锁版 iPhone 更受欢迎的地区，你可能会在**设置**中看到一个**运营商**标签\n\
  \n![图片](img/U0955.jpg)\n\n轻点**运营商**即可看到可以为你的 iPhone 切换运营商的屏幕。\n\n将其设置为**自动**，让 iPhone\
  \ 为你选择最佳网络。\n\n如果你想让 iPhone 强制连接到特定网络，例如 **ROGERS**，请轻点该网络名称\n\n![图片](img/U0956.jpg)\n\
  \n#### 运营商服务\n\n按下**运营商服务**按钮将列出你的无线运营商或电话公司的名称。\n\n例如，如果你在美国的运营商是 AT&T，请轻点**电话**设置屏幕底部的\
  \ **AT&T 服务**，即可查看与 AT&T 相关的特殊号码。如果你使用其他运营商，此屏幕将显示你的运营商的特殊接入号码。\n\n![图片](img/U0957.jpg)\n\
  \n**注意：** 并非所有运营商都支持此功能；如果你没有看到这些选项，请访问运营商的网站了解账户详情。\n\n轻点此屏幕上的任意条目即可执行相应的请求。例如，如果你轻点**查看我的剩余分钟数**，你将收到一条短信回复，显示当前计费周期内剩余的分钟数详情。\n\
  \n轻点**查看**按钮可以查看更多详情。\n\n![图片](img/U0958.jpg)\n\n### 铃声、声音与振动\n\n你的 iPhone 可以使用独特的声音或振动来提醒你有来电、新语音邮件以及其他事件。这些设置可以通过**设置**应用轻松调整。\n\
  \n第 8 章：“个性化与安全”中的“在 iPhone 上调整声音”部分向你展示了如何更改铃声、为**静音**和**响铃**模式添加振动，以及开启或关闭语音邮件提示音。\n\
  \n### 为联系人分配专属铃声\n\n有时，为通讯录中的某个联系人设置专属铃声既有趣又实用。这样，你不用看手机就知道是谁在打电话。\n\n你可以使用 iPhone\
  \ 上已有的铃声，也可以通过以下方式之一获取新铃声：\n\n*   在 iPhone 上使用 **iTunes** 应用购买铃声。\n*   在电脑上的 iTunes\
  \ 中使用你的音乐创建并购买铃声。\n*   在电脑上的 iTunes 中使用你的音乐免费创建铃声。\n\n例如，作者之一（加里）为他儿子丹尼尔设置的铃声是埃尔顿·约翰的《丹尼尔》。在本章稍后部分，我们将向你展示如何用你的\
  \ iTunes 音乐制作铃声。\n\n#### 为联系人设置专属铃声\n\n你需要编辑**通讯录**中某人的信息来更改其铃声。请按照以下步骤为联系人设置专属铃声：\n\
  \n1.  轻点**通讯录**图标。\n2.  轻点你想要更改的联系人（此处为**丹尼尔**）。\n3.  轻点**编辑**。\n4.  轻点**铃声**按钮即可看到**铃声**屏幕。\n\
  5.  从列表中轻点任意铃声。在此例中，我们选择了新的自定义铃声**丹尼尔**。\n\n### 从 iTunes 应用购买铃声\n\n在本节中，我们将向你展示如何购买铃声（大多数价格为\
  \ 1.29 美元）。之后，你可以按照以下步骤，直接在 iPhone 的 **iTunes** 应用中将其分配给某个联系人，或将其设置为**默认铃声**：\n\n\
  1.  在 iPhone 上启动 **iTunes** 应用。\n2.  如果你在底部看到**铃声**软键，请轻点它。否则，请轻点**更多**，然后轻点**铃声**。接下来，滚动浏览铃声。或者，你也可以轻点底部的**搜索**软键来搜索铃声。\n\
  \n    ![图片](img/U0959.jpg)\n\n3.  你还可以使用顶部的按钮浏览铃声：**精选**、**热门排行榜**和**类型**。\n4. \
  \ 我们选择了**热门排行榜**，然后选择了**另类**，即可看到右侧的图片。\n\n    ![图片](img/U0960.jpg)\n\n5.  轻点任意名称或专辑封面来预览铃声。如果你喜欢，请轻点价格进行购买，然后轻点**立即购买**。\n\
  6.  选择要购买的铃声后，**iTunes** 应用会提示你**设置为默认铃声**（你的主要电话铃声）或**分配给联系人**。\n\n    ![图片](img/U0961.jpg)\n\
  \n7.  如果你选择**分配给联系人**，你的**通讯录**列表将会打开。接下来，滚动浏览或搜索该联系人。此后每当此联系人来电时，你都会听到新的铃声。\n\n\
  ### 创建自定义铃声\n\n你的 iTunes 资料库中装满了你喜爱的歌曲。如果能把自己的歌曲变成 iPhone 铃声，那该多好啊？好消息是，你可以将大部分音乐制作成铃声。有两种方法：一种简单的方法，每个铃声大约花费\
  \ 1 美元；另一种更具挑战性但免费的方法。我们将向你展示这两种方法。\n\n\n\n#### 免费但更具挑战性的铃声制作方法\n\n我们先来了解这种免费但较为复杂的方法。此方法适用于\
  \ iTunes 中所有不受 DRM（数字版权管理）保护的音乐。较早从 iTunes 购买的音乐可能包含 DRM 保护。而从 CD 或其他非 DRM 音乐（包括\
  \ iTunes 中较新的非 DRM 音乐）导入 iTunes 的任何音乐均可使用。\n\n##### 定位歌曲\n\n请按照以下步骤在 iTunes 中高亮并选择一首歌曲，作为自定义铃声的基础：\n\
  \n1. 在**iTunes**菜单中，选择**文件** ![images](img/rtrif.jpg) **显示简介**。您也可以右键点击歌曲，然后选择**显示简介**。\n\
  2. 点击**选项**选项卡，勾选**起始时间：**和**停止时间：**复选框。\n\n   ![images](img/U0962.jpg)\n\n   **注意：**确保总时长小于\
  \ 40 秒；否则铃声文件会过大。\n\n3. 点击**好**关闭**显示简介**对话框。\n\n   ![images](img/U0963.jpg)\n\n\
  4. 在**iTunes**中，点击**高级**菜单，选择**创建 AAC 版本**。\n5. 此时您应能在 iTunes 列表中看到一个仅有几秒钟长的歌曲新版本。例如，**丹尼尔**的新版本只有\
  \ 30 秒长。\n\n   ![images](img/U0964.jpg)\n\n6. 获得新的 30 秒版本后，务必返回原始歌曲，通过**显示简介** ![images](img/rtrif.jpg)\
  \ **选项**取消勾选**起始时间：**和**停止时间：**复选框。\n\n   ![images](img/U0965.jpg)\n\n7. 创建好新的较短铃声\
  \ AAC 版本后，只需将其从**iTunes**拖拽至桌面，或复制粘贴到桌面上即可。\n\n   ![images](img/U0966.jpg)\n\n8.\
  \ 您需要将文件的扩展名从`m4a`改为`m4r`，这样才能被识别为铃声。您可以点击文件高亮其名称来修改，也可以右键点击文件，选择**显示简介**，然后更改扩展名。\n\
  \n   ![images](img/U0967.jpg)\n\n9. 系统会显示警告信息，提示该文件可能无法使用；只需接受更改即可。\n10. 现在必须删除仍在\
  \ iTunes 中的 30 秒版本。\n\n    ![images](img/U0968.jpg)\n\n11. 将带有新扩展名`m4r`的文件拖回 iTunes\
  \ 资料库并放入其中。\n12. 如果一切顺利，当您点击左侧栏中的**铃声**时，应该就能看到您的铃声了。\n\n#### 将铃声同步到 iPhone\n\n\
  请参阅第 3 章：“与 iCloud、iTunes 及其他服务同步”中的“同步铃声”部分，了解如何将新铃声传输到您的 iPhone 上。\n\n#### 使用您的新自定义铃声\n\
  \n如果您想将铃声与**通讯录**列表中的特定联系人关联，则需要编辑该联系人。请按照本章“为联系人设置专属铃声”部分中的步骤进行操作。如果您想将新铃声用作手机主铃声，请按照第\
  \ 8 章：“个性化与安全”中“声音”部分的步骤操作。\n\n"
- "# 第 10 章\n\n## 短信、彩信和 iMessage\n\n`SMS`代表*短信服务*，但通常也被称为*文本信息*。短信是快速与他人取得联系的好方法，而无需通过语音通话打扰对方。有时，在无法或难以进行语音通话时，您可以发送短信并收到回复。\n\
  \n![images](img/U1001.jpg)\n\n`MMS`是*多媒体信息服务*的缩写，它提供了一种快速、标准的方式，用于发送图片、视频、语音备忘录、地图位置和名片。\n\
  \n`iMessage`是苹果公司的新服务，其功能与`SMS`和`MMS`完全相同，但通过您的数据套餐运行，且仅适用于其他 iOS 5 设备。\n\n所有这些服务都可以在您\
  \ iPhone 的**信息**应用程序中找到。在本章中，您将学习如何使用这些服务，从**通讯录**应用程序发送文本信息，以及从**照片**应用程序发送图片信息。\n\
  \n### 短信/彩信与 iMessage 的对比\n\n在 iOS 5 中，苹果将`iMessage`服务直接整合到了始终处理`SMS`和`MMS`信息的同一款**信息**应用程序中。\n\
  \n`iMessage`的优势在于它使用您现有的数据套餐，因此无需额外购买可能价格不菲的短信套餐。如果您没有短信套餐，或在没有漫游套餐的情况下旅行，`iMessage`也不会让您承担高昂的按条计费。\n\
  \n`iMessage`的缺点在于它仅适用于其他 iOS 5 设备，因此您无法与使用黑莓等非苹果智能手机或普通功能手机的朋友或家人使用该服务。\n\n`SMS`、`MMS`和`iMessage`都集成在同一个**信息**应用程序中，因此设置完成后，您无需担心必须使用哪一种。您的\
  \ iPhone 会尽可能自动使用`iMessage`，但在`iMessage`不可用时（例如，当您与不在 iOS 5 设备上的联系人发信息时），则会回退到使用`SMS`和`MMS`。\n\
  \n### iMessage 算作短信还是数据流量？\n\n`iMessages`通过运营商的移动数据网络发送，而非其`SMS`通道，因此这些信息不计入您的`SMS/MMS`套餐（如果您有有限套餐）。相反，它们会消耗您的数据套餐额度（如果您有有限数据套餐）。\n\
  \n如果您向未使用运行 iOS 5 的 iPhone、iPod touch 或 iPad 的联系人发送信息，则该信息会通过`SMS/MMS`发送，并计入您的短信套餐。\n\
  \n### 信息将如何发送？\n\n您可能拥有有限的短信条数，希望尽可能使用`iMessage`服务。或者，您可能拥有有限的数据流量，希望尽可能使用`SMS/MMS`。无论哪种情况，苹果都让您轻松辨别将使用哪个系统：\n\
  \n- 如果`iMessage`可用，从联系人姓名的背景到包含信息的气泡都将显示为**蓝色**，文本输入框会显示“iMessage”。\n- 如果`iMessage`关闭或不可用，从联系人姓名的背景到包含信息的气泡都将显示为**绿色**，文本输入框会显示“文本信息”。\n\
  \n### 启用 iMessage 并调整设置\n\n设置`iMessage`服务与设置**FaceTime**类似：\n\n1. **启动设置。**\n\n\
  \   ![images](img/U1002.jpg)\n\n2. **轻点“信息”。**\n3. **将 iMessage 开关滑到“打开”**\n4. 随后系统可能会要求您输入`iMessage`密码——这实际上就是您的苹果\
  \ iTunes 密码。\n\n**提示：**如果您卡在如所示的**正在等待激活**信息界面，请尝试按照第 26 章：故障排除中的方法重启您的设备。\n\n一旦您启用了`iMessages`选项，您的\
  \ iPhone 手机号码**和电子邮件地址**将在`iMessage`服务中注册，从其他 iOS 5 设备发送到您手机的任何信息都将通过`iMessage`发送。\n\
  \n如果您轻点`iMessage`设置屏幕底部的**接收方式**，您将看到一个类似这样的屏幕。\n\n![images](img/U1003.jpg)\n\n\
  在此屏幕上，您可以调整与您的`iMessage`关联的电子邮件地址，添加新的电子邮件地址，并更改`iMessage`的“来电显示”中显示的内容。\n\n\n\n\
  ### 在 iPhone 上发送短信\n\n短信已成为当今手机上最常用的服务之一。尽管它在欧洲和亚洲的使用更为广泛，但在北美也越来越受欢迎。\n\n其概念非常简单：无需拨打电话，而是向对方的手机发送一条简短信息。发送短信比打电话的干扰要小得多；不过，你的朋友、同事或同学中可能有人没有\
  \ iPhone，因此电子邮件可能并非总是可行之选。\n\n本书的一位作者经常用短信与他的孩子们交流——这正是他这一代人的沟通方式。“今晚回家吃饭吗？”“嗯。”就这样——与一个十八岁的年轻人完成了一次有意义的对话——简短、即时、轻松。\n\
  \n#### 编写短信\n\n编写短信与发送电子邮件十分相似。短信的妙处在于它几乎可以发送到任何手机上，并且回复起来也非常简单。\n\n#### 从“信息”App\
  \ 编写短信\n\n有几种方法可以启动你的“`信息`”应用。最简单的方法就是轻点“`主屏幕`”上的“`信息`”图标。\n\n当你首次启动“`信息`”应用时，很可能还没有任何信息，因此屏幕会是空白的。一旦你开始使用短信服务，屏幕将显示信息列表以及与你联系人当前的“进行中”对话。请按照以下步骤发送短信：\n\
  \n![图片](img/U1004.jpg)\n\n1.  轻点屏幕右上角的`编写`图标。\n\n    ![图片](img/U1005.jpg)\n\n2.\
  \  光标会立即跳转到“`收件人：`”栏。你可以开始输入联系人的姓名，也可以直接轻点“`加号`”（`+`）按钮来搜索或滚动浏览你的联系人列表。\n3.  如果你只想直接输入某人的手机号码，可以按下`123`按钮并拨号。\n\
  \n    ![图片](img/U1006.jpg)\n\n    ![图片](img/U1006a.jpg)\n\n4.  当找到你想要使用的联系人时，轻点此人的姓名，它就会出现在“`收件人：`”栏中。\n\
  5.  当你准备好输入短信内容时，请轻点屏幕中间输入框（位于`发送`按钮旁边）的任意位置。\n\n    ![图片](img/U1008.jpg)\n\n6.\
  \  键盘将会显示出来。输入你的信息，完成后轻点`发送`。\n\n    **注意**：如果你已在“`设置`”>“`信息`”中启用了字符计数器，它会显示出来。\n\
  \n**提示**：如果你喜欢，也可以使用横屏模式下更大的键盘来发送短信。使用更大的按键输入会更方便，尤其是当你的手指比较大，或者难以看清较小的按键时。\n\n\
  #### 发送短信后的选项\n\n发送短信后，窗口会变为你与联系人之间的一个“*串连*”对话窗口。如果你使用的是短信，发送的信息会显示在屏幕右侧的绿色气泡中。如果你使用\
  \ iMessage，则你发送的信息会出现在蓝色气泡中。当你的联系人回复时，他的信息会显示在屏幕另一侧的灰色气泡中。\n\n![图片](img/U1009.jpg)\n\
  \n若要离开`编写`屏幕，请轻点左上角的“`信息`”，或按下`主屏幕`按钮返回你的“`主屏幕`”。\n\n**注意：**如果信息发送失败，你会看到其旁边有一个感叹号。你还会在“`信息`”应用图标的右上角看到一个`红色感叹号`图标。\n\
  \n![图片](img/U1010.jpg)\n\n如果发生这种情况，你可以像之前一样再发送一条信息。或者，你可以呼叫该联系人，或查看他的联系人信息。\n\n\
  若要给正在与之发短信的联系人打电话，请轻点`呼叫`按钮。若要查看他的联系人信息，请轻点`联系人信息`按钮。\n\n![图片](img/U1012.jpg)\n\n\
  **提示：**虽然短信技术上限是 160 个字符，但许多 GSM 运营商（包括 AT&T）会将较长的文本拆分成多条短信，并在收到后重新组合成一条信息。像 Verizon\
  \ 这样的 CDMA 网络有时在重新组合超过 160 个字符的短信时会遇到问题；其他时候，它们可能会乱序送达。如果你遇到这个问题，可以尝试自己将短信拆分成几条较短的信息发送，而不是发送一条长信息。\n\
  \n#### 从“通讯录”编写短信\n\n你还可以启动“`短信`”应用，向 iPhone 通讯录中的任何联系人编写并发送一条短信。请按照以下步骤操作：\n\n\
  1.  通过搜索或浏览“`通讯录`”找到你想要发短信的联系人。\n\n    ![图片](img/U1013.jpg)\n\n2.  在联系人信息的底部，你会看到一个标有“`短信`”的框。轻点该框，系统会提示你选择要使用的号码（如果你为该联系人列了多个号码）。\n\
  3.  选择首选号码，然后按照前面列出的步骤操作。\n\n**注意：**请记住，你只能向手机号码发送短信。\n\n#### 回复短信\n\n当收到一条短信时，你的\
  \ iPhone 会根据你的设置播放提示音、振动，或两者皆有。此外，屏幕顶部的“`通知中心`”会显示一个提示，让你可以选择立即回复。\n\n![图片](img/U1014.jpg)\n\
  \n当你看到和/或听到提示时，只需轻点该通知即可跳转到“`信息`”应用并输入你的回复，如前所示。\n\n如果你错过了通知或想稍后回复，只需从屏幕顶部下拉“`通知中心`”列表，然后轻点你想要回复的信息。\n\
  \n**注意**：如果你的屏幕已锁定，你将看到信息以弹出窗口或“`锁定屏幕`”列表的一部分形式出现。只需滑动“`信息`”图标即可解锁，然后你将进入该信息。\n\n\
  ![图片](img/U1015.jpg)\n\n#### 查看已存储的信息\n\n一旦你开始进行一些串连对话，它们就会被存储在“`信息`”应用中。轻点“`信息`”图标，你就可以滚动浏览你的信息线程。\n\
  \n![图片](img/U1016.jpg)\n\n想要继续与某人对话，只需轻点所需的线程，它就会打开，向你展示所有过往信息的往来记录。轻点文本框，输入你的信息，然后轻点`发送`按钮即可继续对话。\n\
  \n![图片](img/U1017.jpg)\n\n#### 短信铃声与声音选项\n\n你的 iPhone 允许你设定收到信息时的反应方式。请按照以下步骤选择你偏好的提醒方式：\n\
  \n1.  启动“`设置`”应用，滚动至“`声音`”，然后轻点“`声音`”标签。\n\n    ![图片](img/U1018.jpg)\n\n2.  如果你在“`声音`”菜单中将`振动`功能设置为`开启`（当手机响铃时，请参阅第\
  \ 10 章：“将你的 iPhone 用作电话”），那么收到短信时也会伴随振动。\n3.  再向下滚动一点，你会看到一个标有“`短信铃声`”的标签。轻点此标签，你就可以选择短信的铃声。你可以选择提供的选项（通常有六个），或者选择“`无`”。\n\
  \n    ![图片](img/U1019.jpg)\n\n4.  为短信通知选择你喜欢的声音，然后轻点左上角的“`声音`”![图片](img/U1019a.jpg)按钮以确认你的选择。\n\
  \n    ![图片](img/U1020.jpg)\n\n### MMS——多媒体信息服务\n\n“`信息`”应用为 iPhone 用户提供了发送和接收 MMS\
  \ 信息（包括图片信息、视频信息以及多媒体 iMessage）所需的工具。MMS 信息会像你的短信一样，直接显示在信息窗口中。\n\n**注意**：你可以在“`信息`”应用中发送图像、视频、位置（来自地图）、音频（来自“`语音备忘录`”应用）以及电子名片\
  \ vCard（来自“`通讯录`”应用）文件。\n\n\n\n#### 使用“信息”发送图片或视频\n\n要发送彩信或多媒体 iMessage，你需要使用我们在发送短信时介绍过的同款“信息”应用。按以下步骤操作：\n\
  \n![images](img/U1021.jpg)\n\n1.  轻点“信息”图标开始发信息——就像发短信一样。\n\n    ![images](img/U1022.jpg)\n\
  \n2.  你会注意到文本输入框旁边有一个小小的“相机”图标。轻点此图标，系统会提示你“拍照或录像”或“选取现有内容”。\n\n    ![images](img/U1023.jpg)\n\
  \n3.  若要拍照，请按照第 20 章：“使用照片”中的说明操作。如果选择“选取现有内容”选项，只需浏览你的照片/视频，找到要添加到信息中的项目即可。\n\n\
  \    ![images](img/U1024.jpg)\n\n4.  轻点右下角的蓝色“选取”按钮，你会看到图片加载到小窗口中。\n\n    ![images](img/U1025.jpg)\n\
  \n5.  选择收件人（如前所示），如果需要，可以输入一条简短留言。接着，轻点蓝色的“发送”按钮。\n\n    ![images](img/U1026.jpg)\n\
  \n如果你已与该特定联系人有过会话讨论，那么他的图片会出现在该会话讨论中。\n\n![images](img/U1027.jpg)\n\n**注意**：你可以在会话讨论过程中继续交换图片和文字。而且你随时可以滚动查看整个讨论内容——包括图片和所有内容！\n\
  \n#### 从“照片”中选择图片并通过“信息”发送\n\n发送图片或视频信息的第二种方法是直接进入“照片”应用并选择一张图片。按以下步骤操作：\n\n1. \
  \ 启动“照片”应用，按照第 21 章：“使用照片”中的说明浏览你的照片。\n\n    ![images](img/U1028.jpg)\n\n2.  若要只发送一张图片，轻点你想要发送的图片，然后轻点左下角的“发送”图标。\n\
  3.  现在你会看到“信息”作为第二个选项。选择“信息”，图片就会像之前在“信息”应用中那样加载到气泡中。\n\n#### 发送多张图片\n\n按以下步骤发送多张图片：\n\
  \n1.  启动“照片”应用，就像你在上一节中所做的那样。\n\n    ![images](img/U1029.jpg)\n\n2.  不要轻点单张图片，而是轻点左下角的“操作”按钮。\n\
  3.  现在，只需轻点最多数量的图片。你会看到它们的颜色变浅，并且方框中会出现一个红色勾选标记图标。\n4.  一旦你选择了最大数量的图片（可能是 5 张、9\
  \ 张或其他数量，具体取决于你的无线运营商），请轻点左下角的“共享”按钮。\n5.  选择“信息”，图片就会出现在信息气泡中。\n\n"
- "# 第 11 章\n\n## 视频通话与 Skype\n\n你的 iPhone 为你的生活带来了许多新功能，其中一些在几年前还像是科幻小说中的情节。例如，视频通话如今不仅成为可能，而且借助全新的“FaceTime”功能变得极其易用。只要你和通话对象都使用\
  \ iPhone，并且都连接在 Wi-Fi 网络上，就可以进行无限制的视频通话。在本章中，我们将向你展示如何启用和使用“FaceTime”，以及如何开始享受这一绝佳新功能带来的乐趣。\n\
  \n通过 Wi-Fi 甚至 3G 网络进行通话，也可以通过“skype”实现——这是许多人电脑上使用的流行视频通话和聊天程序。我们还将向你展示如何使用“skype”应用。\n\
  \n说到视频，你的 iPhone 是一款功能强大的视频录像机。你可以录制并导出高达 1080p 分辨率、每秒 30 帧的高清视频。然后，你可以直接将视频发布到\
  \ YouTube 或 iCloud，甚至通过电子邮件发送给收件人。我们还将向你展示如何拍摄并快速“修剪”你的视频，以及如何上传它们。\n\n### 视频通话\n\
  \n多年来，我们在电视剧和电影中看到过像这样的未来技术首次亮相。例如，许多剧集和电影中展示了人们使用小巧便携的手机进行视频对话的场景。甚至 20 世纪 70 年代的《摩登原始人》卡通片也将其视为一个未来概念。\n\
  \niPhone 让这种未来构想今天变成了现实。有几款应用可以让你使用 iPhone 的前置摄像头进行视频通话。目前，只有一款应用允许你同时使用前置摄像头和后置摄像头：“FaceTime”。\n\
  \n#### 使用 FaceTime 进行视频通话\n\n“FaceTime”是苹果公司在许多 iPhone 广告中重点宣传的专属应用。本质上，“FaceTime”是一种免费\
  \ Wi-Fi 通话，让你可以通过手机的前置摄像头看到通话另一端的对方。\n\n**注意：** 目前，“FaceTime”仅适用于近期 iOS 设备（如 iPhone\
  \ 4、iPhone 4S、iPad 2 和 iPod touch 4）以及 Mac 电脑之间的视频通话。同时，它仅支持通过 Wi-Fi 网络使用。苹果表示正在探索扩展这项服务，因此不久的将来它也能在标准的\
  \ 3G 网络上运行。不过，运营商也需要参与其中，你才能在特定网络上看到这项功能。\n\n##### 在你的 iPhone 上启用 FaceTime 通话\n\n\
  当你首次使用设备时，“FaceTime”可能尚未启用。要启用 iPhone 接收和拨打“FaceTime”通话，请按以下步骤操作：\n\n1.  启动“设置”应用。\n\
  \n    ![images](img/U1101.jpg)\n\n2.  轻点“FaceTime”。\n3.  将“FaceTime”开关切换至“打开”位置。\n\
  \n系统可能会要求你使用 Apple ID 登录。\n\n**提示：** 你也可以滚动到底部并轻点“来电显示”，以调整你的电话号码或电子邮件地址是否显示为你的“FaceTime”来电显示。\n\
  \n##### 使用 FaceTime\n\n一旦“FaceTime”启用，你会在每次从 iPhone 拨打电话时看到它作为一个选项。“FaceTime”图标将出现在所有电话的选项显示中。然而，只有当通话另一方使用的是支持“FaceTime”的\
  \ iOS 设备或 Mac 时，“FaceTime”才会起作用。\n\n![images](img/U1102.jpg)\n\n要发起“FaceTime”通话，请按以下步骤操作：\n\
  \n1.  像在 iPhone 上正常拨打电话一样。\n2.  轻点“FaceTime”按钮（通常位于“保留”按钮的位置），应用会询问通话另一端的对方是否“接受”“FaceTime”通话。\n\
  3.  或者，你也可以直接“接受”来自另一方的“FaceTime”通话（参见图 11–1）。\n\n![images](img/1101.jpg)\n\n**图\
  \ 11–1.** *接受“FaceTime”通话*\n\n一旦“FaceTime”通话发起，请按以下步骤进行视频会议：\n\n1.  将手机稍微拿远一些。\n\
  2.  确保你在窗口中的位置*构图*得当。\n3.  你可以将包含自己小图像的画面拖动到屏幕上的方便位置。\n4.  轻点“切换摄像头”按钮，向“FaceTime”通话对象展示你正在观看的内容。“切换摄像头”按钮现在将使用\
  \ iPhone 背面的标准摄像头。在图 11–2 中，我看到了 Martin 度假时科罗拉多州的美景，而他则看到了我的狗在沙发上！\n5.  轻点“结束”按钮以结束“FaceTime”通话。\n\
  6.  轻点“静音”按钮以暂时将通话静音。\n\n![images](img/1102.jpg)\n\n**图 11–2.** *在“FaceTime”通话中切换摄像头视图*\n\
  \n\n\n### 使用 Skype 拨打电话及更多功能\n\n社交网络的核心在于与朋友、同事和家人保持联系。通过像 [`www.facebook.com`](http://www.facebook.com)\
  \ 和 `Google+` 这样的网站进行被动沟通固然不错，但有时没有什么能替代听到对方声音的体验。\n\n令人惊叹的是，你可以使用任何 iPhone 上的 `skype`\
  \ 应用拨打语音和视频电话。拨打给全球其他 Skype 用户的电话是免费的。Skype 服务的一个优点是它可以在电脑和许多移动设备上运行，包括 iPhone 4S、旧款\
  \ iPhone、iPad、iPod touch、部分黑莓智能手机以及其他移动设备。拨打给手机和固定电话会收费，但价格合理。\n\n![images](img/U1103.jpg)\n\
  \n![images](img/U1104.jpg)\n\n**注意**：与 `FaceTime` 不同，`skype` 应用可以通过 3G 网络发起视频通话。它还可以在后台运行，因此你可以随时接听来电的\
  \ Skype 电话（注意，这通常会导致电池消耗更快）。\n\n## 将 Skype 下载到你的 iPhone\n\n你可以从 App Store 搜索“Skype”并安装来下载免费的\
  \ `skype` 应用。如果在此过程中需要帮助，请查看第 23 章：“神奇的 App Store”。\n\n## 创建你的 Skype 账号\n\n如果你需要设置\
  \ Skype 账号，并且尚未通过电脑完成（请参阅本章后面的“在电脑上使用 Skype”部分）。\n\n## 登录 Skype 应用\n\n创建账号后，你就可以在\
  \ iPhone 上登录 `skype` 了。请按照以下步骤操作：\n\n1.  如果你尚未进入 `skype`，请从 `Home` 屏幕点击 `skype`\
  \ 图标。\n\n    ![images](img/U1105.jpg)\n\n2.  输入你的 Skype 用户名和密码。\n3.  点击右上角的 `sign\
  \ In` 按钮。\n4.  你无需再次输入此登录信息；它已保存在 `skype` 中。下次点击 `skype` 时，它将自动为你登录。\n\n## 查找并添加\
  \ Skype 联系人\n\n登录 `skype` 应用后，你将希望开始与人沟通。为此，你需要找到他们并将其添加到你的 `skype` 联系人列表中：\n\n\
  1.  如果你尚未进入 `skype` 应用，请从 `Home` 屏幕点击 `skype` 图标，并在系统提示时登录。\n2.  点击底部的 `Contacts`\
  \ 软键。\n3.  点击顶部的 `search` 窗口，然后输入某人的姓名或 `skype` 用户名。点击 `search` 找到此人。\n\n    ![images](img/U1106.jpg)\n\
  \n4.  看到你想添加的人后，点击其姓名。\n5.  如果不确定此人是否正确，请点击 `View Full Profile` 按钮。\n\n    ![images](img/U1107.jpg)\n\
  \n6.  点击底部的 `Add Contact`。\n7.  适当调整邀请消息。\n\n    ![images](img/U1108.jpg)\n\n8.\
  \  点击 `send` 按钮，向此人发送成为你 `skype` 联系人的邀请。\n9.  重复此步骤以添加更多联系人。\n10. 完成后，点击底部的 `Contacts`\
  \ 软键。\n11. 从 `Groups` 屏幕点击 `All Contacts`，查看你添加的所有新联系人。\n12. 一旦此人接受你为联系人，你将看到其出现在\
  \ `All Contacts` 屏幕的联系人列表中。\n\n**提示：** 有时你想删除某个 Skype 联系人。你可以通过从联系人列表中点击其姓名来移除或阻止联系人。点击\
  \ `settings` 图标（右上角），然后选择 `Remove from Contacts` 或 `Block`。\n\n![images](img/U1109.jpg)\n\
  \n## 在 iPhone 上使用 Skype 拨打电话\n\n到目前为止，你已经创建了账号并添加了联系人。现在，你终于可以在 iPhone 上使用 `skype`\
  \ 拨出第一通电话了：\n\n1.  点击底部的 `Contacts` 软键。\n\n    ![images](img/U1110.jpg)\n\n2.  点击\
  \ `All Contacts` 查看你的联系人。\n3.  点击你想拨打的联系人姓名。\n4.  点击 `Call` 按钮进行语音通话，或点击 `Video\
  \ Call` 按钮进行视频通话。\n5.  你可能会看到一个 Skype 按钮和一个移动电话或其他电话按钮。按下 Skype 按钮即可免费通话。拨打任何其他电话都需要使用\
  \ Skype 点数付费。\n\n**注意：** 你可以在 iPhone 上使用 `skype Out` 免费拨打免费电话号码。以下说明来自 Skype 网站\
  \ [`www.skype.com`](http://www.skype.com)：\n\n“支持以下国家和号码范围，对所有用户免费。我们正在努力覆盖世界其他地区。法国：+33\
  \ 800、+33 805、+33 809 波兰：+48 800 英国：+44 500、+44 800、+44 808 美国：+1 800、+1 866、+1\
  \ 877、+1 888 台湾：+886 80”\n\n## 在 iPhone 上使用 Skype 接听电话\n\niPhone 原生支持后台 VoIP 通话。借助新版\
  \ `skype`，你可以让 `skype` 在后台运行，并在有来电时接听 `skype` 电话。理论上，你甚至可以在进行语音通话时再接听你的 `skype`\
  \ 电话！\n\n**提示：** 如果你不想让 `skype` 在后台运行，但仍想给某个你知道也在 iPhone 上使用 `skype` 的人打电话，只需给她发一封简短的电子邮件或快速打个电话，提醒她你想用\
  \ `skype` 应用与她通话。\n\n### 购买 Skype 点数或月度订阅\n\nSkype 用户之间的通话是免费的。但是，如果你想通过 `skype`\
  \ 应用拨打固定电话或手机，则需要购买 Skype 点数或购买月度订阅套餐。如果你尝试在 `skype` 应用内购买点数或订阅，它会将你带到 Skype 网站。因此，我们建议使用\
  \ iPhone 上的 `safari` 或电脑的网页浏览器来购买这些点数。\n\n**提示：** 在注册订阅套餐之前，你可能想先购买少量 Skype 点数试用该服务。如果你打算经常使用\
  \ Skype 与非 Skype 用户（例如，普通固定电话和手机）通话，订阅套餐是更好的选择。\n\n按照以下步骤使用 `safari` 购买 Skype 点数：\n\
  \n1.  点击 `safari` 图标。\n2.  在顶部的地址栏中输入 [`www.skype.com`](http://www.skype.com)，然后点击\
  \ `Go`。\n3.  点击页面顶部的 `sign In` 链接。\n4.  输入你的 Skype 用户名和密码，然后点击 `sign me in`。\n5.\
  \  如果你尚未进入 `Account` 屏幕，请点击顶部导航栏右侧的 `Account` 标签。\n6.  此时，你可以选择购买点数或订阅：\n    * \
  \  点击 `Buy pre-pay credit` 按钮，购买固定金额的点数。\n    *   点击 `Get a subscription` 按钮，购买月度订阅账户。\n\
  7.  最后，根据购买类型完成支付说明。\n\n## 使用 Skype 聊天\n\n除了拨打电话，你还可以通过 iPhone 与其他 `skype` 用户进行文字聊天。开始聊天与开始通话非常相似；请按照以下步骤操作：\n\
  \n1.  如果你尚未进入 `skype`，请点击 `skype` 图标。\n2.  点击底部的 `Contacts` 软键。\n\n    ![images](img/U1111.jpg)\n\
  \n3.  点击 `All Contacts` 查看所有联系人。\n4.  点击你想聊天的联系人姓名。\n5.  点击 `Chat` 按钮。\n6.  输入你的聊天文字，然后按下\
  \ `send` 按钮。你的聊天内容将显示在屏幕顶部。\n\n    ![images](img/U1112.jpg)\n\n\n\n#### 将 Skype\
  \ 添加到你的电脑\n\n你也可以在电脑上使用 `skype` 应用。接下来我们将向你展示具体操作方法。如果你的电脑连接了网络摄像头，你还可以使用 `skype`\
  \ 进行视频通话。\n\n**注意：**当你从电脑呼叫 iPhone 时，将无法进行视频通话。\n\n要创建 Skype 账户并下载适用于电脑的 `skype`\
  \ 软件，请按照以下步骤操作：\n\n1. 在电脑上打开一个网页浏览器。\n2. 访问：[www.skype.com](http://www.skype.com)。\n\
  3. 点击页面顶部的 **加入** 链接。\n4. 填写所有必填信息并点击 **继续** 按钮来创建你的账户。请注意，你只需要在带星号（*）标记的必填字段中输入信息。例如，你无需填写性别、出生日期或手机号码。\n\
  5. 到此，账户设置过程就完成了。接下来，你会看到购买 Skype 点数的选项；不过，对于免费的 Skype 对 Skype 通话、视频通话或聊天来说，这并非必需。\n\
  \n   **提示：**只有当你想给未使用 `skype` 的人打电话时才需要付费。例如，拨打固定电话或手机（未使用 `skype`）会收取费用。撰写本文时，即付即用费率约为\
  \ 2.1 美分；不同通话套餐的月订阅费用从大约 3 美元到 14 美元不等。\n\n6. 接下来，点击网站顶部导航栏中的 `Get Skype` 链接，将 `skype`\
  \ 下载到你的电脑。\n7. 点击 **获取 Windows 版 Skype** 按钮或 **获取 Mac 版 Skype** 按钮。\n8. 按照说明安装该软件。\n\
  9. 软件安装完成后，启动它并使用你的 Skype 账户登录。\n10. 现在，你可以开始与任何其他使用 `skype` 的人（包括你所有在 iPhone 上装有\
  \ `skype` 的朋友）发起（或接听）电话、视频通话和聊天。\n\n### 视频录制\n\n除了让你进行视频通话和聊天之外，iPhone 还允许你使用内置录像机录制功能完整的视频。你可以用\
  \ iPhone 拍摄 1080p 高清视频，然后将此视频上传到 Facebook、YouTube 或 iCloud。你也可以通过彩信或电子邮件发送你的视频。\n\
  \n**注意：**分享视频时，视频会被压缩，因此画质将不再是 1080p。\n\n接下来，我们将展示如何直接在 iPhone 上录制视频和修剪视频。你还将学习如何直接在\
  \ iPhone 上制作高质量的高清视频。\n\n#### 启动录像机\n\n录像机的软件实际上是 **相机** 应用的一部分（参见 图 11–3）。按照以下步骤使用内置录像机：\n\
  \n1. 启动 **相机** 应用。将右下角的滑块从 **相机** 图标移动到 **录像机** 图标。\n2. 点击右上角的 **切换摄像头** 按钮，在后置摄像头和前置摄像头之间切换。\n\
  3. 录制场景时尽量保持 iPhone 稳定。\n4. 录制完成后，点击 **停止** 按钮。\n\n![images](img/1103.jpg)\n\n**图\
  \ 11–3.** *录像机的布局与控件*\n\n##### 调整视频焦点\n\niPhone 可以根据拍摄对象自动调整视频的焦点。按照以下步骤利用此功能：\n\
  \n1. 若要对视频前景中的某个物体进行对焦，请点击屏幕前景区域。此时会显示一个小方框，指示对焦区域。\n2. 若要将焦点切换到背景中的某个对象，请点击屏幕的另一部分。对焦框会临时显示新的对焦区域。\n\
  \n##### 修剪视频\n\niPhone 允许你直接在手机上对视频进行编辑。视频录制完毕并点击 **停止** 按钮后，视频会立即存入你的 **相机胶卷**。\n\
  \n点击左下角的视频缩略图即可调出该视频。在屏幕顶部，你会看到一个时间线，显示你视频的所有帧（参见 图 11–4）。按照以下步骤编辑你刚刚录制的视频：\n\n\
  1. 拖动时间线的任一端，你会看到视频进入修剪模式。\n2. 拖动视频两端的边缘，直至达到你想要的长度。\n3. 当视频长度合适时，点击右上角的 **修剪**\
  \ 按钮。\n4. 接下来，选择 **修剪原片** 或 **存储为新剪辑**。后一个选项会保存一个经过修剪的新视频版本。\n\n![images](img/1104.jpg)\n\
  \n**图 11–4.** *修剪视频*\n\n##### 发送视频\n\n与照片一样，你也有多种方式可以通过 iPhone 将录制的视频发送给他人。按照以下步骤从你的\
  \ iPhone 发送视频：\n\n1. 点击左下角的 **发送** 图标 ![images](img/U1113.jpg)。\n2. 选择你偏好的视频发送方式：**电子邮件**、**信息**\
  \ 或 **发送到 YouTube**。\n3. 你接下来看到的屏幕取决于你在第 2 步中所做的选择。如果你选择了 **电子邮件**，你的 **邮件** 应用将会启动。如果你选择了\
  \ **信息**，你的 **信息** 应用将会启动，以此类推。\n\n   **注意：**要将视频上传到 YouTube，你需要拥有该网站的账户。\n\n"
- "# 第 12 章\n\n### 播放音乐\n\n在本章中，我们将向你展示如何将你的 iPhone 变成一台绝佳的音乐播放器。由于 iPhone 出自苹果公司——正是它让如今家喻户晓的\
  \ iPod 电子音乐播放器得以普及——因此，你完全可以期待它具备一些出色的功能，而事实也确实如此。我们将为你介绍如何播放和管理从 iTunes 购买或从电脑同步的音乐，如何以多种方式查看播放列表，以及如何快速找到歌曲。你将学会如何使用\
  \ Genius 功能，让 iPhone 在你的音乐库中定位并归类相似的歌曲——有点像只播放你喜欢音乐的电台。\n\n**提示：**在第 22 章“你设备上的\
  \ iTunes”中，你将学习如何直接在 iPhone 上购买音乐以及使用 Ping（音乐爱好者的社交网络）。\n\n你还将了解如何使用一款名为 Pandora\
  \ 的应用来流播音乐。使用 Pandora，你可以从众多网络电台中进行选择，也可以通过输入你最喜欢的艺术家姓名来创建自己的电台，而且这一切都是免费的。\n\n\
  ### 将你的 iPhone 用作音乐播放器\n\n你的 iPhone 可能是当今市场上最好的音乐播放器之一。触控屏使得与音乐、播放列表、专辑封面以及音乐库的组织进行交互和管理变得轻而易举。你甚至可以通过蓝牙将\
  \ iPhone 连接到家庭音响或车载音响，从而通过 iPhone 聆听美妙的立体声音乐！\n\n**提示：**请参阅第 5 章“AirPlay 与蓝牙”，了解如何将你的\
  \ iPhone 连接到蓝牙立体声音箱或车载音响。\n\n无论你是使用内置的 **音乐** 应用，还是像 **Pandora** 这样的网络电台应用，你都会发现在\
  \ iPhone 上对音乐的控制达到了前所未有的程度。\n\n\n\n### 音乐应用\n\n大部分音乐通过**音乐**应用来管理——其图标位于**主屏幕**上，通常在最底部的图标栏中，它是右边最后一个图标。\n\
  \n![images](img/U1201.jpg)\n\n**注意：** 对于所有熟悉 iOS 5 之前 iPhone 的读者来说，是的，音乐播放应用曾被称为\
  \ **iPod** 应用。现在它被简称为**音乐**应用。\n\n轻点 `Music` 图标，如图 12–1 所示，你会看到底部有五个软按键：\n\n*  \
  \ **播放列表** 可让你查看从电脑同步的播放列表，以及在 iPhone 上创建的播放列表。\n*   **艺人** 可让你查看按字母顺序排列的艺人列表（像通讯录一样可以搜索）。\n\
  *   **歌曲** 可让你查看按字母顺序排列的歌曲列表（同样可以搜索）。\n*   **专辑** 可让你按专辑标题浏览音乐。\n*   **更多** 可让你查看有声书、选集、作曲家、流派、iTunes\
  \ U 和播客。\n\n![images](img/1201.jpg)\n\n**图 12–1.** *底部带有软按键的音乐应用*\n\n## 编辑软按键\n\n\
  iPhone 上一个非常酷的功能是，你可以编辑**音乐**应用底部的软按键，真正地对其自定义以满足你的需求和品味。要执行此操作，首先轻点**更多**按钮。\n\n\
  然后轻点屏幕左上角的**编辑**按钮。\n\n![images](img/U1202.jpg)\n\n屏幕会切换，显示可以拖拽到底部栏的各种图标。\n\n![images](img/1202.jpg)\n\
  \n**图 12–2.** *更改**音乐应用**中的软按键。*\n\n假设你想用**有声书**图标替换**专辑**图标。只需长按**有声书**图标，并将其拖拽到底部栏中**专辑**图标的位置。到达后，松开图标，**有声书**图标就会取代原来**专辑**图标的位置。你可以在此**配置**屏幕上对任意图标进行此操作。完成后，轻点屏幕右上角的**完成**按钮。\n\
  \n**提示：** 你也可以通过沿软按键行来回拖放图标来重新排列底部图标的顺序。\n\n## 播放列表视图\n\n**注意：** 播放列表是你创建的一个歌曲列表，可以包含任何你感兴趣的流派、艺人、录制年份或歌曲合集。\n\
  \n![images](img/U1203.jpg)\n\n许多人会将特定流派的音乐归类在一起，比如古典或摇滚。其他人可能会创建快节奏音乐的播放列表，并称之为锻炼或跑步音乐。你可以利用播放列表以几乎任何你想要的方式来组织你的音乐。\n\
  \n你可以在电脑上的 iTunes 中创建播放列表，然后同步到你的 iPhone（请参阅 iTunes 指南），或者直接在你的 iPhone 上创建播放列表，我们将在下一节中描述。\n\
  \n一旦你将播放列表同步到 iPhone 或在其上创建了播放列表，它就会显示在**音乐**屏幕左侧的**资料库**下。\n\n如果左侧列出了多个播放列表，只需轻点你想要收听的那个名称。\n\
  \n**注意：** 你可以在 iPhone 上编辑某些播放列表的内容。但是，你无法在 iPhone 本身上编辑 Genius 播放列表。\n\n## 在 iPhone\
  \ 上创建播放列表\n\niPhone 允许你创建独特的播放列表，这些列表可以与你的电脑编辑和同步。假设你想向 iPhone 播放列表中添加一些新的音乐选择。只需按照我们下面展示的方式创建播放列表并添加歌曲。你可以随时更改播放列表，移除旧歌曲并添加新歌曲——再简单不过了！\n\
  \n要在 iPhone 上创建新播放列表，轻点 **Genius 播放列表** 下方的**添加播放列表**标签。\n\n![images](img/U1204.jpg)\n\
  \n为你的播放列表起一个独特的名称（我们将其命名为“骑行音乐”），然后轻点**存储**。\n\n![images](img/U1205.jpg)\n\n现在你会看到**歌曲**屏幕。轻点你想添加到新播放列表中的任何歌曲名称。\n\
  \n当歌曲变灰时，表明它已被选中，将被添加到播放列表中。\n\n**注意：** 不要因为试图移除或取消选择你误点的歌曲而感到挫败。你无法在此屏幕上移除或取消选择歌曲；你必须点击**完成**，然后在下一个屏幕上移除它们，正如我们所描述的那样。\n\
  \n选择右上角的**完成**，播放列表的内容将会显示出来。\n\n## 搜索音乐\n\n来自**音乐**应用的几乎所有视图（**播放列表**、**艺人**、**歌曲**等）在屏幕顶部都有一个搜索窗口。\n\
  \n![images](img/U1206.jpg)\n\n如果你看不到搜索窗口，轻点顶部的（时间）即可立即使其可见。\n\n在搜索窗口中轻点一次，然后输入艺人、专辑、播放列表或歌曲名称的几个字母，即可立即看到所有匹配项目的列表。这是在\
  \ iPhone 上快速找到想要收听或观看的内容的最佳方式。\n\n### 在音乐应用中更改视图\n\n**音乐**应用在显示和分类音乐的方式上非常灵活。有时，你可能希望按艺人查看列出的歌曲。其他时候，你可能更想查看特定的专辑或歌曲。iPhone\
  \ 允许你轻松更改视图，以帮助管理和播放你在特定时刻想要的音乐。\n\n在你的**音乐**应用中，你可以使用以下视图：\n\n*   **艺人视图** - 显示所有按艺人排列的音乐列表。\n\
  *   **歌曲视图** - 显示所有按每首歌曲名称排列的音乐。\n*   **专辑视图** - 显示所有按专辑名称排列的音乐。\n*   **流派视图** -\
  \ 显示所有按类型或流派排列的音乐。\n*   **作曲家视图** - 显示按作曲家姓名排列的音乐。\n*   **有声书** - 显示你所有的有声书。\n*\
  \   **选集** - 显示所有选集。\n*   **iTunes U** - 显示所有 iTunes U 内容。\n*   **播客** - 显示你所有的播客。\n\
  \n### 查看专辑中的歌曲\n\n当你在**专辑**视图中时，只需轻点一张专辑封面或名称，屏幕会滑动，显示该专辑中的歌曲（参见图 12–3）。\n\n**提示：**\
  \ 当你开始播放一张专辑时，专辑封面可能会放大以填满屏幕。轻点屏幕一次可调出（或隐藏）顶部和底部的控制项。你可以使用这些控制项来管理歌曲和屏幕，如下所述。\n\n\
  要查看正在播放的专辑中的歌曲，请轻点**列表**按钮，专辑封面会翻转，显示该专辑中的所有歌曲。正在播放的歌曲旁边会有一个蓝色小箭头。\n\n![images](img/U1207.jpg)\n\
  \n![images](img/1203.jpg)\n\n**图 12–3.** *轻点**列表**按钮查看特定专辑中的歌曲。*\n\n轻点歌曲列表上方的标题栏可返回专辑封面视图。\n\
  \n## 使用 Cover Flow 导航\n\nCover Flow 是一种专有的、非常酷的通过专辑封面浏览音乐的方式。如果你在**音乐**应用中播放一首歌曲，然后将\
  \ iPhone 横向旋转至横屏模式，你的 iPhone 会自动切换到 **Cover Flow**。\n\n![images](img/U1208.jpg)\n\
  \n### 在 Cover Flow 中查看歌曲\n\n只需轻点一张专辑封面，封面就会翻转，显示该专辑中的所有歌曲。\n\n要查看当前正在播放的歌曲（在 Cover\
  \ Flow 视图中），轻点专辑封面，它会翻转过来，显示该专辑中的歌曲（图 12–4）。当前正在播放的歌曲旁边会有一个蓝色小箭头。\n\n![images](img/1204.jpg)\n\
  \n**图 12–4.** *你可以使用 **Cover Flow** 查看专辑的内容。*\n\n轻点（歌曲列表上方的）标题栏，专辑封面将再次显示。然后，你可以继续滑动浏览你的音乐，直到找到你正在寻找的内容。\n\
  \n**注意：** 你也可以轻点右下角的小“i”图标，专辑封面会翻转，显示歌曲，效果和你轻点封面一样。\n\n\n\n### 播放音乐\n\n既然你已经知道如何查找音乐，那么现在就来播放它吧！通过上述任意方法找到一首歌或浏览到一个播放列表。只需轻点歌曲名称，它便会开始播放。\n\
  \n此屏幕会显示所选歌曲所属专辑的封面图片，顶部则是歌曲名称。\n\n![images](img/U1209.jpg)\n\n在屏幕底部，你可以找到`音量`滑块，以及`上一首`、`播放/暂停`和`下一首`按钮。\n\
  \n若要查看专辑中的其他歌曲，只需双击专辑封面，屏幕便会翻转，显示所有其他歌曲。\n\n你也可以点击右上角的`列表`按钮，查看专辑中的歌曲列表。\n\n####\
  \ 暂停与播放\n\n点击暂停符号（如果歌曲正在播放）或播放箭头（如果音乐已暂停），即可停止或恢复播放歌曲。\n\n#### 播放上一首或下一首歌曲\n\n若你正在播放列表中，点击`下一首`箭头（位于`播放/暂停`按钮右侧）将跳转到列表中的下一首歌。若你正按专辑浏览音乐，点击`下一首`则会跳转到专辑中的下一首歌。点击`上一首`按钮则执行相反操作。\n\
  \n**注意：** 如果歌曲正处于开头位置，`上一首`将跳转到前一首歌。如果歌曲正在播放，`上一首`会回到当前歌曲的开头（再次点击则会跳转到前一首歌）。\n\n\
  #### 调节音量\n\n在 iPhone 上有两种调节音量的方法：使用设备外部的`音量`按钮，或使用屏幕上的`音量滑块`控制。\n\n![images](img/U1210.jpg)\n\
  \n设备外部的`音量`按钮位于机身左上角。按下`音量加`键（上方按钮）或`音量减`键可提高或降低音量。调节音量时，你会看到`音量滑块`随之移动。你也可以直接长按并拖动`音量滑块`来调节音量。\n\
  \n**提示：** 若要快速静音，请长按`音量减`键，音量会逐渐降至最低。\n\n#### 双击主屏幕按钮呼出媒体控制\n\n你可以在 iPhone 上处理其他事务（如阅读和回复邮件、浏览网页或玩游戏）的同时播放音乐。借助\
  \ iPhone 的全新多任务功能，快速双击底部的`主屏幕`按钮，然后向右滑动，即可在多任务窗口中调出“正在播放”媒体控制。这些控制选项允许你跳转到上一首、暂停或播放当前歌曲、跳转到下一首，或直接跳转到播放歌曲的应用。\n\
  \n**注意：** 小组件会显示上次播放音频或视频的应用。因此，如果上次使用的是`Pandora`，你会看到`Pandora`而非`音乐`，并且小组件将控制`Pandora`，`视频`、`YouTube`等应用同理。\n\
  \n![images](img/U1211.jpg)\n\n**提示**：按住`上一首`控制，歌曲将会快退；按住`下一首`控制，歌曲将会快进。\n\n####\
  \ 重复播放、随机播放及在歌曲内跳转\n\n在播放模式下，点击专辑封面上的任意位置，即可激活额外的控制选项。此时，你会在顶部看到一个额外的滑块（进度条），以及`重复`、`随机播放`和`Genius`符号。\n\
  \n![images](img/U1212.jpg)\n\n#### 跳转到歌曲的特定部分\n\n向右拖动进度条，你会看到歌曲的已播放时间（显示在最右侧）随之变化。若要寻找歌曲的特定段落，请拖动滑块，然后松手并试听，确认是否定位到正确位置。\n\
  \n![images](img/U1213.jpg)\n\n#### 重复播放单首歌曲或所有歌曲\n\n若要重复播放当前收听的歌曲，请双击顶部控制左侧的`重复`符号，直至其变为蓝色并显示数字\
  \ 1。\n\n![images](img/U1214.jpg)\n\n若要重复播放播放列表、歌曲列表或专辑中的所有歌曲，请点击`重复`图标，直至其变为蓝色（且不显示数字\
  \ 1）。\n\n![images](img/U1215.jpg)\n\n若要关闭`重复`功能，请再次点击该图标，直至其变回白色。\n\n![images](img/U1216.jpg)\n\
  \n#### 随机播放\n\n如果你正在收听播放列表、专辑或任何其他类别或列表的音乐，你可能会不想按顺序收听。你可以点击`随机播放`符号，音乐便会以随机顺序播放。当图标为蓝色时，表示`随机播放`已开启；为白色时，则表示关闭。\n\
  \n![images](img/U1217.jpg)\n\n##### 摇动以随机播放\n\n`摇动以随机播放`功能是在上一代 iPhone 中引入的。因此，要开启`随机播放`模式，你只需摇动一下\
  \ iPhone 即可切换歌曲，然后再摇动一下。每次摇动 iPhone，你都会跳转到列表中随机选择的下一首歌曲。\n\n![images](img/U1218.jpg)\n\
  \n![images](img/U1219.jpg)\n\n**提示**：如果你打算手持 iPhone 跳舞，请关闭`摇动以随机播放`！\n\n你可以在`设置`菜单中开启`摇动以随机播放`。\n\
  \n1.  点击`设置`图标。\n2.  向下滚动并点击`音乐`图标。\n3.  将`摇动以随机播放`开关拨至`开启`或`关闭`。\n\n#### 正在播放\n\
  \n有时，你在浏览播放列表或专辑时过于投入，以至于深陷菜单之中，然后只想回到当前收听的歌曲。幸运的是，这总是非常简单——大多数音乐屏幕的右上角都有一个`正在播放`图标，点击它即可。\n\
  \n![images](img/U1220.jpg)\n\n#### 查看专辑中的其他歌曲\n\n你可能会决定收听同一专辑中的另一首歌曲，而不是播放列表或流派列表中的下一首。\n\
  \n在`正在播放`屏幕的右上角，你会看到一个小按钮，上面有三条横线。\n\n![images](img/U1222.jpg)\n\n点击该按钮，视图会切换为一张小尺寸的专辑封面图像。此时，屏幕会显示该专辑中的所有歌曲。\n\
  \n![images](img/U1223.jpg)\n\n点击列表中的另一首歌曲，该歌曲便会开始播放。\n\n**注意：** 如果你正处在播放列表或`Genius\
  \ 播放列表`中，跳转到专辑中的另一首歌曲后，将不会自动返回原播放列表。若要返回该播放列表，你需要返回到播放列表库，或点击`Genius`创建新的`Genius\
  \ 播放列表`。\n\n#### 调整音乐设置\n\n你可以调整多项设置，以优化 iPhone 上的音乐播放体验。在`设置`菜单中可以找到这些选项。只需点击`主屏幕`上的`设置`图标即可。\n\
  \n![images](img/U1224.jpg)\n\n在`设置`屏幕中间，点击`音乐`选项卡，进入`音乐`设置屏幕。你可以在此屏幕上调整六项设置：`摇动以随机播放`、`音量平衡`、`均衡器`、`音量限制`、`歌词与播客信息`以及`按专辑演出者分组`。\n\
  \n你还会找到`家庭共享`的登录区域，这让你可以从 Windows 或 Mac 电脑上的 iTunes 流播放音乐。\n\n#### 使用音量平衡（自动音量调节）\n\
  \n由于歌曲的录制音量不同，有时在播放过程中，某首歌曲听起来可能比另一首响亮得多。`音量平衡`可以消除这种差异。如果将`音量平衡`设置为`开启`，所有歌曲将以大致相同的音量播放。\n\
  \n![images](img/U1225.jpg)\n\n\n\n### EQ（声音均衡器设置）\n\n声音均衡是非常个人化和主观的。有些人喜欢在音乐中听到更多低音，有些人喜欢更多高音，还有些人喜欢更夸张的中音。无论你的音乐口味如何，总有一款`EQ`设置适合你。\n\
  \n![images](img/U1226.jpg)\n\n**注意：**使用`EQ`设置会在一定程度上降低电池续航能力。\n\n只需轻触`EQ`标签，然后选择你最常听的音乐类型，或者选择一个特定选项来增强高音或低音。尝试、享受乐趣，找到最适合你的设置。\n\
  \n### 音量限制（以合理水平安全听音乐）\n\n这是家长控制孩子 iPhone 音量的好方法。这也是确保你不会通过耳机听得太大声而损伤耳朵的好方法。你只需将滑块移动到音量限制位置，然后锁定该限制即可。\n\
  \n![images](img/U1227.jpg)\n\n要锁定音量限制，请轻触`Lock Volume Limit`按钮并输入一个 4 位密码。系统会提示你再次输入密码，之后音量限制将被锁定。\n\
  \n### 使用家庭共享\n\n如果你和我们一样，你大电脑硬盘上的音乐可能远多于 iPhone 能容纳的。有了 iPhone 和家庭共享，这都不是问题。\n\n\
  ![images](img/U1228.jpg)\n\n只要你和电脑在同一个 Wi-Fi 网络上，你就可以将桌面 iTunes 资料库中的任何内容直接流式传输到你的\
  \ iPhone 上。\n\n要启用家庭共享，请确保你的电脑已使用你的 iTunes 电子邮件地址和密码登录到家庭共享，然后在你的 iPhone 上使用同一个账户登录家庭共享。\n\
  \n登录后，你可以在本地（iPhone）和远程（桌面 iTunes）资料库之间进行选择。操作方法如下：\n\n1.  启动`Music`应用\n\n    ![images](img/U1229.jpg)\n\
  \n2.  轻触右下角的`More`标签\n3.  轻触列表底部的`shared`标签。（如果你没有看到`shared`标签，请仔细检查你的 iPhone 和电脑是否都使用同一个\
  \ iTunes 账户登录了家庭共享）\n4.  从`shared`列表中选择你桌面电脑的名称，在此示例中是`MacPro`。（你可以共享多个 iTunes 资料库，因此可能会有几个选项供你选择。）\n\
  \n你的 iPhone 资料库将消失，取而代之的是桌面 iTunes 资料库。它的外观与你的 iPhone 资料库完全相同，只是内容不同。\n\n要切换回你的\
  \ iPhone 资料库，只需重复相同的过程，但从`shared`列表中选择`iPhone`即可。\n\n### 在 iPhone 锁定时显示媒体控制\n\n\
  你可能希望在 iPhone 锁定时也能访问媒体控制。操作方法如下：双击`Home`按钮，用于调节音频的控制项就会出现在锁定屏幕的顶部。无需解锁屏幕再进入`Music`程序来寻找这些控制。\n\
  \n![images](img/U1230.jpg)\n\n在右侧的图像中，请注意屏幕仍然处于锁定状态——但音乐控制项现在沿顶部可见。你无需实际解锁 iPhone\
  \ 即可暂停、跳过、转到上一首歌曲或调节音量。\n\n**注意：**只有当有音频播放时，你才会看到这些控制。\n\n### 收听免费网络电台（Pandora）\n\
  \n虽然你的 iPhone 能让你对个人音乐资料库拥有前所未有的控制，但有时你可能想要“换换口味”，听一些其他音乐。\n\n**提示：**一个基础的`Pandora`账户是免费的，与从\
  \ iTunes 购买大量新歌相比，可以为你节省不少钱。\n\n`Pandora`源于“音乐基因组计划”。这是一项浩大的工程。一个由音乐分析师组成的大型团队研究了几乎每一首有史以来录制的歌曲，然后开发了一个复杂的属性算法来与每首歌关联。\n\
  \n**注意：**现在有越来越多不断增长的“网络电台”或订阅式音乐应用，包括流行的`slacker Personal Radio`、`spotify`、`Rdio,\
  \ Last.fm`等。另请注意，Pandora 仅限美国使用，Slacker 仅在美国和加拿大可用。Spotify 在美国和欧洲可用，且许多其他应用也按地区有所不同。希望未来能为国际用户提供更多选择。\n\
  \n## 开始使用 Pandora\n\n使用 Pandora，你可以围绕你喜欢的艺术家设计自己独特的电台。最棒的是，它完全免费！\n\n首先从 App Store\
  \ 下载`Pandora`应用。只需进入 App Store 并搜索 Pandora 即可。\n\n![images](img/U1231.jpg)\n\n现在只需轻触\
  \ Pandora 图标即可启动。\n\n![images](img/U1232.jpg)\n\n第一次启动 Pandora 时，系统会要求你创建一个账户，或者如果你已有账户则登录。只需填写适当信息——需要一个电子邮件地址和密码——你就可以开始设计自己的音乐收听体验了。\n\
  \nPandora 也可用于你的 Windows 或 Mac 电脑以及大多数智能手机平台。如果你已有 Pandora 账户，只需登录即可。\n\n![images](img/U1233.jpg)\n\
  \n**提示：**记住你可以将应用移入文件夹。正如你在图 12–7 中看到的，我们将三个音乐应用（包括`Pandora`）放入了一个名为“Music”的文件夹中。有关使用文件夹的更多信息，请参见第\
  \ 6 章：“图标和文件夹”。\n\n![images](img/1207.jpg)\n\n**图 12–7.** *将类似的音乐应用（如 Pandora）放入一个文件夹以便快速检索。*\n\
  \n## Pandora 的主屏幕\n\n你的电台列表显示在屏幕上，其中`QuickMix`位于顶部。轻触任意电台，它就会开始播放。通常，第一首歌来自你选择的艺术家本人，接下来的歌曲则来自相似的艺术家。\n\
  \n![images](img/U1234.jpg)\n\n一旦你选择了电台，音乐就开始播放。你会看到当前歌曲显示，以及专辑封面——就像你使用`Music`应用播放歌曲时一样。\n\
  \n你还会在右上角看到一个小型的`Now Playing`图标——与`Music`应用中的`Now Playing`图标非常相似。\n\n轻触右上角的`Detail`视图![images](img/U1235.jpg)图标（就像你在`Music`应用中看到的那样），你会看到艺术家的一段精彩简介，该简介会随着每首新歌而变化。（参见图\
  \ 12–8）\n\n![images](img/1208.jpg)\n\n**图 12–8.** *Pandora 的专辑封面视图和详情视图。*\n\n##\
  \ Pandora 中的“赞”或“踩”\n\n如果你喜欢某首特定歌曲，请轻触大拇指图标，之后你会听到更多来自该艺术家的音乐。\n\n![images](img/U1236.jpg)\n\
  \n相反，如果你不喜欢该电台的某位艺术家，请轻触大拇指朝下的图标，之后你将不会再听到那位艺术家的音乐。\n\n如果你愿意，你可以暂停一首歌稍后再回来听，或跳过当前电台的下一个曲目。\n\
  \n**注意：**使用免费的 Pandora 账户，你每小时可以跳过的次数是有限的。此外，你偶尔会听到广告。要摆脱这些烦恼，你可以升级到付费的“Pandora\
  \ One”账户，如下所示。\n\n## Pandora 的菜单\n\n在两个大拇指图标之间是一个`Menu`按钮，看起来像一个三角形![images](img/U1237.jpg)。轻触它，你可以收藏艺术家或歌曲，前往\
  \ iTunes 购买该艺术家的音乐，或通过电子邮件将电台发送给`Contacts`中的某个人。\n\n![images](img/U1238.jpg)\n\n\
  \n\n#### 在 Pandora 中创建新电台\n\n创建新电台再简单不过了。\n\n![images](img/U1239.jpg)\n\n如果你正在收听某个电台，请按下左上角的**返回箭头**返回\
  \ Pandora 主屏幕。然后点击底部一行的**新电台**按钮。输入一位艺术家、一首歌曲或一位作曲家的名称。\n\n找到你想找的内容后，点击该选项，Pandora\
  \ 便会立即开始围绕你的选择构建一个电台。\n\n你也可以点击**流派**，围绕一种特定的音乐流派构建电台。\n\n随后你会看到新电台与你的其他电台一起列出。\n\
  \n![images](img/U1240.jpg)\n\n你可以在 Pandora 中创建多达 100 个电台。\n\n**提示：**你可以通过点击屏幕顶部的**按日期**或**按字母表**按钮来整理你的电台。\n\
  \n#### 调整 Pandora 的设置——你的账户、升级等\n\n你可以通过点击屏幕右下角的设置图标退出你的 Pandora 账户、调整音质，甚至升级到 Pandora\
  \ One（可去除广告）。（请参见图 12–9。）\n\n![images](img/1209.jpg)\n\n**图 12–9.** *Pandora 中的设置选项*\n\
  \n要退出登录，请点击**退出**按钮。\n\n要调整音质，请将**蜂窝网络音频质量**下方的开关移至**开启**或**关闭**。当你在蜂窝网络环境下时，将此设置为关闭可能更好，否则你可能会在播放中听到更多跳转和暂停。\n\
  \n当你处于稳定的 Wi-Fi 连接时，可以将其设置为**开启**以获得更好的音质。请参阅我们的第 4 章：“连接网络”一章，了解更多关于各种连接的信息。\n\n\
  为了节省电池电量，你应将**自动锁定**设置为**开启**，这是默认设置。如果你希望强制屏幕保持亮起，则将其切换至**关闭**。\n\n要去除所有广告，请点击**升级到\
  \ Pandora One**按钮。一个网页浏览器窗口将打开，你将被引导至 Pandora 网站输入你的信用卡信息。在本书出版时，年度账户费用为 36.00 美元，但当你读到本书时，价格可能已有所不同。\n\
  \n## iBooks 与电子书\n\n在本章中，我们将向你展示如何将你的 iPhone 用于获得良好的阅读体验——如果你能接受稍小的屏幕。例如，我们将介绍 iBooks，包括如何购买和下载它们，以及如何找到一些优质的免费经典书籍。我们还将向你展示其他使用\
  \ iPhone 上的第三方**Kindle** 和 **Kobo**（原名 **shortcovers**）阅读器的电子书阅读选项。\n\n![images](img/U1301.jpg)\n\
  \niPhone 可以使用苹果公司专有的电子书阅读器 **iBooks**。在本章中，我们将向你展示如何下载 **iBooks** 应用，如何在 iBooksStore\
  \ 中选购书籍，以及如何阅读 PDF 文件（Adobe PDF 格式）和 iBooks，并充分利用所有 **iBooks** 功能。\n\n借助 **iBooks**，你可以以前所未有的方式与书籍和\
  \ PDF 文件互动。翻页如同真实书籍；你可以调整字体大小、在内置词典中查词，以及搜索文本。\n\n在 App Store 中，你还可以找到亚马逊 **Kindle**\
  \ 阅读器、**Barnes and Noble** 阅读器、**stanza** 阅读器和 **Kobo** 阅读器的应用。**Kindle** 和 **Kobo**\
  \ 阅读器在 iPhone 上均能提供出色的阅读体验。\n\n### 下载 iBooks\n\n在 App Store 中搜索“iBooks”或“Apple”。你会在所列选项中看到\
  \ **iBooks** 应用。\n\n![images](img/U1302.jpg)\n\n**注意：**在一部全新的 iPhone 上，你应该会收到一条通知询问：“你想立即下载\
  \ iBooks 吗？”\n\n如果你没有立即看到这条通知，请点击 **App Store** 应用，该通知应该会弹出。\n\n选择 **iBooks** 应用，然后点击**免费**按钮进行下载。\n\
  \n选择**安装**，**iBooks** 将被下载并安装在 iPhone 上。\n\n### iBooks 商店\n\n在你开始享受阅读体验之前，你需要用图书充实你的\
  \ iBooks 书库。幸运的是，许多书籍可以在 iBooks 商店免费找到，包括几乎完整的古腾堡经典及公共领域作品集。\n\n**注意：**付费的 iBooks\
  \ 内容并非在所有国家/地区都可用。然而，免费内容在各地都可获取，包括古腾堡计划的经典公共领域文学作品。\n\n只需点击你书架右上角的**商店**按钮，你将被带到\
  \ iBooks 商店。\n\n![images](img/U1303.jpg)\n\niBooksStore 的布局与 App Store 非常相似。左上方有一个**类别**按钮，与**书库**按钮相对。点击它可查看所有可用类别，你可以从中选择书籍。\n\
  \n![images](img/U1304.jpg)\n\n精选图书在商店主页上突出显示，并配有**新书**和**值得关注**的标题供浏览。\n\n商店底部有五个软键：**精选**、**排行榜**、**浏览**、**搜索**和**已购项目**。\n\
  \n点击**排行榜**按钮 ![images](img/U1305.jpg) 可查看所有顶级排行榜和《纽约时报》畅销书。点击**已购项目**按钮可查看你已购买或下载到书库中的所有书籍。\n\
  \n![images](img/U1306.jpg)\n\n购买一本书与购买一款应用非常相似。点击你感兴趣的图书标题，浏览其描述和读者评论。当你准备购买该图书时，点击**价格**按钮。\n\
  \n![images](img/U1307.jpg)\n\n**注意：**许多图书提供试读下载。如果你不确定是否要购买该书，查看试读内容是个好主意。如果你下载了试读内容，你随时可以从该试读中购买完整图书。\n\
  \n一旦你决定下载试读内容或购买一个图书，**iBooks** 会切换到**书架**视图，你可以看到该书被放入你的书架。现在你的书就可以阅读了。\n\n![images](img/U1308.jpg)\n\
  \n#### 使用搜索按钮\n\n与 iTunes 和 App Store 一样，iBooksStore 为你提供了一个**搜索**窗口，你可以在其中输入几乎任何短语。你可以搜索作者、书名或系列。只需点击屏幕底部的**搜索**，屏幕键盘便会弹出。输入作者、书名、系列或图书类别，然后按**搜索**按钮。\n\
  \n![images](img/U1309.jpg)\n\n你会看到与你搜索相匹配的建议弹出；只需点击相应的建议即可跳转到该图书。\n\n**提示：**搜索“古腾堡计划”（Project\
  \ Gutenberg）可查看数千本免费的公共领域图书。\n\n### 切换合集（图书、PDF 等）\n\n你的 iBooks 应用包含多个图书或 PDF 文件（Adobe\
  \ PDF 格式阅读器）的合集。\n\n![images](img/U1310.jpg)\n\n你可以通过点击书库顶部中央的合集按钮，轻松在这两个合集之间切换，并添加新合集。\n\
  \n此按钮会显示当前可见的合集。在此图中，**图书**是当前合集。点击“图书”按钮可查看可用的合集。\n\n在此屏幕上，你可以点击任意合集来查看它。\n\n![images](img/U1311.jpg)\n\
  \n请注意，你还可以使用底部的按钮创建**新**合集和**编辑**你已创建的合集。\n\n![images](img/U1312.jpg)\n\n### 阅读\
  \ PDF\n\n如上所示，切换合集以查看你的 PDF 合集。\n\n![images](img/U1313.jpg)\n\n点击任意书本将其打开并开始阅读。所有在“阅读\
  \ iBooks”部分中描述的导航功能同样适用。\n\n一个不同之处在于，你会在页面底部看到 PDF 文件的页面缩略图。点击任意缩略图即可跳转到该页。沿着缩略图前后拖动手指可跳转到特定页面。\n\
  \n\n\n### 阅读 iBooks\n\n轻触资料库中的任意标题即可打开阅读。书籍会从第一页打开，通常这一页是扉页或其他称为*前辅文*的内容。\n\n![images](img/U1314.jpg)\n\
  \n在左上角，紧邻`资料库`按钮旁，你可以看到一个`目录`按钮。要跳转到目录，可以轻触`目录`按钮，或者直接翻页到目录处。\n\n![images](img/U1315.jpg)\n\
  \n你可以通过三种方式翻页。首先，轻触页面的右侧可以翻到下一页。其次，可以缓慢地长按页面右边缘，在持续触摸屏幕的同时，轻柔缓慢地将手指向左滑动。\n\n**提示**：如果你非常缓慢地移动手指，就能在“翻动”页面时看到背面的文字——这是一种非常酷的视觉效果。\n\
  \n#### 自定义阅读体验：亮度、字体和字号\n\n在书籍上方中央区域，有三个可用图标：`亮度`、`字号`和`搜索`。这些选项有助于让你的阅读体验更加沉浸。\n\
  \n轻触`亮度`图标，你可以调节书籍的亮度。\n\n![images](img/U1316.jpg)\n\n![images](img/U1317.jpg)\n\
  \n如果你在一个非常昏暗的房间里躺在床上阅读，你可能希望将`亮度`滑块向左滑到底来调暗屏幕。如果你在阳光下阅读，则可能需要将滑块向右滑到底。但请记住，高屏幕亮度比大多数其他功能更耗电，因此在不需要屏幕那么亮时，请将此功能调回较低亮度。\n\
  \n**注意**：上述提示仅调节`iBooks`内的亮度。要调节 iPhone 的全局亮度，请使用`设置`应用（前往`设置`图标 > `亮度与墙纸`）。\n\n\
  `字号与字体`图标让你可以根据偏好调整字体数值。\n\n**增大字号**的操作方法：\n多次轻触大写的`A`图标。\n\n**减小字号**的操作方法：\n多次轻触小写的`a`图标。\n\
  \n在本书撰写时，共有六种可用字体样式——但当你阅读此书时，可能会有更多字体可供选择。\n\n![images](img/U1318.jpg)\n\n试试看，体验不同的字体。默认选择是\
  \ Palatino 字体，但所有字体看起来都很棒，更大字号对某些人来说会有所不同。目标是调整字号，使文本尽可能舒适易读。\n\n#### 使用内置词典扩充词汇量\n\
  \n`iBooks`包含一个非常强大的内置词典，当你遇到生僻或不熟悉的单词时，它会非常有用。\n\n**注意**：首次尝试使用词典时，你的 iPhone 需要下载它。请按照屏幕上的提示下载词典。\n\
  \n访问词典再简单不过了。只需长按书中的任意单词。一个弹出窗口会出现，提供多种选项，让你可以高亮单词、创建笔记或搜索该单词的其他出现位置。\n\n![images](img/U1319.jpg)\n\
  \n![images](img/U1320.jpg)\n\n轻触`词典`，该单词的发音和释义就会显示出来。轻触`完成`即可退出词典并返回书籍。\n\n####\
  \ 设置页内书签\n\n有时你可能想设置一个文本内的书签以便日后参考。\n\n右上角显示了一个`书签`图标。轻触`书签`图标，该页面上的图标会变为红色书签。\n\
  \n要查看书签，只需轻触屏幕左上角的`目录`图标（紧邻`资料库`图标），然后轻触`书签`。轻触高亮显示的书签，你就会跳转到书中的相应部分。\n\n![images](img/U1321.jpg)\n\
  \n**提示**：你无需在每次离开`iBooks`时都设置书签。该应用会自动记住你在某本书中停止阅读的位置。无论你打开并阅读了多少本书，这一点都适用，因此你总是能准确地返回到某本书中停止阅读的地方。`iBooks`应用还会与\
  \ iPad 上的`iBooks`版本同步，这样你可以在不同设备间切换，并保持在某本书中的阅读位置。\n\n#### 使用高亮和笔记\n\n`iBooks`应用中有一些非常棒的“附加功能”。例如，有时你可能想高亮某个特定单词以便日后回顾。还有时候，你可能想在页边给自己留个笔记。\n\
  \n在`iBooks`中，这两件事都非常容易做到。\n\n##### 高亮文本\n\n按照以下步骤在`iBooks`应用中高亮文本：\n\n![images](img/U1322.jpg)\n\
  \n1.  长按任意单词以调出菜单选项。\n2.  从菜单中选择`高亮`。\n3.  要移除高亮，轻触该单词，然后选择`移除高亮`。\n\n更改高亮颜色只需按照以下步骤操作：\n\
  \n![images](img/U1323.jpg)\n\n1.  轻触高亮显示的单词。\n2.  从菜单中选择`颜色`。\n3.  选择一种新颜色。\n\n\
  ![images](img/U1324.jpg)\n\n##### 添加笔记\n\n在`iBooks`的页边添加笔记同样简单：\n\n1.  像之前一样，长按任意单词。\n\
  2.  从菜单中选择`笔记`。\n3.  输入你的笔记，然后轻触`完成`。笔记现在会出现在页边（参见图 13-1）。\n\n**提示**：你的笔记也会出现在标题页的书签下方。只需轻触`标题页`按钮，然后轻触`书签`。你可以在页面底部找到你写的笔记。\n\
  \n你可以像更改高亮颜色一样更改笔记的颜色！\n\n![images](img/1301.jpg)\n\n**图 13-1.** *在`iBooks`中使用笔记功能*\n\
  \n#### 使用搜索\n\n`iBooks`内置了强大的搜索功能。只需轻触`搜索`图标，内置键盘就会弹出（与 iPhone 上的其他程序一样）。输入你要搜索的单词或短语，你会看到包含该单词的章节列表。\n\
  \n只需轻触所选内容，你就会跳转到书中的相应部分。你还可以通过轻触`搜索`窗口底部的相应按钮，直接跳转到 Google 或维基百科进行搜索。\n\n**注意**：使用维基百科或\
  \ Google 搜索会使你离开`iBooks`并启动`safari`。\n\n### 移动和删除书籍\n\n从 iBooks 资料库中删除书籍与从 iPhone\
  \ 上删除应用非常相似。你可以通过轻触`资料库`视图中的`编辑`按钮来删除或移动 iBooks。\n\n左上角。![images](img/U1325.jpg)\n\
  \n一旦你轻触`编辑`按钮，你会注意到每本书的左上角出现了一个小的黑色“**x**”。\n\n![images](img/U1326.jpg)\n\n只需轻触“**x**”，系统就会提示你删除这本书。一旦你轻触`删除`，该书就会从书架上消失。\n\
  \n![images](img/U1327.jpg)\n\n\n\n### 其他电子书阅读器：Kindle 和 Kobo\n\n![images](img/U1328.jpg)\n\
  \n正如我们所指出的，`iBooks` 应用提供了无与伦比的电子书阅读体验。不过，iPhone 上还有其他值得一试的电子书阅读器应用。\n\n许多用户已经拥有\
  \ Kindle 并投资建立了自己的 Kindle 书库。另一些用户则使用 `Kobo` 电子阅读器软件（原名为 `shortcovers`），并为其平台购买了书籍。\n\
  \n![images](img/U1329.jpg)\n\n幸运的是，这两个电子书平台在 iPhone 的 App Store 中都有对应的应用。下载并安装任一程序后，您就可以登录并在\
  \ iPhone 上阅读该平台上的完整书库。\n\n**注意**：无论您选择这些其他电子阅读器中的哪一个，您都可以直接“登录”，查看您的完整书库，并从上次阅读的书籍中断处继续阅读——即使您是在其他设备上开始阅读的。\n\
  \n## 下载电子阅读器应用\n\n下载其他电子阅读器应用非常简单。只需前往 App Store，点击`类别`，然后点击`图书`。在此版块中，您会找到`Kindle`和`Kobo`应用。这两款应用都是免费的，只需点击`免费`按钮即可开始下载其中一款。\n\
  \n**提示**：如果您知道自己要找哪个应用，通常按名称搜索会更快。\n\n安装好所需的电子阅读器软件后，点击该应用的图标即可启动它。\n\n## Kindle\
  \ 阅读器\n\n亚马逊的 Kindle 阅读器是世界上最受欢迎的电子阅读器。数百万人拥有 Kindle 书籍，而`Kindle`应用让您可以在 iPhone\
  \ 上阅读这些书籍。\n\niPhone 和 iPad 版本的`Kindle`应用刚刚进行了更新，支持音频和视频，这使得这些版本甚至比 Kindle 硬件本身的功能更加强大。\n\
  \n**提示**：如果您使用 Kindle 设备，不必担心从 iPhone 登录的问题。您可以将多个设备关联到同一个账户。您可以在 iPhone 的`Kindle`应用上尽情享受为\
  \ Kindle 购买的所有书籍。\n\n要在 iPhone 上使用`Kindle`应用，只需点击其图标，然后登录您的 Kindle 账户，或使用用户名和密码创建一个新账户。\n\
  \n![images](img/U1330.jpg)\n\n登录后，您会在`主页`上看到您的 Kindle 书籍。点击一本书即可开始阅读。\n\n![images](img/U1331.jpg)\n\
  \n**注意**：若要购买或下载新书，您需要前往`safari`网页浏览器中的`www.amazon.com`。一旦您为新账户购买或下载了新书，它就会出现在`Kindle`应用中。\n\
  \n要阅读 Kindle 书籍，请点击其封面，书就会打开。\n\n![images](img/U1332.jpg)\n\n要查看阅读选项，只需轻触屏幕，选项便会显示在底部的一行图标中。\n\
  \n您可以通过点击`加号`（`+`）按钮添加书签。书签设置好后，`加号`（`+`）按钮会变成`减号`（`-`）按钮。\n\n您可以通过点击`书籍`按钮，跳转到封面、目录或书籍开头（或指定书中的任何其他位置）。\n\
  \n字体以及页面颜色都可以调整。一个非常有趣的功能是能够将页面更改为`黑色`——这在夜间阅读时非常棒。\n\n要向前翻页，可以从右向左滑动，或点击页面的右侧。要向后翻页，可以从左向右滑动，或点击页面的左侧。\n\
  \n轻点屏幕，底部会出现一个滑块；您可以移动它跳转到书中的任何一页。\n\n要返回您的书籍列表，只需点击`主页`按钮。\n\n## Kobo 阅读器\n\n与`Kindle`阅读器类似，`Kobo`阅读器首先要求您登录现有的\
  \ Kobo Books 账户。之后，您所有的现有 Kobo Books 都可以阅读了。\n\n![images](img/U1333.jpg)\n\nKobo\
  \ 的`书架`视图使用了一种类似书架的隐喻，与`iBooks`使用的相似。点击您想要打开的书籍封面。\n\n或者，您可以点击`列表`选项卡，以`列表`视图查看整理好的书籍。\n\
  \n打开任意一本书，您会在 Kobo 阅读器的顶部看到两个按钮：`我正在阅读`和`设置`。\n\n![images](img/U1334.jpg)\n\n点击`我正在阅读`按钮会在您上次阅读中断处放置一个书签，并将屏幕返回到您的`书架`视图。\n\
  \n点击`设置`按钮会在屏幕底部显示一系列按钮，用于查看书签、查看书籍信息，以及调整页面过渡样式和字体。在这些按钮下方是四个图标：`字体`、`亮度`、`屏幕锁定`和`夜间阅读`。点击其中任一按钮即可调整您的阅读设置。\n\
  \n![images](img/U1335.jpg)\n\n![images](img/U1336.jpg)\n\n在`Kobo`阅读器中，点击页面右侧可以向前翻页。点击页面左侧则能向后翻页。您也可以使用底部的滑块来翻页。\n\
  \n"
- '# 第 14 章


  ## 书报摊及其他


  在上一章中，我们讨论了 iPhone 如何通过 iBooks 彻底改变了阅读世界。iPhone 不仅无与伦比地适合阅读电子书，其“书报摊”文件夹在处理在线报纸和杂志等新媒体方面也无可匹敌。此外，App
  Store 让您能轻松找到漫画书阅读器、PDF 阅读器等应用。iPhone 甚至准备通过外观精美且交互性极佳的漫画书来振兴漫画产业。


  在本章中，我们将探讨如何利用 iPhone 鲜艳的屏幕和出色的触控界面来享受新媒体。


  ### 书报摊


  “书报摊”是您 iPhone 主屏幕上的一个特殊文件夹，外观像一个书架，用于收集和整理您所有的杂志和报纸应用。这个文件夹的行为与普通的 iPhone 文件夹不同。如果某个杂志或报纸应用支持书报摊，那么它会在书架上显示该期刊的最新封面或头版，而不是书报摊文件夹图标（您在快速应用切换器中也会看到这个封面或头版）。


  如果该杂志或报纸应用提供订阅服务，而您是订阅者，那么书报摊应用还可以在夜间自动下载最新期刊，这样您早上打开时就有新的内容可以阅读。


  ![images](img/U1401.jpg)


  书报摊文件夹还有一个`商店`按钮，点击后会进入 App Store 的一个特殊版块。该版块列出了所有当前支持书报摊的杂志和报纸应用。


  除了特殊的展示方式和自动下载新期刊的功能外，书报摊应用的其他功能与任何其他应用无异。


  **注意**：是否添加书报摊支持取决于每个杂志和报纸应用。在撰写本文时，许多（但并非全部）杂志应用已添加书报摊支持。如果某个应用不支持书报摊，它将会下载到`主屏幕`上，行为与任何普通的、非书报摊应用一样。


  此外，杂志和报纸的选择可能因国家/地区而异。使用书报摊中的`商店`按钮可以查看您所在地区的最新选择。




  #### 购买与订阅报刊


  `书报摊`中的报纸和杂志应用通常是免费的，但通常内置内容极少甚至完全没有。要获取内容，你需要购买单期或订阅多期。


  购买单期的方式与其他应用内购买类似。通常，你会看到最近各期杂志的列表，左侧是封面图，右侧是内容简介和价格。点击价格后，系统会要求输入 iTunes 密码以确认购买。确认购买后，该期内容将开始下载。


  订阅报纸和杂志则是一种特殊的应用内购买，它会在指定时间内持续有效。例如，你通常可以以固定价格购买一年的报纸。有些报纸和杂志提供不同的订阅时长选项，如三年、半年等。有些还提供包含印刷版和数字版的套餐。请务必仔细阅读你的选项，找出对你来说价值最高的那一款。


  ![图片](img/U1402.jpg)


  你可能会想，如果你已经购买了订阅或单期内容，但需要重新安装显示内容的应用程序，该怎么办。如果发生这种情况，你只需重新安装应用程序，然后恢复你的订阅或重新下载之前购买过的任何单期即可。换句话说，在`书报摊`应用中恢复内容的过程，与恢复其他应用内购买内容的过程完全相同。


  ![图片](img/U1403.jpg)


  ### 报纸


  还记得报纸被送到家里的日子吗？人行道上只要有一个水坑，报纸必定落在那里！你从塑料袋里取出报纸，抖掉水珠，然后努力辨认被浸湿的那一版上写了什么。


  好吧，那样的日子可能一去不复返了。现在，你有了与新闻互动的新机会，甚至每天都能收到报纸——不过是送到你的 iPhone 上，而不是家门口的车道上。


  许多报纸和新闻网站正在为 iPhone 开发应用程序，似乎每天都有新的应用出现。其中一些应用提供一定程度的免费内容，但要求你创建账户或订阅才能获取更多内容。其他应用则只提供付费订阅内容。


  **注意：** 如果你已经订阅了本地报纸的印刷版，你可能可以享受打折甚至免费使用其 iPhone 应用的特权。请务必仔细阅读任何注册或订阅优惠条款，以确认你是否符合条件。


  许多报纸也有专门的网站。有些针对 iPhone 和 `Safari` 进行了优化，而另一些则提供完整的网页体验。有些网站需要注册或付费订阅才能查看报纸的全部内容。


  让我们快速浏览一下美国最大的报纸之一 `纽约时报`，看看这家报纸是如何革新在 iPhone 上阅读新闻的体验的。


  #### 纽约时报应用


  `纽约时报` 提供各种免费和付费的应用程序，让您在 iPhone 上获取新闻。


  `纽约时报` 在其免费的 iPhone 应用中提供了报纸的精简版本。


  页面底部有四个软键：`头条新闻`、`最多电邮`、`收藏` 和 `板块`。每个板块都收录了当天报纸中该板块的部分报道。


  点击 `板块` 会显示 `纽约时报` 所有板块的标签页。


  ![图片](img/U1404.jpg)


  浏览 `纽约时报》应用非常简单，只需点击一篇文章并滚动阅读即可。阅读文章时，只需点击屏幕中央，顶部和底部的软键就会显示出来。


  要返回`主页`，请点击左上角的`最新新闻`按钮。


  **注意：** 如果你在另一个板块——比如 `科技`——那么左上角的按钮会显示为 `科技`。


  ![图片](img/U1405.jpg)


  如需通过电子邮件发送一篇文章，只需点击左下角的`分享`图标。此按钮仅在阅读文章时可用，在`主页`上不可用。


  点击该图标，你可以通过电子邮件发送文章、复制链接或通过 Twitter 分享。


  #### 浏览与享受内容


  当你试用不同的报纸应用时，你会逐渐意识到，浏览报纸内容并没有真正的标准。这意味着你需要熟悉每个应用自身的文章导航方式，以及如何返回主屏幕。以下是浏览这类应用的一般性简短指南：


  - **显示或隐藏控制按钮或说明：** 通常，点击一次屏幕会显示隐藏的控制按钮或图片说明。你可以再次点击屏幕重新隐藏这些元素。

  - **查看文章详情：** 通常，你像浏览网页一样进行滚动。

  - **观看视频：** 通常，只需点击视频即可开始播放。请参阅第 15 章：“观看视频”，了解如何在 iPhone 上浏览视频。

  - **放大视频或图片：** 你可以尝试在视频或图片上使用双指张开手势，然后双击。你也可以寻找`展开`按钮，或者尝试旋转到横屏模式。

  - **缩小视频或图片：** 你可以尝试在视频或图片上使用双指捏合手势来缩小视频尺寸。你也可以寻找`关闭`或`最小化`按钮，或者尝试旋转回竖屏模式。

  - **分享文章：** 通过电子邮件发送文章链接——或通过 Twitter、Facebook 或 LinkedIn 等社交网络分享——是一项常见功能。请寻找`操作`或`分享`按钮。

  - **调整字体大小：** 许多报纸应用都有按钮或设置选项，用于增大或减小默认字体大小，使内容更易于阅读。


  ### 杂志


  过去几年，报纸和杂志的读者数量都在下降，这已不是什么秘密。iPhone 提供了一种全新的杂志阅读方式，这或许正是该行业所需的推动力。


  在 iPhone 上阅读杂志，图片异常清晰亮丽。导航通常很方便，故事仿佛活灵活现，远比印刷版生动。再加上视频和音频的无缝集成，你能真切地感受到 iPhone 如何提升了杂志阅读体验。


  一些杂志，如 `时代周刊`，包含指向实时或频繁更新内容的链接。这些链接可能被称为 `新闻推送`、`直播版` 或 `更新`。在你购买的任何杂志中请留意它们——这些链接将帮助你获取最新信息。


  **提示：** 在购买杂志或其他应用之前，务必查看其用户评价。这样做可能会为你省下一些钱或免去烦恼！


  App Store 中有几种不同类型的杂志应用。首先，有些应用让你可以购买单本杂志或免费阅读某一杂志的有限内容。其次，还有一些杂志阅读器，提供多种杂志的样本；你可以通过这些应用订阅某本杂志的每周或每月递送。


  如果你在 `App Store` 中通过 `类别` > `书报摊` 浏览，然后点击顶部的`热门免费`，就可以查看所有免费的杂志和报纸。


  ![图片](img/U1406.jpg)




  #### Zinio 杂志应用——初体验


  `Zinio` 应用采取了独特的方式。这款应用在 App Store 中是免费的，它让你能够订阅数百种杂志。在 `Zinio` 中阅读杂志只需几个简单步骤：


  1. 登录 `Zinio` 应用（你可以创建一个免费账户）。

  2. 在`我的资料库`板块查看并下载免费样本，或点击底部的`购物`按钮购买杂志。

  3. 有些杂志可能会提供完整的免费期号。只需查看`我的资料库`板块，看看有哪些可用的内容。


  ![images](img/U1407.jpg)


  有很多热门杂志供你选择。其分类涵盖了从艺术到体育等方方面面。价格各有不同，但通常你可以选择购买单期或订阅全年。


  例如，最新一期的`大众机械`在`Zinio`上售价为 1.99 美元，而全年订阅价格为 7.99 美元。


  有些订阅非常划算。在撰写本文时，一期`单车杂志`的单期售价为 4.99 美元，而全年订阅仅需 9.00 美元。


  进一步查看后发现，在撰写本文时，你可以订阅超过 16 种自行车杂志。


  ![images](img/U1408.jpg)


  ### 漫画书


  随着 iPhone 的出现，一种有望复兴的"新媒体"类型是漫画书。iPhone 凭借其高清屏幕和强大的处理器，让漫画书的页面栩栩如生。


  目前已有几款漫画书应用可供使用，其中包括来自著名的漫威漫画公司的应用。DC 漫画公司也刚刚推出了自己的应用。这款应用与制作漫威应用的是同一批人。


  要在 App Store 中找到`漫威漫画`应用，请前往`分类`，然后选择`图书`。这款应用是免费的，你可以从应用内部购买漫画书。


  在`主页`屏幕的底部，你会看到五个按钮：`我的漫画`、`精选`、`免费`、`前 25 名`和`浏览`。你购买的内容将出现在`我的漫画`标题下。


  App Store 让你有机会下载免费的漫画以及正在出售的单期漫画。大多数单期售价为每期 1.99 美元。


  每个选项卡都会带你进入一个新的漫画列表进行浏览，这与 iTunes 商店非常相似。


  触摸`浏览`按钮，即可按`系列`、`创作者`、`类型`、`评级`、`故事线/情节弧`或`发布日期`进行浏览。或者你也可以输入搜索词来查找特定的漫画。


  ![images](img/U1409.jpg)


  你可以通过两种方式阅读漫画书。第一种，你可以滑动翻页，一页一页地阅读。第二种，你可以双击一个画面格以`放大`，然后点击屏幕前进到连环漫画中的下一个画面格。之后，你只需从右向左滑动即可前进到下一帧；或者，如果你想后退，就从左向右滑动。


  要返回`主页`屏幕或查看屏幕上的选项，只需点击屏幕中央。你会在左上角看到一个`设置`按钮。点击它，你可以`跳转到首页`、`浏览到特定页面`或进入`设置`菜单。


  ![images](img/U1410.jpg)


  **注意：** 这款应用的开发商 `ComiXology` 也制作了包含漫威漫画的应用，以及其他许多应用，包括 DC、阿奇、映像和 Top Cow 的漫画。


  ### 将 iPhone 用作 PDF 阅读器


  有几款程序可以将 iPhone 变成一个非常强大的 PDF 浏览程序。例如，你也可以在 `iBooks` 应用中阅读 PDF 文件。然而，另一款出色的 PDF
  阅读器叫做 `GoodReader for iPhone`。


  **注意：** 第 17 章："使用电子邮件通信"向你展示了如何打开附件，包括 PDF 文件。`GoodReader` 应用的一大优点是它允许你使用 Wi-Fi
  传输大型 PDF 文件。


  你可以在 App Store 的`效率`分类中找到 `GoodReader for iPhone` 应用。在撰写本文时，这款应用售价为 4.99 美元。


  **注意：** `iBooks` 也可以阅读作为邮件附件发送的 PDF 文件。如果已安装 `iBooks`，只需在打开 PDF 时选择`在 iBooks 中打开`。


  ![images](img/U1411.jpg)


  #### 将文件传输到你的 iPhone


  `GoodReader for iPhone` 应用的一大优点是，你可以使用它将大型文件从 Mac 或 PC 无线传输到 iPhone，以便在 `GoodReader`
  应用中查看。你也可以使用 `GoodReader` 在 iTunes 中进行文档共享，如第 3 章："与 iCloud、iTunes 等同步"中所述。请按照以下步骤使用
  `GoodReader` 传输文件：


  1. 触摸屏幕左下角的小`Wi-Fi`图标，![images](img/U1412.jpg) 将弹出`Wi-Fi 传输工具`。系统会提示你在浏览器中输入一个 IP
  地址，如果你使用 `Bonjour` 服务，则输入一个 Bonjour 地址。

  2. 将 `GoodReader` 窗口中显示的地址输入到你电脑的网络浏览器中。现在你可以让你的电脑充当服务器。你会看到你的电脑和 iPhone 现已连接。你可以在浏览器中为此页面添加书签，但请注意，如果你重启无线网络路由器并且你的
  iPhone 获取到不同的无线网络地址，该地址可能会发生变化。

  3. 点击电脑网络浏览器中的`选择文件`按钮，找到要上传到 iPhone 的文件。

  4. 选择文件后，点击`上传所选文件`，该文件将自动传输到你的 iPhone。


  这有什么用处呢？例如，对于其中一位作者（Gary）来说，iPhone 已经成为了一个存储超过 100 份钢琴乐谱的仓库。这意味着不再需要下载 PDF 文件、打印出来、装进活页夹，然后试图记住哪首曲子放在哪个活页夹里了。现在，他所有的音乐都编录在
  iPhone 上。他只需把 iPhone 放在钢琴上，就能在一个地方访问他所有的音乐。


  **注意：** `Good Reader` 甚至可以解压你作为邮件附件收到的文件。


  浏览 `GoodReader` PDF 阅读器非常容易。这款应用比其他应用更灵敏，因此快速点击屏幕中央即可调出屏幕控制选项。然后你可以前往你的资料库，或触摸`翻页`图标来翻页。


  在页面间移动最简单的方法是触摸屏幕右下角前进一页，或触摸屏幕左上角后退一页。用不了多久，这就会变得非常自然。


  你也可以向上或向下轻扫来翻页。


  要转到另一个 PDF 文件或另一份乐谱，只需快速点击 iPhone 屏幕中央，然后点击左上角的`我的文档`按钮。


  ![images](img/U1413.jpg)


  #### 使用 GoodReader 连接到 Google Docs 和其他服务器


  你也可以使用 `GoodReader` 连接到 `Google Docs` 和其他服务器。请按照以下步骤操作：


  1. 在`网页下载`选项卡中，选择`连接到服务器`。

  2. 选择 `Google Docs`。（你可以选择多种不同的服务器：邮件服务器、MobileMe iDisk、公共 iDisk、Dropbox、box.net、FilesAnywhere.com、MyDisk.se、WebDAV
  服务器和 FTP 服务器。）

  3. 输入你的 `Google Docs` 用户名和密码进行登录。

  4. 连接成功后，一个新的`Google Docs 服务器`图标将出现在页面右侧的`连接到服务器`选项卡下方。

  5. 点击新的`Google`选项卡以连接到服务器（需要网络连接）。

  6. 现在你将看到你存储在 `Google Docs` 上的所有文档列表。点击任一文档并选择文件类型进行下载。通常，PDF 格式在此操作中效果很好。（Google
  Docs 可以执行`另存为…`操作，而且 PDF 文件更易于处理。）


  文件下载完成后，它将出现在 `GoodReader` 的左侧；只需触摸它即可打开。


