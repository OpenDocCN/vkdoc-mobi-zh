- "# 第 1 章\n\n## 开始使用\n\n在本章中，我们将带您逐步了解您的新 iPhone 以及包装盒中的所有物品。我们还将研究充电的方方面面以及如何让电池续航更持久。要开始使用您的\
  \ iPhone，您需要将其连接到 iTunes 进行激活和注册。在本章末尾的“iPhone 基础”部分，我们将向您展示如何在 iPhone 上进行基本操作，以便您能快速上手并使用。\n\
  \n### 了解您的 iPhone\n\n在本节中，我们将向您展示如何使用 iPhone 包装盒中的所有物品。我们还会给您一些关于 iPhone 电池和充电的技巧，讨论如何判断您的\
  \ iPhone 是否已经激活，并探讨 `Slide to Unlock` 功能。\n\n\n\n#### 包装盒内包含的物品\n\n如果你初次接触`iPhone`，包装盒里可能看起来内容不多。不过，它确实包含了开始使用和享受你的`iPhone`所需的一切——除了一本详尽的使用手册，而这正是我们撰写本书的原因！以下是包装盒内的物品：\n\
  \n* **`iPhone`**：打开盒子后，最顶层就会看到你的新`iPhone`。\n* **纸质文件夹**：在`iPhone`的塑料托架下方，你会找到一个包含以下物品的纸质文件夹：\n\
  \    * **使用技巧**：一本 4.5 英寸×2.5 英寸的小型折叠手册，共有 19 页，介绍`iPhone`的基本信息。\n    * **`iPhone\
  \ 产品信息指南`**：一本 4.5 英寸×2.5 英寸的小册子，字体太小难以阅读。这本书包含了与你的`iPhone`相关的所有法律条款、条件、警告和免责声明。\n\
  \    * **苹果标志贴纸**：两张漂亮的白色苹果标志贴纸，有时你会看到它们出现在汽车车窗上。尽情享用吧！\n\n在包装盒底部，你会找到如图 1–1 所示的物品：一副耳机、一根`USB`数据线和一个电源插头适配器。\n\
  \n![images](img/0101.jpg)\n\n**图 1–1.** *手机包装盒底部的耳机、USB 数据线和电源插头适配器*\n\n##### `iPhone`\
  \ 耳机\n\n耳机包含两个白色耳塞，用于收听音乐、视频或通话，以及一个附着在右耳塞线上小型控制器。将它插入你`iPhone`左上边缘的孔中。确保完全插入——按下时可能会有点紧。\n\
  \n![images](img/U0101.jpg)\n\n如下图所示，控制器上有**加号**（**`+`**）和**减号**（**`-`**）按键，以及一个**中央**按钮。你可以使用（**`+`**）和（**`-`**）键来调高或调低音量，并使用**中央**按钮来接听或挂断电话。\n\
  \n**注意：** 你可以通过单击两次或三次**中央**按钮来切换歌曲。双击切换至下一曲。三击返回上一曲。\n\n随附的耳机还包含一个用于通话的小型麦克风。\n\
  \n##### `USB` 转底座数据线\n\n`USB`转底座数据线用于将你的`iPhone`连接到电脑；它也可以兼作电源线使用。\n\n##### 电源插头适配器\n\
  \n电源插头适配器的一端是`USB`插口，另一端是插入电源插座的插头。只需将`USB`数据线连接到`iPhone`，再将另一端连接到电源适配器，即可通过墙插为`iPhone`充电。\n\
  \n#### 取出或安装`SIM`卡\n\n为了能够在 AT&T/GSM 网络的`iPhone`（目前除 Verizon 版`iPhone`外的所有`iPhone`）上拨打或接听电话，你需要有一张`SIM`卡（用户身份识别卡）。每部新的\
  \ GSM 版`iPhone`出厂时都应已预装一张`SIM`卡。\n\n**注意：** 与`iPad`和`iPhone 4`一样，`iPhone 4S`使用的是新型\
  \ MicroSIM 标准——而非多数其他手机上常见的 MiniSIM。\n\n在某些情况下，你可能需要取出并更换`SIM`卡。例如，当你在国际旅行时，或者刚收到一部替换的`iPhone`并想使用旧手机中的`SIM`卡时。\n\
  \n请按照以下步骤弹出并取出你`iPhone`的`SIM`卡：\n\n1. 将回形针插入`iPhone`右侧的小孔中。将回形针笔直插入，直到`SIM`卡托盘弹出。\n\
  2. 取出托盘，以便取出或更换`SIM`卡。\n3. 插入`SIM`卡时，确保`SIM`卡的缺口朝向托盘的右上角。它应与托盘齐平放置，金属触点朝向托盘底部。\n\
  4. 将`SIM`卡托盘滑回`iPhone`中，直至其卡入到位。\n\n#### 为`iPhone`充电及电池使用提示\n\n你的`iPhone`可能已有一些电量，但你或许希望将其完全充满，这样在完成设置后就能享受数小时不间断的使用。充电的时间正好让你有机会阅读本章的其余内容、安装或更新`iTunes`应用，或者了解所有酷炫的`iPhone`应用（参见第\
  \ 23 章：“神奇的 App Store”）。\n\n##### 通过电源插座充电\n\n为`iPhone`充电最快的方式是将其直接插入墙上的电源插座。你使用的是连接`iPhone`和电脑的同一根`USB`数据线。如下图所示，将数据线较宽的一端插入`iPhone`底部的端口（靠近**主屏幕**按钮），将`USB`数据线的另一端插入电源插头适配器。最后，将适配器插入任何墙上的电源插座。\n\
  \n![images](img/U0102.jpg)\n\n你可以通过查看屏幕来判断`iPhone`是否正在充电。在屏幕右上角的电池电量指示器中，你会看到一个闪电或插头图标。\n\
  \n**主电池**图标会显示你的充电状态。右侧的图片显示了一部正在充电且电池几乎充满的`iPhone`。\n\n**提示：** 一些新型汽车内置有电源插座（就像你家中一样），可以用来插上`iPhone`的电源线。有些车型还提供了底座选项，让你可以从汽车音响控制器上操作`iPod`应用。这些插座有时隐藏在前排座椅后方的中央扶手箱内。\n\
  \n![images](img/U0103.jpg)\n\n##### 通过电脑充电\n\n你也可以将`iPhone`连接到电脑进行充电，不过速度会比直接连接墙式充电器稍慢一些。\n\
  \n**提示：** 尝试使用电脑上不同的`USB`端口。一些`USB`端口共享总线，消耗的功率较小，而另一些则拥有独立总线，可提供更大的功率。\n\n为了获得最佳充电效果，你的电脑应插入墙上的电源插座。如果电脑未连接电源插座，你的`iPhone`仍然可以充电，但速度会更慢。请记住，如果笔记本电脑进入睡眠状态或你合上屏幕，`iPhone`将会停止充电。\n\
  \n**提示：** 你可以显示剩余电量的具体百分比。操作方法如下：点击`设置`图标![images](img/U001.jpg)`通用`![images](img/U001.jpg)`用量`。最后将`电池百分比`设置为`开`。\n\
  \n![images](img/U0104.jpg)\n\n##### 通过其他配件充电\n\n某些专为`iPhone`设计的配件也可以为其充电。最常见的是 iPhone/iPod\
  \ 音乐底座。这些是插入`iPhone`后可以听音乐的扬声器系统。只有当屏幕上出现以下警告信息时，`iPhone`才不会充电：“此配件不支持充电”。这种情况通常出现在较旧的配件或并非专为你的`iPhone`设计的配件上。\n\
  \n**提示：带外置电池的保护壳**\n\n有些保护壳本身就集成了外置电池。市面上有多个制造商提供此类产品。其中一家供应商 mophie（[`www.mophie.com`](http://www.mophie.com)）就为`iPhone\
  \ 4`和`iPhone 4S`型号提供了名为*juice pack air*和*juice pack plus*的保护壳。\n\n##### 预期电池续航时间\n\
  \n苹果公司表示，配备更大容量电池和先进技术的`iPhone`，其续航时间应比`iPhone 3Gs`更长（参见表 1–1）。\n\n![images](img/t0101.jpg)\n\
  \n![images](img/t0101a.jpg)\n\n这些电池续航时间是在理想条件下，使用全新的、完全充满电的电池测得的。你会注意到，随着时间的推移，实际电池续航时间会逐渐缩短。\n\
  \n##### 电池与充电提示\n\n关键问题在于：如何最大限度地利用电池续航时间，并确保你的`iPhone`在你需要时已充满电并准备就绪？在本节中，我们将介绍一些技巧来帮助你实现这一点。\n\
  \n\n\n###### 让每次充电更持久\n\n要延长电池续航时间，请尝试以下建议：\n\n-   **降低屏幕亮度**：轻点**设置** ![images](img/U001.jpg)\
  \ **亮度**，然后使用滑块将亮度降低到仍能正常使用、且不到一半的位置。\n-   **关闭定位服务**：如果你不需要将实际位置信息发送给应用，可以将其关闭。轻点**设置**\
  \ ![images](img/U001.jpg) **通用** ![images](img/U001.jpg) **定位服务**，然后将**定位服务**设置为**关闭**。如果你进入需要你位置信息的应用，系统会提醒你重新开启。\n\
  -   **设置更短的自动锁定**：此功能可缩短 iPhone 在闲置时进入睡眠模式（即关闭屏幕）的时间。缩短此时间有助于节省电池电量。操作方法：轻点**设置**\
  \ ![images](img/U001.jpg) **通用** ![images](img/U001.jpg) **自动锁定**，然后将**自动锁定**设置为尽可能短的时间——如果你愿意，可以将其设置为**1\
  \ 分钟**。\n-   **关闭推送邮件和推送通知。**\n-   **关闭 Siri 的“抬起说话”功能**。轻点**设置** ![images](img/U001.jpg)\
  \ **通用** ![images](img/U001.jpg) **Siri**，然后将**抬起说话**设置为**关闭**。\n\n你可以访问 Apple 网站\
  \ [`www.apple.com/batteries/iphone.html`](http://www.apple.com/batteries/iphone.html)\
  \ 了解更多关于延长电池续航时间的提示。\n\n###### 让电池更耐用\n\niPhone 使用可充电电池，其使用寿命内充电次数有限；换句话说，随着时间的推移，电池保持电量的能力会逐渐下降。确保每个月至少将电池完全耗尽一次，可以延长\
  \ iPhone 电池的寿命。这样做有助于可充电电池更持久耐用。\n\n###### 寻找更多充电地点\n\n无论如何，如果你真的经常使用 iPhone，你会想找到更多地方和方式来为它充电。除了使用电源线或连接电脑，你还可以利用表\
  \ 1–2 中描述的充电技巧。\n\n![images](img/t0102.jpg)\n\n### 设置你的 iPhone\n\n至此，你已经了解了 iPhone\
  \ 的一些基本知识以及如何充分利用电池。现在，你可以开始享受它了！下一步就是设置你的 iPhone。\n\n#### 判断是否需要设置 iPhone\n\n如果你看到类似于这里显示的**欢迎**屏幕，则需要先设置\
  \ iPhone 才能使用。通过 iOS 5，你可以通过几种方式设置 iPhone。首先，你可以利用 Wi-Fi 网络和 iCloud 进行空中（OTA）设置。或者，你可以使用\
  \ USB 底座连接线将手机连接到电脑，并通过 iTunes 服务激活。\n\n如果这是你的第一部 iPhone，或者你想将其设置为全新 iPhone，你可能希望使用\
  \ iCloud OTA。\n\n如果你是从 iPhone 4 或更早型号升级，你可能希望使用 iTunes 服务从备份中恢复。\n\n![images](img/U0105.jpg)\n\
  \n### 使用 iCloud 通过无线方式设置 iPhone\n\n借助 iOS 5，Apple 终于摆脱了 iTunes 的束缚。这意味着你不再需要将 iPhone\
  \ 连接到电脑来激活或设置它。相反，你可以使用 Apple 的全新 `iCloud` 服务，直接从 iPhone 通过 OTA 进行激活。\n\n**注意：**\
  \ 在初始设置过程中，你将能够连接到任何可用的 Wi-Fi 网络，这是使用 iCloud 通过 OTA 设置 iPhone 所必需的。如果你家里、工作单位或学校的\
  \ Wi-Fi 网络不可用，并且身边没有像星巴克这样的公共接入点，那么你需要稍后再激活 iPhone。（你也可以选择通过电脑上的 iTunes 来设置 iPhone；但是，你仍然需要互联网连接来连接到\
  \ Apple 的激活服务器。）\n\n按照以下步骤使用 iCloud 设置你的 iPhone，如之前显示的**欢迎**屏幕所示：\n\n1.  触摸**箭头**按钮，并按指示方向在屏幕上滑动来进行设置。\n\
  2.  选择你想在 iPhone 上使用的语言。Apple 会根据你购买 iPhone 的地点提供最常用的选项；不过，你也可以轻点**向下箭头**以获取更多语言选项。\n\
  3.  选好首选语言后，轻点屏幕右上角的蓝色**下一步**按钮。\n\n   ![images](img/U0106.jpg)\n\n4.  选择你的国家或地区。同样，Apple\
  \ 会根据你购买 iPhone 的地点提供默认选项；不过，你可以轻点**显示更多...** 来展开列表。轻点蓝色**下一步**按钮继续。\n5.  决定是否要启用或禁用定位服务，然后轻点蓝色**下一步**按钮继续。\n\
  \n   **注意：** `定位服务`使用 GPS、基站三角定位和 Wi-Fi 路由器映射来确定你 iPhone 的大致位置。此功能用于逐向导航（如 TomTom）、签到游戏（如\
  \ Foursquare）、社交网络（如 Facebook）、地理标记（在**相机**应用中）以及实用工具（如“查找我的 iPhone”）。除非你有特殊需要全局禁用所有定位服务，否则你可能希望现在就开启定位服务功能。稍后你可以在**设置**应用中有选择地禁用或启用这些服务（例如，关闭**相机**应用的地理标记，但保留\
  \ TomTom 的逐向导航）。\n\n6.  选择你的 Wi-Fi 网络，输入网络密码，然后轻点蓝色**下一步**按钮继续。\n7.  你的 iPhone 现在将连接到\
  \ Apple 进行激活。根据你的连接速度和 Apple 服务器的繁忙程度，这可能需要几秒钟到几分钟的时间。\n8.  激活完成后，你将看到设置手机为新 iPhone、从\
  \ iCloud 备份恢复或从 iTunes 恢复的选项。\n\n\n\n### 使用 iCloud 设置新 iPhone\n\n如果这是你的第一部 iPhone，或者你只想有个干净的新开始，请选择**设置为新\
  \ iPhone**。\n\n**提示：** 从备份恢复——尤其是从不同设备的备份恢复（例如，从 iPad 备份恢复 iPhone）——有时会导致问题，例如应用崩溃更频繁或电池续航下降。如果你在从之前的备份恢复后遇到问题，可以尝试将手机设置为新\
  \ iPhone。你需要从头重新设置所有账户和偏好，并且会丢失所有已保存的应用和游戏数据；然而，如果你的 iPhone 已不稳定到无法日常使用，这有时是你唯一的选择。\n\
  \n要将手机设置为新 iPhone，你需要登录已有的 Apple ID，或者创建一个新的免费 Apple ID。Apple ID 可以是以下任意一种：\n\n\
  - **iTunes ID**：这是你用于登录 iTunes 并购买音乐、电视节目、电影、App Store 应用和游戏以及 iBooks 的电子邮件地址和密码。\n\
  - **免费 Apple ID**：这是你用于登录“查找我的 iPhone”、FaceTime、Game Center、iCloud 或任何其他近期免费 Apple\
  \ 服务的电子邮件地址和密码。它也可以是你用于在线 Apple Store 购物的同一个 ID。\n\n**注意：** 如果你使用 Apple 产品和服务已有一段时间，一个人拥有多个\
  \ Apple ID 的情况并不少见。例如，你可能有一个 iTunes ID、一个旧的 MobileMe 账户以及一个 Apple Store ID。遗憾的是，截至撰写本文时，Apple\
  \ 不允许合并这些 ID，因此你必须选择其中一个用于 iCloud。\n\n如果你有旧的 MobileMe 账户，Apple 会将其迁移到 iCloud。请访问\
  \ [`http://www.me.com/move`](http://www.me.com/move) 开始此流程。\n\n否则，作者建议你使用你的 iTunes\
  \ ID，因为它会关联你所有的音乐、媒体、应用和游戏购买记录，并且你将能够利用 iCloud 的重新下载功能，现在和将来都能轻松地将这些购买内容恢复到你的新设备上。\n\
  \n如果你已有 Apple ID，请立即登录，接受条款与条件，然后跳转到“配置 iCloud 选项”部分。如果你没有 Apple ID，请立即创建一个。\n\n\
  ### 创建免费 Apple ID\n\n如果你从未使用过 iTunes，也没有 Apple ID，则需要创建一个。你可以在 iPhone 上快速完成此操作：\n\
  \n1.  轻点**创建新 Apple ID**。\n2.  滚动**年**、**月**和**日**滚轮输入你的生日以设置正确日期，然后轻点蓝色**下一步**按钮。\n\
  3.  在相应字段中输入你的名字和姓氏，然后轻点蓝色**下一步**按钮。\n\n    ![images](img/U0107.jpg)\n\n4.  选择是使用现有电子邮件地址（例如\
  \ Gmail、Hotmail、Yahoo! 或个人电子邮件地址），还是创建一个新的 iCloud 电子邮件地址（`@me.com`）。如果你不想费心记忆新的电子邮件地址，可能更愿意使用现有地址。如果你希望将电子邮件分开管理，那么可能更愿意创建一个新地址。\n\
  5.  如果你要创建新的 iCloud `@me.com` 地址，请输入密码并点击**验证**。你的密码必须“强”，即必须包含大写和小写字母、至少一个数字，并且长度至少为八个字符。\n\
  6.  选择一个**安全信息**问题。这应该是你容易记住，但别人很难轻易猜到的信息（意味着其他人无法仅通过查看你的博客、Facebook、Google、Yahoo!\
  \ 或其他在线个人资料页面来找到答案）。\n7.  选择是否希望从此新地址接收来自 Apple 的电子邮件更新。如果不想，请将此选项设置为**关闭**。\n8.\
  \  你需要接受条款与条件两次：首先轻点左下角的蓝色**同意**按钮，然后在弹出确认框出现时轻点半透明的**同意**按钮。同样，验证可能需要几秒钟。\n9. \
  \ 随后，Apple 将设置你的新 Apple ID。这可能需要几秒钟。\n\n### 配置 iCloud 选项\n\n使用你的 Apple ID 登录后，即可配置你的\
  \ iCloud 设置：\n\n1.  如果你想使用**设置 iCloud**功能（我们建议你这样做，因为它是免费的，并提供大量有用的备份和同步功能），则保持\
  \ **iCloud** 选项设置为**开启**，然后轻点蓝色**下一步**按钮。\n2.  选择是使用 iCloud 备份服务通过无线方式将你的 iPhone\
  \ 备份到 Apple 的数据中心，还是通过 USB 使用 iTunes 备份到你的电脑。我们再次建议将 **iCloud** 设置为**开启**，因为它是自动的，你无需记住手动操作。\n\
  \n    ![images](img/U0108.jpg)\n\n3.  **查找我的 iPhone** 服务是 iCloud 的免费组成部分，它可以显示你手机的大致位置（你能知道它是在家里还是在办公室，但无法知道具体房间），可以让它响铃以便你在手机掉到汽车座椅下或沙发后面时找到它，甚至在手机丢失或被盗时擦除所有个人数据。如果你想使用此功能，请将此选项保持设置为**开启**。\n\
  4.  大功告成！你的 iPhone 现已设置完毕，可以开始使用了。\n\n### 使用 iCloud 恢复你的 iPhone\n\n如果你之前曾使用 iCloud\
  \ 备份过 iPhone，现在可以直接从你的设备通过无线方式从这个备份恢复：\n\n1.  轻点**从 iCloud 备份恢复**。\n2.  输入你的 iCloud\
  \ Apple ID 电子邮件地址和密码。\n3.  选择你想从中恢复的备份。通常，这将是最新的可用备份。\n4.  你的 iPhone 将重新启动、下载备份并再次重启。此过程可能需要几分钟，特别是当你有大量数据需要恢复时。\n\
  5.  一旦你的 iPhone 恢复完成，你的应用将开始下载和安装。iCloud 可以同时下载和安装多个应用，你可以在恢复过程中继续使用你的 iPhone。\n\
  \n\n\n### 使用 iTunes 设置你的 iPhone\n\n如果你不想使用 iCloud，或者想要从之前的 iTunes 备份中恢复数据，那么你仍然可以通过\
  \ USB 数据线在 PC 上设置你的 iPhone。\n\n如果你尚未在电脑上安装 iTunes，请打开网页浏览器并访问 [`www.itunes.com/download`](http://www.itunes.com/download)。从提供的链接下载该软件。\n\
  \n如果你已安装 iTunes，则应检查是否有更新版本可用。截至本书出版时，最新版本为 10.5 版。请按以下步骤更新你的 iTunes 版本：\n\n1. \
  \ 启动 `iTunes` 应用。\n2.  如果你使用的是 Windows 系统，请从菜单中选择 `帮助`，然后选择 `检查更新`。\n3.  如果你使用的是\
  \ Mac 系统，请从菜单中选择 `iTunes`，然后选择 `检查更新`。\n4.  如果有可用更新，请按照指示更新 iTunes。\n\n#### 从之前的备份中恢复你的\
  \ iPhone\n\n第一次将新 iPhone 连接到 iTunes 时，你将看到如 图 1–2 所示的画面。\n\n![图片](img/0102.jpg)\n\
  \n**图 1–2.** *设置你的 iPhone 画面*\n\n**注意：** 我们听闻有些用户在将非 iPhone 设备（例如 iPad 或 iPod touch）的备份恢复到\
  \ iPhone 时遇到了问题（例如死机和电池续航缩短）。另外，选择 `恢复` 的前提是你已经为旧设备创建了备份；否则，将没有任何数据可以恢复到你的新 iPhone\
  \ 上。\n\n请按以下步骤从其他 iPhone 或设备的备份中恢复数据：\n\n1.  点击 `从以下备份恢复：` 左侧的圆形单选按钮。\n2.  从下拉菜单中选择特定的备份文件。\n\
  3.  点击 `继续` 按钮，将备份文件中的数据恢复到你的 iPhone 上。至此，你的 iPhone 初始设置已完成。\n\n**注意：** 你仍需同步任何你想在新\
  \ iPhone 上使用的 App、游戏、音乐和其他媒体内容。\n\n### 维护你的 iPhone\n\n既然你已经使用 iTunes 完成了 iPhone\
  \ 的设置，接下来你会想知道如何安全地清洁屏幕，以及如何用各种保护壳来保护它。\n\n#### 清洁你的 iPhone 屏幕\n\n使用 iPhone 一段时间后，你会发现你的手指（或别人的手指）在原本光洁的屏幕上留下了污迹和油渍。你需要知道如何安全地清洁屏幕。一种让屏幕在一天中保持更洁净的方法是给\
  \ iPhone 贴上屏幕保护膜，这样做还有一个额外的好处，就是可以减少眩光（下一节将讨论）。\n\n我们还建议采取以下步骤：\n\n1.  按住顶部的 `睡眠/电源`\
  \ 键关闭 iPhone，然后使用滑动滑块将其关闭。\n2.  拔下所有线缆，例如 USB 同步线。\n3.  用柔软、不起毛的干布（比如清洁眼镜时用的那种布或类似材料）擦拭屏幕。\n\
  4.  如果干布效果不佳，可尝试在布上加一点点水使其微湿。如果使用湿布，请尽量防止水进入任何开口处。\n5.  另一种选择是使用 Klear Screen 公司生产的\
  \ `iKlear` 屏幕清洁剂。该产品适用于你的 iPhone 以及其他设备，比如电脑、笔记本电脑或 iPad 屏幕。\n\n**注意：** 切勿使用家用清洁剂、研磨性清洁剂（如\
  \ Soft Scrub）、含氨清洁剂（如 Windex）、酒精、喷雾剂或溶剂。\n\n#### 你的 iPhone 保护壳和保护套\n\n当你将 iPhone\
  \ 握在手中时，你会注意到它的做工是多么精美。你同时也会发现，它可能相当滑，容易轻微晃动，或者在你打字时，它的背面可能会被刮花。\n\n我们建议为你的 iPhone\
  \ 购买一个保护壳。普通的保护壳大约售价 10 到 40 美元，而高档皮革保护壳的价格可能达到 100 美元甚至更高。花费少量资金来保护你价值 200 美元或以上的\
  \ iPhone，是非常明智的。\n\n#### 在哪里购买保护壳\n\n你可以在以下任何地方购买 iPhone 保护壳：\n\n*   Amazon.com\
  \ ([`www.amazon.com`](http://www.amazon.com))\n*   Apple 配件商店 ([`http://store.apple.com`](http://store.apple.com))\n\
  *   iLounge ([`http://ilounge.pricegrabber.com`](http://ilounge.pricegrabber.com))\n\
  *   TiPB – iPhone + iPad 博客商店 ([`http://store.tipb.com/`](http://store.tipb.com/))\n\
  \n你也可以通过网络搜索“iPhone 保护壳”或“iPhone 保护套”来寻找。\n\n**提示：** 你*或许*可以将为其他类型智能手机设计的保护壳用在你的\
  \ iPhone 上。如果为了省钱而选择此途径，请务必确保你的 iPhone 能牢固地放入你选择的保护壳或保护套中。\n\n#### 购买什么...\n\n以下部分列出了适用于\
  \ iPhone 的几种保护壳类型及其预期价格范围。\n\n##### 橡胶/硅胶保护壳（10–30 美元）\n\n橡胶和硅胶保护壳提供缓冲握持感，能吸收 iPhone\
  \ 受到的撞击和磕碰，并将手机边缘（天线）与你的手指隔离开来。\n\n**优点**：这类保护壳价格低廉、颜色鲜艳且握持舒适。它们还能防止你的手指干扰 iPhone\
  \ 的天线，也就是手机的金属边缘。\n\n**缺点**：不如皮革保护壳显得专业。\n\n##### 带外置电池组的组合保护壳（50–80 美元）\n\n与外部电池组组合的保护壳有双重用途：它们将硬壳保护壳的保护特性与可充电的外部电池组结合在一起。诸如\
  \ Mophie 和 Case-Mate 等制造商正忙于开发其 iPhone 版本的此类保护壳；幸运的话，当你读到这本书时，这些产品可能已经上市了。\n\n**优点：**\
  \ 这些保护壳既能保护你的 iPhone，又能大大提升电池续航——在某些情况下，它们能将电池续航时间延长 50% 以上。\n\n**缺点：** 它们会增加手机的重量和体积。\n\
  \n##### 防水保护壳（10–40 美元）\n\n防水保护壳能保护你的 iPhone 免受水的侵害，让你可以在雨中、泳池边、海滩上、船上等环境中安全地使用设备。\n\
  \n**提示：** 如果你喜欢划船或划桨，那么你会需要一个防水保护壳。可以查看一下 `SpeedCoach Mobile` 这款应用，你可以在 App Store\
  \ 上以大约 65 美元的价格购买它。\n\n![图片](img/U0109.jpg)\n\n**优点**：这类保护壳能有效抵御各种水源的侵害。\n\n**缺点**：它们可能会使触摸屏更难操作，并且通常不能防止跌落或碰撞。\n\
  \n##### 硬塑料/金属保护壳（20–40 美元）\n\n硬塑料和金属保护壳能提供坚实的保护，防止刮擦、磕碰和短距离跌落。\n\n**优点**：这类保护壳为你的手机提供了出色的保护。\n\
  \n**缺点**：它们会增加一些体积和重量。此外，在为 iPhone 充电时，你可能需要取下此类保护壳，否则手机可能会过热。\n\n##### 皮革或特殊保护壳（50–100+\
  \ 美元）\n\n皮革和其他特殊保护壳能提供更奢华的质感，并保护 iPhone。\n\n**优点**：这类保护壳为你的手机增添了一抹奢华感，同时保护了设备的前部和后部。\n\
  \n**缺点**：它们价格更高，并且会增加体积和重量。\n\n##### 屏幕保护膜（5–40 美元）\n\n屏幕和后盖玻璃保护膜可以帮助你保护 iPhone\
  \ 的屏幕和背部免受刮擦。\n\n**优点**：这类保护膜通过防止刮擦来延长 iPhone 的使用寿命；大多数此类保护膜还能减少屏幕眩光。\n\n**缺点**：某些保护膜可能会增加眩光或影响屏幕的触摸灵敏度。\n\
  \n### iPhone 基础入门\n\n现在，你的 iPhone 已经充好电，屏幕干净整洁，并且配备了新的保护壳——接下来，让我们来看看操作其软件的一些基础知识。\n\
  \n\n\n#### 开机/关机与睡眠/唤醒\n\n要开启你的 iPhone，请按住 iPhone 顶部边缘的 `电源/睡眠` 按钮几秒钟。如果 iPhone\
  \ 完全关机，仅快速点击此按钮是无法开机的——在这种情况下，你需要按住按钮直到看到 iPhone 启动。\n\n当你不再使用 iPhone 时，有两个选项：你可以将其置于睡眠模式，或完全关闭它。\n\
  \n睡眠模式的优势在于：当你想要再次使用 iPhone 时，只需轻点 `电源/睡眠` 按钮或 `主屏幕` 按钮即可唤醒 iPhone。如果你想最大限度地节省电量，或者知道将有很长一段时间不会使用\
  \ iPhone（例如睡觉时），则应将其完全关闭。操作方法是：按住 `电源/睡眠` 按钮，直到出现 `滑动来关机` 滑块。只需向右滑动滑块，iPhone 便会关机。\n\
  \n#### 辅助触控功能\n\n作为其出色的辅助功能的一部分，苹果为有特殊身体或运动技能需求的人士提供了辅助触控功能。这些功能包括硬件按钮的触摸屏版本，以及常见和自定义手势。\n\
  \n请按照以下步骤启用辅助触控功能：\n\n1.  轻点 `设置` 图标。\n2.  轻点 `通用`。\n3.  轻点页面底部的 `辅助功能`。\n4.  轻点\
  \ `辅助触控`。\n5.  将 `辅助触控` 开关设置为 `开`。\n6.  当屏幕右下角出现 `辅助触控` 悬浮图标时，轻点该图标。\n7.  轻点 `主屏幕`\
  \ 以模拟物理按压硬件 `主屏幕` 按钮。\n8.  轻点 `设备` 以访问其他硬件按钮模拟器，包括 `旋转屏幕`、`锁定屏幕`、`静音`/`取消静音`、`调高音量`、`调低音量`\
  \ 和 `摇晃`。\n9.  轻点 `手势` 或 `收藏`（收藏手势）以访问捏合、轻扫以及任何已设置的自定义手势。\n10. 轻点悬浮菜单的中心以返回上一级菜单或退出辅助触控。\n\
  \n![images](img/U0110.jpg)\n\n**注意：** 辅助触控还支持复杂的手势，包括自定义手势。\n\n#### 滑动来解锁以及快速相机与媒体访问\n\
  \n你的 iPhone 激活后，你将看到 `滑动来解锁` 屏幕，如图 1–3 所示。\n\n当有音乐播放时，双击 `主屏幕` 按钮可查看媒体控制，更重要的是，在你想要快速抓拍照片时，可以即时访问相机。轻点底部滑块旁边的相机图标。\n\
  \n要进入你的 iPhone，请将手指放在屏幕上，并沿着箭头路径向右移动 `滑动来解锁` 按钮。完成此操作后，你将看到 `主屏幕` 屏幕。\n\n请注意底部 Dock\
  \ 栏中的四个图标。此 Dock 栏中的项目不会移动，而其余图标可以在 *页面* 之间来回移动。你可以在 第 6 章：“图标与文件夹” 的“移动图标”部分中了解如何将你喜欢的图标移入底部\
  \ Dock 栏。\n\n![images](img/0103.jpg)\n\n**图 1–3.** *滑动来解锁*、*快速相机与媒体访问* 以及你的主屏幕。\n\
  \n#### 在应用程序和设置屏幕内部导航\n\n在 iPhone 应用程序的各屏幕之间导航非常简单，只需轻点屏幕即可：\n\n1.  轻点 `设置` 图标以启动\
  \ `设置` 应用。\n2.  轻点 `通用` 以查看通用设置。\n3.  轻点 `网络` 以查看网络设置。\n4.  你可以通过轻点任何开关来切换它。例如，轻点\
  \ `数据漫游` 旁边的 `关闭` 开关会将其切换为 `开启`。\n5.  要返回上一级屏幕，请轻点左上角的按钮。在此例中，你应轻点 `通用` 按钮以离开 `网络设置`\
  \ 屏幕。\n\n#### 主屏幕按钮\n\n![images](img/U0111.jpg)\n\n你最常使用的按钮是 `主屏幕` 按钮。此按钮将启动你在 iPhone\
  \ 上执行的所有操作。如果你的 iPhone 处于休眠状态，请按一次 `主屏幕` 按钮以唤醒你的 iPhone（假设它处于睡眠模式）。\n\n按下 `主屏幕`\
  \ 按钮也会使你退出任何应用程序并返回 `主屏幕` 屏幕。\n\n#### 按住主屏幕按钮启动 Siri\n\n按住主屏幕按钮即可启动你的个人助理。然后只需对着你的\
  \ iPhone 说话即可。如果你已启用 `抬起唤醒`，你也可以简单地将 iPhone 举到耳边并开始对 Siri 说话。我们将在 第 7 章 中向你全面介绍\
  \ Siri。\n\n#### 双击主屏幕按钮访问快速应用切换器\n\n访问快速应用切换器只需双击 `主屏幕` 按钮。\n\n1.  在任何应用程序中或从 `主屏幕`\
  \ 屏幕，双击 `主屏幕` 按钮。\n2.  屏幕将向上滑动，你将在底部行看到一栏小图标。这些代表你自启动 iPhone 以来已启动的应用程序。\n3.  轻点任意图标即可切换回该应用。\n\
  4.  向左滑动手指可查看更多应用。\n5.  向右滑动手指可查看屏幕旋转锁定和媒体控制。\n6.  再次向右滑动手指可查看音量和 AirPlay 按钮。\n\n\
  ![images](img/U0112.jpg)\n\n按照以下步骤从特定应用访问快速应用切换器：\n\n#### 用于铃声和音频/视频播放的音量键\n\n在\
  \ iPhone 的上左侧（见图 1–4），你可以看到一些简单的 `调高音量`/`调低音量` 键，你会发现它们非常实用。\n\n##### 铃声音量\n\n如果你没有播放歌曲、视频或其他内容，按下这些\
  \ `音量` 键将会调整手机铃声的音量。\n\n**提示：** 当你在 `相机` 应用中时，`调高音量` 按钮会变成相机快门，让你可以快速拍照。\n\n#####\
  \ 静音手机铃声\n\n在 iPhone 左侧 `音量` 键上方有一个开关。将 `铃声静音` 开关滑向 iPhone 背面可将其设置为 `开启`。当声音静音时，开关旁边会亮起一小块橙色指示灯。要关闭静音，只需将开关滑回\
  \ iPhone 正面方向即可（见图 1–4）。\n\n##### 调整播放或通话音量\n\n你可以使用 `音量` 键在听音乐、看视频、享受其他内容甚至打电话时调高或调低手机音量。听音乐或看视频时，你也可以使用屏幕上的滑块来调整音量（见图\
  \ 1–4）。\n\n![images](img/0104.jpg)\n\n**图 1–4.** *在你的 iPhone 上调整音量或静音手机铃声*\n\n####\
  \ 在竖屏（垂直）方向上锁定屏幕\n\n如果你将 iPhone 侧向倾斜，你会注意到在某些应用程序中屏幕会旋转到横屏（水平）方向。你可能需要这种行为，以便使用更大的\
  \ `横屏` 键盘进行输入。然而，有时你可能不希望在你侧放 iPhone 时屏幕从竖屏方向旋转。针对这些情况，你可以将屏幕锁定在竖屏方向。\n\n1.  双击\
  \ `主屏幕` 按钮。\n2.  从左向右滑动以查看媒体和屏幕锁定控制。\n3.  轻点左侧图标中的 `竖排方向锁定` 按钮。\n4.  要禁用锁定，请再次轻点同一按钮。\n\
  \n**提示：** 方向锁定功能是在床上阅读 iBooks 的好方法。如果你更喜欢竖屏模式下较大的页面视图，请启用竖屏方向锁定功能。这样，当你将 iPhone\
  \ 放在腿上或近乎水平地拿着它时，屏幕不会意外地旋转到横屏模式。更多信息，请参阅 第 13 章：“iBooks 与电子书”。\n\n\n\n### 调整或禁用自动锁定超时功能\n\
  \n你会注意到，你的 iPhone 会在短时间后自动锁定并进入睡眠模式（即屏幕变黑）。你可以调整手机进入睡眠模式所需的时间，甚至完全禁用此功能，这些操作都在`设置`应用内完成。请按照以下步骤操作：\n\
  \n1. 在`主屏幕`上轻点`设置`图标。\n2. 轻点`通用`。\n3. 轻点`自动锁定`。\n4. 你会在本页`自动锁定`选项旁边看到当前的睡眠间隔设置。默认设置是\
  \ iPhone 闲置三分钟后锁定（以节省电池电量）。你可以将此间隔设置为`1 分钟`、`2 分钟`、`3 分钟`、`4 分钟`、`5 分钟`或`永不`。\n\
  5. 轻点所需的设置以选中它——当你看到其旁边出现对勾时，即表示已选中。\n6. 最后，轻点左上角的`通用`按钮，返回到`通用`屏幕。现在，你应该会看到你的更改已反映在“自动锁定”设置旁边。\n\
  \n**省电提示：** 将自动锁定功能设置为较短的时间间隔（例如`1 分钟`）将有助于节省电池电量。\n\n### 调整日期、时间、时区和 24 小时制\n\n\
  通常，日期和时间要么会自动为你设置，要么会在你连接 iPhone 到电脑时进行调整；你可以在第 3 章：“与 iCloud、iPhone 等同步”中了解更多相关信息。不过，你也可以非常轻松地手动调整日期和时间。当您携带\
  \ iPhone 旅行并需要在降落后调整时区时，可能需要进行此操作。请按照以下步骤操作：\n\n1. 轻点`设置`图标。\n2. 轻点`通用`。\n3. 向下滚动并轻点`日期与时间`，以查看`日期与时间`设置屏幕。\n\
  4. 如果你希望看到`09:30`和`14:30`，而不是`上午 9:30`和`下午 2:30`，则轻点`24 小时制`选项，将其开关设置为`开`。\n5. 要手动设置日期和时间，你需要关闭自动时间设置功能。轻点`自动设置`旁边的开关，将此选项设置为`关`。\n\
  \n    ![images](img/U0113.jpg)\n\n6. 要设置你的时区，请轻点`时区`并输入你所在时区的一个主要城市名称。输入时，iPhone\
  \ 会显示匹配的城市名称。\n7. 当你看到所在时区的正确城市时，轻点它以将其选中。在下面的图片中，我们输入了“Chicago”的前几个字母，直到它出现。接着，我们轻点了`美国，芝加哥`以将其选中。\n\
  8. 选择城市后，你将返回到主`日期与时间`屏幕，你选择的城市会显示在`时区`选项旁边。\n9. 轻点`设定日期与时间`以调整你的日期和时间。\n\n    ![images](img/U0114.jpg)\n\
  \n    ![images](img/U0115.jpg)\n\n    ![images](img/U0116.jpg)\n\n10. 在此屏幕上，你可以设置日期和时间。要调整日期，请轻点屏幕顶部显示的`日期`按钮。\n\
  11. 要调整时间，请轻点屏幕顶部显示的`时间`按钮。\n12. 然后，你可以通过上下触摸并滑动`日期`和`时间`滚轮来调整日期和时间，如下方图片所示。\n13.\
  \ 完成后，轻点左上角的`日期与时间`按钮。\n\n### 调整亮度\n\n你的 iPhone 配备有自动亮度控制功能；此功能默认处于开启状态。此功能使用内置光线传感器来调节屏幕亮度。当室外较暗或夜晚时，自动亮度控制会调暗屏幕。当天气晴朗明亮时，屏幕会自动变亮，以便于阅读。通常，我们建议你将此功能保持为`开`状态。\n\
  \n如果你想调整亮度，请使用`设置`应用中的控制项。请按照以下步骤操作：\n\n1. 从`主屏幕`轻点`设置`图标。\n2. 轻点`亮度`并移动滑块控件以调整亮度。\n\
  3. 轻点`自动亮度`旁边的开关，将其切换为`开`或`关`。\n\n![images](img/U0117.jpg)\n\n![images](img/U0118.jpg)\n\
  \n**提示：** 将`亮度`选项设置为较低的值有助于节省电池电量。亮度滑块位置略低于中间位置似乎效果不错。\n\n### 通知\n\n作为 iOS 5 的新功能，通知中心引入了一种更好、干扰更少、打扰更少的方式来组织和处理您在一天中收到的所有电话、电子邮件、短信、Twitter、Facebook、日历和其他提醒消息。\n\
  \n通知可以通过以下几种方式显示：\n\n* 作为`锁定`屏幕信息，这样你无需解锁手机即可快速浏览重要提醒。（此选项会牺牲一些隐私。）\n* 作为应用内通知，每当收到新消息时，会以简短、轮转的提醒形式显示在屏幕顶部。\n\
  * 在`通知中心`下拉菜单中，当您的 iPhone 解锁后，您可以随时随地向下一扫即可访问。\n\n![images](img/U0119.jpg)\n\n如果你以前使用过\
  \ iPhone，或者在 iOS 5 之前使用过 iPad 或 iPod touch，那么通知中心会在原有的声音/振动、数字标记和弹出式提醒等选项基础上增加新功能。由于它们不会中断操作，提醒不会中断你正在进行的`愤怒的小鸟`游戏或正在撰写的电子邮件，迫使你在继续游戏或写作之前必须关闭或打开它们。但你仍然可以选择处理那些你绝不能错过的事情，比如闹钟。\n\
  \n\n\n#### 锁定屏幕信息\n\n**锁定**屏幕上的通知以两种不同方式显示：作为弹出窗口显示单条最新通知，以及作为下拉列表显示所有近期通知。\n\n\
  如果在 iPhone 锁定时收到单条通知，屏幕会亮起，该通知将出现在**锁定**屏幕中央的黑色方框中。同时，通知左侧会显示一个与该类型通知关联的应用图标。例如，电子邮件会显示**邮件**应用图标；短信会显示**信息**图标；未接来电会显示**电话**图标；Facebook\
  \ 通知会显示**Facebook**图标，以此类推。此时，你可以执行以下几种操作：\n\n* 忽略该通知。这会使你的提醒消失，iPhone 屏幕将重新进入待机状态。\n\
  \n  ![images](img/U0120.jpg)\n\n* 抓住滑块（时间与日期正下方的三条灰色横线）并向下拖动，即可查看自上次解锁 iPhone 以来收到的所有通知列表。列表按通知类型排序，因此所有电子邮件会归为一组，所有日历事件、所有未接来电等亦如此。每条通知左侧，你还会看到相应的图标。\n\
  \n  **注意：** 如果你没有看到滑块，那是因为你没有近期通知。\n\n* 无论是在单条通知框还是列表中，点击通知左侧的图标，然后**滑动以查看**（或收听）该通知，就像你通常**滑动以解锁**\
  \ iPhone 一样。大多数情况下，你会被直接带到相应的应用，并显示完整的通知内容。例如，点击**邮件**应用图标并滑动，将解锁 iPhone、切换到**邮件**应用，并加载你刚刚收到的电子邮件。\n\
  \n![images](img/U0121.jpg)\n\n**注意：** 少数通知（如闹钟和系统消息，例如 iTunes 同步失败）可能还会在通知左侧显示一个按钮，例如闹钟的**稍后提醒**或同步失败的**确定**。点击按钮可延迟或解除通知。\n\
  \n**提示：** 如果你担心隐私问题，不想让任何人看到**锁定**屏幕上的个人电子邮件、短信或其他消息或提醒，可以在**设置**应用中将其关闭（请参阅本章后面的“配置通知中心”部分）。\n\
  \n#### 应用内通知\n\n当 iPhone 解锁且你正在使用时，新收到的通知会短暂地在屏幕顶部以动画形式出现，然后旋转向下显示通知。无论你处于**主屏幕**、内置**电话**应用还是心爱的视频游戏中，都会如此。通知仅覆盖顶部几个像素，因此不会妨碍你正在做的事情（或游戏）。对于应用内通知，你可以执行两种操作：\n\
  \n![images](img/U0122.jpg)\n\n* 忽略它，它会旋转向上并消失。（别担心：你可以通过点击**通知中心**下拉菜单再次查看该通知，后续章节会介绍此功能。）\n\
  * 点击通知，你会被直接带到关联的应用以查看完整消息。例如，点击后你会被带到**邮件**应用阅读电子邮件，或进入**信息**应用回复短信。\n\n#### 通知中心\n\
  \n任何时候当 iPhone 解锁时，你都可以从屏幕最顶部向下滑动，拉出**通知中心**选项。通知中心结合了数量极为有限的*小组件*（撰写本文时有两个）以及一个与**锁定**屏幕所见类似的通知列表。\n\
  \n要关闭通知中心，从屏幕底部向上滑动即可。\n\n撰写本文时可用的两个小组件是**天气**和**股票**：\n\n![images](img/U0123.jpg)\n\
  \n* **天气**小组件显示某个地区的当地天气（如果启用了基于位置的天气），或者显示你在内置**天气**应用中设置为第一个的城市天气（如果基于位置的天气已关闭或不可用）。它还会显示当天的最高、最低和当前温度。点击小组件上的任意位置，你会被带到**天气**应用。\n\
  * **股票**小组件显示你关注的股票行情，包括其近期市值以及显示近期涨跌的箭头。行情列表包含你在内置**股票**应用中当前设置的所有股票。点击小组件上的任意位置，你会被带到**股票**应用。\n\
  \n通知中心列表可用于以下应用和服务：\n\n* **日历**\n* **提醒事项**\n* **电话**（未接来电、语音邮件）\n* **信息**（短信/彩信/iMessage）\n\
  * **邮件**\n* Game Center\n* 你安装的、使用通知的任何其他应用或服务（例如 Twitter 等社交网络、**CNN** 等突发新闻应用，以及\
  \ OmniFocus 等任务管理器）\n\n通知列表按应用划分，每个应用有一个标题栏。标题栏左侧是*应用图标*，后面跟着*应用名称*。标题栏右侧，你可以看到一个\
  \ **X** 图标。点击 **X** 图标可清除该应用的所有通知。例如，点击**邮件**图标右侧的 **X** 将清除所有电子邮件通知；但这不会清除任何其他通知。\n\
  \n![images](img/U0124.jpg)\n\n在标题栏下方，你会看到该应用的所有当前（未读）通知，包括收到时间、发送者（如适用）以及内容预览。例如，你可能会看到最近的\
  \ Facebook 消息或 Game Center 挑战列表。点击列表中任何通知上的任意位置，都会切换到关联应用并显示完整消息。\n\n![images](img/U0125.jpg)\n\
  \n\n\n### 配置通知中心\n\n通知中心可通过 `设置` 应用轻松配置：\n\n1.  在主屏幕上点击 `设置` 应用图标。\n2.  点击 `通知`。\n\
  \n通知中心可以**按时间**排序通知（小组件在上，然后按最新通知的顺序排列），也可以**手动**排序。请按照以下步骤手动重新整理通知：\n\n1.  在 **排序应用**\
  \ 下，点击 `手动`。\n2.  在屏幕右上角，点击 `编辑` 按钮。\n3.  每个应用的右侧会出现三个灰色横条形式的手柄。抓住手柄，将应用向上或向下拖动，按您最喜欢的顺序排列。\n\
  4.  当您将所有应用按所需顺序排好后，点击屏幕右上角的蓝色 `完成` 按钮。\n\n![images](img/U0126.jpg)\n\n要显示或隐藏 `天气`\
  \ 或 `股票` 小组件，根据需要点击相应小组件将其切换为 `开` 或 `关`。\n\n要选择通知列表的工作方式，请按照以下步骤操作：\n\n1.  点击您想要编辑的应用（例如\
  \ `邮件`）。\n2.  将 `通知中心` 开关切换为 `关`，将该应用从通知中心完全移除。将其切换为 `开` 即可恢复。\n3.  选择在列表中`显示`您偏好的通知数量。在撰写本文时，可供选择的选项限于\
  \ **1 个未读项目**、**5 个未读项目** 和 **10 个未读项目**。\n4.  选择您偏好的应用内通知的`提醒样式`。\n    -   `无`\
  \ 表示您永远不会看到提醒。\n    -   `横幅` 表示您会在屏幕顶部看到微妙的动画通知，不会打断您。如果您愿意，此选项可让您忽略该通知，这对于大多数通信通知（如电子邮件、短信、Facebook\
  \ 等）非常有用。\n    -   `提醒` 表示您会看到一个无法忽略的弹出框。您要么必须手动关闭它，要么立即对其采取行动。这对于闹钟、约会和其他紧急事项非常有用。\n\
  \n![images](img/U0127.jpg)\n\n您还可以设置与通知相关的其他几个选项：\n\n-   `标记应用图标`：此选项会在主屏幕图标的右上角添加一个红色小圆圈。这个红色圆圈表示每个应用包含的未读通知数量。例如，`邮件`图标上的数字\
  \ 10 表示您有 10 封未读邮件在等待您。如果您希望不看到它们，可以将此功能切换为`关`；如果您希望显示它们，则切换为`开`。\n-   `声音`：此选项允许您打开或关闭传入通知的音频（和振动）提醒。如果通知很紧急，比如短信，您可能希望将声音保持为`开`。\n\
  -   `显示预览`：此选项会添加与通知相关的消息的前几行，以便您一目了然地了解其大意。此功能使您无需滑动并点击进入应用即可查看通知内容，从而阅读整条信息。如果更注重隐私，您可能希望将此功能切换为`关`。\n\
  -   `在锁定屏幕中显示`：此选项允许您在`锁定`屏幕上打开或关闭通知。同样，如果涉及隐私问题，您可能希望将此功能切换为`关`。\n\n**注意：** 并非所有应用在通知中心都有相同的选项。例如，有些应用可能提供声音提醒，而其他应用则没有。\n\
  \n当您关闭某个特定应用的通知时，它会被放到`设置`中的*不包含在通知中心内*独立列表里。这可以让您轻松查看哪些应用正在向您发送通知，哪些没有。\n\n###\
  \ 通知中心的辅助功能选项\n\nApple 为有特殊视觉或听力需求的人士提供了各种辅助功能选项，包括自定振动和 LED 闪烁以示提醒。\n\n按照以下步骤启用通知的辅助功能选项：\n\
  \n1.  点击 `设置` 图标。\n2.  点击 `通用`。\n3.  点击页面底部的 `辅助功能`。\n4.  将 `自定振动` 切换为 `开`，可为您的联系人分配独特的振动模式（可在`声音偏好设置`中创建模式）。\n\
  5.  将 `LED 闪烁以示提醒` 切换为 `开`，以便在有通知进来时让相机闪光灯闪烁。\n\n![images](img/U0128.jpg)\n\n"
- "# 第 2 章\n\n## 键入、拷贝和搜索\n\n在本章中，我们将向您展示一些在 iPhone 上键入的好方法，并在此过程中节省宝贵的时间。同时，我们还将向您展示如何使用`竖屏`（垂直/较小）和`横屏`（水平/较大）键盘。我们还会教您如何选择不同的语言键盘、如何键入符号以及其他技巧。\n\
  \n在本章后面，我们将介绍 Spotlight 搜索以及拷贝和粘贴功能。拷贝和粘贴功能将为您节省大量时间，并在您使用 iPhone 时提高准确性。\n\n###\
  \ 在 iPhone 上键入\n\n您很快就会在 iPhone 上找到两个屏幕键盘：当您垂直握住 iPhone 时可见的较小`竖屏`键盘，以及当您水平握住 iPhone\
  \ 时可见的较大`横屏`键盘。好在您可以选择最适合您的键盘。\n\n#### 用两个拇指在屏幕上键入\n\n您会发现，刚开始使用 iPhone 时，最容易的方式是用一根手指（通常是指食指）键入，同时用另一只手握住\
  \ iPhone。\n\n![images](img/U0201.jpg)\n\n过一段时间后，您应该能够尝试用拇指键入（就像您看到许多人在使用其他手机时那样，例如\
  \ BlackBerry 智能手机）。一旦稍加练习，用两个拇指代替一个手指键入将大大提高您的速度。请耐心点：要熟练地用两个拇指快速键入确实需要练习。\n\n实际上，过一段时间后您会注意到，键盘的触摸灵敏度会假定您正在用两个拇指键入。这意味着键盘左侧的字母应在其左侧按下，而右侧的键应在其右侧按下。\n\
  \n在许多应用中，只需将 iPhone 横过来，键盘就会切换成更大的`横屏`键盘，使键入更容易。\n\n![images](img/U0202.jpg)\n\n\
  **提示：** 如果您手比较大，觉得在较小的竖屏键盘上键入有挑战性，那么请将 iPhone 侧放，即可获得更大的`横屏`键盘。\n\n#### 使用快捷短语键入常用短语\n\
  \niPhone 上一个不错的功能是能够为键入常用短语甚至是一些句子（例如去往您家或公司的路线）设置快捷输入。\n\n**提示：** 在 iPhone 上键入常用短语时，使用快捷输入来节省时间。您甚至可以使用快捷输入来键入一些句子，例如如何到达您家，或者您经常键入的内容。\n\
  \n在`设置`应用中访问快捷短语。点击 `设置` 图标，然后点击 `通用`，再点击 `键盘`，然后向下滑动到屏幕底部以查看可用的快捷短语。\n\nApple 为您提供了一个\
  \ `omw` 的示例快捷短语。当您在 iPhone 上键入 `omw` 时，您会看到弹出窗口显示短语“在路上！”。\n\n![images](img/U0203.jpg)\n\
  \n点击 `添加新的快捷短语` 以创建一个新的。\n\n![images](img/U0204.jpg)\n\n![images](img/U0205.jpg)\n\
  \n键入将要替换快捷短语的`短语`，然后键入`快捷短语`本身。在这个例子中，我们想要一个快捷短语来键入去往我们家的路线。所以我们设的`快捷短语`是 `dirh`，`短语`是一步一步到达我们家的路线。保存您的新快捷短语并试一下。\n\
  \n\n\n### 利用自动纠正功能节省时间\n\n当你输入一段时间后，会开始注意到在某些单词正下方会出现一个小弹出窗口——这就是*自动纠正*功能。你定义的任何`快捷指令`也会以弹出建议的形式出现。\n\
  \n**注意**：如果你从未看到过`自动纠正`弹出窗口，则需要进入`设置`应用![images](img/U001.jpg)`通用`![images](img/U001.jpg)`键盘`，然后将`自动纠正`设置为`开启`，以启用该功能。\n\
  \n![images](img/U0206.jpg)\n\n当你看到正确的单词被猜出时，只需按下键盘底部的`空格`键即可节省时间；这样操作便会选中该单词。\n\n\
  在下一个示例中，我们开始输入单词“especially”；当输入到其中的字母“c”时，正确的单词会出现在下方的弹出窗口中。要选中它，我们只需按下键盘底部的`空格`键（请参阅图\
  \ 2–1）。\n\n![images](img/0201.jpg)\n\n**图 2–1.** *使用自动纠正和建议单词*\n\n你的第一反应可能是点击弹出的单词，但这只会从屏幕上清除该建议单词。实际上，更快捷的方式是继续输入，或者在看到正确的单词弹出时按下`空格`键。在大多数情况下，单词要么是正确的，要么会随着你的继续输入而变正确——从长远来看，这能减少手指的移动量。\n\
  \n**提示：** 自动纠正功能还会检索你的`通讯录`列表以提供建议。例如，如果马丁·特劳奇奥德（Martin Trautschold）在你的`通讯录`中，那么在你输入“Trauts”后，就会看到“Trautschold”作为自动纠正建议出现。\n\
  \n学会使用`空格`键后，你会发现这种弹出猜测功能能大大节省时间。毕竟，你原本在单词末尾也是需要输入一个空格的。\n\n有时你会意外接受一个错误的自动纠正单词；这时，你只需按下`退回`键![images](img/U0207.jpg)。这样做会弹出一个窗口，其中包含自动纠正功能更改之前的原始单词。你还会看到其他建议的替换词（请参阅图\
  \ 2–2）。\n\n![images](img/0202.jpg)\n\n**图 2–2.** *处理错误的自动纠正单词*\n\n**提示：** 使用自动纠正功能，你可以避免在许多常见缩略词（例如“wont”和“cant”）中输入撇号，从而节省时间。自动纠正功能会显示一个弹出窗口，其中包含拼写正确的缩略词；你只需按下`空格`键即可选中高亮显示的纠正结果。\n\
  \n![images](img/U0208.jpg)\n\n对于某些单词，你需要多输入一个字符，自动纠正功能才能判断你的意图：\n\n*   输入“Weree”得到“We’re”。\n\
  *   输入“Welll”得到“We’ll”。\n\n## 语音朗读自动纠正单词\n\n你可以将 iPhone 设置为在自动文本和自动纠正单词出现时朗读它们。这可能有助于你选择正确的单词。请按照以下步骤启用此朗读功能：\n\
  \n1.  点击`设置`图标。\n2.  点击`通用`。\n3.  点击页面底部的`辅助功能`（需要向下滑动）。\n4.  将`朗读自动文本`旁边的开关设置为`开启`。\n\
  \n启用此功能后，你将在输入时听到弹出的自动纠正单词被大声朗读出来。如果你同意听到的单词，请按`空格`键接受；否则，继续输入。这可以节省你从键盘上抬头看的时间。\n\
  \n### 拼写检查\n\n与自动纠正功能协同工作的是 iPhone 内置的拼写检查功能。大多数时候，你拼错的单词会被自动纠正功能发现并自动更正。其他时候，单词可能不会被更正，但仍然是拼写错误的。你会看到\
  \ iPhone 认为拼写错误的单词下方会出现红色虚线，如图 2–3 所示。\n\n![images](img/0203.jpg)\n\n**图 2–3.**\
  \ *使用内置拼写检查功能*\n\n**提示：** 如果你的拼写检查功能中错误单词太多，你可以通过清除所有自定义单词来让它重新开始。请按照以下步骤操作：\n\n\
  1.  点击`设置`图标。\n2.  点击`通用`。\n3.  点击底部的`还原`。\n4.  点击`还原键盘词典`。\n5.  点击`还原词典`进行确认。\n\
  \n执行上述步骤将清除已添加到 iPhone 词典中的所有自定义单词。\n\n### 辅助功能选项\n\niPhone 上有许多有用的辅助功能。例如，“旁白”选项可以为你朗读屏幕上显示的各种内容。它会告诉你点击了哪些元素、选择了哪些按钮以及所有可用选项。它还能朗读整个屏幕的文本。如果你希望看到更大的内容，还可以开启“缩放”选项，具体操作将在本章后面的“使用缩放功能放大整个屏幕”部分中描述。\n\
  \n## 让 iPhone 为你朗读（旁白）\n\niPhone 的一个很酷的功能是“旁白”选项。开启此功能后，你的手机将朗读屏幕上显示的任何内容。你甚至可以让它朗读任何电子邮件、文本文档，甚至`iBook`页面中的内容。\n\
  \n**提示：** 在公共场所时，请使用耳机并保持`旁白`选项为`开启`状态；这不仅能让你更清晰地听到朗读内容，还能避免打扰他人。\n\n请按照以下步骤启用“旁白”功能：\n\
  \n1.  点击`设置`图标。\n2.  点击`通用`。\n3.  点击页面底部的`辅助功能`。\n4.  点击`旁白`。\n5.  将`旁白`开关设置为`开启`。\n\
  \n**注意：** 如右侧屏幕所示，“旁白”手势与常规手势不同。请点击“练习旁白手势”按钮来熟悉它们。\n\n![images](img/U0209.jpg)\n\
  \n以下是使用“旁白”功能的一些额外提示：\n\n*   向下滚动`旁白`屏幕以查看更多设置。\n*   通过更改`朗读提示`选项的设置，来调整是否朗读提示。\n\
  *   使用旁白输入时，默认情况下你输入的每个字符都会被朗读出来。你可以通过点击`键入反馈`来更改此设置。在下一个屏幕上，你可以将此选项设置为`字符`、`单词`、`字符和单词`或`无`。\n\
  *   通过滑动此选项下方的滑块来调整`朗读速率`。\n*   通过设置开关来调整是否使用`语音`和`音高变化`。\n\n![images](img/U0210.jpg)\n\
  \n要让`备忘录`或`iBooks`应用为你朗读整个页面，你需要同时点击屏幕上文本块的底部和顶部。如果用一个手指点击文本，则只会朗读单行内容。\n\n## 朗读所选内容与朗读自动文本\n\
  \n`朗读所选内容`功能与`旁白`类似，但它与“拷贝与粘贴”功能关联，会在所选文本的弹出菜单中添加一个`朗读`选项。`朗读自动文本`功能会大声读出拼写字典自动大写或更正的任何文本。\n\
  \n使用`朗读所选内容`功能时，你可以使用与旁白功能类型相同的滑块来调整朗读速率。`朗读自动文本`选项只能`开启`或`关闭`。\n\n![images](img/U0211.jpg)\n\
  \n\n\n#### 使用辅助触控\n\n如果你在触摸屏幕时有困难，或者使用特殊的配件来辅助触摸屏，那么你会想要开启“辅助触控”。在`设置`中的“辅助功能”部分即可进行设置。\n\
  \n开启后，屏幕右下角会出现一个小白圈。轻点这个小圆点，即可调出`AssistiveTouch`菜单。\n\n![images](img/U0212.jpg)\n\
  \n辅助触控可让你执行以下操作：\n\n* 轻点`手势`可模拟 2、3、4 或 5 指手势。\n* 轻点`个人收藏`可访问你自定义的手势。\n* 轻点`设备`可访问常用设备命令，例如屏幕旋转、静音、音量、晃动和锁定屏幕。\n\
  * 轻点`主屏幕`图标可模拟实际点击`主屏幕`按钮的操作。\n\n![images](img/U0213.jpg)\n\n你甚至可以在“个人收藏”菜单中设置自定义手势以便访问。\n\
  \n轻点`创建新手势`，然后在屏幕上移动手指来创建屏幕手势。你会看到白色线条跟随指尖的移动轨迹。\n\n接着，轻点`停止`按钮。\n\n按下`播放`查看手势是否正确，最后轻点顶部的`存储`，并为新手势命名。\n\
  \n之后，你就能在“辅助触控”的`个人收藏`菜单中看到这个新手势。\n\n![images](img/U0214.jpg)\n\n#### 使用缩放功能放大整个屏幕\n\
  \n如果你觉得屏幕上的文本、图标、按钮或其他内容看起来有点吃力，可能需要开启“缩放”功能。开启“缩放”功能后，你可以将整个屏幕放大到正常大小的近两倍——所有内容都更容易阅读。\n\
  \n**注意：** 你无法同时使用“旁白”和“缩放”功能；你需要选择其中一种。除了放大整个屏幕，你还可以使用“更大字体”功能仅增大主要应用的字体大小。我们将在“使用更大字体的文本以方便阅读”部分介绍具体方法。\n\
  \n请按照以下步骤启用`缩放`功能：\n\n1. 轻点`设置`图标。\n2. 轻点`通用`。\n3. 轻点页面底部的`辅助功能`。\n4. 轻点`缩放`。\n\
  5. 将`缩放`旁边的开关设置为`开启`。\n\n与“旁白”类似，“缩放”也使用三指手势。在离开此屏幕前，请务必熟悉这些手势。\n\n![images](img/U0215.jpg)\n\
  \n#### 白底黑字\n\n如果屏幕上的对比度和颜色难以辨认，你可能希望将`白底黑字`设置设为`开启`。请按照以下步骤操作：\n\n1. 如前所述，进入`设置`应用中的`辅助功能`屏幕。\n\
  2. 将`白底黑字`开关设为`开启`。启用此选项后，屏幕上所有浅色内容将变为黑色，所有深色或黑色内容将变为白色。\n\n##### 使用更大字体的文本以方便阅读\n\
  \n通过使用“更大字体”功能，你可以显著增大`通讯录`、`邮件`、`信息`和`备忘录`应用中的字体大小。请按照以下步骤操作：\n\n1. 轻点`设置`图标。\n\
  2. 轻点`通用`。\n3. 轻点页面底部的`辅助功能`（需要向下滑动）。\n4. 轻点`更大字体`。随后你将看到字体大小选项屏幕：`关闭`、`20 磅文本`、`24\
  \ 磅文本`、`32 磅文本`、`40 磅文本`、`48 磅文本`和`56 磅文本`。轻点你希望使用的大小。右侧显示的图像使用的是 48 磅字体。\n5. 轻点左上角的`辅助功能`按钮返回上一屏幕，然后轻点`主屏幕`按钮退出`设置`。\n\
  \n![images](img/U0216.jpg)\n\n#### 连按三次主屏幕按钮选项\n\n你可以设置连按三次`主屏幕`按钮来执行与辅助功能相关的各种操作。请按照以下步骤调整这些选项：\n\
  \n1. 如前所述，进入`设置`应用中的`辅助功能`屏幕。\n2. 轻点页面底部附近的`连按三次主屏幕按钮`。\n3. 从`关闭`、`切换旁白`、`切换白底黑字`或`询问`中选择。\n\
  \n### 使用放大镜编辑文本或放置光标\n\n你是否曾多次在打字时，想要将光标精确地放置在两个字或两个字母之间？\n\n在掌握放大镜技巧之前，这可能很难做到。操作方法是：长按你希望放置光标的位置（参见图\
  \ 2-4）。一两秒后，你会看到`放大镜`图标出现。然后，手指按住屏幕并滑动以定位光标。松开手指后，你会看到`拷贝和粘贴`弹出菜单，但你可以忽略它。\n\n![images](img/0204.jpg)\n\
  \n**图 2-4.** *长按屏幕可看到`放大镜`图标并放置光标。*\n\n### 输入数字和符号\n\n如何使用 iPhone 屏幕键盘输入数字或符号？打字时，轻点左下角的`123`键可查看数字和常用符号，例如`$\
  \ ! ~ & = # . _ - +`。如果需要更多符号，在“数字”键盘上轻点左下角`ABC`键上方的`#+=`键（参见图 2-5）。\n\n![images](img/0205.jpg)\n\
  \n**图 2-5.** *在`字母`、`数字`和`符号`键盘之间切换*\n\n**提示：** 输入数字或符号后，请注意`数字`键盘会保持激活状态，直到你按下`空格`键或按下切换到其他键盘的按键，例如切换到`字母`键盘的`ABC`键。\n\
  \n#### 触摸并滑动技巧\n\n一种可以在许多地方应用的酷炫技巧是触摸并滑动。在接下来的几节中，我们将介绍它的用法以及如何利用它。\n\n##### 输入大写字母\n\
  \n输入大写字母时，通常的做法是先按`Shift`键，然后再按所需的字母。\n\n更快地输入单个大写字母和需要按`Shift`键的符号的方法是：按住`Shift`键，手指保持在键盘上，滑动到你想要的按键上，然后松开。\n\
  \n例如，要输入大写字母“D”，先按住右侧的`Shift`键，然后滑动到`D`键上再松开。\n\n![images](img/U0217.jpg)\n\n#####\
  \ 快速输入单个数字\n\n如果只需要输入一个数字，可以按住`123`键，然后将手指向上滑动到该数字上。但是，如果要连续输入多个数字，最好先按下`123`键，松开手指，然后再依次按下每个数字。\n\
  \n\n\n### 长按键盘快捷键输入符号等更多内容\n\n你可能想知道如何输入键盘上未显示的符号。\n\n**提示：** 你可以输入比屏幕上显示的更多的符号。\n\
  \n![images](img/U0218.jpg)\n\n你只需长按与你想要的符号相关的字母、数字或符号即可。\n\n例如，如果你想输入日元符号 (¥)，长按\
  \ `$` 键直到看到其他选项。接着，向上滑动手指以高亮选中日元符号，然后松开手指。\n\n这个技巧在 `Safari` 网络浏览器中的 `.com` 键以及输入电子邮件地址时长按`句号`（`.`）键也同样有效。你可以通过长按\
  \ `.com` 或`句号`键来获取其他网站后缀。\n\n![images](img/U0219.jpg)\n\n上图显示了 `.co`、`uk`、`.ie`、`.de`、`.ca`\
  \ 和 `.eu` 键。这些键在标准美式键盘上并不会显示，但在此例中它们存在，是因为我们安装了额外的国际键盘。你将在本章稍后的“用其他语言输入——国际键盘”部分学习如何启用国际键盘。\n\
  \n**提示：更多实用但隐藏的符号**\n\n在`符号`键盘上，`退格键`正上方有一个很好的项目符号字符。你也可以通过长按`零`键（`0`）获得角度符号。此外，你可以长按\
  \ `?` 和 `!` 键来获取它们在西班牙语中的倒置版本。\n\n## 大写锁定\n\n双击`Shift`键可开启大写锁定功能。当`Shift`键变为蓝色时，即表示已开启。![images](img/U0220.jpg)\n\
  \n要关闭大写锁定，只需再次按下`Shift`键即可。![images](img/U0221.jpg)\n\n## 快速选择、删除或更改文本\n\n你可能需要快速更改或删除正在输入的文本。请按以下步骤操作：\n\
  \n1.  双击选中你想要更改或删除的部分文本。\n\n    ![images](img/U0222.jpg)\n\n2.  拖动蓝色控制柄调整选区。\n\n\
  \    ![images](img/U0223.jpg)\n\n3.  要删除选中的文本，按下`退格键`。![images](img/U0225.jpg)\n\
  \n    ![images](img/U0224.jpg)\n\n4.  要替换文本，直接开始输入即可。文本将立即被你输入的字母替换。\n\n## 键盘选项与设置\n\
  \n有一些键盘选项可以让你的 iPhone 输入更轻松。这些键盘选项位于`设置`应用的`通用`选项卡中。请按以下步骤访问：\n\n1.  点击`设置`图标。\n\
  2.  点击`通用`。\n3.  向上滑动，然后点击页面底部的`键盘`。\n\n![images](img/U0226.jpg)\n\n### 开启或关闭自动修正\n\
  \n如本章前面所述，自动修正功能将使用 iPhone 的内置词典自动更改常见拼写错误的单词。如果你希望此功能生效，需要确保它处于`开启`状态。（这是默认设置。）\n\
  \n### 自动大写\n\n当你开始一个新句子时，如果`自动大写`选项设置为`开启`，单词将自动大写。\n\n此功能还会正确大写常见的专有名词。例如，如果你输入“New\
  \ york”，系统会提示你将其更改为“New York”——同样，只需按下`空格键`即可执行修正。如果你用退格键删除一个大写字母，iPhone 会假定你新输入的字母也应大写。此功能默认也设为`开启`。\n\
  \n![images](img/U0227.jpg)\n\n### 启用大写锁定\n\n有时你可能只想输入大写字母；为此，只需双击`大写`键即可。\n\n此功能默认设为`关闭`。\n\
  \n### “.”快捷键\n\n如果你双击`空格键`，它会在句子末尾自动添加一个句号；此功能默认设为`开启`。\n\n## 用其他语言输入——国际键盘\n\n\
  在撰写本文时，iPhone 支持你用十几种不同的语言输入，包括从荷兰语到西班牙语的所有语言。某些亚洲语言，如日语和中文，提供了两种或三种键盘用于不同的输入法。\n\
  \n### 添加新的国际键盘\n\n请按以下步骤启用各种语言键盘：\n\n1.  点击`设置`图标。\n2.  点击`通用`。\n3.  点击页面底部的`键盘`。\n\
  4.  点击`国际键盘`。\n5.  点击`添加新键盘`。\n6.  点击列出的任何键盘或语言以添加它。现在你将看到该键盘出现在可用键盘列表中。\n7.  在`符号`键盘上，`退格键`正上方有一个很好的项目符号字符。你也可以通过长按`零`键（`0`）获得角度符号。此外，你可以长按\
  \ `?` 和 `!` 键来获取它们在西班牙语中的倒置版本。\n\n**提示：** iOS 5 包含内置的 Emoji 键盘。Emoji 是大量日本符号的集合，包括各种笑脸和哭脸、节日图像、建筑物和车辆等等。虽然这些符号在日本有更具体的含义，但世界各地的人们已经开始在短信、Twitter\
  \ 和其他在线消息服务中使用它们。\n\nEmoji 键盘可以像任何其他键盘一样在“设置”中添加。\n\n![images](img/U0228.jpg)\n\n\
  ### 编辑、重新排序或删除键盘\n\n你可能想要调整某个键盘的选项、重新排序键盘在列表中的显示顺序，或者干脆删除不再使用的键盘。请按以下步骤操作：\n\n1.\
  \  按照本章前面“添加新的国际键盘”部分中的步骤 1-4 操作；这将让你查看国际键盘列表。\n2.  要调整特定键盘的选项，在键盘列表中点击它。在我们的示例中，我们点击了`加拿大法语`。\n\
  3.  点击相应部分中的选项更改`软件键盘布局`。\n4.  点击相应部分中的选项调整`硬件键盘布局`。\n5.  点击左上角的`键盘`按钮保存你的选择并返回键盘列表。\n\
  \n    ![images](img/U0229.jpg)\n\n6.  要重新排序或删除键盘，点击右上角的`编辑`按钮。\n7.  要更改键盘顺序，触摸并拖动带有三条灰色横线的键盘右侧边缘向上或向下。\n\
  8.  要删除键盘，点击`红色减号`使其摆动到垂直位置，然后点击`删除`。\n9.  要完成键盘编辑，点击右上角的`完成`按钮。\n\n![images](img/U0230.jpg)\n\
  \n当你至少安装了一个国际键盘后，你会注意到出现了一个小小的`地球`键。按下`地球`键可在所有语言之间循环切换。\n\n**提示：** 你可以长按`地球`键来查看可用键盘列表。这将使你能够快速选择你想要使用的键盘。\n\
  \n![images](img/U0231.jpg)\n\n日语、中文和一些其他语言提供了多种键盘选项，以满足你的输入偏好。\n\n在某些语言（如日语）中，你会看到输入的字母变成字符，或者你可以自己手写绘制字符。你还可能在键盘上方看到一行其他字符组合。当你看到想要的组合时，点击它。\n\
  \n\n\n### 复制与粘贴\n\n“复制与粘贴”功能非常实用，既能节省时间，又能提高打字准确度。你可以利用此功能将邮件中的文本（例如会议详情）复制并粘贴到日历中。或者，你也许只是想将表单某处的电子邮件地址复制到另一处，省去重新输入的麻烦。（我们将在第\
  \ 4 章：“其他同步方式”的“设置 Exchange/Google 账户”部分为你演示这一技巧。）复制与粘贴的用途十分广泛；你用得越熟练，就越会频繁使用它。你甚至可以从你的\
  \ `Safari` 网页浏览器中复制文本或图片，然后粘贴到 `Notes` 或 `Mail` 信息中。\n\n#### 通过双击选择文本\n\n如果你正在阅读或输入文本，可以双击它以开始选择要复制的部分文本。这在\
  \ `Mail`、`Messages` 和 `Notes` 应用中效果很好。\n\n你会看到一个带有蓝色圆点（操作柄）的方框，位于对角处。\n\n![images](img/U0232.jpg)\n\
  \n只需拖动这些操作柄，即可选中你想要高亮并复制的文本。\n\n![images](img/U0233.jpg)\n\n**提示：** 如果你想选择所有文本，请点击光标，或在文本上方或下方双击屏幕。这将弹出一个窗口，显示\
  \ `Select` 和 `Select All` 选项。点击 `Select` 选择一个单词，或点击 `Select All` 高亮所有文本。\n\n![images](img/U0234.jpg)\n\
  \n#### 通过双指触摸选择文本\n\n另一种选择文本的方式是同时用两根手指触碰屏幕。如果你用一只手握住 iPhone，用另一只手的拇指和食指触碰屏幕，这种方法效果最佳。你也可以将\
  \ iPhone 放在桌子上，用双手各一根手指触碰屏幕。请按照以下步骤使用此方法：\n\n1.  在你要选择的文本的起始处和结束处同时触碰屏幕。如果第一次触摸时没能精确选中，不必担心。\n\
  2.  双指触摸后，使用蓝色操作柄将选区的起始和结束位置拖拽到正确位置。\n\n#### 通过长按选择网站或其他不可编辑文本\n\n在 `Safari` 网页浏览器以及其他你无法编辑文本的地方，用手指按住某段文本，该段落将被高亮，并在每个角上显示操作柄。\n\
  \n接下来，如果你想选择更多文本，就拖动这些操作柄。\n\n**注意：** 如果拖动范围小于一个段落，选择器将切换为精细文本模式，并在选区两端提供蓝色操作柄，以便你精确选择所需的字符或单词。如果拖动手指超过一个段落，则会启用粗略文本选择器，你可以向上或向下拖动，以选择整段整段的文本和图形。\n\
  \n![images](img/U0235.jpg)\n\n#### 剪切或复制文本\n\n一旦突出显示了你要复制的文本，只需触摸屏幕顶部的`Copy`选项卡。该选项卡会变为蓝色，表示文本已存入剪贴板。\n\
  \n**注意：** 如果你之前已经剪切或复制过文本，那么你还会看到 `Paste` 选项，如右图所示。\n\n![images](img/U0236.jpg)\n\
  \n#### 应用切换与多任务处理\n\n复制文本后，你可能想将其粘贴到另一个应用中。例如，你可能想从 Safari 复制一些文本，然后粘贴到 Notes 或\
  \ Mail 信息中。在应用之间跳转的最简单方法是使用 `App Switcher` 应用。请按照以下步骤将一个应用中的文本粘贴到另一个应用中：\n\n1. \
  \ 复制或剪切你的文本。\n2.  双击 `Home` 按钮，调出屏幕底部的 `App Switcher` 应用。\n3.  如果你刚刚让一个应用在后台运行，你可以在\
  \ `App Switcher` 栏中找到它。\n4.  向左或向右滑动，找到你想要的应用并点击它。\n5.  如果你在 `App Switcher` 栏中没有看到想要的应用，则点击\
  \ `Home` 按钮，然后从 `Home` 屏幕启动它。\n6.  现在，长按屏幕，然后从弹出窗口中选择 `Paste` 来粘贴文本。\n7.  再次双击 `Home`\
  \ 按钮，点击你刚才离开的应用，即可跳转回去。\n\n#### 粘贴文本\n\n在同一个应用中粘贴文本很简单。例如，只需按照以下步骤将文本粘贴到同一个 `Notes`\
  \ 或 `Mail` 信息中：\n\n1.  用手指将光标移动到你想粘贴文本的位置。记住我们本章前面展示的`放大镜`技巧；这可以帮助你定位光标。\n2.  松开屏幕后，你应该会看到一个弹出窗口，询问你是要\
  \ `Select`、`Select All` 还是 `Paste`。\n3.  如果你没有看到这个弹出窗口，请双击屏幕。\n4.  选择 `Paste` 以粘贴你的选择内容。\n\
  \n#### 摇动以撤销\n\niPhone 的一大特色功能是能够撤销输入、复制和粘贴，甚至是你刚刚完成的 Siri 听写。\n\n你只需在粘贴后摇动 iPhone。一个新的弹出窗口将会出现，让你可以选择撤销刚才的操作。\n\
  \n点击`撤销输入`或`撤销粘贴`来纠正错误。\n\n![images](img/U0237.jpg)\n\n![images](img/U0238.jpg)\n\
  \n**提示：快速删除文本**\n\n如果你曾想只点击一两下就快速删除几行文本、一个段落、甚至是你刚刚输入的所有文本，那么这个技巧就是为你准备的。首先，使用前面描述的方法选中你想要删除的文本。接下来，只需按下键盘左下角的\
  \ `Delete` 键 ![images](img/U0239.jpg)，即可删除所有选中的文本。\n\n### 使用聚焦搜索查找内容\n\n聚焦搜索是 iPhone\
  \ 上一个很棒的功能，可以帮助你查找信息。这是苹果公司专有的搜索方法，用于在你的 iPhone 上执行全局搜索。你可以使用此功能搜索姓名、事件或主题。\n\n\
  其概念很简单。假设你在寻找与“Martin”相关的内容。你不记得它是电子邮件、`Notes` 中的文档，还是日历事件；但你确定它与 Martin 有关。\n\n\
  这时就是使用聚焦搜索功能来查找 iPhone 上所有与 Martin 相关内容的最佳时机。\n\n#### 激活聚焦搜索\n\n首先，你需要调出位于 `Home`\
  \ 屏幕第一页左侧的 `Spotlight Search` 页面。\n\n![images](img/U0240.jpg)\n\n在第一个圆点（指示 `Home`\
  \ 屏幕第一页）的左侧，你可以看到一个非常小的`放大镜`图标。\n\n在第一页图标上用手指从左向右滑动，即可看到 `Spotlight Search` 页面。你也可以从第一屏图标按下\
  \ `Home` 按钮，以看到相同的搜索页面。\n\n![images](img/U0241.jpg)\n\n请按照以下步骤使用此功能进行搜索：\n\n1. \
  \ 在 `Spotlight Search` 页面，输入一个或多个单词作为搜索参数。\n2.  点击右下角的 `Search` 按钮执行搜索。\n\n    **提示：**\
  \ 如果你在寻找某个人，请输入他的全名，以便更准确地找到仅与那个人相关的项目（例如，“Martin Trautschold”）。这将排除你 iPhone 上可能存在的其他名叫\
  \ Martin 的人，使你能够只找到与 Martin Trautschold 相关的项目。\n\n3.  在搜索结果中，你会看到搜索找到的所有电子邮件、约会、会议邀请和联系人信息。向下滑动查看更多结果。\n\
  4.  点击列表中的某个结果以查看其内容。\n\n你的搜索结果会一直保留，直到你将其清除。这意味着你可以仅仅通过从 `Home` 屏幕向右滑动，就能返回到 `Spotlight\
  \ Search` 页面查看你之前的搜索结果。\n\n要清除 `Search` 字段，只需触摸搜索栏中的 `X` 即可。要退出 `Spotlight Search`\
  \ 页面，只需按下 `Home` 键或向左滑动。\n\n\n#### 搜索网页或维基百科\n\n执行聚焦搜索后，你会看到结果下方有两个选项：**搜索网页**和**搜索维基百科**。\n\
  \n点击任一选项即可在网页或维基百科中执行搜索。\n\n#### 自定义聚焦搜索\n\n你可以通过移除搜索中的特定应用或数据类型来自定义聚焦搜索。你甚至可以更改每种数据类型的搜索顺序。如果你只想搜索**通讯录**和**邮件**中的信息——不搜索其他内容，这个功能会很有用。或者，如果你知道自己总是想先搜索**邮件**，然后是**日历**，接着是**音乐**——你可以按正确顺序设置这些项目。请按照以下步骤操作：\n\
  \n1.  点击**设置**图标。\n2.  点击**通用**。\n3.  点击**聚焦搜索**。\n4.  若要更改搜索项目的顺序，请触摸并拖拽带有三条灰色横线的项目右侧边缘，向上或向下移动。\n\
  5.  若要从搜索中移除特定项目，点击该项目以移除其旁边的**勾号**图标。未勾选的项目将不会被聚焦搜索搜索到。\n6.  点击左上角的**通用**按钮，返回**设置**应用。\n\
  \n![images](img/U0242.jpg)\n\n"
- "# 第 3 章\n\n## 与 iCloud、iTunes 等同步\n\n在本章中，我们将向你展示如何设置或调整你的存储空间，并将你的信息推送至 Apple\
  \ 的新 iCloud 服务，以及如何使用 iTunes 在你的 iPhone 与 Windows 或 Mac 电脑之间同步信息。\n\n借助 iCloud，你可以无线同步你的邮件、通讯录、日历、提醒事项、书签、备忘录、照片以及文稿与数据，还可以通过无线方式\
  \ (空中下载技术 OTA) 备份你的 iPhone。借助 iTunes，你可以同步或传输通讯录、日历、备忘录、应用、音乐、视频、iBooks、文稿以及图片库，还可以备份你的\
  \ iPhone。\n\n并且，因为没有任何东西能始终完美运行，我们还将向你展示一些简单的故障排除技巧。最后，我们将向你展示如何检查更新并为你的 iPhone\
  \ 安装更新的操作系统软件。\n\n### iCloud\n\niCloud 是免费的，易于设置且易于使用。在大多数情况下，它是同步你的个人信息、音乐、电视节目（仅限美国）和应用的最佳方式。它也是处理备份和恢复手机的最佳方式。除非你有非常具体的原因不这样做，否则我们强烈推荐你使用\
  \ iCloud 来处理大多数同步需求，但对于 iCloud 尚未处理的内容（如电影），则使用**iTunes**应用。\n\niCloud 还允许你重新下载之前从\
  \ iTunes、iBookstore 和 App Store 购买的项目，但你的 iCloud ID 也可用于 iMessage、FaceTime 和其他免费的\
  \ Apple 服务。\n\n**注：** Apple 在提及 iCloud 时非常小心地避免使用*同步*这个词。取而代之的是*存储*和*推送*。这种差异很大程度上是技术性的，与\
  \ Apple 如何移动你的数据有关。\n\n需要记住的重要一点是，当你更改 iPhone 上的某些内容时，Apple 会将该更改复制到其服务器，然后将副本推送回你所有其他启用了\
  \ iCloud 的 iOS 设备，以及你的 Windows 或 Mac 电脑。\n\n### 设置 iCloud\n\n在第 1 章：“开始使用”中，我们向你展示了在设置新\
  \ iPhone 或从之前的 iCloud 备份恢复时如何启用 iCloud。一旦启用了 iCloud，你就可以轻松地打开或关闭各种服务。\n\n首先启动**设置**应用，向下滚动到\
  \ iCloud。\n\n**邮件**、**通讯录**、**日历**、**提醒事项**、**书签**、**备忘录**和**查找我的 iPhone** 可以直接在此屏幕上轻松切换为**打开**或**关闭**。\n\
  \n对于**照片流选项**，你需要先点击该标签页才能进入**打开**/**关闭**切换开关。\n\n![images](img/U0301.jpg)\n\n**注：**\
  \ 在编写本文时，照片流是一项全有或全无的服务。如果照片流已开启，Apple 会将其服务器上你最近的 1000 张照片保留最多 30 天，并将它们复制到你的 iPad、Apple\
  \ TV、Mac 或 Windows 电脑。任何登录 iCloud 的设备都会获得你照片流的副本。如果你拍摄了敏感或私人的照片，你可能希望将**照片流**选项设置为**关闭**。\n\
  \n同样，你可以点击**文稿与数据**来将此选项切换为**打开**或**关闭**。你还可以选择将**使用蜂窝网络选项**设置为**打开**。这将确保即使你外出并连接到\
  \ 3G 数据网络时，你的文稿也能保持最新。\n\n**注：** 如果你的数据套餐有限，或者在旅行时处于漫游状态，你可能需要关闭此功能以避免产生高昂的超额费用。\n\
  \n![images](img/U0302.jpg)\n\n### 管理 iCloud 储存空间与备份\n\niCloud 提供 5GB 的免费储存空间。来自\
  \ iTunes 的音乐、应用、iBooks 以及你的照片流不计入你的 5GB 额度，因此大多数人仍有足够的空间用于应用数据、文稿和备份。\n\n![images](img/U0303.jpg)\n\
  \n要查看你的 iCloud 储存空间，请向下滚动到底部，然后点击**储存空间与备份**。\n\n![images](img/U0304.jpg)\n\n**储存空间**部分会显示**总储存空间**，即你\
  \ iCloud 账户的总容量；**可用储存空间**则显示你剩余的总存储容量。\n\n在屏幕底部，你可以将**iCloud 备份**切换为**打开**或**关闭**。\n\
  \n**注：** 对于大多数用户来说，在绝大多数情况下，我们强烈建议将**iCloud 备份**选项切换为**打开**并保持该状态。\n\n如果你需要立即备份你的\
  \ iPhone，可以点击**立即备份**按钮。你可能在以下情况执行此操作：想重新安装你的 iPhone、更换为一部备用或新的 iPhone、或者计划出行并希望在出发前确保你的手机已备份。\n\
  \n要查看你的 iCloud 储存空间使用情况，请点击**管理储存空间**。\n\n在**管理储存空间**屏幕的顶部，你会看到当前备份到 iCloud 的设备列表。这包括你的\
  \ iPhone 以及你可能拥有的任何其他 iOS 设备，例如 iPad 或 iPod touch。\n\n点击你想要查看的设备，你会进入**信息**屏幕，该屏幕显示**最新备份**的时间以及**备份大小**。\n\
  \n**备份选项**部分允许你单独打开或关闭不同类型的备份，包括**相机胶卷**以及你可能已安装的、将其设置或数据与 iCloud 同步的任何应用。此部分还会告诉你每个应用使用了多少储存空间。\n\
  \n最初，你只会看到几个应用。点击**查看所有应用**以查看完整列表。将某个应用设置为**关闭**意味着你将节省储存空间，但你的数据将不再在你的 iOS 设备之间同步，并且如果你重新安装设备或该应用，数据也不会被恢复。\n\
  \n![images](img/U0305.jpg)\n\n![images](img/U0306.jpg)\n\n![images](img/U0307.jpg)\n\
  \n**提示：** 你的 iPhone 配备的 800 万像素、1080p 摄像头意味着备份**相机胶卷**会很快消耗大量储存空间，尤其是当你只有免费的 5GB\
  \ 套餐时。照片流功能已经备份了你的照片；如果你不担心备份视频，那么你可以将**相机胶卷**备份切换为**关闭**以节省空间。\n\n### 购买更多 iCloud\
  \ 储存空间\n\n你可能会发现自己经常用尽 iCloud 储存空间、决定开始备份更多照片和视频，或者发现需要备份多个 iOS 设备。如果是这样，你可以从 Apple\
  \ 购买更多 iCloud 储存空间。\n\n只需点击遍布 iCloud **设置**屏幕中的任意一个**购买更多储存空间**按钮即可。在编写本文时，额外的 iCloud\
  \ 储存空间费用如下：\n\n* 10GB：20 美元/年\n* 20GB：40 美元/年\n* 50GB：100 美元/年\n\n![images](img/U0308.jpg)\n\
  \n\n\n### 云端 iTunes\n\niCloud 还包含*云端 iTunes*功能，允许你重新下载之前购买的应用。在部分国家或地区，你甚至能重新下载\
  \ iBooks、音乐甚至电视节目。这意味着你可以随时将内容下载到 iPhone，不再需要时删除，想再次使用时可重新下载。\n\n要了解更多从 iTunes 重新下载文件的信息，请参阅第\
  \ 22 章：“您的设备上的 iTunes”、第 23 章：“神奇的应用商店”和第 13 章：“iBooks 与电子书”。\n\n你还可以设置 iPhone，使其自动下载通过你\
  \ iTunes 账户关联的任何设备或电脑所购买的新应用、iBooks、报刊杂志订阅、音乐和电视节目。如果你在 PC 上购买了一首新歌，或在 iPod touch\
  \ 上购买了一个新应用，该歌曲或应用也会立即下载并出现在你的 iPhone 上。\n\n请按照以下步骤开启自动下载：\n\n1.  启动 `设置`。\n2. \
  \ 轻点 `商店`。\n3.  将`音乐`、`应用`和`图书`开关切换至`开启`。\n4.  若要在 3G 网络下也启用自动下载，则将`使用蜂窝数据`开关切换至`开启`。\n\
  5.  若要启用报刊杂志订阅的自动下载，则将相关报纸或杂志名称旁的开关切换至`开启`。\n\n![images](img/U0309.jpg)\n\n**注意：**\
  \ 在撰写本文时，Apple 对 3G 网络设置的 20MB 下载限制同样适用于`云端 iTunes`功能。这意味着，如果你不在 Wi-Fi 环境下，则无法自动下载或重新下载任何超过\
  \ 20MB 的应用或文件，直到你重新连接 Wi-Fi。此限制适用于 iBooks、音乐、电视节目等。\n\n### 电脑上的 iCloud\n\niCloud\
  \ 不仅能在你的 iPhone 与 Apple 服务器之间或你的 iOS 设备之间同步信息，还能在你的 iPhone 与 Windows 或 Mac PC 之间同步信息。\n\
  \n如果你使用的是 Windows 系统，可以在`Windows 版 iCloud 控制面板`中开启或关闭多个应用和服务的同步功能（请参见图 3–1）。可与之同步的应用和服务包括`邮件`、`通讯录`、`日历与任务`和`提醒事项`等。\n\
  \n![images](img/0301.jpg)\n\n**图 3–1.** *Windows 版 iCloud 控制面板*\n\n如果你使用的是 Mac OS\
  \ X 系统，可以在 OS X 7.2 `Lion iCloud 系统设置`面板中开启或关闭这些选项（请参见图 3–2）。\n\n![images](img/0302.jpg)\n\
  \n**图 3–2.** *Mac 的`Lion iCloud 系统设置`面板 (OS X 7.2)*\n\n应用、图书、音乐及其他内容的自动下载，可在`iTunes`应用的`商店偏好设置`屏幕中开启或关闭（请参见图\
  \ 3–3）。\n\n![images](img/0303.jpg)\n\n**图 3–3.** *`iTunes`的`商店偏好设置`屏幕*\n\n### 与\
  \ iTunes 同步\n\n在开始使用`iTunes`进行同步之前，你需要准备一些事项。在接下来的章节中，我们将介绍前提条件，并回答一些关于使用`iTunes`原因的常见问题。我们还将帮助你了解，如果你拥有其他\
  \ Apple 设备（如 iPad 或 iPod）并与 iPhone 开始同步，会发生什么。\n\n#### 前提条件\n\n在将 iPhone 与`iTunes`同步之前，你只需完成以下几项操作：\n\
  \n**提示：** 如果你已按照第 1 章：“入门指南”中的所有步骤操作，那么很可能已完成下方列出的步骤并已将通讯录、日历、书签、备忘录和电子邮件账户初始同步到\
  \ iPhone。如果已完成，你可以跳到本章稍后的“应用：同步与管理”部分。\n\n1.  确保你的电脑上已安装 10.5 或更高版本的`iTunes`应用。如需安装或更新`iTunes`的帮助，请参阅第\
  \ 22 章：“您的设备上的 iTunes”。\n2.  确保手边备有你的 iTunes 账户 ID。即用于从 iTunes 购买音乐、应用和其他内容的电子邮件地址和密码。\n\
  3.  找到随 iPhone 附带的白色同步线缆。线缆一端插入 iPhone 底部靠近`主屏幕`按钮的接口，另一端插入电脑的 USB 端口。\n\n#### 将\
  \ iTunes 与 iPod 或 iPad 以及*你的*iPhone 同步？\n\n你可能想知道是否可以同步`iTunes`与多个设备，例如你的 iPod 或\
  \ iPad 以及 iPhone。是的，可以！只要你是同步到同一台电脑，就可以将多个 Apple 设备（Apple 官方称最多五个，但我们听闻有人同步了更多设备）同步到一台电脑上的同一个\
  \ iTunes 账户。\n\n**警告：** 你不能将同一部 iPhone、iPad 或 iPod 同步到两台不同的电脑。如果尝试这样做，你会看到类似这样的信息：“是否要抹掉此设备（iPhone、iPad、iPod）并重新同步新资料库？”如果你回答`是`，设备上的所有音乐和视频都将被抹掉。\n\
  \n#### 还有其他同步方法——应该使用`iTunes`吗？\n\niCloud 既免费又便捷，是让 iPhone 与其他设备保持同步的最简单方式；而`iTunes`则能帮助你处理\
  \ iCloud 尚不支持的大文件、影片及其他内容。你也可以使用其他方法来同步特定数据，例如个人信息和电子邮件（包括 Exchange/Google）。但请记住，即使你选择了其他方法，仍需要使用\
  \ iCloud 和/或`iTunes`来完成以下操作：\n\n*   备份和恢复 iPhone 上的文件与数据\n*   更新 iPhone 操作系统软件\n\
  *   同步和管理你的应用程序（应用）\n*   同步你的音乐资料库和播放列表\n*   同步影片、电视节目、播客和 iTunes U 内容\n*   同步图书\n\
  *   同步照片\n\n表 3–1 总结了你的同步选项。选择何种同步方法，应取决于你当前存储邮件、通讯录和日历的位置、你的使用环境，以及你是否希望进行无线同步。\n\
  \n**注意：** 某些环境允许你将通讯录和日历通过无线方式同步到 iPhone。\n\n![images](img/t0301.jpg)\n\n![images](img/t0301a.jpg)\n\
  \n### 设置你的 iTunes 同步\n\n接下来，我们将展示使用`iTunes`应用对 iPhone 执行自动同步和手动传输信息的所有步骤。\n\n\n\n\
  ### iPhone 摘要屏幕\n\n在 `iTunes` 中，iPhone 的 `摘要` 选项卡是您查看和更新 iPhone 操作系统软件版本的地方。它还包含一个与同步音乐、视频及其他内容相关的重要开关。您也可以在此选项卡中选择在连接\
  \ iPhone 到电脑时是否自动打开 `iTunes`（以进行同步）。\n\n一旦将 iPhone 连接到电脑，您就能看到重要信息，例如 iPhone 的内存容量、已安装的软件版本和序列号（参见图\
  \ 3–4）。您还可以检查软件版本更新、将数据恢复到 iPhone，并从该屏幕上的多个可用选项中进行选择。\n\n特别是，您可以通过选中此屏幕底部的复选框来决定是否要`手动管理音乐和视频`。\n\
  \n![images](img/0304.jpg)\n\n**图 3–4.** *`iTunes` 中的 iPhone `摘要` 屏幕*\n\n请按照以下步骤查看`摘要`屏幕：\n\
  \n1.  在电脑上启动 `iTunes` 软件。\n2.  使用设备附带的白色 USB 数据线将 iPhone 连接到电脑。将数据线的一端插入靠近 `Home`\
  \ 按钮的 iPhone 底部，另一端插入电脑的 USB 端口。\n3.  如果 iPhone 已成功连接，您应该会在左侧导航栏的 `设备` 下看到您的 iPhone\
  \ 被列出。\n4.  单击左侧导航栏中的 iPhone，然后单击主窗口左上边缘的 `摘要` 选项卡。\n5.  如果您希望能够通过拖放方式将音乐和视频添加到\
  \ iPhone，请勾选`手动管理音乐和视频`旁边的复选框。\n6.  如果您希望在连接 iPhone 到电脑时让 `iTunes` 自动打开并同步，请勾选`连接此\
  \ iPhone 时打开 iTunes` 旁边的复选框。\n\n**提示：**请注意，`iTunes` 软件可能并未安装在您主要（用于同步的）电脑上。例如，它可能安装在您用于给\
  \ iPhone 充电的第二台电脑上。如果是这种情况，您应该勾选`手动管理音乐和视频`旁边的复选框，并取消勾选`连接此 iPhone 时打开 iTunes` 旁边的复选框。\n\
  \n### 进入同步设置屏幕（信息选项卡）\n\n假设您想进入 `信息` 选项卡，即用于同步通讯录、日历、电子邮件等的设置屏幕。为此，您需要按照之前进入`摘要`屏幕的相同步骤操作，只是现在您需要单击顶部的\
  \ `信息` 选项卡，以便在主 `iTunes` 窗口中查看通讯录（及其他同步设置）（参见图 3–5）。\n\n![images](img/0305.jpg)\n\
  \n**图 3–5.** *`iTunes` 的 `信息` 选项卡，您可以在此设置通讯录、日历、书签等*\n\n**注意：如果您已设置好使用 iCloud 同步信息，您将看到此警告且无法使用\
  \ iTunes，因为 iCloud 已在同步您的信息。如果看到此警告，则可以跳过使用 iTunes 同步邮件、通讯录和日历。**\n\n![images](img/U0310.jpg)\n\
  \n### 同步通讯录\n\n让我们从设置同步通讯录开始。第一步是选择一个要进行同步的服务。为此，请勾选`同步通讯录自`旁边的复选框，并调整下拉菜单以选择存储您通讯录的软件或服务。在本书出版时，在\
  \ Windows 电脑上有几种同步选项：Outlook、Google 通讯录、Windows 通讯录和 Yahoo! 通讯录。\n\n**警告：** 无论何时在这些同步设置屏幕中切换软件或服务（称为*同步提供者*），都会影响连接到您\
  \ iTunes 账户的每一个移动设备。例如，如果您将通讯录同步到 iPad 或 iPod touch，这些更改也会影响 MobileMe。您将会改变连接到 iTunes\
  \ 账户的其他任何设备的通讯录同步方式。\n\n![images](img/U0311.jpg).\n\n## 与 Google 通讯录同步\n\n如果您选择`Google\
  \ 通讯录`，系统将提示您输入您的 Google ID 和密码。\n\n若要更改您的 Google ID 或密码，请单击本节顶部看到的`同步通讯录自`选项旁边的`配置`按钮。\n\
  \n## 与 Yahoo! 通讯录同步\n\n如果您选择`Yahoo! 通讯录`，系统将提示您输入您的 Yahoo! ID 和密码。\n\n若要更改您的 Yahoo!\
  \ ID 或密码，请单击本节顶部看到的`同步通讯录自`选项旁边的`配置`按钮。\n\n**注意：** 您在此处以及`信息`选项卡中其他下拉框中看到的选项会略有不同，具体取决于您电脑上安装的软件。例如，在\
  \ Mac 上，通讯录同步没有下拉列表；而是将其他服务（如 Google 通讯录和 Yahoo!）显示为单独的复选框。\n\n一旦选择了要同步的服务或应用，您就可以进行通讯录的同步操作了：\n\
  \n1.  从以下两个选项中选择您要同步的通讯录：\n    1.  `所有通讯录`：同步通讯录中的所有联系人（此为默认设置）。\n    2.  `所选群组`：仅同步您在下方窗口中勾选的特定群组中的联系人。\n\
  2.  您会看到一个复选框，显示`添加在此 iPhone 上创建的、不在群组中的联系人到`（从下拉列表中选择一个群组）。此选项允许您为在 iPhone 上添加的任何未明确分配到群组的新联系人指定一个新群组。\n\
  3.  向下滚动页面，继续设置您的日历、电子邮件等。\n4.  如果您不想设置其他任何内容的同步，请单击 `iTunes` 屏幕右下角的`应用`按钮开始同步。\n\
  \n**注意：** 根据您拥有联系人的数量，首次同步可能需要超过 10 分钟，甚至可能需要 30 分钟或更长时间。因此，您可能希望在可以让 iPhone 随意放置所需时间（例如，午餐时间或晚餐后）的情况下执行此同步。\n\
  \n### 同步日历\n\n同步日历与同步通讯录类似。请按照以下步骤进行操作：\n\n1.  在同一个`信息`选项卡中，向下滚动以查看日历同步设置。\n2. \
  \ 勾选`同步日历自`旁边的复选框，并调整下拉菜单以选择存储您日历的软件或服务。这可能是 Windows 电脑上的 `Outlook` 或其他应用程序，以及 Mac\
  \ 上的 `iCal`。\n3.  选择以下选项之一：\n    1.  `所有日历`：同步所有日历（此为默认设置）。\n    2.  `所选日历`：仅同步您在下方窗口中勾选的日历。\n\
  4.  如果您想节省 iPhone 上的空间，请勾选`不同步超过 30 天的日历事件`旁边的复选框。您可以根据需要向上或向下调整天数。\n5.  向下滚动页面，继续设置电子邮件账户、书签等。\n\
  6.  如果您不想设置其他任何内容的同步，请单击 `iTunes` 屏幕右下角的`应用`按钮开始同步。\n\n**注意：** 如果您是使用 `Microsoft\
  \ Entourage` 的 Mac 用户，您需要启用 `Entourage` 与 `iCal` 同步。为此，请进入 `Entourage` 的 `偏好设置`，然后进入\
  \ `同步服务`，并勾选同步 `iCal` 和`通讯录`的复选框。\n\n**注意：** 在本书撰写时，`Entourage` 与 `iCal` 不同，它无法处理多个日历。\n\
  \n\n\n### 同步电子邮件账户\n\n向下滚动页面以同步电子邮件账户设置。\n\n**注意：** 将电子邮件账户设置同步到 iPhone 后，你仍需在 `设置`\
  \ ![images](img/U0311a.jpg) `邮件、通讯录、日历` 中为每个电子邮件账户输入密码。每个账户只需在 iPhone 上执行此操作一次。\n\
  \n请按照以下步骤操作：\n\n1.  在 `iTunes` 的同一 `摘要` 选项卡上，向下滚动至 `日历` 设置下方，即可看到 `邮件` 账户设置。\n2.\
  \  勾选 `同步邮件账户来自` 旁边的复选框，并调整下拉菜单，选择存储你电子邮件的软件或服务（请参阅 图 3–6）。在 Windows 电脑上，这可能是指 `Outlook`；在\
  \ Mac 上，则可能是 `Entourage` 或 `邮件`。\n\n    ![images](img/0306.jpg)\n\n    **图 3–6.**\
  \ *设置要同步的电子邮件账户*\n\n3.  向下滚动页面，继续设置书签、备忘录等。\n4.  如果你不想再同步其他内容，请点击 `iTunes` 屏幕右下角的\
  \ `应用` 按钮以开始同步。\n\n### 同步书签和备忘录\n\niTunes 同步的一个出色功能是，你可以将电脑上的浏览器书签同步到 iPhone。这样，你可以立即在\
  \ iPhone 上浏览所有你喜爱的网站。你还可以将电脑上的备忘录同步到 iPhone，并使用 `iTunes` 在两处保持更新。\n\n**注意：** 在撰写本文时，`iTunes`\
  \ 仅支持两种浏览器进行同步：`Microsoft Internet Explorer` 和 `Apple Safari`。如果你使用 `Mozilla Firefox`\
  \ 或 `Google Chrome`，你仍然可以同步书签，但需要安装免费的书签同步软件（例如来自 [`www.xmarks.com`](http://www.xmarks.com)\
  \ 的 `xmarks`），以便将书签从 `Firefox` 或 `Chrome` 同步到 `Safari` 或 `Explorer`。安装此软件后，你就可以通过简单的两步过程同步浏览器书签。对于\
  \ `Firefox` 用户来说，`Firefox` 的 `Home` 应用是同步书签的一个不错选择（访问 [`http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8`](http://itunes.apple.com/ca/app/firefox-home/id380366933?mt=8)\
  \ `了解更多信息`）。\n\n### 将 iPhone 与 iTunes 同步\n\n当你将 iPhone 连接到电脑的 USB 端口时，同步过程通常是自动进行的。唯一的例外是，如果你已禁用了自动同步功能。\n\
  \n## 在 iTunes 中同步应用\n\n请按照以下步骤通过 `iTunes` 应用同步和管理应用：\n\n1.  如同之前设置同步一样，将 iPhone\
  \ 连接到电脑，启动 `iTunes`，然后在左侧导航栏中点击你的 iPhone。\n2.  点击主窗口顶部的 `应用` 选项卡。\n3.  勾选 `同步应用`\
  \ 旁边的复选框，即可查看存储在 iPhone 上的所有应用以及你的 `主屏幕`，如图 3–7 所示。\n\n![images](img/0307.jpg)\n\
  \n**图 3–7.** *`iTunes` 中的 `同步应用` 屏幕*\n\n## 移动应用、使用文件夹或删除应用图标\n\n在 `iTunes` 的 `同步应用`\
  \ 屏幕中（再次参见 图 3–7），移动和整理你的应用图标非常容易。尝试以下操作以完成各种任务：\n\n*   **在屏幕内移动应用：** 点击它并在屏幕内拖动。如果你想一次选择多个应用，可以按住\
  \ `Ctrl` 键（Windows）或 `Command` 键（Mac）并点击选择。\n*   **在主屏幕页面间移动应用：** 点击并将其拖动到右侧列中的新页面。该新页面将在主屏幕中展开，将图标拖放到主屏幕即可。\n\
  *   **将应用固定到底部 Dock：** 点击并将其向下拖放到底部 Dock 上。如果底部 Dock 上已有四个图标，你需要先拖出一个图标为新图标腾出空间。Dock\
  \ 上最多只允许放置四个图标。\n*   **创建新文件夹：** 将一个图标拖放到另一个图标上。\n*   **将应用移入现有文件夹：** 将图标拖放到 `文件夹`\
  \ 图标上。\n*   **将应用移出文件夹：** 点击文件夹将其打开，然后将图标拖放到该文件夹之外。\n*   **查看另一个主屏幕页面：** 点击右侧列中的该页面。\n\
  *   **删除应用：** 点击它，然后点击左上角的 `x` 符号。你只能删除自己安装的应用。在预装应用（如 `iTunes`）上，你不会看到 `x` 符号。\n\
  *   **删除文件夹：** 从该文件夹中移除所有应用（将其拖出），文件夹将会消失。\n\n## 移除或重新安装应用\n\n要从你的 iPhone 上移除应用，只需取消勾选它旁边的复选框并确认你的选择。\n\
  \n**提示：** 即使你从 iPhone 上删除了某个应用，只要你已选择同步应用，可以通过重新勾选它旁边的复选框来重新安装该应用。该应用将在下一次同步时重新加载到你的\
  \ iPhone 上。\n\n### 同步媒体及其他内容\n\n现在，让我们看看如何设置音乐、影片、iBooks、iTunes U 内容等的自动同步。\n\n\
  **注意：** 请确保你在笔记本电脑上和 iPhone 上登录的是同一个 iTunes 账户，以便处理受数字版权管理 (DRM) 保护的内容（例如音乐、视频等）。如果两个账户不匹配，你的内容将无法同步。如有必要，你可以在桌面电脑和\
  \ iPhone 上注销并重新登录 iTunes 服务，以确保登录正确的账户。\n\n## 同步铃声\n\n当你点击 `铃声` 选项卡时，你可以选择同步整个铃声库或特定项目：\n\
  \n1.  将 iPhone 连接到电脑，启动 `iTunes`，然后在左侧导航栏中点击你的 iPhone。\n2.  点击主窗口顶部的 `铃声` 选项卡。\n\
  3.  勾选 `同步铃声` 旁边的复选框，如右图所示。\n4.  默认设置是同步 `所有铃声`。若要仅同步特定铃声，请点击 `所选铃声` 旁边的单选按钮。\n\
  5.  完成选择后，点击 `应用` 按钮开始铃声同步。\n\n![images](img/U0312.jpg)\n\n**提示：** 了解如何在第 9 章：“使用电话”中为联系人分配铃声、购买自定义铃声以及从你的音乐中创建自己的铃声。\n\
  \n## 同步音乐\n\n当你点击 `音乐` 选项卡时，你可以选择同步整个音乐资料库或特定项目。\n\n**注意：** 如果你已经手动将一些音乐、音乐视频或语音备忘录传输到\
  \ iPhone，你会收到一条警告信息，提示 iPhone 上的所有现有内容将被移除，并替换为你从电脑中选择的音乐资料库。\n\n要将音乐从电脑同步到 iPhone，请按照以下步骤操作：\n\
  \n1.  将 iPhone 连接到电脑，启动 `iTunes`，然后在左侧导航栏中点击你的 `iPhone`。\n2.  点击主窗口顶部的 `音乐` 选项卡。\n\
  3.  勾选 `同步音乐` 旁边的复选框。\n4.  只有当你确信你的音乐资料库不会太大以至于 iPhone 无法容纳时，才点击 `整个音乐资料库` 旁边的按钮。\n\
  5.  如果你不确定音乐资料库是否过大，或者只想同步特定的播放列表或表演者，请点击 `所选播放列表、表演者和流派` 旁边的按钮：\n    1.  你可以通过勾选相应的复选框来选择是否包含音乐视频和语音备忘录。\n\
  \    2.  你还可以选择自动用歌曲填满剩余空间。\n\n        **注意：** 我们不建议勾选此选项，因为它会占满 iPhone 的所有空间，导致没有空间安装那些酷炫的应用！\n\
  \n    3.  现在，勾选屏幕底部两列中的任何播放列表或表演者。你甚至可以使用 `表演者` 列顶部的 `搜索` 框来搜索特定的表演者。\n6.  完成选择后，点击\
  \ `应用` 按钮开始音乐同步。\n\n\n\n### 同步影片\n\n点击`影片`标签页，您可选择同步特定、近期或未观看的影片，也可选择同步所有影片。\n\n\
  要将影片从电脑同步到 iPhone，请按以下步骤操作：\n\n1. 将 iPhone 连接到电脑，启动`iTunes`，然后在左侧导航栏中点击您的 iPhone。\n\
  2. 点击主窗口顶部的`影片`标签页。\n3. 勾选`同步影片`旁的复选框（参见图 3–8）。\n4. 如果您想同步近期或未观看的影片，请勾选`自动包含`旁的复选框，然后使用下拉菜单选择`所有`、`最近\
  \ 1 个`、`所有未观看`、`最近 5 个未观看`等选项。\n\n   ![图片](img/0308.jpg)\n\n   **图 3–8.** *配置`影片`标签页以自动同步所选内容*\n\
  \n5. 如果您选择了除`所有`以外的任何选项，则可以选择将特定影片或视频同步到 iPhone。只需勾选您想包含在同步中的影片旁的复选框即可。\n6. 完成影片选择后，点击`应用`按钮保存设置并开始同步。\n\
  \n### 同步电视节目\n\n点击`电视节目`标签页，您可选择同步特定、近期或未观看的电视节目，也可选择同步所有节目。\n\n要将电视节目从电脑同步到 iPhone，请按以下步骤操作：\n\
  \n1. 将 iPhone 连接到电脑，启动`iTunes`，然后在左侧导航栏中点击您的 iPhone。\n2. 点击主窗口顶部的`电视节目`标签页。\n3.\
  \ 勾选`同步电视节目`旁的复选框。\n4. 如果您想同步近期或未观看的电视节目，请勾选`自动包含`旁的复选框，然后使用下拉菜单选择`所有`、`最新 1 个`、`所有未观看`、`最旧\
  \ 5 个未观看`、`最新 10 个未观看`等选项。\n5. 在`的剧集`旁选择`所有节目`或`所选节目`。\n6. 如果您选择了`所选节目`，则可在屏幕中间的两个版块中选择特定的节目甚至特定的剧集。\n\
  7. 如果您有电视节目播放列表，可以通过勾选屏幕底部版块中的复选框来选择包含这些列表。\n8. 完成特定电视节目的选择后，点击`应用`按钮保存设置并开始同步。\n\
  \n### 同步播客\n\n点击`播客`标签页，您可选择同步特定、近期或未播放的播客，也可选择同步所有播客。\n\n**提示：** 播客是音频或视频节目，通常定期发布（例如每日、每周或每月）。在\
  \ iTunes Store 中，大多数播客均可免费订阅。当您订阅并按照本节所述设置自动同步后，您喜爱的所有播客都会传输到您的 iPhone 上。\n\n许多您喜爱的广播节目都会被录制并以播客形式播出。我们建议您浏览\
  \ iTunes Store 的`播客`版块，查看可能感兴趣的节目。您会发现包括影评、新闻节目、法学院考试复习、游戏节目、老式广播节目、教育内容等在内的多种播客。\n\
  \n要将播客从电脑同步到 iPhone，请按以下步骤操作：\n\n1. 将 iPhone 连接到电脑，启动`iTunes`，然后在左侧导航栏中点击您的`iPhone`。\n\
  2. 点击主窗口顶部的`播客`标签页。\n3. 勾选`同步播客`旁的复选框。\n4. 如果您想同步近期或未播放的播客，请勾选`自动包含`旁的复选框，然后使用下拉菜单选择`所有`、`最新\
  \ 1 个`、`所有未播放`、`最新 5 个`、`最近 10 个未播放`等选项。\n5. 在`的剧集`旁选择`所有播客`或`所选播客`。\n6. 如果您选择了`所选播客`，则可在屏幕中间的两个版块中选择特定的播客甚至特定的单集。\n\
  7. 如果您有播客播放列表，可以通过勾选屏幕底部版块中的复选框来选择包含这些列表。\n8. 完成播客选择后，点击`应用`按钮保存设置并开始同步。\n\n**提示：**\
  \ 同步这些播客后，您可以通过导航到设备上`音乐`应用中的`播客`版块进行收听。\n\n### 同步 iBooks 和有声书\n\n点击`图书`标签页，您可选择同步所有或选定的图书和有声书。\n\
  \n**提示：** iPhone 上的图书是其纸质版本的电子版。它们采用一种名为`ePub`的特定电子格式。您可以在 iPhone 上的 iBookstore\
  \ 购买图书，或从其他来源获取图书，并使用此处描述的步骤将其同步到 iPhone。从其他地方获取的图书必须是无保护或“无 DRM（数字版权管理）”的，才能同步到您的\
  \ iPhone。您可以在 iPhone 上的`iBooks`应用或其他图书阅读应用中阅读这些书。请参阅第 13 章“iBooks 与电子书”了解更多信息。\n\
  \n要在电脑和 iPhone 之间同步图书或有声书，请按以下步骤操作：\n\n1. 将 iPhone 连接到电脑，启动`iTunes`，然后在左侧导航栏中点击您的`iPhone`。\n\
  2. 点击主窗口顶部的`图书`标签页。\n3. 勾选`同步图书`和`同步有声书`旁的复选框。\n4. 如果您想同步所有图书，请保持默认的`所有图书`选项不变。\n\
  5. 否则，请选择`所选图书`，然后通过勾选窗口中的特定图书进行选择。\n\n   **提示：** 为了将 iBooks、PDF 文件及其他类似文档同步到您的\
  \ iPhone，您需要先将文件从电脑拖放到您的 iTunes 资料库中。从电脑的任意文件夹中抓取文件，直接拖放到`iTunes`左上角栏目的资料库中即可。\n\
  \n6. 如果您想同步所有有声书，请保持默认的`所有有声书`选项不变。\n7. 否则，请选择`所选有声书`，然后通过勾选此选项下方窗口中的特定有声书进行选择。\n\
  8. 完成特定图书和有声书的选择后，点击`应用`按钮保存设置并开始同步。\n\n**提示：** 同步这些图书后，您可以在设备上的`iBooks`应用中阅读。您可以在`音乐`应用中收听有声书，其左侧有`有声书`标签页。\n\
  \n**注意：** 来自 Audible 的有声书，需要您先使用您的 Audible 帐户授权您的电脑，然后才能将其从电脑同步到您的 iPhone。\n\n\n\
  \n### 同步照片\n\n点击**照片**标签页时，你可以选择同步所有文件夹或选定文件夹中的照片，甚至可以包含视频。\n\n**提示：** 你可以创建一个精美的电子相框，并在\
  \ iPhone 惊艳的屏幕上分享你的照片（参见第 20 章：“处理照片”）。你甚至可以用照片来设置背景墙纸和锁屏墙纸——详见第 8 章：“个性化与安全”。\n\
  \n要将照片从电脑同步到 iPhone，请按以下步骤操作：\n\n1. 将 iPhone 连接到电脑，启动 **iTunes**，然后在左侧导航栏中点击你的 iPhone。\n\
  \n   **提示：** Mac 用户还可以在 **iPhoto** 中使用多种条件同步照片，包括“事件”（按时间同步）、“面孔”（按人物同步）和“地点”（按位置同步）。\n\
  \n2. 点击主窗口顶部的**照片**标签页。\n3. 勾选**同步照片来源**旁边的复选框。\n4. 点击**同步照片来源**旁边的下拉菜单，从电脑中选择存储照片的文件夹。如果你想同步所有照片，请选择最高层级文件夹（例如\
  \ Windows 电脑上的 **C:** 或 Apple Mac 上的硬盘根目录“**/**”）。\n5. 如果要同步电脑上选定文件夹中的所有照片，请选择**所有文件夹**。\n\
  \n   **警告：** 由于电脑上的照片库可能过大而无法全部放入 iPhone，勾选**所有文件夹**时请务必谨慎。\n\n6. 否则，请选择**选定文件夹**，然后在下方的窗口中勾选特定文件夹进行选择。\n\
  7. 你还可以勾选**包括视频**旁的复选框，以包含文件夹中的任何视频。\n8. 完成要同步的照片选择后，点击**应用**按钮以保存设置并开始同步。\n9. 同步开始时，你将在\
  \ **iTunes** 中上方的状态窗口看到进度。\n\n## iTunes 与同步的故障排除\n\n有时 **iTunes** 的表现可能不如预期，因此这里提供几个简单的故障排除技巧。\n\
  \n### 查看 Apple 知识库以获取有用文章\n\n遇到问题时，第一步是查看 Apple 的支持页面，那里有大量有用信息。在 iPhone 或电脑的网页浏览器中访问以下网址：\n\
  \n`www.apple.com/support/iPhone/`\n\n接着，点击左侧导航栏中显示的主题。\n\n### iTunes 锁定且无响应（Windows\
  \ 电脑）\n\n有时 **iTunes** 会锁定并完全无响应。如果在 Windows 电脑上发生这种情况，请按以下步骤操作：\n\n1. 同时按下键盘上的\
  \ **Ctrl** + **Alt** + **Del** 键，调出 **Windows 任务管理器**。**任务管理器**应类似图 3–9 所示。\n\n\
  \   ![images](img/0309.jpg)\n\n   **图 3–9.** *在 **Windows 任务管理器**中找到 `iTunes.exe`，以便结束其进程*\n\
  \n2. 要结束进程，请在弹出的窗口中点击**结束进程**。\n3. 现在，**iTunes** 应被强制关闭。\n4. 尝试重新启动 **iTunes**。\n\
  5. 如果 **iTunes** 无法启动或再次锁定，请重启电脑后再试。\n\n### iTunes 锁定且无响应（Mac 电脑）\n\n如果你使用的是 Mac，在\
  \ **iTunes** 应用锁定且完全无响应时，请按以下步骤操作：\n\n**提示：** 按下 **Command** + **Option** + **Escape**\
  \ 是调出**强制退出应用程序**窗口的快捷键（参见图 3–10）。\n\n1. 点击顶部的 **iTunes** 菜单。\n2. 点击**退出 iTunes**。\n\
  3. 如果无效，请切换到其他程序，点击 Mac 左上角的**Apple**小标志。\n4. 点击**强制退出**，会显示正在运行的程序列表。\n5. 选中 **iTunes**，然后点击**强制退出**按钮。\n\
  6. 如果仍然无效，请尝试重启 Mac。\n\n![images](img/0310.jpg)\n\n**图 3–10.** *Mac 电脑上的**强制退出应用程序**窗口*\n\
  \n## 更新 iPhone 操作系统\n\n通过 iOS5，你现在可以在设备上直接更新 iPhone 操作系统。有更快、更高效的更新方法，我们建议你尽可能使用它们。但如果需要重新安装整个操作系统，或者想通过\
  \ **iTunes** 进行升级，本部分将说明如何操作。\n\n**注：** 请在你愿意让 iPhone 离开身边 30 分钟或更长时间时进行此更新，具体时长取决于\
  \ iPhone 上的数据量以及电脑和网络连接的速度。\n\n通常，**iTunes** 会按照设定计划自动检查更新，大约每两周一次。如果未找到更新，**iTunes**\
  \ 会告知你下次检查更新的时间。请按以下步骤使用 **iTunes** 手动更新 iPhone：\n\n1. 启动 **iTunes**。\n2. 将 iPhone\
  \ 连接到电脑。\n3. 在左侧导航栏的**设备**下点击你的 iPhone。\n4. 点击顶部导航栏中的**摘要**标签页。\n5. 在屏幕中央的**版本**区域，点击**检查更新**按钮。\n\
  6. 如果你的 iPhone 已是最新版本，会弹出一个窗口，显示类似“当前 iPhone 软件版本 (5.0) 即为最新版本”的信息。点击**确定**关闭窗口。更新过程完成。\n\
  7. 如果你的 **iTunes** 不是最新版本，窗口会提示有新版本可用，并询问是否要更新。点击**是**或**更新**进行更新。\n8. **iTunes**\
  \ 会引导你通过几个屏幕，描述更新内容并要求你同意软件许可。如果同意，请依次点击**下一步**和**同意**，从 Apple 下载最新的 iOS 软件。此过程大约需要五到十分钟。\n\
  \n   **提示：** 我们将在第 26 章：“故障排除”的“重新安装 iPhone 操作系统”部分，展示此更新过程中你可能看到的所有屏幕。\n\n9. 接下来，**iTunes**\
  \ 会备份你的 iPhone，如果 iPhone 存有大量数据，此过程可能耗时十分钟或更久。\n10. 然后新的 iOS 将被安装，你的 iPhone 数据会被清除。\n\
  11. 最后，你会看到一个屏幕，要求你执行以下操作之一：\n\n    1. **设置为新的 iPhone：** 如果希望在更新过程后清除所有数据，请选择此项。\n\
  \    2. **从以下备份恢复：** 请确保选择正确的备份文件（通常是最新的那个）。\n\n    此时，你的 iPhone 将按照你的选择进行恢复或设置。\n\
  \n12. 如果你已锁定 SIM 卡，则需要输入四位解锁 PIN 码。\n\n    **警告：** 如果你已锁定 SIM 卡，则在更新安装完成后需要输入四位解锁码。如果忘记了\
  \ SIM 解锁码，可以使用 PUK 码解锁 SIM 卡（需从无线运营商处获取）。更多信息请参见第 9 章：“使用电话”中的“设置 SIM 卡安全”部分。\n\n\
  13. 你的 iPhone 操作系统更新完成。\n\n## 其他同步方法\n\n你可以在 iPhone 的**设置**应用中导航至**邮件**、**通讯录**、**日历**应用，以设置并使用\
  \ Exchange。下一部分将说明如何操作。\n\n\n\n#### 在设备上设置您的 Google 或 Exchange 帐户\n\n请按照以下步骤为您的\
  \ Exchange 帐户或 Google 联系人和日历设置无线同步：\n\n1.  轻触**设置**图标。\n2.  轻触**邮件、通讯录、日历**。\n3.\
  \  您会看到您的电子邮件帐户列表，其下方是**添加帐户**选项。\n\n    如果您尚未设置任何帐户，则只会看到**添加帐户**。无论哪种情况，都请轻点**添加帐户**。\n\
  \n    ![images](img/U0313.jpg)\n\n4.  在下一个屏幕上，选择**Microsoft Exchange**。\n\n    **注意：**\
  \ 如果您希望与 Google 通讯录和日历进行无线同步，则应选择**Microsoft Exchange**。如果您选择**Gmail**，将无法与 Google\
  \ 通讯录进行无线同步。\n\n    ![images](img/U0314.jpg)\n\n5.  输入您的电子邮件地址。\n\n    **提示：** 要输入电子邮件地址中的\
  \ `.com`（或 `.net`、`.edu`、`.org` 等），请长按**句号**（**.**）键，直到看到其上方出现 `.com` 键。滑动手指并按下\
  \ `.com`。\n\n    ![images](img/U0315.jpg)\n\n    **提示：** 由于您的电子邮件地址通常也是您的用户名，因此通过复制粘贴可以节省时间。\n\
  \n    ![images](img/U0316.jpg)\n\n    ![images](img/U0317.jpg)\n\n6.  将您的电子邮件地址复制并粘贴到**用户名**字段（当您的用户名与电子邮件地址相同，或者与电子邮件地址中\
  \ `@` 符号之前的部分相同时，此方法非常有效）：\n    1.  长按**电子邮件**字段，然后松开手指，即可看到其上方出现黑色弹出菜单。\n    2.\
  \  轻点**全选**。\n    3.  轻点**拷贝**。\n    4.  长按**用户名**字段，然后松开手指，即可看到弹出菜单。轻点**粘贴**。\n\
  7.  将**域**字段留空。输入您的**密码**。如果需要，您可以调整帐户的**描述**，该描述默认为您的电子邮件地址。\n8.  轻点右上角的**下一步**按钮。\n\
  9.  您可能会看到**无法验证证书**对话框。如果看到，请点击**接受**以继续。\n\n    ![images](img/U0318.jpg)\n\n \
  \   ![images](img/U0319.jpg)\n\n    ![images](img/U0320.jpg)\n\n10.  在**服务器**字段中，输入\
  \ `m.google.com` 以同步到 Google。否则，如果您正在设置 Exchange Server 帐户，请输入该服务器地址。\n11.  点击右上角的**下一步**。\n\
  12.  在此屏幕上，您可以选择将**邮件**、**通讯录**和**日历**的无线同步设置为**开**或**关**。对于您想要开启的每个同步，请轻点开关将其切换为**开**。\n\
  \n    ![images](img/U0321.jpg)\n\n**注意：** 如果您的 iPhone 上已有通讯录或日历项，您可能会看到一些警告出现。您的选择是**保留在我的\
  \ iPhone 上**或**删除**。如果您选择**取消**，您的 iPhone 将停止设置您的 Exchange 帐户。选择**保留在我的 iPhone 上**以保留\
  \ iPhone 上所有现有的通讯录和日历事件。这些项目不会出现在您的 Exchange 帐户中——它们将保留在您的 iPhone 上。\n\n"
- "# 第 4 章\n\n## 连接到网络\n\n我们生活在一个互联的世界。无线互联网（Wi-Fi）接入已成为常态，而非例外——而且您很可能已经在家里或办公室使用\
  \ Wi-Fi。您可以使用它将 iPhone 连接到互联网。此外，由于您的 iPhone 还配备了 3G 蜂窝无线电，您也可以在拥有蜂窝数据覆盖的任何地方连接到互联网——其覆盖范围比\
  \ Wi-Fi 网络广泛得多。\n\n在本章中，我们将讨论 iPhone 的两种连接类型之间的区别：Wi-Fi（无线局域网）和 3G（蜂窝服务——您的手机使用的广域数据网络）。我们将向您展示连接或断开这两种网络的所有方法。例如，有时您会希望禁用或关闭\
  \ 3G 连接，仅使用 Wi-Fi 以节省数据连接费用。\n\n我们还将向您展示如何为携带 iPhone 出国旅行做好准备——您在旅行前、旅行中和旅行后需要做什么，以免回家后收到一张高额话费账单而大吃一惊。\n\
  \n我们还将向您展示如何使用*互联网共享*功能，该功能可以让您的 iPhone 成为笔记本电脑（无论是 PC 还是 Mac）的互联网中枢。当您没有其他方式将笔记本电脑连接到互联网时，这是一个很棒的功能。\n\
  \n最后，如果您在拥有 VPN（*虚拟专用网络*）的组织工作，我们将向您展示如何连接到该网络。\n\n### 连接到 Wi-Fi 或 3G 网络后我可以做什么？\n\
  \n以下是连接到 Wi-Fi 或 3G 网络后可以执行的一些操作：\n\n*   从 App Store 访问和下载应用程序（程序）。\n*   通过 iPhone\
  \ 上的 **iTunes** 应用访问和下载音乐、视频、播客等。\n*   使用 **Safari** 浏览网页。\n*   发送和接收电子邮件。\n*  \
  \ 使用需要互联网连接的社交网站，如 Facebook、Twitter 等。\n*   玩需要使用实时互联网连接的游戏。\n*   执行任何其他需要互联网连接的操作。\n\
  \n### Wi-Fi 连接\n\n每部 iPhone 都内置了 Wi-Fi 功能，因此让我们来看看如何连接到 Wi-Fi 网络。有关 Wi-Fi 连接需要考虑的事项包括：\n\
  \n*   网络接入和数据下载没有额外费用（如果您在家庭、办公室或免费的 Wi-Fi 热点使用您的 iPhone）。\n*   Wi-Fi 通常比蜂窝数据 3G\
  \ 连接更快。\n*   包括某些飞机在内的越来越多的地方提供 Wi-Fi 接入，但您可能需要支付一次性或月度服务费。\n\n**注意**：iPhone 支持速度更快、范围更广的\
  \ 802.11n 标准。但是，它仅在较为拥挤的 2.4 MHz 频段上支持 802.11n，而不支持不那么拥挤的 5 MHz 频段。如果您希望将 iPhone\
  \ 与您的 802.11n Wi-Fi 路由器配合使用，请确保它是双频路由器，或者将路由器设置为 2.4 MHz。\n\n#### 连接到 Wi-Fi 网络\n\
  \n要设置您的 Wi-Fi 连接，请按照以下步骤操作：\n\n1.  轻点**设置**图标。\n2.  轻点靠近顶部的 **Wi-Fi**。\n3.  确保 **Wi-Fi**\
  \ 开关设置为**开**。如果当前为**关**，请轻点将其打开为**开**。\n4.  一旦 Wi-Fi **开启**，iPhone 将自动开始搜索无线网络。\n\
  5.  可访问的网络列表显示在**选取网络...** 选项下方。此屏幕截图显示我们有一个可用网络。\n6.  要连接到列出的任何网络，只需轻触网络名称。如果该网络不受保护（没有**锁定**图标），您将自动连接。\n\
  \n    ![images](img/U0401.jpg)\n\n#### 在需要通过网页登录的公共 Wi-Fi 热点进行连接\n\n在某些提供免费 Wi-Fi\
  \ 网络的场所，例如咖啡店、酒店或餐厅；一旦您的 iPhone 与该网络接触，就会弹出一个窗口。在这些情况下，只需轻点网络名称即可。您可能会进入 **Safari**\
  \ 浏览器屏幕以完成网络登录：\n\n1.  如果您看到类似所示窗口，请轻点您想要加入的网络名称。在右侧的案例中，我们轻点 **Panera** 网络。\n\n\
  \    ![images](img/U0402.jpg)\n\n2.  在某些情况下，您可能会看到一个 **Safari** 窗口弹出，这可能会让人感到困惑，因为它在您的\
  \ iPhone 屏幕上显得非常小。您需要使用双击或捏合张开手势（请参阅快速入门指南获取帮助）来放大网页。您需要寻找一个写着**登录**、**同意**或类似文字的按钮。点击该按钮以完成连接。\n\
  \n    ![images](img/U0403.jpg)\n\n**注意**：某些地方，如咖啡店，使用基于网页的登录方式，而不是用户名/密码屏幕。在这些情况下，当您点击网络（或尝试使用\
  \ **Safari**）时，您的 iPhone 将打开一个浏览器屏幕，您会看到网页以及您的登录选项。\n\n\n\n### 保护 Wi-Fi 网络——输入密码\n\
  \n部分 Wi-Fi 网络需要输入密码才能连接。网络管理员在创建无线网络时会设置这一密码。你需要知道确切的密码，包括是否区分大小写。\n\n如果网络确实需要密码，你将进入**输入密码**屏幕。请严格按照提供给您的密码输入，然后按下屏幕键盘上的**回车**键（此时该键标记为**加入**）。\n\
  \n在**网络**屏幕上，您会看到一个**对勾**图标，表明您已连接到该网络。\n\n![images](img/U0404.jpg)\n\n![images](img/U0405.jpg)\n\
  \n**提示**：您可以在密码对话框中进行粘贴；因此对于较长、随机的密码，您可以将其传输到您的 iPhone 上（例如通过电子邮件），然后直接复制粘贴。请记得之后立即删除该邮件，以确保信息安全。在邮件中长按并选中密码，然后点击**拷贝**。在\
  \ Wi-Fi 网络的**密码**字段中，点击并选择**粘贴**。\n\n![images](img/U0406.jpg)\n\n## 切换到不同的 Wi-Fi\
  \ 网络\n\n有时您可能想要切换当前正在使用的 Wi-Fi 网络。这种情况可能发生在酒店、公寓或其他场所，当 iPhone 自动选择的网络并非信号最强的，或者您希望使用安全网络而非不安全的网络时。\n\
  \n要从当前选中的 Wi-Fi 网络切换，请点击**设置**图标，轻触**Wi-Fi**，然后轻触您想要加入的 Wi-Fi 网络名称。如果该网络需要密码，您需要输入密码才能加入。\n\
  \n一旦您输入了正确的密码（或者您轻触了一个开放网络），您的 iPhone 就会加入该网络。\n\n## 验证您的 Wi-Fi 连接\n\n通过查看主**设置**屏幕中**Wi-Fi**选项旁边的信息，很容易判断您是否已连接到网络（以及连接的是哪个网络）。请按照以下步骤检查您的\
  \ Wi-Fi 连接状态：\n\n1.  点击您的**设置**图标。\n2.  查看顶部**Wi-Fi**选项旁边的信息：\n    *   如果看到**未连接**，则表示您没有活跃的\
  \ Wi-Fi 连接。\n    *   如果看到其他名称，例如**Panera**，则表示您已连接到该 Wi-Fi 网络。\n\n![images](img/U0407.jpg)\n\
  \n## 高级 Wi-Fi 选项（隐藏或不可发现的网络）\n\n有时您可能看不到要加入的网络，因为网络管理员隐藏了其名称（即未广播 SSID）。接下来，您将学习如何在\
  \ iPhone 上加入此类网络。一旦您加入过此类网络，下次再进入其覆盖范围时，iPhone 会自动连接，而不会发出任何提示。您也可以让 iPhone 每次加入网络时都询问您；我们也将向您演示如何做到这一点。有时您可能想要删除或忽略某个网络。例如，您可能参加了一次性会议，想要移除相关的网络——您也将学到如何操作。\n\
  \n### 为什么我看不到要加入的 Wi-Fi 网络？\n\n有时，出于安全考虑，人们不会让他们的网络可被发现（他们隐藏了网络名称，即 SSID），您必须手动输入名称和安全选项才能连接。\n\
  \n**正如您所见，可用网络列表中包含“其他”。**\n\n1.  点击**其他**按钮，您可以手动输入要加入的网络名称。\n\n    ![images](img/U0408.jpg)\n\
  \n2.  输入 Wi-Fi 网络的**名称**。\n3.  点击**安全性**标签。\n\n    ![images](img/U0409.jpg)\n\n\
  4.  选择该网络使用的安全类型。如果不确定，您需要向网络管理员咨询。\n\n    ![images](img/U0410.jpg)\n\n当您获得所需信息后，将其连同正确的密码一起输入，这个新网络将被保存到您的网络列表中，以便将来访问。\n\
  \n### 重新连接到之前加入过的 Wi-Fi 网络\n\niPhone 的妙处在于，当您回到曾连接过 Wi-Fi 网络（无论是开放网络还是需要密码的安全网络）的区域时，您的\
  \ iPhone 会自动重新连接该网络，而不会事先询问您。但是，您可以关闭此自动连接功能，如下一节所述。\n\n#### “询问是否加入网络”主开关\n\n有一个**询问是否加入网络**主开关，默认设置为**打开**。已知网络会自动连接，但此设置仅当没有已知网络可用时才生效。当此开关设为**打开**时，系统会询问您是否加入可见的\
  \ Wi-Fi 网络。如果有您未知的网络可用，连接前会征询您的意见。\n\n如果该开关设为**关闭**，您需要手动加入未知网络。\n\n为什么要关闭此功能？\n\
  \n例如，如果您不希望孩子能在您不知情的情况下通过 iPhone 加入无线网络，这样做可以成为一种良好的安全措施。\n\n同样，当您身处不想加入 Wi-Fi 的区域（例如经过许多热点的地方）时，iPhone\
  \ 持续弹出**加入网络**连接屏幕也会令人烦恼。\n\n![images](img/U0411.jpg)\n\n#### 每个网络上的“询问是否加入”和“询问是否登录”开关\n\
  \n有时，您可能会发现某个特定 Wi-Fi 网络有额外的开关，可以覆盖主**询问是否加入网络**开关。点击网络名称旁边的小蓝色**箭头**图标![images](img/U0412.jpg)，可以查看此\
  \ Wi-Fi 网络的详细信息。**自动加入**和**自动登录**默认设置为**打开**。\n\n要禁用**自动加入**或**自动登录**，请点击每个开关将其设为**关闭**。\n\
  \n![images](img/U0413.jpg)\n\n#### 忽略（或删除）一个网络\n\n如果您发现不再需要连接到列表中的某个网络，您可以将其**忽略**——即将其从您的网络列表中移除。请按照以下步骤操作：\n\
  \n1.  点击**设置**图标。\n2.  点击**Wi-Fi**，查看您的网络列表。\n3.  点击您要忽略的网络旁边的小蓝色**箭头**![images](img/U0415.jpg)，以查看如下所示的屏幕。\n\
  4.  点击屏幕顶部的**忽略此网络**。\n\n    ![images](img/U0414.jpg)\n\n    ![images](img/U0416.jpg)\n\
  \n5.  系统会弹出一个警告提示。只需轻触**忽略**，该网络将不再显示在您的列表中。\n\n    ![images](img/U0417.jpg)\n\n\
  ## 蜂窝数据连接\n\n您的 iPhone 也可以连接到蜂窝数据网络——也就是其他手机连接的同一网络。关于蜂窝数据连接，需要考虑以下几点：\n\n*   它们比\
  \ Wi-Fi 连接的可用范围更广——您可以在汽车里或远离城市的地方连接 3G 网络，而这些地点通常没有 Wi-Fi 信号。\n*   访问蜂窝数据网络需要支付额外的月服务费。\n\
  \n**注意**：请向您当地的无线运营商咨询您所在国家的 iPhone 数据套餐价格。\n\n\n\n### 选择并监控你的蜂窝数据用量\n\n当你购买 iPhone\
  \ 时，必须从运营商处选择一个蜂窝数据套餐。在美国，目前 iPhone 用户可以从 AT&T、Verizon 和 Sprint 中选择。如果你已选择了一个套餐，现在想尝试其他套餐，请联系你的运营商——你或许可以更换数据套餐。\n\
  \n**提示：节省数据费用的技巧**\n\n你可以通过以下方式节省蜂窝数据套餐的费用：\n\n- 尽量使用 Wi-Fi。\n- 从低成本的蜂窝数据套餐开始（例如，截至出版时，AT&T\
  \ 的 200MB 套餐售价 15 美元）。\n- 整月持续监控你的蜂窝数据用量，确保不会超出低成本数据套餐的限额。\n\n你会发现，如果大部分数据需求都使用\
  \ Wi-Fi，低成本的套餐也足够使用。\n\n按照以下步骤检查当前的蜂窝数据用量：\n\n1.  轻点`设置`图标。\n2.  轻点`通用`。\n3.  轻点`用量`。\n\
  4.  向下滚动并轻点`蜂窝网络用量`。\n5.  你的总数据用量将是`发送`和`接收`数值的总和。如果要清空统计数据，请轻点屏幕底部的`还原统计数据`按钮。\n\
  \n![images](img/U0418.jpg)\n\n**注意**：当你的月度数据套餐剩余 20%、10%和 0%时，iPhone 会发出通知。如果有适用的选项，它还会让你选择续订当前套餐或升级到更高数据量的套餐。\n\
  \n### 国际旅行：出发前要做的事\n\n根据你要前往的国家以及当前的 iPhone 语音和数据套餐，你可能已经为国际旅行做好了充分准备。然而，你的 iPhone\
  \ 基本数据和电话套餐很可能无法使用，或导致你在数据和语音漫游费用上花费更多。\n\n我们始终建议你在旅行前尽早致电你的电话服务提供商，询问是否有可以在旅行时为\
  \ iPhone 开通的国际功能。\n\n#### 避免收到巨额账单\n\n旅行时你要避免的一件事是回家后收到异常高昂的语音或数据漫游话费账单。例如，我们曾听说有人在国外旅行回家后发现，仅一个月的数据和语音漫游费合计就达到了\
  \ 1000 美元甚至更多。在接下来的几节中，我们将向你展示如何在旅行前、旅行中和旅行后采取措施，帮助避免意外收费。\n\n这些简单的步骤可以帮助你确保 iPhone\
  \ 能够成功且经济地连接到当地网络——无论你身在世界的哪个角落。\n\n#### 第 1 步：致电你的电话公司\n\n你应该在离家前联系为你提供 iPhone\
  \ 的电话公司。打电话时，你应该核实以下事项：\n\n-   了解旅行中可能产生的任何语音和数据漫游费用。要具体到你要访问的每个国家。\n-   查看出发前是否可以激活任何临时的国际费率套餐。有时，这些特殊套餐需要预付额外的\
  \ 10 或 20 美元，但可以为你节省数百美元的额外费用。\n-   如果你使用电子邮件、SMS 短信、彩信或图片信息、网页浏览以及任何其他数据服务，你还需要专门询问这些服务在国外旅行时是否单独收费。通常，短信和图片信息会产生额外费用。\n\
  \n你可能可以在电话公司的网站上找到一些信息，但通常需要给他们打电话。\n\n#### 第 2 步：检查是否能使用国际 SIM 卡\n\n在某些情况下，你的 iPhone\
  \ 无线公司可能不会提供国际数据漫游套餐的优惠——或者其费率不合理地高。在这种情况下，你可能希望要求你的电话公司解锁 iPhone，以便你可以插入在旅行国购买的\
  \ SIM 卡。\n\n**注意**：苹果公司在许多国家/地区出售无锁版、无 SIM 卡的 iPhone，包括美国、加拿大和英国。如果你经常旅行，官方无锁版 iPhone\
  \ 可能是一个值得考虑的选择。\n\n插入本地 SIM 卡将消除或大幅降低数据和语音漫游费用。但是，你应该仔细检查使用该 SIM 卡拨打和接听国际电话的费用。\n\
  \n使用国际 SIM 卡可能为你节省数百美元，但在确定采用这种方法之前，最好先在网络上做一些研究，或试着咨询最近去过同一国家的人以获取建议。\n\n**提示：**\
  \ 如果你要去一个没有优惠费率计划的国家，而你的运营商又不愿解锁 iPhone，你可以考虑租用或购买一部当地手机。租用一部手机的费用约为每周 30 美元，语音通话费率会低得多。有许多手机租赁公司，例如\
  \ Travel Cell、Mobal 和 Cellular Abroad。（在网上搜索“International Cell Phone Rental”以获取更多信息。）\n\
  \n你也可以在网上搜索“带着你的 iPhone 去 X、Y、Z 国旅行”的相关信息。\n\n**提示**：在你的行李中放一个回形针——如果你遗失了无锁版 iPhone\
  \ 附带的 SIM 卡弹出工具，你将需要它来取出和更换 iPhone 中的 SIM 卡。\n\n#### 第 3 步：出发前完成所有高数据量操作\n\n如果可能，你应该在离开本国前完成所有高数据量的活动。如果你有许多应用需要更新，请在出发前完成。同时，在旅行前查找并添加你可能需要的任何应用。你还应该在出发前下载任何大文件，例如电影、视频或音乐。\n\
  \n### 乘坐飞机：飞行模式\n\n乘坐飞机时，机组人员通常会要求你在起飞和降落时关闭所有便携式电子设备。然后，当飞机达到一定高度时，机组人员会说“所有经批准的电子设备”可以重新开启。\n\
  \n如果你需要完全关闭 iPhone，请按住右上角的`电源`按钮，然后用手指`滑动来关机`。\n\n要启用`飞行模式`，请按照以下步骤操作：\n\n1.  轻点`设置`图标。\n\
  2.  将左侧栏顶部的`飞行模式`旁边的开关设置为`开启`。\n3.  注意，Wi-Fi 会自动`关闭`，并且你的电话将无法使用。\n\n![images](img/U0419.jpg)\n\
  \n**提示**：一些航空公司提供机上 Wi-Fi 网络。在那些航班上，你可能希望在适当的时候将 Wi-Fi 重新`开启`。\n\n你可以通过以下步骤打开或关闭\
  \ Wi-Fi 连接：\n\n1.  轻点`设置`图标。\n2.  轻点屏幕顶部的`Wi-Fi`。\n3.  要启用 Wi-Fi 连接，将页面顶部的`Wi-Fi`旁边的开关设置为`开启`。\n\
  \n   ![images](img/U0420.jpg)\n\n4.  要禁用 Wi-Fi，将同一开关设置为`关闭`。\n5.  选择 Wi-Fi 网络，并按照乘务员给出的步骤进行连接。\n\
  \n### 国际旅行：抵达后\n\n完成上述为旅行准备的步骤后，抵达目的地时还需要处理一些额外问题。接下来的部分将解释你抵达目的地后需要记住的事项。\n\n####\
  \ 第 1 步：确保时区正确\n\n抵达后，你需要确保 iPhone 显示的是正确的当地时间。通常情况下，iPhone 到达新目的地时会自动更新时间区。如果没有更新，你可以手动调整时区（参见第\
  \ 1 章：“入门”中的“设置日期和时间”部分）。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将以下英文文本翻译成中文。\n\
  \n\n#### 第 2 步：购买并插入国际 SIM 卡\n\n**注意：** 此步骤仅在您访问国家的运营商支持 iPhone，且您的 iPhone 已解锁的情况下有效。目前，美国运营商\
  \ AT&T 不解锁 iPhone 设备。您的备用方案，特别是当您需要拨打大量本地电话时，是租用或购买一部便宜的预付费手机，并将您的 iPhone 仅用于 Wi-Fi\
  \ 连接。\n\n如果您确定可以使用国际 SIM 卡，那么您应该在抵达后购买并插入它。我们在第 1 章中向您展示了如何取出 SIM 卡托。您需要使用 Apple\
  \ 的 SIM 卡弹出工具或回形针来取出此卡。\n\n**警告：** iPhone 使用的是 MicroSIM，而许多其他手机使用的是 MiniSIM。这意味着您很可能需要找到一个也在其网络上提供\
  \ iPhone 的国际运营商。\n\n#### 第 3 步：抵达后重置您的数据用量\n\n您一落地，就应该在 iPhone 上重置您的数据用量。这将使您能够密切跟踪您在海外使用的无线数据量。例如，如果您购买了\
  \ 20 MB 的套餐，您需要确保不会超出该用量。在车上使用`地图`约 1 分钟的简短测试就产生了近 1 MB 的数据用量。因此，请务必小心，并尽量在漫游时避免使用诸如`地图`之类极其消耗数据的应用程序。\n\
  \n我们在本章前面的“选择和监控您的蜂窝数据用量”部分中，已经详细解释了如何重置您的用量。\n\n**提示：** 重置用量后，您需要时常返回此屏幕查看当前用量。您必须将`已发送`和`已接收`的值相加，才能得到总用量。如果您的数据总用量为\
  \ 417 MB——在没有国际数据套餐的情况下，按 $20/MB 的费率计算，这需要花费 $8,340！\n\n![图片](img/U0421.jpg)\n\n\
  #### 第 4 步：如果费用过高，请关闭数据漫游\n\n如果您无法找到国际 SIM 卡——或者无法从您的本地电话公司查询到数据漫游的费用——那么您可能希望完全关闭数据漫游。\n\
  \n这不会阻止您使用 Wi-Fi；但是，它可以确保您在旅途中不会因查收电子邮件或意外启动消耗数据的应用程序而收到令人不悦的账单。\n\n**注意：数据漫游**通常默认为`关闭`状态，但在您出发前仔细检查一下总是明智的——以防万一。\n\
  \n请按照以下步骤将`数据漫游`设置为`关闭`：\n\n1.  轻点`设置`图标。\n2.  轻点`通用`。\n3.  轻点`网络`。\n4.  将`数据漫游`旁边的开关设置为`关闭`。\n\
  \n![图片](img/U0422.jpg)\n\n将`数据漫游`的值设置为`关闭`有助于避免任何潜在的高额数据漫游费用。（您仍然需要担心语音漫游费用，但至少可以通过控制通话时长来管理这部分费用。）\n\
  \n将`蜂窝数据`设置为`开启`，同时将`数据漫游`设置为`关闭`的好处在于，您可以在离开本国之前和返回本国之后立即享受所有数据服务，而无需进行任何其他更改。当然，您也可以随时使用\
  \ Wi-Fi 网络连接。\n\n#### 第 5 步：尽可能使用 Wi-Fi\n\n节省蜂窝数据套餐费用的一种好方法是尽可能使用本地 Wi-Fi 网络，尤其是在您准备浏览网页或下载大量电子邮件或大型应用程序时。\n\
  \n**提示：** 您可能可以在网吧、普通咖啡店、公共图书馆、一些酒店大堂以及 Apple 零售店找到免费 Wi-Fi 网络。\n\n### 国际旅行：返回家中\n\
  \n就像您在抵达旅行目的地时所做的那样，一旦您返回家中，需要对 iPhone 的设置进行一些更改，设备才能正常工作。\n\n#### 第 1 步：确保时区正确\n\
  \n当您返回本国时，需要确认您的 iPhone 显示的是正确的当地时间。通常，您的 iPhone 会在您返回家中时自动更新时间。但是，如果没有自动更新，您可以手动调整时区（请参阅第\
  \ 1 章：“开始使用”中的“设置日期和时间”部分）。\n\n#### 第 2 步：关闭您的特殊国际费率套餐\n\n最后一步是可选的。如果您已与 iPhone\
  \ 无线运营商激活了某种特殊的国际漫游费率套餐，并且不再需要它，那么请联系运营商将其关闭以节省费用。\n\n使用我们在您旅行前、旅行中和旅行后描述的所有步骤，应该能帮助您在出国旅行时成功且经济地使用您的\
  \ iPhone。\n\n### 个人热点\n\n您的 iPhone 上有一个不错的功能，就是可以用它来将您的笔记本电脑（PC 或 Mac）连接到互联网。此功能称为`个人热点`，当您恰好在远离\
  \ Wi-Fi 网络，但您的 iPhone 仍在无线蜂窝数据覆盖范围内时，它会非常有用。这极大地扩展了您可以用笔记本电脑连接互联网的地点。\n\n#### 个人热点\
  \ vs. 网络共享\n\n通过您的 iPhone 数据套餐将笔记本电脑或其他设备连接到互联网，过去称为`网络共享`，并且它只能通过蓝牙或插入 USB Dock\
  \ 连接线来工作。\n\n`个人热点`与网络共享类似；但它不是使用蓝牙或 USB，而是将您的 iPhone 变成一个便携式小型 Wi-Fi 路由器，可以将多个设备连接到互联网。例如，您可以连接您的笔记本电脑、朋友的笔记本电脑和您的\
  \ iPad。（可以通过`个人热点`连接的设备确切数量取决于您的运营商，但通常是四到五个。）\n\n**提示：** 如果出于某种原因您不想使用`个人热点`功能，传统的通过蓝牙和\
  \ USB Dock 连接线的网络共享方式仍然可用。\n\n#### 第 1 步：联系您的电话公司\n\n互联网网络共享可能需要从您的电话公司购买并激活一个单独的套餐。请致电您的电话公司或在其网站上检查，以开启`移动热点`或`网络共享`套餐。\n\
  \n**提示：** 当您不再需要`个人热点`或`网络共享`套餐时，将其关闭可以节省一些费用。请向您的电话公司咨询，在日后关闭`网络共享`套餐是否会有任何罚金或隐藏费用。\n\
  \n#### 第 2 步：在 iPhone 上启用个人热点\n\n在您从电话公司购买或激活了`个人热点`或`移动热点`套餐后，您就可以在 iPhone 上进行设置了：\n\
  \n1.  轻点`设置`图标。\n2.  轻点`通用`。\n3.  轻点`网络`。\n4.  向下滚动并轻点`设置个人热点`。（如果您已设置过，或者已为您设置好，那么您将看到`个人热点`。）\n\
  \n   ![图片](img/U0423.jpg)\n\n5.  如果您尚未设置套餐——或者您购买的套餐尚未在 iPhone 上激活——您将看到一个类似于此的弹出消息。如果您确实购买了套餐，那么您可能需要稍等片刻等待套餐激活。\n\
  \n   ![图片](img/U0424.jpg)\n\n6.  如果您的套餐已激活，您应该会在主`设置`屏幕上看到`个人热点`选项。轻点它。\n\n   ![图片](img/U0425.jpg)\n\
  \n7.  轻点`个人热点`旁边的开关，将其设置为`开启`。\n\n   ![图片](img/U0426.jpg)\n\n8.  您的 iPhone 会自动为您生成一个`Wi-Fi\
  \ 密码`。如果您对该密码满意，请跳到下一节。\n\n   ![图片](img/U0427.jpg)\n\n9.  如果您想更改密码，请轻点`Wi-Fi 密码`。\n\
  10. 输入您的新`密码`。确保其至少包含八个字符。最好使用数字、大小写字母和标点符号的组合。\n\n\n\n### 第 3 步：连接到你的 iPhone 个人热点\n\
  \n现在你的 iPhone 就变成了一个小型移动 Wi-Fi 路由器；你可以将 Mac 或 Windows 电脑、iPad 或其他任何支持 Wi-Fi 的设备连接到你的\
  \ iPhone，就像连接到家庭、公司或学校的 Wi-Fi 网络一样。按照以下步骤操作：\n\n1. 在你的设备上检查可用的 Wi-Fi 网络。\n2. 点击你\
  \ iPhone 的名称。\n3. 输入 Wi-Fi 密码。\n\n如果一切正常，你会在 iPhone 屏幕顶部看到一条蓝色横条，并显示已连接的设备数量。\n\n\
  ![images](img/U0428.jpg)\n\n### 第 4 步：在你的电脑上设置网络连接\n\n将 iPhone 连接到电脑后，Windows 或\
  \ Mac 电脑应将你的 iPhone 识别为新的互联网连接，并自动帮你完成设置。如果电脑没有立即识别出 iPhone，请进入电脑的**网络**设置，查找名为\
  \ iPhone 的可用连接类型。\n\n## VPN：虚拟专用网络\n\n你的组织机构可能拥有一种称为 VPN 或*虚拟专用网络*的设施。VPN 允许你将 iPhone、笔记本电脑或其他设备安全地连接到公司网络。\n\
  \n### 开始连接\n\n为了建立连接，你需要从组织机构的帮助台或网络管理员处了解 VPN 的类型和具体的登录说明。然后，你需要在 iPhone 的**设置**应用中的\
  \ **VPN** 区域输入这些登录详细信息。\n\n**提示**：如果你已经将电脑设置为连接到 VPN，那么你可能无需致电帮助台，直接跳过第 1 步。因为你的\
  \ iPhone 很可能使用与电脑相同的 VPN 登录凭据。\n\n此外，某些运营商可能要求使用企业账户才能在其 3G 网络上使用 VPN。如果所有设置看起来都正确，但\
  \ VPN 仍无法正常工作，请咨询你的运营商。\n\n#### 第 1 步：联系组织机构的帮助台\n\n你需要向帮助台或 VPN 管理员询问登录 VPN 的详细信息。你的\
  \ iPhone 目前可以连接以下类型的 VPN：**L2TP**、**PPTP** 和 **IPSec**（Cisco）。你还需要了解你的 VPN 是否使用**代理**，以及配置是手动的还是自动的。\n\
  \n#### 第 2 步：在 iPhone 上设置 VPN 连接\n\n有了登录说明和 VPN 连接类型后，你就可以用 iPhone 进行连接了：\n\n1.\
  \ 轻点**设置**图标。\n2. 轻点**通用**。\n3. 轻点**网络**。\n4. 向下滚动到屏幕底部，然后轻点 **VPN**。\n\n   ![images](img/U0429.jpg)\n\
  \n5. 在 **VPN** 屏幕上，轻点 **VPN** 选项旁边的开关，将其设置为**开启**。随后你应该会进入**添加配置**屏幕。如果没有，请轻点底部的**添加\
  \ VPN 配置**来设置新的 VPN 连接。\n\n   ![images](img/U0430.jpg)\n\n6. **添加配置**屏幕用于设置你的 VPN\
  \ 登录详细信息，请使用从帮助台或 VPN 管理员处获取的信息。\n7. 如果你的 VPN 是 **L2TP** 类型，则使用此处显示的屏幕。向下滚动到底部，根据需要输入**代理**信息。\n\
  \n   ![images](img/U0431.jpg)\n\n8. 如果你的 VPN 是 **PPTP** 类型，则轻点顶部的 **PPTP**，然后使用此处显示的屏幕。向下滚动到底部，根据需要输入**代理**信息。\n\
  \n   ![images](img/U0432.jpg)\n\n9. 如果你的 VPN 是 **IPSec**（Cisco）类型，则轻点 **IPSec**，然后使用此处显示的屏幕。向下滚动到底部，根据需要输入**代理**信息。\n\
  10. 设置完成后，轻点右上角的**存储**按钮。\n11. 如果登录遇到问题，请确保你处于信号良好的无线网络覆盖区域，并确认你已正确输入所有登录凭据。输入时密码会消失，这可能会带来困难。在致电帮助台之前，不妨尝试重新输入密码和服务器信息。\n\
  \n![images](img/U0433.jpg)\n\n### 了解何时连接到 VPN 网络\n\n你会在网络连接状态显示区的右侧看到一个小 **VPN**\
  \ 图标 ![images](img/U0434.jpg)。*只有*当你看到此图标时，才表示你已安全连接到 VPN 网络。\n\n### 切换 VPN 网络\n\
  \n你可能需要连接到多个 VPN 网络。你可以按照以下步骤在 iPhone 上选择不同的 VPN 配置：\n\n1. 轻点**设置**图标。\n2. 轻点**通用**。\n\
  3. 轻点**网络**。\n4. 向下滚动到屏幕底部，然后轻点 **VPN**。\n5. 在 VPN 屏幕上，轻点另一个 **VPN 配置**以连接到该网络。除非你想更改该网络的登录设置，否则不要轻点带有\
  \ `>` 符号的蓝色**圆圈**图标。\n\n"
- '# 第 5 章


  ## AirPlay 与蓝牙


  在本章中，我们将向你展示如何将 iPhone 连接到任何兼容 AirPlay 或蓝牙的设备，无论是 Apple TV、立体声音箱还是无线耳机。


  ### 了解 AirPlay


  *AirPlay* 是苹果专有的视频和音频流媒体协议。AirPlay 通过你本地家庭、学校或办公室的 Wi-Fi 网络工作。在使用 iPhone 的 AirPlay
  之前，你必须确保所有设备都连接到同一个 Wi-Fi 网络。


  ![images](img/U0501.jpg)


  #### 可与 iPhone 配合使用的 AirPlay 设备


  在撰写本书时，只有 2010 款的 Apple TV 支持 AirPlay 视频流播放。借助它，你可以将内容直接从 iPhone 流式传输到大屏幕电视上，与同事、朋友和家人分享。


  苹果的 AirPort Express Wi-Fi 路由器带有一个音频输出接口，可以连接音箱用于 AirPlay 音频播放。各种第三方配件制造商也在推出兼容 AirPlay
  的音箱。通过 AirPlay，你可以直接在 iPhone 上远程控制播放和音量。


  ### 设置和使用 AirPlay


  AirPlay 内置于 iPhone 中。只要所有设备都连接到同一个 Wi-Fi 网络，就无需额外设置。


  几款内置的 iPhone 应用支持 AirPlay，包括**视频**、**音乐**和 **YouTube**。一些使用苹果默认媒体播放器的 App Store
  应用（例如 **Air Video**）也支持 AirPlay。按照以下步骤，在支持该功能的应用中使用 AirPlay：


  1. 轻点屏幕右下角的蓝色 **AirPlay** 图标。

  2. 从可用设备列表中选择用于流式播放音乐的设备。

  3. 要将视频或音乐切换回 iPhone，只需再次轻点 **AirPlay** 图标，然后从列表中选择 **iPhone**。


  ![images](img/U0502.jpg)


  ![images](img/U0503.jpg)


  **注意**：**AirPlay** 图标会弹出同时列出了蓝牙和 Wi-Fi 连接设备的菜单。有关蓝牙的更多信息，请参阅下一节。


  你可以通过轻点来选择 **Apple TV**。现在，你的音乐或视频将开始从选定的 AirPlay 设备播放。你可以再次触摸屏幕上的 **AirPlay** 图标来确认。你会在新的
  AirPlay 立体声蓝牙设备旁边看到一个**对勾**图标，并且应该能听到音乐从该音源发出。


  **提示**：为了节省 iPhone 的电量，在通过 AirPlay 向其他设备流式传输内容时，按下**锁定**按钮关闭屏幕。你的音乐或视频会继续播放，但不会因为屏幕亮着而浪费电量。




  #### AirPlay 镜像


  当前的 iPhone 不仅能让你将 iPhone 上的视频或音乐流传输到 Apple TV；它还能让你共享任何应用的屏幕——从工作中的商务演示，到与家人的棋盘游戏，再到与远方亲戚的视频通话。能够将
  `Keynote`、`Infinity Blade` 或 `FaceTime` 从小小的 iPhone 屏幕转移到巨大的电视屏幕上，确实将原本私密的个人体验转变成了有趣的社交活动。


  请按照以下步骤使用 AirPlay 镜像功能：


  1.  点击你想要镜像的应用。在此示例中，我们使用 `Infinity Blade`。

  2.  应用启动后，双击主屏幕按钮以调出快速应用切换器。

  3.  从左向右滑动以进入音频/视频控制界面。（它们在最末端，所以请继续滑动直到无法再滑动为止。）

  4.  点击 `AirPlay 按钮` 以调出你 Wi-Fi 网络上支持 AirPlay 的设备列表。

  5.  选择 `Apple TV`。

  6.  将 `AirPlay 镜像` 开关切换到 `开启`。

  7.  再次点击 `主屏幕` 按钮以返回你的应用。

  8.  现在你应该能在电视大屏幕上看到 `Infinity Blade` 了。让他们见识一下吧！


  ![images](img/U0504.jpg)

  ![images](img/U0505.jpg)


  要停止 AirPlay 镜像，重复相同的步骤，并从设备列表中选择 `iPhone`。


  ### 了解蓝牙


  Apple 最新的 iPhone 支持蓝牙 4.0，它包含了传统的蓝牙功能，以及更先进的高速和低功耗能力。这意味着你可以用比以往更高的质量和更长的时间通话或听音乐。


  随着许多州通过法律要求驾车者使用免提方式通话，使用蓝牙现在比以往任何时候都更有必要。得益于名为 `A2DP` 的技术，你还可以将音乐流传输到支持蓝牙的立体声设备，包括许多新型车载音响和车载套件。


  **注意**：你必须拥有第三方支持蓝牙的适配器或支持蓝牙的立体声设备，才能通过蓝牙技术流传输音乐。


  ### 了解蓝牙


  蓝牙允许你的 iPhone 以无线方式与其他设备通信。蓝牙是一个从每个设备发射信号的小型无线电。在使用外围设备与 iPhone 配合之前，你必须将该设备与你的
  iPhone 配对。许多蓝牙设备可以在距离 iPhone 最远 30 英尺（约 9 米）的范围内使用。


  ![images](img/U0506.jpg)


  #### 可与 iPhone 配合使用的蓝牙设备


  除其他功能外，iPhone 可与蓝牙耳机、蓝牙立体声系统和适配器、蓝牙键盘、蓝牙车载音响系统、蓝牙耳麦和免提设备配合使用。iPhone 支持 `A2DP`（即立体声蓝牙）和
  `AVRCP`（允许你远程控制播放和音量）。


  ### 配对蓝牙设备


  你使用蓝牙的主要用途可能是蓝牙耳机、蓝牙立体声适配器或蓝牙耳麦。任何蓝牙耳机都应能与你的 iPhone 良好配合。要开始使用任何蓝牙设备，你首先需要将其与你的
  iPhone 配对（连接）。


  #### 开启蓝牙


  ![images](img/U0507.jpg)

  ![images](img/U0508.jpg)


  使用蓝牙的第一步是开启蓝牙无线电。请按以下步骤操作：


  1.  点击你的 `设置` 应用。

  2.  然后点击 `通用`。

  3.  点击 `蓝牙`。默认情况下，iPhone 上的蓝牙初始设置为 `关闭`。点击开关将其切换到 `开启` 位置。


  **提示**：蓝牙会额外消耗电池电量。如果你计划在一段时间内不使用蓝牙，请考虑将开关调回 `关闭`。


  ![images](img/U0509.jpg)


  #### 配对耳麦或任何蓝牙设备


  一开启蓝牙，iPhone 就会开始搜索附近的任何蓝牙设备，例如蓝牙耳麦或立体声适配器（请参见图 5–1）。要让 iPhone 找到你的蓝牙耳麦，你需要将该设备置于*配对模式*。请仔细阅读耳麦附带的说明——通常需要按下某个按钮组合来实现。


  **提示**：有些耳麦要求你按住一个按钮五秒钟，直到你看到一系列闪烁的蓝色或红/蓝色灯光。某些配件，如 Apple 无线蓝牙键盘，会自动以配对模式启动。


  一旦 iPhone 检测到蓝牙设备，它将尝试自动与之配对。如果自动配对成功，你无需再做任何操作。


  ![images](img/0501.jpg)

  **图 5–1.** *已发现但尚未配对的蓝牙设备*


  **注意**：某些蓝牙设备（例如耳麦）可能会要求你在键盘上输入一串数字（一个*密码*）（请参见图 5–2）。


  ![images](img/0502.jpg)

  **图 5–2.** *在配对过程中出现提示时，输入四位数的密码。*


  较新的耳麦——例如这里使用的 Aliph Jawbone ICON——会自动与你的 iPhone 配对。只需将耳麦置于配对模式，并将 iPhone 的 `蓝牙`
  选项设置为 `开启`——你需要做的就是这些！


  ![images](img/U0510.jpg)


  配对将自动完成，你以后应该无需再重新配对耳麦。


  #### 使用蓝牙耳麦


  如果你的耳麦已正确配对并开启，所有来电都应路由到你的耳麦。通常，你只需按下耳麦上的主按钮即可接听电话，或使用 iPhone 上的“滑动来接听”功能。


  如果你将手机从脸旁移开（在 iPhone 拨号时），你应该会看到一个指示器，显示蓝牙耳麦正在使用中。在右侧的图片中，你可以看到 `Jawbone ICON` 蓝牙耳麦旁边有
  `扬声器` 图标。


  ![images](img/U0511.jpg)


  你还会看到将通话发送到你的 iPhone 听筒或免提电话（`扬声器`）的选项。你可以在通话期间的任何时候更改此设置。


  触摸 `隐藏来源`，你将看到 iPhone 的正常通话屏幕。


  ##### 通话中的选项


  一旦通话接通并与联系人交谈，你仍然可以将通话重新路由到 iPhone 或免提电话。


  将通话从脸旁移开（如果它在你的脸旁），你会看到 `音频来源` ![images](img/U0513.jpg) 作为可供触摸的选项之一。触摸该图标，你将看到所有重新路由通话的选项，如上所示。


  ![images](img/U0512.jpg)


  只需选择将通话发送到显示的任意选项，你就会看到小的 `扬声器` 图标移动到当前用于通话的来源上（请参见图 5–3）。


  ![images](img/0503.jpg)

  **图 5–3.** *在通话中从蓝牙耳麦切换回 iPhone*


  ## 蓝牙立体声 (A2DP)


  ![images](img/U0514.jpg)


  当今先进蓝牙技术的一大特色是能够通过蓝牙以无线方式流传输你的音乐。这项技术的花哨名称是 `A2DP`，但它更简单地被称为*立体声蓝牙*。




  #### 连接立体声蓝牙设备


  使用立体声蓝牙的第一步是连接一台支持立体声蓝牙的设备。这可以是内置该技术的汽车音响、一副蓝牙耳机或蓝牙音箱，甚至是 Jawbone Jambox 这类较新的耳机。


  首先，按照制造商的说明将蓝牙设备置于配对模式，然后从`设置`图标进入蓝牙设置页面，如本章前面所示。


  ![images](img/U0515.jpg)


  ![images](img/U0516.jpg)


  连接成功后，你会看到新的立体声蓝牙设备列在你的蓝牙设备列表中。有时你会看到设备名称或名称的一部分；其他时候你只会看到`耳机`。点击设备右侧的`箭头`图标，你将在下一个屏幕的`蓝牙`选项卡旁边看到设备的实际名称，如下图所示。


  接下来，打开你的`音乐`应用，开始播放任意歌曲、播放列表、播客或视频音乐库。


  按照以下步骤选择你的音频输出设备：


  1. 点击屏幕右下角的蓝色`AirPlay`图标。

  2. 从可用设备列表中选择用于流媒体播放音乐的设备。

  3. 要将音乐播放切回你的 iPhone，只需再次点击`AirPlay`图标，然后从列表中选择`iPhone`。


  ![images](img/U0517.jpg)


  ![images](img/U0518.jpg)


  **注意**：点击`AirPlay`图标会弹出一个列表，其中包含通过蓝牙和 Wi-Fi 连接的音频设备，例如 Apple TV 或 AirPort Express
  连接的音箱。你可以从中任选其一。


  我们通过点击选择了 Jawbone JAMBOX。现在，你的音乐将从选定的蓝牙设备开始播放。你可以再次触摸屏幕上的`AirPlay`图标来验证这一点。你会在新的立体声蓝牙设备旁边看到一个`勾选`图标，同时你也会听到音乐从该音源播放出来。


  ### 断开或忽略蓝牙设备


  有时，你可能想断开 iPhone 与蓝牙设备的连接。这很容易操作。像本章前面所做的那样进入蓝牙设置。接着，触摸你想断开的设备，进入下一个屏幕，点击`忽略此设备`按钮，然后确认你的选择。


  这将从 iPhone 中删除该蓝牙配置文件（见图 5–5）。


  **注意**：蓝牙的有效范围只有大约 30 英尺（约 9 米）。如果你不在蓝牙设备附近，则应关闭蓝牙。当你准备好使用时，随时可以重新打开它。


  ![images](img/0505.jpg)


  **图 5–5.** *忽略或断开蓝牙设备*


