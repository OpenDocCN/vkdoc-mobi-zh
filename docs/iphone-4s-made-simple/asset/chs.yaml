  表 3 提供了从整理和查找联系人，到管理日历、处理邮件、发送信息、获取驾车路线、拨打电话等一切相关操作的链接。


  ![images](img/p20-01.jpg)


  ![images](img/p21-01.jpg)


  #### 尽情娱乐


  您可以用 iPhone 获得许多乐趣；表 4 向您展示了具体方法。例如，您可以使用 iPhone 购买或租赁电影，通过`Pandora`收听免费网络电台，或使用`iBooks`以全新的方式购买和阅读一本书。如果您已经在使用
  Kindle，可以将所有 Kindle 书籍同步到 iPhone 上并立即阅读。您还可以从 App Store 的数十万款应用中进行选择，让您的 iPhone
  更出色、更有趣、更实用。您也可以从 Netflix 或 iTunes 租赁电影，立即下载以供日后观看（例如在飞机或火车上）。


  ![images](img/p22-01.jpg)


  ![images](img/p23-01.jpg)


  #### 掌握资讯


  您还可以使用 iPhone 阅读最喜爱的杂志或报纸，享受配有最新鲜生动图片和视频的内容（参见表 5）。或者，您可以用它来查看最新的天气预报。


  ![images](img/p24-01.jpg)


  ## 社交网络


  您还可以使用 iPhone 上的社交网络工具与朋友、同事及专业网络保持联系并获取最新动态（参见表 6）。


  ![images](img/p25-01.jpg)


  #### 高效工作


  iPhone 还能帮助您提高工作效率。您可以使用`GoodReader`应用访问和阅读几乎任何 PDF 文件或其他文档。您可以使用基础的`备忘录`应用做笔记，或升级到功能强大的`印象笔记`高级应用，它拥有集成音频、图片和文本笔记的惊人能力，并能将所有内容同步到网站。您还可以使用
  iPhone 设置闹钟、计算小费、查看行走方向以及录制语音备忘录（参见表 7）。


  ![images](img/p26-01.jpg)


