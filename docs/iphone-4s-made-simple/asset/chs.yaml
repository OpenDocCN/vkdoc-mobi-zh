  \n**注意：** 如果这是一部包含多个章节的全长度电影，轻点 `Reverse` 或 `Fast-Forward` 将向前或向后移动一个章节。\n\n###\
  \ 使用时间进度条\n\n视频屏幕顶部有一个滑块，可以让你*滑动*浏览视频的已播放时间。如果你确切知道（或大致知道）想观看的视频进度点，只需按住滑块并将其拖到该位置。有些人认为这比按住\
  \ `Fast-Forward` 或 `Rewind` 按钮更精确一些。\n\n![images](img/U1505.jpg)\n\n**提示：** 向下拖动手指可以更慢地移动滑块控件。\n\
  \n### 更改视频大小（宽屏与全屏）\n\n你的大部分视频将以宽屏格式播放。但是，如果你的视频未针对 iPhone 进行转换，或者未针对你的屏幕分辨率进行优化，你可以轻点位于顶部状态栏右侧的\
  \ `Expand` 按钮。\n\n你会注意到按钮上有两个箭头。如果你处于全屏模式，箭头指向内侧，相互朝向。如果你处于宽屏模式，箭头指向外侧。\n\n![images](img/U1506.jpg)\n\
  \n如果宽屏电影没有占满 iPhone 的全部屏幕，轻点此按钮会稍微放大。再次轻点则会缩小回原尺寸。\n\n**注意：** 你也可以直接双击屏幕来放大并填满屏幕。请注意，就像在你的宽屏电视上一样，试图强制非宽屏视频进入宽屏模式有时可能会导致部分画面丢失。\n\
  \n### 使用 AirPlay\n\nApple 的 AirPlay 镜像功能可以让你将视频投射到 Apple TV，从而在大屏幕电视上欣赏。只需轻点右下角的\
  \ AirPlay 按钮，然后选择 Apple TV 作为输出目标。片刻之后，你的 iPhone 屏幕会变暗，视频将在大屏幕电视上从你离开的位置开始播放。\n\n\
  ![images](img/U1507.jpg)\n\n要将视频恢复到 iPhone 上，再次轻点 AirPlay，然后选择 iPhone 作为目标。\n\n\
  ![images](img/U1508.jpg)\n\n**提示：** 如果你没有或不想要 Apple TV，你还有其他几种方式观看电影。例如，你可以购买 VGA\
  \ 或 HDMI 适配器，将 iPhone 连接到 VGA 电脑显示器或高清电视上。\n\nVGA 仅支持视频，需要应用支持此功能，并且通常与 DRM 不兼容。HDMI\
  \ 支持视频和音频，也需要应用支持该功能。不过，它符合 HDCP 标准，因此可以兼容 iTunes 视频等受 DRM 保护的内容。\n\nApple 还提供符合\
  \ DRM 要求且适用于大多数电视的色差分量视频线缆。\n\n更多信息，请参阅《快速入门指南》中的“配件”部分。\n\n\n\n#### 使用章节功能\n\n\
  从 iTunes 商店购买的大多数全长电影（以及部分专为 iPhone 转换的电影）都会提供**章节**功能。在 iPhone 上观看这类影片，与在家用电视上观看\
  \ DVD 的操作非常相似。\n\n只需轻点屏幕调出视频控制界面，然后选择**章节**。\n\n![images](img/U1509.jpg)\n\n这会带你返回电影的主页面。\n\
  \n轻点右上角的**章节**按钮，然后滚动浏览，找到并点击你想观看的章节。\n\n#### 查看章节\n\n你可以通过滚动或快速滑动来定位想看的场景或章节。\n\
  \n你还会注意到，每个章节的最右侧会显示该章节开始的确切时间（相对于电影开头）。\n\n![images](img/U1510.jpg)\n\n除了前面提到的章节菜单，你还可以通过轻点**快退**或**快进**按钮，快速跳转到电影的上一个或下一个章节。每次轻点都会向前或向后移动一个章节。\n\
  \n**注意：** 章节功能通常仅适用于从 iTunes 商店购买的电影。经过转换并加载到 iPhone 上的电影通常不包含章节。\n\n### 观看电视节目\n\
  \niPhone 非常适合观看你喜欢的电视节目。你可以从 iTunes 商店购买电视节目，也可以从某些 iPhone 应用（如 **Hulu Plus** 应用）下载样片。\n\
  \n只需向下滚动到**电视节目**分类分隔线，即可查看已下载到 iPhone 上的节目。在可用节目列表中滚动，然后轻点**播放**。视频控件的操作方式与观看电影时相同。\n\
  \n**注意：** 在撰写本文时，iTunes 云服务允许美国用户将以前购买的电视节目直接重新下载到 iPhone 上（更多信息请参阅第 22 章：“设备上的\
  \ iTunes”）。\n\n![images](img/U1511.jpg)\n\n### 观看播客\n\n我们通常认为播客是可以通过 iTunes 下载的纯音频广播。如今视频播客也非常普遍，可以在众多网站上找到，包括许多公共广播网站。它们也可以在\
  \ iTunes 的 **iTunes U** 板块中找到；该板块列出了大学播客及其他相关信息。\n\n![images](img/U1512.jpg)\n\n\
  以下是来自 Gary Mazo 的一个有趣的 iTunes U 故事：\n\n> “最近，我和刚被加州理工学院录取的儿子一起在 iPhone 的 **iTunes**\
  \ 应用里浏览 **iTunes U** 板块。我们想知道住宿情况，瞧，还真找到了一个展示加州理工学院宿舍参观之旅的视频播客。我们下载了它，这个播客直接存入了**播客**目录，方便以后观看。无需从东海岸飞过去，我们就完成了一次完整的虚拟宿舍参观。”\n\
  \n### 观看音乐视频\n\n你可以从多个来源获取供 iPhone 观看的音乐视频。通常，如果你从 iTunes 购买了一张“豪华版”专辑，其中会包含一两首音乐视频。你也可以从\
  \ iTunes 商店购买音乐视频，许多唱片公司和艺人也会在其网站上免费提供音乐视频。\n\n音乐视频会自动归类到 **视频** 应用的 **音乐视频** 分区中。\n\
  \n**音乐视频** 通常位于 **视频** 列表中的 **电视节目** 下方。其控制方式与所有其他视频应用相同。\n\n![images](img/U1513.jpg)\n\
  \n### 视频选项\n\n与你的音乐播放器一样，视频播放器也有一些可调节的选项。这些选项可以通过**主屏幕**上的**设置**图标进行访问。\n\n轻点**设置**图标，向下滚动并轻点**视频**以查看可用选项。\n\
  \n在这里，你还可以设置“家庭共享”设置，以便直接从 iPhone 上观看存储在电脑 iTunes 资料库中的视频。\n\n![images](img/U1514.jpg)\n\
  \n#### 开始播放选项\n\n有时，你可能不得不中断观看某个视频。此选项让你决定下次想观看该视频时的操作。你可以选择从头开始观看，或者从上次中断的地方继续观看。只需选择你偏好的选项，此后\
  \ iPhone 便会按此操作执行。\n\n![images](img/U1515.jpg)\n\n#### 隐藏式字幕\n\n如果你的视频支持隐藏式字幕，将**隐藏式字幕**开关设为**开启**，即可在屏幕上看到隐藏式字幕。\n\
  \n### 删除视频\n\n要删除视频（以节省 iPhone 空间），只需上下滚动并选择要删除的视频。\n\n**注意：** 如果你正通过 iTunes 同步视频，请确保也在\
  \ iTunes 中取消勾选你要删除的视频；否则，下次同步时，iTunes 可能会将其重新同步回你的 iPhone！\n\n只需在要删除的视频上向左滑动。如同删除邮件一样，左上角会出现一个红色的**删除**按钮。轻点**删除**按钮，系统会提示你确认删除。\n\
  \n最后，轻点**删除**按钮，该视频便会从系统中删除。\n\n**注意：** 此操作仅从 iPhone 上删除视频——如果你在购买视频后曾与电脑同步过，那么\
  \ iTunes 视频资料库中仍会保留一份副本。如果你之后想再次观看，可以将其重新加载到 iPhone 上。但是，如果你从 iPhone 上删除了一部租借的电影，它将永久删除！\n\
  \n### iPhone 上的 YouTube\n\n如今，在电脑上观看 YouTube 视频无疑是人们最常做的事情之一。而现在，YouTube 就在你的 iPhone\
  \ 上，触手可及。\n\n你可以在主屏幕上看到 YouTube 图标。只需轻点该图标，即可进入 YouTube 应用。\n\n![images](img/U1516.jpg)\n\
  \n#### 搜索 YouTube 视频\n\n首次启动 **YouTube** 时，你通常会看到当天的**精选**视频。\n\n像在其他应用中一样，滚动浏览视频选择项即可。\n\
  \n![images](img/U1517.jpg)\n\n#### 使用底部图标\n\n在 **YouTube** 应用的底部，有五个图标：**精选**、**最多观看**、**搜索**、**收藏**和**更多**。每个选项的含义都相当一目了然。\n\
  \n![images](img/U1518.jpg)\n\n要查看 YouTube 当天推荐的精选视频，请轻点**精选**图标。要查看在线观看次数最多的视频，请轻点**最多观看**图标。\n\
  \n观看完某个视频后，你可以在 **YouTube** 上将其设为最爱，以便日后轻松找到。如果已设置书签，轻点**收藏**图标时它们便会显示出来。\n\n![images](img/U1519.jpg)\n\
  \n你还可以搜索庞大的 YouTube 视频库。轻点**搜索**框（就像之前讨论的其他应用一样），键盘会弹出。输入短语、主题，甚至是视频的名称。\n\n在此示例中，我正在查找最新的\
  \ Made Simple Learning 视频教程——所以我只需输入“Made Simple Learning”，即可看到此类视频的列表。\n\n当我找到想看的视频后，可以轻点它以查看更多信息。我甚至可以在播放过程中轻点视频并选择评分来为它评分。\n\
  \n![images](img/U1520.jpg)\n\n#### 播放视频\n\n做出选择后，轻点你想观看的视频。你的 iPhone 会以竖屏或横屏模式开始播放\
  \ YouTube 视频。要强制竖屏显示，只需旋转 iPhone，使屏幕方向保持垂直。\n\n\n\n### 视频控制\n\n视频开始播放后，屏幕上的控制按钮会消失，因此你只能看到视频画面。在视频播放过程中，如需停止、暂停或激活其他选项，只需轻点屏幕即可。\n\
  \n屏幕上的选项与你观看其他视频时看到的基本相同。\n\n（横屏模式下）要快进视频，请长按`快进`箭头。要快速后退，请长按`后退`箭头。要播放在 YouTube\
  \ 列表中的下一个视频，请轻点`快进`/`下一个`箭头。要观看列表中的上一个视频，请轻点`后退`/`上一个`箭头。\n\n![images](img/U1521.jpg)\n\
  \n要将视频设为收藏，请轻点最左侧的图标：`收藏夹`。 ![images](img/U1522.jpg)\n\n要将视频投射到 Apple TV 上，请轻点`AirPlay`按钮。\
  \ ![images](img/U1523.jpg)\n\n![images](img/U1524.jpg)\n\n要添加至收藏夹、通过电子邮件发送或发布推文分享该视频，请轻点`共享`图标，即可进行这些操作。\n\
  \n![images](img/U1525.jpg)\n\n### 查看和清除历史记录\n\n![images](img/U1526.jpg)\n\n轻触`更多`，然后轻触`历史记录`，你最近观看的视频便会显示出来。\n\
  \n如果你想清除历史记录，只需轻触右上角的`清除`按钮，然后点击底部的按钮确认即可。\n\n要观看历史记录中的视频，只需轻触该视频，它便会开始播放。\n\n![images](img/U1527.jpg)\n\
  \n**注意：** `Netflix`应用会消耗大量数据，因此，如果你是通过 Wi-Fi 流播放视频，请确保 Wi-Fi 信号强。如果通过 3G 蜂窝网络使用该应用，请确保你的数据套餐足够。\n\
  \n"
- "# 第 16 章\n\n## Safari 网页浏览器\n\n现在，我们将带你了解 iPhone 上最有趣的体验之一：上网冲浪。你可能听说过，在 iPhone\
  \ 上浏览网页比以往任何时候都更贴近个人体验——我们同意这一点！我们将向你展示如何通过 iPhone 上的 `Safari`，以前所未有的方式进行触摸、缩放以及与网页互动。你将学习如何设置和使用书签、通过搜索引擎快速查找内容、打开并切换多个浏览器窗口，甚至能够轻松地从网页中复制文本和图像。\n\
  \n### 在 iPhone 上浏览网页\n\n你可以通过 Wi-Fi 或 iPhone 的 3G 连接随心所欲地浏览网页。与其更大的同类产品 iPad 一样，你的\
  \ iPhone 拥有许多人认为目前最强大的移动浏览体验。网页看起来与你在电脑上看到的非常相似。借助 iPhone 的缩放功能，你甚至无需担心较小的屏幕尺寸会影响你的网页浏览体验。简而言之，在\
  \ iPhone 上浏览网页是一种更令人满意的体验。\n\n你可以根据自己的偏好选择竖屏或横屏模式浏览。通过双击或双指捏合放大的手势快速放大视频——这些操作与你放大文本和图像时的动作相同。\n\
  \n**为什么有些视频和网站无法显示？（需要 Flash Player）**\n\n![images](img/U1601.jpg)\n\nApple 在 iOS\
  \ 上不支持 Flash，并且 Adobe 近期已决定停止开发 Flash Player Mobile。如果你轻点一个视频但无法播放，或者看到类似“需要 Flash\
  \ 插件”、“下载最新 Flash 插件以观看此视频”或“需要 Adobe Flash 才能查看此站点”的提示，那么你将无法观看该视频或访问该网页。幸运的是，越来越多的网站开始使用\
  \ HTML5 视频替代 `Flash`，包括 YouTube、Vimeo、TED、《*纽约时报*》和《*时代*杂志》，这些内容都可以在你的 iPhone 上播放。\n\
  \n解决此限制的一种方法：App Store 上的一些替代浏览器（例如 `Skyfire`）会在其自有服务器上渲染 `Flash` 视频，并将 HTML5 视频发送到\
  \ iPhone。\n\n#### 需要网络连接\n\n你的 iPhone 需要处于有效的互联网连接状态（Wi-Fi 或 3G）才能浏览网页（详见第 4 章：“连接到网络”）。\n\
  \n#### 启动网页浏览器\n\n你应该在你的`主屏幕`上找到 `Safari`（网页浏览器）应用。通常，`Safari`图标位于底部 Dock 栏中。\n\n\
  ![images](img/U1602.jpg)\n\n轻触 `Safari` 图标，你将进入浏览器的`首页`。这很可能是 Apple 的 iPhone 页面。\n\
  \n只需将 iPhone 侧转，即可在更宽的横屏模式下看到同一个页面。当你找到喜欢的网站时，可以设置书签以便轻松跳转到这些网站。我们将在本章后面介绍如何操作。\n\
  \n![images](img/U1603.jpg)\n\n#### Safari 网页浏览器屏幕布局\n\n观察你的屏幕，注意地址栏位于屏幕左上方。此栏显示当前网页地址。\n\
  \n如果你正在查看包含合适文本内容的网页，你会注意到地址栏中会出现“阅读器”按钮。轻触`阅读器`，即可以一种易于阅读的格式查看网页内容。更多相关信息，请参见本章的“Safari\
  \ 阅读器”部分。\n\n`搜索`窗口位于地址栏的右侧。默认设置为 Google 搜索，但如果你愿意，可以将其更改为其他搜索引擎。\n\n屏幕底部有五个图标：返回、前进、操作、书签和页面视图。\n\
  \n![images](img/U1604.jpg)\n\n#### 输入网址\n\n你想学习的首要操作是如何访问你最喜欢的网页。就像在电脑上一样，你需要在浏览器中输入网址（URL）。按照以下步骤在\
  \ `Safari` 中输入网址：\n\n1.  首先，轻点浏览器顶部的`地址`栏。你会看到键盘出现，并且`地址`栏的窗口会展开。\n2.  如果窗口中已有地址并且你想删除它，请按地址栏右侧的\
  \ ![images](img/U1605.jpg)。\n3.  开始输入你的网址（你不需要输入“`www.`”）。\n4.  开始输入时，你可能会看到`地址`栏下方出现建议；只需轻触任一建议即可前往该页面。这些建议非常完整，因为它们来自你的浏览历史记录、书签、网址（URL）和网页标题。\n\
  5.  记住页面底部的 `.com` 键。如果你长按它，会看到 `.edu`、`.org` 和其他常见的域名后缀。\n6.  输入完毕后，轻点`前往`键即可访问该页面。\n\
  \n**提示：** 不要输入“`www.`”，因为这不是必需的。记得使用底部的`冒号`、`斜杠`、`下划线`、`点`和 `.com` 键以节省时间。\n\n**提示：**\
  \ 长按 `.com` 键可查看所有选项：`.org`、`.edu`、`.net`、`.de` 等。\n\n#### 在已打开的网页中向前或向后移动\n\n既然你已经知道如何输入网址，你可能会跳转到不同的网站。屏幕底部的`前进`和`后退`箭头\
  \ ![images](img/U1606.jpg) 让你可以非常轻松地向前或向后浏览最近访问过的页面。如果`后退`箭头是灰色的，本章“使用打开页面按钮”部分可以帮助你找出原因。\n\
  \n假设你正在查看《*纽约时报*》网站上的新闻，然后你跳转到 ESPN 查看体育比分。要返回《*纽约时报*》的页面，只需轻触`后退`箭头。要再次返回 ESPN\
  \ 网站，轻触`前进`箭头。\n\n\n\n### 使用“打开页面”按钮\n\n有时，当你点击一个链接时，你正在查看的网页会移至后台，并弹出一个包含新内容（例如另一个网页或视频）的新窗口。你会看到先前的页面移至后台，同时打开一个新页面。在这种情况下，新浏览器窗口中的“返回”箭头将不起作用。\n\
  \n相反，你需要点击右下角的“打开页面”图标 ![images](img/U1607.jpg) 来查看已打开网页的列表，然后点击你想要的那个页面。在所示的示例中，我们点击了一个链接，该链接打开了新浏览器窗口。回到旧窗口的唯一方法是点击“打开页面”图标，并选择所需的页面。\n\
  \n![images](img/U1608.jpg)\n\n### 在网页中放大和缩小\n\n在 iPhone 上放大和缩小网页非常容易。主要有两种缩放方式：双击和捏合。\n\
  \n#### 双击\n\n如果你双击网页中的某一栏，页面将放大至该特定栏。这让你能够精确定位到网页上的正确位置，对于未针对移动屏幕优化的页面非常有用。\n\n\
  要缩小，只需再双击一次（你可以在本书开头的“快速入门指南”中看到它的效果）。\n\n## 捏合\n\n此技巧可让你放大页面的特定部分。这需要稍加练习，但很快就会变得得心应手。查看“快速入门指南”了解具体效果。\n\
  \n将你的拇指和食指并拢放在你想要放大的网页部分。慢慢地向外捏合，分开你的手指。你会看到网页放大。网页需要几秒钟来聚焦，但很快它就会放大并变得非常清晰。\n\n\
  要缩小到之前的状态，只需将手指分开，然后慢慢靠拢；页面将会缩小到原始大小。\n\n### 激活网页中的链接\n\n上网浏览时，你经常会遇到能带你前往另一个网站的链接。由于\
  \ `Safari` 是一个功能齐全的浏览器，你只需点击链接即可跳转到新页面。\n\n### 使用 Safari 书签\n\n一旦你开始在 iPhone 上进行一些浏览，你自然会希望快速访问你最喜爱的网站。一个很好的方法就是添加书签，以实现一键访问网站。\n\
  \n**提示：** 你可以通过 iCloud 无线方式，或使用电脑上的 `iTunes` 应用，从电脑的浏览器（仅限 `Safari` 或 `Internet\
  \ Explorer`）同步你的书签。更多详情，请查看第 3 章：“与 iCloud、iTunes 等进行同步”。\n\n## 添加新书签\n\n在 iPhone\
  \ 上添加新书签只需轻点几下：\n\n1.  要为当前查看的网页添加新书签，请轻点屏幕底部的“操作”按钮 ![images](img/U1609.jpg)。\n\
  2.  选择“添加书签”。\n\n    ![images](img/U1610.jpg)\n\n3.  我们建议你将书签名称编辑得简短且易于识别。\n4. \
  \ 如果你想更改存储书签的文件夹，请轻点“书签”。\n5.  完成后，轻点“存储”按钮。\n\n    ![images](img/U1611.jpg)\n\n\
  ## 使用书签和历史记录\n\n一旦你设置了一些书签，查看和使用它们就非常容易了。在同一个区域，你还可以查看和使用你的网页浏览历史记录。iPhone 上一个非常有用的工具是能够像在电脑上一样通过“历史记录”浏览网页。请按照以下步骤操作：\n\
  \n1.  轻点页面底部的“书签”图标 ![images](img/U1612.jpg)。\n2.  向上或向下滑动查看所有书签。\n3.  轻点任何书签，即可跳转到该网页。\n\
  \n    ![images](img/U1613.jpg)\n\n4.  轻点“历史记录”文件夹，查看最近访问过的网页历史记录。\n5.  请注意，在列表底部，你会看到“今天早些时候”和之前日期的其他文件夹。\n\
  6.  轻点任一历史记录条目，即可前往该网页。\n\n**提示：** 要清除历史记录，请轻点左下角的“清除”按钮。你也可以在“设置”应用中清除历史记录、Cookie\
  \ 和缓存。轻点“设置”；轻点“Safari”；滚动到底部；然后轻点“清除历史记录”、“清除 Cookie”或“清除缓存”。\n\n![images](img/U1614.jpg)\n\
  \n## 管理你的书签\n\n因为设置书签非常容易，所以很容易积累大量的书签。但是，你可能会发现不再需要某个特定书签，或者你可能想通过添加新文件夹来整理它们。\n\
  \n如果你已经整理过“电话收藏”列表，你就已经知道如何整理书签了；操作步骤相同。\n\n就像 iPhone 上的其他列表一样，你可以重新排列“书签”列表并删除条目。请按照以下步骤操作：\n\
  \n1.  像之前一样查看你的“书签”列表。\n2.  轻点左下角的“编辑”按钮。\n3.  要重新排列条目，请触摸并拖动带有三条灰色横线的右侧边缘，在列表中向上或向下移动。在此示例中，我们将指向亚马逊网站“iPad\
  \ Made Simple”图书页面的书签拖到顶部。\n4.  要为书签创建新文件夹，请轻点右下角的“新建文件夹”按钮。\n5.  要删除书签，请轻点条目左侧的红色“圆圈”图标使其变为垂直。\n\
  6.  轻点“删除”按钮。\n7.  完成重新排列和删除条目后，轻点左上角的“完成”按钮。\n8.  要编辑书签的名称、文件夹或网址，请轻点书签名称本身。\n\n\
  \    ![images](img/U1615.jpg)\n\n9.  现在你可以对名称、网址或文件夹进行任何调整。\n10. 要更改书签的存储文件夹，请轻点网址下方的按钮。在此图中，它显示为“书签”；但在你的\
  \ iPhone 上，可能有所不同。此书签指向亚马逊网站上的“iPad Made Simple”页面。\n11. 完成后轻点“完成”。\n\n    ![images](img/U1616.jpg)\n\
  \n### 阅读列表\n\n`阅读列表` 是一种特殊类型的书签，可让你快速保存一篇网络文章，以便闲暇时阅读。`阅读列表` 功能可以通过 iCloud 同步，因此这是在家庭或工作用的\
  \ Mac 或 Windows PC 上的 `Safari` 中快速标记文章，以便在旅途中通过 iPhone 或 iPad 阅读的绝佳方式。你也可以使用此功能在\
  \ iPhone 上保存书签，以便回到 iPad 或 PC 后更舒适地阅读。\n\n请按照以下步骤使用 `阅读列表` 功能：\n\n1.  前往你想要在 `Safari`\
  \ 中保存的文章。\n2.  轻点页面底部中间的“操作”按钮 ![images](img/U1617.jpg)。\n3.  轻点“添加到阅读列表”。\n\n稍后按照以下步骤查看\
  \ `阅读列表` 中的文章：\n\n![images](img/U1618.jpg)\n\n1.  轻点页面右下角的“书签”按钮 ![images](img/U1619.jpg)。\n\
  2.  轻点“阅读列表”选项的“眼镜”图标。（如果你没有看到“眼镜”图标，你可能位于“书签”文件夹内。只需轻点左上角的“箭头”图标退出你所在的文件夹，直到“箭头”消失，你就能看到“眼镜”图标。）\n\
  \n![images](img/U1620.jpg)\n\n1.  要查看你的 `阅读列表` 中的所有内容，请轻点左上角的“全部”标签。要仅查看尚未阅读的文章，请轻点右上角的“未读”标签。\n\
  2.  轻点你想阅读的文章。\n\n![images](img/U1621.jpg)\n\n最后，按照以下步骤从 `阅读列表` 中删除一篇文章：\n\n1. \
  \ 在你想要从 `阅读列表` 中移除的文章上从左向右滑动。\n2.  轻点红色的“删除”按钮。\n\n    ![images](img/U1622.jpg)\n\
  \n\n\n### Safari 阅读器\n\n**Safari** 的阅读器功能让您能够以干净、清晰的页面形式欣赏网页文章，文字大小适中，免去繁杂布局或广告的干扰。\n\
  \n**注意：** 尽管 Safari 能够出色地检测大多数网页文章，但由于内容和格式的多样性，有时可能会遗漏。如果您没有看到阅读器按钮，说明 Safari 无法检测到该文章。\n\
  \n1. 按照以下步骤激活此功能：\n\n   ![images](img/U1623.jpg)\n\n2. 前往您想阅读的文章。\n3. 点击 URL 字段右侧的阅读器按钮，见图\
  \ 16–1。\n4. 点击字体大小按钮以放大或缩小文字。\n\n   ![images](img/U1624.jpg)\n\n![images](img/1601.jpg)\n\
  \n**图 16–1.** *标准视图（左）与阅读器视图（右）中的同一网页。*\n\n**提示：** 如果您希望同时拥有“阅读列表”和“阅读器”的功能，以及浏览器访问、社交分享等其他特性，请查看\
  \ App Store 中的 **Instapaper** 等应用。\n\n### Safari 浏览技巧与提示\n\n在您掌握了基本浏览方法后，我们将介绍一些实用技巧，帮助您在\
  \ iPhone 上更愉快、更高效地浏览网页。\n\n#### 跳转到网页顶部\n\n有时网页内容很长，手动滚动回顶部会比较费力。一个简单的技巧是点击网页的灰色标题栏，即可自动跳转到顶部。\n\
  \n#### 通过电子邮件或 Twitter 分享网页\n\n浏览时，如果您发现一个非常想分享给朋友或同事的页面，请点击底部栏中间的 **操作** 按钮 ![images](img/U1625.jpg)，然后选择\
  \ **将此页面的链接通过邮件发送** 创建一封包含链接的邮件并发送。选择 **发送推文** 则创建一条包含分享链接的新 Twitter 消息，如图 16–2\
  \ 所示。\n\n![images](img/1602.jpg)\n\n**图 16–2.** *使用操作按钮执行 Safari 网页的各种功能。*\n\n####\
  \ 打印网页\n\n使用 iPhone，您可以通过本地 Wi-Fi 网络轻松地将任何网页打印到兼容 **AirPrint** 的打印机。点击 **操作** 按钮\
  \ ![images](img/U1626.jpg)，然后选择 **打印**。\n\n#### 在 Safari 中观看视频\n\n您经常会在网站上看到视频。您可以播放其中许多视频，但并非全部。例如，采用\
  \ **Adobe Flash** 格式的视频无法在 iPhone 上播放（请参阅本章开头的说明）。\n\n点击 **播放** 按钮后，您将离开 **Safari**\
  \ 并进入 **iPod** 视频播放器。\n\n您可以横置 iPhone，以横向或宽屏模式观看视频。\n\n如果播放控制消失，点击屏幕即可重新显示。\n\n\
  观看完视频并想返回网页时，请点击左上角的 **完成** 按钮。\n\n**提示：** 请参阅第 15 章“观看视频”中的视频播放器技巧与提示。\n\n![images](img/U1627.jpg)\n\
  \n#### 保存或复制文本与图形\n\n有时您可能想从网站复制文本或图形。本节将简要介绍操作方法；如需了解更深入的步骤，包括如何使用剪切和粘贴功能，请参阅第\
  \ 2 章“键入、复制和搜索”中的“复制和粘贴”部分。以下是从网页复制文本或图形的快速摘要：\n\n*   **复制单个单词：** 长按该单词，直到它被高亮显示且出现\
  \ **复制** 按钮。然后点击 **复制**。\n*   **复制几个单词或整个段落：** 长按一个单词直到它被高亮显示。然后向左或向右拖动蓝色圆点以选择更多文本。您可以向上或向下滑动以选择整个段落。最后点击\
  \ **复制**。\n\n    **提示：** 选定单个单词会使复制功能进入单词选择模式，在此模式下您可以拖动以增加或减少选中的单词数量。如果选择超过一个段落，通常会切换到元素选择模式，此时您会看到可拖动的边缘，用于选择多个段落、图像等。\n\
  \n*   **保存或复制图形：** 长按图片或图像，直到弹出窗口询问您是否要保存或复制该图像。\n\n#### 使用自动填充节省时间\n\n自动填充功能是节省输入个人信息（包括网站用户名和密码）的好方法。自动填充工具可以记住并自动填写网页表单所需的信息。启用自动填充可以节省大量时间。\n\
  \n请参阅本章后面的“启用自动填充”部分，了解如何在 iPhone 上设置自动填充。\n\n启用 **自动填充** 选项后，只需前往任何需要填写字段的网页。一旦您触摸该字段，键盘就会在屏幕底部弹出。在键盘顶部，您会看到一个写着\
  \ **自动填充** 的小按钮。点击它，网页表单就会自动填写完毕。\n\n**注意：** 自动输入您的姓名和密码意味着任何拿起您 iPhone 的人都能访问您的个人网站和信息。您可能希望按照第\
  \ 8 章“个性化与安全”中的说明启用密码安全功能。\n\n##### 输入用户名和密码\n\n当您首次访问一个需要输入用户名和密码的网站时，输入它们后点击 **提交**\
  \ 或 **回车**。此时，自动填充会询问是否希望您的 iPhone 记住它们。\n\n如果希望被记住并在下次访问时自动输入，请点击 **是**。\n\n![images](img/U1628.jpg)\n\
  \n下次访问此登录页面时，您的用户名和密码将自动填写。\n\n![images](img/U1629.jpg)\n\n##### 用于个人信息\n\n在网上，您经常需要输入姓名、电子邮件地址、家庭住址等信息。通过将自动填充设置并与\
  \ iPhone 上的联系人记录关联，只需轻触一下即可填写这些表单。\n\n您会访问许多需要填写网页表单的网站。例如，查看 [`www.madesimplelearning.com`](http://www.madesimplelearning.com)\
  \ 上关于免费 iPhone 技巧的网页表单示例。手动输入电子邮件地址、名字和姓氏会花费一些时间。\n\n![images](img/U1630.jpg)\n\n\
  一旦您点击第一个字段（此处为 **电子邮件**），您就会看到 **自动填充** 栏出现在键盘上方。\n\n点击 **自动填充** 按钮，您的电子邮件地址和姓名便会立即根据联系人记录填写完毕。\n\
  \n![images](img/U1631.jpg)\n\n#### 将网页图标添加到主屏幕\n\n如果您喜欢某个网站或页面，可以轻松地将其作为图标添加到 **主屏幕**。这样，您无需通过\
  \ **Safari** 的书签选择过程即可直接访问该网页。将图标放在 **主屏幕** 上可以节省许多步骤。这对于快速启动 Web 应用（例如 Google 的\
  \ Gmail 或基于 Web 的游戏）尤其有用。\n\n**按照以下步骤添加 Web 应用图标：**\n\n1.  点击浏览器底部的 **操作** 按钮 ![images](img/U1632.jpg)。\n\
  2.  点击 **添加到主屏幕**。\n3.  调整名称，将其缩短至十个或更少字符；因为主屏幕上图标名称的空间有限，建议这样做。\n4.  点击右上角的 **添加**\
  \ 按钮。\n\n   ![images](img/U1633.jpg)\n\n\n\n### 调整 Safari 浏览器设置\n\n与我们之前调整的其他设置一样，`Safari`\
  \ 的设置也位于 `设置` 应用中。\n\n1.  要访问 `Safari` 的设置，请轻点 `设置` 图标。\n2.  轻点 `Safari`。\n\n![images](img/U1634.jpg)\n\
  \n#### 更改搜索引擎\n\n默认情况下，`Safari` 浏览器的搜索引擎是 `Google`。要将其更改为 `Yahoo` 或 `Bing`，请轻触 `搜索引擎`\
  \ 按钮，然后选择新的搜索引擎。\n\n**提示：** 如果你不想更改默认搜索引擎，你也可以使用 `Siri` 来偶尔搜索 `Yahoo!` 或 `Bing`。只需激活\
  \ `Siri` 并说“用 Yahoo! 搜索...”或“用 Bing 搜索...”，`Siri` 就会为你返回结果。\n\n![images](img/U1635.jpg)\n\
  \n#### 启用自动填充\n\n正如我们在本章前面所示，`自动填充` 是一种便捷的方式，可以让 `Safari` 自动填写要求你输入姓名、地址、电话号码，甚至用户名和密码的网页表单。它可以为你节省大量反复输入姓名和其他信息的时间。\n\
  \n要启用 `自动填充` 选项，请按照以下步骤操作：\n\n1.  从 `设置` 应用中的 `Safari` 菜单，轻点 `自动填充`。\n\n![images](img/U1636.jpg)\n\
  \n2.  将 `姓名与密码` 旁边的开关设置为 `开启`。\n3.  将 `使用联络信息` 旁边的开关设置为 `开启`。\n\n![images](img/U1637.jpg)\n\
  \n4.  将 `使用联络信息` 设置为 `开启` 后，系统会带你进入 `通讯录` 列表，以选择一个联系人使用。\n5.  上下滑动以找到某人，或双击显示 `通讯录`\
  \ 的顶部栏以调出 `搜索` 窗口。\n6.  找到要使用的联系人后，轻点该联系人即可返回 `Safari` 的 `设置` 屏幕。\n\n![images](img/U1638.jpg)\n\
  \n#### 调整隐私选项\n\n开启 `无痕浏览` 选项意味着你访问网站时不会存储任何信息、历史记录或 Cookie。如果你担心他人知道你访问了哪些网站，或担心你访问的网站对你进行跟踪，那么你应该将\
  \ `无痕浏览` 切换到 `开启` 位置。\n\n![images](img/U1639.jpg)\n\n你也可以使用 `清除历史记录` 和 `清除 Cookie\
  \ 与数据` 选项。\n\n![images](img/U1640.jpg)\n\n**提示：** 如果你发现网页浏览速度变慢或变得卡顿——或者 `Safari`\
  \ 频繁崩溃——请尝试分别轻点 `历史记录` 和 `Cookie 与数据` 并确认你的选择来清除它们。\n\n#### 调整安全选项\n\n在 `安全性` 标题下，`欺诈警告`、`JavaScript`\
  \ 和 `拦截弹出式窗口` 选项默认应为 `开启` 状态。你可以通过将任意开关滑动到 `关闭` 来修改这些设置。\n\n**注意：** 许多像 `Facebook`\
  \ 这样的流行网站要求 `JavaScript` 处于 `开启` 状态。\n\n![images](img/U1641.jpg)\n\n轻点 `接受 Cookie`\
  \ 按钮，将浏览器接受 Cookie 的能力调整为 `始终`、`永不` 或 `来自访问过的网站`。我们建议将其保留为 `来自访问过的网站`。如果设置为 `永不`，某些网站将无法正常工作。\n\
  \n![images](img/U1642.jpg)\n\n"
- "# 第 17 章\n\n## 使用邮件进行沟通\n\n在本章中，我们将探索 iPhone 上 `邮件` 应用中的电子邮件世界。你将学习如何设置多个电子邮件账户，查看各种阅读选项，打开附件，以及清理收件箱。\n\
  \n![images](img/U1701.jpg)\n\n并且，当你的电子邮件无法正常工作时，你将学习一些好的故障排查技巧，帮助你重新恢复正常运行。\n\n\
  ### 邮件入门\n\n在 iPhone 上设置电子邮件相当简单。让电子邮件运行起来最快的方法可能是在手机上直接设置你的账户。在本节中，我们将向你展示如何使用\
  \ `邮件、通讯录、日历` 账户设置屏幕。你也可以使用电脑上 `iTunes` 应用中的一个屏幕来复制这些账户设置。要让电子邮件运行起来，你需要一个网络连接。\n\
  \n#### 需要网络连接\n\n移动电子邮件在当今无疑十分流行。即使没有网络连接，你也可以查看、阅读和编写已同步到 iPhone 上的电子邮件的回复；但是，你需要网络连接（无论是\
  \ Wi-Fi 还是 3G/蜂窝网络）才能从 iPhone 发送和/或接收电子邮件。请查看第 4 章：“连接到网络”了解更多信息。同时，请参阅第 1 部分快速入门指南中的“阅读顶部连接状态图标”部分。\n\
  \n**提示：** 如果你正在旅行，请在登机前简单下载所有电子邮件；这可以让你在离线状态下阅读、回复和编写邮件。所有电子邮件将在你着陆并重新建立互联网连接后发送。\n\
  \n### 在 iPhone 上设置电子邮件\n\n正如刚才提到的，你可以在 iPhone 上用两种选项来设置你的电子邮件账户：\n\n1.  在 iPhone\
  \ 上直接设置你的电子邮件账户。\n2.  使用 `iTunes` 同步电子邮件账户设置。\n\n第一个选项，即在 iPhone 上直接设置你的电子邮件账户，如果你希望在\
  \ iPhone 上进行特殊设置，例如通过 `Exchange` 使用 `Gmail`，那么它是最佳选择。如果你在 Windows 或 Mac 电脑上不使用电子邮件程序，这也是一个好方法。\n\
  \n如果你已经在 Windows 或 Mac 电脑上设置了大量 POP3 或 IMAP 账户，你也可以选择通过 USB 底座连接线，借助 `iTunes` 将它们同步过来。\n\
  \n#### 输入电子邮件账户密码\n\n在第 3 章中，我们向你展示了如何将你的电子邮件账户设置同步到 iPhone。同步完成后，你应该能够通过打开 `设置`\
  \ 应用来查看 iPhone 上的所有电子邮件账户。你只需要输入每个账户的密码。\n\n要为每个同步的电子邮件账户输入密码，请按照以下步骤操作：\n\n1. \
  \ 轻点 `设置` 图标。\n2.  轻点 `邮件、通讯录、日历` 选项。\n3.  在 `账户` 下，你应该会看到所有已同步的电子邮件账户列表。\n4.  轻点任意列出的电子邮件账户，输入其密码，然后点击\
  \ `完成`。\n5.  如果所有信息输入正确，将会出现复选标记，并且你的账户将被启用。\n6.  对所有列出的电子邮件账户重复上述操作。\n\n#### 在\
  \ iPhone 上添加新电子邮件账户\n\n要在 iPhone 上添加新电子邮件账户，请按照以下步骤操作：\n\n1.  轻点 `设置` 图标。\n2.  轻点\
  \ `邮件、通讯录、日历` 选项。\n3.  轻点你电子邮件账户下方的 `添加账户`。\n\n   如果你没有设置任何账户，你将只会看到 `添加账户` 选项。\n\
  \n   **提示：** 要编辑任何电子邮件账户，只需轻触该账户。\n\n   ![images](img/U1702.jpg)\n\n4.  在此屏幕上选择要添加的电子邮件账户类型：\n\
  \   - 如果你使用 iCloud 服务，请选择 `iCloud`。\n   - 如果你使用 Microsoft Exchange 电子邮件服务器，请选择 `Microsoft\
  \ Exchange`。\n   - 如果你使用 `Google 日历` 和 `Google 通讯录` 来存储个人信息，并且希望将它们无线同步到 iPhone，你也应该选择\
  \ `Microsoft Exchange`。\n\n     **注意：** 我们在第 3 章：“与 iCloud、iTunes 等同步”中向你展示了如何设置\
  \ Google/Microsoft Exchange 和 iCloud。\n\n   - 如果你使用 Google 电子邮件，但*不*（或*不想*）将电子邮件与你的\
  \ `Google 通讯录` 进行无线同步，请选择 `Gmail`。\n\n     ![images](img/U1703.jpg)\n\n   - 如果你使用\
  \ `Yahoo!`、`AOL` 或 `Windows Live Hotmail` 服务，请选择它们。\n   - 如果以上都不适用，并且你想要同步一个标准的\
  \ POP 或 IMAP 电子邮件账户，请选择 `其他`。最后，在下一个屏幕中选择 `添加邮件账户`。\n\n5.  在 `名称` 字段中，输入你希望收件人在收到你的邮件时看到的姓名。\n\
  6.  接下来，在 `地址`、`密码` 和 `描述` 字段中输入相应的信息。\n7.  轻点右上角的 `下一步` 按钮。\n\n![images](img/U1704.jpg)\n\
  \n\n\n### 指定接收和发送服务器\n\n有时，iPhone 可能无法自动设置你的电子邮件账户。在这种情况下，你需要手动输入更多设置才能启用你的电子邮件账户。\n\
  \n**提示：** 你可以通过在网上搜索你的电子邮件提供商名称和电子邮件设置来找到相应的设置。\n\n如果 iPhone 仅凭你的电子邮件地址和密码无法登录你的服务器，那么你将看到一个类似于此的屏幕。\n\
  \n在**接收邮件服务器**下，在**主机名**、**用户名**和**密码**字段中键入相应的信息。通常，你的接收邮件服务器类似于 `mail.*你的网络服务商名称*.com`。\n\
  \n要调整你的发送服务器名称，请轻点**发送邮件服务器**。你可以在接下来的屏幕上调整发送邮件服务器。这些服务器名称通常看起来像 `smtp.*你的网络服务商名称*.com`\
  \ 或 `mail.*你的网络服务商名称*.com`。\n\n你可以尝试将**服务器名称**和**密码**字段留空。如果这不起作用，你随时可以返回并更改它们。\n\
  \n![images](img/U1705.jpg)\n\n系统可能会询问你是否要使用 SSL（安全套接层），这是一种发送邮件的安全措施，你的电子邮件提供商可能会要求使用。如果你不确定是否需要\
  \ SSL，请与你的电子邮件提供商核对邮件设置。\n\n**提示：** 作者建议你尽可能使用 SSL 安全协议。如果你不使用 SSL，你的登录凭据、邮件以及任何私人信息都将以明文形式发送（未加密），这会让他们容易受到窥探。\n\
  \n### 验证你的账户是否已设置完成\n\n输入所有信息后，iPhone 将尝试配置你的电子邮件账户。你可能会收到一条错误消息；如果发生这种情况，你需要检查你输入的信息。\n\
  \n![images](img/U1706.jpg)\n\n如果你进入了显示所有电子邮件账户的屏幕，请查找新账户的名称。\n\n如果你看到了它，说明你的账户已设置成功。\n\
  \n![images](img/U1707.jpg)\n\n### 修复无法获取邮件错误\n\n如果你轻点**邮件**图标，并收到一条显示“无法获取邮件——未提供\
  \ *(你的账户)* 的密码”的错误，则需要输入你的密码。\n\n有关此问题的帮助，请参阅本章的“为从 iTunes 同步的电子邮件账户输入密码”部分。\n\n\
  ![images](img/U1708.jpg)\n\n## 邮箱屏幕——收件箱和账户\n\n顶层屏幕是你的**邮箱**屏幕。你总是可以通过轻点左上角的按钮进入该屏幕。继续轻点这个左上角的按钮，直到看不到更多按钮。当这种情况发生时，你就处在**邮箱**屏幕中。\n\
  \n从**邮箱**屏幕，你可以访问以下项目：\n\n*   **统一收件箱：** 通过轻点**所有收件箱**来访问。\n*   **每个单独账户的收件箱：**\
  \ 通过轻点**收件箱**部分中该电子邮件账户的名称来访问。\n\n    ![images](img/U1709.jpg)\n\n*   **账户部分中每个电子邮件账户的文件夹：**\
  \ 通过轻点账户名称来查看所有文件夹以访问这些文件夹。\n\n    ![images](img/U1710.jpg)\n\n## 添加或编辑电子邮件文件夹或邮箱\n\
  \n借助 iOS 5，如果你使用的是 iCloud 同步邮件账户，或者你的邮件服务器支持此功能，你现在可以直接在 iPhone 上添加或编辑电子邮件文件夹。例如，你可能想要更改邮件文件夹名称或添加新邮件文件夹，以便更好地组织你的邮件收件箱。一个例子是创建一个名为“需要关注”的新文件夹，并将所有你当前无法处理，但需要确保稍后回到办公桌前处理的电子邮件放入其中。要在你的设备上添加或编辑邮箱，请按照以下步骤操作：\n\
  \n1.  在**邮箱**屏幕上，向下滚动并轻点“账户”下列出的任意电子邮件账户。\n\n    ![images](img/U1711.jpg)\n\n2.\
  \  在此示例中，我们将编辑 iCloud 账户邮箱。在此屏幕上，轻点右上角的**编辑**。\n\n    ![images](img/U1712.jpg)\n\
  \n3.  然后，你可以执行以下操作：\n\n    *   轻点底部的**新建邮箱**以创建一个新邮箱。\n    *   轻点任意邮箱文件夹以编辑其名称或将其删除。\n\
  \n    ![images](img/U1713.jpg)\n\n## 收件箱中的已标记邮件和主题相关邮件\n\n你会注意到，所有未读邮件在邮件左侧都会有一个蓝色圆点\
  \ ![images](img/U1715.jpg) 作为标记。\n\n你还会注意到，某些邮件在右侧会显示一个数字和一个指向右方的箭头 (>)，如下所示：![images](img/U1716.jpg)。这表示该邮件具有三条相关的邮件（回复和转发）。\n\
  \n![images](img/U1714.jpg)\n\n已标记的邮件在其左侧会有一个小旗帜，如下所示：![images](img/U1717.jpg)\n\n\
  轻点任意邮件即可将其打开。只有当存在相关邮件时，它才会无法直接打开。在这种情况下，你首先会看到一个包含所有相关邮件的屏幕。轻点其中任意邮件即可打开并查看。\n\n\
  要离开**收件箱**视图，请轻点左上角的按钮。\n\n你可以通过查看左上角的按钮来判断你在查看哪个电子邮件账户：\n\n*   如果按钮显示**邮箱**，则表明你正在查看所有收件箱的汇总。\n\
  *   如果按钮显示一个账户名称，例如**iCloud** 或 **Exchange**，则表明你仅查看该账户的收件箱。\n\n### 移动、删除或标记（标记）多条邮件\n\
  \n如果你想一次移动或删除多条邮件，可以从收件箱屏幕进行操作。按照以下步骤一次删除多条邮件：\n\n1.  在查看收件箱屏幕时，轻点右上角的**编辑**按钮。\n\
  2.  轻点以选择所需的邮件；邮件旁边的红色**勾选标记**图标表示它已被选中。\n3.  要删除邮件，请轻点底部的**删除**按钮。\n4.  要将邮件移动到其他文件夹，请轻点**移动**按钮并选择文件夹。\n\
  5.  要标记邮件为已标记或未读，请轻点**标记**按钮。“未读”将在邮件旁边重新放回蓝色圆点。如果你标记了一封邮件，你会看到其旁边出现一个小旗帜，如下所示：![images](img/U1719.jpg)\n\
  \n    ![images](img/U1718.jpg)\n\n## 查看单条邮件\n\n当你从**收件箱**屏幕轻点一封邮件时，你会看到**主要**邮件视图。你可以在竖屏和横屏模式下查看邮件，请参见图\
  \ 17-1。竖屏模式通常会显示更多文本。横屏模式通常会让你享受更大的文字和图片。\n\n![images](img/1701.jpg)\n\n**图 17-1.**\
  \ *在竖屏和横屏模式下查看电子邮件。*\n\n**提示：** 如果你将 iPhone 放在桌子上或放在膝盖上拿着使用，你可能希望使用**竖屏锁定**图标将视图锁定在竖屏模式。这将防止图像不必要地翻转。要锁定视图，请按照以下步骤操作：\n\
  \n1.  双击**主屏幕**按钮并向左向右滑动。\n2.  轻点**竖屏锁定**按钮以将屏幕锁定在竖屏模式。\n\n### 编写和发送电子邮件\n\n要启动电子邮件程序，请轻点**主屏幕**上的**邮件**图标。\n\
  \n**提示：** 如果你在查看某封特定邮件、文件夹列表或某个账户时退出了**邮件**应用，那么当你返回**邮件**应用时，将直接返回到同一位置。\n\n如果你是第一次进入电子邮件，你可能会看到空的收件箱。轻点窗口左下角的**刷新**按钮\
  \ ![images](img/U1720.jpg) 以检索最新电子邮件。iPhone 将开始检查新邮件，然后显示每个账户的新邮件数量。\n\n\n\n###\
  \ 撰写新邮件\n\n启动`Mail`程序后，首先看到的是`账户`界面。在屏幕右下角，您会看到`撰写`图标。点击`撰写`图标即可开始创建新邮件。\n\n![images](img/U1721.jpg)\n\
  \n## 填写收件人——选择收件人\n\n您有几种选择收件人的方式，具体取决于该联系人是否在您 iPhone 的`通讯录`中：\n\n**选项 1**：输入某人名字的前几个字母；按下`空格`键，然后输入该人姓氏的前几个字母。该人的姓名应出现在列表中；点击该姓名即可选择该联系人。\n\
  \n![images](img/U1722.jpg)\n\n**选项 2**：输入电子邮件地址。请注意屏幕底部的`@`和`句号`(`.`)键，它们可以帮助您输入。\n\
  \n**提示：** 长按`句号`键可查看 `.com`、`.edu`、`.org` 及其他电子邮件域名后缀。\n\n![images](img/U1723.jpg)\n\
  \n**选项 3**：点击`加号` (`+`) ![images](img/U1724.jpg) 查看整个`通讯录`列表，并从中搜索或选择一个姓名。\n\n如果您想使用不同的联系人分组，请点击左上角的`群组`按钮。\n\
  \n双击屏幕顶部的`通讯录`可查看`搜索`窗口。接着，输入几个字母来搜索您的联系人。\n\n![images](img/U1725.jpg)\n\n### 删除收件人\n\
  \n如果需要从收件人列表（`收件人:`、`抄送:` 或 `密送:`）中删除某个姓名，请点击该姓名以选中它 ![images](img/U1726.jpg)，然后按下`退格`键。![images](img/U1727.jpg)\n\
  \n**提示：** 如果您想删除最后输入的收件人（且光标位于该姓名旁），先按一次`删除`键高亮该姓名，再按一次即可将其删除。\n\n### 添加抄送或密送收件人\n\
  \n![images](img/U1728.jpg) 要添加抄送 (`Cc:`) 或密送 (`Bcc:`) 收件人，需点击邮件顶部`收件人:`字段正下方的`抄送:`或`密送:`字段。点击后，该字段将会展开。\n\
  \n![images](img/U1729.jpg)\n\n### 移动收件人\n\n如果您最初将某收件人添加到`收件人:`字段，但改变主意，希望将其移至`抄送:`或`密送:`字段（反之亦然），只需长按该收件人姓名，然后将其拖拽到目标字段即可。\n\
  \n![images](img/U1730.jpg)\n\n## 更换发送邮件的账户\n\n如果您设置了多个电子邮件账户，iPhone 将使用设置为默认账户的账户发信（此项设置在`设置`\
  \ > `邮件、通讯录、日历` > `默认账户`，位于`邮件`部分底部）。\n\n按以下步骤更换发送邮件的账户：\n\n1.  点击邮件的`发件人:`字段以将其高亮。\n\
  2.  再次点击`发件人:`字段，屏幕底部会以滚轮形式显示您的账户列表。\n3.  上下滚动，然后点击选择一个新的电子邮件账户。\n4.  点击`主题`字段，完成发件地址的更改。\n\
  \n    ![images](img/U1731.jpg)\n\n## 输入主题\n\n现在您需要为邮件输入主题。请按以下步骤操作：\n\n1.  点击`主题:`行，并为邮件的`主题:`字段输入文本。\n\
  2.  按下`回车`键，或点击邮件的`正文`区域，将光标移至`正文`部分。\n\n    ![images](img/U1732.jpg)\n\n## 输入邮件内容\n\
  \n现在光标位于邮件的`正文`部分（主题行下方），您可以开始输入邮件内容了。\n\n**注意：** 您的 iPhone 上只有一个邮件签名，它会自动应用到您从\
  \ iPhone 发出的每一封邮件——即使您设置了多个电子邮件账户。因此，如果您同时经营两家不同的企业，或不希望您的个人邮件签名发送给所有商务联系人，请务必谨慎。最好将邮件签名设置得较为通用。\n\
  \n### 格式化文字、定义词语、引用文本等\n\n您可以点击任意文本以将其选中，并使用蓝色手柄扩大选择范围。然后通过选中文本上方弹出的菜单，执行以下任何操作：\n\
  \n![images](img/U1733.jpg)\n\n-   点击`剪切`、`复制`或`粘贴`执行相应功能。\n-   如果单词带有下划线且您想修正拼写，请点击`建议`。\n\
  -   点击右侧边缘的三角形可查看更多选项。\n-   点击`B / U`可将格式调整为`粗体`、`斜体`或`下划线`。\n\n    ![images](img/U1734.jpg)\n\
  \n-   点击`定义`可在字典中查询所选单词。\n-   点击`朗读`可听取该单词的发音。\n-   点击`引用级别`可增加或减少所选文本的引用级别。\n\n\
  \    ![images](img/U1735.jpg)\n\n### 邮件签名\n\n默认的邮件签名如右图所示：`发自 iPhone`。\n\n**提示：**\
  \ 您可以将此签名更改为您想要的任何内容；请参阅本章后面“更改您的电子邮件签名”部分，了解如何更改您的电子邮件签名。\n\n## 键盘选项\n\n输入时，请记住您有两种键盘选项：较小的`竖屏`（纵向）键盘和较大的`横屏`（横向）键盘，请参阅图\
  \ 17–2。\n\n![images](img/1702.jpg)\n\n**图 17–2.** *将设备侧向旋转，即可使用更大的横屏键盘。*\n\n**提示：**\
  \ 如果您手比较大，使用更大的键盘输入可能会更轻松。一旦您习惯用双手在大键盘上输入，就会发现它比单指输入快得多。更多输入技巧，请参阅第 2 章：“输入、拷贝与搜索”。\n\
  \n## 自动更正与自动大写\n\n输入时，您会注意到有些单词会自动大写并被自动更正。拼写检查器会将带有红色下划线的单词标记为拼写错误。请参阅第 2 章：“输入、拷贝与搜索”了解所有这些功能的工作方式；本章还提供了一些额外的输入技巧。\n\
  \n## 发送邮件\n\n输入完邮件后，点击右上角的蓝色`发送`按钮。\n\n您的邮件将会被发送，并且您应该会听到 iPhone 的邮件发送提示音，这确认您的邮件已发送。您可以在第\
  \ 9 章：“个性化与安全”中的“调整 iPhone 声音”部分了解如何启用或禁用此声音。\n\n![images](img/U1736.jpg)\n\n###\
  \ 保存为草稿以便稍后发送\n\n如果您尚未准备好发送邮件，但想将其保存为草稿以便稍后发送，请按以下步骤操作：\n\n1.  按照前述方法撰写邮件。\n2. \
  \ 按下左上角的`取消`按钮。\n3.  选择屏幕底部的`保存草稿`按钮。\n\n    ![images](img/U1737.jpg)\n\n稍后，当您想找到并发送草稿邮件时，请按以下步骤操作：\n\
  \n1.  在您撰写此邮件的电子邮件账户中打开`草稿`文件夹。如需帮助进入`草稿`文件夹，请参阅本章前面的“在邮件文件夹中移动”部分。\n2.  点击`草稿`文件夹中的邮件以将其打开。\n\
  3.  点击邮件中的任意位置进行编辑。\n4.  点击`发送`按钮。\n\n\n\n### 检查已发送的邮件\n\n按以下步骤确认邮件是否已正确发送：\n\n\
  1.  点击左上角的**电子邮箱账号名称**按钮，查看您刚刚用来发送邮件的账号下的邮件文件夹。\n2.  点击`已发送`文件夹。\n3.  确认您在列表中看到的第一封邮件就是您刚刚撰写并发送的那一封。\n\
  \n    ![图片](img/U1738.jpg)\n\n**注：** 只有当您在 iPhone 上确实从该账号发送或删除了邮件后，才会看到`已发送`和`废纸篓`文件夹。如果您的邮箱账号是\
  \ IMAP 账号，您可能会看到比本章所述更多的文件夹。\n\n### 阅读与回复邮件\n\n按以下步骤阅读您的邮件：\n\n1.  使用本章前面描述的步骤，导航至您要查看的邮箱账号的收件箱。\n\
  2.  要阅读任意邮件，只需在收件箱中点击它。\n3.  新的、未读的邮件会在邮件左侧显示一个小蓝点。\n4.  在收件箱中向上或向下滑动手指，可以滚动浏览您的邮件。\n\
  5.  阅读邮件时，向上或向下滑动即可滚动查看。\n\n    ![图片](img/U1739.jpg)\n\n#### 将邮件标记为未读或加注旗标\n\n如果您阅读了一封邮件但希望确保稍后能快速找到它，您可以选择将其标记为`未读`或加注`旗标`，以便日后引起您的注意。\n\
  \n按以下步骤`标记`一封邮件：\n\n1.  点击位于时间和日期右侧的`标记`字样。\n2.  从弹出的菜单中选择`旗标`或`标记为未读`。\n\n    ![图片](img/U1740.jpg)\n\
  \n被`标记`旗标的邮件会在`标记`文字的左侧显示一个红色小`旗标`图标。被`标记为未读`的邮件会在`标记`文字的右侧显示一个小蓝点。\n\n要`取消标记`一封邮件：\n\
  \n1.  点击位于时间和日期右侧的`标记`字样。\n2.  从弹出的菜单中选择`取消旗标`或`标记为已读`。\n\n    ![图片](img/U1741.jpg)\n\
  \n#### 放大或缩小\n\n与浏览网页时一样，您可以放大以查看更大字体的邮件。您也可以像在网页上那样双击；还可以使用`双指捏合`来放大或缩小（有关这些功能的更多信息，请参阅本书第\
  \ 1 部分快速入门指南中的“缩放”章节）。\n\n### 电子邮件附件\n\n某些电子邮件附件会被 iPhone 自动打开，因此您甚至可能没有注意到它们是附件。例如，Adobe\
  \ 的可移植文档格式（PDF）文件（由`Adobe Acrobat`和`Adobe Reader`等应用使用）以及某些类型的图像、视频和音频文件。您也可能会收到文档附件，例如\
  \ Apple 的`Pages`、`Numbers`和`Keynote`文件；或 Microsoft 的`Word`、`Excel`和`PowerPoint`文件。这些文件需要您手动打开。\n\
  \n#### 识别何时有附件\n\n任何带有附件的电子邮件都会在发件人姓名旁边显示一个`回形针`图标，如右图所示。当您看到该图标时，即表示有附件。\n\n![图片](img/U1742.jpg)\n\
  \n#### 接收自动打开的附件\n\n某些类型的电子邮件附件，如图片、Quicktime 影片和单页 PDF 文件，通常会直接在邮件正文中为您打开并显示。\n\
  \n（但是，如果您使用 3G 数据连接，则需要点击它们才能下载并显示。）\n\n![图片](img/U1743.jpg)\n\n**提示：** 如果您想保存或复制自动打开的附件，只需长按它，直到出现弹出窗口。此时，您可以选择`拷贝`或`存储图像`。当您存储图像后，它会被放入`照片`应用的`相机胶卷`相簿中。\n\
  \n#### 手动打开电子邮件附件\n\n与我们刚才描述的会自动在邮件正文中打开的附件不同，其他类型的附件（如电子表格、文字处理文档和演示文稿文件）需要您手动打开。\n\
  \n##### 轻点以进入快速查看模式\n\n按以下步骤在快速查看模式下打开附件：\n\n1.  打开带有附件的邮件，如图 17-3 所示。\n2.  快速轻点附件，即可立即在快速查看模式中打开它。\n\
  3.  您可以在文档中导航。请记住，您可以放大或缩小，以及向上或向下滑动。\n4.  如果您打开了一个包含多个工作表或表格的电子表格，您会在顶部看到工作表标签。点击另一个标签即可打开该工作表。\n\
  5.  查看完附件后，轻点文档一次以调出控制项，然后点击左上角的`完成`。\n6.  如果您安装了可以打开当前查看附件类型（本例中为电子表格）的应用，您会在右上角看到一个`在...中打开`按钮。点击`在...中打开`按钮可在其他应用中打开此文件。\n\
  \n![图片](img/1703.jpg)\n\n**图 17-3.** *在快速查看模式下查看电子邮件附件。*\n\n##### 在其他应用中打开文档\n\n\
  您可能希望在其他应用中打开附件。例如，您可能想在`Numbers`中打开电子表格，在`iBooks`、`Stanza`或`GoodReader`中打开 PDF\
  \ 文件。按以下步骤操作：\n\n1.  打开邮件。\n2.  长按附件，直到出现弹出窗口。\n3.  选择`在...中打开`或`在\"Numbers\"中打开`选项。当附件格式与您设备上的应用匹配时，您可能会在`在...中打开`后面看到列出的特定应用，如本例中的`Numbers`。\n\
  \n    ![图片](img/U1744.jpg)\n\n4.  从列表中选择您要使用的应用程序。\n5.  最后，您可以编辑文档、保存它，并通过邮件将其回复给发件人。\n\
  \n    ![图片](img/U1745.jpg)\n\n##### 查看视频附件\n\n您可能会收到带有视频附件的电子邮件。某些类型的视频可以在您的 iPhone\
  \ 上查看（有关支持格式的列表，请参阅本章后面的“支持的电子邮件附件类型”章节）。按以下步骤打开视频附件：\n\n1.  点击视频附件以在视频播放器中打开并观看它。\n\
  2.  观看完视频后，轻点屏幕以调出播放器控制项。\n3.  点击左上角的`完成`按钮以返回邮件。\n\n    ![图片](img/U1746.jpg)\n\n\
  **注：** 这是一张来自本书作者之一 Martin Trautschold 的视频教程的图片，该教程向您展示如何使用 iPhone。请在 Martin 的网站\
  \ [`www.madesimplelearning.com`](http://www.madesimplelearning.com) 上查看一些免费的示例教程。\n\
  \n\n\n### 打开和查看压缩的 .zip 文件\n\n除非您安装诸如 `GoodReader` 之类的应用，否则您的 iPhone 将无法打开和查看 `.zip`\
  \ 格式的压缩文件。在撰写本文时，`GoodReader` 仍是一款免费应用，非常值得安装。\n\n**提示：** 了解如何在第 14 章：“书报亭和更多”中安装和使用\
  \ `GoodReader`。\n\n请按照以下步骤在程序中打开 `.zip` 文件：\n\n1. 从 App Store 安装免费的 `GoodReader`\
  \ 应用。\n2. 打开带有 `.zip` 文件附件的电子邮件。\n3. 长按 `.zip` 附件，直到底部出现一个弹出窗口，其中包含一个显示为 `在“GoodReader”中打开`\
  \ 的按钮。点击该按钮即可在 `GoodReader` 中打开 `.zip` 文件。\n\n   ![images](img/U1747.jpg)\n\n4.\
  \ 现在应打开 `GoodReader`，您的 `.zip` 文件应位于文件列表顶部。要打开或解压缩 `.zip` 文件，请点击它并选择 `解压` 按钮。\n\n\
  \   ![images](img/U1748.jpg)\n\n5. 现在您应该看到解压后的文件——本例中是一个 Adobe `.pdf` 文件，位于 `.zip`\
  \ 文件上方的文件列表中。\n6. 点击该解压后的文件即可查看它。\n\n   ![images](img/U1749.jpg)\n\n7. 阅读完附件后，双击您的\
  \ `主屏幕` 按钮并点击 `邮件` 图标即可返回到阅读邮件。\n\n## 支持的电子邮件附件类型\n\n您的 iPhone 支持以下文件类型作为附件：\n\n\
  *   `.doc` 和 `.docx`（`Microsoft Word` 文档）\n*   `.htm` 和 `.html`（网页）\n*   `.key`（`Keynote`\
  \ 演示文稿文档）\n*   `.numbers`（`Apple Numbers` 电子表格文档）\n*   `.pages`（`Apple Pages` 文档）\n\
  *   `.pdf`（Adobe 的便携式文档格式，用于 `Adobe Acrobat` 和 `Adobe Reader` 等程序）\n*   `.ppt` 和\
  \ `.pptx`（`Microsoft PowerPoint` 演示文稿文档）\n*   `.txt`（文本文件）\n*   `.vcf`（联系人文件）\n\
  *   `.xls` 和 `.xlsx`（`Microsoft Excel` 电子表格文档）\n*   `.mp3` 和 `.mov`（音频和视频格式）\n*\
  \   `.zip`（压缩文件）：只有安装了可以读取它们的应用（例如 `GoodReader`）才能读取——请参阅本章前面的“打开和查看压缩的 .zip 文件”部分。\n\
  \n### 回复、转发或删除邮件\n\n在您的电子邮件阅读窗格底部有一个工具栏。\n\n通过此工具栏，您可以将邮件移动到不同邮箱或文件夹；删除它；或进行回复、全部回复或转发。\n\
  \n![images](img/U1750.jpg)\n\n点击小的 `箭头` 图标 ![images](img/U1751.jpg) 即可看到这些选项按钮出现：`回复`、`全部回复`\
  \ 和 `转发`。\n\n**注意：** 仅当电子邮件有多个收件人时，才会显示 `全部回复` 按钮。\n\n![images](img/U1752.jpg)\n\
  \n## 回复电子邮件\n\n您可能最常使用 `回复` 命令。请按照以下步骤在您的 iPhone 上回复电子邮件：\n\n1. 点击 `回复` 按钮。\n\n\
  \   您会看到原始发件人现在被列为电子邮件 `收件人：` 行中的收件人。主题将自动显示为：“回复：(原始主题行)”。\n\n2. 输入您的回复。\n3. 完成后，只需点击屏幕右上角的蓝色\
  \ `发送` 按钮。\n\n   ![images](img/U1753.jpg)\n\n## 使用全部回复\n\n使用 `全部回复` 选项与使用 `回复` 功能类似，不同之处在于原始邮件的所有收件人和原始发件人都被填入地址行。原始发件人将位于\
  \ `收件人：` 行，而原始邮件的所有其他收件人将列在 `抄送：` 行。只有当原始邮件有多个收件人时，您才会看到 `全部回复` 选项。\n\n**警告：** 使用\
  \ `全部回复` 时要小心。如果某些收件人因为超出屏幕边缘而未显示在原始邮件中，这可能会很危险。如果您确实使用了 `全部回复`，请务必检查 `收件人：` 和 `抄送：`\
  \ 列表，以确保所有人都应接收您的回复。\n\n## 使用转发按钮\n\n有时，您会收到想要发送给其他人的电子邮件。`转发` 命令可让您实现此操作（更多关于处理附件的内容，请参阅本章的“电子邮件附件”部分）。\n\
  \n**注意：** 您需要转发附件才能将它们发送给其他人。如果您想将收到的电子邮件中的附件发送给某人，则必须选择 `转发` 选项。（请注意，选择 `回复` 和\
  \ `全部回复` 选项不会在您外发的邮件中包含原始电子邮件附件。）\n\n当您点击 `转发` 按钮时，可能会提示您选择是否 `包含或不包含` 原始邮件中的附件。\n\
  \n此时，您按照之前描述的相同步骤输入您的消息、添加收件人并发送。\n\n### 清理和整理您的收件箱\n\n当您越来越习惯将 iPhone 作为电子邮件设备使用时，您会发现自己越来越多地使用\
  \ `邮件` 程序。最终，偶尔进行一些电子邮件清理工作将变得必要。您可以轻松地在 iPhone 上删除或移动电子邮件。\n\n## 删除单封邮件\n\n要从收件箱中删除单封邮件，请按以下步骤操作：\n\
  \n1. 在收件箱中向左或向右滑动一封邮件，调出 `删除` 按钮。\n2. 点击 `删除` 即可移除该邮件。\n\n   ![images](img/U1754.jpg)\n\
  \n## 删除、移动或标记多封邮件\n\n我们之前在本章的“移动、删除或标记（旗帜）多封邮件”部分向您展示了如何完成此操作。\n\n## 从邮件查看屏幕删除\n\
  \n`邮件` 查看屏幕提供了另一种删除邮件的方式。打开任意邮件进行阅读，然后点击屏幕底部中央的 `垃圾桶` 图标 ![images](img/U1755.jpg)。您会看到邮件缩小并飞入\
  \ `垃圾桶` 中，从而被删除。\n\n**提示：** 您可以使用 `设置` 应用让您的 iPhone 在删除邮件前询问您。为此，请点击 `邮件、通讯录、日历`，然后将\
  \ `删除前询问` 旁边的开关设置为 `打开`。\n\n您可以通过将邮件移动到其他文件夹来整理邮件。可以将电子邮件从收件箱移出以便存储或稍后阅读。\n\n**注意：**\
  \ 如果您使用的是 iCloud 或其他受支持的电子邮件服务器，您可以直接在设备上创建、重命名或删除邮件文件夹，请参阅本章前面的“添加或编辑电子邮件文件夹或邮箱”部分。如果这对您无效，那么您需要在您的主电子邮件帐户中设置它们，并将其同步到您的\
  \ iPhone。我们将在本章的“微调您的电子邮件设置”部分向您展示如何执行此操作。\n\n## 在查看邮件时将其移至文件夹\n\n有时，您可能希望整理电子邮件以便日后轻松检索。例如，您可能会收到一封有关即将到来的旅行的电子邮件，并希望将其移动到“旅行”文件夹。有时您会收到需要稍后处理的电子邮件，在这种情况下，您可以将它们移动到“需要关注”文件夹。这可以帮助您记住稍后处理此类邮件。\n\
  \n请按照以下步骤移动电子邮件：\n\n1. 打开该电子邮件。\n2. 点击右上角的 `移动` 图标。\n3. 选择一个新文件夹，该邮件将从当前收件箱中移出。\n\
  \n   ![images](img/U1756.jpg)\n\n\n\n### 从电子邮件中复制粘贴\n\n以下是从电子邮件中选择文本或图片并复制的一些技巧：\n\
  \n- 双击文本选中一个单词，然后上下拖动蓝色手柄调整选择范围。接着选择 `Copy`。\n\n  ![图片](img/U1757.jpg)\n\n- 长按文本，然后选择\
  \ `Select` 或 `Select All`。\n\n  ![图片](img/U1758.jpg)\n\n- 长按图片，然后选择 `Save Image`\
  \ 或 `Copy`。\n\n  ![图片](img/U1759.jpg)\n\n如需更完整的说明，请查阅第 2 章：“打字、复制与搜索”中的“复制和粘贴”部分。\n\
  \n### 搜索电子邮件\n\niPhone 内置了强大的搜索功能，可以帮助您查找电子邮件。您可以按 `From:`、`To:`、`Subject` 或 `All`\
  \ 字段搜索收件箱。这有助于筛选收件箱，从而精确找到您想要的内容。\n\n#### 激活电子邮件搜索\n\n启动电子邮件搜索非常简单。首先，导航至您要搜索的账户的\
  \ `inbox`。如果向上滚动到顶部，您会在 `inbox` 顶部看到熟悉的 `Search` 栏。\n\n如果您的电子邮件账户支持此功能，您还可以在服务器上搜索电子邮件。在撰写本文时，支持搜索的电子邮件账户类型包括\
  \ `Exchange`、iCloud（原名 `Mobile Me`）和 `Gmail IMAP`。请按照以下步骤在服务器上搜索电子邮件：\n\n1.  `Tap`（轻点）`Search`\
  \ 栏，在 `Search` 栏下方会显示一个新的软键菜单。\n2.  输入您要搜索的文本。\n3.  `Tap one of the tabs`（轻点搜索窗口下的其中一个标签）：\n\
  \n    - `From`：仅搜索发件人的电子邮件地址。\n    - `To`：仅搜索收件人的电子邮件地址。\n    - `Subject`：仅搜索邮件`Subject`（主题）字段。\n\
  \    - `All`：搜索邮件的所有部分。\n\n    ![图片](img/U1760.jpg)\n\n例如，假设我们想在收件箱中搜索来自“Martin”的电子邮件。我们可以在\
  \ `Search` 框中输入 Martin 的名字，然后轻点 `From`。收件箱将被筛选，只显示来自 Martin 的电子邮件。\n\n### 精细调整电子邮件设置\n\
  \n您可以通过`设置`应用中的众多选项来精细调整 iPhone 上的电子邮件账户。请按照以下步骤更改这些设置：轻点`设置`图标，然后轻点`邮件、通讯录、日历`。后续部分将解释您可以进行的调整。\n\
  \n#### 自动检索电子邮件（获取新数据）\n\n除了`高级`选项外，您还可以使用`邮件`设置来配置电子邮件获取或拉取到 iPhone 的频率。默认情况下，当服务器“推送”时，您的\
  \ iPhone 会自动接收邮件或其他联系人或日历更新。\n\n您可以通过以下步骤调整此设置：\n\n1.  轻点`设置`应用。\n2.  轻点`邮件、通讯录、日历`。\n\
  3.  在列出的电子邮件账户下轻点`获取新数据`。\n\n    ![图片](img/U1761.jpg)\n\n4.  将`推送`设为`开启`（默认）以自动让服务器推送数据。将其设为`关闭`以节省电池电量。\n\
  5.  调整从服务器拉取数据的时间计划。这决定了应用从服务器拉取新数据的频率。\n\n    **注意：** 如果将此选项设置为`每 15 分钟`，您将更频繁地收到更新；然而，与设置为`每小时`或`手动`相比，此选项会牺牲电池续航。\n\
  \n    ![图片](img/U1762.jpg)\n\n如果您只想打开 iPhone 就能看到有新消息，自动检索功能非常方便；否则，您需要记得手动检查。\n\
  \n##### 高级推送选项\n\n在`获取新数据`屏幕底部，`每小时`和`手动`设置下方，您可以轻点`高级`按钮，查看列出了所有电子邮件账户的新屏幕。\n\n\
  轻点任意电子邮件账户以调整其设置。\n\n![图片](img/U1763.jpg)\n\n大多数账户可以按您设置的时间表进行`获取`或设置为`手动`。`手动`选项要求您使用`更新`按钮来检索数据。此屏幕让您能够为已设置的每个账户调整`获取`、`手动`甚至`推送`设置。\n\
  \n![图片](img/U1764.jpg)\n\n#### 调整邮件设置\n\n在`账户`部分下方，您可以在`邮件`下看到所有电子邮件设置。`默认`设置可能对您来说效果不错；但如果您需要调整其中任何一项，可以按照以下步骤操作：\n\
  \n**显示**：这设定了从服务器拉取的邮件数量。您可以指定 50 到 1,000 条消息（默认值为 50 条最近消息）。\n\n**预览**：此选项让您设置在收件箱`预览`中除了`主题`之外显示的文本行数。您可以将此值从`无`调整为`5\
  \ 行`（默认值为`2 行`）。\n\n![图片](img/U1765.jpg)\n\n**最小字体大小**：这是首次打开邮件时显示的默认字体大小。这也是在查看邮件时允许缩放到的最小字体大小。您的选项有`小`、`中`、`大`、`特大`和`巨大`（默认值为`中`）。\n\
  \n**提示：** 您可以在设置的“辅助功能”区域进一步放大字体大小。更多详情请查看第 2 章：“打字、复制与搜索”。\n\n**显示收件人/抄送标签**：开启此选项后，您会在收件箱中的主题前看到一个小`收件人`或`抄送`标签。此标签显示您的地址位于哪个字段（此选项的默认状态为`关闭`）。\n\
  \n![图片](img/U1766.jpg)\n\n**删除前询问**：开启此选项后，每次尝试删除邮件时都会询问您（默认值为`关闭`）。\n\n**载入远程图像**：此选项允许您的\
  \ iPhone 加载某些电子邮件中包含的所有图形（远程图像）（此选项的默认值为`开启`）。\n\n![图片](img/U1767.jpg)\n\n**按主题整理**：此选项将相关电子邮件分组在一起。它只显示一条消息，并在旁边显示一个数字。该数字表示存在多少封相关邮件。此功能让您能够将所有讨论集中在一个地方（此选项的默认值为`开启`）。\n\
  \n![图片](img/U1768.jpg)\n\n**始终密送给自己**：此选项会将您从 iPhone 发送的每封电子邮件以密件抄送（`Bcc:`）方式发送到您的电子邮件账户（此选项的默认值为`关闭`）。\n\
  \n![图片](img/U1769.jpg)\n\n#### 更改电子邮件签名\n\n默认情况下，您发送的电子邮件会显示“发送自我的 iPhone”。请按照以下步骤更改电子邮件的`签名`行：\n\
  \n![图片](img/U1770.jpg)\n\n1.  轻点`签名`标签，然后在从 iPhone 发送的邮件底部输入您想要的新电子邮件签名。\n2.  编辑完`签名`字段后，轻点左上角的`邮件、通讯录…`按钮。这将返回到`邮件`设置界面。\n\
  \n    ![图片](img/U1771.jpg)\n\n#### 更改默认邮件账户（发件账户）\n\n如果您在 iPhone 上设置了多个电子邮件账户，您应将其中的一个——通常是您最常用的那个——设置为`默认账户`。当您从`邮件`界面选择`写邮件`时，默认账户总是被选中。请按照以下步骤更改默认发送邮件的电子邮件账户：\n\
  \n![图片](img/U1772.jpg)\n\n1.  轻点`默认账户`选项，您将看到所有电子邮件账户的列表。\n2.  轻点您想用作`默认账户`的电子邮件账户。\n\
  3.  操作完成后，轻点`邮件、通讯录…`按钮返回到`邮件`设置菜单。\n\n    ![图片](img/U1773.jpg)\n\n\n\n### 切换收发邮件的声音\n\
  \n每次收发邮件时，您可能会注意到一点音效。您听到的是 iPhone 上的默认设置。\n\n如果您想关闭或更改此设置，可在 `设置` 程序中进行操作：\n\n\
  1. 点击 `设置` 图标。\n2. 点击 `声音`。\n3. 您会看到多个用于开启或关闭声音效果的开关。点击 `新邮件` 和 `发送邮件` 来选取您的邮件铃声选项。\n\
  \n![images](img/U1774.jpg)\n\n## 高级邮件选项\n\n**注意：** 设置为 `Exchange`、`IMAP` 或 `iCloud`\
  \ 的电子邮件账户不会显示此 `高级` 邮件设置屏幕。此设置仅适用于 POP3 电子邮件账户。\n\n![images](img/U1775.jpg)\n\n\
  要进入每个电子邮件账户的 `高级` 选项，请按照以下步骤操作：\n\n1. 点击 `设置` 图标。\n2. 点击 `邮件、通讯录、日历`。\n3. 点击 `账户`\
  \ 下列出的一个电子邮件地址。\n4. 在邮件设置弹出窗口的底部，点击 `高级` 按钮以调出 `高级` 对话框。\n\n![images](img/U1776.jpg)\n\
  \n### 从 iPhone 上删除邮件后的移除设置\n\n您可以设置在邮件被删除后，完全从 iPhone 上移除的频率。\n\n点击 `移除` 标签，然后选择最适合您的选项；默认设置为\
  \ `永不`。\n\n![images](img/U1777.jpg)\n\n### 使用 SSL 和认证\n\n`SSL` 和 `认证` 功能之前已经讨论过；不过，此屏幕为您提供了另一个位置来为特定电子邮件账户访问这些功能。\n\
  \n### 从服务器删除\n\n您可以配置 iPhone 如何处理从邮件服务器删除邮件。通常，此设置保留为 `永不`，此功能由您的主电脑处理。但是，如果您将 iPhone\
  \ 作为主邮件设备使用，您可能希望从手机本身处理该功能。请按照以下步骤从 iPhone 上删除服务器上已删除的邮件。\n\n1. 点击 `从服务器删除` 标签，选择最符合您需求的功能：`永不`、`七天后`\
  \ 或 `从收件箱移除时`。\n2. 默认设置为 `永不`。如果您想选择 `七天后`，该选项应为您提供足够的时间在电脑和 iPhone 上检查邮件，然后决定保留和删除哪些邮件。\n\
  \n![images](img/U1778.jpg)\n\n### 更改收件服务器端口\n\n正如您之前对 `发件服务器端口` 所做的操作一样，如果您在接收邮件时遇到问题，可以更改\
  \ `收件服务器端口`。您遇到与收件端口相关问题的可能性非常小；因此，您很少需要更改此数字。如果您的电子邮件服务提供商给您提供了不同的号码，只需点击数字并输入新的端口。`收件服务器端口`\
  \ 的值通常为 `995`、`993` 或 `110`；不过，端口值也可能是其他数字。\n\n## 邮件问题故障排除\n\n通常，您的邮件在 iPhone 上运行完美。然而，有时您的邮件可能无法像您期望的那样完美运行。这可能是由于服务器问题、网络连接问题或电子邮件服务提供商的要求未得到满足所致。\n\
  \n大多数情况下，只需要调整一个简单的设置或重新输入密码。\n\n如果您尝试了一些后续的故障排除提示，但您的邮件仍然无法正常工作，那么您的邮件服务器可能只是暂时宕机。请与您的电子邮件服务提供商核实，确保您的邮件服务器正常运行；您还可以检查您的提供商是否进行了任何可能影响您设置的最新更改。\n\
  \n**提示：** 如果后续的提示未能解决问题，请查看第 26 章：“故障排除”以获取更多有用的提示和资源。\n\n### 无法接收或发送邮件\n\n如果您无法发送或接收邮件，第一步应该是确认您已连接到互联网。可通过查看\
  \ `主屏幕` 左上角的网络连接符号来确认（详见第 4 章：“连接到网络”）。\n\n有时，您需要调整发件端口才能正确发送邮件。请按照以下步骤操作：\n\n1.\
  \ 点击 `设置`。\n2. 点击 `邮件、通讯录和日历`。\n3. 在 `账户` 下，点击您在发送邮件时遇到问题的电子邮件账户。\n4. 点击 `SMTP`\
  \ 并确认您的发件服务器设置正确；同时检查其是否设置为 `开`。\n5. 点击顶部的 `发件服务器` 并确认所有设置，例如 `主机名`、`用户名`、`密码`、`SSL`、`认证`\
  \ 和 `服务器端口`。您也可以尝试将 `服务器端口` 值设为 `587`、`995` 或 `110`；有时这会有帮助。\n6. 点击 `完成`，然后点击左上角的电子邮件账户名称，返回此账户的\
  \ `邮件` 设置屏幕。\n7. 向下滚动到底部并点击 `高级`。\n8. 在此屏幕上，您也可以尝试为服务器端口设置不同的端口值，例如 `587`、`995`\
  \ 或 `110`。如果这些值不起作用，请联系您的电子邮件服务提供商以获取不同的端口号并确认您的设置。\n\n"
- '# 第 18 章


  ## 通讯录和备忘录


  您的 iPhone 让您能即时访问所有重要信息。就像您的电脑一样，您的 iPhone 可以存储数千个联系人以便轻松查找。在本章中，我们将向您展示如何添加新联系人、通过添加新字段自定义联系人、用群组整理联系人、快速搜索或滚动浏览联系人，甚至使用
  iPhone 的 `地图` 应用查看联系人的位置。我们还将向您展示如何自定义 `通讯录` 视图，使其按您喜欢的方式排序和显示。最后，我们将介绍一些故障排除提示，当您遇到困难时可以节省时间。


  我们还将向您概述 `备忘录` 应用，您可以用它来写笔记、制作购物清单、列出您想看的电影或想读的书籍。我们将向您展示如何整理备忘录，以及如何将备忘录通过电子邮件发送给自己或他人。理想情况下，我们希望
  `备忘录` 在 iPhone 上能变得如此便捷，以至于您最终可以丢弃大部分（即使不是全部）纸质便签！


  同样很棒的是，您可以使用 `iCloud` 来无线同步、共享和备份您的通讯录和备忘录。因此，您再也不用担心丢失重要信息，或担心您的设备或电脑上是否拥有最新信息。


  ### 将通讯录加载到 iPhone 上


  第 3 章：“与 iCloud、iTunes 及更多同步”介绍了如何使用 Mac 或 Windows 电脑上的 `iTunes` 应用将通讯录加载到 iPhone
  上。您也可以使用 Google Sync 或 iCloud 服务将通讯录加载到手机。


  **提示：** 您可以从收到的电子邮件中添加新的联系人条目。了解具体方法请参见第 17 章：“使用电子邮件通信。”


  ## 通讯录列表何时最有用？


  当满足以下两个条件时，`通讯录` 应用最为有用：


  1. 其中存储了大量姓名和地址。

  2. 您可以轻松找到所需信息。




  #### 优化你的通讯录


  我们有一些基本规则，可以帮助你让 iPhone 上的通讯录更有用：


  **规则 1：将任何内容都添加到通讯录中。**


  > 你永远不知道何时会需要那家不起眼的餐厅名字、水管工的电话号码等等。


  **规则 2：添加条目时，务必考虑将来如何找到它们（名字、姓氏、公司）。**


  > 我们在本章中提供了许多技巧和方法来帮助你输入姓名，以便你在需要时能立刻找到它们。


  **提示**：这里有一个查找餐厅的好方法。每当你在通讯录中添加一家餐厅时，务必在“公司”字段中输入“餐厅”这个词，即使它本身不是店名的一部分。当你输入“餐”这个字时，你就能立刻找到所有你添加的餐厅了！


  ### 在 iPhone 上添加新联系人


  你可以随时直接在 iPhone 上添加联系人。当您不在电脑旁——但带着 iPhone——又需要将某人添加到通讯录时，这非常方便。操作起来很简单；下一节将向你展示具体方法。


  ![images](img/U1801.jpg)


  #### 启动“通讯录”应用


  在主屏幕上，点击**通讯录**图标，你会看到**所有联系人**列表。点击右上角的**加号**按钮（**+**）来添加新联系人，如图 18-1 所示。


  ![images](img/1801.jpg)


  **图 18-1.** *输入新的联系人姓名*


  点击每个字段来输入新联系人的名字、姓氏和公司名称。


  **提示**：请记住，联系人搜索功能会使用名字、姓氏和公司名称。当你添加或编辑联系人时，在公司名称中添加一个特殊词语可以帮助你日后快速找到特定联系人。例如，在**公司**字段中添加“思思朋友”这个词，就可以利用搜索功能快速找到思思的所有朋友。


  在**姓名**按钮下方，有**手机**、**电子邮件**、**铃声**、**短信铃声**、**主页**、**添加新地址**和**添加字段**等字段。再往下，你可以关联联系人。


  #### 添加新电话号码


  ![images](img/U1802a.jpg)


  点击**电话**按钮，使用**数字**键盘输入电话号码。


  **提示**：不用担心括号、破折号或点号——iPhone 会自动将号码格式化为正确格式。只需输入区号和号码的数字即可。如果你知道国家代码，最好也一并输入。


  ![images](img/U1802.jpg)


  接下来，选择这个电话号码的类型——是手机、住宅、工作还是其他。有九个字段可供选择，如果觉得内置字段都不适用，还有一个**自定**字段。


  ![images](img/U1803.jpg)


  **提示**：有时你需要在电话号码中添加一个暂停——例如，当电话号码属于某个机构的人员，你需要先拨打总机号码，再拨打分机号。在 iPhone 上很容易做到。只需点击**符号**按钮（`+*#`），然后点击**暂停**或**等待**。**暂停**会在总机号码和分机号之间添加一个逗号，像这样：`386-555-7687,
  19323`。当你拨打这个号码时（例如，在你的 iPhone 上），你的手机将先拨打总机号码，暂停两秒钟，然后拨打分机号码。如果需要更长的暂停时间，只需添加更多逗号。**等待**会在主号码和分机号（或会议
  ID，或其他需要输入的额外数字）之间添加一个分号。一旦第一个号码拨通，屏幕上会出现一个带有额外号码的第二个按钮。点击它即可拨打这些号码。


  #### 添加电子邮件地址


  ![images](img/U1804.jpg)


  点击**电子邮件**标签页，输入联系人的电子邮件地址。你也可以点击电子邮件地址左侧的标签，选择这是住宅、工作还是其他电子邮件地址。


  添加一个地址后，你会看到另一个字段出现，以便添加更多电子邮件地址。


  #### 自定义铃声或短信铃声


  ![images](img/U1805.jpg)


  点击**铃声**或**短信铃声**标签页，为这个人来电或发送短信时选择自定义的铃声或短信铃声。


  #### 输入网站地址


  ![images](img/U1806.jpg)


  你还会看到一个**主页**字段，你可以在其中输入联系人网站的地址，甚至可以输入多个网站地址。


  ![images](img/U1807.jpg)


  **注意**：如果你使用 iCloud 同步通讯录，iCloud 可能会自动查找 Facebook 主页并将其整合到联系人信息中。


  #### 添加街道地址


  ![images](img/U1808.jpg)


  在**住宅**字段下方是用于添加地址的字段。输入**街道**、**城市**、**州/省**和**邮政编码**。你还可以指定**国家/地区**以及这是住宅还是工作地址。


  ![images](img/U1809.jpg)


  #### 添加新字段


  ![images](img/U1810.jpg)


  点击**添加字段**标签页，然后选择任意建议的字段，将其添加到该特定联系人中（参见图 18-2）。


  ![images](img/1802.jpg)


  **图 18-2.** *可添加到联系人条目中的新字段*


  当你点击**生日**时，会看到一个滚轮。你可以转动滚轮到相应日期，将生日添加到联系人信息中。


  完成所有操作后，只需点击**新联系人**表单右上角的**完成**按钮即可。


  ![images](img/U1811.jpg)


  ![images](img/U1812.jpg)


  **提示**：假设你在公交车站遇到了某个人——一个你想记住的人。当然，你应该输入这位新朋友的名字和姓氏（如果你知道的话）；不过，你还应该在**公司名称**字段中输入“公交车站”这几个字。这样，当你输入“公交”或“车站”时，就能立刻找到所有你在公交车站遇到的人，即使你记不住他们的名字！


  ### 为联系人添加照片


  你可能想为联系人关联一张照片。在我们一直使用的**新联系人**屏幕上，只需点击**姓名**标签旁边的**添加照片**按钮即可。


  如果你在“编辑联系人”模式下更换照片，你会在现有照片底部看到**编辑**按钮。


  ![images](img/U1813.jpg)


  点击**添加照片**按钮后，你会看到可以执行以下操作：


  *   拍照

  *   选取照片


  如果已有照片，你还可以执行以下操作：


  *   编辑照片

  *   删除照片


  ![images](img/U1814.jpg)


  要选取现有照片，请选择照片所在的相册并点击相应的标签。当你看到想要使用的照片时，只需点击它。


  ![images](img/U1815.jpg)


  你会注意到照片的顶部和底部会变成灰色，并且你可以通过移动、捏合放大或缩小来调整图片，然后在**图片**窗口中进行排列。


  一旦图片放置在所需位置，只需点击右下角的**选取**按钮，该图片就会被设置为该联系人的照片。


  ![images](img/U1816.jpg)


  **提示**：如果你刚搬到一个新社区，记住每个人的名字可能会让人头疼。因此，一个很好的做法是，为你遇到的每一位邻居在**公司名称**字段中添加“邻居”这个词。要立刻调出所有邻居，只需输入“邻居”这几个字，就能找到你遇到过的所有人了！




  ### 搜索联系人


  假设您需要查找某个特定的电话号码或电子邮件地址。只需像之前一样轻点`通讯录`图标，即可在`所有联系人`列表的顶部看到一个`搜索`框（参见图 18-3）。


  **提示：** 如果您当前位于`通讯录`列表的中部或底部，只需轻点 iPhone 屏幕最上方的显示时间，即可快速跳转到`通讯录`屏幕的顶部，并看到这个`搜索`窗口。


  ![images](img/1803.jpg)


  **图 18-3.** *通讯录`搜索`框*


  要查找某个联系人，请在以下三个可搜索字段中的任意一个中输入前几个字母：


  - 名字

  - 姓氏

  - 昵称

  - 公司名称


  ![images](img/U1817.jpg)


  iPhone 会立即开始过滤，并仅显示与所输入字母匹配的联系人。


  **提示**：若要进一步缩小搜索范围，请按`空格`键，然后继续输入几个字母。


  当您看到正确的名字时，轻点它，该联系人的详细信息便会显示出来。


  #### 通过轻点并滑动字母表快速跳转到特定字母


  将手指按住屏幕左侧边缘的字母表，然后向上或向下拖动，即可跳转到相应的字母。


  #### 通过轻拂手势搜索


  如果您不想手动输入字母，只需移动手指并自下而上轻拂屏幕，您会看到联系人列表在屏幕上快速滚动。继续轻拂或滚动，直到看到您要找的名字。轻点该名字，此人的联系信息便会显示出来。


  #### 使用群组搜索


  如果您在 PC 或 Mac 上对联系人进行了分组，并通过 iCloud 将 iPhone 与电脑同步或进行无线同步，那么这些群组也会同步到您的 iPhone 上。启动`通讯录`应用后，您会看到顶部的`群组`选项。在`群组`标题下，您会看到`所有联系人`。


  选择`所有联系人`可以搜索 iPhone 上所有可用的联系人信息。


  如果您同步了多个账户，您会看到每个账户都有一个单独的标签，顶部还有一个`所有联系人`标签。


  此示例显示两个群组——一个来自 Microsoft Exchange 账户（即公司电子邮件账户），另一个来自 iCloud 联系人群组。


  如果您有一个 Exchange ActiveSync 账户，并且您公司已启用此功能，那么贵公司的 Exchange 全局地址列表也会显示在此处的`群组`下方。您可以在此搜索到公司内的任何人。


  ![images](img/U1818.jpg)


  **注意**：您无法在 iPhone 上的`通讯录`应用中创建群组——必须在电脑上创建，或者在向 iPhone 添加联系人账户时进行同步。


  ### 从电子邮件中添加联系人


  您经常会收到一封电子邮件，然后发现发件人并不在您的通讯录中。从电子邮件中添加新联系人非常容易。


  打开来自您想添加到`通讯录`列表中的联系人的电子邮件。接着，在邮件的`发件人`字段，轻点`从:`标签旁的发件人姓名。


  如果发件人不在您的通讯录中，系统会跳转到一个屏幕，让您选择是将此电子邮件地址添加到现有联系人，还是创建一个新联系人。


  ![images](img/U1819.jpg)


  如果您选择`创建新联系人`，系统会跳转到我们之前见过的`新联系人`屏幕（参见图 18-1）。


  但假设这是某人的个人电子邮件地址，而您已经有一个包含此人工作电子邮件地址的条目。在这种情况下，您应该选择`添加到现有联系人`，然后选择正确的那个人。接着，您可以为这个电子邮件地址赋予一个新的标签——在此例中，使用*个人*。


  ![images](img/U1820.jpg)


  #### 将联系人链接到其他应用


  您可能在手机上的另一个应用中存有电子邮件发件人的联系信息。iPhone 让链接这些联系人变得很容易。


  例如，假设邮件的发件人 Steve 在您的 LinkedIn 联系人列表中，但由于某种原因，他并不是您 iPhone 上的联系人。以下是您如何将他 iPhone
  中的联系信息链接到`LinkedIn`应用中的信息：


  1.  按照之前的方法，将他的信息添加到您的通讯录中。

  2.  启动`LinkedIn`应用——有关此主题的更多信息，请参见第 25 章：“社交网络”。

  3.  在`LinkedIn`应用中找到 Steve 的联系信息，以确认他确实存在。

  4.  点击`连接`图标。

  5.  选择右上角的`下载全部`。

  6.  `LinkedIn`应用会告知您，此操作将添加此联系人关联的照片、当前公司和职位、电子邮件地址以及网站（参见图 18-4）。

  7.  这正是您希望在 iPhone 通讯录中拥有的信息，因此选择`下载所有新联系人`。

  8.  Steve 的照片和更新后的信息便会导入到他 iPhone 上的联系人信息中。


  ![images](img/1804.jpg)


  **图 18-4.** *将电子邮件中的新链接到现有的社交网络联系人*


  **提示**：记住学龄儿童朋友的父母名字可能相当有挑战性。不过，在`名字`字段中，您不仅可以添加您孩子朋友的名字，还可以添加孩子父母的名字（例如，`名字：萨曼莎（妈妈：苏珊，爸爸：罗恩）`）。然后，在`公司`字段中，添加您孩子的名字和“同学”字样（例如，`茜茜的童鞋`）。现在，只需在`所有联系人`列表的`搜索`框中输入您孩子的名字，就能立刻找到所有您在学校见过的联系人。这样您就可以毫不迟疑地说：“你好，苏珊，很高兴再次见到你！”*请尽量不动声色地查看名字。*


  ### 向联系人发送照片


  如果您想向联系人发送照片，则需要通过`照片`应用进行操作（请参见第 20 章：“使用照片”）。


  ### 从通讯录发送电子邮件


  许多核心应用（例如`通讯录`、`邮件`和`信息`）都完全集成在一起，因此一个应用可以轻松触发另一个应用。如果您想向某位联系人发送电子邮件，只需打开该联系人并轻点其电子邮件地址即可。`邮件`应用将会启动，您就可以撰写并向此人发送电子邮件了。


  轻点`通讯录`图标来启动`通讯录`应用。通过搜索或轻拂滚动联系人列表，直到找到您需要的联系人。


  ![images](img/U1821.jpg)


  在联系人信息中，轻点您要使用的那个联系人的电子邮件地址。


  您会看到`邮件`程序自动启动，并且该联系人的姓名已经填入邮件的`收件人:`字段中。最后，输入邮件内容并发送。


  ![images](img/U1822.jpg)




  ### 在地图上显示联系人的地址


  iPhone 的一大亮点是与谷歌地图的集成。这一点在`通讯录`应用中体现得尤为明显。假设你想在地图上查看通讯录中某个联系人的家庭或工作地址。在过去（iPhone
  问世前），你不得不使用谷歌地图、MapQuest 或其他程序，然后费力地重新输入或复制粘贴地址信息。这非常耗时——但在 iPhone 上，你无需这样做。


  只需像之前那样打开联系人。这一次，点击联系人信息底部的地址。


  ![images](img/U1823.jpg)


  你的`地图`应用（由谷歌地图提供支持）会立即加载，并在联系人的精确位置放置一个`图钉`图标。联系人的姓名将显示在`图钉`上方。


  ![images](img/U1824.jpg)


  ![images](img/U1825.jpg)


  点击`图钉`顶部的标签，进入`信息`屏幕。


  现在，你可以选择`路线：到此地`或`路线：从此地出发`。


  接着，输入正确的起点或终点地址，然后点击右下角的`路线`按钮。如果你决定不需要路线，只需点击左上角的`清除`按钮。


  如果你只是直接在`地图`应用中输入地址，而不是通过联系人列表点击，那该怎么办？在这种情况下，你可以点击`添加到通讯录`来添加此地址。


  ![images](img/U1826.jpg)


  **提示**：要返回联系人信息，请点击`地图`按钮，退出`地图`，然后启动`通讯录`。你也可以使用多任务功能（参见第 7 章：“多任务与 Siri”），通过双击`主屏幕`按钮并选择`通讯录`应用。


  ### 更改联系人的排序与显示顺序


  与其他设置一样，`通讯录`应用的选项可通过`设置`图标访问。


  点击`设置`图标，向下滚动到`邮件、通讯录、日历`，然后点击该标签。


  接下来，向下滚动直到看到`通讯录`及其下方的两个选项。要更改排序顺序，请点击`排序顺序`标签，并选择你希望联系人按名字还是姓氏排序。


  ![images](img/U1827.jpg)


  你可能还想更改联系人的显示方式。这正是操作之处；你可以选择`名、姓`或`姓、名`。点击`显示顺序`标签，选择你希望联系人按名字还是姓氏顺序显示。点击左上角的`邮件、通讯录…`按钮以保存设置更改。


  ![images](img/U1828.jpg)


  #### 搜索全球通讯录 (GAL) 联系人


  如果你配置了 Exchange 帐户，你应该有全局通讯录选项。这样，当你连接到组织的服务器时，就可以访问全局通讯录。


  打开你的`通讯录`应用，在 Exchange 下查找名为`Exchange 全局通讯录`的标签。


  ![images](img/U1829.jpg)


  ### 通讯录故障排除


  有时，你的`通讯录`应用可能无法按预期工作。（如果你没有看到所有联系人，请回顾第 3 章：“与 iCloud、iTunes 等同步”中的步骤，了解如何与你的通讯录应用同步。）确保你在`iTunes`应用的设置中选择了`所有群组`。


  **提示**：如果你正在与另一个联系人应用同步，例如 Gmail 中的`通讯录`，那么请确保你选择最接近`所有联系人`的选项，而不是像特定群组这样的子集。


  #### 当全局通讯录联系人未显示时（适用于 Microsoft Exchange 用户）


  有时全局通讯录中的联系人不会显示在你的 iPhone 上。如果发生这种情况，首先确保你已连接到 Wi-Fi 或 3G 蜂窝数据网络。


  接下来，检查你的 Exchange 设置，确认你的服务器和登录信息是否正确。为此，请点击`设置`按钮，然后滚动并点击`邮件、通讯录和日历`。在列表中找到你的 Exchange
  帐户，点击它以查看设置。你可能需要联系你组织的技术支持，以确保你的 Exchange 设置正确。


  ### 备忘录应用


  如果你和许多人一样，办公桌上可能贴满了黄色的小便签——记录着各种待办事项。即使有了电脑，我们仍然倾向于留下这些小纸条作为提醒。iPhone 的一大优点是，你可以在熟悉的黄色便签纸上写下笔记，然后整齐有序地整理分类。你甚至可以将其通过电子邮件发送给自己或他人，以确保信息不会被遗忘。你还可以使用
  iTunes 备份笔记，并且可以选择将笔记同步到电脑或谷歌等其他网站。


  **提示：** iPhone 自带的`备忘录`应用非常基础和实用。如果你需要功能更强大的笔记应用，能够排序、分类、导入项目（PDF、Word 等）、支持文件夹、搜索等，你应该查看
  iPhone 上的 App Store。搜索“笔记”，你会找到至少十几个与笔记相关的应用，价格从免费到 0.99 美元及以上不等。


  ![images](img/U1830.jpg)


  iPhone 上的`备忘录`应用为你提供了一个便捷的地方来保存笔记和简单的“待办事项”列表。你还可以保存简单的列表，例如购物清单，或针对其他商店（如五金店或宠物店）的清单。如果你带着
  iPhone，一旦想到要添加的项目，就可以随时添加到这些列表中，并且这些列表可以随时访问和编辑。


  ![images](img/U1831.jpg)


  #### 同步备忘录


  你可以使用我们在第 3 章：“与 iCloud、iTunes 等同步”中介绍的方法，在 iPhone 和 iPad 等 iOS 设备之间，或与你的电脑或其他网站同步备忘录。同步备忘录的好处在于，你可以在电脑上添加一条备忘录，它就会“出现”在你的
  iPhone 上。然后，当你外出时，你可以编辑那条备忘录，并将其同步回你的电脑。无需重新输入或记忆事情。你的 iPhone 总是随身携带，因此随时随地记笔记是确保不遗忘任何重要事项的好方法。


  #### 备忘录入门


  与所有其他应用一样，只需点击`备忘录`图标即可启动它。启动`备忘录`应用后，你会看到一个类似典型黄色记事本的界面。


  ![images](img/U1832.jpg)


  ##### 多个备忘录帐户


  如果你恰好通过 iCloud、Exchange 或至少一个 IMAP 电子邮件帐户同步，并且通过 iTunes 与电脑同步，那么你会发现来自每个帐户的备忘录都是分开保存的。这很像你的联系人按电子邮件帐户分组，以及你的日历按电子邮件帐户分开的方式。


  要查看多个备忘录帐户，你需要在帐户设置屏幕上设置一个开关。


  当你设置 IMAP 电子邮件帐户时，在`设置` > `邮件、通讯录、日历`中，你会看到打开或关闭备忘录同步的选项。要查看这些备忘录帐户，你必须将`备忘录`开关设置为`开启`，如下面的
  Gmail 帐户所示。


  ![images](img/U1833.jpg)


  要查看不同的备忘录帐户，请点击`备忘录`应用左上角的`帐户`按钮。


  ![images](img/U1834.jpg)


  然后，在下一个屏幕上，你可以点击选择查看`所有备忘录`，或每个帐户的备忘录。在此图中，可选择 Gmail 或 MobileMe 帐户。


  你添加到单个帐户的备忘录将保留在该帐户中。例如，如果你将备忘录添加到 Gmail，那么它们只会显示在你的 Gmail 帐户中。


  ![images](img/U1835.jpg)




  ### 我的笔记如何排序？


  您会看到所有笔记按时间倒序排列，最近编辑的笔记排在最顶部，最早的笔记排在底部。


  显示的日期是特定笔记的最后编辑时间，而非首次创建时间。因此您会注意到笔记顺序在屏幕上动态变化。


  这种排序方式的好处在于，您最近（或频繁编辑）的笔记会始终排在最顶部。


  **提示：** 如果要管理待办事项列表，可以使用 iPhone 自带的“提醒事项”应用。如果需要更强大的功能，不妨在 App Store 中查看 `Things`、`Appigo
  Todo` 或 `OmniFocus`。


  ### 添加新笔记


  要开始编写新笔记，请点击右上角的加号图标 ![images](img/U1836.jpg)。


  此时记事本为空白状态，键盘会自动弹出供您输入。


  **提示：** 您可以将 iPhone 横屏放置，使用更宽敞的横向键盘。


  ![images](img/U1837.jpg)


  ### 为笔记添加标题


  在按下 `Return` 键之前输入的前几个字将成为笔记的标题。因此请先想好标题内容再输入。如图所示，`购物清单` 便成为了该笔记的标题。


  每行输入一个新项目，按 `Return` 键换行。


  完成后，点击左上角的 `备忘录` 按钮返回主备忘录界面。


  ![images](img/U1838.jpg)


  ### 查看或编辑笔记


  您的笔记会在列表中显示为可点击的标签页。点击要查看或编辑的笔记名称，即可显示该笔记内容。


  您可以在“备忘录”中像操作其他程序一样滚动浏览。请注意，右上角会显示笔记的最后编辑日期和时间。


  阅读完笔记后，只需点击左上角的 `备忘录` 按钮即可返回主备忘录界面。


  要快速浏览多条笔记，请点击屏幕底部的箭头。点击 `前进` 箭头 ![images](img/U1840.jpg) 翻页查看下一条笔记；点击 `返回` 箭头 ![images](img/U1841.jpg)
  则可后退。


  ![images](img/U1839.jpg)


  ### 使用语音听写功能输入笔记


  请记住，iPhone 支持语音听写功能。当您编辑或新建笔记时，轻点空格键左侧的麦克风按钮并开始说话即可。


  ![images](img/U1842.jpg)


  当您看到底部出现紫色麦克风图标时，说明语音听写功能已启动。紫色区域会随您音量高低上下跳动。


  完成后，轻点“完成”即可查看听写效果！


  **提示：** 您可以使用语音指令输入标点符号、特殊符号和格式，例如“句号”或“问号”、“左括号”或“右方括号”、“新段落”，甚至“笑脸”。


  ![images](img/U1843.jpg)


  ### 删除笔记


  要删除笔记，请在列表中用手指在笔记上从左向右滑动，然后点击 `删除`。或者，如果正在查看该笔记，请点击底部的 `垃圾桶` 图标 ![images](img/U1845.jpg)。iPhone
  会提示您确认删除或取消操作。


  ![images](img/U1844.jpg)


  ### 通过电子邮件发送或打印笔记


  `备忘录` 应用的便捷功能之一，是能够通过电子邮件发送或打印笔记。假设您写了一份购物清单想电邮给配偶，或者列了一份礼品创意清单想分发出去。要电邮或打印笔记，只需点击屏幕底部的
  `操作按钮` 图标 ![images](img/U1847.jpg)。


  ![images](img/U1846.jpg)


  ### 数据检测器 - 带下划线文字的酷炫功能


  如果在笔记中输入“明天早上”等词语并保存，下次打开该笔记时，会发现这些词语已添加下划线。长按带有下划线的词语，会看到一个按钮询问是否要“创建事件”。点击该按钮即可为明天早上新建一个日历事件。


  ![images](img/U1848.jpg)


  **提示：** 每当日期和时间词语出现下划线时，iPhone 会将其识别为潜在的日历事件。此功能适用于“备忘录”、电子邮件以及 iPhone 上的其他位置。iPhone
  还具备其他“数据检测器”，例如可以识别电话号码、网址，甚至包裹的追踪编号。


