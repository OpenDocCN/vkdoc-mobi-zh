  表 2 提供了一些快速链接，可帮助您将 iPhone 连接到网络（使用 Wi-Fi 或 3G）；购买和欣赏歌曲或视频（使用`iTunes`、`音乐`和`视频`应用）；让
  iPhone 进入睡眠或关机；解锁 iPhone；使用电子`相框`；以及更多功能。


