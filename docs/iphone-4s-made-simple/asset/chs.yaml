- "# 第 19 章\n\n## 日历与提醒事项\n\niPhone 让曾经贴在冰箱上的老式日历彻底过时。本章将向您展示如何充分利用 iPhone 的`日历`应用。例如，我们将介绍如何安排约会、管理多个日历、切换日历视图，甚至处理会议邀请。\n\
  \n在 iOS 5 中，Apple 新增了`提醒事项`应用，用于轻松管理所有基于时间和地点的任务与待办事项列表！\n\n**注意：** 本章大部分内容将讨论如何将\
  \ iPhone 日历与其他日历同步，因为让日历在 iPhone 和其他设备上都能访问非常实用。您也可以选择以*独立*模式使用 iPhone，即不与任何其他日历同步。在后一种情况下，我们描述的所有关于事件、查看和管理的步骤同样适用于您。但务必使用\
  \ iCloud 或 iTunes 的自动备份功能保存日历副本，以防 iPhone 发生意外。\n\n### 日历、提醒事项与 Siri\n\nApple 全新的人工智能个人助理\
  \ Siri，可以快速轻松地为您创建日历事件和提醒项目。对于相对简单的操作，Siri 甚至比您通过“老式”点击按钮创建更快捷方便。以下是 Siri 在日历和提醒事项方面的一些功能示例。\n\
  \n*   “显示我明天的日历”。Siri 会显示您所查询日期或日期的所有事件。\n*   “安排明天晚上 9 点与老板的会面”。如果存在时间冲突，Siri 还会提醒您。\n\
  *   “把我明天晚上 9 点的约会移走”。Siri 会告知您约会是否为重复事件，并提供仅修改当前事件或修改所有未来事件的选项。\n*   “显示我的提醒事项”。Siri\
  \ 会列出您的提醒，您可以快速勾选已完成的项目。\n*   “提醒我到公司后给妻子打电话”。Siri 会创建一个基于位置的提醒。\n*   “将饼干添加到我的购物清单”。Siri\
  \ 会创建一个提醒，提示您在名为“购物”的列表中购买饼干。\n\n### 在 iPhone 上管理繁忙生活\n\n`日历`和`提醒事项`应用提供了强大且易用的功能，帮助您管理约会、跟踪待办事项、设置提醒闹钟，甚至创建和回复会议邀请（适用于\
  \ Exchange 和 iCloud 用户）。\n\n\n#### 同步或共享日历与提醒事项\n\n如果你在电脑上维护着日历或任务列表，或者在 iCloud\
  \ 或 Google 日历等网站上维护着日历，那么你可以通过使用 iTunes 应用和同步线缆，或者设置无线同步（参见第 3 章：“同步 iCloud、iTunes\
  \ 及其他”，了解同步信息），将数据与你的 iPhone 进行同步或共享。\n\n![images](img/U1901.jpg)\n\n设置好日历和任务同步后，根据你的同步设置，电脑上的所有日历约会和待办事项列表将自动与\
  \ iPhone 日历同步（参见图 19–1）。\n\n如果你使用 `iTunes` 与日历同步（例如，Microsoft Outlook 或 Apple 的\
  \ `iCal`），每次将 iPhone 连接到电脑时，约会和任务都会被传输或同步。\n\n如果你使用其他方法同步（例如 iCloud、Exchange 或类似服务），此同步是无线的且自动的，在初始设置过程后，你很可能无需任何操作即可完成同步。\n\
  \n![images](img/1901.jpg)\n\n**图 19–1.** *将 PC 或 Mac 日历同步到 iPhone*\n\n#### 日历图标上显示的当天日期\n\
  \n`日历`图标通常就在 iPhone 的`主屏幕`上。你会很快注意到，你的`日历`图标会变化，以显示当天的日期和星期几。右侧的图标显示今天是星期五，也就是本月的第\
  \ 16^(个) 日。\n\n![images](img/U1902.jpg)\n\n**提示：** 如果你经常使用 iPhone 的`日历`应用，可以考虑将其固定或移动到底部程序坞；你已在第\
  \ 6 章：“图标与文件夹”的关于固定图标的部分学习了如何操作。\n\n#### 查看约会并在日历中导航\n\n`日历`应用的默认视图是`日`视图。此视图让你一目了然地看到当天所有即将到来的约会。约会会显示在你的日历中。如果你在电脑上设置了多个日历，例如`工作`和`家庭`，那么不同日历的约会将在\
  \ iPhone 日历上以不同颜色显示。\n\n你可以通过多种方式操作日历：\n\n*   **一次移动一天**：如果你轻点顶部当天日期旁边的三角形，可以向前或向后移动一天。\n\
  \n    **提示：** 长按日期旁边的三角形可以快速穿越天数。\n\n*   **更改视图**：轻点底部的`列表`、`日`和`月`按钮来更改视图。\n* \
  \  **跳转到今天**：轻点左下角的`今天`按钮。\n\n#### 四种日历视图\n\n你的`日历`应用提供四种视图。`日`、`列表`、`周`和`月`视图在竖屏模式下均可使用；你可以通过轻点屏幕底部的视图名称来切换视图。`周`视图仅在横屏模式下可用，你可以通过将\
  \ iPhone 侧向旋转来切换到该视图。以下是四种视图的快速概览：\n\n*   **日视图**：启动 iPhone 的`日历`应用时，默认视图通常是`日`视图。这让你可以快速查看当天安排的所有事项。你可以在`日历`应用底部找到更改视图的按钮。\n\
  \n    ![images](img/U1903.jpg)\n\n    要移动到下一天，只需从右向左滑动。要回到前一天，则从左向右滑动。\n\n    ![images](img/U1904.jpg)\n\
  \n*   **列表视图**（也称为**议程**视图）：轻点底部的`列表`按钮，即可查看约会列表。\n\n    根据你安排的事项多少，你可能会看到接下来一天甚至一周的排程事件。\n\
  \n    向上或向下滑动以查看更多事件。\n\n    ![images](img/U1905.jpg)\n\n*   **月视图**：轻点底部的`月`按钮，即可查看整个月的布局。有约会的日期会显示一个小圆点。当天的圆点会以蓝色高亮显示。\n\
  \n    **提示：** 要返回`今天`视图，只需轻点左下角的`今天`按钮。\n\n    ![images](img/U1907.jpg)\n\n    **前往下一个月**：轻点顶部显示的月份右侧的三角形。\n\
  \n    **前往上一个月**：轻点月份左侧的三角形。\n\n    ![images](img/U1906.jpg)\n\n*   **周视图**：将你的\
  \ iPhone 侧向旋转至横屏模式，即可访问周视图。\n\n    ![images](img/U1908.jpg)\n\n*   向左或向右滑动以查看更多天数。\n\
  \n#### 使用多个日历\n\n`日历`应用允许你查看和使用多个日历。你看到的日历数量取决于你同步的数量。例如，你可能同步了 iCloud 或 Google\
  \ 日历用于家庭，Exchange 用于工作。\n\n要一次只查看一个日历，请轻点顶部的`日历`按钮，然后仅选择你想查看的日历。\n\n![images](img/U1909.jpg)\n\
  \n在设置同步参数时，你可以指定要与 iPhone 同步的日历。你可以按照以下说明进一步自定义日历：\n\n*   **更改颜色**：如果你不喜欢 iPhone\
  \ 上某个日历的颜色，可以轻松更改：\n    *   轻点右上角的`日历`按钮。\n\n        ![images](img/U1910.jpg)\n\n\
  \    *   轻点右上角的`编辑`按钮。\n    *   轻点要更改的日历。\n    *   系统会显示一个颜色选项列表。轻点你需要的颜色，新的颜色便会生效。\n\
  \n*   **添加新日历**：如果你使用 iCloud 同步，则可以在 iPhone 上添加新日历：\n\n    ![images](img/U1911.jpg)\n\
  \n    *   轻点右上角的`日历`。\n    *   轻点右上角的`编辑`。\n    *   向下滚动并在 iCloud 部分轻点`添加日历…`。\n\
  \    *   为新日历输入名称并选择颜色，然后大功告成！\n\n### 添加新的日历事件\n\n你可以直接在 iPhone 上轻松添加新事件或约会。这些新事件和约会将在下次同步时同步（或共享）到你的电脑。\n\
  \n#### 添加新约会\n\n你的本能可能是尝试在特定时间点触屏幕来设置约会；在 iOS 5 系统中，你终于可以这样做了！\n\n![images](img/U1912.jpg)\n\
  \n![images](img/U1913.jpg)\n\n要从任何`日历`视图添加新日历事件，请按以下步骤操作。\n\n1. 在屏幕上你想要安排约会的位置长按手指，直到出现一个新的彩色气泡。（你仍然可以轻点屏幕右上角的\
  \ `+` 图标来添加新事件。）\n2. 在`添加事件`屏幕上，轻点标有`标题与位置`的框。\n\n    ![images](img/U1914.jpg)\n\
  \n   键入事件的标题和位置（可选）。例如，你可以键入“与马丁会面”作为标题，并将位置输入为“办公室”。或者，你也可以选择键入“与马丁共进午餐”，然后选择一个纽约市非常昂贵的餐厅。\n\
  \n3. 轻点右上角的蓝色`完成`按钮以返回`添加事件`屏幕。\n4. 轻点`开始`或`结束`标签以调整事件时间。要更改开始时间，请轻点`开始`字段将其高亮显示为蓝色。接着，移动底部的旋转拨盘以反映正确的日期和约会的开始时间。\n\
  \n    ![images](img/U1915.jpg)\n\n5. 或者，你可以通过轻点`全天`旁边的开关将其设置为`开`来设置全天事件。\n\n**注意：**\
  \ 只有在你的事件设置于 Exchange/Google 或 iCloud 日历时，你才会在`重复`标签之后看到一个标有`邀请对象`的标签。\n\n\n\n###\
  \ 重复事件\n\n您有些约好的事项每天、每周或每月在同一时间发生。如果您要安排重复事件，请按照以下步骤操作：\n\n![images](img/U1916.jpg)\n\
  \n1. 轻触`重复`标签，然后从列表中选择重复事件的时间间隔。\n2. 轻触`完成`返回主`事件`界面。\n3. 如果您设置了`重复`会议，那么还需要指定重复事件的结束时间。轻点`结束重复`按钮进行设置。\n\
  \n   ![images](img/U1917.jpg)\n\n4. 您可以选择`永不结束`或设置一个具体日期。\n5. 完成后轻点`完成`。\n\n###\
  \ 日历提醒\n\n您可以让 iPhone 4 在临近约会时发出声音提醒，即*提示*。提醒功能有助于防止您忘记重要事项。请按照以下步骤创建提醒：\n\n![images](img/U1918.jpg)\n\
  \n1. 轻触`提醒`标签，然后选择提醒闹钟选项。您可以选择不设置闹钟（`无`），或者设置提醒时间，范围从`事件发生时`一直延伸到`事件前 2 天`，具体取决于您的需求。\n\
  2. 轻触`完成`返回主`事件`界面。\n\n## 第二提醒\n\n**注意：** 如果您使用的日历是通过 iTunes 或 iCloud 同步的，您将看到`第二提醒`选项。但如果您的活动绑定的是通过\
  \ Exchange 设置同步的 Google 日历，则不会看到第二提醒。\n\n![images](img/U1919.jpg)\n\n大多数情况下，一旦您设置了第一个`提醒`选项，就会出现`第二提醒`选项的标签。您可以将这个第二提醒设置在第一提醒之前或之后的另一个时间。有些人发现第二提醒对记住关键事件或约会非常有帮助。\n\
  \n**提示：** 这里有一个实用示例，说明您何时可能需要设置两个日历提醒。\n\n如果您的孩子有看医生或牙医的预约，您可能想将第一个提醒设置在预约前一晚。这会提醒您写一张假条交给孩子。\n\
  \n然后您可以将第二个提醒设置在预约时间前 45 分钟。这样您就有足够的时间去学校接孩子并赶到预约地点。\n\n## 选择日历\n\n![images](img/U1920.jpg)\n\
  \n如果您使用多个日历，请轻点`日历`标签，更改新事件所属的日历。\n\n轻触左上角的`日历`按钮，可以查看所有日历。\n\n![images](img/U1921.jpg)\n\
  \n轻点您要用于此特定事件的日历。通常，默认选中的是您上次使用 iPhone 安排事件时选择的日历。\n\n## 忙闲状态\n\n您还可以让他人了解您在已安排事件期间的忙闲状态。您可以从以下选项中选择您的忙闲状态：`忙碌`（默认）、`空闲`、`待定`或`外出`。（`待定`和`外出`仅在您使用\
  \ Exchange 设置同步账户时才会显示。）\n\n![images](img/U1922.jpg)\n\n**注意：** 仅当您用于此事件的日历与 iCloud、Exchange\
  \ 或 Exchange/Google 设置同步时，您才会看到`忙闲状态`或`受邀者`字段，并且它们各自提供的选项略有不同。如果您与 iCloud 同步，还会看到一个`URL`字段，您可以在其中添加一个供稍后使用的网址。\n\
  \n## 向日历事件添加备注\n\n![images](img/U1923.jpg)\n\n如果您想向日历事件添加一些备注，请按照以下步骤操作：\n\n![images](img/U1924.jpg)\n\
  \n1. 轻点`备注`，然后输入或复制粘贴一些备注内容。\n2. 轻点`完成`结束添加备注。\n3. 再次轻点`完成`保存您的新日历事件。\n\n**提示：**\
  \ 如果这是要去一个新地点的会议，您可能需要输入或复制粘贴一些驾车路线。\n\n### 在邮件和日历应用之间使用复制粘贴功能\n\niPhone 软件的新型快速应用切换器意味着您现在可以轻松地在`邮件`和`日历`程序之间跳转以复制粘贴信息。这些信息可以是任何内容，从会议所需的要点笔记到驾车路线。请按照以下步骤在`邮件`和`日历`程序之间复制粘贴信息：\n\
  \n1. 创建新日历事件或编辑现有事件，如本章前面所述。\n\n   ![images](img/U1925.jpg)\n\n2. 向下滚动到`备注`字段并轻点它以将其打开。\n\
  3. 双击`主屏幕`按钮以调出快速应用切换器。\n4. 如果您看到`邮件`图标，请轻点它。如果您没有看到`邮件`图标，请向左或向右滑动寻找。找到后，轻点它以打开`邮件`应用。\n\
  5. 双击一个单词，然后用手指拖动蓝色手柄选择要复制的文本。\n\n   ![images](img/U1926.jpg)\n\n6. 轻点`复制`按钮。\n\
  7. 双击`主屏幕`按钮以调出快速应用切换器。\n8. 轻点`日历`图标。它应该是左侧的第一个图标，因为您刚刚跳出该应用。\n\n   ![images](img/U1927.jpg)\n\
  \n9. 现在在`备注`字段中长按。松开手指时，您应该会看到`粘贴`弹出框。如果看不到，请将手指按住稍久一点，直到看见它为止。\n\n   ![images](img/U1928.jpg)\n\
  \n10. 轻点`粘贴`。\n11. 现在您应该会看到复制并粘贴到`备注`字段中的文本。\n\n    ![images](img/U1929.jpg)\n\n\
  12. 轻点`完成`以保存您的更改。\n\n### 编辑约会\n\n有时，约会的详情可能会发生变化而需要`调整`。幸运的是，在 iPhone 上修改约会很简单。如果您只想更改时间，可以像下面这样在屏幕上直接移动它。\n\
  \n![images](img/U1930.jpg)\n\n1. 按住您想要更改的约会不放。\n2. 将此约会拖到新的时间段。\n\n   如果您需要更改的时间范围超出拖放操作所能达到的幅度，或者需要更改其他字段，也可以使用`编辑`按钮。\n\
  \n3. 轻点您要更改的约会。\n4. 轻点右上角的`编辑`按钮，查看显示约会详情的`编辑`屏幕。\n5. 轻触需要调整的字段标签，就像创建事件时那样。例如，您可以通过轻触`开始`或`结束`标签，然后调整事件的开始或结束时间来更改此约会的时间。\n\
  \n## 编辑重复事件\n\n编辑重复事件的方式与编辑其他任何事件完全相同。唯一的区别是，完成编辑后会弹出一个问题。您需要回答此问题并轻点`完成`按钮。\n\n\
  ![images](img/U1931.jpg)\n\n如果只想更改此重复事件的当前实例，请轻点`仅对此事件保存`。\n\n如果要更改此重复事件的所有实例，请轻点`对未来事件保存`。\n\
  \n## 将事件切换到其他日历\n\n如果您错误地将事件设置在了错误的日历上，请直接轻点`日历`按钮更改日历。然后，选择您已同步到 iPhone 的其他日历之一。\n\
  \n**注意：** 根据您选择的日历，不同的字段可能会显示或消失。\n\n如果您将事件从使用`iTunes`同步的日历更改为与 Exchange 同步的日历，您会看到`第二提醒`字段消失。同时，使用\
  \ Exchange、Google 或 iCloud 日历时，您会看到两个新字段出现：`受邀者`和`忙闲状态`。\n\n## 删除事件\n\n请注意，在`编辑`屏幕的底部，您还可以选择删除此事件。只需轻触屏幕底部的`删除事件`按钮即可。\n\
  \n![images](img/U1932.jpg)\n\n\n\n### 会议邀请\n\n对于经常使用 Microsoft Exchange、`Microsoft\
  \ Outlook` 或 iCloud 的用户来说，会议邀请已成为生活的一部分。你会在电子邮件中收到会议邀请，接受邀请后，该约会便会自动添加到你的日历中。\n\n\
  在你的 iPhone 上，你接受的邀请会立刻添加到日历中。\n\n如果你在日历中点击该会议邀请，就能看到所需的所有详细信息：拨入号码、会议 ID，以及邀请中可能包含的任何其他细节。\n\
  \n![images](img/U1933.jpg)\n\n### 日历选项\n\n在你的`日历`应用中，只有少数几个选项可供调整。你可以在`设置`应用中找到它们。请按照以下步骤进行调整：\n\
  \n![images](img/U1934.jpg)\n\n1.  从你的`主屏幕`中轻点`设置`\n2.  向下滚动到`邮件、通讯录、日历`并轻点它。\n3.\
  \  向下滚动到`日历`（它位于最底部！）以查看几个选项。\n4.  第一个选项是一个简单的开关，用于通知你`新邀请提醒`。如果你收到任何会议邀请，最好将此选项保持为默认的`开启`状态。\n\
  5.  接下来，如果你通过 Exchange 或 iCloud 同步你的`日历`程序，你可能还会看到`同步`选项。你可以调整设置，将事件同步到`往回 2 周`、`往回\
  \ 1 个月`、`往回 3 个月`、`往回 6 个月`，或显示所有`所有事件`。\n6.  接下来，你可以选择你的时区。此设置应反映你设置 iPhone 时的`主屏幕`设置。如果你在旅行中，并希望针对不同时区调整你的约会，你可以将`时区`值更改为任意你偏好的城市。\n\
  \n    ![images](img/U1935.jpg)\n\n7.  可以为生日、事件和全天事件设置默认提醒时间。事件包含常规选项，而生日和全天事件则允许在事件当天、提前\
  \ 1 天或提前 2 天（均在上午 9 点），或提前 1 周\n\n## 更改默认日历\n\n我们之前提到过，你可以在 iPhone 上显示多个日历。`默认日历`屏幕允许你选择哪个日历作为你的默认日历。\n\
  \n![images](img/U1936.jpg)\n\n将一个日历指定为默认日历，意味着当你计划安排新的约会时，此日历将默认被选中。\n\n如果你希望使用另一个日历——比如你的`工作`日历——那么你可以在实际设置约会时更改它，正如本章前面所示。\n\
  \n## 提醒事项\n\n`提醒事项`是 iOS 5 中新增的一款应用，它能让你轻松简单地跟踪需要完成的事项、完成它们的日期和时间，甚至是在何处需要完成。你可以将此应用视为苹果对任务或待办事项列表的回应。\n\
  \n## 提醒事项视图\n\n你的`提醒事项`应用有三个主要视图：`列表`、`日期`和`月`。以下是这些视图的快速概述。\n\n`列表`是`提醒事项`的默认视图，可以让你一目了然地查看所有需要完成的任务。\n\
  \n![images](img/U1937.jpg)\n\n![images](img/U1938.jpg)\n\n**注：** 对于 iCloud 账户，默认的`列表`视图称为`提醒事项`。对于\
  \ Microsoft Exchange 账户，默认的`列表`视图称为`任务`。\n\n如果你有多个列表，可以通过从右向左滑动在它们之间切换，就像在你的 iPhone\
  \ `主屏幕`上在不同应用页面之间切换一样。\n\n从左向右滑动可以查看你的`已完成`列表\n\n`日期`视图让你在提醒事项到期的当天查看它们。你可以轻松地从一天滑动到下一天；你也可以滚动底部的`日期`滑块。按照以下步骤更改显示的日期：\n\
  \n*   **前往下一天**：从右向左滑动。\n*   **前往前一天**：从左向右滑动。\n*   **前往已完成任务列表**：从当前天开始，从左向右滑动。\n\
  \n**提示：** 要返回到`今天`视图，只需轻点右上角的`今天`按钮。\n\n![images](img/U1939.jpg)\n\n要查看`月`视图，轻点位于`日期`视图左上角的`月`按钮\
  \ ![images](img/U1941.jpg)。这将显示整个月的布局。有提醒事项到期的日期会显示为红色。\n\n![images](img/U1940.jpg)\n\
  \n**提示：** 要返回到`今天`视图，只需轻点右上角的`今天`按钮。\n\n![images](img/U1942.jpg)\n\n![images](img/U1943.jpg)\n\
  \n按照以下步骤在月份之间来回切换：\n\n*   **前往下个月**：向下滚动。\n*   **前往上个月**：向上滚动。\n\n## 添加新的提醒事项\n\n\
  要从任何`列表`视图中添加新任务，请按照以下步骤操作：\n\n1.  轻点当前列表末尾的第一个空白行。\n\n    ![images](img/U1944.jpg)\n\
  \n2.  输入你任务的标题。\n3.  完成后，轻点右上角的黑色`完成`按钮。\n\n**注：** 你也可以轻点`添加`按钮来创建一个新任务。![images](img/U1944.jpg)\n\
  \n## 添加提醒事项详情\n\n要向任务添加*详情*，请轻点任务的标题。`详情`屏幕允许你添加`提醒我`的到期日期或位置、提醒的`优先级`、你希望将其附加到哪个`列表`，以及你可能想要添加的任何`备注`。\n\
  \n![images](img/U1945.jpg)\n\n`详情`页面也是你可以删除任务的地方。\n\n**注：** 如果一开始没有看到所有选项，请轻点`显示更多`按钮来展开它们。\n\
  \n## 设置到期日期和位置\n\n`提醒事项`应用包含你可以为提醒设置的标准到期日期。当任务到达到期日期时，你会收到一个弹出通知来提醒你。\n\n`提醒事项`应用还包含强大的地理围栏功能；也就是说，它允许你为提醒设置基于位置的通知。这意味着你可以设置提醒，例如在到达母亲家时更换灯泡，或者在离开办公室时拿牛奶。\n\
  \n**注：** 基于位置的提醒目前仅在你使用 iCloud 并将任务分配到一个与 iCloud 关联的列表时才可用。\n\n![images](img/U1946.jpg)\n\
  \n按照以下步骤设置`提醒我`的日期或位置：\n\n1.  轻点`提醒我`。\n2.  要设置到期日期，将`在某天`选项切换为`开启`。默认情况下，日期将设置为当天。\n\
  3.  要更改日期，轻点它，然后移动底部的旋转拨盘以反映任务的正确日期。\n4.  轻点`完成`返回主`详情`屏幕。\n\n    ![images](img/U1947.jpg)\n\
  \n5.  要设置地点，将`在某个位置`切换为`开启`。默认情况下，位置将设置为你当前的位置。\n6.  要更改你的位置，轻点`在某个位置`下方的字段，然后轻点`选择地址`。\n\
  7.  从你的`通讯录`列表中选择一个地址。\n8.  轻点`完成`返回主`详情`屏幕。\n\n**提示：** 在`提醒事项`中使用某个位置之前，该位置必须存在于你的`通讯录`中。要快速将位置添加到你的`通讯录`，请使用`地图`应用（参见第\
  \ 21 章：\"地图\"）。\n\n1.  如果你希望在离开某个位置时收到提醒，请轻点`当我离开时`。\n2.  如果你希望在到达某个位置时收到提醒，请轻点`当我到达时`。\n\
  3.  轻点`完成`返回主`详情`屏幕。\n\n**注：** 如果你同时设置了到期日期和位置，`提醒事项`将会在最先发生的那个条件满足时向你发送提醒——即你到达或离开某个位置，或者提醒到达设定的时间。\n\
  \n## 重复提醒事项\n\n你的一些提醒事项需要在每天、每周或每月的同一时间或地点触发。如果你正在安排一个重复或循环的任务，请按照以下步骤操作：\n\n1.\
  \  轻点`重复`标签页，然后从列表中选择重复事件的间隔时间。\n2.  轻点`完成`返回主`详情`屏幕。\n\n\n\n### 更改列表\n\n每个`treminder`事项都属于一个列表。你可以设置工作列表、家庭列表、度假列表、购物列表——任何你喜欢的列表。**详细信息**页面会显示当前与你新建任务关联的列表名称。请按照以下步骤更改当前列表：\n\
  \n![images](img/U1948.jpg)\n![images](img/U1949.jpg)\n\n1. 点击当前列表名称。\n2. 点击你想要切换到的列表。\n\
  \n## 为任务添加备注\n\n如果你想为任务添加一些备注，请按照以下步骤操作：\n\n![images](img/U1950.jpg)\n\n1. 点击**备注**，然后输入或复制粘贴若干备注。\n\
  \n   ![images](img/U1951.jpg)\n\n2. 点击**完成**以结束添加备注。\n\n**提示：** 如果是购物清单，你可能想添加一些附加信息，比如服装尺码、食品品牌或其他可能有帮助的内容。\n\
  \n## 完成提醒事项\n\n将提醒事项标记为已完成非常简单。只需点击提醒事项标题左侧的方框，就会出现一个勾选标记图标。这会将该提醒事项从其当前列表移至特殊的“已完成”列表，以便你日后必要时可以返回查看。\n\
  \n![images](img/U1952.jpg)\n\n如果操作有误，只需再次点击该方框即可移除勾选标记图标，将提醒事项恢复至之前的状态。如果任务已被移至“已完成”列表，则向左滑动直到进入“已完成”列表，然后点击该方框取消勾选，即可将提醒事项移回之前的列表。\n\
  \n## 编辑提醒事项\n\n有时，任务的细节可能会发生变化，需要进行调整。幸运的是，更改任何提醒事项只需遵循以下简单步骤：\n\n![images](img/U1953.jpg)\n\
  \n1. 点击你要更改的提醒事项。\n2. 点击“详细信息”页面上的标签，并调整细节，就像你设置新任务时一样。\n\n### 删除提醒事项\n\n请注意，在**详细信息**屏幕的底部，你还可以选择删除任务。只需点击屏幕底部的**删除**按钮即可。\n\
  \n![images](img/U1954.jpg)\n\n## 添加新列表\n\n**提醒事项**应用允许你拥有多个列表，这对于保持你的任务井然有序非常方便。例如，你可以创建一个新列表来帮助你为即将到来的旅行打包行李，或为即将到来的生日进行购物。\n\
  \n你可以为 iCloud 提醒事项或 Exchange 任务账户，或者 iPhone 上的本地列表创建新列表。请按照以下步骤创建新列表：\n\n1. 点击屏幕左上角的**列表**按钮\
  \ ![images](img/U1955.jpg)。\n\n   ![images](img/U1956.jpg)\n\n2. 在“列表”页面上，点击右上角的**编辑**按钮。\n\
  3. 如果你有多个账户与“提醒事项”同步，请选择你想要添加新列表的账户。\n4. 点击**创建新列表……**标签。\n5. 输入你的新列表名称。\n6. 点击右上角的灰色**完成**按钮。\n\
  \n## 移动和删除列表\n\n在**列表**页面中，你还可以移动和删除列表。\n\n要移动列表，请长按最右侧的**抓手**图标，然后将其拖拽到新位置。\n\n\
  要删除列表，请点击列表名称左侧的红色**圆圈**图标，然后点击**删除**按钮确认你的选择。\n\n## 提醒事项选项\n\n在**提醒事项**应用中，只有两个选项可以调整；你可以在**设置**应用中找到它们：\n\
  \n![images](img/U1957.jpg)\n\n1. 从你的**主屏幕**点击**设置**图标。\n2. 向下滚动到**邮件、通讯录、日历**并点击它。\n\
  \n   ![images](img/U1958.jpg)\n\n3. 向下滚动到**提醒事项**（它位于最底部！）以查看这两个选项。\n\n   ![images](img/U1959.jpg)\n\
  \n4. 第一个选项是**同步**。你可以调整此设置，以同步**过去 2 周、过去 1 个月、过去 3 个月、过去 6 个月**，或显示**所有提醒事项**。\n\
  \n### 更改默认列表\n\n我们之前提到过，你可以在 iPhone 上显示多个列表。**默认列表**屏幕允许你选择哪个列表作为默认列表。\n\n![images](img/U1960.jpg)\n\
  \n将某个列表指定为默认列表意味着，当你新建一个提醒事项时，它默认会被分配到这个指定的列表。\n\n"
- "# 第 20 章\n\n## 使用照片\n\n虽然之前版本的 iPhone 已包含摄像头，但当前 iPhone 上的摄像头确实令人惊叹。iPhone 4S 配备的不是一个，而是两个摄像头：一个位于背面、拥有`f/`2.4\
  \ 光圈和 LED 闪光灯的 800 万像素摄像头；以及一个位于正面、用于视频聊天和自拍的 30 万像素 VGA 摄像头。你可以在第 11 章“视频消息与 Skype”中了解有关使用前置摄像头的更多信息。\n\
  \n在 iPhone 上查看和分享照片确实是一种享受，这在很大程度上要归功于其精美的视网膜显示屏。在本章中，我们将讨论将照片导入 iPhone 的多种方法。我们还将向你展示如何使用触摸屏浏览照片，以及如何放大、缩小和操作照片。\n\
  \n**提示：** 你知道吗，你可以同时按下两个按键来截取 iPhone 整个屏幕的画面？这对于向别人展示一款炫酷的应用，或者证明你在**俄罗斯方块**中获得了最高分来说非常棒！\n\
  \n操作方法如下：同时按下**主屏幕**按钮和右上角的**开/关/睡眠**键（你可以先按住一个键，再按下另一个键）。这有点技巧性，需要一些练习。如果操作正确，屏幕会闪烁，并且你会听到相机快门声。你所截取的屏幕快照将保存在**照片**应用中的“相机胶卷”相册里。\n\
  \n### 快速拍照\n\n苹果最近添加了一些出色的快捷方式，帮助你更快速、更方便地拍照。如果你的孩子正处于特别可爱或值得纪念的时刻，如果你在树林里遇到一只珍稀鸟类，或者你需要快速抓拍社区里可疑的东西，那么你可以使用以下其中一种技巧来快速拍照：\n\
  \n* 双击**主屏幕**按钮，即可在**锁定**屏幕上直接调出**相机**图标。点击**相机**图标将直接带你进入**相机**应用，准备拍照。这意味着你不再需要解锁手机、滑动屏幕寻找**相机**应用，然后等待它启动。\n\
  * 使用**音量加**硬件按钮拍照。你可以使用更具触感且类似传统相机操控的方式，而不必费劲去按屏幕上的相机软件按钮。\n* 拍摄多张照片。苹果称，拍摄第一张照片的时间已缩短至惊人的\
  \ 1.1 秒；然而，从第二张照片开始——以及此后的每一张照片——现在仅需 0.5 秒。这对于拍摄运动或其他快速移动的场景尤其方便。只需尽可能快地连续按音量加键即可。\n\
  * 自动对焦和人脸识别意味着你拍摄的朋友和家人的快照会自动更清晰，曝光也更好。\n\n## 使用相机应用\n\n**相机**应用应该在你的**主屏幕**页面上——通常位于第一个屏幕的顶部。如果你没有看到它，请向左或向右滑动直到找到它。\n\
  \n![images](img/U2001.jpg)\n\n触摸**相机**图标，相机的快门会以动画效果在你的屏幕上打开。\n\n一旦快门打开，你会看到顶部的控制选项：将**闪光灯**设置为**开**、**关**或**自动**；**选项**用于设置**网格**叠加和**HDR**（高动态范围）为**开**或**关**；以及一个切换前置和后置摄像头的开关。在底部，你会找到一个缩略图，可带你进入“相机胶卷”相册；一个用于拍照的**相机**按钮；以及一个用于在静态照片和视频录制模式之间切换的滑块。\n\
  \n![images](img/U2002.jpg)\n\n**提示：** 你也可以通过按下**音量加**硬件按钮来拍照或开始视频录制。\n\n\n\n###\
  \ 地理标记\n\n`Geo-tagging` 是一项将你的 GPS（全球定位系统）坐标嵌入到图片文件中的功能。如果你将照片上传至 `Flickr` 等程序，你的朋友就可以利用照片中的坐标来找到你的位置以及照片的拍摄地点。\n\
  \n**注意：** 对于 Mac 用户而言，`iPhoto` 利用地理标记功能将照片归类到 `iPhoto` 的 `地点` 分类中。\n\n如果启用了相机时 `定位服务`\
  \ 设置为 `开`（参见第 1 章：“开始使用”），系统会询问你是否允许使用当前定位。\n\n要再次确认此设置，请按照以下步骤操作：\n\n1.  打开 `设置`\
  \ 应用。\n2.  进入 `通用`。\n3.  点击 `定位服务`。你会看到如下所示的屏幕。\n4.  确保 `相机` 旁边的开关已切换至 `开`。\n\n\
  ![images](img/U2003.jpg)\n\n### 拍摄照片\n\n拍照就像对准目标然后按下快门一样简单，但如果你愿意，也可以进行一些调整。\n\n\
  相机开启后，将拍摄对象对准 iPhone 屏幕中央。\n\n当你准备好拍照时，只需点击底部的 `相机` 按钮，或按下 iPhone 侧面的 `调高音量` 硬件按钮（带有\
  \ + 标识的按钮）。你会听到快门声，屏幕会显示动画，表示正在拍照。\n\n![images](img/U2004.jpg)  \n![images](img/U2005.jpg)\n\
  \n照片拍摄完成后，它会落入左下角的窗口中。点击该缩略图，即可加载 `照片` 应用中的 `相机胶卷` 相簿。\n\n## 使用变焦\n\niPhone 具备 5\
  \ 倍数码变焦功能。\n\n**注意：** 数码变焦的清晰度永远比不上光学变焦，因此请注意，使用变焦时画质通常会略微下降。\n\n要使用变焦，只需用两根手指触摸屏幕，然后捏合或张开即可放大或缩小。手指张开越大，缩小的程度也越大。开始变焦后，还会出现一个变焦滑块，帮助你调整变焦倍数。\n\
  \n![images](img/U2006.jpg)\n\n## 使用闪光灯\n\n你的 iPhone 内置了 LED 闪光灯。默认闪光灯设置为 `自动`，但你也可以手动将其设置为\
  \ `开` 或 `关`：\n\n![images](img/U2007.jpg)\n\n1.  点击左上角的 `闪光灯` 图标。\n2.  点击 `开`、`关`\
  \ 或 `自动`。\n\n**提示：** 我们建议将 `闪光灯` 设置保留为 `自动`；但是，如果你发现照片曝光过度，只需点击 `闪光灯` 图标将闪光灯设置为\
  \ `关`。\n\n## 相机选项\n\n为了帮助你拍摄更好的照片，苹果内置了`网格`线和 `HDR`（高动态范围）摄影功能。\n\n`网格`选项会在屏幕上叠加两条水平线和两条垂直线，这有助于你合理构图。它还能帮助你在肖像照中确保面孔和眼睛效果出色，在静物照中确保物品效果良好，并在风景照中确保景色平衡。\n\
  \n`HDR` 不仅拍摄一张常规照片，还会拍摄一张欠曝版本和一张过曝版本，然后将它们合并在一起，使你在阴影区域和明亮区域都能获得更好的细节。\n\n![images](img/U2008.jpg)\n\
  \n## 切换摄像头\n\n如前所述，iPhone 配备了两个摄像头：一个用于绝大多数摄影的 800 万像素后置摄像头，以及一个用于自拍或 `FaceTime`\
  \ 视频通话（参见第 11 章：“视频消息与 Skype”）的 VGA（640 x 480）前置摄像头。\n\n![images](img/U2009.jpg)\
  \  \n![images](img/U2010.jpg)\n\n要在摄像头之间切换，请执行以下操作：\n\n1.  在 `相机` 应用中点击 `切换摄像头`\
  \ 图标。\n2.  等待相机切换至前置摄像头并对准拍摄对象。\n3.  再次点击 `切换摄像头` 图标切换回标准摄像头。\n\n**提示：** 由于前置摄像头的放置位置，面部可能会看起来有些变形。尝试将你的面部稍微后移并调整相机角度，以获得更好的图像。\n\
  \n### 查看已拍摄的照片\n\n你的 iPhone 会将你拍摄的照片存储在一个名为`相机胶卷`的地方。你可以在`相机`和`照片`应用中访问`相机胶卷`。在`相机`应用中，点击`相机`屏幕左下角的`照片`图标。\n\
  \n![images](img/U2011.jpg)\n\n点击一张照片进行查看后，你可以滑动浏览照片，以查看`相机胶卷`中的所有照片。\n\n![images](img/U2012.jpg)\
  \  \n![images](img/U2013.jpg) 要返回`相机胶卷`，请按左上角的`相机胶卷`按钮。\n\n![images](img/U2014.jpg)\
  \ 要拍摄另一张照片，请点击右上角的`完成`按钮。\n\n### 编辑照片\n\n借助 iOS 5，你现在可以直接在 iPhone 上进行基本的照片编辑。你可以旋转照片；增强其曝光度、对比度和色阶；裁剪照片；甚至自动去除亲朋好友照片中的红眼。\n\
  \n请按照以下步骤编辑照片：\n\n1.  浏览到你想要编辑的照片。\n2.  点击右上角的`编辑`按钮。\n\n请按照以下步骤旋转照片：\n\n1.  点击左下角的`旋转`箭头\
  \ ![images](img/U2015.jpg) 按钮，将照片逆时针（向左）旋转 90 度。\n2.  再次点击`旋转`按钮，以 90 度为增量继续旋转。\n\
  3.  将图像旋转到所需位置后，点击右上角的黄色`保存`按钮。\n\n同样地，请按照以下步骤自动增强照片：\n\n1.  点击`自动增强` ![images](img/U2016.jpg)\
  \ 魔法棒按钮。\n2.  如果你对结果满意，点击右上角的黄色`保存`按钮。\n3.  如果不喜欢结果，再次点击`自动增强`将其设置为`关闭`。\n4.  点击`取消`退出`自动增强`模式。\n\
  \n请按照以下步骤去除照片中的红眼：\n\n1.  点击`红眼` ![images](img/U2017.jpg) 按钮以激活红眼去除功能。\n2.  点击照片中的每个红眼以应用校正（即，去除眼睛中的红色）。\n\
  3.  如果你对结果满意，点击左上角的`应用`按钮。\n4.  如果不喜欢结果，再次点击每个红眼以移除校正效果。\n5.  点击`取消`退出此模式。\n\n最后，请按照以下步骤裁剪照片：\n\
  \n1.  点击右下角的`裁剪` ![images](img/U2018.jpg) 按钮。照片上会出现一个九宫格网格。\n2.  触摸网格的边缘或角落并拖动，使裁剪区域变高、变矮、变窄或变宽。\n\
  3.  触摸网格内部并拖动，以移动网格背后的照片。\n4.  捏合或张开手指进行缩放，使网格内的照片变大或变小。\n5.  点击`约束`按钮，从标准宽高比列表中进行选择，包括`原始`、`正方形`；传统照片比例如\
  \ `3 x 2`、`4 x 6` 和 `8 x 10`；电视比例如 `SD 4 x 3` 和 `HD 16 x 9`；等等。\n6.  如果对裁剪结果满意，点击右上角的黄色`裁剪`按钮应用裁剪。\n\
  7.  如果不喜欢裁剪结果，点击左上角的`取消`按钮返回`编辑`屏幕。\n\n![images](img/U2019.jpg)\n\n\n\n#### 将照片导入\
  \ iPhone\n\n你有多种方式可以将照片加载到设备上：\n\n- **使用 iCloud 或 iTunes 同步：** 将照片导入 iPhone 最简单的方法可能是使用\
  \ iCloud 或 iTunes 从电脑同步照片（参见图 20–1）。我们在第 3 章：“使用 iCloud、iTunes 等进行同步”中对此进行了详细说明。\n\
  - **作为电子邮件附件接收：** 虽然这不适用于大量图片，但对于一张或几张照片来说效果很好。查看第 17 章：“使用电子邮件通信”了解关于如何保存附件的更多详情。（保存后，这些图像会出现在“相机胶卷”相簿中。）\n\
  - **从网页保存图像：** 有时你会在网站上看到一张好图片。长按该图片，待弹出菜单出现后，选择**保存图像**。（与其他保存的图像一样，这些图片最终会出现在“相机胶卷”相簿中。）\n\
  - **从应用内下载图像：** 一个很好的例子是第 8 章：“个性化与安全性”中显示的壁纸图像。\n- **与 iPhoto 同步**（适用于 Mac 用户）：如果你使用\
  \ Mac 电脑，你的 iPhone 很可能会自动与 `iPhoto` 同步。以下是让 `iPhoto` 中的同步功能运行起来的几个步骤：\n  1. 连接你的\
  \ iPhone 并启动 `iTunes` 应用。\n  2. 转到同步选项顶部一行的**照片**标签页。\n  3. 选择你想要与 iPhone 保持同步的**相簿**、**事件**、**面孔**或**地点**。\n\
  \n![images](img/2001.jpg)\n\n**图 20–1.** *从 `iTunes` 选择要与 iPhone 同步的相簿、面孔或事件*\n\n\
  - **拖放**（适用于 Windows 用户）：将 iPhone 连接到 Windows 电脑后，它会在**Windows 资源管理器**中显示为一个便携设备，如图\
  \ 20–2 所示。按照以下步骤在 iPhone 和电脑之间拖放照片：\n  1. 双击**便携设备**下的 **iPhone** 图标将其打开。\n  2.\
  \ 双击**内部存储**将其打开。\n  3. 双击 **DCIM** 将其打开。\n  4. 接下来，你可能会看到一些名称怪异的文件夹，例如：`823WGTMA`、`860OKMZO`\
  \ 和 `965YOKDJ`。尝试双击打开每个文件夹。其中一个会包含你要找的照片或视频。\n  5. 你将看到 iPhone 上“已存储的照片”相簿中的所有图像。\n\
  \  6. 要从 iPhone 复制图像，请选中并将图像从此文件夹拖放到你的电脑上。你不能使用此拖放方法将图像复制到 iPhone。相反，你可以使用 iTunes\
  \ 或 iCloud。\n\n![images](img/2002.jpg)\n\n**图 20–2.** *显示 iPhone 为便携设备的 Windows\
  \ 资源管理器（通过 USB 线缆连接）*\n\n**提示：在 Windows 中选择多个图像**\n\n在 Windows 中有几种选择图像的方法：你可以在图像周围画一个框，单击单个图像，或按\
  \ `Ctrl+A` 全选。你也可以按住 `Ctrl` 键并逐个单击图片进行选择。右键单击其中一个选中的图片，然后选择**剪切**（移动）或**复制**（复制）所有选中的图像。要粘贴图像，请单击任何其他磁盘或文件夹（例如**我的文档**），然后导航到你要移动或复制文件的目标位置。最后，再次右键单击并选择**粘贴**。\n\
  \n#### 查看你的照片\n\n现在照片已存入 iPhone，你有几种很酷的方式来浏览它们并向他人展示。\n\n##### 从照片图标启动\n\n如果你喜欢使用**照片**应用，你可能希望将其图标放置在底座\
  \ Dock 中以便快速访问（如果还没有的话），参见第 6 章：“图标与文件夹”。\n\n要开始使用照片，请轻点**照片**图标。\n\n![images](img/U2020.jpg)\n\
  \n第一个屏幕会显示你的相簿，这些相簿是在你设置 iPhone 并与 iCloud 或 iTunes 同步时创建的。在第 3 章：“使用 iCloud、iTunes\
  \ 等进行同步”中，我们向你展示了如何选择要与 iPhone 同步的照片。当你对电脑上的资料库进行更改时，它们会自动在 iPhone 上更新。\n\n如果你正在使用\
  \ iCloud 的“照片流”功能，这里也是你找到照片流图像的地方。\n\n![images](img/U2021.jpg)\n\n##### 选择资料库\n\n\
  从**相簿**页面，轻点某个资料库按钮以显示该相簿中的照片。在右侧的图片中，我们轻点了一个照片资料库，屏幕立即切换显示该资料库中图片的缩略图。\n\n上下拖动手指以查看资料库中的所有图片。你也可以向上或向下轻扫以快速浏览资料库中的图片。你也可以向上或向下轻扫以快速浏览整个相簿。\n\
  \n![images](img/U2022.jpg)\n\n##### 管理资料库\n\niOS 5 引入了直接在 iPhone 上添加新相簿、在相簿间移动照片以及删除相簿的功能。\n\
  \n按照以下步骤添加新相簿：\n1. 轻点右上角的**编辑**按钮。\n2. 轻点左上角出现的**添加**按钮。\n3. 为新相簿输入名称。\n4. 轻点右上角的**完成**。\n\
  \n按照以下步骤删除相簿：\n1. 轻点右上角的**编辑**按钮。\n2. 轻点你想要删除的相簿左侧的红色**圆形**图标。\n3. 轻点红色的**删除**按钮进行确认。\n\
  \n![images](img/U2023.jpg)\n\n最后，按照以下步骤在相簿之间移动照片：\n1. 轻点左下角的**操作**按钮。\n2. 轻点你想要移动的图片。\n\
  3. 如果你不小心轻点了一张图片，只需再次轻点它即可取消选择。\n4. 轻点底部的**添加到**按钮。\n5. 如果你已有想要移入图片的相簿，请选择**添加到现有相簿**。或者，如果你现在想创建一个新相簿，可以选择**添加到新相簿**。\n\
  \n### 处理单张图片\n\n找到你想查看的图片后，只需轻点它。图片随后会加载到屏幕上。\n\n**注意：** 如果你的照片是以横向模式拍摄的，它们通常不会填满\
  \ iPhone 的整个屏幕。\n\n**提示：** 这里的照片是以横向模式拍摄的；要全屏查看，只需将 iPhone 侧转或双击即可。\n\n![images](img/U2024.jpg)\n\
  \n#### 在图片之间切换\n\n使用轻扫手势可以在图片之间切换。只需在屏幕上向左或向右滑动手指，你就可以浏览图片。\n\n**提示：** 缓慢滑动手指可以更平滑地在图片间切换。\n\
  \n![images](img/U2025.jpg)\n\n当到达相簿末尾时，只需轻点屏幕一次，你会在左上角看到一个标有相簿名称的标签。轻点该标签，你将返回该特定相簿的缩略图页面。\n\
  \n![images](img/U2026.jpg)\n\n要返回主相簿页面，请轻点左上角标有**相簿**的按钮。\n\n![images](img/U2027.jpg)\n\
  \n### 放大和缩小图片\n\n如本书“入门”部分所述，在 iPhone 上有两种放大和缩小图片的方法：双击和双指捏合。\n\n#### 双击\n\n顾名思义，双击是指在屏幕上快速轻点两次以放大图片（参见图\
  \ 20–3）。你会在双击的位置放大。要缩小，只需再次双击一次。\n\n有关双击的更多信息，请参见第 1 章：“入门”。\n\n![images](img/2003.jpg)\n\
  \n**图 20–3.** *双击图片以放大查看*\n\n\n\n\n## 捏合缩放\n\n正如第 1 章：“入门”中所述，捏合是一种更为精确的放大方式。虽然双击只能将画面放大或缩小到固定级别，但捏合操作却能让您将画面进行小幅或较大幅度的缩放。\n\
  \n要进行捏合缩放，请将拇指和食指并拢放在屏幕上，然后缓慢地（在保持手指触屏的情况下）将它们分开，从而使图像变大。若要缩小，则先将拇指和食指分开放在屏幕上，再将它们并拢。\n\
  \n**注意**：一旦您通过任意一种方式激活了缩放功能，在将照片恢复为标准尺寸之前，您将无法轻松地在照片间滑动浏览。\n\n## 观看幻灯片放映\n\n如果您愿意，可以将相册中的照片以幻灯片形式进行观看。只需轻点屏幕一次，即可调出屏幕软键。在屏幕中央，您会看到一个`播放幻灯片`按钮——轻点它即可开始播放幻灯片。您可以从正在观看的任何一张照片开始播放幻灯片。\n\
  \n![images](img/U2028.jpg)\n\n在`设置`应用中选取`照片`，可以调整每张照片在屏幕上停留的时间以及其他设置，例如`重复`和`随机播放`（请参见图\
  \ 20–4）。若要结束幻灯片放映，只需轻点屏幕即可。\n\n![images](img/2004.jpg)\n\n**图 20–4.** *配置幻灯片放映*\n\
  \n## 将照片用作 iPhone 墙纸\n\n我们在第 8 章：“个性化与安全性”中向您展示了如何选取并将一张照片用作 iPhone 墙纸（以及其他墙纸选项）。\n\
  \n**注意：**您可以为`主屏幕`和`锁定屏幕`设置不同的照片，也可以为两者使用同一张照片。\n\n## 通过电子邮件或推特发送照片\n\n只要您拥有有效的网络连接（Wi-Fi\
  \ 或 3G；请参见第 4 章：“连接到网络”），就可以通过电子邮件发送相册中的任何照片，或将其发布到推特。点击缩略图栏上的`选项`按钮——这是底部一行软键中最左侧的那个按钮。如果您没有看到这些图标，请轻点屏幕一次。\n\
  \n![images](img/U2029.jpg)\n\n若要邮寄照片，请选择`电子邮件照片`选项，`邮件`应用将自动启动。\n\n像您在第 17 章：“使用电子邮件沟通”中那样轻点`收件人`字段，然后选择要接收照片的联系人。轻点蓝色的`加号`\
  \ (**`+`**) 按钮以添加联系人。\n\n输入主题和正文，然后轻点右上角的`发送`——仅此而已。\n\n![images](img/U2030.jpg)\n\
  \n若要发布照片到推特，请选择`推特`选项，一个`推特`表单将自动出现。只需填写您想随照片一同显示的消息，然后点击`发送`按钮。\n\n**注意：**只有在您在`设置`应用中输入了您的推特用户名和密码后，`推特`选项才会出现。\n\
  \n![images](img/U2031.jpg)\n\n## 一次共享、复制、打印或删除多张照片\n\n如果您有多张照片需要同时进行电子邮件发送、短信发送、复制、打印或删除，可以在缩略图视图中进行操作：\n\
  \n1.  **点击左下角的`操作`按钮。**\n\n![images](img/U2032.jpg)\n\n2.  点击您想要选择的照片。\n3.  如果您不小心点选了某张照片，只需再次点击即可取消选择。\n\
  4.  从屏幕底部选择一项操作：`共享`（电子邮件、短信或打印）、`复制`、`添加到`（其他相册）或`删除`。\n\n![images](img/U2033.jpg)\n\
  \n**注意：**`复制`功能允许您将多张照片复制并粘贴到电子邮件或其他应用中。`共享`会将图像重命名为 `photo.png`，而`复制粘贴`则会在 DCIM\
  \ 文件夹的文件名后添加 `.png`。\n\n在本书出版时，您无法同时共享多个视频，也无法同时共享超过五张照片。这在未来的软件版本中可能会有所改变。\n\n\
  ## 将照片分配给联系人\n\n第 18 章：“通讯录与备忘录”向您展示了如何在编辑联系人时添加照片。您也可以找到一张喜欢的照片并将其分配给某个联系人。首先，找到您想要使用的照片。\n\
  \n如同设置墙纸和通过电子邮件发送照片时一样，点击`操作`按钮——这是上方一行软键中最右侧的按钮。如果您没有看到这些图标，请轻点屏幕一次。\n\n当您触摸`操作`按钮时，会看到一个下拉选项列表：`电子邮件照片`、`信息`、`指定给联系人`、`用作墙纸`、`推特`和`打印`。\n\
  \n![images](img/U2034.jpg)\n\n触摸`指定给联系人`按钮。\n\n屏幕上将显示您的通讯录。您可以在顶部的`搜索`栏中进行搜索，或者直接滚动浏览您的联系人。\n\
  \n找到您想要将照片添加为接收者的联系人后，触摸该联系人姓名。\n\n![images](img/U2035.jpg)\n\n随后您将看到`移动和缩放`屏幕。拖拽照片以移动它；使用捏合手势进行放大或缩小。\n\
  \n当照片调整到您满意的位置和大小后，触摸`设定照片`按钮，即可将照片分配给该联系人。\n\n![images](img/U2036.jpg)\n\n**注意：**您将返回到“照片图库”，而不是通讯录。如果您想再次确认照片已成功分配给联系人，请退出`照片`应用，启动`通讯录`应用，然后搜索该联系人。\n\
  \n## 在 Apple TV 上查看照片\n\n第 5 章：“AirPlay 与蓝牙”向您展示了如何使用 Apple 的 AirPlay 功能，通过本地 Wi-Fi\
  \ 网络将 iPhone 上的视频串流到 Apple TV。Apple 已将相同的功能内置到了“照片”应用中，因此您可以轻松地将照片投送到您的大屏幕电视上。\n\
  \n请按照以下步骤将照片发送到您的 Apple TV：\n\n1.  点击`AirPlay`按钮。\n2.  从来源列表中选择`Apple TV`。\n\n要切换到下一张照片，只需从右向左滑动，就像在\
  \ iPhone 上切换照片一样。要回到上一张照片，则从左向右滑动。\n\n要切换回在 iPhone 上查看照片，请再次点击`AirPlay`按钮，并从来源列表中选择`iPhone`。\n\
  \n![images](img/U2037.jpg)\n\n### 删除照片\n\n您可能会好奇为什么无法从 iPhone 上删除某些照片（`垃圾桶`图标不见了）。\n\
  \n例如，您会注意到，任何从 iTunes 同步过来的照片，其`垃圾桶`图标都不可见。您只能从电脑的资料库中删除此类照片。下次同步您的 iPhone 时，它们将被删除。\n\
  \n![images](img/U2038.jpg)\n\n当您浏览“已存储的照片”（此文件夹不与 iTunes 同步，而是由您从电子邮件中存储或从网络下载的照片组成）中的照片时，您会看到底部图标栏中有一个`垃圾桶`图标。当您从“照片图库”或其他同步相册中查看照片时，不会出现此`垃圾桶`图标。\n\
  \n如果您看不到底部一行图标，请轻点照片一次以激活它们，然后点击`垃圾桶`图标。系统将提示您确认删除照片。\n\n触摸`删除照片`，该照片将从您的 iPhone\
  \ 上删除。\n\n![images](img/U2039.jpg)\n\n### 从网站下载照片\n\n我们已经向您展示了如何将照片从电脑传输到 iPhone，以及如何从电子邮件中保存照片。您还可以直接从网络上下载并将照片保存到\
  \ iPhone 上。\n\n**警告：**我们强烈建议您在从网络上下载和保存图像时尊重图像版权法。除非网站标明图片是免费的，否则在下载和保存任何图片之前，您应征得网站所有者的同意。\n\
  \n\n\n\n### 查找并下载图片\n\niPhone 可以轻松地从网页上复制和保存图像。当你正在寻找一张新图片用作 iPhone 墙纸时，这个功能会非常方便。\n\
  \n首先，轻点 `Safari` 网页浏览器图标，输入搜索词“iPhone 壁纸”，找到一些可能包含有趣图片的网站。（关于此主题的更多帮助，请参阅第 16 章：“Safari\
  \ 网页浏览器”。）\n\n![images](img/U2040.jpg)\n\n一旦找到要下载并保存的图片，请长按它，调出包含 `保存图像`（以及其他选项）的新菜单，如图\
  \ 21-5 所示。选择此选项即可将图片保存到你的 `已存储的照片` 相簿中。\n\n![images](img/2005.jpg)\n\n**图 20–5.**\
  \ *从网页保存图像*\n\n现在，轻点你的`照片`图标，你应该就能在`相机胶卷`相簿中看到这张图片了。\n\n![images](img/U2041.jpg)\n\
  \n"
- "# 第 21 章\n\n## 地图\n\n在你的 iPhone 上使用地图非常方便，而且相当令人惊叹。在本章探索 `地图` 应用强大功能的过程中，你将了解如何在地图上找到自己的位置，并获取前往几乎任何地方的方向指引。你还会学到如何在`标准`、`卫星`和`混合`视图之间切换。你还会看到，如果需要找到前往某地的最佳路线，你可以通过\
  \ `地图` 选项中的`显示交通状况`按钮查看实时路况。如果你想找到离目的地最近的比萨店、高尔夫球场或酒店，这也非常容易。而且，你可以直接从 iPhone 使用谷歌街景来帮助你抵达目的地。你也可以轻松地将已在地图上标注的地址添加到你的联系人中。还有一个好玩的功能——数字指南针。\n\
  \n### 地图入门\n\niPhone 的美妙之处在于，它的应用程序都是设计成可以协同工作的。你已经看到了你的联系人如何与`地图`应用相关联；只需回顾一下第\
  \ 18 章：“联系人与备忘录”。\n\n![images](img/U2101.jpg)\n\n`地图`应用由移动地图技术领导者谷歌地图提供技术支持。`地图`让你能够定位自己的位置、获取路线、搜索附近地点、查看路况等等。\n\
  \n只需轻点`地图`图标即可开始使用。\n\n#### 确定你的位置（蓝点）\n\n当你启动`地图`应用时，可以令其从你当前的位置开始。按照以下步骤将当前位置设置为默认起始位置：\n\
  \n1.  轻点左下角的蓝色小`箭头`图标。\n\n    ![images](img/U2102.jpg)\n\n    ![images](img/U2103.jpg)\n\
  \n2.  `地图`会请求使用你当前的位置——轻点`允许`或`不允许`。\n\n    我们建议选择`允许`，这将使获取从你当前位置出发或到达你当前位置的路线变得容易得多。\n\
  \n## 更改地图视图\n\n`地图`的默认视图是`标准`视图，这是一种基本地图，显示叠加了街道名称的通用背景。地图还可以显示`卫星`视图，或是`卫星`与`标准`视图的组合，称为`混合`视图。最后，如果你搜索了会提供多个结果的内容（例如当地的咖啡店），`列表`视图会很方便。如果你查询了前往某地的路线，它也同样好用。你可以按照以下步骤在所有视图之间切换：\n\
  \n1.  轻点地图右下角翻起的边缘。\n2.  地图的角落会翘起，显示出用于切换视图、交通状况、图钉等功能的按钮。\n3.  轻点你想要切换到的视图（参见图\
  \ 21–1）：\n\n    *   `标准`是带有街道名称的常规地图。\n    *   `卫星`是不带街道名称的卫星图片。\n    *   `混合`是`卫星`和`标准`视图的结合；即带有街道名称的`卫星`视图。\n\
  \    *   `列表`仅当你的搜索产生多个结果（例如“星巴克”）或你查询了路线时才可用。\n\n![images](img/2101.jpg)\n\n**图\
  \ 21–1.** *`地图`应用中可用的各种视图：右上起顺时针方向：标准、卫星、混合和列表。*\n\n### 查看交通状况\n\n你的`地图`应用不仅能告诉你如何到达某地，还能沿途查看交通状况。此功能目前仅在美国得到支持。按照以下步骤查看给定路线的交通状况：\n\
  \n1.  轻点地图右下角以查看选项。\n2.  轻点`显示交通状况`。\n\n![images](img/U2104.jpg)\n\n在高速公路上，如果有交通状况，你通常会看到黄色灯光而不是绿色灯光。有时，黄色灯光可能会闪烁，以提醒你注意交通延误。\n\
  \n你甚至可能会看到`施工人员`图标来指示施工区域。\n\n`地图`在主要街道和高速公路上使用颜色来指示交通行驶速度：\n\n*   绿色 = 50 英里/小时或更快\n\
  *   黄色 = 25–50 英里/小时\n*   红色 = 低于 25 英里/小时\n*   灰色（或无色）= 当前无交通数据\n\n## 搜索任何内容\n\n\
  由于`地图`与谷歌地图相连，你可以搜索并找到几乎任何东西：特定的地址、商业类型、城市或其他兴趣点，如图 21–2 所示。按照以下步骤搜索特定地点：\n\n1.\
  \  轻点屏幕右上角的`搜索`栏。\n2.  输入你想要在 iPhone 上显示地图的地址、兴趣点或城镇和州。\n\n![images](img/U2105.jpg)\n\
  \n### 谷歌地图搜索技巧\n\n你可以在`搜索`栏中输入几乎任何内容，包括以下内容：\n\n*   名字、姓氏或公司名称（以匹配你的通讯录列表）\n*  \
  \ 街道地址（部分或全部，例如“123 Main Street, City”）\n*   机场名称（例如“Orlando Airport”，意为寻找奥兰多机场）\n\
  *   职业或行业名称（例如 Plumber, painter, or roofer，意为寻找水管工、油漆工或屋顶工）\n*   高尔夫球场 + 城市（用于查找当地的高尔夫球场）\n\
  *   电影 + 城市或邮政编码（用于查找当地的电影院）\n*   比萨 32174（用于搜索邮政编码为 32174 区域的当地比萨店）\n*   95014（美国加利福尼亚州苹果公司总部的邮政编码）\n\
  *   出版社名称（例如 Apress）\n\n![images](img/2102.jpg)\n\n**图 21–2.** *在`地图`应用中搜索*\n\n\
  要输入数字，请轻点键盘上的 `123` 键。要输入字母，请轻点 `ABC` 键切换回字母键盘。\n\n## 地图选项\n\n现在你的地址已显示在`地图`屏幕上，按照以下步骤访问可用选项：\n\
  \n1.  轻点地址旁边的蓝色`箭头`图标 ![images](img/U2106.jpg) 以查看其中一些选项。\n2.  如果你已为某位联系人标注了地图，你将看到联系人详情，如图\
  \ 21–3 所示。`地图`也会为特定搜索提取联系信息。你还可以获取路线、共享位置或添加位置为书签。\n\n**注意：** 你也可以长按地址以调出`拷贝`弹出菜单。\n\
  \n![images](img/2103.jpg)\n\n**图 21–3.** *轻点`信息`按钮以查看已标注地图的联系人详情*\n\n\n\n### 使用书签\n\
  \n`Maps`中的书签功能与`Safari`中的书签类似。书签只是为你访问或标记过且希望日后记住的地点创建一个记录。查看书签总是比重新执行一次搜索要方便得多。\n\
  \n## 添加新书签\n\n将某个位置添加为书签是简化再次查找该地点的绝佳方法：\n\n1.  在地图上标记一个位置，如图 21-4 所示。\n2.  点击地址旁边的蓝色`信息`图标。\n\
  3.  点击`添加到书签`。\n\n   ![images](img/2104.jpg)\n\n   **图 21-4.** *添加书签*\n\n4.  编辑书签名称，使其简短且易于识别——在此例中，我们将地址编辑为简单的`格洛丽亚的店铺`。\n\
  5.  完成后，只需点击右上角的`存储`即可。\n\n**提示**：你可以像在`通讯录`中搜索姓名一样搜索书签名称。\n\n## 访问和编辑书签\n\n要查看你的书签，请按以下步骤操作：\n\
  \n1.  点击顶部行中`搜索`窗口旁边的`书签`图标。\n2.  点击任意书签即可立即跳转至该位置。\n3.  点击书签顶部的`编辑`按钮来编辑或删除你的书签。\n\
  \    -   要重新排列书签，请触摸并拖动每个书签的右边缘向上或向下移动。\n    -   要编辑书签的名称，请点击它并重新输入名称。编辑完名称后，点击左上角的`书签`按钮返回书签列表。\n\
  \    -   要删除书签，请在书签上向左或向右滑动，然后点击`删除`按钮。\n4.  编辑完书签后，点击`完成`按钮。\n\n![images](img/U2107.jpg)\n\
  \n## 将已标记位置添加到通讯录\n\n将你标记过的位置添加到通讯录列表非常简单：\n\n1.  标记一个地址。\n2.  点击`箭头`/`信息`图标。\n\
  3.  点击`添加到通讯录`。 ![images](img/U2108.jpg)\n4.  点击`创建新联系人`或`添加到现有联系人`。\n5.  如果你选择`添加到现有联系人`，则可以滚动或搜索你的联系人并选择一个姓名。该地址将自动添加到该联系人中。\n\
  \n## 搜索附近商家\n\n按照以下步骤搜索你当前位置附近的商家：\n\n![images](img/U2109.jpg)\n\n1.  在地图上标记一个位置，或使用蓝点表示你的当前位置。\n\
  2.  点击`搜索`窗口。假设你想搜索最近的披萨店，于是输入“披萨”。这将会在地图上标记出所有当地的披萨店。\n3.  请注意，每个标记的位置左侧可能有一个`街景`图标，右侧有一个`信息`图标。\n\
  4.  你可以双击放大，或双指捏合或张开屏幕来缩小或放大。\n5.  与任何已标记的位置一样，点击蓝色的`信息`图标会显示所有详细信息，包括披萨店的电话号码、地址和网站，如图\
  \ 21-5 所示。\n6.  如果你需要前往该餐厅的路线，只需点击`路线到这里`，系统会立即计算出一条路线。\n\n![images](img/2105.jpg)\n\
  \n**图 21-5.** *使用信息屏幕对已标记位置进行更多操作。*\n\n**注**：如果你点击`主页`链接，将会退出`地图`应用，并启动`Safari`。完成后，你需要重新启动`地图`应用。\n\
  \n## 放大和缩小\n\n你可以像往常一样通过双击和双指捏合来进行放大和缩小。要使用双击放大，只需像在网页或图片上那样双击屏幕即可。\n\n## 放置图钉\n\
  \n假设你正在查看地图，发现了一些你想将其设为书签或目的地的东西。\n\n在此示例中，我们正在放大并查看大波士顿地区。我们偶然发现了芬威公园，并决定将它添加到书签中会是个好主意，于是我们在其上放置了一个图钉。按照以下步骤在地图上放置图钉：\n\
  \n1.  标记一个位置，或将地图移动到你想要放置图钉的位置。\n2.  点击地图的右下角。\n\n   ![images](img/U2110.jpg)\n\n\
  \   ![images](img/U2111.jpg)\n\n3.  点击`放置图钉`。\n4.  现在，通过触摸并按住图钉，在地图上拖动它。在我们的示例中，我们将其直接移动到了芬威公园上。\n\
  \n   ![images](img/U2112.jpg)\n\n5.  要移除已放置的图钉或执行其他操作，请点击图钉上方弹出窗口旁边的蓝色`箭头`图标![images](img/U2113.jpg)。如果弹出窗口消失了，请点击图钉使其重新出现。\n\
  \n   ![images](img/U2114.jpg)\n\n6.  在`信息`屏幕中，你可以获取`路线`、`移除图钉`、`添加到通讯录`、`共享位置`或`添加到书签`。\n\
  \n**提示**：**查找地图上任意位置的街道地址**\n\n当你放置图钉时，谷歌地图会显示实际的街道地址。如果你通过查看`卫星`或`混合`视图找到了某个位置，但需要获取实际的街道地址，这项功能会非常方便。\n\
  \n放置图钉也是追踪你停车位置的好方法，尤其是在不熟悉的地方，这特别有用。\n\n## 使用街景\n\n谷歌街景（参见图 21-6）是 iPhone 上`地图`应用一个非常有趣的功能。谷歌一直在致力于拍摄美国及其他地区几乎每个地址的照片。这些图片随后被输入其数据库，当你想要查看目的地或航点的图片时，显示的就是这些内容。\n\
  \n**注**：谷歌街景目前仅适用于少数国家：北美大部分地区、西欧、澳大利亚以及现在的南非。\n\n如果某个位置有街景可用，你会在地图上该地址或书签的左侧看到一个橙色的`人物`图标。\n\
  \n![images](img/U2115.jpg)\n\n在这个例子中，我们想要查看位于科德角的加里的妻子格洛丽亚的店铺的街景：\n\n1.  要标记地址，我们点击了通讯录列表中格洛丽亚姓名下的公司地址。我们也可以通过将地址输入`搜索`窗口、搜索某种类型的商家或在`通讯录`应用中点击该地址来标记它。\n\
  2.  `街景`图标显示在格洛丽亚名字的左侧。\n3.  我们点击该图标，立即切换到该地址的街景视图。非常酷的是，我们可以通过向左、向右、甚至向上或向下滑动来\
  \ 360 度旋转浏览屏幕，查看我们目的地旁边和街对面的地方。\n4.  要返回地图，我们只需点击屏幕右下角。\n\n![images](img/2106.jpg)\n\
  \n**图 21-6.** *使用谷歌街景*\n\n## 获取路线\n\n`地图`应用最有用的功能之一就是你可以轻松找到前往或离开任何地点的路线。假设我们想获取从当前位置（格洛丽亚的店铺）到波士顿芬威公园的路线。\n\
  \n### 先点击当前位置按钮\n\n要查找前往或离开你当前所在位置的路线，你无需浪费时间输入当前地址——iPhone 会默认你想从当前位置开始规划路线，除非你另行指定。你可能需要点击`位置`按钮几次，直到屏幕上出现蓝点。\n\
  \n现在你可以执行以下任一操作：\n\n-   点击底部的`路线`按钮。\n-   像我们之前做的那样，点击蓝色的`箭头`，然后选择`从这里出发的路线`（参见图\
  \ 21-7）。\n\n![images](img/2107.jpg)\n\n**图 21-7.** *选择`从这里出发的路线`，然后选择`书签`*\n\n\n\
  \n### 选择起点或终点\n\n按照以下步骤选择起点或终点，然后挑选一条建议路线：\n\n1.  点击图钉上方的蓝色`箭头`图标。\n2.  轻点`路线从这里出发`。\n\
  3.  轻点`书签`按钮。\n4.  轻点`书签`、`最近访问`或`通讯录`以查找目的地。在本例中，我们轻点了`书签`，然后选择`芬威公园`。\n\n    ![images](img/U2116.jpg)\n\
  \n    **注意**：一旦你轻点`路线从这里出发`按钮，最近的搜索记录将自动显示（参见图 21-5）。你也可以点击`目的地`框并输入一个地址。\n    ![images](img/U2117.jpg)\n\
  \n5.  选定目的地后，路线规划界面将带您进入总览屏幕。在我们的示例中，我们看到的是从苹果公司 1 Infinite Loop 总部到帕罗奥图苹果商店的路线规划界面。\n\
  6.  起点处会落下一个绿色图钉，终点处（本例中是芬威公园）会落下一个红色图钉。\n7.  一条亮蓝色的线条将连接这两个图钉，为您显示路线。如果存在多条路线，其他路线将以浅蓝色显示。\n\
  8.  轻点一条灰色路线即可将其选中。选中后，它将会变为亮蓝色，而其他任何路线都将褪为浅蓝色。\n\n![images](img/U2118.jpg)\n\n\
  ### 查看路线\n\n在开始行程之前，您将在屏幕右上角看到一个`开始`按钮。轻点`开始`按钮，路线指引便会开始。`开始`按钮会变为`箭头`按钮，允许您在行程中的各个步骤之间切换。\n\
  \n![images](img/U2119.jpg)\n\n![images](img/U2120.jpg)\n\n如图 21-8 所示，您可以在地图上以路径形式或列表形式查看路线。\n\
  \n![images](img/2108.jpg)\n\n**图 21-8.** *两种查看路线的方式*\n\n您可以用手指滑动屏幕来查看路线，或者只需轻点底部的`箭头`按钮\
  \ ![images](img/U2121.jpg)，即可分步快照显示路线。\n\n您也可以轻点右下角的`卷页`按钮，然后轻点`列表` ![images](img/U2122.jpg)\
  \ 按钮，这将显示详细的分步路线指引。\n\n### 切换路线\n\n如前面示例中的第 6 和第 7 步所述，如果存在多条路线，`地图`应用会以亮蓝色线标记其最佳推荐路线，并将其标识为`路线\
  \ 1`。如果还有其他可行路线，地图会以浅蓝色线标记它们。轻点一条灰色线会将其变为亮蓝色，并标记其对应的编号——例如`路线 2`。\n\n如果您根据近期经验得知，由于施工或其他原因导致路线\
  \ 1 不太理想，或者您需要在途中某个不在推荐路线 1 上的地方停靠，那么切换到另一条路线是不错的选择。\n\n![images](img/U2123.jpg)\n\
  \n### 切换驾车、公交和步行路线\n\n在开始导航前，您可以通过轻点路线界面顶部蓝色栏左侧的图标来选择您是驾车、使用公共交通还是步行，如图 21-9 所示。\n\
  \n![images](img/2109.jpg)\n\n**图 21-9.** *选择出行方式*\n\n### 反转路线\n\n要反转路线，请点击位于顶部`起点`和`终点`字段之间的`反转`\
  \ ![images](img/U2124.jpg) 按钮。如果您不擅长自行反转方向，或者您的路线包含大量单行道，此功能将会非常有用。\n\n## 地图选项\n\
  \n![images](img/U2125.jpg)\n\n目前，唯一会影响`地图`应用的设置是“定位服务”，这对于确定您当前的位置至关重要。请按照以下步骤调整`地图`应用的设置：\n\
  \n![images](img/U2126.jpg)\n\n1.  轻点`设置`图标。\n2.  轻点`通用`标签页。\n3.  现在，找到大约在页面中间的`定位服务`开关。将此开关拨至`打开`位置，以便`地图`可以大致确定您的位置。\n\
  \n**注意：** 保持`定位服务`开关`打开`会略微缩短电池续航时间。如果您从不使用`地图`或不关心您的位置，请将其设为`关闭`以节省电池电量。\n\n##\
  \ 使用数字指南针\n\niPhone 内置了非常酷的数字指南针功能。当您需要确定方位并找出哪个方向是北时，这会很有帮助。\n\n### 校准和使用数字指南针\n\
  \n在使用数字指南针之前，您需要先对其进行校准。通常您只需在首次使用时校准一次。请按照以下步骤操作：\n\n1.  像往常一样启动`地图`。\n2.  轻点两次当前位置按钮——它会从\
  \ ![images](img/U2127.jpg) 变为 ![images](img/U2128.jpg)。\n3.  您会看到屏幕上出现一个`数字指南针`图标，如图\
  \ 21-10 所示。\n4.  首次使用数字指南针功能时，屏幕上会出现`校准`符号。![images](img/U2129.jpg)\n5.  按照屏幕提示，以“8”字形移动您的\
  \ iPhone。\n\n    **注意**：在完成校准过程时，iPhone 可能会要求您远离任何干扰源。\n\n6.  将 iPhone 水平握持，使其与地面平行。如果校准成功，指南针将转动并指向北方。\n\
  \n![images](img/2110.jpg)\n\n**图 21-10.** *使用数字指南针功能*\n\n"
- "# 第 22 章\n\n## 您设备上的 iTunes\n\n在本章中，您将学习如何直接在 iPhone 上使用`iTunes`应用查找、购买和下载媒体内容。通过`iTunes`，您将能够下载音乐、影片、电视节目、播客和有声读物。您还将了解\
  \ iTunes 中`iTunes U`板块提供的来自顶尖大学的免费教育内容，以及如何兑换 iTunes 礼品卡。\n\n我们中的一些人还记得当年新单曲或专辑发行时去唱片店的情景。浏览我们想要的所有音乐——先是黑胶唱片集，然后是磁带，最后是\
  \ CD——那是一种令人兴奋的感觉。\n\n随着 iPhone 的出现，那些日子早已一去不复返。音乐、影片、电视节目以及更多内容都可以直接从 iPhone 上获取。\n\
  \niTunes 是一个音乐、视频、电视节目、播客等内容的商店。您能在 iPhone 上消费的几乎所有类型的媒体都可以从 iTunes 商店中购买或租赁（而且通常可以免费获取）。\n\
  \n### iTunes 入门\n\n在本书的前面部分，我们向您展示了如何将电脑上 iTunes 中的音乐导入 iPhone（参见第 3 章：“与 iCloud、iTunes\
  \ 及更多服务同步”）。iTunes 的一大优点是，商店让您很容易就能购买或获取音乐、视频、播客和有声读物，然后在几分钟内直接在 iPhone 上使用它们。\n\
  \niPhone 允许您直接在设备上访问 iTunes 网站（移动版）。在您购买或索取免费项目后，它们将被下载到 iPhone 上的`音乐`或`视频`应用中。如果您有\
  \ iCloud 并开启了自动下载，您购买的任何音乐都会自动下载到您的其他 iOS 设备和电脑上的 iTunes。下次您与桌面 iTunes 资料库同步时，影片也会同步过去。\n\
  \n#### 需要网络连接\n\n您需要一个有效的互联网连接（Wi-Fi 或 3G/蜂窝网络）才能访问 iTunes 商店。有关更多信息，请查阅第 4 章：“网络连接”。\n\
  \n\n\n#### 启动 iTunes\n\n当你第一次拿到 iPhone 时，`iTunes` 是主屏幕（`Home`）第一页上的图标之一。轻点 `iTunes`\
  \ 图标，你将会进入 iTunes Store 的移动版页面。\n\n![images](img/U2201.jpg)\n\n**注意：** `iTunes`\
  \ 应用程序会频繁更新。由于 `iTunes` 应用本质上是一个网站，因此从我们编写本书到你实际在 iPhone 上查看它之间，它可能会发生一些变化。某些屏幕图像或按钮可能会与本书中显示的略有不同。\n\
  \n此外，`iTunes` 的内容在不同国家/地区之间可能存在显著差异。根据你所在的位置，你可能无法访问电影、电视节目或其他媒体内容。不过，苹果公司正持续将 `iTunes`\
  \ 内容扩展到越来越多的地区，所以请时不时回来查看一下。\n\n#### 浏览 iTunes\n\n`iTunes` 应用使用的图标与 iPhone 上的其他程序类似，因此操作起来相当简单。顶部有三个按钮，底部有五个软键，可为你提供帮助。你可以自定义这些软键，我们将在下一节中向你展示如何操作。请注意右侧图片中底部的软键。在\
  \ `iTunes` 中滚动与其他程序中的滚动方式相同；向上或向下移动手指即可查看可用的选项。\n\n![images](img/U2202.jpg)\n\n\
  ### 自定义 iTunes 软键\n\n自定义 iTunes 屏幕底部显示的软键很简单。轻点左下角的 `More`（更多）软键。然后轻点右上角的 `Edit`（编辑）。\n\
  \n![images](img/U2203.jpg)\n\n现在，你可以通过将顶部任意图标拖放到底部的软键工具栏上来更改软键。你放置的任何项目都会替换掉原来在那个位置上的图标。\n\
  \n轻点 `Done`（完成）以完成更改并返回到 `iTunes`。\n\n![images](img/U2204.jpg)\n\n### 使用“最新发布”、“前十榜单”和“类型”查找音乐\n\
  \n在 iTunes 音乐商店屏幕的顶部有三个按钮：`Featured`（精选）、`Top Charts`（排行）和 `Genius`（天才）。默认情况下，当你启动\
  \ `iTunes` 时，会显示 `Featured`（精选）选项。\n\n#### 前十榜单：热门内容\n\n如果你想知道某个特定类别里的热门内容，可以浏览\
  \ `Top Tens`（前十榜单）下的类别。轻点顶部的 `Top Tens`（前十榜单），然后轻点一个类别或类型，即可查看该类别中的热门内容。\n\n**注意：**\
  \ `Top Tens`（前十榜单）类别中的项目销量很好，但这并不意味着它们一定会符合你的口味。在付费之前，务必先预览项目并查看其评价。\n\n![images](img/U2205.jpg)\n\
  \n#### 类型：音乐的种类\n\n轻点 `Genres`（类型）按钮，可以按类型浏览音乐。如果你有最喜欢的音乐类型，并且只想浏览该类别，这个功能特别有用。\n\
  \n这里有大量的类型可供浏览；就像在其他 iPhone 应用中一样，向下滚动列表即可。\n\n![images](img/U2206.jpg)\n\n继续浏览音乐，直到你找到想要预览或购买的内容。\n\
  \n#### 浏览视频（电影）\n\n轻点顶部的 `Movies`（电影）、`TV Shows`（电视节目）或 `Movie Videos`（音乐视频）按钮，可以浏览所有与视频相关的项目。\n\
  \n![images](img/U2207.jpg)\n\n你也可以用手指一直滚动到页面底部，查看那里的链接，特别是以下链接：\n\n*   `Top Tens`（前十榜单）\n\
  *   `Genres`（类型）\n\n**提示：** 在大多数页面的最底部，你还可以兑换礼品卡，或者退出你的 Apple ID 并登录另一个 Apple ID\
  \ 账户。如果有人（可能是你的孩子）更改了 Apple ID，而你想换回你自己的账户时，这个功能就很有用。\n\n轻点任何电影或视频，可以查看更多详细信息或预览该选项。你可以选择租借或购买某些电影和电视节目：\n\
  \n![images](img/U2208.jpg)\n\n*   `Rentals`（租赁）：某些电影可以按固定天数租借。点击此按钮即可租借一部作品。\n\n\
  \    **注意：** 美国的租赁期限是 24 小时，加拿大的租赁期限是 48 小时。其他国家的租赁期限可能略有不同。\n\n*   `Buy`（购买）：点击此按钮，你可以购买并永久拥有该电影或电视节目。\n\
  \n![images](img/U2209.jpg)\n\n#### 查找电视节目\n\n查看完电影后，轻点顶部的 `TV Shows`（电视节目）按钮，即可查看你最喜欢的节目有哪些可用内容。\n\
  \n![images](img/U2210.jpg)\n\n![images](img/U2211.jpg)\n\n当你轻点一个电视剧集时，你会看到可用的单集。轻点任何一集即可查看\
  \ 30 秒的预览（更多关于观看视频的内容，请参见第 15 章：“观看视频”）。预览结束后，轻点 `Done`（完成）按钮。\n\n当你准备好后，可以购买单集或整部电视剧集。许多（但并非全部）电视剧集允许你单独购买单集，如图\
  \ 22–1 所示。\n\n例如，你可能想看一集《摩登家庭》，并补上你错过的首播集。在 iPhone 上可以快速轻松地完成这个操作。\n\n![images](img/2201.jpg)\n\
  \n**图 22–1.** *购买电视剧季或单集*\n\n**注意：** 还有一个 `Free TV Episode`（免费电视单集）类别，你可以在其中获取样本和额外内容。\n\
  \n#### iTunes 中的有声读物\n\n有声读物是享受书籍而无需阅读的好方法。一些朗读者非常有趣，听起来几乎就像在看电影。例如，哈利·波特系列的朗读者能够演绎几十种真正令人惊叹的声音。我们推荐你在\
  \ iPhone 上试听一本有声读物；有声读物尤其适合在飞机上，当你想要逃离其他乘客但又不想开灯的时候收听。\n\n**提示：** 如果你经常听有声读物，订阅\
  \ `Audible.com` 可以让你以更便宜的价格获得相同的内容。\n\n![images](img/U2212.jpg)\n\n如果你是有声读物的爱好者，一定要查看\
  \ iTunes 中的 `Audiobooks`（有声读物）版块。\n\n你可以点击顶部三个按钮之一来浏览 `Audiobooks`（有声读物）中的以下区域：\n\
  \n*   `Featured`（精选）\n*   `Top Tens`（前十榜单）\n*   `Categories`（类别）\n\n![images](img/U2213.jpg)\n\
  \n### iTunes U：优质的教育内容\n\n如果你喜欢教育内容，那么可以查看 `iTunes U` 版块。你将能够看到你的大学、学院或学校是否有自己的专区。\n\
  \n![images](img/U2214.jpg)\n\n我们仅浏览了几分钟就发现了一个很好的例子：一场由三位诺贝尔奖得主经济学家参与的圆桌讨论，由保罗·索尔曼（PBS\
  \ 新闻小时的财经记者）主持。你可以通过以下菜单导航找到这个播客：`iTunes U` ![images](img/U001.jpg) `Universities\
  \ & Colleges`（大学与学院） ![images](img/U001.jpg) `Boston University`（波士顿大学） ![images](img/U001.jpg)\
  \ `BUNIVERSE - Business`（商业） ![images](img/U001.jpg) `Audio`（音频）。和 `iTunes U` 中的许多内容一样，这个播客是免费的！\n\
  \n如果你所在位置有良好的无线信号，你可以轻点音频或视频项目的标题，然后在线流式播放收听或观看。但是，如果你的信号中断，你将丢失在视频中的播放位置。实际下载文件（如果可能）以供稍后观看有很多好处，其中最重要的是你可以对观看视频的体验拥有更多控制权。\n\
  \n\n\n### 下载以供离线查看\n\n如果你知道自己将要一段时间没有无线网络覆盖，例如在飞机上或地铁里，你会希望将内容下载下来，以便离线后再观看或收听。点击\
  \ `免费` 按钮，它变成 `下载` 按钮，然后再次点击它。接着，你可以通过点击屏幕右下角的 `下载` 按钮来监控下载进度（一些较大的视频文件可能需要十分钟或更长时间才能完成）。下载完成后，该项目会出现在你的“音乐”或“视频”应用中相应的区域。\n\
  \n**注意：** 任何大于 20MB 的文件都无法通过 3G 网络下载；对于较大的文件，你必须使用无线局域网。\n\n### 搜索 iTunes\n\n有时候你很清楚自己想要什么，但不确定它在哪里，或者你不想浏览或翻遍所有菜单。`搜索`\
  \ 工具就是为你准备的。\n\n在 `iTunes` 应用的右上角（几乎与所有其他 iPhone 应用一样），有一个 `搜索` 窗口。\n\n触摸 `搜索`，`搜索`\
  \ 窗口和设备键盘会弹出。一旦你开始输入，iPhone 就会开始将你的输入内容与可能的匹配项进行对照。\n\n![图片](img/U2215.jpg)\n\n\
  输入你正在搜索的艺术家、歌曲名称、视频名称、播客名称或专辑，iPhone 会显示详细的匹配结果。你可以搜索得泛泛，也可以搜索得非常具体。如果你只是想浏览某位艺术家的所有特定歌曲，请输入艺术家的名字。如果你想要某首特定的歌曲或专辑，请输入歌曲或专辑的全名。\n\
  \n当你找到歌曲或专辑的名称时，只需触摸它，你就会被带到购买页面。\n\n### 购买或租借音乐、视频、播客等\n\n一旦你找到一首歌、视频、电视节目或专辑，你可以点击\
  \ `购买` 按钮，或者（如果看到的话）`租借` 按钮。这将使你的媒体开始下载。（如果内容是免费的，那么你会看到 `免费` 按钮，点击后它会变成 `下载` 按钮。）\n\
  \n我们建议你先试听或观看预览，并查看客户评论，除非你十分确定要购买该项目。\n\n**注意：** 你还可以从 iTunes 商店为你的手机购买*铃声*。请务必查看第\
  \ 9 章：“使用电话”，我们在那里展示了如何免费创建你自己的铃声！\n\n#### 预览音乐\n\n点击歌曲标题或其左侧的音轨序号；这会将专辑封面翻转过来并启动预览窗口。\n\
  \n你将听到一段 90 秒的代表性歌曲片段。\n\n点击 `停止` 按钮，音轨序号将再次显示。\n\n![图片](img/U2216.jpg)\n\n####\
  \ 查看客户评论\n\niTunes 中的许多项目都提供客户评论。评论从最低的一星到最高的五星不等。\n\n**警告：** *请注意，评论中可能包含不文明语言。*\
  \ 很多评论是干净的；然而，有些确实包含不文明语言，而 iTunes 商店可能不会立即察觉。\n\n阅读评论可以让你很好地了解自己是否喜欢并想购买这个项目。\n\
  \n![图片](img/U2217.jpg)\n\n#### 预览视频、电视节目或音乐视频\n\niTunes 上几乎所有东西都提供预览。有时你会看到一个 `预览`\
  \ 按钮，例如音乐视频和电影。电视节目则有些不同；你需要点击剧集标题才能看到 30 秒的预览。\n\n我们强烈建议在 iTunes 上购买项目之前，先查看评论并尝试预览。\n\
  \n典型的电影预告片或预告片会超过 30 秒。有些长达两分半钟或更久。\n\n![图片](img/U2218.jpg)\n\n#### 购买歌曲、视频或其他项目\n\
  \n一旦你确定要购买一首歌、视频或其他项目，请按照以下步骤进行购买：\n\n1. 点击歌曲的 `价格` 按钮或 `购买` 按钮。\n2. 按钮会改变并变成一个绿色的\
  \ `立即购买`、`购买歌曲`、`购买单曲` 或 `购买专辑` 按钮。\n3. 点击 `购买` 按钮。\n\n    ![图片](img/U2219.jpg)\n\
  \n4. 你会看到一个动画图标跳入购物车。输入你的 iTunes 密码，然后点击 `好` 来完成购买。\n\n![图片](img/U2220.jpg)\n\n\
  点击 `更多` 按钮，然后点击 `下载` 来查看专辑中每首歌的下载进度。\n\n然后，这首歌或专辑就会成为你音乐库的一部分，并在你下次将 iPhone 连接到电脑上的\
  \ iTunes 时与电脑同步。注意：iCloud 会自动完成此同步。\n\n下载完成后，你会在你的“音乐”应用中相应的分类里看到新的歌曲、有声书、播客或 iTunes\
  \ U 播客。\n\n![图片](img/U2221.jpg)\n\n**注意：** 购买的视频和 iTunes U 视频会进入你 iPhone 上的“视频”应用，而播客则会显示在“音乐”应用中。\n\
  \n### iTunes 中的播客\n\n播客通常是一系列音频片段；这些可能会频繁更新（例如国家公共广播电台的每小时新闻播报），或者根本不更新（例如关于特定主题的一次性讲座录音）。\n\
  \n![图片](img/U2222.jpg)\n\n![图片](img/U2223.jpg)\n\n你可以点击顶部三个按钮来浏览 iTunes 中的播客分类：\n\
  \n-   `热门`\n-   `十佳`\n-   `分类`\n\n#### 下载播客\n\n播客有视频和音频两种形式。当你找到某个播客时，只需点击该播客的标题（参见图\
  \ 22–2）。幸运的是，大多数播客是免费的。如果是免费的，你会看到一个 `免费` 按钮，而不是通常的 `购买` 按钮。\n\n![图片](img/2202.jpg)\n\
  \n**图 22–2.** *下载一个 NPR 播客*\n\n当你点击该按钮时，它会变成一个绿色的 `下载` 按钮。点击 `下载`，一个动画图标会跳入底部功能键栏中的\
  \ `下载` 图标中。一个红色小数字显示正在下载的文件数量。\n\n![图片](img/U2224.jpg)\n\n#### 下载图标：停止和删除下载\n\n\
  当你下载项目时，它们会出现在你的 `下载` 屏幕中。这个行为与你电脑上 `iTunes` 应用的行为类似。\n\n你可以点击 `更多` 功能键，然后点击 `下载`\
  \ 标签来查看所有下载的进度。\n\n![图片](img/U2225.jpg)\n\n#### 下载的内容去哪里了\n\n你可以通过点击 `更多` 图标，在你的“音乐”或“视频”应用中看到所有下载内容，该图标会按类别显示你的下载内容。换句话说，如果你下载了一个播客，你需要进入你的“音乐”应用，点击\
  \ `更多`，然后点击 `播客` 标签来查看已下载的播客。\n\n有时，你决定不想要所有已选择的下载内容。如果你想停止下载并删除它，用手指在下载项上滑动以调出\
  \ `删除` 按钮，然后点击 `删除`（参见图 22–3）。\n\n![图片](img/2203.jpg)\n\n**图 22–3.** *在下载过程中删除文件*\n\
  \n### 兑换 iTunes 礼品卡\n\n你 iPhone 上 `iTunes` 应用的酷炫之处在于，就像你电脑上的 `iTunes` 应用一样，你可以兑换一张礼品卡，从而在\
  \ iTunes 账户中收到用于购买的余额。\n\n在 `iTunes` 屏幕的底部，你应该能看到 `兑换` 按钮（参见图 22–4）。\n\n![图片](img/2204.jpg)\n\
  \n**图 22–4.** *兑换 iTunes 礼品卡*\n\n点击 `兑换` 按钮，开始输入你的 iTunes 礼品卡号码以获取 iTunes 商店余额的流程。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### Ping\n\n`Ping` 是\
  \ Apple 的音乐社交网络。您可以通过点击标签栏底部中央的 **Ping** 按钮来访问它。\n\n借助 `Ping`，您可以查看您关注的艺人和好友正在购买和评论哪些音乐，而您的关注者也可以看到您购买和评论的音乐。`Ping`\
  \ 还允许您将您的购买记录发布到推文上。\n\n![images](img/U2226.jpg)\n\n`Ping` 包含三个板块：\n\n- **动态：**\
  \ 显示您关注的所有人的购买和评论活动。您可以查看 **全部** 动态、仅 **艺人** 动态，或仅 **用户**（非艺人）动态。\n- **用户：** 为您提供您\
  \ **关注的** 其他 `Ping` 用户的列表；**关注您的** `Ping` 用户列表；以及 `Ping` 认为您可能感兴趣的 **推荐艺人**、**推荐艺术家**\
  \ 和 **推荐用户** 列表。\n- **我的个人资料：** 显示您自己的所有近期活动，并允许您访问 **我的信息**，其中会显示您的个人资料信息以及您喜欢的音乐的专辑封面。\n\
  \n**注意**：在撰写本文时，`Ping` 尚未获得广泛普及。如果您是一位狂热的音乐爱好者，并且您和您的朋友经常从 `iTunes` 购买大量音乐，那么我们当然建议您至少尝试一下。不过，您也可能会发现像\
  \ `Twitter` 和 `Facebook` 这样更成熟（即便更通用）的社交网络更符合您的喜好。\n\n"
- "# 第 23 章\n\n## 神奇的 App Store\n\n您刚刚看到了从 `iTunes` 直接下载音乐、视频和播客到您的 `iPhone` 是多么简单。您也看到了从\
  \ `iBooks` 商店下载 `iBooks` 是多么容易。\n\n从 Apple 神奇的 `App Store` 下载新应用程序同样简单。几乎对于您能想到的任何功能，都有相应的应用程序：游戏、生产力工具、社交网络，以及您能想象到的任何其他东西。正如广告所说，*总有一款应用适合你*。\n\
  \n![images](img/U2301.jpg)\n\n在本章中，您将学习如何浏览 `App Store`，以及如何搜索和下载应用程序。您还将学习如何在应用程序下载到您的\
  \ `iPhone` 后对其进行维护和更新。\n\n### 了解更多关于应用和 App Store 的信息\n\n在本章中，我们将重点介绍如何直接从您的 `iPhone`\
  \ 访问 `App Store`。但是，您应该记住，您也可以使用 `Mac` 或 `PC` 上的 **iTunes** 程序在 `App Store` 中购物（请参见\
  \ 图 23–1）。\n\n![images](img/2301.jpg)\n\n**图 23–1.** *从您电脑上的 **iTunes** 程序或您 `iPhone`\
  \ 上的 **App Store** 图标访问 `App Store`*\n\n在很短的时间内，`App Store` 就迅速流行起来。几乎任何您能想象到的东西都有对应的应用程序。这些应用程序有各种价位；在很多情况下，应用程序甚至是免费的！\n\
  \n#### 在哪里寻找应用新闻和评论\n\n您可以在 `App Store` 中找到许多应用程序的评论，我们建议您查看这些 `App Store` 评论。然而，有时您可能想从专家评论者那里获取更多信息。如果是这样，博客是寻找特定应用或内容的新闻和评论的好地方。\n\
  \n以下是一些与 Apple `iPhone` 和 `iPod` 相关的博客，它们提供应用评论：\n\n- `iPhone` 博客：[`www.tipb.com`](http://www.tipb.com)\n\
  - Touch Reviews：[`www.touchreviews.net`](http://www.touchreviews.net)\n- Touch Arcade：[`www.toucharcade.com`](http://www.toucharcade.com)\n\
  - The Unofficial Apple Weblog：[`www.tuaw.com`](http://www.tuaw.com)\n- 148apps：[`www.148apps.com`](http://www.148apps.com)\n\
  - App Advice：[`www.appadvice.com`](http://www.appadvice.com)\n\n### App Store 基础\n\
  \n稍加熟悉，您就会发现 `App Store` 的导航非常直观。我们将介绍一些基本知识，帮助您充分利用 `App Store`，从而让您的体验尽可能愉快且富有成效。\n\
  \n**注意：** 应用程序的可用性因国家/地区而异。某些应用仅在某些国家/地区可用，而某些国家/地区由于当地分级法律可能没有特定的游戏版块。\n\n####\
  \ 需要网络连接\n\n在您设置好 `App Store` (`iTunes`) 帐户后，您仍然需要具备正确的网络连接（`Wi-Fi` 或 `3G`）才能访问\
  \ `App Store` 并下载应用程序。请查看 第 4 章：“连接到网络”，以了解如何判断您是否已连接。\n\n#### 启动 App Store\n\n\
  **App Store** 图标应位于 **主屏幕** 上的第一页图标中。点击该图标即可启动 **App Store** 应用程序。\n\n![images](img/U2302.jpg)\n\
  \n#### App Store 主页\n\n我们将查看 `App Store` **主页**的几部分：顶部栏、中间内容和底部软键。\n\n我们先来看顶部栏。在\
  \ 图 23–2 所示页面的顶部，您会看到三个按钮：**新鲜内容**、**热门内容** 和 **Genius**。点击其中任何一个即可更改视图。\n\n**提示：**\
  \ **Genius** 是一项功能，可根据您已在 `iPhone` 上下载和安装的应用来推荐您可能喜欢的应用。这是一种很好的方式，可以帮助您从数十万应用中筛选出可能令您感兴趣的那些。\n\
  \n页面中间是您的主要内容区域。这个主要内容区域会显示应用列表或您正在查看的特定应用的详细信息。您可以通过上下滑动来查看更多应用列表或某个应用的详细信息。在查看屏幕截图时，您也可以左右滑动。在\
  \ **精选** 应用页面上，您会注意到顶部有一些大图标。点击这些图标将显示应用类型或单个应用。在这些大图标下方（您需要向下滑动），您会看到许多精选应用。\n\n\
  `App Store` **主页**底部有五个软键按钮：\n\n- **精选：** 显示由 `App Store` 或应用开发者重点推荐的应用。\n- **类别：**\
  \ 显示用于组织应用的类别列表，以便您按类别浏览。\n- **排行榜 25：** 显示销量最高或下载量最高的应用。\n- **搜索：** 使用输入的搜索词查找应用。\n\
  - **更新：** 允许您更新已安装的任何应用，并重新下载您已获取的任何应用。\n\n您可以从 图 23–2 中看出正在显示 **精选** 应用，因为底行的软键中\
  \ **精选** 软键是高亮显示的。滚动操作与其他程序相同——只需上下移动手指即可滚动页面。\n\n![images](img/2302.jpg)\n\n**图\
  \ 23–2.** *`App Store` **主页**的布局*\n\n**注意：** `App Store` 本质上是一个网站，因此它会频繁更改。本书出版后，`App\
  \ Store` 的一些细节和细微差别可能会略有不同。\n\n#### 查看应用详情\n\n如果您在列表中看到有趣的应用，请点击它以了解更多信息。该应用的 **详细信息**\
  \ 屏幕包括其价格、描述、屏幕截图和评论（请参见 图 23–3）。您可以使用这些信息来帮助判断该应用是否适合您。\n\n向下滑动以阅读 **信息** 页面上关于该应用的更多详细信息。向左或向右滑动以查看更多应用截图。点击靠近底部的\
  \ **评价** 按钮以阅读该应用的所有评论。\n\n您还可以在 **信息** 页面底部附近查看该应用的其他详细信息，例如其文件大小、版本号和开发者信息。\n\n\
  您还可以使用屏幕底部的按钮 **告诉朋友** 或 **报告问题**。\n\n![images](img/2303.jpg)\n\n**图 23–3.** *查看应用的详细信息*\n\
  \n\n\n### 查找要下载的 App\n\n如果你想搜索要下载的 App，先从默认视图开始浏览，该视图会显示**精选**（Featured）App。向下滚动页面即可查看所有精选\
  \ App。\n\n**注意：** 与 iTunes Store 一样，在 3G 网络下，你只能下载小于 20MB 的 App。下载更大的文件需要连接 Wi-Fi。\n\
  \n#### 查看最新 App\n\nApp Store 的默认视图会显示最新和精选的 App。这正是图 23–2 所展示的视图。你可以判断出此视图显示的是最新精选\
  \ App，因为屏幕底部的**精选**（Featured）功能键（`images/U2303.jpg`）处于高亮状态，且页面顶部的**最新**（New）按钮（`images/U2304.jpg`）处于按下状态。\n\
  \n#### 查看热门 App\n\n点击屏幕顶部的**热门**（What's Hot）按钮，商店中“最热门”的 App 便会显示在屏幕上。同样，只需滚动浏览最热门的\
  \ App，看看是否有让你眼前一亮的。\n\n**注意：** 一个 App 出现在“热门”分类中，并不一定意味着你也会觉得它有用或有趣。在购买任何 App 之前，请仔细查看其描述和用户评价。\n\
  \n`images/U2305.jpg`\n\n#### 天才推荐\n\n**精选** App 版块顶部的第三个按钮可将你带到**天才推荐**（Genius）功能。此功能的运作方式与\
  \ **iTunes** App 中用于在电脑上播放音乐的、同名功能类似。例如，它会根据你 iPhone 上已安装的 App，为你推荐你可能喜欢的其他 App。\n\
  \n**注意：** 首次使用天才推荐功能时，你需要先接受出现的条款与条件，之后该功能才会启用。\n\n`images/U2306.jpg`\n\n##### 基于\n\
  \n请注意，每个推荐 App 上方都有一个**基于（*App 名称*）**的标签。此标签表明，推荐给你的这个 App 是基于你 iPhone 上已安装的某个特定\
  \ App。例如，推荐 **CBS Radio** 是因为已安装了 **Pandora Radio**。我们之前并不知道 CBS Radio，但基于这个推荐，或许会尝试一下。\n\
  \n`images/U2307.jpg`\n\n##### 滑动删除\n\n如果你不喜欢某个天才推荐，可以向左或向右滑动它，即可调出**删除**（Delete）按钮，操作方式与你在\
  \ iPhone 上从列表中删除电子邮件或其他项目一样。点击**删除**按钮即可将该 App 从列表中移除。\n\n`images/U2308.jpg`\n\n\
  ##### 禁用天才推荐功能\n\n要禁用天才推荐功能，你需要进入 **App Store** 的设置（请参阅本章后面的“App Store 设置”一节，了解如何禁用此功能）。\n\
  \n`images/U2309.jpg`\n\n#### 分类\n\n`images/U2310.jpg`\n\n有时候，眼前所有的选择可能会让人有点不知所措。如果你大致清楚自己在寻找哪种类型的\
  \ App，请点击底部功能键行中的**分类**（Categories）按钮（参见图 23–4）。\n\n当前可用的分类显示在表 23–1 中。\n\n`images/t2301.jpg`\n\
  \n**注意：** 所列出的分类是动态变化且随时可能更改的，因此当你读到这本书时，你所看到的分类可能已经发生了变化。\n\n`images/2304.jpg`\n\
  \n**图 23–4.** *按分类查看 App——本例中为**游戏**（Games）*\n\n#### 查看 25 强排行榜\n\n`images/U2311.jpg`\n\
  \n点击底部功能键行中的**排行榜**（Top Charts）功能键，App Store 将再次切换视图。这次，你将看到付费、免费和收入最高的前 25 名 App。只需点击顶部的**付费排行榜**（Top\
  \ Paid）、**免费排行榜**（Top Free）或**收入榜**（Top Grossing）按钮，即可在不同视图间切换。\n\n**注意：** **收入榜**（Top\
  \ Grossing）分类指的是赚钱最多的 App，即销量乘以售价。此视图有助于价格较高的 App 在排行榜上获得更高排名。例如，一个售价 4.99 美元的 App\
  \ 销量为 10,000 份，其在**收入榜**上的排名将远高于一个销量相同但售价仅 0.99 美元的 App。\n\n`images/U2312.jpg`\n\
  \n#### 搜索 App\n\n`images/U2313.jpg`\n\n假设你对自己想要寻找的 App 类型有明确的想法。点击**搜索**（Search）功能键，然后输入程序名称或程序类型。\n\
  \n因此，如果你正在寻找一个帮助划船的 App，只需输入“rowing（划船）”看看会出现什么结果。\n\n你可能会看到一些建议的搜索词出现；点击这些词可以缩小搜索范围。\n\
  \n`images/U2314.jpg`\n\n在建议的搜索词中点击 **Rowing Stats** 只会得到一个结果。\n\n`images/U2315.jpg`\n\
  \n我们想查看所有与划船相关的 App，因此我们点击**搜索**（Search）栏，使用**退格键**（Backspace）擦除“stats”这个词。接着，点击右下角的**搜索**（Search）按钮，查看更广泛的划船相关结果列表。\n\
  \n**提示：** 如果你是在水面上划船（而不仅仅是在划船机上），你可能会想了解一下 **SpeedCoach Mobile**，售价 49.99 美元。还有一个名为\
  \ **iRowPro** 的免费替代品（在撰写本文时）。\n\n`images/U2316.jpg`\n\n### 下载 App\n\n一旦找到你想要的 App，你就可以直接将其下载到你的\
  \ iPhone 上，如图 23–5 所示。\n\n`images/U2317.jpg`\n\n在找到你想购买的 App 后，请注意标有**免费**（Free）或\
  \ **$0.99**（或其他价格）的小按钮。\n\n只需点击那个按钮，如果是免费程序，它会变成**安装**（Install）；如果是付费程序，则会变成**立即购买**（Buy\
  \ Now）。\n\n`images/2305.jpg`\n\n**图 23–5.** *购买付费 App 或下载免费 App*\n\n在你阅读完评论和 App\
  \ 描述（或许还访问了开发者支持网站）之后，就可以继续下载或购买该 App 了。点击**下载 App**（Download App）按钮后，系统会提示你输入 iTunes\
  \ 密码。\n\n输入你的密码并点击**好**（OK）；该 App 将被下载到你的 iPhone。\n\n#### 寻找免费或打折的 App\n\n浏览一段时间后，你会发现\
  \ App Store 的几个特点。首先，这里有很多**免费**的 App。有时，这些都是很棒的应用程序。其他时候，它们可能不太有用——但仍然可能很有趣！\n\n\
  其次，你会发现有些 App 会打折，而另一些 App 则会随着时间的推移变得便宜。如果你有一个喜欢的 App，今天售价 6.99 美元，如果你等几周或一个月再买，可能会看到它的价格下降。\n\
  \n### 兑换礼品卡或 iTunes 兑换码\n\n你可以通过滚动到 **App Store** 大多数页面的最底部来兑换礼品卡或 iTunes 兑换码。\n\
  \n在底部，点击**兑换**（Redeem）按钮。\n\n`images/U2318.jpg`\n\n在下一个屏幕输入你的兑换码。（你可能需要刮开礼品卡背面的涂层才能看到兑换码。）\n\
  \n点击**兑换**（Redeem）按钮。\n\n`images/U2319.jpg`\n\n\n\n### 维护与更新应用程序\n\n开发者通常会对 iPhone\
  \ 应用进行更新。你无需借助电脑即可完成更新——直接在 iPhone 上操作即可。\n\n![images](img/U2320.jpg)\n\n你甚至可以通过查看`App\
  \ Store`图标判断是否有更新以及更新数量。如图所示，这里有五个应用可供下载更新。\n\n进入 App Store 后，点击底部最右侧的图标，这便是`更新`图标。\n\
  \n![images](img/U2321.jpg)\n\n如果有应用可以更新，图标上会用红色数字显示数量。这个数字对应的是可更新的应用数量。\n\n当你点击`更新`按钮时，iPhone\
  \ 会显示哪些应用有更新。\n\n![images](img/U2322.jpg)\n\n若要获取更新，你可以逐个点击应用。不过更简便的方法是点击右上角的`全部更新`按钮\
  \ ![images](img/U2323.jpg)，一次性更新所有应用。iPhone 会离开 App Store，你可以在进度条中看到更新进度。正在更新的应用图标会显示为灰色。\n\
  \n部分状态消息会显示“等待中”，另一些则会显示“正在载入”或“正在安装”。更新完成后，所有图标会恢复为正常颜色。\n\n![images](img/U2324.jpg)\n\
  \n**注意：** 你需要重新启动`App Store`应用才能返回商店。更新过程会完全退出商店。\n\n#### 重新下载应用\n\n下载过的应用（无论免费还是付费），你都可以随时再次下载，无需额外付费。例如，假设你购买了一个度假时要用的应用。旅行结束后，你可以放心地删除它，下次旅行时再重新下载。这有助于保持`主屏幕`整洁，并避免\
  \ iPhone 存储空间不足。\n\n要查看你之前购买或下载过的应用列表，请点击`更新`按钮，然后点击屏幕顶部的`已购项目`标签。\n\n![images](img/U2325.jpg)\n\
  \n在`已购项目`中，你可以选择两种视图。第一种是查看你所有曾经购买或下载过的应用列表。另一种是查看当前*未*安装在 iPhone 上的应用列表。\n\n**注意：**\
  \ 如果看到一些你并不记得购买或下载过的应用？出现这种情况，可能是因为你在 iPod touch 上下载过应用，在 iPad 上购买过通用应用，或者与配偶或家人共享了\
  \ iTunes 账户，而他们曾在自己的设备上下载过应用。\n\n![images](img/U2326.jpg)\n\n### 自动下载\n\n通过 iCloud\
  \ 在线服务，你可以设置 iPhone，使其自动下载并安装在 Windows 或 Mac 电脑上通过 iTunes 购买的任何应用——甚至包括在其它 iOS 设备（如\
  \ iPad）上购买的应用。\n\n![images](img/U2327.jpg)\n\n按照以下步骤开启自动下载功能：\n\n1.  点击“设置”图标。\n\
  2.  向下滚动并点击“商店”。\n3.  将“应用”的“自动下载”开关切换至“开启”。\n\n如果你不再希望自动下载应用，只需将“应用”的“自动下载”开关切换回“关闭”即可。\n\
  \n你还可以选择是否使用“蜂窝数据”来下载购买内容。如果你的网络速度较慢或数据套餐有限，建议将此选项切换至“关闭”。\n\n### 其他 App Store 设置\n\
  \n在`App Store`应用的设置中，你还可以查看当前登录商店的账户、退出登录、关闭 Genius 功能、查看你的 iTunes 账户以及管理订阅邮件。\n\
  \n**提示：** 如果你想防止他人使用你的 iTunes 账户在 iPhone 上购买应用，需要按以下步骤退出 iTunes 登录。\n\n按照以下步骤更改`App\
  \ Store`应用的其他设置：\n\n1.  注意，你可以在本屏幕顶部看到当前登录的账户。\n2.  点击“退出登录”可退出 iTunes 服务。例如，你可能想将\
  \ iPhone 交给某人，但不想让他用你的 iTunes 账户购买应用。\n3.  点击“查看账户”可查看你的账户详情（需要登录）。\n\n    ![images](img/U2328.jpg)\n\
  \n4.  右侧图示显示的是你的账户信息。点击“付款信息”可调整你的账单信息（例如信用卡类型和号码）。\n5.  点击“账单地址”可更新你的地址。\n6.  点击“更改国家或地区”可更改你的国家。\n\
  \n    ![images](img/U2329.jpg)\n\n7.  向下滚动可查看更多设置。\n8.  在此对话中，你可以“关闭应用 Genius 推荐”（如果已关闭，此按钮可让你开启）。或者，你可以“订阅”或“取消订阅”iTunes\
  \ 电子报。\n9.  完成后点击右上角的“完成”。\n\n![images](img/U2330.jpg)\n\n"
- "# 第 24 章\n\n## 游戏与娱乐\n\niPhone 在很多方面都表现出色。它是一台多媒体利器，能管理你繁忙的生活。iPhone 在两方面尤其擅长：作为游戏设备，以及运行利用其精美高分辨率触摸屏和强大图形处理器的应用。你甚至能在\
  \ iPhone 上找到一些热门游戏的版本，而这些游戏你可能以为只能在专用游戏机上玩到。\n\niPhone 为便携游戏带来了诸多优势：高清（HD）屏幕呈现逼真视觉效果；高品质音频带来出色的音效；陀螺仪和加速感应器让你能以许多\
  \ PC 和专用游戏机（Wii 除外）所不具备的方式与游戏互动。例如，在赛车游戏中，你可以通过手持 iPhone 时的转动来控制汽车方向。\n\n借助 AirPlay\
  \ 镜像功能，你甚至可以将游戏投射到同一 Wi-Fi 网络上的 Apple TV，并在大屏幕电视上畅玩。\n\niPhone 也适用于许多其他有趣的用途，例如关注你所在的本地棒球队，甚至可以通过像`Ocarina`这样的出色应用将\
  \ iPhone 当作乐器使用（本章稍后会介绍）。\n\n### 将 iPhone 用作游戏设备\n\niPhone 内置了加速感应器和*陀螺仪*，本质上是一种能够检测移动（加速度）和倾斜的装置。\n\
  \n将加速感应器与出色的屏幕、大容量内存以及高速处理器相结合，便构成了一款出色的游戏平台。拥有数以千计的游戏可供选择，你几乎可以在 iPhone 上畅玩任何类型的游戏。\n\
  \n借助多任务功能，你甚至可以接听电话，然后回到你之前离开的位置继续游戏。\n\n**注意：** 部分游戏要求你拥有活跃的网络连接（Wi-Fi 或 3G）才能参与多人游戏。\n\
  \n使用 iPhone，你可以玩驾驶游戏，并利用 iPhone 本身来控制方向。只需转动设备即可。你可以触摸屏幕来刹车，或者向前倾斜设备来加速。\n\n这款游戏非常逼真，甚至可能让你晕车！\n\
  \n《真实赛车》还具备有趣的派对模式，你可以与朋友一起比赛——试试看吧！\n\n![images](img/U2401.jpg)\n\n或者，你可以尝试钓鱼游戏，在游戏中你仿佛置身船上，抛竿收线！\n\
  \n![images](img/U2402.jpg)\n\n如果你对音乐/节奏类游戏情有独钟，那么你会在 App Store 中找到许多此类程序，比如`《摇滚乐队》`。还有像`《无尽之剑》`这样由虚幻引擎\
  \ 3 驱动的精彩格斗游戏；第一人称射击（FPS）游戏如`《使命召唤：僵尸》`；以及一些全球最受欢迎的休闲游戏，例如`《愤怒的小鸟》`。\n\n![images](img/U2403.jpg)\n\
  \niPhone 还拥有非常快速的处理器和精密的图形芯片。将这些与加速感应器相结合，便构成了一个功能强大的游戏设备。\n\n\n\n#### 获取游戏及其他有趣的应用程序\n\
  \n与所有 iPhone 应用程序一样，游戏可以在 App Store 中找到（参见图 24–1）。你可以通过电脑上的 `iTunes` 应用程序或设备上的 `App\
  \ Store` 应用程序获取它们。\n\n![images](img/2401.jpg)\n\n**图 24–1.** *App Store 中 `Games`\
  \ 板块的布局*\n\n要获取游戏，请像上一章一样启动 `App Store` 应用。接着，使用 `Categories` 图标进入 `Games` 标签页。你还可以在\
  \ App Store 的 `Featured` 板块以及 `New and Notable` 板块中找到许多游戏。图 24–2 展示了一款 iPhone 游戏的应用购买页面。\n\
  \n![images](img/U2404.jpg)\n\n![images](img/2402.jpg)\n\n**图 24–2.** *`App Purchase`\
  \ 页面的布局*\n\n#### 购买前阅读评论\n\n许多游戏都有值得细看的用户评论。有时，你可以在购买前对游戏有个好印象。如果你发现一款看起来很有趣的游戏，不妨用谷歌简单搜索一下，看看是否有主流媒体做过完整评测。\n\
  \n![images](img/U2405.jpg)\n\n#### 寻找免费试用版或精简版\n\n如今，越来越多的游戏开发者会提供免费试用版，让用户在购买前看看是否喜欢。你会发现\
  \ App Store 中许多游戏既有 `Lite`（精`简版）也有`Full`（完整版）。\n\n一些“免费”游戏通过内置广告来维持运营。另一些游戏则免费开始，但需要应用内购买才能继续游玩或解锁额外功能。\n\
  \n![images](img/U2406.jpg)\n\n#### 游玩时注意安全\n\n你可能像在现实中一样，用 iPhone 在钓鱼游戏中甩出鱼线。你还可以在驾驶游戏和第一人称射击游戏中四处移动。关键在于：游玩时要注意周围环境！例如，确保你拿稳了设备，免得它从手中滑落；我们推荐使用一个良好的硅胶保护壳来帮助防滑。\n\
  \n**小心**：像 `Real Racing` 这样的游戏可能会让人上瘾！\n\n#### 双人游戏\n\niPhone 真正开启了双人游戏的可能性。在这个例子中，我们以\
  \ iPhone 为棋盘，两人对弈跳棋。\n\n对于其他棋盘游戏，如国际象棋、大富翁和优诺，你也能找到类似的双人游戏应用。\n\n![images](img/U2407.jpg)\n\
  \n#### 在线与无线游戏\n\niPhone 还支持在线和无线点对点游戏（如果游戏支持的话）。许多新游戏都在融入这项技术。例如，在 `Scrabble` 中，你可以与多个使用自己设备的玩家对战。你甚至可以用\
  \ iPhone 作为游戏棋盘，最多用四部独立的 iPhone 作为无线“字母架”，来存放所有玩家的字母牌。只需将字母牌从架子上弹出，它们就会落到棋盘上——非常酷！\n\
  \n在这个例子中，我从 `Real Racing` 菜单中选择了 `Online`。现在我可以选择通过 Wi-Fi 与另一位对手比赛，或者加入一个在线联赛。\n\
  \n![images](img/U2408.jpg)\n\n**注意：** 如果你只想和身边的朋友对战，请在多人游戏中选择 Wi-Fi 模式。如果你只是想和陌生人玩，可以尝试在线加入联赛或游戏。\n\
  \n### 其他有趣的内容：棒球\n\n有许多出色的应用能为你在 iPhone 上带来无尽欢乐。由于 iPhone 是在美国职业棒球大联盟开赛日发布的，因此突出介绍一款被评为首个\
  \ iPhone App Store“本周应用”的应用是恰如其分的。\n\n`At Bat 2010 for iPhone` 是一款售价 14.99 美元的应用，对于任何棒球迷来说，这笔入场费都物超所值。它也充分展示了\
  \ iPhone 的功能。\n\n![images](img/U2409.jpg)\n\n应用的*主视图会根据当前是否有棒球比赛而改变。当你首次注册应用时，可以选择你最喜欢的球队。在这个例子中，iPhone\
  \ 上喜爱的球队被设定为红袜队。因此，如果这支球队正在比赛，视图会自动首先显示该球队的比赛。如果球队没有比赛，则会显示该队上一场比赛的回顾。或者，它可能列出该队下一场比赛的详细信息。\n\
  \n比赛期间的主视图会显示一位击球手站在本垒板上。这个击球手代表真实的击球手。击球手会切换站位，取决于当前击球手是左打还是右打。本垒板上方显示当前的投球计数，比分则显示在屏幕顶部。\n\
  \n当你看到一名球员站在本垒板或垒上时，你可以点击球员的图像，调出他的棒球卡并查看他的统计数据。\n\n![images](img/U2410.jpg)\n\n\
  **提示：** 你甚至可以设置通知，当与你喜爱的球队相关的有新闻价值的事件发生时，向你发送提醒。为此，请点击 `Information` 图标，并将 `Notifications`\
  \ 设置为 `ON`。\n\n#### AirPlay 镜像\n\n最新的 iPhone 不仅能够将视频或音乐从 iPhone 流式传输到 Apple TV，还能共享任何应用（包括游戏）的屏幕。这让你和全家人可以在大屏幕上观看并享受游戏，同时使用\
  \ iPhone 作为控制器。这对于棋盘游戏和多人游戏尤其有效，全家人或一群人可以围坐在一起共同游玩。\n\n![images](img/U2411.jpg)\n\
  \n请按照以下步骤使用 AirPlay 镜像功能：\n\n1.  点击你想要镜像的应用。在这个例子中，我们使用的是《无尽之剑》。\n2.  应用启动后，双击 Home\
  \ 键调出快速应用切换器。\n3.  从左向右滑动，找到音频/视频控制选项。（它们在最末端，所以继续滑动直到无法再滑动为止。）\n4.  点击 AirPlay\
  \ 图标，调出你 Wi-Fi 网络上已启用 AirPlay 的设备列表。\n\n    ![images](img/U2412.jpg)\n\n5.  选择 Apple\
  \ TV。\n6.  再次点击 Home 键，返回你的应用。\n7.  现在你应该会在*大屏幕上看到《无尽之剑》。尽情体验吧！\n\n要停止 AirPlay 镜像，重复相同步骤，并从设备列表中选择\
  \ iPhone。\n\n**注意：** 有些游戏支持多人 AirPlay 镜像，例如 `Real Racing 2` 的派对模式，最多可以让 4 个人使用自己的\
  \ iPhone 或 iPad，在同一台大屏幕电视上互相竞技。\n\n"
- "# 第 25 章\n\n## 社交网络\n\n如今，一些最受欢迎的“联系”场所是那些常被称为*社交网络网站*的站点——这些地方允许你创建自己的页面，与朋友和家人联系，了解他们的生活动态。一些最大的社交网络网站包括\
  \ Facebook、Twitter 和 LinkedIn。\n\n在本章中，我们将向你展示如何访问这些网站。你将学习如何更新状态、*发推文*，并关注那些对你重要或你感兴趣的人。\n\
  \n\n\n### Facebook\n\nFacebook 创立于 2004 年 2 月。自那时起，它便成为用户与朋友、同事和家人联系、重新联络以及分享信息的首要平台。如今，超过\
  \ 8 亿用户将 Facebook 作为了解最重要的人近况的主要来源。\n\n**注意：** *您无法在 iPhone 上的* `Facebook` *应用或通过*\
  \ `Facebook.com` *网站玩 Facebook 游戏。* 如果您是重度 Facebook 游戏玩家，这可能会令您失望；不过，您通常可以从 App\
  \ Store 获取相同的游戏（例如 `FarmVille`），然后将其连接到您的电脑版 Facebook 以保留游戏进度。\n\n在您的 iPhone 上，发布本文时，您主要有三种方式访问您的\
  \ Facebook 页面：\n\n1.  使用 `Safari` 访问标准（完整）网站：[`www.facebook.com`](http://www.facebook.com)。\n\
  2.  使用 `Safari` 访问移动版网站：[`http://touch.facebook.com`](http://touch.facebook.com)。\n\
  3.  使用 iPhone 版 `Facebook` 应用。\n\n![image](img/U2501.jpg)\n\n**注意：** iPhone 版 `Facebook`\
  \ 应用的功能比完整网站稍有限制，但导航起来要容易得多。\n\n## 连接 Facebook 的不同方式\n\n您可以使用 iPhone 专用应用，或者在 `Safari`\
  \ 浏览器中使用之前提到的两个 Facebook 网站之一来访问 Facebook。本章我们将重点介绍 iPhone 上的 `Facebook` 应用。\n\n\
  ### 下载并安装 Facebook 应用\n\n要查找该应用，请使用 App Store 中的 `Search` 功能，直接输入“Facebook”。\n\n\
  您也可以前往 App Store 的 `Social Networking` 类别，找到官方的 `Facebook` 应用以及许多其他与 Facebook 相关的应用。\n\
  \n**注意：** 有些应用看起来可能像是“官方”Facebook 应用，并且可能需要付费。然而，唯一真正的“官方”应用是右侧显示的 iPhone/iPod 应用。\n\
  \n![image](img/U2502.jpg)\n\n要登录您的 Facebook 账户，您需要找到刚刚安装的图标并点击它。这里我们以 `Facebook`\
  \ 为例，但其他应用的操作过程非常类似。\n\n成功下载 `Facebook` 后，图标应如下所示。\n\n![image](img/U2503.jpg)\n\n\
  ## Facebook 应用\n\n要在您的 iPhone 上安装 `Facebook` 应用，请启动 `App Store` 并搜索“Facebook”。在\
  \ `Facebook` 应用列表中点击 `Install` 按钮。\n\n### Facebook 应用基础\n\n下载并安装 `Facebook` 后，您首先会看到\
  \ `Login` 屏幕。输入您的账户信息——您的电子邮件地址和密码。\n\n![image](img/U2504.jpg)\n\n首次登录后，您会看到一条 `Push\
  \ Notifications` 警告消息。\n\n如果您希望允许这些消息（可能来自其他 Facebook 好友的戳一下、笔记、状态更新通知等），请点击 `OK`。\n\
  \n登录后，您将看到 `Facebook` 主屏幕。点击 `Facebook` 标志可在应用中导航。\n\n![image](img/U2505.jpg)\n\n\
  ### 在 Facebook 中导航\n\n通过点击页面顶部的 `Facebook` 字样，在 `Navigation` 图标和您当前位置之间切换。\n\n例如，如果您在\
  \ `News Feed` 中，点击 `Facebook`，您将看到所有图标。再次点击 `Facebook`，您将返回 `News Feed`。\n\n从图标页面，您可以访问您的\
  \ `News Feed`、`Profile`、`Friends`、`Messages`、`Places`、`Groups`、`Events`、`Photos`\
  \ 和 `Chat`。\n\n![image](img/U2506.jpg)\n\n### 与朋友交流\n\n请按照以下步骤，通过 iPhone 上的 `Facebook`\
  \ 应用与您 Facebook 上的朋友交流：\n\n1.  点击顶部的 `Facebook` 以查看所有图标。\n2.  点击 `Friends` 图标，将显示您的好友列表。\n\
  3.  点击某位好友，您将进入他的 Facebook 页面，在那里您可以在她的 `Wall` 上留言，并查看她的 `Info` 或 `Photos`。\n\n\
  ![image](img/U2507.jpg)\n\n### 使用 Facebook 应用上传照片\n\n在 Facebook 上上传照片是件简单又有趣的事。在此，我们向您展示如何在\
  \ `Facebook` 应用中上传照片：\n\n![image](img/U2508.jpg)\n\n1.  从 Facebook 主图标中，点击 `Photos`。\n\
  2.  选择一个相册，例如 Mobile Uploads。\n3.  点击 `What’s on your mind?` 框旁边的 `Camera`。\n4.\
  \  点击 `Take Photo or Video` 按钮拍照或录制视频进行上传。或者，点击 `Choose From Library` 浏览 iPhone\
  \ 上的照片，直到找到您想要的那张。\n5.  接下来，如有需要，点击 `Write a caption…` 编写说明。\n6.  要完成上传，请点击蓝色的 `Upload`\
  \ 按钮，照片将进入您的 Mobile Uploads 文件夹。\n\n**注意：** 上传照片时，图像质量不会与 iPhone 上的原始照片相同。\n\n![image](img/U2509.jpg)\n\
  \n![image](img/U2510.jpg)\n\n## Facebook 通知\n\n根据您的 Facebook 推送通知设置，您可能会收到大量更新、墙贴和邀请。如果您的\
  \ Facebook 好友不多，并且您想知道何时有人在您的墙上留言或评论帖子或照片，只需将推送通知设置为 `ON`，如下一节所示。\n\n当通知到达时，它会显示在通知中心，或者如果手机处于锁定状态，则会显示为锁屏信息。\n\
  \n要从通知访问 Facebook，只需在屏幕上滑动 `Facebook` 图标，或滑动 `Arrow` 按钮解锁并阅读消息。\n\n![image](img/U2511.jpg)\n\
  \n### 自定义 Facebook 应用的设置\n\n以下是调整 `Facebook` 应用设置的方法：\n\n1.  点击 `Settings` 应用。\n\
  2.  在左侧栏中点击 `Facebook`。\n3.  现在您可以调整各种选项：\n    *   `Shake to Reload`：此功能可在您摇晃 iPhone\
  \ 时重新加载或更新页面。\n    *   `Vibrate`：此功能在收到聊天或消息提醒时通过振动通知您。\n    *   `Play Sound`：此功能允许您为聊天和消息提醒添加提示音。\n\
  \n![image](img/U2512.jpg)\n\n请按照以下步骤调整推送通知设置：\n\n1.  点击 `Settings` 应用。\n2.  点击 `Notifications`。\n\
  3.  向下滚动并点击 `Facebook`。\n4.  将 `Notification Center` 设置为 `ON` 以接收推送通知。\n5.  点击 `Show`\
  \ 选择列表中显示的通知数量。\n6.  将 `Alert Style` 设置为 `None`（无通知）、`Banners`（新通知中心样式的提醒）或 `Alerts`（旧式弹出通知）。\n\
  7.  将 `Badge App Icon` 设置为 `ON`，以便在 `Facebook` 图标上看到新通知的数量。\n8.  将 `Sounds` 设置为\
  \ `ON`，以便在收到通知时听到提示音。\n9.  设置 `View in Lock Screen`，即使手机处于锁定状态也能获取通知信息。\n\n![image](img/U2513.jpg)\n\
  \n**提示：** `Facebook` 应用会将 Facebook 个人资料照片导入到您的 `Contacts` 列表中。根据照片的不同，这可能会相当有趣。然而，它也可能将您非\
  \ Facebook 联系人的信息上传到 Facebook 的服务器，这可能会引发您、您的家人和朋友的隐私担忧。\n\n\n\n### LinkedIn\n\n\
  `LinkedIn` 的核心功能与 `Facebook` 非常相似，但其侧重点在于商业和职业发展。这与 `Facebook` 更侧重于个人好友和游戏形成对比。通过\
  \ `LinkedIn`，您可以与现任和前任商业伙伴建立或重新建立联系，发送消息，了解他人的动态，参与讨论等。\n\n在本书写作时，`LinkedIn` 的状况与\
  \ `Facebook` 非常相似。您可以通过 `Safari` 浏览器访问常规的 `LinkedIn` 网站，也可以下载适用于 `iPhone` 的 `LinkedIn`\
  \ 应用。\n\n哪个更好？我们认为 `iPhone` 上 `LinkedIn` 应用的使用体验略优于在 `Safari` 中访问完整的 `LinkedIn.com`\
  \ 网站。`LinkedIn` 应用拥有大按钮，导航更方便，但 `Safari` 版本在屏幕上可以显示更多内容。我们建议您两种方式都尝试一下，看看哪个更合您的心意——这完全取决于个人偏好。\n\
  \n#### 下载 LinkedIn 应用\n\n下载 `LinkedIn` 应用的过程与下载 `Facebook` 应用类似。在您的 `iPhone` 上启动\
  \ `App Store` 应用，在 `搜索` 窗口中输入“LinkedIn”，然后找到该应用。`LinkedIn` 应用是免费的，因此点击 `免费` 按钮即可安装。\n\
  \n![image](img/U2514.jpg)\n\n##### 登录 LinkedIn 应用\n\n应用安装完成后，点击 `LinkedIn` 图标，然后输入您的登录信息。\n\
  \n![image](img/U2515.jpg)\n\n![image](img/U2516.jpg)\n\n##### 浏览 LinkedIn 应用\n\n\
  `LinkedIn` 采用基于区域的导航系统。点击任意功能卡片即可进入该区域，然后点击顶部的 `LinkedIn` 徽标即可返回主屏幕。\n\n![image](img/U2517.jpg)\n\
  \n##### 与 LinkedIn 联系人沟通\n\n您使用 `LinkedIn` 应用最频繁的操作之一可能就是与您的联系人沟通。最简单的方法是遵循以下步骤：\n\
  \n![image](img/U2518.jpg)\n\n1.  在 `主页` 页面，点击右上角的 `你` 功能卡片。\n2.  点击页面中间位置的 `联系人`\
  \ 按钮。\n3.  浏览您的联系人列表，或点击 `放大镜` 搜索图标，在 `搜索` 框中输入联系人姓名。\n4.  点击您正在查找的联系人。\n5.  点击\
  \ `电话` 图标给他打电话（如果他选择共享了电话号码），或点击 `邮件` 图标给他发送消息。\n\n### Twitter\n\n`Twitter` 成立于\
  \ 2006 年。`Twitter` 本质上是一个基于 `SMS`（短信）的社交网站。它常被称为一个微博客网站，是名人和普通人分享想法的地方。关键在于，您只有\
  \ 140 个字符来表达您的观点。\n\n通过 `Twitter`，您可以订阅关注那些发布推文的人。您也可能发现有人开始关注您。如果您想关注我们，我们在 `Twitter`\
  \ 上的账号是 `@garymadesimple`。\n\n### 设置 Twitter\n\n在 `iOS 5` 中，`Twitter` 应用已内置于您的 `iPhone`\
  \ 中。这意味着该应用允许您从其他应用（如 `照片`）内分享图片和帖子等内容。请按照以下步骤设置 `Twitter`：\n\n1.  点击 `设置` 应用。\n\
  2.  向下滚动并点击 `Twitter`。\n3.  如果 `iPhone` 版 `Twitter` 尚未安装在您的 `iPhone` 上，请点击 `Twitter`\
  \ 图标右侧的“安装”按钮。（如果已安装 `iPhone` 版 `Twitter`，则“安装”按钮将呈灰色不可用状态。）\n4.  点击“用户名”并输入您的 Twitter\
  \ `@username`。\n5.  点击 `密码` 并输入您的 Twitter 密码。\n6.  点击 `登录` 按钮。\n7.  如果您没有 Twitter\
  \ 帐户，请点击屏幕底部的 `创建新帐户` 按钮，并填写表单来获取一个。\n\n    ![image](img/U2519.jpg)\n\n8.  登录后，点击“帐户”以更改您的选项。\n\
  9.  如果您希望朋友能根据您的电子邮件地址在 Twitter 上找到您，请将 `通过电子邮件找到我` 切换至 `开启`。\n10. 如果您希望每次在应用内发推文时都记录您的位置，请将\
  \ `推文位置` 切换至 `开启`。\n\n    ![image](img/U2520.jpg)\n\n**注意：** 如果您发布了带有位置信息的推文，Twitter\
  \ 上的任何人都可能找到您的确切位置——包括发现您不在家或不在公司。如果您担心隐私问题，请将 `推文位置` 切换至 `关闭`。\n\n#### 使用 Twitter\n\
  \n官方的 `Twitter` 应用采用了一种精简的方式来使用 Twitter。`主页` 屏幕会显示您关注的人的推文，完整消息显示得清晰且字号较大。\n\n底部有五个图标，第一个是主要的\
  \ `Twitter` 信息流。其他图标分别是 `提及`、`私信`、`搜索` 以及 `更多` 按钮，点击 `更多` 按钮可以进入您的 `个人资料`、`喜欢`、`草稿`、`列表`\
  \ 以及 `帐户和设置`。\n\n`写推文` 图标位于左上角（参见 图 25-1）。\n\n![images](img/2501.jpg)\n\n**图 25-1.**\
  \ `Twitter` 应用 `主页` 页面的布局\n\n#### 刷新推文列表\n\n要刷新您的推文列表，只需下拉主页面，您会在顶部看到 `下拉以刷新` 的提示。当页面被拉下后，您会看到\
  \ `释放以刷新` 的提示。释放页面，推文列表就会刷新。\n\n![image](img/U2521.jpg)\n\n#### 您的 Twitter 个人资料\n\
  \n要显示您的 Twitter 个人资料，请点击 `更多` 按钮，然后点击 `我的个人资料`。\n\n要查看您的推文，请点击 `推文`。\n\n要查看您标记为喜欢的推文，请点击\
  \ `喜欢` 按钮。\n\n要查看您关注的人，请点击 `正在关注` 按钮。\n\n**注意：** 关于您的粉丝数、关注人数和推文数量的数字会显示在按钮标题的上方。\n\
  \n向下滚动页面以查看您的 `转推`、`列表` 以及您可以订阅的 `服务`。\n\n![image](img/U2522.jpg)\n\n#### 写推文按钮\n\
  \n点击 `写推文` 按钮 ![image](img/U2523.jpg)，会弹出 `新推文` 屏幕。当您输入消息时，字符计数器将从 140 开始倒计数。以下是一些您可以在\
  \ `新推文` 屏幕中执行的操作：\n\n*   点击 @ 符号搜索要在推文中提及的其他用户名。\n*   点击 # 符号搜索要在推文中标记的热门话题。\n*\
  \   点击 `相机` 图标，使用您的 iPhone 拍照或录制视频，或从您的资料库中选择现有内容添加到推文中。\n*   点击 `箭头` 图标，将您当前的位置添加到推文中。\n\
  \n![image](img/U2524.jpg)\n\n#### 推文内的操作选项\n\n从您的 `Twitter` 应用的 `主页` 屏幕，只需点击您的一条推文即可看到以下选项：\n\
  \n*   点击屏幕左下角的 `返回箭头` 来 `回复` 一条推文。\n*   点击方形的 `双箭头` 来转推或引用一条推文。\n*   点击 `星形` 图标来喜欢一条推文。\n\
  *   点击 `回形针` 图标来查看附件。\n*   点击 `操作` 按钮来复制推文链接、通过邮件发送推文或翻译推文。\n\n![image](img/U2525.jpg)\n\
  \n**注意：** 与 Facebook 和 LinkedIn 不同，您可以在 App Store 中找到各种第三方 Twitter 应用。如果您不喜欢官方的\
  \ `iPhone` 版 `Twitter` 应用，可以尝试使用 `Tweetbot`、`Twitterrific` 或许多其他应用。\n\n"
- "# 第 26 章\n\n\n\n## 故障排除\n\niPhone 通常非常可靠。但偶尔，就像你的电脑或任何复杂的电子设备一样，你可能需要重置设备或排除故障。在本章中，我们将为你提供一些有用的工具，帮助你的\
  \ iPhone 尽快恢复正常运行。我们将从一些基本的快速故障排除开始，然后在“高级故障排除”部分深入探讨更复杂的问题和解决方案。\n\n我们还将介绍一些与 iPhone\
  \ 相关的其他琐碎事项，并为你提供一个可以寻求帮助的资源列表。\n\n### 基本故障排除\n\n首先，我们将介绍一些基本技巧和窍门，以便在 iPhone 出现问题时让它恢复正常。\n\
  \n#### iPhone 无响应时该怎么办\n\n有时候，你的 iPhone 会对触摸无响应——它会在运行某个程序时突然死机。如果发生这种情况，请尝试以下步骤，看看\
  \ iPhone 是否会开始响应（参见 图 26-1）：\n\n![image](img/U2601.jpg)\n\n1.  按一次 `Home` 按钮，看看是否能退出应用程序回到\
  \ `Home` 屏幕。\n2.  如果某个特定的应用程序导致问题，尝试双击 `Home` 按钮打开 `App Switcher` 栏。接着，按住 `App Switcher`\
  \ 栏中的 *任意* 图标，直到它们都开始抖动，并且应用程序图标的左上角出现一个带有减号的红色 `Circle` 图标。\n\n    ![image](img/U2602.jpg)\n\
  \n3.  点击红色 `Circle` 图标关闭该应用。\n4.  如果 iPhone 仍然无响应，尝试按住 `Sleep/Power` 键，直到看到 `Slide\
  \ to Power Off`。\n5.  长按 `Home` 按钮，直到返回 `Home` 屏幕——这应能强制退出程序。\n6.  确保你的 iPhone 电量充足。尝试将其插入电源或连接到电脑（如果已插入），看看是否会开始响应。\n\
  7.  如果长按 `Home` 按钮无效，你需要按住 `Power/Sleep` 按钮三到四秒钟来尝试关闭 iPhone。\n8.  接着，滑动屏幕顶部的 `Slide\
  \ to Power Off` 滑块。如果无法关闭 iPhone，则需要重置 iPhone。请跳至下一节了解操作方法。\n9.  关闭 iPhone 后，等待大约一分钟，然后按住同样的\
  \ `Power` 按钮几秒钟来开启 iPhone。\n10. 你应该会看到屏幕上出现 `Apple` 标志。等待 iPhone 启动，之后你应该就能访问你的程序和数据了。\n\
  \n![images](img/2601.jpg)\n\n**图 26–1.** *基本故障排除步骤*\n\n如果这些步骤不起作用，你需要重置你的 iPhone。\n\
  \n#### 如何强制重启你的 iPhone\n\n重置设备是处理 iPhone 无响应问题的另一种方法。执行此操作完全安全，并且通常可以解决许多问题（参见 图\
  \ 26-2）。\n\n![images](img/2602.jpg)\n\n**图 26–2.** *重置你的 iPhone*\n\n请按照以下步骤强制重启你的\
  \ iPhone：\n\n1.  用双手，同时按住 `Home` 按钮和 `Power/Sleep` 按钮。\n2.  保持按住这两个按钮大约八到十秒钟。你会看到\
  \ `Slide to Power Off` 滑块。忽略它，继续按住两个按钮，直到屏幕变黑。\n3.  再过几秒钟，你应该会看到 `Apple` 标志出现。看到标志后，松开按钮，你的\
  \ iPhone 将被重置。\n\n#### 如何软重置你的 iPhone\n\n你可以在 `设置` 应用中重置多种项目，从 `主屏幕` 布局到网络设置，再到设备上的所有数据：\n\
  \n1.  点击 `设置` 图标。\n2.  点击 `通用`。\n3.  向上滑动以查看页面底部。\n4.  点击 `传输或还原 iPhone`。\n5.  点击\
  \ `还原所有设置` 以重置网络、键盘、`主屏幕` 布局和定位警告。在弹出的窗口中点击 `还原` 以确认。\n6.  点击 `抹掉所有内容和设置` 以清除 iPhone\
  \ 上的所有内容，然后点击 `抹掉` 在弹出的窗口中确认。\n7.  点击 `还原网络设置` 以清除你所有的 Wi-Fi（和 3G）网络设置。\n8.  点击\
  \ `还原键盘词典` 以重置拼写词典。\n9.  点击 `还原主屏幕布局` 以恢复为出厂布局；这会将 iPhone 的 `主屏幕` 恢复到其原始布局。\n10.\
  \ 点击 `还原定位与隐私` 以重置你收到的关于允许应用使用你当前位置的警告信息。\n\n![image](img/U2603.jpg)\n\n#### 音乐、视频、提醒或电话铃声没有声音\n\
  \n没有什么比错过电话、想听音乐或看视频却发现 iPhone 没有声音更令人沮丧的了。通常，这个问题有一个简单的解决方法：\n\n1.  如果你听不到电话铃声或其他任何提醒，请检查确保设备左上边缘的\
  \ `静音` 开关没有打开。当开关拨向设备背面且旁边显示一点橙色时，你知道 `静音` 开关已打开。请确保 `静音` 开关被推向了设备正面，即关闭位置。\n2.\
  \  使用 iPhone 左上边缘的 `音量增大` 键检查音量。你可能不小心将音量调到了最低或静音。\n3.  如果你正在使用有线耳机，请拔下耳机，然后重新插入。有时，耳机插孔连接不良。\n\
  4.  如果你正在使用无线蓝牙耳机或蓝牙立体声设备，请遵循以下步骤：\n   1.  检查音量设置（如果耳机或立体声设备上有音量控制）。\n   2.  检查确保蓝牙设备已连接。点击\
  \ `设置` 图标，点击 `通用`，然后点击 `蓝牙`。确保看到你的设备已列出并且其状态为 `已连接`。如果未连接，则点击它并按照指示与 iPhone 配对。\n\
  \n        **注意**：有时你可能实际上已连接到蓝牙设备但并未意识到。如果你连接到蓝牙立体声设备，则实际的 iPhone 将不会发出声音。\n\n5.\
  \  确保歌曲或视频未处于暂停模式。\n6.  打开 iPhone 的音乐或视频控制。双击 `Home` 按钮应打开 `App Switcher` 栏。从左向右滑动以查看你的媒体控制。\n\
  7.  再向右滑动一次以查看音量控制。确认歌曲未暂停且音量未被调到最低。\n8.  最后，检查 `设置` 图标，看看是否你（或其他人）在 iPhone 上设置了\
  \ `音量限制`：\n   1.  点击 `设置` 图标。\n   2.  向下滑动页面并点击 `音乐`。\n   3.  查看 `音量限制` 是否为 `开`。\n\
  \   4.  点击 `音量限制` 以检查设置级别。如果限制未锁定，只需将音量滑块滑动到更高水平。\n   5.  如果已锁定，你需要先点击 `解锁音量限制`\
  \ 按钮并输入四位数字代码来解锁。\n\n如果这些步骤都无济于事，请查看本章后面的“其他故障排除和帮助资源”部分。如果那也没用，请尝试按照本章中“从备份恢复你的\
  \ iPhone”部分的步骤从备份文件恢复你的 iPhone。最后，如果这仍无帮助，请联系向你出售 iPhone 的商店或商家寻求帮助。\n\n\n\n#####\
  \ 若无法从 iTunes 或 App Store 进行购买\n\n你刚到手这台酷炫的新设备，于是决定访问 iTunes Store 或 App Store。但如果你收到错误信息，或者无法进行购买，该怎么办？遇到这种情况时，可尝试以下步骤：\n\
  \n1. 这两个商店均需有效的互联网连接。请确保你已连接 Wi-Fi 或蜂窝数据网络。如需协助，请查阅第 4 章：“连接到网络”。\n2. 确认你拥有有效的 iTunes\
  \ 账户。\n\n### 高级故障排除\n\n至此，我们已经介绍了 iPhone 上的基本故障排除步骤。在接下来的章节中，我们将深入探讨一些更高级的故障排除方法。\n\
  \n#### 当 iPhone 未显示在 iTunes 中时\n\n有时，当你将 iPhone 连接到 PC 或 Mac 时，`iTunes` 应用可能无法识别你的\
  \ iPhone。因此，你的 iPhone 不会出现在左侧导航栏中。\n\n将 iPhone 连接到电脑后，它应显示在左侧导航栏的 `DEVICES` 下。你可以通过以下几个步骤来尝试让\
  \ `iTunes` 应用识别你的 iPhone：\n\n1. 通过查看`主屏幕`右上角的电池电量来检查 iPhone 的电池充电状态。如果电池电量过低，`iTunes`\
  \ 应用需要等电量回升后才会识别到它。\n2. 如果电池已充电，请尝试将 iPhone 连接到电脑上的另一个 USB 端口。有时，如果你一直使用同一个 USB\
  \ 端口连接 iPhone，换到另一个端口后电脑可能无法识别。\n3. 如果问题仍未解决，请尝试断开 iPhone 连接并重启电脑。\n4. 接着，重新将 iPhone\
  \ 连接到 USB 端口。\n5. 如果 `iTunes` 应用仍然无法识别你的 iPhone，请下载 `iTunes` 的最新更新，或者完全卸载并重新安装电脑上的\
  \ `iTunes` 应用。如果选择此选项，请务必先备份 `iTunes` 中的所有信息。\n6. 你也可以尝试使用另一条同步线缆，可能是你的 USB 同步线缆存在故障。\n\
  \n#### 同步问题\n\n有时，在将 iPhone 与电脑（PC 或 Mac）同步时，你可能会遇到错误。解决方式取决于你的同步方法。\n\n##### 使用\
  \ iTunes 进行同步\n\n如果你使用 iTunes 同步个人信息，请按照以下步骤解决同步问题：\n\n1. 首先，执行我们在本章“iPhone 未显示在\
  \ iTunes 中”部分列出的所有步骤。\n2. 如果 iPhone 仍然无法同步，但你可以在 `iTunes` 应用的左侧导航栏中看到它，请返回第 3 章：“与\
  \ iCloud、iTunes 等同步”，并仔细检查你的同步设置。\n\n##### 使用 Apple 的 iCloud 或 Microsoft Exchange\
  \ 进行同步\n\n如果你使用 iCloud 服务或 Microsoft Exchange 方法来同步电子邮件和个人信息，请按照以下故障排除步骤解决同步问题：\n\
  \n1. iCloud 和 Exchange 同步都需要无线互联网数据连接来同步电子邮件和个人信息。请通过查看快速入门指南中“读取连接状态图标”部分的表 1，确认你拥有有效的数据连接。\n\
  2. 如果没有无线数据信号，请确认你的 Wi-Fi 或 3G 连接设置正确（参见第 4 章：“连接到网络”）。\n3. 确认连接后，你需要检查电脑和 iPhone\
  \ 上的同步设置是否正确（参见第 3 章）。\n\n**提示：** 有时问题可能很简单，比如密码已更改。如果是这种情况，请确保在 iPhone 上更正同步设置的密码。可通过点击`设置`图标，然后点击`邮件、通讯录和日历`来找到这些设置。最后，点击账户名称并调整密码。\n\
  \n\n\n### 重新安装 iPhone 操作系统（可选择是否恢复数据）\n\n有时，你可能需要执行一次 iPhone 操作系统的纯净安装，以便让 iPhone\
  \ 恢复顺畅运行。如果当前有可用更新，此过程也将同时升级你的 iPhone 软件。\n\n**提示：** 此过程实际上与使用新版本操作系统更新 iPhone 的过程完全相同。\n\
  \n在此过程中，你将面临三个选择：\n\n-   如果你想将 iPhone 恢复至包含所有数据的正常状态，则必须使用 `iTunes` 应用中的`恢复`功能。\n\
  -   如果你打算全新启动并将 iPhone 关联到一个 iTunes 账户，则需在此过程结束时使用`设置新的 iPhone`功能。\n-   如果你打算赠送或出售你的\
  \ iPhone，只需在此过程结束时（在进行恢复或新设置之前）从 `iTunes` 中弹出 iPhone 即可。\n\n**警告**：此恢复过程将彻底清空你的\
  \ iPhone。你需要重新同步和重新安装所有应用程序，并输入你的账户信息，例如电子邮件账户。此过程可能需要 30 分钟或更长时间，具体取决于你同步到 iPhone\
  \ 的信息量。\n\n要按照步骤重新安装 iPhone 操作系统软件，并可以选择从之前的备份中恢复数据到你的 iPhone，请执行以下操作：\n\n1.  将你的\
  \ iPhone 连接到电脑，并打开 `iTunes` 应用。\n2.  在左侧导航栏的`设备`类别中，点击你的`iPhone`。\n3.  点击顶部导航栏中的`摘要`。\n\
  4.  你会看到显示所有 iPhone 信息的`摘要`屏幕。点击屏幕中央的`恢复`按钮，如下图所示（请参见图 26–3）。\n\n![images](img/2603.jpg)\n\
  \n**图 26–3.** *连接你的 iPhone 并在`摘要`屏幕中点击`恢复`按钮*\n\n5.  现在系统会询问你是否要备份手机。为安全起见，请点击`备份`（请参见图\
  \ 26–4）。\n\n![images](img/2604.jpg)\n\n**图 26–4.** *在 `iTunes` 中恢复前进行备份*\n\n6. \
  \ 在下一个屏幕上，你会被警告所有数据都将被抹掉。点击`恢复`或`恢复并更新`以继续（请参见图 26–5）。\n\n![images](img/2605.jpg)\n\
  \n**图 26–5.** *恢复之前在 `iTunes` 中备份你的 iPhone*\n\n7.  你会看到一个 iPhone `软件更新`屏幕。点击`下一步\
  \ >` 以继续。\n8.  接下来，你会看到`软件许可协议`屏幕。点击`同意`以继续并开始该过程。\n9.  `iTunes` 会下载最新的 iPhone 软件，备份并同步你的\
  \ iPhone，然后重新安装 iPhone 软件。此过程会完全抹掉所有数据，并将你的 iPhone 恢复到原始“干净”状态。你将在 `iTunes` 顶部看到状态消息，类似于图\
  \ 26–6 所示。\n\n![images](img/2606.jpg)\n\n**图 26–6.** *软件更新/恢复过程，`iTunes` 顶部显示状态窗口*\n\
  \n10.  备份和同步完成后，你的 iPhone 屏幕会变黑。接着，`Apple` 标志会出现，并且你会看到标志下方有一个进度条。最后，`iTunes` 中会弹出一个小窗口，告知你更新过程已完成。点击`确定`进入`设置你的\
  \ iPhone` 屏幕。此时你将有以下几个选项：\n    1.  如果你希望保持 iPhone 的干净状态（即不含任何个人数据），请选择第一个选项`设置为新的\
  \ iPhone`。如果你正在为他人设置此 iPhone，你可能需要使用此选项（你需要她/他的 Apple ID 和密码）。\n    2.  如果你要赠送或出售你的\
  \ iPhone，只需点击 iPhone 旁边的`弹出`图标，就完成了（请参见图 26–7）。\n\n![images](img/2607.jpg)\n\n**图\
  \ 26–7.** *如果你要赠送或出售 iPhone，请将其弹出*\n\n3.  选择`从以下备份恢复：`并确认下拉菜单已设置为正确的设备。\n11.  最后，点击`继续`（请参见图\
  \ 26–8）。\n\n![images](img/2608.jpg)\n\n**图 26–8.** *设置为新 iPhone 或从备份文件恢复*\n\n12.\
  \  如果你选择恢复，那么稍后你的 iPhone 上会出现`正在恢复`屏幕，并且 `iTunes` 中会显示一个状态窗口，提示“正在从备份恢复 iPhone…”。此状态窗口还会显示预计时间。\n\
  13.  接下来，你会看到一个小弹出窗口，提示“你的 iPhone 设置已恢复”。几秒钟后，你会看到你的 iPhone 出现在 `iTunes` 左侧导航栏的`设备`下。\n\
  \    1.  如果你将信息与 `iTunes` 同步，则所有数据现在都将被同步。\n    2.  如果你使用 iCloud、Exchange 或其他同步过程，你可能需要在\
  \ iPhone 上重新输入密码以让这些同步过程恢复运行。\n\n## 其他故障排除和帮助资源\n\n有时，你可能会遇到本书中找不到答案的特定问题或疑问。在以下部分中，我们将提供一些可以从\
  \ iPhone 以及从电脑的网页浏览器访问的优质资源。iPhone 上的设备端用户指南易于导航，可快速提供你所查找的信息。如果你遇到特别难以解决的故障排除问题时，Apple\
  \ 知识库会很有帮助。与 iPhone/iPod touch 相关的网络博客和论坛也是寻找答案甚至提出你遇到的独特问题的好地方。\n\n### iPhone 设备端用户指南\n\
  \n请按照以下步骤访问 iPhone 设备端用户指南：\n\n1.  打开你的 `Safari` 网络浏览器，查看你的 iPhone 的在线用户指南。\n2.\
  \  点击底部图标行中的`书签`按钮 ![image](img/U2604.jpg)。\n3.  滑动到列表底部，然后点击`iPhone 用户指南`。\n\n\
  如果看不到该书签，请在 iPhone 上的 `Safari` 的`地址`栏中输入此网址：[`http://help.apple.com/iPhone`](http://help.apple.com/iPhone)。\n\
  \n**提示**：要从电脑查看 PDF 格式的手册，请访问 [`http://support.apple.com/manuals/iphone/`](http://support.apple.com/manuals/iphone/)。\n\
  \n进入 iPhone 上的用户指南后，你应该会看到一个类似于图 26–9 所示的屏幕。\n\n好处在于你已经知道如何浏览该指南。点击任何主题以查看该主题的更多信息——可能是另一个子主题列表，或者是更详细的信息。\n\
  \n阅读该主题，或点击其他链接以了解更多信息。\n\n你可以点击屏幕右侧的按钮返回上一级。\n\n![images](img/2609.jpg)\n\n**图\
  \ 26–9.** *在你的 iPhone 上通过 `Safari` 使用 iPhone 手册*\n\n### Apple 知识库\n\n在你的 iPhone\
  \ 或电脑的网页浏览器中，访问此网页：[`www.apple.com/support/iphone/`](http://www.apple.com/support/iphone/)\n\
  \n最后，点击左侧导航栏中的一个主题。\n\n\n\n#### 与 iPhone 相关的博客\n\n拥有 iPhone 的一大好处是，你立即加入了全球 iPhone\
  \ 用户的大家庭。许多 iPhone 用户堪称*发烧友*，并且是众多 iPhone 用户小组的成员。这些用户小组，连同各种论坛和网站，为 iPhone 用户提供了丰富的资源。其中许多资源可以直接在你的\
  \ iPhone 上获取，另外也有一些网站你可能想在电脑上浏览。\n\n有时，你可能想与其他 iPhone 爱好者交流，询问一个技术问题，或者了解最新、最热门的传闻。博客是一个绝佳的去处。\n\
