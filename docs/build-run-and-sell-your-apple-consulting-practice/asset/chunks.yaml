  trans: '

    # 搜索引擎广告


    在上一章中，我们讨论了搜索引擎优化（SEO）。另一种能让你的信息在几乎任何搜索引擎中排名靠前的方法，就是直接花钱购买位置。谷歌、必应和其他搜索引擎允许你购买搜索结果列表中的前几个位置（通常会在列表上附带“赞助商”之类的字样），或者购买搜索引擎侧边栏上的某个位置。这通常是它们盈利的方式。


    关于如何有效购买这类广告，市面上有整本书专门论述。我当然算不上专家。但在这方面，我确实取得了一些相当不错的成功，尤其是在搜索引擎上购买广告这件事上。首要原因是，我利用搜索引擎优化（SEO）来找出值得购买的关键词。这一点我怎么强调都不为过。第二个原因是，我从小额投入开始。第三个原因是我专注于长尾搜索。我们来逐一解析这些要点。


    你不能完全依赖 SEO 来为你带来生意。SEO 有助于发展你的业务，但其更大的价值在于帮助你更好地理解哪些关键词值得购买，从而能为你的网站带来流量；更关键的是，它能帮你识别出那些能够转化为付费客户的高价值流量。即使你还没准备好开始在搜索引擎广告上花钱，通过创建内容、构建着陆页、优化页面信息以提升流量转化率，并收集分析数据，这些工作都将为你未来在谷歌等搜索引擎上的广告投入铺平道路。


    一旦你开始理解潜在客户（或称线索）在你的网站上将经历的旅程，你就可以开始在谷歌、必应、雅虎甚至 Pinterest 等网站上少量投入资金了。从小额付费开始逐步增长，是保护你的广告资金并让你能够建立稳健实践的好方法。我喜欢使用的一款免费工具是：Google
    Analytics。但还有其他解决方案，比如 `WordStream.com`，它能帮助你更轻松地购买流量大的关键词，因为它能帮你分析当前的词语搜索情况。


    许多公司一开始会购买像“Consulting Los Angeles”或“Apple Consulting Venice Beach”这样的词语。通常来说，词语越多，广告购买成本越低。购买由多个词语组成、虽然点击量较低但转化率（即促成购买）更高的长串词语，被称为长尾搜索。这是一种非常有效的方式，既能控制广告支出，又能减少花在筛选不相关搜索上的时间——比如那些可能在另一个国家寻求帮助，或者搜索了错误内容的人。举个例子，快速分析显示，花
    100 美元买“Mac”这个关键词几乎不可能给你带来一个客户。买“Mac consulting”或许可以。而“Mac consulting Minneapolis”则更加精准。但如果有人搜索“Mac
    consulting Minneapolis Xsan”或“Mac Consulting Minneapolis Lightspeed”，你的电话很可能会响。


    ### 注意


    我们在上面的搜索中加入了“Minneapolis”。你也可以根据特定的人口统计数据和地理位置来定位广告，从而最大限度地提升广告活动的效果。


    你还可以借助一些工具来优化广告，挖掘被隐藏的优质搜索机会。像 Kenshoo、Adobe Ad Cloud、`Wordstream.com` 这类产品，能让你汇总统计数据、管理广告、跨平台进行
    A/B 测试，并提供许多本需聘请顾问才能获得的价值。不过，更明智的投入方式是聘请一位顾问来帮你设置这些工具，然后解读分析数据，并做出明智的广告购买决策。


    最终，你必须让在线广告发挥作用。即使你本章中的其他媒介一个都不尝试，这一点也至关重要。搜索引擎很可能是你挖掘新客户来源的最佳途径，你可以在此基础上持续拓展业务。既然我们已经讨论了搜索引擎优化和搜索引擎广告，接下来我们看看在网站上购买广告，这通常被称为在线广告或展示广告。


    # 在线广告


    搜索引擎广告是一回事，在网站上购买广告则是另一回事。定向投放特定网站的成本效益是最高的，但实际购买广告的过程也是最费力的。请记住，当你花在购买一个广告上的时间，按你的计费费率折算后超过了广告本身的费用时，你就不可能购买太多广告了！


    我买过的一些最划算的广告，是在那些本身没有广告位、或者收费远低于其应有价值的网站上。我在 `AFP548.com` 上投放了好几年的广告，至今仍因为他们收得太少而有点愧疚。不过，虽然寻找小型网站购买广告通常能带来很高的投资回报率（每美元花费，这延伸到客户获取成本
    CAC，即获取一个客户的成本），但试图寻找越来越多的网站、处理向这些网站付款的流程、以及与网站管理员反复沟通，可能会消耗大量时间。


    最简单的方法是在大型广告网络上购买广告。这些网络会处理大量后台工作，为你汇总统计数据，帮助你精准定位优质购买机会，自动执行购买操作，并处理所有计费事宜。当然，这些服务会有加价，并且投放可能具有一定随机性，导致你的广告出现在一些你或许完全不想关联的网站上。但它很高效。


    要找到你想要的广告网络，一个很好的方法是访问某个网站，并寻找代表该网站及其他类似网站的垂直广告网络。这将为你提供一个可以购买广告的渠道。大多数网络允许你进行“网站范围投放
    (ROS)”甚至“网络范围投放 (RON)”，这有助于它们进行批量销售，也能让你偶尔捡到一些便宜的广告位。随着你的目标定位越来越宽泛，每次点击成本 (CPC)
    可能会下降，但希望客户获取成本 (CAC) 能保持大致不变。在大型广告网络上投放广告，价格低至每千次展示费用 (CPM) 10 美元的情况并不罕见。然而，有效的
    CPM 通常只有这个数字的四分之一。大额购买变成了一场数字游戏，对于小型咨询公司来说，往往效果不佳。


    以下是一些值得关注的大型广告网络：AdBrite、Adcash、DoubleClick、`Advertising.com`、ValueClick、Rocket
    Fuel、Right Media、Zedo、Google AdSense、Ad maven、Clicksor、`BuySellAds`、`Media.net`、Infolinks、Chitika
    和 Kontera。逐一查看它们，寻找吸引你的功能。选择很多，所以你完全可以挑剔一些。


    专注于你所服务的区域。广告网络应该能够将你的广告限制在特定地理区域。这能让你的每一分钱都发挥更大效益，并避免接到来自你不提供或无法提供服务的地区客户的电话。如果你的业务是全国性或全球性的，那么应将相当一部分媒体预算投入到你品牌知名度更高的市场，以产生多触点营销的效果；同时，对于不受特定地理区域限制的广告，可以采用信息更宽泛的独立广告素材。


    在社交媒体上做广告是展示广告的另一种方式。你可以在 Twitter、Facebook、LinkedIn、Pinterest 以及几乎所有社交媒体平台上购买赞助帖。请记住，这些广告成本很低，但在销售商业服务的初期通常效果不佳。然而，它们是完善展示广告组合的绝佳方式，非常值得一试。

