- fmt: '# Providing Infrastructure Services


    Remember when we mentioned phone services earlier in this chapter? If you have
    customers that actually need help at their offices, here are some things to consider
    in order to round out your services offering:


    - **Monitoring Services**: A monitoring service can alert you when there’s a problem
    on a computer or network appliance. A solution like `Watchman Monitoring` will
    monitor Macs (and common third-party tools loaded on Macs) and let you know when
    various ailments are either happening or about to happen. For example, if a hard
    drive is failing, you’ll get an alert, hopefully allowing you to fix the problem
    before a user at a customer site notices a problem. Network appliances can be
    monitored either through a tool for the type of appliances your customer has or
    through a centralized tool (of which there are many). This is priceless, both
    in terms of happy customers and safe customers, and pays for itself, whether you
    eat the cost or pass it on to customers.


    - **Internet Services**: Earlier, we mentioned selling Internet services. If you
    do, consider selling two lines to each customer: one that is a primary with a
    high SLA and a second that is residential-class, but often much faster. Many routers
    will support sharing the load to two lines. Having two means the customer is up
    if one fails but also means that the customer gets faster speeds for not a lot
    of extra money.


    - **Wireless Access Points (WAPs)**: Customers need wireless in their offices.
    The Internet service that you provide them might come with a wireless bundled
    in, but that often doesn’t meet security requirements or unified management. Tools
    like `Meraki` allow a reseller to manage multiple customers using a single portal.
    Other tools like `SonicWall` or `Cisco` provide much more scalability while also
    providing a ton of enterprise-class features.


    - **Switches**: Switches allow you to connect all those Ethernet devices that
    some people apparently still have. When selling these, consider which can segment
    networks with Virtual LANs (or VLANs), which work well with Apple devices, and
    which provide the amount of throughput that customers need.


    - **Routers**: For smaller customers, you really want converged networking, which
    is to say multi-purpose appliances. For example, a five-person company might be
    able to use a `LinkSys` as a WAP, a switch, and a router. As customers get larger,
    they may outgrow older equipment. I like keeping it around in case of a failure,
    but it’s worth mentioning that with any networking equipment, keep tabs on when
    a customer might be outgrowing what you can do for them cost-effectively—or where
    you might want your company to get better at a given technology, and so offer
    some services at a discount while you do so.


    - **Peripherals**: Yup, some people still print. Some need cameras, webcams, multi-function
    devices, etc. This is where you need to start drawing the line for what you sell
    and what you don’t. Drives, mass storage devices (RAIDs and `Drobo`), and other
    peripherals are easy to justify, but camera filters or iPad cases start to get
    a little off-mission.


    - **Phone Services**: The last thing I’ll mention is phones. Many small businesses
    have their employees using their personal phones (or company-provided iPhones)
    as their work phones. At a minimum, most customers with a brick and mortar office
    need at least one landline. As they grow, they may choose to use a Voice Over
    IP (VoIP) solution, or phone system. Try to keep this app-driven, in the cloud,
    and without actual hardware as much as possible if you’re going to try to sell
    it. If those start to become challenging, then consider a referral partner who
    deals with big, traditional phone systems and/or video conferencing.


    - **Cabling**: All consultants need a good cabling referral partner. But few should
    run cable themselves.


    Ultimately, you don’t need to be everything to all customers. If a customer needs
    something you don’t understand how to do, you have an option: find a referral
    partner or provide it to the customer. If it’s too far out of your skillset, this
    is usually an easy decision. But if it’s kinda’ within your skillset, then make
    sure to be cognizant of how far it might take you from your true focus. But above
    all keep an eye on the bank account, as you’ll typically need to veer a little
    bit off course in order to find lasting success.


    # Further Reading


    - _Selling Professional Services the Sandler Way_, Chuck Polin, Evan Polin, [`https://www.amazon.com/Selling-Professional-Services-Sandler-Way/dp/0983261458`](https://www.amazon.com/Selling-Professional-Services-Sandler-Way/dp/0983261458)


    - _Selling the Invisible: A Field Guide to Modern Marketing_, Harry Beckwith,
    [`https://www.amazon.com/Selling-Invisible-Field-Modern-Marketing/dp/0446672319`](https://www.amazon.com/Selling-Invisible-Field-Modern-Marketing/dp/0446672319)


    - _Boyd: The Fighter Pilot Who Changed the Art of War_, Robert Coram, [`https://www.amazon.com/Boyd-Fighter-Pilot-Who-Changed/dp/0316796883`](https://www.amazon.com/Boyd-Fighter-Pilot-Who-Changed/dp/0316796883)


    - _Service is Not a Product: The Expert’s Guide to Selling Service Agreements_,
    Joseph Siderowicz, [`https://www.amazon.com/Service-Not-Product-Experts-Agreements/dp/061554780X`](https://www.amazon.com/Service-Not-Product-Experts-Agreements/dp/061554780X)


    - _Starting an iPhone Application Business for Dummies_, Aaron Nicholson, Joel
    Elad, Damien Stolarz, [`https://www.amazon.com/Starting-iPhone-Application-Business-Dummies/dp/0470524529`](https://www.amazon.com/Starting-iPhone-Application-Business-Dummies/dp/0470524529)


    - _iPhone and iPad Apps Marketing: Secrets to Selling Your iPhone and iPad Apps_,
    Jeffrey Hughes, [`https://www.amazon.com/iPhone-iPad-Apps-Marketing-Biz-Tech/dp/0789744279`](https://www.amazon.com/iPhone-iPad-Apps-Marketing-Biz-Tech/dp/0789744279)


    - _Brand Identity Breakthrough_, Gregory Diehl, Alex Miranda, [`https://www.amazon.com/Brand-Identity-Breakthrough-Companys-Irresistible-ebook/dp/B01C37VTAW`](https://www.amazon.com/Brand-Identity-Breakthrough-Companys-Irresistible-ebook/dp/B01C37VTAW)


    - _Ace the Sale!_ Nick Gomersall, [`https://www.amazon.com/Practical-Methodology-Enterprise-Software-Hardware/dp/0955911435/`](https://www.amazon.com/Practical-Methodology-Enterprise-Software-Hardware/dp/0955911435/)


    # Hiring and Human Resources


    You’ve built a pricing model and business plan. You’ve made relationships with
    vendors and other entities that allow you to grow. And now it’s time to start
    building a team. Hiring is one of the most important things you can do as a company.
    You entrust your customers with your employees. And the hardest is the first.


    In this chapter, we’ll explore planning how your staff will look, hiring your
    first employee, some basic management tips, and also some of the logistical stuff
    that goes into actually being a legitimate (a.k.a. legal) employer.'
