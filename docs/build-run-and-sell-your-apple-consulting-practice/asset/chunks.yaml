    # 5. Buy Software to Automate the Business


    We’ve all probably said “there’s an app for that.” And nowhere is this truer than
    the various aspects of starting a business. One of the things that the app-based
    economy has done for small businesses is let them run on par with large enterprises.
    Gone are the days of wishing you had a tool that could do just about anything.
    You do. Gone are the days of paying massive amounts of money for monolithic tools
    that force you into doing business a specific way. Here are the days of stringing
    together small tools and workflows to automate pretty much anything, from managing
    trouble tickets, to repairing systems, to messaging you about problems on devices,
    to taking payment.


    So here’s what you need to do with this chapter: string together a toolset that
    helps automate the business so you don’t have to do all of the things manually.
    Start with the tech. Always begin by building the best solution for your customers;
    in this chapter I call that the Techie Bits. From there, snap in parts around
    that solution that automate the services side of your business; these are the
    PSAs and MSAs. And then glue them all together using common off-the-shelf products
    from the app-based economy. But like I said, it starts with The Techie Bits.


    ## Choose Your Tools


    The “Techie Bits” section later in the chapter provides a nice long list of technical
    solutions. Why do I list so many rather than give you an easy-to-follow, comprehensive
    roadmap of tools? Because they’re all equal in their own right. Maybe you want
    an open source-based toolchain. Maybe you want to keep things simple and do MDM-only
    device management of Macs. Maybe you have enough devices to warrant hiring a devops
    team or platform engineering team that can automate a lot of maintenance and device
    management tasks. Or maybe you want to build a ton of zero-tier assets that allow
    your customers to service their own needs and hook them into a machine learning
    based chat-bot. Maybe you prefer a 100% personalized touch and just want to get
    alerted when there’s a problem.


    Whatever you choose to do, the most important thing is to know what’s out there
    and be deliberate about what you choose to do and not to do. First, let’ll look
    at device management solutions, or those that allow you to remotely and centrally
    manage the state of devices, keeping you from having to perform routine tasks.'
