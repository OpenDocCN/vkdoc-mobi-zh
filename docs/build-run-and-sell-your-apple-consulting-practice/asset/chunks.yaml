    \ and we can afford to do so. This begins, of course, with paid search.\n\n**Chapter\
    \ 10:** *The Art of Selling.* The previous few chapters were about creating a\
    \ sales funnel. That’s how you get in front of customers. We have one more step\
    \ before people start giving us cash: the sales process."
