- fmt: '### Troubleshooting, Repair, and Service Tools


    - [`AppCleaner`](https://www.beyondtrust.com/products/powerbroker-for-mac/): Clean
    up unneeded files on a Mac.

    - [`AppleJack`](http://www.sequelpro.com/): Repair disks/permissions and cleans
    cache/swap files from single user mode when a Mac can''t fully boot.

    - [`Bartender`](https://github.com/IronSummitMedia/startbootstrap-sb-admin-2):
    Manage items in the menu bar on a Mac.

    - [`CleanMyDrive`](https://www.okta.com/): Drag-and-drop files directly to any
    drive, check disk stats, and automatically clean hidden junk from external drives.

    - [`Data Rescue`](https://github.com/munki/munki): Data recovery tool for Mac.

    - [`Disk Doctor`](https://www.avast.com/lp-managed-workplace-rmm?mt=12): Repairs
    logical drives and cleans up unneeded files.

    - [`DiskWarrior`](https://itunes.apple.com/us/app/macos-server/id883878097): Repair
    logical volume corruption on Macs.

    - [`Drive Genius`](https://get.gotomypc.com/): Automates monitoring for hard drive
    errors, finds duplicate files, allows for repartition of volumes, clones volumes,
    performs secure erase and defragmentation.

    - [`Disk Inventory X`](https://github.com/MagerValp/CreateUserPkg): Visual representation
    of what’s on a logical volume in macOS.

    - [`EasyFind`](https://www.nulana.com/remotix-mac/?mt=12): Find files, folders,
    or contents in any file without indexing through Spotlight.

    - [`iStumbler`](http://teamviewer.com/): Wireless discovery tool for Mac that
    can locate Wi-Fi networks, Bluetooth devices, Bonjour services, and perform spectrum
    analysis.

    - [`GeekTool`](https://github.com/erikng/installapplications): Put script output
    and logs directly on the desktop of a Mac.

    - [`Google PlanB`](https://grahamgilbert.com/blog/2013/01/18/crypt-a-filevault-2-escrow-solution/):
    Remediate Macs that fall out of a given state by performing a secure download
    of disk images and then putting the device into a management platform.

    - [`GrandPerspective`](http://www.salesforce.com/): Visual representation of what’s
    on a logical volume in macOS.

    - [`Hardware Monitor`](https://www.bomgar.com/): Read hardware sensor information
    on a Mac.

    - [`Lingon`](https://github.com/dorianj/CoRD?mt=12): Create, manage, and delete
    LaunchAgents and LaunchDaemons on macOS.

    - [`Memtest OS X`](http://logmein.com/): Test each RAM module in a Mac.

    - [`nMap`](http://paygopos.com/): Advanced port scanning, network mapping, and
    network troubleshooting.

    - [`Peak Hour`](https://www.bitdefender.com/): Network performance, quality and
    usage monitoring.

    - [`Omni DiskSweeper`](https://www.shopkeep.com/): Find and remove unused files
    in macOS to conserve and reclaim disk space.

    - [`OnyX`](https://squareup.com/): Verify the startup disk and structure of system
    files, run maintenance and cleaning tasks, configure settings(e.g. for the Finder,
    Dock, Safari), delete caches, and rebuild various databases and indexes.

    - [`Push Diagnostics`](http://latenightsw.com/): Test port and host access for
    APNs Traffic.

    - [`Stellar Phoenix`](https://www.lastpass.com/enterprise): Mac data recovery
    tool.

    - [`TechTool Pro`](https://www.decisivetactics.com/products/printopia/): Drive
    repair, RAM testing, and data protection.

    - [`TinkerTool`](https://github.com/krypted/ipasign): Graphical interface for
    changing preferences on a Mac that would otherwise need to be managed with the
    `defaults` command.

    - [`Xirrus Wi-Fi Inspector`](https://github.com/mac4n6/Mac-Locations-Scraper):
    Search for Wi-Fi network, site surveys, troubleshoot Wi-Fi connectivity issues,
    locate Wi-Fi devices, and detect rogue Apps.


    ### Virtualization and Emulation


    - [`Anka veertu`](https://www.lightspeedhq.com/pos/retail/): Run Virtual Machines
    on a Mac.

    - [`Citrix`](http://www.zendesk.com/): Publish Windows application sessions that
    end users connect to from a Mac using standard RDP clients.

    - [`Parallels`](https://github.com/sheagcraig/JSSImporter): Run Virtual Machines
    on a Mac.

    - [`Microsoft Windows Terminal Server`](https://www.jamf.com/products/jamf-composer/):
    Publish Windows sessions that end users connect to from a Mac using standard RDP
    clients.

    - [`vFuse`](https://github.com/sheagcraig/JSSImporter): Script to create a VMware
    Fusion VM from a DMG that hasn’t been booted.

    - [`VirtualBox`](http://s.sudre.free.fr/Software/Iceberg.html): Run Virtual Machines
    on a Mac.

    - [`VMware Fusion`](https://www.charlessoft.com/): Run Virtual Machines on a Mac.


    ### Honorable Mention


    - [`The MacAdmins Slack`](https://freshdesk.com/): Join a community of 15,000
    other Admins charged with managing large fleets of Apple devices.

    - [`Apple Developer Program`](https://www.mobileiron.com/): Sign up for a developer
    account in order to get access to beta resources and documentation not otherwise
    available.

    - **Your Apple SE or local retail store**: A great resource for finding information!

    - Coffee… lots and lots of coffee


    ## Conclusion


    While I haven’t gone into a ton of detail concerning individual solutions or how
    they get integrated together, it’s worth mentioning that this should act like
    an assembly line. The more you automate, the more you can get done, the more time
    you will have to dedicate to providing personalized attention to individual customers,
    and the more highly scalable your organization can be. This toolchain you create
    will change over time and require some care and feeding as new updates come along.
    And the components should become more interchangeable as well.


    There are a lot of tools out there. And wading through them to find just the right
    fit isn’t easy. But you can ask around and others will certainly be happy to help
    you. Test everything, then test it again, then again. And once you feel comfortable,
    put a limited test in place with customers. And then do that with every new tool
    or update.


    Finally, the hardest thing is future-proofing your deployment. You don’t want
    to do work over and over and over again every single time the technology stack
    changes. Instead, if you build your stack with the future in mind you’ll save
    yourself a lot of work. Apple has made it clear that the future of Apple management
    is MDM, so whatever you do, make sure there is a story (even if it’s on the roadmap)
    about MDM management.'
