  trans: "\n# 收购的细节要点\n\n任何收购的标准都绝对要从损益表开始。如果有利润，那卖方为什么要出售？如果没有利润也没有盈利计划，那买方为什么要收购？但如果你有通过整合运营来增加收入或削减成本以提高效率的计划，那么只要障碍不是太多（如果不够谨慎，这些障碍可能会压垮你），收购显然会更具吸引力。\n\
    \n一些可能限制负债的问题：\n\n*   能否解除重叠服务的合同？例如：互联网服务提供商、办公空间租赁、`RMM/MSA/CRM` 解决方案的成本、云服务许可、错误与遗漏保险、律师聘用费等。\n\
    *   能否清算不必要的资产？其中最主要的是不动产。如果两家公司都有房产，且彼此距离较近，那么很可能这些房产都是多余的。我从未见过不动产作为收购交易的一部分出现在整合中，但它可能会作为购买时的附带资产出现。\n\
    *   是否存在做同样工作的重叠团队？没有人愿意考虑裁员。在本书中，我一直主张在必要时重新安置员工。对于核心服务，你很可能只需要一个运营团队，而不是两个，这样你就可以将某人重新安排到一个能为客户提供更多价值的全新岗位上。\n\
    *   重叠的面向客户的人才其实是个好问题！如果你遇到这种情况，要么加快招聘更多销售人员，要么，如果你是一家小公司，就背上销售包去实地拜访，因为这是你需要抓住的时机。\n\
    \n我们之前讨论过你希望从收购或整合中获得什么。本节希望能帮助你打磨商业计划，通过建立一个更高效的单一组织，而不是两个独立运营的实体。你越快实现运营效率，你的团队就能越快学会协同工作。不要害怕尽可能多地委派运营事务，这样你就能走到客户面前，最大限度地提高留住他们并了解他们需求的机会。\n\
    \n## 公司文化\n\n文化是运营组织中最被低估的方面之一。拥有良好的文化是激励最优秀的人才为你工作的核心。持久的文化建立在能够团结和激励员工的强大价值观之上。一次收购代表着一个可能摧毁你文化的事件，如果处理不当的话。因此，你需要先问一些棘手的问题。\n\
    \n你能与这些人共事吗？我们在讨论出售公司时并没有真正解决这个问题，尽管在书中我们多次提及文化。但你不希望在你收购的公司内部制造一种对立局面。如果你是自己招聘的团队，那么你知道你可以与他们共事，并且我真诚希望你乐在其中。但这些人不是你招聘的。要向卖方询问员工的情况。\n\
    \n客户在文化上是否契合？我们经常吸纳规模相似和/或理念相近的客户。这也是你可能想收购另一家组织的原因之一——为了摆脱你现有的滩头阵地。但如果你的员工无法与新客户合作，那么你可能需要制定不同的计划。最好在跨过无法回头的门槛（在虚线上签字）之前就了解这一点。\n\
    \n我认为这里没有万全之策。与员工沟通，保持透明。你会找到答案的。\n\n## 合并运营\n\n根据被合并组织的规模，新组织可能在某些角色上不需要人员或供应商。在合并的小型苹果咨询公司中，最明显的可能是会计。如果新实体需要双倍的会计能力，那么你很乐意拥有这些增加的资源。但如果不是，你将面临一些艰难的选择。我们讨论了一些在收购组织之前需要决定的运营方面。\n\
    \n*   系统\n    *   会计系统\n    *   `RMM`、`MSA` 和工单系统\n    *   客户关系管理（`CRM`）\n   \
    \ *   补丁和服务器管理系统\n    *   托管服务组件，包括备份、云服务、消息传递和群件服务等。\n    *   合同管理系统\n    * \
    \  文件服务\n    *   消息传递、群件和内部生产力系统\n*   服务\n    *   外部会计服务\n    *   税务服务\n    *\
    \   法律服务\n    *   保洁和设施服务\n    *   金融和房地产服务\n    *   人力资源和外包的 `HRIS` 系统\n    *\
    \   `401k` 和利润分享服务\n\n对于所有这些，最重要的是选择最佳解决方案。起初，你可能会认为你使用的工具都是最好的。然而，如果你请求了解旧团队如何使用它们，你可能会发现自己更喜欢他们的业务流程以及驱动这些流程的技术。当新团队看到你接受最佳方案时，他们也更有可能相信你会为他们做出最佳选择。\n\
    \n## 数字问题\n\n许多企业主会发现这部分非常糟糕。你找到这些优秀的公司，与员工会面，合并运营，但在打造最终产品的过程中，你会遇到薪酬方案的问题。也许作为收购一部分加入你的员工薪水相比你现有团队过高。也许情况正好相反。\n\
    \n按职位划分，薪水应处于相似范围内。如果你尚未创建职位合同并进行薪资等级划分，我建议你此时就进行。虽然你不想在薪酬上做出剧烈变动，但你要在实体合并之前就处理好这个问题。如果你接手的员工薪水低于你的团队，那么我建议提供某种形式的利润分享或设定目标，以帮助团队跟上进度。\n"
- fmt: '### Note


    Leveling seems silly at smaller companies, but if you plan on growing, it provides
    guidance so staff can grow with the company.


    If you inherit staff that makes more than what you currently pay, then check the
    levels. If the staff you obtain as part of the acquisition make above what the
    levels say they should, then find out why. They might be doing more than what
    you think. If not, then you have an issue that needs to be addressed. If addressing
    that situation causes people to make less money, then assume they will leave as
    soon as they can. If they don’t, then assume they will not be in a positive place
    and could damage the morale of other team members.


    Salaries aren’t the only numbers employees will need to know about. Stock is easy
    if both companies have similar stock option programs. If the one you are acquiring
    doesn’t have a program, then it’s easy to roll the staff into yours. But if they
    do and you don’t, then you either need to create one or provide commensurate compensation,
    such as profit sharing. And you need to zero out the money from stocks that the
    employees should have received as part of a vesting event if that’s not handled
    by the seller. This can be really challenging math, so seek professional help
    to figure out what’s appropriate. And when you figure out what’s appropriate,
    if possible, do a little better than that.


    Benefits are one more thing to look at. As with stock, if people will have less
    benefits, then they should receive additional compensation commensurate with replacing
    those benefits. If not, then assume a situation similar to salaries.


    If you see a general theme with all of the numbers in this section, take care
    of the employees. Remember that in a services business, they are the most valuable
    asset and likely the largest cost in the company. You need to be profitable and
    have a multiplier to make an acquisition, and to make that happen, you need to
    first make sure that all of the numbers for the staff make sense. As with everything
    in this book, be deliberate.


    ## Rather than Acquire


    You might come to a place where you choose not to acquire another company, but
    in the process of trying to work out a deal, you really came to like the principals
    and/or staff at the other organization. That’s awesome! In this case, there are
    still other options. Probably about as many options as there have been mergers
    or missed chances at mergers in the history of organizations merging or not merging.


    The easiest thing to do is pass business back and forth to one another. You can’t
    completely overlap or you wouldn’t have started discussing acquisitions. If you
    will be passing business back and forth, I recommend an agreement where you can
    bilaterally refer business to one another and receive long-term compensation for
    doing so. You started the deal for a reason. Just because you realize at some
    point that you can’t merge the organizations doesn’t mean that you also have to
    walk away from the relationship you’ve formed with the principals, provided everyone
    acts ethically.


    If you have the margin, start at 10% and work forward or backward from there.
    Why do I recommend there absolutely be compensation bilaterally? Because if there’s
    no compensation and one party provides far more referrals than the other, then
    one party is likely to feel taken advantage of. Check the performance over time.
    Keep in touch, and honestly, be glad to have more friends.


    ## Are Assets Transferrable?


    Contracts are a funny thing. Some are locked to a given company or person. Some
    require various dependencies be met. When acquiring a company, it’s critical to
    do due diligence and make sure that any assets are transferable to the new entity.
    Hire a lawyer to do so.


    Re-evaluate any deals you’ve made once your attorney reviews them. If you have
    to make a deal before you have a chance to have all contracts legally reviewed,
    make contracts contingent on assets being transferrable. In fact, that goes for
    anything—all deals are contingent on any and every unknown in order to provide
    maximum liability coverage in case the deal falls through. As such, treat the
    following as assets:


    *   Partnerships, including reseller agreements, existing support contracts, and
    alliance agreements

    *   Contracts with customers, especially managed services contracts, but also
    including subcontracting agreements

    *   Contracts with vendors, making sure that prices aren’t going to go up, and
    that all agreements will be enforceable once the name of the organization has
    changed and business based on vendors isn’t negatively impacted


    Once you have verified that all of the i’s are dotted and t’s are crossed, you
    can start completing plans to actually merge the companies.


    ## Don’t Make a Bad Deal Just Because You Can’t Let Go


    Ever bought something on `eBay` and spent way more on it than you really meant
    to, just because you got competitive? Now imagine that you spent thousands of
    dollars on legal fees and a deal is falling through. Sometimes that’s a good thing.
    If, in the midst of due diligence, you find that the deal keeps getting a little
    less awesome at every turn, make sure to check that the investment is still worth
    it.


    It can be hard to walk away from a deal at the last minute. Sometimes, you’re
    unable because your pride gets in the way. And sometimes, it’s because you have
    invested too much. Not to overuse analogies in this section, but something similar
    can happen when buying a house. You get an inspection done and you find the house
    needs a new floor in the bathroom, then a new furnace, then a new roof. At some
    point, the contingencies pile up too far and the risk becomes too high to proceed.


    Similarly, between debts that are uncovered, assets that cannot be migrated, team
    members that defect, and potential customer attrition, there may come a time when
    you have to end the deal. Otherwise, you’re upside-down. But if everything works
    out and you can make a better experience for your customers and employees by merging
    the organizations, then it’s time to execute the deal!


    ## Merge the Companies


    Once a deal is in place, it’s time to start executing your plan to merge the companies.
    Start by finalizing your plans. As soon as possible, communicate the merger with
    customers, vendors, partners, and other stakeholders.


    Communication should be as thorough and transparent as possible. Make sure to
    include the following:


    *   You’re taking care of the employees

    *   You’re taking care of the customers

    *   Why you’re doing this

    *   Specifics about how the customers will be better off

    *   The plan and timelines for merging services

    *   How communications with the company might change over time (e.g., how customers
    file tickets, etc.)


    If you will be doing any press around the merger or acquisition (and you probably
    should), make sure anyone who is contacted about the merger is told that there’s
    an “embargo” on press. An embargo is an industry-standard term that refers to
    media not releasing content until a specific date. In fact, if press goes early,
    you might cause concern among customers and employees, so consider doing PR after
    the merger and having a press release go out after the announcement. Don’t do
    anything that could cause your team or customers to feel betrayed. Remember, this
    should be a good thing for everyone involved.'
