    made up to this point. These are great candidates for maintaining the status quo.
    But one thing you really want to hear from them is that they want to grow professionally
    in the ways that you need them to grow to lead the company, usually when it comes
    to business acumen.


    *   **A** **business guru** : Usually someone coming from an operational role
    at a larger company, business gurus will often focus on efficiency—getting more
    out of staff. If you are looking at someone like this, make sure they think of
    how the staff will feel, what customers will think of a focus on margin, etc.
    And make sure they still look to sales, not just expanding business within existing
    accounts.


    *   **A** **sales guru** : Most people that come from a sales background are most
    concerned about making it rain, whatever the consequence. The great thing here
    is that as owner-operators, many engineers don’t have backgrounds in sales. The
    problem can be that someone who is hyper-focused on sales will frequently not
    concern themselves with margin. This can leave your company operating in the red,
    even while billing way more than ever before. When you’re putting someone from
    sales in charge of running the company, make sure to teach them the intricate
    areas that negatively impact margin, and be clear about the margin you expect
    the company to run at.


    *   **A** **subject matter expert** : This might be another consultant, someone
    from a larger company, or an expert in the field. The subject matter expert might
    need to learn about marketing, public relations, human resources, etc. They will
    instantly have credibility with the staff and be capable of taking the reins on
    a technical level; however, I strongly recommend having two meetings a week with
    them to provide the business and sales guidance that is necessary to run a company.'
  trans: '

    # 兼职工作


    如果你尚未发展到一个人能独自承担全部事务的程度，那么从事咨询工作并不是在经营一家兼职公司，而只是一份副业。你是在暗中兼职，参与零工经济，并可以这种方式运营。尤其是当这正合你心意时，这完全没问题。这是你自己的事业，你理应允许自己以任何你想要的方式经营它。


    如果你怀有志向，希望发展壮大到可以全职从事咨询工作，那么你应该制定一个计划来实现它。但如果你对拥有一份副业感到十分满足，那么完全没必要再进一步。


    这意味着你应该保持简单。不要雇佣员工，不要签订长期合同义务，最重要的是，要乐在其中。你随时可以决定日后发展公司。如果遇到一个能接下一家大客户、让公司一夜成功的机会，你可以重新评估自己人生的位置，以及是否想要尝试成为一名全职顾问。


    我发现许多工作与咨询能很好地结合。我认识一些软件开发人员，他们也会在业余时间为客户编写应用或网站。我也认识一些人，他们偶尔会因为兼职工作有截止日期，导致在白天已有工作的基础上加班加点而对此感到厌烦。我还认识一些喜欢在下班后做咨询的老师。尽管按理说不太允许，但我认识不少在苹果零售店工作的人，他们还会偶尔为个人或小型办公室的客户提供服务。简而言之，这些都是传统的暗中兼职工作。


    我还认识一些人，他们同时做着几份不同的兼职工作。有优步和来福车的司机，同时帮别人处理 Mac 电脑的问题；有律师，一边创业一边编写软件；有演员和音乐家，顺便教别人如何使用库乐队（这是他们在第三份工作——播客——中学到的）；有每周照顾孩子几天并为客户编写小程序的人（他们编写程序是为了追踪自己在基督教青年会教授游泳课的情况）。像克雷格列表和
    oDesk 这样的网站开辟了许多可能性，这些人中的许多都喜欢那种随时可以休假的灵活性。


    不过，有些事情需要小心。不要让自己负担过重。很容易接手过多工作，在同时做几份工作的过程中感到筋疲力尽。当你这样做时，很容易让每份工作的质量下滑，并断绝后路。这也违背了应该始终乐在其中的黄金法则。


    有助于避免过度承诺的一件事是坚持在自己擅长的技能范围内。当你了解如何完成任务时，估算工作量就很容易。对于你不懂的事情，可以找一些推荐合作伙伴。这些人拥有与你互补但未必重叠的技能。例如，如果你被要求剪辑家庭电影，但不懂
    Final Cut 或 iMovie，那么手机里应该存有可以转交这类工作的人。你应该拓展自己的技能以避免单调乏味的生活，但要尽可能以深思熟虑的方式进行。


    # 设定预期


    你是会在周二和周四来上班，还是只做半天？当你在做其他事情时，客户或你的团队如何联系到你？尤其在初期，制定一个沟通计划并设定客户和员工可以期待的预期至关重要。


    另一个避免过度承诺的好方法是设定固定的时间段来处理每种类型的业务。例如，周二和周四专注于你的苹果客户，一周的其他日子则用于你的其他业务。或者每晚 8 点到
    10 点为客户编写代码。这样你就能轻松地告知他们可以期待什么以及何时。


    当你承接项目时，要告知客户何时能收到必要的交付成果。按小时计费的咨询很容易，因为你通常到场，做些事情，然后离开。如果你在家或咖啡店为客户处理项目，务必尽早并经常沟通交付物可能会延迟的情况。


    # 委派负责人


    某天你可能会发现工作太多。你可能还想创办其他公司。这时候，就该让其他人来管理公司的部分（甚至全部）业务了。这很微妙，因为在许多情况下，公司长期以来就像是你的孩子。但如果你处理得当，你的体验会比因为愧疚未能亲力亲为而试图微观管理一切要好得多。


    ## 寻找公司管理者


    你决定将你的“孩子”交到别人手中。如何找到合适的人？这大概是你做过的最困难的一件事。甚至比招聘第一个人还要难。我们常常寻找像我们自己一样的人。但这很可能不会发生；毕竟，如果他们和你一样，他们就会是强劲的竞争对手。不妨想想你希望让谁来负责。然后面试以下几类候选人中的几位：


    *   **内部候选人**：很可能是最有可能的人选，如果你公司里有长期参与、对公司各个方面都了如指掌的人，这通常是最好的选择。通常，内部候选人已经观察你很久，理解你至今所做决策的原因。他们是维持现状的绝佳人选。但有一件你非常希望从他们口中听到的事是，他们渴望以你需要他们成长来领导公司的方式实现职业成长，尤其是在商业敏锐度方面。


    *   **商业大师**：通常来自大公司的运营岗位，商业大师往往专注于效率——从员工身上榨取更多价值。如果你考虑这类人，务必确保他们考虑到员工的感受、客户对注重利润率会作何反应等。并且确保他们仍然关注销售，而不仅仅是在现有客户中拓展业务。


    *   **销售大师**：大多数有销售背景的人最关心的是带来收入，无论后果如何。好处在于，作为老板兼经营者，许多工程师没有销售背景。问题可能在于，过于专注销售的人往往不关心利润率。这可能导致公司亏损经营，即使开出的账单比以往任何时候都多。当你让销售背景的人来管理公司时，务必教他们那些会负面影响利润率的复杂方面，并明确告知你期望公司维持的利润率水平。


    *   **领域专家**：可能是另一位顾问、来自大公司的人，或者该领域的专家。领域专家可能需要学习市场营销、公共关系、人力资源等方面的知识。他们会在员工中立即建立威信，并能在技术层面接手管理；然而，我强烈建议每周与他们开两次会，提供经营公司所必需的商业和销售指导。

    '
- fmt: '### Letting Go


    When you appoint someone to run parts of your company, the most important thing
    is to set expectations and boundaries. The expectations are what you want to see
    as output for the company. Consider the following as some of the expectations
    to set:


    - Set a sales target: This is the most common metric that outgoing owners focus
    on: how much money are customers paying you? It’s not all that should matter,
    though, as we’ll explore.

    - Define the margin the business should run at: This is a simple way to gage the
    income and amount spent in a simple percentage. Just make sure you define what
    constitutes each (e.g., accrued revenue versus earned revenue, cost of goods sold,
    GAP rules, etc.).

    - Set a goal for total number of new customers: If the organization starts focusing
    on cross-selling within customers then it will be easy to look healthy on paper
    without thinking about a future set of customers.

    - Define the type, or classification, of work to focus on: Bringing in the right
    type of revenue is just as important as bringing in revenue. For example, a Managed
    Service Provider should be bringing in managed services customers, not project-based
    work. A windfall of project-based cash can be great but leave the monthly recurring
    revenue light after a while!


    Start off with a weekly or monthly plan. Routinely review new sales, accounts
    receivable, accruals, and accounts payable with the new leader of the organization.
    Once you feel comfortable, you can start meeting less frequently. However, in
    the beginning, stay engaged without causing your prodigy to feel claustrophobic.
    Unless, of course, there are issues in the business.


    ### When Things Aren’t Going to Plan


    Sometimes things don’t go exactly as planned. Sales might start slipping, costs
    might start rising, retention of employees or customers may start dipping. Don’t
    let any detail go without attention, especially early in the process of turning
    your baby over to someone else. When things aren’t going to plan, the most important
    thing is that you show discipline when analyzing what’s going on. That sets a
    tone that you’ll be fair in dealing with the challenges that are expected in any
    business.


    ### Don’t Complain


    Business is fun. We make strategies that align with our organization’s goals and
    we then implement tactics that position us for success. Then after patience and
    hard work, when everything goes our way, we triumphantly watch our efforts bear
    fruit. And then we pivot and do the whole thing again.


    Sometimes things don’t go our way. Maybe the strategy was wrong or the tactics
    weren’t implemented correctly. Maybe we had the wrong people in key positions.
    Maybe we found success, but what we considered success didn’t line up with what
    our organization actually wanted us to be doing. Maybe it did line up, but the
    organization is changing (and all organizations are always changing). Either way,
    things will eventually change. And how we cope with change can shape the perceptions
    of those around us, as well as the satisfaction that our teams garner from their
    jobs.


    A natural inclination of many these days is to complain to peers about changes
    in the organization. But while cathartic, complaining about change can brand you
    as being change-averse, or inflexible. Complaining will infect your team. Complaining
    will make you look incapable of getting on board with the new way. Complaining
    about change will, in short, hurt your career. But you need to do something, right?
    And it can be cathartic to complain about change. But don’t. Instead, let’s look
    at a few things you should do.


    - **Celebrate success**: It’s easier to handle change when you know that you weren’t
    doing anything wrong before. It’s important to celebrate past accomplishments.
    That way everyone knows that their efforts were appreciated by the organization.
    This can provide closure to the old way in a positive manner and prepare everyone
    for what’s to come.

    - **Formulate a new strategy**: Armed with information about where the organization
    wants you to go, analyze the gap between where you are and where you’re going—and
    how to get to the destination. There’s no reason to operate in a vacuum. Instead
    work with your peers and team to build a new strategy that everyone can agree
    on. After all, your team can’t be fully bought-in unless they have some say in
    the strategy you’re asking them to implement.

    - **Be transparent**: Transparency will not only arm your team with all of the
    information they need about why you are implementing a new strategy, but it will
    also keep staff from being concerned about their place in the new framework you’re
    building.

    - **Devise tactics**: You have a strategy, now you need a plan to implement that
    strategy. The tactics you choose should be bought-in by every level of the organization.
    These should include any process changes and the expectation (both inputs and
    outputs) of the new tactics.

    - **Communicate, communicate, communicate!**: Once you’ve developed a strategy
    and how the strategy will be implemented, communicate the changes to everyone.
    This includes your team, but also those above you (as they should approve of both
    the strategy and the tactics) and those lateral to you (as you’ll likely impact
    them).


    Once you’ve spent the time to formulate a new strategy, stop and appreciate the
    work that’s been done. Publicly thank those who helped you. Think of any time
    you could have spent complaining about the changes, and how much you could have
    accomplished in that time had you instead been getting feedback about what was
    desired of you and how you could deliver. You’ll quickly find that you were much
    more productive in the time that you would have otherwise spent making yourself
    look bad to anyone standing around the water cooler listening to you.


    Complaining doesn’t really help anything. We’ve all done it, though. And it can
    help us to cope with change. And sometimes you need to do so—especially when you
    feel like your time has been wasted. But keep it to a minimum and be careful who
    you complain to, especially if you’re in a position of management. That way you
    can get on with getting productive again. Once a new strategy is in place that
    the organization appreciates more than the old strategy, you’ll likely find that
    you’re better off than you otherwise would have been!


    Instead of complaining, we’re going to start with a common analysis technique
    to get to the bottom of an issue in the office: The 5 Whys.'
