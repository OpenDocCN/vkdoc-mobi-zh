    There are a number of vendors that offer services from which your customers can
    benefit. Most of these also offer a reseller or referral account type. Google
    Apps, Microsoft, Box, and Dropbox are file-sharing services that allow you to
    resell or affiliate accounts. And those can mean a steady extra income and ancillary
    benefits that make it easier to support customers. You might not even want to
    capture the added revenue stream but may do so in order to charge your customers
    less for services while also getting access to exclusive options.


    Here are some things to evaluate when looking at new cloud services (or at least
    new to your portfolio).


