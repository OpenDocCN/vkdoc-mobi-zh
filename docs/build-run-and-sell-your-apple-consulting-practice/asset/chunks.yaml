    ### A


    `会计学`101：接受付款、基于权责发生制的资产、资产负债表、`CAGR`、现金流、`COGS`、`EBITDA`、财务、全职员工、毛利率、聘请会计师、保险、负债、`Mint/Quicken`、净收入、`P&L`报表、预估预测、经常性收入、收入确认、软件、税务。`ACES
    Conference`、`Acronis`、`广告`（广告牌、博客、有线电视、优惠券/促销/特价、`游击营销`、直邮、`MDF`、会员制）、线上（阶段：浅尝、投入、尚未、优化）、印刷品、广播、销售、`搜索引擎`（`SEO`）、电视、错误判断。`AirWatch
    Connect`、`杀毒软件`（`Avast`、`AVG`、`Avira`、`BitDefender`、`CarbonBlack`、`Cylance`、`Kaspersky`、`Malware
    Bytes`、`McAfee Endpoint Security`、`Sophos`、`Symantec`）、`移动设备管理`、`Trend Micro Endpoint
    Security`、`Wandera`。基于应用的经济、会计软件、业务逻辑、`Freshbooks` 和 `Freshdesk`、`IFTTT`、微服务、软件包、`Workato`、工作流。`苹果咨询`（`威尼斯海滩`）、`Apple
    文件协议 (AFP)`、苹果术语、`AFP`、`Apple ID`、`AppleScript`、应用签名、`App Store`、绑定、`Bless`、构建列车、默认配置、域、`DEP`、程序坞、注册、`FileVault`、门禁、主目录、`iCloud`、`kext`、钥匙串、启动守护进程、登录钩子、托管偏好设置、`MDM`、原生应用、`NetBoot`、包、基于包的映像、便携式主目录、预飞和后飞脚本、配置文件、属性列表、推送通知、回归测试、短名称、`监督`、符号链接、精简映像、用户模板、`VPP`。`应用程序开发人员`、`应用工程师`、`应用支持分析师`、`副开发人员`、`Atera`、`自动化工程师`、`自动化`服务（构建软件、沟通、魅力）、`自动化`工具（`AutoCasperNBI`、`AutoDMG`、`AutoNBI`、`Dockutil`、`Homebrew`、`Jamjar`、`MacPorts`、`Outset`、`Precache`）。`Autotask`、`Auvik
    MSP Edition`、`Auvik Networks`、`Avast Managed Workplace`（`RMM`）、`AVG Cloudcare`。


    ### B


    备份和灾难恢复（`BDR`）软件。备份方案（`Acronis`、`Archiware`、`Arq`、`Backblaze`、`Carbon Copy Cloner`、`Carbonite`、`Crashplan`、`Datto`、`Druva`、`Quest
    Backup`、`SuperDuper!`、`Time Machine`）。平衡计分卡（`BSC`）（客户、财务、内部流程、学习与成长）。`AppleTV`、员工满意度、学习计划完成率、资源分配、路线图完成率。`BeAnywhere`、`广告牌`、`博客`。构建报价（电脑相关事宜、合同、`SeeContracts`、制定固定费用、按小时报价、生活方式型企业、`托管服务`、定价、`SeePricing`、顾问费、工作与生活平衡、自动化、健康饮食、电子邮件、锻炼、疲劳、他人帮助、招聘人员、学会说不、捕鼠器、新闻、时间追踪）。`捆绑销售`。商业专家。收购公司（收购、负债、目标、不利交易、收益、企业身份、业务反复沟通、沟通、薪酬、文化、客户、描述、禁售期、无机增长、制定清单、业务整合、服务、系统、工资、人才、技术、可转移资产、供应商合同）。


    ### C


    有线电视、`布线`、`节奏`、`Cakebrew`。行动号召（`CTA`）。`CareerBuilder`。现金流、`播报`、`CENTREL`。挑战式销售。变更控制。首席信息官（`CIO`）、首席技术官（`CTO`）、云架构师、云顾问、云管理套件、云产品与项目经理。云服务（访问数据、业务需求、基于云的工具、云计算、云解决方案、合规问题、成本、`Dropbox`、评估、文件共享服务、大型图像/媒体文件、网络、基于
    SaaS 的解决方案、电子表格工具、供应商）。云服务开发人员、云软件与网络工程师、云系统管理员、云系统工程师。`Comodo One`（`RMM`）。公司文化。复合年增长率（`CAGR`）。计算机与信息研究科学家、计算机与信息系统经理、计算机网络架构师、计算机程序员、计算机系统分析师、计算机系统经理。概念式销售。`ConnectWise`。`Constant
    Contact`。咨询（`洛杉矶`）。`Continuum`。合同（保密条款、覆盖时间、服务定义、排除项、费用与付款计划、`LegalZoom`、长期破产、固定费用项目、按小时支持、混合方法、托管租赁、托管服务、基于顾问费的支持、责任限制、问题管理、合同样本、范围、`SLA`、`参见服务水平协议
    (SLA)`、税务、合同期限）。每次点击成本（`CPC`）。销售成本（`COGS`）。从生到死的设备管理。`Craigslist` 网站。以客户为中心的销售。客户关系管理（`CRM`）。客户满意度（`CSAT`）。客户计分卡。客户支持管理员、客户支持专员。


    ### D


    数据库分析师、数据库程序员、数据中心支持专员、数据质量经理、桌面支持经理、桌面支持专员、开发人员。设备注册计划（`DEP`）。设备管理、设备计分卡（访问组织网络、从生到死的设备管理、目录服务、端点保护、组织资源、世界级支持）。`Devops
    工程师`、技术总监。目录服务。`龙与地下城`游戏。


    ### E


    息税折旧摊销前利润（`EBITDA`）。`ECi Software Solutions`。电子数据系统（`EDS`）。电子邮件自动化（自动同步联系人、`CRM`、日历、逻辑节奏、`Constant
    Contact`、交叉销售商品和服务、`CTA`、客户更新、`Emma`、现有客户、`iContact`、`Mailchimp`、营销信息、`Marketo`、消息工具、`国家公共广播电台`、关注、保护个人身份信息、`Salesforce`、营销团队规模、报税季、第三方工具）。电子邮件营销（`参见电子邮件自动化`）。禁售期。`Emma`。魅力。错误与遗漏保险（`E&O`）。


    ### F


    快速失败。`Filewave Conference`。财务管理。固定费用报价。`Freshbooks`、`Freshdesk`、`Freshservice`。前端开发人员。资金（现金流挑战、增长资本、精打细算、工作类型）。


    ### G


    公认会计原则（`GAAPs`）。`gfiMax`。平面设计师。毛利率。`Groupon` 网站。成长型企业理念（员工沟通、财务管理、裁员、领导团队、公司生命周期、员工满意度、幸福与福祉、奖励、静态组织局限性）。游击营销（参加/组织`聚会`、`节奏`社区参与、会议会后派对、徽章扫描仪、联系人列表、邮件联系联系人、活动、向他人学习、标志、潜在的会议场次、产品/服务演示、演讲、赞助商、赠品、展台内容、客户定义、传单派发、电子邮件自动化
    `参见电子邮件自动化`、邮件联系博主、免费演示、免费工作、制作赠品、留言板、与顾问合作、在招聘板发帖、新闻稿、发送直邮、`SEO`、`参见搜索引擎优化 (SEO)`、服务公司、注册/工作交换、社交媒体、赞助活动、策略、撰写文章、撰写书籍、编写软件）。


    ### H


    硬件与软件公司。`HarmonyPSA`。`Haro` 网站。服务台专员、服务台技术员、`HelpSystems`。按小时报价。人力资源、招聘（基本问题、进度检查、顾问决策、多样性、龙与地下城游戏、冒名顶替综合症、面对面面试、面试报价、入职计划（30
    天、60 天、第 1 周）、维基式解决方案、一对一会议、外包、电话筛选、白金法则、发布职位、审阅简历、培训计划 `参见培训计划`、撰写职位描述、零容忍政策）。

    '
