    # Using Public Relations


    Public Relations (PR) is an industry where you gain exposure to audiences using
    news outlets and third-party publishers such as publications, blogs, and social
    media—where you don’t actually pay for placement. The goal is to gain free coverage
    by talking about items that are of interest to the public.


    PR typically includes branding, media relations, publicity, relationships within
    your industry (e.g., the Apple community and Apple Consultants Network), event
    management, and special events.


    In some organizations, PR also includes employee relations, investor relations,
    diversity programs, analyst relations, and even marketing communications. However,
    those will be covered in other chapters. We’ll start this chapter with some basics
    of PR, with a focus on media relations and publicity.


    ## Getting Started With PR


    Too often, when small business owners create a business plan, they include advertising
    and marketing plans but neglect to consider the importance of public relations
    (PR). It makes sense, considering that we’re bombarded with advertising every
    hour of the day—yet we often fail to understand the role that PR plays in the
    ads and articles we’re reading on a daily basis.


    PR is much less expensive than advertising but can be just as effective, adding
    third-party credibility to products and services. In many cases, I’d rather pay
    for PR than advertising—according to the goals your organization has.


    Whether you choose to engage a firm, or whether you attempt to conduct PR yourself,
    there are a number of things you can do to maximize the impact “the press” can
    have on your organization. Here are a few things new small businesses should do
    when starting their PR:


    ### Gather All Your Social Properties


    One major function of PR is online reputation management. As a small business
    owner, it’s important to make a list of all of the online profiles, platforms,
    and social media sites your business is on. That way, you can quickly crosscheck
    your online reputation with each of them, formulating a PR plan to potentially
    amplify great reviews or rectify any negative reviews.


    ### Publish a Media Kit


    Once you’ve gathered all your social properties into a simple list, you can publish
    them on a page. I usually like to put it on a page called Press that’s easily
    found from the front page of your site. Include the list of social properties
    from above, as well as a bio for the company with important facts, links to mentions
    in the press, past press releases, and how to get in touch with the company (e.g.,
    `press@companyname.com`). The media kit could also include logos, photos, PDFs
    of marketing-type collateral, guides on how logos should be used, etc.


    ### Gather Local Media Contacts


    No matter where your business is located, it’s important to aggregate a local
    media list of all persons at newspapers, magazines, radio, and TV outlets within
    your given geographic region. If something exciting happens with your business,
    you want to be able to call or e-mail them quickly for media coverage.


    ### Gather Industry-Specific Media Contacts


    Most vertical industries also have specific websites, blogs, magazines, podcasts,
    stations (e.g., YouTube playlists). Put a list of those together as well, and
    look for a specific contact who you might be able to reach out to should you encounter
    anything that might be of interest to them (just don’t bug them too much).


    ### PR Template


    When a chance for press comes up, you want someone within your organization to
    have writing skills. Statements, columns, blog posts of your own, and press releases
    are powerful ways of interacting with the media, and though you can hire experts
    to perfect your writing on a per-post basis, it’s valuable to have someone within
    your organization capable of getting the first draft going, especially in fields
    where domain knowledge is important.


    Starting a PR plan is one of the best things you could do for your small business.
    Don’t neglect to include and actively work on PR as you formulate your advertising
    and marketing strategies, as it’s one of the most critical aspects of any of those
    plans. You may also go a step further and chart your plan to a calendar. When
    you do, avoid announcements on Mondays and Fridays, and try to align them according
    to when the logs for your website show that you have the most visitors, so you
    can capitalize on existing traffic!'
