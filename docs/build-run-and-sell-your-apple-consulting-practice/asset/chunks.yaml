    *   发布站点地图：现代博客引擎会为内容生成大量动态页面，这些页面通常有不同的名称，从而产生重复内容。无论是在一个域名内还是跨域名，重复内容都会惹恼网络爬虫和搜索算法。如果我包含了重复内容，我通常会将其放在引号内并注明出处。这也有助于我将来如果决定移除某个来源的所有内容时（这些来源后来被我认定为不合法的）进行处理。

    *   在`URL`中包含文章标题：在`Wordpress`中，这些被称为永久链接（`Permalinks`）。一篇文章的实际标题可能是`http://krypted.com/wp-admin/post.php?post=49178`，但您用于发布到网站上的`URL`可能是`http://krypted.com/mac-os-x-server/migrating-mail-service-macos-server/`。这个技巧是我多年前从洛杉矶`Band
    of Techs`公司的负责人`Thomas Orona`那里学到的。除了配置永久链接之外，几乎没做其他什么不同的事情，花了`5`分钟，我的流量在`90`天内几乎翻了一番。

    '
- fmt: '-   Categorize your posts: Categories tell crawlers how to, um, categorize
    a page. I have about 15 categories on my personal blog that span around 3,600
    posts. These also help me to quickly find my own articles should I need to.


    -   Tag your posts: Most modern blogging engines allow for tagging. This is simply
    another piece of metadata that algorithms use to give each article or page a better
    Page Ranking (`PR`).


    -   Use headers on longer posts: A header tag can be used to indicate the starting
    of a new section of a site. These not only can make your pages easier to read,
    they can also often be used to direct traffic to parts of a page, and the web
    crawlers seem to like them a good bit.


    -   Link to other posts: It’s natural to link to other websites. Doing so helps
    the web be more web-like, helps readers find more content, and helps crawlers
    index and associate your site with those that you link to.


    -   Get links to your posts: Backlinks are one of the most important aspects of
    SEO. The more links to your site, the higher the `PR`—well, assuming they’re legit
    links. If you purchase a backlink, or get one through a comment you post, those
    are supposed to be marked as “no follow” and so not count toward PRs. So the best
    advice around backlinks is to write good content that people want to link to.


    -   Enable internal linking: I like to use a plugin that shows people relevant
    posts. This creates an additional index of my site and then shows articles with
    similar keyword densities.


    -   Enable comments: I have a post on Fitbit badges. This post has been commented
    on hundreds and hundreds of times. Not only do I find the comments amusing to
    read (I mean, hundreds of people are having lively debates on my personal website)
    but the dynamic content keeps the page fresh to crawlers, provides new content,
    increases the amount of time people spend on the page, and also adds perspectives
    and keywords I might not have thought to add.


    -   Delete dead links: Crawlers hate dead links and will ding you for them. You
    can easily find dead links with plugins for your engine, or you can submit your
    site to various services that will track down dead links and inform you about
    them.


    -   Make sure your site loads fast: Crawlers don’t like to crawl slow sites. Therefore,
    make sure your site loads fast. Get rid of any extraneous plugins or automations
    and keep those pages loading super-fast. This also makes people who are reading
    your pages happy.


    -   In the beginning, shoot for longtail search terms: You’re likely never going
    to get noticed with search terms like “Apple” or even probably “Apple Consultant,”
    but you might get some high PRs for “Apple Consultant in Boise.” The nice part
    about longtail searches is that they can also provide you quick wins to help you
    stay engaged. I can still remember the first time that someone called me and said,
    “I found you on the Internet,” and the extra motivation that gave me to keep working
    on getting found by others.


    -   Avoid `robots.txt`: A `robots.txt` file is an old way of telling crawlers
    not to index your site. Some automated services install these by default. Crawlers
    will never pick up content if there’s a `robots.txt` on the site.


    Given all these rules, it’s also worth noting that whatever is natural is right.
    If you start trying to tailor your content to web crawlers, then it will be boring
    to read, formulaic, and the PR will change when web crawlers pick up on new tricks.
    I personally just write what I want people to see. For example, some of the best
    posts I personally like to read are in-depth analyses of new Apple technology.
    These are often thousands of words. And these are also the most common for me
    to link to. But I keep the earlier items in the back of my head while writing
    anyways.


    `SEO` isn’t for the impatient. Crawling sites can happen as little as every 30
    days. You can request that your site be crawled immediately, but it can still
    take time. I recommend just being a good steward of the Internet. If you write
    good articles that people want to link to, then you also have to wait for those
    other sites to be indexed. It all takes time. Again, be cognizant of the points
    that we’ve covered, but write what works for you and get some good backlinks,
    and you should be fine.


    Additionally, there are tons of firms out there that specialize in SEO. If you
    want, you can hire one to help you formulate a strategy, get links, and get you
    traffic. It’s hard to stay at the top of natural search listings, but if you’re
    deliberate about the words you want to be associated with and do some work, it’s
    not uncommon to get some pretty high PRs with longtail searches.


    Now let’s turn our attention to ways to get people to visit your site. We’ll start
    with e-mail automation, as it’s one of the most common ways to drive traffic to
    sites.


    ## E-mail Automation


    We discussed automating the delivery of your services. But what about your marketing
    messages? Once upon a time, we did newsletters. Then we placed each desired recipient
    on an e-mail into the BCC field of an e-mail program and sent as many e-mails
    as we could. These days, we do e-mail marketing campaigns.'
