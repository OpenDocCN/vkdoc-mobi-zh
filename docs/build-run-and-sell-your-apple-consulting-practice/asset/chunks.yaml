- fmt: '# Valuations


    A valuation is an estimation of your company’s worth. A mature organization will
    hire a professional appraiser to determine the valuation. These are often compiled
    by large accounting firms like Mackenzie, Accenture, or Deloitte—and they’re not
    exactly cheap. But they’re worth it!


    Preparing the company for a valuation is a task that can take multiple years,
    according to how large the firm is and how it’s being sold. So the earlier you
    start, the better. Some steps to prepare the company for a valuation are provided
    here.


    - Make a list of all liabilities. Liabilities are what you owe. This includes
    traditional debt, such as credit cards, but also any contracts where you’ve received
    money from a customer and not yet delivered services, such as annual retainers.
    Also look at any outstanding contracts for property, internet access, insurance,
    legal, etc.

    - Make a list of all assets. Assets are what you own. This includes traditional
    fixed assets such as property, as well as depreciating assets (or assets that
    go down in value over time), such as computers. Assets include contracts as well
    as a percentage of the value of customer business that is not contractually bound.
    The length of the relationship with the customer and a steady rise in the business
    done with the customer makes that percentage higher.

    - Subtract the liabilities from the assets. Once you’ve put together a list of
    what you have minus what you owe, this is a simple calculation. Practice Generally
    Acceptable Accounting Practices (GAAPs) and make sure to have an accountant help
    you so as not to have any surprises later in the process.

    - Document the margin for the last 3 years. A healthy margin can make a valuation
    higher. How much do you bring in, and how much does it cost to run the business?
    The more you can document the better, such as per-customer, per quarter, etc.
    Plotting things out on a spreadsheet and having a solid trendline will help with
    the process.

    - Project future growth. I like trend lines. `Microsoft Excel` is excellent at
    producing trend lines (as is `Keynote` and `Numbers`). See more on trend lines
    in Appendix D.

    - Put a price on your intellectual property. Consider a company blog and the related
    SEO you get from that, your sales pipeline, your contacts (including the customers),
    various Standard Operating Procedures (SOPs), databases used to automate the business,
    and anything else you built as company intellectual property. In the event of
    a sale, it stays with the company. If you want to keep any of this when you leave
    (or re-use it to start a new business), negotiate that during the sale.

    - Focus on MRR. Monthly Recurring Revenue is the most predictable way to establish
    value of a company. Preferably when contractually bound. The rise of MRR can be
    plotted on a trend line to prove that the company is moving in the right direction.
    MRR can include the sale of your products but also the resale of subscription
    services, such as Internet Service Providers (ISPs), `Google Apps` subscriptions,
    `Office 365` Subscriptions, leases, and other commissions.


    Ultimately, what is the company worth? The answer, no matter the valuation, is
    whatever someone is actually willing to pay for the company. To the right purchaser,
    the company may be worth far more than it is on paper, as they may have a plan
    to cross-sell services, they may have a system they can put your customers into
    where they can amplify margin, etc. But in most cases, I’ve seen companies worth
    far less than what the owner thinks they’re worth, especially in organizations
    that have primarily relied on hourly consulting efforts, with no long-term contracts.


    # Multipliers


    Mergers and acquisitions can take on a number of different forms. Rather than
    pay cash for a company, I have seen a number of acquisitions where the purchaser
    is basically buying staff and customer lists/contracts in exchange for a percentage
    of the business that is done with the clients. Consultancies struggling with apathy,
    growth, or margin make great targets for such an acquisition. Should you be evaluating
    an offer, or structuring an offer of this sort, keep in mind that the principals
    in an organization rarely stay around following an acquisition.


    So, what makes the multiplier? What someone is willing to pay for a company. That’s
    all. But things that help are even, ascending numbers for profits. This means
    moving much of your business to MRR as we covered previously.


    # Non-Compete Agreements and Covenants


    The sale of your company will likely come with an agreement that you will not
    compete with the purchaser. Your non-compete agreement or covenant (which is similar
    to a non-compete but even more binding) is an asset that the purchaser paid for.


    Non-compete agreements are more binding in some states than others, but in general,
    whatever the law says can pale in comparison to the legal fees to prove what the
    law says. If you will be working with a former customer in any capacity, I would
    try to get a waiver to do so.


    I’ve heard many consultants say, “But the client called me first,” or, “They’re
    not being treated right by the new management.” One of the things that likely
    made your company successful is the fact that you were good to your customers.
    You probably formed personal relationships with many outside of work, and it will
    be hard to see them potentially not taken care of in the way that you would have
    taken care of them. But you are legally bound not to interfere. And violating
    that agreement may come with serious repercussions, so be cognizant of your risk,
    and the risk to your former customers, if you do so.


    # Are You Going to Stay with the Company?


    This is one of the most important questions. The company will likely do better
    if you’re still there, at least for a time. And any mature purchaser will understand
    this and likely want you to stay, at a minimum, for the transition period.


    After years of owning a company and making all of the decisions, it can be awkward
    to suddenly be asking others what they would do, or for permission. If you will
    be staying on for any duration of time, make sure to work out some details with
    the new owners of your company.


    - What authority do you still have in regards to hiring and human resources?

    - What spending authority do you have?

    - If working in sales as well, what discount authority do you have?

    - How are you going to be phased out, including a final date of employment?


    If you are planning on leaving, make sure to work out an acceptable exit strategy
    with the new owners. This should include milestones with fixed dates attached
    to them. I’ve found that being transparent to staff is important, so letting everyone
    on the team know the schedule is best, when possible.'
