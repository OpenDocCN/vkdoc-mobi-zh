- fmt: '# 12. When to Stop Growing


    This is going to be a short chapter. A prevailing business philosophy is the concept
    that if your revenue isn’t growing faster than the industry standard, then you’re
    getting passed by your competition. That’s crap. You should be happy with whatever
    size your company is. If you want to grow it, then great. If not, then you don’t
    have to. Grow along with your level of comfort; otherwise, you can’t do so positively.


    There is no limit to how big you can grow your company; the only limitation is
    how comfortable you are with the size of the organization. I’ve seen a number
    of companies stop at two, and just sit there for 30 years. I’ve also seen some
    that hit about 50 and that’s the sweet spot. And I’ve seen organizations slow
    growth that don’t want to do so. No matter the situation, as with many things
    in business, it’s important to have clear and concise communication about what
    is happening.


    This chapter is for a very specific situation, which is that the company leadership
    has made a cognizant choice that they do not want the company or a group within
    the company to grow any further, at least in the immediate future. Usually this
    is because they want to focus on other things. You can often refer to this type
    of company as a lifestyle business. Even if it’s only temporarily so.


    One of the biggest challenges is retaining employees when you’ve made a decision
    like this, so we’ll start there.


    ## Communicating with Employees


    Halting growth is hard. The most important thing here is that you are open and
    honest with everyone about what you are doing. Especially if you’ve been growing
    and you’re intentionally slowing down growth. Tell people why you’re slowing it
    down, and be clear about how the strategy of the organization might change in
    the near-term future.


    Slowing down growth reduces your risk, but also reduces the opportunities you
    might be able to provide to staff. Later in this chapter, we’ll look at ways to
    keep teams motivated, but for now focus on making everyone you employ feel safe.
    Explain why you’re slowing down growth, how you’ll be doing so, and what opportunities
    each person has in the new paradigm.


    Expect some turnover. After all, what’s the future for each person on staff? This
    doesn’t always happen immediately, and it’s often an amicable parting of ways
    provided you’re clear about your intentions, but if people leave, expect a little
    customer turnover as well. This is inevitable whenever there’s a perception that
    there’s less opportunity at a job.


    ## Leading (And Retaining) Teams After the Growth Subsides


    Building and growing an organization is fun! Managing an organization that is
    static or shrinking can totally suck. But it doesn’t have to. Employee satisfaction
    is an amazing thing and a key aspect of making your company an awesome place to
    work. During times of growth, everyone is invariably happy with their jobs. Staff
    see an incredible growth opportunity, a lot of great new team members they can
    mentor, and there’s a general buzz in the community that surrounds expansion.
    But eventually the expansion slows in every organization and on every team. And
    I’ve never met anyone who was ready for it when it came, except those who are
    slowing growth intentionally.


    How is a leader to react? How do you keep a cohesive team who has done everything
    the organization asked of them engaged? How do you provide the rewards of a great
    career path if not within your team? Let’s look at some important concepts to
    keep in mind as you turn the corner into the next phase of your company’s life
    cycle.


    1. **Make sure employees feel safe**: Employees need to feel secure in their jobs.
    When employees take on more work and see that hiring has slowed, they will assume
    the worst. Be completely transparent. Show enough respect for staff to explain
    as much as allowed, even if it means they start to leave of their own accord.
    Of course, this starts with having a sound strategy!


    2. **Understand what motivates people**: We’re all motivated by something different.
    Make sure to understand what motivates team members, or have their supervisors
    find out. Then double-check by surveying staff and comparing those results to
    the qualitative analysis done by your team. This is often easier than it was,
    as you’re not spreading your attention across opening new offices, hiring, etc.


    3. **Provide different ways to recognize success**: When an organization decides
    to shift priorities and limit funding for a team or a company slows down, the
    key metrics on which you gage performance must mature as well. This often starts
    by moving from billings to margin, from margin to channel empowerment, between
    various types of work, or from any of these to innovation.


    4. **Find ways to be more visible in the organization**: As growth in teams slows,
    increasing visibility within an overall organization or community allows team
    members to feel positive about their roles in the organization. Allowing employees
    access to other teams also allows for networking, more idea sharing in ways that
    might not have been possible during times of hyper-growth, and fosters a greater
    sense of teamwork within the organization. Becoming more visible also provides
    exposure to each member of the staff.


    5. **If you love someone, set them free**: Champion your best employees; but be
    willing to replace them as well. Even if doing so makes your life harder, rewarding
    great work will inspire the next generation to be better. Alternatively, not recognizing
    the potential in your staff leads to disgruntled employees and crappy work. Watching
    my former staff flourish in new roles is the area of my career I get the most
    satisfaction from; hopefully, you do as well! If your organization is not growing,
    then there is usually a cap to careers within the organization. You can offset
    this with profit sharing.


    Ultimately, the ability to lead a growing organization is easier than leading
    an organization that isn’t trending up and to the right on spreadsheets. Taking
    on a static organization is really easy, because someone else already dealt with
    reframing how the organization survives. But doing that reframing means taking
    care of staff, first and foremost. Look for how the team fits in the new layout.
    Let the team help not only define the strategy but also lay out the tactics to
    achieve the strategy. Empower everyone to contribute on every level, if you haven’t
    already.


    Whatever you do, don’t retreat within your team. Focus on the happiness and well-being
    of the team, but when the growth slows, look outward for opportunities to contribute
    to all areas of the organization and community. Look for ways to help employees
    and ways to do what is right, making sure to align their needs with those of the
    organization. And keep in mind that aligning the strategy of a group with that
    of an organization is the key to success of the organization as a whole. If each
    manager simply looks to bolster their team, they will do nothing more than fracture
    an otherwise cohesive organization.'
  raw: '# 12. When to Stop Growing


    This is going to be a short chapter. A prevailing business philosophy is the concept
    that if your revenue isn’t growing faster than the industry standard, then you’re
    getting passed by your competition. That’s crap. You should be happy with whatever
    size your company is. If you want to grow it, then great. If not, then you don’t
    have to. Grow along with your level of comfort; otherwise, you can’t do so positively.


    There is no limit to how big you can grow your company; the only limitation is
    how comfortable you are with the size of the organization. I’ve seen a number
    of companies stop at two, and just sit there for 30 years. I’ve also seen some
    that hit about 50 and that’s the sweet spot. And I’ve seen organizations slow
    growth that don’t want to do so. No matter the situation, as with many things
    in business, it’s important to have clear and concise communication about what
    is happening.


    This chapter is for a very specific situation, which is that the company leadership
    has made a cognizant choice that they do not want the company or a group within
    the company to grow any further, at least in the immediate future. Usually this
    is because they want to focus on other things. You can often refer to this type
    of company as a lifestyle business. Even if it’s only temporarily so.


    One of the biggest challenges is retaining employees when you’ve made a decision
    like this, so we’ll start there.


    ## Communicating with Employees


    Halting growth is hard. The most important thing here is that you are open and
    honest with everyone about what you are doing. Especially if you’ve been growing
    and you’re intentionally slowing down growth. Tell people why you’re slowing it
    down, and be clear about how the strategy of the organization might change in
    the near-term future.


    Slowing down growth reduces your risk, but also reduces the opportunities you
    might be able to provide to staff. Later in this chapter, we’ll look at ways to
    keep teams motivated, but for now focus on making everyone you employ feel safe.
    Explain why you’re slowing down growth, how you’ll be doing so, and what opportunities
    each person has in the new paradigm.


    Expect some turnover. After all, what’s the future for each person on staff? This
    doesn’t always happen immediately, and it’s often an amicable parting of ways
    provided you’re clear about your intentions, but if people leave, expect a little
    customer turnover as well. This is inevitable whenever there’s a perception that
    there’s less opportunity at a job.


    ## Leading (And Retaining) Teams After the Growth Subsides


    Building and growing an organization is fun! Managing an organization that is
    static or shrinking can totally suck. But it doesn’t have to. Employee satisfaction
    is an amazing thing and a key aspect of making your company an awesome place to
    work. During times of growth, everyone is invariably happy with their jobs. Staff
    see an incredible growth opportunity, a lot of great new team members they can
    mentor, and there’s a general buzz in the community that surrounds expansion.
    But eventually the expansion slows in every organization and on every team. And
    I’ve never met anyone who was ready for it when it came, except those who are
    slowing growth intentionally.


    How is a leader to react? How do you keep a cohesive team who has done everything
    the organization asked of them engaged? How do you provide the rewards of a great
    career path if not within your team? Let’s look at some important concepts to
    keep in mind as you turn the corner into the next phase of your company’s life
    cycle.


    1.  **Make** **sure employees feel safe**: Employees need to feel secure in their
    jobs. When employees take on more work and see that hiring has slowed, they will
    assume the worst. Be completely transparent. Show enough respect for staff to
    explain as much as allowed, even if it means they start to leave of their own
    accord. Of course, this starts with having a sound strategy!


    2.  **Understand what motivates people**: We’re all motivated by something different.
    Make sure to understand what motivates team members, or have their supervisors
    find out. Then double-check by surveying staff and comparing those results to
    the qualitative analysis done by your team. This is often easier than it was,
    as you’re not spreading your attention across opening new offices, hiring, etc.


    3.  **Provide different ways to recognize success**: When an organization decides
    to shift priorities and limit funding for a team or a company slows down, the
    key metrics on which you gage performance must mature as well. This often starts
    by moving from billings to margin, from margin to channel empowerment, between
    various types of work, or from any of these to innovation.


    4.  **Find ways to be more visible in the organization**: As growth in teams slows,
    increasing visibility within an overall organization or community allows team
    members to feel positive about their roles in the organization. Allowing employees
    access to other teams also allows for networking, more idea sharing in ways that
    might not have been possible during times of hyper-growth, and fosters a greater
    sense of teamwork within the organization. Becoming more visible also provides
    exposure to each member of the staff.


    5.  **If you love someone, set them free**: Champion your best employees; but
    be willing to replace them as well. Even if doing so makes your life harder, rewarding
    great work will inspire the next generation to be better. Alternatively, not recognizing
    the potential in your staff leads to disgruntled employees and crappy work. Watching
    my former staff flourish in new roles is the area of my career I get the most
    satisfaction from; hopefully, you do as well! If your organization is not growing,
    then there is usually a cap to careers within the organization. You can offset
    this with profit sharing.


    Ultimately, the ability to lead a growing organization is easier than leading
    an organization that isn’t trending up and to the right on spreadsheets. Taking
    on a static organization is really easy, because someone else already dealt with
    reframing how the organization survives. But doing that reframing means taking
    care of staff, first and foremost. Look for how the team fits in the new layout.
    Let the team help not only define the strategy but also lay out the tactics to
    achieve the strategy. Empower everyone to contribute on every level, if you haven’t
    already.


    Whatever you do, don’t retreat within your team. Focus on the happiness and well-being
    of the team, but when the growth slows, look outward for opportunities to contribute
    to all areas of the organization and community. Look for ways to help employees
    and ways to do what is right, making sure to align their needs with those of the
    organization. And keep in mind that aligning the strategy of a group with that
    of an organization is the key to success of the organization as a whole. If each
    manager simply looks to bolster their team, they will do nothing more than fracture
    an otherwise cohesive organization.'
  trans: '

    # 12. 何时停止增长


    这一章内容会很简短。一种盛行的商业理念认为，如果你的收入增长没有快于行业标准，那么你就会被竞争对手超越。一派胡言。无论你公司规模多大，你都应该感到满足。如果你想增长，那很好。如果不想，你也完全不必勉强。应该在你感到舒适的范围内增长；否则你就无法积极地做到这一点。


    你的公司能发展到多大，是没有限制的；唯一的限制是你对组织规模的适应程度。我见过许多公司规模停留在两人，然后就这样维持了 30 年。也见过一些公司发展到 50
    人左右，那便是最理想的状态。还见过一些组织增长缓慢，却并不想这样。无论何种情况，如同商业中的许多事情一样，清晰、简洁地沟通正在发生的事情至关重要。


    本章针对一种非常具体的情况，即公司领导层已明智地做出选择，不希望公司或公司内的某个部门继续增长，至少短期内不打算这样做。通常这是因为他们想专注于其他事情。你通常可以把这类公司称为生活方式型企业。即使只是暂时的。


    做出这样的决定后，最大的挑战之一就是留住员工，所以我们先从这里开始讲起。


    ## 与员工沟通


    停止增长是困难的。这里最重要的是，你对所有人公开坦诚，说明你在做什么。尤其是当你一直在增长，而现在是刻意放缓增长时。告诉人们你为什么放缓增长，并清晰地说明组织的策略在不久的将来可能会如何变化。


    放缓增长降低了你的风险，但也减少了你能提供给员工的机会。在本章后面，我们会探讨保持团队积极性的方法，但现在，首先要让你雇佣的每个人都感到安全。解释你为什么放缓增长，你将如何做，以及在新模式下每个人拥有什么机会。


    预计会有一些人离职。毕竟，每个在职员工的未来在哪里？这通常不会立刻发生，而且只要你清楚地表明了意图，这往往是友好的分手。但如果有人离开，也要预计会有一些客户流失。每当人们感觉工作中机会变少时，这种情况就不可避免。


    ## 增长放缓后领导（并留住）团队


    建立和发展一个组织是很有趣的！管理一个停滞或萎缩的组织则可能糟透了。但这并非必然。员工满意度是一件了不起的事，也是让你的公司成为一个绝佳工作场所的关键。在增长时期，每个人都无一例外地对自己的工作感到满意。员工们看到巨大的成长机会，许多可以指导的优秀新团队成员，社区中也弥漫着围绕扩张的热烈气氛。但最终，每个组织和每个团队的扩张都会放缓。我从未见过有谁能从容应对这种变化，除非是那些刻意放缓增长的人。


    领导者该如何应对？如何让一个完成了组织所有要求的、有凝聚力的团队保持投入？如果团队内部无法提供，又如何提供伟大职业生涯的回报？让我们看看在你即将跨入公司生命周期下一阶段时，需要牢记的一些重要概念。


    1.  **确保员工感到安全**：员工需要在工作中感到安稳。当员工承担了更多工作，并看到招聘放缓时，他们会做最坏的打算。要完全透明。给予员工足够的尊重，尽可能多地解释情况，即使这意味着他们会因此主动离开。当然，这始于一个健全的策略！


    2.  **理解是什么激励着人们**：我们都被不同的事物所激励。务必了解是什么激励着团队成员，或者让他们的主管去弄清楚。然后通过调查员工，并将结果与团队所做的定性分析进行对比，以再次确认。这通常比以前更容易，因为你无需将精力分散在开设新办公室、招聘等事务上。


    3.  **提供不同的认可成功的方式**：当一个组织决定转变优先级、限制对某个团队的资助，或者公司增长放缓时，你衡量绩效的关键指标也必须随之成熟。这通常始于从关注营收转向关注利润率，从利润率转向渠道赋能，在不同类型的工作之间切换，或者从这些转向关注创新。


    4.  **寻找在组织中提高可见度的方法**：随着团队增长放缓，提高在整个组织或社区内的可见度，能让团队成员对自己在组织中的角色感到积极。允许员工接触其他团队，也能促进人际网络建设，以可能是在高速增长时期无法实现的方式进行更多的创意分享，并在组织内部培养更强的团队合作精神。提高可见度也为每位员工带来了曝光机会。


    5.  **如果你爱他，就让他自由**：支持你最优秀的员工；但也要做好替换他们的准备。即使这样做会让你的工作更难，奖励出色的工作将激励下一代做得更好。反之，不识别员工的潜能则会导致员工不满和工作质量低劣。看到我以前的员工在新的岗位上茁壮成长，是我职业生涯中最满意的部分；希望你也如此！如果你的组织不增长，那么组织内的职业发展通常会有天花板。你可以通过利润分享来弥补这一点。


    最终，领导一个成长中的组织比领导一个在电子表格上趋势并非向上向右的组织要容易。接手一个停滞的组织其实非常容易，因为别人已经处理好了重塑组织生存方式的问题。但进行这种重塑意味着首先要照顾好员工。要审视团队如何融入新的布局。让团队不仅帮助定义策略，还要制定实现策略的战术。如果还没有这样做，那就授权每个人在各个层面做出贡献。


    无论你做什么，都不要退缩到你的团队里。要关注团队的幸福和福祉，但当增长放缓时，要向外寻找机会，为组织和社区的各个领域做出贡献。寻找帮助员工的方法，做正确的事情，确保将他们的需求与组织的需求结合起来。并且要记住，将一个群体的策略与组织的策略保持一致，是整个组织成功的关键。如果每个管理者都只是想着壮大自己的团队，那么他们所做的只会是分裂一个原本有凝聚力的组织。

    '
- fmt: '# Letting People Go


    Sometimes we outgrow where we want to be. We win that big contract and we can’t
    fulfill it, or we lose it. Then we have to detract. And it sucks. In this section,
    we’ll explore what you should do when letting people go. And some tips for making
    the process go in as ethical a fashion as possible, while not destroying the company.


    I’ve had to do different types of layoffs in the past, and I believe in the dignity
    of those on the other side of the table far too much to take it flippantly. Ultimately,
    reducing the size of an organization starts with finding ways to try and keep
    the best, brightest, and most committed to stay on your team. But when you can’t,
    and you have to let staff go, there is no feeling of dread on those days.


    For those that stay, make sure to communicate your strategy to the best of your
    ability, and be transparent where possible. Tell them whether there will be further
    cuts. If there will be, then they may leave of their own accord. And you can’t
    choose who’s going to stay and go. But by being honest, you’ll retain a relationship
    if you want to, and you won’t have people running around saying you did them wrong.
    Most importantly, though, you won’t actually be doing them wrong.


    For those who will no longer be with the organization, be respectful. Provide
    as much severance as possible and a great reference when appropriate. Have an
    exit interview with each. And have the last check on your desk so there’s no question
    that the move you are making is irrevocable. I tend to find that once people realize
    that a decision is final, they can immediately start making plans and find closure.


    # Managing Finances When You Stop Growing


    Growing companies are often flush with cash. But when you stop growing, your costs
    often don’t stop as well. Taxes go up. Inflation goes up. Cost of living increases,
    at a minimum, need to be given to employees annually to keep them.


    At some point, if you don’t grow customers and employees, you’re left with trying
    to find ways to make more money in a seemingly shrinking company. Some ways you
    can go about doing so include:


    * Write a sentence down on real paper with a real pen about how to cut each entry
    in the `Accounts Payable` column of your `General Ledger`. Inspecting costs with
    a microscope will help you figure out what you can cut without negatively impacting
    performance of staff and what you can’t.

    * Renegotiate every contract. How much are you paying your lawyer? Pay them less.
    How much are you paying your accountant? Pay them less. If you can’t renegotiate,
    start looking for other contractors who are equally as qualified.

    * Review your current and future plans with your tax advisor. In many cases, if
    you convert to a different type of company, that isn’t geared for growth, then
    you could end up paying out less money in taxes.

    * Pay down any debts your company has. Interest on debt can kill you. Especially
    credit card debt. And should you choose to sell the company, it will be far easier
    if you have fewer liabilities.

    * Convert employees to contractors. This is my least favorite option, and potentially
    even more expensive than having `W2` employees on staff anyway. Just know that
    in my experience, if you convert an employee to a `1099`, they’re looking for
    a new job immediately. No, really, even if they tell you it’s cool, they are.

    * Go virtual. This is especially tough when you’re trying to convince staff to
    stick around, despite a lack of personal opportunity for growth (or at least the
    perceived lack of opportunities). But rent is often as much as a staff employee.
    The most important aspect of going to a virtual workplace is to keep community;
    otherwise, the distance created between you and employees will cause them to be
    more likely to abscond with your customers—or in their eyes, their customers.

    * Purchase property. Wait, I said reduce costs and pay down debts… Mortgages on
    commercial real estate are typically 15-year notes, so it’s usually a pretty big
    investment. By redirecting rent, though, you should be able to easily build more
    of a rainy day or retirement fund. And you should net more return than you could
    do with other investments.


    Whichever options you choose, make sure you understand your revenue and costs
    before you make any decisions, and make sure to build up even larger cash reserves,
    or invest profits in low-risk investment vehicles. Or forget everything I’ve said
    and see a financial advisor!


    # Conclusion


    No amount of alcohol is going to make you feel better on a day when you have to
    lay off four or five people. The easiest way to avoid that is to grow deliberately,
    rather than as a reaction to business. This means not hiring and firing as you
    bring on certain new customers. Instead it means knowing what size you want to
    be and how you’ll get there. It also means knowing when to slow things down or
    perhaps even when to avoid entering into a contractual relationship that could
    potentially bankrupt you.


    Grow when you feel comfortable, not when you feel obligated for the sake of pride,
    profits, or pressure. I can’t reiterate the word deliberate enough. Growing at
    the right time is more sustainable, better for the people around you, and ultimately
    better for your health. There’s a chance that once you’ve gotten to your maximum
    organization size, you’ll choose to sell the company, which is what we cover in
    the next chapter.


    # Further Reading


    * A View from Beneath the Dancing Elephant: Rediscovering IBM’s Corporate Consitution,
    Peter E Greulich, [`https://www.amazon.com/View-Beneath-Dancing-Elephant-Rediscovering/dp/0983373469`](https://www.amazon.com/View-Beneath-Dancing-Elephant-Rediscovering/dp/0983373469)

    * The Decline and Fall of IBM, Robert X Cringley, [`https://www.amazon.com/Decline-Fall-IBM-American-Icon/dp/0990444422`](https://www.amazon.com/Decline-Fall-IBM-American-Icon/dp/0990444422)

    * The Lifestyle Business Owner, Aaron Muller, [`https://www.amazon.com/Lifestyle-Business-Owner-Profits-Without/dp/1683506499`](https://www.amazon.com/Lifestyle-Business-Owner-Profits-Without/dp/1683506499)

    * Lifestyle Business Playbook, Marta Magdalena and Cyrus Kirkpatrick, [`https://www.amazon.com/Lifestyle-Business-Playbook-Lifetime-Fulfillment-ebook/dp/B079FWJSKL`](https://www.amazon.com/Lifestyle-Business-Playbook-Lifetime-Fulfillment-ebook/dp/B079FWJSKL)

    * Lifestyle Entrepreneur: Live Your Dreams, Ignite Your Passions and Run Your
    Business From Anywhere in The World, Jesse Krieger, [`https://www.amazon.com/Lifestyle-Entrepreneur-Passions-Business-Anywhere/dp/1614486271`](https://www.amazon.com/Lifestyle-Entrepreneur-Passions-Business-Anywhere/dp/1614486271)

    * Serve No Master: How to Escape the 9-5, Start up an Online Business, Fire Your
    Boss and Become a Lifestyle Entrepreneur or Digital Nomad, Jonathan Green, S.J.
    Scott [`https://www.amazon.com/Serve-No-Master-Lifestyle-Entrepreneur-ebook/dp/B01HVY28L6`](https://www.amazon.com/Serve-No-Master-Lifestyle-Entrepreneur-ebook/dp/B01HVY28L6)

    * The 4-Hour Workweek: Escape 9-5, Live Anywhere, and Join the New Rich, Timothy
    Ferriss, [`https://www.amazon.com/4-Hour-Workweek-Escape-Live-Anywhere/dp/0307465357`](https://www.amazon.com/4-Hour-Workweek-Escape-Live-Anywhere/dp/0307465357)'
