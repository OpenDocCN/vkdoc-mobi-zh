- fmt: '# Selling Mobility


    I used to get smoothies from a little one-person shop, right by my gym. The store
    is run by a fitness instructor. She doesn’t know a ton about technology. But she’s
    really, really smart. And she’s been growing her business. She asks me a lot of
    questions about her devices when I stop in for smoothies, and sometimes they put
    the concepts I deal with at work into a whole new context. They help me understand
    how a small business owner thinks about technology. Her questions have changed
    how I consult with small businesses.


    She doesn’t have a computer. She doesn’t want a computer. She also doesn’t use
    her cell phone for anything. She uses iPads. And sometimes, when an employee has
    been messing around on an iPad, she sees a little something she might not want
    to see in the browser history. But, it’s a smaller company, and she’s happy to
    keep costs down in the beginning by leaving everything as open as possible and
    not restricting what people can do. And this is how tens of thousands of new businesses
    are started every year (keep in mind that part-time Apple consultants aren’t the
    only ones making it work in the gig-based economy).


    Sometimes I like to give her helpful tips (consider this free consulting). These
    are often things like "get an accountant" or "here’s an app for annotating PDFs."
    As she grows, she wants to stay on the iPad forever. This is similar to other
    businesses that have grown, like Smoothie King, which Apple famously uses in its
    marketing documentation as a model, with over 500 franchises using Apple devices
    to speed up check-out. Or my local coffee shop, which now has 7 locations. But
    I’ve also given her tips on how to make a better Apple deployment using third-party
    tools.


    Not all businesses, and definitely not all job functions in even the smallest
    business, can replace all of their computers with tablets. But many want to, because
    tablets are cheaper, easier to manage, require less training, and come with much
    higher customer satisfaction than desktops and most laptop computers. Because
    of the limited real estate on the screens of most mobile devices, the apps that
    run on devices are often used for a specific job function. In many environments,
    stringing together a workflow can require multiple apps, as we discuss throughout
    this book. But even if you load a number of apps on a device, you will often spend
    less than many of the popular traditional software packages on the market. Still,
    at some point, many jobs simply require more complicated hardware and need laptops.


    It seems like every year, there are entire industries switching large numbers
    of desktop and laptop computers to mobile devices. This represents a huge potential
    source of new customers to the savvy new Apple consultant. Apple started the trend
    of mobile devices in retail, but since then we’ve seen proliferation in field
    services, medicine, and even evangelical environments, allowing for a never-ending
    source of customers. And sometimes it just takes the mastery of one app or making
    one friend at an Apple Retail Store or Windows-focused consultancy to make all
    the difference to your business.


    As mobile devices gain so much traction in these environments, interesting questions
    around security and scalability have started to crop up. Devices get lost and
    need to be wiped. As you acquire a lot of devices, you want them set up similarly
    and you want that device configuration to be automated. The vendors have listened
    to what customers need. For example, Apple provides the following technologies
    about which you need to be knowledgeable when talking to customers:


    - **Mobile Device Management (MDM)**: Solutions such as Jamf Now ([`www.jamf.com`](http://www.jamf.com)),
    that allow administrators to manage devices remotely: managing apps, content,
    settings, and even actions on devices, such as remotely wiping and locking devices
    that fall outside the organization’s control (by getting lost and/or stolen).
    If you’re doing a lot with mobile deployments, you’ll want a relationship with
    Jamf, AirWatch, SimpleMDM, or one of the other MDM/management platforms out there.


    - **The Volume Purchase Program (VPP)**: Allows users to purchase apps in bulk
    and then deploy purchased apps to devices automatically. For more on the Volume
    Purchase Program, see `deployment.apple.com`.


    - **The Device Enrollment Program (DEP)**: Forces devices into an MDM solution,
    automatically joining to the solution when a device is activated. For more on
    DEP, work with your account teams at Apple or the reseller of your Apple devices.


    ### Note


    For a more comprehensive list of Apple terms and technologies, see Appendix A.


    Many apps are only available for a single platform. For example, many of the apps
    on the App Store for an iPad will not have an equivalent on Android devices, and
    vice versa. Once upon a time, vendor lock-in was considered a bad thing. But these
    days, it can help to keep costs down. A consultant or business owner can learn
    much more about managing devices if they only have to learn one platform. As the
    business grows, there may be a desire to move to another platform, but by then,
    the business should be to the point where hiring outside organizations to implement
    a new solution will be a major expense.


    Many of the apps that organizations use communicate with a website to store data.
    Little, if any, data is stored on mobile devices. Therefore, backup is less of
    a concern than ever, with Software as a Service (SaaS) solutions also supplying
    centralized management of app data without the need for physical servers in a
    startup’s office.


    As custom and App Store apps cover more and more of the tasks that need to be
    performed in organizations, increasingly more small businesses are choosing to
    exclusively leverage mobile devices to complete work previously done with computers.
    And they should, provided that doing so can be done securely. This drives down
    the costs to start a business. The place that makes my smoothies started on a
    shoestring budget, compared to what it cost to start my first company and get
    to the point where we could accept credit cards. Hopefully, less risk and upfront
    costs will allow progressively more startups to succeed and will cause increased
    innovation. Helping people to succeed should be our first and foremost goal at
    all times.


    Apps, cloud services, hardware, and other tools can help your new business help
    your customers. In the next section, we’ll focus on selling and working with cloud
    services.'
