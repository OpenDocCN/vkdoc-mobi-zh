  trans: '

    # 值得考虑的几种 RMM、PSA 和 MSA 解决方案


    到目前为止（或者如果你还没开始，在某个时间点），你可能正告诉大多数客户，让他们基于软件来运营业务。会计、CRM、销售点、ERP 等解决方案有助于降低劳动力成本，并让企业保持敏捷。你自己的业务也不例外。起初，如果只是你一个人，你或许还能靠电子表格和一个
    `Quicken` 账户勉强维持。但随着业务增长，情况就不再是这样了。


    因此，有许多工具值得你关注，包括以下解决方案，它们至少可以用来管理 Apple 设备，即使它们开箱即用提供的价值并不多：


    - `Continuum`

    - `Autotask`

    - `Kaseya`

    - `Solarwinds MSP`

    - `Connectwise`

    - `N-Central`

    - `Pulseway`

    - `NinjaRMM`

    - `LogicMonitor`

    - `ManageEngine`

    - `Cloud Management Suite`

    - `Atera`

    - `CENTREL`

    - `Loom Systems`

    - `Auvik Networks`

    - `Trend Micro`

    - `mspStack`

    - `Acronis`

    - `HelpSystems`

    - `ECi Software Solutions`

    - `Opsview`

    - `OptiTune`

    - `Spiceworks MSP`

    - `Avast Managed Workplace RMM`

    - `Unigma`

    - `Zenith Infotech`

    - `packetTrap`

    - `BeAnywhere`

    - `LogMeIn Central`

    - `AVG Cloudcare`

    - `Comodo One RMM`

    - `Panorama9`

    - `Auvik MSP Edition`

    - `gfiMax`

    - `HarmonyPSA`


    在选择时请务必严谨。请记住，当你的企业规模尚小时，更换工具会有些麻烦，但还是可行的。随着业务增长，考虑到你可能需要处理的设备数量，更换工具会变得越来越有挑战性，而且这样做会丢失大量历史数据。因此，在选择工具时要严谨。虽然有些工具最初看起来可能很昂贵，但随着业务增长，你很可能会注意到它们带来的真正价值链。


    在构建工具链时，请考虑以下属性：


    - 工具的成本与其带来的价值相比如何？

    - 是否支持你所有的计费类型？

    - 该工具能否与其他设备管理解决方案集成？

    - 该工具是否为你的员工提供一条清晰且易于解释的路径，将工单创建、工单完成、应收账款和工时记录串联起来？

    - 该工具是否允许技能矩阵，以便随着业务增长，你无需依赖一个了解组织中每种技能组的调度员来分配工单？

    - 该工具是否实现与客户沟通的自动化？

    - 如果存在其他不支持的必要工作流程，你是否能为该工具编写自定义脚本？

    - 你是否可以只买一个工具而不是三个？

    - 如果该工具日后不再适用，你有哪些其他选择，以及数据迁移到那些其他选择的可移植性如何？

    - 该工具是否需要专业服务才能启动？

    - 制造该工具的公司的支持组织如何？

    - 你是否真的喜欢使用这个工具？


    还有很多其他问题，但这些问题应该能引导你走上正确的道路。客户应该能够在线创建工单，在线查看工单状态，在线查看其设备群的状态，收到工单已关闭的消息，对你在工单上的表现进行评分，查看他们的工作账单，并支付账单或更改他们的账单信息。而很可能的情况是，尤其是在
    Apple 方面，单靠一个工具无法让你完成所有这些事情。但通过一些良好的工作，你可以串联起一个完全自动化的解决方案。


    ### 提示


    一旦选择了某个工具，也要考虑该工具的未来发展！


    你应该设定一个目标，即最终超越你所购买的任何 MSP 解决方案。这些工具对于成长型和小型企业来说很棒，但一旦你达到某个临界点，就没有哪个工具能够满足你不断增长的需求了。起初，如果你编写了太多脚本和其他自定义工作流程，而这些在使用这些工具时毫无意义，那么很可能是你的业务逻辑出了问题。但随着业务增长，如果你固守它们特定的工作流程，你最终要么沦为同质化的商品，要么人工成本开始飙升。这时，聘请一位业务顾问，或向经历过类似成长阵痛的人寻求建议，是值得的。


    ### 注意


    市面上所有的 PSA 和 MSA 工具用起来都会很糟糕，除非你调整自己的业务逻辑去适应它们的逻辑。即使这样，它们可能还是很糟糕。我很遗憾地告诉你，选择过程应该假设这些工具会有些糟糕之处。但从头开始构建你自己的工具，这本身就是一种商业模式，你可以在其中销售你的工具——前提是你确实认为自己能比别人做得更好（并且希望有机会证明自己是正确的）。


    # 基于应用的经济


    很少有单个软件能够自动化整个组织；你可能需要将多个软件包串联起来，才能充分发挥任何给定工具的全部优势。而一旦你做到了，你必然会发现自己想要实现越来越多的自动化。我曾经用过的一句话是“被一个小
    shell 脚本取代意味着升职！”


    那么你应该关注哪些工具呢（甚至也许能想出一种服务可以卖给客户）。有几种解决方案脱颖而出：


    - `IFTTT`（If This Then That 的缩写）是一个面向消费者的工具，旨在实现简单、可读性强的自动化。`IFTTT` 可轻松用于连接 `Nest`、`Google
    Apps` 和其他常见云服务等。`IFTTT` 的妙处在于，我看到人们有能力构建自己的自动化，这价值巨大。但问题在于，你可能会花费不少时间从那些重叠或构建不佳的自动化中筛选出真正能可靠完成你需求的功能。但它是免费的，这算是一个优点。


    - `Workato` 是一个可用于连接多种更专业级别的云服务的工具。我强烈建议你检查一下 `Workato` 中所有与你所用工具相关的受支持工作流程。你可能会看到一些起初看似不起眼的东西，但最终却能激发一个创新甚至革命性的工作流程，从而节省你的时间，或以你从未想过的方式取悦你的客户。


    - `Workflow` 非常棒，最近被苹果收购了。类似于 `Workflow`，它连接各种拥有 API 的工具，但它不是我的首选，唯一原因是我对其技术的长期性有所顾虑，因为苹果在允许访问其在线服务方面，以其对
    API 不友好而闻名。


    而且每天都有新工具问世。在一个微服务和 API 优先的世界里，许多解决方案的真正价值在于它们的互操作性。大多数供应商希望成为框架，而不关注那种互操作性，因此连接其他工具的“胶水工具”市场正在蓬勃发展。其他一些值得考虑的解决方案包括
    `Zapier`、`AutomationFuel`、`Conexio`、`Automate.ioo`、`Integromat`、`Flow XO Integrations`、`Microsoft
    Flow`、`OneSaas`、`Flashnode` 和 `Built.io`。


    ### 注意


    上述工具中可用的自动化只是一个开始。这些工具中每天都有新功能涌现。我建议定期查看这个列表（也许每个月在喝晨间咖啡时看一次）。


    在上一章中，我们讨论了会计软件。别忘了这一点。最初，大多数组织会使用一个 App 或网页应用来手动给客户开账单。但请不要忘记，虽然你可以用 App 手动给客户开账单，但发票开得越多，这个过程就越耗时。这就是为什么有多种方法可以将你的计费与任务管理、工单管理和其他工作流程集成起来。像
    `Freshbooks` 和 `Freshdesk` 这样的工具甚至更进一步，构建了 `Freshservice`，这样你就可以将许多工具整合到一个真正好用的工具中。


    如果你能简化业务逻辑，使其与这些集成度更高的解决方案之一相匹配，那么在尝试排查为什么所有这些像“纸牌屋”一样的工作流程不能总是正常工作时，你就不太可能抓狂了。

