    # 6. 广交朋友：发展合作伙伴关系


    在这个世界上，没有朋友寸步难行。来自你所在行业及相邻行业的朋友能为你提供不同的视角和技能组合，还能让你接触到许多不同的客户。但让人购买某样东西或使用某项特定服务，并不总是值得冒险，即使你并非因将客户推荐给“朋友”而赚取佣金。


    第 2 章讨论了构建产品组合，包括要销售的产品和提供的服务等内容。但在本章中，我们将探讨如何利用与其他组织的合作伙伴关系，将你的公司提升到新的水平，从那个常常被遗忘的伙伴——你的客户——开始。


    ## 吸引客户进行转介绍


    你的客户是寻找新客户最具成本效益的途径。事实证明，做好本职工作终有回报。但每个行业都各不相同。你不可能总是毫无防备地向客户请求，让他们把你推荐给其他可能从你服务中获益的组织。以下是几种你可以用来获取转介绍的巧妙策略：


    -   **主动请求**：如果你与客户关系良好，那么在项目结束之际或通过电子邮件，直接请求他们将你推荐给其他客户。这样做很难不显得绝望或过于肉麻，但却是可行的。

    -   **留下资料**：我曾遇到过客户转交营销材料的情况，但如果你不给他们留下点什么，他们就没法这样做。询问客户是否可以留下几页单页资料，供他们转交给其他人，这是另一种从“遗留资料”中增加业务的方式。

    -   **为转介绍提供补偿**：如果涉及某种形式的补偿，最合乎道德的做法是补偿你客户所在的公司。这是一条危险的下坡路，在某些行业，这会立即引发不信任（甚至可能因各种法规而违法）。请谨慎行事。

    -   **在客户的网络界面中放置链接**：如果你为客户提供了一种在线查看服务的方式，同时也可以给他们一个小按钮来推荐客户。这是获取转介绍最简单、最被动的方式之一。


    接下来，是时候将你的注意力转向你想要接触的外部合作伙伴类型了。在下一节中，我们将探讨如何找到合适的合作伙伴，包括寻找能够提供互补服务、分包业务，或者仅仅是潜在的互相推荐业务（单方面或双向）的人。


    ## 寻找合适的合作伙伴


    我曾收到过成百上千家公司发来的电子邮件，它们希望与我所任职的组织合作。有些对我来说，或者对我当时所代表的组织来说，是非常划算的交易。其他一些则有点牵强。而最初看起来最划算的那些，在我们深入研究其业务后，却发现糟透了。


    在选择合适的合作伙伴时，请始终将你的特定客户放在首位。问自己以下几个问题：


    -   我的客户能和这个人或这家公司相处融洽吗？

    -   我的客户需要哪些商品和服务？

    -   当（而不是如果）他们与这个其他供应商发生问题时，我最终会如何卷入其中？

    -   该供应商是否能真正提供他们声称能够提供的服务？

    -   成本是否匹配？

    -   最终会是该供应商还是我，在客户公司里无意中承担了对方的角色？

    -   这应该是一种分包安排、双向的正式业务推荐，还是仅仅是我可以指向的人？


    对于许多苹果咨询公司来说，最常见的商业安排是帮助客户找人处理他们的 Windows 设备。我经常看到这种情况。也许只是为了那两台财务用电脑，或者是为了大多数基于
    Windows 的系统。让我们面对现实吧，传统上，管理 Windows 系统的人与典型的使用 Mac 的客户确实有些不同。找一两个（或三个）你信得过，并且适合你这类客户的人。'
- fmt: '### Structuring a Partnership


    In most cases, if there’s no compensation, I would recommend having three partners
    for each product or service you need to connect customers to. You can then point
    to that (e.g., on a web page of your site) and say something like, “I recommend
    that you contact these three and see who you like dealing with and think matches
    your business the most.”


    You don’t want to compete with a partner. For example, a router manufacturer might
    sell directly but deliver no services. If you want to deliver services but not
    sell their equipment then you might have found a perfect partner if they need
    someone to bring in that can perform labor, especially for complicated products.
    But if you want to sell the routers as well, make sure you find out whether or
    not they sell directly to customers so that you can best understand what might
    happen if they compete with you on a given deal.


    The management at most vendors will want to have a healthy relationship with you.
    But account teams that cover your geography might want to make commission on selling
    products. When evaluating partners, also find out whether or not each partner
    will sell directly once you’ve registered a deal and, if so, whether or not you
    can lock in better pricing than their account teams can offer provided you register
    the deal before their internal staff does.


    Who makes a good partner? Obviously, one of the most important aspects of finding
    a good partner is that your customers don’t fire you for making the recommendation,
    either because the partner stole the customer from you or because they did work
    that was bad enough for the customer to associate you with that work.


    If you pick a bad partner, you risk losing a customer. Trust from a customer is
    built over time. If your customers have bad experiences with a partner, there
    is a good chance they may lose trust in you. One way to limit the liability this
    creates is to not accept money. Instead, you can engage in a bilateral referral
    agreement. This doesn’t always work but is usually referred to as quid pro quo.


    ## Quid Pro Quo


    When you find a new partner, they’re going to be motivated to send leads to you
    more if you sell a lot of their product. This relationship can take a few months
    to mature, so if you are going to build a good relationship then each party should
    have something to gain: quid pro quo. For example, I once inked a partnership
    with a new company to resell their routers. It just so happens that within the
    first month, I sent about a dozen customers to them. Their response was to send
    a bunch back my way. These were net-new customers with a bunch of Apple devices
    that weren’t being managed.


    The quid pro quo can take on different manifestations based on the type of relationship.
    I once had a company that was referring a lot of business to me, and I just didn’t
    have any business to refer back. Set up a commission plan to compensate them for
    the referrals. Another asked for a commission structure that I just couldn’t give
    them, effectively ending the relationship (although leads kept trickling in from
    them from account teams that knew I was a trusted vendor).


    Given that all relationships are different, be realistic with your expectations
    of how much product you might sell and set expectations early. And ask for the
    same from them. This will allow you to build some goals for the relationship and
    make plans. Converting partnerships into customers is important when growing your
    business. However, make sure not to expect anything and to increase your risk
    in a relationship along with the incremental rewards that drive you to do so.


    It benefits all software, hardware, and services companies to engage in partners
    that then rely on the success of their business for their own success. So look
    for ways to make all of these relationships beneficial for everyone involved.
    Being partners allows you to stay nimble; but sometimes, you’ll see too much potential
    for a simple partnership and want to move into a subcontracting arrangement instead.


    ## Subcontracting vs. Partnering


    Partnering is great and, if done right, will help you provide the best services
    to customers for the best prices. But there are times when you will decide to
    keep work on your paper. There are a lot of companies that have contracts. And
    they want to keep all of their expenses on one Purchase Order (PO) in order to
    streamline accounting operations. You might also decide to subcontract types of
    work to provide a more comprehensive offering to customers.


    Before you subcontract, make sure to have a contract and have all subcontractors
    sign that contract. Work out rates that are fair and reasonably priced. You should
    make a 50% or greater margin in order to sustain commissions, taxes, finance handling
    fees, etc. If you can’t and you still choose to subcontract, then you’ll likely
    end up with the ancillary services being provided as a loss leader or gaining
    market share by providing one throat to choke to customers. If you’re making that
    kind of margin, couldn’t the subcontractor do that work directly with customers?
    Yes. But then they would have to go find customers, process payments, pay taxes,
    not take payment for 60 to 90 days, and all that other fun stuff. You take on
    plenty of liability.


    If you decide to subcontract work, make sure you have at least two vendors who
    can subcontract a given project. Maybe you are asked to do a project and you have
    a network of vendors who you can hire to do the work. Make sure to have at least
    two in a subcontracting agreement. Otherwise if one goes out of business or decides
    not to subcontract any longer, you’ll be left with a potentially negative-margin
    business.


    Once you have a network of subcontractors, then it’s time to figure out the logistics.
    Sites like `Expensify`, `Ebay`, `Stripe`, etc. can be used to automate paying
    subcontractors. If you can work into your PSA or accounting system an automated
    routing to keep track of project expenses, all the better! Additionally, you’ll
    want project and ticket notes entered into your systems, so decide up front how
    you want contractors to enter their time into your time tracking systems (and
    an option for low volumes of work is to e-mail you those tickets and you can paste
    them in).


    Other, smaller aspects of subcontracting arrangements to cover:


    - Decide up front if you want to provide access to an e-mail address from your
    organization, if you want subcontractors to wear branded attire, and if you want
    them to acknowledge that they don’t work for you directly.

    - How will you handle billing disputes when (not if) they happen? Don’t stiff
    your subcontractors just because your client doesn’t like the service, but know
    that prolonged exposure can backfire, especially if the subcontractor isn’t using
    the same systems you use.

    - How will you handle requests to engage with the subcontractor directly? Are
    subcontractors allowed to work with customers after your project is over or does
    that need to flow through your company forever? Is there a time after the last
    project done as a subcontractor that the subcontractor should wait before directly
    engaging with customers?


    All of these attributes to the relationship should be discussed up front with
    a written follow-up (e.g., via e-mail). The more formal an arrangement, the harder
    it might be to get through paperwork but setting good expectations from the beginning
    will lead you to a more successful long-term relationship.


    If you’re the subcontractor, then make sure you understand all of these attributes
    to the relationship as well.'
  raw: '### Structuring a Partnership


    In most cases, if there’s no compensation, I would recommend having three partners
    for each product or service you need to connect customers to. You can then point
    to that (e.g., on a web page of your site) and say something like, “I recommend
    that you contact these three and see who you like dealing with and think matches
    your business the most.”


    You don’t want to compete with a partner. For example, a router manufacturer might
    sell directly but deliver no services. If you want to deliver services but not
    sell their equipment then you might have found a perfect partner if they need
    someone to bring in that can perform labor, especially for complicated products.
    But if you want to sell the routers as well, make sure you find out whether or
    not they sell directly to customers so that you can best understand what might
    happen if they compete with you on a given deal.


    The management at most vendors will want to have a healthy relationship with you.
    But account teams that cover your geography might want to make commission on selling
    products. When evaluating partners, also find out whether or not each partner
    will sell directly once you’ve registered a deal and, if so, whether or not you
    can lock in better pricing than their account teams can offer provided you register
    the deal before their internal staff does.


    Who makes a good partner? Obviously, one of the most important aspects of finding
    a good partner is that your customers don’t fire you for making the recommendation,
    either because the partner stole the customer from you or because they did work
    that was bad enough for the customer to associate you with that work.


