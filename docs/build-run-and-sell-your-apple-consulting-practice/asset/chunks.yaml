- fmt: '# Buy Advertising


    Advertising can be really expensive. But there are small ways you can buy that
    can have a substantial impact on your business. When you purchase advertising,
    you are basically engaging in passive marketing. Don’t expect every click to net
    you a new $100,000 customer.


    Where’s the right place to buy advertising? SEO, covered more in Chapter [7](#469405_1_En_7_Chapter.xhtml),
    is critical in shaping advertising campaigns. Chances are that SEO is a far smarter
    spend than traditional advertising campaign for nearly everyone who’s reading
    this book.


    Here are some mediums that many will look into.


    * **Online ads**: Buying advertising on the Internet is likely the most important
    kind of advertising you will do. This includes buying the top listing on search
    engines as well as buying banners on websites.

    * **Print advertising**: This includes local newspapers, local magazines, national
    print publications, industry-specific journals, and coupon books.

    * **Podcasts**: If you’re in a large city, there are podcasts about that city.
    If you specialize in an industry, there are podcasts for that industry, so put
    your initial focus on those and then get less specific from there.

    * **Radio**: According to the type of audience you cater to, there’s a good chance
    that there’s a radio show somewhere that is tapping into the same audience. This
    might be public radio, a talk radio show that caters to a given neighborhood,
    or something I’ve never thought of, because I don’t service your customers; you
    do.

    * **Mailers**: You can buy lists of addresses. You can also pay a service to include
    lists when you have mailers printed. These are inexpensive per item you send,
    but you have to send a lot to get anyone to actually act on them.

    * **Billboards**: Billboards are one of the Airport terminals, billboards in neighborhoods
    you want to get new business in, and billboards are incredibly ineffective for
    the type of business you’re likely after. Unless you have someone in the advertising
    field that you trust tell you to purchase advertising on a billboard, don’t do
    it.

    * **Memberships**: We won’t really cover this one further. But when you join professional
    organizations, especially those that cater to a given geography, do everything
    you can to get a link to your site and your phone number on there.

    * **Television**: I have never seen a consulting firm successfully pull off an
    ad on the television. The closest thing might be the Watson ads from IBM. And
    I’ve yet to encounter an Apple consulting firm that is at the size to justify
    a television spot. But these aren’t as expensive as you might think. Alternatively,
    consider advertising at the local movie theater. They’re always looking for people
    to buy ads that appear before a movie. And you like customers who are early!

    * **Cable**: Some areas have a local cable channel that runs advertising (for
    non-profits these ads are often free).


    Now that we’ve done a quick overview of these, let’s dig into each, starting with
    blogs.


    # Blogs


    I have a blog. About once a year I get an e-mail from someone and actually try
    out their product based on that unsolicited e-mail. About once every couple of
    years I end up writing an article about one of those products as well. And I’ve
    even put them in a couple of books I’ve written. Some of them, I actually still
    use. Some have even told me that they got a fair amount of business through my
    posts.


    So, advertising to bloggers, be it through unsolicited e-mails or some other way,
    can work to get business. But if that’s all you wanted from bloggers, you’d be
    better off spending those advertising dollars on something more transactional.
    Many bloggers (who aren’t me) are influencers, so one aspect of reaching them
    is that you have a higher rate of conversion. Your services or product can also
    end up getting picked up by people in the media that follow those bloggers. Which
    can end up with mentions in various media outlets, albeit these are usually industry-specific.


    Blogs also provide backlinks. It stands to reason that if backlinks are what give
    sites high listing on search engines, then the more of those you can get, the
    better. And to some degree, getting a good natural listing in the search engines
    has a lot to do with being relevant. Having a site with a good page ranking mention
    you is a great way to get those backlinks.


    You can also buy mentions in blogs. Avoid purchasing backlinks, though. Not all
    backlinks are created equal. Supposedly, if you purchase a backlink on a website,
    that backlink *should* be tagged as a “No-Follow,” which means that search engine
    crawlers don’t count the link toward your rank. Well, kinda’. Track the links
    that come into your site, but don’t assume that those links tell the whole story
    of the impact of your work to get bloggers to mention you.


    Bloggers are a weird bunch. You can usually reach them with e-mails (check the
    website or registrar for addresses if you don’t have them already), connect on
    Linkedin (chances are that you aren’t too many connections away from them if you
    need an introduction), message them on social media, etc. Being that I’ve gotten
    a lot of these, let me throw out a few tips.


    * Personalize the communication.

    * Be nice.

    * Explain why your pitch is pertinent to your audience.

    * Include a link (but not eight).

    * Make sure your pitch fits in the first couple of lines.

    * Use language similar to the language the blogger uses.

    * Avoid repetitive e-mails.


    If you think that blogs are a good place for you to advertise and you don’t get
    any traction getting someone to write about your goods or services, then also
    consider buying some advertising on the site. This can usually be done directly
    with the blogger, or through an advertising network. Another way to get your message
    out there is through podcasts, which we’ll cover in the next section.


    # Buy Advertising on Podcasts


    I have a podcast, so I’m partial to podcasts of course. But why did I start a
    podcast? Because I was paying obscene amounts of money to large podcasts for advertising
    products. That and I have a big mouth.


    Chances are that if you’re reading this book, you probably don’t want to advertise
    on my podcast. You want to advertise in places where your customers will be listening.
    As with most advertising, local consulting firms should stick to local media outlets.
    Look for podcasts that talk about your specific city or cities. Look for podcasts
    that cater to the industries you want to support. And remember that just because
    you like a podcast, that doesn’t mean you’ll have a good ROI from sponsoring it.


    Speaking of ROI, many podcasts can be thought of as “dark social.” This basically
    means that visitors of the podcast aren’t coming from the website of the podcast.
    Instead, they’ll be attributed as `Direct` traffic if you’re looking at them in
    Google. But I keep telling you to track all of the things! A great strategy to
    try to track the impact of an ad campaign on a given podcast would be to have
    the URL used to visit the website reflect a URL specific to that podcast. This
    isn’t natural, so consider offering a deal to use that special URL. For example,
    visit `myawesomeconsultingfirm.com/macadminspodcast` to receive 10% off your first
    purchase. You’ve heard this with other podcasts already.


    Most podcasts desperately want to sell advertising. So they’ll cut you a deal
    if you just ask nicely. I always ask for discounts, even for my cable bill. It
    can’t hurt to ask, and if you don’t, you’re just leaving money on the table. After
    all, you’ll provide the podcast with text that will be read during the podcast.'
