  trans: "\n### 注意\n\n请牢记，如果这些系统能与你的工单管理系统集成，让团队能尽可能轻松地跟踪时间，那就太棒了。\n\n一个典型的入职计划可能包括以下内容：\n\
    \n*   **第 1 周**\n    *   签署合同，例如竞业禁止协议、可接受使用政策等（除非这些已在入职第一天之前处理完毕）。\n    *   回顾组织的使命、愿景和价值观。我们在本书中其实不会过多讨论这些，因为它们往往被赋予了过多的篇幅，但即便你可能没有将这些成文规定，你也应该与新员工就此进行交流，以确保公司的基因能如你所愿地延续下去。\n\
    \    *   为公司网站撰写个人简介。这能让你的客户对这位即将出现在他们面前的新人有所了解。如果可能，请附上照片。\n    *   填写所有必需的人事文件，例如\
    \ W2 表格、健康保险登记等。我非常不喜欢要求员工在非工作时间处理这些，因为这开创了一个不好的先例。\n    *   与资深工程师一同进行数次现场跟岗实习（如果这是你招聘的第一位员工，则由你亲自带教）。\n\
    \    *   接听服务台电话。我坚信，咨询公司的每个人都应该花一些时间在服务台工作。这能让员工接触到最广泛的客户群体，并传递出关于组织内劳动分工的微妙信息。\n\
    \n*   **30 天**\n    *   明确你希望员工何时能够独立接手工作。这一点很重要，因为这能让员工了解他们在客户互动方面是否符合你的期望。\n\
    \    *   按时提交费用报告。审查任何与费用、里程等相关的问题。\n    *   快速关闭工单，并附带良好的详细信息。审查优秀的工单记录以及那些可能有所欠缺的记录。\n\
    \    *   可能要取得各种技术认证。\n\n*   **60 天**\n\n我喜欢在此处加入对员工的可量化和可质化的反馈，例如：\n    *   潜在计费配额的完成百分比。再次强调，确保员工了解他们如何实现你的期望。\n\
    \    *   客户满意度评分。这有助于员工了解客户如何看待他们。如果你还没有追踪客户满意度的工具，我强烈建议你探索网上众多的调查站点，并重点寻找那些可能与你的事件跟踪系统集成的工具。\n\
    \    *   生成内部资产，例如知识库、博客文章、客户建议等。\n    *   掌握内部系统，例如工单系统、知识库等。\n\n在达到 60 天这个里程碑之后，你应该能够与员工坐下来，共同制定一个更长期、更定制化的计划，使他们能够在行业中找到自己的专长，并朝着他们在工作中、职业生涯中以及总体人生规划中更具体的目标努力。\n\
    \n每次招聘时，都要迭代这份检查清单，以便你能在让每位新员工快速上手方面做得更好。需要关注的一些事项包括：\n\n*   员工是否按照你预估的时间，朝着达成各个里程碑的方向前进？\n\
    *   每位员工觉得哪些内容难以理解？\n*   你不得不教授哪些此前未曾记录的流程？\n*   哪些流程你可以通过书面文档而非口头讲解来传达，以避免对流程和步骤产生可能的误解？\n\
    \n在未来的业务快速增长期，如果你需要同时让多人入职，那么严谨的入职流程将会带来巨大的帮助。最终，我曾在我创建的名为“Year One”（是的，明显是从蝙蝠侠那里抄袭来的）的项目中积累了太多教条，不得不重新评估整个项目。这就是创造与毁灭的一部分。\n\
    \n## 用于入职的 Wiki\n\n我们许多人使用 Wiki 风格的解决方案或门户来构建入职文档。像 Confluence、Sharepoint 站点、Google\
    \ Docs（串联起来）等工具，以及其他替代方案，正越来越有效地帮助组织沟通标准操作程序、复杂思想、会议记录，以及组织需要存储的任何其他信息。\n\n随着站点的增长，它们会变得混乱。风格、一致性、流程、结构和指导原则，以及语法等方面，都会变得更为重要。你可以做很多事情来让页面变得更好，而无需添加花哨的动画效果。让我们看看我多年来发现的一些重要原则：\n\
    \n*   **不要埋没重点。** 任何超过 500 字的页面都应添加引言。\n*   **使用不同的标题层级。** 我喜欢在大多数文档的开头先写一个大纲。这个大纲会变成标题，有时也会成为特定段落的引言。这样做还能让你在开始向文档中输入内容之前，就先构建好这些标题。\n\
    *   **使用目录。** 并非每个页面都需要目录。但如果你无法在一屏内看到页面上的所有标题，我建议你让浏览整个页面变得更轻松。\n*   **拼写和语法很重要。**\
    \ 是的，我知道，你用那个设计精美的页面向大多数人传达了你的观点。但也有不少人为了忽略那个明显的“their vs. there”错误，或者那个包含了 16\
    \ 个逗号（还是说那是“comma”？）的 5 行句子而困惑了许久……组织内部的文档可能不需要完美无缺，但在不流失读者的同时，它确实有助于让你看起来更专业。此外，在整篇文档中使用一致的叙述主体和时态；否则，大多数人很快就会感到困惑。\n\
    *   **添加分节线。** 你知道文本中那些可爱的小水平线。它们有助于读者理解在章节之间跳转。或者，考虑使用不同的页面结构。但我很少见到超过两列的页面（或更多）不应该被拆分为独立页面的情况。\n\
    *   **使用粗体，但不要过多。** 我喜欢用粗体来表示强调。毕竟，这就是粗体的用途。我**从不**使用全大写，除非文章包含首字母缩略词（此时在首次使用时定义该缩略词并将其放在括号中），或者该词在我引用的截图中就是大写的。在列出缩略词时，字母之间无需加上句点。\n\
    *   **在记录软件时，引用屏幕上的文字。** 例如，如果屏幕上显示“Click here to start”，而你的句子中包含“click on Click\
    \ here to start before you”这样的字符串，那么无论这个句子里还有什么其他内容，读者都会完全迷失。此外，如果记录的是命令行界面，请使用不同的字体来区分文章正文与输入输出内容。\n\
    *   **使用项目符号和编号列表。** 如果你在文档中添加分步骤说明，请使用编号列表（这便于将来通过编号引用步骤）。如果你正在编写一个段落，并且有超过三个支撑论点的内容，那么考虑将它们移到项目符号列表中。如果你在一个句子中构建的列表包含超过三到四个项目，也请考虑将这些项目移到项目符号列表中。\n\
    *   **为图片添加注释。** 哦，还要使用图片。但是如果你使用了图片，为它们添加注释将使读者更容易找到你在文中指代的内容。\n*   **关注评论。**\
    \ 准备好在你点击保存新页面或文章的那一刻就收到评论。许多人会监控公司内网或网站特定部分中包含某个标签的所有文档的更新动态。然后，评论就会纷至沓来。与其强迫人们在评论中大海捞针，或者假设整个公司都会费力去阅读这些评论，不如在适当的时候更新文章内容（例如，每当有人提出一个问题时）。我喜欢为此使用\
    \ FAQ 部分。\n"
- fmt: "*   总结长而复杂的过程。任何需要在屏幕上点击超过10次或包含超过10个步骤的过程，都应事先包含一个摘要。过程越长，每一步中包含的信息就应该越少。你放入每一步的信息（即文本）越多，就越应该考虑添加图片、思维导图或流程图，以帮助读者不迷失方向。\n\
    \n*   使用更简单的词语。记住，并非每个人都能轻易理解你为了取悦他们、让他们相信你很聪明而使用的丰富词汇。在可能的情况下使用简单的词语，并尽可能采用简单的句子结构。\n\
    \n*   保持简短。一篇维基文章通常不应超过1500个单词，除非它在定义一个复杂的过程。并且每个句子应足够简短，以至于不需要结尾标点（想想语法良好的推文！）。记住，你可以链接到其他文章和页面。在任何可能的时候都要利用这一点。\n\
    \n*   为页面添加标签。许多内部文档系统允许用户关注带有特定标签的页面，或将带有给定标签的页面内容插入到其他页面中。为页面添加标签也能让你在怀疑自己是否已经写过某个主题或过程时，更容易找到它们。\n\
    \n*   时不时地保存。是的，大多数系统会自动每隔几分钟（甚至每次你点击时）保存一次。但并非所有系统都这样。尤其是在全新的页面上，你实际上还没有点击过那个“保存”按钮。\n\
    \n如今没有人愿意删除任何东西！但请定期审查并重新组织你所在组织或团队的站点。优先级会改变，任务会完成，职责会来也会去。定期重新审视你的内容结构有助于你在数据蔓延和内容过时之前做好准备。\n\
    \n## 一对一会议\n\n每位管理者都应定期与团队成员会面。这些会议有各种名称，例如检查会议和一对一会议。这让你能够了解员工的情绪，看看他们是否享受工作，并了解你能做些什么来帮助他们成为最好的自己。\n\
    \n每个人对会议内容都有不同的看法。我喜欢按以下方式进行：\n\n*   询问事情进展如何。确保保持亲切，即使你有议程。同时，确保你对他们的个人生活有所了解。但不要做作；要真诚。\n\
    \n*   沟通组织中的任何变化（人员配置、架构调整、新客户等）。\n\n*   回顾任何杰出成就的领域或需要改进的领域（最好用成就来“包裹”问题领域）。\n\
    \n*   回顾实现个人化学习计划（在本章下一节中描述）的步骤。\n\n当员工忙于处理客户现场事务时，一对一会议很容易被忽视。请不要这样。即使你需要调整会议时间，也要坚持定期的检查会议。你可能会忍不住在非工作时间安排这些会议，但也不要这样做。你已经承诺雇佣某人并指导他们的职业发展，虽然你当然可以在下班后喝杯咖啡或饮料，但通过在工作时间处理工作事务来展示持续承诺。\n\
    \n## 培训\n\n对于繁忙且不断成长的公司（也就是那种正在招聘并需要创建培训资料的公司）来说，建立良好的培训计划可能是一个挑战。创建新材料非常耗时，并且通常只能由特定团队成员完成。随着你的资料库增长，保持培训材料的最新状态可能会占用大量时间，尤其是在苹果公司每年发布一次更新的情况下。尽可能利用现有材料，以将维护工作量降至最低。\n\
    \n### 个人化学习计划\n\n我喜欢明确规定员工将如何使用培训时间和预算。这通常以个人化学习计划的形式进行。这些计划列出了培训的优先事项，以及实现这些优先事项的策略。我喜欢在学习计划中包含以下项目：\n\
    \n*   你希望改进的三个领域。这是计划中最重要的部分。每位员工想学习什么？计划的其余部分将跟踪如何实现目标。我通常倾向于三个项目而非一个的原因是，这提供了灵活性和一定的多样性，这样当人们在某个领域感到疲倦时（或者更好的是，完成了一个领域），他们可以转向另一个领域。最好这些领域在某种程度上是相互关联的。\n\
    \n*   在每个领域取得精通的季度目标。我希望这些目标是 SMART 的（即具体的、可衡量的、可实现的、现实的和有时限的）。\n    *   **具体的**可能意味着某人编写一个执行特定任务的脚本。\n\
    \    *   **可衡量的**可能意味着你期望每项任务都有一篇博客文章或一项外部认证。\n    *   **可实现的**意味着员工确实能够完成它（而不是你说“去写一个\
    \ macOS Server 的替代品，并在周五之前获得 CCIE 认证”）。\n    *   **有时限的**意味着目标可以在分配的时间内完成。\n\n\
    *   你是否在记录职业发展活动日志？职业的意味着这不是关于爱好，而是关于工作。对我来说，这里的关键词是发展。每个人正在做什么来提升自己？希望这些活动与公司目标一致，但并非必须如此。\n\
    \n*   你希望自己的下一个职位是什么？最优秀的员工会诚实地回答说你的职位。但并非每个人都真正了解摆在他们面前的职业领域。许多人只想在技术领域不断深耕。有些人则希望追随销售领域的高薪。其他人会诚实告诉你他们想创办自己的公司（但大多数人会撒谎说他们只想“变得更好”——尤其是那些有MBA学位的人）。这个问题的目的是为了跟踪如何将培训和你对员工的期望与团队成员个人的意愿对齐。\n\
    \n*   你觉得你距离下一个职位还有多远？这是一个很好的早期预警信号，表明人们是超前于还是落后于自己的计划。请记住，这些感受会随着外部动因的变化而改变。\n\
    \n*   同行教练反馈：一旦团队足够大，你可以使用同行教练系统让团队成员互相帮助。这让你能有更多时间审阅反馈，同时也能让你看到团队成员如何应对有限的领导形式。\n\
    \n*   活跃的研究项目：这些项目是本文档前面 SMART 目标的一部分。最优秀的工程师通常在这个部分最有乐趣。\n\n*   自上次会议以来取得了哪些进展？我喜欢把这看作是版本控制。“什么发生了变化”比阅读每一行要容易得多——尤其是当你需要筛选20到30行内容时。\n\
    \n随着时间的推移，计划会变得冗长。这是不好的。你引入的教条越多，人们从旨在关注他们自身的一对一会议和其他会议中获得的东西就越少。保持培训计划简短，只需包含足够的细节来解释目标是如何达成或未达成的。请记住，如果目标未达成，那么计划中某个你并不在意的小细节很可能会成为被责备的对象！"
  raw: "*   Summarize long and complex processes. Any process that requires more than\
    \ 10 clicks on a screen or more than 10 steps should also include a summary beforehand.\
    \ The longer the process, the less information you’ll want to put into each step.\
    \ The more information (a.k.a. text) you put into each step, the more you should\
    \ also consider adding images, mind maps, or flow charts to help readers not get\
    \ lost.\n\n*   Use smaller words. Remember, not everyone will easily follow when\
    \ you leverage the vast cornucopia of your lexicon to woo them into believing\
    \ you’re a smarty pants. Use small words when available and simple sentence structures\
    \ when possible.\n\n*   Keep it short. A wiki article probably shouldn’t be more\
    \ than 1,500 words , unless it is defining a complex process. And then each sentence\
    \ should be short enough to not require ending punctuation (think tweets with\
    \ good grammar!). Remember, you can link to articles and pages from other articles.\
    \ Use that to your advantage any time possible.\n\n*   Tag pages. A number of\
    \ internal documentation systems allow for watching pages with a certain tag,\
    \ or inserting a feed of pages with a given tag into other pages. Tagging pages\
    \ also makes them easier to find when you wonder if you wrote up a topic or process\
    \ already.\n\n*   Save every now and then. Yes, most systems will automatically\
    \ save every few minutes (or even every time you click). But not all. Especially\
    \ on brand new pages where you haven’t actually clicked that Save button yet.\n\
    \nNo one ever wants to delete anything these days! But routinely review and re-organize\
    \ your organization’s or team’s site. Priorities shift. Tasks get completed. Responsibilities\
    \ come and go. Routinely revisiting your content structure helps you stay in front\
    \ of data sprawl and stale content!\n\n## One-on-Ones\n\nEvery manager should\
    \ routinely meet with team members. There is a variety of names for these meetings,\
    \ such as check-ins and one-on-ones . This allows you to take the temperature\
    \ of the employee, see if they’re enjoying their job, and check-in on what you\
    \ can do to help them be all they can be.\n\nEveryone has a different take on\
    \ what should go on in these meetings. I like to run them as follows:\n\n*   Ask\
    \ how things are going. Make sure to be personable, even if you have an agenda.\
    \ And make sure you understand a little something about their personal lives.\
    \ But don’t be contrived; be authentic.\n\n*   Communicate any changes in the\
    \ organization (staffing, alignment, new customers, etc.).\n\n*   Review any areas\
    \ of exceptional achievement or areas that need addressing (it’s best to book-end\
    \ problem areas with achievements).\n\n*   Review steps toward an Individualized\
    \ Learning Plan (described in the next section of this chapter).\n\nIt’s often\
    \ easy to overlook one-on-ones when employees are really busy with customers in\
    \ the field. Don’t. Keep the routine check-ins, even if you have to move them\
    \ around. It can be tempting to do so, but don’t put them after-hours, either.\
    \ You’ve made the commitment to hire someone and guide their career, and while\
    \ you can certainly grab coffee or drinks after hours , show a continued commitment\
    \ by doing business during business hours.\n\n## Training\n\nBuilding a good training\
    \ program can be a challenge for busy and growing companies (you know, the type\
    \ that are hiring and need to create training assets). Creating new materials\
    \ is time-consuming and can often only be done by certain team members. Keeping\
    \ training materials up-to-date can take up an insane amount of time as your library\
    \ grows, especially given an annual release cycle from Apple. Leverage existing\
    \ materials wherever possible to keep your upkeep at a minimum.\n\n### Individualized\
    \ Learning Plans\n\nI like to codify how staff will be spending training time\
    \ and budget. This is often done in the form of an Individualized Learning Plan\
    \ . These plans lay out priorities for training, as well as tactics to achieve\
    \ those priorities. Some items I like to include in learning plans include the\
    \ following:\n\n*   Three areas you’d like to improve on. This is the most important\
    \ part of the plan. What does each employee want to learn? The rest of the plan\
    \ tracks how you get there. The reason I usually prefer three items rather than\
    \ one is that this provides flexibility and a little variety so when people get\
    \ tired of one area (or better, finish an area), they can move on to another.\
    \ It’s preferable when the areas are connected in some way.\n\n*   Quarterly goals\
    \ toward mastery in each area. I prefer these to be SMART (or Specific, Measurable,\
    \ Attainable, Realistic, and Timely).\n    *   **S**pecific might mean that someone\
    \ writes a script that performs a specific task.\n\n    *   **M**easurable might\
    \ mean that you expect a blog post or an external certification on each item.\n\
    \n    *   **A**ttainable means that the employee can actually finish it (and that\
    \ you’re not saying “go write a replacement for macOS Server and get your CCIE\
    \ by Friday”).\n\n    *   **T**imely means that the goal can be completed in the\
    \ time allocated.\n\n*   Are you keeping a journal of professional development\
    \ activities? Professional means that this isn’t about hobbies but about work.\
    \ To me, the key word here is development. What is each person doing to make themselves\
    \ better? Hopefully these activities align with company goals, but they don’t\
    \ have to.\n\n*   What position do you see yourself in next? The best employees\
    \ are honest and say yours. But not everyone really wants that when they understand\
    \ what the field of jobs are in front of them. Many want to just go deeper and\
    \ deeper into the technology. Some want to follow the big paychecks in sales.\
    \ Others will honestly tell you that they want to start their own companies (but\
    \ most will lie and say they want to “just get better”—especially the ones with\
    \ MBAs). The point of this question is to track aligning the training and your\
    \ own goals for people with what the individual team members want.\n\n*   How\
    \ do you feel you’re tracking toward the next position? This is a great early\
    \ warning sign that people are tracking ahead of, or behind, their own schedule.\
    \ Keep in mind those shift as external motivators shift as well.\n\n*   Peer-coach\
    \ feedback: Once you get big enough, you can use a peer-coaching system to allow\
    \ team members to help one another. This allows you to spend more time reviewing\
    \ feedback while also allowing you to see how team members are dealing with limited\
    \ forms of leadership.\n\n*   Active research projects: Projects that are part\
    \ of SMART goals from earlier in the document. The best engineers often have the\
    \ most fun in this section.\n\n*   What progress has been made since the last\
    \ meeting? I like to think of this as version control. “What’s changed” is much\
    \ easier to read than every single line—especially when you have 20 to 30 to sift\
    \ through.\n\nOver time, the plans grow. This is bad. The more doctrine you introduce,\
    \ the less people will take away from their one-on-one and other meetings that\
    \ are meant to be about them. Keep training plans short, and only have enough\
    \ detail to be able to explain how targets were hit or missed. Keep in mind that\
    \ if targets are missed, then some small area of the plan you didn’t care about\
    \ is invariably to be blamed!"
