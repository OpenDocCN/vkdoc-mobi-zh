- fmt: '# Decide What Kind of PR Works Best for You


    You can spend tens of thousands of dollars per month on PR. You can also limit
    your PR expenditures to an email every day with a list of media outlets that are
    soliciting the community for quotes and respond to those you like when you have
    time. Most businesses invest in PR, advertising, and marketing when business is
    slow. If I could give you one piece of advice above all else, it’s to be deliberate.


    Being deliberate about how you approach business development allows you to be
    more opportunistic. You can usually find some really great deals on the things
    you have to spend money on if you understand your identity, your market, where
    you want to take your business, and, based on those, how you expend capital (be
    it political capital to garner attention, social capital to get people to repost,
    or actual cash to do everything else).


    A few examples of ways to get PR for your organization might include:


    - Getting quoted in an article about a topic you are an expert in

    - Getting a spot in a local news show

    - Getting an article you wrote placed in a newspaper or magazine

    - Writing blog posts on your behalf (I’m a writer so I don’t like people writing
    on my behalf)


    These items are usually free. What isn’t free is to have someone stay in constant
    contact with all of the media you think works with your customer base. But there
    are a lot of ways to do PR on the cheap. Before we get into some of those, let’s
    first talk about how not to become a pest and have people make filters that just
    delete all your e-mails.


    ## Local PR


    If you do managed services in a given geography, then there is likely a limited
    set of publications that serve that area. This will usually include large newspapers,
    local magazines, smaller periodicals that cover given neighborhoods, local websites,
    etc. These are some of the best people to make friends with. Not only are they
    often just really cool people, but they also provide some valuable insight from
    time to time when you’re talking to them. I find I learn as much as they often
    learn, just understanding things from new perspectives. Oh, and I guess it’s cool
    to be in their rolodex when they need a quote as well.


    Make friends with your local newspapers. You can often just read articles in those
    news outlets and easily find contact information, be it e-mail, Twitter, or carrier
    pigeon. As you might have guessed, I like to hang out with reporters in general.
    But they’re also great contacts to have in the PR world. Not only are they people
    to whom you can send information, but they also frequently have questions as they
    master enough of a subject to write about it.


    Some things to think about when doing PR:


    - **Understand the beat**: Each reporter will cover a specific beat, or a topic
    for the reporter to cover. If you send a technical story idea to someone that
    covers style, it’s likely to fall on deaf ears; however, if you send a story idea
    to someone that actually covers tech, then you might get further with a follow-up
    idea.

    - **Don’t spam the press**: People who write articles get a lot of e-mails and
    phone calls from people looking to get attention from the media. Try to be cognizant
    of this and only send timely and relevant information with a focus on industry
    or local trends—and keep in mind that most local press have a focus on home and
    small business, not highly technical or enterprise trends.

    - **When you send e-mails, don’t include attachments when possible**: It’s easy
    to tell people to respond if they’d like a photo or something else you might include
    in an e-mail attachment. E-mails with attachments are more likely to end up in
    a junk mail folder and fill up the receiver’s e-mail!

    - **Try to get a backlink to your website**: Doing so increases the page rank
    of your site and also increases the likelihood that people might reach out to
    you for goods or services.

    - **If you get a call about something, make sure to be up front when you don’t
    think you’re an expert in something**.


    ### Tip


    When you engage in philanthropic pursuits, don’t spend much time doing PR to them.
    Those should be done because you want to do good for the world, not for the sake
    of some cheap publicity.


    Once you have contacts, don’t squander those relationships. Like any relationship,
    nurture them. Be a resource, but when it comes to outgoing communications, think
    of how you would like to be communicated with if you were in their shoes. In addition
    to local contacts, there are a few ways to make national contacts. In the next
    section we’ll look at one way to do that, using the popular Haro website.


    ## Haro


    Haro is a website that connects people who write the news with people that want
    to be featured in the news. Reporters, bloggers, and others in the press can (and
    do) find quotes, examples, and stories for the projects they’re working on. Countless
    PR agencies around the world use Haro to monitor these requests and connect their
    customers to the writers and editors involved.


    As can be seen in Figure [8-1](#469405_1_En_8_Chapter.xhtml#Fig1), there are a
    number of inquiries sent daily. I usually recommend building a filter so you only
    see the ones that might be pertinent to your business. This means focusing on
    the content of the messages and looking for words like “Apple,” those containing
    various Apple products you consider yourself an expert on, “consulting,” or your
    local geography.


    ![../images/469405_1_En_8_Chapter/469405_1_En_8_Fig1_HTML.jpg](Images/469405_1_En_8_Fig1_HTML.jpg)


    Figure 8-1 – Inquiries sent to Haro


    The name of the game is speed. The quicker you can respond with a quote, the more
    likely it is to get used. Additionally, since there is a finite number of minutes
    in a day, focus on things that you can either use to bolster your credibility
    with local press and customers or those you believe might generate customer leads.
    Getting quoted by media just for the sake of doing so isn’t really worth the effort.


    Responding to requests for quotes is one thing, and as it’s easy to do, the value
    is often lost in the sheer volume of responses. Trying to get a story picked up
    by media outlets is quite another. In the next section we’ll look at press releases,
    a common way to passively post an alert to media, with the hopes that someone
    finds your post interesting enough to write about it. Before you get into press
    releases, keep in mind that you might have done a lot of work to prepare for something
    like a new initiative, but that doesn’t make it newsworthy.


    ## Press Releases


    A press release is a document that informs the press about an event. A software
    company might put out a press release that they’ve got a cool new feature. This
    is usually done in hope that a media outlet will pick it up and run with it. To
    be honest, I’m not a huge fan of press releases for local consulting firms that
    typically stick to a geographic area. The cost of running a press release on Newswire
    just isn’t worth it.


    Now, if you have a major event that a media outlet might find interesting, that’s
    a different story. Apple, as with many disruptors, is popular in the media. So
    if you release a service or acquire another firm and that is indicative of a trend,
    then that might be of interest to a local reporter. For example, let’s say you
    acquire a home automation firm so you can help make the most out of the spiffy
    new HomePod. That could lead to interest around the growing ubiquity of home automation.
    If you hire a second or third tech, that’s probably not newsworthy.


    Now that we have some basics about press releases, we can cover some quick tips
    to get you started.'
