- fmt: '# Conferences


    The first way to do conferences is to speak at them. If you have a company that
    provides support, services, or software, then you might be a great technical mind
    or thought leader in the industry. Speaking at conference gives you a way to build
    a personal brand, which contributes to the company brand, to make new contacts,
    to potentially meet new customers, and most importantly to give something back
    to the community.


    I have recently seen a couple of companies who attend conferences but don’t pay
    to be sponsors of the conference. One in particular tweets and posts on `Slack`
    channels to find them in their hot pink hoodies. I overheard a few traditional
    marketing professionals looking down on this, but I think it’s a great use of
    limited funds. Obviously, conferences need sponsors to keep the cost of tickets
    down, so not everyone can do this. But when you’re first starting out, I think
    it’s a great way to see what direction you can take your product or what kind
    of new customer leads you can dig up!


    It can cost thousands if not tens of thousands of dollars to sponsor a conference.
    Additionally, you need to have banners, things to give away, or maybe even large
    booths built out. This is definitely not for the newest of businesses without
    a good plan for how to close potential leads (and what a good lead looks like
    for your business).


    Officially sponsoring conferences comes with a number of benefits, including:


    - Most conferences include a badge scanner, so you can get an export of all the
    people you speak to.

    - A full contact list is made available at some conferences. This is becoming
    rarer and rarer but, when made available, includes personally identifiable information
    about attendees.

    - Most conferences will come with a table that needs to have someone from your
    organization working it. Make sure to plan for bathroom breaks and the like, so
    you may potentially want to send two people. I like sending a product manager,
    someone from marketing, and/or someone from support, according to which conference
    and the type of customers you’re looking to work with.

    - Your logo in bright lights: OK, bright lights are obnoxious. You should be treated
    equally with other sponsors of the conference. But you will want a roll-up banner,
    a screen on a tripod, or some kind of way for people to find you. To attract people
    to your table or booth, at a minimum, bring a tablecloth for your table and some
    signage, with a consistent brand.

    - Potential sessions about your product or service: You’ll need to develop a presentation
    that conference-goers want to watch. This shouldn’t be a blatant sales pitch;
    instead, it should be about a topic that is timely and relevant to conference
    goers. You want to educate attendees. That has by far been the best strategy,
    as with blogs and other forms of marketing materials.

    - `Swag`: No, the benefit isn’t that you get to bring home swag. The benefit is
    that you get to give swag away. Check into the ability to put swag into bags.
    Build one-page sheets with a clear `CTA`. While your presentations shouldn’t be
    a blatant sales pitch, your leave-behinds should be.

    - Potentially sponsoring additional events at the conference: Think of unique
    ideas. A hackathon, capture the flag, puzzles, scavenger hunts, and other innovative
    ideas can make the conference more fun for some and get conference-goers mingling
    with vendors.

    - After-parties: Yes, there ain’t no party like the after-party. Most conferences
    are happy to let a sponsor take on a party after the event. This allows sponsors
    to get some additional branding, have a larger number of people mingle with conference-goers,
    and, of course, join in libations. Do be careful to keep things pretty calm and
    always do these events in public places so as not to take on too much liability.

    - Learning from others: I already said that taking a product manager to a conference
    is a good idea. But one of the things you want to do at conferences is continue
    evaluating the offers that you built in the beginning of the book, iterate those
    offers if needed, build new offers if appropriate, and learn how the offers resonate
    with potential customers. A stream of people coming up to your booth are likely
    to be very happy to provide plenty of feedback.


    Before you sign up, make sure you know who will be working the booth, who will
    be speaking, what kind of presentation will keep people in the room (because food
    is usually way better than a vendor talk), etc. Think about all of the benefits
    of supporting the conference, and plan on lots of fun both during the day and
    in the evening!


    While you’re working a booth, make sure to ask people for cards or scan their
    badges. Then, once you get home, the real work begins. Converting leads from conferences
    into sales is critical in order to justify the cost of going. This includes e-mailing
    the contacts you made, calling them, and maybe even going out to visit them, once
    you’ve made contact. Keep conversations going. Even if they don’t need your services,
    they might have other contacts in the industry who do (or will). Make sure to
    then touch base every now and then, even if they don’t need anyone now (I love
    using “flag for follow-up” types of features for such things).


    Finally, don’t take on more than you can chew. Only do what you know you can be
    successful at. This way, you won’t have a mediocre moment where you end up getting
    bad press or social feedback because something wasn’t taken care of holistically.


    # Conclusion


    There are more ways to market than just taking ads out on the radio and newspapers.
    These days there is probably an endless number of ways that you can work the system
    to get a message out to people. And passive marketing is where your message gets
    battle-hardened and made more scalable.


    I don’t personally think you should ever outgrow guerrilla marketing. If you look
    at Mailchimp and what they do with their extra `Twitter` accounts, you will likely
    agree. But some tactics will be frowned upon at a larger size. And so you will
    likely change tactics here and there as you get more mature, or just bigger (given
    that the two aren’t mutually exclusive).


    Some ways you might know that you’ve outgrown a given tactic include:


    - You become an industry leader. Industry leaders should help organize and run
    conferences, not attend for free and hand out business cards.

    - You can’t use your budget fast enough on guerrilla events. If you’re spending
    too much time and not getting enough lift for that time, then it’s time to re-evaluate
    the strategy. An easy sign of this is that you have money left over from that
    budget every quarter. At this point, it’s time to look at larger spends, like
    `PR`, traditional advertising, etc.

    - The return on investment (`ROI`) isn’t there. How much does it cost to hire
    your sales and marketing team? What’s the `ROI` from each event? Is the `ROI`
    greater than what it cost you to run the event?


    Ultimately, guerrilla marketing is primarily considered a boot-strapper’s paradise.
    As you grow, your expectations change and the impact of smaller events lessens.
    But you should always make sure to have your personality in events and run smaller
    events to appeal to smaller organizations or just to inexpensively remind existing
    customers you still love them!


    Finally, don’t give up. Just because a technique doesn’t work doesn’t mean it
    can’t work. Instead, you are likely to find success in a different venue, at a
    different time, with different resources, or with a different audience. Don’t
    throw good money after bad, but do find out why an initiative didn’t work and
    don’t just write off a whole area of marketing because it didn’t work out “that
    one time.” Start with small spends and grow into it. That way you can iterate
    into a situation that isn’t a monumental waste of time, money, and resources.'
