    \ The next thing you know, you can easily forget to take care of yourself. You\
    \ end up getting sick, performing poorly due to fatigue, and ultimately getting\
    \ even busier due to craptastic performance.\n\nGetting sick doesn’t end up doing\
    \ anyone any good. And persisting on long-term fatigue can have devastating results\
    \ on not only your health, but friendships and family as well.\n\nBut we can’t\
    \ always control the work–life balance. Or can we? What are some things we can\
    \ do to stay well, both mentally and physically?\n\n*   **Time tracking** : There\
    \ are courses and methodologies and books. You don’t have to buy one, but it’s\
    \ never a bad idea to get some form of time-tracking and organization going.\n\
    \n**Pro tip** Start as simple as you can, and move to other, more mature business\
    \ systems as you grow into them!\n\n*   **Exercise** : When we get busy, one of\
    \ the easiest things to let go of is our exercise routines. Maybe others see the\
    \ time we spend at the gym as an indulgence, or maybe 8 hours on a flight isn’t\
    \ conducive to a quick run. But not letting go gives us better self-esteem, makes\
    \ us more resilient, and gives us time to let our brains relax away from it all,\
    \ so those creative juices can get to flowing!\n\n*   **Eat healthily** : Exercise\
    \ is part of a healthy lifestyle, but eating properly is critical as well. We\
    \ all need plenty of calories and a healthy mix of foods. Stay away from fast\
    \ food and enjoy the art of cooking whenever possible.\n\n*   **Get** **help from\
    \ others** : When you’re spinning your wheels, reach out to others for help. No\
    \ one expects us to be perfect, so we can admit it when we aren’t and accept help\
    \ when we need it!\n\n*   **Automate** **more** : If you have to touch a piece\
    \ of paper or perform a manual task, search an App Store to see if that task can\
    \ be moved to an automation on a device. And if you have a bunch of apps that\
    \ you have to manually move data between, look for whether or not you can automate\
    \ that process as well!\n\n*   **Subscribe to the** **Morning E-mails** : I like\
    \ getting business reports in the morning. They set my tone for the day. Build\
    \ reports and have them sent to you so you can stay on top of trends. Avoid bad\
    \ knee-jerk reactions based on crappy sales or delivery in a given day and focus\
    \ most on the trends in front of you.\n\n*   **Wake up to the day’s most important**\
    \ **news** : The 24-hour news cycle can destroy you. Limit what you read and access\
    \ and isolate what actually matters to you.\n    *   Top of Form\n\n*   Bottom\
    \ of Form\n\n*   **Hire more** **people** : I know, I know, we all get to a point\
    \ where we just feel overworked all the time. If that goes on for too long, we\
    \ have to accept the fact that being overburdened isn’t going anywhere and we\
    \ need to bring in more humans.\n\n*   **Be diligent about building a better**\
    \ **mousetrap** : Is there waste in your day? Are there processes that, with a\
    \ small tweak, would be able to be more efficient? Can you remove steps without\
    \ removing quality? I like to set a quarterly or monthly task for myself to think\
    \ about how I can do better at all things!\n\n*   **Learn to say no** : Early\
    \ on in our careers, we tend to say yes to more things than we need to. But as\
    \ we progress, there are a number of things that we no longer enjoy or take any\
    \ benefit from. We still want to help our communities and stay involved in a lot\
    \ of things, but ultimately, we have to learn to say no here and there in order\
    \ to maintain our own sanity.\n\nIf you’re so busy you can’t take care of yourself,\
    \ just stop making yourself so busy. It’s never too early to get started. Life\
    \ is too short. I hope one or more of these tips help to spark an idea that saves\
    \ you time and money and makes your life just a little bit better.\n\n## Research\
    \ What Should Be in an Offer\n\nYou’ve decided to start a company! There are few\
    \ finer things to do in this world, and few more frustrating. Before you can start\
    \ selling stuff, you need to know exactly what it is you are selling, and exactly\
    \ how much to charge for it. In the beginning, you can be the person who does\
    \ computer stuff. But if you want to grow (and be happy while doing so), then\
    \ you’ll need to draw lines between what you will do and what you will not do.\
    \ Or, more to the point, what you would prefer to spend your time doing, which\
    \ is often to chase profitable long-term contracts.\n\nAs we’ll show in Chapter\
    \ [13](#469405_1_En_13_Chapter.xhtml), those long-term contracts build more value\
    \ for the company than anything else you can do. Long-term contracts also give\
    \ you a more scalable business model to allow for building strong teams with long-term\
    \ career potentials, without the fear of bankruptcy. Support contracts come in\
    \ a lot of different flavors, though. Let’s look at a few these can easily include:\n\
    \n*   **Hourly support** : As the name implies, customers pay you hourly to do\
    \ work for them. You can grow a business and make a lot of money doing so. But\
    \ you will always have a direct correlation between the cost to deliver a service\
    \ and the profit you can make off that service.\n\n*   **Retainer-based support**\
    \ : You are paid to deliver a certain number of hours per month, on retainer.\
    \ These usually come with either an expiration date or roll through to the end\
    \ of a contract. Retainer customers should receive prioritization over hourly\
    \ support customers to provide hourly support customers with a reason to upgrade\
    \ to retainer programs, but without making them feel like second-class customers.\n\
    \n*   **Managed services** : You are paid to deliver an unlimited amount of services\
    \ in exchange for a fixed fee every month, usually billed on a per-user or per-device\
    \ basis. For smaller customers, the offering can include cloud mail, storage,\
    \ backup, and more as well.\n\n*   **Hybrid approaches** : I’ve seen a pretty\
    \ substantial number of companies out there that are afraid of allowing for unlimited\
    \ support. For example, many will provide an unlimited amount of help desk services\
    \ for a set price. Some go further and include a few hours a month of onsite work.\
    \ These hybrid approaches are a good temporary fix for customers wanting a fixed\
    \ price for all of their service needs. Unless done really well, they don’t usually\
    \ scale to a lot of consultants, due to operations costs caused by having too\
    \ many ways to bill customers.\n\n*   **Fixed-fee projects** : Most companies\
    \ that offer any of the above services will also provide project-based support\
    \ as well. These projects fill the gaps that can’t be accounted for in a purely\
    \ managed services business. If you deliver managed services and do not yet do\
    \ project-based work, then you will need to find a partner to deliver those services,\
    \ or the companies who do come in to do those projects might end up carving out\
    \ parts of the business from your hard-won customers.\n\n*   **Managed Leases**\
    \ : This is really just Managed Services with a lease to the hardware (and maybe\
    \ software and insurance) tacked on so that those in charge of running IT can\
    \ be proactive with budgeting.\n\nI tried to list these in order of complexity.\
    \ Standard hourly support is the first and simplest to deliver; there’s no commitment\
    \ from either party. As you get later in the list, the relationship becomes more\
    \ complex. As relationships become more complex, customers are often required\
    \ to sign annual or multi-year contracts. And of course, the longer the term,\
    \ the less a contract costs and the more prices are fixed against inflation."
