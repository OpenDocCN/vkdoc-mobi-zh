- fmt: '# Radio Advertising


    Advertising on the radio is a lot like advertising on podcasts, but it’s your
    parents who will hear the ad, not your kids. This isn’t to say that you shouldn’t
    advertise on the radio. It’s a great way to reach decision makers. But think about
    this before you choose radio over podcasts: does the person who calls you listen
    to a podcast on the way home from work, or do they listen to the radio? If you
    think your customers (or potential customers) listen to specific radio programs,
    then you should certainly sponsor programs or pay for ad space.


    If you do work with radio, don’t buy just one spot on the radio. When buying radio
    advertising, make sure to buy at least three slots per time. So if you choose
    to sponsor `Marketplace` on `NPR`, sponsor it at least three times. Think about
    it similarly to having to put new foods in front of your kids three times before
    they will actually eat something new. If you are going to sponsor multiple programs,
    time them out so you can best understand which program is driving new customers.
    And make sure to have a landing page that you mention in your spot, like “Get
    a free evaluation of your network by the best consultants in Baltimore at `mygreatconsultants.com/marketplace`.”


    Radio advertising isn’t cheap. And it’s hard to get quantifiable metrics on “dark
    social” like radio. So if it’s a challenge to work with, why is the medium still
    around? Because it still works for certain industries. If you have a limited budget,
    focus on online advertising. If you have money left over, then look at mediums
    like radio and print. The nice thing about radio advertising is that a lot of
    people who work in businesses are trapped in their cars while getting to and from
    work, and repetitive brainwashing to a captive audience like that will over time
    build brand awareness.


    # Print Advertising


    One of the hardest types of advertising to get right is print advertising. If
    you don’t run a brick and mortar store that sells Apple equipment or peripherals
    then you might want to stay clear of print advertising. Having said that, a mass
    mailer is a way to get the word out about your business. Just expect a large percentage
    to go into the trash.


    There are exceptions when it comes to print advertising. An invitation to an open
    house is a great way for a support company that operates in a community to make
    contacts. The invitation idea can be extended to a movie night or other marketing
    event. Another exception would be after you meet someone in person. A thank you
    card is a great way to remind them that you’d like a chance to win their business,
    especially if that card is handwritten.


    ## Tip


    I went to finishing school in the South. So I feel the need to tell you that thank
    you cards must be sent within 6 months or not at all.


    Finally, have your print advertising professionally prepared. Or if you think
    you can do professional-quality ads, just have someone look it over before you
    send it out.


    # Coupons, Sales, and Specials


    Apple pretty much doesn’t ever offer coupons off the cost of a product. But you’re
    not Apple. If you’re flush with new customers, then there’s never really a reason
    to offer discounts. But if you’re just getting started out or building out a new
    company, then you might find it useful to get a few new customers by offering
    some kind of a public-facing discount.


    According to the type of work you do, you might find `Groupon` or `Amazon Deals`
    fit the need of landing you some pretty sweet new clients. The conversion rates
    on those are low. There also aren’t many companies that leverage those types of
    sites for business services, so assume a primarily consumer customer.


    To get into larger businesses, you might try offering a discount on an annual
    contract instead. But consider using an ad in a business journal, print advertising,
    banner ads on a site, or even a listing for a journal. Again, use a special `URL`
    for each medium you choose to advertise on, so you can easily track the impact
    in a number of different ways. This is key. Let’s say you get hundreds of clicks
    on your ad but no transactions. That usually means the messaging or price is off.
    The same can happen with getting the wrong types of phone calls if you put a phone
    number in a listing, which we’ll cover in the next section.


    # The Wrong Calls


    One problem that can arise with advertising is that you might have the phone and
    e-mail lighting up, but they might all want something totally different than what
    you’re selling. When this happens, you have a few options. If all of the people
    calling want the same thing, then you might choose to go ahead and offer that.
    But if they’re not, you’ll likely want to tailor your message to get more specific
    about what you do. This is a great problem to have but something you’ll want to
    fix pretty quickly so as not to waste more time than you or sellers at your organization
    have to give.


    Make sure to respond to every person who reaches out. For starters, it’s the right
    thing to do. But if that’s not enough, if you don’t respond, you’ll be making
    a bad impression on someone that might be a potential customer some day. Normally,
    the wrong calls are very similar. So to simplify your response, use a tool like
    `Text Expander` or create an e-mail in your drafts to automatically respond to
    these requests. This is a great place to find a vendor to which you can redirect
    these inquiries. We talked about forming relationships with other organizations
    in Chapter `[6](#469405_1_En_6_Chapter.xhtml)`; this is a great opportunity to
    have another vendor to which you can bilaterally refer business.


    # Marketing Development Funds


    Chances are that you sell products or align with a partner. Many of the largest
    tech companies like `Microsoft`, `Cisco`, and `Apple` provide something known
    as Marketing Development Funds (or `MDF`) for those who sell their products. Ask
    all of your partners if you can get `MDF` for a campaign, and you may get all
    or part of the campaign paid for. Additionally, co-marketing with a larger company
    can increase the legitimacy of the campaign in ways you couldn’t do on your own.


    Most `MDF` will come with strings. Maybe the partner wants to attend an event
    with you. Maybe the partner wants a business plan. I’ve yet to see strings that
    were attached to `MDF` that I didn’t eventually find to actually be as valuable
    as the funds themselves. Business plans make you think about a campaign before
    you waste money. Sometimes the structure required helps you think of things in
    a new way. Having marketing staff from a partner attend an event with you is always
    a good thing. You can learn more about the product, and if they’re sales staff,
    you might even find a great person to refer you some business.


    There are no sure things in advertising so there’s always risk. `MDF` can be a
    great way to share the risk of a campaign and learn more about advertising and
    marketing along the way. It’s all these little bits that make you into a mature
    businessperson.'
