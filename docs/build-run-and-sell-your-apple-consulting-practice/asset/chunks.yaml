    ## 延伸阅读


    - 《高效启动的艺术》，作者：盖伊·川崎 [`https://www.amazon.com/Art-Start-2-0-Time-Tested-Battle-Hardened/dp/1591847842`](https://www.amazon.com/Art-Start-2-0-Time-Tested-Battle-Hardened/dp/1591847842)

    - 《逃离速度》，作者：杰弗里·摩尔 [`https://www.amazon.com/Escape-Velocity-Free-Companys-Future/dp/0062040898`](https://www.amazon.com/Escape-Velocity-Free-Companys-Future/dp/0062040898)

    - 《龙卷风内部》，作者：杰弗里·摩尔 [`https://www.amazon.com/Inside-Tornado-Strategies-Developing-Hypergrowth/dp/0060745819`](https://www.amazon.com/Inside-Tornado-Strategies-Developing-Hypergrowth/dp/0060745819)

    - 《初创公司 CEO》，作者：马特·布隆伯格 [`https://www.amazon.com/Startup-CEO-Scaling-Business-Website/dp/1118548361`](https://www.amazon.com/Startup-CEO-Scaling-Business-Website/dp/1118548361)

    - 《精益创业》，作者：埃里克·莱斯 [`https://www.amazon.com/Lean-Startup-Innovation-Successful-Businesses-ebook/dp/B005PR422K`](https://www.amazon.com/Lean-Startup-Innovation-Successful-Businesses-ebook/dp/B005PR422K)

    - 《勇敢的冷启动：如何在没有风险投资的情况下发展全球科技业务》，作者：萨拉·J·佩里 [`https://www.amazon.com/Brave-Bootstrapping-Global-Business-Without-ebook/dp/B07BD4TL6Z`](https://www.amazon.com/Brave-Bootstrapping-Global-Business-Without-ebook/dp/B07BD4TL6Z)

    - 《设计突破性产品》，作者：罗伯托·韦尔甘蒂 [`https://www.amazon.com/Designing-Breakthrough-Products-Harvard-Business/dp/B005UF57RQ`](https://www.amazon.com/Designing-Breakthrough-Products-Harvard-Business/dp/B005UF57RQ)

    - 《蓝海战略》，作者：W. 钱·金和勒妮·莫博涅 [`https://www.amazon.com/Blue-Ocean-Strategy-Expanded-Uncontested/dp/1625274491`](https://www.amazon.com/Blue-Ocean-Strategy-Expanded-Uncontested/dp/1625274491)

    - 《从 0 到 1：开启创业与未来的秘密》，作者：彼得·蒂尔 [`https://www.amazon.com/Zero-One-Notes-Startups-Future/dp/0804139296`](https://www.amazon.com/Zero-One-Notes-Startups-Future/dp/0804139296)

    - 《初创企业用户手册》，作者：史蒂夫·布兰克 [`https://www.amazon.com/Startup-Owners-Manual-Step-Step-ebook/dp/B009UMTMKS`](https://www.amazon.com/Startup-Owners-Manual-Step-Step-ebook/dp/B009UMTMKS)

    - 《涌现：蚂蚁、大脑、城市和软件的互联生活》，作者：史蒂文·约翰逊 [`https://www.amazon.com/Emergence-Connected-Brains-Cities-Software/dp/0684868768`](https://www.amazon.com/Emergence-Connected-Brains-Cities-Software/dp/0684868768)


    # 2. 超越服务


    曾几何时，一家 IT 咨询公司需要储备硬件库存，例如内存条。工程师们通过销售并安装这些内存条来加快电脑速度，从而为客户创造更多价值，并延长与客户的合作时间。虽然我们现在很少为大多数电脑（尤其是苹果电脑）安装内存，但这却是一个很好的范例：既能让雇佣你的人生活更便利，又能额外赚点利润。不妨考虑一下附加额外的云服务，比如数据备份。并专注于那些能让支持系统更好用，或者在出现问题时让你更省心的事情。


    同时也要留意竞争。我曾有一个客户解雇了我们公司，因为我们向他们出售了一台打印机，而他们随后在网上其他地方找到了便宜 30 美元的同款打印机。最糟糕的是，我相当肯定我们出售那台打印机本身就已经亏本了。你永远不可能以比任何人都低的价格出售你卖的大部分东西。但你可以尝试与某个供应商达成协议，让他们为你提供比所有可能的硬件销售总和更有价值的客户推荐。


    话虽如此，如果你将商品和服务打包在一起提供，那么客户就可以通过一张采购订单同时获得两者，一次性完成交易，最终拥有更好的体验。在本章中，我们将探讨利用第三方产品的各种方法，这些方法有助于扩大你在客户中的影响力，将客户引入一个标准化（因此也更容易维护）的环境，并让客户更满意，这意味着更多的口碑推荐业务（在我看来这是最好的业务类型）。


    ### 注意


    如果你只是兼职做咨询，我强烈建议你不要向客户销售或转售任何东西。


    ## 经销商账户


    你听说过英迈国际或 TechData 吗？它们是分销商，或者说总代理商。如果你打算销售各种硬件和软件，你很可能需要与这些分销商中的一家或两家建立账户关系。你也可以选择与
    Synnex、Avnet、Arrow、Jabil 或 CDW 等公司合作。很可能，当你要购买硬件和软件并销售给客户时，你会发现需要建立多种不同的关系。这些关系将超越分销商，直接延伸到其他供应商。


    ### 注意


    申请经销商账户通常伴随着对企业信用的审查。如果你正从银行获取融资，请注意不要过度透支你的信用，也不要让信用审查次数过多。


    根据你想要打造的公司的类型，考虑向客户提供以下生态系统：


    - **云解决方案**：我们将在本章详细讨论这一点。

    - **硬件和软件**：我们也会在本章后面讨论销售硬件和软件。

    - **带宽**：如果你要销售带宽，请准备一家电信运营商和一家有线电视运营商的选项，并让他们相互竞争，以便为每个客户争取最优价格。你所在地区会有各自的本地供应商，因此可以直接联系他们。联系时，别忘了询问他们是否能向你推荐业务。

    - **基础设施服务**：这包括监控、备份、网络（无线、交换机等）和电话。是的，我提到了电话。


    除了构建一个能满足所有客户需求的全方位服务产品组合之外，还要考虑其他因素。这些因素包括：


    - **你能从这些公司获得什么样的付款条件？** 考虑一下你需要多长时间来支付他们款项，以便确定要与你的客户签订什么样的付款条件。

    - **采购流程是怎样的？** 你需要一个简单流畅的采购流程，最好是拥有一个网络门户以及授权/支持电话号码。如果你需要注册交易才能获得额外折扣，那么你也希望该流程能在线上完成。

    - **退货流程是怎样的？** 一件有问题的设备退货可能会浪费大量时间。在开始销售之前，就要弄清楚供应商如何处理退货，以及每次退货会耗费你多少时间。

    - **你能赚多少钱？** 我把这个问题留到最后，因为正如你可能从本书中领会到的，我认为大部分这些东西的经济利益都是辅助性的。重要的是客户满意度等等。但是，如果你会亏损，或者赚不到足以使其可行的利润，那就不要销售。相反，在这种情况下，要与那些能为你提供良好推荐利益的组织建立关系。


    归根结底，如果你方法不当，销售东西可能会很糟糕。但是，根据你业务的性质，你也可能从销售中获得一笔非常可观的额外收入。在开始销售之前，务必小心谨慎，确保你了解自己在做什么，以及销售行为带来的税务/会计方面的影响。

