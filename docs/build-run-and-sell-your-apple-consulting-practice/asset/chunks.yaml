    then review what packages they have and pick one that fits your business model.
    Referrals are best when looking for an agent, but searching for “errors and omissions
    insurance coverage” (E&O) or “professional liability insurance” is likely to net
    a ton of potential sources for a policy.


    In the beginning, your policy can be modest. Growth usually means that your policy
    will have to get bigger. Each new customer brings with them the risk of potentially
    requiring more insurance than you already have. As new customers come with additional
    E&O coverage, you can look at the cost to acquire an upgraded policy.


    Here’s the most important thing about E&O. You will want a “Terms of Service”
    or some agreement with customers that governs how you work with them. In that
    agreement you will want to cap any damages they can pursue you for to be equal
    to the amount of money you have in your E&O policy. This protects you from the
    potential gap that you would have to pay in the event that you were sued and didn’t
    have enough coverage to pay out the amount in a suit, which would then come out
    of your or your business’ pocket.


    ## Cash Flow


    Finally, let’s talk about cash flow. You should always have enough cash to pay
    your staff and other expenses for 6 months. Otherwise don’t hire staff. In some
    countries, not having enough cash flow to run the organization for a period of
    time is a criminal offense. Don’t forget to consider rent, HR, taxes, legal, etc.
    in this equation.


    Now, what happens when you have more than 6 months of operating capital? If you
    have enough to run the place for 10 years, then you aren’t properly deploying
    your capital. If you want to stay a small company then you should be investing
    that money. This isn’t investment advice, but if you are living (or running the
    company) in way that provides positive cash flow for a while then you should find
    financial advice. And that advice might be to grow the company or according to
    the cost of cash at the time, to leverage debt to grow the company. Or if according
    to what you want out of life and the company and everything, then your investment
    advisor might tell you to do something different with it. But don’t keep it in
    a checking account!


    ## Conclusion


    Knowing the basics of accounting is an important skill. One of the most important
    hires you’ll make is an accountant. And there’s a strong likelihood that you’ll
    need at least two. As you grow maybe an accounts receivable and/or accounts payable
    person on staff. But you need to know enough to properly manage them all.


    Whatever you do, don’t go your own way. Listen to their advice. Maybe seek a second
    opinion at times, but never think you know more than Generally Acceptable Account
    Practices (GAAPs) and try to make up your own accounting rules. You can also outsource
    a Chief Financial Officer to help you best understand how to manage your tax professional
    and your day-to-day accounting team. Make sure to stay on top of quarterly tax
    payments (obviously your mileage may vary here, according to your country).


    Finally, learning about accounting and finance is learning about business. Managing
    costs, managing receivables, managing cash flow, managing revenue recognition,
    etc., these are what makes for a savvy business owner. You may get to the point
    where you don’t want to do much of it any more. And that may indicate that you’ve
    outgrown your comfort zone. But once you have enough income to hire a second person,
    it’s time to start learning a lot about business, even if you only have time to
    listen to some of the books in the Further Reading section of this chapter, or
    others that are similar.'
