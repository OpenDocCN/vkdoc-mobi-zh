- fmt: '# Inspiring Employees to Learn


    There’s a conversation I’ve had many times. It starts off with people telling
    me they want more training. As education is one of the things I value most, my
    response, when possible, is an emphatic yes. But then something funny almost invariably
    happens: nothing. Giving staff approval to do training doesn’t usually mean that
    they’ll do it unless you follow up routinely and sometimes micromanage the process.


    The alternative is often to allow team members to become increasingly dissatisfied
    with their jobs. Why, and how do we fix it? There’s not a single answer. There
    are a few different reasons that should have their own reactions to keep people
    happy and motivated. Let’s explore some.


    - The employee doesn’t know what kind of training they want. This is usually just
    the first step. But the answer can be as simple as saying, “Give me three or four
    ideas of what you want to do this year,” or creating an individual learning plan
    (or an official program around learning plans). Here, the most important aspect
    is what goal are you training toward. For someone new in the position they are
    currently in, you usually want to provide training that makes them well-rounded
    at the current position and therefore much more confident in their position. For
    those who are more tenured in a position, explore what the next position they
    want is and look to close any gaps in skills to get there.


    - The employee’s goals don’t match team goals. We frequently lay out a training
    program without considering what people actually want out of a program. Ask people
    where they want their training, don’t just assume where they want to be. Use surveys
    and manager feedback from one-on-ones to figure out exactly what your teams want
    out of a program instead of being prescriptive without first doing due diligence.


    - The employee knows that they want to learn but doesn’t have time to get there.
    This is perhaps my favorite issue to solve. You can earmark a specific amount
    of time per week for training. The hard part is that you have to firewall that
    time off so that employees can’t be pulled off of their training regimen in order
    to do other tasks the organization needs, or if they are, you need to guard that
    time.


    - There’s no budget for training. Not all training costs $5,000 per week, per
    employee. You can usually get custom courses (even with vendor-led certification
    courses) that can cost a fraction of that if you have enough people. There’s also
    podcasts, books, the Internet, and pretty much an unlimited amount of training
    that can be had freely. One technique I’ve used is to cover all certification
    books and tests and allow employees to study on their own time. If you have official
    curriculum, make sure people feel comfortable signing up and taking it. This is
    often material created by an organization and so comes at no cost to your teams
    and helps your team stay abreast of the organizational position/philosophy on
    given topics.


    - Employees don’t learn using the techniques we are using to teach. Some people
    can’t learn in a classroom, others can’t do self-paced, others still need exercise-
    or goal-oriented training (such as writing a program that does a specific task).
    Make sure you’re on top of how people are responding and that you’re flexible
    to allow people to learn in the ways they need to learn, not just in the ways
    you think they want to learn.


    Finally, a reason people don’t do training is that they honestly don’t think they
    need any training. Maybe they have a new family or a sick parent or just want
    to ride their bike every night after work. Not everyone is going to drive to the
    top of the organization or to the next job. Many want the security of settling
    into a position they’re in. As leaders, it’s our job to keep our employees from
    having skills that are out of date, though, so we need to stay on top of getting
    employees all of the resources they need to be the best at their position, this
    year, next year, and so on.


    Sometimes, 100 percent is enough though. We can overemphasize the need to drive
    people into their next position. Push, just don’t push too hard. It takes more
    of a manager’s time to get to the bottom of how to help each person on the team,
    but it’s totally worth it.'
