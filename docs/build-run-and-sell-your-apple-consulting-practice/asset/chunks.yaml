- fmt: "### Note\n\nKeep in mind that it’s awesome when one of these integrates with\
    \ your ticket management system to make it as easy as possible for your teams\
    \ to keep track of their time).\n\nA typical onboarding plan might include the\
    \ following:\n\n* **Week 1**\n    * Sign contracts, such as non-compete agreements,\
    \ acceptable use policies, etc. (unless this is handled prior to the first day).\n\
    \    * Review the mission, vision, and values of the organization. We don’t really\
    \ talk about those in this book, as they’re too often given more pages than they’re\
    \ worth, but while you might not have codified these, you should have a conversation\
    \ about them with new employees so the company DNA continues on as you intend.\n\
    \    * Write a bio for the company website. This lets your customers know a little\
    \ bit about this new, untested person that will be showing up at their location.\
    \ Include a photo when possible.\n    * Fill out all required HR paperwork, such\
    \ as W2 forms, health insurance sign-up, etc. I really don’t like it when employees\
    \ are expected to do this on their own time, as it sets a bad precedent.\n   \
    \ * Perform a number of ride-alongs with more senior engineers (or you, if it’s\
    \ your first hire).\n    * Take service desk calls. I firmly believe that everyone\
    \ in a consulting firm should spend some time on the service desk. It connects\
    \ staff to the widest possible variety of customers and communicates a subtle\
    \ message about the division of labor at the organization.\n\n* **30 Days**\n\
    \    * Define when you want someone taking jobs on their own. This is important,\
    \ as people understand how they’re tracking toward your expectations in regards\
    \ to customer engagement.\n    * Get expense reports in, and on time. Review any\
    \ issues with expenses, mileage, etc.\n    * Close tickets quickly and with good\
    \ details. Review good ticket entries and those that might be lacking.\n    *\
    \ Potentially achieve various technical certifications.\n\n* **60 Days**\n\nI\
    \ like to include quantifiable and qualifiable feedback on employees here, such\
    \ as:\n    * A percentage toward a potential billing quota. Again, make sure that\
    \ staff understand how they are tracking toward your expectations.\n    * A customer\
    \ satisfaction score. This helps employees understand how customers perceive them.\
    \ If you don’t yet have a means to track customer satisfaction, then I highly\
    \ recommend you explore one of the bevvy of survey sites out there on the Internet,\
    \ with a focus on any that might integrate with your incident tracking system.\n\
    \    * Generating internal assets, such as knowledge bases, blog posts, customer\
    \ advisories, etc.\n    * Mastery of internal systems, such as ticketing, knowledge\
    \ bases, etc.\n\nAfter that 60-day milestone, you should be able to sit down with\
    \ employees and work out a long-term, more customized plan whereby they’re able\
    \ to find their specialty in the industry and work toward more specific goals\
    \ for what they want out of the job, their career, and how that lines up with\
    \ life in general.\n\nEach time you hire, iterate that checklist so you can get\
    \ a little better at getting each new employee up to speed. Some things to look\
    \ for include the following:\n\n* How are employees tracking toward the time you\
    \ assumed it would take to achieve various milestones?\n* What did each employee\
    \ find difficult to understand?\n* What processes did you need to teach that you\
    \ hadn’t previously documented?\n* What can you document rather than talk through,\
    \ so there’s no possible misunderstanding about processes and procedures?\n\n\
    Being disciplined about the onboarding process will help immensely when you have\
    \ to bring on multiple people at the same time during future growth spurts. Eventually\
    \ I’d built too much doctrine in a program I once created called Year One (yes,\
    \ blatantly stolen from Batman) and had to re-evaluate the entire program. That’s\
    \ part of creation and destruction.\n\n## Wikis for Onboarding\n\nMany of us use\
    \ wiki-style solutions, or portals for building out onboarding documentation.\
    \ Tools like Confluence, Sharepoint sites, Google Docs strung together, or other\
    \ alternatives increasingly help organizations communicate standard operating\
    \ procedures, complex thoughts, notes from meetings, and any other information\
    \ that the organization needs to store.\n\nAs sites grow, they get messy. Style,\
    \ consistency, flow, structure, and guidelines become a bit more important, as\
    \ do things like grammar. There are a ton of things you can do to make your pages\
    \ better, without adding fireworks and animations. Let’s look at some of the big\
    \ ones I’ve found over the years:\n\n* Don’t bury the lede. Add an introduction\
    \ to any page that’s over 500 words.\n* Use different header levels. I like to\
    \ start most documents with an outline. That outline becomes headers, and sometimes\
    \ the introduction of a given paragraph. Doing so also allows you to build those\
    \ headers before you start typing into your document.\n* Use a Table of Contents.\
    \ Not every page is going to need a Table of Contents. But if you can’t see all\
    \ of the headers on a page, I would recommend making browsing through a given\
    \ page easier.\n* Spelling and grammar counts. Yes, I know, you got your point\
    \ across to most with that brilliantly built page. But many were lost for a bit\
    \ trying to overlook that blatant “their vs. there” or the 5-line sentence that\
    \ had 16 comas in it, or was that commas… Internal documents at your organizations\
    \ might not need to be perfect, but it helps make you look more intelligent, while\
    \ not losing any of your readers along the way. Also, use a consistent actor and\
    \ tense throughout a document; otherwise, most of us get confused after a while.\n\
    * Add section breaks. You know those cute little horizontal lines in your text.\
    \ They help a reader to understand when jumping between two sections. Alternatively,\
    \ consider different page structures. But I’ve rarely seen cases where two-columned\
    \ pages (or more) shouldn’t just be separate pages.\n* Bold things, but not too\
    \ many things. I like to use bold for emphasis. After all, that’s what it’s there\
    \ for. I don’t use all-capped items EVER, unless the article contains an acronym\
    \ (then I define the acronym and put it in parenthesis afterward the first time\
    \ it’s used) or the item is capped in a screenshot that I’m quoting. When listing\
    \ acronyms, there’s no need for periods between letters.\n* When documenting software,\
    \ quote items on a screen. For example, if the screen says “Click here to start”\
    \ and you have a sentence that contains the string “click on Click here to start\
    \ before you,” then no matter what else is in that sentence a reader is completely\
    \ lost. Additionally, if documenting a command line interface, use a separate\
    \ font to identify inputs and outputs from the text of your article.\n* Use bullets\
    \ and numbered lists. If you’re adding a step-by-step to a document, use a numbered\
    \ list (this makes it easier to refer to steps by a number in the future). If\
    \ you’re working on a paragraph and have more supporting thoughts to an argument\
    \ than three, then consider moving those into bulleted lists. If you are building\
    \ a list in a sentence with more than three or four items, also consider moving\
    \ those items into bullets.\n* Annotate images. Oh, and use images. But if you\
    \ use images, annotating them will make it easier for a reader to find what you’re\
    \ referring to in the text.\n* Watch comments. Be prepared for comments the second\
    \ you click save on a new page, or article. Many will watch feeds of all the documents\
    \ in a given section of your company intranet or site that contain a given tag.\
    \ Then the comments will come in. Rather than force people to hunt through comments\
    \ or assume the whole company bothers to read those comments, update the content\
    \ of an article when appropriate (e.g., every time someone asks a question). I\
    \ like to use an FAQ section for doing so."
