    *   From the second you hang your shingle out and start accepting a `Stripe` payment,
    have a tax preparer you trust.

    *   Identify the tool that is key to automating your business. This is important
    because it needs to integrate into your accounting apparatus. If your accounting
    system is `Quickbooks` and your bookkeeper and tax preparer both use `Quickbooks`,
    then you might not be able to move to a new Managed Services Automation (`MSA`)
    package if that package doesn’t integrate with `Quickbooks`. Unless you need that
    `MSA` so bad you replace your tax preparation service or find a way to migrate
    data at every quarter, check in with them.

    *   Build a good check and balance. You need someone to keep you honest, with
    spending, forecasting, and taxes. You need to keep others honest with your money.
    And you need to have them check things you don’t even know need to get checked,
    like a forecast of available funds at each payroll run. And you need to practice
    a little “trust but verify.”

    *   Categorize receipts immediately. And bring in everything at tax time. Your
    tax preparer will sort out what you can and can’t actually claim. This includes
    services, travel, subscriptions, and the cost of your office (which at first might
    be a part of your home office).

    *   If you get financial advice about a business arrangement, think long and hard
    before proceeding against that advice. I’m not sure how many times I’ve screwed
    this up. Nor am I sure how many times I will in the future.

    *   Don’t ever, ever, ever write your own accounting software.

    *   Keep all of your records forever.


    Overall, I can’t tell you how to structure your business’ finances. But maybe
    some of this chapter helps frame things the way you need them framed. You should
    hire someone you can trust—probably someone you aren’t related to. And you should
    get additional services from other vendors every now and then.'
  raw: '## Buying Accounting Software


    I usually recommend two factors when deciding what kind of accounting software
    (or Software as a Service [SaaS] ) you should use. The first is your accountant.
    If they like working with a specific software package, such as QuickBooks, then
    you should probably use that. You don’t want to be exporting your chart of accounts
    into some weird file and then banging your head against the wall trying to help
    them import that file every time you go and see them. Instead, either find an
    accountant that uses the software you want to use natively, or use the software
    the accountant you find likes to use.


    Wait, did I say find an accountant that uses your software? Why would I say that?
    Because the second major factor in selecting a software package is integration
    with your Professional Services Automation (PSA) solution. If the PSA can communicate
    directly with the accounting software then as you grow, you will have a very easy,
    very slick way of invoicing customers based on ticket entry. We’ll get into selecting
    PSA solutions later in this book. But for now, keep in mind that the accounting
    software solution that you select will later need to be integrated with some automation
    software.


    For example, if you use a PSA that integrates with ZenDesk, and it happens to
    not be QuickBooks, but your accountant wants QuickBooks and will only work with
    QuickBooks, then you’ll have a little bit of a challenge. Hopefully you can export
    from one solution to another if absolutely necessary. If not, you will have to
    choose between various forms of automation or accountants. Keep in mind, that
    if you are left with manually keying invoice information in, that’s not the worst
    thing (especially not early on), as manually keying in information provides you
    checks and balances before sending a customer an invoice. Of course when manually
    keying in information, you can make a mistake, so double-check your entry. Nothing
    runs the risk of causing trust issues more than billing someone incorrectly.


    ## Accepting Payments


    Being profitable is the difference between a business and a hobby. And a key aspect
    of being profitable is: the initial ways you accept money can easily limit the
    type of business you’re able to take on, and so accepting a payment in any way
    that customers can pay (that can then go toward your rent or mortgage) is a great
    idea.


    I would use three primary factors when selecting a tool.


    *   Does the service integrate properly (and automatically) with your accounting
    platform of choice? An easy way to find a good tool is to start with your accounting
    platform and look at those that integrate with it.


    *   Does the service give you the most favorable rates? If you can choose between
    multiple services, you might want to make sure you’re using the one that keeps
    the least amount of your hard-earned money.


    *   Does the service change your tax nexus? Believe it or not, different sites
    and services (and even customers) can impact your taxes. Consult with your tax
    preparer (and yes, you need a tax preparer) to verify any nexus rules you might
    be governed by (especially if you do business between states or work in a border
    city).


    The main solutions used to accept payments include Square, Quickbooks, and Stripe.
    There are tons of others, and I have no opinion about which is better than the
    others. I’ve used them all, and they all act as a game-changer over traditional
    big landline-driven machines.


    Now that you can accept payments, it’s time to talk about when you can spend the
    money you were just paid.


    ## Accrual-Based Accounting


    If you take anything away from this chapter, it’s this. If you have customers
    that prepay you for services in a contract, then you MUST use accrual-based accounting.
    Most businesses begin leveraging cash-based accounting, which is to say, that
    money they are paid is the money they have sitting in their general ledger and
    they treat that money as cash.


    Later, organizations end up with multiple charts of accounts and only accrue or
    recognize revenue once the services are delivered. Why? Because you’ll eventually
    bankrupt a growing company if you don’t. Basically, you can’t spend the money
    until you deliver the services. The earlier you start doing that, the better off
    you’ll be. I find many organizations don’t start doing this until they get a big
    scare or hire an accountant.


    That big scare is often in scenarios where all of the revenue derived from a contract
    is spent and you have to recapitalize the company in order to just complete projects
    you’ve sold. When this happens, you can easily end up with the value of the company
    going negative even though you just did some of the best work of your life. This
    is when a little extra cash flow helps, but the only way to actually solve this
    problem is to avoid recognizing income when you haven’t actually earned it.


    ## Hiring an Accountant


    You don’t have to deal with too much of this stuff. You can and probably should
