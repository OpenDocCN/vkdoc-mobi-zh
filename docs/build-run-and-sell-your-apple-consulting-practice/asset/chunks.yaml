- fmt: '# Decisions, Decisions


    Before you hire, you have some important questions to ask yourself that will guide
    the types of business you take on, how you grow your company, and how difficult
    it will be to run your company as you grow. Before we get into how to hire throughout
    this chapter, let’s first look at some of the questions you need to ask before
    you start.


    - Will you be hiring contractors or staff? I have to admit, I’ve always been partial
    to having people on staff, and treating them right. This means getting your ducks
    in order with `401k`, health insurance, and staff development. But if your consultancy
    is a gig rather than a career, you might choose to leverage contractors. Additionally,
    if there are specialties (e.g., Cisco, Jamf, Exchange, etc.) you’re trying to
    keep in-house, you might choose to bring on contractors to deliver various services.
    Be deliberate about what you want to be doing, what you want to include in your
    offer, and who will be delivering each type of service when needed.


    - What traits are you looking for in an employee? Think about your mission, vision,
    and values. Then write a persona of the type of person you want to have around.
    Do you value automation engineering or customer service? How do you want someone
    to represent you when they’re in the field?


    - What will employees be doing? Are you going to sell, do technical work, focus
    on administration? The skillset you look for might be different based on the personality
    of the proprietor of a small business. And the type of employee might be different
    as well. If you need someone to run the company while you’re out doing all the
    cool stuff, you need a much different employee than if you are hiring someone
    to sell services or deliver services. Again, be deliberate about who does what,
    and be willing to make a concession when you find those special people who might
    bring something special to the table that you hadn’t previously considered.


    - Do you want referrals coming back to you? For most this is a firm “yes,” but
    according to how you want to grow the business it might be an, “It’s according
    to what kind of business it is,” or a, “If my subcontractor does good work, they
    can have the referral business.” Don’t expect brand loyalty and referrals to stay
    within the business unless you incentivize your employees based on that (e.g.,
    a finder’s bonus, etc.).


    - How do you want employees to grow professionally? Don’t expect people to learn
    on their own. As you grow, the depth with a platform required, the ability to
    learn new technologies, and other factors will determine how you grow, or if not,
    how you’re able to retain team members.


    - How much can you pay your employees? An easy rule of thumb I’ve always used
    is `2.5x`. This means that I want to be billing any given billable employee for
    two and a half times what I’m paying them. This includes the overhead (e.g., HR
    and training costs), commissions to any salespeople that are hired, and the salary
    of employees, but also back-office costs. For non-billable employees, the salary
    expectations will vary. Visit sites like `Glassdoor.com` for initial comparisons,
    or as you grow, ask any outsourced HR for salary numbers.


    ### Note


    Chances are if you’ve got a full-time job that isn’t running your consultancy,
    then if you hire, you should be hiring contractors and not full-time staff employees.


    What if you can’t find the right person? If you can’t subcontract or staff a task
    or line of business, then you might need to outsource some of your work. This
    can also be an easy way to deliver various services you don’t consider part of
    your core business model. Outsourcing can be tricky. Make sure you are on the
    same page with outsourcers about how to treat customers, referrals, how they represent
    you, and billing. And be aware of the legal ramifications to having other businesses
    (even businesses of one person) as your customers by having solid non-disclosure
    agreements in place with subcontractors, staff, and outsourcers.


    Finally, before you move on to posting a job on the Internet, keep in mind that
    the posting will potentially be read by customers as well.


    # Before You Hire


    Go to `trinet.com`, `adp.com`, `insperity.com`, and `gusto.com` and pick one.
    If you haven’t looked at `Gusto`, look at them. Then look at their investors.
    They are disrupting HR outsourcing left and right, and they are inexpensive and
    capable of scaling with your business. I’ve used `Tri-Net`, `ADP`, and `Insperity`,
    and they are similar in business model, quality, and cost.


    If you don’t have an HR consultant, you need one by the time you have seven employees.
    You need a system that gives you the ability to pay employees, track time and
    benefits, provide a `401k`, and potentially provide profit sharing or stock. That
    HR consultant can be provided by one of those companies, or you can get one that
    will help you manage those systems and your team. Look for a consultant who wants
    to build repeatable systems rather than doing everything manually and/or for you.
    That’s often not a person that works for one of the companies whose services you
    are using.


    Once you get to around 20 employees, if you’re going to continue scaling up, you
    need to hire a full-time HR employee, in a leadership position. This person is
    meant to help you build excellent onboarding systems, revamp all the stuff that
    your consultant helped you with, and set the company on a trajectory for rapid
    growth. In some states, you will be required by law to hire this employee as your
    51^(st) hire, but chances are that without a concerted effort to provide repeatable
    onboarding and HR systems that you won’t get there except by luck if you haven’t
    hired this individual far earlier than employee #51.'
