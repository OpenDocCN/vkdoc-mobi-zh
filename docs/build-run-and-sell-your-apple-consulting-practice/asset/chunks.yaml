    *   [**Luggage**](https://github.com/jamf/NetSUS) : Open Source project to create
    a wrapper that makes pkgs for Macs so you can have peer review of a package by
    examining the diffs between versions of a Makefile.


    *   [**Munkipkg**](https://ipcmobile.com/infineaiq/) : A simple tool for building
    packages in a consistent, repeatable manner from source files and scripts in a
    project directory.


    *   [**Pacifist**](https://kapeli.com/dash) : A shareware application that opens
    macOS .pkg package files, .dmg disk images, and .zip, .tar, .tar.gz, .tar.bz2,
    and .xar archives and allows you to extract individual files and folders out of
    them.


    *   [**Payload Free Package Creator**](https://www.risevision.com/) : An Automator
    application that uses AppleScript, shell scripting and pkgbuild behind the scenes
    to create payload-free packages.


    *   [**QuickPkg**](http://business-static.apple.com/us/apple-professional-services/Apple_Professional_Services_AD_Integration_Services.pdf)
    : Create Mac software distribution packages.


    *   [**Simple Package Creator**](https://simplemdm.com/) : Create Mac software
    distribution packages.


    *   [**Suspicious Package**](https://www.solarwindsmsp.com/) : View the contents
    of Mac software distribution packages.


    *   [**Whitebox Packages**](https://www.sophos.com/en-us/products/endpoint-antivirus.aspx)
    : Create Mac software distribution packages.


    ### Storage


    *   [**Netatalk**](https://www.tabpilot.com/) : Better AFP connectivity to Windows
    and other storage platforms from a Mac.


    *   [**Promise**](https://posim.com/) : Apple-vetted direct attached storage (DAS),
    storage area networking (SAN), etc.


    *   [**Synology**](http://nomad.menu/) : Storage appliances tailored to working
    with the Mac.


    *   [**Xsan**](http://munki.github.io/munki/?mt=12) : The built-in Apple SAN filesystem.'
  trans: '

    ### 安全工具


    - [**花椰菜背心**](https://www.air-watch.com/)：将 FileVault 密钥存储在中央服务器上。

    - [**Crypt**](https://www.box.com/)：FileVault 2 托管解决方案。

    - [**Digital Guardian**](https://docs.microsoft.com/en-us/azure/active-directory/active-directory-whatis)：数据丢失防护。

    - [**Google Santa**](https://www.sap.com/products/secure-mobile-device-management-cloud.html)：Mac
    的二进制黑名单与白名单管理。

    - [**iOS 位置提取器**](https://www.onelogin.com/)：转储 iOS 和 macOS 上位置数据库文件的内容。

    - [**iOS 频繁位置提取器**](https://www.parallels.com/products/mac-management/)：转储位于 `/private/var/mobile/Library/Caches/com.apple.routined/`
    目录下的 `StateModel#.archive` 文件内容。

    - [**Little Snitch**](https://www.filewave.com/)：提供关于哪些程序正在访问网络资源以及这些资源位置的信息。

    - [**Objective-See**](https://www.fleetsmith.com/)：提供 `KnockKnock`、`Task Explorer`、`BlockBlock`、`RansomWhere?`、`Oversight`
    和 `KextViewr` 等工具，用于查找计算机上运行的端口和服务的更多信息。

    - [**Osquery**](http://salsoftware.com/)：以实时、精细的搜索方式查询 Mac 上的信息。

    - [**Portecle**](http://centrify.com/)：创建和管理密钥库、密钥、证书、证书请求以及证书吊销列表。

    - [**PowerBroker**](https://www.jamf.com/products/jamf-now/)：允许 Mac 上的标准用户执行管理任务，而无需输入提权凭据。

    - [**Prey**](https://gitlab.com/Mactroll/DEPNotify)：在 Mac 和 iOS 设备被盗时进行追踪。


    ### 服务台工具


    - [**Freshdesk**](https://www.docker.com/)：案例/工单管理，支持通过 Freshbooks 自动计费。

    - [**Salesforce Cases**](https://www.dropbox.com/)：案例/工单管理，可与 SalesforceCRM 自动集成。

    - [**ServiceNow**](http://www.thursby.com/products/admitmac)：案例/工单管理，拥有丰富的集成应用市场。

    - [**Webhelpdesk**](http://www.sds-corp.com/products/unified-endpoint-management/heat-lanrev-client-management/)：案例/工单管理。

    - [**Zendesk**](https://www.lightspeedsystems.com/products/mobile-manager/)：案例/工单管理，拥有丰富的集成应用市场。


    ### 软件打包与包管理


    - [**Autopkg**](https://meraki.cisco.com/products/systems-manager/)：使用配方自动创建 Mac
    软件分发包。

    - [**CreateUserPkg**](https://github.com/micromdm/micromdm)：创建在安装时创建本地用户账户的软件包（适用于
    10.12 及以下版本）。

    - [**JSSImporter**](https://developer.apple.com/xcode/downloads/)：将 Autopkg 连接到
    Jamf Pro。

    - [**Iceberg**](https://www.microsoft.com/en-us/cloud-platform/system-center-configuration-manager)：创建
    Mac 软件分发包。

    - [**InstallApplication**](https://github.com/google/cauliflowervest)：动态下载用于 MDM
    的 `InstallApplication` 命令的软件包。

    - [**Jamf Composer**](https://www.zuludesk.com/)：创建 Mac 软件分发包。

    - [**Luggage**](https://github.com/jamf/NetSUS)：开源项目，创建一个用于生成 Mac 的 pkg 包的封装器，以便通过检查
    Makefile 不同版本之间的差异来对软件包进行同行评审。

    - [**Munkipkg**](https://ipcmobile.com/infineaiq/)：一个简单的工具，能以一致、可重复的方式，从项目目录中的源文件和脚本构建软件包。

    - [**Pacifist**](https://kapeli.com/dash)：一款共享软件应用程序，可打开 macOS 的 `.pkg` 包文件、`.dmg`
    磁盘映像以及 `.zip`、`.tar`、`.tar.gz`、`.tar.bz2` 和 `.xar` 归档文件，并允许从中提取单个文件和文件夹。

    - [**Payload Free Package Creator**](https://www.risevision.com/)：一个 Automator
    应用程序，它在后台使用 AppleScript、Shell 脚本和 `pkgbuild` 来创建无有效负载的包。

    - [**QuickPkg**](http://business-static.apple.com/us/apple-professional-services/Apple_Professional_Services_AD_Integration_Services.pdf)：创建
    Mac 软件分发包。

    - [**Simple Package Creator**](https://simplemdm.com/)：创建 Mac 软件分发包。

    - [**Suspicious Package**](https://www.solarwindsmsp.com/)：查看 Mac 软件分发包的内容。

    - [**Whitebox Packages**](https://www.sophos.com/en-us/products/endpoint-antivirus.aspx)：创建
    Mac 软件分发包。


    ### 存储


    - [**Netatalk**](https://www.tabpilot.com/)：从 Mac 到 Windows 及其他存储平台提供更佳的 AFP 连接。

    - [**Promise**](https://posim.com/)：经过 Apple 验证的直接附加存储 (DAS)、存储区域网络 (SAN) 等。

    - [**Synology**](http://nomad.menu/)：专门针对 Mac 工作流定制的存储设备。

    - [**Xsan**](http://munki.github.io/munki/?mt=12)：Apple 内置的 SAN 文件系统。

