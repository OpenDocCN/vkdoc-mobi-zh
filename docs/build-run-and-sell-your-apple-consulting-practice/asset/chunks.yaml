    # 11. Diversifying Your Portfolio


    Many a consulting firm starts off doing hourly consulting. At some point, we invariably
    expand into insourcing, selling hardware, managing software subscriptions for
    customers, writing software for customers, specializing in specific products,
    and, one of the most popular, dabbling in managed services.


    When looking to diversify your portfolio of offerings, get started small when
    you can. If you have traditionally only provided managed services, consider having
    your team work on fixed-fee or special projects. If you usually do hourly consulting,
    bring on a managed services customer so you can identify everything you need to
    scale up that practice. Getting started with other areas on a smaller scale will
    allow you to learn how to bring on new products or services without a huge amount
    of risk. The first step is to decide what you want to add to your portfolio of
    products and services.


    ## What Is a Good Addition?


    I’ve heard people tell me what I should be doing for a long time. And each has
    a different perspective. Sometimes you will hear the same things repeatedly. Sometimes
    you’ll hear something once and think “hell yeah, I should be doing that.” But
    much of finding new opportunities to expand the reach of your company will come
    from the gut—that same instinct that caused you to start the company in the first
    place.


    There’s no way to know for sure whether something is a good idea. But there are
    clear signs that something is a good idea and clear warning signs. Let’s look
    at some signs that you’ve found a great idea.


    - Nearly every customer says that you should sell them a given product or service.
    If you hear something weekly then you should take notice. You might not have to
    build a huge solution, as you might be able to white label (or rebrand) an offer
    from someone else who maybe specializes in that product or service.

    - You recommend a given product or service a lot (and customers buy it). Who are
    you recommending it to? First think about whether you can white label it, and
    analyze the costs around monetizing it for your company. If you can’t, then consider
    doing something on your own.

    - You are referring large amounts of business to someone else and not making enough
    of a markup or commission on it.

    - There is a huge gap in the market. Either no one is actually doing something,
    or those who are happen to be incompetent or missing the mark.

    - You see a competitor failing to deliver: Be careful about doing something just
    because a competitor is doing it. You don’t win wars by fighting an opponent’s
    strategy. But sometimes, you can see that a competitor has a good idea and that
    they’re just not delivering it in a way that makes sense.

    - You see a company delivering a product with a massive barrier of entry and you
    think you could go down-market and deliver most of what customers need in a much
    cheaper OR easier-to-use fashion.

    - You really, really want to do something—like your gut is just telling you absolutely
    you have to do it.

    - Your staff really, really want to do something. And they’re willing to own an
    initiative, even if they have to work on it on their own time.


    You’ve identified some initiatives and taken a step back to decide if it’s a good
    idea. Now take another step back and think about it even more critically. In the
    next section, we’ll look at some ways to keep yourself honest and how to look
    at things critically before moving forward.'
