  trans: '

    ### 学习与成长


    不要只关注公司的短期业绩和财务表现。也要思考公司及员工的长期潜力。这将使你的公司成为一个理想的工作场所。


    - **路线图完成情况：** 在软件开发公司，路线图规划了你想发布的功能。但我喜欢在服务型公司使用“路线图”这个词。从根本上说，路线图指明了公司的发展方向。这很可能是判断你是在深思熟虑地引领公司，还是仅仅随波逐流（无论好坏）的最佳长期指标。我喜欢构建一份包含开发新服务（例如
    BDR、防病毒、CRM）的路线图，并跟踪这些服务的就绪状态、销售效率以及交付所需的时间。我也喜欢将自动化工作、集中式工单系统和设备管理系统的实施纳入我的路线图中。


    - **资源分配：** 很多员工在忙碌时最开心。但你应该控制期望值，并确保团队有充足的时间学习。我喜欢设定一个目标资源分配率。当分配率超过目标时，就该招聘了。当分配率低于目标时，就该在获取新客户方面发挥创意了。


    - **员工满意度：** 你的员工喜欢他们的工作场所吗？他们喜欢哪些方面？文化是人们留在某个组织最重要的原因之一，同时也向你展示了员工的敬业程度和效率。你可能已经猜到了，我喜欢做调查。Culture
    Amp (`http://www.cultureamp.com`) 的好人们也喜欢。相比于自己制定指标，我更喜欢使用像 Culture Amp 这样的工具，原因在于，他们才是量化员工敬业度、员工体验和员工效能的专家。


    - **学习计划完成情况：** 这完全关乎员工。永远不要忘记，咨询公司是服务业，而服务业最宝贵的部分通常是提供服务的人员。通常，正在学习的员工是快乐的员工。我们跟踪资源分配的原因是为了确保人员配置充足。制定学习计划有助于引导团队朝着正确的方向发展。跟踪他们在学习计划上的进度，可以衡量那部分时间的有效性，同时为每个团队成员提供灵活性，让他们以自己需要的方式学习，而不是你认为他们应该学习的方式。


    一切皆有可能。所以，如果你希望将这些内容全部呈现在一个可以展示在办公室 Apple TV 上的网页中，那么你就可以做到。实现它可能需要大量工作，因此，如果需要进行一些手动数据录入或设置自动化流程将指标存入数据库，那就去做吧。这一切都是值得的。


    关于记分卡的最后一个要点。在可能的情况下，客户应该能够看到平衡计分卡（BSC），或者至少是其中面向客户的部分。过去，与客户分享的合理类别包括：学习与成长、客户、以及内部流程（或至少是这些类别的一部分）。在我尝试在不同系统之间建立连接时，我经常不得不转而使用
    API 从各种不同的系统（例如 Autotask、QuickBooks 和 Jamf）提取数据到中央数据库。尽管销售人员的承诺天花乱坠，也曾有供应商声称可以自动神奇地为我提供漂亮的仪表盘，但我从未见过一个能不经大量定制就覆盖我所用的每个系统的方案。


    ## 测试


    永远不要相信任何销售人员。尤其当我也在销售电话中时更是如此。尽管对方可能心怀好意，但你仍可能被骗。好吧，不是被骗，但他们的回答可能没有你询问的具体问题所涉及的信息那么准确。或者你可能只听到了你想听的内容。关键是，你需要亲眼验证，以避免任何潜在的沟通误解。不要轻信系统工程师、销售员、甚至工具实际开发者的话。在你承诺购买之前，你需要看到事情按照你想要的方式运行。否则，这个工具就只是雾件（vaporware）。当你要拼凑一堆工具，通过定义好的工作流程来构建一个综合性解决方案时，这个问题会更加突出。


    那么，你应该如何测试这些复杂的工作流程呢？一旦你想出了一个可以处理的场景，就要思考如何将其贯穿整个端到端的流程。列出一份必备功能清单、一份你可以自行构建的功能清单，以及一份你不可或缺的功能清单。然后构建一个包含一系列任务中每个步骤的测试矩阵。接着，尝试配置你部署方案中的所有组件。


    一旦你的部署方案开始运作，你不会想对它做太多改动。但你不得不这样做。软件更新会来，新功能会催生新的自动化流程，而每次你做出改动，你都想重复所有的测试。因此，我建议建立一个与生产环境尽可能一致的完整测试环境。

    '
- fmt: '# Techie Bits


    The next few pages of this book include a survey of tools that are going to make
    using Apple devices easier, more automatable, and more cost effective. These are
    the tools technicians, devops, and help desks are going to use, as well as a few
    lines of business tools that might provide good opportunities to sell additional
    services into customers.


    In order to remain vendor agnostic I am trying to list solutions in alphabetical
    order by category. A brief explanation of each category, with categories of tools
    listed, follows:


    - **Antivirus**: Solutions for scanning Macs for viruses and other malware.


    - **Automation Tools**: Scripty tools used to automate management on the Mac.


    - **Backup**: I highly recommend bundling or reselling some form of backup service
    to your customers, whether home, small business, or large enterprises. The flexibility
    to restore a device from a backup when needed is one of the most important things
    to keep costs at a manageable level and put devices back into the hands of customers
    in an appropriate time frame.


    - **CRM**: Mac-friendly tools used to track contacts and communications with those
    contacts.


    - **Collaboration Suites**: Once upon a time, a Mac server was great for shared
    calendars, contacts, and email. But most businesses aren’t going to want anything
    to do with the repercussions of potential downtime that can happen on a mail server.
    Nothing will get your hard-earned customers to fire you faster than an email outage.
    So while the Mac server is listed, consider cloud options, for optimal customer
    retention.


    - **DEP Splash Screens and Help Menus**: Tools that make the DEP and service desk
    process more user friendly by providing more information to users.


    - **Development Tools, IDEs and Text Editors**: Tools used when building scripts,
    writing and debugging software, and manipulating text.


    - **Digital Signage and Kiosks**: I put these in here because I know a lot of
    organizations that have made a great little additional revenue stream by reselling
    or deploying these tools on behalf of their customers. I have friends that have
    also created managed service offerings just around these tools. Overall, it’s
    a possible new revenue stream and as an added bonus, you’ll likely have an NFR
    (or Not For Resale copy of the software) so you can have pretty cool signage in
    your office (if you’re into that kind of thing).


    - **Directory Services**: Tools that provide primarily on-premises access to a
    shared directory of services and allow for single-sign on to those services.


    - **File Sharing**: Mac-centric cloud and on premises tools to share and synchronize
    files.


    - **Identity Management**: Providers of predominantly SAML based Single-Sign On
    solutions that federate security for Apple devices to access web-based services.


    - **Imaging and Configuration Tools**: Tools used to place devices into a given
    state or create that state. This includes traditional Macs, including tools, as
    well as those built for iOS.


    - **Line of Business**: Traditionally Mac-focused solutions that automate various
    business functions.


    - **Log Collection and Analysis**: Centralized logging has been a necessity for
    large, growing fleets of devices. Modern tools can store large amounts of logs
    from client computers and allow fast and complex searching so you can triangulate
    issues quickly and effectively. As an added benefit, you can also centralize logs
    for network appliances, allowing you to isolate the source of issues across an
    entire ecosystem of devices.


    - **Management Suites**: Tools used to manage settings on Apple Devices. Each
    is marked as MDM, Agent-based, or both.


    - **Print Servers**: Servers that either provide access to printers or allow for
    more granular printing features, such as cost accounting.


    - **Remote Control and Management**: These tools allow you to take control of
    the screen, keyboard, and mouse of devices. I can’t tell you which are the best.
    But I can tell you that I want my remote control solutions to be cross-platform,
    to be cloud-based, to prompt users for acceptance of the remote control session,
    and to audit connections so I know who is taking over what devices.


    - **Print Servers**: I’ve always hated printers. Whether the old Fiery print services,
    a common LPR-based printer, or one of the shared printing services, I still can’t
    stand managing printers. Printers jam, they break, the drivers seem to be rife
    with problems for every other operating system update, printers are often connected
    to via ad-hoc networks (like Bonjour), and you often need special software to
    access the cool features. All-in-all, printers suck, but these tools might make
    them just a tad bit easier to use, or if not, help to account for who is using
    them so your customers can bill their departments back as much as possible.


    - **Point of Sale (PoS)**: Similar to digital signage, but you might also operate
    a storefront or track customer data in one of these solutions.


    - **Remote Management**: Tools used to take control of the screen of an Apple
    device.


    - **Security Tools**: Tools used to manage firewalls, FileVault, and perform other
    tasks required to secure Macs, based on the security posture of a given organization.


    - **Service Desk Tools**: These tools are for ticketing and ticket management.
    It’s always great if you can pick one that actually integrates with both your
    billing solution and the various other techie bits you choose to use.


    - **Software Packaging and Package Management**: Tools for normalizing software
    for mass distribution on Apple platforms.


    - **Storage**: Apple-focused solutions for sharing files.


    - **Troubleshooting, Repair, and Service Tools**: Tools used to fix logical problems
    with hard drives, check hardware for issues, repair various system problems, or
    just clean up a Mac.


    - **Virtualization and Emulation**: Not all software runs on a Mac. Customers
    will have certain tasks that may require a Windows machine. You can use Citrix
    or a Microsoft Terminal Server to provide for that potential requirement. Or,
    especially if users need data from their Windows apps when offline, you can use
    a local virtualization tool.'
