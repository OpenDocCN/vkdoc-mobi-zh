- fmt: "# 4. Accounting 101\n\nI have never seen anyone with a degree in accounting\
    \ start a Managed Services Provider. I’m sure it happens, but most providers I’ve\
    \ met had to (or will have to) learn some basics about accounting along the way.\n\
    \nThat’s going to be true for a lot of different things when you start a business\
    \ on a shoestring budget. And it’s good, because when you hire full-time staff\
    \ to do various roles, you’ll better know how to manage them! But you likely can’t\
    \ afford to hire a full-time accountant in the beginning. So at first, you can\
    \ use a tool like `Mint` or `Quicken` to do basic, simple accounting. When you\
    \ grow into `MYOB`, `QuickBooks`, or one of the more mature tools, you’ll need\
    \ some help. And keep in mind that you have the same types of options when hiring\
    \ accounting help that your customers have when hiring consultants, so treat hiring\
    \ help as a great learning experience! And wait as long as you can to hire a full-time\
    \ accountant.\n\n## The Concepts\n\nTo be a successful small business owner, you\
    \ don’t need to be an accounting expert; you outsource that. But you do need a\
    \ solid grasp of basic accounting concepts. As a small business owner, you need\
    \ more than an intuitive feel for the performance of your business. And understanding\
    \ a few basic Accounting 101 concepts goes a long way toward keeping the goals\
    \ for your company in alignment with your performance. Here are a few concepts\
    \ to get you started:\n\n- **The balance sheet**: A great place to start when\
    \ evaluating the performance of an organization is learning how to decipher a\
    \ balance sheet. At a minimum, you should understand assets and liabilities and\
    \ how they relate to one another.\n  - **Assets** are what you own, which includes\
    \ contracts you haven’t taken payment on.\n  - **Liabilities** are debts, as well\
    \ as goods and services that you have taken payment for that you must contractually\
    \ deliver.\n  - A basic equation to calculate the worth of your company is to\
    \ take your assets and subtract your liabilities, with what’s left being your\
    \ equity. Putting this on paper results in a balance sheet. This provides you\
    \ a quick overview of your organization. Lots of cash on hand and little debt\
    \ means a strong balance sheet. High debt and low cash means a weak balance sheet.\
    \ The balance sheet drives long-term decisions on where to invest your resources.\n\
    \n- **The P&L**: The Profit and Loss statement provides a good idea of how you’re\
    \ doing at any given point in time. The P&L indicates the cost of sales, margins\
    \ on each product, and costs that impact margins. Those costs include inventory,\
    \ shipping, manufacturing, etc. The more granular these become, the more data-driven\
    \ you can get with establishing the cost of products. Every P&L includes net income.\
    \ The net income is a statement about the profit you made; you know, the reward\
    \ for your investment!\n\n- **The cash flow statement**: For small business owners,\
    \ cash is king. Cash is a cushion for when, not if, your business suffers a setback.\
    \ Cash should cover the operational costs of running a business for a period of\
    \ time (each organization has a different outlook on how long that might be).\
    \ The key to understanding cash flow is the statement of cash flows. Consider\
    \ the statement of cash flows as the connection between a balance sheet and income\
    \ statement. The statement of cash flows explains how your net income transformed\
    \ into net cash over a given amount of time. The statement of cash flows divides\
    \ activities into three categories: operations, investment, and financing. Initially\
    \ organizations have cash from ongoing operations, but as you grow, you’ll also\
    \ manage cash from investment and operations. And usually pay taxes on at least\
    \ some of that cash and take deductions from those investments and operations.\n\
    \n- **Taxes**: As a small business owner, you need to understand taxes. If your\
    \ business is making money, you have to pay the taxman. Most organizations need\
    \ to minimize their tax burden as much as possible. And that’s where your knowledge\
    \ of accounting can really pay off—you’ll understand the tax advantages of different\
    \ legal structures (e.g., a corporation vs. a sole proprietorship) and the potential\
    \ tax savings that are available to small business owners.\n\n- **Pro forma projections**:\
    \ Accounting is a story of the past and the present. The pro forma is a projection\
    \ of future performance based on past performance. Pro forma projections enable\
    \ you to project how your business will do in the future. Projections are critical,\
    \ as they allow you to make informed decisions about staffing, delivery, and the\
    \ value of lines of business.\n\n- **CAGR**: Compound Annual Growth Rate (CAGR)\
    \ measures growth over different periods. For example, you know you want to start\
    \ a company with an initial investment and then grow it to a specific value to\
    \ sell, assuming the investment compounds over time.\n\n- **COGS**: Costs of Goods\
    \ Sold (COGS) represents the direct costs attributable to the production of what\
    \ you sell, including the cost of the materials and labor used in creating goods,\
    \ costs of distributing goods, and sales costs.\n\n- **EBITDA**: Earnings Before\
    \ Interest, Taxes, Depreciation and Amortization (EBITDA) is one indicator of\
    \ a financial performance that indicates the earning potential of a business.\
    \ EBITDA doesn’t include the cost of capital and the tax impact. If you’ve taken\
    \ on funding, this is a common metric to look at.\n\n- **Revenue**: Usually listed\
    \ as sales on an income statement, revenue is the money you receive during a given\
    \ period, including discounts and returns (or, in services, disputed hours or\
    \ managed services Service Level Agreement, or SLA violation discounts). Revenue\
    \ is gross income.\n\n- **Recurring revenue**: Recurring revenue is the revenue\
    \ that is highly likely to continue, and thus predictable, and something you can\
    \ actually plan and build a business around.\n\n- **Net Income**: Top line revenue\
    \ minus costs.\n\n- **Revenue Recognition**: This is when you can actually spend\
    \ the money you made. You recognize service dollars when you deliver those services.\
    \ Managed Services revenue is usually recognized at the end of each monthly term,\
    \ and hourly or daily services are usually recognized when you receive approval\
    \ (e.g., a signature on a work order) that the services were delivered.\n\n- **Gross\
    \ Margin**: Gross margin is sales revenue minus COGS, divided by total sales revenue,\
    \ or the percentage you get to keep after covering all of the direct costs attributable\
    \ to the goods and services work product you provide to your customers.\n\nAt\
    \ the end of the day, most small businesses will outsource accounting. So don’t\
    \ get hung up on all the accounting jargon or the finer points of different depreciation\
    \ methods. But do come at it with a rudimentary handle on the three basic financial\
    \ statements and have a good idea of what they tell you about future performance.\
    \ You’re on your way to becoming a successful small business owner!"
