    # 6. Make Friends: Develop Partnerships


    You can’t get by in this world without friends. Friends in your industry and adjacent
    industries give you different perspectives and different skillsets and can put
    you in touch with a lot of different customers. But telling someone to buy something
    or use a specific service isn’t always worth the risk, even if you aren’t making
    commission for the referral to your “friend.”


    Chapter 2 covered building a portfolio of offerings, including things like products
    to sell and services to deliver. But in this chapter, we’ll look at leveraging
    partnerships with other organizations to get your company to the next level, starting
    with the often-forgotten partner, your customers.


    ## Engaging Customers for Referral Business


    Your customers are your most cost-effective way to find new customers. It turns
    out that doing good work pays off. But every industry is different. You can’t
    always just be vulnerable and ask a customer to refer you to other organizations
    that might be able to get value from your services. Here are a few delicate strategies
    you can use to get referrals:


    - **Ask**: If you have a good relationship with a customer, then you could, at
    the end of an engagement or through an e-mail, just ask them to refer you to other
    customers. It’s tough to do so without seeming desperate or really cheesy. But
    it’s possible.

    - **Leave behinds**: I’ve had customers pass on the marketing materials, but they
    can’t do that if you don’t leave them with something. Asking if you can leave
    a few one-sheets with a customer that they could then pass on to someone is another
    way to increase business from leaves.

    - **Compensate for referrals**: If there will be some kind of compensation, the
    most ethical thing is to compensate the company at which your contacts of customers
    work. This is a slippery slope and, in some industries, will immediately create
    distrust (or even be illegal due to various regulations). Proceed with caution.

    - **Put a link in the customer’s web interface**: If you give your customer a
    way to look at services online, also give them a little button to refer customers.
    This is one of the easiest and most passive ways to get referrals.


    Next, it’s time to turn your attention to the kind of external partners you’d
    like to engage with. In the next section, we’ll look at finding the right kind
    of partner, which includes finding people to provide complimentary services, subcontract,
    and potentially just refer business (unilaterally or bilaterally).


    ## Finding the Right Partner


    I’ve gotten e-mails from hundreds, if not thousands, of companies that wanted
    to partner with organizations I’ve been a part of. Some represent great deals
    for me, or the organization I was representing at the time. Others were a bit
    of a stretch. And the ones that seemed like the best deal at first, turned out
    to be terrible when we dug into their business.


    Keep your specific customers at the front of your mind when selecting a good partner.
    Ask yourself questions like the following:


    - Will my customers get along well with this person or company?

    - What goods and services do my customers need?

    - When (not if) they have problems with this other vendor, how will I end up getting
    involved?

    - Can the vendor actually deliver the services they say they can?

    - Are the costs aligned?

    - Will the vendor or I end up accidentally assuming the other’s role in the customer’s
    company?

    - Should this be a subcontracting arrangement, a bilateral formal business referral,
    or just someone that I point to?


    The most common type of business arrangement for many Apple consultancies is to
    help a customer find someone to help with their Windows devices. I see this specific
    one a lot. Maybe just for the two accounting computers, or maybe for the majority
    of systems that are Windows-based. Let’s face it, traditionally, the people that
    manage Windows systems are just a little different from the typical customer who
    uses Macs. Find someone you can trust (or three) with your type of customers.'
