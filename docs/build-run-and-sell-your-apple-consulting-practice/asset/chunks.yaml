- fmt: '# Automation Services


    Be careful. All of this automation that we’ve discussed up to now in this chapter
    can get really complicated if you aren’t careful. If you can’t explain how your
    business works quickly, then there’s something wrong. Unless of course, you’re
    doing billions of dollars in contracts.


    And don’t forget about the human element. In the Further Reading portion of this
    chapter, I include a book called *Enchantment*, by Guy Kawasaki. The reason is
    because when you’re cutting your costs by implementing automation, it’s important
    to consider that you are reducing the number of touch points at customers. They
    may not have any idea that you’re doing great things to keep their systems in
    check. Communication then can be automated in such a way that they see trouble
    tickets for each issue that you fix, but you’ll also want to have routine meetings
    with customers anyway.


    Once you’ve automated as much as you can, expend time on those customers, just
    to remind them of how much you love them. This not only helps you retain customers,
    but also helps you understand their needs more. And most importantly, you might
    make a few friends along the way.


    ## What to Expect When Building Software


    Earlier in this chapter, we looked at out of the box solutions to help you manage
    devices, manage tickets, manage employees, etc. But you might know more about
    how you think a business should run than thousands of other organizations. No
    really, you actually might. Once you’ve asked yourself if you’re sure about that,
    then you can start to look at building software.


    If you’ve never built software or had software built, it’s helpful to note that
    there are some common truths when it comes to software development (and the people
    that generally build software). If you decide to go down this road, here are some
    tips on software projects:


    *   A project will never have enough people to build all the features you want.
    Period.

    *   As a software project nears completion, the amount of work remaining to do
    rises in proportion to how messy your code is. The more hacks and shortcuts you
    took, the longer that last 1% will take.

    *   Sometimes it’s easier to make a new version than it is to try to improve and
    perfect a previous version. Never be so in love with your code that you can''t
    erase it all and rebuild it again.

    *   Every year you get better at writing code, so end up getting embarrassed by
    how crappy your code was and how you just want to rewrite all of your projects.
    Assuming you’re actually getting better.

    *   Less features means fewer defects.

    *   More developers mean more merge conflicts. Moving to larger teams doesn’t
    necessarily mean a comparable increase in productivity.

    *   As projects grow, you can’t QA or unit test every regression possible. But
    you have to try!

    *   The code is never really finished. There are always going to be reasons to
    withhold this or that. But you have to keep shipping!

    *   Who cares what methodology you’re using, just be deliberate! `Kanban`, `Scrum`,
    `Extreme Programming`, etc. They’re all basically the same. What matters is that
    the team is on the same page.

    *   Not nearly enough project managers plan for holidays, vacations, and sick
    time in their project plans.

    *   Good developers are hard to find. But wait it out or you might get stuck with
    someone that just makes the team less cohesive.

    *   The more high-performing a team the more annoyed team members get about people
    that aren’t amazing.

    *   Most developers don’t start with domain knowledge (or knowledge of the subject
    they’re writing software for). Once developers get domain knowledge, they write
    better software. And need less specific customer stories!

    *   Beyond a few minutes a day, meetings have a decidedly negative return on investment.

    *   There is always tech debt. Always.


    You might actually build software for customers. This is a great way to cross-sell
    additional services into customers and provide more value. The software you build
    also makes you more and more sticky with customers. And especially when covering
    a gap to address software not available to the Apple platform, software development
    can easily end up providing roughly one third of your annual revenue; therefore,
    if you don’t yet have this discipline, think about it long and hard. And read
    books on that as well!


    ## The Customer Scorecard


    Key Performance Indicators (or KPIs) are metrics that make it easier for you to
    evaluate the health of something at a customer. That something might be the customer’s
    deployment of network equipment, management of Apple devices, use of social media
    to reach customers, etc. We don’t want to hand customers complicated charts. So
    I’ve seen companies use precious metals, rockets, comic book characters, and other
    mechanisms to easily report the health of a customer’s environment.


    Many a company also calls the way they display KPIs as a health-check. I’ve seen
    a number of organizations use the Net Promoter Score, or `NPS`, as the basis for
    gauging their health of a company.


    Let’s look at an example. Let’s say you do a survey and you get 1,000 responses.
    If 100 responses were Detractors, in the 0–6 range and 300 responses were Passives,
    in the 7-8 range, then that would leave 600 in the Promoters category, or having
    scores from 9 to 10. We’ll go ahead and subtract the Detractors (10%) from the
    Promoters (60%) for a total of 50.


    I’d say you have some work to do, but then I’d probably say that if the score
    was 10 as well. Anything above a 0 is considered a good score and anything over
    70 is world class. I’d give the 50 range an excellent score. If you’re only going
    to look at one thing after you look at the balance in your bank account, look
    at that. But if you want to go further, I’d recommend taking a bunch of KPIs and
    putting them into a Balanced Scorecard.


    ## The Balanced Scorecard


    The Balanced Scorecard, or `BSC` for short, is often called a `4x4`. The reason
    for this is that it is four categories that at a glance show how your business
    is doing, with four supporting attributes for each category. This allows you way
    more insight than the `NPS`, and is often easily drilled down into. I first started
    using these in college and have used them throughout my career. I always start
    with a financial column.'
  raw: '## Automation Services


    Be careful. All of this automation that we’ve discussed up to now in this chapter
    can get really complicated if you aren’t careful. If you can’t explain how your
    business works quickly, then there’s something wrong. Unless of course, you’re
    doing billions of dollars in contracts.


    And don’t forget about the human element. In the Further Reading portion of this
    chapter, I include a book called Enchantment , by Guy Kawasaki. The reason is
    because when you’re cutting your costs by implementing automation, it’s important
    to consider that you are reducing the number of touch points at customers. They
    may not have any idea that you’re doing great things to keep their systems in
    check. Communication then can be automated in such a way that they see trouble
    tickets for each issue that you fix, but you’ll also want to have routine meetings
    with customers anyway.


    Once you’ve automated as much as you can, expend time on those customers, just
    to remind them of how much you love them. This not only helps you retain customers,
    but also helps you understand their needs more. And most importantly, you might
    make a few friends along the way.


    ### What to Expect When Building Software


    Earlier in this chapter, we looked at out of the box solutions to help you manage
    devices, manage tickets, manage employees, etc. But you might know more about
    how you think a business should run than thousands of other organizations. No
    really, you actually might. Once you’ve asked yourself if you’re sure about that,
    then you can start to look at building software.


    If you’ve never built software or had software built, it’s helpful to note that
    there are some common truths when it comes to software development (and the people
    that generally build software). If you decide to go down this road, here are some
    tips on software projects:


    *   A project will never have enough people to build all the features you want.
    Period.


    *   As a software project nears completion, the amount of work remaining to do
    rises in proportion to how messy your code is. The more hacks and shortcuts you
    took, the longer that last 1% will take.


    *   Sometimes it’s easier to make a new version than it is to try to improve and
    perfect a previous version. Never be so in love with you code that you can''t
    erase it all and rebuild it again.


    *   Every year you get better at writing code, so end up getting embarrassed by
    how crappy your code was and how you just want to rewrite all of your projects.
    Assuming you’re actually getting better.


    *   Less features means fewer defects.


    *   More developers mean more merge conflicts. Moving to larger teams doesn’t
    necessarily mean a comparable increase in productivity.


    *   As projects grow, you can’t QA or unit test every regression possible. But
    you have to try!


    *   The code is never really finished. There are always going to be reasons to
    withhold this or that. But you have to keep shipping!


    *   Who cares what methodology you’re using, just be deliberate! Kanban, Scrum,
    Extreme Programming, etc. They’re all basically the same. What matters is that
    the team is on the same page.


    *   Not nearly enough project managers plan for holidays, vacations, and sick
    time in their project plans.


