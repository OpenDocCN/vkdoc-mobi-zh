  trans: '

    ### 按小时计费的报价


    如果你的报价是按小时出售你的时间，那么你的任务相当简单。但真的如此吗？你想做什么类型的工作？例如，我认识几位顾问，他们单靠为富豪名流的家中苹果设备提供服务就过上了相当惬意的生活。同样，我也认识很多只会前往公司企业、绝不踏入私人住宅的顾问。请记住——我会反复强调，让你铭记——做让你快乐的事，你便会找到成功。也可能不会。但至少你不会感到痛苦！


    你已经设定了一个小时费率。但让我们通过回答这些问题来确保你考虑周全：


    -   **差旅**：你向客户收取差旅费吗？还是将差旅成本包含在小时费率里？你是按小时收费并加上一小笔上门费吗？请记住，如果你不事先说明打算如何处理，那么你极有可能将一半的时间花在飞机上或在你的服务区域内驱车奔波，却没有得到相应的报酬。


    -   **服务范围**：你处理服务器吗？防火墙呢？那种非常非常大的防火墙呢？你为客户编写脚本或代码吗？你愿意开车去修打印机吗？在创业初期，许多人会做客户愿意付钱让他们做的任何事。但你在咨询生涯中越早选择限制自己从事的工作类型，就能越快地找到你的利基市场和聚焦点，以及可以双向推荐业务的合作伙伴。


    -   **计费方式**：你对按时计费的工作提供保修，还是对持续解决问题另行收费？


    -   **付款条款**：你打算给客户开发票、预先收款，还是在客户用完他们想购买的小时数或天数后接受信用卡付款？如果开发票，是否需要先有采购订单（`PO`）？如果不是预先收款，你会提供什么样的付款期限？


    这些事情很重要，因为它们会影响报价。如果你需要预先每小时多收`10`美元来覆盖这些成本，那么你需要提前知道这一点。那么，如果你按你预期的费率卖出了你 40%的时间，你能赚多少钱？


    > **注意**：如果你在工作完成前收费，请确保在你实际交付客户付款所购买的服务之前，不要动用这笔钱。


    ### 预付费服务报价


    预付费服务通常类似于按小时或按天计费的报价。客户付钱给你，是为了购买你的时间。但他们承诺的是每月支付固定的小时数或天数。


    -   超出部分是否通过下个月收取更多费用来处理？对于超出预付费包的小时，你会收取比包内小时更高的费率吗？是否需要客户公司的特定人员批准超时使用，还是任何人都可以致电请求服务？


    -   预付费时间是否必须每月用完，还是可以一直累积，直到客户取消合同？时间什么时候过期？请记住，在真正赚到钱之前就花掉它是个坏主意，即使客户已经付清了所有款项！


    -   客户最多可以累积多少时间（比如其年合同额的 2 倍）？


    -   谁有权使用你的服务？请记住，你正在签订一份长期合同，所以在让任何人随意购买你的服务之前要谨慎。


    -   **差旅费用**：与按小时计费合同的论点类似，对于承诺预付费服务的客户，你会免除差旅要求吗？


    -   合同期限是多长？如果客户在合同期限结束前离开，会发生什么？为了获得更多业务和更长的合同期限，我总是愿意给客户提供更高的折扣。


    预付费服务是从按小时计费的新创公司迈向建立可预测、长期收入的好方法，这种收入通常能让你有足够的底气去招聘一些人。但处理小时数和超时问题的起起落落，最终可能会成为障碍。有些人已选择迈向下一步——托管服务。


    ### 托管服务报价


    托管服务是一种全包式支持合同。在制定报价时，你可以自行选择“支持”的具体含义。但托管服务关注的是**结果**，而不是时间——这与前两种报价类型不同。


    > **注意**：在开始写这一部分之前，我想坦诚地说一件事：我不喜欢那些试图基于时间模式来限制服务的托管服务报价。使用 MSP 服务时，客户希望成本可控且可预测。如果你做不到这一点，那么我怀疑你的产品不会像你想象的那样好卖。


    由于托管服务对不同公司可能意味着不同的事情，让我们看看它对你意味着什么，这将决定你如何构建你的报价。以下是一些你需要问自己的问题。当你阅读这些问题时，请确保你的报价包含了每一个问题的答案，而这些答案很可能体现在客户将要签署的实际合同中。


    -   你的服务范围是什么？你将支持哪些设备，哪些用户可以致电或使用你的服务？


    -   报价的持续时间是多久？如果客户签订了 3 年合同，你会给每台设备额外优惠`5`美元吗？


    -   支持时间是多久？


    -   服务水平协议是什么（包括支持时间窗口内和窗口外）？请记住，在托管服务合同方面，一切都可以协商。


    -   工单是如何创建的？客户只能打电话，还是必须使用表格来创建工单？


    -   你的报价是否包含“上门服务”，还是仅限远程支持？


    -   你期望客户使用多少自助服务？你会投资于“零级”资产或允许客户执行预置自动化的工具吗？这些应该有助于降低成本，但客户会真正使用它们吗？


    -   客户能否将硬件（更多内容见第 2 章）和/或租赁服务与你的服务捆绑在一起？


    -   你将如何监控设备？如果你不监控，怎么能声称达到了客户的期望？如果监控，你如何应对设备上的事件？但更重要的是，你能否通过监控工具自动创建工单，然后让脚本解决工单、关闭工单，并给使用该设备的人发送电子邮件，告知设备已修复？因为如果你能做到，你刚刚省下了多少钱？！


    -   在定价时，你是否考虑到了你最终需要经理、总监来管理经理等层级？


    托管服务最关键的一个方面是严格管理范围。或者，你也可以不设定任何范围之外的服务。我见过一些 MSP 将带宽、软件、设备租赁以及高级首席技术官式服务都包含在他们的产品中，并且仍然根据客户拥有的用户或设备数量来定价。通常，这类服务的起价至少是其他
    MSP 业务标准设备费用的两倍，但 MSP 可以利用规模采购的优势以及管理同质化技术时降低的成本，在为客户提供优质产品的同时挤出更多利润。


    请记住，如果你选择不将升级服务包含在报价中，你仍然可以单独为此收费，即使你并未试图包揽一切。为此，你通常需要提供一份`SoW`。当你与客户已经建立了托管服务关系时，为`SoW`提供资金的最常见方式是使用本章前面介绍过的固定费用合同。

    '
- fmt: '### The Fixed-Fee Offer


    Really, this is called a `SoW`. If you do the same `SoW` for multiple companies,
    you can think of it as a solution instead. Because you’re in a close-ended relationship
    with each customer that lasts the duration of the `SoW`. You can provide a `SoW`
    that estimates hours as well, but when we work with more and more mature customers,
    they will want a fixed deliverable or set of deliverables.


    Every `SoW` should have the following sections, even if they’re short:


    * **Title Page**: I like to put the customer’s logo and my own logo on the title
    page.

    * **Scope**: What are you going to do for the money you’re being given?

    * **Expiration**: How long is the offer valid for? You know, because you don’t
    want a customer trying to award a job 5 years later, after you don’t do that type
    of work anymore.

    * **Customer Responsibilities**: What does the customer need to do (other than
    pay you) in order for you to build the solution the customer is paying you for?

    * **Deliverables**: A clear list of what the customer can expect as an outcome.
    This is different from the scope in that it’s to set expectations, not the work
    that will be done to meet those expectations.

    * **A line to sign off**: I’ve seen dozens of acronyms for this, but there should
    be a line at the bottom that says something along the lines of “this work is done
    and we both approve that the matter is closed.”


    Ultimately, the fixed-fee contract can have challenges. If a customer asks your
    team to do things outside the scope of the agreement, then a conversation needs
    to happen before that work commences. Otherwise, once you start work that is “out
    of scope” you might end up owning additional projects without being able to bill
    for them. You might also estimate the time incorrectly when writing a bid and
    end up having to eat overages. This is all part of growing your institutional
    knowledge of how to estimate, and people go through it in every industry that
    provides a service for a fixed cost. While there are challenges, though, working
    with customers under a fixed-fee contract is likely one of the easiest of all
    billing types–as nothing should be open-ended.


    ## Build the Contract


    Once you have a solid offer that is easy to talk about on an elevator, you can
    then put that in writing–and thus make it impossible to talk about in an elevator.
    Doing so means that you are creating a legally binding contract that customers
    will sign. Many don’t use contracts when they first start out; all use contracts
    as they mature. You need to protect yourself from levels of liability (see the
    section on E&O Insurance in Chapter [4](#469405_1_En_4_Chapter.xhtml)).


    Here are a few sections that should be addressed in every services contract:


    * **Definition of services**: Define the services that are included in the contract.
    This includes the specific deliverables, as well as any details that shape those
    deliverables or tasks that need to be included as part of the deliverables.

    * **Scope**: The Scope of Work, or `SoW`, is a list of the tasks that you’ll be
    doing for the customer. The more detailed, the better. I’ve met some people that
    like to skimp on this section as they’re afraid a customer will shop an `SoW`
    around. If that happens then so be it. I’d rather have another vendor be on the
    hook for a customer who’s only shopping around for the cheapest solution anyway.

    * **Term of agreement**: Show how long the contract will be enforced. If you’re
    selling an annual managed services contract, then you’ll want to call out that
    the customer will be bound to pay for the services described in the contract for
    1 year.

    * **Fees and payment schedule**: Define how and when the customers will pay you.
    Standard terms are usually 30 days from the completion of services for the month.
    You can negotiate for a better payment schedule, but in my experience, you might
    not actually get paid on the better schedule if the customer already does check
    runs monthly or something like that. Note that you don’t want to be a pain in
    the accounting department’s butt.

    * **Taxes**: Indicate who pays the taxes, where taxes will nexus, and make note
    of any tax exemptions (e.g., film industry taxes in Los Angeles, tax exemption
    for non-profits, and other areas where taxes are different for a given customer
    than for others).

    * **Coverage Times**: What times of the day are customers allowed to call the
    help desk as a part of the managed services contract? If you have hourly customers,
    when can they contact you for support? Are there added charges for after-hours
    support? If a customer can end up getting billed more, then reference who is allowed
    to accept those charges.

    * **Exclusions**: Define specifically what is not included in the contract. If
    you only support a certain set of applications as a part of a managed services
    agreement, call out which apps you support. If it’s a fixed fee contract, specify
    that unless a task is explicitly listed, it is not included, and then list any
    requirements that you need in order to complete the project.

    * **Service Level Agreements (SLAs)**: An `SLA` is important for managed services
    customers. It lays out things like response and resolution times and often includes
    penalties for not meeting those targets. I’ve always felt as though an `SLA` is
    important for hourly and project-based customers as well, to help set expectations
    with customers.

    * **Problem Management**: You could also call this conflict management. It doesn’t
    really have to mean getting legal, but it could. I prefer to have an escalation
    tree that goes from an account manager to a manager, director, vice president,
    principals, etc. I find that telling customers who to call when they have problems
    is better than customers just having to guess. And when customers call the wrong
    person, I never like to correct them unless it becomes a problem; they’ll figure
    out who the right people to call are based on who’s actually able to solve their
    problems.

    * **Confidentiality**: Sometimes you or the customer can’t discuss projects. It’s
    best to define that. And if you have a deliverable that can’t be shared, define
    that as well.

    * **Limitation of Liability**: You’ll usually want to define a limit of the liability
    equal to that covered by your insurance.


    You can find a sample agreement in *Appendix C: Sample Services Agreement*, also
    available at [`https://community.spiceworks.com/how_to/2401-it-consulting-contract`](https://community.spiceworks.com/how_to/2401-it-consulting-contract).


    We’ve all heard the jokes about the accused who decide to represent themselves
    in court. The same is true with those contract templates you downloaded off the
    web and then sent to a customer. Have a lawyer review your contract before you
    send it to customers. And then have the lawyer validate each subsequent update.


    When you’re small, you can use a service like `LegalZoom` or your mom’s brother’s
    uncle’s sister’s kid, the paralegal. But remember that when you flippantly e-mail
    that contract to a dozen potential customers, you are entering into a binding
    legal agreement. But it’s a low-cost way to get legit. Try to keep this mantra
    of doing things on a budget, whether it’s legal, marketing, or PR.'
