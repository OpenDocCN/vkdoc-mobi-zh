  trans: '

    # 自动化服务


    请务必谨慎。如果你不够细心，本章迄今为止讨论的所有自动化内容可能会变得极其复杂。如果你无法快速解释你的业务是如何运作的，那说明存在问题。当然，除非你经手的是数十亿美元的合同。


    同时，不要忽视人的因素。在本章的“延伸阅读”部分，我推荐了盖伊·川崎所著的《魅力》一书。原因在于，当你通过实施自动化来削减成本时，重要的是要意识到你正在减少与客户的接触点。客户可能完全不知道你为维护其系统稳定所做的出色工作。因此，可以通过自动化方式发送通信，让他们看到你为每个已解决的问题生成的服务工单，但无论如何，你仍需定期与客户举行例行会议。


    一旦你尽可能地实现了自动化，请花时间在这些客户身上，只为提醒他们你有多重视他们。这不仅有助于你留住客户，还能让你更深入地理解他们的需求。最重要的是，在此过程中你或许还能结交一些朋友。


    ## 构建软件时应注意什么


    在本章前文，我们探讨了现成的解决方案，用于帮助你管理设备、工单、员工等。但你对业务应该如何运作的理解，可能比成千上万个其他组织更深刻。不，真的，你或许确实如此。一旦你自问过“你确定吗？”，就可以开始考虑构建软件了。


    如果你从未构建过软件或委托他人构建过软件，了解软件开发现实（以及通常构建软件的人）中的一些普遍规律会很有帮助。如果你决定走这条路，以下是关于软件项目的一些建议：


    *   一个项目永远不会有足够的人来实现你想要的所有功能。句号。

    *   随着软件项目接近完成，剩余的工作量会与代码的混乱程度成正比增长。你采取的临时解决方案和捷径越多，最后那 1%所花费的时间就越长。

    *   有时，创建一个全新版本比试图改进和完善旧版本更容易。切勿对你的代码过于钟爱，以至于无法将其彻底删除并重建。

    *   每年你都会在编写代码方面变得更好，以至于最终会为自己代码的糟糕程度感到难堪，并只想重写所有项目。前提是你真的在不断进步。

    *   功能越少，缺陷也越少。

    *   开发人员越多，合并冲突就越多。扩大团队规模并不一定意味着生产力会成比例提高。

    *   随着项目增长，你无法对每个可能的回归问题进行质量保证或单元测试。但你必须尽力尝试！

    *   代码永远没有真正完成的时候。总会有理由保留这个或那个。但你必须持续交付！

    *   谁在乎你使用的是什么方法论，只要深思熟虑就行！`看板`、`Scrum`、`极限编程`等等。它们本质上都差不多。重要的是团队要达成共识。

    *   几乎没有足够的项目经理会在项目计划中考虑到节假日、年假和病假。

    *   优秀开发者难寻。但请耐心等待，否则你可能会因为招到破坏团队凝聚力的人而陷入困境。

    *   团队绩效越高，团队成员对水平不高的成员就越感到不满。

    *   大多数开发者在开始时并不具备领域知识（即他们为之编写软件的领域的知识）。一旦开发者获得了领域知识，他们就能编写出更好的软件，并且需要的具体客户故事也更少！

    *   除了每天几分钟的会议之外，会议的投资回报率绝对为负。

    *   技术债务永远存在。永远。


    你实际上可能为客户构建软件。这是向客户交叉销售附加服务并提供更多价值的绝佳方式。你构建的软件也会让你与客户的联系越来越紧密。特别是当需要填补苹果平台软件缺失的空白时，软件开发很容易最终贡献你年收入的大约三分之一；因此，如果你尚未掌握这门手艺，请深思熟虑。并且，也要阅读相关的书籍！


    ## 客户记分卡


    关键绩效指标（即 KPI）是用于评估客户环境中某项要素健康状况的度量标准。这个要素可能是客户的网络设备部署、苹果设备管理、利用社交媒体触达客户的方式等等。我们不想将复杂的图表交给客户。因此，我曾见过一些公司使用贵金属、火箭、漫画人物等机制来轻松报告客户环境的健康状况。


    许多公司也将展示 KPI 的方式称为健康检查。我见过一些组织使用净推荐值（即`NPS`）作为衡量公司健康状况的基础。


    让我们看一个例子。假设你进行了一项调查，收到了 1000 份回复。如果 100 份回复来自贬损者（评分在 0-6 范围），300 份回复来自被动者（评分在
    7-8 范围），那么剩下 600 份来自推荐者（评分为 9-10）。我们来计算一下，用推荐者的 60% 减去贬损者的 10%，得到总分 50。


    我会说，你还有工作要做，但即使得分是 10，我也可能会这么说。任何高于 0 的分数都被认为是好分数，而超过 70 分则是世界级水平。我会把 50 分左右评为优秀分数。如果你在查看银行账户余额后只想关注一件事，那就看这个分数。但如果你想更进一步，我建议收集一系列
    KPI，并将它们放入一个平衡计分卡中。


    ## 平衡计分卡


    平衡计分卡（简称`BSC`）通常被称为`4x4`。这样称呼的原因是，它包含四个类别，每个类别有四个支撑属性，可以让你一目了然地了解业务状况。这让你比仅使用`NPS`获得更多的洞察，并且通常可以轻松地进行深入分析。我上大学时第一次开始使用它，并在整个职业生涯中一直沿用。我总是从财务列开始。

    '
- fmt: '### Financial


    Ultimately, every business, or business unit, is judged on a financial outcome.
    Not including a column with financial metrics is a mistake, no matter what employees
    or teams may think. Whether the financial column shows good or bad news, the more
    transparent you can be with the staff, the more they will understand how their
    performance will impact the performance of the company. I have heard arguments
    that staff will leave in the lean times. But that’s fine; keep in mind that while
    good employees are one of the hardest things in business to find, loyalty is certainly
    a big part of being a “good employee”.


    Let’s look at some metrics I like for the financial section of a BSC:


    - **Contract renewals**: Earlier, we mentioned Net Promoter Scores, which is where
    customers tell you how willing they would be to recommend your company to others.
    But the thing I like about contract renewals is that this is where customers vote
    with their pocket book. Having said that, if you have a high renewal and a low
    NPS, customers likely feel trapped with your company, which is a problem. You
    can only do crappy work for so long.

    - **Growth in existing customers**: The business needs to grow. Bringing in new
    customers is important. Keeping customers is also important. Growing business
    within existing customers is a key metric that shows you how you’re doing to nurture
    the trust in existing customers.

    - **New customers**: The thing about net-new customers is that this tells you
    how attractive or easy to find you are to your market. This is where you spend
    on sales and marketing, as well as how you’ve done building your service product
    are displayed in your BSC.

    - **Gross margin**: The nice thing about looking at margins is that they cover
    operational expenses. If you aren’t careful, you can easily spend more than customers
    are worth to obtain and maintain them.


    Other metrics I’ve seen included, which usually address a problem that is time
    bound at organizations, include accounts receivable and accounts payable. Both
    of these can be put into a single attribute like cash flow, but this is where
    I usually draw the line around what I want to share with employees, as it’s often
    too much information. Yes, transparency is good, but there are certainly places
    that you have to draw the line (I also include salaries in this category – even
    though salary transparency is an increasingly important topic and not consistent
    amongst international organizations).


    ### Note


    I like the concept of salary transparency because it has such a great impact on
    diversity, leveling, etc. If it were up to me, overnight, every company in the
    world might just publish every salary on the interwebs. But it’s not. And unless
    everyone does this, then it’s hard to say what might happen. But whatever the
    impact to your staff, I’m behind ya’, if you choose to do it, provided of course
    that your salary is one of them!


    ### Customer


    Financial is the easiest big-picture item on a scorecard. But in my experience
    the item likely to drive future movements of that entire category of the scorecard
    is customer happiness. What is happiness? Usually it’s your organization doing
    good work, providing value, communicating well, and being consistent in the delivery
    of your services. Let’s look at some of the components I like to include in the
    customer section of balanced scorecards.


    - **Net Promoter Score (NPS)**: The NPS is described in the previous section,
    but surmise it to say that this is an industry standard and one of the most critical
    metrics that I believe all organizations should track.

    - **CSAT**: Customer satisfaction, like NPS, is a simple score. Here, you ask
    customers to rate your performance. My preference is when users close a ticket.
    This type of feature is built into most service desk solutions at this point and
    provides customers with the ability to rate your performance on the fly.

    - **Median Time to Close (MTTC) tickets**: How long, on average, does it take
    you to close tickets. Make sure to break that down categorically, given that each
    might have a different Service Level Agreement (SLA). Given that times change,
    and that specific customers can basically buy better SLAs, one way I like to do
    this is to simply look at how frequently you meet the SLA. For example, if you
    opened 390 tickets in June, what percentage were assigned and then closed on time?

    - **End User Ratings**: This is tricky. Most companies either survey end users
    or they survey their contact at a customer (this tends to align with the size
    of the fleet of devices being supported). Have the end users and your customer
    contacts rate your performance.


    Customers should be happy. But you need to run an efficient organization. In support
    of this, we’ll look at internal processes in the next section of the Balanced
    Scorecard.


    ### Internal Processes


    Internal processes are there to provide that consistency factor to customers,
    control costs, and give you the ability to keep taking on new customers with a
    wider and wider profit margin as you grow, while maintaining a consistent high-quality
    service. Some process attributes I like to look at include the following:


    - **Time to Patch**: How long between the time a piece of *supported* software
    is released until the time it shows up on a computer. This can be tough. I mean,
    what happens if the software is buggy and you decide not to deploy it across the
    fleet of computers you manage?

    - **Calls Due to Patches**: I’ve never seen anyone else track this, so I might
    just be crazy, but to me, the only way to properly reduce the amount of time to
    patch systems is to automate that process. And if you’re automating it, you need
    to reduce the impact of said automation on your customers. Tracking the impact
    of that automation is then critical to tracking the effectiveness of your efforts.

    - **Tickets closed from automation (not included in MTTC)**: I started including
    this a few years ago. The old t-shirt that says “I will replace you with a very
    small shell script” isn’t exactly the point. The point is to be able to free intelligent
    and driven staff from having to perform menial tasks. For every one of those tasks
    that can be completed automatically, there is time for your team to take on other
    tickets, or better, to innovate the business.

    - **Percentage of Tickets Closed Remotely**: Similar to closing tickets with automation,
    you want to keep butts in chairs. Travel time is expensive and stressful. Tools
    like `LogMeIn`, `TeamViewer`, `PCAnywhere`, and `Bomgar` help you access systems
    remotely. Customers and staff might push back on how much you want to use these
    tools. Handle those objections, as the higher this number gets, the more profitable
    your organization can be, long-term.


    I then always save something about the long-term performance of the company for
    the end. Additionally, I’ve seen people include things that are purely operational
    like the number of tickets closed within a given amount of time, the amount of
    labor spent to close tickets, the number of total tickets opened (usually for
    managed services customers), how quickly mileage or expense reports are turned
    in, and other very short-term issues that good systems will help you resolve instead
    of constantly sweating the small things.'
