    ### 为什么需要销售方法论


    企业需要高效、创新且独特，才能争取到新客户。你还需要优质的产品来获得品牌认知度并建立客户忠诚度。但如果一开始就没人使用你的产品或服务，你就永远没有机会建立这种忠诚度，以及随之而来的、来自满意客户的神奇口碑。我交流过的大多数企业，仅仅将被动营销和口碑作为唯一的销售工具。因此，每笔成交的销售都至关重要。不，更准确地说，成交每一个合格的潜在客户才是关键。


    许多人认为，如何达成销售交易是提升销售额和推广业务最重要的影响因素之一。完成小规模销售交易更容易，所需的规划也更少；而大额交易则需要更多努力和周密的规划。成交那些不适合你业务的商机，会浪费大量时间处理不满意的客户，同时还会招致一些尖锐的批评，这可能会让任何听到这些批评的人在未来难以与你合作。但销售流程正是你设定基调的时刻，它决定了成功的客户互动应该是什么样的。


    成长型企业的常见痛点是构建可扩展的销售模式。大多数企业起步时，都是创始人亲自推销自己和产品。那些对自己事业深信不疑的人通常能够卖出产品，仅仅因为他们的心血和汗水对客户具有感染力。但当第二个销售加入公司，接着第三个、第四个呢？通常的下一步是尝试培训其他人，让他们完全像你一样销售，用你所说的同样的话术和标语。如果这奏效了，那很棒！但它并不总是有效。建立销售团队关乎新销售与客户之间直接的关系。为了武装你的新团队，你可以利用几十年来积累的销售信条，借助已有的方法论及其相关流程，而不是重头开始编写销售手册。


    每家企业都渴望成功。如果你拥有一个充裕的销售管道，并能实际完成交易，那么你已经开了一个好头。为你的客户、产品和理念找到合适的销售方法论组合，能帮你节省时间，让你的新销售团队走上正轨，使你及后续的销售管理层能够汇报销售管道情况，并能在任何阶段加入销售对话，为新一代销售人员提供有益的指导。


    ### 选择方法论


    目前有哪些顶尖的销售方法论正在被使用？你选择的方法论应与销售人员和客户双方的个性相匹配。如果你还没有招聘任何销售人员，那么请把重点放在你自己（作为销售者）和客户身上。在起步阶段，使用现成的方法论会对你有帮助。同时，保持开放心态学习新的策略，无论你在此之前取得了多大的成功。


    在接下来的几节中，我们将简要介绍当今最常用的几种销售方法论。我们还会在每节的“延伸阅读”部分提供一个相关书籍的链接。


    #### 目标客户销售法


    目标客户销售法已使用了超过 25 年，是销售界的标准，超过 650 万销售人员接受过培训，将较小的客户（或大型组织中的较小群体）转化为更大、更稳定的客户。目标客户销售法将大交易分解成更小的部分。通过在销售周期的全过程中运用战略规划，目标客户销售法淡化了客户账户中的政治因素。


    目标客户销售法之所以流行，是因为能够通过 Salesforce 实现整个销售流程自动化，使其更容易、更简单地与现有工作流程集成。培训员工掌握目标客户销售法的成本很高，但你招聘的大多数有经验的人通常已经熟悉了这种方法论。


    #### SPIN 销售法


    当尼尔·雷克汉姆在 1989 年写下《SPIN 销售法》这本书时，我怀疑他是否知道几十年后它仍会被使用。“SPIN 销售法”这个名字总让我想起莱昂纳多打电话推销垃圾股。这个名字本身就感觉像是许多销售人员口碑不佳的原因。但这并不意味着它一定是一种糟糕的方法论（如果我觉得它不好的话，我当然不会把它列在这里）。


    SPIN 代表 `情境` (Situation)、`问题` (Problem)、`影响` (Implication) 和 `需求回报` (Need-Payoff)。你通过提问来分别了解买家的情境、问题、后果和需求。SPIN
    销售法要求相当出色的沟通技巧，有时它看起来更像是一种沟通技巧，而非销售方法论。事实证明，SPIN 销售法是一种极好的技巧，能以尽可能简单明了的方式吸引更多客户。在这种方法论中，销售人员接受培训，根据客户的选择和偏好来提问，从而揭示其组织的需求。这在理论上建立了信任，并帮助你将自己的解决方案与你提供的服务和产品对齐。


    这种方法论没有具体的步骤来揭示客户的需求和期望，但它确实有助于维护牢固的客户与销售代表关系。这是一种非常经典的销售方法论，最适合用于规模较小、更具交易性、且购买过程中利益相关者不多的销售。


    #### SNAP 销售法


    我想把这两个首字母缩写的命名法放在一起介绍。吉尔·康拉斯在 2012 年提出的“SNAP 销售法”基于一个非常非常大的假设：每个人都和作者一样忙碌和“疲惫不堪”。其目标是通过做到
    `简单` (Simple)、`不可或缺` (iNvaluable)、`与客户需求对齐` (Aligned) 以及与客户需求对齐以及成为客户的 `优先事项`
    (Priority) 来加速销售流程。部分重点在于“进入”客户的头脑。这是一本很好的、易读的书。至于我是否会将其作为整个公司的方法论实施，很可能取决于我正在进行的销售类型。例如，`P`
    代表 `优先事项`。如果你销售的东西不是客户的优先事项，你能让它成为优先事项吗？如果不能，那就放弃。我不认为这适用于涉及非常复杂交易的大规模外包选项。因为实际上，那样你就只剩下
    `SNA`（简单、不可或缺、对齐）了。


    始终保持相关性是一个挑战。但对我来说，这本书最重要的部分是它所展示的价值链，而不是方法论本身。每个做销售的人都应该读一读，即使销售部门不把它当作方法论来使用。

    '
- fmt: '#### The Challenger Sale


    `The Challenger Sale` was a result of a pretty massive research project by Matthew
    Dixon and Brent Adamson, which resulted in a book called “`The Challenger Sale`.”
    “`The Challenger Sale`” breaks sellers up into five buckets: Relationship Builders,
    Hard Workers, Lone Wolves, Reactive Problem Solvers, and Challengers. The Challengers
    are the more successful today, given the prevalence of large sales in large (“Enterprise”)
    environments.


    Instead of unraveling the needs and demands of the customers, the `Challenger
    Sale` methodology is used to build consensus in larger teams that are comprised
    of many levels of stakeholders, common in today’s business climate. `The Challenger
    Sale` simply challenges the customers by making them aware of the pitfalls within
    their industry. By delivering a static message to all decision makers, you can
    also help guide them by challenging the customer to see their needs in a different
    manner that aligns with your value propositions.


    Challengers teach customers and customize their message, taking control of calls.
    `The Challenger Sale` then requires a seller research market trends and customers’
    preferences so they stand out. It does have a drawback in that it does not aid
    any kind of automation tool as it has no clear strategy for handling large sales,
    but instead turns the process into bundling large, complex solutions. However,
    despite this drawback, it has proven to be quite a successful strategy since its
    conception in 2011, as it is a response to today’s educated and online buyer because
    it challenges them to allow you to provide coaching and be prescriptive instead
    of discovering their needs and offering them solutions. `The Challenger Sale`
    is very popular among highly technical companies (e.g., software companies) with
    large salesforces.


    #### Value Selling Framework


    Developed in 1991, the `Value Selling Framework` creates a repeatable process,
    or map, based on customer buying processes. By building a process, rather than
    customizing each deal, you need less management so you can focus on the basic
    sales skills with team members. Having said this, there’s more documentation required,
    including qualification, asking documented questions to better understand needs,
    mapping each opportunity to each of your product’s capabilities, and then building
    out a plan to close each opportunity.


    #### Solution Selling


    `Solution Selling` was the first methodology that I ever received training on.
    Basically, sell a solution, rather than a product. Since released by Mike Bosworth
    in 1988, this has been a foundation for a number of other methodologies as well.
    And it was a reaction to a shift into a lot of different vendors starting to sell
    solutions that were much more complicated than they had ever before been.


    `Solution Selling` provides a deeper insight into today’s mature and informed
    buyers. This methodology has evolved over time (many haven’t) based on a large
    network of trainers that help the methodology keep pace with complex and rapidly
    changing business climates, as well as based on the fact that dealing with change
    is built into the DNA of the methodology overall.


    #### Conceptual Selling


    From Robert Miller and Stephen Heiman, `Conceptual Selling` focuses on the buying
    process and managing the stakeholders involved when selling to a given organization.
    This means you need to focus on listening and be good at gathering information.
    While gathering information, you provide the relevant information for your products
    and services and leverage that to gain commitment at each level of the potential
    customer’s organization. The reason all of this works is that you don’t buy a
    specific product or a specific service, but instead buy the concept that the offering
    represents.


    This means asking questions that fall into five categories.


    - **Confirmation**: Review any information you’ve obtained.

    - **New Information**: Explore exactly what the customer would like to achieve
    (e.g., deliverables).

    - **Attitude**: Understand what connection the stakeholders have.

    - **Commitment**: Understand how far the customer can go, or how much commitment
    they have to seeing the sale through to completion.

    - **Issues**: Look for roadblocks in the sales process.


    As with all of the methodologies, the important thing here is to listen. Listening
    to the customer, you understand what they need, and can break their needs and
    status down into like categories, etc.


    #### The Sandler Selling System


    Developed in the late 1960s and early 1970s by David Sandler, the `Sandler Selling
    System` is franchised and boasts over 250 offices and is taught in 23 languages.
    `Sandler` starts with uncovering the needs of the customer and then tailoring
    a pitch based on their needs. Well, pretty much all of the methodologies start
    with that, even though most of the calls I’ve sat in on involve a sales rep launching
    into what it is about their product that’s so great. Maybe they pretend to listen
    to what I need first, but often not even that.


    Because `Sandler` was developed in the 1960s, it’s got a focus on people. I like
    to think of it as a Zig Ziglar-esque methodology (we’ll link to Ziglar’s books
    in the Further Reading section of this chapter, as it’s a must read for anyone
    in sales). But, where it differs from most other methodologies is what comes next.
    `Sandler Sales` has more emphasis on bilateralism than any other methodology.
    It’s about having two parties (the buyer and the seller) equally invested in the
    sales process. This is done by having your reps bring up the roadblocks to completing
    sales early, providing the customer with options and assistance in overcoming
    those obstacles. While this doesn’t completely end up with a bilaterally equal
    investment, it does allow you to show that you’ve put skin in the game and aren’t
    going to waste the time of the customer and of your organization in a deal that
    can’t close. Think of this as a bit of reverse psychology: the potential customer
    basically ends up convincing themselves to buy by investing the time in getting
    the seller’s obstacles removed.


    Many a high-tech company has a complex product to sell, but those in that industry
    are often leerier of slick sales tactics. `Sandler` is the most mature of the
    methodologies, and with an emphasis on looking and acting professional, selling
    HR and business solutions into large organizations really works. And parts of
    `Sandler` work in high-tech nerdy engineering, but other parts do not. As with
    other methodologies, choose which parts work well for your organization, but when
    choosing `Sandler`, take a keen eye on your target audience, and how they may
    interpret some of the behaviors as manipulative. By being cognizant of that potential
    interpretation, you can make sure not to promote behaviors in your team that aren’t
    taken the wrong way.


    #### MEDDIC


    `Meddic`, from Jack Napoli, as with many great things, hails from the era of Kurt
    Cobain. It stands for Metrics, Economic Buyer, Decision Criteria, Decision Process,
    Identify Pain, Champion. Here, we’re enabling sales teams to be effective by helping
    to compose a plan to close each deal. With good automation in place (e.g., Salesforce
    integration), you can direct the best person to each customer and help them with
    messaging by having managers be prescriptive in making a consistent delivery of
    the sales methodology. This involves time spent in a qualification stage, reviewing
    key messaging, and then working with the customer. If you’re interested in really
    tight control of your pipeline, this may be the best methodology for you; however,
    many may find the amount of time it takes to prep each customer, combined with
    the required documentation, to be too labor-intensive.'
