  trans: '

    ### 服务等级协议


    服务等级协议是一种合同义务，表明你将达到某种服务水准。在 SaaS（软件即服务）或服务器环境中，这种服务通常以正常运行时间来衡量。但在托管服务或咨询环境中，服务等级通常根据基于工单严重级别解决工单所需的时间来衡量。一些组织也会关注客户满意度，例如达到某个标准指标，如净推荐值。


    当客户对你双方组织之间的合同不满意时会发生什么？很可能你会有严厉的措辞：如果客户想提前终止合同，他们必须支付合同的余额。如果你没有定义服务等级，以及未达到这些服务等级的补救措施，那么这种二元强制执行的策略很容易在事情闹到需要法律介入的情况下被推翻。服务等级协议的另一个好处是，你能够提前让客户了解他们应该对你抱有什么期望。


    在接下来的几个章节中，我们将探讨实施服务等级的各种方法。


    #### 服务器正常运行时间


    服务器的服务等级通常最容易衡量和证明。你可以使用监控工具，例如 `MRTG`、`Cactii`、`SumoLogic` 以及其他工具（最显著地包括托管服务自动化工具）。许多组织已经习惯于根据他们能获得多少个“9”的正常运行时间来处理服务等级了。


    计算正常运行时间的公式相当直接；可以简单地理解为 `((一个周期内的总时间 - 停机时间百分比)/时间)*100`。那么，在一个年度合同中，总的停机时间每年将包含以下内容：


    -   99.999%：5 分钟 16 秒

    -   99.99%：52 分钟 36 秒

    -   99.9%：8 小时 45 分钟 35 秒

    -   99.8%：17 小时 31 分钟 12 秒

    -   99.7%：1 天 2 小时 16 分钟 48 秒

    -   99.6%：1 天 11 小时 2 分钟 24 秒

    -   99.5%：1 天 19 小时 48 分钟

    -   99.4%：2 天 4 小时 33 分钟 35 秒

    -   99.3%：2 天 13 小时 19 分钟 12 秒

    -   99.2%：2 天 22 小时 4 分钟 47 秒

    -   99.1%：3 天 6 小时 50 分钟 24 秒

    -   99.0%：3 天 15 小时 36 分钟


    如果可能的话，我建议按季度或年度来评估这些服务等级协议。“5 个 9”或 99.999% 的正常运行时间是极其难以实现的。想象一下，一台服务器重启需要 2
    分钟。这意味着如果你一年运行几次更新，你就违反了服务等级协议。但如果你试图按月来评估这些指标，那么一开始的一个糟糕月份会让你在合同早期就处于违约状态；而如果是年度合同，你就有足够的时间让平均法则发挥作用，使你重新回到良好状态。


    服务器上某项服务的正常运行时间并不意味着节点的正常运行时间。这意味着你可以运行一个监控工具，看到服务器是启动的（它能被 ping 通，你可以通过 `telnet`
    连接到 Web 服务器的 80 端口，等等）。但你可能需要实际尝试加载一个页面才能意识到网站的后端已经宕机了。所以这也应该被监控。此外，节点宕机并不一定意味着最终用户交互的服务（例如网站）也必须宕机。通常，你可以为打补丁和维护窗口非常容易地启动一个集群节点。如果前面提到的
    5 个 9 的正常运行时间数字看起来令人生畏，那么你要么永远永远无法打补丁，要么就必须对系统进行集群化。因此，对于每一个“9”，你应核算（并相应收费）的成本会急剧增加。


    #### 解决时间和平均响应时间


    关于支持终端设备时服务等级协议的一个常见误解是，它们是基于你解决每个工单所需的时间。我强烈建议永远不要基于那种类型的服务等级协议签订合同。相反，应关注你与客户进行首次联系之前的平均时间（通常称为响应时间），或者完成一个工单（或提供解决方案）所需的平均时间。


    许多工单系统都内置了服务等级协议功能。因此，你可以根据工单在队列中停留的时间设置告警机制。如果你是一个人，这相当直接。但随着你的组织成长（如果你选择扩张），你将希望作为即将违反服务等级协议的工单的升级联系人。


    **注意：** 请谨慎使用自动化系统。你可能将诸如 `Watchman Monitoring` 之类的工具连接到你的工单系统，并在出现问题时自动创建工单。我非常喜欢这种设置。但是，假设某个大型软件更新导致所有设备对某个第三方软件进行了错误报告。那么你接下来可能需要去清除所有这些工单，否则你所有的报告都将完全失准。


    #### 净推荐值


    净推荐值是一个介于 -100 到 100 之间的数字，用于衡量客户向他人推荐公司产品或服务的意愿程度。净推荐值被用作衡量客户对产品或服务整体满意度以及对品牌忠诚度的指标。这已成为衡量你与客户关系状况的一个相当标准的方法。许多人认为它过于简单化了，但其要点是，客户推荐你的可能性表明了转介业务对你的效果如何。


    净推荐值背后的数学原理相当简单。给你打 6 分或以下的客户被称为贬损者。打 7 分或 8 分的客户被称为被动者，而给你打 9 分或 10 分的客户被称为推荐者。用推荐者的百分比减去贬损者的百分比，就得到了你的净推荐值。


    一个好的净推荐值很难一概而论，因为它因行业而异。但总的来说，任何高于 0 的分数都是好的，高于 +50 的分数非常好，而高于 +70 的分数则是行业最佳。任何低于
    -50 的分数意味着你真的、真的需要改变做法，因为你已经失去了客户的忠诚度。


    最后，请确保你进行的任何调查，无论是净推荐值还是其他当月的流行指标，都是匿名的。而且你可以设置更多问题以便深入挖掘更具体的信息，但对于你试图运行的任何平衡计分卡或其他测量指标，请务必考虑将净推荐值作为至少一个衡量方面。

    '
- fmt: '#### Remedies


    Without remedies there isn’t much of a reason for an SLA, except to make everyone
    who wants the SLA happy. I don’t like being prescriptive on remedies, as every
    customer is different. But I’ll try to steer you in the right direction in this
    section.


    If you don’t meet a certain level of service, then you have to pay the customer
    back or provide a discount on services. When negotiating penalties, try to do
    so based on future services. This creates a liability for your organization in
    the form of lost revenue; however, it also provides an asset on furthering a contract
    that a customer might not have otherwise signed. I would be hard pressed to find
    myself agreeing to a penalty that results in a refund to a client, unless absolutely
    required to close a deal.


    Let’s consider the following example. You have a customer that pays you $10,000
    per month. You are supposed to respond to tickets within an hour at a minimum
    80% of the time. In a given month you miss that response-time window and only
    make first contact within the negotiated window 70% of the time. An example of
    a penalty might be a 10% credit on future services for every 10% you fell short.
    In the subsequent month, the customer should pay you $9,000.


    Keep in mind that service levels and remedies are negotiable. This is probably
    the last thing that gets negotiated. But high service levels cost more for you
    to provide and so should impact the sales price. Consider as an example the “Fanatical
    Support” service provided by Rackspace. You pay a lot more for your hosting, but
    it’s the Rackspace innovation that saved the company from failing when they dipped
    below 90 days in cash reserves!


    Finally, what happens if you don’t provide a remedy to missing a service level
    that’s defined in a contract? You are in breach of the contract. When you breach
    a contract, the outcome can be left to the whim of a judge or mediator. They could
    choose to simply dissolve the contract or enforce their own remedy. It’s better
    to work everything out proactively.


    ## Does This Pass the Sniff Test?!?!


    We all have those friends who are great at casting doubt on everything. I don’t
    know if you have any purple (or is it grey, or blue) friends with ribbons tied
    to the end of their tail, but think of an Eyore. These types of friends have great
    uses, and this is one. And while many stopped listening to their parents a long
    time ago, it’s never too late to start listening to them again. See what mom and
    dad say as well. After all, if you have an offer, you have the first parts of
    a business plan. And they likely have more business experience than you. And if
    they don’t, they’re wiser. Not to harp on this, but seriously, find a parent (or
    parental figure) to check things out…


    Even if you’ve been in business for a few years, you need close business advisors.
    They are a key factor to the success of any institution (I think I just called
    your company an institution if you’ve made it a few years). Instead of parents,
    it’s time to look at a Board of Directors once you’ve crossed a dozen employees
    (assuming you’re still planning on growing). Why not just pay a business consultant
    for services?


    The Board of Directors comes with contacts. Contacts are the most important thing
    that your fledgling company can have in the beginning. It also comes with guidance.
    Pick others who have found success in parallel industries without picking people
    who are going to compete with you.


    ## Funding Your New Adventure


    Oh wait, if you have an offer then you have the first part of a business plan.
    The next part will be financials. We’ll dig into those deeper in Chapter [4](#469405_1_En_4_Chapter.xhtml).
    But what is it going to take to kickstart your company, or if you’re planning
    on adding a new line of business or offer, what is that going to require?


    Starting a company on a shoestring, often referred to as bootstrapping, means
    you don’t need external capital, other than what it takes to pay your mortgage
    or rent and eat some ramen noodles. Instead, you need elbow grease and to do various
    types of work until you can dedicate your time to your mission. This includes
    things like:


    - Hourly computer repair

    - Potentially working on OS platforms you don’t want to be doing work on (like
    `Windows`, `Android`, or `Linux`)

    - Subcontracting work brought to you from other companies (which is also a great
    way to make contacts)

    - Going outside the geographical boundaries you might have initially set for your
    organization to cover (e.g., expanding into other cities)

    - Taking on completely different work (e.g., if you want to run a development
    company, maybe doing a little switching and routing here and there)

    - A part-time job, such as working at a computer repair company


    Taking capital can help you weather the cash flow challenges you’ll initially
    face (most companies pay on terms rather than up front or biweekly like most employers).
    In time you’ll hopefully end up self-sustaining your company, or you might be
    able to split roles with a day job and run your company for a time to build up
    some savings. In fact, if all goes well, you may end up seeking external capital
    in order to accelerate growth, which we’ll cover in the next section.


    ### Growth Requires Capital


    As you grow, you will eventually seek external capital. You don’t have to start
    off doing exactly what you want to end up doing. But you will find as you build
    revenue that allows you to be dedicated to your goal that investors will look
    for you to actually be dedicating all of your time to that goal. After all, they’ll
    be investing in that, and not your ability to do work on the side. I would recommend
    classifying the various types of work you do and the revenue tied to them from
    the very beginning.


    As you grow, you might actually expand into other areas of your industry. Treat
    each new line of business as though it was its own company. This means that when
    you enter expenses, they should be categorized to the new business unit (or tagged
    if you don’t have multiple charts of accounts), and as you take income, that should
    be similarly classified. This allows you to evaluate each line of business independently.


    ### Note


    You don’t have to take external funding ever! But doing so can help you grow smartly,
    without incurring too much risk.


    One aspect of taking external capital that you should be aware of from the beginning
    is that if you’re growing a managed services business and you’re successful, you’re
    going to run into an interesting problem: success could easily bankrupt you. We
    address dealing with money in far more detail in Chapter [4](#469405_1_En_4_Chapter.xhtml).
    It’s critical to make sure that you’re not just making money but accounting for
    the money properly, for even in the face of massive success, all your hard work
    can be rewarded with running out of cash.


    While we’ll cover investors later in the book, just keep in mind that if you have
    a good business plan and hit the point where you can’t sustainably grow any further
    without investment, provided that it’s a good investment, trust that you’ll be
    able to come up with funds. People love investing in companies that are doing
    well! Just make sure you have plenty of time to source those dollars by watching
    trend lines. And when it comes to sourcing external capital, start with banks–unless
    you have venture capital needs beyond what a bank can get you (e.g., the contacts
    and discipline to run a company in a more rigid fashion).


    ## Conclusion


    Deciding to start a business is a great start. Moving on to the next stage of
    narrowing your focus is critical. And getting into the specifics of what you’ll
    do and for how much is even more critical!'
  raw: '#### Remedies


    Without remedies there isn’t much of a reason for an SLA, except to make everyone
    who wants the SLA happy. I don’t like being prescriptive on remedies, as every
    customer is different. But I’ll try to steer you in the right direction in this
    section.


    If you don’t meet a certain level of service, then you have to pay the customer
    back or provide a discount on services. When negotiating penalties, try to do
    so based on future services. This creates a liability for your organization in
    the form of lost revenue; however, it also provides an asset on furthering a contract
    that a customer might not have otherwise signed. I would be hard pressed to find
    myself agreeing to a penalty that results in a refund to a client, unless absolutely
    required to close a deal.


    Let’s consider the following example. You have a customer that pays you $10,000
    per month. You are supposed to respond to tickets within an hour at a minimum
    80% of the time. In a given month you miss that response-time window and only
    make first contact within the negotiated window 70% of the time. An example of
    a penalty might be a 10% credit on future services for every 10% you fell short.
    In the subsequent month, the customer should pay you $9,000.


    Keep in mind that service levels and remedies are negotiable. This is probably
    the last thing that gets negotiated. But high service levels cost more for you
    to provide and so should impact the sales price. Consider as an example the “Fanatical
    Support” service provided by Rackspace. You pay a lot more for your hosting, but
    it’s the Rackspace innovation that saved the company from failing when they dipped
    below 90 days in cash reserves!


    Finally, what happens if you don’t provide a remedy to missing a service level
    that’s defined in a contract? You are in breach of the contract. When you breach
    a contract, the outcome can be left to the whim of a judge or mediator. They could
    choose to simply dissolve the contract or enforce their own remedy. It’s better
    to work everything out proactively.


