  trans: '

    # 广播广告


    在广播上做广告与在播客上做广告非常相似，但听到广告的是你的父母，而不是你的孩子。这并不是说你不应该在广播上做广告。这是接触决策者的一种好方法。但在选择广播而非播客之前，请考虑这一点：给你打电话的人是在下班回家的路上听播客，还是听广播？如果你认为你的客户（或潜在客户）会收听特定的广播节目，那么你当然应该赞助这些节目或购买广告位。


    如果你确实要做广播广告，不要只购买一个时段。购买广播广告时，请确保每个时间段至少购买三个广告位。因此，如果你选择赞助`NPR`的`Marketplace`节目，请至少赞助三次。可以这样理解：就像你必须把新食物放在孩子面前三次，他们才会真正尝试新东西一样。如果你打算赞助多个节目，请安排好时间，以便你能最好地了解哪个节目带来了新客户。并且务必在你的广告时段中提及一个落地页，例如“由巴尔的摩最佳顾问为您免费评估网络，请访问`mygreatconsultants.com/marketplace`”。


    广播广告并不便宜。而且很难获得针对“暗社交”（如广播）的可量化指标。那么，既然操作起来有挑战，为什么这种媒介依然存在？因为它对某些行业仍然有效。如果你的预算有限，请专注于在线广告。如果你还有余钱，再考虑广播和印刷品等媒介。广播广告的好处在于，许多上班族在上下班途中会被困在车里，对这样一群受困听众进行重复性的“洗脑”，久而久之就能建立品牌知名度。


    # 印刷广告


    最难做好的广告类型之一是印刷广告。如果你不经营销售苹果设备或配件的实体店，那你可能最好远离印刷广告。话虽如此，群发邮件是宣传你业务的一种方式，只是要做好大部分会被扔进垃圾桶的准备。


    印刷广告也有例外。对于在社区内运营的支援公司来说，邀请参加开放日活动是建立联系的好方法。这种邀请方式也可以扩展到电影之夜或其他营销活动。另一个例外是在你与某人会面之后。一张感谢卡是提醒他们你希望赢得他们业务的好方法，尤其是当这张卡片是手写的时候。


    ## 小贴士


    我曾在南部上过礼仪学校。所以我必须告诉你，感谢卡必须在 6 个月内寄出，否则就干脆别寄。


    最后，请让你的印刷广告由专业人士制作。或者，如果你认为自己能做出专业水准的广告，在发出前也请找人审阅一下。


    # 优惠券、促销和特价


    苹果公司几乎从不提供产品折扣券。但你不是苹果。如果你客户源源不断，那么确实没什么理由提供折扣。但如果你刚刚起步或正在创建一家新公司，你可能会发现通过提供某种面向公众的折扣来获得一些新客户是很有用的。


    根据你从事的业务类型，你可能会发现`Groupon`或`亚马逊促销`适合帮你找到一些相当不错的新客户。这些平台的转化率很低。也很少有公司利用这类网站进行商业服务推广，所以可以假定这些主要是消费者客户。


    要打入更大的企业，你可以尝试改为提供年度合同的折扣。但可以考虑在商业期刊、印刷广告、网站横幅广告甚至期刊列表中投放广告。同样，为你选择的每个广告媒介使用一个特殊的`URL`，这样你就可以轻松地通过多种方式追踪其影响。这很关键。假设你的广告获得了数百次点击，但没有产生任何交易。这通常意味着信息传达或定价出了问题。如果你在列表里放了电话号码，却接到了错误的电话类型，情况也会类似，我们将在下一节讨论这个问题。


    # 错误来电


    广告可能产生的一个问题是，你的电话和电子邮件可能响个不停，但他们想要的可能与你所销售的产品完全不同。发生这种情况时，你有几个选择。如果所有来电的人都想要同样的东西，那么你可以选择顺水推舟提供该服务。但如果不是这样，你可能需要调整你的信息，更具体地说明你的业务内容。这是一个“甜蜜的烦恼”，但你需要尽快解决，以免浪费你或公司销售人员更多的时间。


    务必回复每一个联系你的人。首先，这是正确的做法。但如果这还不够，如果你不回复，你可能会给某个将来可能成为潜在客户的人留下坏印象。通常，错误来电都非常相似。因此，为了简化你的回复，可以使用像`Text
    Expander`这样的工具，或在草稿箱中创建一封邮件来自动回复这些请求。这也是寻找供应商的好机会，你可以将这些咨询转介绍给他们。我们在第`6`章讨论过与其他组织建立关系；而现在就是一个与其他供应商建立双向业务推荐的好机会。


    # 市场开发基金


    你很可能在销售产品，或者与某个合作伙伴结盟。许多大型科技公司，如`微软`、`思科`和`苹果`，会为销售其产品的人提供所谓的市场开发基金（简称`MDF`）。向你所有的合作伙伴询问，你能否为一个营销活动申请`MDF`，你可能就能获得活动全部或部分的资金支持。此外，与一家大公司联合营销还能以你单打独斗无法做到的方式，提升活动的可信度。


    大多数`MDF`都会附带一些条件。也许合作伙伴想和你一起参加一个活动。也许合作伙伴想要一份商业计划书。我迄今所见过的`MDF`附带条件，最终都让我发现其价值与基金本身一样宝贵。商业计划书会迫使你在浪费钱之前先思考活动方案。有时，所需的结构化思维会帮助你从一个新的角度考虑问题。让合作伙伴的营销人员和你一起参加活动总是一件好事。你可以更深入地了解产品，如果他们还是销售人员，你甚至可能找到一位能为你介绍业务的好帮手。


    广告没有万无一失的方法，所以总是存在风险。`MDF`可以成为分担活动风险、并在过程中学习更多广告和营销知识的好方法。正是这些点点滴滴，最终将你塑造成一个成熟的商业人士。

    '
- fmt: '# Conclusion


    Advertising should make the phone ring (or these days, I guess, the e-mail client
    ding). You likely cannot have more than two or three people on a sales team without
    advertising. It’s easy to have large amounts of money just get up and walk away
    when buying ads.


    You can easily spend `$5,000` a month on Google clicks, only to get a bunch of
    calls from people who want services you don’t provide. Many a podcast will cost
    `$10,000` to advertise on, and you may have no way of knowing you got a good lead
    from them. If this seems daunting, find a local resource to help guide your efforts
    instead of just going out and buying whatever looks good, or focus on Public Relations.


    There’s no reason not to stay in the “not yet” category that I described earlier
    in this chapter. Don’t let your pride jump in here and tell you that you need
    to be buying up ad space or that you need to hear your ad at the beginning of
    your favorite podcast (unless it’s my podcast).


    It would be better to save wasted advertising spend until you’re ready to spend
    it wisely. But if you are about growing, you will eventually need to spend here.
    And when you do, find someone you trust, because there’s a lot of really well-meaning
    but completely useless organizations in the advertising industry. So as with other
    parts of the business, challenge everything you hear that doesn’t make sense,
    and when in doubt blatantly copy the marketing and advertising brilliance of Apple
    (without, of course, violating their copyrights)!


    ## Further Reading


    - Keeping Up With The Quants, by Thomas H. Davenport and Jinho Kim [`https://www.amazon.com/Keeping-Up-Quants-Understanding-Analytics/dp/142218725X`](https://www.amazon.com/Keeping-Up-Quants-Understanding-Analytics/dp/142218725X)

    - Marketing in the Age of Google, by Vanessa Fox [`https://www.amazon.com/Marketing-Age-Google-Revised-Updated/dp/1118231937`](https://www.amazon.com/Marketing-Age-Google-Revised-Updated/dp/1118231937)

    - Getting Naked A Business Fable About Shedding The Three Fears That Sabotage
    Client Loyalty, Patrick Lencioni [`https://www.amazon.com/Getting-Naked-Business-Shedding-Sabotage/dp/0787976393`](https://www.amazon.com/Getting-Naked-Business-Shedding-Sabotage/dp/0787976393)

    - The 22 Immutable Laws of Marketing, By Al Ries and Jack Trout [`https://www.amazon.com/22-Immutable-Laws-Marketing-Violate/dp/0887306667`](https://www.amazon.com/22-Immutable-Laws-Marketing-Violate/dp/0887306667)

    - Permission Marketing, By Seth Godin [`https://www.amazon.com/Permission-Marketing-Turning-Strangers-Customers/dp/0684856360`](https://www.amazon.com/Permission-Marketing-Turning-Strangers-Customers/dp/0684856360)

    - Building Brand-width, Closing the Sale Online, Sergio Zyman and Scott Miller,
    [`https://www.amazon.com/Building-Brand-closing-online-hardback/dp/B003ACLZDG`](https://www.amazon.com/Building-Brand-closing-online-hardback/dp/B003ACLZDG)

    - Engaging Customers Using Big Data: How Marketing Analytics Are Transforming
    Business, Arvind Sathi, [`https://www.amazon.com/Engaging-Customers-Using-Big-Data/dp/1137386185`](https://www.amazon.com/Engaging-Customers-Using-Big-Data/dp/1137386185)

    - Raving Fans, Ken Blanchard and Sheldon Bowles, [`https://www.amazon.com/Raving-Fans-Revolutionary-Approach-Customer/dp/0688123163`](https://www.amazon.com/Raving-Fans-Revolutionary-Approach-Customer/dp/0688123163)

    - The Purple Cow, Seth Godin, [`https://www.amazon.com/Purple-Cow-Transform-Business-Remarkable/dp/014101640X`](https://www.amazon.com/Purple-Cow-Transform-Business-Remarkable/dp/014101640X)

    - Being Digital, Nicholas Negroponte, [`https://www.amazon.com/Being-Digital-Nicholas-Negroponte/dp/0679762906`](https://www.amazon.com/Being-Digital-Nicholas-Negroponte/dp/0679762906)


    # 10. The Art of Selling


    Ross Perot should be writing this chapter. But he’s been too busy building two
    MSPs that he sold for over 10 billion dollars between them—and making a bold run
    to become the president of the United States. As such, he wasn’t available for
    comment. But, his story is a pretty good one about selling managed services, as
    well as how easy it can be to lose your path when selling anything, including
    something so simple to discuss as managed services.


    Ross Perot was a top salesman at `IBM` in 1962, when he left to start Electronic
    Data Systems (`EDS`). His sales background enabled him to build the company into
    a `$2.4` billion behemoth when he sold the company in 1984. He was later an angel
    investor in `NeXT`, and then started `Perot Systems` in 1989, which later sold
    to `Dell` for `$3.9` billion. The important aspect of his story for the purposes
    of this chapter is that Perot was a salesman. He knew how to build a sales organization
    but not the technology.


    Many Apple consultancies are started by technical people. To the hyper-technical
    business owners, sales is a necessary evil. To those savvy with business, sales
    is the foundation required for any organization to succeed. In this chapter, we’ll
    look at building a sales organization, as this is one of the biggest gaps that
    needs closing in Apple service providers today. And it starts with choosing a
    methodology that works for your organization.


    ## Choosing a Sales Methodology


    Sales is the air that a company breathes. Not getting enough sales stagnates growth
    and can end the life of an organization prematurely. Many an entrepreneur is good
    enough at sales to make it to the point where it’s time to scale up. This is because
    there’s legitimate authority. But what’s next? There are probably about as many
    correct answers here as there are organizations that have effectively built sales
    teams, and all of those answers are correct. But one item that every sales organization
    needs at some point is a sales methodology that best represents their product,
    values, market, and goals. And choosing one early means you don’t have to retrain
    undisciplined sellers in how to represent your company.'
  raw: '## Conclusion


    Advertising should make the phone ring (or these days, I guess, the e-mail client
    ding). You likely cannot have more than two or three people on a sales team without
    advertising. It’s easy to have large amounts of money just get up and walk away
    when buying ads.


    You can easily spend $5,000 a month on Google clicks, only to get a bunch of calls
    from people who want services you don’t provide. Many a podcast will cost $10,000
    to advertise on, and you may have no way of knowing you got a good lead from them.
    If this seems daunting, find a local resource to help guide your efforts instead
    of just going out and buying whatever looks good, or focus on Public Relations.


    There’s no reason not to stay in the “not yet” category that I described earlier
    in this chapter. Don’t let your pride jump in here and tell you that you need
    to be buying up ad space or that you need to hear your ad at the beginning of
    your favorite podcast (unless it’s my podcast).


    It would be better to save wasted advertising spend until you’re ready to spend
    it wisely. But if you are about growing, you will eventually need to spend here.
    And when you do, find someone you trust, because there’s a lot of really well-meaning
    but completely useless organizations in the advertising industry. So as with other
    parts of the business, challenge everything you hear that doesn’t make sense,
    and when in doubt blatantly copy the marketing and advertising brilliance of Apple
    (without, of course, violating their copyrights)!


