  trans: '

    ### 快速试错


    好吧，这里有个秘密。你的计划可能有一个小缺陷。或者，它可能是个糟糕的计划。再或者，它可能是个糟糕的创意。因此，我有点犹豫地说出“快速试错”这个词。但是，如果你最终不停止，你的计划可能会让你持续亏钱好几年。那么，你如何知道何时该放手呢？方法和你决定何时让某人加入你的梦幻足球联赛队伍，或者何时买入某只股票时一样：靠直觉。研究那些数据，尤其是趋势线（我们在附录
    D 中会讲到），并且要尽可能明智地去分析。


    如果你真的觉得某个计划正是公司所需，那就做出一个明智的决定，坚持下去。但请务必先审视以下几点：


    -   该计划的销售额

    -   该计划的成本

    -   计划购买的潜在客户

    -   给定项目的完成时间表

    -   商品和服务的定价

    -   市场竞争对手的获取情况


    最后，别忘了估算退出一个计划所带来的影响。客户是否会陷入困境？在做出最终决定的同时，你如何能软化传达的消息？


    ## 应对失败


    我们不可能总是一帆风顺。你会在所有商业书籍中听到“快速试错”这个术语。我想说的是，虽然你要快速响应，但在理解失败原因之前，不要急于行动。有时，作为企业主，我们必须把自我放在一边，尽可能诚实地面对自己。有可能转变方向比一味失败更好。也有可能只是时机不对，我们应该趁还有机会时及时止损。无论如何，在我看来，苹果咨询业务中的失败主要可以归为两类：客户计划和技术计划。


    ### 客户计划为何失败


    有时，我们决定涉足一个新领域，结果却一败涂地。而这正是新计划的常态。对于那些从未在专业领域经历过失败的人来说，这可能尤其具有挑战性。我们的计划失败的原因数不胜数，但大致可以归纳为几个方面，包括销售、项目管理、客户感知和架构。销售问题通常是因为你尝试做的事情无法引起客户共鸣。项目管理问题在于计划没有得到良好的执行。架构问题在于计划本身是错误的，而客户感知问题则在于想法没有传达清楚（因此更像是营销上的失败）。


    由于大多数苹果咨询业务都专注于技术项目，我们将对此进行更详细的探讨。


    ### 我们的技术计划为何失败


    商业中最令人沮丧的事情之一，就是你的技术计划永远无法落地。为什么有那么多技术计划会失败，给组织带来难以估量的成本，对项目倡导者的信任造成负面影响，并损害完成其他项目的能力？答案几乎和失败的
    projects 一样多。让我们来看一些原因。


    -   **战略偏离目标**：你有一个目标。这个目标是为了解决一个问题、改进系统使其更有用、完成一次升级等。你将这个目标转化为一项战略。但并非每项战略都能完美无缺。如果一个计划未能启动，请考虑制定新战略、迭代现有战略，并重新思考这个目标是否值得投入。


    -   **目标不清晰**：如果你的整个团队都理解项目的根本目标，他们就更有可能做出与你实际试图达成的目标一致的决定。当你增加团队成员时，要确保他们不仅知道要做什么，也明白“为什么”要这么做，从而获得他们的认同。


    -   **缺乏支持**：组织中的不同部门有不同的汇报线和不同的目标。为了获得其他团队的支持，要寻找你的项目可以为组织内其他团队带来益处的方式。如果你的计划能解决他人的问题，你最终可能积累的政治资本是不可估量的。


    -   **计划相互冲突**：有时候这些目标是相辅相成的，有时候则是相互矛盾的。为了避免你的计划陷入政治的泥潭，在任何重大计划的规划阶段都要让其他人参与进来。随着项目的成熟，要设法保持沟通顺畅，将冲突最小化。毕竟，冲突往往意味着成本重叠，这也有助于你控制成本！


    -   **成本问题**：如果我不提成本，会计部门可能会找我麻烦。你可以在“好、快、便宜”这三者中任选其二。为了确保你的计划保持在适当的成本结构内，要为每个计划设定一个目标投资回报率（ROI）。一个现实的
    ROI 通常是项目最重要的方面。ROI 的目的不是“赚取更多利润”。相反，ROI 应该以清晰、简洁、可量化的指标来呈现，并在整个组织内（而不仅仅是你团队的利益相关者之间）得到充分沟通。


    -   **战术不当**：无论你的战略多么出色，你的计划仍可能失败。通常，当事情到了关键时刻，用来弥补差距的战术可能不完整、顺序错误、基于错误的假设，或者结果证明就是些糟糕的主意。我发现保护自己免受糟糕战术影响的最佳方法，是利用同行评审来识别潜在的陷阱和坏主意。


    -   **技术选型不当**：有时技术太新、漏洞太多、不符合计划目标，或者就是很糟糕。确保你的软件合适的最佳方法是尽可能多地征求反馈。例如，如果你要实施一个新的
    CRM 系统，却没有与销售团队讨论过该项目，那么你怎么能确定这个 CRM 适合整个组织呢？


    -   **项目管理**：根据项目的规模，一个好的项目经理会控制项目中许多最关键的方面，与关键利益相关者沟通变更。在启动项目之前，要决定项目将如何管理，并尽早设定里程碑和沟通计划。


    -   **缺乏耐心**：第一步，做些准备工作。第二步，赚大钱。我希望每个项目都这么顺利。但有时中间还有 192 个其他步骤，横跨 3 年时间。要了解你的
    ROI，也要了解实现该 ROI 所需的时间过程。一个新产品可能需要一年时间才能成熟，这包括架构设计、范围界定、实施、等待供应商、开始获得积极动力等。当你正在改进组织时，这段时间很有价值，但不应因为团队赶工期而仓促实施，导致出现问题。


    -   **沟通问题**：你的团队需要对所有事情都了然于胸：根本目标、项目计划、关键利益相关者是谁、谁在为项目提供资金、超出预算时该怎么办，以及其他任何重要事项。这不是重复前面的条目——而是为了强调，如果人们不了解项目的各个方面，就无法成功实施它。


    最后，这一节是关于企业中的技术。但几乎所有战略失败的原因，都适用于各类组织。'
- fmt: '# Dealing with Success


    Dealing with failure is one thing. But dealing with success can be just as telling.
    When things work out and you start selling and delivering well, you’ll feel the
    new initiative start to pick up some steam. Things can start to feel easy. But
    business shouldn’t be easy and won’t be for long.


    So if you’re fortunate and an initiative works out, a competitor will iterate
    and do it better if you aren’t careful. Therefore, once things are working well,
    take a step back and take a hard look at every aspect of the operation, with a
    keen eye on how to do everything better. This doesn’t mean it isn’t awesome, but
    everything can always be better. And getting complacent shouldn’t be an option.
    Here are some ways to critically look at successful endeavors in order to avoid
    complacency.


    1.  **Increase the return on investment:** Look for incremental improvements,
    such as raising the cost of goods sold in order to control demand or reducing
    costs by introducing new tools and automation.


    2.  **Increase scalability:** If things are selling, then you’re gonna want to
    gain efficiency as they sell. Chances are you won’t be able to hire fast enough.
    How can your organization grow without more people? Consider subcontracting some
    work to scale the business. Just make sure you’re doing so at a rate that scales
    faster than hiring staff.


    3.  **Keep adding to your portfolio:** You had some success with one area, why
    not try another!? What other additional goods or services might you be able to
    bring to market? Additional `skus` for sales teams to cross-sell or markets that
    you can get into are a great way to keep revenue soaring. Make sure you understand
    each market, opportunities, and risks, but keep the inertia going in a way that
    doesn’t cause customers to say “they just keep calling me to sell me more things.”


    4.  **Look for more ways to get to markets (or routes):** Think about adding sales
    channels, creating new sales enablement assets, and meeting with those who sell
    in order to help them sell better and communicate how you’re continuing to strengthen
    each product line. Even if you think you’re running at capacity, stay bullish
    on sales and subcontract more work if you have to—provided your margin stays strong,
    of course.


    5.  **Streamline the organization:** How can you make the organization run more
    efficiently given the new products or services you’ve introduced? Are you getting
    value from every part of the operation? Can you merge processes between lines
    of business (such as support) in order to increase the effectiveness of each?


    6.  **Make things better for the team:** Poll for employee attitudes and how the
    culture is holding. Make sure to listen and do what your team is asking for, and
    not making too many assumptions. For example, pretty much all employees want more
    and better training. A workforce that feels like their essential needs are being
    taken care of will be happier and more successful.


    The best time to review the business is when things are going really well! The
    best time to think of how to make each product line better is when the product
    line is doing really well. But take a holistic approach and examine every part
    of the organization and how it can be better, without bleeding all of the inertia
    right out of it.


    Don’t just look at one area, either. If you only improve the employee experience,
    then your costs will get completely out of control. But if you only ever improve
    efficiency, you will alienate customers and the people who are becoming increasingly
    more efficient (usually to the point of having no more fun). And if you just keep
    adding more and more things to the portfolio, then the organization will seem
    chaotic to staff and probably greedy to customers.


    But a balanced approach that is well-communicated with employees is likely to
    keep staff happy and around for a long time!


    ## Conclusion


    You should experiment with various lines of business. And you will fail at some.
    If running a business were easy, then everyone would do it!


    There’s no magic way to do this. I would like to leave you with one parting thought
    in this chapter. Fail fast, but don’t discount the line of business entirely,
    as implementation could have been due to a bad strategy, employees not being invested,
    timing, or a variety of other attributes. Additionally, success could be due to
    the opposite attributes and might not last.


    Basically, if you decided not to sell hardware earlier, revisit that decision.
    If you experimented with doing managed services and it didn’t work out, try again—at
    least, if you’re interested in those lines of business.


