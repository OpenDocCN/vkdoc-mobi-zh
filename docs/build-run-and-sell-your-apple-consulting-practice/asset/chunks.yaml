    # Remote Management


    - [`Apple Remote Desktop`](https://itunes.apple.com/us/app/apple-remote-desktop/id409907375?mt=12):
    Apple tool for remotely controlling other Macs, sending packages to Macs, and
    running scripts on Macs over a LAN or directly to an IP address.

