- fmt: '### Development Tools, IDEs, and Text Manipulators


    - [**aText**](https://www.robotcloud.net/dashboard/): Replaces abbreviations with
    frequently used phrases you define.

    - [**Atom**](https://www.citrix.com/): A modern text editor with bells and whistles
    that make it work like an IDE for common scripting languages.

    - [**BBEdit**](https://www.parallels.com/): A modern text editor with bells and
    whistles that make it work like an IDE for common scripting languages.

    - [**Charles Proxy**](http://www.derlien.com/): A proxy tool that can be used
    to inspect traffic so you can programmatically reproduce the traffic or reverse
    engineer what is happening when trying to solve issues or build tools.

    - [**CocoaDialog**](https://github.com/chilcote/vfuse): Create better dialog boxes
    than with traditional tools like AppleScript.

    - [**Coda**](https://github.com/chilcote/outset): An IDE and a modern text editor
    with bells and whistles that make it work like an IDE for common scripting languages.

    - [**Dash**](https://www.manageengine.com/): Offline access to 150+ API documentation
    sets.

    - [**Docker**](https://github.com/wdas/reposado): Containerization tool.

    - [**FileMaker**](http://www.filemaker.com/): Rapid application development software
    from Apple.

    - [**git**](https://www.amazon.com/What-Digital-Future-Holds-Groundbreaking/dp/0262534991):
    Code versioning, merging, and tracking - and with github, a repository to put
    code into and share code.

    - [**Hopper Disassembler**](https://brew.sh/): Disassemble binaries as part of
    reverse engineering and security testing.

    - [**Microsoft Visual Studio**](https://www.amazon.com/Enchantment-Changing-Hearts-Minds-Actions/dp/1591845831):
    An IDE for a variety of languages.

    - [**MySQL Workbench**](https://www.amazon.com/Rework-Jason-Fried/dp/0307463745):
    Create and edit MySQL databases and use to build complex queries.

    - [**Navicat Essentials**](https://peakhourapp.com/): Create and edit MySQL databases
    and use to build complex queries.

    - [**Pashua**](https://www.amazon.com/Automate-Grow-Blueprint-Businesses-Marketing/dp/1977842216):
    Creating native Aqua dialogs from programming languages that have none or only
    limited support for graphic user interfaces on Mac OS X, such as AppleScript,
    Bash scripts, Perl, PHP, Python, and Ruby.

    - [**Platypus**](https://cocoadialog.com/): creates native Mac OS X applications
    from interpreted scripts such as shell scripts or Perl, Ruby and Python programs.

    - [**Script Debugger**](http://puppetlabs.com/): Tools like a dictionary explorer
    and more IDE-esque features for building AppleScript applications.

    - [**SequelPro**](https://www.djangoproject.com/): Create and edit MySQL databases
    and use to build complex queries.

    - [**Snippets Manager**](https://www.carbonblack.com/): Collect and organize code
    snippets.

    - [**SourceTree**](https://www.cylance.com/en_us/home.html): GUI tool for Git
    and Github.

    - [**SublimeText**](https://www.elastic.co/): A modern text editor with bells
    and whistles that make it work like an IDE for common scripting languages.

    - [**TextExpander**](https://www.amazon.com/Myth-Revisited-Small-Businesses-About/dp/0887307280):
    Replaces abbreviations with frequently used phrases you define.

    - [**TextWrangler**](https://www.mcafee.com/sg/products/endpoint-protection/index.aspx):
    A modern text editor with bells and whistles that make it work like an IDE for
    common scripting languages.

    - [**Tower**](https://home.sophos.com/): A modern text editor with bells and whistles
    that make it work like an IDE for common scripting languages.

    - [**VisualJSON**](http://www.microsoft.com/): Simple JSON pretty-viewer for the
    Mac.

    - [**Xcode**](https://www.bluem.net/en/projects/pashua/): Apple tool for writing
    apps and scripts in common languages.


    ### Digital Signage and Kiosks


    - [**Carousel Digital Signage**](https://www.grocrm.com/): Run Digital Signage
    from an AppleTV.

    - [**Kiosk Pro**](https://www.itglue.com/): Turn any iPad into a single-user kiosk
    tool, manageable via an API (e.g. with a Jamf Pro integration).

    - [**Risevision**](https://github.com/MagerValp/AutoDMG): Run Digital Signage
    from a Mac.


    ### Directory Services and Authentication Tools


    - [**Apple Enterprise Connect**](https://www.micromat.com/products/techtool-pro):
    Tool sold through Apple that connects to Active Directory environments without
    binding to Active Directory.

    - [**AdmitMac**](https://github.com/): Adds support for fringe Active Directory
    requirements.

    - [**JumpCloud**](https://www.chef.io/chef/): Run your directory service in the
    cloud.

    - [**LDAP**](https://www.cakebrew.com/): Open source directory service.

    - [**macOS Server Open Directory**](https://github.com/dataJAR/jamJAR?mt=12):
    Directory service installed in macOS Server that is based on OpenLDAP.

    - [**Microsoft Active Directory**](https://www.amazon.com/Small-Business-Time-Saver-Processes/dp/1514801124):
    Centralized directory service from Microsoft.

    - [**Nomad**](http://www.deploystudio.com/): Connects clients to Active Directory
    environments without binding to Active Directory. And has some other nifty features.


    ### Identity Management


    - [**Centrify**](https://github.com/google/restor): Provide federated login across
    common web services and other SAML-capable solutions, as well as resolve common
    issues with Active Directory. Also has an integrated profile management tool for
    compliance.

    - [**Duo Mobile**](https://www.vendhq.com/): Additional options in the realm of
    secure identity, with lots of great research going on in the Apple space.

    - [**LastPass Enterprise**](https://www.papercut.com/): Provide federated login
    across common web services and other SAML-capable solutions.

    - [**Microsoft Azure Active Directory**](https://www.arqbackup.com/): Active Directory
    with Azure in the cloud.

    - [**Okta**](https://www.sourcetreeapp.com/): Provide federated login across common
    web services and other SAML-capable solutions.

    - [**OneLogin**](https://www.labtech.com/): Provide federated login across common
    web services and other SAML-capable solutions.

    - [**Ping Identity**](https://www.carbonite.com/): Provide federated login across
    common web services and other SAML-capable solutions.


    ### Imaging and Configuration Tools


    - [**Apple Configurator**](https://www.barebones.com/products/textwrangler/?mt=12):
    Configure iOS and tvOS devices en-masse, automate MDM enrollment, and distribute
    data.

    - [**Blast Image Config**](https://www.datto.com/): Will no longer be developed,
    given the state of device imaging, but allows admins to quickly restore and configure
    a Macintosh back to a known state (10.12.2 and below).

    - [**createOSXInstallPackage**](https://www.crashplan.com/en-us/): Create an installer
    package from an “Install OS X.app” or an InstallESD.dmg (10.12.4 and below).

    - [**Deep Freeze**](https://www.barebones.com/products/bbedit/): Freeze the state
    of a Mac.

    - [**DeployStudio**](https://www.druva.com/): Free imaging server for Macs.

    - [**Google Restor**](https://www.trendmicro.com/en_us/business/products/user-protection/sps/endpoint.html):
    Image macOS computers from a single source. It is an application intended to be
    run interactively on a machine.

    - [**Ground Control**](https://wandera.com/): Mass deploy (and enroll) iOS devices.

    - [**Imagr**](https://www.tynsoe.org/v2/geektool/): Replaces tools such as DeployStudio
    for many organisations without the requirement of needing to be run on OS X servers.

    - [**libimobiledevice**](https://github.com/rtrouton/Payload-Free-Package-Creator):
    Suite of tools to configure, inspect, wipe, etc for iOS devices.

    - [**WinClone**](https://github.com/scriptingosx/quickpkg): Create windows images
    for deployment onto Macs.'
