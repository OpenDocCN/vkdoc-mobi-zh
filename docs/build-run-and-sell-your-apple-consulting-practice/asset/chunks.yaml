    Introduction


    I have worked in consulting most of my adult life. I worked with large, multinational
    consulting firms, started consulting firms, worked to sell firms, and helped to
    develop offerings and business in both large and small firms. I’ve worked hourly,
    on retainers, and even converted customers from an hourly consulting firm to managed
    services. Along the way, I learned a lot. And then I took a day job. There, I
    took some time away from consulting and later had the chance to work with and
    enable the Apple services arm of some of the largest consulting firms and managed
    services providers in the world. And along the way, I don’t think I’ve learned
    a damn thing… But I just can’t help myself but to write a whole book about it
    anyway!


    Going from a small hourly based consulting firm to starting a managed service
    offering and then working within enterprise-class environments gave me a new perspective
    on being a traditional consulting firm and a Managed Services Provider, of the
    ways that business blends together. And mentoring former competitors has enlightened
    me to the challenges that others have that I didn’t and challenges I had that
    they didn’t. I certainly can’t speak to the iterations that guarantee success;
    but I hope this book helps you choose whether or not to take such a journey, along
    the path, and ultimately, to find success.


    In this book, we’ll look at a number of scenarios that give readers insight into
    how to deal with some of the most common challenges they’ll face while starting
    a consulting company. Some of these can be applied generally; others, are specific
    to managed services.


    ## Chapter-by-Chapter


    The book is structured in three general parts: running the business, developing
    the business, and what to do once you get things up and running. Each chapter
    then covers the following:


    **Chapter** [**0**](https://doi.org/10.1007/978-1-4842-3835-6_0) **:** *The Joy
    of Being a Sole Proprietor.* In this short chapter, we’ll cover the life of a
    sole proprietor and the challenges you’ll face when you decide to grow.


    **Chapter** [**1**](#469405_1_En_1_Chapter.xhtml) **:** *Build the Offer.* In
    this chapter we look at defining what your product actually is. Are you going
    to be a flat fee managed service provider, or will you mix your services? We’ll
    look at questions around hourly vs. unlimited support, sanity check network segments,
    and how to validate that your pricing is correct.


    **Chapter** [**2**](#469405_1_En_2_Chapter.xhtml) **:** *Beyond Services* In this
    chapter, we go beyond selling services and into selling subscriptions to websites,
    selling hardware, selling bandwidth, and other areas where you can add revenue
    streams to help fund your startup.


    **Chapter** [**3**](#469405_1_En_3_Chapter.xhtml) **:** *Hiring and Human Resources.*
    In this chapter, we look at hiring, training, and retaining engineers. We also
    take a pretty cold and calculated look at when you have to let some of the best
    employees you’ve ever had move on of their own accord and what kinds of drastic
    moves might help you retain them.


    **Chapter** [**4**](#469405_1_En_4_Chapter.xhtml) **:** *Accounting 101.* In this
    chapter, we look at the most exciting aspect of your organization: keeping the
    books. Many a business owner hates doing this. I have always loved it. Oh, and
    taxes. Because… taxes…


    **Chapter** [**5**](#469405_1_En_5_Chapter.xhtml) **:** *Buy Software to Automate
    the Business.* Chapter [5](#469405_1_En_5_Chapter.xhtml) covers putting automation
    software in place. This includes software to monitor the health of remotely manage
    devices and then proceeds to software to perform ticketing and dispatch, ultimately
    looking at tying into other aspects of the business, including e-mail automation,
    billing, and contract management.


    **Chapter** [**6**](#469405_1_En_6_Chapter.xhtml) **:** *Make Friends: Develop
    Partnerships.* Chapter [6](#469405_1_En_6_Chapter.xhtml) is about partnerships.
    Partnerships can mean tons of new customers coming in, or they can be a waste
    of time. Here we look at finding the right partner, building a good relationship,
    and converting those partnerships into customers.


    **Chapter** [**7**](#469405_1_En_7_Chapter.xhtml) **:** *Engage in Free and Guerrilla
    Marketing.* In this chapter, we look at getting the most bang for your marketing
    dollars. You’ll get tips on easy ways to maximize your investment, some ideas,
    and, of course, some resources for chasing down even more.


    **Chapter** [**8**](#469405_1_En_8_Chapter.xhtml) **:** *Using Public Relations.*
    In this chapter, we focus on Public Relations. PR is getting your organization
    in front of the press, including quotes in the press, customer stories that mention
    your company’s name, and other assets, with or without hiring a PR firm.


    **Chapter** [**9**](#469405_1_En_9_Chapter.xhtml) **:** *Advertising.* In this
    chapter, we look at paid advertising. In Chapters [7](#469405_1_En_7_Chapter.xhtml)
    and [8](#469405_1_En_8_Chapter.xhtml) , we weren’t actually paying for advertising,
    but now we’ve got some money and we can afford to do so. This begins, of course,
    with paid search.


    **Chapter** [**10**](#469405_1_En_10_Chapter.xhtml) **:** *The Art of Selling.*
    The previous few chapters were about creating a sales funnel. That’s how you get
    in front of customers. We have one more step before people start giving us cash:
    the sales process.'
