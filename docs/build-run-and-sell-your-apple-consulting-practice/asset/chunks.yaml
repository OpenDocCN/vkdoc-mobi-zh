  trans: '

    # 确定最适合你的公关方式


    你可以每月花费数万美元进行公关，也可以将公关支出限制在每天发送一封邮件，邮件中列出正在向社区征集引述的媒体渠道，并在有空时回复你感兴趣的。大多数企业在业务放缓时会投资于公关、广告和营销。如果我能给你一条最重要的建议，那就是：要三思而后行。


    有策略地推进业务发展，能让你更善于抓住机遇。如果你了解自身定位、市场状况、业务发展方向，并据此规划如何运用资本（无论是用于吸引关注的政治资本、让他人转发内容的社交资本，还是用于其他所有事项的实际资金），你通常能在不得不花钱的地方找到一些真正划算的买卖。


    为你的组织获取公关机会的一些方式可能包括：


    - 在你擅长的主题相关文章中获得引用

    - 在本地新闻节目中出镜

    - 让你撰写的文章刊登在报纸或杂志上

    - 以你的名义撰写博客文章（我是作家，所以我不喜欢别人代笔）


    这些方式通常是免费的。真正不免费的是，让你的人持续跟进所有你认为与客户群体相关的媒体。但有很多低成本进行公关的方法。在讨论其中一些方法之前，我们先来谈谈如何避免变成令人厌烦的人，以及如何防止别人设置过滤器直接删除你所有的邮件。


    ## 本地公关


    如果你在特定地理区域提供管理服务，那么服务该地区的出版物数量通常是有限的。这些通常包括大型报纸、本地杂志、覆盖特定街区的小型期刊、本地网站等。这些人是最好结交的对象。他们不仅通常很酷，而且当你与他们交谈时，他们不时会提供一些宝贵的见解。我发现，通过从新的角度理解事物，我学到的东西往往和他们一样多。哦，我想当他们需要引述时，我能出现在他们的通讯录里也是很酷的事。


    与本地报纸的人交朋友。你通常只需阅读这些新闻媒体上的文章，就能轻松找到联系信息，无论是电子邮件、Twitter 还是信鸽。你可能已经猜到了，我喜欢和记者们混在一起。但他们在公关界也是极好的联系人。他们不仅是你发送信息的对象，而且在深入掌握某个主题以便撰写相关文章时，也经常会有问题需要解答。


    进行公关时需要考虑的一些事项：


    - **了解报道领域**：每位记者都有特定的报道领域，即他们负责报道的主题。如果你把一个技术类的故事创意发给报道时尚的记者，很可能会石沉大海；然而，如果你把故事创意发给真正报道科技的记者，那么后续跟进的想法可能会更顺利。

    - **不要向媒体发送垃圾信息**：撰写文章的人会收到大量寻求媒体关注的邮件和电话。要意识到这一点，只发送及时且相关的信息，重点关注行业或本地趋势——并且要记住，大多数本地媒体关注的是家庭和小型企业，而非高度技术性或企业级趋势。

    - **发送邮件时，尽量不要附带附件**：直接告诉收件人，如果他们需要照片或其他你本打算作为附件发送的内容，请回复索取，这样更容易。带有附件的邮件更有可能最终进入垃圾邮件文件夹，并塞满收件人的邮箱！

    - **尝试获取指向你网站的反向链接**：这样做能提升你网站的页面排名，并增加人们可能就商品或服务联系你的可能性。

    - **如果你接到关于某个话题的电话，当你认为自己并非该领域专家时，务必坦诚相告**。


    ### 提示


    在从事慈善活动时，不要花太多时间对其进行公关。做这些事应该是出于你想为世界做点好事，而不是为了廉价的曝光。


    一旦有了联系人，不要浪费这些关系。就像任何关系一样，要用心维护。要成为一个有用的资源，但在对外沟通时，要设身处地想想，如果你是对方，你希望如何被对待。除了本地联系人，还有一些方法可以建立全国性的联系。在下一节中，我们将介绍一种利用流行的
    Haro 网站来实现这一目标的方法。


    ## Haro


    Haro 是一个连接新闻撰稿人与希望登上新闻的人的网站。记者、博主和其他媒体从业者可以（也确实会）通过它为他们正在进行的项目寻找引述、案例和故事。全世界无数的公关机构使用
    Haro 来监控这些请求，并将他们的客户与相关的作者和编辑联系起来。


    如图 8-1 所示，每天都会发送大量咨询。我通常建议建立一个过滤器，这样你只看到那些可能与你的业务相关的请求。这意味着要关注消息的内容，寻找像“苹果”、你认为自己是专家的各种苹果产品相关词汇、“咨询”或你所在的本地地理区域等关键词。


    ![../images/469405_1_En_8_Chapter/469405_1_En_8_Fig1_HTML.jpg](img/469405_1_En_8_Fig1_HTML.jpg)


    图 8-1 – 发送给 Haro 的咨询


    这场游戏的关键在于速度。你回复引述请求的速度越快，它被采用的可能性就越大。此外，由于一天的时间有限，请专注于那些你可以用来增强你在本地媒体和客户中信誉的事情，或者你认为可能产生客户线索的事情。仅仅为了被媒体引用而去做这件事，并不值得付出努力。


    回应引述请求是一回事，而且由于做起来很容易，其价值往往在大量的回复中被稀释了。尝试让媒体机构报道你的故事则是另一回事。在下一节中，我们将探讨新闻稿，这是一种被动地向媒体发布消息的常见方式，希望有人觉得你的帖子足够有趣并撰写相关报道。在开始撰写新闻稿之前，请记住，你可能已经为某个新计划等做了大量准备工作，但这并不代表它就具有新闻价值。


    ## 新闻稿


    新闻稿是一种告知媒体某事件的文件。一家软件公司可能会发布新闻稿，声称他们有了一个很酷的新功能。这通常是希望某家媒体机构能够发现它并进行报道。老实说，我并不怎么推荐主要守在一个地理区域的本地咨询公司使用新闻稿。在
    Newswire 上发布新闻稿的成本根本不值当。


    但是，如果你有一个媒体机构可能感兴趣的重大事件，那情况就不同了。像许多颠覆者一样，苹果在媒体中很受欢迎。所以，如果你发布了一项服务或收购了另一家公司，并且这预示了一种趋势，那么这可能会引起本地记者的兴趣。例如，假设你收购了一家家庭自动化公司，以便能够充分利用功能强大的新款
    HomePod。这可能会引发人们对日益普及的家庭自动化的兴趣。但如果你只是雇佣了第二或第三名技术人员，那很可能就不具备新闻价值了。


    现在我们对新闻稿有了基本了解，接下来可以介绍一些快速上手的技巧了。

    '
- fmt: '### Press Release Tips


    Press releases are a timeless, yet current public relations avenue for communicating
    news, events, and updates regarding your business or organization to media outlets.
    These brief, informative writing pieces have managed to weather the test of time,
    with millions being e-mailed to newspapers, TV outlets, and radio stations every
    single day.


    The media loves press releases. They’re like tiny bundles of news stories dropped
    on reporters’ laps. Given that the media cycle is in constant need of content,
    you should be taking advantage of press releases with every opportunity possible.


    Here are a few quick tips to review before we delve into an example press release.


    - **Brevity:** Reporters don’t have time to comb through 2-pages of your business
    announcement. It’s recommended to keep the release between 300 and 500 words,
    effectively communicating your message without boring the reader.

    - **Catchy Title:** In order to catch the reader’s interest, you need a one-of-a-kind
    news-spun title that isn’t also over-the-top.

    - **No Sales Language:** A press release is about communicating the news. It’s
    not a time to promote your sales and services in an obvious way.

    - **Avoid Jargon:** This is always a good idea, but even more so when someone
    else might not go as deep with a certain type of technology as you do.

    - **Stick to the facts:** It’s easy to let a flourish slip into your prose. Especially
    if you’ve been writing marketing docs. But don’t. Keep to the facts.

    - **Don’t Try Too Hard:** A press release isn’t a creative column submission with
    the local opinion editor. It’s a news announcement. Treat it as such.

    - **Quotes:** Including quotes from the business owner or spokesperson is a great
    way to humanize a press release. Be sure to take advantage of this opportunity,
    including one or two quotes from someone important at your business or, even better,
    a customer.

    - **Grammar:** Those who have careers in writing appreciate good grammar.


    Once your release is done, you have two options: you can either e-mail or call
    it out to local news media personnel, or you can submit it to syndication platforms
    like `PRWeb.com` and `Newswire.com`. The two aren’t mutually exclusive—for a wide
    variety of coverage, consider doing both! Also advise the reader to put it on
    their website or use in social media or blogs in order to promote it even to someone
    not in the “media.”


    We’ll continue on with the HomePod example from earlier while we dissect the anatomy
    of a press release.


    ### The Anatomy of a Press Release


    There’s no single piece of advice I can give you about how to write a press release
    that will catch the attention of someone in the media. Instead, I can tell you
    how most people write them and give you some best practices about what’s in them.
    Let’s start with the best practices for each section, beginning with the headline.


    #### The Headline


    As with most things you write that you want people to read, the way to grab attention
    is with a great title. When working with press releases, you call the title a
    headline. And as with most headlines, you want one that grabs attention. Let’s
    say you’re based in Los Angeles and you want to go after the emerging home automation
    industry using the HomePod as a wedge. First, you build a service offering. Then,
    you come up with a great headline that pretty much sums things up. Some ideas
    might include:


    - Local Tech Firm Introduces Comprehensive Home Automation

    - Local Shop Introduces New Home Automation Services

    - A New Era of Home Automation Centered Around Apple

    - Local Firm Brings Home Automation to Businesses


    These headlines are fairly different from one another. But there are some lessons
    to learn here. In these examples, most are kept short and easily digestible. Your
    name could easily (and probably should) replace the “Local Shop” or “Local Tech
    Firm” in the headlines. There should be one catchy or trendy word but not so many
    as to be unapproachable, and importantly, headlines should typically be eight
    words or less.


    #### The Header


    Next, let’s talk about the header. This is at the top of the page and contains
    some pretty basic information. On the left side, you need two lines. The first
    would read when to release the information. The reason this is necessary is that
    some content is under embargo, which means you want someone to write about it
    but not actually release what they’ve written until the embargo is lifted.


    The second line would include the date you’re sending the release. On the right
    side of the header is the contact information. This should include a name, phone
    number, and e-mail address, each on its own line.


    #### The Dateline and Lead


    The first paragraph of your press release contains the dateline and lead. This
    is one of the most important parts of the release and any reader will likely stop
    reading immediately if you don’t keep their attention, so don’t bury the lead
    here. Start with your city followed by a dash (known as the dateline) and then
    include a sentence that wraps up the release in a nice pretty bow (known as the
    lead). An example of an opening paragraph might read like:


    - LOS ANGELES – Charles Edge of Megaawesomeconsultancy announces suite of new
    services that brings cutting edge home automation technology to small businesses,
    leveraging the Apple platform.


    #### The Body


    Throughout the body, we’re going to cover what’s often referred to as the inverted
    pyramid. Start with the most newsworthy aspects of the release: the Who, What,
    When, and Where. Then go to the important details, and wrap up general and background
    information, which we’ll cover in the next section.


    An example of the body might include two or three paragraphs that lay out the
    necessary details, such as the following example:


    - Edge vows to bring Home Automation technology to every aspect of small businesses
    at a rate that more than pays for itself in energy savings. George Technicianopolis
    has been named head of the Automation business unit.

    - “We are bringing out-of-the-box solutions to Main Street so businesses can control
    HVAC, lights, and monitor energy consumption,” said Technicianopolis. “And not
    only does it allow companies to save on energy bills, but it makes everyone’s
    lives easier.”

    - Technicianopolis will be at Huge Tech Conference on April 1^(st). Here, organizations
    and the media can see a model home, and control every aspect with standard voice
    controls.


    Notice in this excerpt, we included a quote or two from the business owner or
    someone at the organization. An additional quote could come from an analyst or
    a statistic from a study as well. There’s also a call to action to join the company
    at a showcase where more quotes can be obtained and where someone from the media
    could get hands-on experience with the technologies being mentioned.'
