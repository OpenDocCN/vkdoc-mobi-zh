    \n## 培训\n\n对于繁忙且不断成长的公司（也就是那种正在招聘并需要创建培训资料的公司）来说，建立良好的培训计划可能是一个挑战。创建新材料非常耗时，并且通常只能由特定团队成员完成。随着你的资料库增长，保持培训材料的最新状态可能会占用大量时间，尤其是在苹果公司每年发布一次更新的情况下。尽可能利用现有材料，以将维护工作量降至最低。\n\
    \n### 个人化学习计划\n\n我喜欢明确规定员工将如何使用培训时间和预算。这通常以个人化学习计划的形式进行。这些计划列出了培训的优先事项，以及实现这些优先事项的策略。我喜欢在学习计划中包含以下项目：\n\
    \n*   你希望改进的三个领域。这是计划中最重要的部分。每位员工想学习什么？计划的其余部分将跟踪如何实现目标。我通常倾向于三个项目而非一个的原因是，这提供了灵活性和一定的多样性，这样当人们在某个领域感到疲倦时（或者更好的是，完成了一个领域），他们可以转向另一个领域。最好这些领域在某种程度上是相互关联的。\n\
    \n*   在每个领域取得精通的季度目标。我希望这些目标是 SMART 的（即具体的、可衡量的、可实现的、现实的和有时限的）。\n    *   **具体的**可能意味着某人编写一个执行特定任务的脚本。\n\
    \    *   **可衡量的**可能意味着你期望每项任务都有一篇博客文章或一项外部认证。\n    *   **可实现的**意味着员工确实能够完成它（而不是你说“去写一个\
    \ macOS Server 的替代品，并在周五之前获得 CCIE 认证”）。\n    *   **有时限的**意味着目标可以在分配的时间内完成。\n\n\
    *   你是否在记录职业发展活动日志？职业的意味着这不是关于爱好，而是关于工作。对我来说，这里的关键词是发展。每个人正在做什么来提升自己？希望这些活动与公司目标一致，但并非必须如此。\n\
    \n*   你希望自己的下一个职位是什么？最优秀的员工会诚实地回答说你的职位。但并非每个人都真正了解摆在他们面前的职业领域。许多人只想在技术领域不断深耕。有些人则希望追随销售领域的高薪。其他人会诚实告诉你他们想创办自己的公司（但大多数人会撒谎说他们只想“变得更好”——尤其是那些有\
    \ MBA 学位的人）。这个问题的目的是为了跟踪如何将培训和你对员工的期望与团队成员个人的意愿对齐。\n\n*   你觉得你距离下一个职位还有多远？这是一个很好的早期预警信号，表明人们是超前于还是落后于自己的计划。请记住，这些感受会随着外部动因的变化而改变。\n\
    \n*   同行教练反馈：一旦团队足够大，你可以使用同行教练系统让团队成员互相帮助。这让你能有更多时间审阅反馈，同时也能让你看到团队成员如何应对有限的领导形式。\n\
    \n*   活跃的研究项目：这些项目是本文档前面 SMART 目标的一部分。最优秀的工程师通常在这个部分最有乐趣。\n\n*   自上次会议以来取得了哪些进展？我喜欢把这看作是版本控制。“什么发生了变化”比阅读每一行要容易得多——尤其是当你需要筛选\
    \ 20 到 30 行内容时。\n\n随着时间的推移，计划会变得冗长。这是不好的。你引入的教条越多，人们从旨在关注他们自身的一对一会议和其他会议中获得的东西就越少。保持培训计划简短，只需包含足够的细节来解释目标是如何达成或未达成的。请记住，如果目标未达成，那么计划中某个你并不在意的小细节很可能会成为被责备的对象！\n"
- fmt: '### Layering Training Assets


    Don’t re-invent the wheel every time you need to build something. In fact, search
    for and purchase assets when you possibly can. Your specific training can layer
    on top of these third-party materials. So, for example, rather than build your
    own course on `macOS`, purchase one of the Apple Training Series books from Peachpit
    Press for your company library, and then build a document quizzing on specific
    parts of that if needed.


    As you grow and need to document more stuff in a variety of different places,
    there are some things you can do to make things easier to track and train on.
    Some of these are just how managing your internal systems and documenting standards
    allows you to spend more time focusing on actual product training.


    - **Standardized methodology for adding systems into your asset management and
    tracking systems**: When you can’t find all of the assets you need in a single
    pane of glass, it’s important to make sure there’s a standardized way to find
    the things you need.

    - **Your naming conventions**: How do you name computers (e.g., is it `clientcode-sitecode-devicecode`)?
    How do you prefer to name servers, firewalls, switches, printers, etc.? Do naming
    conventions change for each customer?

    - **Which tools hold which types of information?** Many start with a spreadsheet
    to track that password for the Apple DEP account or that root password to login
    to a firewall at a customer site, and many start with a spreadsheet or simple
    database. As needs mature and compliance becomes an issue, look to tools such
    as `IT Glue`.

    - **How do you want your teams interacting with customers?** Don’t forget to document
    the areas you value in customer communication. This might come across as soft
    and mushy and without a lot of value to nerdy engineer types. But it’s worth the
    scorn to be crystal clear about the level of customer service you expect.

    - **How do you provide as much value to customers as possible?** Will staying
    with a customer an extra 15 minutes make them way more successful? Sometimes.
    Do you have to charge for that time? Not always. Should you write down some ways
    that your teams can delight your customers? Heck ya’!


    These questions are pretty easy to document and shouldn’t change much with new
    releases of software. The focus on third-party training assets then layers on
    top of this. We’ll explore some of these later in the chapter, but a few third-party
    assets to look at include the following:


    - Official Apple training materials

    - WWDC videos and videos from conferences

    - Lynda.com

    - O’Reilly’s Safari Books Online

    - Various web sites from popular bloggers

    - Github pages from people creating middleware that could help your organization
    (and that you might just be able to contribute back to)

    - YouTube videos about Apple technologies such as `macOS Server`, mass management,
    etc.

    - Print books in a library at your office

    - Brain dumps for third-party certifications


    Through the rest of this section, we’ll unpack some of these for positioning in
    your overall training portfolio.


    ### Conferences


    Once upon a time there was MacWorld. It was big, it was bold, and Apple was there.
    This was a time when there was a magazine by the same name that physically showed
    up at my house. But times have changed. While some delegates attend multiple conferences,
    many of the attendees have splintered into smaller conferences, which are the
    result of the Apple ecosystem microeconomy turning into a bit of a macroeconomy.
    If you will be sending employees to any conferences, here’s a quick and dirty
    guide to each.


    - **[ACES Conference](https://acesconf.com/)**: ACES is a conference for Apple
    Consultants. Usually held in May and moving from New Orleans to Phoenix, and wherever
    conference organizers want it to go next, ACES is a good introduction for many
    on running a Mac consultancy, represented by many of the larger and more well-established
    Apple consultancies in the U.S. and Canada.

    - **AirWatch Connect (now called VMworld)**: The [AirWatch Connect](http://air-watch.com/connect/)
    conference is actually held in multiple cities, and if your organization heavily
    leverages AirWatch to manage devices, it’s a great conference.

    - **[Filewave Conference](https://www.filewave.com/the-news/filewave-alliance-conference-save-the-date)**:
    Traditionally held in Zurich and Indianapolis, the Filewave Conference focuses
    on FileWave products and provides systems administrators with access to developers,
    deployment information, etc.

    - **[JAMF Software’s JNUC (JAMF Nation User Conference)](http://www.jamfsoftware.com/events/jamf-nation-user-conference/2015/)**:
    This conference is primarily geared toward the Apple Administrator who uses `Jamf
    Pro` to manage Apple devices. There are some sessions on general administrative
    topics, such as what a `plist` is and general shell scripting. If you spend a
    lot of your day in `Jamf Pro`, then this is a great, free conference held in Minneapolis,
    Minnesota every year in the fall (in the interest of full disclosure, I manage
    the panels that select speakers for various tracks).

    - **JAMF’s Roadshow**: The [JAMF Roadshows](http://www.jamfsoftware.com/resources/jamf-nation-kicks-off-roadshow-event-series-in-a-city-near-you/)
    are typically free events where Jamf goes around the country hosting day-long
    mini-conferences for customers and systems administrators.

    - **Mac Admin and Developer Conference UK, from [Amsys](http://macad.uk/)**: [MacAD](http://macad.uk/)
    UK is a conference for Apple administrators and developers, with a lot of highly
    technical sessions and good content, held annually in London.

    - **[MacDevOps YVR](http://www.macdevops.ca/)**: MacDevOps is a conference with
    sessions ranging from collaboration to Puppet-as-a-Service (the other PaaS) to
    Docker, Munk, Python, Casper, git, VMware, Chef, Jamf, etc., this one is definitely
    for the scripty among the Mac community who are heavy into systems automation
    and, as the name implies, DevOps…

    - **[MacSysAdmin](http://macsysadmin.se/)**: All things Apple, in Sweden. MacSysAdmin
    always has a lot of really good content, with a more global perspective than most
    conferences in the U.S.

    - **[MacTech](http://www.mactech.com/)**: Ed Marczak does a great job curating
    this conference, which really has a focus on systems administration at scale.
    It’s a good look at how environments grow (if you’re growing) or to get some really
    good tips and tricks for your grown up environment.

    - **[Mobile World Congress](http://www.mobileworldlive.com/)**: I usually find
    the people at a show like this to be less technical, more business analytical,
    more interested in the why and results than the how. It’s a good group, but different
    from those who spend all of their time integrating systems.'
