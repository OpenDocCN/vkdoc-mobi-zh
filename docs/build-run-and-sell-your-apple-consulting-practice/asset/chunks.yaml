- fmt: '### Service Level Agreements


    An SLA is a contractual obligation that you’ll meet a certain level of service.
    That service is usually as measured in uptime in an SaaS (or Software as a Service)
    or server environment. But in a managed service or consultative environment, service
    levels are typically measured as the amount of time it takes to close tickets
    based on the severity level of ticket. Some organizations also look at customer
    satisfaction, such as meeting a certain standard metric such as net promotor score.


    What happens when a customer isn’t happy with a contract between your two organizations?
    Chances are you have stern language that if the customer wants to prematurely
    end a contract they have to pay the balance of the contract. If you don’t define
    service levels, and remedies for missing those service levels, that kind of boolean
    enforcement approach is easily thrown out in a scenario where things get legal.
    The other nice thing about an SLA is that you are up front with what a customer
    should expect from you.


    We’ll look at various ways of implementing service levels in the next few sections.


    #### Server Uptime


    Service levels for servers are usually the easiest to measure and prove. You can
    use monitoring tools such as `MRTG`, `Cactii`, `SumoLogic`, and other tools (most
    notably including managed service automation tools). Many an organization is already
    accustomed to dealing with service levels in terms of how many 9s worth of uptime
    they’ll get.


    The formula to calculate uptimes is pretty straightforward; and simply think of
    it as `((Amount of Time In A Period – Outage Percentage)/Time)*100`. Total outage
    times in an annual contract would then include the following per year:


    - 99.999%: 5 minutes and 16 seconds

    - 99.99%: 52 minutes and 36 seconds

    - 99.9%: 8 hours 45 minutes and 35 seconds

    - 99.8%: 17 hours 31 minutes and 12 seconds

    - 99.7%: 1 day 2 hours 16 minutes and 48 seconds

    - 99.6%: 1 day 11 hours 2 minutes and 24 seconds

    - 99.5%: 1 day 19 hours and 48 minutes

    - 99.4%: 2 days 4 hours 33 minutes and 35 seconds

    - 99.3%: 2 days 13 hours 19 minutes and 12 seconds

    - 99.2%: 2 days 22 hours 4 minutes and 47 seconds

    - 99.1%: 3 days 6 hours 50 minutes and 24 seconds

    - 99.0%: 3 days 15 hours and 36 minutes


    I recommend doing these SLAs quarterly or annually if possible. “5 9s” or 99.999%
    uptime is incredibly difficult to attain. Imagine that a server requires 2 minutes
    to reboot. That means if you run an update a few times a year, you’re in breach
    of your SLA. But if you are trying to review these monthly, a bad month up front
    will have you in breach early in the contract; whereas if it’s an annual contract,
    you have plenty of time to allow the law of averages get you back in good shape.


    The uptime of a service on a server doesn’t mean the uptime of a node. That means
    you could run a monitoring tool and see that the server is up (it pings, you can
    `telnet` into port 80 for web servers, etc.). But you might need to actually try
    to load a page to realize that the back-end of the site is down. So that should
    be monitored as well. Additionally, the node being down doesn’t necessarily mean
    the service that end users interact with (e.g., the website) needs to also be
    down. You can typically fire up a cluster node pretty easily for patching and
    maintenance windows. If the 5 9s uptime numbers referenced earlier seem daunting,
    then you will either never-ever-ever be able to patch or you’ll have to cluster
    a system. Thus, the sharp increase in costs that you should factor (and so charge
    for) for each of those 9s.


    #### Time to Resolution and Average Response Times


    A common misconception about SLAs when supporting endpoints is that they are based
    on the amount of time you have to close each ticket. I would strongly recommend
    never entering into an agreement based on that type of SLA. Instead, look at the
    average time before you make first contact with a customer (often referred to
    as the response time) or an average time you have to complete a ticket (or provide
    a resolution).


    Many a ticketing system has SLA functionality built in. So, you can set up an
    alerting mechanism based on the amount of time a ticket has been in your queue.
    If it’s just you, then this is pretty straightforward. But as your organization
    grows (if you choose to grow) then you’ll want to act as a point of escalation
    for tickets that are close to violating their SLAs.


    **Note:** Be careful with automation systems. You might hook up a tool like `Watchman
    Monitoring` to your ticketing system and automatically create tickets when there’s
    a problem. I very much like this type of a setup. But, let’s say a big software
    update comes along that causes every device to misreport something with a third-party
    piece of software. Now you might have to go and clear all those tickets or you’ll
    end up with all of your reports being completely off.


    #### Net Promoter Scores


    A Net Promoter Score is a number from -100 to 100 that measures how willing a
    customer is to recommend a company’s products or services to other people. Net
    Promoter scores are used as an indicator to gage a customer’s overall satisfaction
    with a product or service as well as their loyalty to the brand. This has become
    a pretty standard measure of how you’re doing with customers. Many think it’s
    overly simplified, but the gist is that how likely customers are to recommend
    you indicates how referral business will work out for you.


    The math behind the Net Promoter Score is pretty easy. Customers that give you
    a 6 or below are known as Detractors. Customers who provide a score of 7 or 8
    are called Passives, and those who give you a score from 9 or 10 are called Promoters.
    Subtract the percentage of Detractors from the percentage of Promoters to get
    your Net Promoter Score.


    A good NPS is hard to generalize, as it’s different between industries. But in
    general any score above 0 is good, any score above positive 50 is really good,
    and any above positive 70 is best in class. Anything below negative 50 means you
    really, really need to be doing something different as you have no loyalty with
    your customers.


    Finally, make sure any survey you do, whether it’s NPS or some other flavor of
    the month, is anonymous. And you can have more questions so you can drill down
    into more specific information, but for any balanced scorecard or other measurement
    you’re trying to run, make sure to consider the NPS as at least one aspect of
    the measurement.'
