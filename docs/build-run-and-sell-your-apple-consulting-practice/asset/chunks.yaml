    # 决策，决策


    在招聘之前，你需要先问自己一些重要问题，这些问题将决定你承接的业务类型、公司的发展方式，以及在发展过程中管理公司的难度。在我们深入探讨本章中如何招聘的具体方法之前，先来看看你在开始前需要思考的一些问题。


    -   你会雇佣合同工还是正式员工？我必须承认，我一直倾向于雇佣正式员工，并善待他们。这意味着你需要妥善处理好 `401k` 养老金计划、医疗保险和员工发展等事宜。但如果你将咨询业务视为一次性的项目而不是一项长期职业，那么你可能会选择利用合同工。此外，如果你希望将某些专业领域（例如
    Cisco、Jamf、Exchange 等）的能力保留在公司内部，你或许会选择聘用合同工来交付各种服务。请深思熟虑，明确你希望做什么、你的服务范围包含什么，以及需要时由谁来交付各类服务。


    -   你在员工身上寻找哪些特质？思考你的使命、愿景和价值观。然后为你想招纳的人才类型描绘一个画像。你更看重自动化工程能力还是客户服务能力？你希望当员工在现场工作时，如何代表你的公司？


    -   员工将负责哪些工作？你会负责销售、技术工作，还是专注于行政管理？所寻找的技能组合可能会因小型企业业主的性格而异。雇员的类型也可能不同。如果你需要有人在你外出处理所有酷炫事务时管理公司，那么你需要的人才类型，与招聘销售或交付服务的人员完全不同。再次强调，要审慎决定谁做什么，并且当你发现那些能带来你之前未曾考虑过的特殊价值的人才时，要愿意做出让步。


    -   你希望客户推荐回头找你吗？对于大多数人来说，答案是明确的“是”，但根据你希望如何发展业务，答案可能是“取决于业务类型”，或者是“如果我的分包商工作做得好，他们可以保留推荐业务”。不要指望品牌忠诚度和客户推荐会自动留在公司内部，除非你根据这一点为员工提供激励（例如，介绍人奖金等）。


    -   你希望员工如何实现职业成长？不要指望人们会自学。随着公司发展，对平台深度的要求、学习新技术的能力以及其他因素，将决定你如何发展，或者如果不能发展，你如何留住团队成员。


    -   你能支付员工多少薪水？我一直使用的一个简单经验法则是`2.5 倍`。这意味着，对于任何一个可收费的员工，我想要收取的费用是他们薪资的两倍半。这包含了间接费用（例如人力资源和培训成本）、任何销售人员的佣金、员工薪资，以及后台办公成本。对于不可收费的员工，薪资期望会有所不同。可以访问`Glassdoor.com`这类网站进行初步比较，或者随着公司发展，向外包的人力资源部门咨询薪资数据。


    ### 备注


    如果你拥有一份全职工作，并非全身心投入运营自己的咨询公司，那么如果你要招聘，应该雇佣合同工，而不是全职正式员工。


    如果找不到合适的人选怎么办？如果你无法通过分包或招聘来承担某项任务或业务线，那么你可能需要将部分工作外包。这也是一种轻松交付各种你认为不属于核心业务模式的服务的方式。外包可能很棘手。请确保你与外包商在如何对待客户、处理推荐、如何代表你以及账单事宜上达成共识。同时，要意识到将其他企业（即使是单人企业）作为客户可能带来的法律后果，为此应与分包商、员工和外包商签订严格的保密协议。


    最后，在你在互联网上发布职位之前，请记住，客户也可能会看到这个招聘启事。


    # 招聘之前


    访问 `trinet.com`、`adp.com`、`insperity.com` 和 `gusto.com`，然后选择一个。如果你还没了解过 `Gusto`，去看看。然后看看他们的投资者。他们正在全方位颠覆人力资源外包行业，而且价格低廉，能够随你的业务规模扩展。我用过
    `Tri-Net`、`ADP` 和 `Insperity`，它们在商业模式、质量和成本上都类似。


    如果你没有人力资源顾问，那么当你的员工数达到七人时，就需要一位了。你需要一个系统，能够让你支付员工薪酬、追踪工时和福利、提供 `401k` 养老金计划，并可能提供利润分享或股权。人力资源顾问可以由上述公司提供，或者你可以聘请一位能帮你管理这些系统和团队的顾问。寻找一位希望建立可重复流程的顾问，而不是凡事都手动操作或替你包办。那通常不是为你提供服务的那些公司中的员工。


    一旦你的员工数达到 20 人左右，并且打算继续扩张，你就需要聘请一位全职的人力资源主管。这个人的职责是帮助你建立卓越的新员工入职系统，改进顾问之前帮你搭建的所有流程，并让公司走上快速增长的轨道。在某些州，法律可能要求你在雇佣第
    51 名员工时必须配备此职位，但除非你很幸运，否则如果你没有在公司拥有第 51 名员工之前很久就聘请到这个人，那么不付出切实努力去建立可重复的入职和人力资源系统，你很可能无法发展得那么快。

    '
- fmt: '## Where to Post Your Jobs


    Now you know what kind of person you want and it’s time to find them. Where you
    post a job description can define you, and the type of staff you’ll bring on.
    There are several good places that you can post job descriptions for free. In
    the Apple world, this might mean a specialized vendor site, or you might choose
    to post jobs to more general places if you don’t have luck there. Consider these:


    - **Slack**: The `MacAdmins.org` Slack channel has specific channels for `#jobs-board`
    and `#jobs-chat` that you can use to find potential employees and post jobs. You
    can also click on someone you’re interested in and get a feel for what they’re
    like by reading previous posts. In my opinion, this is the top place to post your
    technical jobs when recruiting for Apple skills.


    - **Jamf Nation**: I should start this section by saying that I work at Jamf.
    But even before I came to Jamf, I used to read postings on Jamf Nation, and I
    hired many people based on how they had contributed there.


    - **Message Boards**: Jamf Nation is one message board, but there are others.
    Reading articles that people contribute to sites like `afp548.com` or personal
    blogs has led to hiring a number of people. This is one of the more legitimate
    ways to find employees. However, don’t post unless you’re supposed to or you might
    be flagged as an evil spammer.


    - **LinkedIn**: LinkedIn allows you to search for people that meet certain criteria.
    But you will need a Premium account in order to open communication channels with
    them unless you know their e-mail address. This is one of my favorite ways to
    recruit, and a Premium account is pretty inexpensive annually. However, people
    might not be checking their messages, actively looking for a job, or might just
    think you’re a spammer.


    - **Indeed, CareerBuilder, and Monster**: A quick search for macOS netted dozens
    of job postings in my area and a lot of resumes. The drawback is that you’re going
    to be competing with large companies, which can make recruiting pretty pricey.
    However, this is the traditional way to hire these days, and at least you know
    when you talk to job candidates that they are actually looking for work.


    - **Craigslist (and other classifieds)**: I saved this one for last, as I’ve struggled
    here. You will potentially get a lot of responses, many of which won’t be even
    close to what you’re looking for. But I’ve found many (many) people through these
    outlets, which made the cost and time worth it.


    You also might simply troll lists such as `macenterprise` or the Apple Consultants
    Network e-mail list. Or you might use word of mouth to find potential employees
    among your personal network. Word of mouth is by far the best way to find employees
    and customers, but over time you’ll find that these networks dry up (unless you
    are a truly amazing employer).


    ## Writing Job Postings


    I like to start building job postings based on job descriptions that I’ll use
    to communicate what someone will actually do on the job. The job description is
    like a contract with staff that lays out the responsibilities and tasks for the
    job. This acts as a good guide for reviews, salary increases, etc. As companies
    grow, job descriptions are also integral to staff leveling (e.g., the difference
    between Technician 1 and Technician 2), performance improvement plans (which are
    great tools for everyone from new employees to staff that are running into challenges
    on the job), one-on-ones that help guide employees along their career path, etc.


    You can then take that bulleted list of tasks and paste them into your job posting.
    I don’t like too many bullets in my posts, though, so you might find yourself
    converting them into prose. You need some bullets for sure, but try to focus on
    text that describes what someone would be doing, and include any potential growth
    in the position. Don’t bury the lede when referencing why your company is a great
    place to work. Make sure that you point out any perks and the fact that consulting
    is a great way to cut your teeth in the Apple device management market overall.


    Once you’ve written what someone will be doing and why they want to work there,
    review what you’re writing and think about what competitors can ascertain as to
    how you do business. Avoid talking salary in job descriptions. This gives competitors
    insight into how much they might pay your staff to steal them away. Also be mindful
    that talking about specific technologies may narrow the set of people who can
    apply to a job. Some are harder to pick up than others. So Kaseya or Jamf experience
    would be great to have if you are using those, but common cloud solutions or easier
    technologies such as Meraki should likely be avoided. Instead use terms like "a
    solid foundation in routing technologies" or "a comprehensive understanding in
    monitoring technologies."'
