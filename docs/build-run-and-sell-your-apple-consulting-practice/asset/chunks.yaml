  trans: '

    # 一切皆关乎品格


    善待你的客户。独立从业者通常与需要帮助的客户打交道。我曾见过一些顾问因为客户不敢离开而留住他们，也见过另一些顾问在代表客户做决策或提供指导时，只考虑自身最大利益。但如果你能为客户的最佳利益着想，你将会获得数倍的回报。


    无论你是初次挂出顾问的招牌，还是已经从业多年，让我们从你希望为客户做些什么开始。在第 1 章中，我们将讨论你向客户提供的方案，也就是你提供的商品与服务包，以及你为这些商品与服务设定的价格。


    ## 致谢


    从前我写致谢部分都是为了技术书籍，而这本书是关于如何做生意的。商业头脑始于你的父母：他们第一次帮你开设储蓄账户，告诉你该存下一点钱而不是全花在糖果上，以及他们教会你那些能帮助你更好地理解人性的细微之处。因此，感谢我的父母和家人，在我成长的岁月中一路指引我。


    接下来是老师们。这包括那些教授你特定知识的人——这些知识很明显与商业头脑相关，比如如何计算 t 值和 p 值，或者如何正确管理总分类账。世界很复杂，如果没有学校教育中那些极其出色的指导，我们中没有人能走到今天。


    然后是同事们。这包括商业伙伴、老板、同事和员工，也包括你在其他公司接触的人。我只希望，我在商业方面教给他们的东西，能像他们教给我的一样多。


    最后，是其他所有人。在商业世界里，每一次与他人的互动——无论是在酒店酒吧与一个连名字都不知道的人交谈，还是遇到一个在合同谈判中把你逼到绝境的人——只要你愿意，都能成为一次学习经历。这延伸到我在每章“延伸阅读”部分提到的书籍作者，也包括普通的非商业类虚构与非虚构作品，因为所有这些都加深了我们对周遭世界的理解。


    请注意，这里没有列出任何名字。因为要感谢的人实在太多了。感谢你们为我所做的一切。


    ### 关于作者


    # 1. 构建方案


    你面前最重要的任务是决定你希望从这项刚刚起步的事业中获得什么。也许你只想在正职之外赚点外快；也许你想打造一个“生活方式型业务”，以便每周工作 20 小时，多陪陪家人；也许你想征服世界。无论哪种情况，最重要的任务是设定一个目标，并明确你希望这件事发展成什么样子，然后逐步设立里程碑，去构建你真正想要的东西。


    一旦你明白了自己要做什么，就可以开始构建一个能反映你目标和价值观的方案。通过创建一份真实反映你诉求的方案，你会很快发现，许多项目会让你偏离核心目标。届时，你将不得不做出抉择：是调整方向，还是坚持原计划。


    在本章中，我们将审视这个方案。如何调研方案中应包含什么？如何构建方案结构？常见的方案类型有哪些？如何设计计费方式以体现合理的利润率？等等，还需要合同吗？我们先从调研方案的内容开始。


    ### 备注


    方案中需要考虑的一个方面是专业化。如果你在特定地理区域拥有某个垂直市场的专长，尤其当提供该垂直市场服务需要特定技能时，你完全可以也应该为你的服务收取溢价。'
- fmt: '# Before You Get Started: Take Care of Yourself


    Sometimes we get busy. You know those times when we have 8,000 things going on
    at work, picking up the kids from school, taking them to swimming lessons, turning
    in a proposal after dinner, and grabbing that call from the other side of the
    world at 1 AM. The next thing you know, you can easily forget to take care of
    yourself. You end up getting sick, performing poorly due to fatigue, and ultimately
    getting even busier due to craptastic performance.


    Getting sick doesn’t end up doing anyone any good. And persisting on long-term
    fatigue can have devastating results on not only your health, but friendships
    and family as well.


    But we can’t always control the work–life balance. Or can we? What are some things
    we can do to stay well, both mentally and physically?


    - **Time tracking**: There are courses and methodologies and books. You don’t
    have to buy one, but it’s never a bad idea to get some form of time-tracking and
    organization going.


    **Pro tip** Start as simple as you can, and move to other, more mature business
    systems as you grow into them!


    - **Exercise**: When we get busy, one of the easiest things to let go of is our
    exercise routines. Maybe others see the time we spend at the gym as an indulgence,
    or maybe 8 hours on a flight isn’t conducive to a quick run. But not letting go
    gives us better self-esteem, makes us more resilient, and gives us time to let
    our brains relax away from it all, so those creative juices can get to flowing!


    - **Eat healthily**: Exercise is part of a healthy lifestyle, but eating properly
    is critical as well. We all need plenty of calories and a healthy mix of foods.
    Stay away from fast food and enjoy the art of cooking whenever possible.


    - **Get help from others**: When you’re spinning your wheels, reach out to others
    for help. No one expects us to be perfect, so we can admit it when we aren’t and
    accept help when we need it!


    - **Automate more**: If you have to touch a piece of paper or perform a manual
    task, search an App Store to see if that task can be moved to an automation on
    a device. And if you have a bunch of apps that you have to manually move data
    between, look for whether or not you can automate that process as well!


    - **Subscribe to the Morning E-mails**: I like getting business reports in the
    morning. They set my tone for the day. Build reports and have them sent to you
    so you can stay on top of trends. Avoid bad knee-jerk reactions based on crappy
    sales or delivery in a given day and focus most on the trends in front of you.


    - **Wake up to the day’s most important news**: The 24-hour news cycle can destroy
    you. Limit what you read and access and isolate what actually matters to you.


    - **Hire more people**: I know, I know, we all get to a point where we just feel
    overworked all the time. If that goes on for too long, we have to accept the fact
    that being overburdened isn’t going anywhere and we need to bring in more humans.


    - **Be diligent about building a better mousetrap**: Is there waste in your day?
    Are there processes that, with a small tweak, would be able to be more efficient?
    Can you remove steps without removing quality? I like to set a quarterly or monthly
    task for myself to think about how I can do better at all things!


    - **Learn to say no**: Early on in our careers, we tend to say yes to more things
    than we need to. But as we progress, there are a number of things that we no longer
    enjoy or take any benefit from. We still want to help our communities and stay
    involved in a lot of things, but ultimately, we have to learn to say no here and
    there in order to maintain our own sanity.


    If you’re so busy you can’t take care of yourself, just stop making yourself so
    busy. It’s never too early to get started. Life is too short. I hope one or more
    of these tips help to spark an idea that saves you time and money and makes your
    life just a little bit better.


    # Research What Should Be in an Offer


    You’ve decided to start a company! There are few finer things to do in this world,
    and few more frustrating. Before you can start selling stuff, you need to know
    exactly what it is you are selling, and exactly how much to charge for it. In
    the beginning, you can be the person who does computer stuff. But if you want
    to grow (and be happy while doing so), then you’ll need to draw lines between
    what you will do and what you will not do. Or, more to the point, what you would
    prefer to spend your time doing, which is often to chase profitable long-term
    contracts.


    As we’ll show in Chapter `13`, those long-term contracts build more value for
    the company than anything else you can do. Long-term contracts also give you a
    more scalable business model to allow for building strong teams with long-term
    career potentials, without the fear of bankruptcy. Support contracts come in a
    lot of different flavors, though. Let’s look at a few these can easily include:


    - **Hourly support**: As the name implies, customers pay you hourly to do work
    for them. You can grow a business and make a lot of money doing so. But you will
    always have a direct correlation between the cost to deliver a service and the
    profit you can make off that service.


    - **Retainer-based support**: You are paid to deliver a certain number of hours
    per month, on retainer. These usually come with either an expiration date or roll
    through to the end of a contract. Retainer customers should receive prioritization
    over hourly support customers to provide hourly support customers with a reason
    to upgrade to retainer programs, but without making them feel like second-class
    customers.


    - **Managed services**: You are paid to deliver an unlimited amount of services
    in exchange for a fixed fee every month, usually billed on a per-user or per-device
    basis. For smaller customers, the offering can include cloud mail, storage, backup,
    and more as well.


    - **Hybrid approaches**: I’ve seen a pretty substantial number of companies out
    there that are afraid of allowing for unlimited support. For example, many will
    provide an unlimited amount of help desk services for a set price. Some go further
    and include a few hours a month of onsite work. These hybrid approaches are a
    good temporary fix for customers wanting a fixed price for all of their service
    needs. Unless done really well, they don’t usually scale to a lot of consultants,
    due to operations costs caused by having too many ways to bill customers.


    - **Fixed-fee projects**: Most companies that offer any of the above services
    will also provide project-based support as well. These projects fill the gaps
    that can’t be accounted for in a purely managed services business. If you deliver
    managed services and do not yet do project-based work, then you will need to find
    a partner to deliver those services, or the companies who do come in to do those
    projects might end up carving out parts of the business from your hard-won customers.


    - **Managed Leases**: This is really just Managed Services with a lease to the
    hardware (and maybe software and insurance) tacked on so that those in charge
    of running IT can be proactive with budgeting.


    I tried to list these in order of complexity. Standard hourly support is the first
    and simplest to deliver; there’s no commitment from either party. As you get later
    in the list, the relationship becomes more complex. As relationships become more
    complex, customers are often required to sign annual or multi-year contracts.
    And of course, the longer the term, the less a contract costs and the more prices
    are fixed against inflation.'
