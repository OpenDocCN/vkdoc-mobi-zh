- fmt: '*   始终询问是否需要提供其他帮助：特别是当您开始忙碌时，最终会手忙脚乱。请不要这样。如果按小时计费，这是延长任务的好方法。如果按固定费用计费，您可能会增加另一份合同。如果您是托管服务提供商（`MSP`），那件小事可能正是让客户续约一年的关键。不要忘记，最容易营销的客户就是您已有的客户！


    创办服务公司时，营销不仅仅是向出价最高的人推销您的解决方案。它通常关乎将您自己树立为所服务行业的专家。但这是什么行业呢？通过回复其他顾问的帖子能获得大量客户吗？也许吧，但值得怀疑。通过撰写如何修复硬盘的文章能在电影行业找到客户吗？也许吧，但同样令人怀疑。在刚起步时，请思考您正在服务的客户以及服务的领域。例如，如果您试图在视觉效果领域招募客户，那么在该行业中的曝光将有助于将您树立为视觉效果客户提供IT服务的专家。


    ## 搜索引擎优化


    关于搜索引擎优化（`SEO`），有句老话说“内容为王”。独特且大量的内容确实会为您的网站带来流量。当然，至于它是否能带来您想要的那种流量，则是另一回事。关于这个主题有几十本书，所以我这里只是浅尝辄止，但值得指出的是，您可以想花多少时间在`SEO`上就花多少时间。


    以下是一些入门级的`SEO`技巧：


    *   找一个能帮您完成大部分工作的插件。我在个人网站上使用`Wordpress`。有许多很棒的`Wordpress`插件可以分析文章的各种属性，使其易于被爬取，这个插件叫`Yoast`。我强烈推荐它。

    *   大多数`SEO`引擎喜欢使用简单词汇的文章。是的，我们都知道您很聪明，但如果您使用大词，`SEO`引擎（拟人化地说）可能会得出相反的结论。一个好的测试标准是以五年级学生的水平来写作。

    *   限制文章和帖子的长度。当我在某杂志刚开始写作时，我对他们限制文章在`800`字以内感到震惊。如果页面是关于您提供的某项服务，那么字数可能要比那更少，四分之一都不到。如果是一篇带有引导点击服务的“行动号召”的博客文章，那么`800`字大约是爬虫会关注的上限。如果您发现想要更长的文章，那么请考虑将其序列化成更短的帖子。

    *   如果使用图片，请提供描述：这不仅对无法看到图片的人有帮助，而且由于爬虫无法知道图片内容是什么，因此在爬取内容中包含描述图片元数据会有所帮助。

    *   尝试在页面上包含一个关键词：大多数现代博客或站点管理工具允许您在页面上包含一个关键词。通常这个关键词是一两个在文章中使用的词，搜索引擎用来了解文章内容。

    *   不要过度使用关键词：关键词应该重复几次，但不要超过合适的限度。否则，这会被视为“关键词堆砌”。一个好的经验法则是避免列出电话号码或其他对文章无价值的数据；避免列出网页试图排名的所有城市、区号和州；避免以不自然的方式重复相同的词或短语。我还没有看到关于一篇文章中关键词密度的明确观点，但我尝试将频率限制在每`200`个词`1`次。

    *   将文章发布到`Twitter`和`Facebook`：另外，不要忘记`Google Plus`——原因是谷歌爬取自己网站上的内容会比在其他网站稍多一些，您通常可以在那里看到额外的流量提升。

    *   发布站点地图：现代博客引擎会为内容生成大量动态页面，这些页面通常有不同的名称，从而产生重复内容。无论是在一个域名内还是跨域名，重复内容都会惹恼网络爬虫和搜索算法。如果我包含了重复内容，我通常会将其放在引号内并注明出处。这也有助于我将来如果决定移除某个来源的所有内容时（这些来源后来被我认定为不合法的）进行处理。

    *   在`URL`中包含文章标题：在`Wordpress`中，这些被称为永久链接（`Permalinks`）。一篇文章的实际标题可能是`http://krypted.com/wp-admin/post.php?post=49178`，但您用于发布到网站上的`URL`可能是`http://krypted.com/mac-os-x-server/migrating-mail-service-macos-server/`。这个技巧是我多年前从洛杉矶`Band
    of Techs`公司的负责人`Thomas Orona`那里学到的。除了配置永久链接之外，几乎没做其他什么不同的事情，花了`5`分钟，我的流量在`90`天内几乎翻了一番。'
  raw: '*   Always ask if they need you to do anything else: Especially when you start
    to get a little bit busy, you’ll end up rushing around. Don’t. If you’re billing
    hourly, this is a great way to extend jobs. If you’re billing fixed-fee, you might
    end up picking up another contract. If you’re an MSP, that one little thing might
    be what makes the customer sign up for another year. Don’t forget that the easiest
    customers to market to are the ones you already have!


    When starting a services firm, marketing isn’t just about selling your solutions
    to the highest bidder. It’s often about establishing yourself as an expert in
    the industry you serve. But what industry is that? Will you find a ton of clients
    by responding to posts from other consultants? Maybe, but doubtful. Will you find
    customers in the film industry by writing about how to fix a hard drive? Maybe,
    but again doubtful. When you’re first starting out, think about the customers
    you are servicing in the area you’re doing so. For example, if you are trying
    to recruit customers in visual effects, then press in that industry will help
    brand you as an expert in doing IT for visual effects customers.


    ## Search Engine Optimization


    The old saying when it comes to Search Engine Optimization (SEO) is that “content
    is king.” Unique content, and lots of it, will certainly drive traffic to your
    site. Whether it will drive the type of traffic you want or not, is of course
    another story. There are dozens of books on this topic, so I’ll barely be scratching
    the surface here, but it’s worth saying that you can spend as much time on SEO
    as you want.


    But here are some tips for SEO, to get you started.


    *   Find a plugin that does a lot of the work for you. I use Wordpress for my
    personal website. There are a lot of great plugins for Wordpress that analyze
    posts for all the various attributes that make them easily crawlable called Yoast.
    I couldn’t recommend it more.


    *   Most SEO engines like articles with small words. Yes, we all know you’re smart,
    but the SEO engines might think the opposite (to anthropomorphize them) if you
    use big words. A good test is to write at the level of a fifth grader.


    *   Limit the length of articles and posts. When I started writing for a magazine
    awhile back I was aghast at the fact that they limited articles to 800 words.
    If a page is about a service you are providing, then you likely want less than
    a quarter of that. If it’s a blog post with a Call to Action to click on your
    service, then 800 words is about as much as a crawler will care about. If you
    find that you want longer articles then consider serializing them into smaller
    posts.


    *   If you use images, provide a description: Not only is this helpful for those
    who cannot see the image, but since crawlers wouldn’t otherwise know what an image
    is of, it helps to include the metadata about what the image is in what is crawled.


    *   Try to include a Keyword on pages: Most modern blogging or site administration
    tools will allow you to include a keyword on pages. Usually this is one or two
    words that are used in the article and that search engines use to learn what the
    article is about.


    *   Don’t include keywords too much: The keyword should repeat a few times but
    not more than is appropriate. Otherwise it’s considered “keyword stuffing.” A
    good rule of thumb is to avoid lists of phone numbers or other data that don’t
    add value to an article, avoid listing all of the various cities, area codes,
    and states a webpage is trying to rank for and repeating the same words or phrases
    in an unnatural way. I haven’t seen a solid opinion on the density a keyword can
    be in an article, but I try to limit to 1 per 200 words.


    *   Post articles to Twitter and Facebook: Also, don’t forget about Google Plus—the
    reason being that Google crawls their own content a little more than on other
    sites and you can often see additional lift there.


    *   Post a site map: Modern blogging engines will produce a number of dynamic
    posts for content, often with different names. These have duplicative content.
    Whether inside a domain or across domains, duplicative content pisses off web
    crawlers and search algorithms. If I include duplicative content, I typically
    put it in quotes and indicate where it came from. This also helps me should I
    ever want to remove all content from a source I later decide to be illegitimate.


    *   Include the title of the post in the URL: In Wordpress these are called Permalinks.
    The actual title to an article might be [`http://krypted.com/wp-admin/post.php?post=49178`](http://krypted.com/wp-admin/post.php?post=49178)
    , but the URL that you use to post to websites might be [`http://krypted.com/mac-os-x-server/migrating-mail-service-macos-server/`](http://krypted.com/mac-os-x-server/migrating-mail-service-macos-server/)
    . I learned this trick many years ago by a principal from Band of Techs out of
    Los Angeles, Thomas Orona. It took 5 minutes and my traffic almost doubled within
    90 days, by doing almost nothing else differently other than configuring permalinks.'
