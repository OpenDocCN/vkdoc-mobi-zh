    \ offering and then working within enterprise-class environments gave me a new\
    \ perspective on being a traditional consulting firm and a Managed Services Provider,\
    \ of the ways that business blends together. And mentoring former competitors\
    \ has enlightened me to the challenges that others have that I didn’t and challenges\
    \ I had that they didn’t. I certainly can’t speak to the iterations that guarantee\
    \ success; but I hope this book helps you choose whether or not to take such a\
    \ journey, along the path, and ultimately, to find success.\n\nIn this book, we’ll\
    \ look at a number of scenarios that give readers insight into how to deal with\
    \ some of the most common challenges they’ll face while starting a consulting\
    \ company. Some of these can be applied generally; others, are specific to managed\
    \ services.\n\n### Chapter-by-Chapter\n\nThe book is structured in three general\
    \ parts: running the business, developing the business, and what to do once you\
    \ get things up and running. Each chapter then covers the following:\n\n**Chapter\
    \ 0:** *The Joy of Being a Sole Proprietor.* In this short chapter, we’ll cover\
    \ the life of a sole proprietor and the challenges you’ll face when you decide\
    \ to grow.\n\n**Chapter 1:** *Build the Offer.* In this chapter we look at defining\
    \ what your product actually is. Are you going to be a flat fee managed service\
    \ provider, or will you mix your services? We’ll look at questions around hourly\
    \ vs. unlimited support, sanity check network segments, and how to validate that\
    \ your pricing is correct.\n\n**Chapter 2:** *Beyond Services* In this chapter,\
    \ we go beyond selling services and into selling subscriptions to websites, selling\
    \ hardware, selling bandwidth, and other areas where you can add revenue streams\
    \ to help fund your startup.\n\n**Chapter 3:** *Hiring and Human Resources.* In\
    \ this chapter, we look at hiring, training, and retaining engineers. We also\
    \ take a pretty cold and calculated look at when you have to let some of the best\
    \ employees you’ve ever had move on of their own accord and what kinds of drastic\
    \ moves might help you retain them.\n\n**Chapter 4:** *Accounting 101.* In this\
    \ chapter, we look at the most exciting aspect of your organization: keeping the\
    \ books. Many a business owner hates doing this. I have always loved it. Oh, and\
    \ taxes. Because… taxes…\n\n**Chapter 5:** *Buy Software to Automate the Business.*\
    \ Chapter 5 covers putting automation software in place. This includes software\
    \ to monitor the health of remotely manage devices and then proceeds to software\
    \ to perform ticketing and dispatch, ultimately looking at tying into other aspects\
    \ of the business, including e-mail automation, billing, and contract management.\n\
    \n**Chapter 6:** *Make Friends: Develop Partnerships.* Chapter 6 is about partnerships.\
    \ Partnerships can mean tons of new customers coming in, or they can be a waste\
    \ of time. Here we look at finding the right partner, building a good relationship,\
    \ and converting those partnerships into customers.\n\n**Chapter 7:** *Engage\
    \ in Free and Guerrilla Marketing.* In this chapter, we look at getting the most\
    \ bang for your marketing dollars. You’ll get tips on easy ways to maximize your\
    \ investment, some ideas, and, of course, some resources for chasing down even\
    \ more.\n\n**Chapter 8:** *Using Public Relations.* In this chapter, we focus\
    \ on Public Relations. PR is getting your organization in front of the press,\
    \ including quotes in the press, customer stories that mention your company’s\
    \ name, and other assets, with or without hiring a PR firm.\n\n**Chapter 9:**\
    \ *Advertising.* In this chapter, we look at paid advertising. In Chapters 7 and\
