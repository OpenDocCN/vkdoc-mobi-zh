    # 应对成功


    应对失败是一回事，而应对成功也同样能说明问题。当一切进展顺利，你开始实现良好的销售和交付时，你会感受到新举措开始有了起色。事情可能会开始变得容易。但生意本不该轻松，也不会一直轻松。


    因此，如果你足够幸运，一项举措取得了成功，但若不保持警惕，竞争对手就会跟进并做得更好。所以，一旦事情进展顺利，就要退后一步，仔细审视运营的每个方面，并敏锐地思考如何将一切做得更好。这并不意味着现在不够出色，但一切总有改进的空间。安于现状绝不可取。以下是一些批判性地审视成功努力的方法，以避免自满情绪。


    1.  **提高投资回报率：** 寻找渐进式的改进，例如提高销售成本以控制需求，或通过引入新工具和自动化来降低成本。


    2.  **提高可扩展性：** 如果产品畅销，你需要在销售过程中提升效率。你很可能来不及快速招聘。在没有增加人员的情况下，你的组织如何增长？考虑将部分工作外包以扩大业务规模。确保外包的增速要快于招聘员工的速度。


    3.  **持续增加你的业务组合：** 你已经在某个领域取得了成功，为什么不尝试另一个呢？你还能将哪些其他的商品或服务推向市场？为销售团队提供额外的`sku`（库存单位）用于交叉销售，或者开拓新的市场，这些都是保持收入飙升的好方法。确保你理解每个市场、机遇和风险，但要让增长的势头持续下去，同时避免让客户觉得“他们老是打电话来推销更多东西”。


    4.  **寻找更多进入市场的方式（或渠道）：** 考虑增加销售渠道，创建新的销售赋能工具，并与销售人员会面，帮助他们更好地销售，并传达你如何持续加强每条产品线。即使你认为自己已经满负荷运转，也要对销售保持乐观，并在必要时将更多工作外包——当然，前提是你的利润率保持强劲。


    5.  **精简组织：** 鉴于你推出的新产品或新服务，如何让组织运行得更高效？运营的每个部分是否都创造了价值？你能合并不同业务线（如支持部门）之间的流程，以提高各自的效率吗？


    6.  **改善团队状况：** 调查员工的看法以及企业文化的状况。务必倾听并满足团队的要求，不要做太多假设。例如，几乎所有员工都希望获得更多、更好的培训。一支感到基本需求得到满足的员工队伍会更快乐，也更容易取得成功。


    审视业务的最佳时机恰恰是事情进展得非常顺利的时候！思考如何让每条产品线变得更好的最佳时机，恰恰是这条产品线表现良好的时候。但需要采取整体方法，审视组织的每个部分以及它如何能变得更好，同时不要耗尽所有的增长势头。


    也不要只关注一个领域。如果你只改善员工体验，那么你的成本将完全失控。但如果你只提高效率，你会疏远客户，以及那些效率越来越高（通常到毫无乐趣可言的地步）的员工。如果你只是不断地向业务组合中添加更多东西，那么组织对员工来说会显得混乱，对客户来说则可能显得贪婪。


    然而，采取一种平衡的方法，并与员工进行良好沟通，很可能让员工保持快乐并长久地留在公司！


    ## 结论


    你应该尝试不同的业务线。有些业务你会失败。如果经营企业很容易，那么每个人都会去做！


    没有神奇的方法。在本章结束之际，我想留给你最后一点想法：快速失败，但不要完全否定整个业务线，因为执行不佳可能源于糟糕的策略、员工投入不足、时机不当或各种其他因素。同样，成功也可能源于相反的因素，并且可能不会持久。


    基本上，如果你之前决定不销售硬件，请重新审视这个决定。如果你尝试过提供托管服务但没有成功，那就再试一次——至少，如果你对这些业务线感兴趣的话。


    ## 延伸阅读


    -   《PMBOK 指南》：[`https://www.amazon.com/Guide-Project-Management-Knowledge-PMBOK/dp/1935589679`](https://www.amazon.com/Guide-Project-Management-Knowledge-PMBOK/dp/1935589679)


    -   《非正式项目经理的项目管理》，作者：Kory Kogon, Suzette Blakemore, James Wood, [`https://www.amazon.com/Project-Management-Unofficial-Manager-FranklinCovey/dp/194163110X`](https://www.amazon.com/Project-Management-Unofficial-Manager-FranklinCovey/dp/194163110X)


    -   《重理曼陀罗》，作者：Rick Levine, Christopher Locke, Doc Searls, David Weinberger, [`https://www.amazon.com/Cluetrain-Manifesto-10th-Anniversary/dp/0465024092/`](https://www.amazon.com/Cluetrain-Manifesto-10th-Anniversary/dp/0465024092/)


    -   《谁说大象不能跳舞？》，作者：Louis V. Gerstner [`https://www.amazon.com/Who-Says-Elephants-Cant-Dance/dp/0060523808`](https://www.amazon.com/Who-Says-Elephants-Cant-Dance/dp/0060523808)


    -   《跨越鸿沟》，作者：Geoffrey A. Moore [`https://www.amazon.com/Crossing-Chasm-3rd-Disruptive-Mainstream/dp/0062292986/`](https://www.amazon.com/Crossing-Chasm-3rd-Disruptive-Mainstream/dp/0062292986/)


    -   《启示录：打造用户喜爱的产品》，作者：Cagan [`https://www.amazon.com/Inspired-Create-Products-Customers-Love/dp/0981690408/`](https://www.amazon.com/Inspired-Create-Products-Customers-Love/dp/0981690408/)


    -   《工业官僚主义的模式》，作者：Alvin W. Gouldner, [`https://www.amazon.com/Patterns-Industrial-Bureaucracy-Alvin-Gouldner/dp/0029127408`](https://www.amazon.com/Patterns-Industrial-Bureaucracy-Alvin-Gouldner/dp/0029127408)


    -   《必胜无疑：约翰·博伊德的战略在商业中的应用》，作者：Chet Richards, [`https://www.amazon.com/Certain-Win-Strategy-Applied-Business/dp/1413453767`](https://www.amazon.com/Certain-Win-Strategy-Applied-Business/dp/1413453767)


    -   《精益创业》，作者：Reis [`https://www.amazon.com/Lean-Startup-Entrepreneurs-Continuous-Innovation/dp/0307887898`](https://www.amazon.com/Lean-Startup-Entrepreneurs-Continuous-Innovation/dp/0307887898)


    -   《微软重启：比尔·盖茨和史蒂夫·鲍尔默如何重塑公司》，作者：Robert Slater, [`https://www.amazon.com/Microsoft-Rebooted-Ballmer-Reinvented-Company/dp/1591840392`](https://www.amazon.com/Microsoft-Rebooted-Ballmer-Reinvented-Company/dp/1591840392)

