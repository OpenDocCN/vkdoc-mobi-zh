  trans: '

    # 市场营销


    一旦你有了产品，就该制定营销计划了。这与你之前书中提到的如何营销自己的咨询业务类似，区别在于，你不是花自己的钱，而是很可能要尝试说服某个市场部门的人动用他们的预算。


    争取到预算最轻松的时机是年底。如果你在七月份入职一家公司，而他们已经规划好了全年的广告和营销支出，那么很可能你无法做成太多事情。但这也正是开始谈论下一年计划以及你届时想要达成什么目标的时候。


    在此期间，你需要尽可能多地积累资产。并且要确保这些资产保持最新状态。这其中既包括内部销售与营销赋能资产，也包括团队能够通过邮件活动、会议等渠道对外分发的资产。这些资产包括：


    *   **客户成功案例**：客户购买了服务，从而更快地进入了市场。效果非常棒。你看到其中的吸引力了吧？

    *   **一页纸简介**：理想情况下，每个产品 SKU 都准备一份，可以在会议上分发。

    *   **素材图片**：如果你还不能投放广告，不妨先搜集一些素材，为后续制作广告做准备。

    *   **为其他营销资产做贡献**：没错，事实就是，你越擅长与人合作，他们就越可能愿意帮助你。


    一旦市场推广方面有了不错的起色，就该开始与销售团队合作进行赋能了。


    # 销售，销售，再销售


    销售团队既是你的最佳盟友，也是你的头号劲敌。他们销售你的服务，从某种意义上说，这也是你存在于这个组织的原因。但他们也经常想提供折扣。给服务和其他辅助 SKU
    打折通常比给核心产品打折要容易得多。老实说，公司是靠销售核心产品来运营的，所以这本身也合理。


    但你是有利润率目标的。为了赢得销售而免费提供服务，会让你的血压飙升。如果大量免费服务被送出去，最终肯定会有人问，为什么服务业务的利润率如此糟糕。即使他们嘴上说不会问，也迟早会问。当这种情况发生时，能够讲出一个有说服力的故事至关重要。最简单的办法就是在实际的损益表（P&L）上展示你正在盈利（说实话，做服务怎么可能不盈利呢？！？！）。但如何处理免费服务的问题呢？答案就是：收费冲销（Charge-backs）。


    对收费冲销最简单的描述是：将打折的服务天数计费到另一个团队头上。如果销售团队因为给你的 SKU 打折或免费赠送而“受到责罚”，那么他们这样做的可能性就会大大降低，即使收费冲销使用的是软成本而非你本应收到的机会成本。


    但如前所述，销售可以成为你的最佳盟友。他们是组织的命脉，带来新业务，并促成你负责交付的服务的销售。你给予他们的关注越多，服务就越容易占据他们的头脑，他们销售得也越多。以下是一些在组织中用来驱动理想销售行为的杠杆。


    务必确保销售团队和客户团队拥有他们所需的所有资料。如果他们需要什么，就去制作。在他们开口之前，你最好先准备好以下内容：


    *   一份可对外分发、描述每个 SKU 的一页纸简介。

    *   描述服务或捆绑包的邮件模板。

    *   围绕服务和捆绑包的销售话术。

    *   每个 SKU 的工作说明书（SOW），提供给客户。

    *   概述服务常见问题及解答的常见问题解答 FAQ 或维基 Wiki。


    这能移除任何阻碍销售人员安心销售你服务产品的障碍，从而让他们更有信心。而信心往往是销售中最重要的方面。如果你想提高服务的销售额，就专注于让销售团队充满信心，并保持与他们的沟通，可以举办午餐学习会、赋能会议、送些甜甜圈，当然，还要征求他们的反馈。


    一旦服务开始销售，就该组建团队来交付服务了。除非你已经组建了团队。那么，就该管理那个团队了。


    # 人员配置


    咨询公司员工的职业发展路径相当直接，我们在本书中用了一整章来讲述。但在大型公司里，服务员工的职业发展则略有不同。请记住，你手下员工最好的结局就是离开你。或者取代你。当那些应得的人取代你时，那种感觉是最好的。


    所有的培训，所有的工作，当他们最终离开服务团队时，处境反而更好了。这是为什么？嗯，我们先说说员工最初为什么会离开。


    *   **为了更接近产品**：有多少人能像那些直接面对客户并交付工作的人一样，在真实场景中接触到那么多客户？这些往往是构建产品路线图的最佳时机。在某个节点，许多服务人员会厌倦抱怨优先级，转而希望对公司生产的硬件或软件的未来有更积极的参与。

    *   **为了更贴近产品**：服务工程师通常能成为出色的质量保证（QA）测试员（毕竟，他们在产品发布后一直在与客户一起测试产品），或者，如果他们掌握了相关技能，也容易转入开发团队。

    *   **为了转入销售**：服务人员中很少有人愿意承认这一点，但在硬件或软件公司，他们是你所能找到的最好的系统工程师之一。那些真正尝试转入销售的人，不仅能说会道，还能付诸实践。

    *   **出差太多**：前面的原因是服务工程师可能转岗的其他职位。而如果你找不到解决方案，这个原因则可能导致某人直接离开公司。许多团队成员一开始热爱出差，但随着年龄增长，我们会想要建立关系、生儿育女、安定下来。


    当然还会有其他原因。但就我目前所见，这些是主要原因。有些组织选择建立非常小的团队，或者根本不建团队，而是依赖分包商，我们将在下一节中讨论这一点。

    '
- fmt: '# Professional Services as a Service: Subcontracting


    Focus. Software companies often need to focus on what they are good at: making
    software. But here you are, working on building a services team, potentially competing
    with your own customers.


    Outsource everything, right?!?! First, we outsourced our ownership of hardware
    with leases. Then we outsourced the support of hardware to managed services providers.
    Then we outsourced our servers to hardware as service providers. Then we decided
    we would rather use software as a service and moved to web sites that are hosted
    by vendors. In an age where we take old concepts and rebrand them "as a service"
    many software companies are choosing to hire other organizations to be their professional
    services arm, rather than building one themselves. This allows them to stay focused
    on their core business (e.g., building software, refrigerators, or fields of solar
    panels).


    Most organizations that already have a Professional Services department won''t
    be interested in something like this. You have done the work to build processes,
    you have hired road warriors, and it is a part of your budget. But if you are
    building a new company, or trying to react to hyper-growth, choosing where you
    invest your time and resources is important. And if services isn''t part of your
    core business, then you might be able to accelerate more intelligently if you
    don''t do services.


    Overall, if you have a product that requires services here and there, outsourcing
    the entire services component is a low-risk way of delivering services while still
    capturing revenue. But there are a few questions you should ask vendors as you
    look to outsource services.


    - **Margin**: How much money are we talking about here? If you are talking about
    3 to 5 points then there''s no great reason to embark on a journey like this unless
    you want to streamline the sales process for your core product or services.

    - **Scoping**: Make sure to work out how scoping will happen if a customer needs
    something that isn''t part of a standard services catalog.

    - **Lateral Support**: Customers expect mastery when they pay the vendor directly,
    so make sure to work out third-party support.

    - **Discounts**: When a company runs their own services department, there is a
    pretty standard application of discounts to services in order to close sales.
    After all, on paper you want to look like you are selling as much of your core
    product as possible. Therefore, make sure you know how much of a discount is allowed
    (both in terms of percentages and annual revenues), and that all stakeholders
    understand the impact this will have to the margin of running a services organization.
    This is critical when subcontracting as it is possible to have a net loss on services
    sales if you aren''t careful.

    - **Visibility**: How are projects being handled? You should be able to see the
    date and time that services are delivered and more importantly integrate that
    into the accounting system so your finance team can recognize revenue properly.

    - **Customer Satisfaction Problems**: Customers are often likely to call their
    sales team when they have a problem. You want your sales teams selling, not back-peddling
    to deal with unhappy customers. So, have a standard script for dealing with unhappy
    customers.

    - **Customer Surveys**: Customer Satisfaction isn''t just reacting to angry customers
    when they call in. Being proactive and reaching out to get surveys is a great
    way to keep tabs on how customers feel about services being provided.

    - **Follow-up Support**: Can the subcontractor directly engage with the customer?
    If not, then there should be strict rules around this. If so, then sales and account
    teams need to understand the potential impact to future services sales.


    The word "risk" is the most important aspect of this type of endeavor. There is
    always the risk that something goes wrong with services. From travel delays causing
    resources, to missed appointment times, to accidentally shutting down a network
    for a customer and causing them to stop business on their busiest days of the
    year, I have seen it all. If you build your own services department, then you
    are taking on some risk. If you have a large enough team, that risk will be amortized
    across the staff and likely not impact margins too much.


    ## Conclusion


    What are you supposed to be doing? Growing a services organization? Focusing on
    profit? Squeezing margin out of the organization? Building a stronger sales funnel?
    Helping to close sales? Improving the product? All of the above? There''s about
    as many answers to this as there are companies that have services teams. In general,
    smaller organizations are going to be after service dollars and as organizations
    grow larger and more mature, these conversations need to be revisited repeatedly.


    Having your own company can be pretty sweet. But there''s a lot of risk. If you
    have been running your own consulting shop, and you are ready for a new gig, then
    running a services team in a larger organization is certainly one of the places
    you may choose to look for your next position. Or, if you have been in other positions
    within a company and are moving into services, hopefully we have managed to provide
    a little insight in this chapter into some things to do and ways to look at the
    business.


    Most organizations that sell hardware and software to businesses will have a services
    team. And most will have a different perspective on what that means. In some cases,
    like when Gerstner took over IBM, a software company can become much, much more
    of a services organization. But that was an intentional transition.


    Ultimately, job requisition numbers in growing companies are hard to come by.
    If you require too many services around your product, then perhaps some should
    be redirected to user experience positions.


    ## Further Reading


    - Zone to Win, Geoffrey A. Moore, [https://www.amazon.com/Zone-Win-Organizing-Compete-Disruption/dp/1682302113](https://www.amazon.com/Zone-Win-Organizing-Compete-Disruption/dp/1682302113)

    - Communication Strategies for Managing Conflict, Mary Lou Higgerson [https://www.amazon.com/Communication-Strategies-Managing-Conflict-Jossey-Bass/dp/1118761626](https://www.amazon.com/Communication-Strategies-Managing-Conflict-Jossey-Bass/dp/1118761626)

    - Inside the Tornado, Geoffrey A. Moore, [https://www.amazon.com/Inside-Tornado-Strategies-Developing-Hypergrowth/dp/0060745819](https://www.amazon.com/Inside-Tornado-Strategies-Developing-Hypergrowth/dp/0060745819)

    - The Standard for Portfolio Management, The Project Management Institute, [https://www.amazon.com/Standard-Portfolio-Management-Project-Institute-ebook/dp/B077SP9NRQ](https://www.amazon.com/Standard-Portfolio-Management-Project-Institute-ebook/dp/B077SP9NRQ)

    - Managed Services in a month, Karl Palachuk [https://www.amazon.com/Managed-Services-Month-Successful-Consulting-ebook/dp/B078J7ZKV1](https://www.amazon.com/Managed-Services-Month-Successful-Consulting-ebook/dp/B078J7ZKV1)

    - Competitive Strategy: Techniques for Analyzing Industries and Competitors, Michael
    E Porter, [https://www.amazon.com/Competitive-Strategy-Techniques-Industries-Competitors/dp/0684841487](https://www.amazon.com/Competitive-Strategy-Techniques-Industries-Competitors/dp/0684841487)'
  raw: '## Professional Services as a Service: Subcontracting


    Focus. Software companies often need to focus on what they’re good at: making
    software. But here you are, working on building a services team, potentially competing
    with your own customers.


    Outsource everything, right?!?! First, we outsourced our ownership of hardware
    with leases. Then we outsourced the support of hardware to managed services providers.
    Then we outsourced our servers to hardware as service providers. Then we decided
    we’d rather use software as a service and moved to web sites that are hosted by
    vendors. In an age where we take old concepts and rebrand them “as a service”
    many software companies are choosing to hire other organizations to be their professional
    services arm, rather than building one themselves. This allows them to stay focused
    on their core business (e.g., building software, refrigerators, or fields of solar
    panels).


    Most organizations that already have a Professional Services department won’t
    be interested in something like this. You’ve done the work to build processes,
    you’ve hired road warriors, and it’s a part of your budget. But if you’re building
    a new company, or trying to react to hyper-growth, choosing where you invest your
    time and resources is important. And if services isn’t part of your core business,
    then you might be able to accelerate more intelligently if you don’t do services.


