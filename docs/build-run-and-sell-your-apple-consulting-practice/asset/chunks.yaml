    or maybe discussed and didn’t see). Usually a bulleted list of disparate technologies
    can be a challenge to comb through. Prepare technical questions for an interview
    by marking up a resume or writing on printed resumes. Many will give a big list
    in order to get through search criteria in automated resume review systems.


    *   Avoid overthinking arcane skills and technology. Yes, someone may have spent
    10 years as a COBOL programmer, but the last 2 years was with Swift. Focus on
    the skills you need and how recently they were applied.


    *   Good grammar in a resume probably means good grammar in e-mails to customers.
    If a candidate can’t spell-check a resume, they probably won’t spell-check their
    e-mails or pay attention when the grammar gets flagged. I write books (obviously),
    so I’m a bit funny about spelling errors, especially when they’re underlined with
    lame squiggly marks in a document sent to me, but this is an attention to detail
    you want to see in resumes.


    *   Look for succinct descriptions. A 30-page play-by-play of every time a candidate
    called a support desk to get a problem fixed is a huge red flag. The ability to
    communicate succinctly (whether in the written form, on a call, or in person)
    is one of the more underrated job skills to look for when hiring, no matter what
    the blathering in this book indicates. Keep in mind that you’re going to get a
    lot of e-mail from this person. And if they’re all four pages, you’re going to
    waste a lot of time.


    *   Look for certifications over post-secondary education. While Apple has been
    slowly killing off their training programs (you can still get certified for sure),
    there are a number of certifications out there from vendors like Jamf, FileWave,
    VMware, and Google. Certainly, there’s value in a college education, but certifications
    typically indicate that a prospective employee has more specific skills that might
    meet your needs.


    *   Look at the e-mail address. Yes, I am intrigued by the fact that Google would
    actually give some e-mail addresses I’ve seen, but the lack of good judgment from
    a candidate in not creating a sanitized account could be concerning.


    *   Read the cover sheet. You can often learn more about a candidate from the
    cover sheet than you can from the resume.


    You’ll have your own criteria, and they’ll be better than mine for your use. And
    each job is different (e.g., you aren’t going to look for skills with python when
    hiring an accountant). But this should get you started. Be patient, there are
    a lot of great people looking for work!


    I like to go through all resumes in batches. During growth spurts, the rare moments
    of solitude that were required to review resumes often came only after I got home
    from work. But I always made sure to keep the ball moving on hiring, as potential
    employees who are any good will get hired quickly, so you need to act in order
    to hire. When you need employees, you are usually busy, so it’s critical to keep
    momentum in the hiring process.


    ## Interviewing


    The interview is where you go beyond a resume and review each candidate to decide
    if they fit with the culture you want your company to have and to bring the right
    level of skill to the position. But the interview is more: the interview sets
    the tone for your relationship with a candidate throughout their tenure at your
    company. In this section, we’ll look at two aspects of the interview process.
    We’ll start with phone screening job candidates, and then move on to the in-person
    interview.


    ### Phone Screening


    The phone screen is a short call with a candidate to make sure that you want them
    to come in for an interview. Send an e-mail or reach out through the medium that
    the resume came in as a first attempt to set up a phone screening. You can also
    call someone and just ask if they have a few minutes to discuss the position,
    or if they would prefer to set up a time.


    The phone screen should be light. You aren’t going to show a candidate a screenshot
    of a router or a snippet of swift code and ask them to tell you what’s wrong.
    But you do want to maybe confirm a few details from the resume, validate any necessary
    technical skills, and ascertain the phone demeanor of a candidate. I usually ask
    a series of questions that include the following during a phone screening (according
    to the position):


    *   Reiterate the top three or four bullets from the job description


    *   Any questions to find the personality traits you’re looking for


    *   Look for a willingness to learn


    *   Look for core competencies that might not be on each individual job description


    *   This is the right time to ask what someone is making (unless it’s forbidden
    in your state) and what they are looking to make


    *   Why are you interested in the company?


    ### Note


    I often cap phone screenings at 30 minutes, but you might go further.


    When you’re done with a phone screening, you usually know whether or not you want
    to bring a candidate in for an interview. If you want to interview them, go ahead
    and set up the interview at the end of the screening, so as to remove as much
    latency in the hiring process as possible. There aren’t any good rules around
    scheduling (I’ve done same-day or in a month), just don’t apply pressure for a
    specific time. Make sure the candidate has plenty of time to get to your office
    when they’re done with day jobs, etc.'
  trans: '

    # 简历筛选


    发布招聘信息后，就该开始筛选简历了。这是招聘流程中我最喜欢的环节之一。过去每发布一个职位，我都能收到 100 份简历。其中很多可以轻松忽略。例如，如果你要找的是入门级
    Mac 桌面支持人员，那你很可能不会为来自其他国家的人办理签证（你可能会惊讶我收到过多少这类简历）；或者，如果你要招聘一位经验丰富的 macOS 和 iOS
    支持工程师，你很可能不想面试一个仅在主题公园做过场地维护的人。但我经常能收到五六份这样的简历。


    多年来，我学到了一些技巧，避免把无数时间花在面试候选上。我们来审视一下简历中值得留意的要点。


    -   避免感染文件。如果你收到带病毒的文件，对我们这个行业来说，这基本上就是一票否决。

    -   留意他们只见过一次的技术（或者你可能没见过，但或许见过，或许讨论过却没见过）。通常，一个罗列不同技术的项目符号列表会很难梳理。通过标注简历或在打印版简历上做笔记来准备面试技术问题。许多人会列出一大串技术，以便通过自动化简历审核系统的搜索条件。

    -   避免过度纠结于晦涩的技能和技术。是的，某人可能作为 COBOL 程序员工作了 10 年，但最近 2 年用的是 Swift。专注于你需要的技能以及这些技能最近的运用情况。

    -   简历中良好的语法可能意味着发给客户的电子邮件中也有良好的语法。如果候选人连简历都懒得检查拼写，他们很可能也不会检查邮件中的拼写，或者在意语法错误标记。我写书（显然），所以对拼写错误有点敏感，尤其是当发送给我的文档中，拼写错误被难看的波浪线标出来时更是如此。但这种对细节的关注正是你希望在简历中看到的。

    -   寻找简洁的描述。一份长达 30 页、事无巨细描述每次拨打支持电话解决故障过程的简历，是一个巨大的危险信号。简洁沟通的能力（无论是书面、电话还是当面）是招聘时最被低估的求职技能之一，无论这本书里絮叨了什么。请记住，你会收到这个人发来的大量邮件。如果每封都有四页长，你会浪费很多时间。

    -   优先看认证而非高等教育。虽然苹果在慢慢削减其培训项目（你当然仍然可以获得认证），但市面上还有很多来自 Jamf、FileWave、VMware 和谷歌等厂商的认证。当然，大学教育有其价值，但认证通常表明潜在员工具备更符合你需求的特定技能。

    -   查看电子邮件地址。是的，我对谷歌居然能提供一些我见过的邮箱地址感到好奇，但候选人在没有创建一个干净的账户方面缺乏良好判断力，这可能令人担忧。

    -   阅读求职信。你通常能从求职信中学到比从简历中更多的信息。


    你会有自己的评判标准，并且你的标准会比我的更适合你的用途。而且每个职位都不同（例如，你不会在招聘会计时寻找`python`技能）。但这应该能帮你入门。要有耐心，有很多优秀的人才正在找工作！


    我喜欢分批处理所有简历。在业务高速增长期，我往往要下班回家后才能获得片刻难得的独处时间来审核简历。但我一直确保在招聘上保持推进，因为优秀的人才很快就会被别人录用，所以你必须采取行动才能招到人。当你需要员工时，你通常都很忙，因此在招聘流程中保持势头至关重要。


    ## 面试


    面试是超越简历，审视每位候选人，判断他们是否符合你希望公司拥有的文化，以及是否能为该职位带来恰当技能水平的过程。但面试的意义不止于此：面试为你在候选人整个任职期间与他们的关系定下了基调。在本节中，我们将探讨面试流程的两个方面。我们将从电话筛选求职者开始，然后转向现场面试。


    ### 电话筛选


    电话筛选是与候选人进行的一次简短通话，目的是确保你想邀请他们来参加面试。发送电子邮件或通过简历附带的联系方式联系对方，作为安排电话筛选的首次尝试。你也可以直接打电话，问对方是否有几分钟时间讨论这个职位，或者他们是否更倾向于另外安排时间。


    电话筛选应该轻松随意。你不会给候选人看一张路由器截图或一段`swift`代码片段，然后让他们指出问题所在。但你确实可能需要核实简历中的一些细节，确认必要的技术能力，并评估候选人的电话沟通风格。在电话筛选中，我通常会根据职位问一系列问题，包括：


    -   重申职位描述中的前三或四个要点

    -   提出任何能够发现你在寻找的性格特点的问题

    -   观察是否有学习意愿

    -   考察可能不在每个具体职位描述中的核心能力

    -   这是询问对方目前薪资（除非你所在州禁止）和期望薪资的正确时机

    -   为什么对我们公司感兴趣？


    #### 备注


    我通常将电话筛选控制在 30 分钟内，但你也可以延长。


    当你完成电话筛选后，通常就会知道是否想邀请候选人前来面试了。如果你想面试他们，最好在筛选结束时就直接安排面试，以便尽可能减少招聘流程中的延迟。关于时间安排没有硬性规定（我试过当天面试，也试过一个月后），只是不要给候选人施加特定时间的压力。确保候选人有充足的时间在处理完日常工作后赶到你的办公室。

    '
- fmt: '### In-Person Interviewing


    We all have different things we look for in potential employees. But here are
    a few things I have always looked at when interviewing.


    - **Appearance**: You can’t judge a book by its cover. But you can tell if it’s
    going to be late to work every day. When I interview, I notice everything from
    fingernails to attire to hair. I can get over that first impression for the right
    employee, but I shouldn’t have to.

    - **Timeliness**: Interviewees should be about 5 minutes early. If they’re late
    showing up to your office for an interview, they’re likely to be late meeting
    with customers. I can understand there was a lot of traffic or something like
    that, but leaving with plenty of time even if there is traffic is important. I
    immediately give a pass to anyone that calls. Because things happen.

    - **A copy of a resume**: I don’t need it, but I like the attention to detail
    when someone shows up with a copy of their resume. Makes me think I won’t find
    an empty can of soda sitting on top of a server at some point.

    - **The ability to stay on point**: You ask questions and you want an employee
    to stay professional and succinct. A few minutes of pleasantries up front are
    fine, but if a candidate can keep things on track in an interview then I assume
    they can stay on point with a customer and I’m not going to get a call that they’re
    too chatty.

    - **Nervousness**: I very much forgive any nervous chatter. I assume that means
    they want the job. If a candidate can manage a smile, all the better!

    - **Lying**: At this point, I assume people lie on resumes. But if I figure out
    someone is lying during an interview, I’ll wrap things up and say goodbye and
    that’s that.

    - **The ability to say they don’t know the answer**: When hiring for a technical
    role, ask technical questions. It is fine not to know something, but rather than
    feed you a line of crap, a good candidate will tell you they don’t know the answer
    to a question but how they might go about finding the answer.

    - **Turning off the phone**: Or at least the ringer. Airplane mode is probably
    best. If a phone rings during an interview then I get a tad bit irritable. If
    someone answers a phone during an interview, then I expect a significant other
    to be in labor.

    - **Don’t talk about religion or politics**: This could be included under number
    8, but it’s not. Remember that we live in a country split almost down the middle
    on these topics.

    - **Ask why a candidate wants the job**: This always elicits good responses.

    - **Ask what differentiates a candidate from others.**

    - **Don’t discuss sexual orientation, age, race, or anything else that could remotely
    be considered discriminatory.**

    - **See if the candidate asks questions.** If they’ve done their research and
    have relevant questions to ask, then they’re interested in the role.


    Ultimately, you know when you’ve found the right employees. Certainly, there are
    hard decisions, but if you do everything right, the hard decisions are between
    potentially amazing employees!


    ## Making The Offer


    As we discussed earlier in this chapter, check with sites like `Glassdoor`, or
    work with an outsourced HR provider to determine the amount that is appropriate
    when hiring. A good rule of thumb for getting started, though, is within 20 percent
    above or below the average median income for a given job title in the geography
    you’re hiring in. Anything below 50 percent could end up with inadequately prepared
    employees performing tasks for customers. Anything over 50 percent could end up
    with bored employees.


    Offers should be in writing. Keep in mind that they are contractually binding.
    When you make an offer, you can be sued for damages in the event that you rescind
    the offer before someone starts. So be sure that you have found the right people
    before you offer them a position. The offer should include an overall package,
    defining what in the financial considerations is guaranteed and what, if any,
    income is variable (e.g., commissions). I would recommend only ever changing the
    compensation plan of an employee at the beginning of a fiscal year, and those
    changes should be communicated well in advance.


    Offers can have contingencies, such as passing a background check. All consultancies
    should probably do background checks. This doesn’t mean things like drug testing.
    It just means that before you send employees to schools, homes, or businesses,
    make sure you know who you’re sending. This has an added benefit of checking off
    a box for certain customers that require contractors coming onsite to be background-checked.
    Once you’ve hired someone, it’s very challenging to enforce a background check
    requirement, so make sure to include that in an offer letter. Also, you may choose
    to overlook things that come through in background checks; that is your prerogative.


    Finally, contracts are important, and I like to make offers contingent upon the
    acceptance of things like non-disclosure agreements, so you might elect to send
    these in a hiring packet.


    ## Onboarding New Employees


    Every time you hire someone new, you want to get better at doing so. If you go
    through a growth spurt, this is a must. Therefore, document the process the first
    time. This way you start keeping track of what you need to do each time, like
    a checklist. I like to lay out the plan in a way that includes milestones and
    dates (but I obviously like to write) and put those in a Learning Management System
    (`LMS`) like the Software as a Service (`SaaS`) product `Litmos` or a list app/site,
    like `Trello` or `Wunderlist`.'
