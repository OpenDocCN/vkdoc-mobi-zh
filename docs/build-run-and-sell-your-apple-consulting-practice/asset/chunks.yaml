- fmt: '# Pricing


    Pricing is one of the hardest things to get right in a business. Sell too high
    and no one will want to buy your services; sell too low and no one will respect
    the services you deliver, or you won’t make enough margin to get by.


    There are a lot of factors in choosing how to price your services. There are no
    magic bullets. But there is guidance. We’re going to provide a little guidance
    on a per-billing type basis:


    * **Hourly**: You can ask for whatever rate you want. That doesn’t mean you can
    get it. Whatever rate you can get is basically what you end up with. It’s usually
    supply on demand. You can look on `Craigslist` and find many a provider willing
    to do work for $35 per hour. If you look in more traditional channels, you’re
    more likely to find support for close to $200 per hour or much steeper day rates
    for various specialties.


    * **Retainer-based Support**: You usually need to provide a discount of 10% to
    20% when you sell longer-term support contracts. For example, if you think a customer
    needs to purchase 20 hours per month, and your standard rate is $120 per month,
    then they might buy that bucket of hours, which would normally cost $2400 per
    month, at a discount of $240, which would move the cost down to $2,160.


    * **Managed Services**: Managed services moves the conversation away from hourly
    or daily consulting (time-based consulting) and into a fixed-fee model. A common
    rate would be $60 per computer per month. Continuing on with the $120 per month
    number, this would mean you wouldn’t likely want to spend more than a 1/2-hour
    per month working on a given computer so that you can preserve a similar rate.
    But if moving to an MSP model, you finally get to do all that proactive management
    you were trying to get customers to do for years. So your MSP pricing can often
    be looked at as an average amount of time spent working on a system provided you
    are able to extract usage data. Keep in mind that when looking at Managed Services,
    you want to make a good margin, but if you take too much margin, you will not
    be able to retain customers.


    * **Hybrid Support**: A number of organizations enter into Managed Services contracts
    and then struggle with how to bring new services online that provide value to
    their organization. Managed Services is meant to provide a customer with a predictable
    cost to maintain their existing assets. Many will move into cloud hosting models
    for additional services such as Customer Relationship Management (CRM), cloud
    storage, and project portals. Many will then need assistance setting those services
    up. You can charge a separate hourly or project-based rate for bringing on these
    new services. Just make sure not to endanger your Managed Services contract to
    get a few extra bucks out of these other services. Keep in mind that you can always
    find a partner that might be able to do a better job at the services you’re providing
    as that’s the focus of their organization. And, they might do bilateral referrals
    to boot!


    * **Fixed-Fee Projects**: A lot of services companies have made a lot of money
    doing fixed-fee projects. Here, you estimate how long a project will take and
    describe the project in a Statement of Work (SoW). You then build in an appropriate
    level of padding to the project and provide a customer with a fixed cost to complete
    the deliverables. Once awarded, you do whatever it takes to complete the deliverables
    defined in the SoW. Most large organizations will need to operate in a fixed-fee
    modality with their vendors, given that line of business managers are typically
    held to remain within a budget for such things.


    * **Managed Leases**: Leases are tricky. Chances are that someone else can do
    the lease better than you can unless you reach a critical mass of thousands of
    devices being leased out. For example, `Dell`, `Apple`, `HP`, and others can take
    this burden and often bundle warranties and even your Managed Services contract
    into the lease. If you’re not already leasing hardware, then I strongly recommend
    giving up a few points of margin here in order to let a leasing company or vendor
    work with your customers so you can capture more revenue.


    You’ll also want to verify that your rates are geographically appropriate. If
    you’re in Manhattan, you can charge more for services than you could if you were
    in Boise. They’re both fantastic, but the disparity of rates can be substantial.
    If you can bill 1,200 hours a year, you’ll be in great shape. Reverse-engineer
    an hourly rate out of that. Think of a number you want per year and divide that
    by 1,200. That gives a good baseline. Then scout the competition.


    Start with `Upwork`, `Angie’s List`, and `Craigslist` (or whatever your local
    equivalents are to these sites). What is the average rate for the other companies
    listing their services? You likely won’t be the cheapest vendor, although many
    build very successful businesses around being the low-cost provider. That’s a
    hard game to win at, with low margins, but it can certainly be done. You likely
    won’t be the most expensive vendor either. It takes a lot of customers and referrals
    in order to organically raise rates to that point or to be the best (and no one
    is, or has ever been, the best, so don’t forget to check your ego at the door).
    Finally, browse around to see what rates your competitors have posted on their
    sites.


    You could even call around to your competition. But if you think about it, would
    you welcome a question from your competitors about what your rate is, just so
    they can undercut you every chance they get?


    ### Tip


    Once you finish your research, think about whether or not you want to post your
    offer. Many will only hire people with posted offers, but they do give your competition
    insight into what you’re doing.


    As you grow and get better, more efficient, and known for what you do, then you
    will find that you can charge more for hourly work. If you rely on managed services
    customers, then you are likely to be at market rate, as most companies who purchase
    these types of services are not looking for quality contractors—they’re looking
    to fix costs.


    ### Note


    Throughout the book, we’ll also look at costs. For now, just plan to spend about
    a quarter out of every dollar you make for credit card processing, accounting,
    technology, transportation, insurance, etc.


    # Building the Offer


    Now that you know what others are charging, look at what you were planning to
    charge and see if it makes sense. If there’s a huge disparity, you need to figure
    out why. You don’t want to be triple the cost of the next highest paid vendor.
    Nor do you want to be the lowest, as people might not perceive a high enough level
    of value in your services. Once you establish a relationship with customers, it’s
    hard to increase your rates without customers leaving you. Next, let’s explore
    the more common offers: hourly, retainer, managed services, and fixed-fee.'
