    - Escape Velocity, Geoffrey A. Moore [`https://www.amazon.com/Escape-Velocity-Free-Companys-Future/dp/0062040898`](https://www.amazon.com/Escape-Velocity-Free-Companys-Future/dp/0062040898)

    - Inside the Tornado, Geoffrey A. Moore [`https://www.amazon.com/Inside-Tornado-Strategies-Developing-Hypergrowth/dp/0060745819`](https://www.amazon.com/Inside-Tornado-Strategies-Developing-Hypergrowth/dp/0060745819)

    - Startup CEO, Matt Blumberg [`https://www.amazon.com/Startup-CEO-Scaling-Business-Website/dp/1118548361`](https://www.amazon.com/Startup-CEO-Scaling-Business-Website/dp/1118548361)

    - The Lean Startup by Eric Ries, [`https://www.amazon.com/Lean-Startup-Innovation-Successful-Businesses-ebook/dp/B005PR422K`](https://www.amazon.com/Lean-Startup-Innovation-Successful-Businesses-ebook/dp/B005PR422K)

    - Brave Bootstrapping: How to Grow a Global Tech Business Without VCs, Sarah J
    Perry, [`https://www.amazon.com/Brave-Bootstrapping-Global-Business-Without-ebook/dp/B07BD4TL6Z`](https://www.amazon.com/Brave-Bootstrapping-Global-Business-Without-ebook/dp/B07BD4TL6Z)

    - Designing Breakthrough Products, by Roberto Verganti [`https://www.amazon.com/Designing-Breakthrough-Products-Harvard-Business/dp/B005UF57RQ`](https://www.amazon.com/Designing-Breakthrough-Products-Harvard-Business/dp/B005UF57RQ)

    - Blue Ocean Strategy, by W. Chan Kim and Renee Mauborgne [`https://www.amazon.com/Blue-Ocean-Strategy-Expanded-Uncontested/dp/1625274491`](https://www.amazon.com/Blue-Ocean-Strategy-Expanded-Uncontested/dp/1625274491)

    - Zero to One: Notes on Start Ups, or How to Build the Future, Peter Thiel [`https://www.amazon.com/Zero-One-Notes-Startups-Future/dp/0804139296`](https://www.amazon.com/Zero-One-Notes-Startups-Future/dp/0804139296)

    - The Startup Owner’s Manual, Blank: [`https://www.amazon.com/Startup-Owners-Manual-Step-Step-ebook/dp/B009UMTMKS`](https://www.amazon.com/Startup-Owners-Manual-Step-Step-ebook/dp/B009UMTMKS)

    - Emergence, The connected lives of ants, brains, cities, and software, Steven
    Johnson, [`https://www.amazon.com/Emergence-Connected-Brains-Cities-Software/dp/0684868768`](https://www.amazon.com/Emergence-Connected-Brains-Cities-Software/dp/0684868768)


    # 2. Beyond Services


    Once upon a time, an IT consulting shop needed to keep hardware on hand, such
    as sticks of memory. Engineers provided more value to customers and extended the
    amount of time they were working with customers by selling and installing that
    memory to make the computer faster. While we don’t install memory on most computers
    (especially Apple computers), this is a great example of doing something that
    makes the life of those who hire you better, while making a little additional
    profit. Consider instead bolting on additional cloud services, like backup. And
    focus on things that will make supporting systems better or make your life easier
    in the event of a problem.


    Also be aware of competition. I once had a customer fire my company because we
    sold them a printer that they then found online for $30 cheaper elsewhere. The
    part that sucks here is that I’m pretty sure we lost money selling the printer
    in the first place. You are never going to sell most of what you sell cheaper
    than anyone else. But you might be able to work out a deal with a vendor who can
    then give you more customer referrals than all of your possible hardware sales
    would otherwise be worth.


    Having said that, if you deliver goods and services together as a package, then
    a customer can receive both with one Purchase Order (PO) in the same visit, and
    ultimately have a better experience. In this chapter, we’ll look at various ways
    to leverage third-party products that help expand your presence with a customer,
    bring customers into a standardized (and, therefore, more easily supportable environment),
    and make happier customers, which means more referral business (the best kind
    in my opinion).


    ### Note


    If you are doing consulting part-time, I strongly recommend against selling or
    reselling anything to customers.


    ## Reseller Accounts


    Have you heard of Ingram Micro or TechData ? These are distributors, or master
    distributors. If you’re going to sell a variety of hardware and software, you
    likely need an account with one or both of these. You might also leverage a company
    like Synnex, Avnet, Arrow, Jabil, or CDW instead. Chances are, as you buy hardware
    and software to sell to customers, you’ll end up finding a lot of different relationships.
    These will extend beyond distributors and directly to other vendors.


    ### Note


    Taking on reseller accounts often comes with a credit check of the business. If
    you’re working on obtaining funding from a bank, be careful not to overextend
    your credit or have too many credit checks.


    According to the type of company you want to have, consider the following ecosystem
    to provide to customers:


    - **Cloud Solutions**: We’ll cover this at length in this chapter.

    - **Hardware and software**: We’ll cover selling hardware and software later in
    this chapter as well.

    - **Bandwidth**: If you’re going to sell bandwidth, have a telco and a cable option,
    and play them against each other for the best pricing for each customer. You’ll
    have a local provider for each, so contact them directly. When you do, don’t forget
    to ask them if they can refer business to you.

    - **Infrastructure services**: Think of this as monitoring, backup, networking
    (wireless, switching, etc.), and phones. Yup, I said phones.


    In addition to building out a full portfolio of service offerings that satisfy
    all of your customer needs, also think about other factors. These include:


    - **What kind of terms can you get with these companies?** Consider how long you
    have to pay them in order to figure out what kind of terms to work out with your
    customers.

    - **What is the purchasing process like?** You want an easy and streamlined purchasing
    process, preferably with a web portal and a licensing/support number. If you need
    to register a deal in order to get added discounts, then you want that process
    online as well.

    - **How do returns work?** A bad piece of gear can be a huge waste of time to
    get returned. Find out how vendors handle returns and how much of your time will
    be involved in each return, before you start selling.

    - **How much money are you going to make?** I saved this for last, because as
    you might have picked up on in this book, I consider the financial benefits to
    most of this stuff as ancillary. The important thing is customer happiness, etc.
    But don’t sell if you lose money, or don’t make enough to make it viable. Instead,
    in those cases make relationships with organizations who can give you a good referral
    benefit.


    Ultimately, selling stuff can suck if you don’t do it right. But according to
    the type of business you have, you could end up with a very nice additional revenue
    stream from selling. Just be careful, and make sure you understand what you’re
    doing, and the tax/accounting implications of selling stuff before you start.'
