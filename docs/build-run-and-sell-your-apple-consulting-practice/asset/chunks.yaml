- fmt: '# Be Wary When Moving Forward with Initiatives


    You have an amazing hour-long meeting with a potential new customer. The meeting
    goes so well that you decide to bring in some food and take the meeting to another
    hour. You strike up a genuine friendship with a potential customer, and you walk
    away from that meeting feeling invigorated and ready to take on new business challenges.
    There’s only one small hitch: your company doesn’t do what the customer is looking
    for.


    Maybe you’re in the same ballpark. Maybe the customer provides a beachhead into
    what you consider an emerging market. Maybe you see the chance to pivot and be
    able to double your business by entering into a new market segment. But yeah,
    you really just don’t do what the customer wants. You call your office and tell
    the people on the other end of the phone about this amazing new opportunity. They
    don’t seem as excited, but based on your excitement or based on their inability
    to connect with you on this level, no one is telling you no.


    ## What You Should Do Before Proceeding


    This happens all the time. And there are a few reasons. Sometimes there is actually
    a real opportunity. But often, you’re about to waste a lot of your time and that
    of others if you try to force your will upon embarking on a new opportunity that
    is foreign to you and your team. Don’t force it.


    There is no greater killer of inertia than a failed initiative. It can cloud all
    of your other lines of business if you aren’t careful. Ultimately, here’s a litmus
    test you should apply in these situations.


    1.  How large is the market that you can address? Obviously, you need to identify
    the potential business you can get out of this new venture, keeping your blinders
    on for a bit and only looking at a constrained set of customers that you can actually
    connect with. You might find that the market is much larger than anyone thought.
    You might also find that there is a very small number of potential customers or
    that the market is already saturated with other vendors. This research also helps
    drive pricing beyond comparing the price to your current rate card.


    2.  What will you and your team need to accomplish in order to address the new
    target market? Addressing this new market might involve hiring new employees,
    creating a small team that focuses on the new market, writing apps or web interfaces,
    and much more. Understand the work required not only to prototype the new product
    or service but also to be able to sell it at scale. Once you understand the required
    investment you can make a good decision whether or not to move forward.


    3.  Are you able to sell the new service or product into the new market? Your
    sellers might be focused on a completely different demographic. They might not
    be able to communicate on the same level with the new demographic. You might not
    have any leads beyond the first customer. But you might be perfectly aligned to
    take on this new adventure!


    4.  Do you have buy-in from staff? If you do the research listed previously and
    list out solid arguments for either proceeding or stopping, then getting buy-in
    from the staff should be simple. Be careful not to impose your will too much.
    But when the market conditions are perfect for your organization to come in and
    provide some good disruption, it’s basically obvious that the venture is worth
    pursuing.


    5.  What will the opportunity cost be to your core offerings? If you aren’t getting
    buy-in, even though you have a good business plan, you have to ask why. If your
    core business is going to suffer, then you might need to look at dipping into
    savings or outside capital to fund the new venture. If the business plan is sound,
    then make that judgment call. I’m not averse to risks; provided they’re taken
    using logic and reason rather than based on emotional responses to great meetings
    and people.


    Additionally, make sure you don’t have any contractual obligations not to enter
    into a market. For example, if you’ve been a reseller for a number of software
    vendors, then there’s a good chance that you’ve signed a contract stating you
    won’t compete with them in the same industry they’re in for a certain number of
    years. Make sure to seek legal advice when it comes to any contracts you may be
    in breach of if you are even a little bit concerned that you may violate them.


    ## Are You Overvaluing Your Time?


    Listen to the research. Listen to your staff. Don’t try to put a square peg in
    a round hole unless it makes sense. Be open-minded, just as you’re asking others
    to be open-minded.


    The important thing to remember is that you have a core focus. And reaching outside
    of that to go after new business will not only introduce you to a space where
    your company might not be a premium player, but you will also be detracting from
    what makes you great. There are certainly a lot of arguments that you need to
    be nimble, and be able to pivot quickly, but be careful not to let your emotions
    and your personal time investment outweigh that of your organization as a whole!


    Finally, the time you invested is never wasted. The potential customer you want
    to work with will understand if the opportunity is not right for you. The time
    you spent researching better educates you on markets. The time you spent working
    with your employees to determine if the opportunity makes sense provides great
    team bonding. Every single person in the chain will respect you more if you back
    down on an initiative. And given that they’ll share in the ownership of success,
    they’ll also be elated when everyone gets huge bonuses if the initiative works
    out!


    # Implementing a New Offering


    Once you’ve decided to go ahead and start with a new line of business, you have
    your work cut out for you. Especially if you’ve never done so before. And the
    planning stage will often decide the outcome, before you send your first email
    or make your first call to existing customers. In this section, we’ll provide
    some tips and strategies for making sure the new service is a success (or getting
    as close to making sure as possible).


    ## Review the Offer


    The offer might not be a good idea. Take a critical approach to your review of
    the offer you’ve come up with. Make sure the offer is easy-to-understand, that
    it appeals to potential customers, and that you will make a healthy margin. This
    is similar to the process we did in Chapter [1](#469405_1_En_1_Chapter.xhtml)
    when building our menu of services; however, it also comes with a built-in market
    you can cross-sell the solution to: your existing customers.


    ## Compare the Offer to the Market


    A little bit of market research goes a long way. You know your customers, but
    you also want to keep them—and there’s no faster way to lose a customer than to
    sell them goods or services above market rate. Additionally, if you’re planning
    on using a new offer to entice new customers, then know what kind of competition
    is out there. You may even choose to make a new product a loss-leader (or one
    that loses a minimal amount of money) in order to recruit new customers.'
