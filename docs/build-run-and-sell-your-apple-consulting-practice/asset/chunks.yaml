    -   Project Management for the Unofficial Project Manager, Kory Kogon, Suzette
    Blakemore, James Wood, [`https://www.amazon.com/Project-Management-Unofficial-Manager-FranklinCovey/dp/194163110X`](https://www.amazon.com/Project-Management-Unofficial-Manager-FranklinCovey/dp/194163110X)


