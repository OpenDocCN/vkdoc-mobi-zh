    higher customer satisfaction than desktops and most laptop computers. Because
    of the limited real estate on the screens of most mobile devices, the apps that
    run on devices are often used for a specific job function. In many environments,
    stringing together a workflow can require multiple apps, as we discuss throughout
    this book. But even if you load a number of apps on a device, you will often spend
    less than many of the popular traditional software packages on the market. Still,
    at some point, many jobs simply require more complicated hardware and need laptops.


    It seems like every year, there are entire industries switching large numbers
    of desktop and laptop computers to mobile devices. This represents a huge potential
    source of new customers to the savvy new Apple consultant. Apple started the trend
    of mobile devices in retail, but since then we’ve seen proliferation in field
    services, medicine, and even evangelical environments, allowing for a never-ending
    source of customers. And sometimes it just takes the mastery of one app or making
    one friend at an Apple Retail Store or Windows-focused consultancy to make all
    the difference to your business.


    As mobile devices gain so much traction in these environments, interesting questions
    around security and scalability have started to crop up. Devices get lost and
    need to be wiped. As you acquire a lot of devices, you want them set up similarly
    and you want that device configuration to be automated. The vendors have listened
    to what customers need. For example, Apple provides the following technologies
    about which you need to be knowledgeable when talking to customers:


    *   **Mobile Device Management (MDM)** : Solutions such as Jamf Now ( [`www.jamf.com`](http://www.jamf.com)
    ), that allow administrators to manage devices remotely: managing apps, content,
    settings, and even actions on devices, such as remotely wiping and locking devices
    that fall outside the organization’s control (by getting lost and/or stolen).
    If you’re doing a lot with mobile deployments, you’ll want a relationship with
    Jamf, AirWatch, SimpleMDM, or one of the other MDM/management platforms out there.


    *   **The** **Volume Purchase Program (VPP)** : Allows users to purchase apps
    in bulk and then deploy purchased apps to devices automatically. For more on the
    Volume Purchase Program, see deployment.apple.com.


    *   **The** **Device Enrollment Program (DEP)** : Forces devices into an MDM solution,
    automatically joining to the solution when a device is activated. For more on
    DEP, work with your account teams at Apple or the reseller of your Apple devices.


    ### Note


    For a more comprehensive list of Apple terms and technologies, see Appendix A.


    Many apps are only available for a single platform. For example, many of the apps
    on the App Store for an iPad will not have an equivalent on Android devices, and
    vice versa. Once upon a time, vendor lock-in was considered a bad thing. But these
    days, it can help to keep costs down. A consultant or business owner can learn
    much more about managing devices if they only have to learn one platform. As the
    business grows, there may be a desire to move to another platform, but by then,
    the business should be to the point where hiring outside organizations to implement
    a new solution will be a major expense.


    Many of the apps that organizations use communicate with a website to store data.
    Little, if any, data is stored on mobile devices. Therefore, backup is less of
    a concern than ever, with Software as a Service (SaaS) solutions also supplying
    centralized management of app data without the need for physical servers in a
    startup’s office.


    As custom and App Store apps cover more and more of the tasks that need to be
    performed in organizations, increasingly more small businesses are choosing to
    exclusively leverage mobile devices to complete work previously done with computers.
    And they should, provided that doing so can be done securely. This drives down
    the costs to start a business. The place that makes my smoothies started on a
    shoestring budget, compared to what it cost to start my first company and get
    to the point where we could accept credit cards. Hopefully, less risk and upfront
    costs will allow progressively more startups to succeed and will cause increased
    innovation. Helping people to succeed should be our first and foremost goal at
    all times.


    Apps, cloud services, hardware, and other tools can help your new business help
    your customers. In the next section, we’ll focus on selling and working with cloud
    services.'
  trans: '

    # 销售移动性


    我常去健身房旁边的一家小店铺买冰沙。这家店由一位健身教练经营。她对技术了解不多，但非常非常聪明，而且生意一直在成长。每次我去买冰沙时，她都会问我很多关于她设备的问题，有时这些问题会将我工作中涉及的概念置于一个全新的背景中。它们帮助我理解小企业主是如何看待技术的。她的问题改变了我为小企业提供咨询的方式。


    她没有电脑，也不想要电脑。她也不怎么用手机。她使用的是 iPad。有时，当员工在 iPad 上乱翻时，她会在浏览器历史记录里看到一些她可能不想看到的东西。不过，因为公司规模较小，她很乐意在初期尽可能保持开放，不限制员工行为以降低成本。每年都有成千上万的新企业以这种方式起步（请记住，兼职的苹果顾问并非唯一在零工经济中成功的人）。


    我有时喜欢给她一些有用的建议（把这当作免费咨询吧）。这些建议通常是“找个会计”或者“这里有个能标注 PDF 的应用”之类的。随着业务发展，她想永远用 iPad
    来经营。其他一些成长型的企业也类似，比如苹果在其营销文档中作为典型引用的“冰沙王”（Smoothie King），它有超过 500 家连锁店使用苹果设备来加快结账速度。还有我常去的本地咖啡馆，现在已有
    7 家分店。不过，我也给了她一些关于如何使用第三方工具来更好地部署苹果设备的建议。


    并非所有企业，也绝非所有工作岗位（即使是在最小的企业里）都能用平板电脑完全替代电脑。但许多企业都希望这样做，因为平板电脑比台式机和大多数笔记本电脑更便宜、更易管理、所需培训更少，并且能带来更高的客户满意度。由于大多数移动设备的屏幕空间有限，其上运行的应用通常只针对特定的工作职能。在许多环境中，要串联起一个工作流程可能需要多个应用，正如我们在本书中一直讨论的那样。但即使你在一个设备上安装了许多应用，其总花费也往往低于市场上许多流行的传统软件包。不过，在某些时候，许多工作确实需要更复杂的硬件，必须使用笔记本电脑。


    似乎每年都有整个行业将大量台式机和笔记本电脑换成了移动设备。这为精明的苹果新顾问带来了巨大的潜在新客户源。苹果率先在零售业掀起了移动设备潮流，但自那以后，我们在现场服务、医疗甚至宗教活动领域都看到了移动设备的普及，这带来了源源不断的客户。有时，只需精通一个应用，或在苹果零售店或专注
    Windows 的咨询公司交到一个朋友，就能对你的业务产生翻天覆地的影响。


    随着移动设备在这些环境中获得如此强大的动力，一些关于安全性和可扩展性的有趣问题开始出现。设备可能会丢失，需要被擦除数据。当你拥有大量设备时，你希望它们能以相似的方式设置，并希望设备配置能实现自动化。供应商已经听取客户的需求。例如，苹果提供了以下你在与客户沟通时需要了解的技术：


    -   **移动设备管理 (MDM)**：例如 Jamf Now ([`www.jamf.com`](http://www.jamf.com)) 等解决方案，允许管理员远程管理设备：管理应用、内容、设置，甚至对设备执行操作，例如远程擦除和锁定那些脱离组织控制（因丢失和/或被盗）的设备。如果你大量涉及移动设备部署，你将需要与
    Jamf、AirWatch、SimpleMDM 或市面上其他 MDM/管理平台建立合作关系。


    -   **批量采购计划 (VPP)**：允许用户批量购买应用，然后将购买的应用自动部署到设备上。有关批量采购计划的更多信息，请参阅 `deployment.apple.com`。


    -   **设备注册计划 (DEP)**：强制设备加入 MDM 解决方案，在设备激活时自动加入该解决方案。有关 DEP 的更多信息，请与你在苹果的客户团队或苹果设备经销商合作。


    ### 注意


    有关苹果术语和技术的更全面列表，请参阅附录 A。


    许多应用仅适用于单一平台。例如，iPad 应用商店中的许多应用在安卓设备上没有对等产品，反之亦然。曾几何时，供应商锁定被视为坏事。但如今，它有助于降低成本。如果顾问或企业主只需要学习一个平台，他们就能更深入地了解如何管理设备。随着业务增长，可能会希望迁移到另一个平台，但到那时，企业应该已经发展到需要聘请外部组织来实施新解决方案，而这将是一笔不小的开支。


    企业使用的许多应用会与网站通信来存储数据。几乎没有数据存储在移动设备上。因此，备份变得比以往更不重要，因为软件即服务 (SaaS) 解决方案也提供了应用数据的集中管理，初创公司办公室无需实体服务器。


    随着定制应用和应用商店应用覆盖了企业需要执行的越来越多任务，越来越多的小企业选择完全依赖移动设备来完成以前由电脑完成的工作。只要能够安全地做到这一点，他们就应如此。这降低了创业成本。与我创办第一家公司、并实现能够接受信用卡付款的阶段所需的成本相比，那家为我做冰沙的店铺是在极低的预算下起步的。希望更低的风险和前期成本能让越来越多的初创企业成功，并带来更多的创新。帮助人们成功应该是我们始终如一的的首要目标。


    应用、云服务、硬件和其他工具可以帮助你的新企业为你的客户提供帮助。在下一节中，我们将重点讨论云服务的销售与协作。

    '
- fmt: '# Should You Sell Cloud Services?


    Is the cloud right for your customers? The answer is probably. Is every cloud
    solution right for every business? Duh, of course it isn’t—or we wouldn’t be asking
    the question (I learned that in some class at some point). But cloud computing
    is all the rage in business, because buying servers and paying for the support
    and backup of servers is often more expensive in the long run than paying a cloud
    provider for all that and just using the utility they provide.


    Helping a customer find the right solution given their unique business need and
    personality is important. There are a lot of different ways to look at cloud-based
    tools. This might mean deploying something like one of the following (or a hybrid
    between them):


    - `CrashPlan` lets you backup files to a cloud—and maybe to an onsite server,
    or a server at your office.

    - `Dropbox`, `Google Drive`, `Office 365`, or `Box.com` allow you to actually
    move files to a cloud environment.

    - Move physical or on-premises servers to a cloud environment so customers get
    an improved and redundant pipe to the Internet that would not be cost-effective
    to have at their office.

    - Implement various tools such as `Salesforce.com`, which acts as SaaS and therefore
    reduces the need for servers, whether physical, virtual, or in the cloud.


    The above is by no means a comprehensive list of tools that you might want to
    get good at or partner with. For a more comprehensive list, see the Techie Bits
    section of Chapter [5](#469405_1_En_5_Chapter.xhtml). But what are some ways to
    choose the right solutions? Let’s look at a few questions and some appropriate
    responses.


    ## How large are your files?


    Large image or media files can be too big to work on from a remote location. Anyone
    that knows designers or video editors knows they’re going to be miserable sitting
    around for half an hour waiting for each of their projects to open each morning.
    Find out how long it takes to open each type of file a given customer uses before
    migrating these files to the cloud. You might end up being better off syncing
    them to an on-premises server or finding an alternative workflow.


    ## Do you have compliance issues?


    Many environments have legal, medical, governmental, banking, or other compliance
    requirements. Each cloud environment will have its own set of standards that it
    meets. From Safe Harbor (in the EU) to SOC2 to HIPAA, to simply checking a box
    that a customer has on a security audit document, there are lots of compliance
    issues that come up. Verify that any solution you find or sell meets with each
    customer’s requirement before you start working with them to integrate it.


    ## Does your business logic have specific requirements to address?


    Business requirements often include Customer Relationship Management (CRM), accounting
    software, Professional Services Automation (PSA), tools for various types of businesses,
    and other options, all interconnected. Make sure tools do what a customer needs,
    including small tasks. Often this is best handled by observing them work and making
    notes about how they interact with legacy tools.


    ## Does a given tool need to interact with other tools?


    In an app-based world, very few tools do everything that a customer needs. Instead
    of spending hundreds of thousands of dollars on a single tool that sucks at doing
    everything it takes on, customers often prefer tools that are simple to use and
    quick to learn. But make sure they can connect to other tools when needed, in
    order to keep from tedious double-entry.


    ## Do you need to easily move your data to and from the cloud solution?


    Many cloud solutions only provide the ability to add data to the environment but
    make it challenging to export data. Before you stick a customer with a solution
    that might not be great for them (for whatever reason), make sure they can get
    their data out once it’s in a given tool.


    ## What’s the cost?


    Read the fine print. If a customer needs to programmatically interact with data,
    they might have to pay for a premium account type. There are usually grids that
    lay out features and options for things like API access or “pro features.” When
    costing a solution for customers, make sure you understand those levels and costs
    or they might get stuck paying triple what you quote them and hating you (you’d
    likely hate yourself too).


    ## Are there people from outside your company that need to access data?


    If you have external parties that need to connect, you might have to create (and
    pay for) additional accounts for each. You don’t want any surprises. Work with
    customers to determine if external parties will connect to cloud tools, figure
    out if their access can be limited, and determine whether the customer can provide
    the proper levels of access to vendors, customers, and contractors.


    ## Do you have the appropriate network for this?


    If customers rely on the Internet to access files, databases, contacts, and other
    mission-critical assets, you’re going to want to make sure that connection to
    the outside world simply can’t go down, or employees will be sitting idle when
    (not if) it happens. Redundant, fast connections to the Internet are absolutely
    necessary and pale in comparison to the cost of humans sitting around not able
    to work.


    Ultimately, a cloud solution probably will actually be right for most every customer.
    It might require a tad bit of research to get to the correct solution that fits
    within each unique customer’s requirements and budget. But if you have an initiative
    to move on-premises solutions to the cloud, or move to a given SaaS-based solution,
    doing so is entirely possible given the expansive landscape of cloud providers.
    Now that you’ve been armed with a few questions to ask as you go through service-by-service
    on such an initiative, enjoy the process—and enjoy hopefully taking this chance
    to work with customers to reinvent how they go about doing all the wonderful things
    they do. If successful and you truly capture and improve their workflows, you
    will have a customer for life!'
