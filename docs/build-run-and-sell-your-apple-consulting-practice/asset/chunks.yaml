  trans: '

    ### 构建合作伙伴关系


    在大多数情况下，如果没有报酬，我建议为每个需要与客户对接的产品或服务寻找三个合作伙伴。然后你可以指向这些合作伙伴（例如，在你网站的页面上）并这样说：“我建议你联系这三家，看看你喜欢与哪家打交道，并认为哪家最符合你的业务需求。”


    你不想与合作伙伴竞争。例如，路由器制造商可能会直接销售但不提供任何服务。如果你想提供服务但不出售他们的设备，那么如果他们需要有人能提供劳动力（特别是对于复杂产品），你可能就找到了一个完美的合作伙伴。但如果你也想销售路由器，请务必弄清楚他们是否直接向客户销售，这样你就能最好地了解他们在某个交易中与你竞争时可能发生的情况。


    大多数供应商的管理层希望与你建立健康的关系。但负责你所在地区的客户团队可能希望通过销售产品来赚取佣金。在评估合作伙伴时，还要查明：一旦你注册了一个交易，每个合作伙伴是否会直接销售；如果会，那么只要你比他们的内部员工更早注册该交易，你是否能锁定比他们的客户团队所能提供的更优惠的价格。


    什么样的人是好的合作伙伴？显然，找到好合作伙伴最重要的方面之一是，你的客户不会因为你的推荐而解雇你，这要么是因为合作伙伴从你这里抢走了客户，要么是因为他们的工作质量太差，以至于客户将你与该工作联系在一起。


    如果你选错了合作伙伴，你就有失去客户的风险。客户的信任是日积月累建立起来的。如果你的客户与某个合作伙伴有过糟糕的经历，他们很可能会失去对你的信任。限制由此产生的责任的一种方法是，不收取费用。相反，你可以采用双边推荐协议。这不一定总是奏效，但通常被称为“互惠互利”。


    ## 互惠互利


    当你找到一个新合作伙伴时，如果你大量销售他们的产品，他们就会更有动力向你推荐客户。这种关系可能需要几个月才能成熟，所以如果你想建立良好的关系，那么每一方都应该有所收获：互惠互利。例如，我曾与一家新公司达成合作，转售他们的路由器。恰巧在第一个月内，我给他们介绍了大约十几个客户。他们的回应是给我推荐了一大批客户。这些都是全新的客户，拥有大量未受管理的苹果设备。


    基于关系类型的不同，互惠互利可以有不同的表现形式。我曾经有一家公司给我推荐了很多业务，而我没有业务可以回馈给他们。于是我制定了一个佣金方案来补偿他们的推荐。另一次，对方要求一个我无法给予的佣金结构，这实际上结束了这段关系（尽管那些知道我是值得信赖供应商的客户团队，仍会零星地给我带来一些客户线索）。


    鉴于所有关系各不相同，要对你能销售多少产品抱有现实的期望，并尽早设定预期。同时也要向他们提出同样的要求。这将使你能够为这段关系设定一些目标并制定计划。在发展业务时，将合作伙伴转化为客户非常重要。然而，务必不要期望过高，也不要仅仅因为随之增加的回报而提高你在关系中的风险。


    所有软件、硬件和服务公司，如果与那些依赖自身业务成功才能成功的伙伴合作，都会从中受益。所以要寻找方法让所有这些关系对参与各方都有利。成为合作伙伴能让你保持敏捷；但有时，你会觉得简单的合作伙伴关系潜力太大，而希望转为分包安排。


    ## 分包与合作


    合作很棒，如果做得好，它将帮助你以最优的价格为客户提供最好的服务。但有些时候，你会决定把工作留在自己的“纸面”上。有很多公司都有合同，他们希望将所有费用集中在一份采购订单上，以简化会计操作。你也可能决定分包某些类型的工作，以便为客户提供更全面的服务。


    在分包之前，请确保签好合同，并让所有分包商签署该合同。制定公平且价格合理的费率。你应当保持 50%或更高的利润率，以支付佣金、税费、财务处理费等。如果你无法做到这一点却仍然选择分包，那么最终你很可能会将辅助服务作为亏损引流的项目提供，或者通过“为客户提供单一问责点”来获取市场份额。如果能保持那样的利润率，分包商就不能直接与客户合作吗？是的。但他们将不得不去寻找客户、处理付款、纳税、等待
    60 到 90 天的付款周期，以及所有其他“有趣”的事务。而你则承担了大量责任。


    如果你决定分包工作，请确保至少有两家供应商能够分包某个特定项目。假如你被要求做一个项目，而你有一个可以雇佣来干活的供应商网络。请确保分包协议中至少有两家供应商。否则，如果其中一家倒闭或决定不再分包，你将面临一个可能带来负利润的业务。


    一旦你拥有了分包商网络，就该理清物流了。像 `Expensify`、`Ebay`、`Stripe` 等网站可以用来实现自动支付给分包商。如果你能在你的 PSA
    或会计系统中实现自动路由来跟踪项目支出，那就更好了！此外，你需要将项目和工单备注输入你的系统，所以提前决定好你希望承包商如何将他们的时间录入你的时间跟踪系统（工作量少的话，可以选择通过电子邮件将工单发给你，然后你粘贴进去）。


    分包协议中其他需要涵盖的较小方面：


    -   提前决定：你是否希望提供来自你组织的电子邮件地址访问权限？你是否希望分包商穿着品牌服饰？以及你是否希望他们承认他们不是你的直接雇员？

    -   当（不是“如果”）发生账单纠纷时，你将如何处理？不要仅仅因为你的客户不喜欢提供的服务就克扣分包商的款项，但要清楚，长期暴露在这种风险下可能会适得其反，特别是当分包商没有使用与你相同的系统时。

    -   你将如何处理直接与分包商接洽的请求？分包商是否允许在你的项目结束后与客户合作，还是这需要永远通过你的公司进行？作为分包商完成最后一个项目后，在直接与客户接触之前是否需要等待一段时间？


    所有这些关系的属性都应该提前讨论，并形成书面记录（例如，通过电子邮件）。安排越正式，处理文书工作可能就越困难，但从一开始就设定好合理的期望，将引导你走向更成功的长期关系。


    如果你本人就是分包商，那么请确保你也理解所有这些关系的属性。

    '
- fmt: '### Dealing with Problems with Partners


    Once you’ve done all this great work on developing partners, you want to protect
    that relationship and grow the business. You can’t do that if you lose trust with
    the customer. Which means you need to make sure that you’re doing your best work
    when you’re working on a referral.


    No matter how hard you work, sometimes things go weird with customers. When it
    does, I usually default to doing whatever is right. Do what’s right so customers
    aren’t complaining to a partner about your business. Nothing will sour a relationship
    faster than angry customers. And you don’t know some seemingly simple issue will
    cause a customer to reach out to a partner no matter how good you are. A great
    way to get in front of this is to build out an escalation path with customers
    before the leads start flowing to you.


    Another easy way to ruin a relationship with a partner is by taking business away.
    Partners often occupy adjacencies. If you do, then make sure you know exactly
    which services overlap with those provided by partners who refer business to you,
    and make sure that you don’t actually take business from your partners; especially
    those who refer business to you. Instead, say great things about them and promote
    them to customers.


    Don’t say anything negative about the referral partner nor their product. If that
    organization makes software and or hardware that’s problematic, offer to get in
    touch with a vendor rather than simply saying they have issues that are causing
    additional services. If a customer does not trust the products you help fix, then
    they aren’t likely to continue using those products, which will be an issue ultimately
    resolved by them not using either.


    ## Conclusion


    The best kind of referral comes from a customer. Your customers provide a legitimate
    rating of your services. No amount of advertising, marketing, public relations,
    or money spent on referrals from other companies will ever provide you with a
    more valuable lead generation engine in terms of close rate, quality of customer
    once closed, etc. But you can’t rely on referrals forever.


    Once you get to a certain point, you need to find partners. If a partner seems
    too good to be true, they won’t seem that way for long. But when a good partner
    comes along, and there’s bilateral value for each organization, you’ve struck
    gold. So make sure to take care of your partners and that you’re always open and
    honest about the relationship you have with them. Not only because a consistent
    theme in this book is transparency and honesty (key components of character),
    but because if you aren’t then they will eventually come to hate you, and you
    don’t want other companies souring potential customers in the market.


    ## Further Reading


    * How To Win Friends and Influence People, Dale Carnegie, [`https://www.amazon.com/How-Win-Friends-Influence-People/dp/0671027034`](https://www.amazon.com/How-Win-Friends-Influence-People/dp/0671027034)

    * How to Hire and Supervise Subcontractors, Bob R. Whitten, [`https://www.amazon.com/How-Hire-Supervise-Subcontractors-Whitten/dp/0867183667`](https://www.amazon.com/How-Hire-Supervise-Subcontractors-Whitten/dp/0867183667)

    * The Government Subcontractor’s Guide to Terms and Conditions, Kenneth R Segel,
    [`https://www.amazon.com/Government-Subcontractors-Guide-Terms-Conditions/dp/1567262325`](https://www.amazon.com/Government-Subcontractors-Guide-Terms-Conditions/dp/1567262325)

    * Business by Referral: A Sure-Fire Way to generate New Business, Ivan Misner,
    Robert Davis, [`https://www.amazon.com/Business-Referral-Sure-Fire-Way-Generate/dp/188516727X`](https://www.amazon.com/Business-Referral-Sure-Fire-Way-Generate/dp/188516727X)

    * Referral Magic: Grow Your Business Through Nurturing Relationships, Deb Brown,
    [`https://www.amazon.com/Referral-Magic-business-nurturing-relationships-ebook/dp/B01LZSN530`](https://www.amazon.com/Referral-Magic-business-nurturing-relationships-ebook/dp/B01LZSN530)

    * Perk Your Sphere: How To Reward Those Who Reward You, Liz Johnson, Andre Dunn,
    [`https://www.amazon.com/Perk-Your-Sphere-Reward-Those/dp/1540755193`](https://www.amazon.com/Perk-Your-Sphere-Reward-Those/dp/1540755193)

    * Work by Referral: Live the Good Life! Proven Strategies for Success and Happiness
    in the Real Estate Business (note that the principals apply to other businesses
    as well [`https://www.amazon.com/Work-Referral-Strategies-Happiness-Business/dp/0982026005`](https://www.amazon.com/Work-Referral-Strategies-Happiness-Business/dp/0982026005)

    * Business Referrals Simplified: A Step-by-Step Formula to Amp Up Your Sales,
    Paul R. Tippets, [`https://www.amazon.com/Business-Referrals-Simplified-Step-Step/dp/1944313044/`](https://www.amazon.com/Business-Referrals-Simplified-Step-Step/dp/1944313044/)

    * Project Procurement Management: Contracting, Subcontracting, Teaming, Quentin
    Fleming, [`https://www.amazon.com/Project-Procurement-Management-Contracting-Subcontracting/dp/0974391204`](https://www.amazon.com/Project-Procurement-Management-Contracting-Subcontracting/dp/0974391204)


    # 7. Engage in Free and Guerrilla Marketing


    What is guerrilla marketing? Guerrilla marketing is a strategy to advertise unconventionally.
    Guerrilla marketing is a tactic usually used by smaller organizations with limited
    budgets. Why guerrilla marketing? Well, not everyone has `$1 million` per month
    to spend on marketing, do they? But beyond that, most guerrilla marketing tactics
    that work will be legitimate—more legitimate than buying advertising.


    Guerrilla tactics will get your name out there and start building brand recognition.
    Some will totally miss the mark; others will net you attention in ways you could
    not have previously imagined. The easiest and most legitimate way to get customers
    is through word of mouth. Tell everyone you know that you’re hanging your shingle
    out as a consultant. Tell former coworkers, people at the Apple Store, family,
    people from church, people at the pick-up basketball game, etc. Hand out cards.
    Always provide two.'
