    in the midst of due diligence, you find that the deal keeps getting a little less
    awesome at every turn, make sure to check that the investment is still worth it.


    It can be hard to walk away from a deal at the last minute. Sometimes, you’re
    unable because your pride gets in the way. And sometimes, it’s because you have
    invested too much. Not to overuse analogies in this section, but something similar
    can happen when buying a house. You get an inspection done and you find the house
    needs a new floor in the bathroom, then a new furnace, then a new roof. At some
    point, the contingencies pile up too far and the risk becomes too high to proceed.


    Similarly, between debts that are uncovered, assets that cannot be migrated, team
    members that defect, and potential customer attrition, there may come a time when
    you have to end the deal. Otherwise, you’re upside-down. But if everything works
    out and you can make a better experience for your customers and employees by merging
    the organizations, then it’s time to execute the deal!


    ## Merge the Companies


    Once a deal is in place, it’s time to start executing your plan to merge the companies.
    Start by finalizing your plans. As soon as possible, communicate the merger with
    customers, vendors, partners, and other stakeholders.


    Communication should be as thorough and transparent as possible. Make sure to
    include the following:


    *   You’re taking care of the employees


    *   You’re taking care of the customers


    *   Why you’re doing this


    *   Specifics about how the customers will be better off


    *   The plan and timelines for merging services


    *   How communications with the company might change over time (e.g., how customers
    file tickets, etc.)


    If you will be doing any press around the merger or acquisition (and you probably
    should), make sure anyone who is contacted about the merger is told that there’s
    an “embargo” on press. An embargo is an industry-standard term that refers to
    media not releasing content until a specific date. In fact, if press goes early,
    you might cause concern among customers and employees, so consider doing PR after
    the merger and having a press release go out after the announcement. Don’t do
    anything that could cause your team or customers to feel betrayed. Remember, this
    should be a good thing for everyone involved.'
