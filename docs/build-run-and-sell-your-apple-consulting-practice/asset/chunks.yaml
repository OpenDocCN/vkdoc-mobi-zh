  trans: '

    ### 分层培训资产


    每次需要构建内容时，不必重新发明轮子。实际上，尽可能搜索并购买现成的资产。你的特定培训内容可以叠加在这些第三方材料之上。例如，与其自己制作关于`macOS`的课程，不如从
    Peachpit Press 购买一本 Apple 培训系列书籍放入公司图书馆，然后在需要时针对其中特定部分制作一份测验文档。


    随着业务增长，你需要在各种不同的地方记录更多内容，有一些方法可以让追踪和培训变得更轻松。其中一些方法只是关于如何管理内部系统以及制定文档标准，从而让你有更多时间专注于实际的产培品训。


    - **将系统纳入资产管理和追踪系统的标准化方法**：当无法在同一个视图中找到所有所需资产时，确保有一种标准化的方法来查找所需内容至关重要。

    - **你的命名规范**：你如何为计算机命名（例如，是`clientcode-sitecode-devicecode`吗）？你如何为服务器、防火墙、交换机、打印机等设备命名？命名规范是否因客户而异？

    - **哪些工具存储哪些类型的信息？** 许多人最初会使用电子表格来追踪 Apple DEP 账户的密码或登录客户站点防火墙的 root 密码，也常以电子表格或简单数据库起步。当需求成熟且合规性成为问题时，可以寻找诸如`IT
    Glue`之类的工具。

    - **你希望团队如何与客户互动？** 别忘了记录你在客户沟通中看重的方面。这可能在技术宅工程师看来显得软弱、模糊，没什么价值。但即使被嘲笑，明确你期望的客户服务水平也是值得的。

    - **如何为客户提供尽可能多的价值？** 多陪客户 15 分钟能让他们更成功吗？有时确实如此。你必须为此收费吗？并非总是如此。你是否应该记录一些让团队让客户满意的方法？当然！


    这些问题很容易记录下来，并且不会随软件新版本的发布而频繁改变。对第三方培训资产的关注则是在此基础上叠加的。我们将在本章后续部分探讨其中一些，但以下是几个值得关注的第三方资产：


    - Apple 官方培训材料

    - WWDC 视频及各类会议视频

    - Lynda.com

    - O''Reilly 的 Safari Books Online

    - 热门博主的各种网站

    - 开发中间件（可能对你的组织有帮助，并且你或许能贡献代码）的人的 GitHub 页面

    - 关于 Apple 技术（如`macOS Server`、批量管理等）的 YouTube 视频

    - 办公室图书馆中的纸质书籍

    - 第三方认证的“脑图”资料


    在本节的剩余部分，我们将解析其中一些内容，以便你将其纳入整体培训组合。


    ### 会议


    曾几何时，有 MacWorld 大会。它规模宏大、风格大胆，Apple 也参与其中。那时还有一本同名的杂志实体版会寄到我家。但时代变了。虽然有些代表会参加多个会议，但许多参会者已分散到更小的会议中，这是
    Apple 生态系统微观经济向宏观经济发展带来的结果。如果你要派员工参加任何会议，下面是一份快速而粗略的指南。


    - **[ACES Conference](https://acesconf.com/)**：ACES 是面向 Apple 顾问的会议。通常在五月举行，地点从新奥尔良转移到凤凰城，以及会议组织者未来的任何选择。对于许多经营
    Mac 咨询业务的人来说，ACES 是一个很好的入门会议，参会者多为美国和加拿大较大且更成熟的 Apple 咨询公司。

    - **AirWatch Connect（现称 VMworld）**：[AirWatch Connect](http://air-watch.com/connect/)会议实际上在多个城市举办。如果你的组织大量使用
    AirWatch 来管理设备，这是一个很棒的会议。

    - **[Filewave Conference](https://www.filewave.com/the-news/filewave-alliance-conference-save-the-date)**：传统上在苏黎世和印第安纳波利斯举行，FileWave
    会议专注于 FileWave 产品，为系统管理员提供接触开发者、获取部署信息等的机会。

    - **[JAMF Software 的 JNUC（JAMF Nation 用户会议）](http://www.jamfsoftware.com/events/jamf-nation-user-conference/2015/)**：该会议主要面向使用`Jamf
    Pro`管理 Apple 设备的 Apple 管理员。会议包含一些通用管理主题的环节，例如什么是`plist`以及通用 Shell 脚本。如果你大部分时间都在使用`Jamf
    Pro`，那么这是一个很棒且免费的会议，每年秋天在明尼苏达州明尼阿波利斯市举行（本着充分披露的原则，我负责管理为各个主题选择演讲者的小组）。

    - **JAMF 的 Roadshow**：[JAMF Roadshows](http://www.jamfsoftware.com/resources/jamf-nation-kicks-off-roadshow-event-series-in-a-city-near-you/)通常是免费活动，JAMF
    会在美国各地举办为期一天的迷你会议，面向客户和系统管理员。

    - **Mac Admin and Developer Conference UK，由[Amsys](http://macad.uk/)主办**：[MacAD](http://macad.uk/)
    UK 是面向 Apple 管理员和开发者的会议，包含大量高技术水平的内容，每年在伦敦举行。

    - **[MacDevOps YVR](http://www.macdevops.ca/)**：MacDevOps 会议的议题涵盖从协作到 Puppet-as-a-Service（另一种
    PaaS）、Docker、Munk、Python、Casper、git、VMware、Chef、Jamf 等，这个会议绝对适合 Mac 社区中热衷于系统自动化的脚本高手，顾名思义，也适合
    DevOps。

    - **[MacSysAdmin](http://macsysadmin.se/)**：在瑞典，关于 Apple 的一切。MacSysAdmin 总是有大量优质内容，且视角比大多数美国会议更具全球性。

    - **[MacTech](http://www.mactech.com/)**：Ed Marczak 精心策划了这次会议，其重点在于大规模系统管理。对于了解环境如何发展（如果你正在成长）很有帮助，或者可以为你的成熟环境获取一些非常好的技巧和诀窍。

    - **[Mobile World Congress](http://www.mobileworldlive.com/)**: 我通常觉得这类展会上的与会者技术性较弱，更偏向业务分析，对“为什么”和结果比“如何做”更感兴趣。这是一个很好的群体，但与那些将所有时间花在系统集成上的人不同。

    '
- fmt: '# 会议与社区资源


    ## 会议


    *   [Penn State MacAdmins Conference](http://macadmins.psu.edu/)：Penn State Mac
    Admins 诞生于 WWDC 和系统管理主题充满不确定性的时期。如果你参与了 Penn State 运营的著名的 MacEnterprise 邮件列表，并且发现其中的讨论与你的工作相关，那么这个会议很可能值得你参加。而且它的定价也很合理！

    *   [University of Calgary MacDeployment](http://macdeployment.ca/resources)：这被定位为更偏重实践的工作坊（目前暂停一年），但值得关注，因为它曾包含许多优质内容，并为加拿大的
    Mac 管理员提供了一个很好的集中学习新技巧和窍门的地方。

    *   [Usenix](https://www.usenix.org/)：我认为这是一个非常适合 Unix 爱好者的盛会。其中涵盖的许多主题与 Mac 管理员高度相关。

    *   [WWDC](https://developer.apple.com/wwdc/)：众所周知，这是苹果公司的全球开发者大会。但如果你使用 `Munki`
    或第三方工具来管理系统，并且不编写代码，那么你可以通过在线观看会议视频，并将宝贵的继续发展/培训资金用于参加其他会议。

    *   [X World](https://auc.edu.au/xworld/about/)：作为澳大利亚 AUC 的一部分，X World 涵盖了从 `Munki`
    到 `Casper` 的各种主题。最初这是一个非常侧重教育的会议，来自澳大利亚各地的苹果管理员聚集在一起分享知识，并从他人那里获取管理大量苹果系统的信息。组织者和与会者都是非常棒的人，适合与他们交流。这是个极好的社交活动。我强烈推荐如果你是澳大利亚的
    Mac 管理员，请通过[成为会员](http://auc.edu.au/membership/)来支持 AUC。


    有大量的开发会议。但这本书更侧重于系统管理（尽管许多原则在两者中都容易适用）。如果你想要更多，我还建议你使用像 `Eventbrite` 或 `Meetup`
    这样的应用程序，并搜索你所在的地区。在大城市，几乎每晚都有用户组、聚会等活动。所以职业发展的机会永远不会缺乏。


    此外，收听 MacAdmins Podcast（完整披露：我是主持人之一）将为你带来许多关于苹果平台的有趣话题，并为你提供最新的会议列表以及即将举行的会议信息。


    ## 聚会


    聚会是全国各地举行的本地会议。我在 `krypted.com` 维护一个聚会页面，因为世界各地总有新的和即将举行的聚会。你也可以在 MacAdmins Podcast
    的社区日历部分获取每个聚会的详细信息。


    截至目前，全球各地的聚会如下：


    *   Austin Apple Admins：[`http://www.austinappleadmins.org`](http://www.austinappleadmins.org)

    *   Colorado iOS Admins：[`http://coiosadmin.tumblr.com`](http://coiosadmin.tumblr.com)

    *   Denver Mac Admins：[`http://www.meetup.com/Denver-Mac-Admins/`](http://www.meetup.com/Denver-Mac-Admins/)

    *   London Apple Admins：[`http://www.londonappleadmins.org.uk`](http://www.londonappleadmins.org.uk)

    *   MacAdmin Monthly：[`http://www.macadminmonthly.org`](http://www.macadminmonthly.org)

    *   MacSysAdmin Bier：[`http://macsysadmin.ch`](http://macsysadmin.ch)

    *   MacBrained：[`http://macbrained.org`](http://macbrained.org)

    *   MacDMV（华盛顿特区大都会区 Mac 管理员组）：[`http://www.macdmv.com`](http://www.macdmv.com)

    *   Perth Apple Admins：[`http://www.meetup.com/Perth-Apple-Admins/`](http://www.meetup.com/Perth-Apple-Admins/)

    *   Philly Mac Admins：[`http://www.meetup.com/Greater-Philadelphia-Area-Mac-Admins/`](http://www.meetup.com/Greater-Philadelphia-Area-Mac-Admins/)

    *   Northeast Regional Apple Admins（普罗维登斯）：[`https://www.meetup.com/providenceappleadmins/`](https://www.meetup.com/providenceappleadmins/)

    *   Apple Admins of Seattle and the Great Northwest：[`http://www.meetup.com/Seattle-Apple-Admins/`](http://www.meetup.com/Seattle-Apple-Admins/)

    *   Sydney Mac Admins Meetup：[`http://www.meetup.com/Sydney-Mac-Admins/`](http://www.meetup.com/Sydney-Mac-Admins/)

    *   Twin Cities Mac Admins Group：[Twin Cities Mac Admins](https://www.google.com/url?sa=t&rct=j&q=&esrc=s&source=web&cd=13&cad=rja&uact=8&ved=0CFMQFjAMahUKEwjl8duH9d3GAhUMkg0KHcZdDvk&url=http%253A%252F%252Fwww.mspmacadmins.org%252F&ei=WbqmVaXhGYykNsa7ucgP&usg=AFQjCNFKlRkPdoADHQFX0V9G_gCoT-DVzg&sig2=hdI6tPANxFMayKU4jFpPbg&bvm=bv.97653015,d.eXY)


    ## 面向 Mac 管理员网站


    有许多网站为管理员提供内容和支持。根据你的客户类型，你可能会希望你的团队每天阅读特定类型的网站。例如，如果你为大量平面设计师提供支持，你可能希望你的团队每天早上阅读
    Adobe 博客，以便提前了解新的功能和可能出现的错误。


    *   Adobe 博客：[`http://blogs.adobe.com/oobe/`](http://blogs.adobe.com/oobe/)

    *   `afp548`：[`http://www.afp548.com`](http://www.afp548.com)

    *   Amsys Blog：[`http://www.amsys.co.uk/blog/`](http://www.amsys.co.uk/blog/)

    *   `EnterpriseiOS`：[`http://www.enterpriseios.com`](http://www.enterpriseios.com)

    *   MacAdmins on Slack：[`http://macadmins.org`](http://macadmins.org)

    *   MacSysAdmin：[`http://macsysadmin.se`](http://macsysadmin.se)

    *   MacTech：[`http://www.mactech.com`](http://www.mactech.com)

    *   Xsanity：[`http://www.xsanity.com`](http://www.xsanity.com)


    其中最著名的是 MacAdmins on Slack。在这里，有从 MSP 基础设施到 Xsan 再到招聘版的各类频道。话虽如此，它也可能完全摧毁生产力（有时能够向数百名同行寻求帮助也可能成为一种依赖，所以要小心。）'
  raw: '*   [Penn State MacAdmins Conference](http://macadmins.psu.edu/) : Penn State
    Mac Admins emerged during a time of uncertainty with WWDC and systems administration
    topics. If you’re part of the infamous MacEnterprise list that Penn State runs,
    and you find the conversations there relevant to your job, then this is likely
    a conference you’ll want to attend. It’s priced well, too!


    *   [University of Calgary MacDeployment](http://macdeployment.ca/resources) :
    This is marketed as more of a workshop (and on hold for a year), but it’s worth
    noting as it had a lot of really good content and provided a good centralized
    place for Canadian Mac Admins to pick up new tips and tricks!


    *   [Usenix](https://www.usenix.org/) : I think this is a great show for the Unixy
    among us. Many of the topics covered are highly relevant to the Mac admin.


    *   [WWDC](https://developer.apple.com/wwdc/): Everyone knows about Apple’s Worldwide
    Developer Conference. But more and more, if you use Munki or a third-party tool
    to manage your systems and aren’t writing code, you can watch the sessions online
    and save your continuing development/training funds to check out one of the other
    conferences.


    *   [X World](https://auc.edu.au/xworld/about/): Part of the AUC in Australia,
    X World had topics ranging from Munki to Casper. Initially a very education-centric
    conference, there were Apple administrators from around Australia gathered to
    share their knowledge and glean information from others on managing large numbers
    of Apple systems. And the organizers and delegates are pretty awesome people to
    hang out with. Great networking. I highly recommend that if you are a Mac admin
    in Australia that you support the AUC by [becoming a member](http://auc.edu.au/membership/)!


    There are a boatload of development conferences. But this book is more focused
    on systems administration (while many of the tenants are easily used in both).
    If you want more, I also recommend grabbing an app like Eventbrite or Meetup and
    searching your local area. There are user groups, meetups, and more almost every
    night of the week in larger cities. So there’s never a shortage of options for
    professional development.


    Additionally, checking out the MacAdmins Podcast (in full disclosure, I’m a host)
    will net you a number of interesting topics on the Apple platform and also give
    you an updated list of conferences and upcoming conferences.


    ### Meetups


    Meetups are local meetings held throughout the country. I maintain a page of meetups
    at krypted.com , as there are always upcoming and new meetings around the world.
    You can also get information about each on the Community Calendar section of the
    MacAdmins Podcast.


    As of today, see the following for meetings around the world:


    *   Austin Apple Admins: [`http://www.austinappleadmins.org`](http://www.austinappleadmins.org)


    *   Colorado iOS Admins: [`http://coiosadmin.tumblr.com`](http://coiosadmin.tumblr.com)


    *   Denver Mac Admins: [`http://www.meetup.com/Denver-Mac-Admins/`](http://www.meetup.com/Denver-Mac-Admins/)


    *   London Apple Admins: [`http://www.londonappleadmins.org.uk`](http://www.londonappleadmins.org.uk)


    *   MacAdmin Monthly: [`http://www.macadminmonthly.org`](http://www.macadminmonthly.org)


    *   [MacSysAdmin] Bier: [`http://macsysadmin.ch`](http://macsysadmin.ch)


    *   MacBrained: [`http://macbrained.org`](http://macbrained.org)


    *   MacDMV (The DC Metro area Mac Admins group): [`http://www.macdmv.com`](http://www.macdmv.com)


    *   Perth Apple Admins: [`http://www.meetup.com/Perth-Apple-Admins/`](http://www.meetup.com/Perth-Apple-Admins/)


    *   Philly Mac Admins: [`http://www.meetup.com/Greater-Philadelphia-Area-Mac-Admins/`](http://www.meetup.com/Greater-Philadelphia-Area-Mac-Admins/)


    *   Northeast Regional Apple Admins (Providence): [`https://www.meetup.com/providenceappleadmins/`](https://www.meetup.com/providenceappleadmins/)


    *   Apple Admins of Seattle and the Great Northwest: [`http://www.meetup.com/Seattle-Apple-Admins/`](http://www.meetup.com/Seattle-Apple-Admins/)


    *   Sydney Mac Admins Meetup: [`http://www.meetup.com/Sydney-Mac-Admins/`](http://www.meetup.com/Sydney-Mac-Admins/)


    *   Twin Cities Mac Admins Group: [Twin Cities Mac Admins](https://www.google.com/url?sa=t&rct=j&q=&esrc=s&source=web&cd=13&cad=rja&uact=8&ved=0CFMQFjAMahUKEwjl8duH9d3GAhUMkg0KHcZdDvk&url=http%253A%252F%252Fwww.mspmacadmins.org%252F&ei=WbqmVaXhGYykNsa7ucgP&usg=AFQjCNFKlRkPdoADHQFX0V9G_gCoT-DVzg&sig2=hdI6tPANxFMayKU4jFpPbg&bvm=bv.97653015,d.eXY)


    ### Sites For MacAdmins


    There are a number of web sites that provide content and support for admins. Based
    on your type of customers, you might find that you want all of your staff reading
    a certain type of site daily. For example, if you support a lot of graphic designers,
    then you might want your team reading the Adobe blogs every morning to be in front
    of new options and maybe errors.


    *   Adobe blogs: [`http://blogs.adobe.com/oobe/`](http://blogs.adobe.com/oobe/)


    *   afp548: [`http://www.afp548.com`](http://www.afp548.com)


    *   Amsys Blog: [`http://www.amsys.co.uk/blog/`](http://www.amsys.co.uk/blog/)


    *   EnterpriseiOS: [`http://www.enterpriseios.com`](http://www.enterpriseios.com)


    *   MacAdmins on Slack: [`http://macadmins.org`](http://macadmins.org)


    *   MacSysAdmin: [`http://macsysadmin.se`](http://macsysadmin.se)


    *   MacTech: [`http://www.mactech.com`](http://www.mactech.com)


    *   Xsanity: [`http://www.xsanity.com`](http://www.xsanity.com)


    The most notable of these is the MacAdmins on Slack. Here, there are channels
    for everything from MSP infrastructure to Xsan to job boards. Having said that,
    it can be a complete productivity destroyer (and sometimes being able to ask hundreds
    of peers for help can be a bit of a crutch, so be careful.)'
