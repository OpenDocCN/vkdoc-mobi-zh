    be open to learning new tactics, no matter how successful you might have been
    up to this point.


    In the following few sections, we’ll provide a brief description of many of the
    most common sales methodologies in use today. We’ll also include a link to a book
    or two for each in the Further Reading section of this chapter.


    #### Target Account Selling


    Used for over 25 years, Target Account Selling is a standard in the sales world,
    with over 650,0000 sellers trained to convert smaller customers (or smaller groups
    within larger environments) into bigger and more permanent customers. Target Account
    Selling breaks larger deals down into smaller components. Using a strategic plan
    throughout the life of the sales cycle, Target Account Selling de-emphasizes politics
    of an account.


    Target Account Selling is popular due to the ability to automate the whole sales
    process via Salesforce, making it easier and simpler to integrate with existing
    workflows. The cost of training the staff for target account selling is high,
    but most experienced people you hire will already understand this methodology.


    #### SPIN Selling


    When Neil Rackham wrote the book “SPIN Selling” in 1989, I doubt he knew that
    it would still be in use decades later. The name “SPIN Selling” always makes me
    think of Leonardo getting on the phone to sell some junk stocks. The name just
    feels like the reason a lot of sellers get a bad rap. But that doesn’t mean it
    has to be a bad methodology (if I thought it were I certainly wouldn’t have put
    it in this list).


    SPIN stands for Situation, Problem, Implication, and Need-Payoff. You ask questions
    to understand the buyer’s situation, issues, consequences, and situation, respectively.
    SPIN Selling requires pretty good communication skills and can seem more like
    a communication technique than a sales methodology at times. SPIN Selling has
    proven to be a great technique to attract more customers in as easily prescriptive
    a way as possible. In this methodology, the salesperson is trained to ask questions
    based on a customer’s choices and preferences, which expose the needs of their
    organization. This theoretically establishes trust and helps you align your solutions
    with the services and product you provide.


    There are no concrete steps in this methodology to unravel the needs and demands
    of the customer, but it surely helps in maintaining strong customer and sales
    representative bond. This is very much a classic sales methodology and best used
    with smaller, more transactional sales that don’t have a bunch of stakeholders
    involved in the buying process.


    #### SNAP Selling


    I figured I’d put the two acronym names side-by-side. “SNAP Selling,” from Jill
    Konrath in 2012 makes a huge, huge assumption: that everyone is as busy and “frazzled”
    as the author. The goal is to speed up the sales process by being Simple, iNvaluable,
    Aligned with the needs of the customer, and a Priority. Part of the focus is about
    getting “in the head” of your customers. It’s a good, easy read. Whether I’d implement
    it as a methodology for a whole company would likely depend on the types of sales
    I’m making. For example, the P is for Priority. If you’re selling something that
    isn’t a priority, can you make it one? If not, move on. I don’t think that works
    for large-scale insourcing options that involve very complex deals. Because really,
    then you’d just be left with SNA.


    Always looking to be relevant is a challenge. But, to me the most important part
    of this book is the value chain that it demonstrates, not the methodology. Everyone
    in sales should read it, even if the sales department doesn’t leverage it as a
    methodology.'
