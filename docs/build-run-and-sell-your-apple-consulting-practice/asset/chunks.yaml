  trans: "\n#### 5 个为什么\n\n5 个为什么技巧用于寻找问题的根本原因。这个问题可能是软件缺陷（编写软件时）或业务流程中的失败。基本上，就是问为什么会发生某件事。然后，利用答案再次提问，并重复这个过程几次。通常，你会在\
    \ 5 次追问内找到根本原因分析。对于更复杂的问题，可能需要 7 次。\n\n根本原因分析的目标是深入问题的核心。以应收账款为例。让我们提出一系列问题：\n\
    \n1.  为什么公司处于负现金流状态？\n    1.  因为应收账款过高（超过`$1,000,000`）。\n2.  为什么公司历史上首次应收账款超过`$1,000,000`？\n\
    \    1.  因为公司有许多客户正在对账单提出争议。\n3.  为什么客户会对账单提出争议？\n    1.  因为解决一个客户声称不应该需要多次上门的单一问题，却花费了多次行程。\n\
    4.  为什么质量在下降（或至少为什么大家感觉如此）？\n    1.  我们招了一批新员工，以替代离职的人员。\n5.  为什么我们最近经历了高流动率？\n\
    \    1.  因为老板不常在，员工薪酬不足，或者他们都找到了更好的工作。\n\n看，这是我的错！或者，要么是我们没有让团队保持投入，没有为他们提供足够的报酬，要么是我们所处地区的行业发生了转变。每个人的结果都会不同，但请注意，我们这里从现金流问题追溯到了人员流动问题，这是一个常见的关联。在这种情况下，应立即解决客户的质量问题，并且我们应该采取措施来提高员工留存率。\n\
    \n#### SWOT 分析\n\n我们将要讨论的第一种分析问题的方法是 SWOT。SWOT 代表优势、劣势、机会和威胁。SWOT 在主动使用时效果最佳，但我们也可以用它来进行反应性分析。我们可以利用\
    \ SWOT 来审视风险，然后将这些风险与出错的原因联系起来。\n\n首先，我们来定义 SWOT 的组成部分。\n\n*   **优势**是让你相较于其他组织（很可能是你当地的竞争对手）具备优势的属性。\n\
    *   **劣势**是让你处于不利地位的属性。\n*   **机会**是基于你的优势可以加以利用的领域。\n*   **威胁**是你的竞争对手基于你的劣势可以加以利用的领域。\n\
    \n首先，确定分析的目标是什么。可以将其视为标题，并尽量简洁地概括。然后绘制一个网格，在每个框内标上要素之一：优势、劣势、机会和威胁。接着填充这些框。根据我的经验，一旦你完成这个练习，很多事情就会变得清晰；如果没有，也很容易向他人征求关于哪些内容应该放在哪里的反馈！\n\
    \n还有很多其他方法可以用来审视你将要做什么、已经做了什么，并分析结果或计划的结果。其中最重要的是，要采用结构化的方式对业务进行批判性思考。我喜欢与我所在团队的成员一起独立地完成这些工作。这不仅能让我得到自己的分析，还能了解其他人是如何思考相同问题的。\n\
    \n一旦你回顾了问题出在哪里，就该提出如何纠正这种情况的假设了。这个假设会导向一个可行的解决方案。SWOT 可以帮助你根据实施解决方案可能产生的结果来规划应对措施。这里的主要目标是提供有意义的回应，而不是仅仅填满空白。\n\
    \n## 结论\n\n你总能找到人来经营你的公司。但当你找到他们后，你可能又不希望他们来经营，因为你可能会怀念掌控一切的感觉。而且，没有人能做得像你一样好。永远不要公开指责你安排来运营组织的人。私下里，可以提供反馈。\n\
    \n尽管并不容易，但从经营企业转变为监督企业，可能是你职业生涯中最有收获的探索之一。你可以自由地做各种各样的事情，比如终于可以去度假，或者创办另一家公司。只需记住，成为兼职所有者通常会导致组织的销售和业绩下降。而长期影响往往是企业无法永续经营，所以一定要善待那些留下的人，奖励增长，维持公司运营，以便你能最好地照顾那些选择与你共度时光的每一个人。\n\
    \n## 延伸阅读\n\n*   《变革之心》（The Heart of Change），约翰·P·科特 [`https://www.amazon.com/Heart-Change-Real-Life-Stories-Organizations/dp/1422187330`](https://www.amazon.com/Heart-Change-Real-Life-Stories-Organizations/dp/1422187330)\n\
    *   《引领工作：驾驭超越雇佣的世界》（Lead the Work: Navigating a World Beyond Employment），约翰·W·布德罗、拉文·杰苏萨森、大卫·克里尔曼\
    \ [`https://www.amazon.com/Lead-Work-Navigating-Beyond-Employment/dp/1119040043`](https://www.amazon.com/Lead-Work-Navigating-Beyond-Employment/dp/1119040043)\n\
    *   《激发退休灵感》（Retire Inspired），克里斯·霍根 [`https://www.amazon.com/Retire-Inspired-Its-Financial-Number/dp/1937077810`](https://www.amazon.com/Retire-Inspired-Its-Financial-Number/dp/1937077810)\n\
    *   《不要退休，重新布线》（Don’t Retire, Rewire），杰瑞·塞德拉、里克·迈纳斯 [`https://www.amazon.com/Dont-Retire-Rewire-Jeri-Sedlar/dp/1592576893`](https://www.amazon.com/Dont-Retire-Rewire-Jeri-Sedlar/dp/1592576893)\n\
    *   《自由职业者如何赚更多钱》（How To Earn More Money As A Freelancer），V. V. Cam [`https://www.amazon.com/Because-Money-Matters-Freelancer-Economy-ebook/dp/B078YHZ2GX`](https://www.amazon.com/Because-Money-Matters-Freelancer-Economy-ebook/dp/B078YHZ2GX)\n\
    *   《零工结束了》（The Gig is Up），奥尔加·米兹拉希 [`https://www.amazon.com/Gig-Up-Economy-Obsolete-Freelancing/dp/1626344930`](https://www.amazon.com/Gig-Up-Economy-Obsolete-Freelancing/dp/1626344930)\n\
    *   《SWOT 分析》（SWOT Analysis），劳伦斯·G·范恩 [`https://www.amazon.com/SWOT-Analysis-Strength-Weaknesses-Opportunities/dp/1449546757`](https://www.amazon.com/SWOT-Analysis-Strength-Weaknesses-Opportunities/dp/1449546757)\n\
    \n# 收购公司\n\n收购一家公司可以为你的公司注入新鲜血液。你的员工可以因新客户的涌入而充满活力，你的客户也能在你提供的额外服务中发现更多价值。在第 13\
    \ 章中，我们讨论了出售你的公司。在第 14 章中，我们了解了如何转变为兼职所有者。现在，让我们讨论如何通过收购来实现公司的非有机增长。\n\n收购的方法和已被收购的公司一样多。寻找目标公司的方法也有很多种。一种方法是寻找正在市场上出售的公司。另一种方法是寻找那些可能尚未上市的公司。不要将自己局限于与待售公司展开讨论。\n\
    \n不过，在开始之前，先思考一下你收购一个组织的目的是什么。在很多方面，这和第 13 章的内容相反，但建立在我们已讨论过的基础上。所以，首先，让我们谈谈“为什么”，或者说你通过收购实际想要实现什么目标。\n"
- fmt: '# Make a List


    Look for possible organizations that might align with yours. These may be companies
    you’ve done business with before, or companies you’ve competed with locally. Make
    a list of the ones you could imagine yourself operating. And think about what
    they add to yours. Maybe you’re a solo practitioner and you would like to buy
    out a larger shop with the nickels you’ve squirreled away. Maybe you’re the larger
    shop who would like to buy out the solo practitioner.


    I don’t always tell people to make lists. Some are list-makers, some aren’t. But
    you really should make a list this time. Once you’ve got your list, move it into
    a Google sheet or Excel and add some columns. Now, let’s think about what attributes
    you might get from an acquisition.


    # What Are You Actually Trying to Buy (or Roll Up)?


    When most companies purchase another company, they’re usually looking to acquire
    something specific. When consulting firms look to acquire other consulting firms,
    it’s usually about existing customers, talent, technology, brand identity, and/or
    vendor contracts (and in my experience it’s in that order). Let’s unpack each.


    *   **Customers** are only as good as the contracts. Why? Customers can leave
    with staff who defect during the transition (including principals who came as
    a part of the acquisition). Rather than buy a company just for their customers,
    you might choose to just hire more salespeople, the staff of a competitor, and/or
    aggressively pursue their customers yourself.


    *   **Talent** on the Apple platform can be harder to find for other platforms.
    Apple consulting expertise is a growing market, but hiring a team or finding good
    staff can be a challenge. You could attempt to hire talent away from an incumbent,
    take on talent from new customers, train new employees, or go hire people from
    recruiting and headhunting sites—but the ability to bring on two, three, or more
    engineers who can hit the ground running (especially if you’re getting customers
    as part of a deal) is priceless, especially since they can be used to onboard
    net-new employees while providing a seamless transition to customers who might
    be acquired with a deal.


    *   **Technology** is usually easy to recreate in some way unless it’s patented,
    or you don’t yet fully understand the business logic. However, the time to market
    can be critical with new ventures. If a competitor has the ability to immediately
    deliver something that you’ve only begun to think about, then consider the cost
    of going to market and the lost business from being latent to market. This might
    be customer-facing technology (such as products that are cross-sold into customers
    with services, as well as implemented ticketing systems, client automation, integrations,
    middleware, etc.


    *   **Brand Identity** is something I’ve always struggled with. Being first certainly
    doesn’t mean being best. You will frequently roll identities into one another
    anyway. You can also launch a new product or service and, with a media blitz about
    being new and fresh, often build a competing identity on your own. But if there’s
    technology or a service that’s already in the market, then it’s easy to merge
    brands or bring another brand underneath your own. My challenge here is that I
    usually see people getting caught up in wanting to own the brand, not in wanting
    to provide value. One of my favorite consulting acquisitions was Geek Squad, who
    was acquired for the most part because they had a good brand. However you might
    feel about the talent level in Best Buy stores or their brand, since neither you
    nor I make more than Best Buy does, it’s worth giving them props for expanding
    that brand into all of their stores and making money off space that had previously
    been considered an exclusive warranty replacement department.


    *   **Vendor Contracts** can take a long time to get processed. Large computer
    companies like Cisco, Apple, Microsoft, and others might require certifications
    (both with regard to your staff and your company or location). You also need to
    be in business or established with a vendor to get a good line of credit for purchasing
    (let’s not forget that for hardware and software you’ll often pay up front and
    then take payment in 30 to 90 days). But more importantly than acquiring the contracts
    is acquiring talented people that know their way around these systems, know how
    to unlock the various SPIFs, and have contacts at those companies. Sure, you can
    figure it out, but in the process, you might end up losing far more than the cost
    of a rollup or acquisition.


    When it’s possible you want to get a little bit of each of these when you are
    navigating a good acquisition or rollup. Each has its own value. Just don’t forget
    that you want to bring in everything you can. So rather than just tell people
    to get on board with how you’re doing things, listen thoughtfully to what new
    people have to say and accept any process changes that might make sense, or table
    any you aren’t ready to deal with.


    # Approaching Acquisition Targets


    Many a relationship takes the tone with how that relationship begins. I guess
    some things come down to first impressions. Perhaps you already know the principals
    of an organization you want to acquire. Or maybe you are looking to meet them
    for the first time. Either way, approaching someone about acquiring their company
    is a delicate process.


    Imagine if someone wanted to buy your company. You probably aren’t going to go
    out for Happy Hour, have a few too many drinks, and wake up in the morning having
    signed away your company. I’ve heard stories that include things like hiring private
    investigators to follow people, having background checks performed without their
    consent, and going through the garbage at someone’s home. Having said that, I’ve
    heard of large companies doing at least two of those as well, just to hire talent
    (or hiring headhunters to do it).


    So let’s not go that far. Let’s say that maybe you do a little bit of due diligence
    (nothing creepy) and then look for any contacts you have in common. The warm introduction
    is, by far, always the best. And I wouldn’t look for an introduction on LinkedIn
    or through e-mail (although you take what you can get in this world). I want to
    push for an in-person introduction—just lunch, like the dating service says. This
    gives you the chance to meet someone face to face. You don’t have to say you want
    to acquire their company. Instead, you can say you just want to meet someone else
    who you’ve heard so much about!


    Once you’ve met in person, if you get to that point where you want to start discussing
    an acquisition or merger, then I like transparent, direct, and early communications.
    “There’s a chance our two companies might better serve customers as one company.
    How do you think we might make that happen?” Be direct, but not aggressive. After
    all, you didn’t hire someone to go through this person’s garbage, right?'
