  trans: '

    # 保持清醒


    不过，我仍可以提供一些建议，帮助你保持理智。以下是一些作为个体经营者需要牢记的要点：


    - 通常一切都关乎精品服务。市面上确实有很多极其廉价的选择，其中一些和你做得一样好。无意冒犯，对我也是如此。但你能提供某种水准的服务，让你物超所值。不要吝啬为客户提供那些只有精品店才能做到的小细节。


    - 个体经营让你能够专注于与核心客户的关系。人生苦短，不值得与糟糕的人共事。如果你选择扩张，那就另当别论。但在目前的规模下，除非你计划发展壮大，并用他人取代自己在客户那里的角色，否则只与你愿意合作的人共事，而不是任何打电话来的人。


    - 不要在价格上竞争。如果你创办了一家公司，对每个项目都趋之若鹜，并且试图比任何人都更便宜，那么你会被累垮。大多数根据价格选择供应商的客户，往往对如何对待这些供应商抱有某种期望。再说一次，人生苦短，不值得为此纠结。我并不是说不要探索每一个找上门的机会，但请思考一下：是收取`$200`每小时的费用工作
    2 小时更好，还是收取`$50`每小时的费用工作 8 小时更好？


    - 保持简单。我们在本书中涵盖的很多内容都是关于如何规模化运营——当你建立公司时需要考虑的事项。其中许多系统对个人从业者也非常适用。但要建立适合你规模的系统。你当然需要一些工具来轻松追踪事务。但举个例子，你不需要像`Marketo`这样的工具来给客户发消息。


    - 实践 80/20 法则。百分之二十的客户可能为你带来百分之八十的业务。务必尽可能用满满的关怀来服务这些客户。同时，不要害怕放弃其中一些客户，即使他们来之不易。


    - 尽可能外包或推荐出去。你越晚招聘会计、调度等岗位，你的生活就越轻松。在招聘这些职位之前，想想是否可以请一位兼职人员来做，或者直接购买一项服务。


    - 照顾好自己。我记得当客户凌晨 4 点打电话时，我会从床上跳起来去帮助他们。三倍时薪虽然不错，但如果你发现自己经常这样做，可以提高那些非工作时间的费率，试着减少这类电话。


    - 设定日程安排。如果你是刚为自己工作，很容易让个人生活挤占职业生活，或者让职业生活开始吞噬所有时间，导致没有时间留给个人生活。设定一个日程：在工作前去健身房，然后早上
    9 点准时到第一个客户那里，或者按你自己的节奏来。并留出时间给家人和朋友。你知道的，这样他们才不会忘记你的存在。


    - 迅速处理账单纠纷。如果客户逾期付款，他们要么是忘了，要么是遇到了财务困难，或者是对已完成的工作有异议。无论哪种情况，如果你让应收账款堆积起来，你的生意难以长久维持。尽快找到任何拖欠账款的根源，并且要知道，客户通常只是因为太忙而没有对发票提出异议。


    - 尽可能坚持货到付款。这能让你的账目保持简洁。


    - 立即寻求税务帮助。我见过许多个人从业者在第一年就倒闭了，因为他们没有规划好季度税款。


    - 赞助社区。你知道那些印有当地高中国家家长教师协会广告的日历，或者教会简报里的广告条目吗？赞助你所在的社区，不仅是结识潜在客户的绝佳方式，也是让你的品牌被动地、轻松地出现在他人面前的一种途径。


    - 除非你全心投入，否则不要将经营规模扩展到个体经营之外。你的业务可能足以支撑扩张，但如果你心不在此，那么辜负那些选择为你工作的人就不值得了。


    最初的客户总是最难争取到的。他们通常来自你的朋友圈。因为你尚未完全了解自己的价值，你很可能会向他们收取较低的费用。随着你获得更多客户，你会提高收费标准，这可能会导致部分客户流失。这没关系，只要你赚到的钱仍然足够让这份工作变得值得。


    # 有意识地经营


    有意识地去经营永远不会太早。找到你的利基市场，并主动寻找能帮助你在该领域获胜的客户。多年来，我认识一些专门为 Mac 和 iOS 系统开发销售点（PoS）系统的顾问，我永远无法像他们那样擅长做他们做的事，所以我会把相关业务推荐给他们。会计系统、数字标牌和特定技术领域也是如此。这也有助于让你在潜在客户面前脱颖而出。如果你想在这些领域发展，那么你就更容易吸引到可以长期留住的客户。


    在你建立初始客户基础的过程中，你很可能会接触到一些不属于你核心领域的客户。也许你是在边做边学，或者只是为了下周能吃上更多泡面而做某类特定工作。无论如何，最好对这些客户坦诚地说明你们之间的关系性质。生活中也是如此。


    思考你想从这件事中获得什么。是为了灵活的自由？是为了拥有一份能让你更接近退休的兼职工作？还是为了掌控自己的命运？当顾问的一大好处是，很多时候你能获得即时的满足感。但代价是你要包揽所有工作，而且这些工作量时断时续。你越了解自己的意图，就越能适应环境，并恰当地利用那些业务清淡的时期。

    '
- fmt: '# It’s All About Character


    Be a good steward to your customers. Solo practitioners often work with customers
    who need their help. I’ve seen consultants keep customers because they’re afraid
    to leave them, and I’ve seen consultants who have their own best interest in mind
    when making decisions on behalf of customers or providing guidance. If you do
    what’s best for them, then you’ll be paid back many times over.


    If you’re hanging a shingle out as a consultant for the first time, or if you’ve
    been doing it for years, let’s start with what you want to do for your customers.
    In Chapter [1](#469405_1_En_1_Chapter.xhtml), we’ll cover the offer you make to
    customers, or the package of goods and services you provide, and the price you
    choose to charge for those goods and services.


    ## Acknowledgments


    The acknowledgements sections I’ve written in the past have been for technical
    books. This one is about how to do business. And business acumen begins with your
    parents: the first time they help you get a savings account, when they tell you
    to put a little aside instead of spending it all on candy, and when they teach
    you all the little details that help you get a better understanding of humans.
    So, thank you to my parents and the rest of my family for guiding me through all
    of those formative years.


    Then there are the teachers. This includes the ones that taught you specific things
    they were supposed to teach you that are easily understood as linking to business
    acumen, like how to do t-values and p-values or how to properly run a general
    ledger. The world is a complicated place, and without some seriously awesome guidance
    in our schooling, none of us would likely be where we are today.


    Then there are my coworkers. This includes business partners, bosses, coworkers,
    and employees. This also includes people you interact with at other companies.
    I can only hope I’ve taught all of those people as much about business as they’ve
    taught me.


    And finally, everyone else. Every interaction with another person in the business
    world, be it at a hotel bar with someone whose name you’ve never known, or someone
    who kicked your butt negotiating a contract, is a learning experience if you let
    it be. This extends to the people that wrote the books I included in the Further
    Reading sections of each chapter, but also regular non-business Fiction and Non-Fiction,
    as it all builds into a deeper understanding of the world around us.


    Notice that there aren’t any names here. That’s because there are just way too
    many to name. I love you all for all you have done for me.


    ### About the Author


    # 1. Build the Offer


    The most important task in front of you is to decide what you want out of this
    business you’re starting. Maybe you just want to make a little money on the side
    from your day job. Maybe you want to create a “lifestyle business” so you can
    work 20 hours a week and spend time with your family. Maybe you want to conquer
    the world. Either way, your most important task is to make a goal and decide what
    you want this thing to become. Then put milestones in place to build what it is
    that you actually want.


    Once you understand what you’re doing, you can start building an offer that reflects
    your goals and values. By creating an offer that authentically reflects what you’re
    looking for, you’ll quickly find that lots of projects are going to take you away
    from your core goal. And you’ll have to make a decision whether to pivot or to
    stay with your original plan.


    In this chapter, we’ll look at that offer. How do you research what should be
    in the offer? How do you structure the offer? What are common types of offers?
    How will you structure billing to reflect an appropriate profit margin? Wait,
    do you need a contract? We’ll start with researching what should go into an offer.


    ### Note


    One aspect of the offer to consider is specialization. You can and should charge
    a premium for your services if you own a vertical market in a given geography,
    especially if there are specific skills needed to deliver services for that vertical
    market.'
