  trans: '

    # 估值


    估值是对公司价值的一种估算。成熟的组织会聘请专业评估师来确定估值。这些评估通常由麦肯锡、埃森哲或德勤等大型会计师事务所编制——费用不菲，但绝对物有所值！


    根据公司规模和出售方式的不同，为估值做准备可能需要花费数年时间。因此，越早开始越好。以下是让公司为估值做好准备的一些步骤。


    -   列出所有负债。负债就是你欠别人的。这包括传统债务，如信用卡，也包括任何你已从客户那里收到款项但尚未交付服务的合同，例如年度预聘金。同时，也要审视任何关于房产、互联网接入、保险、法律等方面的未结合同。

    -   列出所有资产。资产就是你拥有的。这包括传统的固定资产，如房产，以及折旧资产（即随时间推移价值下降的资产），如电脑。资产还包括合同价值，以及未受合同约束的客户业务价值的一定比例。与客户关系的时长以及客户业务的稳定增长，会使这个比例更高。

    -   从资产中减去负债。一旦你整理好了“所有物”减去“所欠债”的清单，这一步就是个简单的计算。请遵循**公认会计准则**，并务必请一位会计师协助你，以免在后续过程中出现任何意外。

    -   记录过去 3 年的利润率。健康的利润率可以提高估值。你的收入是多少，运营成本又是多少？记录得越详细越好，例如按客户、按季度等。在电子表格中绘制图表并形成稳固的趋势线，将有助于这一过程。

    -   预测未来增长。我喜欢趋势线。`Microsoft Excel`在生成趋势线方面非常出色（`Keynote`和`Numbers`也同样出色）。更多关于趋势线的信息，请参见附录
    D。

    -   为你的知识产权定价。考虑一下公司博客及其带来的相关 SEO（搜索引擎优化）、你的销售渠道、你的人脉（包括客户）、各项标准操作程序、用于自动化业务的数据库，以及你创建的任何其他公司知识产权。在出售时，这些将随公司一起留下。如果你在离开时希望保留其中任何一项（或将其用于创办新公司），请在出售过程中进行协商。

    -   关注 MRR（月度经常性收入）。这是确立公司价值最可预测的方式。理想情况下，最好是有合同约束的。MRR 的增长可以绘制在趋势线上，以证明公司正朝着正确的方向发展。MRR
    不仅包括你产品的销售，还包括订阅服务的转售，例如互联网服务提供商的订阅、`Google Apps`订阅、`Office 365`订阅、租赁以及其他佣金。


    最终，这家公司值多少钱？无论估值如何，答案都是：有人实际愿意为这家公司支付的价格。对于合适的买家来说，公司的价值可能远超其账面价值，因为他们可能有交叉销售服务的计划，或者他们拥有一个系统，可以将你的客户纳入其中，从而提高利润率等。但在大多数情况下，我见过的公司价值远低于老板自以为的价值，尤其是在那些主要依靠按小时计费的咨询工作且没有长期合同的组织中。


    # 乘数


    兼并与收购可以有多种不同形式。我见过许多收购案例，买家并非支付现金，而是基本上用与客户合作业务的某个百分比来换取员工和客户名单/合同。那些因缺乏动力、增长乏力或利润率低下而苦苦挣扎的咨询公司，正是此类收购的绝佳目标。如果你正在评估一份此类出价，或准备构建一份此类报价，请记住，收购后，组织中的负责人很少会留下来。


    那么，是什么决定了乘数？是有人愿意为一家公司支付多少钱。仅此而已。但有所帮助的因素是：平稳且递增的利润数字。这意味着要将你大部分业务转向我们之前讨论过的 MRR
    模式。


    # 竞业禁止协议与承诺书


    出售你的公司时，很可能附带一份协议，要求你不会与买家竞争。你的竞业禁止协议或承诺书（类似于竞业禁止，但更具约束力）是买家购买的一项资产。


    竞业禁止协议在某些州的约束力比其他州更强，但总的来说，法律条文的规定在巨额的诉讼费用面前可能相形见绌。如果你打算以任何身份与前客户合作，我会建议你争取获得相关豁免。


    我听过许多咨询师说：“但客户是先给我打电话的”，或者“新管理层对他们不好”。你的公司能成功，原因之一很可能是你对客户很好。你可能与许多客户在工作之外建立了私人关系，看到他们可能无法得到你本会给予的照顾，这确实令人难受。但你在法律上有义务不进行干涉。违反该协议可能会带来严重后果，所以如果你这样做，要意识到你和你前客户所面临的风险。


    # 你会留在公司吗？


    这是最重要的问题之一。如果你还在，公司很可能会经营得更好，至少在一段时间内是这样。任何成熟的收购方都会理解这一点，并且很可能希望你留下来，至少过渡期是如此。


    在经营公司多年并做出所有决策之后，突然要询问他人意见或请求许可，可能会感到别扭。如果你将要留下来一段时间，请务必与公司的新所有者敲定一些细节。


    -   在招聘和人力资源方面，你仍然拥有哪些权力？

    -   你拥有多大的财务审批权？

    -   如果同时负责销售，你拥有多大的折扣权力？

    -   你将被如何逐步退出，包括最终的离职日期是什么？


    如果你计划离开，请务必与新所有者商定一个可接受的退出策略。这应该包括附带固定日期的里程碑节点。我发现对员工保持透明非常重要，因此，在可能的情况下，最好让团队中的每个人都了解时间表。'
- fmt: '# Wielding Political Capital


    Going from owning a business to working in a business can be challenging. When
    you own the business you can chart the course for the team. When you don’t, you
    can’t. Instead, you have to wield political capital sometimes. For example, you
    do a favor for someone. Because then they owe you. That’s how it works, right?
    No.


    You do a favor for someone because it’s the right thing to do. You should expect
    nothing in return. It’s called being a mensch. Maybe you get something in return;
    maybe you don’t. But it always works out in the end. I see a lot of different
    people who try to manipulate situations in order to get a specific outcome. Don’t.


    These days I try hard not to manipulate anyone. But I have. In the end, when people
    realize that you are manipulating them, they will never trust you again. That
    is bad. But that is not the only reason to avoid such behavior. Avoid it because
    it’s just plain wrong. If you can’t win a heart and mind with the truth, don’t
    bother.


    Suddenly then it seems like there might not be such a thing as political capital.
    But there is. It’s called karma. And there’s no reason you should think about
    it. Instead, just be a good person. Practice honesty. Be virtuous. Help others.
    Avoid judging others. Help those less fortunate than yourself. Then, you won’t
    need to wield that political capital because your actions will guide you and you
    will prosper in the ways you are meant to.


    This does not mean you shouldn’t have an opinion. Nor that you should try to convince
    others that your opinion is the correct outlook on a given situation. Nor does
    this mean that you should be weak. You can be strong and have an opinion that
    isn’t shared with everyone in a given organization. And you can gain political
    capital by not always having to be right (even when you aren’t).


    And if you are a decision maker, you can be the gatekeeper to make sure your part
    of an organization contributes to the mission of the organization. When others
    make requests of you, do what’s right—not just for your budget or team but for
    the mission of the entire organization. And when you have needs from others, trust
    they will do the same—hopefully without setting the expectation that you will
    need to repay them. You may build trust with others; but neither party should
    walk away with an expectation of repayment unless negotiated at the time a favor
    is given. But then it isn’t a favor, is it?


    But humans are human. And so power struggles occur. Stay clear of too many. Heed
    those old adages our parents taught us, like “take the high road.”


    Ultimately, we’ve then defined political capital as trust, rather than what you
    can do for others. Trust is built on merit and cannot be rushed. Your capacity
    to help your part of an organization (and long term, all parts) is then based
    on the political capital you and your team can build, which takes time, success,
    and patience. Remember that, and avoid the mistakes we were taught to avoid in
    kindergarten, and I think you’ll do great!


    ## Conclusion


    You gave control of the company to someone else. Don’t go second-guessing them
    all the time saying things like, “That’s not how I would have done it.” This will
    not do anyone any good. This doesn’t mean that you need to be inauthentic and
    just agree with everything the new ownership says. Instead, give the benefit of
    the doubt, and address concerns privately in order to give the new ownership the
    best possible chance of succeeding.


    I heard a great analogy once: “The old mayor shouldn’t be second-guessing the
    new mayor all the time.” Wise words from a wise person. There’s a reason that
    the change occurred; respect boundaries, but try to be as helpful as possible—even
    if you don’t always agree with new perspectives.


    Ultimately, you have options! You might choose not to sell your company after
    all and instead go an entirely different direction. Or you might choose to hang
    onto the company and move into being a part-time owner, which we cover in the
    next chapter. No matter what you do, throw a party.


    ## Further Reading


    *   Selling Your Software Company: An Insider’s Guide to Achieving Strategic Value,
    David Kauppi, [https://www.amazon.com/Selling-Your-Software-Company-Achieving-ebook/dp/B01M59QA02](https://www.amazon.com/Selling-Your-Software-Company-Achieving-ebook/dp/B01M59QA02)


    *   Expensive Mistakes When Buying & Selling Companies, Richard G. Stieglitz PhD,
    Stuart H. Sorkin JD LL.M CPA, [https://www.amazon.com/Expensive-Mistakes-Buying-Selling-Companies/dp/0982050062](https://www.amazon.com/Expensive-Mistakes-Buying-Selling-Companies/dp/0982050062)


    *   Finishing Big: How Great Entrepreneurs Exit Their Companies on Top, Bo Burlingham,
    [https://www.amazon.com/Finish-Big-Great-Entrepreneurs-Companies/dp/1591844975](https://www.amazon.com/Finish-Big-Great-Entrepreneurs-Companies/dp/1591844975)


    *   The Excellence Dividend, Tom Peters, [https://www.amazon.com/Excellence-Dividend-Meeting-Tech-Tide/dp/0525434623](https://www.amazon.com/Excellence-Dividend-Meeting-Tech-Tide/dp/0525434623)


    *   Just for Fun, The Story of An Accidental Revolutionary, Linus Torvalds and
    David Diamond, [https://www.amazon.com/Just-Fun-Story-Accidental-Revolutionary/dp/0066620732](https://www.amazon.com/Just-Fun-Story-Accidental-Revolutionary/dp/0066620732)


    # 14. The Part-Time Owner


    Maybe you started a second company. Maybe you have someone else running the business.
    Maybe you can get to a point where you will no longer need to work. Maybe you
    want to workout 2 hours in the morning, have a luxurious lunch in the middle of
    the day, stroll into the office for 2 hours, and then hang out with friends. Or
    maybe you have another job and you just need this company to run on the side with
    little effort.


    Wherever you land, you worked hard for this and you should not feel guilty. As
    such, provided your business is in good shape (and the word “good” is subjective,
    here), you shouldn’t fear taking a little time to explore other adventures. Provided,
    of course, anyone that depends on you is well taken care of. In this chapter,
    we’ll look at some ways to disengage while still managing to keep the lights on
    and the people happy.'
  raw: '## Wielding Political Capital


    Going from owning a business to working in a business can be challenging. When
    you own the business you can chart the course for the team. When you don’t, you
    can’t. Instead, you have to wield political capital sometimes. For example, you
    do a favor for someone. Because then they owe you. That’s how it works, right?
    No.


    You do a favor for someone because it’s the right thing to do. You should expect
    nothing in return. It’s called being a mensch. Maybe you get something in return;
    maybe you don’t. But it always works out in the end. I see a lot of different
    people who try to manipulate situations in order to get a specific outcome. Don’t.


    These days I try hard not to manipulate anyone. But I have. In the end, when people
    realize that you are manipulating them, they will never trust you again. That
    is bad. But that is not the only reason to avoid such behavior. Avoid it because
    it’s just plain wrong. If you can’t win a heart and mind with the truth, don’t
    bother.


    Suddenly then it seems like there might not be such a thing as political capital
    . But there is. It’s called karma. And there’s no reason you should think about
    it. Instead, just be a good person. Practice honesty. Be virtuous. Help others.
    Avoid judging others. Help those less fortunate than yourself. Then, you won’t
    need to wield that political capital because your actions will guide you and you
    will prosper in the ways you are meant to.


    This does not mean you shouldn’t have an opinion. Nor that you should try to convince
    others that your opinion is the correct outlook on a given situation. Nor does
    this mean that you should be weak. You can be strong and have an opinion that
    isn’t shared with everyone in a given organization. And you can gain political
    capital by not always having to be right (even when you aren’t).


    And if you are a decision maker, you can be the gatekeeper to make sure your part
    of an organization contributes to the mission of the organization. When others
    make requests of you, do what’s right—not just for your budget or team but for
    the mission of the entire organization. And when you have needs from others, trust
    they will do the same—hopefully without setting the expectation that you will
    need to repay them. You may build trust with others; but neither party should
    walk away with an expectation of repayment unless negotiated at the time a favor
    is given. But then it isn’t a favor, is it?


    But humans are human. And so power struggles occur. Stay clear of too many. Heed
    those old adages our parents taught us, like “take the high road.”


    Ultimately, we’ve then defined political capital as trust, rather than what you
    can do for others. Trust is built on merit and cannot be rushed. Your capacity
    to help your part of an organization (and long term, all parts) is then based
    on the political capital you and your team can build, which takes time, success,
    and patience. Remember that, and avoid the mistakes we were taught to avoid in
    kindergarten, and I think you’ll do great!


    ## Conclusion


    You gave control of the company to someone else. Don’t go second-guessing them
    all the time saying things like, “That’s not how I would have done it.” This will
    not do anyone any good. This doesn’t mean that you need to be inauthentic and
    just agree with everything the new ownership says. Instead, give the benefit of
    the doubt, and address concerns privately in order to give the new ownership the
    best possible chance of succeeding.


    I heard a great analogy once: “The old mayor shouldn’t be second-guessing the
    new mayor all the time.” Wise words from a wise person. There’s a reason that
    the change occurred; respect boundaries, but try to be as helpful as possible—even
    if you don’t always agree with new perspectives.


    Ultimately, you have options! You might choose not to sell your company after
    all and instead go an entirely different direction. Or you might choose to hang
    onto the company and move into being a part-time owner, which we cover in the
    next chapter. No matter what you do, throw a party.


    ## Further Reading


    *   Selling Your Software Company: An Insider’s Guide to Achieving Strategic Value,
    David Kauppi, [`https://www.amazon.com/Selling-Your-Software-Company-Achieving-ebook/dp/B01M59QA02`](https://www.amazon.com/Selling-Your-Software-Company-Achieving-ebook/dp/B01M59QA02)


    *   Expensive Mistakes When Buying & Selling Companies, Richard G. Stieglitz PhD,
    Stuart H. Sorkin JD LL.M CPA, [`https://www.amazon.com/Expensive-Mistakes-Buying-Selling-Companies/dp/0982050062`](https://www.amazon.com/Expensive-Mistakes-Buying-Selling-Companies/dp/0982050062)


    *   Finishing Big: How Great Entrepreneurs Exit Their Companies on Top, Bo Burlingham,
    [`https://www.amazon.com/Finish-Big-Great-Entrepreneurs-Companies/dp/1591844975`](https://www.amazon.com/Finish-Big-Great-Entrepreneurs-Companies/dp/1591844975)


    *   The Excellence Dividend, Tom Peters, [`https://www.amazon.com/Excellence-Dividend-Meeting-Tech-Tide/dp/0525434623`](https://www.amazon.com/Excellence-Dividend-Meeting-Tech-Tide/dp/0525434623)


    *   Just for Fun, The Story of An Accidental Revolutionary, Linus Torvalds and
    David Diamond, [`https://www.amazon.com/Just-Fun-Story-Accidental-Revolutionary/dp/0066620732`](https://www.amazon.com/Just-Fun-Story-Accidental-Revolutionary/dp/0066620732)


