  trans: '

    ### 设备管理


    在本章稍后列出的工具中，设备管理工具将是您选择的最重要的工具之一。当我撰写第一本关于企业 Mac 管理的书时，市面上只有四种设备管理工具。而如今，设备管理已成为一个价值数十亿美元的行业，有数十种工具可供选择，每种都有其特定的利基市场。这主要是因为苹果公司开发了一套用于管理设备的
    API，即移动设备管理（`MDM`）。过去，在将设备交到用户手中之前，你必须先对设备进行镜像部署。借助设备注册计划（`DEP`），苹果公司基本上消除了镜像部署的需求，其方式是让设备在首次开机时加入一个
    `MDM` 解决方案，从而允许对设备进行自动化配置以替代镜像部署。苹果公司还推出了批量购买计划（`VPP`），它允许 `MDM` 解决方案从 App Store
    向设备部署应用程序。许多组织所需的大部分管理工作，随后都可以通过一个基于大量 API 调用以规范化苹果服务的图形用户界面（GUI）来完成。


    简而言之，这就是 `MDM`。但除此之外，还有一些带有不同成熟度代理的工具。`Jamf Pro`、`Munki` 和 `FileWave` 可能属于其中最重要的几个。这些工具可能带有也可能不带有
    `MDM` 组件。`Jamf Pro` 和 `FileWave` 是其中功能最全面的。另一种新兴的组合是 `AirWatch` 和 `Munki`，尽管这种不太可能的合作关系的未来尚不明朗。


    哪个是最好的管理工具？我不会在本书中深入探讨这些问题，因为它们总是在变化，而且这些工具的作者和供应商（我也是其中之一）脸皮都很薄。但这些工具都有 API，并且可以配置为与通用服务台和/或专业服务自动化工具协同工作。例如，我编写了一个集成
    `Jamf Pro` 与 Salesforce Cases 的工具，以及另一个集成 `Jamf Pro` 与 ZenDesk 的工具。`Jamf` 在 ServiceNow
    市场上有一个集成方案。另一个例子是集成热门 PSA 软件 `ConnectWise` 与 `Jamf` 的工具。我为 `Jamf` 工作，所以对这些最为熟悉，但您选择的任何管理工具，很可能都存在不同程度成熟度的集成方案。


    此外，还有一些管理工具是由也从事专业服务自动化（PSA）等业务的机构开发的。`LabTech`、`ConnectWise` 和 `Kaseya` 都是首先面向
    Windows 的工具，它们在非苹果平台上（例如，它们都有 Mac 代理）运行良好。所有这些代理本质上都是经过美化的脚本运行器，内置的逻辑非常少。因此，如果您使用这类工具，您很可能还需要另一个工具，能够实际帮助您管理设备并有效地获取设备信息。这并不是说您不能使用它们。为了节省精力和成本，在它们变得不够用之前，您应该使用它们。只是请对这种情况能持续多久抱有理性的预期。


    一个例外是 `Solarwinds MSP` 工具。这个工具集的维护者正在努力构建一个全面的解决方案，使得托管服务提供商（MSP）不仅能够销售设备管理（对于托管服务提供商来说，这更像是一种降低成本的工具），还能提供备份和防病毒解决方案，这些附加组件的成本很容易转嫁给您的客户。这将增加销售额，增加月度经常性收入（MRR），并降低您在支持设备时产生的成本（例如，与排查损坏的设备相比，从备份中恢复通常是一种快速的修复方法）。这个工具链可能因某种原因不适合您。如果是这样，仍然值得看看他们提供的产品，这些产品可以作为增加收入和让客户满意的方法。


    ## PSA、MSA、RMM 和 BDR（天呐！）


    选择合适的专业服务自动化（`PSA`）和/或托管服务自动化（MSA）是许多托管服务提供商（MSP）将要做出的最重要决策之一。这是一种旨在为您节省时间的昂贵软件。至于应该使用哪种正确的自动化软件，并没有明确的答案。为什么呢？因为每种软件都有其优缺点。我不会在本书中深入探讨这些问题，因为它们总是在变化，而且这些工具的供应商脸皮都很薄。


    但我可以提供指导。首先，寻找那些专注于您主要支持的平台的工具。如果您主要做 Mac 业务，请关注软件中对 Mac 的支持；如果您更偏向 Windows 业务，并将
    Mac 作为附加项，请寻找与 Windows 安装程序良好且深度集成的工具。甚至更好的是，实际上有一些工具专注于您可能支持的垂直市场，这些通常是最好的，因为它们内置了逻辑，可以帮助您在与该市场的客户合作时节省时间和金钱。


    `PSA` 或 `MSA` 解决方案的主要目标是节省您的人力成本，同时为您来之不易的客户提供额外的价值。如果您能在设备用户遇到某种工作中断之前主动解决问题，那么您就赢得了那份支持合同。稍加跟进就能产生深远影响；在不小题大做的情况下，将此信息传达给客户，让他们理解您所提供服务的价值。


    远程管理和监控（`RMM`）是一种允许您远程管理设备的工具。一个好的 `RMM` 工具，就像许多其他事物一样，能让您完成多项任务。我最喜欢的一个功能就是直接接入并控制桌面进行故障排查。虽然您需要与客户进行面对面交流，但您也需要控制成本并为客户提供更快的解决方案；因此，`RMM`
    对于提高效率至关重要，它能让技术人员坐在办公室里，而不是奔波在路上。


    ### BDR 软件


    BDR 代表备份和灾难恢复。这种类型的软件被许多人视为基础服务的附加组件。但重要的是要考虑到，没有什么比数据丢失更快地让您丢掉饭碗了。解释数据丢失的原因，以及判定是内部
    IT 部门、最终用户还是您的组织造成了数据丢失，都是无关紧要的。


    当涉及到数据丢失时，人们的看法是：您的咨询公司本应防止这种情况发生。除了防止数据丢失，`BDR` 软件还为您提供了许多额外的选择，用于简化故障排查和设备升级/更换流程。您可以将
    `BDR` 捆绑到您的服务中；然而，这会导致您的基准价格看起来更高。无论如何，即使您以极低的利润率运营 `BDR` 服务，您越能确信设备已备份（这意味着您需要将最近完成的备份作为设备管理软件的一部分），您就能越灵活。除了对全面
    `BDR` 的需求之外，关于 `RMM`、`PSA` 和 `MSA` 软件还有其他要点，我们将在下一节中介绍。

    '
- fmt: '# Some RMM, PSA, and MSA Solutions to Consider


    At this point (or at some point if you haven’t started), you’re probably telling
    most of your customers to run their business based on software. Accounting, CRM,
    Point of Sale, ERP, and other solutions help to keep labor costs down and allow
    businesses to be nimble. Your business is no different. In the beginning, if it’s
    just you, you might be able to get by with a spreadsheet and a `Quicken` account.
    As you grow that will no longer be the case.


    As such, there are a number of tools that you should look at, including the following
    solutions that can at least be used to manage Apple devices, even if they don’t
    provide a ton of value out of the box:


    - `Continuum`

    - `Autotask`

    - `Kaseya`

    - `Solarwinds MSP`

    - `Connectwise`

    - `N-Central`

    - `Pulseway`

    - `NinjaRMM`

    - `LogicMonitor`

    - `ManageEngine`

    - `Cloud Management Suite`

    - `Atera`

    - `CENTREL`

    - `Loom Systems`

    - `Auvik Networks`

    - `Trend Micro`

    - `mspStack`

    - `Acronis`

    - `HelpSystems`

    - `ECi Software Solutions`

    - `Opsview`

    - `OptiTune`

    - `Spiceworks MSP`

    - `Avast Managed Workplace RMM`

    - `Unigma`

    - `Zenith Infotech`

    - `packetTrap`

    - `BeAnywhere`

    - `LogMeIn Central`

    - `AVG Cloudcare`

    - `Comodo One RMM`

    - `Panorama9`

    - `Auvik MSP Edition`

    - `gfiMax`

    - `HarmonyPSA`


    Be diligent about your selection. Keep in mind that when you’re small, switching
    tools will be a pain, but doable. As you grow, it becomes more and more challenging
    given the number of devices you might have to touch, and you lose a lot of historical
    data when you do so. So be diligent about your tool selection. While some may
    appear expensive in the beginning, you’ll likely notice the real value chain that
    they bring as you grow.


    Consider the following attributes when you’re building a toolchain:


    - What is the cost of the tool vs the value derived from the tool?

    - Are all of your billing types supported?

    - Does the tool integrate with other device management solutions?

    - Does the tool provide a clear and easily explainable path from ticket creation
    to ticket completion to accounts receivable to timecard keeping for your staff?

    - Does the tool allow for a skills matrix, so that as you grow you aren’t reliant
    on a dispatcher who knows each skillset in your organization to route tickets?

    - Does the tool automate communications with customers?

    - Can you custom script the tool in case there are necessary workflows not otherwise
    supported?

    - Can you buy one tool instead of three?

    - If you outgrow the tool, what are your other options and how portable is the
    data to those other options?

    - Will the tool require professional services to get started?

    - How is the support organization of the company that makes the tool?

    - Do you actually like using the tool?


    There are so many other questions, but these should get you started on the right
    path. Customers should be able to create a ticket online, see the status of that
    ticket online, see the status of their fleet online, get a message that the ticket
    was closed, rate your performance on the ticket, see their bill for the work,
    and pay their bill or change their billing information. And chances are, especially
    when it comes to Apple, that one tool isn’t going to allow you to do all that.
    But with some good work, you can string together a fully automatable solution.


    ### Tip


    Once you select a tool, also consider what the future will be for that tool!


    You should have a goal to outgrow any MSP solution you purchase. These tools are
    great for growing and smaller businesses, but once you get to a certain point,
    none will be able to keep up with your growing needs. In the beginning, if you
    have too much scripting and other custom workflows that don’t make sense using
    any of these tools, your business logic is probably broken. But as you grow, if
    you stick to their specific workflows, you’ll likely end up either being a commodity,
    or your labor costs will start to skyrocket. At this point, it’s worth bringing
    in a business advisor, or seeking the counsel of someone who’s gone through similar
    growing pains.


    ### Note


    All of the PSA and MSA tools out there are going to suck, unless you bend your
    business logic to conform to theirs. And even then they may suck. I am sorry to
    tell you that the selection process should assume a little bit of sucktitude.
    But building your own from scratch should be a business model where you sell your
    tool, if you indeed think you can do things better than everyone else (and want
    the chance to prove yourself right).


    # The App-Based Economy


    Rarely will a single software title automate an entire organization; you might
    have to string together multiple software packages in order to realize the full
    benefits of any given tool. And once you do, you’re bound to find that you want
    to automate more and more. The quote I used to use is “getting replaced with a
    small shell script means a promotion!”


    So what tools should you look at here (and maybe even come up with a service you
    can sell to your customers). A couple of solutions stand out above the rest:


    - `IFTTT` (short for If This Then That) is a consumer-focused tool that was built
    to allow for simple, human-readable automations. `IFTTT` can easily be used to
    link services like `Nest`, `Google Apps`, and other common cloud services. The
    great thing about `IFTTT` is that I see a lot of value in the ability for people
    to build their own automations. The problem with that is it can take you awhile
    to sort through overlapping and poorly built automations to find the ones that
    actually do what you want reliably. But it’s free, so there’s that.


    - `Workato` is a tool that can be used to link a number of more professional-level
    cloud services together. I strongly recommend you look at all of the supported
    workflows in `Workato` for all tools you use. You might see something that looks
    innocuous at first but turns out to spark an innovative if not revolutionary workflow
    that saves you time or ends up delighting your customers in ways you might not
    have ever thought of otherwise.


    - `Workflow` is so awesome that it was recently purchased by Apple. Similar in
    that it links various tools that have APIs, the only reason `Workflow` isn’t my
    go-to is that I have concerns about the longevity of their technology, given that
    Apple is famously not API-friendly in their approach to allowing access to their
    online services.


    And new tools are coming out every day. In a micro-services and API-first oriented
    world, the real value of many solutions is their interoperability. Most vendors
    want to be a framework and not focus on that interoperability, so the market of
    tools that glue other tools together is exploding. Some other solutions to consider
    include `Zapier`, `AutomationFuel`, `Conexio`, `Automate.ioo`, `Integromat`, `Flow
    XO Integrations`, `Microsoft Flow`, `OneSaas`, `Flashnode`, and `Built.io`.


    ### Note


    The automation available in the above tools is just a start. New things pop up
    in those tools every day. I recommend checking out the list routinely (maybe over
    your morning coffee once a month).


    In the previous chapter, we discussed Accounting software. Don’t forget about
    that. In the beginning, most organizations will use an App or a web app to bill
    customers manually. But don’t forget that while you can have an app to bill customers
    manually, the more billing you do, the more time-consuming doing so will become.
    That’s why there are a number of ways to integrate your billing with your task
    management, ticket management, and other workflows. Tools like `Freshbooks` and
    `Freshdesk` have then gone the extra mile to build `Freshservice`, so you can
    roll many of your tools into one really good tool.


    If you can simplify your business logic to match one of these more integrated
    solutions, you’re likely to pull your hair out less when trying to troubleshoot
    why all these house-of-cards style workflows don’t always work properly.'
