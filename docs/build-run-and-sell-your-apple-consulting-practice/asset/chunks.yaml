- fmt: '# Staying Sane


    Still, there are some tips that I can provide to help keep you sane. Some things
    to keep in mind as a sole proprietor:


    - It’s usually all about boutique service. There are a lot of really cheap options
    out there. And some of them are just as good as you. No offense. Same with me.
    But there’s a level of service you can provide that makes you worth every penny.
    Don’t skimp on providing those extra little things to customers that only boutique
    shops can.


    - Being a sole proprietor allows you to focus on relationships with key customers.
    Life is too short to work with crappy people. If you choose to grow, you’ll have
    to. But at this size, unless you plan on growing and replacing yourself with others
    at your customers’ customer, work with who you want to, not whoever calls.


    - Don’t compete on price. If you start a company and are jumping at every project,
    then trying to do so cheaper than anyone else will run you ragged. Most customers
    who select vendors based on price have a certain expectation of how they can treat
    those vendors. Again, life is too short for all that. I’m not saying not to explore
    every opportunity that comes to you, but think about this: would it be better
    to bill 2 hours at `$200` per hour or 8 hours at `$50` per hour?


    - Keep it simple. A lot of what we cover in this book is about scaling your operation—things
    to consider when you’re building a firm. And many of these systems work great
    for solo practitioners as well. But build systems to fit your size. You’ll definitely
    want tools that make it easy for you to track things. But as an example, you won’t
    need a tool like `Marketo` to message customers.


    - Practice the 80/20 rule. Twenty percent of your customers likely account for
    80 percent of your business. Make sure to feed those customers with as much TLC
    as you can. And don’t be afraid to let some of them go, even if they were hard
    to get.


    - Outsource or refer everything you can. The longer you can delay hiring for accounting,
    dispatch, etc., the easier your life will be. Before you start hiring for these
    tasks, ask if you can just have a part-time person come in and do it or hire a
    service.


    - Take care of yourself. I can remember when customers called at 4 AM and I jumped
    out of bed to go help them. Triple-time was nice, but if you find you do that
    a lot, you can increase those after-hour rates to try and reduce those kinds of
    calls.


    - Set a schedule. If you’re new to working for yourself, it’s easy to let your
    personal life eke into your professional life, or to let your professional life
    start to consume all the time, leaving no time for a personal life. Set a schedule
    to go to the gym before you start work, then be onsite for your first customer
    at 9 AM, or whatever works for you. And set aside time for family and friends.
    You know, so they don’t forget you exist.


    - Deal with billing disputes swiftly. If a customer goes past terms, then they’ve
    probably forgotten, are having financial challenges, or are disputing the work
    that was done. Whatever the case, if you let accounts receivable pile up, you
    won’t stay in business long. Get to the source of any delinquent accounts quickly,
    and understand that it’s often that the customer is too busy to dispute an invoice.


    - Take cash-on-delivery for as long as you can. This will keep your books streamlined.


    - Get tax help immediately. I’ve seen dozens of solo practitioners go out of business
    in their first year because they hadn’t planned on quarterly tax payments.


    - Sponsor the community. You know those calendars with ads for the local high
    school PTA group or entries in church newsletters? Sponsoring your local community
    is not only a great way to meet potential customers but a passive and easy way
    to get your brand in front of others.


    - Don’t grow beyond sole proprietorship unless you are committed to the endeavor.
    You might have the business to warrant expansion, but it’s not worth screwing
    over the people that choose to work for you if your heart is not in it.


    The first customers are always the hardest to recruit. These usually come from
    your circle of friends. And since you don’t yet fully know your value, you are
    likely to undercharge them. As you pick up more customers, you’ll end up increasing
    those rates, and that might cause some attrition. That’s fine, provided you’re
    still making enough to make the gig worthwhile.


    # Be Deliberate


    It’s never too early to be deliberate. Find your niche and actively seek out customers
    that help you win in that niche. Over the years, I have known consultants that
    specialized in Point-of-Sale (PoS) systems for Mac and iOS, and I’ll never be
    as good at doing what they do, so I refer business to them. The same is true for
    accounting systems, digital signage, and specific technologies. This also helps
    differentiate you to potential customers. If you want to play in those spaces,
    then you’ll have an easier time of recruiting customers that you can retain long-term.


    While you’re building your initial base, you’ll likely end up taking on customers
    that aren’t a part of your core. Maybe you are learning while you go or just doing
    a specific type of work so you can afford more ramen noodles next week. Whatever
    the case, it’s best to be transparent with the customers about what kind of relationship
    you have with them. The same is true in life.


    Think about what you want out of this. Is it to be flexible? To have a part-time
    job that puts you closer to retirement? To be in control of your own destiny?
    One of the great things about being a consultant is that you have instant gratification
    a lot of the time. But the tradeoffs are that you’re doing all the work and that
    work comes in fits and starts. The more you understand your own intention, the
    more you can adapt and use the slow times properly.'
