    we’ll look at some ways to disengage while still managing to keep the lights on
    and the people happy.'
  trans: '

    # 运用政治资本


    从经营自己的企业到为他人工作，这可能会充满挑战。当你拥有自己的企业时，你可以为团队规划路线。当你不拥有时，你就做不到。相反，你有时必须运用政治资本。例如，你帮某人一个忙。因为这样他们就欠了你人情。事情就是这样，对吧？不。


    你帮某人的忙，因为这是正确的事。你不应期待任何回报。这叫做做个正派人。也许你会得到回报；也许不会。但最终总会有好结果。我看到很多人试图操纵局面以获得特定结果。别这么做。


    如今我努力不去操纵任何人。但我曾经做过。最终，当人们意识到你在操纵他们时，他们将永远不会再信任你。这很糟糕。但这并非避免此类行为的唯一原因。避免它，是因为这本身就是完全错误的。如果你无法用真相赢得人心和思想，那就别费劲了。


    突然之间，似乎政治资本这种东西可能并不存在。但它确实存在。它叫做因果报应。而且你没必要去想它。相反，只需做个好人。践行诚实。品德高尚。帮助他人。避免评判他人。帮助那些不如你幸运的人。那么，你就不需要运用那种政治资本了，因为你的行为会指引你，你将以你注定该有的方式获得成功。


    这并不意味着你不该有主见。也不意味着你应该试图说服他人，你的观点是对特定情况的正确看法。这也不意味着你应该软弱。你可以坚强，并持有在某个组织中并非人人认同的观点。而且，你可以通过不必永远正确（即使你并不正确时）来获取政治资本。


    如果你是一个决策者，你可以扮演守门人的角色，确保你所在的组织部分为整个组织的使命做出贡献。当他人向你提出请求时，做正确的事——不仅仅是为了你的预算或团队，而是为了整个组织的使命。当你需要他人帮助时，相信他们也会这样做——最好不要设定他们需要回报你的期望。你或许能与他人建立信任；但双方都不应带着期望回报的心态离开，除非在给予帮助时就协商好了。但那样的话，它就不是一个帮助了，对吧？


    但人非圣贤。因此权力斗争时有发生。远离太多的权力斗争。谨记父母教导我们的那些古老格言，比如“走正道，行高义”。


    最终，我们已将政治资本定义为信任，而不是你能为他人做什么。信任建立在价值之上，无法急于求成。你帮助自己所在组织部分（长期来看，是所有部分）的能力，随后便建立在你和你的团队所能构建的政治资本之上，而这需要时间、成功和耐心。记住这一点，并避免那些我们在幼儿园就被教导要避免的错误，我想你会做得很好！


    ## 结论


    你把公司的控制权交给了别人。不要总是事后批评他们，说诸如“换了我，我不会这么干”之类的话。这对任何人都没有好处。这并不意味着你需要不真诚，对新所有者的所有说法都一味附和。相反，要给予信任，私下里表达关切，以便给新所有者最大的成功机会。


    我曾听过一个很棒的类比：“老市长不应该总是对新手市长指手画脚。” 这是智者之言。变革的发生是有原因的；尊重界限，但要尽量提供帮助——即使你并不总是认同新的观点。


    最终，你是拥有选择的！你可能最终选择不出售公司，而是走一条完全不同的道路。或者你可能会选择保留公司，转为兼职所有者，我们将在下一章讨论这点。无论你做什么，都举办个派对吧。


    ## 延伸阅读


    *   《出售你的软件公司：实现战略价值的内行指南》，大卫·考皮，[`www.amazon.com/Selling-Your-Software-Company-Achieving-ebook/dp/B01M59QA02`](https://www.amazon.com/Selling-Your-Software-Company-Achieving-ebook/dp/B01M59QA02)

    *   《收购与出售公司时的昂贵错误》，理查德·G·斯蒂格利茨博士，斯图尔特·H·索金法学博士、注册会计师，[`www.amazon.com/Expensive-Mistakes-Buying-Selling-Companies/dp/0982050062`](https://www.amazon.com/Expensive-Mistakes-Buying-Selling-Companies/dp/0982050062)

    *   《完美谢幕：伟大企业家如何巅峰退出》，博·伯林汉，[`www.amazon.com/Finish-Big-Great-Entrepreneurs-Companies/dp/1591844975`](https://www.amazon.com/Finish-Big-Great-Entrepreneurs-Companies/dp/1591844975)

    *   《卓越的股息》，汤姆·彼得斯，[`www.amazon.com/Excellence-Dividend-Meeting-Tech-Tide/dp/0525434623`](https://www.amazon.com/Excellence-Dividend-Meeting-Tech-Tide/dp/0525434623)

    *   《只为寻乐：一个偶然革命者的故事》，林纳斯·托瓦兹与大卫·戴蒙德，[`www.amazon.com/Just-Fun-Story-Accidental-Revolutionary/dp/0066620732`](https://www.amazon.com/Just-Fun-Story-Accidental-Revolutionary/dp/0066620732)


    # 14. 兼职所有者


    也许你创办了第二家公司。也许有别人在经营你的生意。也许你能够达到不再需要工作的状态。也许你想早上锻炼两个小时，中午享用一顿丰盛的午餐，溜达到办公室待上两个小时，然后和朋友一起出去玩。或者也许你有另一份工作，只需要这家公司不费力地顺带运营就行。


    无论你处于何种状态，你为此付出了辛勤努力，你不应该感到内疚。因此，只要你的业务状况良好（这里“良好”是主观的），你不必害怕花点时间去探索其他冒险。当然，前提是任何依赖你的人都得到了妥善照顾。在本章中，我们将探讨一些抽身而退，同时仍能维持运营并让大家满意的方法。

    '
- fmt: '# A Part-Time Job


    If you haven’t grown beyond what one person can do, then doing consulting isn’t
    a part-time company to run, it’s a side job. You are moonlighting, participating
    in the gig economy, and can run the business that way. Especially if that’s what
    you want out of this thing. And there’s absolutely nothing wrong with that. This
    is your business and you should give yourself permission to run it any way you
    want.


    If you have aspirations of growing to a point where you can move into consulting
    full-time, then you should build a plan to do so. But if you’re perfectly happy
    having a side job, then by all means there’s no reason to go any further.


    This means you should keep it simple. Don’t engage in hiring employees, don’t
    make long-term contractual obligations, and, most importantly, have fun with it.
    You can always decide to grow the company later. And if an opportunity to pick
    up that one big customer that makes the company an instant success comes along,
    you can re-evaluate where you are in life and whether you want to make a go of
    being a full-time consultant.


    I’ve found a number of jobs mesh well with consulting. I know few software developers
    that don’t also write apps or web sites on the side for customers. I know none
    who don’t occasionally hate it when they have a deadline that causes them to work
    crazy hours because they have a day job. I know teachers who love consulting after-hours.
    Even though they’re not really supposed to, I know plenty of people who work at
    an Apple Retail Store and then work with the occasional person at their home or
    small office. In short, these are traditional moonlighting gigs.


    I also know people that have a few different part-time jobs going at once. There
    are Uber and Lyft drivers who help people with their Macs, lawyers who write software
    while bootstrapping startups, actors and musicians who show people how to use
    Garage Band on the side (which they learned in their 3^(rd) job, podcasting),
    people who care for children a couple of days a week and write little apps for
    customers (which they learned to do to track the swimming lessons they give at
    the YMCA). Sites like Craigslist and oDesk have opened up a lot of possibilities,
    and a lot of these people like the flexibility of taking time off whenever they
    want.


    There are some things to be careful of, though. Don’t overburden yourself. It’s
    easy to take on too much work and get burnt out on doing several jobs at once.
    When you do, it’s easy to let quality slip on each of the jobs and burn bridges.
    It also violates the golden rule that you should always be having fun.


    One thing that can help with overcommitting is to keep within your skillset. Estimating
    tasks is easy when you know how to do them. For the things you don’t know how
    to do, get some referral partners. These are people with skillsets that are complimentary
    to yours but not necessarily overlapping. For example, if you’re asked to edit
    a home movie but don’t know Final Cut or iMovie, then have someone in your phone
    to whom you can pass that type of work. You should be stretching your skills to
    keep from a monotonous existence but doing so in a deliberate way when possible.


    # Set an Expectation


    Will you come in on Tuesdays and Thursdays or work half days? How can the customers
    or your team reach you when you’re doing other things? Especially in the beginning,
    it’s important to impose a communication plan and set an expectation of what customers
    and employees can expect.


    Another good way to keep from overcommitting is to have certain hours where you
    work with each type of business. For example, spend Tuesdays and Thursdays with
    your Apple customers and the other days of the week with your other businesses.
    Or write code for customers from 8 PM to 10 PM each evening. This way you can
    easily communicate what they can expect and when.


    When you take on projects, communicate when a customer should expect any necessary
    deliverables. Hourly consulting is easy, as you usually show up, do some stuff,
    and leave. If you’re working on projects for customers from home or coffee shops,
    make sure to communicate early and often when deliverables will be delayed.


    # Put Someone in Charge


    Some day you might end up with too much work. You might end up with other companies
    you want to start. That’s when it’s time to let someone else run parts of (if
    not all of) the company. This is delicate, as in many cases, the company has been
    your baby for a long time. But if you do it right, you’ll have a much better experience
    than if you try to micromanage everything because you feel guilty for not being
    there.


    ## Find Someone to Run the Company


    You’ve decided to put your baby in someone else’s hands. How do you find the right
    person? This is probably the single hardest thing you can do. Harder than the
    first person you hired, even. We often look for someone just like us. But that’s
    likely not going to happen; after all, if they were just like you, they’d be staunch
    competition. But think of who you might want to put in charge. And interview a
    few of the following types of candidates:


    *   **An internal candidate**: Probably the most likely, and often the best choice
    if you’ve had someone involved in your company for a long time who is intimately
    aware of every facet of the organization. Usually, internal candidates have been
    watching you for a long time and understand why you have made the decisions you’ve
    made up to this point. These are great candidates for maintaining the status quo.
    But one thing you really want to hear from them is that they want to grow professionally
    in the ways that you need them to grow to lead the company, usually when it comes
    to business acumen.


    *   **A business guru**: Usually someone coming from an operational role at a
    larger company, business gurus will often focus on efficiency—getting more out
    of staff. If you are looking at someone like this, make sure they think of how
    the staff will feel, what customers will think of a focus on margin, etc. And
    make sure they still look to sales, not just expanding business within existing
    accounts.


    *   **A sales guru**: Most people that come from a sales background are most concerned
    about making it rain, whatever the consequence. The great thing here is that as
    owner-operators, many engineers don’t have backgrounds in sales. The problem can
    be that someone who is hyper-focused on sales will frequently not concern themselves
    with margin. This can leave your company operating in the red, even while billing
    way more than ever before. When you’re putting someone from sales in charge of
    running the company, make sure to teach them the intricate areas that negatively
    impact margin, and be clear about the margin you expect the company to run at.


    *   **A subject matter expert**: This might be another consultant, someone from
    a larger company, or an expert in the field. The subject matter expert might need
    to learn about marketing, public relations, human resources, etc. They will instantly
    have credibility with the staff and be capable of taking the reins on a technical
    level; however, I strongly recommend having two meetings a week with them to provide
    the business and sales guidance that is necessary to run a company.'
