    # 16. Running a Consulting Practice Inside a Larger Company


    Many companies have services departments. In the Apple space, these are primarily
    software vendors. Some hardware providers do so as well, such as large tape library
    manufacturers. Most companies that sell hardware and software that appeals to
    the enterprise will have products that their customers need to bring on services
    for. Some smaller software vendors will have services teams as well.


    Some of the reasons customers might want to purchase services from a hardware
    or software company include the following:


    - Services are required. This is often the case when a lot of customization is
    required.

    - The customer doesn''t have time to implement the hardware or software.

    - The customer needs training to get up-to-speed on implementing the hardware,
    software, or updates.

    - Customers need to bring on services for part of a project and would prefer to
    keep them on a single Purchase Order.


    The reason I mention these is that you can build packages or bundles around meeting
    these customer needs. But first, let''s look at what the company you work for
    wants you to be doing (which can often be quite different from what the customers
    want you to be doing).


    ## What Does the Company Want You Doing?


    Many of us will take the approach that we want to sell services and grow a services
    business. Then we can hire more people and help more customers. But is that what
    our company actually wants us to be doing? Sure, money is money. But many companies
    will look for you to drive sales of the core product more than sales of services.
    Kinda''.


    This is hard balance, and the most important part of finding that balance is to
    actually talk (yes, use your human words) to your boss and their boss. I''ll tell
    you up front, most smaller organizations will say something like "go make all
    the monies," but larger organizations might come back with talk of things like
    building ecosystems of vendors. The important thing is to find the right mix of
    growth, margin, and community enablement. And for everyone to be on the same page.


    ### Getting the Right Mix


    As I said earlier, someone is eventually going to ask about margin and profit.
    And if you don''t have a good story to tell (and in writing) then you''re probably
    going to be looking for a new job. So what is the right mix?


    The remainder of this chapter will focus on unpacking some of this, but before
    you start pushing an agenda and possibly are doing the opposite of what''s being
    asked of you, consider the following (which you should review with your management):


    - What profit margin is needed from the services organization?

    - How many services are going to be given away for free in order to drive software
    and hardware sales?

    - Will free services be credited back to the services team in the form of a charge
    back?

    - How should sales enablement for services be handled?

    - Should you plan on staff augmentation as part of your services packages?

    - Will the services team be involved in getting the community (resellers, consultants,
    MSPs, integrators, etc.) enabled to deliver services, or will the two be competitors?


    ### Note


    These aren''t that many questions and even a CEO will be happy to answer them,
    given the potential impact to profits. These should be reviewed with your manager
    quarterly and probably up a tier annually as well, given that your manager might
    not always be in lock-step with their manager or any time there''s turnover in
    the management chain above you.


    Once you understand the margin goal and sales goal, set a rate. I would approach
    pricing the same that we''ve done in previous chapters. After all, a business
    is a business. The difference here is that you''d set aside whatever time has
    been allocated for free services. A warning though: don''t get too synthetic with
    the numbers. If you''re supposed to make 15 percent or 40 percent margin, that''s
    your key metric. And when you know how much you need to make, you can build bundles
    and prepare your services to be sold.'
