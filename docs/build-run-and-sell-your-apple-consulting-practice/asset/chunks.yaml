  trans: '

    # 制定清单


    寻找可能与你理念一致的组织。这些可能是你之前合作过的公司，或者是你在本地的竞争对手。列出一份你能想象与之共事的公司名单，并思考它们能为你带来什么。也许你是一名独立从业者，想用积攒的储蓄收购一家更大的公司。也许你是那家大型公司，想收购这位独立从业者。


    我并非总是建议人们列清单。有些人喜欢列清单，有些人不喜欢。但这一次，你真的应该列一份清单。有了清单后，把它导入谷歌表格或 Excel 中，并添加一些列。现在，我们来思考一下，一次收购能为你带来哪些特质。


    # 你实际上想收购（或整合）什么？


    大多数公司收购另一家公司时，通常是为了获得某些特定资源。当咨询公司收购其他咨询公司时，重点通常是现有客户、人才、技术、品牌形象和/或供应商合同（根据我的经验，顺序大致如此）。我们来逐一分析。


    *   **客户**的价值取决于合同。为什么这么说？因为在过渡期间，客户可能会随离职员工流失（包括通过收购加入的员工）。与其仅仅为了客户而收购一家公司，不如考虑雇佣更多销售人员、竞争对手的员工，或者直接积极争取他们的客户。


    *   **人才**：苹果平台的人才比其他平台更难寻找。苹果咨询专业知识是一个不断增长的市场，但组建团队或找到优秀员工可能是一项挑战。你可以尝试从现有公司挖角、从新客户那里获取人才、培训新员工，或者从招聘和猎头网站招人——但能够聘用到两到三名或更多能立即投入工作的工程师（尤其在交易中你也获得了客户的情况下）的价值是无法衡量的，因为他们既能用于培训新员工，又能为客户（可能随交易一并获得）提供无缝过渡。


    *   **技术**通常易于以某种方式复现，除非它已获得专利，或者你尚未完全理解其业务逻辑。然而，对于新项目而言，上市时机至关重要。如果竞争对手能够立即交付你才刚开始构思的东西，那么就要考虑上市成本以及因落后于市场而造成的业务损失。这可能包括面向客户的技术（例如，与客户服务交叉销售的产品，以及已实施的票务系统、客户自动化工具、集成方案、中间件等）。


    *   **品牌形象**一直是我难以处理的问题。先发并不代表最好。你通常会多次将不同品牌融合在一起。你也可以推出新产品或服务，并通过媒体造势宣传其新颖性，从而独立建立起一个具有竞争力的品牌形象。但如果市场上已有某种技术或服务，那么合并品牌或将其纳入旗下就相对容易。我在这方面的担忧是，我经常看到人们执着于拥有品牌，而非致力于提供价值。我最喜爱的咨询收购案例之一是
    Geek Squad，它被收购的主要原因就是拥有良好的品牌形象。无论你对百思买门店的人才水平或其品牌有何看法，既然我们和百思买的收入都无法与之相比，他们能将这个品牌扩展到所有门店并从过去被视为专属保修更换部门的区域中获利，这本身就值得赞赏。


    *   **供应商合同**可能需要很长时间才能处理完毕。像思科、苹果、微软等大型电脑公司可能要求认证（包括员工资质以及公司或所在地资质）。同时，你需要与供应商保持业务往来或建立稳固关系，才能获得良好的采购信贷额度（别忘了，硬件和软件通常需要先付款，然后在
    30 到 90 天内收回款项）。但比获取合同更重要的是，获得熟悉这些系统运作、懂得解锁各种 SPIF（销售绩效激励基金）并在那些公司有人脉的优秀人才。当然，你也可以自己摸索，但在这个过程中，你可能损失的价值会远超一次整合或收购的成本。


    在运作一次成功的收购或整合时，你希望尽可能地兼顾以上各个方面。每一项都有其价值。别忘了，要尽可能多地吸纳你能获得的一切。所以，不要只是要求新人遵循你的做事方式，而要用心倾听他们的意见，接受任何合理的流程变更，或暂时搁置你尚未准备好处理的问题。


    # 接触收购目标


    许多关系的基调都取决于它的开端。我想，有些事归根结底是第一印象。也许你已经认识目标公司的负责人。或者你希望第一次与他们见面。无论如何，向某人提出收购其公司是一个微妙的过程。


    想象一下，如果有人想收购你的公司。你大概不会去参加欢乐时光，多喝几杯，然后第二天早上醒来就发现公司已经签字易主了。我听过一些故事，其中涉及雇佣私家侦探跟踪目标人物、未经同意进行背景调查，甚至翻别人家里的垃圾。话说回来，我也听说过一些大公司为了招聘人才（或雇佣猎头来做这件事）至少做过上述两件事。


    所以，我们别走那么远。假设你只是做一点尽职调查（不涉及侵犯隐私），然后寻找你们共同的人脉。到目前为止，“暖介绍”始终是最好的方式。我不会寻求通过领英或电子邮件介绍（虽然在这个世界上你只能有什么用什么）。我更倾向于亲自介绍——就吃顿午饭，就像婚恋服务说的那样。这让你有机会面对面见到对方。你不必说想收购他们的公司。相反，你可以说只是想见见这位久仰大名的人！


    一旦你们见了面，如果你觉得可以开始讨论收购或合并事宜，那么我倾向于透明、直接且尽早沟通。“我们两家公司合为一体，也许能更好地服务客户。你认为我们怎样才能实现这一点？”要直接，但不要咄咄逼人。毕竟，你并没有雇人去翻这个人的垃圾，对吧？

    '
- fmt: "# The Finer Points of Acquisitions\n\nThe criteria for any acquisition absolutely\
    \ begins with the P&L. If there’s profit, then why would someone want to sell?\
    \ If there’s no profit and no plan to profit, then why would someone want to buy?\
    \ But if you have a plan to find more revenue or cut costs by combining operations\
    \ to become more efficient, then that obviously makes an acquisition more attractive,\
    \ provided there aren’t too many hurdles (which can crush you if you aren’t careful).\n\
    \nSome questions that might limit liabilities:\n\n*   Can you get out of contracts\
    \ for overlapping services? ISPs, leases for office space, the costs of `RMM/MSA/CRM`\
    \ solutions, licensing for cloud services, E&O insurance, retainers for lawyers,\
    \ etc.\n*   Can you liquidate unnecessary assets? The most substantial of these\
    \ is property. If both companies have real estate holdings then it’s likely that\
    \ both are unnecessary (if they’re within a short distance of one another). I’ve\
    \ never seen real estate come as part of a deal in a rollup, but it would be an\
    \ asset that might come with a purchase.\n*   Are there overlapping teams to do\
    \ the same things? No one ever wants to think about letting staff go. Throughout\
    \ this book, I’ve been a proponent of repositioning staff where needed. When it\
    \ comes to core services you can likely use one operations team rather than two,\
    \ which might give you the ability to repurpose someone into a net-new role that\
    \ provides more value to your customers.\n*   Overlapping customer-facing talent\
    \ is a great problem to have! If you end up in this scenario, then either bring\
    \ on more sales personnel faster, or if you’re a smaller shop, then grab your\
    \ sales bag and hit the pavement, because those are the moments that you want\
    \ to seize.\n\nWe had previously discussed what you want out of an acquisition\
    \ or rollup. This section hopefully allows you to polish your business plan by\
    \ finding a more efficient single organization than two separate organizations\
    \ operating independently. The faster you can achieve operational efficiency,\
    \ the more quickly your teams can learn to work together. Don’t be afraid of delegating\
    \ as much of the operations as you can so you can get in front of customers to\
    \ maximize your chances to retain them and to understand their needs.\n\n## Company\
    \ Culture\n\nCulture is one of the most underrated aspects of running an organization.\
    \ Having a great culture is at the heart of what motivates the best people to\
    \ want to work for you. Lasting culture is founded on strong values that unite\
    \ and inspire. An acquisition represents a single event that could destroy your\
    \ culture if not done properly. So you have some difficult questions you’re going\
    \ to want to ask first.\n\nCan you work with these people? We didn’t really address\
    \ this question when we covered selling your company, although through the book\
    \ we have touched on culture. But you don’t want a combative situation being set\
    \ up inside the company you’re acquiring. If you hired your team, then you know\
    \ you can work with them and I sincerely hope you enjoy doing so. But you didn’t\
    \ hire these people. Ask the seller about the people.\n\nAre the clients a good\
    \ cultural fit? We frequently bring on similarly sized and/or minded customers.\
    \ That’s one reason why you might be looking to purchase another organization,\
    \ to expand out of the beachhead you’re in. But if your staff can’t work with\
    \ the new customers, then you might have to make different plans. And it’s best\
    \ to know that before you’ve passed the threshold from which you can’t return\
    \ (signed on the dotted line).\n\nI don’t think there’s a silver bullet here.\
    \ Talk to the employees and be transparent. You’ll figure it out.\n\n## Merging\
    \ Operations\n\nBased on the size of the organizations being merged, the new organization\
    \ will likely not need people or vendors in certain roles. The most obvious, among\
    \ smaller Apple consultancies that merge, is likely accounting. If the new entity\
    \ needs double the capacity for accounting then you’ll be happy to have the added\
    \ resources. But if not, you will have some hard choices to make. We discussed\
    \ some operational aspects you need to decide on before you acquire an organization.\n\
    \n*   Systems\n    *   Accounting systems\n    *   `RMM`, `MSA`, and ticketing\
    \ systems\n    *   Customer Relationship Management (`CRM`)\n    *   Patch and\
    \ server management systems\n    *   Managed service components, including backup,\
    \ cloud services, messaging, and groupware services, etc.\n    *   Contract management\
    \ systems\n    *   File services\n    *   Messaging, groupware, and internal productivity\
    \ systems\n*   Services\n    *   Outside accounting services\n    *   Tax services\n\
    \    *   Legal services\n    *   Custodial and facilities services\n    *   Financial\
    \ and real estate services\n    *   Human resources and outsourced `HRIS` systems\n\
    \    *   `401k` and profit-sharing services\n\nThe most important thing to keep\
    \ in mind with all of these is to pick the best solution. At first, you might\
    \ think that the tools you were using are all the best. However, if you ask to\
    \ be taken through how they’re used by the old team, then you may find that you\
    \ like the business processes and the technology that drives them better than\
    \ your own. And when the new team sees you embracing what is best, they are more\
    \ likely to trust you concerning what is best for them as well.\n\n## The Numbers\n\
    \nMany business owners are going to find this the really crappy part. You find\
    \ these great companies, you meet the employees, you merge operations, but in\
    \ the process of building out a final product, you run into a problem with comp\
    \ packages. Maybe the employees who come to you as a part of the acquisition have\
    \ salaries that are too high compared to your existing team. Maybe it’s the opposite\
    \ problem.\n\nSalaries should fit in a similar range, per position. If you haven’t\
    \ yet created position contracts and done salary leveling, then I would recommend\
    \ doing so at this time. While you don’t want to make drastic changes in comp,\
    \ you want to be ahead of this before the merging of entities. If you are inheriting\
    \ staff that is paid less than yours, then I recommend providing some kind of\
    \ profit sharing or goals to get teams up to speed."
  raw: "## The Finer Points of Acquisitions\n\nThe criteria for any acquisition absolutely\
    \ begins with the P&L. If there’s profit, then why would someone want to sell?\
    \ If there’s no profit and no plan to profit, then why would someone want to buy?\
    \ But if you have a plan to find more revenue or cut costs by combining operations\
    \ to become more efficient, then that obviously makes an acquisition more attractive,\
    \ provided there aren’t too many hurdles (which can crush you if you aren’t careful).\n\
    \nSome questions that might limit liabilities:\n\n*   Can you get out of contracts\
    \ for overlapping services? ISPs, leases for office space, the costs of RMM/MSA/CRM\
    \ solutions, licensing for cloud services, E&O insurance, retainers for lawyers,\
    \ etc.\n\n*   Can you liquidate unnecessary assets? The most substantial of these\
    \ is property. If both companies have real estate holdings then it’s likely that\
    \ both are unnecessary (if they’re within a short distance of one another). I’ve\
    \ never seen real estate come as part of a deal in a rollup, but it would be an\
    \ asset that might come with a purchase.\n\n*   Are there overlapping teams to\
    \ do the same things? No one ever wants to think about letting staff go. Throughout\
    \ this book, I’ve been a proponent of repositioning staff where needed. When it\
    \ comes to core services you can likely use one operations team rather than two,\
    \ which might give you the ability to repurpose someone into a net-new role that\
    \ provides more value to your customers.\n\n*   Overlapping customer-facing talent\
    \ is a great problem to have! If you end up in this scenario, then either bring\
    \ on more sales personnel faster, or if you’re a smaller shop, then grab your\
    \ sales bag and hit the pavement, because those are the moments that you want\
    \ to seize.\n\nWe had previously discussed what you want out of an acquisition\
    \ or rollup. This section hopefully allows you to polish your business plan by\
    \ finding a more efficient single organization than two separate organizations\
    \ operating independently. The faster you can achieve operational efficiency,\
    \ the more quickly your teams can learn to work together. Don’t be afraid of delegating\
    \ as much of the operations as you can so you can get in front of customers to\
    \ maximize your chances to retain them and to understand their needs.\n\n## Company\
    \ Culture\n\nCulture is one of the most underrated aspects of running an organization.\
    \ Having a great culture is at the heart of what motivates the best people to\
    \ want to work for you. Lasting culture is founded on strong values that unite\
    \ and inspire. An acquisition represents a single event that could destroy your\
    \ culture if not done properly. So you have some difficult questions you’re going\
    \ to want to ask first.\n\nCan you work with these people? We didn’t really address\
    \ this question when we covered selling your company, although through the book\
    \ we have touched on culture. But you don’t want a combative situation being set\
    \ up inside the company you’re acquiring. If you hired your team, then you know\
    \ you can work with them and I sincerely hope you enjoy doing so. But you didn’t\
    \ hire these people. Ask the seller about the people.\n\nAre the clients a good\
    \ cultural fit ? We frequently bring on similarly sized and/or minded customers.\
    \ That’s one reason why you might be looking to purchase another organization,\
    \ to expand out of the beachhead you’re in. But if your staff can’t work with\
    \ the new customers, then you might have to make different plans. And it’s best\
    \ to know that before you’ve passed the threshold from which you can’t return\
    \ (signed on the dotted line).\n\nI don’t think there’s a silver bullet here.\
    \ Talk to the employees and be transparent. You’ll figure it out.\n\n## Merging\
    \ Operations\n\nBased on the size of the organizations being merged, the new organization\
    \ will likely not need people or vendors in certain roles. The most obvious, among\
    \ smaller Apple consultancies that merge, is likely accounting. If the new entity\
    \ needs double the capacity for accounting then you’ll be happy to have the added\
    \ resources. But if not, you will have some hard choices to make. We discussed\
    \ some operational aspects you need to decide on before you acquire an organization.\n\
    \n*   Systems\n    *   Accounting systems\n\n    *   RMM, MSA, and ticketing systems\n\
    \n    *   Customer Relationship Management (CRM)\n\n    *   Patch and server management\
    \ systems\n\n    *   Managed service components, including backup, cloud services,\
    \ messaging, and groupware services, etc.\n\n    *   Contract management systems\n\
    \n    *   File services\n\n    *   Messaging, groupware, and internal productivity\
    \ systems\n\n*   Services\n    *   Outside accounting services\n\n    *   Tax\
    \ services\n\n    *   Legal services\n\n    *   Custodial and facilities services\n\
    \n    *   Financial and real estate services\n\n    *   Human resources and outsourced\
