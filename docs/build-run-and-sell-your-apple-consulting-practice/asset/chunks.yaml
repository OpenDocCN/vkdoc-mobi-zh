    Cinemagraphs, and being on that trend can bring in a little extra boost to get
    your organization in front of companies who might be looking to purchase services
    similar to yours. At the very least, they’ll give your staff pride when done right.


    8.  Claim your address with Google. If you have a retail front, or people might
    find your business based on your physical location, then make sure it’s correct
    across all the networks, including Yahoo, Google, etc.


    9.  Solicit feedback on networks like Yelp. We all want to think our businesses
    are perfect. So make sure you have a thick skin since you can’t please all the
    people all the time. But for most, it’s pretty helpful to have some good feedback
    for people to read. More important, those stars. Give people a good experience
    and they’ll give you great reviews.


    10.  Analyze the results. Get software that allows you to aggregate and possibly
    analyze the responses you get from your efforts on these networks. If you don’t,
    then you’re left with guessing about what’s working and what isn’t, which is likely
    to lead you to an analysis aligned with what you want to think rather than reality.


    You can also buy advertising on these networks, which can be a great way to bolster
    other activities. But even more impactful, once you start to get followers on
    these networks, is to provide a clear and concise CTA for each thing you do, as
    well as a larger, overarching social strategy that fits with your customer base.
    Just make sure to be your authentic self, and again, be OK with any negative feedback
    that comes back through the social channels, as negative responses will be unavoidable.


    ### Public Service Announcement


    I have a pet peeve about brands who automatically publish content from sites like
    ow.ly. I immediately stop following them and will often also simply stop consuming
    what they sell.'
  trans: '

    # 电子邮件营销策略


    设置行动号召（`CTA`）。如果在报税季发送一封关于准备报税事宜的邮件，请加一个带有`CTA`的按钮。实现这一点的好方法是协调一篇博客文章，并设置一个“阅读更多”按钮——然后在该文章中再放入一个`CTA`。你能吸引潜在客户注意的时间越长，他们转化为客户的可能性就越大。你能留住客户注意的时间越长，他们与你保持合作的时间就可能越久。


    注意用户取消订阅的原因。这很简单：停止做那些导致他们取消订阅的事情。


    你在客户心中占据的注意力份额非常有限。不要浪费它。要提供帮助，不要过于推销。可以时不时加入一张可爱的图片，并持续关注这些指标。如果人们点击了，说明你做对了。如果他们没有点击，那你就是做错了！


    ## 发送节奏


    我无法在这本书里详细介绍你该发送的每封邮件的内容，时间确实不够。而且如果我真的写了，就会有太多公司使用相同陈旧的素材。内容应该时常更新。不过，我可以帮你激发一些灵感。


    以下内容可能不适用于你的具体情况，但应该能帮助你想到一些点子。


    - 第 1 个月：备份电脑的 10 个技巧

    - 第 2 个月：安全工作

    - 第 3 个月：面向初学者的 CRM

    - 第 4 个月：新款 MacBook（总有一款在研发中）

    - 第 5 个月：酷炫的新款家庭自动化工具

    - 第 6 个月：始终在线 VPN 的优势

    - 第 7 个月：今年 WWDC（苹果全球开发者大会）的收获

    - 第 8 个月：为你的组织选择最佳路由器

    - 第 9 个月：使用代理服务器提升网络速度

    - 第 10 个月：制作更优秀演示文稿的技巧

    - 第 11 个月：在 Mac 上提高效率的 5 种方法

    - 第 12 个月：IT 资产与利用年底采购进行报税准备


    在这种节奏下，我们小心避免变得乏味。时不时加入一些销售内容很重要，比如“面向初学者的 CRM”。但其他时候，则完全侧重于纯粹的生产力提升，比如“在 Mac
    上提高效率的 5 种方法”。有些邮件具有时效性，例如年底关于报税的邮件。最后，节奏中的某些邮件应专门针对思想领导力来设计。


    你的邮件、博客内容和社交媒体内容都可以协调配合，形成连贯的流程。使用`Wordpress`作为博客引擎可以自动发布到`Twitter`。而同样的内容也可以在邮件中进行总结。下一节我们将深入探讨社交媒体，所以请思考如何将这些工具整合使用。


    ## 社交媒体


    整个社交媒体领域并非只有千禧一代才关心。你可以无需侄儿或一位傲慢的时髦顾问的帮助，就能建立、拥有并运营自己的网络形象。十多年来，你一直听到需要“社交策略”，或者总有人问你在“社交”方面做了什么。社交媒体真的能增加销售额吗？能。对于公司不同目标，哪些社交媒体渠道效果最好？这取决于具体目标，而首要目标应该是为你的销售漏斗顶部添加内容。


    让我们看看真实组织如何利用社交媒体来促进销售的一些例子。


    1.  为你的组织名称获取所有社交平台的账号。尝试在`Instagram`、`Pinterest`、`Facebook`、`LinkedIn`、`Twitter`和`Google+`等社交网络上使用相同的名称。

    2.  在`Instagram`上举办照片提交比赛。提供一个话题标签，让人们使用该标签参与评选，比赛结束后公布获胜者。这种推广方式有助于扩大你的销售漏斗，让更多用户看到你的品牌。

    3.  在`LinkedIn`上创建一个群组。`LinkedIn`群组专为有共同兴趣的专业人士交流而设。这是寻找潜在客户的好方法，只是不要发太多垃圾信息。

    4.  利用地理位置吸引业务上门。在`Twitter`、`Swarm`和`Facebook`上发布一个临时地点信息，用于获取免费奖品或参与抽奖。此外，考虑为你在`Swarm`上的场所“镇长”提供一项特别优惠，作为鼓励重复消费的额外奖励。

    5.  使用小众网络向微市场传递信息。如果你是啤酒公司，可以在`Untappd`上制作一个专属徽章。好吧，读到这里来自啤酒公司的人可能不多，但关键是思考你所处的特定行业。有没有针对你行业的社交网络？你能在那里做些酷炫有趣的事情来推广你的品牌吗？如果没有这样的网络，是否应该创建一个？

    6.  引导用户访问你的网站。发布你的博客文章推文，添加话题标签，并追踪哪些话题标签真正将用户引向你的网站。是的，这意味着你需要一个博客。不，不要在公司的账号上发布关于即将到来的选举的任何推文。

    7.  紧跟潮流。Vine 已经消失了。但出现了更新的潮流，比如动图照片（Cinemagraphs），跟上这股潮流可以为你的组织带来额外助力，让你出现在可能正在寻找类似服务的公司面前。至少，如果做得好，会让你的员工倍感自豪。

    8.  在`Google`上认领你的地址。如果你有零售店面，或者人们可能根据你的实际位置找到你的业务，那么请确保在所有网络平台上（包括`Yahoo`、`Google`等）的信息都是准确无误的。

    9.  在`Yelp`等网络上征求反馈。我们都希望认为自己的业务是完美的。所以要确保脸皮够厚，因为你不可能让所有人一直满意。但对于大多数人来说，有一些好的反馈供人们阅读是非常有帮助的。更重要的是，那些星级评价。给人们良好的体验，他们就会给你很好的评价。

    10. 分析结果。使用能够汇总并可能分析你在这些网络平台上努力所获反馈的软件。如果不这样做，你就只能猜测哪些有效、哪些无效，这很可能让你得到一个符合自己主观臆想而非现实情况的分析结论。


    你也可以在这些网络上购买广告，这可以很好地加强其他活动。但更具影响力的是，一旦你开始在这些平台上获得关注者，就需要为你所做的每一件事提供一个清晰简洁的`CTA`，以及一个与你的客户群相契合的、更宏大、更全面的社交策略。只要确保做真实的自己，并且再次强调，要能坦然接受通过社交渠道返回的任何负面反馈，因为负面回应是不可避免的。


    ### 公共服务公告


    我非常反感那些自动从`ow.ly`等网站发布内容的品牌。我会立即停止关注他们，并且通常也会停止消费他们所销售的产品。

