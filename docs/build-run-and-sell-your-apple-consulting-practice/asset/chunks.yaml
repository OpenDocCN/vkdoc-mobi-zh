    # 激励员工学习


    有一番对话我曾反复经历。对方总会先向我表示，他们想要更多培训。由于教育是我最看重的事物之一，只要条件允许，我的回应总是斩钉截铁的"当然可以"。但接下来几乎总会发生一件有趣的事：毫无动静。除非你定期跟进、有时甚至要微观管理整个过程，否则批准员工参加培训通常不代表他们真的会去做。


    另一种常见的结果是，团队成员逐渐对工作产生越来越多的不满。为什么会这样？我们又该如何解决？答案并非只有一个。针对不同原因，我们需要采取相应的对策，才能让员工保持愉快和积极。下面我们来探讨几种情况。


    - **员工不知道自己想要哪种培训。** 这通常只是第一步。但解决方法可以很简单，比如告诉对方："告诉我三四个你今年想做的事"，或者制定个人学习计划（或围绕学习计划建立正式制度）。这里，最关键的是你培训的目标是什么。对于刚担任当前职位的新人，通常要提供能让他们全面胜任现职的培训，从而增强其岗位自信。而对于已在某职位上工作较久的员工，则需要探索他们下一个想晋升的职位，并设法弥补技能差距以实现目标。


    - **员工的目标与团队目标不匹配。** 我们常常在制定培训计划时，不考虑人们实际想从计划中获得什么。要主动询问员工希望向哪个方向培训，而不是臆测他们的意愿。通过调查和经理一对一反馈，准确了解你的团队希望从计划中获得什么，而不是未经充分调研就擅自指定方向。


    - **员工想学习但没时间。** 这或许是我最喜欢解决的问题。你可以每周划定固定时间用于培训。难点在于必须为这段时间设置防火墙，让员工在培训期间不会被抽走去完成组织的其他任务；即便被抽走，你也要确保这段学习时间得到保障。


    - **没有培训预算。** 并非所有培训都要为每个员工每周花费 5000 美元。只要有足够人数，通常可以获得定制课程（甚至包括供应商主导的认证课程），费用可能只是零头。此外，播客、书籍、互联网以及几乎无限量的免费培训资源也触手可及。我用过的一个技巧是：报销所有认证教材和考试费用，允许员工利用业余时间自主学习。如果有官方课程，务必让员工毫无顾虑地报名参加。这类材料通常由组织内部编写，对团队零成本，还能帮助团队紧跟组织在特定主题上的立场或理念。


    - **员工不适应我们使用的教学方式。** 有些人无法在课堂环境中学习，有些人无法自主学习，还有些人需要以练习或目标为导向的培训（例如编写能完成特定任务的程序）。务必密切关注学员的反馈，保持灵活性，允许员工以他们需要的方式学习，而非仅按你自认为他们想要的方式教学。


    最后，人们不参加培训的一个原因是：他们真心觉得自己不需要任何培训。也许他们刚组建家庭，或家人患病需要照顾，又或者只是希望每天下班后骑车放松。并非人人都想一路攀升到组织最高层或跳槽到下一份工作。许多人更希望在自己现有岗位上安稳立足。但作为领导者，我们有责任避免员工的技能过时，因此必须持续为员工提供所需的一切资源，帮助他们今年、明年乃至更长远的时间里，在岗位上做到最好。


    不过，有时 100 分其实已经足够。我们可能会过度强调推动员工晋升下一岗位的必要性。推动，但别推得太猛。管理者需要投入更多时间，深入探究如何帮助团队中的每个成员，但这完全值得。

    '
- fmt: '# Learning to Lead


    I’ve worked with and trained a lot of new managers in my career, and there are
    a number of traps I see them fall into. This stuff takes time, and provided a
    new manager is actively trying to learn to manage and lead teams, anyone can excel
    at doing so. In that spirit, here are some things to focus on, or have your new
    managers focus on.


    - **Not micromanaging**: This is likely the most classic mistake managers make.
    Employees need to be provided with guidance and then allowed to own their successes
    and failures. Free up valuable cycles by handing out the responsibility of processes
    rather than tasks. In a word: delegate.


    - **Spend less time as an individual contributor**: New managers are often promoted
    because they were exceptional individual contributors. However, when moving into
    management it’s important to spend time amplifying the abilities of others instead.


    - **Recognize the contributions of others**: New managers that came up as individual
    contributors often struggle with judging the performance of others based on their
    own past performance. If a team performed at the same level, they likely would
    have been promoted as well. Recognize contributions publicly, even if you think
    it’s “just part of the job.”


    - **Promote ideas**: Given the opportunity, your team is likely to come up with
    far better ideas than yours. It’s important for new managers to work with employees
    closely and let their ideas flourish. When employees feel they contribute, their
    engagement will go up!


    - **Positively react to criticism**: New managers are… new. No one expects anyone
    to be perfect. However, we are all expected to react to criticism in a proactive
    and thoughtful manner. I like to send an e-mail thanking people for contributing
    to my career by helping make me better. Even when they go a little negative, kill
    ‘em with kindness!


    - **Gain equitably**: If your team or department is getting more budget, exposure,
    or headcount at the expense of other teams, you’ll have a long-term challenge
    ahead of you politically. Always make sure to share gains and to do so in a way
    that benefits all teams. Conflicts arise but can be defused by sharing improvements.


    - **Don’t manipulate others**: You can manipulate almost anyone into doing things
    for you, especially when recently promoted into the ranks of management. But it’s
    better if you can win hearts and minds. Doing so is more legitimate and doesn’t
    leave the negative feelings that people can have when they feel they’ve been manipulated
    into doing something they didn’t believe in.


    - **Don’t manage laterally or up**: New managers often come up from the ranks
    of individual contributors and often have blinders on, seeing what they would
    like to address in their old team, at the front lines. However, it’s equally as
    important to “manage up” and thereby prove that the organization is receiving
    a solid return on investment (ROI). This also helps you confirm that your priorities
    haven’t shifted when done at regular intervals.


    - **Skimp on the feedback**: Your goal is to make your team as good as they can
    possibly be. This means working with them to get better at what they do, determining
    who can replace you someday, and grooming your replacement. Anyone can extol virtues;
    the hard part is using that feedback to give your team some polish.


    - **Take the time for the team**: You know those one-on-one meetings you have
    to cancel sometimes? Stop canceling them. If you have a conflict, push one of
    the two. Show your team that they are important to you. And if they push your
    meetings, push back. Your #1 priority is to develop the careers of your team and
    they need to know that.


    - **Define goals**: When you meet with your team regularly (you do that, right?),
    you should be reviewing how they’re tracking toward their goals. When/if staff
    hit goals, set a new stretch goal on top. Don’t put too much pressure out there
    where it isn’t necessary, but if you aren’t pushing just a little then your team
    might start feeling stagnate.


    - **Learn what the team does**: Sometimes, a new manager doesn’t actually know
    how to do what their team does. In these cases, spend the time to learn. You don’t
    have to know how to debug each library of code someone writes or be an expert
    at machining a part out of sheet metal, but I find it helps to understand what
    people do in order to empathize with them.


    These tips aren’t all about pure management. Many revolve around leading a team
    as well. New managers can struggle with these things, and experienced managers
    can always be doing better. In short, pay attention to and inspire your staff
    and don’t forget to manage up when needed!'
