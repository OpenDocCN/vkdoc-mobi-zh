    # 是否应当销售云服务？


    云服务适合你的客户吗？答案是：很可能。是否每一种云解决方案都适合每一家企业？显然不是——否则我们也不会问这个问题（这点是我在某堂课上学到的）。但云计算在商业领域风靡一时，因为从长远来看，自行购买服务器并支付其支持与备份费用，往往比向云服务商付费并直接使用其提供的服务更昂贵。


    根据客户独特的业务需求和特点，帮助他们找到合适的解决方案至关重要。审视基于云的工具有很多不同角度。这可能意味着部署类似以下某一种方案（或它们的混合方案）：


    -   使用`CrashPlan`将文件备份到云端——也可能备份到现场服务器，或办公室的服务器。

    -   使用`Dropbox`、`Google Drive`、`Office 365`或`Box.com`，将文件实际迁移到云环境中。

    -   将物理服务器或本地服务器迁移到云环境，让客户获得一条经过改进且具备冗余能力的互联网连接，而在其办公室部署这样的连接在经济上并不划算。

    -   实施各种工具，例如作为 SaaS 的`Salesforce.com`，从而减少对物理服务器、虚拟服务器或云端服务器的需求。


    以上绝非你可能需要精通或合作的全部工具清单。如需更全面的列表，请参阅第 5 章的“技术点滴”部分。但如何选择正确的解决方案呢？我们来审视几个问题与一些恰当的回答。


    ## 你的文件有多大？


    大型图像或媒体文件可能体积过大，无法在远程地点处理。任何了解设计师或视频剪辑师的人都知道，他们每天早上花半小时等待每个项目文件打开会多么痛苦。在将这些文件迁移到云端之前，先弄清楚某客户使用的每种文件类型需要多久才能打开。也许最终更好的做法是将它们同步到本地服务器，或者寻找替代的工作流程。


    ## 你是否有合规性问题？


    许多环境有法律、医疗、政府、银行或其他合规性要求。每个云环境都有自己的一套合规标准。从（欧盟的）安全港协议到 SOC2、HIPAA，再到仅仅是在客户的安全审计文档上勾选一个框，都会涉及大量合规性问题。在你开始与客户合作进行集成之前，请确认你找到或销售的任何解决方案都满足每位客户的具体要求。


    ## 你的业务逻辑是否有特定需求需要处理？


    业务需求通常包括客户关系管理（CRM）、会计软件、专业服务自动化（PSA）、适用于各类企业的工具以及其他选项，所有这些都需要相互连接。确保工具能完成客户所需，包括一些小任务。处理这个问题的最佳方式通常是观察他们工作，并记录他们如何与原有工具交互。


    ## 某个特定工具是否需要与其他工具交互？


    在一个以应用为中心的世界里，很少有工具能完成客户的所有需求。客户通常更喜欢简单易用、上手快的工具，而不是花费数十万美元购买一个什么都做不好、却又样样都揽的单一工具。但请确保这些工具在需要时能够连接到其他工具，以避免繁琐的双重录入。


    ## 你是否需要轻松地将数据移入和移出云解决方案？


    许多云解决方案只提供向环境添加数据的功能，却让导出数据变得困难。在你将某个（无论出于何种原因）可能不适合客户的解决方案强加给他们之前，请确保他们能在数据存入特定工具后将其取出。


    ## 成本是多少？


    仔细阅读细则。如果客户需要以编程方式与数据交互，他们可能必须付费购买高级账户类型。通常会有表格列出诸如 API 访问或“专业功能”等特性与选项。在为客户评估解决方案成本时，请确保你了解这些层级和费用，否则他们可能会支付比你报价高出三倍的费用，并为此恨你（你自己可能也会恨自己）。


    ## 是否有公司外部的人员需要访问数据？


    如果有外部方需要连接，你可能必须为每个人创建（并支付）额外的账户。你不希望有任何意外。与客户合作，确定外部方是否会连接到云工具，弄清楚他们的访问权限是否可以受到限制，并确定客户能否为供应商、客户和承包商提供适当的访问级别。


    ## 你是否有合适的网络？


    如果客户依赖互联网来访问文件、数据库、联系人和其他关键业务资产，那么你需要确保与外界的连接绝对不能中断，否则一旦（不是“如果”）中断，员工就会无所事事。冗余、快速的互联网连接是绝对必要的，与员工闲置无法工作的成本相比，这点投入微不足道。


    归根结底，云解决方案很可能实际上适合大多数客户。可能需要稍加研究，才能找到符合每个客户独特需求和预算的正确解决方案。但如果你有计划将本地解决方案迁移到云端，或迁移到某个特定的
    SaaS 解决方案，考虑到云服务商领域如此广阔，这样做是完全可行的。既然你已经掌握了一些在按服务逐一推进这类计划时可以提出的问题，那就享受这个过程吧——并希望借此机会与客户合作，重塑他们开展所有精彩业务的方式。如果成功，并且你真正捕捉并改进他们的工作流程，你将拥有一个终身客户！

    '
- fmt: '### If You Do Sell Cloud


    There are a number of vendors that offer services from which your customers can
    benefit. Most of these also offer a reseller or referral account type. `Google
    Apps`, `Microsoft`, `Box`, and `Dropbox` are file-sharing services that allow
    you to resell or affiliate accounts. And those can mean a steady extra income
    and ancillary benefits that make it easier to support customers. You might not
    even want to capture the added revenue stream but may do so in order to charge
    your customers less for services while also getting access to exclusive options.


    Here are some things to evaluate when looking at new cloud services (or at least
    new to your portfolio).


    - Can the customer contact the provider directly?

    - Do you, as an affiliate, get elevated levels of support?

    - Do affiliates get additional training?

    - Can you manage multiple customers from a single dashboard?

    - Can customers create a delegated administrative account for you without incurring
    additional cost?

    - What percentage of what they pay the vendor is your "commission?"

    - Can the customer pay for a service annually, if needed?

    - If the customer stops working with you, how easy is it for them to transition
    their service to another vendor?


    These are all important questions and you''re likely to have many more. The priority
    of each response will be based on the types of customers and the types of data
    or services. I recommend creating a spreadsheet that allows you to pick vendors
    you want to work with, so you aren''t blind-sided. Be deliberate in your selection.
    To assist, I''ve also put together a number of technologies that customers will
    need in Appendix E.


    Splitting your time working on a lot of different tools can be frustrating. While
    it might seem enticing to work with as many vendors as possible in order to provide
    as much coverage as possible to customers, keep in mind that centralizing around
    a good, better, and best approach, or even a single vendor, allows you to focus.
    You can get really good at building solutions around that vendor, potentially
    getting leads from vendors, and having fewer tools to try to access in the event
    a customer has issues.


    The fact that you''re selling a solution can change your approach. For example,
    if you''re selling `Dropbox` then you might not even bring up `Box.com` or `Office
    365` in conversations. Just make sure that the experience to each customer is
    great and that they''re not sacrificing a streamlined workflow so you can make
    an extra buck.


    ### Evaluating the Security of Cloud-Based Solutions


    The perspective is everything must go to the cloud, and now! And sometimes finding
    a tool is about workflow. And the workflow should make sense and be awesome.


    But there''s an argument that you shouldn''t even keep a lot of data, unless it''s
    kept confidential and therefore properly secured. The liability of keeping information
    about other people and what they do is just too great to outweigh what you might
    otherwise use the data for.


    Security matters. Workflow matters. And with the number of services out there
    that you can use for any given task, if any aren''t secure enough then there are
    probably 10 others you could use that are. So why might you choose to use a given
    service?


    - **Compliance**: One of the best ways to verify that your data is secure with
    an online service is to check how various aspects of solutions are governed. Many
    cloud solutions list the controls by which they are governed, often using industry
    standardized controls such as SOC 2 (`https://en.wikipedia.org/wiki/Service_Organization_Controls#SOC_2_overview`),
    FedRAMP (`https://www.fedramp.gov`), etc. Digging into which parts of these an
    organization maintains compliance with will give you a pretty good idea of how
    seriously a potential cloud service you might use takes your privacy, and to whom
    they allow access to various types of your data stored in their cloud.


    - **Authentication**: Some services give you something more than a password to
    get logged into the service. For example, they can send you a text that contains
    a code when you log in. This is known as multi-factor authentication, which uses
    something you know (your password) and something you have (your phone) to allow
    access to online services. Rather than forcing end users to re-enter a password
    in multiple services, a number of vendors have a feature known as Single Sign-On.
    If you''re a small business (let''s say less than 10 people), you can actually
    use most of these tools for free until you grow into a paid tier.


    - **Encryption at Rest**: How is your data stored at the cloud service? Any cloud
    service you choose should keep all of your data encrypted at all times. You can
    ask them questions like, "Are your databases stored on an encrypted file system?",
    "What data from my company do you store in your database that is not encrypted?",
    "How exactly do you store files that I upload to your database?", and "Who specifically
    has the keys to decrypt that data, and how are those stored?" The thing to keep
    in mind with most forms of compliance is that the company can have some pretty
    insecure practices, provided they are transparent to customers about how insecure
    their practices are. So ask questions about areas you are concerned about.


    - **Certificates**: When we ask about those keys that can be used to decrypt data,
    there are also keys that protect your data when in transit. Make sure that all
    traffic is protected by secure protocols (if you don''t know, you can ask each
    vendor) using strong encryption certificates, and that their private keys for
    those certificates are kept securely and are not about to expire.


    - **Privacy Policy**: Organizations with compliance should typically have a privacy
    policy. When you read the policy, it shouldn''t read: How do you respond to a
    request for my data?


    - **Geography**: Cultural norms are different in various parts of the world. Most
    in the United States aren''t concerned about this. However, Europeans don''t typically
    want their data stored on servers outside of the EU (especially those in the U.S.).
    This is due to systems administrators and customers alike being well educated
    about laws within the EU (and countries outside the EU) and the desire to force
    what is perceived in different regions as an acceptable level of privacy and security.'
