  trans: '

    - **对文章进行分类**：分类能告诉爬虫如何——呃——归类页面。我的个人博客有大约 15 个分类，涵盖了约 3600 篇文章。这也有助于我在需要时快速找到自己的文章。


    - **为文章添加标签**：大多数现代博客引擎都支持标签功能。这仅仅是算法用来提高每篇文章或页面页面排名（`PR`）的另一个元数据。


    - **在长文章中使用标题**：标题标签可用于表示网站新章节的开始。这不仅能让页面更易读，还常能用于将流量引导至页面的各个部分，而且网络爬虫似乎非常喜欢它们。


    - **链接到其他文章**：链接到其他网站是很自然的事。这样做有助于让网络更像一张网，帮助读者找到更多内容，并帮助爬虫索引你的网站并将其与你所链接的网站关联起来。


    - **获取指向你文章的外部链接**：反向链接是搜索引擎优化（SEO）最重要的方面之一。指向你网站的链接越多，`PR`就越高——当然，前提是这些链接是合法的。如果你购买了反向链接，或者通过发布评论获得了一个，这些链接应被标记为“nofollow”，因此不计入
    PR。所以，关于反向链接的最佳建议是，撰写人们愿意链接的优秀内容。


    - **启用站内链接**：我喜欢使用一个能向读者展示相关文章的插件。这为我的网站创建了一个额外的索引，然后显示具有相似关键词密度的文章。


    - **启用评论功能**：我有一篇关于 Fitbit 徽章的文章。这篇文章收到了成百上千条评论。我不但觉得这些评论读起来很有趣（我的意思是，成百上千的人在我的个人网站上热烈讨论），而且动态内容让页面在爬虫眼中保持新鲜感，提供了新内容，增加了人们在页面上的停留时间，还增添了我可能没想到要添加的观点和关键词。


    - **删除失效链接**：爬虫讨厌失效链接，并会因此降低你的评分。你可以通过博客引擎的插件轻松找到失效链接，或者将你的网站提交给各种能追踪失效链接并通知你的服务。


    - **确保网站加载速度快**：爬虫不喜欢爬取速度慢的网站。因此，请确保你的网站加载迅速。移除任何多余的插件或自动化程序，保持页面超快加载。这也会让阅读你页面的人感到满意。


    - **初期瞄准长尾搜索词**：你很可能永远不会因为像“苹果”或甚至是“苹果顾问”这样的搜索词而被注意到，但你可能因为“博伊西的苹果顾问”而获得高 PR。长尾搜索的好处在于，它们也能为你提供快速取胜的机会，帮助你保持投入。我至今还记得第一次有人打电话给我说“我在网上找到了你”，这给了我额外的动力，让我继续努力让别人找到我。


    - **避免使用 `robots.txt`**：`robots.txt` 文件是一种告诉爬虫不要索引你网站的旧方法。一些自动化服务会默认安装这些文件。如果网站上存在
    `robots.txt`，爬虫将永远不会抓取内容。


    考虑到所有这些规则，同样值得注意的是，顺其自然才是对的。如果你开始试图让自己的内容迎合网络爬虫，那么内容读起来就会枯燥乏味、模式化，并且当网络爬虫掌握新技巧时，PR
    也会发生变化。我个人只写我想让人们看到的东西。例如，我个人喜欢阅读的一些最佳文章是对苹果新技术的深度分析。这些文章往往长达数千字。这也是我最常链接的文章类型。但无论如何，我在写作时还是会将前面提到的要点记在脑海里。


    `SEO` 不适合没有耐心的人。爬虫抓取网站可能每隔 30 天才发生一次。你可以请求立即抓取你的网站，但这仍然需要时间。我建议你做一个良好的网络管理者。如果你撰写人们愿意链接的优秀文章，那么你也需要等待那些其他网站被索引。这一切都需要时间。再次强调，要留意我们讨论过的要点，但也要写出适合自己的内容，并获取一些优质的反向链接，这样就没问题了。


    此外，市面上有很多专门从事 SEO 的公司。如果你愿意，可以聘请一家来帮你制定策略、获取链接并带来流量。保持在自然搜索结果列表的顶端很难，但如果你对你的目标关联词深思熟虑并付出一些努力，通过长尾搜索获得相当高的
    PR 也并非罕见。


    现在，让我们把注意力转向吸引人们访问你网站的方法。我们先从电子邮件自动化开始，因为它是驱动网站流量的最常见方式之一。


    ## 电子邮件自动化


    我们讨论过自动化交付你的服务。但你的营销信息呢？曾几何时，我们做的是新闻简报。然后我们将每个目标收件人放在电子邮件程序的密送（BCC）字段中，并尽可能多地发送邮件。如今，我们做的是电子邮件营销活动。

    '
- fmt: '### Note


    With the advent of the European data privacy regulations, GDPR, e-mail marketing
    is likely going to go through substantial changes over the next few years. Consult
    with your legal teams to see what impact GDPR, but a tool to manage your campaigns
    in the future is likely to be a necessity so people included in your campaigns
    can easily opt out.


    The most important thing about e-mail automation is that you have a good message
    that potential customers will want to read. And pretty pictures. Those are important
    too. Once you have pictures of cats in hats, cats in cups, or cats snuggling with
    other cats, you’ll want to find a good e-mail automation tool.


    It seems like every time I turn on National Public Radio, there’s a new e-mail
    marketing company sponsoring Marketplace. Let’s review a few that I’ve seen consultants
    have a bit of luck with (obviously a small list in a very large field of competitors).


    - **Constant Contact**: A free 30-day trial with Constant Contact is one of the
    easiest ways to get started with e-mail marketing campaigns. You can use Constant
    Contact as a reference. Find the things you like, the things you don’t, and then
    test out other tools. [`https://www.constantcontact.com`](https://www.constantcontact.com)

    - **Mailchimp**: Mailchimp was the first real e-mail marketing solution to go
    down-market in a mass market kind of way. With a cute chimp as a mascot, there’s
    so much to learn about marketing from Mailchimp—not just when it comes to large-scale
    messaging campaigns but also when it comes to modern, fun, and effective marketing.
    It’s also easy to use and if you can’t easily find how to do something in Mailchimp,
    I’ve found that there’s a pretty substantial chance that you shouldn’t be doing
    it in the first place. [`https://mailchimp.com`](https://mailchimp.com)

    - **iContact**: This is an easy tool that you can get set up in just a few minutes.
    It’s basic, without a lot of bells and whistles, and so inexpensive. [`https://www.icontact.com`](https://www.icontact.com)

    - **Emma**: Another popular Software as a Service-based e-mail marketing tool
    that has a lot of nice integrations, including Zendesk, which many an Apple consultancy
    uses. [`https://myemma.com`](https://myemma.com)

    - **Marketo**: Marketo is one of the gold standards in e-mail marketing. You should
    take a class if you decide to use Marketo, but the integration with Salesforce
    and other Customer Relationship Management (CRM) solutions is as good as they
    get. This is by far the most powerful tool I’ve ever had the pleasure (and frustration)
    to work with. [`https://www.marketo.com`](https://www.marketo.com)

    - **Salesforce**: The largest CRM in the world, capable of doing rudimentary e-mail
    campaigns. [`http://salesforce.com`](http://salesforce.com)


    As with any other tool you bring into your company, choose your messaging tools
    to the scale of your operations. Most Apple consultants can also master a tool
    like Mailchimp or iContact. But it takes someone on staff to master the integration
    between Marketo and Salesforce. Don’t underestimate the maturity of some of these
    solutions simply because they’re built for messaging with customers and leads.


    ### Note


    Once you’ve mastered one of these tools for your own campaigns, then you’ve probably
    found yourself yet another tool that you can help customers with, if they need
    such a thing—especially if you can help them do so in a pretty sane fashion.


    Also, while the ads you hear on the radio for some of these tools make it sound
    like these campaigns write themselves, they don’t. In the next section, we’ll
    cover some of the dos and don’ts of e-mail marketing. If you don’t plan on doing
    something with messaging for customers, then I’d recommend looking for someone
    to help you get started, much as you’d expect a whiz with marketing to look for
    someone to help them with their Macs when they get in over their heads.


    ## What to Do and What Not to Do


    E-mail marketing is a delicate business. On the one hand, you don’t want to be
    an evil spammer. On the other hand, you want to grow your business, and a great
    way to stay in touch with potential customers without picking up the phone and
    bugging them is by tickling them every now. You can also use e-mail marketing
    to reach existing customers, automating parts of managing your relationship with
    them.


    I’ve been involved in writing campaigns since what feels like the beginning. And
    as someone who hates spam, I’ve tried to be careful to never become an evil spammer.
    And because I like you, I’ve decided to share my laws that govern how I like to
    handle e-mail automation.


    - Choose an e-mail automation tool that fits the size of your marketing team.
    Many of the larger products really need a staff person at the reins. If you can’t
    afford someone in that position, then don’t self-identify yourself into a more
    weighty tool than you can handle and turn your attention toward some of the downmarket
    solutions instead.

    - Use a third-party tool instead of Outlook. You want to use third-party software
    rather than just send e-mails because you really, really need an unsubscribe button.
    In some countries you might otherwise be breaking the law. And by breaking the
    law, I mean jailtime.

    - Protect Personally Identifiable Information (speaking of jailtime). Use good
    passwords with the service you use and never sell that information unless your
    privacy policy explicitly states you can (and even then it’s still probably a
    bad idea).

    - Don’t take yourself too seriously. Boring, dry e-mails suck after a while, and
    people will almost invariably unsubscribe (except your competitors). Be yourself,
    be conversational, and feel free to poke fun at yourself every now and then. This
    makes your organization a little more human. And it makes your job a little more
    fun.

    - Automate syncing contacts with your CRM. Loading or syncing your contacts from
    your CRM tool can be labor-intensive and can cause technical misfires that end
    up adding people who have unsubscribed, or sending people duplicate e-mails. Instead,
    whenever possible, choose a tool that has a plugin or integration with existing
    tools you use at your organization.

    - You can use e-mail automation to cross-sell goods and services. If you’ve already
    converted a lead to a customer, then you will have the ability to potentially
    sell them other items in your portfolio. Don’t be too salesy but do have multiple
    campaigns: those for prospects at each stage of the sales funnel, and those for
    organizations who are already customers at various maturity levels–so the content
    is fresh and pertinent to them.

    - Build a calendar that follows a logical cadence. It is important to have a little
    sale in there every now and then, such as CRM for Beginners. At other times you
    might choose to have something that is genuinely helpful for a person’s productivity.
    And finally, some e-mails in the cadence should be specifically geared for thought
    leadership.

    - Use e-mail automation to communicate more than just a sales pitch. You can send
    customer updates, such as how many open tickets, the response time for tickets,
    and even surveys (e.g., for customer satisfaction). Just don’t send too many e-mails
    to customers or prospects. Make sure to offer daily or weekly digests if you hook
    mail into support systems.

    - Be timely. If it’s tax season, tell customers and leads how your product can
    help them during tax season. If it’s spring, talk about spring cleaning. If they’ve
    been a customer for 3 months, check in to see how you’re they liking your services.'
