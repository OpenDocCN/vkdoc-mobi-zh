- fmt: '# Outsourcing HR


    For the purposes of this book, we looked at Human Resources, or HR, as a person
    or team that oversees the employment at your organization, including compliance
    with labor laws, employment standards, the administration of benefits, and ultimately
    recruitment. In most of this chapter, we focused on leadership and management
    because we could have spent hundreds of pages just looking at the science of organizational
    structures and the logistics behind it.


    In this chapter, we reviewed a lot of resources. We mentioned to start with `trinet.com`,
    `adp.com`, `insperity.com`, and `gusto.com` to get a system and to bring on a
    consultant once you pass half a dozen employees.


    We didn’t talk about the specific technologies you need to train and maintain
    skills for. This is because there are literally hundreds. Some of those can be
    found in Appendix C. Each firm will be different based on the tools you choose
    to use to design your services offering and the toolkit your teams will use. That
    list will help when designing that offering.


    Organizations with less than 20 people should probably outsource HR, unless they’re
    planning on growing at a rate of one or more employees per week. There are a number
    of different outsourcers that will provide you with benefits that far outweigh
    any package you can put together on your own. They will also provide an ear when
    you need it; help to keep you within the laws of the cities, states, counties,
    provinces, etc that you do work in; and take over payroll. Specific things to
    look for in outsourced HR for small to mid-range companies:


    * Provide a service desk for employees to call. This can help you not end up spending
    hours researching employment law or the specifics of insurance claims.

    * Provide insurance for employees. Your staff needs to be taken care of, and one
    of the easiest ways to do so is to provide an excellent insurance plan.

    * Take care of workers comp issues.

    * Provide stock options and/or 401k plans.

    * Resolve employee disputes.

    * Provide stock, profit sharing, and dividends if needed.


    When looking to outsource HR, make sure to ask outsourcers how they handle each
    of these situations. Find out what they bill separately for. And make sure you’re
    comfortable with having a local consulting resource to help you out and that they’re
    comfortable with your outsourcer. Keep in mind that HR also includes leadership
    and onboarding. And those two things are frequently what sets the ability for
    a company to deliver quality products to customers on a consistent basis.


    ## Conclusion


    Human resources isn’t just about making sure everyone gets paid and has insurance.
    Human resources is about that but is also about leadership training, diversity,
    employee retention, systems for managing humans, recruitment, and most anything
    else you choose to put there.


    In this chapter, we looked at some of the common thresholds for when to outsource
    HR and when to hire or grow an HR department. There is some flexibility in these,
    according to how you choose to run your company, but keep in mind that when you
    are growing toward a dozen people, you’ll want to put solid onboarding and training
    programs in place. Doing so doesn’t happen on its own, and most business owners
    should be guiding these programs, but if you micromanage them you will end up
    focusing less on strategy and sales, which are the growth drivers for most organizations.


    Now that we’ve covered human resources, it’s time to take a look at how we pay
    for all of this. In the next chapter, we’ll dive straight into what is probably
    the favorite topic for most nerds who start companies: accounting!


    ## Further Reading


    * HR for Small Business, Charles Fleischer, [`https://www.amazon.com/Small-Business-Essential-Resources-Professionals/dp/1572486902`](https://www.amazon.com/Small-Business-Essential-Resources-Professionals/dp/1572486902)

    * The Essential HR Handbook, Sharon Armstrong, Barbara Mitchell, [`https://www.amazon.com/Essential-HR-Handbook-Resource-Professional/dp/1564149900`](https://www.amazon.com/Essential-HR-Handbook-Resource-Professional/dp/1564149900)

    * HRM and Performance, David E Guest, Jaap Paauwe, Patrick Wright, [`https://www.amazon.com/HRM-Performance-Achievements-David-Guest/dp/1405168331`](https://www.amazon.com/HRM-Performance-Achievements-David-Guest/dp/1405168331)

    * The Management Shift, V Hlupic [`https://www.amazon.com/Management-Shift-Transform-Organization-Sustainable/dp/1137352949`](https://www.amazon.com/Management-Shift-Transform-Organization-Sustainable/dp/1137352949)

    * Lean In: Women, Work, and the Will to Lead, Sheryl Sandberg, [`https://www.amazon.com/Lean-Women-Work-Will-Lead/dp/0385349947`](https://www.amazon.com/Lean-Women-Work-Will-Lead/dp/0385349947)

    * The Inclusion Revolution Is Now: An Innovative Framework for Diversity and Inclusion
    in the Workplace, Maura Robinson, [`https://www.amazon.com/Inclusion-Revolution-Now-Innovative-Framework/dp/1491710578`](https://www.amazon.com/Inclusion-Revolution-Now-Innovative-Framework/dp/1491710578)

    * Driven by Difference: How Great Companies Fuel Innovation Through Diversity,
    David Livermore, [`https://www.amazon.com/Driven-Difference-Companies-Innovation-Diversity/dp/0814436536`](https://www.amazon.com/Driven-Difference-Companies-Innovation-Diversity/dp/0814436536)

    * Notes to a Software Team Leader, Roy Osherove [`https://www.amazon.com/Notes-Software-Team-Leader-Organizing/dp/829993320X`](https://www.amazon.com/Notes-Software-Team-Leader-Organizing/dp/829993320X)

    * Managing Humans, Michael Lopp [`https://www.amazon.com/Managing-Humans-Humorous-Software-Engineering/dp/1484221575`](https://www.amazon.com/Managing-Humans-Humorous-Software-Engineering/dp/1484221575)

    * Rookie Smarts:, by Liz Wiseman [`https://www.amazon.com/Rookie-Smarts-Learning-Beats-Knowing/dp/006232263X`](https://www.amazon.com/Rookie-Smarts-Learning-Beats-Knowing/dp/006232263X)

    * Emotional Intelligence 2.0, Travis Bradberry and Jean Greaves, [`https://www.amazon.com/Emotional-Intelligence-2-0-Travis-Bradberry/dp/0974320625`](https://www.amazon.com/Emotional-Intelligence-2-0-Travis-Bradberry/dp/0974320625)

    * The History of Black Business in America, Juliet E.K. Walker [`https://www.amazon.com/History-Black-Business-America-Entrepreneurship/dp/0807859109`](https://www.amazon.com/History-Black-Business-America-Entrepreneurship/dp/0807859109)

    * Race Ethnicity, Gender, and Class: The Sociology of Group Conflict and Change,
    Joseph F, Healey, [`https://www.amazon.com/Race-Ethnicity-Gender-Class-Sociology/dp/1452216517`](https://www.amazon.com/Race-Ethnicity-Gender-Class-Sociology/dp/1452216517)

    * Inclusion: Diversity, The New Workplace & The Will To Change, Jennifer Brown,
    [`https://www.amazon.com/Inclusion-Diversity-Workplace-Will-Change/dp/1946384100`](https://www.amazon.com/Inclusion-Diversity-Workplace-Will-Change/dp/1946384100)

    * Making Diversity Work: 7 Steps for Defeating Bias in the Workplace, Sondra Thiederman,
    [`https://www.amazon.com/Making-Diversity-Work-Defeating-Workplace/dp/1427797137`](https://www.amazon.com/Making-Diversity-Work-Defeating-Workplace/dp/1427797137)

    * Managers as Mentors, Chip R Bell, [`https://www.amazon.com/Managers-As-Mentors-Building-Partnerships/dp/160994710X`](https://www.amazon.com/Managers-As-Mentors-Building-Partnerships/dp/160994710X)'
