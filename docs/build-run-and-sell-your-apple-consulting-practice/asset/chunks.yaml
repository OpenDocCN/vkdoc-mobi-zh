    *   [**Box**](https://www.mobileguardian.com/) : File sharing in the cloud.


    *   [**Dropbox**](https://www.macbartender.com/) : File sharing in the cloud.


    *   [**Egnyte**](https://www.bresink.com/osx/TinkerTool.html) : Caches assets
    from popular cloud-based services so they''re accessible faster on networks where
