    \ Media, LLC 是一家加利福尼亚有限责任公司，其唯一成员（所有者）是 Springer Science + Business Media Finance\
    \ Inc (SSBM Finance Inc)。SSBM Finance Inc 是一家特拉华州公司。\n\n## 引言\n\n我成年后的大部分时间都在咨询行业工作。我曾就职于大型跨国咨询公司，创立过咨询公司，参与过公司出售，并在大小公司中帮助开发业务与服务项目。我按小时计费过，签过聘雇合同，甚至将按小时计费的客户转变为管理服务客户。在这一过程中，我学到了很多东西。后来，我找了一份朝九晚五的工作。在那段时间里，我暂时离开了咨询行业，之后又有机会与一些全球最大的咨询公司和管理服务提供商的苹果服务部门合作并提供支持。一路走来，我觉得自己什么都没学到……但无论如何，我还是忍不住要写一整本书来谈谈这事！\n\
    \n从一家小型按小时计费的咨询公司起步，到创办管理服务业务，再到在企业级环境中工作，这让我对传统咨询公司和管理服务提供商有了新的认识，也让我看到了业务融合的方式。而指导曾经的竞争对手，则让我看到了他们面临的挑战（这些挑战我未曾遇到），以及我遇到的挑战（他们也未曾经历）。我自然无法保证成功所需的每一步迭代；但我希望这本书能帮助你决定是否踏上这样一段旅程，并在路途中最终找到成功之道。\n\
    \n在本书中，我们将探讨一系列场景，为读者提供应对创办咨询公司过程中最常遇到的一些挑战的思路。其中一些方法具有普遍适用性，另一些则专门针对管理服务。\n\n\
    ### 各章概览\n\n本书结构分为三个主要部分：运营业务、发展业务，以及业务启动后的行动指南。各章内容如下：\n\n**第 0 章：** *个体经营者的乐趣。*\
    \ 在这短短的一章中，我们将介绍个体经营者的生活，以及你决定扩张时将面临的挑战。\n\n**第 1 章：** *打造服务产品。* 本章我们将探讨如何定义你的产品到底是什么。你是要做固定费用的管理服务提供商，还是混合提供服务？我们将讨论按小时计费与不限量支持的问题、网络段的合理性检查，以及如何验证你的定价是否正确。\n\
    \n**第 2 章：** *超越服务。* 在本章中，我们将超越出售服务本身，涉及网站订阅销售、硬件销售、带宽销售以及其他可以增加收入来源、帮助你为初创公司提供资金的领域。\n\
    \n**第 3 章：** *招聘与人力资源。* 本章我们将探讨招聘、培训和留住工程师的问题。我们还会相当冷静且精算地看待何时不得不让你曾拥有的最优秀员工主动离开，以及哪些重大举措可能有助于留住他们。\n\
    \n**第 4 章：** *会计基础。* 在本章中，我们将探讨你组织中最激动人心的方面：记账。许多企业主讨厌做这件事。而我一直很喜欢。哦，还有税务。因为……税务……\n\
    \n**第 5 章：** *购买软件以实现业务自动化。* 第 5 章涵盖部署自动化软件的内容。这包括用于监控远程管理设备健康状况的软件，接着是用于执行工单和调度的软件，最终着眼于与业务的其他方面（包括电子邮件自动化、计费和合同管理）进行集成。\n\
    \n**第 6 章：** *广交朋友：发展合作伙伴关系。* 第 6 章是关于合作伙伴关系的。合作伙伴可能带来大量新客户，也可能浪费时间。在这里，我们将探讨如何找到合适的合作伙伴、建立良好关系，以及将这些合作伙伴关系转化为客户。\n\
    \n**第 7 章：** *开展免费与游击式营销。* 本章我们将探讨如何让你的营销资金获得最大回报。你将获得一些关于轻松最大化投资回报的技巧、一些想法，当然，还有一些用于进一步深入探索的资源。\n\
    \n**第 8 章：** *利用公共关系。* 在本章中，我们聚焦于公共关系。公关就是让你的组织出现在媒体面前，包括在新闻报道中被引用、提及你公司名称的客户案例以及其他资产，无论是否聘请公关公司。\n\
    \n**第 9 章：** *广告。* 在本章中，我们探讨付费广告。在第 7 章和第 8 章中，我们实际上并没有为广告付费，但现在我们有了一些资金，可以负担得起。当然，这将从付费搜索开始。\n\
    \n**第 10 章：** *销售的艺术。* 前几章讲的是建立销售漏斗。那是让你接触到客户的方法。在人们开始给我们钱之前，我们还有一步要走：销售过程。\n"
- fmt: '**Chapter 11:** *Diversifying Your Portfolio.* Here, we look at more you can
    do for customers, beyond managed services. This includes software development,
    project management, and other forms of services. But the most important aspect
    here is to get rigorous about how you handle new business opportunities.


    **Chapter 12:** *When to Stop Growing.* This chapter is about harmony. Slowing
    growth doesn’t need to happen permanently, but it can be dangerous to grow too
    fast—especially when you are not able to leverage enough capital for contracts
    you are selling. To many, this might sound like basically the best problem they
    could ever have. To others, who are jeopardizing sometimes decades of work, the
    idea of possibly bankrupting their company is frightening.


    **Chapter 13:** *Sell the Company.* In this chapter, we look at selling your company.
    But we can’t stress enough that selling the company should usually not be your
    impetus for starting the company. Additionally, we’ll look at various ways to
    merge with other organizations.


    **Chapter 14:** *The Part-Time Owner.* But what if you don’t want to sell the
    company? In this chapter, we look at some alternatives, such as becoming a part-time
    owner, starting more companies while running yours, and leveraging profits to
    build more equity.


    **Chapter 15:** *Buying Companies.* Inorganic growth is risky. Why would you incur
    the risk to grow inorganically rather than just building a better offer than the
    competition? Usually, time. Consider this, if there’s a market segment you want
    to go after and there’s an incumbent, then the time it takes you to build a competing
    offer is time that the other company is likely even further innovating, putting
    you further and further behind gaining market control. In Chapter 15, we’ll look
    at what to consider when acquiring a company, as well as what to do when talks
    break down.


    **Chapter 16:** *Running a Consulting Practice Inside a Larger Company.* Finally,
    consulting practices happen in larger companies as well—most notably in software
    companies. While many attributes match those of stand-alone companies, there are
    a number of differences as well and many, many lessons to be learned, especially
    for those who are moving from a standalone practice to a company.


    At the end of each chapter, we’ll also take the liberty of including a Further
    Reading section. Don’t worry, you don’t have to read all the books. If you did
    though, you should probably just be given an MBA. We’re all pretty busy. So, while
    there’s usually more value in reading a book than listening to it, please note
    that a good number of these are actually available on Audible.


    Ultimately, this book is meant to be lessons that I share with you, not a rulebook.
    You have a business. Maybe you’ve been in business for a long, long time. Maybe
    you’ve been helming a business for awhile. Whatever your situation, you’re probably
    way smarter than me. And not all of these lessons will work for you, given the
    values you have and how you want to run your business. But maybe something I put
    in black and white here can actually be used to make you enough dollars to warrant
    the amount of time you spent reading the book!


    First, Let Me Talk You Out of This…


    ## Before You Start a Company


    The stress of starting a company can literally kill you. Starting a company can
    lead to wrecking every relationship in your life. Starting a company will cause
    you to grow old faster. You are likely to go bankrupt. You will hire people who
    are likely to hate you eventually. You will not “be in charge of your own destiny,”
    as your clients will be in charge of your destiny. In short, it’s gonna’ suck.


    You will work more hours than you ever knew about. You will give large sums of
    money to lawyers and accountants. You will spend time away from the real world,
    building a business, instead of building relationships with friends and family.


    Yes, Ross Perot sold Managed Services Providers for 10+ billion dollars. You won’t.
    Yes, you can hang out your shingle after working for a consultant, passing business
    to consultants, or hiring consultants. Don’t. You think you can do it better than
    the consultants out there that have let you down for one reason or another? You
    can’t. Again, this is gonna’ suck.


    If you find success, you can still go bankrupt from poor financial planning. If
    you find success, you will be sued. If you innovate, you will be copied. If you
    hire people, they will leave you. And you will keep on until you sell out or go
    out of business.


    ## Instead…


    It doesn’t have to be this way. You can work for someone else forever. You can
    collect a paycheck. You can get a safe 401k. Maybe you can consult a little on
    the side. You can have a lovely and safe life. You can… live…


    That on-the-side thing. It’s called the gig-based economy, and we’ll talk a little
    about that throughout this book. Maybe you drive an Uber or work at an Apple Retail
    Store as well. To use older terminology, it’s “shoestring” and allows you to pivot
    if need be.


    OK, OK, so the Surgeon General doesn’t talk a smoker out of smoking with a label,
    and if you continue reading, just do me one REALLY BIG FAVOR. Do whatever it takes,
    including folding the business that is your baby, in order to be happy. Do what
    you love. Be good to those you love. And try to keep your business going while
    you’re at it!


    ## Chapter 0: The Joy of Being a Sole Proprietor


    I tried to talk you out of starting a company in the previous section. If you’re
    still reading, you went ahead and decided to do it anyway. Or maybe you did it
    after reading that, or maybe you did it 30 years ago. The next phase is to get
    enough clients to make how much money you want to make. And in the next few chapters
    we’ll look at doing so in a deliberate fashion.


    It’s not that hard to become a consultant. The job can coexist with other jobs,
    provides flexibility, and you don’t have to worry about other people. If you want
    to take a day off, just reschedule your appointments. You can limit the amount
    of time you work so you can focus on your family and other pursuits. I know a
    lot of people who have been sole proprietors for decades and not only love the
    gig but make enough money at it so that they lead a comfortable lifestyle.'
  raw: '**Chapter** [**11**](#469405_1_En_11_Chapter.xhtml) **:** *Diversifying Your
    Portfolio.* Here, we look at more you can do for customers, beyond managed services.
    This includes software development, project management, and other forms of services.
    But the most important aspect here is to get rigorous about how you handle new
    business opportunities.


    **Chapter** [**12**](#469405_1_En_12_Chapter.xhtml) **:** *When to Stop Growing.*
    This chapter is about harmony. Slowing growth doesn’t need to happen permanently,
    but it can be dangerous to grow too fast—especially when you are not able to leverage
    enough capital for contracts you are selling. To many, this might sound like basically
    the best problem they could ever have. To others, who are jeopardizing sometimes
    decades of work, the idea of possibly bankrupting their company is frightening.


    **Chapter** [**13**](#469405_1_En_13_Chapter.xhtml) **:** *Sell the Company.*
    In this chapter, we look at selling your company. But we can’t stress enough that
    selling the company should usually not be your impetus for starting the company.
    Additionally, we’ll look at various ways to merge with other organizations.


    **Chapter** [**14**](#469405_1_En_14_Chapter.xhtml) **:** *The Part-Time Owner.*
    But what if you don’t want to sell the company? In this chapter, we look at some
    alternatives, such as becoming a part-time owner, starting more companies while
    running yours, and leveraging profits to build more equity.


    **Chapter** [**15**](#469405_1_En_15_Chapter.xhtml) **:** *Buying Companies.*
    Inorganic growth is risky. Why would you incur the risk to grow inorganically
    rather than just building a better offer than the competition? Usually, time.
    Consider this, if there’s a market segment you want to go after and there’s an
    incumbent, then the time it takes you to build a competing offer is time that
    the other company is likely even further innovating, putting you further and further
    behind gaining market control. In Chapter [15](#469405_1_En_15_Chapter.xhtml)
    , we’ll look at what to consider when acquiring a company, as well as what to
    do when talks break down.


    **Chapter** [**16**](#469405_1_En_16_Chapter.xhtml) **:** *Running a Consulting
    Practice Inside a Larger Company.* Finally, consulting practices happen in larger
    companies as well—most notably in software companies. While many attributes match
    those of stand-alone companies, there are a number of differences as well and
    many, many lessons to be learned, especially for those who are moving from a standalone
    practice to a company.


    At the end of each chapter, we’ll also take the liberty of including a Further
    Reading section. Don’t worry, you don’t have to read all the books. If you did
    though, you should probably just be given an MBA. We’re all pretty busy. So, while
    there’s usually more value in reading a book than listening to it, please note
    that a good number of these are actually available on Audible.


    Ultimately, this book is meant to be lessons that I share with you, not a rulebook.
    You have a business. Maybe you’ve been in business for a long, long time. Maybe
    you’ve been helming a business for awhile. Whatever your situation, you’re probably
    way smarter than me. And not all of these lessons will work for you, given the
    values you have and how you want to run your business. But maybe something I put
    in black and white here can actually be used to make you enough dollars to warrant
    the amount of time you spent reading the book!


    First, Let Me Talk You Out of This…


    ## Before You Start a Company


    The stress of starting a company can literally kill you. Starting a company can
    lead to wrecking every relationship in your life. Starting a company will cause
    you to grow old faster. You are likely to go bankrupt. You will hire people who
    are likely to hate you eventually. You will not “be in charge of your own destiny,”
    as your clients will be in charge of your destiny. In short, it’s gonna’ suck.


    You will work more hours than you ever knew about. You will give large sums of
    money to lawyers and accountants. You will spend time away from the real world,
    building a business, instead of building relationships with friends and family.


    Yes, Ross Perot sold Managed Services Providers for 10+ billion dollars. You won’t.
    Yes, you can hang out your shingle after working for a consultant, passing business
    to consultants, or hiring consultants. Don’t. You think you can do it better than
    the consultants out there that have let you down for one reason or another? You
    can’t. Again, this is gonna’ suck.


    If you find success, you can still go bankrupt from poor financial planning. If
    you find success, you will be sued. If you innovate, you will be copied. If you
    hire people, they will leave you. And you will keep on until you sell out or go
