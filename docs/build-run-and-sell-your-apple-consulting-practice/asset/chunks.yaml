    opened 390 tickets in June, what percentage were assigned and then closed on time?


    *   End User Ratings: This is tricky. Most companies either survey end users or
    they survey their contact at a customer (this tends to align with the size of
    the fleet of devices being supported). Have the end users and your customer contacts
    rate your performance.


    Customers should be happy. But you need to run an efficient organization. In support
    of this, we’ll look at internal processes in the next section of the Balanced
    Scorecard.


    ### Internal Processes


    Internal processes are there to provide that consistency factor to customers,
    control costs, and give you the ability to keep taking on new customers with a
    wider and wider profit margin as you grow, while maintaining a consistent high-quality
    service. Some process attributes I like to look at include the following:


    *   Time to Patch: How long between the time a piece of *supported* software is
    released until the time it shows up on a computer. This can be tough. I mean,
    what happens if the software is buggy and you decide not to deploy it across the
    fleet of computers you manage?


    *   Calls Due to Patches: I’ve never seen anyone else track this, so I might just
    be crazy, but to me, the only way to properly reduce the amount of time to patch
    systems is to automate that process. And if you’re automating it, you need to
    reduce the impact of said automation on your customers. Tracking the impact of
    that automation is then critical to tracking the effectiveness of your efforts


    *   Tickets closed from automation (not included in MTTC): I started including
    this a few years ago. The old t-shirt that says “I will replace you with a very
    small shell script” isn’t exactly the point. The point is to be able to free intelligent
    and driven staff from having to perform menial tasks. For every one of those tasks
    that can be completed automatically, there is time for your team to take on other
    tickets, or better, to innovate the business.


    *   Percentage of Tickets Closed Remotely: Similar to closing tickets with automation,
    you want to keep butts in chairs. Travel time is expensive and stressful. Tools
    like LogMeIn, TeamViewer, PCAnywhere, and Bomgar help you access systems remotely.
    Customers and staff might push back on how much you want to use these tools. Handle
    those objections, as the higher this number gets, the more profitable your organization
    can be, long-term.


    I then always save something about the long-term performance of the company for
    the end. Additionally, I’ve seen people include things that are purely operational
    like the number of tickets closed within a given amount of time, the amount of
    labor spent to close tickets, the number of total tickets opened (usually for
    managed services customers), how quickly mileage or expense reports are turned
    in, and other very short-term issues that good systems will help you resolve instead
    of constantly sweating the small things.'
  trans: '

    ### 财务


    最终，每个企业或业务单元都以其财务结果作为评判标准。无论员工或团队怎么想，不包含财务指标的一列都是一个错误。财务这一列显示的是好消息还是坏消息，你对员工越透明，他们就越能理解自己的表现如何影响公司的业绩。我曾听到过员工会在艰难时期离职的论点。但这没关系；请记住，虽然优秀的员工是商业中最难求的资源之一，但忠诚无疑是成为“好员工”的重要组成部分。


    让我们看看我喜欢在平衡计分卡财务部分使用的一些指标：


    -   **合同续签**：前面我们提到了净推荐值（NPS），这是客户告诉你他们愿意向他人推荐你公司的程度。但我喜欢合同续签的地方在于，这是客户用钱包投票的地方。话虽如此，如果你有很高的续签率但净推荐值很低，客户可能感觉被你的公司束缚住了，这是一个问题。你不可能一直提供糟糕的服务。

    -   **现有客户增长**：企业需要增长。引进新客户很重要。留住客户也很重要。在现有客户中拓展业务是一个关键指标，它显示了你如何培养和维护现有客户的信任。

    -   **新客户**：关于全新客户，这告诉了你对于你的市场而言，你的吸引力或易被找到的程度如何。你在销售和营销上的投入，以及你在构建服务产品方面的成果，都会在平衡计分卡中体现出来。

    -   **毛利率**：关注利润率的好处在于它覆盖了运营费用。如果你不小心，很容易就会在获取和维护客户上花费超出其价值的成本。


    其他我看到过的指标，通常用于解决组织内有时限性的问题，包括应收账款和应付账款。这两者都可以归入像现金流这样的单一属性，但通常我会在这里划清我要与员工分享内容的界限，因为这往往是信息过多了。是的，透明度是好的，但肯定有些地方你需要划定界限（我也将薪资归入此类——尽管薪资透明度是一个日益重要的话题，且在国际组织中并不一致）。


    ### 备注


    我喜欢薪资透明的概念，因为它对多元化、职级平等等方面有着巨大的影响。如果由我决定，一夜之间，世界上每家公司可能都会在互联网上公布所有薪资。但事实并非如此。除非每个人都这样做，否则很难说会发生什么。但无论对你的员工产生什么影响，如果你选择这样做，我都支持你，当然前提是你的薪资也在其中！


    ### 客户


    财务是计分卡上最容易理解的大局指标。但根据我的经验，最有可能推动计分卡整个类别未来变化的因素是客户满意度。什么是满意度？通常是指你的组织高效工作、提供价值、良好沟通，并在服务交付中保持一致。让我们看看我喜欢包含在平衡计分卡客户部分的一些组成部分。


    -   **净推荐值 (NPS)**：上一节已经描述了净推荐值，但概括来说，这是一个行业标准，也是我认为所有组织都应该追踪的最关键指标之一。

    -   **客户满意度 (CSAT)**：与净推荐值类似，客户满意度是一个简单的评分。在这里，你要求客户对你的表现进行评分。我倾向于在用户关闭服务单时进行评分。这种功能目前已内置于大多数服务台解决方案中，使客户能够即时评估你的表现。

    -   **平均关闭时间 (MTTC)**：平均需要多长时间来关闭服务单。确保按类别细分，因为每个类别可能有不同的服务等级协议。考虑到时间会变化，并且特定客户基本上可以购买更好的服务等级协议，我喜欢的一种方法是简单地统计你满足服务等级协议的频率。例如，如果六月份你开了
    390 个服务单，其中指派并在规定时间内关闭的百分比是多少？

    -   **最终用户评分**：这很棘手。大多数公司要么调查最终用户，要么调查他们在客户方的联系人（这往往与所支持设备群的规模相关）。让最终用户和你的客户联系人给你的表现打分。


    客户应该满意。但你需要运营一个高效的组织。为了支持这一点，我们将在平衡计分卡的下一部分探讨内部流程。


    ### 内部流程


    内部流程的存在是为了向客户提供一致性因素，控制成本，并让你在保持稳定高质量服务的同时，能够以越来越宽的利润率持续接纳新客户。我喜欢关注的一些流程属性包括：


    -   **补丁部署时间**：从受*支持*的软件发布到它出现在计算机上所需的时间。这可能很棘手。我的意思是，如果软件有缺陷而你又决定不将其部署到你管理的计算机群上，那会发生什么？

    -   **因补丁产生的呼叫**：我从未见过其他人追踪这个指标，所以可能只是我个人的想法，但对我来说，要适当缩短系统补丁的部署时间，唯一的方法就是自动化该流程。如果你在进行自动化，就需要减少该自动化对客户的影响。那么，追踪自动化的影响对于追踪你工作的成效就至关重要。

    -   **通过自动化关闭的服务单（不计入平均关闭时间）**：几年前我开始纳入这个指标。那句老口号“我会用一个很小的 shell 脚本来取代你”并非完全准确。关键在于能够解放聪明且富有动力的员工，让他们免于执行琐碎的任务。每完成一个可以自动化的任务，你的团队就有时间处理其他服务单，或者更好地，进行业务创新。

    -   **通过远程方式关闭的服务单百分比**：与通过自动化关闭服务单类似，你想让员工待在座位上。出差时间成本高且压力大。像`LogMeIn`、`TeamViewer`、`PCAnywhere`和`Bomgar`这样的工具能帮助你远程访问系统。客户和员工可能会对你使用这些工具的意愿有所抵触。处理好这些反对意见，因为这个百分比越高，从长远来看，你的组织就能获得越高的利润。


    然后我总是把关于公司长期表现的内容留到最后。此外，我还见过人们包含纯运营性质的指标，例如在给定时间内关闭的服务单数量、用于关闭服务单的劳动力成本、开设的服务单总数（通常针对托管服务客户）、里程或费用报告的提交速度，以及其他一些非常短期的问题，好的系统会帮助你解决这些问题，而不是让你一直为小事抓狂。

    '
- fmt: '### Learning & Growth


    Don''t just be concerned about the short-term and financial performance of your
    company. Think about the long-term potential of the company and the employees
    as well. This will make you a great place to work.


    - **Roadmap Completion:** In a software development company, the roadmap lays
    out the features you want to ship at your company. But I like to use the term
    roadmap at a services company. Basically, the roadmap is where you want your company
    to be going. This is likely the best long-term indicator that you are being deliberate
    and not just following where the business is taking you (for better or worse).
    I like to build a roadmap that includes developing new services (e.g., BDR, antivirus,
    CRM) and tracking the readiness, sales effectiveness, and time it takes to be
    able to deliver those services. I also like to put automation efforts and the
    implementation of centralized ticketing and device management systems on my roadmaps.


    - **Resource Allocation:** A lot of employees are most happy when they''re busy.
    But you should limit your expectations and make sure teams feel comfortable having
    time to learn. I like to set a target resource allocation. And when you''re going
    above that, it''s time to hire. When you''re going below that, it''s time to get
    creative with new client acquisition.


    - **Employee Satisfaction:** Do your employees like where they work? What do they
    like about it? Culture is one of the most important aspects of why people stay
    at a given organization, but also shows you how engaged and therefore effective
    your staff is. As you might have guessed by now, I love surveys. So do the good
    people at Culture Amp (`http://www.cultureamp.com`). The thing I like about using
    a tool like Culture Amp instead of trying to make up my own metrics is that, well,
    they''re the experts in quantifying Employee Engagement, Employee Experience,
    and Employee Effectiveness.


    - **Learning Plan Completion:** This is all about the staff. Never forget that
    a consultancy is a services business, and the most valuable part of a services
    business is usually the people who deliver those services. Usually, employees
    who are learning are happy employees. The reason we track resource allocation
    is to make sure we''re well staffed. Building learning plans help to steer your
    team in the right direction. Tracking their progress on a learning plan tracks
    the effectiveness of that time, while providing flexibility for each team member
    to learn the way they need to learn, rather than how you think they should be
    learning.


    Everything is possible. So if you want all of these in a webpage that you can
    display on the AppleTV in the office, then you can make that happen. It might
    take a lot of work to pull off, and so if you have a little bit of manual data
    entry or automation around putting metrics into a database then so be it. It will
    be worth it.


    One final point on Scorecards. Customers should be able to see the BSC, or at
    least the elements of the BSC that are customer-facing, when possible. Categories
    that have made sense to share with customers in the past include Learning & Growth,
    Customer, and Internal Processes (or at least parts of those categories). In my
    attempts to build a link between various systems, I''ve frequently had to switch
    to use an API pull from disparate systems (e.g., Autotask, QuickBooks, and Jamf)
    into a centralized database. Despite lofty promises from people in sales, I have
    had vendors claim they can get me pretty dashboards automagically, but I''ve yet
    to see something that touches every system I use without plenty of customization.


    ## Testing


    Don''t ever believe anyone in sales. Especially if I''m on the sales call. Despite
    the best possible intentions, you may be lied to. OK, not lied to, but the answer
    might not be as informed about the exact thing you''re asking about as it could
    be. Or you might hear what you want to hear. Point is, you need to see things
    with your own eyes to avoid any potential miscommunication. Don''t take the word
    of a systems engineer, seller, or even the actual developer of a tool. Before
    you commit to a purchase, you need to see things work the way you want them to
    work. Otherwise the tool is just vaporware. This is compounded when you''re using
    a hodgepodge of tools to build a comprehensive solution, with defined workflows.


    So how should you go about testing these complicated workflows? Once you''ve come
    up with a scenario you can deal with, think about taking it through the entire
    end-to-end process. Build a list of must-have features, a list of features you
    can build, and a list of those you cannot live without. Then build a testing matrix
    that includes each step in a series of tasks. Then try to configure all the parts
    of your deployment.


    Once your deployment is working, you''re not going to want to mess with it all
    that much. But you''ll have to. Software updates will come, new features will
    force new automations, and every time you do something, you''ll want to repeat
    all your tests. Therefore, I recommend having a full testing environment that
    is as identical as possible to your production environment.'
