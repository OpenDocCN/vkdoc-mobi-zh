  trans: "\n# 构建服务包\n\n捆绑销售是在大型组织中提升服务销售额的绝佳方式。由于易于解释，它们还能减少销售过程中的摩擦。一旦你知道了必要的利润率，就来看看你的成本、可计费百分比与组织为促成销售而付出的时间百分比，减去转售商利润，然后算出必要的每日数字。很简单，对吧？让我们从日均价格与成本结构中提取利润率：\n\
    \n> `((年计费天数 * 建议零售价) * 平均转售商利润率) / 年度部门成本`\n\n如果你拉取一份销售总商品报告，就能相当清晰地了解与团队运营相关的成本以及可能出现的复杂性。上述公式可快速填入电子表格或数据库。而且它只会变得越来越复杂。一旦你知道了每日成本、必要利润率和实际目标，现在我们就来构建一个服务包。想知道为什么我之前说要在做这个练习之前（在你执行此操作之前）先确定定价吗？这是为了进行合理性检查。\n\
    \n## 提示\n\n只要有可能，我倾向于与大型组织内的服务团队按日增量工作。如果你正在开会或需要快速做出决定，了解每日成本和每日利润能为你提供一个很好的基准。即使你处理的是固定成本的《工作说明书》，你也会根据完成可交付成果所需的时间来进行计算，以构建服务包。\n\
    \n服务包旨在让购买服务变得更简单。这能让团队更轻松地沟通客户将获得什么。有两种处理捆绑销售的方式：按天或按可交付成果。然后你需要决定是否将服务与组织产品组合中的其他产品捆绑。例如，假设你的组织销售培训课程。你可以将\
    \ 5 天的培训课程和 5 天的定制服务捆绑在一起，对其应用 10%或 20%的折扣，这样客户更有可能购买该服务包，从而可能为你带来原本无法获得的额外销售。\n\
    \n按天捆绑意味着需要编写的《工作说明书》更少（“更少”与“没有”截然不同）。这会影响你的成本，并且客户总是期望在批量购买时获得折扣。只需确保在叠加转售商利润后，你仍能达到目标利润率。\n\
    \n既然你已经构建了服务包以及可应用于它们的适当折扣，那么是时候建立支持业务服务组件的流程，或对其进行优化以匹配新的服务包了。\n\n## 变更控制\n\n\
    一旦你构建了计划推向市场的产品和服务，它们应该接受审查，然后进入某种变更控制流程。每个组织的审查方式会有所不同，但请对此心怀感激，而不要有任何抵触情绪。\n\
    \n如果没有人愿意提供审查意见，那就去找产品管理团队。所有产品管理团队都乐于对你可能询问的任何事情提供反馈，包括产品本身、产品相关的所有方面、制作花生酱果酱三明治的最佳方法，以及关于齐柏林飞艇乐队和平克·弗洛伊德乐队哪个对摇滚乐影响更深的无休止辩论。\n\
    \n## 将服务运营化\n\n每个公司都会有不同的领域需要检查确认，然后你才能认为你的新服务包和运营可以自动运行，这实际上是任何业务功能的真正目标。根据公司的规模，你需要与一些团队会面，解释你将要做的事情及其原因。其中一些团队甚至还会给你布置“家庭作业”。\n\
    \n以下是一些你应该提出的问题，如果你的组织中有处理这些问题的团队，请安排会议以确认你的假设。\n\n-   **法务团队**：提供服务最重要的方面之一是确保你与客户签订的合同涵盖了向客户提供的所有商品和服务。任何时候你更改或添加一个`SKU`，都要与你的法务/合同团队预约，核实这些内容是否涵盖了你正在做的事情。如果你的法务团队管理公司保险单，也请一并审查这些保险单；否则，请同时与保险/风险团队和法务团队合作，确保保险单涵盖你将提供的服务范围。\n\
    \n-   **销售运营团队**：大多数销售团队需要一个`SKU`。我们稍后会讨论销售赋能，但你需要向销售运营团队提供产品名称和成本清单。尽早安排这次会议，因为许多组织有特定的变更窗口期，在这些窗口期内可以更改`SKU`，这是因为分销商和转售商也有类似的窗口期。通常，你所做的更改至少需要\
    \ 60 天才能对转售商生效。此外，还要敲定与合作伙伴进行沟通和销售赋能的任何细节。\n\n-   **财务团队**：你已经协调好了`SKU`，但现在需要弄清楚它们被销售后会发生什么。需要解决的一些细节包括：\n\
    \    -   何时确认收入（例如，在服务交付时，还是在服务合同期限内平均分摊）？财务部门将如何报告？\n    -   财务成本对已确认的收入有何影响，包括佣金、成本、未分配费用、设施成本、分包成本等？\n\
    \    -   一旦收入被确认，从这些`SKU`中产生的收入实际如何分配，以及你将如何对此进行报告？\n\n-   **工单系统**：这是一个重要的组成部分。你需要以这样一种方式开立工单，即不要使支持客户的工作比原本更加困难。因此，你的工单需要使用与你的支持团队相同的系统。但工单系统可能还需要跟踪差旅，并支持对基于时间计费的顾问使用情况的报告。此外，如果你根据工单关闭来确认收入，请确保与财务部门协调好如何获取这些报告。\n\
    \n一旦你解决了所有这些细节，就把它们写下来。如果你的公司有内网或维基平台，请将信息放在那里。尽可能详尽地记录，然后让你会面过的团队确认你做的笔记，这些笔记随后会变成文章。这些资料还可以作为未来有人询问服务运营如何运作时的常见问题解答。\n\
    \n既然你已经解决了一大堆细节问题，要做好准备迎接更多我无法提前为你准备的问题。一旦这些问题也解决了，你就可以着手开展营销和销售赋能工作了。在开始与销售团队合作之前，首先要确保你的营销团队已经提供了良好的“空中掩护”来支持他们的工作。\n"
- fmt: '# Marketing


    Once you have a product, it’s time to develop a marketing plan. This is similar
    to how you’d market your own consultancy, covered previously in the book, except
    rather than spending your own money, you’re probably going to try to convince
    someone in a marketing department to spend their budget.


    Getting allocated budget is the easiest at the end of a year. If you start at
    a company in July, and they’ve already planned all of their advertising and marketing
    expenditures for the year, then chances are, you won’t be able to get much done.
    But that’s when it’s time to start talking about the next year and what you want
    to accomplish then.


    In the meantime, you’ll want to build as many assets as you can. And you’ll need
    to keep those assets up-to-date. This includes internal sales and marketing enablement
    assets, as well as external assets that teams can give out via e-mail campaigns,
    at conferences, etc. These assets include:


    *   **Customer success stories**: Customers bought services and got to market
    so much faster. And it was awesome. You see the draw there, right?

    *   **One-pagers**: Ideally, this would be one per product SKU, which could be
    handed out at conferences.

    *   **Stock imagery**: If you can’t buy advertising yet, you might as well pick
    up some assets to start building advertisements in the meantime.

    *   **Contribute to other marketing assets**: Yes, it just so happens that the
    better you get at working with people, the more likely they are to be willing
    to help you.


    Once you have some good lift on the marketing front, it’s time to start working
    with sales teams on enablement.


    # Sales, Sales, Sales


    Sales teams are your best friends and your worst enemies. They sell your services
    and so in a way are the reason you’re at the organization. But they also want
    to provide discounts quite often. And discounting services and other ancillary
    SKUs is often much easier than discounting the core product. And honestly, the
    company is in business to sell the core product, so it should be.


    But you have a margin target. And comping services to win sales is causing your
    blood pressure to go through the roof. If there are a lot of free services going
    out, eventually someone is going to ask why the margin of the services business
    sucks. Even if they say they won’t ask, they will. And when that happens, it’s
    important to be able to tell a compelling story. The easiest way to do this is
    to show on the actual P&L that you’re making profit (and let’s face it, how can
    you not make profit in services?!?!). How do you do so with free services? Charge-backs.


    The simplest way to describe a charge-back is it’s taking the discounted service
    days and charging it to another team. If a sales team is “dinged” for discounting
    your SKUs or giving them away, they’re far less likely to do so, even if a charge-back
    is performed using a soft cost rather than the opportunity cost that you aren’t
    billing.


    But as mentioned, sales can be your best friend. They are the life-blood of the
    organization, bringing in new business and closing sales of the services you’re
    charged with delivering. And the more attention you give them, the more services
    are front of mind and the more they sell. So here are some of the levers used
    to drive desired sales behavior in your organization.


    Always make sure sales and account teams have all of the assets they need. If
    they need something, make it. And before they ask, you might as well build the
    following:


    *   A one-pager that can be distributed externally, describing each SKU.

    *   E-mail templates describing the service or bundle.

    *   Talk tracks around services and bundles.

    *   Statements of Work per SKU to provide to customers.

    *   FAQs or Wikis outlining common questions and answers about the service.


    This is removing any barrier to the seller feeling comfortable selling your services
    products and therefore making them more confident. And quite frequently, confidence
    is the most important aspect of selling. If you want to increase the sales of
    services, focus on making those sales teams confident and staying in front of
    them doing brown bag lunches, enablement meetings, dropping off donuts, and, of
    course, asking them for feedback.


    Once services are selling, it’s time to build a team to deliver services. Unless
    you’ve already built a team. Then it’s time to manage that team.


    # Staffing


    Careers of employees in a consulting firm are pretty straightforward and we dedicated
    an entire chapter on them in this book. But careers of service employees in a
    larger company are a bit different. Keep in mind that your best possible outcome
    for one of your staff is to leave you. Or replace you. The best feeling is when
    those who deserve to do so, replace you.


    All that training, all that work, and suddenly they’re better off when they leave
    the services team. Why’s this? Well, let’s start with why employees would be leaving
    in the first place.


    *   **To get in front of the product**: How many people have been in front of
    as many customers in real-world scenarios as those who go to customers and do
    work? Those are often the best situations to then build product roadmaps. At some
    point, many in services will get tired of complaining about priorities and will
    instead want to get more active about the future of the hardware or software that
    your organization makes.

    *   **To get closer to the product**: Services engineers often make great Quality
    Assurance (QA) testers (after all, they’ve been testing the product with customers
    after it’s been released) or can easily end up moving into development teams provided
    they’ve acquired those types of skills.

    *   **To move into sales**: Few in services will want to admit this, but in a
    hardware or software company, they make some of the best possible system engineers
    you can ask for. Those who actually try to move into sales can not only talk the
    talk, but they can walk the walk as well.

    *   **Travel is too much**: The previous reasons were other roles that services
    engineers might move into. This is a reason someone might choose to leave the
    company outright, if you can’t find a solution. Many team members begin the job
    loving the travel, but then as we grow up, we want to have relationships and children
    and settle down.


    There are certainly going to be other reasons. But those are by far the main ones
    that I’ve seen thus far. Some organizations choose to build very small teams or
    not build a team at all and instead rely on subcontractors, which we’ll cover
    in the next section.'
