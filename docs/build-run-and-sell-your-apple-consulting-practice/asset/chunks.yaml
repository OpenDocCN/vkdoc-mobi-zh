  trans: '

    # 极客工具箱


    本书接下来的几页将介绍一系列工具，这些工具将使 Apple 设备的使用更简便、更易实现自动化，且更具成本效益。这些工具是技术人员、DevOps 和帮助台将要使用的，此外还有一些业务线工具，它们可能为客户提供追加销售附加服务的好机会。


    为了保持供应商中立，我尝试按类别以字母顺序列出解决方案。每个类别的简要说明及所列工具类别如下：


    - **杀毒软件**：用于扫描 Mac 病毒和其他恶意软件的解决方案。


    - **自动化工具**：用于自动化管理 Mac 的脚本类工具。


    - **备份**：我强烈建议向您的客户（无论是家庭、小型企业还是大型企业）捆绑或转售某种形式的备份服务。必要时从备份中恢复设备的能力，是将成本控制在可接受水平、并在合理时间内将设备交还客户手中的最重要因素之一。


    - **客户关系管理**：用于跟踪联系人及与联系人沟通的 Mac 友好型工具。


    - **协作套件**：曾几何时，Mac 服务器很擅长提供共享日历、联系人和电子邮件。但大多数企业都不愿处理邮件服务器可能出现的停机后果。没有什么比电子邮件中断更能让您辛辛苦苦赢得的客户解雇您了。因此，虽然列出了
    Mac 服务器，但为了最佳客户保持率，请考虑云选项。


    - **DEP 启动画面和帮助菜单**：通过向用户提供更多信息，使 DEP 和服务台流程更加用户友好的工具。


    - **开发工具、IDE 和文本编辑器**：用于构建脚本、编写和调试软件以及操作文本的工具。


    - **数字标牌和自助服务终端**：我将其列入其中，是因为我知道许多组织通过代表客户转售或部署这些工具，创造了不错的小额额外收入流。我也有朋友仅围绕这些工具就创建了托管服务产品。总的来说，这是一个可能的新的收入来源，而且额外的好处是，您很可能获得一份
    NFR（或非转售版软件），因此您可以在办公室拥有很酷的标牌（如果您喜欢这类东西的话）。


    - **目录服务**：主要提供对共享服务目录的本地访问，并允许对这些服务进行单点登录的工具。


    - **文件共享**：以 Mac 为中心的云端和本地文件共享与同步工具。


    - **身份管理**：主要提供基于 SAML 的单点登录解决方案的提供商，这些方案联合了 Apple 设备的安全认证以访问基于 Web 的服务。


    - **镜像与配置工具**：用于将设备置于特定状态或创建该状态的工具。这包括适用于传统 Mac 的工具以及为 iOS 构建的工具。


    - **业务线**：传统上专注于 Mac 的解决方案，用于自动化各种业务功能。


    - **日志收集与分析**：集中式日志记录对于大型、不断增长的设备群来说一直是一项必需品。现代工具可以从客户端计算机存储大量日志，并允许快速和复杂的搜索，从而使您能够快速有效地定位问题。作为额外的好处，您还可以集中管理网络设备的日志，从而能够在一个完整的设备生态系统中隔离问题的根源。


    - **管理套件**：用于管理 Apple 设备设置的工具。每个都标记为 MDM、基于代理或两者兼有。


    - **打印服务器**：提供打印机访问或允许更精细打印功能（如成本核算）的服务器。


    - **远程控制与管理**：这些工具允许您控制设备的屏幕、键盘和鼠标。我无法告诉您哪些是最好的。但我可以告诉您，我希望我的远程控制解决方案是跨平台的、基于云的、能提示用户接受远程控制会话的，并能审计连接，以便我知道谁在接管哪些设备。


    - **打印服务器**：我一直讨厌打印机。无论是老式的 Fiery 打印服务、常见的基于 LPR 的打印机，还是共享打印服务之一，我仍然无法忍受管理打印机。打印机卡纸、损坏、驱动程序似乎在每次操作系统更新时都充满问题，打印机通常通过
    ad-hoc 网络（如 Bonjour）连接，并且您通常需要特殊软件才能访问其酷炫功能。总而言之，打印机糟透了，但这些工具可能会让它们的使用稍微容易一些，或者如果没有，它们能帮助核算谁在使用打印机，以便您的客户尽可能多地向其部门收费。


    - **销售点**：类似于数字标牌，但您也可能在这些解决方案中运营店面或跟踪客户数据。


    - **远程管理**：用于控制 Apple 设备屏幕的工具。


    - **安全工具**：用于管理防火墙、FileVault 以及执行其他基于给定组织安全态势所需的安全 Mac 任务。


    - **服务台工具**：这些工具用于工单和工单管理。如果您能选择一个既与您的计费解决方案集成，又与您选择使用的其他各种极客工具集成的工具，那将非常棒。


    - **软件打包与包管理**：用于在 Apple 平台上规范软件以进行大规模分发的工具。


    - **存储**：专注于 Apple 的文件共享解决方案。


    - **故障排除、维修与服务工具**：用于修复硬盘逻辑问题、检查硬件故障、修复各种系统问题或仅用于清理 Mac 的工具。


    - **虚拟化与仿真**：并非所有软件都能在 Mac 上运行。客户可能会有某些需要 Windows 机器的任务。您可以使用 Citrix 或 Microsoft
    终端服务器来满足这一潜在需求。或者，特别是如果用户需要在离线时从其 Windows 应用程序获取数据，您可以使用本地虚拟化工具。

    '
- fmt: '# Antivirus


    - [AVG](http://www.checkoutapp.com/): Basic antivirus and spyware detection and
    remediation.

    - [Avast](https://www.pingidentity.com/?gclid=EAIaIQobChMIgqS41MS-1wIV04KzCh2TLwdeEAAYAyAAEgKDMPD_BwE):
    Centralized antivirus with a cloud console for tracking incidents and device status.

    - [Avira](https://atom.io/): Antivirus and a browser extension. `Avira Connect`
    allows you to view device status online.

    - [BitDefender](https://puppet.com/): Antivirus and malware managed from a central
    console.

    - [CarbonBlack](https://macadmins.herokuapp.com/): Antivirus and `Application
    Control`.

    - [Cylance](http://grandperspectiv.sourceforge.net/): Ransomware, advanced threats,
    fileless malware and malicious documents in addition to standard antivirus.

    - [Kaspersky](https://github.com/rtrouton/Simple-Package-Creator): Antivirus with
    a centralized cloud dashboard to track device status.

    - [Malware Bytes](http://mothersruin.com/software/SuspiciousPackage/): Antivirus
    and malware managed from a central console.

    - [McAfee Endpoint Security](http://s.sudre.free.fr/Software/Packages/about.html):
    Antivirus and advanced threat management with a centralized server to track devices.

    - [Sophos](http://netatalk.sourceforge.net/): Antivirus and malware managed from
    a central console.

    - [Symantec Mobile Device Management](http://www.microsoft.com/): Antivirus and
    malware managed from a central console.

    - [Trend Micro Endpoint Security](https://github.com/unixorn/luggage): Application
    whitelisting, antivirus, ransomware protection in a centralized console.

    - [Wandera](https://github.com/munki/munki-pkg): Malicious hot-spot monitoring,
    jailbreak detection, web gateway for mobile threat detection that integrates with
    common MDM solutions.


    # Automation Tools


    - [AutoCasperNBI](http://www.kioskproapp.com/): Automates the creation of NetBoot
    Images (read: NBI’s) for use with `Casper Imaging`.

    - [AutoDMG](https://www.symantec.com/products/endpoint-management): Takes a macOS
    installer (10.10 or newer) and builds a system image suitable for deployment with
    `Imagr`, `DeployStudio`, `LANrev`, `Jamf Pro`, and other `asr`, or `Apple Systems
    Restore`-based imaging tools.

    - [AutoNBI](https://github.com/bruienne/autonbi): Automates the build and customization
    of Apple NetInstall Images.

    - [Dockutil](http://macpaw.com/cleanmydrive): Command line tool for managing dock
    items.

    - [Homebrew](https://www.avg.com/): Package manager for macOS.

    - [Cakebrew](https://itunes.apple.com/gb/app/disk-doctor-clean-your-drive/id455970963):
    Provides a pretty GUI for `Homebrew`.

    - [Jamjar](https://www.alsoft.com/DiskWarrior/): Synergises `jamf`, `autopkg`
    & `munki` into an aggregated convergence that cherry-picks functionality from
    each product’s core competency to create an innovative, scalable, & modular update
    framework.

    - [MacPorts](https://objective-see.com/products.html): An open-source community
    initiative to design an easy-to-use system for compiling, installing, and upgrading
    either command-line, X11, or Aqua based open-source software on Macs.

    - [Precache](https://www.synology.com/en-us): Programmatically caches Mac and
    iOS updates rather than waiting for a device to initiate caching on a local caching
    server.

    - [Outset](https://itunes.apple.com/us/app/macos-server/id883878097): Automatically
    processes packages, profiles, and scripts during the boot sequence, user logins,
    or on demand.


    # Backup


    - [Acronis](https://duo.com/): Centrally managed backups with image-based restores.

    - [Archiware](https://macmule.com/projects/autocaspernbi/): Centrally managed
    backups to disk and tape with a variety of agents for backing up common Apple
    requirements, such as `Xsan`.

    - [Arq](http://www.libimobiledevice.org/): One-time fee cloud-based backups and
    unlimited storage.

    - [Backblaze](http://developer.apple.com/): Unlimited continuous backup with a
    30 day rollback feature.

    - [Carbon Copy Cloner](https://www.bresink.com/osx/HardwareMonitor.html): File
    or disk-based cloning of files for macOS.

    - [Carbonite](https://www.malwarebytes.com/): SaaS or local-server based backups
    of Mac clients.

    - [Crashplan](http://www.memtestosx.org/): Backup to cloud and local storage with
    a great deduplication engine.

    - [Datto](https://www.prosofteng.com/drive-genius-mac-protection-software/): Local
    and cloud backup and restore, as well as cloud failover for various services.

    - [Druva](https://www.symantec.com/mobile-device-management/): Backup for local
    computers as well as some backup for cloud services.

    - [Quest Backup (formerly Netvault)](https://itunes.apple.com/us/app/easyfind/id411673888):
    Can backup Mac clients and `Xsan` volumes to a centralized tape or disk-based
    backup server.

    - [SuperDuper!](https://istumbler.net/): Duplicates the contents of volumes to
    other disks.

    - **Time Machine**: Built-in backup tool for macOS.


    # Collaboration Suites and File Sharing


    - [Atlassian](http://twocanoes.com/push-diagnostics): Development oriented suite
    including wiki (`Confluence`), issue tracking (`Jira`), messaging (`HipChat`),
    and other tools.

    - [Box](https://www.mobileguardian.com/): File sharing in the cloud.

    - [Dropbox](https://www.macbartender.com/): File sharing in the cloud.

    - [Egnyte](https://www.bresink.com/osx/TinkerTool.html): Caches assets from popular
    cloud-based services so they''re accessible faster on networks where they''re
    frequently accessed.

