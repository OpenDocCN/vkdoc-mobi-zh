- fmt: '# Email Marketing Strategy


    Have a Call to Action (`CTA`). If you send an e-mail about preparing taxes during
    tax season, have a button with a `CTA`. A great way to achieve this is to coordinate
    a blog post and have a "read more" button—and then a `CTA` within that post. The
    longer you can keep a prospect''s attention, the more likely they are to convert
    into a customer. The longer you can keep a customer''s attention, the longer they
    are likely to stay with you.


    Pay attention to when people unsubscribe. This is simple: stop doing whatever
    it is you''re doing that made them unsubscribe.


    You have very little mindshare with customers. Don''t squander it. Help them and
    don''t be too salesy. Feel free to throw in a cute picture every now and then
    and keep on those metrics. If people are clicking, you''re doing something right.
    If they''re not clicking, you''re not!


    ## The Cadence


    I can''t really go into the contents of each e-mail you should send in this book.
    There simply isn''t time. And if I did, there would be way too many companies
    using the same stale content. It should rotate from time to time. But, I can help
    potentially spark some ideas.


    These might not work for your specific situation, but they should help you think
    of some ideas.


    - Month 1: 10 Tips for Backing Up Your Computers

    - Month 2: Working Securely

    - Month 3: CRM for beginners

    - Month 4: The new MacBook (there''s always one in the works)

    - Month 5: Cool new home automation tools

    - Month 6: The benefits of always-on VPN

    - Month 7: Takeaways from this year''s WWDC (Apple''s Worldwide Developer Conference)

    - Month 8: Choosing the best router for your organization

    - Month 9: Using a proxy server to make your network faster

    - Month 10: Tips for creating better presentations

    - Month 11: 5 Ways to be more productive on a Mac

    - Month 12: IT assets and preparing your taxes with end of year purchases


    In this cadence, we were careful not to get boring. It''s important to have a
    little sales in there every now and then, such as CRM for Beginners. But other
    times, it''s all about pure productivity, like 5 Ways to Be More Productive On
    a Mac. Some e-mails are timely, such as the end of year e-mail on taxes. And finally,
    some e-mails in the cadence should be specifically geared for thought leadership.


    Your e-mails, blog content, and social media content can all be coordinated to
    flow together. `Wordpress` as a blog engine can automatically post to `Twitter`.
    And that same content can be summarized in e-mails. In the next section, we''ll
    delve into social media, so keep in mind how you might use these tools together.


    ## Social Media


    The whole social media thing isn''t just for millennials. You can build, own,
    and run your presence without the help of your nephew or a snotty hipster consultant.
    For over a decade, you''ve heard you need a "Social Strategy" or had people asking
    what you''re doing with "Social." Can social media really increase sales? Yes.
    What are the best social media outlets for various goals your company has? That''s
    according to what the goals are, which should initially be to add something to
    the top of your funnel.


    Let''s look at some examples of ways that real organizations can use social media
    to bolster sales.


    1. Get all the social properties for the name of your organization. Try to use
    the same name across social networks like `Instagram`, `Pinterest`, `Facebook`,
    `LinkedIn`, `Twitter`, and `Google+`.

    2. Run a photo submission contest on `Instagram`. Provide a hashtag that people
    are supposed to use to get evaluated and then post the winner when the contest
    is over. This type of outreach helps to expand your funnel and get your brand
    in front of more eyeballs.

    3. Create a group on `LinkedIn`. `LinkedIn` groups are for professionals who share
    a common interest to communicate about them. This is a great way to find leads,
    just don''t be too spammy.

    4. Use geography to bring business to you. Post a temporary location to get a
    free prize or entry in a drawing on `Twitter`, `Swarm`, and `Facebook`. Additionally,
    consider running a special giving the mayor of your location on `Swarm` a special
    deal, as an added little bonus for repeat business.

    5. Use smaller networks to get your message to micromarkets. If you''re a beer
    company, have a special badge made on `Untappd`. OK, not many people reading this
    will be from beer companies, but the point is to think of the specific industry
    you are in. Is there a social network for your industry, and can you do something
    cool and interesting to promote your brand there, and if there isn''t a network,
    should there be?

    6. Drive business to your website. Tweet your blog posts, add hashtags, and keep
    track of which of the hashtags actually drive people to your site. Yes, that means
    you need a blog. No, don''t post any tweets on the company account about upcoming
    elections.

    7. Stay on top of trends. Vines are gone. But there''s a newer trend, such as
    Cinemagraphs, and being on that trend can bring in a little extra boost to get
    your organization in front of companies who might be looking to purchase services
    similar to yours. At the very least, they''ll give your staff pride when done
    right.

    8. Claim your address with `Google`. If you have a retail front, or people might
    find your business based on your physical location, then make sure it''s correct
    across all the networks, including `Yahoo`, `Google`, etc.

    9. Solicit feedback on networks like `Yelp`. We all want to think our businesses
    are perfect. So make sure you have a thick skin since you can''t please all the
    people all the time. But for most, it''s pretty helpful to have some good feedback
    for people to read. More important, those stars. Give people a good experience
    and they''ll give you great reviews.

    10. Analyze the results. Get software that allows you to aggregate and possibly
    analyze the responses you get from your efforts on these networks. If you don''t,
    then you''re left with guessing about what''s working and what isn''t, which is
    likely to lead you to an analysis aligned with what you want to think rather than
    reality.


    You can also buy advertising on these networks, which can be a great way to bolster
    other activities. But even more impactful, once you start to get followers on
    these networks, is to provide a clear and concise `CTA` for each thing you do,
    as well as a larger, overarching social strategy that fits with your customer
    base. Just make sure to be your authentic self, and again, be OK with any negative
    feedback that comes back through the social channels, as negative responses will
    be unavoidable.


    ### Public Service Announcement


    I have a pet peeve about brands who automatically publish content from sites like
    `ow.ly`. I immediately stop following them and will often also simply stop consuming
    what they sell.'
