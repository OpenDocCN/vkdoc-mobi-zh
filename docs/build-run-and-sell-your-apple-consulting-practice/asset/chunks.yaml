- fmt: '# Search Engine Advertising


    In the previous chapter, we discussed Search Engine Optimization, or SEO. Another
    way to get listed at the top of almost any search engine is to simply buy your
    way there. Google, Bing, and other search engines allow you to purchase the first
    few places in a listing (usually with a term like “Sponsored” appended to the
    listing) or purchase a place on the sidebar of the search engine. This is how
    they usually make money.


    There are entire books out there on effectively buying this type of advertising.
    And I’m certainly no expert. But I’ve had some pretty solid successes, especially
    when it comes to buying advertising on search engines. The first reason is that
    I leveraged SEO to figure out the right words to buy. I can’t stress this enough.
    The second is that I started out making small purchases. The third is that I focused
    on long tail search. Let’s unpack these.


    You can’t rely on SEO bringing you business. SEO can help grow your business but
    is also useful to help you best understand what keywords you can buy that drive
    traffic to your site and, more importantly, the kind of keywords that drive traffic
    that converts into purchasing customers. Even if you aren’t ready to start spending
    money on search engine advertising, creating content, building landing pages,
    refining the messages on your pages to convert traffic, and capturing analytics
    will help pave the way for future spending on search engines like Google.


    Once you start understanding the journey a potential customer, or lead, will take
    on your site, you can start to spend a little money on sites like Google, Bing,
    Yahoo, and even Pinterest. Growing your purchases from a modest spend is a way
    to protect your advertising capital and let you build a solid practice. One of
    my favorite tools for this is free: Google Analytics. But there are other solutions
    such as `WordStream.com` that help enable you to buy keywords with lots of traffic
    more easily because they help you to analyze current searches for words.


    Many companies start out by purchasing words like “Consulting Los Angeles” or
    “Apple Consulting Venice Beach.” In general, the more words, the cheaper the ad
    buy. Buying longer streams of words that often lead to less clicks but more conversions
    (or buying customers) based on those clicks is known as long tail search and is
    a very effective way to keep your spend in check and to spend less time filtering
    out people who might be searching for help in another country or might be searching
    for the wrong thing. As an example, a quick analysis shows that “Mac” is not going
    to likely net you a single customer with a $100 spend. “Mac consulting” might.
    “Mac consulting Minneapolis” is really honing in. But your phone should ring every
    time someone searches for “Mac consulting Minneapolis Xsan” or “Mac Consulting
    Minneapolis Lightspeed.”


    ### Note


    We put the word Minneapolis in the above search. You can also target ads based
    on specific demographics and geographies to help maximize your campaign effectiveness.


    You can also use tools to help you refine the ads and find hidden gems of search
    awesome. Products like Kenshoo, Adobe Ad Cloud, `Wordstream.com`, and others will
    let you aggregate statistics, ads, do A/B testing across platforms, and provide
    a lot of the value that you would need to hire a consultant to get otherwise.
    But a smart use of money would be hiring a consultant to help you set up those
    tools, then decipher analytics, and make good ad buys.


    Ultimately, you need to make online advertising work. If you explore none of the
    other mediums in this chapter, this is the most critical. Search engines are likely
    your best bet in finding new veins of customers that you can then continue to
    grow out of. Now that we’ve covered Search Engine Optimization and Search Engine
    Advertising, let’s look at buying ads on websites, often referred to as online,
    or display, advertising.


    # Online Advertising


    Search Engine advertising is one thing. Buying ads on websites is another. Targeting
    specific sites is going to be the most cost-effective but also the most laborious
    to actually buy ads. Keep in mind that when you spend more time buying an ad than
    the ad cost in terms of your billable rate, you’re not going to be able to buy
    much advertising!


    Some of the most valuable ads I’ve ever purchased have been on websites without
    advertising, or those that really just don’t charge as much as they should. I
    ran an ad on `AFP548.com` for years and I still feel a little guilty about how
    little they charged. But while finding smaller sites to buy ads on usually has
    a great ROI per dollar spent (which extends to CAC, or Cost to Acquire a Customer),
    trying to find more and more sites, process payments to those sites, and communicating
    back and forth with site admins can be a total time suck.


    The easiest way to buy ads is to purchase them on big advertising networks. These
    networks will handle a lot of the back-end work, aggregate statistics for you,
    help you zero in on good buys, perform the buys automatically, and handle all
    of the billing. This is of course done at a markup and can be random, leading
    to your ad running on sites you might want nothing to do with. But it’s effective.


    A great way to find an ad network you want to use might be to go to a site and
    find a vertical ad network that represents that site and others. This will give
    you a channel that you can buy on. Most will allow you to do Run of Site (ROS)
    or even Run of the Network (RON), which helps them do bulk sales and helps you
    pick up some cheaper ads here and there. As you get into less and less targeted
    buys, the Cost Per Click (CPC) likely goes down, but hopefully the CAC stays about
    the same. With larger networks running an ad, it’s not uncommon to see prices
    as low as $10 CPM, or Cost per mille (per thousand impressions). However, the
    effective CPM is often a quarter of that. The larger buys become a numbers game,
    and often wildly ineffective for small consultancies.


    Some of these larger networks to check out include AdBrite, Adcash, DoubleClick,
    `Advertising.com`, ValueClick, Rocket Fuel, Right Media, Zedo, Google AdSense,
    Ad maven, Clicksor, `BuySellAds`, `Media.net`, Infolinks, Chitika, and Kontera.
    Check out each and look for features that appeal to you. There’s a lot, so you
    can afford to be picky.


    Focus on the geographies you serve. Ad networks should be able to limit your ad
    to specific geographies. This gives you more impact per dollar spent and helps
    keep you from having calls with customers in areas you don’t or can’t serve. If
    you are national or global, then reserve a fair amount of your media spend for
    the markets you’re more recognizable in for the multi-touch marketing impact,
    and use a different ad with a broader message for ads that aren’t bound to a given
    geography.


    Advertising on social media is another means of display advertising. You can buy
    sponsored posts on Twitter, Facebook, LinkedIn, Pinterest, and pretty much any
    social media outlet. Keep in mind that these come with a very low cost but aren’t
    usually very effective in the beginning when selling business services. They are
    a great way to round out a display advertising portfolio and very much worth experimenting
    with.'
