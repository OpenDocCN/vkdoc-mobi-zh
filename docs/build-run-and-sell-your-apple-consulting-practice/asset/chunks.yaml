    # 学会领导


    我在职业生涯中与许多新任管理者共事并培训过他们，发现他们常会陷入一些误区。成为优秀管理者需要时间，只要新任管理者积极学习如何管理和领导团队，人人都能胜任。本着这一精神，以下是一些值得关注的事项，或可作为新任管理者的行动指南。


    - **避免微观管理**：这很可能是管理者最经典的错误。员工需要得到指导，然后被允许掌控自己的成功与失败。通过交付流程责任而非具体任务，来释放宝贵的精力。简而言之：学会授权。


    - **减少个人贡献时间**：新任管理者往往因曾是杰出的个人贡献者而获得晋升。然而，转入管理岗位后，应将重心放在放大他人的能力上。


    - **认可他人的贡献**：从个人贡献者晋升的管理者，常会以自身过往绩效作为标准来评判他人。若团队表现达到同等水平，他们本也能获得晋升。公开认可贡献，即使你认为这“只是分内之事”。


    - **推广创意**：只要给予机会，你的团队很可能会提出比你优秀得多的想法。新任管理者需要与员工紧密合作，让他们的创意蓬勃发展。当员工感到自己有所贡献时，他们的投入度将显著提升！


    - **积极回应批评**：新任管理者毕竟是……新上任的。没人期望谁完美无缺。但人人都期望我们能以积极主动且深思熟虑的态度回应批评。我喜欢发邮件感谢他人，因为他们帮助我成长、让我变得更好。即便批评稍显负面，也要用善意“杀死”他们！


    - **公平分享收益**：如果你的团队或部门以牺牲其他团队为代价获得更多预算、曝光度或人员编制，那么在政治层面你将面临长期挑战。务必确保以有利于所有团队的方式分享收益。矛盾虽会浮现，但可通过分享改进成果来化解。


    - **不要操纵他人**：你几乎可以操纵任何人替你做事，尤其是在刚晋升管理层时。但赢得人心才是上策。这样做更为正当，也不会让员工因感觉被操纵去做自己不信服的事而心生怨恨。


    - **既要横向管理，也要向上管理**：新任管理者往往从个人贡献者中脱颖而出，常戴着“眼罩”，只关注旧团队或一线问题。然而，“向上管理”同样重要——通过此举证明组织获得了稳健的投资回报率（ROI）。这还能帮你定期确认优先级是否发生偏移。


    - **减少反馈？不**：你的目标是让团队发挥最大潜能。这意味着要帮助他们精进技能、找到未来能替代你的人选，并培养接班人。任何人都能歌功颂德；真正的挑战在于利用反馈为团队打磨抛光。


    - **为团队留出时间**：还记得那些你不得不取消的一对一会议吗？别再取消了。若有冲突，调整其中一方的时间。向团队表明他们对你有多重要。如果他们推掉你的会议，你要坚持重新安排。你的首要任务是发展团队成员的职业生涯，他们需要明白这一点。


    - **设定目标**：当你定期与团队开会时（你确实这么做吧？），应该回顾他们达成目标的进展。当员工达成目标后，再设定新的挑战目标。不必施加不必要的压力，但若丝毫不加推动，团队可能会开始感到停滞不前。


    - **了解团队的工作**：有时，新任管理者并不真正了解团队的具体工作内容。这种情况下，请花时间学习。你不必精通别人写的每一行代码的调试方法，也不必成为钣金零件加工的专家，但我发现，理解员工所做的事情有助于与他们产生共情。


    这些建议并非全都关乎纯粹的管理。许多内容也涉及如何领导团队。新任管理者可能在这些方面遇到困难，而资深管理者也总有改进空间。简而言之：关注并激励你的员工，同时别忘了在必要时向上管理！

    '
- fmt: '### Soft Skills


    Soft skills are the skills that include communication, social graces, language,
    habits, managing people, leadership, how you react to situations, and all the
    other non-position-centric parts of a job that characterize relationships with
    other people. I’ve heard soft skills referred to as how well you work with others,
    how you conduct yourself, and how you extrovert (yup, I’m using that as a verb—but
    I could have said “fit in”).


    I often hear people say that they hire based on soft skills, because you can train
    job-specific skills but not soft skills. I’ve been hiring and guiding people for
    20 years, and at this point, I think I vehemently disagree. In some cases, people
    don’t want the social graces. In others, people (especially really smart people)
    rarely have the patience. But, provided you have a willing recipient, you can
    train people on how to work well with others. Just ask Zig Ziglar, one of the
    best salespeople and a famous motivational speaker for sales. He made a career
    out of doing so.


    How do you help people develop these soft skills? Be aware. Put people in situations
    where they can collaborate with other people in increasingly meaningful ways.
    Engage with Emotional Intelligence training. Find out where people are at. Care.
    Try. That’s a lot, and pretty much sums up the overarching strategy that many
    take. I like the idea of breaking the strategy down into some tactical steps that
    you can take. So let’s take a look at some of the skills that can be developed,
    and how you might go about doing so.


    - **Public speaking:** There are organizations like Toastmasters that are dedicated
    to helping people improve their public speaking skills. But in my experience,
    it’s all about getting out there and doing it. With most skills in general, it’s
    all about repetition. With public speaking, it’s also valuable to have people
    record and watch their own presentations. Doing so helps reduce all the things
    that you do while speaking that detract from the message you’re trying to communicate
    (like gesticulation, putting your hands in and out of your pockets, rocking back
    and forth, timing, and of course not using the word “um”).

    - **Being engaging:** It’s important to be able to work a room for a lot of fields.
    Inflection in your voice, being authentic, bringing a unique perspective, actually
    listening, keeping a conversation on point, being positive (while staying authentic),
    and so much more. The best way to work on this is to just pay attention when in
    social situations. Paying special attention to watching for eyes glazing over
    during a discussion, reading other neuro-linguistic queues, choosing where to
    emphasize, and genuinely being interesting in hearing someone else speak rather
    than just waiting for your turn to talk are all other great ways to be engaging.
    The key is to be with people, talking, learning, and paying attention. Discussing
    what worked and what didn’t is also a huge help.

    - **Writing:** Most of these skills need to be practiced in person. When training
    writing skills, though, it can be equally as educational to just use track changes
    and comments. I’ve learned so much from the editors of books I’ve written. Strategic
    things like being more succinct, tactical things like ending all items in a bulleted
    list with the same punctuation, and fine-tuning items such as using less gerunds.
    Writing is a great skill that will be with employees forever. As is the patience
    you learn from taking constructive criticism.

    - **Collaboration with peers:** This is similar to being engaging but operating
    in a group dynamic. When overly engaging, we’re not accepting enough input. When
    we’re not engaging enough, we aren’t contributing to the group. A structured approach
    to collaboration can help but, especially with engineers, can just be a crutch
    that takes up a bunch of time. One challenge is to not let dogma drag you down.
    Another is to inspire the quiet people in the room. I’ve recorded meetings and
    then played them back. You usually don’t even need to point out better ways to
    handle situations, as people can see them for themselves, so if you’re trying
    to train on collaboration in this manner (or just discussing a meeting after the
    fact without a recording), just ask questions about situations and let the person
    you’re mentoring find the answer themselves.

    - **Problem solving:** As with most other soft skills, training people to be better
    at problem solving involves having people solve various problems and then providing
    constructive guidance on other creative ways to think about a problem. For example,
    one technique I’ve had a lot of success with in this regard is to point out the
    type of strategy (e.g., abstraction, reduction, lateral thinking, root cause analysis,
    analogy, trial and error) being employed when someone is going through a problem
    and how other strategies might have led to a result quicker or with more accuracy.

    - **Troubleshooting:** I put this back-to-back with problem solving because troubleshooting
    is often just problem solving specific to your industry. Depending on your industry,
    there are also lots of problem-solving methodologies (such as `GROW`, `OODA`,
    `PDCA`, `RPR Problem Diagnosis`, and `A3`) that might lend themselves well to
    keep employees on the same page in their approaches. Add the technical or logistical
    elements of problem solving specific to your organization or product to a methodology
    and you have a solid approach to teaching solid troubleshooting skills. But keep
    in mind that proficiency in your business or product is key to getting solid troubleshooting
    skills. Knowing the nitty-gritty details about a topic helps in refining your
    search for a problem.

    - **Root cause analysis:** I split this apart from problem solving because you
    can solve a problem without understanding the cause. Root cause analysis is a
    method of problem solving but can also be looked at as not just solving a problem
    but solving the cause of a problem. My favorite strategy for teaching root cause
    analysis skills is to go through a 5 Whys exercise. If you ask why a problem has
    occurred, then ask why that happened, then why, until you get to the 5th why,
    then you have gotten to the point where you can fix not only a given incident
    of a problem but the root cause of that problem. There are other tools, but for
    a number of situations, the 5 Whys exercise will get people onto a structured
    problem-solving approach that also resolves the root cause of that problem.

    - **Job-based leadership:** Management is not leadership. Leadership involves
    listening, synthesizing, and developing a strategy, or vision. Leadership involves
    understanding what motivates someone and leveraging those motivations to build
    support. To develop a strategy, a leader needs to understand the product or the
    organization. And then the leader needs to show the ability to listen to others
    and bring their ideas to the table. Teaching leadership involves other soft skills
    that help people exert influence, but it also involves understanding that you
    aren’t just building support, you’re hopefully making things better. When someone
    displays natural leadership skills, it’s also helpful to steer them away from
    manipulation. Otherwise employees will witness their leadership eroding over time.'
  raw: '### Soft Skills


    Soft skills are the skills that include communication, social graces, language,
    habits, managing people, leadership, how you react to situations, and all the
    other non-position-centric parts of a job that characterize relationships with
    other people. I’ve heard soft skills referred to as how well you work with others,
    how you conduct yourself, and how you extrovert (yup, I’m using that as a verb—but
    I could have said “fit in”).


    I often hear people say that they hire based on soft skills, because you can train
    job-specific skills but not soft skills. I’ve been hiring and guiding people for
    20 years, and at this point, I think I vehemently disagree. In some cases, people
    don’t want the social graces. In others, people (especially really smart people)
    rarely have the patience. But, provided you have a willing recipient, you can
    train people on how to work well with others. Just ask Zig Ziglar, one of the
    best salespeople and a famous motivational speaker for sales. He made a career
    out of doing so.


    How do you help people develop these soft skills? Be aware. Put people in situations
    where they can collaborate with other people in increasingly meaningful ways.
    Engage with Emotional Intelligence training. Find out where people are at. Care.
    Try. That’s a lot, and pretty much sums up the overarching strategy that many
    take. I like the idea of breaking the strategy down into some tactical steps that
    you can take. So let’s take a look at some of the skills that can be developed,
    and how you might go about doing so.


    *   Public speaking: There are organizations like Toastmasters that are dedicated
    to helping people improve their public speaking skills. But in my experience,
    it’s all about getting out there and doing it. With most skills in general, it’s
    all about repetition. With public speaking, it’s also valuable to have people
    record and watch their own presentations. Doing so helps reduce all the things
    that you do while speaking that detract from the message you’re trying to communicate
    (like gesticulation, putting your hands in and out of your pockets, rocking back
    and forth, timing, and of course not using the word “um”).


    *   Being engaging: It’s important to be able to work a room for a lot of fields.
    Inflection in your voice, being authentic, bringing a unique perspective, actually
    listening, keeping a conversation on point, being positive (while staying authentic),
    and so much more. The best way to work on this is to just pay attention when in
    social situations. Paying special attention to watching for eyes glazing over
    during a discussion, reading other neuro-linguistic queues, choosing where to
    emphasize, and genuinely being interesting in hearing someone else speak rather
    than just waiting for your turn to talk are all other great ways to be engaging.
    The key is to be with people, talking, learning, and paying attention. Discussing
    what worked and what didn’t is also a huge help.


    *   Writing: Most of these skills need to be practiced in person. When training
    writing skills, though, it can be equally as educational to just use track changes
    and comments. I’ve learned so much from the editors of books I’ve written. Strategic
    things like being more succinct, tactical things like ending all items in a bulleted
    list with the same punctuation, and fine-tuning items such as using less gerunds.
    Writing is a great skill that will be with employees forever. As is the patience
    you learn from taking constructive criticism.


    *   Collaboration with peers: This is similar to being engaging but operating
    in a group dynamic. When overly engaging, we’re not accepting enough input. When
    we’re not engaging enough, we aren’t contributing to the group. A structured approach
    to collaboration can help but, especially with engineers, can just be a crutch
    that takes up a bunch of time. One challenge is to not let dogma drag you down.
    Another is to inspire the quiet people in the room. I’ve recorded meetings and
    then played them back. You usually don’t even need to point out better ways to
    handle situations, as people can see them for themselves, so if you’re trying
    to train on collaboration in this manner (or just discussing a meeting after the
    fact without a recording), just ask questions about situations and let the person
    you’re mentoring find the answer themselves.


    *   Problem solving: As with most other soft skills, training people to be better
    at problem solving involves having people solve various problems and then providing
    constructive guidance on other creative ways to think about a problem. For example,
    one technique I’ve had a lot of success with in this regard is to point out the
    type of strategy (e.g., abstraction, reduction, lateral thinking, root cause analysis,
    analogy, trial and error) being employed when someone is going through a problem
    and how other strategies might have led to a result quicker or with more accuracy.


    *   Troubleshooting: I put this back-to-back with problem solving because troubleshooting
    is often just problem solving specific to your industry. Depending on your industry,
    there are also lots of problem-solving methodologies (such as GROW, OODA, PDCA,
    RPR Problem Diagnosis, and A3) that might lend themselves well to keep employees
    on the same page in their approaches. Add the technical or logistical elements
    of problem solving specific to your organization or product to a methodology and
    you have a solid approach to teaching solid troubleshooting skills. But keep in
    mind that proficiency in your business or product is key to getting solid troubleshooting
    skills. Knowing the nitty-gritty details about a topic helps in refining your
    search for a problem.


    *   Root cause analysis: I split this apart from problem solving because you can
    solve a problem without understanding the cause. Root cause analysis is a method
    of problem solving but can also be looked at as not just solving a problem but
    solving the cause of a problem. My favorite strategy for teaching root cause analysis
    skills is to go through a 5 Whys exercise. If you ask why a problem has occurred,
    then ask why that happened, then why, until you get to the 5^(th) why, then you
    have gotten to the point where you can fix not only a given incident of a problem
    but the root cause of that problem. There are other tools, but for a number of
    situations, the 5 Whys exercise will get people onto a structured problem-solving
    approach that also resolves the root cause of that problem.


    *   Job-based leadership: Management is not leadership. Leadership involves listening,
    synthesizing, and developing a strategy, or vision. Leadership involves understanding
    what motivates someone and leveraging those motivations to build support. To develop
    a strategy, a leader needs to understand the product or the organization. And
    then the leader needs to show the ability to listen to others and bring their
    ideas to the table. Teaching leadership involves other soft skills that help people
    exert influence, but it also involves understanding that you aren’t just building
    support, you’re hopefully making things better. When someone displays natural
    leadership skills, it’s also helpful to steer them away from manipulation. Otherwise
    employees will witness their leadership eroding over time.'
  trans: '

    ### 软技能


    软技能包括沟通、社交礼仪、语言、习惯、人员管理、领导力、你对环境的反应方式，以及与职位核心无关、但体现人际关系的所有其他工作要素。我曾听过人们这样定义软技能：与他人协作的能力、你的行为举止，以及你如何展现外向特质（没错，我把“外向”当动词用了——虽然我本可以说“合群”）。


    我常听人说，他们招聘时看重软技能，因为专业技能可以培养，但软技能不行。从事招聘和人员指导工作二十年后，我发现自己强烈反对这种观点。有些人并不想学习社交礼仪，而有些人（尤其是特别聪明的人）往往缺乏耐心。但只要对方愿意接受，你完全可以训练他们如何与他人良好合作。问问齐格·齐格勒（Zig
    Ziglar）就知道了，这位顶尖销售大师兼著名励志演说家正是以此为业。


    如何帮助人们培养这些软技能？首先要有所察觉。将人们置于能够以更有意义的方式与他人协作的环境中。进行情商培训。了解他们所处的阶段。要用心。去尝试。这些内容很多，基本概括了许多人采取的总体策略。我倾向于将策略分解为可执行的具体步骤。那么，让我们看看哪些软技能可以培养，以及如何着手培养。


    - **公开演讲：** 像国际演讲会（Toastmasters）这样的组织致力于帮助人们提升公开演讲能力。但根据我的经验，关键在于走出去并付诸实践。大多数技能都依赖于重复练习。对于公开演讲，让他人录制并观看自己的演讲也很有价值。这样做有助于减少你在演讲时分散信息传达（例如手势过多、手在口袋里进进出出、前后摇晃、节奏把控不当，当然还有不用“呃”这类口头禅）的各种小动作。

    - **引人入胜：** 在许多领域，能否掌控全场氛围至关重要。这包括语音语调的变化、真诚的态度、独特的视角、认真倾听、紧扣主题交流、保持积极（同时不失真实）等等。培养这项能力的最佳方式就是在社交场合多加留意。特别注意观察讨论时对方是否眼神涣散，解读其他神经语言程序学线索，选择强调重点，以及真正做到对他人的发言感兴趣而非只等待自己开口的机会，这些都是增强吸引力的好方法。关键是要与人相处、交谈、学习并保持专注。事后讨论哪些做得好、哪些需要改进也很有帮助。

    - **写作能力：** 大多数软技能需要当面练习。但训练写作能力时，仅使用修订和批注功能同样具有教育意义。我从自己书籍的编辑那里学到了很多。例如，更简洁达意的战略性技巧，在项目符号列表中统一标点符号的战术性细节，以及减少动名词使用等精炼技巧。写作是一项能让员工终身受益的技能。正如你从接受建设性批评中学到的耐心一样。

    - **与同事协作：** 这与“引人入胜”类似，但更侧重于团队动态。过于活跃则吸收不足，参与不够则贡献有限。结构化的协作方法能有所帮助，但尤其对工程师而言，它可能沦为浪费时间的手段。一个挑战是不要被教条拖累；另一个挑战是激发会议室里安静者的灵感。我曾录下会议并回放。通常你甚至无需指出更好的处理方式，因为人们能自行发现，所以如果你想以此方式训练协作能力（或事后不带录音地讨论会议），只需就相关情境提问，让受指导者自己寻找答案即可。

    - **解决问题：** 与大多数软技能一样，训练人们更好地解决问题，需要让他们解决各种问题，并就思考问题的其他创造性方式提供建设性指导。例如，在这方面，我成功运用过的一个技巧是：当某人处理问题时，指出他正在采用的策略类型（如抽象、简化、横向思维、根本原因分析、类比、试错），并说明其他策略如何能更快或更准确地得出结果。

    - **故障排查：** 我将它与解决问题并列，因为故障排查通常是特定于你所在行业的解决问题方式。根据行业不同，还有许多问题解决方法论（例如 `GROW`、`OODA`、`PDCA`、`RPR
    问题诊断`和 `A3`），这些方法有助于让员工在方法上保持同步。将特定于你组织或产品的技术或后勤要素整合到方法论中，你就拥有了教授扎实故障排查技能的可靠方案。但请记住，精通业务或产品是获得扎实故障排查技能的关键。了解某个主题的细节有助于缩小问题搜索范围。

    - **根本原因分析：** 我将其与解决问题分开，是因为你可以在不了解原因的情况下解决问题。根本原因分析是一种解决问题的方法，但它不仅着眼于解决问题，更在于解决问题的根源。我教授根因分析技能最喜爱的策略是进行“5
    个为什么”练习。如果你不断追问问题发生的原因，直到第五个“为什么”，那么你不仅能解决特定问题事件，还能触及问题的根源。还有其他工具，但在许多情况下，“5 个为什么”练习能让人们掌握结构化的解决问题方法，同时消除问题的根本原因。

    - **岗位领导力：** 管理不等于领导力。领导力包括倾听、综合、制定战略或愿景。领导力需要理解什么能激励他人，并利用这些激励因素来构建支持。要制定战略，领导者需要了解产品或组织。然后，领导者需要展现出倾听他人意见并将其想法纳入讨论的能力。教授领导力需要运用其他软技能来帮助人们施加影响力，但同时也需要明白，你不仅仅是在建立支持，更希望能让事情变得更好。当某人展现出天生的领导技能时，引导其远离操纵也至关重要。否则，员工会目睹他们的领导力随时间逐渐丧失。


    '
- fmt: '# 软技能培养指南


    ## 人员管理


    管理不同于领导力，因为它通常更具战术性。管理还涉及让员工变得更好。关于组织希望管理者如何表现自己并推动变革，有许多不同的策略。因此，选择一种管理风格并让管理者或潜在管理者学习这种风格总是有帮助的。这往往会随着组织的变化而改变。重要的是要考虑管理者的自然管理风格，并使用更结构化的方法来帮助填补空白。这能让管理者更加真实。


    ## 应对压力


    我曾经有一名员工，因为他对我分配给他的一个项目过于担忧而不得不住院。从那以后，我把应对压力视为一项更重要的技能来教授。这很大程度上与增强一个人的自信心有关。如果你知道自己能够摆脱任何困境，那么你就更有可能在压力较小的状态下处理问题。此外，要确保员工知道他们身后有良好的资源支持体系，以及如何使用这个体系。我还进行过专门的角色扮演，在压力下识别问题。你经历的高压情况越多，处理它们的能力就越强。最后，指导员工使用一些具体的话术也会有所帮助。例如，当程序员试图修复一行代码时，有人不停地提问。这会让情况变得更糟，因此有一个既礼貌又能让对方停止提问的简单话术，可以很好地改善局面。如果处理得当（对某些人来说可能需要重复练习），还能与制造压力的人建立更好的关系。我还想指出，当冲突或压力升级时，在每一次后续互动中，员工都有能力缓和冲突。


    ## 创造性思维


    创造性思维是任何员工都重要的软技能。培养员工的创造性思维始于赋予员工这样做的权力。我也喜欢为此设定合适的范围。例如，如果你遵循工作说明书，在没有变更指令的情况下不要超出其范围。为了教会员工创造性思维，有许多批判性和创造性思维工具。我喜欢游戏。游戏充满乐趣，轻松的氛围能使职业培训更愉快。我还发现，当人们玩得开心时，他们能记住同样多甚至更多的内容，而且心情更愉快。思考赢得游戏的创造性策略是教会员工创造性思维的好方法。此外，向员工提供情境示例并让他们（无论是个人还是团队）寻找创造性的解决方案，也取得了很好的效果。


    ## 注重细节


    学习注重细节的最佳方法之一是从忽视细节的失败中吸取教训。最好不要在客户、同事面前，或者在可能导致项目延期的项目上犯这种错误。因此，提供依赖于遵循大量指令的练习是帮助员工保持专注的好方法，尤其是当这些指令或细节是他们工作中可能执行的真实任务时。


    ## 时间管理


    时间管理可以帮助员工提高效率。当人们感觉完成了很多工作时，他们通常也会更快乐。关于时间管理的书籍和课程数以百计。我建议找到一门符合组织价值观的课程，并让一到两名员工参加。然后他们可以汇报学到的策略和价值。对于此列表中的大多数项目，我不想推荐单一的产品或方案，所以选择一个开始，向你尊重且擅长时间管理的人询问他们推荐的课程，或者使用你最喜欢的搜索引擎进行一些研究。大多数方案都围绕优先级展开，因此在此期间，思考如何根据任务类型及其优先级来最佳地组织任务。仅此一项就能在你寻找帮助员工学习的方案时产生立竿见影的效果。


    ## 乐观心态


    乐观是一件有趣的教学内容。更好地培养人们掌握其他软技能，往往本身就会带来更乐观的态度。乐观通常是自尊的直接反应。但根据员工的性格，有一些特定的策略可能有效也可能无效。最重要的一点是，你自己要保持乐观的态度。不要让自己陷入消极抱怨组织的泥潭中。要以一种能让对方在未来更好地处理类似情况的方式来讨论具体问题的细节。谈论情绪。这对某些员工以及你与他们关系的深度来说可能比较困难。最后，向员工或团队传达信任也会产生相当显著的影响，尤其是长期坚持这样做。


    ## 差旅管理


    我过去有很多员工需要频繁出差。我会让他们都尝试选择一家特定的航空公司、加入里程计划、集中使用一家特定的租车公司并加入其忠诚度计划、选择一家偏好的酒店并加入其忠诚度计划、为他们提供登机前与客户通话的模板（以确保客户和我的员工都为出差行程做好准备）、提供最简单的费用报销方案、在需要时提供礼宾服务等等。成为一名“空中飞人”可能很艰难。任何能为一线员工提供支持的措施都是有益的。


    ## 言简意赅


    清晰但快速地传达信息有助于保持他人的注意力。要做到这一点，需要紧扣主题。为了帮助员工做到这一点，我会参与对话，并在我们偏离核心主题时指出来。显然，你希望员工说话自然。然而，你也可以通过提供指导来帮助他们改进表达方式。同样适用于书面表达。只需指出写作开始偏离主题的地方，就能帮助养成紧扣主题的习惯。最后，你可以给员工推荐道格拉斯·亚当斯的书，并告诉他们“做完全相反的事”。


    # 制定职业发展计划


    每个员工应该专注于培养哪项技能？基于以上内容，制定一份职业发展计划。从模板开始。我喜欢采用360度评估法：让员工在每个类别中对自己进行评分。然后让同事互相评分（匿名效果最好）。提供你自己的意见，然后与每位员工沟通，确定应该花更多时间提升哪些技能，并制定相应计划。我喜欢为这样的计划附上一份沟通计划，即你将何时检查每个领域的进展情况。当然，这些软技能很可能是在向员工传授业务或产品知识的同时进行培养的。但将不同的提升领域结合起来，有助于表明你关心他们的职业发展，而不仅仅是利用他们来获取尽可能多的收入。'
  raw: '*   People management: Management is different from leadership in that it’s
    typically more tactical. Management also involves making the employee better.
    There are a lot of different strategies when it comes to how an organization wants
    managers to comport themselves and effect change. Therefore, it’s always helpful
    to pick a management style and have managers or potential managers learn that
    style. This will invariably change as organizations change. And it’s important
    to take into account a manager’s natural management style and use a more structured
    methodology to help fill gaps. This allows managers to be more authentic.


    *   Handling pressure: I once had an employee that had to be hospitalized because
    he was so worried about a project I assigned to him. After that, I took handling
    pressure as a much more serious skill to teach. Much of this has to do with making
    someone more confident. If you know that you can get yourself out of any situation
    then you’re more likely to handle situations with little stress. Also, think about
    making sure the employee knows they have a good tree of resources behind them
    and how to use that tree. I’ve also had specific role-playing sessions, where
    we identify a problem under pressure. The more you go through high-pressure situations,
    the better you become at handling them. Finally, coaching with specific lines
    that someone can use can also be helpful. For example, a programmer is trying
    to fix a line of code and someone keeps asking questions. This is going to make
    a situation worse, so having an easy line to use that is polite but allows you
    to get them to stop can be a great way to make a situation better. And when done
    with grace (which for some might require repetition), can lead to a better relationship
    with the person creating pressure. I also like to point out that when conflict
    or pressure is escalating, at each subsequent interaction, an employee has the
    ability to de-escalate that conflict.


    *   Thinking creatively: Creative thinking is an important soft skill for any
    employee. Fostering employees to think creatively starts with empowering employees
    to do so. I like providing parameters for when it’s appropriate as well. For example,
    if you’re following a Statement of Work (SoW) don’t step outside the bounds of
    the SoW without a change order. To teach your staff to think creatively, there
    are a number of critical and creative thinking tools. I like games. Games are
    fun and levity helps to make professional training more enjoyable. I also find
    when people are having fun, they retain just as much, if not more, and are happier.
    And thinking of creative strategies to win games is a great way to teach employees
    to think creatively. Additionally, I’ve had great luck with providing situational
    examples to employees and having them look for creative ways to solve those, both
    with individuals and groups.


    *   Attention to detail: One of the best ways to learn to pay attention to details
    is to fail from having not done so. It’s best not to do that in front of customers,
    coworkers, and on projects where failure might lead to a project getting behind
    schedule. Therefore, providing exercises that are dependent on following a lot
    of directions is a great way to help keep staff paying attention, especially when
    the instructions or details are real-world tasks that might be performed as part
    of their jobs.


    *   Time management: Time management can help employees be more efficient. When
    people feel like they’ve accomplished a lot, they often end up happier as well.
    There are hundreds of books and courses on time management. I recommend finding
    one of the courses that matches your organization’s values and sending one or
    two staff through it. They can then report back on the strategy and value. I don’t
    want to endorse a single product or program for most of the items on this list,
    so choose the one to start with, ask people you respect who manage their time
    well if they have a course they would recommend, hit your favorite search engine,
    and do some research. Most of the programs revolve around priorities, so in the
    meantime think of how best to organize tasks based on the type of task and priority
    for that task. This alone will have an immediate impact while you look for a program
    to help teach the staff.


    *   Optimism: Optimism is an interesting thing to teach. Better equipping people
    with the other soft skills often leads to a more optimistic approach in and of
    itself. Optimism is often a direct response to self-esteem. But there are a few
    different specific strategies that might or might not work, given an employee’s
    disposition. One of the most important is to be optimistic in your own approach.
    Don’t allow yourself to get down in the weeds, talking smack about the organization.
    Do talk about the details of a given situation in a way that better equips someone
    to handle the situation in the future. Talk about emotions. This can be hard with
    some employees and the depth of a relationship you have with them. Finally, communicating
    trust in an employee or team can also have a pretty substantial impact, especially
    when done so over time.


    *   Traveling well: I used to have a lot of people on my staff that did a lot
    of traveling. I’d have all of them try and choose a specific airline, get in mileage
    programs, center around a specific car rental service, get into that loyalty program,
    choose a preferred hotel, get in that loyalty program, send them templates for
    calls to have with customers before they got on a plane (to make sure the customer
    and my employees were ready for whatever they were traveling to do), provide the
    easiest expense reporting solution, have a concierge available to help when needed,
    and much more. Being a road warrior can be hard. Anything you can do to support
    your front line is helpful.


    *   Be succinct: Conveying your message clearly but quickly helps keep the attention
    of others. Doing so requires staying on point. To help employees with this, I’ve
    engaged in conversations and pointed out when we stray from the central topic.
    Obviously, you want employees to speak naturally. However, you can also help to
    refine the approach by providing guidance. The same extends to the written word.
    Simply pointing out where writing begins to stray will help to build a habit of
    staying on point. Finally, you can provide Douglas Adams books to employees with
    a message of “do the exact opposite.”


    What skill should each employee work on? Given these, create a professional development
    plan. Start with a template. I like a 360 approach, where you have employees rate
    themselves in each category. Then have coworkers rate each other (anonymously
    works best). Provide your own input and then communicate with each employee where
    additional time should be spent working on their skills. And make a plan to do
    so. I like accompanying such a plan with a communication plan, or when you’ll
    check in on the status of each area being worked on. Of course, these soft skills
    are likely being worked on while educating employees about your business or product.
    But blending various areas for people to work on helps identify that you care
    about their professional development and are not just trying to leverage them
    to get as much revenue as possible.'
  trans: '

    # 软技能培养指南


    ## 人员管理


    管理不同于领导力，因为它通常更具战术性。管理还涉及让员工变得更好。关于组织希望管理者如何表现自己并推动变革，有许多不同的策略。因此，选择一种管理风格并让管理者或潜在管理者学习这种风格总是有帮助的。这往往会随着组织的变化而改变。重要的是要考虑管理者的自然管理风格，并使用更结构化的方法来帮助填补空白。这能让管理者更加真实。


    ## 应对压力


    我曾经有一名员工，因为他对我分配给他的一个项目过于担忧而不得不住院。从那以后，我把应对压力视为一项更重要的技能来教授。这很大程度上与增强一个人的自信心有关。如果你知道自己能够摆脱任何困境，那么你就更有可能在压力较小的状态下处理问题。此外，要确保员工知道他们身后有良好的资源支持体系，以及如何使用这个体系。我还进行过专门的角色扮演，在压力下识别问题。你经历的高压情况越多，处理它们的能力就越强。最后，指导员工使用一些具体的话术也会有所帮助。例如，当程序员试图修复一行代码时，有人不停地提问。这会让情况变得更糟，因此有一个既礼貌又能让对方停止提问的简单话术，可以很好地改善局面。如果处理得当（对某些人来说可能需要重复练习），还能与制造压力的人建立更好的关系。我还想指出，当冲突或压力升级时，在每一次后续互动中，员工都有能力缓和冲突。


    ## 创造性思维


    创造性思维是任何员工都重要的软技能。培养员工的创造性思维始于赋予员工这样做的权力。我也喜欢为此设定合适的范围。例如，如果你遵循工作说明书，在没有变更指令的情况下不要超出其范围。为了教会员工创造性思维，有许多批判性和创造性思维工具。我喜欢游戏。游戏充满乐趣，轻松的氛围能使职业培训更愉快。我还发现，当人们玩得开心时，他们能记住同样多甚至更多的内容，而且心情更愉快。思考赢得游戏的创造性策略是教会员工创造性思维的好方法。此外，向员工提供情境示例并让他们（无论是个人还是团队）寻找创造性的解决方案，也取得了很好的效果。


    ## 注重细节


    学习注重细节的最佳方法之一是从忽视细节的失败中吸取教训。最好不要在客户、同事面前，或者在可能导致项目延期的项目上犯这种错误。因此，提供依赖于遵循大量指令的练习是帮助员工保持专注的好方法，尤其是当这些指令或细节是他们工作中可能执行的真实任务时。


    ## 时间管理


    时间管理可以帮助员工提高效率。当人们感觉完成了很多工作时，他们通常也会更快乐。关于时间管理的书籍和课程数以百计。我建议找到一门符合组织价值观的课程，并让一到两名员工参加。然后他们可以汇报学到的策略和价值。对于此列表中的大多数项目，我不想推荐单一的产品或方案，所以选择一个开始，向你尊重且擅长时间管理的人询问他们推荐的课程，或者使用你最喜欢的搜索引擎进行一些研究。大多数方案都围绕优先级展开，因此在此期间，思考如何根据任务类型及其优先级来最佳地组织任务。仅此一项就能在你寻找帮助员工学习的方案时产生立竿见影的效果。


    ## 乐观心态


    乐观是一件有趣的教学内容。更好地培养人们掌握其他软技能，往往本身就会带来更乐观的态度。乐观通常是自尊的直接反应。但根据员工的性格，有一些特定的策略可能有效也可能无效。最重要的一点是，你自己要保持乐观的态度。不要让自己陷入消极抱怨组织的泥潭中。要以一种能让对方在未来更好地处理类似情况的方式来讨论具体问题的细节。谈论情绪。这对某些员工以及你与他们关系的深度来说可能比较困难。最后，向员工或团队传达信任也会产生相当显著的影响，尤其是长期坚持这样做。


    ## 差旅管理


    我过去有很多员工需要频繁出差。我会让他们都尝试选择一家特定的航空公司、加入里程计划、集中使用一家特定的租车公司并加入其忠诚度计划、选择一家偏好的酒店并加入其忠诚度计划、为他们提供登机前与客户通话的模板（以确保客户和我的员工都为出差行程做好准备）、提供最简单的费用报销方案、在需要时提供礼宾服务等等。成为一名“空中飞人”可能很艰难。任何能为一线员工提供支持的措施都是有益的。


    ## 言简意赅


    清晰但快速地传达信息有助于保持他人的注意力。要做到这一点，需要紧扣主题。为了帮助员工做到这一点，我会参与对话，并在我们偏离核心主题时指出来。显然，你希望员工说话自然。然而，你也可以通过提供指导来帮助他们改进表达方式。同样适用于书面表达。只需指出写作开始偏离主题的地方，就能帮助养成紧扣主题的习惯。最后，你可以给员工推荐道格拉斯·亚当斯的书，并告诉他们“做完全相反的事”。


    # 制定职业发展计划


    每个员工应该专注于培养哪项技能？基于以上内容，制定一份职业发展计划。从模板开始。我喜欢采用 360 度评估法：让员工在每个类别中对自己进行评分。然后让同事互相评分（匿名效果最好）。提供你自己的意见，然后与每位员工沟通，确定应该花更多时间提升哪些技能，并制定相应计划。我喜欢为这样的计划附上一份沟通计划，即你将何时检查每个领域的进展情况。当然，这些软技能很可能是在向员工传授业务或产品知识的同时进行培养的。但将不同的提升领域结合起来，有助于表明你关心他们的职业发展，而不仅仅是利用他们来获取尽可能多的收入。

    '
- fmt: '想要了解更多？我以这样一种方式列出了每一条要点，你可以复制前几个词，粘贴到搜索引擎中，就能获得关于该主题海量的信息。此外，还有一本包含大量研究和案例研究的书籍，概述了这种变革能为组织带来的影响。***《管理转型》***（*The
    Management Shift*）这本书提供了识别困扰许多组织的领导力问题的实用方法，以及如何转变思维模式和组织文化。这类书籍数不胜数，但这本是一个很好的起点！


    祝你好运，并代表你的员工以及这些员工未来的潜在雇主，谢谢你！既然你已经让员工具备了你希望他们拥有的技能，那么接下来，我们把重点放在留住他们上。


    ## 迹象表明留住某人将变得困难


    有许多桌面游戏和电子游戏，比如《龙与地下城》，你在其中扮演一个收集经验值的角色。一旦角色积累了足够的经验值，你就可以提升角色等级，获得新技能和更好的属性。我们的职业生涯也大致如此：你拼命工作，然后进入平台期，你得到一份新工作或新职位，再次拼命工作，然后又进入平台期。只要你准备好时就不断升级，你的职业生涯很可能会充满学习和新的冒险，这正应该是它本来的样子。以下是一些方法，可以让你判断某些人是否已经积累了足够的经验，是时候进入下一个阶段了。


    *   **他们感到无聊：** 这一点显而易见。一旦某人在一个职位上学到了所有能学的东西，他们很可能会感到无聊（周期性地），无论每天有多少工作从他们的办公桌上经过。这是正常现象。但要注意，人们的激励因素各不相同，可能有人只想在当前职位上待一段时间。只要他们做得好，就让他们知道，只要他们准备好了，就告诉你，你会帮助他们进入下一步。


    *   **每个人都会向某位员工寻求建议：** 一旦某位员工擅长某个职位，他们知道如何解决所有技术问题，知道该给谁打电话来加快处理那个关键事项，或者知道该踢哪儿能让点唱机播放一首歌（还有时间比出《欢乐时光》的大拇指）——那么，是时候寻找更多挑战了。你能从骨子里感觉到，希望他们也对自己的成就感觉良好。这时机就到了。如果你还没开始，那就开始思考他们下一步该做什么。当然，他们应该在这个岗位上花足够的时间，为接下来要面对的挑战做好充分准备，并从别人那里得知自己已精通工作，这样他们的自负就不会让他们误以为自己做得比实际更好！但如果你不认可他们已达到的水平，总会有人认可的！


    *   **他们开始感到沮丧：** 过了一段时间，不断有人带着问题来找这位员工会让人感到厌倦。他们会因为自己变得自满而感到恼火，并开始怨恨组织、团队，以及除了自己以外的所有人。这意味着他们在一个职位上待得太久了，是时候继续前进（希望是向上）了。不要让他们开始讨厌工作；这对任何人都没有好处。相反，要寻找方法来挑战员工，并从内部培养人才以保持发展势头。


    *   **别人提醒他们：** 有时，其他地方的经理会开始尝试挖角某位员工，或者他们被要求直接与客户合作。或者团队成员开始为某人指出其他职位。无论如何，如果他们的谦逊还没能让他们去申请下一份工作，那可能是时候由你自己来推他们一把了。如果你帮助员工找到职位，你就能在某种程度上塑造他们的去向，如果他们最终不在你的组织里，至少他们仍会是你的盟友。


    *   **金钱：** 资本主义意味着，在可能的时候，要跳槽去薪水更高的工作。你的员工可能热爱你的团队、同事、你本人，以及常常提供给高绩效者的自由度。但是，当他们开始意识到其他职位能给他们带来多得多的东西时，如果其他因素都没能促使他们离开，冷冰冰的现金很可能会开始向他们招手。基于时间的咨询业务面临的一个棘手问题就是，确实存在一个财务平台期，因为需要维持一定的利润率。但请记住，杰出的人才或许能够激励他人。通过放大团队成员能为公司带来的价值，那些在薪酬上已经到顶的人或许就能证明自己配得上高得多的薪水。在托管服务提供商（MSP）中，当人们跨越这个门槛时，他们通常可以转向管理团队或客户——或者为下一代工程师提供升级的晋升路径。


    最后，在任何人的职业生涯中，都会有那么一段时间，他们不再为了在工作中升级而积累经验。新晋父母、照顾生病亲人的人、拥有副业的团队成员、把所有空闲时间都花在湖边小屋里的人，以及许多其他人都处于“平稳期”。这完全没有问题。


    只要工作产出符合雇主的需求，组织和员工双方都清楚这一点，并且大家都在沟通各自的状况，那么按下职业生涯的暂停键并没有错。沟通是关键。如果你看到一位需要升级的员工，花点时间和他回顾这一点——以及下一步该去哪里。如果你自己需要升级，就开始寻找你的下一步是什么，这样你就能以任何你需要的方式做好准备。在咨询领域，这通常意味着将公司拓展到能给你带来更多挑战的领域，或者扩大组织规模。'
  raw: 'Want to know more? I laid out each bullet in such a way that you can copy
    the first few words, paste them into a search engine, and get more information
    about that topic than you could ever want. Additionally, there’s a book with lots
    of research and case studies that outlines the impact such change can provide
    for an organization. ***The Management*** ***Shift*** is a book that provides
    practical approaches to identify leadership problems that plague many organizations
    as well as how to shift mindset and organizational culture. There are more of
    these types of books than can be counted, but it’s a great one to start with!


    Good luck, and on behalf of your employees and potential future employers of those
    employees, thank you! Now that you’ve got employees with the skills you want them
    to have, let’s move on to keeping them on the payroll.


    ## Signs It’s Going to Get Hard to Retain Someone


    There are a number of board games and video games like Dungeons and Dragons ,
    where you play a character who collects experience points. Once the character
    has enough experience points, you get to raise the level of the character, picking
    up new skills and better attributes. Our careers work in much the same way: you
    work your butt off and then you plateau, you get a new job or position, work your
    butt off again, and then plateau again. Provided you continue to level up when
    you’re ready, your career is likely to be full of learning and new adventures,
    just the way it should be. Here are a few ways you can tell that some have gotten
    to the point they’ve earned enough experience and it’s time to move up to the
    next level .


    *   They’re bored: This one is a no-brainer. Once someone has learned everything
    they can learn in a position, they are likely to get bored (cyclically), no matter
    how much work comes through their desk on any given day. This is as it should
    be. Do be cognizant that there are a variety of motivators and that someone might
    simply want to sit in the position they are in for awhile. And provided they’re
    good at it, let them know that whenever they’re ready, they should let you know
    and you’ll help them get to the next step.


    *   Everyone comes to an employee for advice: Once an employee gets good at a
    position, and they know how to fix all of the tech problems, they know who to
    call to get that one critical thing expedited, or where to kick the juke box in
    order to get a song to play (with ample time for a Happy Days thumbs up)—then
    it’s time to look for more. You can feel it in your bones and hopefully they feel
    good about their accomplishments. This is when it’s time. If you haven’t yet done
    so, start thinking about what’s next for them. Of course, they should spend as
    much time as necessary on the job to fully prepare for what’s next on their horizon
    and take a cue from others that they’re getting good at what you do, so their
    ego doesn’t fool them into thinking they’re doing better than they are! But if
    you don’t recognize where they’ve made it, someone will!


    *   They start to get frustrated: After a while, people constantly coming at an
    employee with questions will get old. They’ll get annoyed that they’ve gotten
    complacent and start to resent the organization, the team, and everyone but themselves.
    This means they stayed too long in a given position , and it’s time to move on
    (and hopefully up). Don’t let them start hating the job; that will do no one any
    good. Instead, look for ways to challenge staff and keep hiring from within to
    keep the momentum going.


    *   People tell them: Sometimes a manager elsewhere starts trying to recruit an
    employee, or they get asked to work with customers directly. Or team members start
    to point out other positions for someone. Either way, if their humility hasn’t
    allowed them to apply for that next job yet, it’s probably time to push them into
    it yourself. If you help your staff find positions, you get to help shape where
    they end up, and if it’s not in your organization, then at least they will remain
    friends to your cause.


    *   Money: Capitalism means taking a new job that pays more money when you can.
    Your staff may love your team, the people, you, and the freedom often provided
    to high performers. But after they start to realize that there’s much, much more
    for them in other positions, if nothing else has caused them to move on, cold
    hard cash is likely to start being thrown their way. One of the hard parts of
    time-based consulting is that there’s definitely a financial plateau, as there’s
    a margin that needs to be maintained. But keep in mind that exceptional talent
    might be able to motivate others. By amplifying what teammates can bring in for
    a company, those who are otherwise topped out in compensation might just be able
    to justify much larger salaries. In a Managed Service Provider (MSP), when people
    are crossing that threshold, they can typically move into management of teams
    or accounts—or provide an escalation path for the next generation of engineers.


    Finally, there are going to be times in anyone’s career when they’re not collecting
    experience to level up at work anymore. New parents, those caring for sick loved
    ones, team members who have side projects, those spending all of their free time
    out on a lake at a cabin, and so many others are in a state of coasting. And that’s
    fine.


    There is nothing wrong with pressing pause on a career provided that the output
    at work is what’s needed for the employer, that both the organization and the
    employee are aware, and that everyone is communicating about where you’re at.
    Communication is key. If you see an employee who needs to level up, dedicate time
    to review that—and where to go next. If you are in need of a level up, start looking
    for what your next step is, so you can prepare in whatever way you need to. In
    consulting, this often means growing the company into areas that can challenge
    you more, or scaling out the organization.'
  trans: '

    想要了解更多？我以这样一种方式列出了每一条要点，你可以复制前几个词，粘贴到搜索引擎中，就能获得关于该主题海量的信息。此外，还有一本包含大量研究和案例研究的书籍，概述了这种变革能为组织带来的影响。***《管理转型》***（*The
    Management Shift*）这本书提供了识别困扰许多组织的领导力问题的实用方法，以及如何转变思维模式和组织文化。这类书籍数不胜数，但这本是一个很好的起点！


    祝你好运，并代表你的员工以及这些员工未来的潜在雇主，谢谢你！既然你已经让员工具备了你希望他们拥有的技能，那么接下来，我们把重点放在留住他们上。


    ## 迹象表明留住某人将变得困难


    有许多桌面游戏和电子游戏，比如《龙与地下城》，你在其中扮演一个收集经验值的角色。一旦角色积累了足够的经验值，你就可以提升角色等级，获得新技能和更好的属性。我们的职业生涯也大致如此：你拼命工作，然后进入平台期，你得到一份新工作或新职位，再次拼命工作，然后又进入平台期。只要你准备好时就不断升级，你的职业生涯很可能会充满学习和新的冒险，这正应该是它本来的样子。以下是一些方法，可以让你判断某些人是否已经积累了足够的经验，是时候进入下一个阶段了。


    *   **他们感到无聊：** 这一点显而易见。一旦某人在一个职位上学到了所有能学的东西，他们很可能会感到无聊（周期性地），无论每天有多少工作从他们的办公桌上经过。这是正常现象。但要注意，人们的激励因素各不相同，可能有人只想在当前职位上待一段时间。只要他们做得好，就让他们知道，只要他们准备好了，就告诉你，你会帮助他们进入下一步。


    *   **每个人都会向某位员工寻求建议：** 一旦某位员工擅长某个职位，他们知道如何解决所有技术问题，知道该给谁打电话来加快处理那个关键事项，或者知道该踢哪儿能让点唱机播放一首歌（还有时间比出《欢乐时光》的大拇指）——那么，是时候寻找更多挑战了。你能从骨子里感觉到，希望他们也对自己的成就感觉良好。这时机就到了。如果你还没开始，那就开始思考他们下一步该做什么。当然，他们应该在这个岗位上花足够的时间，为接下来要面对的挑战做好充分准备，并从别人那里得知自己已精通工作，这样他们的自负就不会让他们误以为自己做得比实际更好！但如果你不认可他们已达到的水平，总会有人认可的！


    *   **他们开始感到沮丧：** 过了一段时间，不断有人带着问题来找这位员工会让人感到厌倦。他们会因为自己变得自满而感到恼火，并开始怨恨组织、团队，以及除了自己以外的所有人。这意味着他们在一个职位上待得太久了，是时候继续前进（希望是向上）了。不要让他们开始讨厌工作；这对任何人都没有好处。相反，要寻找方法来挑战员工，并从内部培养人才以保持发展势头。


    *   **别人提醒他们：** 有时，其他地方的经理会开始尝试挖角某位员工，或者他们被要求直接与客户合作。或者团队成员开始为某人指出其他职位。无论如何，如果他们的谦逊还没能让他们去申请下一份工作，那可能是时候由你自己来推他们一把了。如果你帮助员工找到职位，你就能在某种程度上塑造他们的去向，如果他们最终不在你的组织里，至少他们仍会是你的盟友。


    *   **金钱：** 资本主义意味着，在可能的时候，要跳槽去薪水更高的工作。你的员工可能热爱你的团队、同事、你本人，以及常常提供给高绩效者的自由度。但是，当他们开始意识到其他职位能给他们带来多得多的东西时，如果其他因素都没能促使他们离开，冷冰冰的现金很可能会开始向他们招手。基于时间的咨询业务面临的一个棘手问题就是，确实存在一个财务平台期，因为需要维持一定的利润率。但请记住，杰出的人才或许能够激励他人。通过放大团队成员能为公司带来的价值，那些在薪酬上已经到顶的人或许就能证明自己配得上高得多的薪水。在托管服务提供商（MSP）中，当人们跨越这个门槛时，他们通常可以转向管理团队或客户——或者为下一代工程师提供升级的晋升路径。


    最后，在任何人的职业生涯中，都会有那么一段时间，他们不再为了在工作中升级而积累经验。新晋父母、照顾生病亲人的人、拥有副业的团队成员、把所有空闲时间都花在湖边小屋里的人，以及许多其他人都处于“平稳期”。这完全没有问题。


    只要工作产出符合雇主的需求，组织和员工双方都清楚这一点，并且大家都在沟通各自的状况，那么按下职业生涯的暂停键并没有错。沟通是关键。如果你看到一位需要升级的员工，花点时间和他回顾这一点——以及下一步该去哪里。如果你自己需要升级，就开始寻找你的下一步是什么，这样你就能以任何你需要的方式做好准备。在咨询领域，这通常意味着将公司拓展到能给你带来更多挑战的领域，或者扩大组织规模。

