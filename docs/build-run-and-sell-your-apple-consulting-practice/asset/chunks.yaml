- fmt: '### Security Tools


    - [**Cauliflower Vest**](https://www.air-watch.com/): Store FileVault keys on
    a centralized server.

    - [**Crypt**](https://www.box.com/): FileVault 2 Escrow solution.

    - [**Digital Guardian**](https://docs.microsoft.com/en-us/azure/active-directory/active-directory-whatis):
    Data Loss Prevention.

    - [**Google Santa**](https://www.sap.com/products/secure-mobile-device-management-cloud.html):
    Binary blacklisting and whitelisting for the Mac.

    - [**iOS Location Scraper**](https://www.onelogin.com/): Dump the contents of
    the location database files on iOS and macOS.

    - [**iOS Frequent Location Scraper**](https://www.parallels.com/products/mac-management/):
    Dump the contents of the `StateModel#.archive` files located in `/private/var/mobile/Library/Caches/com.apple.routined/`.

    - [**Little Snitch**](https://www.filewave.com/): Provides information about what
    is accessing network resources and where those resources are.

    - [**Objective-See**](https://www.fleetsmith.com/): ’s `KnockKnock`, `Task Explorer`,
    `BlockBlock`, `RansomWhere?`, `Oversight`, and `KextViewr`, tools for finding
    more information about ports and services running on machines.

    - [**Osquery**](http://salsoftware.com/): Query for information on Macs in a live,
    granular search.

    - [**Portecle**](http://centrify.com/): Create and manage keystores, keys, certificates,
    certificate requests, and certificate revocation lists.

    - [**PowerBroker**](https://www.jamf.com/products/jamf-now/): Enable standard
    users on a Mac to perform administrative tasks without entering elevated credentials.

    - [**Prey**](https://gitlab.com/Mactroll/DEPNotify): Track Mac and iOS devices
    if they’re stolen.


    ### Service Desk Tools


    - [**Freshdesk**](https://www.docker.com/): Case/ticket management that allows
    for automatic billing via Freshbooks.

    - [**Salesforce Cases**](https://www.dropbox.com/): Case/ticket management that
    automatically integrates with SalesforceCRM.

    - [**ServiceNow**](http://www.thursby.com/products/admitmac): Case/ticket management
    with an expansive marketplace for integrations.

    - [**Webhelpdesk**](http://www.sds-corp.com/products/unified-endpoint-management/heat-lanrev-client-management/):
    Case/ticket management.

    - [**Zendesk**](https://www.lightspeedsystems.com/products/mobile-manager/): Case/ticket
    management with an expansive marketplace for integrations.


    ### Software Packaging and Package Management


    - [**Autopkg**](https://meraki.cisco.com/products/systems-manager/): Automate
    the creation of Mac software distribution packages using recipes.

    - [**CreateUserPkg**](https://github.com/micromdm/micromdm): Creates packages
    that create local user accounts when installed. (10.12 and below).

    - [**JSSImporter**](https://developer.apple.com/xcode/downloads/): Connects Autopkg
    to Jamf Pro.

    - [**Iceberg**](https://www.microsoft.com/en-us/cloud-platform/system-center-configuration-manager):
    Create Mac software distribution packages.

    - [**InstallApplication**](https://github.com/google/cauliflowervest): Dynamically
    download packages for use with MDM’s `InstallApplication`.

    - [**Jamf Composer**](https://www.zuludesk.com/): Create Mac software distribution
    packages.

    - [**Luggage**](https://github.com/jamf/NetSUS): Open Source project to create
    a wrapper that makes pkgs for Macs so you can have peer review of a package by
    examining the diffs between versions of a Makefile.

    - [**Munkipkg**](https://ipcmobile.com/infineaiq/): A simple tool for building
    packages in a consistent, repeatable manner from source files and scripts in a
    project directory.

    - [**Pacifist**](https://kapeli.com/dash): A shareware application that opens
    macOS `.pkg` package files, `.dmg` disk images, and `.zip`, `.tar`, `.tar.gz`,
    `.tar.bz2`, and `.xar` archives and allows you to extract individual files and
    folders out of them.

    - [**Payload Free Package Creator**](https://www.risevision.com/): An Automator
    application that uses AppleScript, shell scripting and `pkgbuild` behind the scenes
    to create payload-free packages.

    - [**QuickPkg**](http://business-static.apple.com/us/apple-professional-services/Apple_Professional_Services_AD_Integration_Services.pdf):
    Create Mac software distribution packages.

    - [**Simple Package Creator**](https://simplemdm.com/): Create Mac software distribution
    packages.

    - [**Suspicious Package**](https://www.solarwindsmsp.com/): View the contents
    of Mac software distribution packages.

    - [**Whitebox Packages**](https://www.sophos.com/en-us/products/endpoint-antivirus.aspx):
    Create Mac software distribution packages.


    ### Storage


    - [**Netatalk**](https://www.tabpilot.com/): Better AFP connectivity to Windows
    and other storage platforms from a Mac.

    - [**Promise**](https://posim.com/): Apple-vetted direct attached storage (DAS),
    storage area networking (SAN), etc.

    - [**Synology**](http://nomad.menu/): Storage appliances tailored to working with
    the Mac.

    - [**Xsan**](http://munki.github.io/munki/?mt=12): The built-in Apple SAN filesystem.'
