- fmt: '# 13. Sell the Company


    You successfully built a solid company. You have customers, you have good business
    processes to deliver great services, and after 2 or 20 years you are ready for
    something new. Maybe that something new is to find investors so you can reach
    a new growth point that requires an influx of cash (even if only to maintain cash
    flow). Or maybe you actually want to straight-up sell the company and let someone
    else deal with it.


    In this chapter, we’ll look at how to set a price on the company by ascertaining
    the value. We’ll look at the types of agreements you make when you exit a company,
    and we’ll look at what it looks like if you’re staying on with the company.


    But before we get started, let’s talk about feelings. No matter what you do or
    how you do it, selling part or all of the company is a very emotional time. And
    the longer you’ve owned the company, the more emotional it should be. Many are
    likely to tell you to leave the emotions at the door. Keep in mind that the loyalty
    of your customers beyond the contracts they may have signed with you cannot be
    assigned a price. Nor can the community, no matter how wonderful, of employees
    that you have. Instead, a valuation is about assets and liabilities.


    The contracts you have with customers are assets. The time that you owe customers
    who prepaid, and your bills, are liabilities. It’s that simple. Or usually it
    is. In the first section of this chapter, we’ll look at who’s going to buy the
    company.


    ## Who Is Going to Buy the Company?


    Consulting firms are typically acquired by other consulting firms who want to
    fill various gaps in their business or as a means for non-organic growth.


    * **Skills acquisitions**: Some acquisitions are about buying the skills you have
    on your team. This is often the case when a very large company is buying a much
    smaller organization that makes a product that will be discontinued. For example,
    let’s say you have a consulting firm and a very large customer wants to go enterprise-wide
    with Apple devices. They might just acquire your firm to become their new support
    team so they can get the project done much quicker.


    * **Customer acquisitions**: Other acquisitions are all about the customers. The
    purchaser might not want any of the databases or staff. This is common when getting
    gobbled up by a seemingly similar company, especially if they’re in the same geography
    and have been a long-time competitor.


    * **Inorganic Growth**: A traditionally Windows-centric MSP might want to add
    an Apple practice to their portfolio rather than build one from the ground up.
    Or another Apple practice might want to get into your geography, and instead of
    slowly starting to sell into that geography, they might want to buy an existing
    leader in the market.


    * **Product**: Another organization might be interested in acquiring yours because
    they want a product that you have developed. The services products are typically
    a pre-packaged bundle of services that provides a deliverable. Along with acquiring
    name recognition of the product, the purchaser is also often looking for know-how
    around how to develop the product. Keep in mind that the value of the product
    to the purchaser is about domain knowledge and customer acquisition. Anything
    beyond that could be developed internally at the purchaser without having to buy
    another company.


    * **Software**: Software product might be something customer-facing that customers
    pay you for or might be an internal software product that is used to allow your
    organization to be more efficient and therefore more cost-competitive. If done
    properly (and packaged properly), software can be a huge selling point; however,
    keep in mind that integrations between internal systems are usually going to already
    be established at an organization that might be purchasing your company and so
    might not increase the value of your company.


    * **Another SKU**: Some organizations already sell software, printer services,
    or something else to customers, and your team might just provide the best possible
    new SKU that can be cross-sold to customers. When that happens, you may become
    an attractive target acquisition because the acquirer can sell the crap out of
    what you do. This is great when you have excess capacity and good business processes
    but don’t have a strong sales team.


    When is the community you built considered an asset to the company? Usually, when
    there’s a greater impact that the purchasing organization can take above and beyond
    the standard value of your assets. For example, let’s say another services provider
    purchases your company and wants to tap into tools that you’ve built to manage
    tickets or integrate with common services management tools. Or this can occur
    when the purchaser can expand their platform support and, in doing so, not only
    takes on your Apple customers but also sells Apple services to their other traditional
    customers.


    Hopefully you’ve become an expert with all things Apple at this point. And doing
    so is trendy. Many a large company wants to know what their “Apple strategy” is
    these days. Even if the organization looking to acquire your firm doesn’t say
    it, this is likely on their mind and should factor into the negotiations when
    you’re trying to justify a higher value of the organization.'
