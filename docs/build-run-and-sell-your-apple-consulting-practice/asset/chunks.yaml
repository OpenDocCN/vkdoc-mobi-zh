    #### 挑战者销售法


    `挑战者销售法`是马修·迪克森和布伦特·亚当森一项大规模研究项目的成果，并由此诞生了《`挑战者销售法`》一书。该书将销售人员分为五类：关系建立者、勤奋工作者、独行侠、被动问题解决者和挑战者。在当前大型（"企业级"）销售盛行的环境下，挑战者往往更为成功。


    `挑战者销售法`并非试图拆解客户的需求，而是用于在由多个层级利益相关者组成的更大团队中建立共识，这在当今的商业环境中十分常见。该方法通过让客户意识到其所在行业的陷阱来直接挑战他们。通过向所有决策者传递一致的信息，你可以引导他们，促使他们以符合你价值主张的不同方式审视自身需求。


    挑战者能够教导客户并定制化传达信息，从而掌控销售通话。`挑战者销售法`要求销售人员研究市场趋势和客户偏好，以便脱颖而出。该方法的一个缺点是它不支持任何形式的自动化工具，因为它没有处理大规模销售的清晰策略，而是将流程转变为打包复杂的大型解决方案。然而，尽管存在这一缺点，自
    2011 年问世以来，它已被证明是一个相当成功的策略，因为它是对当今信息灵通、在线购物的买家的一种回应——它挑战这些买家，让你能够提供指导和建议，而不是仅仅发现他们的需求并提供解决方案。`挑战者销售法`在拥有庞大销售团队的高科技公司（例如软件公司）中非常流行。


    #### 价值销售框架


    `价值销售框架`开发于 1991 年，它基于客户的购买流程创建了一个可重复的流程或地图。通过构建一套流程，而不是为每笔交易量身定制，你可以减少管理需求，从而能专注于团队成员的基本销售技能。话虽如此，这种方法需要更多的文档记录，包括资格认定、提出已记录的问题以更好地理解需求、将每个机会与你产品的各项能力进行匹配，然后制定计划来促成每个机会。


    #### 解决方案销售


    `解决方案销售`是我接受培训的第一个销售方法论。简单来说，就是销售解决方案，而非产品。自 1988 年由迈克·博斯沃思提出以来，它已成为许多其他方法论的基础。它是对市场转变的一种反应，即众多不同的供应商开始销售比以往任何时候都复杂得多的解决方案。


    `解决方案销售`为理解当今成熟且信息灵通的买家提供了更深刻的见解。该方法论基于一个庞大的培训师网络而不断发展（许多其他方法论则没有），这帮助它跟上复杂且快速变化的商业环境；同时，其基因中内置了应对变化的能力。


    #### 概念销售


    `概念销售`由罗伯特·米勒和斯蒂芬·海曼提出，它侧重于购买流程以及向特定组织销售时管理相关的利益相关者。这意味着你需要专注于倾听并善于收集信息。在收集信息的同时，你提供与你的产品和服务相关的信息，并利用这些信息在潜在客户组织的各个层面获得承诺。这一切之所以有效，是因为客户购买的不是某个特定的产品或服务，而是该产品所代表的概念。


    这意味着需要提出五类问题：


    - **确认**：回顾你已获得的任何信息。

    - **新信息**：探询客户确切希望实现的目标（例如，可交付成果）。

    - **态度**：了解利益相关者之间存在何种关联。

    - **承诺**：了解客户能走多远，或者他们对完成交易的承诺有多大。

    - **问题**：寻找销售流程中的障碍。


    与所有方法论一样，这里的关键是倾听。通过倾听客户，你了解他们的需求，并能将他们的需求与状况分解到类似的类别中。


    #### 桑德斯销售系统


    `桑德斯销售系统`由大卫·桑德斯在 20 世纪 60 年代末 70 年代初开发，采用特许经营模式，拥有超过 250 个办事处，并以 23 种语言教授。`桑德斯`从挖掘客户需求开始，然后根据他们的需求定制销售方案。当然，几乎所有方法论都始于这一步——尽管我旁听过的大部分销售电话中，销售代表一上来就开始大谈特谈他们的产品有多好。也许他们会假装先听听我的需求，但通常连这都做不到。


    由于`桑德斯`诞生于 20 世纪 60 年代，它非常注重人际因素。我倾向于将其视为一种类似齐格·齐格勒的方法论（我们将在本章的“延伸阅读”部分附上齐格勒的书籍链接，这是每个从事销售的人都必读的）。但与其他大多数方法论的不同之处在于接下来要做什么。`桑德斯销售`比任何其他方法论都更强调双边主义。它指的是让双方（买方和卖方）在销售过程中拥有同等的投入。这通过让销售代表尽早提出完成销售的障碍，并为客户提供克服这些障碍的选项和帮助来实现。虽然这并不能完全实现双方平等的投入，但它确实能让你展示出你已付出了努力，并且不会在无法成交的交易上浪费客户和你所在组织的时间。可以将其视为一种逆向心理学：潜在客户最终会通过投入时间来排除卖方的障碍，从而说服自己购买。


    许多高科技公司都有复杂的产品需要销售，但这些行业的人往往对花哨的销售技巧持怀疑态度。`桑德斯`是最成熟的方法论，它强调专业形象和行为，在向大型组织销售人力资源和业务解决方案方面非常有效。`桑德斯`的某些部分适用于高科技领域的极客型工程环境，但其他部分则不然。与其他方法论一样，要选择适合你组织的部分，但在选择`桑德斯`时，要敏锐地关注你的目标受众，以及他们可能会如何将某些行为解读为操纵。通过意识到这种潜在的解读，你可以确保不会在你的团队中推广那些容易被误解的行为。


    #### MEDDIC


    `Meddic`由杰克·那不勒斯提出，与许多伟大事物一样，它诞生于科特·柯本的时代。它代表：指标、经济买家、决策标准、决策流程、识别痛点、支持者。在这里，我们通过帮助制定完成每笔交易的计划，使销售团队能够高效工作。有了良好的自动化系统（例如与
    Salesforce 集成），你可以将最合适的人员分配到每个客户，并通过让经理指导销售方法的一致执行，帮助他们传递信息。这需要花费时间在资格认定阶段，审查关键信息，然后与客户合作。如果你希望对销售管道进行非常严格的控制，这可能是最适合你的方法论；然而，许多人可能会认为准备每个客户所需的时间，加上所需的文档记录，劳动强度过大。

    '
- fmt: '# CustomerCentric Selling


    A lot of products require a lengthy sales process. And many also require a complicated
    solution be delivered to a customer. CustomerCentric Selling involves turning
    your sales staff into collaborative consultants that become trusted advisors to
    customers. This makes CustomerCentric Selling dependent upon several kinds of
    behaviors.


    - You’re going to close deals on the customer’s timeline, not yours (unless you
    leverage special pricing and discounts to bring their timeline forward). This
    might be hard to reconcile against increasing pressures on properly managing your
    pipeline, but it’s a good long-term/multi-quarter way to run the business (after
    all, if an opportunity closes in the first week of next quarter rather than the
    last week of this quarter, you’ve got a great start to the next quarter).

    - Decision makers aren’t always the same as buyers, especially in larger organizations.
    Target your sales efforts at the decision makers more than the buyers.

    - Put the product in the hands of your customer.

    - Learn where a customer is at and meet them there, rather than using presentations
    that don’t speak to a customer’s needs.

    - To learn where a customer is at, ask relevant questions about their business
    instead of jumping into what it is your organization can do for them.

    - Focus on the solution rather than the relationship (the relationship comes once
    you’ve solved their problem).

    - Don’t act busy; that’s an old school technique that is supposed to manipulate
    customers into thinking you’re awesome because you’re in high demand. Instead,
    focus on having the best solution to meet the needs the customer identifies.

    - Help potential customers buy your products, rather than convincing them with
    pushy sales techniques.


    ## Making the Methodology Selection


    There are about as many sales methodologies out there as there are really, really
    good account executives, sales engineers, and sales executives. This might be
    because it seems like when you get to an elite skillset, you take the body of
    knowledge you were introduced to and apply it to your style and franchise that
    out.


    These sales strategies can become documented methodologies and can help your business
    flourish. But they require sufficient training, competence, and professional skills
    that can grab and engage today’s informed and mature customer rather than simply
    convincing them. Sales is hard.


    A methodology can amplify a good seller, helping them close more business, or
    punish a high performer making it harder to close deals. No methodology will be
    perfect. The tenets of each are eerily similar in some cases. But the underlying
    concepts are often to listen more, talk less, respect the time of your buyer,
    run your routes at their pace, respect your potential customers, and be helpful
    even if they don’t buy your product. Each can also have a lot of value for your
    organization in the details.


    The methodologies I reference here have varying degrees of content in the article.
    This isn’t because any methodology is better; it’s more that I have worked with
    some more than others and have had varying degrees of success with them. No matter
    the methodology, it all starts with arming a good seller with a good product to
    sell. But the methodology will help, will align staff to be on the same page,
    and will provide you with plenty of canned training materials on which to base
    your training and enablement assets. Now, let’s go and hire some more people to
    close those sales!


    ## Implementing Your Methodology


    You now have a methodology that you think works. It’s time to hire your first
    seller. This person should be someone you could see yourself grooming into a sales
    leadership position. Don’t make any promises, just in case things only half work
    out. But hire for aptitude, not seniority. You might end up hiring someone that
    sold you a car, or someone straight out of school. And likely, if you’re hiring
    for capacity rather than a book of customers, you’ll end up being one of the first
    tech sales jobs that this new seller ends up with.


    People new to industries are often among the easiest to train. They typically
    don’t come with a preconceived set of notions about how things are supposed to
    work, and they usually have a lot of skills that you might not otherwise think
    of—often helping innovate the way the business, or even the industry, works.


    If you’re hiring someone new to the industry, then implementing a sales methodology
    really just requires that you read some books or take some classes on that methodology.
    When you do, try not to let your own opinions alter the way that you approach
    these things. It’s worth mentioning that nearly every entrepreneur develops their
    own methodology based on their personality. Personalities don’t scale. Therefore,
    the methodology, sales training, and sales enablement means that you don’t have
    to spend $1,000,000,000,000 to clone yourself (multiple times).'
