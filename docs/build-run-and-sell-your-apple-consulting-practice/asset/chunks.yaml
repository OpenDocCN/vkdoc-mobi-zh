    # 结论


    在收购问题上需谨慎行事。你很容易陷入文化差异或交易不当的境地。你需要确保自己清楚如何将收购的组织整合到自身架构中。同时，还需掌控成本，了解控制成本的方法，并明白这对利润底线的影响。不过，如果通过收购而非自建能获得更高的投资回报率，那就果断行动。


    务必牢记你做这一切的初衷。事情从来不会像你最初想象的那么简单。通常，非有机增长会伴随一些低效问题（热力学定律在商业领域似乎同样适用）。尽量在并购中保留更多价值，只要足够谨慎并进行了充分的尽职调查，合并后的两个组织应该会更加强大！


    # 延伸阅读


    - 《让我们收购一家公司：通过收购加速增长》，H·李·拉斯特，[`https://www.amazon.com/Lets-Buy-Company-Accelerate-Acquisitions/dp/1564148459`](https://www.amazon.com/Lets-Buy-Company-Accelerate-Acquisitions/dp/1564148459/ref=sr_1_1?ie=UTF8&qid=1512054406&sr=8-1&keywords=buy+companies)

    - 《收购：收购自己公司的内行指南》，里克·里克特森、罗伯特·E·冈瑟，[`https://www.amazon.com/Buyout-Insiders-Guide-Buying-Company-ebook/dp/B001GQ2BWM`](https://www.amazon.com/Buyout-Insiders-Guide-Buying-Company-ebook/dp/B001GQ2BWM)

