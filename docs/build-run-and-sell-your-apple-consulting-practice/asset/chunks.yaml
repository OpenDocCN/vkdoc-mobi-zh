- fmt: '# Log Collection and Analysis


    - [`ElasticSearch`](http://www.cultureamp.com/): Open Source, very fast log analysis.

    - [`RobotCloud Dashboard`](https://itunes.apple.com/us/app/lingon-3/id450201424):
    Provides more granular and intuitive visibility into devices managed by `Jamf
    Pro`.

    - [`Splunk`](http://www.kerio.com/products/kerio-connect/server): Big data log
    analysis.

    - [`Tableau`](https://products.office.com/en-US/): Big data analysis.

    - [`Watchman Monitoring`](https://www.marketcircle.com/): Mac focused monitoring
    agents that inspects common third party tools.

    - [`Zentral`](https://github.com/krypted/precache): Open source, built on `ElasticSearch`,
    but with hooks into lots of other tools and custom recipes for Mac logs.


