- fmt: '# Diversity


    As consultants, we can end up visiting a lot of different customers. The people
    who visit those customers should be as diverse as the customers, if not more diverse.
    A more diverse workforce provides more ideas and more perspectives and makes for
    a healthier company culture.


    Diversity means gender, ethnicity, socio-economic status, religion, and background
    and should be actively recruited for. If you’re based in a place like Los Angeles,
    it might be easy to find employees that represent pretty much any background you
    could think of. If you’re based in more rural areas, it might take more time to
    find diverse talent. But it will be worth it.


    As you grow, you end up having a more diverse pool of talent naturally. If you
    don’t, then you need to check your hiring practices and perhaps your own outlook
    and how that outlook might have shaped the hiring managers you have at your organization.
    If you trend in any direction too much, then it is hard to shift hiring practices.
    Ultimately when you see what a more diverse team unlocks, in terms of innovation,
    community contribution, and ultimately unlocking a wider pool of customers (so
    increasing your total addressable market) you will be a stronger company and one
    that more people want to work at.


    Most people want to be more diverse because it’s a buzzword. And whatever the
    reason, it’s a good thing. But you can also be selfish here. The innovative ideas
    that come from having a more diverse pool of talent is probably the single biggest
    reason to spend a little extra time when hiring to see what the whole market looks
    like, rather than just your circle and the circle beyond that.


    Hiring good people is one of the hardest things we have to do when starting new
    businesses. Rather than be preachy, here are a few logistical takeaways from those
    books:


    *   Consider the Platinum Rule : Treat people how they want to be treated. This
    replaces the Golden Rule (treat people how you would want to be treated), because
    we all come from different backgrounds and we should be considerate and sensitive
    to the boundaries of everyone. Some things you ask of team members could end up
    putting you in conflict with their values. This includes how different cultures
    perceive eye contact, handshakes, or personal space boundaries. When in doubt,
    ask.


    *   Interviewing someone who sees a bunch of people around that don’t look like
    them: There might be a slight cultural shift with existing staff. If you’re starting
    out with mostly male staff, there are likely to be certain jokes that are inappropriate.
    You likely want female or LGBT staff, but why would they want to be in a place
    where that’s tolerated? Make sure to have a supportive culture for all races,
    genders, and backgrounds.


    *   Consider blind interviews: I’ve rarely looked at the name on a resume anyway,
    but this is a great way to not let yourself be impacted by unintentional bias.


    *   Join diversity groups on professional sites like LinkedIn or through meetups
    in your area: You’re likely to open up a whole new talent pool that way, as well
    as meet potential customers and find causes you can contribute to.


    *   Ethnic and cross-cultural training: This not only helps you become a more
    welcome place for team members, but it also helps your staff be more appropriate
    in front of a customer. This includes cultural sensitivity and recognizing unconscious
    bias. There’s a legal necessity for some training, but if you go above and beyond
    what’s required, and really mean it, then others will see your commitment. Make
    sure to be there and participating yourself; leadership is important. You can
    even brand an internal cultural competency in addition to technical or business
    competencies.


    *   Have a zero-tolerance policy against harassment, racism, and bias: I’ve let
    things go at times and regretted doing so, but I can promise you that if you see
    something, so will others.


    *   Work with suppliers and other vendors who are committed to diversity and inclusion
    in their organizations as well.


    *   Take a zero-tolerance policy against harassment, racism, and bias with your
    customers as well: I have always vehemently defended my team against any form
    of abusive behavior. Working with customers that engage in this kind of behavior
    is just toxic and will poison not only those exposed to that behavior but those
    who interact with them as well. This should be addressed every time with leadership
    at your customers.


    *   Extend diversity recruitment to your board of directors.


    *   Nearly every organization I’ve worked at has promoted their culture as a core
    reason people want to work there. And they should. But when it comes to recruiting,
    it’s best to stop talking about cultural fit and focus on ability.


    *   Acknowledge all the cultural holidays, without engaging in cultural appropriation:
    This doesn’t always mean you need to take time off; there are other ways to celebrate
    special events for each culture.


    *   When in meetings, seek input from everyone in the room. Many employees will
    shy from contributing. Ask for their contributions and defer to them when they
    do speak up.


    *   Actively seek out and destroy “imposter syndrome”: Employees should be propped
    up, no matter their background. Keep in mind that different backgrounds have different
    approaches to resume writing, different ways of interviewing, and different norms
    when it comes to following up after an interview or during training. Make everyone
    feels safe to ask questions, to contribute, and to feel like their contributions
    are important.


    *   Read a book or articles when they show up in your feeds: A lot of the world
    is waking up to the realization that things are both worse and better than we
    may think. Reading content from a more diverse base will provide you with a more
    diverse outlook and understanding.


    This was a hard section for me to write. As a white male, I have a certain privilege
    that is sometimes hard for me to acknowledge, and I know that there will be people
    offended no matter what I say. But while I don’t feel it’s appropriate for me
    to run around telling people what to do, I did feel that despite offending people,
    it was important for me to write. At the end of this chapter you’ll find some
    books from people who I think are entirely right in exploring this topic more
    and who do it more justice.


    This is one of those places where starting and growing a business is not about
    you. You don’t have to hire anyone that doesn’t meet your requirements. But as
    you grow, having a diverse team will help you make more well-rounded decisions
    and better understand what more and more clients need from you. If you surround
    yourself with people just like you, you aren’t likely to grow in certain ways
    as a person.'
