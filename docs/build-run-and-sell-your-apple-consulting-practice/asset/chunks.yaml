  trans: '

    # 推进新计划时需谨慎


    你与一位潜在新客户进行了一场精彩的一小时会议。会议进展得非常顺利，以至于你决定叫些外卖，再把会议延长一小时。你与这位潜在客户建立了真诚的友谊，会议结束时你感到精神振奋，准备迎接新的业务挑战。但有一个小问题：你们公司并不提供客户所需的产品或服务。


    也许你们业务领域相近。也许这位客户为你认为的新兴市场提供了一个切入点。也许你看到了转型的机会，通过进入新细分市场能让业务翻倍。但说实话，你们确实无法满足客户的需求。你打电话回办公室，向电话那头的人描述这个绝佳的新机遇。他们似乎没那么兴奋，但基于你的热情，或因为他们无法在同等高度与你共鸣，没有人对你说"不"。


    ## 行动前应做的事


    这种情况屡见不鲜。原因有几点：有时确实存在真正的机遇。但更多时候，如果你强行推动一个对你和团队而言陌生的新计划，只会浪费大量时间。不要强行推进。


    没有什么比失败的计划更能扼杀企业动力。如果不小心，它可能会影响你所有的业务线。以下是应对这种情况的试金石：


    1.  **你能够触及的市场有多大？** 显然，你需要识别这个新项目能带来的潜在业务，暂时戴上眼罩，只关注你确实能接触到的有限客户群。你可能会发现市场规模远超想象，也可能发现潜在客户极少，或市场已被其他供应商饱和。这项研究也有助于在比较当前费率表的基础上制定定价策略。


    2.  **你和团队需要达成什么目标才能进入新目标市场？** 进入新市场可能涉及招聘新员工、组建专注新市场的小团队、开发应用程序或网页界面等。不仅要了解原型开发所需的工作，还要考虑规模化销售的需求。一旦了解所需投入，你就能做出是否继续推进的正确决策。


    3.  **你们有能力向新市场销售新产品或服务吗？** 你的销售人员可能专注于完全不同的客户群体。他们可能无法与新客户群体在同一层面上沟通。除了第一个客户之外，你们可能没有任何潜在客户线索。但也许你们完全适合开启这场新冒险！


    4.  **员工是否支持？** 如果你完成了上述研究，并列出推进或停止的坚实论据，那么获得员工支持应该很简单。注意不要过分强加你的意志。但当市场条件非常适合你的组织进入并提供良性颠覆时，这个项目显然值得追求。


    5.  **核心业务的机会成本是多少？** 如果你有良好的商业计划却仍未获得支持，必须追问原因。如果核心业务会受损，你可能需要考虑动用储备金或外部资金来资助新项目。如果商业计划合理，就做出那个判断。我并不排斥风险——前提是基于逻辑和理性，而非对精彩会议和客户的情感反应。


    此外，确保你没有签署任何禁止进入该市场的合同义务。例如，如果你曾是多个软件供应商的分销商，很可能签署过合同，承诺在若干年内不与他们所在行业竞争。但凡有一丝担心可能违约，务必寻求法律意见。


    ## 你是否高估了自己的时间？


    倾听研究结果。倾听员工意见。除非合乎情理，否则不要强行将方钉塞进圆孔。保持开放心态，正如你要求他人保持开放一样。


    需要记住的重要一点是，你们有核心业务重点。向外拓展追逐新业务不仅会让公司进入可能无法占据优势的领域，还会削弱你的核心竞争力。诚然，有很多理由说明你需要保持敏捷、快速转型，但小心不要让你的情绪和个人时间投入凌驾于整个组织之上！


    最后，你投入的时间永远不会白费。如果机遇不合适，你想合作的潜在客户会表示理解。你花在研究上的时间让你更了解市场。你与员工共同评估机遇是否合理的时间，能增进团队凝聚力。如果你主动放弃某个计划，链条中的每个人都会更加尊重你。而且，由于他们共同分享成功的所有权，如果计划成功让所有人获得巨额奖金时，他们也会欣喜若狂！


    # 实施新业务


    一旦你决定推进新业务线，工作就开始了——尤其是如果你从未这样做过。甚至在发出第一封邮件或给现有客户打第一个电话之前，规划阶段就常常决定了结果。在本节中，我们将提供一些技巧和策略，确保新服务取得成功（或尽可能接近成功）。


    ## 审视产品


    这个产品可能并非好主意。以批判的眼光审视你提出的产品。确保产品易于理解、能吸引潜在客户，并且能获得健康的利润。这类似于我们在第 1 章构建服务菜单时的流程；不过，这次还有一个现成的交叉销售市场：你的现有客户。


    ## 将产品与市场比较


    一点市场调研就能带来巨大价值。你了解自己的客户，但你也想留住他们——而失去客户最快的方式就是向他们提供高于市场价的商品或服务。此外，如果你打算用新产品吸引新客户，就需要了解市场上有哪些竞争对手。你甚至可以选择让新产品成为"亏损引导者"（即只产生微薄亏损的产品），以吸引新客户。

    '
- fmt: '### Make a Project Plan


    The project plan is a plan for how you will implement a new project. Here, your
    goal is to build a visual representation with timelines and milestones for how
    you’ll implement a new endeavor that makes sense to anyone you might show it to.
    This will help you sell the plan to existing employees as well as track performance
    against a timeline.


    I find that many entrepreneurs will tweak mind maps until the end of time. But
    I like Gannt charts. Like a lot. I would always recommend starting with a brief
    outline in a mind map, then getting that into a Gannt chart as quickly as possible.
    Gannt charts allow you to do resourcing and dependency mapping, which would be
    challenging in a Word document or a mind map.


    I’ve done entire courses and certifications (including the `Project+` and `PMP`).
    Let’s break the process down in some digestible steps.


    - **Define the stakeholders**: I know, I pulled that word out of my `PMP` certification
    exam and it bothers you because it feels all corporatey and you run a small business.
    Too bad. One thing that’s nice about things like the `PMP` is that you end up
    using the same vernacular as others in that field. If you’re talking about project
    plans, especially if there’s a project manager involved, then you should try to
    use their words, especially if you want them to maybe hire you again in the future.
    If this is for your own product, then scale the project plan as you would any
    other initiative.


    - **Build a communication plan with the stakeholders**: If you’re the only stakeholder,
    then this is pretty easy. But stick to your check-ins with yourself. If there’s
    a bank or investor, make sure you understand how often they need to be communicated
    with. If there’s a subcontractor, then let them know well in advance how often
    you expect them to check in with you, and monitor (a.k.a. guard) the timeline
    of the project.


    - **Define the starting point**: Where are you now? Do you have any code written,
    infrastructure built, or component software or hardware purchased? Define these.


    - **Define the outcome**: What do you want this to look like in the end? What
    time constraints do you have? How long do you want to wait to go to market? Identify
    each milestone of the project with a due date, even if the due date is an arbitrary
    date you make up to keep yourself honest.


    - **Perform a gap analysis between the two**: Brainstorm everything that needs
    to happen to get this project off the ground. Don’t worry about breaking the larger
    chunks up yet, just make sure to be as holistic in your thinking as possible.


    - **Define resources**: Make a list of all humans, service companies, hardware,
    software, cloud services, virtual machines, and anything else you think you might
    need. Don’t worry about lunch though; I think you’ll figure that part out on your
    own every day.


    - **Define required tasks**: Remember that gap analysis? Now it’s time to break
    each one of those items down into tasks. In my opinion, never have a task that’s
    more than half a day on these. Each could be part of a larger entry uncovered
    in the gap analysis. At each check-in on the communication plan, you’ll want to
    cover the percent that each of these tasks is complete, and so the smaller the
    chunks the less risk that an overrun of costs for one task will go unnoticed and
    that you might be left holding the bag for the overspending.


    - **Define dependencies**: When doing dependency mapping, think of what’s required
    for each and every task. For example, you have to build a virtual machine before
    you can put a host OS on it, you have to do that before you can put a database
    service on it, you have to do that before you can cluster that database service
    to another in the database cluster, and you have to do that before you can attach
    it to a web service. When you get a lot of tasks, you end up with a lot of interwoven
    task dependencies. You can make sure that you don’t end up with a task that stops
    work down the road.


    - **Map resources to tasks**: Once you understand everything that needs to happen
    and the dependencies on one another, define who does what, and what you might
    need to purchase before you can have certain tasks be completed.


    - **Calculate risks**: You think it’ll take 4 hours to set up the first exchange
    server in a cluster. But could it take twice that? I like to calculate the risks
    of each task independently but to be realistic. Others like to calculate risks
    across a number of tasks, or as a standard percentage.


    All of this probably seems like it’s going to take more time to do than you initially
    thought. It is. If a customer or another vendor asks you for a project plan, then
    you need to make sure to factor additional costs in communicating at their cadence
    into the project. But once you have a visual representation of the project flow,
    it’s easier to communicate with everyone involved about what you want and where,
    similarly to a blueprint when building a cathedral.


    ### Note


    To produce a Gannt chart on a Mac, use a tool called `OmniPlan` that allows you
    to create them on your Mac. There are also Excel templates for project plans and
    a number of SaaS-based services.


    Once you have a visual representation of what you’re trying to do, you can best
    understand the go-to-market costs for the technical and infrastructure requirements.
    Next, it’s time to understand the cost of the sales plan and how long it will
    take before you can start recognizing revenue from the new project.


    ### Make a Sales Plan


    Many of us will get stuck in the solutioning of a new product or service. No matter
    how good the tech is, if no one buys it then it isn’t a success. So often, the
    capacity to sell the new product or service is what makes the endeavor a success.
    And that will usually start with a sales plan. What does a sales plan look like?


    - **Make marketing materials**: I actually like to start most projects with a
    glossy one-sheet or a piece of paper that provides an elevator pitch. Watching
    people’s faces when they read the headline and then the descriptions is a great
    way of getting a quick and dirty response of how the market will interpret the
    new offering.


    - **Compile talking points**: This is more of an in-depth review. I like to start
    with an FAQ on a company wiki and then keep a running list of items to add to
    that FAQ every time I get asked a question. Occasionally I’ll go and update the
    outline of the FAQ so it flows better.


    - **Communicate with sales teams about the new product**: The more in-depth your
    technical presentation, the less likely the message is going to be easily digested.
    I like to have a few meetings, with the first introducing the concept, the second
    digging in deeper on sales strategies, and the third doing role playing. Then
    make sure to schedule ongoing update meetings.


    - **Communicate with front-line employees about the new product**: Keep in mind
    that sales teams aren’t the only ones who sell products. Support, operations,
    and accounting can talk about sales and usually talk to as many existing customers
    as anyone else in the organization, making for a great cross-selling touch-point.


    - **Update systems so the new product or service is easy to sell**: I know I’ve
    said this already, but one thing you just can’t buy in business is inertia. When
    you’ve got it, don’t let it go! This means removing as much friction from the
    sales process as possible. Make sure SKUs are listed with good directions for
    when to use them, teams are ready to sell (enablement has been done organization-wide),
    and that any resellers are notified and enabled.


    - **Make sure you have buy-in from sales teams**: This is the most important aspect.
    If they don’t think they can sell a product or service, sellers will not be confident
    when they’re in front of customers.


    Once you’ve built a sales plan and a project plan, then it’s time to get started.
    And the flow should follow both plans. But because things don’t always work out,
    we’ll cover failing fast in the next section!'
