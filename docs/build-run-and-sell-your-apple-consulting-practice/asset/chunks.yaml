- fmt: '# Examples of Guerrilla Marketing


    Once you’ve exhausted your word-of-mouth network, it’s time to start spreading
    the word to strangers. This is the part where you can easily overthink things.
    But put some effort into a bunch of different things and see what works. What
    works is going to be different for every geography and target customer, so some
    techniques will work for some and not others, but it’s important to try them all.
    You never know what’s going to net you that key account!


    Some great things to try include the following:


    - **Drop off some flyers**: You know those pieces of paper at coffee shops with
    little tear-off strips so you can take a phone number home? Not all flyers are
    like that, but according to your market, they can work. Especially if there’s
    a place where people in that industry congregate. And speaking of congregations,
    don’t forget to see if your church will let you drop some off, or buy a cheap
    advertisement in their newsletter.


    - **Post to job boards**: When we were looking at researching pricing in Chapter
    [1](#469405_1_En_1_Chapter.xhtml), we went to `Craigslist` (or the local equivalent).
    Now let’s go back. Even if you’re more expensive, you can post your business.
    This might not be for you, but chances are that there are sites specifically for
    the type of industry you want to appeal to, and chances are that those have sites
    that you can post to. If you’re doing residential work, check out `Nextdoor.com`.


    - **Answer questions on message boards**: A step beyond the job board is to simply
    answer questions people ask. This should never be self-serving. If someone asks
    how to do a task, simply answer how. Your name will get out there and hopefully
    there’s a link in your profile as you do so. Unless you’ve written an article
    answering a question, never put a link back to your site in a message board –
    don’t be a spammer!


    - **Write articles**: Write information about how to use technology in a given
    industry or geography. Write about using an IT department to do more. Don’t write
    about how great you are. That should come through in the article. This could be
    your own site or one that serves your local potential customer base.


    - **Write software**: These days, the smallest script can get a lot of attention
    on a site like `GitHub`. This is mostly if your target market includes people
    in Information Technology (`IT`), but if it’s industry-specific, such as a little
    app to do something people in a given industry need to do, then you might be able
    to charge for it, or it might just be a great digital business card.


    - **Write a book**: Anyone can write a book these days. I mean, if they let me…
    But an e-book on using technology in a given horizontal or vertical market can
    be a great way to legitimize your consulting efforts and put you in a place where
    people are calling you.


    - **E-mail bloggers**: You want to get them to write about your services or products.
    Make sure to provide free access to your products, if they’re software, or explain
    why your story is interesting to readers of various blogs. Don’t send a form e-mail
    to a thousand bloggers, expecting them all to write about how awesome you are.
    Tell a story, and weave it back into their specific readers.


    - **Send mailers**: Yes, people do still read postcards they get from businesses.
    This is a numbers game, and the mailers need to be sent to the name of the person.
    If you’re looking to do work on Apple environments, then you’ll want to source
    a list of all of the companies in the area and who manages their computers (`Director
    of IT`, etc.) and then send a mailer to those individuals. This is a pure numbers
    game, so you need to send a lot to make any money back on what you’re spending.


    - **Make swag**: People love swag. Pens, calendars, sticky notes, shirts, stickers,
    etc. Include contact information and then give them away. Every time you fix a
    computer, leave behind a present. Do be careful not to violate any laws. So if
    you’re doing work in a school or for the government make sure you’re allowed before
    doing so. To some, it seems like this stuff doesn’t really work, but think about
    it this way, why would the local baseball franchise leave a calendar of games
    at every gas store if it didn’t?


    - **Give free demos**: The local Apple store, local Chamber of Commerce, or even
    a national stage can provide a great venue to meet potential customers. As with
    many of the ideas here, don’t be overly self-serving, but do represent something
    that might brand you as an industry expert and let potential customers see and
    potentially hire you.


    - **Attend or organize Meetups**: When it comes to Meetups, they don’t have to
    be specific to technology. If you’re looking for architecture firms, a Meetup
    for architects is a great way to meet people who might want to hire you. Since
    you aren’t an architect, make sure to mention that you have other firms in your
    portfolio of customers and try to learn more than you say. Don’t be pushy.


    - **Sponsor events**: This could be meetups, user groups, etc. Sometimes for the
    cost of a few pizzas and some beer, you can meet a great potential group of customers
    and hopefully some of them will want to hear about your services.


    - **Make content**: Blog posts are great, but there are lots of other types of
    content. If you’re trying to get your site listed on rankings for a given city,
    maybe list some places to visit—breweries, hiking trails, etc. If you’re marketing
    to specific industries, maybe look at having a comparison of software for those
    industries. Good content is always appreciated.


    - **Partner with other consultants**: No person, nor company, can do everything.
    Maybe you don’t do Google Apps integrations. Maybe you don’t do servers. Maybe
    you don’t feel comfortable doing forensics. Whatever gaps you have, there’s likely
    to be another local services provider who does them. If a customer asks you to
    do something, sometimes the best thing is to find someone else who does it really
    well, and then try to set up a quid pro quo relationship for customers.


    - **Get involved in the local community**: Now that you’re a consultant, you have
    tons of free time, right?!?! No. But you should make time for community involvement.
    Don’t advertise heavily at charity events, but do show up, help out, and look
    for ways to support causes. It’s karma.


    - **Throw a party for your customers**: Some simple times to celebrate your customers
    are during anniversaries of the company, various holidays, and maybe just because
    it’s Tuesday.


    - **Do work for free**: You’re trying to start a business, so doing some work
    for free might seem counterintuitive, but you can treat the soft cost of free
    work as a marketing cost, and you might be able to do something good for the world
    in the process.


    - **Press releases**: These are some of the most passive of marketing, but there’s
    a chance that someone that watches `Newswire` (`www.newswire.com`) might see it
    and find it interesting. These aren’t free, so be diligent about how you post
    them and seek help from experienced professionals, if only for your first one
    or two to get the hang of it.


    - **Sign up for work exchanges**: `Odesk` and other similar sites might take a
    cut, and you might be competing with some pretty low-cost outsourcers, but there’s
    a lot of work that go through sites like that, and you might take on some low-cost
    jobs if only to learn how to do the required tasks (so, guided learning).'
