    *   You are referring large amounts of business to someone else and not making
    enough of a markup or commission on it.


    *   There is a huge gap in the market. Either no one is actually doing something,
    or those who are happen to be incompetent or missing the mark.


    *   You see a competitor failing to deliver: Be careful about doing something
    just because a competitor is doing it. You don’t win wars by fighting an opponent’s
    strategy. But sometimes, you can see that a competitor has a good idea and that
    they’re just not delivering it in a way that makes sense.


    *   You see a company delivering a product with a massive barrier of entry and
    you think you could go down-market and deliver most of what customers need in
    a much cheaper OR easier-to-use fashion.


    *   You really, really want to do something—like your gut is just telling you
    absolutely you have to do it.


    *   Your staff really, really want to do something. And they’re willing to own
    an initiative, even if they have to work on it on their own time.


    You’ve identified some initiatives and taken a step back to decide if it’s a good
    idea. Now take another step back and think about it even more critically. In the
    next section, we’ll look at some ways to keep yourself honest and how to look
    at things critically before moving forward.'
