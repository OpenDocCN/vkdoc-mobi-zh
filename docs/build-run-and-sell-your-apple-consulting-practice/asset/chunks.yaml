- fmt: '### Fail Fast


    OK, so here’s a secret. Your plan might have a tiny flaw. Or, it might be a terrible
    plan. Or, it might be a terrible idea. So I say "fail fast" with a little hesitation.
    But, your plan might go on losing you money for years if you don’t eventually
    stop. So how do you know when to let go? The same way you know when to start someone
    on your fantasy football team or when to buy a given stock: intuition. Study the
    numbers. Especially trend lines (which we cover in Appendix D) and do so as intelligently
    as possible.


    If you really feel like an initiative is going to be just the thing the company
    needs, then make an educated decision to keep going. But make sure to look at
    the following first:


    - Sales for the initiative

    - Costs for the initiative

    - Potential customers that are planning to purchase

    - Timelines for the completion of a given project

    - Pricing for goods and services

    - Access to competition that your market has


    Finally, don’t forget to estimate the impact of pulling out of an initiative.
    Will customers be put in a bind? And how can you soften the message, while being
    final about any decisions?


    ## Dealing with Failure


    We can’t always be successful. You’ll hear a term "fail fast" in all of the business
    books. I would say that while you want to be quick to respond, don’t do so until
    you understand why you’re failing. Sometimes, as business owners, we have to put
    our egos to the side and be as honest with ourselves as possible. There’s a chance
    that pivoting is better than failing. There’s also a chance that the timing is
    wrong and we should cut our losses while we have the chance. Either way, there
    are two main buckets into which I’d put failures in an Apple consultancy: customer
    initiatives and technology initiatives.


    ### Why Customer Initiatives Fail


    Sometimes, we decide to jump into a new area, and we fall flat on our faces. And
    that’s the way new initiatives are supposed to go. This can be especially challenging
    for people who have never experienced failure in a professional area. The reasons
    why our initiatives fail are infinite but can really be summed up in a few different
    areas, including sales, project management, customer perception, and architecture.
    Sales is typically because what you’re trying to do doesn’t resonate with customers.
    Project management is about the plan not being followed well. Architecture is
    about the plan being wrong, and customer perception is that the idea isn’t communicated
    well (so more of a marketing fail).


    Since most Apple consultancies are going to focus on technology projects, we’ll
    dive into this a bit more granularly.


    ### Why Our Technology Initiatives Fail


    One of the most frustrating things in business is when your technology initiatives
    never get implemented. Why do so many fail, costing organizations untold expense,
    negatively impacting trust in those championing projects, and hurting the ability
    to complete other projects? There are about as many answers as there are projects
    that fail. Let’s look at some.


    - **The Strategy Misses the Target**: You have a goal. This goal is to address
    a problem, make an improvement to systems that make them more useful, complete
    an upgrade, etc. You translate that goal into a strategy. But not every strategy
    can be perfect. If an initiative fails to launch, consider a new strategy, iterate
    on an existing strategy, and re-think whether the goal is worth the expenditure.


    - **Unclear Goals**: If your whole team understands the underlying goals of a
    project, they are more likely to make decisions in alignment with what you’re
    actually trying to accomplish. As you add team members, make sure they’re onboard
    in a way that not only tells them what to do but also provides the "why."


    - **No Buy-In**: Different parts of an organization have different reporting lines
    and different goals. To get buy-in from other teams, look for ways that your project
    can be beneficial to other groups within your organization. The political capital
    you could end up walking away from if your initiative resolves problems for others
    can be immeasurable.


    - **Conflicting Initiatives**: Sometimes these goals are complimentary and sometimes
    they are at odds. To keep your initiatives from going down the political abyss,
    involve others in the planning phases of any major initiatives. And as your projects
    mature, look for ways to keep communication flowing, to keep conflicts at a minimum.
    After all, conflicts often mean overlapping costs, so this should help keep your
    costs in check as well!


    - **Costs**: Your accounting department will throttle me if I don’t mention cost.
    You can have good, fast, and cheap: pick 2. To make sure your initiatives stay
    within an appropriate cost structure, have a target Return on Investment (ROI)
    for each. A realistic ROI is often the most important aspect of a project. The
    ROI isn’t to "make more profits." Instead, ROI should be represented in clear,
    concise, and quantifiable metrics, well communicated throughout the organization,
    not just the stakeholders on your team.


    - **Bad Tactics**: No matter how good your strategy, your initiative may fail.
    Often, when the proverbial rubber meets the road, the tactics leveraged to close
    your gaps might be incomplete, in the wrong order, based on bad assumptions, or
    just end up being bad ideas. I find the best way to protect from poor tactics
    is to use peer review to identify potential pitfalls and bad ideas.


    - **The Technology is the Wrong Fit**: Sometimes technology is too new, buggy,
    doesn’t meet the goals of the initiative, or is just crappy. The best way to make
    sure your software is the right fit is to solicit as much feedback as possible.
    For example, if you are implementing a new CRM and haven’t discussed the project
    with sales teams, then how can you be sure the CRM is the right fit for the organization?


    - **Project Management**: Depending on the scale of a project, a good project
    manager will reign in many of the most critical aspects of a project, communicating
    change with key stakeholders. Before you start a project, decide how the project
    will be managed and set up milestones and a communication plan early.


    - **Impatience**: Step one, do some stuff. Step two, make all the monies. I wish
    every project went that way. Sometimes there are 192 other steps that span 3 years.
    Know your ROI, but also know the aging process to realize that ROI. A new product
    may require a year to mature, which includes architecture, scoping, implementation,
    waiting for vendors, starting gain positive momentum, etc. This time is valuable
    when you’re improving your organization but should not be implemented improperly
    due to the team rushing through the project.


    - **Communication**: Your team needs to be clear about all the things: underlying
    goals, project plans, who the key stakeholders are, who’s funding the project,
    what to do when going over budget, and anything else that’s important. This isn’t
    a repeat of the previous items—it’s to emphasize that if people don’t know about
    each aspect of the project, they cannot successfully implement it.


    Finally, this section is about technology in businesses. But nearly all of the
    reasons strategies fail are applicable across types of organizations.'
