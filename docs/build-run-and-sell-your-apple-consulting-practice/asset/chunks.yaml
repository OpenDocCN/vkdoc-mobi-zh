    ## 延伸阅读


    - 《小企业主会计》（Accounting for Small Business Owners），泰科出版社：[`www.amazon.com/Accounting-Small-Business-Owners-Tycho/dp/1623155363`](https://www.amazon.com/Accounting-Small-Business-Owners-Tycho/dp/1623155363)

    - 《小企业会计快速入门指南》（Accounting for Small Businesses Quick Start Guide），克莱德班克商业：[`www.amazon.com/Accounting-Businesses-QuickStart-Understanding-Proprietorship/dp/1945051000`](https://www.amazon.com/Accounting-Businesses-QuickStart-Understanding-Proprietorship/dp/1945051000)

    - 《小企业会计：为初创企业、独资企业、有限责任公司量身打造的终极商业会计简易指南》（Accounting For Small Business: The
    Ultimate Business Accounting Made Simple for Startup, Sole Proprietorship, LLC），瑞安·康纳：[`www.amazon.com/Accounting-Small-Business-Ultimate-Proprietorship/dp/154817582X`](https://www.amazon.com/Accounting-Small-Business-Ultimate-Proprietorship/dp/154817582X)

    - 《税收与法律攻略》（The Tax and Legal Playbook），马克·科勒：[`www.amazon.com/Tax-Legal-Playbook-Game-Changing-Small-Business/dp/159918561X`](https://www.amazon.com/Tax-Legal-Playbook-Game-Changing-Small-Business/dp/159918561X)

    - 《开门营业：商业房地产内部指南》（Open for Business: The Insider’s Guide to Commercial Real Estate），泰勒·考布尔：[`www.amazon.com/Open-Business-Insiders-Leasing-Commercial/dp/1619617234`](https://www.amazon.com/Open-Business-Insiders-Leasing-Commercial/dp/1619617234)

    - 《50 项房地产投资计算：现金流、内部收益率、价值、利润、权益、收入、投资回报率、折旧等》（50 Real Estate Investing Calculations:
    Cash Flow, IRR, Value, Profit, Equity, Income, ROI, Depreciation, More），迈克尔·兰特里普：[`www.amazon.com/Real-Estate-Investing-Calculations-Depreciation/dp/1945627026`](https://www.amazon.com/Real-Estate-Investing-Calculations-Depreciation/dp/1945627026)

    - 《一次做对：老板雇佣首席财务官指南》（GET IT RIGHT THE FIRST TIME: The Owner-Manager’s Guide to
    Hiring a CFO），兰斯·奥斯本：[`www.amazon.com/GET-RIGHT-FIRST-TIME-Owner-Managers-ebook/dp/B01HIX2UGI`](https://www.amazon.com/GET-RIGHT-FIRST-TIME-Owner-Managers-ebook/dp/B01HIX2UGI)

    - 《创办与经营小企业法律指南》（Legal Guide to Starting and Running a Small Business），弗雷德·S·斯坦戈尔德：[`www.amazon.com/Legal-Guide-Starting-Running-Business/dp/141332407X`](https://www.amazon.com/Legal-Guide-Starting-Running-Business/dp/141332407X)

    - 《如何聘请律师》（How to Hire Lawyers），何塞·包蒂斯塔、艾萨克·凯普勒、杰弗里·瓦格纳：[`www.amazon.com/How-Hire-Lawyers-Hiring-Attorney/dp/1978454082`](https://www.amazon.com/How-Hire-Lawyers-Hiring-Attorney/dp/1978454082)

    - 《女性会计/簿记自由：如何快速、轻松地找到、雇佣并高效地与低成本虚拟会计师/簿记员合作……（适用于您的实践或创业企业）》（Accounting / Bookkeeping
    Freedom for Women: How to Quickly & Easily Find, Hire & Work Effectively With
    a Low-Cost Virtual Accountant / Bookkeeper for Your … Practice, or Entrepreneurial
    Business），克林特·亚瑟：[`www.amazon.com/Accounting-Bookkeeping-Freedom-Women-Entrepreneurial-ebook/dp/B00BMWE4J8`](https://www.amazon.com/Accounting-Bookkeeping-Freedom-Women-Entrepreneurial-ebook/dp/B00BMWE4J8)

    - 《职场多元化的机遇与挑战》（Opportunities and Challenges of Workplace Diversity），凯瑟琳·卡纳斯、哈里斯·桑达克：[`www.amazon.com/Opportunities-Challenges-Workplace-Diversity-3rd/dp/013295351X/`](https://www.amazon.com/Opportunities-Challenges-Workplace-Diversity-3rd/dp/013295351X/)


    # 5. 购买软件以实现业务自动化


    我们大概都说过“有个应用程序可以解决这个问题”。而这句话在创业的各个方面体现得尤为真切。基于应用程序的经济为小企业带来的好处之一，就是让它们能与大型企业并驾齐驱。过去你总希望拥有一个能处理几乎所有事务的工具，如今这样的日子已一去不复返——你确实拥有了。曾经需要支付巨额费用购买庞大、单一、并强迫你以特定方式开展业务的软件，那种日子也已成为历史。如今，我们可以将各种小型工具和工作流程串联起来，实现从管理故障单、修复系统、向您发送设备问题通知，到处理收款等几乎所有事务的自动化。


    因此，你需要在本章做的是：组合一套工具集，帮助实现业务自动化，这样你就不必凡事亲力亲为。从技术入手。始终从为客户构建最佳解决方案开始；在本章中，我将其称为“技术核心”。然后，围绕该方案，接入能够自动化业务服务端的功能模块；这些就是专业服务自动化（PSA）和托管服务自动化（MSA）工具。最后，利用来自应用经济中的常见现成产品，将它们全部整合在一起。但正如我所说，这一切都从“技术核心”开始。


    ## 选择你的工具


    本章后面的“技术核心”部分提供了相当长的技术解决方案列表。为什么我要列出这么多选项，而不是给你一条易于遵循、全面详尽、包罗万象的工具路线图呢？因为它们各有千秋，难分伯仲。也许你想要一套基于开源的工具链；也许你想保持简单，只对
    Mac 进行 MDM（移动设备管理）式的设备管理；也许你有足够多的设备，值得雇佣一个开发运维团队或平台工程团队来自动化大量维护和设备管理任务；又或者，你想构建大量的零层资产，让客户能够自助服务，并将其接入基于机器学习的聊天机器人。也许你偏爱
    100%的个性化触达，只想在出现问题时收到警报。


    无论你选择做什么，最重要的是了解市面上有哪些选择，并有意识地决定哪些要做、哪些不做。首先，让我们来看看设备管理解决方案，或者说那些允许你远程集中管理设备状态、从而免去你执行日常任务之苦的工具。

    '
- fmt: '### Device Management


    Of the tools listed later in the chapter, the device management tools are going
    to be one of the most important that you select. When I wrote my first book on
    Managing Macs in the Enterprise, there were four device management tools. Today
    device management is a multi-billion dollar business and there are dozens, each
    with their own niche of sorts. Mostly because Apple developed an API for managing
    devices, known as Mobile Device Management (`MDM`). Back then, you had to image
    devices before you put them into the hands of users. With the Device Enrollment
    Program (`DEP`), Apple has mostly removed the need for imaging by having devices
    join an `MDM` solution when first turned on, thus allowing for the automated configuration
    of devices in lieu of imaging. Apple also introduced the Volume Purchase Program
    (`VPP`), which allows `MDM` solutions to deploy apps onto devices from the App
    Store. Most of the management many organizations needs is then able to be done
    through a GUI that sits on top of a bunch of API calls to normalize Apple services.


    That’s an `MDM` in a nutshell. But then there are tools with agents of varying
    maturity. `Jamf Pro`, `Munki`, and `FileWave` are probably amongst the most important
    of these. Those tools may or may not also have an `MDM` component. `Jamf Pro`
    and `FileWave` are the most fully featured of these. An emergent combination of
    `AirWatch` and `Munki` is another, although the future of this unlikely partnership
    has yet to be seen.


    Which is the best management tool? I won’t go into those in this book because
    they’re always changing, and because the authors and vendors of these tools have
    very thin skins (of which I am one). But each of these tools has an API and can
    be configured to work with common service desks and/or Professional Services Automation
    tools. For example, I wrote a tool that integrates `Jamf Pro` with Salesforce
    Cases and another that integrates `Jamf Pro` with ZenDesk. `Jamf` has an integration
    available on the ServiceNow marketplace. Another example would be a tool that
    integrates `ConnectWise`, a popular PSA, with `Jamf`. I work for `Jamf` so these
    are the most familiar to me, but there are likely going to be integrations of
    varying degrees of maturity with any management tool you select.


    Additionally, there are management tools that are made by organizations that also
    do things like PSA. `LabTech`, `ConnectWise`, and `Kaseya` are all tools that
    are Windows-first, and they work great for platforms that aren’t Apple (e.g. all
    have Mac agents). And all of those agents are glorified script runners with very
    little logic built in. Therefore, if you use a tool like this, you’ll also likely
    need another tool, capable of actually helping you manage devices and get information
    about them effectively. This isn’t to say you can’t use them. You should, in order
    to save the effort and cost, until you outgrow them. Just to temper your expectations
    as to how long that will take.


    One exception is the `Solarwinds MSP` tool. The maintainers of the toolset used
    are working hard to build a comprehensive solution that allows an MSP to sell
    not only device management, which for a managed services provider will likely
    be more of a cost reduction tool, but also to provide backup and antivirus solutions,
    which are add-ons with costs that are simple to pass back to your customers. That
    will increase sales, increase MRR, and decrease the costs you incur in supporting
    devices (for example, restoring from a backup is often a quick fix compared to
    troubleshooting corrupt devices). This toolchain might not work for you for whatever
    reason. If that’s the case, it’s still a good idea to look at the products they
    offer as ways to boost revenue and have happy customers.


    ## PSA, MSA, RMM, and BDR (Oh My!)


    Choosing the right Professional Services Automation (`PSA`) and/or MSA (Managed
    Services Automation) is one of the most important things that many a Managed Services
    Provider will do. This is expensive software that is meant to save you time. And
    there is no clear-cut answer as to what is the right automation software you should
    be using. Why? Because each has strengths and weaknesses. And I won’t go into
    those in this book because they’re always changing, and because the vendors who
    make these tools have very thin skins.


    But I can provide guidance. First, look for tools that focus on the platform you
    primarily support. If you are primarily a Mac shop, look at the Mac support in
    software; if you are more a Windows shop and adding Mac as a snap-on, look for
    good, deep integration with Windows installers. Even better, there are actually
    tools out there that focus on the vertical markets you might be supporting and
    those are often the best as they have logic built in that will save you time and
    money when working with customers in that market.


    The main goal of a `PSA` or `MSA` solution is to save you on labor costs, while
    providing additional value to your hard-earned customers. If you can proactively
    fix a problem before the person using a device experiences some kind of work stoppage,
    then you’ve earned that support contract. A little follow through goes a long
    way; without making a big deal of things, communicate that to customers, so they
    understand the value of the services you provide.


    Remote Management and Monitoring (`RMM`) is a tool that allows you to remotely
    manage devices. A good `RMM` tool will, as with many things, allow you to do multiple
    things. One of my favorite is just reaching in and taking control of a desktop
    to troubleshoot. While you want face time with customers, you also want to control
    costs and deliver faster outcomes for your customers; therefore, `RMM` is critical
    to efficiency by keeping butts in chairs and out of cars.


    ### BDR Software


    BDR stands for Backup and Disaster Recovery. This type of software is considered
    by many to be an add-on to base offerings. But it’s important to consider that
    nothing will get you fired faster than losing data. Explaining why data was lost
    and isolating whether it was internal IT, end user, or your organization that
    caused data loss is irrelevant.


    The perception when it comes to lost data is that your consulting firm should
    have kept that from happening. Beyond data loss, `BDR` software provides you with
    a number of additional options when it comes to streamlining your troubleshooting
    and device upgrade/replacement programs. You can bundle `BDR` into your offering;
    however, that causes your base price to seem higher. Either way, even if you run
    a `BDR` offering at a very slim margin, the more you can assume that devices are
    backed up (which means you need most recent completed backup as part of your device
    management software), the more flexible you can be. Beyond the need for comprehensive
    `BDR`, there are other points when it comes to `RMM`, `PSA`, and `MSA` software
    as well, which we will cover in the next section.'
