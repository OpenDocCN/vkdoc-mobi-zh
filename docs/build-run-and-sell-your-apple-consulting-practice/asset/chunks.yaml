- fmt: "# Building Service Packages\n\nBundles are a great way to amplify the sale\
    \ of services within a larger organization. They also reduce friction during the\
    \ sales process because they’re easy to explain. Once you know your necessary\
    \ margin, look at your costs, look at the percent that you can bill versus the\
    \ percent of time that the organization will be giving away to close sales, subtract\
    \ out the reseller margin, and figure out a necessary daily number. Easy, right?\
    \ Let’s extract margin from a daily average price versus cost structure:\n\n>\
    \ `((Number of days billed in a year * MSRP) * Average Reseller Margin) / Annual\
    \ Departmental Cost`\n\nIf you pull a report of the total goods sold, you start\
    \ to get a pretty good picture of costs associated with running a team and the\
    \ complexities that can arise. The above formula quickly goes into a spreadsheet\
    \ or a database. And it only gets more and more complicated. Once you know your\
    \ daily cost, the necessary margin, and the actual goals, now let’s build a bundle.\
    \ Wonder why I said to figure out pricing in the previous section (before you\
    \ did this exercise)? As a sanity check.\n\n## Tip\n\nWhen at all possible, I\
    \ prefer working in daily increments with services teams inside larger organizations.\
    \ If you’re sitting in a meeting or need to make a snap decision, knowing the\
    \ daily cost and the daily profit gives you a great baseline. Even if you deal\
    \ in fixed-cost Statements of Work, you’re going to do the math to build the bundle\
    \ based on an amount of time it will take to achieve your deliverables.\n\nThe\
    \ bundle is meant to make it simpler to buy services. This makes it easier for\
    \ teams to communicate what a customer is getting. There are two ways to approach\
    \ bundling: days or deliverables. And then you need to decide if you will bundle\
    \ services with other products in the portfolio of an organization. For example,\
    \ let’s say your organization sells training classes. You might bundle 5 days’\
    \ worth of training and 5 days’ worth of custom services, apply a 10 percent or\
    \ 20 percent discount to that and then a customer is more likely to buy the bundle,\
    \ thus potentially getting you additional sales that you might not have had otherwise.\n\
    \nBundles of days mean less Statements of Work need to be written (less is very\
    \ different than saying none). This impacts your costs, and customers always have\
    \ an expectation that they will get a discount when buying in bulk. Just make\
    \ sure that when stacked with a reseller margin that you will still be meeting\
    \ your target margin.\n\nNow that you’ve built out your services packages and\
    \ the appropriate discounts that can be applied to them, it’s time to put the\
    \ processes in place that support the services component of the business or refine\
    \ them to meet the new services packages.\n\n## Change Control\n\nOnce you’ve\
    \ built the products and services you plan on taking to market, they should undergo\
    \ scrutiny and then be put into a form of change control. The scrutiny will look\
    \ different in each organization, but be thankful for it and not defensive in\
    \ the least.\n\nIf no one feels comfortable providing scrutiny, go to the product\
    \ management team. All product management teams are happy to give feedback on\
    \ anything you might ask them of, including the product, everything around the\
    \ product, the best way to make a peanut butter and jelly sandwich, and endless\
    \ debates about whether Led Zeppelin or Pink Floyd was more impactful to rock\
    \ and roll music.\n\n## Operationalize Services\n\nEvery company is going to have\
    \ different areas that need to be checked off before you can consider your new\
    \ services packages and operations as being on autopilot, which is really the\
    \ goal of any business function. According to the size of the company, there are\
    \ teams you need to meet with to explain what you’ll be doing and why. A few of\
    \ these will even give you homework.\n\nHere are some questions you should ask,\
    \ and if there are teams at your organization who deal with these, schedule meetings\
    \ to confirm your assumptions.\n\n- **Legal**: One of the most important aspects\
    \ of delivering services is to make sure your contracts with customers cover all\
    \ of the goods and services provided to customers. Any time you change or add\
    \ a `SKU`, make an appointment with your legal/contracts team and verify that\
    \ these cover what you’re doing. If your legal team manages corporate insurance\
    \ policies, then review these as well; otherwise, work with both the insurance/risk\
    \ team and the legal team to make sure that insurance policies cover the scope\
    \ of the services you’ll be providing.\n\n- **Sales operations**: Most sales teams\
    \ need a `SKU`. We’ll talk about sales enablement later, but you need to equip\
    \ sales operations teams with a list of product names and costs. Schedule this\
    \ meeting early, as many organizations have specific change windows where `SKU`s\
    \ can be changed due to similar windows with distributors and resellers. Typically,\
    \ a change you make will not take effect with resellers for at least 60 days.\
    \ Additionally, iron out any details with how communications and sales enablement\
    \ are handled with partners.\n\n- **Finance**: You have coordinated `SKU`s, but\
    \ now it’s time to figure out what happens when they’re sold. Some details that\
    \ need to get worked out include the following:\n  - When is revenue recognized\
    \ (e.g., upon delivery of the service or spread equally across the duration of\
    \ a services contract)? How will finance report on that?\n  - What kind of impacts\
    \ do costs in finance have on the revenue that gets recognized, including commissions,\
    \ costs, unallocated expenses, facilities costs, subcontracting costs, etc?\n\
    \  - How is the income derived from those `SKU`s actually allocated once the revenue\
    \ is recognized, and how will you report on this?\n\n- **Ticketing**: This is\
    \ an important component. You need to ticket in such a way that you don’t make\
    \ supporting customers even harder than it is otherwise. Therefore, your tickets\
    \ need to use the same system as that of your support teams. But the ticketing\
    \ system also needs to probably track travel and support reporting on the utilization\
    \ of time-based consultants. Additionally, if you recognize revenue based on ticket\
    \ closures, then make sure to work out how finance will get those reports.\n\n\
    Once you’ve sorted out all of these details, write them down. If your company\
    \ has an intranet or wiki, put the information there. Be as complete as you can\
    \ be and then have the teams you meet with confirm the notes you took, which then\
    \ became articles. These also act as an FAQ for when people ask about how the\
    \ services operations work in the future.\n\nNow that you’ve got a bunch of details\
    \ sorted out, expect more that I can’t begin to prepare you for. Once those are\
    \ sorted out, you can move on to getting marketing and sales enablement efforts\
    \ underway. Before you start working with sales teams, first make sure your marketing\
    \ team has provided some good air cover to support their efforts."
