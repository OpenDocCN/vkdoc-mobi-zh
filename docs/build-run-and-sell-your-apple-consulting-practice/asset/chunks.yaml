  trans: '

    # 以客户为中心的销售


    许多产品需要漫长的销售流程，其中不少还需要为客户提供复杂的解决方案。以客户为中心的销售，关键在于将销售人员转变为协作型顾问，使其成为客户信赖的咨询伙伴。这使得该模式依赖于以下几种行为准则：


    -   你要按照客户的时间表完成交易，而非你自己的节奏（除非你利用特殊定价和折扣来提前客户的时间表）。这可能与你合理管理销售渠道所面临的压力相悖，但从长期/多季度视角来看，这是经营业务的上佳方式（毕竟，如果一笔交易在下季度的第一周成交，而非本季度的最后一周，你就为新季度赢得了良好开局）。

    -   决策者与采购人员往往并非同一人，尤其在大型组织中。应将销售精力更多地瞄准决策者，而非采购人员。

    -   让客户亲身体验产品。

    -   了解客户所处阶段，并与之同步，而不是使用不切合客户需求的演示文稿。

    -   为掌握客户现状，需针对其业务提出相关问题，而非直接介绍你的组织能提供何种帮助。

    -   聚焦解决方案而非关系（当你解决客户问题后，关系自然会建立）。

    -   不要刻意表现忙碌，那是过时的伎俩，试图让客户因你需求旺盛而认为你很厉害。相反，应专注于提供最佳解决方案以满足客户明确的需求。

    -   帮助潜在客户购买你的产品，而非通过咄咄逼人的销售技巧去说服他们。


    ## 选择方法论


    市面上存在的销售方法论，几乎和真正出色的客户经理、销售工程师及销售主管一样多。这或许是因为，当你达到精英级别的技能水平时，你会吸收已有的知识体系，并将其融入自己的风格，进而形成独特的专长。


    这些销售策略可以成为文档化的方法论，助力企业蓬勃发展。但它们需要充分的培训、扎实的能力和专业的技巧，以吸引并打动如今见多识广、成熟理性的客户，而非仅仅试图说服他们。销售绝非易事。


    一个方法论可以放大优秀销售者的能力，帮助他们达成更多交易；也可能给高绩效者带来阻碍，使其更难成交。没有哪种方法论是完美的。某些情况下，它们的原则惊人地相似。但核心理念通常是：多倾听，少说教，尊重买家的时间，按他们的节奏推进流程，尊重潜在客户，即使他们不购买你的产品也要提供帮助。每一种方法论在细节上都能为你的组织创造巨大价值。


    本文中我提及的几种方法论，所涵盖的内容详略程度不一。这并非因为某种方法论更好，而是我与其中一些接触较多，且应用时取得的成功程度不同。无论采用哪种方法论，起点都是为优秀的销售者配备优质的产品。但方法论确实能提供助力，能让团队成员保持步调一致，并为你提供大量现成的培训素材，作为你开展培训和赋能工作的基础。那么，现在我们再多招些人来促成这些交易吧！


    ## 实施你的方法论


    现在你已选定了一套自认为可行的方法论。是时候招聘你的第一位销售了。这个人选应是你认为有潜力培养成销售领导的人才。但不要轻易承诺，以防结果不尽如人意。招聘时应看重其能力而非资历。你最终可能会招到曾卖车给你的人，也可能是刚走出校门的毕业生。而且，如果你招聘是为了扩充团队能力而非接管现有客户名单，那么这份工作很可能成为这位新销售的首个科技销售职位。


    行业新人往往是最容易培训的。他们通常对“事情应该如何运作”没有先入为主的观念，而且往往具备许多你意想不到的技能——常常能帮助创新业务乃至整个行业的运作方式。


    如果你招聘的是行业新人，那么实施销售方法论其实只需要你阅读一些相关书籍或参加一些该方法的课程。在此过程中，尽量别让个人观点扭曲你理解这些内容的方式。值得一提的是，几乎每位创业者都会基于自己的个性发展出一套方法论。但个性无法规模化复制。因此，方法论、销售培训和销售赋能的意义在于，你无需花费一万亿美元去克隆自己（复制多次）。

    '
- fmt: '# Working with Big Companies


    Working with larger customers is a natural point of growth for many small and
    medium companies. There’s a certain thrill you get when you land your first big
    deal with a massive customer—a banner account that will help grow your business
    and also proves that you’ve “made it.”


    But there’s a risk as well, which I learned the hard way. If you aren’t careful,
    a large company can make up an equally large percentage of your business. And
    then one day, no matter how good of a contractor you are, they can be gone, leaving
    you in a precarious position; often at no fault of your own. By then it might
    be too late to take steps to minimize the impact of losing a customer like this,
    and you might end up getting forced to be creative to retain employees (and to
    pay them).


    Here are five lessons I learned the hard way to keep in mind when partnering with
    big companies:


    - **Understand your customer’s latency**: This means knowing the answer to questions
    like, “How long will the customer really take to complete decision-making and
    to provide approvals to a project?” and “What’s the timeframe for you getting
    paid once that project is completed?” When I landed my first major company as
    a customer, I didn’t realize it could take up to 6 months to get paid, just because
    I needed a `PO` to be approved by someone. I was also unaware how common it would
    be to have an occasional invoice stall for an additional 3 months due to routine
    account audits. Being able to plan my cash flow around such schedules would have
    saved me a lot of stress.


    - **Don’t fall victim to “death by meeting”**: In a large company, many more stakeholders
    are usually involved with every project. While there are good reasons for this,
    it does add latency to getting projects started. This extra time is what I call
    the “hurry up and wait” time. Given this, be prepared by ensuring to budget enough
    time for the project in your pricing. A great start would be to ask at the outset
    the cadence of the meetings your big customer will require.


    - **Ask about compliance**: If you have access to a file, you might also need
    to meet certain security guidelines while viewing it. You’ve already gone through
    the effort of bidding, meeting with, and closing your big customer, so don’t accidentally
    kill the project by not meeting their specific compliance requirements. Ask for
    a list of security and compliance guidelines upfront to help cut back on latency
    and also ensure that you’re meeting certain requirements.


    - **Know the fiduciary requirements**: This involves knowing the answers to questions
    like, “How much insurance do you have?”; “Are you OK providing an overview of
    your organization’s financials for the past 3 years?”; “If someone else were to
    look at them, would the books actually make sense?”; and “Does the big company
    you’re partnering with have a requirement that they not represent more than a
    given percentage of your organization’s billings?” The point here is to know the
    specifics that are required by your partner organization, and then be prepared
    for additional fees that contracts may not address.


    - **Competition can be fierce**: There is likely a line of other vendors waiting
    to work with the big company you’ve partnered with, but don’t let that drive you
    into making decisions that might end up being terrible for your business. Use
    it as motivation to offer something truly unique that will continue to set you
    apart from your competition and to make your customer thankful for choosing your
    business.


    The key thing to keep in mind is to take the right steps to ensure they don’t
    accidently put you out of business! Be mindful of the requirements that are communicated
    when you engage in such a relationship, and be prepared for these new large customers
    to take time away from your base of clients that put you where you are. A big
    new relationship comes with branding, making you a legitimate authority in your
    space, and, of course, hopefully profit. Working with large customers doesn’t
    come without its own challenges, but it’s absolutely worth it. As long as you
    go in with your eyes wide open, they can also take your organization to the next
    level!


    # Conclusion


    In my opinion, sales and marketing are the hardest part of running a business.
    But I come from an engineering background so I probably would think that! While
    probably not the right strategy for everyone, in this chapter I tried to guide
    you through a methodical approach to selling. If you hire one amazing salesperson
    who needs no management then you might not need to focus on methodology and stuff
    like that. But if you are new to sales then following along with a methodology
    will arm you with some valuable insight to help provide guidance to your new stuff.
    And if you grow beyond one, then you’ve got an excellent and pre-defined path
    you can follow to get them training.


    We looked at hiring sales here and there in previous chapters. And in later chapters,
    we’ll look at the other dark arts of marketing and advertising, providing air
    cover for your sellers. If you don’t have those, then your sales teams might find
    it hard to prospect leads and nurture them into closing or transacting business.


    Now that we’ve looked at selling your core service, let’s move on to adding items
    that your sales team can transact on in Chapter `11`.'
  raw: '## Working with Big Companies


    Working with larger customers is a natural point of growth for many small and
    medium companies. There’s a certain thrill you get when you land your first big
    deal with a massive customer—a banner account that will help grow your business
    and also proves that you’ve “made it.”


    But there’s a risk as well, which I learned the hard way. If you aren’t careful,
    a large company can make up an equally large percentage of your business. And
    then one day, no matter how good of a contractor you are, they can be gone, leaving
    you in a precarious position; often at no fault of your own. By then it might
    be too late to take steps to minimize the impact of losing a customer like this,
    and you might end up getting forced to be creative to retain employees (and to
    pay them).


    Here are five lessons I learned the hard way to keep in mind when partnering with
    big companies:


    *   **Understand your** **customer’s latency** : This means knowing the answer
    to questions like, “How long will the customer really take to complete decision-making
    and to provide approvals to a project?” and “What’s the timeframe for you getting
    paid once that project is completed?” When I landed my first major company as
    a customer, I didn’t realize it could take up to 6 months to get paid, just because
    I needed a PO to be approved by someone. I was also unaware how common it would
    be to have an occasional invoice stall for an additional 3 months due to routine
    account audits. Being able to plan my cash flow around such schedules would have
    saved me a lot of stress.


    *   **Don’t fall victim to** **“death by meeting”** : In a large company, many
    more stakeholders are usually involved with every project. While there are good
    reasons for this, it does add latency to getting projects started. This extra
    time is what I call the “hurry up and wait” time. Given this, be prepared by ensuring
    to budget enough time for the project in your pricing. A great start would be
    to ask at the outset the cadence of the meetings your big customer will require.


    *   **Ask about** **compliance** : If you have access to a file, you might also
    need to meet certain security guidelines while viewing it. You’ve already gone
    through the effort of bidding, meeting with, and closing your big customer, so
    don’t accidentally kill the project by not meeting their specific compliance requirements.
