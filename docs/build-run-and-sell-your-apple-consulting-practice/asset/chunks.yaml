    as much coverage as possible to customers, keep in mind that centralizing around
    a good, better, and best approach, or even a single vendor, allows you to focus.
    You can get really good at building solutions around that vendor, potentially
    getting leads from vendors, and having fewer tools to try to access in the event
    a customer has issues.


    The fact that you’re selling a solution can change your approach. For example,
    if you’re selling Dropbox then you might not even bring up Box.com or Office 365
    in conversations. Just make sure that the experience to each customer is great
    and that they’re not sacrificing a streamlined workflow so you can make an extra
    buck.


    ## Evaluating the Security of Cloud-Based Solutions


    The perspective is everything must go to the cloud, and now! And sometimes finding
    a tool is about workflow. And the workflow should make sense and be awesome.


    But there’s an argument that you shouldn’t even keep a lot of data, unless it’s
    kept confidential and therefore properly secured. The liability of keeping information
    about other people and what they do is just too great to outweigh what you might
    otherwise use the data for.


    Security matters. Workflow matters. And with the number of services out there
    that you can use for any given task, if any aren’t secure enough then there are
    probably 10 others you could use that are. So why might you choose to use a given
    service?


    *   Compliance: One of the best ways to verify that your data is secure with an
    online service is to check how various aspects of solutions are governed. Many
    cloud solutions list the controls by which they are governed, often using industry
    standardized controls such as SOC 2 ( [`https://en.wikipedia.org/wiki/Service_Organization_Controls#SOC_2_overview`](https://en.wikipedia.org/wiki/Service_Organization_Controls%2523SOC_2_overview%2523_blank)
    ), FedRAMP ( [`https://www.fedramp.gov`](https://www.fedramp.gov/#_blank) ), etc.
    Digging into which parts of these an organization maintains compliance with will
    give you a pretty good idea of how seriously a potential cloud service you might
    use takes your privacy, and to whom they allow access to various types of your
    data stored in their cloud.


    *   Authentication: Some services give you something more than a password to get
    logged into the service. For example, they can send you a text that contains a
    code when you log in. This is known as multi-factor authentication, which uses
    something you know (your password) and something you have (your phone) to allow
    access to online services. Rather than forcing end users to re-enter a password
    in multiple services, a number of vendors have a feature known as Single Sign-On.
    If you’re a small business (let’s say less than 10 people), you can actually use
    most of these tools for free until you grow into a paid tier.


    *   Encryption at Rest: How is your data stored at the cloud service? Any cloud
    service you choose should keep all of your data encrypted at all times. You can
    ask them questions like, “Are your databases stored on an encrypted file system?”,
    “What data from my company do you store in your database that is not encrypted?”,
    “How exactly do you store files that I upload to your database?”, and “Who specifically
    has the keys to decrypt that data, and how are those stored?” The thing to keep
    in mind with most forms of compliance is that the company can have some pretty
    insecure practices, provided they are transparent to customers about how insecure
    their practices are. So ask questions about areas you are concerned about.


    *   Certificates: When we ask about those keys that can be used to decrypt data,
    there are also keys that protect your data when in transit. Make sure that all
    traffic is protected by secure protocols (if you don’t know, you can ask each
    vendor) using strong encryption certificates, and that their private keys for
    those certificates are kept securely and are not about to expire.


    *   Privacy Policy: Organizations with compliance should typically have a privacy
    policy. When you read the policy, it shouldn’t read: How do you respond to a request
    for my data?


    *   Geography: Cultural norms are different in various parts of the world. Most
    in the United States aren’t concerned about this. However, Europeans don’t typically
    want their data stored on servers outside of the EU (especially those in the U.S.).
    This is due to systems administrators and customers alike being well educated
    about laws within the EU (and countries outside the EU) and the desire to force
    what is perceived in different regions as an acceptable level of privacy and security.'
  trans: '

    ### 如果你销售云服务


    许多供应商提供的服务能让你的客户受益，其中大部分还提供经销商或推荐账户类型。`Google Apps`、`Microsoft`、`Box` 和 `Dropbox`
    等文件共享服务允许你转售或关联账户。这些服务可以带来稳定的额外收入和附带福利，使你能更轻松地支持客户。你甚至可能不打算获得全部新增收入流，这样做或许是为了向客户收取更少的服务费用，同时还能获得独家权限。


    在选择新的云服务（或至少对你的产品组合而言是新的服务）时，需要评估以下几点：


    -   客户能否直接联系供应商？

    -   作为推荐方，你能否获得更高级别的支持？

    -   推荐方是否会获得额外培训？

    -   你能否从一个统一管理面板中管理多位客户？

    -   客户能否在不产生额外费用的情况下，为你创建一个委托管理账户？

    -   他们支付给供应商的费用中，你的“佣金”占比是多少？

    -   客户能否根据需要按年支付服务费用？

    -   如果客户停止与你合作，他们将其服务转移到其他供应商的流程是否简便？


    这些都是重要的问题，而且你可能还会遇到更多问题。每个答案的优先级将取决于客户类型以及数据类型或服务类型。我建议你制作一个电子表格，以便选择想要合作的供应商，避免措手不及。要审慎地进行选择。为了帮助你，我还在附录
    E 中整理了一系列客户可能需要的技术。


    将时间分散在许多不同的工具上可能会令人沮丧。虽然为了给客户提供尽可能全面的覆盖，与尽可能多的供应商合作看起来很有吸引力，但请记住，围绕“好、更好、最佳”的方法，甚至只与一家供应商合作进行集中化管理，能让你更加专注。你可以非常擅长围绕该供应商构建解决方案，可能从供应商那里获得潜在客户，并且在客户遇到问题时需要访问的工具也更少。


    你正在销售解决方案这一事实可能会改变你的方法。例如，如果你在销售 `Dropbox`，那么可能在对话中根本不会提及 `Box.com` 或 `Office
    365`。只需确保每位客户的体验都很棒，并且他们不会为了让你多赚钱而牺牲流畅的工作流程。


    ### 评估云解决方案的安全性


    现在的观点是一切都必须上云，而且要立刻上云！有时，寻找工具关乎工作流程。工作流程应该合理且出色。


    但也有一种观点认为，你甚至不应该保存大量数据，除非这些数据是保密的，并且因此得到了妥善的保护。保存他人信息及其行为的责任过于重大，以至于其风险超过了你可能使用这些数据所能获得的好处。


    安全性很重要。工作流程也很重要。考虑到有大量服务可用于任何特定任务，如果某些服务不够安全，那么很可能还有其他十种服务可供选择。那么，你为什么可能会选择使用某个特定的服务呢？


    -   **合规性**：确认在线服务能安全保管你的数据的最佳方法之一，是检查服务各方面的治理方式。许多云解决方案会列出其所遵循的控制措施，通常采用行业标准化控制措施，例如
    SOC 2（`https://en.wikipedia.org/wiki/Service_Organization_Controls#SOC_2_overview`）、FedRAMP（`https://www.fedramp.gov`）等。深入了解某个组织遵循这些标准的哪些部分，可以让你很好地了解你可能使用的潜在云服务对你的隐私有多重视，以及他们允许哪些人访问存储在他们云中的各类数据。


    -   **身份验证**：一些服务在登录时提供的不仅仅是密码。例如，他们可以在你登录时发送包含验证码的短信。这就是所谓多因素身份验证，它利用你知道的信息（你的密码）和你拥有的物品（你的手机）来允许访问在线服务。许多供应商提供一种称为“单点登录”的功能，而不是强制最终用户在多个服务中重新输入密码。如果你是一家小企业（比如说少于
    10 人），你实际上可以免费使用大多数这类工具，直到业务增长需要升级到付费层级。


    -   **静态加密**：你的数据在云服务中是如何存储的？你选择的任何云服务都应始终保持所有数据加密。你可以问他们一些问题，比如：“你们的数据库是否存储在加密的文件系统上？”、“你们在数据库中存储的我们公司的哪些数据是未加密的？”、“你们具体如何存储我上传到你们数据库的文件？”以及“谁具体拥有解密这些数据的密钥，以及这些密钥是如何存储的？”
    对于大多数合规形式，需要记住的是，只要公司对客户公开其做法有多么不安全，他们就可以有一些相当不安全的做法。所以，对于你关心的领域要多提问。


    -   **证书**：当我们询问那些可用于解密数据的密钥时，还有一些密钥可以在数据传输过程中保护你的数据。确保所有流量都受到使用强加密证书的安全协议的保护（如果你不确定，可以询问每家供应商），并且他们用于这些证书的私钥得到了妥善保管且快要过期。


    -   **隐私政策**：合规的组织通常应有隐私政策。当你阅读政策时，它不应该是这样的：“你如何回应对我数据的请求？”


    -   **地理因素**：世界各地的文化规范各不相同。大多数美国人不关心这个问题。然而，欧洲人通常不希望他们的数据存储在欧洲联盟以外的服务器上（尤其是美国的服务器）。这是因为系统管理员和客户都熟知欧盟（以及欧盟以外的国家）的法律，并且希望强制推行在不同地区被视为可接受的隐私和安全水平。

    '
- fmt: '# 数据安全与云服务基础


    *   **服务等级协议（SLA）**：如果你无法访问数据，那数据还有什么价值？SLA 是承诺达到特定服务等级的协议。一个真正优秀的SLA包含“五个九”的正常运行时间，即99.999%的时间你的数据都是可用的。请记住，99%的时间意味着你的数据可能会离线数天（实际上每年3.65天），而供应商仍然能满足其正常运行时间的要求。另外，要关注如果供应商未达到SLA会面临什么处罚；如果没有处罚，那么签订SLA还有什么意义呢？


    *   **备份**：备份通常是许多人最后才考虑的安全方面。然而，如果数据丢失了，那你还不如把它们记在纸上。备份需要大量空间，耗费时间，并且通常需要非常昂贵的设备。事实上，不必自己备份服务器，往往是许多人想要将系统从办公室迁移到云端的主要原因之一。因此，请确保你了解云服务商保留你数据的时间、在发生故障时恢复这些数据所需的时间，以及完成此操作需要什么流程。此外，看看你是否可以拥有自己数据的备份副本。


    *   **安全扫描**：你可以免费运行自己的扫描，看看是否会被阻止访问产品，或者是否发现供应商尚未意识到的自身漏洞。这里有几个注意事项：不要扫描大型供应商（如`Dropbox`或`Google`）——这主要适用于你的供应商在其云基础设施中为你提供了专用服务器的情况。


    在当今快节奏的商业环境中，大型和小型公司似乎随时都有新服务上线。这可能是一个快速的列表制作应用，也可能是一个运行整个组织的巨大新工具。你不需要穿锡箔帽（指过度疑神疑鬼），但你应该采取一些基本的安全预防措施，以免显得疏忽。我建议将这样的清单转化为一个实际的核对表，并审计你拥有的每一个应用，以验证每个应用都满足你提出的要求。这并非多疑，而是良好的商业实践。


    ## 推荐与销售


    IT行业有句老话：“没有人因为买了思科而被解雇”，或者更早的：“没有人因为买了IBM而被解雇”。销售你从未听说过的产品时要小心。销售像`Salesforce`这样的大品牌是有保障的，而推荐一家可能倒闭的小公司或专业服务则存在风险。永远不要让佣金左右你的判断。从为客户找到正确解决方案开始，然后反向建立关系，这种关系能帮助你管理多个客户，并通过重复使用相同的服务（并磨练该服务的技能）为客户提供附加价值。


    当你在每个垂直市场中都有明确的市场领导者时，这最容易实现。尤其是当你在这些市场拥有足够多的客户，成为这些市场工作流程的专家时。这些被称为细分市场。如果你正在与一个需要这些领导者之一的客户合作，但解决方案无法快速掌握，那么考虑抓住机会寻找另一家公司，你可以与之交换推荐客户，如果客户需要他们提供的解决方案。这能避免你显得不专业，并且可能对你更有利（从长远来看，为客户做最好的事总是更有利可图的）。


    ## 提供硬件和软件


    云解决方案并不能解决所有问题。客户可能仍然需要各种只能通过供应商或经销商订购的软件。此外，客户还需要计算机和移动设备。如果你身处苹果咨询领域，这些设备将来自苹果。与其尝试销售苹果硬件，尤其是在起步阶段，不如与当地的苹果零售店建立良好关系，帮助客户获得硬件，并确保当他们购买设备时，这些设备是`DEP`兼容的。


    苹果还销售其他与苹果平台配合良好的硬件。从USB驱动器到打印机再到保护壳，苹果的产品价格会稍高一些，但你和你客户都知道苹果认可这些硬件。那么，你可以向客户销售什么呢？所有这些产品你都可以卖！或者，你可以让苹果店的业务代表来处理这些。


    以下是你可能选择销售硬件的一些原因：


    *   你可以为客户争取到更便宜的价格。

    *   你需要确保他们为大型项目获得正确的设备。

    *   如果你在销售硬件，你可以获得更好的支持。

    *   你可以更快地获得设备。

    *   你可以获得更专业或更高度定制的硬件。


    但销售硬件也有一些负面因素。这些包括：


    *   如果出了任何问题，客户会生你的气。

    *   客户可能会找到更优惠的价格，并因此对你感到不满。

    *   在给定的客户付款周期内，你需要垫付产品资金。

    *   订购和采购硬件可能非常耗时，特别是如果你需要向供应商注册每笔交易才能获得最优价格时。


    最终，如果你打算转向全职咨询，我建议尝试向客户销售东西。即使你不将其作为业务的主要部分，了解转售涉及的内容以及渠道如何运作，将使你能够代表你的客户更好地管理其他供应商。'
  raw: '*   Service Level Agreement (SLA) : If you can’t get to your data, what good
    is it? An SLA is a promise to meet certain service levels. A really good SLA includes
    a five nines uptime, or 99.999% of the time your stuff will be available. Keep
    in mind that 99% of the time means your data could be offline for days (3.65 of
    them in fact) and the vendor still meet their uptime requirements. Also look for
    what penalties are incurred if the vendor does not meet the SLA; if there are
    no penalties, then why actually have an SLA?


    *   Backup: Backup is often the last aspect of security many think of. However,
    if the data is lost, then you might as well have kept it on paper instead. Backup
    requires a lot of space and takes time and often very expensive equipment. In
    fact, not having to back up our own servers is often one of the main reasons many
    want to move systems from our offices to the cloud. So make sure that you understand
    how long your cloud provider retains your data, how long it takes to restore that
    data in the event of a failure, and what process is required for that to happen.
    Also, see if you can have your own backup of their data.


    *   A Security Scan: You can run your own scan, for free, and see if you get blocked
    from accessing the product or if you uncover your own vulnerabilities that the
    vendor didn’t yet know about. A couple of caveats here, don’t scan really large
    vendors (like Dropbox or Google)—this is mostly pertinent if your vendor is giving
    you a dedicated server in their Cloud infrastructure.


    In today’s fast-paced business climate, new services seem to come online within
    large and small companies all the time. This might be a quick list-making app,
    or it might be a huge new tool that runs the entire organization. You don’t need
    to wear a tin foil hat, but you should take a few basic security precautions that
    keep you from being negligent. I recommend taking a list like this and turning
    it into an actual checklist and auditing every app you have to verify that each
    one meets the requirements you come up with. That’s not wearing a tin foil hat;
    it’s just good business.


    ## Referrals vs. Selling


    There’s an old adage in the IT industry that “no one ever got fired for buying
    Cisco” or, even earlier, “no one ever got fired for buying IBM.” Be careful of
    selling anything you haven’t heard of. There is security in selling a big name
    like Salesforce and there is risk in recommending a smaller company or specialty
    service that might go out of business. Never let commission sway your judgment.
    Start with what the right solutions are for your customers and then work backward
    into a relationship that helps you manage multiple customers and provide added
    value to customers by using the same services repeatedly (and honing skills with
    that service).


    This is easiest when there is a clear market leader in each vertical market you
    work in. Especially when you have a critical mass of customers in those markets
    to become an expert in the workflows for those markets. These are known as market
    segments. If you are working with a customer that needs one of these leaders and
    the solution can’t be learned quickly, then consider taking the chance to find
    another company you can trade referrals for if a customer needs a solution they
    work with. This will keep you from looking bad and potentially be even more lucrative
    for you (doing what’s best for customers is always more lucrative in the long
    run).


    ## Providing Hardware and Software


    Cloud solutions don’t do everything. Customers might still need various software
    that can only be ordered through a vendor or through a reseller. Additionally,
    customers need computers and mobile devices. If you’re in the Apple consulting
    world, those are going to come from Apple. Rather than try to sell Apple hardware,
    especially in the beginning, build a good relationship with a local Apple Retail
    Store to help customers get their hardware and make sure that when they do that
    devices are DEP-compatible.


    Apple also sells other hardware that works well with the Apple platform. Everything
    from USB drives to printers to cases, Apple will charge a little more for the
    products, but you and your customers know that Apple blesses the hardware. So
    what might you sell to customers? You can sell all those same things! Or you can
    let the business representatives at the Apple Store take care of that.


    Here are some reasons you might choose to sell hardware:


    *   You can get customers a cheaper price.


    *   You need to make sure they get the right equipment for large projects.


    *   You can get better support if you’re selling the hardware.


    *   You can get equipment faster.


    *   You can get more professional or more highly customized hardware.


    But selling hardware can come with some negative aspects as well. These include:


    *   If anything goes wrong, the customer is angry at you.


    *   The customer might find a better price and get annoyed at you.


    *   You have to float the money for the product for whatever period your terms
    are for a given customer.


    *   Ordering and sourcing hardware can be time-consuming, especially if you have
    to register each deal with a vendor in order to get the best price.


    Ultimately, I recommend experimenting with selling things to customers if you’re
    going to move to doing consulting full-time. Even if you don’t make this a huge
    part of your business, learning what is involved in reselling and how channels
    work will enable you to manage other vendors better on behalf of your customers.'
