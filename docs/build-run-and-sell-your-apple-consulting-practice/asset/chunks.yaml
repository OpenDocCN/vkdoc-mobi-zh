    \ Numbers\n\nMany business owners are going to find this the really crappy part.\
    \ You find these great companies, you meet the employees, you merge operations,\
    \ but in the process of building out a final product, you run into a problem with\
    \ comp packages. Maybe the employees who come to you as a part of the acquisition\
    \ have salaries that are too high compared to your existing team. Maybe it’s the\
