  raw: '### Antivirus


    *   [**AVG**](http://www.checkoutapp.com/) : Basic antivirus and spyware detection
    and remediation.


    *   [**Avast**](https://www.pingidentity.com/?gclid=EAIaIQobChMIgqS41MS-1wIV04KzCh2TLwdeEAAYAyAAEgKDMPD_BwE)
    : Centralized antivirus with a cloud console for tracking incidents and device
    status.


    *   [**Avira**](https://atom.io/) : Antivirus and a browser extension. Avira Connect
    allows you to view device status online.


    *   [**BitDefender**](https://puppet.com/) : Antivirus and malware managed from
    a central console.


    *   [**CarbonBlack**](https://macadmins.herokuapp.com/) : Antivirus and Application
    Control.


    *   [**Cylance**](http://grandperspectiv.sourceforge.net/) : Ransomware, advanced
    threats, fileless malware and malicious documents in addition to standard antivirus.


    *   [**Kaspersky**](https://github.com/rtrouton/Simple-Package-Creator) : Antivirus
    with a centralized cloud dashboard to track device status.


    *   [**Malware Bytes**](http://mothersruin.com/software/SuspiciousPackage/) :
    Antivirus and malware managed from a central console.


    *   [**McAfee Endpoint Security**](http://s.sudre.free.fr/Software/Packages/about.html)
    : Antivirus and advanced threat management with a centralized server to track
    devices.


    *   [**Sophos**](http://netatalk.sourceforge.net/) : Antivirus and malware managed
    from a central console.


    *   [**Symantec Mobile Device Management**](http://www.microsoft.com/) : Antivirus
    and malware managed from a central console.


    *   [**Trend Micro Endpoint Security**](https://github.com/unixorn/luggage) :
    Application whitelisting, antivirus, ransomware protection in a centralized console.


    *   [**Wandera**](https://github.com/munki/munki-pkg) : Malicious hot-spot monitoring,
    jailbreak detection, web gateway for mobile threat detection that integrates with
    common MDM solutions.


    ### Automation Tools


    *   [**AutoCasperNBI**](http://www.kioskproapp.com/) : Automates the creation
    of NetBoot Images (read: NBI’s) for use with Casper Imaging.


    *   [**AutoDMG**](https://www.symantec.com/products/endpoint-management) : Takes
    a macOS installer (10.10 or newer) and builds a system image suitable for deployment
    with Imagr, DeployStudio, LANrev, Jamf Pro, and other asr, or Apple Systems Restore-based
    imaging tools.


    *   [**AutoNBI**](https://github.com/bruienne/autonbi) : Automates the build and
    customization of Apple NetInstall Images.


    *   [**Dockutil**](http://macpaw.com/cleanmydrive) : Command line tool for managing
    dock items.


    *   [**Homebrew**](https://www.avg.com/) : Package manager for macOS.


    *   [**Cakebrew**](https://itunes.apple.com/gb/app/disk-doctor-clean-your-drive/id455970963)
    : provides a pretty GUI for Homebrew.


    *   [**Jamjar**](https://www.alsoft.com/DiskWarrior/) : Synergises jamf, autopkg
    & munki into an aggregated convergence that cherry-picks functionality from each
    product’s core competency to create an innovative, scalable, & modular update
    framework.


    *   [**MacPorts**](https://objective-see.com/products.html) : An open-source community
    initiative to design an easy-to-use system for compiling, installing, and upgrading
    either command-line, X11, or Aqua based open-source software on Macs.


    *   [**Precache**](https://www.synology.com/en-us) : Programmatically caches Mac
    and iOS updates rather than waiting for a device to initiate caching on a local
    caching server.


    *   [**Outset**](https://itunes.apple.com/us/app/macos-server/id883878097) : Automatically
    processes packages, profiles, and scripts during the boot sequence, user logins,
    or on demand.


    ### Backup


    *   [**Acronis**](https://duo.com/) : Centrally managed backups with image-based
    restores.


    *   [**Archiware**](https://macmule.com/projects/autocaspernbi/) : Centrally managed
    backups to disk and tape with a variety of agents for backing up common Apple
    requirements, such as Xsan.


    *   [**Arq**](http://www.libimobiledevice.org/) : One-time fee cloud-based backups
    and unlimited storage.


    *   [**Backblaze**](http://developer.apple.com/) : Unlimited continuous backup
    with a 30 day rollback feature.


    *   [**Carbon Copy Cloner**](https://www.bresink.com/osx/HardwareMonitor.html)
    : File or disk-based cloning of files for macOS.


    *   [**Carbonite**](https://www.malwarebytes.com/) : SaaS or local-server based
    backups of Mac clients.


    *   [**Crashplan**](http://www.memtestosx.org/) : Backup to cloud and local storage
    with a great deduplication engine.


    *   [**Datto**](https://www.prosofteng.com/drive-genius-mac-protection-software/)
    : Local and cloud backup and restore, as well as cloud failover for various services.


    *   [**Druva**](https://www.symantec.com/mobile-device-management/) : Backup for
    local computers as well as some backup for cloud services.


    *   [**Quest Backup (formerly Netvault)**](https://itunes.apple.com/us/app/easyfind/id411673888)
    : Can backup Mac clients and Xsan volumes to a centralized tape or disk-based
    backup server.


    *   [**SuperDuper!**](https://istumbler.net/) : Duplicates the contents of volumes
    to other disks.


    *   **Time Machine** : Built-in backup tool for macOS.


    ### Collaboration Suites and File Sharing


    *   [**Atlassian**](http://twocanoes.com/push-diagnostics) : Development oriented
    suite including wiki (Confluence), issue tracking (Jira), messaging (HipChat),
