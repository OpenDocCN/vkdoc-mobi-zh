    You don’t have to deal with too much of this stuff. You can and probably should
    immediately hire someone to help you get your books in order. I find that a good
    accountant will not only get what you’ve done in the past in order but set up
    a better system for the future. And your first accountant is likely to also act
    as a financial advisor of sorts. Later, those roles will be different.


    When you hire an accountant, look for someone that doesn’t let you just do what
    you want. This means you need to listen. Yes, you are your own boss. But they’re
    your boss too, as are your employees and your customers.


    The bookkeeping functions of a small business are not the same as an accountant,
    financial advisor, or tax preparer. You need someone (and at first it is likely
    to be you) to enter receipts, enter receivables, write the checks for payables,
    reconcile bank statements, reconcile credit card statements, and maybe deposit
    checks. As you grow, the accounts receivable and accounts payable often split
    into two people.


