    # 提供基础设施服务


    还记得我们在本章前面提到的电话服务吗？如果你的客户确实需要在其办公室获得帮助，为了完善你的服务提供，以下是一些需要考虑的事项：


    -   **监控服务**：监控服务可以在计算机或网络设备出现问题时向你发出警报。像 `Watchman Monitoring` 这样的解决方案可以监控 Mac（以及
    Mac 上常见的第三方工具），并在各种故障正在发生或即将发生时通知你。例如，如果硬盘即将损坏，你会收到警报，有望在客户现场的用户发现问题之前修复它。网络设备可以通过针对客户所有设备类型的工具进行监控，也可以通过一个集中式工具（这类工具很多）进行监控。无论从客户满意度还是客户安全性来看，这项服务都价值连城，而且无论是你承担成本还是将其转嫁给客户，它都能收回成本。


    -   **互联网服务**：前面我们提到过销售互联网服务。如果你这样做，可以考虑为每个客户销售两条线路：一条是高服务等级协议（SLA）的主线路，另一条是住宅级但通常速度更快的线路。许多路由器都支持将负载分担到两条线路上。拥有两条线路意味着如果其中一条出现故障，客户仍然在线，同时也意味着客户只需额外支付很少的费用就能获得更快的速度。


    -   **无线接入点（WAP）**：客户需要在办公室使用无线网络。你为他们提供的互联网服务可能捆绑了无线路由功能，但这通常无法满足安全要求或统一管理的要求。像
    `Meraki` 这样的工具允许经销商通过单一门户管理多个客户。其他工具如 `SonicWall` 或 `Cisco` 则提供更高的可扩展性，同时也提供了大量企业级功能。


    -   **交换机**：交换机允许你连接那些显然还有人仍在使用的所有以太网设备。销售这些设备时，要考虑哪些设备能够使用虚拟局域网（VLAN）进行网络分段，哪些设备能与苹果设备良好兼容，以及哪些设备能提供客户所需的吞吐量。


    -   **路由器**：对于较小的客户，你真正想要的是融合网络，也就是多功能设备。例如，一个五人公司可能只需要一个 `LinkSys` 设备就能充当 WAP、交换机和路由器。随着客户规模扩大，他们原先的设备可能就不够用了。我喜欢保留旧设备以备不时之需，但值得一提的是，对于任何网络设备，都要留意客户何时可能超出你经济高效地为他们提供服务的范围——或者你的公司何时可能需要在某项技术上做得更好，并在此期间以折扣价提供一些服务。


    -   **外围设备**：没错，有些人仍然会打印。有些人需要摄像头、网络摄像头、多功能一体机等。这就是你需要开始划定销售范围界限的地方。硬盘、大容量存储设备（RAID
    和 `Drobo`）以及其他外围设备很容易证明其价值，但相机滤镜或 iPad 保护壳就有点偏离主业了。


    -   **电话服务**：我要提到的最后一点是电话。许多小企业让员工使用个人手机（或公司提供的 iPhone）作为工作电话。至少，大多数拥有实体办公室的客户至少需要一条固定电话线路。随着业务增长，他们可能会选择使用
    IP 语音（VoIP）解决方案或电话系统。如果你打算销售这类服务，尽量保持其以应用驱动、基于云端且尽可能无需实际硬件。如果这些开始变得有挑战性，那么考虑一个专门处理大型传统电话系统和/或视频会议的合作推荐伙伴。


    -   **布线**：所有顾问都需要一个可靠的布线合作推荐伙伴。但很少有人应该自己动手布线。


    最终，你不需要成为所有客户的万能专家。如果客户需要你不知如何实现的某项服务，你有一个选择：寻找合作推荐伙伴或把它提供给客户。如果它远远超出你的技能范围，这通常很容易做决定。但如果它恰好在你技能范围内，那么请务必意识到它可能让你偏离真正核心业务有多远。但最重要的是，要时刻留意银行账户状况，因为你通常需要稍微偏离原定路线才能找到持久的成功。


    # 延伸阅读


    -   《用 Sandler 方式销售专业服务》，查克·波林，埃文·波林，[`https://www.amazon.com/Selling-Professional-Services-Sandler-Way/dp/0983261458`](https://www.amazon.com/Selling-Professional-Services-Sandler-Way/dp/0983261458)


    -   《销售无形产品：现代营销实地指南》，哈里·贝克威思，[`https://www.amazon.com/Selling-Invisible-Field-Modern-Marketing/dp/0446672319`](https://www.amazon.com/Selling-Invisible-Field-Modern-Marketing/dp/0446672319)


    -   《博伊德：改变战争艺术的战斗机飞行员》，罗伯特·科拉姆，[`https://www.amazon.com/Boyd-Fighter-Pilot-Who-Changed/dp/0316796883`](https://www.amazon.com/Boyd-Fighter-Pilot-Who-Changed/dp/0316796883)


    -   《服务不是产品：销售服务协议专家指南》，约瑟夫·西德罗维茨，[`https://www.amazon.com/Service-Not-Product-Experts-Agreements/dp/061554780X`](https://www.amazon.com/Service-Not-Product-Experts-Agreements/dp/061554780X)


    -   《傻瓜也能创办 iPhone 应用业务》，亚伦·尼科尔森，乔尔·埃拉德，达米安·斯托拉尔兹，[`https://www.amazon.com/Starting-iPhone-Application-Business-Dummies/dp/0470524529`](https://www.amazon.com/Starting-iPhone-Application-Business-Dummies/dp/0470524529)


    -   《iPhone 和 iPad 应用营销：销售 iPhone 和 iPad 应用的秘诀》，杰弗里·休斯，[`https://www.amazon.com/iPhone-iPad-Apps-Marketing-Biz-Tech/dp/0789744279`](https://www.amazon.com/iPhone-iPad-Apps-Marketing-Biz-Tech/dp/0789744279)


    -   《品牌形象突破》，格雷戈里·迪尔，亚历克斯·米兰达，[`https://www.amazon.com/Brand-Identity-Breakthrough-Companys-Irresistible-ebook/dp/B01C37VTAW`](https://www.amazon.com/Brand-Identity-Breakthrough-Companys-Irresistible-ebook/dp/B01C37VTAW)


    -   《搞定销售！》，尼克·戈默索尔，[`https://www.amazon.com/Practical-Methodology-Enterprise-Software-Hardware/dp/0955911435/`](https://www.amazon.com/Practical-Methodology-Enterprise-Software-Hardware/dp/0955911435/)


    # 招聘与人力资源


    你已经建立了定价模式和商业计划。你已经与供应商和其他实体建立了关系，使公司能够发展。现在，是时候开始组建团队了。招聘是公司能做的最重要的事情之一。你把客户托付给了你的员工。而最难的招聘正是第一个员工。


    在本章中，我们将探讨如何规划你的员工队伍、招聘你的第一位员工、一些基本的管理技巧，以及成为一个合法雇主所涉及的一些后勤事务。

