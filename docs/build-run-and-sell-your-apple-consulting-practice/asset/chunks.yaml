    # 定价


    定价是商业中最难做好的环节之一。定价过高，没人愿意购买你的服务；定价过低，没人会尊重你交付的服务，或者你无法获得足够的利润来维持运营。


    在选择如何为服务定价时，有许多因素需要考虑。没有万能灵药，但有指导原则。我们将按计费类型提供一些简要指导：


    *   **按小时计费**：你可以索要任何你想要的费率，但这并不意味着你就能得到这个费率。你最终能拿到的费率基本上就是市场给你的价格，通常由供求关系决定。你可以看看
    `Craigslist` 网站，上面有很多提供商愿意以每小时 35 美元的价格提供服务。如果你查看更传统的渠道，更可能找到接近每小时 200 美元的支持服务，或者针对不同专业领域收取更高的日费率。


    *   **基于预付金的支持服务**：当你出售长期支持合同时，通常需要提供 10% 到 20% 的折扣。例如，如果你认为一个客户每月需要购买 20 小时的服务，而你的标准费率是每小时
    120 美元，那么他们可能会购买这个小时包（通常价值每月 2400 美元），享受 240 美元的折扣，成本降至每月 2160 美元。


    *   **托管服务**：托管服务将讨论重点从按小时或按日计费的咨询（基于时间的咨询）转向固定费用模式。常见的费率是每台电脑每月 60 美元。继续以每小时
    120 美元为例，这意味着你每月在一台特定电脑上的工作时间最好不超过半小时，这样才能保持相近的利润率。但如果转向 MSP（托管服务提供商）模式，你终于可以去做那些多年来一直试图让客户接受的主动管理工作了。因此，你的
    MSP 定价通常可以被视为，在你能提取到使用数据的前提下，花在系统上的平均时间成本。请记住，在考虑托管服务时，你需要获得良好的利润率，但如果利润率过高，你将无法留住客户。


    *   **混合支持**：许多组织签订托管服务合同后，又纠结于如何引入能为组织带来价值的新服务。托管服务旨在为客户提供一个可预测的成本来维护其现有资产。许多组织会转向云托管模式来获取额外服务，例如客户关系管理、云存储和项目门户。然后，许多人需要帮助来设置这些服务。你可以按小时或按项目收取额外费用来引入这些新服务。只是要确保不要为了从这些其他服务中多赚一点钱而危及你的托管服务合同。请记住，你总能找到一个合作伙伴，他们可能在你提供的服务方面做得更好，因为那是他们组织的核心业务。而且，他们可能还会进行双向转介！


    *   **固定费用项目**：许多服务公司通过固定费用项目赚了很多钱。在这里，你估算一个项目需要多长时间，并在工作说明书（SoW）中描述该项目。然后，你在项目中加入适当的安全余量，并向客户提供完成交付物的固定成本。一旦中标，你就要不惜一切代价完成
    SoW 中定义的交付物。大多数大型组织需要与其供应商采用固定费用模式合作，因为业务部门经理通常需要在预算范围内完成此类工作。


    *   **管理式租赁**：租赁很棘手。除非你达到租赁数千台设备的临界规模，否则别人很可能比你做得更好。例如，`Dell`、`Apple`、`HP` 等公司可以承担这个负担，并且通常可以将保修甚至你的托管服务合同捆绑到租赁中。如果你还没有开始租赁硬件，那么我强烈建议在这里放弃几个百分点的利润，让租赁公司或供应商与你的客户合作，这样你就能获得更多收入。


    你还需核实你的费率是否具有地域合理性。如果你在曼哈顿，你的服务收费可以比在博伊西高。这两个地方都很棒，但费率差异可能非常大。如果你每年能开出 1200 小时的账单，那你的财务状况就会很好。由此可以推算出合适的时薪。想一个你每年想要的收入数字，然后除以
    1200，这就得到了一个不错的基准线。然后再去考察竞争对手。


    从 `Upwork`、`Angie’s List` 和 `Craigslist`（或你当地类似的网站）开始。其他列出服务的公司平均收费是多少？你可能不会是最便宜的供应商，尽管许多公司是以低成本提供商的身份建立了非常成功的企业。那是一场很难赢的游戏，利润率低，但当然可以做到。你很可能也不会是最贵的供应商。要自然而然地将费率提高到那个水平，或者成为最好的（没有人是，也从来没有人曾是“最好的”，所以别忘了放下你的自负），需要大量客户和口碑推荐。最后，四处浏览一下，看看你的竞争对手在网站上发布了什么费率。


    你甚至可以向你的竞争对手打电话询问。但仔细想想，你会欢迎竞争对手来问你的费率，就为了让他们有机会随时低价抢你的生意吗？


    ### 提示


    完成调研后，考虑一下是否要公布你的报价。很多人只会雇佣那些公布报价的人，但这确实会让你的竞争对手了解你的动向。


    随着你的成长、变得更好、更高效并因你的专长而闻名，你会发现你可以为按小时计费的工作收取更高的费用。如果你依赖托管服务客户，那么你的费率很可能与市场价持平，因为购买这类服务的大多数公司寻找的并非高质量承包商——他们是在寻求固定成本。


    ### 注


    在本书中，我们还会考虑成本。目前，只需计划在你赚的每一美元中，拿出大约四分之一用于支付信用卡处理费、会计、技术、交通、保险等费用。


    # 制定报价


    现在你知道了其他人的收费情况，看看你计划收取的费用是否合理。如果存在巨大差异，你需要找出原因。你不想成为那个收费比次高价供应商高出两倍的人。你也不想成为最低价，因为人们可能觉得你的服务价值不够高。一旦你与客户建立了关系，提高费率而不流失客户是很困难的。接下来，让我们探讨一些更常见的报价形式：按小时计费、预付金、托管服务和固定费用。

    '
- fmt: '### The Hourly Offer


    If your offer is to sell hours of your time, then you have a pretty simple task.
    Or do you? What kind of work do you want to do? For example, I know several consultants
    that make a pretty sweet living only doing work on Apple devices in the homes
    of the rich and famous. Likewise, I know a lot of consultants that won’t go to
    a residence and will only do work in companies. Remember, and I will repeat this
    so that it sticks, do what makes you happy, and you’ll find success. Or you won’t.
    But at least you won’t be miserable!


    You’ve set an hourly rate. But let’s make sure you are being holistic by answering
    these questions:


    - **Travel**: Do you charge for travel? Or do you include travel in your rate?
    Do you charge hourly and have a small trip charge? Keep in mind, if you’re not
    up front with what you’re going to do, then you could very, very easily spend
    half your time on planes or driving around your coverage area without an appropriate
    amount of compensation.


    - **Range of Services**: Do you work on servers? How about firewalls? How about
    really, really big firewalls? Do you write scripts or code for customers? Are
    you willing to drive out to fix a printer? In the beginning, many will do whatever
    a customer is willing to pay them to do. But the earlier in your consultancy that
    you choose to limit the type of work you do, the more quickly you find your niche
    and focus, and partners to bilaterally refer work to.


    - **Billing Methods**: Do you warranty the hourly work or charge to continue fixing
    a problem?


    - **Billing Terms**: Are you going to invoice customers, take payment up front,
    or accept credit cards when you complete the number of hours or days that a customer
    wants to use? If you are invoicing, do you need a Purchase Order (`PO`) first?
    What terms will you extend if not taking payment up front?


    These are important, because they need to impact the offer. If you need to charge
    an extra `$10` per hour up front to cover these costs, then you want to know that
    in advance. Now if you bill out 40% of your time at your projected rate, how much
    are you going to make?


    > **Note**: If you charge before doing work, make sure not to spend that money
    until you actually deliver the services you were paid for.


    ### The Retainer Offer


    Retainers are usually similar to hourly or daily offers. A customer is paying
    you to deliver time to them. But they are committing to a given number of hours
    or days per month.


    - Are overages handled by charging more the next month? Will you charge more for
    hours that are over the retainer than you would for hours in the retainer? Will
    you need a specific person at customer organizations to approve overages, or can
    anyone call in and request services?


    - Does retainer time have to be spent each month or will it continue building
    up until a customer cancels their contract? When does time expire? Remember that
    it’s a bad idea to spend money before you’ve earned it, even if a customer has
    given you all the monies!


    - Is there a maximum amount of time that a customer can build up (like 2x their
    annual contract)?


    - Who’s allowed to engage your services? Keep in mind that you’re entering into
    a long-term contract, so be careful before you let just anyone buy your services.


    - **Travel costs**: Similar to the argument about hourly contracts, will you waive
    travel requirements for a retainer commitment?


    - What’s the term of the contract? What happens if a customer leaves prior to
    the end of the term? I am always willing to give a higher discount to people in
    order to get more business and longer terms on contracts.


    Retainers are a great way to get from a new hourly startup to starting to establish
    predictable, long-term income that usually gives you enough comfort to go out
    and hire some people already. But the ups and downs of dealing with hours and
    overages can get in the way eventually. Some have opted to move to the next step
    of Managed Services.


    ### The Managed Services Offer


    Managed Services is an all-inclusive support contract. You can choose what exactly
    “support” means when building the offer. But Managed Services is about outcomes,
    not time–as was true with the previous two types of offers.


    > **Note**: I’m going to be up front about something before I start writing this
    section, though: I do not like managed services offerings that try to limit services
    based on a time-based model. When using MSP services, customers want a controlled,
    predictable cost. If you can’t make this work, then I doubt your offering will
    sell as well as you think it will.


    Since Managed Services can mean different things to different companies, let’s
    look at what it means to you, which shapes how you structure your offer. The following
    are some questions you need to ask yourself. While you read through these, make
    sure your answer to each is included in your offer, which is likely to manifest
    itself in the form of an actual contract that customers sign.


    - What is the scope of your services? What devices will you support, and which
    users can call or engage with your services?


    - What is the duration of the offer? If a customer signs a contract for 3 years,
    will you give them an extra `$5` off per device?


    - What are the support hours?


    - What is the Service Level Agreement (both inside the support hours window and
    outside that window)? Keep in mind that when it comes to Managed Services contracts,
    everything is negotiable.


    - How are tickets created? Can customers just call in or do they have to use a
    form to open tickets?


    - Are “truck rolls” included in your offer or is it just remote support?


    - How much self-help do you expect customers to use? Will you invest in “zero-tier”
    assets or those used to allow your customers to perform pre-built automations?
    These should help lower costs, but will customers actually use them?


    - Can customers bundle hardware (more on that in Chapter 2) and/or leases with
    your services?


    - How will you monitor devices? If you don’t, then how can you claim you’re meeting
    expectations? If you do, how do you react to incidents on devices? But more importantly,
    can you automate ticket creation from a monitoring tool, and then have a script
    resolve the ticket, close the ticket, and e-mail the person using the device that
    the device was fixed? ‘Cause if you can, you just saved how much money?!?!


    - When pricing, did you factor in the fact that you’ll eventually need managers
    and directors to manage managers, etc?


    One of the most critical aspects of Managed Services is tightly managing scope.
    Alternatively, you don’t need to have any services out of scope. I’ve seen MSPs
    include bandwidth, software, leases for devices, and upper-tier Chief Technology
    Officer-style services with their offerings and still do so based on the number
    of users or devices that a customer has. Typically, this type of service comes
    in at a minimum of double the standard device charges for other MSP business,
    but MSPs can take advantage of the scale in purchasing and scaled-down cost in
    managing a homogenous set of technologies to eke out more profit while providing
    a superior product to customers.


    Keep in mind that if you choose not to include upgrades in your offer, you can
    still charge separately for them, even if you don’t try to include everything
    ever. To do so, you would usually provide a `SoW`. The most common way to fund
    an `SoW` when you’re already in a Managed Services relationship with customers
    is with a fixed-fee contract, covered previously in this chapter.'
