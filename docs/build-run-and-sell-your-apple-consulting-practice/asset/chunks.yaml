  trans: '

    ### 新闻稿撰写技巧


    新闻稿是一种经久不衰且与时俱进的公关途径，用于向媒体渠道传达有关您企业或组织的新闻、活动和最新动态。这些简洁、信息量大的写作形式经受住了时间的考验，每天都有数百万封新闻稿通过电子邮件发送到报社、电视台和广播电台。


    媒体非常喜爱新闻稿。它们就像是一个个微缩版的新闻报道，直接呈现在记者面前。鉴于媒体循环不断需要内容，您应该抓住每一个可能的机会善用新闻稿。


    在深入分析新闻稿示例之前，这里有一些快速提示供您参考。


    -   **简洁：** 记者没有时间通读您那长达两页的商业公告。建议将新闻稿控制在 300 到 500 字之间，在有效传达信息的同时，避免让读者感到枯燥。

    -   **吸引人的标题：** 为了吸引读者兴趣，您需要一个独一无二、具有新闻性但又不会过于夸张的标题。

    -   **避免推销语言：** 新闻稿是为了传达新闻，而不是以明显的方式推广您的销售和服务。

    -   **避免行话：** 这始终是个好主意，当对方可能不像您那样深入了解某种特定技术时，这一点尤其重要。

    -   **坚持事实：** 行文中很容易不自觉地加入华丽辞藻，特别是如果您一直在撰写营销文档。但请避免这样做。坚持陈述事实。

    -   **不要用力过猛：** 新闻稿不是向本地观点编辑提交的创意专栏文章。它是新闻公告。请如此对待。

    -   **引语：** 引用企业主或发言人的话，是让新闻稿更人性化的好方法。务必抓住这个机会，在您的企业中找一位重要人物，甚至更好的是找一位客户，加上一两句引语。

    -   **语法：** 以写作为职业的人非常欣赏良好的语法。


    一旦您的新闻稿完成，有两种选择：您可以通过电子邮件发送或致电本地新闻媒体人员，也可以将其提交给诸如 `PRWeb.com` 和 `Newswire.com`
    之类的联合发布平台。这两种方式并非互斥——为了获得广泛的报道面，可以考虑同时进行！同时建议读者将新闻稿发布在自己的网站、社交媒体或博客上，以便向甚至不属于“媒体”圈子的人进行推广。


    在我们剖析新闻稿的构成时，将继续使用前面提到的 HomePod 示例。


    ### 新闻稿的构成要素


    关于如何撰写一篇能吸引媒体关注的新闻稿，我无法给出单一的建议。但我可以告诉您大多数人是如何撰写新闻稿的，并为您提供一些关于其内容的最佳实践。让我们从每个部分的最佳实践开始，先从标题说起。


    #### 标题


    与您希望人们阅读的大多数内容一样，吸引注意力的方法就是使用一个出色的标题。在处理新闻稿时，标题被称为“大标题”。与大多数大标题一样，您需要一个能吸引眼球的标题。假设您位于洛杉矶，并希望以
    HomePod 为切入点，进军新兴的家庭自动化行业。首先，您需要构建一套服务。然后，想出一个基本能概括要点的大标题。一些想法可能包括：


    -   本地科技公司推出全面家庭自动化服务

    -   本地商店推出新型家庭自动化服务

    -   以苹果为中心的家庭自动化新时代

    -   本地公司将家庭自动化带入商业领域


    这些标题彼此大相径庭，但我们可以从中汲取一些经验。在这些示例中，大多数标题都保持简短且易于理解。您公司的名称可以轻松地（而且可能应该）替换标题中的“本地商店”或“本地科技公司”。标题中应包含一个引人注目或时髦的词，但不宜过多以至于让人难以接近，重要的是，标题通常应控制在八个词以内。


    #### 页眉部分


    接下来，我们谈谈页眉部分。它位于页面顶部，包含一些非常基本的信息。在左侧，您需要两行文字。第一行注明何时发布这些信息。之所以必要，是因为有些内容受到“禁发令”限制，这意味着您希望某人撰写相关文章，但稿件要等到禁发令解除后才能实际发布。


    第二行应包含您发送新闻稿的日期。页眉部分的右侧是联系信息。这应包括姓名、电话号码和电子邮件地址，每项信息各占一行。


    #### 电头与导语


    新闻稿的第一段包含电头和导语。这是新闻稿最重要的部分之一，如果您无法保持读者的兴趣，他们很可能会立即停止阅读，所以不要在这里埋没导语。以您的城市名称开头，后跟一个破折号（称为电头），然后是一句能完美总结新闻稿的句子（称为导语）。开篇段落的一个示例如下：


    -   洛杉矶 – Megaawesomeconsultancy 公司的查尔斯·埃奇宣布推出一套全新服务，利用苹果平台为小型企业带来尖端的家庭自动化技术。


    #### 正文


    在正文部分，我们将介绍通常被称为“倒金字塔”的结构。从新闻稿中最具新闻价值的方面开始：人物（Who）、事件（What）、时间（When）和地点（Where）。然后进入重要的细节，最后以概括性和背景信息收尾，我们将在下一部分进行介绍。


    正文的示例可能包含两到三个段落，用于陈述必要的细节，例如以下示例：


    -   埃奇誓言要将家庭自动化技术应用于小型企业的方方面面，其成本完全可以通过节省的能源费用得到补偿。乔治·特克尼科波利斯被任命为自动化业务部门负责人。

    -   “我们正在为主流市场带来即开即用的解决方案，让企业能够控制暖通空调、灯光并监控能耗，”特克尼科波利斯说道。“这不仅能让公司节省能源开支，还能让每个人的生活更轻松。”

    -   特克尼科波利斯将于 4 月 1 日出席大型科技会议。届时，各组织机构和媒体可以参观模型住宅，并通过标准语音控制操控一切。


    请注意，在这段节选中，我们引用了一两句企业主或组织内部人员的话。额外的引语也可以来自分析师或研究统计数据。同时，文中也包含了一个行动号召，邀请大家参加一场展示会，届时可以获取更多引语，媒体人员也可以亲身体验到所提及的技术。

    '
- fmt: '#### General Information


    You don’t need to provide a summary to a press release. But you can include a
    paragraph of background information that you reuse in each press release you put
    out. Rather than give an example of this, I’ll just include some bullets to consider
    including in the paragraph.


    - How long the company has been in business

    - How many customers the company has

    - Anything newsworthy or legitimizing about the company

    - Any quotes from industry analysts or influencers in the industry about the company

    - For smaller companies, information about the principals of the company


    An example of the general information might read something like the following:


    - Founded in 1602, Megaawesomeconsultancy brings modern technologies to small-
    and medium-sized businesses. The company focuses on Apple technologies and carries
    the largest inventory of Apple hardware in the world, as it has since its founding,
    centuries before the founding of Apple itself. Megaawesomeconsultancy has 894
    employees, with offices in Venice Beach, Calif.

    - “We will save the environment, one HomePod installation at a time,” said Charles
    Edge.

    - For more information on Megaawesomeconsultancy, visit [`http://www.krypted.com`](http://www.krypted.com).


    Finally, and this is worth repeating: a press release isn’t a book. Keep a press
    release to a single page and always have it proofed to make sure it fits with
    AP Style Guides (a link to the latest version of that is included at the end of
    this chapter) before you submit it.


    Once you have a press release built, it can be submitted via `prweb.com`, `Newswire`,
    or directly to various contacts you may have in the press. One thing you might
    choose to do PR on is seasonal offerings, as reporters are always doing catchy
    stories around holidays and other time-bound events, which we’ll cover in the
    next section.


    ## Seasonal PR and Marketing


    Seasonal PR and marketing comes every year, if not multiple times of the year.
    By the time jack-o’-lanterns start to appear on front stoops, businesses ranging
    from the Boy Scouts of America to the neighborhood gym have started preparations
    to bring in enough business to keep them open for the year, in many cases. In
    2016, holiday sales represented nearly 20 percent of total retail industry sales
    nationwide for the year, according to the National Retail Federation.


    Businesses that have their act together stand to do well in what most prognosticators
    say should be a healthy year for holiday sales. Those that don’t may spend January
    wondering what went wrong.


    One of my first jobs was managing retail point-of-sale systems. While visiting
    brick and mortar stores, I got a lot of exposure to the preparations people were
    making—or failing to make—for the holiday rush. Many of the same lessons also
    apply to online retailers. Ten key suggestions:


    - **Start early:** Some strategies take time. You might have all the right ideas,
    but if you don’t start immediately, you won’t have time to implement them before
    the holiday rush. Given that more than half of holiday shoppers are done shopping
    by December 10^(th), you only have a few weeks to capture their business—so start
    targeting them in November (which means starting your PR efforts in October).

    - **Follow the latest trends:** Sure, you know your market and how to appeal to
    it, but don’t get overconfident. Look up and see what trends are hot, both geographically
    and in the industry. Do your research. You may have missed something.

    - **Leverage Small Business Saturday:** It comes on Nov. 25 this year. As a small
    business, you should be able to rock this. American Express and a number of other
    organizations can help drive business to you with their Small Business Saturday
    campaigns.

    - **Take any form of payment:** American Express, Discover, gift cards—and cash
    works too! There are more vendors than ever for processing credit card payments,
    from `Square` to `PayPal Here`, to `QuickBooks GoPayment`, to `Stripe`. Adding
    local payment or coupon options (such as the coupon books my daughter’s school
    has me sell every year) can also provide leads and co-marketing for you. And gift
    cards can easily be done with services like `Gyft` or `Clover`. Love ’em all!

    - **Work with Groupon:** `Groupon` as well as `Amazon Local` and other similar
    sites are great for driving business, much in the same way that traditional coupon
    books can. Just be ready for a potential torrent of new business *after* the holidays
    (after all, you have to earn that revenue to recognize it).

    - **Start a loyalty program:** Loyalty programs can be small and low-tech. Or
    they can be a service such as the `Belly` loyalty rewards program. You can also
    use the good old-fashioned punch cards and stamps—the “buy 10, get 1 free”-type
    of stuff. The great thing about a program like `Belly`, though, is you get an
    online presence driving business your way. Also consider loyalty programs that
    include a bunch of different businesses.

    - **Rev up your PR machine now:** If you operate in a local market, it’s a great
    time to look for creative ways to get your story out through social media.

    - **Personalize the customer experience:** This can be as simple as remembering
    a customer’s name and what they like. The fact is, consumers are willing to pay
    more for a better experience. Automate as much of the experience tracking as you
    can but not in a creepy way (like bombarding customers with multiple e-mails every
    week).

    - **Partner with a non-profit:** Don’t do it to make money, but because it’s right.
    This can be as simple as tithing a percentage of profits for a limited time to
    a charitable organization. Or you can get out and do something in person that’s
    meaningful, such as leading a collection drive.

    - **Be smart with promotions:** This doesn’t mean merely holding a 20 percent
    off sale. You could hold a photos-with-Santa event or give double the loyalty
    points for a limited period if you have a loyalty program.


    There are also a thousand ideas here that I could never think to mention, and
    you know your customers better than I possibly could, so use this list as a starting
    point and do as much free stuff as you can, both seasonally and out of season,
    before you look to hire external help.'
  raw: '#### General Information


    You don’t need to provide a summary to a press release. But you can include a
    paragraph of background information that you reuse in each press release you put
    out. Rather than give an example of this, I’ll just include some bullets to consider
    including in the paragraph.


    *   How long the company has been in business


    *   How many customers the company has


    *   Anything newsworthy or legitimizing about the company


    *   Any quotes from industry analysts or influencers in the industry about the
    company


    *   For smaller companies, information about the principals of the company


    An example of the general information might read something like the following:


    *   Founded in 1602, Megaawesomeconsultancy brings modern technologies to small-
    and medium-sized businesses. The company focuses on Apple technologies and carries
    the largest inventory of Apple hardware in the world, as it has since its founding,
    centuries before the founding of Apple itself. Megaawesomeconsultancy has 894
    employees, with offices in Venice Beach, Calif.


    *   “We will save the environment, one HomePod installation at a time,” said Charles
    Edge.


    *   For more information on Megaawesomeconsultancy, visit [`http://www.krypted.com`](http://www.krypted.com)
    .


    Finally, and this is worth repeating: a press release isn’t a book. Keep a press
    release to a single page and always have it proofed to make sure it fits with
    AP Style Guides (a link to the latest version of that is included at the end of
    this chapter) before you submit it.


    Once you have a press release built, it can be submitted via prweb.com, Newswire,
    or directly to various contacts you may have in the press. One thing you might
    choose to do PR on is seasonal offerings, as reporters are always doing catchy
    stories around holidays and other time-bound events, which we’ll cover in the
    next section.


    ## Seasonal PR and Marketing


    Seasonal PR and marketing comes every year, if not multiple times of the year.
    By the time jack-o’-lanterns start to appear on front stoops, businesses ranging
    from the Boy Scouts of America to the neighborhood gym have started preparations
    to bring in enough business to keep them open for the year, in many cases. In
    2016, holiday sales represented nearly 20 percent of total retail industry sales
    nationwide for the year, according to the National Retail Federation.


    Businesses that have their act together stand to do well in what most prognosticators
    say should be a healthy year for holiday sales. Those that don’t may spend January
    wondering what went wrong.


    One of my first jobs was managing retail point-of-sale systems. While visiting
    brick and mortar stores, I got a lot of exposure to the preparations people were
    making—or failing to make—for the holiday rush. Many of the same lessons also
    apply to online retailers. Ten key suggestions:


    *   **Start** **early**: Some strategies take time. You might have all the right
    ideas, but if you don’t start immediately, you won’t have time to implement them
    before the holiday rush. Given that more than half of holiday shoppers are done
    shopping by December 10^(th), you only have a few weeks to capture their business—so
    start targeting them in November (which means starting your PR efforts in October).


    *   **Follow the latest trends**: Sure, you know your market and how to appeal
    to it, but don’t get overconfident. Look up and see what trends are hot, both
    geographically and in the industry. Do your research. You may have missed something.


    *   **Leverage Small Business Saturday**: It comes on Nov. 25 this year. As a
    small business, you should be able to rock this. American Express and a number
    of other organizations can help drive business to you with their Small Business
    Saturday campaigns.


    *   **Take any form of payment**: American Express, Discover, gift cards—and cash
    works too! There are more vendors than ever for processing credit card payments,
    from Square to PayPal Here, to QuickBooks GoPayment, to Stripe. Adding local payment
    or coupon options (such as the coupon books my daughter’s school has me sell every
    year) can also provide leads and co-marketing for you. And gift cards can easily
    be done with services like Gyft or Clover. Love ’em all!


    *   **Work with Groupon**: Groupon as well as Amazon Local and other similar sites
    are great for driving business, much in the same way that traditional coupon books
    can. Just be ready for a potential torrent of new business *after* the holidays
    (after all, you have to earn that revenue to recognize it).


    *   **Start a loyalty program**: Loyalty programs can be small and low-tech. Or
    they can be a service such as the Belly loyalty rewards program. You can also
    use the good old-fashioned punch cards and stamps—the “buy 10, get 1 free”-type
    of stuff. The great thing about a program like Belly, though, is you get an online
    presence driving business your way. Also consider loyalty programs that include
    a bunch of different businesses.


    *   **Rev up your PR machine now**: If you operate in a local market, it’s a great
    time to look for creative ways to get your story out through social media.


    *   **Personalize the customer experience**: This can be as simple as remembering
    a customer’s name and what they like. The fact is, consumers are willing to pay
    more for a better experience. Automate as much of the experience tracking as you
    can but not in a creepy way (like bombarding customers with multiple e-mails every
    week).


    *   **Partner with a non-profit**: Don’t do it to make money, but because it’s
    right. This can be as simple as tithing a percentage of profits for a limited
    time to a charitable organization. Or you can get out and do something in person
    that’s meaningful, such as leading a collection drive.


    *   **Be smart with promotions**: This doesn’t mean merely holding a 20 percent
    off sale. You could hold a photos-with-Santa event or give double the loyalty
    points for a limited period if you have a loyalty program.


    There are also a thousand ideas here that I could never think to mention, and
    you know your customers better than I possibly could, so use this list as a starting
    point and do as much free stuff as you can, both seasonally and out of season,
    before you look to hire external help.'
  trans: '

    #### 基本信息


    你不需要为新闻稿提供摘要，但可以加入一段可重复使用的背景信息段落，用于每一篇新闻稿中。这里不举例说明，而是列举一些在该段落中可考虑包含的要点：


    -   公司成立至今的年限

    -   公司的客户数量

    -   公司任何具有新闻价值或能提升公信力的信息

    -   来自行业分析师或行业意见领袖对公司的评价

    -   对于较小的公司，可介绍公司负责人的信息


    基本信息的一个示例如下：


    -   Megaawesomeconsultancy 公司成立于 1602 年，致力于为中小企业带来现代技术。公司专注于苹果技术，并且从苹果公司成立前的几个世纪起就一直持有全球最大的苹果硬件库存。公司拥有
    894 名员工，在加州威尼斯海滩设有办公室。

    -   “我们将通过一次次的 HomePod 安装来拯救环境，”Charles Edge 表示。

    -   如需了解更多关于 Megaawesomeconsultancy 的信息，请访问 [`http://www.krypted.com`](http://www.krypted.com)。


    最后，值得重申的是：新闻稿不是一本书。请将新闻稿控制在一页以内，并在提交前务必校对，确保其符合美联社写作风格指南（本章末尾附有该指南最新版本的链接）。


    新闻稿撰写完成后，可通过 `prweb.com`、`Newswire` 提交，或直接发送给你在媒体中的各种联系人。你可能会选择进行公关宣传的一个方向是季节性产品，因为记者们总是喜欢在节假日和其他有时效性的事件周围撰写引人注目的报道，我们将在下一节中探讨这一点。


    ## 季节性公关与营销


    季节性公关与营销每年都会出现，有时一年还会出现多次。当南瓜灯开始出现在门廊前时，从美国童子军到社区健身房等各类企业，在很多情况下都已经开始准备，以吸引足够多的业务来维持一年的运营。根据全美零售商联合会的数据，2016
    年节日季销售额占当年全美零售业总销售额的近 20%。


    在大多数预测者看来，今年的节日销售前景良好，那些准备充分的企业有望表现出色。而那些准备不足的企业，则可能会在一月份反思究竟哪里出了问题。


    我的第一份工作是管理零售端的销售点系统。在走访实体店的过程中，我多次观察到人们为节日购物潮所做的——或未做的——准备工作。其中许多经验同样适用于在线零售商。以下是十条关键建议：


    -   **尽早启动：** 有些策略需要时间。你可能拥有所有正确的想法，但如果你不立即行动，就没有足够的时间在节日购物潮到来之前实施它们。考虑到超过一半的节日购物者会在
    12 月 10 日之前完成采购，你只有几周时间来争取他们的业务——所以请在 11 月就开始瞄准他们（这意味着你需要在 10 月就启动公关工作）。

    -   **紧跟最新趋势：** 当然，你了解自己的市场并知道如何吸引它，但不要过于自信。抬头看看哪些趋势正热，无论是地域性的还是行业内的。做好调研。你可能会遗漏一些东西。

    -   **利用小企业星期六：** 今年是 11 月 25 日。作为一家小企业，你应该能在这方面大放异彩。美国运通及其他许多组织可以通过它们的“小企业星期六”活动来为你带来客源。

    -   **接受任何支付方式：** 美国运通、Discover、礼品卡——现金当然也可以！处理信用卡支付的供应商比以往任何时候都多，例如 `Square`、`PayPal
    Here`、`QuickBooks GoPayment` 和 `Stripe`。添加本地支付或优惠券选项（例如我女儿学校每年都让我帮忙销售的优惠券册子）也能为你带来潜在客户和联合营销的机会。而礼品卡可以轻松地通过
    `Gyft` 或 `Clover` 等服务来实现。全都喜欢！

    -   **与 Groupon 合作：** `Groupon`、`Amazon Local` 以及其他类似网站与传统的优惠券册子一样，是推动业务发展的好方法。只是要准备好面对假日季*之后*可能涌现的大量新业务（毕竟，你需要赚取这部分收入才能确认它）。

    -   **启动忠诚度计划：** 忠诚度计划可以是小规模且低技术含量的。也可以是像 `Belly` 忠诚度奖励计划这样的服务。你还可以使用老式的打孔卡和印章——那种“买十送一”之类的。不过，像
    `Belly` 这样的计划的好处在于，你可以在线曝光，从而吸引业务。同时，也可以考虑包含多家不同企业的联合忠诚度计划。

    -   **现在就加大公关力度：** 如果你在本地市场运营，这是个寻找创意方法通过社交媒体传播你故事的好时机。

    -   **个性化客户体验：** 这可以简单到记住客户的名字和他们的喜好。事实上，消费者愿意为更好的体验支付更多。尽可能将体验追踪自动化，但不要做得令人反感（比如每周用大量邮件轰炸客户）。

    -   **与非营利组织合作：** 做这件事不是为了赚钱，而是因为它是对的。这可以简单到将限定期限内的一部分利润捐给慈善组织。或者，你也可以亲自走出去做一些有意义的事情，比如组织一次募捐活动。

    -   **促销要明智：** 这不仅仅意味着搞个八折促销。你可以举办与圣诞老人合影的活动，或者如果你的忠诚度计划允许，可以在限时内给予双倍积分。


    当然，还有无数我未曾想到的点子，而你们比我更了解自己的客户。所以，请以这份清单为起点，在考虑寻求外部帮助之前，尽最大努力去提供免费的东西，无论是在旺季还是淡季。'
- fmt: '# Hiring a PR Firm


    This chapter has included a number of tips on getting free public relations. Public
    relations is key to building out a truly scalable sales organization, as the passive
    marketing obtained via PR is not only the top of your sales funnel, but PR also
    provides air cover for all leads as they traverse through the sales funnel.


    At some point the free efforts have less and less return on investment, or the
    available PR resources in your area or field are saturated and it’s difficult
    to get started in the first place. This means it’s time to stop going it alone.
    Maybe you don’t have time to consistently “do PR.” Maybe you need better assistance
    to uncover great potential. Maybe you want to reach a larger audience than you
    could on your own. This is when it’s time to hire some help.


    Hiring help doesn’t mean you have to pony up tens of thousands of dollars to a
    huge firm, either. I can pretty much guarantee you that there is a PR club/organization
    in your area. The first place to start would be the Public Relations Society of
    America, at `prsa.org`; from there, search the Internet for local PR firms. In
    this “gig economy” looking for individuals you could pay directly to help with
    your PR efforts is a also great way to keep costs low in the beginning.


    The important part is that whomever you hire makes you participate in things.
    Whether that’s writing content, responding to e-mails to set up appointments for
    interviews, connecting to local groups, or even buying that new shirt for your
    first television interview! Beyond that, take their plan and then look for ways
    to figure out if the PR function is then working for you, because if it isn’t,
    then you’ll need to find a different firm to hire until you find the perfect fit.


    ## Understand How They Work


    Be careful of charlatans. Public Relations is challenging to quantify, because
    it’s usually not performance-based. But really, most agencies or sole proprietors
    will have an idea of what they want to do with your company, and how much time
    that will take. They usually reverse-engineer a retainer based on an estimation
    of how much time it will take them to deliver the results you want. And sometimes
    they’ll luck out and do more and other times they will do less. But give yourself
    permission to ask for transparency for how they came to a retainer amount. If
    you understand their assumptions and limitations, you’ll have a better relationship.


    ### Note


    While monthly retainers are the norm, you can do project-based PR with an agency.
    This might be a good way to get started without a lot of long-term commitment.


    While it can be challenging to quantify the relationship with a PR firm or agency,
    there are a couple of tips if you want to try.


    - **Measurable outputs**: Quantify deliverables. For example, how many articles
    or interviews or placed bylines. Multiple outputs is acceptable and subject to
    review at least every 6 months.


    - **Measure quality beyond quantity**: Implement an article rating system and
    have a goal. That way “you” can measure the quality of the placements vs. just
    the quantity. I have an example of a rating system I use if you are interested.


    When you work with someone, they should understand what you do, how you want people
    to perceive your company, the places that they should do media outreach for, what’s
    required before doing any media outreach, and the scope of the relationship you’ll
    have with them. They should be able to build an effective plan in the pre-sales
    stage, or at least an outline of what they’ll be doing on your behalf. Make sure
    you see a plan and agree on it before you cut a check to anyone. Otherwise, don’t.


    ## If It Isn’t Working, Switch Firms


    I recommend giving any PR effort or firms at least 6 months. Most will work quarterly
    anyways, so this is really just renewing your contract for a second quarter. After
    6 months, you should know the impact that a given PR firm is going to have for
    your organization.


    After the first quarter, you should be feeling a little buzz in the market. If
    you’ve been getting media attention, but have not seen any lift in the business
    yet, then you’re probably on the right track. PR isn’t immediate so you have to
    be a little bit patient. The important thing is that you know what efforts your
    representation is conducting on your behalf and agree with them. It seems like
    these things always take longer than we initially think they will.


    During the second quarter, you should start seeing business coming in from PR.
    If at the end of the second quarter you don’t see any lift, then it’s time to
    either renegotiate your contract or, more likely, find a new firm. If it takes
    you three of these cycles to find the right firm, so be it. The right PR can be
    one of the biggest game changers for any company.


    # Things to Stay Away From


    Getting media attention is fun at times. But you can easily ruin relationships
    if you say the wrong thing. A little common sense goes a long way; however, when
    you’re put on the spot and you need to respond quickly, you might say something
    you shouldn’t. Sometimes, you can ask for questions beforehand, but that doesn’t
    really cover the way conversations can meander.


    You can guide where the conversation goes, to some extent. So have a plan. And,
    if you don’t know how to answer a question, it is OK to ask the reporter if you
    can get back to them after the interview via e-mail. Some things you really probably
    just shouldn’t talk about publicly.


    - **Financials**: Stick to what is public. Your financials can be a big topic.
    When it comes up with local or business press, know what you can and can’t say
    going into an interview. If you’re the owner, make sure you know what you want
    to say, since you’re allowed to say anything you want.


    - **Politics**: Half of your country will be annoyed by anything you say. I use
    this rule when I’m onsite anyway, but be careful about discussing politics. Even
    if you agree on 9 out of 10 issues within a given audience, that 10th thing will
    potentially cause friction with a customer, and there’s really no need for that.
    Having said that, I am all for being open about who you are, and just because
    you own a business doesn’t mean you can’t have an identity, so I don’t necessarily
    include things like sexual orientation, gender identity, or religion with politics,
    even though it’s easy to do so. Especially with how divisive politics has gotten
    these days.


    - **Customers**: Unless you have explicit permission in writing from someone at
    one of your customers (with the authority to discuss the work you do with them
    publicly), don’t do it. And even if you do have that, make sure to understand
    the boundaries of what they’re cool with you discussing with the media.


    - **Vendors**: There are a few issues that you can run into with vendors. One
    is talking about specific business topics, like margins. You’re likely contractually
    bound not to discuss these, but it warrants mentioning anyway. Additionally, make
    sure you don’t say anything that could be perceived negatively.


    There are other things that you shouldn’t discuss as well. Be smart about what
    you say—especially when you’re “off the record,” as I’ve had a number of times
    when I said something that was supposedly off the record and it ended up being
    put in print!


    # Conclusion


    Public Relations is one of the more legitimate ways to get the word out there
    about your company. But it’s hard to track the actual impact that media attention
    can have for your organization. Having said that, with little effort, you can
    establish a brand and drive some traffic back to your site, hopefully converting
    a higher percentage of incoming calls than you do for other forms of outreach.


    It may be hard to quantify the impact of Public Relations, but it’s not usually
    hard to quantify the impact of advertising, which we’ll cover next, in Chapter
    [9](#469405_1_En_9_Chapter.xhtml).'
