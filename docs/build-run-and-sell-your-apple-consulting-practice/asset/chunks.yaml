- fmt: "#### The 5 Whys\n\nThe 5 Whys technique is used to find the root cause of\
    \ a problem. That problem might be a software defect (when writing software) or\
    \ a failure in a business process. Basically, ask why something happened. Then,\
    \ use the answer to ask why again, and repeat the process a few more times. Usually,\
    \ you find the root cause analysis within 5 whys. For more complex problems, it\
    \ might take 7.\n\nThe goal of root cause analysis is to get to the bottom of\
    \ something. Let’s take accounts receivable as an example. Let’s ask our series\
    \ of questions:\n\n1.  Why is the company operating in a negative cash flow situation?\n\
    \    1.  Because accounts receivable are too high (over `$1,000,000`).\n2.  Why\
    \ are accounts receivable over `$1,000,000` for the first time in the history\
    \ of the company?\n    1.  Because the company has a number of customers who are\
    \ disputing their bills.\n3.  Why are customers disputing their bills?\n    1.\
    \  Because multiple trips were required to fix a single issue that customers claim\
    \ shouldn’t have taken multiple trips.\n4.  Why is quality dipping (or at least\
    \ why is there a perception that it is)?\n    1.  We have a bunch of new people\
    \ on staff to replace people that left.\n5.  Why did we experience high amounts\
    \ of turnover recently?\n    1.  Because the owner isn’t around, employees aren’t\
    \ getting paid enough, or they all found better jobs.\n\nThere, it’s my fault!\
    \ Either that, or we’re not keeping our teams engaged, not compensating them enough,\
    \ or there is a shift in the industry for our geography. The result is going to\
    \ be different for everyone, but note that here we went from cash flow to turnover,\
    \ a common link. In this case, settling the customer quality issues should happen\
    \ immediately, and we should make moves to increase retention.\n\n#### SWOT Analysis\n\
    \nThe first way to analyze problems that we’ll look at is SWOT. SWOT stands for\
    \ strengths, weaknesses, opportunities, and threats. SWOT is best when used proactively,\
    \ but we can use it to analyze reactively as well. We can use SWOT to look at\
    \ risks and then link those to what went wrong.\n\nFirst, let’s define the components\
    \ of SWOT.\n\n*   Strengths are attributes that give you an advantage over organizations\
    \ (most likely your local competition).\n*   Weaknesses are attributes that put\
    \ you at a disadvantage.\n*   Opportunities are areas you can exploit based on\
    \ your strengths.\n*   Threats are areas your competition can exploit based on\
    \ your weaknesses.\n\nStart off with deciding what the objective of the analysis\
    \ is. Think of this as the title and try to summarize it as succinctly as possible.\
    \ Then draw a grid and label each box with one of the elements: Strengths, Weaknesses,\
    \ Opportunities, and Threats. Then fill in the boxes. In my experience, a lot\
    \ of things make sense once you’ve gone through the exercise, and if not, it’s\
    \ easy to solicit feedback on what should go where from others!\n\nThere are tons\
    \ of other ways to go about looking at what you are going to do or what you did\
    \ and analyzing results, or planned results. The most important aspect of these\
    \ is to think critically about the business in a structured manner. I like to\
    \ go through this stuff independently with people from teams I’m on. This gives\
    \ me not only my own analysis but also how others think about the same topics.\n\
    \nOnce you review what went wrong it’s time to come up with a hypothesis for how\
    \ to correct the situation. This hypothesis results in an attainable solution,\
    \ SWOTs help you plan responses based on the possible outcomes of implementing\
    \ your solution. The main objective here is to provide meaningful responses and\
    \ not to just fill in the blanks.\n\n## Conclusion\n\nYou can always find someone\
    \ to run your company. You might not want them to once you’ve found them, as you\
    \ might miss running things. And no one will ever do as good a job as you would\
    \ do. Never publicly admonish the person you put in place to run your organization.\
    \ Privately, offer feedback.\n\nWhile not easy, moving to overseeing a business\
    \ rather than running a business can be one of the most rewarding quests of your\
    \ career. You can be free to do a variety of things, like finally take a vacation,\
    \ or start another company. Just keep in mind that usually, being a part-time\
    \ owner will result in less sales and performance from the organization. And the\
    \ long-term implication is often that the business will not last forever, so make\
    \ sure to treat those you leave behind well, reward growth, and keep the business\
    \ going so you can best take care of everyone who has chosen to spend their time\
    \ with you.\n\n## Further Reading\n\n*   The Heart of Change, John P. Kotter [`https://www.amazon.com/Heart-Change-Real-Life-Stories-Organizations/dp/1422187330`](https://www.amazon.com/Heart-Change-Real-Life-Stories-Organizations/dp/1422187330)\n\
    *   Lead the Work: Navigating a World Beyond Employment, John W. Boudreau, Ravin\
    \ Jesuthasan, David Creelman, [`https://www.amazon.com/Lead-Work-Navigating-Beyond-Employment/dp/1119040043`](https://www.amazon.com/Lead-Work-Navigating-Beyond-Employment/dp/1119040043)\n\
    *   Retire Inspired, Chris Hogan, [`https://www.amazon.com/Retire-Inspired-Its-Financial-Number/dp/1937077810`](https://www.amazon.com/Retire-Inspired-Its-Financial-Number/dp/1937077810)\n\
    *   Don’t Retire, Rewire, Jeri Sedlar, Rick Miners, [`https://www.amazon.com/Dont-Retire-Rewire-Jeri-Sedlar/dp/1592576893`](https://www.amazon.com/Dont-Retire-Rewire-Jeri-Sedlar/dp/1592576893)\n\
    *   How To Earn More Money As A Freelancer, V. V. Cam, [`https://www.amazon.com/Because-Money-Matters-Freelancer-Economy-ebook/dp/B078YHZ2GX`](https://www.amazon.com/Because-Money-Matters-Freelancer-Economy-ebook/dp/B078YHZ2GX)\n\
    *   The Gig is Up, Olga Mizrahi, [`https://www.amazon.com/Gig-Up-Economy-Obsolete-Freelancing/dp/1626344930`](https://www.amazon.com/Gig-Up-Economy-Obsolete-Freelancing/dp/1626344930)\n\
    *   SWOT Analysis, Lawrence G Fine, [`https://www.amazon.com/SWOT-Analysis-Strength-Weaknesses-Opportunities/dp/1449546757`](https://www.amazon.com/SWOT-Analysis-Strength-Weaknesses-Opportunities/dp/1449546757)\n\
    \n# Buying Companies\n\nAcquiring a company can infuse your company with new blood.\
    \ Your employees can be energized by a new flock of customers and your customers\
    \ can find more value in the additional services you can then offer. In Chapter\
    \ 13, we discussed selling your company. And in Chapter 14, we went through moving\
    \ to being a part-time owner instead. Now, let’s talk about growing your own company\
    \ inorganically via an acquisition.\n\nThere are as many ways to go about acquisitions\
    \ as there are companies that have been purchased. And there are many ways to\
    \ find a company to purchase. One way is to look for companies that are on the\
    \ market. Another is to look at companies that might not be on the market yet.\
    \ Don’t limit yourself to opening discussions with companies that are for sale.\n\
    \nBefore you start, though, think about what you’re trying to accomplish by acquiring\
    \ an organization. In many ways, this is the opposite of Chapter 13, but builds\
    \ on what we covered there. So first, let’s talk about the why, or what you’re\
    \ actually trying to accomplish in an acquisition."
