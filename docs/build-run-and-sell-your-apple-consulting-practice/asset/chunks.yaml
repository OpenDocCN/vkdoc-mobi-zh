  trans: '

    # 外包人力资源管理


    在本书中，我们将人力资源（HR）视为一个个人或团队，负责监督您组织中的雇佣事宜，包括遵守劳动法、雇佣标准、福利管理，以及最终的招聘工作。在本章的大部分内容中，我们重点关注领导力和管理，因为单是探讨组织结构的科学及其背后的后勤工作，就可能需要数百页的篇幅。


    在本章中，我们回顾了许多资源。我们提到，可以从 `trinet.com`、`adp.com`、`insperity.com` 和 `gusto.com` 入手，建立一套系统，并在员工人数超过六人时聘请一位顾问。


    我们没有讨论需要培训和维持技能的具体技术。这是因为这样的技术有成百上千种。其中一部分可以在附录 C 中找到。每家公司在设计服务产品和团队使用的工具包时，都会因所选工具的不同而有所差异。这个列表在规划服务产品时能派上用场。


    员工人数少于 20 人的组织，或许应该考虑将人力资源工作外包，除非他们计划每周至少招聘一名或更多员工。有许多不同的外包服务商能为您提供远超您自行打包的任何福利方案。他们还会在您需要时倾听您的诉求；帮助您遵守您开展业务所在城市、州、县、省等地的法律法规；并接管薪资发放工作。以下是中小型公司在选择外包人力资源时需要关注的具体事项：


    *   为员工提供可致电的服务台。这可以避免您花费大量时间研究劳动法或保险理赔的具体细节。

    *   为员工提供保险。您的员工需要得到妥善照顾，而最便捷的方式之一就是提供一份优厚的保险计划。

    *   处理员工工伤保险事宜。

    *   提供股票期权和/或 401k 退休计划。

    *   解决员工纠纷。

    *   必要时提供股票、利润分享和股息。


    在考虑外包人力资源时，请务必询问外包商他们将如何处理上述每一种情况。了解哪些服务是单独计费的。并确保您乐意拥有当地顾问资源来帮助您，同时也确保他们与您的外包商合作融洽。请记住，人力资源还包括领导力和入职培训。而这两点，往往决定了一家公司能否持续地向客户交付高质量产品。


    ## 结论


    人力资源工作不仅仅是确保每个人都能拿到薪酬和拥有保险。人力资源确实包含这些内容，但它还涉及领导力培训、多元化、员工留存、人员管理系统、招聘，以及您选择纳入其中的几乎所有其他方面。


    在本章中，我们探讨了何时外包人力资源，以及何时招聘或组建人力资源部门的一些常见临界点。根据您选择经营公司的方式，这些临界点有一定的灵活性，但请记住，当您的团队规模接近十几个人时，您需要建立起完善的入职和培训计划。这些工作不会自动完成，大多数企业主应该指导这些计划的实施，但如果您对它们进行微观管理，最终反而会减少对战略和销售（大多数组织的增长驱动力）的投入。


    现在，我们已经涵盖了人力资源的话题，接下来该看看我们如何为这一切买单。在下一章中，我们将直接深入探讨可能是大多数创办公司的极客们最喜爱的话题：会计！


    ## 延伸阅读


    *   《小企业 HR》（HR for Small Business），Charles Fleischer，[`https://www.amazon.com/Small-Business-Essential-Resources-Professionals/dp/1572486902`](https://www.amazon.com/Small-Business-Essential-Resources-Professionals/dp/1572486902)

    *   《人力资源必备手册》（The Essential HR Handbook），Sharon Armstrong，Barbara Mitchell，[`https://www.amazon.com/Essential-HR-Handbook-Resource-Professional/dp/1564149900`](https://www.amazon.com/Essential-HR-Handbook-Resource-Professional/dp/1564149900)

    *   《人力资源管理与企业绩效》（HRM and Performance），David E Guest, Jaap Paauwe, Patrick Wright，[`https://www.amazon.com/HRM-Performance-Achievements-David-Guest/dp/1405168331`](https://www.amazon.com/HRM-Performance-Achievements-David-Guest/dp/1405168331)

    *   《管理转型》（The Management Shift），V Hlupic，[`https://www.amazon.com/Management-Shift-Transform-Organization-Sustainable/dp/1137352949`](https://www.amazon.com/Management-Shift-Transform-Organization-Sustainable/dp/1137352949)

    *   《向前一步：女性、工作与领导意志》（Lean In: Women, Work, and the Will to Lead），Sheryl Sandberg，[`https://www.amazon.com/Lean-Women-Work-Will-Lead/dp/0385349947`](https://www.amazon.com/Lean-Women-Work-Will-Lead/dp/0385349947)

    *   《包容革命正当时：职场多元化与包容性创新框架》（The Inclusion Revolution Is Now: An Innovative Framework
    for Diversity and Inclusion in the Workplace），Maura Robinson，[`https://www.amazon.com/Inclusion-Revolution-Now-Innovative-Framework/dp/1491710578`](https://www.amazon.com/Inclusion-Revolution-Now-Innovative-Framework/dp/1491710578)

    *   《差异驱动：伟大公司如何通过多元化推动创新》（Driven by Difference: How Great Companies Fuel Innovation
    Through Diversity），David Livermore，[`https://www.amazon.com/Driven-Difference-Companies-Innovation-Diversity/dp/0814436536`](https://www.amazon.com/Driven-Difference-Companies-Innovation-Diversity/dp/0814436536)

    *   《写给软件团队负责人的笔记》（Notes to a Software Team Leader），Roy Osherove，[`https://www.amazon.com/Notes-Software-Team-Leader-Organizing/dp/829993320X`](https://www.amazon.com/Notes-Software-Team-Leader-Organizing/dp/829993320X)

    *   《管理人性》（Managing Humans），Michael Lopp，[`https://www.amazon.com/Managing-Humans-Humorous-Software-Engineering/dp/1484221575`](https://www.amazon.com/Managing-Humans-Humorous-Software-Engineering/dp/1484221575)

    *   《新手智慧》（Rookie Smarts），Liz Wiseman，[`https://www.amazon.com/Rookie-Smarts-Learning-Beats-Knowing/dp/006232263X`](https://www.amazon.com/Rookie-Smarts-Learning-Beats-Knowing/dp/006232263X)

    *   《情商 2.0》（Emotional Intelligence 2.0），Travis Bradberry and Jean Greaves，[`https://www.amazon.com/Emotional-Intelligence-2-0-Travis-Bradberry/dp/0974320625`](https://www.amazon.com/Emotional-Intelligence-2-0-Travis-Bradberry/dp/0974320625)

    *   《美国黑人商业史》（The History of Black Business in America），Juliet E.K. Walker，[`https://www.amazon.com/History-Black-Business-America-Entrepreneurship/dp/0807859109`](https://www.amazon.com/History-Black-Business-America-Entrepreneurship/dp/0807859109)

    *   《种族、族裔、性别与阶级：群体冲突与变革社会学》（Race Ethnicity, Gender, and Class: The Sociology
    of Group Conflict and Change），Joseph F, Healey，[`https://www.amazon.com/Race-Ethnicity-Gender-Class-Sociology/dp/1452216517`](https://www.amazon.com/Race-Ethnicity-Gender-Class-Sociology/dp/1452216517)

    *   《包容：多元化、新职场与变革意志》（Inclusion: Diversity, The New Workplace & The Will To Change），Jennifer
    Brown，[`https://www.amazon.com/Inclusion-Diversity-Workplace-Will-Change/dp/1946384100`](https://www.amazon.com/Inclusion-Diversity-Workplace-Will-Change/dp/1946384100)

    *   《让多元化发挥作用：消除职场偏见的七步法》（Making Diversity Work: 7 Steps for Defeating Bias in
    the Workplace），Sondra Thiederman，[`https://www.amazon.com/Making-Diversity-Work-Defeating-Workplace/dp/1427797137`](https://www.amazon.com/Making-Diversity-Work-Defeating-Workplace/dp/1427797137)

    *   《管理者作为导师》（Managers as Mentors），Chip R Bell，[`https://www.amazon.com/Managers-As-Mentors-Building-Partnerships/dp/160994710X`](https://www.amazon.com/Managers-As-Mentors-Building-Partnerships/dp/160994710X)

