    # 9. Advertising


    There are those who can sell. And for those who can’t, there’s advertising. Just
    kidding! The top of the sales funnel is often built through sound advertising.
    It’s those ads that make the phone ring and establish the leads that many a sales
    team will be trying to close business on. In Chapter 7, we looked at Guerrilla
    Marketing, and according to the size of the organization, this might be the place
    most efforts are best spent.


    But as you grow, you’ll need to look at primarily traditional advertising, which
    is what we’ll spend the remainder of this chapter covering. While not every aspect
    is traditional, there are elements that are (and besides, my concept of traditional
    isn’t the same as yours, my dad’s, or my grandmother’s concept would be).


    ## The Three Phases


    I’ve come up with my own little classification system for organizations as they
    embark upon the adventure of advertising. Sales is the best way to increase your
    business. Advertising helps sales by providing the legitimate authority to the
    company. If they’ve heard of you before and are just talking to someone in sales,
    a lead is more likely to convert to a customer.


    Advertising is the top of the funnel. Let’s look at how that top of your funnel
    is likely to mature over time:


    - **Not yet** : You’re just starting your business. You’re too busy shoveling
    poo to buy a shovel. You can’t keep up with the new business anyways, so what’s
    the point of buying advertising. Maybe if the local Rotary club or an organization
    in which you believe calls, you’ll make a donation for a table or to have your
    business listed somewhere. Maybe you’ll also post the occasional response to a
    forum or speak at a conference. But while these are things that advertise your
    company, you’re not really doing any traditional advertising yet.

    - **Dabbling** : You’ve been in business long enough to understand the conversation
    you want to have with potential customers. And you’re getting a good idea of what
    a good customer might look like. These are theories that need to be proven. During
    the dabbling phase, you should be exploring various advertising mediums, the target
    demographics, the needs the customers have, the sales cycles, and the return-on-investment
    (ROI) for each. If you’re deliberate, you’ll end up able to target the most desirable
    customer with a message that will make them call, click, or just buy.

    - **Investing** : You’re done dabbling once you have a predictable ROI from your
    advertising spend. Now it’s time to invest. Get professional help to increase
    that ROI and then scale the spend in the most appropriate medium. This might be
    using an outsourced service or hiring a team internally. If you’re stuck in the
    dabbling phase, you can leverage outside services to try and move yourself into
    the investing phase more quickly.

    - **Refining** : This is where real growth happens. And it’s the hardest place
    to get to. You’ve got a predictable model for spending your advertising budget.
    And you’ve been increasing your investment. You’re stable. But you’ve gotten to
    a point where the cost to acquire business is not going down or has started to
    tick up. If not, it will happen. Then it’s time to refine the message and the
    medium. By now, you have clearly proven that advertising is working, but keep
    in mind that it can always (and I repeat, always) work better.


    Whatever your place in the above maturity model, it’s all about your comfort.
    How much of your hard-earned profit are you willing to not take home as a draw?
    How much do you want to reinvest in the business? There’s a chance you never want
    to take a risk on spending any money on advertising and are happy as a one-, two-,
    or three-person company. And that’s wonderful. But if you choose to grow beyond
    that, it’s time to look at buying some advertising.'
