  trans: '

    # 选购会计软件


    关于选择何种会计软件（或软件即服务 `[SaaS]`），我通常建议考虑两个因素。第一个是你的会计师。如果他们喜欢使用特定的软件包，比如 `QuickBooks`，那么你很可能也该使用它。你肯定不想每次去见会计师时，都要把会计科目表导出成某种奇怪的文件，然后绞尽脑汁地帮他们导入那个文件。相反，要么找一个能原生使用你心仪软件的会计师，要么就使用你找的会计师喜欢用的软件。


    等等，我刚才是不是说“找一个能用你心仪软件的会计师”？为什么我会这么说？因为选择软件包的第二个主要因素是，它能否与你的专业服务自动化（`PSA`）解决方案集成。如果
    `PSA` 能够直接与会计软件通信，那么随着你的业务增长，你就可以基于工单录入，以一种非常简便、非常流畅的方式向客户开具发票。我们会在本书后面讨论如何选择
    `PSA` 解决方案。但就目前而言，请记住，你选择的会计软件以后需要与某些自动化软件集成。


    例如，如果你使用的 `PSA` 能与 `ZenDesk` 集成，但它碰巧不是 `QuickBooks`，而你的会计师却想要 `QuickBooks` 并且只愿意使用
    `QuickBooks`，那么你就会遇到一点挑战。如果实在没有办法，希望你能将数据从一种解决方案导出到另一种。如果不行，你就不得不在各种自动化方案和会计师之间做出选择。请记住，即使最终需要手动录入发票信息，那也不是最糟糕的情况（尤其是在早期阶段），因为手动录入信息能让你在向客户发送发票之前进行核对和制衡。当然，手动录入信息时可能会出错，所以务必仔细检查你的输入。没有什么比计费错误更容易引发信任危机了。


    # 收款方式


    盈利与否，是区分一门生意和一种爱好的关键。而盈利的一个重要方面在于：你最初接受的收款方式很容易限制你能承接的业务类型。因此，接受客户能用任何方式付款（并且这些款项最终能用于支付房租或房贷）是一个好主意。


    在选择收款工具时，我会考虑三个主要因素。


    *   该服务是否能与您选择的会计平台进行恰当（且自动的）集成？寻找一个好工具的简便方法是，从你的会计平台入手，查看那些能与之集成的服务。

    *   该服务能否为您提供最优惠的费率？如果你可以在多个服务之间进行选择，你可能希望确保使用的是克扣你辛苦钱最少的那一个。

    *   该服务是否会改变你的税收关联地？信不信由你，不同的网站、服务（甚至客户）都可能影响你的税务。请咨询你的税务申报人（是的，你需要一位税务申报人），以核实你可能受其管辖的任何关联地规则（特别是如果你跨州经营或是在边境城市工作）。


    用于收款的主要解决方案包括 `Square`、`Quickbooks` 和 `Stripe`。还有很多其他的，我对哪个更好没有定论。这些我都用过，与传统的固定电话驱动的大型终端机相比，它们都带来了颠覆性的改变。


    既然你已经可以收款了，那么是时候讨论一下什么时候可以花掉刚收到的钱了。


    # 权责发生制会计


    如果你要从本章中学到点什么，那就是这个。如果你的客户在合同中预付款项购买服务，那么你**必须**使用权责发生制会计。大多数企业一开始都采用收付实现制会计，也就是说，他们收到的钱就是记在总账上的钱，他们将这些钱视为现金。


    后来，企业最终会拥有多个会计科目表，并且只在服务交付后才进行收入应计或确认。为什么？因为如果你不这样做，最终会使一家成长中的公司破产。基本上，在服务交付之前，你不能动用那笔钱。你越早开始这样做，你的处境就越好。我发现很多企业直到受到巨大惊吓或聘请了会计师之后才开始这样做。


    那种巨大的惊吓往往出现在这样的情况中：所有合同收入都被花光了，为了完成已售出的项目，你不得不对公司进行资本重组。当这种情况发生时，即使你刚刚完成了职业生涯中最出色的一些工作，也很容易导致公司价值变为负数。这时，多一点现金流会有所帮助，但真正解决这个问题的唯一方法是，避免在你尚未实际赚取收入时就确认收入。


    # 聘请会计师


    你不必事事亲力亲为。你可以，而且很可能应该立即聘请一个人来帮你整理好账目。我发现一位好的会计师不仅能理清你过去所做的账目，还能为未来建立一个更好的系统。而且，你的第一位会计师很可能同时扮演着某种财务顾问的角色。后来，这些角色会变得不同。


    当你聘请会计师时，要找一个不会让你为所欲为的人。这意味着你需要倾听。是的，你是自己的老板。但他们也是你的老板，就像你的员工和你的客户一样。


    小型企业的簿记职能与会计师、财务顾问或税务申报人的职能不同。你需要有人（起初很可能就是你自己）来录入收据、录入应收账款、开具应付账款支票、核对银行对账单、核对信用卡对账单，可能还要存支票。随着业务增长，应收账款和应付账款的工作通常需要分给两个人来做。


    这里有一些需要记住的事情：


    *   从你挂牌营业并开始接受 `Stripe` 付款的那一刻起，就找一个你信任的税务申报人。

    *   识别出对实现业务自动化至关重要的工具。这一点很重要，因为它需要与你的会计体系集成。如果你的会计系统是 `Quickbooks`，而你的簿记员和税务申报人都使用
    `Quickbooks`，那么如果某个新的托管服务自动化（`MSA`）软件包不能与 `Quickbooks` 集成，你可能就无法迁移到该 `MSA` 软件包。除非你非常需要那个
    `MSA`，以至于要更换你的税务申报服务，或者找到每个季度迁移数据的方法，否则请与他们沟通确认。

    *   建立良好的制衡机制。你需要有人让你在支出、预测和税务方面保持诚实。你需要有其他人监督你资金的使用。你需要让他们检查那些你甚至不知道需要被检查的事情，比如每次发工资时可用资金的预测。你需要践行一点“信任但要核实”的原则。

    *   立即对收据进行分类。并在纳税时把所有东西都带上。你的税务申报人会分辨出哪些项目可以申报，哪些不能。这包括服务费、差旅费、订阅费以及办公室费用（起初可能只是你家庭办公室的一部分）。

    *   如果就某个商业安排获得了财务建议，在违反该建议行事之前，要深思熟虑。我不确定自己在这件事上搞砸过多少次。也不确定将来还会搞砸多少次。

    *   永远、永远、永远不要自己编写会计软件。

    *   永久保留你所有的记录。


    总的来说，我无法告诉你该如何构建你企业的财务体系。但也许本章中的一些内容能帮你以所需的方式构建框架。你应该聘请一个你可以信任的人——可能不是你亲戚的人。并且你应该时不时地从其他供应商那里获得额外的服务。

    '
- fmt: '# Doing Taxes


    You will be paying your taxes quarterly; otherwise, you will incur penalties from
    the IRS. Don’t let yourself end up with thousands or tens of thousands of dollars
    in penalties just because you thought you still worked for a company. Once you
    exceed a certain amount (your mileage may vary here, so check with a tax professional),
    then you’ll need to file quarterly taxes and pay your government a little at regular
    intervals.


    I would never put anything about politics in writing—Conservative, Liberal, Libertarian,
    Communist, etc. And none of that matters anyway. If there’s a law that you have
    to pay taxes, you have to. You use their roads, send your kids to their schools,
    benefit from the crime they keep out of your office, so you need to pay your share.
    Actually, that doesn’t matter either. If you don’t pay your taxes, and do so properly,
    you can go to jail in pretty much any country in the world. So do them early and
    often.


    I can’t tell you how to actually do your taxes; that’s different for every business,
    city, state, and country. But I can tell you that you should probably create a
    pass-through entity if you’re just getting started. Hire a professional tax accountant
    immediately so you can start making your quarterly tax payments to the IRS (if
    you’re based in the United States), so you don’t have to pay steep penalties for
    not having done so.


    # Insurance


    While not strictly accounting, insurance is part of the financial equation for
    any organization. Your accountant should be able to point you to a good organization
    that can sell you corporate insurance. Don’t go out there and do work without
    insurance. It’s critical to help protect you as a person as well as the company
    you have created. One accidental erasing of a hard drive, dropping of a laptop
    with critical information on it, or incorrectly securing a computer can leave
    you liable for who-knows-what.


    Picking a policy at first doesn’t have to be all that difficult. Find a good agent,
    then review what packages they have and pick one that fits your business model.
    Referrals are best when looking for an agent, but searching for “errors and omissions
    insurance coverage” (E&O) or “professional liability insurance” is likely to net
    a ton of potential sources for a policy.


    In the beginning, your policy can be modest. Growth usually means that your policy
    will have to get bigger. Each new customer brings with them the risk of potentially
    requiring more insurance than you already have. As new customers come with additional
    E&O coverage, you can look at the cost to acquire an upgraded policy.


    Here’s the most important thing about E&O. You will want a “Terms of Service”
    or some agreement with customers that governs how you work with them. In that
    agreement you will want to cap any damages they can pursue you for to be equal
    to the amount of money you have in your E&O policy. This protects you from the
    potential gap that you would have to pay in the event that you were sued and didn’t
    have enough coverage to pay out the amount in a suit, which would then come out
    of your or your business’ pocket.


    # Cash Flow


    Finally, let’s talk about cash flow. You should always have enough cash to pay
    your staff and other expenses for 6 months. Otherwise don’t hire staff. In some
    countries, not having enough cash flow to run the organization for a period of
    time is a criminal offense. Don’t forget to consider rent, HR, taxes, legal, etc.
    in this equation.


    Now, what happens when you have more than 6 months of operating capital? If you
    have enough to run the place for 10 years, then you aren’t properly deploying
    your capital. If you want to stay a small company then you should be investing
    that money. This isn’t investment advice, but if you are living (or running the
    company) in way that provides positive cash flow for a while then you should find
    financial advice. And that advice might be to grow the company or according to
    the cost of cash at the time, to leverage debt to grow the company. Or if according
    to what you want out of life and the company and everything, then your investment
    advisor might tell you to do something different with it. But don’t keep it in
    a checking account!


    # Conclusion


    Knowing the basics of accounting is an important skill. One of the most important
    hires you’ll make is an accountant. And there’s a strong likelihood that you’ll
    need at least two. As you grow maybe an accounts receivable and/or accounts payable
    person on staff. But you need to know enough to properly manage them all.


    Whatever you do, don’t go your own way. Listen to their advice. Maybe seek a second
    opinion at times, but never think you know more than Generally Acceptable Account
    Practices (GAAPs) and try to make up your own accounting rules. You can also outsource
    a Chief Financial Officer to help you best understand how to manage your tax professional
    and your day-to-day accounting team. Make sure to stay on top of quarterly tax
    payments (obviously your mileage may vary here, according to your country).


    Finally, learning about accounting and finance is learning about business. Managing
    costs, managing receivables, managing cash flow, managing revenue recognition,
    etc., these are what makes for a savvy business owner. You may get to the point
    where you don’t want to do much of it any more. And that may indicate that you’ve
    outgrown your comfort zone. But once you have enough income to hire a second person,
    it’s time to start learning a lot about business, even if you only have time to
    listen to some of the books in the Further Reading section of this chapter, or
    others that are similar.'
