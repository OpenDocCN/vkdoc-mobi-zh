  trans: '

    # 结论


    广告应该让电话铃声响起来（或者现在，我猜，是让邮件客户端提示音响起）。没有广告，你的销售团队很可能连两三个人都凑不齐。在购买广告时，大笔资金很容易就打了水漂。


    你每月很容易就在谷歌点击上花掉`$5,000`，结果却只接到一大堆询问你并不提供的服务的电话。许多播客的广告费用高达`$10,000`，而你可能根本无法知道是否从他们那里获得了有价值的潜在客户。如果这听起来令人生畏，那就找一个本地资源来指导你的行动，而不是仅仅出去购买任何看起来不错的东西，或者专注于公共关系。


    完全有理由保持我在本章前面描述的“尚未”状态。不要让你的自尊心跳出来告诉你需要购买广告位，或者你需要在最喜欢的播客开头听到自己的广告（除非那是我的播客）。


    与其在准备好明智地投入之前，不如先节省那些被浪费的广告支出。但如果你正致力于增长，你最终将需要在这方面投入。届时，找到一个你信任的人，因为广告行业中有很多非常善意但完全无用的组织。所以，就像业务的其他部分一样，挑战所有听起来不合理的事情，若有疑虑，就大胆地模仿苹果公司的营销和广告智慧（当然，不要侵犯他们的版权）！


    ## 延伸阅读


    - 《跟上量化大师》，作者：托马斯·H·达文波特与金镇浩 [`https://www.amazon.com/Keeping-Up-Quants-Understanding-Analytics/dp/142218725X`](https://www.amazon.com/Keeping-Up-Quants-Understanding-Analytics/dp/142218725X)

    - 《谷歌时代的营销》，作者：凡妮莎·福克斯 [`https://www.amazon.com/Marketing-Age-Google-Revised-Updated/dp/1118231937`](https://www.amazon.com/Marketing-Age-Google-Revised-Updated/dp/1118231937)

    - 《赤裸裸：关于摆脱破坏客户忠诚度的三种恐惧的商业寓言》，作者：帕特里克·兰西奥尼 [`https://www.amazon.com/Getting-Naked-Business-Shedding-Sabotage/dp/0787976393`](https://www.amazon.com/Getting-Naked-Business-Shedding-Sabotage/dp/0787976393)

    - 《营销的 22 条不变法则》，作者：阿尔·里斯与杰克·特劳特 [`https://www.amazon.com/22-Immutable-Laws-Marketing-Violate/dp/0887306667`](https://www.amazon.com/22-Immutable-Laws-Marketing-Violate/dp/0887306667)

    - 《许可营销》，作者：赛斯·高汀 [`https://www.amazon.com/Permission-Marketing-Turning-Strangers-Customers/dp/0684856360`](https://www.amazon.com/Permission-Marketing-Turning-Strangers-Customers/dp/0684856360)

    - 《塑造品牌宽度，在线完成销售》，作者：塞尔吉奥·齐曼与斯科特·米勒，[`https://www.amazon.com/Building-Brand-closing-online-hardback/dp/B003ACLZDG`](https://www.amazon.com/Building-Brand-closing-online-hardback/dp/B003ACLZDG)

    - 《利用大数据吸引客户：营销分析如何改变商业》，作者：阿文德·萨西，[`https://www.amazon.com/Engaging-Customers-Using-Big-Data/dp/1137386185`](https://www.amazon.com/Engaging-Customers-Using-Big-Data/dp/1137386185)

    - 《狂热粉丝》，作者：肯·布兰查德与谢尔登·鲍尔斯，[`https://www.amazon.com/Raving-Fans-Revolutionary-Approach-Customer/dp/0688123163`](https://www.amazon.com/Raving-Fans-Revolutionary-Approach-Customer/dp/0688123163)

    - 《紫牛》，作者：赛斯·高汀，[`https://www.amazon.com/Purple-Cow-Transform-Business-Remarkable/dp/014101640X`](https://www.amazon.com/Purple-Cow-Transform-Business-Remarkable/dp/014101640X)

    - 《数字化生存》，作者：尼古拉·尼葛洛庞帝，[`https://www.amazon.com/Being-Digital-Nicholas-Negroponte/dp/0679762906`](https://www.amazon.com/Being-Digital-Nicholas-Negroponte/dp/0679762906)


    # 10. 销售的艺术


    罗斯·佩罗本该来写这一章。但他一直忙于打造两家托管服务提供商，这两家公司总共以超过 100 亿美元的价格售出——并且大胆地竞选美国总统。因此，他无法发表评论。不过，他的故事是关于销售托管服务的绝佳例子，也说明了在销售任何东西（包括像托管服务这样容易讨论的东西）时，是多么容易迷失方向。


    1962 年，罗斯·佩罗还是`IBM`的一名顶级销售员，当时他离开公司创立了电子数据系统公司（`EDS`）。他的销售背景使他能够将公司打造成一个价值`24`亿美元的庞然大物，并于
    1984 年将其出售。后来，他成为了`NeXT`的天使投资人，并于 1989 年创立了`佩罗系统公司`，该公司后来以`39`亿美元的价格卖给了`戴尔`公司。就本章而言，他故事的重要方面在于佩罗是一名销售人员。他知道如何建立销售组织，但并不精通技术。


    许多苹果咨询公司是由技术人员创立的。对于极度技术化的企业主来说，销售是必要的恶魔。而对于精通商业的人来说，销售是任何组织成功所需的基础。在本章中，我们将研究如何建立销售组织，因为这是当今苹果服务提供商需要弥补的最大差距之一。而这一切都始于选择一种适合你组织的方法。


    ## 选择销售方法论


    销售是公司呼吸的空气。没有足够的销售会阻碍增长，并可能过早地终结组织的生命。许多企业家在销售方面足够优秀，能够支撑到需要扩大规模的时候。这是因为存在合法的权威。但接下来呢？对于这个问题的正确答案可能和有效建立销售团队的组织一样多，并且所有这些答案都是正确的。但每个销售组织在某个阶段都需要的一样东西是，一个最能代表其产品、价值观、市场和目标的销售方法论。尽早选择一个，意味着你无需重新训练缺乏纪律的销售人员如何代表你的公司。

    '
- fmt: '### Why Sales Methodologies


    Companies need to be efficient, creative, and unique to capture new customers.
    You also need a good product to get brand recognition and build customer loyalty.
    But if no one uses a product or service in the first place, you never get the
    chance to build that loyalty and hopefully that magical word of mouth that comes
    with happy customers. Most of the businesses I talk to do engage in passive marketing
    and word of mouth as their only sales tools. So the ability to close every incoming
    sale is paramount. Scratch that, the ability to close every qualified lead is
    critical.


    Many argue that how you close sales deals has one of the greatest impacts on increasing
    sales and promoting your business. Closing small sales deals is easier and takes
    less planning, and larger deals require more effort and thoughtful planning. Closing
    opportunities that are inappropriate for your business will eat up time dealing
    with dissatisfied customers, while netting you some pretty harsh criticism that
    might make future work with anyone hearing that criticism difficult. But the sales
    process is when you set the tone that denotes what a successful engagement with
    a customer looks like.


    A common pain point for a growing business is building a scalable sales model.
    Most businesses start with a business owner selling themselves and their product.
    People who believe deeply in what they do can often sell a product, if only because
    their blood, sweat, and tears is intoxicating to customers. But what happens when
    that next seller comes into the organization—and then another, and then another?
    The typical next steps are to try to train other people to sell exactly like you
    did, to arm them with the same words and tag lines you use. And when that works,
    wonderful! But it won’t always work. Building a sales team is about direct relationships
    between customers and new sellers. And to arm your new team, you can leverage
    the decades of sales dogma available by leveraging a methodology and the processes
    around it that already exist, rather than rewriting the book.


    Every business looks to achieve success. If you have a flush sales pipeline and
    can actually close deals, you are off to a great start. Finding the right combination
    of sales methodology for your customers, your product, and your philosophies helps
    you save time and get your new sales staff on a path that enables you and subsequent
    sales management to report on your sales pipeline, as well as enter a sales conversation
    at any point and provide helpful guidance to a new generation of sales staff.


    ### Choosing a Methodology


    What are some of the top sales methodologies in use? The one you select should
    match with the personality of both your sellers and your customers. If you haven’t
    hired anyone in sales yet, then focus on you as the seller and the customers.
    Using a canned methodology will help you while you’re starting the process. And
    be open to learning new tactics, no matter how successful you might have been
    up to this point.


    In the following few sections, we’ll provide a brief description of many of the
    most common sales methodologies in use today. We’ll also include a link to a book
    or two for each in the Further Reading section of this chapter.


    #### Target Account Selling


    Used for over 25 years, Target Account Selling is a standard in the sales world,
    with over 650,0000 sellers trained to convert smaller customers (or smaller groups
    within larger environments) into bigger and more permanent customers. Target Account
    Selling breaks larger deals down into smaller components. Using a strategic plan
    throughout the life of the sales cycle, Target Account Selling de-emphasizes politics
    of an account.


    Target Account Selling is popular due to the ability to automate the whole sales
    process via Salesforce, making it easier and simpler to integrate with existing
    workflows. The cost of training the staff for target account selling is high,
    but most experienced people you hire will already understand this methodology.


    #### SPIN Selling


    When Neil Rackham wrote the book "SPIN Selling" in 1989, I doubt he knew that
    it would still be in use decades later. The name "SPIN Selling" always makes me
    think of Leonardo getting on the phone to sell some junk stocks. The name just
    feels like the reason a lot of sellers get a bad rap. But that doesn''t mean it
    has to be a bad methodology (if I thought it were I certainly wouldn''t have put
    it in this list).


    SPIN stands for `Situation`, `Problem`, `Implication`, and `Need-Payoff`. You
    ask questions to understand the buyer''s situation, issues, consequences, and
    situation, respectively. SPIN Selling requires pretty good communication skills
    and can seem more like a communication technique than a sales methodology at times.
    SPIN Selling has proven to be a great technique to attract more customers in as
    easily prescriptive a way as possible. In this methodology, the salesperson is
    trained to ask questions based on a customer''s choices and preferences, which
    expose the needs of their organization. This theoretically establishes trust and
    helps you align your solutions with the services and product you provide.


    There are no concrete steps in this methodology to unravel the needs and demands
    of the customer, but it surely helps in maintaining strong customer and sales
    representative bond. This is very much a classic sales methodology and best used
    with smaller, more transactional sales that don''t have a bunch of stakeholders
    involved in the buying process.


    #### SNAP Selling


    I figured I''d put the two acronym names side-by-side. "SNAP Selling," from Jill
    Konrath in 2012 makes a huge, huge assumption: that everyone is as busy and "frazzled"
    as the author. The goal is to speed up the sales process by being `Simple`, `iNvaluable`,
    `Aligned` with the needs of the customer, and a `Priority`. Part of the focus
    is about getting "in the head" of your customers. It''s a good, easy read. Whether
    I''d implement it as a methodology for a whole company would likely depend on
    the types of sales I''m making. For example, the `P` is for `Priority`. If you''re
    selling something that isn''t a priority, can you make it one? If not, move on.
    I don''t think that works for large-scale insourcing options that involve very
    complex deals. Because really, then you''d just be left with `SNA`.


    Always looking to be relevant is a challenge. But, to me the most important part
    of this book is the value chain that it demonstrates, not the methodology. Everyone
    in sales should read it, even if the sales department doesn''t leverage it as
    a methodology.'
