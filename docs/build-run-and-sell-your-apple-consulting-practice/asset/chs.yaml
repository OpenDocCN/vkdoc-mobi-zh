  \ Business），克林特·亚瑟：[`www.amazon.com/Accounting-Bookkeeping-Freedom-Women-Entrepreneurial-ebook/dp/B00BMWE4J8`](https://www.amazon.com/Accounting-Bookkeeping-Freedom-Women-Entrepreneurial-ebook/dp/B00BMWE4J8)\n\
