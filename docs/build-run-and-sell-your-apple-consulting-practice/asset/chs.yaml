- "# 14. 兼职所有者\n\n也许你创办了第二家公司。也许有别人在经营你的生意。也许你能够达到不再需要工作的状态。也许你想早上锻炼两个小时，中午享用一顿丰盛的午餐，溜达到办公室待上两个小时，然后和朋友一起出去玩。或者也许你有另一份工作，只需要这家公司不费力地顺带运营就行。\n\
  \n无论你处于何种状态，你为此付出了辛勤努力，你不应该感到内疚。因此，只要你的业务状况良好（这里“良好”是主观的），你不必害怕花点时间去探索其他冒险。当然，前提是任何依赖你的人都得到了妥善照顾。在本章中，我们将探讨一些抽身而退，同时仍能维持运营并让大家满意的方法。\n\
  \n\n\n## 兼职工作\n\n如果你尚未发展到一个人能独自承担全部事务的程度，那么从事咨询工作并不是在经营一家兼职公司，而只是一份副业。你是在暗中兼职，参与零工经济，并可以这种方式运营。尤其是当这正合你心意时，这完全没问题。这是你自己的事业，你理应允许自己以任何你想要的方式经营它。\n\
  \n如果你怀有志向，希望发展壮大到可以全职从事咨询工作，那么你应该制定一个计划来实现它。但如果你对拥有一份副业感到十分满足，那么完全没必要再进一步。\n\n这意味着你应该保持简单。不要雇佣员工，不要签订长期合同义务，最重要的是，要乐在其中。你随时可以决定日后发展公司。如果遇到一个能接下一家大客户、让公司一夜成功的机会，你可以重新评估自己人生的位置，以及是否想要尝试成为一名全职顾问。\n\
  \n我发现许多工作与咨询能很好地结合。我认识一些软件开发人员，他们也会在业余时间为客户编写应用或网站。我也认识一些人，他们偶尔会因为兼职工作有截止日期，导致在白天已有工作的基础上加班加点而对此感到厌烦。我还认识一些喜欢在下班后做咨询的老师。尽管按理说不太允许，但我认识不少在苹果零售店工作的人，他们还会偶尔为个人或小型办公室的客户提供服务。简而言之，这些都是传统的暗中兼职工作。\n\
  \n我还认识一些人，他们同时做着几份不同的兼职工作。有优步和来福车的司机，同时帮别人处理 Mac 电脑的问题；有律师，一边创业一边编写软件；有演员和音乐家，顺便教别人如何使用库乐队（这是他们在第三份工作——播客——中学到的）；有每周照顾孩子几天并为客户编写小程序的人（他们编写程序是为了追踪自己在基督教青年会教授游泳课的情况）。像克雷格列表和\
  \ oDesk 这样的网站开辟了许多可能性，这些人中的许多都喜欢那种随时可以休假的灵活性。\n\n不过，有些事情需要小心。不要让自己负担过重。很容易接手过多工作，在同时做几份工作的过程中感到筋疲力尽。当你这样做时，很容易让每份工作的质量下滑，并断绝后路。这也违背了应该始终乐在其中的黄金法则。\n\
  \n有助于避免过度承诺的一件事是坚持在自己擅长的技能范围内。当你了解如何完成任务时，估算工作量就很容易。对于你不懂的事情，可以找一些推荐合作伙伴。这些人拥有与你互补但未必重叠的技能。例如，如果你被要求剪辑家庭电影，但不懂\
  \ Final Cut 或 iMovie，那么手机里应该存有可以转交这类工作的人。你应该拓展自己的技能以避免单调乏味的生活，但要尽可能以深思熟虑的方式进行。\n\
  \n## 设定预期\n\n你是会在周二和周四来上班，还是只做半天？当你在做其他事情时，客户或你的团队如何联系到你？尤其在初期，制定一个沟通计划并设定客户和员工可以期待的预期至关重要。\n\
  \n另一个避免过度承诺的好方法是设定固定的时间段来处理每种类型的业务。例如，周二和周四专注于你的苹果客户，一周的其他日子则用于你的其他业务。或者每晚 8 点到\
  \ 10 点为客户编写代码。这样你就能轻松地告知他们可以期待什么以及何时。\n\n当你承接项目时，要告知客户何时能收到必要的交付成果。按小时计费的咨询很容易，因为你通常到场，做些事情，然后离开。如果你在家或咖啡店为客户处理项目，务必尽早并经常沟通交付物可能会延迟的情况。\n\
  \n## 委派负责人\n\n某天你可能会发现工作太多。你可能还想创办其他公司。这时候，就该让其他人来管理公司的部分（甚至全部）业务了。这很微妙，因为在许多情况下，公司长期以来就像是你的孩子。但如果你处理得当，你的体验会比因为愧疚未能亲力亲为而试图微观管理一切要好得多。\n\
  \n### 寻找公司管理者\n\n你决定将你的“孩子”交到别人手中。如何找到合适的人？这大概是你做过的最困难的一件事。甚至比招聘第一个人还要难。我们常常寻找像我们自己一样的人。但这很可能不会发生；毕竟，如果他们和你一样，他们就会是强劲的竞争对手。不妨想想你希望让谁来负责。然后面试以下几类候选人中的几位：\n\
  \n*   **内部候选人**：很可能是最有可能的人选，如果你公司里有长期参与、对公司各个方面都了如指掌的人，这通常是最好的选择。通常，内部候选人已经观察你很久，理解你至今所做决策的原因。他们是维持现状的绝佳人选。但有一件你非常希望从他们口中听到的事是，他们渴望以你需要他们成长来领导公司的方式实现职业成长，尤其是在商业敏锐度方面。\n\
  \n*   **商业大师**：通常来自大公司的运营岗位，商业大师往往专注于效率——从员工身上榨取更多价值。如果你考虑这类人，务必确保他们考虑到员工的感受、客户对注重利润率会作何反应等。并且确保他们仍然关注销售，而不仅仅是在现有客户中拓展业务。\n\
  \n*   **销售大师**：大多数有销售背景的人最关心的是带来收入，无论后果如何。好处在于，作为老板兼经营者，许多工程师没有销售背景。问题可能在于，过于专注销售的人往往不关心利润率。这可能导致公司亏损经营，即使开出的账单比以往任何时候都多。当你让销售背景的人来管理公司时，务必教他们那些会负面影响利润率的复杂方面，并明确告知你期望公司维持的利润率水平。\n\
  \n*   **领域专家**：可能是另一位顾问、来自大公司的人，或者该领域的专家。领域专家可能需要学习市场营销、公共关系、人力资源等方面的知识。他们会在员工中立即建立威信，并能在技术层面接手管理；然而，我强烈建议每周与他们开两次会，提供经营公司所必需的商业和销售指导。\n\
  \n\n\n#### 学会放手\n\n当你任命他人来管理公司的部分业务时，最重要的是设定期望和界限。期望是指你希望看到公司产出什么样的成果。以下是一些可供参考的期望设定：\n\
  \n-   设定销售目标：这是离职老板们最常关注的指标：客户付给你多少钱？然而，这并非唯一重要的事情，我们接下来会探讨。\n-   定义业务应维持的利润率：这是一个通过简单百分比来评估收入和支出的方法。只需确保你明确了各自的构成（例如，应计收入与已赚收入、销售成本、通用会计准则等）。\n\
  -   设定新客户总数目标：如果组织开始专注于在现有客户中进行交叉销售，那么账面数字很容易显得健康，却无需考虑未来的客户群。\n-   定义应重点关注的工单类型或分类：带来正确类型的收入与带来收入本身同样重要。例如，一家托管服务提供商应该争取托管服务的客户，而不是项目型工作。一笔意外之财式的项目现金固然不错，但长此以往，每月的经常性收入会变得捉襟见肘！\n\
  \n从每周或每月的计划开始。定期与新任的组织负责人一起审查新销售额、应收账款、应计项目和应付账款。一旦你感到放心，就可以减少会面频率。但在初期，要保持参与，同时不要让你的接班人感到压抑。当然，除非业务上出现了问题。\n\
  \n#### 当事情偏离计划时\n\n有时事情并不完全按计划进行。销售额可能开始下滑，成本可能开始上升，员工或客户的留任率可能开始下降。不要让任何细节被忽视，尤其是在你把心血之作交给别人的初期阶段。当事情偏离计划时，最重要的是你在分析事态时要表现出纪律性。这传达出一个信号：你会在处理任何企业中都会遇到的挑战时保持公正。\n\
  \n#### 不要抱怨\n\n经商很有趣。我们制定与组织目标相符的战略，然后实施让我们走向成功的战术。经过耐心和努力，当一切进展顺利时，我们凯旋般地目睹自己的努力结出硕果。然后我们进行调整，再次重复整个过程。\n\
  \n有时事情并不顺利。也许是战略错了，或者战术没有得到正确执行。也许我们在关键岗位上用错了人。也许我们取得了成功，但我们所认为的成功与组织实际期望我们做的事并不一致。也许的确一致，但组织正在变化（而所有组织都在不断变化）。无论哪种情况，事情最终都会改变。而我们应对变化的方式，会影响周围人对我们的看法，也会影响团队从工作中获得的满足感。\n\
  \n如今，很多人遇到组织变化时，自然而然会向同事抱怨。但尽管抱怨能让人宣泄情绪，它却会让你给人留下厌恶变化或缺乏灵活性的印象。抱怨会感染你的团队。抱怨会让你看起来无法适应新方式。简而言之，抱怨变化会损害你的职业生涯。但你需要做点什么，对吧？抱怨变化确实能宣泄情绪。但不要这样做。相反，让我们看看你应该做的几件事。\n\
  \n-   **庆祝成功**：当你知道自己以前没有做错什么时，就更容易应对变化。庆祝过去的成就是很重要的。这样每个人都知道他们的努力得到了组织的认可。这可以以一种积极的方式为旧模式画上句号，并让大家为未来做好准备。\n\
  -   **制定新战略**：根据关于组织希望你走向何方的信息，分析你当前所在位置与未来目标之间的差距——以及如何抵达目的地。没必要在真空中行事。相反，要与你的同事和团队合作，制定一个大家都能认同的新战略。毕竟，如果你的团队在你要他们执行的战略上没有发言权，他们就不可能完全投入。\n\
  -   **保持透明**：透明不仅能让你的团队掌握关于你为何实施新战略的所有必要信息，还能防止员工对他们在你正在构建的新框架中的位置感到担忧。\n-   **设计战术**：你有了战略，现在需要一个实施战略的计划。你选择的战术需要得到组织各级的认同。这些战术应包含任何流程变更以及对新战术的（输入和输出）期望。\n\
  -   **沟通，沟通，再沟通！**：一旦你制定了战略以及实施方法，就要将变化告知所有人。这包括你的团队，也包括你的上级（因为他们需要批准战略和战术）和你的平级同事（因为你很可能会影响到他们）。\n\
  \n一旦你花时间制定了新战略，就停下来，欣赏已完成的工作。公开感谢那些帮助过你的人。想想你本可能用来抱怨变化的时间，如果你在那段时间里，一直在收集关于别人期望你做什么以及你如何能交付的反馈，你本可以取得多大的成就。你会很快发现，你本可以高效利用那些本可能在茶水间对听众抱怨、让自己显得糟糕的时间。\n\
  \n抱怨实际上对事情没有任何帮助。不过，我们都曾抱怨过。它可以帮助我们应对变化。有时你确实需要这样做——尤其是当你觉得自己的时间被浪费时。但要尽量减少抱怨，并注意你向谁抱怨，尤其是当你处于管理岗位时。这样你就能重新高效工作。一旦你制定出一个比旧战略更受组织认可的新战略，你很可能会发现自己的处境比原来更好！\n\
  \n与其抱怨，我们不如从一种常见的分析技巧开始，来找到办公室问题的根源：5 Whys 分析法。\n\n\n\n##### 5 个为什么\n\n5 个为什么技巧用于寻找问题的根本原因。这个问题可能是软件缺陷（编写软件时）或业务流程中的失败。基本上，就是问为什么会发生某件事。然后，利用答案再次提问，并重复这个过程几次。通常，你会在\
  \ 5 次追问内找到根本原因分析。对于更复杂的问题，可能需要 7 次。\n\n根本原因分析的目标是深入问题的核心。以应收账款为例。让我们提出一系列问题：\n\n\
  1.  为什么公司处于负现金流状态？\n    1.  因为应收账款过高（超过`$1,000,000`）。\n2.  为什么公司历史上首次应收账款超过`$1,000,000`？\n\
  \    1.  因为公司有许多客户正在对账单提出争议。\n3.  为什么客户会对账单提出争议？\n    1.  因为解决一个客户声称不应该需要多次上门的单一问题，却花费了多次行程。\n\
  4.  为什么质量在下降（或至少为什么大家感觉如此）？\n    1.  我们招了一批新员工，以替代离职的人员。\n5.  为什么我们最近经历了高流动率？\n\
  \    1.  因为老板不常在，员工薪酬不足，或者他们都找到了更好的工作。\n\n看，这是我的错！或者，要么是我们没有让团队保持投入，没有为他们提供足够的报酬，要么是我们所处地区的行业发生了转变。每个人的结果都会不同，但请注意，我们这里从现金流问题追溯到了人员流动问题，这是一个常见的关联。在这种情况下，应立即解决客户的质量问题，并且我们应该采取措施来提高员工留存率。\n\
  \n##### SWOT 分析\n\n我们将要讨论的第一种分析问题的方法是 SWOT。SWOT 代表优势、劣势、机会和威胁。SWOT 在主动使用时效果最佳，但我们也可以用它来进行反应性分析。我们可以利用\
  \ SWOT 来审视风险，然后将这些风险与出错的原因联系起来。\n\n首先，我们来定义 SWOT 的组成部分。\n\n*   **优势**是让你相较于其他组织（很可能是你当地的竞争对手）具备优势的属性。\n\
  *   **劣势**是让你处于不利地位的属性。\n*   **机会**是基于你的优势可以加以利用的领域。\n*   **威胁**是你的竞争对手基于你的劣势可以加以利用的领域。\n\
  \n首先，确定分析的目标是什么。可以将其视为标题，并尽量简洁地概括。然后绘制一个网格，在每个框内标上要素之一：优势、劣势、机会和威胁。接着填充这些框。根据我的经验，一旦你完成这个练习，很多事情就会变得清晰；如果没有，也很容易向他人征求关于哪些内容应该放在哪里的反馈！\n\
  \n还有很多其他方法可以用来审视你将要做什么、已经做了什么，并分析结果或计划的结果。其中最重要的是，要采用结构化的方式对业务进行批判性思考。我喜欢与我所在团队的成员一起独立地完成这些工作。这不仅能让我得到自己的分析，还能了解其他人是如何思考相同问题的。\n\
  \n一旦你回顾了问题出在哪里，就该提出如何纠正这种情况的假设了。这个假设会导向一个可行的解决方案。SWOT 可以帮助你根据实施解决方案可能产生的结果来规划应对措施。这里的主要目标是提供有意义的回应，而不是仅仅填满空白。\n\
  \n## 结论\n\n你总能找到人来经营你的公司。但当你找到他们后，你可能又不希望他们来经营，因为你可能会怀念掌控一切的感觉。而且，没有人能做得像你一样好。永远不要公开指责你安排来运营组织的人。私下里，可以提供反馈。\n\
  \n尽管并不容易，但从经营企业转变为监督企业，可能是你职业生涯中最有收获的探索之一。你可以自由地做各种各样的事情，比如终于可以去度假，或者创办另一家公司。只需记住，成为兼职所有者通常会导致组织的销售和业绩下降。而长期影响往往是企业无法永续经营，所以一定要善待那些留下的人，奖励增长，维持公司运营，以便你能最好地照顾那些选择与你共度时光的每一个人。\n\
  \n## 延伸阅读\n\n*   《变革之心》（The Heart of Change），约翰·P·科特 [`https://www.amazon.com/Heart-Change-Real-Life-Stories-Organizations/dp/1422187330`](https://www.amazon.com/Heart-Change-Real-Life-Stories-Organizations/dp/1422187330)\n\
  *   《引领工作：驾驭超越雇佣的世界》（Lead the Work: Navigating a World Beyond Employment），约翰·W·布德罗、拉文·杰苏萨森、大卫·克里尔曼\
  \ [`https://www.amazon.com/Lead-Work-Navigating-Beyond-Employment/dp/1119040043`](https://www.amazon.com/Lead-Work-Navigating-Beyond-Employment/dp/1119040043)\n\
  *   《激发退休灵感》（Retire Inspired），克里斯·霍根 [`https://www.amazon.com/Retire-Inspired-Its-Financial-Number/dp/1937077810`](https://www.amazon.com/Retire-Inspired-Its-Financial-Number/dp/1937077810)\n\
  *   《不要退休，重新布线》（Don’t Retire, Rewire），杰瑞·塞德拉、里克·迈纳斯 [`https://www.amazon.com/Dont-Retire-Rewire-Jeri-Sedlar/dp/1592576893`](https://www.amazon.com/Dont-Retire-Rewire-Jeri-Sedlar/dp/1592576893)\n\
