  \n当您准备为团队提供完成工作并让您在未来保持竞争力所需的培训时，他们可以获得几乎无穷无尽的信息。虽然您可以教导团队，但当他们不在您面前，没有被强行灌输内容时，您无法强迫他们学习，也无法激励他们继续学习。在下一节中，我们将尝试探讨如何激发灵感。\n\
  \n\n\n## 激励员工学习\n\n有一番对话我曾反复经历。对方总会先向我表示，他们想要更多培训。由于教育是我最看重的事物之一，只要条件允许，我的回应总是斩钉截铁的\"\
  当然可以\"。但接下来几乎总会发生一件有趣的事：毫无动静。除非你定期跟进、有时甚至要微观管理整个过程，否则批准员工参加培训通常不代表他们真的会去做。\n\n另一种常见的结果是，团队成员逐渐对工作产生越来越多的不满。为什么会这样？我们又该如何解决？答案并非只有一个。针对不同原因，我们需要采取相应的对策，才能让员工保持愉快和积极。下面我们来探讨几种情况。\n\
  \n- **员工不知道自己想要哪种培训。** 这通常只是第一步。但解决方法可以很简单，比如告诉对方：\"告诉我三四个你今年想做的事\"，或者制定个人学习计划（或围绕学习计划建立正式制度）。这里，最关键的是你培训的目标是什么。对于刚担任当前职位的新人，通常要提供能让他们全面胜任现职的培训，从而增强其岗位自信。而对于已在某职位上工作较久的员工，则需要探索他们下一个想晋升的职位，并设法弥补技能差距以实现目标。\n\
  \n- **员工的目标与团队目标不匹配。** 我们常常在制定培训计划时，不考虑人们实际想从计划中获得什么。要主动询问员工希望向哪个方向培训，而不是臆测他们的意愿。通过调查和经理一对一反馈，准确了解你的团队希望从计划中获得什么，而不是未经充分调研就擅自指定方向。\n\
  \n- **员工想学习但没时间。** 这或许是我最喜欢解决的问题。你可以每周划定固定时间用于培训。难点在于必须为这段时间设置防火墙，让员工在培训期间不会被抽走去完成组织的其他任务；即便被抽走，你也要确保这段学习时间得到保障。\n\
  \n- **没有培训预算。** 并非所有培训都要为每个员工每周花费 5000 美元。只要有足够人数，通常可以获得定制课程（甚至包括供应商主导的认证课程），费用可能只是零头。此外，播客、书籍、互联网以及几乎无限量的免费培训资源也触手可及。我用过的一个技巧是：报销所有认证教材和考试费用，允许员工利用业余时间自主学习。如果有官方课程，务必让员工毫无顾虑地报名参加。这类材料通常由组织内部编写，对团队零成本，还能帮助团队紧跟组织在特定主题上的立场或理念。\n\
  \n- **员工不适应我们使用的教学方式。** 有些人无法在课堂环境中学习，有些人无法自主学习，还有些人需要以练习或目标为导向的培训（例如编写能完成特定任务的程序）。务必密切关注学员的反馈，保持灵活性，允许员工以他们需要的方式学习，而非仅按你自认为他们想要的方式教学。\n\
  \n最后，人们不参加培训的一个原因是：他们真心觉得自己不需要任何培训。也许他们刚组建家庭，或家人患病需要照顾，又或者只是希望每天下班后骑车放松。并非人人都想一路攀升到组织最高层或跳槽到下一份工作。许多人更希望在自己现有岗位上安稳立足。但作为领导者，我们有责任避免员工的技能过时，因此必须持续为员工提供所需的一切资源，帮助他们今年、明年乃至更长远的时间里，在岗位上做到最好。\n\
  \n不过，有时 100 分其实已经足够。我们可能会过度强调推动员工晋升下一岗位的必要性。推动，但别推得太猛。管理者需要投入更多时间，深入探究如何帮助团队中的每个成员，但这完全值得。\n\
  \n\n\n## 学会领导\n\n我在职业生涯中与许多新任管理者共事并培训过他们，发现他们常会陷入一些误区。成为优秀管理者需要时间，只要新任管理者积极学习如何管理和领导团队，人人都能胜任。本着这一精神，以下是一些值得关注的事项，或可作为新任管理者的行动指南。\n\
  \n- **避免微观管理**：这很可能是管理者最经典的错误。员工需要得到指导，然后被允许掌控自己的成功与失败。通过交付流程责任而非具体任务，来释放宝贵的精力。简而言之：学会授权。\n\
  \n- **减少个人贡献时间**：新任管理者往往因曾是杰出的个人贡献者而获得晋升。然而，转入管理岗位后，应将重心放在放大他人的能力上。\n\n- **认可他人的贡献**：从个人贡献者晋升的管理者，常会以自身过往绩效作为标准来评判他人。若团队表现达到同等水平，他们本也能获得晋升。公开认可贡献，即使你认为这“只是分内之事”。\n\
  \n- **推广创意**：只要给予机会，你的团队很可能会提出比你优秀得多的想法。新任管理者需要与员工紧密合作，让他们的创意蓬勃发展。当员工感到自己有所贡献时，他们的投入度将显著提升！\n\
  \n- **积极回应批评**：新任管理者毕竟是……新上任的。没人期望谁完美无缺。但人人都期望我们能以积极主动且深思熟虑的态度回应批评。我喜欢发邮件感谢他人，因为他们帮助我成长、让我变得更好。即便批评稍显负面，也要用善意“杀死”他们！\n\
  \n- **公平分享收益**：如果你的团队或部门以牺牲其他团队为代价获得更多预算、曝光度或人员编制，那么在政治层面你将面临长期挑战。务必确保以有利于所有团队的方式分享收益。矛盾虽会浮现，但可通过分享改进成果来化解。\n\
  \n- **不要操纵他人**：你几乎可以操纵任何人替你做事，尤其是在刚晋升管理层时。但赢得人心才是上策。这样做更为正当，也不会让员工因感觉被操纵去做自己不信服的事而心生怨恨。\n\
  \n- **既要横向管理，也要向上管理**：新任管理者往往从个人贡献者中脱颖而出，常戴着“眼罩”，只关注旧团队或一线问题。然而，“向上管理”同样重要——通过此举证明组织获得了稳健的投资回报率（ROI）。这还能帮你定期确认优先级是否发生偏移。\n\
  \n- **减少反馈？不**：你的目标是让团队发挥最大潜能。这意味着要帮助他们精进技能、找到未来能替代你的人选，并培养接班人。任何人都能歌功颂德；真正的挑战在于利用反馈为团队打磨抛光。\n\
  \n- **为团队留出时间**：还记得那些你不得不取消的一对一会议吗？别再取消了。若有冲突，调整其中一方的时间。向团队表明他们对你有多重要。如果他们推掉你的会议，你要坚持重新安排。你的首要任务是发展团队成员的职业生涯，他们需要明白这一点。\n\
  \n- **设定目标**：当你定期与团队开会时（你确实这么做吧？），应该回顾他们达成目标的进展。当员工达成目标后，再设定新的挑战目标。不必施加不必要的压力，但若丝毫不加推动，团队可能会开始感到停滞不前。\n\
  \n- **了解团队的工作**：有时，新任管理者并不真正了解团队的具体工作内容。这种情况下，请花时间学习。你不必精通别人写的每一行代码的调试方法，也不必成为钣金零件加工的专家，但我发现，理解员工所做的事情有助于与他们产生共情。\n\
  \n这些建议并非全都关乎纯粹的管理。许多内容也涉及如何领导团队。新任管理者可能在这些方面遇到困难，而资深管理者也总有改进空间。简而言之：关注并激励你的员工，同时别忘了在必要时向上管理！\n\
  \n\n\n### 软技能\n\n软技能包括沟通、社交礼仪、语言、习惯、人员管理、领导力、你对环境的反应方式，以及与职位核心无关、但体现人际关系的所有其他工作要素。我曾听过人们这样定义软技能：与他人协作的能力、你的行为举止，以及你如何展现外向特质（没错，我把“外向”当动词用了——虽然我本可以说“合群”）。\n\
  \n我常听人说，他们招聘时看重软技能，因为专业技能可以培养，但软技能不行。从事招聘和人员指导工作二十年后，我发现自己强烈反对这种观点。有些人并不想学习社交礼仪，而有些人（尤其是特别聪明的人）往往缺乏耐心。但只要对方愿意接受，你完全可以训练他们如何与他人良好合作。问问齐格·齐格勒（Zig\
  \ Ziglar）就知道了，这位顶尖销售大师兼著名励志演说家正是以此为业。\n\n如何帮助人们培养这些软技能？首先要有所察觉。将人们置于能够以更有意义的方式与他人协作的环境中。进行情商培训。了解他们所处的阶段。要用心。去尝试。这些内容很多，基本概括了许多人采取的总体策略。我倾向于将策略分解为可执行的具体步骤。那么，让我们看看哪些软技能可以培养，以及如何着手培养。\n\
  \n- **公开演讲：** 像国际演讲会（Toastmasters）这样的组织致力于帮助人们提升公开演讲能力。但根据我的经验，关键在于走出去并付诸实践。大多数技能都依赖于重复练习。对于公开演讲，让他人录制并观看自己的演讲也很有价值。这样做有助于减少你在演讲时分散信息传达（例如手势过多、手在口袋里进进出出、前后摇晃、节奏把控不当，当然还有不用“呃”这类口头禅）的各种小动作。\n\
  - **引人入胜：** 在许多领域，能否掌控全场氛围至关重要。这包括语音语调的变化、真诚的态度、独特的视角、认真倾听、紧扣主题交流、保持积极（同时不失真实）等等。培养这项能力的最佳方式就是在社交场合多加留意。特别注意观察讨论时对方是否眼神涣散，解读其他神经语言程序学线索，选择强调重点，以及真正做到对他人的发言感兴趣而非只等待自己开口的机会，这些都是增强吸引力的好方法。关键是要与人相处、交谈、学习并保持专注。事后讨论哪些做得好、哪些需要改进也很有帮助。\n\
  - **写作能力：** 大多数软技能需要当面练习。但训练写作能力时，仅使用修订和批注功能同样具有教育意义。我从自己书籍的编辑那里学到了很多。例如，更简洁达意的战略性技巧，在项目符号列表中统一标点符号的战术性细节，以及减少动名词使用等精炼技巧。写作是一项能让员工终身受益的技能。正如你从接受建设性批评中学到的耐心一样。\n\
  - **与同事协作：** 这与“引人入胜”类似，但更侧重于团队动态。过于活跃则吸收不足，参与不够则贡献有限。结构化的协作方法能有所帮助，但尤其对工程师而言，它可能沦为浪费时间的手段。一个挑战是不要被教条拖累；另一个挑战是激发会议室里安静者的灵感。我曾录下会议并回放。通常你甚至无需指出更好的处理方式，因为人们能自行发现，所以如果你想以此方式训练协作能力（或事后不带录音地讨论会议），只需就相关情境提问，让受指导者自己寻找答案即可。\n\
  - **解决问题：** 与大多数软技能一样，训练人们更好地解决问题，需要让他们解决各种问题，并就思考问题的其他创造性方式提供建设性指导。例如，在这方面，我成功运用过的一个技巧是：当某人处理问题时，指出他正在采用的策略类型（如抽象、简化、横向思维、根本原因分析、类比、试错），并说明其他策略如何能更快或更准确地得出结果。\n\
  - **故障排查：** 我将它与解决问题并列，因为故障排查通常是特定于你所在行业的解决问题方式。根据行业不同，还有许多问题解决方法论（例如 `GROW`、`OODA`、`PDCA`、`RPR\
  \ 问题诊断`和 `A3`），这些方法有助于让员工在方法上保持同步。将特定于你组织或产品的技术或后勤要素整合到方法论中，你就拥有了教授扎实故障排查技能的可靠方案。但请记住，精通业务或产品是获得扎实故障排查技能的关键。了解某个主题的细节有助于缩小问题搜索范围。\n\
  - **根本原因分析：** 我将其与解决问题分开，是因为你可以在不了解原因的情况下解决问题。根本原因分析是一种解决问题的方法，但它不仅着眼于解决问题，更在于解决问题的根源。我教授根因分析技能最喜爱的策略是进行“5\
  \ 个为什么”练习。如果你不断追问问题发生的原因，直到第五个“为什么”，那么你不仅能解决特定问题事件，还能触及问题的根源。还有其他工具，但在许多情况下，“5 个为什么”练习能让人们掌握结构化的解决问题方法，同时消除问题的根本原因。\n\
  - **岗位领导力：** 管理不等于领导力。领导力包括倾听、综合、制定战略或愿景。领导力需要理解什么能激励他人，并利用这些激励因素来构建支持。要制定战略，领导者需要了解产品或组织。然后，领导者需要展现出倾听他人意见并将其想法纳入讨论的能力。教授领导力需要运用其他软技能来帮助人们施加影响力，但同时也需要明白，你不仅仅是在建立支持，更希望能让事情变得更好。当某人展现出天生的领导技能时，引导其远离操纵也至关重要。否则，员工会目睹他们的领导力随时间逐渐丧失。\n\
  \n\n\n\n## 软技能培养指南\n\n### 人员管理\n\n管理不同于领导力，因为它通常更具战术性。管理还涉及让员工变得更好。关于组织希望管理者如何表现自己并推动变革，有许多不同的策略。因此，选择一种管理风格并让管理者或潜在管理者学习这种风格总是有帮助的。这往往会随着组织的变化而改变。重要的是要考虑管理者的自然管理风格，并使用更结构化的方法来帮助填补空白。这能让管理者更加真实。\n\
  \n### 应对压力\n\n我曾经有一名员工，因为他对我分配给他的一个项目过于担忧而不得不住院。从那以后，我把应对压力视为一项更重要的技能来教授。这很大程度上与增强一个人的自信心有关。如果你知道自己能够摆脱任何困境，那么你就更有可能在压力较小的状态下处理问题。此外，要确保员工知道他们身后有良好的资源支持体系，以及如何使用这个体系。我还进行过专门的角色扮演，在压力下识别问题。你经历的高压情况越多，处理它们的能力就越强。最后，指导员工使用一些具体的话术也会有所帮助。例如，当程序员试图修复一行代码时，有人不停地提问。这会让情况变得更糟，因此有一个既礼貌又能让对方停止提问的简单话术，可以很好地改善局面。如果处理得当（对某些人来说可能需要重复练习），还能与制造压力的人建立更好的关系。我还想指出，当冲突或压力升级时，在每一次后续互动中，员工都有能力缓和冲突。\n\
  \n### 创造性思维\n\n创造性思维是任何员工都重要的软技能。培养员工的创造性思维始于赋予员工这样做的权力。我也喜欢为此设定合适的范围。例如，如果你遵循工作说明书，在没有变更指令的情况下不要超出其范围。为了教会员工创造性思维，有许多批判性和创造性思维工具。我喜欢游戏。游戏充满乐趣，轻松的氛围能使职业培训更愉快。我还发现，当人们玩得开心时，他们能记住同样多甚至更多的内容，而且心情更愉快。思考赢得游戏的创造性策略是教会员工创造性思维的好方法。此外，向员工提供情境示例并让他们（无论是个人还是团队）寻找创造性的解决方案，也取得了很好的效果。\n\
  \n### 注重细节\n\n学习注重细节的最佳方法之一是从忽视细节的失败中吸取教训。最好不要在客户、同事面前，或者在可能导致项目延期的项目上犯这种错误。因此，提供依赖于遵循大量指令的练习是帮助员工保持专注的好方法，尤其是当这些指令或细节是他们工作中可能执行的真实任务时。\n\
  \n### 时间管理\n\n时间管理可以帮助员工提高效率。当人们感觉完成了很多工作时，他们通常也会更快乐。关于时间管理的书籍和课程数以百计。我建议找到一门符合组织价值观的课程，并让一到两名员工参加。然后他们可以汇报学到的策略和价值。对于此列表中的大多数项目，我不想推荐单一的产品或方案，所以选择一个开始，向你尊重且擅长时间管理的人询问他们推荐的课程，或者使用你最喜欢的搜索引擎进行一些研究。大多数方案都围绕优先级展开，因此在此期间，思考如何根据任务类型及其优先级来最佳地组织任务。仅此一项就能在你寻找帮助员工学习的方案时产生立竿见影的效果。\n\
  \n### 乐观心态\n\n乐观是一件有趣的教学内容。更好地培养人们掌握其他软技能，往往本身就会带来更乐观的态度。乐观通常是自尊的直接反应。但根据员工的性格，有一些特定的策略可能有效也可能无效。最重要的一点是，你自己要保持乐观的态度。不要让自己陷入消极抱怨组织的泥潭中。要以一种能让对方在未来更好地处理类似情况的方式来讨论具体问题的细节。谈论情绪。这对某些员工以及你与他们关系的深度来说可能比较困难。最后，向员工或团队传达信任也会产生相当显著的影响，尤其是长期坚持这样做。\n\
  \n### 差旅管理\n\n我过去有很多员工需要频繁出差。我会让他们都尝试选择一家特定的航空公司、加入里程计划、集中使用一家特定的租车公司并加入其忠诚度计划、选择一家偏好的酒店并加入其忠诚度计划、为他们提供登机前与客户通话的模板（以确保客户和我的员工都为出差行程做好准备）、提供最简单的费用报销方案、在需要时提供礼宾服务等等。成为一名“空中飞人”可能很艰难。任何能为一线员工提供支持的措施都是有益的。\n\
  \n### 言简意赅\n\n清晰但快速地传达信息有助于保持他人的注意力。要做到这一点，需要紧扣主题。为了帮助员工做到这一点，我会参与对话，并在我们偏离核心主题时指出来。显然，你希望员工说话自然。然而，你也可以通过提供指导来帮助他们改进表达方式。同样适用于书面表达。只需指出写作开始偏离主题的地方，就能帮助养成紧扣主题的习惯。最后，你可以给员工推荐道格拉斯·亚当斯的书，并告诉他们“做完全相反的事”。\n\
  \n## 制定职业发展计划\n\n每个员工应该专注于培养哪项技能？基于以上内容，制定一份职业发展计划。从模板开始。我喜欢采用 360 度评估法：让员工在每个类别中对自己进行评分。然后让同事互相评分（匿名效果最好）。提供你自己的意见，然后与每位员工沟通，确定应该花更多时间提升哪些技能，并制定相应计划。我喜欢为这样的计划附上一份沟通计划，即你将何时检查每个领域的进展情况。当然，这些软技能很可能是在向员工传授业务或产品知识的同时进行培养的。但将不同的提升领域结合起来，有助于表明你关心他们的职业发展，而不仅仅是利用他们来获取尽可能多的收入。\n\
  \n\n\n想要了解更多？我以这样一种方式列出了每一条要点，你可以复制前几个词，粘贴到搜索引擎中，就能获得关于该主题海量的信息。此外，还有一本包含大量研究和案例研究的书籍，概述了这种变革能为组织带来的影响。***《管理转型》***（*The\
  \ Management Shift*）这本书提供了识别困扰许多组织的领导力问题的实用方法，以及如何转变思维模式和组织文化。这类书籍数不胜数，但这本是一个很好的起点！\n\
  \n祝你好运，并代表你的员工以及这些员工未来的潜在雇主，谢谢你！既然你已经让员工具备了你希望他们拥有的技能，那么接下来，我们把重点放在留住他们上。\n\n###\
  \ 迹象表明留住某人将变得困难\n\n有许多桌面游戏和电子游戏，比如《龙与地下城》，你在其中扮演一个收集经验值的角色。一旦角色积累了足够的经验值，你就可以提升角色等级，获得新技能和更好的属性。我们的职业生涯也大致如此：你拼命工作，然后进入平台期，你得到一份新工作或新职位，再次拼命工作，然后又进入平台期。只要你准备好时就不断升级，你的职业生涯很可能会充满学习和新的冒险，这正应该是它本来的样子。以下是一些方法，可以让你判断某些人是否已经积累了足够的经验，是时候进入下一个阶段了。\n\
  \n*   **他们感到无聊：** 这一点显而易见。一旦某人在一个职位上学到了所有能学的东西，他们很可能会感到无聊（周期性地），无论每天有多少工作从他们的办公桌上经过。这是正常现象。但要注意，人们的激励因素各不相同，可能有人只想在当前职位上待一段时间。只要他们做得好，就让他们知道，只要他们准备好了，就告诉你，你会帮助他们进入下一步。\n\
  \n*   **每个人都会向某位员工寻求建议：** 一旦某位员工擅长某个职位，他们知道如何解决所有技术问题，知道该给谁打电话来加快处理那个关键事项，或者知道该踢哪儿能让点唱机播放一首歌（还有时间比出《欢乐时光》的大拇指）——那么，是时候寻找更多挑战了。你能从骨子里感觉到，希望他们也对自己的成就感觉良好。这时机就到了。如果你还没开始，那就开始思考他们下一步该做什么。当然，他们应该在这个岗位上花足够的时间，为接下来要面对的挑战做好充分准备，并从别人那里得知自己已精通工作，这样他们的自负就不会让他们误以为自己做得比实际更好！但如果你不认可他们已达到的水平，总会有人认可的！\n\
  \n*   **他们开始感到沮丧：** 过了一段时间，不断有人带着问题来找这位员工会让人感到厌倦。他们会因为自己变得自满而感到恼火，并开始怨恨组织、团队，以及除了自己以外的所有人。这意味着他们在一个职位上待得太久了，是时候继续前进（希望是向上）了。不要让他们开始讨厌工作；这对任何人都没有好处。相反，要寻找方法来挑战员工，并从内部培养人才以保持发展势头。\n\
  \n*   **别人提醒他们：** 有时，其他地方的经理会开始尝试挖角某位员工，或者他们被要求直接与客户合作。或者团队成员开始为某人指出其他职位。无论如何，如果他们的谦逊还没能让他们去申请下一份工作，那可能是时候由你自己来推他们一把了。如果你帮助员工找到职位，你就能在某种程度上塑造他们的去向，如果他们最终不在你的组织里，至少他们仍会是你的盟友。\n\
  \n*   **金钱：** 资本主义意味着，在可能的时候，要跳槽去薪水更高的工作。你的员工可能热爱你的团队、同事、你本人，以及常常提供给高绩效者的自由度。但是，当他们开始意识到其他职位能给他们带来多得多的东西时，如果其他因素都没能促使他们离开，冷冰冰的现金很可能会开始向他们招手。基于时间的咨询业务面临的一个棘手问题就是，确实存在一个财务平台期，因为需要维持一定的利润率。但请记住，杰出的人才或许能够激励他人。通过放大团队成员能为公司带来的价值，那些在薪酬上已经到顶的人或许就能证明自己配得上高得多的薪水。在托管服务提供商（MSP）中，当人们跨越这个门槛时，他们通常可以转向管理团队或客户——或者为下一代工程师提供升级的晋升路径。\n\
  \n最后，在任何人的职业生涯中，都会有那么一段时间，他们不再为了在工作中升级而积累经验。新晋父母、照顾生病亲人的人、拥有副业的团队成员、把所有空闲时间都花在湖边小屋里的人，以及许多其他人都处于“平稳期”。这完全没有问题。\n\
  \n只要工作产出符合雇主的需求，组织和员工双方都清楚这一点，并且大家都在沟通各自的状况，那么按下职业生涯的暂停键并没有错。沟通是关键。如果你看到一位需要升级的员工，花点时间和他回顾这一点——以及下一步该去哪里。如果你自己需要升级，就开始寻找你的下一步是什么，这样你就能以任何你需要的方式做好准备。在咨询领域，这通常意味着将公司拓展到能给你带来更多挑战的领域，或者扩大组织规模。\n\
  \n\n\n## 多样性\n\n作为顾问，我们最终可能会拜访许多不同的客户。拜访这些客户的人员应当与客户群体一样多样化，甚至更胜一筹。更多元化的员工队伍能带来更多想法和视角，并营造更健康的企业文化。\n\
  \n多样性涵盖性别、种族、社会经济地位、宗教信仰及背景，应当积极招募。如果你在洛杉矶这样的地方办公，寻找能代表任何一种你想到的背景的员工可能会很容易。如果你身处更偏远的地区，寻找多元化人才可能需要更多时间，但这将是值得的。\n\
  \n随着公司发展，你自然会拥有更多元化的人才库。如果没有，那你就需要审视招聘流程，或许还有你自身的观念，以及这种观念如何塑造了你组织中招聘经理的思维方式。如果任何方向出现过度同质化的趋势，调整招聘做法就会变得困难。最终，当你看到更多元化的团队在创新、社区贡献以及最终开拓更广泛的客户群体（从而扩大你的总体可寻址市场）方面释放出的潜力时，你的公司将变得更强大，也更有吸引力，让更多人愿意加入。\n\
  \n大多数人追求多元化是因为它是个流行词。无论出于何种原因，这都是一件好事。但你也可以有私心。拥有更多元化的人才库所带来的创新理念，可能是在招聘时多花点时间去审视整个市场（而不仅仅是你自己及身边的小圈子）的唯一最大理由。\n\
  \n招聘优秀人才是我们在创办新企业时面临的最困难的任务之一。我不想说教，以下是从那些书籍中总结出的一些实用要点：\n\n*   **考虑“铂金法则”**：以他人希望被对待的方式对待他们。这取代了“黄金法则”（以你希望被对待的方式对待他人），因为我们来自不同的背景，应当体谅并尊重每个人的界限。你要求团队成员做的某些事可能会与他们的价值观相冲突，这包括不同文化如何看待眼神交流、握手或私人空间界限。如有疑问，请主动询问。\n\
  \n*   **面试那些看到周围一大群与自己不同的人**：现有员工可能存在轻微的文化磨合问题。如果你起步时员工多为男性，很可能存在一些不恰当的玩笑。你或许希望招聘女性或\
  \ LGBT 员工，但她们为什么要在一个容忍这种行为的氛围中工作呢？请确保建立一种支持所有种族、性别和背景的文化。\n\n*   **考虑盲选面试**：我很少看简历上的名字，但这是个很好的方法，可以让自己免受无意识偏见的影响。\n\
  \n*   **在专业网站（如领英）或通过本地线下活动加入多元化团体**：通过这种方式，你很可能会打开一个全新的人才库，同时还能结识潜在客户并找到可以贡献力量的公益事业。\n\
  \n*   **族裔与跨文化培训**：这不仅有助于让你的团队成为更受欢迎的地方，还能帮助你的员工在客户面前举止更得体。这包括文化敏感性以及认识无意识偏见。某些培训有法律必要性，但如果你能超出要求去做，并且真心实意，那么其他人就会看到你的承诺。请确保你亲自参与其中；领导力很重要。除了技术或业务能力外，你甚至可以打造一个内部文化能力品牌。\n\
  \n*   **对骚扰、种族主义和偏见采取零容忍政策**：有时候我会对一些事情放任不管并随后感到后悔，但我可以向你保证，如果你看到了什么，别人也会看到。\n\n\
  *   **与那些也致力于自身组织多元化和包容性的供应商及其他合作伙伴合作**。\n\n*   **对客户同样采取针对骚扰、种族主义和偏见的零容忍政策**：我一直坚定地保护我的团队免受任何形式的粗暴行为影响。与有此类行为的客户合作只会带来负面影响，不仅会毒害直接接触这些行为的员工，还会波及与他们互动的其他人。每次遇到这种情况，都应该与客户方领导层严肃处理。\n\
  \n*   **将多元化招聘扩展到董事会**。\n\n*   **我工作过的几乎所有组织都将其企业文化作为人们愿意为其工作的核心原因来宣传**。这无可厚非。但在招聘时，最好停止谈论文化契合度，转而关注能力。\n\
  \n*   **承认所有文化节日，但不进行文化挪用**：这并不总意味着你需要放假；还有其他方式可以庆祝每种文化的特殊活动。\n\n*   **开会时，征求在场每个人的意见**。许多员工会怯于发言。主动请他们贡献想法，并在他们发言时认真听取。\n\
  \n*   **积极寻找并消除“冒名顶替综合征”**：无论员工背景如何，都应给予支持。请记住，不同背景的人有不同的简历撰写方式、面试方式，以及在面试后或培训期间跟进的不同规范。让每个人都感到可以安全地提问、贡献，并感觉自己的贡献很重要。\n\
  \n*   **当相关书籍或文章出现在你的信息流中时，去阅读它们**：世界上许多人正在意识到，事情可能比我们想的更糟，也可能更好。阅读来自更多元化基础的内容，会让你拥有更广阔的视野和理解。\n\
  \n这一部分对我来说很难写。作为一个白人男性，我拥有某种有时难以承认的特权，而且我知道无论我说什么，都会有人被冒犯。但尽管我觉得四处指手画脚告诉别人该怎么做并不合适，我仍然觉得，即使会冒犯到一些人，写下这些内容也很重要。在本章末尾，你会找到一些由我认为完全正确的人所写的书籍，他们更深入地探讨了这个主题，并且处理得更加公正。\n\
  \n这是创业和经营企业过程中，不再只关乎你自己的时刻之一。你不需要雇佣任何不符合你要求的人。但随着公司发展，拥有一个多元化的团队将帮助你做出更全面的决策，并更好地理解越来越多的客户对你的期望。如果你身边围绕的都是和你一样的人，你个人很可能在某些方面无法成长。\n\
  \n\n\n## 外包人力资源管理\n\n在本书中，我们将人力资源（HR）视为一个个人或团队，负责监督您组织中的雇佣事宜，包括遵守劳动法、雇佣标准、福利管理，以及最终的招聘工作。在本章的大部分内容中，我们重点关注领导力和管理，因为单是探讨组织结构的科学及其背后的后勤工作，就可能需要数百页的篇幅。\n\
  \n在本章中，我们回顾了许多资源。我们提到，可以从 `trinet.com`、`adp.com`、`insperity.com` 和 `gusto.com` 入手，建立一套系统，并在员工人数超过六人时聘请一位顾问。\n\
  \n我们没有讨论需要培训和维持技能的具体技术。这是因为这样的技术有成百上千种。其中一部分可以在附录 C 中找到。每家公司在设计服务产品和团队使用的工具包时，都会因所选工具的不同而有所差异。这个列表在规划服务产品时能派上用场。\n\
  \n员工人数少于 20 人的组织，或许应该考虑将人力资源工作外包，除非他们计划每周至少招聘一名或更多员工。有许多不同的外包服务商能为您提供远超您自行打包的任何福利方案。他们还会在您需要时倾听您的诉求；帮助您遵守您开展业务所在城市、州、县、省等地的法律法规；并接管薪资发放工作。以下是中小型公司在选择外包人力资源时需要关注的具体事项：\n\
  \n*   为员工提供可致电的服务台。这可以避免您花费大量时间研究劳动法或保险理赔的具体细节。\n*   为员工提供保险。您的员工需要得到妥善照顾，而最便捷的方式之一就是提供一份优厚的保险计划。\n\
  *   处理员工工伤保险事宜。\n*   提供股票期权和/或 401k 退休计划。\n*   解决员工纠纷。\n*   必要时提供股票、利润分享和股息。\n\n\
  在考虑外包人力资源时，请务必询问外包商他们将如何处理上述每一种情况。了解哪些服务是单独计费的。并确保您乐意拥有当地顾问资源来帮助您，同时也确保他们与您的外包商合作融洽。请记住，人力资源还包括领导力和入职培训。而这两点，往往决定了一家公司能否持续地向客户交付高质量产品。\n\
  \n## 结论\n\n人力资源工作不仅仅是确保每个人都能拿到薪酬和拥有保险。人力资源确实包含这些内容，但它还涉及领导力培训、多元化、员工留存、人员管理系统、招聘，以及您选择纳入其中的几乎所有其他方面。\n\
  \n在本章中，我们探讨了何时外包人力资源，以及何时招聘或组建人力资源部门的一些常见临界点。根据您选择经营公司的方式，这些临界点有一定的灵活性，但请记住，当您的团队规模接近十几个人时，您需要建立起完善的入职和培训计划。这些工作不会自动完成，大多数企业主应该指导这些计划的实施，但如果您对它们进行微观管理，最终反而会减少对战略和销售（大多数组织的增长驱动力）的投入。\n\
  \n现在，我们已经涵盖了人力资源的话题，接下来该看看我们如何为这一切买单。在下一章中，我们将直接深入探讨可能是大多数创办公司的极客们最喜爱的话题：会计！\n\n\
