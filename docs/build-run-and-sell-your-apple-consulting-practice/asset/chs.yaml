  - 《哈佛商业评论购买小企业指南：大格局、小收购、自己当老板（哈佛商业评论指南系列）》，鲁巴克、尤德科夫，[`https://www.amazon.com/HBR-Guide-Buying-Small-Business/dp/1633692507`](https://www.amazon.com/HBR-Guide-Buying-Small-Business/dp/1633692507)\n\
