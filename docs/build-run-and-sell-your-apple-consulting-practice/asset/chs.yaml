- "# 4. 会计学基础\n\n我从未见过拥有会计学学位的人创办托管服务提供商。我相信这种情况确实存在，但我遇到的大多数提供商都必须（或即将必须）在学习过程中掌握一些会计学基础知识。\n\
  \n当你以微薄预算创业时，许多不同领域的情况都会如此。这其实是好事，因为当你雇佣全职员工担任不同职务时，你会更懂得如何管理他们！但创业初期，你很可能雇不起全职会计师。所以，一开始可以使用像\
  \ `Mint` 或 `Quicken` 这样的工具进行基础、简单的记账。当你发展到需要使用 `MYOB`、`QuickBooks` 或更成熟的工具时，就需要寻求一些帮助了。请记住，你在雇佣会计帮手时的选择权，与你的客户在雇佣顾问时的选择权是相同的。因此，把雇佣帮手视为一次极佳的学习经历吧！并且，尽可能晚地再去雇佣全职会计师。\n\
  \n## 核心概念\n\n要成为成功的小企业主，你无需成为会计专家；这部分可以外包。但你确实需要扎实掌握基本的会计概念。作为小企业主，仅凭直觉感知企业的业绩是不够的。理解一些会计学基础概念，对于确保公司目标与业绩表现保持一致大有裨益。以下是一些入门概念：\n\
  \n-   **资产负债表**：评估组织业绩时，学习解读资产负债表是一个很好的起点。你至少应该理解资产和负债，以及它们之间的关系。\n    -   **资产**是你拥有的东西，包括你尚未收到付款的合同。\n\
  \    -   **负债**是债务，也包括你已收到付款但必须按合同交付的商品和服务。\n    -   计算公司价值的基本公式是：资产减去负债，剩余部分即为你的权益。将其写在纸上就形成了资产负债表。这能让你快速了解组织的概况。手头现金充裕、债务低意味着资产负债表强劲。高负债、低现金则意味着资产负债表疲软。资产负债表驱动着关于资源投向的长期决策。\n\
  \n-   **损益表**：损益表能很好地反映你在任意时间点的经营状况。损益表显示销售成本、每个产品的利润率以及影响利润率的成本。这些成本包括库存、运输、制造等。这些项目越细化，你就越能基于数据来确定产品成本。每张损益表都包含净利润。净利润是对你所获利润的陈述，没错，就是对你投资的回报！\n\
  \n-   **现金流量表**：对于小企业主来说，现金为王。现金是当（而非如果）企业遭遇挫折时的缓冲。现金应能覆盖企业一段时间内的运营成本（每个组织对这段时长有不同的看法）。理解现金流的关键是现金流量表。可以将现金流量表视为资产负债表与损益表之间的桥梁。现金流量表解释了在一段特定时间内，你的净利润是如何转化为净现金的。现金流量表将活动分为三类：经营活动、投资活动和筹资活动。最初，组织依靠持续运营产生现金，但随着企业发展，你还需要管理投资和运营产生的现金。并且，通常需要为至少部分现金纳税，同时从这些投资和运营中获得抵扣。\n\
  \n-   **税务**：作为小企业主，你需要了解税务。如果你的企业盈利，就必须向税务机关缴纳税款。大多数组织都希望尽可能减轻税负。这正是你的会计知识能够真正发挥作用的地方——你将理解不同法律结构（例如，公司制与独资企业）的税收优势，以及小企业主可获得的潜在税收减免。\n\
  \n-   **预估报表**：会计讲述的是过去和现在的故事。预估报表是基于过去业绩对未来业绩的预测。预估报表使你能够预测企业未来的表现。预测至关重要，因为它们能让你就人员配置、服务交付以及业务线的价值做出明智的决策。\n\
  \n-   **CAGR**：复合年增长率衡量不同时期的增长。例如，你希望用一笔初始投资创办一家公司，然后假设投资随时间复利增长，将其发展到特定价值后出售。\n\
  \n-   **COGS**：销售成本代表与你所销售产品的生产直接相关的成本，包括生产商品所用的材料和劳动力成本、商品分销成本以及销售成本。\n\n-   **EBITDA**：息税折旧摊销前利润是衡量财务业绩的一个指标，它表明了企业的盈利潜力。EBITDA\
  \ 不包括资本成本和税务影响。如果你已获得融资，这是一个常见的关注指标。\n\n-   **收入**：通常在损益表中列为销售收入，收入是指在给定时期内你收到的款项，包括折扣和退货（或在服务行业，包括有争议的工作时长或托管服务协议违规折扣）。收入是总收入。\n\
  \n-   **经常性收入**：经常性收入是指极有可能持续、因此可预测、并且你确实可以围绕其进行规划和构建业务的收入。\n\n-   **净利润**：总收入减去成本。\n\
  \n-   **收入确认**：这是指你实际可以动用所赚取资金的时间点。当你交付服务时确认服务收入。托管服务收入通常在每个月底确认，而按小时或按天计费的服务通常在收到服务已交付的批准（例如，在工作单上签字）时确认。\n\
  \n-   **毛利率**：毛利率等于销售收入减去销售成本，再除以总销售收入，或者说是你在支付了所有与你提供给客户的商品和服务工作产品相关的直接成本后，能够保留的百分比。\n\
  \n归根结底，大多数小企业都会将会计工作外包。所以，不必纠结于所有的会计术语或不同折旧方法的细微差别。但务必对三大基本财务报表有初步掌握，并清楚了解它们能告诉你哪些关于未来业绩的信息。这样，你就已经在通往成功小企业主的道路上了！\n\
  \n\n\n## 选购会计软件\n\n关于选择何种会计软件（或软件即服务 `[SaaS]`），我通常建议考虑两个因素。第一个是你的会计师。如果他们喜欢使用特定的软件包，比如\
  \ `QuickBooks`，那么你很可能也该使用它。你肯定不想每次去见会计师时，都要把会计科目表导出成某种奇怪的文件，然后绞尽脑汁地帮他们导入那个文件。相反，要么找一个能原生使用你心仪软件的会计师，要么就使用你找的会计师喜欢用的软件。\n\
  \n等等，我刚才是不是说“找一个能用你心仪软件的会计师”？为什么我会这么说？因为选择软件包的第二个主要因素是，它能否与你的专业服务自动化（`PSA`）解决方案集成。如果\
  \ `PSA` 能够直接与会计软件通信，那么随着你的业务增长，你就可以基于工单录入，以一种非常简便、非常流畅的方式向客户开具发票。我们会在本书后面讨论如何选择\
  \ `PSA` 解决方案。但就目前而言，请记住，你选择的会计软件以后需要与某些自动化软件集成。\n\n例如，如果你使用的 `PSA` 能与 `ZenDesk`\
  \ 集成，但它碰巧不是 `QuickBooks`，而你的会计师却想要 `QuickBooks` 并且只愿意使用 `QuickBooks`，那么你就会遇到一点挑战。如果实在没有办法，希望你能将数据从一种解决方案导出到另一种。如果不行，你就不得不在各种自动化方案和会计师之间做出选择。请记住，即使最终需要手动录入发票信息，那也不是最糟糕的情况（尤其是在早期阶段），因为手动录入信息能让你在向客户发送发票之前进行核对和制衡。当然，手动录入信息时可能会出错，所以务必仔细检查你的输入。没有什么比计费错误更容易引发信任危机了。\n\
  \n## 收款方式\n\n盈利与否，是区分一门生意和一种爱好的关键。而盈利的一个重要方面在于：你最初接受的收款方式很容易限制你能承接的业务类型。因此，接受客户能用任何方式付款（并且这些款项最终能用于支付房租或房贷）是一个好主意。\n\
  \n在选择收款工具时，我会考虑三个主要因素。\n\n*   该服务是否能与您选择的会计平台进行恰当（且自动的）集成？寻找一个好工具的简便方法是，从你的会计平台入手，查看那些能与之集成的服务。\n\
  *   该服务能否为您提供最优惠的费率？如果你可以在多个服务之间进行选择，你可能希望确保使用的是克扣你辛苦钱最少的那一个。\n*   该服务是否会改变你的税收关联地？信不信由你，不同的网站、服务（甚至客户）都可能影响你的税务。请咨询你的税务申报人（是的，你需要一位税务申报人），以核实你可能受其管辖的任何关联地规则（特别是如果你跨州经营或是在边境城市工作）。\n\
  \n用于收款的主要解决方案包括 `Square`、`Quickbooks` 和 `Stripe`。还有很多其他的，我对哪个更好没有定论。这些我都用过，与传统的固定电话驱动的大型终端机相比，它们都带来了颠覆性的改变。\n\
  \n既然你已经可以收款了，那么是时候讨论一下什么时候可以花掉刚收到的钱了。\n\n## 权责发生制会计\n\n如果你要从本章中学到点什么，那就是这个。如果你的客户在合同中预付款项购买服务，那么你**必须**使用权责发生制会计。大多数企业一开始都采用收付实现制会计，也就是说，他们收到的钱就是记在总账上的钱，他们将这些钱视为现金。\n\
  \n后来，企业最终会拥有多个会计科目表，并且只在服务交付后才进行收入应计或确认。为什么？因为如果你不这样做，最终会使一家成长中的公司破产。基本上，在服务交付之前，你不能动用那笔钱。你越早开始这样做，你的处境就越好。我发现很多企业直到受到巨大惊吓或聘请了会计师之后才开始这样做。\n\
  \n那种巨大的惊吓往往出现在这样的情况中：所有合同收入都被花光了，为了完成已售出的项目，你不得不对公司进行资本重组。当这种情况发生时，即使你刚刚完成了职业生涯中最出色的一些工作，也很容易导致公司价值变为负数。这时，多一点现金流会有所帮助，但真正解决这个问题的唯一方法是，避免在你尚未实际赚取收入时就确认收入。\n\
  \n## 聘请会计师\n\n你不必事事亲力亲为。你可以，而且很可能应该立即聘请一个人来帮你整理好账目。我发现一位好的会计师不仅能理清你过去所做的账目，还能为未来建立一个更好的系统。而且，你的第一位会计师很可能同时扮演着某种财务顾问的角色。后来，这些角色会变得不同。\n\
  \n当你聘请会计师时，要找一个不会让你为所欲为的人。这意味着你需要倾听。是的，你是自己的老板。但他们也是你的老板，就像你的员工和你的客户一样。\n\n小型企业的簿记职能与会计师、财务顾问或税务申报人的职能不同。你需要有人（起初很可能就是你自己）来录入收据、录入应收账款、开具应付账款支票、核对银行对账单、核对信用卡对账单，可能还要存支票。随着业务增长，应收账款和应付账款的工作通常需要分给两个人来做。\n\
  \n这里有一些需要记住的事情：\n\n*   从你挂牌营业并开始接受 `Stripe` 付款的那一刻起，就找一个你信任的税务申报人。\n*   识别出对实现业务自动化至关重要的工具。这一点很重要，因为它需要与你的会计体系集成。如果你的会计系统是\
  \ `Quickbooks`，而你的簿记员和税务申报人都使用 `Quickbooks`，那么如果某个新的托管服务自动化（`MSA`）软件包不能与 `Quickbooks`\
  \ 集成，你可能就无法迁移到该 `MSA` 软件包。除非你非常需要那个 `MSA`，以至于要更换你的税务申报服务，或者找到每个季度迁移数据的方法，否则请与他们沟通确认。\n\
  *   建立良好的制衡机制。你需要有人让你在支出、预测和税务方面保持诚实。你需要有其他人监督你资金的使用。你需要让他们检查那些你甚至不知道需要被检查的事情，比如每次发工资时可用资金的预测。你需要践行一点“信任但要核实”的原则。\n\
  *   立即对收据进行分类。并在纳税时把所有东西都带上。你的税务申报人会分辨出哪些项目可以申报，哪些不能。这包括服务费、差旅费、订阅费以及办公室费用（起初可能只是你家庭办公室的一部分）。\n\
  *   如果就某个商业安排获得了财务建议，在违反该建议行事之前，要深思熟虑。我不确定自己在这件事上搞砸过多少次。也不确定将来还会搞砸多少次。\n*   永远、永远、永远不要自己编写会计软件。\n\
  *   永久保留你所有的记录。\n\n总的来说，我无法告诉你该如何构建你企业的财务体系。但也许本章中的一些内容能帮你以所需的方式构建框架。你应该聘请一个你可以信任的人——可能不是你亲戚的人。并且你应该时不时地从其他供应商那里获得额外的服务。\n\
  \n\n\n## 税务申报\n\n你需要按季度缴纳税款；否则，美国国税局（IRS）会对你处以罚款。不要因为觉得自己还在为公司工作，就最终背上数千甚至数万美元的罚金。一旦你的收入超过某个数额（具体情况因人而异，请咨询税务专业人士），你就需要按季度报税，并定期向政府缴纳一小部分税款。\n\
  \n我绝不会将任何政治观点写入文字中——无论是保守派、自由派、自由意志派、共产主义者等。而且这些都无关紧要。如果法律规定你必须纳税，你就必须照做。你使用了他们的道路，将孩子送到他们的学校读书，享受了他们阻止犯罪进入你办公场所的成果，所以你需要支付自己应承担的那部分。实际上，这一点也无关紧要。如果你不按规定缴纳税款，在世界上的几乎任何国家，你都可能因此入狱。所以，尽早并按时纳税吧。\n\
  \n我无法告诉你具体如何操作报税；这因每个企业、城市、州和国家而异。但我可以告诉你，如果你刚开始创业，可能应该创建一个穿透实体（pass-through entity）。立即聘请一位专业的税务会计师，这样你就可以开始向国税局（如果你在美国）缴纳季度税款，从而避免因未缴税而支付高额罚款。\n\
  \n## 保险\n\n虽然严格来说不属于会计范畴，但保险是任何组织财务方程的一部分。你的会计师应该能够为你推荐一个可以提供企业保险的优秀机构。千万不要在没有保险的情况下开展业务。这对于保护你个人以及你所创建的公司至关重要。一次意外的硬盘数据擦除、一台存有重要信息的笔记本电脑掉落，或者一台电脑的安全防护不当，都可能让你承担天知道是什么的责任。\n\
  \n最初选择一份保单并不一定那么困难。找到一个好的保险代理人，然后查看他们提供的套餐，选择一个适合你商业模式的。寻找代理人时，最好的方式是通过推荐，但搜索“错误与遗漏保险”（Errors\
  \ and Omissions Insurance Coverage，E&O）或“职业责任保险”（Professional Liability Insurance）很可能也会找到大量潜在的保单来源。\n\
  \n刚开始时，你的保单可以适度。业务的增长通常意味着你的保单也需要升级。每个新客户都带来了潜在的风险，可能需要你拥有比现有保险更高的保额。随着新客户带来额外的\
  \ E&O 保险需求，你可以评估获取升级保单的成本。\n\n关于 E&O，最重要的一点是：你需要一份“服务条款”或与客户签订的某种协议，来规定你们之间的合作方式。在该协议中，你应该将客户可以向你追索的任何赔偿金额上限定为你\
  \ E&O 保单中的保额。这可以保护你免受潜在差额的影响，即当你被起诉且现有保额不足以支付诉讼赔偿金额时，差额部分将不得不由你或你的企业自掏腰包。\n\n##\
  \ 现金流\n\n最后，我们来谈谈现金流。你始终应该有足够的现金来支付员工薪酬和其他开支，维持至少 6 个月。否则，就不要雇佣员工。在某些国家，没有足够的现金流来维持组织一段时间的运营属于刑事犯罪。别忘了在计算中考虑租金、人力资源、税务、法律等成本。\n\
  \n那么，当你拥有超过 6 个月运营资本时会发生什么？如果你的资金足以维持公司运营 10 年，那你并没有妥善地配置资本。如果你想保持一家小公司，那么你应该进行投资。这不是投资建议，但如果你的生活方式（或公司运营方式）在一段时间内产生了正向现金流，那么你应该寻求财务建议。这个建议可能是发展公司，或者根据当时的资金成本，利用债务来发展公司。或者，根据你对生活、公司以及一切事物的期望，你的投资顾问可能会建议你采取完全不同的做法。但不要把它放在活期账户里！\n\
  \n## 结语\n\n了解会计基础知识是一项重要的技能。你将雇佣的最重要的员工之一就是会计师。而且很可能你至少需要两名会计师。随着公司发展，你可能需要在员工中设立应收账款和/或应付账款岗位。但你需要掌握足够的知识来妥善管理他们所有人。\n\
  \n无论做什么，都不要自行其是。听取他们的建议。有时可以寻求第二意见，但永远不要认为自己比公认会计原则（GAAP）懂得更多，并试图制定自己的会计规则。你也可以外包一个首席财务官，来帮助你最好地理解如何管理你的税务专业人员和你的日常会计团队。务必确保按季度缴纳税款（显然，根据你所在国家的不同，具体情况可能有所不同）。\n\
  \n最后，学习会计和财务就是学习商业。管理成本、管理应收账款、管理现金流、管理收入确认等等，这些都是成为一个精明的企业主所必需的。你可能会达到一个不想再过多处理这些事务的阶段。这可能表明你已经超越了你的舒适区。但一旦你的收入足以雇佣第二个人，就该开始大量学习商业知识了，即使你只有时间听听本章“延伸阅读”部分或类似书籍中的一些内容。\n\
