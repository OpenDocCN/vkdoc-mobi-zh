  '
- "# 招聘与人力资源\n\n你已经建立了定价模式和商业计划。你已经与供应商和其他实体建立了关系，使公司能够发展。现在，是时候开始组建团队了。招聘是公司能做的最重要的事情之一。你把客户托付给了你的员工。而最难的招聘正是第一个员工。\n\
  \n在本章中，我们将探讨如何规划你的员工队伍、招聘你的第一位员工、一些基本的管理技巧，以及成为一个合法雇主所涉及的一些后勤事务。\n\n\n\n## 决策，决策\n\
  \n在招聘之前，你需要先问自己一些重要问题，这些问题将决定你承接的业务类型、公司的发展方式，以及在发展过程中管理公司的难度。在我们深入探讨本章中如何招聘的具体方法之前，先来看看你在开始前需要思考的一些问题。\n\
  \n-   你会雇佣合同工还是正式员工？我必须承认，我一直倾向于雇佣正式员工，并善待他们。这意味着你需要妥善处理好 `401k` 养老金计划、医疗保险和员工发展等事宜。但如果你将咨询业务视为一次性的项目而不是一项长期职业，那么你可能会选择利用合同工。此外，如果你希望将某些专业领域（例如\
  \ Cisco、Jamf、Exchange 等）的能力保留在公司内部，你或许会选择聘用合同工来交付各种服务。请深思熟虑，明确你希望做什么、你的服务范围包含什么，以及需要时由谁来交付各类服务。\n\
  \n-   你在员工身上寻找哪些特质？思考你的使命、愿景和价值观。然后为你想招纳的人才类型描绘一个画像。你更看重自动化工程能力还是客户服务能力？你希望当员工在现场工作时，如何代表你的公司？\n\
  \n-   员工将负责哪些工作？你会负责销售、技术工作，还是专注于行政管理？所寻找的技能组合可能会因小型企业业主的性格而异。雇员的类型也可能不同。如果你需要有人在你外出处理所有酷炫事务时管理公司，那么你需要的人才类型，与招聘销售或交付服务的人员完全不同。再次强调，要审慎决定谁做什么，并且当你发现那些能带来你之前未曾考虑过的特殊价值的人才时，要愿意做出让步。\n\
  \n-   你希望客户推荐回头找你吗？对于大多数人来说，答案是明确的“是”，但根据你希望如何发展业务，答案可能是“取决于业务类型”，或者是“如果我的分包商工作做得好，他们可以保留推荐业务”。不要指望品牌忠诚度和客户推荐会自动留在公司内部，除非你根据这一点为员工提供激励（例如，介绍人奖金等）。\n\
  \n-   你希望员工如何实现职业成长？不要指望人们会自学。随着公司发展，对平台深度的要求、学习新技术的能力以及其他因素，将决定你如何发展，或者如果不能发展，你如何留住团队成员。\n\
  \n-   你能支付员工多少薪水？我一直使用的一个简单经验法则是`2.5 倍`。这意味着，对于任何一个可收费的员工，我想要收取的费用是他们薪资的两倍半。这包含了间接费用（例如人力资源和培训成本）、任何销售人员的佣金、员工薪资，以及后台办公成本。对于不可收费的员工，薪资期望会有所不同。可以访问`Glassdoor.com`这类网站进行初步比较，或者随着公司发展，向外包的人力资源部门咨询薪资数据。\n\
  \n#### 备注\n\n如果你拥有一份全职工作，并非全身心投入运营自己的咨询公司，那么如果你要招聘，应该雇佣合同工，而不是全职正式员工。\n\n如果找不到合适的人选怎么办？如果你无法通过分包或招聘来承担某项任务或业务线，那么你可能需要将部分工作外包。这也是一种轻松交付各种你认为不属于核心业务模式的服务的方式。外包可能很棘手。请确保你与外包商在如何对待客户、处理推荐、如何代表你以及账单事宜上达成共识。同时，要意识到将其他企业（即使是单人企业）作为客户可能带来的法律后果，为此应与分包商、员工和外包商签订严格的保密协议。\n\
  \n最后，在你在互联网上发布职位之前，请记住，客户也可能会看到这个招聘启事。\n\n## 招聘之前\n\n访问 `trinet.com`、`adp.com`、`insperity.com`\
  \ 和 `gusto.com`，然后选择一个。如果你还没了解过 `Gusto`，去看看。然后看看他们的投资者。他们正在全方位颠覆人力资源外包行业，而且价格低廉，能够随你的业务规模扩展。我用过\
  \ `Tri-Net`、`ADP` 和 `Insperity`，它们在商业模式、质量和成本上都类似。\n\n如果你没有人力资源顾问，那么当你的员工数达到七人时，就需要一位了。你需要一个系统，能够让你支付员工薪酬、追踪工时和福利、提供\
  \ `401k` 养老金计划，并可能提供利润分享或股权。人力资源顾问可以由上述公司提供，或者你可以聘请一位能帮你管理这些系统和团队的顾问。寻找一位希望建立可重复流程的顾问，而不是凡事都手动操作或替你包办。那通常不是为你提供服务的那些公司中的员工。\n\
  \n一旦你的员工数达到 20 人左右，并且打算继续扩张，你就需要聘请一位全职的人力资源主管。这个人的职责是帮助你建立卓越的新员工入职系统，改进顾问之前帮你搭建的所有流程，并让公司走上快速增长的轨道。在某些州，法律可能要求你在雇佣第\
  \ 51 名员工时必须配备此职位，但除非你很幸运，否则如果你没有在公司拥有第 51 名员工之前很久就聘请到这个人，那么不付出切实努力去建立可重复的入职和人力资源系统，你很可能无法发展得那么快。\n\
  \n\n\n### 在哪里发布你的招聘信息\n\n现在你知道了自己需要什么样的人才，是时候去寻找他们了。在哪里发布职位描述可能会定义你的公司形象，以及你将招募到的员工类型。有几个不错的平台可以免费发布职位描述。在苹果生态圈内，这可能意味着专门的供应商网站，或者如果在那里找不到合适的人选，你也可以选择在更通用的平台发布。考虑一下这些渠道：\n\
  \n- **Slack**：`MacAdmins.org` Slack 频道设有专门的 `#jobs-board` 和 `#jobs-chat` 子频道，你可以用来寻找潜在员工和发布职位。你也可以点击你感兴趣的人，通过阅读他们之前的帖子来了解他们的风格。在我看来，这是招聘苹果技术人才时发布技术职位的最佳场所。\n\
  \n- **Jamf Nation**：在开始这部分之前，我要说明我在 Jamf 工作。但即便在我加入 Jamf 之前，我也经常阅读 Jamf Nation 上的帖子，并根据人们在那里所做的贡献招聘了许多人。\n\
  \n- **留言板**：Jamf Nation 是一个留言板，但还有其他类似的。通过阅读人们在 `afp548.com` 等网站或个人博客上贡献的文章，我也招聘了不少人。这是寻找员工比较正规的方式之一。不过，除非你被允许，否则不要随意发帖，否则可能会被标记为恶意垃圾信息发送者。\n\
  \n- **领英**：领英允许你根据特定条件搜索人才。但你需要一个高级账户才能与他们建立沟通渠道，除非你知道他们的电子邮件地址。这是我最喜欢的招聘方式之一，高级账户每年的费用也相当低廉。然而，人们可能不查看消息，或者并不在积极找工作，也有可能觉得你是发垃圾信息的。\n\
  \n- **Indeed、CareerBuilder 和 Monster**：在我所在地区，快速搜索 macOS 就能找到几十个职位发布和大量简历。缺点是你会与大公司竞争，这会使招聘成本变得相当高。不过，这也是如今传统的招聘方式，至少当你与求职者沟通时，你知道他们确实是在找工作。\n\
  \n- **Craigslist（以及其他分类广告网站）**：我把这个留到最后说，因为我在这个平台上挣扎过。你可能会收到大量回复，其中很多甚至与你想要的人才相差甚远。但我也通过这些渠道找到了很多（非常多）人，这使得付出的成本和时间是值得的。\n\
  \n你也可以考虑浏览 `macenterprise` 这样的邮件列表或苹果顾问网络（Apple Consultants Network）的邮件列表。或者，通过口口相传在你的个人人脉网中寻找潜在员工。口口相传是迄今为止寻找员工和客户的最佳方式，但随着时间的推移，你会发现这些人脉资源会枯竭（除非你是一位真正出色的雇主）。\n\
  \n### 撰写职位描述\n\n我喜欢基于工作说明书来开始构建职位描述，这些说明书用于沟通某人实际在岗位上要做的工作。工作说明书就像一份与员工的合同，列出了该职位的职责和任务。它为绩效考核、加薪等提供了良好的指导。随着公司的发展，工作说明书对于员工职级划分（例如，技术员\
  \ 1 级和技术员 2 级的区别）、绩效改进计划（这对从新员工到工作中遇到挑战的员工来说都是极好的工具）以及帮助员工规划职业道路的一对一谈话等都至关重要。\n\n\
  然后，你可以把那份任务清单（通常以要点形式列出）复制粘贴到你的职位描述中。不过，我不喜欢在描述中使用过多要点，因此你可能会需要将它们改写成连贯的文字。你肯定需要一些要点，但尽量侧重于描述某人将要做什么的文本，并包含该职位可能存在的成长空间。在提及你的公司为何是一个优秀的工作场所时，不要埋没重点。确保你指出所有福利，并说明咨询工作是在整个苹果设备管理市场积累经验的好方法。\n\
  \n一旦你写好了某人将要做什么以及他们为什么想在那里工作，请重新审视你所写的内容，并思考竞争对手能从你的描述中推断出你的业务运作方式。避免在职位描述中讨论薪资。这会让竞争对手了解他们可能需要支付多少薪水来挖走你的员工。同时也要注意，提及特定技术可能会缩小能够申请该职位的人员范围。有些技术比其他的更难掌握。因此，如果你正在使用\
  \ Kaseya 或 Jamf，那么有相关经验会非常好，但像普通的云解决方案或较易上手的技术（如 Meraki）则最好避免提及。相反，应使用诸如“在路由技术方面有扎实基础”或“对监控技术有全面理解”等措辞。\n\
  \n\n\n## 简历筛选\n\n发布招聘信息后，就该开始筛选简历了。这是招聘流程中我最喜欢的环节之一。过去每发布一个职位，我都能收到 100 份简历。其中很多可以轻松忽略。例如，如果你要找的是入门级\
  \ Mac 桌面支持人员，那你很可能不会为来自其他国家的人办理签证（你可能会惊讶我收到过多少这类简历）；或者，如果你要招聘一位经验丰富的 macOS 和 iOS\
  \ 支持工程师，你很可能不想面试一个仅在主题公园做过场地维护的人。但我经常能收到五六份这样的简历。\n\n多年来，我学到了一些技巧，避免把无数时间花在面试候选上。我们来审视一下简历中值得留意的要点。\n\
  \n-   避免感染文件。如果你收到带病毒的文件，对我们这个行业来说，这基本上就是一票否决。\n-   留意他们只见过一次的技术（或者你可能没见过，但或许见过，或许讨论过却没见过）。通常，一个罗列不同技术的项目符号列表会很难梳理。通过标注简历或在打印版简历上做笔记来准备面试技术问题。许多人会列出一大串技术，以便通过自动化简历审核系统的搜索条件。\n\
  -   避免过度纠结于晦涩的技能和技术。是的，某人可能作为 COBOL 程序员工作了 10 年，但最近 2 年用的是 Swift。专注于你需要的技能以及这些技能最近的运用情况。\n\
  -   简历中良好的语法可能意味着发给客户的电子邮件中也有良好的语法。如果候选人连简历都懒得检查拼写，他们很可能也不会检查邮件中的拼写，或者在意语法错误标记。我写书（显然），所以对拼写错误有点敏感，尤其是当发送给我的文档中，拼写错误被难看的波浪线标出来时更是如此。但这种对细节的关注正是你希望在简历中看到的。\n\
  -   寻找简洁的描述。一份长达 30 页、事无巨细描述每次拨打支持电话解决故障过程的简历，是一个巨大的危险信号。简洁沟通的能力（无论是书面、电话还是当面）是招聘时最被低估的求职技能之一，无论这本书里絮叨了什么。请记住，你会收到这个人发来的大量邮件。如果每封都有四页长，你会浪费很多时间。\n\
  -   优先看认证而非高等教育。虽然苹果在慢慢削减其培训项目（你当然仍然可以获得认证），但市面上还有很多来自 Jamf、FileWave、VMware 和谷歌等厂商的认证。当然，大学教育有其价值，但认证通常表明潜在员工具备更符合你需求的特定技能。\n\
  -   查看电子邮件地址。是的，我对谷歌居然能提供一些我见过的邮箱地址感到好奇，但候选人在没有创建一个干净的账户方面缺乏良好判断力，这可能令人担忧。\n-  \
  \ 阅读求职信。你通常能从求职信中学到比从简历中更多的信息。\n\n你会有自己的评判标准，并且你的标准会比我的更适合你的用途。而且每个职位都不同（例如，你不会在招聘会计时寻找`python`技能）。但这应该能帮你入门。要有耐心，有很多优秀的人才正在找工作！\n\
  \n我喜欢分批处理所有简历。在业务高速增长期，我往往要下班回家后才能获得片刻难得的独处时间来审核简历。但我一直确保在招聘上保持推进，因为优秀的人才很快就会被别人录用，所以你必须采取行动才能招到人。当你需要员工时，你通常都很忙，因此在招聘流程中保持势头至关重要。\n\
  \n## 面试\n\n面试是超越简历，审视每位候选人，判断他们是否符合你希望公司拥有的文化，以及是否能为该职位带来恰当技能水平的过程。但面试的意义不止于此：面试为你在候选人整个任职期间与他们的关系定下了基调。在本节中，我们将探讨面试流程的两个方面。我们将从电话筛选求职者开始，然后转向现场面试。\n\
  \n### 电话筛选\n\n电话筛选是与候选人进行的一次简短通话，目的是确保你想邀请他们来参加面试。发送电子邮件或通过简历附带的联系方式联系对方，作为安排电话筛选的首次尝试。你也可以直接打电话，问对方是否有几分钟时间讨论这个职位，或者他们是否更倾向于另外安排时间。\n\
  \n电话筛选应该轻松随意。你不会给候选人看一张路由器截图或一段`swift`代码片段，然后让他们指出问题所在。但你确实可能需要核实简历中的一些细节，确认必要的技术能力，并评估候选人的电话沟通风格。在电话筛选中，我通常会根据职位问一系列问题，包括：\n\
  \n-   重申职位描述中的前三或四个要点\n-   提出任何能够发现你在寻找的性格特点的问题\n-   观察是否有学习意愿\n-   考察可能不在每个具体职位描述中的核心能力\n\
  -   这是询问对方目前薪资（除非你所在州禁止）和期望薪资的正确时机\n-   为什么对我们公司感兴趣？\n\n#### 备注\n\n我通常将电话筛选控制在 30\
  \ 分钟内，但你也可以延长。\n\n当你完成电话筛选后，通常就会知道是否想邀请候选人前来面试了。如果你想面试他们，最好在筛选结束时就直接安排面试，以便尽可能减少招聘流程中的延迟。关于时间安排没有硬性规定（我试过当天面试，也试过一个月后），只是不要给候选人施加特定时间的压力。确保候选人有充足的时间在处理完日常工作后赶到你的办公室。\n\
  \n\n\n### 面对面面试\n\n我们在潜在员工身上寻找的特质各不相同。但以下是我在面试时始终会关注的一些方面。\n\n-   **仪表**：不能以貌取人。但你能看出一个人是否会天天上班迟到。面试时，我会留意从指甲到着装再到发型的一切。为了合适的员工，我可以克服第一印象带来的偏见，但本不该如此。\n\
  -   **守时**：应聘者应提前约 5 分钟到达。如果他们连面试都会迟到，那么很可能会在与客户会面时迟到。我能理解交通拥堵之类的情况，但预留出充足的时间（即使遇到堵车）也很重要。我会立即放弃任何打电话来的人。因为意外总会发生。\n\
  -   **携带简历副本**：我并不需要，但我欣赏有人能带着简历副本前来，这体现了他对细节的关注。这会让我觉得，以后不会在某台服务器上发现一个空易拉罐。\n-\
  \   **紧扣主题的能力**：你提问时，希望应聘者保持专业和简洁。开头寒暄几分钟没问题，但如果候选人在面试中能紧扣主题，那么我就能假设他们和客户沟通时也能做到这一点，不会接到电话投诉他们过于健谈。\n\
  -   **紧张**：我非常理解紧张时的絮叨。我认为这恰恰说明他们想要这份工作。如果候选人能保持微笑，那就更好了！\n-   **说谎**：现在，我假设人们在简历上会说谎。但如果我在面试中发现有人在说谎，我会直接结束谈话，说再见，仅此而已。\n\
  -   **敢于说“不知道”的能力**：招聘技术岗位时，要问技术问题。不知道答案很正常，好的候选人不会胡编乱造，而是会告诉你他们不知道问题的答案，但会说明自己会如何去找出答案。\n\
  -   **关闭手机**：至少关掉铃声。最好是开启飞行模式。如果面试时手机响了，我会有点烦躁。如果有人在面试时接听电话，那么我会期望他是在接听伴侣分娩的消息。\n\
  -   **不要谈论宗教或政治**：这一点本可以归入第 8 条，但并非如此。请记住，我们生活在一个在这些话题上几乎对半分裂的国家。\n-   **询问候选人为何想要这份工作**：这总能引出不错的回答。\n\
  -   **询问候选人有什么与众不同之处。**\n-   **不要讨论性取向、年龄、种族，或其他任何可能被视为歧视的话题。**\n-   **观察候选人是否提问。**\
  \ 如果他们做过功课，并能提出相关的问题，那么说明他们对这个职位感兴趣。\n\n最终，当你找到合适的员工时，你自然会知道。当然，有时会面临艰难的决定，但如果你做得都对，那么艰难的决定也是在那些潜力巨大的优秀员工之间做出选择！\n\
  \n## 发出录用通知\n\n正如本章前面讨论过的，可以参考像 `Glassdoor` 这样的网站，或者与外包人力资源供应商合作，来确定招聘时的合理薪酬水平。不过，一个好的起步经验法则是，在你招聘所在地理区域，针对特定职位，薪酬水平在平均收入中位数的上下\
  \ 20%之间浮动。低于 50%可能会招到能力不足、无法为客户提供服务的员工。高于 50%则可能招到工作动力不足、感到无聊的员工。\n\n录用通知应以书面形式发出。请记住，这些通知具有合同约束力。一旦发出录用通知，如果你在员工入职前撤销，你可能会因造成的损失而被起诉。因此，在提供职位之前，一定要确定自己找到了合适的人选。录用通知应包含整体薪酬方案，明确说明财务待遇中哪些是保障性的，哪些（如果有的话）是可变收入（如佣金）。我建议只在财政年度开始时修改员工的薪酬方案，并且这些变更应提前充分沟通。\n\
  \n录用通知可以附带条件，比如通过背景调查。所有咨询公司都应当进行背景调查。这并不意味着药物测试之类的事情。而是意味着，在将员工派往学校、家庭或企业之前，要确保你了解你派遣的是怎样的人。这样做还有一个额外的好处，就是能满足某些客户的要求——要求现场工作的承包商必须通过背景调查。一旦你雇用了某人，再去强制进行背景调查会非常困难，所以务必在录用通知书中包含这项要求。另外，你可以选择忽略背景调查中发现的一些问题；这是你的特权。\n\
  \n最后，合同很重要，我喜欢将接受保密协议等文件作为发出录用通知的前提条件，所以你也可以选择将这些文件放在招聘材料包中一并发送。\n\n## 新员工入职\n\n\
  每当你招聘新人时，你都希望做得更好。如果你经历快速增长期，这一点尤其必要。因此，第一次就要记录下整个流程。这样你就可以开始记录每次需要做的事情，就像一个检查清单。我喜欢以一种包含里程碑和日期的方式来规划方案（显然我喜欢用书面形式），并将这些内容放到学习管理系统（`LMS`）中，例如软件即服务（`SaaS`）产品\
  \ `Litmos`，或者像 `Trello` 或 `Wunderlist` 这样的列表应用/网站。\n\n\n\n#### 注意\n\n请牢记，如果这些系统能与你的工单管理系统集成，让团队能尽可能轻松地跟踪时间，那就太棒了。\n\
  \n一个典型的入职计划可能包括以下内容：\n\n*   **第 1 周**\n    *   签署合同，例如竞业禁止协议、可接受使用政策等（除非这些已在入职第一天之前处理完毕）。\n\
  \    *   回顾组织的使命、愿景和价值观。我们在本书中其实不会过多讨论这些，因为它们往往被赋予了过多的篇幅，但即便你可能没有将这些成文规定，你也应该与新员工就此进行交流，以确保公司的基因能如你所愿地延续下去。\n\
  \    *   为公司网站撰写个人简介。这能让你的客户对这位即将出现在他们面前的新人有所了解。如果可能，请附上照片。\n    *   填写所有必需的人事文件，例如\
  \ W2 表格、健康保险登记等。我非常不喜欢要求员工在非工作时间处理这些，因为这开创了一个不好的先例。\n    *   与资深工程师一同进行数次现场跟岗实习（如果这是你招聘的第一位员工，则由你亲自带教）。\n\
  \    *   接听服务台电话。我坚信，咨询公司的每个人都应该花一些时间在服务台工作。这能让员工接触到最广泛的客户群体，并传递出关于组织内劳动分工的微妙信息。\n\
  \n*   **30 天**\n    *   明确你希望员工何时能够独立接手工作。这一点很重要，因为这能让员工了解他们在客户互动方面是否符合你的期望。\n \
  \   *   按时提交费用报告。审查任何与费用、里程等相关的问题。\n    *   快速关闭工单，并附带良好的详细信息。审查优秀的工单记录以及那些可能有所欠缺的记录。\n\
  \    *   可能要取得各种技术认证。\n\n*   **60 天**\n\n我喜欢在此处加入对员工的可量化和可质化的反馈，例如：\n    *   潜在计费配额的完成百分比。再次强调，确保员工了解他们如何实现你的期望。\n\
  \    *   客户满意度评分。这有助于员工了解客户如何看待他们。如果你还没有追踪客户满意度的工具，我强烈建议你探索网上众多的调查站点，并重点寻找那些可能与你的事件跟踪系统集成的工具。\n\
  \    *   生成内部资产，例如知识库、博客文章、客户建议等。\n    *   掌握内部系统，例如工单系统、知识库等。\n\n在达到 60 天这个里程碑之后，你应该能够与员工坐下来，共同制定一个更长期、更定制化的计划，使他们能够在行业中找到自己的专长，并朝着他们在工作中、职业生涯中以及总体人生规划中更具体的目标努力。\n\
  \n每次招聘时，都要迭代这份检查清单，以便你能在让每位新员工快速上手方面做得更好。需要关注的一些事项包括：\n\n*   员工是否按照你预估的时间，朝着达成各个里程碑的方向前进？\n\
  *   每位员工觉得哪些内容难以理解？\n*   你不得不教授哪些此前未曾记录的流程？\n*   哪些流程你可以通过书面文档而非口头讲解来传达，以避免对流程和步骤产生可能的误解？\n\
  \n在未来的业务快速增长期，如果你需要同时让多人入职，那么严谨的入职流程将会带来巨大的帮助。最终，我曾在我创建的名为“Year One”（是的，明显是从蝙蝠侠那里抄袭来的）的项目中积累了太多教条，不得不重新评估整个项目。这就是创造与毁灭的一部分。\n\
  \n## 用于入职的 Wiki\n\n我们许多人使用 Wiki 风格的解决方案或门户来构建入职文档。像 Confluence、Sharepoint 站点、Google\
  \ Docs（串联起来）等工具，以及其他替代方案，正越来越有效地帮助组织沟通标准操作程序、复杂思想、会议记录，以及组织需要存储的任何其他信息。\n\n随着站点的增长，它们会变得混乱。风格、一致性、流程、结构和指导原则，以及语法等方面，都会变得更为重要。你可以做很多事情来让页面变得更好，而无需添加花哨的动画效果。让我们看看我多年来发现的一些重要原则：\n\
  \n*   **不要埋没重点。** 任何超过 500 字的页面都应添加引言。\n*   **使用不同的标题层级。** 我喜欢在大多数文档的开头先写一个大纲。这个大纲会变成标题，有时也会成为特定段落的引言。这样做还能让你在开始向文档中输入内容之前，就先构建好这些标题。\n\
  *   **使用目录。** 并非每个页面都需要目录。但如果你无法在一屏内看到页面上的所有标题，我建议你让浏览整个页面变得更轻松。\n*   **拼写和语法很重要。**\
  \ 是的，我知道，你用那个设计精美的页面向大多数人传达了你的观点。但也有不少人为了忽略那个明显的“their vs. there”错误，或者那个包含了 16 个逗号（还是说那是“comma”？）的\
  \ 5 行句子而困惑了许久……组织内部的文档可能不需要完美无缺，但在不流失读者的同时，它确实有助于让你看起来更专业。此外，在整篇文档中使用一致的叙述主体和时态；否则，大多数人很快就会感到困惑。\n\
  *   **添加分节线。** 你知道文本中那些可爱的小水平线。它们有助于读者理解在章节之间跳转。或者，考虑使用不同的页面结构。但我很少见到超过两列的页面（或更多）不应该被拆分为独立页面的情况。\n\
  *   **使用粗体，但不要过多。** 我喜欢用粗体来表示强调。毕竟，这就是粗体的用途。我**从不**使用全大写，除非文章包含首字母缩略词（此时在首次使用时定义该缩略词并将其放在括号中），或者该词在我引用的截图中就是大写的。在列出缩略词时，字母之间无需加上句点。\n\
  *   **在记录软件时，引用屏幕上的文字。** 例如，如果屏幕上显示“Click here to start”，而你的句子中包含“click on Click\
  \ here to start before you”这样的字符串，那么无论这个句子里还有什么其他内容，读者都会完全迷失。此外，如果记录的是命令行界面，请使用不同的字体来区分文章正文与输入输出内容。\n\
  *   **使用项目符号和编号列表。** 如果你在文档中添加分步骤说明，请使用编号列表（这便于将来通过编号引用步骤）。如果你正在编写一个段落，并且有超过三个支撑论点的内容，那么考虑将它们移到项目符号列表中。如果你在一个句子中构建的列表包含超过三到四个项目，也请考虑将这些项目移到项目符号列表中。\n\
  *   **为图片添加注释。** 哦，还要使用图片。但是如果你使用了图片，为它们添加注释将使读者更容易找到你在文中指代的内容。\n*   **关注评论。** 准备好在你点击保存新页面或文章的那一刻就收到评论。许多人会监控公司内网或网站特定部分中包含某个标签的所有文档的更新动态。然后，评论就会纷至沓来。与其强迫人们在评论中大海捞针，或者假设整个公司都会费力去阅读这些评论，不如在适当的时候更新文章内容（例如，每当有人提出一个问题时）。我喜欢为此使用\
  \ FAQ 部分。\n\n\n\n*   总结长而复杂的过程。任何需要在屏幕上点击超过 10 次或包含超过 10 个步骤的过程，都应事先包含一个摘要。过程越长，每一步中包含的信息就应该越少。你放入每一步的信息（即文本）越多，就越应该考虑添加图片、思维导图或流程图，以帮助读者不迷失方向。\n\
  \n*   使用更简单的词语。记住，并非每个人都能轻易理解你为了取悦他们、让他们相信你很聪明而使用的丰富词汇。在可能的情况下使用简单的词语，并尽可能采用简单的句子结构。\n\
  \n*   保持简短。一篇维基文章通常不应超过 1500 个单词，除非它在定义一个复杂的过程。并且每个句子应足够简短，以至于不需要结尾标点（想想语法良好的推文！）。记住，你可以链接到其他文章和页面。在任何可能的时候都要利用这一点。\n\
  \n*   为页面添加标签。许多内部文档系统允许用户关注带有特定标签的页面，或将带有给定标签的页面内容插入到其他页面中。为页面添加标签也能让你在怀疑自己是否已经写过某个主题或过程时，更容易找到它们。\n\
  \n*   时不时地保存。是的，大多数系统会自动每隔几分钟（甚至每次你点击时）保存一次。但并非所有系统都这样。尤其是在全新的页面上，你实际上还没有点击过那个“保存”按钮。\n\
  \n如今没有人愿意删除任何东西！但请定期审查并重新组织你所在组织或团队的站点。优先级会改变，任务会完成，职责会来也会去。定期重新审视你的内容结构有助于你在数据蔓延和内容过时之前做好准备。\n\
  \n## 一对一会议\n\n每位管理者都应定期与团队成员会面。这些会议有各种名称，例如检查会议和一对一会议。这让你能够了解员工的情绪，看看他们是否享受工作，并了解你能做些什么来帮助他们成为最好的自己。\n\
  \n每个人对会议内容都有不同的看法。我喜欢按以下方式进行：\n\n*   询问事情进展如何。确保保持亲切，即使你有议程。同时，确保你对他们的个人生活有所了解。但不要做作；要真诚。\n\
  \n*   沟通组织中的任何变化（人员配置、架构调整、新客户等）。\n\n*   回顾任何杰出成就的领域或需要改进的领域（最好用成就来“包裹”问题领域）。\n\n\
  *   回顾实现个人化学习计划（在本章下一节中描述）的步骤。\n\n当员工忙于处理客户现场事务时，一对一会议很容易被忽视。请不要这样。即使你需要调整会议时间，也要坚持定期的检查会议。你可能会忍不住在非工作时间安排这些会议，但也不要这样做。你已经承诺雇佣某人并指导他们的职业发展，虽然你当然可以在下班后喝杯咖啡或饮料，但通过在工作时间处理工作事务来展示持续承诺。\n\
  \n## 培训\n\n对于繁忙且不断成长的公司（也就是那种正在招聘并需要创建培训资料的公司）来说，建立良好的培训计划可能是一个挑战。创建新材料非常耗时，并且通常只能由特定团队成员完成。随着你的资料库增长，保持培训材料的最新状态可能会占用大量时间，尤其是在苹果公司每年发布一次更新的情况下。尽可能利用现有材料，以将维护工作量降至最低。\n\
  \n### 个人化学习计划\n\n我喜欢明确规定员工将如何使用培训时间和预算。这通常以个人化学习计划的形式进行。这些计划列出了培训的优先事项，以及实现这些优先事项的策略。我喜欢在学习计划中包含以下项目：\n\
  \n*   你希望改进的三个领域。这是计划中最重要的部分。每位员工想学习什么？计划的其余部分将跟踪如何实现目标。我通常倾向于三个项目而非一个的原因是，这提供了灵活性和一定的多样性，这样当人们在某个领域感到疲倦时（或者更好的是，完成了一个领域），他们可以转向另一个领域。最好这些领域在某种程度上是相互关联的。\n\
  \n*   在每个领域取得精通的季度目标。我希望这些目标是 SMART 的（即具体的、可衡量的、可实现的、现实的和有时限的）。\n    *   **具体的**可能意味着某人编写一个执行特定任务的脚本。\n\
  \    *   **可衡量的**可能意味着你期望每项任务都有一篇博客文章或一项外部认证。\n    *   **可实现的**意味着员工确实能够完成它（而不是你说“去写一个\
  \ macOS Server 的替代品，并在周五之前获得 CCIE 认证”）。\n    *   **有时限的**意味着目标可以在分配的时间内完成。\n\n*\
  \   你是否在记录职业发展活动日志？职业的意味着这不是关于爱好，而是关于工作。对我来说，这里的关键词是发展。每个人正在做什么来提升自己？希望这些活动与公司目标一致，但并非必须如此。\n\
  \n*   你希望自己的下一个职位是什么？最优秀的员工会诚实地回答说你的职位。但并非每个人都真正了解摆在他们面前的职业领域。许多人只想在技术领域不断深耕。有些人则希望追随销售领域的高薪。其他人会诚实告诉你他们想创办自己的公司（但大多数人会撒谎说他们只想“变得更好”——尤其是那些有\
  \ MBA 学位的人）。这个问题的目的是为了跟踪如何将培训和你对员工的期望与团队成员个人的意愿对齐。\n\n*   你觉得你距离下一个职位还有多远？这是一个很好的早期预警信号，表明人们是超前于还是落后于自己的计划。请记住，这些感受会随着外部动因的变化而改变。\n\
  \n*   同行教练反馈：一旦团队足够大，你可以使用同行教练系统让团队成员互相帮助。这让你能有更多时间审阅反馈，同时也能让你看到团队成员如何应对有限的领导形式。\n\
  \n*   活跃的研究项目：这些项目是本文档前面 SMART 目标的一部分。最优秀的工程师通常在这个部分最有乐趣。\n\n*   自上次会议以来取得了哪些进展？我喜欢把这看作是版本控制。“什么发生了变化”比阅读每一行要容易得多——尤其是当你需要筛选\
  \ 20 到 30 行内容时。\n\n随着时间的推移，计划会变得冗长。这是不好的。你引入的教条越多，人们从旨在关注他们自身的一对一会议和其他会议中获得的东西就越少。保持培训计划简短，只需包含足够的细节来解释目标是如何达成或未达成的。请记住，如果目标未达成，那么计划中某个你并不在意的小细节很可能会成为被责备的对象！\n\
  \n\n\n### 分层培训资产\n\n每次需要构建内容时，不必重新发明轮子。实际上，尽可能搜索并购买现成的资产。你的特定培训内容可以叠加在这些第三方材料之上。例如，与其自己制作关于`macOS`的课程，不如从\
  \ Peachpit Press 购买一本 Apple 培训系列书籍放入公司图书馆，然后在需要时针对其中特定部分制作一份测验文档。\n\n随着业务增长，你需要在各种不同的地方记录更多内容，有一些方法可以让追踪和培训变得更轻松。其中一些方法只是关于如何管理内部系统以及制定文档标准，从而让你有更多时间专注于实际的产培品训。\n\
  \n- **将系统纳入资产管理和追踪系统的标准化方法**：当无法在同一个视图中找到所有所需资产时，确保有一种标准化的方法来查找所需内容至关重要。\n- **你的命名规范**：你如何为计算机命名（例如，是`clientcode-sitecode-devicecode`吗）？你如何为服务器、防火墙、交换机、打印机等设备命名？命名规范是否因客户而异？\n\
  - **哪些工具存储哪些类型的信息？** 许多人最初会使用电子表格来追踪 Apple DEP 账户的密码或登录客户站点防火墙的 root 密码，也常以电子表格或简单数据库起步。当需求成熟且合规性成为问题时，可以寻找诸如`IT\
  \ Glue`之类的工具。\n- **你希望团队如何与客户互动？** 别忘了记录你在客户沟通中看重的方面。这可能在技术宅工程师看来显得软弱、模糊，没什么价值。但即使被嘲笑，明确你期望的客户服务水平也是值得的。\n\
  - **如何为客户提供尽可能多的价值？** 多陪客户 15 分钟能让他们更成功吗？有时确实如此。你必须为此收费吗？并非总是如此。你是否应该记录一些让团队让客户满意的方法？当然！\n\
  \n这些问题很容易记录下来，并且不会随软件新版本的发布而频繁改变。对第三方培训资产的关注则是在此基础上叠加的。我们将在本章后续部分探讨其中一些，但以下是几个值得关注的第三方资产：\n\
  \n- Apple 官方培训材料\n- WWDC 视频及各类会议视频\n- Lynda.com\n- O'Reilly 的 Safari Books Online\n\
  - 热门博主的各种网站\n- 开发中间件（可能对你的组织有帮助，并且你或许能贡献代码）的人的 GitHub 页面\n- 关于 Apple 技术（如`macOS\
  \ Server`、批量管理等）的 YouTube 视频\n- 办公室图书馆中的纸质书籍\n- 第三方认证的“脑图”资料\n\n在本节的剩余部分，我们将解析其中一些内容，以便你将其纳入整体培训组合。\n\
  \n## 会议\n\n曾几何时，有 MacWorld 大会。它规模宏大、风格大胆，Apple 也参与其中。那时还有一本同名的杂志实体版会寄到我家。但时代变了。虽然有些代表会参加多个会议，但许多参会者已分散到更小的会议中，这是\
  \ Apple 生态系统微观经济向宏观经济发展带来的结果。如果你要派员工参加任何会议，下面是一份快速而粗略的指南。\n\n- **[ACES Conference](https://acesconf.com/)**：ACES\
  \ 是面向 Apple 顾问的会议。通常在五月举行，地点从新奥尔良转移到凤凰城，以及会议组织者未来的任何选择。对于许多经营 Mac 咨询业务的人来说，ACES\
  \ 是一个很好的入门会议，参会者多为美国和加拿大较大且更成熟的 Apple 咨询公司。\n- **AirWatch Connect（现称 VMworld）**：[AirWatch\
  \ Connect](http://air-watch.com/connect/)会议实际上在多个城市举办。如果你的组织大量使用 AirWatch 来管理设备，这是一个很棒的会议。\n\
  - **[Filewave Conference](https://www.filewave.com/the-news/filewave-alliance-conference-save-the-date)**：传统上在苏黎世和印第安纳波利斯举行，FileWave\
  \ 会议专注于 FileWave 产品，为系统管理员提供接触开发者、获取部署信息等的机会。\n- **[JAMF Software 的 JNUC（JAMF Nation\
  \ 用户会议）](http://www.jamfsoftware.com/events/jamf-nation-user-conference/2015/)**：该会议主要面向使用`Jamf\
  \ Pro`管理 Apple 设备的 Apple 管理员。会议包含一些通用管理主题的环节，例如什么是`plist`以及通用 Shell 脚本。如果你大部分时间都在使用`Jamf\
  \ Pro`，那么这是一个很棒且免费的会议，每年秋天在明尼苏达州明尼阿波利斯市举行（本着充分披露的原则，我负责管理为各个主题选择演讲者的小组）。\n- **JAMF\
  \ 的 Roadshow**：[JAMF Roadshows](http://www.jamfsoftware.com/resources/jamf-nation-kicks-off-roadshow-event-series-in-a-city-near-you/)通常是免费活动，JAMF\
  \ 会在美国各地举办为期一天的迷你会议，面向客户和系统管理员。\n- **Mac Admin and Developer Conference UK，由[Amsys](http://macad.uk/)主办**：[MacAD](http://macad.uk/)\
  \ UK 是面向 Apple 管理员和开发者的会议，包含大量高技术水平的内容，每年在伦敦举行。\n- **[MacDevOps YVR](http://www.macdevops.ca/)**：MacDevOps\
  \ 会议的议题涵盖从协作到 Puppet-as-a-Service（另一种 PaaS）、Docker、Munk、Python、Casper、git、VMware、Chef、Jamf\
  \ 等，这个会议绝对适合 Mac 社区中热衷于系统自动化的脚本高手，顾名思义，也适合 DevOps。\n- **[MacSysAdmin](http://macsysadmin.se/)**：在瑞典，关于\
  \ Apple 的一切。MacSysAdmin 总是有大量优质内容，且视角比大多数美国会议更具全球性。\n- **[MacTech](http://www.mactech.com/)**：Ed\
  \ Marczak 精心策划了这次会议，其重点在于大规模系统管理。对于了解环境如何发展（如果你正在成长）很有帮助，或者可以为你的成熟环境获取一些非常好的技巧和诀窍。\n\
  - **[Mobile World Congress](http://www.mobileworldlive.com/)**: 我通常觉得这类展会上的与会者技术性较弱，更偏向业务分析，对“为什么”和结果比“如何做”更感兴趣。这是一个很好的群体，但与那些将所有时间花在系统集成上的人不同。\n\
  \n\n\n## 会议与社区资源\n\n## 会议\n\n*   [Penn State MacAdmins Conference](http://macadmins.psu.edu/)：Penn\
  \ State Mac Admins 诞生于 WWDC 和系统管理主题充满不确定性的时期。如果你参与了 Penn State 运营的著名的 MacEnterprise\
  \ 邮件列表，并且发现其中的讨论与你的工作相关，那么这个会议很可能值得你参加。而且它的定价也很合理！\n*   [University of Calgary MacDeployment](http://macdeployment.ca/resources)：这被定位为更偏重实践的工作坊（目前暂停一年），但值得关注，因为它曾包含许多优质内容，并为加拿大的\
  \ Mac 管理员提供了一个很好的集中学习新技巧和窍门的地方。\n*   [Usenix](https://www.usenix.org/)：我认为这是一个非常适合\
  \ Unix 爱好者的盛会。其中涵盖的许多主题与 Mac 管理员高度相关。\n*   [WWDC](https://developer.apple.com/wwdc/)：众所周知，这是苹果公司的全球开发者大会。但如果你使用\
  \ `Munki` 或第三方工具来管理系统，并且不编写代码，那么你可以通过在线观看会议视频，并将宝贵的继续发展/培训资金用于参加其他会议。\n*   [X World](https://auc.edu.au/xworld/about/)：作为澳大利亚\
  \ AUC 的一部分，X World 涵盖了从 `Munki` 到 `Casper` 的各种主题。最初这是一个非常侧重教育的会议，来自澳大利亚各地的苹果管理员聚集在一起分享知识，并从他人那里获取管理大量苹果系统的信息。组织者和与会者都是非常棒的人，适合与他们交流。这是个极好的社交活动。我强烈推荐如果你是澳大利亚的\
  \ Mac 管理员，请通过[成为会员](http://auc.edu.au/membership/)来支持 AUC。\n\n有大量的开发会议。但这本书更侧重于系统管理（尽管许多原则在两者中都容易适用）。如果你想要更多，我还建议你使用像\
  \ `Eventbrite` 或 `Meetup` 这样的应用程序，并搜索你所在的地区。在大城市，几乎每晚都有用户组、聚会等活动。所以职业发展的机会永远不会缺乏。\n\
  \n此外，收听 MacAdmins Podcast（完整披露：我是主持人之一）将为你带来许多关于苹果平台的有趣话题，并为你提供最新的会议列表以及即将举行的会议信息。\n\
  \n### 聚会\n\n聚会是全国各地举行的本地会议。我在 `krypted.com` 维护一个聚会页面，因为世界各地总有新的和即将举行的聚会。你也可以在 MacAdmins\
  \ Podcast 的社区日历部分获取每个聚会的详细信息。\n\n截至目前，全球各地的聚会如下：\n\n*   Austin Apple Admins：[`http://www.austinappleadmins.org`](http://www.austinappleadmins.org)\n\
  *   Colorado iOS Admins：[`http://coiosadmin.tumblr.com`](http://coiosadmin.tumblr.com)\n\
  *   Denver Mac Admins：[`http://www.meetup.com/Denver-Mac-Admins/`](http://www.meetup.com/Denver-Mac-Admins/)\n\
  *   London Apple Admins：[`http://www.londonappleadmins.org.uk`](http://www.londonappleadmins.org.uk)\n\
  *   MacAdmin Monthly：[`http://www.macadminmonthly.org`](http://www.macadminmonthly.org)\n\
  *   MacSysAdmin Bier：[`http://macsysadmin.ch`](http://macsysadmin.ch)\n*   MacBrained：[`http://macbrained.org`](http://macbrained.org)\n\
  *   MacDMV（华盛顿特区大都会区 Mac 管理员组）：[`http://www.macdmv.com`](http://www.macdmv.com)\n\
  *   Perth Apple Admins：[`http://www.meetup.com/Perth-Apple-Admins/`](http://www.meetup.com/Perth-Apple-Admins/)\n\
  *   Philly Mac Admins：[`http://www.meetup.com/Greater-Philadelphia-Area-Mac-Admins/`](http://www.meetup.com/Greater-Philadelphia-Area-Mac-Admins/)\n\
  *   Northeast Regional Apple Admins（普罗维登斯）：[`https://www.meetup.com/providenceappleadmins/`](https://www.meetup.com/providenceappleadmins/)\n\
