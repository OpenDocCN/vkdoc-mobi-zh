- "# 收购公司\n\n收购一家公司可以为你的公司注入新鲜血液。你的员工可以因新客户的涌入而充满活力，你的客户也能在你提供的额外服务中发现更多价值。在第 13 章中，我们讨论了出售你的公司。在第\
  \ 14 章中，我们了解了如何转变为兼职所有者。现在，让我们讨论如何通过收购来实现公司的非有机增长。\n\n收购的方法和已被收购的公司一样多。寻找目标公司的方法也有很多种。一种方法是寻找正在市场上出售的公司。另一种方法是寻找那些可能尚未上市的公司。不要将自己局限于与待售公司展开讨论。\n\
  \n不过，在开始之前，先思考一下你收购一个组织的目的是什么。在很多方面，这和第 13 章的内容相反，但建立在我们已讨论过的基础上。所以，首先，让我们谈谈“为什么”，或者说你通过收购实际想要实现什么目标。\n\
  \n\n\n## 制定清单\n\n寻找可能与你理念一致的组织。这些可能是你之前合作过的公司，或者是你在本地的竞争对手。列出一份你能想象与之共事的公司名单，并思考它们能为你带来什么。也许你是一名独立从业者，想用积攒的储蓄收购一家更大的公司。也许你是那家大型公司，想收购这位独立从业者。\n\
  \n我并非总是建议人们列清单。有些人喜欢列清单，有些人不喜欢。但这一次，你真的应该列一份清单。有了清单后，把它导入谷歌表格或 Excel 中，并添加一些列。现在，我们来思考一下，一次收购能为你带来哪些特质。\n\
  \n## 你实际上想收购（或整合）什么？\n\n大多数公司收购另一家公司时，通常是为了获得某些特定资源。当咨询公司收购其他咨询公司时，重点通常是现有客户、人才、技术、品牌形象和/或供应商合同（根据我的经验，顺序大致如此）。我们来逐一分析。\n\
  \n*   **客户**的价值取决于合同。为什么这么说？因为在过渡期间，客户可能会随离职员工流失（包括通过收购加入的员工）。与其仅仅为了客户而收购一家公司，不如考虑雇佣更多销售人员、竞争对手的员工，或者直接积极争取他们的客户。\n\
  \n*   **人才**：苹果平台的人才比其他平台更难寻找。苹果咨询专业知识是一个不断增长的市场，但组建团队或找到优秀员工可能是一项挑战。你可以尝试从现有公司挖角、从新客户那里获取人才、培训新员工，或者从招聘和猎头网站招人——但能够聘用到两到三名或更多能立即投入工作的工程师（尤其在交易中你也获得了客户的情况下）的价值是无法衡量的，因为他们既能用于培训新员工，又能为客户（可能随交易一并获得）提供无缝过渡。\n\
  \n*   **技术**通常易于以某种方式复现，除非它已获得专利，或者你尚未完全理解其业务逻辑。然而，对于新项目而言，上市时机至关重要。如果竞争对手能够立即交付你才刚开始构思的东西，那么就要考虑上市成本以及因落后于市场而造成的业务损失。这可能包括面向客户的技术（例如，与客户服务交叉销售的产品，以及已实施的票务系统、客户自动化工具、集成方案、中间件等）。\n\
  \n*   **品牌形象**一直是我难以处理的问题。先发并不代表最好。你通常会多次将不同品牌融合在一起。你也可以推出新产品或服务，并通过媒体造势宣传其新颖性，从而独立建立起一个具有竞争力的品牌形象。但如果市场上已有某种技术或服务，那么合并品牌或将其纳入旗下就相对容易。我在这方面的担忧是，我经常看到人们执着于拥有品牌，而非致力于提供价值。我最喜爱的咨询收购案例之一是\
  \ Geek Squad，它被收购的主要原因就是拥有良好的品牌形象。无论你对百思买门店的人才水平或其品牌有何看法，既然我们和百思买的收入都无法与之相比，他们能将这个品牌扩展到所有门店并从过去被视为专属保修更换部门的区域中获利，这本身就值得赞赏。\n\
  \n*   **供应商合同**可能需要很长时间才能处理完毕。像思科、苹果、微软等大型电脑公司可能要求认证（包括员工资质以及公司或所在地资质）。同时，你需要与供应商保持业务往来或建立稳固关系，才能获得良好的采购信贷额度（别忘了，硬件和软件通常需要先付款，然后在\
  \ 30 到 90 天内收回款项）。但比获取合同更重要的是，获得熟悉这些系统运作、懂得解锁各种 SPIF（销售绩效激励基金）并在那些公司有人脉的优秀人才。当然，你也可以自己摸索，但在这个过程中，你可能损失的价值会远超一次整合或收购的成本。\n\
  \n在运作一次成功的收购或整合时，你希望尽可能地兼顾以上各个方面。每一项都有其价值。别忘了，要尽可能多地吸纳你能获得的一切。所以，不要只是要求新人遵循你的做事方式，而要用心倾听他们的意见，接受任何合理的流程变更，或暂时搁置你尚未准备好处理的问题。\n\
  \n## 接触收购目标\n\n许多关系的基调都取决于它的开端。我想，有些事归根结底是第一印象。也许你已经认识目标公司的负责人。或者你希望第一次与他们见面。无论如何，向某人提出收购其公司是一个微妙的过程。\n\
  \n想象一下，如果有人想收购你的公司。你大概不会去参加欢乐时光，多喝几杯，然后第二天早上醒来就发现公司已经签字易主了。我听过一些故事，其中涉及雇佣私家侦探跟踪目标人物、未经同意进行背景调查，甚至翻别人家里的垃圾。话说回来，我也听说过一些大公司为了招聘人才（或雇佣猎头来做这件事）至少做过上述两件事。\n\
  \n所以，我们别走那么远。假设你只是做一点尽职调查（不涉及侵犯隐私），然后寻找你们共同的人脉。到目前为止，“暖介绍”始终是最好的方式。我不会寻求通过领英或电子邮件介绍（虽然在这个世界上你只能有什么用什么）。我更倾向于亲自介绍——就吃顿午饭，就像婚恋服务说的那样。这让你有机会面对面见到对方。你不必说想收购他们的公司。相反，你可以说只是想见见这位久仰大名的人！\n\
  \n一旦你们见了面，如果你觉得可以开始讨论收购或合并事宜，那么我倾向于透明、直接且尽早沟通。“我们两家公司合为一体，也许能更好地服务客户。你认为我们怎样才能实现这一点？”要直接，但不要咄咄逼人。毕竟，你并没有雇人去翻这个人的垃圾，对吧？\n\
  \n\n\n## 收购的细节要点\n\n任何收购的标准都绝对要从损益表开始。如果有利润，那卖方为什么要出售？如果没有利润也没有盈利计划，那买方为什么要收购？但如果你有通过整合运营来增加收入或削减成本以提高效率的计划，那么只要障碍不是太多（如果不够谨慎，这些障碍可能会压垮你），收购显然会更具吸引力。\n\
  \n一些可能限制负债的问题：\n\n*   能否解除重叠服务的合同？例如：互联网服务提供商、办公空间租赁、`RMM/MSA/CRM` 解决方案的成本、云服务许可、错误与遗漏保险、律师聘用费等。\n\
  *   能否清算不必要的资产？其中最主要的是不动产。如果两家公司都有房产，且彼此距离较近，那么很可能这些房产都是多余的。我从未见过不动产作为收购交易的一部分出现在整合中，但它可能会作为购买时的附带资产出现。\n\
  *   是否存在做同样工作的重叠团队？没有人愿意考虑裁员。在本书中，我一直主张在必要时重新安置员工。对于核心服务，你很可能只需要一个运营团队，而不是两个，这样你就可以将某人重新安排到一个能为客户提供更多价值的全新岗位上。\n\
  *   重叠的面向客户的人才其实是个好问题！如果你遇到这种情况，要么加快招聘更多销售人员，要么，如果你是一家小公司，就背上销售包去实地拜访，因为这是你需要抓住的时机。\n\
  \n我们之前讨论过你希望从收购或整合中获得什么。本节希望能帮助你打磨商业计划，通过建立一个更高效的单一组织，而不是两个独立运营的实体。你越快实现运营效率，你的团队就能越快学会协同工作。不要害怕尽可能多地委派运营事务，这样你就能走到客户面前，最大限度地提高留住他们并了解他们需求的机会。\n\
  \n### 公司文化\n\n文化是运营组织中最被低估的方面之一。拥有良好的文化是激励最优秀的人才为你工作的核心。持久的文化建立在能够团结和激励员工的强大价值观之上。一次收购代表着一个可能摧毁你文化的事件，如果处理不当的话。因此，你需要先问一些棘手的问题。\n\
  \n你能与这些人共事吗？我们在讨论出售公司时并没有真正解决这个问题，尽管在书中我们多次提及文化。但你不希望在你收购的公司内部制造一种对立局面。如果你是自己招聘的团队，那么你知道你可以与他们共事，并且我真诚希望你乐在其中。但这些人不是你招聘的。要向卖方询问员工的情况。\n\
  \n客户在文化上是否契合？我们经常吸纳规模相似和/或理念相近的客户。这也是你可能想收购另一家组织的原因之一——为了摆脱你现有的滩头阵地。但如果你的员工无法与新客户合作，那么你可能需要制定不同的计划。最好在跨过无法回头的门槛（在虚线上签字）之前就了解这一点。\n\
  \n我认为这里没有万全之策。与员工沟通，保持透明。你会找到答案的。\n\n### 合并运营\n\n根据被合并组织的规模，新组织可能在某些角色上不需要人员或供应商。在合并的小型苹果咨询公司中，最明显的可能是会计。如果新实体需要双倍的会计能力，那么你很乐意拥有这些增加的资源。但如果不是，你将面临一些艰难的选择。我们讨论了一些在收购组织之前需要决定的运营方面。\n\
  \n*   系统\n    *   会计系统\n    *   `RMM`、`MSA` 和工单系统\n    *   客户关系管理（`CRM`）\n    *\
  \   补丁和服务器管理系统\n    *   托管服务组件，包括备份、云服务、消息传递和群件服务等。\n    *   合同管理系统\n    *   文件服务\n\
  \    *   消息传递、群件和内部生产力系统\n*   服务\n    *   外部会计服务\n    *   税务服务\n    *   法律服务\n \
  \   *   保洁和设施服务\n    *   金融和房地产服务\n    *   人力资源和外包的 `HRIS` 系统\n    *   `401k` 和利润分享服务\n\
  \n对于所有这些，最重要的是选择最佳解决方案。起初，你可能会认为你使用的工具都是最好的。然而，如果你请求了解旧团队如何使用它们，你可能会发现自己更喜欢他们的业务流程以及驱动这些流程的技术。当新团队看到你接受最佳方案时，他们也更有可能相信你会为他们做出最佳选择。\n\
  \n### 数字问题\n\n许多企业主会发现这部分非常糟糕。你找到这些优秀的公司，与员工会面，合并运营，但在打造最终产品的过程中，你会遇到薪酬方案的问题。也许作为收购一部分加入你的员工薪水相比你现有团队过高。也许情况正好相反。\n\
  \n按职位划分，薪水应处于相似范围内。如果你尚未创建职位合同并进行薪资等级划分，我建议你此时就进行。虽然你不想在薪酬上做出剧烈变动，但你要在实体合并之前就处理好这个问题。如果你接手的员工薪水低于你的团队，那么我建议提供某种形式的利润分享或设定目标，以帮助团队跟上进度。\n\
  \n\n\n#### 关于职级\n\n在新兴公司中，职级制度似乎有些多此一举，但如果你有扩张计划，它能提供清晰的指引，让员工能随公司共同成长。\n\n假如你接手的员工薪资高于现行标准，请重新审视职级。若收购获得的员工薪酬超出职级规定的范围，则需查明原因——他们可能承担着超乎你预期的职责。若非如此，你就面临亟需解决的问题。如果解决该问题会导致员工降薪，那么请做好他们随时离职的准备。若他们选择留下，则要警惕他们可能心怀不满，进而影响团队士气。\n\
  \n薪资并非员工唯一需要关注的数字。当两家公司股票期权方案相似时，股票处理相对简单。若被收购方没有期权方案，可直接将员工纳入你的体系。但若他们有而你没有，要么创建相应方案，要么提供利润分成等同等补偿。若卖方未处理员工应得的股权归属收益，则需清除这笔账目。这在数学上颇具挑战性，建议寻求专业协助制定合理方案。当你确定合理方案后，如有可能，不妨再优厚一些。\n\
  \n福利待遇是另一个需要审视的环节。与股票同理，若员工福利减少，应给予相应额外补偿以弥补差额。否则，参照薪资问题的处理方式。\n\n如果你从本节数字中看出共性——那就是善待员工。请记住，在服务型企业中，员工既是公司最宝贵的资产，也通常是最大成本项。要实现盈利并产生收购乘数效应，首先要确保员工相关数字的合理性。正如本书一贯主张，务必审慎行事。\n\
  \n## 若非收购\n\n你可能会在尝试交易过程中发现不适合收购对方公司，却真心欣赏对方的核心团队或员工。这绝非坏事！此时仍有其他选择——其可能性之多，不亚于商业史上并购案例与错失机遇的总和。\n\
  \n最简单的做法是互相推荐业务。既然双方业务无法完全重叠，否则当初就不会洽谈收购。若要互荐业务，我建议签订协议，允许双向转介并获取长期回报。你们开启谈判自有其缘由。只要秉持职业道德，即使最终未能合并组织，也无需放弃与核心团队建立的关系。\n\
  \n如果有利润空间，可从 10%的佣金起步，再根据情况调整。为何坚持双向补偿？因为若无补偿且一方引荐远超另一方，单方面受益者可能产生被利用感。定期评估成效，保持联系，诚然，多交些朋友总是好事。\n\
  \n## 资产可否转让？\n\n合同是件有趣的事物。有些合同与特定公司或个人绑定，有些则需要满足特定条件。收购企业时，务必进行尽职调查，确保所有资产可转让至新实体。建议聘请律师处理此事。\n\
  \n律师审阅后需重新评估所有协议。若在全面法律审查前必须签署协议，应加入\"资产可转让\"的附加条款。实际上，任何协议都应附加未知条件，以便在交易告吹时最大限度规避责任。具体而言，以下均属可转让资产范畴：\n\
  \n*   合作伙伴关系，包含经销商协议、现有支持合同及联盟协议\n*   客户合同，特别是托管服务合同，也包括分包协议\n*   供应商合同，需确保价格稳定，且公司更名后所有协议仍具法律效力，不影响供应商相关业务\n\
  \n当所有细节确认无误后，即可着手制定合并方案。\n\n## 切勿因执念而促成烂交易\n\n你是否曾在`eBay`上因竞争心态而超支购买物品？现在想象你已投入数千美元法律费用，而交易却濒临破裂——有时这反而是好事。如果在尽职调查中发现交易条件持续恶化，请务必评估投资是否依然值得。\n\
  \n临门一脚时放弃交易确实艰难。有时是自尊作祟，有时是沉没成本太高。无需过度类比，但买房时也会遇到类似情况：验房后发现浴室地板需更换，接着是锅炉，再然后是屋顶。当附加条件堆积成山，风险过高时，明智之举就是终止交易。\n\
  \n同理，当发现未披露债务、无法转移的资产、员工流失或潜在客户流失等问题时，可能不得不终止交易，否则只会陷入困境。但如果一切顺利，通过合并能为客户和员工创造更优体验，那就果断执行交易！\n\
  \n## 合并公司\n\n一旦协议落实，就该执行合并计划。首先敲定最终方案，并尽快向客户、供应商、合作伙伴及其他利益相关方传达合并事宜。\n\n沟通应力求全面透明。务必包含以下内容：\n\
  \n*   员工得到妥善安置\n*   客户权益得到保障\n*   合并的动因\n*   客户将获得哪些具体改善\n*   服务整合计划及时间表\n*   公司与外界的沟通方式变更（如客户提交工单流程等）\n\
  \n若需围绕合并或收购进行媒体宣传（通常建议如此），务必告知所有受访媒体存在\"发布禁令\"——这是行业术语，指媒体在指定日期前不得发布内容。提前发布可能引发客户与员工疑虑，建议在合并完成后发布新闻稿。任何行动都应以不伤害团队或客户信任为前提。切记，这对所有参与者都应是好事。\n\
  \n\n## 结论\n\n在收购问题上需谨慎行事。你很容易陷入文化差异或交易不当的境地。你需要确保自己清楚如何将收购的组织整合到自身架构中。同时，还需掌控成本，了解控制成本的方法，并明白这对利润底线的影响。不过，如果通过收购而非自建能获得更高的投资回报率，那就果断行动。\n\
  \n务必牢记你做这一切的初衷。事情从来不会像你最初想象的那么简单。通常，非有机增长会伴随一些低效问题（热力学定律在商业领域似乎同样适用）。尽量在并购中保留更多价值，只要足够谨慎并进行了充分的尽职调查，合并后的两个组织应该会更加强大！\n\
  \n## 延伸阅读\n\n- 《让我们收购一家公司：通过收购加速增长》，H·李·拉斯特，[`https://www.amazon.com/Lets-Buy-Company-Accelerate-Acquisitions/dp/1564148459`](https://www.amazon.com/Lets-Buy-Company-Accelerate-Acquisitions/dp/1564148459/ref=sr_1_1?ie=UTF8&qid=1512054406&sr=8-1&keywords=buy+companies)\n\
