    # 构建文件


    Gradle 依赖几个文件。图 8-2 标示出了它们。


    | ➊ | `build.gradle` **（项目级）**：这是项目的根文件夹。有些项目可能包含多个模块，在此文件中定义一些能被所有模块共享的属性会很有用。
    |

    | ➋ | `build.gradle` **（模块: app）**：模块级别的`build.gradle`文件位于其所属的模块内。在此例中，模块级 Gradle
    文件位于`app`文件夹内；`app`模块是 Android Studio 在创建项目时生成的默认模块。与项目级 Gradle 文件相比，这个文件是你最可能花费更多时间处理的文件。
    |

    | ➌ | `gradle.properties`：你可以在此文件中配置项目级的 Gradle 设置，例如为 Gradle 守护进程分配的内存量。我通常不会修改它。
    |

    | ➍ | `settings.gradle`：该文件告诉 Gradle 需要在构建中包含哪些模块。如果你只处理单个模块（即“app”），那么你也可以不修改此文件。
    |

    | ➎ | `local.properties`：此文件包含本地环境的设置，例如 SDK 的位置、Firebase 的用户凭据等。 |


    ![../images/476822_1_En_8_Chapter/476822_1_En_8_Fig2_HTML.png](img/476822_1_En_8_Fig2_HTML.png)


    图 8-2. Gradle 文件


    ## 模块级 Gradle 文件


    既然你最可能与模块级 Gradle 文件打交道，那就让我们更好地了解它。清单 8-1 展示了一个带有注释的模块级`build.gradle`文件示例。


    | ➊ | `compileSdkVersion`：指示你用于构建应用的 API 级别或 Android 版本。 |

    | ➋ | `defaultConfig`：此代码块包含模块的默认配置。可以有多个配置吗？是的，应用可以有多个配置。当你针对不同平台等有不同的行为时，就会用到它。你可能会有几种构建变体。但现在，我们先只处理默认配置。
    |

    | ➌ | `applicationId`：这是你的应用在 Google Play 上使用的名称；也是应用的标识。 |

    | ➍ | `minSdkVersion`：此属性将告知 Google Play 你的应用所支持的最低 Android 版本。 |

    | ➎ | `targetSdkVersion`：如果 Android 的 API 发生变化，此设置会告知运行时环境，你的应用期望 API 的行为与 API
    级别 24 时的行为一致。这样，你的应用就能拥有一个一致的环境。 |

    | ➏ | `versionCode`：标识应用的版本。这是一个递增的整数。 |

    | ➐ | `versionName`：这是`versionCode`的字符串表示形式，会显示在 Google Play 和设备的设置中。 |


    ```

    apply plugin: ''com.android.application''

    android {

    compileSdkVersion 28 ➊

    defaultConfig {  ➋

    applicationId "net.workingdev.demoappbitbucket" ➌

    minSdkVersion 27 ➍

    targetSdkVersion 28 ➎

    versionCode 1  ➏

    versionName "1.0" ➐

    testInstrumentationRunner "android.support.test.runner.AndroidJUnitRunner"

    }

    ...

    清单 8-1.

    build.gradle (模块)

    ```


    当你对 Gradle 文件进行了任何更改，Android Studio 会提示你同步该文件。IDE 顶部会显示一个提示栏，告诉你“立即同步”。你也可以通过点击工具栏上的同步按钮来同步
    Gradle 文件，如图 8-3 所示。另一种同步方式是从主菜单栏操作：选择“文件” ➤ “将项目与 Gradle 文件同步”。


    ![../images/476822_1_En_8_Chapter/476822_1_En_8_Fig3_HTML.jpg](img/476822_1_En_8_Fig3_HTML.jpg)


    图 8-3. 将项目与 Gradle 文件同步


    如果你不想手动编辑 Gradle 文件，也可以通过图形用户界面来实现更改。转到主菜单栏，选择“文件” ➤ “项目结构”，然后点击“应用”部分，如图 8-4
    所示。


    ![../images/476822_1_En_8_Chapter/476822_1_En_8_Fig4_HTML.jpg](img/476822_1_En_8_Fig4_HTML.jpg)


    图 8-4. 项目结构


    如果你浏览“项目结构”窗口中的选项卡，你会发现也可以在那里编辑 Gradle 文件的条目。


    ## 依赖项


    大多数应用很少能独立运行；它们通常依赖其他代码。你的应用可能依赖于外部的二进制文件，或者你在同一项目中构建的其他库。无论哪种情况，这些依赖项都必须在 Gradle
    文件的依赖项代码块中声明。


    在依赖项代码块中，你必须列出应用的所有直接依赖项；如果这些依赖项本身又有自己的依赖项，Gradle 也会为你一并获取。需要注意三种依赖类型：


    *   **模块依赖项**：如果你在应用中创建了一个模块（除了默认的 app 模块之外），并希望它作为项目的库使用，你可以将其声明为模块依赖项。


    *   **Jar 依赖项**：当你想在应用中使用外部库时，例如 `jdom.jar`，只需将 jar 文件放入项目的 `libs` 文件夹，并将其声明为
    jar 依赖项。请记住，这里不能随便使用任何 jar 文件；只能使用那些旨在作为库使用的 jar 文件。在使用一个库之前，最好先阅读其文档。


    *   **库依赖项**：这种依赖项会从诸如 Maven 仓库或 `jcenter` 这样的仓库中拉取资源。仓库就是可供你使用的二进制文件的集合。当你安装
    Android Studio 并在安装过程中拉取一些附加软件时，已在本地机器上拥有一个仓库。Android Support 仓库已在本地可用——因此，这个仓库无需在
    Gradle 文件（项目级 Gradle 文件）中声明，但除此之外的任何其他仓库都需要声明。你会注意到，当你在 Android Studio 中创建新项目时，生成的
    Gradle 文件已经包含了 `jcenter` 和 `google` 的引用，它们是非常庞大的 Java 和 Android 仓库。清单 8-2 展示了项目级
    Gradle 文件的一个片段；请注意 `buildscript` 和 `allprojects` 代码块中的仓库部分——它们已经包含了 `jcenter`
    和 `google` 的引用。当然，如果你需要引用 `jcenter` 和 `google` 之外的任何仓库，只需将其添加到 Gradle 文件中即可。


    ```

    buildscript {

    repositories {

    google()

    jcenter()

    }

    dependencies {

    classpath ''com.android.tools.build:gradle:3.3.1''

    // 注意：不要在此处放置你的应用依赖项；它们应属于

    // 各个模块的 build.gradle 文件中

    }

    }

    allprojects {

    repositories {

    google()

    jcenter()

    }

    }

    ...

    清单 8-2.

    build.gradle (项目级)

    ```


    请注意，项目级 Gradle 文件中有一条注释，提示 **不要** 将你的应用依赖项放置在此文件中，而应放在应用模块的 Gradle 文件中。你在项目级 Gradle
    文件中定义的任何内容都会影响所有模块级的 Gradle 文件。


    除了理解依赖类型，你还需要了解如何关联依赖项。至少要考虑以下三种指令：


    *   `implementation`：这意味着此依赖项将应用于你的所有构建变体或你执行的所有不同类型的构建。


    *   `testImplementation`：这是一个特定于测试的变体。在此处，你可以声明 JVM 测试所需的内容。这是一种只需要 JVM 而无需完整
    Android 运行时的单元测试。


    *   `androidTestImplementation`：在此处，你可以声明进行仪器化测试所需的库——这种测试需要完整的 Android 运行时。


    清单 8-3 展示了带有注释的模块级 `build.gradle` 文件片段。

    '
- fmt: '### Note


    A build variant is the combination of a build type and build config. Build type
    examples are `release` and `debug`. A build config was discussed in an earlier
    section of this chapter. You can see the current build variants by going to the
    main menu bar and choosing View ➤ Tool Windows ➤ Build Variant.


    | ➊ | This `implementation` directive with the `fileTree` command, a `dir` parameter,
    and the ANT style glob pattern `*.jar` means you want all jar files inside the
    `lib` folder of the project to become dependencies. So, including a jar dependency
    for the project is as easy as dropping a jar file into your project’s `lib` folder.
    |

    | ➋ | This directive means you’re pulling a dependency from a repository—a local
    repository, to be exact. This pulls in the compatibility library from the Android
    Support Library. Use AppCompat so that the newer capabilities of Android can run
    on older versions. Don’t worry too much about the versions; Android Studio does
    a decent job of pulling the right and most recent versions of the compatibility
    libs most of the time. |

    | ➌ | Same as number 2, this is also a library dependency coming from the Android
    Support Library. This time, you’re referencing the constraint layout library that
    you need to use when creating activities that use the Constraint layout. |

    | ➍ | This `testImplementation` directive pulls the JUnit 4 library that you use
    for JVM unit testing. |

    | ➎ | This `androidTestImplementation` pulls the libraries you’ll use for instrumented
    testing. |


    ```

    apply plugin: ''com.android.application''

    android {

    ...

    }

    dependencies {

    implementation fileTree(dir: ''libs'', include: [''*.jar''])  ➊

    implementation ''com.android.support:appcompat-v7:28.0.0''  ➋

    implementation ''com.android.support.constraint:constraint-layout:1.1.3'' ➌

    testImplementation ''junit:junit:4.12''  ➍

    androidTestImplementation ''com.android.support.test:runner:1.0.2'' ➎

    androidTestImplementation ''com.android.support.test.espresso:espresso-core:3.0.2''

    }

    Listing 8-3.

    /app/build.gradle

    ```


    ## Android Support Library


    The topic of Android Support Library is a big one. I won’t deal with all of it
    here, but you need a passing knowledge of it, at least in the context of our current
    discussion.


    The Android Support Library is a very important part of Android. It basically
    supplements the Android SDK. One of the most important things it does is to provide
    backwards compatibility; at least it started out that way.


    Backwards compatibility was important to support because newer versions of Android
    are being released at a rapid pace while quite a few devices are still running
    older versions of Android. Newer Android versions mean newer capabilities and
    features; does that mean devices running older versions of Android cannot use
    the newer features? No. Backwards compatibility means that the newer platform
    features can be made available to older platform versions.


    As time went on, the Android Support Library got bigger. It started providing
    capabilities that were not part of the platform like in the areas of user interfaces,
    like Recycler Views or Card Views. The Support Library also included capabilities
    in the areas of debugging and testing, and so it needed to be reorganized.


    In the early days of the Android Support Library, it was just a single library;
    but as it grew, its organization evolved. So, instead of having just a single
    library, the support library became a bunch of smaller and more manageable libraries.
    The groupings of these libraries were organized mainly according to platform support,
    which meant that the name of a support library indicated what platform or API
    level it supported.


    You might still see libraries named `v4`, `v7`, and `v13`, which historically
    meant `v4` supported API level 4 and up, `v7` supported level 7 and up, and `v13`
    supported API level 13 and up. I said “*historically*” because that’s no longer
    true. There’s a lot that goes on every time a newer Android version comes along;
    deprecations happen left and right. So you must make it a point to read the Support
    Library documentation from time to time.


    At the time writing, `v4` no longer supports level 4 and up. It now supports only
    API level 14 and higher; `v7` as well no longer supports level 7 and up, but instead
    supports only level 14 and up. This effectively means that the minimum SDK version
    for all support library packages is now level 14 (Ice Cream Sandwich).


    More importantly, with the release of Android 9 (API level 28), there is a new
    version of the Android Support Library called AndroidX, which is part of Jetpack.
    You can continue to use the support libraries (`android.support.*` versions 27
    and earlier). They will remain on Google Maven, but note that all development
    will happen in AndroidX.


    ### Note


    Android Jetpack is a collection of components that makes it easier to develop
    apps. The libraries are in the `androidx.*` packages and they are unbundled from
    the platform APIs. This is where the backward compatibility libraries now reside.
    Jetpack is big. It’s not just about compatibility libraries; it has lots of other
    software components that deal with architecture, foundation, UI, and behavior.
    You can read more about it at [`https://developer.android.com/jetpack`](https://developer.android.com/jetpack)
    .


    In Listing [8-3](#476822_1_En_8_Chapter.xhtml#PC3), you saw the line


    ```

    implementation ''com.android.support:appcompat-v7:28.0.0''

    ```


    What this means is, even if the device running your app is at API level 14, you
    can still use


    *   An ActionBar

    *   Material design

    *   `AppCompatActivity` classes

    *   `AppCompatDialog`

    *   `ShareActionProvider`


    All these capabilities are pretty modern, but you can still make them available
    on older platforms because of the AppCompat libraries.


    ### Note


    When you target the lower API levels, your app can rely on fewer modern Android
    features, but a larger percentage of Android devices are able to run your app.
    The opposite is true when you target higher level APIs. You can always look at
    the data or the cumulative distribution of the Android versions by clicking the
    “Help me choose” link when you create a new Android project.


    ## Chapter Summary


    *   The build process can be very involved. Thankfully, Gradle takes care of all
    the heavy lifting.

    *   There are two `build.gradle` files: one in the project root and one for each
    module. The project-level Gradle file is a good place to define directives that
    you want to share to all module-level Gradle files.

    *   The module-level Gradle file is where you define most of your configurations.
    Module dependencies and target SDKs are defined in here.


    # 9. Git


    *What this chapter covers:*


    *   How to get Git

    *   Setting up GitHub in Android Studio

    *   Sharing and cloning with GitHub

    *   Sharing and cloning from other Git repos


    Android Studio provides integration with quite a few version control systems,
    and one of the more popular version control systems is Git. In this chapter, you’ll
    look at how to use Git in Android Studio.'
