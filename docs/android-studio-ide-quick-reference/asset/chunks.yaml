    清单[11-7](#476822_1_En_11_Chapter.xhtml#PC7)展示了`RandomNumber`类的变化；`RandomNumber`类通过简单地继承`ViewModel`类，自动转换为ViewModel对象。


    ```java

    import java.util.Random;

    import androidx.lifecycle.ViewModel;

    public class RandomNumber extends ViewModel {

    private String TAG = getClass().getSimpleName();

    int mrandomnumber;

    boolean minitialized = false;

    String getNumber() {

    if(!minitialized) {

    createRandomNumber();

    }

    Log.i(TAG, "RETURN Random number");

    return mrandomnumber + "";

    }

    void createRandomNumber() {

    Log.i(TAG, "CREATE NEW Random number");

    Random random = new Random();

    mrandomnumber = random.nextInt(100);

    minitialized = true;

    }

    }

    ```

    *Listing 11-7. `RandomNumber` Extends `ViewModel`*


    该类与其先前版本（清单[11-4](#476822_1_En_11_Chapter.xhtml#PC4)所示）基本相同；唯一的区别是现在它继承了`ViewModel`。


    现在，让我们在`MainActivity`中实现这些更改。清单[11-8](#476822_1_En_11_Chapter.xhtml#PC8)展示了修改后的`MainActivity`，它使用`ViewModelProviders`来获取`RandomNumber`类的实例，即ViewModel对象。


    | ➊ | 这是你需要在`MainActivity`中做的唯一改动。无需通过在`onCreate()`方法内直接创建ViewModel对象（`RandomNumber`类）的实例来管理它，而是让`ViewModelProviders`类管理ViewModel对象的生命周期。
    |


    ```java

    import androidx.lifecycle.ViewModelProviders;

    import android.os.Bundle;

    import android.widget.TextView;

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    RandomNumber data;

    data = ViewModelProviders.of(this).get(RandomNumber.class); ➊

    ((TextView) findViewById(R.id.txtrandom)).setText(data.getNumber());

    }

    }

    ```

    *Listing 11-8. `MainActivity` and `ViewModelProviders`*


    ## `LiveData`


    回到`RandomNumber`示例，这里有一个应用，每次启动时都会显示一个随机数。该应用已经使用了`ViewModel`，因此你不会再遇到每次Activity被销毁和重建时丢失数据的问题。基本数据流如图[11-2](#476822_1_En_11_Chapter.xhtml#Fig2)所示。


    ![../images/476822_1_En_11_Chapter/476822_1_En_11_Fig2_HTML.jpg](images/476822_1_En_11_Chapter/476822_1_En_11_Fig2_HTML.jpg)


    *Figure 11-2. Data flow for the `RandomNumber` example*


    但是，如果你需要获取另一个数字呢？为此，你可以在`MainActivity`中添加一个触发器，例如一个按钮，然后按钮将调用ViewModel上的`getNumber()`方法，但如何刷新`MainActivity`中的`TextView`呢？有几种方法可以做到这一点，你可能已经遇到过。一种促进ViewModel与Activity之间数据交换的方法是创造性地使用接口（但我不会在此讨论），或者使用像Otto这样的EventBus（我也不会在此讨论）。不过，幸运的是，由于架构组件的出现，你可以使用`LiveData`。新的数据流如图[11-3](#476822_1_En_11_Chapter.xhtml#Fig3)所示。


