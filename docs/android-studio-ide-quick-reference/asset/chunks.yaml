  raw: '## Setting Up a Simple Test


    Let’s set up a simple project, something that has an empty activity. Listing [6-1](#476822_1_En_6_Chapter.xhtml#PC2)
    shows the XML layout code and Listing [6-2](#476822_1_En_6_Chapter.xhtml#PC3)
    shows the MainActivity code.


    ```


    Listing 6-1.

    activity_main.xml

    ```


    The layout code is fairly simple, as you can see: it has one TextView and two
    buttons. Both buttons call the `onClick()` method in MainActivity when the user
    clicks them.


    ```

    public class MainActivity extends AppCompatActivity {

    TextView txtview;

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    txtview = (TextView) findViewById(R.id.textView);

    }

    public void onClick(View view) {

    switch(view.getId()) {

    case R.id.btnhello:

    txtview.setText("hello");

    break;

    case R.id.btnworld:

    txtview.setText("world");

    break;

    }

    }

    }

    Listing 6-2.

    MainActivity

    ```


    The `onClick()` method in MainActivity basically tries to get the id of the button
    that was clicked and routes program logic according to it. If `btnhello` is clicked,
    you set text content of the TextView to “hello” and if `btnworld` is clicked,
    you set the content to “world”—it’s simple enough. To verify this behavior, you
    can set up an instrumented test.


    In the previous chapter, you wrote the test class in `src/test` because it was
    a JVM test. Now, you will write the test class inside `src/androidTest` because
    this will be an instrumented test. Listing [6-3](#476822_1_En_6_Chapter.xhtml#PC4)
    shows the code for the instrumented test class.


    | ➊ | You want to statically import the Espresso matchers, actions, and asserts
    so you won’t have to fully qualify them later in the code. |

    | ➋ | This just intercepts your test method calls and makes sure that the activity
    is launched before you perform any test. |

    | ➌ | You need to annotate each test method with `@Test`. |

    | ➍ | Find the `btnhello` object using the `withId()` method. |

    | ➎ | Then you simulate a click using a `ViewAction.click()`. |

    | ➏ | Then you find the TextView, using a `withId()` method again. |

    | ➐ | Finally, you assert if the TextView contains the text “hello.” |


    ```

    import android.support.test.rule.ActivityTestRule;

    import android.support.test.runner.AndroidJUnit4;

    import org.junit.Rule;

    import org.junit.Test;

    import static android.support.test.espresso.Espresso.onView;  ➊

    import static android.support.test.espresso.action.ViewActions.click;

    import static android.support.test.espresso.assertion.ViewAssertions.matches;

    import static android.support.test.espresso.matcher.ViewMatchers.withId;

    import static android.support.test.espresso.matcher.ViewMatchers.withText;

    public class MainActivityTest {

    @Rule ➋

    public ActivityTestRule mActivityTestRule = new ActivityTestRule(MainActivity.class);

    @Test ➌

    public void buttonHelloTest() {

    onView(withId(R.id.btnhello)) ➍

    .perform(click());        ➎

    onView(withId(R.id.textView)) ➏

    .check(matches(withText("hello"))); ➐

    }

    @Test

    public void buttonWorldTest() {

    onView(withId(R.id.btnworld))

    .perform(click());

    onView(withId(R.id.textView))

    .check(matches(withText("world")));

    }

    }

    Listing 6-3.

    MainActivityTest

    ```


    You can run the instrumented test the same way you run the JVM test. You can either


    *   Click the arrows in the IDE gutter,


    *   Right-click the test and use the context-sensitive menu, and then choose the
    Run MainActivityTest option, or


    *   Go to the main menu bar, choose Run ➤ Run, and then choose MainActivityTest.


    ## Recording Espresso Tests


    Android Studio includes a feature where you can run your app, record the interaction,
    and create an Espresso test using the recording. To get started, go to the main
    menu bar and then choose Run ➤ Record Espresso Test, as shown in Figure [6-1](#476822_1_En_6_Chapter.xhtml#Fig1).


    ![../images/476822_1_En_6_Chapter/476822_1_En_6_Fig1_HTML.jpg](images/476822_1_En_6_Chapter/476822_1_En_6_Fig1_HTML.jpg)


    Figure 6-1.


    Recording an Espresso test


    After choosing the Record Espresso Test option, you can now interact with the
    app like usual, but this time, the interaction is recorded. If you click one of
    the buttons, say the HELLO button, the test recorder screen will pop up, as shown
    in Figure [6-2](#476822_1_En_6_Chapter.xhtml#Fig2).


    | ➊ | This section shows each interaction with the app. At this point, I clicked
    the app only once; I clicked the HELLO button. |

    | ➋ | This section is the ViewMatcher, but done visually. If you click the TextView,
    like I did here, it goes over as an item to the Edit Assertion section. |

    | ➌ | The TextView is selected here because I clicked it in the ViewMatcher section
    (item 2). |

    | ➍ | This is where you choose the assertion. In this case, it’s the hamcrest
    “text is.” |

    | ➎ | The actual value of the TextView you’d like to assert. |


    ![../images/476822_1_En_6_Chapter/476822_1_En_6_Fig2_HTML.jpg](images/476822_1_En_6_Chapter/476822_1_En_6_Fig2_HTML.jpg)


    Figure 6-2.


    Espresso recorder


    You can click the Save and Add Another option if you’d like to add another test,
    or the Save the Assertion option and finish the recording. Figure [6-3](#476822_1_En_6_Chapter.xhtml#Fig3)
    shows the next screen.


    ![../images/476822_1_En_6_Chapter/476822_1_En_6_Fig3_HTML.jpg](images/476822_1_En_6_Chapter/476822_1_En_6_Fig3_HTML.jpg)


    Figure 6-3.


    Espresso recorder with assertion saved


    When you click OK, the recorder will prompt for the name of the class where it
    will save the recording as a test class, as shown in Figure [6-4](#476822_1_En_6_Chapter.xhtml#Fig4).


    ![../images/476822_1_En_6_Chapter/476822_1_En_6_Fig4_HTML.jpg](images/476822_1_En_6_Chapter/476822_1_En_6_Fig4_HTML.jpg)


    Figure 6-4.


    Espresso test with test saved


    When you go the `src/androidTest` folder, you’ll find the newly generated test
    class from your recording. You can now run the generated test the same way you
    ran MainActivityTest earlier.


    ### Note


    Two factoids about Espresso: 1) The Espresso recorder is one of the most used
    tools when using Espresso, according to Android Studio analytics, and 2) The Espresso
    recorder was originally named “cassette.”


    ## More on Espresso Matchers


    Espresso has a variety of matchers but the one that’s commonly used is the ViewMatcher;
    it’s what you used in the earlier examples. Here are the other matchers in Espresso:


    *   **CursorMatcher**: Used for Android Adapter Views that are backed by Cursors
    to match specific data rows


    *   **LayoutMatcher**: To match and detect typical layout issues, such as TextViews
    that have ellipses or multi-line text


    *   **RootMatcher**: To match Root objects that are dialogs or Roots that can
    receive touch events


    *   **PreferenceMatcher**: To match Android Preferences and let you find View
    components based on their key, summary text, etc.


    *   **BoundedMatcher**: To create your own custom matcher for a given type


    In the previous examples, you used the ViewMatcher to find Views via their ids.
    You can find Views using other things, such as


    *   **Its value**: You can use the `withText()` method to find a View that matches
    a certain String expression.


    *   **The number of its child**: Using the `hasChildCount()` method, you can match
    a View that has a very specific child count.


    *   **Its class name**: Using the `withClassName()` method.


    ViewMatchers can also tell you whether a View object is


    *   Enabled, by using the `isEnabled()` method


    *   Focusable, by using the `isFocusable()` method


    *   Displayed via `isDisplayed()`


    *   Checked via `isChecked()`


    *   Selected via `isSelected()`


    There are plenty more methods you can use in the ViewMatchers class so make sure
    to check them out at [`https://bit.ly/viewmatchers`](https://bit.ly/viewmatchers)
    .'
  trans: "\n# 搭建一个简单的测试\n\n让我们搭建一个简单的项目，一个包含空活动的项目。清单 6-1 展示了 XML 布局代码，清单 6-2 展示了\
    \ `MainActivity` 代码。\n\n```\n清单 6-1.\nactivity_main.xml\n```\n\n如您所见，布局代码相当简单：它包含一个\
    \ `TextView` 和两个按钮。当用户点击它们时，这两个按钮都会调用 `MainActivity` 中的 `onClick()` 方法。\n\n```\n\
    public class MainActivity extends AppCompatActivity {\n    TextView txtview;\n\
    \    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n   \
    \     super.onCreate(savedInstanceState);\n        setContentView(R.layout.activity_main);\n\
    \        txtview = (TextView) findViewById(R.id.textView);\n    }\n    public\
    \ void onClick(View view) {\n        switch(view.getId()) {\n            case\
    \ R.id.btnhello:\n                txtview.setText(\"hello\");\n              \
    \  break;\n            case R.id.btnworld:\n                txtview.setText(\"\
    world\");\n                break;\n        }\n    }\n}\n清单 6-2.\nMainActivity\n\
    ```\n\n`MainActivity` 中的 `onClick()` 方法主要试图获取被点击按钮的 ID，并根据它来路由程序逻辑。如果点击了 `btnhello`，你便将\
    \ `TextView` 的文本内容设置为“hello”；如果点击了 `btnworld`，你则将内容设置为“world”——这相当简单。要验证此行为，你可以设置一个仪器化测试。\n\
    \n在上一章中，你在 `src/test` 中编写了测试类，因为它是一个 JVM 测试。现在，你将在 `src/androidTest` 内编写测试类，因为这将是一个仪器化测试。清单\
    \ 6-3 展示了仪器化测试类的代码。\n\n| ➊ | 你希望静态导入 Espresso 的匹配器、操作和断言，这样就不必在后续代码中使用完全限定名称。\
    \ |\n| ➋ | 这会拦截你的测试方法调用，并确保在执行任何测试之前启动了该活动。 |\n| ➌ | 你需要使用 `@Test` 注解每个测试方法。 |\n\
    | ➍ | 使用 `withId()` 方法找到 `btnhello` 对象。 |\n| ➎ | 然后使用 `ViewAction.click()` 模拟一次点击。\
    \ |\n| ➏ | 然后再次使用 `withId()` 方法找到 `TextView`。 |\n| ➐ | 最后，断言 `TextView` 是否包含文本“hello”。\
    \ |\n\n```\nimport android.support.test.rule.ActivityTestRule;\nimport android.support.test.runner.AndroidJUnit4;\n\
    import org.junit.Rule;\nimport org.junit.Test;\nimport static android.support.test.espresso.Espresso.onView;\
    \  ➊\nimport static android.support.test.espresso.action.ViewActions.click;\n\
    import static android.support.test.espresso.assertion.ViewAssertions.matches;\n\
    import static android.support.test.espresso.matcher.ViewMatchers.withId;\nimport\
    \ static android.support.test.espresso.matcher.ViewMatchers.withText;\npublic\
    \ class MainActivityTest {\n    @Rule ➋\n    public ActivityTestRule mActivityTestRule\
    \ = new ActivityTestRule(MainActivity.class);\n    @Test ➌\n    public void buttonHelloTest()\
    \ {\n        onView(withId(R.id.btnhello)) ➍\n            .perform(click()); \
    \       ➎\n        onView(withId(R.id.textView)) ➏\n            .check(matches(withText(\"\
    hello\"))); ➐\n    }\n    @Test\n    public void buttonWorldTest() {\n       \
    \ onView(withId(R.id.btnworld))\n            .perform(click());\n        onView(withId(R.id.textView))\n\
    \            .check(matches(withText(\"world\")));\n    }\n}\n清单 6-3.\nMainActivityTest\n\
    ```\n\n你可以用运行 JVM 测试的相同方式运行仪器化测试。你可以\n\n* 点击 IDE 侧边栏的箭头，\n* 右键点击测试并使用上下文菜单，然后选择运行\
    \ `MainActivityTest` 选项，或者\n* 前往主菜单栏，选择 运行 ➤ 运行，然后选择 `MainActivityTest`。\n\n##\
    \ 录制 Espresso 测试\n\nAndroid Studio 包含一项功能，你可以运行你的应用，记录交互，并使用录制功能创建 Espresso 测试。要开始，请前往主菜单栏，然后选择\
    \ 运行 ➤ 录制 Espresso 测试，如图 6-1 所示。\n\n![../images/476822_1_En_6_Chapter/476822_1_En_6_Fig1_HTML.jpg](img/476822_1_En_6_Fig1_HTML.jpg)\n\
    \n图 6-1. 录制 Espresso 测试\n\n选择录制 Espresso 测试选项后，你现在可以像往常一样与应用交互，但这次，交互会被记录下来。如果你点击其中一个按钮，比如\
    \ HELLO 按钮，测试录制器屏幕将弹出，如图 6-2 所示。\n\n| ➊ | 此部分显示与应用进行的每次交互。此时，我只点击了一次应用；我点击了 HELLO\
    \ 按钮。 |\n| ➋ | 此部分是 `ViewMatcher`，但是以可视方式呈现。如果你像我一样点击了 `TextView`，它就会作为一个项目转到编辑断言部分。\
    \ |\n| ➌ | 此处选择了 `TextView`，因为我在 `ViewMatcher` 部分（条目 2）点击了它。 |\n| ➍ | 这是你选择断言的地方。在本例中，它是\
    \ hamcrest 的“文本是”。 |\n| ➎ | 你想要断言的 `TextView` 的实际值。 |\n\n![../images/476822_1_En_6_Chapter/476822_1_En_6_Fig2_HTML.jpg](img/476822_1_En_6_Fig2_HTML.jpg)\n\
    \n图 6-2. Espresso 录制器\n\n如果你想添加另一个测试，可以点击“保存并添加另一个”选项；或者点击“保存断言”选项并完成录制。图 6-3\
    \ 显示了下一个屏幕。\n\n![../images/476822_1_En_6_Chapter/476822_1_En_6_Fig3_HTML.jpg](img/476822_1_En_6_Fig3_HTML.jpg)\n\
    \n图 6-3. 保存断言后的 Espresso 录制器\n\n当你点击确定时，录制器将提示输入类的名称，录制结果将以测试类的形式保存，如图 6-4 所示。\n\
    \n![../images/476822_1_En_6_Chapter/476822_1_En_6_Fig4_HTML.jpg](img/476822_1_En_6_Fig4_HTML.jpg)\n\
    \n图 6-4. 测试已保存的 Espresso 测试\n\n当你进入 `src/androidTest` 文件夹时，你将找到从录制中生成的新测试类。现在你可以像之前运行\
    \ `MainActivityTest` 一样运行生成的测试。\n\n### 注意\n\n关于 Espresso 的两个趣闻：1) 根据 Android Studio\
    \ 分析，Espresso 录制器是使用 Espresso 时最常用的工具之一；2) Espresso 录制器最初被命名为“cassette”。\n\n##\
    \ 关于 Espresso 匹配器的更多信息\n\nEspresso 有多种匹配器，但最常用的是 `ViewMatcher`；你就是在之前的例子中使用的它。以下是\
    \ Espresso 中的其他匹配器：\n\n* **CursorMatcher**：用于由 Cursor 支持的 Android Adapter 视图，以匹配特定的数据行。\n\
    * **LayoutMatcher**：用于匹配和检测典型的布局问题，例如包含省略号或多行文本的 `TextView`。\n* **RootMatcher**：用于匹配\
    \ Root 对象，例如对话框或可以接收触摸事件的 Root。\n* **PreferenceMatcher**：用于匹配 Android 偏好设置，并允许你根据其键、摘要文本等查找视图组件。\n\
    * **BoundedMatcher**：用于为给定类型创建你自己的自定义匹配器。\n\n在前面的例子中，你使用了 `ViewMatcher` 通过视图的\
    \ ID 来查找它们。你还可以使用其他条件来查找视图，例如\n\n* **其值**：你可以使用 `withText()` 方法查找匹配某个特定字符串表达式的视图。\n\
    * **其子视图的数量**：使用 `hasChildCount()` 方法，你可以匹配具有非常具体的子视图数量的视图。\n* **其类名**：使用 `withClassName()`\
    \ 方法。\n\n`ViewMatcher` 还可以告诉你一个 View 对象是否是\n\n* 启用状态，通过使用 `isEnabled()` 方法\n*\
    \ 可获得焦点，通过使用 `isFocusable()` 方法\n* 可见，通过 `isDisplayed()` 方法\n* 已选中，通过 `isChecked()`\
    \ 方法\n* 已选定，通过 `isSelected()` 方法\n\n`ViewMatchers` 类中还有很多方法可供使用，请务必访问 [`https://bit.ly/viewmatchers`](https://bit.ly/viewmatchers)\
    \ 查看它们。\n"
- fmt: '# Espresso Actions


    Espresso Actions let you interact with `View` objects programmatically during
    a test. You used the `click()` earlier, but there’s a lot more that `ViewActions`
    will let you do. The method names are very descriptive so they don’t need further
    explanations; you can clearly see what they do. Here are a few of them:


    *   `clearText()`

    *   `closeSoftKeyboard()`

    *   `doubleClick()`

    *   `longClick()`

    *   `openLink()`

    *   `pressBack()` – presses the back button

    *   `replaceText(String arg)`

    *   `swipeDown()`

    *   `swipeRight()`

    *   `swipeUp()`

    *   `typeText(String arg)`


    There are more actions available so make sure you visit the API documentation
    for the `ViewAction` object.


    Also, make sure you visit the official documentation for Espresso on the Android
    Develop website at [`https://bit.ly/androidstudioespresso`](https://bit.ly/androidstudioespresso).
    You’ve only scratched the surface of Espresso here!


    # Chapter Summary


    *   Put JVM tests in `src/test` and put instrumented tests in `src/androidTest`.

    *   You can use Espresso to create instrumented tests; the two things you need
    in Espresso are the `ViewMatchers` and `ViewActions`.

    *   The general steps for writing Espresso tests are 1) find the `View` object
    using `ViewMatchers`, 2) perform an action on the View with `ViewActions`, and
    3) do your assertions.

    *   An easy way to create Espresso tests is to use the Espresso recorder.


    ---


    # 7. Android Studio Profiler


    *What this chapter covers:*


    *   Android Studio Profiler

    *   CPU view

    *   Memory view


    Android Studio 3.0 replaces the old Android Monitor with the new Android Profiler.
    It’s an integrated view for profiling an app’s memory consumption, network usage,
    CPU usage, and power usage. In this chapter, you’ll take a quick look at the Profiler.


    ## The Profiler


    The Profiler is new in Android Studio 3. It replaces the Android Monitor and offers
    a new, unified, shared timeline view for CPU, memory, network, and energy graphs.


    You can get to the Profiler by going to the main menu bar and then `View` ➤ `Tool
    Windows` ➤ `Profiler`. Figure 7-1 shows the Profiler.


    | ➊ | Shows the process and device being profiled. |

    | ➋ | Shows you which sessions to view. You can also add new sessions from here
    by clicking the + button. |

    | ➌ | Use the zoom buttons to control how much of the timeline to view. |

    | ➍ | The new shared timeline view lets you see all the graphs for CPU, memory,
    network, and energy usage. At the top, you will also see important app events,
    like user inputs or activity state transitions. |


    ![../images/476822_1_En_7_Chapter/476822_1_En_7_Fig1_HTML.jpg](images/476822_1_En_7_Chapter/476822_1_En_7_Fig1_HTML.jpg)


    **Figure 7-1. Profiler**


    As soon as you launch an application, either on an attached device or an emulator,
    you’ll see its graph on the Profiler.


    ### Note


    If you try to profile an APK with a version lower than API level 26, you will
    see some warnings because Android Studio needs to fully instrument your code.
    You will need to enable advance profiling, but if your APK is Oreo or higher,
    you won’t see any warnings.


    If you click any of the charts, the Profiler window will take you to one of the
    detailed views. If you click the CPU, for example, you’ll see the detailed view
    for the CPU utilization.


    ## CPU


    Figure 7-2 shows the detailed view for the CPU utilization on the sample app I
    was running.


    ![../images/476822_1_En_7_Chapter/476822_1_En_7_Fig2_HTML.jpg](images/476822_1_En_7_Chapter/476822_1_En_7_Fig2_HTML.jpg)


    **Figure 7-2. CPU view**


    Aside from the live utilization graph, the CPU detailed view also shows a list
    of all the threads in the app and their states. You can see if the threads are
    waiting for I/O or when they are active.


    You may have noticed the `Record` button in Figure 7-2. If you click that button,
    you can get a report on all the methods that were executed in a given period.
    Notice also the selected trace type in the dropdown menu (`Sample Java Methods`);
    this *trace type* has a smaller overhead but it’s not as detailed or as accurate
    as the *instrumented type* (`Trace Java Methods`), meaning the sampled type may
    miss the execution of a very short-lived method. You might think, “Just always
    use the instrumented type then.” You have to remember, though, that while an instrumented
    type can record every method call, on Android devices before version 8, there
    is a limit on how much data can be captured, so if you use the instrumented trace,
    that limit will be reached quickly. You can change that limit by editing the configuration
    for the instrumented capture. On the trace type dropdown, choose the `Edit Configurations`
    options, as shown in Figure 7-3.


    ![../images/476822_1_En_7_Chapter/476822_1_En_7_Fig3_HTML.jpg](images/476822_1_En_7_Chapter/476822_1_En_7_Fig3_HTML.jpg)


    **Figure 7-3. Editing the configuration**


    Figure 7-4 shows the sampling interval and file size limit settings, which you
    can use to adjust how frequent the sampling will be and how big of a file size
    you’d like to allocate for the recording. Just to reiterate, the file size limitation
    is only present on Android devices that are running Android 8.0 or lower (< API
    level 26). If your device has a higher Android version, you’re not constrained
    by these limitations.


    ![../images/476822_1_En_7_Chapter/476822_1_En_7_Fig4_HTML.jpg](images/476822_1_En_7_Chapter/476822_1_En_7_Fig4_HTML.jpg)


    **Figure 7-4. CPU recording configuration**


    If you click `Record`, Android Studio will begin capturing data. Click the `Stop`
    button when you’d like to stop recording, as shown in Figure 7-5.


    ![../images/476822_1_En_7_Chapter/476822_1_En_7_Fig5_HTML.jpg](images/476822_1_En_7_Chapter/476822_1_En_7_Fig5_HTML.jpg)


    **Figure 7-5. Recording a session**


    When you press `Stop`, you can take look at the individual threads, as shown in
    Figure 7-6.


    ![../images/476822_1_En_7_Chapter/476822_1_En_7_Fig6_HTML.jpg](images/476822_1_En_7_Chapter/476822_1_En_7_Fig6_HTML.jpg)


    **Figure 7-6. Inspecting the threads**'
