    here.


    When you click the Share button, Android Studio will prompt you for which files
    you want to share. In version control parlance, instead of saying “share” we say
    “commit.” See Figure [9-8](#476822_1_En_9_Chapter.xhtml#Fig8).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig8_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig8_HTML.jpg)


    Figure 9-8.


    Adding files for the initial commit


    By default, everything shown in the dialog box is checked, which means everything
    in the project folder will be committed, but not quite. Try to scroll down so
    you can see all the files that have checkmarks. You might notice a file named
    `.gitignore` , as shown in Figure [9-9](#476822_1_En_9_Chapter.xhtml#Fig9).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig9_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig9_HTML.jpg)


    Figure 9-9.


    Adding .gitignore


    `.gitignore` is a special file that contains a list of files that won’t be included
    in the repo—these files will be, well, ignored.


    If the view in the Project tool window is set to Android, you won’t be able to
    see the `.gitignore` file, but if you change the view of the Project tool window
    to Project, as shown in Figure [9-10](#476822_1_En_9_Chapter.xhtml#Fig10), you
    should see the `.gitignore` file.


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig10_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig10_HTML.jpg)


    Figure 9-10.


    Project tool window set to Project view


    Listing [9-2](#476822_1_En_9_Chapter.xhtml#PC5) shows the contents of `.gitignore`
    .


    ```

    *.iml

    .gradle

    /local.properties

    /.idea/caches

    /.idea/libraries

    /.idea/modules.xml

    /.idea/workspace.xml

    /.idea/navEditor.xml

    /.idea/assetWizardSettings.xml

    .DS_Store

    /build

    /captures

    .externalNativeBuild

    Listing 9-2.

    .gitignore

    ```


    You want to keep all the entries in `.gitignore` most of the time. Of course you
    can add to the list, but you don’t want to remove anything from it, as shown in
    Listing [9-2](#476822_1_En_9_Chapter.xhtml#PC5). By default, the list of files
    in `.gitignore` refers to things that are unique to your computer; for example,
    the `/local.properties` lists the location of the JDK on your computer. It may
    also contain data that’s specific to you as a user, like Firebase keys; clearly,
    you don’t want to commit that info into source control. Another example is the
    `.DS_Store` file, which you will only have if you’re using a Mac; macOS creates
    this file every time you create a directory. This file isn’t important to your
    project.


    Going back to the commit dialog window, when you click OK, all the (checked) files
    in the commit window get *committed* and then *pushed* to the remote repo.


    ## Opening a Project from GitHub


    You can restore a project by fetching it from a remote repo like GitHub; in Git
    parlance, this is called “cloning” a repo. The basic scenario when you do this
    is when one of your teammates has shared a project repo on GitHub and you’d like
    to work on it as well. The first step is to fetch the project from the remote
    repo. You can do this in one of two ways.


    When you already have an open project in Android Studio, you can go to the main
    menu bar and choose File ➤ New ➤ Project from Version Control ➤ Git.


    You may also do this from the Android Studio welcome screen, as shown in Figure
    [9-11](#476822_1_En_9_Chapter.xhtml#Fig11).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig11_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig11_HTML.jpg)


    Figure 9-11.


    Welcome Screen, Git


    Either way you do it is fine. The next screen is the Clone Repository window,
    as shown in Figure [9-12](#476822_1_En_9_Chapter.xhtml#Fig12).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig12_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig12_HTML.jpg)


    Figure 9-12.


    Clone repository


    The fields are described below:


    *   **URL**: This is the remote URL of the repo. I’m using the URL git@github.com:/etc
    because I’m fetching the project via SSH. I can do this because I’ve already set
    up my SSH keys in GitHub. If you haven’t set up your SSH keys yet, you may have
    to use the HTTPS URL. You can find the HTTPS URL for the repo on its GitHub page,
    shown in Figure [9-13](#476822_1_En_9_Chapter.xhtml#Fig13). Click the Use HTTPS
    option to get the HTTPS URL.


    *   **Directory**: This is the location on your hard drive where you would like
    to store the project.


    ### Note


    GitHub allows for both SSH and HTTPS to be used when you interact with the repo.
    GitHub published some guidelines as to when to use SSH or HTTPS at [`https://bit.ly/sshvshttps`](https://bit.ly/sshvshttps)
    . If you want to know more about the Git protocols, you can get more information
    from [`https://bit.ly/gitprotocols`](https://bit.ly/gitprotocols) .


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig13_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig13_HTML.jpg)


    Figure 9-13.


    GitHub page for a repo


    To complete the process of cloning, click the Clone button, as shown in Figure
    [9-12](#476822_1_En_9_Chapter.xhtml#Fig12). You can now open the project as you
    would any other project in Android Studio.'
  trans: '

    ### 提示


    对于 Windows 用户。Git 安装程序不会更新 `PATH` 变量，因此您可能会遇到“bad command or filename”错误。为了执行清单
    9-1 中所示的命令，您必须首先导航到 Git 可执行文件的位置。因此，请将目录更改为 `C:\Program Files\(x86)\Git\bin\`，然后执行清单
    9-1 中所示的命令。


    打开您想要通过 GitHub 分享的任何项目；然后，从主菜单栏中，转到 `VCS` ➤ `Import into Version Control` ➤ `Share
    Project on GitHub`，如图 9-6 所示。


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig6_HTML.jpg](img/476822_1_En_9_Fig6_HTML.jpg)


    图 9-6. 导入到版本控制


    提供必要的信息，如图 9-7 所示。以下是各字段含义的简要说明：


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig7_HTML.jpg](img/476822_1_En_9_Fig7_HTML.jpg)


    图 9-7. 在 GitHub 上分享项目


    - **Repository name**（仓库名称）：您想要创建的公共仓库的名称。当您在 GitHub 上分享一个项目时，它被称为一个仓库（或简称 repo），它只是一个存储和管理数据的地方。在此例中，您正在为这一个项目创建一个仓库。因此，最好只将项目相关的工件存储在其中。

    - **Private**（私有）：如果您像我一样让此复选框保持未选中状态，则意味着该仓库将是公共的。您需要决定仓库的可见性。请记住，如果它是公共的，所有人都能看到；如果是私有的，则由您控制谁能看到它。

    - **Remote**（远程）：保留默认设置。它显示为“remote”，因为文件将存储在远程服务器上（在 GitHub 的服务器上），与“local”相对，后者意味着文件将存储在您的计算机上。

    - **Description**（描述）：最好在此提供一些描述项目的文字。


    当您单击 `Share` 按钮时，Android Studio 将提示您选择要分享的文件。在版本控制的术语中，我们不说“分享”，而说“提交”。参见图 9-8。


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig8_HTML.jpg](img/476822_1_En_9_Fig8_HTML.jpg)


    图 9-8. 为初始提交添加文件


    默认情况下，对话框中显示的所有内容都被选中，这意味着项目文件夹中的所有内容都将被提交，但并非完全如此。尝试向下滚动，以便您能看到所有带有勾选标记的文件。您可能会注意到一个名为
    `.gitignore` 的文件，如图 9-9 所示。


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig9_HTML.jpg](img/476822_1_En_9_Fig9_HTML.jpg)


    图 9-9. 添加 `.gitignore`


    `.gitignore` 是一个特殊文件，其中包含不会被包含在仓库中的文件列表——这些文件将被忽略。


    如果项目工具窗口的视图设置为 Android，您将无法看到 `.gitignore` 文件，但如果您将项目工具窗口的视图更改为 Project，如图 9-10
    所示，您应该可以看到 `.gitignore` 文件。


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig10_HTML.jpg](img/476822_1_En_9_Fig10_HTML.jpg)


    图 9-10. 项目工具窗口设置为 Project 视图


    清单 9-2 显示了 `.gitignore` 的内容。


    ```

    *.iml

    .gradle

    /local.properties

    /.idea/caches

    /.idea/libraries

    /.idea/modules.xml

    /.idea/workspace.xml

    /.idea/navEditor.xml

    /.idea/assetWizardSettings.xml

    .DS_Store

    /build

    /captures

    .externalNativeBuild

    清单 9-2. .gitignore

    ```


    大多数情况下，您希望保留 `.gitignore` 中的所有条目。当然，您可以向列表中添加内容，但您不应从中移除任何内容，如清单 9-2 所示。默认情况下，`.gitignore`
    中的文件列表指的是您计算机独有的内容；例如，`/local.properties` 列出了您计算机上 JDK 的位置。它也可能包含特定于您作为用户的数据，例如
    Firebase 密钥；显然，您不希望将这些信息提交到源代码控制中。另一个例子是 `.DS_Store` 文件，只有您在使用 Mac 时才会拥有它；每次您创建目录时，macOS
    都会创建此文件。此文件对您的项目不重要。


    回到提交对话框窗口，当您单击 `OK` 时，提交窗口中所有（已勾选的）文件都会被*提交*，然后*推送*到远程仓库。


    ## 从 GitHub 打开项目


    您可以通过从远程仓库（如 GitHub）获取项目来恢复项目；在 Git 术语中，这称为“克隆”一个仓库。您执行此操作的基本场景是，当您的某个队友在 GitHub
    上分享了项目仓库，而您也希望在其上工作时。第一步是从远程仓库获取项目。您可以通过两种方式之一完成此操作。


    当您在 Android Studio 中已经打开了一个项目时，您可以转到主菜单栏并选择 `File` ➤ `New` ➤ `Project from Version
    Control` ➤ `Git`。


    您也可以从 Android Studio 欢迎屏幕执行此操作，如图 9-11 所示。


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig11_HTML.jpg](img/476822_1_En_9_Fig11_HTML.jpg)


    图 9-11. 欢迎屏幕，Git


    两种方式都可以。下一个屏幕是 Clone Repository 窗口，如图 9-12 所示。


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig12_HTML.jpg](img/476822_1_En_9_Fig12_HTML.jpg)


    图 9-12. 克隆仓库


    各字段描述如下：


    - **URL**（网址）：这是仓库的远程 URL。我使用的是 URL `git@github.com:/etc`，因为我通过 SSH 获取项目。我可以这样做，因为我已经在
    GitHub 中设置了 SSH 密钥。如果您尚未设置 SSH 密钥，则可能需要使用 HTTPS URL。您可以在其 GitHub 页面上找到该仓库的 HTTPS
    URL，如图 9-13 所示。单击 `Use HTTPS` 选项以获取 HTTPS URL。

    - **Directory**（目录）：这是您硬盘上要存储项目的位置。


    ### 注意


    GitHub 允许在与仓库交互时使用 SSH 和 HTTPS。GitHub 发布了一些关于何时使用 SSH 或 HTTPS 的指南，请访问 [`bit.ly/sshvshttps`](https://bit.ly/sshvshttps)。如果您想了解更多关于
    Git 协议的信息，可以从 [`bit.ly/gitprotocols`](https://bit.ly/gitprotocols) 获取更多信息。


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig13_HTML.jpg](img/476822_1_En_9_Fig13_HTML.jpg)


    图 9-13. 仓库的 GitHub 页面


    要完成克隆过程，请单击 `Clone` 按钮，如图 9-12 所示。现在，您可以像打开 Android Studio 中的任何其他项目一样打开该项目。

