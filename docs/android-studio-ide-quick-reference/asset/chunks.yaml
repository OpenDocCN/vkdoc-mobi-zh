  trans: '

    ## 获取 Git


    Git 适用于 macOS、Linux 和 Windows。如果你使用的是 macOS 并且已经安装了 XCode CLI，那么很可能已经安装了 Git。而在
    Windows 和 Linux 上，你需要先以某种方式获取 Git，才能继续按照以下说明进行操作。


    在系统上安装 Git 最简单的方法是访问 [`https://git-scm.com/download`](https://git-scm.com/download)
    并获取适用于你平台的版本。你可以获取适用于 Windows 和 macOS 的预编译二进制文件；对于 Linux，则会获得如何使用包管理器安装 Git 的说明。


    如果你已经使用了诸如 `chocolatey`（Windows）、`MacPorts`（macOS）或 `HomeBrew`（同样适用于 macOS）这类包管理器，那么你也可以使用这些包管理器来获取
    Git。


    在 Windows 上使用 `chocolatey`，你可以在命令行或 PowerShell 中运行以下命令：


    ```

    choco install git

    ```


    在 macOS 上使用 `HomeBrew`，你可以尝试：


    ```

    brew install git

    ```


    在 macOS 上使用 `MacPorts`，你可以使用：


    ```

    sudo port install git

    ```


    接下来，我们转到 Android Studio。打开 IDE，前往 `Preferences`（macOS）或 `Settings` 窗口（Windows
    和 Linux），然后进入 `Version Control` ➤ `Git`，如图 9-1 所示。


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig1_HTML.jpg](img/476822_1_En_9_Fig1_HTML.jpg)


    图 9-1: `Preferences` ➤ `Version Control` ➤ `Git`


    注意 `Path to Git executable`（Git 可执行文件路径）字段。如图 9-1 所示，我的这个字段已被填充并自动检测到；这通常是正确的，你无需再做其他操作。如果
    Android Studio 没有自动检测到 Git 可执行文件的位置，或者你不想使用自动检测到的版本，你随时可以更改它。要更改 Git 可执行文件，请点击省略号按钮（即
    `Test` 按钮左侧带有三个点的按钮，如图 9-1 所示）。


    找到你希望 Android Studio 使用的 Git 可执行文件。之后，点击 `Test` 按钮。结果如图 9-2 所示。


    ### 提示


    对于 Windows 用户。如果你使用了 `git-scm` 的安装程序并使用默认选项安装，那么 Git 可执行文件将位于 `C:\Program Files\(x86)\Git\bin\`
    文件夹中。


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig2_HTML.jpg](img/476822_1_En_9_Fig2_HTML.jpg)


    图 9-2: Git 执行成功


    现在你已经准备好使用带有 Git 版本控制的 Android Studio 了。你可以开始与 Git 仓库进行集成。


    ## 将 Android Studio 与 GitHub 结合使用


    再次前往 `Preferences/Settings` 窗口，然后进入 `GitHub`，如图 9-3 所示。


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig3_HTML.jpg](img/476822_1_En_9_Fig3_HTML.jpg)


    图 9-3: `Preferences`，`GitHub`


    点击 `Add account`（添加账户）链接。你将看到如图 9-4 所示的 `Login`（登录）窗口。


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig4_HTML.jpg](img/476822_1_En_9_Fig4_HTML.jpg)


    图 9-4: 登录 GitHub


    如果你已有 GitHub 账户，可以在该窗口中提供你的 GitHub 登录凭据；如果你还没有账户，可以点击 `Sign up for GitHub`（注册
    GitHub）链接（如图 9-4 所示），然后你将被引导至 GitHub 网页，在那里你可以注册一个新账户。


    你可以使用免费的 GitHub 账户创建私有或公共仓库。公共仓库对所有人共享；你无法控制其可见性——所有人都能看到它。另一方面，私有仓库不会对所有人共享；你可以控制仓库的访问权限。


    当你准备好 GitHub 凭据后，将它们填入如图 9-4 所示的登录名和密码字段，然后点击 `OK`。如果一切顺利，你应该会在 `Preferences/Settings`
    窗口中看到你的 GitHub 头像，如图 9-5 所示。


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig5_HTML.jpg](img/476822_1_En_9_Fig5_HTML.jpg)


    图 9-5: GitHub 设置


    点击 `OK` 按钮，你现在应该可以拉取和分享 GitHub 上的项目了。


    ### 在 GitHub 上分享项目


    如果这是你第一次安装 Git，你可能需要为 Git 配置全局变量 `user.email` 和 `user.name`。为此，请在命令行窗口中输入列表 9-1
    中的代码。


    ```

    Git config --global user.name "your name"

    Git config --global user.email "your email"

    ```


    列表 9-1: 设置 Git 全局变量


    不要忘记分别将 “your name” 和 “your email” 替换为你的实际姓名和实际邮箱。

    '
- fmt: '### Tip


    For Windows users. The Git installer won’t update the `PATH` variable, so you
    might encounter the “bad command or filename” error. In order to do the commands
    shown in Listing [9-1](#476822_1_En_9_Chapter.xhtml#PC4), you must navigate first
    to the location of the Git executable. So, change directory to `C:\Program Files\(x86)\Git\bin\`
    and then execute the commands shown in Listing [9-1](#476822_1_En_9_Chapter.xhtml#PC4).


    Open any project that you’d like to share via GitHub; then, from the main menu
    bar, go to `VCS` ➤ `Import into Version Control` ➤ `Share Project on GitHub`,
    as shown in Figure [9-6](#476822_1_En_9_Chapter.xhtml#Fig6).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig6_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig6_HTML.jpg)


    Figure 9-6. Importing into version control


    Provide the necessary information, as shown in Figure [9-7](#476822_1_En_9_Chapter.xhtml#Fig7).
    The following is a brief explanation of what the fields mean:


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig7_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig7_HTML.jpg)


    Figure 9-7. Share a project on GitHub


    - **Repository name**: The name of the public repository you’d like to create.
    When you share a project on GitHub, it is called a repository (or repo for short),
    which is simply a place where data is stored and managed. In this case, you’re
    creating a repo for just the one project. So, it’s best that you store only project-related
    artifacts in it.

    - **Private**: If you leave this box unchecked, as I’m doing here, it means the
    repo will be public. You need to decide on the visibility of the repo. Remember,
    if it’s public, everybody sees it; if it’s private, you control who sees it.

    - **Remote**: Leave this as is. It reads as “remote” because the files will be
    stored on a remote server (on GitHub’s servers), as opposed to “local,” which
    means the files will be stored on your computer.

    - **Description**: It’s best to provide some words that describe the project here.


    When you click the `Share` button, Android Studio will prompt you for which files
    you want to share. In version control parlance, instead of saying “share” we say
    “commit.” See Figure [9-8](#476822_1_En_9_Chapter.xhtml#Fig8).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig8_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig8_HTML.jpg)


    Figure 9-8. Adding files for the initial commit


    By default, everything shown in the dialog box is checked, which means everything
    in the project folder will be committed, but not quite. Try to scroll down so
    you can see all the files that have checkmarks. You might notice a file named
    `.gitignore`, as shown in Figure [9-9](#476822_1_En_9_Chapter.xhtml#Fig9).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig9_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig9_HTML.jpg)


    Figure 9-9. Adding `.gitignore`


    `.gitignore` is a special file that contains a list of files that won’t be included
    in the repo—these files will be, well, ignored.


    If the view in the Project tool window is set to Android, you won’t be able to
    see the `.gitignore` file, but if you change the view of the Project tool window
    to Project, as shown in Figure [9-10](#476822_1_En_9_Chapter.xhtml#Fig10), you
    should see the `.gitignore` file.


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig10_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig10_HTML.jpg)


    Figure 9-10. Project tool window set to Project view


    Listing [9-2](#476822_1_En_9_Chapter.xhtml#PC5) shows the contents of `.gitignore`.


    ```

    *.iml

    .gradle

    /local.properties

    /.idea/caches

    /.idea/libraries

    /.idea/modules.xml

    /.idea/workspace.xml

    /.idea/navEditor.xml

    /.idea/assetWizardSettings.xml

    .DS_Store

    /build

    /captures

    .externalNativeBuild

    Listing 9-2. .gitignore

    ```


    You want to keep all the entries in `.gitignore` most of the time. Of course you
    can add to the list, but you don’t want to remove anything from it, as shown in
    Listing [9-2](#476822_1_En_9_Chapter.xhtml#PC5). By default, the list of files
    in `.gitignore` refers to things that are unique to your computer; for example,
    the `/local.properties` lists the location of the JDK on your computer. It may
    also contain data that’s specific to you as a user, like Firebase keys; clearly,
    you don’t want to commit that info into source control. Another example is the
    `.DS_Store` file, which you will only have if you’re using a Mac; macOS creates
    this file every time you create a directory. This file isn’t important to your
    project.


    Going back to the commit dialog window, when you click `OK`, all the (checked)
    files in the commit window get *committed* and then *pushed* to the remote repo.


    ## Opening a Project from GitHub


    You can restore a project by fetching it from a remote repo like GitHub; in Git
    parlance, this is called “cloning” a repo. The basic scenario when you do this
    is when one of your teammates has shared a project repo on GitHub and you’d like
    to work on it as well. The first step is to fetch the project from the remote
    repo. You can do this in one of two ways.


    When you already have an open project in Android Studio, you can go to the main
    menu bar and choose `File` ➤ `New` ➤ `Project from Version Control` ➤ `Git`.


    You may also do this from the Android Studio welcome screen, as shown in Figure
    [9-11](#476822_1_En_9_Chapter.xhtml#Fig11).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig11_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig11_HTML.jpg)


    Figure 9-11. Welcome Screen, Git


    Either way you do it is fine. The next screen is the Clone Repository window,
    as shown in Figure [9-12](#476822_1_En_9_Chapter.xhtml#Fig12).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig12_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig12_HTML.jpg)


    Figure 9-12. Clone repository


    The fields are described below:


    - **URL**: This is the remote URL of the repo. I’m using the URL `git@github.com:/etc`
    because I’m fetching the project via SSH. I can do this because I’ve already set
    up my SSH keys in GitHub. If you haven’t set up your SSH keys yet, you may have
    to use the HTTPS URL. You can find the HTTPS URL for the repo on its GitHub page,
    shown in Figure [9-13](#476822_1_En_9_Chapter.xhtml#Fig13). Click the `Use HTTPS`
    option to get the HTTPS URL.

    - **Directory**: This is the location on your hard drive where you would like
    to store the project.


    ### Note


    GitHub allows for both SSH and HTTPS to be used when you interact with the repo.
    GitHub published some guidelines as to when to use SSH or HTTPS at [https://bit.ly/sshvshttps](https://bit.ly/sshvshttps).
    If you want to know more about the Git protocols, you can get more information
    from [https://bit.ly/gitprotocols](https://bit.ly/gitprotocols).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig13_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig13_HTML.jpg)


    Figure 9-13. GitHub page for a repo


    To complete the process of cloning, click the `Clone` button, as shown in Figure
    [9-12](#476822_1_En_9_Chapter.xhtml#Fig12). You can now open the project as you
    would any other project in Android Studio.'
