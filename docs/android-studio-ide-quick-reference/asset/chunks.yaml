- fmt: "为了给按钮添加点击处理程序，请打开`One.java`（其中包含您的`One`目的地的Java源文件），并确保其内容类似于清单[10-7](#476822_1_En_10_Chapter.xhtml#PC7)所示。\n\
    \n```\npublic class One extends Fragment {\npublic One() {\n// Required empty\
    \ public constructor\n}\n@Override\npublic View onCreateView(LayoutInflater inflater,\
    \ ViewGroup container,\nBundle savedInstanceState) {\n// Inflate the layout for\
    \ this fragment\nfinal View view = inflater.inflate(R.layout.fragment_one, container,\
    \ false);\nview.findViewById(R.id.button2).setOnClickListener(new View.OnClickListener()\
    \ {\n@Override\npublic void onClick(View v) {\nNavigation.findNavController(view).navigate(R.id.action_one_to_two2);\n\
    }\n});\nreturn view;\n}\n}\nListing 10-7.\nClass One\n```\n\n清单[10-7](#476822_1_En_10_Chapter.xhtml#PC7)中最关键的一行代码是`NavController`对象的`navigate()`方法。您只需将在导航图中创建的操作的ID作为参数传递给`navigate()`，即可实现导航。现在您可以启动模拟器并测试该应用。\n\
    \n本章仅触及了导航组件的皮毛。该领域还有许多值得探索的内容，请继续深入。\n\n## 本章小结\n\n*   您仍然可以在应用中使用基于Activity或基于Fragment的导航，但请记得它们各自的优缺点。\n\
    *   导航组件结合了基于Activity和基于Fragment导航的最佳特性；其API易于使用，并且您可以更好地控制返回栈。\n*   导航组件引入了*目的地*的概念。目的地可以是Fragment、Activity或自定义视图；它们是用户导航到的目标。\n\
    *   目的地通过导航图进行分组；导航图是一个XML资源文件，其中包含目的地之间的所有*动作*。\n*   目的地通过动作相互连接。\n*   导航的基本思路是：\n\
    \    1.  创建导航图。\n    2.  创建目的地。\n    3.  连接目的地；每个连接成为一个动作。\n    4.  使用`NavController`对象以编程方式从一个目的地导航到另一个目的地。您可以使用ID或URI进行导航。\n\
    \n# 11. Lifecycle、ViewModel、LiveData和Room\n\n*本章涵盖内容：*\n\n*   生命周期感知组件\n*   ViewModel\n\
    *   LiveData\n*   Room\n\n您在上一章已初步了解了架构组件。本章将探讨架构组件中的其他一些库，特别是Room。它是一个基于SQLite的持久化库。如果您之前使用过ORM（对象关系映射器），可以将Room视为类似的东西。\n\
    \n在本章中，您还将探索一些与Room库紧密配合的架构组件库。您将了解到生命周期感知组件、LiveData和ViewModel；这些库与Room一起，是您构建流畅且稳定的数据库应用所需的部分。\n\
    \n## 生命周期感知组件\n\n生命周期感知组件会响应另一组件生命周期状态的变化而执行相应操作。如果您熟悉*观察者-被观察者*设计模式，那么生命周期感知组件的工作方式与之类似。\n\
    \n您需要学习一些新术语：\n\n*   **Lifecycle Owner**：一个具有生命周期的组件，例如Activity或Fragment。它在其生命周期中可以进入多种状态，如`CREATED`、`RESUMED`、`PAUSED`、`DESTROYED`等。Lifecycle\
    \ Observer可以接入Lifecycle Owner，并在其生命周期状态发生变化时（例如当Activity进入`CREATED`状态时）得到通知。例如，在它进入`onCreate()`后，我有时会将Lifecycle\
    \ Owner称为可观察者。\n*   **Lifecycle Observer**：一个监听Lifecycle Owner生命周期状态变化的对象。它是一个实现了`LifecycleObserver`接口的类。\n\
    \n借助生命周期感知组件，您可以观察诸如Activity之类的组件，并随着它进入其任何生命周期状态而执行相应的操作。清单[11-1](#476822_1_En_11_Chapter.xhtml#PC1)和[11-2](#476822_1_En_11_Chapter.xhtml#PC2)展示了如何在Lifecycle\
    \ Owner（`MainActivity`）和Lifecycle Observer（`MainActivityObserver`）之间建立观察者-被观察者关系的示例。\n\
    \n### 注意\n\n如果您正在创建项目以跟随本章的代码示例，请不要忘记勾选“Use AndroidX artifacts”复选框，如图[11-1](#476822_1_En_11_Chapter.xhtml#Fig1)所示。您需要`AppCompatActivity`的新功能来处理生命周期扩展。\n\
    \n![../images/476822_1_En_11_Chapter/476822_1_En_11_Fig1_HTML.jpg](images/476822_1_En_11_Chapter/476822_1_En_11_Fig1_HTML.jpg)\n\
    \n图 11-1. AndroidX artifacts\n\n为了演示生命周期的概念，您将研究两个类：\n\n*   `MainActivity`：这是一个简单的Activity，与您在创建包含空Activity的项目时IDE生成的任何其他Activity非常相似。代码示例见清单[11-2](#476822_1_En_11_Chapter.xhtml#PC2)。\n\
    *   `MainActivityObserver`：一个实现了`LifeCycleObserver`接口的Java类。这将是您的监听器对象；代码在清单[11-1](#476822_1_En_11_Chapter.xhtml#PC1)中列出并注释。"
  raw: "To add a click handler to your button, open `One.java`, which contains the\
    \ Java source file for your One destination, and make sure it looks something\
    \ like the one in Listing [10-7](#476822_1_En_10_Chapter.xhtml#PC7).\n\n```\n\
    public class One extends Fragment {\npublic One() {\n// Required empty public\
    \ constructor\n}\n@Override\npublic View onCreateView(LayoutInflater inflater,\
    \ ViewGroup container,\nBundle savedInstanceState) {\n// Inflate the layout for\
    \ this fragment\nfinal View view = inflater.inflate(R.layout.fragment_one, container,\
    \ false);\nview.findViewById(R.id.button2).setOnClickListener(new View.OnClickListener()\
    \ {\n@Override\npublic void onClick(View v) {\nNavigation.findNavController(view).navigate(R.id.action_one_to_two2);\n\
    }\n});\nreturn view;\n}\n}\nListing 10-7.\nClass One\n```\n\nThe most important\
    \ line of code in Listing [10-7](#476822_1_En_10_Chapter.xhtml#PC7) is the `navigate()`\
    \ method of the NavController object. You simply pass the ID of the action you\
    \ created in the navigation graph as a parameter to `navigate()` and that does\
    \ the trick. You can now launch the emulator and test the app.\n\nThis chapter\
    \ merely scratched the surface of navigation components. There’s a lot to discover\
    \ in this area, so keep exploring.\n\n## Chapter Summary\n\n*   You can still\
    \ use activity-based or fragment-based navigation in your app, just remember their\
    \ pros and cons.\n\n*   Navigation components combine the best features of activity-based\
    \ and fragment-based navigation; the API is easy to work with and you have more\
    \ control on the back stack.\n\n*   Navigation components introduce the concept\
    \ of *destinations*. Destinations can be fragments, activities, or custom views;\
    \ they are what your users will navigate to.\n\n*   Destinations are grouped using\
    \ a navigation graph; it’s an XML resource file that contains all the *actions*\
    \ between destinations.\n\n*   Destinations are connected to each other by actions.\n\
    \n*   The basic idea of navigation is to\n    1.  Create a navigation graph.\n\
    \n    2.  Create destinations.\n\n    3.  Connect the destinations; each connection\
    \ becomes an action.\n\n    4.  Navigate programmatically from one destination\
    \ to another using the NavController object. You can navigate using an ID or a\
    \ URI.\n\n# 11. Lifecycle, ViewModel, LiveData, and Room\n\n*What this chapter\
    \ covers:*\n\n*   Lifecycle-aware components\n\n*   ViewModel\n\n*   LiveData\n\
    \n*   Room\n\nYou saw a bit of the architecture components in the previous chapter.\
    \ In this chapter, you’ll look at some other libraries in the architecture components,\
    \ namely Room. It’s a persistence library that sits on top of SQLite. If you’ve\
    \ used an ORM (object-relational mapper) before, you can think of Room as something\
    \ like that.\n\nAlso in this chapter, you’ll explore some more libraries in the\
    \ architecture components that go hand in hand with the Room library. You’ll look\
    \ at lifecycle-aware components, LiveData, and ViewModel; these, together with\
    \ Room, are some of the libraries you’ll need to build a fluid and fluent database\
    \ application.\n\n## Lifecycle-Aware Components\n\nLifecycle-aware components\
    \ perform actions in response to a change in the lifecycle status of another component.\
    \ If you’re familiar with the *Observable-Observer* design pattern, lifecycle-aware\
    \ components operate like that.\n\nYou need to learn some new vocabulary:\n\n\
    *   **Lifecycle Owner**: A component that has a, well, lifecycle, like an activity\
    \ or a fragment. It can enter various states in its lifecycle, like *CREATED,\
    \ RESUMED, PAUSED, DESTROYED,* etc. A Lifecycle Observer can tap into a Lifecycle\
    \ Owner and be notified when the lifecycle status changes, like when the activity\
    \ enters the CREATED state. After it enters `onCreate()`, for example, I sometimes\
    \ refer to the Lifecycle Owner as an observable.\n\n*   **Lifecycle Observer**:\
    \ An object that listens to the changes in the lifecycle status of a Lifecycle\
    \ Owner. It’s a class that implements the LifecycleObserver interface.\n\nWith\
    \ the lifecycle-aware components, you can observe a component like an activity\
    \ and perform actions as it enters any of its lifecycle statuses. Listings [11-1](#476822_1_En_11_Chapter.xhtml#PC1)\
    \ and [11-2](#476822_1_En_11_Chapter.xhtml#PC2) show an example of how to set\
    \ up an observer-observable relationship between a Lifecycle Owner (`MainActivity`)\
    \ and a Lifecycle Observer (`MainActivityObserver`).\n\n### Note\n\nIf you’re\
    \ creating a project to follow the code examples in this chapter, don’t forget\
    \ to check the Use AndroidX artifacts box, as shown in Figure [11-1](#476822_1_En_11_Chapter.xhtml#Fig1).\
    \ You need the new capabilities of the AppCompatActivity to work with the lifecycle\
    \ extensions.\n\n![../images/476822_1_En_11_Chapter/476822_1_En_11_Fig1_HTML.jpg](images/476822_1_En_11_Chapter/476822_1_En_11_Fig1_HTML.jpg)\n\
    \nFigure 11-1.\n\nAndroidX artifacts\n\nTo demonstrate the lifecycle concepts,\
    \ you will examine two classes:\n\n*   `MainActivity`: This is a simple activity,\
    \ pretty much like any other activity that the IDE generates when you create a\
    \ project with an empty activity. The code sample is shown in Listing [11-2](#476822_1_En_11_Chapter.xhtml#PC2).\n\
    \n*   `MainActivityObserver`: A Java class that will implement the LifeCycleObserver\
    \ interface. This will be your listener object; the code is listed and annotated\
    \ in Listing [11-1](#476822_1_En_11_Chapter.xhtml#PC1)."
