    But what if you need to fetch another number? For that, you can add a trigger
    in the `MainActivity`, like a Button, and then it will call `getNumber()` on the
    ViewModel, but how are you going to refresh the TextView in the `MainActivity`?
    There are a couple of ways to do this, and you may have encountered them already.
    One way to facilitate data exchange between your ViewModel and an activity is
    the creative use of interfaces (but I won’t discuss that here) or by using an
    EventBus like Otto (I also won’t discuss that here)—but now, thankfully, because
    of architecture components, you can use LiveData. The new data flow is depicted
    in Figure [11-3](#476822_1_En_11_Chapter.xhtml#Fig3).


