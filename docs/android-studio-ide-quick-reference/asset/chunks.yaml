- fmt: '# Navigation Components


    Alright, that single line of code reference from the previous section probably
    got you excited—and relieved. But it’s not the savings of keystrokes that’s the
    big picture here; it’s the fact that now you can get the best of both activity-based
    and fragment-based navigation. Now, fragment navigation also has an easy API.


    But first you need to understand a bit about navigation components. They’re a
    small part of the architecture components, which are in turn a part of a bigger
    thing called Android Jetpack. (I’m not getting into Jetpack or architecture components
    in detail here; they are large topics; but a brief background can’t hurt.)


    At Google I/O 2017, Google introduced the Android architecture components. These
    libraries are part of a larger collection called Android Jetpack. Together with
    architecture components, there were others like foundation, behavior, and UI.


    Jetpack is a collection of Android software components to make our lives easier.
    It helps us follow best practices and lets us avoid writing too much boiler-plate
    code. You’ll find the Jetpack code in the `androidx.*` package libraries.


    Here’s a brief description of the Jetpack components.


    **Foundation**


    - **AppCompat**: Lets you write code that degrades gracefully on older versions
    of Android

    - **Android KTX**: So you write more concise, idiomatic Kotlin code if you’re
    using Kotlin

    - **Multidex**: Provides support for apps with multiple DEX files

    - **Test**: A testing framework for unit and runtime UI tests


    **Behavior**


    - **Download manager**: Lets you write programs that schedule and manage large
    downloads

    - **Media and Playback**: Backwards-compatible APIs for media playback and routing

    - **Notifications**: Provides a backwards-compatible notification API with support
    for Wear and Auto

    - **Permissions**: Compatibility APIs for checking and requesting app permissions

    - **Preferences**: Creates an interactive settings screen

    - **Sharing**: Provides a share action suitable for an app’s Action bar

    - **Slices**: Creates flexible UI elements that can display app data outside the
    app


    **UI**


    - **Animations and Transitions**: Moves widgets and transitions between screens

    - **Auto**: If you’re working on apps that will run in the infotainment consoles
    in vehicles, you’ll need this. These are the components that help you build apps
    for Android Auto.

    - **Emoji**: Enables an up-to-date emoji font on older platforms

    - **Fragment**: All the fragment code is already moved here.

    - **Layout**: Lays out widgets using different algorithms

    - **Palette**: Pulls useful information out of color palettes

    - **TV**: Components to help develop apps for Android TV

    - **Wear OS by Google**: If you want to work with Android wearables like the watch,
    this is what you need.


    **Architecture**


    - **Data binding**: Declaratively bind observable data to UI elements

    - **Lifecycles**: Manage activity and fragment lifecycles

    - **LiveData**: Notifies views when underlying database changes

    - **Paging**: Gradually loads information on demand from your data source. Think
    of when the user is scrolling through a list—this helps you handle the loading
    of data. It’s coupled with the Recycler view.

    - **ViewModel**: Manages UI-related data in a lifecycle-conscious way

    - **WorkManager**: Manages background jobs

    - **Navigation**: Implementation of navigation in an app. Passes data between
    screens. Provides deep links from outside the app.

    - **Room**: Think ORM for your SQLite database


    There’s a lot to explore in Jetpack, so make sure you check it out.


    Going back to our topic, the Navigation components simplify the implementation
    of, well, navigation between destinations in an app. A *destination* is any place
    in your app. It could be an activity, a fragment inside an activity, or a custom
    view; and destinations are managed using a navigation graph.


    A navigation graph groups all the destinations and defines the different connections
    between the destinations; these connections are called *actions.* The graph is
    simply an XML resource file that represents all your app’s navigation paths. You
    can have more than one navigation graph in your app.


    ## Working with Jetpack Navigation


    To get a better appreciation of the navigation components, it’s best if you can
    work on a small project. So, create a new, empty project in Android Studio, as
    shown in Figure [10-2](#476822_1_En_10_Chapter.xhtml#Fig2). Don’t forget to check
    the `Use AndroidX artifacts` option. Remember that all support libraries are now
    in the `AndroidX` packages; you need them because you’ll be working with fragments.


    ![../images/476822_1_En_10_Chapter/476822_1_En_10_Fig2_HTML.jpg](images/476822_1_En_10_Chapter/476822_1_En_10_Fig2_HTML.jpg)


    Figure 10-2. New, empty project with AndroidX artifacts


    By the way, if you haven’t updated or upgraded to the latest version of Android
    Studio, now would be a good time to do so. At the time of writing, you must use
    Android Studio v3.3 or higher if you want to use navigation; also, you need to
    add the navigation component’s dependencies to your project. So, after you’ve
    created the project, locate the module-level `build.gradle` file and add the entries,
    as shown in Listing [10-5](#476822_1_En_10_Chapter.xhtml#PC5).


    ```

    dependencies {

    def nav_version = "2.1.0-alpha02"

    ...

    implementation "androidx.navigation:navigation-fragment:$nav_version"

    implementation "androidx.navigation:navigation-ui:$nav_version"

    }

    Listing 10-5. Adding Navigation to build.gradle

    ```


    You’ll have to sync the Gradle file after adding the dependencies.'
