- fmt: '# The IDE


    From the opening screen, assuming you either created a new project or opened an
    existing one, Figure [3-2](#476822_1_En_3_Chapter.xhtml#Fig2) shows the various
    parts of Android Studio while a project is open in it.


    | ➊ | **Main menu bar**: You can navigate Android Studio in various ways. Often,
    there’s more than one way to do a task, but the primary navigation is done in
    the main menu bar. If you’re in Linux or Windows, the main menu bar sits directly
    at the top of the IDE; if you’re in macOS, the main menu bar is disconnected from
    the IDE (which is how all macOS software works). |

    | ➋ | **Navigation bar**: This bar lets you navigate the project files. It’s a
    horizontally arranged collection of chevrons that resembles the breadcrumb navigation
    you find on some websites. You can open your project files either through the
    navigation bar or the Project tool window. |

    | ➌ | **Tool bar**: It lets you do a wide range of actions (e.g., save files,
    run the app, open the AVD Manager, open the SDK Manager, and undo and redo actions).
    |

    | ➍ | **Main editor window**: This is the most prominent window and has the most
    screen real estate. The editor window is where you can create and modify project
    files. It changes its appearance depending on what you are editing. If you’re
    working on a program source file, this window will show just the source files.
    When you are editing layout files, you may see either the raw XML file or a visual
    rendering of the layout. |

    | ➎ | **Project tool window**: This window shows the contents of the project folders.
    You’ll be able to see and launch all your project assets (source code, XML files,
    graphics, etc.) from here. |

    | ➏ | **Tool window bar**: The tool window bar runs along the perimeter of the
    IDE window. It contains the individual buttons you need to activate specific tool
    windows (e.g., TODO, Logcat, Project window, Connected Devices, etc.). |

    | ➐ | **Show/hide tool window**: It shows (or hides) the tool window bar. It’s
    a toggle. |

    | ➑ | **Tool window**: You will find tool windows on the sides and bottom of the
    Android Studio workspace. They’re secondary windows that let you look at the project
    from different perspectives. They also let you access the typical tools you need
    for development tasks (e.g., debugging, integration with version control, looking
    at the build logs, inspecting Logcat dumps, looking at TODO items, etc.). Here
    are couple of things you can do with the tool windows:• You can expand or collapse
    them by clicking the tool’s name in the tool window bar. You can also drag, pin,
    unpin, attach, and detach the tool windows.• You can rearrange the tool windows,
    but if you feel you need to restore the tool window to the default layout, you
    can do so from the main menu bar; click `Window` ➤ `Restore Default Layout`. Also,
    if you want to customize the default layout, you can rearrange the windows to
    your liking from the main menu bar by clicking `Window` ➤ `Store Current Layout
    as Default**.** |


    ![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig2_HTML.png](images/476822_1_En_3_Chapter/476822_1_En_3_Fig2_HTML.png)


    Figure 3-2.


    Main parts of Android Studio


    ## Main Editor


    Like in most IDEs, the main editor window lets you modify and work with source
    files. What makes it stand out is how well it understands Android development
    assets. Android Studio lets you work with a variety of file types, but you’ll
    probably spend most of your time editing these types of files:


    *   Java source files

    *   XML files

    *   UI layout files


    When you’re working with Java source files, you get all the code hinting and completions
    that you’ve come to expect from a modern editor. What’s more, it gives you plenty
    of early warning when something is wrong with your code. Figure [3-3](#476822_1_En_3_Chapter.xhtml#Fig3)
    shows a Java class file open in the main editor. The class file is an activity
    and it’s missing a semicolon in one of its statements. Android Studio peppers
    the IDE with (red) squiggly lines, which indicate that the class won’t compile.


    ![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig3_HTML.jpg](images/476822_1_En_3_Chapter/476822_1_En_3_Fig3_HTML.jpg)


    Figure 3-3.


    Main editor showing error indicators


    Android Studio places the squiggly lines very near the offending code. As you
    can see in Figure [3-3](#476822_1_En_3_Chapter.xhtml#Fig3), the squiggly lines
    are placed right at the point where the semicolon is expected.


    ### Editing Layout Files


    The screens that your user sees are made up of activity source files and layout
    files. The layout files are written in XML. Android Studio undoubtedly can edit
    XML files, but what sets it apart is how intuitively it can render the XML files
    in a WYSIWYG mode (what you see is what you get). Figure [3-4](#476822_1_En_3_Chapter.xhtml#Fig4)
    shows the two ways you can work with layout files.


    ![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig4_HTML.png](images/476822_1_En_3_Chapter/476822_1_En_3_Fig4_HTML.png)


    Figure 3-4.


    Design mode and Text mode editing of layout files


    Figure [3-5](#476822_1_En_3_Chapter.xhtml#Fig5) shows the various parts of Android
    Studio that are relevant when working on a layout file during Design mode.


    ![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig5_HTML.png](images/476822_1_En_3_Chapter/476822_1_En_3_Fig5_HTML.png)


    Figure 3-5.


    Layout design tools of Android Studio


    *   **View palette**: The View palette contains the views (widgets) that you can
    drag and drop on either the Design surface or Blueprint surface.

    *   **Design surface**: It acts like a real-world preview of your screen.

    *   **Blueprint surface**: Similar to the Design surface, but it only contains
    the outlines of the UI elements.

    *   **Attributes window**: You can change the properties of the UI element (view)
    in here. When you make a change on the properties of a view using the Attributes
    window, that change will be automatically reflected in the layout’s XML file.
    Similarly, when you make a change in the XML file, it will automatically be reflected
    in the Attributes window.


    ### Inserting TODO Items


    You don’t have to create a separate file to keep track of your TODO list for your
    app. When you create a comment with TODO text like


    ```

    // TODO This is a sample todo

    ```


    Android Studio will keep track of all the TODO comments in all of your source
    files. See Figure [3-6](#476822_1_En_3_Chapter.xhtml#Fig6).


    ![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig6_HTML.jpg](images/476822_1_En_3_Chapter/476822_1_En_3_Fig6_HTML.jpg)


    Figure 3-6.


    TODO items


    To view all your TODO items, click the `TODO` tab in the tool window bar.'
