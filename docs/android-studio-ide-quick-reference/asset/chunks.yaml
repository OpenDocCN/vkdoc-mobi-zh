  trans: '

    ### 注意


    构建变体是构建类型与构建配置的组合。构建类型的例子包括 `release` 和 `debug`。构建配置已在本章前文讨论过。你可以通过主菜单栏选择 **View
    ➤ Tool Windows ➤ Build Variant** 来查看当前的构建变体。


    | ➊ | 这个带有 `fileTree` 命令、`dir` 参数以及 ANT 风格通配模式 `*.jar` 的 `implementation` 指令，意味着你想要项目
    `lib` 文件夹下的所有 jar 文件都成为依赖项。因此，为项目添加 jar 依赖只需将 jar 文件放入项目的 `lib` 文件夹即可。 |

    | ➋ | 该指令表示你正在从仓库（确切地说是本地仓库）拉取一个依赖项。这会从 Android Support Library 拉取兼容性库。使用 AppCompat
    是为了让较新版本的 Android 功能能够在较旧版本上运行。不必过于担心版本问题；大多数情况下，Android Studio 都能很好地拉取正确且最新版本的兼容性库。
    |

    | ➌ | 与第 2 点类似，这也是来自 Android Support Library 的库依赖项。这次，你引用的是约束布局库，在创建使用 Constraint
    layout 的活动时需要用到它。 |

    | ➍ | 这个 `testImplementation` 指令会拉取你在 JVM 单元测试中使用的 JUnit 4 库。 |

    | ➎ | 这个 `androidTestImplementation` 会拉取你在插桩测试中使用的库。 |


    ```

    apply plugin: ''com.android.application''

    android {

    ...

    }

    dependencies {

    implementation fileTree(dir: ''libs'', include: [''*.jar''])  ➊

    implementation ''com.android.support:appcompat-v7:28.0.0''  ➋

    implementation ''com.android.support.constraint:constraint-layout:1.1.3'' ➌

    testImplementation ''junit:junit:4.12''  ➍

    androidTestImplementation ''com.android.support.test:runner:1.0.2'' ➎

    androidTestImplementation ''com.android.support.test.espresso:espresso-core:3.0.2''

    }

    清单 8-3.

    /app/build.gradle

    ```


    ## Android Support Library


    Android Support Library 是一个庞大的主题。我不会在此详述所有内容，但你至少需要对其有初步了解，尤其是在我们当前讨论的上下文中。


    Android Support Library 是 Android 非常重要的一部分。它基本上是对 Android SDK 的补充。其最重要的功能之一就是提供向后兼容性；至少它最初是为此而设计的。


    向后兼容性之所以重要，是因为新版本的 Android 正在快速发布，而仍有相当多的设备运行着旧版本的 Android。较新版本的 Android 意味着更新的能力和特性；这是否意味着运行旧版本
    Android 的设备无法使用这些新特性？并非如此。向后兼容性意味着较新的平台特性可以提供给较旧的平台版本使用。


    随着时间的推移，Android Support Library 变得越来越庞大。它开始提供不属于平台本身的功能，例如用户界面领域的功能，如 Recycler
    Views 或 Card Views。Support Library 还包含了调试和测试领域的功能，因此需要对其进行重组。


    在 Android Support Library 的早期，它只是一个单一的库；但随着它的发展，其组织形式也发生了变化。因此，Support Library
    不再只是一个单一的库，而是变成了一组更小、更易于管理的库。这些库的分组主要依据平台支持来组织，这意味着 Support Library 的名称表明了它支持哪个平台或
    API 级别。


    你可能仍然会看到名为 `v4`、`v7` 和 `v13` 的库，历史上它们的意思是 `v4` 支持 API 级别 4 及以上，`v7` 支持级别 7 及以上，`v13`
    支持 API 级别 13 及以上。我说“*历史上*”是因为这已不再正确。每当新版本的 Android 发布时，都会发生很多变化；弃用情况层出不穷。因此，你必须时常关注
    Support Library 的文档。


    在撰写本文时，`v4` 已不再支持 API 级别 4 及以上。它现在只支持 API 级别 14 及以上；`v7` 也不再支持级别 7 及以上，而是只支持级别
    14 及以上。这实际上意味着所有支持库包的最低 SDK 版本现为级别 14（Ice Cream Sandwich）。


    更重要的是，随着 Android 9（API 级别 28）的发布，出现了名为 AndroidX 的新版 Android Support Library，它是
    Jetpack 的一部分。你可以继续使用支持库（`android.support.*` 版本 27 及更早版本）。它们将保留在 Google Maven 上，但请注意，所有开发都将在
    AndroidX 中进行。


    ### 注意


    Android Jetpack 是一组组件集合，旨在让开发应用更轻松。这些库位于 `androidx.*` 包中，并且它们与平台 API 解耦。向后兼容性库现在也位于此处。Jetpack
    非常庞大。它不仅仅是兼容性库；它还包含许多其他软件组件，涉及架构、基础、UI 和行为。你可以在 [`https://developer.android.com/jetpack`](https://developer.android.com/jetpack)
    了解更多信息。


    在清单 8-3 中，你看到了这一行


    ```

    implementation ''com.android.support:appcompat-v7:28.0.0''

    ```


    这意味着，即使运行你应用的设备是 API 级别 14，你仍然可以使用


    *   ActionBar

    *   Material design

    *   `AppCompatActivity` 类

    *   `AppCompatDialog`

    *   `ShareActionProvider`


    所有这些功能都相当现代，但由于 AppCompat 库，你仍然可以在较旧的平台上使用它们。


    ### 注意


    当你以较低 API 级别为目标时，你的应用可以依赖的现代 Android 特性较少，但能够运行你应用的 Android 设备比例更高。当以较高 API 级别为目标时，情况则相反。你始终可以在创建新
    Android 项目时点击“Help me choose”链接，查看 Android 版本的数据或累积分布。


    ## 本章小结


    *   构建过程可能非常复杂。幸运的是，Gradle 处理了所有繁重的工作。

    *   存在两个 `build.gradle` 文件：一个在项目根目录，另一个在每个模块中。项目级别的 Gradle 文件是定义你想要共享给所有模块级别 Gradle
    文件的指令的好地方。

    *   模块级别的 Gradle 文件是你定义大部分配置的地方。模块依赖项和目标 SDK 都在此定义。


    # 9. Git


    *本章涵盖内容：*


    *   如何获取 Git

    *   在 Android Studio 中设置 GitHub

    *   使用 GitHub 进行共享与克隆

    *   从其他 Git 仓库进行共享与克隆


    Android Studio 提供了与多种版本控制系统的集成，而 Git 便是其中较为流行的版本控制系统之一。在本章中，你将了解如何在 Android Studio
    中使用 Git。

    '
- fmt: '## Getting Git


    Git is available for macOS, Linux, and Windows. If you’re on macOS and you’ve
    installed the XCode CLI, chances are you already have Git. On Windows and Linux,
    you’ll have to get it somehow before you can proceed with the rest of these instructions.


    The simplest way to get Git on your system is to head over to [`https://git-scm.com/download`](https://git-scm.com/download)
    and get the version for your platform. You can get precompiled binaries for Windows
    and macOS; for Linux, you get instructions on how to use your package manager
    to get Git.


    If you already use a package manager like `chocolatey` (Windows), `MacPorts` (macOS),
    or `HomeBrew` (also macOS), you can get Git using these package managers.


    On Windows with `chocolatey`, you can run the following on a command line or PowerShell:


    ```

    choco install git

    ```


    On macOS with `HomeBrew`, you can try:


    ```

    brew install git

    ```


    On macOS with `MacPorts`, you can use:


    ```

    sudo port install git

    ```


    Next, let’s move on to Android Studio. Open the IDE, go to `Preferences` (macOS)
    or the `Settings` window (Windows and Linux), and then go to `Version Control`
    ➤ `Git`, as shown in Figure [9-1](#476822_1_En_9_Chapter.xhtml#Fig1).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig1_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig1_HTML.jpg)


    Figure 9-1: `Preferences` ➤ `Version Control` ➤ `Git`


    Notice the `Path to Git executable` field. As you can see from Figure [9-1](#476822_1_En_9_Chapter.xhtml#Fig1),
    mine was filled up and auto-detected; this is usually right, and you don’t have
    to do anything else. If Android Studio did not detect the location of the Git
    executable automatically or you don’t like to use the auto-detected version, you
    can always change it. To change the Git executable, click the ellipsis (it’s the
    button with three dots on the left side of the `Test` button, shown also in Figure
    [9-1](#476822_1_En_9_Chapter.xhtml#Fig1)).


    Locate the Git executable that you’d like to use for Android Studio. After that,
    click the `Test` button. See the results in Figure [9-2](#476822_1_En_9_Chapter.xhtml#Fig2).


    ### Tip


    For Windows users. If you used the installer from `git-scm` and installed it using
    the default options, the Git executable will be in the folder `C:\Program Files\(x86)\Git\bin\`.


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig2_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig2_HTML.jpg)


    Figure 9-2: Git executed successfully


    Now you’re ready to use Android Studio with Git version control. You can now integrate
    with Git repos.


    ## Using Android Studio with GitHub


    Go to the `Preferences/Settings` window again and then go to `GitHub`, as shown
    in Figure [9-3](#476822_1_En_9_Chapter.xhtml#Fig3).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig3_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig3_HTML.jpg)


    Figure 9-3: `Preferences`, `GitHub`


    Click the `Add account` link. You’ll see the `Login` window shown in Figure [9-4](#476822_1_En_9_Chapter.xhtml#Fig4).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig4_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig4_HTML.jpg)


    Figure 9-4: Log in to GitHub


    If you already have a GitHub account, you can provide your GitHub login credentials
    in this window; if you don’t have an account yet, you can click the `Sign up for
    GitHub` link (shown in Figure [9-4](#476822_1_En_9_Chapter.xhtml#Fig4)) and you’ll
    be taken to the GitHub web page where you can sign up for a new account.


    You can create either private or public repos with your free GitHub account. A
    public repo is shared with everyone; you don’t have control over its visibility—everybody
    sees it. A private repo, on the other hand, isn’t shared with everyone; you can
    control the admission to the repo.


    When you have your GitHub credentials ready, put them in the login and password
    fields shown in Figure [9-4](#476822_1_En_9_Chapter.xhtml#Fig4) and click `OK`.
    If everything goes well, you should see your GitHub avatar in the `Preferences/Settings`
    window, as shown in Figure [9-5](#476822_1_En_9_Chapter.xhtml#Fig5).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig5_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig5_HTML.jpg)


    Figure 9-5: GitHub settings


    Click the `OK` button, and you should be ready to pull and share projects in GitHub.


    ### Sharing a Project on GitHub


    If this is the first time you’ve installed Git, you might have to configure the
    global variables `user.email` and `user.name` for Git. To do this, type the code
    in Listing [9-1](#476822_1_En_9_Chapter.xhtml#PC4) from a command line window.


    ```

    Git config --global user.name "your name"

    Git config --global user.email "your email"

    ```


    Listing 9-1: Set Git Global Variables


    Don’t forget to substitute your actual name and actual email for “your name” and
    “your email,” respectively.'
  raw: '## Getting Git


    Git is available for macOS, Linux, and Windows. If you’re on macOS and you’ve
    installed the XCode CLI, chances are you already have Git. On Windows and Linux,
    you’ll have to get it somehow before you can proceed with the rest of these instructions.


    The simplest way to get Git on your system is to head over to [`https://git-scm.com/download`](https://git-scm.com/download)
    and get the version for your platform. You can get precompiled binaries for Windows
    and macOS; for Linux, you get instructions on how to use your package manager
    to get Git.


    If you already use a package manager like chocolatey (Windows), MacPorts (macOS),
    or HomeBrew (also macOS), you can get Git using these package managers.


    On Windows with chocolatey, you can run the following on a command line or PowerShell:


    ```

    choco install git

    ```


    On macOS with HomeBrew, you can try


    ```

    brew install git

    ```


    On macOS with MacPorts, you can use


    ```

    sudo port install git

    ```


    Next, let’s move on to Android Studio. Open the IDE, go to Preferences (macOS)
    or the Settings window (Windows and Linux), and then go to Version Control ➤ Git,
    as shown in Figure [9-1](#476822_1_En_9_Chapter.xhtml#Fig1).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig1_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig1_HTML.jpg)


    Figure 9-1.


    Preferences ➤ Version Control ➤ Git


    Notice the Path to Git executable field. As you can see from Figure [9-1](#476822_1_En_9_Chapter.xhtml#Fig1),
    mine was filled up and auto-detected; this is usually right, and you don’t have
    to do anything else. If Android Studio did not detect the location of the Git
    executable automatically or you don’t like to use the auto-detected version, you
    can always change it. To change the Git executable, click the ellipsis (it’s the
    button with three dots on the left side of the Test button, shown also in Figure
    [9-1](#476822_1_En_9_Chapter.xhtml#Fig1)).


    Locate the Git executable that you’d like to use for Android Studio. After that,
    click the Test button. See the results in Figure [9-2](#476822_1_En_9_Chapter.xhtml#Fig2).


    ### Tip


    for Windows users. If you used the installer from git-scm and installed it using
    the default options, the Git executable will be in the folder `C:\Program Files\(x86)\Git\bin\`.


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig2_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig2_HTML.jpg)


    Figure 9-2.


    Git executed successfully


    Now you’re ready to use Android Studio with Git version control. You can now integrate
    with Git repos.


    ## Using Android Studio with GitHub


    Go to the Preferences/Settings window again and then go to GitHub, as shown in
    Figure [9-3](#476822_1_En_9_Chapter.xhtml#Fig3).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig3_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig3_HTML.jpg)


    Figure 9-3.


    Preferences, GitHub


    Click the Add account link. You’ll see the Login window shown in Figure [9-4](#476822_1_En_9_Chapter.xhtml#Fig4).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig4_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig4_HTML.jpg)


    Figure 9-4.


    Log in to GitHub


    If you already have a GitHub account, you can provide your GitHub login credentials
    in this window; if you don’t have an account yet, you can click the Sign up for
    GitHub link (shown in Figure [9-4](#476822_1_En_9_Chapter.xhtml#Fig4)) and you’ll
    be taken to the GitHub web page where you can sign up for a new account.


    You can create either private or public repos with your free GitHub account. A
    public repo is shared with everyone; you don’t have control over its visibility—everybody
    sees it. A private repo, on the other hand, isn’t shared with everyone; you can
    control the admission to the repo.


    When you have your GitHub credentials ready, put them in the login and password
    fields shown in Figure [9-4](#476822_1_En_9_Chapter.xhtml#Fig4) and click OK.
    If everything goes well, you should see your GitHub avatar in the Preferences/Settings
    window, as shown in Figure [9-5](#476822_1_En_9_Chapter.xhtml#Fig5).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig5_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig5_HTML.jpg)


    Figure 9-5.


    GitHub settings


    Click the OK button, and you should be ready pull and share projects in GitHub.


    ### Sharing a Project on GitHub


    If this is the first time you’ve installed Git, you might have to configure the
    global variables `user.email` and `user.name` for Git. To do this, type the code
    in Listing [9-1](#476822_1_En_9_Chapter.xhtml#PC4) from a command line window.


    ```

    Git config --global user.name "your name"

    Git config --global user.email "your email"

    Listing 9-1.

    Set Git Global Variables

    ```


    Don’t forget to substitute your actual name and actual email for “your name” and
