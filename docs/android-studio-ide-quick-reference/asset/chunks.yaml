- fmt: '# Updating Git Projects


    When a project is under source control management, Android Studio will give you
    additional prompts every time you create a new file, whether it’s a Java class,
    XML file, picture, or other file. If you add, say, a new Java class into a project
    (under Git source control), you’ll see a dialog window like the one shown in Figure
    [9-14](#476822_1_En_9_Chapter.xhtml#Fig14).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig14_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig14_HTML.jpg)


    Figure 9-14. Adding a file to Git


    If you want to add the file to Git, of course press `Yes`. If you accidentally
    press `No`, you can still add the new file in two ways:


    1. Select the file you’d like to add to Git in the Project tool window and then
    from the main menu bar choose `VCS` ➤ `Git` ➤ `Add`.

    2. You can also use the context menu by right-clicking the file and choosing `Git`
    ➤ `Add`.


    Adding the file doesn’t automatically update the remote repo. You must do two
    things to achieve this. You need to *commit* the changes you made and then do
    a *push*. To do so, select the whole project in the Project tool window, as shown
    in Figure [9-15](#476822_1_En_9_Chapter.xhtml#Fig15), and from the main menu bar,
    choose `VCS` ➤ `Git` ➤ `Commit Directory`.


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig15_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig15_HTML.jpg)


    Figure 9-15. `Git` ➤ `Commit directory`


    Next, you’ll see the Commit Changes window, shown in Figure [9-16](#476822_1_En_9_Chapter.xhtml#Fig16).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig16_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig16_HTML.jpg)


    Figure 9-16. Committing and pushing changes


    Click the down arrow on the `Commit` button and choose the `Commit and Push` option.
    Now your local project is completely in sync with the remote repo.


    # Using Other Git Repos


    GitHub is a very popular repo platform among developers, so no wonder that it’s
    well integrated with Android Studio, but what if your teammates or company don’t
    use GitHub. What if they use BitBucket or some other Git repo? Well, you can handle
    that too. In this section, you’ll use a BitBucket repo.


    With BitBucket, just like in GitHub, you need an account. Head over to [`https://bitbucket.org`](https://bitbucket.org)
    to sign up, if you don’t have an account yet, and then log into that account.
    After that, create a new repo, as shown in Figure [9-17](#476822_1_En_9_Chapter.xhtml#Fig17).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig17_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig17_HTML.jpg)


    Figure 9-17. Creating a repo


    When you click the big plus sign and choose to create a new repo, you’ll be asked
    for some details, as shown in Figure [9-18](#476822_1_En_9_Chapter.xhtml#Fig18).
    Don’t forget to click the `Advanced Settings` option so you can see all the fields.


    Take note of the following:


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig18_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig18_HTML.jpg)


    Figure 9-18. Repo details


    - **Repository name**: The name of your repo on BitBucket. It doesn’t have to
    be the same as the project stored locally in your computer, but it’s a good idea
    if it is.

    - **Access level**: Unlike GitHub, you’ll be able to create private repos in BitBucket,
    even if you’re not a paying member.

    - **Include a README**: It’s good practice to have a `README` file in a project,
    but this is optional.

    - **Version control**: Choose `Git`.

    - **Description**: Some words to best describe what you’re doing.

    - **Language**: You’re working on an Android project, so put `Android`.


    After you click the `Create repository` button, you’ll see the repo page detail,
    as shown in Figure [9-19](#476822_1_En_9_Chapter.xhtml#Fig19). Click the `Clone`
    button.


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig19_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig19_HTML.jpg)


    Figure 9-19. Newly created BitBucket repo


    You might see `SSH` instead of `HTTPS` on the `Clone this repository` page. Click
    the dropdown button to switch over to `HTTPS`, as shown in Figure [9-20](#476822_1_En_9_Chapter.xhtml#Fig20).'
