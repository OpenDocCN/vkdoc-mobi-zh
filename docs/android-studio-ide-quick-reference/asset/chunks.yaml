    \n## 致谢\n\n献给 Stephanie 和 Adrianne，我的感谢与爱。\n\n## 关于作者与技术审阅者\n\n### 关于作者\n\n###\
    \ 关于技术审阅者\n\n# 1. 安装与设置\n\n*本章涵盖内容：*\n\n- 安装 Android Studio\n- 设置 IDE\n- 基本配置\n\
    \n为 Android 开发应用程序并非一直如今天这般便捷。当 2008 年 Android 1.0 发布时，开发者获得的开发工具包不过是一组命令行工具和\
    \ Ant 构建脚本。如果你习惯使用 Vim、Ant 和其他命令行工具来构建应用程序，这倒不算太糟，但许多开发者并不习惯。缺少代码提示、项目设置和集成调试等\
    \ IDE 功能，在一定程度上构成了入门门槛。\n\n幸运的是，2008 年也发布了适用于 Eclipse IDE 的 Android 开发工具（ADT）。Eclipse\
    \ 曾经是、现在也仍然是许多 Java 开发者的最爱和首选 IDE。因此它成为 Android 开发者的首选 IDE 也是顺理成章的事。\n\n从 2009\
    \ 年到 2012 年，Eclipse 一直是 Android 开发的首选 IDE。Android SDK 在结构和范围上经历了重大和渐进式的变化。2009\
    \ 年，SDK 管理器发布，用于下载工具、各个 SDK 版本以及用于模拟器的 Android 映像。2010 年，针对 ARM 处理器和 x86 CPU 发布了额外的映像。\n\
    \n2012 年是重要的一年，因为 Eclipse 和 ADT 终于捆绑在一起。在此之前，开发者必须分别安装 Eclipse 和 ADT，安装过程并不总是顺利。因此两者捆绑在一起大大简化了开始\
    \ Android 开发的过程。2012 年也是 Eclipse 作为 Android 主导 IDE 的最后一年。\n\n2013 年，Android Studio（AS）发布。诚然，它仍处于测试阶段，但趋势已非常明确：它将成为\
    \ Android 开发的官方 IDE。Android Studio 基于 JetBrains 的 IntelliJ。IntelliJ 是一款商业化的 Java\
    \ IDE，同时也有社区（免费）版本，该版本构成了 Android Studio 的基础。\n\n## 设置 Android Studio\n\n撰写本文时，Android\
    \ Studio 的版本是 3.2.1；希望当你阅读本书时版本不会有太大变化。你可以从[`https://developer.android.com/studio`](https://developer.android.com/studio)下载。它适用于\
    \ Windows（32 位和 64 位）、macOS 和 Linux。我分别在 macOS (Mojave)、Windows 10 64 位和 Ubuntu\
    \ 18 上执行了安装说明。我主要在 macOS 环境下工作，这解释了本书中大多数截图为何看起来像 macOS。Android Studio 在这三个平台上的外观、运行和操作体验（大部分）相同，仅在键盘快捷键和\
    \ macOS 的主菜单栏等细节上有微小差异。\n\n在进一步操作之前，我们先看看 Android Studio 的系统要求。你至少需要以下配置：\n\n\
    - Microsoft Windows 7/8/10（32 位或 64 位）或\n- macOS 10.10 (Yosemite 或更高版本) 或\n- Linux\
    \ (Gnome 或 KDE 桌面)，Ubuntu 14.04 或更高版本（64 位，但需要能够运行 32 位应用程序）\n- 如果使用 Linux，需要\
    \ GNU C 库 (glibc 2.19 或更高版本)\n\n硬件方面，你的工作站至少需要：\n\n- 3GB 内存（推荐 8GB 或更多）\n- 2GB\
    \ 可用硬盘空间\n- 最低 1280 x 800 屏幕分辨率\n\n此列表来自 Android 官方网站（[`developer.android.com/studio`](https://developer.android.com/studio)），当然，配置越高越好。如果你能配备\
    \ 16GB 内存、512GB 固态硬盘（或更大）以及全高清（或超高清）显示器，那将非常不错——绝对不错。\n\n现在我们来看 JDK（Java 开发工具包）的要求。从\
    \ Android Studio 2.2 开始，安装程序自带内嵌的 OpenJDK。这样，初学者就不必额外安装 JDK 了，但你仍然可以按照自己的偏好单独安装\
    \ JDK。在本书中，我将假设你使用 Android Studio 自带的 OpenJDK。\n\n从[`https://developer.android.com/studio/`](https://developer.android.com/studio/)下载安装程序，并获取适用于你平台的正确二进制文件。\n\
    \n如果你使用的是 macOS，请执行以下操作：\n\n1. 解压安装程序的压缩文件。\n2. 将应用程序文件拖入“应用程序”文件夹。\n3. 启动 Android\
    \ Studio。\n4. 如果你之前安装过，Android Studio 会提示你导入一些设置。你可以导入这些设置——这是默认选项。\n"
- fmt: '### Note


    If you have an existing installation of Android Studio, you can keep using that
    version and still install Android Studio 3\. It can coexist with your existing
    version of Android Studio because its settings will be kept in a different directory.


    If you’re in Windows, do the following:


    1. Unzip the installer file.

    2. Move the unzipped directory to a location of your choice, such as `C:\Users\myname\AndroidStudio`.

    3. Drill down to the `AndroidStudio` folder. Inside it is the `studio64.exe` file.
    This is the file you need to launch. It’s a good idea to create a shortcut for
    this file. If you right-click `studio64.exe` and choose Pin to Start Menu, you
    can make Android Studio available from the Windows Start menu. Alternatively,
    you can also pin it to the taskbar.


    The Linux installation requires a bit more work than simply double-clicking and
    following the installer prompts. In future releases of Ubuntu (and its derivatives),
    this might change and become as simple and frictionless as its Windows and macOS
    counterparts, but for now, you need to do some tweaking. The extra activities
    on Linux are mostly because AS needs some 32-bit libraries and hardware acceleration.


    ### Note


    The installation instructions in this section are meant for Ubuntu 64-bit and
    other Ubuntu derivatives (e.g., Linux Mint, Lubuntu, Xubuntu, Ubuntu MATE, etc.).
    I chose this distribution because it is a very common Linux flavor, so readers
    of this book will be using this distribution. If you are running a 64-bit version
    of Ubuntu, you will need to pull some 32-bit libraries in order for AS to function
    well.


    To start pulling the 32-bit libraries for Linux, run the following commands in
    a terminal window:


    ```

    sudo apt-get update && sudo apt-get upgrade -y

    sudo dpkg --add-architecture i386

    sudo apt-get install libncurses5:i386 libstdc++6:i386 zlib1g:i386

    ```


    When all the prep work is done, you need to do the following:


    1. Unpack the downloaded installer file. You can unpack the file using command
    line tools or the GUI tools. You can, for example, right-click the file and select
    the “Unpack here” option, if your file manager has it.

    2. After unzipping the file, rename the folder to `AndroidStudio`.

    3. Move the folder to a location where you have read, write, and execute privileges.
    Alternatively, you can also move it to `/usr/local/AndroidStudio`.

    4. Open a terminal window, go to the `AndroidStudio/bin` folder, and run the `./studio.sh`
    command.

    5. At first launch, Android Studio will ask if you want to import some settings.
    If you have installed a previous version of Android Studio, you may want to import
    those settings.


    ## Configuring Android Studio


    If this is the first time you’ve installed Android Studio, you may want to configure
    a couple of things before diving into coding work. In this section, I’ll walk
    you through the following:


    * Acquiring some software that you’ll need in order to create programs that target
    specific versions of Android

    * Making sure you have all the SDK tools you need

    * And, optionally, changing the way you get updates


    Launch the IDE if you haven’t done so yet, and click the Configure option, as
    shown in Figure [1-1](#476822_1_En_1_Chapter.xhtml#Fig1). Choose Preferences from
    the drop-down list.


    ![../images/476822_1_En_1_Chapter/476822_1_En_1_Fig1_HTML.jpg](images/476822_1_En_1_Chapter/476822_1_En_1_Fig1_HTML.jpg)


    Figure 1-1. Go to Preferences from Android Studio’s opening dialog


    Clicking the Preferences option opens the Preferences dialog, as shown in Figure
    [1-2](#476822_1_En_1_Chapter.xhtml#Fig2). On the left-hand side of the dialog,
    choose the Android SDK option.


    ![../images/476822_1_En_1_Chapter/476822_1_En_1_Fig2_HTML.jpg](images/476822_1_En_1_Chapter/476822_1_En_1_Fig2_HTML.jpg)


    Figure 1-2. SDK platforms


    When you get to the SDK window, enable the Show Package Details option so you
    can see a more detailed view of each API level. You don’t need to download everything
    in the SDK window. You will get only the items you need.


    SDK levels or platform numbers are specific versions of Android. Android 9 (Pie)
    is API level 28, Android 8 (Oreo) is API levels 26 and 27, and Nougat is API levels
    24 and 25\. You don’t need to memorize the platform numbers, at least not anymore,
    because the IDE shows the platform number with the corresponding Android nickname.


    Download the API levels you want to target for your applications, but for the
    purpose of this book, please download API level 27 (Oreo). It’s what you will
    use for the sample projects. Make sure that together with the platforms, you also
    download the Google APIs Intel x86 Atom_64 System Image. You will need it when
    you get to the part where you test-run your applications.


    Choosing an API level may not be a big deal right now because at this point you’re
    working with practice apps. When you plan to release your application to the public,
    you may not be able to take this choice lightly, though. Choosing a minimum SDK
    or API level for your app will determine how many people will be able to use your
    application. At the time of writing, 25% of all Android devices are using Marshmallow,
    22% for Nougat, and 4% for Oreo. These stats are from the dashboard page of [`developer.android.com`](http://developer.android.com).
    It’s a good idea to check these stats from time to time at [`http://bit.ly/droiddashboard`](http://bit.ly/droiddashboard).


    Figure [1-3](#476822_1_En_1_Chapter.xhtml#Fig3) shows the SDK Tools section.


    ![../images/476822_1_En_1_Chapter/476822_1_En_1_Fig3_HTML.jpg](images/476822_1_En_1_Chapter/476822_1_En_1_Fig3_HTML.jpg)


    Figure 1-3. SDK Tools section


    You don’t generally have to change anything in this window, but it wouldn’t hurt
    to check if you have the tools, shown in the list below, marked as Installed:


    * `Android SDK Build Tools`

    * `Android SDK Platform Tools`

    * `Android SDK Tools`

    * `Android Emulator`

    * `Support Repository`

    * `HAXM Installer`


    Checking for these tools ensures that you get tools like `adb`, `sqlite`, `aapt`,
    and `zipalign`. These tools help with debugging, creating builds, working with
    databases, running emulations, and so on.


    ### Note


    If you are on the Linux platform, you cannot use `HAXM` even if you have an Intel
    processor. `KVM` will be used in Linux instead of `HAXM`.


    Once you’re happy with your selection, click the OK button to start downloading
    the packages.


    The last configuration check you need to do is to set the update channel. It’s
    in the same Preferences window. Click the Updates item on the right-hand side
    to show the Updates settings, as shown in Figure [1-4](#476822_1_En_1_Chapter.xhtml#Fig4).


    ![../images/476822_1_En_1_Chapter/476822_1_En_1_Fig4_HTML.jpg](images/476822_1_En_1_Chapter/476822_1_En_1_Fig4_HTML.jpg)


    Figure 1-4. Updates


    Android Studio is configured by default to get updates from the channel where
    you originally downloaded the installer. Since you downloaded the installer from
    the stable channel, it will get its update from that channel by default. You can
    change the channel to one of these four:


    * **Canary channel**: This channel is for bleeding edge releases. Because it can
    be updated as often as every week, you don’t want to use it for production code.

    * **Dev channel**: This channel is just like the Canary channel but a bit more
    stable. You still don’t want to use it for production.

    * **Beta channel**: This channel contains release candidates. The devs are basically
    waiting for feedback before it gets fed to the stable channel.

    * **Stable channel**: This is the official stable release and it is suitable for
    production work.'
