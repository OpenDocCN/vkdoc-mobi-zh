- fmt: '# Running a Unit Test


    You can run just one test or all the tests in the class. The little green arrows
    in the gutter of the main editor are clickable. Clicking the little arrow beside
    the name of the class will run all the tests in the class. When you click the
    one beside the name of test method, it will run only that test case. See Figure
    [5-9](#476822_1_En_5_Chapter.xhtml#Fig9).


    ![../images/476822_1_En_5_Chapter/476822_1_En_5_Fig9_HTML.jpg](images/476822_1_En_5_Chapter/476822_1_En_5_Fig9_HTML.jpg)


    Figure 5-9. `FactorialTest.java` in the main editor


    Similarly, you can also run the test from the main menu bar via Run ➤ Run.


    Figure [5-10](#476822_1_En_5_Chapter.xhtml#Fig10) shows the result of the text
    execution.


    ![../images/476822_1_En_5_Chapter/476822_1_En_5_Fig10_HTML.png](images/476822_1_En_5_Chapter/476822_1_En_5_Fig10_HTML.png)


    Figure 5-10. Result of running `FactorialTest.java`


    Android Studio gives you plenty of cues so you can tell if your tests are passing
    or failing. The first run tells you that there’s something wrong with `Factorial.java`;
    the `assertEquals()` has failed.


    ### Tip


    When a test fails, it’s best to use the debugger to investigate the code. `FactorialTest.java`
    is no different than any other class in the project; it’s just another Java file,
    so you can definitely debug it. Put some breakpoints in strategic places of your
    test code, and then instead of “running” it, run the debugger so you can walk
    through it.


    The test failed because the factorial of 1 isn’t 2, it’s 1. If you look closer
    at `Factorial.java`, you’ll notice that the factorial value isn’t calculated properly.


    Edit the `Factorial.java` file to change


    ```

    return arg + factorial(arg - 1);

    ```


    to


    ```

    return arg * factorial(arg - 1);

    ```


    If you run the test again, you will see successful results, as shown in Figure
    [5-11](#476822_1_En_5_Chapter.xhtml#Fig11).


    ![../images/476822_1_En_5_Chapter/476822_1_En_5_Fig11_HTML.jpg](images/476822_1_En_5_Chapter/476822_1_En_5_Fig11_HTML.jpg)


    Figure 5-11. Successful test


    Instead of yellow exclamation marks, you now see green check marks. Instead of
    seeing “Test failed,” you now see “Test passed.” Now you know that your code works
    as expected.


    # Test First


    Having a way to test your code in an automated way and at a high frequency is
    important. It’s so important that many developers advocate writing your test suite
    first, even before you write your actual code. This is called test-driven development,
    or TDD for short. The basic idea is that the tests represent the requirements
    of your application which the code must satisfy.


    To see how to do TDD in Android Studio, delete the `Factorial.java` file in your
    project and run the tests again. Of course, it will fail; that’s the idea. You
    always start with failing tests. Now, create the `Factorial` class and start putting
    in the methods and the code that will make the tests pass.


    Once you have a couple of test cases, a bit more code, and no errors, try running
    the tests again. The idea is to run the tests every time you make significant
    (enough) changes to the code. That way, when all your tests pass, you know that
    you’re not introducing any breaking changes to your code.


    Compare this practice to what a lot of devs do, which is write a bunch of code
    first and then write a little test program to verify the code, maybe something
    with a static `main()` method and a couple of `printlns`. Then they throw away
    the test code—as if their code won’t ever break again! Hopefully with this chapter,
    you now know better than to throw away test code. You should cultivate it and
    run it often to make sure that your code is to spec.


    # Chapter Summary


    *   Unit testing is a core development task. It should be a core development task
    because modern and sophisticated software shouldn’t rely on puny, ad hoc, throw-away
    tests.


    *   A JVM test is different from an instrumented test. A JVM test is used for
    the Java part of your code—the part that doesn’t need to interact with the Android
    platform.


    *   Android Studio lets you separate the JVM test from instrumented tests.


    *   JVM tests are like regular class files: you can debug and step through them.


    *   Each JUnit test is annotated by `@Test`. This is how JUnit knows which methods
    are supposed to be test cases.


    # 6. Instrumented Testing


    *What this chapter covers:*


    *   Details about instrumented testing


    *   How to create UI test interactions


    *   Basic test interactions


    *   Implementing test verifications


    *   Test recording


    You learned how to perform JVM testing in the previous chapter. In this chapter,
    you’ll do some testing that deals with the Android part of an application. Unit
    testing that interacts with the Android platform is known as instrumented testing,
    and you will use the Espresso framework to do this.


    ## About Espresso


    Google released Espresso in 2013, and with its 2.0 release, Espresso became a
    part of the Android Support Repository. The general steps when working with Espresso
    tests are the following:


    1.  **Match**: Use a matcher to target a specific component like a button or `TextView`.
    A `ViewMatcher` lets you find a `View` object in the hierarchy.


    2.  **Act**: Use a `ViewAction` object to perform an action like a click on a
    targeted `View` object.


    3.  **Assert**: Use an assertion on the state of a `View`.


    Imagine you have a simple screen that has a button and a `TextView`. When you
    click the button, you see the text “Hello World” on the `TextView`. You can write
    the test like this:


    | ➊ | Use a `ViewMatcher` to find a `View` object. You’re looking for a `View`
    with an id of `button`. Remember that when you’re using `onView()`, Espresso waits
    until all synchronization conditions are met before it performs the corresponding
    UI action. |

    | ➋ | When you find it, use a `ViewAction` to do something with it; in this case,
    you want to click it. |

    | ➌ | Once again, you use a `ViewMatcher` to find a `View` object. This time,
    you’re trying to find a `TextView` with an id of `textview`. |

    | ➍ | When you find it, you want to check if its text property is a match to “Hello
    World.” |


    ```

    onView(withId(R.id.button))   ➊

    .perform(Click())       ➋

    onView(withId(R.id.textview)) ➌

    .check(matches(withText("Hello World"))); ➍

    ```'
