    ## Releasing the App


    Before you can submit an app to Google Play, you’ll need a developer account.
    If you don’t have one yet, you can sign up at [`https://developer.android.com`](https://developer.android.com).
    There are a lot of assumptions I’m making about the next activities. I’m assuming
    that


    1.  You already have a Google account (Gmail), and

    2.  You’re using Google Chrome to go to [`https://developer.android.com`](https://developer.android.com),
    and

    3.  Your Google account is logged into Chrome.


    If your Google account isn’t logged into Chrome, you might see something like
    Figure [12-6](#476822_1_En_12_Chapter.xhtml#Fig6). Chrome will ask you to select
    an account (or create one).


    ![../images/476822_1_En_12_Chapter/476822_1_En_12_Fig6_HTML.jpg](images/476822_1_En_12_Chapter/476822_1_En_12_Fig6_HTML.jpg)


    Figure 12-6. Choose an account


    When you get your Google account sorted out, you’ll be taken to the `developer.android.com`
    website, as shown in Figure [12-7](#476822_1_En_12_Chapter.xhtml#Fig7).


    ![../images/476822_1_En_12_Chapter/476822_1_En_12_Fig7_HTML.jpg](images/476822_1_En_12_Chapter/476822_1_En_12_Fig7_HTML.jpg)


    Figure 12-7. `developer.android.com`


    Click Google Play, as shown in Figure [12-7](#476822_1_En_12_Chapter.xhtml#Fig7).
    Click Launch Play Console, as shown in Figure [12-8](#476822_1_En_12_Chapter.xhtml#Fig8).


    ![../images/476822_1_En_12_Chapter/476822_1_En_12_Fig8_HTML.jpg](images/476822_1_En_12_Chapter/476822_1_En_12_Fig8_HTML.jpg)


    Figure 12-8. Launching the Google Play Console


    You need to go through four steps to complete the registration (shown in Figure
    [12-9](#476822_1_En_12_Chapter.xhtml#Fig9)):


    ![../images/476822_1_En_12_Chapter/476822_1_En_12_Fig9_HTML.jpg](images/476822_1_En_12_Chapter/476822_1_En_12_Fig9_HTML.jpg)


    Figure 12-9. The Google Play Console sign up


    1.  Sign in with your Google account.

    2.  Accept the developer agreement.

    3.  Pay the registration fee.

    4.  Complete your account details.


    Once you have completed the registration and one-time payment, you will now have
    access to the Google Play Console, as shown in Figure [12-10](#476822_1_En_12_Chapter.xhtml#Fig10).


    ![../images/476822_1_En_12_Chapter/476822_1_En_12_Fig10_HTML.jpg](images/476822_1_En_12_Chapter/476822_1_En_12_Fig10_HTML.jpg)


    Figure 12-10. The Google Play Console


    This is where you can start the process of submitting your app to the store. Click
    the Create application button to get started.


    ## Chapter Summary


    - Before the users can experience your app, they will see the icons and other
    graphical assets first. Make sure the graphical assets are just as polished as
    your code.

    - Strip your code of all debug info and log statements before you build a release.

    - Code review your own work. If you have buddies or other people who can review
    the code with you, that’s much better. If your app uses servers, RESTful URLs,
    etc., make sure they are production ready and not sandboxed.

    - Before you can upload your app to Google Play, you need to sign your app with
    a proper certificate.

    - You’ll need a Google Play account if you want to sell your apps on Google Play.
    I paid a one-time fee of $25 USD, but that was a couple of years ago.

    - Don’t forget to test your app on a real device.


    # 13. Short Takes


    *What this chapter covers:*


    - How to import sample code

    - Refactoring

    - Code generators

    - Live templates

    - Code editor preferences

    - Keyboard shortcuts


    This quick reference book wouldn’t be a quick reference if it described every
    nuance of Android Studio in detail, but before I end the book, I’d like to point
    out some features of Android Studio that makes our coding lives easier. Like I
    said, I won’t go into detail because that’s not the goal; rather, the goal is
    to let you know that these features exist.


    ## Productivity Features


    What we usually mean when talking about productivity is that we want to do what
    we need to do in the shortest possible time, which translates to keyboard shortcuts,
    templates, snippets, and so on. In this section, you’ll take a peek at some of
    what Android Studio has to offer to give your productivity a little boost. I’ll
    show you what’s available.


    ### Importing Samples


    A key part of boosting your productivity is to actually learn how to create things
    and discover how they work in Android. So, my first productivity tip is to learn
    how to use the `import sample` feature. You can get to this feature from the main
    menu bar via **File** ➤ **New** ➤ **Import Sample**. Figure [13-1](#476822_1_En_13_Chapter.xhtml#Fig1)
    shows the Import Sample screen.


    ![../images/476822_1_En_13_Chapter/476822_1_En_13_Fig1_HTML.jpg](images/476822_1_En_13_Chapter/476822_1_En_13_Fig1_HTML.jpg)


    Figure 13-1. Importing a sample


    What you see in Figure [13-1](#476822_1_En_13_Chapter.xhtml#Fig1) is a list of
    code samples you can either browse or create as a local project.


    Let’s say you want to learn something about the Autofill Framework, like what
    you see in Figure [13-1](#476822_1_En_13_Chapter.xhtml#Fig1). You can see a preview
    of what it looks like, and you can also click the **Browse in GitHub** link. When
    you click **Next**, you’ll see a dialog that’s somewhat similar to when creating
    a new project, as shown in Figure [13-2](#476822_1_En_13_Chapter.xhtml#Fig2).


    ![../images/476822_1_En_13_Chapter/476822_1_En_13_Fig2_HTML.jpg](images/476822_1_En_13_Chapter/476822_1_En_13_Fig2_HTML.jpg)


    Figure 13-2. Import Sample, next window


    If you click **Finish** in the Import Sample dialog, Android Studio will create
    a new project locally and download the sample file from GitHub so you can take
    a closer look at it and work on it right away.


    ### Refactoring


    Refactoring is basically rewriting and improving your source code without creating
    new functionality; this practice helps keep the code SOLID and DRY (don’t repeat
    yourself) and thus easier to maintain.'
