- fmt: '## A Simple Demo


    To get started, create a project with an empty activity in Android Studio. Create
    a class and name it `Factorial.java`. Fill it up with the code shown in Listing
    [5-1](#476822_1_En_5_Chapter.xhtml#PC1).


    ```

    public class Factorial {

    public static double factorial(int arg) {

    if (arg == 0) {

    return 1.0;

    }

    else {

    return arg + factorial(arg - 1);

    }

    }

    }

    Listing 5-1.

    Factorial.java

    ```


    Make sure that `Factorial.java` is open in the main editor, as shown in Figure
    [5-3](#476822_1_En_5_Chapter.xhtml#Fig3). Then, from the main menu bar, go to
    Navigate ➤ Test. Similarly, you can also create a test using the keyboard shortcut
    (`Shift + Command + T` in macOS and `Ctrl + Shift + T` for Linux and Windows).


    ![../images/476822_1_En_5_Chapter/476822_1_En_5_Fig3_HTML.jpg](images/476822_1_En_5_Chapter/476822_1_En_5_Fig3_HTML.jpg)


    Figure 5-3.


    Creating a test for Factorial.java


    Right after you click the Test option, a pop-up dialog (Figure [5-4](#476822_1_En_5_Chapter.xhtml#Fig4))
    will prompt you to click another link. Click the Create New Test option, as shown
    in Figure [5-4](#476822_1_En_5_Chapter.xhtml#Fig4).


    ![../images/476822_1_En_5_Chapter/476822_1_En_5_Fig4_HTML.jpg](images/476822_1_En_5_Chapter/476822_1_En_5_Fig4_HTML.jpg)


    Figure 5-4.


    The Create New Test pop-up


    Right after creating a new test, you’ll see another pop-up dialog, shown in Figure
    [5-5](#476822_1_En_5_Chapter.xhtml#Fig5), which I’ve annotated. Please follow
    the annotations and instructions in Figure [5-5](#476822_1_En_5_Chapter.xhtml#Fig5).


    | ➊ | You can choose which testing library you want to use. You can choose JUnit
    3, 4, or 5. You can even choose Groovy JUnit, Spock, or TestNG. I used JUnit4
    because it comes installed with Android Studio. |

    |➋ | The convention for naming a test class is “name of the class to test” + “Test”.
    Android Studio populates this field using this convention. |

    |➌ | Leave this field blank because you don’t need to inherit from anything. |

    |➍ | You don’t need the `setUp()` and `tearDown()` routines for now, so leave
    them unchecked. |

    |➎ | Check the `factorial()` method because you want to generate a test for this.
    |


    ![../images/476822_1_En_5_Chapter/476822_1_En_5_Fig5_HTML.jpg](images/476822_1_En_5_Chapter/476822_1_En_5_Fig5_HTML.jpg)


    Figure 5-5.


    Creating FactorialTest


    When you click the OK button, Android Studio will ask where you want to save the
    test file. This is a JVM test, so you want to save it in the `test` folder (not
    in `androidTest`), as shown in Figure [5-6](#476822_1_En_5_Chapter.xhtml#Fig6).
    Click OK.


    ![../images/476822_1_En_5_Chapter/476822_1_En_5_Fig6_HTML.jpg](images/476822_1_En_5_Chapter/476822_1_En_5_Fig6_HTML.jpg)


    Figure 5-6.


    Choosing the destination directory


    Android Studio will now create the test file for you. If you open `FactorialTest.java`,
    you’ll see the generated skeleton code shown in Figure [5-7](#476822_1_En_5_Chapter.xhtml#Fig7).


    | ➊ | The file `FactorialTest.java` was created under the `test` folder. |

    |➋ | A `factorial()` method was created and it’s annotated as `@Test`. This is
    how JUnit will know that this method is a unit test. You can prepend your method
    names with “test,” as in `testFactorial()`, but that is not necessary. The `@Test`
    annotation is enough. |

    |➌ | This is where you put your assertions. |


    ![../images/476822_1_En_5_Chapter/476822_1_En_5_Fig7_HTML.jpg](images/476822_1_En_5_Chapter/476822_1_En_5_Fig7_HTML.jpg)


    Figure 5-7.


    FactorialTest.java in Project view and the main editor


    See how simple that was? Creating a test case in Android Studio doesn’t really
    involve you that much in terms of setup and configuration. All you need to do
    now is write your test.


    ## Implementing a Test


    JUnit supplies several static methods that you can use in your test to make assertions
    about your code’s behavior. You use assertions to show an expected result, which
    is your control data. It’s usually calculated independently and is known to be
    true or correct—that’s why you use it as control data. When the expected data
    is returned from the assertion, the test passes; otherwise, the test fails. Table
    [5-1](#476822_1_En_5_Chapter.xhtml#Tab1) shows the common `assert` methods you
    might need for your code.


    Table 5-1.


    Common Assert Methods


    | Method | Description |

    | --- | --- |

    | `assertEquals()` | Returns true if two objects or primitives have the same value
    |

    | `assertNotEquals()` | The reverse of `assertEquals()` |

    | `assertSame()` | Returns true if two references point to the same object |

    | `assertNotSame()` | Reverse of `assertSame()` |

    | `assertTrue()` | Tests a Boolean expression |

    | `assertFalse()` | The reverse of `assertTrue()` |

    | `assertNull()` | Tests for a null object |

    | `assertNotNull()` | The reverse of `assertNull()` |


    Now that you know a couple of `assert` methods, you’re ready to write some tests.
    Listing [5-2](#476822_1_En_5_Chapter.xhtml#PC2) shows the code for `FactorialTest.java`.


    ```

    import org.junit.Test;

    import static org.junit.Assert.*;

    public class FactorialTest {

    @Test

    public void factorial() {

    assertEquals(1.0, Factorial.factorial(1),0.0);

    assertEquals(120.0, Factorial.factorial(5), 0.0);

    }

    }

    Listing 5-2.

    FactorialTest.java

    ```


    Your `FactorialTest` class has only one method because it’s for illustration purposes
    only. Real-world code would have many more methods than this, to be sure.


    Notice that each test (method) is annotated by `@Test`. This is how JUnit knows
    that `factorial()` is a test case. Notice also that `assertEquals()` is a method
    of the `Assert` class, but you’re not writing the fully qualified name here because
    you’ve got a static import on `Assert`. It certainly makes life easier.


    The `assertEquals()` method takes three parameters. They’re illustrated in Figure
    [5-8](#476822_1_En_5_Chapter.xhtml#Fig8).


    | ➊ | The Expected value is your control data; this is usually hard-coded in the
    test. |

    |➋ | The Actual value is what your method returns. If the expected value is the
    same as actual value, the `assertEquals()` passes; your code is behaving as expected.
    |

    |➌ | Delta is intended to reflect how close the actual and expected values can
    be and still be considered equal. Some developers call this parameter the “fuzz
    factor.” When the difference between the expected and actual value is greater
    than the fuzz factor, then `assertEquals()` will fail. I used 0.0 here because
    I don’t want to tolerate any kind of deviation. You can use other values like
    0.001, 0.002, and so on; it depends on your use-case and how much fuzz your app
    is willing to tolerate. |


    ![../images/476822_1_En_5_Chapter/476822_1_En_5_Fig8_HTML.png](images/476822_1_En_5_Chapter/476822_1_En_5_Fig8_HTML.png)


    Figure 5-8.


    The assertEquals Method


    Now your code is complete. You can insert a couple more asserts in the code so
    you can get into the groove of things, if you prefer.


    There are couple of things I did not include in this sample code. I did not override
    the `setUp()` and `tearDown()` methods because I didn’t need to. You would normally
    use the `setUp()` method if you need to set up database connections, network connections,
    and so on. Use the `tearDown()` method to close whatever you opened in the `setUp()`.


    Now let’s run the test.'
