    Figure 13-4.


    Main menu bar, Code ➤ Generate


    As you can see, you can generate quite a lot of boilerplate code. When you choose
    any of the Generate options, Android Studio will generate a generalized stub of
    code. Choose the getter and setter option. Let’s say you have a `PersonTest` class,
    as shown in Figure [13-4](#476822_1_En_13_Chapter.xhtml#Fig4). While the keyboard
    cursor is still within the PersonTest class, go to the main menu bar and choose
    Code ➤ Generate. Alternatively, you can use the keyboard shortcut `Command + N`
    (macOS) or `Alt + Insert` (Windows and Linux) and then choose to generate getters
    and setters. You’ll see the dialog shown in Figure [13-5](#476822_1_En_13_Chapter.xhtml#Fig5).


    ![../images/476822_1_En_13_Chapter/476822_1_En_13_Fig5_HTML.jpg](images/476822_1_En_13_Chapter/476822_1_En_13_Fig5_HTML.jpg)


    Figure 13-5.


    Generating getters and setters


    The generator dialog shows all the autodetected fields in your class. It shows
    the `mFirstname` and `mLastname` member variables; it also lets you do multiple
    selections. Select both member variables and click OK. Listing [13-1](#476822_1_En_13_Chapter.xhtml#PC1)
    shows the PersonTest class after code generation.


    ```

    class PersonTest {

    String mFirstname;

    String mLastname;

    public String getmFirstname() {

    return mFirstname;

    }

    public void setmFirstname(String mFirstname) {

    this.mFirstname = mFirstname;

    }

    public String getmLastname() {

    return mLastname;

    }

    public void setmLastname(String mLastname) {

    this.mLastname = mLastname;

    }

    public PersonTest(String mFirstname, String mLastname) {

    this.mFirstname = mFirstname;

    this.mLastname = mLastname;

    }

    }

