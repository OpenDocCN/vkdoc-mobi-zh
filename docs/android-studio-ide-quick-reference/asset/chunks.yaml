- fmt: "### Note\n\nI spelled SOLID in all caps because it’s also an acronym that\
    \ stands for **S**ingle Responsibility, **O**pen-Closed Principle, **L**iskov\
    \ Principle, **I**nterface Segregation, and **D**ependency Inversion Principle.\
    \ These are principles of object-oriented design, which was popularized by Robert\
    \ C. Martin.\n\n`Android Studio` has some nifty refactoring capabilities. It’s\
    \ easy to get started: just select a piece of code that you’d like to refactor\
    \ and then use the context-sensitive right-click, shown in Figure [13-3](#476822_1_En_13_Chapter.xhtml#Fig3).\
    \ Alternatively, you can use the keyboard shortcuts: `Ctrl + T` for macOS and\
    \ `Ctrl + Alt + Shift + T` for Windows/Linux.\n\n![../images/476822_1_En_13_Chapter/476822_1_En_13_Fig3_HTML.jpg](images/476822_1_En_13_Chapter/476822_1_En_13_Fig3_HTML.jpg)\
    \  \nFigure 13-3. Refactoring\n\nI’m sure you’ve done refactoring many times before,\
    \ but let’s just jog your memory here.\n\n* **Rename**: This will let you safely\
    \ rename variables and other identifiers. You should use this instead of `Find\
    \ and Replace`. This works across the entire project, and not only in the current\
    \ file.\n\n* **Change Signature**: This will let you change a method, either its\
    \ name or the parameters. It also works at a class level, so you can turn a class\
    \ into a generic type and manipulate the type parameters.\n\n* **Move**: Moves\
    \ an element. You can move a method to another class if you want to.\n\n* **Copy**:\
    \ Lets you copy elements, like the currently selected class.\n\n* **Safe Delete**:\
    \ If you need to delete something, `Android Studio` will verify that what you’re\
    \ deleting isn’t in use by anything else in the code base. If it is in use, you’ll\
    \ be prompted so you can address those things before you actually delete something\
    \ important.\n\n* **Extract Constant**: Avoid using hard-coded values. You shouldn’t,\
    \ you know it, and you know why. The Extract option for refactoring works not\
    \ only for constants; you can extract fields, methods, superclasses, variables,\
    \ parameters, and interfaces.\n\nThere are plenty more options in the `Refactor`\
    \ menu; make sure to check the others out.\n\n### Generate\n\nAnother time-saving\
    \ feature of `Android Studio` is the code generator. It’s aptly named because\
    \ it does exactly what you think it does—it generates code. Let’s take an example.\
    \ Figure [13-4](#476822_1_En_13_Chapter.xhtml#Fig4) shows the keyboard cursor\
    \ inside a class definition. While the cursor is within the class body, launch\
    \ the Generator action; from the main menu bar, go to **Code ➤ Generate**.\n\n\
    ![../images/476822_1_En_13_Chapter/476822_1_En_13_Fig4_HTML.jpg](images/476822_1_En_13_Chapter/476822_1_En_13_Fig4_HTML.jpg)\
    \  \nFigure 13-4. Main menu bar, Code ➤ Generate\n\nAs you can see, you can generate\
    \ quite a lot of boilerplate code. When you choose any of the Generate options,\
    \ `Android Studio` will generate a generalized stub of code. Choose the getter\
    \ and setter option. Let’s say you have a `PersonTest` class, as shown in Figure\
    \ [13-4](#476822_1_En_13_Chapter.xhtml#Fig4). While the keyboard cursor is still\
    \ within the `PersonTest` class, go to the main menu bar and choose **Code ➤ Generate**.\
    \ Alternatively, you can use the keyboard shortcut `Command + N` (macOS) or `Alt\
    \ + Insert` (Windows and Linux) and then choose to generate getters and setters.\
    \ You’ll see the dialog shown in Figure [13-5](#476822_1_En_13_Chapter.xhtml#Fig5).\n\
    \n![../images/476822_1_En_13_Chapter/476822_1_En_13_Fig5_HTML.jpg](images/476822_1_En_13_Chapter/476822_1_En_13_Fig5_HTML.jpg)\
    \  \nFigure 13-5. Generating getters and setters\n\nThe generator dialog shows\
    \ all the autodetected fields in your class. It shows the `mFirstname` and `mLastname`\
    \ member variables; it also lets you do multiple selections. Select both member\
    \ variables and click OK. Listing [13-1](#476822_1_En_13_Chapter.xhtml#PC1) shows\
    \ the `PersonTest` class after code generation.\n\n```\nclass PersonTest {\n \
    \   String mFirstname;\n    String mLastname;\n    public String getmFirstname()\
    \ {\n        return mFirstname;\n    }\n    public void setmFirstname(String mFirstname)\
    \ {\n        this.mFirstname = mFirstname;\n    }\n    public String getmLastname()\
    \ {\n        return mLastname;\n    }\n    public void setmLastname(String mLastname)\
    \ {\n        this.mLastname = mLastname;\n    }\n    public PersonTest(String\
    \ mFirstname, String mLastname) {\n        this.mFirstname = mFirstname;\n   \
    \     this.mLastname = mLastname;\n    }\n}\n```\nListing 13-1. PersonTest Class\n\
    \nThis is pretty neat already. Anything that lets us save on keystrokes is a good\
    \ thing. I’m guessing you probably have just one thing to nitpick in this example;\
    \ the method naming isn’t right. You probably would prefer `setLastname()` to\
    \ `setmLastname()`, wouldn’t you? You’ll fix that in the next section.\n\n###\
    \ Coding Styles\n\nIf you go to `Android Studio`’s Preferences or Settings and\
    \ then go to **Editor ➤ Code Style ➤ Java**, you’ll find that there are plenty\
    \ of things you can change about how the editor behaves. Figure [13-6](#476822_1_En_13_Chapter.xhtml#Fig6)\
    \ shows the options for the code style, specifically the Java language.\n\n![../images/476822_1_En_13_Chapter/476822_1_En_13_Fig6_HTML.jpg](images/476822_1_En_13_Chapter/476822_1_En_13_Fig6_HTML.jpg)\
    \  \nFigure 13-6. Preferences ➤ Code Style ➤ Java\n\nIf you want to change the\
    \ number of spaces for tabs and indents, you can do that in the **Tabs and Indents**\
    \ area. Be sure to check out the other options in this dialog.\n\nGo to the **Code\
    \ Generation** tab (shown in Figure [13-7](#476822_1_En_13_Chapter.xhtml#Fig7)).\n\
    \n![../images/476822_1_En_13_Chapter/476822_1_En_13_Fig7_HTML.jpg](images/476822_1_En_13_Chapter/476822_1_En_13_Fig7_HTML.jpg)\
    \  \nFigure 13-7. Code generation\n\nThis is where you can tell `Android Studio`\
    \ how you name your variables. If you go back to Listing [13-1](#476822_1_En_13_Chapter.xhtml#PC1),\
    \ you’ll notice that I like to prefix my variables with `m`, like `mLastname`\
    \ and `mFirstname`; initially, `Android Studio` didn’t know this, which is why\
    \ when I generated some getters and setters for the member vars, it gave me `setmLastname()`\
    \ instead of just `setLastname()`.\n\n### Note\n\nPrefixing a member variable\
    \ with `m` comes from AOSP (Android Open Source Project). I used it here because\
    \ quite a lot of sample code you will read online uses this convention. You can\
    \ read further about it at [`https://bit.ly/styleguideaosp`](https://bit.ly/styleguideaosp).\n\
    \nTo tell `Android Studio` that I prefix my variables with `m`, I put the `m`\
    \ in the **Name Prefix for Field**, as shown in Figure [13-7](#476822_1_En_13_Chapter.xhtml#Fig7),\
    \ and clicked OK.\n\nNow, if I generate some getters and setters, I’ll get the\
    \ more appropriate method names. Listing [13-2](#476822_1_En_13_Chapter.xhtml#PC2)\
    \ shows the regenerated code for the `PersonTest` class.\n\n```\nclass PersonTest\
    \ {\n    String mFirstname;\n    String mLastname;\n    public String getFirstname()\
    \ {\n        return mFirstname;\n    }\n    public void setFirstname(String firstname)\
    \ {\n        mFirstname = firstname;\n    }\n    public String getLastname() {\n\
    \        return mLastname;\n    }\n    public void setLastname(String lastname)\
    \ {\n        mLastname = lastname;\n    }\n    public PersonTest(String mFirstname,\
    \ String mLastname) {\n        this.mFirstname = mFirstname;\n        this.mLastname\
    \ = mLastname;\n    }\n}\n```\nListing 13-2. PersonTest, Regenerated"
