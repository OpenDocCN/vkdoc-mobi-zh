    ## About the Author and About the Technical Reviewers\n\n### About the Author\n\
    \n### About the Technical Reviewers\n\n# 1. Setup\n\n*What this chapter covers:*\n\
    \n- Installing Android Studio\n- Setting up the IDE\n- Basic configuration\n\n\
    Developing applications for Android was not always as convenient as it is today.\
    \ When Android 1.0 was released in 2008, what developers got by way of a development\
    \ kit was little more than a handful of command line tools and Ant build scripts.\
    \ Building apps with Vim, Ant, and other command line tools wasn’t so bad if you’re\
    \ used to that kind of thing, but many developers were not used to it. The lack\
    \ of IDE capabilities like code hinting, project setups, and integrated debugging\
    \ was somewhat of a barrier to entry.\n\nThankfully, Android Development Tools\
    \ (ADT) for the Eclipse IDE were released, also in 2008. Eclipse was, and still\
    \ is, a favorite and the IDE of choice for many Java developers. It was natural\
    \ that it would also be the go-to IDE for Android developers.\n\nFrom 2009 to\
    \ 2012, Eclipse remained the preferred IDE for Android development. The Android\
    \ SDK has undergone both major and incremental changes in structure and in scope.\
    \ In 2009, the SDK manager was released; it was used to download tools, individual\
    \ SDK versions, and Android images for use with the emulator. In 2010, additional\
    \ images were released for the ARM processor and x86 CPUs.\n\n2012 was a big year\
    \ because Eclipse and the ADT were finally bundled. Until that time, developers\
    \ had to install Eclipse and ADT separately, and the installation process wasn’t\
    \ always smooth. So the bundling of the two made it a whole lot easier to get\
    \ started with Android development. 2012 also marked the last year of Eclipse\
    \ being the dominant IDE for Android.\n\nIn 2013, Android Studio (AS) was released.\
    \ To be sure, it was still beta, but the writing on the wall was clear: it would\
    \ be the official IDE for Android development. Android Studio is based on JetBrains’s\
    \ IntelliJ. IntelliJ is a commercial Java IDE that also has a community (non-paid)\
    \ version. This version serves as the base for Android Studio.\n\n## Setting Up\
    \ Android Studio\n\nAndroid Studio’s version at the time of writing is 3.2.1;\
    \ hopefully the version won’t be very different by the time you read this book.\
    \ You can download it from [`https://developer.android.com/studio`](https://developer.android.com/studio).\
    \ It’s available for Windows (both 32- and 64-bit), macOS, and Linux. I ran the\
    \ installation instructions on macOS (Mojave), Windows 10 64-bit, and Ubuntu 18.\
    \ I work primarily in a macOS environment, which explains why most of the screen\
    \ grabs for this book looks like macOS. Android Studio looks, runs, and feels\
    \ (mostly) the same on all three platforms, with very minor differences like key\
    \ bindings and the main menu bar in macOS.\n\nBefore we go further, let’s look\
    \ at the system requirements for Android Studio. At a minimum, you’ll need the\
    \ following:\n\n- Microsoft Windows 7/8/10 (32 or 64-bit) or\n- macOS 10.10 (Yosemite\
    \ or higher) or\n- Linux (Gnome or KDE Desktop), Ubuntu 14.04 or higher (64-bit\
    \ but capable of running 32-bit applications)\n- GNU C Library (glibc 2.19 or\
    \ later) if you’re on Linux\n\nFor hardware, your workstation needs to have at\
    \ least\n\n- 3GB RAM (8GB or more recommended)\n- 2GB of available HDD space\n\
    - 1280 x 800 minimum screen resolution\n\nThis list came from the official Android\
    \ website ([`developer.android.com/studio`](https://developer.android.com/studio))\
    \ and, of course, more is better. If you can snag 16GB RAM, 512GB SSD (or bigger),\
    \ and a full HD (or UHD) monitor, that wouldn’t be bad—not at all.\n\nAnd now\
    \ we get to the JDK (Java Development Kit) requirement. Starting with Android\
    \ Studio 2.2, the installer comes with OpenJDK embedded. This way, a beginner\
    \ programmer won’t have to bother with the installation of a separate JDK, but\
    \ you can still install a separate JDK if that’s your preference. In this book,\
    \ I’ll assume that you will use the embedded OpenJDK that comes with Android Studio.\n\
    \nDownload the installer from [`https://developer.android.com/studio/`](https://developer.android.com/studio/)\
    \ and get the proper binary file for your platform.\n\nIf you’re in macOS, do\
    \ the following:\n\n1. Unpack the installer zipped file.\n2. Drag the application\
    \ file into the `Applications` folder.\n3. Launch Android Studio.\n4. Android\
    \ Studio will prompt you to import some settings if you have a previous installation.\
    \ You can import that—it’s the default option."
