    # 运行单元测试


    你可以单独运行一个测试，或运行类中的所有测试。主编辑器左侧的绿色小箭头是可点击的。点击类名旁边的小箭头将运行该类中的所有测试。当点击测试方法名旁边的小箭头时，只会运行该测试用例。见图
    5-9。


    ![../images/476822_1_En_5_Chapter/476822_1_En_5_Fig9_HTML.jpg](img/476822_1_En_5_Fig9_HTML.jpg)


    图 5-9. 主编辑器中的 `FactorialTest.java`


    同样，您也可以通过主菜单栏的 **运行** ➤ **运行** 来运行测试。


    图 5-10 显示了文本执行的结果。


    ![../images/476822_1_En_5_Chapter/476822_1_En_5_Fig10_HTML.png](img/476822_1_En_5_Fig10_HTML.png)


    图 5-10. 运行 `FactorialTest.java` 的结果


    Android Studio 会提供大量提示，以便您判断测试是通过还是失败。第一次运行会告诉你 `Factorial.java` 存在问题；`assertEquals()`
    执行失败了。


    ### 提示


    当测试失败时，最好使用调试器来检查代码。`FactorialTest.java` 与项目中的任何其他类并无不同；它只是另一个 Java 文件，因此你完全可以对其进行调试。在你的测试代码的战略位置设置一些断点，然后不要“运行”它，而是运行调试器，以便你可以单步执行。


    测试失败是因为 1 的阶乘不是 2，而是 1。如果仔细观察 `Factorial.java`，你会注意到阶乘值计算不正确。


    编辑 `Factorial.java` 文件，将


    ```

    return arg + factorial(arg - 1);

    ```


    更改为


    ```

    return arg * factorial(arg - 1);

    ```


    如果再次运行测试，您将看到成功的结果，如图 5-11 所示。


    ![../images/476822_1_En_5_Chapter/476822_1_En_5_Fig11_HTML.jpg](img/476822_1_En_5_Fig11_HTML.jpg)


    图 5-11. 测试成功


    现在，你看到的不是黄色的感叹号，而是绿色的对勾。你看到的不是“测试失败”，而是“测试通过”。现在你知道你的代码按预期工作了。


    # 测试先行


    拥有一种自动化且高频率测试代码的方法非常重要。这种方法如此重要，以至于许多开发者提倡**先**编写你的测试套件，甚至在实际代码之前。这被称为测试驱动开发，或简称为
    TDD。其基本思想是，测试代表了应用程序的需求，而代码必须满足这些需求。


    要了解如何在 Android Studio 中执行 TDD，请删除项目中的 `Factorial.java` 文件并再次运行测试。当然，它会失败；这正是其理念所在。你总是从失败的测试开始。现在，创建
    `Factorial` 类，并开始添加能使测试通过的方法和代码。


    一旦你有了几个测试用例、更多代码且没有错误后，尝试再次运行测试。其理念是，每次对代码进行重大（足够）更改时都运行测试。这样，当你的所有测试都通过时，你就知道你没有向代码中引入任何破坏性的更改。


    将这种做法与许多开发人员的做法进行比较，他们通常会先编写一堆代码，然后编写一个小测试程序来验证代码，可能带有静态 `main()` 方法和几个 `printlns`。然后他们丢弃测试代码——好像他们的代码再也不会出问题一样！希望通过本章，你现在已经明白不应该丢弃测试代码。你应该培养它，并经常运行它，以确保你的代码符合规范。


    # 本章小结


    *   单元测试是一项核心开发任务。它应该是一项核心开发任务，因为现代且复杂的软件不应该依赖于微不足道、临时的、一次性的测试。


    *   JVM 测试与插桩测试不同。JVM 测试用于你代码的 Java 部分——即不需要与 Android 平台交互的部分。


    *   Android Studio 允许你将 JVM 测试与插桩测试分开。


    *   JVM 测试就像普通的类文件：你可以调试并单步执行它们。


    *   每个 JUnit 测试都通过 `@Test` 进行注解。JUnit 就是通过这种方式知道哪些方法应该是测试用例。


    # 6. 插桩测试


    *本章内容涵盖：*


    *   插桩测试的细节


    *   如何创建 UI 测试交互


    *   基本的测试交互


    *   实现测试验证


    *   测试录制


    您在上一章中学习了如何执行 JVM 测试。在本章中，您将进行一些涉及应用程序 Android 部分的测试。与 Android 平台交互的单元测试被称为插桩测试，您将使用
    Espresso 框架来进行此测试。


    ## 关于 Espresso


    谷歌于 2013 年发布了 Espresso，随着其 2.0 版本的发布，Espresso 成为 Android 支持库的一部分。使用 Espresso 进行测试的一般步骤如下：


    1.  **匹配**：使用匹配器定位特定组件，如按钮或 `TextView`。`ViewMatcher` 允许你在视图层级中找到一个 `View` 对象。


    2.  **操作**：使用 `ViewAction` 对象对目标 `View` 对象执行点击等操作。


    3.  **断言**：对 `View` 的状态进行断言。


    假设你有一个包含一个按钮和一个 `TextView` 的简单屏幕。当你点击按钮时，你会在 `TextView` 上看到文本“Hello World”。你可以像这样编写测试：


    | ➊ | 使用 `ViewMatcher` 查找 `View` 对象。你正在寻找一个 id 为 `button` 的 `View`。请记住，当你使用 `onView()`
    时，Espresso 会等到所有同步条件都满足后，再执行相应的 UI 操作。 |

    | ➋ | 找到它后，使用 `ViewAction` 对其执行某些操作；在这种情况下，你想要点击它。 |

    | ➌ | 再次，你使用 `ViewMatcher` 查找 `View` 对象。这次，你试图找到一个 id 为 `textview` 的 `TextView`。
    |

    | ➍ | 找到后，你想检查它的文本属性是否与“Hello World”匹配。 |


    ```

    onView(withId(R.id.button))   ➊

    .perform(Click())       ➋

    onView(withId(R.id.textview)) ➌

    .check(matches(withText("Hello World"))); ➍

    ```

