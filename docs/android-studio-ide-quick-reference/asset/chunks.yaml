    很棒，对吧？如果你仍未决定使用`LiveData`，这里有一些值得考虑的优点。当你使用`LiveData`时：


    *   **你确信UI始终与数据状态匹配。** 你已从示例中看到了这一点。`LiveData`遵循观察者模式，因此当其值发生改变时会通知观察者。


    *   **没有内存泄漏。** 观察者被绑定到生命周期对象。例如，如果你的`MainActivity`进入暂停状态（出于某种原因，比如另一个活动在前台），`LiveData`将不会被观察。如果`MainActivity`被销毁，`LiveData`同样不会被观察，并且它会自行清理——这也意味着你无需手动管理`MainActivity`和ViewModel的生命周期。


    ## Room


    如果你想在应用程序中包含数据库功能，你可能会考虑使用`Room`。在`Room`出现之前，构建数据库应用程序的两种流行方法是使用`Realm`或直接使用老牌的`SQLite`。处理`SQLite`被认为过于底层；它感觉太接近底层，因此使用起来有些繁琐。`Realm`在开发者中相当流行，但无论多么流行，它都不是第一方解决方案。幸运的是，我们现在有了`Room`。


    `Room`是对`SQLite`的一层抽象。如果你以前使用过`ORM`（例如`Hibernate`），那么它与此类似。与使用普通`SQLite`相比，`Room`有几个优点。使用`Room`：


    *   你不必为基本的数据库操作处理原始查询。

    *   在编译时，它会验证`SQL`查询，因此你无需担心`SQL`注入——还记得吗？

    *   你的数据库对象和`Java`对象之间没有阻抗不匹配。`Room`处理了这一点，因此你只需要处理`Java`对象。


    `Room`有三个主要组件：`Entity`、`Dao`和`Database`。它们与应用程序的关系如图[11-4](#476822_1_En_11_Chapter.xhtml#Fig4)所示。


    ![../images/476822_1_En_11_Chapter/476822_1_En_11_Fig4_HTML.jpg](images/476822_1_En_11_Chapter/476822_1_En_11_Fig4_HTML.jpg)


    Figure 11-4. `Room` 组件


    *   **`Entity`**：一个`Entity`用于表示一个数据库表。你将其编码为一个由`@Entity`注解修饰的类。

    *   **`Dao`**（数据访问对象）是一个包含访问数据库表方法的类。这是你编写CRUD（创建、读取、更新和删除）操作的地方。这是一个由`@Dao`注解修饰的*接口*。

    *   **`Database`**：此组件持有对数据库的引用。它是一个由`@Database`注解修饰的抽象类。


    在项目中可以使用`Room`之前，你需要将其依赖项添加到`build.gradle`文件（模块级）中，如清单[11-11](#476822_1_En_11_Chapter.xhtml#PC11)所示。


    ```

    dependencies {

    def room_version = "2.1.0-alpha07"

    implementation "androidx.room:room-runtime:$room_version"

    annotationProcessor "androidx.room:room-compiler:$room_version"

    . . .

    }

    ```

    Listing 11-11. `Room` 依赖


    清单[11-12](#476822_1_En_11_Chapter.xhtml#PC12)、[11-13](#476822_1_En_11_Chapter.xhtml#PC13)、[11-14](#476822_1_En_11_Chapter.xhtml#PC14)和[11-15](#476822_1_En_11_Chapter.xhtml#PC15)展示了四个`Java`源文件，它们演示了`Room`的基本用法。


    | ➊ | `@Entity`注解使其成为一个Entity。如果你不传入`tableName`参数，表名将默认为被修饰类的名称。仅当你希望表名与被修饰类不同时，才需要传入此参数。因此，我在这里写的内容是不必要且多余的，因为我将`tableName`的值设置为“person”，这与被修饰类的名称相同。
    |

    | ➋ | 你将`uid`成员变量设为主键；你还声明它不能为空。 |

    | ➌ | 类的成员变量将自动成为表上的字段。除非你使用`@ColumnInfo`注解，否则表上的列名将沿用成员变量的名称。如果你希望表字段（列）的名称与成员变量的名称不同，请使用`@ColumnInfo`修饰，如下所示，并将`name`设置为你偏好的列名。
    |


    ```java

    import androidx.annotation.NonNull;

    import androidx.room.Entity;

    import androidx.room.PrimaryKey;

    @Entity(tableName = "person") ➊

    public class Person {

    @PrimaryKey(autoGenerate = true) ➋

    @NonNull public int uid;

    @ColumnInfo(name="last_name") ➌

    public String last_name;

    public String first_name;

    public Person(String lname, String fname) {

    last_name = lname;

    first_name = fname;

    }

    public Person() {}

    }

    ```

