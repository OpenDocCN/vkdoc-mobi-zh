  trans: "\n### 如何为代码获取更多屏幕空间\n\n你可以通过关闭所有工具窗口来获得更多屏幕空间。图 3-7 显示了一个在主编辑器窗口中打开的 Java\
    \ 源文件，此时所有工具窗口均已关闭。只需点击工具窗口的名称即可将其折叠，因此要折叠`项目`工具窗口，请点击`项目`。\n\n![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig7_HTML.jpg](img/476822_1_En_3_Fig7_HTML.jpg)\n\
    \n图 3-7. 所有工具窗口关闭后的主编辑器\n\n你可以通过隐藏所有工具窗口栏来获得更多屏幕空间，如图 3-8 所示。\n\n![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig8_HTML.jpg](img/476822_1_En_3_Fig8_HTML.jpg)\n\
    \n图 3-8. 所有工具窗口关闭且工具栏隐藏后的主编辑器\n\n你可以通过进入免打扰模式来获得更多屏幕空间，如图 3-9 所示。你可以通过主菜单栏中的`视图`\
    \ ➤ `进入免打扰模式`进入该模式。要退出该模式，请点击`视图` ➤ `退出免打扰模式`。\n\n![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig9_HTML.jpg](img/476822_1_En_3_Fig9_HTML.jpg)\n\
    \n图 3-9. 免打扰模式\n\n你也可以尝试另外两种可以增加屏幕空间的模式。它们同样位于主菜单栏的`视图`菜单中。\n\n*   演示模式\n*   全屏模式\n\
    \n### 项目工具窗口\n\n你可以通过`项目`工具窗口访问项目中的文件和资源，如图 3-10 所示。该窗口采用树状结构，各个部分可折叠。你可以从该窗口启动任何文件。如果你想打开一个文件，只需在该窗口中双击该文件即可。\n\
    \n![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig10_HTML.jpg](img/476822_1_En_3_Fig10_HTML.jpg)\n\
    \n图 3-10. 项目工具窗口\n\n默认情况下，Android Studio 以`Android`视图显示项目文件，如图 3-10 所示。`Android`视图按模块组织，以便快速访问项目中最重要的文件。你可以通过点击`项目`窗口顶部的下拉箭头来更改项目文件的显示方式，如图\
    \ 3-11 所示。\n\n![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig11_HTML.jpg](img/476822_1_En_3_Fig11_HTML.jpg)\n\
    \n图 3-11. 如何在`项目`工具窗口中切换视图\n\n### SDK 管理器\n\n`SDK 管理器`用于管理需要下载到本地系统的 API 级别（Android\
    \ 版本）以及其他 Android 工具。你可以通过`设置`或`偏好设置`窗口进入`SDK 管理器`，然后点击左侧的`Android SDK`项，如图 3-13\
    \ 所示。\n\n![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig13_HTML.jpg](img/476822_1_En_3_Fig13_HTML.jpg)\n\
    \n图 3-13. `SDK 管理器`\n\n`SDK 平台`（你可以在此选择要下载的 Android 版本）、`SDK 工具`和`SDK 更新站点`可以通过点击窗口中间上方的相应选项卡进行访问。\n\
    \n你也可以从工具栏启动`SDK 管理器`，如图 3-14 所示。\n\n![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig14_HTML.jpg](img/476822_1_En_3_Fig14_HTML.jpg)\n\
    \n图 3-14. 从工具栏启动`SDK 管理器`\n\n### 代码样式\n\n你可以在`设置/偏好设置` ➤ `编辑器` ➤ `代码样式`中更改代码样式方案，如图\
    \ 3-15 所示。\n\n![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig15_HTML.jpg](img/476822_1_En_3_Fig15_HTML.jpg)\n\
    \n图 3-15. 代码样式\n\n在此窗口中，你可以自定义制表符大小、缩进、代码中默认的空白量、getter 和 setter 的生成方式、代码生成、导入的处理方式，等等。\n\
    \n### 章节总结\n\n*   你可以通过增加主编辑器的屏幕空间来查看更多代码。具体做法包括：\n    *   折叠所有工具窗口\n    *   隐藏工具窗口栏\n\
    \    *   进入免打扰模式\n    *   进入全屏模式\n*   你可以在`设置/偏好设置` ➤ `编辑器` ➤ `代码样式`中更改 Java（或任何你喜欢的语言）的编码方案。\n\
    *   你可以通过切换`项目`工具窗口中的视图来更改项目文件的显示方式。\n*   在 Android Studio 中添加`TODO`项很简单。只需添加一行注释，后跟一些`TODO`文本，如下所示：\n\
    \n    `// TODO 这是我的待办列表`\n\n# 4. 调试\n\n*本章内容涵盖：*\n\n*   常见的错误类型\n*   记录调试语句\n\
    *   使用调试器\n\n处理错误是开发者日常工作的重要组成部分。本章将讨论你过去遇到且在未来仍可能遇到的各种错误类型。你将了解如何利用 Android Studio\
    \ 来降低处理这些错误的难度。\n\n### 错误类型\n\n编程中最常遇到的三种错误是：\n\n*   语法错误\n*   运行时错误\n*   逻辑错误\n\
    \n#### 语法错误\n\n语法错误正如其名：语法上的错误。它们发生的原因是你编写了不符合 Java 编译器规则集的代码。换句话说，编译器无法理解这些代码。错误可能是简单的忘记闭合括号或缺少一对花括号；也可能是复杂的传递了错误类型的参数给函数，或者在使用泛型时用错了参数化类。\n\
    \n你可以在 Android Studio 中轻松捕获语法错误。线索是主编辑器中的红色波浪线，如图 4-1 所示。\n\n![../images/476822_1_En_4_Chapter/476822_1_En_4_Fig1_HTML.jpg](img/476822_1_En_4_Fig1_HTML.jpg)\n\
    \n图 4-1. 显示错误指示器的主编辑器\n\n它们表示代码中存在语法错误。IDE 将红色波浪线放置在非常接近问题代码的位置。如果将鼠标悬停在红色波浪线上，大多数情况下\
    \ Android Studio 能够以很高的准确度告诉你代码哪里出了问题。更重要的是，你可以使用一种恰如其名的“快速修复”技术来快速修复这类错误。\n\n\
    要执行快速修复，请将光标移动到红色波浪线范围内的任意位置，然后按`Alt + Enter`（Windows 或 Linux）或`Option + Enter`（macOS）。IDE\
    \ 会处理其余操作。如果存在多种修复方法，IDE 会显示一些选项供你选择。\n"
- fmt: '# Runtime Errors


    Runtime errors happen when your code hits a situation it doesn’t expect. As the
    name implies, this error happens only when your program is running. It’s not something
    you’ll see during compilation.


    Java has two types of exceptions, *checked* and *unchecked*. Android Studio gives
    you lots of assistance with checked exceptions. Figure [4-2](#476822_1_En_4_Chapter.xhtml#Fig2)
    shows what happens in the main editor when you try to call to a method that throws
    a checked exception; with unchecked exceptions, you’re still on your own.


    ![../images/476822_1_En_4_Chapter/476822_1_En_4_Fig2_HTML.jpg](images/476822_1_En_4_Chapter/476822_1_En_4_Fig2_HTML.jpg)


    Figure 4-2. The IDE reminder that you need to handle the exception


    There are two ways to resolve the error shown in Figure [4-2](#476822_1_En_4_Chapter.xhtml#Fig2):
    you can enclose the `openFileOutput()` method call inside a *try-catch* structure
    or you add an exception to the method signature, as shown in Figure [4-3](#476822_1_En_4_Chapter.xhtml#Fig3).


    ![../images/476822_1_En_4_Chapter/476822_1_En_4_Fig3_HTML.jpg](images/476822_1_En_4_Chapter/476822_1_En_4_Fig3_HTML.jpg)


    Figure 4-3. Quick fixes


    Listing [4-1](#476822_1_En_4_Chapter.xhtml#PC1) shows how to handle the `FileNotFoundException`
    by adding a `throws` clause to the method signature.


    ```

    import java.io.FileNotFoundException;

    ...

    void saveData() throws FileNotFoundException {

    String fn = "somefile.txt";

    FileOutputStream out = openFileOutput(fn, Context.MODE_APPEND);

    }

    ```


    Listing 4-1. `FileNotFoundException` Thrown in `saveData()`


    Listing [4-2](#476822_1_En_4_Chapter.xhtml#PC2) shows the code for handling the
    same exception using a *try-catch* block.


    ```

    void saveData() {

    String fn = "somefile.txt";

    try {

    FileOutputStream out = openFileOutput(fn, Context.MODE_APPEND);

    } catch (FileNotFoundException e) {

    e.printStackTrace();

    }

    finally {

    ...

    }

    }

    ```


    Listing 4-2. Handling an Exception Using `try-catch`


    I use a *try-catch* when I want to handle the exception locally, meaning in the
    same block of code where the exception might be thrown. Most of the time, the
    only things to do are to (1) log the error and (2) try to recover from the error,
    if at all possible, and let the user try again.


    Using a `throws` clause, on the other hand, means you don’t want to handle the
    error on the local block; you’d like the calling method to take care of the error
    instead. If the calling method also uses a `throws` clause in its signature, then
    the error handling is passed along up the call stack.


    # Logic Errors


    Logic errors are the hardest to find. As the name suggests, it’s an error in your
    logic. When your code is not doing what you thought it should be doing, that’s
    logic error. There are many ways to cope with a logic error, but in this section,
    you’ll take a look at two: printing debugging statements in certain places of
    your code and walking through your code using the debugger.


    As you inspect your code, you will recognize certain areas where you’re pretty
    sure about what’s going on, and then there are areas where you are not so sure.
    You can place debugging statements in the latter areas. It’s like leaving breadcrumbs
    to follow. There are a couple of ways to print debugging statements. You can either
    use `println`, `Log`, or the `Logger` class.


    When you set Logcat’s mode to verbose, info, or debug, you will see all the messages
    that Android’s runtime generates. If you want to be able to filter out messages
    such as warn or error, you need to use either the `Log` or `Logger` class.


    The `Log` class has five static methods:


    ```

    Log.v(tag, message) // verbose

    Log.d(tag, message) // debug

    Log.i(tag, message) // info

    Log.w(tag, message) // warning

    Log.e(tag, message) // error

    ```


    In each case, *tag* is a `String` literal or variable, typically the name of the
    class where `Log` is called. The *message* is also `String` literal or variable
    which contains what you actually want to see in the log. See Listing [4-3](#476822_1_En_4_Chapter.xhtml#PC4).


    ```

    package net.workingdev.myapplication;

    import android.content.Context;

    import android.support.v7.app.AppCompatActivity;

    import android.os.Bundle;

    import android.util.Log;

    import java.io.FileNotFoundException;

    import java.io.FileOutputStream;

    public class MainActivity extends AppCompatActivity {

    String TAG = this.getClass().getName();

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    ...

    }

    void saveData() {

    String fn = "somefile.txt";

    try {

    FileOutputStream out = openFileOutput(fn, Context.MODE_APPEND);

    } catch (FileNotFoundException e) {

    e.printStackTrace();

    Log.e(TAG, "error");

    }

    finally {

    Log.v(TAG, "My Message");

    }

    }

    }

    ```


    Listing 4-3. Typical Use of the `Log` Class


    When the app is running, you can see the Log messages in the **Logcat** tool window,
    as shown in Figure [4-4](#476822_1_En_4_Chapter.xhtml#Fig4). You can launch the
    Logcat window either by clicking its tab in the menu strip at the bottom of the
    IDE or from the main menu bar via View ➤ Tool Windows ➤ Logcat.


    ![../images/476822_1_En_4_Chapter/476822_1_En_4_Fig4_HTML.jpg](images/476822_1_En_4_Chapter/476822_1_En_4_Fig4_HTML.jpg)


    Figure 4-4. Logcat tool window


    # Debugger


    Android Studio includes an interactive debugger which allows you to walk and step
    through the code while it’s running. With the interactive debugger, you can inspect
    snapshots of the application—values of variables, running threads, and so on—at
    specific locations in the code and at specific points in time. These specific
    locations in the code are called *breakpoints* ; you get to choose these breakpoints.


    To set a breakpoint, choose a line that has an executable statement and then click
    its line number in the gutter. When you set a breakpoint, there will be a pink
    circle icon in the gutter and the whole line will be lit in pink, as shown in
    Figure [4-5](#476822_1_En_4_Chapter.xhtml#Fig5).


    ![../images/476822_1_En_4_Chapter/476822_1_En_4_Fig5_HTML.png](images/476822_1_En_4_Chapter/476822_1_En_4_Fig5_HTML.png)


    Figure 4-5. Debugger window


    After the breakpoints are set, you have to run the app in debug mode. Stop the
    app if it is currently running and from the main menu bar, click Run ➤ Debug App.


    ### Note


    Running the app in debug mode isn’t the only way to debug the app. You can also
    attach the debugger process in a currently running application. There are situations
    where this second technique is useful. For example, when the bug you are trying
    to solve occurs in very specific conditions, you may want to run the app for a
    while, and when you think you are close to the point of error, you can then attach
    the debugger.


    Use the application as usual. When the execution comes to a line where you set
    a breakpoint, the line turns from pink to blue. This is how you know the code
    execution is at your breakpoint. At this point, the debugger window opens, the
    execution stops, and Android Studio gets into interactive debugging mode. While
    you are here, the state of the application is displayed in the Debug tool window.
    During this time, you can inspect values of variables and even see the threads
    running in the app.


    You can also add variables or expression in the Watch window by clicking the plus
    sign with the spectacles icon. You’ll get a text field where you can enter any
    valid expression. When you press Enter, Android Studio will evaluate the expression
    and show you the result. To remove a watch expression, select the expression and
    click the minus sign icon in the Watch window.'
