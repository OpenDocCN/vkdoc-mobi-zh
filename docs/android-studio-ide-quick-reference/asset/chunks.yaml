  trans: '

    # 导航架构组件之前


    在 Android 早期，如果你的应用有一定复杂度，几乎必然需要将应用划分为多个 Activity。这就意味着你需要掌握从一个 Activity 导航到另一个
    Activity 并返回的技能。因此，在那些日子里，你可能会编写类似代码清单 10-1 所示的代码。


    ```

    class FirstActivity extends AppCompatActivity

    implements View.OnClickListener {

    public void onClick(View v) {

    Intent intent = new Intent(this, SecondActivity.class);

    startActivity(intent);

    }

    }

    // SecondActivity.java

    class SecondActivity extends AppCompatActivity { }

    ```


    代码清单 10-1. 如何启动一个 Activity


    如果需要将数据从一个 Activity 传递到另一个 Activity，你可能需要编写类似代码清单 10-2 所示的代码片段。


    ```

    Intent intent = new Intent(this, SecondActivity.class);

    Intent.putExtra("key", value);

    startActivity(intent);

    ```


    代码清单 10-2. 如何向另一个 Activity 传递数据


    这种界面管理方式具有以下优点：


    ![../images/476822_1_En_10_Chapter/476822_1_En_10_Fig1_HTML.jpg](img/476822_1_En_10_Fig1_HTML.jpg)


    图 10-1. 简单的 Activity 工作流


    *   实现简单。只需从任意一个 Activity 调用 `startActivity()` 方法。

    *   可以通过编程方式调用 `finish()` 方法关闭当前正在运行的 Activity。用户也可以通过按返回键关闭 Activity。

    *   返回栈完全由 Android 运行时管理；见图 10-1。


    但这并非全是优点；Activity 导航也伴随着一些弊端。其缺点在于：


    *   你无法清楚了解返回栈中有哪些 Activity，因为你并不管理它。这里恰好展示了一个特性同时兼具优点和缺点的例子。

    *   每个屏幕都需要一个新的 Activity，这可能会导致资源消耗较大。

    *   每个 Activity 都需要在 Android 清单文件中声明，不过当你使用向导创建 Activity 时，Android Studio 会自动完成此操作，因此这算不上大问题。

    *   你将难以使用更现代的导航模式，例如底部导航栏。


    由于这些限制，出现了另一种屏幕导航方式。2011 年，当 Google 发布 Android 4.0 时，我们开始使用*碎片（Fragment）*。如果你已经忘记了
    Fragment，可以这样理解：Activity 基本上是一个 UI 的组合单元，而 Fragment 则是一个更小的组合单元。


    Fragment 与 Activity 类似，由两部分组成：一个 Java 或 Kotlin 程序以及一个布局文件。其基本理念相同：在 XML 文件中定义
    UI，然后在运行时加载该 XML 文件，使得 XML 文件中的所有 UI 成为实际的 Java 对象。


    其思路是创建多个 Fragment，并将它们包含在单个 Activity 中。通常，根据用户操作、设备方向或设备外形因素来显示或隐藏 Fragment；这通常通过
    `FragmentManager` 和 `FragmentTransaction` 对象来完成。如果你之前使用过 Fragment，那么代码清单 10-3
    中显示的代码片段可能会让你感到熟悉。


    ```

    FragmentManager fm = getFragmentManager();

    FragmentTransaction ft = fm.beginTransaction();

    Fragment fragment = new FirstFragment();

    ft.add(R.id.fragment_container, fragment);

    ft.commit();

    ```


    代码清单 10-3. Fragment 代码片段


    与使用 Activity 导航不同，使用 Fragment 时，你能够确切知道导航栈中的内容；但是，正如你在代码清单 10-1 中所见，由于必须手动管理导航栈，这种方式可能会变得繁琐。


    到目前为止，你只有两种导航选择：要么使用基于 Activity 的导航，这种方式易于使用但会带来性能开销，并且你无法控制导航栈；要么使用 Fragment，后者可以完全控制导航栈，但其
    API 较为繁琐且容易出错。


    时间快进到 2017 年，Google 推出了导航组件。现在，你可以使用 Fragment 而无需承担复杂 API 带来的负担。使用导航组件，代码清单 10-3
    中的所有代码现在都可以替换为代码清单 10-4 所示的一行代码。


    ```

    findNavController().navigate(destination);

    // FragmentManager fm = getFragmentManager();

    // FragmentTransaction ft = fm.beginTransaction();

    // Fragment fragment = new FirstFragment();

    // ft.add(R.id.fragment_container, fragment);

    // ft.commit();

    ```


    代码清单 10-4. 导航组件代码片段

