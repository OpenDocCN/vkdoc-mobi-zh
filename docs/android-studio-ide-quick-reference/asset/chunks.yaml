- fmt: "### How to Get More Screen Space for Code\n\nYou can get more screen real\
    \ estate by closing all tool windows. Figure [3-7](#476822_1_En_3_Chapter.xhtml#Fig7)\
    \ shows a Java source file open in the main editor window while all the tool windows\
    \ are closed. You can collapse any tool window by simply clicking its name, so\
    \ to collapse the `Project` tool window, click `Project`.\n\n![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig7_HTML.jpg](images/476822_1_En_3_Chapter/476822_1_En_3_Fig7_HTML.jpg)\n\
    \nFigure 3-7. Main editor, with all tool windows closed\n\nYou can get even more\
    \ screen real estate by hiding all the tool window bars, as shown in Figure [3-8](#476822_1_En_3_Chapter.xhtml#Fig8).\n\
    \n![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig8_HTML.jpg](images/476822_1_En_3_Chapter/476822_1_En_3_Fig8_HTML.jpg)\n\
    \nFigure 3-8. Main editor, with all tool windows closed and toolbars hidden\n\n\
    You can get even more screen space by entering distraction-free mode, as shown\
    \ in Figure [3-9](#476822_1_En_3_Chapter.xhtml#Fig9). You can enter distraction-free\
    \ mode from the main menu bar via `View` ➤ `Enter Distraction Free Mode`. To exit\
    \ the mode, click `View` ➤ `Exit Distraction Free Mode`.\n\n![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig9_HTML.jpg](images/476822_1_En_3_Chapter/476822_1_En_3_Fig9_HTML.jpg)\n\
    \nFigure 3-9. Distraction-free mode\n\nYou may also try two other modes that can\
    \ increase screen real estate. They’re also found in the `View` menu from the\
    \ main menu bar.\n\n*   Presentation mode\n*   Full screen\n\n### Project Tool\
    \ Window\n\nYou can get to your project’s files and assets via the `Project` tool\
    \ window, shown in Figure [3-10](#476822_1_En_3_Chapter.xhtml#Fig10). It has a\
    \ tree-like structure and the sections are collapsible. You can launch any file\
    \ from this window. If you want to open a file, you simply double-click the file\
    \ from this window.\n\n![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig10_HTML.jpg](images/476822_1_En_3_Chapter/476822_1_En_3_Fig10_HTML.jpg)\n\
    \nFigure 3-10. Project tool window\n\nBy default, Android Studio displays the\
    \ project files in `Android` view, as shown in Figure [3-10](#476822_1_En_3_Chapter.xhtml#Fig10).\
    \ The `Android` view is organized by modules to provide quick access to the project’s\
    \ most relevant files. You change how you view the project files by clicking the\
    \ down arrow on top of the `Project` window, as shown in Figure [3-11](#476822_1_En_3_Chapter.xhtml#Fig11).\n\
    \n![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig11_HTML.jpg](images/476822_1_En_3_Chapter/476822_1_En_3_Fig11_HTML.jpg)\n\
    \nFigure 3-11. How to change views in the `Project` tool window\n\n### The SDK\
    \ Manager\n\nThe `SDK Manager` is used to manage what API levels (Android versions)\
    \ and other Android tools you want downloaded into your local system. You can\
    \ get to the `SDK Manager` via the `Settings` or `Preferences` window, and then\
    \ you click the `Android SDK` item (found on the left side), as shown in Figure\
    \ [3-13](#476822_1_En_3_Chapter.xhtml#Fig13).\n\n![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig13_HTML.jpg](images/476822_1_En_3_Chapter/476822_1_En_3_Fig13_HTML.jpg)\n\
    \nFigure 3-13. `SDK Manager`\n\nThe `SDK platforms` (where you can select the\
    \ Android versions to download), `SDK tools`, and `SDK update sites` can be accessed\
    \ by clicking their tabs, which are found in the upper middle portion of the window.\n\
    \nYou can also launch the `SDK Manager` from the tool bars, as shown in Figure\
    \ [3-14](#476822_1_En_3_Chapter.xhtml#Fig14).\n\n![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig14_HTML.jpg](images/476822_1_En_3_Chapter/476822_1_En_3_Fig14_HTML.jpg)\n\
    \nFigure 3-14. Launch the `SDK Manager` from the tool bar\n\n### Code Styles\n\
    \nYou can change the code style scheme in `Settings/Preferences` ➤ `Editor` ➤\
    \ `Code Style`, as shown in Figure [3-15](#476822_1_En_3_Chapter.xhtml#Fig15).\n\
    \n![../images/476822_1_En_3_Chapter/476822_1_En_3_Fig15_HTML.jpg](images/476822_1_En_3_Chapter/476822_1_En_3_Fig15_HTML.jpg)\n\
    \nFigure 3-15. Code styles\n\nIn this window, you can customize tab sizes, indents,\
    \ how much white space is the default for your code, how getters and setters are\
    \ generated, code generation, how imports are done, and more.\n\n### Chapter Summary\n\
    \n*   You can see more of your code by increasing the screen real estate for the\
    \ main editor. You can do this by\n    *   Collapsing all the tool windows\n \
    \   *   Hiding the tool window bars\n    *   Entering distraction-free mode\n\
    \    *   Going to full-screen mode\n*   You can change the coding scheme for Java\
    \ (or any language you like) in `Settings/Preferences` ➤ `Editor` ➤ `Code Style`.\n\
    *   You can change how you view the project files from switching the view in the\
    \ `Project` tool window.\n*   Adding a `TODO` item is easy in Android Studio.\
    \ Just add a single line comment followed by some `TODO` text, like this:\n\n\
    \    `// TODO This is my todo list`\n\n# 4. Debugging\n\n*What this chapter covers:*\n\
    \n*   Common errors you’ll encounter\n*   Logging debug statements\n*   Using\
    \ the debugger\n\nDealing with errors is a big part of your life as a developer.\
    \ This chapter will discuss the kinds of errors you’ve faced and will still face\
    \ in the foreseeable future. You’ll see how you can use Android Studio to ease\
    \ the difficulty of dealing with these errors.\n\n### Types of Errors\n\nThe three\
    \ most common errors you’ll face in programming are\n\n*   Syntax errors\n*  \
    \ Runtime errors\n*   Logic errors\n\n#### Syntax Errors\n\nSyntax errors are\
    \ exactly what you think they are: errors in the syntax. They happen because you\
    \ wrote something in the code that’s not allowed by the set of rules of the Java\
    \ compiler. In other words, the compiler doesn’t understand it. The error can\
    \ be as simple as forgetting to close a parenthesis or a missing pair of curly\
    \ braces. It can be as complex as passing the wrong type of argument to a function\
    \ or using a parameterized class when using generics.\n\nYou can catch syntax\
    \ errors in Android Studio with ease. The clue is the red squiggly lines in the\
    \ main editor, as in Figure [4-1](#476822_1_En_4_Chapter.xhtml#Fig1).\n\n![../images/476822_1_En_4_Chapter/476822_1_En_4_Fig1_HTML.jpg](images/476822_1_En_4_Chapter/476822_1_En_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1. Main editor showing error indicators\n\nThey mean something is syntactically\
    \ wrong with your code. The IDE places the red squiggly lines very near the offending\
    \ code. If you hover your mouse on a red squiggly line, most of the time Android\
    \ Studio can tell you, with a high degree of accuracy, what’s wrong with the code.\
    \ What’s more, you can quickly fix these kinds of errors using a technique that’s\
    \ aptly named “quick fix”.\n\nTo do a quick fix, bring the cursor anywhere within\
    \ the red squiggly lines and then press `Alt + Enter` (for Windows or Linux) or\
    \ `Option + Enter` (for macOS). The IDE takes care of the rest. If there’s more\
    \ than one way to fix the error, the IDE will show you some options."
