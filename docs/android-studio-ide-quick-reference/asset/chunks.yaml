  trans: "\n### 注释\n\n我将 SOLID 全大写拼写，因为它同时也是一个缩写，代表**单**一职责、**开**闭原则、**里**氏替换原则、**接**口隔离原则和**依**赖倒置原则。这些是面向对象设计的原则，由罗伯特·C·马丁推广开来。\n\
    \n`Android Studio` 拥有一些便捷的重构能力。开始使用很简单：只需选中要重构的代码段，然后使用右键菜单中的上下文相关选项，如图 13-3 所示。或者，你也可以使用键盘快捷键：macOS\
    \ 为 `Ctrl + T` ，Windows/Linux 为 `Ctrl + Alt + Shift + T`。\n\n![../images/476822_1_En_13_Chapter/476822_1_En_13_Fig3_HTML.jpg](img/476822_1_En_13_Fig3_HTML.jpg)\
    \  \n图 13-3. 重构操作\n\n我确信你之前已经多次进行过重构，但这里我们不妨简单回顾一下。\n\n*   **重命名**：这可以让你安全地重命名变量和其他标识符。你应该使用它，而不是`查找和替换`。此功能适用于整个项目，而不仅仅是当前文件。\n\
    \n*   **更改签名**：这让你可以更改一个方法，无论是其名称还是参数。它同样适用于类级别，因此你可以将一个类转换为泛型类型并操作类型参数。\n\n*\
    \   **移动**：移动一个元素。如果需要，你可以将一个方法移动到另一个类中。\n\n*   **复制**：允许你复制元素，例如当前选中的类。\n\n*\
    \   **安全删除**：如果需要删除某些内容，`Android Studio` 会验证你正在删除的内容是否未被代码库中的其他任何部分使用。如果正在使用中，系统会提示你，以便你在实际删除重要内容之前先处理这些依赖关系。\n\
    \n*   **提取常量**：避免使用硬编码值。你不应该这样做，你知道这一点，也明白原因。用于重构的提取选项不仅适用于常量；你还可以提取字段、方法、超类、变量、参数和接口。\n\
    \n`Refactor`（重构）菜单中还有更多选项；请务必查看其他选项。\n\n### 生成\n\n`Android Studio` 另一个节省时间的功能是代码生成器。这个名称很贴切，因为它完全符合你的预期——它会生成代码。我们来举个例子。图\
    \ 13-4 显示了键盘光标位于一个类定义内部。当光标在类体内时，启动生成器操作；从主菜单栏中，选择**代码 ➤ 生成**。\n\n![../images/476822_1_En_13_Chapter/476822_1_En_13_Fig4_HTML.jpg](img/476822_1_En_13_Fig4_HTML.jpg)\
    \  \n图 13-4. 主菜单栏，代码 ➤ 生成\n\n如你所见，可以生成相当多的样板代码。当你选择任何生成选项时，`Android Studio` 都会生成一个通用的代码存根。选择\
    \ getter 和 setter 选项。假设你有一个 `PersonTest` 类，如图 13-4 所示。当键盘光标仍在 `PersonTest` 类内时，前往主菜单栏并选择**代码\
    \ ➤ 生成**。或者，你可以使用键盘快捷键 `Command + N`（macOS）或 `Alt + Insert`（Windows 和 Linux），然后选择生成\
    \ getter 和 setter。你将看到图 13-5 中所示的对话框。\n\n![../images/476822_1_En_13_Chapter/476822_1_En_13_Fig5_HTML.jpg](img/476822_1_En_13_Fig5_HTML.jpg)\
    \  \n图 13-5. 生成 getter 和 setter\n\n生成器对话框显示了类中所有自动检测到的字段。它显示了 `mFirstname` 和 `mLastname`\
    \ 成员变量；还允许你进行多项选择。选中两个成员变量并点击确定。代码清单 13-1 显示了代码生成后的 `PersonTest` 类。\n\n```\nclass\
    \ PersonTest {\n    String mFirstname;\n    String mLastname;\n    public String\
    \ getmFirstname() {\n        return mFirstname;\n    }\n    public void setmFirstname(String\
    \ mFirstname) {\n        this.mFirstname = mFirstname;\n    }\n    public String\
    \ getmLastname() {\n        return mLastname;\n    }\n    public void setmLastname(String\
    \ mLastname) {\n        this.mLastname = mLastname;\n    }\n    public PersonTest(String\
    \ mFirstname, String mLastname) {\n        this.mFirstname = mFirstname;\n   \
    \     this.mLastname = mLastname;\n    }\n}\n```\n代码清单 13-1. PersonTest 类\n\n\
    这已经相当简洁了。任何能减少我们敲击键盘次数的东西都是好事情。我猜在这个例子中你可能只有一点要挑剔的地方；方法命名不太对。你可能更倾向于使用 `setLastname()`\
    \ 而非 `setmLastname()`，对吧？你将在下一节中解决这个问题。\n\n### 编码风格\n\n如果你进入 `Android Studio`\
    \ 的偏好设置或设置，然后转到**编辑器 ➤ 代码风格 ➤ Java**，你会发现可以更改许多编辑器行为相关的内容。图 13-6 展示了代码风格的选项，特指\
    \ Java 语言。\n\n![../images/476822_1_En_13_Chapter/476822_1_En_13_Fig6_HTML.jpg](img/476822_1_En_13_Fig6_HTML.jpg)\
    \  \n图 13-6. 偏好设置 ➤ 代码风格 ➤ Java\n\n如果你想更改制表符和缩进的空格数，可以在**制表符和缩进**区域进行修改。请务必检查此对话框中的其他选项。\n\
    \n转到**代码生成**选项卡（如图 13-7 所示）。\n\n![../images/476822_1_En_13_Chapter/476822_1_En_13_Fig7_HTML.jpg](img/476822_1_En_13_Fig7_HTML.jpg)\
    \  \n图 13-7. 代码生成\n\n在这里你可以告诉 `Android Studio` 你是如何命名变量的。如果你回到代码清单 13-1，你会注意到我喜欢给变量添加\
    \ `m` 前缀，例如 `mLastname` 和 `mFirstname`；起初，`Android Studio` 并不知道这一点，这就是为什么当我为成员变量生成一些\
    \ getter 和 setter 时，它给了我 `setmLastname()` 而不是仅仅 `setLastname()`。\n\n### 注释\n\n\
    给成员变量添加 `m` 前缀源自 AOSP（Android 开源项目）。我在这里使用它，是因为你会在网上读到的大量示例代码都采用这种约定。你可以在 [`https://bit.ly/styleguideaosp`](https://bit.ly/styleguideaosp)\
    \ 进一步阅读相关内容。\n\n为了告诉 `Android Studio` 我使用 `m` 作为变量前缀，我在**字段名称前缀**中填入了 `m`，如图 13-7\
    \ 所示，然后点击了确定。\n\n现在，如果我生成一些 getter 和 setter，我将得到更合适的方法名称。代码清单 13-2 展示了为 `PersonTest`\
    \ 类重新生成的代码。\n\n```\nclass PersonTest {\n    String mFirstname;\n    String mLastname;\n\
    \    public String getFirstname() {\n        return mFirstname;\n    }\n    public\
    \ void setFirstname(String firstname) {\n        mFirstname = firstname;\n   \
    \ }\n    public String getLastname() {\n        return mLastname;\n    }\n   \
    \ public void setLastname(String lastname) {\n        mLastname = lastname;\n\
    \    }\n    public PersonTest(String mFirstname, String mLastname) {\n       \
    \ this.mFirstname = mFirstname;\n        this.mLastname = mLastname;\n    }\n\
    }\n```\n代码清单 13-2. 重新生成的 PersonTest 类\n"
- fmt: '## Live Templates


    You can save more time in Android Studio with the live templates, which work a
    lot like those text expander applications, if you have used some of them. The
    basic idea is when you type a series of characters, like `datetoday`, the editor
    will replace them with the text of the actual date today.


    If you’ve done some Android programming in the past, you’ve probably made this
    mistake at least once:


    ```

    Toast.makeText(MainActivity.this, "no show");

    ```


    This is easy enough to spot, but some other errors may not be as obvious. Anyway,
    live templates can help you avoid these hassles. Live templates are shortcuts
    that are displayed as code-completion options; for example, try typing `fbc` inside
    an `OnClick` handler (or any event handler), as shown in Figure [13-8](#476822_1_En_13_Chapter.xhtml#Fig8).


    ![../images/476822_1_En_13_Chapter/476822_1_En_13_Fig8_HTML.jpg](images/476822_1_En_13_Chapter/476822_1_En_13_Fig8_HTML.jpg)


    Figure 13-8.


    Live template sample


    You’ll see the code completion options. Press the `Tab` key and see what happens.


    Table [13-1](#476822_1_En_13_Chapter.xhtml#Tab1) lists some common built-in templates.


    Table 13-1.


    Common Live Templates


    | Abbreviation | Description | Code |

    | --- | --- | --- |

    | `fbc` | Find view by ID with cast | `($cast$) findViewById(R.id.$resId$);` |

    | `const` | Define an Android style constant | `private static final int $name$
    = $value$;` |

    | `Toast` | Create a new Toast | `Toast.makeText($classname$.this, "$text$").show();`
    |

    | `fori` | Create a for loop | `for(int $INDEX$ = 0;$INDEX$<$LIMIT$;$INDEX++$
    ) {``$END$``}` |


    Make sure you check out the other live templates. Go to the Settings or Preferences
    window. If you’re in Windows or Linux, go to the main menu bar and choose **File**
    ➤ **Settings** ➤ **Editor** ➤ **Live Templates**; if you’re in macOS, go to **Android
    Studio** ➤ **Preferences** ➤ **Editor** ➤ **Live Templates**. You can even create
    your own live templates from there.


    ## Important Keyboard Shortcuts


    The Android developer website maintains a page where you can find the keyboard
    shortcuts for Android Studio: [`http://bit.ly/androidstudiokbshortcuts`](http://bit.ly/androidstudiokbshortcuts).
    You should really make it a point to read this page; but before I close this chapter,
    I’d like to leave you with six shortcuts that I find to be very useful. Table
    [13-2](#476822_1_En_13_Chapter.xhtml#Tab2) lists these shortcuts.


    Table 13-2.


    Some Useful Keyboard Shortcuts


    | Shortcut | What it does |

    | --- | --- |

    | Press `Shift` twice | It lets you search for a term everywhere. It searches
    the `assets` folder, Gradle files, images, resources, code, XML configuration
    files, and so on. If you don’t know which folder to search, just use this. |

    | `Ctrl + Space \| Command + Space` | Android Studio already has code completion
    and code hinting; this is just a little extra. If you forgot the parameters for
    a method that uses lots of parameters, you can use this to preview all the variants
    of the method and the corresponding parameters they expect. |

    | `Alt + Insert \| Command + N` | You used this in the previous section where
    you generated some code. This is the shortcut for the code generator. |

    | `Ctrl + O \| Command + O` | When you want to override methods, use this shortcut.
    |

    | `Ctrl + - \| Command + -` | You can use these to expand or collapse code blocks.
    It’s handy to be able to fold code when you’re working with a large codebase.
    These shortcuts will make your life a bit easier when you fold/unfold blocks.
    |

    | `Ctrl + Alt + L \| Command + Option + L` | Don’t manually indent or reindent
    your code. If you messed up the indentation of a `for` loop or nested conditional
    blocks, just highlight the code block and use this shortcut. |


    ## Chapter Summary


    *   You can avoid writing boilerplate code like constructors, getters, and setters
    by using code generators.


    *   Android Studio has plenty of refactoring aides. Before using the Find/Replace
    menu, consider using the refactoring options.


    *   Live templates are like text expanders; they can save you time and let you
    avoid common coding mistakes. You should use them.


    *   You can control how the Android Studio editor behaves. Go to Settings or Preferences
    and then **Editor** ➤ **Code Style**.


