  raw: '### Single Stepping


    Like most debuggers, Android Studio lets you step line by line through your program.
    When the debugger stops at a breakpoint, you have a couple of tools at your disposal.
    You’d typically want to know how to do the following.


    *   **Resume**: Resumes execution until you get to the next breakpoint. If there
    aren’t any more breakpoints, then the program runs like it would in normal execution.


    *   **Step into**: If the next line has a method call, this will jump to the method
    and pause it at the first line.


    *   **Step over**: Executes whatever happens on the next line and then jumps to
    the next line.


    *   **Step out**: Executes the remainder of the current method and then pauses
    at the next statement after the method. It essentially gets out of the method.


    You can get to these actions from the main menu bar under the Run menu. You can
    also get to them from the Debugger tool bar (shown in Figure [4-6](#476822_1_En_4_Chapter.xhtml#Fig6)).


    ![../images/476822_1_En_4_Chapter/476822_1_En_4_Fig6_HTML.jpg](images/476822_1_En_4_Chapter/476822_1_En_4_Fig6_HTML.jpg)


    Figure 4-6.


    Debugger tool bar


    Lastly, you can get the single-step actions via the keyboard shortcuts explained
    in Table [4-1](#476822_1_En_4_Chapter.xhtml#Tab1).


    Table 4-1.


    Debugger Keyboard Shortcuts


    |   | Windows/Linux | macOS |

    | --- | --- | --- |

    | Debug | `Shift + F9` | `Ctrl + D` |

    | Resume | `F9` | `Command + Option + R` |

    | Step into | `F7` | `F7` |

    | Step over | `F8` | `F8` |

    | Step out | `Shift + F8` | `Shift + F8` |


    ## Chapter Summary


    *   The three kinds of errors you may encounter are compile type or syntax errors,
    runtime errors, and logic errors.


    *   Syntax errors are the easiest to fix. Android Studio bends over backwards
    for you so you can quickly spot syntax errors. There are various ways to fix syntax
    errors with AS3, but most of the time, the quick fix should do it.


    *   You can walk through your code line by line by setting breakpoints and using
    the single-step actions.


    # 5. Unit Testing


    *What this chapter covers:*


    *   Testing basics


    *   How to run efficient unit tests


    *   Adding and implementing unit tests


    The practice of software testing has been around since the dawn of software development.
    When you write programs, you need a way to verify that they work in the intended
    manner. In the early days of software development, testing was done in a somewhat
    ad hoc way: you’d write some code, write a few manual tests to see if it looks
    right, go back to the code for some adjustment, and rinse-repeat. That’s not the
    case anymore. Modern software has become so sophisticated that it cannot simply
    rely on a few manual tests to ensure it works properly.


    In this chapter, you’ll breeze through how to do unit testing in Android. Unit
    testing is functional testing that’s done by a developer; not a QA. A unit test
    is usually simple; it’s a particular thing that a method might do or produce.
    An application typically has many unit tests because each test is a very narrowly
    defined set of behaviors. So, you’ll need lots of tests to cover the whole functionality.
    You will use JUnit to write your tests.


    JUnit is a regression testing framework written by Kent Beck and Erich Gamma.
    Among their other achievements, you might remember one of them as the guy who
    created extreme programming and the other one from Gang of Four (GoF, Design Patterns),
    respectively.


    Java developers have long used JUnit for unit testing. Android Studio comes with
    JUnit and is very well integrated in it. You don’t have to do much by way of setup.
    You only need to write your tests.


    ## JVM Test vs. Instrumented Test


    If you examine any Android application, you’ll see that it has two parts: a Java-based
    behavior and an Android-based behavior.


    The Java part is where you code business logic, calculations, and data transformations.
    The Android part is where you actually interact with the Android platform. This
    is where you receive input from users or show results to them. It makes perfect
    sense if you can test the Java-based behavior separate from the Android part because
    it’s much quicker to execute. Fortunately, this is already the way it’s done in
    Android Studio. When you create a project, Android Studio creates two separate
    folders: one for the JVM tests and another for the instrumented tests. Figure
    [5-1](#476822_1_En_5_Chapter.xhtml#Fig1) shows the two test folders in the Android
    view and Figure [5-2](#476822_1_En_5_Chapter.xhtml#Fig2) shows the same two folders
    in the Project view.


    ![../images/476822_1_En_5_Chapter/476822_1_En_5_Fig1_HTML.jpg](images/476822_1_En_5_Chapter/476822_1_En_5_Fig1_HTML.jpg)


    Figure 5-1.


    The JVM test and the instrumented test in the Android view


    The JVM test folder is simply referred to as `test` while the one for the instrumented
    test is called `androidTest`.


    ![../images/476822_1_En_5_Chapter/476822_1_En_5_Fig2_HTML.jpg](images/476822_1_En_5_Chapter/476822_1_En_5_Fig2_HTML.jpg)


    Figure 5-2.


    The JVM test and the instrumented test in the Project view


    As you can see from either Figure [5-1](#476822_1_En_5_Chapter.xhtml#Fig1) or
    [5-2](#476822_1_En_5_Chapter.xhtml#Fig2), Android Studio went the extra mile to
    generate sample test files for both the JVM and instrumented tests. The example
    files are there to serve as quick references; they show what unit tests might
    look like.'
  trans: '

    ### 单步执行


    与大多数调试器一样，Android Studio 允许你逐行执行程序。当调试器在断点处停止时，你可以使用一些工具。通常，你需要了解如何执行以下操作。


    -   **恢复程序**：恢复执行，直到遇到下一个断点。如果不再有断点，则程序会像正常执行时一样运行。

    -   **步入**：如果下一行包含方法调用，此操作将跳转到该方法，并在其第一行暂停。

    -   **单步跳过**：执行下一行的所有操作，然后跳转到再下一行。

    -   **单步跳出**：执行完当前方法的剩余部分，然后在调用该方法之后的下一行语句处暂停。它本质上是从当前方法中退出。


    你可以从主菜单栏的 `Run` 菜单中访问这些操作。你也可以从调试器工具栏（如图 4-6 所示）中访问它们。


    ![../images/476822_1_En_4_Chapter/476822_1_En_4_Fig6_HTML.jpg](img/476822_1_En_4_Fig6_HTML.jpg)


    图 4-6. 调试器工具栏


    最后，你可以通过表 4-1 中介绍的键盘快捷键来执行单步操作。


    表 4-1. 调试器键盘快捷键


    | | Windows/Linux | macOS |

    | --- | --- | --- |

    | 调试 | `Shift + F9` | `Ctrl + D` |

    | 恢复程序 | `F9` | `Command + Option + R` |

    | 步入 | `F7` | `F7` |

    | 单步跳过 | `F8` | `F8` |

    | 单步跳出 | `Shift + F8` | `Shift + F8` |


    ### 章节总结


    -   你可能遇到的三种错误类型是：编译时错误或语法错误、运行时错误和逻辑错误。

    -   语法错误最容易修复。Android Studio 会为你提供大力支持，以便你快速发现语法错误。使用 AS3 有多种修复语法错误的方法，但大多数情况下，快速修复功能即可解决问题。

    -   你可以通过设置断点并使用单步操作来逐行遍历你的代码。


    # 5. 单元测试


    **本章内容涵盖：**


    -   测试基础

    -   如何运行高效的单元测试

    -   添加并实现单元测试


    软件测试的实践自软件开发诞生之初就已存在。当你编写程序时，需要一种方法来验证它们是否按预期方式工作。在软件开发的早期，测试是以一种相当临时的方式进行的：编写一些代码，再编写一些手工测试来检查其是否正确，然后回到代码中进行调整，如此循环往复。但现在情况已非如此。现代软件变得非常复杂，不能仅仅依赖少量手工测试来确保其正常运行。


    在本章中，你将快速了解如何在 Android 中进行单元测试。单元测试是由开发人员（而非质量保证人员）执行的功能性测试。单元测试通常很简单，它针对一个方法可能执行或产生的某个特定行为。一个应用程序通常包含许多单元测试，因为每个测试都是一组定义得非常狭窄的行为。因此，你需要大量的测试用例来覆盖全部功能。你将使用
    `JUnit` 来编写测试。


    `JUnit` 是由 Kent Beck 和 Erich Gamma 编写的一个回归测试框架。在他们其他的成就中，你或许记得其中一位是极限编程的创始人，另一位则来自“四人组”（GoF，设计模式）。


    Java 开发人员长期以来一直使用 `JUnit` 进行单元测试。Android Studio 内置了 `JUnit`，并且与之集成得非常好。你无需进行太多的设置工作，只需编写你的测试即可。


    ## JVM 测试 vs. 插桩测试


    如果你检查任何一个 Android 应用程序，你会发现它由两部分组成：基于 Java 的行为和基于 Android 的行为。


    Java 部分是你编写业务逻辑、计算和数据转换的地方。Android 部分则是你真正与 Android 平台交互的地方。在这里，你接收来自用户的输入或向用户展示结果。如果你能将基于
    Java 的行为与 Android 部分分开测试，那会非常有意义，因为前者执行起来要快得多。幸运的是，Android Studio 已经采用了这种方式。当你创建一个项目时，Android
    Studio 会创建两个独立的文件夹：一个用于 JVM 测试，另一个用于插桩测试。图 5-1 显示了 Android 视图下的这两个测试文件夹，图 5-2
    则显示了项目视图下的这两个文件夹。


    ![../images/476822_1_En_5_Chapter/476822_1_En_5_Fig1_HTML.jpg](img/476822_1_En_5_Fig1_HTML.jpg)


    图 5-1. Android 视图下的 JVM 测试和插桩测试


    JVM 测试文件夹简称为 `test`，而插桩测试文件夹称为 `androidTest`。


    ![../images/476822_1_En_5_Chapter/476822_1_En_5_Fig2_HTML.jpg](img/476822_1_En_5_Fig2_HTML.jpg)


    图 5-2. 项目视图下的 JVM 测试和插桩测试


    从图 5-1 或 5-2 中可以看出，Android Studio 还额外生成了 JVM 测试和插桩测试的示例测试文件。这些示例文件可作为快速参考；它们展示了单元测试可能的样子。

