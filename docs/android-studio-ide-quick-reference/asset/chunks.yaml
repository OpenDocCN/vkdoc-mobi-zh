- fmt: '### Note


    You can type the code examples if you prefer, or you can refer to the included
    book source code. If you prefer to work on the code by yourself, you need to follow
    this sequence:


    1. Create a project with an empty activity.

    2. Include the dependencies for Room, shown in Listing [11-3](#476822_1_En_11_Chapter.xhtml#PC3).


    You’ll take a look at the observer object first. Listing [11-1](#476822_1_En_11_Chapter.xhtml#PC1)
    shows the annotated code.


    | ➊ | If you want to observe another component’s lifecycle changes, you need to
    implement the `LifecycleObserver` interface. This line makes this class an observer.
    |

    | ➋ | Use the `OnLifecycleEvent` annotation to tell the Android runtime that the
    decorated method is supposed to be called when the lifecycle event happens. In
    this case, you’re listening for the `ON_CREATE` event of the observed object.
    The parameter to the decorator indicates which lifecycle event you’re listening
    for. |

    | ➌ | This is the decorated method. It gets called when the object you’re observing
    enters the `ON_CREATE` lifecycle status. You can name this method anything you
    want; I just named it `onCreateEvent()` because it’s descriptive. Otherwise, you’re
    free to name it to your liking; the name of the method doesn’t matter because
    you already decorated it, so the annotation is sufficient. |

    | ➍ | This is where you do something interesting in response to a lifecycle status
    change. |


    ```

    import androidx.lifecycle.Lifecycle;

    import androidx.lifecycle.LifecycleObserver;

    import androidx.lifecycle.OnLifecycleEvent;

    public class MainActivityObserver implements LifecycleObserver {  ➊

    @OnLifecycleEvent(Lifecycle.Event.ON_CREATE) ➋

    public void onCreateEvent() {  ➌

    System.out.println("EVENT: onCreate Event fired");  ➍

    }

    @OnLifecycleEvent(Lifecycle.Event.ON_PAUSE)

    public void onPauseEvent() {

    System.out.println("EVENT: onPause Event fired");

    }

    @OnLifecycleEvent(Lifecycle.Event.ON_RESUME)

    public void onResumeEvent() {

    System.out.println("EVENT: onResume Event fired");

    }

    }

    Listing 11-1.

    MainActivityObserver Class

    ```


    | ➊ | From the point of view of the `MainActivity` (it’s the one being observed),
    the only thing you need to do here is to add an observer object using the `addObserver()`
    method of the `LifeCycleOwner` interface. Yes, the `AppCompatActivity` implements
    `LifeCycleOwner`; that’s the reason you can call the `getLifecycle()` method within
    your activity. You simply need to pass an instance of an observer class (in your
    case, it’s the `MainActivityObserver`) to set up lifecycle awareness between an
    activity and a regular class. |


    ```

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

