    ## ViewModel


    The Android framework manages the lifecycle of UI controllers like activities
    and fragments; it may decide to destroy or recreate an activity (or fragment)
    in response to some user action like clicking the back button or a device event
    like rotating the screen. These configuration changes are out of your control.


    If the runtime decides to destroy the UI controller, any transient UI-related
    data that you’re currently storing in it will be lost. Let’s take the example
    of a simple app. Listings [11-4](#476822_1_En_11_Chapter.xhtml#PC4), [11-5](#476822_1_En_11_Chapter.xhtml#PC5),
    and [11-6](#476822_1_En_11_Chapter.xhtml#PC6) show a simple app that displays
    a random number every time the activity is created.


    Listing [11-4](#476822_1_En_11_Chapter.xhtml#PC4) shows the code for the random
    number generator. It only has the two methods, `getNumber()` and `createRandomNumber()`;
    each method leaves a log statement, so you’ll be able to see in the logs when
    and how many times they are called. The logic for the `getNumber()` method is
    simple: if the `minitialized` variable is false, that means you’re creating an
    instance of the `RandomNumber` class for the first time, so you’ll create the
    random number and then simply return it. Otherwise, you’ll return the current
    value of `minitialized`.


    ```

    import android.util.Log;

    import java.util.Random;

    public class RandomNumber  {

    private String TAG = getClass().getSimpleName();

    int mrandomnumber;

    boolean minitialized = false;

    String getNumber() {

    if(!minitialized) {

    createRandomNumber();

    }

    Log.i(TAG, "RETURN Random number");

    return mrandomnumber + "";

    }

    void createRandomNumber() {

    Log.i(TAG, "CREATE NEW Random number");

    Random random = new Random();

    mrandomnumber = random.nextInt(100);

    minitialized = true;

    }

    }

    Listing 11-4.

    RandomNumber Class

    ```


    Listing [11-5](#476822_1_En_11_Chapter.xhtml#PC5) shows the code for the `MainActivity`.
    Everything happens inside the `onCreate()` method. When `MainActivity` enters
    the *CREATED* state, you create an instance of the `RandomNumber` class, you call
    the `getNumber()` method, and you set the value of the `TextView` to the result
    of the `getNumber()` method.


    ```

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    RandomNumber data = new RandomNumber();

    ((TextView) findViewById(R.id.txtrandom)).setText(data.getNumber());

    }

    }

    Listing 11-5.

    MainActivity Class

    ```


    Listing [11-6](#476822_1_En_11_Chapter.xhtml#PC6) shows the layout code, in case
    you want to follow the code example.


    ```


    Listing 11-6.

    activity_main.xml

    ```


    When you run this code for the first time, you’ll see a random number displayed
    in the `TextView`—no surprises there. You’ll also see the log entries for `createNumber()`
    and `getNumber()` in the Logcat window—no surprises there either. Now, while the
    app is running on the emulator, try to change the orientation of the device. You’ll
    notice that every time the screen orientation changes, the displayed number in
    the `TextView` changes as well. Also, you’ll notice that additional logs for the
    `createNumber()` and `getNumber()` methods show up in Logcat. The reason for this
    is because the runtime destroys and recreates the `MainActivity` every time the
    screen orientation changes. Your `RandomNumber` object also gets destroyed and
    recreated along with the `MainActivity`; your UI data cannot survive orientation
    changes.


    This is a good case for using the ViewModel library so that the UI data can survive
    the destruction and recreation of the `Activity` class. You only need to do three
    things to implement ViewModel:


    1. Add the lifecycle extensions to your project’s dependencies, as you did earlier.
    Go back to Listing [11-3](#476822_1_En_11_Chapter.xhtml#PC3) for instructions.

    2. To make the `RandomGenerator` class a ViewModel, you extend the `ViewModel`
    class from the AndroidX lifecycle libraries.'
