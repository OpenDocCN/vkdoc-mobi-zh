  trans: '

    # 内存


    Memory（内存）性能分析器会实时显示应用消耗的内存量。图 7-7 展示了我在捕获一个测试应用的内存占用情况时所截取的内存视图快照。如图所示，该图表不仅显示应用正在消耗多少内存，还显示了内存的细分情况，例如代码、堆栈、图形、Java
    等分别使用了多少内存。


    ![../images/476822_1_En_7_Chapter/476822_1_En_7_Fig7_HTML.jpg](img/476822_1_En_7_Fig7_HTML.jpg)


    图 7-7. 内存视图


    你可以在内存视图中强制进行垃圾回收。看到顶部那个垃圾桶图标了吗？没错，如果你点击它，就会强制执行一次 GC（垃圾回收）。它右侧的按钮也很有用：那个带向下箭头的方框图标代表的是内存转储。点击它，Java
    堆就会被转储，然后你就可以检查它，如图 7-8 所示。


    ![../images/476822_1_En_7_Chapter/476822_1_En_7_Fig8_HTML.jpg](img/476822_1_En_7_Fig8_HTML.jpg)


    图 7-8. Java 堆


    堆是 Android 运行时为应用分配的一块保留的存储内存。当你转储堆时，你就有了检查对象实例属性的机会，如图 7-9 所示。


    ![../images/476822_1_En_7_Chapter/476822_1_En_7_Fig9_HTML.jpg](img/476822_1_En_7_Fig9_HTML.jpg)


    图 7-9. 实例视图，Reference 标签页


    Reference（引用）标签页在查找内存泄漏时非常有用，因为它显示了指向你正在检查的对象的所有引用。


    内存视图中另一个有用的工具是分配跟踪器，如图 7-10 所示。


    | ➊ | 点击内存图时间线上的任意位置即可查看分配跟踪器。这将显示在该时间点被分配和取消分配的所有对象的列表。|

    | ➋ | 这显示了在某个时间点应用正在使用的所有类的列表。 |

    | ➌ | 这显示了在特定时间点被分配和取消分配的所有对象的列表。 |

    | ➍ | 跟踪器甚至包含分配时的调用堆栈。 |


    ![../images/476822_1_En_7_Chapter/476822_1_En_7_Fig10_HTML.jpg](img/476822_1_En_7_Fig10_HTML.jpg)


    图 7-10. 分配跟踪器


    ## 网络


    与性能分析器中的其他视图一样，Network（网络）视图也显示实时数据。它可以让你查看和检查应用发送和接收的数据。它还显示总连接数。图 7-11 显示了网络性能分析器的快照。


    ![../images/476822_1_En_7_Chapter/476822_1_En_7_Fig11_HTML.jpg](img/476822_1_En_7_Fig11_HTML.jpg)


    图 7-11. 网络性能分析器


    每当你的应用向网络发出请求时，它都会使用 WiFi 无线电来发送和接收数据。无线电的能效并非最高；它非常耗电，如果你不注意应用如何进行网络请求，这肯定会比平时更快地耗尽设备电池。


    当你使用网络性能分析器时，一个好的开始方法是寻找网络活动的短时峰值。当你在时间线上看到突然升高又突然下降的尖锐峰值时，这通常意味着你可以通过批量处理网络请求来进行一些优化，以减少
    WiFi 无线电需要唤醒并发送或接收数据的次数。


    ## 能耗


    现在你可能已经了解了性能分析器的工作模式。它会实时显示数据。就 Energy（能耗）性能分析器而言，它显示的是应用消耗了多少能量的数据。虽然它实际上并不直接测量能耗，但能耗性能分析器会显示
    CPU、无线电和 GPS 传感器的能耗估算值。图 7-12 显示了能耗性能分析器的快照。


    ![../images/476822_1_En_7_Chapter/476822_1_En_7_Fig12_HTML.jpg](img/476822_1_En_7_Fig12_HTML.jpg)


    图 7-12. 能耗性能分析器


    你也可以使用能耗性能分析器来查找影响能耗的系统事件，例如唤醒锁、任务和闹钟。


    - 唤醒锁是一种机制，用于在设备本应进入休眠状态时保持屏幕开启。例如，当应用播放视频时，即使没有用户交互，它也可能使用唤醒锁来保持屏幕开启。使用唤醒锁本身不是问题，但忘记释放它才是问题；它会让
    CPU 保持运行的时间超过必要时间，这肯定会导致电池更快耗尽。


    - 闹钟可用于在特定时间间隔运行应用上下文之外的**后台任务**。当闹钟触发时，应用可以运行一些任务。如果它运行耗能的代码段，你肯定会在能耗性能分析器中看到它。


    - 任务可以在满足某些条件时执行操作，例如当网络可用时。你通常使用 `JobBuilder` 创建任务，并使用 `JobScheduler` 来安排执行。当任务启动时，你将能够在能耗性能分析器中看到它。


    以上是对 Android Studio 性能分析器的快速介绍。请务必查看 [`https://bit.ly/androidstudioprofiler`](https://bit.ly/androidstudioprofiler)
    上的官方文档。


    ## 本章小结


    - 旧的 Android Monitor 已不复存在。我们现在使用 Profiler（性能分析器）。


    - 性能分析器提供了一个统一视图，显示应用如何消耗内存、CPU、网络和电池资源。


    # 8. Gradle


    **本章内容涵盖：**


    - Android 构建过程


    - Gradle 文件


    - 依赖项


    - Android 支持库


    ## 构建过程


    构建一个 APK 或 bundle 需要许多涉及的步骤。图 8-1 大致说明了这个过程。


    ### 注意


    Bundle 是交付 Android 可执行文件的一种较新格式。我将在第 12 章中进一步讨论 bundle。


    一个应用是松散关联的 Java 源文件、XML 配置文件、XML 格式的 UI 定义等的组合。然后它进入编译阶段；有资源编译器和 Java 编译器。还有需要被考虑的库和其他依赖项。


    编译过程会产生一些中间文件，例如 DEX 可执行文件和其他编译后的资源。打包器会组合 DEX 可执行文件、编译后的资源和证书，最终生成一个 APK 或 bundle。


    ### 注意


    DEX 文件类似于 Java 类文件；它们是可执行文件，但旨在 Android 运行时中运行——它们与你桌面上的 Java 运行时不同。这是一种专为 Android
    设计的字节码运行时。


    ![../images/476822_1_En_8_Chapter/476822_1_En_8_Fig1_HTML.jpg](img/476822_1_En_8_Fig1_HTML.jpg)


    图 8-1. Android 构建过程


    Gradle 和 Android Studio 负责处理所有繁重的工作。如果你之前在 Java 开发中使用过 ANT 或 Maven，Gradle 与它们非常相似，区别在于它不是使用
    XML 语法，而是使用自己的 DSL（领域特定语言），该语言基于 Groovy 语言。

    '
- fmt: '# The Build Files


    Gradle relies on a couple of files. Figure [8-2](#476822_1_En_8_Chapter.xhtml#Fig2)
    points them out.


    | ➊ | `build.gradle` **(Project)**: This is it the root folder of the project.
    Some projects may have more than one module and it may be useful to define some
    properties that can be shared by all modules. This is the file where you do that.
    |

    | ➋ | `build.gradle` **(module: app)**: The module-level `build.gradle` file is
    located inside, well, a module. In this example, the module-level Gradle file
    is inside the `app` folder; the `app` module is a default module that Android
    Studio generates when you create a project. This is the file that you’re most
    likely to spend more time on, instead of the project-level Gradle file. |

    | ➌ | `gradle.properties`: You can configure project-wide Gradle settings in this
    file, such as the amount of memory to allocate for the Gradle daemon. I usually
    just leave this alone. |

    | ➍ | `settings.gradle`: This tells Gradle which module you to include in the
    build. If you’re working on just the one module (which is “app”), then you also
    can simply leave this file alone. |

    | ➎ | `local.properties`: This contains settings for your local environment, such
    as the location of the SDK, user credentials for Firebase, etc. |


    ![../images/476822_1_En_8_Chapter/476822_1_En_8_Fig2_HTML.png](images/476822_1_En_8_Chapter/476822_1_En_8_Fig2_HTML.png)


    Figure 8-2. Gradle files


    ## Module-Level Gradle File


    Since you’re most likely to interact with the module-level Gradle file, let’s
    get to know it better. Listing [8-1](#476822_1_En_8_Chapter.xhtml#PC1) shows an
    annotated example of a module-level `build.gradle` file.


    | ➊ | `compileSdkVersion`: Indicates what API level or what version of Android
    you are using to build your app. |

    | ➋ | `defaultConfig`: This block contains the default configuration for the module.
    Can you have more than one config? Yes, you can have more than one configuration
    for the app. This will happen when you have different behaviors targeting different
    platforms and so on. You could have a couple of build variants. But for now, let’s
    just work with the default config. |

    | ➌ | `applicationId`: This is the name your app will use in Google Play; it’s
    how the app will be known. |

    | ➍ | `minSdkVersion`: This will tell Google Play the minimum version of Android
    that the application supports. |

    | ➎ | `targetSdkVersion`: If Android ever changes the API, this setting tells
    the runtime that the app expects the API to behave the way it did at API level
    24. This way you have a consistent environment for your app. |

    | ➏ | `versionCode`: Identifies the app’s version. This is an incrementing integer.
    |

    | ➐ | `versionName`: This is the string representation of `versionCode`. This
    is the one that’s displayed in Google Play and the device’s settings. |


    ```

    apply plugin: ''com.android.application''

    android {

    compileSdkVersion 28 ➊

    defaultConfig {  ➋

    applicationId "net.workingdev.demoappbitbucket" ➌

    minSdkVersion 27 ➍

    targetSdkVersion 28 ➎

    versionCode 1  ➏

    versionName "1.0" ➐

    testInstrumentationRunner "android.support.test.runner.AndroidJUnitRunner"

    }

    ...

    Listing 8-1.

    build.gradle (Module)

    ```


    When you change anything in the Gradle file, Android Studio will prompt you to
    sync the file. A bar will be displayed on the top portion of the IDE telling you
    to “Sync now.” You may also sync Gradle files by clicking the Sync button on the
    toolbar, as shown in Figure [8-3](#476822_1_En_8_Chapter.xhtml#Fig3). Another
    way to do a sync is from the main menu bar: go to File ➤ Sync Project with Gradle
    Files.


    ![../images/476822_1_En_8_Chapter/476822_1_En_8_Fig3_HTML.jpg](images/476822_1_En_8_Chapter/476822_1_En_8_Fig3_HTML.jpg)


    Figure 8-3. Sync the project with the Gradle files


    If you don’t want to edit the Gradle file by hand, there are ways to effect the
    changes via the GUI. Go to the main menu bar and choose File ➤ Project Structure,
    then click the app section, as shown in Figure [8-4](#476822_1_En_8_Chapter.xhtml#Fig4).


    ![../images/476822_1_En_8_Chapter/476822_1_En_8_Fig4_HTML.jpg](images/476822_1_En_8_Chapter/476822_1_En_8_Fig4_HTML.jpg)


    Figure 8-4. Project structure


    If you explore the tabs of the Project Structure window, you’ll see that you can
    also edit the entries of Gradle file from there.


    ## Dependencies


    Most applications rarely stand alone; they rely on other code. Your apps may either
    rely on external binaries or another library that you’re building within the same
    project. Whatever the case, these dependencies have to be declared in the dependencies
    block of the Gradle file.


    In the dependencies block, you must list all the direct dependencies of your app;
    if those dependencies in turn have their own dependencies, Gradle will also fetch
    them for you. There are three kinds of dependencies of note:


    *   **Module dependency**: If you created a module in your app—other than the
    default app module—and you want it to serve as a library for your project, you
    can declare it as a module dependency.


    *   **Jar dependency**: When you want to use external libraries in your app, like
    `jdom.jar`, you simply drop the jar file into the `libs` folder of the project
    and declare it as a jar dependency. Remember that you can’t just use any jar file
    here; you can only use jars that are intended to be used as libraries. It’s best
    to always read the docs of a library before using it.


    *   **Library dependency**: This kind of dependency will pull things from a repository
    like a Maven repo or `jcenter`. A repository is simply a collection of binaries
    that are available for your use. You already have a repository on your local machine
    when you installed Android Studio and then pulled some additional software during
    installation. The Android Support repository is already locally available to you—so
    this repo doesn’t need to be declared in the Gradle file (the project-level Gradle
    file), but any repo other than this needs to be declared. You’ll notice that when
    you create a new project in Android Studio, the generated Gradle file already
    includes a reference to `jcenter` and `google`, which are massive Java and Android
    repositories. Listing [8-2](#476822_1_En_8_Chapter.xhtml#PC2) shows an excerpt
    from the project-level Gradle file; notice the repositories section both in the
    `buildscript` and `allprojects` blocks—they already contain references to `jcenter`
    and `google`. Of course, if you need to reference any repo outside `jcenter` and
    `google`, you can simply add it to the Gradle file.


    ```

    buildscript {

    repositories {

    google()

    jcenter()

    }

    dependencies {

    classpath ''com.android.tools.build:gradle:3.3.1''

    // NOTE: Do not place your application dependencies here; they belong

    // in the individual module build.gradle files

    }

    }

    allprojects {

    repositories {

    google()

    jcenter()

    }

    }

    ...

    Listing 8-2.

    build.gradle (Project Level)

    ```


    Notice that there’s a note in the project-level Gradle file to **NOT** place your
    application dependencies in that file, and to do it in the app module Gradle file
    instead. Anything you define in the project-level Gradle file affects all module-level
    Gradle files.


    In addition to understanding the dependency types, you also need to understand
    how to associate dependencies. There are at least three directives to consider:


    *   `implementation`: It means that this dependency will be applied to your build
    variants or all the different kinds of builds that you do.


    *   `testImplementation`: This is a testing-specific variant. In here, you declare
    the things you need for the JVM testing. It’s the kind of unit testing that only
    needs the JVM and not the full Android runtime.


    *   `androidTestImplementation`: In here you declare what libraries you need for
    the instrumented testing—the kind of testing that needs the full Android runtime.


    Listing [8-3](#476822_1_En_8_Chapter.xhtml#PC3) shows an annotated excerpt of
    the module-level `build.gradle` file.'
