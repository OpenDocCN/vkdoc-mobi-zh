  trans: '

    # 更新 Git 项目


    当项目处于源代码管理之下时，Android Studio 会在你每次创建新文件（无论是 Java 类、XML 文件、图片或其他文件）时给出额外提示。例如，如果你向项目中添加一个新的
    Java 类（在 Git 源代码管理下），你会看到一个类似图 9-14 所示的对话框。


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig14_HTML.jpg](img/476822_1_En_9_Fig14_HTML.jpg)


    图 9-14. 将文件添加到 Git


    如果你希望将该文件添加到 Git，当然要按下 `Yes`。如果不小心按了 `No`，你仍然可以通过两种方式添加新文件：


    1.  在项目工具窗口中选择要添加到 Git 的文件，然后从主菜单栏中选择 `VCS` ➤ `Git` ➤ `Add`。

    2.  也可以使用右键菜单，右键点击文件，然后选择 `Git` ➤ `Add`。


    添加文件并不会自动更新远程仓库。要实现这一点，你需要做两件事：*提交*你所做的更改，然后进行*推送*。为此，在项目工具窗口中选择整个项目，如图 9-15 所示，然后从主菜单栏中选择
    `VCS` ➤ `Git` ➤ `Commit Directory`。


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig15_HTML.jpg](img/476822_1_En_9_Fig15_HTML.jpg)


    图 9-15. `Git` ➤ `Commit directory`


    接下来，你会看到“提交更改”窗口，如图 9-16 所示。


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig16_HTML.jpg](img/476822_1_En_9_Fig16_HTML.jpg)


    图 9-16. 提交并推送更改


    点击 `Commit` 按钮上的下拉箭头，选择 `Commit and Push` 选项。现在，你的本地项目就与远程仓库完全同步了。


    # 使用其他 Git 仓库


    GitHub 是开发者中非常流行的仓库平台，因此它与 Android Studio 集成得很好也就不足为奇了。但如果你的队友或公司不使用 GitHub 呢？如果他们使用的是
    BitBucket 或其他 Git 仓库呢？别担心，你同样可以处理。在本节中，你将使用 BitBucket 仓库。


    与 GitHub 一样，使用 BitBucket 也需要一个账户。如果你还没有账户，请前往 [`https://bitbucket.org`](https://bitbucket.org)
    注册，然后登录。之后，创建一个新的仓库，如图 9-17 所示。


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig17_HTML.jpg](img/476822_1_En_9_Fig17_HTML.jpg)


    图 9-17. 创建仓库


    点击大加号并选择创建新仓库后，系统会要求你填写一些详细信息，如图 9-18 所示。别忘了点击 `Advanced Settings` 选项，以便看到所有字段。


    请注意以下几点：


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig18_HTML.jpg](img/476822_1_En_9_Fig18_HTML.jpg)


    图 9-18. 仓库详细信息


    -   **Repository name**：你的仓库在 BitBucket 上的名称。它不必与你本地计算机上存储的项目名称相同，但保持一致是个好主意。

    -   **Access level**：与 GitHub 不同，即使你不是付费会员，也可以在 BitBucket 中创建私有仓库。

    -   **Include a README**：在项目中包含 `README` 文件是一个好习惯，但这是可选的。

    -   **Version control**：选择 `Git`。

    -   **Description**：用一些词语最好地描述你的项目内容。

    -   **Language**：你正在开发一个 Android 项目，所以填写 `Android`。


    点击 `Create repository` 按钮后，你会看到仓库页面详情，如图 9-19 所示。点击 `Clone` 按钮。


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig19_HTML.jpg](img/476822_1_En_9_Fig19_HTML.jpg)


    图 9-19. 新建的 BitBucket 仓库


    在 `Clone this repository` 页面中，你可能会看到 `SSH` 而不是 `HTTPS`。点击下拉按钮切换到 `HTTPS`，如图 9-20
    所示。

    '
- fmt: '### Note


    You can use the SSH protocol as a means of cloning repos in BitBucket after you’ve
    provided your SSH keys to BitBucket. If you haven’t done that yet, just use HTTPS
    to clone the repo.


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig20_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig20_HTML.jpg)


    Figure 9-20. Remote address of repo


    The remote URL for your repo is the one that starts with `https://` and ends with
    `.git`. As pointed out in Figure 9-20, you don’t need the `git clone` part because
    that’s a command that is intended to be typed from a command line. You won’t be
    using the command line for Git, instead, you will use Android Studio’s facilities.


    Now that the remote repo is ready, you can either open an existing project that
    you’d like to share on BitBucket or create a new one; it’s up to you.


    Once you’ve chosen a project to share in BitBucket, do the following:


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig21_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig21_HTML.jpg)


    Figure 9-21. Enabling version control integration


    1. Open the project if it isn’t open yet.

    2. Enable version control on it, if it’s not yet under any source control. To
    do that, go to the main menu bar and choose VCS ➤ Enable Version Control Integration.

    3. Select Git for version control, as shown in Figure 9-21.


    The next thing to do is to associate this project with the remote repo; go to
    the main menu bar and choose VCS ➤ Git ➤ Remotes. You should see the Git Remotes
    screen, as shown in Figure 9-22.


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig22_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig22_HTML.jpg)


    Figure 9-22. Git remotes


    Click the plus sign shown in Figure 9-22. After that, the Define Remote screen
    appears, as shown in Figure 9-23.


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig23_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig23_HTML.jpg)


    Figure 9-23. Defining the remote


    Copy the repo’s remote URL (refer to Figure 9-20; I highlighted the remote URL
    repo in that figure). Paste it in the URL field of the Define Remote screen, as
    shown in Figure 9-23. You need to give your BitBucket username and password in
    the next screen, as shown in Figure 9-24.


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig24_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig24_HTML.jpg)


    Figure 9-24. Git login


    The next thing to do is to *pull* from the remote repo. This is a prudent thing
    to do especially if you generated README files while creating the repo in BitBucket
    because this prevents merge conflicts. You can do a pull from the main menu bar;
    go to VCS ➤ Git ➤ Pull. You’ll see the Pull Changes screen, as shown in Figure
    9-25. Click the refresh button (to the right of the Remote text field).


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig25_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig25_HTML.jpg)


    Figure 9-25. Pull changes


    In the Branches to merge field, choose the origin/master option and then click
    OK.


    Try to add some files to your new project. You’ll notice that when you add a new
    file to the project, say `DemoApp.java`, Android Studio prompts you if you want
    to add the new file to Git; see Figure 9-26.


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig26_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig26_HTML.jpg)


    Figure 9-26. Adding a file to Git


    You can save some time by checking the **Remember, don’t ask again** box. The
    next time you add a new file, Android Studio will automatically add it to Git.


    If you answered **No** to the prompt, you can still add files to Git by using
    the context menu on the new Java file. Select the new Java file from the Project
    Tool window, right-click, and go to Git ➤ Add. To be sure that all project files
    are added to Git, instead of selecting just the new file in the Project tool window,
    select the whole project instead.


    The next step is to commit your changes to Git—remember all these changes are
    still happening locally. For the changes to reflect in the remote BitBucket repo,
    you must push the changes.


    To commit the changes, go to the main menu bar and choose VCS ➤ Git ➤ Commit Directory.
    You’ll see the Commit Changes dialog, as shown in Figure 9-27. You saw this in
    the previous section; it’s the same as the one when you were using GitHub.


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig27_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig27_HTML.jpg)


    Figure 9-27. Committing changes


    Remember that only checked items will be committed to Git. So, pay attention to
    the change list. Write something descriptive in the Commit Message box and then
    click the Commit button.


    When you’ve made significant changes to the local repo and you want to reflect
    the changes back to the remote repo, you can do a *push*. To do that, go to the
    main menu bar and choose VCS ➤ Git ➤ Push. You’ll see the Push Commits screen,
    as shown in Figure 9-28.


    ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig28_HTML.jpg](images/476822_1_En_9_Chapter/476822_1_En_9_Fig28_HTML.jpg)


    Figure 9-28. Pushing commits


    Click Push to complete the operation.


    That should do it. Now you can clone a repo and restore it on your local directory.
    You can also add, commit, and push changes to a remote repo; you also now know
    how to get a local repo in sync with the remote one.


    ## Chapter Summary


    - The Git software isn’t included in Android Studio, so you must get it separately.
    You can get precompiled binaries and platform instructions from [`https://git-scm.com/download`](https://git-scm.com/download).

    - GitHub is very integrated into Android Studio. There’s only a few steps that
    you need to do in order to work with a remote GitHub repo.

    - You can work with other Git platforms like BitBucket by enabling the version
    control integration in a project and then defining the remote repo URL.


    # 10. Navigation


    *What this chapter covers:*


    - A review of navigation in Android

    - Navigation components'
