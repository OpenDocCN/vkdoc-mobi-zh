    I spelled SOLID in all caps because it’s also an acronym that stands for **S**ingle
    Responsibility, **O**pen-Closed Principle, **L**iskov Principle, **I**nterface
    Segregation, and **D**ependency Inversion Principle. These are principles of object-oriented
    design, which was popularized by Robert C. Martin.


    Android Studio has some nifty refactoring capabilities. It’s easy to get started:
