- fmt: '# Creating an Interface


    To create an interface, follow the same steps you took when you created a class.


    1. Using the context menu, right-click a project’s package to select it.

    2. Choose **New > Java class**.


    Figure [2-12](#476822_1_En_2_Chapter.xhtml#Fig12) shows the Create New Class dialog.
    Click the **Kind** drop-down, as shown, and choose the **Interface** option.


    ![../images/476822_1_En_2_Chapter/476822_1_En_2_Fig12_HTML.jpg](images/476822_1_En_2_Chapter/476822_1_En_2_Fig12_HTML.jpg)


    Figure 2-12. Creating a new interface


    # Override Methods


    Typing all the override method signatures by hand shouldn’t be a big deal, but
    Android Studio actually has some nifty features to help you out with those override
    signatures.


    Figure [2-13](#476822_1_En_2_Chapter.xhtml#Fig13) shows the `Sample.java` class
    you created earlier. The red squiggly lines mean the class has errors. Hovering
    your mouse on the red squiggly lines shows a balloon tip which contains some information
    about the error.


    ![../images/476822_1_En_2_Chapter/476822_1_En_2_Fig13_HTML.jpg](images/476822_1_En_2_Chapter/476822_1_En_2_Fig13_HTML.jpg)


    Figure 2-13. `Sample.java` with errors


    To solve the error, you have to override the `run()` method of the `Runnable`
    interface. You can use the Quick Fix feature of Android Studio to solve this issue.
    Press `ALT-Enter` (Linux or Windows) or `Option + Enter` (macOS) while the keyboard
    cursor is somewhere along the red squiggly lines, as shown in Figure [2-14](#476822_1_En_2_Chapter.xhtml#Fig14).


    ![../images/476822_1_En_2_Chapter/476822_1_En_2_Fig14_HTML.jpg](images/476822_1_En_2_Chapter/476822_1_En_2_Fig14_HTML.jpg)


    Figure 2-14. A quick fix


    Choose the **Implement methods** option. The **Select Methods to Implement** dialog,
    shown in Figure [2-15](#476822_1_En_2_Chapter.xhtml#Fig15), appears next.


    ![../images/476822_1_En_2_Chapter/476822_1_En_2_Fig15_HTML.jpg](images/476822_1_En_2_Chapter/476822_1_En_2_Fig15_HTML.jpg)


    Figure 2-15. Selecting methods to implement


    Select `run():void` and then click **OK**. Android Studio will generate the method
    signature for you.


    Android Studio’s Quick Fix feature isn’t only for overriding methods. You can
    use it whenever you see a red squiggly line or any other indication in the IDE
    that shows an error. The IDE is robust enough to figure out how to help you in
    most situations.


    Another way to generate code for overridden methods is to use Android Studio’s
    **Generate** feature. Figure [2-16](#476822_1_En_2_Chapter.xhtml#Fig16) shows
    how to go about this.


    ![../images/476822_1_En_2_Chapter/476822_1_En_2_Fig16_HTML.jpg](images/476822_1_En_2_Chapter/476822_1_En_2_Fig16_HTML.jpg)


    Figure 2-16. Overriding methods using the Generate feature


    The **Generate** feature is versatile. You can use it to generate quite a few
    things like getters/setters, constructors, new files, and new classes but for
    your purpose now, you’ll use it to generate methods to override. Figure [2-16](#476822_1_En_2_Chapter.xhtml#Fig16)
    shows the general flow of the code generation process, but let’s recap the steps
    anyway.


    1. Make sure that your editing cursor is inside the class. The **Generate** feature
    is context sensitive, so if the editing cursor is outside a class body, you won’t
    get the options shown in Figure [2-16](#476822_1_En_2_Chapter.xhtml#Fig16).

    2. Press `Alt + Insert` (if you’re on Windows or Linux) or `Cmd + N` (if you’re
    on macOS).

    3. Choose the **Override Methods** option.

    4. Choose the method to override.


    # Running a Project


    Android Studio has a couple of options for building and running a project; see
    Table [2-1](#476822_1_En_2_Chapter.xhtml#Tab1).


    Table 2-1. Keyboard Shortcuts for Building and Running a Project


    |  | Windows and Linux | macOS | Description |

    | --- | --- | --- | --- |

    | Build | `Ctrl + F9` | `Cmd + F9` | Runs the build process of Android Studio
    and produces an APK (Android Package) |

    | Build and Run | `Shift + F10` | `Ctrl + R` | Same as “Build” but it also pushes
    the APK into a connected device or a running emulator (AVD) |

    | Apply changes (with Instant Run) | `Ctrl + F10` | `Ctrl + Cmd + R` | Allows
    you to push code changes to a connected device or emulator without building a
    new APK. It’s faster than “Build and Run,” so use it whenever possible. |


    # Chapter Summary


    * Android Studio has more than one way to accomplish a task. You can use both
    the main menu bar and the context menu to create quite a few things like a new
    activity, class, or interface.

    * Keyboard shortcuts are much faster than using the main menu bar or the context
    menu, so it’s worth the time to memorize some of these shortcuts.

    * Android Studio’s **Generate** feature can do more than just generate override
    methods. You’ll explore its other capabilities in later chapters.

    * The Quick Fix in Android Studio is a versatile tool. Just click a red squiggly
    line, and press `Alt + Enter` (Windows or Linux) or `Option + Enter` (macOS).


