- fmt: '# Navigation Before Architecture Components


    In the early days of Android, if you had a non-trivial app, you almost certainly
    needed to partition your app across multiple activities. That meant you needed
    the skill to navigate from one activity to another, and back. So, in those days,
    you might have written something that looked like the code in Listing [10-1](#476822_1_En_10_Chapter.xhtml#PC1).


    ```

    class FirstActivity extends AppCompatActivity

    implements View.OnClickListener {

    public void onClick(View v) {

    Intent intent = new Intent(this, SecondActivity.class);

    startActivity(intent);

    }

    }

    // SecondActivity.java

    class SecondActivity extends AppCompatActivity { }

    ```


    Listing 10-1. How to Launch an Activity


    And if you needed to pass data from one activity to another, you might have coded
    it like the code snippet shown in Listing [10-2](#476822_1_En_10_Chapter.xhtml#PC2).


    ```

    Intent intent = new Intent(this, SecondActivity.class);

    Intent.putExtra("key", value);

    startActivity(intent);

    ```


    Listing 10-2. How to Pass Data to Another Activity


    This kind of screen management has the following advantages:


    ![../images/476822_1_En_10_Chapter/476822_1_En_10_Fig1_HTML.jpg](images/476822_1_En_10_Chapter/476822_1_En_10_Fig1_HTML.jpg)


    Figure 10-1. Simple activity workflow


    *   It’s simple to do. Just call the `startActivity()` method from any activity.

    *   The currently running activity can be closed programmatically by calling the
    `finish()` method. The user can also close the activity by pressing the back button.

    *   The back stack is completely managed by the Android runtime; see Figure [10-1](#476822_1_En_10_Chapter.xhtml#Fig1).


    But it’s not all good; activity navigation comes with some baggage. The disadvantages
    are:


    *   You don’t have a clear idea which activities are on the back stack because
    you don’t manage it. Here is an example of a trait being both an advantage and
    disadvantage at the same time.

    *   Each screen requires a new activity, which can be quite heavy on resources.

    *   Each activity needs to be declared on the Android manifest file, which Android
    Studio does for you automatically each time you create an activity using the wizards,
    so it’s not much of an issue.

    *   It will be difficult for you to use the more modern navigation patterns like
    the bottom navigation bar.


    Because of these limitations, another way of screen navigation emerged. In 2011,
    when Google released Android 4.0, we got to use *fragments*. If you’ve forgotten
    about fragments, think of them this way: an activity is basically a composition
    unit for the UI, and the fragment is an even smaller composition unit.


    A fragment, like an activity, is comprised of two parts: a Java or Kotlin program
    and a layout file. The idea is basically the same: define the UI in an XML file
    and then inflate the XML file during runtime so that all the UI in the XML file
    becomes actual Java objects.


    The idea is to create multiple fragments and contain them in a single activity.
    You generally hide or show a fragment depending on either a user action, the orientation
    of the device, or the form-factor of the device; and this is usually done with
    the `FragmentManager` and `FragmentTransaction` objects. If you’ve worked with
    fragments before, the code snippet shown in Listing [10-3](#476822_1_En_10_Chapter.xhtml#PC3)
    might be familiar.


    ```

    FragmentManager fm = getFragmentManager();

    FragmentTransaction ft = fm.beginTransaction();

    Fragment fragment = new FirstFragment();

    ft.add(R.id.fragment_container, fragment);

    ft.commit();

    ```


    Listing 10-3. Fragment Snippet


    When using fragments, you know exactly what’s in the navigation stack, unlike
    when you use activity navigation; however, as you can see in Listing [10-1](#476822_1_En_10_Chapter.xhtml#PC1),
    it can get cumbersome because you must manually manage the navigation stack.


    Thus far, you’ve only had two options for navigation: either you use activity-based
    navigation, which is easy and simple to use but you take a performance penalty
    and you don’t have control over the navigation stack, or you use fragments, which
    offer you full control of the navigation stack but the API is cumbersome and prone
    to error.


    Fast forward to 2017 when Google introduced the navigation components. Now you
    can use fragments but without the baggage of the complicated API. With navigation
    components, all the code in Listing [10-3](#476822_1_En_10_Chapter.xhtml#PC3)
    can now be replaced with a single line of code, shown in Listing [10-4](#476822_1_En_10_Chapter.xhtml#PC4).


    ```

    findNavController().navigate(destination);

    // FragmentManager fm = getFragmentManager();

    // FragmentTransaction ft = fm.beginTransaction();

    // Fragment fragment = new FirstFragment();

    // ft.add(R.id.fragment_container, fragment);

    // ft.commit();

    ```


    Listing 10-4. Navigation Component Snippet'
