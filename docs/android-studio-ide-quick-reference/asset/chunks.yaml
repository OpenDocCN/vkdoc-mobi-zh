    *   AppCompatActivity objects are now lifecycle owners. You can write another
    class and listen to the lifecycle changes of a lifecycle owner and then react
    accordingly. Fragments too are lifecycle owners—don’t forget to use AndroidX artifacts
    on your project when working with lifecycle-aware components.


    *   ViewModel makes your UI data resilient to the destruction and recreation of
    UI controllers (like activities and fragments).


    *   LiveData makes the relationship between your UI object and model data bidirectional.
    A change in one is automatically reflected in the other.


    *   Room is an ORM for SQLite. It’s a first-party solution and it’s part of the
    architecture components. There’s little reason why you shouldn’t use it.


    # 12. Release Builds


    *What this chapter covers:*


    *   Preparing for release


    *   Signing the app


    *   Google Play


    *   The app bundle


    You can distribute your app quite freely and without many restrictions. You can
    let your users download it from your website, Google Drive, Dropbox, and more;
    you may even email the app directly to users, if you wish. Many developers choose
    to distribute their app on a marketplace like Google or Amazon to maximize reach.
    Another reason to put your app on a trusted digital marketplace is, well, it’s
    trusted. When an app is not downloaded from a trusted source, the apps won’t be
    instantly usable because the user will get a notification that the app is not
    from a trusted source.


    In this chapter, I’ll discuss the things you need to do to get your app out in
    Google Play.


    ## Preparing the App for Release


    There are three things you need to keep in mind when preparing an app for release:


    1.  Prepare the material and assets for release.


    2.  Configure the app for release.


    3.  Build a release-ready app.'
  trans: "\n| ➊ | DAO 需要使用 `@Dao` 装饰器进行注解。 |\n| ➋ | DAO 必须编写为接口形式。 |\n| ➌ | 使用 `@Insert`\
    \ 装饰器来指示被装饰的方法将用于向表中插入记录。类似地，你可以分别使用 `@Update`、`@Query` 和 `@Delete` 装饰方法来执行更新、查询和删除操作。\
    \ |\n| ➍ | 使用 `@Query` 编写 SQL 查询语句。每个 `@Query` 会在编译时进行验证；如果查询有问题，会触发编译错误而非运行时错误。这应该能让你感到安心。\
    \ |\n\n```java\nimport java.util.List;\nimport androidx.room.Dao;\nimport androidx.room.Delete;\n\
    import androidx.room.Insert;\nimport androidx.room.Query;\nimport androidx.room.Update;\n\
    \n@Dao ➊\ninterface PersonDAO { ➋\n    @Insert ➌\n    void insertPerson(Person\
    \ person);\n    @Update\n    void updatePerson(Person person);\n    @Delete\n\
    \    void deletePerson(Person person);\n    @Query(\"SELECT ∗ FROM person\") ➍\n\
    \    public List listPeople();\n}\n```\n*列表 11-13. PersonDAO，数据访问对象*\n\n| ➊ |\
    \ 使用 `@Database` 来表明这个类是数据库持有者。使用 `entities` 参数指定数据库中的实体。如果你有多个实体，使用逗号分隔列表。第二个参数是\
    \ `version`，它是一个整数值，用于指定数据库的版本。 |\n| ➋ | `Database` 类是 *抽象* 的，并且继承自 `RoomDatabase`。\
    \ |\n| ➌ | 你需要提供一个抽象的方法，该方法将返回 DAO 对象的实例。 |\n| ➍ | 你需要提供一个静态方法来获取数据库的实例。它不一定是单例模式，就像我这里所做的，但我想你不会希望有多个\
    \ `Database` 类的实例。 |\n| ➎ | 使用 `databaseBuilder()` 方法来创建 `RoomDatabase` 的实例。builder\
    \ 方法有三个参数：1) 应用上下文，2) 被 `@Database` 注解的抽象类，以及 3) 数据库文件的名称。这是 SQLite 数据库的文件名。 |\n\
    \n```java\nimport android.content.Context;\nimport androidx.room.Database;\nimport\
    \ androidx.room.Room;\nimport androidx.room.RoomDatabase;\n\n@Database(entities\
    \ = {Person.class}, version = 1) ➊\npublic abstract class AppDatabase extends\
    \ RoomDatabase { ➋\n    private static AppDatabase minstance;\n    private static\
    \ final String DB_NAME = \"person_db\";\n    public abstract PersonDAO getPersonDAO();\
    \ ➌\n    public static synchronized AppDatabase getInstance(Context ctx) { ➍\n\
    \        if(minstance == null) {\n            minstance = Room.databaseBuilder(ctx.getApplicationContext(),\
    \ ➎\n                    AppDatabase.class,\n                    DB_NAME)\n  \
    \                  .fallbackToDestructiveMigration()\n                    .build();\n\
    \        }\n        return minstance;\n    }\n}\n```\n*列表 11-14. AppDatabase，数据库持有者*\n\
    \n现在你的所有 Room 组件都已就位，你可以从你的应用中使用它们了。列表 11-15 展示了如何从 Activity 中使用 Room 组件。\n\n\
    | ➊ | 要开始使用 `RoomDatabase`，请使用之前在 `AppDatabase` 中编写的工厂方法获取其实例。 |\n| ➋ | 让我们从 `TextViews`\
    \ 中收集数据。 |\n| ➌ | Room 遵循最佳实践，因此它不允许你在主 UI 线程上执行任何数据库查询。你需要创建一个后台线程，并在其中运行所有的\
    \ Room 命令。在这里，我使用了简单直接的 `Thread` 和 `Runnable` 对象，但你可以自由使用任何其他后台执行方式，比如 `AsyncTask`。\
    \ |\n| ➍ | 使用来自 `TextViews` 的输入创建一个 `Person` 对象。 |\n| ➎ | 获取 DAO 的实例。 |\n| ➏ |\
    \ 使用之前在 DAO 中编写的 `insertPerson()` 方法执行 *插入* 操作。 |\n| ➐ | 执行 `SELECT` 操作。 |\n|\
    \ ➑ | 列出 `person` 表中的所有条目。 |\n\n```java\npublic class MainActivity extends AppCompatActivity\
    \ {\n    private AppDatabase db;\n    @Override\n    protected void onCreate(Bundle\
    \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n       \
    \ setContentView(R.layout.activity_main);\n        Button btn = (Button) findViewById(R.id.button);\n\
    \        btn.setOnClickListener(new View.OnClickListener() {\n            @Override\n\
    \            public void onClick(View v) {\n                saveData();\n    \
    \            System.out.println(\"Clicked\");\n            }\n        });\n  \
    \      db = AppDatabase.getInstance(this); ➊\n    }\n    private void saveData()\
    \ {\n        final String mlastname = ((TextView) findViewById(R.id.txtlastname)).getText().toString();\n\
    \        final String mfirstname = ((TextView) findViewById(R.id.txtfirstname)).getText().toString();\
    \ ➋\n        new Thread(new Runnable() { ➌\n            @Override\n          \
    \  public void run() {\n                Person person = new Person(mlastname,\
    \ mfirstname); ➍\n                PersonDAO dao = db.getPersonDAO(); ➎\n     \
    \           dao.insertPerson(person); ➏\n                List people = dao.listPeople();\
    \ ➐\n                for(Person p:people) { ➑\n                    System.out.printf(\"\
    %s , %s\\n\", p.last_name, p.first_name );\n                }\n            }\n\
    \        }).start();\n    }\n}\n```\n*列表 11-15. MainActivity*\n\n在真实的应用中，你可能不会直接从\
    \ Activity 这样的 UI 控制器访问数据库。你可能会考虑引入一个 `ViewModel` 类；这样一来，UI 控制器的职责就严格限定于展示数据，而不是充当模型。\n\
    \n如果你将 Room 与 `ViewModel` 和 `LiveData` 结合使用，它可以提供更具响应性的 UI 体验。这里我没有详细展开，但这将是本章之后一个很好的练习课题。\n\
    \n## 章节总结\n\n*   `AppCompatActivity` 对象现在是生命周期所有者。你可以编写另一个类来监听生命周期所有者的生命周期变化，并据此做出响应。Fragment\
    \ 也是生命周期所有者——在使用生命周期感知组件时，别忘了在项目中使用 AndroidX 组件。\n\n*   `ViewModel` 使你的 UI 数据能够抵御\
    \ UI 控制器（如 Activity 和 Fragment）的销毁和重建。\n\n*   `LiveData` 使得你的 UI 对象和模型数据之间建立双向关系。一方的变化会自动反映在另一方中。\n\
    \n*   Room 是 SQLite 的 ORM 框架。它是第一方解决方案，并且是架构组件的一部分。几乎没有理由不使用它。\n\n# 12. 发布构建版本\n\
    \n*本章涵盖内容：*\n\n*   发布前的准备工作\n*   签署应用\n*   Google Play\n*   应用捆绑包\n\n你可以相当自由地分发你的应用，且没有太多限制。你可以让用户从你的网站、Google\
    \ Drive、Dropbox 等下载；如果你愿意，甚至可以通过电子邮件直接将应用发送给用户。许多开发者选择在 Google 或 Amazon 等应用市场上分发应用，以最大限度地扩大覆盖范围。将应用放在值得信赖的数字市场还有另一个原因：那就是信任问题。当应用不是从可信来源下载时，应用无法立即使用，因为用户会收到通知，提示该应用并非来自可信来源。\n\
    \n在本章中，我将讨论将应用发布到 Google Play 所需执行的操作。\n\n## 为发布准备应用\n\n在准备发布应用时，需要牢记三点：\n\n1.\
    \  准备用于发布的材料和资源。\n2.  配置应用以供发布。\n3.  构建一个可用于发布的应用。\n"
- fmt: '### Preparing the Material and Assets for Release


    Your code is great and you might even think it’s clever, but the user will never
    see it. What they will see are your View objects, the icons, and the other graphical
    assets. You should polish them.


    If you think the app’s icon isn’t a big deal, think again. The icon helps the
    users identify your app as it sits on the home screen. This icon also appears
    in other areas like the launcher window, the downloads section, and more importantly,
    it appears in the store where the app is published. The icon creates the first
    impression of your app. It’s a good idea to put some work into it. Start by reading
    Google’s guidelines for app icons at [`http://bit.ly/androidreleaseiconguidelines`](http://bit.ly/androidreleaseiconguidelines).
    While you’re at it, also visit [`https://romannurik.github.io/AndroidAssetStudio/`](https://romannurik.github.io/AndroidAssetStudio/);
    this resource will save you plenty of time when generating assets for your app.


    Other things to consider if you want to publish the app in Google’s marketplace
    are graphical assets like screen captures and the text for promotional copy. Make
    sure to read Google’s guideline for graphical assets, which can be found at [`http://bit.ly/androidreleasegraphicassets`](http://bit.ly/androidreleasegraphicassets).


    ### Configuring the App for Release


    1. **Check the package name**. The app may have started as an exercise or throw-away
    code, and then it grew and took on a life on its own. You may want to check the
    package name of the app. Make sure it isn’t still `com.example.myapp`. The package
    name makes the app unique across the Google marketplace, and once you decide on
    a package name, you can’t change it. So give it some thought. You already know
    how to change this; it’s covered in the Gradle chapter, remember?


    2. **Deal with the debug information**. Make sure that the `android:debuggable`
    attribute in the `<application>` tag of the Manifest is removed. You just need
    to check, really, because Android Studio would have removed this automatically
    when you change the mode to “release.”


    3. **Remove the log statements**. Different developers do this differently. Some
    painstakingly go through the code and remove the statements manually. Some write
    `sed` or `awk` programs to strip away the log statements. Some use ProGuard, and
    others use third-party tools like Timber to take care of logging activities. It’s
    up to you which you will use, but make sure that your users won’t accidentally
    see the log information. If you haven’t made up your mind yet, I really urge you
    to try Timber.


    4. **Check the application’s permissions**. During development, you may have experimented
    on some features of the application and you may have set permissions on the manifest
    like permission to use the network, write to external storage, etc. Review the
    `<uses-permission>` tag on the manifest and make sure that you don’t grant permissions
    that the application does not need.


    5. **Check remote servers and URLs**. If your application relies on web APIs or
    cloud services, make sure that the release build of the app is using production
    URLs and not test paths. You may have been given sandboxes and test URLs during
    development; you need to switch them up to the production version.


    ### Building a Release-Ready Application


    During development, Android Studio did the following things for you:


    1. Created a debug certificate

    2. Assembled all your project’s assets, config files, and runtime binaries into
    an APK

    3. Signed the APK using a debug certificate

    4. Deployed the APK to an emulator or a connected device


    All these things happened in the background; you didn’t have to do anything else
    but write your code. Now you need to take care of that certificate. Google Play
    and other similar marketplaces won’t distribute an app that’s signed with a debug
    certificate. It needs to be a proper certificate. You don’t need to go a certificate
    authority like Thawte or Verisign; a self-signed certificate will suffice.


    In the next steps, I’ll walk you through how to generate a signed bundle or APK.
    You already know what an APK is—it’s the package that contains your application.
    It’s what you upload to Google Play. A bundle, on the other hand, is a lot like
    an APK but it’s a newer upload format. Like the APK, it also includes all your
    app’s compiled code and resources, but it defers the APK generation. It’s Google
    Play’s new app serving model called Dynamic Delivery. It uses your app bundle
    to generate and serve an optimized APK for each user’s device configuration—so
    they download only the code and resources that they need to run your app. You
    don’t have to build, sign, and manage multiple APKs anymore.


    In Android Studio, the steps to generate an APK and a bundle are almost identical.
    In the following steps, you’ll see how to generate both the bundle and an APK.


    Launch Android Studio, if it isn’t open yet. Open the project and from the main
    menu bar, go to **Build ➤ Generate Signed Bundle/APK**, as shown in Figure [12-1](#476822_1_En_12_Chapter.xhtml#Fig1).


    ![../images/476822_1_En_12_Chapter/476822_1_En_12_Fig1_HTML.jpg](images/476822_1_En_12_Chapter/476822_1_En_12_Fig1_HTML.jpg)


    Figure 12-1. Generating a signed APK


    Choose either Bundle or APK, and then click Next. In this example, I chose to
    create a bundle. When you click Next, you will see the Key Store dialog, as shown
    in Figure [12-2](#476822_1_En_12_Chapter.xhtml#Fig2).


    ![../images/476822_1_En_12_Chapter/476822_1_En_12_Fig2_HTML.jpg](images/476822_1_En_12_Chapter/476822_1_En_12_Fig2_HTML.jpg)


    Figure 12-2. Key store dialog


    The **Key store path** field is asking for the location of your Java Key Store
    (JKS) file. At this point, you don’t have it yet. So, click the **Create new**
    button. You’ll see the dialog window for creating a new key store, as shown in
    Figure [12-3](#476822_1_En_12_Chapter.xhtml#Fig3).


    ![../images/476822_1_En_12_Chapter/476822_1_En_12_Fig3_HTML.jpg](images/476822_1_En_12_Chapter/476822_1_En_12_Fig3_HTML.jpg)


    Figure 12-3. New key store


    Table [12-1](#476822_1_En_12_Chapter.xhtml#Tab1) shows the description for the
    input items of the key store.


    Table 12-1. Key store Items and Description


    | Key store items | Description |

    | --- | --- |

    | Key store path | The location where you want to keep the key store. This is
    entirely up to you. Just make sure you remember this location. |

    | Password | This is the password for the key store. Don’t lose it. Make sure
    you remember this one. Otherwise, you’ll need to create another key store file.
    |

    | Alias | This alias identifies the key. It’s just a friendly name for it. |

    | (Key) Password | This is the password for the key. This is **NOT** the same
    password as the key store’s (but you can use the same password if you like). |

    | Validity, in years | The default is 25 years; you can just accept the default.
    If you publish on Google Play, the certificate must be valid until October of
    2033, so 25 years should be fine |

    | Other information | Only the first and last name fields are required. |


    When you’re done filling up the New Key Store dialog, click OK. This will bring
    you back to the Generate Signed APK window, as shown in Figure [12-4](#476822_1_En_12_Chapter.xhtml#Fig4),
    but now the JKS file is created and the Key Store dialog is populated with it.'
