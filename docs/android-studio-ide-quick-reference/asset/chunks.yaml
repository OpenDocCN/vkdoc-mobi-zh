    *For Adrianne and Stephanie.*


    Introduction


    Welcome to *Android Studio IDE Quick Reference* . I wrote this book to serve as
    a handy reference to the notable capabilities of Android Studio.


    This book is comprised of 13 short chapters. Each chapter breezes through some
    features of Android Studio. While the book is focused on the IDE, many chapters
    actually deal with Android programming as well, so you’re going to see some code
    samples.


    ## Who This Book Is For


    This book is for the experienced programmer who needs a quick reference on how
    to do some common tasks in Android Studio IDE. The code examples are in Java,
    so it’s for those devs who build Android apps in Java. This book might also work
    for someone new to Android Studio but not new in Android development—such as an
    Eclipse user who wants to try out Android Studio.


    ## Source Code


    Source code for this book can be downloaded by clicking the Download Source Code
    button located at [`www.apress.com/us/book/9781484249529`](http://www.apress.com/us/book/9781484249529)
    .


    Acknowledgments


    To Stephanie and Adrianne, my thanks and my love.


    ### About the Author and About the Technical Reviewers


    ### About the Author


    ### About the Technical Reviewers


    # 1. Setup


    *What this chapter covers:*


    *   Installing Android Studio


    *   Setting up the IDE


    *   Basic configuration


    Developing applications for Android was not always as convenient as it is today.
    When Android 1.0 was released in 2008, what developers got by way of a development
    kit was little more than a handful of command line tools and Ant build scripts.
    Building apps with Vim, Ant, and other command line tools wasn’t so bad if you’re
    used to that kind of thing, but many developers were not used to it. The lack
    of IDE capabilities like code hinting, project setups, and integrated debugging
    was somewhat of a barrier to entry.


    Thankfully, Android Development Tools (ADT) for the Eclipse IDE were released,
    also in 2008\. Eclipse was, and still is, a favorite and the IDE of choice for
    many Java developers. It was natural that it would also be the go-to IDE for Android
    developers.


    From 2009 to 2012, Eclipse remained the preferred IDE for Android development.
    The Android SDK has undergone both major and incremental changes in structure
    and in scope. In 2009, the SDK manager was released; it was used to download tools,
    individual SDK versions, and Android images for use with the emulator. In 2010,
    additional images were released for the ARM processor and x86 CPUs.


    2012 was a big year because Eclipse and the ADT were finally bundled. Until that
    time, developers had to install Eclipse and ADT separately, and the installation
    process wasn’t always smooth. So the bundling of the two made it a whole lot easier
    to get started with Android development. 2012 also marked the last year of Eclipse
    being the dominant IDE for Android.


    In 2013, Android Studio (AS) was released. To be sure, it was still beta, but
    the writing on the wall was clear: it would be the official IDE for Android development.
    Android Studio is based on JetBrains’s IntelliJ. IntelliJ is a commercial Java
    IDE that also has a community (non-paid) version. This version serves as the base
    for Android Studio.


    ## Setting Up Android Studio


    Android Studio’s version at the time of writing is 3.2.1; hopefully the version
    won’t be very different by the time you read this book. You can download it from
    [`https://developer.android.com/studio`](https://developer.android.com/studio)
    . It’s available for Windows (both 32- and 64-bit), macOS, and Linux. I ran the
    installation instructions on macOS (Mojave), Windows 10 64-bit, and Ubuntu 18\.
    I work primarily in a macOS environment, which explains why most of the screen
    grabs for this book looks like macOS. Android Studio looks, runs, and feels (mostly)
    the same on all three platforms, with very minor differences like key bindings
    and the main menu bar in macOS.


    Before we go further, let’s look at the system requirements for Android Studio.
    At a minimum, you’ll need the following:


    *   Microsoft Windows 7/8/10 (32 or 64-bit) or


    *   macOS 10.10 (Yosemite or higher) or


    *   Linux (Gnome or KDE Desktop), Ubuntu 14.04 or higher (64-bit but capable of
    running 32-bit applications)


    *   GNU C Library (glibc 2.19 or later) if you’re on Linux


    For hardware, your workstation needs to have at least


    *   3GB RAM (8GB or more recommended)


    *   2GB of available HDD space


    *   1280 x 800 minimum screen resolution


    This list came from the official Android website ( [`developer.android.com/studio`](https://developer.android.com/studio)
    ) and, of course, more is better. If you can snag 16GB RAM, 512GB SSD (or bigger),
    and a full HD (or UHD) monitor, that wouldn’t be bad—not at all.


    And now we get to the JDK (Java Development Kit) requirement. Starting with Android
    Studio 2.2, the installer comes with OpenJDK embedded. This way, a beginner programmer
    won’t have to bother with the installation of a separate JDK, but you can still
    install a separate JDK if that’s your preference. In this book, I’ll assume that
    you will use the embedded OpenJDK that comes with Android Studio.


    Download the installer from [`https://developer.android.com/studio/`](https://developer.android.com/studio/)
    and get the proper binary file for your platform.


    If you’re in macOS, do the following:


    1.  Unpack the installer zipped file.


    2.  Drag the application file into the `Applications` folder.


    3.  Launch Android Studio.


    4.  Android Studio will prompt you to import some settings if you have a previous
    installation. You can import that—it’s the default option.'
