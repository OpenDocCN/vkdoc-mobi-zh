    Cool, right?! If you’re still not sold on using LiveData, here are a couple of
    things to consider. When you use LiveData,


    *   You’re sure the UI **always matches the data state**. You’ve already seen
    this from the example. LiveData follows the Observer pattern, so it notifies the
    observer when its value changes.


    *   There are **no memory leaks**. Observers are bound to lifecycle objects. If,
    for example, your `MainActivity` enters the paused state (for whatever reason,
    like maybe another activity is on the foreground), the LiveData won’t be observed.
    If the `MainActivity` is destroyed, the LiveData again won’t be observed, and
    it will clean up after itself—which also means you won’t need to manually handle
    the lifecycles of `MainActivity` and the ViewModel.


    ## Room


    If you want to include database functionalities in your app, you might want to
    look at Room. Before Room, the two popular ways to build database apps were to
    either to use Realm or just use good ole SQLite. Dealing with SQLite was considered
    to be a bit low-level; it felt too close to the metal and as such was a bit cumbersome
    to use. Realm was quite popular among developers but no matter the popularity,
    it wasn’t a first-party solution. Thankfully, we now have Room.


    Room is an abstraction on top of SQLite. If you’ve used an ORM before, like Hibernate,
    it’s similar to that. Room has several advantages over using plain vanilla SQLite.
    With Room,


    *   You don’t have to deal with raw queries for basic database operations.


    *   At compile time, it verifies the SQL queries, so you don’t need to worry about
    SQL injection—remember that?


    *   There is no impedance mismatch between your database objects and Java objects.
    Room takes care of it, so you only need to deal with Java objects.


    Room has three major components: `Entity, Dao, and Database`. Their relationship
    with the application is shown in Figure [11-4](#476822_1_En_11_Chapter.xhtml#Fig4).


    ![../images/476822_1_En_11_Chapter/476822_1_En_11_Fig4_HTML.jpg](images/476822_1_En_11_Chapter/476822_1_En_11_Fig4_HTML.jpg)


    Figure 11-4.


    Room components


    *   **Entity**: An Entity is used to represent a database table. You code it as
    a class that’s decorated by the `@Entity` annotation.


    *   **The Dao** (Data Access Object) is a class that contains the method to access
    the tables in the database. This is where you code your CRUD (create, read, update,
    and delete) operations. This is an *interface* that’s decorated by the `@Dao`
    annotation.


    *   **Database**: This component holds a reference to the database. It’s an abstract
    class that is annotated by the `@Database` annotation.


    Before you can use Room in a project, you need to add its dependencies to the
    `build.gradle` file (module level), as shown in Listing [11-11](#476822_1_En_11_Chapter.xhtml#PC11).


    ```

    dependencies {

    def room_version = "2.1.0-alpha07"

    implementation "androidx.room:room-runtime:$room_version"

    annotationProcessor "androidx.room:room-compiler:$room_version"

    . . .

    }

    Listing 11-11.

    Room Dependencies

    ```


