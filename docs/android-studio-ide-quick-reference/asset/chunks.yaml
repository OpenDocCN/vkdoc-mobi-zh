- fmt: '# Memory


    The Memory profiler shows, in real time, how much memory your app is consuming.
    Figure [7-7](#476822_1_En_7_Chapter.xhtml#Fig7) shows a snapshot of the memory
    view as I captured the memory footprint of a test app. As you can see, not only
    does the graph show how much memory your app is gulping, it also shows the breakdown,
    such as how much memory is used by the code, stack, graphics, Java, and so on.


    ![../images/476822_1_En_7_Chapter/476822_1_En_7_Fig7_HTML.jpg](images/476822_1_En_7_Chapter/476822_1_En_7_Fig7_HTML.jpg)


    Figure 7-7. Memory view


    You can force garbage collection in the Memory view. See that garbage can icon
    at the top? Yup, if you click that, it’ll force a GC. The button to its right
    is also useful: the icon with a down-pointing arrow inside a box is a memory dump.
    If you click it, the Java heap will be dumped, and then you can inspect it, as
    shown in Figure [7-8](#476822_1_En_7_Chapter.xhtml#Fig8).


    ![../images/476822_1_En_7_Chapter/476822_1_En_7_Fig8_HTML.jpg](images/476822_1_En_7_Chapter/476822_1_En_7_Fig8_HTML.jpg)


    Figure 7-8. Java heap


    The heap is a preserved amount of storage memory that the Android runtime allocates
    for the app. When you dump the heap, it gives you a chance to examine instance
    properties of objects, as shown in Figure [7-9](#476822_1_En_7_Chapter.xhtml#Fig9).


    ![../images/476822_1_En_7_Chapter/476822_1_En_7_Fig9_HTML.jpg](images/476822_1_En_7_Chapter/476822_1_En_7_Fig9_HTML.jpg)


    Figure 7-9. Instance view, Reference tab


    The Reference tab can be very useful in finding memory leaks because it shows
    all the references pointing to object you’re examining.


    Another useful tool in the memory view is the Allocation tracker, shown in Figure
    [7-10](#476822_1_En_7_Chapter.xhtml#Fig10).


    | ➊ | Click anywhere in the timeline of the memory graph to view the allocation
    tracker. This will show you a list of all objects that were allocated and de-allocated
    at that point in time. |

    | ➋ | This shows a list of all classes being used by the app at a point in time.
    |

    | ➌ | This shows the list of all those objects allocated and de-allocated at a
    specific point in time. |

    | ➍ | The tracker even includes the call-stack of the allocation. |


    ![../images/476822_1_En_7_Chapter/476822_1_En_7_Fig10_HTML.jpg](images/476822_1_En_7_Chapter/476822_1_En_7_Fig10_HTML.jpg)


    Figure 7-10. Allocation tracker


    ## Network


    Like the other views in the Profiler, the Network view also shows real-time data.
    It lets you see and inspect data that is sent and received by your app. It also
    shows the total number of connections. Figure [7-11](#476822_1_En_7_Chapter.xhtml#Fig11)
    shows a snapshot of the Network profiler.


    ![../images/476822_1_En_7_Chapter/476822_1_En_7_Fig11_HTML.jpg](images/476822_1_En_7_Chapter/476822_1_En_7_Fig11_HTML.jpg)


    Figure 7-11. Network profiler


    Every time your app makes a request to the network, it uses the WiFi radio to
    send and receive data. The radio isn’t the most energy efficient; it’s power-hungry,
    and if you don’t pay attention to how your app makes network requests, that’s
    a sure way to drain the device battery faster than usual.


    When you use the Network profiler, a good way to start is to look for short spikes
    of network activity. When you see sharp spikes that rise and fall abruptly and
    are scattered all over the timeline, that smells like you could use some optimization
    by batching your network requests so as to reduce the number of times the WiFi
    radio needs to wake up and send or receive data.


    ## Energy


    By now you’re probably seeing a pattern of how the Profiler works. It shows you
    real-time data. In the case of the Energy profiler, it shows data on how much
    energy your app is guzzling. Though it doesn’t really show the direct measure
    of energy consumption, the Energy profiler shows an estimation of the energy consumption
    of the CPU, the radio, and the GPS sensor. Figure [7-12](#476822_1_En_7_Chapter.xhtml#Fig12)
    shows a snapshot of the Energy profiler.


    ![../images/476822_1_En_7_Chapter/476822_1_En_7_Fig12_HTML.jpg](images/476822_1_En_7_Chapter/476822_1_En_7_Fig12_HTML.jpg)


    Figure 7-12. Energy profiler


    You can also use the Energy profiler to find system events that affect energy
    consumption, such as wake locks, jobs, and alarms.


    - A wake lock is a mechanism for keeping the screen on when the device would otherwise
    go to sleep. For example, when an app plays a video, it may use a wake lock to
    keep the screen on even when there’s no user interaction. Using a wake lock isn’t
    a problem, but forgetting to release one is; it keeps the CPU on longer than necessary,
    which will surely drain the battery faster.


    - Alarms can be used to run background tasks that are outside your application’s
    context at specific intervals. When an alarm goes off, the app can run some tasks.
    If it runs an energy-intensive piece of code, you’ll definitely see it in the
    Energy profiler.


    - A job can perform actions when certain conditions are met, such as when the
    network becomes available. You would usually create a job with `JobBuilder` and
    use `JobScheduler` to schedule the execution. When a job kicks in, you will be
    able to see it in the Energy profiler.


    That was a quick tour of the Android Studio Profiler. Make sure you check out
    the official documentation at [`https://bit.ly/androidstudioprofiler`](https://bit.ly/androidstudioprofiler).


    ## Chapter Summary


    - The old Android Monitor is gone. We use the Profiler now.


    - The Profiler shows a unified view of how your app consumes memory, CPU, network,
    and battery resources.


    # 8. Gradle


    **What this chapter covers:**


    - The Android build process


    - Gradle files


    - Dependencies


    - The Android Support Library


    ## The Build Process


    Building an APK or a bundle requires many involved steps. Figure [8-1](#476822_1_En_8_Chapter.xhtml#Fig1)
    roughly illustrates the process.


    ### Note


    A bundle is a newer format for delivering Android executables. I’ll talk about
    bundles a bit more in Chapter [12](#476822_1_En_12_Chapter.xhtml).


    An app is a combination of loosely related Java source files, XML configuration
    files, UI definitions in XML, and more. Then it goes through compilation; there
    are resource compilers and the Java compiler. There are also libraries and other
    dependencies that need to be considered.


    The compilation process produces some intermediate files like DEX executables
    and other compiled resources. A packager combines DEX executables, compiled resources,
    and certificates, and eventually produces either an APK or a bundle.


    ### Note


    A DEX file is similar to a Java class file; they are executables but they’re intended
    to run in Android’s runtime—they’re not the same as the Java runtime you have
    on your desktop. It’s a byte-code runtime that’s specifically designed for Android.


    ![../images/476822_1_En_8_Chapter/476822_1_En_8_Fig1_HTML.jpg](images/476822_1_En_8_Chapter/476822_1_En_8_Fig1_HTML.jpg)


    Figure 8-1. Android build process


    Gradle and Android Studio take care of all the heavy lifting. If you’ve used ANT
    or Maven in your Java development before, Gradle is a lot like that, except instead
    of using XML for the syntax, it uses its own DSL (domain-specific language), which
    is based on the Groovy language.'
