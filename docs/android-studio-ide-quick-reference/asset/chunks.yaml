- fmt: '# Creating a Project


    To create an Android app, you need to create a project. A project is simply a
    folder that holds all the things you need to build an app: the Java program files,
    images, XML resources, and so on. You can create a project from the opening screen
    of Android Studio (when there aren’t any projects open yet), as shown in Figure
    [2-1](#476822_1_En_2_Chapter.xhtml#Fig1), or from the main menu bar (when another
    project is currently open), as shown in Figure [2-2](#476822_1_En_2_Chapter.xhtml#Fig2).


    ![../images/476822_1_En_2_Chapter/476822_1_En_2_Fig2_HTML.jpg](images/476822_1_En_2_Chapter/476822_1_En_2_Fig2_HTML.jpg)


    Figure 2-2. Creating a project from the main menu bar


    ![../images/476822_1_En_2_Chapter/476822_1_En_2_Fig1_HTML.jpg](images/476822_1_En_2_Chapter/476822_1_En_2_Fig1_HTML.jpg)


    Figure 2-1. Creating a project from the opening screen


    If it’s your first time using Android Studio and the very first time you are creating
    a project, you’ll probably do it from the opening screen, as shown in Figure [2-1](#476822_1_En_2_Chapter.xhtml#Fig1).


    If you have an existing project open in the IDE, and you’d like to start another
    one, you can do so from the main menu bar via `File` ➤ `New` ➤ `Project`, as shown
    in Figure [2-2](#476822_1_En_2_Chapter.xhtml#Fig2).


    No matter how you start the project, you’ll see the next screen, shown in Figure
    [2-3](#476822_1_En_2_Chapter.xhtml#Fig3), where you can fill in some details about
    the project.


    ![../images/476822_1_En_2_Chapter/476822_1_En_2_Fig3_HTML.jpg](images/476822_1_En_2_Chapter/476822_1_En_2_Fig3_HTML.jpg)


    Figure 2-3. Details of the new project


    Details like application name, company domain, and the actual location of the
    project will be on this screen. I left the C++ and Kotlin support boxes unchecked
    because you won’t need them in this project. If you intend to mix Java code with
    C or C++ (NDK, or Native Development Kit), you need to check the C++ box; otherwise,
    leave it alone, like I did. If you would like to use Kotlin instead of Java for
    development, you need to check the Kotlin box; otherwise, leave it unchecked,
    as I did.


    The next screen, shown in Figure [2-4](#476822_1_En_2_Chapter.xhtml#Fig4), lets
    you configure the project some more.


    ![../images/476822_1_En_2_Chapter/476822_1_En_2_Fig4_HTML.jpg](images/476822_1_En_2_Chapter/476822_1_En_2_Fig4_HTML.jpg)


    Figure 2-4. The SDK and form factor


    On this screen, you get to configure the project for Android watch (wear OS),
    TV, or IoT (Internet of Things). I’m assuming that most beginner Android developers,
    like the probable readers of this book, will want to start with an app that runs
    on a phone or tablet, so only the `"Phone and Tablet"` box is checked.


    In the next screen, shown in Figure [2-5](#476822_1_En_2_Chapter.xhtml#Fig5),
    you decide if you want the wizard to generate an activity. There are a couple
    of choices for the activity, like basic, bottom navigation, and so on. Most Android
    applications will include at least one activity. You can choose the empty activity.


    ![../images/476822_1_En_2_Chapter/476822_1_En_2_Fig5_HTML.jpg](images/476822_1_En_2_Chapter/476822_1_En_2_Fig5_HTML.jpg)


    Figure 2-5. The activity options


    Now you come to the final screen of the wizard, shown in Figure [2-6](#476822_1_En_2_Chapter.xhtml#Fig6),
    where you get to decide on the name of the activity and the name of the XML layout
    for the activity. Check the `AppCompat` checkbox so you can use modern Android
    features even if the app will run on older Android versions.


    ![../images/476822_1_En_2_Chapter/476822_1_En_2_Fig6_HTML.jpg](images/476822_1_En_2_Chapter/476822_1_En_2_Fig6_HTML.jpg)


    Figure 2-6. The activity name


    Click the `Finish` button and the IDE will start to generate and scaffold an Android
    project with one empty activity. Figure [2-7](#476822_1_En_2_Chapter.xhtml#Fig7)
    shows the `MyApplication` project open in the IDE.


    ![../images/476822_1_En_2_Chapter/476822_1_En_2_Fig7_HTML.jpg](images/476822_1_En_2_Chapter/476822_1_En_2_Fig7_HTML.jpg)


    Figure 2-7. The `MyApplication` open in the IDE


    A simple app that shows a screen to the user requires at least three things:


    *   An **Activity** class that acts as the main program file

    *   A **layout file** that contains all the UI definitions (in XML)

    *   A **manifest file** that ties all the project’s contents together (also in
    XML)


    The project creation wizard took care of all of these things.


    ## Creating an Activity


    An activity is largely responsible for what a user sees on the screen. The `Activity`
    class, together with an XML layout file, is what makes up the UI. Some apps only
    have one activity and some apps have more. If you need to add another activity
    to the project, you can do so on the main menu bar via `File` ➤ `New` ➤ `Activity`
    ➤ `Empty Activity`. Alternatively, you can also create an activity using the context
    menu shown in Figure [2-8](#476822_1_En_2_Chapter.xhtml#Fig8).


    ![../images/476822_1_En_2_Chapter/476822_1_En_2_Fig8_HTML.jpg](images/476822_1_En_2_Chapter/476822_1_En_2_Fig8_HTML.jpg)


    Figure 2-8. Creating a new activity


    To use the context menu, right-click the `app` folder (in the project tool window),
    as shown in Figure [2-8](#476822_1_En_2_Chapter.xhtml#Fig8), and then go to `New`
    ➤ `Activity` ➤ `Empty Activity`. Whichever method you use to add another activity,
    you’ll get to a dialog screen (shown in Figure [2-9](#476822_1_En_2_Chapter.xhtml#Fig9))
    where you can fill in some details about the new activity.


    ![../images/476822_1_En_2_Chapter/476822_1_En_2_Fig9_HTML.jpg](images/476822_1_En_2_Chapter/476822_1_En_2_Fig9_HTML.jpg)


    Figure 2-9. New Android activity


    Most of these fields should be familiar to you because you filled them up during
    the project creation process. The only checkbox that may be a bit mysterious is
    the `Launcher Activity` checkbox. As you can see from Figure [2-9](#476822_1_En_2_Chapter.xhtml#Fig9),
    it’s unchecked, and you should leave it that way. If you check the `Launcher Activity`
    box, you’re telling Android Studio to replace the launcher activity (the first
    activity you created during the project creation) with this new activity; that’s
    not what you’d like to do, so leave the box unchecked.


    ### Note


    A launcher activity is the activity that is first shown to the user after an app
    has been launched. The configuration of the launcher activity is found in `ActivityMain.XML`.


    ## Creating a Class


    To create a new class, it’s best to select the project’s package from the Project
    Tool window, as shown in Figure [2-10](#476822_1_En_2_Chapter.xhtml#Fig10). From
    there, you can either use the context menu (right-click) ➤ `New` ➤ `Java class`.
    Alternatively, you can also use the main menu bar via `File` ➤ `New` ➤ `Java class`.


    ![../images/476822_1_En_2_Chapter/476822_1_En_2_Fig10_HTML.jpg](images/476822_1_En_2_Chapter/476822_1_En_2_Fig10_HTML.jpg)


    Figure 2-10. Using the context menu to create a new class


    In the next screen, shown in Figure [2-11](#476822_1_En_2_Chapter.xhtml#Fig11),
    you get to fill in some details for the new class.


    ![../images/476822_1_En_2_Chapter/476822_1_En_2_Fig11_HTML.jpg](images/476822_1_En_2_Chapter/476822_1_En_2_Fig11_HTML.jpg)


    Figure 2-11. The `Create New Class` dialog


    The `Package` section of the dialog window is already prepopulated with the correct
    package name because you selected the project’s package (in the Project Tool window)
    before creating the class. If you hadn’t selected the project’s package, the `Package`
    field would be empty. It’s not a big deal to type the package name yourself, but
    it’s a potential source of error if you mistype it.'
