    # 导航组件


    没错，上一节那行代码引用可能让你既兴奋又松了一口气。但这里的关键并非节省敲击次数，而是你现在能够同时享受基于 Activity 和基于 Fragment 的导航的优势。现在，Fragment
    导航也拥有了简洁的 API。


    但首先，你需要对导航组件有所了解。它们是架构组件（Architecture Components）的一小部分，而架构组件又隶属于一个名为 Android Jetpack
    的更大体系。（我在此不会详细讲解 Jetpack 或架构组件，因为它们涉及范围很广；但简要的背景介绍总归是有益的。）


    在 2017 年 Google I/O 大会上，谷歌推出了 Android 架构组件。这些库是一个名为 Android Jetpack 的更大集合的一部分。与架构组件一同推出的还有
    Foundation、Behavior 和 UI 等其他类别。


    Jetpack 是一个 Android 软件组件集合，旨在让我们的开发工作更轻松。它帮助我们遵循最佳实践，并避免编写过多的样板代码。你可以在 `androidx.*`
    包库中找到 Jetpack 代码。


    以下是 Jetpack 组件的简要说明。


    **Foundation**


    - **AppCompat**：让你编写的代码能在较旧版本的 Android 上优雅地降级运行。

    - **Android KTX**：如果你使用 Kotlin，它能让你编写更简洁、更地道的 Kotlin 代码。

    - **Multidex**：为包含多个 DEX 文件的应用提供支持。

    - **Test**：用于单元测试和运行时 UI 测试的测试框架。


    **Behavior**


    - **Download manager**：让你编写用于调度和管理大型下载任务的程序。

    - **Media and Playback**：用于媒体播放和路由的向后兼容 API。

    - **Notifications**：提供向后兼容的通知 API，并支持 Wear 和 Auto。

    - **Permissions**：用于检查和请求应用权限的兼容性 API。

    - **Preferences**：创建交互式设置界面。

    - **Sharing**：提供适用于应用操作栏的分享操作。

    - **Slices**：创建灵活的 UI 元素，可在应用外部显示应用数据。


    **UI**


    - **Animations and Transitions**：实现小部件的移动和屏幕间的过渡。

    - **Auto**：如果你正在开发将在车辆信息娱乐系统中运行的应用，你会需要它。这些组件帮助你为 Android Auto 构建应用。

    - **Emoji**：在较旧的平台上启用更新版本的 Emoji 字体。

    - **Fragment**：所有 Fragment 代码都已迁移至此。

    - **Layout**：使用不同算法布局小部件。

    - **Palette**：从调色板中提取有用信息。

    - **TV**：帮助开发 Android TV 应用的组件。

    - **Wear OS by Google**：如果你想处理 Android 可穿戴设备（如手表），你会需要它。


    **Architecture**


    - **Data binding**：声明式地将可观察数据绑定到 UI 元素。

    - **Lifecycles**：管理 Activity 和 Fragment 的生命周期。

    - **LiveData**：当底层数据库发生变化时通知视图。

    - **Paging**：按需从数据源逐步加载信息。可以想象当用户滚动列表时——它能帮助你处理数据加载。它与 Recycler 视图配合使用。

    - **ViewModel**：以生命周期感知的方式管理与 UI 相关的数据。

    - **WorkManager**：管理后台任务。

    - **Navigation**：实现应用内的导航。在屏幕间传递数据。提供来自应用外部的深层链接。

    - **Room**：可以将其视为 SQLite 数据库的 ORM。


    Jetpack 中有很多内容值得探索，请务必了解一下。


    回到我们的主题，导航组件简化了应用内各目的地（destinations）之间的导航实现。一个*目的地*是应用中的任何位置。它可以是一个 Activity、Activity
    内的一个 Fragment 或一个自定义视图；目的地通过导航图（navigation graph）进行管理。


    导航图将所有目的地分组，并定义目的地之间的不同连接；这些连接被称为*动作（actions）*。该图实际上是一个 XML 资源文件，代表你应用的所有导航路径。你的应用中可以有多个导航图。


    ## 使用 Jetpack 导航


    为了更好地理解导航组件，最好动手做一个小的项目。因此，如图 10-2 所示，在 Android Studio 中创建一个新的空项目。别忘了勾选 `Use AndroidX
    artifacts`选项。请记住，所有支持库现在都在 `AndroidX` 包中；你需要它们，因为你将使用 Fragment。


    ![../images/476822_1_En_10_Chapter/476822_1_En_10_Fig2_HTML.jpg](img/476822_1_En_10_Fig2_HTML.jpg)


    图 10-2. 使用 AndroidX 工件创建的新空项目


    顺便提一下，如果你还没有更新或升级到最新版本的 Android Studio，现在是个好时机。在撰写本文时，如果你想使用导航，必须使用 Android Studio
    v3.3 或更高版本；此外，你还需要将导航组件的依赖项添加到你的项目中。因此，创建项目后，找到模块级别的 `build.gradle` 文件并添加条目，如代码清单
    10-5 所示。


    ```

    dependencies {

    def nav_version = "2.1.0-alpha02"

    ...

    implementation "androidx.navigation:navigation-fragment:$nav_version"

    implementation "androidx.navigation:navigation-ui:$nav_version"

    }

    代码清单 10-5. 将导航添加到 build.gradle

    ```


    添加依赖项后，你需要同步 Gradle 文件。

    '
- fmt: '### Note


    Remember that there are two Gradle files in your project. You need to edit the
    module-level Gradle file, as shown in Figure 10-3.


    ![../images/476822_1_En_10_Chapter/476822_1_En_10_Fig3_HTML.jpg](images/476822_1_En_10_Chapter/476822_1_En_10_Fig3_HTML.jpg)


    Figure 10-3. `build.gradle`(module)


    When the sync is done, add a navigation graph to the project. You can create a
    navigation graph by creating a new resource file; right-click the project’s `res`
    folder and select New ➤ Resource File, as shown in Figure 10-4.


    ![../images/476822_1_En_10_Chapter/476822_1_En_10_Fig4_HTML.jpg](images/476822_1_En_10_Chapter/476822_1_En_10_Fig4_HTML.jpg)


    Figure 10-4. Adding a new resource file


    In the New Resource File dialog, change the resource type to Navigation and supply
    the file name:


    *   **File name**: `nav_graph`

    *   **Resource type**: Navigation (you must click the down-arrow to select it)


    Figure 10-5 shows the New Resource File dialog.


    ![../images/476822_1_En_10_Chapter/476822_1_En_10_Fig5_HTML.jpg](images/476822_1_En_10_Chapter/476822_1_En_10_Fig5_HTML.jpg)


    Figure 10-5. The new resource file info


    Click OK to create the new resource file.


    When the resource is created, you’ll see a new folder (`navigation`) and a new
    file (`nav_graph.xml`) under the `res` folder of the project, as shown in Figure
    10-6. Android Studio will open the newly created navigation graph in the editor.
    Figure 10-6 shows the newly created navigation graph; it’s empty, of course.


    ![../images/476822_1_En_10_Chapter/476822_1_En_10_Fig6_HTML.jpg](images/476822_1_En_10_Chapter/476822_1_En_10_Fig6_HTML.jpg)


    Figure 10-6. Navigation graph


    When you’re using navigation components, navigation happens as an interaction
    between destinations. Destinations are what your users can navigate to, and destinations
    are connected via actions. At the moment, you don’t have any destination yet,
    so let’s add one. Click the plus sign on the top panel of the navigation editor,
    as shown in Figure 10-7, and then choose the Create a New Destination option.


    This will show the dialog for creating a new fragment. I changed the name of the
    new fragment and left the rest of the fields alone, as shown in Figure 10-7. The
    details of this new fragment are as follows:


    ![../images/476822_1_En_10_Chapter/476822_1_En_10_Fig7_HTML.jpg](images/476822_1_En_10_Chapter/476822_1_En_10_Fig7_HTML.jpg)


    Figure 10-7. New Android component


    *   **Fragment Name**: `One`

    *   **Fragment Layout Name**: `fragment_one`

    *   Keep the source language as **Java**


    Click Finish to start the creation of the new fragment; this fragment will become
    one of the destinations in your app. Create another destination and make the fragment’s
    name "Two." The navigation editor should look like Figure 10-8.


    ![../images/476822_1_En_10_Chapter/476822_1_En_10_Fig8_HTML.jpg](images/476822_1_En_10_Chapter/476822_1_En_10_Fig8_HTML.jpg)


    Figure 10-8. Navigation editor


    Notice also there are two new Java classes (`One.java` and `Two.java`) and two
    new layout files (`fragment_one.xml` and `fragment_two.xml`). These files were
    generated when you created destinations One and Two. Notice in Figure 10-8 that
    fragment One has the home icon beside it. This is only because you created it
    first. The home destination or start destination is the first screen that your
    users will see. You can change the start destination any time by right-clicking
    any destination and then clicking the Set as start destination option, but for
    now, keep One as the start destination.


    Now, your navigation graph doesn’t have a `NavHost` yet; it needs one. A `NavHost`
    acts like a viewport for all your destinations. It’s an empty container where
    destinations are swapped in and out as the user navigates through the app. The
    `NavHost` needs to be in an activity. You’re going to put the `NavHost` in your
    `MainActivity`.


    Open the layout file for your `MainActivity` (it’s in `res/layout/activity_main.xml`)
    and then edit it in Text mode. The default `activity_main` contains a single `TextView`
    object; remove it and replace it with the code snippet in Listing 10-6.


    | ❶ | It needs an id, just like any other element in the resource file. I used
    `nav_container` for this one; you can name it whatever you like. |

    | ❷ | This is the fully qualified name of the `NavHostFragment` class. It belongs
    to the navigation component and it will be responsible for making your `MainActivity`
    the view port for all your defined destinations. |

    | ❸ | The `app:navGraph` attribute tells the runtime which navigation graph you
    want to host in the `MainActivity`. Remember that you can have more than one navigation
    graph in the app; `nav_graph` is the name you gave to the navigation graph XML
    resource earlier. |

    | ❹ | When you set the `defaultNavHost` to *true*, this makes sure that the `NavHostFragment`
    intercepts the system back button; that way, when the user clicks the back button,
    Android will show you the previous screen in your app, and not an external app’s
    screen that happened to be on the back stack. |


    ```

    Listing 10-6.

    Defining a NavHost in activity_main.xml

    ```


    Now it’s time to connect your two destinations. Open the navigation graph again;
    it’s in `res/navigation/nav_graph`.


    You want the user to navigate from destination One to destination Two. So, hover
    your mouse over destination One until a small circle appears on its right side.
    Click and drag this point over to destination Two so that the two destinations
    can be connected, as shown in Figure 10-9.


    ![../images/476822_1_En_10_Chapter/476822_1_En_10_Fig9_HTML.jpg](images/476822_1_En_10_Chapter/476822_1_En_10_Fig9_HTML.jpg)


    Figure 10-9. Connecting One to Two


    Now, destination One is connected to destination Two. If you select the connection
    between One and Two, you’ll see that it has attributes you can set, as shown in
    Figure 10-10. You won’t deal with the attributes; you just want to connect the
    two destinations.


    ![../images/476822_1_En_10_Chapter/476822_1_En_10_Fig10_HTML.jpg](images/476822_1_En_10_Chapter/476822_1_En_10_Fig10_HTML.jpg)


    Figure 10-10. Navigation graph


    In order to test this small app, you need an object in the start destination that
    will trigger an action, like a button. Modify the layout of the two fragments
    as follows:


    **fragment_one**


    *   Change the layout to `ConstraintLayout` or whatever layout is appropriate
    for you.

    *   Remove the `TextView` and replace it with a button and center it.


    **fragment_two**


    *   Like `fragment_one`, change the layout to `ConstraintLayout`.

    *   Change the text of the `TextView` and center it.


    Figure 10-11 shows the navigation graph with a preview of the changes.


    ![../images/476822_1_En_10_Chapter/476822_1_En_10_Fig11_HTML.jpg](images/476822_1_En_10_Chapter/476822_1_En_10_Fig11_HTML.jpg)


    Figure 10-11. Modified fragments


    Next, add a click handler to your button. You’ll add the code that will make `fragment_one`
    navigate to `fragment_two` when the button is clicked.


    Navigating to a destination is done using a `NavController`; it’s an object that
    manages app navigation within a `NavHost`. Each `NavHost` has its own corresponding
    `NavController`.


    A `NavController` lets you navigate to destinations in two ways: 1) navigate to
    a destination using an ID, which is what you will use here, and 2) navigate using
    a URI, which I will leave up to you to explore.'
