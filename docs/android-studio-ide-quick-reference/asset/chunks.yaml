- fmt: '# Hardware Acceleration


    As you write your app, it’s useful to test and run it from time to time in order
    to get immediate feedback and find out if it is running as expected, or if it
    is running at all. To do this, you will use either a physical or a virtual device.
    Each option has its pros and cons and you don’t have to choose one over the other;
    in fact, you will have to use both options eventually.


    An Android Virtual Device (`AVD`) is an emulator where you can run your apps.
    Running on an emulator can sometimes be slow; this is why Google and Intel came
    up with `HAXM`, an emulator acceleration tool that makes testing your app a bit
    more bearable. This is definitely a boon to developers. That is, if you are using
    a machine that has an Intel processor that supports virtualization and if you
    are not on Linux. But don’t worry if you’re not lucky enough to fall into that
    part of the pie; there are ways to achieve emulator acceleration in Linux, as
    you’ll see later.


    macOS users probably have it the easiest because `HAXM` is automatically installed
    with `AS3`. You don’t have to do anything to get it because the `AS3` installer
    took care of it for you.


    Windows users can get `HAXM` either by:


    * Downloading it from [`https://software.intel.com/en-us/android`](https://software.intel.com/en-us/android).
    Install it like you would any other Windows software: double-click and follow
    the prompts.

    * Alternatively, you can get `HAXM` via `AS3`’s `SDK` manager. This is the recommended
    method.


    For Linux users, the recommended software is `KVM` instead. `KVM` (Kernel-based
    Virtual Machine) is a virtualization solution for Linux. It contains virtualization
    extensions (Intel VT or AMD-V).


    To get `KVM`, you need to pull some software from the repos. But even before you
    can do that, you need to do the following first:


    1. Make sure that virtualization is enabled on your BIOS or UEFI settings. Consult
    your hardware manual on how to get to these settings. It usually involves shutting
    down the PC, restarting it, and pressing an interrupt key like `F2` or `DEL` as
    soon as you hear the chime of your system speaker, but like I said, consult your
    hardware manual.

    2. Once you’ve made your changes and rebooted to Linux, find out if your system
    can run virtualization. This can be accomplished by running the following command
    from a terminal: `egrep –c ''(vmx|svm)'' /proc/cpuinfo`. If the result is a number
    higher than zero, you can go ahead with the installation.


    To install `KVM`, type the commands shown in example [1-1](#476822_1_En_1_Chapter.xhtml#PC2)
    in a terminal window.


    ```

    sudo apt-get install qemu-kvm libvirt-bin ubuntu-vm-builder bridge-utils

    sudo adduser your_user_name kvm

    sudo adduser your_user_name libvirtd

    Example 1-1.

    Commands to Install KVM

    ```


    You may have to reboot the system to complete the installation.


    Hopefully everything went well and you now have a proper development environment.
    In the next chapter, you will familiarize yourself with the various parts of `Android
    Studio IDE`.


    # Chapter Summary


    * You can get Android and Android Studio for macOS, Windows, and Linux. Each platform
    has an available precompiled binary available on the Android website.

    * `HAXM` gives you a way to accelerate emulation on Android Virtual Devices. You
    will automatically get `HAX` when you’re on macOS or Windows (with an Intel processor).
    If you’re on Linux, you can use `KVM` instead of `HAXM`.


    # 2. Quick How-Tos


    *What this chapter covers*:


    * Creating a project

    * Creating an activity

    * Creating a class and an interface

    * Generating code for method overrides

    * Running a project


    In this chapter, you’ll take a look at some of the basic activities in Android
    project development, such as creating a project, activities, classes, interfaces,
    methods, and how to run an app. A lot of these elements can be managed manually
    (by hand) without much difficulty, but Android Studio has some nifty capabilities
    that can help you with these tasks. Android Studio can make these tasks quicker
    and more accurate. For example, typing override signatures by hand can be prone
    to error, especially if the method signature is long.'
  raw: '## Hardware Acceleration


    As you write your app, it’s useful to test and run it from time to time in order
    to get immediate feedback and find out if it is running as expected, or if it
    is running at all. To do this, you will use either a physical or a virtual device.
    Each option has its pros and cons and you don’t have to choose one over the other;
    in fact, you will have to use both options eventually.


    An Android Virtual Device (AVD) is an emulator where you can run your apps. Running
    on an emulator can sometimes be slow; this is why Google and Intel came up with
    HAXM, an emulator acceleration tool that makes testing your app a bit more bearable.
    This is definitely a boon to developers. That is, if you are using a machine that
    has an Intel processor that supports virtualization and if you are not on Linux.
    But don’t worry if you’re not lucky enough to fall into that part of the pie;
    there are ways to achieve emulator acceleration in Linux, as you’ll see later.


    macOS users probably have it the easiest because HAXM is automatically installed
    with AS3\. You don’t have to do anything to get it because the AS3 installer took
    care of it for you.


    Windows users can get HAXM either by


    *   Downloading it from [`https://software.intel.com/en-us/android`](https://software.intel.com/en-us/android)
    . Install it like you would any other Windows software: double-click and follow
    the prompts.


    *   Alternatively, you can get HAXM via AS3’s SDK manager. This is the recommended
    method.


    For Linux users, the recommended software is KVM instead. KVM (Kernel-based Virtual
    Machine) is a virtualization solution for Linux. It contains virtualization extensions
    (Intel VT or AMD-V).


    To get KVM, you need to pull some software from the repos. But even before you
    can do that, you need to do the following first:


    1.  Make sure that virtualization is enabled on your BIOS or UEFI settings. Consult
    your hardware manual on how to get to these settings. It usually involves shutting
    down the PC, restarting it, and pressing an interrupt key like F2 or DEL as soon
    as you hear the chime of your system speaker, but like I said, consult your hardware
    manual.


    2.  Once you’ve made your changes and rebooted to Linux, find out if your system
    can run virtualization. This can be accomplished by running the following command
    from a terminal: `egrep –c ''(vmx|svm)'' /proc/cpuinfo`. If the result is a number
    higher than zero, you can go ahead with the installation.


    To install KVM, type the commands shown in example [1-1](#476822_1_En_1_Chapter.xhtml#PC2)
    in a terminal window.


    ```

    sudo apt-get install qemu-kvm libvirt-bin ubuntu-vm-builder bridge-utils

    sudo adduser your_user_name kvm

    sudo adduser your_user_name libvirtd

    Example 1-1.

    Commands to Install KVM

    ```


    You may have to reboot the system to complete the installation.


    Hopefully everything went well and you now have a proper development environment.
    In the next chapter, you will familiarize yourself with the various parts of Android
    Studio IDE.


    ## Chapter Summary


    *   You can get Android and Android Studio for macOS, Windows, and Linux. Each
    platform has an available precompiled binary available on the Android website.


    *   HAXM gives you a way to accelerate emulation on Android Virtual Devices. You
    will automatically get HAX when you’re on macOS or Windows (with an Intel processor).
    If you’re on Linux, you can use KVM instead of HAXM.


    # 2. Quick How-Tos


    *What this chapter covers*:


    *   Creating a project


    *   Creating an activity


    *   Creating a class and an interface


    *   Generating code for method overrides


    *   Running a project


    In this chapter, you’ll take a look at some of the basic activities in Android
    project development, such as creating a project, activities, classes, interfaces,
    methods, and how to run an app. A lot of these elements can be managed manually
    (by hand) without much difficulty, but Android Studio has some nifty capabilities
    that can help you with these tasks. Android Studio can make these tasks quicker
    and more accurate. For example, typing override signatures by hand can be prone
    to error, especially if the method signature is long.'
  trans: '

    # 硬件加速


    在编写应用时，为了获得即时反馈并确认应用是否按预期运行（或能否正常运行），你需要时不时地测试并运行它。为此，你将使用物理设备或虚拟设备。两种方案各有利弊，你无需二选一——实际上，你最终需要同时使用两者。


    Android 虚拟设备（`AVD`）是一种可供你运行应用的模拟器。在模拟器上运行时，有时可能会很慢；因此谷歌和英特尔推出了`HAXM`，这是一种能减轻测试痛点的模拟加速工具。这对开发者来说无疑是福音——前提是你使用的机器拥有支持虚拟化的英特尔处理器，并且你使用的不是
    Linux 系统。不过，如果你没这么幸运也不必担心，正如你稍后会看到的，在 Linux 中也有办法实现模拟加速。


    macOS 用户或许最为轻松，因为`AS3`会自动安装`HAXM`。你无需任何额外操作，`AS3`安装程序会替你处理好一切。


    Windows 用户可以通过以下方式获取`HAXM`：


    * 从[`https://software.intel.com/en-us/android`](https://software.intel.com/en-us/android)下载。像安装其他
    Windows 软件一样安装它：双击并按照提示操作。

    * 或者，你也可以通过`AS3`的`SDK`管理器获取`HAXM`。这是推荐的方法。


    对于 Linux 用户，推荐使用`KVM`。`KVM`（基于内核的虚拟机）是 Linux 的虚拟化解决方案，包含虚拟化扩展（如英特尔 VT 或 AMD-V）。


    要获取`KVM`，你需要从软件仓库中拉取一些软件。但在此之前，你首先需要完成以下步骤：


    1. 确保在 BIOS 或 UEFI 设置中启用了虚拟化功能。关于如何进入这些设置，请查阅你的硬件手册。通常的操作是：关闭电脑，重新启动，并在听到系统扬声器提示音后立即按下中断键（如`F2`或`DEL`），但正如我所说，请查阅你的硬件手册。

    2. 完成设置并重启进入 Linux 后，检查系统是否能运行虚拟化。这可以通过在终端中执行以下命令来完成：`egrep –c ''(vmx|svm)'' /proc/cpuinfo`。如果返回的数字大于零，则可以继续安装。


    要安装`KVM`，请在终端窗口中输入示例 1-1 中所示的命令。


    ```

    sudo apt-get install qemu-kvm libvirt-bin ubuntu-vm-builder bridge-utils

    sudo adduser your_user_name kvm

    sudo adduser your_user_name libvirtd

    示例 1-1.

    安装 KVM 的命令

    ```


    你可能需要重启系统才能完成安装。


    希望一切顺利，你现在已经拥有了合适的开发环境。在下一章中，你将熟悉`Android Studio IDE`的各个部分。


    # 本章小结


    * 你可以为 macOS、Windows 和 Linux 系统获取 Android 和 Android Studio。每个平台都有预编译好的二进制文件，可在
    Android 官网获取。

    * `HAXM`提供了在 Android 虚拟设备上加速模拟的能力。如果你使用 macOS 或 Windows（搭载英特尔处理器），你将自动获得`HAX`。如果你使用
    Linux，则可以用`KVM`替代`HAXM`。


    # 2. 快速操作指南


    *本章涵盖内容*：


    * 创建项目

    * 创建 Activity

    * 创建类和接口

    * 生成方法重写代码

    * 运行项目


    在本章中，你将了解 Android 项目开发中的一些基本操作，例如创建项目、Activity、类、接口、方法，以及如何运行应用。这些元素大多可以手动完成，并无太大难度，但
    Android Studio 提供了一些巧妙的功能来帮你更好地完成这些任务。Android Studio 能让这些操作更快捷、更准确。例如，手动输入重写签名容易出错，特别是当方法签名很长时。

