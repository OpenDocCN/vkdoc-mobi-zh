    Figure 13-3.


    Refactoring


    I’m sure you’ve done refactoring many times before, but let’s just jog your memory
    here.


    *   **Rename**: This will let you safely rename variables and other identifiers.
    You should use this instead of `Find and Replace`. This works across the entire
    project, and not only in the current file .


    *   **Change Signature**: This will let you change a method, either its name or
    the parameters. It also works at a class level, so you can turn a class into a
    generic type and manipulate the type parameters.


    *   **Move**: Moves an element. You can move a method to another class if you
    want to.


    *   **Copy**: Lets you copy elements, like the currently selected class.


    *   **Safe Delete**: If you need to delete something, Android Studio will verify
    that what you’re deleting isn’t in use by anything else in the code base . If
    it is in use, you’ll be prompted so you can address those things before you actually
    delete something important.


    *   **Extract Constant**: Avoid using hard-coded values. You shouldn’t, you know
    it, and you know why. The Extract option for refactoring works not only for constants;
    you can extract fields, methods, superclasses, variables, parameters, and interfaces*.*


    There are plenty more options in the Refactor menu; make sure to check the others
    out.


    ### Generate


    Another time-saving feature of Android Studio is the code generator. It’s aptly
    named because it does exactly what you think it does—it generates code. Let’s
    take an example. Figure [13-4](#476822_1_En_13_Chapter.xhtml#Fig4) shows the keyboard
    cursor inside a class definition. While the cursor is within the class body, launch
    the Generator action; from the main menu bar, go to Code ➤ Generate.


