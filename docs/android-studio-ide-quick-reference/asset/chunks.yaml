    ## LiveData


    Going back to the RandomNumber example, what you have is an app that shows a random
    number every time the app is launched. The app uses ViewModel already, so you
    don’t have the problem of losing data every time the activity is destroyed and
    recreated. The basic data flow is shown in Figure [11-2](#476822_1_En_11_Chapter.xhtml#Fig2).


