  \ 10-6 所示。Android Studio 将在编辑器中打开新创建的导航图。图 10-6 显示了新创建的导航图，它当然是空的。\n\n![../images/476822_1_En_10_Chapter/476822_1_En_10_Fig6_HTML.jpg](img/476822_1_En_10_Fig6_HTML.jpg)\n\
