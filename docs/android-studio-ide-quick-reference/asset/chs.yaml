- '# 8. Gradle


  **本章内容涵盖：**


  - Android 构建过程


  - Gradle 文件


  - 依赖项


  - Android 支持库


  ## 构建过程


  构建一个 APK 或 bundle 需要许多涉及的步骤。图 8-1 大致说明了这个过程。


  ### 注意


  Bundle 是交付 Android 可执行文件的一种较新格式。我将在第 12 章中进一步讨论 bundle。


  一个应用是松散关联的 Java 源文件、XML 配置文件、XML 格式的 UI 定义等的组合。然后它进入编译阶段；有资源编译器和 Java 编译器。还有需要被考虑的库和其他依赖项。


  编译过程会产生一些中间文件，例如 DEX 可执行文件和其他编译后的资源。打包器会组合 DEX 可执行文件、编译后的资源和证书，最终生成一个 APK 或 bundle。


  ### 注意


  DEX 文件类似于 Java 类文件；它们是可执行文件，但旨在 Android 运行时中运行——它们与你桌面上的 Java 运行时不同。这是一种专为 Android
  设计的字节码运行时。


  ![../images/476822_1_En_8_Chapter/476822_1_En_8_Fig1_HTML.jpg](img/476822_1_En_8_Fig1_HTML.jpg)


  图 8-1. Android 构建过程


  Gradle 和 Android Studio 负责处理所有繁重的工作。如果你之前在 Java 开发中使用过 ANT 或 Maven，Gradle 与它们非常相似，区别在于它不是使用
  XML 语法，而是使用自己的 DSL（领域特定语言），该语言基于 Groovy 语言。




  ## 构建文件


  Gradle 依赖几个文件。图 8-2 标示出了它们。


  | ➊ | `build.gradle` **（项目级）**：这是项目的根文件夹。有些项目可能包含多个模块，在此文件中定义一些能被所有模块共享的属性会很有用。
  |

  | ➋ | `build.gradle` **（模块: app）**：模块级别的`build.gradle`文件位于其所属的模块内。在此例中，模块级 Gradle
  文件位于`app`文件夹内；`app`模块是 Android Studio 在创建项目时生成的默认模块。与项目级 Gradle 文件相比，这个文件是你最可能花费更多时间处理的文件。
  |

  | ➌ | `gradle.properties`：你可以在此文件中配置项目级的 Gradle 设置，例如为 Gradle 守护进程分配的内存量。我通常不会修改它。
  |

  | ➍ | `settings.gradle`：该文件告诉 Gradle 需要在构建中包含哪些模块。如果你只处理单个模块（即“app”），那么你也可以不修改此文件。
  |

  | ➎ | `local.properties`：此文件包含本地环境的设置，例如 SDK 的位置、Firebase 的用户凭据等。 |


  ![../images/476822_1_En_8_Chapter/476822_1_En_8_Fig2_HTML.png](img/476822_1_En_8_Fig2_HTML.png)


  图 8-2. Gradle 文件


  ### 模块级 Gradle 文件


  既然你最可能与模块级 Gradle 文件打交道，那就让我们更好地了解它。清单 8-1 展示了一个带有注释的模块级`build.gradle`文件示例。


  | ➊ | `compileSdkVersion`：指示你用于构建应用的 API 级别或 Android 版本。 |

  | ➋ | `defaultConfig`：此代码块包含模块的默认配置。可以有多个配置吗？是的，应用可以有多个配置。当你针对不同平台等有不同的行为时，就会用到它。你可能会有几种构建变体。但现在，我们先只处理默认配置。
  |

  | ➌ | `applicationId`：这是你的应用在 Google Play 上使用的名称；也是应用的标识。 |

  | ➍ | `minSdkVersion`：此属性将告知 Google Play 你的应用所支持的最低 Android 版本。 |

  | ➎ | `targetSdkVersion`：如果 Android 的 API 发生变化，此设置会告知运行时环境，你的应用期望 API 的行为与 API 级别
  24 时的行为一致。这样，你的应用就能拥有一个一致的环境。 |

  | ➏ | `versionCode`：标识应用的版本。这是一个递增的整数。 |

  | ➐ | `versionName`：这是`versionCode`的字符串表示形式，会显示在 Google Play 和设备的设置中。 |


  ```

  apply plugin: ''com.android.application''

  android {

  compileSdkVersion 28 ➊

  defaultConfig {  ➋

  applicationId "net.workingdev.demoappbitbucket" ➌

  minSdkVersion 27 ➍

  targetSdkVersion 28 ➎

  versionCode 1  ➏

  versionName "1.0" ➐

  testInstrumentationRunner "android.support.test.runner.AndroidJUnitRunner"

  }

  ...

  清单 8-1.

  build.gradle (模块)

  ```


  当你对 Gradle 文件进行了任何更改，Android Studio 会提示你同步该文件。IDE 顶部会显示一个提示栏，告诉你“立即同步”。你也可以通过点击工具栏上的同步按钮来同步
  Gradle 文件，如图 8-3 所示。另一种同步方式是从主菜单栏操作：选择“文件” ➤ “将项目与 Gradle 文件同步”。


  ![../images/476822_1_En_8_Chapter/476822_1_En_8_Fig3_HTML.jpg](img/476822_1_En_8_Fig3_HTML.jpg)


  图 8-3. 将项目与 Gradle 文件同步


  如果你不想手动编辑 Gradle 文件，也可以通过图形用户界面来实现更改。转到主菜单栏，选择“文件” ➤ “项目结构”，然后点击“应用”部分，如图 8-4 所示。


  ![../images/476822_1_En_8_Chapter/476822_1_En_8_Fig4_HTML.jpg](img/476822_1_En_8_Fig4_HTML.jpg)


  图 8-4. 项目结构


  如果你浏览“项目结构”窗口中的选项卡，你会发现也可以在那里编辑 Gradle 文件的条目。


  ### 依赖项


  大多数应用很少能独立运行；它们通常依赖其他代码。你的应用可能依赖于外部的二进制文件，或者你在同一项目中构建的其他库。无论哪种情况，这些依赖项都必须在 Gradle
  文件的依赖项代码块中声明。


  在依赖项代码块中，你必须列出应用的所有直接依赖项；如果这些依赖项本身又有自己的依赖项，Gradle 也会为你一并获取。需要注意三种依赖类型：


  *   **模块依赖项**：如果你在应用中创建了一个模块（除了默认的 app 模块之外），并希望它作为项目的库使用，你可以将其声明为模块依赖项。


  *   **Jar 依赖项**：当你想在应用中使用外部库时，例如 `jdom.jar`，只需将 jar 文件放入项目的 `libs` 文件夹，并将其声明为 jar
  依赖项。请记住，这里不能随便使用任何 jar 文件；只能使用那些旨在作为库使用的 jar 文件。在使用一个库之前，最好先阅读其文档。


  *   **库依赖项**：这种依赖项会从诸如 Maven 仓库或 `jcenter` 这样的仓库中拉取资源。仓库就是可供你使用的二进制文件的集合。当你安装 Android
  Studio 并在安装过程中拉取一些附加软件时，已在本地机器上拥有一个仓库。Android Support 仓库已在本地可用——因此，这个仓库无需在 Gradle
  文件（项目级 Gradle 文件）中声明，但除此之外的任何其他仓库都需要声明。你会注意到，当你在 Android Studio 中创建新项目时，生成的 Gradle
  文件已经包含了 `jcenter` 和 `google` 的引用，它们是非常庞大的 Java 和 Android 仓库。清单 8-2 展示了项目级 Gradle
  文件的一个片段；请注意 `buildscript` 和 `allprojects` 代码块中的仓库部分——它们已经包含了 `jcenter` 和 `google`
  的引用。当然，如果你需要引用 `jcenter` 和 `google` 之外的任何仓库，只需将其添加到 Gradle 文件中即可。


  ```

  buildscript {

  repositories {

  google()

  jcenter()

  }

  dependencies {

  classpath ''com.android.tools.build:gradle:3.3.1''

  // 注意：不要在此处放置你的应用依赖项；它们应属于

  // 各个模块的 build.gradle 文件中

  }

  }

  allprojects {

  repositories {

  google()

  jcenter()

  }

  }

  ...

  清单 8-2.

  build.gradle (项目级)

  ```


  请注意，项目级 Gradle 文件中有一条注释，提示 **不要** 将你的应用依赖项放置在此文件中，而应放在应用模块的 Gradle 文件中。你在项目级 Gradle
  文件中定义的任何内容都会影响所有模块级的 Gradle 文件。


  除了理解依赖类型，你还需要了解如何关联依赖项。至少要考虑以下三种指令：


  *   `implementation`：这意味着此依赖项将应用于你的所有构建变体或你执行的所有不同类型的构建。


  *   `testImplementation`：这是一个特定于测试的变体。在此处，你可以声明 JVM 测试所需的内容。这是一种只需要 JVM 而无需完整 Android
  运行时的单元测试。


  *   `androidTestImplementation`：在此处，你可以声明进行仪器化测试所需的库——这种测试需要完整的 Android 运行时。


  清单 8-3 展示了带有注释的模块级 `build.gradle` 文件片段。




  ### 注意


  构建变体是构建类型与构建配置的组合。构建类型的例子包括 `release` 和 `debug`。构建配置已在本章前文讨论过。你可以通过主菜单栏选择 **View
  ➤ Tool Windows ➤ Build Variant** 来查看当前的构建变体。


  | ➊ | 这个带有 `fileTree` 命令、`dir` 参数以及 ANT 风格通配模式 `*.jar` 的 `implementation` 指令，意味着你想要项目
  `lib` 文件夹下的所有 jar 文件都成为依赖项。因此，为项目添加 jar 依赖只需将 jar 文件放入项目的 `lib` 文件夹即可。 |

  | ➋ | 该指令表示你正在从仓库（确切地说是本地仓库）拉取一个依赖项。这会从 Android Support Library 拉取兼容性库。使用 AppCompat
  是为了让较新版本的 Android 功能能够在较旧版本上运行。不必过于担心版本问题；大多数情况下，Android Studio 都能很好地拉取正确且最新版本的兼容性库。
  |

  | ➌ | 与第 2 点类似，这也是来自 Android Support Library 的库依赖项。这次，你引用的是约束布局库，在创建使用 Constraint
  layout 的活动时需要用到它。 |

  | ➍ | 这个 `testImplementation` 指令会拉取你在 JVM 单元测试中使用的 JUnit 4 库。 |

  | ➎ | 这个 `androidTestImplementation` 会拉取你在插桩测试中使用的库。 |


  ```

  apply plugin: ''com.android.application''

  android {

  ...

  }

  dependencies {

  implementation fileTree(dir: ''libs'', include: [''*.jar''])  ➊

  implementation ''com.android.support:appcompat-v7:28.0.0''  ➋

  implementation ''com.android.support.constraint:constraint-layout:1.1.3'' ➌

  testImplementation ''junit:junit:4.12''  ➍

  androidTestImplementation ''com.android.support.test:runner:1.0.2'' ➎

  androidTestImplementation ''com.android.support.test.espresso:espresso-core:3.0.2''

  }

  清单 8-3.

  /app/build.gradle

  ```


  ## Android Support Library


  Android Support Library 是一个庞大的主题。我不会在此详述所有内容，但你至少需要对其有初步了解，尤其是在我们当前讨论的上下文中。


  Android Support Library 是 Android 非常重要的一部分。它基本上是对 Android SDK 的补充。其最重要的功能之一就是提供向后兼容性；至少它最初是为此而设计的。


  向后兼容性之所以重要，是因为新版本的 Android 正在快速发布，而仍有相当多的设备运行着旧版本的 Android。较新版本的 Android 意味着更新的能力和特性；这是否意味着运行旧版本
  Android 的设备无法使用这些新特性？并非如此。向后兼容性意味着较新的平台特性可以提供给较旧的平台版本使用。


  随着时间的推移，Android Support Library 变得越来越庞大。它开始提供不属于平台本身的功能，例如用户界面领域的功能，如 Recycler Views
  或 Card Views。Support Library 还包含了调试和测试领域的功能，因此需要对其进行重组。


  在 Android Support Library 的早期，它只是一个单一的库；但随着它的发展，其组织形式也发生了变化。因此，Support Library 不再只是一个单一的库，而是变成了一组更小、更易于管理的库。这些库的分组主要依据平台支持来组织，这意味着
  Support Library 的名称表明了它支持哪个平台或 API 级别。


  你可能仍然会看到名为 `v4`、`v7` 和 `v13` 的库，历史上它们的意思是 `v4` 支持 API 级别 4 及以上，`v7` 支持级别 7 及以上，`v13`
  支持 API 级别 13 及以上。我说“*历史上*”是因为这已不再正确。每当新版本的 Android 发布时，都会发生很多变化；弃用情况层出不穷。因此，你必须时常关注
  Support Library 的文档。


  在撰写本文时，`v4` 已不再支持 API 级别 4 及以上。它现在只支持 API 级别 14 及以上；`v7` 也不再支持级别 7 及以上，而是只支持级别 14
  及以上。这实际上意味着所有支持库包的最低 SDK 版本现为级别 14（Ice Cream Sandwich）。


  更重要的是，随着 Android 9（API 级别 28）的发布，出现了名为 AndroidX 的新版 Android Support Library，它是 Jetpack
  的一部分。你可以继续使用支持库（`android.support.*` 版本 27 及更早版本）。它们将保留在 Google Maven 上，但请注意，所有开发都将在
  AndroidX 中进行。


  ### 注意


  Android Jetpack 是一组组件集合，旨在让开发应用更轻松。这些库位于 `androidx.*` 包中，并且它们与平台 API 解耦。向后兼容性库现在也位于此处。Jetpack
  非常庞大。它不仅仅是兼容性库；它还包含许多其他软件组件，涉及架构、基础、UI 和行为。你可以在 [`https://developer.android.com/jetpack`](https://developer.android.com/jetpack)
  了解更多信息。


  在清单 8-3 中，你看到了这一行


  ```

  implementation ''com.android.support:appcompat-v7:28.0.0''

  ```


  这意味着，即使运行你应用的设备是 API 级别 14，你仍然可以使用


  *   ActionBar

  *   Material design

  *   `AppCompatActivity` 类

  *   `AppCompatDialog`

  *   `ShareActionProvider`


  所有这些功能都相当现代，但由于 AppCompat 库，你仍然可以在较旧的平台上使用它们。


  ### 注意


  当你以较低 API 级别为目标时，你的应用可以依赖的现代 Android 特性较少，但能够运行你应用的 Android 设备比例更高。当以较高 API 级别为目标时，情况则相反。你始终可以在创建新
  Android 项目时点击“Help me choose”链接，查看 Android 版本的数据或累积分布。


  ## 本章小结


  *   构建过程可能非常复杂。幸运的是，Gradle 处理了所有繁重的工作。

  *   存在两个 `build.gradle` 文件：一个在项目根目录，另一个在每个模块中。项目级别的 Gradle 文件是定义你想要共享给所有模块级别 Gradle
  文件的指令的好地方。

  *   模块级别的 Gradle 文件是你定义大部分配置的地方。模块依赖项和目标 SDK 都在此定义。


  '
- '# 9. Git


  *本章涵盖内容：*


  *   如何获取 Git

  *   在 Android Studio 中设置 GitHub

  *   使用 GitHub 进行共享与克隆

  *   从其他 Git 仓库进行共享与克隆


  Android Studio 提供了与多种版本控制系统的集成，而 Git 便是其中较为流行的版本控制系统之一。在本章中，你将了解如何在 Android Studio
  中使用 Git。




  ## 获取 Git


  Git 适用于 macOS、Linux 和 Windows。如果你使用的是 macOS 并且已经安装了 XCode CLI，那么很可能已经安装了 Git。而在
  Windows 和 Linux 上，你需要先以某种方式获取 Git，才能继续按照以下说明进行操作。


  在系统上安装 Git 最简单的方法是访问 [`https://git-scm.com/download`](https://git-scm.com/download)
  并获取适用于你平台的版本。你可以获取适用于 Windows 和 macOS 的预编译二进制文件；对于 Linux，则会获得如何使用包管理器安装 Git 的说明。


  如果你已经使用了诸如 `chocolatey`（Windows）、`MacPorts`（macOS）或 `HomeBrew`（同样适用于 macOS）这类包管理器，那么你也可以使用这些包管理器来获取
  Git。


  在 Windows 上使用 `chocolatey`，你可以在命令行或 PowerShell 中运行以下命令：


  ```

  choco install git

  ```


  在 macOS 上使用 `HomeBrew`，你可以尝试：


  ```

  brew install git

  ```


  在 macOS 上使用 `MacPorts`，你可以使用：


  ```

  sudo port install git

  ```


  接下来，我们转到 Android Studio。打开 IDE，前往 `Preferences`（macOS）或 `Settings` 窗口（Windows 和
  Linux），然后进入 `Version Control` ➤ `Git`，如图 9-1 所示。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig1_HTML.jpg](img/476822_1_En_9_Fig1_HTML.jpg)


  图 9-1: `Preferences` ➤ `Version Control` ➤ `Git`


  注意 `Path to Git executable`（Git 可执行文件路径）字段。如图 9-1 所示，我的这个字段已被填充并自动检测到；这通常是正确的，你无需再做其他操作。如果
  Android Studio 没有自动检测到 Git 可执行文件的位置，或者你不想使用自动检测到的版本，你随时可以更改它。要更改 Git 可执行文件，请点击省略号按钮（即
  `Test` 按钮左侧带有三个点的按钮，如图 9-1 所示）。


  找到你希望 Android Studio 使用的 Git 可执行文件。之后，点击 `Test` 按钮。结果如图 9-2 所示。


  ### 提示


  对于 Windows 用户。如果你使用了 `git-scm` 的安装程序并使用默认选项安装，那么 Git 可执行文件将位于 `C:\Program Files\(x86)\Git\bin\`
  文件夹中。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig2_HTML.jpg](img/476822_1_En_9_Fig2_HTML.jpg)


  图 9-2: Git 执行成功


  现在你已经准备好使用带有 Git 版本控制的 Android Studio 了。你可以开始与 Git 仓库进行集成。


  ## 将 Android Studio 与 GitHub 结合使用


  再次前往 `Preferences/Settings` 窗口，然后进入 `GitHub`，如图 9-3 所示。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig3_HTML.jpg](img/476822_1_En_9_Fig3_HTML.jpg)


  图 9-3: `Preferences`，`GitHub`


  点击 `Add account`（添加账户）链接。你将看到如图 9-4 所示的 `Login`（登录）窗口。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig4_HTML.jpg](img/476822_1_En_9_Fig4_HTML.jpg)


  图 9-4: 登录 GitHub


  如果你已有 GitHub 账户，可以在该窗口中提供你的 GitHub 登录凭据；如果你还没有账户，可以点击 `Sign up for GitHub`（注册 GitHub）链接（如图
  9-4 所示），然后你将被引导至 GitHub 网页，在那里你可以注册一个新账户。


  你可以使用免费的 GitHub 账户创建私有或公共仓库。公共仓库对所有人共享；你无法控制其可见性——所有人都能看到它。另一方面，私有仓库不会对所有人共享；你可以控制仓库的访问权限。


  当你准备好 GitHub 凭据后，将它们填入如图 9-4 所示的登录名和密码字段，然后点击 `OK`。如果一切顺利，你应该会在 `Preferences/Settings`
  窗口中看到你的 GitHub 头像，如图 9-5 所示。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig5_HTML.jpg](img/476822_1_En_9_Fig5_HTML.jpg)


  图 9-5: GitHub 设置


  点击 `OK` 按钮，你现在应该可以拉取和分享 GitHub 上的项目了。


  ### 在 GitHub 上分享项目


  如果这是你第一次安装 Git，你可能需要为 Git 配置全局变量 `user.email` 和 `user.name`。为此，请在命令行窗口中输入列表 9-1
  中的代码。


  ```

  Git config --global user.name "your name"

  Git config --global user.email "your email"

  ```


  列表 9-1: 设置 Git 全局变量


  不要忘记分别将 “your name” 和 “your email” 替换为你的实际姓名和实际邮箱。




  ### 提示


  对于 Windows 用户。Git 安装程序不会更新 `PATH` 变量，因此您可能会遇到“bad command or filename”错误。为了执行清单
  9-1 中所示的命令，您必须首先导航到 Git 可执行文件的位置。因此，请将目录更改为 `C:\Program Files\(x86)\Git\bin\`，然后执行清单
  9-1 中所示的命令。


  打开您想要通过 GitHub 分享的任何项目；然后，从主菜单栏中，转到 `VCS` ➤ `Import into Version Control` ➤ `Share
  Project on GitHub`，如图 9-6 所示。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig6_HTML.jpg](img/476822_1_En_9_Fig6_HTML.jpg)


  图 9-6. 导入到版本控制


  提供必要的信息，如图 9-7 所示。以下是各字段含义的简要说明：


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig7_HTML.jpg](img/476822_1_En_9_Fig7_HTML.jpg)


  图 9-7. 在 GitHub 上分享项目


  - **Repository name**（仓库名称）：您想要创建的公共仓库的名称。当您在 GitHub 上分享一个项目时，它被称为一个仓库（或简称 repo），它只是一个存储和管理数据的地方。在此例中，您正在为这一个项目创建一个仓库。因此，最好只将项目相关的工件存储在其中。

  - **Private**（私有）：如果您像我一样让此复选框保持未选中状态，则意味着该仓库将是公共的。您需要决定仓库的可见性。请记住，如果它是公共的，所有人都能看到；如果是私有的，则由您控制谁能看到它。

  - **Remote**（远程）：保留默认设置。它显示为“remote”，因为文件将存储在远程服务器上（在 GitHub 的服务器上），与“local”相对，后者意味着文件将存储在您的计算机上。

  - **Description**（描述）：最好在此提供一些描述项目的文字。


  当您单击 `Share` 按钮时，Android Studio 将提示您选择要分享的文件。在版本控制的术语中，我们不说“分享”，而说“提交”。参见图 9-8。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig8_HTML.jpg](img/476822_1_En_9_Fig8_HTML.jpg)


  图 9-8. 为初始提交添加文件


  默认情况下，对话框中显示的所有内容都被选中，这意味着项目文件夹中的所有内容都将被提交，但并非完全如此。尝试向下滚动，以便您能看到所有带有勾选标记的文件。您可能会注意到一个名为
  `.gitignore` 的文件，如图 9-9 所示。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig9_HTML.jpg](img/476822_1_En_9_Fig9_HTML.jpg)


  图 9-9. 添加 `.gitignore`


  `.gitignore` 是一个特殊文件，其中包含不会被包含在仓库中的文件列表——这些文件将被忽略。


  如果项目工具窗口的视图设置为 Android，您将无法看到 `.gitignore` 文件，但如果您将项目工具窗口的视图更改为 Project，如图 9-10
  所示，您应该可以看到 `.gitignore` 文件。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig10_HTML.jpg](img/476822_1_En_9_Fig10_HTML.jpg)


  图 9-10. 项目工具窗口设置为 Project 视图


  清单 9-2 显示了 `.gitignore` 的内容。


  ```

  *.iml

  .gradle

  /local.properties

  /.idea/caches

  /.idea/libraries

  /.idea/modules.xml

  /.idea/workspace.xml

  /.idea/navEditor.xml

  /.idea/assetWizardSettings.xml

  .DS_Store

  /build

  /captures

  .externalNativeBuild

  清单 9-2. .gitignore

  ```


  大多数情况下，您希望保留 `.gitignore` 中的所有条目。当然，您可以向列表中添加内容，但您不应从中移除任何内容，如清单 9-2 所示。默认情况下，`.gitignore`
  中的文件列表指的是您计算机独有的内容；例如，`/local.properties` 列出了您计算机上 JDK 的位置。它也可能包含特定于您作为用户的数据，例如
  Firebase 密钥；显然，您不希望将这些信息提交到源代码控制中。另一个例子是 `.DS_Store` 文件，只有您在使用 Mac 时才会拥有它；每次您创建目录时，macOS
  都会创建此文件。此文件对您的项目不重要。


  回到提交对话框窗口，当您单击 `OK` 时，提交窗口中所有（已勾选的）文件都会被*提交*，然后*推送*到远程仓库。


  ## 从 GitHub 打开项目


  您可以通过从远程仓库（如 GitHub）获取项目来恢复项目；在 Git 术语中，这称为“克隆”一个仓库。您执行此操作的基本场景是，当您的某个队友在 GitHub
  上分享了项目仓库，而您也希望在其上工作时。第一步是从远程仓库获取项目。您可以通过两种方式之一完成此操作。


  当您在 Android Studio 中已经打开了一个项目时，您可以转到主菜单栏并选择 `File` ➤ `New` ➤ `Project from Version
  Control` ➤ `Git`。


  您也可以从 Android Studio 欢迎屏幕执行此操作，如图 9-11 所示。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig11_HTML.jpg](img/476822_1_En_9_Fig11_HTML.jpg)


  图 9-11. 欢迎屏幕，Git


  两种方式都可以。下一个屏幕是 Clone Repository 窗口，如图 9-12 所示。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig12_HTML.jpg](img/476822_1_En_9_Fig12_HTML.jpg)


  图 9-12. 克隆仓库


  各字段描述如下：


  - **URL**（网址）：这是仓库的远程 URL。我使用的是 URL `git@github.com:/etc`，因为我通过 SSH 获取项目。我可以这样做，因为我已经在
  GitHub 中设置了 SSH 密钥。如果您尚未设置 SSH 密钥，则可能需要使用 HTTPS URL。您可以在其 GitHub 页面上找到该仓库的 HTTPS
  URL，如图 9-13 所示。单击 `Use HTTPS` 选项以获取 HTTPS URL。

  - **Directory**（目录）：这是您硬盘上要存储项目的位置。


  ### 注意


  GitHub 允许在与仓库交互时使用 SSH 和 HTTPS。GitHub 发布了一些关于何时使用 SSH 或 HTTPS 的指南，请访问 [`bit.ly/sshvshttps`](https://bit.ly/sshvshttps)。如果您想了解更多关于
  Git 协议的信息，可以从 [`bit.ly/gitprotocols`](https://bit.ly/gitprotocols) 获取更多信息。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig13_HTML.jpg](img/476822_1_En_9_Fig13_HTML.jpg)


  图 9-13. 仓库的 GitHub 页面


  要完成克隆过程，请单击 `Clone` 按钮，如图 9-12 所示。现在，您可以像打开 Android Studio 中的任何其他项目一样打开该项目。




  ## 更新 Git 项目


  当项目处于源代码管理之下时，Android Studio 会在你每次创建新文件（无论是 Java 类、XML 文件、图片或其他文件）时给出额外提示。例如，如果你向项目中添加一个新的
  Java 类（在 Git 源代码管理下），你会看到一个类似图 9-14 所示的对话框。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig14_HTML.jpg](img/476822_1_En_9_Fig14_HTML.jpg)


  图 9-14. 将文件添加到 Git


  如果你希望将该文件添加到 Git，当然要按下 `Yes`。如果不小心按了 `No`，你仍然可以通过两种方式添加新文件：


  1.  在项目工具窗口中选择要添加到 Git 的文件，然后从主菜单栏中选择 `VCS` ➤ `Git` ➤ `Add`。

  2.  也可以使用右键菜单，右键点击文件，然后选择 `Git` ➤ `Add`。


  添加文件并不会自动更新远程仓库。要实现这一点，你需要做两件事：*提交*你所做的更改，然后进行*推送*。为此，在项目工具窗口中选择整个项目，如图 9-15 所示，然后从主菜单栏中选择
  `VCS` ➤ `Git` ➤ `Commit Directory`。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig15_HTML.jpg](img/476822_1_En_9_Fig15_HTML.jpg)


  图 9-15. `Git` ➤ `Commit directory`


  接下来，你会看到“提交更改”窗口，如图 9-16 所示。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig16_HTML.jpg](img/476822_1_En_9_Fig16_HTML.jpg)


  图 9-16. 提交并推送更改


  点击 `Commit` 按钮上的下拉箭头，选择 `Commit and Push` 选项。现在，你的本地项目就与远程仓库完全同步了。


  ## 使用其他 Git 仓库


  GitHub 是开发者中非常流行的仓库平台，因此它与 Android Studio 集成得很好也就不足为奇了。但如果你的队友或公司不使用 GitHub 呢？如果他们使用的是
  BitBucket 或其他 Git 仓库呢？别担心，你同样可以处理。在本节中，你将使用 BitBucket 仓库。


  与 GitHub 一样，使用 BitBucket 也需要一个账户。如果你还没有账户，请前往 [`https://bitbucket.org`](https://bitbucket.org)
  注册，然后登录。之后，创建一个新的仓库，如图 9-17 所示。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig17_HTML.jpg](img/476822_1_En_9_Fig17_HTML.jpg)


  图 9-17. 创建仓库


  点击大加号并选择创建新仓库后，系统会要求你填写一些详细信息，如图 9-18 所示。别忘了点击 `Advanced Settings` 选项，以便看到所有字段。


  请注意以下几点：


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig18_HTML.jpg](img/476822_1_En_9_Fig18_HTML.jpg)


  图 9-18. 仓库详细信息


  -   **Repository name**：你的仓库在 BitBucket 上的名称。它不必与你本地计算机上存储的项目名称相同，但保持一致是个好主意。

  -   **Access level**：与 GitHub 不同，即使你不是付费会员，也可以在 BitBucket 中创建私有仓库。

  -   **Include a README**：在项目中包含 `README` 文件是一个好习惯，但这是可选的。

  -   **Version control**：选择 `Git`。

  -   **Description**：用一些词语最好地描述你的项目内容。

  -   **Language**：你正在开发一个 Android 项目，所以填写 `Android`。


  点击 `Create repository` 按钮后，你会看到仓库页面详情，如图 9-19 所示。点击 `Clone` 按钮。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig19_HTML.jpg](img/476822_1_En_9_Fig19_HTML.jpg)


  图 9-19. 新建的 BitBucket 仓库


  在 `Clone this repository` 页面中，你可能会看到 `SSH` 而不是 `HTTPS`。点击下拉按钮切换到 `HTTPS`，如图 9-20
  所示。




  ### 注意


  在将 SSH 密钥提供给 BitBucket 后，你可以使用 SSH 协议作为克隆 BitBucket 中仓库的一种方式。如果你尚未提供，只需使用 HTTPS
  来克隆仓库即可。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig20_HTML.jpg](img/476822_1_En_9_Fig20_HTML.jpg)


  **图 9-20.** 仓库的远程地址


  你的仓库的远程 URL 是以 `https://` 开头并以 `.git` 结尾的那个。如图 9-20 所述，你不需要 `git clone` 这部分，因为这是一个旨在从命令行输入的命令。你不会为
  Git 使用命令行，而是会使用 Android Studio 的功能。


  现在远程仓库已准备就绪，你可以打开一个想要在 BitBucket 上分享的现有项目，或者创建一个新项目，这由你决定。


  一旦你选择好要在 BitBucket 中分享的项目，请执行以下操作：


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig21_HTML.jpg](img/476822_1_En_9_Fig21_HTML.jpg)


  **图 9-21.** 启用版本控制集成


  1. 如果项目尚未打开，请将其打开。

  2. 如果项目尚未受任何源代码控制，请为其启用版本控制。为此，请前往主菜单栏并选择 VCS ➤ Enable Version Control Integration。

  3. 选择 Git 作为版本控制系统，如图 9-21 所示。


  接下来要做的操作是，将此项目与远程仓库关联起来：前往主菜单栏并选择 VCS ➤ Git ➤ Remotes。你应该会看到 Git Remotes 屏幕，如图 9-22
  所示。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig22_HTML.jpg](img/476822_1_En_9_Fig22_HTML.jpg)


  **图 9-22.** Git 远程仓库


  点击图 9-22 中所示的加号。之后，将出现“定义远程”屏幕，如图 9-23 所示。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig23_HTML.jpg](img/476822_1_En_9_Fig23_HTML.jpg)


  **图 9-23.** 定义远程仓库


  复制仓库的远程 URL（请参考图 9-20；我在该图中高亮了远程 URL 仓库）。将其粘贴到“定义远程”屏幕的 URL 字段中，如图 9-23 所示。你需要在下一个屏幕中提供你的
  BitBucket 用户名和密码，如图 9-24 所示。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig24_HTML.jpg](img/476822_1_En_9_Fig24_HTML.jpg)


  **图 9-24.** Git 登录


  接下来要做的操作是*拉取*远程仓库。这是一个谨慎的做法，尤其是在你在 BitBucket 中创建仓库时生成了 README 文件的情况下，因为这可以防止合并冲突。你可以通过主菜单栏进行拉取：前往
  VCS ➤ Git ➤ Pull。你会看到“拉取更改”屏幕，如图 9-25 所示。点击刷新按钮（位于远程文本字段右侧）。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig25_HTML.jpg](img/476822_1_En_9_Fig25_HTML.jpg)


  **图 9-25.** 拉取更改


  在“要合并的分支”字段中，选择 origin/master 选项，然后点击“确定”。


  尝试向你的新项目中添加一些文件。你会注意到，当你向项目中添加一个新文件（例如 `DemoApp.java`）时，Android Studio 会提示你是否要将新文件添加到
  Git 中；参见图 9-26。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig26_HTML.jpg](img/476822_1_En_9_Fig26_HTML.jpg)


  **图 9-26.** 向 Git 添加文件


  你可以通过勾选**记住，不再询问**框来节省一些时间。下次你添加新文件时，Android Studio 会自动将其添加到 Git 中。


  如果你对提示回答了**否**，你仍然可以通过新 Java 文件上的上下文菜单将其添加到 Git。从“项目”工具窗口中选择新的 Java 文件，右键单击，然后转到
  Git ➤ Add。为确保所有项目文件都已添加到 Git，不要在“项目”工具窗口只选择新文件，而应选择整个项目。


  下一步是将你的更改提交到 Git——请记住，所有这些更改仍在本地进行。要使更改反映到远程 BitBucket 仓库中，你必须推送更改。


  要提交更改，请前往主菜单栏并选择 VCS ➤ Git ➤ Commit Directory。你会看到“提交更改”对话框，如图 9-27 所示。你在前一节中看过这个对话框；它与你在使用
  GitHub 时看到的相同。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig27_HTML.jpg](img/476822_1_En_9_Fig27_HTML.jpg)


  **图 9-27.** 提交更改


  请记住，只有已勾选的项目才会被提交到 Git。因此，请注意更改列表。在“提交信息”框中写一些描述性内容，然后点击“提交”按钮。


  当你对本地仓库做了重大更改，并且希望将这些更改反映回远程仓库时，可以执行*推送*操作。为此，请前往主菜单栏并选择 VCS ➤ Git ➤ Push。你会看到“推送提交”屏幕，如图
  9-28 所示。


  ![../images/476822_1_En_9_Chapter/476822_1_En_9_Fig28_HTML.jpg](img/476822_1_En_9_Fig28_HTML.jpg)


  **图 9-28.** 推送提交


  点击“推送”以完成操作。


  这样就完成了。现在你可以克隆一个仓库并将其恢复到本地目录。你还可以向远程仓库添加、提交和推送更改；你现在也知道了如何使本地仓库与远程仓库保持同步。


  ## 章节总结


  - Git 软件未包含在 Android Studio 中，因此你必须单独获取它。你可以从 [`https://git-scm.com/download`](https://git-scm.com/download)
  获取预编译的二进制文件和平台说明。

  - GitHub 与 Android Studio 高度集成。要处理远程 GitHub 仓库，你只需要执行几个步骤。

  - 你可以通过启用项目中的版本控制集成，然后定义远程仓库 URL，来使用其他 Git 平台，例如 BitBucket。


