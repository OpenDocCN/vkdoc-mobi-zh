  \n图 10-10. 导航图\n\n为了测试这个小应用，你需要在起始目的地中有一个能触发动作的对象，比如一个按钮。按如下方式修改两个 Fragment 的布局：\n\
  \n**fragment_one**\n\n*   将布局更改为 `ConstraintLayout` 或任何适合你的布局。\n*   删除 `TextView`，替换为一个按钮并将其居中。\n\
