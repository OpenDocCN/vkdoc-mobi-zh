- "# 10. 导航\n\n*本章内容包括：*\n\n- 回顾 Android 中的导航\n- 导航组件\n\n\n\n## 导航架构组件之前\n\n在 Android\
  \ 早期，如果你的应用有一定复杂度，几乎必然需要将应用划分为多个 Activity。这就意味着你需要掌握从一个 Activity 导航到另一个 Activity\
  \ 并返回的技能。因此，在那些日子里，你可能会编写类似代码清单 10-1 所示的代码。\n\n```\nclass FirstActivity extends\
  \ AppCompatActivity\nimplements View.OnClickListener {\npublic void onClick(View\
  \ v) {\nIntent intent = new Intent(this, SecondActivity.class);\nstartActivity(intent);\n\
  }\n}\n// SecondActivity.java\nclass SecondActivity extends AppCompatActivity { }\n\
  ```\n\n代码清单 10-1. 如何启动一个 Activity\n\n如果需要将数据从一个 Activity 传递到另一个 Activity，你可能需要编写类似代码清单\
  \ 10-2 所示的代码片段。\n\n```\nIntent intent = new Intent(this, SecondActivity.class);\n\
  Intent.putExtra(\"key\", value);\nstartActivity(intent);\n```\n\n代码清单 10-2. 如何向另一个\
  \ Activity 传递数据\n\n这种界面管理方式具有以下优点：\n\n![../images/476822_1_En_10_Chapter/476822_1_En_10_Fig1_HTML.jpg](img/476822_1_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1. 简单的 Activity 工作流\n\n*   实现简单。只需从任意一个 Activity 调用 `startActivity()` 方法。\n\
  *   可以通过编程方式调用 `finish()` 方法关闭当前正在运行的 Activity。用户也可以通过按返回键关闭 Activity。\n*   返回栈完全由\
  \ Android 运行时管理；见图 10-1。\n\n但这并非全是优点；Activity 导航也伴随着一些弊端。其缺点在于：\n\n*   你无法清楚了解返回栈中有哪些\
  \ Activity，因为你并不管理它。这里恰好展示了一个特性同时兼具优点和缺点的例子。\n*   每个屏幕都需要一个新的 Activity，这可能会导致资源消耗较大。\n\
  *   每个 Activity 都需要在 Android 清单文件中声明，不过当你使用向导创建 Activity 时，Android Studio 会自动完成此操作，因此这算不上大问题。\n\
  *   你将难以使用更现代的导航模式，例如底部导航栏。\n\n由于这些限制，出现了另一种屏幕导航方式。2011 年，当 Google 发布 Android 4.0\
  \ 时，我们开始使用*碎片（Fragment）*。如果你已经忘记了 Fragment，可以这样理解：Activity 基本上是一个 UI 的组合单元，而 Fragment\
  \ 则是一个更小的组合单元。\n\nFragment 与 Activity 类似，由两部分组成：一个 Java 或 Kotlin 程序以及一个布局文件。其基本理念相同：在\
  \ XML 文件中定义 UI，然后在运行时加载该 XML 文件，使得 XML 文件中的所有 UI 成为实际的 Java 对象。\n\n其思路是创建多个 Fragment，并将它们包含在单个\
  \ Activity 中。通常，根据用户操作、设备方向或设备外形因素来显示或隐藏 Fragment；这通常通过 `FragmentManager` 和 `FragmentTransaction`\
  \ 对象来完成。如果你之前使用过 Fragment，那么代码清单 10-3 中显示的代码片段可能会让你感到熟悉。\n\n```\nFragmentManager\
  \ fm = getFragmentManager();\nFragmentTransaction ft = fm.beginTransaction();\n\
  Fragment fragment = new FirstFragment();\nft.add(R.id.fragment_container, fragment);\n\
  ft.commit();\n```\n\n代码清单 10-3. Fragment 代码片段\n\n与使用 Activity 导航不同，使用 Fragment 时，你能够确切知道导航栈中的内容；但是，正如你在代码清单\
  \ 10-1 中所见，由于必须手动管理导航栈，这种方式可能会变得繁琐。\n\n到目前为止，你只有两种导航选择：要么使用基于 Activity 的导航，这种方式易于使用但会带来性能开销，并且你无法控制导航栈；要么使用\
  \ Fragment，后者可以完全控制导航栈，但其 API 较为繁琐且容易出错。\n\n时间快进到 2017 年，Google 推出了导航组件。现在，你可以使用\
  \ Fragment 而无需承担复杂 API 带来的负担。使用导航组件，代码清单 10-3 中的所有代码现在都可以替换为代码清单 10-4 所示的一行代码。\n\
  \n```\nfindNavController().navigate(destination);\n// FragmentManager fm = getFragmentManager();\n\
  // FragmentTransaction ft = fm.beginTransaction();\n// Fragment fragment = new FirstFragment();\n\
  // ft.add(R.id.fragment_container, fragment);\n// ft.commit();\n```\n\n代码清单 10-4.\
  \ 导航组件代码片段\n\n\n\n## 导航组件\n\n没错，上一节那行代码引用可能让你既兴奋又松了一口气。但这里的关键并非节省敲击次数，而是你现在能够同时享受基于\
  \ Activity 和基于 Fragment 的导航的优势。现在，Fragment 导航也拥有了简洁的 API。\n\n但首先，你需要对导航组件有所了解。它们是架构组件（Architecture\
  \ Components）的一小部分，而架构组件又隶属于一个名为 Android Jetpack 的更大体系。（我在此不会详细讲解 Jetpack 或架构组件，因为它们涉及范围很广；但简要的背景介绍总归是有益的。）\n\
  \n在 2017 年 Google I/O 大会上，谷歌推出了 Android 架构组件。这些库是一个名为 Android Jetpack 的更大集合的一部分。与架构组件一同推出的还有\
  \ Foundation、Behavior 和 UI 等其他类别。\n\nJetpack 是一个 Android 软件组件集合，旨在让我们的开发工作更轻松。它帮助我们遵循最佳实践，并避免编写过多的样板代码。你可以在\
  \ `androidx.*` 包库中找到 Jetpack 代码。\n\n以下是 Jetpack 组件的简要说明。\n\n**Foundation**\n\n-\
  \ **AppCompat**：让你编写的代码能在较旧版本的 Android 上优雅地降级运行。\n- **Android KTX**：如果你使用 Kotlin，它能让你编写更简洁、更地道的\
  \ Kotlin 代码。\n- **Multidex**：为包含多个 DEX 文件的应用提供支持。\n- **Test**：用于单元测试和运行时 UI 测试的测试框架。\n\
  \n**Behavior**\n\n- **Download manager**：让你编写用于调度和管理大型下载任务的程序。\n- **Media and Playback**：用于媒体播放和路由的向后兼容\
  \ API。\n- **Notifications**：提供向后兼容的通知 API，并支持 Wear 和 Auto。\n- **Permissions**：用于检查和请求应用权限的兼容性\
  \ API。\n- **Preferences**：创建交互式设置界面。\n- **Sharing**：提供适用于应用操作栏的分享操作。\n- **Slices**：创建灵活的\
  \ UI 元素，可在应用外部显示应用数据。\n\n**UI**\n\n- **Animations and Transitions**：实现小部件的移动和屏幕间的过渡。\n\
  - **Auto**：如果你正在开发将在车辆信息娱乐系统中运行的应用，你会需要它。这些组件帮助你为 Android Auto 构建应用。\n- **Emoji**：在较旧的平台上启用更新版本的\
  \ Emoji 字体。\n- **Fragment**：所有 Fragment 代码都已迁移至此。\n- **Layout**：使用不同算法布局小部件。\n-\
  \ **Palette**：从调色板中提取有用信息。\n- **TV**：帮助开发 Android TV 应用的组件。\n- **Wear OS by Google**：如果你想处理\
  \ Android 可穿戴设备（如手表），你会需要它。\n\n**Architecture**\n\n- **Data binding**：声明式地将可观察数据绑定到\
  \ UI 元素。\n- **Lifecycles**：管理 Activity 和 Fragment 的生命周期。\n- **LiveData**：当底层数据库发生变化时通知视图。\n\
  - **Paging**：按需从数据源逐步加载信息。可以想象当用户滚动列表时——它能帮助你处理数据加载。它与 Recycler 视图配合使用。\n- **ViewModel**：以生命周期感知的方式管理与\
  \ UI 相关的数据。\n- **WorkManager**：管理后台任务。\n- **Navigation**：实现应用内的导航。在屏幕间传递数据。提供来自应用外部的深层链接。\n\
  - **Room**：可以将其视为 SQLite 数据库的 ORM。\n\nJetpack 中有很多内容值得探索，请务必了解一下。\n\n回到我们的主题，导航组件简化了应用内各目的地（destinations）之间的导航实现。一个*目的地*是应用中的任何位置。它可以是一个\
  \ Activity、Activity 内的一个 Fragment 或一个自定义视图；目的地通过导航图（navigation graph）进行管理。\n\n导航图将所有目的地分组，并定义目的地之间的不同连接；这些连接被称为*动作（actions）*。该图实际上是一个\
  \ XML 资源文件，代表你应用的所有导航路径。你的应用中可以有多个导航图。\n\n### 使用 Jetpack 导航\n\n为了更好地理解导航组件，最好动手做一个小的项目。因此，如图\
  \ 10-2 所示，在 Android Studio 中创建一个新的空项目。别忘了勾选 `Use AndroidX artifacts`选项。请记住，所有支持库现在都在\
  \ `AndroidX` 包中；你需要它们，因为你将使用 Fragment。\n\n![../images/476822_1_En_10_Chapter/476822_1_En_10_Fig2_HTML.jpg](img/476822_1_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2. 使用 AndroidX 工件创建的新空项目\n\n顺便提一下，如果你还没有更新或升级到最新版本的 Android Studio，现在是个好时机。在撰写本文时，如果你想使用导航，必须使用\
  \ Android Studio v3.3 或更高版本；此外，你还需要将导航组件的依赖项添加到你的项目中。因此，创建项目后，找到模块级别的 `build.gradle`\
  \ 文件并添加条目，如代码清单 10-5 所示。\n\n```\ndependencies {\ndef nav_version = \"2.1.0-alpha02\"\
  \n...\nimplementation \"androidx.navigation:navigation-fragment:$nav_version\"\n\
  implementation \"androidx.navigation:navigation-ui:$nav_version\"\n}\n代码清单 10-5.\
  \ 将导航添加到 build.gradle\n```\n\n添加依赖项后，你需要同步 Gradle 文件。\n\n\n\n### 注意\n\n请记住，你的项目中有两个\
  \ Gradle 文件。你需要编辑模块级别的 Gradle 文件，如图 10-3 所示。\n\n![../images/476822_1_En_10_Chapter/476822_1_En_10_Fig3_HTML.jpg](img/476822_1_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3. `build.gradle`（模块）\n\n同步完成后，向项目添加一个导航图。你可以通过创建新的资源文件来创建导航图：右键单击项目的 `res`\
  \ 文件夹，然后选择“新建 ➤ 资源文件”，如图 10-4 所示。\n\n![../images/476822_1_En_10_Chapter/476822_1_En_10_Fig4_HTML.jpg](img/476822_1_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4. 添加新的资源文件\n\n在“新建资源文件”对话框中，将资源类型更改为“导航（Navigation）”并提供文件名：\n\n*   **文件名**：`nav_graph`\n\
