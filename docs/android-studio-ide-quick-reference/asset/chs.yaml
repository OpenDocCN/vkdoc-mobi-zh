  \n如您所见，布局代码相当简单：它包含一个 `TextView` 和两个按钮。当用户点击它们时，这两个按钮都会调用 `MainActivity` 中的 `onClick()`\
  \ 方法。\n\n```\npublic class MainActivity extends AppCompatActivity {\n    TextView\
