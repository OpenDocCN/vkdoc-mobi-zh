  \n图 10-11. 修改后的 Fragment\n\n接下来，为你的按钮添加一个点击处理器。你将添加代码，使得当按钮被点击时，`fragment_one` 能导航到\
  \ `fragment_two`。\n\n导航到目的地是使用 `NavController` 完成的；它是一个对象，用于管理 `NavHost` 内的应用导航。每个\
