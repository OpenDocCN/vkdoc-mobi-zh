- '# 10. 使用文件封装和包


  本节让您了解除文档之外的数据存储工具。与文档一样，它们都是持久化应用数据的方式，并且所有这些工具（包括文档）在 Cocoa 和 Cocoa Touch 上都受支持。许多工具（包括本书这一部分提到的）在
  Cocoa 及其前身中都有着悠久的历史。如前所述，文档随着时间的推移不断发展，并且在许多方面发生了变化。本节中的工具当然也随着时间的推移发生了变化，但其基本结构却出奇地稳定，因此它们既用于许多遗留应用，也用于当今正在开发的应用。本章中的所有工具都允许您将文件组合成多文件结构，这些结构既可以作为单个结构，也可以作为其组成部分进行操控。




  ## 使用包


  自麦金塔电脑早期起，多文件包就被用于管理文件。在最初的麦金塔文件系统中，文件包含两个称为分支的部分。几乎所有文件都有一个`data fork`（数据分支），许多文件还有一个`resource
  fork`（资源分支）。用户可见的文件主要是数据分支，而资源分支包含数据分支所使用的元素。这些元素通常是警告、图标以及其他可识别或可见的元素。资源分支中的每种元素都有一个名称，通常是四个字符的代码，例如
  `ALRT`（表示警告）、`DLOG`（表示对话框）或 `ICON`。在容器中使用可识别且结构化的元素这一理念，至今仍是 Cocoa 的关键组成部分。


  资源分支的缺点在于，当您将文件复制到其他平台时，资源分支通常会消失；数据分支包含数据，因此在大多数情况下这并非灾难。如今，Cocoa（以及 Cocoa Touch）采用了一种更复杂的方式，将数据封装成一个看似单一的文件。这些被称为包。


  ### 注意


  Swift 包是用于组装代码和管理依赖项的清单。一个常用的工具是 CocoaPods（[`CocoaPods.org`](http://cocoapods.org)）。


  您仍然可以随处见到包，尤其是在开发者工具中。当您在 Xcode 中创建项目时，通常会创建一个包含两个项目的文件夹，如图 10-1 所示。


  ![../images/465467_1_En_10_Chapter/465467_1_En_10_Fig1_HTML.jpg](img/465467_1_En_10_Fig1_HTML.jpg)


  图 10-1


  一个 Xcode 项目包含一个文件和一个文件夹


  在图 10-1 所示的示例中，项目名称为 `iOSDocumentApp`。项目本身位于一个 `xcodeproj` 文件中，该文件包含对 `iOSDocumentApp`
  文件夹的引用。打开的文件夹如图 10-2 所示。请注意，该文件夹内包含单独的文件，以及包含更多文件和文件夹的子文件夹。


  ![../images/465467_1_En_10_Chapter/465467_1_En_10_Fig2_HTML.jpg](img/465467_1_En_10_Fig2_HTML.jpg)


  图 10-2


  项目文件夹包含子文件夹和文件


  如果您在 Finder 中按住 Control 键并点击某个文件或文件夹，您将看到该文件或文件夹作为包的内容。如图 10-3 所示。


  ![../images/465467_1_En_10_Chapter/465467_1_En_10_Fig3_HTML.jpg](img/465467_1_En_10_Fig3_HTML.jpg)


  图 10-3


  使用 Control 键查看文件包内部


  请注意，并非所有文件或文件夹都是包，因此 Control 键无法打开它们。然而，重要的是要了解您的 Xcode 项目是一个文件包。如果您将文件夹移开，使其与引用它的
  `xcodeproj` 文件分离，将会破坏项目包。


  在文件包内部，内容通常按结构组织，包含一个 `Contents` 文件夹，其中包含子文件夹，如图 10-4 所示。大多数应用程序都有一个 `Contents`
  文件夹。


