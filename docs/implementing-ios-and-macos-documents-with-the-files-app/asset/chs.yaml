- "# 2. 深入文档内部\n\n在第 1 章中，你已经学习了如何描述和构建文档。现在你明白，作为应用程序及其文档的设计者和开发者，你控制着哪些数据被存储、存储的位置和方式，以及如何识别和引用这些数据。\n\
  \n你可以决定将数据存储为整数序列或单个长字符串，这完全取决于你和你要使用的数据。实际上，在文档内部对数据进行结构化是有意义的，哪怕只是为了能够轻松访问。本章展示了如何使用\
  \ JSON 编码来组织文档内部的数据。这种结构和编码为依赖 Unicode 字符串的数据提供了一种易于使用的格式，这些字符串可以表示 JSON 所识别的基本类型。\n\
  \n## 使用 JSON 编码\n\n对 JSON 而言，最重要的是其格式基于文本（与二进制或数字表示相反），并且每个元素都可以被命名（而不是通过位置或顺序来标识）。\n\
  \n基于位置或顺序的编码风格允许你在编码序列中指定每个元素的格式。了解元素的格式意味着你知道它将占用多少空间，这让你可以使用任何编程语言中的标准读/写语法来读取或写入数据。\n\
  \n基于顺序或位置的编码的缺点是，如果你更改了数据元素的顺序或数据元素的格式，就会破坏你已有的任何读/写代码。JSON 编码依赖于数据元素的名称，而不是它们的格式或顺序。因此，当你修改单个数据元素的格式或更改数据元素的顺序时，可以避免经常破坏读/写代码的问题。\n\
  \n## 介绍 JSON\n\nJSON 最初是一种用于序列化结构化数据的文本格式。从这个意义上说，*序列化* 意味着将字符串或其他对象转换为可读或可写的格式。JSON\
  \ 从四种基本类型开始，这些类型在许多编程语言中都有常见含义：\n\n-   *字符串* 是 Unicode 字符的有序集合。\n-   *数字* 就是数字；最基本的\
  \ JSON 数字是双精度浮点数。\n-   *布尔值* 是 true 或 false。\n-   JSON 中的最后一个基本值是 *null*，一个没有值的对象。\n\
  \n在 JSON 中，这些类型可以组合成 *对象*，对象是名称/值对的无序集合；JSON *数组* 是名称/值对的有序集合。\n\n## JSON 与 Swift\n\
  \nSwift 通过其 `JSONSerialization` 类（属于 Foundation 框架的一部分）超越了基本的 JSON 类型。`JSONSerialization`\
  \ 除了基本的 JSON 字符串、数字和布尔数据类型外，还将 JSON 转换为 Swift 数组和字典数据类型。\n\n### 注意\n\nSwift 将布尔和\
  \ bool（C 语言）类型桥接为布尔类型。这为你自动处理。\n\n### 使用 Swift 结构体\n\nJSON 是一种灵活且易于使用的标记工具。另一方面，Swift\
  \ 被设计为构建应用程序的强大工具，特别是那些使用模型-视图-控制器（MVC）设计模式的应用程序，其复杂程度超过了 JSON。Swift 结构体类型就是一个很好的例子。你可能会在\
  \ Swift 中声明一些将在整个应用程序中使用（或根本不使用）的结构体。当你严格使用 JSON 时，声明一个不用于存储数据的结构体并不常见。本节将解释如何创建和将\
  \ Swift 结构体与 JSON 一起使用。\n\n代码清单 2-1 展示了如何使用 playground 为 `Student` 对象或模型（本节中这两个术语可以互换）创建\
  \ Swift 结构体。\n\n```\nimport Foundation\nstruct Student {\n    var name: String\n\
  \    var studentID: Int\n}\n// 代码清单 2-1\n// Swift 结构体\n```\n\n这里重要的是 `Student` 结构体包含两个变量元素：`name`\
  \ 和 `studentID`。同样值得注意的是，在这个 playground 中必须导入 Foundation 框架，因为它将用于处理 JSON 数据。结构体的其他元素是标准的\
  \ Swift 元素。\n\n### 提示\n\n请注意，Swift 的风格是结构体等对象名称的首字母大写，因此 `Student` 结构体的名称是大写的。\n\
  \n使用代码清单 2-1 中所示的结构体，你可以使用如下代码创建该结构体的实例：\n\n```\nlet student1 = Student(name: \"\
  John Appleseed\", studentID: 154)\n```\n\n你可以通过使用 `encode(to: encoder)` 函数来编码数据，以及使用\
  \ `init(from decoder:)` 函数来执行反向操作，从而将 JSON 与 Swift 集成。为此，你需要创建键来标识将要编码和解码的元素。第一步是声明编码键作为\
  \ `enum CodingKeys` 元素，如代码清单 2-2 所示。\n\n```\nenum CodingKeys: String, CodingKey\
  \ {\n    case studentID = \"studentID\"\n    case name\n}\n}\n// 代码清单 2-2\n// 编码键的\
  \ Swift 扩展\n```\n\n请注意，这些是你将用来对 `name` 和 `studentID` 变量的数据进行编码和解码的键。在建立了键和变量之后，你现在可以创建一个\
  \ `encode(to: encoder)` 函数，如代码清单 2-3 所示。请注意，此扩展表明 `Student` 结构体遵循 `Encodable` 协议。\n\
  \n```\nextension Student: Encodable {\n    func encode(to encoder: Encoder) throws\
  \ {\n        var container = encoder.container(keyedBy: CodingKeys.self)\n     \
  \   try container.encode(name, forKey: .name)\n        try container.encode(studentID,\
  \ forKey: .studentID)\n    }\n}\n// 代码清单 2-3\n// 编码的 Swift 扩展\n```\n\n### 编码 JSON\n\
  \n你需要一个 `JSONEncoder` 对象来处理编码。这样的 `JSONEncoder` 对象通常命名为 `jsonEncoder`，但你可以使用任何你想要的名称。`JSONEncoder`\
  \ 对象指定了编码数据的容器。\n\n在代码清单 2-3 中，只有一个函数 `encode(to: encoder)`，它使用了一个 `jsonEncoder`\
  \ 对象，该对象是包含从编码器获取的编码数据的容器。\n\n`encode(to: encoder)` 函数的核心由三行编码结构体元素（`name` 和 `studentID`）的代码组成。\n\
  \n第一行代码尝试使用 `.name` 键编码 `name` 变量：\n\n```\ntry container.encode(name, forKey: .name)\n\
  ```\n\n第二行代码尝试使用 `.studentID` 键编码 `studentID` 变量：\n\n```\ntry container.encode(studentID,\
  \ forKey: .studentID)\n```\n\n这几行代码经常出现在这类函数中。如果你想知道 `try` 是如何处理的，请注意 `func encode(to\
  \ encoder: Encoder)` 函数可能会抛出错误。\n\n### 提示\n\n如果你正在调试这段代码，请在 `try` 语句处设置断点，以便查看导致问题的原因。你在此代码中可能遇到的典型问题是键名称的拼写错误。\n\
  \n一旦你创建了一个 `jsonEncoder`，你就可以引用它内部的容器，并将其与你在此函数的其他地方声明的键关联起来，使用的代码行如下：\n\n```\n\
  var container = encoder.container(keyedBy: CodingKeys.self)\n```\n\n\n\n### 解码 JSON\n\
  \n清单 2-4 展示了执行反向操作以解码 JSON 代码的过程。\n\n```\nextension Student: Decodable {\ninit(from\
  \ decoder: Decoder) throws {\nlet values = try decoder.container(keyedBy: CodingKeys.self)\n\
  name = try values.decode(String.self, forKey: .name)\nstudentID = try values.decode(Int.self,\
  \ forKey: .studentID)\n}\n}\n清单 2-4\n解码扩展\n```\n\n这段代码的核心是 `init(from decoder: Decoder)`\
  \ 方法，而不是 `encode(to: encoder:)` 函数。\n\n你可以使用编码键从 `decoder` 容器中检索值，如下所示：\n\n```\n\
  let values = try decoder.container(keyedBy: CodingKeys.self)\n```\n\n然后，你不是对每个变量和键进行编码，而是使用如下代码对其进行解码：\n\
  \n```\nname = try values.decode(String.self, forKey: .name)\nstudentID = try values.decode(Int.self,\
  \ forKey: .studentID)\n```\n\n### 整合编码与解码\n\n你可以根据需要随意对数据进行编码和解码。为了调试的目的，你可以使用如下代码打印出编码后的数据：\n\
  \n![../images/465467_1_En_2_Chapter/465467_1_En_2_Figa_HTML.jpg](img/465467_1_En_2_Figa_HTML.jpg)\n\
  \n你可以打印出一个显示 JSON 代码的字符串：\n\n![../images/465467_1_En_2_Chapter/465467_1_En_2_Figb_HTML.jpg](img/465467_1_En_2_Figb_HTML.jpg)\n\
  \n然后，你可以反转这个过程来打印解码后的数据，如下所示：\n\n![../images/465467_1_En_2_Chapter/465467_1_En_2_Figc_HTML.jpg](img/465467_1_En_2_Figc_HTML.jpg)\n\
  \n### 注意\n\n为了调试，你可能希望将本节中的代码添加到你的应用中，这样你就可以使用断点来验证数据的编码和解码。通常，一旦代码正常工作且键值正确，你就可以禁用甚至移除这些断点。\n\
  \n## 总结\n\n本章向你展示了如何对 JSON 数据和 Swift 结构体之间进行编码和解码。由于你将使用命名的 Swift 对象进行处理，因此无需担心数据的顺序或格式问题。\n\
  \n"
- '# 3. 将文档与文档格式匹配


  在本章中，你将学习如何将应用代码中描述和定义的文档与实际运行的文档对象进行匹配。这是让文档发挥作用的核心。本章涵盖你需要处理的三个基本点：


  -   为 iCloud 做准备

  -   在你的应用中设置文档

  -   管理文档类型


  ## 为 iCloud 做准备


  你可能会想 iCloud 与文档有什么关系，但答案非常简单。随着你开始使用 iOS 和 macOS 的更多功能，你会发现网络连接和 iCloud 已不再是特例。你和你的用户将越来越多地发现，iCloud
  和网络对于设备的正常运行至关重要。这花了很长时间，但现在可以肯定地说，我们确实拥有了网络连接。


  我们不仅在大多数情况下拥有网络连接，而且用户和开发者也越来越习惯于管理这种连接。当出于某种原因需要离线时，开发者和用户都会切换到飞行模式。（这与过去需要分别调整蓝牙、数据访问和其他连接的常见做法相比，是一个巨大的简化。）


  由于 iCloud 连接如今已非常普遍，许多开发者将其包含在应用的功能设置中。图 3-1 显示了一个 macOS 应用的 iCloud 功能。


  ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig1_HTML.jpg](img/465467_1_En_3_Fig1_HTML.jpg)


  图 3-1 为 macOS 应用设置 iCloud


  iCloud 服务可以通过复选框开启或关闭。请注意，可以在此处启用 iCloud 文档。同样重要的是要注意，CloudKit 和键值存储都可以与文档一起使用。你将在第
  9 章中了解更多关于文档与键值存储结合使用的知识。


  对于一个 iOS 应用，图 3-2 显示了云功能设置。


  ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig2_HTML.jpg](img/465467_1_En_3_Fig2_HTML.jpg)


  图 3-2 为 iOS 应用设置 iCloud


  请注意，尽管 iOS 应用有更多可用的选项，但 iCloud 选项的部分对于 iOS 和 macOS 应用来说是相同的。因此，iCloud 数据与这两个环境都兼容。


  ## 在你的应用中设置文档


  在 iOS 和 macOS 中设置和使用文档存在差异；然而，图 3-3 和图 3-4 所示的基本设置非常相似。图 3-3 展示了 iOS 应用的文档设置，图 3-4
  展示了 macOS 应用的文档设置。


  ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig3_HTML.jpg](img/465467_1_En_3_Fig3_HTML.jpg)


  图 3-3 在 iOS 中设置文档


  在 macOS 中设置文档非常相似，如图 3-4 所示。


  ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig4_HTML.jpg](img/465467_1_En_3_Fig4_HTML.jpg)


  图 3-4 在 macOS 中设置文档


  ## 管理文档类型


  一个应用可以打开许多不同的文档，具体取决于你构建应用和文档的方式。每种类型的文档（不是每个具体的文档）都在你的信息属性列表中定义为一个文档类型，如图 3-5 所示。


  请注意，文档类型有一个名称。在图 3-5 中，该名称是“图像”；文档类型名称是描述性的，并由你的应用内部使用。


  一个文档类型可以处理多种类型的内容。Apple 使用统一类型标识符 (UTI) 来标识标准类型。你也可以创建自己的类型。尽可能使用标准类型会让你的应用更易用，因为用户可以读取和写入任何符合支持的
  UTI 标准的文件。


  例如，图 3-5 显示，“图像”文档类型可以处理任何符合 `public.image` UTI 规范的文档。本章后面会有更多关于数据类型的内容。目前，只需知道在以此应用（使用“基于文档的
  App iOS 项目”模板构建）中定义的“图像”数据类型符合一个名为 `public.image` 的标准图像格式，而该格式又符合 `public.data`
  和 `public.content` 这两个 UTI。


  ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig5_HTML.jpg](img/465467_1_En_3_Fig5_HTML.jpg)


  图 3-5 iOS 的“图像”数据类型


  思考 UTI 的最简单方式是：


  -   **文档类型** 是你的应用可以打开的文档类型。

  -   **导出的 UTI** 是你的应用控制并能导出的文档类型（简单来说，就是你的应用写入的 UTI）。

  -   **导入的 UTI** 是你的应用读取的文档类型。它们由其他应用控制并由其导出。


  图 3-5 显示了一个 iOS 应用的文档类型。macOS 中使用的文档类型有不同的设置。一些差异围绕这样一个事实：在 macOS 中，文档类型用于确定哪个应用打开该文档类型。在
  iOS 中，处理方式有所不同。


  图 3-6 显示了 macOS 的文档类型。


  ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig6_HTML.jpg](img/465467_1_En_3_Fig6_HTML.jpg)


