- "# 7. 在 iOS 上实现文档：UIDocument 和 UIDocumentBrowserViewController\n\n文档是许多 App 的关键组成部分，从个人电脑时代开始便是如此。许多人仍然认为文档是基于纸张的物件，但如今人们在\
  \ iOS 和 macOS 上处理的文档，远比其纸质前辈复杂得多。本章将介绍当今的文档及其结构，然后解释如何使用 `UIDocumentBrowserViewController`\
  \ 来管理文档。\n\n## 创建一个基于文档的 App\n\n正如 Xcode 中框架的基本构建模块通常的情况一样，在 iOS 上开始使用文档的最简单方法是使用\
  \ Xcode 内置的“基于文档的 App”项目模板。首先创建一个新的 iOS 项目，如图 7-1 所示。\n\n![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig1_HTML.jpg](img/465467_1_En_7_Fig1_HTML.jpg)\n\
  \n**图 7-1.** 在 Xcode 中选择“基于文档的 App”模板\n\n按照图 7-2 所示的标准选项进行设置，以完成模板配置。\n\n![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig2_HTML.jpg](img/465467_1_En_7_Fig2_HTML.jpg)\n\
  \n**图 7-2.** 为新项目设置选项\n\n继续完成选项，直到项目模板设置完毕，如图 7-3 所示。\n\n![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig3_HTML.jpg](img/465467_1_En_7_Fig3_HTML.jpg)\n\
  \n**图 7-3.** 查看新项目\n\n完成后，运行该 App。（当你从模板创建新项目时，这是一个应始终执行的步骤。除了诸如网络可用性之类的问题外，你的新项目模板应该能够正常运行。）\n\
  \n如图 7-4 所示，你可以打开项目，看到包含两个视图控制器的 Storyboard。\n\n![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig4_HTML.jpg](img/465467_1_En_7_Fig4_HTML.jpg)\n\
  \n**图 7-4.** 查看 Storyboard\n\n运行项目。你应该会看到模拟器，如图 7-5 所示。\n\n![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig5_HTML.jpg](img/465467_1_En_7_Fig5_HTML.jpg)\n\
  \n**图 7-5.** 运行 App\n\n继续探索你的新 App。使用“浏览”标签页来浏览 App 沙盒中的文件，如图 7-6 所示。\n\n![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig6_HTML.jpg](img/465467_1_En_7_Fig6_HTML.jpg)\n\
  \n**图 7-6.** 在 App 中探索“浏览”标签页\n\n目前那里没有文件，但有一个“创建文档”按钮。试试看！\n\n什么也没发生。\n\n是时候进入本章的下一节了，该节将介绍\
  \ `UIDocument`。除其他任务外，你将了解如何实现“创建文档”按钮。\n\n### 介绍 UIDocument\n\niOS 中的基本文档类是 `UIDocument`。`UIDocument`\
  \ 通过以下方式提供文档的基本功能：\n\n* **fileURL**：`UIDocument` 使用文件 URL 来标识文档，以便你的 App 能够定位它进行读写。\n\
  * `UIDocument` 在后台队列上管理**异步读写**数据，而你只需付出极少的努力。\n* `UIDocument` 还使用**云服务**（例如 `iCloud`）来协调文档文件的读写。\n\
  * `UIDocument` 还管理你文档的**冲突和版本变更**。\n\n这些是 `UIDocument` 的基本组成部分。为了开始使用文档，你可以使用“基于文档的\
  \ App”模板中提供的基本代码。项目模板中的基本代码提供了 `fileURL`（文档标识）的功能，以及关键的读写特性、云服务以及冲突和变更的管理功能。\n\n\
  \n\n## 使用 UIDocument\n\n使用 `UIDocument` 的关键组件包括负责读取、写入和创建文档的类 `UIDocument`，以及负责浏览和用户界面交互（即读取、写入和创建文档的界面部分）的类\
  \ `UIDocumentBrowserViewController`。要完善 `UIDocument` 的基本功能，还需要实现 `UIDocumentViewController`。\n\
  \n`UIDocument` 为你处理了大量文档管理工作，包括保存文档、管理变更等许多关键功能。你可以通过研究文档来了解其所有特性，但也可以使用本章基于文档的\
  \ App 模板中包含的 `UIDocument` 精简功能。实际上，该模板的基本代码（见图 7-7 和代码清单 7-1）是一个绝佳的起点。对于许多基础应用来说，只需这些代码，再加上一两行应用特定的代码，就完全足够了。\n\
  \n![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig7_HTML.jpg](img/465467_1_En_7_Fig7_HTML.jpg)\n\
  \n**图 7-7.** 基本的 `UIDocument` 功能\n\n```\n//\n//  Document.swift\n//  Document1\n\
  //\n//\nimport UIKit\n\nclass Document: UIDocument {\n    override func contents(forType\
  \ typeName: String) throws -> Any {\n        // 使用 NSData 或 NSFileWrapper 实例编码你的文档\n\
  \        return Data()\n    }\n    override func load(fromContents contents: Any,\
  \ ofType typeName: String?) throws {\n        // 从 contents:ofType:) 加载你的文档\n  \
  \  }\n}\n```\n\n**代码清单 7-1** 基本代码\n\n你需要首先实现的函数是 `contents(forType:)`。当你确定文档中数据的格式后，需要指定其类型，该类型将用于读取和写入文档数据。通常，文档文件的类型是基本的\
  \ Swift 或 Objective-C 类型，例如 `NSData`。如果你使用 `NSData`，则需要负责将文档数据转换为 `NSData` 或你正在使用的任何其他类型。\n\
  \n其配套函数是 `load(fromContents:ofType:)`。这两个函数让你能够读取或写入通用格式的数据，然后将其转换为你的应用可以管理的数据。\n\
  \n如果你深入研究 `UIDocument` 的代码，你会发现它在这两个函数 `contents(forType:)` 和 `load(fromContents:ofType:)`\
  \ 的基本结构内处理了异步读写、云数据协作以及变更管理等所有功能。\n\n## 使用 UIDocumentViewController\n\n一旦你设置好了文档，就需要添加一个视图控制器，以便查看和操作内容。在基于文档的\
  \ App 项目模板中，文档控制器是按照图 7-8 所示创建的。\n\n![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig8_HTML.jpg](img/465467_1_En_7_Fig8_HTML.jpg)\n\
  \n**图 7-8.** `DocumentViewController`\n\n相关代码如代码清单 7-2 所示。\n\n```\nclass DocumentViewController:\
  \ UIViewController {\n    @IBOutlet weak var documentNameLabel: UILabel!\n    var\
  \ document: UIDocument?\n\n    override func viewWillAppear(_ animated: Bool) {\n\
  \        super.viewWillAppear(animated)\n        // 访问文档\n        document?.open(completionHandler:\
  \ { (success) in\n            if success {\n                // 显示文档内容，例如：\n    \
  \            self.documentNameLabel.text = self.document?.fileURL.lastPathComponent\n\
  \            } else {\n                // 务必妥善处理导入失败的情况，\n                // 例如，向用户显示错误信息。\n\
  \            }\n        })\n    }\n\n    @IBAction func dismissDocumentViewController()\
  \ {\n        dismiss(animated: true) {\n            self.document?.close(completionHandler:\
  \ nil)\n        }\n    }\n}\n```\n\n**代码清单 7-2** 文档视图控制器代码\n\n`DocumentViewController`\
  \ 类中有两个函数：`viewWillAppear(_:)` 和 `dismissDocumentViewController()`。前者负责打开文档，后者负责关闭文档。\n\
  \n### 打开文档\n\n打开文档是使用完成处理器的 Swift 异步编程风格的一个很好的例子。代码如下：\n\n```\ndocument?.open(completionHandler:\
  \ { (success) in\n    if success {\n        // 显示文档内容，例如：\n        self.documentNameLabel.text\
  \ = self.document?.fileURL.lastPathComponent\n    } else {\n        // 务必妥善处理导入失败的情况，\n\
  \        // 例如，向用户显示错误信息。\n    }\n})\n```\n\n在文档对象上调用 `open` 方法（注意它是一个可选类型，用 `?`\
  \ 进行解包）。完成处理器在 `open` 函数中声明，并在 `open` 操作完成时被调用。完成处理器接收一个参数。通常（但并非强制）这个参数被命名为 `success`，它是一个布尔值，用于指示\
  \ `open` 操作是否成功。\n\n然后，完成处理器执行以下代码：\n\n```\nif success {\n    // 显示文档内容，例如：\n  \
  \  self.documentNameLabel.text = self.document?.fileURL.lastPathComponent\n} else\
  \ {\n    // 务必妥善处理导入失败的情况，例如，\n    // 向用户显示错误信息。\n}\n```\n\n如果文档成功打开，故事板中的一个标签会被赋予文件\
  \ URL 的 `lastPathComponent`。（你可以在图 7-4 的右侧看到这一点）。对于大多数应用，你实际上会在界面中显示文档的一些内容。\n\n\
  > **注意：** 打开文档的完成处理器是提升应用性能的一种重要方式。当你处理可能存储在云端的文档和文件时，执行完成处理器（无论成功与否）的延迟可能会很明显。在测试应用时请牢记这一点。\n\
  \n### 关闭文档\n\n关闭文档使用了与 `dismissDocumentViewController` 类似的结构。然而，请注意应用中的完成处理器为 nil。如果你不需要处理已更改的数据，除了关闭文档之外，无需执行任何其他操作。\n\
  \n## 使用 UIDocumentBrowserViewController\n\n`UIDocumentBrowserViewController` 是基于文档的应用的核心。本节将概述其工作流程。主要有两条路径：创建新文档或打开现有文档（你可能需要回看图\
  \ 7-5 和 7-6）。\n\n### 加载 UIDocumentBrowserViewController\n\n使用 `UIDocumentBrowserViewController`\
  \ 的第一步是加载它，如图 7-9 所示。\n\n![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig9_HTML.jpg](img/465467_1_En_7_Fig9_HTML.jpg)\n\
  \n**图 7-9.** 加载 `UIDocumentBrowserViewController`\n\n请注意，你的 `UIDocumentBrowserViewController`\
  \ 子类还应遵守 `UIDocumentBrowserViewControllerDelegate` 协议。你可以在图 7-9 的第 12 行看到这一点。作为额外参考，代码如下：\n\
  \n```\ndelegate = self\n```\n\n你可以在此处设置浏览器可视样式的选项，使其与你的用户界面协调一致。其他初始化工作可以在你的 `info.plist`\
  \ 中处理。\n\n> **注意：** 关于 `info.plist` 的更多信息，请参阅第 3 章。\n\n请注意，`viewDidLoad` 让你可以通过第\
  \ 19 行来决定是否可以创建文档：\n\n```\nallowsDocumentCreation = // true 或 false\n```\n\n加载 `UIDocumentBrowserViewController`\
  \ 后，你通常需要实现四个函数，这些函数在图 7-9 中显示为存根（stubs）。这些函数是：\n\n- `documentBrowser(_:didRequestDocumentCreationWithHandler:)`\
  \ 用于创建新文档\n- `documentBrowser(_:didPickDocumentAt:)` 用于打开现有文档\n- `documentBrowser(_:didImportDocumentAt:toDestinationURL:)`\
  \ 用于在打开文档后，显示其内容\n- `documentBrowser(_:failedToImportDocumentAt:error:)` 用于处理错误\n\
  \n\n\n### 创建文档\n\n你可以使用模板来创建新文档。如文档所述，你可以让用户选择将几个基本文档中的哪一个作为模板。参见图 7-10。\n\n![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig10_HTML.jpg](img/465467_1_En_7_Fig10_HTML.jpg)\n\
  \n**图 7-10.** 创建文档\n\n在许多旧的设计模式中，你会选择创建一个空白文档，然后可能用数据对其进行修改。iOS 中最常用的设计模式并非创建文档，而是从你的\
  \ bundle 中复制一个现有的模板文档，并将副本放置在你的应用的适当位置。这是一种不同的工作流程，但随着你不断创建和修改应用，它会变得更高效。\n\n清单\
