  ## 总结


  本章展示了如何使用内置的用户默认偏好设置和/或“设置”应用来存储应用的值。这些值必须能够存储在属性列表中，且不应是大型数据对象，但除了构建大规模数据管理器之外，您可以将它们用于多种目的。


