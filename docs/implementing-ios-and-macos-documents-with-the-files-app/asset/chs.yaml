  查看你创建的应用内部以了解其工作原理是个好主意。（这将帮助你在开发应用时对其进行修改。）


  从项目模板开始时，应用的主要组件如下：


  * `AppDelegate`：功能上与你在 iOS 应用中使用的 `AppDelegate` 类似。

  * `ViewController`：这是一个视图控制器（名为 `ViewController`），其工作方式与 iOS 应用中的视图控制器类似。

  * `Document`：这是 `NSDocument` 类的一个子类。


