    Source code of a property list


    As you can see in Figure [3-7](#465467_1_En_3_Chapter.xhtml#Fig7), a property
    list is easy to display in XML. The formatting that you see in Figure [3-7](#465467_1_En_3_Chapter.xhtml#Fig7)
    is generated by Xcode. Property lists can also be formatted directly from XML
    in tools such as Excel and BBEdit. A property list displayed in Xcode can be formatted
    as shown in Figure [3-8](#465467_1_En_3_Chapter.xhtml#Fig8).


    ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig8_HTML.jpg](images/465467_1_En_3_Chapter/465467_1_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Formatted property list in Xcode


    Note that with formatting, the property list is a bit easier to read, but remember
    that it is still the basic XML-based property list shown previously in Figure
    [3-7](#465467_1_En_3_Chapter.xhtml#Fig7).


    When you look at the project navigator, you can open any of the files using Control-click.
    For property lists, you are given a choice of the formatting options shown in
    Figure [3-9](#465467_1_En_3_Chapter.xhtml#Fig9).


    ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig9_HTML.jpg](images/465467_1_En_3_Chapter/465467_1_En_3_Fig9_HTML.jpg)


    Figure 3-9


    Choosing a formatting option for a file in the Xcode project navigator


    Figure [3-10](#465467_1_En_3_Chapter.xhtml#Fig10) shows the choices under the
    Open As option.


    ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig10_HTML.jpg](images/465467_1_En_3_Chapter/465467_1_En_3_Fig10_HTML.jpg)


    Figure 3-10


    Viewing a property list


    Source code formatting of a property list is shown in Figure [3-7](#465467_1_En_3_Chapter.xhtml#Fig7);
    the property list format is shown in Figure [3-8](#465467_1_En_3_Chapter.xhtml#Fig8).


    If you refer back to Figures [3-5](#465467_1_En_3_Chapter.xhtml#Fig5) and [3-6](#465467_1_En_3_Chapter.xhtml#Fig6),
    you’ll see in both of them a formatted property list at the top of the figure
    (remember that you can open it with a Control-click of the property list in the
    project navigator).


    Beneath the formatted property lists in Figures [3-5](#465467_1_En_3_Chapter.xhtml#Fig5)
    and [3-6](#465467_1_En_3_Chapter.xhtml#Fig6) is yet another representation of
    the property list: it’s simple to refer to it as a UI version. They are the versions
    shown for property types and other settings.


    What matters is that all of the formatting you see in Figures [3-5](#465467_1_En_3_Chapter.xhtml#Fig5)
    and [3-6](#465467_1_En_3_Chapter.xhtml#Fig6) is based on the raw property list.
    The different UI formats can make it easier to work with the documents you want
    to handle in macOS or iOS. However, remember that the underlying property list
    (`info.plist`) is what matters. It is generally easier to work with the UI-formatted
    versions, but to be absolutely certain what you are doing, it is safest to go
    back to the source code of `info.plist` to see exactly what is going on.


    ## Summary


    Document types are used to match a document and its contents to a subclass of
    `UIDocument` or `NSDocument`. UTIs are used to identify documents that may be
    used by various apps and documents. In this chapter, you also explored the structuring
    and setting up of iCloud for documents and the use of property lists with files
    and documents.


    # 4. Securing and Protecting Data


    As soon as you start thinking about saving data, you should be thinking about
    the security of that data. Every step of the process from deciding what data to
    store and what rules to implement for safeguarding that data needs to be considered.
    This chapter focuses on these issues.


    ## Security and Privacy Overview


    As pointed out at the beginning of Chapter [1](#465467_1_En_1_Chapter.xhtml),
    we use documents to store and organize the data that we use in apps. There are
    two fundamental types of data that we organize into documents: data that is distributed
    with the app, and data that users create and modify. The second type, which is
    data that users create and modify, may include data distributed with the app.


    No matter what type of data is involved, if you are building or designing an app,
    you need to be aware of data issues that may arise. Until fairly recently, data
    issues were fairly modest in apps. Some data was clearly sensitive, but most data
    in apps required no special handling. Users and developers took frequent refuge
    behind the notion that “no one will care about our data.” Data such as personal
    identification numbers was clearly sensitive; developers and users often handled
    security for such data by adding a disclaimer or note in the documentation.


    All of this started changing as massive data breaches were reported in a variety
    of systems. Best practices for the handling of sensitive data (or data that *might*
    be or become sensitive) were formulated.


    In response to media reports and general awareness of data security, laws and
    regulations have begun to be implemented. For example, in the European Union (EU),
    the General Data Protection Regulation (GDPR) came into effect on May 25, 2018.


    As new laws, regulations, and best practices take effect and become part of everyday
    operations, it behooves people who deal with data to understand how to implement
    these new practices in the modern data environment. This chapter provides a case
    study of a very simple use of private data and how it can be accidentally destroyed
    by simple or careless use. You can use this case study to guide you in your use
    of private data and privacy implementation.'
