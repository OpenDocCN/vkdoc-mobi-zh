    首先请记住，iOS 中的“设置”访问的是 Cocoa 内置的默认数据库。该数据库由`UserDefaults`类对象（不是实例，是类本身）管理。`UserDefaults`（类对象）有一个函数，可以通过`standard`属性返回共享的默认对象。如前所述，`UserDefaults`中的每个项都有一个键，您可以使用如下代码进行访问：


