    # 查看最近文档


    使用窗口底部的标签页，你可以在最近的文件和文件夹以及想要浏览的内容之间切换。图 6-6 展示了最近的文件和文件夹。


    ![../images/465467_1_En_6_Chapter/465467_1_En_6_Fig6_HTML.jpg](img/465467_1_En_6_Fig6_HTML.jpg)


    **图 6-6.** 最近的文件和文件夹


    如果你的某些文档尚未从远程服务器下载，你会看到如图 6-7 所示的云图标，表示它们正在等待下载。如果你点按某个特定文件，可以加快其下载进程。


    ![../images/465467_1_En_6_Chapter/465467_1_En_6_Fig7_HTML.jpg](img/465467_1_En_6_Fig7_HTML.jpg)


    **图 6-7.** 正在下载文件


    请注意，除了指示文件是否需要下载，你还可以看到它的位置。例如，在图 6-7 的右下角，你可以看到一个被标记为 `On My iPad` 而非 `iCloud
    Drive` 的文档。


    ### 提示


    习惯使用“文件”App 并利用文件位置信息和下载状态。因为下载的调度和处理通常会有时间延迟，如果你知道哪些文件在何处，就能避免花时间去调试那些仅仅是时间同步问题导致的问题，从而节省时间。


    ## 查看某个 App 的文件和文件夹


    当你在 iOS 设备上查看 App 时，可以长按一个应用图标来查看可能属于它的文件和文件夹，如图 6-8 所示。


    ![../images/465467_1_En_6_Chapter/465467_1_En_6_Fig8_HTML.jpg](img/465467_1_En_6_Fig8_HTML.jpg)


    **图 6-8.** 长按应用图标查看其文件


    如有必要，右上角会出现一个“显示更多”按钮，如图 6-8 所示。当你使用“显示更多”时，会伴随出现一个“显示更少”按钮，如图 6-9 所示。


    ![../images/465467_1_En_6_Chapter/465467_1_En_6_Fig9_HTML.jpg](img/465467_1_En_6_Fig9_HTML.jpg)


    **图 6-9.** “显示更少”选项


    当你在“文件”App 中查看应用时（图 6-7），你会看到文件和文件夹的列表，如图 6-10 所示。


    ![../images/465467_1_En_6_Chapter/465467_1_En_6_Fig10_HTML.jpg](img/465467_1_En_6_Fig10_HTML.jpg)


    **图 6-10.** 某个 App 的所有文件和文件夹列表


    ## 总结


    使用“设置”来控制你存储某个 App 文件和文件夹的位置，使用“文件”App 来浏览文件和文件夹以及最近项。


    请记住，你不是通过选择个人电脑上的位置，而是通过选择你当前使用的设备上或云端存储功能（如 `iCloud` 或 `Dropbox`）上的位置，来控制文件和文件夹的存放位置。


    # 7. 在 iOS 上实现文档：UIDocument 和 UIDocumentBrowserViewController


    文档是许多 App 的关键组成部分，从个人电脑时代开始便是如此。许多人仍然认为文档是基于纸张的物件，但如今人们在 iOS 和 macOS 上处理的文档，远比其纸质前辈复杂得多。本章将介绍当今的文档及其结构，然后解释如何使用
    `UIDocumentBrowserViewController` 来管理文档。


    ## 创建一个基于文档的 App


    正如 Xcode 中框架的基本构建模块通常的情况一样，在 iOS 上开始使用文档的最简单方法是使用 Xcode 内置的“基于文档的 App”项目模板。首先创建一个新的
    iOS 项目，如图 7-1 所示。


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig1_HTML.jpg](img/465467_1_En_7_Fig1_HTML.jpg)


    **图 7-1.** 在 Xcode 中选择“基于文档的 App”模板


    按照图 7-2 所示的标准选项进行设置，以完成模板配置。


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig2_HTML.jpg](img/465467_1_En_7_Fig2_HTML.jpg)


    **图 7-2.** 为新项目设置选项


    继续完成选项，直到项目模板设置完毕，如图 7-3 所示。


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig3_HTML.jpg](img/465467_1_En_7_Fig3_HTML.jpg)


    **图 7-3.** 查看新项目


    完成后，运行该 App。（当你从模板创建新项目时，这是一个应始终执行的步骤。除了诸如网络可用性之类的问题外，你的新项目模板应该能够正常运行。）


    如图 7-4 所示，你可以打开项目，看到包含两个视图控制器的 Storyboard。


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig4_HTML.jpg](img/465467_1_En_7_Fig4_HTML.jpg)


    **图 7-4.** 查看 Storyboard


    运行项目。你应该会看到模拟器，如图 7-5 所示。


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig5_HTML.jpg](img/465467_1_En_7_Fig5_HTML.jpg)


    **图 7-5.** 运行 App


    继续探索你的新 App。使用“浏览”标签页来浏览 App 沙盒中的文件，如图 7-6 所示。


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig6_HTML.jpg](img/465467_1_En_7_Fig6_HTML.jpg)


    **图 7-6.** 在 App 中探索“浏览”标签页


    目前那里没有文件，但有一个“创建文档”按钮。试试看！


    什么也没发生。


    是时候进入本章的下一节了，该节将介绍 `UIDocument`。除其他任务外，你将了解如何实现“创建文档”按钮。


    ### 介绍 UIDocument


    iOS 中的基本文档类是 `UIDocument`。`UIDocument` 通过以下方式提供文档的基本功能：


    * **fileURL**：`UIDocument` 使用文件 URL 来标识文档，以便你的 App 能够定位它进行读写。

    * `UIDocument` 在后台队列上管理**异步读写**数据，而你只需付出极少的努力。

    * `UIDocument` 还使用**云服务**（例如 `iCloud`）来协调文档文件的读写。

    * `UIDocument` 还管理你文档的**冲突和版本变更**。


    这些是 `UIDocument` 的基本组成部分。为了开始使用文档，你可以使用“基于文档的 App”模板中提供的基本代码。项目模板中的基本代码提供了 `fileURL`（文档标识）的功能，以及关键的读写特性、云服务以及冲突和变更的管理功能。

