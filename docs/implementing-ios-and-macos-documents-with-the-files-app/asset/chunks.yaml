- fmt: '# Summary


    This chapter showed how to wrap files together in bundles or file wrappers. There
    are efficiencies to using file wrappers since only necessary file wrappers are
    updated as the root file wrapper is managed. The overall idea of having a way
    to handle files separately or together depending on what you want to do with them
    is the key take-away from wrappers and bundles.


    # 11. Using File Archives


    In Chapter [7](#465467_1_En_7_Chapter.xhtml), you learned the basics of reading
    and writing document data. One common way of doing this is to convert your own
    data from whatever its structure and format is to an `NSData` object (now a `Data`
    object), which can be read or written with a simple statement. The only catch
    to this is that you need to do the conversion from your data type to `Data`. One
    of the simplest and most used techniques is to use the built-in archiving technology
    in Cocoa.


    ### Note


    Archiving is gradually being replaced by `Codable`, but the transition is ongoing.
    Older code generally uses archiving as described in this chapter. You can find
    Apple’s documentation of both at [`https://developer.apple.com/documentation/foundation/archives_and_serialization`](https://developer.apple.com/documentation/foundation/archives_and_serialization).
    Also, the latest version of Swift `NSData` has become `Data`.


    This chapter provides an overview of archiving. The example is a common use of
    archiving in which you take some data, archive it to `Data`, and then unarchive
    it to (hopefully) the original value. This is such a useful process that many
    developers leave code of this nature commented out in apps so that it can be monitored
    during debugging by simply enabling the code.


    ## Using Swift Unified Logging


    The archiving and debugging code in this chapter is implemented using the Swift
    Unified Logging System available in iOS 10, macOS 10, tvOS 10, and watch OS 3
    (as well as later versions of these products). Unified logging is a modern and
    efficient tool that replaces previous tools such as Apple System Logger (ASL).
    It is possible to move to unified logging as you are working on new sections of
    code, so developers are gradually doing so. This section provides a quick overview
    of unified logging as an introduction. For more information, go to the Apple documentation
    at [`https://developer.apple.com/documentation/os/logging`](https://developer.apple.com/documentation/os/logging).


    The heart of unified logging is a data type that contains information about the
    logged information. (This replaces previous iterations of logging in which parameters
    were passed to a function.) If you use unified logging, you can construct your
    own structure for your logging. The version of 11 ShareApp (downloadable as described
    in Chapter [1](#465467_1_En_1_Chapter.xhtml)) uses a common version. It is a `struct`
    defined with the code shown in Listing [11-1](#465467_1_En_11_Chapter.xhtml#PC1).


    ```

    // Use new Swift unified logging system

    import os.log

    struct Log {

    static var general = OSLog(subsystem: "com.myapp.my_target",

    category: "info")

    }

    Listing 11-1

    Commonly used Log Structure

    ```


    This code is shown in Figure [11-1](#465467_1_En_11_Chapter.xhtml#Fig1).


    ![../images/465467_1_En_11_Chapter/465467_1_En_11_Fig1_HTML.jpg](images/465467_1_En_11_Chapter/465467_1_En_11_Fig1_HTML.jpg)


    Figure 11-1. Importing `os.log` and defining the `struct`


    In the example, this code is placed at the top of `AppDelegate.swift`. You use
    the code where needed in your app, as you will see in this section. The invocation
    in a minimal version is like this code:


    ```

    os_log("Row selected-%@",

    indexPath.debugDescription)

    ```


    Beyond the bare minimum here, refer to the documentation cited previously for
    other information you can log. As a result of this code, here is what will be
    shown in the console:


    ```

    2018-12-26 14:51:09.777111-0500 ShareApp[6228:697878]

    Row selected-[0, 0]

    ```


    This causes an invocation of `OSLog`. Beyond the parameters shown here, you can
    add additional parameters such as the standard formatting for a print statement,
    like


    ```

    ("Row selected-%@",

    ```


    and a string that is generated dynamically and formatted according to that command.


    You will see this in action later in this chapter.


    ## Using Log and a Breakpoint to Archive Data


    If you use archiving to encode and decode data for the `contents(forType:)` and
    `load(fromContents:, ofType:)` functions, it is useful to test that code with
    a breakpoint. Once things are tested, you can use archiving in the actual functions.


    Returning to ShareApp, you can intercept a tap in a timestamp generated in the
    master view controller and attempt to encode it. Figure [11-2](#465467_1_En_11_Chapter.xhtml#Fig2)
    reminds you of the master view controller in which you can add new timestamp items
    with the +.


    ![../images/465467_1_En_11_Chapter/465467_1_En_11_Fig2_HTML.jpg](images/465467_1_En_11_Chapter/465467_1_En_11_Fig2_HTML.jpg)


    Figure 11-2. Adding new timestamps with +


    As noted, it is common to work with the master detail view controller as a starting
    point for many apps. In the master detail model, you can add functionality at
    either the master or detail level. Users are accustomed to this interface, so
    it makes sense not to add an unfamiliar variation. If you add a Share button to
    the master view controller, as shown in Figure [11-3](#465467_1_En_11_Chapter.xhtml#Fig3),
    users will expect to share the contents of the master view controller, which is
    all of the data.


    ![../images/465467_1_En_11_Chapter/465467_1_En_11_Fig3_HTML.jpg](images/465467_1_En_11_Chapter/465467_1_En_11_Fig3_HTML.jpg)


    Figure 11-3. Sharing the master view controller data


    But what do you do if you want to share a single item? There are two approaches
    you can take. One is to put a Share button on a detail view controller, as you
    can see in Figure [11-4](#465467_1_En_11_Chapter.xhtml#Fig4).


    ![../images/465467_1_En_11_Chapter/465467_1_En_11_Fig4_HTML.jpg](images/465467_1_En_11_Chapter/465467_1_En_11_Fig4_HTML.jpg)


    Figure 11-4. Sharing from a detail view controller


    When using the master detail model, you have to remember that it is the master
    item that manages the detail items. This means that the control for selecting
    one of the detail items belongs on the master view controller because it is the
    master that will manage the selection of the detail item.


    If it is the master that will be handling selection, where do you put the Share
    button so that it is not confused with a Share button that selects everything?
    The most common solution is to simply use a tap or click in a detail row of the
    master view controller to manage selection. This is an efficient way to proceed
    (and it takes advantage of a useful function).


    The function that lets you select a single detail item from the master view controller
    is the `UITableViewDelegate` function named `tableView(_:didSelectRowAt:)`.


    Figure [11-5](#465467_1_En_11_Chapter.xhtml#Fig5) shows how to override that function
    with a log message. (The log message adds `log` and `type` variables to the minimal
    code in Listing [11-1](#465467_1_En_11_Chapter.xhtml#PC1)).


    The code shows a console message identifying which detail item has been selected,
    as you can see in Figure [11-5](#465467_1_En_11_Chapter.xhtml#Fig5).


    ![../images/465467_1_En_11_Chapter/465467_1_En_11_Fig5_HTML.jpg](images/465467_1_En_11_Chapter/465467_1_En_11_Fig5_HTML.jpg)


    Figure 11-5. Log selection of a detail item'
