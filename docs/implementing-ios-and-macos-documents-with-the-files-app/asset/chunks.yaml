- fmt: "# Working with UIDocument\n\nThe key components for working with `UIDocument`\
    \ are `UIDocument`, which handles reading, writing, and creating `UIDocument`,\
    \ and `UIDocumentBrowserViewController`, which handles the browsing and the user\
    \ interface part of reading, writing, and creating `UIDocument`. Completing the\
    \ basic functionality of `UIDocument` is an implementation of `UIDocumentViewController`.\n\
    \n`UIDocument` takes care of a lot of document management for you including many\
    \ critical functions such as saving documents and managing changes. You can study\
    \ the documentation to see all of the features, but you can use the stripped-down\
    \ functions for `UIDocument` that are part of the Document Based App template\
    \ used in this chapter. In fact, the basic code from the template (shown in Figure\
    \ [7-7](#465467_1_En_7_Chapter.xhtml#Fig7) and Listing [7-1](#465467_1_En_7_Chapter.xhtml#PC1))\
    \ is an excellent place to start and, for many basic apps, it may be all you need\
    \ along with a line or two of app-specific code.\n\n![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig7_HTML.jpg](images/465467_1_En_7_Chapter/465467_1_En_7_Fig7_HTML.jpg)\n\
    \n**Figure 7-7.** Basic `UIDocument` functionality\n\n```\n//\n//  Document.swift\n\
    //  Document1\n//\n//\nimport UIKit\n\nclass Document: UIDocument {\n    override\
    \ func contents(forType typeName: String) throws -> Any {\n        // Encode your\
    \ document with an instance of NSData or NSFileWrapper\n        return Data()\n\
    \    }\n    override func load(fromContents contents: Any, ofType typeName: String?)\
    \ throws {\n        // Load your document from contents: ofType:)\n    }\n}\n\
    ```\n\n**Listing 7-1** The Basic Code\n\nThe function you need to implement first\
    \ is `contents(forType:)`. When you have decided the format for the data in your\
    \ document, you specify its type, and that type is used to read and write the\
    \ document's data. Often, the type of a document file is a basic Swift or Objective-C\
    \ type such as `NSData`. If you use `NSData`, it is your responsibility to convert\
    \ your document's data to `NSData` or whatever type you are using.\n\nThe companion\
    \ function is `load(fromContents:ofType:)`. Both of these functions let you read\
    \ or write a general-purpose format and then convert it into data that your app\
    \ manages.\n\nIf you explore the code for `UIDocument`, you'll see that it handles\
    \ asynchronous reading and writing, working with cloud data, and managing changes\
    \ all within the basic structure of the two functions: `contents(forType:)` and\
    \ `load(fromContents:ofType:)`.\n\n## Working with UIDocumentViewController\n\n\
    Once you have your document in place, you need to add a view controller so that\
    \ you can see and manipulate content. In the Document Based App project template,\
    \ the document controller is created as shown in Figure [7-8](#465467_1_En_7_Chapter.xhtml#Fig8).\n\
    \n![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig8_HTML.jpg](images/465467_1_En_7_Chapter/465467_1_En_7_Fig8_HTML.jpg)\n\
    \n**Figure 7-8.** The `DocumentViewController`\n\nThe code is shown in Listing\
    \ [7-2](#465467_1_En_7_Chapter.xhtml#PC2).\n\n```\nclass DocumentViewController:\
    \ UIViewController {\n    @IBOutlet weak var documentNameLabel: UILabel!\n   \
    \ var document: UIDocument?\n\n    override func viewWillAppear(_ animated: Bool)\
    \ {\n        super.viewWillAppear(animated)\n        // Access the document\n\
    \        document?.open(completionHandler: { (success) in\n            if success\
    \ {\n                // Display the content of the document, e.g.:\n         \
    \       self.documentNameLabel.text = self.document?.fileURL.lastPathComponent\n\
    \            } else {\n                // Make sure to handle the failed import\
    \ appropriately,\n                // e.g., by presenting an error message to the\
    \ user.\n            }\n        })\n    }\n\n    @IBAction func dismissDocumentViewController()\
    \ {\n        dismiss(animated: true) {\n            self.document?.close(completionHandler:\
    \ nil)\n        }\n    }\n}\n```\n\n**Listing 7-2** Document View Controller Code\n\
    \nThere are two functions in the `DocumentViewController` class: `viewWillAppear(_:)`\
    \ and `dismissDocumentViewController()`. The first opens the document and the\
    \ second closes it.\n\n### Opening the Document\n\nOpening the document is a great\
    \ example of the Swift asynchronous programming style using a completion handler.\
    \ The code is:\n\n```\ndocument?.open(completionHandler: { (success) in\n    if\
    \ success {\n        // Display the content of the document, e.g.:\n        self.documentNameLabel.text\
    \ = self.document?.fileURL.lastPathComponent\n    } else {\n        // Make sure\
    \ to handle the failed import appropriately,\n        // e.g., by presenting an\
    \ error message to the user.\n    }\n})\n```\n\n`open` is called on the document\
    \ (note that it is an optional and is unwrapped with `?`). The completion handler\
    \ is declared in the `open` function, and it is called upon completion of `open`.\
    \ There is one parameter passed into the completion handler. As is common but\
    \ not required, it is often called `success`; it is a Boolean that indicates if\
    \ `open` has succeeded or not.\n\nThe completion handler then executes this code:\n\
    \n```\nif success {\n    // Display the content of the document, e.g.:\n    self.documentNameLabel.text\
    \ = self.document?.fileURL.lastPathComponent\n} else {\n    // Make sure to handle\
    \ the failed import appropriately, e.g., by\n    // presenting an error message\
    \ to the user.\n}\n```\n\nFor a successful opening of the document, a label in\
    \ the storyboard is filled with `lastPathComponent` of the file URL. (You can\
    \ see this at the right in Figure [7-4](#465467_1_En_7_Chapter.xhtml#Fig4).) For\
    \ most apps, you would actually display some content from the document in the\
    \ interface.\n\n> **Note:** The completion handler for opening the document is\
    \ a significant way of improving app performance. When you are dealing with documents\
    \ and files that may be in the cloud, the delay in executing the completion handler\
    \ (whether successful or not) can be significant. Remember this when you are testing\
    \ your app.\n\n### Closing the Document\n\nClosing the document uses a similar\
    \ structure with `dismissDocumentViewController`. However, note that the completion\
    \ handler in the app is nil. If you don't need to process data that has changed,\
    \ you don't have to do anything except close the document.\n\n## Working with\
    \ UIDocumentBrowserViewController\n\n`UIDocumentBrowserViewController` is the\
    \ heart of the document-based app. This section provides an overview of what happens.\
    \ There are two basic paths to follow: creating a document or opening an existing\
    \ document. (You might want to refer back to Figures [7-5](#465467_1_En_7_Chapter.xhtml#Fig5)\
    \ and [7-6](#465467_1_En_7_Chapter.xhtml#Fig6).)\n\n### Loading the UIDocumentBrowserViewController\n\
    \nThe first step in working with a `UIDocumentBrowserViewController` is to load\
    \ it, as shown in Figure [7-9](#465467_1_En_7_Chapter.xhtml#Fig9).\n\n![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig9_HTML.jpg](images/465467_1_En_7_Chapter/465467_1_En_7_Fig9_HTML.jpg)\n\
    \n**Figure 7-9.** Loading `UIDocumentBrowserViewController`\n\nNote that your\
    \ `UIDocumentBrowserViewController` subclass should also conform to the `UIDocumentBrowserViewControllerDelegate`\
    \ protocol. You can see this in line 12 of Figure [7-9](#465467_1_En_7_Chapter.xhtml#Fig9).\
    \ For additional reference, here is the code:\n\n```\ndelegate = self\n```\n\n\
    You have choices for the visual style of the browser that you can set at this\
    \ point so that they coordinate with your user interface. Other initializations\
    \ can be handled in your `info.plist`.\n\n> **Note:** There is more on your `info.plist`\
    \ in Chapter [3](#465467_1_En_3_Chapter.xhtml).\n\nNote that `viewDidLoad` lets\
    \ you choose whether documents can be created with line 19:\n\n```\nallowsDocumentCreation\
    \ = // true or false\n```\n\nAfter you have loaded the `UIDocumentBrowserViewController`,\
    \ you typically implement four functions, which are shown as stubs in Figure [7-9](#465467_1_En_7_Chapter.xhtml#Fig9).\
    \ The functions are:\n\n- `documentBrowser(_:didRequestDocumentCreationWithHandler:)`\
    \ for creating a new document\n- `documentBrowser(_:didPickDocumentAt:)` for opening\
    \ an existing document\n- `documentBrowser(_:didImportDocumentAt:toDestinationURL:)`\
    \ for, after opening a document, presenting it with its content\n- `documentBrowser(_:failedToImportDocumentAt:error:)`\
    \ to handle an error"
  raw: '### Working with UIDocument


    The key components for working with `UIDocument` are `UIDocument`, which handles
    reading, writing, and creating `UIDocuments, and UIDocumentBrowserViewController`,
    which handles the browsing and the user interface part of reading, writing, and
    creating `UIDocument`. Completing the basic functionality of `UIDocument` is an
    implementation of `UIDocumentViewController`.


    `UIDocument` takes care of a lot of document management for you including many
    critical functions such as saving documents and managing changes. You can study
    the documentation to see all of the features, but you can use the stripped-down
    functions for `UIDocument` that are part of the Document Based App template used
    in this chapter. In fact, the basic code from the template (shown in Figure [7-7](#465467_1_En_7_Chapter.xhtml#Fig7)
    and Listing [7-1](#465467_1_En_7_Chapter.xhtml#PC1)) is an excellent place to
    start and, for many basic apps, it may be all you need along with a line or two
    of app-specific code.


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig7_HTML.jpg](images/465467_1_En_7_Chapter/465467_1_En_7_Fig7_HTML.jpg)


    Figure 7-7.


    Basic UIDocument functionality


    ```

    //

    //  Document.swift

    //  Document1

    //

    //

    import UIKit

    class Document: UIDocument {

    override func contents(forType typeName: String) throws -> Any {

    // Encode your document with an instance of NSData or NSFileWrapper

    return Data()

    }

    override func load(fromContents contents: Any, ofType typeName: String?)

    throws {

    // Load your document from contents: ofType:)

    }

    }

    Listing 7-1

    The Basic Code

    ```


    The function you need to implement first `is contents(forType:).` When you have
    decided the format for the data in your document, you specify its type, and that
    type is used to read and write the document’s data. Often, the type of a document
    file is a basic Swift or Objective-C type such as `NSData`. If you use `NSData`,
    it is your responsibility to convert your document’s data to `NSData` or whatever
    type you are using.


    The companion function is `load(fromContents: ofType:`). Both of these functions
    let you read or write a general-purpose format and then convert it into data that
    your app manages.


    If you explore the code for `UIDocument`, you’ll see that it handles asynchronous
    reading and writing, working with cloud data, and managing changes all within
    the basic structure of the two functions: `contents(forType:)`and `load(fromContents:
    ofType:`)


    ## Working with UIDocumentViewController


    Once you have your document in place, you need to add a view controller so that
    you can see and manipulate content. In the Document Based App project template,
    the document controller is created as shown in Figure [7-8](#465467_1_En_7_Chapter.xhtml#Fig8).


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig8_HTML.jpg](images/465467_1_En_7_Chapter/465467_1_En_7_Fig8_HTML.jpg)


    Figure 7-8.


    The DocumentViewController


    The code is shown in Listing [7-2](#465467_1_En_7_Chapter.xhtml#PC2).


    ```

    class DocumentViewController: UIViewController {

    @IBOutlet weak var documentNameLabel: UILabel!

    var document: UIDocument?

    override func viewWillAppear(_ animated: Bool) {

    super.viewWillAppear(animated)

    // Access the document

    document?.open(completionHandler: { (success) in

    if success {

    // Display the content of the document, e.g.:

    self.documentNameLabel.text

    self.document?.fileURL.lastPathComponent

    } else {

    // Make sure to handle the failed import appropriately,

    // e.g., by presenting an error message to the user.

    }

    })

    }

    @IBAction func dismissDocumentViewController() {

    dismiss(animated: true) {

    self.document?.close(completionHandler: nil)

    }

    }

    }

    Listing 7-2

    Document View Controller Code

    ```


    There are two functions in the `DocumentViewController` class`: viewWillAppear((_:)`
    and `dismissDocumentViewController(). The first opens the document and the second
    closes it` `.`


    ### Opening the Document


    Opening the document is a great example of the Swift asynchronous programming
    style using a completion handler. The code is


    ```

    document?.open(completionHandler: { (success) in

    if success {

    // Display the content of the document, e.g.:

    self.documentNameLabel.text

    self.document?.fileURL.lastPathComponent

    } else {

    // Make sure to handle the failed import appropriately,

    // e.g., by presenting an error message to the user.

    }

    })

    ```


    `open` is called on the document (note that it is an optional and is unwrapped
    with ?). The completion handler is declared in the `open` function, and it is
    called upon completion of `open.` There is one parameter passed into the completion
    handler. As is common but not required, it is often called `success`; it is a
    Boolean that indicates if `open` has succeeded or not.


    The completion handler then executes this code:


    ```

    if success {

    // Display the content of the document, e.g.:

    self.documentNameLabel.text

    self.document?.fileURL.lastPathComponent

    } else {

    // Make sure to handle the failed import appropriately, e.g., by

    // presenting an error message to the user.

    }

    ```


    For a successful opening of the document, a label in the storyboard is filled
    with `lastPathComponent` of the file URL. (You can see this at the right in Figure
    [7-4](#465467_1_En_7_Chapter.xhtml#Fig4).) For most apps, you would actually display
    some content from the document in the interface.


    ### Note


    The completion handler for opening the document is a significant way of improving
    app performance. When you are dealing with documents and files that may be in
    the cloud, the delay in executing the completion handler (whether successful or
    not) can be significant. Remember this when you are testing your app.


    ### Closing the Document


    Closing the document uses a similar structure with `dismissDocumentViewController`.
    However, note that the completion handler in the app is nil. If you don’t need
    to process data that has changed, you don’t have to do anything except close the
    document.


    ## Working with UIDocumentBrowserViewController


    `UIDocumentBrowserViewController` is the heart of the document-based app. This
    section provides an overview of what happens. There are two basic paths to follow:
    creating a document or opening an existing document. (You might want to refer
    back to Figures [7-5](#465467_1_En_7_Chapter.xhtml#Fig5) and [7-6](#465467_1_En_7_Chapter.xhtml#Fig6).)


    ### Loading the UIDocumentBrowserViewController


    The first step in working with a `UIDocumentBrowserViewController` is to load
    it, as shown in Figure [7-9](#465467_1_En_7_Chapter.xhtml#Fig9).


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig9_HTML.jpg](images/465467_1_En_7_Chapter/465467_1_En_7_Fig9_HTML.jpg)


    Figure 7-9.


    Loading UIDocumentBrowserViewController


    Note that your `UIDocumentBrowserViewController` subclass should also conform
    to the `UIDocumentBrowserViewControllerDelegate protocol`. You can see this in
    line 12 of Figure [7-9](#465467_1_En_7_Chapter.xhtml#Fig9). For additional reference,
    here is the code:


    ```

    delegate = self

    ```


    You have choices for the visual style of the browser that you can set at this
    point so that they coordinate with your user interface. Other initializations
    can be handled in your `info.plist`.


    ### Note


    There is more on your `info.plist` in Chapter [3](#465467_1_En_3_Chapter.xhtml).


    Note that `viewDidLoad` lets you choose whether documents can be created with
    line 19:


    ```

    allowsDocumentCreation = // true or false

    ```


    After you have loaded the `UIDocumentBrowserViewController`, you typically implement
    four functions, which are shown as stubs in Figure [7-9](#465467_1_En_7_Chapter.xhtml#Fig9),
    The functions are


    *   `(documentBrowser(_:didRequestDocumentCreationWithHandler:)` for creating
    a new document


    *   `(documentBrowser(_:didPickDocumentAt:)` for opening an existing document


    *   (`documentBrowser(_:didImportDocumentAt:toDestinationURL:)` for, after opening
    a document, presenting it with its content


    *   `(documentBrowser(_:failedToImportDocumentAt:error)` to handle an error'
  trans: "\n# 使用 UIDocument\n\n使用 `UIDocument` 的关键组件包括负责读取、写入和创建文档的类 `UIDocument`，以及负责浏览和用户界面交互（即读取、写入和创建文档的界面部分）的类\
    \ `UIDocumentBrowserViewController`。要完善 `UIDocument` 的基本功能，还需要实现 `UIDocumentViewController`。\n\
    \n`UIDocument` 为你处理了大量文档管理工作，包括保存文档、管理变更等许多关键功能。你可以通过研究文档来了解其所有特性，但也可以使用本章基于文档的\
    \ App 模板中包含的 `UIDocument` 精简功能。实际上，该模板的基本代码（见图 7-7 和代码清单 7-1）是一个绝佳的起点。对于许多基础应用来说，只需这些代码，再加上一两行应用特定的代码，就完全足够了。\n\
    \n![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig7_HTML.jpg](img/465467_1_En_7_Fig7_HTML.jpg)\n\
    \n**图 7-7.** 基本的 `UIDocument` 功能\n\n```\n//\n//  Document.swift\n//  Document1\n\
    //\n//\nimport UIKit\n\nclass Document: UIDocument {\n    override func contents(forType\
    \ typeName: String) throws -> Any {\n        // 使用 NSData 或 NSFileWrapper 实例编码你的文档\n\
    \        return Data()\n    }\n    override func load(fromContents contents: Any,\
    \ ofType typeName: String?) throws {\n        // 从 contents:ofType:) 加载你的文档\n\
    \    }\n}\n```\n\n**代码清单 7-1** 基本代码\n\n你需要首先实现的函数是 `contents(forType:)`。当你确定文档中数据的格式后，需要指定其类型，该类型将用于读取和写入文档数据。通常，文档文件的类型是基本的\
    \ Swift 或 Objective-C 类型，例如 `NSData`。如果你使用 `NSData`，则需要负责将文档数据转换为 `NSData` 或你正在使用的任何其他类型。\n\
    \n其配套函数是 `load(fromContents:ofType:)`。这两个函数让你能够读取或写入通用格式的数据，然后将其转换为你的应用可以管理的数据。\n\
    \n如果你深入研究 `UIDocument` 的代码，你会发现它在这两个函数 `contents(forType:)` 和 `load(fromContents:ofType:)`\
    \ 的基本结构内处理了异步读写、云数据协作以及变更管理等所有功能。\n\n## 使用 UIDocumentViewController\n\n一旦你设置好了文档，就需要添加一个视图控制器，以便查看和操作内容。在基于文档的\
    \ App 项目模板中，文档控制器是按照图 7-8 所示创建的。\n\n![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig8_HTML.jpg](img/465467_1_En_7_Fig8_HTML.jpg)\n\
    \n**图 7-8.** `DocumentViewController`\n\n相关代码如代码清单 7-2 所示。\n\n```\nclass DocumentViewController:\
    \ UIViewController {\n    @IBOutlet weak var documentNameLabel: UILabel!\n   \
    \ var document: UIDocument?\n\n    override func viewWillAppear(_ animated: Bool)\
    \ {\n        super.viewWillAppear(animated)\n        // 访问文档\n        document?.open(completionHandler:\
    \ { (success) in\n            if success {\n                // 显示文档内容，例如：\n  \
    \              self.documentNameLabel.text = self.document?.fileURL.lastPathComponent\n\
    \            } else {\n                // 务必妥善处理导入失败的情况，\n                // 例如，向用户显示错误信息。\n\
    \            }\n        })\n    }\n\n    @IBAction func dismissDocumentViewController()\
    \ {\n        dismiss(animated: true) {\n            self.document?.close(completionHandler:\
    \ nil)\n        }\n    }\n}\n```\n\n**代码清单 7-2** 文档视图控制器代码\n\n`DocumentViewController`\
    \ 类中有两个函数：`viewWillAppear(_:)` 和 `dismissDocumentViewController()`。前者负责打开文档，后者负责关闭文档。\n\
    \n### 打开文档\n\n打开文档是使用完成处理器的 Swift 异步编程风格的一个很好的例子。代码如下：\n\n```\ndocument?.open(completionHandler:\
    \ { (success) in\n    if success {\n        // 显示文档内容，例如：\n        self.documentNameLabel.text\
    \ = self.document?.fileURL.lastPathComponent\n    } else {\n        // 务必妥善处理导入失败的情况，\n\
    \        // 例如，向用户显示错误信息。\n    }\n})\n```\n\n在文档对象上调用 `open` 方法（注意它是一个可选类型，用 `?`\
    \ 进行解包）。完成处理器在 `open` 函数中声明，并在 `open` 操作完成时被调用。完成处理器接收一个参数。通常（但并非强制）这个参数被命名为 `success`，它是一个布尔值，用于指示\
    \ `open` 操作是否成功。\n\n然后，完成处理器执行以下代码：\n\n```\nif success {\n    // 显示文档内容，例如：\n\
    \    self.documentNameLabel.text = self.document?.fileURL.lastPathComponent\n\
    } else {\n    // 务必妥善处理导入失败的情况，例如，\n    // 向用户显示错误信息。\n}\n```\n\n如果文档成功打开，故事板中的一个标签会被赋予文件\
    \ URL 的 `lastPathComponent`。（你可以在图 7-4 的右侧看到这一点）。对于大多数应用，你实际上会在界面中显示文档的一些内容。\n\
    \n> **注意：** 打开文档的完成处理器是提升应用性能的一种重要方式。当你处理可能存储在云端的文档和文件时，执行完成处理器（无论成功与否）的延迟可能会很明显。在测试应用时请牢记这一点。\n\
    \n### 关闭文档\n\n关闭文档使用了与 `dismissDocumentViewController` 类似的结构。然而，请注意应用中的完成处理器为\
    \ nil。如果你不需要处理已更改的数据，除了关闭文档之外，无需执行任何其他操作。\n\n## 使用 UIDocumentBrowserViewController\n\
    \n`UIDocumentBrowserViewController` 是基于文档的应用的核心。本节将概述其工作流程。主要有两条路径：创建新文档或打开现有文档（你可能需要回看图\
    \ 7-5 和 7-6）。\n\n### 加载 UIDocumentBrowserViewController\n\n使用 `UIDocumentBrowserViewController`\
    \ 的第一步是加载它，如图 7-9 所示。\n\n![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig9_HTML.jpg](img/465467_1_En_7_Fig9_HTML.jpg)\n\
    \n**图 7-9.** 加载 `UIDocumentBrowserViewController`\n\n请注意，你的 `UIDocumentBrowserViewController`\
    \ 子类还应遵守 `UIDocumentBrowserViewControllerDelegate` 协议。你可以在图 7-9 的第 12 行看到这一点。作为额外参考，代码如下：\n\
    \n```\ndelegate = self\n```\n\n你可以在此处设置浏览器可视样式的选项，使其与你的用户界面协调一致。其他初始化工作可以在你的 `info.plist`\
    \ 中处理。\n\n> **注意：** 关于 `info.plist` 的更多信息，请参阅第 3 章。\n\n请注意，`viewDidLoad` 让你可以通过第\
    \ 19 行来决定是否可以创建文档：\n\n```\nallowsDocumentCreation = // true 或 false\n```\n\n加载\
    \ `UIDocumentBrowserViewController` 后，你通常需要实现四个函数，这些函数在图 7-9 中显示为存根（stubs）。这些函数是：\n\
    \n- `documentBrowser(_:didRequestDocumentCreationWithHandler:)` 用于创建新文档\n- `documentBrowser(_:didPickDocumentAt:)`\
    \ 用于打开现有文档\n- `documentBrowser(_:didImportDocumentAt:toDestinationURL:)` 用于在打开文档后，显示其内容\n\
    - `documentBrowser(_:failedToImportDocumentAt:error:)` 用于处理错误\n"
- fmt: '### Creating a Document


    You can use the template to create a new document. As the documentation indicates,
    you can allow users to choose which of several basic documents you will use as
    a template. See Figure [7-10](#465467_1_En_7_Chapter.xhtml#Fig10).


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig10_HTML.jpg](images/465467_1_En_7_Chapter/465467_1_En_7_Fig10_HTML.jpg)


    Figure 7-10. Creating a document


    In many older design patterns, you would choose to create an empty document and
    then possibly modify it with data. The design pattern that is most often used
    in iOS is not to create a document but instead to copy an existing template document
    from your bundle and put the copy in the appropriate place for your app. This
    is a different work flow, but it becomes more efficient as you create and modify
    your app over time.


    Listing [7-3](#465467_1_En_7_Chapter.xhtml#PC7) shows the code to let users choose
    a template from a list. The key line of code is:


    ```

    let newDocumentURL = Bundle.main.url(forResource: "Template",

    withExtension: DocumentBrowserViewController.documentExtension)

    importHandler(newDocumentURL, .copy)

    ```


    This takes a file called `Template` with your document extension from your bundle
    and copies it to a new location. If you don’t need to let users choose from among
    several templates, just use this code without the alert that lets people choose.


    ```

    let title = NSLocalizedString("Choose File Template", comment: "")

    let cancelButtonTitle = NSLocalizedString("Cancel", comment: "")

    let defaultButtonTitle = NSLocalizedString("Basic (Default) ", comment: "Default")

    let generalButtonTitle = NSLocalizedString("Demo)", comment: "")

    let alertController = UIAlertController(title: title, message: message, preferredStyle:
    .alert)

    let newDocumentURL = Bundle.main.url(forResource: "Template",

    withExtension: DocumentBrowserViewController.documentExtension)

    importHandler(newDocumentURL, .copy)

    // Create the actions.

    let cancelAction = UIAlertAction(title: cancelButtonTitle,

    style: .cancel) { action in

    importHandler(nil, .none)

    }

    let defaultButtonAction = UIAlertAction(title: defaultButtonTitle,

    style: .default) { _ in

    let newDocumentURL = Bundle.main.url(forResource: "Template",

    withExtension: DocumentBrowserViewController.documentExtension)

    importHandler(newDocumentURL, .copy)

    }

    let generalButtonAction = UIAlertAction(title: generalButtonTitle,

    style: .default) { _ in

    let newDocumentURL = Bundle.main.url(forResource: "Template2",

    withExtension: DocumentBrowserViewController.documentExtension)

    importHandler(newDocumentURL, .copy)

    }

    // Add the actions.

    alertController.addAction(cancelAction)

    alertController.addAction(defaultButtonAction)

    alertController.addAction(generalButtonAction)

    present(alertController, animated: true, completion: nil)

    Listing 7-3

    Letting Users Choose a Template

    ```


    ### Picking (Opening) a Document


    Figure [7-11](#465467_1_En_7_Chapter.xhtml#Fig11) shows the code for opening an
    existing document.


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig11_HTML.jpg](images/465467_1_En_7_Chapter/465467_1_En_7_Fig11_HTML.jpg)


    Figure 7-11. Opening an existing document


    The key line of code here lets you select from several existing files; you attempt
    to open the first in the list as specified here:


    ```

    guard let sourceURL = documentURLs.first else { return }

    ```


    As you can see in Figure [7-9](#465467_1_En_7_Chapter.xhtml#Fig9), you can specify
    if multiple files can be selected with this line of code in `viewDidLoad` for
    `DocumentBrowserViewController`:


    ```

    allowsPicking Multiple Items = // true or false

    ```


    Once you have picked a document, you ask the `DocumentBrowserViewController` to
    present it, as shown in Figure [7-12](#465467_1_En_7_Chapter.xhtml#Fig12).


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig12_HTML.jpg](images/465467_1_En_7_Chapter/465467_1_En_7_Fig12_HTML.jpg)


    Figure 7-12. Presenting a document


    Or you can use this code:


    ```

    presentDocument (at:destinationURL)

    ```


    The typical code is shown in Listing [7-4](#465467_1_En_7_Chapter.xhtml#PC11).


    ```

    func presentDocument(at documentURL: URL) {

    let storyBoard = UIStoryboard(name: "Main", bundle: nil)

    let documentViewController =

    storyBoard.instantiateViewController(withIdentifier:

    "DocumentViewController") as! DocumentViewController

    documentViewController.document =

    Document(fileURL: documentURL)

    present(documentViewController, animated: true,

    completion: nil)

    }

    Listing 7-4

    Presenting a Document

    ```


    Note that this code brings together a document view controller, a storyboard,
    and a document. All of these components must match (this is a common cause of
    debugging issues).


    The code is also shown in Figure [7-13](#465467_1_En_7_Chapter.xhtml#Fig13).


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig13_HTML.jpg](images/465467_1_En_7_Chapter/465467_1_En_7_Fig13_HTML.jpg)


    Figure 7-13. Presenting a document


    ### Handling Errors


    The last part of handling document browser view controllers is to make certain
    that you handle errors properly; see Figure [7-14](#465467_1_En_7_Chapter.xhtml#Fig14).


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig14_HTML.jpg](images/465467_1_En_7_Chapter/465467_1_En_7_Fig14_HTML.jpg)


    Figure 7-14. Handling errors properly


    ## Summary


    This chapter shows the processes involved in opening or creating a document. The
    most important take-away is that instead of creating documents from scratch, the
    best practice is to put a template document into your bundle so that opening and
    creating a document can both use the same basic code.


    # 8. Sharing Documents with Share Buttons


    In previous chapters, you saw how to implement documents on iOS and macOS to save
    data and share it across your apps. In this chapter, you’ll see another way to
    share data using the Share button so that you can dynamically share data from
    one app to another without using a document to store and share the data.


    The main points covered in this chapter are:


    - Using Share buttons (as a user)

    - Using Share buttons (as a developer)

    - Managing the shared data


    ## Using Share Buttons (As a User)


    To share data, you need one app to share the data (sometimes this process is called
    *vending* the data) and another app (or several apps) to receive the data and
    use it as the receiving app wants. Note that, just as is the case with documents
    and their types, the connection between sender and receiver (or vendor and receiver)
    is dynamic. Neither app needs to know about the other. The document type or sharing
    information lets each app function on its own so that you don’t need to build
    enormous multi-purpose apps that require substantial development and maintenance
    costs.


    Sharing is part of Cocoa and Cocoa Touch (and it has been since the beginning
    of the original NeXTSTEP and Rhapsody versions of the operating systems). In order
    to share data, a common format needs to be available to the sender and receiver.
    Here is an example of the basic structure.


    ## Creating a Sharing Example'
