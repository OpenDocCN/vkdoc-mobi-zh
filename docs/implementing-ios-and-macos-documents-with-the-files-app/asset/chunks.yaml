    ## 查看 `info.plist`


    你在图 3-5 和图 3-6 中看到的内容较为复杂。在这两幅图左侧的项目导航器中，你可以看到项目文件。两幅图中都包含 Swift 文件，以及一个或多个故事板、授权文件和资源（具体内容因项目和设置而异）。目前最要紧的是
    `info.plist` 文件，它是每个项目的属性列表。属性列表在 Cocoa 和 Cocoa Touch 中被广泛使用，由特定的数据类型（数组、字符串、数字、字典、日期、布尔值或
    `NSData`）构成。属性列表是一种非常快速高效的数据存储和检索方式。每个应用都有一个基本属性列表（名为 `info.plist`），此外可能还有其他属性列表用于支持应用的其他部分。


    属性列表由键值对组成，其中键是字符串，值则是上一段中提到的某一种数据类型。属性列表源码的开头部分如图 3-7 所示。


    ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig7_HTML.jpg](img/465467_1_En_3_Fig7_HTML.jpg)


    图 3-7


    属性列表的源码


    如图 3-7 所示，属性列表很容易以 XML 格式显示。你在图 3-7 中看到的格式是由 Xcode 生成的。属性列表也可以通过在 Excel 和 BBEdit
    等工具中直接处理 XML 来设置格式。在 Xcode 中显示的属性列表可以格式化为如图 3-8 所示。


    ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig8_HTML.jpg](img/465467_1_En_3_Fig8_HTML.jpg)


    图 3-8


    Xcode 中格式化后的属性列表


    请注意，加上格式之后，属性列表会稍微更易于阅读，但请记住，它本质上仍然是先前在图 3-7 中展示的基于 XML 的属性列表。


    当你查看项目导航器时，可以通过 Control-单击打开任意文件。对于属性列表，你可以选择如图 3-9 所示的格式选项。


    ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig9_HTML.jpg](img/465467_1_En_3_Fig9_HTML.jpg)


    图 3-9


    在 Xcode 项目导航器中选择文件的格式选项


    图 3-10 显示了“`Open As`”选项下的具体选择。


    ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig10_HTML.jpg](img/465467_1_En_3_Fig10_HTML.jpg)


    图 3-10


    查看属性列表


    属性列表的源码格式如图 3-7 所示；而属性列表格式则如图 3-8 所示。


    如果回头再看图 3-5 和图 3-6，你会看到这两幅图的上方都有一个格式化后的属性列表（请记住，你可以通过在项目导航器中 Control-单击该属性列表来打开它）。


    在图 3-5 和图 3-6 中，格式化属性列表的下方是属性列表的另一种表现形式：简单来说，可以称之为 UI 版本。它们是针对属性类型和其他设置所呈现的版本。


    关键在于，你在图 3-5 和图 3-6 中看到的所有格式，都是基于原始属性列表的。不同的 UI 格式可以让你更轻松地处理希望在 macOS 或 iOS 中使用的文档。但是，请记住，底层的属性列表（`info.plist`）才是核心。虽然使用
    UI 格式化版本通常更方便，但要绝对确定自己的操作无误，最安全的做法还是回到 `info.plist` 的源代码，查看具体发生了什么。


    ## 总结


    文档类型用于将文档及其内容与 `UIDocument` 或 `NSDocument` 的子类相匹配。UTI 用于标识可能被各种应用和文档使用的文档。在本章中，你还学习了如何为文档构建和设置
    iCloud，以及如何在文件和文档中使用属性列表。


    # 4. 保护数据安全


    一旦你开始考虑保存数据，就应该同时考虑这些数据的安全性。从决定存储哪些数据，到制定保护这些数据的规则，过程中的每一步都需要仔细斟酌。本章就聚焦于这些问题。


    ## 安全与隐私概述


    如第 1 章开头所述，我们使用文档来存储和组织在应用中使用数据。组织到文档中的数据有两种基本类型：随应用一起分发的数据，以及用户创建和修改的数据。第二种类型，即用户创建和修改的数据，可能包含随应用分发的那部分数据。


    无论涉及何种数据类型，如果你正在构建或设计一款应用，就必须意识到可能出现的数据问题。直到不久以前，应用中的数据问题还相对简单。有些数据明显很敏感，但大多数应用中的数据并不需要特殊处理。用户和开发者常常以“没人会在意我们的数据”这种想法来自我安慰。像个人识别号码这类数据显然很敏感；开发者与用户处理此类数据安全的方式，通常只是在文档中添加一条免责声明或说明而已。


    这一切随着各种系统中报告的大规模数据泄露事件而开始改变。处理敏感数据（或*可能*是或可能变得敏感的数据）的最佳实践也应运而生。


    作为对媒体报道和数据安全意识普遍提高的回应，各种法律法规开始落地实施。例如，在欧盟（EU），《通用数据保护条例》（GDPR）于 2018 年 5 月 25
    日生效。


    随着新的法律法规和最佳实践开始生效并成为日常运作的一部分，处理数据的人有必要了解如何在现代数据环境中实施这些新实践。本章通过一个案例研究，展示了非常简单的私有数据使用方式，以及如何因简单或粗心的使用而意外导致其被破坏。你可以利用这个案例研究来指导自己在私有数据使用和隐私实现方面的工作。

