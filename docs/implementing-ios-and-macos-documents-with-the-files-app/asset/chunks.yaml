- fmt: '# Summary


    Experiment with various combinations of senders and receivers. The set of items
    passed to the activity view controller is a set of type `Any`. For reference,
    here is the declaration of `init` for `UIActivityViewController`:


    ```

    init(activityItems: [Any], applicationActivities: [UIActivity]?)

    ```


    You’ll notice that you can specify activities as an optional; there is more information
    on them in the documentation.


    ## Note


    Strictly speaking, a preference is the value of a setting such as the color to
    be used for drawing a new line where the value is blue for the `lineColor` preference.
    Once the value of a setting is set, it persists and is used each time the app
    runs until it is changed. In this case, the preference may be referred to as a
    default. In iOS, the built-in Settings app lets users control preferences and
    settings.


    Preferences in Cocoa are stored in the Cocoa preferences system (also known as
    user defaults). If you want to make a strict distinction among these terms, in
    iOS the built-in Settings app controls these values for users. In Cocoa and Cocoa
    Touch, the user defaults system manages a database with the values. Some people
    distinguish between settings (part of the user interface) and user defaults (part
    of the Cocoa frameworks).


    This chapter explores the possibilities you can use today for these data tools.


    # Looking at the Data Structures


    When you are working with documents, you can control the formatting and management
    of the data. You can use a standard document type, which may have associated classes
    (images, for example), but the data for user defaults, settings, and preferences
    is more limited. Specifically, these objects must all be property list elements.
    A property list is a key-value structure where the keys are strings and the values
    are any of the following simple data types:


    - String

    - Date

    - Integer number

    - Float number

    - Boolean


    A property list (extension `.plist`) is designed for efficient serialization.
    The `PropertyListSerialization` class handles this for you. Property lists are
    used throughout Cocoa; over the years, this code has been refined and tested so
    that it can be relied on for many tasks.


    In addition, a `NSData` type can be stored in a property list. If you do this,
    you must handle the serialization and deserialization of that data to or from
    an object that you want to deal with. A very common case is converting a `NSData`
    type to some binary format, which can then be interpreted as an image or other
    complex data structure.


    Property lists can also include arrays and dictionaries. This means that you can
    use a property list, which itself is an array containing a dictionary that also
    declares another array as well as numbers and other simple objects.


    The other constraint to bear in mind when considering user defaults, settings,
    and preferences is that the guidance from Apple is that these tools should be
    used only for limited purposes and relatively small amounts of data.


    When thinking about storing data in this way, don’t worry too much about how much
    data can be stored as user defaults, settings, or preferences because that’s not
    really the limiting factor. If you use up almost all of a device’s storage in
    this way, you will degrade performance long before you run out of space.


    Property lists are stored as instances of the `PropertyListSerialization` class.
    As instances of this class, property lists are read and written in full when they
    are read or written. This can mean that in order to access a single Boolean value,
    you may need to read or write an entire property list with dozens, hundreds, or
    even thousands of items. You can focus your reading or writing by storing property
    list values in an array or dictionary, but this doesn’t really help you much.
    You will need to read the entire property list in order to get to the array or
    dictionary and only then will you be able to hone in on the value you want.


    The data that is stored as defaults, preferences, and settings can be anything
    that you want to store (provided that it is a property list and doesn’t take up
    too much space). There is a difference between these terms and this is a good
    place to start to understand them.


    ## Tip


    When you are thinking about using these tools to store your own data, remember
    that the Settings app and user defaults system manage the data. If you want total
    control over the data, how it is stored, and the user interface for it, you may
    want to use a database or document where you control these features.


    ## Understanding User Defaults


    A user default value is a starting value (default) for some aspect of your app.
    For example, an app that lets you store the names of students in a class may start
    by identifying students as Student 1, Student 2, and so forth. A new student that
    a user adds might be called New Student.


    In an app like this, you might want to let the users set their own defaults such
    as these:


    - “Student” is the name of each item in the app and new items are labelled “New
    Student.”

    - You could change the default value for items to be “Item” so that you would
    have “Chair” and “New Chair” as the app runs.

    - A slightly more complex default might let a user choose between “New” and a
    number to identify a new item, as in New Chair or Chair 3.


    Defaults like this are often exposed to the user so that they can choose.


    ## Tip


    In a case like this, an empty string may be the default.


    ## Exploring Settings


    There is a user defaults database that stores settings like this for each app.
    The settings values persist from one use of the app to the next. Furthermore,
    users can change settings directly using the built-in tool, as shown later in
    this chapter.


    ## Adding a Settings Bundle


    What you do need to do to implement Settings in an iOS app is add a new file that
    contains a settings bundle. You can do this in your app using New ➤ File, as shown
    in Figure [9-4](#465467_1_En_9_Chapter.xhtml#Fig4).


    ![../images/465467_1_En_9_Chapter/465467_1_En_9_Fig4_HTML.jpg](images/465467_1_En_9_Chapter/465467_1_En_9_Fig4_HTML.jpg)


    Figure 9-4. Adding a settings bundle to your app'
