  trans: '

    ### 创建文档


    你可以使用模板来创建新文档。如文档所述，你可以让用户选择将几个基本文档中的哪一个作为模板。参见图 7-10。


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig10_HTML.jpg](img/465467_1_En_7_Fig10_HTML.jpg)


    **图 7-10.** 创建文档


    在许多旧的设计模式中，你会选择创建一个空白文档，然后可能用数据对其进行修改。iOS 中最常用的设计模式并非创建文档，而是从你的 bundle 中复制一个现有的模板文档，并将副本放置在你的应用的适当位置。这是一种不同的工作流程，但随着你不断创建和修改应用，它会变得更高效。


    清单 7-3 展示了让用户从列表中选择模板的代码。关键代码行是：


    ```

    let newDocumentURL = Bundle.main.url(forResource: "Template",

    withExtension: DocumentBrowserViewController.documentExtension)

    importHandler(newDocumentURL, .copy)

    ```


    这行代码从你的 bundle 中获取一个名为 `Template` 且带有你的文档扩展名的文件，并将其复制到新位置。如果你不需要让用户从多个模板中选择，只需使用此代码，而无需弹出让用户选择的警告框。


    ```

    let title = NSLocalizedString("Choose File Template", comment: "")

    let cancelButtonTitle = NSLocalizedString("Cancel", comment: "")

    let defaultButtonTitle = NSLocalizedString("Basic (Default) ", comment: "Default")

    let generalButtonTitle = NSLocalizedString("Demo)", comment: "")

    let alertController = UIAlertController(title: title, message: message, preferredStyle:
    .alert)

    let newDocumentURL = Bundle.main.url(forResource: "Template",

    withExtension: DocumentBrowserViewController.documentExtension)

    importHandler(newDocumentURL, .copy)

    // 创建动作。

    let cancelAction = UIAlertAction(title: cancelButtonTitle,

    style: .cancel) { action in

    importHandler(nil, .none)

    }

    let defaultButtonAction = UIAlertAction(title: defaultButtonTitle,

    style: .default) { _ in

    let newDocumentURL = Bundle.main.url(forResource: "Template",

    withExtension: DocumentBrowserViewController.documentExtension)

    importHandler(newDocumentURL, .copy)

    }

    let generalButtonAction = UIAlertAction(title: generalButtonTitle,

    style: .default) { _ in

    let newDocumentURL = Bundle.main.url(forResource: "Template2",

    withExtension: DocumentBrowserViewController.documentExtension)

    importHandler(newDocumentURL, .copy)

    }

    // 添加动作。

    alertController.addAction(cancelAction)

    alertController.addAction(defaultButtonAction)

    alertController.addAction(generalButtonAction)

    present(alertController, animated: true, completion: nil)

    **清单 7-3** 让用户选择模板

    ```


    ### 选取（打开）文档


    图 7-11 展示了打开现有文档的代码。


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig11_HTML.jpg](img/465467_1_En_7_Fig11_HTML.jpg)


    **图 7-11.** 打开现有文档


    这里的关键代码行让你能够从多个现有文件中进行选择；你尝试打开列表中的第一个文件，如下所示：


    ```

    guard let sourceURL = documentURLs.first else { return }

    ```


    如图 7-9 所示，你可以在 `DocumentBrowserViewController` 的 `viewDidLoad` 中使用以下代码指定是否可以选择多个文件：


    ```

    allowsPicking Multiple Items = // true 或 false

    ```


    一旦你选取了一个文档，你请求 `DocumentBrowserViewController` 来呈现它，如图 7-12 所示。


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig12_HTML.jpg](img/465467_1_En_7_Fig12_HTML.jpg)


    **图 7-12.** 呈现文档


    或者你可以使用以下代码：


    ```

    presentDocument (at:destinationURL)

    ```


    典型的代码如清单 7-4 所示。


    ```

    func presentDocument(at documentURL: URL) {

    let storyBoard = UIStoryboard(name: "Main", bundle: nil)

    let documentViewController =

    storyBoard.instantiateViewController(withIdentifier:

    "DocumentViewController") as! DocumentViewController

    documentViewController.document =

    Document(fileURL: documentURL)

    present(documentViewController, animated: true,

    completion: nil)

    }

    **清单 7-4** 呈现文档

    ```


    请注意，此代码将文档视图控制器、故事板和一个文档结合在一起。所有这些组件必须匹配（这是调试问题的常见原因）。


    代码也如图 7-13 所示。


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig13_HTML.jpg](img/465467_1_En_7_Fig13_HTML.jpg)


    **图 7-13.** 呈现文档


    ### 处理错误


    处理文档浏览器视图控制器的最后一部分是确保正确处理错误；参见图 7-14。


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig14_HTML.jpg](img/465467_1_En_7_Fig14_HTML.jpg)


    **图 7-14.** 正确处理错误


    ## 本章小结


    本章展示了打开或创建文档所涉及的过程。最重要的收获是，最佳实践不是从头开始创建文档，而是将模板文档放入你的 bundle 中，这样打开和创建文档都可以使用相同的基础代码。


    # 8. 使用共享按钮共享文档


    在前面的章节中，你了解了如何在 iOS 和 macOS 上实现文档以保存数据并在你的应用之间共享数据。在本章中，你将看到另一种使用共享按钮共享数据的方式，这样你就可以动态地从一个应用向另一个应用共享数据，而无需使用文档来存储和共享数据。


    本章涵盖的主要内容有：


    -   使用共享按钮（作为用户）

    -   使用共享按钮（作为开发者）

    -   管理共享数据


    ## 使用共享按钮（作为用户）


    要共享数据，需要一个应用来共享数据（有时这个过程称为*提供*数据）以及另一个（或多个）应用来接收数据并按接收应用的需求使用数据。请注意，就像文档及其类型的情况一样，发送者和接收者（或提供者和接收者）之间的连接是动态的。两个应用都不需要了解对方。文档类型或共享信息让每个应用能够独立运行，这样你就不需要构建需要大量开发和维护成本的大型多用途应用。


    共享是 Cocoa 和 Cocoa Touch 的一部分（从操作系统的原始 NeXTSTEP 和 Rhapsody 版本开始就已经存在了）。为了共享数据，发送者和接收者都需要有一个通用的格式可用。以下是一个基本结构的例子。


    ## 创建共享示例

    '
- fmt: '### Note


    Remember that you can add apps to the simulator. Mail may not be configured for
    you. If you have a device you can use for testing, it’s best to use it. You can
    test the `ShareApp` by downloading it as described in Chapter [1](#465467_1_En_1_Chapter.xhtml).
    Look for the Chapter [8](#465467_1_En_8_Chapter.xhtml) version.


    The simplest example to use for sharing data is the Master-Detail project template
    in Xcode. It’s the basis for many examples (and even apps in the App Store). It’s
    a simple app with two views. On an iPhone, only one view at a time is shown; on
    larger devices, the two views share the screen. Whichever you’re using, you start
    from an app that lets you tap + to enter the current date and time, as you can
    see in Figure [8-1](#465467_1_En_8_Chapter.xhtml#Fig1).


    ![../images/465467_1_En_8_Chapter/465467_1_En_8_Fig1_HTML.jpg](images/465467_1_En_8_Chapter/465467_1_En_8_Fig1_HTML.jpg)


    Figure 8-1. Creating a new timestamp record


    If you tap the timestamp created in the master view, you’ll see the details (a
    better-formatted timestamp) shown in Figure [8-2](#465467_1_En_8_Chapter.xhtml#Fig2).


    ![../images/465467_1_En_8_Chapter/465467_1_En_8_Fig2_HTML.jpg](images/465467_1_En_8_Chapter/465467_1_En_8_Fig2_HTML.jpg)


    Figure 8-2. Detail view


    In Figure [8-3](#465467_1_En_8_Chapter.xhtml#Fig3), you can see an action button
    added to the navigation bar at the right. (You’ll learn how to implement it in
    this chapter). With the action button, you can share the data from the detail
    view.


    ![../images/465467_1_En_8_Chapter/465467_1_En_8_Fig3_HTML.jpg](images/465467_1_En_8_Chapter/465467_1_En_8_Fig3_HTML.jpg)


    Figure 8-3. Adding an action button to share the data


    The example used here is named `ShareApp`. Start from the Master-Detail App template
    shown in Figure [8-4](#465467_1_En_8_Chapter.xhtml#Fig4).


