    Figure 11-3.


    Sharing the master view controller data


    But what do you do if you want to share a single item? There are two approaches
    you can take. One is to put a Share button on a detail view controller, as you
    can see in Figure [11-4](#465467_1_En_11_Chapter.xhtml#Fig4).


    ![../images/465467_1_En_11_Chapter/465467_1_En_11_Fig4_HTML.jpg](images/465467_1_En_11_Chapter/465467_1_En_11_Fig4_HTML.jpg)


    Figure 11-4.


    Sharing from a detail view controller


    When using the master detail model, you have to remember that it is the master
    item that manages the detail items. This means that the control for selecting
    one of the detail items belongs on the master view controller because it is the
    master that will manage the selection of the detail item.


    If it is the master that will be handling selection, where do you put the Share
    button so that it is not confused with a Share button that selects everything?
    The most common solution is to simply use a tap or click in a detail row of the
    master view controller to manage selection. This is an efficient way to proceed
    (and it takes advantage of a useful function).


    The function that lets you select a single detail item from the master view controller
    is the `UITableViewDelegate` function named `tableView(_:didSelectRowAt:)`.


    Figure [11-5](#465467_1_En_11_Chapter.xhtml#Fig5) shows how to override that function
    with a log message. (The log message adds `log` and `type` variables to the minimal
    code in Listing [11-1](#465467_1_En_11_Chapter.xhtml#PC1)).


    The code shows a console message identifying which detail item has been selected,
    as you can see in Figure [11-5](#465467_1_En_11_Chapter.xhtml#Fig5).


    ![../images/465467_1_En_11_Chapter/465467_1_En_11_Fig5_HTML.jpg](images/465467_1_En_11_Chapter/465467_1_En_11_Fig5_HTML.jpg)


    Figure 11-5.


    Log selection of a detail item'
