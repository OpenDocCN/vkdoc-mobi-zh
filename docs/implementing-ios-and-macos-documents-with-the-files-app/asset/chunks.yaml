- fmt: '### Tip


    When adding a settings bundle to your app, be careful to select the correct file.
    There are other settings bundles such as WatchKit Settings Bundle and, in the
    future, there are likely to be other settings bundles.


    Make certain that you add the new file to the correct target in your app, as shown
    in Figure [9-5](#465467_1_En_9_Chapter.xhtml#Fig5). (The group you place it in
    is important for organizing your files, but the target is absolutely essential.)


    ![../images/465467_1_En_9_Chapter/465467_1_En_9_Fig5_HTML.jpg](images/465467_1_En_9_Chapter/465467_1_En_9_Fig5_HTML.jpg)


    **Figure 9-5.** Placing the new settings bundle in the right target


    When you have added the settings bundle, you’ll see it in your project navigator,
    as shown in Figure [9-6](#465467_1_En_9_Chapter.xhtml#Fig6).


    ![../images/465467_1_En_9_Chapter/465467_1_En_9_Fig6_HTML.jpg](images/465467_1_En_9_Chapter/465467_1_En_9_Fig6_HTML.jpg)


    **Figure 9-6.** Confirming that the settings bundle has been added to the project
    navigator


    Note that inside the bundle is a group (`en.lproj`) containing some localized
    strings for the root of the bundle as well as a property list of root strings.
    You can use these as-is. The default values are shown in Figure [9-7](#465467_1_En_9_Chapter.xhtml#Fig7).


    ![../images/465467_1_En_9_Chapter/465467_1_En_9_Fig7_HTML.jpg](images/465467_1_En_9_Chapter/465467_1_En_9_Fig7_HTML.jpg)


    **Figure 9-7.** You can use the default settings strings as-is


    With the settings bundle added to your app, you can try it out using the built-in
    settings. Run the app in the simulator and look for Settings, as shown in Figure
    [9-8](#465467_1_En_9_Chapter.xhtml#Fig8).


    ![../images/465467_1_En_9_Chapter/465467_1_En_9_Fig8_HTML.jpg](images/465467_1_En_9_Chapter/465467_1_En_9_Fig8_HTML.jpg)


    **Figure 9-8.** Using Settings in iOS


    Scroll down to find PreferencesApp, as shown in Figure [9-9](#465467_1_En_9_Chapter.xhtml#Fig9).


    ![../images/465467_1_En_9_Chapter/465467_1_En_9_Fig9_HTML.jpg](images/465467_1_En_9_Chapter/465467_1_En_9_Fig9_HTML.jpg)


    **Figure 9-9.** Tapping PreferencesApp in Settings


    Open `Root.plist` in the settings bundle. You will see the default settings shown
    in Figure [9-10](#465467_1_En_9_Chapter.xhtml#Fig10).


    ![../images/465467_1_En_9_Chapter/465467_1_En_9_Fig10_HTML.jpg](images/465467_1_En_9_Chapter/465467_1_En_9_Fig10_HTML.jpg)


    **Figure 9-10.** Initial settings


    Open the Text Field item so you can see its values. Change the value of Default
    Value to Student, as shown in Figure [9-11](#465467_1_En_9_Chapter.xhtml#Fig11).


    ![../images/465467_1_En_9_Chapter/465467_1_En_9_Fig11_HTML.jpg](images/465467_1_En_9_Chapter/465467_1_En_9_Fig11_HTML.jpg)


    **Figure 9-11.** Changing the Default Value to Student


    You can take advantage of the autocapitalization style, as you can see in Figure
    [9-12](#465467_1_En_9_Chapter.xhtml#Fig12). This means that the words of the entered
    text will be capitalized. Experiment with the other Settings commands and you’ll
    see that you have a lot of features built in that you don’t have to code yourself.


    ![../images/465467_1_En_9_Chapter/465467_1_En_9_Fig12_HTML.jpg](images/465467_1_En_9_Chapter/465467_1_En_9_Fig12_HTML.jpg)


    **Figure 9-12.** Adjusting the settings for your app


    Finally, test Settings in the simulator, as shown in Figure [9-13](#465467_1_En_9_Chapter.xhtml#Fig13).
    (You’ll notice that some items in Settings for an app are automatically added
    by iOS. The Siri & Search settings are an example of this.)


    ### Accessing the Settings Bundle from Your Code


    When a user adjusts Settings, that’s only the beginning. You need to be able to
    access the Settings values in your app. This section shows how to do so based
    on Settings, as shown in Figure [9-13](#465467_1_En_9_Chapter.xhtml#Fig13).


    ![../images/465467_1_En_9_Chapter/465467_1_En_9_Fig13_HTML.jpg](images/465467_1_En_9_Chapter/465467_1_En_9_Fig13_HTML.jpg)


    **Figure 9-13.** Test settings


    Start by reminding yourself that the Settings in iOS accesses the defaults database
    that is built into Cocoa. That database is managed by the `UserDefaults` class
    object (not an instance; the class). `UserDefaults` (the class object) has a function
    that returns the shared defaults object with the `standard` property. As noted
    previously, each item in `UserDefaults` has a key, and you can access it with
    code such as the following:


    ```

    return UserDefaults.standard.bool (forKey: "name_preference")

    ```


    This key is the identifier key in the property list. As you can see in Figure
    [9-14](#465467_1_En_9_Chapter.xhtml#Fig14), if you start to type the code to access
    a key, it is completed for you.


    ![../images/465467_1_En_9_Chapter/465467_1_En_9_Fig14_HTML.jpg](images/465467_1_En_9_Chapter/465467_1_En_9_Fig14_HTML.jpg)


    **Figure 9-14.** Using the identifier key to access a user default property


    You can test this by adding code to `appDelegate application(:didFinishLaunchingWithptions:)`,
    as you can see in Figure [9-15](#465467_1_En_9_Chapter.xhtml#Fig15).


    ![../images/465467_1_En_9_Chapter/465467_1_En_9_Fig15_HTML.jpg](images/465467_1_En_9_Chapter/465467_1_En_9_Fig15_HTML.jpg)


    **Figure 9-15.** Accessing a property in the user default Settings app


    ### Adding a Settings Interface


    The code shown in Figure [9-15](#465467_1_En_9_Chapter.xhtml#Fig15) is executed
    only when the app launches. You can build your own interface to show a user defaults
    property whenever you want it. In a view controller of the main storyboard, add
    a button, as shown in Figure [9-16](#465467_1_En_9_Chapter.xhtml#Fig16). (If you
    are using the Single View App project template, as shown in this chapter, the
    view controller to use is called `ViewController`.)


    ![../images/465467_1_En_9_Chapter/465467_1_En_9_Fig16_HTML.jpg](images/465467_1_En_9_Chapter/465467_1_En_9_Fig16_HTML.jpg)


    **Figure 9-16.** Adding a button to the view controller


    Remember to connect the button to an action in your app, as shown in Figure [9-17](#465467_1_En_9_Chapter.xhtml#Fig17).


    ![../images/465467_1_En_9_Chapter/465467_1_En_9_Fig17_HTML.jpg](images/465467_1_En_9_Chapter/465467_1_En_9_Fig17_HTML.jpg)


    **Figure 9-17.** Connecting the button to an action


    Add a breakpoint to the action so that you can check the value of the user default
    property, as shown in Figure [9-18](#465467_1_En_9_Chapter.xhtml#Fig18).


    ![../images/465467_1_En_9_Chapter/465467_1_En_9_Fig18_HTML.jpg](images/465467_1_En_9_Chapter/465467_1_En_9_Fig18_HTML.jpg)


    **Figure 9-18.** Using a breakpoint to check the value


    ## Summary


    This chapter showed how to use the built-in user defaults preferences and/or Settings
    app to store values for your app. These values must be able to be stored in a
    property list and they should now be large data objects, but you can use them
    for many purposes other than building a large-scale data manager.


    # 10. Working with File Wrappers and Packages


    This section lets you look at data storage tools other than documents. Like documents,
    they are all ways to persist data from your apps, and all of these tools, including
    documents, are supported on Cocoa and Cocoa Touch. Many of the tools (including
    the ones in this part of the book) have long histories in Cocoa and its predecessors.
    As noted, documents have evolved over time and have changed in many ways. The
    tools in this section have certainly changed over time, but the basic structures
    have remained remarkably stable so they are used in many legacy apps as well as
    in ones being developed today. All of the tools in this chapter let you combine
    files into multi-file structures that can be manipulated either as single structures
    or as their component parts.'
