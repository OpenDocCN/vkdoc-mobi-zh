    最后，在模拟器中测试“设置”，如图 9-13 所示。（您会注意到，应用中“设置”的某些项是由 iOS 自动添加的。“Siri 与搜索”设置就是一个例子。）


    ### 从代码访问设置包


    当用户调整“设置”时，这仅仅是个开始。您需要能够在应用中访问这些设置值。本节将展示如何基于“设置”实现这一点，如图 9-13 所示。


    ![../images/465467_1_En_9_Chapter/465467_1_En_9_Fig13_HTML.jpg](img/465467_1_En_9_Fig13_HTML.jpg)


