- fmt: '### Selecting the Item to Archive


    To get started with the archive, create a breakpoint so that you can access the
    selected item. You do so in the `tableView(_:didSelectRowAt:)` function, as shown
    in Listing [11-2](#465467_1_En_11_Chapter.xhtml#PC5).


    ```

    override func tableView(_ tableView: UITableView,

    didSelectRowAt indexPath: IndexPath) {

    //let rowDebugDescription = indexPath.debugDescription

    os_log("Row selected-%@",

    type: .info,

    indexPath.debugDescription)

    // set a breakpoint here

    let object = objects[indexPath.row] as! NSDate

    }

    Listing 11-2

    Showing the Selected Object

    ```


    Figure [11-6](#465467_1_En_11_Chapter.xhtml#Fig6) shows the simulator and the
    data in this test.


    ![../images/465467_1_En_11_Chapter/465467_1_En_11_Fig6_HTML.jpg](images/465467_1_En_11_Chapter/465467_1_En_11_Fig6_HTML.jpg)


    Figure 11-6. Data in the simulator for testing


    When the item is selected in the simulator, the breakpoint is triggered, as you
    can see in Figure [11-7](#465467_1_En_11_Chapter.xhtml#Fig7).


    ![../images/465467_1_En_11_Chapter/465467_1_En_11_Fig7_HTML.jpg](images/465467_1_En_11_Chapter/465467_1_En_11_Fig7_HTML.jpg)


    Figure 11-7. Make sure you have selected the right detail object


    This experiment requires that you correctly capture the detail item so make certain
    that you have done so. (In this sample, make sure you have created at least two
    detail items so that you can use the timestamps to differentiate between them.)


    ### Creating the Object to Archive


    `ShareApp` creates new objects in the master view controller that it then can
    display. These objects are `NSDate` objects with the current timestamp. When you
    start thinking about archiving objects, you can continue with these `NSDate` objects,
    but in real life, you will probably use custom objects that you archive. For that
    reason, a new object (`ShareableObject`) can be created here to use in your archiving
    tests. `SharableObject` will actually wrap an `NSDate` object, so the changes
    to the app are relatively few. (Not only are they relatively few, but if you are
    using this app as the basis of other projects, you’ll repeat these modifications
    for each one.)


    The first step is to create the new `SharableObject` class which wraps an `NSDate`
    object, which can be called `sharableDate`. As always, create the new class in
    Xcode using File ➤ New ➤ File to create a new Cocoa Touch Class for iOS, as you
    can see in Figure [11-8](#465467_1_En_11_Chapter.xhtml#Fig8).


    ![../images/465467_1_En_11_Chapter/465467_1_En_11_Fig8_HTML.jpg](images/465467_1_En_11_Chapter/465467_1_En_11_Fig8_HTML.jpg)


    Figure 11-8. Creating a new class for `ShareableObject`


    Name the new class as `SharableObject`, as shown in Figure [11-9](#465467_1_En_11_Chapter.xhtml#Fig9).


    ![../images/465467_1_En_11_Chapter/465467_1_En_11_Fig9_HTML.jpg](images/465467_1_En_11_Chapter/465467_1_En_11_Fig9_HTML.jpg)


    Figure 11-9. This will need to be a subclass of `NSObject`


    As always, when you add a new class to a project, make certain it is in the right
    target, as shown in Figure [11-10](#465467_1_En_11_Chapter.xhtml#Fig10).


    ![../images/465467_1_En_11_Chapter/465467_1_En_11_Fig10_HTML.jpg](images/465467_1_En_11_Chapter/465467_1_En_11_Fig10_HTML.jpg)


    Figure 11-10. Adding the new class to the target


    Add the `sharableDate` property to `SharableObject`, as shown in Figure [11-11](#465467_1_En_11_Chapter.xhtml#Fig11).


    ![../images/465467_1_En_11_Chapter/465467_1_En_11_Fig11_HTML.jpg](images/465467_1_En_11_Chapter/465467_1_En_11_Fig11_HTML.jpg)


    Figure 11-11. Creating the class


    Make a few changes so that instead of creating a new `NSDate` when you add an
    object to the app, you create a new `ShareableObject`. Similarly, you update the
    interface to show the date that is inside `ShareableObject`. These are common
    changes that are quickly shown in the following section.


    In `MasterViewController`, `insertNewObject` will have to insert a new `ShareableObject`.
    Listing [11-3](#465467_1_En_11_Chapter.xhtml#PC6) shows the updated function.


    ```

    @objc

    func insertNewObject(_ sender: Any) {

    //objects.insert(NSDate(), at: 0)

    objects.insert(SharableObject(), at: 0)

    let indexPath = IndexPath(row: 0, section: 0)

    tableView.insertRows(at: [indexPath], with: .automatic)

    }

    Listing 11-3

    Inserting a new ShareableObject

    ```


    Change `MasterViewController` as shown in Listing [11-4](#465467_1_En_11_Chapter.xhtml#PC7)
    to show the description of the `sharableDate` object.


    ```

    override func tableView(_ tableView: UITableView,

    cellForRowAt indexPath: IndexPath) -> UITableViewCell {

    let cell = tableView.dequeueReusableCell(withIdentifier: "Cell", for: indexPath)

    let object = objects[indexPath.row] as! SharableObject

    cell.textLabel!.text = object.sharableDate.description

    return cell

    }

    Listing 11-4

    Showing the Date

    ```


    Try running the app. It should look like the original version, but if you set
    a breakpoint, you should be able to see that you’re showing the description of
    `sharableDate`.


    ### Doing the Archive


    Now that you have the item to archive, you can archive it and proceed to unarchive
    it to test the process. To use the archiving tools, you need to implement the
    `NSCoder` protocol in the class to be archived (or unarchived). This structure
    means that each object encodes or decodes itself. You see this over and over in
    Cocoa apps: each object does its own work as much as possible. This means that
    when you make changes to the app, you minimize where the changes are made. If
    you want to go through the changes in the previous section, you’ll see that changing
    `NSDate` to `SharableObject`/`shareableDate` doesn’t require much rewriting of
    code.


    #### Making the Class Conform to `NSCoding`


    When you create the `SharableObject` class, you make it a subclass of `NSObject`,
    and you also make it conform to `NSCoding`, which does the archiving. By simply
    adding `NSCoding` to the class, you will generate some errors. Xcode will ask
    if you want it to automatically add stubs for the missing functions, as you can
    see in Figure [11-12](#465467_1_En_11_Chapter.xhtml#Fig12).


    ![../images/465467_1_En_11_Chapter/465467_1_En_11_Fig12_HTML.jpg](images/465467_1_En_11_Chapter/465467_1_En_11_Fig12_HTML.jpg)


    Figure 11-12. Xcode can add stubs for `NSCoding` functions


    This will get you on your way to completing the app.


    When you tap Fix, the stubs will be added, as you can see in Figure [11-13](#465467_1_En_11_Chapter.xhtml#Fig13).


    ![../images/465467_1_En_11_Chapter/465467_1_En_11_Fig13_HTML.jpg](images/465467_1_En_11_Chapter/465467_1_En_11_Fig13_HTML.jpg)


    Figure 11-13. Letting Xcode add stubs for `NSCoding`


    Complete the stubs with the code shown in Listing [11-5](#465467_1_En_11_Chapter.xhtml#PC8).


    ```

    import UIKit

    import os.log

    class SharableObject: NSObject, NSCoding {

    var sharableDate: NSDate=NSDate()

    func encode(with aCoder: NSCoder) {

    aCoder.encode(self.sharableDate, forKey: "dateKey")

    }

    required init?(coder aDecoder: NSCoder) {

    guard (aDecoder.decodeObject(forKey: "dateKey") as? NSDate) != nil else

    {

    os_log ("Unable to decode sharableDate")

    return

    }

    sharableDate = aDecoder.decodeObject(forKey: "dateKey") as? NSDate ?? NSDate()

    }

    override init() {

    sharableDate = NSDate()

    }

    init(dateToInit: NSDate) {

    sharableDate = dateToInit

    }

    }

    Listing 11-5

    Complete sharableObject

    ```


    The functions that you add all take an `NSCoder` called `aCoder` as a parameter.
    It is passed in so you don’t declare it. The `encode(with:)` function lets you
    encode data for the archive. The typical use of this function is to encode one
    variable in the class and to give it a key name. By doing this, you can access
    each variable in the archive by a key name and you don’t have to worry about the
    order of the data in the file. In Listing [11-5](#465467_1_En_11_Chapter.xhtml#PC8),
    the first encode function encodes the `sharableDate` property and assigns the
    key `dateKey` to it.


    The companion function, `init(coder:)`, takes a `Decoder` object and reverses
    the process.'
