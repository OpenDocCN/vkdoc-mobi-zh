    # 案例研究：使用 Cocoa 定位服务


    最重要的隐私问题之一与移动设备的位置有关。在移动设备普及之前，数据隐私主要关乎保护相对静态的信息，即使这些信息是通过互联网共享的。然而，有了移动设备，设备本身就可能产生机密的位置数据。这是任何需要定位自身以及用于拨打电话或执行其他必要功能的基础设施的设备的必要功能的一部分。


    可以禁用移动设备上的部分或全部定位服务（例如，通过使用飞行模式），但这会限制或降低性能。苹果公司将定位服务设计为可以直接打开和关闭的功能，而无需禁用所有通信。为此，你需要使用
    Cocoa 定位服务框架。


    用户需要允许在其设备上使用定位服务。这通常发生在安装操作系统或设置设备时，但用户也可以通过“设置”来操作。图 4-1 展示了用户如何通过“设置”为某个应用配置隐私定位设置。


    ![../images/465467_1_En_4_Chapter/465467_1_En_4_Fig1_HTML.jpg](img/465467_1_En_4_Fig1_HTML.jpg)


    图 4-1. 定位服务设置


    一旦你在“定位服务”部分找到了你的应用，就可以选择你想要的隐私设置。应用可以根据需要请求你的权限，如图 4-2 所示。（弹出窗口顶部的文本将在本章后面解释。）


    ![../images/465467_1_En_4_Chapter/465467_1_En_4_Fig2_HTML.jpg](img/465467_1_En_4_Fig2_HTML.jpg)


    图 4-2. 根据需要调整应用的定位隐私设置


    当使用“设置”时，如图 4-1 所示，你可以通过图 4-3 所示的界面设置相同的选项。


    ![../images/465467_1_En_4_Chapter/465467_1_En_4_Fig3_HTML.jpg](img/465467_1_En_4_Fig3_HTML.jpg)


    图 4-3. 在“设置”应用中使用与来自应用的弹出窗口相同的设置


    除了“设置”和应用的弹出窗口中的文本外，你还必须调整你的属性列表以支持这些界面。如图 4-4 所示，你的属性列表中有一些位置，用于描述如何使用用户的位置数据。


    ![../images/465467_1_En_4_Chapter/465467_1_En_4_Fig4_HTML.jpg](img/465467_1_En_4_Fig4_HTML.jpg)


    图 4-4. 调整隐私定位设置的属性列表


    让用户知道你将如何使用收集到的位置数据非常重要。请注意，苹果的审核人员要求开发者在其对数据使用方式的描述中要具体明确。仅仅使用诸如“获取用户位置”这样的表述来解释你对位置数据的使用已经不够了。图
    4-5 显示了一个描述不够具体的示例。


    ![../images/465467_1_En_4_Chapter/465467_1_En_4_Fig5_HTML.jpg](img/465467_1_En_4_Fig5_HTML.jpg)


    图 4-5. 确保描述你将如何使用数据


    如果你未提供任何描述，你的应用会向控制台写入一条消息，如图 4-6 所示。


    ![../images/465467_1_En_4_Chapter/465467_1_En_4_Fig6_HTML.jpg](img/465467_1_En_4_Fig6_HTML.jpg)


    图 4-6. 缺少描述会阻止应用获取位置


    定位服务是隐私和安全方面常见问题的一个典型例子。如果未提供位置数据使用方式的描述，控制台会显示一条运行时消息，但不会抛出错误，如图 4-6 所示。你可以争论这是否应该算作一个错误（就像苹果的工程师们很可能已经争论过的那样），但以下论点很有说服力：即使这可能是一个编程错误，它*不是*一个错误。


    将这种类型的警告构建到应用中是一种常见且通常良好的设计。然而，图 4-5 展示了一个常见的错误。请注意描述是“这是一个测试。”由于没有抛出错误，这种描述位置数据将如何被使用的方式极易出现在最终发布的产品中。如果你浏览关于安全的媒体评论和文章，你会发现最大的抱怨之一是，当应用确实提供了数据使用方式的信息时，这些信息很可能是错误的。它通常是一个占位符（“这是一个测试”）或通过复制粘贴从另一个应用带来的描述。


    ## 总结


    由于关于收集哪些数据以及如何使用这些数据的解释是用简单的语言编写的，而不是编译器或构建过程可以标记的代码，因此这些描述经常出错。现在，根据如 GDPR 等法规要求提供这些信息，这些错误比以往任何时候都更加重要。


    关键在于，你应该确保面向用户的安全描述是正确的，以便用户能够信赖、理解并使用它们。


    # 在 macOS 上实现文档：NSDocument


    macOS 上文档的核心是 `NSDocument` 类。就像 iOS 中的 `UIDocument` 一样，它是一个抽象类，你需要为你的应用创建其子类。有三个类相互协作，为你的应用提供文档功能。它们分别是：


    *   `NSDocument` 是你为你的应用创建子类的抽象类。

    *   `NSDocumentController` 是特定于应用的类，用于管理文档的打开和关闭。

    *   `NSWindowController` 是管理显示文档窗口的类。


    macOS 和 `NSDocument` 与 iOS 和 `UIDocument` 之间的这些类并非一一对应；然而，`NSDocument` 和 `UIDocument`
    之间的相似性，以及 `NSDocumentController` 和 `UIDocumentController` 之间的相似性很重要（但也仅仅是相似罢了）。


    ## iOS UIDocuments 与 macOS NSDocuments 的区别


    iOS 文档和 macOS 文档之间的最大区别在于，在 macOS 上，文档是系统环境的一部分，而在 iOS 上，文档是每个应用环境的一部分。这背后有原因（其中许多原因反映了两大操作系统的演进过程），但重要的是你的应用运行和文档存在的环境这一方面。


    换句话说，用于管理文档的工具（例如，创建和保存文档）是 macOS 的一部分，而在 iOS 上，它们是诸如 `UIDocumentBrowserViewController`
    等工具的一部分，而不是 iOS 本身的一部分。

    '
- fmt: '# Creating a Document-Based App on macOS


    As is usually the case, the simplest way to start building a new app is to use
    one of the built-in Xcode templates. Creating a document-based macOS app is no
    different. Start by creating a new project using the macOS Cocoa App template,
    shown in Figure [5-1](#465467_1_En_5_Chapter.xhtml#Fig1).


    ![../images/465467_1_En_5_Chapter/465467_1_En_5_Fig1_HTML.jpg](images/465467_1_En_5_Chapter/465467_1_En_5_Fig1_HTML.jpg)


    Figure 5-1. Creating a new Cocoa app for macOS


    As you do with an iOS project, name the macOS project and provide optional information,
    as shown in Figure [5-2](#465467_1_En_5_Chapter.xhtml#Fig2).


    ![../images/465467_1_En_5_Chapter/465467_1_En_5_Fig2_HTML.jpg](images/465467_1_En_5_Chapter/465467_1_En_5_Fig2_HTML.jpg)


    Figure 5-2. Information for a macOS app


    By contrast, Figure [5-3](#465467_1_En_5_Chapter.xhtml#Fig3) shows the options
    for an iOS app.


    ![../images/465467_1_En_5_Chapter/465467_1_En_5_Fig3_HTML.jpg](images/465467_1_En_5_Chapter/465467_1_En_5_Fig3_HTML.jpg)


    Figure 5-3. Information for an iOS app


    There are some options for macOS projects that you won’t find for iOS apps. In
    particular, for macOS project templates, you’ll see options to use storyboards
    and documents. For iOS project templates, you have a template for documents, and
    storyboards are assumed.


    As is always the case when you create a new project from a template, try to run
    it as you see in Figure [5-4](#465467_1_En_5_Chapter.xhtml#Fig4) at the top left
    with the right-pointing arrow. (Some projects, particularly those that require
    an iCloud account, may not run, but this one should run for you.)


    ![../images/465467_1_En_5_Chapter/465467_1_En_5_Fig4_HTML.jpg](images/465467_1_En_5_Chapter/465467_1_En_5_Fig4_HTML.jpg)


    Figure 5-4. Running the app


    As the project runs, it will use your Mac to run it instead of an iOS simulator.
    The basic app should show you a screen such as the one shown in Figure [5-5](#465467_1_En_5_Chapter.xhtml#Fig5).


    ![../images/465467_1_En_5_Chapter/465467_1_En_5_Fig5_HTML.jpg](images/465467_1_En_5_Chapter/465467_1_En_5_Fig5_HTML.jpg)


    Figure 5-5. Running your new macOS app


    ## Adding Code to Your macOS App


    It is a good idea to look inside the app that you’ve created to see how it works.
    (This will help you make changes to it as you develop your app.)


    The main components of your app when you start out from the project template are
    as follows:


    * `AppDelegate`: This is functionally similar to the `AppDelegate` that you use
    for iOS apps.

    * `ViewController`: This is a view controller (named `ViewController`) that works
    similarly to a view controller in an iOS app.

    * `Document`: This is a subclass of the `NSDocument` class.


    The following sections show you the code for this project.


    ## AppDelegate


    As you can see in Figure [5-6](#465467_1_En_5_Chapter.xhtml#Fig6), this is similar
    to app delegates in iOS apps (but it''s much shorter, in part because the operating
    system has much of the document work built into it).


    ![../images/465467_1_En_5_Chapter/465467_1_En_5_Fig6_HTML.jpg](images/465467_1_En_5_Chapter/465467_1_En_5_Fig6_HTML.jpg)


    Figure 5-6. Using `AppDelegate`


    The basic code that is part of the project template is shown in Listing [5-1](#465467_1_En_5_Chapter.xhtml#PC1).
    The comments in the code explain what you can add to it. The project template
    will run without any customization but you should implement the commented-out
    code or a variation of it before releasing an app even just for testing.


    ```

    import Cocoa

    @NSApplicationMain

    class AppDelegate: NSObject, NSApplicationDelegate {

    func applicationDidFinishLaunching(_ aNotification: Notification) {

    // Insert code here to initialize your application

    }

    func applicationWillTerminate(_ aNotification: Notification) {

    // Insert code here to tear down your application

    }

    }

    ```


    Listing 5-1. `AppDelegate` Template Code


    ## ViewController


    `ViewController` is the instance of `NSViewController` that will let you manage
    objects in the view. The basic `ViewController` is shown in Figure [5-7](#465467_1_En_5_Chapter.xhtml#Fig7)
    and Listing [5-2](#465467_1_En_5_Chapter.xhtml#PC2). It will be modified in the
    "`Document`" section later in this chapter.


    ![../images/465467_1_En_5_Chapter/465467_1_En_5_Fig7_HTML.jpg](images/465467_1_En_5_Chapter/465467_1_En_5_Fig7_HTML.jpg)


    Figure 5-7. Creating the `ViewController`


    ```

    //

    //  ViewController.swift

    //  Document2A

    //

    //

    import Cocoa

    class ViewController: NSViewController {

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view.

    }

    override var representedObject: Any? {

    didSet {

    // Update the view, if already loaded.

    }

    }

    }

    ```


    Listing 5-2. `ViewController` Code


    ## Document


    `Document` is the subclass of `NSDocument` that manages the document and its data.
    The basic code is shown in Figure [5-8](#465467_1_En_5_Chapter.xhtml#Fig8) and
    Listing [5-3](#465467_1_En_5_Chapter.xhtml#PC3). It is important to note that
    the document subclass `makeWindowControllers` method includes the code for matching
    the storyboard to the `Document` class.


    ![../images/465467_1_En_5_Chapter/465467_1_En_5_Fig8_HTML.jpg](images/465467_1_En_5_Chapter/465467_1_En_5_Fig8_HTML.jpg)


    Figure 5-8. Managing your document


    ```

    //

    //  Document.swift

    //  Document2A

    //

    //

    import Cocoa

    class Document: NSDocument {

    override init() {

    super.init()

    // Add your subclass-specific initialization here.

    }

    override class var autosavesInPlace: Bool {

    return true

    }

    override func makeWindowControllers() {

    // Returns the Storyboard that contains your Document window.

    let storyboard = NSStoryboard(

    name: NSStoryboard.Name("Main"), bundle: nil)

    let windowController =

    storyboard.instantiateController(

    withIdentifier:

    NSStoryboard.SceneIdentifier(

    "Document Window Controller"))

    as! NSWindowController

    self.addWindowController(windowController)

    }

    override func data(ofType typeName: String) throws -> Data {

    // Insert code here to write your document to data of the

    // specified type, throwing an error in case of failure.

    // Alternatively, you could remove this method and override

    // fileWrapper(ofType:), write(to:ofType:), or

    // write(to:ofType:for:originalContentsURL:) instead.

    throw NSError(domain: NSOSStatusErrorDomain,

    code: unimpErr, userInfo: nil)

    }

    override func read(from data: Data,

    ofType typeName: String) throws {

    // Insert code here to read your document from the

    // given data of the specified type, throwing an error in case of failure.

    // Alternatively, you could remove this method and override

    // read(from:ofType:) instead.

    // If you do, you should also override isEntireFileLoaded to

    // return false if the contents are lazily loaded.

    throw NSError(domain: NSOSStatusErrorDomain,

    code: unimpErr, userInfo: nil)

    }

    }

    ```


    Listing 5-3. `Document` Code


    ## Storyboard


    Figure [5-9](#465467_1_En_5_Chapter.xhtml#Fig9) shows how you can modify the storyboard
    in the template to add a text view (you do this just as you do it in iOS). In
    `Document`, you can use the text view to collect the data and then process it.


    ![../images/465467_1_En_5_Chapter/465467_1_En_5_Fig9_HTML.jpg](images/465467_1_En_5_Chapter/465467_1_En_5_Fig9_HTML.jpg)


    Figure 5-9.'
