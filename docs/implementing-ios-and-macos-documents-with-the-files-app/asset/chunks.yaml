- fmt: '# 2. Looking Inside a Document


    In Chapter [1](#465467_1_En_1_Chapter.xhtml), you learned how to describe and
    structure a document. You now know that you, as the designer and developer of
    an app and its documents, control what data is stored, where and how it is stored,
    and how to identify and reference it.


    You can decide that the data will be stored as a sequence of integers or as a
    single long string, whatever matters to you and the data you will use. In practice,
    it makes sense to structure the data inside a document if only to be able to access
    it easily. This chapter shows how to structure the data within a document using
    JSON encoding. This structure and encoding provides an easy-to-use format for
    data that relies on Unicode strings that can represent basic types recognized
    by JSON.


    ## Using JSON Encoding


    What matters most for JSON is the fact that the format is text-based (as opposed,
    for example, to a binary or digital representation) and the fact that each element
    can be named (as opposed to being identified by location or sequence).


    A location- or sequence-based coding style lets you specify the format of each
    element in the encoding sequence. Knowing the format of an element means that
    you know how much space it will take up, and this will let you read or write the
    data using the standard read/write syntax in any programming language.


    The disadvantage of sequence- or location-based coding is that if you change the
    sequence of data elements or the format of a data element, you break any read/write
    code that you already have. JSON encoding relies on names of data elements rather
    than their formats or sequence. Thus, you avoid the frequent problem of breaking
    read/write code when you modify a format of a single data element or when you
    change the order of the data elements.


    ## Introducing JSON


    JSON starts as a text format for serialization of structured data. In this sense,
    *serialization* means converting the strings or other objects into a format that
    can be read or written. JSON starts from four primitive types, the meanings of
    which are common to many programming languages:


    - A *string* is an ordered collection of Unicode characters.

    - A *number* is just that; the most basic JSON number is a double.

    - A *Boolean* is true or false.

    - The final primitive value in JSON is *null*, an object that has no value.


    In JSON, these types can be combined into *objects*, which are unordered collections
    of name/value pairs; a JSON *array* is an ordered collection of name/value pairs.


    ## JSON and Swift


    Swift goes beyond the basic JSON types with its `JSONSerialization` class (part
    of the Foundation framework). `JSONSerialization` converts JSON into array and
    dictionary Swift data types in addition to the basic JSON string, number, and
    Bool data types.


    ### Note


    Swift bridges Boolean and bool (C) types into Bool types. This is handled automatically
    for you.


    ### Using Swift Structs


    JSON is a flexible and easy-to-use notation tool. On the other hand, Swift is
    designed to be a powerful tool for building apps, particularly those using the
    model-view-controller (MVC) design pattern, which is more complex than JSON. One
    area that demonstrates this well is the Swift struct type. You may often declare
    structs in Swift that you will use throughout your app (or not at all). When you
    work strictly with JSON, it is uncommon to declare a struct that is not used to
    store data. This section explains how to create and use Swift structs with JSON.


    Listing [2-1](#465467_1_En_2_Chapter.xhtml#PC1) shows how to create a Swift struct
    for a `Student` object or model (the terms are interchangeable in this section)
    using a playground.


    ```

    import Foundation

    struct Student {

    var name: String

    var studentID: Int

    }

    Listing 2-1

    Swift Struct

    ```


    What matters here is that the `Student` struct contains two var elements: `name`
    and `studentID`. Also worth noting is the fact that in this playground the Foundation
    framework must be imported because it will be used for working with JSON data.
    The other elements of the struct are standard Swift elements.


    ### Tip


    Note that the Swift style is to capitalize names of objects such as structs, so
    the name of the `Student` struct is capitalized.


    With the struct shown in Listing [2-1](#465467_1_En_2_Chapter.xhtml#PC1), you
    can create an instance of the struct using code such as the following:


    ```

    let student1 = Student(name: "John Appleseed", studentID: 154)

    ```


    You can integrate JSON with Swift by using an `encode(to: encoder)` function to
    encode data along with an `init(from decoder:)` to do the reverse. To do this,
    you need to create keys to identify the elements that you will be coding and decoding.
    The first step is to declare coding keys as an `enum CodingKeys` element, as shown
    in Listing [2-2](#465467_1_En_2_Chapter.xhtml#PC3).


    ```

    enum CodingKeys: String, CodingKey {

    case studentID = "studentID"

    case name

    }

    }

    Listing 2-2

    Swift Extension for Coding Keys

    ```


    Note that they are the keys you will use to encode and decode the data for the
    `name` and `studentID` variables. With the keys established along with the variables,
    you can now create an `encode(to: encoder)` function, as shown in Listing [2-3](#465467_1_En_2_Chapter.xhtml#PC4).
    Note that this extension indicates that the `Student` struct conforms to the `Encodable`
    protocol.


    ```

    extension Student: Encodable {

    func encode(to encoder: Encoder) throws {

    var container = encoder.container(keyedBy: CodingKeys.self)

    try container.encode(name, forKey: .name)

    try container.encode(studentID, forKey: .studentID)

    }

    }

    Listing 2-3

    Swift Extension for Encoding

    ```


    ### Encoding JSON


    You’ll need a `JSONEncoder` object to handle encoding. Such a `JSONEncoder` object
    is often named `jsonEncoder` but you can use any name you want. A `JSONEncoder`
    object specifies the container for the encoded data.


    In Listing [2-3](#465467_1_En_2_Chapter.xhtml#PC4), there is only one function,
    `encode(to: encoder)`, and it uses a `jsonEncoder` object, the container that
    will contain the encoded data retrieved from the encoder.


    The heart of the `encode(to: encoder)` function consists of the three lines of
    code that encode the struct elements (`name` and `studentID`).


    The first of these lines tries to encode the `name` var using the `.name` key:


    ```

    try container.encode(name, forKey: .name)

    ```


    The second of these lines tries to encode the `studentID` var using the `.studentID`
    key:


    ```

    try container.encode(studentID, forKey: .studentID)

    ```


    These lines of code appear frequently in this type of function. In case you are
    wondering how the `try` is handled, note that the `func encode(to encoder: Encoder)`
    function can throw an error.


    ### Tip


    If you are debugging this code, set a breakpoint on the `try` statement so that
    you can see what causes a problem. Typical problems you may encounter in this
    code are typos in the key names.


    Once you have created a `jsonEncoder`, you can reference the container within
    it and associate it with keys that you have declared elsewhere in the function
    with this line of code:


    ```

    var container = encoder.container(keyedBy: CodingKeys.self)

    ```'
  raw: '# 2. Looking Inside a Document


    In Chapter [1](#465467_1_En_1_Chapter.xhtml), you learned how to describe and
    structure a document. You now know that you, as the designer and developer of
    an app and its documents, control what data is stored, where and how it is stored,
    and how to identify and reference it.


    You can decide that the data will be stored as a sequence of integers or as a
    single long string, whatever matters to you and the data you will use. In practice,
    it makes sense to structure the data inside a document if only to be able to access
    it easily. This chapter shows how to structure the data within a document using
    JSON encoding. This structure and encoding provides an easy-to-use format for
    data that relies on Unicode strings that can represent basic types recognized
    by JSON.


    ## Using JSON Encoding


    What matters most for JSON is the fact that the format is text-based (as opposed,
    for example, to a binary or digital representation) and the fact that each element
    can be named (as opposed to being identified by location or sequence).


    A location- or sequence-based coding style lets you specify the format of each
    element in the encoding sequence. Knowing the format of an element means that
    you know how much space it will take up, and this will let you read or write the
    data using the standard read/write syntax in any programming language.


    The disadvantage of sequence- or location-based coding is that if you change the
    sequence of data elements or the format of a data element, you break any read/write
    code that you already have. JSON encoding relies on names of data elements rather
    than their formats or sequence. Thus, you avoid the frequent problem of breaking
    read/write code when you modify a format of a single data element or when you
    change the order of the data elements.


    ## Introducing JSON


    JSON starts as a text format for serialization of structured data. In this sense,
    *serialization* means converting the strings or other objects into a format that
    can be read or written. JSON starts from four primitive types, the meanings of
    which are common to many programming languages:


    *   A *string* is an ordered collection of Unicode characters.


    *   A *number* is just that; the most basic JSON number is a double.


    *   A *Boolean* is true or false.


    *   The final primitive value in JSON is *null*, an object that has no value.


    In JSON, these types can be combined into *objects*, which are unordered collections
    of name/value pairs; a JSON *array* is an ordered collection of name/value pairs.


    ## JSON and Swift


    Swift goes beyond the basic JSON types with its `JSONSerialization` class (part
    of the Foundation framework). `JSONSerialization` converts `JSON` into array and
    dictionary Swift data types in addition to the basic JSON string, number, and
    Bool data types.


    ### Note


    Swift bridges Boolean and bool (C) types into Bool types. This is handled automatically
    for you.


    ### Using Swift Structs


    JSON is a flexible and easy-to-use notation tool. On the other hand, Swift is
    designed to be a powerful tool for building apps, particularly those using the
    model-view-controller (MVC) design pattern, which is more complex than JSON. One
    area that demonstrates this well is the Swift struct type. You may often declare
    structs in Swift that you will use throughout your app (or not at all). When you
    work strictly with JSON, it is uncommon to declare a struct that is not used to
    store data. This section explains how to create and use Swift structs with JSON.


    Listing [2-1](#465467_1_En_2_Chapter.xhtml#PC1) shows how to create a Swift struct
    for a `Student` object or model (the terms are interchangeable in this section)
    using a playground.


    ```

    import Foundation

    struct Student {

    var name: String

    var studentID: Int

    }

    Listing 2-1

    Swift Struct

    ```


    What matters here is that the `Student` struct contains two var elements: `name`
    and `studentID`. Also worth noting is the fact that in this playground the Foundation
    framework must be imported because it will be used for working with JSON data.
    The other elements of the struct are standard Swift elements.


    ### Tip


    Note that the Swift style is to capitalize names of objects such as structs, so
    the name of the `Student` struct is capitalized.


    With the struct shown in Listing [2-1](#465467_1_En_2_Chapter.xhtml#PC1), you
    can create an instance of the struct using code such as the following:


    ```

    let student1 = Student(name: "John Appleseed", studentID: 154)

    ```


    You can integrate JSON with Swift by using an `encode (to: encoder)` function
    to encode data along with an `init (from decoder:)` to do the reverse. To do this,
    you need to create keys to identify the elements that you will be coding and decoding.
    The first step is to declare coding keys as an `enum CodingKeys element,` as shown
    in Listing [2-2](#465467_1_En_2_Chapter.xhtml#PC3).


    ```

    enum CodingKeys: String, CodingKey {

    case studentID = "studentID"

    case name

    }

    }

    Listing 2-2

    Swift Extension for Coding Keys

    ```


    Note that they are the keys you will use to encode and decode the data for the
    `name` and `studentID` variables. With the keys established along with the variables,
    you can now create an `encode (to: encoder)` function, as shown in Listing [2-3](#465467_1_En_2_Chapter.xhtml#PC4).
    Note that this extension indicates that the `Student` struct conforms to the `Encodable`
    protocol.


    ```

    extension Student: Encodable {

    func encode(to encoder: Encoder) throws {

    var container = encoder.container(keyedBy: CodingKeys.self)

    try container.encode(name, forKey: .name)

    try container.encode(studentID, forKey: .studentID)

    }

    }

    Listing 2-3

    Swift Extension for Encoding

    ```


    ### Encoding JSON


    You’ll need a `JSONEncoder` object to handle encoding. Such a `JSONEncoder` object
    is often named `jsonEncoder` but you can use any name you want. A `JSONEncoder`
    object specifies the container for the encoded data.


    In Listing [2-3](#465467_1_En_2_Chapter.xhtml#PC4), there is only one function,
    `encode (to: encoder)`, and it uses a `jsonEncoder` object, the container that
    will contain the encoded data retrieved from the encoder.


    The heart of the `encode` `(to: encoder)` function consists of the three lines
    of code that encode the struct elements `(name and studentID)`.


    The first of these lines tries to encode the `name` var using the `.name` key:


    ```

    try container.encode(name, forKey: .name)

    ```


    The second of these lines tries to encode the `studentID` var using the `.studentID`
    key:


    ```

    try container.encode(studentID, forKey: .studentID)

    ```


    These lines of code appear frequently in this type of function. In case you are
    wondering how the `try` is handled, note that the


    ```

    func encode(to encoder: Encoder)function

    ```


    can throw an error.


    ### Tip


    If you are debugging this code, set a breakpoint on the `try` statement so that
    you can see what causes a problem. Typical problems you may encounter in this
    code are typos in the key names.


    Once you have created a `jsonEncoder`, you can reference the container within
    it and associate it with keys that you have declared elsewhere in the function
    with this line of code:


    ```

    var container = encoder.container(keyedBy: CodingKeys.self)

    ```'
  trans: "\n# 2. 深入文档内部\n\n在第 1 章中，你已经学习了如何描述和构建文档。现在你明白，作为应用程序及其文档的设计者和开发者，你控制着哪些数据被存储、存储的位置和方式，以及如何识别和引用这些数据。\n\
    \n你可以决定将数据存储为整数序列或单个长字符串，这完全取决于你和你要使用的数据。实际上，在文档内部对数据进行结构化是有意义的，哪怕只是为了能够轻松访问。本章展示了如何使用\
    \ JSON 编码来组织文档内部的数据。这种结构和编码为依赖 Unicode 字符串的数据提供了一种易于使用的格式，这些字符串可以表示 JSON 所识别的基本类型。\n\
    \n## 使用 JSON 编码\n\n对 JSON 而言，最重要的是其格式基于文本（与二进制或数字表示相反），并且每个元素都可以被命名（而不是通过位置或顺序来标识）。\n\
    \n基于位置或顺序的编码风格允许你在编码序列中指定每个元素的格式。了解元素的格式意味着你知道它将占用多少空间，这让你可以使用任何编程语言中的标准读/写语法来读取或写入数据。\n\
    \n基于顺序或位置的编码的缺点是，如果你更改了数据元素的顺序或数据元素的格式，就会破坏你已有的任何读/写代码。JSON 编码依赖于数据元素的名称，而不是它们的格式或顺序。因此，当你修改单个数据元素的格式或更改数据元素的顺序时，可以避免经常破坏读/写代码的问题。\n\
    \n## 介绍 JSON\n\nJSON 最初是一种用于序列化结构化数据的文本格式。从这个意义上说，*序列化* 意味着将字符串或其他对象转换为可读或可写的格式。JSON\
    \ 从四种基本类型开始，这些类型在许多编程语言中都有常见含义：\n\n-   *字符串* 是 Unicode 字符的有序集合。\n-   *数字* 就是数字；最基本的\
    \ JSON 数字是双精度浮点数。\n-   *布尔值* 是 true 或 false。\n-   JSON 中的最后一个基本值是 *null*，一个没有值的对象。\n\
    \n在 JSON 中，这些类型可以组合成 *对象*，对象是名称/值对的无序集合；JSON *数组* 是名称/值对的有序集合。\n\n## JSON 与 Swift\n\
    \nSwift 通过其 `JSONSerialization` 类（属于 Foundation 框架的一部分）超越了基本的 JSON 类型。`JSONSerialization`\
    \ 除了基本的 JSON 字符串、数字和布尔数据类型外，还将 JSON 转换为 Swift 数组和字典数据类型。\n\n### 注意\n\nSwift 将布尔和\
    \ bool（C 语言）类型桥接为布尔类型。这为你自动处理。\n\n### 使用 Swift 结构体\n\nJSON 是一种灵活且易于使用的标记工具。另一方面，Swift\
    \ 被设计为构建应用程序的强大工具，特别是那些使用模型-视图-控制器（MVC）设计模式的应用程序，其复杂程度超过了 JSON。Swift 结构体类型就是一个很好的例子。你可能会在\
    \ Swift 中声明一些将在整个应用程序中使用（或根本不使用）的结构体。当你严格使用 JSON 时，声明一个不用于存储数据的结构体并不常见。本节将解释如何创建和将\
    \ Swift 结构体与 JSON 一起使用。\n\n代码清单 2-1 展示了如何使用 playground 为 `Student` 对象或模型（本节中这两个术语可以互换）创建\
    \ Swift 结构体。\n\n```\nimport Foundation\nstruct Student {\n    var name: String\n\
    \    var studentID: Int\n}\n// 代码清单 2-1\n// Swift 结构体\n```\n\n这里重要的是 `Student`\
    \ 结构体包含两个变量元素：`name` 和 `studentID`。同样值得注意的是，在这个 playground 中必须导入 Foundation 框架，因为它将用于处理\
    \ JSON 数据。结构体的其他元素是标准的 Swift 元素。\n\n### 提示\n\n请注意，Swift 的风格是结构体等对象名称的首字母大写，因此\
    \ `Student` 结构体的名称是大写的。\n\n使用代码清单 2-1 中所示的结构体，你可以使用如下代码创建该结构体的实例：\n\n```\nlet\
    \ student1 = Student(name: \"John Appleseed\", studentID: 154)\n```\n\n你可以通过使用\
    \ `encode(to: encoder)` 函数来编码数据，以及使用 `init(from decoder:)` 函数来执行反向操作，从而将 JSON\
    \ 与 Swift 集成。为此，你需要创建键来标识将要编码和解码的元素。第一步是声明编码键作为 `enum CodingKeys` 元素，如代码清单 2-2\
    \ 所示。\n\n```\nenum CodingKeys: String, CodingKey {\n    case studentID = \"studentID\"\
    \n    case name\n}\n}\n// 代码清单 2-2\n// 编码键的 Swift 扩展\n```\n\n请注意，这些是你将用来对 `name`\
    \ 和 `studentID` 变量的数据进行编码和解码的键。在建立了键和变量之后，你现在可以创建一个 `encode(to: encoder)` 函数，如代码清单\
    \ 2-3 所示。请注意，此扩展表明 `Student` 结构体遵循 `Encodable` 协议。\n\n```\nextension Student:\
    \ Encodable {\n    func encode(to encoder: Encoder) throws {\n        var container\
    \ = encoder.container(keyedBy: CodingKeys.self)\n        try container.encode(name,\
    \ forKey: .name)\n        try container.encode(studentID, forKey: .studentID)\n\
    \    }\n}\n// 代码清单 2-3\n// 编码的 Swift 扩展\n```\n\n### 编码 JSON\n\n你需要一个 `JSONEncoder`\
    \ 对象来处理编码。这样的 `JSONEncoder` 对象通常命名为 `jsonEncoder`，但你可以使用任何你想要的名称。`JSONEncoder`\
    \ 对象指定了编码数据的容器。\n\n在代码清单 2-3 中，只有一个函数 `encode(to: encoder)`，它使用了一个 `jsonEncoder`\
    \ 对象，该对象是包含从编码器获取的编码数据的容器。\n\n`encode(to: encoder)` 函数的核心由三行编码结构体元素（`name` 和 `studentID`）的代码组成。\n\
    \n第一行代码尝试使用 `.name` 键编码 `name` 变量：\n\n```\ntry container.encode(name, forKey:\
    \ .name)\n```\n\n第二行代码尝试使用 `.studentID` 键编码 `studentID` 变量：\n\n```\ntry container.encode(studentID,\
    \ forKey: .studentID)\n```\n\n这几行代码经常出现在这类函数中。如果你想知道 `try` 是如何处理的，请注意 `func encode(to\
    \ encoder: Encoder)` 函数可能会抛出错误。\n\n### 提示\n\n如果你正在调试这段代码，请在 `try` 语句处设置断点，以便查看导致问题的原因。你在此代码中可能遇到的典型问题是键名称的拼写错误。\n\
    \n一旦你创建了一个 `jsonEncoder`，你就可以引用它内部的容器，并将其与你在此函数的其他地方声明的键关联起来，使用的代码行如下：\n\n```\n\
    var container = encoder.container(keyedBy: CodingKeys.self)\n```\n"
- fmt: '### Decoding JSON


    Listing [2-4](#465467_1_En_2_Chapter.xhtml#PC9) shows the reverse operation to
    decode the JSON code.


    ```

    extension Student: Decodable {

    init(from decoder: Decoder) throws {

    let values = try decoder.container(keyedBy: CodingKeys.self)

    name = try values.decode(String.self, forKey: .name)

    studentID = try values.decode(Int.self, forKey: .studentID)

    }

    }

    Listing 2-4

    Extension for Decoding

    ```


    Rather than an `encode(to: encoder:)` function, the heart of this code is `init(from
    decoder: Decoder)`.


    You retrieve the values from the `decoder` container using the coding keys, like
    so:


    ```

    let values = try decoder.container(keyedBy: CodingKeys.self)

    ```


    Rather than encode each variable and key, you then decode them using code such
    as the following:


    ```

    name = try values.decode(String.self, forKey: .name)

    studentID = try values.decode(Int.self, forKey: .studentID)

    ```


    ### Putting the Encoding and Decoding Together


    You can encode and decode the data as you wish. For the purpose of debugging,
    you can print out encoded data using code such as the following:


    ![../images/465467_1_En_2_Chapter/465467_1_En_2_Figa_HTML.jpg](images/465467_1_En_2_Chapter/465467_1_En_2_Figa_HTML.jpg)


    You can print out a string showing the JSON code:


    ![../images/465467_1_En_2_Chapter/465467_1_En_2_Figb_HTML.jpg](images/465467_1_En_2_Chapter/465467_1_En_2_Figb_HTML.jpg)


    You can then reverse the process to print out the decoded data, as you see here:


    ![../images/465467_1_En_2_Chapter/465467_1_En_2_Figc_HTML.jpg](images/465467_1_En_2_Chapter/465467_1_En_2_Figc_HTML.jpg)


    ### Note


    For debugging, you may want to add the code in this section to your app so that
    you can use breakpoints to verify the encoding and decoding of the data. Usually
    once it is working and the keys are correct, you can disable the breakpoints or
    even remove them.


    ## Summary


    This chapter showed you how to encode and decode JSON data to and from Swift structs.
    Because you will be working with named Swift objects, you don’t have to worry
    about the sequence or formatting of data.


    # 3. Matching a Document to a Document Format


    In this chapter, you will see how to match a document as described and defined
    in your app’s code to an actual runtime document object. This is the heart of
    putting documents to work. This chapter covers the three basic points you need
    to address:


    - Preparing for iCloud

    - Setting up your document in your app

    - Managing document types


    ## Preparing for iCloud


    You may wonder what iCloud has to do with documents, but the answer is quite simple.
    As you start to use more and more aspects of iOS and macOS, you’ll see that network
    connectivity and iCloud are no longer special cases. More and more you (and your
    users) will find that iCloud and the network are essential for your devices to
    function properly. It’s taken a long time, but it’s safe to say that we do have
    connectivity now.


    Not only do we have connectivity most of the time, but users and developers are
    getting more comfortable with managing that connectivity. Developers and users
    alike turn to airplane mode when it’s necessary to go offline for one reason or
    another. (This is a dramatic simplification from the days when it was common practice
    to separately adjust Bluetooth, data access, and other connections.)


    Because iCloud connectivity is so common today, many developers include it in
    the capability settings for apps. Figure [3-1](#465467_1_En_3_Chapter.xhtml#Fig1)
    shows the iCloud capability for a macOS app.


    ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig1_HTML.jpg](images/465467_1_En_3_Chapter/465467_1_En_3_Fig1_HTML.jpg)


    Figure 3-1 Setting up iCloud for a macOS app


    The iCloud services can be turned on or off with the checkboxes. Note that iCloud
    documents can be enabled here. It’s important to note as well that both CloudKit
    and key-value storage can be used with documents. You’ll learn more about key-value
    storage with documents in Chapter [9](#465467_1_En_9_Chapter.xhtml).


    For an iOS app, Figure [3-2](#465467_1_En_3_Chapter.xhtml#Fig2) shows the cloud
    capability settings.


    ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig2_HTML.jpg](images/465467_1_En_3_Chapter/465467_1_En_3_Fig2_HTML.jpg)


    Figure 3-2 Setting up iCloud for an iOS app


    Note that although there are many more options available for iOS apps, the section
    for the iCloud options is the same for iOS and macOS apps. For this reason, iCloud
    data is compatible with both environments.


    ## Setting Up Your Document in Your App


    There are differences in setting up and using documents in iOS and macOS; however,
    the basic settings, shown in Figures [3-3](#465467_1_En_3_Chapter.xhtml#Fig3)
    and [3-4](#465467_1_En_3_Chapter.xhtml#Fig4), are very similar. Figure [3-3](#465467_1_En_3_Chapter.xhtml#Fig3)
    shows the document setup for an iOS app, and Figure [3-4](#465467_1_En_3_Chapter.xhtml#Fig4)
    shows the setup for a macOS app.


    ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig3_HTML.jpg](images/465467_1_En_3_Chapter/465467_1_En_3_Fig3_HTML.jpg)


    Figure 3-3 Setting up a document in iOS


    Setting up a document in macOS is fairly similar, as you can see in Figure [3-4](#465467_1_En_3_Chapter.xhtml#Fig4).


    ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig4_HTML.jpg](images/465467_1_En_3_Chapter/465467_1_En_3_Fig4_HTML.jpg)


    Figure 3-4 Setting up a document in macOS


    ## Managing Document Types


    An app can open many different documents depending on how you build the app and
    the documents. Each type of document (not each specific document) is defined as
    a document type in your info property list, as you can see in Figure [3-5](#465467_1_En_3_Chapter.xhtml#Fig5).


    Note that a document type has a name. In Figure [3-5](#465467_1_En_3_Chapter.xhtml#Fig5),
    that name is Images; the document type name is descriptive and is used internally
    by your app.


    A document type can handle various types of content. Apple uses uniform type identifiers
    (UTIs) to identify standard types. You can also create your own types. Using the
    standard types where possible makes your app more usable because users can read
    and write any files that conform to the supported UTIs.


    For example, Figure [3-5](#465467_1_En_3_Chapter.xhtml#Fig5) shows that the Images
    document type can handle any document that conforms to the `public.image` UTI
    specification. There is more on data types later in this chapter. For now, it
    is sufficient to know that the Images data type defined in this app (built with
    the Document Based App iOS project template) conforms to a standard image format
    called `public.image` which, in turn, conforms to the `public.data` and `public.content`
    UTIs.


    ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig5_HTML.jpg](images/465467_1_En_3_Chapter/465467_1_En_3_Fig5_HTML.jpg)


    Figure 3-5 The Images data type for iOS


    The simplest way to think about UTIs is:


    - **Document types** are the types of documents your app can open.

    - **Exported UTIs** are the types of documents your app controls and can export
    (in a simple sense, they are the UTIs that your app writes).

    - **Imported UTIs** are the types of documents your app reads. They are controlled
    by other apps, which export them.


    Figure [3-5](#465467_1_En_3_Chapter.xhtml#Fig5) shows a document type for an iOS
    app. There are different settings for document types used in macOS. Some of the
    differences revolve around the fact that in macOS, the document type is used to
    determine what app opens that document type. In iOS, this is handled differently.


    Figure [3-6](#465467_1_En_3_Chapter.xhtml#Fig6) shows a document type for macOS.


    ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig6_HTML.jpg](images/465467_1_En_3_Chapter/465467_1_En_3_Fig6_HTML.jpg)


