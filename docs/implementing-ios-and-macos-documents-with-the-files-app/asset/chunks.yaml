- fmt: '# Case Study: Using Cocoa Location Services


    One of the most important privacy issues has to do with the location of mobile
    devices. Before mobile devices were so widespread, data privacy was mostly a matter
    of protecting information that was relatively static even if it was shared over
    the Internet. With mobile devices, however, the device itself can create confidential
    location data. This is a part of the necessary functioning of any device that
    needs to be able to locate itself and the infrastructure that it needs to use
    to make phone calls or otherwise do what it needs to do.


    It is possible to disable some or all of the location services on a mobile device
    (for example, by using airplane mode) but this limits or degrades performance.
    Apple has made location services a feature that can be turned on and off directly
    rather than disabling all communications. To do so, you use the Cocoa Location
    Services Framework.


    Users need to allow the use of location services on their device. Often this happens
    during installation of the operating system or setup of the device, but users
    can do it using Settings. Figure [4-1](#465467_1_En_4_Chapter.xhtml#Fig1) shows
    how a user can set up the privacy location settings for an app using Settings.


    ![../images/465467_1_En_4_Chapter/465467_1_En_4_Fig1_HTML.jpg](images/465467_1_En_4_Chapter/465467_1_En_4_Fig1_HTML.jpg)


    Figure 4-1. The Location Services settings


    Once you have located your app in the Location Services section, you can choose
    the privacy settings you want. An app can ask for your permission on an as-needed
    basis, as you can see in Figure [4-2](#465467_1_En_4_Chapter.xhtml#Fig2). (The
    text at the top of the alert is explained later in this chapter.)


    ![../images/465467_1_En_4_Chapter/465467_1_En_4_Fig2_HTML.jpg](images/465467_1_En_4_Chapter/465467_1_En_4_Fig2_HTML.jpg)


    Figure 4-2. Adjusting location privacy settings for an app as needed


    When using Settings, as shown in Figure [4-1](#465467_1_En_4_Chapter.xhtml#Fig1),
    you can set the same options using the interface shown in Figure [4-3](#465467_1_En_4_Chapter.xhtml#Fig3).


    ![../images/465467_1_En_4_Chapter/465467_1_En_4_Fig3_HTML.jpg](images/465467_1_En_4_Chapter/465467_1_En_4_Fig3_HTML.jpg)


    Figure 4-3. Using the same settings in the Settings app as in an alert from the
    app


    In addition to the text in Settings and an app alert, you must adjust your property
    list to support these interfaces. As you can see in Figure [4-4](#465467_1_En_4_Chapter.xhtml#Fig4),
    your property list has places where you describe how the user’s location data
    will be used.


    ![../images/465467_1_En_4_Chapter/465467_1_En_4_Fig4_HTML.jpg](images/465467_1_En_4_Chapter/465467_1_En_4_Fig4_HTML.jpg)


    Figure 4-4. Adjusting the property list for the privacy location settings


    It is very important to let the user know how you will use the location data you
    collect. Note that Apple reviewers ask developers to be specific in their description
    of how data will be used. It''s no longer sufficient to explain your use of location
    data with a phrase such as "Get the user''s location." Figure [4-5](#465467_1_En_4_Chapter.xhtml#Fig5)
    shows an example of a description that is not specific enough.


    ![../images/465467_1_En_4_Chapter/465467_1_En_4_Fig5_HTML.jpg](images/465467_1_En_4_Chapter/465467_1_En_4_Fig5_HTML.jpg)


    Figure 4-5. Make sure you describe how you will use the data


    If you do not provide any description, your app will write a message to the console,
    as shown in Figure [4-6](#465467_1_En_4_Chapter.xhtml#Fig6).


    ![../images/465467_1_En_4_Chapter/465467_1_En_4_Fig6_HTML.jpg](images/465467_1_En_4_Chapter/465467_1_En_4_Fig6_HTML.jpg)


    Figure 4-6. A missing description prevents the app from getting the location


    Location services provide a great example of a common problem with privacy and
    security. If a description for the use of the location data is not provided, a
    runtime message is displayed in the console, but no error is thrown, as you can
    see in Figure [4-6](#465467_1_En_4_Chapter.xhtml#Fig6). You can argue whether
    this should be an error or not (as the engineers at Apple most likely have done),
    but the argument is convincing that it is *not* an error even though it might
    be a programming mistake.


    It is a common and usually good design to build this type of warning into an app.
    However, Figure [4-5](#465467_1_En_4_Chapter.xhtml#Fig5) shows a common error.
    Note that the description is "This is a test." Because no error is thrown, it
    is remarkably easy for this description of how the location data will be used
    to show up in a shipping product. If you look at media reviews and articles about
    security, you''ll see that one of the biggest complaints is that when an app does
    provide information about how data will be used, it may well be wrong. It is often
    a placeholder ("This is a test") or a description from another app that has been
    brought forward by copy-and-paste.


    ## Summary


    Because the explanations of what data is collected and how it will be used are
    written in simple language and not code that a compiler or build process can flag,
    these descriptions are very often wrong. Now that they are required by regulations
    such as GDPR, these errors are more important than ever.


    The moral is that you should make certain that descriptions of security for users
    are correct so that users can rely on them, understand them, and use them.


    # Implementing Documents on macOS: NSDocument


    The heart of documents on macOS is the `NSDocument` class. Like `UIDocument` in
    iOS, it is an abstract class that you subclass for your own app. Three classes
    interact to provide document functionality in your app. They are the following:


    * `NSDocument` is the abstract class that you subclass for your app.

    * `NSDocumentController` is the app-specific class that manages the opening and
    closing of your document.

    * `NSWindowController` is the class that manages the window in which your document
    is displayed.


    There isn''t a one-to-one mapping of these classes between macOS and `NSDocument`
    and iOS and `UIDocument`; however, the similarities between `NSDocument` and `UIDocument`
    as well as the similarities between `NSDocumentController` and `UIDocumentController`
    are important (but they are no more than similarities).


    ## Differences Between iOS UIDocuments and macOS NSDocuments


    The biggest difference between iOS documents and macOS documents is that on macOS,
    the documents are part of the system environment and on iOS, they are part of
    each app''s environment. There are reasons for this (many of which reflect the
    evolution of the two operating systems), but what matters is this aspect of the
    environment in which your app runs and your document exists.


    Putting it another way, the tools that let you manage documents (creating and
    saving them, for example) are part of macOS and, on iOS they are part of tools
    such as `UIDocumentBrowserViewController` rather than iOS.'
