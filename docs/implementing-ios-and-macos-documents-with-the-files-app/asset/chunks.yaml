    ## Summary


    Document types are used to match a document and its contents to a subclass of
    `UIDocument` or `NSDocument`. UTIs are used to identify documents that may be
    used by various apps and documents. In this chapter, you also explored the structuring
    and setting up of iCloud for documents and the use of property lists with files
    and documents.


    # 4. Securing and Protecting Data


    As soon as you start thinking about saving data, you should be thinking about
    the security of that data. Every step of the process from deciding what data to
    store and what rules to implement for safeguarding that data needs to be considered.
    This chapter focuses on these issues.


    ## Security and Privacy Overview


    As pointed out at the beginning of Chapter [1](#465467_1_En_1_Chapter.xhtml),
    we use documents to store and organize the data that we use in apps. There are
    two fundamental types of data that we organize into documents: data that is distributed
    with the app, and data that users create and modify. The second type, which is
    data that users create and modify, may include data distributed with the app.


    No matter what type of data is involved, if you are building or designing an app,
    you need to be aware of data issues that may arise. Until fairly recently, data
    issues were fairly modest in apps. Some data was clearly sensitive, but most data
    in apps required no special handling. Users and developers took frequent refuge
    behind the notion that “no one will care about our data.” Data such as personal
    identification numbers was clearly sensitive; developers and users often handled
    security for such data by adding a disclaimer or note in the documentation.


    All of this started changing as massive data breaches were reported in a variety
    of systems. Best practices for the handling of sensitive data (or data that *might*
    be or become sensitive) were formulated.


    In response to media reports and general awareness of data security, laws and
    regulations have begun to be implemented. For example, in the European Union (EU),
    the General Data Protection Regulation (GDPR) came into effect on May 25, 2018.


    As new laws, regulations, and best practices take effect and become part of everyday
    operations, it behooves people who deal with data to understand how to implement
    these new practices in the modern data environment. This chapter provides a case
    study of a very simple use of private data and how it can be accidentally destroyed
    by simple or careless use. You can use this case study to guide you in your use
    of private data and privacy implementation.'
