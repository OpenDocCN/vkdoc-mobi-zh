  raw: '### Decoding JSON


    Listing [2-4](#465467_1_En_2_Chapter.xhtml#PC9) shows the reverse operation to
    decode the JSON code.


    ```

    extension Student: Decodable {

    init(from decoder: Decoder) throws {

    let values = try decoder.container(keyedBy: CodingKeys.self)

    name = try values.decode(String.self, forKey: .name)

    studentID = try values.decode(Int.self, forKey: .studentID)

    }

    }

    Listing 2-4

    Extension for Decoding

    ```


    Rather than an `encode(to: encoder:)` function, the heart of this code is `init(from
    decoder: Decoder)`.


    You retrieve the values from the `decoder` container using the coding keys, like
    so:


    ```

    let values = try decoder.container(keyedBy: CodingKeys.self)

    ```


    Rather than encode each variable and key, you then decode them using code such
    as the following:


    ```

    name = try values.decode(String.self, forKey: .name)

    studentID = try values.decode(Int.self, forKey: .studentID)

    ```


    ### Putting the Encoding and Decoding Together


    You can encode and decode the data as you wish. For the purpose of debugging,
    you can print out encoded data using code such as the following:


    ![../images/465467_1_En_2_Chapter/465467_1_En_2_Figa_HTML.jpg](images/465467_1_En_2_Chapter/465467_1_En_2_Figa_HTML.jpg)


    You can print out a string showing the JSON code:


    ![../images/465467_1_En_2_Chapter/465467_1_En_2_Figb_HTML.jpg](images/465467_1_En_2_Chapter/465467_1_En_2_Figb_HTML.jpg)


    You can then reverse the process to print out the decoded data, as you see here:


    ![../images/465467_1_En_2_Chapter/465467_1_En_2_Figc_HTML.jpg](images/465467_1_En_2_Chapter/465467_1_En_2_Figc_HTML.jpg)


    ### Note


    For debugging, you may want to add the code in this section to your app so that
    you can use breakpoints to verify the encoding and decoding of the data. Usually
    once it is working and the keys are correct, you can disable the breakpoints or
    even remove them.


    ## Summary


    This chapter showed you how to encode and decode JSON data to and from Swift structs.
    Because you will be working with named Swift objects, you don’t have to worry
    about the sequence or formatting of data.


    # 3. Matching a Document to a Document Format


    In this chapter, you will see how to match a document as described and defined
    in your app’s code to an actual runtime document object. This is the heart of
    putting documents to work. This chapter covers the three basic points you need
    to address:


    *   Preparing for iCloud


    *   Setting up your document in your app


    *   Managing document types


    ## Preparing for iCloud


    You may wonder what iCloud has to do with documents, but the answer is quite simple.
    As you start to use more and more aspects of iOS and macOS, you’ll see that network
    connectivity and iCloud are no longer special cases. More and more you (and your
    users) will find that iCloud and the network are essential for your devices to
    function properly. It’s taken a long time, but it’s safe to say that we do have
    connectivity now.


    Not only do we have connectivity most of the time, but users and developers are
    getting more comfortable with managing that connectivity. Developers and users
    alike turn to airplane mode when it’s necessary to go offline for one reason or
    another. (This is a dramatic simplification from the days when it was common practice
    to separately adjust Bluetooth, data access, and other connections.)


    Because iCloud connectivity is so common today, many developers include it in
    the capability settings for apps. Figure [3-1](#465467_1_En_3_Chapter.xhtml#Fig1)
    shows the iCloud capability for a macOS app.


    ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig1_HTML.jpg](images/465467_1_En_3_Chapter/465467_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Setting up iCloud for a macOS app


    The iCloud services can be turned on or off with the checkboxes. Note that iCloud
    documents can be enabled here. It’s important to note as well that both CloudKit
    and key-value storage can be used with documents. You’ll learn more about key-value
    storage with documents in Chapter [9](#465467_1_En_9_Chapter.xhtml).


    For an iOS app, Figure [3-2](#465467_1_En_3_Chapter.xhtml#Fig2) shows the cloud
    capability settings.


    ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig2_HTML.jpg](images/465467_1_En_3_Chapter/465467_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Setting up iCloud for an iOS app


    Note that although there are many more options available for iOS apps, the section
    for the iCloud options is the same for iOS and macOS apps. For this reason, iCloud
    data is compatible with both environments.


    ## Setting Up Your Document in Your App


    There are differences in setting up and using documents in iOS and macOS; however,
    the basic settings, shown in Figures [3-3](#465467_1_En_3_Chapter.xhtml#Fig3)
    and [3-4](#465467_1_En_3_Chapter.xhtml#Fig4), are very similar. Figure [3-3](#465467_1_En_3_Chapter.xhtml#Fig3)
    shows the document setup for an iOS app, and Figure [3-4](#465467_1_En_3_Chapter.xhtml#Fig4)
    shows the setup for a macOS app.


    ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig3_HTML.jpg](images/465467_1_En_3_Chapter/465467_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Setting up a document in iOS


    Setting up a document in macOS is fairly similar, as you can see in Figure [3-4](#465467_1_En_3_Chapter.xhtml#Fig4).


    ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig4_HTML.jpg](images/465467_1_En_3_Chapter/465467_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Setting up a document in macOS


    ## Managing Document Types


    An app can open many different documents depending on how you build the app and
    the documents. Each type of document (not each specific document) is defined as
    a document type in your info property list, as you can see in Figure [3-5](#465467_1_En_3_Chapter.xhtml#Fig5).


    Note that a document type has a name. In Figure [3-5](#465467_1_En_3_Chapter.xhtml#Fig5),
    that name is Images; the document type name is descriptive and is used internally
    by your app.


    A document type can handle various types of content. Apple uses uniform type identifiers
    (UTIs ) to identify standard types. You can also create your own types. Using
    the standard types where possible makes your app more usable because users can
    read and write any files that conform to the supported UTIs.


    For example, Figure [3-5](#465467_1_En_3_Chapter.xhtml#Fig5) shows that the Images
    document type can handle any document that conforms to the `public.image` UTI
    specification. There is more on data types later in this chapter. For now, it
    is sufficient to know that the Images data type defined in this app (built with
    the Document Based App iOS project template) conforms to a standard image format
    called `public.image` which, in turn, conforms to the `public.data` and `public.content`
    UTIs.


    ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig5_HTML.jpg](images/465467_1_En_3_Chapter/465467_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    The Images data type for iOS


    The simplest way to think about UTIs is


    *   **Document types** are the types of documents your app can open.


    *   **Exported UTIs** are the types of documents your app controls and can export
    (in a simple sense, they are the UTIs that your app writes).


    *   **Imported UTIs** are the types of documents your app reads. They are controlled
    by other apps, which export them.


    Figure [3-5](#465467_1_En_3_Chapter.xhtml#Fig5) shows a document type for an iOS
    app. There are different settings for document types used in macOS. Some of the
    differences revolve around the fact that in macOS, the document type is used to
    determine what app opens that document type. In iOS, this is handled differently.


    Figure [3-6](#465467_1_En_3_Chapter.xhtml#Fig6) shows a document type for macOS.


    ![../images/465467_1_En_3_Chapter/465467_1_En_3_Fig6_HTML.jpg](images/465467_1_En_3_Chapter/465467_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Document types for macOS apps differ from iOS apps'
