    ### 执行归档


    现在你有了要归档的项目，就可以进行归档并接着解归档以测试流程。要使用归档工具，你需要在要归档（或解归档）的类中实现 `NSCoder` 协议。这种结构意味着每个对象自行编码或解码。在
    Cocoa 应用中你会反复看到这一点：每个对象尽可能自行完成工作。这意味着当你对应用进行修改时，可以最小化变更点。如果你回顾上一节中的修改，会发现将 `NSDate`
