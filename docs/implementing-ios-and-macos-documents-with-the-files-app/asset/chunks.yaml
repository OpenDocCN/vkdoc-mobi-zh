- fmt: '# Looking at Recent Documents


    Using the tabs at the bottom of the window, you can switch between recent files
    and folders and ones that you want to browse. Figure [6-6](#465467_1_En_6_Chapter.xhtml#Fig6)
    shows recent files and folders.


    ![../images/465467_1_En_6_Chapter/465467_1_En_6_Fig6_HTML.jpg](images/465467_1_En_6_Chapter/465467_1_En_6_Fig6_HTML.jpg)


    Figure 6-6. Recent files and folders


    If some of your documents have not yet been downloaded from a remote server, you
    will see the cloud icon shown in Figure [6-7](#465467_1_En_6_Chapter.xhtml#Fig7),
    indicating that they are waiting to be downloaded. If you tap a specific file,
    you can speed up its downloading process.


    ![../images/465467_1_En_6_Chapter/465467_1_En_6_Fig7_HTML.jpg](images/465467_1_En_6_Chapter/465467_1_En_6_Fig7_HTML.jpg)


    Figure 6-7. Downloading files


    Note that in addition to indicating if a file needs to be downloaded, you can
    see its location. For example, in Figure [6-7](#465467_1_En_6_Chapter.xhtml#Fig7),
    in the lower right, you can see a document that is marked as `On My iPad` rather
    than `iCloud Drive`.


    ### Tip


    Get used to working with Files and using the file location information and download
    status. Because there is often a time lag as a download is scheduled and processed,
    you will save yourself time if you know what files are where so that you don’t
    try to debug issues that are merely timing issues.


    ## Viewing Files and Folders for an App


    When you look at apps on an iOS device, you can tap and hold an app icon to see
    the files and folders that may belong to it, as shown in Figure [6-8](#465467_1_En_6_Chapter.xhtml#Fig8).


    ![../images/465467_1_En_6_Chapter/465467_1_En_6_Fig8_HTML.jpg](images/465467_1_En_6_Chapter/465467_1_En_6_Fig8_HTML.jpg)


    Figure 6-8. Tap and hold an app icon to see its files


    If necessary, a `Show More` button will appear at the top right, as you can see
    in Figure [6-8](#465467_1_En_6_Chapter.xhtml#Fig8). When you use `Show More`,
    a companion `Show Less` button appears, as you can see in Figure [6-9](#465467_1_En_6_Chapter.xhtml#Fig9).


    ![../images/465467_1_En_6_Chapter/465467_1_En_6_Fig9_HTML.jpg](images/465467_1_En_6_Chapter/465467_1_En_6_Fig9_HTML.jpg)


    Figure 6-9. The `Show Less` option


    When you look at the apps in Files (Figure [6-7](#465467_1_En_6_Chapter.xhtml#Fig7)),
    you will see a list of the files and folders, as shown in Figure [6-10](#465467_1_En_6_Chapter.xhtml#Fig10).


    ![../images/465467_1_En_6_Chapter/465467_1_En_6_Fig10_HTML.jpg](images/465467_1_En_6_Chapter/465467_1_En_6_Fig10_HTML.jpg)


    Figure 6-10. A list of all files and folders for an app


    ## Summary


    Use Settings to control where you store the files and folders for an app, and
    use Files to browse files and folders as well as recents.


    Remember that you control where the files and folders are placed not by selecting
    locations on your personal computer but by selecting locations on the device you’re
    using or on a cloud storage function such as `iCloud` or `Dropbox`.


    # 7. Implementing Documents on iOS: UIDocument and UIDocumentBrowser ViewController


    Documents are critical components of many apps and have been so from the beginning
    of the personal computer era. Many people still think of documents as paper-based
    objects, but the documents that people work with today on iOS and macOS are much
    more sophisticated than their paper predecessors. This chapter introduces today’s
    documents and their structures. It then explains how to use `UIDocumentBrowserViewController`
    to manage documents.


    ## Creating a Document-Based App


    As is often the case with the basic building blocks of the frameworks in Xcode,
    the simplest way to get started with documents for iOS is to use the Document
    Based App project template that’s built into Xcode. Begin by creating a new iOS
    project, as shown in Figure [7-1](#465467_1_En_7_Chapter.xhtml#Fig1).


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig1_HTML.jpg](images/465467_1_En_7_Chapter/465467_1_En_7_Fig1_HTML.jpg)


    Figure 7-1. Picking the Document Based App template in Xcode


    Go through the standard options shown in Figure [7-2](#465467_1_En_7_Chapter.xhtml#Fig2)
    to set up the template.


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig2_HTML.jpg](images/465467_1_En_7_Chapter/465467_1_En_7_Fig2_HTML.jpg)


    Figure 7-2. Setting the options for the new project


    Continue with the options until you have the project template complete as shown
    in Figure [7-3](#465467_1_En_7_Chapter.xhtml#Fig3).


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig3_HTML.jpg](images/465467_1_En_7_Chapter/465467_1_En_7_Fig3_HTML.jpg)


    Figure 7-3. Reviewing the new project


    When you’re finished, run the app. (This is a step you should always take when
    you create a new project from a template. Except for issues such as network availability,
    your new project template should run.)


    As you can see in Figure [7-4](#465467_1_En_7_Chapter.xhtml#Fig4), you can open
    the project and see the storyboard with two view controllers.


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig4_HTML.jpg](images/465467_1_En_7_Chapter/465467_1_En_7_Fig4_HTML.jpg)


    Figure 7-4. Looking at the storyboard


    Run the project. You should see the Simulator, as shown in Figure [7-5](#465467_1_En_7_Chapter.xhtml#Fig5).


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig5_HTML.jpg](images/465467_1_En_7_Chapter/465467_1_En_7_Fig5_HTML.jpg)


    Figure 7-5. Running the app


    Continue exploring your new app. Use the `Browse` tab to browse files in your
    app’s sandbox, as shown in Figure [7-6](#465467_1_En_7_Chapter.xhtml#Fig6).


    ![../images/465467_1_En_7_Chapter/465467_1_En_7_Fig6_HTML.jpg](images/465467_1_En_7_Chapter/465467_1_En_7_Fig6_HTML.jpg)


    Figure 7-6. Exploring the `Browse` tab in your app


    There are no files there now, but there is a `Create Document` button. Try it
    out!


    Nothing happens.


    It’s time to move to the next section of this chapter, which looks at `UIDocument`.
    Among other tasks, you’ll see how to implement the `Create Document` button.


    ### Introducing UIDocument


    The basic document class in iOS is `UIDocument`. `UIDocument` provides the basic
    functionality of a document in these ways:


    * **fileURL**: `UIDocument` identifies a document using a file URL so that your
    app can locate it for reading and writing.

    * `UIDocument` manages **asynchronous reading and writing** of data on a background
    queue with minimal effort on your part.

    * `UIDocument` also coordinates reading and writing of document files using **cloud
    services** such as `iCloud`.

    * `UIDocument` also manages **conflicts and changes to versions** of your document.


    These are the basic components of `UIDocument`. In order to start working with
    documents, you can use the basic code that is available in the Document Based
    App template. The basic code in the project template provides functionality for
    `fileURL` (document identification) as well as the critical reading and writing
    features along with cloud services and management of conflicts and changes.'
