    `NSDate` 对象，但在实际应用中，你可能会使用自定义对象进行归档。为此，可以在这里创建一个新对象 (`ShareableObject`)，用于归档测试。`SharableObject`
    实际上将封装一个 `NSDate` 对象，因此对应用的改动相对较少。（不仅改动较少，而且如果将此应用作为其他项目的基础，你还需要为每个项目重复这些修改。）


