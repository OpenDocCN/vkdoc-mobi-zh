- fmt: '# Overview of macOS and iOS Development


    Note that the details of managing the data in the text views differ between macOS
    and iOS. Among the differences are that in macOS, functions expose scrolling behaviors
    that in iOS are properties of the views.


    Keep in mind the history of Cocoa on macOS. In the earliest documentation, OpenStep
    and its precursor, NeXTSTEP, were designed for use in a world of business apps
    that were running on early personal computers. Even the earliest versions had
    functions for managing formatted tables and strings. The development path for
    Cocoa and Cocoa Touch differs in large part because the target platform for Cocoa
    Touch was at first the iPhone. Although there were (and are) business apps, the
    apps and users of iOS devices are very different from the apps and users of NeXTSTEP
    at its launch (September 18, 1989).


    ## Note


    For an interesting look at the environment in 1989, see the Timeline of Computer
    History at [`www.computerhistory.org/timeline/1989/`](http://www.computerhistory.org/timeline/1989/).


    ## Summary


    The basic mechanism for reading and writing data is the same for macOS and iOS:
    you use objects in a storyboard to receive and send that data.


    Note that storyboards are a relatively new addition to macOS, so you may not find
    them in old code samples. Note, too, that you may find references to binding in
    old code. Although it is not deprecated, it is not used frequently in modern `macOS`
    code.


    # Implementing Documents on iOS


    There are three main issues you have to consider when implementing documents on
    iOS:


    * With the advent of the iOS Files app in iOS 11, users began to have access to
    the underlying file system in iOS.

    * The basic class for iOS documents is `UIDocument`, which is designed to be subclassed.

    * `UIDocumentBrowserViewController` is a view controller designed to implement
    the user interface of the Files iOS app.


    This chapter focuses on the first point: Files.


    ## Using Files and the iOS File System


    When the first iPhone was launched, it wasn’t an immediate success. In fact, if
    you go back and search for news articles, you’ll discover some major complaints
    about the product. One of the biggest was the absence of connectors (such as USB)
    to attach other devices to the iPhone in the way that users were accustomed to
    attaching devices to personal computers.


    The fact that the entire iPhone file system was hidden from the user’s view was
    one of the common complaints. There were reasons for the hidden file system architecture
    and, over the decade of iPhone use, users, developers, and analysts have come
    to learn the benefits (and sometimes, drawbacks) of this architecture.


    With the advent of iOS 11 in 2017, Apple released its Files app, which approached
    the issue of file management in a very different way from the architecture that
    people were accustomed to from the beginning of the personal computer era. In
    the basic personal computer file architecture, which was built on the traditional
    Unix file architecture, users managed files and folders, which could be placed
    almost anywhere on the device. The Files app takes a different approach in that
    files are accessible from specific areas that are usually related to apps. In
    other words, instead of thinking of files that can be moved anywhere on a personal
    computer’s disk, users are now encourage to think of files that can be moved anywhere
    within an app’s file space (often referred to as a *sandbox*).


    Recognizing that people are not simply using disk space on a personal computer,
    the Files app incorporates access to cloud storage services that go beyond a personal
    computer such as iCloud, Dropbox, Box, Google Drive, and OneDrive.


    For people who are accustomed to the legacy structure where users can place files
    where they want to, this can be a relearning experience. Perhaps the most important
    point to consider is that with the legacy file structure, you place files where
    you want to place them in relation to your computer’s disks and other storage
    locations. Using the iOS File System and Files, you place files in either of two
    general locations:


    * You can place files in the folder for a specific app. A folder can be shared
    among several related apps. For good examples of this type of sharing, use the
    built-in Pages, Keynote, or Numbers apps and experiment by saving files to be
    shared.

    * You can place files in a cloud storage service such as iCloud or Dropbox.


    Here are some details about using Files.


    ## Choosing Document Storage Locations


    Remember that file storage is primarily determined by the app a file is associated
    with. Your primary tool for choosing the storage location is by setting it in
    Settings for an app. For example, in Settings, you can see the various settings
    for installed apps on your iOS device (Figure 6-1).


    ![../images/465467_1_En_6_Chapter/465467_1_En_6_Fig1_HTML.jpg](images/465467_1_En_6_Chapter/465467_1_En_6_Fig1_HTML.jpg)


    Figure 6-1. Choosing the settings for your apps


    Find your app and then choose the storage location, as shown in Figure 6-2. Your
    choices depend on what you have installed on your iOS device. If you use iCloud
    (a very common choice), you can choose to store your data there. You can choose
    to store it on a local device or you can use Dropbox, Box, or another service.


    ![../images/465467_1_En_6_Chapter/465467_1_En_6_Fig2_HTML.jpg](images/465467_1_En_6_Chapter/465467_1_En_6_Fig2_HTML.jpg)


    Figure 6-2. Choosing a document storage location


    ## Browsing Documents


    When you use Files, you can choose to browse files in a specific location (this,
    of course, depends on what you have chosen for locations and the files that you
    have). It’s important to understand the browsing data that Files shows you, so
    the following images show you what you might see.


    If you have decided to use your iPad for storage, you might see the browse results
    shown in Figure 6-3 when you choose the On My iPad location.


    ![../images/465467_1_En_6_Chapter/465467_1_En_6_Fig3_HTML.jpg](images/465467_1_En_6_Chapter/465467_1_En_6_Fig3_HTML.jpg)


    Figure 6-3. Browsing the On My iPad files


    If you use iCloud Drive, you may see a browse window such as the one shown in
    Figure 6-4.


    ![../images/465467_1_En_6_Chapter/465467_1_En_6_Fig4_HTML.jpg](images/465467_1_En_6_Chapter/465467_1_En_6_Fig4_HTML.jpg)


    Figure 6-4. Browsing documents and folders on iCloud Drive


    Note that when you browse, the locations are at the left of the window. When you
    select a specific file or folder, you will see its container indicated either
    in Locations at the left or at the top of the right-hand list, as in Figure 6-5.


    ![../images/465467_1_En_6_Chapter/465467_1_En_6_Fig5_HTML.jpg](images/465467_1_En_6_Chapter/465467_1_En_6_Fig5_HTML.jpg)


    Figure 6-5. Folder names at the top of the right-hand pane'
