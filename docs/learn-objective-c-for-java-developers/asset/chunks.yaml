    # 从 Objective-C 包装器中获取原始基本类型值


    在 Objective-C 中从包装器获取原始基本类型值，或获取不同类型对应的基本类型值，其方式与 Java 中非常相似。`NSNumber` 类提供了多种转换方法，用于返回原始值的最佳表示形式。这些方法列于表
    8-2 中。


    **表 8-2.** *基本类型转换*


    | Java 类型 | Java | Objective-C |

    |-----------|------|-------------|

    | boolean | `value.booleanValue()` | `[value boolValue]` |

    | byte | `value.byteValue()` | `[value charValue]` |

    | char | `value.charValue()` | `[value unsignedShortValue]` |

    | short | `value.shortValue()` | `[value shortValue]` |

    | int | `value.intValue()` | `[value integerValue]` |

    | long | `value.longValue()` | `[value longLongValue]` |

    | float | `value.floatValue()` | `[value floatValue]` |

    | double | `value.doubleValue()` | `[value doubleValue]` |


    由于单一的 `NSNumber` 类负责所有原始标量类型的转换，因此在 Objective-C 中类型转换是正交的；任何 `NSNumber` 对象都能将它的值作为
    `BOOL`、`char`、`integer` 或浮点值返回。这种对称性在 Java 中被打破，例如 `Boolean` 类不包含 `intValue()`
    方法，`Character` 类不包含 `boolValue()` 方法，等等。


    转换通常遵循 C 语言中原生类型转换的规则。这意味着，向 `NSNumber` 请求其 `intValue` 与将原始值转换为 `int`（如 `(int)original`）并无区别。如果请求的类型无法表示原始值，不会抛出任何异常。


    ## 将字符串转换为标量


    在 Java 中，每个包装器类都有多个方法用于解析字符串并解释其标量值，可返回原始类型或对象。例如，`java.lang.Integer` 类包含一个字符串构造函数（`Integer(String)`）、一个接收字符串并返回整数原始值的静态方法（`parseInt(String)`），以及一个接收字符串并返回
    `Integer` 对象的静态方法（`valueOf(String)`）。`Boolean`、`Character`、`Short`、`Float` 和 `Double`
    类也包含类似的方法。


    在 Objective-C 中，`NSString` 类实现了表 8-2 中列出的相同标量转换方法。向字符串对象发送 `-intValue` 消息可将其解释为整数。向其发送
    `-floatValue` 可将其解释为浮点数。要将字符串转换为 `NSNumber` 对象，可从转换后的值创建一个新的 `NSNumber`，如 `[NSNumber
    numberWithInt:[string intValue]]`。


    十六进制字符串可以使用 `NSScanner` 对象进行转换。`NSScanner` 是一个用于解析字符串的通用工具类。要将包含十六进制数字的字符串转换为整数，可以为该字符串创建一个扫描器，然后使用
    `-[NSScanner scanHexInt:]` 方法进行解析，如代码清单 8-1 所示。


    **代码清单 8-1.** 将十六进制字符串转换为整数


    ```

    unsigned int i;

    NSScanner *scanner = [NSScanner scannerWithString:@"cafe1234"];

    [scanner scanHexInt:&i];

    ```


