    than trying to use an NSInvocation, particularly in situations where the method
    being called has well-understood parameters.


    Variable Arguments


    One trick that Java doesn’t have is variable arguments. Granted, Java 1.5 added
    variable argument syntax, but that’s just syntactic sugar for the way Java has
    always handled variable arguments. The programmer (pre-Java 1.5) or the compiler
    (Java 1.5 and later) first creates an array to contain the variable arguments,
    populates it with the parameters (wrapping primitive values in objects), and then
    passes the single array object to the method.


    Variable arguments in Objective-C are far more direct and raw: the sender may
    supply whatever additional parameters they want in the message. The additional
    parameters are unaltered and are pushed onto the stack exactly like any other
    parameter. The method parses the list of parameters programmatically when it executes.
    The type, order, and meaning of those parameters are agreed on by convention.
    Objective-C doesn’t impose any restrictions on them, nor does it supply any type
    information about them. It’s up to the caller to supply the kind of parameters
    the method is expecting.


    ■Note Objective-C “borrows” variable arguments from C. Everything in this section
    applies equally to plain old C


    functions.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6 ■ SENDING MESSAGES


    To declare a variable argument list, follow the last parameter variable name with
    a comma and three periods (an ellipsis, but don’t use the Unicode ellipsis character).
    When invoked, the named parameters may be followed by additional comma-separated
    parameters. There is no limit on the number or kind of additional parameters.
    The parameters sent to the method form a kind of data stream. The values of each
    parameter are extracted serially using special library functions. The process
    is loosely analogous to using a java.io.ObjectInputStream to read a sequence of
    serialized values.


    Two commonly used Cocoa methods that accept variable arguments are demonstrated
    in Listing 6-10\. The +[NSArray arrayWithObjects:...] method creates a new NSArray
    object pre-populated with the objects passed as parameters. The +[NSString stringWithFormat:...]
    method creates strings using a format string. The format string includes placeholders
    that are replaced with the values of the additional parameters. The example code
    shown in Listing 6-10 returns the string “Dark toast will take 45 seconds.”


    Listin g 6-10\. Variable Argument Methods in Cocoa


    @interface NSArray


    + (id)arrayWithObjects:(id)firstObj, ...


    @end


    @interface NSString


    + (id)stringWithFormat:(NSString*)format, ...


    @end


    …


    int toastTimes[] = { 8, 22, 35, 45, 60, 90 };


    NSArray *toastDescriptions = [NSArray arrayWithObjects:@"Warm",


    @"Light",


    @"Medium",


    @"Dark",


    @"Very dark",


    @"Burnt",


    nil];


    int level = 3;


    int secs = toastTimes[level];


    NSString *desc = [toastDescriptions objectAtIndex:level];


    return [NSString stringWithFormat:@"%@ toast will take %d seconds.",desc,secs];
    A method with variable arguments must assume the number and type of the parameters
    in the list. The parameter list doesn’t include any type information or end-of-list
    indicator; it’s just a raw sequence of bytes formed when the parameter values
    were pushed onto the stack. Consequently, the method must either assume the parameter
    types or infer them using information supplied in the named parameters.


    The two Cocoa methods shown in Listing 6-10 demonstrate the two most common solutions
    to this problem. The +arrayWithObjects: method assumes that all of the additional
    parameters will be object pointers and the list is terminated by a final nil parameter.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6 ■ SENDING MESSAGES


    The +stringWithFormat: method uses the format parameter to infer the sequence
    of parameter values that follow. The format string is scanned for format specifications.
    The first specification (%@) is an object formatter. This tells +stringWithFormat:
    that the first additional parameter is a pointer to an object. The %@ is replaced
    with the -description (toString()) value of the object. The next specification
    encountered is %d, indicating that the next parameter is a signed int (d stands
    for decimal). It extracts one int from the parameter stream and continues, until
    all of the format specifications in the string have been replaced.


    In both cases, a programmer’s agreement exists between the method and the caller.


    +arrayWithObjects: assumes that only object pointers are passed, terminated with
    a nil pointer.'
  trans: "\n# 排版后的内容\n\n阅读第 26 章（“isa Swizzling”部分），以更好地理解对象的方法如何以及为何会被动态改变。\n\n每个方法生成的\
    \ C 函数都期望接收一个接收对象指针（`self`）和一个选择器（`_cmd`）作为前两个参数。其余参数与方法定义的参数保持一致。清单 6-9 演示了如何通过方法的实现地址调用方法。\n\
    \n**清单 6-9.** 将方法作为 C 函数调用\n\n```\n@interface BezierPathMapper : NSObject {\n\
    \    NSBezierPath *path;\n}\n@property (assign) NSBezierPath *path;\n- (BOOL)containsAnyPoint:(NSPoint*)pointArray\
    \ pointCount:(unsigned int)count;\n@end\n\n@implementation BezierPathMapper\n\
    @synthesize path;\n- (BOOL)containsAnyPoint:(NSPoint*)pointArray pointCount:(unsigned\
    \ int)count\n{\n    if (path==nil)\n        return NO;\n    // 获取 -[NSBezierPath\
    \ containsPoint:] 的函数地址\n    typedef BOOL (*containsPointPtr)(id self, SEL _cmd,\
    \ NSPoint point);\n    containsPointPtr containsPointImpl =\n        (containsPointPtr)[path\
    \ methodForSelector:@selector(containsPoint:)];\n    // 通过向路径发送 -containsPoint:\
    \ 消息来测试数组中的每个点\n    unsigned int i;\n    for (i=0; i<count; i++)\n        if (containsPointImpl(path,@selector(containsPoint:),pointArray[i])!=NO)\n\
    \            return YES;\n    return NO;\n}\n@end\n```\n\n`BezierPathMapper` 的\
    \ `-containsAnyPoint:pointCount:` 方法测试一系列坐标，以确定是否有任何坐标位于其 `path` 属性内部。该方法首先获取路径\
    \ `-containsPoint:` 方法的实现地址。你在此处看到的奇怪语法是 C 语言中声明函数指针的方式。该类型由描述函数参数和返回类型的完整函数原型组成（`BOOL\
    \ foo(id self, SEL _cmd, NSPoint point)`），其中函数名被替换为指针声明（`(*containsPointPtr)`\
    \ 替换 `foo`）。\n\n结果是一个指向具有该原型的函数的变量。在 `typedef` 语句中，它产生了一个新的指针类型。在清单 6-9 中，使用了\
    \ `typedef`，这样在转换 `-methodForSelector:` 返回的值时，就不必重复整个函数原型了。C 语言允许将函数指针变量用作函数名，就像存在一个名为\
    \ `containsPointImpl` 的函数一样。\n\n调用中必须包含接收器和选择器参数。虽然选择器通常被忽略，但作为良好的编程实践，始终应传递被调用方法的选择器常量。\n\
    \n由于这种技术绕过了分发器的 nil 接收者测试，因此该代码必须首先确保对于 nil 的 `path` 对象绝不会调用该函数——这很可能会导致程序崩溃。\n\
    \n清单 6-9 中的代码主要用于演示该技术。即使测试数千个点，也不太可能带来显著的性能提升——主要是因为 `-[NSBezierPath containsPoint:]`\
    \ 执行的计算可能远远超过发送消息的微小开销。然而，如果方法执行的代码非常快，并且被调用了数百万次，那么这种技术可以节省宝贵的 CPU 时间。\n\n还应注意，直接调用方法可能比尝试使用\
    \ `NSInvocation` 更简单、更快，尤其是在被调用方法的参数已知且明确的情况下。\n\n## 可变参数\n\nJava 没有的一个技巧是可变参数。诚然，Java\
    \ 1.5 添加了可变参数语法，但这只是 Java 处理可变参数一贯方式的语法糖。程序员（Java 1.5 之前）或编译器（Java 1.5 及以后版本）首先创建一个数组来包含可变参数，用参数填充它（将基本类型值包装在对象中），然后将单个数组对象传递给方法。\n\
    \nObjective-C 中的可变参数更加直接和原始：发送者可以在消息中提供任意所需的额外参数。额外的参数不会被修改，并且像任何其他参数一样被压入栈中。方法在执行时通过编程方式解析参数列表。这些参数的类型、顺序和含义由约定决定。Objective-C\
    \ 不对它们施加任何限制，也不提供任何关于它们的类型信息。由调用者提供方法所期望的参数类型。\n\n> **注意** Objective-C 从 C 语言“借用”了可变参数。本节中的所有内容同样适用于普通的旧式\
    \ C 函数。\n\n要声明可变参数列表，请在最后一个参数变量名后面加上逗号和三个句点（省略号，但不要使用 Unicode 省略号字符）。调用时，命名参数后面可以跟附加的逗号分隔参数。对附加参数的数量或类型没有限制。发送给方法的参数形成了一种数据流。使用特殊的库函数依次提取每个参数的值。这个过程大致类似于使用\
    \ `java.io.ObjectInputStream` 读取一系列序列化值。\n\n清单 6-10 演示了两个常用的接受可变参数的 Cocoa 方法。`+[NSArray\
    \ arrayWithObjects:...]` 方法创建一个新的 `NSArray` 对象，该对象预先填充了作为参数传递的对象。`+[NSString stringWithFormat:...]`\
    \ 方法使用格式字符串创建字符串。格式字符串包括占位符，这些占位符会被附加参数的值替换。清单 6-10 中显示的示例代码返回字符串“Dark toast will\
    \ take 45 seconds”。\n\n**清单 6-10.** Cocoa 中的可变参数方法\n\n```\n@interface NSArray\n\
    + (id)arrayWithObjects:(id)firstObj, ...\n@end\n\n@interface NSString\n+ (id)stringWithFormat:(NSString*)format,\
    \ ...\n@end\n\n...\nint toastTimes[] = { 8, 22, 35, 45, 60, 90 };\nNSArray *toastDescriptions\
    \ = [NSArray arrayWithObjects:@\"Warm\",\n                                   \
    \                      @\"Light\",\n                                         \
    \                @\"Medium\",\n                                              \
    \           @\"Dark\",\n                                                     \
    \    @\"Very dark\",\n                                                       \
    \  @\"Burnt\",\n                                                         nil];\n\
    int level = 3;\nint secs = toastTimes[level];\nNSString *desc = [toastDescriptions\
    \ objectAtIndex:level];\nreturn [NSString stringWithFormat:@\"%@ toast will take\
    \ %d seconds.\",desc,secs];\n```\n\n一个带有可变参数的方法必须假设列表中参数的数量和类型。参数列表不包含任何类型信息或列表结束指示符；它只是参数值被压入栈时形成的原始字节序列。因此，该方法要么必须假设参数类型，要么使用命名参数中提供的信息来推断它们。\n\
    \n清单 6-10 中展示的两个 Cocoa 方法演示了解决此问题的两种最常见方案。`+arrayWithObjects:` 方法假设所有附加参数都将是对象指针，并且列表以最后的\
    \ `nil` 参数结束。\n\n`+stringWithFormat:` 方法使用格式参数来推断后续参数值的序列。它会扫描格式字符串以查找格式说明符。第一个说明符（`%@`）是一个对象格式化程序。这告诉\
    \ `+stringWithFormat:` 第一个附加参数是一个指向对象的指针。`%@` 会被替换为对象的 `-description`（`toString()`）值。下一个遇到的说明符是\
    \ `%d`，表示下一个参数是一个有符号整数（`d` 代表十进制）。它从参数流中提取一个 `int` 并继续，直到字符串中的所有格式说明符都被替换为止。\n\
    \n在这两种情况下，方法和调用者之间都存在编程约定。`+arrayWithObjects:` 假设只传递对象指针，并以 `nil` 指针结束。\n"
- fmt: "`+stringWithFormat:` 假定附加参数与格式字符串中占位符所隐含的值类型一致。\n\n■ 注意 编译器没有关于可变参数的类型信息，因此它假定所有值都是正确/预期的类型。参数`1`将传递一个整数，`1.0`将传递一个浮点数。要消除任何疑问，请像在`[NSString\
    \ stringWithFormat:@\"float %f, int %d, char %c\", (float)34, (int)34, (char)34]`中那样强制转换参数。这将强制编译器在将参数压入堆栈之前将其转换为预期类型。\n\
    \n编写自己的可变参数方法并不困难，但确实需要一些规划。\n\n你必须设计该方法，以便已知或可以推断出附加参数的类型和数量。清单 6-11 重写了`containsAnyPoints:pointCount:`方法，以使用可变参数列表，而不是指针数组。\n\
    \n**清单 6-11\\. 可变参数实现**\n\n```\n@interface BezierPathMapper : NSObject {\n   \
    \ NSBezierPath *path;\n}\n@property (assign) NSBezierPath *path;\n- (BOOL)containsAnyOfCountPoints:(unsigned\
    \ int)count, ...;\n@end\n\n@implementation BezierPathMapper\n@synthesize path;\n\
    \n- (BOOL)containsAnyOfCountPoints:(unsigned int)count, ...\n{\n    va_list varList;\n\
    \    BOOL hit = NO;\n    NSPoint point;\n    va_start(varList, count);\n    while\
    \ (count != 0) {\n        point = va_arg(varList, NSPoint); // 复制下一个点\n      \
    \  if ([path containsPoint:point]) {\n            hit = YES;\n            break;\n\
    \        }\n        count--;\n    }\n    va_end(varList);\n    return hit;\n}\n\
    @end\n```\n\n...\n```\nif (![mapper containsAnyOfCountPoints:5,\n    NSMakePoint(0.0,\
    \ 1.0),\n    NSMakePoint(1.0, 0.0),\n    NSMakePoint(1.0, 0.0),\n    NSMakePoint(0.0,\
    \ 0.0),\n    NSMakePoint(0.5, 0.5)]) {\n    NSLog(@\"no points in path\");\n}\n\
    ```\n\n新方法直接传递一个`NSPoint`结构列表作为参数。初始的`count`参数告诉该方法期望多少个`NSPoint`参数。\n\n要在你的方法中实现可变参数，请遵循以下步骤：\n\
    \n1. 在方法声明中最后一个参数变量名后跟上“`, ...`”。\n2. 定义一个`va_list`自动变量。\n3. 使用`va_list`变量和最后一个具名参数调用`va_start()`。该参数仅用于告诉可变参数函数附加参数从哪里开始。\n\
    4. 使用`va_list`变量和下一个参数的类型调用`va_arg()`。返回的值是参数的副本。\n5. 完成后调用`va_end()`。\n\n在调用`va_end()`之前不必检索所有参数。为超出实际传递数量的参数值调用`va_arg()`是不可预测的，应避免。\n\
    \n### 未实现的方法\n\n或许比消息如何发送更有趣的是，当一个对象被发送一条它未实现的消息时会发生什么。如果你不采取任何特殊措施，结果类似于 Java；运行时将抛出一个“无法识别的选择器”异常。\n\
    \n但在抛出该异常之前，对象有机会以其他方式处理该消息。当消息分发函数发现某个对象未实现该方法时，它会将该消息转换为一个`NSInvocation`对象。然后，它将这个`NSInvocation`传递给该对象的`-forwardInvocation:`方法。\n\
    \n根类`NSObject`的`-forwardInvocation:`只是向自身发送一条`-doesNotRecognizeSelector:`消息，该消息（除非被重写）会抛出无法识别的选择器异常。一个类可以重写`-forwardInvocation:`并拦截未实现的消息。\n\
    \n顾名思义，`-forwardInvocation:`被设计用于将消息重定向或转发给另一个对象。清单 6-12 中的`StandIn`类展示了如何实现这一点。该对象对其实现或继承的所有方法都正常响应。当收到一条它未实现的消息时，它会收到一条`-forwardInvocation:`消息。`StandIn`将消息及调用的所有参数传递给它的`actor`对象。如果`actor`未实现该消息，它将要么抛出异常，要么转发该调用。\n\
    \n**清单 6-12\\. 转发一条未实现的消息**\n\n```\n@interface StandIn : NSObject {\n    id actor;\n\
    }\n@property (assign) id actor;\n@end\n\n@implementation StandIn\n@synthesize\
    \ actor;\n\n- (void)forwardInvocation:(NSInvocation*)invocation\n{\n    if (actor\
    \ == nil)\n        [self doesNotRecognizeSelector:[invocation selector]]; // 不返回\n\
    \    [invocation invokeWithTarget:actor];\n}\n\n- (NSMethodSignature*)methodSignatureForSelector:(SEL)sel\n\
    {\n    NSMethodSignature *signature = [super methodSignatureForSelector:sel];\n\
    \    if (signature == nil)\n        signature = [actor methodSignatureForSelector:sel];\n\
    \    return signature;\n}\n@end\n```\n\n同样需要重写`-methodSignatureForSelector:`。消息分发器首先向对象发送`-methodSignatureForSelector:`，并使用返回的对象创建传递给`-forwardInvocation:`的调用参数。\n\
    \n通过一点小小的手段，由`-invokeWithTarget:`调用的方法返回的任何值都将被返回给最初发送消息的代码。为了使其正常工作，重要的是在发送`-invoke`消息后立即返回。返回值仍然在寄存器或堆栈中，因此调用者会得到它们，就像你的处理程序显式返回了它们一样。\n\
    \n你可以使用`-forwardInvocation:`做很多有趣的事情：\n\n* 将一个对象包装在一个日志记录器对象中，该对象拦截并记录有趣消息的调用。\n\
    * 实现由类中其他方法处理的“合成”消息。想象创建一个通用的数据库记录对象，它捕获收到的任何属性消息（例如，`-saleDate`、`-setSaleDate:`）并自动将其转换为记录查询。无需编写`date\
    \ = [record getDateFieldWithKey:@\"SaleDate\"]`，你可以直接写`date = [record saleDate]`，而无需编写`-saleDate`方法。`NSManagedObject`和`CALayer`是实现合成属性的类示例。\n\
    * 创建一个将消息转发到其他对象层次结构（如响应者链）的对象。第 20 章讨论响应者链。代理对象会搜索一个其他对象的集合，寻找实现该消息的对象。\n\n`-forwardInvocation:`不适用于可变参数方法，因为`NSInvocation`对象不会包含额外参数的副本。\n\
    \n### 总结\n\n虽然概念上类似于 Java 方法，但 Objective-C 消息存在微妙的差异。真正开始以发送消息（而非调用方法）的方式思考。Objective-C\
    \ 轻量级的方法分发使得以编程方式发送方法变得容易。类不仅可以动态发送消息，还可以动态响应消息。消息易于操作且高效，这就是为什么动态消息在众多 Objective-C\
    \ 解决方案中扮演如此关键的角色。\n\n**第 7 章**\n\n■ ■ ■\n\n**与 nil 交朋友**\n\n处理 nil（null）引用是编程中不可避免的一部分。本章将解释在\
    \ Objective-C 中如何处理 nil 和 NULL 指针，以及一些令人惊讶的后果。学会将 nil 对象指针用于自己的优势，可以极大地简化——而非复杂化——你的设计。"
