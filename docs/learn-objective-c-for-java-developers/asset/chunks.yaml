    NSFileManager Delegate


    Like many Objective-C objects, NSFileManager supports the delegate pattern. Your
    delegate object can pre-flight specific actions and intercept, or attempt to recover
    from, certain failures. Table 11-11 lists the messages that, if implemented, the
    file manager will send to your delegate object.


    NSFileManager employs both persistent and ephemeral delegates. The object set
    as the delegate of the singleton NSFileManager object receives relevant messages
    about general file manager operations. A few NSFileManager methods accept a temporary
    delegate object, designated as its handler. These are -copyPath:toPath:handler:,
    -movePath:toPath:handler:,


    -removeFileAtPath:handler:, and -linkPath:toPath:handler:. In these methods, the
    delegate messages are sent to the handler object instead of the global delegate.


