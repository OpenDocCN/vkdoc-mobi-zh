  trans: "\n### 节\n\n如果客户端期望从服务器接收任何异步回复，则必须运行自己的运行循环。`oneway` 修饰符以及稍后介绍的其他参数修饰符，仅影响通过`NSProxy`对象发送的消息。常规\
    \ Objective-C 消息（即`[object doSomething]`）的行为不会改变。\n\n### 按副本传递对象\n\n在参数中传递或从消息返回的对象，可以通过副本或引用与远程对象交换。通过引用发送对象需要为该对象创建一个`NSDistantObject`代理，并将其发送给接收方。\n\
    \n要按副本传递对象，需要使用顺序归档技术对该对象进行归档，然后在接收端重构。这给该类提出了三个要求。首先，该类必须遵循`NSCoding`协议并实现顺序归档，如序列化章节所述。其次，该类的代码必须存在于接收进程中——否则，就无法实例化该对象。\n\
    \n最后，该类必须重写其`-replacementObjectForPortCoder:`方法，以决定何时应复制该对象，何时应通过引用传递。Objective-C\
    \ 可以通过`bycopy`和`byref`修饰符向该类提供提示。这些类型修饰符会增强方法实现中的对象参数和返回值，如下所示：\n\n```\n- (bycopy\
    \ ProjectStatus*)statusForProject:(byref Project*)project { …\n```\n\n### 演示项目\n\
    \n演示项目包含了`Guest`对象的`-replacementObjectForPortCoder:`方法的实现，如代码清单 13-9 所示。\n\n**代码清单\
    \ 13-9.** Guest 类的 `bycopy` 实现\n\n```\n- (id)replacementObjectForPortCoder:(NSPortCoder*)coder\n\
    {\n    if ([coder isBycopy])\n        return self;\n    return [super replacementObjectForPortCoder:coder];\n\
    }\n```\n\n从分布式对象的角度来看，所有对象都是按副本传递的。对象的归档副本是使用顺序归档生成的。如你在第 12 章中所学，`NSPortCoder`编码器首先会调用`-replacementObjectForPortCoder:`，以允许对象在归档中替换为另一个不同的对象。`NSObject`的默认实现会为该对象替换为一个`NSDistantObject`。\n\
    \n分布式对象框架不执行将原始对象替换为代理对象的操作；每个对象自行决定是复制自身还是提供一个代理对象。\n\n代码清单 13-9 中的代码根据方法定义中嵌入的提示，为`Guest`对象做出了按副本传递的决策。如果参数或返回值类型包含了`bycopy`关键字，那么用于归档该对象的`NSPortCoder`在收到`-isBycopy`消息时会返回`YES`。如果指定了`byref`修饰符或未指定任何修饰符，`-isBycopy`将返回`NO`。或者你也可以测试`-isByref`，它始终返回`!isBycopy`。\n\
    \n或者，你可以选择忽略编码器的建议，返回`self`、`[super replacmentObjectForPortCoder:coder]`或任何其他功能等效的替代对象。某些对象，如`NSString`，选择始终按副本发送自身，忽略任何`byref`提示。默认情况下，`NSObject`的子类始终通过引用发送自身，即使方法请求了`bycopy`。你的代码可以使用任何标准来做出决策。如果`NSPortCoder`通过网络连接到某个服务，对象可能会按副本发送自身；但如果连接到同一系统中的另一个进程，则可能会选择发送引用。\n\
    \n### 传递指针\n\n将 C 指针作为参数传递带来了另一个问题。指针不能按值复制——因为本地地址对接收进程毫无意义。也无法为远程结构创建等效的代理对象。分布式对象通过复制指针参数所指向的结构的值来解决这个问题——除非指针是`NULL`，在这种情况下，它只会向接收者发送`NULL`。\n\
    \n```\n- (void)rectToLocalCoordinates:(NSRect*)rectangle;\n```\n\n当`-rectToLocalCoordinates:`消息被发送给一个远程对象时，`NSRect`结构的内容会被逐字复制到远程进程，接收方获得的\
    \ C 指针指向由分布式对象分配的本地副本。当方法返回时，`NSRect`结构（可能已修改）的内容会被复制回发送方，临时副本则被销毁。\n\n这种方式效率不算特别高，但很安全。对于仅引用结构内容或忽略其原始内容的方法，Objective-C\
    \ 提供了表 13-3 中列出的参数修饰符。\n\n**表 13-3.** 指针参数类型修饰符\n\n| 修饰符 | 效果 |\n|---|---|\n|\
    \ `in` | 结构会被复制到接收方，但不会复制回发送方。 |\n| `out` | 结构不会被复制到接收方，但修改后的结构会在返回时复制回发送方。 |\n\
    | `inout` | 结构会被复制到接收方，然后在方法返回时再复制回来。此为默认行为。 |\n\n对于向接收方传递信息、且接收方不使用指针修改结构内容的参数，请使用`in`修饰符。示例方法如下：\n\
    \n```\n- (BOOL)isValidPoint:(in NSPoint*)inPoint;\n```\n\n对于用于指向一个未初始化结构、并由接收方填充其内容的参数，请使用`out`修饰符。示例方法如下：\n\
    \n```\n- (void)getSize:(out NSSize*)outSize;\n```\n\n`inout`修饰符是默认行为。包含它不会改变方法的行为，但会使你的意图更清晰。\n\
    \n> **警告** 结构通过副本发送给接收方。结构只能包含原始值。显而易见，它不能包含指向其他结构或对象的指针。如果结构如此复杂，则需将其重新设计为对象，或先转换为某种可移植格式，然后才能与分布式对象一起使用。\n\
    \n指针值修饰符也适用于方法的返回值。指向指针的指针参数也存在类似问题。这些问题以及其他特殊情况，在 *《Objective-C 2.0 编程语言》*¹ 的“远程消息传递”部分中有详细讨论。\n\
    \n### 是对象还是代理？\n\n`NSObject`协议定义了一个特殊方法`-isProxy`，用于确定某个对象是否实际上是`NSProxy`对象。如果该对象引用不是`NSObject`或其子类的实例，则此方法将返回`YES`。使用`-class`、`-className`、`-isMemberOfClass:`或`-isKindOfClass:`等方法无法判断对象是否为代理；代理只会将这些消息转发给原始对象，而原始对象会返回显而易见的答案。例如，使用`-isProxy`来判断直接访问对象的成员变量是否安全，如`if\
    \ (![character isProxy]) character->hitCount++`。\n\n### 网络\n\n有许多用于通过网络通信的类。其中值得提及的两个是：网络服务，它有助于在网络中注册和定位服务；以及\
    \ URL 加载系统，它实现了诸如 HTTP 和 FTP 等各种网络协议。\n\n### 网络服务\n\nJava 中没有与网络服务完全对应的机制。它的工作方式有点像`java.rmi.Named`，即在局域网内发布服务，并使远程客户端能够轻松浏览和连接这些服务。然而，网络服务要通用得多。它构建在\
    \ Bonjour（也称为 Zeroconf）之上。前面演示过的`NSSocketPortNameServer`类，就是使用网络服务在网络中注册和查找分布式对象服务的。\n\
    \n网络服务主要有两个类。一个`NSNetService`对象代表一个单一的服务。\n\n---\n¹ Apple, Inc., *《Objective-C\
    \ 2.0 编程语言》*, http://developer.apple.com/documentation/Cocoa/Conceptual/ObjectiveC/Articles/ocRemoteMessaging.html,\
    \ 2009 年。\n"
- fmt: "Much like `NSConnection`, the server and client process each creates an `NSNetService`\
    \ object to either publish the service or connect with an existing service. `NSNetServiceBrowser`\
    \ performs the role of matchmaker. An `NSNetServiceBrowser` object will help your\
    \ application discover services immediately available to it. It can describe all\
    \ of the resources available, search out specific services, and connect with them.\n\
    \nThere are three operational phases to using network services:\n\n1. Publication\n\
    2. Discovery\n3. Resolution\n\nPublication is the act of registering your service\
    \ so that it is publicly visible to other processes and computers on the network.\
    \ You must first create a socket, such as an `NSSocketPort`, by which clients\
    \ can communicate with your service. You then create an `NSNetService` object,\
    \ connected to that port, that describes the service. You then publish the service\
    \ by sending the `NSNetService` object a `-publish` or `-publishWithOptions:`\
    \ message. Once published, remote clients can find, connect, and communicate with\
    \ your service.\n\nUse the `NSNetServiceBrowser` class to find services on your\
    \ network. You start by creating an instance of `NSNetServiceBrowser` and then\
    \ configure it to find the types of services you are interested in. The browser\
    \ goes to work and reports services as it discovers them.\n\nOnce you know about\
    \ a remote service, by browsing or some other means, the last step is to resolve\
    \ it. Again, you create an `NSNetService` object and configure it with the information\
    \ it needs to locate the remote service. You then send it a `-resolveWithTimeout:`\
    \ message. The `NSNetService` object then proceeds to establish a connection.\
    \ When successful, the message `-getInputStream:outputStream:` will return the\
    \ input and output stream objects, through which you can communicate with the\
    \ remote service.\n\nNetwork service publishing and discovery can be very time\
    \ consuming, and new services can appear and disappear spontaneously. Consequently,\
    \ virtually all network services methods execute asynchronously. The results are\
    \ communicated through a delegate object that you provide. For example, the `-resolveWithTimeout:`\
    \ message returns immediately, but starts the resolution process in the background.\
    \ When finished, your delegate object will receive either a `-netServiceDidResolveAddress:`\
    \ message or a `-netService:didNotResolve:` message if the resolution failed.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nThe `NSNetServices Programming\
    \ Guide` provides detailed information about how Network Services work, along\
    \ with copious code examples.\n\n## URL Loading\n\nBoth Java and Objective-C provide\
    \ a set of classes that assist in accessing the services and entities identified\
    \ by Uniform Resource Locators (URLs). Both have built-in support for the HTTP,\
    \ HTTPS, FTP, and FILE protocols. URL protocols are often complex, but these classes\
    \ conveniently internalize those intricacies so that you can interact with them\
    \ easily. This makes it possible to send a web server request to a URL, such as\
    \ `http://www.apress.com`, and receive the response with just a few lines of code.\n\
    \nThe organization and roles of URL classes in Java and Objective-C are almost\
    \ identical, although Objective-C is a little more granular. The `NSURL` (`java.net.URL`)\
    \ class defines a single URL. `NSURLConnection` (`java.net.URLConnection`) manages\
    \ the communications with the remote service described by the URL. Objective-C\
    \ decomposes Java’s single `URLConnection` object into three objects; `NSURLConnection`\
    \ is only concerned with the state of the connection. The request parameters are\
    \ encapsulated in `NSURLRequest`, and the service’s reply is contained in an `NSURLResponse`.\
    \ Any data—the “body” of the request or response—are exchanged through streams\
    \ or events.\n\nThis section will illustrate several common URL loading techniques\
    \ and how they contrast with similar Java implementations.\n\n### Trivial URL\
    \ Request\n\nThe simplest URL interaction is to just obtain the contents of a\
    \ URL. This can be easily accomplished in either language, as shown in Listing\
    \ 13-10.\n\n**Listing 13-10. Trivial URL Request**\n\n**Java**\n\n```\ntry {\n\
    \    URL url = new URL(\"http://www.apress.com/\");\n    Reader inStream = new\
    \ InputStreamReader(url.openStream());\n    int c;\n    System.out.print(\"URL\
    \ Response: \");\n    while ((c=inStream.read()) != -1)\n        System.out.print((char)c);\n\
    \    inStream.close();\n} catch (Exception e) {\n    e.printStackTrace();\n}\n\
    ```\n\n**Objective-C**\n\n```\nNSURL *url = [NSURL URLWithString:@\"http://www.apress.com/\"\
    ];\nNSURLRequest* request = [NSURLRequest requestWithURL:url];\nNSURLResponse\
    \ *response = nil;\nNSData *data = [NSURLConnection sendSynchronousRequest:request\
    \ returningResponse:&response\n                                              \
    \    error:NULL];\nNSLog(@\"URL response: %@\",[NSString stringWithCString:[data\
    \ bytes]\n                                              length:[data length]]);\n\
    ```\n\nThe Java code takes advantage of the convenience method `java.net.URL.openStream()`,\
    \ which creates an `URLConnection` object, initiates the request, and returns\
    \ an `InputStreamReader` object connected to the response stream. The Objective-C\
    \ code is a little more complex to set up, first requiring the creation of an\
    \ `NSURLRequest` object. With that accomplished, the entire transaction is performed\
    \ using the `+[NSURLConnection sendSynchronousRequest:returningResponse:error:]`\
    \ class method. A transient `NSURLConnection` object is created, the request is\
    \ sent, and the response is returned in two objects: An `NSURLResponse` object\
    \ containing the reply headers and an `NSData` object containing the response\
    \ body.\n\n### Asynchronous URL Request\n\nURL interaction in Java is inherently\
    \ synchronous. If the URL data being loaded takes a long time to obtain, the code\
    \ in Listing 13-10 would block until the data was received. This might be appropriate\
    \ if the time it took to load the URL was inconsequential. Often, it is not. To\
    \ avoid hanging the main application, the code in Listing 13-10 could be executed\
    \ in its own thread. In Java, this would be the preferred solution.\n\nIn Objective-C,\
    \ the natural way to use an `NSURLConnection` is asynchronously. Most `NSURLConnection`\
    \ methods initiate asynchronous operations—synchronous operations are the exception.\
    \ Just like `NSStream`, described earlier in this chapter, `NSURLConnection` communicates\
    \ its progress by sending messages to its delegate. The code for reading the contents\
    \ of a URL asynchronously is shown in Listing 13-11.\n\n**Listing 13-11. Asynchronous\
    \ URL Request**\n\n```\n@interface URLGetter : NSObject {\n    NSMutableData *body;\n\
    \    NSURLConnection *connection;\n}\n- (void)loadURL:(NSString*)string;\n@end\n\
    \n@implementation URLGetter\n- (void)loadURL:(NSString*)string\n{\n    NSURL *url\
    \ = [NSURL URLWithString:string];\n    NSURLRequest *request = [NSURLRequest requestWithURL:url];\n\
    \    // allocate buffer to store the received data\n    body = [NSMutableData\
    \ data];\n    connection = [NSURLConnection connectionWithRequest:request delegate:self];\n\
    }\n\n- (void)connection:(NSURLConnection*)connection didReceiveData:(NSData*)data\n\
    {\n    [body appendData:data];\n}\n\n- (void)connection:(NSURLConnection*)connection\n\
    didReceiveResponse:(NSURLResponse*)response\n{\n    // The response headers and\
    \ metadata were successfully received\n    // Successive responses preceed each\
    \ new body, so reset the buffer\n    [body setLength:0];\n}\n\n- (void)connectionDidFinishLoading:(NSURLConnection*)connection\n\
    {\n    // URL loading is complete; NSURLConnection is closed, |body| is complete\n\
    }\n\n- (void)connection:(NSURLConnection*)connection didFailWithError:(NSError*)error\n\
    {\n    // URL failed to load; reason is in |error|\n}\n@end\n```"
  raw: 'Much like NSConnection, the server and client process each creates an NSNetService
    object to either publish the service or connect with an existing service. NSNetServiceBrowser
    performs the role of matchmaker. An NSNetServiceBrowser object will help your
    application discover services immediately available to it. It can describe all
    of the resources available, search out specific services, and connect with them.


    There are three operational phases to using network services: 1.


    Publication


    2.


    Discovery


    3.


    Resolution


    Publication is the act of registering your service so that it is publicly visible
    to other processes and computers on the network. You must first create a socket,
    such as an NSSocketPort, by which clients can communicate with your service. You
    then create a NSNetService object, connected to that port, that describes the
    service. You then publish the service by sending the NSNetService object a -publish
    or


    -publishWithOptions: message. Once published, remote clients can find, connect,
    and communicate with your service.


    Use the NSNetServiceBrowser class to find services on your network. You start
    by creating an instance of NSNetServiceBrowser and then configure it to find the
    types of services you are interested in.


    The browser goes to work and reports services as it discovers them.


    Once you know about a remote service, by browsing or some other means, the last
    step is to resolve it. Again, you create an NSNetService object and configure
    it with the information it needs to locate the remote service. You then send it
    a -resolveWithTimeout: message. The NSNetService object then proceeds to establish
    a connection. When successful, the message -getInputStream:outputStream: will
    return the input and output stream objects, through which you can communicate
    with the remote service.


    Network service publishing and discovery can be very time consuming, and new services
    can appear and disappear spontaneously. Consequently, virtually all network services
    methods execute asynchronously. The results are communicated through a delegate
    object that you provide. For example, the -resolveWithTimeout: message returns
    immediately, but starts the resolution process in the background. When finished,
    your delegate object will receive either a -netServiceDidResolveAddress: message
    or a -netService:didNotResolve: message if the resolution failed.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 13 ■ COMMUNICATING NEAR AND FAR


    The NSNetServices Programming Guide2 provides detailed information about how Network
    Services work, along with copious code examples.


    URL Loading


    Both Java and Objective-C provide a set of classes that assist in accessing the
    services and entities identified by Uniform Resource Locators (URLs). Both have
    built-in support for the HTTP, HTTPS, FTP, and FILE protocols. URL protocols are
    often complex, but these classes conveniently internalize those intricacies so
    that you can interact with them easily. This makes it possible to send a web server
    request to a URL, such as http://www.apress.com, and receive the response with
    just a few lines of code.


    The organization and roles of URL classes in Java and Objective-C are almost identical,
    although Objective-C is a little more granular. The NSURL (java.net.URL) class
    defines a single URL.


    NSURLConnection (java.net.URLConnection) manages the communications with the remote
    service described by the URL. Objective-C decomposes Java’s single URLConnection
    object into three objects; NSURLConnection is only concerned with the state of
    the connection. The request parameters are encapsulated in NSURLRequest, and the
    service’s reply is contained in an NSURLResponse. Any data—


    the “body” of the request or response—are exchanged through streams or events.


    This section will illustrate several common URL loading techniques and how they
    contrast with similar Java implementations.


    Trivial URL Request


    The simplest URL interaction is to just obtain the contents of a URL. This can
    be easily accomplished in either language, as shown in Listing 13-10.


    Listin g 13-10\. T rivi al URL Re quest


    Java


    try {


    URL url = new URL("http://www.apress.com/");


    Reader inStream = new InputStreamReader(url.openStream()); int c;


    System.out.print("URL Response: ");


    while ((c=inStream.read()) != -1)


    System.out.print((char)c);


    inStream.close();


    } catch (Exception e) {


    e.printStackTrace();


    }


    **Objective-C**


    NSURL *url = [NSURL URLWithString:@"http://www.apress.com/"]; NSURLRequest* request
    = [NSURLRequest requestWithURL:url]; NSURLResponse *response = nil;


    2 Apple, Inc., NSNetServices and CFNetServices Programming Guide, http://developer.apple.com/documentation/


    Networking/Conceptual/NSNetServiceProgGuide, 2008.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 13 ■ COMMUNICATING NEAR AND FAR


    NSData *data = [NSURLConnection sendSynchronousRequest:request returningResponse:&response


    error:NULL];


    NSLog(@"URL response: %@",[NSString stringWithCString:[data bytes]


    length:[data length]]);


    The Java code takes advantage of the convenience method java.net.URL.openStream(),
    which creates an URLConnection object, initiates the request, and returns an InputStreamReader
    object connected to the response stream. The Objective-C code is a little more
    complex to set up, first requiring the creation of an NSURLRequest object. With
    that accomplished, the entire transaction is performed using the +[NSURLConnection
    sendSynchronousRequest:returningResponse:error:] class method. A transient NSURLConneciton
    object is created, the request is sent, and the response is returned in two objects:
    An NSURLResponse object containing the reply headers and an NSData object containing
    the response body.


    Asynchronous URL Request


    URL interaction in Java is inherently synchronous. If the URL data being loaded
    takes a long time to obtain, the code in Listing 13-10 would block until the data
    was received. This might be appropriate if the time it took to load the URL was
    inconsequential. Often, it is not. To avoid hanging the main application, the
    code in Listing 13-10 could be executed in its own thread. In Java, this would
    be the preferred solution.


    In Objective-C, the natural way to use an NSURLConnection is asynchronously. Most
    NSURLConnection methods initiate asynchronous operations—synchronous operations
    are the exception. Just like NSStream, described earlier in this chapter, NSURLConnection
    communicates its progress by sending messages to its delegate. The code for reading
    the contents of a URL


    asynchronously is shown in Listing 13-11.


    Listin g 13-11\. Asy nch ron ous UR L Requ est


    @interface URLGetter : NSObject {


    NSMutableData *body;


    NSURLConnection *connection;


    }


    - (void)loadURL:(NSString*)string;


    @end


    @implementation URLGetter


    - (void)loadURL:(NSString*)string


    {


    NSURL *url = [NSURL URLWithString:string];


    NSURLRequest *request = [NSURLRequest requestWithURL:url];


    // allocate buffer to store the received data


    body = [NSMutableData data];


    connection = [NSURLConnection connectionWithRequest:request delegate:self];


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 13 ■ COMMUNICATING NEAR AND FAR


    - (void)connection:(NSURLConnection*)connection didReceiveData:(NSData*)data


    {


    [body appendData:data];


    }


    - (void)connection:(NSURLConnection*)connection


    didReceiveResponse:(NSURLResponse*)response


    {


    // The response headers and metadata were successfully received


    // Successive responses preceed each new body, so reset the buffer


    [body setLength:0];


    }


    - (void)connectionDidFinishLoading:(NSURLConnection*)connection


    {


    // URL loading is complete; NSURLConnection is closed, |body| is complete


    }


    - (void)connection:(NSURLConnection*)connection didFailWithError:(NSError*)error


    {


    // URL failed to load; reason is in |error|


    }


