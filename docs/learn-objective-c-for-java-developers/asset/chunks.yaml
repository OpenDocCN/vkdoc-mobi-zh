    CHAPTER 13 ■ COMMUNICATING NEAR AND FAR


    NSURLDownload supports a number of other delegate methods for monitoring the progress
    of the download, responding to authentication challenges, and for interactively
    deciding on a destination file path. It also supports resumption of an interrupted
    download through the


    -initWithResumeData:delegate:path: constructor.


    Caches and Cookies


    Like Java, Objective-C URL connections support local caches and cookies. In Java,
    caching is configured using java.net.URLConnection.setUseCaches(boolean) and cookies
    are handled automatically.


    Objective-C provides a per-process cache manager that will keep frequently requested
    data in memory or on disk for improved performance. You can influence how a request
    uses the cache in two ways. The first is to specify the NSURLRequestCachePolicy
    when the NSURLRequest is created, or by setting the policy of the NSMutableURLRequest
    before the request is sent. The policy can choose to use an optimal default—the
    recommended choice—or choose from a number of policies, from ignoring all cached
    data to only responding with cached data. More sophisticated cache management
    can be performed by implementing the -connection:willCacheResponse: method in
    your NSURLConnection delegate object. This message is sent to the delegate before
    storing any received data in the cache. It can permit it to be stored as is, prevent
    it from being stored, or provide altered data to store in its place.


    Cookies are automatically supplied from a system-wide cookie storage service.
    The default is to handle cookies according to the user-selected security policy.
    You can disable cookies for a single request by creating an NSMutableURLRequest
    object and sending it [request setHTTPShouldHandleCookies:NO]. You can also change
    the cookie policy, but doing so changes the policy for all processes on the system.


    Summary


    Objective-C provides a variety of communication technologies, which reflect the
    wide range of communication problems facing modern applications. From simple notifications
    to distributed objects, the solution you choose will depend on the kind of problem
    you’re trying to solve. In most cases, Objective-C solutions will parallel the
    ones you’re familiar with in Java, although the implementation details may vary
    substantially.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 14**


    ■ ■ ■


    Exception Handling


    Exception handling in Objective-C is almost identical in capacity with that in
    Java. Objective-C is, naturally, more casual about exceptions and makes none of
    the demands that Java does. You can design and write code using Objective-C exceptions
    exactly as you would in Java, completely ignore them, or settle somewhere in between.
    This chapter will briefly compare the similarities between Objective-C and Java
    exception handling—of which there are many—and then explain some of the subtle
    differences.


    Later sections will discuss assertions and alternatives to exceptions.


    Using Exceptions


    Creating, throwing, and catching exceptions are virtually identical in Objective-C
    and Java. Listing 14-1


    shows some simple exception handling.


    Listin g 14-1\. Exception Handling


    **Java**


    public class Tosser


    {


    public void catcher( ) throws Exception


    {


    try {


    System.out.println("Tosser.catcher(): trying");


    thrower();


    } catch ( SpecificException se ) {


    System.out.println("caught SpecificException: "+se);


    } catch ( Exception e ) {


    System.out.println("caught Exception: "+e);


    throw e;


    } finally {


    System.out.println("Tosser.catcher(): finished");


    }


    }


    public void thrower( ) throws Exception


    {


    throw new Exception("thrower() does not work");


    }


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 14 ■ EXCEPTION HANDLING


    Objective-C


    @interface Tosser : NSObject


    - (void)catcher;


    - (void)thrower;


    @end


    @implementation Tosser


    - (void)catcher


    {


    @try {


    NSLog(@"%s trying",__func__);


    [self thrower];


    } @catch ( SpecificException *se ) {


    NSLog(@"caught SpecificException: %@",se);


    } @catch ( NSException *e ) {


    NSLog(@"caught NSException: %@",e);


    @throw e;


    } @finally {


    NSLog(@"%s finished",__func__);


    }


    }


    - (void)thrower


    {


    @throw [NSException exceptionWithName:@"MyException"


    reason:@"-thrower does not work"


    userInfo:nil];


    }


    @end


    The similarities are much more pronounced than the differences. Specifically,
    the @try, @catch, and @finally blocks have the same syntax, order, and execution
    flow that the try, catch, and finally blocks do in Java. You throw exception objects
    using the Objective-C @throw directive exactly as you would with Java’s throw
    statement. Caught exceptions can be processed or re-thrown in the same way.


    If you want to employ exceptions in Objective-C the way you do in Java, you’re
    welcome to do so. The capabilities of Objective-C exceptions are so close to that
    of Java’s that you probably won’t notice any significant difference. There are,
    however, some differences—mostly in what Objective-C will allow you to do that
    Java doesn’t. The next section explains exactly what those differences are and
    what impact they might have on your design.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 14 ■ EXCEPTION HANDLING


    Exception Handling Differences


    Objective-C is much more relaxed about exceptions than Java. One could argue that
    it’s too relaxed, but that’s an academic debate. Most of the differences between
    Java and Objective-C exception handling fall outside the bounds of what Java allows.


    No Catch or Specify


    The Java language has a “Catch or Specify” rule that requires you to either declare
    the exceptions that a method throws or catch those exceptions within the body
    of the method. Objective-C doesn’t check to see if your code catches exceptions,
    and it doesn’t even have syntax for declaring what exceptions a method throws.
    This is mostly because (due to the dynamic nature of class methods) it has no
    way of knowing. To use Java parlance, all Objective-C exceptions are unchecked
    exceptions.


    Throw Any Object


    Objective-C can throw or catch any object, unlike Java, which requires the object
    of a throw statement to implement the Throwable interface. If an NSString object
    is sufficient to convey all of the information you want about an exception, then
    the following code is perfectly valid:


    @throw @"Something went wrong";


    Your code may, for example, throw an exception if an NSOperation failed. But instead
    of throwing an NSException that referenced the NSOperation, you could throw the
    NSOperation object itself. What you throw will, of course, depend on what you’re
    trying to accomplish, but you aren’t limited to NSException and its subclasses.'
