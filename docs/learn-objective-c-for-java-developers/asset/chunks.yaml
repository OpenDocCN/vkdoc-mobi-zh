    ## Combining Formal and Informal Protocols


    Starting with Objective-C 2.0, formal and informal protocols can be combined.
    An example `TableDataSource` protocol is shown in Listing 5-4. The protocol defines
    a set of methods that a data model object should implement in order to provide
    data to a hypothetical `Table` object.


    **Listing 5-4.** `TableDataSource` Protocol


    ```

    @protocol TableDataSource


    @required


    - (int)numberOfRowsInTable:(Table*)table;


    - (id)table:(Table*)table objectForColumn:(int)col row:(int)row;


    @optional


    - (void)table:(Table*)table setObject:(id)object forColumn:(int)col row:(int)row;


    @end

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ EXPLORING PROTOCOLS AND CATEGORIES


    This protocol has two required methods (the number of rows in the data set, and
    a method to obtain the object for a specific cell) and one optional method (for
    setting the value of a specific cell). The `Table` class uses the first two methods
    to obtain values in the data set, and the third to alter data in the set. If the
    data source object doesn’t implement the final method, `Table` treats the data
    set as immutable.


    A class that conforms to this protocol must implement all the methods declared
    after `@required`, but may choose to implement any or none of the `@optional`
    methods. Methods declared before, or in the absence of, either directive are `@required`
    by default.


    Testing an object to determine if it conforms to the `TableDataSource` protocol
    would tell you that the object implements all the `@required` methods, but not
    necessarily any of the `@optional` methods. Those would have to be tested singly.


    An important reason for declaring optional methods—besides documenting them—is
    for the benefit of the compiler. The Objective-C compiler assembles method invocations
    most reliably when the method has been prototyped. This is explained in more detail
    in Chapter 6. The `TableDataSource` protocol provides prototypes for all of the
    methods, even those that are never implemented.


    > **Note** Prior to Objective-C 2.0, it was common to declare a formal protocol
    that was never formally adopted by any class, just for the purpose of providing
    the compiler with method prototypes. Prototypes for informal protocol methods
    can also be declared using categories, described later in this chapter.


    Whether you choose to use formal protocols, informal protocols, or some combination
    of the two depends on your needs. Formal protocols ensure that all of the methods
    in the protocol are implemented and conformance can be verified with a single
    test. Informal protocols are more flexible and dynamic, but may require additional
    documentation and programmer cooperation.


    ## Categories


    A category is a named fragment of a class definition. In Java, a class is defined
    in a single monolithic statement. In Objective-C, parts of a class definition
    can be split off into groups of auxiliary methods. Each group is a category. Categories
    have a variety of applications.


    A category is defined just like a class, using `@interface` and `@implementation`
    directives, except that the category is identified using an existing class name
    followed by the category name in parentheses. Like protocols (interfaces), categories
    cannot add new instance variables to a class—just methods. Categories can define
    both instance and class methods.


    The code in Listing 5-5 is the controller for a recipe management application.
    The `RecipeBoxController` object handles the top-level application commands, like
    creating new recipe and shopping list documents.


    **Listing 5-5.** Monolithic Recipe Box Controller


    ```

    @interface RecipeBoxController : NSObject {


    NSMutableArray* recipes;


    NSMutableDictionary* recipeIndex;


    }


    - (id)init;


    - (Document*)newRecipe;


    - (Document*)newShoppingList;


    - (Document*)newShoppingListFromRecipes:(NSIndexSet*)recipeIndexes;


    @end


    @implementation RecipeBoxController


    …


    @end

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ EXPLORING PROTOCOLS AND CATEGORIES


    As the program grows in complexity, it becomes cumbersome to maintain all of the
    controller methods in a single class definition. Categories are used to subdivide
    the class definition into manageable modules, as shown in Listing 5-6.


    **Listing 5-6.** Recipe Box Categories


    ```

    @interface RecipeBoxController : NSObject {


    NSMutableArray* recipes;


    NSMutableDictionary* recipeIndex;


    }


    - (id)init;


    - (Document*)newRecipe;


    @end


    @implementation RecipeBoxController


    …


    @end


    @interface RecipeBoxController (ShoppingLists)


    - (Document*)newShoppingList;


    - (Document*)newShoppingListFromRecipes:(NSIndexSet*)recipeIndexes;


    @end


    @implementation RecipeBoxController (ShoppingLists)


    …


    @end

    ```


    After the reorganization, the new recipe document method is still implemented
    in the primary `RecipeBoxController` class. All of the methods that create shopping
    list documents have been sequestered into the `ShoppingLists` category, which
    can be compiled as a separate module. Methods defined in the `ShippingLists` category
    are first-class citizens of the `RecipeBoxController` class. They have the same
    scope and variable access as methods defined in the principal `RecipeBoxController`
    class. At runtime, the class in Listing 5-5 functions identically to the class
    and category in Listing 5-6.


    ## Using Categories for Organization


    Subdividing a large class into manageable pieces is one use for categories. It
    is also useful for encapsulating the knowledge or dependencies required by a functional
    subsection of a class. In the recipe application example, the `ShoppingLists`
    category implementation would undoubtedly need to import class definitions for
    shopping lists, ingredient lists, a grocery store editor, and so on. The implementation
    of the primary `RecipeBoxController` class does not need to know anything about
    those classes.


    Categories allow related methods of a class to be organized into their own module,
    without requiring any additional classes or complexity. This reduces dependencies
    and keeps your application design modular. This is particularly useful in collaborative
    development environments where one programmer might be working on new recipe functionality
    while another is working on new shopping list features. Both programmers can make
    changes to the same class while remaining independent of one another.


    The Builder pattern is another application for categories. The Builder pattern
    moves complex object construction outside the class. In Java, the Builder pattern
    would normally be implemented as a separate class (sometimes called a helper class).
    In Objective-C, the complex construction code can be isolated from the main class
    definition via a category.


