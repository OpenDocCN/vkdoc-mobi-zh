- fmt: "### A similar technique can be applied to `@property` directives.\n\nEarlier,\
    \ I cagily stated \"a `@property` directive typically appears in the `@interface`\
    \ directive.\" A `@property` directive can also appear in an `@implementation`.\
    \ It has the same meaning, but omitting it from the `@interface` also hides the\
    \ definition from other modules.\n\nObjective-C categories and extensions are\
    \ more formal patterns for subdividing the declarations of a class, allowing you\
    \ to compartmentalize the knowledge about a class. Those techniques and how they\
    \ can be used to emulate private and protected Java methods are explained in a\
    \ later chapter.\n\nFinally, it's sometimes useful to create a \"helper\" class—a\
    \ class whose purpose is internal to the implementation of another class. A helper\
    \ class can be entirely declared and implemented in the implementation file of\
    \ the class that uses it. The helper's interface and implementation are hidden\
    \ from other classes. If the class requires an instance variable that points to\
    \ a helper object, use a `@class` directive—described next—or the type `id`.\n\
    \n### Forward `@class` Directive\n\nThe `@class` directive declares a class name\
    \ without defining the class. It permits you to declare a reference to a class\
    \ without having compiled the `@interface` for that class. Following a `@class`\
    \ directive, you can refer to the class but you cannot compile any code that assumes\
    \ knowledge about that class—since the compiler has none. You can't send messages\
    \ to an object of that class, or access any of its properties, until the actual\
    \ `@interface` directive for that class is compiled.\n\nAs soon as you start declaring\
    \ variables that are pointers to objects, you'll discover that the compiler requires\
    \ that those classes be defined before it will allow you to use the class name\
    \ in a statement. The natural inclination is to just `#import` the needed class\
    \ header files for every object you reference in your `@interface` directive.\
    \ For smaller projects, that's fine.\n\nFor large projects, this becomes a burden\
    \ on the compiler (translation: it will slow down your development). Every class\
    \ that uses class A will import its interface (`#import \"A.h\"`). If class A\
    \ has instance variables that point to objects of classes B, C, and D, it will\
    \ import all of those header files. If classes B, C, and D collectively contain\
    \ references to classes E through N, their header files will import all of those\
    \ header files, and so on. As the complexity of your project grows, the effort\
    \ needed to compile each module grows geometrically.\n\nThe `@class` directive\
    \ can be used to lighten this load considerably. An `@interface` directive rarely\
    \ needs to know anything about a referenced class other than it exists. A typical\
    \ application of the `@class` directive is shown in Listing 3-13.\n\n**Listing\
    \ 3-13.** Forward `@class` Directive\n\n```\n#import \"Vehicle.h\"\n\n@class Engine;\n\
    @class MoonRoof;\n@class Radio;\n\n@interface Car : Vehicle {\n    Engine *engine;\n\
    \    MoonRoof *moonRoof;\n    Radio *radio;\n}\n\n- (void)startEngine;\n- (void)stopEngine;\n\
    - (void)tuneRadio;\n\n@end\n```\n\nThe `Car` class contains references to `Engine`,\
    \ `MoonRoof`, and `Radio` objects. A module that `#import`s this `@interface`\
    \ can use the methods and properties of `Car`, but knows nothing about the other\
    \ objects. The `@implementation` of `Car`, which presumably will use the other\
    \ objects, begins by importing the full definition of those classes.\n\nAs a rule,\
    \ I `#import` the header file for the superclass, the class of all public objects,\
    \ and the class of objects returned by methods (on the assumption that the caller\
    \ will use the returned object). All remaining classes in the `@interface` are\
    \ declared using `@class`.\n\nThe `@class` directive also makes it possible to\
    \ declare classes with circular references. In other words, class A has a reference\
    \ to class B which has a reference to class A.\n\n### `self` and `super`\n\nAn\
    \ Objective-C method has access to two predefined variables for referring to itself:\
    \ `self` (this) and `super` (super). They work exactly like their Java counterparts,\
    \ as shown in Listing 3-14.\n\n**Listing 3-14.** Use of `self` and `super`\n\n\
    ```\n#import \"Person.h\"\n\n@interface Voter : Person {\n}\n\n- (void)setAdult:(BOOL)isAdult;\n\
    \n@end\n\n@implementation Voter\n\n- (void)setAdult:(BOOL)isAdult\n{\n    if (isAdult\
    \ && !self.isAdult)\n        [VoterRegistration registerVoter:self];\n    [super\
    \ setAdult:isAdult];\n}\n\n@end\n```\n\nThe `self` variable is always a pointer\
    \ to the receiver (the object whose method was invoked). The type of the `self`\
    \ variable is a pointer to the class that implemented the method. It can be used\
    \ to address instance variables defined or inherited by that class (i.e., `self->secondName`),\
    \ but not a subclass variable (even if the actual class of the object is a subclass).\n\
    \n> **Caution** Java programmers may initially find this bizarre, but `self` is\
    \ a modifiable automatic variable and can be reassigned in the body of a method.\
    \ I'll explain later why you would want to do this. For now, just be careful not\
    \ to change it inadvertently.\n\nThe statement `[self method]` sends an object\
    \ a message to itself. The equivalent Java statement would be `this.method()`\
    \ or just `method()`. The pseudo-variable `super` is identical to `self`, but\
    \ its only practical use is when sending messages. The statement `[super method]`\
    \ invokes the method defined by the object's superclass and is equivalent to the\
    \ Java statement `super.method()`.\n\n### Class Methods\n\nSo far, only instance\
    \ methods have been defined for classes. To review, an instance method is declared\
    \ with a minus sign (`-`) prefix. It defines a message that instances of that\
    \ class will respond to.\n\nA method name that begins with a plus sign (`+`) defines\
    \ a class method. As described in the `isa` section, each class creates a single\
    \ Class object at runtime that defines the identity and behavior for all instances\
    \ of that class. A class method defines a message that the single Class object\
    \ will respond to. A class method is (technically) not the equivalent of a static\
    \ method in Java, although they tend to fill the same role.\n\nA class name, when\
    \ used in an expression, evaluates to the singleton Class object for that class.\
    \ To invoke a class method, use the class name as the receiver, as shown in Listing\
    \ 3-15. Using the class name sends the message to that class's Class object.\n\
    \n**Listing 3-15.** Class and Instance Method Invocation\n\n```\n@interface RandomSequence\
    \ : NSObject {\n    long long int seed;\n}\n\n+ (NSNumber *)number;\n+ (NSString\
    \ *)string;\n\n- (NSNumber *)nextNumber;\n- (NSString *)string;\n\n@end\n\n...\n\
    \nNSNumber *n = [RandomSequence number];\nNSString *s = [RandomSequence string];\n\
    \nRandomSequence *r = ...;\nn = [r nextNumber];\ns = [r string];\n```\n\n> **Note**\
    \ By convention, class methods are defined first, followed by the instance methods.\n\
    \nThe method `+(NSNumber*)number` defines a class method that returns an `NSNumber`\
    \ object. The statement `[RandomSequence number]` sends the message `number` to\
    \ the single Class object that defines the `RandomSequence` class.\n\nA `string`\
    \ method has been defined for both the Class object and instances of the class.\
    \ The statement `[RandomSequence string]` sends the `string` message to the Class\
    \ object and executes the code in `+(NString*)string`. The statement `[r string]`\
    \ sends the `string` message to an instance of the `RandomSequence` class and\
    \ executes the code in `-(NSString*)string`. There is no ambiguity or name conflict\
    \ because `-string` and `+string` are implemented for different objects."
