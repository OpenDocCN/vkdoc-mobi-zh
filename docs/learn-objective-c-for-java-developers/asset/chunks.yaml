    \ Objective-C 集合类使用 `NSUInteger` 值来计数和寻址元素，这使得 64 位架构中的集合能够包含超过 4,294,967,296\
    \ 个元素——这是 32 位处理器地址空间无法实现的。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第 26 章：运行时\n\n**提示** 一个常见错误是使用错误的格式字符串说明符来格式化 `int` 值。当编译为 64 位时，语句 `[NSString\
    \ stringWithFormat:@\"%d\",(NSInteger)x]` 将无法正常工作；整数格式说明符（`\"%d\"`）期望的是 32 位整数。务必将格式说明符（`\"\
    %ld\"`）与其期望的类型（`long int`）匹配。\n\n指针变量大小的变化对于 Objective-C 程序员来说通常不是问题。所有指针（对象指针、C\
    \ 类型指针、结构体指针、`CFTypeRef` 等）都始终存储在指针变量中。这种大小变化是透明的，不同指针类型之间的强制类型转换也同样透明。\n\n除了大小变化之外，64\
    \ 位的 `long int`、`long long int` 和指针变量都从 4 字节对齐变为 8 字节对齐。变量的对齐方式决定了该变量倾向于被放置到的地址位置。8\
    \ 字节对齐意味着变量的地址应能被 8 整除。这主要影响结构体的组织，例如代码清单 26-3 所示的结构体。\n\n### 代码清单 26-3. 结构体中的变量对齐\n\
    \n```\n@interface Marker : NSObject {\n    int tag;\n    long long int position;\n\
    }\n@end\n```\n\n在 32 位架构中，代码清单 26-3 中 `tag` 和 `position` 变量的相对地址偏移量分别为 0 和 4。当编译为\
    \ 64 位架构时，相对偏移量将变为 0 和 8。变量的大小没有改变，但 `position` 整数的首选地址对齐方式从 4 字节变为 8 字节。编译器在这两个变量之间插入了\
    \ 4 个未使用的字节，以便将第二个变量对齐到 8 字节地址边界。这意味着，当编译为 64 位时，该对象在内存中的大小增加了 4 个字节，尽管变量的尺寸没有变化。\n\
    \n以下是一个简短的清单，列出了让你的代码在 32 位和 64 位架构中都能顺畅运行的最佳实践：\n\n*   切勿将指针值存储或传递给整型变量，反之亦然。\n\
    *   将返回的 `NSInteger` 值存储在 `NSInteger` 变量中。具体来说，`NSUInteger count = [collection\
    \ count]`。\n*   使用 `NSInteger` 值时，应使用对应的“整型”对象消息：使用 `-[NSCoder encodeInteger:forKey:]`\
    \ 而非 `-[NSCoder encodeInt:forKey:]`，使用 `-[NSString integerValue]` 而非 `-[NSString\
    \ intValue]`，依此类推。\n*   确保格式字符串说明符与正确的变量类型匹配。\n*   不要依赖或假设结构体的大小或组织方式。\n*   通常，应使用对象和属性进行设计，而非操作结构体和指针。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 26 章：运行时\n\n这些都是主要问题，但还有大量微小的细节。如果你正考虑编译\
    \ 64 位 Objective-C 代码，应先查阅《Cocoa 64 位迁移指南》。同时也可以阅读《64 位迁移指南》中列举的、你可能不想将应用转换为 64\
    \ 位的诸多原因。\n\n## 总结\n\n与试图抽象运行时环境许多细节的 Java 不同，Objective-C 应用以本地代码运行，并直接与操作系统 API\
    \ 交互。你可以使用内省（Introspection）技术在可能缺少新 API 和特性的旧版操作系统上运行应用。Cocoa 捆绑包和框架简化了复杂应用和库的部署，而用户默认设置则让管理可配置偏好和属性变得简单。只需注意一些细节，你就能开发出在最新一代\
    \ 64 位处理器上顺畅运行的应用。\n\n## 结语\n\n祝贺你自己。你已经学到了很多关于 Objective-C 的知识！而且不仅仅是基础——本书探讨了一些非常高级的技术。你已经了解了\
    \ Objective-C 和 Java 在处理基本类型、控制结构、类继承、协议（接口）、垃圾回收、归档（序列化）、异常、线程和集合方面有多么相似。你还了解了\
    \ Objective-C 在调用方法时的微妙差异——语法、技术和哲学层面。最重要的是，你探索了一些真正新颖的概念，比如类别（Categories）、键值观察（Key-Value\
    \ Observing）和类簇（Class Clusters）。你（希望！）已经接纳了一些新的设计模式，如代理（Delegates）、单例（Singletons）以及利用\
    \ `nil` 对象指针，并将其化为优势。你还了解了 Objective-C 如何拥抱模型-视图-控制器和懒加载等设计模式，同时在订阅者/提供者和工厂模式上采取了独特的方法。\n\
    \n当然，关于 Objective-C、类框架以及 C 语言，还有远比一本书能涵盖的更多的知识。但我真心希望你觉得这本书富有启发性，并能加速你掌握知识和技能，最终达成你的目标。Java\
    \ 和 Objective-C 都是优秀的语言。鉴于它们有诸多相似之处，你完全有能力精通两者——从而拓展你的视野和机遇。\n\n## 参考文献\n\n1.\
    \  Apple Inc., 64-Bit Transition Guide for Cocoa, [`developer.apple.com/documentation/Cocoa/Conceptual/Cocoa64BitGuide/`](http://developer.apple.com/documentation/Cocoa/Conceptual/Cocoa64BitGuide/),\
    \ 2009.\n2.  Apple Inc., 64-Bit Transition Guide, [`developer.apple.com/documentation/Darwin/Conceptual/64bitPorting/`](http://developer.apple.com/documentation/Darwin/Conceptual/64bitPorting/),\
    \ 2009.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n"
