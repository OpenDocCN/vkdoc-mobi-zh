    -(NSComparisionResult)comparisonMethod:(id)object


    The left hand object receives the message along with a pointer to the right hand
    object. It compares itself to the other object and returns an NSComparisionResult
    value. The return value must be one of NSOrderedAscending, NSOrderedSame, or NSOrderedDescending.
    The receiver returns NSOrderedAscending if it considers itself to be before the
    other object, NSOrderedSame if equal, and NSOrderedDescending otherwise. The canonical
    example of a suitable sort message is the -compare: method implemented by NSString,
    NSNumber, and NSDate. A mutable array of NSString objects can be sorted using
    [array sortArrayUsingSelector:@selector(compare:)], [array sortArrayUsingSelector:@selector
    (caseInsensitiveCompare:)], [array sortArrayUsingSelector:@selector (localizedCompare:)],
    and so on.


    C Function Sorting


    A sorting technique that doesn’t require the object to implement its own comparison
    method is to supply a C function that accepts two Objective-C object pointers,
    compares them, and returns the results. The function must have a prototype compatible
    with NSInteger comparisonFunction( id leftObject, id rightObject, void *context
    ) The function performs the same comparison that the comparison message does;
    it compares the left hand object to the right hand object and returns NSOrderedAscending,
    NSOrderedSame, or NSOrderedDescending. The optional context pointer passed to
