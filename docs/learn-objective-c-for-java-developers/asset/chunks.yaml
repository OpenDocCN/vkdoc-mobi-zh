    resulting in a memory leak. This can often be a subtle problem to detect, as the
    incidence of even a few thousand leaked objects won’t be obvious.


    The best solution to this problem is judicious use of developer tools. The Xcode
    developer tools include several memory leak detection tools, but the preeminent
    tool for Objective-C developers is ObjectAlloc, shown in Figure 24-1.


