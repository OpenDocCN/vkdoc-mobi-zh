  raw: '7\. Register that object as a named service.


    8\. In your client process, request the proxy object for the service.


    9\. Call methods of the proxy object to invoke those same methods on the instance
    of the object in the server process.


    Using distributed objects in Objective-C follows the same general workflow, except
    that Objective-C eliminates steps 3 and 5, and makes steps 1, 2, 4, and 7 optional.
    In Objective-C, the minimum required to use distributed objects is:


    1\. Vend any object via a connection object attached to a run loop.


    2\. The client requests the proxy object for the vended object from the connection.


    3\. The client sends the proxy object messages.


    The key differences are that you don’t have to do anything special to create a
    proxy of a remote object—Objective-C creates proxy objects spontaneously—and objects
    do not have to be archivable in order to be passed to, or returned from, remote
    messages. Although there can be advantages to making objects archivable, as explained
    in the “Passing Objects by Copy” section.


    Listing 13-4 contrasts Java RMI with Objective-C distributed objects. The complete
    source code and projects for these demonstrations is available at http://www.apress.com/
    in the Source Code/Downloads area. Shell scripts to compile and run the examples
    are included. To try the Objective-C examples one at a time, open and build the
    Xcode project. Open a Terminal window and cd to the build directory that contains
    the Greeter and Guest executables. Run the commands from the shell using ./Greeter
    or ./Guest. You will want to open multiple windows to play with communications
    between processes, or copy the executable to another computer on the same network
    to experiment with network connections. Type Control-C to stop a running server
    process.


    The Java implementation is functionally similar to the Objective-C version. Both
    examples run in two separate processes: a Greeter server and a Guest client. The
    Greeter process creates and publishes a single Greeter object. The client application
    connects to the remote process by looking up the Greeter service by name. It obtains
    a proxy for the Greeter object that exists in the server and interacts with it.


