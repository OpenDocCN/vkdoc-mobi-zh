    CHAPTER 21 ■ LAZY INITIALIZATION PATTERN


    When using the +initialize method to perform class-level lazy initialization,
    keep these points in mind:


    • The first message sent to a class, or the first attempt to create an instance
    of a class, creates the Class object for that class and sends it an +initialize
    message.


    • The +initialize method is only sent once per class. That can be deceiving, however,
    because Objective-C subclasses inherit the class methods of their superclass.
    So a class may receive additional +initialize messages for its subclasses. This
    is why the +initialize method in Listing 21-4 tests to see if PieceImages has
    already been initialized. This test could be omitted if it was known that ChessPiece
    had no subclasses.


    • The Class object is completely initialized before the +initialize message is
    sent, so it’s safe to call other class methods or create instances of itself from
    within the +initialize method.


    Summary


    Lazy initialization is a useful design pattern for both global and instance variables.
    It optimizes performance by constructing only the information that’s actually
    needed, and defers optional and ancillary calculations to a more appropriate time.
    Objective-C’s lack of static initialization statements can be largely overcome
    by employing the +initialize class method to programmatically construct any global
    variables the class needs to function.'
