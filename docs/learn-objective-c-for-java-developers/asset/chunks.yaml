- fmt: "# Formal Protocols (Interfaces)\n\n`Formal protocols (interfaces)` are defined\
    \ separately from classes. You may want to know what protocols a class conforms\
    \ to, or the methods that a protocol declares. The functions in Table 10-5 will\
    \ identify the protocols that a class conforms to, and let you explore those protocols.\
    \ If you just want to know if an object conforms to a specific protocol, use the\
    \ `-[NSObject conformsToProtocol:]` method described earlier.\n\n**Table 10-5.**\
    \ Protocol Introspection Functions\n\n| Function | Returns |\n|----------|---------|\n\
    | `objc_getProtocol(const char*)` | The protocol with that name |\n| `NSProtocolFromString(NSString*)`\
    \ | Same as `objc_getProtocol`, but accepts an Objective-C string object |\n|\
    \ `class_copyProtocolList(Class, unsigned int*)` | The list of protocols the class\
    \ conforms to |\n| `protocol_conformsToProtocol(Protocol*, Protocol*)` | `YES`\
    \ if the protocol conforms to another protocol |\n| `protocol_getName(Protocol*)`\
    \ | The name of the protocol |\n| `protocol_isEqual(Protocol*, Protocol*)` | `YES`\
    \ if the protocols are equivalent |\n\n`class_copyProtocolList` returns a `NULL`-terminated\
    \ C array of `Protocol` pointers. This block of memory must be released using\
    \ the `free(void*)` function when you are finished with it. The number of protocols\
    \ in the array is returned in the unsigned integer located at the address passed\
    \ in the second parameter. If that parameter is `NULL`, no count is returned.\
    \ You can use either the returned count or the `NULL`-terminating pointer to determine\
    \ the length of the list, as shown in Listing 10-6.\n\n**Listing 10-6.** Listing\
    \ the Protocols of a Class\n\n```\nunsigned int protocolCount;\nProtocol **protocols\
    \ = class_copyProtocolList(class, &protocolCount);\nNSMutableString *list = [NSMutableString\
    \ new];\nunsigned int i;\nfor (i = 0; i < protocolCount; i++) {\n    Protocol\
    \ *p = protocols[i];\n    if (i != 0)\n        [list appendString:@\", \"];\n\
    \    [list appendFormat:@\"%s\", protocol_getName(p)];\n}\nif (protocolCount !=\
    \ 0)\n    NSLog(@\"Class %s implements the protocols: %@\", class_getName(class),\
    \ list);\nfree(protocols);\n```\n\nPoints of interest in Listing 10-6: the name\
    \ returned by `protocol_getName` and `class_getName` are C strings, formatted\
    \ using the `%s` format specifier. The `list` variable is a string object, formatted\
    \ using `%@`. `Protocol` is a structure type, not an opaque pointer type like\
    \ `Class` and `Method`. As such, references are declared as pointers to `Protocol`\
    \ (`Protocol*`), rather than just the type (`Class`, `Method`). Confusing, isn’t\
    \ it?\n\n## Exploring Methods\n\nI’ve already shown you how to easily determine\
    \ if an object implements a specific method. Using the functions in Table 10-6\
    \ you can obtain a list of all of the methods a class implements. From a `Method`\
    \ value you can get a method’s name, selector, implementation address, and parameter\
    \ information.\n\n**Table 10-6.** Common Method Introspection Functions\n\n| Function\
    \ | Returns |\n|----------|---------|\n| `class_copyMethodList(Class, unsigned\
    \ int*)` | `NULL`-terminated `Method` array |\n| `class_getClassMethod(Class,\
    \ SEL)` | `Method` if selector was sent to the class |\n| `class_getInstanceMethod(Class,\
    \ SEL)` | `Method` if selector was sent to an instance of class |\n| `method_getName(Method)`\
    \ | Selector constant for `Method` |\n| `sel_getName(SEL)` | Name for selector\
    \ |\n| `NSStringFromSelector(SEL)` | Name for selector |\n| `NSSelectorFromString(NSString*)`\
    \ | Selector for name |\n| `class_getMethodImplementation(Class, SEL)` | Address\
    \ of code that implements selector |\n| `method_getImplementation(Method)` | Address\
    \ of code that implements `Method` |\n\nThe `class_copyMethodList` function works\
    \ similarly to `class_copyProtocolList`. It returns a `NULL`-terminated array\
    \ of `Method` references, which should be released using `free(void*)` when done.\n\
    \nThe `class_getClassMethod` function obtains a single `Method` for a specific\
    \ selector constant. Note that these functions only return the methods defined\
    \ by that class, not inherited by that class. To discover inherited methods, you\
    \ must examine all of its superclasses.\n\nThe two functions `class_getClassMethod`\
    \ and `class_getInstanceMethod` consider the difference when sending a message\
    \ to class object (`[MyClass message]`), or an instance of the class (`[myObject\
    \ message]`). Class and instance methods are implemented for different objects,\
    \ so the results of the two functions will be different.\n\nThe `method_getName`\
    \ function, despite its name, returns the selector constant associated with the\
    \ `Method`—not the name of the method. To turn the selector into a name, call\
    \ `sel_getName` or `NSStringFromSelector`. To do the opposite, call `NSSelectorFromString`.\n\
    \nAn example of these functions in action can be found in Listing 10-7.\n\n**Listing\
    \ 10-7.** Listing the Methods Implemented by a Class\n\n```\nunsigned int methodCount;\n\
    Method *methods = class_copyMethodList(class, &methodCount);\nNSMutableString\
    \ *list = [NSMutableString new];\nunsigned int i;\nfor (i = 0; i < methodCount;\
    \ i++) {\n    Method m = methods[i];\n    if (i != 0)\n        [list appendString:@\"\
    , \"];\n    [list appendFormat:@\"%s\", sel_getName(method_getName(m))];\n}\n\
    if (methodCount != 0)\n    NSLog(@\"Class %s implements the methods: %@\", class_getName(class),\
    \ list);\nfree(methods);\n```\n\nThe functions `class_getMethodImplementation`\
    \ and `method_getImplementation` both do the same thing: they return the execution\
    \ address of the code that implements the method. The Sending Messages chapter\
    \ explained how to call a method directly using its implementation address.\n\n\
    With a `Method` reference, there are a score of C functions for examining its\
    \ parameter list, the types and sizes of each parameter, and so on. Instead of\
    \ diving into these functions, I encourage you to use the method `-[NSObject methodSignatureForSelector:]`\
    \ to obtain an `NSMethodSignature` object.\n\n`NSMethodSignature` substantively\
    \ represents all of the information embodied by the `Method` structure, but in\
    \ an object-oriented interface. If you have a need to stick with the C functions,\
    \ refer to the Objective-C 2.0 Runtime Reference document.\n\nWith an `NSMethodSignature`\
    \ object, you can get the type of each argument (i.e., its `@encode()` constant)\
    \ using `-getArgumentTypeAtIndex:`. The message `-methodReturnType` returns the\
    \ C type of the method’s return value. To invoke a method using `NSMethodSignature`,\
    \ use it to create an `NSInvocation` object. This was also demonstrated in Chapter\
    \ 6.\n\n## Exploring Properties\n\nIn Objective-C 2.0, the `@property` directive\
    \ attaches metadata to the class that is available to the programmer at runtime.\
    \ These are called formal properties. Naturally, the set of properties will overlap\
    \ instance variables and methods, since most properties are implemented using\
    \ instance variables along with getter and setting methods. Table 10-7 lists the\
    \ common methods for examining the formal properties of a class.\n\n**Table 10-7.**\
    \ Common Formal Property Introspection Functions\n\n| Function | Returns |\n|----------|---------|\n\
    | `class_copyPropertyList(Class, unsigned int*)` | `NULL`-terminated array of\
    \ `objc_property_t` structure pointers |\n| `protocol_copyPropertyList(Protocol*,\
    \ unsigned int*)` | `NULL`-terminated array of `objc_property_t` structure pointers\
    \ |\n| `class_getProperty(Class, const char*)` | `objc_property_t` structure for\
    \ a named property |\n| `protocol_getProperty(Protocol*, const char*, BOOL, BOOL)`\
    \ | `objc_property_t` structure for a named property |\n| `property_getName(objc_property_t)`\
    \ | name of property |\n| `property_getAttributes(objc_property_t)` | attribute\
    \ string that describes the property |\n\nThe `…_copyPropertyList` and `…_getProperty`\
    \ functions obtain an array or a single property description. You can inspect\
    \ the properties for a class or a protocol. Lists must be released using `free(void*)`."
