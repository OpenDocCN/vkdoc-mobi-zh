    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 14 章 ■ 异常处理\n\n###\
    \ 结合错误与异常\n\n学术界关于异常与传统错误处理孰优孰劣的争论仍将持续。与此同时，我个人非常推崇将两者结合。`NSError`对象在需要本地化的复杂应用程序中具有明显优势，而\
    \ Java 风格的异常处理在简化代码和执行流程方面则优势显著。清单 14-10 展示了如何将传统的 C 语言错误处理、`NSError`对象和异常结合起来。\n\
    \n**清单 14-10.** 混合错误处理\n\n```\n@try {\n    const char *path = …\n    int fd =\
    \ open(path, O_RDONLY);\n    if (fd < 0) {\n        NSString *errorPath = [NSString\
    \ stringWithCString:path];\n        NSDictionary *info = [NSDictionary dictionaryWithObject:errorPath\
    \ forKey:@\"Path\"];\n        NSError *error = [NSError errorWithDomain:NSPOSIXErrorDomain\
    \ code:errno userInfo:info];\n        @throw error;\n    }\n    …\n    close(fd);\n\
    } @catch (NSError *error) {\n    [self presentError:error];\n}\n```\n\n### 总结\n\
    \nObjective-C 的异常处理强大、简单，与 Java 提供的异常处理不相上下。通过大量使用断言，可以约束 Objective-C 的许多许可性。POSIX、BSD、Core\
    \ Foundation 以及大多数 Cocoa 方法仅在（被视为）运行时错误或编程错误时才使用异常。你可以接纳这一理念，或者通过将异常与传统的设计模式结合，继续使用异常进行编程。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 15 章 ■ 线程\n\nJava 是最早直接支持线程和线程同步的编程语言之一。这是一个非常有远见的决定。多核、多处理器计算机系统已成为常态，而非例外。高效的多线程编程现在对于有效的程序开发至关重要，并且这一趋势仍在加速。\n\
    \n线程和信号量在概念上很简单，Java 与 Objective-C 之间的高层差异微不足道。Objective-C 还广泛使用了运行循环，它可以将线程转变为事件处理器。除了语言内置的基本`@synchronized`指令外，Cocoa\
    \ 框架还提供了许多额外的同步工具，每个工具都针对特定需求而量身定制。最后，还有一些类可以执行延迟操作、为您管理独立的线程以及执行定时任务，从而减轻您创建和管理自己线程的负担。\n\
    \n本章首先描述如何在 Objective-C 中创建、运行和销毁线程。同时解释运行循环，并说明为什么需要创建一个运行循环以及如何创建。之后，详细介绍同步多个线程以及使代码线程安全的多种方式。最后，介绍一些有用的类，它们可以使线程管理更简单，甚至可能无需管理。\n\
    \n### 线程 API\n\n线程管理和控制以 Objective-C 类`NSThread`为核心，与 Java 的`java.lang.Thread`类非常相似。对应的方法列于表\
    \ 15-1 中。\n\n**表 15-1.** 等效的线程方法\n\n| Java (`java.lang.Thread`) | Objective-C\
    \ (`NSThread`) | 描述 |\n|---|---|---|\n| `currentThread()` | `+currentThread` |\
    \ 当前执行线程的线程对象 |\n| `start()` | `-start` | 启动一个线程 |\n| `run()` | `-main` | 要执行的代码\
    \ |\n| `isAlive()` | `-isExecuting`, `-isFinished` | 判断线程是否已启动或已结束 |\n| `sleep(long)`\
    \ | `+sleepUntilDate:`, `+sleepForTimeInterval:` | 将线程挂起一段时间 |\n| `getPriority()`\
    \ | `+threadPriority` | 线程的优先级 |\n| `setPriority(int)` | `+setThreadPriority`\
    \ | 更改线程的优先级 |\n| `getName()` | `-name` | 线程的名称 |\n| `setName(String)` | `-setName:`\
    \ | 设置线程的名称 |\n| `getStackTrace()` | `+callStackReturnAddresses` | 获取堆栈上的返回地址数组\
    \ |\n\n以下是 Objective-C 与 Java 中线程的关键区别：\n\n- Objective-C 中没有线程组。\n- Objective-C\
    \ 接口没有提供获取现有线程列表的方法。\n- 没有安全模型。某些操作（例如设置线程优先级）只能从当前运行的线程执行，而在 Java 中则可以在任意线程上执行。\n\
    - 不能中断线程。`NSThread`确实提供了一个可以设置和测试的`canceled`属性，但取消线程不会解除其阻塞状态。\n- 没有守护线程。只要主线程在运行，Objective-C\
    \ 进程就会持续运行，并且当进程终止时，所有线程都会终止。\n- 没有`join()`函数，但可以使用`NSConditionLock`轻松实现相同的功能，本章稍后将对此进行说明。\n\
    - 没有`yield()`方法或任何等效方法。\n\nObjective-C 线程的生命周期与 Java 中的大致相同。您创建一条线程，该线程将执行一个对象的方法。当方法返回时，线程被终止并销毁。与共享给其他线程的任何对象的交互都必须使用信号量进行协调。\n\
    \n如果您对线程的需求仅此而已，请阅读“启动线程”和“线程同步”部分。如果您想考虑已经为您管理线程的现成类，请查看“操作”部分。本章其余部分主要探讨线程中较为深奥的细节，这些细节对大多数程序员来说关系不大。\n\
    \n### 启动线程\n\n在 Objective-C 中启动新线程甚至比在 Java 中还要简单——考虑到 Java 中创建线程已经相当简单，这足以说明问题。在\
    \ Objective-C 中创建线程有三种方法：\n\n- 通过发送消息`+detachNewThreadSelector:toTarget:withObject:`创建并立即启动一个线程。该消息指定了包含线程代码的对象和方法，以及一个可选参数，该参数将在线程开始执行时传递给线程。\n\
    - 使用`-initWithTarget:selector:object:`创建一个新的`NSThread`对象。这与第一种技术相同，区别在于线程不会启动。您可以在使用`-start`消息启动线程之前自定义该线程对象。\n\
    - 定义您自己的`NSThread`子类，重写`-main`方法，并使用`-init`创建您的实例。这相当于继承`java.lang.Thread`并重写`run()`。当对象收到`-start`消息时，它会创建一个新线程，并在新线程中执行其`-main`方法。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n> **注意** 创建并返回`NSThread`对象的构造器是操作系统中相当新的添加。在早于\
    \ 10.5 版本的 Mac OS X 中，只有`+detachNewThreadSelector:toTarget:withObject:`可以创建新线程。您不能继承`NSThread`或在启动前自定义线程。\n"
- fmt: "# Objective-C Threads\n\nObjective-C threads are easy to create because the\
    \ thread’s code can be any method of any object. In Java, the object containing\
    \ the code must implement the `Runnable` interface and implement that code in\
    \ its `run()` method. Objective-C’s only modest requirement is that the method\
    \ containing the thread’s code accept a single object parameter (which it can\
    \ ignore) and return void. Listing 15-1 shows how to start a thread.\n\n**Listing\
    \ 15-1.** Starting a Thread\n\nJava\n\n```java\npublic class Runner implements\
    \ Runnable\n\n{\n\n    public void run()\n\n    {\n\n        System.out.println(\"\
    Running with threads.\");\n\n    }\n\n}\n\n…\n\nRunner runner = new Runner();\n\
    \nThread thread = new Thread(runner);\n\nthread.start();\n```\n\nObjective-C\n\
    \n```objc\n@implementation Runner\n\n- (void)runMe:(id)ignored\n\n{\n\n    NSLog(@\"\
    Running with threads.\");\n\n}\n\n@end\n\n…\n\nRunner *runner = [Runner new];\n\
    \n[NSThread detachNewThreadSelector:@selector(runMe:)\n\n                    \
    \ toTarget:runner\n\n                   withObject:nil];\n```\n\n**THE MAIN THREAD**\n\
    \nThe main thread is the first thread started when the process is created, and\
    \ is special. All user input and events are sent to the run loop running on the\
    \ main thread. All changes to the user interface must occur on the main thread;\
    \ the user interface frameworks are not thread safe. Your application’s process\
    \ is, for all intents and purposes, the main thread. When the main thread finishes,\
    \ the process terminates—instantly killing all other threads.\n\nThere are numerous\
    \ methods that reference, target, test for, or return the main thread. These allow\
    \ you to easily target the main thread, or its run loop, when necessary.\n\n**Managing\
    \ Threads**\n\nThe best advice for managing threads is “don’t.” Threads do not\
    \ respond well to being micro-managed, and it makes your code fragile and less\
    \ portable. Above all, do not try to second guess the kernel’s thread scheduler\
    \ or try to coerce it into a particular behavior. As kernel thread scheduling\
    \ has become more sophisticated, the number of application programmer interfaces\
    \ for manipulating running threads has decreased. For example, Objective-C has\
    \ no `yield()` equivalent, and the `java.lang.Thread` methods `stop()`, `suspend()`,\
    \ and `resume()` have all been deprecated.\n\nThreads should be organized around\
    \ clearly defined, antonymous tasks. They should communicate minimally and coordinate\
    \ their work with other threads using semaphores. Beyond that, you should simply\
    \ let threads run when they have work to do, and let them suspend when they don’t.\
    \ If you find yourself interjecting sleep statements or creating semaphores just\
    \ to force the kernel to switch tasks, then you should revisit the design of your\
    \ tasks.\n\nHaving said that, there are some special circumstances where you may\
    \ need to alter the task’s properties or put it to sleep. Putting a thread to\
    \ sleep is explained next. Thread properties are discussed in the sections that\
    \ follow.\n\n**Putting a Thread to Sleep**\n\nPutting a thread to sleep for a\
    \ period of time is one of the few thread state manipulations remaining.\n\nPutting\
    \ a thread to sleep suspends the thread until the time interval has elapsed. Afterward,\
    \ the thread is made “runnable” again, and the kernel will add the thread back\
    \ into its rotation of running threads. Said another way, the thread isn’t guaranteed\
    \ to start running again immediately after the time interval has elapsed; it just\
    \ won’t run again before the time interval has elapsed.\n\nThe `NSThread` methods\
    \ `+sleepUntilDate:` and `+sleepForTimeInterval:` will cause the current thread\
    \ to sleep, unconditionally, for the given period of time. This can be an `NSDate`\
    \ object in the future or an `NSTimeInterval` value expressed in seconds. Dates\
    \ and time intervals use double floating-point values to express seconds, so time\
    \ intervals down to the nanosecond range can be specified. The kernel doesn’t\
    \ guarantee the accuracy of the time, only that the thread won’t execute again\
    \ until that amount of time has elapsed."
