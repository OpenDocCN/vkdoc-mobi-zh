    \                       change:(NSDictionary*)change\n                      context:(void*)context\n\
    {\n    if (object == gate) {\n        // security gate changed...\n    }\n}\n\
    @end\n```\n\nThe dynamic nature of Objective-C applications often stems more from\
    \ the design patterns embraced by developers than anything inherent in the language\
    \ – although Objective-C does make those patterns easier to adopt. Take the simple\
    \ example of implementing copy and paste methods for a custom view object. The\
    \ Cocoa framework defines something called the *responder chain*. It starts with\
    \ the view object that currently has the user’s focus, say some selected text\
    \ or graphic displayed by your custom view object. The chain consists of that\
    \ object, the view object that contains it, the window that contains that, and\
    \ eventually the single application object that contains all of the windows. When\
    \ the user selects the Paste command from the menu, Cocoa examines the objects\
    \ in the chain to find the first one that implements a `-paste:` method. Similarly,\
    \ the menu item itself is enabled and disabled automatically, based on the presence\
    \ or absence of an object in the responder chain that implements `-paste:`. This\
    \ arrangement does not require any object to “look” for a Paste command event\
    \ or register itself with the menu item. The Paste command comes to life simply\
    \ because an object implemented a `-paste:` method.\n\nBut, you might ask, what\
    \ if the Paste command needs to be enabled conditionally? That's simple: your\
    \ custom view object should implement the `-validateMenuItem:` method. Objects\
    \ in the responder chain that implement *that* method are queried to determine\
    \ what commands should be enabled for the user. Otherwise, the Cocoa framework\
    \ makes up its own mind.\n\nThe emphasis here is not on what an object *is* but\
    \ what it *does*. The capabilities or roles of an object are determined by examining\
    \ what methods it implements, rather than what class it is or requiring it to\
    \ register itself with other objects. This philosophy has its roots in aspect-oriented\
    \ programming. Objective-C developers call these methods *informal protocols*.\n\
    \nThe end result is a fluid application that adjusts itself and responds to users\
    \ based largely on what functions the objects in the program do, or don't do.\
    \ The knowledge required by one object about another is minimal, as are its relationships\
    \ to other view objects. In Objective-C, object implementations are simpler, more\
    \ encapsulated, make fewer assumptions, and are generally more reusable.\n\n##\
    \ Developer Productivity\n\nFor all of the reasons just mentioned, Apple considers\
    \ Objective-C its “secret weapon.” Apple regularly produces high performance,\
    \ cutting-edge applications faster, and with fewer developers, than other major\
    \ software companies. They publicly attribute Objective-C as a key component in\
    \ their success.\n\nAfter you begin to work with Objective-C, especially when\
    \ building GUI applications, you’ll discover just how productive and efficient\
    \ you can be.\n\n## Learning a New Language\n\nComputer systems and software change\
    \ continually, and computer languages change along with them."
