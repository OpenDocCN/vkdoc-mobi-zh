    To use distributed notifications, you need to be aware of some of its limitations
    and complications, described in the next few sections.


    Distributed Notifications Center


    To post or observe distributed notifications, your objects must interact with
    the singleton NSDistributedNotificationCenter created for each process. You obtain
    it with [NSDistributed NotificationCenter defaultCenter]. The framework may define
    other distributed notification centers in the future, but for now there’s only
    one. You cannot create your own distributed notification centers.


    If you need a more sophisticated inter-process communications path, consider distributed
    objects, described in Chapter 13.


    Distributed notification centers exchange messages using Mach (kernel) ports.
    The security model of Mac OS X organizes Mach ports into a hierarchy of bootstrap
    namespaces. Posted notifications will be broadcast to all of the processes in
    your account’s local and parent namespaces, but not to sister namespaces created
    by other users.


    Property List Values


    The information in a distributed notification is serialized (see the “Objective-C
    Serialization” section of Chapter 12). This restricts the objects passed in the
    object and userInfo parameters to property-list values—basically array, dictionary,
    string, number, and date objects. The object parameter in a distributed notification
    center is used exactly the same way it is in a regular notification center, except
    it’s just a string instead of a pointer to the provider object. Use a descriptive
    value like


    @"com.apress.learnobjc.DemoProvider" to identify the sender or group notifications.


    Asynchronous Notification Delivery


    Similar to NSNotificationQueue, distributed notifications are queued, optionally
    coalesced, and delivered asynchronously. Distributed notifications are (as of
    Mac OS X 10.3) always delivered on the main run loop. The primary difference between
    notification queues and distributed notifications is that the observer, not the
    provider, determines how notifications are queued and coalesced.


