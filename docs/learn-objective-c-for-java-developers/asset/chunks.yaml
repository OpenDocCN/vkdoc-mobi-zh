    - (void)safe\n{\n  @synchronized(self) {\n    // 线程安全代码\n  }\n}\n@end\n```\n\n\
    除了这个微小的限制之外，你可以像在 Java 中使用 `synchronized` 一样使用 `@synchronized`。\n\n### 互斥信号量对象\n\
    \n¹ Apple 公司，《线程编程指南》，http://developer.apple.com/documentation/Cocoa/Conceptual/Multithreading/，2008\
