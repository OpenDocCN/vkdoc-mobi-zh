    CHAPTER 12 ■ SERIALIZATION


    ■Note Backward compatibility is the ability of a newer version of a class/application
    to interpret data created by an older version. Forward compatibility is the ability
    of an older version of a class/application to, at least partially, interpret the
    data created by a newer version.


    How you provide backward, or forward, compatibility in Objective-C depends on
    the archive type.


    Forward and Backward Compatibility in Keyed Archives


    Keyed archives confer one huge advantage: flexible compatibility between class
    versions. An improved version of the ScheduledEvent class, shown in Listing 12-10,
    has changed a little from the initial version in Listing 12-4\. It contains a
    new time zone object and the duration value has been replaced with an end time
    object.


    Listin g 12-10\. Forward and Backward Compatibility in a Keyed Archive


    @interface ScheduledEvent : NSObject <NSCoding> {


    @private


    NSDate *startTime;


    NSDate *endTime;


    NSTimeZone *timeZone;


    RoomIdentifier room;


    }


    @implementation ScheduledEvent


    - (id)initWithCoder:(NSCoder*)decoder


    {


    self = [super init];


    if (self != nil) {


    **if ([decoder containsValueForKey:@"TimeZone"])** timeZone = [decoder decodeObjectForKey:@"TimeZone"];
    else


    **timeZone = [NSTimeZone localTimeZone];**


    startTime = [decoder decodeObjectForKey:@"Start"]; **if ([decoder containsValueForKey:@"End"])
    {**


    endTime = [decoder decodeObjectForKey:@"End"];


    } else {


    **NSTimeInterval duration = [decoder decodeDoubleForKey:@"Duration"];** **endTime
    = [startTime addTimeInterval:duration];**


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 ■ SERIALIZATION


    room.buildingNo = [decoder decodeInt32ForKey:@"Room.building"]; room.roomNo =
    [decoder decodeInt32ForKey:@"Room.number"];


    }


    return self;


    }


    - (void)encodeWithCoder:(NSCoder*)encoder


    {


    [encoder encodeObject:startTime forKey:@"Start"];


    [encoder encodeObject:endTime forKey:@"End"];


    [encoder encodeObject:timeZone forKey:@"TimeZone"];


    [encoder encodeInt32:room.buildingNo forKey:@"Room.building"];


    [encoder encodeInt32:room.roomNo forKey:@"Room.number"];


    **[encoder encodeDouble:[endTime timeIntervalSinceDate:startTime]**


    **forKey:@"Duration"];**


    }


    @end


    The implementation in Listing 12-10 provides both forward and backward compatibility
    with its initial version. That is, the new version of the class can decode archives
    created by the original version, and the original version can decode archives
    created by the new version. This is accomplished through judicious use of archive
    keys.


    The new version of ScheduledEvent has a time zone object that the old version
    lacks. The new version uses the -containsValueForKey: method to determine if the
    archive it’s decoding contains a value for that key. If it does, it reads the
    value. If not, it assumes that the archive was created by an earlier version of
    the class and supplies a reasonable default. An old version of the class reading
    a newer archive ignores the value, knowing nothing about time zones.


    The replacement of the duration variable with endTime requires a little more work.
    Again,


    -initWithCoder: uses [decoder containsValueForKey:@"End"] to determine if the
    archive contains an


    “End” value. Modern archives would, but old archives wouldn’t. The new class assumes
    that a missing


    “End” value implies that it’s reading an older version of the archive; it uses
    the “Duration” value written by the old version to construct an equivalent endTime
    object.


    To provide forward compatibility, it archives the endTime value twice. Once as
    an NSDate object and again as an NSTimeInterval compatible with the class’s original
    duration value. An alternate way of maintaining compatibility would be to not
    encode the endTime object at all and continue to encode the “Duration” value,
    compatible with the old version. This would be the preferred solution when the
    new property is logically equivalent to the old one, and easily converted.


    Here are a few tips for maintaining backward, and potentially forward, compatibility
    in keyed archives:


    • Test for the existence of keys added in later versions of the class. The absence
    of a key indicates the archive was created with an earlier version.


    • If a value changes type, encode it using a new key.


    • The integer and floating point decoding methods perform some modest type conversion.
    All of the integer encoding and decoding methods are interchangeable, as are the
    floating-point methods. Thus, you can encode a number as a 32 bit integer, then
    decode it as a 64-bit integer and vice versa.


    • Initialize values for missing keys with something reasonable.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 ■ SERIALIZATION


    • For forward compatibility, continue to write the keys and values that earlier
    versions of the class expect, or translate newer values into values compatible
    with older classes.


    • Consider inserting a “version” value, or any other kind of hint, that would
    help future classes determine how the archive values should be interpreted. The
    statement [encoder encodeBool:YES forKey:@"isTimeZoneSavvy"] would inform future
    decoders that this archive was created with a version of the class that understands
    time zones.


    Backward Compatibility in Sequential Archives'
  trans: "\n# 类版本兼容性\n\n持久化数据的问题在于它确实会持久存在。这些数据可能持续存在数天甚至数年，而你的应用程序则在不断演进。最终，你的类会尝试解码由早期版本自身编码的归档文件。有时，甚至可能需要解码由同一类的某个后续版本创建的归档文件。\n\
    \nJava 通过结合使用类版本和键/值编码来解决兼容性问题。Java 的类版本严格用于禁止解码可能与类不兼容的数据。Java 序列化也使用键/值编码，就像\
    \ Objective-C 的键控归档一样。但在 Java 中，键始终是实例变量的名称。Java 会自动恢复与其先前版本共有的变量，并直接忽略数据流中未编码的变量。更复杂的兼容性问题需要你实现一个自定义的\
    \ `readObjects(ObjectInputStream)` 方法。我打算跳过冗长的细节，因为这不是一本关于 Java 的书。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**注意：** 向后兼容是指较新版本的类/应用程序能够解释由较旧版本创建的数据。向前兼容是指较旧版本的类/应用程序能够（至少部分地）解释由较新版本创建的数据。\n\
    \n如何在 Objective-C 中提供向后或向前兼容性，取决于归档类型。\n\n## 键控归档中的向前与向后兼容性\n\n键控归档有一个巨大的优势：类版本之间灵活的兼容性。如列表\
    \ 12-10 所示，改进后的 `ScheduledEvent` 类与列表 12-4 中的初始版本相比略有变化。它包含了一个新的时区对象，并且持续时间值已被结束时间对象所取代。\n\
    \n列表 12-10. 键控归档中的向前与向后兼容性\n\n```\n@interface ScheduledEvent : NSObject <NSCoding>\
    \ {\n@private\n    NSDate *startTime;\n    NSDate *endTime;\n    NSTimeZone *timeZone;\n\
    \    RoomIdentifier room;\n}\n\n@implementation ScheduledEvent\n\n- (id)initWithCoder:(NSCoder*)decoder\n\
    {\n    self = [super init];\n    if (self != nil) {\n        if ([decoder containsValueForKey:@\"\
    TimeZone\"])\n            timeZone = [decoder decodeObjectForKey:@\"TimeZone\"\
    ];\n        else\n            timeZone = [NSTimeZone localTimeZone];\n\n     \
    \   startTime = [decoder decodeObjectForKey:@\"Start\"];\n        if ([decoder\
    \ containsValueForKey:@\"End\"]) {\n            endTime = [decoder decodeObjectForKey:@\"\
    End\"];\n        } else {\n            NSTimeInterval duration = [decoder decodeDoubleForKey:@\"\
    Duration\"];\n            endTime = [startTime addTimeInterval:duration];\n  \
    \      }\n\n        room.buildingNo = [decoder decodeInt32ForKey:@\"Room.building\"\
    ];\n        room.roomNo = [decoder decodeInt32ForKey:@\"Room.number\"];\n    }\n\
    \    return self;\n}\n\n- (void)encodeWithCoder:(NSCoder*)encoder\n{\n    [encoder\
    \ encodeObject:startTime forKey:@\"Start\"];\n    [encoder encodeObject:endTime\
    \ forKey:@\"End\"];\n    [encoder encodeObject:timeZone forKey:@\"TimeZone\"];\n\
    \    [encoder encodeInt32:room.buildingNo forKey:@\"Room.building\"];\n    [encoder\
    \ encodeInt32:room.roomNo forKey:@\"Room.number\"];\n    [encoder encodeDouble:[endTime\
    \ timeIntervalSinceDate:startTime]\n                   forKey:@\"Duration\"];\n\
    }\n\n@end\n```\n\n列表 12-10 中的实现提供了与其初始版本的向前和向后兼容性。也就是说，该类的新版本可以解码由原始版本创建的归档，而原始版本也可以解码由新版本创建的归档。这是通过明智地使用归档键来实现的。\n\
    \n`ScheduledEvent` 的新版本有一个旧版本所没有的时区对象。新版本使用 `-containsValueForKey:` 方法来判断它正在解码的归档是否包含该键的值。如果包含，则读取该值；如果不包含，则假定该归档是由该类的早期版本创建的，并提供一个合理的默认值。旧版本的类在读取较新归档时，会忽略该值，因为其对时区一无所知。\n\
    \n用 `endTime` 替换持续时间变量需要做更多工作。同样，`-initWithCoder:` 使用 `[decoder containsValueForKey:@\"\
    End\"]` 来判断归档是否包含 `\"End\"` 值。现代的归档会包含，但旧的则不会。新类假设缺少 `\"End\"` 值意味着它正在读取旧版本的归档；它使用旧版本写入的\
    \ `\"Duration\"` 值来构造一个等价的 `endTime` 对象。\n\n为了提供向前兼容性，它将 `endTime` 值存档了两次。一次作为\
    \ `NSDate` 对象，另一次作为与该类原始持续时间值兼容的 `NSTimeInterval`。另一种保持兼容性的方法是完全不编码 `endTime`\
    \ 对象，并继续编码与旧版本兼容的 `\"Duration\"` 值。当新属性在逻辑上等同于旧属性，并且易于转换时，这将是首选的解决方案。\n\n以下是在键控归档中维护向后以及潜在的向前兼容性的一些技巧：\n\
    \n-   测试该类后续版本中添加的键是否存在。键的缺失表明归档是由早期版本创建的。\n-   如果某个值的类型发生了变化，请使用新的键对其进行编码。\n\
    -   整数和浮点数解码方法会执行一些适度的类型转换。所有的整数编码和解码方法都是可互换的，浮点数方法也是如此。因此，你可以将一个数字编码为 32 位整数，然后将其解码为\
    \ 64 位整数，反之亦然。\n-   用一些合理的值来初始化缺失的键。\n-   为了向前兼容，请继续写入该类早期版本所期望的键和值，或者将较新的值转换为与旧类兼容的值。\n\
    -   考虑插入一个 `\"version\"` 值，或任何其他类型的提示，以帮助未来的类确定如何解释归档值。语句 `[encoder encodeBool:YES\
    \ forKey:@\"isTimeZoneSavvy\"]` 将通知未来的解码器，此归档是由一个理解时区的类版本创建的。\n\n## 顺序归档中的向后兼容性\n\
    \n列表 12-9 中的代码通过有条件地编码其对 `ProjectTask` 对象的引用来解决这个问题。如果你归档一个单独的 `ProjectMeeting`\
    \ 对象，`ProjectTask` 对象永远不会被无条件地编码，从而被省略。当解档时，语句 `[decoder decodeObjectForKey:@\"\
    Task\"]` 返回 `nil`。结果对象将不会连接到项目调度数据模型，但足以用于邀请某人参加会议。\n\n当调度系统服务器归档整个项目数据模型时，它将无条件地编码项目、其任务、里程碑和团队成员对象。当它处理到\
    \ `ProjectMeeting` 对象时，条件对象引用会被正常编码，因为 `ProjectTask` 对象已经在图中的其他位置被无条件地编码了。当第二天项目数据模型被解档时，`ProjectMeeting`\
    \ 对其 `ProjectTask` 的引用会被恢复。\n\n通常，当对象指针是 `__weak` 引用，或者该对象是委托、父对象、所有者或容器时，有条件地编码对象是合适的。\n"
- fmt: "# 序列化中的向后兼容性与类替换\n\n## 类版本控制\n\n在顺序归档中，向后兼容性是通过类版本（class version）实现的，这种方式与\
    \ Java 有些类似。在 Java 中，每个类都会被自动分配一个类版本——这相当于该类定义的哈希码。默认情况下，Java 运行时仅当对象的版本与创建序列化数据时使用的版本完全匹配时，才会重构该对象。因此，对类的任何更改都会使其与之前版本的序列化数据不兼容。这是极其严格的限制，但非常安全。程序员可以通过为类声明一个永久的`serialVersionUID`常量来覆盖此行为。程序员有责任确保所有具有相同`serialVersionUID`的类版本是兼容的。\n\
    \nObjective-C 也使用类版本，但方式完全不同。每个类都有一个`version`属性，编码器会将该属性包含在归档中。Objective-C 并不关心你的类版本是否与正在解码的版本不同。在解码时，你的类可以查询编码器，以确定用于编码归档的类版本。你可以利用此信息，以与先前版本兼容的方式解码这些值。\n\
    \n为了使这一点有效，你必须为每个功能上不同的类版本分配一个唯一的版本号，并且在编码任何归档之前，必须设置类的`version`属性。默认情况下，每个类的版本都是`0`。清单\
    \ 12-11 展示了来自清单 12-5 的`ScheduledEvent`类的实现，已重写以提供向后兼容性。为清晰起见，已移除键归档支持。\n\n**清单\
    \ 12-11. 顺序归档中的向后兼容性**\n\n```\n+ (void)initialize\n{\n    [ScheduledEvent setVersion:1];\
    \ // 第二个版本\n}\n\n- (id)initWithCoder:(NSCoder*)decoder\n{\n    self = [super init];\n\
    \    if (self != nil) {\n        startTime = [decoder decodeObject];\n       \
    \ if ([decoder versionForClassName:@\"ScheduledEvent\"] == 1) {\n            endTime\
    \ = [decoder decodeObject];\n            timeZone = [decoder decodeObject];\n\
    \        } else {\n            NSTimeInterval duration;\n            [decoder\
    \ decodeValueOfObjCType:@encode(NSTimeInterval) at:&duration];\n            endTime\
    \ = [startTime addTimeInterval:duration];\n            timeZone = [NSTimeZone\
    \ localTimeZone];\n        }\n        [decoder decodeValueOfObjCType:@encode(unsigned\
    \ int)\n                                    at:&room.buildingNo];\n        [decoder\
    \ decodeValueOfObjCType:@encode(unsigned int)\n                              \
    \      at:&room.roomNo];\n    }\n    return self;\n}\n\n- (void)encodeWithCoder:(NSCoder*)encoder\n\
    {\n    [encoder encodeObject:startTime];\n    [encoder encodeObject:endTime];\n\
    \    [encoder encodeObject:timeZone];\n    [encoder encodeValueOfObjCType:@encode(unsigned\
    \ int) at:&room.buildingNo];\n    [encoder encodeValueOfObjCType:@encode(unsigned\
    \ int) at:&room.roomNo];\n}\n```\n\n`+initialize`类方法用于在创建该类的任何实例之前设置类的版本。更多关于`+initialize`方法的信息，请参见第\
    \ 21 章。在解码时，对象会查询编码器以发现用于创建归档的类的版本号，并相应调整其解码逻辑。\n\n每当你的类的编码方式发生变化时，你必须建立一个新的类版本，并更新解码器以处理你想要支持的所有早期格式。类版本控制无法提供前向兼容性。那将需要一台时间机器。\n\
    \n## 类替换\n\n有时，对应用程序的更改不仅仅涉及添加或重新定义成员变量。重构应用程序可能涉及重命名或完全废弃某些类。当尝试解码由应用程序早期版本编写的归档时，这会成为一个问题，因为归档中记录的类已不再存在。这个问题通常可以通过在编码或解码期间使用类替换来解决。\n\
    \n### 解码期间的类替换\n\n假设我们的日程安排应用程序已被重构，完全消除了`ScheduledEvent`类。它已被一个`AbstractEvent`类及其子类`MeetingEvent`、`ProjectEvent`和`HolidayEvent`取代。任何解码包含`ScheduledEvent`对象的归档的尝试都将失败，因为解码器无法找到要创建的`ScheduledEvent`类。有三种解决方案，而且所有方案都涉及创建一个仅用于提供向后兼容性的替身`ScheduledEvent`类。\n\
    \n第一种解决方案是实现一个外壳（shell）`ScheduledEvent`类，其中包含一个传统的`-initWithCoder:`方法。它还会像前面“重复对象”部分描述的那样，覆盖`-awakeAfterUsingCoder:`方法。在后一个方法中，将创建一个等价对象来替换原始对象。\n\
    \n一种更直接的方法借鉴了类簇（class clusters）的思想——参见第 22 章——在`-initWithCoder:`方法中直接执行对象替换，如清单\
    \ 12-12 所示。当编码器尝试初始化一个新创建的`ScheduledEvent`对象时，构造函数会销毁该临时对象，并创建一个具有正确类的新对象来替代。\n\
    \n**清单 12-12. 在解码期间替换一个类**\n\n```\n@interface ScheduledEvent : NSObject <NSCoding>\n\
    @end\n\n@implementation ScheduledEvent\n\n- (id)initWithCoder:(NSCoder*)decoder\n\
    {\n    self = [super init];\n    if (self != nil) {\n        // 读取已废弃的 ScheduledEvent\
    \ 的属性\n        NSDate *startTime = [decoder decodeObjectForKey:@\"Start\"];\n\
    \        NSTimeInterval duration = [decoder decodeDoubleForKey:@\"Duration\"];\n\
    \        RoomIdentifier room;\n        room.buildingNo = [decoder decodeInt32ForKey:@\"\
    Room.building\"];\n        room.roomNo = [decoder decodeInt32ForKey:@\"Room.number\"\
    ];\n\n        // 用等价的 MeetingEvent 对象替换它\n        id replacement = [MeetingEvent\
    \ new];\n        [replacement setStartTime:startTime];\n        [replacement setEndTime:[startTime\
    \ addTimeInterval:duration]];\n        [replacement setRoom:room];\n        self\
    \ = replacement;\n    }\n    return self;\n}\n\n- (void)encodeWithCoder:(NSCoder*)encoder\n\
    {\n    [NSException raise:NSInvalidArchiveOperationException\n               \
    \ format:@\"ScheduledEvent obsolete\"];\n}\n\n@end\n```\n\n解归档器（unarchiver）的委托对象也可以在不要求对象本身协作的情况下，执行解码时的对象替换。当对象被解码时，会向解归档器的委托对象发送一条`-unarchiver:didDecodeObject:`消息。委托可以选择返回一个与原始对象不同的对象，从而替换它。解归档器必须通过在解码任何对象之前设置其`delegate`属性来进行自定义。使用清单\
    \ 12-2 中的代码作为创建自定义解码器的模板。第 17 章详细解释了委托对象。\n\n> **注意：** 如果对象包含循环引用，解码期间的对象替换将无法可靠工作。循环引用会导致对象被递归地构造。返回给嵌套构造函数的对象引用将是部分初始化的对象，此时它尚未完成执行`-initWithCoder:`或收到`-replacementObjectForCoder:`消息。即使第一个对象已经替换了自身，第二个创建的对象仍将引用原始对象。\n\
    \n### 编码期间的类替换\n\n在其他情况下，一个类可能不希望归档自身。该类可能是某个类簇的私有子类——关于类簇的更多信息，请参见第 22 章。或者，为了与早期设计实现前向兼容性，它可能希望将其自身归档为另一个不同的类。无论出于何种原因，一个类可以选择在编码期间“假装”是另一个类，或者提供一个完全不同的对象来编码到它的位置。有三种方法可以实现编码时替换。"
  raw: 'In a sequential archive, backward compatibility is accomplished using class
    versions, somewhat similar to Java. In Java, each class is automatically assigned
    a class version—that amounts to a hash code of the class definition. By default,
    the Java runtime will only reconstruct an object if its version exactly matches
    the one used to create the serialized data. So any change to the class makes it
    incompatible with serialized data from a previous version. This is extremely limiting,
    but very safe. The programmer can override this by declaring a permanent serialVersionUID
    constant for the class. It is up to the programmer to ensure that all versions
    of the class with the same serialVersionUID are compatible.


    Objective-C uses class versions, but in an entirely different way. Every class
    has a version property that the coder includes in the archive. Objective-C does
    not care if the version of your class is different than the one being decoded.
    At decode time, your class can query the coder to determine the version of the
    class that was used to encode the archive. You can use this information to decode
    the values in a way that is compatible with your previous versions.


    For this to be effective, you must assign each functionally different version
    of the class a unique version number, and the version property of the class must
    be set before any archives are encoded. By default, the version of every class
    is 0\. Listing 12-11 shows the implementation of the ScheduledEvent class from
    Listing 12-5, rewritten to provide backward compatibility. Keyed archive support
    has been removed for clarity.


    Listin g 12-11\. Backward Compatibility in a Sequential Archive


    + (void)initialize


    {


    [ScheduledEvent setVersion:1]; // second version


    }


    - (id)initWithCoder:(NSCoder*)decoder


    {


    self = [super init];


    if (self!=nil) {


    startTime = [decoder decodeObject];


    **if ([decoder versionForClassName:@"ScheduledEvent"]==1) {**


    endTime = [decoder decodeObject];


    timeZone = [decoder decodeObject];


    } else {


    **NSTimeInterval duration;**


    **[decoder decodeValueOfObjCType:@encode(NSTimeInterval) at:&duration];** **endTime
    = [startTime addTimeInterval:duration];** **timeZone = [NSTimeZone localTimeZone];**


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 ■ SERIALIZATION


    [decoder decodeValueOfObjCType:@encode(unsigned int)


    at:&room.buildingNo];


    [decoder decodeValueOfObjCType:@encode(unsigned int)


    at:&room.roomNo];


    }


    return self;


    }


    - (void)encodeWithCoder:(NSCoder*)encoder


    {


    [encoder encodeObject:startTime];


    [encoder encodeObject:endTime];


    [encoder encodeObject:timeZone];


    [encoder encodeValueOfObjCType:@encode(unsigned int) at:&room.buildingNo];


    [encoder encodeValueOfObjCType:@encode(unsigned int) at:&room.roomNo];


    }


    The +initialize class method is used to set the version of the class before any
    instances of the class are created. See Chapter 21 for more about the +initialize
    method. At decode time, the object queries the coder to discover the version number
    of the class used to create the archive, and adjusts its decoding accordingly.


    Every time the encoding of your class changes, you must establish a new class
    version and update the decoder to handle all of the earlier formats you want to
    support. Class versioning cannot provide forward compatibility. That would require
    a time machine.


    Class Replacement


    Sometimes the changes to an application involve more than just adding or redefining
    member variables.


    Refactoring an application might involve renaming or retiring classes altogether.
    This is a problem when attempting to decode an archive written by an earlier incarnation
    of the application, because the class recorded in the archive no longer exists.
    This problem can often be solved using class substitution during encoding or decoding.


    Cl as s S u bs tit uti o n D uri n g D ec o din g


    Let’s say that our scheduling application has been refactored, completely eliminating
    the ScheduledEvent class. It has been replaced by an AbstractEvent class with
    MeetingEvent, ProjectEvent, and HolidayEvent subclasses. Any attempt to decode
    an archive containing a ScheduledEvent object will fail, because there is no ScheduledEvent
    class for the decoder to create. There are three solutions,and all of them involve
    creating a stand-in ScheduledEvent class that exists solely to provide backward
    compatibility.


    The first solution is to implement a shell ScheduledEvent class with a legacy
    -initWithCoder: method. It would also override the -awakeAfterUsingCoder: method
    as described earlier in the


    “Duplicate Objects” section. In the latter method, an equivalent object would
    be created to replace the original.


    A more direct approach takes its queue from class clusters—see Chapter 22—to perform
    an object substitution directly in the -initWithCoder: method, as shown in Listing
    12-12\. When the coder attempts to initialize a newly created ScheduledEvent object,
    the constructor destroys the temporary object and creates a new object with the
    correct class instead.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 ■ SERIALIZATION


    Listin g 12-12\. Replacing a Class During Decoding


    @interface ScheduledEvent : NSObject <NSCoding>


    @end


    @implementation ScheduledEvent


    - (id)initWithCoder:(NSCoder*)decoder


    {


    self = [super init];


    if (self != nil) {


    // read the properties of the obsolete ScheduledEvent


    NSDate *startTime = [decoder decodeObjectForKey:@"Start"]; NSTimeInterval duration
    = [decoder decodeDoubleForKey:@"Duration"]; RoomIdentifier room;


    room.buildingNo = [decoder decodeInt32ForKey:@"Room.building"]; room.roomNo =
    [decoder decodeInt32ForKey:@"Room.number"];


    // replace it with an equivalent MeetingEvent object


    id replacement = [MeetingEvent new];


    [replacement setStartTime:startTime];


    [replacement setEndTime:[startTime addTimeInterval:duration]];


    [replacement setRoom:room];


    **self = replacement;**


    }


    return self;


    }


    - (void)encodeWithCoder:(NSCoder*)encoder


    {


    [NSException raise:NSInvalidArchiveOperationException


    format:@"ScheduledEvent obsolete"];


    }


    @end


    It’s also possible for the unarchiver’s delegate object to perform decode-time
    object substitution without requiring the object’s cooperation. When an object
    is decoded, the unarchiver’s delegate object is sent an -unarchiver:didDecodeObject:
    message. The delegate may elect to return a different object than the original,
    thereby replacing it. The unarchiver must be customized by setting its delegate
    property prior to decoding any objects. Use the code in Listing 12-2 as a template
    for creating a customized decoder. Chapter 17 explains delegate objects in more
    detail.


    ■Caution Object replacement during decoding won’t work reliably if objects contain
    circular references. Circular references cause objects to be constructed recursively.
    The object reference returned to the nested constructor will be the partially
    initialized object, before it has finished executing -initWithCoder: or been sent
    the


    -replacementObjectForCoder: message. The second object created will refer to the
    original object even after the first object has replaced itself.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 ■ SERIALIZATION


    Cl as s S u bs tit uti o n D uri n g En c o din g


    In other situations, a class might not want to archive itself. The class may be
    a private subclass of a class cluster—see Chapter 22 for more about class clusters.
    Or, it might want to archive itself as though it were a different class for forward
    compatibility with earlier designs. Whatever the reason, a class can choose to
    “pretend” to be another class during encoding, or provide a completely different
    object that will be encoded in its place. There are three ways to accomplish encode-time
    substitution.'
  trans: "\n# 序列化中的向后兼容性与类替换\n\n## 类版本控制\n\n在顺序归档中，向后兼容性是通过类版本（class version）实现的，这种方式与\
    \ Java 有些类似。在 Java 中，每个类都会被自动分配一个类版本——这相当于该类定义的哈希码。默认情况下，Java 运行时仅当对象的版本与创建序列化数据时使用的版本完全匹配时，才会重构该对象。因此，对类的任何更改都会使其与之前版本的序列化数据不兼容。这是极其严格的限制，但非常安全。程序员可以通过为类声明一个永久的`serialVersionUID`常量来覆盖此行为。程序员有责任确保所有具有相同`serialVersionUID`的类版本是兼容的。\n\
    \nObjective-C 也使用类版本，但方式完全不同。每个类都有一个`version`属性，编码器会将该属性包含在归档中。Objective-C 并不关心你的类版本是否与正在解码的版本不同。在解码时，你的类可以查询编码器，以确定用于编码归档的类版本。你可以利用此信息，以与先前版本兼容的方式解码这些值。\n\
    \n为了使这一点有效，你必须为每个功能上不同的类版本分配一个唯一的版本号，并且在编码任何归档之前，必须设置类的`version`属性。默认情况下，每个类的版本都是`0`。清单\
    \ 12-11 展示了来自清单 12-5 的`ScheduledEvent`类的实现，已重写以提供向后兼容性。为清晰起见，已移除键归档支持。\n\n**清单\
    \ 12-11. 顺序归档中的向后兼容性**\n\n```\n+ (void)initialize\n{\n    [ScheduledEvent setVersion:1];\
    \ // 第二个版本\n}\n\n- (id)initWithCoder:(NSCoder*)decoder\n{\n    self = [super init];\n\
    \    if (self != nil) {\n        startTime = [decoder decodeObject];\n       \
    \ if ([decoder versionForClassName:@\"ScheduledEvent\"] == 1) {\n            endTime\
    \ = [decoder decodeObject];\n            timeZone = [decoder decodeObject];\n\
    \        } else {\n            NSTimeInterval duration;\n            [decoder\
    \ decodeValueOfObjCType:@encode(NSTimeInterval) at:&duration];\n            endTime\
    \ = [startTime addTimeInterval:duration];\n            timeZone = [NSTimeZone\
    \ localTimeZone];\n        }\n        [decoder decodeValueOfObjCType:@encode(unsigned\
    \ int)\n                                    at:&room.buildingNo];\n        [decoder\
    \ decodeValueOfObjCType:@encode(unsigned int)\n                              \
    \      at:&room.roomNo];\n    }\n    return self;\n}\n\n- (void)encodeWithCoder:(NSCoder*)encoder\n\
    {\n    [encoder encodeObject:startTime];\n    [encoder encodeObject:endTime];\n\
    \    [encoder encodeObject:timeZone];\n    [encoder encodeValueOfObjCType:@encode(unsigned\
    \ int) at:&room.buildingNo];\n    [encoder encodeValueOfObjCType:@encode(unsigned\
    \ int) at:&room.roomNo];\n}\n```\n\n`+initialize`类方法用于在创建该类的任何实例之前设置类的版本。更多关于`+initialize`方法的信息，请参见第\
    \ 21 章。在解码时，对象会查询编码器以发现用于创建归档的类的版本号，并相应调整其解码逻辑。\n\n每当你的类的编码方式发生变化时，你必须建立一个新的类版本，并更新解码器以处理你想要支持的所有早期格式。类版本控制无法提供前向兼容性。那将需要一台时间机器。\n\
    \n## 类替换\n\n有时，对应用程序的更改不仅仅涉及添加或重新定义成员变量。重构应用程序可能涉及重命名或完全废弃某些类。当尝试解码由应用程序早期版本编写的归档时，这会成为一个问题，因为归档中记录的类已不再存在。这个问题通常可以通过在编码或解码期间使用类替换来解决。\n\
    \n### 解码期间的类替换\n\n假设我们的日程安排应用程序已被重构，完全消除了`ScheduledEvent`类。它已被一个`AbstractEvent`类及其子类`MeetingEvent`、`ProjectEvent`和`HolidayEvent`取代。任何解码包含`ScheduledEvent`对象的归档的尝试都将失败，因为解码器无法找到要创建的`ScheduledEvent`类。有三种解决方案，而且所有方案都涉及创建一个仅用于提供向后兼容性的替身`ScheduledEvent`类。\n\
    \n第一种解决方案是实现一个外壳（shell）`ScheduledEvent`类，其中包含一个传统的`-initWithCoder:`方法。它还会像前面“重复对象”部分描述的那样，覆盖`-awakeAfterUsingCoder:`方法。在后一个方法中，将创建一个等价对象来替换原始对象。\n\
    \n一种更直接的方法借鉴了类簇（class clusters）的思想——参见第 22 章——在`-initWithCoder:`方法中直接执行对象替换，如清单\
    \ 12-12 所示。当编码器尝试初始化一个新创建的`ScheduledEvent`对象时，构造函数会销毁该临时对象，并创建一个具有正确类的新对象来替代。\n\
    \n**清单 12-12. 在解码期间替换一个类**\n\n```\n@interface ScheduledEvent : NSObject <NSCoding>\n\
    @end\n\n@implementation ScheduledEvent\n\n- (id)initWithCoder:(NSCoder*)decoder\n\
    {\n    self = [super init];\n    if (self != nil) {\n        // 读取已废弃的 ScheduledEvent\
    \ 的属性\n        NSDate *startTime = [decoder decodeObjectForKey:@\"Start\"];\n\
    \        NSTimeInterval duration = [decoder decodeDoubleForKey:@\"Duration\"];\n\
    \        RoomIdentifier room;\n        room.buildingNo = [decoder decodeInt32ForKey:@\"\
    Room.building\"];\n        room.roomNo = [decoder decodeInt32ForKey:@\"Room.number\"\
    ];\n\n        // 用等价的 MeetingEvent 对象替换它\n        id replacement = [MeetingEvent\
    \ new];\n        [replacement setStartTime:startTime];\n        [replacement setEndTime:[startTime\
    \ addTimeInterval:duration]];\n        [replacement setRoom:room];\n        self\
    \ = replacement;\n    }\n    return self;\n}\n\n- (void)encodeWithCoder:(NSCoder*)encoder\n\
    {\n    [NSException raise:NSInvalidArchiveOperationException\n               \
    \ format:@\"ScheduledEvent obsolete\"];\n}\n\n@end\n```\n\n解归档器（unarchiver）的委托对象也可以在不要求对象本身协作的情况下，执行解码时的对象替换。当对象被解码时，会向解归档器的委托对象发送一条`-unarchiver:didDecodeObject:`消息。委托可以选择返回一个与原始对象不同的对象，从而替换它。解归档器必须通过在解码任何对象之前设置其`delegate`属性来进行自定义。使用清单\
    \ 12-2 中的代码作为创建自定义解码器的模板。第 17 章详细解释了委托对象。\n\n> **注意：** 如果对象包含循环引用，解码期间的对象替换将无法可靠工作。循环引用会导致对象被递归地构造。返回给嵌套构造函数的对象引用将是部分初始化的对象，此时它尚未完成执行`-initWithCoder:`或收到`-replacementObjectForCoder:`消息。即使第一个对象已经替换了自身，第二个创建的对象仍将引用原始对象。\n\
    \n### 编码期间的类替换\n\n在其他情况下，一个类可能不希望归档自身。该类可能是某个类簇的私有子类——关于类簇的更多信息，请参见第 22 章。或者，为了与早期设计实现前向兼容性，它可能希望将其自身归档为另一个不同的类。无论出于何种原因，一个类可以选择在编码期间“假装”是另一个类，或者提供一个完全不同的对象来编码到它的位置。有三种方法可以实现编码时替换。"
- fmt: "# Objective-C 序列化与归档\n\n## 类编码与对象替换\n\n第一种方式是重写 `-classForCoder` 方法。在编码过程中，此消息会被发送给对象。归档中对象的类由返回值决定。基类实现返回\
    \ `[self class]`，这会使对象以其实际类进行记录。如果对象的 `-classForCoder` 方法返回不同的类，则在解码时将创建该返回类对应的对象。请注意，在\
    \ `-encodeWithCoder:` 方法中编码的数据必须与 `-classForCoder:` 返回的类兼容。\n\n`-classForCoder`\
    \ 影响所有归档类型。如果只想将类替换限制在特定归档类型，可以重写 `-classForArchiver`、`-classForKeyedArchiver`\
    \ 或 `-classForPortCoder`。如果未重写，这些方法将返回 `-classForCoder` 的值。\n\n第二种技术允许对象替换为完全不同的对象进行编码。这是通过重写\
    \ `-replacementObjectForCoder` 实现的，该方法通常返回 `self`（从而编码原始对象）。如果返回不同的对象，则编码该代理对象。`-replacementObjectForCoder:`\
    \ 会对所有归档编码执行此替换，但可以重写替代方法 `-replacementObjectForKeyedArchiver:`、`-replacementObjectForArchiver:`\
    \ 或 `-replacementObjectForPortCoder:`，以仅对特定归档类型执行替换。默认情况下，前两个方法会调用 `-replacementObjectForCoder:`。`-replacementObjectForPortCoder:`\
    \ 方法是分布式对象中的关键机制，其默认实现会将原始对象替换为远程代理对象。有关重写此方法的原因，请参见第 13 章。\n\n如果这还不够灵活，编码器的委托对象也可以通过实现\
    \ `-archiver:willEncodeObject:` 方法来执行对象替换。委托可以返回替换对象，临时执行替换，无需修改被编码的类。\n\n## Objective-C\
    \ 序列化\n\n在 Objective-C 术语中，序列化将一组数据对象转换为可传输的字节流，通常采用人类可读的格式。Objective-C 中有两种标准的序列化形式：属性列表（Property\
    \ Lists）和 XML。属性列表简单但非常方便，构成了用户默认设置（偏好设置）服务的基础。Cocoa 的 XML 支持包括常见的 DOM 和基于事件的\
    \ XML 解析与编码。Objective-C 序列化不像归档那样可以编码任意对象，属性列表仅限于属性列表对象，XML DOM 编码则仅限于 XML 文档对象模型类。\n\
    \n### 属性列表\n\n属性列表是一个或多个属性列表对象中值的文本或二进制表示。属性列表对象是那些可以编码到属性列表中的对象。表 12-3 列出了所有属性列表对象。\n\
    \n**表 12-3.** 属性列表对象\n\n| 对象类 | 描述 |\n|--------|------|\n| `NSDictionary` | 属性列表对象的键/值映射\
    \ |\n| `NSArray` | 属性列表对象的顺序列表 |\n| `NSString` | 字符串 |\n| `NSNumber` | 整数、浮点数或布尔值\
    \ |\n| `NSDate` | 日期和时间 |\n| `NSData` | 任意字节数组 |\n\n属性列表用于多种目的，如存储用户默认设置（详见第 26\
    \ 章）。它们也非常适合编码简单值的集合，以便持久化或供其他应用程序解析。通常，属性列表是一个包含属性列表对象的键/值对字典，这些对象可以包含其他数组和字典。这使得属性列表对象能够形成任意复杂的树结构，叶节点由字符串、数字、日期或不透明数据组成。实际上，任何对象都可以通过先归档对象，然后将生成的\
    \ `NSData` 对象存储在属性列表树中，来存储到属性列表中。清单 12-13 创建了一个属性列表对象树，并将其序列化为属性列表。\n\n**清单 12-13.**\
    \ 生成属性列表\n\n```\nNSArray *attendees = [NSArray arrayWithObjects:\n    @\"Randy\"\
    ,\n    @\"Joy\",\n    @\"Douglas\",\n    @\"Heather\",\n    @\"Jon\",\n    nil];\n\
    \nNSDictionary *invitation = [NSDictionary dictionaryWithObjectsAndKeys:\n   \
    \ @\"X-Prize Launch Strategy\", @\"Description\",\n    [NSDate dateWithString:@\"\
    2009-04-02 10:00:00 -0700\"], @\"StartTime\",\n    [NSNumber numberWithInt:55],\
    \ @\"Duration\",\n    attendees, @\"Attendees\",\n    @\"Room 312\", @\"Location\"\
    ,\n    nil];\n\nNSData *data = [NSPropertyListSerialization dataFromPropertyList:invitation\n\
    \    format:NSPropertyListXMLFormat_v1_0\n    errorDescription:NULL];\n```\n\n\
    `data` 现在包含以下内容：\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE\
    \ plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\"\n    \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\"\
    >\n<plist version=\"1.0\">\n<dict>\n    <key>Attendees</key>\n    <array>\n  \
    \      <string>Randy</string>\n        <string>Joy</string>\n        <string>Douglas</string>\n\
    \        <string>Heather</string>\n        <string>Jon</string>\n    </array>\n\
    \    <key>Description</key>\n    <string>X-Prize Launch Stratagy</string>\n  \
    \  <key>Duration</key>\n    <integer>55</integer>\n    <key>Location</key>\n \
    \   <string>Room 312</string>\n    <key>StartTime</key>\n    <date>2009-04-02T17:00:00Z</date>\n\
    </dict>\n</plist>\n```\n\n用于编码和解码属性列表的 Objective-C 接口是 `NSPropertyListSerialization`\
    \ 类。它提供了三个方法：\n\n- `+dataFromPropertyList:format:errorDescription:`：将对象编码为属性列表。\n\
    - `+propertyListFromData:mutabilityOption:format:errorDescription:`：解码属性列表。\n\
    - `+propertyList:isValidForFormat:`：确定数据是否包含有效的属性列表。\n\n对于所有转换，必须指定属性列表的格式。可能的格式如表\
    \ 12-4 所示。\n\n**表 12-4.** 属性列表格式\n\n| 格式 | 描述 |\n|------|------|\n| `NSPropertyListXMLFormat_v1_0`\
    \ | 属性值的 XML 表示 |\n| `NSPropertyListBinaryFormat_v1_0` | 属性值的紧凑二进制表示 |\n| `NSPropertyListOpenStepFormat`\
    \ | 已弃用的 ASCII 格式；可用于读取旧版 `.plist` 文件，但不能用于编码新的属性列表 |\n\n`NSDictionary` 和 `NSArray`\
    \ 都接受 `-writeToFile:atomically:` 或 `-writeToURL:atomically:` 消息。这会将它们的内容序列化，并将生成的\
    \ XML 属性列表写入文件或 URL。这些消息仅在集合包含属性列表对象时才能成功；任何非属性列表对象都会导致操作失败并返回 `NO`。不要将这些方法与 `NSData`\
    \ 和 `NSString` 实现的 `-writeToFile:atomically:` 和 `-writeToURL:atomically:` 混淆，后者将对象的原始内容写入文件，而非属性列表。\n\
    \n与 `-writeTo…:atomically:` 消息互补的是 `+[NSArray arrayWithContentsOfFile:]`、`+[NSArray\
    \ arrayWithContentsOfURL:]`、`+[NSDictionary dictionaryWithContentsOfFile:]` 和\
    \ `+[NSDictionary dictionaryWithContentsOfURL:]` 便捷构造器。这些方法通过解释属性列表的内容来创建新的集合。\n\
    \n默认情况下，通过解码属性列表创建的属性列表集合对象是不可变的，无论最初用于创建属性列表的对象的可变性如何。要创建可变的属性列表对象，请使用 `+[NSPropertyListSerialization\
    \ propertyListFromData:mutabilityOption:format:errorDescription:]`。"
  raw: 'The first is to override the -classForCoder method. This message is sent to
    an object during encoding. The class of the object in the archive is determined
    by the returned value. The base class implementation returns [self class], which
    causes objects to be recorded with their actual class. If an object’s -classForCoder
    method returns a different class, that’s the class that will be created when the
    object is decoded. Note that the data encoded in the -encodeWithCoder: method
    must be compatible with the class returned by -classForCoder:. -classForCoder
    affects all archive types. If you only want to limit class substitution to a particular
    archive type, override -classForArchiver,


    -classForKeyedArchiver, or -classForPortCoder instead. If not overridden, these
    methods return the value of -classForCoder.


    The second technique allows an object to substitute a completely different object
    to be encoded in its place. This is accomplished by overriding -replacementObjectForCoder,
    which normally returns self (thus encoding the original object). If it returns
    a different object, that proxy object is encoded instead. -replacementObjectForCoder:
    will perform this substitution for all archive encodings, but the alternate methods
    -replacementObjectForKeyedArchiver:, -replacementObjectForArchiver:, or


    -replacementObjectForPortCoder: can be overridden to perform replacement only
    for particular archive types. By default, the first two of these methods invoke
    -replacementObjectForCoder:. The


    -replacementObjectForPortCoder: method is a critical mechanism in distributed
    objects. Its default implementation substitutes a remote proxy object for the
    original. See Chapter 13 for the reasons you would want to override it.


    As if that wasn’t enough flexibility, the encoder’s delegate object can also perform
    object substitution by implementing an -archiver:willEncodeObject: method. The
    delegate can return a replacement object, performing substitutions ad hoc without
    the need to modify the class being encoded.


    Objective-C Serialization


    In Objective-C parlance, serialization converts a set of data objects into a transportable
    byte stream, often in a human-readable format. There are two standard forms of
    serialization in Objective-C: property lists and XML. Property lists are simplistic,
    but very convenient, and form the foundation for the user defaults (preferences)
    service. Cocoa’s XML support includes the familiar DOM and event-based XML parsing
    and encoding. Objective-C serialization does not encode arbitrary objects as archiving
    does. Property lists are limited to property-list objects, and XML DOM encoding
    is restricted to the XML document object model classes.


    Property Lists


    A property list is a text or binary representation of the values in one or more
    property-list objects.


    Property-list objects are, self referentially, those objects that can be encoded
    into a property list. Table 12-3 lists all the property-list objects.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 ■ SERIALIZATION


    ***Table 12-3.** Property-List Objects*


    O bje ct Cla ss


    Des cr ipti on


    NSDictionary


    Key/value mapping of property-list objects


    NSArray


    Sequential list of property-list objects


    NSString A


    string


    NSNumber


    An integer, floating-point, or Boolean value


    NSDate


    A date and time


    NSData Any


    arbitrary


    byte


    array


    Property lists are used for a variety of purposes. They are used to store user
    defaults, as described in Chapter 26\. They are also particularly convenient for
    encoding collections of simple values for persistence or interpretation by other
