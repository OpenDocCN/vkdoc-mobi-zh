    \n这样做是合适的，因为数组包含的是简单的字符串对象。\n\n现在，需要将数组控制器连接到它的数据模型对象。在 `MainMenu` NIB 文档中选中新创建的\
    \ Array Controller 对象，并将其 Content Array 绑定设置为 `ScrapWordsController`，模型键路径设为 `words`。键值路径\
