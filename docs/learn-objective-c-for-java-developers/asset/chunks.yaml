    # 第 21 章 ■ 懒初始化模式\n\n```\n+ (NSString*)nameOfPiece:(Piece)piece color:(Color)color\n\
    {\n    return [NSString stringWithFormat:@\"%@ %@\",\n            [ColorNames\
    \ objectAtIndex:color],\n            [PieceNames objectAtIndex:piece]];\n}\n\n\
    - (id)initWithPiece:(Piece)thePiece color:(Color)theColor\n{\n    self = [super\
    \ init];\n    if (self != nil) {\n        piece = thePiece;\n        color = theColor;\n\
    \    }\n    return self;\n}\n\n@synthesize color, piece;\n\n- (NSString*)name\n\
    {\n    return [ChessPiece nameOfPiece:piece color:color];\n}\n\n- (NSImage*)image\n\
    {\n    return [PieceImages objectForKey:[self name]];\n}\n\n@end\n```\n\n在这个更新版本中，所有全局初始化工作都在`+initialize`方法中一次性完成。可以移除所有用于检查静态变量是否已初始化的测试代码。所有代码都可以安全地假设`+initialize`已在任何其他方法（类方法或实例方法）执行之前运行完毕。额外的好处是，名称和图片缓存集合现在完全私有，只能被`ChessPiece.m`中的代码访问。\n\
    \n从外部来看，代码清单 21-2 和 21-4 所示的实现行为相同：发送`-name`消息返回棋子名称，发送`-image`消息返回棋子图片。内部唯一的显著区别在于时机。在代码清单\
    \ 21-2 中，图片数组将在首次通过`-image`消息请求时加载。在代码清单 21-4 中，图片数组将在首次使用`ChessPiece`类时创建，无论是否有代码请求图片。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 21 章 ■ 懒初始化模式\n\n使用`+initialize`方法进行类级别的懒初始化时，请牢记以下几点：\n\
    \n- 向类发送的第一条消息，或首次尝试创建类的实例，都会为该类创建类对象并向其发送`+initialize`消息。\n- `+initialize`方法每个类仅会被发送一次。但这可能会产生误导，因为\
    \ Objective-C 子类会继承其超类的类方法。因此，一个类可能会因为其子类而接收到额外的`+initialize`消息。这就是代码清单 21-4 中的`+initialize`方法会检查`PieceImages`是否已初始化的原因。如果已知`ChessPiece`没有子类，则可以省略此检查。\n\
    - 类对象在`+initialize`消息发送之前已完全初始化，因此在`+initialize`方法内部调用其他类方法或创建自身的实例是安全的。\n\n#\
    \ 总结\n\n懒初始化对于全局变量和实例变量而言都是一种有用的设计模式。它通过仅构建实际需要的信息来优化性能，并将可选和辅助计算推迟到更合适的时机。通过使用`+initialize`类方法来编程构造类运行所需的任何全局变量，可以在很大程度上克服\
    \ Objective-C 缺乏静态初始化语句的局限。"
- fmt: "[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## Chapter 22: Factory\
    \ Pattern\n\nThe factory pattern consigns the task of creating objects to another\
    \ class, called the factory. Factories take many forms. Factories can implement\
    \ convenience constructors that simplify the construction of common objects by\
    \ encapsulating repetitive or tedious preparations. They can be used to implement\
    \ singletons and reusable pools of objects. But the most significant use is deciding\
    \ the class of the new object on behalf of the client—the pattern we’ll explore\
    \ in this chapter. (A singleton factory pattern is described in Chapter 23).\n\
    \nThe factory pattern is employed when the client—the code creating the object—cannot\
    \ easily determine the class of the new object because it cannot know, or should\
    \ not know, what class to create.\n\nThere is often a choice between several closely\
    \ related subclasses, where the correct choice depends on decisions or implementation\
    \ details that are hidden from the client. In Java, this is usually implemented\
    \ using static methods or abstract factory objects. Objective-C has a powerful\
    \ pattern called a class cluster that implement the factory pattern right in the\
    \ object’s initializer.\n\n### URL Factory\n\nA good example of the factory pattern\
    \ would be a URL object factory. URL objects can be created from URI strings (i.e.,\
    \ `\"http://www.apress.com/\"`). The URL class library might define several URL\
    \ classes: a base `URL` class, along with specialized subclasses like `FileURL`,\
    \ `HTTPURL`, `SecureURL`, and so on.\n\nRequiring the client of the `URL` class\
    \ to decide which subclass to instantiate by examining the string would be a really\
    \ poor design. Instead, the base `URL` class would declare a URL object factory,\
    \ something like this:\n\n```java\npublic static URL makeURL( String uri );\n\
    ```\n\nThe static `URL.makeURL(String)` method would parse the string, determine\
    \ its protocol, and then create and return an object of the appropriate class.\
    \ The string `\"file://users/home/file.data\"` might return an instance of `FileURL`,\
    \ while the string `\"https://secure.apress.com/\"` might return an instance of\
    \ `SecureURL`. The actual subclass, and the logic used to determine what class\
    \ is created, is of little concern to the client.\n\n### Matrix Class\n\nThe characteristic\
    \ evolution of a class will be used to explore this genre of the factory pattern.\
    \ The example used is a `Matrix` class that encapsulates the concept of a mathematical\
    \ matrix and performs simple matrix operations. Listing 22-1 shows the initial\
    \ version of the class in Java and Listing 22-2 shows an equivalent implementation\
    \ in Objective-C.\n\nThe listing omits much of the minutiae of the actual implementation,\
    \ so that you can concentrate on the factory pattern. The complete implementation\
    \ is available for download at [http://www.apress.com/](http://www.apress.com/)\
    \ in the Source Code/Downloads section.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**Listing 22-1.** Initial Matrix Class in Java\n\n```java\npublic class Matrix\n\
    {\n    protected int rows;\n    protected int columns;\n    double[] values;\n\
    \n    public Matrix( double[] values, int rows, int columns )\n    {\n       \
    \ this(values,true,rows,columns);\n    }\n\n    protected Matrix( double[] values,\
    \ boolean copyValues, int rows, int columns )\n    {\n        this.rows = rows;\n\
    \        this.columns = columns;\n        if (copyValues) {\n            this.values\
    \ = new double[values.length];\n            System.arraycopy(values,0,this.values,0,rows*columns);\n\
    \        } else {\n            this.values = values;\n        }\n    }\n\n   \
    \ public int getRows()\n    {\n        return rows;\n    }\n\n    public int getColumns()\n\
    \    {\n        return columns;\n    }\n\n    public double getValue( int row,\
    \ int column )\n    {\n        return values[row*columns+column];\n    }\n```\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**Listing 22-1.** (continued)\n\
    \n```java\n    public boolean isIdentity( )\n    {\n        if (rows!=columns)\n\
    \            return false;\n        …\n        return true;\n    }\n\n    public\
    \ Matrix add( Matrix matrix )\n    {\n        double[] sumArray = new double[rows*columns];\n\
    \        …\n        return new Matrix(sumArray,false,rows,columns);\n    }\n\n\
    \    public Matrix multiply( Matrix right )\n    {\n        double[] productArray\
    \ = new double[rows*right.columns];\n        …\n        return new Matrix(productArray,false,rows,right.columns);\n\
    \    }\n\n    public Matrix multiply( double scalar )\n    {\n```"
