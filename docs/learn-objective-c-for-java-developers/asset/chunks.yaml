    Objective-C 应用程序的动态特性往往更多源于开发者采用的设计模式，而非语言本身的固有特性——尽管 Objective-C 确实让这些模式更容易被采纳。以自定义视图对象实现复制和粘贴方法为例，Cocoa\
    \ 框架定义了一个名为*响应者链*的机制。该链始于当前拥有用户焦点的视图对象，例如自定义视图对象所显示的某些选中文本或图形。这个链条由该对象、包含它的视图对象、包含该视图的窗口，以及最终包含所有窗口的单个应用程序对象组成。当用户从菜单中选择“粘贴”命令时，Cocoa\
    \ 会检查链中的对象，找到第一个实现了 `-paste:` 方法的对象。同理，菜单项本身会根据响应者链中是否存在实现了 `-paste:` 方法的对象，自动启用或禁用。这种安排不需要任何对象去“寻找”粘贴命令事件，也不用向菜单项注册自己。粘贴命令之所以生效，仅仅是因为某个对象实现了\
    \ `-paste:` 方法。\n\n但你可能会问，如果粘贴命令需要条件启用呢？很简单：你的自定义视图对象应该实现 `-validateMenuItem:`\
    \ 方法。响应者链中实现了*该方法*的对象会被查询，以确定哪些命令应为用户启用。否则，Cocoa 框架将自行决定。\n\n这里的重点不在于对象*是什么*，而在于它*做什么*。对象的能力或角色是通过检查它实现了哪些方法来确定，而不是看它属于哪个类，也不要求它向其他对象注册自己。这种哲学源于面向方面编程（AOP）。Objective-C\
    \ 开发者将这些方法称为*非正式协议*。\n\n最终结果是一个流畅的应用程序，它能够根据程序中对象的功能是否实现，自行调整并响应用户。一个对象对另一个对象所需了解的信息极少，它与其他视图对象的关系也同样简单。在\
    \ Objective-C 中，对象实现更加简单、封装性更强、假设更少，通常也更易于重用。\n\n## 开发者生产力\n\n基于上述所有原因，苹果将 Objective-C\
    \ 视为其“秘密武器”。与其他大型软件公司相比，苹果能够用更少的开发者，更快地开发出高性能、前沿的应用程序。他们公开表示 Objective-C 是其成功的关键要素之一。\n\
    \n当你开始使用 Objective-C 时，尤其是在构建 GUI 应用程序时，你会发现自己的生产效率竟能如此之高。\n\n## 学习一门新语言\n\n计算机系统和软件不断变化，计算机语言也随之演变。\n"
- fmt: '您可能会多次更换计算机编程语言。在我的职业生涯中，我已经至少更换过八次主要编程语言，期间还涉猎了十多种其他语言。


    精通一门新语言需要大量投入，因此人们自然会抵制从自己已熟悉且高效的语言迁移。然而，学习新语言的回报往往是对新机会、新技术和新市场的获取。


    `Objective-C`是苹果`Mac OS X`操作系统的首选编程语言，并且（截至撰写本文时）是为苹果`iPhone`和`iPod touch`产品开发原生应用程序的唯一语言。鉴于变化不可避免，任何能最小化向新编程语言过渡痛苦的东西都值得欢迎。这正是我写这本书的原因。


    我花了好几年才精通`Java`。又花了好几年精通`Objective-C`。直到之后，我才开始发现两者之间的惊人相似之处。这些相似之处并不存在于语言本身——`Java`和`Objective-C`就像月亮和曼哈顿一样不同。相似之处在于解决方案，即`Java`和`Objective-C`的架构师如何解决问题。


    有效的软件开发，与其说是掌握语言的语法细节（尽管这显然很重要），不如说是创造解决方案的能力。作为一名经验丰富的`Java`程序员，你已经积累了一套解决各种常见编程问题的工具箱。当你开始使用一门新语言时，你会抛弃这些技能，转而采用一套全新的工具和技术——这很讽刺，因为你往往是在解决与之前相同的问题。


    本书旨在通过提供一种“翻译服务”，让你已经理解的`Java`解决方案与`Objective-C`中的等效解决方案之间建立关联，从而减少这种痛苦。问题是一样的，你会发现解决方案的理念也惊人地相似。经常截然不同的是技术手段。


    举个例子，考虑在图形显示器上绘制字符串的方法。在大多数面向对象的语言中，实现此方法的合理位置是在绘图对象类中——即负责在图形上下文中绘制基本形状的类。在`Java`中，这个类是`java.awt.Graphics`，绘制字符串的方法是`drawString(String,int,int)`。在`Cocoa`中，基础图形上下文类是`NSGraphicsContext`。但在其中你找不到任何绘制原语。绘制字符串的方法位于`NSString`类本身。这些方法是`-drawAtPoint:withAttributes:`和`-drawInRect:withAttributes:`。


    习惯了`Java`工作方式的你，可能会有一两个疑问。你可能会想，系统的原始字符串类是如何被子类化以包含`-drawAtPoint:withAttributes:`方法的。或者，你可能想知道是哪个白痴系统架构师认为将领域特定的图形绘制原语放入基础字符串类是个好主意。答案都不是。`Objective-C`允许将任意方法附加到*其他*类上。在这种情况下，`AppKitFramework`（所有`GUI`应用程序的核心框架）将一个`-drawAtPoint:withAttributes:`方法附加到了基础字符串类上。这被称为**类别**（category），它颠覆了方法组织的常规规则。如果你曾在各种`NSGraphics`类中寻找`-drawString:AtPoint:withAttributes:`方法，你——就像我一样——会浪费数小时。最终在`NSString`类中找到它们，是我第一次接触`Objective-C`的类别，并永远改变了我对类方法组织的看法。这也改变了我查阅文档的习惯。


    但我学到的真正宝贵的一课是：`Java`和`Objective-C`仍然相似多于不同。两者都采用了**模型-视图-控制器**（Model-View-Controller）设计模式。两者都使用可视化容器对象的层次结构来组织窗口内容。每个容器都有一个`-draw`（`paint()`）方法，当需要渲染其内容时会被调用。`-draw`方法使用图形上下文对象来实际绘制线条、多边形、字符串和图像。差异源于`Java`和`Objective-C`语言的设计。`Objective-C`允许你将方法附加到其他类，而`Java`则不允许。这改变了类作者组织方法的方式，但并未改变它们的基本目的。作为一名有成就的`Java`开发者，你不需要关于图形容器的课程，也不需要解释如何或何时绘制线条。你需要知道的是：在`Java`中，字符串绘制原语位于`java.awt.Graphics`类中；而在`Cocoa`中，它们位于`NSString`类中。你还需要知道类别如何将方法附加到另一个类，以及如何实现你自己的类别。


    ## 术语与文化冲击


    如果你从`C`或`C++`世界转向`Java`，那么迁移到`Objective-C`不会是一次翻天覆地的转变。然而，如果你是一名纯粹的`Java`程序员，你会对`Objective-C`中的某些东西感到奇怪、失望、困惑甚至震惊。


    有两个主要的学习障碍。第一个是哲学。`Java`是一种高度结构化的语言，旨在生成健壮、可预测的代码。`Java`试图通过施加一系列鼓励良好编程实践的规则来保护程序员免受自身错误的影响。相比之下，`Objective-C`是一种极简主义和实用主义的语言，赋予了程序员巨大的自由和自主权。它几乎不保护你免受常见且可能具有破坏性的编程错误的影响。这种对比让我想起一个关于安全剪刀和手术刀的老笑话：你无法用安全剪刀进行手术，但之后也不必数手指。


    大量的思考、努力和学术研究都投入到设计能够“强制”你编写良好代码的语言上。个人而言，我认为这种方法有些误导。在任何语言中，草率的编程都是草率的编程。`Java`和`Objective-C`都需要开发人员具备纪律性——只是方式不同。如果你坚持一些一致的做法，可以在`Objective-C`中编写出与`Java`一样健壮和可靠的应用程序。这些做法将在每一章中重点介绍。


    第二个障碍是术语。有很多新术语需要学习。许多新术语是你已经知道的同义词。在正文中，像*协议*（protocol）（接口）这样的新术语后面会用括号括起其对应的`Java`术语。一旦你知道了“协议”是“接口”的同义词，正文将只使用“协议”这一术语。


    ## 定义“更好”


    任何对两种技术的讨论，都不可避免地会引发比较，并试图确定哪一种“更好”。我想这是人之常情。出于多种原因，我尽量在此避免此类比较。


    `Java`和`Objective-C`在某些方面是截然不同的语言。在其他方面，它们又几乎完全相同。每种语言都有其特点，使你能够编写出好的代码。每种语言也都有其局限性和缺陷，使得某些任务变得笨拙甚至不可能。出于截然不同的原因，我喜欢用这两种语言编写代码。我认为`Java`和`Objective-C`是*可比较的*语言，但我不认为任何一种在类别上更优越。


    各种“更好”的评估问题在于，它们很少具有普遍性。当有人说某物更好时，通常意味着“对我更好”或“对这个特定应用更好”。'
  raw: 'You will probably change computer-programming languages several times. I’ve
    changed my principal programming language at least eight times during my career,
    with side excursions into a dozen or more other languages along the way.


    Becoming proficient in a new language requires a significant investment, so there’s
    a natural resistance to migrate away from a language with which you are already
    comfortable and productive. Yet, the reward for learning a new language is often
    access to new opportunities, technologies, and markets.


    Objective-C is the preferred programming language for Apple’s Mac OS X operating
    system, and (as of this writing) the only language for developing native applications
    for Apple’s iPhone and iPod touch products. Given that change is inevitable, anything
    that will minimize the transition to a new programming language is welcome. That
    is the reason I wrote this book.


    It took me years to become proficient in Java. It took me years to become proficient
    in Objective-C. Only afterward did I begin to see the striking similarities between
    the two. The similarities are not found in the languages themselves–Java and Objective-C
    are as different as the Moon and Manhattan. The similarities are in the solutions;
    that is, how the architects of Java and Objective-C solve problems.


    Effective software development is less a matter of knowing the syntactical details
    of a language (although that’s clearly important), than the ability to create
    solutions. As an experienced Java 8


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 1 ■ INTRODUCTION


    programmer, you’ve accumulated a toolkit of solutions to address all kinds of
    common programming problems. When you start a new language, you abandon those
    skills for a completely new set of tools and techniques–which is ironic, since
    you’re often solving the same set of problems you were before.


    This book aims to reduce that agony by providing a kind of translation service
    between the solutions you already understand in Java and equivalent solutions
    in Objective-C. The problems are the same and you’ll discover that the philosophies
    of the solutions are remarkably similar. What’s often radically different is the
    technique.


    To give you an example, consider the method to draw a string of characters on
    a graphics display. In most object-oriented languages, the logical place to implement
    this method is in the drawing object class–the class responsible for drawing primitive
    shapes in a graphic context. In Java, the class is **java.awt.Graphics** and the
    method for drawing a string is **drawString(String,int,int)**. In Cocoa, the base
    graphics context class is **NSGraphicsContext**. But in it you won’t find any
    drawing primitives. The method to draw a string is found in the **NSString** class
    itself. The methods are **-**


    **drawAtPoint:withAttributes:** and **-drawInRect:withAttributes:**.


    Being used to working in Java, you probably have a question or two. You might
    be wondering how the system’s primitive string class was subclassed to include
    a **-drawAtPoint:withAttributes:** method. Or, you might want to know what idiot
    system architect decided it was a good idea to include something as domain specific
    as a graphic drawing primitive in the base string class. The answer is neither.
    Objective-C allows arbitrary methods to be attached to *other* classes. In this
    case, the AppKitFramework (the core framework for all GUI applications) attaches
    a **-**


    **drawAtPoint:withAttributes:** method to the base string class. It’s called a
    category, and it stands the normal rule of class method organization on its head.
    If you went looking for a **-**


    **drawString:AtPoint:withAttributes:** method in the various **NSGraphics** classes
    you would–as I did–


    waste hours of time. Eventually finding them in the **NString** class was my first
    introduction to ObjectiveC categories and forever changed my approach to class
    method organization. It also changed my habits for searching the documentation.


    But the really valuable lesson I learned was that Java and Objective-C are still
    more similar than they are different. Both embrace the Model-View-Controller design
    pattern. Both organize window contents using a hierarchy of visual container objects.
    Each container has a **-draw** (**paint()**) method that is called when its contents
    should be rendered. The **-draw** method uses a graphics context object to perform
    the actual drawing of lines, polygons, strings, and images. The differences spring
    from the design of the Java and Objective-C languages. Objective-C lets you attach
    methods to other classes while Java does not. This changes how class authors organize
    methods, but doesn’t change their basic purpose. As an accomplished Java developer,
    you don’t need a lesson in graphic containers or an explanation of how or when
    to draw lines. What you need to know is that in Java the string drawing primitives
    are found in the **java.awt.Graphics** class, and in Cocoa they’re in the **NSString**
    class. You’ll also want to know how categories attach a method to another class
    and how to implement your own.


    Terminology and Culture Shock


    If you came to Java from the C or C++ world, moving to Objective-C will not be
    an earth-shaking transition. If, however, you are exclusively a Java programmer,
    there are going to be things about Objective-C that you will find odd, disappointing,
    confusing, or even shocking.


    There are two major learning hurdles. The first is philosophy. Java is a highly
    structured language designed to produce robust, predictable code. Java tries to
    protect the programmer from herself by imposing a litany of rules that encourage
    good programming practices. In contrast, ObjectiveC is a minimalist and pragmatic
    language that affords the programmer immense freedom and liberties.


    It does little to protect you from common, and potentially disastrous, programming
    mistakes. The 9


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 1 ■ INTRODUCTION


    contrast reminds me of the old joke about safety scissors and scalpels: you can’t
    perform surgery with safety scissors, but you also don’t have to count your fingers
    afterwards.


    A lot of thought, effort, and academic research have gone into designing languages
    that


    “coerce” you into writing good code. Personally, I think this approach is somewhat
    misguided. Sloppy programming is sloppy programming in any language. Both Java
    and Objective-C require the developer to be disciplined–just in different ways.
    You can write applications in Objective-C that are every bit as robust and reliable
    as Java if you adhere to some consistent practices. These practices are highlighted
    in each chapter.


    The second hurdle is terminology. There are a lot of new terms to learn. Many
    new terms are synonyms for ones you already know. In the text, a new term like
    *protocol* (interface) will be followed by its equivalent Java term in parentheses.
    Once you know that “protocol” is synonymous with “interface,”


    the text will use the term “protocol” exclusively.


    Defining Better


    Any discussion of two technologies will inevitably lead to a comparison of the
    two and an attempt to ascertain which is “better.” I suppose this is human nature.
    I try to avoid such comparisons here for a variety of reasons.


    Java and Objective-C are, in some respects, radically different languages. In
    other respects, they are virtually identical. Each has features that allow you
    to produce good code. Each also has limitations and flaws that make some tasks
    awkward or even impossible. I enjoy writing in both for very different reasons.
    I consider Java and Objective-C *comparable* languages, but I don’t consider either
    to be categorically superior.


    The problem with various “better” assessments is that they are rarely universal.
    When someone states that something is better, it typically means “better for me”
    or “better for this particular application.”'
