    **C H A P T E R 2 2**


    ■ ■ ■


    Factory Pattern


    The factory pattern consigns the task of creating objects to another class, called
    the factory. Factories take many forms. Factories can implement convenience constructors
    that simplify the construction of common objects by encapsulating repetitive or
    tedious preparations. They can be used to implement singletons and reusable pools
    of objects. But the most significant use is deciding the class of the new object
    on behalf of the client—the pattern we’ll explore in this chapter. (A singleton
    factory pattern is described in Chapter 23).


    The factory pattern is employed when the client—the code creating the object—cannot
    easily determine the class of the new object because it cannot know, or should
    not know, what class to create.


    There is often a choice between several closely related subclasses, where the
    correct choice depends on decisions or implementation details that are hidden
    from the client. In Java, this is usually implemented using static methods or
    abstract factory objects. Objective-C has a powerful pattern called a class cluster
    that implement the factory pattern right in the object’s initializer.


    URL Factory


    A good example of the factory pattern would be a URL object factory. URL objects
    can be created from URI strings (i.e., "http://www.apress.com/"). The URL class
    library might define several URL classes: a base URL class, along with specialized
    subclasses like FileURL, HTTPURL, SecureURL, and so on.


    Requiring the client of the URL class to decide which subclass to instantiate
    by examining the string would be a really poor design. Instead, the base URL class
    would declare a URL object factory, something like this:


    public static URL makeURL( String uri );


    The static URL.makeURL(String) method would parse the string, determine its protocol,
    and then create and return an object of the appropriate class. The string "file://users/home/file.data"


    might return an instance of FileURL, while the string "https://secure.apress.com/"
    might return an instance of SecureURL. The actual subclass, and the logic used
    to determine what class is created, is of little concern to the client.


    Matrix Class


    The characteristic evolution of a class will be used to explore this genre of
    the factory pattern. The example used is a Matrix class that encapsulates the
    concept of a mathematical matrix and performs simple matrix operations. Listing
    22-1 shows the initial version of the class in Java and Listing 22-2


    shows an equivalent implementation in Objective-C.


    The listing omits much of the minutiae of the actual implementation, so that you
    can concentrate on the factory pattern. The complete implementation is available
    for download at http://www.apress.com/ in the Source Code/Downloads section.


