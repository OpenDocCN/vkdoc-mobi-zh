    Table 11-12 lists only a tiny fraction of the functions implemented in the Core
    Services framework. There are many variations of the functions listed, and hundreds
    of others. Core Services provides functions to get and set volume information,
    mount and eject volumes, receive file system notifications, track changes in real
    time, record optical media, and perform operations on remote volumes—just to name
    a few. Your best resource for these specialized functions is the Mac OS X


    documentation.


    Underneath all of these frameworks are the core BSD functions that implement the
    underlying file system. These are the traditional open(…), read(…), write(…),
    close(…) functions that have been around since the origin of UNIX. Entire books
    have been written about this API, they are amply documented, and there are numerous
    on-line tutorials and resources—so I won’t bother going into details. If you have
    an NSFileHandle object and need to apply a BSD function to the underlying file,
    send it the -fileDescriptor message. The integer returned is the BSD file descriptor
    token used to identify the open file. If you already have a BSD file descriptor,
    you can wrap it in an NSFileHandle using


