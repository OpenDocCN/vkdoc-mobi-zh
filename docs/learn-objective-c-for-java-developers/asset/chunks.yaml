    processes are often limited or can be tightly controlled. For example, a client
    application might launch a helper process and communicate with it using distributed
    objects. The helper executable is part of the application’s resource bundle, so
    is guaranteed to contain the same version of the classes being used by the client—making
    data compatibility immaterial.


    Documentation for Objective-C archiving will repeat, ad nauseam, that sequential
    archiving is deprecated and you should implement keyed archiving instead. That
    is true for data model objects that you intend to store in document files, preferences,
    or other persistent locations. However, distributed objects uses sequential archiving.
    To use your objects in a distributed environment, your classes must implement
    sequential archiving, and understanding distributed objects requires a firm grasp
    of archiving. This chapter will explain how to implement both. The features that
    distinguish distributed objects from plain sequential archiving are described
    in Chapter 13.


    Archive Coders


    Using the archive coder classes to encode and decode objects isn’t all that much
    different than it is in Java. Listing 12-1 shows how to archive (serialized) and
    unarchive a single object in both Java and Objective-C.


    Listin g 12-1\. Archiving and Unarchiving an Object


    **Java**


    Object something = …


    ByteArrayOutputStream outStream = null;


    ObjectOutputStream objectEncoder = null;


    try {


    outStream = new ByteArrayOutputStream();


    objectEncoder = new ObjectOutputStream(outStream);


    objectEncoder.writeObject(something);


    objectEncoder.close();


    }


    catch (IOException ioException) {


    ioException.printStackTrace();


    }


