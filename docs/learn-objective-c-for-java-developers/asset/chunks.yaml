  trans: "\n# `ChessPiece` 类与惰性初始化\n\n`ChessPiece` 类（如代码清单 21-1 和 21-2 所示）通过定义两个类属性\
    \ `+[ChessPiece colorNames]` 和 `+[ChessPiece pieceNames]` 来实现这一点。这两个属性返回一个不可变的字符串集合，可用于将颜色或棋子枚举（`int`）转换为字符串。它们在首次被请求时，采用**惰性初始化**来创建并保存这些不可变数组。\n\
    \n## 代码清单 21-1：`ChessPiece.h`\n\n```objective-c\n#import <Cocoa/Cocoa.h>\n\ntypedef\
    \ enum {\n    White=0,\n    Black\n} Color;\n\ntypedef enum {\n    Pawn=0,\n \
    \   Rook,\n    Bishop,\n    Knight,\n    Queen,\n    King\n} Piece;\n\n@interface\
    \ ChessPiece : NSObject {\n    Color color;\n    Piece piece;\n}\n\n+ (NSArray*)colorNames;\n\
    + (NSArray*)pieceNames;\n+ (NSDictionary*)images;\n+ (NSString*)nameOfPiece:(Piece)piece\
    \ color:(Color)color;\n\n- (id)initWithPiece:(Piece)thePiece color:(Color)theColor;\n\
    \n@property (readonly) Color color;\n@property (readonly) Piece piece;\n@property\
    \ (readonly) NSString *name;\n@property (readonly) NSImage *image;\n\n@end\n```\n\
    \n## 代码清单 21-2：`ChessPiece.m`\n\n```objective-c\n#import \"ChessPiece.h\"\n\n\
    static NSArray *ColorNames;\nstatic NSArray *PieceNames;\nstatic NSDictionary\
    \ *PieceImages;\n\n@implementation ChessPiece\n\n+ (NSArray*)colorNames\n{\n \
    \   if (ColorNames==nil) {\n        ColorNames = [NSArray arrayWithObjects:\n\
    \                      @\"White\",\n                      @\"Black\",\n      \
    \                nil];\n    }\n    return ColorNames;\n}\n\n+ (NSArray*)pieceNames\n\
    {\n    if (PieceNames==nil) {\n        PieceNames = [NSArray arrayWithObjects:\n\
    \                      @\"Pawn\",\n                      @\"Rook\",\n        \
    \              @\"Bishop\",\n                      @\"Knight\",\n            \
    \          @\"Queen\",\n                      @\"King\",\n                   \
    \   nil];\n    }\n    return PieceNames;\n}\n\n+ (NSDictionary*)images\n{\n  \
    \  if (PieceImages==nil) {\n        // 加载整组棋子图片\n        NSMutableDictionary *images\
    \ = [NSMutableDictionary new];\n        Color color;\n        Piece piece;\n \
    \       for (color=White; color<=Black; color++) {\n            for (piece=Pawn;\
    \ piece<=King; piece++) {\n                NSString *name = [ChessPiece nameOfPiece:piece\
    \ color:color];\n                [images setObject:[NSImage imageNamed:name] forKey:name];\n\
    \            }\n        }\n        PieceImages = [NSDictionary dictionaryWithDictionary:images];\n\
    \    }\n    return PieceImages;\n}\n\n+ (NSString*)nameOfPiece:(Piece)piece color:(Color)color\n\
    {\n    return [NSString stringWithFormat:@\"%@ %@\",\n            [[ChessPiece\
    \ colorNames] objectAtIndex:color],\n            [[ChessPiece pieceNames] objectAtIndex:piece]];\n\
    }\n\n- (id)initWithPiece:(Piece)thePiece color:(Color)theColor\n{\n    self =\
    \ [super init];\n    if (self != nil) {\n        piece = thePiece;\n        color\
    \ = theColor;\n    }\n    return self;\n}\n\n@synthesize color, piece;\n\n- (NSString*)name\n\
    {\n    return [ChessPiece nameOfPiece:piece color:color];\n}\n\n- (NSImage*)image\n\
    {\n    return [[ChessPiece images] objectForKey:[self name]];\n}\n\n@end\n```\n\
    \n它还定义了一个类属性 `+[ChessPiece images]`，其中包含所有棋子的图像。该属性在 `ChessPiece` 对象首次尝试获取其图形表示时进行惰性初始化。这是一个耗时且资源密集的初始化过程，并且需要应用程序完全初始化并正常运行，因为它依赖于在其应用包中查找图像资源文件。\n\
    \n## 类的 `+initialize` 方法\n\nObjective-C 类本身也是惰性初始化的。定义类的结构直到第一条消息发送给该类时才构建。这使得运行时更加敏捷，能够以最少的初始化量启动。但\
    \ Objective-C 更进一步：在初始化 `Class` 对象之后、发送任何其他消息之前，运行时会向新创建的 `Class` 对象发送一条单独的 `+initialize`\
    \ 消息。你可以重写此方法以执行额外的类级别初始化。\n\n通过利用 `+initialize` 消息，`ChessPiece` 类可以显著简化，如代码清单\
    \ 21-3 和 21-4 所示。\n\n## 代码清单 21-3：使用 `+initialize` 的 `ChessPiece.h`\n\n```objective-c\n\
    #import <Cocoa/Cocoa.h>\n\ntypedef enum {\n    White=0,\n    Black\n} Color;\n\
    \ntypedef enum {\n    Pawn=0,\n    Rook,\n    Bishop,\n    Knight,\n    Queen,\n\
    \    King\n} Piece;\n\n@interface ChessPiece : NSObject {\n    Color color;\n\
    \    Piece piece;\n}\n\n+ (NSString*)nameOfPiece:(Piece)piece color:(Color)color;\n\
    ```\n"
- fmt: "- (id)initWithPiece:(Piece)thePiece color:(Color)theColor; 407\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# CHAPTER 21 ■ LAZY INITIALIZATION PATTERN\n\n@property (readonly) Color color;\n\
    \n@property (readonly) Piece piece;\n\n@property (readonly) NSString *name;\n\n\
    @property (readonly) NSImage *image;\n\n@end\n\nListing 21-4. ChessPiece.m Using\
    \ +initialize\n\n```\n#import \"ChessPiece.h\"\n\nstatic NSArray *ColorNames;\n\
    static NSArray *PieceNames;\nstatic NSDictionary *PieceImages;\n\n@implementation\
    \ ChessPiece\n\n+ (void)initialize\n{\n    if (PieceImages==nil) {\n        ColorNames\
    \ = [NSArray arrayWithObjects:\n                      @\"White\",\n          \
    \            @\"Black\",\n                      nil];\n        PieceNames = [NSArray\
    \ arrayWithObjects:\n                      @\"Pawn\",\n                      @\"\
    Rook\",\n                      @\"Bishop\",\n                      @\"Knight\"\
    ,\n                      @\"Queen\",\n                      @\"King\",\n     \
    \                 nil];\n        // Load the entire set of playing piece images\n\
    \        NSMutableDictionary *images = [NSMutableDictionary dictionary];\n   \
    \     Color color;\n        Piece piece;\n        for (color=White; color<=Black;\
    \ color++) {\n            for (piece=Pawn; piece<=King; piece++) {\n         \
    \       NSString *name = [ChessPiece nameOfPiece:piece color:color];\n       \
    \         [images setObject:[NSImage imageNamed:name] forKey:name];\n        \
    \    }\n        }\n        PieceImages = [NSDictionary dictionaryWithDictionary:images];\n\
    \    }\n}\n\n@end\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    # CHAPTER 21 ■ LAZY INITIALIZATION PATTERN\n\n```\n+ (NSString*)nameOfPiece:(Piece)piece\
    \ color:(Color)color\n{\n    return [NSString stringWithFormat:@\"%@ %@\",\n \
    \           [ColorNames objectAtIndex:color],\n            [PieceNames objectAtIndex:piece]];\n\
    }\n\n- (id)initWithPiece:(Piece)thePiece color:(Color)theColor\n{\n    self =\
    \ [super init];\n    if (self != nil) {\n        piece = thePiece;\n        color\
    \ = theColor;\n    }\n    return self;\n}\n\n@synthesize color, piece;\n\n- (NSString*)name\n\
    {\n    return [ChessPiece nameOfPiece:piece color:color];\n}\n\n- (NSImage*)image\n\
    {\n    return [PieceImages objectForKey:[self name]];\n}\n\n@end\n```\n\nIn this\
    \ updated version, all of the global initialization is performed once in the `+initialize`\
    \ method. All tests to check if the static variables have been initialized can\
    \ be removed. All code can safely assume that `+initialize` has executed before\
    \ any other method (class or instance) is executed. As an added bonus, the name\
    \ and image cache collections are now completely private, accessible only to the\
    \ code in `ChessPiece.m`.\n\nExternally, the implementations shown in Listings\
    \ 21-2 and 21-4 behave the same: a `-name` message returns the name of the chess\
    \ piece, and an `-image` message returns its image. Internally the only significant\
    \ difference is the timing. In Listing 21-2, the array of images will be loaded\
    \ the first time an `-image` message requests it. In Listing 21-4, the array of\
    \ images will be created the first time the `ChessPiece` class is used, regardless\
    \ of whether any code ever requests an image.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# CHAPTER 21 ■ LAZY INITIALIZATION PATTERN\n\nWhen using the `+initialize` method\
    \ to perform class-level lazy initialization, keep these points in mind:\n\n-\
    \ The first message sent to a class, or the first attempt to create an instance\
    \ of a class, creates the Class object for that class and sends it an `+initialize`\
    \ message.\n- The `+initialize` method is only sent once per class. That can be\
    \ deceiving, however, because Objective-C subclasses inherit the class methods\
    \ of their superclass. So a class may receive additional `+initialize` messages\
    \ for its subclasses. This is why the `+initialize` method in Listing 21-4 tests\
    \ to see if `PieceImages` has already been initialized. This test could be omitted\
    \ if it was known that `ChessPiece` had no subclasses.\n- The Class object is\
    \ completely initialized before the `+initialize` message is sent, so it’s safe\
    \ to call other class methods or create instances of itself from within the `+initialize`\
    \ method.\n\n# Summary\n\nLazy initialization is a useful design pattern for both\
    \ global and instance variables. It optimizes performance by constructing only\
    \ the information that’s actually needed, and defers optional and ancillary calculations\
    \ to a more appropriate time. Objective-C’s lack of static initialization statements\
    \ can be largely overcome by employing the `+initialize` class method to programmatically\
    \ construct any global variables the class needs to function."
