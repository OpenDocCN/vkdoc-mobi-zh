    \        } catch ( SpecificException se ) {\n            System.out.println(\"\
    caught SpecificException: \"+se);\n        } catch ( Exception e ) {\n       \
    \     System.out.println(\"caught Exception: \"+e);\n            throw e;\n  \
    \      } finally {\n            System.out.println(\"Tosser.catcher(): finished\"\
    );\n        }\n    }\n\n    public void thrower( ) throws Exception\n    {\n \
    \       throw new Exception(\"thrower() does not work\");\n    }\n}\n```\n\n**Objective-C**\n\
    \n```\n@interface Tosser : NSObject\n- (void)catcher;\n- (void)thrower;\n@end\n\
    \n@implementation Tosser\n- (void)catcher\n{\n    @try {\n        NSLog(@\"%s\
    \ trying\",__func__);\n        [self thrower];\n    } @catch ( SpecificException\
    \ *se ) {\n        NSLog(@\"caught SpecificException: %@\",se);\n    } @catch\
    \ ( NSException *e ) {\n        NSLog(@\"caught NSException: %@\",e);\n      \
    \  @throw e;\n    } @finally {\n        NSLog(@\"%s finished\",__func__);\n  \
    \  }\n}\n\n- (void)thrower\n{\n    @throw [NSException exceptionWithName:@\"MyException\"\
    \n                                  reason:@\"-thrower does not work\"\n     \
    \                           userInfo:nil];\n}\n@end\n```\n\n两者的相似之处远比差异更为显著。具体来说，`@try`、`@catch`和`@finally`块与\
    \ Java 中的`try`、`catch`和`finally`块具有相同的语法、顺序和执行流程。你可以像使用 Java 的`throw`语句一样，使用 Objective-C\
    \ 的`@throw`指令抛出异常对象。捕获的异常可以以相同方式进行处理或重新抛出。\n\n如果你希望像在 Java 中那样在 Objective-C 中使用异常，完全可以。Objective-C\
    \ 异常的能力与 Java 非常接近，你很可能不会注意到任何显著差异。然而，确实存在一些差异——主要在于 Objective-C 允许而你 Java 不允许的操作。下一节将详细解释这些差异以及它们可能对你的设计产生的影响。\n\
    \n## 异常处理差异\n\nObjective-C 对异常的处理比 Java 宽松得多。有人可能会认为它过于宽松，但这属于学术讨论。Java 与 Objective-C\
