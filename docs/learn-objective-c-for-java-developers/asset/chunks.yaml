    Managing Threads


    The best advice for managing threads is “don’t.” Threads do not respond well to
    being micro-managed, and it makes your code fragile and less portable. Above all,
    do not try to second guess the kernel’s thread scheduler or try to coerce it into
    a particular behavior. As kernel thread scheduling has become more sophisticated,
    the number of application programmer interfaces for manipulating running threads
    has decreased. For example, Objective-C has no yield() equivalent, and the java.lang.Thread
    methods stop(), suspend(), and resume() have all been deprecated.


