  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，对给定的英文文本进行专业、准确的中文翻译。



    # 第 26 章：运行时


    Java 提供了一个获取属性的接口。这些属性类似于环境变量，但可以由类、虚拟机以及属性列表文件等来源提供。大多数动态的 Java 属性，例如当前工作目录，在
    Objective-C 中是通过函数调用或对象消息获得的。用于存储默认值和用户偏好的属性在 Objective-C 中称为用户默认设置，本章后面将介绍一个用于处理它们的特定接口。


    `表 25-1`列出了 Java 提供的几个更有趣的进程属性，以及如何在 Objective-C 中找到它们。


    **表 25-1.** 进程属性


    | Java 属性 | Objective-C |

    |---|---|

    | `os.name` | `-[NSProcessInfo operatingSystemName]` |

    | `os.arch` | 不适用 |

    | `os.version` | `-[NSProcessInfo operatingSystemVersionString]` |

    | `user.name` | `NSUserName()` |

    | `user.home` | `NSHomeDirectory()` |

    | `user.dir` | `-[NSFileManager currentDirectoryPath]` |


    `"os.arch"` 属性在 Objective-C 中不适用，因为它是一种编译型语言。在特定处理器上执行的代码必须为该架构编译。存储可执行程序的二进制文件通常包含应用程序的多个版本，每个支持的架构对应一个。Xcode
    会自动为每个架构重新编译你的应用程序，然后将它们合并到一个可执行文件中。架构相关的特性，如指针大小和字节序，可以在编译时确定。你可以使用预处理器 `#if`
    指令来编译特定于某个处理器或架构的代码。


    `NSProcessInfo` 还提供有关进程、操作系统和硬件的其他有用信息。它会报告物理 RAM 的大小和 CPU 核心数量等信息。


    更精细的细节可以通过像 `sysctl(...)` 这样的 POSIX 函数获得。


    ## 版本控制


    创建与框架或操作系统的多个版本兼容的应用程序可能是一项棘手的工作。Cocoa 框架提供了许多版本控制和兼容性特性，使这变得更容易，或者至少是可管理的。


    ### 控制开发与部署版本


    应用程序项目的 Xcode 构建设置包含两个重要的设置：


    - **基础 SDK (`SDKROOT`)** 定义了用于编译程序的头文件和框架的版本。

    - **部署目标 (`MACOSX_DEPLOYMENT_TARGET`)** 定义了允许你的应用程序运行的最早操作系统版本。


    基础 SDK 选择了一组源头文件和库，你的应用程序将与之编译和链接。每个操作系统版本都定义了一组新的类、常量和数据类型。通过指定一个特定的基础 SDK，你将自己的代码限制在该
    SDK 发布时可用的 API 上。你的应用程序不能使用新的类、方法或函数，因为（至少对编译器而言）这些函数不存在，你的代码将无法编译。


    部署目标仅适用于 GUI 应用程序。它决定了允许你的应用程序启动的最早（最旧）操作系统版本。此构建设置的值存储在应用程序的包中，并在启动时由操作系统进行测试。


    ### 测试类、方法和函数


    综合来看，上述两个构建设置定义了一个你的应用程序可以运行的操作系统版本范围。这称为跨版本开发。在这个范围内，较新的操作系统将实现一些早期系统没有的特定函数、类和方法。要使用其中任何一个，你的代码必须在运行时测试它们是否存在：


    - 通过调用 `NSClassFromString()` 并检查结果是否为 `Nil` 来测试类的存在性。

    - 使用 `-respondsToSelector:` 测试方法的存在性。

    - 通过将函数指针与 `NULL` 进行比较来测试函数的存在性。


    前两种技术使用了 Objective-C 的内省机制。最后一种测试适用于 C 函数，并通过一个称为弱链接的特性工作。弱链接是对一个符号的引用，该符号被假定为由操作系统定义。如果在加载应用程序时该符号实际上不存在，则该引用被设置为
    `NULL`。与强链接相反，弱链接的引用不会阻止你的应用程序加载。你可以在运行时测试符号是否存在，如下所示：


    ```

    if (NSDisableScreenUpdates != NULL) { NSDisableScreenUpdates(); }

    ```


    请记住，C 函数本身的名称（不带任何括号）会计算为该函数入口点的地址。关于跨版本开发设置和技术的完整描述，请参见《跨版本开发编程指南》。¹


    ## 软件包和捆绑包


    **软件包** 是相关文件的集合。从用户的角度来看，软件包就像一个单一的文件系统对象：一个应用程序、一个文档或一个插件组件。实际上，软件包是一个可以包含任意数量文件或子目录的目录。软件包的使用方式与
    JAR 文件非常相似——用于组织一组相关文件并将它们保持在一起——区别在于在 Mac OS X 中，软件包的内容没有被压缩或归档。


    > **提示：** 你可以直接从 Finder 浏览软件包的内容。选择一个软件包，然后 Control/右键单击该项目。在上下文弹出菜单中选择 **显示包内容**。


    **捆绑包** 是一种具有预定义结构的软件包。Cocoa 应用程序、浏览器插件、自动操作、框架和 Core Image 滤镜只是操作系统定义的几种捆绑包类型。这些捆绑包类型中的任何一种都可以包含任意数量的支持文件：NIB
    文件、字符串属性、图像、声音、电影、HTML 文档、脚本、可执行实用程序，甚至其他捆绑包。你的捆绑包中包含哪些额外文件完全由你决定。


    你可以使用 `NSBundle` 类来访问捆绑包并与之交互。基本的捆绑包功能及其组织方式已在第 20 章讨论过。要了解更多关于捆绑包的信息，请参考 `NSBundle`
    类文档和《捆绑包编程指南》。²


    并非所有程序类型都包含在捆绑包中。例如，命令行工具生成一个单一的可执行文件。额外的资源文件不能打包在命令行工具中。


    ## 框架


    捆绑包的一种类型是**框架**。框架包含可供多个应用程序共享的编程资源的部署。一个框架可以包含共享库、Objective-C 类、图像、声音、NIB 文件和其他资源。在这方面，框架大致相当于用于部署
    Java 类文件、属性文件和其他资源库的 JAR 文件。它们可以包含以下任意或全部内容：


    - 已编译函数和类的共享库

    - 定义框架 API 接口的头文件

    - 文档

    - 任意资源：NIB 文件、图像、本地化字符串、脚本、帮助文件等。


    ---


    ¹ Apple Inc., *跨版本开发编程指南*, [`developer.apple.com/documentation/DeveloperTools/Conceptual/cross_development/`](http://developer.apple.com/documentation/DeveloperTools/Conceptual/cross_development/),
    2006。


    ² Apple Inc., *捆绑包编程指南*, [`developer.apple.com/documentation/CoreFoundation/Conceptual/CFBundles/`](http://developer.apple.com/documentation/CoreFoundation/Conceptual/CFBundles/),
    2005。

