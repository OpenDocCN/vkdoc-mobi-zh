- fmt: "Value Transformer: 选择你希望用于在两个对象间转换属性值的转换器对象。\n\nNull Placeholder: 选择当绑定属性为`nil`时，绑定所使用的对象。\n\
    \nOwner Object\n\n加载NIB文档与解档对象图有一个细微差别。当你解档对象图时，会得到全新的对象，这些对象通常连接到一个返回给发送方的根对象上。当你加载NIB文档时，你会传入一个已有的单一对象，该对象成为NIB的拥有者（owner）。拥有者本质上是NIB文档对象图的根，但它存在于NIB加载之前。\n\
    \nNIB的拥有者对象在NIB文档中表示为文件拥有者（File’s Owner）占位符对象。NIB中的所有对象都应直接或间接连接到文件拥有者，以便能够被访问。\n\
    \n在程序初始化期间加载主NIB文件时，拥有者是单一的`NSApplication`对象。当文档控制器加载NIB以创建文档窗口时，拥有者是负责该界面的`NSDocument`对象。当你通过编程方式加载NIB文件时，可以指定任何你想要的拥有者对象，只需确保它与NIB文档中定义的文件拥有者类一致。\n\
    \n在TicTacToe示例中（见代码清单20-1与图20-6），NIB包含一个`ChalkboardView`实例，该实例连接到拥有者的`chalkboardView`属性。由于这是一个文档NIB，`TTTDocument`是NIB的拥有者。加载后，其`chalkboardView`属性被设置为新创建的`ChalkboardView`对象。\n\
    \nCustom Objects\n\nTicTacToe项目中的NIB文档实例化了两个我创建的类：`TTTDocument`和`ChalkboardView`。这是通过创建或选择Interface\
    \ Builder已理解的通用对象，然后在标识检查器中更改其类来实现的，如图20-9所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](index-384_1.png)\n\n**图20-9.** 更改NIB对象的类  \n\n对于`TTTDocument`，我首先在Xcode中通过继承`NSDocument`创建了`TTTDocument`子类。在Interface\
    \ Builder中，我在`TTTDocument` NIB文档中选择了已有的文件拥有者实例，并将其类改为`TTTDocument`。Interface Builder现在将文件拥有者对象视为`TTTDocument`的实例。Interface\
    \ Builder理解继承关系：`TTTDocument`继承了`NSDocument`的所有属性、输出口和行为。\n\n为了创建`ChalkboardView`对象，我首先在Xcode中创建了`ChalkboardView`类（继承自`NSView`）。在Interface\
    \ Builder中，我将一个自定义视图（Custom View）对象从库拖到窗口中，然后将其类从`NSView`改为`ChalkboardView`。该对象继承了基类`NSView`的所有属性。也就是说，Interface\
    \ Builder知道它是一个具有位置、大小、可见性、子视图等属性的视图对象。\n\n你可以通过将通用对象（Object）从库拖到NIB中，然后将其类改为任意类，来创建任意的类实例。`Object`只继承了`NSObject`的基本属性——也就是说几乎没有任何属性。一旦添加，该对象可以连接到任何合适的输出口。\n\
    \nInterface Builder不会自动提供对你自定义类属性的编辑功能，但会识别你定义的输出口和动作。如果你希望设计的自定义类出现在Interface\
    \ Builder的库面板中，并使其属性可通过属性面板编辑，你可以创建一个Interface Builder插件。这是一个较为复杂的过程，但如果你感兴趣，可以参考《Interface\
    \ Builder Plug-in Programming Guide》2。\n\n2 Apple Inc., *Interface Builder Plug-in\
    \ Programming Guide*, [http://developer.apple.com/documentation/DeveloperTools/Conceptual/IBPlugInGuide/](http://developer.apple.com/documentation/DeveloperTools/Conceptual/IBPlugInGuide/),\
    \ 2007.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)"
  raw: 'Value Transformer: Choose the transformer object you want to use to convert
    property values between the two objects.


    Null Placeholder: Choose the object you want the binding to use when the bound
    property is nil.


    Owner Object


    Loading a NIB document differs from unarchiving a graph of objects in one minor
    respect. When you unarchive a graph of objects you get all new objects, typically
    connected to a single root object returned to the sender. When you load a NIB
    document, you pass in a single existing object that becomes the NIB’s owner. The
    owner object is essentially the root of the NIB document’s object graph, but it
    exists before the NIB is loaded.


    The NIB’s owner object is represented in the NIB document as the File’s Owner
    placeholder object. All of the objects in your NIB should connect directly, or
    indirectly, to the File’s Owner in order to be accessible.


    When the main NIB file is loaded during program initialization, the owner is the
    single NSApplication object. When the document controller loads a NIB to create
    a document window, the owner is the NSDocument object that will own that interface.
    When you programmatically load a NIB


    file, you can specify whatever owner object you want, just make sure it agrees
    with the class of the File’s Owner defined in the NIB document.


    In the TicTacToe example, shown in Listing 20-1 and Figure 20-6, the NIB contains
    an instance of ChalkboardView connected to the chalkboardView property of the
    owner. Since this is a document NIB, TTTDocument is the NIB’s owner. When loaded,
    its chalkboardView property is set to the newly created ChalkboardView object.


    Custom Objects


    The NIB document in the TicTacToe project instantiates two classes that I created:
    TTTDocument and ChalkboardView. This is accomplished by creating or selecting
    a generic object that Interface Builder already understands, and then altering
    its class in the Identity Inspector, as shown in Figure 20-9.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-384_1.png)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    ***Figure 20-9.** Changing the class of a NIB object* In the case of TTTDocument,
    I started in Xcode by subclassing NSDocument to create TTTDocument. In Interface
    Builder, I chose the existing File’s Owner instance in the TTTDocument NIB


    document and changed its class to TTTDocument. Interface Builder now treats the
    File’s Owner object as an instance of TTTDocument. Interface Builder understands
    inheritance; TTTDocument inherits all of the attributes, outlets, and behavior
    of NSDocument.


    To create the ChalkboardView object, I first created a ChalkboardView class (a
    subclass of NSView) in Xcode. In Interface Builder, I dragged a Custom View object
    from the Library into the window, and then changed its class from NSView to ChalkboardView.
    The object inherits all of the base class NSView attributes. That is, Interface
    Builder understands that it’s a view object that has a position, size, visibility,
    subviews, and so on.


    You create arbitrary class instances by dragging a generic Object from the Library
    into the NIB


    and then changing its class to whatever you want. Object inherits only the basic
    properties of NSObject—which is to say almost nothing. Once added, the object
    can be connected to any appropriate outlet.


    Interface Builder will not automatically provide editing of your class’s custom
    properties, but it will recognize outlets and actions that you’ve defined. If
    you design a custom class that you’d like to have appear in Interface Builder’s
    Library palette, with properties that are editable using the Attributes palette,
    you can create an Interface Builder plug-in. That’s a somewhat involved process,
    but if you’re interested, refer to the Interface Builder Plug-in Programming Guide.2


    2 Apple Inc., Interface Builder Plug-in Programming Guide, http://developer.apple.com/documentation/


    DeveloperTools/Conceptual/IBPlugInGuide/, 2007.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


