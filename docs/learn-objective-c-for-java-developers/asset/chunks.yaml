    \n命令行参数域是最高层级的域，其中填充了进程启动时命令行中包含的参数值。通常没有命令行参数，但您可以在开发过程中通过编辑应用程序可执行文件的启动参数来包含它们。命令行参数值的形式是\
    \ `-key value`。\n\n使用参数 `-ZombieNightVision NO` 启动应用程序，会在参数域中创建键/值对 `ZombieNightVision=\"\
    NO\"`。\n\n应用程序域用于存储应用的用户偏好设置。这是一个持久性域。也就是说，在此设置的值会自动保存到磁盘上的属性列表文件中，并在下次应用程序启动时自动重新加载。属性列表文件以应用程序的标识符命名，位于\
    \ `~/Library/Preferences` 目录中。第 20 章的 TicTacToe 应用程序将其用户默认设置存储在 `~/Library/Preferences/com.apress.learnobjc.TicTacToe.plist`\
    \ 文件中。\n\n> **提示** 您可以通过在 Interface Builder 中将视图（如复选框或文本字段）绑定到单例 `NSUserDefaultsController`\
    \ 的任意属性，来为简单的应用偏好设置创建用户界面。该对象是一个可绑定的控制器，其属性反映了用户默认设置的值。更改控制器的属性会在应用程序域中设置该值，并且该值会被保留。如果您更喜欢程序化方式而非\
    \ `清单 26-1` 中所示的语法，也可以使用 `NSUserDefaultsController` 进行程序化操作。\n\n全局域是另一个持久性域，但通常您不会自行更改它。该域包含适用于用户启动的所有应用程序的用户默认设置。这些设置包括用户的位置、时区、货币、时间和数字格式、首选字体等。它们通常由操作系统定义，并通过系统偏好设置进行配置。\n\
    \n最后，还有注册域。该域不是持久性的，并且除非您在程序初始化期间自行填充，否则它为空。它旨在作为默认用户默认设置的域。也就是说，当其他域都不包含某个键的值时，它会提供一个值。`清单\
    \ 26-2` 中的代码使用一些值初始化了注册域。如果其他域都不包含这些键的值，则会返回注册域中的值。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 清单 26-2. 在应用程序启动期间创建注册域\n\n```\n[[NSUserDefaults standardUserDefaults] registerDefaults:\n\
    \  [NSDictionary dictionaryWithObjectsAndKeys:\n    [NSNumber numberWithInt:999],\
    \ @\"MaximumZombies\",\n    [NSNumber numberWithBool:NO], @\"ZombiesCanWiggleEars\"\
    ,\n    [NSNumber numberWithBool:YES], @\"ShowTerrianInMap\",\n    @\"Bob\", @\"\
    GenericZombieName\", nil]\n];\n```\n\n将注册默认值硬编码的一种流行替代方案是将它们保存为应用程序 bundle 中的属性列表。在应用程序启动期间，加载一个包含属性列表中值的字典，并将其传递给\
    \ `-registerDefaults:`。这也使得属性列表可以轻松地针对不同语言进行本地化。\n\n您可以从 `NSUserDefaults` 类文档和\
    \ *Cocoa 用户默认设置编程主题*[⁴] 中了解更多关于用户默认设置的信息。\n\n## isa 交换\n\nObjective-C 的一些“魔法”是通过一种称为\
    \ isa 交换的技巧实现的。它的名字来源于它搅动或交换了定义对象行为的 `isa` 变量。\n\n通常，对象的 `isa` 变量在 `+alloc` 期间设置，并且永远不会改变。更改对象的\
    \ `isa` 变量实际上会更改对象的类，这定义了其结构以及它响应的所有消息。显然，您可以发现任意更改它可能会产生严重后果。\n\n有几种技术，特别是键值观察，利用对象类的可变性来精确替换特定方法的行为。以下是当您请求观察特定属性时，键值观察所做的操作：\n\
    \n1.  获取对象的类。\n2.  创建对象类的一个新子类。\n3.  用一个返回原始对象 Class 的方法覆盖 `-class` 方法。\n4.  覆盖原始类中所需的\
    \ setter 方法。\n5.  将对象的 `isa` 变量设置为步骤 2 中创建的新子类。\n\nObjective-C 类是使用 `objc_allocateClassPair()`\
    \ 以编程方式创建的（尽管 KVO 可能使用一个名为 `objc_duplicateClass()` 的私有函数）。一旦定义了空类，您就可以使用 `class_addMethod()`\
    \ 在类中添加或覆盖方法，使用 `class_addProtocol()` 使其符合某个协议，或者使用 `class_addIvar()` 定义实例变量。事实上，您可以以编程方式执行任何可以在\
    \ Objective-C 语言中定义的操作。\n\n完成后，对象的行为与之前完全相同，只是步骤 4 中覆盖的消息会调用 KVO 定义的方法，而不是原始类的方法。由于\
    \ KVO 也覆盖了 `-class` 方法，因此该对象仍然显示为其原始类。您需要查看原始的 `isa` 实例变量才能看到对象中的差异。\n\n[⁴]: 苹果公司，*Cocoa\
    \ 用户默认设置编程主题*，[`developer.apple.com/documentation/Cocoa/Conceptual/UserDefaults/`](http://developer.apple.com/documentation/Cocoa/Conceptual/UserDefaults/)，2007\
    \ 年。\n\nIsa 交换是一种强大的技术，但它相当技术性，不适合胆小的人。本节旨在提供信息，而不是鼓励您自己尝试。但是，如果您确实遇到强烈需要涉及此类对象变异的解决方案，它并非遥不可及。\n\
    \n## 64 位编程\n\n如果您已经涉足编程一段时间，您会看到几十年来微处理器寄存器的大小从 4 位增长到 32 位。我们现在不可避免地发现自己正处于从\
    \ 32 位处理器向 64 位处理器过渡的过程中。希望向 128 位处理器的过渡还需要一段时间。\n\n对于 Java 和 Objective-C 程序员来说，这一变革预示着新的内存容量和性能提升的前景。大多数面向对象的程序员在过渡期间几乎无事可做——除了更新他们的项目设置以生成应用程序的\
    \ 64 位版本。如果您完全使用 Objective-C 类、方法和属性进行编程，您会发现这两个环境之间几乎没有什么区别。对于 Objective-C 程序员来说，最大的变化是某些整数变量类型的大小变化，如\
    \ `表 26-2` 所列。\n\n**表 26-2.** 32 位和 64 位变量大小\n\n| 类型 | 32 位大小 | 64 位大小 |\n|------|-----------|-----------|\n\
    | `char` | 1 字节 | 1 字节 |\n| `short` | 2 字节 | 2 字节 |\n| `int` | 4 字节 | 4 字节 |\n\
    | `long` | 4 字节 | 8 字节 |\n| `NSInteger` | 4 字节 | 8 字节 |\n| `pointer` | 4 字节 |\
    \ 8 字节 |\n| `long long` | 8 字节 | 8 字节 |\n"
- fmt: "# Most integer sizes stay the same, with the exception of `long int`. A `long\
    \ int` is 32-bits long in a 32-bit architecture, and 64-bits long when compiled\
    \ for a 64-bit architecture. The more easily remembered `NSInteger` (and `NSUInteger`)\
    \ typedefs are equivalent to `long int`. You will notice that most Objective-C\
    \ collection classes use `NSUInteger` values to count and address elements, allowing\
    \ collections in a 64-bit architecture to contain more than 4,294,967,296 elements—something\
    \ that’s impossible to accomplish in the address space of a 32-bit processor.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## Chapter 26: Runtime\n\
    \n**Tip** A common mistake is to use the wrong format string specifier to format\
    \ `int` values. The statement\n\n`[NSString stringWithFormat:@\"%d\",(NSInteger)x]`\
    \ will not work when compiled for 64 bits; the integer format specifier (`\"%d\"\
    `) expects a 32-bit integer. Always match the format specifier (`\"%ld\"`) with\
    \ the type (`long int`) it expects.\n\nThe change in pointer variable size usually\
    \ isn’t an issue for Objective-C programmers. All pointers (object pointers, C\
    \ type pointers, structure pointers, `CFTypeRefs`, etc.) are always stored in\
    \ pointer variables. The change in size is transparent, as are cast conversions\
    \ between different pointer types.\n\nIn addition to the size change, 64-bit `long\
    \ int`, `long long int`, and pointer variables all change from a 4-byte alignment\
    \ to an 8-byte alignment. The alignment of a variable determines which addresses\
    \ the variable prefers to be positioned at. An 8-byte alignment means that a variable’s\
    \ address should be evenly divisible by 8. This mostly impacts the organization\
    \ of structures, like the one shown in Listing 26-3.\n\n### Listing 26-3. Variable\
    \ Alignment in Structures\n\n```\n@interface Marker : NSObject {\n    int tag;\n\
    \    long long int position;\n}\n@end\n```\n\nIn a 32-bit architecture, the relative\
    \ address offsets of the `tag` and `position` variables in Listing 26-3 would\
    \ be 0 and 4, respectively. When compiled for a 64-bit architecture, the relative\
    \ offsets would be 0 and 8. The size of the variables didn’t change, but the preferred\
    \ address alignment for the `position` integer changed from 4 to 8. The compiler\
    \ inserts 4 unused bytes between the two variables to align the second variable\
    \ to an 8-byte address boundary. This means that the size of this object in memory\
    \ is 4 bytes larger when compiled for 64-bits, even though the variables’ sizes\
    \ didn’t change.\n\nHere’s a short checklist of best practices that will keep\
    \ your code running smoothly in both 32- and 64-bit architectures:\n\n* Never\
    \ store or pass a pointer value in an integer variable, or vice versa.\n* Store\
    \ returned `NSInteger` values in `NSInteger` variables. Specifically, `NSUInteger\
    \ count = [collection count]`.\n* When using `NSInteger` values, use the corresponding\
    \ “integer” object message: `-[NSCoder encodeInteger:forKey:]` instead of `-[NSCoder\
    \ encodeInt:forKey:]`, `-[NSString integerValue]` instead of `-[NSString intValue]`,\
    \ and so on.\n* Match format string specifiers with the correct variable type.\n\
    * Don’t depend on, or make assumptions about, the size or organization of structures.\n\
    * In general, design using objects and properties rather than manipulating structures\
    \ and pointers.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## Chapter\
    \ 26: Runtime\n\nThose are the big ones, but there are hordes of smaller details.\
    \ If you’re considering compiling 64-bit Objective-C code, you should begin by\
    \ reviewing the 64-Bit Transition Guide for Cocoa. Also read some of the many\
    \ reasons you might not want to convert your application to 64-bits in the 64-Bit\
    \ Transition Guide.\n\n## Summary\n\nUnlike Java, which tries to abstract many\
    \ of the details of the runtime environment, Objective-C applications run as native\
    \ code and interact directly with the operating system APIs. You can use introspection\
    \ to run applications on older versions of the operating system that might be\
    \ missing newer APIs and features. Cocoa bundles and frameworks simplify the deployment\
    \ of complex applications and libraries, while user defaults make it easy to manage\
    \ configurable preferences and properties. With some attention to a few details,\
    \ you can produce applications that run smoothly on the latest generation of 64-bit\
    \ processors.\n\n## Epilogue\n\nCongratulate yourself. You’ve learned a lot about\
    \ Objective-C! And not just the basics—this book has explored some really advanced\
    \ techniques. You’ve learned how similarly Objective-C and Java approach primitive\
    \ types, control structures, class inheritance, protocols (interfaces), garbage\
    \ collection, archiving (serialization), exceptions, threads, and collections.\
    \ You’ve learned the subtle differences—syntactic, technical, and philosophical—in\
    \ how Objective-C invokes methods. Most importantly, you’ve explored some genuinely\
    \ new concepts like categories, Key-Value Observing, and class clusters. You have\
    \ (hopefully!) embraced some new design patterns, like delegates, singletons,\
    \ and using `nil` object pointers, to your advantage. You’ve also learned how\
    \ Objective-C embraces design patterns like Model-View-Controller and lazy initialization,\
    \ while taking unique approaches to the subscriber/provider and factory patterns.\n\
    \nThere is, of course, much more to know about Objective-C, the class frameworks,\
    \ and C than can ever be put into a single book. But I genuinely hope you found\
    \ this book to be instructive and that it has accelerated your knowledge and skills\
    \ toward your ultimate goal. Java and Objective-C are both great languages. Given\
    \ their many similarities, there’s no reason why you can’t be proficient in both—expanding\
    \ both your horizons and your opportunities.\n\n## References\n\n1.  Apple Inc.,\
    \ 64-Bit Transition Guide for Cocoa, [http://developer.apple.com/documentation/Cocoa/Conceptual/Cocoa64BitGuide/](http://developer.apple.com/documentation/Cocoa/Conceptual/Cocoa64BitGuide/),\
    \ 2009.\n2.  Apple Inc., 64-Bit Transition Guide, [http://developer.apple.com/documentation/Darwin/Conceptual/64bitPorting/](http://developer.apple.com/documentation/Darwin/Conceptual/64bitPorting/),\
    \ 2009.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)"
