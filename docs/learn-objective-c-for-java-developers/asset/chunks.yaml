    \ `ScrapWordsController` 发送 `removeWords` 和 `foundWord:` 消息。\n\n主应用程序线程所要做的就是启动操作，然后静静地等待结果涌入。应用程序的界面永远不会阻塞，也永远不会无响应。`removeWords`\
    \ 和 `foundWords:` 方法必须通过数组控制器对象来修改数据模型。数组控制器负责保持数据模型、视图以及其自身之间的同步。\n\n***代码清单\
