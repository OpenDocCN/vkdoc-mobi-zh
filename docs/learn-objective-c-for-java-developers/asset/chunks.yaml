    }


    return (self);


    }


    - (id)initWithSeed:(long long)startingSeed


    {


    self = [super init];


    if (self!=nil) {


    seed = startingSeed;


    }


    return (self);


    }


    @end


    …


    RandomSequence *r1 = [[RandomSequence alloc] init];


    RandomSequence *r2 = [[RandomSequence alloc] initWithSeed:-43]; RandomSequence
    *r3 = [RandomSequence new];


    The [RandomSequence alloc] statement begins the process by sending an alloc message
    to the RandomSequence Class object. The root NSObject class implements the +(id)alloc
    class method, which is inherited by all subclasses. +(id)alloc uses the class
    reference to allocate the required memory for the new object, sets its isa variable,
    fills all remaining instance variables with zeros, and returns the pointer to
    the newly allocated object. At this point, the object exists and is an object
    of the requested type. However, the object has not yet been initialized.


    Next, the init message is sent to the newly created object. This is the message
    responsible for initializing the object. Once init returns, the object is ready
    to use.


