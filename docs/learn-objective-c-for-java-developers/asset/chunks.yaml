    \ objectForKey:@\"Value\"];\n\n    …\n\n}\n```\n\n在清单 9-6 的第一部分中，创建了一个字典，用于向`didEndSelector:`参数中指定的模态面板完成方法传递一个或多个值。然而，由于`contextInfo:`参数不是一个`__strong`指针，`NSDictionary`对象在`beginSheet:…`消息发送之后立即变得不可达——从垃圾回收器的角度看。\n\
    \n这个问题有两个简单的解决方案。第一种是使用 Core Foundation 函数`CFRetain(id)`和`CFRelease(id)`来给对象一个非零的保留计数。如前所述，Objective-C\
    \ 的垃圾回收器与传统的 C 内存管理共存。`CFRetain`会增加对象的保留计数——如同该对象也被 C 代码使用一样——从而防止它被回收。一个更面向对象的解决方案是在模态面板完成方法中使用`+[NSGarbageCollector\
    \ disableCollectorForPointer:]`来防止对象被回收，并使用`+[NSGarbageCollector enableCollectorForPointer:]`使其再次可回收。\n\
    \n### 枚举弱集合\n\n枚举弱对象指针集合时必须格外小心。随着对象被回收，集合的内容和元素计数可能会自发地改变。这可能导致枚举器对象和`for(;;)`循环行为异常。\n\
    \n为避免这种情况，要么使用 Objective-C 的快速枚举，要么创建一个使用强引用的临时不可变集合，直到枚举完成。快速枚举在第 16 章中介绍。\n\n\
    ### 未初始化的栈引用\n\n由于 Objective-C 垃圾回收器检测栈上自动变量中强引用的方式，它可能会误认为一个未初始化的自动变量包含强引用。你可以严格初始化所有自动变量，或者简单地偶尔调用\
    \ C 函数`objc_clear_stack(0)`。该函数应在尽可能低的合理栈帧中调用——理想情况下从线程的顶层循环中调用。调用该函数时，栈上的所有方法应尽可能少地包含未初始化的自动变量。如果线程正在运行一个运行循环，则无需执行此操作。每个运行循环会自动为你调用`objc_clear_stack(0)`。\n\
    \n### 其他陷阱\n\n还有其他一些逐渐变得更晦涩的情况，可能导致对象泄漏或被过早回收。如果你认为在使用垃圾回收时遇到问题，请参考苹果公司发布的《垃圾回收编程指南》[^1]。\n\
    \n## 应避免的设计模式\n\n以下是在编写使用垃圾回收的程序时应避免的一些编程模式：\n\n- 你不能重写、拦截或发送`-release`、`-dealloc`或`-retainCount`方法。\n\
    - 在使用托管内存时，委托、父对象和观察者引用通常被描述为“弱”引用，因为它们不会被保留——以避免循环保留。这些实际上并非弱引用，因此不应声明为`__weak`。垃圾回收器在处理循环引用方面没有问题。\n\
    - 不要使用对象的生命周期来管理昂贵的资源。通常，一个对象被创建出来仅仅是为了管理一个大的缓冲区或计算出的对象池。一旦对该对象的所有引用都被释放，它就会释放底层资源。使用垃圾回收时，请实现你自己的引用计数，或者创建一个字典（映射），其中包含每个客户端对象作为键，以及对资源的引用作为值。每个客户端对象在完成资源使用后应从集合中移除自己，从而允许在最后一个客户端被移除时回收该资源。\n\
    - 不要为 Objective-C 对象使用分配区。垃圾回收器要求所有托管对象都在默认区域中分配。\n\n## 调试\n\n[^1]: 译者注：原文中`1`为注释标记，但在提供文本中未找到对应注释内容。"
  raw: 'You can also have the garbage collector manage any pointer to an allocated
    block of memory by explicitly typing it as __strong or __weak, then setting the
    pointer to a managed block of memory. The garbage collector will treat the pointer
    like any other object reference and dispose of the memory once it’s no longer
    reachable. This technique has two prerequisites:


    • All pointers to the memory allocation must be typed __strong (or __weak, as
    appropriate).


    • Allocate the memory using NSAllocateCollectable(int size, int options).


    • If the contents of the collectable memory block contain __strong or __weak pointers,
    the options parameter of NSAllocatableCollectable should be NSScannedOption. Otherwise,
    pass 0\. Listing 9-4 demonstrates the allocation of an arbitrary block of memory
    that will be managed by the garbage collector. Note that this is a rewriting of
    the code fragment from the last chapter that used an NSMutableData object to contain
    the array.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 9 ■ GARBAGE COLLECTION


    Listin g 9-4\. Allocating Garbage Collected Memory Blocks


    - (__strong NSPoint*)pointsForObjects:(NSArray*)objects


    {


    __strong NSPoint *points;


    unsigned int count = [objects count];


    unsigned int i;


    points = (NSPoint*)NSAllocateCollectable(count*sizeof(NSPoint),0); for (i=0; i<[objects
    count]; i++) {


    points[i] = …


    }


    return points;


    }


    Garbage Collection Pitfalls


    Here’s a short collection of the most common garbage collection–related hazards
    and how to resolve them.


    Interior Pointers


    Pointers that point to structures inside a collectable object do not prevent that
    object from being collected. If the object is prematurely collected, the pointer
    becomes invalid. The example shown in Listing 9-5 demonstrates this problem.


    Listin g 9-5\. Interior Pointer


    NSData *data = [NSData dataWithData:originalData];


    const char *bytes = [data bytes];


    Let’s assume that the data variable in Listing 9-5 is never referenced again.
    Immediately following these two lines of code, the NSData object could be collected
    leaving the bytes variable pointing to invalid memory. The reason is because the
    [data bytes] statement is the last reachable reference to the NSData object in
    the method. The Objective-C compiler can be extremely aggressive about reclaiming
    automatic variables. The compiler could very likely assign both data and bytes
    to the same CPU register, since their lifetimes don’t overlap. Thus, by the time
    the bytes assignment is complete, the NSData object pointer is gone and the object
    becomes collectable.


    The solution is to reference the data object at least once after the last use
    of any interior pointers. It doesn’t matter how the reference is accomplished.
    This includes sending it gratuitous


    -retain and -release messages. I personally prefer this technique, because these
    messages are used for classic memory management and they scream, “I’m doing memory
    management here,” which is true.


    An alternative solution is to use a collectable memory block, described earlier
    in the Allocating Collectable Memory section.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 9 ■ GARBAGE COLLECTION


    Opaque Pointers


    Objects assigned to pointers that are neither __strong nor __weak (i.e., not write
    barrier protected) are not considered by the garbage collector. This can be a
    problem when passing an object via a void* or some other opaque pointer type.
    Listing 9-6 demonstrates the problem in passing a dictionary object as the context
    for a message that will be sent at some later time. The void* to the object does
    not prevent it from being collected before the message is sent.


    Listin g 9-6\. Assigning an Object to an Opaque Pointer


    NSDictionary *info = …;


    [NSApp beginSheet:sheetWindow


    modalForWindow:window


    modalDelegate:delegate


    didEndSelector:@selector(sheetDidEnd:returnCode:contextInfo:); contextInfo:(void*)info];


    …


    - (void)sheetDidEnd:(NSWindow*)sheet


    returnCode:(int)returnCode


    contextInfo:(void *)contextInfo


    {


    NSDictionary *info = (id)contextInfo;


    id value = [contextObject objectForKey:@"Value"];


    …


    }


    In the first part of Listing 9-6, a dictionary is created to pass one or more
    values to the modal sheet completion method designated in the didEndSelector:
    parameter. However, since the contextInfo: parameter is not a __strong pointer,
    the NSDictionary object becomes unreachable—in the eyes of garbage collector—immediately
    following the beginSheet:… message.


    There are two simple solutions to this problem. The first is to use the Core Foundation
    functions CFRetain(id) and CFRelease(id) to give the object a non-zero retain
    count. As mentioned earlier, Objective-C’s garbage collector coexists with traditional
    C memory management. CFRetain increments the retain count of the object—as if
    the object were also in use by C code—preventing it from being collected. A more
    object-oriented solution would be to use +[NSGarbageCollector disableCollectorForPointer:]
    to prevent the object from being collected, and +[NSGarbageCollector enableCollectorForPointer:]
    in the model sheet completion method to make it collectable again.


    Enumerating Weak Collections


    Care must be taken when enumerating through collections of weak object pointers.
    Their contents, and element count, can spontaneously change as objects are collected.
    This can cause enumerator objects and for(;;) loops to behave erratically.


    To avoid this, either use Objective-C’s fast enumeration or create a temporary
    immutable collection that uses strong references until your enumeration is finished.
    Fast enumeration is covered in Chapter 16.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 9 ■ GARBAGE COLLECTION


    Uninitialized Stack References


    Due to the way that the Objective-C garbage collector detects strong references
    in automatic variables on the stack, it can be tricked into thinking that an uninitialized
    automatic variable contains a strong reference. You can religiously initialize
    all automatic variables, or simply call the C function objc_clear_stack(0) occasionally.
    It should be called at the lowest reasonable stack frame—ideally from the thread’s
    top-level loop. When the function is called, all of the methods on the stack should
    have as few uninitialized automatic variables as possible. If the thread is running
    a run loop, you don’t need to do this. Each run loop automatically calls objc_clear_stack(0)
    for you.


    Other Pitfalls


    There are other, progressively more obscure, situations that can cause objects
    to leak or be prematurely collected. If you believe you are having problems with
    garbage collection, review the Garbage Collection Programming Guide published
    by Apple.1


    Design Patterns to Avoid


    Here are a few programming patterns that should be avoided when writing programs
    that use garbage collection:


    • You cannot override, intercept, or send the -release, -dealloc, or -retainCount
    methods.


    • Delegate, parent, and observer references are often described as “weak” when
    using managed memory because they are not retained—to avoid circular retains.
    These are not, in fact, weak references and should not be typed as __weak. The
    garbage collector has no problem dealing with circular references.


    • Do not use the lifetime of an object to manage an expensive resource. Often,
    an object will be created just to manage a large buffer or pool of computed objects.
    Once all of the references to the object are released, it releases the underlying
    resource. When using garbage collection, implement your own reference counting
    or create a dictionary (map) that contains each client object as keys and a reference
    to the resource as values. Each client object should remove itself from the collection
    when finished with the resource, allowing the resource to be collected when the
    last client is removed.


    • Don’t use allocation zones for Objective-C objects. The garbage collector requires
    that all managed objects be allocated in the default zone.


