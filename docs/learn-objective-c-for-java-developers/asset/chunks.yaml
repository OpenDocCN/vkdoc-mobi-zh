    High-Level File Operations


    Objective-C applications tend to deal with files in a holistic fashion, rather
    than the more traditional approach of opening the file, reading some or all of
    its data, and closing it again. Application classes, like the document management
    classes, tend to favor reading an entire file into a single data object. The typical
    life cycle of a document file is to be read—in its entirety—into a single NSData
    object, edited, and then written back out, overwriting the original file.


    In modern file systems, it is also difficult to “correctly” perform even simple
    operations, such as copying a file. Extended metadata, access control lists, file
    ownership, multiple data forks, display properties, and remote file copying protocols
    are just a few of the seemingly endless details that must be considered just to
    duplicate a file.


    To spare you from these burdens, the Cocoa framework provides a number of high-level
    methods that correctly perform a variety of atomic actions on whole files. The
    common ones are listed in Table 11-9.


