- fmt: "# Note\n\nEvery file in the classic Macintosh OS had two forks: a data fork\
    \ and a resource fork. While the resource fork is assumed to have a specific structure,\
    \ the essential fact is that every file is potentially two files. When you open\
    \ a file using the Carbon functions, you specify not only the file to open but\
    \ which fork. The API was later generalized to support any number of file forks.\
    \ But in practice, only the two original forks are consistently supported. The\
    \ data fork is the unnamed fork of the file, and is the fork accessed by the BSD\
    \ functions and Cocoa methods. The virtual file system may emulate multi-fork\
    \ files on file systems that don’t inherently support them by creating additional,\
    \ invisible, files to accommodate the data. BSD and Cocoa functions can access\
    \ a file’s resource fork using a synthetic path name of the form `file.data/rsrc`.\
    \ The syntax essentially treats every data file as a directory containing an arbitrary\
    \ number of named fork files.\n\n## Table 11-12. Core Services\n\n| Function |\
    \ Description |\n|----------|-------------|\n| `FSPathMakeRef` | Creates an `FSRef`\
    \ from a POSIX path |\n| `FSRefMakePath` | Returns the POSIX equivalent to the\
    \ `FSRef` |\n| `FSMakeFSRefUnicode` | Creates a new `FSRef` from a parent `FSRef`\
    \ and file name |\n| `FSCompareFSRefs` | Determines if two `FSRef` structures\
    \ refer to the same entity |\n| `FSGetCatalogInfo` | Gets the catalog information\
    \ about a file |\n| `FSGetCatalogInfoBulk` | Gets the catalog information for\
    \ many files at once |\n| `FSSetCatalogInfo` | Changes the catalog information\
    \ for a file |\n| `FSGetVolumeInfo` | Gets information about a volume |\n| `FSSetVolumeInfo`\
    \ | Changes information about a volume |\n| `FSCreateFileUnicode` | Creates a\
    \ new, empty file |\n| `FSDeleteObject` | Deletes a file |\n| `FSExchangeObjects`\
    \ | Swaps the data contents of two files |\n| `FSCreateFork` | Creates a data\
    \ or resource fork |\n| `FSOpenFork` | Opens a data or resource fork |\n| `FSReadFork`\
    \ | Reads data from a file |\n| `FSWriteFork` | Writes data to a file |\n| `FSGetForkPosition`\
    \ | Gets the current file position |\n| `FSSetForkPosition` | Changes the file\
    \ position |\n| `FSGetForkSize` | Gets the file’s logical length |\n| `FSSetForkSize`\
    \ | Changes the file’s logical length |\n| `FSFlushFork` | Writes any cached changes\
    \ to physical media |\n| `FSCloseFork` | Closes the file |\n| `FSNewAlias` | Creates\
    \ an alias record to a file |\n| `FSResolveAlias` | Gets the file best described\
    \ by an alias record |\n| `FSResolveAliasFile` | Gets the file best described\
    \ by an alias file |\n| `FSMatchAliasBulk` | Gets the list of all files that could\
    \ be described by an alias record |\n| `LSCopyDisplayNameForRef` | The file name\
    \ that should be displayed to the user |\n| `LSCopyItemInfoForRef` | Gets display\
    \ properties for a file (invisible, bundle, …) |\n| `LSGetExtensionInfo` | Gets\
    \ the file extension and display information for a file |\n| `LSGetApplicationForItem`\
    \ | Gets the application that will launch when the user opens the file |\n\nMany\
    \ Core Services functions accept or return an `FSRef` (file system reference)\
    \ data structure. An `FSRef` is an opaque and nonportable structure that uniquely\
    \ identifies a file in the file system. You cannot interpret the contents of the\
    \ structure (the opaque part), nor can you use the structure outside the memory\
    \ address of the current process (the nonportable part). So don’t even think about\
    \ trying to save it to disk or copy it to another process. There are no calls\
    \ to initialize or dispose `FSRef` structures, so they can be declared as uninitialized\
    \ variables, set, used, copied by value, and eventually just forgotten.\n\n`FSRefMakePath`\
    \ and `FSPathMakeRef` are the principal functions for converting a C path string\
    \ into an `FSRef` structure and vice versa.\n\nThe sample code in Listing 11-7\
    \ starts with a POSIX path in an Objective-C string object and converts that into\
    \ a portable alias record. The record is stored in a structure allocated by the\
    \ `FSNewAlias` function. A “handle” is just a pointer to a pointer. The alias\
    \ is later resolved and turned back into a path string, suitable for use in `NSFileManager`\
    \ messages. In the process, the code illustrates converting an Objective-C path\
    \ string to and from an `FSRef` structure. Note that code in Listing 11-7 could\
    \ have saved the first step of converting the path into an `FSRef` by using the\
    \ `FSNewAliasPath` function instead, but was included to illustrate this common\
    \ practice.\n\n## Listing 11-7. Objective-C Path to Alias\n\n```\nNSString *path\
    \ = @\"/Users/james/Desktop\";\nOSStatus err;\n\n// Convert a POSIX path string\
    \ into an alias record\nFSRef pathRef;\nAliasHandle aliasHndl;\nerr = FSPathMakeRef((const\
    \ UInt8*)[path fileSystemRepresentation],&pathRef,NULL);\nif (err!=noErr)\n  \
    \  /* error */;\nerr = FSNewAlias(NULL,&pathRef,&aliasHndl);\nif (err!=noErr)\n\
    \    /* error */;\n/* success */\n...\n// Resolve aliasHndl and get its POSIX\
    \ path string\nFSRef originalRef;\nBoolean aliasWasUpdated;\nerr = FSResolveAlias(NULL,aliasHndl,&originalRef,&aliasWasUpdated);\n\
    if (err!=noErr)\n    /* error */;\nNSMutableData *pathBuffer = [NSMutableData\
    \ dataWithLength:2048];\nchar *pathBytes = (char*)[pathBuffer bytes];\nerr = FSRefMakePath(&originalRef,(UInt8*)pathBytes,[pathBuffer\
    \ length]);\nif (err!=noErr)\n    /* error */;\nNSFileManager *fm = [NSFileManager\
    \ defaultManager];\nNSString *originalPath = [fm stringWithFileSystemRepresentation:pathBytes\
    \ length:strlen(pathBytes)];\n/* success */\n```\n\nTable 11-12 lists only a tiny\
    \ fraction of the functions implemented in the Core Services framework. There\
    \ are many variations of the functions listed, and hundreds of others. Core Services\
    \ provides functions to get and set volume information, mount and eject volumes,\
    \ receive file system notifications, track changes in real time, record optical\
    \ media, and perform operations on remote volumes—just to name a few. Your best\
    \ resource for these specialized functions is the Mac OS X documentation.\n\n\
    Underneath all of these frameworks are the core BSD functions that implement the\
    \ underlying file system. These are the traditional `open(...)`, `read(...)`,\
    \ `write(...)`, `close(...)` functions that have been around since the origin\
    \ of UNIX. Entire books have been written about this API, they are amply documented,\
    \ and there are numerous on-line tutorials and resources—so I won’t bother going\
    \ into details. If you have an `NSFileHandle` object and need to apply a BSD function\
    \ to the underlying file, send it the `-fileDescriptor` message. The integer returned\
    \ is the BSD file descriptor token used to identify the open file. If you already\
    \ have a BSD file descriptor, you can wrap it in an `NSFileHandle` using `[[NSFileHandle\
    \ alloc] initWithFileDescriptor:fd]`.\n\n# Summary\n\nYou should now have a good\
    \ grounding in the basic file I/O facilities of Objective-C, the Cocoa framework,\
    \ and Mac OS X. The principal differences are the use of strings instead of `java.io.File`\
    \ objects to manipulate paths, attribute dictionaries instead of File object properties,\
    \ and the reliance on C functions for advanced features. Beyond that, you won’t\
    \ find that the basic file-related tasks (reading data files, writing data files,\
    \ deleting files) changes in any significant way.\n\n---\n\n# Chapter 12. Serialization\n\
    \nSerialization is the process by which the properties of an object, or objects,\
    \ are converted into a transportable series of bytes that capture their internal\
    \ state and relationships. The serialized data can be saved or transmitted to\
    \ another process or system, where the data can later be used to re-create the\
    \ original set of objects."
