- fmt: '现在你已经掌握了一些实际开发的基础，接下来几章将深入探讨特定的 Objective-C 技术。


    **第五章**


    ■ ■ ■


    探索协议和分类


    Objective-C 提供了两种额外的方案来定义方法：协议和分类。本章将介绍这两种方案，解释它们的区别，展示它们的用法，并提供一些结合它们的设计模式。


    Objective-C 协议等同于 Java 接口。协议的使用方式与 Java 中的接口类似，尽管使用频率较低。Objective-C 程序员更倾向于使用一种称为非正式协议的更宽松的形式。


    Objective-C 分类可以向一个类添加方法，而无需修改其主要的类声明（`@interface`）。分类的概念对于 Java 开发者来说可能非常陌生，但实际上它非常简单。分类用于隔离或隐藏某个类实现的一部分，将复杂的类分解为易于管理的部分，以及将通常不属于某类范畴的功能附加到该类上。


    协议


    协议（接口）使用`@protocol`指令定义，如代码清单 5-1 所示。该指令列出了协议所需的方法。与 Java 接口一样，协议不包含任何实例变量——只包含方法。


    代码清单 5-1. 游戏协议


    ```objectivec

    @interface VenusAttacks : Game

    ...

    @end


    @class Thing;


    @protocol Living

    - (float)age;

    - (float)health;

    - (NSDictionary*)healthInfo;

    @end


    @protocol Communicating

    - (NSArray*)recipientsInRange;

    - (void)sendMessage:(NSString*)messsage to:(id<Communicating>)recipient;

    @end


    @protocol Storing

    - (NSDictionary*)inventory;

    - (BOOL)giveItem:(Thing*)item to:(id<Storing>)recipient;

    - (BOOL)acceptItem:(Thing*)item from:(id<Storing>)recipient;

    @end


    @interface Thing : NSObject

    ...

    @end


    @interface Weapon : Thing

    ...

    @end


    @interface Radio : Thing <Communicating>

    ...

    @end


    @interface StorageLocker : Thing <Storing>

    ...

    @end


    @interface Character : Thing <Living,Communicating>

    ...

    @end


    @interface Earthling : Character <Storing>

    ...

    @end


    @interface Venusian : Character

    ...

    @end

    ```


    代码清单 5-1 中的代码为 `VenusAttacks` 冒险游戏中的对象定义了三个协议。


    这些协议（接口）是 `Living`、`Communicating` 和 `Storing`。一个类通过在父类名称后面的尖括号中声明它所实现的协议。`StorageLocker`
    类实现了 `Storing` 协议定义的所有方法。`Character` 类实现了 `Living` 和 `Communicating` 这两个协议定义的所有方法。


    用 Objective-C 的说法，`StorageLocker` 符合 `Storing` 协议。


    当一个类符合某个协议时，它必须实现该协议定义的所有方法。未能实现协议中定义的方法是编译时错误。符合一个协议意味着该协议中的方法原型已经隐式声明。因此，`StorageLocker`
    类的 `@interface` 中不需要显式声明它实现了 `-(NSDictionary*)inventory` 方法；这一点已经由 `<Storing>`
    隐含了。


    与 Java 接口一样，协议会被子类继承并且是可累加的。`Earthling` 类符合 `Storing`、`Living` 和 `Communicating`
    协议。`Venusian` 对象符合 `Living` 和 `Communicating` 协议，但不符合 `Storing` 协议——金星人没有口袋。


    协议名可以与类名在类型表达式中结合使用。声明 `Weapon<Communicating> *weapon = nil` 定义了一个指向 `Weapon`
    类对象的指针，并假定该对象实现了 `Communicating` 协议。编译器将允许将来自 `Weapon` 和 `Communicating` 的消息发送给该对象。


    ■注意 与 Java 不同，Objective-C 在赋值时不会测试对象所属的类或协议。如果你将一个武器对象指针赋值给 `Weapon<Communicating>
    *weapon` 变量，而该对象并不符合 `Communicating` 协议，这一点直到该对象收到 `sendMessage:to:` 消息时才会被发现（并抛出无法识别的选择器异常）。


    在 Java 中，你可以像使用类类型一样使用接口名。当你想在 Objective-C 中声明或转型一个对象，使其表示“一个实现了所述协议的任意类对象的引用”时，可以将协议名与
    `id` 类型结合，如 `id<Storing>`。当 `id` 以这种形式使用时，它就失去了常规的随意性。这种类型的变量被假定为只接受该协议定义的消息。


    协议可以扩展和组合其他协议。代码清单 5-2 定义了 `FTLCommunicating` 协议，该协议本身符合 `Communicating` 协议。任何符合
    `FTLCommunicating` 的类都必须实现由 `FTLCommunicating` 和 `Communicating` 定义的所有方法。子协议不必声明任何新方法；它可以仅仅用来聚合多个协议。


    代码清单 5-2. 子协议


    ```objectivec

    @protocol FTLCommunicating <Communicating>

    - (id)receiveMessageBeforeBeingSent;

    @end

    ```


    每个协议定义通常保存在其自己的头文件（`.h`）中，然后由符合或引用它的类通过 `#import`（如 `#import "Living.h"`）导入。


    非正式协议


    非正式协议是一组程序员期望某个对象实现的方法。这组方法没有以任何正式的方式声明，这就是为什么 Objective-C 协议有时被称为正式协议，以区别于非正式协议。非正式协议几乎只是一种编程约定——最好由程序员记录在案。


    非正式协议在 Objective-C 中很受欢迎，原因有二。如前所述，Objective-C 在进行赋值时不会验证对象的类。对象是否实现某个协议或方法，在消息实际发送给该对象之前是被忽略的。这使得定义一个假定对象实现了一组方法，但不对其实际实现作任何保证的对象引用变得很容易。


    以编程方式确定一个对象是否实现某个方法也非常简单。结合这两个特性，你可以轻松地传递一个能力不确定的对象，并在需要时评估该对象的能力。


    为了说明正式协议（接口）和非正式协议之间的对比，考虑拦截关闭窗口的请求这一任务。`javax.swing.JWindow` 类有一个 `addWindowStateListener(WindowStateListener
    l)` 方法。为了将自己注册为监听器，一个对象必须实现 `WindowStateListener` 接口，以便在 `addWindowStateListener()`
    调用中作为参数传递。注册后，该对象会接收事件回调并监视 `WINDOW_CLOSING` 事件。


    Cocoa 框架对同一个问题采取了更为宽松的方法。一个想要拦截关闭窗口事件的对象会将自己设置为窗口的委托对象。在窗口关闭之前，`NSWindow` 会检查委托对象，看它是否实现了
    `-(BOOL)windowShouldClose:(id)window` 方法。如果实现了，它就会向该对象发送 `windowShouldClose:`
    消息并检查结果。如果没有实现，它就会忽略该委托，继续关闭窗口。


    `-windowShouldClose:` 方法定义了一个非正式协议：要么对象实现了 `-windowShouldClose:`，要么没有。代码清单 5-3
    展示了一个假设的窗口关闭逻辑实现。


    代码清单 5-3. 测试非正式协议


    ```objectivec

    BOOL shouldClose = YES;

    ```'
  raw: 'Now that you have some grounding in practical development, the next few chapters
    will delve deeper into specific Objective-C technologies.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 5**


    ■ ■ ■


    Exploring Protocols and


    Categories


    Objective-C provides two additional schemes for defining methods: protocols and
    categories. This chapter will describe both, explain how they differ, show how
    they are used, and present some design patterns that incorporate them.


    Objective-C protocols are equivalent to Java interfaces. Protocols are employed
    just as interfaces are in Java, although less frequently. Objective-C programmers
    are more likely to use a relaxed form called an informal protocol.


    Objective-C categories add methods to a class, independent of its primary class
    declaration (@interface). The concept of a category may seem very foreign to a
    Java developer, but it’s really quite simple. Categories are used to isolate or
    hide portions of a class’s implementation, break complex classes into manageable
    pieces, and attach functionality to a class that would normally be outside its
    domain.


    Protocols


    A protocol (interface) is defined using a @protocol directive, as shown in Listing
    5-1\. The directive lists the methods required by the protocol. Like a Java interface,
    a protocol doesn’t contain any instance variables—only methods.


    Listin g 5-1\. Game Protocols


    @interface VenusAttacks : Game


    ...


    @end


    @class Thing;


    **@protocol Living**


    - (float)age;


    - (float)health;


    - (NSDictionary*)healthInfo;


    @end


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ EXPLORING PROTOCOLS AND CATEGORIES


    **@protocol Communicating**


    - (NSArray*)recipientsInRange;


    - (void)sendMessage:(NSString*)messsage to:(id<Communicating>)recipient;


    @end


    **@protocol Storing**


    - (NSDictionary*)inventory;


    - (BOOL)giveItem:(Thing*)item to:(id<Storing>)recipient;


    - (BOOL)acceptItem:(Thing*)item from:(id<Storing>)recipient;


    @end


    @interface Thing : NSObject


    ...


    @end


    @interface Weapon : Thing


    ...


    @end


    @interface Radio : Thing <Communicating>


    ...


    @end


    @interface StorageLocker : Thing <Storing>


    ...


    @end


    @interface Character : Thing <Living,Communicating>


    ...


    @end


    @interface Earthling : Character <Storing>


    ...


    @end


    @interface Venusian : Character


    ...


    @end


    The code in Listing 5-1 defines three protocols for objects in the VenusAttacks
    adventure game.


    The protocols (interfaces) are Living, Communicating, and Storing. A class declares
    the protocols that it implements between angle brackets following the name of
    its superclass. The StorageLocker class implements all of the methods defined
    by the Storing protocol. The Character class implements all of the methods defined
    by both the Living and Communicating protocols.


    In Objective-C parlance, StorageLocker conforms to the Storing protocol.


    When a class conforms to a protocol, it is required to implement all of the methods
    defined by that protocol. Failing to implement a method defined in a protocol
    is a compile-time error. Conforming to a protocol implies the prototypes for the
    methods in that protocol. Thus, it is not necessary for the 76


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ EXPLORING PROTOCOLS AND CATEGORIES


    StorageLocker class @interface to explicitly declare that it implements the -(NSDictionary*)inventory
    method; that is already implied by <Storing>.


    Like Java Interfaces, protocols are inherited by subclasses and are additive.
    The Earthling class conforms to the Storing, Living, and Communicating protocols.
    Venusian objects conform to the Living and Communicating protocols, but not the
    Storing protocol—Venusians have no pockets.


    Protocol names can be combined with a class name in a type expression. The declaration
    Weapon<Communicating> *weapon = nil defines a pointer to a Weapon class object
    that is assumed to implement the Communicating protocol. The compiler will allow
    messages from both Weapon and Communicating to be sent to that object.


    ■Caution Unlike Java, Objective-C does not test objects for class or protocol
    membership during assignment. If you assigned a weapon object pointer to the Weapon<Communicating>
    *weapon variable, and that object does not conform to the Communicating protocol,
    that fact will not be discovered until the object is sent a sendMessage:to: message
    (throwing an unrecognized selector exception).


    In Java you can use an interface name as if it were a class type. When you want
    to declare or cast an object to mean “a reference to any class of object that
    implements said protocol” in Objective-C, combine the protocol name with the id
    type, as in id<Storing>. When id is used in this form, it loses its normal permissiveness.
    A variable of this type is assumed to only accept messages defined by that protocol.


    Protocols can extend and combine other protocols. Listing 5-2 defines the FTLCommunicating
    protocol, which itself conforms to the Communicating protocol. Any class that
    conforms to FTLCommunicating must implement all of the methods defined by FTLCommunicating
    and Communicating. A subprotocol doesn’t have to declare any new methods; it can
    be used simply to aggregate multiple protocols.


    Listin g 5-2\. Subprotocol


    @protocol FTLCommunicating <Communicating>


    - (id)receiveMessageBeforeBeingSent;


    @end


    Each protocol definition is typically saved in its own header (.h) file, which
    is then imported (#import "Living.h") by classes that conform to or reference
    it.


    Informal Protocol


    An informal protocol is a set of methods that a programmer expects an object to
    implement. The set of methods is not declared in any formal way, which is why
    Objective-C protocols are sometimes referred to as formal protocols, to distinguish
    them from informal protocols. Informal protocols are little more than a programming
    convention—hopefully, one documented by the programmer.


    Informal protocols are attractive in Objective-C for two reasons. As previously
    mentioned, Objective-C does not verify the class of an object when an assignment
    is made. Whether an object does, or does not, implement a protocol or method is
    ignored until a message is actually sent to the object.


    This makes it easy to define an object reference that assumes an object implements
    a set of methods, but makes no assurances that it actually does.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ EXPLORING PROTOCOLS AND CATEGORIES


    Programmatically determining if an object implements a method is also trivial.
    Combining these two features, you can effortlessly pass around an object of indeterminate
    aptitude, assessing the capabilities of the object when the need arises.


    To illustrate the contrast between a formal protocol (interface) and an informal
    protocol, consider the task of intercepting a request to close a window. The javax.swing.JWindow
    class has an addWindowStateListener( WindowStateListener l ) method. To register
    itself as a listener, an object must implement to the WindowStateListener interface
    in order to pass itself as the parameter in the addWindowStateListener() call.
    Once registered, the object then receives event callbacks and watches for WINDOW_CLOSING
    events.


    The Cocoa framework takes a much more casual approach to the same problem. An
    object that wants to intercept the closing of a window sets itself as the window’s
    delegate object. Before a window is closed, NSWindow examines the delegate object
    to determine if it implements the


    -(BOOL)windowShouldClose:(id)window method. If it does, it sends the windowShouldClose:
    message to the object and examines the results. If not, it ignores the delegate
    and proceeds to close the window.


    The -windowShouldClose: method defines an informal protocol: either the object
    implements


    -windowShouldClose: or it doesn’t. A hypothetical implementation of the window
    closing logic is shown in Listing 5-3.


    Listin g 5-3\. Testing for an Informal Protocol


    BOOL shouldClose = YES;'
