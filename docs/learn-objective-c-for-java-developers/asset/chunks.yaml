    ## GC 与非 GC 指针


    Java 中的垃圾回收既是确定性的，也是同质的；所有引用都指向对象。而在 Objective-C 中，指针几乎可以指向任何东西。它们可以指向对象、块、栈上的结构、其他结构内部的结构、数组元素，甚至可能填充随机的无意义值。因此，显然无法绝对确定地判断所有可达对象的集合。


    Objective-C 的解决方案是忽略大多数指针，只关注那些（应该）引用对象的指针。这导致了内存管理技术的混合使用。Objective-C 对象使用垃圾回收器，而传统的
    C 内存分配则沿用其传统设计模式进行管理。


    本节将解释哪些指针由垃圾回收服务自动管理，哪些不是，以及你对这些指针有何控制权。同时，还将强调非托管指针可能引发问题的场景以及如何处理这些问题。


    ## 写入屏障


    Objective-C 使用一种称为写入屏障的技术来跟踪其管理的指针引用。编译器会将所有对 `__strong` 和 `__weak` 指针的赋值替换为一个快速函数调用，该函数执行赋值操作并将指针注册到垃圾回收系统。请记住，所有
    Objective-C 对象指针默认都是 `__strong`的。每个对象指针的赋值都会被注册到垃圾回收器中，回收器利用这些信息来确定可达对象的集合。


