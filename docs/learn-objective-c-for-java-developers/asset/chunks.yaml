    \n在程序初始化期间加载主 NIB 文件时，拥有者是单一的`NSApplication`对象。当文档控制器加载 NIB 以创建文档窗口时，拥有者是负责该界面的`NSDocument`对象。当你通过编程方式加载\
    \ NIB 文件时，可以指定任何你想要的拥有者对象，只需确保它与 NIB 文档中定义的文件拥有者类一致。\n\n在 TicTacToe 示例中（见代码清单\
    \ 20-1 与图 20-6），NIB 包含一个`ChalkboardView`实例，该实例连接到拥有者的`chalkboardView`属性。由于这是一个文档\
    \ NIB，`TTTDocument`是 NIB 的拥有者。加载后，其`chalkboardView`属性被设置为新创建的`ChalkboardView`对象。\n\
    \nCustom Objects\n\nTicTacToe 项目中的 NIB 文档实例化了两个我创建的类：`TTTDocument`和`ChalkboardView`。这是通过创建或选择\
    \ Interface Builder 已理解的通用对象，然后在标识检查器中更改其类来实现的，如图 20-9 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/index-384_1.png)\n\n**图 20-9.** 更改 NIB 对象的类  \n\n对于`TTTDocument`，我首先在\
    \ Xcode 中通过继承`NSDocument`创建了`TTTDocument`子类。在 Interface Builder 中，我在`TTTDocument`\
    \ NIB 文档中选择了已有的文件拥有者实例，并将其类改为`TTTDocument`。Interface Builder 现在将文件拥有者对象视为`TTTDocument`的实例。Interface\
    \ Builder 理解继承关系：`TTTDocument`继承了`NSDocument`的所有属性、输出口和行为。\n\n为了创建`ChalkboardView`对象，我首先在\
    \ Xcode 中创建了`ChalkboardView`类（继承自`NSView`）。在 Interface Builder 中，我将一个自定义视图（Custom\
    \ View）对象从库拖到窗口中，然后将其类从`NSView`改为`ChalkboardView`。该对象继承了基类`NSView`的所有属性。也就是说，Interface\
    \ Builder 知道它是一个具有位置、大小、可见性、子视图等属性的视图对象。\n\n你可以通过将通用对象（Object）从库拖到 NIB 中，然后将其类改为任意类，来创建任意的类实例。`Object`只继承了`NSObject`的基本属性——也就是说几乎没有任何属性。一旦添加，该对象可以连接到任何合适的输出口。\n\
    \nInterface Builder 不会自动提供对你自定义类属性的编辑功能，但会识别你定义的输出口和动作。如果你希望设计的自定义类出现在 Interface\
    \ Builder 的库面板中，并使其属性可通过属性面板编辑，你可以创建一个 Interface Builder 插件。这是一个较为复杂的过程，但如果你感兴趣，可以参考《Interface\
    \ Builder Plug-in Programming Guide》2。\n\n2 Apple Inc., *Interface Builder Plug-in\
    \ Programming Guide*, [`developer.apple.com/documentation/DeveloperTools/Conceptual/IBPlugInGuide/`](http://developer.apple.com/documentation/DeveloperTools/Conceptual/IBPlugInGuide/),\
    \ 2007.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n"
- fmt: '# Object Instantiation


    Although I describe NIB objects as being created through standard unarchiving,
    the NIB loader makes a few concessions for some objects. Here is how objects in
    a NIB are created:


    - Custom view objects (subclasses of `NSView`) are initialized with `-initWithFrame:`.
    This is to be consistent with programmatic creation of custom view objects.

    - Non-view custom objects (subclasses of `NSObject`) are initialized with an `-init`
    message.

    - All other objects provided by Interface Builder (i.e., those that appear in
    the Library palette) are unarchived with the normal `-initWithCoder:` message.
    This also applies to any custom objects that you’ve provide via an Interface Builder
    Plug-in.


    Initializing custom objects via the standard initializer messages, `-init` and
    `-initWithFrame:`, means that custom objects do not have to conform to `NSCoding`
    to be archived in a NIB document. It also means you can instantiate virtually
    any object available to your application and connect it to other objects in your
    NIB. The advantage of decoding objects using `-initWithCoder:` is that the NIB
    can include preset property values. But since Interface Builder doesn’t allow
    you to edit the properties of custom objects, it’s a moot point.


    # NIB Object Initialization


    You will often want to perform some additional initialization. After all of the
    objects in a NIB document have been created, each receives a single `-awakeFromNib`
    message—if implemented. The `-awakeFromNib` message is sent after all the NIB
    objects have been created and all connections and bindings have been set.


    Take a moment to absorb what’s been covered so far. You’ve learned the tenets
    of the Model-View-Controller design pattern, along with some popular variations.
    You’ve learned the essential communication responsibilities of the data model,
    view, and controller objects. You’ve learned about bindings, which are a very
    specific implementation of MVC communications. Using Interface Builder, you’ve
    learned to instantiate objects in your application and establish the connections
    they will use to communicate with each other. The only thing remaining is the
    actual classes that implement those roles.


    The next few sections will examine each MVC role and introduce you to the basic
    set of Objective-C and Cocoa technologies used to implement your own. The views
    section describes the visual hierarchy of windows and their contents, how view
    objects work, the graphics coordinate system, and the primitive drawing tools
    available to you. Later sections will describe data model objects and the data
    modeling tools for creating them, followed by some of the pre-built controller
    objects that are useful with bindings. In between is a detailed description of
    how user events get to view objects, and how view objects pass the resulting actions
    to their controllers.


    # Views


    The organization of view objects in Cocoa is remarkably similar to that in Java
    Swing and other GUI class libraries. This isn’t surprising, since the logical
    organization of visual elements and controls in a window-based user interface
    is fairly consistent across all modern platforms.


    Table 20-1 lists the principal Swing classes and their Cocoa counterparts.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    ***Table 20-1.** Fundamental Java and Objective-C View Classes*


    | Java (javax.swing) | Cocoa |

    |---|---|

    | `JWindow` | `NSWindow` |

    | `JComponent` | `NSView` |

    | (AbstractButton) | `NSControl` |

    | `JButton` | `NSButton` (style=`NSMomentaryPushInButton`) |

    | `JComboBox` | `NSComboBox` |

    | `JPopupMenu` | `NSPopUpButton` |

    | `JCheckBox` | `NSButton` (style=`NSSwitchButton`) |

    | `JRadioButton` | `NSButton` (style=`NSRadioButton`) |

    | `JSpinner.DateEditor` | `NSDatePicker` |

    | `JSlider` | `NSSlider` |

    | `JLabel` | `NSTextField` |

    | `JTextArea` | `NSTextField` |

    | `JTextField` | `NSTextField` |

    | `JEditorPane` | `NSTextView` |

    | `JPasswordField` | `NSSecureTextField` |

    | `JProgressBar` | `NSProgressIndicator` |

    | `JList` | `NSTableButton` |

    | `JTable` | `NSTableView` |

    | `JTree` | `NSOutlineView`, `NSBrowser` |

    | `JScrollPane` | `NSScrollView` |

    | `JSplitPane` | `NSSplitView` |

    | `JTabbedPane` | `NSTabView` |

    | `JToolbar` | `NSToolbar` |


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    When working with the Cocoa classes, be aware of these key differences: `NSWindow`
    is not a subclass of `NSView` and is not, itself, a view object. Instead, `NSWindow`
    has a `contentView` property that’s the root of the window’s view hierarchy. To
    add subviews to a window, add them to `window.contentView`. This is initially
    a generic `NSView` object that just acts as a container for the subviews, but
    you can replace it with any `NSView` subclass.


    The dimensions of an `NSView` are described by two rectangle properties: its `frame`
    and its `bounds`. The `frame` property describes the position and size of the
    view in its superview, and is expressed in the superview’s coordinate system.
    Thus, an `NSView`’s `frame` is conceptually equivalent to the `bounds` of a `JComponent`.
    An `NSView`’s `bounds` property is the logical dimensions of its content expressed
    in view-relative coordinates, typically with an origin of `(0,0)`. If you do not
    set a custom `bounds`, it will reflect whatever the `frame` is in local coordinates.
    If you set the `bounds` to something different, it defines a local coordinate
    system independent of the `frame` (`bounds`).


    Unlike Swing, all Cocoa view classes that send action events (i.e., all view objects
    that “do something”—push buttons, text fields, sliders, etc.) are subclasses of
    `NSControl`. `NSControl` is conceptually like `AbstractButton`, but is the base
    class for all Cocoa control objects, not just buttons. `NSControl` defines four
    common concepts for all of its subclasses:


    - Controls have a `cell` property that’s an `NSCell` object. The cell performs
    all of the drawing and user interaction for the control; the `NSControl` object
    does not perform any drawing itself. In effect, the `NSCell` is the control’s
    view object and `NSControl` is the controller object. There is a default `NSCell`
    subclass for every instance of the `NSControl` subclass: `NSButton` uses an `NSButtonCell`,
    `NSSlider` uses an `NSSliderCell`, and so on. To customize the look and feel of
    any `NSControl`, replace its `NSCell` with your own custom subclass.

    - Controls send action messages. `NSControl` defines `action` and `target` properties
    that can be set programmatically or in Interface Builder. Typically, a control
    sends its action message whenever it is activated or changed.

    - Controls have an `objectValue` property that defines its content. This is not
    applicable to every `NSControl` subclass, but for controls that represent or display
    a value, this is the object that represents its content. For text fields, it’s
    a plain or formatted string, or anything that can be converted into a string.
    For image views it would an image object. The convenience properties `stringValue`,
    `integerValue`, `doubleValue`, and `floatValue` get or set the `objectValue` property.

    - `NSControl` defines an `enabled` property, which all subclasses are expected
    to honor. `NSControl` also defines a common set of editing, validation, and formatting
    behavior that is applicable to some subclasses.


    To remove an `NSView` from its superview, send the `NSView` object a `-removeFromSuperview`
    message, or `-removeFromSuperviewWithoutNeedingDisplay` if you want to suppress
    an automatic redraw. This differs from Java, where you must tell the superview
    to remove the particular component.'
