- fmt: "# Distributed Notifications and Distributed Objects\n\n`Distributed notifications`\
    \ and `distributed objects` are the two principal high-level inter-process communications\
    \ technologies. These are both object-oriented facilities that automatically archive\
    \ or serialize object data so that it can be transported to another process or\
    \ system. `Ports`, `pipes`, or `sockets` are employed to transport the serialized\
    \ data.\n\nThis section will briefly describe the Objective-C interfaces to ports,\
    \ pipes, and sockets. It will then touch on distributed notifications before getting\
    \ to distributed objects. Distributed objects are the apex of object-oriented\
    \ inter-process communications, and consume most of the rest of this chapter.\n\
    \n## Low-Level Communications\n\nObjective-C has four key classes that represent\
    \ a source of serial or sequential data:\n\n- `NSPort`\n- `NSPipe`\n- `NSStream`\n\
    - `NSFileHandle`\n\nThere is a huge amount of overlap between the capabilities\
    \ and functionality of these classes.\n\nIt’s possible, for example, to connect\
    \ to a BSD socket using `NSPort`, `NSPipe`, and `NSFileHandle`. All allow you\
    \ to send and receive serial data through the conduit. Which you use will be dictated\
    \ largely by the context of where you need them. A data source that will be processed\
    \ by a run loop must be a subclass of `NSPort`. The POSIX pipes that connect processes\
    \ (better known as standard in, standard out, and standard error) can be either\
    \ `NSPipe` or `NSFileHandle` objects. Network services provide `NSStream` objects\
    \ for communicating with the connected process.\n\n## NSPort\n\n`NSPort` is the\
    \ base class that connects a data source to a run loop. Messages pushed onto the\
    \ port are processed by the run loop. `NSMachPort` is a subclass that connects\
    \ to a Mach kernel port for direct process-to-process communications. `NSSocketPort`\
    \ can be connected to BSD pipes or sockets providing equivalent functionality\
    \ between processes and systems. `NSPorts` are the foundation for distributed\
    \ objects, several of which are demonstrated in the “Distributed Objects” section\
    \ later in this chapter.\n\n`NSMachPort` is extremely efficient and the most common\
    \ type of port used by run loops. User events, system events, deferred messages,\
    \ timer events, and many other low-level messages are all processed by an application\
    \ through its run loop. Most events are pushed onto the run loop’s Mach port by\
    \ the system or from within the application. Mach ports can also be used to send\
    \ messages between processes. The one limitation is the security model of the\
    \ operating system. All Mach kernel ports exist within a domain called a bootstrap\
    \ namespace. A bootstrap namespace is created for each user that logs into a Mac\
    \ OS X system. A process can only connect with the Mach ports in its namespace\
    \ and its parent namespaces. Thus, an application could use Mach ports to establish\
    \ communications with another process started by the same user, or a system daemon,\
    \ but not with a process started by another user.\n\n`NSSocketPorts` are used\
    \ when a run loop needs to communicate with a process outside its bootstrap namespace\
    \ or possibly with another computer system. `NSSocketPorts` can be connected to\
    \ a variety of different sources; the two most useful are BSD pipes and sockets.\
    \ A pipe can be a named pipe in the file system. File system names are public\
    \ to all processes, and provide a means for two processes in different bootstrap\
    \ namespaces to communicate. Network sockets allow two processes to exchange data\
    \ using a network transport protocol. The advantage is that the other process\
    \ could be running on the same machine or one thousands of miles away. The disadvantage\
    \ is that network ports are typically accessible from outside the computer system,\
    \ which might not be appropriate for some communications and has security implications.\n\
    \n## NSPipe\n\n`NSPipe` is little more than a wrapper for a pair of `NSFileHandle`\
    \ objects. An `NSPipe` is used to interact with BSD pipes. Often, these are the\
    \ traditional standard in, standard out, and standard error pipes that connect\
    \ processes. Listing 13-1 shows how to launch an executable and capture the text\
    \ output of the new process.\n\n### Listing 13-1. Capturing Standard Out\n\n**Java**\n\
    \n```java\nProcessBuilder pb = new ProcessBuilder(\"/bin/echo\",\"Hello, Objective-C\"\
    );\ntry {\n    Process echo = pb.start();\n    InputStream stdOut = echo.getInputStream();\n\
    \    int c = (int)' ';\n    System.out.print(\"echo says:\");\n    do {\n    \
    \    System.out.print((char)c);\n        c = stdOut.read();\n    } while (c!=(-1));\n\
    } catch (IOException e) {\n    e.printStackTrace();\n}\n```\n\n**Objective-C**\n\
    \n```objc\nNSTask *echo = [NSTask new];\nNSPipe *stdOut = [NSPipe pipe];\n[echo\
    \ setLaunchPath:@\"/bin/echo\"];\n[echo setArguments:[NSArray arrayWithObject:@\"\
    Hello, Objective-C\"]];\n[echo setStandardOutput:stdOut];\n[echo launch];\n\n\
    NSFileHandle *outStream = [stdOut fileHandleForReading];\nNSData *output = [outStream\
    \ readDataToEndOfFile];\nNSLog(@\"echo says: %@\",[NSString stringWithCString:[output\
    \ bytes]\n                                            length:[output length]]);\n\
    ```\n\nIn Java, the `java.lang.Process` object creates the required `java.io.InputStream`\
    \ or `java.io.OutputStream` objects and provides them to you. In Objective-C,\
    \ everything is backwards. You create the `NSPipe` or `NSFileHandle` object you\
    \ want to communicate through, then pass it in a `-setStandardInput:`, `-setStandardOutput:`,\
    \ or `-setStandardError:` message. This must be done before the process is launched.\
    \ When launched, `NSTask` will connect the pipe or file handle you provided to\
    \ the actual pipe attached to the process. Also note that the terminology is reversed.\
    \ In Objective-C, the `standardOut` property is the standard out of the process\
    \ (i.e., the process’s output). In Java, `java.lang.Process.getInputStream` gets\
    \ the `InputStream` connected to the process’s standard out. In other words, pipe\
    \ identities in Objective-C are from the perspective of the process. In Java,\
    \ they are from the perspective of the parent process.\n\nTo get the actual input\
    \ data, the `NSFileHandle` for reading is obtained from the pipe. It’s possible\
    \ to bypass using `NSPipe` altogether, as the `-setStandardInput:`, `-setStandardOutput:`,\
    \ and `-setStandardError:` messages all accept `NSFileHandle` objects too. So\
    \ the code in Listing 13-1 could be easily rewritten to set an `NSFileHandle`\
    \ as its connection to standard out. The effect would be the same.\n\n## NSFileHandle\n\
    \n`NSFileHandle` is the general purpose wrapper for a POSIX file. When used with\
    \ pipes and sockets, they become stream interfaces. `NSFileHandle` methods were\
    \ described in the Files chapter. When used with a pipe file, methods that don’t\
    \ make sense on a serial data—particularly `-offsetInFile`, `-seekToFileOffset:`,\
    \ and `-seekToEndOfFile`—should not be used. Unidirectional output pipes should\
    \ not be sent any `-read…` messages, and unidirectional input pipes will not accept\
    \ the `-writeData:` message.\n\nAs with Java `InputStreams`, the logical end of\
    \ file (EOF) condition only exists when the input side of the pipe is closed.\
    \ Thus, the `-[NSFileHandle readDataToEndOfFile]` method in Listing 13-1 suspends\
    \ until the other end of the pipe is closed, even if all of the data in the pipe\
    \ has already been read.\n\nThe `NSFileHandle` methods `-readInBackgroundAndNotify`,\
    \ `-readToEndOfFileInBackgroundAndNotify`, and `-waitForDataInBackgroundAndNotify`\
    \ become particularly useful when used with pipes and sockets. These messages\
    \ create a new thread that waits for data to appear in the pipe, and then posts\
    \ a notification which your application can observe. `-waitForData…` merely notifies\
    \ you that data has become available, but doesn’t read any of it. `-readInBackground…`"
