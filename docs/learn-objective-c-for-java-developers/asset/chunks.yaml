    The basic design of the Java Matrix class, shown in Listing 22-1, is straightforward.
    It encapsulates a two-dimensional matrix of floating-point numbers. A new Matrix
    object is created from a one-dimensional array of numbers and is immutable. The
    dimensions of the matrix are obtained through the row and column properties. Matrix
    operations are performed by the add(Matrix), multiply(Matrix), multiply(double),
    and transpose() methods. An identity property returns true if the object represents
    an identity matrix.


