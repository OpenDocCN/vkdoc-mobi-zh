- fmt: "Mutable set objects can be initialized with an initial capacity, which can\
    \ help optimize its performance. An accurate initial capacity is most helpful\
    \ when creating large sets.\n\n### `NSCountedSet`\n\n`NSCountedSet` is a subclass\
    \ of `NSMutableSet` that allows a single object to be added to the set multiple\
    \ times. In essence, it treats every object added to the set as a distinct, although\
    \ indistinguishable, entity.\n\nInternally, the set maintains a single reference\
    \ to the object and a count of the number of times it has been added to the set.\
    \ To remove an object, the set must receive one `-removeObject:` message for each\
    \ `-addObject:` message previously received. The method `-countForObject:` will\
    \ return the number of `-addObject:` messages, less the number of `-removeObject:`\
    \ messages, received for that object.\n\n### `NSIndexSet`\n\n`NSIndexSet` is a\
    \ special collection class that maintains a set of integer values, much like `java.util.BitSet`.\n\
    \nTables 16-11 and 16-12 list the common methods in Java and Objective-C.\n\n\
    **Table 16-11.** Common Index Set Collection Methods\n\n| `java.util.BitSet` |\
    \ `NSIndexSet` |\n| --- | --- |\n| `cardinality()` | `count` |\n| | `countOfIndexesInRange:`\
    \ |\n| `get(int)` | `containsIndex:` |\n| | `containsIndexes:` |\n| | `containsIndexesInRange:`\
    \ |\n| `intersects(BitSet)` | `intersectsIndexesInRange:` |\n| | `firstIndex`\
    \ |\n| `length()` | `lastIndex` |\n| | `indexLessThanIndex:` |\n| | `indexLessThanOrEqualToIndex:`\
    \ |\n| `nextBitSet(int)` | `indexGreaterThanOrEqualToIndex:` |\n| | `indexGreaterThanIndex:`\
    \ |\n| `get(int,int)` | `getIndexes:maxCount:inIndexRange:` |\n\n**Table 16-12.**\
    \ Common Mutable Index Set Collection Methods\n\n| `java.util.BitSet` | `NSMutableIndexSet`\
    \ |\n| --- | --- |\n| `set(int)` | `addIndex:` |\n| `or(BitSet)` | `addIndexes:`\
    \ |\n| `set(int,int,true)` | `addIndexesInRange:` |\n| `clear(int)` | `removeIndex:`\
    \ |\n| `andNot(BitSet)` | `removeIndexes:` |\n| `clear()` | `removeAllIndexes`\
    \ |\n| `clear(int,int)` | `removeIndexesInRange:` |\n| | `shiftIndexesStartingAtIndex:by:`\
    \ |\n\nThe common functionality of `NSIndexSet` and `java.util.BitSet` is smaller\
    \ than most of the other collection classes. The Java class has a number of methods\
    \ for flipping bits and performing Boolean operations that the Objective-C class\
    \ lacks.\n\nThe primary use of `NSIndexSet` is to efficiently encapsulate an arbitrary\
    \ subset of an ordered collection. The `NSArray` classes and user interface display\
    \ classes use them extensively. For example, a table view returns the user’s current\
    \ selection as an `NSIndexSet` that identifies the selected rows. The interface\
    \ has a number of methods, such as `-indexLessThanIndex:`, that make it easy to\
    \ iterate through the collection in any direction.\n\n### `NSHashTable`\n\n`NSHashTable`\
    \ is the sister class to `NSMapTable`. Like `NSMapTable`, it is constructed using\
    \ a set of delegate functions that define its behavior. Also like `NSMapTable`,\
    \ it only accepts a limited number of function pointer options, listed in Table\
    \ 16-13. See the sections `NSMapTable` and `NSPointerArray` for an explanation\
    \ of these function pointer options.\n\n**Table 16-13.** `NSMapTable` Options\n\
    \n| `NSHashTable` Synonym | `NSPointerArray` |\n| --- | --- |\n| `NSHashTableStrongMemory`\
    \ | `NSPointerFunctionsStrongMemory` |\n| `NSHashTableZeroingWeakMemory` | `NSPointerFunctionsZeroingWeakMemory`\
    \ |\n| `NSHashTableCopyIn` | `NSPointerFunctionsCopyIn` |\n| `NSHashTableObjectPointerPersonality`\
    \ | `NSPointerFunctionsObjectPointerPersonality` |\n\nThe only significant difference\
    \ between `NSHashTable` and `NSMapTable` is that `NSHashTable` is a set and only\
    \ needs a single set of function pointers to define its behavior.\n\n> **Note:**\
    \ Don’t confuse `NSHashTable` (the class) with `NSHashTable` (the C type). The\
    \ latter belongs to an older C API that implements low-level hash tables. The\
    \ Objective-C `NSHashTable` class subsumes much of its functionality.\n\n### Composite\
    \ Pattern\n\nOne aspect of the Composite Pattern is the ability to interact with\
    \ groups of objects through a single object. The `NSArray` and `NSSet` classes\
    \ each provide two methods that let you send a single messages to all of the objects\
    \ in a collection:\n\n- `(void)makeObjectsPerformSelector:(SEL)aSelector`\n- `(void)makeObjectsPerformSelector:(SEL)aSelector\
    \ withObject:(id)anObject`\n\nThe code in Listing 16-4 demonstrates how to send\
    \ a message to every object in a collection.\n\n**Listing 16-4.** Composite Message\n\
    \n**Java**\n\n```java\nArrayList<Example> array = …\nfor ( Example example : array\
    \ ) {\n   example.setDelegate(this);\n}\n```\n\n**Objective-C**\n\n```objc\nNSArray\
    \ *array = …\n[array makeObjectsPerformSelector:@selector(setDelegate:) withObject:self];\n\
    ```\n\n### Collection Equality Contracts\n\nCollection search and sorting features\
    \ depend on objects responding to the `-isEqual:` message in a consistent and\
    \ reasonable manner. This is called the equality contract. The set and dictionary\
    \ collections locate objects through the use of a hash table. This depends on\
    \ an object’s `-hash` message returning a consistent value that has a predictable\
    \ relationship to the `-isEqual:` response. This is called the hash contract.\n\
    \nThe equality and hash contracts are identical to those in Java. The equality\
    \ contract is as follows:\n\n1. Two objects with equivalent values must return\
    \ `YES` from `-isEqual:`, and `NO` otherwise.\n2. Two object pointers that are\
    \ equal are always considered equal, and identical. Thus, `[self isEqual:self]`\
    \ always returns `YES`.\n3. A valid object pointer and a `nil` object pointer\
    \ are always considered not equal. The statement `[self isEqual:nil]` must always\
    \ return `NO`.\n4. `[a isEqual:b]` must always return the same value as `[b isEqual:a]`.\n\
    \nThe equality contract rules must be considered in order. For example, rule 2\
    \ supersedes rules 3 and 4 in the special case where both object pointers are\
    \ `nil`; `nil` is always equal to `nil`.\n\nThe hash contract is simple and also\
    \ consistent with Java’s:\n\n1. Two objects that are equal (`[a isEqual:b]==YES`)\
    \ must return the same hash value (`[a hash]==[b hash]`).\n2. Ideally, objects\
    \ that are different (`[a isEqual:b]==NO`) should return hash values that are\
    \ significantly different and evenly distributed across a large integer range.\n\
    \nThe `-isEqual:` and `-hash` methods are defined in `NSObject`, so every object\
    \ inherits them. The default implementation of `-hash` is not, however, suitable\
    \ for use in sets and dictionaries. If you create a subclass of `NSObject` that\
    \ you plan to use in a collection, you should override `-isEqual:` and implement\
    \ the equality contract. If the object will be stored in a set or used as a key\
    \ in a dictionary, you must also override `-hash` to implement the hash contract.\
    \ Listing 16-5 shows correctly implemented equality and hash methods.\n\n**Listing\
    \ 16-5.** Equality and Hash Methods\n\n```objc\n@interface AircraftIdentifier\
    \ : NSObject {\n    NSString *registrationNumber;\n    unsigned int transponderCode;\n\
    }\n@property (readonly) NSString *registrationNumber;\n@property unsigned int\
    \ transponderCode;\n- (id)initWithRegistrationNumber:(NSString*)registration;\n\
    @end\n\n@implementation AircraftIdentifier\n@synthesize registrationNumber, transponderCode;\n\
    \n- (id)initWithRegistrationNumber:(NSString*)registration\n{\n    self = [super\
    \ init];\n    if (self != nil) {\n        registrationNumber = registration;\n\
    \        transponderCode = 1200; // default for VFR\n    }\n    return self;\n\
