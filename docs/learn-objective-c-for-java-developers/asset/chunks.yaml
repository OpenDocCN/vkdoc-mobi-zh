    **C H A P T E R 2 3**


    ■ ■ ■


    Singleton Pattern


    Singletons are classes with a single instance. They are usually objects that provide
    an object-oriented interface to a single, often global, facility or resource.
    A class that manages a cache of database objects would want to create a single
    per-process instance of itself so that it could coordinate all of the object caching
    for the entire application. A class that provides file management methods could
    create a singleton object that all other classes would use to interact with the
    file system. The latter could also be implemented by defining a class that consists
    of nothing but class methods, but that pattern is unusual in Objective-C.


    Singleton objects are typically created by an idempotent class method or C function
    that’s responsible for creating and maintaining the single instance of the class.
    This is essentially a specialized factory method, described in Chapter 22\. Like
    factory methods, singletons can be implemented using class methods or a degenerate
    variation of a class cluster.


    Implementing Singletons


    The following are examples of singleton objects in the Cocoa framework:


    • NSApplication


    • NSFileManager


    • NSDistributedNotificationCenter


    • NSWorkspace


    Singletons are sometimes created during startup, but are usually provided through
    an idempotent method that returns the reference to the singleton, creating it
    for the first time if necessary.


    In the Cocoa framework, the following class methods return the singletons for
    the classes listed above:


    • [NSApplication sharedApplication]


    • [NSFileManager defaultManager]


    • [NSDistributedNotificationCenter defaultCenter]


    • [NSWorkspace sharedWorkspace]


    A typical implementation of the singleton pattern is shown in Listing 23-1.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 23 ■ SINGLETON PATTERN


    Listin g 23-1\. Singleton Pattern


    **Java**


    public class CommandCenter {


    private static CommandCenter sharedCommandCenter;


    public static CommandCenter getCommandCenter( )


    {


    if (sharedCommandCenter==null) {


    sharedCommandCenter = new CommandCenter();


    }


    return sharedCommandCenter;


    }


    }


    **Objective-C**


    @interface CommandCenter : NSObject


    + (CommandCenter*)sharedCommandCenter;


    @end


    static CommandCenter *SharedCommandCenter;


    @implementation CommandCenter


    + (CommandCenter*)sharedCommandCenter


    {


    if (SharedCommandCenter==nil) {


    SharedCommandCenter = [CommandCenter new];


    }


    return SharedCommandCenter;


    }


    @end


    The exact same pattern can be implemented in Java or Objective-C. However, Objective-C


    presents two alternatives to the typical singleton design pattern. The first is
    to use the class’s +initialize method, and the second is a variation on class
    clusters. Both are explored in the next sections.


    Lazy Singletons


    Most singletons are lazy; they are spontaneously constructed the first time they
    are requested. An alternative to implementing this yourself is to exploit the
    lazy initialization of the class itself, as demonstrated in Chapter 21\. Basically,
    the singleton object is created the first time the class receives a message by
    overriding its +initialize class method. A rewriting of the CommandCenter class
    is shown in Listing 23-2.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 23 ■ SINGLETON PATTERN


    Listin g 23-2\. Lazy Singleton Pattern


