    \ Java 和 Objective-C 中的默认方式。浅拷贝创建一个新对象，其实例变量包含与原始对象相同的值。之所以称为浅拷贝，是因为复制后的对象将引用原始对象所引用的所有相同对象。对于不可变对象的引用，这是首选结果，因为它避免了不必要的对象重复。然而，对于可变对象，更改某个属性值也会影响副本的值。要真正独立于原始对象，复制的对象必须递归地复制其引用的任何可变对象，这称为深拷贝。\n\
