  trans: '

    # Java 与 Objective-C 中的对象序列化


    对象序列化是 Java 的定义性特征之一，主要由 Java 运行时实现。秉承其极简主义特性，对象序列化并非 Objective-C 语言的原生组成部分。


    对象归档（序列化）是通过一组实现序列化过程的类，以及一个对象为了能被归档（序列化）而必须遵循的协议（接口）来完成的。


    Java 最大的优势在于序列化是语言的一部分。对象的所有成员变量都会被自动序列化。而在 Objective-C 中，除非程序员提供相应代码，否则对象的任何部分都不会被序列化。除此之外，你为准备对象进行序列化、执行序列化和反序列化所需采取的步骤却惊人地相似。Java
    和 Objective-C 都允许你自定义序列化过程，并且都提供了处理向前兼容和向后兼容的机制。


    本章将介绍 Objective-C 归档（序列化）和 Objective-C 序列化——请注意不要与 Java 序列化混淆。本章会解释 Objective-C
    提供的不同类型的归档，以及让你的类可归档所需采取的步骤。同时还会涵盖常见的归档问题及其解决方法。最后，将简要介绍对 Objective-C 序列化和 XML
    文档（序列化的其他形式）的支持，以及如何创建对象的简单内存副本。


    ## 归档


    你在 Java 中认为的序列化，在 Objective-C 中被称为归档：一个对象图被编码成非人类可读的二进制数据流。这种与架构无关的数据之后可以被解码，以实例化一个等价的对象图。Objective-C
    所谓的序列化略有不同，将在本章后面部分介绍。


    在 Java 中，主要负责序列化对象的类是 `java.io.ObjectOutputStream` 和 `java.io.ObjectInputStream`。它们获取对象引用和原始值，并将其“扁平化”到连续的
    `java.io.OutputStream` 中，或者从 `java.io.InputStream` 中读取序列化数据并将其还原为对象。要使对象能够包含在流中，它必须实现
    `java.io.Serializable` 接口。Java 运行时使用内省机制来自动编码对象的实例变量。


    你可以通过使用 Java 的 `transient` 关键字或自定义序列化过程来影响这一行为。


    在 Objective-C 中，实现序列化的类是 `NSCoder` 的子类。


    从概念上讲，`NSCoder` 同时实现了 `ObjectOutputStream` 和 `ObjectInputStream` 的功能。`NSCoder`
    基类实现了用于编码和解码对象的抽象方法，但 `NSCoder` 的子类可以选择仅实现其一半的功能。与 Java 类似，支持归档的 Objective-C 类必须遵循
    `NSCoding` 协议（接口）。与 Java 不同的是，`NSCoding` 并非空协议；它声明了两个必须由类实现的方法：`-initWithCoder:`
    和 `-encodeWithCoder:`。`-encodeWithCoder:` 消息用于归档接收者。`-initWithCoder:` 是一个备用的 `-init`
    方法，用于初始化在解码过程中创建的新对象。


    ## 归档类型


    Objective-C 实际上提供了三种不同类型的归档，如表 12-1 所示。


    **表 12-1. 归档类型**


    | 类型                 | NSCoder 类                        | 描述                                                         |

    | -------------------- | -------------------------------- | ------------------------------------------------------------
    |

    | 键值归档             | `NSKeyedArchiver`, `NSKeyedUnarchiver` | 使用键/值对来归档对象属性。这是归档文档数据或其他持久化对象的首选方法。
    |

    | 顺序归档             | `NSArchiver`, `NSUnarchiver`     | 通过按特定顺序写入属性值来归档对象。作为持久化存储格式，其使用已被弃用。
    |

    | 分布式对象           | `NSPortCoder`                    | 使用顺序编码来归档对象，用于与其他线程、进程和远程系统交换。
    |


    键值归档会将每个属性值与程序员分配的“键”字符串关联起来。

    '
- fmt: "Java serialization is similar, but the keys are always the names of the member\
    \ variables. It is a particularly flexible and robust format that tolerates changes\
    \ to the class definition. By using keys, the order in which the properties are\
    \ encoded in the stream is irrelevant. This permits you to add new properties,\
    \ or reorder existing properties, without breaking compatibility with archives\
    \ created using an older version of the class. You can also provide forward compatibility,\
    \ allowing older versions of your application to decode an archive written by\
    \ a newer version. Keyed archiving produces more serialized data, but is ultimately\
    \ much more flexible and stable. For this reason, it’s the recommended archive\
    \ format for document data or any set of objects that are intended to be stored\
    \ on persistent media for later reconstitution.\n\nSequential archiving encodes\
    \ unadorned values into the data stream in a predetermined order. No property\
    \ names or keys are used to identify the values, nor does it include any type\
    \ information. To reconstruct the object, the values must be decoded in the same\
    \ order. While fast and compact, the data format is “fragile.” Any change to the\
    \ order, number, or type of values will make it incompatible with an archive data\
    \ stream created by a different version. Objective-C addresses this problem by\
    \ using class versions. A newer version of a class can recognize and assimilate\
    \ archive data created by an older version. While providing backward compatibility,\
    \ it does not provide forward compatibility and the solutions tend to be awkward.\
    \ For these reasons, sequential archiving is not recommended for document data\
    \ or other persistent objects. However, that’s not to say that sequential archiving\
    \ isn’t used.\n\nDistributed objects uses sequential archiving—with a few extra\
    \ wrinkles—to quickly and efficiently exchange objects with other processes. It\
    \ might be another thread in the same process, another process on the same system,\
    \ or a remote system half way around the world. The encoding and decoding technique\
    \ remains the same, only the data transport changes. Because distributed objects\
    \ uses sequential archiving, it is subject to all of the same disadvantages. However,\
    \ version differences between processes are often limited or can be tightly controlled.\
    \ For example, a client application might launch a helper process and communicate\
    \ with it using distributed objects. The helper executable is part of the application’s\
    \ resource bundle, so is guaranteed to contain the same version of the classes\
    \ being used by the client—making data compatibility immaterial.\n\nDocumentation\
    \ for Objective-C archiving will repeat, ad nauseam, that sequential archiving\
    \ is deprecated and you should implement keyed archiving instead. That is true\
    \ for data model objects that you intend to store in document files, preferences,\
    \ or other persistent locations. However, distributed objects uses sequential\
    \ archiving. To use your objects in a distributed environment, your classes must\
    \ implement sequential archiving, and understanding distributed objects requires\
    \ a firm grasp of archiving. This chapter will explain how to implement both.\
    \ The features that distinguish distributed objects from plain sequential archiving\
    \ are described in Chapter 13.\n\n## Archive Coders\n\nUsing the archive coder\
    \ classes to encode and decode objects isn’t all that much different than it is\
    \ in Java. Listing 12-1 shows how to archive (serialized) and unarchive a single\
    \ object in both Java and Objective-C.\n\n**Listing 12-1.** Archiving and Unarchiving\
    \ an Object\n\n**Java**\n\n```\nObject something = …\nByteArrayOutputStream outStream\
    \ = null;\nObjectOutputStream objectEncoder = null;\ntry {\n    outStream = new\
    \ ByteArrayOutputStream();\n    objectEncoder = new ObjectOutputStream(outStream);\n\
    \    objectEncoder.writeObject(something);\n    objectEncoder.close();\n}\ncatch\
    \ (IOException ioException) {\n    ioException.printStackTrace();\n}\nbyte[] bytes\
    \ = outStream.toByteArray();\n…\n```"
