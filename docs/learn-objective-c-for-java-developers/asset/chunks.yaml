  trans: "\n扩展的 `@interface` 指令与分类相同，唯一的区别在于分类名称为空。扩展没有独立的 `@implementation`。在扩展中声明的方法必须在类的\
    \ `@implementation` 中实现，并与类的其他常规方法放在一起（参见列表 5-10）。\n\n**列表 5-10.** 扩展\n\n```objc\n\
    @interface CaseDocument : NSObject {\n@private\n    CaseNumber caseNumber;\n}\n\
    \n- (CaseNumber)caseNumber;\n\n@end\n\n@interface CaseDocument ()\n\n- (void)setCaseNumber:(CaseNumber)number;\n\
    \n@end\n\n@implementation CaseDocument\n\n- (CaseNumber)caseNumber { return (caseNumber);\
    \ }\n- (void)setCaseNumber:(CaseNumber)number { caseNumber = number; }\n\n@end\n\
    ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 5 章：探索协议与分类\n\n\
    假设列表 5-10 中的第一个 `@interface` 指令存储在 `CaseDocument.h` 文件中，并被使用 `CaseDocument` 类的其他模块导入。扩展的\
    \ `@interface` 可以在其自己的头文件中，也可以是 `CaseDocument` 实现文件的一部分。无论哪种方式，扩展中的方法都不是公开的，这使得\
    \ `caseNumber` 属性对于其他模块表现为不可变的，但在类内部实现中却是可变的。在编译扩展声明时，也要同时编译原始类的声明。当编译器能够将扩展与类关联起来时，其工作效果最佳。\n\
    \n请记住，分类和扩展只是从编译器和程序员的角度隐藏了方法的声明。在运行时，所有这些方法都存在，并且可以通过内省机制发现。在列表 5-10 的 `CaseDocument`\
    \ 示例中，`caseNumber` 属性对于键值观察等技术而言将是可变的。这些技术会在运行时动态检查对象，以确定它是否实现了 `caseNumber` 属性的\
    \ getter 和 setter 方法对——而 `CaseDocument` 确实实现了。为了让 `caseNumber` 对内省机制表现为只读属性，内部方法\
    \ `setCaseNumber:` 应重命名为类似 `-(void)assignToCase:(CaseNumber)number`。这打破了属性的命名约定，使得\
    \ `caseNumber` 只有 getter 方法而没有 setter 方法。\n\n**总结**\n\n可以看出，Objective-C 的协议和分类比\
    \ Java 的接口更加灵活和动态。\n\n它们可以声明可选方法，将类的实现细分为多个模块，以及为其他类增加新功能。\n\n类、协议和分类涵盖了声明方法的所有技术。下一章将解释调用方法的各种方式。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 6 章**\n\n■ ■ ■\n\n**发送消息**\n\
    \n发送消息（调用方法）是编程的基础。你已经了解了 Objective-C 消息的基础知识。本章深入探讨消息发送的机制，描述三种通过编程方式调用方法的不同技术，并解释如何编写接受可变数量参数的方法。虽然并非必须详细了解这些主题，但扩展知识面可以使通知、动作、远程调用和键值观察等技术更容易理解。\n\
    \n正如第 3 章简要说明的那样，Objective-C 中的方法并非像 Java 那样被调用。\n\n消息通过动态派发函数发送给对象。向对象发送消息大致涉及以下步骤：\n\
    \n1.  消息参数被组装并复制到堆栈上。\n2.  指向接收者的指针和消息选择器常量被复制到堆栈上。\n3.  调用消息派发函数。在苹果的 Objective-C\
    \ 实现中，通常调用的函数是 `objc_msgSend()`，但通常来说，最好忽略运行时系统的实现细节。\n4.  如果接收者值为 `nil`，派发函数立即返回。\n\
    5.  消息派发函数使用接收对象的指针来获取其 `isa` 实例变量。该变量指向对象的 `Class` 对象，其中包含该类的派发表。\n6.  使用选择器在派发表中查找方法代码的地址。\n\
    7.  CPU 的程序计数器加载该地址，并开始执行方法的代码。\n8.  执行一直持续到方法结束，程序控制权返回到最初发送消息的代码。\n\n**注意**\
    \ 消息派发看起来可能是一个复杂且低效的过程，但它已经过高度优化。\n\n选择器是常量，方法派发表也被缓存。在大多数情况下，在现代系统上发送一条消息只需要几纳秒。对于性能敏感的应用程序，甚至可以消除此开销（参见本章末尾的“直接调用方法”）。通常情况下，不必过分担心消息的性能问题。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 6 章：发送消息\n\n类方法会将所有消息参数作为自动变量接收，包括接收者和选择器。`self`\
    \ 变量包含指向接收者的指针，`_cmd` 变量包含消息选择器。`_cmd` 变量通常不引人注意，因为它总是该方法的选择器。\n\n### 编译消息\n\n\
    Objective-C 编译器将每个方法调用转换为将发送消息的机器指令。为了生成正确的机器指令，编译器必须知道每个参数的大小和类型以及返回值的类型。\n\n\
    Java 会不遗余力地确保编译器确切知道如何构造每个方法调用。Java 总是拥有每个类的详细信息，对象引用的类总是已知的，并且 Java 方法签名确保方法期望的参数类型永远不会存在任何歧义。可以想象，Objective-C\
    \ 则要宽松得多。这偶尔会导致方法调用的确切含义变得模糊不清。我将解释为什么会发生这种情况以及你可以采取哪些措施来纠正它。\n\n请记住这些属于特殊情况。绝大多数情况下，编译器确切知道该怎么做。如果接收者的变量类型是指向特定类的指针，并且该类的原型已经编译过，那么编译器就拥有了所需的所有信息。\n\
    \n然而，如果编译器尚未编译该方法的原型，或者接收者的类不明确（例如 `id`），则编译器必须要么猜测参数的类型，要么从其已知的方法原型中任意选择一个。\n\
    \n### 未声明的方法\n\n第一种情况发生在方法原型从未被编译时，其原因可能是类定义被遗漏，或者类定义不完整——该方法可能在该类的某个分类中声明，或者根本没有声明。当发生这种情况时，如列表\
    \ 6-1 所示，编译器会根据调用推断参数类型。换句话说，编译器会进行猜测。\n\n**列表 6-1.** 未声明的方法调用\n\n```objc\n@class\
    \ ToasterController;\nToasterController *toaster;\n…\n[toaster setDarkness:1];\n\
    ```\n\n**警告：未找到方法‘-setDarkness:’**\n"
- fmt: "**warning: (Messages without a matching method signature will be assumed to\
    \ return `id` and accept `...` as arguments.)** The code in Listing 6-1 results\
    \ in a “no method found” compiler warning. The compiler has no knowledge of a\
    \ method named `-setDarkness:`. Without any information, it assumes that the parameters\
    \ of the message are the same types as those in the invocation, and that the method\
    \ returns an object identifier (object pointer of type `id`). Assuming that the\
    \ `ToasterController` class is the one from the previous chapter, the compiler\
    \ will generate erroneous code. That’s because the parameter in the invocation\
    \ is an integer, but the actual `-setDarkness:` method expects a `float`. Integer\
    \ and floating-point values are not interchangeable, so the `-setDarkness:` method\
    \ will receive a garbage value instead.\n\nThe solution to this problem is simple:\
    \ include the method declaration. The module that includes this code should have\
    \ used an `#import` directive, as shown in Listing 6-2. Now the compiler has the\
    \ method prototype for the class. It knows that the `-setDarkness:` method takes\
    \ a `float` parameter and the compiler correctly promotes the integer constant\
    \ to a floating-point value before sending the message.\n\n```\nListing 6-2. Declared\
    \ Method Invocation\n\n#import \"ToasterController.h\"\n\nToasterController *toaster;\n\
    \n…\n\n[toaster setDarkness:1];\n```\n\nAs a rule, never ignore “no method found”\
    \ compiler warnings. Always import or declare the classes and methods you employ.\
    \ There’s rarely any good reason why you can’t include the needed declarations,\
    \ and it ensures correctly compiled code.\n\n## Ambiguous Methods\n\nA subtler\
    \ problem occurs when the type of the receiver is unknown (type `id`) or incomplete\
    \ (defined only by a `@class` directive), but the compiler has seen at least one\
    \ method prototype matching its identifier.\n\nIn these cases, the compiler confidently\
    \ assumes that the receiver implements the method you invoked—you’re the programmer;\
    \ you must know you’re doing, right? It searches through all known method prototypes\
    \ and compiles the message using the first method identifier matching the statement.\n\
    \nIn most cases this works fine. Statistically, method identifiers tend to be\
    \ unique or functionally identical. In the entirety of the Cocoa framework (which\
    \ is quite large), there is only one `-setLocation:` method. There are six different\
    \ `-setTag:` methods implemented by varying classes, but they all have the same\
    \ prototype (`-(void)setTag:(int)tag`). So it doesn’t matter which prototype the\
    \ compiler chooses to use; the compiled code will be correct.\n\nThe problem occurs\
    \ in the rare case where there are two or more methods with identical identifiers\
    \ but with different parameter or return types (see Listing 6-3). One such case\
    \ is the `-options` message. There are six `-options` methods defined in the Cocoa\
    \ framework. Two return pointers to dictionaries, three return integers, and one\
    \ returns a custom enum value.\n\n```\nListing 6-3. Ambiguous Method Invocation\n\
    \nid mystery;\n\n…\n\nNSDictionary *options = [mystery options];\n\n**warning:\
    \ initialization makes pointer from integer without a cast**\n```\n\nListing 6-3\
    \ sends the `-options` message to the `mystery` object. Without any class information,\
    \ Objective-C uses the first prototype for `-options` that it finds. The warning\
    \ occurs because, again, the compiler has guessed wrong. It used a prototype for\
    \ `-options` that returns an integer instead of a pointer to a dictionary object.\
    \ It is the implied promotion of an integer to a pointer that generates the warning.\n\
    \nTo resolve the ambiguity, cast the receiver. Casting the `mystery` variable\
    \ in Listing 6-4 tells the compiler to assume that the receiver is an `NSTextTab`\
    \ object. The compiler restricts itself to using method prototypes from the `NSTextTab`\
    \ class. It compiles the correct code and no spurious warnings are generated.\
    \ In the second example, the `sidekick` variable is cast to any class conforming\
    \ to the `Communicating` protocol from the previous chapter. Again, the compiler\
    \ restricts the receiver to methods defined in `Communicating`.\n\n```\nListing\
    \ 6-4. Disambiguating Messages\n\nid mystery;\n\nid hero, sidekick;\n\n…\n\nNSDictionary\
    \ *options = [(NSTextTab*)mystery options];\n\n[(id<Communicating>)sidekick sendMessage:@\"\
    Help!\" to:hero];\n```\n\nIf the message is ambiguous because the receiver is\
    \ a class type that hasn’t been defined—it was declared only by a `@class` directive—the\
    \ solution is to `#import` its full declaration.\n\n## Coercion\n\nA typecast\
    \ can be used to intentionally coerce Objective-C into letting you send a method\
    \ that it doesn’t believe the object implements. A `Character` object does not\
    \ accept the `-giveItem:to:` message. If, programmatically, you discover that\
    \ a `Character` object is actually an `Earthling` object (or one of its subclasses),\
    \ you may want to send it a subclass-specific message. Casting lets you override\
    \ the compiler’s normal assumptions about the receiver and compile the appropriate\
    \ method invocation, as shown in Listing 6-5.\n\n```\nListing 6-5. Coercing Method\
    \ Invocation\n\nCharacter *player;\n\nEarthling *hero;\n\nThing *secret;\n\n…\n\
    \nif ([player respondsToSelector:@selector(giveItem:to:)])\n\n    [(Earthling*)player\
    \ giveItem:secret to:hero]; // assume player is Earthling\n```\n\n## Sending Messages\
    \ Programmatically\n\nObjective-C makes sending messages to objects very easy—not\
    \ just using the method invocation syntax discussed up to this point, but programmatically\
    \ allowing variables to determine what message is sent.\n\nThe ease by which messages\
    \ can be composed programmatically has encouraged its adoption of Objective-C\
    \ in a wide variety of solutions and design patterns. You’ll encounter many services\
    \ that send messages to, or on behalf of, your code using a pointer to the receiver,\
    \ a selector (`SEL`), or both. Some examples include the following:\n\n- **Controls:**\
    \ Every visual control object (button, menu item, checkbox, radio button, slider,\
    \ …) has an action. An action consists of a target property (the receiver) and\
    \ an action property (a selector). When the control is activated, it sends the\
    \ action to the target. See Chapter 20.\n- **Notifications:** Timers and notification\
    \ services send a message to an object when an event occurs. You determine the\
    \ object and the method to invoke using an object identifier and a selector. See\
    \ Chapter 18.\n- **Callbacks:** Components like a model dialog notify your code\
    \ by sending your object the message of your choice when the dialog is dismissed.\n\
    - **Delegates:** The delegate pattern is used extensively in the Cocoa framework.\
    \ The delegate is always a variable. Sometimes the message it receives is also\
    \ variable, determined using a selector you specify. See Chapter 17.\n\nIn Java,\
    \ programmatic method invocation is complex and somewhat cumbersome, involving\
    \ several introspection objects. Often, Java interfaces are defined just so an\
    \ object has a well-defined entry point to receive messages. In Objective-C, a\
    \ simple message is extremely lightweight, requiring only a pointer to the receiver\
    \ and an integer selector. In reality, message selectors are pointers to internal\
    \ runtime data structures, resolved by the linker when the program’s binary is\
    \ loaded into memory. From the programmer’s perspective, selectors should be treated\
    \ as opaque integer constants."
  raw: '**warning: (Messages without a matching method signature will be assumed**
    **warning: to return ''id'' and accept ''...'' as arguments.)** The code in Listing
    6-1 results in a “no method found” compiler warning. The compiler has no knowledge
    of a method named -setDarkness:. Without any information, it assumes that the
    parameters of the message are the same types as those in the invocation, and that
    the method returns an object identifier (object pointer of type id). Assuming
    that the ToasterController class is the one from the previous chapter, the compiler
    will generate erroneous code. That’s because the parameter in the invocation is
    an integer, but the actual -setDarkness: method expects a float. Integer and floating-point
    values are not interchangeable, so the -setDarkness: method will receive a garbage
    value instead.


    The solution to this problem is simple: include the method declaration. The module
    that includes this code should have used an #import directive, as shown in Listing
    6-2\. Now the compiler has 88


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6 ■ SENDING MESSAGES


    the method prototype for the class. It knows that the -setDarkness: method takes
    a float parameter and the compiler correctly promotes the integer constant to
    a floating-point value before sending the message.


    Listin g 6-2\. Declared Method Invocation


    #import "ToasterController.h"


    ToasterController *toaster;


    …


    [toaster setDarkness:1];


    As a rule, never ignore “no method found” compiler warnings. Always import or
    declare the classes and methods you employ. There’s rarely any good reason why
    you can’t include the needed declarations, and it ensures correctly compiled code.


    Ambiguous Methods


    A subtler problem occurs when the type of the receiver is unknown (type id) or
    incomplete (defined only by a @class directive), but the compiler has seen at
    least one method prototype matching its identifier.


    In these cases, the compiler confidently assumes that the receiver implements
    the method you invoked—you’re the programmer; you must know you’re doing, right?
    It searches through all known method prototypes and compiles the message using
    the first method identifier matching the statement.


    In most cases this works fine. Statistically, method identifiers tend to be unique
    or functionally identical. In the entirety of the Cocoa framework (which is quite
    large), there is only one -setLocation: method. There are six different -setTag:
    methods implemented by varying classes, but they all have the same prototype (-(void)setTag:(int)tag).
    So it doesn’t matter which prototype the compiler chooses to use; the compiled
    code will be correct.


    The problem occurs in the rare case where there are two or more methods with identical
    identifiers but with different parameter or return types (see Listing 6-3). One
    such case is the -options message. There are six -options methods defined in the
    Cocoa framework. Two return pointers to dictionaries, three return integers, and
    one returns a custom enum value.


    Listin g 6-3\. Ambiguous Method Invocation


    id mystery;


    …


    NSDictionary *options = [mystery options];


    **warning: initialization makes pointer from integer without a cast** Listing
    6-3 sends the -options message to the mystery object. Without any class information,
    Objective-C uses the first prototype for -options that it finds. The warning occurs
    because, again, the compiler has guessed wrong. It used a prototype for -options
    that returns an integer instead of a pointer to a dictionary object. It is the
    implied promotion of an integer to a pointer that generates the warning.


    To resolve the ambiguity, cast the receiver. Casting the mystery variable in Listing
    6-4 tells the compiler to assume that the receiver is an NSTextTab object. The
    compiler restricts itself to using method prototypes from the NSTextTab class.
    It compiles the correct code and no spurious warnings are generated. In the second
    example, the sidekick variable is cast to any class conforming to the Communicating
    protocol from the previous chapter. Again, the compiler restricts the receiver
    to methods defined in Communicating.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6 ■ SENDING MESSAGES


    Listin g 6-4\. Disambiguating Messages


    id mystery;


    id hero, sidekick;


    …


    NSDictionary *options = [(NSTextTab*)mystery options];


    [(id<Communicating>)sidekick sendMessage:@"Help!" to:hero]; If the message is
    ambiguous because the receiver is a class type that hasn’t been defined—it was
    declared only by a @class directive—the solution is to #import its full declaration.


    Coercion


    A typecast can be used to intentionally coerce Objective-C into letting you send
    a method that it doesn’t believe the object implements. A Character object does
    not accept the -giveItem:to: message. If, programmatically, you discover that
    a Character object is actually an Earthling object (or one of its subclasses),
    you may want to send it a subclass-specific message. Casting lets you override
    the compiler’s normal assumptions about the receiver and compile the appropriate
    method invocation, as shown in Listing 6-5.


    Listin g 6-5\. Coercing Method Invocation


    Character *player;


    Earthling *hero;


    Thing *secret;


    …


    if ([player respondsToSelector:@selector(giveItem:to:)])


    [(Earthling*)player giveItem:secret to:hero]; // assume player is Earthling Sending
    Messages Programmatically


    Objective-C makes sending messages to objects very easy—not just using the method
    invocation syntax discussed up to this point, but programmatically allowing variables
    to determine what message is sent.


    The ease by which messages can be composed programmatically has encouraged its
    adoption of Objective-C in a wide variety of solutions and design patterns. You’ll
    encounter many services that send messages to, or on behalf of, your code using
    a pointer to the receiver, a selector (SEL), or both. Some examples include the
    following:


    Controls: Every visual control object (button, menu item, checkbox, radio button,
    slider, …) has an action. An action consists of a target property (the receiver)
    and an action property (a selector).


    When the control is activated, it sends the action to the target. See Chapter
    20.


    Notifications: Timers and notification services send a message to an object when
    an event occurs.


    You determine the object and the method to invoke using an object identifier and
    a selector. See Chapter 18.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6 ■ SENDING MESSAGES


    Callbacks: Components like a model dialog notify your code by sending your object
    the message of your choice when the dialog is dismissed.


    Delegates: The delegate pattern is used extensively in the Cocoa framework. The
    delegate is always a variable. Sometimes the message it receives is also variable,
    determined using a selector you specify.


    See Chapter 17.


    In Java, programmatic method invocation is complex and somewhat cumbersome, involving
    several introspection objects. Often, Java interfaces are defined just so an object
    has a well-defined entry point to receive messages. In Objective-C, a simple message
    is extremely lightweight, requiring only a pointer to the receiver and an integer
    selector. In reality, message selectors are pointers to internal runtime data
    structures, resolved by the linker when the program’s binary is loaded into memory.
    From the programmer’s perspective, selectors should be treated as opaque integer
    constants.'
  trans: "  \n**警告：没有匹配方法签名的消息将被假定返回`id`并接受`...`作为参数。** 清单 6-1 中的代码会导致编译器发出“未找到方法”的警告。编译器不知道名为`-setDarkness:`的方法。在没有任何信息的情况下，它假设消息的参数类型与调用中的参数类型相同，并且该方法返回一个对象标识符（类型为`id`的对象指针）。假设`ToasterController`类是上一章中的那个类，编译器将生成错误的代码。这是因为调用中的参数是一个整数，而实际的`-setDarkness:`方法期望的是一个`float`。整数和浮点数不能互换，因此`-setDarkness:`方法将接收到一个垃圾值。\n\
    \n这个问题的解决方案很简单：包含方法声明。包含此代码的模块本应使用`#import`指令，如清单 6-2 所示。现在编译器有了该类的方法原型。它知道`-setDarkness:`方法接受一个`float`参数，并且编译器会在发送消息之前正确地将整型常量提升为浮点值。\n\
    \n```\n清单 6-2. 声明的方法调用\n\n#import \"ToasterController.h\"\n\nToasterController\
    \ *toaster;\n\n…\n\n[toaster setDarkness:1];\n```\n\n作为一条规则，永远不要忽略“未找到方法”的编译器警告。始终导入或声明你使用的类和方法。很少有正当理由不能包含所需的声明，这能确保编译出的代码是正确的。\n\
    \n## 歧义方法\n\n当接收者的类型未知（类型`id`）或不完整（仅通过`@class`指令定义），但编译器至少看到了一个与方法标识符匹配的方法原型时，会出现一个更微妙的问题。\n\
    \n在这些情况下，编译器会自信地假设接收者实现了你调用的方法——你是程序员；你一定知道自己在做什么，对吧？它会搜索所有已知的方法原型，并使用与语句匹配的第一个方法标识符来编译消息。\n\
    \n大多数情况下这都能正常工作。从统计上看，方法标识符往往是唯一的，或者在功能上是相同的。在整个 Cocoa 框架（相当庞大）中，只有一个`-setLocation:`方法。有六个不同的`-setTag:`方法由不同的类实现，但它们都有相同的原型（`-(void)setTag:(int)tag`）。因此，编译器选择使用哪个原型并不重要；编译出的代码将是正确的。\n\
    \n问题出现在极少数情况下：存在两个或更多具有相同标识符但参数或返回类型不同的方法（参见清单 6-3）。`-options`消息就是这样一个例子。Cocoa\
    \ 框架中定义了六个`-options`方法。其中两个返回指向字典的指针，三个返回整数，一个返回自定义的枚举值。\n\n```\n清单 6-3. 歧义方法调用\n\
    \nid mystery;\n\n…\n\nNSDictionary *options = [mystery options];\n\n**警告：初始化时未进行类型转换，将整数转换为指针**\n\
    ```\n\n清单 6-3 向`mystery`对象发送了`-options`消息。没有任何类信息的情况下，Objective-C 使用它找到的第一个`-options`原型。之所以出现警告，是因为编译器再次猜错了。它使用的`-options`原型返回的是一个整数，而不是指向字典对象的指针。正是整数被隐式提升为指针才生成了警告。\n\
    \n要解决这种歧义，可以对接收者进行类型转换。在清单 6-4 中对`mystery`变量进行类型转换，告诉编译器假设接收者是一个`NSTextTab`对象。编译器将自身限制为使用来自`NSTextTab`类的方法原型。它编译出正确的代码，并且不会生成虚假的警告。在第二个示例中，`sidekick`变量被转换为任何遵循上一章`Communicating`协议的类。同样，编译器将接收者限制为`Communicating`中定义的方法。\n\
    \n```\n清单 6-4. 消除消息歧义\n\nid mystery;\n\nid hero, sidekick;\n\n…\n\nNSDictionary\
    \ *options = [(NSTextTab*)mystery options];\n\n[(id<Communicating>)sidekick sendMessage:@\"\
    Help!\" to:hero];\n```\n\n如果歧义是因为接收者是一个尚未定义的类类型（仅通过`@class`指令声明），那么解决方案是`#import`其完整的声明。\n\
    \n## 强制转换\n\n类型转换可用于有意识地强制 Objective-C 允许你发送一个它认为对象并未实现的方法。一个`Character`对象不接受`-giveItem:to:`消息。如果通过编程，你发现一个`Character`对象实际上是一个`Earthling`对象（或其子类之一），你可能希望向它发送一个子类特有的消息。类型转换允许你覆盖编译器对接收者的常规假设，并编译正确的方法调用，如清单\
    \ 6-5 所示。\n\n```\n清单 6-5. 强制方法调用\n\nCharacter *player;\n\nEarthling *hero;\n\n\
    Thing *secret;\n\n…\n\nif ([player respondsToSelector:@selector(giveItem:to:)])\n\
    \n    [(Earthling*)player giveItem:secret to:hero]; // 假设 player 是 Earthling\n\
    ```\n\n## 以编程方式发送消息\n\nObjective-C 使得向对象发送消息非常容易——不仅可以使用到目前为止讨论的方法调用语法，还可以通过编程方式让变量决定发送什么消息。\n\
    \n以编程方式构建消息的便捷性，促进了 Objective-C 在多种解决方案和设计模式中的采用。你会遇到许多服务，它们使用指向接收者的指针、选择器（`SEL`），或两者兼有，向你的代码发送消息，或代表你的代码发送消息。一些例子包括：\n\
    \n- **控件：** 每个可视化控件对象（按钮、菜单项、复选框、单选按钮、滑块等）都有一个动作。动作由一个目标属性（接收者）和一个动作属性（选择器）组成。当控件被激活时，它会向目标发送该动作。参见第\
    \ 20 章。\n- **通知：** 定时器和通知服务会在事件发生时向一个对象发送消息。你使用对象标识符和选择器来确定对象和要调用的方法。参见第 18 章。\n\
    - **回调：** 像模态对话框这样的组件会在对话框被关闭时，通过向你选择的对象发送你指定的消息来通知你的代码。\n- **委托：** 委托模式在 Cocoa\
    \ 框架中被广泛使用。委托总是一个变量。有时它接收的消息也是可变的，通过你指定的选择器来确定。参见第 17 章。\n\n在 Java 中，以编程方式调用方法很复杂且有些繁琐，涉及多个内省对象。通常，Java\
    \ 接口被定义出来，只是为了对象有一个定义明确的入口点来接收消息。在 Objective-C 中，一个简单的消息极其轻量，只需要一个指向接收者的指针和一个整数选择器。实际上，消息选择器是指向内部运行时数据结构的指针，当程序的二进制文件被加载到内存中时由链接器解析。从程序员的角度来看，选择器应被视为不透明的整型常量。\n"
- fmt: 'There are basically three ways to compose and send a message programmatically.
    The most common, and quickest, technique is to use one of the `-performSelector:`
    methods provided by the root class. The most flexible and Java-like technique
    is to construct an `NSInvocation` object. Finally, an Objective-C method can be
    called directly as a C function. This last technique is popular with performance-sensitive
    applications.


    **Caution** The cardinal rule for all messages is that the parameters supplied
    in the message must match the type, size, and order of the parameters the method
    expects. None of the programmatic message-sending techniques provides any kind
    of type checking, type conversion, promotion, or auto-boxing.


    ## Immediate Messages


    The root `NSObject` class implements a family of `-performSelector:` methods.
    You can use them to send any message to an object, exactly as if your code had
    invoked the method directly. The code in Listing 6-6 shows the `-className` message
    being sent to an arbitrary object using a direct message, and then again programmatically
    using the `-performSelector:` method.


    Listing 6-6. Sending a Message with `-performSelector:`


    ```

    id anything = …;


    NSString *name;


    name = [anything className];


    SEL variableMessage = @selector(className);


    name = [anything performSelector:variableMessage];

    ```


    The two invocations of `-className` in Listing 6-6 are functionally identical.
    The second is slightly slower because it sends two messages: `performSelector:`
    is sent to the object, which then immediately sends itself the `className` message.
    The value returned by the `className` method is passed back to the caller.


    Sending a message using `-performSelector:` is quick, easy, and lightweight. The
    principle drawback of `-performSelector:` is that it only accepts none, one, or
    two object identifiers as parameters and always returns an object identifier as
    a return value. By casting, you can coerce the compiler to pass or return any
    pointer value; all pointers are the same size and format. Listing 6-7 shows how
    to pass an integer pointer instead of an object pointer. The pointer to (address
    of) the integer is cast to an object identifier so that it agrees with the parameter
    type of the message. This just mollifies the compiler; no actual value conversion
    takes place.


    Listing 6-7. Passing Other Kinds of Pointers to `-performSelector:`


    ```

    @implementation ShiftyMethods


    - (void)incrementAnInteger:(int*)valuePtr


    {


    *valuePtr += 1;


    }


    @end


    …


    ShiftyMethods *shifty = [ShiftyMethods new];


    int i = 1;


    [shifty performSelector:@selector(incrementAnInteger:) withObject:(id)&i];

    ```


    If the methods being called expect more parameters, or more exotic parameters
    such as `long long` integers, floating point values, or structures, you will have
    to use one of the other techniques in this chapter.


    Table 6-1 lists the basic `-performSelector:` methods implemented by `NSObject`.
    All of these methods are compatible with methods returning some kind of pointer
    or `void`. When used with a `void` method, ignore the value returned by `-performSelector:`.


    **Table 6-1.** Immediate Invocation Methods


    | Method | Description |

    | --- | --- |

    | `-(id)performSelector:(SEL)message` | Sends the message specified by the selector
    to the receiver. The message includes no parameter and returns the object identifier
    returned by the method. |

    | `-(id)performSelector:(SEL)message withObject:(id)firstParam` | Sends the message
    to the receiver. The message includes a single pointer as the first parameter,
    and returns the returned pointer to the caller. |

    | `-(id)performSelector:(SEL)message withObject:(id)firstParam withObject:(id)secondParam`
    | Sends the message to the receiver. The message includes two pointer parameters,
    returning the returned pointer to the caller. |


    ## Deferred Messages


    A message can also be queued and sent to an object at some future time. The method
    might be invoked on a different thread, after some time has elapsed, or just “whenever.”
    To understand how messages are deferred, you need to know a little about run loops.


    A run loop is an event queue that executes in its own thread. Every Cocoa application
    has at least one run loop. The first run loop started is christened the main run
    loop or main thread. All user interaction (mouse clicks, keyboard commands, display
    updates, animation, and so on) is fed to the main run loop and executes in the
    main thread.


    You can create additional threads in your process. Starting a run loop takes over
    a thread and turns it into an event driven thread. A run loop’s life is spent
    pulling an event from its event queue, processing it, and immediately “looping”
    around to process the next waiting event. If there are no pending events, the
    thread suspends. You can read more about creating threads and run loops in Chapter
    15.


    One type of event that can be pushed onto a run loop’s queue is a method invocation.
    It is little more than a reference to an object and the message and parameters
    the object will receive. When an object message event appears at the top of the
    event queue, the run loop sends the message to the object.


    The root `NSObject` class implements several methods for queuing a message on
    a run loop for later execution. The principal ones are shown in Table 6-2.


    **Table 6-2.** Deferred Invocation Methods


    | Method | Description |

    | --- | --- |

    | `-(void)performSelector:(SEL)message withObject:(id)arg afterDelay:(NSTimeInterval)delay`
    | Queues a message that will be sent to the receiver in the current thread. The
    message is not queued until after `delay` seconds have elapsed. |

    | `-(void)performSelectorOnMainThread:(SEL)message withObject:(id)arg waitUntilDone:(BOOL)wait`
    | Queues a message that will be sent to the receiver on the main thread. If `wait`
    is YES, the call will suspend the current thread until the method has finished
    executing. |

    | `-(void)performSelector:(SEL)message onThread:(NSThread*)thread withObject:(id)arg
    waitUntilDone:(BOOL)wait` | Queues a message that will be sent to the receiver
    on the run loop attached to a specified thread. If `wait` is YES, the call will
    suspend the current thread until the method has finished executing. |

    | `-(void)performSelectorInBackground:(SEL)message withObject:(id)arg` | Creates
    and starts a new thread. When the new thread begins executing, the message and
    `arg` argument are sent to the receiver which executes in that thread. When the
    method returns, the thread terminates. |


    The `-performSelector:withObject:afterDelay:` method pushes the message event
    onto the run loop of the currently running thread. The delay time is a floating-point
    value expressed in seconds. The run loop first waits for `delay` number of seconds
    to elapse then it queues the event to be executed at the next opportunity. The
    method does not guarantee the time the message will be sent, just that that message
    won’t be sent any earlier than `delay` seconds in the future. To queue a message
    to be sent at the run loop’s next opportunity, pass a delay of `0.0`.


    The `-performSelectorOnMainThread:…` and `-performSelector:onThread:…` methods
    both queue a message to be executed on a particular thread.


    As described earlier, the main thread runs the primary run loop of the application.
    The `-performSelectorOnMainThread:` message is particularly useful to auxiliary
    threads that need to execute some action in the main thread (say, to update the
    value of a field in a window). Such methods must be performed on the main thread.
    The background thread can choose to send the message asynchronously by passing
    `NO` in the `wait` argument, or suspend until the deferred message has completed
    by passing `YES`.'
  raw: 'There are basically three ways to compose and send a message programmatically.
    The most common, and quickest, technique is to use one of the -performSelector:
    methods provided by the root class. The most flexible and Java-like technique
    is to construct an NSInvocation object. Finally, an Objective-C method can be
    called directly as a C function. This last technique is popular with performance-sensitive
    applications.


    ■Caution The cardinal rule for all messages is that the parameters supplied in
    the message must match the type, size, and order of the parameters the method
    expects. None of the programmatic message-sending techniques provides any kind
    of type checking, type conversion, promotion, or auto-boxing.


    Immediate Messages


    The root NSObject class implements a family of -performSelector: methods. You
    can use them to send any message to an object, exactly as if your code had invoked
    the method directly. The code in Listing 6-6 shows the -className message being
    sent to an arbitrary object using a direct message, and then again programmatically
    using the -performSelector: method.


    Listin g 6-6\. Sending a Message with -performSelector:


    id anything = …;


    NSString *name;


    **name = [anything className];**


    SEL variableMessage = @selector(className);


    **name = [anything performSelector:variableMessage];**


    The two invocations of -className in Listing 6-6 are functionally identical. The
    second is slightly slower because it sends two messages: performSelector: is sent
    to the object, which then immediately sends itself the className message. The
    value returned by the className method is passed back to the caller.


    Sending a message using -performSelector: is quick, easy, and lightweight. The
    principle drawback of -performSelector: is that it only accepts none, one, or
    two object identifiers as parameters and always returns an object identifier as
    a return value. By casting, you can coerce the compiler to pass or return any
    pointer value; all pointers are the same size and format. Listing 6-7 shows how
    to pass an integer pointer instead of an object pointer. The pointer to (address
    of) the integer is cast to an object 91


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6 ■ SENDING MESSAGES


    identifier so that it agrees with the parameter type of the message. This just
    mollifies the compiler; no actual value conversion takes place.


    Listin g 6-7\. Passing Other Kinds of Pointers to -performSelector:


    @implementation ShiftyMethods


    - (void)incrementAnInteger:(int*)valuePtr


    {


    *valuePtr += 1;


    }


    @end


    …


    ShiftyMethods *shifty = [ShiftyMethods new];


    int i = 1;


    [shifty performSelector:@selector(incrementAnInteger:) withObject:(id)&i]; If
    the methods being called expect more parameters, or more exotic parameters such
    as long long integers, floating point values, or structures, you will have to
    use one of the other techniques in this chapter.


    Table 6-1 lists the basic -performSelector: methods implemented by NSObject. All
    of these methods are compatible with methods returning some kind of pointer or
    void. When used with a void method, ignore the value returned by -performSelector:.


    ***Table 6-1.** Immediate Invocation Methods*


    Met ho d


    Des cr ipti on


    -(id)performSelector:(SEL)message


    Sends the message specified by the selector to the receiver.


    The message includes no parameter and returns the object


    identifier returned by the method.


    -(id)performSelector:(SEL)message


    Sends the message to the receiver. The message includes a


    withObject:(id)firstParam


    single pointer as the first parameter, and returns the


    returned pointer to the caller.


    -(id)performSelector:(SEL)message


    Sends the message to the receiver. The message includes two withObject:(id)firstParam


    pointer parameters, returning the returned pointer to the


    withObject:(id)secondParam


    caller.


    Deferred Messages


    A message can also be queued and sent to an object at some future time. The method
    might be invoked on a different thread, after some time has elapsed, or just “whenever.”
    To understand how messages are deferred, you need to know a little about run loops.


    A run loop is an event queue that executes in its own thread. Every Cocoa application
    has at least one run loop. The first run loop started is christened the main run
    loop or main thread. All user 92


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6 ■ SENDING MESSAGES


    interaction (mouse clicks, keyboard commands, display updates, animation, and
    so on) is fed to the main run loop and executes in the main thread.


    You can create additional threads in your process. Starting a run loop takes over
    a thread and turns it into an event driven thread. A run loop’s life is spent
    pulling an event from its event queue, processing it, and immediately “looping”
    around to process the next waiting event. If there are no pending events, the
    thread suspends. You can read more about creating threads and run loops in Chapter
    15.


    One type of event that can be pushed onto a run loop’s queue is a method invocation.
    It is little more than a reference to an object and the message and parameters
    the object will receive. When an object message event appears at the top of the
    event queue, the run loop sends the message to the object.


    The root NSObject class implements several methods for queuing a message on a
    run loop for later execution. The principal ones are shown in Table 6-2.


    ***Table 6-2.** Deferred Invocation Methods*


    Met ho d


    Des cr ipti on


    -(void)performSelector:(SEL)message


    Queues a message that will be sent to the receiver


    withObject:(id)arg


    in the current thread. The message is not queued


    afterDelay:(NSTimeInterval)delay


    until after delay seconds have elapsed.


    -(void)performSelectorOnMainThread:(SEL)message Queues a message that will be
    sent to the receiver withObject:(id)arg waitUntilDone:(BOOL)wait


    on the main thread. If wait is YES, the call will


    suspend the current thread until the method has


    finished executing.


    -(void)performSelector:(SEL)message


    Queues a message that will be sent to the receiver


    onThread:(NSThread*)thread withObject:(id)arg


    on the run loop attached to a specified thread. If


    waitUntilDone:(BOOL)wait


    wait is YES, the call will suspend the current


    thread until the method has finished executing.


    -(void)performSelectorInBackground:(SEL)message Creates and starts a new thread.
    When the new withObject:(id)arg


    thread begins executing, the message and arg


    argument are sent to the receiver which executes


    in that thread. When the method returns, the


    thread terminates.


    The -performSelector:withObject:afterDelay: method pushes the message event onto
    the run loop of the currently running thread. The delay time is a floating-point
    value expressed in seconds. The run loop first waits for delay number of seconds
    to elapse then it queues the event to be executed at the next opportunity. The
    method does not guarantee the time the message will be sent, just that that message
    won’t be sent any earlier than delay seconds in the future. To queue a message
    to be sent at the run loop’s next opportunity, pass a delay of 0.0.


    The -performSelectorOnMainThread:… and -performSelector:onThread:… methods both
    queue a message to be executed on a particular thread.


    As described earlier, the main thread runs the primary run loop of the application.
    The


    -performSelectorOnMainThread: message is particularly useful to auxiliary threads
    that need to execute some action in the main thread (say, to update the value
    of a field in a window). Such methods must be performed on the main thread. The
    background thread can choose to send the message asynchronously 93


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6 ■ SENDING MESSAGES


    by passing NO in the wait argument, or suspend until the deferred message has
    completed by passing YES.'
  trans: '

    在编程中，大致有三种发送消息的方式。最常用且最快捷的方式是使用根类提供的 `-performSelector:` 方法族。最灵活且类似 Java 的方式是构建一个
    `NSInvocation` 对象。最后，Objective-C 方法也可以直接作为 C 函数来调用。最后一种方式在高性能要求的应用中很受欢迎。


    **警告** 所有消息的首要规则是：消息中提供的参数必须与方法所期望的参数在类型、大小和顺序上完全匹配。所有这些编程式消息发送技术都不提供任何类型检查、类型转换、类型提升或自动装箱功能。


    ## 即时消息


    根类 `NSObject` 实现了一系列 `-performSelector:` 方法。你可以使用它们向任何对象发送消息，就像你的代码直接调用了该方法一样。代码清单
    6-6 展示了向任意对象发送 `-className` 消息的两种方式：一种是直接调用，另一种是使用 `-performSelector:` 方法进行编程式调用。


    代码清单 6-6. 使用 `-performSelector:` 发送消息


    ```

    id anything = …;


    NSString *name;


    name = [anything className];


    SEL variableMessage = @selector(className);


    name = [anything performSelector:variableMessage];

    ```


    代码清单 6-6 中对 `-className` 的两次调用在功能上是完全相同的。第二次调用稍慢，因为它实际上发送了两条消息：首先向对象发送 `performSelector:`，然后对象立即向自身发送
    `className` 消息。`className` 方法返回的值会传回给调用者。


    使用 `-performSelector:` 发送消息快速、简单且轻量。`-performSelector:` 的主要缺点在于它最多只能接受零个、一个或两个对象标识符作为参数，并且总是返回一个对象标识符作为返回值。通过类型转换，你可以强制编译器传递或返回任何类型的指针值；所有指针的大小和格式都是相同的。代码清单
    6-7 展示了如何传递一个整型指针而不是对象指针。指向整数的指针被强制转换为对象标识符，以便与消息的参数类型匹配。这仅仅是为了通过编译器的检查，实际上并没有进行任何值的转换。


    代码清单 6-7. 向 `-performSelector:` 传递其他类型的指针


    ```

    @implementation ShiftyMethods


    - (void)incrementAnInteger:(int*)valuePtr


    {


    *valuePtr += 1;


    }


    @end


    …


    ShiftyMethods *shifty = [ShiftyMethods new];


    int i = 1;


    [shifty performSelector:@selector(incrementAnInteger:) withObject:(id)&i];

    ```


    如果调用的方法需要更多参数，或者需要更特殊的参数，例如 `long long` 整数、浮点数或结构体，则必须使用本章中介绍的其他技术。


    表 6-1 列出了 `NSObject` 实现的基本 `-performSelector:` 方法。所有这些方法都兼容返回某种类型的指针或 `void` 的方法。当用于
    `void` 方法时，应忽略 `-performSelector:` 的返回值。


    **表 6-1.** 即时调用方法


    | 方法 | 描述 |

    | --- | --- |

    | `-(id)performSelector:(SEL)message` | 向接收者发送由选择子指定的消息。该消息不包含参数，并返回由方法返回的对象标识符。
    |

    | `-(id)performSelector:(SEL)message withObject:(id)firstParam` | 向接收者发送消息。该消息包含一个指针作为第一个参数，并将返回的指针返回给调用者。
    |

    | `-(id)performSelector:(SEL)message withObject:(id)firstParam withObject:(id)secondParam`
    | 向接收者发送消息。该消息包含两个指针参数，并将返回的指针返回给调用者。 |


    ## 延迟消息


    消息也可以被放入队列，并在未来的某个时间发送给对象。该方法可能在不同的线程上被调用，在过了一段时间后，或者只是“在某个时候”被调用。要理解消息是如何被延迟的，你需要对运行循环有所了解。


    运行循环是一个在其自身线程中执行的事件队列。每个 Cocoa 应用程序至少有一个运行循环。启动的第一个运行循环被命名为主运行循环或主线程。所有用户交互（鼠标点击、键盘命令、界面更新、动画等）都被输入到主运行循环中，并在主线程中执行。


    你可以在你的进程中创建额外的线程。启动一个运行循环将接管一个线程，并将其转变为事件驱动的线程。运行循环的生命周期就是不断从事件队列中取出一个事件、处理它、然后立即“循环”回去处理下一个等待的事件。如果没有挂起的事件，线程就会挂起。你可以在第
    15 章中了解更多关于创建线程和运行循环的内容。


    可以推送到运行循环队列中的一种事件类型就是方法调用。它基本上就是对象引用、以及该对象将要接收的消息和参数的组合。当一个对象消息事件到达事件队列的顶部时，运行循环就会将该消息发送给目标对象。


    根类 `NSObject` 实现了多个用于在运行循环上排队消息以供稍后执行的方法。主要的几个方法如表 6-2 所示。


    **表 6-2.** 延迟调用方法


    | 方法 | 描述 |

    | --- | --- |

    | `-(void)performSelector:(SEL)message withObject:(id)arg afterDelay:(NSTimeInterval)delay`
    | 将一条消息放入队列，该消息将在当前线程中发送给接收者。消息至少在 `delay` 秒之后才会被放入队列。 |

    | `-(void)performSelectorOnMainThread:(SEL)message withObject:(id)arg waitUntilDone:(BOOL)wait`
    | 将一条消息放入队列，该消息将在主线程中发送给接收者。如果 `wait` 为 YES，该调用将挂起当前线程，直到方法执行完毕。 |

    | `-(void)performSelector:(SEL)message onThread:(NSThread*)thread withObject:(id)arg
    waitUntilDone:(BOOL)wait` | 将一条消息放入队列，该消息将在附加到指定线程的运行循环上发送给接收者。如果 `wait` 为 YES，该调用将挂起当前线程，直到方法执行完毕。
    |

    | `-(void)performSelectorInBackground:(SEL)message withObject:(id)arg` | 创建并启动一个新线程。当新线程开始执行时，消息和
    `arg` 参数会被发送给接收者，后者在该线程中执行。当方法返回时，线程终止。 |


    `-performSelector:withObject:afterDelay:` 方法会将消息事件推送到当前运行线程的运行循环中。延迟时间是一个以秒为单位的浮点数值。运行循环首先等待
    `delay` 秒过去，然后将事件排队，以便在下一个机会执行。该方法并不保证消息发送的具体时间，只是保证消息不会在未来的 `delay` 秒之前发送。要将消息排队以便在运行循环的下一个机会发送，请传递
    `0.0` 作为延迟值。


    `-performSelectorOnMainThread:…` 和 `-performSelector:onThread:…` 方法都会将消息排队，以便在特定线程上执行。


    如前所述，主线程运行应用程序的主要运行循环。`-performSelectorOnMainThread:` 消息对于需要（例如，为了更新窗口中某个字段的值）在主线程中执行某些操作的辅助线程尤其有用。这些方法必须在主线程上执行。后台线程可以通过在
    `wait` 参数中传递 `NO` 来选择异步发送消息，或者通过传递 `YES` 来挂起当前线程直到延迟的消息执行完毕。

