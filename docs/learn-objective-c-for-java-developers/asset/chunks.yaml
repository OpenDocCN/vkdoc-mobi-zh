    [dictionary getObjects:values andKeys:keys];


    NSUInteger i;


    for (i=0; i<count; i++) {


    id key = keys[i];


    id object = values[i];


    // ...


    }


    Adding Enumeration Support


    You can easily subclass NSEnumerator to implement your own enumerators. It really
    only has to implement a -nextObject method. Implement the rarely used -allObjects
    method only if you find it useful, or your enumerator object is meant for a wide
    audience. See the TicTacToe project in Chapter 20


    for an example of custom NSEnumerators. And, as mentioned in the earlier Tip,
    any NSEnumerator can be used in a fast enumeration statement.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16 ■ COLLECTION PATTERNS


    Providing fast enumerator support for a custom object is a little more involved.
    In concept, it’s easy; simply conform to the NSFastEnumeration protocol and implement
    the -countByEnumeratingWithState: objects:count: method.


    The fast enumeration code sends this message to your object repeatedly until it
    returns 0\. Each time your collection receives the message, it must assemble the
    next batch of objects to be processed in a C array and return the number prepared.
    Fast enumeration is most efficient when your class assembles batches of objects,
    but a simple non-optimized implementation can be achieved by returning one object
    at a time.


    The progress of an individual iteration is maintained in an NSFastEnumerationState
    structure.


    This structure is empty when first passed to your method, and the same structure
    is passed again with each subsequent message. Your collection must update the
    structure to keep track of the enumeration’s progress and protect against the
    collection changing during the enumeration. Fast enumerations are expected to
    throw an exception if the collection is modified during the course of the enumeration.


    See the documentation for the NSFastEnumeration protocol for a complete description
    of the


    -countByEnumeratingWithState:objects:count: method and NSFastEnumerationState
    structures.


    Sorting Collections


    Ordered collections provide three basic techniques for sorting member objects
    into order: sort using an Objective-C message, sort using a C callback function
    to compare objects, and sort using sort descriptors. The methods that sort collections
    are listed in Table 16-15.


