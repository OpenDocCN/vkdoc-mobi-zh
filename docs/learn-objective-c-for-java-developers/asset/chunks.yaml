    **C H A P T E R 1**


    ■ ■ ■


    ## Introduction


    Welcome to *Learn Objective-C for Java Developers*. This book will help you transition
    from programming in Java to programming in Objective-C, the primary language used
    to develop applications for Apple’s line of Mac OS X—based computers and consumer
    products. You will learn to write effectively in a dynamic and flexible language
    that powers many of today’s cutting-edge applications and mobile devices. More
    important, this book will show you how to leverage the coding practices, design
    patterns, and problem-solving skills you’ve learned in Java and apply them to
    Objective-C.


    What is Objective-C?


    So what, exactly, is Objective-C and what’s so great about it? Objective-C adds
    the concept of objects to the standard C language. It elevates C by overlaying
    it with a smattering of new keywords and a SmallTalk-esque method calling syntax.
    The result is an object-oriented programming language with remarkable properties:


    • Modern object-oriented design paradigms


    • State of the art compiler


    • Exceptional performance


    • Direct access to C and C APIs


    • Dynamic behavior


    Unlike most other object-oriented languages, Objective-C does not create a completely
    new language–it is a strict superset of C. The Objective-C keywords and syntax
    are quite distinct from regular C. Listing 1-1 shows a brief snippet of Objective-C,
    along with equivalent Java code for comparison. The basic control statements are
    plain C. The statements between brackets invoke Objective-C methods.


    ***Listing 1-1.** Sample of Java and Objective-C Syntax* Java


    public void setSize( Dimension size )


    {


    if (size.height!=0 && size.width!=0) {


    if (!this.size.equals(size)) {


    super.setSize(size);


    for ( MapItem i: mapItems )


    i.resize();


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 1 ■ INTRODUCTION


    }


    }


    Objective-C


    - (void)setFrameSize:(NSSize)size


    {


    if (size.height!=0.0 && size.width!=0.0) {


    if (!NSEqualSizes(self.size,size)) {


    [super setFrameSize:size];


    [mapItems makeObjectsPerformSelector:@selector(resize)];


    }


    }


    }


    How Objective-C came to be and what makes it special is an interesting story.


    History


    Brad Cox and Tim Love were the principal forces behind Objective-C. It began life
    as “Object-Oriented Programming in C” or OOPC. The goal was to add the capabilities
    of SmallTalk–which required an interpreter–to C, without designing an entirely
    new language. Cox published the first formal description of what had by then become
    Objective-C in 1986\. In 1988, NeXT Computer adopted Objective-C as its primary
    development language. NeXT enriched Objective-C, creating a broad collection of
    classes that became the foundation for new applications, development tools (most
    notably Interface Builder), and a significant portion of their operating system.
    The NEXTSTEP operating system eventually led to the OpenStep API, which defined
    a consistent set of objects and interfaces that could be ported to multiple platforms.
    Ports of OpenStep, beginning with OPENSTEP, ran on Sun’s Solaris and Microsoft’s
    Windows NT, among others. The GNU (GNU’s Not Unix) project eventually created
    an open-source implementation called GNUstep.


    Together, Objective-C and NEXTSTEP were lauded as an innovative development environment,
    one of the few to truly deliver on the promise of object-oriented design. Application
    design and creation was rapid and flexible. But for a variety of reasons–most
    notably the industry inertia behind C++–


    NeXT and Objective-C remained little more than a curiosity, a shining example
    of what could be accomplished, if only they had been embraced by a major segment
    of the industry.


    That threshold was finally crossed in 1996, the year Apple bought NeXT Computer,
    the NEXTSTEP operating system, and their entire suite of Objective-C based development
    tools. Apple made NEXTSTEP a cornerstone of their new Mac OS X operating system.
    The object frameworks were re-branded as “Cocoa” and have since grown and matured
    into a rich and powerful toolset–not just for personal computer applications,
    but also for innovative consumer devices like the iPhone.


    A Modern Object-Oriented Language


    Objective-C accomplishes a rather remarkable feat. The actual language is spare,
    almost to the point of being barren, yet it manages to implement a rich object
    paradigm that rivals far more complex languages. The language is simple to learn
    and simple to implement. Many features can be added or enhanced simply by creating
    new classes, rather than requiring changes to the language itself. For example,
    using Objective-C you could wake up one morning and decide to instantiate objects
    in a new way. Objective-C does not define how objects are created or destroyed–that’s
    provided by the runtime framework via class methods. It’s unlikely you’d want
    to redefine object instantiation, but the example underscores the flexibility
    of the language.


