- fmt: '`Listing 19-3`. Triggering KVO Notifications Manually


    ```objc

    @interface Budget : NSObject {


    double budget;


    double plannedExpense;


    }


    @property double budget;


    @property (readonly) double plannedExpense;


    - (void)addExpenditure:(double)amount;


    @end


    @implementation Budget


    @synthesize budget, plannedExpense;


    - (void)addExpenditure:(double)amount


    {


    [self willChangeValueForKey:@"plannedExpense"]; plannedExpense += amount;


    [self didChangeValueForKey:@"plannedExpense"];


    }


    @end

    ```


    The `Budget` class has a `plannedExpense` property that’s stored in a variable.
    It’s a readonly property with no setter method. The `-addExpenditure:` method
    changes the property when it adds an amount to it. The `-willChangeValueForKey:`
    and `-didChangeValueForKey:` messages that bracket the change inform the Key-Value
    Observing framework of the change, and allow it to send the property notifications
    to the observers.


    ---


    ## Observer Pattern


    **Caution** Each `-willChangeValueForKey:` message for a given key must be balanced
    with a corresponding `-didChangeValueForKey:` message for that same key.


    If the `-addExpenditure:` method modified multiple properties, it would send one
    pair of `-willChangeValueForKey:`/`-didChangeValueForKey:` messages for each property.
    These can be nested: the code could send three `-willChange...` messages, change
    three properties, and then send three `-didChange...` messages.


    If the property being modified is a to-many array property, use the `-willChange:valuesAtIndexes:forKey:`
    and `-didChange:valuesAtIndexes:forKey:` messages instead.


    ### Creating Property Dependencies


    Another common problem is a property that implicitly changes when another property
    changes. This is called a dependent property. Adding a `remainingBudget` property
    to the `Budget` class creates a dependent property that would be affected by a
    change to either the `budget` or `plannedExpense` properties. The Key-Value Observing
    framework defines an informal protocol that lets your class describe its dependent
    properties. The modified `Budget` class is shown in `Listing 19-4`.


    `Listing 19-4`. Defining Dependent Properties


    ```objc

    @interface Budget : NSObject {


    double budget;


    double plannedExpense;


    }


    @property double budget;


    @property (readonly) double plannedExpense;


    @property (readonly) double remainingBudget;


    - (void)addExpenditure:(double)amount;


    @end


    @implementation Budget


    @synthesize budget, plannedExpense;


    - (void)addExpenditure:(double)amount


    {


    [self willChangeValueForKey:@"plannedExpense"];


    plannedExpense += amount;


    [self didChangeValueForKey:@"plannedExpense"];


    }


    + (NSSet*)keyPathsForValuesAffectingRemainingBudget


    {


    return [NSSet setWithObjects:@"budget", @"plannedExpense", nil];


    }


    - (double)remainingBudget


    {


    // amount remaining or 0.0


    return MAX(0,budget-plannedExpense);


    }


    @end

    ```


    For each observed property, the Key-Value Observing framework looks for a class
    method named `+keyPathsForValuesAffectingProperty`; replace the “`Property`” part
    of the method name with the name of the dependent property. The method returns
    a set of property names that the property is dependent on. Whenever one of those
    other properties changes, KVO sends a change notification for the dependent property
    as well. Implement one class method for each dependent property.


    **Note** It would be possible to accomplish the same solution using manual KVO
    notifications, as demonstrated in the previous section. You would modify `-addExpenditure:`
    to send an additional `-willChangeValueForKey:` and `-didChangeValueForKey:` messages
    for the `@"remainingBudget"` path, and then do the same in a handwritten `-setBudget:`
    method. The advantage of the dependent property protocol is that it doesn’t require
    modifying the other property setters or adding more manual KVO notifications.
    This is particularly convenient in subclasses that define properties that are
    dependent on properties of its superclass. It also keeps the KVO code from cluttering
    up the implementation.


    There are actually three ways of communicating dependent properties to the Key-Value
    Observing framework:


    - Implement a per-property `+keyPathsForValuesAffectingProperty` class method
    as demonstrated in `Listing 19-4`.

    - Override the single `+keyPathsForValuesAffectingValueForKey:` class method and
    return the dependent set for the requested key. The base class implementation
    of this method uses the key-path to look for and invoke the method name implemented
    in option 1.

    - At some point before any object of your class is observed—typically in your
    class’s `+initialization` method—send a `+setKeys:triggerChangeNotificationsForDependentKey:`
    message for each dependent key implemented in your class.


    Implement exactly one of these solutions for each dependent property. When implementing
    either of the first two solutions, don’t forget to include any dependent keys
    defined by the superclass in the returned set.


    The first two solutions are only applicable to simple (to-one) properties that
    are running on Mac OS X 10.5 or later. If you need to establish a to-many dependent
    property, or are targeting Mac OS X 10.4 or earlier, use the last solution. If
    you have a to-many dependent property and are targeting Mac OS X 10.5 or later
    (where the `+setKey:…` method is deprecated), refer to the “Registering Dependent
    Keys” section of the Key-Value Observing Programming Guide^1 for a number of possible
    solutions.


    ### Overriding Key-Value Observing


    To implement manual KVO notifications in a KVC-compliant setter method, you must
    disable the normal change notifications that the Key-Value Observing framework
    will perform. Otherwise KVO and your code will both be sending notifications,
    resulting in either duplicate or out-of-order notifications.


    One very prudent reason to do this is to optimize the setter method so it only
    notifies observers when the value actually changes. This can have performance
    advantages and solve recursive or circular update problems. In `Listing 19-5`,
    the `budget` property setter of the class is reimplemented so it only sends KVO
    notifications when the `budget` value actually changes.


    `Listing 19-5`. Optimizing KVO Notifications


    ```objc

    @implementation Budget


    + (BOOL)automaticallyNotifiesObserversForKey:(NSString*)key


    {


    if ([key isEqualToString:@"budget"])


    return NO;


    return [super automaticallyNotifiesObserversForKey:key];


    }


    - (double)budget


    {


    return budget;


    }


    - (void)setBudget:(double)value


    {


    if (budget!=value) {


    [self willChangeValueForKey:@"budget"]; budget = value;


    [self didChangeValueForKey:@"budget"];


    }


    }

    ```


    To prevent the KVO framework from overriding the `-setBudget:` method and sending
    its own notifications, the `+automaticallyNotifiesObserversForKey:` class method
    is overridden. This method should return `NO` for observable properties that generate
    their own notifications. The base class implementation returns `YES` for all keys.


    The `-setBudget:` method is then rewritten to send KVO notifications only when
    the new budget value is different than the previous value. This kind of optimization
    can ripple out. For example, now that the `remainingBudget` property is dependent
    on the `budget` property, not sending a superfluous budget notification actually
    avoids two superfluous notifications.


    ### Optimizing Key-Value Observing


    ^1 Apple, Inc., Key-Value Observing Programming Guide, [http://developer.apple.com/documentation/Cocoa/Conceptual/KeyValueObserving/](http://developer.apple.com/documentation/Cocoa/Conceptual/KeyValueObserving/),
    2009.'
