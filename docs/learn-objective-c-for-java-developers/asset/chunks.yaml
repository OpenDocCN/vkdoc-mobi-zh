    The two significant differences between Objective-C and Java are as follows:


    • In Java, the URLConnection object is used to configure the request. In Objective-C,
    you create an NSMutableURLRequest in order to customize the request.


    • Java’s URLConnection creates OutputStream and InputStream objects, connected
    to the request data and response data streams, respectively. Objective-C is completely
    reversed.


    Instead of getting an OutputStream to write request data to, you supply an input
    stream object that the NSURLConnection will read in order to obtain the request
    data.


