    The code implements an automatic perimeter defense gun for our mythical adventure
    game that, once engaged, acquires and shoots at targets autonomously. It defers
    several targeting and gun control decisions to a delegate object. The single most
    important is the identification of which targets it should shoot at.


    The delegate property is formally declared to be an object that adopts the Targeting
    protocol.


    Using the Objective-C 2.0 @required and @optional directives, the delegate’s requirements
    are spelled out to the compiler. The delegate must implement the -gun:shouldShootAt:
    message, and may implement -gun:prioritizeTargets: or -gunShouldStopFiring:.


    If you don’t generate documentation for your classes, this is an effective way
    of communicating the delegate requirements to the compiler and other programmers.


    ■Tip The delegate is cast to (id) when sending it the -respondsToSelector: message.
    The reason is because the type id<Targeting> defines an object pointer that is
    assumed to only respond to methods defined in the Targeting protocol. This doesn’t
    include any methods defined in NSObject, so the compiler complains that the delegate
    might not respond to -respondsToSelector:. An alternative would be to declare
    the delegate object’s pointer as id<Targeting,NSObject>. The NSObject protocol
    (not class) is a convenience protocol that declares the core set of methods defined
    by NSObject and its subclasses.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 17 ■ DELEGATION PATTERN


    The single disadvantage to this approach emerges if you later subclass AutomaticPerimeterDefenseGun
    and want to define additional delegate methods. The delegate property is already
    defined as id<Targeting> and subclasses can’t change the type of an inherited
    property. The subclasses have few options but to document the additional delegate
    methods they use and adopt them as informal protocols.


    Incorporating the Delegation Pattern


    The delegation pattern simplifies a number of thorny inheritance and domain design
    problems. When incorporating the delegation pattern in your application, consider
    these principles:


    • Use the delegation pattern when the behavior of an object should be open to
    customization and the nature or knowledge needed to implement that customization
    is outside the domain of the class. In the AutomaticPerimeterDefenseGun example,
    the class encapsulates a weapon that shoots at targets, but deciding on which
    targets are friendly is outside its domain.


    • Delegates are particularly effective when implemented in the base class with
    multiple subclasses. Each subclass can consistently employ the delegate without
    complicating the number or organization of subclasses.


    • An object should have a well-defined behavior in the absence of a delegate object
    (delegate==nil). In the -defendPerimeter method, the delegate is unconditionally
    sent the


    -gun:shouldShootAt: message. If the delegate is nil, the message returns nil,
    and the gun shoots at nothing—a desirable trait in the absence of any targeting
    information. See the “absent behavior” and “consistency with nothing” design patterns
    in Chapter 7.


    • Similarly, an object should provide some natural baseline functionality when
    optional delegate methods are absent. The -acquireTargets method in Listing 17-2
    tests the delegate to see if it responds to -gun:prioritizeTargets:. If it does,
    it passes the known target list to the delegate that will prioritize, filter,
    or possibly supply its own targets. If the delegate doesn’t implement the method,
    the gun uses the targets it obtained from its sensors. Note that this is also
    consistent with the previous principle, as -responsesToSelector: will return NO
    if the delegate is nil.


    • An object should always provide context in the delegate message. The delegate
    methods in Listing 17-2 all include the Gun object that’s sending the message
    to the receiver. This allows the delegate to include the sender in its decision
    process, like telling the gun to stop firing if its ammunition gets too low. Remember
    that a single delegate object might be set as the delegate for two, or a hundred,
    different objects. Some delegates act as reusable traits, like the validation
    routine in Listing 17-1, that can be shared by arbitrary groups of similar objects.


    Summary


    The delegation pattern is pervasive in Objective-C. It simplifies class structures
    and opens a broad range of customizations to you. Objective-C programmers and
    the Cocoa framework embrace this pattern enthusiastically, and you are encouraged
    to do the same. The delegation pattern is equally applicable to Java development,
    but the formal nature of Java interfaces, and the lack of a simple “is method
    implemented” test, make it more cumbersome to employ.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 1 8**


    ■ ■ ■


    Provider/Subscriber Pattern


    The provider/subscriber pattern defines a one-to-many, unidirectional flow of
    information from a provider object to any number of subscriber objects. The concept
    is that the provider has useful information or events that need to be communicated
    to other objects, its subscribers, which will use that information to perform
    additional actions or stay in synchronization with the provider. In Java parlance,
    the provider fires notifications to its listeners. In Objective-C terminology,
    the provider posts notifications to its observers.


    The provider/subscriber pattern is used heavily in Java, but Java doesn’t provide
    any intrinsic service for helping objects manage their subscribers or coordinate
    messages. Consequently, most Java objects implement their own subscriber management.
    This isn’t terribly difficult, but it does impose an important limitation: the
    provider and subscribers must have references to each other. Objective-C


    strongly encourages the provider/subscriber pattern by providing systemwide services
    for managing a provider’s subscribers and delivering notifications to them. By
    providing intermediate management, providers and observers (subscribers) might
    know everything about each other, or nearly nothing at all.'
