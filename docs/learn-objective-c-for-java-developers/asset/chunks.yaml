    basics—this book has explored some really advanced techniques. You’ve learned
    how similarly Objective-C and Java approach primitive types, control structures,
    class inheritance, protocols (interfaces), garbage collection, archiving (serialization),
    exceptions, threads, and collections. You’ve learned the subtle differences—syntactic,
    technical, and philosophical—in how Objective-C invokes methods. Most importantly,
    you’ve explored some genuinely new concepts like categories, Key-Value Observing,
    and class clusters. You have (hopefully!) embraced some new design patterns, like
    delegates, singletons, and using nil object pointers, to your advantage. You’ve
    also learned how Objective-C embraces design patterns like Model-View-Controller
    and lazy initialization, while taking unique approaches to the subscriber/provider
    and factory patterns.


    There is, of course, much more to know about Objective-C, the class frameworks,
    and C than can ever be put into a single book. But I genuinely hope you found
    this book to be instructive and that it has accelerated your knowledge and skills
    toward your ultimate goal. Java and Objective-C are both great languages. Given
    their many similarities, there’s no reason why you can’t be proficient in both—


    expanding both your horizons and your opportunities.


