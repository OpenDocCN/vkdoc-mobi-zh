    Duplicate Objects


    The object that you use to create an archive is called the root object. It forms
    the anchor point in an undirected graph of objects that include all of the objects
    the root object refers to, any objects those objects refer to, and so on. The
    object graph might be simple, like an array or tree, but can also form loops and
    circular references. If the encoder blindly followed every object reference, multiple
    references to a single object would encode the object’s data multiple times, and
    circular references would cause infinite recursion. Java’s java.io.ObjectOutputStream
    and Objective-C’s NSCoder classes solve this problem almost identically. The first
    time an object is sent to the coder via the -encodeObject: message, the coder
    recursively sends that object an -encodeWithCoder: message to encode its data
    in the stream.


    The coder also remembers that object instance. All subsequent -encodeObject: messages
    that refer to the same object simply insert a reference to the original object
    in the data stream. When decoding, all


    -decodeObject messages return a pointer to the instance of the single unarchived
    object. You don’t have to do anything to get this behavior; it’s just good to
    know how it works.


    Decoding an archive can unintentionally create duplicate objects. This can happen
    if encoded objects refer to objects in a shared pool. The decoder will create
    new instances of every unique object in the data stream. This leaves your application
    with duplicates of the shared objects. There are several of ways of dealing with
    this. One is to use an encoding scheme like the Pantone color example given earlier;
    encode some symbolic representation of the object, and then obtain its actual
    contents from a common resource. Another solution is to override the -(id)awakeAfterUsingCoder:(NSCoder*)decoder
    method.


    This message is sent to an object after it has been decoded. The object identifier
    returned by the method replaces the decoded object. The default implementation
    returns self (i.e., no replacement), but if you override it you can return any
    equivalent object instead. Listing 12-8 demonstrates an Attendee class that avoids
    creating duplicate Attendee objects and adds any new Attendee objects to the common
    pool.


    Listin g 12-8\. Decoding Shared Objects


    @interface Attendee : NSObject <NSCoding> {


    NSString *name;


    NSString *uuid;


    NSMutableSet *scheduledMeetings;


    }


    @end


    @implementation Attendee


    - (id)initWithCoder:(NSCoder*)decoder


    {


    self = [super init];


    if (self != nil) {


    name = [decoder decodeObjectForKey:@"Name"];


    uuid = [decoder decodeObjectForKey:@"UUID"];


    scheduledMeetings = [decoder decodeObjectForKey:@"Meetings"];


    }


    return self;


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 ■ SERIALIZATION


    - (void)encodeWithCoder:(NSCoder*)encoder


    {


    [encoder encodeObject:name forKey:@"Name"];


    [encoder encodeObject:uuid forKey:@"UUID"];


    [encoder encodeObject:scheduledMeetings forKey:@"Meetings"];


    }


    - (id)awakeAfterUsingCoder:(NSCoder*)decoder


    {


    ScheduleAssets *assets = [ScheduleAssets sharedAssets];


    Attendee *existingAttendee = [assets attendeeWithUUID:uuid]; if (existingAttendee==nil)
    {


    // Add this attendee to the pool of attendees


    [assets addAttendee:self];


    } else {


    // Replace this attendee with the one that already exists


    self = existingAttendee;


    }


    return self;


    }


    @end


    Limiting the Object Graph


    Sometimes archiving a root object archives much more than you intended. Archiving
    a root object normally archives all of the objects it refers to. In our hypothetical
    scheduling application, a ProjectMeeting object associates a meeting with a project
    task. It would be convenient to archive a ProjectMeeting object and send it vie
    e-mail to a team member inviting them to the meeting. The problem is, the ProjectMeeting
    object in Listing 12-9 contains a reference to the ProjectTask object the meeting
    relates to. The task object would naturally contain a reference to its project,
    that would contain references to all of the project’s tasks, its milestones, the
    team members working on the project, the other meetings scheduled for the project,
    and so on. In short, our attempt to send someone a single meeting object would
    result in archiving the entire project scheduling system, possibly even the application
    itself.


    Objective-C’s solution is to conditionally encode objects. The graph of objects
    that gets encoded consists only of non-conditional objects added to the stream
    using -encodeObject: or


    -encodeObject:forKey:. Conditional objects are encoded using -encodeConditionalObject:
    or


    -encodeConditionalObject:forKey: (see Listing 12-9). These objects are included
    in the archive if, and only if, they have been unconditionally encoded at least
    once. If all of the inclusions of the object are conditional, the object is omitted
    from the archive. When the graph is decoded, the -decodeObject…


    requests for the omitted object return nil.


    Listin g 12-9\. Encoding Conditional Objects


    @interface ProjectMeeting : ScheduledEvent {


    NSString *meetingDescription;


    ProjectTask *task;


    }


    @end


    [www.it-ebooks.info](http://www.it-ebooks.info/)


