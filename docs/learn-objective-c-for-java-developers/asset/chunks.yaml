    \n    unsigned int i;\n\n    points = (NSPoint*)NSAllocateCollectable(count*sizeof(NSPoint),0);\n\
    \n    for (i=0; i<[objects count]; i++) {\n\n        points[i] = …\n\n    }\n\n\
    \    return points;\n\n}\n```\n\n## 垃圾回收的陷阱\n\n这里列举了一些最常见的垃圾回收相关风险及其解决方法。\n\n\
    ### 内部指针\n\n指向可回收对象内部结构的指针不能阻止该对象被回收。如果对象被过早回收，指针将变得无效。清单 9-5 中的示例演示了此问题。\n\n\
    **清单 9-5. 内部指针**\n\n```\nNSData *data = [NSData dataWithData:originalData];\n\n\
    const char *bytes = [data bytes];\n```\n\n假设清单 9-5 中的`data`变量之后再也没有被引用。紧接着这两行代码之后，`NSData`对象可能被回收，导致`bytes`变量指向无效内存。原因在于`[data\
    \ bytes]`语句是该方法中对`NSData`对象的最后一个可达引用。Objective-C 编译器在回收自动变量方面可能非常激进。编译器很可能将`data`和`bytes`分配到同一个\
