    \ 类文件，命名为 `WordFinder.m`，以及它的配套头文件 `WordFinder.h`。将 `WordFinder` 设为 `NSOperation`\
    \ 的子类，如代码清单 4-2 所示。\n\n***代码清单 4-2.** WordFinder 接口*\n\n```\n@class ScrapWordsController;\n\
