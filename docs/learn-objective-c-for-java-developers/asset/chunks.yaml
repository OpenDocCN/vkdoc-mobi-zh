- fmt: "# Memory Management in Objective-C\n\nThese three issues have been the driving\
    \ force for finding better ways of managing blocks of memory, and by extension\
    \ objects, for the past half century of computer science.\n\n## Objective-C Reference\
    \ Counting\n\nWhile garbage collection is a far more elegant solution—neatly solving\
    \ all three problems at once—it’s a complex system, requiring significant resources,\
    \ and has only recently matured. Pre-garbage collection Objective-C employed a\
    \ simple alternative: reference counting.\n\nReference counting introduces the\
    \ concept of owners: code or objects that hold a pointer to another object are\
    \ said to own that object. When an object or block of code wants to hold a reference\
    \ to an object, it first `retain`s it. When it’s done with the object, it `release`s\
    \ it.\n\nThe goal of reference counting is to apply the same logic to object management\
    \ that garbage collection does: an object is kept alive as long as it has owners\
    \ (references). The primary difference between reference counting and garbage\
    \ collection is that in reference counting, it’s up to the programmer to inform\
    \ the object when a reference to it has been established or forgotten.\n\nHere’s\
    \ how reference counting works:\n\n1. When an object is initially allocated, it\
    \ has a reference count of 1.\n2. Any code that wants to use the object first\
    \ increases its reference count by 1. This is called a retain.\n3. When the code\
    \ that holds the pointer in steps 1 or 2 no longer uses it, it decreases the object’s\
    \ reference count by 1 and it forgets the pointer. This is called a release.\n\
    4. When an object’s reference count decreases to 0, the object is immediately\
    \ destroyed and its memory freed.\n\nAn example of reference counting is shown\
    \ in Listing 24-2.\n\n**Listing 24-2. Fundamental Reference Counting Pattern**\n\
    \n```\nid myObject = [[MyClass alloc] init];\n…\n[myObject doSomething];\n…\n\
    [myObject release];\n```\n\nIn Listing 24-2, the reference points to an object\
    \ that was just created. Newly created objects have an implicit reference count\
    \ of 1 (or they wouldn’t exist). The program uses the object, and then sends it\
    \ a `-release` message to indicate that it will never use that object again. The\
    \ `-release` message decrements the object’s retain count and immediately destroys\
    \ the object. This assumes that no other object or code `-retain`ed the object\
    \ in the interim. If so, the object would continue to exist because it still had\
    \ at least one owner.\n\nIn practice, managing release counts manually isn’t as\
    \ onerous as it might seem. The next few sections will explain the role of autorelease\
    \ pools and describe the common programming patterns for using reference counting\
    \ with objects. Autorelease pools are brilliant, and the patterns are easy to\
    \ apply.\n\nIf consistently applied—and that’s a big “if”—reference counting provides\
    \ an experience that’s equivalent to using garbage collection about 80 percent\
    \ of the time. In fact the biggest problem you’re likely to encounter, coming\
    \ from a garbage collection environment, is forgetting to apply the required patterns\
    \ the remaining 20 percent of the time.\n\n## Autorelease Pools\n\nAutorelease\
    \ pools add the very garbage collection–like concept of deferring the destruction\
    \ of an unreferenced object until some unspecified time in the future. Autorelease\
    \ pools seem to mystify many new Objective-C programmers, but they are stunningly\
    \ simple:\n\n- An autorelease pool is a collection of objects that will eventually\
    \ receive a `-release` message.\n\nThat’s it. To use an autorelease pool, send\
    \ an object an `-autorelease` message instead of a `-release` message. The receiver\
    \ is not immediately released; it is simply added to the autorelease pool.\n\n\
    Later—usually long after your code has finished—the pool is drained and each object\
    \ in the pool receives its `-release` message.\n\nThe cardinal rule to remember\
    \ is this: release an object by sending it either a `-release` or an `-autorelease`\
    \ message, but never both. The two messages are logically equivalent and differ\
    \ only in timing. The former releases the object immediately. The latter adds\
    \ it to the autorelease pool, to be released at some future time.\n\n### Autorelease\
    \ Pool Lifetime\n\nNormally, you don’t create autorelease pools yourself. (A later\
    \ section in this chapter explains why, and how, you would.) For the most part,\
    \ always assume that there’s an active autorelease pool and the `-autorelease`\
    \ message will add the receiver to the current pool. Despite their vague assurances\
    \ of “eventually” releasing objects, autorelease pools have a very definite lifespan.\
    \ Most autorelease pools are created by the working run loop at the beginning\
    \ of each event dispatch. The pool is drained after the code that handled the\
    \ event has returned. This mechanism defines an important rule about the lifespan\
    \ of autorelease pools:\n\n- The current autorelease pool will never be drained\
    \ before your method or function returns.\n\nThe importance of this rule probably\
    \ isn’t immediately obvious, but it will be as you work through the next few sections.\n\
    \n### Returned References\n\nThe reference counting rules laid out in the previous\
    \ section appear simple and sound, but they actually contain one huge flaw: how\
    \ do you release an object (decrease its reference count) after the code no longer\
    \ has a pointer to it? You could avoid this situation in many cases with careful\
    \ coding, but there’s one inescapable case where you can’t—returning an object\
    \ reference to the sender. Using the reference counting rules learned so far,\
    \ you’d probably be tempted to write something like the code shown in Listing\
    \ 24-3.\n\n**Listing 24-3. Retain and Return Problem**\n\n```objective-c\n@implementation\
    \ Zombie\n\n- (void)recitePoetry\n{\n    NSString *myName = [[self zombieName]\
    \ retain];\n    [self speakFormat:@\"Hello, my name is %@. This is my poem.\"\
    ,myName];\n    …\n    [myName release];\n}\n\n- (NSString*)zombieName\n{\n   \
    \ NSMutableString *z = [[NSMutableString alloc] init];\n    [z appendString:@\"\
    Zombie \"];\n    [z appendString:[self humanName]]; // e.g. \"Zombie Bob\"\n \
    \   return z;\n    // [z release] ? ? ? ? ?\n}\n\n…\n@end\n```\n\nIn the `-recitePoetry`\
    \ method, the `NSString` object returned by `-zombieName` is retained, used in\
    \ the body of the method, and then released. In the `-zombieName` method, the\
    \ string object is implicitly retained when it is created, used in the body of\
    \ the method, and returned to the sender. But wait! It also needs to be released,\
    \ since `-zombieName`s will never use it again. Yet there’s no way to do that\
    \ after the method has returned to its sender.\n\nAutorelease pools solve this\
    \ by deferring the needed release to some later time. The `-zombieName` method\
    \ is rewritten in Listing 24-4 to use the autorelease pool.\n\n**Listing 24-4.\
    \ Autoreleasing a Returned Object**\n\n```objective-c\n- (NSString*)zombieName\n\
    {\n    NSMutableString *z = [[NSMutableString alloc] init];\n    [z appendString:@\"\
    Zombie \"];\n    [z appendString:[self humanName]];\n    return [z autorelease];\n\
    }\n```\n\nThe string object is added to the autorelease pool before being returned\
    \ to the sender. This correctly balances the implied retain that occurred when\
    \ the object was created, and ensures that it will eventually be destroyed.\n\n\
    > **Note** The `-retain` and `-autorelease` messages return the receiver to the\
    \ sender, allowing it to be chained into expressions like `return [obj autorelease]`\
    \ and `property = [obj retain]`. This avoids having to write `[obj autorelease]`\
    \ and `return obj` as separate statements.\n\nWhen an object reference is returned\
    \ to the sender, it has already received the correct number of `-release` or `-autorelease`\
    \ messages. In Objective-C parlance, this is called an autoreleased object.\n\n\
    This creates another rule for Objective-C objects."
