    `ScheduledEvent` objects can now be archived using the `NSKeyedArchiver` class.
    The code in Listing 12-4 only supports keyed archiving, so the object still isn’t
    usable with a sequential archive or distributed objects. The basic steps for creating
    an archivable class are as follows:


    - Conform to `NSCoding`, or subclass a class that conforms to `NSCoding`.

    - Implement an `-initWithCoder:` method that initializes the new object using
    the data in the decoder. If the class inherits `NSCoding`, the method should begin
    with `self = [super initWithCoder:decoder]`.

    - Implement an `-encodeWithCoder:` method that encodes the object. If the class
    inherits `NSCoding`, the method should begin with `[super encodeWithCoder:coder]`.

    - Encode or decode all persistent member variables by sending the appropriate
    `-encode…` or `-decode…` message to the coder object. Complex variables, like
    structures, must be decompiled into their constituent primitive values. The coding
    methods are listed in Table 12-2.


    `NSCoding` methods for use with keyed archivers should only send the `-encode…:forKey:`
    and `-decode…ForKey:` messages. Classes that encode sequential archives or are
    used as distributed objects should only send the `-encode…:` and `-decode…` messages.
    How a class supports both is described a little later.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## CHAPTER 12 ■ SERIALIZATION


    ### Table 12-2. Encoding Methods


    | Objective-C Type | Keyed Encoder | Sequential Encoder |

    |-----------------|---------------|--------------------|

    | `id` | `encodeObject:forKey:` | `encodeObject:` |

    | `NSInteger` | `encodeInteger:forKey:` | `int` |

    | `long long int` | `encodeInt32:forKey:` | - |

    | `BOOL` | `encodeBool:forKey:` | - |

    | byte array | `encodeBytes:length:forKey:` | `encodeBytes:length:` |

    | `double` | `encodeDouble:forKey:` | - |

    | `float` | `encodeFloat:forKey:` | - |

    | `NSPoint` | `encodePoint:forKey:` | `encodePoint:` |

    | `NSRect` | `encodeRect:forKey:` | `encodeRect:` |

    | `NSSize` | `encodeSize:forKey:` | `encodeSize:` |

    | any C type | - | `encodeValueOfObjCType:at:` |


    The values you choose for keys are entirely arbitrary. You can choose to use any
    keys you like, they just have to be consistent and unique within the scope of
    the object.


    Unlike typical Java serialization, you are in control of what values are encoded
    and how they are interpreted when decoded. You are free to choose how your object
    is represented in the data stream. As an example, take a publishing application
    that has an ink color object. The object’s `-encodeWithCoder:` method could simply
    encode all of the properties of the ink color (amount of Cyan, Magenta, Yellow,
    Black, and so on) or it could encode just the Pantone® name of the color. When
    the object is decoded, it would use the color’s name to initialize itself with
    equivalent color values. Techniques like this can make the encoded version of
    your objects more transportable and durable.


    > **Caution:** Avoid sending messages to object pointers returned by `-decodeObject...`
    within the scope of your `-initWithCoder:` method. Circular references may cause
    the object pointer returned by `-decodeObject…` to refer to a partially initialized
    object.


