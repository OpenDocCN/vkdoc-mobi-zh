    与`NSNumberFormatter`类似，`NSDateFormatter`是一个用于翻译日历日期和时钟时间的专用格式化器。它也可以通过预定义样式、日期格式模式或通过独立属性进行配置。预定义样式列于表
    8-12 中，并附有英国英语用户的使用结果。


    **表 8-12. 英文（英国）预定义日期格式化样式**


    | 日期样式 | 结果 |

    |---|---|

    | `NSDateFormatterShortStyle` | 15/02/2005 |

    | `NSDateFormatterMediumStyle` | 15 Feb 2005 |

    | `NSDateFormatterLongStyle` | 15 February 2005 |

    | `NSDateFormatterFullStyle` | Tuesday, 15 February 2005 |


    `Unicode Technical Standard #35` 还定义了日期格式模式，它们与 `java.util.Formatter` 支持的日期和时间格式说明符非常相似。Objective-C
    的字符串格式化并不尝试支持哪怕最简单的日期和时间格式化，而是将这一任务委托给功能更强大的 `NSDateFormatter` 类。表 8-13 展示了一些简单的日期格式模式，结果基于美国英语用户。


    **表 8-13. 英文（美国）日期格式模式示例**


    | 日期格式 | 结果 |

    |---|---|

    | `yyyy-MM-dd ''at'' HH:mm` | 2005-02-15 at 13:40 |

    | `EEEE MMMM d, yyyy` | Tuesday February 15, 2005 |

    | `''millisecond'' A ''of Julian day'' g` | millisecond 49259000 of Julian day
    2453417 |

    | `QQQQ` | 1st quarter |


    ## 总结


    Objective-C 中的字符串和包装类在概念上与 Java 中的并无太大差异。包装类更加通用，可以包装的不仅仅是内置的值类型。与 Java 不同的是，Objective-C
    的字符串可以被继承。这意味着它们可能是可变的，但通常不是，并且通常可以像在 Java 中一样使用。请记住在格式字符串中使用 `%@` 而不是 `%s`，并利用
    `NSFormatter` 类进行复杂的值转换。


    ---


    # 第 9 章：垃圾回收


    垃圾对象的回收最显著的特点就是程序员无需执行的操作。在理想情况下，你只需忽略垃圾回收的机制，让运行时系统处理细节即可。但在某些情况下，你确实需要关注垃圾回收。弱引用和终结方法需要你对导致对象成为垃圾的原因以及它们如何被回收有一定的理解。


    Objective-C 2.0 的垃圾回收在总体上与你体验过的 Java 垃圾回收类似。大多数时候，你只需忘记它，它就能“正常工作”。Objective-C
    的垃圾收集器与现代 Java 实现处于同一水平。它是一个保守的、多代的垃圾收集器，在后台的独立线程上运行。它能从容处理所有典型的编程问题，如循环引用。它高效且极少妨碍你的应用程序。


    在本章后面，你将学习如何编写 `-finalize` 方法以及如何使用弱引用。如果你只编写“纯”Objective-C 代码（仅处理对象和对象指针），这可能就是你所需了解的全部内容，学完后你可以直接跳到下一章。只有当你在
    Objective-C 的范畴之外，接触到 C 指针的“荒野”时，才需要继续阅读。


    正如常言道，细节决定成败。由于 C 语言对内存访问的宽松（有人称之为无政府状态）权限，Objective-C 的垃圾回收变得复杂。由于缺少 Java 所强加的程序员与物理内存之间的严格隔离，因此无法绝对确定哪些对象正在被引用，哪些没有。Objective-C
    采用了一种尽力而为的方法，在效率和便利性之间取得平衡。然而，这种方法中存在一些微妙的漏洞，可能导致对象泄漏或过早地被回收。学习如何识别并避免这些情况是本章后半部分的重点。


    ## 垃圾回收的理论


    现代垃圾回收系统通过确定可达对象图来运作。这是指你的应用程序拥有引用，或能够通过其他引用获得引用的对象集合。


    该图从根对象集开始。这包括全局（静态）变量中的对象指针、每个线程栈中的对象指针以及 CPU 寄存器中的任何对象指针。然后，通过添加所有被根对象引用的对象，以及被这些对象引用的所有对象，以此类推，直到集合中不再有任何未包含的对象引用，从而扩展该集合。这就形成了完整的可达对象集。不在该集合中的任何对象都有资格被回收和销毁。


    导致一个对象被回收，只需清除（有时称为“遗忘”）所有指向该对象的可达引用。该对象便会落入可达对象集之外，从而被回收。


    ## 选择使用垃圾回收


    Objective-C 的垃圾回收并非普遍可用。并非所有的开发和运行时环境都支持它，即便支持，也通常不是默认的内存管理服务。在撰写本文时，Objective-C
    垃圾回收是一项功能，而非标准。请检查你的部署环境（平台和操作系统版本）的能力，以确定是否支持垃圾回收。如果支持，请确保在你的项目中启用它——参见第 4 章的示例。如果垃圾回收不可用，你将不得不采用传统的
    Objective-C 内存管理。第 24 章将对此进行更详细的说明。


    在大多数运行时环境（如 Cocoa 应用程序）中，垃圾收集器会自动为你启动。如果你正在构建一个使用 Objective-C 的命令行工具，则必须通过在你的工具启动时尽早调用
    C 函数 `objc_startCollectorThread()` 来启动垃圾收集器。


    ## 使用垃圾回收编写代码


    选择是否使用垃圾回收将决定你的编码风格。可以编写在 GC（垃圾回收）和非 GC（手动管理内存）运行时环境中都能运行的 Objective-C 代码，但这很复杂，而且很少有必要这样做。一个例子是由其他应用程序动态加载的插件框架，其中一些使用
    GC，另一些不使用。对于直接的应用程序开发，请在假定使用垃圾回收或手动管理内存的前提下编写所有代码。本章为在垃圾回收环境中编写 Objective-C 提供了指导。第
    24 章解释了传统的手动内存管理。


    在 Objective-C 中创建新对象的常见方法如下：


    `[SomeClass new]`


    `[[SomeClass alloc] init]`


    `[[SomeClass alloc] initWith:…]`


    `[SomeClass someConvenienceConstructor]`


    这些与非 GC 环境中创建对象的方式完全相同。在 GC 环境中，你基本上就完成了。一旦对象创建完成，你无需再做其他任何事情；当你不引用它时，垃圾收集器会处理它。


    **注意：** 如果你正在阅读为非 GC 环境编写的代码，你会看到对象被发送了 `-retain`、`-release` 和 `-autorelease`
    消息。在垃圾收集环境中，这些消息会被忽略。如果你要将代码从非 GC 环境移植到 GC 环境，可以安全地删除所有 `-retain`、`-release` 和
    `-autorelease` 消息。此外，`-retainCount` 和 `-dealloc` 消息也会被拦截。`-retainCount` 返回的值没有意义。对象的
    `-dealloc` 方法将永远不会被执行，即使你自己尝试向它发送 `-dealloc` 消息——无论如何你都不应该这样做。

