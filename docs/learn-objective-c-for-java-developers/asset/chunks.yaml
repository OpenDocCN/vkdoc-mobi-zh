    Alternate APIs


    This chapter has concentrated on the Objective-C classes and methods that interact
    with the file system.


    These are adequate for most purposes, but a lot of important functionality is
    only available through the Core Services and BSD APIs.


    There is a lot of overlap between the functionality of the various frameworks.
    For example, the Core Services framework provides the FSCopyObjectSync function
    that is roughly equivalent to


    -[NSFileManager copyItemAtPath:toPath:error:]. However, it also includes FSCopyObjectAsync,
    which performs the copy in its own thread. So which API you choose to use will
    largely depend on the special features or capabilities you need.


    The Core Services framework is actually a framework of frameworks that include
    basic file I/O


    functions. The subframeworks of interest are the Carbon Core and Launch Services
    frameworks. The Carbon functions provide basic file functions in addition to backwards
    compatibility with applications written for the classic Macintosh OS. Launch Services
    provide functions instrumental when a user is interacting with the file system.
    This includes information about a file’s visibility, it’s display name, icon,
    what application will launch when the user opens a document, what applications
    are capable of opening a given document, and so on. Some common Core Services
    functions are listed in Table 11-12\. As a rule, the file system functions in
    the Carbon framework all begin with “FS” and Launch Servcies functions begin with
    “LS.”'
