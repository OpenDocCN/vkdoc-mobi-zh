    \n### 下载 URL\n\nCocoa 框架提供了一个便捷的实用类，专门用于从 URL 下载文件。\n\n`NSURLDownload`对象的构造方式与`NSURLConnection`对象非常相似，但除了请求对象外，还需要提供目标文件路径。下载将自动启动，并根据成功与否向你的委托对象发送`-downloadDidFinish:`消息。\n"
- fmt: "- `download:didFailWithError:` message if not. The code for a simple downloader\
    \ class is shown in Listing 13-13.\n\n## Listing 13-13\\. Simple File Downloader\
    \ Class\n\n```\n@interface FileDownloader : NSObject\n\n- (void)downloadURL:(NSString*)source\
    \ toPath:(NSString*)destination;\n\n@end\n\n@implementation FileDownloader\n\n\
    - (void)downloadURL:(NSString*)source toPath:(NSString*)destination\n{\n    NSURL\
    \ *url = [NSURL URLWithString:source];\n    NSURLRequest *urlRequest = [NSURLRequest\
    \ requestWithURL:url];\n    NSURLDownload *download = [[NSURLDownload alloc] initWithRequest:urlRequest\
    \ delegate:self];\n    [download setDestination:destination allowOverwrite:YES];\n\
    \    // download starts automatically\n}\n\n- (void)download:(NSURLDownload*)download\
    \ didFailWithError:(NSError*)error\n{\n    // download failed\n}\n\n- (void)downloadDidFinish:(NSURLDownload*)download\n\
    {\n    // download finished successfully\n}\n\n@end\n```\n\n`NSURLDownload` supports\
    \ a number of other delegate methods for monitoring the progress of the download,\
    \ responding to authentication challenges, and for interactively deciding on a\
    \ destination file path. It also supports resumption of an interrupted download\
    \ through the `-initWithResumeData:delegate:path:` constructor.\n\n## Caches and\
    \ Cookies\n\nLike Java, Objective-C URL connections support local caches and cookies.\
    \ In Java, caching is configured using `java.net.URLConnection.setUseCaches(boolean)`\
    \ and cookies are handled automatically.\n\nObjective-C provides a per-process\
    \ cache manager that will keep frequently requested data in memory or on disk\
    \ for improved performance. You can influence how a request uses the cache in\
    \ two ways. The first is to specify the `NSURLRequestCachePolicy` when the `NSURLRequest`\
    \ is created, or by setting the policy of the `NSMutableURLRequest` before the\
    \ request is sent. The policy can choose to use an optimal default—the recommended\
    \ choice—or choose from a number of policies, from ignoring all cached data to\
    \ only responding with cached data. More sophisticated cache management can be\
    \ performed by implementing the `-connection:willCacheResponse:` method in your\
    \ `NSURLConnection` delegate object. This message is sent to the delegate before\
    \ storing any received data in the cache. It can permit it to be stored as is,\
    \ prevent it from being stored, or provide altered data to store in its place.\n\
    \nCookies are automatically supplied from a system-wide cookie storage service.\
    \ The default is to handle cookies according to the user-selected security policy.\
    \ You can disable cookies for a single request by creating an `NSMutableURLRequest`\
    \ object and sending it `[request setHTTPShouldHandleCookies:NO]`. You can also\
    \ change the cookie policy, but doing so changes the policy for all processes\
    \ on the system.\n\n## Summary\n\nObjective-C provides a variety of communication\
    \ technologies, which reflect the wide range of communication problems facing\
    \ modern applications. From simple notifications to distributed objects, the solution\
    \ you choose will depend on the kind of problem you’re trying to solve. In most\
    \ cases, Objective-C solutions will parallel the ones you’re familiar with in\
    \ Java, although the implementation details may vary substantially.\n\n---\n\n\
    # Chapter 14: Exception Handling\n\nException handling in Objective-C is almost\
    \ identical in capacity with that in Java. Objective-C is, naturally, more casual\
    \ about exceptions and makes none of the demands that Java does. You can design\
    \ and write code using Objective-C exceptions exactly as you would in Java, completely\
    \ ignore them, or settle somewhere in between. This chapter will briefly compare\
    \ the similarities between Objective-C and Java exception handling—of which there\
    \ are many—and then explain some of the subtle differences.\n\nLater sections\
    \ will discuss assertions and alternatives to exceptions.\n\n## Using Exceptions\n\
    \nCreating, throwing, and catching exceptions are virtually identical in Objective-C\
    \ and Java. Listing 14-1 shows some simple exception handling.\n\n### Listing\
    \ 14-1\\. Exception Handling\n\n**Java**\n\n```\npublic class Tosser\n{\n    public\
    \ void catcher( ) throws Exception\n    {\n        try {\n            System.out.println(\"\
    Tosser.catcher(): trying\");\n            thrower();\n        } catch ( SpecificException\
    \ se ) {\n            System.out.println(\"caught SpecificException: \"+se);\n\
    \        } catch ( Exception e ) {\n            System.out.println(\"caught Exception:\
    \ \"+e);\n            throw e;\n        } finally {\n            System.out.println(\"\
    Tosser.catcher(): finished\");\n        }\n    }\n\n    public void thrower( )\
    \ throws Exception\n    {\n        throw new Exception(\"thrower() does not work\"\
    );\n    }\n}\n```\n\n**Objective-C**\n\n```\n@interface Tosser : NSObject\n- (void)catcher;\n\
    - (void)thrower;\n@end\n\n@implementation Tosser\n- (void)catcher\n{\n    @try\
    \ {\n        NSLog(@\"%s trying\",__func__);\n        [self thrower];\n    } @catch\
    \ ( SpecificException *se ) {\n        NSLog(@\"caught SpecificException: %@\"\
    ,se);\n    } @catch ( NSException *e ) {\n        NSLog(@\"caught NSException:\
    \ %@\",e);\n        @throw e;\n    } @finally {\n        NSLog(@\"%s finished\"\
    ,__func__);\n    }\n}\n\n- (void)thrower\n{\n    @throw [NSException exceptionWithName:@\"\
    MyException\"\n                                  reason:@\"-thrower does not work\"\
    \n                                userInfo:nil];\n}\n@end\n```\n\nThe similarities\
    \ are much more pronounced than the differences. Specifically, the `@try`, `@catch`,\
    \ and `@finally` blocks have the same syntax, order, and execution flow that the\
    \ `try`, `catch`, and `finally` blocks do in Java. You throw exception objects\
    \ using the Objective-C `@throw` directive exactly as you would with Java’s `throw`\
    \ statement. Caught exceptions can be processed or re-thrown in the same way.\n\
    \nIf you want to employ exceptions in Objective-C the way you do in Java, you’re\
    \ welcome to do so. The capabilities of Objective-C exceptions are so close to\
    \ that of Java’s that you probably won’t notice any significant difference. There\
    \ are, however, some differences—mostly in what Objective-C will allow you to\
    \ do that Java doesn’t. The next section explains exactly what those differences\
    \ are and what impact they might have on your design.\n\n## Exception Handling\
    \ Differences\n\nObjective-C is much more relaxed about exceptions than Java.\
    \ One could argue that it’s too relaxed, but that’s an academic debate. Most of\
    \ the differences between Java and Objective-C exception handling fall outside\
    \ the bounds of what Java allows.\n\n### No Catch or Specify\n\nThe Java language\
    \ has a “Catch or Specify” rule that requires you to either declare the exceptions\
    \ that a method throws or catch those exceptions within the body of the method.\
    \ Objective-C doesn’t check to see if your code catches exceptions, and it doesn’t\
    \ even have syntax for declaring what exceptions a method throws. This is mostly\
    \ because (due to the dynamic nature of class methods) it has no way of knowing.\
    \ To use Java parlance, all Objective-C exceptions are unchecked exceptions.\n\
    \n### Throw Any Object\n\nObjective-C can throw or catch any object, unlike Java,\
    \ which requires the object of a `throw` statement to implement the `Throwable`\
    \ interface. If an `NSString` object is sufficient to convey all of the information\
    \ you want about an exception, then the following code is perfectly valid:\n\n\
    ```\n@throw @\"Something went wrong\";\n```\n\nYour code may, for example, throw\
    \ an exception if an `NSOperation` failed. But instead of throwing an `NSException`\
    \ that referenced the `NSOperation`, you could throw the `NSOperation` object\
    \ itself. What you throw will, of course, depend on what you’re trying to accomplish,\
    \ but you aren’t limited to `NSException` and its subclasses."
