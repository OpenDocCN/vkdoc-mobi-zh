- fmt: "> **Note**  \nSpeaking of subclasses, there are very few subclasses of `NSException`.\
    \ In Java, you create different types of exceptions by subclassing `java.lang.Exception`.\
    \ `NSException` objects have a name property, and it is far more common to identify\
    \ the type of an exception using its name than its class. That’s not to say that\
    \ you shouldn’t subclass `NSException`. I often do, but it’s limited to situations\
    \ where I want to add functionality to the `NSException` object or I want to create\
    \ a broad category of exceptions. The Cocoa framework defines commonly used exception\
    \ names, which you can find in the *Introduction to Exception Programming Topics\
    \ for Cocoa*[^1].\n\nIf you can throw any kind of object, you might be wondering\
    \ what the exact role of the `NSException` class is. For starters, `NSException`\
    \ is purpose built for conveying the details of an exception. It contains useful\
    \ information, like a stack trace and exception description, and it can participate\
    \ in the unhandled exception mechanism described later in this section. Originally,\
    \ `NSException` was the only mechanism for throwing exceptions. See the *Legacy\
    \ Exceptions* section towards the end of the chapter for the details. Because\
    \ of this, many older frameworks are only prepared to catch `NSException`s. If\
    \ you throw an object that might not be caught by your code, make sure it is an\
    \ `NSException` object.\n\n[^1]: Apple, Inc., *Introduction to Exception Programming\
    \ Topics for Cocoa*, [http://developer.apple.com/documentation/Cocoa/Conceptual/Exceptions/](http://developer.apple.com/documentation/Cocoa/Conceptual/Exceptions/),\
    \ 2007.\n\n---\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## CHAPTER\
    \ 14 ■ EXCEPTION HANDLING\n\n### Re-Throw an Exception\n\nObjective-C includes\
    \ a convenient syntax for re-throwing the exception caught in a `@catch` block,\
    \ as shown in Listing 14-2.\n\n**Listing 14-2.** Re-throwing an Exception\n\n\
    ```\n@try {\n    …\n} @catch (NSException *exception) {\n    …\n    @throw;\n\
    }\n```\n\nAn empty `@throw` directive re-throws the exception caught by its enclosing\
    \ `@catch` block. In Listing 14-2, the statement `@throw` is identical to `@throw\
    \ exception`.\n\n### Catch Order\n\nLike Java, the order of `@catch` blocks must\
    \ be from the most specific to the most general. Said another way, a `@catch`\
    \ block that catches a particular class cannot be followed by a `@catch` block\
    \ that catches a subclass of that class. Catch blocks are tested in sequential\
    \ order, and the first catch block would prevent the later one from ever executing.\n\
    \nIn Java, improperly ordered `@catch` blocks result in a fatal compiler error.\
    \ The Objective-C compiler merely issues a warning—and it can only issue that\
    \ warning if it knows the class’s pedigree.\n\nTake the code in Listing 14-3 as\
    \ an example.\n\n**Listing 14-3.** Out of Order `@catch` Blocks\n\n```\n@class\
    \ MysteryException\n…\n@try {\n    …\n} @catch (NSObject *anything) {\n    …\n\
    } @catch (MysteryException *exception) {\n    …\n}\n```\n\nThe second `@catch`\
    \ block will never be executed, because `MysteryException` is a subclass of `NSObject`.\
    \ But this code won’t generate a compiler warning. That’s because the `@class`\
    \ statement lets the compiler know that the `MysteryException` class exists, but\
    \ doesn’t tell anything about it. As a rule, include the class definition for\
    \ all objects you intend to catch.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 14 ■ EXCEPTION HANDLING\n\n### Chaining\n\nThe `NSException` class\
    \ does not have a cause property, like the one in `java.lang.Throwable`. Instead,\
    \ `NSException` objects have a dictionary (map) object that allows you to provide\
    \ arbitrary context for the exception. If you want to throw an exception that\
    \ references another exception, include it—along with any other pertinent details—in\
    \ the exception’s info dictionary, as shown in Listing 14-4.\n\n**Listing 14-4.**\
    \ Chaining Exceptions\n\n**Java**\n\n```\ntry {\n    …\n} catch (Exception e)\
    \ {\n    throw new SpecificException(\"encountered exception\", e);\n}\n```\n\n\
    **Objective-C**\n\n```\n@try {\n    …\n} @catch (NSException *exception) {\n \
    \   NSDictionary *userInfo = [NSDictionary dictionaryWithObject:exception\n  \
    \                                                      forKey:@\"RootCause\"];\n\
    \    @throw [SpecificException exceptionWithName:@\"MySpecialException\"\n   \
    \                                     reason:@\"encountered exception\"\n    \
    \                                  userInfo:userInfo];\n}\n```\n\n### Call Stack"
