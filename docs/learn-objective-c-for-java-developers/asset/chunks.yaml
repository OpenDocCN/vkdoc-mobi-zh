- fmt: "在GC环境中，属性和手动编写的setter方法应使用简单赋值。清单9-1展示了一个属性和一个假设使用垃圾回收机制而手动实现的setter方法。作为对比，还包含了一个适用于非GC环境的实现。两种实现具有等效的行为且都是线程安全的。\n\
    \n**清单9-1：GC与非GC环境下的属性实现**\n\n**GC环境**\n\n```objc\n@interface Doll : NSObject\
    \ {\n    NSColor *hairColor;\n    NSColor *eyeColor;\n}\n@property (assign) NSColor\
    \ *hairColor;\n@property (assign) NSColor *eyeColor;\n@end\n\n@implementation\
    \ Doll\n@synthesize hairColor;\n\n- (NSColor*)eyeColor {\n    return eyeColor;\n\
    }\n\n- (void)setEyeColor:(NSColor*)color {\n    eyeColor = color;\n}\n@end\n```\n\
    \n**非GC环境**\n\n```objc\n@interface Doll : NSObject {\n    NSColor *hairColor;\n\
    \    NSColor *eyeColor;\n}\n@property (retain) NSColor *hairColor;\n@property\
    \ (retain) NSColor *eyeColor;\n@end\n\n@implementation Doll\n@synthesize hairColor;\n\
    \n- (NSColor*)eyeColor {\n    @synchronized(self) {\n        return [[eyeColor\
    \ retain] autorelease];\n    }\n}\n\n- (void)setEyeColor:(NSColor*)color {\n \
    \   @synchronized(self) {\n        if (eyeColor != color) {\n            [eyeColor\
    \ release];\n            eyeColor = [color retain];\n        }\n    }\n}\n@end\n\
    ```\n\n**编写`-finalize`方法**\n\n当一个对象的所有引用都消失后，该对象就具备了被回收和销毁的资格。在Objective-C中，与Java一样，垃圾回收器会在每个可回收对象被销毁前向其发送一条`-finalize`消息。行为良好的`-finalize`方法的规则与Java中的非常相似，因此这里仅作总结：\n\
    \n- 不要尝试执行耗时的清理或资源回收操作。这些操作应在对象被遗忘之前完成。\n- 不要试图断开对象图或通过将实例变量设置为`nil`来帮助垃圾回收器（这是多余的）。\n\
    - 不要尝试将对象从集合或视图层次结构中移除（这是多余的）。\n- 在对象接收到`-finalize`消息之前，所有对它的弱引用都已被断开。\n- 向其他对象发送消息通常是安全的，但应将其保持在最低限度。\n\
    - 对象可能会以任意顺序被终止，因此你的对象应准备好（在接收`-finalize`之前或之后）接收来自其他可回收对象的消息。\n- 接收到`-finalize`消息的对象不应尝试复活可回收对象，也不应通过创建对`self`的强引用来尝试复活自身。\n\
    - 每个对象只会收到一条`-finalize`消息。\n- 对象的`-finalize`方法必须是线程安全的。\n\n**创建弱引用**\n\n在某些情况下，你的应用程序希望保持对一个对象的引用，但又不希望阻止垃圾回收器回收它。典型的情况是一个缓存或对象池（假设它们是图形图像），被许多其他对象使用。单一的资源对象缓存或池使得各个对象能够方便地获取对这些公共资源对象的引用。当应用程序中的所有对象都处理完某个资源后，它们都会“忘记”这个对象。\n\
    \n理想情况下，该资源对象现在应该被回收，但来自池的对该对象的唯一引用阻止了它被收集。\n\n这可以通过使用弱引用来解决。弱引用是指向一个对象的指针，垃圾回收器在构建可达对象集时不会对其进行遍历。从垃圾回收器的角度来看，它不是一个引用，也不会阻止该对象被回收。\n\
    \n在Java中，弱引用是通过`java.lang.ref.WeakReference`对象建立的。要创建一个弱引用，需创建一个`WeakReference`对象来持有对弱引用对象的引用，如清单9-2所示。在Objective-C中，在任何对象指针后附加`__weak`修饰符即可创建弱引用。"
