    \n`withObjectsFromArray:`\n\n`exchangeObjectAtIndex:`\n\n`withObjectAtIndex:`\n\
    \n`setArray:`\n\n`trimToSize()`\n\n`compact`\n\n表 16-3 和 16-4 中的一些方法并非与 Java 方法一一对应，尽管大部分都是。例如，`toArray()`返回一个数组对象，而`-getObjects:`则用集合的值填充一个\
    \ C 数组。像`arrayList.isEmpty()`这样的简单表达式很容易被替换为`[array count]==0`。大多数方法都是不言自明的。\n\
    \n### `NSArray`、`NSMutableArray`\n\n除了不允许使用`nil`（null）值之外，`NSMutableArray`可能与你所能找到的`java.lang.ArrayList`非常接近。正如你从前面的表格中看到的，这里有更多便捷方法，因此在你编写自己的代码（例如交换集合中的两个元素）之前，先查找一下数组方法。\n\
    \n`NSArray`区分了两个相等对象（`-indexOfObject:`）和两个相同对象（`-indexOfObjectIdenticalTo:`）之间的区别。后者比较对象指针是否相等，而前者比较对象的值是否相等。请参阅本章后面的“集合相等契约”部分。\n\
    \n许多方法，如`-removeObjectsAtIndexes:`，操作由`NSIndexSet`对象定义的任意索引列表——这是另一个集合类，将在后面的“无序集合”部分讨论。像`-objectsAtIndexes:`这样的方法特别强大；它会返回一个新的`NSArray`对象，该对象是接收者集合的任意子集，通过使用`NSIndexSet`中的索引来选择。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 16 章 ■ 集合模式\n\n###\
    \ COCOA 集合类组织\n\nJava 集合类被整齐地组织成继承树。基础`Collection`接口有`List`、`Map`和`Set`子接口，这些接口体现在`AbstractCollection`、`AbstractList`、`AbstractMap`和`AbstractSet`类中，并最终实现为我们每天使用的具体集合类。\n\
    \nObjective-C 类几乎没有层次结构。大多数是`NSObject`的直接子类。它们都实现`-count`方法是基于约定，而非正式设计。大多数情况下这几乎没什么区别。Objective-C\
    \ 确实缺少像 Java 的`addAll(Collection)`这样的方法，因为它没有涵盖所有集合类的基类。\n\n原因之一是许多 Objective-C\
    \ 集合类实际上是用 C 语言实现的。例如，Core Foundation 的`CFArray`类型实现了`NSArray`，两者可以互换。有关更多详细信息，请参阅第\
    \ 25 章的“免费桥接”部分。\n\n### `NSPointerArray`\n\n`NSPointerArray`是一个较新的集合类。它没有不可变的基类，所以在这方面它更像\
    \ Java 的`ArrayList`类。使`NSPointerArray`及其同类`NSMapTable`和`NSHashSet`与其他集合类不同的是能够“编程”这些集合。该集合通过一组定义其特性的委托函数进行初始化。`NSPointerArray`对象是使用一个包含一组回调函数的`NSPointerFunctions`对象构建的，这些回调函数将用于操作集合中的值。回调函数包括：`hash`、`isEqual`、`size`、`description`、`acquire`和`relinquish`。当你向数组添加一个值时，该值会被传递给`acquire`函数。当值被移除时，它会通过`relinquish`处理。当比较集合中的值时，候选值会被传递给`isEqual`函数进行比较。\n\
    \n> **注意** 你可能会好奇，当`NSPointerArray`不提供搜索集合的方法时，为什么函数指针集还包括执行`hash`和比较的委托函数。这是为了与映射和集合集合保持一致。后两个类使用相同的指针函数对象，并且确实广泛使用了`hash`和比较函数。\n\
    \n通过使用一组委托函数，集合可以适应各种不同的解决方案。为了便于使用这个新集合，Cocoa 框架包含了预定义的指针函数集，可以通过混合指针函数选项常量来选择它们，其中一些列在表\
    \ 16-5 中。这些预定义的函数集实现了你可能需要的大部分集合行为。两种最常见的`NSPointerArray`特性有便捷构造函数：\n\n`[NSPointerArray\
    \ pointerArrayWithStrongObjects]`创建一个常规对象数组，`[NSPointerArray pointerArrayWithWeakObjects]`创建一个使用弱引用的对象数组。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 16 章 ■ 集合模式\n\n**表\
    \ 16-5.** 常用`NSPointerFunctionsOptions`\n\n| 选项标识符 | 描述 |\n|---|---|\n| `NSPointerFunctionsStrongMemory`\
    \ | 值是指针，使用强引用存储。如果未指定内存选项，这是默认的内存选项。 |\n| `NSPointerFunctionsZeroingWeakMemory`\
    \ | 值是指针，使用弱引用存储。 |\n| `NSPointerFunctionsObjectPersonality` | 值是对象指针。对象使用`-isEqual:`消息进行比较。`-description`消息用于生成对象描述。如果未指定特性，这是默认的特性。\
    \ |\n| `NSPointerFunctionsObjectPointerPersonality` | 值是对象指针。通过测试对象指针是否相等来比较对象。`-description`消息用于对象描述。\
    \ |\n| `NSPointerFunctionsCStringPersonality` | 值是指向 C 字符串的指针。使用`strcmp()`函数比较值，并通过将\
    \ C 字符串转换为`NSString`对象来生成描述。 |\n| `NSPointerFunctionsIntegerPersonality` | 值是整数。\
    \ |\n| `NSPointerFunctionsCopyIn` | 添加到集合时复制值。如果值是对象指针，它们必须符合`NSCopying`协议。 |\n\
    \n你也可以通过组合表 16-5 中的一个内存存储选项、一个特性选项以及可选的“复制到”选项来创建一个`NSPointerArray`。清单 16-3 中的代码创建了一个`NSPointerArray`集合，它会复制添加到集合中的对象，并对这些副本保持强引用。\n\
    \n**清单 16-3.** 自定义`NSPointerArray`\n\n```objectivec\nNSPointerArray *array = [NSPointerArray\
    \ pointerArrayWithOptions: (NSPointerFunctionsObjectPersonality\n            \
    \                                                     |NSPointerFunctionsStrongMemory\n\
    \                                                                 |NSPointerFunctionsCopyIn)\
    \ ];\n```\n\n甚至还有更多逐渐深奥的选项，允许`NSPointerArray`存储指向 C 结构的指针、包含整个 C 结构的副本、使用 C 语言的`calloc()`和`free()`函数管理内存等等。有关完整列表，请参阅`NSPointerFunctionsOptions`的文档。为了获得最终控制权，如果预定义函数不能满足你的需求，你可以创建自己的`NSPointerFunctions`对象。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 16 章 ■ 集合模式\n\n###\
    \ 字典集合\n\n`NSDictionary`、`NSMutableDictionary`和`NSMapTable`组织无序的对象对，相当于`java.util.HashMap`。每对包含一个键对象和一个值对象。使用与键相等的对象来访问值。集合中的键是唯一的，但值可以重复。具体而言，Objective-C\
    \ 和 Java 字典类具有以下共同特征：\n\n- 集合中的键和值是对象引用。\n- 键对象不应更改其值。\n- 键必须遵守相等性和哈希契约。\n- 键是唯一的。为现有键存储新值会用新键/值对替换现有的键/值对。\n"
- fmt: "# 集合模式\n\n- 单个值可以用不同的键存储多次。\n- `NSMapTable` 可以为键和/或值对象使用强引用或弱引用，使其成为`java.util.WeakHashMap`的灵活替代品。\n\
    \n有两个关键区别：\n\n- 值对象不能为`nil`（`null`）。`nil`值表示键不存在。若要存储`nil`值，可从集合中移除该键。\n- 键对象始终被复制，且必须遵循`NSCopying`协议。集合会保留键对象的副本，而非用于添加键/值对的原始实例。\n\
    \n## 常用方法\n\n表16-6和16-7列出了Java和Objective-C中常见的字典（映射）方法。表16-6中的消息不会更改集合，并同时适用于可变和不可变集合。表16-7中的消息只能发送给可变字典。\n\
    \n**表16-6.** 常用字典集合方法  \n`java.lang.HashMap` | `NSDictionary` | `NSMapTable`\n\
    --- | --- | ---\n`size()` | `count` | `count`\n`keySet()` | `allKeys` | `allKeysForObject:`\n\
    `values()` | `allValues` | `dictionaryRepresentation`\n`getObjects:andKeys:` |\
    \ — | —\n`keysSortedByValueUsingSelector:` | — | —\n`get(Object)` | `objectForKey:`\
    \ | `objectForKey:`\n`objectsForKeys:notFoundMarker:` | — | —\n\n**表16-7.** 常用可变字典集合方法\
    \  \n`java.lang.HashMap` | `NSMutableDictionary` | `NSMapTable`\n--- | --- | ---\n\
    `put(Object,Object)` | `setObject:forKey:` | `setObject:forKey:`\n`putAll(Map)`\
    \ | `addEntriesFromDictionary:` | `setDictionary:`\n`remove(Object)` | `removeObjectForKey:`\
    \ | `removeObjectForKey:`\n`clear()` | `removeAllObjects` | `removeAllObjects`\n\
    `removeObjectsForKeys:` | — | —\n\n字典集合不会存储`nil`值；`nil`值用于表示键不存在。Java语句`dictionary.contains(key)`可写作`[dictionary\
    \ objectForKey:key] != nil`。如果必须存储一个不带值的键，请使用`NSNull`。\n\n`-allKeysForObject:`\
    \ 返回一个数组，包含所有映射到给定值的键。Java语句`dictionary.containsValue(object)`可写作`[[dictionary\
    \ allKeysForObject:object] count] != 0`。\n\n`-keysSortedByValueUsingSelector:`\
    \ 返回一个`NSDictionary`的键数组，该数组按特定顺序排序，允许你以明确定义的顺序遍历集合。请参阅“迭代器模式”和“排序”章节。\n\n## `NSDictionary`,\
    \ `NSMutableDictionary`\n\n除了不允许`nil`（`null`）值外，`NSMutableDictionary`几乎与`java.lang.HashMap`相同。\n\
    \n最大的区别在于对`nil`值的处理以及键的复制。\n\n只要对象可被复制（即遵循`NSCopying`协议），且集合保留的副本从未被修改，你就可以使用任何对象作为键。当字典被复制时，所有键都会被复制。\n\
    \n与`NSArray`类似，`NSDictionary`有一些操作条目组的方法。例如，`-objectsForKeys:notFoundMarker:`\
    \ 接受一个键对象数组，执行批量搜索，并返回一个值对象数组。新数组中的每个条目对应相应键的值，或者“未找到标记”对象。在编写代码以迭代查找、添加或删除对象集合之前，请检查是否有现成的集合方法可以为你完成这项工作。考虑以下语句：\n\
    \n```\n[dictionary removeObjectsForKeys:[dictionary allKeysForObject:value]];\n\
    ```\n\n## `NSMapTable`\n\n`NSMapTable`是一个较新的集合类。与`NSPointerArray`类似，它没有不可变基类，就像Java的`HashMap`类一样。同样与`NSPointerArray`类似，`NSMapTable`通过一组定义其行为的委托函数来构造。\n\
    \n`NSMapTable`实例使用`NSPointerFunction`对象或表16-5中列出的`NSPointerFunctionOptions`来创建。关于`NSPointerFunctions`类和指针函数选项的描述，请参阅`NSPointerArray`章节。初始化`NSMapTable`和初始化`NSPointerArray`之间存在两个显著区别。"
  raw: '• A single value can be stored more than once with different keys.


    • NSMapTable can use strong or weak references for its key and/or value objects,
    making it a flexible replacement to java.util.WeakHashMap.


    There are two key differences:


    • Value objects cannot be nil (null). A nil value indicates the absence of a key.
    To store a nil value, remove the key from the collection.


    • Key objects are always copied and must conform to NSCopying. The collection
    retains the copy of the Key object, not the instance used to add the key/value
    pair.


