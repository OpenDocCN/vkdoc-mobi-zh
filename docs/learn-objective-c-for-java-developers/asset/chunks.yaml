  trans: "\n■ 注意：Objective-C 文件类构建于 POSIX 文件概念之上，并继承了原始 UNIX 操作系统的许多概念。其中最重要的概念是“一切皆文件”。在\
    \ UNIX 中，文件系统并非磁盘驱动器上数据文件的具象集合，而是一个用于标识任何串行数据来源的抽象命名系统。UNIX 中的“文件”可以是数据文件、目录、网络套接字、串行端口、信号量、随机数生成器、内存块、逻辑控制台设备等等。可以将术语“文件”视为文件系统层次结构中任何命名实体的基类。目录、数据文件和\
    \ FIFO 管道都是“文件”的特化子类。这一术语贯穿于各类 API 中。例如，`-[NSFileManager removeFileAtPath:handler:]`\
    \ 方法删除的远不止数据文件。如果传入一个目录路径，它会删除该目录及其包含的所有项目。它也会删除一个命名套接字或信号量。在本书中，我遵循 UNIX 对“文件”的命名惯例，意指文件系统中几乎任何命名实体——否则会变得过于混乱。当指代某个卷上的实际文档文件时，我会使用术语“数据文件”。\n\
    \n路径可以是绝对路径或相对路径。以 `/` 开头的路径是绝对路径，指定从文件系统根目录开始的一系列目录。否则，路径是相对路径，指定从当前工作目录开始的一系列目录。某些文件系统函数会识别以波浪号开头的路径，如\
    \ `~/Documents/Publications`，表示从当前用户的主目录开始的绝对路径。\n\n无论好坏，UNIX 的扩展名命名惯例都跟随我们进入了二十一世纪。文件扩展名暗示文件包含的信息类型。它们通常是简短标识符——三到四个字母字符——附加在文件名末尾的句点（`.`）之后。名称\
    \ `@\"Outline.doc\"` 的扩展名是 `@\"doc\"`，名称 `@\"Letter to Jake 2.0.pages\"` 的扩展名是\
    \ `@\"pages\"`。\n\nJava 的 `java.io.File` 对象大体上是用于标识文件系统中文件的基本对象。可以为不存在的文件创建 `File`\
    \ 对象。路径操作通过提取 `File` 的属性或基于现有 `File` 对象创建新的 `File` 对象来完成。例如，可以通过创建一个指向该路径的 `File`\
    \ 对象，然后调用 `getParent()` 来确定路径的父目录。\n\nObjective-C 没有能够表示抽象或不存在的文件的对象。字符串用于表示文件名和路径。如何组装路径或文件名完全由你决定。你可以使用任何字符串操作方法，但\
    \ Cocoa 框架提供了几个专门用于处理路径的方法。这些方法通过 `NSPathUtilities` 分类附加到 `NSString` 类上。常用的方法列于表\
    \ 11-1 中。清单 11-1 展示了 Java 与 Objective-C 路径操作之间的对比。例如，清单 11-1 中的 Java 和 Objective-C\
    \ 方法都生成了一个指向不存在的文件的路径。\n\n**表 11-1.** `NSString` 的路径和文件名方法\n\n| 方法 | 描述 |\n| ---\
    \ | --- |\n| `+(NSString*)pathWithComponents:(NSArray*)components` | 从文件名数组构建一个路径。要构建绝对路径，请将数组的第一个元素设置为字符串\
    \ `@\"/\"`。 |\n| `-(NSArray*)stringsByAppendingPaths:(NSArray*)paths` | 将数组中的文件名追加到接收器的路径上。\
    \ |\n| `-(NSString*)pathComponents` | 将路径分解为单独的文件名，并以数组形式返回。如果路径是绝对的，数组的第一个元素是\
    \ `@\"/\"`。 |\n| `-(BOOL)isAbsolutePath` | 如果路径是绝对的（以 `@\"/\"` 开头），则返回 `YES`。\
    \ |\n| `-(NSString*)lastPathComponent` | 从路径中提取最后一个文件名。 |\n| `-(NSString*)stringByDeletingLastPathComponent`\
    \ | 移除接收器路径中的最后一个文件名。 |\n| `-(NSString*)stringByAppendingPathComponent:(NSString*)str`\
    \ | 将附加名称追加到路径的末尾。 |\n| `-(NSString*)pathExtension` | 从路径中的最后一个名称提取扩展名。 |\n| `-(NSString*)stringByDeletingPathExtension`\
    \ | 从路径中的最后一个名称移除扩展名（如果有）。 |\n| `-(NSString*)stringByAppendingPathExtension:(NSString*)str`\
    \ | 将新的扩展名追加到路径中的最后一个名称。 |\n| `-(NSString*)stringByAbbreviatingWithTildeInPath`\
    \ | 如果接收器的路径以当前用户的主目录路径开头，则将其替换为简写 `@\"~\"`。 |\n| `-(NSString*)stringByExpandingTildeInPath`\
    \ | 将接收器路径开头的 `@\"~\"` 替换为当前用户主目录的路径，或将 `@\"~account\"` 替换为用户“account”的主目录路径。\
    \ |\n| `-(NSString*)stringByStandardizingPath` | 简化并规范化接收器的路径。 |\n\n这些方法大多不言自明。它们都不会修改接收器。正如\
    \ `-stringBy…` 方法名所暗示的，每个方法都返回一个新的字符串对象，其中包含转换的结果。\n\n前几个方法将名称数组转换为完整路径，反之亦然。大部分方法用于提取、删除或向现有路径追加单个名称或文件扩展名。`-stringByStandardizingPath`\
    \ 方法通过将 `@\"~\"` 或 `@\"~user\"` 简写替换为显式路径，将所有相对路径引用和符号链接替换为其物理（非符号）等价物，并移除任何无关的路径元素来“规范化”路径字符串。简而言之，这是一个“清理”方法，将路径简化为其最简单、最明确的形式。\n\
    \n**清单 11-1.** 生成指向不存在的文件的路径\n\n**Java**\n\n```java\npublic String autoName( String\
    \ parentDir, String baseName, String ext )\n{\n    int suffix = 0;\n    File parentFile\
    \ = new File(parentDir);\n    File testFile = new File(parentFile,baseName+\"\
    .\"+ext);\n    while (testFile.exists()) {\n        suffix += 1;\n        testFile\
    \ = new File(parentFile,baseName+\"-\"+suffix+\".\"+ext);\n    }\n    return testFile.getAbsolutePath();\n\
    }\n```\n\n**Objective-C**\n\n```objc\n- (NSString*)autoNameInDirectory:(NSString*)parentDir\n\
    \                            name:(NSString*)name\n                       extension:(NSString*)ext\n\
    {\n    int suffix = 0;\n    NSString *testPath = [parentDir stringByAppendingPathComponent:name];\n\
    \    testPath = [testPath stringByAppendingPathExtension:ext];\n    while ([[NSFileManager\
    \ defaultManager] fileExistsAtPath:testPath]) {\n        NSString *newName = [NSString\
    \ stringWithFormat:@\"%@-%d\",name,++suffix];\n        testPath = [parentDir stringByAppendingPathComponent:newName];\n\
    \        testPath = [testPath stringByAppendingPathExtension:ext];\n    }\n  \
    \  return testPath;\n}\n```\n\n## 工作目录\n\n每个进程都维护一个默认的目录路径，称为当前目录或工作目录。这是用于解析相对路径的目录。所有相对路径都与当前工作目录路径拼接，以获得文件的显式路径。表\
    \ 11-2 显示了在 Objective-C 中用于获取和更改当前工作目录路径的两个 `NSFileManager` 方法。\n\n**表 11-2.**\
    \ 工作目录消息\n\n| 方法 | 描述 |\n| --- | --- |\n| `-(NSString*)currentDirectoryPath` |\
    \ 返回当前工作目录路径 |\n| `-(BOOL)changeCurrentDirectoryPath:(NSString*)path` | 设置工作目录路径\
    \ |\n\n如果路径指定了文件系统中一个可访问的目录，该方法会将当前工作目录设置为该路径标识的目录并返回 `YES`。否则，它不做任何操作并返回 `NO`。\n\
    \nJava 中的等效功能通过设置 `\"user.dir\"` 系统属性来实现。\n"
- fmt: "# File and Directory Operations\n\n## The only significant difference is that\
    \ the `user.dir` property is just a string and isn’t evaluated until a file operation\
    \ needs to resolve a relative path. The `changeCurrentDirectoryPath:` method qualifies\
    \ the path and rejects the change if the path is unusable. Listing 11-2 modifies\
    \ the current working directory so that it refers to a “temp” subdirectory, but\
    \ only if that subdirectory exists.\n\n### Listing 11-2. Changing the Current\
    \ Working Directory\n\n**Java**\n\n```java\nString workingPath = System.getProperty(\"\
    user.dir\");\nFile testFile = new File(workingPath, \"temp\");\n\nif (testFile.exists())\
    \ {\n    System.setProperty(\"user.dir\", testFile.getAbsolutePath());\n}\n```\n\
    \n**Objective-C**\n\n```objc\nNSString *current = [[NSFileManager defaultManager]\
    \ currentDirectoryPath];\nNSString *temp = [current stringByAppendingPathComponent:@\"\
    temp\"];\n\n[[NSFileManager defaultManager] changeCurrentDirectoryPath:temp];\n\
    ```\n\nThe initial current directory for a Mac OS X process is inherited from\
    \ the environment of the process that started it. For a command-line tool, it\
    \ will be the working directory of the shell that launched the tool. For application\
    \ bundles, the OS normally sets the working directory to the directory that contains\
    \ the application bundle before launching the process.\n\n## File URLs\n\nA few\
    \ major versions ago, the Cocoa framework began to adopt Universal Resource Locators\
    \ (URLs) as the preferred identifier object for data sources. For example, the\
    \ original `-[NSDocumentController openDocumentWithContentsOfFile:display:]` method\
    \ has been deprecated in favor of `-openDocumentWithContentsOfURL:display:error:`.\
    \ This has increased the flexibility of many classes, as URLs can refer to data\
    \ from a variety of sources—not just data files in the file system. But it also\
    \ means that you may need to convert a file system path into a URL and back again.\n\
    \nJava’s `java.net.URL` object can refer to a file, but is not typically used\
    \ in conjunction with the `java.io.*` classes. About the only concession to URLs,\
    \ or more correctly URIs (Universal Resource Identifiers) is in the `java.io.File`\
    \ class. It supports constructing a `File` object from a URI and the `File.toURI()`\
    \ and `File.toURL()` methods for obtaining the URL of a `File`. Table 11-3 lists\
    \ the basic methods for converting between paths and file URLs in Cocoa.\n\n**Table\
    \ 11-3.** File Related `NSURL` Methods\n\n| Method | Description |\n|--------|-------------|\n\
    | `+(NSURL*)fileURLWithPath:(NSString*)path` | Creates a file URL to a given file.\
    \ |\n| `-(BOOL)isFileURL` | Returns `YES` if the receiver is a file scheme URL.\
    \ |\n| `-(NSString*)path` | If the receiver is a file scheme URL, `-path` returns\
    \ the file system path to the item. |\n\n## Creating and Deleting Directories\n\
    \nThe method `-[NSFileManager createDirectoryAtPath:withIntermediateDirectories:attributes:error:]`\
    \ creates a new directory. If the `withIntermediateDirectories:` parameter is\
    \ `YES`, any missing intermediate directories are also created. For example, if\
    \ the path `/Users/daphne/Music` exists, sending `-createDirectoryAtPath:withIntermediateDirectories:attributes:error:`\
    \ with a path of `@\"/Users/daphne/Music/Albums/Cocteau Twins\"` and `YES` for\
    \ `withIntermediateDirectories:` would create an `Albums` directory within `Music`,\
    \ and then create a `Cocteau Twins` directory within `Albums`. In this mode, the\
    \ message is equivalent to the `java.io.File.mkdirs()` method. If `withIntermediateDirectories:`\
    \ was `NO`, it would return an error, as the parent directory would be expected\
    \ to exist. That would be equivalent to calling `java.io.File.mkdir()`. The `attributes:`\
    \ parameter is a dictionary of attributes to be set. See the “File Properties”\
    \ section later in this chapter for information about attribute dictionaries.\n\
    \nDelete a directory, like any file, using `-[NSFileManager removeItemAtPath:error:]`.\n\
    \n## Locating Special Directories\n\nIt’s generally considered bad form to hard-code\
    \ paths to well-known directories as string constants. These have a habit of changing\
    \ over time, breaking your application in the process. The Mac OS X operating\
    \ system defines a number of directories with specific purposes. In addition,\
    \ it defines a set of domains that form a hierarchy that define the scope of the\
    \ resource. For example, a font is installed by placing a font file in the `Fonts`\
    \ folder. A user has a `Fonts` folder, all users have a shared `Fonts` folder,\
    \ the system has a `Fonts` folder, and the network has a `Fonts` folder. Which\
    \ `Fonts` folder the font is copied into determines its scope.\n\nSpecial directories\
    \ are located by calling `NSSearchPathForDirectoriesInDomains(…)` with three arguments:\
    \ a constant describing the well-known directory, a bit mask of acceptable domains,\
    \ and a flag to automatically expand the “~” shorthand in returned paths. Listing\
    \ 11-3 shows how to use `NSSearchPathForDirectoriesInDomains(…)` to get the path\
    \ of the user’s desktop directory.\n\n### Listing 11-3. Locating the User’s Desktop\
    \ Directory\n\n```objc\nNSArray *paths = NSSearchPathForDirectoriesInDomains(NSDesktopDirectory,\
    \ NSUserDomainMask, YES);\nif ([paths count] > 0) {\n    NSString *desktopPath\
    \ = [paths objectAtIndex:0];\n    …\n}\n```\n\n`NSSearchPathForDirectoriesInDomains(…)`\
    \ returns an array containing the paths of the directory in each of the requested\
    \ domains, in the order they should be searched, from the most specific to the\
    \ most general. Table 11-4 lists the commonly used directory constants. The domain\
    \ argument can be any combination of the domains in Table 11-5 OR’d together,\
    \ or the constant `NSAllDomainsMask`.\n\n**Table 11-4.** Common Directory Constants\n\
    \n| Directory Constant | Description (Example Path) |\n|--------------------|----------------------------|\n\
    | `NSApplicationDirectory` | Applications (`/Applications`) |\n| `NSLibraryDirectory`\
    \ | User resources such as fonts, preferences, and log files (`~/Library`) |\n\
    | `NSUserDirectory` | The folder containing all home folders (`/Users`) |\n| `NSDocumentDirectory`\
    \ | Documents (`~/Documents`) |\n| `NSDesktopDirectory` | The desktop (`~/Desktop`)\
    \ |\n| `NSCachesDirectory` | Cache files (`~/Library/Caches`) |\n| `NSApplicationSupportDirectory`\
    \ | Ancillary files used by an application (`/Library/Application Support`) |\n\
    | `NSDownloadsDirectory` | The download folder (`~/Downloads`) |\n\n**Table 11-5.**\
    \ Directory Domains\n\n| Domain | Description |\n|--------|-------------|\n| `NSUserDomainMask`\
    \ | The current user |\n| `NSLocalDomainMask` | The users of this system |\n|\
    \ `NSSystemDomainMask` | The entire system |\n| `NSNetworkDomainMask` | All systems\
    \ on the local network |\n\nThere are also two special-purpose functions that\
    \ return variable paths. `NSHomeDirectory()` returns the path to the current user’s\
    \ home directory. `NSTemporaryDirectory()` returns a path to directory specifically\
    \ set aside for creating temporary files.\n\n## Requesting a File from the User\n\
    \nPrompting the user to select a file interactively is remarkably similar in Java.\
    \ Java uses the `JFileChooser` class to choose an existing file or allow the user\
    \ to enter the name of a new file. Cocoa supplies the `NSSavePanel` class to enter\
    \ a new file name and its `NSOpenPanel` subclass to select an existing one. Listing\
    \ 11-4 shows equivalent code for prompting the user to choose a single data file\
    \ or directory from the file system.\n\n### Listing 11-4. Choosing a Single File\n\
    \n**Java**\n\n```java\nJFileChooser chooser = new JFileChooser();\nchooser.setFileSelectionMode(JFileChooser.FILES_AND_DIRECTORIES);\n\
    chooser.setMultiSelectionEnabled(false);\n\nint result = chooser.showOpenDialog(null);\n\
    if (result == JFileChooser.APPROVE_OPTION)\n    return chooser.getSelectedFile().getAbsolutePath();\n\
    return null;\n```\n\n**Objective-C**\n\n```objc\nNSOpenPanel *panel = [NSOpenPanel\
    \ openPanel];\n[panel setCanChooseFiles:YES];\n[panel setCanChooseDirectories:YES];\n\
    [panel setAllowsMultipleSelection:NO];\n\nNSInteger result = [panel runModal];\n\
    if (result == NSFileHandlingPanelOKButton)\n    return [panel filename];\nreturn\
    \ nil;\n```\n\nEach class has numerous properties that determine the type of items\
    \ that can be selected."
