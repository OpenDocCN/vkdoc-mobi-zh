    instead of NSLog(@"%@, world!",[self salutation]), the message would always be
    “Greetings, world!” That’s because Classy is a constant that always refers to
    the single Classy Class object, while self refers to the Class object receiving
    the greeting message.


    Despite the subtle technical differences, class methods in Objective-C are used
    for many of the same purposes that static methods in Java are. Methods that return
    a singleton object, factory methods, object pools, and convenience utilities are
    common uses for class methods.


    Constructing Objects


    You might have expected me to explain the syntax for instantiating objects much
    earlier in this chapter, instead of making you wade through instance variables,
    explanations about the self variable, and class methods. The reason I didn’t is
    simple: there is no syntax for instantiating objects.


    True to its minimalist philosopy, Objective-C lets the class designer decide how
    objects are created and initialized. In the Cocoa framework, that’s through a
    combination of a factory class method and some conventions for writing initializer
    (constructor) methods.


