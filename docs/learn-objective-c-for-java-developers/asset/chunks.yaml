- fmt: "`(true)`. The code in `Listing 26-1` tests a user defaults setting to determine\
    \ how a view should be drawn.\n\n3 Apple Inc., *Framework Programming Guide*,\
    \ [http://developer.apple.com/documentation/MacOSX/Conceptual/BPFrameworks/](http://developer.apple.com/documentation/MacOSX/Conceptual/BPFrameworks/),\
    \ 2006.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## CHAPTER 26 ■\
    \ RUNTIME\n\n### Listing 26-1. Reading User Defaults\n\n```\nif ([[NSUserDefaults\
    \ standardUserDefaults] boolForKey:@\"ShowTerrainInMap\"]) {\n  [terrainMap draw];\n\
    }\n```\n\n`NSUserDefaults` searches each domain, in order, for the key and returns\
    \ the value from the first domain that contains it. Values set in a high level\
    \ domain supersede the values set in lower domains.\n\nThe command-line argument\
    \ domain is the highest domain and is populated with argument values included\
    \ on the command line when the process was launched. Normally there are no command-line\
    \ arguments, but you can include them during development by editing the launch\
    \ parameters of the application’s executable. The form for a command-line argument\
    \ value is `-key value`.\n\nLaunching an application with the arguments `-ZombieNightVision\
    \ NO` will create the key/value pair `ZombieNightVision=\"NO\"` in the arguments\
    \ domain.\n\nThe application domain is used to store the user preferences for\
    \ your application. This is a persistent domain. That is, values set here are\
    \ automatically saved in a property list file on disk, and automatically reloaded\
    \ the next time your application launches. The property list file is named using\
    \ your application’s identifier, in the directory `~/Library/Preferences`. The\
    \ TicTacToe application in Chapter 20 stores its user defaults in the file `~/Library/Preferences/com.apress.learnobjc.TicTacToe.plist`.\n\
    \n> **Tip** You can create a user interface for a simple application preference\
    \ by binding a view, like a check box or text field, to an arbitrary property\
    \ of the singleton `NSUserDefaultsController` right in Interface Builder. This\
    \ object is a bindable controller whose properties reflect the values of the user\
    \ defaults. Changing a property of the controller sets that value in the application\
    \ domain, which will be preserved. `NSUserDefaultsController` can also be used\
    \ programmatically, if you prefer that to the syntax shown in `Listing 26-1`.\n\
    \nThe global domain is another persistent domain, but one you don’t normally change\
    \ yourself. This domain contains the user defaults applicable to all applications\
    \ launched by the user. These include the user’s location, time zone, currency,\
    \ time and number formatting, preferred font, and so on. They are usually defined\
    \ by the operating system and set using System Preferences.\n\nFinally, there’s\
    \ the registration domain. This domain is not persistent, and it is empty unless\
    \ you populate it yourself during program initialization. It’s intended as a domain\
    \ of default user defaults. That is, it provides a value when none of the other\
    \ domains contains a value for a key. The code in `Listing 26-2` initializes the\
    \ registration domain with some values. If none of the other domains contain a\
    \ value for one of these keys, the value in the registration domain will be returned.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### Listing 26-2. Creating\
    \ a Registration Domain During Application Startup\n\n```\n[[NSUserDefaults standardUserDefaults]\
    \ registerDefaults:\n  [NSDictionary dictionaryWithObjectsAndKeys:\n    [NSNumber\
    \ numberWithInt:999], @\"MaximumZombies\",\n    [NSNumber numberWithBool:NO],\
    \ @\"ZombiesCanWiggleEars\",\n    [NSNumber numberWithBool:YES], @\"ShowTerrianInMap\"\
    ,\n    @\"Bob\", @\"GenericZombieName\", nil]\n];\n```\n\nA popular alternative\
    \ to hard-coding the registration defaults is to save them as a property list\
    \ in your application’s bundle. During application startup, load a dictionary\
    \ with the values in the property list and pass that to `-registerDefaults:`.\
    \ This also allows the property list to be easily localized for different languages.\n\
    \nYou can learn more about user defaults from the `NSUserDefaults` class documentation\
    \ and the *User Defaults Programming Topics for Cocoa*[^4].\n\n## isa Swizzling\n\
    \nSome of Objective-C’s “magic” is accomplished with a trick called isa swizzling.\
    \ It gets its name from the fact that it stirs, or swizzles, the `isa` variable\
    \ that defines the behavior of an object.\n\nNormally, an object’s `isa` variable\
    \ is set during `+alloc` and never changes. Changing an object’s `isa` variable\
    \ effectively changes the class of the object, which defines its structure and\
    \ all of the messages it responds to. Clearly you can see that arbitrarily changing\
    \ it could have drastic consequences.\n\nA couple of technologies, particularly\
    \ Key-Value Observing, take advantage of the mutability of an object’s class to\
    \ surgically replace the behavior of specific methods. Here’s what Key-Value Observing\
    \ does when you request to observe a particular property:\n\n1. Gets the class\
    \ of the object.\n2. Creates a new subclass of the object’s class.\n3. Overrides\
    \ the `-class` method with one that returns the Class of the original object.\n\
    4. Overrides the desired setter methods in the original class.\n5. Sets the `isa`\
    \ variable of the object to the new subclass created in step 2.\n\nAn Objective-C\
    \ class is created programmatically using `objc_allocateClassPair()` (although\
    \ KVO probably uses a private function called `objc_duplicateClass()`). Once the\
    \ empty class is defined, you can add or override methods in the class using `class_addMethod()`,\
    \ make it conform to a protocol with `class_addProtocol()`, or define instance\
    \ variables with `class_addIvar()`. In fact, you can do anything programmatically\
    \ that you can define in the Objective-C language.\n\nWhen finished, the object\
    \ behaves exactly like it did before, except that messages overridden in step\
    \ 4 invoke the methods defined by KVO instead of the original class. Because KVO\
    \ also overrides the `-class` method, the object still appears to be its original\
    \ class. You’d have to peak at the raw `isa` instance variable to see a difference\
    \ in the object.\n\n[^4]: Apple Inc., *User Defaults Programming Topics for Cocoa*,\
    \ [http://developer.apple.com/documentation/Cocoa/Conceptual/UserDefaults/](http://developer.apple.com/documentation/Cocoa/Conceptual/UserDefaults/),\
    \ 2007.\n\nIsa swizzling is a powerful technique, but it’s rather technical and\
    \ not for the faint of heart. This section is designed to be informative, rather\
    \ than encourage you to try it yourself. But if you do encounter a strong need\
    \ for a solution that involves this kind of object mutation, it’s not beyond your\
    \ reach.\n\n## 64-Bit Programming\n\nIf you’ve been around a while, you’ve seen\
    \ the size of microprocessor registers grow from 4 to 32 bits over the decades.\
    \ It’s inevitable that we now find ourselves in a transition from 32- to 64-bit\
    \ processors. Hopefully, the transition to 128-bit processors is some time off.\n\
    \nFor both Java and Objective-C programmers, the change heralds new memory capacities\
    \ and the promise of improved performance. Most object-oriented programmers will\
    \ find little to do during the transition—beyond updating their project settings\
    \ to produce a 64-bit version of their application. If you program exclusively\
    \ using Objective-C classes, methods, and properties, you’ll find very little\
    \ difference between the two environments. The biggest change for Objective-C\
    \ programmers is the size change of some integer variable types, as listed in\
    \ `Table 26-2`.\n\n**Table 26-2.** 32- and 64-Bit Variable Sizes\n\n| Type | 32-Bit\
    \ Size | 64-Bit Size |\n|------|-------------|-------------|\n| `char` | 1 byte\
    \ | 1 byte |\n| `short` | 2 bytes | 2 bytes |\n| `int` | 4 bytes | 4 bytes |\n\
    | `long` | 4 bytes | 8 bytes |\n| `NSInteger` | 4 bytes | 8 bytes |\n| `pointer`\
    \ | 4 bytes | 8 bytes |\n| `long long` | 8 bytes | 8 bytes |"
