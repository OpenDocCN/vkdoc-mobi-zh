- fmt: 'There are also a couple of debugging aides. If the `OBJC_PRINT_GC` environment
    variable is set to `YES`, the garbage collection framework will print diagnostic
    information to the console.


    If you believe that a pointer is, or is not, being protected by a write barrier,
    the `-Wassign-intercept` compiler flag will help you discover where write barriers
    are being inserted into your code.


    1Apple, Inc., *Garbage Collection Programming Guide*, http://developer.apple.com/documentation/Cocoa/
    Conceptual/GarbageCollection/, 2008.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## CHAPTER 9 ■ GARBAGE COLLECTION


    ### Summary


    At the surface, Objective-C garbage collection is on a par with Java’s—you just
    need to turn it on. Strong and weak references are concepts Java programmers are
    comfortable with, and behave almost identically in Objective-C. You just need
    to be careful when working with other pointer types, as non-object pointers are
    not normally managed for you, and be conscious of the pitfall that can occur when
    working with pointers that are not managed by the garbage collector.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## CHAPTER 10 ■ INTROSPECTION


    Introspection (reflection) is the act of exploring information about an object,
    often referred to as its metadata: the class of the object, the methods it implements,
    what properties it declares, the protocols (interfaces) it conforms to, and so
    on. The common questions (“What class is this object?,” “Can I treat this object
    as a specific class?,” and “Does this object implement a specific method?”) are
    all easy to answer. This chapter will first tell you how to answer those common
    questions. It will then look into the deeper exploration of objects and classes.


    This chapter will also explore Key-Value Coding, a technology closely related
    to introspection.


    Key-Value Coding, or KVC, allows you to access the properties of an object symbolically.
    As a trivial example, take a `Person` class that has `NSString *name`, `Person
    *mother`, and `Person *father` properties.


    KVC would allow you to get a person’s name with the path `@"name"`, and the name
    of their mother with the path `@"mother.name"`. KVC isn’t introspection; KVC won’t
    tell you what properties an object implements. But it is so closely related to
    introspection that it’s useful to understand what it can do for you. You might
    prefer to use KVC rather than perform your own introspection. You’ll also want
    to know how to design your classes so that they work with KVC.


    For reasons both pragmatic and philosophical, Objective-C introspection techniques
    focus more on discovering individual traits than determining what class an object
    is, and then inferring what methods and properties it has from that. If you want
    to know if an object can open a URL, you should determine if the object implements
    an `-openURL:` method. This is preferable to testing its class against those that
    you believe implement an `-openURL:` method. The fewer assumptions you make about
    an object’s class, the more robust and flexible your code will be. Here are the
    most common questions you’ll want to ask about an object:


    • Does this object implement a specific method?


    • Is this object an instance of a specific class?


    • Is this object an instance of a specific class, or any subclass of that class?


    These three questions are the easiest to answer in Objective-C. They are listed
    in order of efficiency and speed. Determining if an object implements a particular
    method, rather than if it’s a member of a class, has two advantages. It more directly
    addresses the question of the object’s functionality, and it’s considerably more
    efficient.


    This isn’t to say that you shouldn’t test an object’s class. There are many valid
    reasons to do so. But if you are testing an object’s class to infer that it implements
    some method, consider testing the more direct assertion.


    ### Testing for Methods


    Java doesn’t have a simple, concise method for determining if an object implements
    a specific method.'
