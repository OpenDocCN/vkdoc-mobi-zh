- fmt: 'Similar to `NSNumberFormatter`, `NSDateFormatter` is a specialized formatter
    for translating calendar dates and clock times. It can also be configured using
    predefined styles, a date format pattern, or through individual properties. The
    predefined styles are listed in Table 8-12, along with the results for an English-speaking
    user in the United Kingdom.


    **Table 8-12. Predefined Date Formatting Styles in English (UK)**


    | Date Style | Result |

    |---|---|

    | `NSDateFormatterShortStyle` | 15/02/2005 |

    | `NSDateFormatterMediumStyle` | 15 Feb 2005 |

    | `NSDateFormatterLongStyle` | 15 February 2005 |

    | `NSDateFormatterFullStyle` | Tuesday, 15 February 2005 |


    `Unicode Technical Standard #35` also defines date format patterns. They are very
    similar to the date and time format specifiers supported by `java.util.Formatter`.
    Objective-C string formatting does not attempt to support even simple date and
    time formatting, electing to delegate that to the more capable `NSDateFormatter`
    class. Some simple date format patterns are shown in Table 8-13. The results are
    for an English speaking user in the USA.


    **Table 8-13. Example Date Format Patterns in English (US)**


    | Date Format | Result |

    |---|---|

    | `yyyy-MM-dd ''at'' HH:mm` | 2005-02-15 at 13:40 |

    | `EEEE MMMM d, yyyy` | Tuesday February 15, 2005 |

    | `''millisecond'' A ''of Julian day'' g` | millisecond 49259000 of Julian day
    2453417 |

    | `QQQQ` | 1st quarter |


    ## Summary


    The string and wrapper classes in Objective-C aren’t conceptually much different
    than those in Java. The wrapper classes are more generic and can wrap more than
    just the built-in value types. Unlike Java, Objective-C strings can be subclassed.
    This means that they might be mutable, but generally aren’t, and can usually be
    treated the same way they are in Java. Remember to use `%@` instead of `%s` in
    format strings, and use the `NSFormatter` classes for sophisticated value conversion.


    ---


    # Chapter 9: Garbage Collection


    Garbage object collection is most notable for what you, the programmer, don’t
    have to do. In a perfect world, you just ignore the mechanics of garbage collection
    and let the run time system take care of the details. But there are situations
    when you do need to pay attention to garbage collection. Weak references and finalize
    methods require some understanding of what causes objects to become garbage and
    how they get collected.


    Garbage collection in Objective-C 2.0 is broadly similar to what you experience
    in Java. Most of the time, you simply forget about it and “just works.” Objective-C’s
    garbage collector is on a par with modern Java implementations. It’s a conservative,
    multi-generational, garbage collector that runs in the background on a separate
    thread. It handles all of the typical programming problems, like circular references,
    with aplomb. It’s efficient, and rarely gets in the way of your application.


    Later in the chapter you’ll learn how to write `-finalize` methods and use weak
    references. If you write only “pure” Objective-C—you only deal with objects and
    object pointers—that’s probably all you’ll need to know and you can skip to the
    next chapter when you’ve learned what you want. You’ll only need to read further
    if you step outside Objective-C into the wilderness of C pointers.


    The devil, as the saying goes, is in the details. Objective-C’s garbage collection
    is complicated by C’s permissive—some would say anarchic—memory access. Without
    the strict isolation between the programmer and physical memory imposed by Java,
    there is no possible way of determining definitively what objects are being referenced
    and which ones aren’t. Objective-C uses a best effort approach that balances efficiency
    with convenience. There are, however, subtle holes in this approach that can cause
    objects to leak or be prematurely collected. Learning how to recognize and avoid
    these situations is the focus of the last half of this chapter.


    ## The Theory of Garbage Collection


    Modern garbage collection systems function by determining the graph of reachable
    objects. This is the set of objects that your application has references to, or
    can obtain a reference to via some other reference.


    The graph starts with the root set of objects. This includes the object pointers
    in global (static) variables, the object pointers in every thread’s stack, and
    any object pointers in CPU registers. The set is then expanded by adding in all
    of the objects referenced by the root objects, and all of the objects referenced
    by those objects, and so on, until there are no more object references that aren’t
    in the set. This forms the complete set of reachable objects. Any objects not
    in that set are eligible to be collected and destroyed.


    To cause an object to be collected involves nothing more than clearing—sometimes
    referred to as “forgetting”—all reachable references to that object. The object
    falls outside the set of reachable objects and gets collected.


    ## Choosing to Use Garbage Collection


    Objective-C garbage collection is not universally available. Not all development
    and runtime environments support it, and when they do it is often not the default
    memory management service. As of this writing, Objective-C garbage collection
    is a feature, not a standard. Review the capabilities of your deployment environment
    (platform and operating system versions) to determine if garbage collection is
    supported. If it is, make sure it is enabled for your project—see Chapter 4 for
    an example. If garbage collection is not available, you will have to resort to
    using traditional Objective-C memory management. This is explained in more detail
    in Chapter 24.


    In most runtime environments, such as a Cocoa application, the garbage collector
    is started automatically for you. If you are building a command-line tool that
    uses Objective-C, you must start the garbage collector by calling the C function
    `objc_startCollectorThread()` at the earliest reasonable point in your tool’s
    startup.


    ## Writing Code with Garbage Collection


    Choosing to use garbage collection or not will dictate your coding style. It’s
    possible to write Objective-C code that will function in both a GC (garbage collected)
    and non-GC (managed memory) runtime environment, but it’s complicated and rarely
    necessary to do so. An example would be a plug-in framework that is loaded dynamically
    by other applications—some using GC, others not. For straightforward application
    development, write all of your code assuming either garbage collection or managed
    memory. This chapter provides guidance on writing Objective-C in a garbage collection
    environment. Chapter 24 explains traditional managed memory.


    The common ways of creating new objects in Objective-C are as follows:


    `[SomeClass new]`


    `[[SomeClass alloc] init]`


    `[[SomeClass alloc] initWith:…]`


    `[SomeClass someConvenienceConstructor]`


    These are identical to the ways objects are created in a non-GC environment. In
    a GC environment, you’re pretty much done. You don’t have to do anything else
    once the object is created; the garbage collector will take care of it when you
    no longer reference it.


    **Note:** If you are reading code that was written for a non-GC environment, you’ll
    see objects sent the messages `-retain`, `-release`, and `-autorelease`. In a
    garbage-collected environment, these messages are ignored. If you are porting
    code from a non-GC to a GC environment, you can safely remove all `-retain`, `-release`,
    and `-autorelease` messages. In addition, the `-retainCount` and `-dealloc` messages
    are blocked. The value returned by `-retainCount` is meaningless. An object’s
    `-dealloc` method will never be executed, even if you try to send it a `-dealloc`
    message yourself—which you should never do anyway.'
