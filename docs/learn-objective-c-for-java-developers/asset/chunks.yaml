  trans: "\n```objc\n@property (assign) Chameleon *chameleon;\n\n@end\n\n@implementation\
    \ ReptileZoo\n\n@synthesize chameleon;\n\n@end\n\n…\n\nReptileZoo *zoo = [ReptileZoo\
    \ new];\n\nChameleon *chameleon1 = [Chameleon new];\n\nChameleon *chameleon2 =\
    \ [Chameleon new];\n\nWatcher *watcher = [Watcher new];\n\nchameleon1.color =\
    \ [NSColor blueColor];\n\nchameleon2.color = [NSColor redColor];\n```\n\n`zoo.chameleon\
    \ = chameleon1;`\n\n`[zoo addObserver:watcher forKeyPath:@\"chameleon.color\"\
    \ options:NSKeyValueObservingOptionNew context:NULL];`\n\n`chameleon1.color =\
    \ [NSColor greenColor];`\n\n`zoo.chameleon = chameleon2;`\n\n输出：\n\n```\n属性 'chameleon.color'\
    \ 的对象 '<ReptileZoo: 0x13a0c0>' 已更改：{\n    kind = 1;\n    new = NSCalibratedRGBColorSpace\
    \ 0 1 0 1;\n}\n属性 'chameleon.color' 的对象 '<ReptileZoo: 0x13a0c0>' 已更改：{\n    kind\
    \ = 1;\n    new = NSCalibratedRGBColorSpace 1 0 0 1;\n}\n```\n\n清单 19-2 中的观察者对象被设置为观察\
    \ `zoo` 对象的 `chameleon` 属性的 `color` 属性。它接收到了两条属性变更通知。第一条通知是因为 `zoo` 当前 `chameleon`\
    \ 属性的 `color` 属性被直接设置了新值。第二条通知是因为 `chameleon` 属性被替换为另一个不同的对象，从而间接改变了 `zoo` 的 `chameleon`\
    \ 属性的 `color` 值。在这两种情况下，观察者都会收到关于受影响完整路径及其新值的通知。\n\n在注册以接收属性变更通知时，通知会通过一个变更字典包含一些关于变更的信息。有四个选项，通过逻辑或运算组合表\
    \ 19-2 中的任意常量来选定，这些选项控制变更字典中包含哪些信息以及发送通知的顺序。如果您的观察者对所有这些选项都不感兴趣，则在 `options:`\
    \ 参数中传入 `0`。\n\n**表 19-2.** 键值观察选项\n\n| KVO 选项 | 效果 |\n|------------|--------|\n\
    | `NSKeyValueObservingOptionNew` | 通知的变更字典包含新值。 |\n| `NSKeyValueObservingOptionOld`\
    \ | 通知的变更字典包含旧值。 |\n| `NSKeyValueObservingOptionInitial` | 在 `-addObserver:...`\
    \ 返回之前立即发送一条包含当前值的通知。 |\n| `NSKeyValueObservingOptionPrior` | 每次变更发送两条通知：一条在值变更之前发送的预变更通知，以及其后的一条常规通知。预变更通知的变更字典中会包含一个\
    \ `NSKeyValueChangeNotificationIsPriorKey` 键。 |\n\n最后一个参数是一个可选的上下文值。它是一个不受垃圾收集系统管理的\
    \ C 指针，因此如果您用它来传递对象指针，请确保该对象不会被过早回收。除此限制之外，它可以包含任何兼容的值，并且会通过该注册触发的所有通知，原样传递回观察者的\
    \ `-observeValueForKeyPath:ofObject:change:context:` 方法。\n\n## 处理键值变更通知\n\n注册之后，您的对象将开始以\
    \ `-observeValueForKeyPath:ofObject:change:context:` 消息的形式接收键值观察变更通知。该消息包含四个参数：\n\
    \n- 被观察属性的键值路径\n- 源对象\n- 一个 `change:` 参数，包含一个描述变更的不可变字典\n- 一个 `context:` 参数，包含观察者注册时传入\
    \ `-addObserver:forKeyPath:options:context:` 的 `context:` 值\n\n如果您的对象注册观察了多个属性，请使用键值路径参数、源对象指针或上下文值来区分属性并分别处理。\n\
    \n变更字典包含关于变更的信息。其内容取决于属性的类型、变更的性质以及您请求包含的信息（由表 19-2 中的选项决定）。可能的字典键以及每个值的说明列于表\
    \ 19-3 中。\n"
- fmt: '### Table 19-3. Change Notification Dictionary Keys


    | Key | Value | Description |

    | --- | --- | --- |

    | `NSKeyValueChangeKindKey` | `NSKeyValueChangeSetting`, `NSKeyValueChangeInsertion`,
    `NSKeyValueChangeRemoval`, or `NSKeyValueChangeReplacement` | Describes how the
    property changed. If the property is a simple property, like an integer or an
    object, this value will be `NSKeyValueChangeSetting`. The other three values describe
    changes to a collection property. |

    | `NSKeyValueChangeNewKey` | Value object | Contains the new property value, or
    an array of inserted or replaced values. Only included if the `NSKeyValueObservingOptionNew`
    option was requested. |

    | `NSKeyValueChangeOldKey` | Value object | The previous property value, or an
    array of removed or replaced values. Only included if the `NSKeyValueObservingOptionOld`
    option was requested. |

    | `NSKeyValueChangeNotificationIsPriorKey` | `YES` | Included if this is a pre-change
    notification requested with the `NSKeyValueObservingOptionPrior` observing option.
    |

    | `NSKeyValueChangeIndexesKey` | `NSIndexSet` | For changes to an array collection
    property, this `NSIndexSet` value contains the indexes that were affected by the
    insert, removal, or replacement. |


    When observing changes to a property that’s a primitive value or object pointer,
    the change kind is always `NSKeyValueChangeSetting` and the dictionary may optionally
    include the old and new values.


    When the observed property is a to-many object property, the change information
    is a little more complex. A change is described as either an insertion, a removal,
    or a replacement of one or more objects in the collection. The `NSKeyValueChangeIndexesKey`
    value lists the indexes in the collection that were affected by the change. The
    `NSKeyValueChangeNewKey` and `NSKeyValueChangeOldKey` values contain a compact
    array of the objects inserted, removed, or replaced (as appropriate) at the corresponding
    indexes in the `NSKeyValueChangeIndexesKey` set. For example, if two objects were
    removed from a property at indexes 3 and 5, the `NSKeyValueChangeIndexesKey` would
    contain the set {3, 5}, the `NSKeyValueChangeOldKey` would contain the object
    removed at index 3 at index 0 and the object removed at index 5 at index 1, and
    the `NSKeyValueChangeNewKey` value would be empty, since no new objects were added.


    > **Note:** Observing a to-many property requires that the observed object implement
    the mutable array property accessory methods described in the “Designing KVC-Compliant
    Classes” section of Chapter 10. The regular `NSMutableArray` class does not implement
    these methods. If your object has an `NSMutableArray *array` property, and you
    observe the `@"array"` property of that object, your observer will be notified
    when the array object is set, but not when objects are added or removed from that
    array. Classes like `NSArrayController` do implement this protocol and are designed
    to be observable.


    ### Unregistering an Observer


    When your observer wants to stop receiving property change notifications, send
    the observed object a `-removeObserver:forKeyPath:` message with the same key-value
    path used when the observer was added.


    Objects maintain weak references to their observers, so it isn’t necessary to
    remove the observer before the observer can be collected. However, if there’s
    a logical point in which an observer no longer needs to receive property change
    notifications, it should remove itself. On the other hand, just being an observer
    of an object will not keep the observer from being collected; the observer will
    need to have at least one strong reference.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### Making Your Classes KVO Compliant


    When an object property is Key-Value Observing compliant, it means the property
    can be reliably observed using Key-Value Observing. To be KVO compliant, the property
    of an object must:


    - Be Key-Value Coding compliant

    - Send Key-Value Observing notifications when it is set'
