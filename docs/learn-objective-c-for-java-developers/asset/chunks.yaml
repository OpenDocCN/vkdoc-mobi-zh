- fmt: "Java 5.0 引入了一系列新的并发流程控制类，包括各种互斥信号量、队列、资源计数器等。Objective-C 一直拥有`NSLock`、`NSRecursiveLock`和`NSConditionLock`类。操作系统的较新版本增加了`NSOperation`用于管理复杂的任务集。`NSOperation`将在下一节讨论。\n\
    \n这三个`NS…Lock`类各自提供了一种不同类型的互斥信号量，简称 mutex。它们都通过获取锁来工作，这大致相当于进入一个`@synchronized`代码块。所有其他尝试获取同一对象锁的线程将被挂起，直到原始锁被释放。一旦信号量解锁，其他线程中的一个将获得锁并恢复执行。\n\
    \n所有互斥信号量类都有几个共同点：\n\n- 它们都遵循`NSLocking`协议，该协议定义了基本的`-lock`和`-unlock`方法。\n- 它们都实现了`-lockBeforeDate:`和`-tryLock`方法。\n\
    - 它们都实现了`-name`和`-setName:`方法。\n\n`-tryLock`和`-lockBeforeDate:`消息尝试获取锁，如果成功则返回`YES`。`-tryLock`立即返回，而`-lockBeforeDate:`会挂起，直到获取锁或`NSDate`对象指定的时间到来。这是使用`NS…Lock`对象相比`@synchronized`指令的显著优势之一。\n\
    \n最后，你可以出于任何原因给你的锁命名。\n\n## NSRecursiveLock\n\n`NSRecursiveLock`对象的行为与`@synchronized`块非常相似。`NSRecursiveLock`是线程之间的互斥信号量，但在单个线程内，它可以被锁定任意多次。锁在初始的`-lock`消息期间被获取一次，相当于进入一个`@synchronized`块。之后在同一个线程上发送的`-lock`消息会递增一个计数器。一旦锁为每个`-lock`消息接收到一个`-unlock`消息，锁就会被释放。\n\
    \n一个显著的区别是，`@synchronized`块会在重新抛出异常之前自动捕获异常并释放锁。如果你在可能抛出异常的代码周围使用`NSRecursiveLock`对象，请确保捕获异常并清理你的锁。\n\
    \n## NSLock\n\n`NSLock`是最简单的互斥信号量，只实现了基本的`-lock`、`-tryLock`、`-lockBeforeDate:`和`-unlock`方法。在`@synchronized`指令被添加之前编写的\
    \ Objective-C 代码很可能使用`NSLock`对象而不是`@synchronized`块，尽管`@synchronized`的行为更接近于`NSRecursiveLock`。\n\
    \n> **注意：** `NSLock`必须始终从锁定它的同一个线程解锁。一些程序员为了试图实现跨线程同步，会在同一个线程上两次锁定一个`NSLock`对象——导致死锁——然后通过从另一个线程解锁该对象来释放它。这不能保证有效，并可能导致致命的程序错误。正确的解决方案是使用`NSConditionLock`，稍后描述。\n\
    \n`NSLock`的主要优势在于速度和简单性。与`NSRecursiveLock`不同，一个`NSLock`在再次解锁之前只能被获取一次。考虑清单 15-7\
    \ 中的代码。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 清单 15-7. 递归互斥信号量\n\
    \n```\n@interface ZombieController : NSObject {\n    NSMutableArray *nearbyZombies;\n\
    \    double totalDamage;\n    NSLock *lock;\n}\n- (void)inflictDamage:(double)damage\
    \ onZombieAtIndex:(NSUInteger)index;\n- (void)detonateFlashBomb;\n@end\n\n@implementation\
    \ ZombieController\n- (id)init\n{\n    self = [super init];\n    if (self != nil)\
    \ {\n        lock = [NSLock new];\n        …\n    }\n    return self;\n}\n\n-\
    \ (void)inflictDamage:(double)damage onZombieAtIndex:(NSUInteger)index\n{\n  \
    \  [lock lock];\n    Zombie *zombie = [nearbyZombies objectAtIndex:index];\n \
    \   [zombie inflictDamage:damage];\n    totalDamage += damage;\n    [lock unlock];\n\
    }\n\n- (void)detonateFlashBomb\n{\n```"
  raw: 'Java 5.0 has introduced a wealth of new concurrent process control classes,
    including various mutual exclusion semaphores, queues, resource counters, and
    so on. Objective-C has always had the NSLock, NSRecursiveLock, and NSConditionLock
    classes. Recent versions of the operating system added NSOperation for managing
    complex sets of tasks. NSOperation is discussed in the next section.


    Each of the three NS…Lock classes offers a different kind of mutual exclusion
    semaphore, or mutex for short. They all work by obtaining a lock, approximately
    equivalent to entering a @synchronized block of code. All other threads attempting
    to acquire a lock on the same object will be suspended until 270


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ THREADS


    the original lock is released. Once the semaphore is unlocked, one of the other
    threads will be granted the lock and resume execution.


    All of the mutex semaphore classes have several things in common:


    • They all conform to the NSLocking protocol, which defines the fundamental -lock
    and -unlock methods.


    • They all implement -lockBeforeDate: and -tryLock methods.


    • They all implement -name and -setName: methods.


    The -tryLock and -lockBeforeDate: messages attempt to acquire the lock and return
    YES if successful. -tryLock returns immediately, while -lockBeforeDate: will suspend
    until either the lock is acquired or the time in the NSDate object occurs. This
    is one of the significant advantages of using NS…Lock objects over @synchronized
    directives.


    Finally, you can name your locks for whatever reason.


    NSRecursiveLock


    NSRecursiveLock objects behave pretty much like @synchronized blocks. An NSRecursiveLock
    is a mutual exclusion semaphore between threads, but within a single thread it
    can be locked as many times as desired. The lock is acquired once during the initial
    -lock message, equivalent to entering a


    @synchronized block. Subsequent -lock messages sent on the same thread increment
    a counter. Once the lock has received one -unlock message for every -lock message,
    the lock is released.


    The one significant difference is that a @synchronized block will automatically
    catch an exception and release the lock before rethrowing the exception. If you
    use NSRecursiveLock objects around code that could throw an exception, make sure
    you catch the exception and clean up your locks.


    NSLock


    NSLock is the simplest mutex semaphore and only implements the basic -lock, -tryLock,


    -lockBeforeDate:, and -unlock methods. Objective-C code written before the @synchronized
    directive was added would most likely use NSLock objects instead of @synchronized
    blocks, even though the behavior of @synchronized is closer to NSRecursiveLock.


    ■Caution An NSLock must always be unlocked from the same thread that locked it.
    Some programmers, in a misguided attempt to implement cross-thread synchronization,
    will lock an NSLock object twice on the same thread—causing a deadlock—then release
    it by unlocking the object from another thread. This is not guaranteed to work
    and may cause fatal program errors. The correct solution is to use an NSConditionLock,
    described later.


    The primary advantages of NSLock are speed and simplicity. Unlike an NSRecursiveLock,
    an NSLock can only be acquired once before being unlocked again. Consider the
    code in Listing 15-7.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ THREADS


    Listin g 15-7\. Recursive Mutex Semaphore


    @interface ZombieController : NSObject {


    NSMutableArray *nearbyZombies;


    double totalDamage;


    NSLock *lock;


    }


