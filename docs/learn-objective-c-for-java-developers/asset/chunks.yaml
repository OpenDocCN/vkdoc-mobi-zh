- fmt: "```markdown\n`@synchronized`指令和`NSLock`类族都易于使用且高效，但速度并非它们的优势。操作系统为高性能线程同步提供了一种非常特殊的互斥信号量，称为自旋锁。到目前为止讨论的所有互斥信号量在无法获取锁时都会挂起线程。挂起、切换和恢复线程是一项代价高昂的操作。如果一个频繁使用的方法为了完成一些琐碎任务而获取和释放锁，那么信号量以及任何相关线程切换的开销可能会成为显著的性能瓶颈。\n\
    \n当无法获取自旋锁时（因为其他线程已锁定它），该线程会“自旋”——持续轮询信号量的状态，直到它被解锁。线程不会被挂起，而是继续全速运行，以消耗CPU资源为代价，并抢占其他线程。如果这听起来像是可怕的资源浪费，那确实如此。自旋锁的优点在于，获取和释放一个未被竞争的锁所需的时间，与高级互斥信号量相比微不足道。因此，正常的、无竞争的情况运行得更快，性能提升最终会超过偶尔竞争导致的性能损失。\n\
    \n自旋锁在以下情况下有效：\n\n*   两个线程同时尝试获取同一信号量的可能性非常小。\n*   锁的获取和释放频率很高。\n*   获取锁和释放锁之间的时间总是非常短——少于几百纳秒。\n\
    \n操作系统在竞争概率低、阻塞时间最小且性能至关重要的地方使用自旋锁。例如，操作系统的底层内存分配例程都使用自旋锁来协调来自多个线程的内存请求。\n\n列表15-11再次重写了`FIFO`类——这次使用自旋锁而不是信号量对象。要使用自旋锁，您的代码必须首先`#include\
    \ <libkern/OSAtomic.h>`。\n\n**列表15-11. 快速FIFO类**\n\n```\n#include <libkern/OSAtomic.h>\n\
    \n#import <Cocoa/Cocoa.h>\n\n@interface FastFIFO : NSObject {\n    NSMutableArray\
    \ *stack;\n    OSSpinLock spinLock;\n}\n@end\n\n@implementation FastFIFO\n\n-\
    \ (id) init {\n    self = [super init];\n    if (self != nil) {\n        stack\
    \ = [NSMutableArray new];\n    }\n    return self;\n}\n\n- (void)push:(id)object\
    \ {\n    OSSpinLockLock(&spinLock);\n    [stack addObject:object];\n    OSSpinLockUnlock(&spinLock);\n\
    }\n\n- (id)pop {\n    id object = nil;\n    OSSpinLockLock(&spinLock);\n    if\
    \ ([stack count]!=0) {\n        object = [stack objectAtIndex:0];\n        [stack\
    \ removeObjectAtIndex:0];\n    }\n    OSSpinLockUnlock(&spinLock);\n    return\
    \ object;\n}\n\n- (BOOL)hasObjects {\n    OSSpinLockLock(&spinLock);\n    BOOL\
    \ answer = ([stack count]!=0);\n    OSSpinLockUnlock(&spinLock);\n    return answer;\n\
    }\n\n@end\n```\n\n`OSSpinLock`结构是不透明的，但在使用前应初始化为零。函数`OSSpinLockLock()`、`OSSpinLockUnlock()`和`OSSpinLockTry()`分别执行与`-[NSLock\
    \ lock]`、`-[NSLock unlock]`和`-[NSLock tryLock]`相同的功能。每个自旋锁函数都传递自旋锁信号量结构的地址。\n\n\
    ## 操作\n\n从列表15-9中的`BusyBee`示例可以看出，管理即使是“简单的”后台工作线程也不是一项轻松的任务。Mac OS X 10.5和Java\
    \ 5.0都认识到了这一点，并添加了类来为您管理自主后台进程。\n\nJava 5.0添加了一组令人眼花缭乱的新类和新接口来管理任务。主要的接口是`ExecutorService`，它有多个实现。执行器服务管理一组将在未来某个时间执行的任务。具体的子类，如`ThreadPoolExecutor`，会异步地在单独的线程中执行这些任务。\n\
    ```"
  raw: 'Both the @synchronized directive and the family of NSLock classes are easy
    to use and efficient, but being really fast is not one of their benefits. The
    operating system provides a very special kind of mutex semaphore for high-performance
    thread synchronization called a spin lock. All of the mutex semaphores discussed
    so far suspend the thread if the lock can’t be acquired. Suspending, switching,
    and resuming a thread is an expensive operation. If a heavily used method is acquiring
    and releasing a lock to accomplish some trivial task, the overheard of the semaphore
    and any associated thread switching can become a significant performance drain.


    When a spin lock can’t be acquired (because some other thread has locked it),
    the thread


    “spins”—continuously polling the status of the semaphore until it is unlocked.
    The thread is not suspended and continues to run at full speed, using CPU resources
    at the expense of other threads. If this sounds like a horrific waste of resources,
    it is. The advantage of spin locks is that time required to acquire and release
    an uncontested lock is minuscule compared to the high-level mutex semaphores.
    So the nominal, uncontested case runs much faster and the performance gain ultimately
    exceeds the performance loss of the occasional contest.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ THREADS


    Spin locks are effective when


    • The chance that two threads will attempt to acquire the same semaphore at the
    same time is very small.


    • Locks are acquired and released with a high frequency.


    • The time between acquiring a lock and releasing it is always very short—less
    than a few hundred nanoseconds.


    Spin locks are used by the operating system wherever contention probability is
    low, blocking time is minimal, and performance is paramount. For example, the
    operating system’s low-level memory allocation routines all use spin locks to
    coordinate memory requests from multiple threads.


    Listing 15-11 rewrites the FIFO class—yet again—this time using spin locks instead
    of semaphore objects. To use spin locks, your code must first #include <libkern/OSAtomic.h>.


    Listin g 15-11\. Fast FIFO Class


    #include <libkern/OSAtomic.h>


    #import <Cocoa/Cocoa.h>


    @interface FastFIFO : NSObject {


    NSMutableArray *stack;


    OSSpinLock spinLock;


    }


    @end


    @implementation FastFIFO


    - (id) init


    {


    self = [super init];


    if (self != nil) {


    stack = [NSMutableArray new];


    }


    return self;


    }


    - (void)push:(id)object


    {


    OSSpinLockLock(&spinLock);


    [stack addObject:object];


    OSSpinLockUnlock(&spinLock);


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ THREADS


    - (id)pop


    {


    id object = nil;


    OSSpinLockLock(&spinLock);


    if ([stack count]!=0) {


    object = [stack objectAtIndex:0];


    [stack removeObjectAtIndex:0];


    }


    OSSpinLockUnlock(&spinLock);


    return object;


    }


    - (BOOL)hasObjects


    {


    OSSpinLockLock(&spinLock);


    BOOL answer = ([stack count]!=0);


    OSSpinLockUnlock(&spinLock);


    return answer;


    }


    @end


    The OSSpinLock structure is opaque, but should be initialized to zero before being
    used. The functions OSSpinLockLock(), OSSpinLockUnlock(), and OSSpinLockTry()
    perform the same function as


    -[NSLock lock], -[NSLock unlock], and -[NSLock tryLock], respectively. Each spin
    lock function is passed the address of the spin lock semaphore structure.


    Operations


    As you can see from the BusyBee example in Listing 15-9, managing even a “simple”
    background worker thread is not a trivial undertaking. Mac OS X 10.5 and Java
    5.0 both recognize this and have added classes that provide management of antonymous
    background processes for you.


    Java 5.0 added a dizzying array of new classes and interfaces to manage tasks.
    The principal interface is the ExecutorService, of which there are several implementations.
    The executor services manage a set of tasks to be executed at some future time.
    Concrete subclasses like ThreadPoolExecutor execute the tasks asynchronously in
    separate threads.'
