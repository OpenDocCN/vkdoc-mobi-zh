    \ 的垃圾回收器与传统的 C 内存管理共存。`CFRetain`会增加对象的保留计数——如同该对象也被 C 代码使用一样——从而防止它被回收。一个更面向对象的解决方案是在模态面板完成方法中使用`+[NSGarbageCollector\
