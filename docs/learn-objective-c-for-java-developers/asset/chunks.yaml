    \ Java 的集合类。它们都可以通过特定的“个性”进行“编程”，例如维护对象的弱引用、允许将内存块或原始整数用作值，或者允许存储 `nil` 对象指针。这些新类与旧类之间的差异将在相关章节中详细讨论。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 16 章 ■ 集合模式\n\n## 有序集合\n\
    \n`NSArray`、`NSMutableArray` 和 `NSPointerArray` 组织有序的值集合，相当于 `java.util.ArrayList`。具体来说，Objective-C\
    \ 和 Java 的数组类具有以下共同特性：\n\n- 集合中的值是对象引用。\n- 值通过索引进行访问。\n- 同一个值可以存储在多个索引位置。\n- 新值可以追加到数组末尾，也可以在现有索引处插入，并将后续值向后移动一个索引。不能在数组末尾之后插入值。\n\
    - 移除一个值会使所有后续值向前移动以填补空缺的索引。\n- `NSArray` 集合可以进行搜索，以定位已知值的索引。\n\n还存在一些关键差异：\n\n\
    - `NSArray` 对象不能用于存储 `nil`（`null`）值。因此，像 `-setCount:` 这样会用 `nil` 值填充数组的操作未实现。\n\
    - `NSPointerArray` 对象不会搜索其内容中的值。因此，诸如 `containsObject`、`indexOfObject:` 和 `removeObject:`\
    \ 这样的方法未实现。你可以遍历其内容来查找值。\n- `NSPointerArray` 可以存储比对象指针值更多的内容。\n- `NSMutableArray`\
    \ 可以用预定的容量进行初始化。但除此之外，数组的容量是不透明的，除了 `NSPointerArray` 实现的唯一方法 `-compact`。\n\n###\
    \ 常用方法\n\n表 16-3 和 16-4 列出了 Java 和 Objective-C 中常见的数组方法。表 16-3 中的消息不会改变集合，并且对可变和不可变集合都已实现。表\
