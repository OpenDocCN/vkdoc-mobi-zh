    The only significant difference between NSHashTable and NSMapTable is that NSHashTable
    is a set and only needs a single set of function pointers to define its behavior.


    ■Note Don’t confuse NSHashTable (the class) with NSHashTable (the C type). The
    latter belongs to an older C API that implements low-level hash tables. The Objective-C
    NSHashTable class subsumes much of its functionality.


    Composite Pattern


    One aspect of the Composite Pattern is the ability to interact with groups of
    objects through a single object. The NSArray and NSSet classes each provide two
    methods that let you send a single messages to all of the objects in a collection:


    - (void)makeObjectsPerformSelector:(SEL)aSelector


    - (void)makeObjectsPerformSelector:(SEL)aSelector withObject:(id)anObject The
    code in Listing 16-4 demonstrates how to send a message to every object in a collection.


