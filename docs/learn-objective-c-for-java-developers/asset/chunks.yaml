    @end


    static CommandCenter *SharedCommandCenter;


    @implementation CommandCenter


    + (void)initialize


    {


    SharedCommandCenter = [CommandCenter new];


    }


    + (CommandCenter*)sharedCommandCenter


    {


    return SharedCommandCenter;


    }


    @end


    The class’s +initialize method is always the first message a class receives. It’s
    a convenient location to create a singleton. It also simplifies the code in the
    class; any class method can reference the SharedCommandCenter variable directly
    (i.e., instead of using [CommandCenter sharedCommandCenter] each time), with the
    assurance that it has already been initialized.


    Be mindful of the fact that +initialize is not called during application startup
    or when the class is loaded, like Java initialization statements are. The +initialize
    message is sent the first time the class receives a message. If the class is never
    used, the +initialize message will never be sent.


    Singleton Factory


    The factory pattern can be repurposed to turn a class cluster into a singleton
    factory. In Chapter 22, you saw how a class’s initializer can substitute a different
    class for the one being requested. This same technique can be used to return an
    existing object as well. To implement the singleton pattern, cripple the initializer
    so that it returns the same object every time. The code in Listing 23-3 implements
    a singleton using the class’s initializer.


    Listin g 23-3\. Singleton Factory Pattern


    @interface CommandCenter : NSObject


    @end


    static CommandCenter* SharedCommandCenter;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 23 ■ SINGLETON PATTERN


    @implementation CommandCenter


    - (id)init


    {


    self = [super init];


    if (self!=nil) {


    if (SharedCommandCenter!=nil)


    return SharedCommandCenter;


    …


    SharedCommandCenter = self;


    }


    return self;


    }


    @end


    The initializer method for the CommandCenter class implements the singleton pattern.
    The first instance of CommandCenter created (using [[CommandCenter alloc] init])
    is saved in the global variable. Any subsequent attempt to create another instance
    of CommandCenter returns the original instance.


    This implementation of the singleton pattern has all of the advantages, and disadvantages,
    of a class cluster. The principal advantage is that the client code does not have
    to use a special message to obtain the singleton, or even be aware that the class
    is a singleton. It simply creates the object and uses it. Another advantage is
    that the class author doesn’t have to take any extraordinary measures to discourage
    clients from attempting to create additional instances of the class.


    ■Note For obvious reasons, your singleton class would probably not conform to
    the NSCopying protocol. If it needs to—say, to be used as a key in an NSDictionary—override
    the -copyWithZone: method and have it return self.


    A variation of this pattern returns objects from a pool of immutable objects.
    A Letter class that encapsulates the properties of a letter in the alphabet might
    implement a singleton factory for each letter. Every invocation of [[Letter alloc]
    initWithLetter:''a''] would return a singleton ‘a’ object, while every [[Letter
    alloc] initWithLetter:''b''] would return a singleton ‘b’ object, and so forth.
    This is one alternative to implementing the flyweight design pattern.


    Summary


    The singleton pattern is extremely common in both Java and Objective-C. Objective-C
    presents some intriguing alternatives that can simplify its implementation. It’s
    also possible to transform a class cluster into a singleton factory, hiding its
    singleton nature.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    P A R T 4


    ■ ■ ■


    Advanced Objective-C


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 2 4**


    ■ ■ ■


    Memory Management


    Garbage collection is a recent feature in Objective-C and, while this is a huge
    step in the right direction, it’s not universally available. The alternative is
    traditional Objective-C managed memory, wherein your code takes responsibility
    for destroying objects.


    The principal reasons you’d choose to use managed memory instead of garbage collection
    are as follows:


    • The operating system or compiler doesn’t support garbage collection (specifically,
    this is the case with the iPhone OS and older versions of Mac OS X).


    • You’re working on a project that’s already using managed memory.


    • The code must function in a managed memory environment (for example, a plug-in).


    In the first case, your only choice is to embrace managed memory. This chapter
    will show you the basics of traditional memory management. Objective-C provides
    an object management model that’s very sensible and easy to learn. If you’re thinking
    this will be like C or C++ memory management, you can relax.


    In the second case, it may be more trouble than its worth to convert an existing
    project from managed memory to garbage collection. Managed memory in Objective-C
    is not radically different from garbage collection, so adoption might be the most
    expedient solution.


    ■Note When compiling code that will run in a managed memory environment, the compiler’s
    support for garbage collection should be turned off. In Xcode, this is accomplished
    by setting the Objective-C Garbage Collection build setting to Unsupported. This
    turns off all garbage collection support, producing code that is compatible with
    operating systems that lack garbage collection.


    Specialized components, like plug-ins, frameworks, and services, which are loaded
    into another application’s runtime environment, must coexist with the memory management
    scheme employed by its host. It may even be necessary to write your code so that
    it can function in both a garbage-collected and managed memory environment. There
    are some notes about doing that towards the end of the chapter.


    This chapter explains the basics of memory allocation and deallocation. It then
    describes Objective-C’s reference counting scheme and autorelease pools. As each
    concept is examined, simple programming rules are introduced. Taken together,
    they define the programming practices that you should adopt to use managed memory.
    Later sections touch on some of the situations where reference counting can get
    tricky and what to do about them.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 24 ■ MEMORY MANAGEMENT


    C Memory Allocation


    At the core of all memory management are the POSIX memory allocation functions.
    They are used by all higher APIs and you’re welcome to use them yourself. They
    are extremely simple, fast, and efficient. The basic use pattern is shown in Listing
    24-1.


    Listin g 24-1\. C Memory Allocation


    void *memory = malloc(100);


    …


    free(memory);


    The malloc() function in Listing 24-1 allocates 100 consecutive bytes of memory
    and returns the address of the first byte. You are free to use those 100 bytes
    in any way you see fit. When you’re done with that block of memory, the free()
    function releases and recycles it, after which you should not access that range
    of memory again.


    There are also variations to malloc(). The two most common are calloc(), which
    allocates memory and fills it with zeros, and realloc(), which changes the size
    of a previously allocated block of memory. Regardless of what POSIX function you
    used to allocate the memory, free() will release it.


    Although it is simple, POSIX memory allocation is also brutally awkward: it is
    up to your application to release the memory once you’re done with it, it can
    only be released once, and the pointer must not be used again afterwards. This
    presents the following difficulties:


    • If you fail to release the memory, but “forget” the pointer to it, that block
    of memory becomes permanently unusable. This is called a memory leak.


    • Sharing the pointer with other code creates an ambiguity over what code should
    take responsibility for releasing the memory, and when.


    • Using a pointer to a block of memory that has been released can be disastrous.'
