    NSDictionary, NSMutableDictionary


    Except for not allowing nil (null) values, NSMutableDictionary is almost identical
    to java.lang.HashMap.


    The biggest differences are the handling of nil values and the copying of keys.


    You can use any object as a key as long as it can be copied—that is, conforms
    to NSCopying—


    and the copy retained by the collection is never modified. When a dictionary is
    copied, all of the keys are copied.


    Like NSArray, NSDictionary has a few methods that operate on groups of entries.
    For example,


