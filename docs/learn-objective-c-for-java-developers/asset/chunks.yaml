- fmt: "`NSSortDescriptor *lengthSort = [[NSSortDescriptor alloc] initWithKey:@\"\
    length\" ascending:YES];`\n\n`NSSortDescriptor *selfSort = [[NSSortDescriptor\
    \ alloc] initWithKey:@\"self\" ascending:YES];`\n\n`NSArray *sortDescriptors =\
    \ [NSArray arrayWithObjects:lengthSort, selfSort, nil];`\n\n`NSMutableArray *array\
    \ = …`\n\n`[array sortUsingDescriptors:sortDescriptors];`\n\n集合的`-sortUsingDescriptors:`方法接受一个`NSSortDescriptor`对象数组来形成一个比较层次结构。集合中的对象会使用数组中的第一个描述符进行比较。如果第一个描述符判定对象相等，则使用第二个描述符，以此类推。\n\
    \n`NSSortDescriptor`在用户界面中非常有用。各种以列和行显示对象集合的视图通常具有一个界面，用户可以通过点击列来根据该属性对显示的项目进行排序。幕后发生的事情是，每一列都与一个对象属性相关联，并为该属性生成一个`NSSortDescriptor`对象。将所有活跃的排序描述符收集到一个数组中，就形成了一个适用于`-sortUsingDescriptors:`的排序定义。\n\
    \n### 过滤集合\n\n`NSArray`和`NSSet`集合支持使用谓词（predicate）的复杂过滤机制。谓词是一个表达式对象的树状结构，用于描述抽象的求值过程，例如`timeRemaining==0\
    \ AND projectStatus!='finished'`。谓词可以通过图形界面从用户那里获取，通过解释像刚才例子那样的谓词语句字符串来创建，或者（很少情况下）通过编程方式构造。\n\
    \n不可变集合实现了返回一个新集合的方法，该新集合只包含那些使谓词求值为`YES`的对象。可变集合则拥有额外的方法，这些方法会移除所有使谓词求值为`NO`的对象。\n\
    \n有关谓词对象和谓词表达式语法的完整描述，请参阅《谓词编程指南》¹。\n\n¹ Apple, Inc., 《谓词编程指南》，http://developer.apple.com/documentation/Cocoa/Conceptual/Predicates/，2008年。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 16 章 ■ 集合模式**\n\n###\
    \ 集合并发\n\n在枚举期间不应修改集合，也不应从其他线程并发修改集合。本节将介绍几种技术，用于在枚举完成之前避免对集合进行更改。之后，将讨论线程安全问题。\n\
    \n#### 枚举集合的副本\n\n避免在迭代集合时修改它的第一种技术是简单地复制集合，然后遍历副本，使原始集合可以自由地被修改。清单 16-14 中的代码演示了这种技术。\n\
    \n**清单 16-14. 枚举集合副本**\n\n```\nNSMutableDictionary *zombies = …\nfor ( NSString\
    \ *key in [zombies allKeys] ) {\n    Zombie *zombie = [zombies objectForKey:key];\n\
    \    if ([zombie hasExpired])\n        [zombies removeObjectForKey:key];\n}\n\
    ```\n\n表达式`[zombies allKeys]`返回一个新的、不可变的数组，其中包含字典中所有键的副本。快速枚举随后是针对数组中的键进行，而不是字典中的键，因此你可以在枚举期间自由地修改字典的内容。\n\
    \n这种技术同样适用于数组和集合。\n\n#### 延迟对集合的更改\n\n另一种技术是通过收集更改并在枚举完成后执行更改来延迟更改。清单 16-15 演示了使用数组和`NSIndexSet`的这项技术。\n\
    \n**清单 16-15. 延迟集合更改**\n\n```\nNSMutableArray *zombies = …\nNSMutableIndexSet\
    \ *deadZombies = [NSMutableIndexSet indexSet];\nNSUInteger i;\nfor (i=0; i<[zombies\
    \ count]; i++) {\n    Zombie *zombie = [zombies objectAtIndex:i];\n    if ([zombie\
    \ hasExpired])\n        [deadZombies addIndex:i];\n}\n[zombies removeObjectsAtIndexes:deadZombies];\n\
    ```\n\n`NSMutableIndexSet`收集我们打算从集合中删除的对象的索引。在枚举结束时，所有标识出的对象通过一条`-removeObjectsAtIndexes:`消息被一次性删除。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 16 章 ■ 集合模式**\n\n####\
    \ 线程安全\n\n与 Java 一样，没有哪个可变集合类是线程安全的。与 Java 不同的是，Objective-C 不提供任何线程安全的可变集合。然而，所有不可变集合本质上都是线程安全的。\n\
    \n所有不可变集合（`NSArray`、`NSDictionary`、`NSSet`）都是线程安全的，因为无法更改其内容。如果你简单地避免对集合进行任何修改，集合也是线程安全的。你可以安全地将一个`NSMutableArray`作为`NSArray`对象与另一个线程共享，只要你能保证底层可变数组将来永远不会被修改。\n\
    \n如果你无法保证这一点，那么就制作集合的一个不可变副本并返回它。\n\n> **注意** 一个线程安全的集合不会自动保护该集合内的对象。任何从多个线程使用的对象都必须是线程安全的。\n\
    \n如果你需要在线程间共享一个可变集合，请使用`@synchronized`访问器函数或信号量来保护对集合的更改。第 15 章中展示的`AutoSafeFIFO`和`FastFIFO`类就是很好的例子。\n\
    \n#### 垃圾回收与弱集合\n\n与线程安全间接相关的是，维护对对象的弱引用的集合可能存在问题。垃圾回收是并发运行的，可能在任何时候回收弱引用对象。维护弱引用的集合可能会自发地丢失对象或返回`nil`值。\n\
    \n这会影响它们的`count`和枚举。具体来说，请注意这些潜在问题：\n\n- 集合的`-count`可能随时改变。\n- 数组中任何先前存储的值都可能返回`nil`。字典或集合中的任何成员都可能自发消失。\n\
    - 快速枚举可能在枚举过程中的任何位置迭代到`nil`值。\n- 当集合使用弱引用时，不应使用`NSEnumerator`对象。`-nextObject`消息可能为任何值返回`nil`，这会被解释为枚举结束。请使用快速枚举或编程式迭代。\n\
    \n如果这些影响会带来问题，你可以通过使用强引用集合对象制作集合的临时副本来消除它们。枚举副本中的值，然后丢弃临时集合。\n\n### 总结\n\nObjective-C\
    \ 中的集合与 Java 中的集合扮演着非常相似的角色。你需要意识到一些细微的差异，比如不要在枚举期间修改集合。但只要考虑到这些，数组、字典（映射）和集合的常用编程模式及用途在很大程度上保持不变。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](index-333_1.png)\n\n\
    **第 17 章**\n\n■ ■ ■\n\n# 委托模式\n\n委托模式是继承的一种替代方案，它允许在不进行子类化的情况下自定义或覆盖对象的行为。委托模式在\
    \ Objective-C 中得到了热烈拥护。理解委托对象在 Cocoa 框架中的作用对于有效使用这些框架至关重要，尤其是应用程序和用户界面类。本章将解释委托模式、委托对象的角色和用途、如何定义你自己的委托，以及如何将委托模式融入你自己的设计中。\n\
