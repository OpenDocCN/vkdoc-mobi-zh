    ## 促进垃圾回收


    通常情况下，你不需要直接与垃圾回收系统交互。如果需要，`NSGarbageCollection` 类提供了该服务的面向对象接口。与 Java 中类似，有一些方法可以促使垃圾回收器开始回收对象。这些方法并不会强制垃圾回收器执行操作——例如，它可能刚刚完成对象回收，因此再次回收将是浪费时间。它只是向
    GC 建议，现在可能是执行回收的合适时机。


    此外，你可以通过发送 `-disable` 消息来临时禁用 Objective-C 中的垃圾回收。在性能要求极高的代码段中，你可能会这样做，但我不建议长时间禁用。发送
    `-enable` 消息可恢复回收。控制垃圾回收器的常用方法列于表 9-3 中。


    ***表 9-3.** 垃圾回收器控制方法*


    | 方法 | 描述 |

    | --- | --- |

    | `+[NSGarbageCollector defaultCollector]` | 返回当前进程的 `NSGarbageCollector` 单例实例。
    |

    | `-[NSGarbageCollector disable]` | 关闭垃圾回收。 |

    | `-[NSGarbageCollector enable]` | 在发送 `-disable` 后重新启动垃圾回收。每个 `-disable` 必须与一个
    `-enable` 成对出现。 |

    | `-[NSGarbageCollector collectIfNeeded]` | 如果内存消耗阈值已超过，则建议垃圾回收器开始一个回收周期。 |

    | `-[NSGarbageCollector collectExhaustively]` | 建议垃圾回收器开始一个完整彻底的回收周期。 |


