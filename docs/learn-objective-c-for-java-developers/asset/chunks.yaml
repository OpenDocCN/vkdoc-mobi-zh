    NSCountedSet


    NSCountedSet is a subclass of NSMutableSet that allows a single object to be added
    to the set multiple times. In essence, it treats every object added to the set
    as a distinct, although indistinguishable, entity.


    Internally, the set maintains a single reference to the object and a count of
    the number of times it has been added to the set. To remove an object, the set
    must receive one -removeObject: message for each


    -addObject: message previously received. The method -countForObject: will return
    the number of


    -addObject: messages, less the number of -removeObject: messages, received for
    that object.


    NSIndexSet


    NSIndexSet is a special collection class that maintains a set of integer values,
    much like java.util.BitSet.


