    dealloc Patterns


    When an object with a reference count of 1 receives a -release message, it is
    immediately destroyed.


    This is accomplished by sending the object a single -dealloc message. An object’s
    -dealloc method performs much the same role as a -finalize method, but is also
    responsible for releasing any retained objects, allocated memory, and any other
    resource that it owns, and for ultimately freeing the memory it occupies. If your
    object retains any object references, it must have a -dealloc method. Listings
    24-12 and 24-13 present two common patterns for writing -dealloc methods.


    Listin g 24-12\. -dealloc Using -release


    - (void)dealloc


    {


    [one release];


    [two release];


    [three release];


    [four release];


    [super dealloc];


    }


    Listin g 24-13\. -dealloc Using Property Setters


    - (void)dealloc


    {


    [self setOne:nil];


    [self setTwo:nil];


    [self setThree:nil];


    [self setFour:nil];


    [super dealloc];


    }


    A -dealloc method must do the following:


    • Close any open files, release any resources, free any non-object memory, and
    any other actions that would be appropriate in a -finalize method.


    • Release all retained objects with a -release or -autorelease message.


    • Send [super dealloc] as its last statement.


    The pattern in Listing 24-12 is the fastest and most efficient, avoids side-effects
    of property setters, and is the most commonly used pattern.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 24 ■ MEMORY MANAGEMENT


    The pattern in Listing 24-13 is less efficient, but has a couple of advantages.
    It clears the references using the property setters. If the setters need to notify
    observers or perform other housekeeping, this pattern permits them to do so. In
    addition to releasing the held property, it sets the property value to nil. This
    could be important if any code later in the -dealloc method attempts to use the
    property for any purpose—which would be very bad if the property was still pointing
    to a deallocated instance. The first pattern, as coded, tries to avoid this problem
    by not sending any other messages to itself during deallocation. But as object
    relationships become more complex, it’s harder to ensure that will always work.
    For example, a retained object might have a pointer back to the object that owns
    it (self), and during its deallocation might attempt to use one of the properties
    of its owner.


    ■Caution -dealloc is sent to an object by -release. You should never send a -dealloc
    message to another object.


    Sending -dealloc to the superclass is an absolute requirement. So much so that
    modern Objective-C compilers now emit a warning if you fail to do so. The base
    class -dealloc method is the one that actually deallocates (frees) the memory
    occupied by the instance. Failing to send -dealloc will cause memory leaks. After
    the superclass’s -dealloc message returns, the object no longer exists and self
    is invalid. You cannot access any of the object’s instance variables nor send
    it a message.


    Implicitly Retained Objects


    Objects retained by other objects your object retains are referred to as implicitly
    retained objects. An object should only retain objects it maintains a direct reference
    to; objects retained by other objects are managed by those objects. An example
    of implicitly retained Zombie objects is shown in Listing 24-14.


    Listin g 24-14\. Implicitly Retained Objects


    @class Zombie;


    @interface ZombiePoetryGroup : NSObject {


    NSMutableDictionary *members;


    }


    - (BOOL)hasMemberNamed:(NSString*)zombieName;


    - (void)addMember:(Zombie*)newZombie;


    - (void)removeMember:(Zombie*)zombieZombie;


    @end


    @implementation ZombiePoetryGroup


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 24 ■ MEMORY MANAGEMENT


    - (id) init


    {


    self = [super init];


    if (self != nil) {


    members = [NSMutableDictionary new];


    }


    return self;


    }


    - (void) dealloc


    {


    [members release];


    [super dealloc];


    }


    - (BOOL)hasMemberNamed:(NSString*)zombieName


    {


    return ([members objectForKey:zombieName]!=nil);


    }


    - (void)addMember:(Zombie*)newZombie


    {


    [members setObject:newZombie forKey:[newZombie zombieName]];


    }


    - (void)removeMember:(Zombie*)zombie


    {


    [members removeObjectForKey:[zombie zombieName]];


    }


    @end


    The ZombiePoetryGroup object creates and retains an NSMutableDictionary object.
    All Cocoa collection classes retain the objects added to the collection and release
    them again when they are removed. The ZombiePoetryGroup object retains its direct
    reference to the NSMutableDictionary object, and lets the dictionary object retain
    and release its objects.


    Managed Memory Problems


    There are some unique coding difficulties when using managed memory. The next
    few sections describe the most common, and what you can do about them.


    Overretained or Underreleased Objects


    Overretained (or underreleased) objects are ones that have received more -retain
    messages than is appropriate, or fail to receive a balanced number of -release
    messages. The object is never deallocated, 447


