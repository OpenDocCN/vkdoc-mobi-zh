    As you’ll discover in the next few sections, the organization of objects defines
    how your application responds to events, and influences the design of your classes.
    It’s important to understand the organization of objects in a document-based application.
    A document-based application is one that opens the content of data files in windows,
    often allowing you to manipulate its content, and save the results in a new or
    existing document file. The TicTacToe project is a document-based application.
    You can save a game as a tictactoe document, open old games, and revert to a previously
    saved game.


