    ### 列表 13-8. 通过本地网络的分部对象连接


    **服务器**


    `NSSocketPort *port = [NSSocketPort new];`

    `NSConnection *connection = [NSConnection connectionWithReceivePort:port sendPort:nil];`

    `[connection setRootObject:[Server new]];`

    `if ([[NSSocketPortNameServer sharedInstance] registerPort:port name:@"Server"])`

    `    [[NSRunLoop currentRunLoop] run];`


    **客户端**


    `NSPort *port = [[NSSocketPortNameServer sharedInstance] portForName:@"Server"
    host:@"*"];`

    `NSConnection *connection = [NSConnection connectionWithReceivePort:nil sendPort:port];`

    `id server = [connection rootProxy];`

    `[server doSomething];`


    网络版本只是对前述主题的细微变体。在此，服务器和客户端直接与 `NSSocketPortNameServer` 交互，以直接注册和获取 `NSSocketPort`
    对象。然后，这些端口被用于创建 `NSConnection` 对象。


    如果主机参数为 `@"*"`，则 `NSSocketPortNameServer` 会在本地网络上定位任何已注册 `@"Server"` 服务的计算机。如果你希望连接到特定目标机器，主机参数也可以指定为具体的域名或
    IP 地址。


    ### BSD 管道连接


    最后一个例子稍微有点特殊。它演示了如何通过文件系统中的命名 BSD 管道“文件”来连接两个进程。管道文件看起来像数据文件，但实际上它是两个进程之间的实时缓冲区。写入该“文件”的字节会立即作为数据出现在另一个进程中，但永远不会写入任何存储设备。这展示了分布式对象的灵活性。本质上，任何能够连接到
    `NSPort` 的通信管道都可以用来创建 `NSConnection`。由于你可以创建 `NSPort` 的自定义子类，因此可能性是无限的。


    演示该技术的项目命令是 `./Greeter --socket` 和 `./Guest --socket`。相关代码位于 `Greeter_main.m`
    和 `Guest_main.m` 文件中。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第 13 章 远近通信


    ### 运行循环


    运行循环是驱动分布式对象的引擎。第 15 章会更详细地描述运行循环。


    在上述服务器示例中，最后一步是启动一个运行循环，用于处理其 `NSPort` 对象接收到的事件。为了接收和分发异步消息，`NSConnection` 必须由运行循环驱动。客户端发送的消息被推送到服务器的
    `NSPort` 中。运行循环逐一弹出这些消息，并将它们分发给根对象。


    很明显，服务器必须使用运行循环。不太明显的是，客户端也在运行一个运行循环。当客户端发送同步消息（即 `[server doSomething]`）时，它会将消息推送到
    `NSPort`，然后启动一个临时运行循环来等待响应。服务器接收消息并通过向客户端发送回复消息来响应。客户端的临时运行循环从其 `NSPort` 中弹出回复，并将控制权返回给发送方。


    请再次查看列表 13-4 中 Greeter 和 Guest 示例的代码。假设 Greeter 保存了对代理 Guest 对象的引用，并在 `-greetGuest:`
    返回后使用该引用发送另一条 `-listen:` 消息。如果客户端进程没有运行运行循环，那么 `-listen:` 消息将永远停留在客户端的 `NSPort`
    中而不会被执行。由于该方法是同步的，Greeter 对象将会挂起，等待 Guest 对象响应——或者至少会一直等到 `NSConnection` 超时。


    为了实现分布式对象之间的异步双向消息传递，两个进程都必须拥有活跃的运行循环。


    ### 异步消息


    如前所述，通过 `NSProxy` 发送的消息可以是同步或异步的。要创建异步消息，请在方法接口的返回值前添加 `oneway` 关键字。


    ```objc

    - (oneway void)doSomething;

    ```


    该消息将被发送到远程对象，但执行会立即返回到发送方。`oneway` 方法应始终具有 `void` 返回类型。如“运行循环”一节所述...

