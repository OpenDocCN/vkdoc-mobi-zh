- fmt: "# Objective-C 内存管理与 C/Objective-C 混合编程\n\n## 自动释放池\n\n所有 Objective-C 对象都假定它们在一个活跃的自动释放池（autorelease\
    \ pool）范围内运作。如果不存在自动释放池，向对象发送`-autorelease`消息将在控制台打印一条警告消息，提示您的应用程序正在泄漏对象。\n\n\
    运行循环（run loop）和 AppKit 框架会为您创建和清理自动释放池。您必须自行创建自动释放池的两种情况是：在命令行工具的开头，或者创建新线程时。自动释放池属于线程，因此任何新线程都应立即创建一个自动释放池，如代码清单\
    \ 24-19 所示。\n\n**代码清单 24-19.** 创建线程的自动释放池\n\n```\n@implementation Threader\n\n\
    - (void)myThread:(id)ignored\n\n{\n\nNSAutoreleasePool *pool = [NSAutoreleasePool\
    \ new];\n\n…\n\n[pool drain];\n\n}\n\n@end\n```\n\n代码清单 24-19 中的`-myThread:`方法在其自身的线程中启动。它的首要任务是创建一个顶层自动释放池，该池将被所有对象使用，直到线程结束，此时必须清理该池。\n\
    \n**注意：** `-[NSAutoreleasePool drain]`消息是相当新的。旧代码发送`-release`消息代替。在受管内存环境中，两者是相同的。当将受管内存与垃圾回收混合使用时（参见下一节），`-drain`会向垃圾回收器发送一个提示，让其开始回收。两者都是正确的。\n\
    \n如果代码清单 24-19 中的线程在循环中执行某些操作，它应创建嵌套的自动释放池，以定期释放临时对象。这也适用于任何在返回前产生大量临时对象的方法。代码清单\
    \ 24-20 展示了一个循环，它在工作时定期创建和释放自动释放池。\n\n**代码清单 24-20.** 创建嵌套的自动释放池\n\n```\nNSAutoreleasePool\
    \ *wadingPool = nil;\n\nint poolCount = 0;\n\nNSUInteger i;\n\nfor (i=0; i<1000000;\
    \ i++) {\n\nif (wadingPool==nil)\n\n    wadingPool = [NSAutoreleasePool new];\n\
    \n…\n\nif (++poolCount>2000) {\n\n    poolCount = 0;\n\n    [wadingPool drain];\n\
    \n    wadingPool = nil;\n\n}\n\n}\n```\n\n代码清单 24-20 中的循环定期创建一个嵌套的自动释放池，该池被清理以释放循环体中创建的临时对象。这当然打破了“自动释放的对象直到当前方法返回才会被释放”的规则，但这是因为您自己在清理池——所以您应该知道这一点。\n\
    \n新的自动释放池本质上是嵌套在先前活跃的自动释放池内部的。\n\n清理一个池会隐式地清理在其内部创建的所有自动释放池。代码清单 24-19 中的代码不需要确保`wadingPool`在退出循环前被清理。包含`wadingPool`的自动释放池会在其被清理时清理它。例如，异常处理器不需要清理任何嵌套的自动释放池。唯一重要的是，顶层自动释放池在线程终止前被清理。\n\
    \n## 混合受管内存与垃圾回收\n\n您可能会发现自己需要编写既能在受管内存环境又能在垃圾回收环境中运行的 Objective-C 代码。这是可行的，因为受管内存方法和垃圾回收技术重叠很少。在垃圾回收环境中，管理引用计数的消息（`-retain`、`-release`、`-autorelease`）被忽略。在受管内存环境中，编译器对垃圾回收的支持（`__strong`和`__weak`指针类型）被忽略。最终结果是代码在这两种环境中都能正确运行。\n\
    \n当编译将在混合内存环境中运行的代码时，应包含编译器对垃圾回收的支持。在 Xcode 中，将“Objective-C Garbage Collection”构建设置为“Supported”。这会使编译器包含对垃圾回收的支持，但同时也包含支持受管内存所需的代码。当“Objective-C\
    \ Garbage Collection”构建设置为“Required”（仅垃圾回收）时，编译器会主动剥离仅对受管内存有用的代码。这使代码更高效，但牺牲了向后兼容性。\n\
    \n编写能在两种环境中运行的代码相当直接。通常，正确实现受管内存的代码也能在垃圾回收环境中工作。例如，本章中的所有代码示例在启用垃圾回收时都能正确运行。表\
    \ 24-2 列出了每种环境对代码的影响。\n\n**表 24-2.** 受管内存与垃圾回收的效果对比\n\n| 代码 | 受管内存 | 垃圾回收 |\n\
    |------|----------|----------|\n| `-retain` | 保留一个对象 | 忽略 |\n| `-release` | 释放一个对象\
    \ | 忽略 |\n| `-autorelease` | 将对象添加到自动释放池 | 忽略 |\n| `-retainCount` | 返回当前保留计数 |\
    \ 无意义 |\n| `-dealloc` | 发送给对象以销毁它 | 运行时阻止此消息发送 |\n| `-finalize` | 从不发送 | 当对象即将被回收时发送\
    \ |\n| `__strong` | 忽略 | 表示强引用 |\n| `__weak` | 忽略 | 表示弱引用 |\n| `-drain` | 清理自动释放池\
    \ | 触发垃圾回收 |\n| `@property (assign)` | 未保留的属性 | 强引用 |\n| `@property (retain)`\
    \ | 保留的属性 | 强引用 |\n\n`NSAutoreleasePool`的`-drain`方法大约是唯一在两种环境中都有功能的方法。当垃圾回收开启时，它提示垃圾回收器可能想要开始一个垃圾回收周期。\n\
    \n## 总结\n\n受管内存需要一些额外的努力，但并不繁重。只需记住这些基本规则：\n\n- 将对象引用存储在持久变量中时，保留它。\n- 在丢弃任何保留的引用之前，释放或自动释放它。\n\
    - 编写一个`-dealloc`方法来释放所有保留的对象。\n- 始终返回保留或自动释放的对象。\n- 自动释放的对象在当前方法返回之前不会被释放。\n\n\
    ---\n\n# 第 25 章：混合 C 和 Objective-C\n\nObjective-C 的一大优势是它允许与 C 函数和变量无缝集成。这让您可以直接访问大量现有的\
    \ C API。本章讨论了在同一应用程序中混合 C 和 Objective-C 代码的基本方法，并介绍了 Core Foundation，这是一个 C 库，包含可与\
    \ Objective-C 对象互换的数据结构。混合语言会带来一些有趣的内存管理问题，这些问题将在本章末尾进行解释。\n\n## 在 Objective-C\
    \ 中使用 C\n\n“在 Objective-C 中使用 C”这个说法有些误导，因为 Objective-C 是 C 语言的严格超集。您实际上不能*使用*\
    \ C 在 Objective-C 中，因为 Objective-C *就是* C。这个术语通常用于当您编写直接使用 C 结构体和调用 C 函数的代码时，而不是使用\
    \ Objective-C 对象和消息。\n\n### 从 Objective-C 调用 C 函数\n\n本书中已经呈现了许多代码示例，它们实现了 C 函数并在\
    \ Objective-C 类中使用它们。这些是从 C 或 Objective-C 代码中调用的标准 C 函数。具有静态类型的 C 函数将其作用域限制在正在编译的模块中的代码。非静态函数是全局的，可以从任何模块调用。（请记住，在此上下文中，“static”意味着私有，而不是\
    \ Java 意义上的静态。）一个静态 C 函数的示例如代码清单 25-1 所示。"
  raw: 'All Objective-C objects assume that they are operating within the scope of
    an active autorelease pool. If no autorelease pool exists, sending an object an
    -autorelease message will print a warning message to the console that your application
    is leaking objects.


    The run loop and the AppKit framework create and drain autorelease pools for you.
    The two cases where you must create your own autorelease pools are at the beginning
    of a command-line tool or when creating a new thread. Autorelease pools belong
    to the thread, so any new thread should begin by immediately creating an autorelease
    pool, as shown in Listing 24-19.


    Listin g 24-19\. Creating a Thread’s Autorelease Pool


    @implementation Threader


    - (void)myThread:(id)ignored


    {


    NSAutoreleasePool *pool = [NSAutoreleasePool new];


    …


    [pool drain];


    }


    @end


    The -myThread: method in Listing 24-19 is started in its own thread. Its first
    task is to create a top-level autorelease pool that will be used by all objects
    until the thread ends, where the pool must be drained.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 24 ■ MEMORY MANAGEMENT


    ■Note The -[NSAutoreleasePool drain] message is fairly new. Older code sends a
    -release message instead. In a managed memory environment the two are identical.
    When mixing managed memory with garbage collection (see the next section), -drain
    sends a hint to the garbage collector to start collecting. Both are correct.


    If the thread in Listing 24-19 performed some action in a loop, it should create
    nested autorelease pools to periodically release transient objects. This also
    applies to any method that produces a large number of transient objects before
    returning. Listing 24-20 shows a loop that periodically creates and releases autorelease
    pools as it works.


    Listin g 24-20\. Creating Nested Autorelease Pools


    NSAutoreleasePool *wadingPool = nil;


    int poolCount = 0;


    NSUInteger i;


    for (i=0; i<1000000; i++) {


    if (wadingPool==nil)


    wadingPool = [NSAutoreleasePool new];


    …


    if (++poolCount>2000) {


    poolCount = 0;


    [wadingPool drain];


    wadingPool = nil;


    }


    }


    The loop in Listing 24-20 periodically creates a nested autorelease pool that
    is drained to release transient objects created in the body of the loop. This,
    of course, breaks the rule that autoreleased objects won’t be released until the
    current method returns, but that’s because you’re draining the pool yourself—so
    you should know that.


    New autorelease pools are inherently nested inside the previously active autorelease
    pool.


    Draining a pool implicitly drains any autorelease pools that were created inside
    it. It’s not necessary for the code in Listing 24-20 to ensure that wadingPool
    is drained before exiting the loop. The autorelease pool that contains wadingPool
    will drain it when it gets drained. For example, an exception handler does not
    need to drain any nested autorelease pools. The only thing that’s important is
    that the top-level autorelease pool is drained before the thread terminates.


    Mixing Managed Memory and Garbage Collection


    You may find yourself in a situation where you need to write Objective-C code
    that must function in both a managed memory and a garbage collection environment.
    It’s possible to do this because the managed memory methods and garbage collection
    techniques have very little overlap. In a garbage collection environment, the
    messages that manage reference counting (-retain, -release, -autorelease) are
    ignored. In a managed memory environment, the compiler’s support for garbage collection
    453


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 24 ■ MEMORY MANAGEMENT


    (__strong and __weak pointer types) is ignored. The end result is code that will
    operate correctly in either environment.


    When compiling code that will run in a mixed memory environment, the compiler’s
    support for garbage collection should be made inclusive. In Xcode, set the Objective-C
    Garbage Collection build setting to Supported. This causes the compiler to include
    support for garbage collection, but also includes the code needed to support managed
    memory. When the Objective-C Garbage Collection build setting is set to Required
    (garbage collection only), the compiler actively strips out code that’s only useful
    to managed memory. This makes the code more efficient, but sacrifices backward
    compatibility.


    Writing the code that will function in both environments is fairly straightforward.
    In general, code that correctly implements managed memory will also work in a
    garbage collection environment.


    For example, all of the code samples in this chapter would function correctly
    with garbage collection turned on. Table 24-2 lists the effects of each environment
    on your code.


    ***Table 24-2.** Effects of Managed Memory vs. Garbage Collection* Cod e


    Ma na ge d Me m or y


    G ar ba ge C oll ecti on


    -retain Retains


    an


    object


    Ignored


    -release


    Releases an object


    Ignored


    -autorelease


    Adds object to autorelease pool


    Ignored


    -retainCount


    Returns the current retain count


    Meaningless


    -dealloc


    Sent to an object to destroy it


    Runtime blocks this message from being sent


    -finalize


    Never sent


    Sent when an object is about to be collected


    __strong


    Ignored


    Indicates a strong reference


    __weak


    Ignored


