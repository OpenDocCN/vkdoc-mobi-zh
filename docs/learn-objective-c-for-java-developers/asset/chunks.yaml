    Scope


    I’ll get the bad news out of the way first: there are no packages in Objective-C.
    All class names, C


    functions, and global variables share a single name space. Instance variables
    within a class are encapsulated by that class, and Objective-C does provide control
    over their scope. Objective-C does not restrict access to class methods, but there
    are practical ways of emulating the kind of access restrictions that you enjoy
    in Java.


    Class Name Scope


    Class names are all public and exist in the same globally accessible name space.
    To avoid naming conflicts, Objective-C developers have adopted a naming convention
    for classes that must coexist with others. Classes in a logical group all begin
    with a common two-character abbreviation. In Apple’s frameworks, all of the Core
    Image classes begin with CI (CIColor, CIFilterShape, CIVector, . . .). Classes
    for QuickTime begin with QT (QTTrack, QTMovie, QTTimeValue, . . .).


    ■Note If you were wondering, the NS prefix found on Cocoa foundation classes stands
    for NextStep. NextStep is the Objective-C operating system developed by NeXT Computer.
    When Apple purchaced NeXT in 1996, it adopted NextStep as the core technology
    for the nascent Mac OS X. In a feat that George Orwell would admire, almost every
    reference to NeXT and NextStep was redacted from the Mac OS X source code and
    documentation. But it was virtually impossible to rename every class in the gargantuan
    framework, so the legacy NS prefix survives to this day.


    Classes developed by third parties follow the same convention. The OmniGroup makes
    an extensive set of application classes available to other developers. The OmniAppKit
    classes all begin with OA (OAController, OAUtilities, OAScriptMenuItem, . . .).
    The OmniNetworking classes all begin with ON


    (ONHost, ONPortAddress, . . .).


    In your development, consider the scope of the classes you are creating. If the
    class will be used only in your application development environment, don’t worry
    about a prefix. Give your classes simple names like Student, BoardGame, Troll,
    and so on. If you are developing classes that are going to be used by other programmers,
    even if only within your organization, choose a prefix that is likely to be unique
    and name your classes accordingly. If your company is Widget Makers, you might
    name your classes WMToy, WMAlarm, etc. You also don’t have to commit to this decision
    now. The Xcode IDE includes refactoring tools that make renaming your classes
    relatively painless.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ WELCOME TO OBJECTIVE-C


    Instance Variable Scope


    Access to instance variables is controlled the same way it is in Java, conveniently
    using the same terminology. Rather than specifying the scope of each variable
    individually, Objective-C adopts the C++


    style of scope directives. The directives @public, @protected, and @private can
    appear before any variable declaration in the instance variable block of an @interface
    directive. All variables declared after a scope directive inherit the specified
    visibility. Listing 3-12 shows four instance variables with varying degrees of
    visibility.


    Listin g 3-12\. Instance Variable Scope


    @interface Toy : NSObject {


    NSString *name;


    @public


    int starRating;


    @protected


    NSRange recommendedAge;


    int playCount;


    @private


    NSSet *toyBox;


    }


    @end


    The variable starRating is public. It can be accessed by any code in any context.


    The scope of the name, recommendedAge, and playCount variables is protected. Methods
    defined in this class, or any subclass of this class, have direct access to these
    variables. Protected is the default scope of instance variables. Variables defined
    before the first, or in the absence of any, scope directive are protected.


    The variable toyBox is private. It can only be accessed by methods defined in
    this class.


    Keep in mind that Objective-C variable scope only discourages access to instance
    variables. If you attempt to use a member variable in a context where you do not
    have access to it, the compiler will complain. It is still possible to access
    those variables using introspection or by coercing pointers—


    Objective-C has no “security” in the Java sense. Also, the variable names are
    not technically scoped within a name space of the class the way they are in Java.
    The toyBox instance variable exists for all subclasses of the Toy class. A subclass
    of Toy cannot declare its own instance variable named toyBox; the compiler will
    issue a duplicate member error.


    Method Scope


    Methods are always public, in the Java sense. Objective-C places no runtime restrictions
    on who can invoke an object’s method given a pointer to that object. Although
    there’s no explicit way to restrict a method from being invoked, there are several
    techniques for hiding methods to discourage their use outside the scope they were
    intended for.


    The simplest technique is to include the method in the @implementation section
    but omit the method prototype from the @interface directive. Other modules that
    #import the interface for that class will not be aware of that method’s existence,
    and the compiler will complain if an attempt is made to send that message.


    This technique works because a method in the @implementation section implies its
    own prototype. Once the method appears in the implementation, the compiler knows
    about the method and will allow you to invoke it just as if it had been predefined
    in the class’s interface. This technique is 42


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ WELCOME TO OBJECTIVE-C


    casual and simple. Its biggest disadvantage is that all undeclared methods must
    be defined before they can be referenced. This can make source code organization
    awkward. In some cases of recursion, it makes it impossible.'
