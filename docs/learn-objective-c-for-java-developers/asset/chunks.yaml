    }\n@end\n```\n\n在 Java 或 Objective-C 中可以实现完全相同的模式。不过，Objective-C 为典型的单例设计模式提供了两种替代方案。第一种是利用类的`+initialize`方法，第二种是`类簇`的变体。这两种方法将在接下来的章节中探讨。\n\
    \n## 惰性单例\n\n大多数单例是惰性的；它们是在第一次被请求时才自发构建的。除了自行实现这种机制外，另一种方法是利用类本身的惰性初始化，如第 21 章所示。基本上，通过重写类的`+initialize`方法，单例对象会在该类首次接收消息时被创建。代码清单\
    \ 23-2 展示了`CommandCenter`类的重写版本。\n\n### 代码清单 23-2. 惰性单例模式\n\n```objc\n@interface\
