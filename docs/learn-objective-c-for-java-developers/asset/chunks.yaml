    ## GC vs. Non-GC Pointers


    Garbage collection in Java is both determinate and homogenous; all references
    refer to objects. In Objective-C, pointers can point to just about anything. They
    can point to objects, blocks, structures on the stack, structures within other
    structures, elements of an array, or even be filled with random meaningless values.
    It is demonstrably impossible, therefore, to determine with absolute certainty
    the set of reachable objects.


    Objective-C’s solution to this is to ignore most pointers and pay attention only
    to pointers that (should) reference objects. This results in a mixture of memory
    management techniques. Objective-C objects use the garbage collector, while conventional
    C memory allocations are managed using their traditional design patterns.


    This section explains which pointers are naturally managed by the garbage collection
    service, which ones aren’t, and what control you have over that. It also highlights
    situations where non-managed pointers can be a problem and how to deal with them.


    ## Write Barriers


    Objective-C keeps track of the pointer references that it manages using a technique
    called a write barrier. The compiler replaces all assignments to `__strong` and
    `__weak` pointers with a fast function call that makes the assignment and registers
    the pointer with the garbage collection system. Remember that all Objective-C
    object pointers are `__strong` by default. Every object pointer assignment is
    registered with the garbage collector, which uses that information to determine
    the set of reachable objects.


