    `@"homeroom.students.@distinctUnionOfArrays.parents.@unionOfArrays.children.name"`；Java
    实现采用传统的过程式解决方案，遍历 Rachael 班级中的学生、他们的父母以及子女，并汇总出一组唯一的姓名。而 Objective-C 解决方案则利用了
    KVC 的强大能力。路径中的每个标识符都指向接收对象或前一对象的某个属性。如果属性是对象集合，则会将路径的剩余部分应用于集合中的每个元素，并将结果汇总到一个新集合中。因此，路径
    `children.name` 会返回一个集合，其中包含了 `children` 属性中每个 `Student` 对象的 `name` 属性。


    特殊路径运算符（例如 `@distinctUnionOfArrays`）会对结果执行转换或计算。在此示例中，返回值被缩减为单个唯一对象数组，从而消除了任何重复的名称和集合的集合。


    更重要的是，屏幕上的列表视图对象或脚本属性可以绑定到同一条路径，无需编写一行代码，列表即可显示（或脚本属性即可返回）搜索结果。


    ## 使用键值编码


    使用键值编码非常简单。根类 `NSObject` 定义了 `-valueForKey:(NSString*)key` 和 `-valueForKeyPath:(NSString*)path`
    方法。发送其中任一方法即可检索对象的属性值。通过发送 `-setValue:(id)value forKey:(NSString*)key` 或 `-setValue:(id)value
    forKeyPath:(NSString*)path` 即可设置可变值。


    键是单个属性名，而键路径可以是简单的属性名，也可以是包含多个属性名和操作的复杂路径。原始属性值会自动转换为 `NSNumber` 或 `NSValue` 对象，反之亦然。


    表 10-2 列出了 Cocoa 框架实现的一些 KVC 操作。运算符会转换其后面路径的结果。表 10-2 中的所有运算符都转换一个值的集合（集或数组）。


    **表 10-2.** 键值编码路径运算符


    | 运算符 | 结果 |

    | --- | --- |

    | `@count` | 对象数量 |

    | `@avg` | 数值平均值 |

    | `@max` | 集合中的最大值 |

    | `@min` | 集合中的最小值 |

    | `@sum` | 集合中数值的总和 |

    | `@distinctUnionOfArrays` | 从数组集合中得到的唯一对象数组 |

    | `@distinctUnionOfObjects` | 唯一对象数组 |

    | `@distinctUnionOfSets` | 从集合集合中得到的唯一对象集合 |

    | `@unionOfArrays` | 从数组集合中得到的对象数组 |

    | `@unionOfObjects` | 对象数组 |

    | `@unionOfSets` | 从集合集合中得到的对象集合 |


    在使用键值观察、绑定和脚本化等技术时，你很可能会间接地使用 KVC。这些技术都使用 KVC 路径来标识被观察、绑定或脚本化的属性。为了使你的对象能够与这些技术协同工作，你需要确保它们符合
    KVC 规范。


    ## 设计 KVC 兼容的类


    你定义的大多数属性无需额外工作即可与 KVC 兼容。至少，仅声明一个实例变量（例如代码清单 10-4 中的 `NSString *name`）就定义了一个
    KVC 兼容的属性。KVC 将使用实例变量内省来查找并使用该属性。


    如果你遵循使用 `@property` 声明的实践，这些属性也将与 KVC 兼容。只需避免使用非标准的 getter 和 setter 名称即可。KVC 优先使用存取器方法，而不是同名的实例变量。如果你实现自己的存取器方法，它们必须遵循标准的
    getter 和 setter 模式。表 10-3 列出了与 KVC 配合使用的可接受的存取器方法名称。将每个方法中的斜体 *Property* 替换为你属性的实际名称（注意大小写）。对于不可变属性，只需实现一个
    getter；对于可变属性，则需要实现一个 getter 和一个 setter。


    **表 10-3.** KVC 兼容的单值存取器名称


    | 方法名称 | 角色 |

    | --- | --- |

    | `-property` | Getter |

    | `-getProperty` | Getter |

    | `-isProperty` | 布尔型 getter |

    | `-setProperty:` | Setter |


    作为数组或集合的属性（例如 `@property NSArray *teachers` 或 `@property NSSet *teachers`）会自动与键值编码兼容。若要实现一个非标准数组或集合类型的
    KVC 兼容集合属性，你需要实现一些特殊方法。要实现自定义数组属性，请实现以下方法：


    - `-(unsigned int)countOfProperty`


    至少实现以下方法之一：

    - `-(Class*)objectInPropertyAtIndex:(NSUInteger)index`

    - `-(NSArray*)propertyAtIndexes:(NSIndexSet*)indexes`


    为了提升 getter 性能，可选择性地实现：

    - `-(void)getProperty:(id*)array range:(NSRange)range`


    可变属性必须至少实现以下方法之一：

    - `-(void)insertObject:(Class*)object inPropertyAtIndex:(NSUInteger)index`

    - `-(void)insertProperty:(NSArray*)objects atIndexes:(NSIndexSet*)indexes`（性能更优）


    可变属性必须至少实现以下方法之一：

    - `-(void)removeObjectFromPropertyAtIndex:(NSUInteger)index`

    - `-(void)removePropertyAtIndexes:(NSIndexSet*)indexes`（性能更优）


    为了提升性能，可变属性可选择性地实现以下任一方法：

    - `-(void)replaceObjectInPropertyAtIndex:(NSUInteger)index withObject:(Class*)object`

    - `-(void)replacePropertyAtIndexes:(NSIndexSet*)indexes withProperty:(NSArray*)objects`


    在这些方法中，斜体 *Property* 名称应替换为正在定义的属性名称，例如 `-(NSUInteger)countOfTeachers`。请注意，如果你选择了单数形式的属性名称，在构造
    KVC 兼容的方法名称时，请始终使用单数形式（而非复数形式）。将 *Class* 替换为属性对象的类，例如 `-(Teacher*)objectInTeachersAtIndex:(NSUInteger)index`。


    要实现自定义集合属性，请实现以下方法：


    - `-(NSUInteger)countOfProperty`

    - `-(NSEnumerator*)enumeratorOfProperty`

    - `-(Class*)memberOfProperty:(Class*)object`


    可变属性必须至少实现以下方法之一：

    - `-(void)addPropertyObject:(Class*)object`

    - `-(void)addProperty:(NSSet*)objects`


    可变属性必须至少实现以下方法之一：

    - `-(void)removePropertyObject:(Class*)object`

    - `-(void)removeProperty:(NSSet*)objects`


    为了提升性能，可变属性可选择性地实现：

    - `-(void)intersectProperty:(NSSet*)set`


    ## 自定义键值


    此外，可以通过重写 `-(id)valueForUndefinedKey:(NSString*)key` 和 `-(void)setValue:(id)value
    forUndefinedKey:(NSString*)key` 以编程方式实现命名属性。每当尝试获取或设置 KVC 无法识别的属性时，都会向对象发送这些消息。你的代码可以转换名称或合成一个值。


    KVC 还定义了验证属性的标准。更多细节请参阅 Apple 发布的《键值编码编程指南》。


    ## 检查类


    本节描述了获取 Class 信息的主要函数。接下来的几节将描述如何执行最常见和最有用的内省操作。鼓励更高级的开发者阅读 Apple 发布的《Objective-C
    2.0 运行时参考》。


    如同在 Java 中一样，高级内省始于 Class 对象。Java 中的类内省被清晰且逻辑地组织成类层次结构，从 `java.lang.Class` 类开始，向下延伸至
    `java.lang.reflect.Method`、`java.lang.reflect.Field` 等。

