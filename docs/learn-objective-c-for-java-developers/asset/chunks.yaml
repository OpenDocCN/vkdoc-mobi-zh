    onto the port are processed by the run loop. NSMachPort is a subclass that connects
    to a Mach kernel port for direct process-to-process communications. NSSocketPort
    can be connected to BSD pipes or sockets providing equivalent functionality between
    processes and systems. NSPorts are the foundation for distributed objects, several
