    This programming style has elements of aspect-oriented programming, where common
    capabilities (“aspects”) are scattered across heterogeneous classes. This design
    pattern is repeated for other window related activities. The window delegate can
    intervene in the resizing of a window, but only if it implements the `-windowWillResize:toSize:`
    method. A delegate is given the opportunity to prepare for a modal dialog sheet,
    but only if it implements the `-window:willPositionSheet:usingRect:` method.


