    ```


    重组后，新的食谱文档方法仍然在主 `RecipeBoxController` 类中实现。所有创建购物清单文档的方法都被隔离到 `ShoppingLists`
    类别中，该类别可以作为单独的模块进行编译。`ShoppingLists` 类别中定义的方法是 `RecipeBoxController` 类的一等公民。它们与主
    `RecipeBoxController` 类中定义的方法具有相同的作用域和变量访问权限。在运行时，代码清单 5-5 中的类与代码清单 5-6 中的类及类别功能完全相同。


    ## 使用类别进行组织


    将大型类细分为可管理部分是类别的一个用途。它对于封装类的功能子部分所需的知识或依赖项也很有用。在食谱应用程序示例中，`ShoppingLists` 类别的实现无疑需要导入购物清单、配料清单、杂货店编辑器等的类定义。而主
    `RecipeBoxController` 类的实现不需要了解这些类。


    类别允许将类的相关方法组织到它们自己的模块中，而无需任何额外的类或复杂性。这减少了依赖性并保持应用程序设计的模块化。这在协作开发环境中特别有用，其中一名程序员可能正在开发新的食谱功能，而另一名程序员正在开发新的购物清单功能。两位程序员可以在相互独立的情况下对同一个类进行更改。


    Builder 模式是类别的另一个应用。Builder 模式将复杂的对象构造移出类。在 Java 中，Builder 模式通常实现为一个单独的类（有时称为辅助类）。在
    Objective-C 中，复杂的构造代码可以通过类别与主类定义隔离开来。


    ## 隐藏方法

    '
- fmt: '类别的一个常见用途是隐藏类的部分接口，通常是为了阻止设计仅供内部使用的方法被调用。在 Java 中，方法可以被声明为 `private` 或 `protected`，使其在类外部不可访问。在
    Objective-C 中，你可以通过类别来“隐藏”一组方法。清单 5-7 展示了 `Toaster` 类的内部方法如何被隔离在 `Private` 类别中。


    清单 5-7. `Private` 类别中的方法


    ```objc

    @interface ToasterController : NSObject {


    @private


    float darkness;


    }


    - (void)setDarkness:(float)level;


    - (void)startToasting;


    - (void)stopToasting;


    @end


    @interface ToasterController (Private)


    - (float)darkness;


    - (CarrierState)carrierPosition;


    - (NSTimeInterval)cycleTime;


    - (void)setCycleTime:(NSTimeInterval)cycleTime;


    - (void)finishedToasting:(NSTimer*)timer;


    @end

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 5 章 ■ 探索协议和类别


    为了使其有效，`ToasterController (Private)` 类别的声明被保存在其自己的头文件（`.h`）中。使用 `ToasterController`
    类的模块只导入 `ToasterController.h` 文件，该文件不包含任何 `Private` 类别的方法。在缺少 `Private` 类别声明的情况下，编译器——以及程序员——将不知道这些内部控制方法的存在。


    ■ 注意 按照惯例，类别被保存在以类名“+”类别名命名的头文件中。在清单 5-7 的示例中，`ToasterController (Private)` 类别将被保存在
    `ToasterController+Private.h` 文件中。


    这也可以仅通过两个源文件来实现。`ToasterController.h` 文件只包含主要的 `@interface ToasterController`
    声明。实现文件（`.m`）首先导入其头文件。然后它会声明 `Private` 类别的 `@interface`，紧接着是 `ToasterController`
    类及其 `Private` 类别方法的 `@implementation` 指令。没有其他模块会知道这些内部方法。


    这是类别的一种常见用法，以至于 Objective-C 2.0 添加了扩展的概念（将在本节后面描述），将这种技术形式化。


    ### 扩充外来类


    一个对 Java 开发者来说几乎会感到奇怪的特性是，类别可以将方法附加到任何类。这允许在不创建子类或修改原始类定义的情况下扩展一个类。


    更重要的是，该类的子类会继承这些类别方法。


    Cocoa 框架中的 `NSArray` 类定义了一个便捷方法 `-(id)lastObject`，大致等价于语句 `[array objectAtIndex:[array
    count]-1]`。为了对称，我希望 `NSArray` 类的设计者也包含了一个 `-(id)firstObject` 方法。Objective-C 在清单
    5-8 中实现了我的愿望。


    清单 5-8. `NSArray` 类别


    ```objc

    @interface NSArray (MyCollectionAdditions)


    - (id)firstObject;


    @end


    @implementation NSArray (MyCollectionAdditions)


    - (id)firstObject


    {


    return ([self objectAtIndex:0]);


    }


    @end

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 5 章 ■ 探索协议和类别


    `MyCollectionAdditions` 通过插入一个新方法，动态地改变了操作系统 `NSArray` 类的行为。我的应用程序现在可以向其进程中的任何
    `NSArray` 对象发送 `-firstObject` 消息。


    ■ 警告 当一个类别和一个类都实现了相同的方法时，类别的方法会替换类中的方法。它不是覆盖（override）；无法调用原始方法。在类别代码中调用 `[super
    method]` 会调用父类的方法，而不是类的原始方法。如果两个或多个类别为同一类实现了相同的方法，那么在运行时调用哪个方法是不可预测的。


    除了能够用便捷特性装饰类之外，类别对于向不属于其领域的类添加功能也非常有用。回到本书引言中的示例，`AppKit` 框架定义了 `NSStringDrawing`
    类别，它为基类 `NSString` 扩展了清单 5-9 中显示的其他方法。


    清单 5-9. `NSStringDrawing` 类别


    ```objc

    @interface NSString(NSStringDrawing)


    - (NSSize)sizeWithAttributes:(NSDictionary *)attrs;


    - (void)drawAtPoint:(NSPoint)point withAttributes:(NSDictionary *)attrs;


    - (void)drawInRect:(NSRect)rect withAttributes:(NSDictionary *)attrs;


    @end

    ```


    所有 `NSString` 对象都继承这些方法。这允许你编写更自然、更简洁的 `[string draw]`，而不是被迫编写 `[currentDrawingContext
    drawString:string]`。


    ■ 注意 类别强调了 Objective-C 类是在运行时动态组装的事实。一个加载了 `AppKit` 框架（包含 `NSStringDrawing` 类别）的
    GUI 应用程序会将这些额外的绘图方法注入到基类 `NSString` 中。一个仅链接到 `Foundation` 框架（不包含图形绘制类）的 Objective-C
    命令行工具不会加载 `AppKit` 框架，并且其 `NSString` 对象将不会实现这些方法。


    类别允许你在方便且合理的地方实现方法，而不会牺牲像封装和模块化这样的良好编程实践。


    当你探索各种框架时，你会发现许多类别为类扩展了有用的方法，而这些方法如果直接实现在这些类中是完全不合适的。`NSStringPathExtensions`
    类别为 `NSString` 对象添加了一整套文件系统路径操作。


    类似地，`NSURLUtilities` 类别为 `NSString` 添加了 URL 字符编码方法。`NSPasteboardSupport` 为 `NSURL`
    类添加了剪贴板复制和粘贴方法，等等。


    需要记住的重要事情是，Objective-C 类中的方法并不局限于类的领域。在文档中查找方法时，不要将搜索范围限制在职责领域内的类中。`NSGraphicsContext`
    没有实现任何绘图方法。被绘制的对象（`NSString`、`NSImage`、`NSAttributedString` 等）各自拥有自己的 `-draw`
    方法，其中一些是由 `NSGraphicsContext` 提供的类别提供的。


    在编写自己的代码时，努力打破严格的 Java 方法组织模式。在 Java 中，一个编码游戏角色名称的方法自然会是 `Character` 类的一个方法——因为该类拥有编码角色名称所需的知识。在
    Objective-C 中，可以考虑编写一个类别，将你自己的 `-(id)encodedCharacterName` 方法添加到核心的 `NSString`
    类中。


    ■ 警告 向根类 `NSObject` 添加类别时需要格外小心和考虑。它可能会导致未预料到的潜在危险副作用。每个类对象（在运行时定义类的准对象）也是 `NSObject`
    的子类，因此任何 `NSObject` 方法同时成为一个实例方法和一个类方法。这意味着 `self` 变量可能指向一个实例对象或一个类对象，具体取决于上下文。此外，`NSObject`
    方法不能向 `super` 发送消息。


    ### 扩展


    Objective-C 2.0 引入了扩展的概念。扩展本质上是一个匿名的类别。扩展用于细分类的 `@interface`，但不细分其 `@implementation`。它特别适用于从类的公共接口中排除方法原型，如前文“隐藏方法”部分所述。'
  raw: 'A popular use of categories is to hide portions of a class’s interface, typically
    to discourage the use of methods designed for internal consumption. In Java, methods
    can be scoped as private or protected, making them inaccessible outside the class.
    In Objective-C, you can “hide” a set of methods in a category. Listing 5-7 shows
    how the internal methods of the Toaster class are isolated in the Private category.


    Listin g 5-7\. Methods in a Private Category


    @interface ToasterController : NSObject {


    @private


    float darkness;


    }


    - (void)setDarkness:(float)level;


    - (void)startToasting;


    - (void)stopToasting;


    @end


    @interface ToasterController (Private)


    - (float)darkness;


    - (CarrierState)carrierPosition;


    - (NSTimeInterval)cycleTime;


    - (void)setCycleTime:(NSTimeInterval)cycleTime;


    - (void)finishedToasting:(NSTimer*)timer;


    @end


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ EXPLORING PROTOCOLS AND CATEGORIES


    To make this effective, the declaration of the ToasterController (Private) category
    is saved in its own header (.h) file. Modules that use the ToasterController class
    import only the ToasterController.h file, which does not include any of the Private
    category methods. In the absence of the Private category declaration, the compiler—and
    by extension the programmer—remains blissfully ignorant of the internal control
    methods.


    ■ NNote By convention, a category is saved in a header file named after the class
    “+” the name of the category. In the example in Listing 5-7, the ToasterController
    (Private) category would be saved in the ToasterController+Private.h file.


    This could also be done with just two source files. The ToasterController.h file
    would contain only the primary @interface ToasterController declaration. The implementation
    (.m) file would begin by importing its header. It would then declare the @interface
    for the Private category, followed by


    @implementation directives for both the ToasterController class and its Private
    category methods. No other module would have knowledge of these internal methods.


    This is such a common use of categories that Objective-C 2.0 has added the concept
    of extensions, described later in this section, which formalizes this technique.


    Augmenting Foreign Classes


    A feature that will seem almost bizarre to Java developers is that categories
    can attach methods to any class. This permits a class to be extended without subclassing
    it or altering its original class definition.


    More importantly, subclasses of the class inherit the category methods.


    The NSArray class in the Cocoa framework defines an -(id)lastObject convenience
    method, approximately equivalent to the statement [array objectAtIndex:[array
    count]-1]. For symmetry, I wish the NSArray class designers had also included
    a -(id)firstObject method too. Objective-C grants my wish in Listing 5-8.


    Listin g 5-8\. NSArray Category


    @interface NSArray (MyCollectionAdditions)


    - (id)firstObject;


    @end


    @implementation NSArray (MyCollectionAdditions)


    - (id)firstObject


    {


    return ([self objectAtIndex:0]);


    }


    @end


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ EXPLORING PROTOCOLS AND CATEGORIES


    MyCollectionAdditions dynamically alters the behavior of the operating system’s
    NSArray class by inserting a new method. My application can now send the -firstObject
    message to any NSArray object in my process.


    ■Caution When a category and class both implement the same method, the category’s
    method replaces the one in the class. It does not override it; there is no way
    to invoke the original method. A call to [super method] in the category’s code
    will invoke the superclass’s method, not the class’s original method. If two or
    more categories implement the same method for the same class, which gets invoked
    at runtime is unpredictable.


    Besides being able to decorate classes with convenience features, categories are
    very useful for adding functionality to classes that are outside of their domain.
    Returning to the example in this book’s introduction, the AppKit framework defines
    the NSStringDrawing category that extends the base NSString class with the additional
    methods shown in Listing 5-9.


    Listin g 5-9\. NSStringDrawing Category


    @interface NSString(NSStringDrawing)


    - (NSSize)sizeWithAttributes:(NSDictionary *)attrs;


    - (void)drawAtPoint:(NSPoint)point withAttributes:(NSDictionary *)attrs;


    - (void)drawInRect:(NSRect)rect withAttributes:(NSDictionary *)attrs;


    @end


    All NSString objects inherit these methods. This allows you to write the much
    more natural and concise [string draw], rather than being forced to write [currentDrawingContext
    drawString:string].


    ■Note Categories underscore the fact that Objective-C classes are assembled dynamically
    at runtime. A GUI application that loads the AppKit framework (containing the
    NSStringDrawing category), injects these additional drawing methods into the base
    NSString class. An Objective-C command-line utility linked only to the Foundation
    framework (which contains no graphic drawing classes) does not load the AppKit
    framework and will not have these methods implemented for its NSString objects.


    Categories allow you to implement methods where they are convenient and make sense,
    without sacrificing good programming practices like encapsulation and modularity.


    As you explore various frameworks, you will discover many categories that expand
    classes with useful methods that would be totally inappropriate to implement in
    those classes. The NSStringPathExtensions category adds a slew of file system
    path manipulations to NSString objects.


    Similarly, the NSURLUtilities category adds URL character-encoding methods to
    NSString.


    NSPasteboardSupport adds clipboard copy and paste methods to the NSURL class,
    and so on.


    The important thing to remember is that methods in Objective-C classes are not
    confined to the domain of the class. When looking for methods in the documentation,
    don’t confine your search to the classes within the domain of responsibility.
    NSGraphicsContext doesn’t implement any drawing 83


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ EXPLORING PROTOCOLS AND CATEGORIES


    methods. The objects that get drawn (NSString, NSImage, NSAttributedString, etc.)
    each have their own


    -draw method, some courtesy of categories supplied by NSGraphicsContext.


    As you write your own code, strive to break out of the strict Java model of method
    organization.


    In Java, a method that encodes a game character’s name would naturally be a method
    in the Character class—because that’s the class with the knowledge required to
    encode a character’s name. In Objective-C, consider writing a category that adds
    your own -(id)encodedCharacterName method to the core NSString class.


    ■Caution Take extra care and consideration when adding a category to the root
    NSObject class. It may cause unanticipated, and potentially hazardous, side effects.
    Every Class object (the quasi-object that defines a class at runtime) is also
    a subclass of NSObject, so any NSObject method becomes both an instance method
    and a class method. This means that the self variable might refer to an instance
    object or a Class object, depending on the context. Also, an NSObject method cannot
    send messages to super.


    Extensions


    Objective-C 2.0 introduces the concept of an extension. An extension is, essentially,
    an anonymous category. An extension is used to subdivide a class’s @interface,
    but not its @implementation. It is particularly useful for excluding method prototypes
    from a class’s public interface, as described earlier in the “Hiding Methods”
    section.'
