  trans: "\n与 `NSConnection` 类似，服务器和客户端进程各自创建一个 `NSNetService` 对象，用于发布服务或连接现有服务。`NSNetServiceBrowser`\
    \ 则扮演着“媒人”的角色。`NSNetServiceBrowser` 对象会帮助你的应用程序发现当前可用的服务。它可以描述所有可用的资源，搜索特定服务，并与它们建立连接。\n\
    \n使用网络服务需要经历三个操作阶段：\n\n1.  发布\n2.  发现\n3.  解析\n\n发布是指注册你的服务，使其能够被网络上的其他进程和计算机公开可见。你必须首先创建一个套接字（例如\
    \ `NSSocketPort`），客户端可以通过它与你的服务通信。然后，你创建一个 `NSNetService` 对象，连接到该端口，并描述你的服务。接着，通过向\
    \ `NSNetService` 对象发送 `-publish` 或 `-publishWithOptions:` 消息来发布服务。发布后，远程客户端就可以找到、连接并与你的服务通信。\n\
    \n使用 `NSNetServiceBrowser` 类来查找你网络上的服务。首先，创建一个 `NSNetServiceBrowser` 实例，然后配置它以查找你感兴趣的服务类型。浏览器会开始工作，并在发现服务时进行报告。\n\
    \n一旦通过浏览或其他方式了解到某个远程服务，最后一步就是解析它。同样，你需要创建一个 `NSNetService` 对象，并用定位该远程服务所需的信息来配置它。然后，向其发送一条\
    \ `-resolveWithTimeout:` 消息。随后，`NSNetService` 对象会着手建立连接。成功后，`-getInputStream:outputStream:`\
    \ 消息会返回输入和输出流对象，通过这些对象，你可以与远程服务进行通信。\n\n网络服务的发布和发现可能非常耗时，并且新的服务可能会自发地出现和消失。因此，几乎所有网络服务的方法都是异步执行的。结果通过你提供的委托对象进行传递。例如，`-resolveWithTimeout:`\
    \ 消息会立即返回，但会在后台启动解析过程。完成后，你的委托对象会收到 `-netServiceDidResolveAddress:` 消息；如果解析失败，则会收到\
    \ `-netService:didNotResolve:` 消息。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n《`NSNetServices Programming Guide`》详细介绍了网络服务的工作原理，并提供了大量的代码示例。\n\n## URL 加载\n\
    \nJava 和 Objective-C 都提供了一组类，用于协助访问由统一资源定位符（URL）标识的服务和实体。两者都内置了对 HTTP、HTTPS、FTP\
    \ 和 FILE 协议的支持。URL 协议通常很复杂，但这些类巧妙地封装了这些复杂性，使你能够轻松地与它们交互。这使得只需几行代码，即可向 URL（例如 `http://www.apress.com`）发送\
    \ Web 服务器请求并接收响应。\n\nJava 和 Objective-C 中 URL 类的组织和角色几乎相同，尽管 Objective-C 的粒度更细一些。`NSURL`（`java.net.URL`）类定义了一个单一的\
    \ URL。`NSURLConnection`（`java.net.URLConnection`）管理与 URL 所描述的远程服务的通信。Objective-C\
    \ 将 Java 单一的 `URLConnection` 对象分解为三个对象：`NSURLConnection` 只关心连接的状态；请求参数封装在 `NSURLRequest`\
    \ 中；服务的回复包含在 `NSURLResponse` 中。任何数据——请求或响应的“主体”——都通过流或事件进行交换。\n\n本节将介绍几种常见的 URL\
    \ 加载技术，以及它们与类似 Java 实现的对比。\n\n### 简单 URL 请求\n\n最简单的 URL 交互就是获取 URL 的内容。两种语言都能轻松实现这一点，如列表\
    \ 13-10 所示。\n\n**列表 13-10. 简单 URL 请求**\n\n**Java**\n\n```\ntry {\n    URL url\
    \ = new URL(\"http://www.apress.com/\");\n    Reader inStream = new InputStreamReader(url.openStream());\n\
    \    int c;\n    System.out.print(\"URL Response: \");\n    while ((c=inStream.read())\
    \ != -1)\n        System.out.print((char)c);\n    inStream.close();\n} catch (Exception\
    \ e) {\n    e.printStackTrace();\n}\n```\n\n**Objective-C**\n\n```\nNSURL *url\
    \ = [NSURL URLWithString:@\"http://www.apress.com/\"];\nNSURLRequest* request\
    \ = [NSURLRequest requestWithURL:url];\nNSURLResponse *response = nil;\nNSData\
    \ *data = [NSURLConnection sendSynchronousRequest:request returningResponse:&response\n\
    \                                                  error:NULL];\nNSLog(@\"URL\
    \ response: %@\",[NSString stringWithCString:[data bytes]\n                  \
    \                            length:[data length]]);\n```\n\nJava 代码利用了便捷方法 `java.net.URL.openStream()`，该方法会创建一个\
    \ `URLConnection` 对象，发起请求，并返回一个连接到响应流的 `InputStreamReader` 对象。Objective-C 代码的设置稍微复杂一些，首先需要创建一个\
    \ `NSURLRequest` 对象。完成这一步后，整个事务通过使用 `+[NSURLConnection sendSynchronousRequest:returningResponse:error:]`\
    \ 类方法执行。会创建一个临时的 `NSURLConnection` 对象，发送请求，并将响应通过两个对象返回：一个包含回复头部的 `NSURLResponse`\
    \ 对象和一个包含响应主体的 `NSData` 对象。\n\n### 异步 URL 请求\n\nJava 中的 URL 交互本质上是同步的。如果加载的 URL\
    \ 数据需要很长时间才能获取到，列表 13-10 中的代码将会阻塞，直到数据接收完毕。如果加载 URL 所花费的时间无关紧要，这可能是合适的。但通常情况并非如此。为了避免挂起主应用程序，可以将列表\
    \ 13-10 中的代码放在其自己的线程中执行。在 Java 中，这是首选的解决方案。\n\n在 Objective-C 中，使用 `NSURLConnection`\
    \ 的自然方式是异步的。大多数 `NSURLConnection` 方法都会启动异步操作——同步操作反而是特例。就像本章前面描述的 `NSStream` 一样，`NSURLConnection`\
    \ 通过向其委托发送消息来报告其进度。异步读取 URL 内容的代码如列表 13-11 所示。\n\n**列表 13-11. 异步 URL 请求**\n\n\
    ```\n@interface URLGetter : NSObject {\n    NSMutableData *body;\n    NSURLConnection\
    \ *connection;\n}\n- (void)loadURL:(NSString*)string;\n@end\n\n@implementation\
    \ URLGetter\n- (void)loadURL:(NSString*)string\n{\n    NSURL *url = [NSURL URLWithString:string];\n\
    \    NSURLRequest *request = [NSURLRequest requestWithURL:url];\n    // 分配缓冲区来存储接收到的数据\n\
    \    body = [NSMutableData data];\n    connection = [NSURLConnection connectionWithRequest:request\
    \ delegate:self];\n}\n\n- (void)connection:(NSURLConnection*)connection didReceiveData:(NSData*)data\n\
    {\n    [body appendData:data];\n}\n\n- (void)connection:(NSURLConnection*)connection\n\
    didReceiveResponse:(NSURLResponse*)response\n{\n    // 成功接收到响应头部和元数据\n    // 每个新主体之前都会有连续的响应，因此重置缓冲区\n\
    \    [body setLength:0];\n}\n\n- (void)connectionDidFinishLoading:(NSURLConnection*)connection\n\
    {\n    // URL 加载完成；NSURLConnection 已关闭，|body| 已完成\n}\n\n- (void)connection:(NSURLConnection*)connection\
    \ didFailWithError:(NSError*)error\n{\n    // URL 加载失败；原因在 |error| 中\n}\n@end\n\
    ```\n"
- fmt: "# 排版后的文档\n\n`+connectionWithRequest:delegate:`便利构造器创建了一个`NSConnection`对象，并立即发起请求。响应通过一系列事件传达给委托对象。`NSURLConnection`必须在活动运行循环的上下文中创建。\n\
    \n**提示** 当从`NSURLRequest`创建`NSURLConnection`时，连接会深拷贝请求对象。后续对请求的修改不会影响连接。`NSURLRequest`对象可以立即修改并用于创建另一个连接，而不会影响任何先前创建的连接。\n\
    \n一旦初始标头和元数据被读取并组装成`NSURLResponse`对象，委托会收到`-connection:didReceiveResponse:`消息。随后，零次或多次`-connection:didReceiveData:`消息将剩余内容传递给委托。最后，`-connectionDidFinishLoading:`消息表示事务完成。在任何时候，收到`-connection:didFailWithError:`消息表示请求未成功完成，并说明原因。\n\
    \n如果服务将请求重定向到另一个URL（这本质上会重新启动连接），则可能会收到多次`-connection:didReceiveResponse:`消息。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第13章 ■ 近远程通信\n\n### 写入URL\n\
    \n到目前为止，只处理了最基本的请求。要定义更复杂的请求，或向请求包含额外数据，需要更细粒度的对象构造。清单13-12展示了一个示例，该示例将包含表单数据的字节数组发布到HTTP服务器。\n\
    \n**清单13-12\\. 向HTTP服务器发布表单数据**\n\n**Java**\n\n```java\npublic byte[] submitForm(\
    \ byte[] formData )\n{\n    byte[] response = null;\n    try {\n        URL url\
    \ = new URL(\"http://localhost/form.jsp\");\n        HttpURLConnection connection\
    \ = (HttpURLConnection)url.openConnection();\n        connection.setDoOutput(true);\n\
    \        connection.setRequestMethod(\"POST\");\n        // (configure any additional\
    \ headers or properties here)\n        OutputStream requestStream = connection.getOutputStream();\n\
    \        requestStream.write(formData);\n        InputStream responseStream =\
    \ connection.getInputStream();\n        ByteArrayOutputStream buffer = new ByteArrayOutputStream();\n\
    \        int c;\n        while ( (c=responseStream.read()) != -1)\n          \
    \  buffer.write(c);\n        response = buffer.toByteArray();\n    } catch (Exception\
    \ e) {\n        e.printStackTrace();\n    }\n    return (response);\n}\n```\n\n\
    **Objective-C**\n\n```objective-c\n- (NSData*)submitForm:(NSData*)formData\n{\n\
    \    NSURL *url = [NSURL URLWithString:@\"http://localhost/form.jsp\"];\n    NSMutableURLRequest*\
    \ urlRequest = [NSMutableURLRequest requestWithURL:url];\n    [urlRequest setHTTPMethod:@\"\
    POST\"];\n    [urlRequest setHTTPBodyStream:[NSInputStream inputStreamWithData:formData]];\n\
    \    // (configure any additional headers or properties here)\n    NSURLResponse\
    \ *response = nil;\n    NSData *responseData = [NSURLConnection sendSynchronousRequest:urlRequest\n\
    \                                                returningResponse:&response\n\
    \                                                            error:NULL];\n  \
    \  return responseData;\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第13章 ■ 近远程通信\n\nObjective-C和Java之间的两个显著区别如下：\n\n- 在Java中，`URLConnection`对象用于配置请求。在Objective-C中，你需要创建`NSMutableURLRequest`来自定义请求。\n\
    - Java的`URLConnection`创建连接到请求数据流和响应数据流的`OutputStream`和`InputStream`对象。Objective-C则完全相反。它不是获取`OutputStream`来写入请求数据，而是提供一个输入流对象，`NSURLConnection`将读取该对象以获取请求数据。\n\
    \n### 下载URL\n\nCocoa框架提供了一个便捷的实用类，专门用于从URL下载文件。\n\n`NSURLDownload`对象的构造方式与`NSURLConnection`对象非常相似，但除了请求对象外，还需要提供目标文件路径。下载将自动启动，并根据成功与否向你的委托对象发送`-downloadDidFinish:`消息。"
  raw: 'The +connectionWithRequest:delegate: convenience constructor creates an NSConnection
    object and immediately initiates the request. The response is communicated to
    the delegate object through a sequence of events. The NSURLConnection must be
    created within the context of an active run loop.


    ■Tip When an NSURLConnection is created from a NSURLRequest, the connection makes
    a deep copy of the request object. Subsequent changes to the request do not influence
    the connection. The NSURLRequest object can be immediately modified and used to
    create another connection without affecting any previously created connections.


    The delegate receives a -connection:didReceiveResponse: message once the initial
    headers and metadata have been read and assembled into an NSURLResponse object.
    Following that, zero or more


    -connection:didReceiveData: messages pass the balance of the content to the delegate.
    Finally, a


    -connectionDidFinishLoading: message signifies that the transaction is complete.
    At any point, the receipt of a -connection:didFailWithError: message indicates
    that the request did not complete successfully, and why.


    It’s possible to receive multiple -connection:didReceiveResponse: messages if
    the service redirects the request to another URL, which essentially restarts the
    connection.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 13 ■ COMMUNICATING NEAR AND FAR


    Writing to a URL


    So far, only the most basic requests have been made. To define a more complex
    request, or to include additional data with the request, requires more granular
    object construction. An example that posts a byte array containing form data to
    an HTTP server is shown in Listing 13-12.


    Listin g 13-12\. Posting Form Data to an HTTP Server


    Java


    public byte[] submitForm( byte[] formData )


    {


    byte[] response = null;


    try {


    URL url = new URL("http://localhost/form.jsp");


    HttpURLConnection connection = (HttpURLConnection)url.openConnection(); connection.setDoOutput(true);


    connection.setRequestMethod("POST");


    // (configure any additional headers or properties here)


    OutputStream requestStream = connection.getOutputStream(); requestStream.write(formData);


    InputStream responseStream = connection.getInputStream();


    ByteArrayOutputStream buffer = new ByteArrayOutputStream(); int c;


    while ( (c=responseStream.read()) != -1)


    buffer.write(c);


    response = buffer.toByteArray();


    } catch (Exception e) {


    e.printStackTrace();


    }


    return (response);


    }


    **Objective-C**


    - (NSData*)submitForm:(NSData*)formData


    {


    NSURL *url = [NSURL URLWithString:@"http://localhost/form.jsp"]; NSMutableURLRequest*
    urlRequest = [NSMutableURLRequest requestWithURL:url];


    [urlRequest setHTTPMethod:@"POST"];


    [urlRequest setHTTPBodyStream:[NSInputStream inputStreamWithData:formData]];


    // (configure any additional headers or properties here)


    NSURLResponse *response = nil;


    NSData *responseData = [NSURLConnection sendSynchronousRequest:urlRequest returningResponse:&response


    error:NULL];


    return responseData;


    }


