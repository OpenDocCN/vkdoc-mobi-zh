    如果你需要以编程方式创建绑定——比如为你以编程方式创建的视图对象——请向符合绑定规范的观察者发送一条`-bind:toObject:withKeyPath:options:`消息。


    如果你正在创建自定义视图对象来显示自定义数据，那么在视图和数据模型对象之间建立非正式绑定会更便捷。这本质上就是“构建你自己的 MVC 通信机制”。你的自定义视图应使用
    Objective-C 消息、通知和观察机制来实现基本的 MVC 通信。视图应直接了解控制器和数据模型，而不是试图创建一个通过绑定通信的抽象、可复用的视图类。在
    TicTacToe 项目中，`ChalkboardView`对象就是一个很好的例子。它显示一个井字棋游戏，并在用户点击棋盘时向控制器发送“移动”操作。该对象知道自己连接到了一个`TTTDocument`控制器，并显式观察其`game`属性的变化。该对象符合
    MVC 设计模式，但并没有超出其用途进行抽象化。


    ## Interface Builder


    在我深入讨论视图对象、事件和控制器之前，先花点时间解释一下 Cocoa 应用开发中的一些“魔法”。如果你不习惯使用 Cocoa 进行开发——我假设你并不熟悉，否则你也不会读这本书——当你打开
    TicTacToe 项目时，很可能会挠头不解。Objective-C 源代码显然实现了各对象的功能，但你可以逐行查看代码，却找不到以下任何内容：


    - 创建文档窗口或该窗口中任何视图对象的代码

    - 将文档对象连接到其任何视图对象的代码

    - 将视图对象绑定到控制器或数据模型属性的代码

    - 将视图对象（如按钮和菜单项）与实现这些操作的控制器对象连接的代码


    所有这些任务都是通过 Interface Builder 完成的，这是一个重要的开发工具，它让 Cocoa 应用开发变得轻松且同时充满神秘感。


    简而言之，Interface Builder 用于编辑 NIB 文件。你在第 4 章中已经了解过，NIB 文件包含了要在运行时实例化的对象的归档（序列化）表示。归档的对象包括属性和对象间的引用。NIB
    文件是应用包的一部分。当 NIB 文件在运行时被“加载”时，对象会被解档；这会将对象图实例化，设置它们的属性，并连接任何对象间的引用。


    如果你读过第 12 章关于归档的内容，那么 NIB 文件完成的工作并不神秘。如果你来自其他开发环境，请记住 Interface Builder 不是代码生成器。它所做的只是编辑那些将在运行时通过标准归档解码实例化的对象的虚拟表示。这没有任何“魔法”成分，也不会生成任何代码。最终结果与解档一组先前以编程方式创建的对象图完全相同。


    理解了这个基本概念，Interface Builder 在开发中的作用以及 NIB 文档中的对象如何创建和初始化就不再是谜团了。说“当用户点击视图对象时，它会向控制器发送一个操作消息”是一回事，而实际实现它又是另一回事。在
    Cocoa 开发中，这些对象之间的连接以及发送的消息（通常）是在 Interface Builder 中定义的。熟悉 Interface Builder 是成为一名高效
    Cocoa 开发者的重要一步。


    ### NIB 文档


    如前所述，Interface Builder（IB）主要是一个 NIB 文档编辑器。在其现代形式中，Interface Builder 编辑的是 Interface
    Builder 文档，这相当于源代码文件。当应用构建时，源文件会被编译成最终的二进制形式。在过去，Interface Builder 会直接编辑实际的二进制归档文件，没有单独的编译阶段；NIB
    文件只是简单地被复制到应用包中。


    NIB 文档有名称，你的应用可以根据需要拥有任意数量的 NIB 文档。Cocoa 应用会指定一个作为主 NIB 文档，通常是`MainMenu.nib`。主
    NIB 文档在程序初始化时加载，应包含应用的所有标准视图元素。这必然包括菜单对象，但也可能包括共享窗口或其他对象。


    标准的 Cocoa 文档控制器会为你的应用支持的每种文档类型指定一个 NIB 文档。当你在应用中打开一个文档时，会创建一个`NSDocument`实例，然后加载它的
    NIB 文件；这会为文档创建`NSWindow`，并用所需的额外视图对象（按钮、字段、表格、标签页、工具栏、抽屉、辅助窗口、对话框窗口和自定义对象）填充它。


    此外，你可以创建额外的 NIB 文档，并以编程方式为你能想到的任何用途加载它们。例如，你可能有一个使用许多不同子视图的非常复杂的文档窗口。你可以在文档的 NIB
    文档中定义该窗口和容器视图，然后在辅助 NIB 文档中定义每个子视图的视图对象，按需以编程方式加载它们。加载 NIB 文档时唯一需要建立的是所有者对象，稍后在“所有者对象”部分会对此进行描述。


    ### NIB 文档窗口


    当你在 Interface Builder 中打开一个 NIB 文档时，你会看到 NIB 中对象的图形或符号表示。你可以使用各种检查器面板编辑这些对象的属性。你可以通过从库面板拖动图标到文档中来创建新对象。你还可以重新组织和删除它们。


    视图对象（窗口、控件、字段、菜单）也可以有视觉表示，就像它们在你的应用中实例化时一样。一个典型的 NIB 文档窗口如图 20-5 所示，其后是窗口和视图对象的图形表示。在大多数情况下，对象的符号表示和视觉表示是等同的。


    ### 对象属性


    既然你明白了 NIB 文档只是包含对象图的归档版本，那么 Interface Builder 的属性就容易理解了。在 Interface Builder 中，你可以使用各种检查器面板编辑这些对象的属性。图
    20-5 显示了基本属性的检查器：大小、位置、调整大小行为、动画效果、连接、绑定等。


    **图 20-5.** Interface Builder 属性


    你可以通过选择 NIB 文档主窗口中的符号表示或视觉表示来编辑对象的属性。在图 20-5 中，可以通过选择`Push Button (Reset)`对象或其后窗口中的
    Reset 按钮来编辑 Reset 按钮的属性。


    显式属性（如对象的标题、大小和位置）可以通过点击、拖动和调整视图对象的视觉表示来直接操作。


    你设置的属性会存储在对象的归档流中，并在 NIB 文档解档时隐式恢复。


    ### 占位对象

