- fmt: "## Creating Weak References\n\n**Java**\n\n```java\nString name = \"Clarence\"\
    ;\nWeakReference weakName = new WeakReference(name);\nname = null;\n...\nname\
    \ = (String)weakName.get();\nif (name != null) {\n    // ... name has not been\
    \ collected\n}\n```\n\n**Objective-C**\n\n```objectivec\n__weak NSString *name\
    \ = @\"Clarence\";\n...\nif (name != nil) {\n    // ... name has not been collected\n\
    }\n```\n\nA `__weak` object pointer is set to `nil` by the garbage collector whenever\
    \ it determines that there are no other strong references to that object and the\
    \ object is eligible for collection. The garbage collector guarantees that all\
    \ `__weak` references to an object are set to `nil` before the object is finalized\
    \ and destroyed.\n\nFor the sake of clarity, all non-weak references are strong\
    \ references. Objective-C does not support soft references or phantom references.\
    \ Nor are there any reference queues, so your objects are not notified when the\
    \ garbage collector decides to collect an object.\n\nTo make it easy to manage\
    \ groups of objects via weak references, both Java and Objective-C provide specialized\
    \ collections that hold weak references to a set of objects, gracefully removing\
    \ them when they are collected. These are listed in Table 9-1.\n\n**Table 9-1.**\
    \ Weak Collection Classes\n\n| Weak Java Collection | Weak Objective-C Collection\
    \ |\n|----------------------|-----------------------------|\n| `WeakHashMap` |\
    \ `NSHashTable` |\n| | `NSMapTable` |\n| | `NSPointerArray` |\n\nThe `NSHashTable`\
    \ implements a general-purpose set collection. It is largely consistent with the\
    \ traditional `NSMutableSet` class, but can be programmed with different “personalities”\
    \ that define how it treats each element of the set. One of the more useful options\
    \ is to configure the set to use weak references to all of its objects using the\
    \ constructor `[NSHashTable hashTableWithWeakObjects]`. This creates a mutable\
    \ set of objects that can be collected if they lack any strong references. When\
    \ collected, an object simply disappears from the set.\n\nSimilarly, `NSMapTable`\
    \ is a mutable dictionary (map) of key/value pairs. Unlike `java.util.WeakHashMap`,\
    \ an `NSMapTable` can be created with strong or weak references to its keys, and\
    \ strong or weak references to its values, as listed in Table 9-2. A key/value\
    \ pair in the collection is removed if either object is collected.\n\n**Table\
    \ 9-2.** `NSMapTable` Constructors\n\n| Constructor | Key Pointers | Value Pointers\
    \ |\n|-------------|--------------|----------------|\n| `[NSMapTable mapTableWithStrongToStrongObjects]`\
    \ | strong | strong |\n| `[NSMapTable mapTableWithWeakToStrongObjects]` | weak\
    \ | strong |\n| `[NSMapTable mapTableWithStrongToWeakObjects]` | strong | weak\
    \ |\n| `[NSMapTable mapTableWithWeakToWeakObjects]` | weak | weak |\n\nFinally,\
    \ the `NSPointerArray` collection is similar to the `NSMutableArray` collection,\
    \ except that it permits items in the collection to be `nil` (or `NULL`). It is\
    \ intended to be used with generic pointers—normally outside the scope of garbage\
    \ collection—but can be programmed to use weak object pointers using the constructor\
    \ `[NSPointerArray pointerArrayWithWeakObjects]`. When an object is collected,\
    \ its pointer entry in the collection is set to `nil`. This does not alter the\
    \ number of items in the collection, just its content.\n\nSee Chapter 16 for more\
    \ about collection classes.\n\n## Creating Strong References\n\nYou can programmatically\
    \ create a strong reference by dynamically promoting an object pointer to the\
    \ root set of objects, even if your application does not maintain a strong reference\
    \ to it. This might be useful, for example, if you created an autonomous controller\
    \ that performs actions on its own—possibly responding to notifications or C callbacks,\
    \ which are themselves weak references—and you don’t need a reference to it. The\
    \ code in Listing 9-3 prevents an object from being garbage collected using the\
    \ `-disableCollectorForPointer:` method. To make the object collectable again,\
    \ balance each `-disableCollectorForPointer:` message with an `-enableCollectorForPointer:`\
    \ message.\n\n**Listing 9-3.** Preventing an Object from Being Collected"
