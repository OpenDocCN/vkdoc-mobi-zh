    CHAPTER 14 ■ EXCEPTION HANDLING


    Combining Errors and Exceptions


    Academic arguments about the superiority of exceptions and traditional error handling
    will continue to rage on. In the meantime, I’m a big fan of combining the two.
    NSError objects have clear advantages in complex applications that must be localized.
    Java-style exception handling has clear advantages for simplifying code and execution
    flow. Listing 14-10 shows one way in which traditional C error handling, NSError
    objects, and exceptions can be combined.


    Listin g 14-10\. Mixing Error Handling


