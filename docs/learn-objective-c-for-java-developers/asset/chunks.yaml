    overridden in step 4 invoke the methods defined by KVO instead of the original
    class. Because KVO also overrides the -


    class method, the object still appears to be its original class. You’d have to
    peak at the raw isa instance variable to see a difference in the object.


    4 Apple Inc., User Defaults Programming Topics for Cocoa,


    http://developer.apple.com/documentation/Cocoa/Conceptual/UserDefaults/, 2007.


