- fmt: "# Properties\n\nAt runtime, there is a single instance of a `Class` object\
    \ for every class. The `Class` object defines the behavior for all instances of\
    \ that class. Every instance of that class refers to its defining `Class` object\
    \ via its `isa` variable.\n\nYou should not directly access an object’s `isa`\
    \ variable. If you want to get an object’s `Class`, the `-(Class)class` method\
    \ will return it. You may also find `-(NSString*)className` useful: it returns\
    \ the name of the object’s class as a string.\n\nSeveral technologies alter an\
    \ object’s `isa` variable (a technique known as “isa swizzling”) to dynamically\
    \ alter that object’s behavior. Never change the value of an object’s `isa` variable\
    \ yourself, until you have a clear and deep understanding of Objective-C’s runtime\
    \ architecture.\n\n## Properties\n\nObjective-C 2.0 adds the `@property` and `@synthesize`\
    \ keywords for defining object properties and implementing their matching accessor\
    \ methods. A property is a value that is fetched using an accessor method and\
    \ set using a mutator method. A property’s value is typically stored in an instance\
    \ variable, but that’s not a requirement.\n\nThe `@property` directive declares\
    \ a property of the class. A `@property` directive typically appears in the `@interface`\
    \ directive. It does not implement the accessor methods or create any instance\
    \ variables. It is simply a promise that the class implements that property. Listing\
    \ 3-9 shows the `Person` class, in both Java and Objective-C. The class defines\
    \ five properties: `tag`, `firstName`, `lastName`, `fullName`, and `adult`.\n\n\
    ### Listing 3-9\\. Property Declarations\n\n**Java**\n\n```java\npublic class\
    \ Person\n{\n    int tag;\n    String firstName;\n    String secondName;\n   \
    \ boolean adult;\n\n    synchronized int getTag()\n    {\n        return (tag);\n\
    \    }\n\n    synchronized void setTag( int tag )\n    {\n        this.tag = tag;\n\
    \    }\n\n    public synchronized String getFirstName()\n    {\n        return\
    \ firstName;\n    }\n\n    public synchronized void setFirstName( String firstName\
    \ )\n    {\n        this.firstName = firstName;\n    }\n\n    public synchronized\
    \ String getLastName()\n    {\n        return secondName;\n    }\n\n    public\
    \ synchronized void setLastName( String lastName )\n    {\n        secondName\
    \ = lastName;\n    }\n\n    public synchronized boolean isAdult()\n    {\n   \
    \     return adult;\n    }\n\n    public synchronized void setAdult( boolean adult\
    \ )\n    {\n        this.adult = adult;\n    }\n\n    public String getFullName()\n\
    \    {\n        return (firstName+\" \"+secondName);\n    }\n}\n```\n\n**Objective-C**\n\
    \n```objectivec\n@interface Person : NSObject {\n    int tag;\n    NSString *firstName;\n\
    \    NSString *secondName;\n    BOOL adult;\n}\n\n@property int tag;\n@property\
    \ (copy) NSString *firstName;\n@property (copy) NSString *lastName;\n@property\
    \ (getter=isAdult) BOOL adult;\n@property (readonly,nonatomic) NSString *fullName;\n\
    \n@end\n\n@implementation Person\n\n@synthesize tag;\n@synthesize firstName;\n\
    @synthesize lastName = secondName;\n@synthesize adult;\n\n- (NSString *)fullName\n\
    {\n    return ([NSString stringWithFormat:@\"%@ %@\",firstName,secondName]);\n\
    }\n\n@end\n```\n\nThe `@synthesize` directive appears in the `@implementation`\
    \ of the class. A `@synthesize` directive tells the compiler to generate the accessor\
    \ and mutator methods needed to implement the property.\n\nIn the absence of a\
    \ `@synthesize` directive, it is up to the programmer to implement the methods\
    \ that satisfy the contract declared in the `@property` directive. Failing to\
    \ either include a `@synthesize` directive or implement the expected accessor\
    \ methods is an error.\n\n> **Note:** The special `@dynamic` directive suppresses\
    \ the compiler’s expectation for the required accessor methods. In some cases\
    \ (i.e., class extensions, categories, subclassing, dynamically-loaded frameworks),\
    \ it’s possible that the class will implement methods at runtime that the compiler\
    \ is not aware of. The `@dynamic` directive tells the compiler not to worry about\
    \ it; the programmer promises that the expected methods will exist when the program\
    \ executes. Use of `@dynamic` is rare.\n\nThe first two properties are straightforward.\
    \ The `@property int tag` declares that the class `Person` implements getter and\
    \ setter methods that satisfy the contract of an integer property named `tag`."
  raw: 'At runtime, there is a single instance of a Class object for every class.
    The Class object defines the behavior for all instances of that class. Every instance
    of that class refers to its defining Class object via its isa variable.


    You should not directly access an object’s isa variable. If you want to get an
    object’s Class, the


    -(Class)class method will return it. You may also find -(NSString*)className useful:
    it returns the name of the object’s class as a string.


    Several technologies alter an object’s isa variable (a technique known as “isa
    swizzling”) to dynamicaly alter that object’s behavior. Never change the value
    of an object’s isa variable yourself, until you have a clear and deep understanding
    of Objective-C’s runtime architecture.


    Properties


    Objective-C 2.0 adds the @property and @synthesize keywords for defining object
    properties and implementing their matching accessor methods. A property is a value
    that is fetched using an accessor method and set using a mutator method. A property’s
    value is typically stored in an instance variable, but that’s not a requirement.


    The @property directive declares a property of the class. A @property directive
    typically appears in the @interface directive. It does not implement the accessor
    methods or create any instance variables. It is simply a promise that the class
    implements that property. Listing 3-9 shows the Person class, in both Java and
    Objective-C. The class defines five properties: tag, firstName, lastName, fullName,
    and adult.


    Listin g 3-9\. Property Declarations


    **Java**


    public class Person


    {


    int tag;


    String firstName;


    String secondName;


    boolean adult;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ WELCOME TO OBJECTIVE-C


    synchronized int getTag( )


    {


    return (tag);


    }


    synchronized void setTag( int tag )


    {


    this.tag = tag;


    }


    public synchronized String getFirstName()


    {


    return firstName;


    }


    public synchronized void setFirstName( String firstName )


    {


    this.firstName = firstName;


    }


    public synchronized String getLastName()


    {


    return secondName;


    }


    public synchronized void setLastName( String lastName )


    {


    secondName = lastName;


    }


    public synchronized boolean isAdult()


    {


    return adult;


    }


    public synchronized void setAdult( boolean adult )


    {


    this.adult = adult;


    }


    public String getFullName( )


    {


    return (firstName+" "+secondName);


    }


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ WELCOME TO OBJECTIVE-C


    **Objective-C**


    @interface Person : NSObject {


    int tag;


    NSString *firstName;


    NSString *secondName;


    BOOL adult;


    }


    @property int tag;


    @property (copy) NSString *firstName;


    @property (copy) NSString *lastName;


    @property (getter=isAdult) BOOL adult;


    @property (readonly,nonatomic) NSString *fullName;


    @end


    @implementation Person


    @synthesize tag;


    @synthesize firstName;


    @synthesize lastName = secondName;


    @synthesize adult;


    - (NSString *)fullName


    {


    return ([NSString stringWithFormat:@"%@ %@",firstName,secondName]);


    }


    @end


    The @synthesize directive appears in the @implementation of the class. A @synthesize
    directive tells the compiler to generate the accessor and mutator methods needed
    to implement the property.


    In the absense of a @synthesize directive, it is up to the programmer to implement
    the methods that sastify the contract declared in the @property directive. Failing
    to either include a @synthesize directive or implement the expected accessor methods
    is an error.


    ■Note The special @dynamic directive suppresses the compiler’s expectation for
    the required accessor methods.


    In some cases (i.e., class extensions, categories, subclassing, dynamically-loaded
    frameworks), it’s possible that the class will implement methods at runtime that
    the compiler is not aware of. The @dynamic directive tells the compiler not to
    worry about it; the programmer promises that the expected methods will exist when
    the program executes. Use of @dynamic is rare.


    The first two properties are straightforward. The @property int tag declares that
    the class Person implements getter and setter methods that satisfy the contract
    of an integer property named tag.'
  trans: "\n# 属性\n\n在运行时，每个类都有且只有一个`Class`对象的实例。`Class`对象定义了该类所有实例的行为。该类中的每个实例都通过其`isa`变量引用其所属的`Class`对象。\n\
    \n你不应直接访问对象的`isa`变量。若要获取对象的`Class`，`-(Class)class`方法会返回它。你还可以使用`-(NSString*)className`方法：该方法以字符串形式返回对象所属类的名称。\n\
    \n某些技术会修改对象的`isa`变量（这种技术称为“isa 混写”）以动态改变该对象的行为。在未清晰且深入理解 Objective-C 运行时架构之前，切勿自行更改对象`isa`变量的值。\n\
    \n## 属性\n\nObjective-C 2.0 新增了`@property`和`@synthesize`关键字，用于定义对象属性并实现其对应的访问器方法。属性是一种通过访问器方法获取、通过设值器方法设置的值。属性的值通常存储在实例变量中，但这并非必需。\n\
    \n`@property`指令用于声明类的属性。`@property`指令通常出现在`@interface`指令中。它既不会实现访问器方法，也不会创建任何实例变量。它仅仅是一个承诺，表明该类实现了该属性。清单\
    \ 3-9 展示了分别用 Java 和 Objective-C 编写的`Person`类。该类定义了五个属性：`tag`、`firstName`、`lastName`、`fullName`和`adult`。\n\
    \n### 清单 3-9\\. 属性声明\n\n**Java**\n\n```java\npublic class Person\n{\n    int tag;\n\
    \    String firstName;\n    String secondName;\n    boolean adult;\n\n    synchronized\
    \ int getTag()\n    {\n        return (tag);\n    }\n\n    synchronized void setTag(\
    \ int tag )\n    {\n        this.tag = tag;\n    }\n\n    public synchronized\
    \ String getFirstName()\n    {\n        return firstName;\n    }\n\n    public\
    \ synchronized void setFirstName( String firstName )\n    {\n        this.firstName\
    \ = firstName;\n    }\n\n    public synchronized String getLastName()\n    {\n\
    \        return secondName;\n    }\n\n    public synchronized void setLastName(\
    \ String lastName )\n    {\n        secondName = lastName;\n    }\n\n    public\
    \ synchronized boolean isAdult()\n    {\n        return adult;\n    }\n\n    public\
    \ synchronized void setAdult( boolean adult )\n    {\n        this.adult = adult;\n\
    \    }\n\n    public String getFullName()\n    {\n        return (firstName+\"\
    \ \"+secondName);\n    }\n}\n```\n\n**Objective-C**\n\n```objectivec\n@interface\
    \ Person : NSObject {\n    int tag;\n    NSString *firstName;\n    NSString *secondName;\n\
    \    BOOL adult;\n}\n\n@property int tag;\n@property (copy) NSString *firstName;\n\
    @property (copy) NSString *lastName;\n@property (getter=isAdult) BOOL adult;\n\
    @property (readonly,nonatomic) NSString *fullName;\n\n@end\n\n@implementation\
    \ Person\n\n@synthesize tag;\n@synthesize firstName;\n@synthesize lastName = secondName;\n\
    @synthesize adult;\n\n- (NSString *)fullName\n{\n    return ([NSString stringWithFormat:@\"\
    %@ %@\",firstName,secondName]);\n}\n\n@end\n```\n\n`@synthesize`指令出现在类的`@implementation`中。`@synthesize`指令会告诉编译器生成实现属性所需的访问器和设值器方法。\n\
    \n如果缺少`@synthesize`指令，则需要由程序员来实现满足`@property`指令中声明的约定的方法。如果既未包含`@synthesize`指令，也未实现预期的访问器方法，则视为错误。\n\
    \n> **注意：** 特殊的`@dynamic`指令可以抑制编译器对所需访问器方法的预期。在某些情况下（例如，类扩展、分类、子类化、动态加载的框架），类可能在运行时实现编译器未知的方法。`@dynamic`指令告知编译器无需为此担心；程序员承诺程序执行时预期的方法将会存在。很少使用`@dynamic`。\n\
    \n前两个属性较为简单。`@property int tag`声明了`Person`类实现了满足名为`tag`的整型属性契约的 getter 和 setter\
    \ 方法。\n"
- fmt: '# Chapter 3: Welcome to Objective-C


    The `@synthesize` tag directive instructs the compiler to generate the methods
    `-(int)tag` and `-(void)setTag:(int)newTag` for you. The `tag` property will be
    stored in the instance variables of the same name.


    The second property declaration is similar, but since the property is an object,
    we’re obliged to include a property attribute clarifying how assignments are handled.
    The `copy` attribute causes the synthesized setter to make and store a copy of
    the object that is passed to it (rather than storing a reference to that object).
    Like `tag`, the value of the `firstName` property will be stored in the `firstName`
    instance variable.


    The third `@property` directive is identical to the second, except that the name
    of the property doesn’t correspond to any declared instance variables. This is
    immaterial to the `@property` directive; that statement is just a promise that
    the class will implement the property, not how. The `@synthesize lastName = secondName`
    directive implements the required getter and setter methods for the `lastName`
    property using the instance variable `secondName` for storage. Getting the `lastName`
    property returns the `secondName` variable; setting the `lastName` property replaces
    the `secondName` variable with a copy of the value passed to `-setLastName:`.


    > **Tip:** If you prefer really compact code, the four `@synthesize` directives
    in Listing 3-9 could have been written as `@synthesize tag, firstName, lastName=secondName,
    adult`.


    The `@property (getter=isAdult) BOOL adult` directive declares a Boolean property
    named `adult`. The `getter=` attribute renames the getter method to `-(BOOL)isAdult`,
    rather than the default `-(BOOL)adult`. As in Java, the getter method for a Boolean
    property traditionally begins with “is” or “has”.


    The final `@property (readonly,nonatomic) NSString *fullName` directive declares
    that the `Person` object provides a string property named `fullName`. The property
    is read-only (it has a getter method but no setter method) and the getter method
    is not thread safe. In the `@implementation` section of the class there is no
    `@synthesize` directive for `fullName`. The required getter method is implemented
    by the programmer.


    > **Caution:** When implementing accessor methods to satisfy a `@property` directive,
    it is up to the programmer to fulfill the implied contract of the declaration.
    If you omit the `nonatomic` attribute, it is up to you to ensure the methods are
    threadsafe. If the `copy` attribute is specified, the setter methods should make
    and store a copy of the value, not a reference to the value (unless you can guarantee
    it to be immutable).


    ## Property Attributes


    The example in Listing 3-9 showed some of the common attributes used in property
    definitions. Table 3-1 describes all of the property attributes that can be included
    in a `@property` directive. Multiple properties are separated by commas.


    **Table 3-1. Property Attributes**


    | Property Attribute | Description |

    | --- | --- |

    | `readonly` | Declares the property to be immutable. A `@synthesize` directive
    for a `readonly` property will generate a getter method, but no setter method.
    `readonly` is mutually exclusive with `readwrite`. |

    | `readwrite` | Declares the property to be mutable. This is the default mutability
    attribute. If neither `readonly` nor `readwrite` are specified, `readwrite` is
    assumed. `readwrite` is mutually exclusive with `readonly`. |

    | `copy` | Declares that the setter method makes a copy of the object passed to
    it and stores a reference to that copy, not a reference to the original object.
    This attribute is only appropriate for object pointer properties—primitive values
    are always passed by copy. `copy` is mutually exclusive with `assign` and `retain`.
    Use `copy` where there is a chance that objects used to set the property might
    be mutable and you do not want the value of the receiver’s property to change
    if the original object is modified. |

    | `assign` | Declares that the setter method sets the property by keeping a pointer
    to the object passed to it. In practical terms, it means that the getter and setter
    methods are implemented using simple assignment (i.e., `self->firstName = name`).
    Use `assign` in a garbage collection environment where you want to retain the
    reference to the original object value or the object values are always immutable.
    `assign` is typically assumed if no storage attribute is specified, but there
    are some environments where you must explicitly include `assign`, `copy`, or `retain`.
    `assign` is mutually exclusive with `copy` and `retain`, and is only appropriate
    with object pointer properties. |

    | `retain` | This attribute is like `assign`, but retains the reference to the
    object in a managed memory (non-garbage collection) environment. Refer to Part
    4 for information about non-GC memory management. |

    | `getter=name` | Renames the method used as the getter method. Useful when an
    alternate form of the default getter method name is desired, such as `-isValue`,
    or `-getValue`. Use this attribute with caution; it can break the standard pattern
    of getter and setter names such that technologies like Key-Value Coding will not
    recognize the property. |

    | `setter=name` | Renames the method used for the setter method. Cannot be used
    if the `readonly` attribute is specified. The same caution that applies to `getter=`
    applies to `setter=`. |

    | `nonatomic` | Declares that the getter and setter methods are not thread-safe.
    There is no “atomic” attribute; omitting `nonatomic` implies the property is atomic.
    If omitted, the `@synthesize` may wrap the getter and setter methods with code
    that first obtains an object-specific lock in order to guarantee that accessor
    methods are well behaved in a multi-threaded environment. It also ensures that
    the object returned is fully realized in the memory space of the executing thread.
    Use `nonatomic` whenever your manually-written accessor methods do not provide
    these safeguards, or when such precautions are not wanted. The thread safety features
    add a non-trivial amount of runtime overhead to the accessor methods, which may
    have performance implications. There are exceptions for primitive scalar properties
    and `assign` object properties on certain platforms, where the processor guarantees
    atomic assignments. |


    The `copy` attribute is more appropriate with string and collection objects than
    it is in Java. In Objective-C, string and collection classes have mutable subclasses.
    So an `NSString` is not guaranteed to be immutable the way a Java `String` object
    is. Making a copy ensures that the property isn’t affected by changes to the original
    object used to set the property.


    ## Overriding Properties


    Properties are implemented by accessor methods that get and set a value in the
    receiver. Since they are implemented using methods, subclasses can override those
    methods, essentially overriding the property.


    Overriding a property’s accessor methods can be done informally or formally. To
    do it informally, simply override the appropriate accessor method. To override
    the setter method implied by `@property int tag`, just implement a new `-(void)setTag:(int)newTag`
    method in your subclass. It doesn’t even have to be declared in the subclass’s
    `@interface`.


    To formally override a property, declare a duplicate `@property` directive in
    the subclass. The `@property` directive must be identical to the one in the superclass
    with one exception: a subclass can declare a property as `readwrite` when the
    superclass’s property is `readonly`. This supports the design pattern of a mutable
    subclass of an immutable superclass. Once declared, the `@synthesize` directive
    can be used to reimplement the accessor methods for the subclass or you can implement
    them yourself.'
