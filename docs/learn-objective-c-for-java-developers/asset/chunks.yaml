    # CHAPTER 13 ■ COMMUNICATING NEAR AND FAR


    Once scheduled, the run loop will send stream event messages to your delegate,
    just as it dispatches other kinds of events. Using stream events is the most efficient,
    and the preferred, method for stream data processing. It is possible to poll the
    stream by repeatedly sending it `-hasBytesAvailable` messages in a tight loop,
    but this would most likely be a horrific waste of CPU resources.


    ## High-Level Communications


    The high-level communication frameworks are an object-oriented interface for exchanging
    messages and objects. There are two principal high-level communication facilities:


    - Distributed Notifications

    - Distributed Objects


    These frameworks use the low-level communication classes described in the previous
    section to perform the actual data exchange, shielding you from most of the unpleasant
    details. The high-level frameworks all have some form of registry or automatic
    discovery to connect the sender with the receiver. Most of the time, the client
    and remote service need only agree on a common identifier; the framework will
    take care of connecting the two.


    ### Distributed Notifications


    Distributed notifications are described in the Chapter 18, but there’s not much
    to tell. Distributed notifications are just like regular notifications, with two
    key differences:


    - Notifications are broadcast to all processes.

    - Notification content is restricted to property-list objects.


    Distributed notifications use Mach ports, which limits them to communicating with
    processes in the same bootstrap namespace. They use serialization to convert the
    data into a form suitable for inter-process exchange, so the notification’s name,
    source object, and information must all be property-list objects, as described
    in the section “Objective-C Serialization” in Chapter 12\. Listing 13-3 shows
    how to send a notification to any number of observer processes running on the
    same system.


    **Listing 13-3.** Sending a Distributed Notification


    ```objc

    NSDictionary *info = [NSDictionary dictionaryWithObjectsAndKeys:

    @"Meeting Reminder", @"Message",

    @"X-Prize Launch Stratagy", @"Description",

    [NSDate dateWithString:@"2009-04-02 10:00:00 -0700"], @"StartTime",

    @"Room 312", @"Location", nil];


    [[NSDistributedNotificationCenter defaultCenter]

    postNotificationName:@"PSEventReminder"

    object:@"com.apress.schedule"

    userInfo:info];

    ```


    Distributed notifications are extremely easy to post and subscribe to. For self-contained,
    infrequent, unidirectional, broadcast-style messages, they are by far the simplest
    inter-process communication solution.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # CHAPTER 13 ■ COMMUNICATING NEAR AND FAR


    ## Distributed Objects


    Distributed Objects (DO) is the apex of inter-object communications, and is equivalent
    to Java’s Remote Method Invocation (RMI) technology. Distributed objects is more
    flexible and easier to use than RMI, making it a convenient solution to a wide
    variety of design problems. This section will describe the basics of how distributed
    objects works, several different ways of establishing a connection to a remote
    object, how to send and receive messages, and how you can influence object exchange
    between processes.


    ### How Distributed Objects Works


    Using Remote Method Invocation in Java generally involves the following:


    1. Create an interface that defines the methods your remote object implements.

    2. Create a class that implements the interface in step 1.

    3. Execute the `rmic` utility to generate a `_Stub` class from the implementation
    class.

    4. Make all objects that are passed to, or returned from, methods in the interface
    `Serializable`.

    5. Start the `rmiregistry` process.

    6. Create an instance of the implementation class in your server process.'
