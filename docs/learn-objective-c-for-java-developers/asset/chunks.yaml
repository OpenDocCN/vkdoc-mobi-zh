    message, which (unless overridden) throws the unrecognized selector exception.
    A class can override


    -forwardInvocation: and intercept unimplemented messages.


    As the name implies, -forwardInvocation: is designed to redirect or forward a
    message to another object. The StandIn class in Listing 6-12 shows how this is
    accomplished. The object responds normally to all of the methods it implements
    or inherits. When sent a message it does not implement, it receives a -forwardInvocation:
    message. StandIn passes the message, and all of the call’s parameters, to its
    actor object. If actor doesn’t implement the message, it will either throw an
    exception or forward the invocation.


    Listin g 6-12\. Forwarding an Unimplemented Message


    @interface StandIn : NSObject {


    id actor;


    }


    @property (assign) id actor;


    @end


    @implementation StandIn


    @synthesize actor;


    - (void)forwardInvocation:(NSInvocation*)invocation


    {


    if (actor==nil)


    [self doesNotRecognizeSelector:[invocation selector]]; // does not return


    [invocation invokeWithTarget:actor];


    }


    - (NSMethodSignature*)methodSignatureForSelector:(SEL)sel


    {


    NSMethodSignature *signature = [super methodSignatureForSelector:sel]; if (signature==nil)


    signature = [actor methodSignatureForSelector:sel];


    return signature;


    }


    @end


    It’s also necessary to override -methodSignatureForSelector:. The message dispatcher
    first sends the object -methodSignatureForSelector: and uses the returned object
    to create the invocation argument passed to -forwardInvocation:.


    Through a little sleight-of-hand, any value returned by the method invoked by


    -invokeWithTarget: will be returned to the code that originally sent the message.
    For this to work, it’s important to return immediately after sending the -invoke
    message. The return value will still be in the registers or on the stack, so the
    caller gets them as if your handler had explicitly returned them.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6 ■ SENDING MESSAGES


    You can do lots of interesting things with -forwardInvocation::


    • Wrap one object in a logger object that intercepts and records the invocation
    of interesting messages.


    • Implement “synthetic” messages that are handled by other methods in your class.
    Imagine creating a generic database record object that catches any property message
    it receives (i.e.,


    -saleDate, -setSaleDate:) and automatically translates it into a record query.
    Instead of coding date = [record getDateFieldWithKey:@"SaleDate"], you could simply
    write date = [record saleDate], without ever writing a -saleDate method. NSManagedObject
    and CALayer are examples of classes that implement synthetic properties.


    • Create an object that forwards the message to a hierarchy of other objects,
    like a responder chain. Chapter 20 talks about responder chains. The proxy object
    would search a collection of other objects looking for one that implements the
    message.


    -forwardInvocation: will not work with variable argument methods because the NSInvocation
    object won’t include a copy of the extra parameters.


    Summary


    While conceptually similar to Java methods, Objective-C messages are subtly different.
    Really start thinking in terms of sending messages, rather than calling method.
    Objective-C’s lightweight method dispatching makes it easy to send methods programmatically.
    Not only can a class send messages dynamically, but it can also respond to them
    dynamically. The ease and efficiency by which messages can be manipulated is why
    dynamic messages play such a key role in so many Objective-C solutions.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 7**


    ■ ■ ■


    Making Friends with nil


    Dealing with nil (null) references is an inevitable part of programming. This
    chapter will explain how nil and NULL pointers are handled in Objective-C, and
    some of the surprising consequences. Learning to use nil object pointers to your
    advantage can substantially simplify—rather than complicate—your design.'
  trans: "\n`+stringWithFormat:` 假定附加参数与格式字符串中占位符所隐含的值类型一致。\n\n■ 注意 编译器没有关于可变参数的类型信息，因此它假定所有值都是正确/预期的类型。参数`1`将传递一个整数，`1.0`将传递一个浮点数。要消除任何疑问，请像在`[NSString\
    \ stringWithFormat:@\"float %f, int %d, char %c\", (float)34, (int)34, (char)34]`中那样强制转换参数。这将强制编译器在将参数压入堆栈之前将其转换为预期类型。\n\
    \n编写自己的可变参数方法并不困难，但确实需要一些规划。\n\n你必须设计该方法，以便已知或可以推断出附加参数的类型和数量。清单 6-11 重写了`containsAnyPoints:pointCount:`方法，以使用可变参数列表，而不是指针数组。\n\
    \n**清单 6-11\\. 可变参数实现**\n\n```\n@interface BezierPathMapper : NSObject {\n   \
    \ NSBezierPath *path;\n}\n@property (assign) NSBezierPath *path;\n- (BOOL)containsAnyOfCountPoints:(unsigned\
    \ int)count, ...;\n@end\n\n@implementation BezierPathMapper\n@synthesize path;\n\
    \n- (BOOL)containsAnyOfCountPoints:(unsigned int)count, ...\n{\n    va_list varList;\n\
    \    BOOL hit = NO;\n    NSPoint point;\n    va_start(varList, count);\n    while\
    \ (count != 0) {\n        point = va_arg(varList, NSPoint); // 复制下一个点\n      \
    \  if ([path containsPoint:point]) {\n            hit = YES;\n            break;\n\
    \        }\n        count--;\n    }\n    va_end(varList);\n    return hit;\n}\n\
    @end\n```\n\n...\n```\nif (![mapper containsAnyOfCountPoints:5,\n    NSMakePoint(0.0,\
    \ 1.0),\n    NSMakePoint(1.0, 0.0),\n    NSMakePoint(1.0, 0.0),\n    NSMakePoint(0.0,\
    \ 0.0),\n    NSMakePoint(0.5, 0.5)]) {\n    NSLog(@\"no points in path\");\n}\n\
    ```\n\n新方法直接传递一个`NSPoint`结构列表作为参数。初始的`count`参数告诉该方法期望多少个`NSPoint`参数。\n\n要在你的方法中实现可变参数，请遵循以下步骤：\n\
    \n1. 在方法声明中最后一个参数变量名后跟上“`, ...`”。\n2. 定义一个`va_list`自动变量。\n3. 使用`va_list`变量和最后一个具名参数调用`va_start()`。该参数仅用于告诉可变参数函数附加参数从哪里开始。\n\
    4. 使用`va_list`变量和下一个参数的类型调用`va_arg()`。返回的值是参数的副本。\n5. 完成后调用`va_end()`。\n\n在调用`va_end()`之前不必检索所有参数。为超出实际传递数量的参数值调用`va_arg()`是不可预测的，应避免。\n\
    \n### 未实现的方法\n\n或许比消息如何发送更有趣的是，当一个对象被发送一条它未实现的消息时会发生什么。如果你不采取任何特殊措施，结果类似于 Java；运行时将抛出一个“无法识别的选择器”异常。\n\
    \n但在抛出该异常之前，对象有机会以其他方式处理该消息。当消息分发函数发现某个对象未实现该方法时，它会将该消息转换为一个`NSInvocation`对象。然后，它将这个`NSInvocation`传递给该对象的`-forwardInvocation:`方法。\n\
    \n根类`NSObject`的`-forwardInvocation:`只是向自身发送一条`-doesNotRecognizeSelector:`消息，该消息（除非被重写）会抛出无法识别的选择器异常。一个类可以重写`-forwardInvocation:`并拦截未实现的消息。\n\
    \n顾名思义，`-forwardInvocation:`被设计用于将消息重定向或转发给另一个对象。清单 6-12 中的`StandIn`类展示了如何实现这一点。该对象对其实现或继承的所有方法都正常响应。当收到一条它未实现的消息时，它会收到一条`-forwardInvocation:`消息。`StandIn`将消息及调用的所有参数传递给它的`actor`对象。如果`actor`未实现该消息，它将要么抛出异常，要么转发该调用。\n\
    \n**清单 6-12\\. 转发一条未实现的消息**\n\n```\n@interface StandIn : NSObject {\n    id actor;\n\
    }\n@property (assign) id actor;\n@end\n\n@implementation StandIn\n@synthesize\
    \ actor;\n\n- (void)forwardInvocation:(NSInvocation*)invocation\n{\n    if (actor\
    \ == nil)\n        [self doesNotRecognizeSelector:[invocation selector]]; // 不返回\n\
    \    [invocation invokeWithTarget:actor];\n}\n\n- (NSMethodSignature*)methodSignatureForSelector:(SEL)sel\n\
    {\n    NSMethodSignature *signature = [super methodSignatureForSelector:sel];\n\
    \    if (signature == nil)\n        signature = [actor methodSignatureForSelector:sel];\n\
    \    return signature;\n}\n@end\n```\n\n同样需要重写`-methodSignatureForSelector:`。消息分发器首先向对象发送`-methodSignatureForSelector:`，并使用返回的对象创建传递给`-forwardInvocation:`的调用参数。\n\
    \n通过一点小小的手段，由`-invokeWithTarget:`调用的方法返回的任何值都将被返回给最初发送消息的代码。为了使其正常工作，重要的是在发送`-invoke`消息后立即返回。返回值仍然在寄存器或堆栈中，因此调用者会得到它们，就像你的处理程序显式返回了它们一样。\n\
    \n你可以使用`-forwardInvocation:`做很多有趣的事情：\n\n* 将一个对象包装在一个日志记录器对象中，该对象拦截并记录有趣消息的调用。\n\
    * 实现由类中其他方法处理的“合成”消息。想象创建一个通用的数据库记录对象，它捕获收到的任何属性消息（例如，`-saleDate`、`-setSaleDate:`）并自动将其转换为记录查询。无需编写`date\
    \ = [record getDateFieldWithKey:@\"SaleDate\"]`，你可以直接写`date = [record saleDate]`，而无需编写`-saleDate`方法。`NSManagedObject`和`CALayer`是实现合成属性的类示例。\n\
    * 创建一个将消息转发到其他对象层次结构（如响应者链）的对象。第 20 章讨论响应者链。代理对象会搜索一个其他对象的集合，寻找实现该消息的对象。\n\n`-forwardInvocation:`不适用于可变参数方法，因为`NSInvocation`对象不会包含额外参数的副本。\n\
    \n### 总结\n\n虽然概念上类似于 Java 方法，但 Objective-C 消息存在微妙的差异。真正开始以发送消息（而非调用方法）的方式思考。Objective-C\
    \ 轻量级的方法分发使得以编程方式发送方法变得容易。类不仅可以动态发送消息，还可以动态响应消息。消息易于操作且高效，这就是为什么动态消息在众多 Objective-C\
    \ 解决方案中扮演如此关键的角色。\n\n**第 7 章**\n\n■ ■ ■\n\n**与 nil 交朋友**\n\n处理 nil（null）引用是编程中不可避免的一部分。本章将解释在\
    \ Objective-C 中如何处理 nil 和 NULL 指针，以及一些令人惊讶的后果。学会将 nil 对象指针用于自己的优势，可以极大地简化——而非复杂化——你的设计。\n"
- fmt: "`nil (null)`和`NULL`引用在Objective-C中有时比在Java中受到更严厉的处理，但在其他时候却是允许的，甚至是受欢迎的。Java对`null`的处理非常一致；使用`null`引用通常被视为编程错误，并在运行时抛出`java.lang.NullPointerException`对象。运行时异常通常会导致Java应用程序终止，但可以被捕获，从而可能从错误中恢复。\n\
    \n在Objective-C中，使用`nil`或`NULL`引用的后果是混合的。访问地址0附近的内存（即尝试使用值为`nil`的指针时会发生的情况）会导致内存地址违规。地址违规由硬件检测到，并向进程发送`SIGBUS`信号，导致其立即终止。系统`CrashReporter`守护进程通常会捕获`SIGBUS`信号，并准备一份崩溃报告文档，详细说明进程终止前的状态。虽然应用程序在技术上可以拦截某些信号，但从`SIGBUS`信号中恢复的能力极其有限。\n\
    \n■ 注意 Objective-C常量`nil`和`NULL`在技术上是可互换的。按照惯例，`nil`（由Objective-C定义）用于对象指针，而`NULL`（传统的C常量）用于所有其他指针类型。因此，你会写成`MyClass\
    \ *object = nil`和`int *iPtr = NULL`。\n\n就像在Java中一样，你应该避免在未确保指针变量包含有效地址的情况下，使用对象指针直接访问成员变量（`int\
    \ i = object->iVar`）或通过指针访问值（`int i = *intPtr`）。清单7-1中的代码演示了避免`NULL`指针引用的一些典型编码策略。\n\
    \n**清单7-1. 避免NULL指针引用**\n\n```objective-c\n- (void)expandSize:(NSSize*)size\n\
    {\n    if (size != NULL) {\n        area.height += size->height;\n        area.width\
    \ += size->width;\n    }\n}\n\n- (BOOL)deleteAllReferencesToKey:(id)key error:(NSError**)outError\n\
    {\n    ...\n    if (!successful && outError != NULL)\n        *outError = [NSError\
    \ errorWithDomain:NSPOSIXErrorDomain\n                                       \
    \ code:errno\n                                    userInfo:nil];\n    return successful;\n\
    }\n```\n\n### 向`nil`发送消息是安全的\n\n形成鲜明对比的是，向`nil`对象指针发送消息不仅被允许，而且是被鼓励的！在第6章中，我忽略了消息调度函数中一个非常重要的步骤：4.\
    \ 如果接收者值为`nil`，则调度函数立即返回。\n\n这个条件使得向`nil`对象指针发送任何消息都非常安全。当消息接收者为`nil`时，调度函数不执行任何操作并立即返回。更重要的是，对于期望返回值的发送者，它明确返回一个值为零、`nil`或`NO`的值。\n\
    \n与典型的Java代码不同，在发送消息之前没有必要测试对象指针是否为`nil`。实际上，这是多余的，因为每次消息发送时都会执行此测试。\n\n清单7-2中的代码片段来自我们虚构的《金星攻击》冒险游戏，展示了`nil`接收者如何简化代码。`TacticalDisplay`对象在地图上绘制显示内容，但仅在存在地图对象时进行。它还会叠加一个可选的位置高亮，以青色或自定义颜色绘制。`paint()`方法中的Java代码使用了传统的条件语句来处理以下情况：没有地图对象、地图对象未提供位置高亮形状，或者位置高亮的颜色未设置。\n\
    \n**清单7-2. 使用nil对象简化代码**\n\n**Java**\n\n```java\npackage com.apress.java;\n\n\
    import java.awt.*;\nimport javax.swing.*;\n\npublic class TerrainMap\n{\n    private\
    \ Color customLocationColor;\n    private Shape locationHighlightShape;\n\n  \
    \  public void paint(Graphics graphics)\n    {\n        // ... draw the map\n\
    \    }\n\n    public Color getCustomLocationColor() { ... }\n    public Shape\
    \ getLocationHighlightShape() { ... }\n}\n\npublic class TacticalDisplay extends\
    \ JComponent\n{\n```"
  raw: 'nil (null) and NULL references are sometimes treated more harshly in Objective-C
    than they are in Java, but are at other times permitted—embraced, even. Java is
    very consistent in its treatment of null; use of a null reference is universally
    considered a programming error and throws a java.lang.NullPointerException object
    at runtime. Runtime exceptions typically terminate the Java application, but can
    be caught, potentially recovering from the misstep.


    In Objective-C, the consequences of using a nil or NULL reference are mixed. Accessing
    the memory at or near address 0—which is what happens if you attempt use a pointer
    with a nil value—


    causes a memory address violation. Address violations are detected by the hardware
    and cause a SIGBUS signal to be sent to the process, resulting in its immediate
    termination. A system CrashReporter daemon usually catches the SIGBUS signal and
    prepares a crash report document, detailing the state of the process before it
    was terminated. While it’s technically possible for an application to intercept
    some signals, the ability to recover from a SIGBUS signal is extremely limited.


    ■Note The Objective-C constants nil and NULL are technically interchangeable.
    By convention, nil (defined by Objective-C) is used with object pointers and NULL
    (the traditional C constant) is used for all other pointer types.


    Thus, you would write MyClass *object = nil and int *iPtr = NULL.


    Just as you do in Java, you should avoid direct access of member variables using
    object pointers (int i = object->iVar) or values via a pointer (int i = *intPtr)
    without first ensuring the pointer variable contains a valid address. The code
    in Listing 7-1 demonstrates some typical coding strategies for avoiding NULL pointer
    references.


    Listin g 7-1\. Avoiding a NULL Pointer Reference


    - (void)expandSize:(NSSize*)size


    {


    if (size!=NULL) {


    area.height += size->height;


    area.width += size->width;


    }


    }


    - (BOOL)deleteAllReferencesToKey:(id)key error:(NSError**)outError 103


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 7 ■ MAKING FRIENDS WITH NIL


    {


    …


    if (!successful && outError!=NULL)


    *outError = [NSError errorWithDomain:NSPOSIXErrorDomain


    code:errno


    userInfo:nil];


    return successful;


    }


    Messages to nil Are Safe


    In stark contrast, sending a message to a nil object pointer is not only allowed,
    it’s encouraged! In Chapter 6, I ignored a very important step of the message
    dispatch function: 4.


    If the receiver value is nil, the dispatching function returns immediately.


    This condition makes it perfectly safe to send any message to a nil object pointer.
    When the message receiver is nil, the dispatch function does nothing and returns
    immediately. More importantly, it explicitly returns a value of zero, nil, or
    NO for senders that are expecting a return value.


    Unlike typical Java code, it is not necessary to test an object pointer for nil
    before sending it a message. In fact, it’s redundant since the test is performed
    for every message.


    The code in Listing 7-2 is a fragment from our mythical Venus Attacks adventure
    game and shows how nil receivers can simplify code. The TacticalDisplay object
    draws a map on the display, but only if a map object is present. It also superimposes
    an optional location highlight drawn in either cyan or a custom color. The Java
    code in the paint() method uses traditional condition statements to handle the
    cases where there is no map object, or the map object doesn’t provide a location
    highlight shape, or the color of the location highlight isn’t set.


    Listin g 7-2\. Using nil Objects to Simplify Code


