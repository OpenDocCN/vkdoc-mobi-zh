  trans: '

    # `name` 和 `object` 参数可以有一个或同时为 `nil`。省略时，它们充当通配符，接受与其它条件匹配的任何通知。表 18-1 列出了观察者可以指定的
    `name` 和 `object` 值的组合。


    **表 18-1.** 观察者通知条件


    | `name`    | `object`   | 通知条件                                                       |

    |-----------|------------|----------------------------------------------------------------|

    | `@"name"` | `object`   | 接收由 `object` 发送的、名称为 `@"name"` 的通知。               |

    | `@"name"` | `nil`      | 接收来自任何 `object` 的、名称为 `@"name"` 的所有通知。         |

    | `nil`     | `object`   | 接收由 `object` 发送的所有通知。                                |

    | `nil`     | `nil`      | 接收发送到此通知中心的所有通知。                                |


    第二种形式最为常见。观察者将接收由任何对象发送的、指定名称的所有通知。观察者无需知道该对象是什么，也无需持有该对象的引用来进行注册。它只需知道通知的名称。


    以下是两个实际示例，均使用通知来管理辅助窗口。


    - 您的应用程序实现了一个持久的“检查器”面板窗口，它始终显示最前文档窗口的信息。面板窗口对象将注册以接收来自任何对象（`nil`）的 `NSWindowDidBecomeMainNotification`
    通知。每当某个文档窗口变为活动窗口时，它会收到通知并更新其显示内容。变为活动的窗口包含在通知中。


    - 您的应用程序实现了一个附加到特定窗口的“检查器”面板窗口。面板窗口对象将注册以接收来自特定文档窗口对象的 `NSWindowDidBecomeMainNotification`
    和 `NSWindowDidResignMainNotification` 通知。每当该特定窗口变为活动或非活动状态时，面板都会收到通知。面板窗口利用这些事件自动显示或隐藏自身。


    观察者可以针对多个通知名称、不同的提供者或两者的某种组合，多次注册以接收通知。如果观察者以不同方式注册了同一个通知，它可能会多次收到同一个通知。其顺序是不可预测的。


    ## 移除观察者


    观察者可以通过向通知中心发送 `-removeObserver:` 或 `-removeObserver:name:object:` 消息来取消先前的注册。`observer`
    参数是必需的，而 `name` 和 `object` 参数都是可选的，且都可以是 `nil`。通知中心会撤销所有与条件匹配的通知的订阅，如表 18-2 所列。


    **表 18-2.** 移除观察者条件


    | `name`    | `object` | 注册效果                                                              |

    |-----------|----------|------------------------------------------------------------------------|

    | `nil`     | `nil`    | 取消该观察者的所有注册。与 `-removeObserver:` 相同。                     |

    | `@"name"` | `nil`    | 取消所有名称为 `@"name"` 的通知的注册。                                   |

    | `nil`     | `object` | 取消所有由 `object` 发送的通知的注册。                                    |

    | `@"name"` | `object` | 取消由 `object` 发送的、名称为 `@"name"` 的通知的注册。                   |


    在上面的第二个面板窗口示例中，观察者已注册接收两个特定通知，且均来自同一特定提供者。消息 `[notificationCenter -removeObserver:self
    name:nil object:paletteWindow]` 会移除这两个注册，因为两者都指定了相同的提供者。但是，消息 `[notificationCenter
    -removeObserver:self name:NSWindowDidBecomeMainNotification object:nil]` 只会移除一个注册。


    在垃圾回收内存环境中，通知中心对观察者持有弱引用。一旦您的观察者被遗忘并被回收，它实际上就会从其通知中心移除。因此，在您的对象可以被回收之前，并不需要发送
    `[[NSNotificationCenter defaultCenter] removeObserver:self]`。但是，如果存在一个明显的时机，您的对象应该在此后停止接收通知，那么将其从通知中心移除是恰当且可取的。


    ## 通知队列

