    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ THREADS


    Finally, the -[NSConnection runInNewThread] convenience function does everything
    needed to start a distributed object server: it creates and starts a new thread,
    adds the NSConnection’s ports to the run loop of the new thread, and sends the
    run loop a -run message.


    Run Loop Modes


    Run loops run in modes. Run loop input sources have modes. A run loop only processes
    the events from the input sources consistent with its current mode. Normally you
    don’t need to know anything about run loop modes, other than that they exist.
    The basic run loop modes are listed in Table 15-3.


    ***Table 15-3.** Run Loop Modes*


    Mo de


    Des cr ipti on


    NSDefaultRunLoopMode


    This is the default mode, and the mode used by any run loop method that doesn’t
    accept a mode parameter.


    NSModalPanelRunLoopMode


    Processes only events relevant to a modal dialog.


    NSEventTrackingRunLoopMode


    Processes only events relevant to active mouse tracking.


    NSConnectionReplyMode


    Processes only distributed object reply events.


    Run loop modes are used to defer those events that aren’t appropriate to the circumstances.


    The top-level run loop invariably runs in the NSDefaultRunLoopMode mode, processing
    all events. If the user interface causes a modal dialog to be displayed, the AppKit
    framework will start a nested run loop running in NSModalPanelRunLoopMode. This
    ignores all events that don’t pertain to the modal dialog, essentially freezing
    the rest of the application. Similarly, when a mouse click/drag begins its progress
    it is tracked using NSEventTrackingRunLoopMode. The NSConnectionReplyMode is used
    when you’ve sent a message to a distant object. The distant object starts a nested
    run loop, ignoring all queued events save the reply from the remote object.


    Stopping a Run Loop


    Stopping a run loop is actually a little problematic. Earlier, I stated that run
    loops run as long as they have input sources. That’s correct, except that all
    manner of obscure features will add custom input sources to your run loop. Many
    of those sources persist for very long periods, if not forever, keeping the run
    loop alive indefinitely. The most direct solution is to design your thread so
    the run loop does not need to be stopped. Let the thread sit idle when not doing
    anything useful, and disappear when the application terminates. For distributed
    objects, close the NSConnection object when you want to stop sharing your root
    distributed object. You can always reregister the connection or set a new root
    object to resurrect the service.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ THREADS


    If you must stop a run loop, there are three basic techniques:


    • Use code like that in Listing 15-4 to periodically check to see if the run loop
    should stop. The problem is that the loop will only execute once per event or
    after the time out. You don’t want to make the time out short—this constitutes
    polling—because it wastes resources.


    • Call the Core Foundation function CFRunLoopStop(), passing it the CFRunLoopRef
    value obtained via -[NSRunLoop getCFRunLoop].


    • Create a custom run loop input source and combine it with the technique in Listing
    15-4\. Your custom input source’s event handler can set a flag indicating that
    the run loop should stop, which will immediately cause -runUntilDate: to return,
    where your outer loop can exit.


    Customizing Run Loops


    The NSRunLoop class is a simplistic wrapper around the Core Foundation run loop
    functions and types.


    If you want to get involved with run loops at a deeper level, possibly developing
    your own input sources, read the “Run Loop Management” section of the Threading
    Programming Guide.1


    Thread Notifications


    NSThread sends two notifications, listed in Table 15-4\. See Chapter 18 for more
    about notifications.


    ***Table 15-4.** Thread Notifications*


    Notific atio n


    Des cr ipti on


    NSThreadWillExitNotification


    Sent after a thread’s code has returned, but before the


    thread is destroyed. This notification is sent to all observers on the thread
    about to be destroyed.


    NSWillBecomeMultiThreadedNotification


    Sent to all observers before the first new (non-main) thread in the process is
    created. The notification is sent on the main thread, and is only sent once.


    Back in Chapter 7, I presented a FIFO class that could optionally operate in a
    thread-safe environment. Let’s modify that class a little—making it truly automatic—by
    rewriting its -init method and adding a notification observer, as shown in Listing
    15-5.


    1 Apple, Inc., Threading Programming Guide, http://developer.apple.com/documentation/Cocoa/Conceptual/


    Multithreading/, 2008.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ THREADS


    Listin g 15-5\. Additions to an Automatic Thread-Safe FIFO Class


    @implementation AutoSafeFIFO


    - (id) init


    {


    self = [super init];


    if (self != nil) {


    stack = [NSMutableArray new];


    if ([NSThread isMultiThreaded]) {


    [self makeThreadSafe];


    } else {


    NSNotificationCenter *center = [NSNotificationCenter defaultCenter];


    [center addObserver:self


    selector:@selector(willBecomeMultiThreadedNotification)


    name:NSWillBecomeMultiThreadedNotification


    object:nil];


    }


    }


    return self;


    }


    - (void)willBecomeMultiThreadedNotification:(NSNotification*)notification


    {


    [self makeThreadSafe];


    }


    …


    @end


    The object’s constructor determines if the application is already running with
    multiple threads.


    If it is, it makes itself thread safe. If not, it subscribes to NSWillBecomeMultiThreadedNotification.
    If a second thread is created any time after the FIFO is created, the FIFO object
    automatically switches to thread-safe mode.


    Thread Synchronization


    Concurrent access to objects from two or more independent threads presents a consistent
    set of problems across almost all programming languages. Java and Objective-C
    both provide language support in the form of a @synchronized (synchronized) directive.
    Any block of code marked as


    @synchronized is protected against being executed by more than one thread at a
    time.


    This section will review the synchronization support in Objective-C. In addition
    to the


    @synchronized directive, the Cocoa frameworks provide several utility classes
    that implement different kinds of mutual exclusion semaphores, a set of classes
    for organizing concurrent tasks, and timers.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ THREADS


    The @synchronize Directive


    Objective-C’s @synchronized directive is almost identical to Java’s synchronized
    keyword, with only one minor exception: @synchronized can’t be used as a method
    modifier. To accomplish the equivalent, use


    @synchronized(self) as the outermost block of your method, as shown in Listing
    15-6.


    Listin g 15-6\. Synchronized Method


    **Java**


    public class Timing


    {


    public synchronized void safe( )


    {


    // thread safe code


    }


    }


    **Objective-C**


    @interface Timing : NSObject


    - (void)safe;


    @end


    @implementation Timing


    - (void)safe


    {


    @synchronized(self) {


    // thread safe code


    }


    }


    @end


    Beyond that minor limitation, you can use @synchronized exactly as you would use
    synchronized in Java.


