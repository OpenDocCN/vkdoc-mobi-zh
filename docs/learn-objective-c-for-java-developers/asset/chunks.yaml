    # 格式化字符与数字转换


    要将`char`格式化为无符号数值，请使用说明符`%hhu`。要将 64 位`long long`整数格式化为十六进制，请使用说明符`%llx`或`%qx`。如果不确定参数类型是否与说明符匹配，请使用类型转换强制转换，如`[NSString
    stringWithFormat:@"%hi",(short int)i]`。


    在 32 位 CPU 架构中，`long int`类型是 32 位的，因此`int`和`long int`含义相同。尽管如此，在传递`long int`参数时，匹配正确的长度修饰符（`%ld`）是良好的编程实践，即使更简单的形式（`%d`）也兼容。


    Objective-C 字符串格式化不提供布尔值、日期或时间的格式说明符。`-[NSDate description]`方法使用类似 ISO 的国际格式返回日期和时间。如果这足够，可以使用`%@`格式化日期对象。对于更复杂的日期格式化，请使用`NSDateFormatter`，其结果可以通过`%@`插入到格式字符串中。格式化布尔值时，我通常使用三元条件表达式，如`[NSString
    stringWithFormat:@"%@",(t?@"YES":@"NO")]`。


    这绝不是对格式化字符串的全面探讨。Cocoa 框架实现了 IEEE `printf`规范，并附带一些额外的 Objective-C 特定扩展。该 IEEE
    标准广泛且包含许多晦涩的选项、功能和说明符。“Format Specifiers”部分的“String Programming Guide for Cocoa”[¹]，由
    Apple 发布，以及“Standard 1003.1”[²]，由 IEEE 和 The Open Group 发布，包含完整描述。


    # NSFormatter


    `NSFormatter`类是用于将值对象转换为字符串及反向转换的对象的抽象基类。不要将其与`java.util.Formatter`类混淆。Java 的`Formatter`是上一节描述的格式化逻辑的实现位置。Cocoa
    的`NSFormatter`类定义了创建格式化器对象的抽象接口。`NSFormatter`对象执行用户所见所输入的内容与（可能的）复杂值（如货币、日历日期和时钟时间）之间的转换。


    `NSFormatter`对象旨在封装诸如规范化、本地化和用户显示偏好等功能——这些转换对于简单的格式说明符来说过于复杂。它们可以单独使用，也可以附加到某些视图对象上，在视图中自动调用以在数据模型和视图之间进行转换。


    Cocoa 框架提供了两个具体实现：`NSNumberFormatter`和`NSDateFormatter`。如果有需要，您可以子类化`NSFormatter`并创建自己的格式化器。


    多年来，某些`NSFormatter`类发生了重大变化。为了向后兼容，除非另行配置，这些类可能表现出旧版行为。请根据您的编程环境检查`NSFormatter`行为。为获得最佳体验，请在可用时使用现代行为。如果这不是默认行为，清单
    8-7 显示了如何在开始使用它们之前设置现代行为。


    **清单 8-7. 设置现代格式化行为**


    ```objc

    // 在创建任何日期或数字格式化器对象之前发送这两条消息。

    // 在应用程序初始化中执行此操作是一个好地方。

    // 这将为所有新的日期和数字格式化器对象设置行为模式。


    [NSDateFormatter setDefaultFormatterBehavior:NSDateFormatterBehavior10_4];

    [NSNumberFormatter setDefaultFormatterBehavior:NSNumberFormatterBehavior10_4];


    // 或者，您可以在创建每个日期和数字格式化器后单独设置其行为。


    NSDateFormatter *dateFormatter = [NSDateFormatter new];

    [dateFormatter setFormatterBehavior:NSDateFormatterBehavior10_4];

    NSNumberFormatter *numberFormatter = [NSNumberFormatter new];

    [numberFormatter setFormatterBehavior:NSNumberFormatterBehavior10_4];

    ```


    格式化器使用所需的格式化选项进行配置，然后重复用于转换值。`-(NSString*)stringForObjectValue:(id)value`方法使用当前配置的格式将对象值转换为字符串。`-(BOOL)getObjectValue:(id*)object
    forString:(NSString*)string errorDescription:(NSString**)error`执行反向转换，为给定字符串返回一个值。如果转换成功，它返回`YES`。如果不成功，它返回`NO`并创建一个描述问题的错误对象。


    [¹]: Apple, Inc., “String Programming Guide for Cocoa,” http://developer.apple.com/documentation/Cocoa/Conceptual/Strings/index.html,
    2008.

    [²]: The IEEE and The Open Group, “The Open Group Base Specification Issue 6,
    IEEE Std 1003.1,” http://www.opengroup.org/onlinepubs/009695399/functions/printf.html,
    2004.


    ## NSNumberFormatter


    `NSNumberFormatter`格式化十进制数字。它实现了两个便捷方法：`-stringFromNumber:`和`-numberFromString:`。配置格式化器的最简单方法是使用`-setNumberStyle:`的预定义格式化样式之一。样式会考虑用户的语言、用户区域设置的文化惯例以及他们的全局显示偏好。表
    8-9 列出了部分预定义的数字格式样式。


    **表 8-9. 预定义数字格式样式**


    | 样式 | 用于 |

    | --- | --- |

    | `NSNumberFormatterDecimalStyle` | 十进制数 |

    | `NSNumberFormatterCurrencyStyle` | 本地货币 |

    | `NSNumberFormatterPercentStyle` | 百分比 |

    | `NSNumberFormatterScientificStyle` | 科学计数法 |

    | `NSNumberFormatterSpellOutStyle` | 自然语言（例如“二十二”） |


    如果预定义样式之一不够用，您可以使用数字格式模式配置格式化器。数字格式字符串使用 Unicode 数字格式模式标准（Unicode 技术标准#35[³]），不应与`-stringWithFormat:`及类似方法使用的格式说明符混淆。数字格式模式形成一个模板，描述显示多少有效数字、使用什么标点符号，并且可能包含零值和负值的备用模板。表
    8-10 显示了一些示例数字格式模式以及为美国英语用户格式化数字时的结果字符串。表 8-11 显示了西班牙用户的相同结果。


    **表 8-10. 英语（美国）中的示例数字格式模式**


    | 数字格式 | 123 | 4.5 | 6 | -0.98765 |

    | --- | --- | --- | --- | --- |

    | `#,##0.5` | 7.0 | | | |

    | `1,234.6` | | | | |

    | `0.0` | -1.0 | | | |

    | `#,##0.###;zero;#,##0.###-` | 7 | | | |

    | `1,234.56` | | | | |

    | `zero` | | | | |

    | `0.988-` | | | | |

    | `000000.0000` | `000007.0000` | | | |

    | `001234.5601` | | | | |

    | `000000.0000` | | | | |

    | `-000000.9876` | | | | |

    | `00.0%` | `700.0%` | | | |

    | `123456.0%` | | | | |

    | `00.0%` | | | | |

    | `-98.8%` | | | | |


    **表 8-11. 西班牙语（西班牙）中的示例数字格式模式**


    | 数字格式 | 123 | 4.5 | 6 | -0.98765 |

    | --- | --- | --- | --- | --- |

    | `#,##0.5` | 7,0 | | | |

    | `1.234,6` | | | | |

    | `0,0` | -1,0 | | | |

    | `#,##0.###;zero;#,##0.###-` | 7 | | | |

    | `1.234,56` | | | | |

    | `zero` | | | | |

    | `0,988-` | | | | |

    | `000000.0000` | `000007,0000` | | | |

    | `001234,5601` | | | | |

    | `000000,0000` | | | | |

    | `-000000,9876` | | | | |

    | `00.0%` | `700,0%` | | | |

    | `123456,0%` | | | | |

    | `00,0%` | | | | |

    | `-98,8%` | | | | |


    最后，您可以通过直接单独设置`NSNumberFormatter`的近四十个属性中的任意一个来对格式化进行极其精细的控制。


    数字格式样式会自动本地化结果。格式字符串会为您本地化某些元素，例如小数点分隔符，但并非全部。单独设置各种`NSNumberFormatter`属性可赋予您最终控制权，但会忽略用户设置的本地化和显示偏好。


