- fmt: '## 排版后


    `NSNotificationQueue`对象管理一个尚未投递的通知队列。`NSNotificationQueue`对象（或简称通知队列）允许你将同步的通知中心转变为异步的通知服务。通知被投递到通知队列中，该队列将在未来的某个时间将它们传递给其通知中心进行分发。


    每个通知队列都附属于一个现有的通知中心。它不会改变通知中心的行为。通知队列将通知放入缓冲区，然后使用当前的运行循环（run loop）稍后将其出队并投递到其通知中心。每个线程都有一个默认的通知队列，你也可以根据需要创建额外的队列。你可以创建多个共享同一个通知中心的队列；请记住，从通知中心的角度来看，队列只是另一个通知来源。


    通知队列具有几个有用的特性：


    - 队列中的通知可以以不同程度的紧急程度进行投递。

    - 相似的通知可以被合并（coalesced），以便在生成多个通知但尚未投递时，观察者只收到一个通知。

    - 可以将未投递的通知从队列中移除。


    以下章节描述了从队列中排队、合并和移除通知的过程。


    ■ 注意事项 通知队列需要正在运行的运行循环才能正常工作。如果你的线程未使用运行循环，则无法使用该线程的通知队列。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **第18章 ■ 提供者/订阅者模式**


    ### 排队一个通知


    排队一个通知与直接将通知投递到通知中心并没有太大区别。首先，你必须为队列提供一个`NSNotification`对象——没有便捷方法可以为你创建一个。其次，你必须指定其紧急程度，称为其投递样式（posting
    style），并且可选地指定它应如何与队列中已有的相似通知进行合并。合并将在下一节中描述。


    要将*清单18-1*中的`Thermometer`类改为使用通知队列而不是通知中心，请将`-setTemperature:`方法替换为*清单18-3*中的代码。


    **清单18-3. 排队的温度通知**


    ```

    - (void)setTemperature:(float)newTemp


    {


    if (temperature!=newTemp) {


    temperature = newTemp;


    NSNumber *tempValue = [NSNumber numberWithFloat:temperature]; NSDictionary *info
    = [NSDictionary dictionaryWithObject:tempValue forKey:@"Temperature"];


    NSNotification *n = [NSNotification notificationWithName:TempDidChange object:self


    userInfo:info];


    [[NSNotificationQueue defaultQueue] enqueueNotification:n


    postingStyle:NSPostASAP];


    }


    }

    ```


    一个通知对象被创建并放入队列中。它将在下一次机会时被运行循环从队列中取出，并投递到默认的通知中心。有三种可能的投递样式，列于*表18-3*中。


    **表18-3. 通知队列投递样式**


    | 样式 | 描述 |

    |------|------|

    | `NSPostASAP` | 通知将在下一次机会时由运行循环投递，与其他常规运行循环事件一起处理。这是典型的投递样式。 |

    | `NSPostWhenIdle` | 通知将留在队列中，直到运行循环空闲。也就是说，运行循环没有其他等待立即分发的事件。 |

    | `NSPostNow` | 同步投递通知。这与直接将通知投递到通知中心相同，不同之处在于队列可能首先执行通知合并。 |


    现在，`Thermometer`类将通知排队，以便在未来的某个时间点异步投递。在异步设计中，提供者更需要在通知的`userInfo`字典中包含相关信息（例如当前温度值），这一点甚至更为重要。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **第18章 ■ 提供者/订阅者模式**'
  raw: 'An NSNotificationQueue object manages a queue of yet-to-be delivered notifications.
    An NSNotificationQueue object, or just a notification queue, allows you to turn
    a synchronous notification center into an asynchronous notification service. Notifications
    are posted to a notification queue that will, at some future time, pass them on
    to its notification center for delivery.


    Each notification queue is attached to an existing notification center. It does
    not change the behavior of the notification center. A notification queue places
    notifications in a buffer, then uses the current run loop to later dequeue and
    post them to its notification center. There is a default notification queue for
    each thread, and you can create additional ones if you like. You can create multiple
    queues that share a single notification center; remember that from the perspective
    of a notification center, a queue is just another source of notifications.


    Notification queues have several useful features:


    • Notifications in a queue can be delivered with varying degrees of urgency.


    • Similar notifications can be coalesced, so that observers only receive a single
    notification if several were generated before they could be delivered.


    • Undelivered notifications can be removed from the queue.


    The process of queuing, coalescing, and removing notifications from a queue is
    described in the following sections.


    ■Caution Notification queues require a running run loop to function. If your thread
    isn’t using a run loop, you can’t use that thread’s notification queue.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18 ■ PROVIDER/SUBSCRIBER PATTERN


    Queuing a Notification


    Queuing a notification isn’t that much different than posting a notification directly
    to a notification center. First, you must provide the queue with an NSNotification
    object—there are no convenience methods that create one for you. Second, you must
    specify its urgency, called its posting style, and optionally how it should be
    coalesced with similar notifications already in the queue. Coalescing is described
    in the next section.


    To change the Thermometer class in Listing 18-1 to use a notification queue instead
    of a notification center, replace the -setTemperature: method with the code in
    Listing 18-3.


    Listin g 18-3\. Queued Temperature Notifications


    - (void)setTemperature:(float)newTemp


    {


    if (temperature!=newTemp) {


    temperature = newTemp;


    NSNumber *tempValue = [NSNumber numberWithFloat:temperature]; NSDictionary *info
    = [NSDictionary dictionaryWithObject:tempValue forKey:@"Temperature"];


    NSNotification *n = [NSNotification notificationWithName:TempDidChange object:self


    userInfo:info];


    [[NSNotificationQueue defaultQueue] enqueueNotification:n


    postingStyle:NSPostASAP];


    }


    }


    A notification object is created and placed in the queue. It will be pulled off
    the queue by the run loop at the next opportunity and posted to the default notification
    center. There are three possible posting styles, listed in Table 18-3.


    ***Table 18-3.** Notification Queue Posting Styles*


    Style


    Des cr ipti on


    NSPostASAP


    The notification will be delivered by the run loop at its next opportunity, along
    with other regular run loop events. This is the typical posting style.


    NSPostWhenIdle


    The notification will be left in the queue until the run loop is idle. That is,
    the run loop has no other events waiting to be dispatched immediately.


    NSPostNow


    Delivers the notification synchronously. This is identical to posting the notification
    directly to the notification center, except that the queue may perform notification
    coalescing first.


    The Thermometer class now queues the notification to be delivered asynchronously
    at some point in the future. In an asynchronous design, it is even more important
    that the provider include 333


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18 ■ PROVIDER/SUBSCRIBER PATTERN


    relevant information—like the current temperature value—in the userInfo dictionary
    of the notification.'
