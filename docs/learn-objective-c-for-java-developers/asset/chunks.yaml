    \n## 第 17 章 — 委托模式\n\n这种方法的唯一缺点出现在你之后继承 `AutomaticPerimeterDefenseGun` 并希望定义额外的委托方法时。`delegate`\
    \ 属性已被定义为 `id<Targeting>`，而子类无法更改继承属性的类型。子类可选的方案不多，只能记录它们使用的额外委托方法，并将其作为非正式协议。\n\
    \n## 结合委托模式\n\n委托模式简化了许多棘手的继承和领域设计问题。在应用程序中融入委托模式时，请考虑以下原则：\n\n- 当对象的行为应允许定制，且实现该定制所需的知识或性质超出了该类的领域时，应使用委托模式。在\
    \ `AutomaticPerimeterDefenseGun` 示例中，该类封装了一种射击目标的武器，但判断哪些目标是友军则超出了它的领域。\n\n- 当在基类中实现多个子类时，委托模式特别有效。每个子类都可以一致地使用委托，而不会增加子类的数量或组织的复杂性。\n\
    \n- 当委托对象不存在时（`delegate == nil`），对象应具有明确定义的行为。在 `-defendPerimeter` 方法中，无条件地向委托发送\
    \ `-gun:shouldShootAt:` 消息。如果委托为 `nil`，则消息返回 `nil`，枪械将不射击任何目标——这恰是在没有目标识别信息时的理想特征。请参见第\
    \ 7 章中的“缺失行为”和“与空值保持一致”的设计模式。\n\n- 类似地，当可选的委托方法缺失时，对象应提供一些自然的基准功能。清单 17-2 中的 `-acquireTargets`\
    \ 方法会测试委托是否响应 `-gun:prioritizeTargets:`。如果响应，则将已知的目标列表传递给委托，由它进行优先级排序、过滤或提供自己的目标列表。如果委托未实现该方法，枪械则使用从其传感器获取的目标。请注意，这也符合前述原则，因为如果委托为\
    \ `nil`，`-respondsToSelector:` 将返回 `NO`。\n\n- 对象应始终在委托消息中提供上下文。清单 17-2 中的委托方法均包含了正在发送消息给接收者的\
    \ `Gun` 对象。这允许委托将发送者纳入其决策过程，例如在弹药过低时通知枪械停止开火。请记住，单个委托对象可能被设置为两个甚至一百个不同对象的委托。有些委托充当可重用的特征，例如清单\
    \ 17-1 中的验证例程，它可以被任意一组相似对象共享。\n\n## 总结\n\n委托模式在 Objective-C 中无处不在。它简化了类的结构，并为你提供了广泛的定制空间。Objective-C\
    \ 程序员和 Cocoa 框架都热情地拥抱这一模式，建议你也这样做。委托模式同样适用于 Java 开发，但 Java 接口的形式化特性以及缺乏简单的“方法是否已实现”的测试，使得它的使用更加繁琐。\n\
    \n- [`www.it-ebooks.info`](http://www.it-ebooks.info/)\n\n# 第 18 章 — 提供者/订阅者模式\n\
    \n提供者/订阅者模式定义了一种从提供者对象到任意数量订阅者对象的一对多、单向信息流。其概念是提供者拥有有用的信息或事件，需要传递给其他对象（即它的订阅者），这些订阅者将利用这些信息来执行额外的操作或与提供者保持同步。用\
    \ Java 的术语来说，提供者向其监听器触发通知。用 Objective-C 的术语来说，提供者向其观察者发布通知。\n\n提供者/订阅者模式在 Java\
    \ 中被大量使用，但 Java 没有提供任何内在的服务来帮助对象管理其订阅者或协调消息。因此，大多数 Java 对象实现了自己的订阅者管理。这并非特别困难，但它确实带来一个重要的限制：提供者和订阅者必须持有彼此的引用。Objective-C\
    \ 通过提供系统范围的服务来管理提供者的订阅者并向他们传递通知，从而大力提倡提供者/订阅者模式。通过提供中间管理层，提供者和观察者（订阅者）可能彼此完全了解，也可能几乎一无所知。\n"
- fmt: "The chapter begins by showing how a typical Java listener interface is duplicated\
    \ using Cocoa’s notification services. It will then describe other possible provider/subscriber\
    \ relationships and how you can use them in your design. Finally, distributed\
    \ notifications—notifications that travel between processes—are described along\
    \ with thread safety and other considerations. You’ll also want to read about\
    \ the observer pattern in the next chapter, as the two patterns are very similar.\n\
    \n## Notifications\n\nIn Objective-C, a notification sent to an observer is encapsulated\
    \ in an `NSNotification` instance. The provider determines the contents of the\
    \ `NSNotification` object. The receiver determines the Objective-C message that\
    \ it will receive.\n\nListings 18-1 and 18-2 contrast the differences between\
    \ a Java listener and an Objective-C observer. Listing 18-1 defines a `Thermometer`\
    \ class that monitors a temperature. Whenever the temperature changes, it notifies\
    \ its observers.\n\n### Listing 18-1. Thermometer, Temperature Provider\n\n**Java**\n\
    \n```java\npublic interface TemperatureListener\n{\n    public void temperatureChanged(\
    \ Thermometer thermometer, float temperature );\n}\n```\n\n```java\npublic class\
    \ Thermometer\n{\n    private float temperature;\n    private HashSet<TemperatureListener>\
    \ listeners =\n        new HashSet<TemperatureListener>();\n\n    public float\
    \ getTemperature( )\n    {\n        return temperature;\n    }\n\n    public void\
    \ setTemperature( float newTemp )\n    {\n        if (temperature!=newTemp) {\n\
    \            temperature = newTemp;\n            fireTemperatureChange();\n  \
    \      }\n    }\n\n    public void addListener( TemperatureListener listener )\n\
    \    {\n        listeners.add(listener);\n    }\n\n    public void removeListener(\
    \ TemperatureListener listener )\n    {\n        listeners.remove(listener);\n\
    \    }\n\n    public void fireTemperatureChange( )\n    {\n        for ( TemperatureListener\
    \ listener : listeners ) {\n            listener.temperatureChanged(this,temperature);\n\
    \        }\n    }\n}\n```\n\n**Objective-C**\n\n```objc\n#define TempDidChange\
    \ @\"TemperatureDidChange\"\n\n@interface Thermometer : NSObject {\n    float\
    \ temperature;\n}\n@property float temperature;\n@end\n\n@implementation Thermometer\n\
    \n- (float)temperature\n{\n    return temperature;\n}\n\n- (void)setTemperature:(float)newTemp\n\
    {\n    if (temperature!=newTemp) {\n        temperature = newTemp;\n        NSNumber\
    \ *tempValue = [NSNumber numberWithFloat:temperature];\n        NSDictionary *info\
    \ = [NSDictionary dictionaryWithObject:tempValue forKey:@\"Temperature\"];\n \
    \       [[NSNotificationCenter defaultCenter] postNotificationName:TempDidChange\
    \ object:self\n                                                          userInfo:info];\n\
    \    }\n}\n\n@end\n```\n\nListing 18-2 shows a temperature observer that receives\
    \ temperature change notifications from a `Thermometer` object. It is initialized\
    \ with the `Thermometer` object it will observe, and logs any changes to the temperature\
    \ value.\n\n### Listing 18-2. TemperatureMonitor, Temperature Observer\n\n**Java**\n\
    \n```java\npublic class TemperatureMonitor implements TemperatureListener\n{\n\
    \    public TemperatureMonitor( Thermometer thermometer )\n    {\n        thermometer.addListener(this);\n\
    \    }\n\n    public void temperatureChanged( Thermometer thermometer, float temperature\
    \ )\n    {\n        System.out.println(\"Temperature is now \"+temperature);\n\
    \    }\n}\n```\n\n**Objective-C**\n\n```objc\n#import \"Thermometer.h\"\n\n@interface\
    \ TemperatureMonitor : NSObject\n- (id)initWithThermometer:(Thermometer*)thermometer;\n\
    - (void)tempChanged:(NSNotification*)notification;\n@end\n\n@implementation TemperatureMonitor\n\
    \n- (id)initWithThermometer:(Thermometer*)thermometer\n{\n    self = [super init];\n\
    \    if (self != nil) {\n        [[NSNotificationCenter defaultCenter] addObserver:self\n\
    \                                                 selector:@selector(tempChanged:)\n\
    \                                                     name:TempDidChange\n   \
    \                                                object:thermometer];\n    }\n\
    \    return self;\n}\n\n- (void)tempChanged:(NSNotification*)notification\n{\n\
    \    id tempValue = [[notification userInfo] objectForKey:@\"Temperature\"];\n\
    \    NSLog(@\"Temperature is now %@\",tempValue);\n}\n\n@end\n```\n\nThe Java\
    \ and Objective-C solutions in Listings 18-1 and 18-2 are functionally equivalent.\
    \ Specifically:\n\n- The `Thermometer` class defines the notifications it will\
    \ send.\n- The `Thermometer` class notifies its observers whenever the temperature\
    \ changes."
