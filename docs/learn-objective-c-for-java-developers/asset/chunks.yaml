    The application now has an interface and runs, but it does nothing useful. All
    of the views and data model object work together, but since nothing happens when
    you type in the input field, the experience is underwhelming. The application
    needs business logic.


    Getting Down to Business


    The application will read in and construct a dictionary of about 200,000 common
    words. Whenever letters are typed in, it will search for the words that can be
    spelled using those letters. There are numerous ways of solving this kind of problem,
    but this application opts for the simple approach: a brute force search of all
    200,000 words. This could be time consuming, so the search shouldn’t occur on
    the main UI thread of the application. Otherwise, the application will appear
    to freeze whenever a new letter is typed.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 4 ■ CREATING AN XCODE PROJECT


    The solution is to perform the search on a background thread. The search thread
    will send messages to the main thread whenever it finds a word. This could be
    accomplished with threads and semaphores, but it’s easier to let NSOperationQueue
    do the heavy lifting for us.


    Back in the Xcode project, select the Classes group and add a new Objective-C
    class file named WordFinder.m, along with its companion WordFinder.h header file.
    Make the WordFinder a subclass of NSOperation, as shown in Listing 4-2.


    ***Listing 4-2.** WordFinder Interface*


    @class ScrapWordsController;


    @interface WordFinder : NSOperation {


    ScrapWordsController *controller; // reference to controller NSArray *letterSet;
    // set of letters to search


    }


    + (NSArray*)words;


    - (id)initWithLetters:(NSString*)letters


    controller:(ScrapWordsController*)windowController;


    - (void)main;


    @end


    When the user types in some letters, the view object will update the data model
    by sending a setLetters: message to the controller. The implementation of setLetters:,
    shown in Listing 4-3, creates a new WordFinder operation and queues it up to execute.
    When the WordFinder thread runs, it sends removeWords and foundWord: messages
    back to the ScrapWordsController on the main thread.


    All the main application thread has to do is start the operation, then sit idly
    and wait for the results to come pouring in. The application’s interface never
    blocks and is never unresponsive. The removeWords and foundWords: methods must
    modify the data model through the array controller object. The array controller
    is responsible for keeping the data model, the view, and itself in synchronization.


    ***Listing 4-3.** ScrapWordsController Implementation*


    @implementation ScrapWordsController


    @synthesize wordsController;


    - (id) init


    {


    self = [super init];


    if (self != nil) {


    words = [NSMutableArray new];


    finderQueue = [NSOperationQueue new];


    }


    return self;


    }


