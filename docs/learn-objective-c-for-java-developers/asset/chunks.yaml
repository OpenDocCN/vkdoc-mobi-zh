  trans: "\n可变集合对象可以通过初始容量进行初始化，这有助于优化其性能。在创建大型集合时，准确的初始容量最为有用。\n\n### `NSCountedSet`\n\
    \n`NSCountedSet` 是 `NSMutableSet` 的子类，允许将单个对象多次添加到集合中。本质上，它将添加到集合中的每个对象视为一个独特但不可区分的实体。\n\
    \n在内部，该集合维护对对象的单个引用以及该对象被添加到集合中的次数计数。要移除一个对象，集合必须为之前收到的每个 `-addObject:` 消息接收一次\
    \ `-removeObject:` 消息。`-countForObject:` 方法将返回该对象收到的 `-addObject:` 消息数量减去 `-removeObject:`\
    \ 消息数量所得的值。\n\n### `NSIndexSet`\n\n`NSIndexSet` 是一个特殊的集合类，用于维护一组整数值，与 `java.util.BitSet`\
    \ 非常相似。\n\n表 16-11 和 16-12 列出了 Java 和 Objective-C 中的常用方法。\n\n**表 16-11.** 常用索引集合方法\n\
    \n| `java.util.BitSet` | `NSIndexSet` |\n| --- | --- |\n| `cardinality()` | `count`\
    \ |\n| | `countOfIndexesInRange:` |\n| `get(int)` | `containsIndex:` |\n| | `containsIndexes:`\
    \ |\n| | `containsIndexesInRange:` |\n| `intersects(BitSet)` | `intersectsIndexesInRange:`\
    \ |\n| | `firstIndex` |\n| `length()` | `lastIndex` |\n| | `indexLessThanIndex:`\
    \ |\n| | `indexLessThanOrEqualToIndex:` |\n| `nextBitSet(int)` | `indexGreaterThanOrEqualToIndex:`\
    \ |\n| | `indexGreaterThanIndex:` |\n| `get(int,int)` | `getIndexes:maxCount:inIndexRange:`\
    \ |\n\n**表 16-12.** 常用可变索引集合方法\n\n| `java.util.BitSet` | `NSMutableIndexSet` |\n\
    | --- | --- |\n| `set(int)` | `addIndex:` |\n| `or(BitSet)` | `addIndexes:` |\n\
    | `set(int,int,true)` | `addIndexesInRange:` |\n| `clear(int)` | `removeIndex:`\
    \ |\n| `andNot(BitSet)` | `removeIndexes:` |\n| `clear()` | `removeAllIndexes`\
    \ |\n| `clear(int,int)` | `removeIndexesInRange:` |\n| | `shiftIndexesStartingAtIndex:by:`\
    \ |\n\n`NSIndexSet` 和 `java.util.BitSet` 的共同功能比其他大多数集合类要少。Java 类有多个用于翻转位和执行布尔运算的方法，而\
    \ Objective-C 类则缺少这些方法。\n\n`NSIndexSet` 的主要用途是高效地封装有序集合的任意子集。`NSArray` 类和用户界面显示类广泛使用它。例如，表格视图将用户的当前选择作为一个\
    \ `NSIndexSet` 返回，以标识所选择的行。该接口有许多方法，例如 `-indexLessThanIndex:`，使得可以轻松地沿任意方向遍历集合。\n\
    \n### `NSHashTable`\n\n`NSHashTable` 是 `NSMapTable` 的姊妹类。与 `NSMapTable` 类似，它使用一组定义其行为的委托函数构建。同样与\
    \ `NSMapTable` 类似，它只接受有限数量的函数指针选项，这些选项列在表 16-13 中。有关这些函数指针选项的说明，请参阅 `NSMapTable`\
    \ 和 `NSPointerArray` 部分。\n\n**表 16-13.** `NSMapTable` 选项\n\n| `NSHashTable` 同义词\
    \ | `NSPointerArray` |\n| --- | --- |\n| `NSHashTableStrongMemory` | `NSPointerFunctionsStrongMemory`\
    \ |\n| `NSHashTableZeroingWeakMemory` | `NSPointerFunctionsZeroingWeakMemory`\
    \ |\n| `NSHashTableCopyIn` | `NSPointerFunctionsCopyIn` |\n| `NSHashTableObjectPointerPersonality`\
    \ | `NSPointerFunctionsObjectPointerPersonality` |\n\n`NSHashTable` 和 `NSMapTable`\
    \ 之间唯一显著的区别是 `NSHashTable` 是一个集合，只需要一组函数指针来定义其行为。\n\n> **注意：** 不要混淆 `NSHashTable`（类名）和\
    \ `NSHashTable`（C 类型）。后者属于较旧的 C API，用于实现底层哈希表。Objective-C 的 `NSHashTable` 类包含了其大部分功能。\n\
    \n### 组合模式\n\n组合模式的一个方面是能够通过单个对象与对象组进行交互。`NSArray` 和 `NSSet` 类各自提供了两个方法，允许您向集合中的所有对象发送一条消息：\n\
    \n- `(void)makeObjectsPerformSelector:(SEL)aSelector`\n- `(void)makeObjectsPerformSelector:(SEL)aSelector\
    \ withObject:(id)anObject`\n\n清单 16-4 中的代码演示了如何向集合中的每个对象发送消息。\n\n**清单 16-4.**\
    \ 组合消息\n\n**Java**\n\n```java\nArrayList<Example> array = …\nfor ( Example example\
    \ : array ) {\n   example.setDelegate(this);\n}\n```\n\n**Objective-C**\n\n```objc\n\
    NSArray *array = …\n[array makeObjectsPerformSelector:@selector(setDelegate:)\
    \ withObject:self];\n```\n\n### 集合相等性约定\n\n集合的搜索和排序功能依赖于对象以一致且合理的方式响应 `-isEqual:`\
    \ 消息。这被称为相等性约定。集合和字典通过哈希表定位对象。这依赖于对象的 `-hash` 消息返回一个一致的值，该值与 `-isEqual:` 的响应具有可预测的关系。这被称为哈希约定。\n\
    \n相等性约定和哈希约定与 Java 中的相同。相等性约定如下：\n\n1.  具有等效值的两个对象必须从 `-isEqual:` 返回 `YES`，否则返回\
    \ `NO`。\n2.  相等的两个对象指针始终被视为相等且相同。因此，`[self isEqual:self]` 始终返回 `YES`。\n3.  有效的对象指针和\
    \ `nil` 对象指针始终被视为不相等。语句 `[self isEqual:nil]` 必须始终返回 `NO`。\n4.  `[a isEqual:b]`\
    \ 必须始终返回与 `[b isEqual:a]` 相同的值。\n\n必须按顺序考虑相等性约定的规则。例如，在两个对象指针都为 `nil` 的特殊情况下，规则\
    \ 2 优先于规则 3 和 4；`nil` 始终等于 `nil`。\n\n哈希约定很简单，也与 Java 的一致：\n\n1.  相等的两个对象（`[a isEqual:b]==YES`）必须返回相同的哈希值（`[a\
    \ hash]==[b hash]`）。\n2.  理想情况下，不同的对象（`[a isEqual:b]==NO`）应返回显著不同且在大整数范围内均匀分布的哈希值。\n\
    \n`-isEqual:` 和 `-hash` 方法在 `NSObject` 中定义，因此每个对象都继承它们。然而，`-hash` 的默认实现并不适用于集合和字典。如果您创建了一个计划在集合中使用的\
    \ `NSObject` 子类，则应重写 `-isEqual:` 并实现相等性约定。如果该对象将存储在集合中或用作字典中的键，则还必须重写 `-hash`\
    \ 以实现哈希约定。清单 16-5 显示了正确实现的相等性和哈希方法。\n\n**清单 16-5.** 相等性与哈希方法\n\n```objc\n@interface\
    \ AircraftIdentifier : NSObject {\n    NSString *registrationNumber;\n    unsigned\
    \ int transponderCode;\n}\n@property (readonly) NSString *registrationNumber;\n\
    @property unsigned int transponderCode;\n- (id)initWithRegistrationNumber:(NSString*)registration;\n\
    @end\n\n@implementation AircraftIdentifier\n@synthesize registrationNumber, transponderCode;\n\
    \n- (id)initWithRegistrationNumber:(NSString*)registration\n{\n    self = [super\
    \ init];\n    if (self != nil) {\n        registrationNumber = registration;\n\
    \        transponderCode = 1200; // VFR 模式下的默认应答机编码\n    }\n    return self;\n\
    }\n\n- (BOOL)isEqual:(id)object\n{\n    if (self==object) // 恒等规则\n        return\
    \ YES;\n    if (object==nil) // nil 规则\n        return NO;\n    if (![object isKindOfClass:[AircraftIdentifier\
    \ class]])\n        return NO; // 类不可识别\n\n    // 如果航空器识别符的注册号相同，则它们相等\n    AircraftIdentifier\
    \ *r = (AircraftIdentifier*)object;\n    return [registrationNumber isEqualToString:r->registrationNumber];\n\
    }\n\n- (NSUInteger)hash\n{\n    // 返回用于判断相等性的属性的哈希值\n    return [registrationNumber\
    \ hash];\n}\n\n@end\n```\n"
- fmt: "在`AircraftIdentifier`类中，分配给`transponderCode`的值在比较两个标识符对象的相等性时不被视为重要因素。这是因为该值可能会变化，但并不会实质性地改变飞机的身份。如何确定类的相等性会有所不同；只需记住，`-hash`方法必须始终返回与`-isEqual:`一致的值。\n\
    \n**比较集合**\n\n集合本身可以与同类集合进行比较。表16-14列出了集合比较方法。\n\n***表16-14.** 集合比较方法*\n\n| 类\
    \ | 方法 |\n| --- | --- |\n| `NSArray`, `NSMutableArray` | `-isEqualToArray:` |\n\
    | `NSDictionary`, `NSMutableDictionary` | `isEqualToDictionary:` |\n| `NSSet`,\
    \ `NSMutableSet`, `NSCountedSet` | `isEqualToSet:` |\n| `NSIndexSet`, `NSMutableIndexSet`\
    \ | `isEqualToIndexSet:` |\n| `NSHashTable` | `isEqualToHashTable:` |\n\n如果两个对象集合包含相同数量的对象，并且集合中的每个对象在向另一个集合中的对应对象发送`-isEqual:`消息时都返回`YES`，则认为这两个集合相等。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第16章 ■ 集合模式\n\n某些集合具有不等式比较，用于判断一个集合是否是另一个集合的子集或超集。这些方法包括`-[NSSet\
    \ isSubsetOfSet:]`、`-[NSHashTable isSubsetOfHashTable:]`和`-[NSIndexSet containsIndexes:]`。\n\
    \n**迭代器模式**\n\n可能一直以来最常见的编程任务就是遍历集合中的元素，对每个成员执行某些测试或操作。Java和Objective-C都意识到了这一点，并做出了重要的语言变化，旨在简化这种繁琐且重复的（无意双关）编程模式。你可以使用新的语法、遗留的枚举类，或直接访问每个成员对象来遍历集合。本节将解释每种方法的实现方式，以及为你的类添加枚举支持所需的步骤。\n\
    \nObjective-C枚举与Java迭代器的主要区别在于：\n\n*   Objective-C集合没有类型化。\n*   在枚举期间不得修改Objective-C集合。\n\
    \nJava为集合添加了参数化类型，消除了使用集合类所需的大量繁琐操作。参数化集合确保添加到集合中的所有对象都是正确的类型，并自动将从集合中提取的对象转换为基础类型。Objective-C不需要此类构造，因为它在赋值期间不验证对象的类。所有集合类都接受并返回匿名的`id`对象标识符，编译器假定该标识符可以自由地与任何类互换。如果你希望确保添加到集合中或从集合中获取的对象是正确的类，请添加断言。有关断言的更多信息，请参见第14章。\n\
    \n“集合并发”部分描述了如何处理在枚举期间无法修改集合的限制。这也意味着Objective-C枚举类没有修改集合的方法。\n\n**使用快速枚举**\n\n\
    快速枚举是在Objective-C 2.0中引入的。它是一种简写的`for(...)`循环语法，用于枚举集合中的对象。Java有非常类似的东西，称为For-Each循环语法。两者的示例见代码清单16-6。两者的用法、语法和行为几乎相同。\n\
    \n**代码清单16-6.** 快速枚举语法\n\n```java\nJava\nfor ( Object object : collection ) {\n\
    \    ...\n}\n```\n\n```objectivec\nObjective-C\nfor ( id object in collection\
    \ ) {\n    ...\n}\n```\n\n快速枚举中的“快速”不仅仅是对节省编码时间的委婉说法。快速枚举实际上很快。快速枚举接口允许集合批量获取对象，从而减少开销并提高性能。在除少数情况外的所有情况下，快速枚举是遍历集合中对象最快的方式。"
