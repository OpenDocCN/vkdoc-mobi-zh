    Objective-C 2.0 引入了扩展的概念。扩展本质上是一个匿名的类别。扩展用于细化类的 `@interface`，但不细化其 `@implementation`。它特别适用于从类的公共接口中排除方法原型，如前文“隐藏方法”部分所述。

