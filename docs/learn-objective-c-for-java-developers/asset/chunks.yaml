  trans: "\n***图 20-11.** Swing 与 Cocoa 的画笔方向*\n\n该图展示了 Cocoa 画笔绘制了一条跨越四个像素列的抗锯齿线条。这是因为宽度为\
    \ 3.0 像素的画笔以 Y 轴为中心，因此画笔“刷头”的左边缘位于 X 坐标-1.5 处，右边缘位于 1.5 处。要绘制一条模拟 Java 所绘制的 3\
    \ 像素宽线条，Cocoa 线条需要从坐标(1.5,0.0)绘制到(1.5,8.0)。\n\n3 Apple Inc., *分辨率无关性指南*, http://developer.apple.com/documentation/UserExperience/Conceptual/HiDPIOverview/,\
    \ 2007。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 20 章 ■ 模型-视图-控制器模式\n\
    \n## 绘制边界\n\nCocoa 中的矩形，以及任何在给定边界内进行绘制的方法，总是在矩形的坐标边界内进行绘制。图 20-12 展示了填充一个`3×5`矩形的情况。\n\
    \n***图 20-12.** 在 Swing 与 Cocoa 中填充矩形* 在 Java 中，使用宽度为 1 像素的画笔通过`Graphics2D.fillRect(Shape)`绘制的矩形，其绘制范围会超出矩形边界\
    \ 1 像素。而在 Cocoa 中，仅填充矩形内部的像素。填充该矩形的代码为`NSRectFill(NSMakeRect(0.0,0.0,3.0,5.0))`。\n\
    \n## 绘制线条与形状\n\nJava 提供了许多用于即时绘制线条、矩形、椭圆和其他形状的图元。\n\nCocoa 仅提供了一组主要用于填充矩形的 C 函数集合，以及功能丰富的`NSBezierPath`类。`NSBezierPath`是用于绘制任何类型的线条、几何形状或两者结合的通用对象。\n\
    \n一个`NSBezierPath`可以由一个或多个线段组成。线段可以是直线或曲线、实线或虚线。线段可以连接或不连接。它们可以形成封闭形状（如星形或椭圆形）或开放形状（如弧形）。一旦定义完成，贝塞尔路径对象可以被填充（绘制形状内部）或描边（绘制定义形状的线条）。该路径拥有许多属性，用于控制线条连接处和端点的绘制方式。它还包含一个“缠绕规则”，用于在线段相互交叉时确定形状的内部区域。图\
    \ 20-11 中的线条是使用代码清单 20-2 中的代码绘制的。\n\n**代码清单 20-2.** 绘制一条 5.0 像素宽的线条\n\n```\nNSBezierPath\
    \ *path = [NSBezierPath new];\n[path moveToPoint:NSMakePoint(0.0,0.0)];\n[path\
    \ lineToPoint:NSMakePoint(0.0,5.0)];\n[path setLineWidth:3.0];\n[path stroke];\n\
    ```\n\n存在一些便捷构造函数，用于创建形成椭圆或圆角矩形的贝塞尔路径。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 自定义视图\n\n自定义视图对象是通过继承`NSView`类创建的，其方式几乎与在 Swing 中继承`JComponent`完全相同。你的`NSView`类必须至少提供以下内容：\n\
    \n*   一个`-(id)initWithFrame:(NSRect)frame`初始化方法。这是所有`NSView`子类的指定初始化方法。\n*   可选地重写`-(void)drawRect:(NSRect)rect`方法，以提供视图内部的自定义绘制。此方法等价于`javax.swing.JComponent.paint(Graphics)`。\n\
    \n代码清单 20-3 中的代码演示了一个自定义的`NSView`子类，它绘制了存储在`Chalkboard.png`文件中的图像。（这是井字棋项目中`ChalkboardView`类的原始版本，在添加动画功能之前。）\n\
    \n**代码清单 20-3.** 自定义`NSView`绘制方法\n\n```\n- (void)drawRect:(NSRect)rect\n{\n  \
    \  NSImage *chalkboardImage = [NSImage imageNamed:@\"Chalkboard\"];\n    NSRect\
    \ imageRect;\n    imageRect.origin = NSMakePoint(0.0,0.0);\n    imageRect.size\
    \ = [chalkboardImage size];\n    [chalkboardImage drawInRect:[self bounds]\n \
    \                     fromRect:imageRect\n                     operation:NSCompositeSourceOver\n\
    \                      fraction:1.0];\n}\n```\n\n### 视图的失效与绘制\n\nCocoa 中的绘制与 Swing\
    \ 及类似 GUI 框架中的绘制几乎相同。当视图的内容需要重绘时，其占据的区域会被标记为失效（invalidated）。要使`NSView`失效，可将`needsDisplay`属性设置为`YES`，或发送`-setNeedsDisplayInRect:`消息。`AppKit`框架会将视图的区域或子区域添加到用户界面中需要重绘的聚合区域中。\n\
    \n最终，应用程序框架会向每个失效的视图对象发送一条`-drawRect:`消息。该消息包含需要绘制的特定视图子区域。除非你的视图非常复杂，否则可以忽略此信息；所有绘制都会自动裁剪到失效区域。\n\
    \n> **注意** `-drawRect:`方法仅负责绘制其内容。视图实际上是在接收到`-display`消息时才进行绘制的。这是一个高级消息，它会递归地向自身及其所有子视图发送`-drawRect:`消息。通常你不会重写`-display`，并且通常也绝不会向视图对象发送`-display`消息。要重绘一个视图，请设置其`needsDisplay`属性，让框架将其添加到需要更新的视图对象队列中，然后等待接收`-drawRect:`消息。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 图形上下文\n\n在 Java 中，组件用于绘制自身的图形对象会作为参数传递给`JComponent.paint(Graphics)`方法。在\
    \ Cocoa 中，所有绘制都在全局`NSGraphicsContext`对象的隐式上下文中进行。框架会在发送`-drawRect:`方法之前为你的视图准备好上下文。你的视图在其`bounds`属性定义的局部坐标系中进行绘制。在`-drawRect:`方法返回后，你不应对绘图上下文做任何假设。\n\
    \n`NSGraphicsContext`定义了许多适用于所有绘制命令的属性：\n\n*   裁剪区域\n*   绘制颜色\n*   描边（画笔）颜色\n\
    *   填充颜色\n*   字体\n*   阴影\n*   仿射变换\n\n与`java.awt.Graphics`的组织方式截然不同，设置这些属性的方法分散在定义它们的各个类中。表\
    \ 20-2 列出了在 Cocoa 框架中查找`java.awt.Graphics2D`属性近似等价物的位置。\n\n***表 20-2.** 图形上下文属性设置*\n\
    \n| `java.awt.Graphics2D` | Cocoa 函数或方法 |\n| :--- | :--- |\n| `setClip(int,int,int,int)`\
    \ | `NSRectClip(…)`, `NSRectClipList(…)` |\n| `clipRect(int,int,int,int)` | `-[NSBezierPath\
    \ addClip]` |\n| `setColor(Color)` | `-[NSColor set]`, `-[NSColor setStroke]`,\
    \ `-[NSColor setFill]` |\n| `setBackground(Color)` | 无：`NSEraseRect(…)`始终用白色绘制。使用`NSRectFill(…)`填充矩形。\
    \ |\n| `setFont(Font)` | `-[NSFont set]` |\n| `setShadow` | `-[NSShadow set]`\
    \ |\n| `setTransform(AffineTransform)` | `-[NSAffineTransform set]` |\n| `setComposite(Composite)`\
    \ | `-[NSGraphicsContext setCompositingOperation:]` |\n\n设置并使用这些属性与 Java 相同：设置所需属性，然后调用绘制命令。绘制命令将使用当前图形上下文的适用属性，如代码清单\
    \ 20-4 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**代码清单 20-4.**\
    \ 设置并使用图形上下文属性\n\n```\nNSBezierPath *path = …\n[[NSColor blueColor] setFill];\
    \    // 将填充颜色设置为蓝色\n[[NSColor greenColor] setStroke]; // 将描边颜色设置为绿色\n[path fill];\
    \                      // 填充一个蓝色形状\n[path stroke];                    // 绘制一条绿色线条\n\
    ```\n\n图形上下文还包含一组松散的深奥属性和渲染提示，与`Graphics2D`类似，它们影响缩放、抗锯齿、色彩空间调整等。\n\n`Graphics2D`的某些属性并非\
    \ Cocoa 中图形上下文的属性。相反，它们是定义对象的属性。例如，`NSBezierPath`所绘制的线条的宽度和形状是贝塞尔路径对象的属性，而非图形上下文的属性。\n"
- fmt: '# NSGraphicsContext 的状态管理


    `NSGraphicsContext`有一个`compositingOperation`属性，用于那些未将显式合成模式作为参数的绘图命令。


    ## 图形上下文状态栈


    你可能需要多个配置不同的图形上下文来完成绘图任务。撤销对任何一个图形上下文所做的更改并不总是容易的，所有后续的绘图操作都会受到任何更改的影响，因此当前上下文很容易被“污染”。这时图形上下文状态栈就派上了用场。


    图形上下文的当前状态可以被推送，将其所有属性保存在一个按线程划分的栈中。然后你可以对图形上下文进行任何想要的更改。当之前的状态被恢复时，自保存以来所做的所有更改都会被丢弃。这在设置复杂属性（如裁剪、阴影和仿射变换）时特别有用，这些属性通常只适用于少数绘图命令。`Listing
    20-5`演示了推送和恢复图形上下文的基本模式。


    **Listing 20-5.** 保存和恢复图形上下文


    ```

    NSGraphicsContext *currentContext = [NSGraphicsContext currentContext];

    NSRect circleRect = NSMakeRect(0.0, 0.0, 20.0, 20.0);


    NSBezierPath *path = [NSBezierPath bezierPathWithOvalInRect:circleRect];


    // 填充圆的内部（带投影）

    [currentContext saveGraphicsState]; // 推送上下文状态

    NSShadow *shadow = [NSShadow new];  // 创建阴影

    [shadow setShadowColor:[NSColor blackColor]];

    [shadow setShadowOffset:NSMakeSize(3.0, -3.0)];

    [shadow setShadowBlurRadius:1.5];

    [shadow set];                      // 为所有绘图设置阴影

    [[NSColor whiteColor] setFill];    // 将填充颜色设为白色

    [path fill];                       // 绘制白色圆形 + 阴影

    [currentContext restoreGraphicsState]; // 恢复之前的上下文状态


    // 绘制圆形轮廓（不带阴影）

    [[NSColor blueColor] setStroke];

    [path stroke];

    ```


    你必须确保每个`-saveGraphicsState`消息都有一个对应的`-restoreGraphicsState`消息。


    ## 绘图工具


    与图形上下文属性类似，绘制对象的方法分散在各个对象自身之中。例外的是少数用于填充矩形或绘制多部分图像的 C 函数。最常用的 C 函数列在`Table 20-3`中。


    **Table 20-3.** 常见的 Cocoa 绘图函数


    | AppKit 绘图函数 | 描述 |

    | --- | --- |

    | `NSEraseRect(NSRect)` | 用白色填充一个矩形。 |

    | `NSRectFill(NSRect)` | 用当前颜色填充一个矩形。 |

    | `NSRectFillUsingOperation(NSRect, NSCompositingOperation)` | 使用指定的合成模式填充一个矩形。
    |

    | `NSRectFillList(NSRect*, NSInteger)` | 用当前颜色填充一个矩形列表。 |

    | `NSFrameRect(NSRect)` | 在矩形边界内部绘制一条宽度为 `1.0` 的线，颜色为当前颜色。 |

    | `NSFrameRectWithWidth(NSRect, CGFloat)` | 在矩形内部绘制一条指定宽度的线，颜色为当前颜色。 |


    大约有三十个这样的函数。它们大多是实用工具，用于简化绘制如由多个图像构成的可调整大小按钮、浮雕边缘、投影、虚线轮廓（用于指示选择）等对象。完整的列表请参考《Application
    Kit Functions Reference》¹。


    其余绘图方法在定义它们的对象中实现，有时通过分类来实现。例如，`AppKit`框架定义了一个分类，为`NSString`类附加了一个`-drawAtPoint:WithAttributes:`方法。`Table
    20-4`列出了常见的 Java 绘图方法及在 Cocoa 框架中能找到的近似对应项。



    ¹ Apple Inc., *Application Kit Functions Reference*, http://developer.apple.com/documentation/Cocoa/Reference/ApplicationKit/Miscellaneous/AppKit_Functions/Reference/,
    2008.


    **Table 20-4.** 常见的绘图方法


    | `java.awt.Graphics2D` | Cocoa 函数或方法 |

    | --- | --- |

    | `drawImage(Image, int, int, int, int, int, int, int, ...)` | `-[NSImage` |'
