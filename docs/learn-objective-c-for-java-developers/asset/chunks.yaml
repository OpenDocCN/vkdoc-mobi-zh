    所有这些组件都是可选的，允许灵活的部署方案。一个包含共享库但没有头文件的框架适合分发给广大受众。一个包含代码、头文件和文档的框架则是一个自包含的部署工具，程序员和最终用户都可以使用。Xcode
    SDK 中包含的框架是特殊的框架，它们包含头文件和文档，但没有实际代码——即所谓的存根库。这些框架允许你开发使用系统框架的应用程序，而无需实际包含整个操作系统的副本。


    框架具有一些非常有用的特性：


    -   框架代码的单个副本会被加载到内存中，并由所有使用该框架的应用程序共享。

    -   一个框架可以包含自身的多个版本。

    -   框架使得将复杂的代码、资源和文档集合作为一个实体进行部署变得容易。

    -   框架可以自动加载，也可以通过编程方式加载。


    大多数项目在开发过程中会直接链接到框架。你将应用程序所需的框架添加到 Xcode 项目中，如图 26-1 所示。框架中的头文件和文档文件为程序员定义了其接口，而其库文件则用于链接应用程序。


    ***图 26-1.** Xcode 项目中的框架*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 运行时


    在运行时，框架会自动从多个预定义位置（最显著的是 `/System/Library/Frameworks` 和 `/Library/Frameworks`）加载，这与
    Java 使用其类路径变量查找类的方式非常相似。或者，你也可以将框架嵌入到应用程序的包中，或通过编程方式定位和加载框架。要直接加载框架，请为框架的包目录创建一个
    `NSBundle` 对象，并向其发送 `-load` 消息。这大致相当于创建一个 `java.lang.ClassLoader`。与 Java 不同，框架代码不会被垃圾回收。如果需要释放它，请向该包发送
    `-unload` 消息。


    > **注意：** 尽管框架通常包含共享库，但加载框架更像是使用 `java.lang.ClassLoader`，而不是 `java.lang.Runtime.loadLibrary(String)`
    方法。后者相当于 POSIX 函数 `dlopen(…)`。


    大多数时候你使用的是他人开发的框架，但你也可以开发并部署自己的框架。框架使得开发可重用的解决方案变得容易，这些解决方案将成为新应用程序的构建块，并与这些应用程序一起部署。如果你正在考虑开发自己的框架，请参考《框架编程指南》。


    ## 用户默认设置


    用户默认设置由多组分层的属性值组成，与 Java 属性非常相似。用户默认设置以属性列表字典的形式存储，因此它们只能包含属性值对象（`NSString`、`NSNumber`、`NSDate`、`NSData`、`NSArray`
    或 `NSDictionary`）。你使用用户默认设置的方式与使用 Java 属性值非常相似。用户默认设置还包含你应用程序的可编辑偏好设置。偏好设置会自动保存，并在你的应用程序下次执行时可用。


    用户默认值按名称（键）存储在一个或多个域中。以下是主要域（按搜索顺序降序排列）：


    1.  命令行参数域

    2.  应用程序域

    3.  全局域

    4.  注册域


    你可以通过向单例对象 `NSUserDefaults`（通过 `[NSUserDefaults standardUserDefaults]` 获取）请求来获取用户默认设置中的值。通用方法是
    `-objectForKey:`，但还有其他消息可以返回相同值，但已转换或将转换为更方便的类型：


    `-stringForKey:`、`-boolForKey:`、`-integerForKey:`、`-floatForKey:`、`-dataForKey:`、`-stringArrayForKey:`、`-arrayForKey:`
    和 `-dictionaryForKey:`。用户默认设置会在常见表示形式之间进行转换。例如，将值为 `"YES"` 的字符串作为布尔值请求，将返回数字常量
    `YES`。

