    # 第三章：欢迎使用 Objective-C


    `@synthesize` 标签指令会指示编译器为你生成 `-(int)tag` 和 `-(void)setTag:(int)newTag` 方法。`tag`
    属性将存储在同名的实例变量中。


    第二个属性声明与之类似，但由于该属性是一个对象，我们必须包含一个属性特性来阐明如何处理赋值操作。`copy` 特性会使合成后的设置器创建并存储传递给它的对象副本（而非存储对该对象的引用）。与
    `tag` 类似，`firstName` 属性的值将存储在 `firstName` 实例变量中。


    第三个 `@property` 指令与第二个相同，只是属性名称与任何已声明的实例变量都不对应。这对 `@property` 指令无关紧要；该语句仅承诺该类将实现该属性，而不承诺如何实现。`@synthesize
    lastName = secondName` 指令使用 `secondName` 实例变量来存储，并为 `lastName` 属性实现所需的 getter
    和 setter 方法。获取 `lastName` 属性会返回 `secondName` 变量；设置 `lastName` 属性会用传递给 `-setLastName:`
    的值的副本替换 `secondName` 变量。


    > **提示：** 如果你更喜欢极其紧凑的代码，清单 3-9 中的四条 `@synthesize` 指令本可以写成 `@synthesize tag, firstName,
    lastName=secondName, adult`。


    `@property (getter=isAdult) BOOL adult` 指令声明了一个名为 `adult` 的布尔属性。`getter=` 特性将
    getter 方法重命名为 `-(BOOL)isAdult`，而不是默认的 `-(BOOL)adult`。与 Java 中一样，布尔属性的 getter 方法传统上以“is”或“has”开头。


    最后一个 `@property (readonly,nonatomic) NSString *fullName` 指令声明 `Person` 对象提供了一个名为
    `fullName` 的字符串属性。该属性是只读的（它有 getter 方法但没有 setter 方法），并且 getter 方法不是线程安全的。在该类的
    `@implementation` 部分中没有针对 `fullName` 的 `@synthesize` 指令。所需的 getter 方法由程序员实现。


    > **警告：** 在实现访问器方法以满足 `@property` 指令时，程序员有责任履行声明中隐含的契约。如果你省略了 `nonatomic` 特性，则需要你自行确保这些方法是线程安全的。如果指定了
    `copy` 特性，setter 方法应创建并存储值的副本，而不是指向值的引用（除非你能保证该值是不可变的）。


    ## 属性特性


    清单 3-9 中的示例展示了属性定义中使用的一些常见特性。表 3-1 描述了所有可以包含在 `@property` 指令中的属性特性。多个特性之间用逗号分隔。


    **表 3-1. 属性特性**


    | 属性特性 | 描述 |

    | --- | --- |

    | `readonly` | 声明该属性是不可变的。针对 `readonly` 属性的 `@synthesize` 指令将生成一个 getter 方法，但不会生成
    setter 方法。`readonly` 与 `readwrite` 互斥。 |

    | `readwrite` | 声明该属性是可变的。这是默认的可变性特性。如果既未指定 `readonly` 也未指定 `readwrite`，则假定为 `readwrite`。`readwrite`
    与 `readonly` 互斥。 |

    | `copy` | 声明 setter 方法会创建传递给它的对象的副本，并存储对该副本的引用，而不是对原始对象的引用。此特性仅适用于对象指针属性——原始值总是通过复制传递。`copy`
    与 `assign` 和 `retain` 互斥。当用于设置属性的对象可能可变，且你不希望因原始对象被修改而导致接收者属性的值发生变化时，请使用 `copy`。
    |

    | `assign` | 声明 setter 方法通过保留指向传递给它的对象的指针来设置属性。实际上，这意味着 getter 和 setter 方法是通过简单的赋值来实现的（例如，`self->firstName
    = name`）。在垃圾回收环境中，当你希望保留对原始对象值的引用，或者对象值始终是不可变时，请使用 `assign`。如果未指定存储特性，通常假定为 `assign`，但在某些环境中，你必须显式包含
    `assign`、`copy` 或 `retain`。`assign` 与 `copy` 和 `retain` 互斥，并且仅适用于对象指针属性。 |

    | `retain` | 此特性类似于 `assign`，但在托管内存（非垃圾回收）环境中会保留对对象的引用。有关非 GC 内存管理的信息，请参考第 4 部分。
    |

    | `getter=名称` | 重命名用作 getter 方法的方法。当需要默认 getter 方法名称的替代形式（例如 `-isValue` 或 `-getValue`）时非常有用。请谨慎使用此特性；它可能会破坏
    getter 和 setter 名称的标准模式，导致键值编码等技术无法识别该属性。 |

    | `setter=名称` | 重命名用于 setter 方法的方法。如果指定了 `readonly` 特性，则不能使用。适用于 `getter=` 的相同警告也适用于
    `setter=`。 |

    | `nonatomic` | 声明 getter 和 setter 方法不是线程安全的。不存在“atomic”特性；省略 `nonatomic` 意味着该属性是原子的。如果省略，`@synthesize`
    可能会用代码包裹 getter 和 setter 方法，这些代码首先获取对象特定的锁，以确保访问器方法在多线程环境中行为良好。它还能确保返回的对象在执行线程的内存空间中是完全实现的。当你手动编写的访问器方法不提供这些安全保障，或不希望采取此类预防措施时，请使用
    `nonatomic`。线程安全特性会给访问器方法增加相当大的运行时开销，这可能会影响性能。在某些平台上，对于原始标量属性和 `assign` 对象属性存在例外情况，因为处理器保证了原子赋值。
    |


    与 Java 相比，`copy` 特性更适用于字符串和集合对象。在 Objective-C 中，字符串和集合类具有可变子类。因此，`NSString` 不能像
    Java 的 `String` 对象那样保证是不可变的。制作副本可以确保属性不会受到用于设置属性的原始对象更改的影响。


    ## 重写属性


    属性是通过在接收者中获取和设置值的访问器方法实现的。由于它们是使用方法实现的，子类可以重写这些方法，本质上就是重写属性。


    非正式或正式地重写属性的访问器方法都是可以的。要非正式地重写，只需重写相应的访问器方法即可。要重写由 `@property int tag` 隐含的 setter
    方法，只需在子类中实现一个新的 `-(void)setTag:(int)newTag` 方法。甚至不必在子类的 `@interface` 中声明它。


    要正式地重写属性，请在子类中声明一个重复的 `@property` 指令。`@property` 指令必须与父类中的完全相同，但有一个例外：当父类的属性是
    `readonly` 时，子类可以将其声明为 `readwrite`。这支持了不可变父类的可变子类的设计模式。一旦声明，就可以使用 `@synthesize`
    指令为子类重新实现访问器方法，或者你也可以自己实现它们。

