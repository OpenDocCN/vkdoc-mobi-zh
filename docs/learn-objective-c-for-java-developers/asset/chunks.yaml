    File Properties


    A file’s properties, or metadata, are information about a file. Java’s java.io.File
    object is the principal interface for obtaining the properties of a file. It implements
    a variety of specific methods (i.e., boolean isFile(), long lastModified(), long
    length()) that describe the various properties of the file.


    Objective-C has a single -[NSFileManager fileAttributesAtPath:traverseLink:] method
    that accepts a file path and returns an immutable dictionary containing all salient
    properties of the file. The traverseLink: argument determines what to do if the
    path specifies a symbolic link file. If YES, the attributes returned will be for
    the file the symbolic link refers to; if NO, the attributes describe the symbolic
    link file.


    To examine a particular property, retrieve its value from the dictionary collection.
    An example using the attributes of a file was already demonstrated listing 11-6\.
    The keys are string constants to values that are NSNumber, NSDate, or NSString
    objects. Table 11-8 lists the property methods in java.io.File and their Objective-C
    equivalent. Some are methods, while others are keys into the attribute dictionary.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


