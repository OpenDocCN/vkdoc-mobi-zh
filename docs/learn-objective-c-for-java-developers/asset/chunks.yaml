- fmt: 'In Java, all collection classes are mutable. It’s possible to create an immutable
    collection using a special method like `java.util.Collections.unmodifiableCollection(Collection)`,
    but that’s rare. For the most part, you design your code with the assumption that
    all collections are mutable, paying special attention to when collections are
    passed by reference to other methods.


    Most Objective-C collection classes adhere to an immutable base class, mutable
    subclass design pattern. The base classes of the traditional collection classes
    (`NSArray`, `NSDictionary`, `NSSet`, and `NSIndexSet`) are truly immutable. They
    lack any methods that can modify the collection. When a method accepts or returns
    one of these classes, it is implicitly immutable—removing most pass-by-reference
    concerns that Java programmers contend with. You might be wondering just how useful
    an immutable collection class is, but they’re quite handy. They use many of the
    same programming patterns as `java.lang.String` objects.


    To interactively construct or manipulate a collection, you must create one of
    the mutable subclasses: `NSMutableArray`, `NSMutableDictionary`, `NSMutableSet`,
    or `NSMutableIndexSet`. These subclasses define all of the methods used to alter
    the contents of the collection. Being subclasses, you can pass any mutable collection
    object as an immutable type. However, you should take some care when doing this.
    In Objective-C, the receiver of an immutable collection will likely assume it
    to be immutable, whereas in Java it would rightly assume it to be mutable. If
    the receiver keeps a reference to the original object, it may behave erratically
    if its immutable collection is arbitrarily altered. You can safely pass mutable
    collections as immutable collections as long as nothing else modifies the collection,
    or the receiver understands that it might actually be a mutable collection. Otherwise,
    convert the collection into an immutable collection using one of the lightweight
    collection copy constructors.


    To make immutable classes useful and easy to work with, Objective-C provides an
    extensive set of constructors and methods that create and return an immutable
    collection. These convenience constructors make it easy to create immutable copies
    of other collections or make a single change to an immutable collection by creating
    a new collection. The immutable collection constructors are listed in Table 16-2.


    **Table 16-2.** Immutable Collection Constructors


    | Method | Description |

    |--------|-------------|

    | `+[NSArray arrayWithArray:]` | Creates an immutable, shallow copy of another
    array. |

    | `-[[NSArray alloc] initWithArray:copyItems:]` | Same as `[NSArray arrayWithArray:]`
    if the `copyItems` parameter is `NO`. If `copyItems` is `YES`, it makes a deep
    copy of the array by sending a `-copyWithZone:` message to every object in the
    collection. |

    | `+[NSArray arrayWithObject:]` | Creates an immutable array containing one object.
    |

    | `+[NSArray arrayWithObjects:]` | Creates an immutable array of objects. The
    objects are passed as a variable argument list, terminated by with a `nil` value.
    |

    | `+[NSArray arrayWithObjects:count:]` | Creates an immutable array from a C array
    of object pointers. The parameters are the address of the first element in the
    array and the element count. |

    | `-[NSArray arrayByAddingObject:]` | Creates a new immutable array that’s a shallow
    copy of the receiver’s array plus one additional object. |

    | `-[NSArray arrayByAddingObjectsFromArray:]` | Creates a new immutable array
    by concatenating the receiver’s collection with the objects in the parameter.
    |

    | `-[NSArray subarrayWithRange:]` | Creates a new immutable array that contains
    a shallow copy of a subset of the receiver’s array. |

    | `-[NSArray filteredArrayUsingPredicate:]` | Returns an immutable array containing
    the objects in the receiver’s array that match the predicate expression. |

    | `-[NSArray sortedArrayUsing…:]` | Any of four different methods that create
    a new immutable array with the sorted contents of the receiver’s array. |

    | `+[NSDictionary dictionaryWithDictionary:]` | (Description continues in original
    text, but content ends here.) |'
