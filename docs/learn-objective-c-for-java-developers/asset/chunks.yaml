    getStackTrace()


    +callStackReturnAddresses


    Gets the array of return addresses on the stack


    Here are the key differences between threads in Objective-C and Java:


    • There are no thread groups in Objective-C.


    • The Objective-C interface does not provide a method for obtaining the list of
    existing threads.


    • There is no security model. Some operations—like setting a thread’s priority—can
    only be performed from the currently running thread, whereas in Java they can
    be performed on arbitrary threads.


    • You cannot interrupt a thread. NSThread does provide a canceled property that
    can be set and tested, but canceling a thread will not unblock it.


    • There are no daemon threads. An Objective-C process runs as long as the main
    thread is running, and all threads terminate when the process terminates.


    • There is no join() function, but the same functionality can be easily accomplished
    using NSConditionLock, as explained later in this chapter.


    • There is no yield() method or any equivalent.


    The life cycle of an Objective-C thread is broadly the same as it is in Java.
    You create a thread that will execute a method of an object. When the method returns,
    the thread is terminated and destroyed. Any interaction with objects shared with
    other threads must be coordinated using semaphores.


    If that’s all you need from threads, read the sections “Starting a Thread” and
    “Thread Synchronization.” If you want to consider ready-made classes that will
    manage threads for you, check out the “Operations” section. The rest of this chapter
    explores mostly esoteric details of threads that are less relevant to most programmers.


    Starting a Thread


    Starting a new thread in Objective-C is even easier than it is in Java—which is
    saying something, since thread creation in Java is already pretty simple. There
    are three ways of creating a thread in Objective-C:


    • Create and immediately start a thread executing by sending the message


    +detachNewThreadSelector:toTarget:withObject:. The message identifies the object
    and method that contains the thread’s code and an optional parameter that will
    be passed to the thread when it begins execution.


    • Create a new NSThread object using -initWithTarget:selector:object:. This is
    identical to the first technique, except that the thread is not started. You can
    customize the thread object before starting it with the -start message.


    • Define your own subclass of NSThread, override the -main method, and create
    your instance using -init. This is equivalent to subclassing java.lang.Thread
    and overriding run(). When the object receives the -start message, it creates
    a new thread and executes its -main method in the new thread.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ THREADS


    ■Note The constructors that create and return an NSThread object are fairly recent
    additions to the operating system. In versions of Mac OS X prior to 10.5, only
    +detachNewThreadSelector:toTarget:withObject: could create new threads. You could
    not subclass NSThread or customize a thread before starting it.'
