- fmt: "# Key Events\n\nKey events are distributed down the object hierarchy, usually\
    \ in search of the first responder. The type of event, and several layers of filtering,\
    \ heavily influence key event dispatching. Key events are passed first to the\
    \ application object, then to the key window, to the first responders, and in\
    \ some cases on to the menu bar.\n\nIn simplified terms, a key event goes through\
    \ the following steps:\n\n1. The operating system translates the hardware key\
    \ codes into the user’s current language. The key event is filtered through the\
    \ system-wide key bindings, and then passed to system components that have registered\
    \ to intercept global key events. This is how “hot keys” are processed.\n2. The\
    \ key event is pushed onto the event queue of the active application.\n3. The\
    \ main run loop of the application pulls the next key event, wraps it in an `NSEvent`\
    \ object, and sends it to the `NSApplication` object in a `-sendEvent:` message.\n\
    4. If the key might be a key equivalent (typically a command+key combination),\
    \ the application sends a `-performKeyEquivalent:` message to the key window,\
    \ which interprets it or passes it to its first responder. If neither responds\
    \ to the event, it’s sent to the application’s menu bar.\n5. The message `-sendEvent:`\
    \ is sent to the key window.\n6. If the key is an interface control key (Tab,\
    \ Right Arrow, Page Down, Home), as defined by the currently active view, the\
    \ window and/or control translates that into an action and sends the appropriate\
    \ key action message (`-setNextKeyView:`, `-forward:`, `-pageDown:`, `-moveToBeginningOfDocument:`,\
    \ respectively) to the window or its first responder.\n7. If the event is not\
    \ a key equivalent or interface control, the first responder receives a `-keyDown:`,\
    \ `-keyUp:`, or `-flagsChanged:` message.\n8. If there isn’t a first responder\
    \ and the window doesn’t process the key event, it’s passed to the menu bar.\n\
    \nMost views need only override `-keyDown:`, and possibly `-keyUp:` or `-flagsChanged:`,\
    \ to automatically receive regular key events. If you are writing a view that\
    \ edits text—and I would discourage you from trying—your view object must conform\
    \ to the `NSTextInput` protocol.\n\nTo be honest, key event processing is significantly\
    \ more complex than this, but unless you’re writing an application that needs\
    \ to filter keystrokes or create key bindings, you can generally ignore the more\
    \ esoteric aspects of key-event processing. A complete description can be found\
    \ in the Cocoa Event-Handling Guide.\n\n# Mouse Events\n\nMouse and touch events\
    \ are distributed using the geometry of the user interface. A mouse event is always\
    \ associated with a location and a window, which is used to determine the recipient\
    \ of the event.\n\n## Mouse Down Event\n\nMouse event processing usually beings\
    \ with a mouse down event:\n\n1. When the mouse is clicked, the system’s `WindowServer`\
    \ determines which application should receive the event.\n2. The main run loop\
    \ of the application sends the mouse event to the `NSApplication` object via a\
    \ `-sendEvent:` message.\n3. `NSApplication` uses the location of the event to\
    \ determine which window the event occurred in, and forwards the event to that\
    \ window via another `-sendEvent:` message.\n4. The window’s `-sendEvent:` method\
    \ uses the location to find the subview corresponding to the click and sends that\
    \ view a `-mouseDown:` message.\n\nThe first mouse down event in a view will attempt\
    \ to make it the first responder. This makes the view the recipient of key events;\
    \ its window becomes the key window and inherently redefines the responder chain,\
    \ described later in this chapter. To be eligible, a view must return `YES` when\
    \ sent an `-acceptsFirstResponder` message. By default, `NSView` returns `NO`.\
    \ If the view accedes, it will be designated the first responder and receives\
    \ a `-becomeFirstResponder` message. When the window is deactivated, or another\
    \ view becomes the first responder, the view receives a matching `-resignFirstResponder`\
    \ message.\n\nA view can also control “click through.” Normally, a mouse click\
    \ in an inactive window activates the window, but does nothing else with the event.\
    \ Clicking a control in an inactive window normally requires two clicks: the first\
    \ to activate the window and the second to send a `-mouseDown:` event to the view.\
    \ The view can change this behavior by overriding `-acceptsFirstMouse:`. When\
    \ a window is activated via a mouse click, it queries the view underneath the\
    \ click coordinate by sending it an `-acceptsFirstMouse:` message. If the view\
    \ returns `YES`, the window will immediately send the view a `-mouseDown:` message—both\
    \ activating the window and clicking the view with a single event. By default,\
    \ `NSView` returns `NO` for `-acceptsFirstMouse:`.\n\n## Mouse Drag and Mouse\
    \ Up Events\n\nOnce a view receives a `-mouseDown:` message, it may then receive\
    \ `-mouseDragged:` and `-mouseUp:` messages. These messages are collectively referred\
    \ to as the mouse tracking messages. The same view object will receive subsequent\
    \ `-mouseDragged:` and `-mouseUp:` messages, even if the mouse is dragged outside\
    \ the frame of the view. `-mouseDragged:` is only sent when the mouse is moved\
    \ while its button is held down. The view may receive many `-mouseDragged:` messages,\
    \ or none at all. A view will never receive a `-mouseDragged:` or `-mouseUp:`\
    \ message before a `-mouseDown:` message.\n\nIf you want your view to do something\
    \ interesting during a mouse drag gesture, you’ll probably want to override all\
    \ three methods. If you’re only interested in implementing click behavior, override\
    \ `-mouseUp:` and test the location of the event to see that the mouse is still\
    \ positioned over your object.\n\nThe `-mouseUp:` handler in the TicTacToe project\
    \ is shown in Listing 20-6.\n\n**Listing 20-6.** `-mouseUp:` Event Handler\n\n\
    ```\n- (void)mouseUp:(NSEvent*)theEvent\n{\n    NSPoint loc = [self convertPoint:[theEvent\
    \ locationInWindow] fromView:nil];\n    SquareIndex index;\n\n    for (index=0;\
    \ index<9; index++) {\n        if (NSPointInRect(loc,[ChalkboardView rectOfSquare:index]))\
    \ {\n            [[self document] playerClickedSquare:index];\n            break;\n\
    \        }\n    }\n}\n```\n\nThe method in Listing 20-6 receives the mouse event\
    \ information via an `NSEvent` object. Events are always in the window’s coordinate\
    \ system, so the first thing it does is convert the location into the view’s local\
    \ coordinate system. It then searches to see if the user released the mouse inside\
    \ any of the nine squares on the playing board. If they did, the view sends a\
    \ `-playerClickedSquare:` message to its controller object, which will make the\
    \ move and update the game board.\n\nAnother approach to handling mouse drag events\
    \ is to stay in your `-mouseDown:` method and start a nested run loop until the\
    \ drag is complete. This is, essentially, a “modal” mouse drag loop, that blocks\
    \ the rest of your application from executing until the drag is finished. The\
    \ Cocoa Event-Handling Guide includes an example of a mouse tracking loop.\n\n\
    ## Mouse Tracking\n\nMouse movement during a drag gesture is provided automatically.\
    \ Mouse movement while the mouse buttons are up is normally ignored. Mouse movement\
    \ is common, computationally expensive, and normally of no interest to the application.\n\
    \nThere are, however, instances where you want to be notified of normal mouse\
    \ movement in your interface. There are two techniques for tracking the mouse\
    \ while the mouse buttons are up.\n\nThe first method is to request mouse-moved\
    \ events from the window:\n\n1. Set the `acceptsMouseMovedEvents` property of\
    \ the window containing the view to `YES`.\n2. Implement `-mouseMoved:` methods\
    \ in your subviews.\n\nOnce `acceptsMouseMovedEvents` is set, the window will\
    \ begin sending `-mouseMoved:` messages to its views, much the way it distributes\
    \ other mouse events."
