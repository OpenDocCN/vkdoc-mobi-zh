    **C H A P T E R 11**


    ■ ■ ■


    Files


    File systems are essential to virtually every computer operating system. It’s
    where the operating system itself, applications, documents, and other information
    persist. Conceptually, files are very simple: a file is a named sequence of bytes,
    organized hierarchically in a file system.


    You’d think this would be a short chapter, but it’s not. Probably because of their
    importance, file systems have been the focus of much development. They have steadily
    evolved over the decades and are now quite complex. Files have sophisticated permissions,
    attributes, and multiple data forks. There are device files, memory files, serial
    communication files, and symbolic link files. File systems incorporate advanced
    caching, asynchronous data transfer, journaling, and change tracking. Much of
    this complexity has spilled into APIs and objects that interface with the file
    system.


    There are more details to contend with when using files in Objective-C than there
    are in Java.


    To be portable, Java tries to hide or abstract as many of the underlying file
    system details as possible.


    Objective-C exposes all of the underlying POSIX file system details in all their
    glory. On the other hand, Objective-C provides many more high-level methods that
    allow you to read, write, or access the contents of an entire file with as little
    as a single statement.


    This chapter will cover the basics of file and path names, how to process files
    in a directory, the manipulation of file metadata, and various ways of reading
    and writing data files. Along the way, it will also touch on some alternate APIs.


    File System APIs


    The functions, classes, and methods you use to interact with the file system are
    collectively referred to as the file system’s application programming interface
    (API). In Java, the file system API is neatly organized in the java.io package.
    Not so in Objective-C. The Objective-C Cocoa framework provides a simple interface
    to the file system that’s adequate for most needs. Parallel to that is the Core
    Services framework. Core Services provides numerous advanced file system functions
    along with a set of C APIs that mimic the original file services of the classic
    Macintosh operating system (often referred to as the Carbon API). Underneath both
    of these APIs is the core BSD API. These are the C functions that actually implement
    most of the file services in Mac OS X. Much of the Cocoa and Core Services are
    just compatibility APIs that do little more than call a BSD function to get the
    work done.


    A conceptual difference between Objective-C and Java is that much of Java is organized
    around abstract classes that read and write serial data (java.io.Reader, java.io.Writer,
    java.io.InputStream, java.io.OutputStream), with subclasses that work with data
    files. Objective-C (and C) tend to use purpose-built functions for working with
    data files, and reserve the use of data stream classes for network ports and communication
    pipes. There is some overlap, but much less than in Java.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


