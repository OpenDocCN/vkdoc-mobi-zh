    NSString *errorPath = [NSString stringWithCString:path];


    NSDictionary *info = [NSDictionary dictionaryWithObject:errorPath forKey:@"Path"];


    NSError *error = [NSError errorWithDomain:NSPOSIXErrorDomain code:errno


    userInfo:info];


    @throw error;


    }


    …


    close(fd);


    } @catch (NSError *error) {


    [self presentError:error];


    }


    Summary


    Objective-C exception handling is robust, simple, and on a par with that provided
    by Java. Much of Objective-C’s permissiveness can be reined in with the liberal
    use of assertions. POSIX, BSD, Core Foundation, and most Cocoa methods only use
    exceptions for (what are considered to be) runtime errors or programming mistakes.
    You can embrace this philosophy, or continue to program using exceptions by combining
    them with traditional design patterns.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 15**


    ■ ■ ■


    Threads


    Java was one of the first programming languages to support threads and thread
    synchronization directly.


    It was a very forward-looking decision. Multicore, multiprocessor computer systems
    have become the norm, rather than the exception. Efficient multi-threaded programming
    is now essential to effective program development, and it’s a trend that continues
    to accelerate.


    Threads and semaphores are conceptually simple, and the high-level differences
    between Java and Objective-C are trivial. Objective-C also makes extensive use
    of run loops, which transform a thread into an event processor. Beyond the basic
    @synchronize directive built into the language, the Cocoa framework provides a
    number of additional synchronization tools, each tailored to a specific need.
    And finally, there are classes that perform deferred actions, manage independent
    threads for you, and perform timed tasks relieving you of the burden of creating
    and managing your own threads.


    This chapter begins by describing how threads are created, run, and destroyed
    in Objective-C. It also explains run loops and tells you why you would need to
    create one, and how. After that, it details various ways to synchronize multiple
    threads and make your code thread safe. Finally, it presents a few useful classes
    that can make thread management simpler, or possibly unnecessary.


    Thread API


    Thread management and control is centered on the NSThread Objective-C class, and
    closely resembles Java’s java.lang.Thread class. The equivalent methods are listed
    in Table 15-1.


    ***Table 15-1.** Equivalent Thread Methods*


