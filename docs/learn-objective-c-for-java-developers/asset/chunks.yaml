    ## 第 9 章 ■ 垃圾回收


    ### 小结


    从表面上看，Objective-C 的垃圾回收与 Java 不相上下——你只需将其开启即可。强引用和弱引用是 Java 程序员熟悉的概念，在 Objective-C
    中行为也几乎完全相同。当处理其他指针类型时需要格外小心，因为非对象指针通常不会自动为你管理，同时还要警惕与不受垃圾回收器管理的指针打交道时可能出现的陷阱。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第 10 章 ■ 内省


    内省（反射）是指探索对象相关信息的行为，这些信息通常被称为元数据：对象的类、实现的方法、声明的属性、遵循的协议（接口）等等。常见的问题（例如“这个对象属于哪个类？”“我能将这个对象视为特定类吗？”“这个对象实现了某个特定方法吗？”）都很容易回答。本章将首先介绍如何回答这些常见问题，然后深入探讨对对象和类的更深入探索。


    本章还将探讨键值编码，这是一种与内省密切相关的技术。


    键值编码（简称 KVC）允许你以符号方式访问对象的属性。举一个简单的例子：有一个 `Person` 类，包含 `NSString *name`、`Person
    *mother` 和 `Person *father` 这些属性。


    KVC 允许你通过路径 `@"name"` 获取一个人的名字，并通过路径 `@"mother.name"` 获取其母亲的名字。KVC 并非内省；KVC 不会告诉你对象实现了哪些属性。但它与内省关系密切，了解它能为你做什么非常有用。你可能会更倾向于使用
    KVC 而不是自行执行内省。同时，你还需要了解如何设计你的类，使其能够与 KVC 配合使用。


    出于实用和理念两方面的原因，Objective-C 的内省技术更侧重于发现单个特征，而不是先判断对象属于哪个类，再据此推断其拥有的方法和属性。如果你想了解某个对象能否打开
    URL，应该判断该对象是否实现了 `-openURL:` 方法。这比将其类与你认为实现了 `-openURL:` 方法的类进行对比更好。你对对象类的假设越少，你的代码就越健壮、越灵活。以下是关于对象最常见的几个问题：


    • 这个对象实现了某个特定方法吗？


    • 这个对象是某个特定类的实例吗？


    • 这个对象是某个特定类或其任何子类的实例吗？


    在 Objective-C 中，这三个问题最容易回答。它们是按效率和速度排序的。判断对象是否实现了特定方法，比判断它是否属于某个类成员有两个优势：它更直接地指向对象的功能性问题，而且效率高得多。


    这并不是说你不应该测试对象的类。这样做有很多合理的理由。但是，如果你测试对象的类是为了推断它实现了某些方法，那么请考虑更直接地测试断言本身。


    ### 测试方法


    Java 没有一种简单、简洁的方法来判断对象是否实现了特定方法。

