    *dictionary = …


    NSNumber *value = [dictionary objectForKey:@"Value"]; NSAssert([value isKindOfClass:[NSNumber
    class]],@"wrong class"); Failed Assertion Output:


    *** Assertion failure in -[Tosser catcher], Tosser.m:45


    *** Terminating app due to uncaught exception ''NSInternalInconsistencyException'',
    reason: ''wrong class''


    Assertions are a practical way of introducing some of Java’s sanity to Objective-C.
    Objective-C


    does not test the class of an object during assignment, but an assertion can.
    Objective-C doesn’t test the index in C array statements to ensure they are within
    bounds, but an assertion can. In short, almost any runtime check that you would
    expect Java to perform for you can be stated as an assertion.


    Assertions can be stated for any expected program condition. If a parameter is
    assumed to be non-nil, assert it. If an integer value should be positive, assert
    it.


    ■Caution Assertions are exceptions, like any other. Most Java runtime exceptions
    are unchecked, and are usually left uncaught. If you want your application to
    terminate when an exception is encountered, be careful not to swallow the exception
    in your catch block. See the RethrowAssertion macro in the Listing 14-8.


    One particularly attractive feature of assertions is they can be turned off, en
    masse. The assertion macros provided by the Cocoa framework, listed in Table 14-4,
    are all conditionally defined based on the NS_BLOCK_ASSERTIONS preprocessor macro.
    If that macro is defined—the value is immaterial—all of the NSAssert… macros get
    redefined to nothing. This means your assertion statements effectively disappear,
    as if they never existed. You can fill your application with thousands of assertion
    statements that are active during development, then turn them all off when compiling
    your release version. This is usually accomplished by defining the NS_BLOCK_ASSERTIONS
    macro in the Preprocessor Macros build settings of the Release configuration.
    During development, your application checks for any unexpected conditions, but
    the release version is free of the excess code and performance penalty of each
    assertion.


    ***Table 14-4.** Standard Assertion Macros*


    Ma cr o


    Des cr ipti on


    NSAssert(condition,description)


    Tests a condition, throwing an exception with the description if false.


    NSAssert1(condition,format,arg1)


    If condition is false, throws an exception with the description created by formatting
    a string with one argument.


    NSAssert2(condition,format,arg1,arg2)


    If condition is false, throws an exception with the description created by formatting
    a string with two arguments.


    NSParameterAssert(condition)


    If condition is false, throws an exception with the description that the given
    condition was not true.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 14 ■ EXCEPTION HANDLING


    There are actually six NSAssert macros: NSAssert, NSAssert1, NSAssert2, NSAssert3,
    NSAssert4, and NSAssert5\. They differ only in the number of arguments following
    the format string. (Preprocessor macros are not capable of variables arguments.)
    These assertions can only be used in the body of an Objective-C method. A parallel
    set of NSCAssert… macros can be used in C functions.


    I highly recommend defining your own assertion macros. Concise, specific assertion
    statements are more likely to be used. Listing 14-8 shares a few of my favorites,
    along with some code that uses them.


    Listin g 14-8\. Custom Assertion Macros


    #if !defined(NS_BLOCK_ASSERTIONS)


    #define RethrowAssertion(EXCEPTION) \


    if ([[EXCEPTION name] isEqualToString:NSInternalInconsistencyException]) \


    [EXCEPTION raise]


    #define AssertObjectIsClass(OBJECT,CLASS) \


    do { \


    if (![OBJECT isKindOfClass:[CLASS class]]) { \


    [[NSAssertionHandler currentHandler] handleFailureInMethod:_cmd \ object:self
    \


    file:[NSString stringWithUTF8String:__FILE__] \


    lineNumber:__LINE__ \


    description:@"object isa %@@%p; expected %s", \


    [OBJECT className],OBJECT,#CLASS]; \


    } \


    } while(NO)


    #define AssertObjectIsNilOrClass(OBJECT,CLASS) \


    do { \


    if ((OBJECT!=nil) && ![OBJECT isKindOfClass:[CLASS class]]) { \


    [[NSAssertionHandler currentHandler] handleFailureInMethod:_cmd \ object:self
    \


    file:[NSString stringWithUTF8String:__FILE__] \


    lineNumber:__LINE__ \


    description:@"object isa %@@%p; expected %s", \


    [OBJECT className],OBJECT,#CLASS]; \


    } \


    } while(NO)


    #define AssertObjectRespondsTo(OBJECT,MESSAGE) \


    do { \


    if (![OBJECT respondsToSelector:@selector(MESSAGE)]) { \


    [[NSAssertionHandler currentHandler] handleFailureInMethod:_cmd \ object:self
    \


    file:[NSString stringWithUTF8String:__FILE__] \


    lineNumber:__LINE__ \


    description:@"object %@@%p does not respond to %s", \


    [OBJECT className],OBJECT,#MESSAGE]; \


    } \


    } while(NO)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 14 ■ EXCEPTION HANDLING


    #define AssertNotNil(OBJ) NSAssert1(OBJ!=nil,@"%s is nil",#OBJ)


    #define ParameterAssert NSParameterAssert


    #else


    #define RethrowAssertion(EXCEPTION)


    #define AssertObjectIsClass(OBJECT,CLASS)


    #define AssertObjectIsNilOrClass(OBJECT,CLASS)


    #define AssertObjectRespondsTo(OBJECT,MESSAGE)


    #define AssertNotNil(OBJ)


    #define ParameterAssert NSParameterAssert


    #endif


    …


    // make sure the delegate is set and implements to informal protocol AssertNotNil(delegate);


    AssertObjectRespondsTo(delegate,lookupPartNumber:);


    PartNumber part = [delegate lookupPartNumber:inventoryCode]; NSAssert(part>=100000&&part<=999999,@"invalid
    part number"); Record *partRecord = [PartsDatabase recordForPartNumber:part];
    AssertObjectIsClass(partRecord,Record);


    You can define the macros in terms of other macros—like the AssertNotNil and ParameterAssert
    macros—or you can define them to invoke the singleton NSAssertionHandler that
    should be used to throw assertion exceptions. Always design your macros so they
    act like a single C


    statement when expanded.


    These macros use a number of advanced preprocessor features:


    •


    The single \ at the end of a line continues the #define statement to the next
    line, as if it had been written as a single line.


    •


    A macro can take the form of a C function with parameters. The parameters create
    temporary macro definitions that exist during the expansion of the macro’s body.
    The statement #define DO(THIS) [self THIS] will replace the code DO(something)
    with [self something].


    •


    Macro expansion is recursive. Given #define A B and #define B(X) return X, the
    statement A(3) will be replaced with B(3), which will be replaced with return
    3.


    Definition order isn’t important.


    •


    The special syntax #TOKEN in the macro’s text will be replaced with a C string
    constant containing the text of TOKEN. #define RETURN_STR(S) return (#S) will
    replace the source code RETURN_STR(100-1) with return ("100-1"). It’s particularly
    handy for converting things like a condition statement into a string that describes
    the condition.


    •


    The special macros __FILE__ and __LINE__ are generated by the compiler and evaluate
    to the file name and line number of the source file being compiled. __func__,
    __DATE__, and __TIME__ are also very useful. __func__ is replaced with the current
    Objective-C method name as a C string. __DATE__ and __TIME__ expand to the date
    and time the compile was performed.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 14 ■ EXCEPTION HANDLING


    I usually take the macros in Listing 14-8 one step further, defining a set of
    macros that are only compiled during development (DevAssert, DevAssertObjectIsClass,
    …), a set that are compiled during development and beta testing (BetaAssert, BetaAssertObjectIsClass,
    …) and a set that are always compiled (RelAssert, RelAssertObjectIsClass, …).
    This allows me to graduate my use of assertions, producing progressively smaller
    and faster versions of my application, at the expense of safety.


