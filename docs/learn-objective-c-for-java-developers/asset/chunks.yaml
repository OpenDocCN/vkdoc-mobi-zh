  trans: "\n\n除了上一节中描述的消除冗余通知外，你的对象还可以通过另一种方式帮助键值观察框架。对于被大量观察的对象，你可以提供一个位置来存储关于该对象的观察信息，从而优化\
    \ KVO 性能。虽然 KVO 可以使用 `isa swizzling` 来改变对象的类，但它无法改变对象的结构或在其中存储任何新值。相反，KVO 会将对象的观察信息保存在一个全局集合中，每次属性发生变化时都必须查询该集合。\n\
    \n你可以通过为 KVO 提供一个 `void *observationInfo` 属性来减少这种开销，如 代码清单 19-6 所示。键值观察框架将使用此属性将对象的观察信息直接存储在对象内部。\n\
    \n**代码清单 19-6.** 提供本地键值观察信息存储\n\n```\n@interface KVOFriendly : NSObject {\n@private\n\
    \    void* observationInfo;\n}\n@property (assign) void *observationInfo;\n@end\n\
    \n@implementation KVOFriendly\n@synthesize observationInfo;\n@end\n```\n\n## 摘要\n\
    \n虽然在概念上与提供者/订阅者模式相似，但观察者模式提供了一套截然不同的解决方案。其主要优势在于，对于被观察对象而言，观察和通知在很大程度上是透明的，并且通常无需预先设计即可提供所需的通知。虽然基本属性会自动兼容键值观察，但某些属性可能需要添加一些额外代码才能完全支持\
    \ KVO。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n---\n\n# 第 20 章\n\
    ## 模型-视图-控制器模式\n\n模型-视图-控制器设计模式是计算机科学中最重要的设计模式之一。大多数模式解决的是特定问题，而模型-视图-控制器（MVC）描述的是一个对象系统的架构。它可以应用于独立的子系统或整个应用程序。模型-视图-控制器设计模式的定义也比许多其他模式更模糊，为不同的实现方式留下了很大的空间。它更像是一种理念，而非一种配方。\n\
    \n清晰理解 MVC 对于使用 Cocoa 至关重要，因为整个 Cocoa 框架（在适用的情况下）都是围绕模型-视图-控制器设计模式设计的。如果说 Java\
    \ 在许多任务中采用了 MVC，那么 Cocoa 则热切地拥抱了它。MVC 是 Cocoa 的灵魂。采用 MVC 设计将有助于你的开发，因为许多框架对象都被设计为能与\
    \ MVC 设计轻松集成。\n\n作为一个广泛的设计模式，本章内容涵盖广泛，涉及众多类和技术。（如果仅仅描述你可能已经熟悉的 MVC 设计模式，那本章将毫无用处）。为了实用起见，每节不仅描述设计理念，还会深入探讨你将用于实现这些理念的类、协议、框架和开发工具。例如，本章从基本的\
    \ MVC 设计原则开始，接着介绍绑定（用于实现 MVC 通信的技术）和 Interface Builder（用于连接 MVC 对象的开发工具）。关于视图对象的部分解释了视图对象的作用，然后进一步说明如何使用预构建的视图对象、如何创建自己的视图对象、这些视图对象如何绘制自身，以及\
    \ Cocoa 图形环境的基础知识。关于数据模型对象的部分不仅描述了数据模型对象的概念性角色，还介绍了一些可用于创建复杂数据模型的类和开发工具。简而言之，这是一章非常长的内容，所以请静下心来慢慢阅读。你应该在充分理解每个概念之后再进入下一个概念。\n\
    \n为了帮助你全面理解各部分内容，我创建了一个简单的玩井字棋的 Cocoa 应用程序。这个项目相对较小，涉及本章的大部分主题，并将用于说明其中许多概念。我建议你从\
    \ `http://www.apress.com` 的源码/下载部分下载该项目，以便了解每个概念如何融入整体。本章还有一节关于 Interface Builder（一个关键的\
    \ Cocoa 开发工具）以及它如何支持 MVC 设计模式的内容。在本章末尾，有一个简短的部分描述了项目中其他章节未涉及的一些值得注意的方面。\n\n模型-视图-控制器位于广泛的支持技术基础之上，处于设计金字塔的顶端。要掌握\
    \ MVC，你需要牢牢掌握支持它的技术。在尝试在 Cocoa 中处理 MVC 之前，你应该熟悉或回顾以下内容：\n\n*   Objective-C 消息（第\
    \ 6 章）\n*   非正式协议（第 5 章）\n*   委托（第 17 章）\n*   键值编码（第 10 章）\n*   键值观察（第 19 章）\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 理解模型-视图-控制器\n\n模型-视图-控制器设计模式的表述很简单：\n\
    \n*   数据模型对象封装信息。\n*   视图对象向用户显示信息。\n*   控制器对象执行操作。\n*   视图对象观察数据模型对象，并在数据变化时更新其显示。\n\
    *   视图对象收集用户输入并将其传递给执行操作的控制器对象。\n\n成功实现 MVC 设计的关键在于密切关注对象的作用以及这些对象之间的通信。前三条规则定义了对象的作用。\n\
    \n*   数据模型对象存储、封装和抽象化你的数据。它们不应包含特定于使应用程序运行的方法或逻辑。例如，数据模型类应实现序列化其数据的方法，但不应实现“另存为…”命令。即使这两个功能几乎相同，处理抽象数据转换的代码应在数据模型对象中实现，而实现用户命令的代码应在控制器对象中实现。\n\
    *   视图对象向用户显示数据模型中的信息。视图类的设计范围从极其通用到非常具体；框架提供了通用的视图类来显示几乎任何类型的字符串、数字或图像，而你则更有可能实现针对应用程序设计的非常具体的视图对象。视图对象还通过与用户交互并通过解释用户发起的事件（如鼠标移动和按键）来启动操作。它将那些事件转换为要传递给控制器对象执行的*操作*。事件和产生的操作通常非常简单；在按钮对象上单击鼠标会向控制器发送一个操作消息。复杂的交互，如拖放，则更为复杂。\n\
    *   控制器对象实现应用程序的操作。操作通常由视图对象响应用户事件而发起。\n\n模型-视图-控制器设计的另一个方面是数据模型、控制器和视图对象之间的通信。基本的通信路径如图\
    \ 20-1 所示。\n\n***图 20-1.** 基本的 MVC 通信*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n当用户执行某些操作时，例如键入键盘快捷键，视图对象会对其进行解释并向控制器对象发送*操作消息*。控制器对象执行该操作，这通常涉及向数据模型对象发送消息。当数据模型发生变化时，它会通过向视图对象发送消息来通知其观察者，视图对象随后更新显示。\n\
    \n### MVC 的变体\n"
- fmt: '# Model-View-Controller Pattern Variants


    There’s a lot of latitude to the basic MVC model. Roles can blend or use alternate
    communication paths.


    The next few sections describe the significant variants.


    ## Combined Controller and Data Model


    The controller and data model may be the same object, as shown in Figure 20-2.
    This is often the case when the data model is trivial. Technically, a single integer
    is a data model, but it would be a waste of your programming talent to create
    a data model class just to encapsulate one number. Instead, the value is stored
    in the controller and attached to a view object for display.


    **Figure 20-2.** *Combined controller and data model*


    This limits the modularity of your design, as described later in the chapter.
    But unless the data model and controller are inappropriately entangled, it should
    be easy to refactor your application into separate controller and data model classes
    in the future, without disrupting your design. The key is to keep the concept
    of the data model independent of your controller, even while they occupy the same
    object.


    ## Mediating Controller


    A popular variation of the Model-View-Controller design pattern is the mediated
    MVC pattern, as shown in Figure 20-3. This pattern appears repeatedly in the Cocoa
    framework; it’s the pattern adopted by the `NSController` classes, described towards
    the end of this chapter.


    **Figure 20-3.** *Mediated Model-View-Controller design pattern*


    In a mediated MVC design, the controller also acts as the data model for the view.
    It is a data model proxy. The mediating controller passes data model messages
    to the actual data model, and forwards any change notifications from the data
    model on to its observers.


    This design is particularly well suited to database applications. The data model
    object encapsulates the raw data. It takes responsibility for fetching the data
    from a persistent store, caching it, and performing any alterations to it. The
    controller object performs its normal role, but also presents the data, as it
    will appear in the application, to the view objects. This might involve filtering,
    sorting, and transforming the data. How the data is sorted, the user’s current
    selection in the table, and so on, are specific to the application, not the data.
    From the view object’s perspective, the controller is the data model. The view
    displays the sorted, filtered, and transformed data presented to it by the controller,
    and has no direct knowledge of the underlying data model.


    ## Direct View and Data Model Binding


    Often, there’s no “action” per se associated with a change to a displayed value.
    If the view object is displaying a simple value (a number, string, or Boolean),
    it can communicate changes directly to the data model object, as shown in Figure
    20-4.


    **Figure 20-4.** *Direct data model and view binding*


    The relationship between the data model property and the view is described as
    a binding. The view object displays the value and updates its display whenever
    the value changes (via observing). If the user edits the displayed value, the
    view object communicates that to the data model by setting the new value directly.
    Bindings are described in more detail later in this chapter.


    ## Other Variations


    Some other common variations to the basic MVC design pattern are as follows:


    - **View objects bound to controller properties:** It is often the case that view
    objects will be bound to property values of the controller object. For example,
    a controller might define data objects to hold a temporary transaction or the
    results of search. This isn’t an appropriate property for the data model; it is
    appropriate for the controller, but from the view’s perspective it’s a data model.


    - **Combined view and data model object:** A check box button maintains its current
    value (checked or unchecked) and is, in effect, its own data model. The controller
    may choose not to store the state of the check box, electing instead to query
    the state of the view object to learn its value. This isn’t a recommended pattern,
    but it is quite commonly used.


    # The Advantages of MVC


    So what’s all the fuss about MVC? At first blush, it seems like MVC creates a
    lot of additional work for the programmer, taking what could be a single object
    and breaking it up into multiple objects with complex communications. To create
    a custom button using MVC, for example, one would create a new cell subclass (see
    the Scaling section), override its drawing method, create a controller class,
    implement an action method, create instances of both classes, and attach them
    to an`NSButton` view object. If you think it would be simpler just to subclass`NSButton`
    and override its drawing and “mouse clicked” methods, you need to read this section.


    In a very small set of circumstances, you’d be right—it would be simpler to just
    subclass`NSButton`. But most applications aren’t that simple, or don’t remain
    that simple. MVC is, in many respects, like object-oriented programming itself.
    It’s a discipline that occasionally creates more work, but more often allows for
    the design of large, elegant, flexible, and sophisticated applications that are
    both comprehensible and well behaved.


    The following sections highlight some of the significant advantages of employing
    the Model-View-Controller design pattern.


    ## Modularity


    The Model-View-Controller design pattern is an extension of the computer science
    principles of separation of concern and encapsulation. It encourages you to identify
    the roles that your application plays and compartmentalize those roles into distinct
    objects.


    These principles improve your MVC design for all the same reasons they improve
    object-oriented programming in general. They localize interrelated functionality
    into containers with identifiable boundaries. Changes to a class tend to be localized.
    When the change affects other classes, it’s easier to analyze how they will be
    affected since the interface to the changed class is well defined.


    They can later be subclassed, replaced, or reused with little or no impact on
    the rest of your design.


    ## Flexibility


    One of the greatest strengths of the Model-View-Controller design pattern is its
    flexibility. By separating the data model and controller concerns from the display
    view, the two can be mixed and matched at will.


    MVC’s most powerful feature is probably the ability to effortlessly replace view
    objects, or use multiple view objects, without changing the data model or controller.
    You probably use many applications that exploit this feature every day. Here are
    two examples.


    Apple’s iTunes application uses several different view objects to display the
    contents of your music and video library. There’s a table list view, a browser,
    a thumbnail view, and a Cover Flow view. All four present the same information
    from the same data model, just in different ways. By separating the data model
    from the views, new views can be developed without making any changes to the data
    model or the other views. Even much of the controller logic, such as current song
    selection, drag and drop, the play song action, and getting info can all be implemented
    once and used interchangeably with any of the four views.'
