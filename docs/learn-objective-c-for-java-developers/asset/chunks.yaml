    conduit that can be connected to an NSPort can be used to create an NSConnection.


    Since you can create your own subclasses of NSPort, the possibilities are unlimited.


    The project commands that demonstrate this technique are ./Greeter --socket and
    ./Guest -


    -socket. The code can be found in the Greeter_main.m and Guest_main.m files.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 13 ■ COMMUNICATING NEAR AND FAR


    Run Loops


    Run loops are the engine that drives distributed objects. Run loops are described
    in more detail in Chapter 15.


    In the server examples above, the last step is to start a run loop that will process
    the events received by its NSPort object. To receive and dispatch asynchronous
    messages, an NSConnection must be driven by a run loop. Messages sent by clients
    are pushed onto the server’s NSPort. The run loop pops them off one at a time
    and dispatches them to the root object.


    It’s obvious that the server must use a run loop. What’s not obvious is that the
    client is also running a run loop. When the client sends a synchronous message
    (i.e., [server doSomething]), it pushes the message onto the NSPort and then starts
    a temporary run loop to wait for the response. The server receives the message
    and replies by sending a message back to the client. The client’s temporary run
    loop pops the reply off its NSPort and returns to the sender.


    Look again at the code for the Greeter and Guest example in Listing 13-4\. Consider
    the possibility that Greeter keeps a reference to the proxy Guest object and uses
    it to send another -listen: message after -greetGuest: has returned. If the client
    process was not running a run loop, the -listen: message would sit in the client’s
    NSPort forever, never to be executed. Since the method is synchronous, the Greeter
    object would hang, waiting for the Guest object to respond—or at least until the
    NSConnection timed out.


    To implement asynchronous, bidirectional, messaging between distributed objects,
    both processes must have active run loops.


    Asynchronous Messages


    As alluded to earlier, messages sent through an NSProxy can be synchronous or
    asynchronous. To create an asynchronous message, add the oneway keyword to the
    return value of the method’s interface.


    - (oneway void)doSomething;


    The message will be sent to the remote object, but execution will return immediately
    to the sender. oneway methods should always have a void return type. As mentioned
    in the “Run Loops”'
