- fmt: "```objc\n@property (assign) Chameleon *chameleon;\n\n@end\n\n@implementation\
    \ ReptileZoo\n\n@synthesize chameleon;\n\n@end\n\n…\n\nReptileZoo *zoo = [ReptileZoo\
    \ new];\n\nChameleon *chameleon1 = [Chameleon new];\n\nChameleon *chameleon2 =\
    \ [Chameleon new];\n\nWatcher *watcher = [Watcher new];\n\nchameleon1.color =\
    \ [NSColor blueColor];\n\nchameleon2.color = [NSColor redColor];\n```\n\n`zoo.chameleon\
    \ = chameleon1;`\n\n`[zoo addObserver:watcher forKeyPath:@\"chameleon.color\"\
    \ options:NSKeyValueObservingOptionNew context:NULL];`\n\n`chameleon1.color =\
    \ [NSColor greenColor];`\n\n`zoo.chameleon = chameleon2;`\n\nOutput:\n\n```\n\
    Property 'chameleon.color' of object '<ReptileZoo: 0x13a0c0>' changed: {\n   \
    \ kind = 1;\n    new = NSCalibratedRGBColorSpace 0 1 0 1;\n}\nProperty 'chameleon.color'\
    \ of object '<ReptileZoo: 0x13a0c0>' changed: {\n    kind = 1;\n    new = NSCalibratedRGBColorSpace\
    \ 1 0 0 1;\n}\n```\n\nThe watcher object in Listing 19-2 is set to watch the `color`\
    \ property of the `chameleon` property of the `zoo` object. It received two property\
    \ change notifications. The first was because the `color` property of `zoo`’s\
    \ current `chameleon` property was set directly. The second notification occurred\
    \ because the `chameleon` property was replaced with a different object, indirectly\
    \ changing the `color` of `zoo`’s `chameleon` property. In both cases, the observer\
    \ is notified of the complete path that was affected and its new value.\n\nWhen\
    \ registering to receive property change notifications, the notification includes\
    \ some information about the change in a change dictionary. There are four options,\
    \ chosen by logically ORing any of the constants in Table 19-2 together, that\
    \ control what information is included in the change dictionary and the order\
    \ notifications that are sent. If your observer isn’t interested in any of these\
    \ options, pass `0` in the `options:` parameter.\n\n**Table 19-2.** Key-Value\
    \ Observer Options\n\n| KVO Option | Effect |\n|------------|--------|\n| `NSKeyValueObservingOptionNew`\
    \ | Notification change dictionary includes the new value. |\n| `NSKeyValueObservingOptionOld`\
    \ | Notification change dictionary includes the previous value. |\n| `NSKeyValueObservingOptionInitial`\
    \ | A notification is sent immediately with the current value (before `-addObserver:...`\
    \ returns). |\n| `NSKeyValueObservingOptionPrior` | Each change sends two notifications:\
