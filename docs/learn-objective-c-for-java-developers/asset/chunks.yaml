    is described in Apple’s “Technical Note 2124: Mac OS X Debugging Magic.”1


    Prematurely Released Objects


    A problem closely related to overreleased objects is objects that are simply released
    prematurely—while there are still working references to it. The most common cause
    is releasing the object as a side-effect of setting a property or removing it
    from a collection. Listings 24-15 and 24-17 show two very common scenarios where
    objects are prematurely destroyed.


    Listin g 24-15\. Object Destroyed By Collection


    @implementation FIFO


    …


    - (id)pop


    {


    id object = [stack objectAtIndex:0];


    [stack removeObjectAtIndex:0];


    return object; // |object| does not exist!


    }


    @end


    In Listing 24-15, the objects in the FIFO are implicitly retained by the collection.
    To pop an object off the stack, the object is removed from the collection and
    returned to the sender. The problem is that the collection might be the object’s
    only owner. Removing it releases it, destroying the object. The


    -pop method then returns a pointer to a destroyed object. The solution is to re-autorelease
    the object, as shown in Listing 24-16.


    Listin g 24-16\. Re-autoreleasing an Object


    - (id)pop


    {


    id object = [[[stack objectAtIndex:0] retain] autorelease];


    [stack removeObjectAtIndex:0];


    return object;


    }


    The solution is to send -retain and -autorelease messages to the object before
    removing it from the collection. The additional -retain prevents the object from
    being immediately destroyed, and the -autorelease creates an autoreleased object
    suitable for return to the sender.


    1 Apple Inc., “Technical Note TN2124: Mac OS X Debugging Magic,” http://developer.apple.com/technotes/


    tn2004/tn2124.html, 2006.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 24 ■ MEMORY MANAGEMENT


    ■Note The pattern [[object retain] autorelease] is overused by many programmers
    new to Objective-C. It has its place, but usually indicates an attempt to apply
    memory management voodoo, rather than being a solution to a real problem.


    In Listing 24-17, an autoreleased object is returned from a property getter. The
    property is changed, releasing the previous object, while the object is still
    being referenced.


    Listin g 24-17\. Object Destroyed By Setter


    id two = [self two];


    [self setTwo:nil];


    // |two| does not exist!


    There are three solutions to this problem:


    • Use the setter pattern demonstrated in -setOne: found in Listing 24-10\. That
    setter autoreleases the previous object instead of releasing it immediately.


    • Explicitly retain the property object in the assignment (i.e., id two = [[[self
    two] retain]


    autorelease]), which will protect it from being released by the -setTwo: message.


    • Write the property getter to re-autorelease the object every time it is returned
    (i.e., return [[two retain] autorelease]).


    Of these solutions, the first is the preferred. It requires no involvement from
    the sender, preserves the autoreleased contract for returned property values,
    and is efficient. The second alternative should be used if you don’t have control
    over the class’s implementation. The last solution is inefficient, and is used
    incessantly by inexperienced programmers.


    Circular References


    One major problem with reference counting, for which there is no universal solution,
    is the problem of circular references. If two objects both retain references to
    the other, the objects will never be released.


    How you solve this will depend on your circumstances. One common solution is to
    store unretained or so-called weak references. This should not be confused with
    the term weak reference as it applies to garbage collection, so I’ll use the term
    unretained reference. Unretained references are typically used for delegate, observer,
    and parent object references. Listing 24-18 shows the interface for a node in
    an object tree that holds an unretained reference to its parent node.


    Listin g 24-18\. Unretained Object Property


    @interface TreeNode : NSObject {


    TreeNode *parent;


    NSMutableArray *children;


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 24 ■ MEMORY MANAGEMENT


    @property (assign) TreeNode *parent;


    …


    @end


    By using the assign property attribute, the parent property is not retained when
    set. The hazard is that the node could be removed from the tree, and later attempt
    to send a message to its parent object, which might not exist anymore. This approach
    is workable if you carefully engineer the object so that there’s no possibility
    that it will attempt to use any unretained references in a situation where those
    objects might have been released.


    The best solution to this type of problem is to add code that explicitly clears
    the parent reference before the node is removed from the tree. In the case where
    the reference is retained, this breaks the circular reference and allows the nodes
    to be destroyed. In the case where the reference is not retained, it ensures that
    the node won’t attempt to use a stale reference.


    Creating Autorelease Pools


    Normally, you don’t create autorelease pools yourself, but there are a few times
    where you must, and times where you might want to.'
  trans: '

    `ObjectAlloc` 追踪应用程序中所有 Objective-C 对象的生命周期。它记录每个对象何时被分配、保留、释放和销毁。它以图形方式呈现每个类的总实例数，使您能够快速识别一组被分配但从未释放的对象。您应偶尔在
    `ObjectAlloc` 的监视下运行应用程序，以查找对象泄漏。


    一旦发现泄漏，再次使用 `ObjectAlloc` 来检查发送给这些对象的 `+alloc`、`-retain`、`-release` 和 `-dealloc`
    消息的历史记录。实例的历史记录应能暴露失衡发生的位置。


    **过度释放或未充分保留的对象**


    过度释放或未充分保留的对象是指接收到一次过多 `-release` 消息的对象。该对象在其他对象仍持有对其的引用时被销毁。孤立的对象指针随后指向无效内存。使用无效对象指针的影响范围可能从不一致到灾难性。


    用于查找过度释放对象的最佳调试工具是 `NSZombie`，请勿与本书中的任何僵尸示例混淆。Objective-C 运行时内置了多种可通过环境变量启用的调试工具。表
    24-1 列出了最常用于查找过度释放对象的两个环境变量。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-464_1.jpg)


    第 24 章 ■ 内存管理


    **表 24-1.** `NSZombie` 环境变量


    | 环境变量 | 描述 |

    | --- | --- |

    | `NSZombieEnabled` | 如果设置为 `YES`，被销毁的对象将被替换为僵尸对象，该对象在收到任何消息时会抛出异常。 |

    | `NSAutoreleaseFreedObjectCheckEnabled` | 如果设置为 `YES`，自动释放池在尝试释放一个已被销毁的对象时会打印警告信息。
    |


    要使用这些工具，请设置所需的环境变量，并在启动应用程序时将该环境传递给它。其中一些功能也可以在应用程序中通过编程方式启用。


    僵尸对象在对象被销毁时创建。它不会被释放，而是将其类更改为特殊的僵尸类。它仍是一个对象，任何发送给该对象的消息都将抛出异常，帮助您识别哪个对象被过度释放了。一旦识别出来，您可以使用
    `ObjectAlloc` 工具来检查该对象的历史记录，并定位提前释放它的代码。


    图 24-2 显示了如何在 Xcode 中为可执行文件设置环境变量。


    **图 24-2.** 设置 `NSZombie` 调试环境变量


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 24 章 ■ 内存管理


    关于用于检测内存泄漏和过度释放错误的工具的完整描述，请参见苹果公司的“技术说明 TN2124：Mac OS X 调试魔法”。¹


    **提前释放的对象**


    与过度释放对象密切相关的一个问题是对象被简单地提前释放——当仍有活跃的引用指向它时。最常见的原因是在设置属性或从集合中移除对象时，作为副作用释放了对象。清单
    24-15 和 24-17 展示了两种非常常见的对象被提前销毁的场景。


    **清单 24-15.** 对象被集合销毁


    ```objectivec

    @implementation FIFO


    …


    - (id)pop


    {


    id object = [stack objectAtIndex:0];


    [stack removeObjectAtIndex:0];


    return object; // |object| 不存在！


    }


    @end

    ```


    在清单 24-15 中，`FIFO` 中的对象被集合隐式保留。要从栈中取出一个对象，需将其从集合中移除并返回给调用者。问题在于，集合可能是该对象的唯一所有者。移除它会释放该对象，从而销毁它。`-pop`
    方法随后返回一个指向已销毁对象的指针。解决方案是重新自动释放该对象，如清单 24-16 所示。


    **清单 24-16.** 重新自动释放对象


    ```objectivec

    - (id)pop


    {


    id object = [[[stack objectAtIndex:0] retain] autorelease];


    [stack removeObjectAtIndex:0];


    return object;


    }

    ```


    解决方案是在从集合中移除对象之前，向其发送 `-retain` 和 `-autorelease` 消息。额外的 `-retain` 防止对象被立即销毁，而
    `-autorelease` 则创建一个适合返回给调用者的自动释放对象。


    ¹ Apple Inc., “Technical Note TN2124: Mac OS X Debugging Magic,” http://developer.apple.com/technotes/

    tn2004/tn2124.html, 2006.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 24 章 ■ 内存管理


    ■ **注意** `[[object retain] autorelease]` 模式被许多 Objective-C 新手过度使用。它有其适用之处，但通常表明试图应用内存管理“玄学”，而非解决实际问题。


    在清单 24-17 中，从属性 getter 返回了一个自动释放的对象。随后更改属性，释放了之前的对象，而该对象仍在被引用。


    **清单 24-17.** 对象被设置器销毁


    ```objectivec

    id two = [self two];


    [self setTwo:nil];


    // |two| 不存在！

    ```


    对此问题有三种解决方案：


    *   使用清单 24-10 中的 `-setOne:` 所演示的设置器模式。该设置器会先自动释放之前的对象，而不是立即释放它。

    *   在赋值时显式保留属性对象（例如，`id two = [[[self two] retain] autorelease]`），这将保护它不被 `-setTwo:`
    消息释放。

    *   编写属性 getter，使其每次返回值时都重新自动释放该对象（例如，`return [[two retain] autorelease]`）。


    在这些解决方案中，第一种是首选方案。它不需要调用者的介入，保留了返回属性值的自动释放约定，并且高效。如果您无法控制类的实现，则应使用第二种方案。最后一种方案效率低下，并且常被经验不足的程序员无休止地使用。


    **循环引用**


    引用计数的一个主要问题是循环引用，对此没有通用解决方案。如果两个对象都持有了对彼此的引用，这两个对象将永远不会被释放。


    如何解决这个问题取决于具体情况。一种常见的解决方案是存储未保留的引用，即所谓的弱引用。这不应与垃圾回收中使用的术语“弱引用”混淆，因此我将使用术语“未保留引用”。未保留引用通常用于委托、观察者和父对象引用。清单
    24-18 展示了一个对象树中节点的接口，该节点持有对它的父节点的未保留引用。


    **清单 24-18.** 未保留的对象属性


    ```objectivec

    @interface TreeNode : NSObject {


    TreeNode *parent;


    NSMutableArray *children;


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 24 章 ■ 内存管理


    @property (assign) TreeNode *parent;


    …


    @end

    ```


    通过使用 `assign` 属性特性，设置 `parent` 属性时不会保留该属性。风险在于，该节点可能从树中被移除，随后尝试向其父对象发送消息，而父对象可能已不存在。如果您仔细设计对象，使其在那些对象可能已被释放的情况下，绝不可能试图使用任何未保留的引用，那么这种方法是可行的。


    对此类问题的最佳解决方案是添加代码，在节点从树中移除之前，显式清除对父节点的引用。在引用被保留的情况下，这打破了循环引用并允许节点被销毁。在引用未被保留的情况下，这确保了节点不会尝试使用过时的引用。


    **创建自动释放池**


    通常，您不会自己创建自动释放池，但在少数情况下您必须创建，或者您可能希望创建。

