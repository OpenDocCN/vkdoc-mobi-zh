    `debugger`是开发过程中不可或缺的工具，同时也是学习语言时极佳的沙盒环境。你可以编写代码、观察执行过程、检查结果，甚至修改数据。要试用沙盒笔记应用，请确保构建配置设置为`Debug`。在构建结果窗口（`Build`
    > `Build Results`）中完成此操作。要设置断点，点击代码左侧的行号空白区域。断点显示为蓝色标签，如图 4-13 所示。再次点击断点可禁用它。拖动断点可移动其位置，或将其拖出空白区域以删除。选择`Run`
    > `Debug`启动应用，使其在调试器控制下执行。


    ***图 4-13.** 停在 Xcode 调试器中断点处* 一旦在断点处停止，你可以从任何源代码窗口、使用菜单命令或主调试器窗口（`Run` > `Debugger`，如图
    4-13 所示）控制应用的执行。调试器窗口还会显示调用栈和局部变量。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 4 章 ■ 创建 Xcode 项目


    ### 创建沙盒应用


    在尝试代码时，沙盒应用非常有用。按照以下步骤快速创建一个简单的 Cocoa 应用，可用于测试代码，甚至可作为完整应用的基础：


    1. 使用 Cocoa 应用模板创建一个新项目。

    2. 在构建设置中启用垃圾回收。

    3. 向项目中添加一个新类。这是你的测试类。

    4. 为类添加一个动作。动作是一个方法，它接受一个对象标识符作为唯一参数，并返回`IBAction`，例如`- (IBAction)doSomething:(id)sender`。`IBAction`与`void`同义，因此动作实际上不返回任何值。`sender`参数是发送该动作的对象（即步骤
    8 中定义的按钮或菜单项）。它通常被忽略。

    5. 将测试代码添加到动作方法中。

    6. 打开`MainMenu` NIB 文档。

    7. 在 NIB 文档中创建测试类的一个实例。

    8. 向窗口添加一个按钮，或向菜单添加一个新的菜单项。

    9. 选择该按钮或菜单项，将其发送动作连接到步骤 4 中定义的动作方法。具体操作为：将发送动作连接器拖动到测试对象，释放鼠标按钮，然后选择该动作。


    现在你有了一个应用，点击按钮或从菜单中选择测试命令时，即可执行代码。如果需要可编辑参数，可以向窗口添加输入文本字段、复选框、滑块甚至日期选择器视图对象，并将它们绑定到测试类中的`IBOutlet`属性。Objective-C
    绑定会自动执行明显的类型转换。例如，如果你将文本字段绑定到一个整数属性值，字段中的文本将被转换为整数。


    随着需求增长，可以添加更多测试方法、按钮或菜单命令。


    还可以使用 Foundation 命令行工具创建更简单的环境：


    1. 使用 Foundation 工具模板创建一个新项目。

    2. 在构建设置中启用垃圾回收。

    3. 将测试代码添加到`main()`函数中。


    Foundation 工具没有图形用户界面，也不与 AppKit 框架链接。因此，它们无法访问处理图形或用户登录环境的类。


    应用的`main()`函数将在运行应用后立即执行。


    ## 总结


    现在你应该对如何使用 Xcode 开发应用以及创建自己的应用有了基本了解。几乎任何项目（无论是浏览器插件还是 iPhone 应用）的基本步骤和工具都大同小异。我提醒你，本章只是触及了
    Xcode 的表面。Xcode 本身既广泛又深入——已有整本书专门介绍它。请将本介绍视为在香榭丽舍大街的一次漫步，而非对巴黎的详尽游览。

