- fmt: 'If you need to create a binding programmatically—say, for a view object you
    created programmatically—send a `-bind:toObject:withKeyPath:options:` message
    to a Bindings-compliant observer.


    If you are creating custom view objects to display custom data, it’s more expedient
    to create an informal binding between the view and data model objects. This is
    just a fancy way of saying, “roll your own MVC communications.” Your custom view
    should implement the fundamental MVC communications using Objective-C messages,
    notifications, and observing. The view should use direct knowledge about the controller
    and data model, rather than trying to create an abstract, reusable view class
    that communicates through bindings. In the TicTacToe project, the `ChalkboardView`
    object is a good example. It displays a Tic Tac Toe game and sends “move” actions
    to its controller when the user clicks on the board. The object knows it is connected
    to a `TTTDocument` controller and it explicitly observes changes to its `game`
    property. The object conforms to the MVC design pattern, but isn’t abstracted
    beyond its purpose.


    ## Interface Builder


    Before I get too far into the details of view objects, events, and controllers,
    I’ll take a moment to shed some light on some of the “magic” of Cocoa application
    development. If you’re not used to developing with Cocoa—and I assume that you
    aren’t or you wouldn’t be reading this book—you are likely to open the TicTacToe
    project and start scratching your head. The Objective-C source code clearly implements
    the functionality of the objects, but you can sift through the code line by line
    and never find any of the following:


    - Code to create a document window, or any of the view objects in that window

    - Code that connects the document object to any of its view objects

    - Code that binds a view object to a controller or data model property

    - Code to connect view objects (like buttons and menu items) with the controller
    object that implements those actions


    All of these tasks are accomplished through Interface Builder, an essential development
    tool that makes Cocoa application development effortless and simultaneously mystifying.


    In a nutshell, Interface Builder edits NIB files. NIB files, which you remember
    from Chapter 4, contain an archived (serialized) representation of the objects
    you want to instantiate at runtime. The archived objects include properties and
    inter-object references. The NIB file is part of the application bundle. When
    a NIB file is “loaded” at runtime, the objects are unarchived; this instantiates
    the graph of objects, sets their properties, and connects any inter-object references.


    If you read Chapter 12 about archiving, what NIB files accomplish isn’t a great
    mystery. If you come from another development environment, keep in mind that Interface
    Builder is not a code generator. It does nothing but edit a virtual representation
    of the objects that will be instantiated at runtime via standard archive decoding.
    There’s no “magic” involved, nor is any code generated. The end result is identical
    to unarchiving a graph of objects that were previously created programmatically.


    If you understand that basic concept, Interface Builder’s role in development
    and how the objects in a NIB document get created and initialized ceases to be
    a mystery. It’s one thing to say “a view object sends an action message to its
    controller when the user clicks on it,” and another to actually implement it.
    In Cocoa development, that connection between those objects and the message that
    gets sent is (more often than not) defined in Interface Builder. Getting comfortable
    with Interface Builder is an important step in becoming a productive Cocoa developer.


    ### NIB Documents


    As mentioned earlier, Interface Builder (IB) is primarily a NIB document editor.
    In its modern form, Interface Builder edits an Interface Builder Document, which
    is the IB equivalent of a source file. The source file is compiled into its final
    binary form when the application is built. In the old days, Interface Builder
    would edit the actual binary archive file and there was no separate compilation
    phase; the NIB file was simply copied into the application bundle.


    NIB documents have names, and your application can have as many NIB documents
    as it needs. A Cocoa application designates one as the main NIB document, normally
    `MainMenu.nib`. The main NIB document is loaded during program initialization
    and should contain all of the standard view elements of the application. This
    invariably includes the menu objects, but might also include shared windows or
    other objects.


    The standard Cocoa document controller assigns a NIB document to every document
    type your application supports. When you open a document in the application, an
    instance of `NSDocument` is created and then its NIB file is loaded; this creates
    the `NSWindow` for the document and populates it with whatever additional view
    objects (buttons, fields, tables, tabs, toolbars, drawers, auxiliary windows,
    dialog windows, and custom objects) that it needs.


    In addition, you can create additional NIB documents and load them programmatically
    for any purpose you can conceive. For example, you might have a very complex document
    window that uses many different subviews. You could define that window and container
    views in the document’s NIB document, then define the view objects for each subview
    in auxiliary NIB documents which you would load programmatically as needed. The
    only thing you need to establish when loading a NIB document is the owner object,
    which is described a little later in the Owner Object section.


    ### The NIB Document Window


    When you open a NIB document in Interface Builder you see either graphical or
    symbolic representations of the objects in the NIB. You edit the properties of
    these objects using the various Inspector palettes. You can create new objects
    by dragging icons from the Library palette into the document. You can also reorganize
    and delete them.


    View objects (windows, controls, fields, menus) can also appear with a visual
    representation, much as they will when they’re instantiated by your application.
    A typical NIB document window is shown in Figure 20-5, with the graphical representation
    of the Window and view objects behind it. In most cases, the symbolic and visual
    representation of an object is synonymous.


    ### Object Properties


    Now that you understand that a NIB document simply contains the archived version
    of a graph of objects, it’s easy to understand Interface Builder properties. In
    Interface Builder you edit the properties of these objects using the various Inspector
    palettes. There are inspectors for the basic properties, as shown in Figure 20-5:
    size, position, resizing behavior, animation effects, connections, bindings, and
    so on.


    **Figure 20-5.** Interface Builder properties


    You can edit an object’s properties by selecting either its symbolic representation
    in the main NIB document window or its visual representation. In Figure 20-5,
    the Reset button properties can be edited by selecting either the `Push Button
    (Reset)` object or the Reset button in the window behind it.


    Overt properties such as an object’s title, size, and position can be directly
    manipulated by clicking, dragging, and resizing the visual representation of a
    view object.


    The properties you set are stored in the object’s archive stream and are implicitly
    restored when the NIB document is unarchived.


