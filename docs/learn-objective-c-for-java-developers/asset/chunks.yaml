  trans: '

    # 鼠标跟踪矩形与响应者链


    第二种方法是定义一个鼠标跟踪矩形。鼠标跟踪矩形定义了视图中需要跟踪鼠标的离散区域。当鼠标移入该区域、在区域内移动以及移出该区域时，它会通知你的对象。这比处理每一次鼠标移动要高效得多，但设置起来稍微复杂一些。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第 20 章 ■ 模型-视图-控制器模式


    1. 在一个对象中实现 `-mouseEntered:`、`-mouseExited:`、`-mouseMoved:` 和 `-cursorUpdate:`
    方法。该对象可以是你的视图对象，也可以是其他对象。

    2. 使用要跟踪区域的矩形（以视图坐标表示）以及在步骤 1 中创建的所有者对象，创建一个 `NSTrackingArea` 对象。你还可以指定额外的跟踪选项，或提供一个上下文信息字典。

    3. 通过向 `NSView` 对象发送 `-addTrackingArea:` 消息，将 `NSTrackingArea` 对象附加到该视图上。


    一旦附加完成，所有者对象将接收到鼠标进入、移动、离开以及光标更新事件。


    ## 响应者链


    响应者链是从第一响应者开始，沿对象层级向上的一系列对象。响应者链是确定应用程序如何响应命令和其他操作的主要机制。


    完整的响应者链如图 20-15 所示。


    ***图 20-15.** 响应者链*


    响应者链通过检查链中的每个对象是否响应（即实现）给定的消息，来处理操作消息（形式为 `-(IBAction)action:(id)sender` 的 Objective-C
    消息）。如果对象响应，则接收该消息。否则，该过程会继续检查链中的下一个对象，直到找到能响应消息的对象，或者没有更多对象为止。


    图 20-15 中的两个第一响应者需要稍加解释：第一响应者是界面中作为“焦点”的单个对象。当窗口失去关键窗口状态时，它会记住之前作为其第一响应者的对象。这将成为窗口的初始第一响应者。当窗口成为关键窗口时——假设在此过程中没有其他视图成为第一响应者——初始第一响应者会自动成为第一响应者。当关键窗口和主窗口不同时，响应者链从第一响应者开始，经过关键窗口，然后到达主窗口的初始第一响应者。


    图 20-15 中的许多响应者链部分是可选的，实际中很少会遇到遍历整个链的情况。如果关键窗口没有第一响应者对象，响应者链从关键窗口本身开始。如果关键窗口和主窗口相同，则响应者的父视图层级只会被遍历一次。没有控制器的窗口不会在链中包含窗口控制器。非文档窗口没有控制器或文档对象，会直接跳转到应用程序。窗口和应用程序对象可能没有委托。非基于文档的应用程序没有文档控制器对象，因此这些应用程序中的响应者链以应用程序或其委托结束。


    如果你正在开发 iPhone 应用程序，响应者链的原理是相同的。响应者链本身往往相当简单。iPhone 应用程序一次只显示一个 `UIWindow`，因此关键窗口和主窗口始终是同一个。传递给
    `UIView` 的操作会先传递给它的 `UIViewController`（如果有的话），然后再传递给其父 `UIView`。


    ## 操作消息


    操作、菜单状态查询、服务和错误解释都通过响应者链进行过滤。解释响应者链如何与应用程序集成的最简单方法是使用一个例子。以图 20-14 中描绘的应用程序为例，考虑四个菜单命令：复制、关闭、保存和新建。每个命令都会向第一响应者发送一个操作消息（分别是
    `-copy:`、`-performClose:`、`-saveDocument:` 和 `-newDocument:`）。


    - `-copy:` 操作消息被发送给第一响应者。图 20-14 中的第一响应者是一个实现了剪贴板功能的可编辑文本字段。它通过将当前选中的内容传输到应用程序的粘贴板（剪贴板）来响应
    `-copy:` 消息。

    - 第一响应者没有实现 `-performClose:` 方法，它的任何父视图也没有实现。关键窗口实现了该方法，并通过关闭自身来响应 `-performClose:`
    消息。

    - 第一响应者没有实现 `-saveDocument:` 消息。它的任何父视图、关键窗口、关键窗口的委托、主窗口中的视图、主窗口、主窗口的委托或窗口控制器也都未实现。`NSDocument`
    对象是负责文档管理的对象，也是实现“保存”和“另存为…”命令的对象。它通过将活动文档的内容编码并写入文件来响应 `-saveDocument:` 消息。

    - `-newDocument:` 消息会经过响应者链中的每一个对象，直到到达为基于文档的应用程序创建的单个文档控制器对象。文档控制器会创建一个新文档，并打开一个无标题的窗口。


    应用程序对命令的响应会随着响应者链状态的变化而改变：


    - 如果另一个视图对象是第一响应者，应用程序可能不响应“复制”命令。

    - 应用程序中的其他窗口会忽略“关闭”操作，因为它们不在响应者链中。

    - 如果主窗口不是文档窗口，其响应者链中将没有 `NSDocument` 对象，因此该窗口不会响应“保存”操作。

    - 应用程序始终响应“新建”命令，因为链中的顶层对象会一致地响应它。


    ## 发送操作消息


    发送给特定对象的操作消息称为定向操作。发送给响应者链的操作称为非定向操作。一个操作由一个 Objective-C 消息标识符（`SEL`）和一个对象标识符（`id`）组成。如果目标标识符指向一个对象，则为定向操作。如果目标标识符为
    `nil`，则为非定向操作。


    操作通过向 `NSApplication` 对象发送 `-sendAction:to:from:` 消息来执行。目标（`to:`）参数要么是一个对象（定向），要么是
    `nil`（非定向）。应用程序会判断目标是否响应该操作，或者尝试在响应者链中找到一个响应该操作的目标。如果成功，目标对象会收到该操作消息，并且 `-sendAction:to:from:`
    返回 `YES`。你可以通过编程方式发送操作，但 `NSControl` 视图、菜单项和键盘等效键通常会为你发送它们。


    在 Interface Builder 中，操作被定义为消息/对象对。如果操作直接连接到 NIB 文档中的另一个对象，则定义了一个定向操作。将操作连接到“第一响应者”占位符
    NIB 对象会创建一个非定向操作，该操作将在运行时传递给当前的第一响应者。


    ## 菜单操作


    Cocoa 应用程序中的菜单项是响应者链的另一个重要应用。当你下拉一个应用程序菜单时，只有那些适用于当前界面状态的菜单项才会被启用。不合适的菜单项则会被禁用。

    '
- fmt: "# The Cocoa Framework and the Responder Chain\n\nThe Cocoa framework determines\
    \ this dynamically by examining the objects in the responder chain. Each menu\
    \ item is associated with an action. When the user drops down a menu, the responder\
    \ chain is searched to find objects that will respond to each item in the menu.\
    \ If there’s an object in the chain that responds to an action, that menu item\
    \ is enabled. If not, it’s disabled.\n\n**Note:** You can search the responder\
    \ chain for objects yourself using `-[NSApplication targetForAction:to:from:]`.\n\
    \nThe beauty of this system is that views and controllers do not spend any time\
    \ or effort determining what menu items should be enabled. It’s determined empirically,\
    \ based on the collection of objects in the responder chain.\n\nTo implement a\
    \ menu command in an application that performs some function and is automatically\
    \ enabled and disabled, do the following:\n\n1. In the object responsible for\
    \ implementing the command, create an action method:\n\n   ```\n   -(IBAction)action:(id)sender\n\
    \   ```\n\n2. Create a menu item in Interface Builder and set its action to the\
    \ message identifier in step 1, connected to the first responder.\n\nThat’s it.\
    \ That’s all you have to do. The actions sent by the menu item will be automatically\
    \ connected to the appropriate object in the responder chain, or disabled otherwise.\n\
    \nIn the TicTacToe project, the `TTTDocument` object implements two actions: `-reset:`\
    \ and `-playForPlayer:`. The menu items *Reset* and *Play One Move* send these\
    \ actions. There’s also a *Reset* button that sends the same action. Open and\
    \ close TicTacToe document windows and see how this affects the state of the menu\
    \ items.\n\n## Disabling Action Menu Items\n\nWhile the automatic appearance of\
    \ menu items based on the objects in the responder chain is cool, there are situations\
    \ where an object in the responder chain implements an action, but the action\
    \ is still not always appropriate. The Cocoa framework makes this easy to accomplish,\
    \ again using the responder chain.\n\nI omitted a step about menu items in the\
    \ previous section. Once the responder to a menu item is located, the menu framework\
    \ checks to see if it implements a `-validateMenuItem:` method. If it does, it\
    \ gives the object a chance to disable the item by sending it that message, passing\
    \ the menu item to consider. If the object returns `YES`, the menu item is enabled.\
    \ Otherwise, it’s disabled just as if the object did not respond to the action.\n\
    \nIn the TicTacToe project, both the *Reset* and *Play One Move* menu items send\
    \ actions to the responder chain. Without doing anything else, both would be enabled\
    \ as long as the document object is in the responder chain. But the game’s reset\
    \ command only makes sense once the game has started, and the play command is\
    \ only applicable when it is the user’s move. Listing 20-7 implements a `-validateMenuItem:`\
    \ method that accounts for these conditions.\n\n**Listing 20-7.** Menu Item Validation\
    \ Method\n\n```objective-c\n- (BOOL)validateMenuItem:(NSMenuItem*)menuItem\n{\n\
    \    if ([menuItem action]==@selector(reset:)) {\n        return game.isStarted;\n\
    \    } else if ([menuItem action]==@selector(playForPlayer:)) {\n        return\
    \ (game.nextPlayer==USER_PLAYER);\n    }\n    return [super validateMenuItem:menuItem];\n\
    }\n```\n\nThe code in Listing 20-7 examines the `menuItem` to determine which\
    \ command is being validated. It then determines whether the menu item should\
    \ be enabled or not, based on the state of the game. This implementation identifies\
    \ the menu item by the action that it sends. Another popular technique is to assign\
    \ unique tag values to the menu items in Interface Builder, which make them easy\
    \ to identify (i.e., `if ([menuItem tag]==1001) …`). You can use any identification\
    \ method you choose. Your object will only receive `-validateMenuItem:` messages\
    \ for the actions it responds to.\n\n## Designing with the Responder Chain\n\n\
    The responder chain is also used for some other miscellaneous purposes. It’s used\
    \ to translate error objects (see Chapter 14) and to determine what services are\
    \ available (services is a plug-in architecture that lets other applications interact\
    \ with yours).\n\nThe responder chain will deeply influence how, and specifically\
    \ where, you implement the functionality of your applications. When designing\
    \ Cocoa applications, keep these guidelines in mind: Implement a menu item action\
    \ in the object that’s in the responder chain when the menu command is applicable,\
    \ and not in the chain when it isn’t.\n\nIn general, actions should be implemented\
    \ in the root object that encompasses the domain of the action:\n\n- A command\
    \ that reads or writes the document should be implemented in the document object,\
    \ not the window.\n- Actions that change the state of the data model should be\
    \ implemented in the controller or data model object, not the view.\n- Views should\
    \ implement editing actions directly, but the final change should be sent as a\
    \ discrete action to a controller or data model.\n\nImplement your target action\
    \ in the logically correct object in the hierarchy, even if it duplicates a function\
    \ elsewhere and does nothing but send a single message to another object. It’s\
    \ easier than trying to fight the organization of the responder chain.\n\nThat\
    \ finally brings us to the end of view objects. Your application’s entire look\
    \ and feel is implemented by view objects, so they have a lot to do. The next\
    \ couple of sections will explore data model objects and, finally, controller\
    \ objects.\n\n# Data Models\n\nA data model is essentially any object that holds\
    \ the data of your application. The form the data takes, how it gets used, and\
    \ how it’s presented to the user is as varied as there are applications. There\
    \ are four general types of data model objects in a Cocoa application: legacy\
    \ table and tree data sources, collection controllers, Core Data objects, and\
    \ custom classes.\n\n## Legacy Table and Tree Models\n\nLike Swing, Cocoa provides\
    \ views that display a collection of objects as tables and trees. These can interface\
    \ with a legacy data model provider, very similar to that in Swing, or be bound\
    \ to an `NSObjectController` object. The equivalent view and data source classes\
    \ are listed in Table 20-7.\n\n**Table 20-7.** Collection View Classes\n\n| Swing\
    \                          | Cocoa                  |\n| ------------------------------\
    \ | ---------------------- |\n| `javax.swing.JTable`           | `NSTableView`\
    \          |\n| `javax.swing.table.TableModel` | `NSTableDataSource`    |\n| `javax.swing.table.TableCellRenderer`\
    \ | `NSCell`          |\n| `javax.swing.table.JTableHeader` | `NSTableHeaderView`\
    \ |\n| `javax.swing.table.TableColumn` | `NSTableColumn`      |\n| `javax.swing.JTree`\
    \            | `NSOutlineView`, `NSBrowserView` |\n| `javax.swing.tree.TreeModel`\
    \   | `NSOutlineViewDataSource` |\n| `javax.swing.tree.TreeCellRenderer` | `NSCell`\
    \          |\n\nIf you’re used to working with Swing tables and trees, you’ll\
    \ be very comfortable with the Cocoa classes. The architecture of each is remarkably\
    \ similar:\n\n- `NSTableView` implements a tabular view of a collection of data.\n\
    - The data for a table is supplied by a `dataSource` object that conforms to the\
    \ `NSTableDataSource` informal protocol.\n- Cell renderers are subclasses of `NSCell`.\n\
    - An `NSTableView` has a collection of `NSTableColumn` objects that define the\
    \ title and cell renderer for each column in the table.\n- `NSOutlineView` displays\
    \ a tree of data in a hierarchical view where parent nodes can be expanded and\
    \ collapsed, and subnodes are indented.\n- The data for an outline is supplied\
    \ by a `dataSource` object that conforms to the `NSOutlineViewDataSource` informal\
    \ protocol.\n- Unlike Java, `NSOutlineView` is a subclass of `NSTableView`, where\
    \ it inherits its column and cell behavior. The equivalent of a tree view in Swing\
    \ is a single column `NSOutlineView`. One column is designated as the tree; the\
    \ rest of the view can display other tabular data associated with each node. The\
    \ List view in the Finder is an example of an outline view.\n- `NSBrowserView`\
    \ is an alternate tree viewer that displays each level of tree in separate columns."
  raw: 'The Cocoa framework determines this dynamically by examining the objects in
    the responder chain. Each menu item is associated with an action. When the user
    drops down a menu, the responder chain is searched to find objects that will respond
    to each item in the menu. If there’s an object in the chain that responds to an
    action, that menu item is enabled. If not, it’s disabled.


    ■Note You can search the responder chain for objects yourself using -[NSApplication
    targetForAction: to:from:].


    The beauty of this system is that views and controller do not spend any time or
    effort determining what menu items should be enabled. It’s determined empirically,
    based on the collection of objects in the responder chain.


    To implement a menu command in an application that performs some function and
    is automatically enabled and disabled, do the following:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    1\. In the object responsible for implementing the command, create an action method:


    -(IBAction)action:(id)sender.


    2\. Create a menu item in Interface Builder and set its action to the message
    identifier in step 1, connected to the first responder.


    That’s it. That’s all you have to do. The actions sent by the menu item will be
    automatically connected to the appropriate object in the responder chain, or disabled
    otherwise.


    In the TicTacToe project, the TTTDocument object implements two actions: -reset:
    and


    -playForPlayer:. The menu items Reset and Play One Move send these actions. There’s
    also a Reset button that sends the same action. Open and close TicTacToe document
    windows and see how this affects that state of the menu items.


    Disabling Action Menu Items


    While the automatic appearance of menu items based on the objects in the responder
    chain is cool, there are situations where an object in the responder chain implements
    an action, but the action is still not always appropriate. The Cocoa framework
    makes this easy to accomplish, again using the responder chain.


    I omitted a step about menu items in the previous section. Once the responder
    to a menu item is located, the menu framework checks to see if it implements a
    -validateMenuItem: method. If it does, it gives the object a chance to disable
    the item by sending it that message, passing the menu item to consider. If the
    object returns YES, the menu item is enabled. Otherwise, it’s disabled just as
    if the object did not respond to the action.


    In the TicTacToe project, both the Reset and Play One Move menu items send actions
    to the responder chain. Without doing anything else, both would be enabled as
    long as the document object is in the responder chain. But the game’s reset command
    only makes sense once the game has started, and the play command is only applicable
    when it is the user’s move. Listing 20-7 implements a


    -validateMenuItem: method that accounts for these conditions.


    Listin g 20-7\. Menu Item Validation Method


    - (BOOL)validateMenuItem:(NSMenuItem*)menuItem


    {


    if ([menuItem action]==@selector(reset:)) {


    return game.isStarted;


    } else if ([menuItem action]==@selector(playForPlayer:)) {


    return (game.nextPlayer==USER_PLAYER);


    }


    return [super validateMenuItem:menuItem];


    }


    The code in Listing 20-7 examines the menuItem to determine which command is being
    validated. It then determines whether the menu item should be enabled or not,
    based on the state of the game. This implementation identifies the menu item by
    the action that it sends. Another popular technique is to assign unique tag values
    to the menu items in Interface Builder, which make them easy to identify (i.e.,
    if ([menuitem tag]==1001) …). You can use any identification method you choose.
    Your object will only receive -validateMenuItem: messages for the actions it responds
    to.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    Designing with the Responder Chain


    The responder chain is also used for some other miscellaneous purposes. It’s used
    to translate error objects (see Chapter 14) and to determine what services are
    available (services is a plug-in architecture that lets other applications interact
    with yours).


    The responder chain will deeply influence how, and specifically where, you implement
    the functionality of your applications. When designing Cocoa applications, keep
    these guidelines in mind: Implement a menu item action in the object that’s in
    the responder chain when the menu command is applicable, and not in the chain
    when it isn’t.


    In general, actions should be implemented in the root object that encompasses
    the domain of the action:


    • A command that reads or writes the document should be implemented in the document
    object, not the window.


    • Actions that change the state of the data model should be implemented in the
    controller or data model object, not the view.


    • Views should implement editing actions directly, but the final change should
    be sent as a discrete action to a controller or data model.


    Implement your target action in the logically correct object in the hierarchy,
    even if it duplicates a function elsewhere and does nothing but send a single
    message to another object. It’s easier than trying to fight the organization of
    the responder chain.


    That finally brings us to the end of view objects. Your application’s entire look
    and feel is implemented by view objects, so they have a lot to do. The next couple
    of sections will explore data model objects and, finally, controller objects.


    Data Models


    A data model is essentially any object that holds the data of your application.
    The form the data takes, how it gets used, and how it’s presented to the user
    is as varied as there are applications. There are four general types of data model
    objects in a Cocoa application: legacy table and tree data sources, collection
    controllers, Core Data objects, and custom classes.


    Legacy Table and Tree Models


    Like Swing, Cocoa provides views that display a collection of objects as tables
    and trees. These can interface with a legacy data model provider, very similar
    to that in Swing, or be bound to an NSObjectController object. The equivalent
    view and data source classes are listed in Table 20-7.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    ***Table 20-7.** Collection View Classes*


    Swing


    Coc oa


    javax.swing.JTable NSTableView


    javax.swing.table.TableModel NSTableDataSource


    javax.swing.table.TableCellRenderer NSCell


    javax.swing.table.JTableHeader NSTableHeaderView


    javax.swing.table.TableColumn NSTableColumn


    javax.swing.JTree NSOutlineView,


    NSBrowserView


    javax.swing.tree.TreeModel NSOutlineViewDataSource


    javax.swing.tree.TreeCellRenderer NSCell


    If you’re used to working with Swing tables and trees, you’ll be very comfortable
    with the Cocoa classes. The architecture of each is remarkably similar:


    • NSTableView implements a tabular view of a collection of data.


    • The data for a table is supplied by a dataSource object that conforms to the
    NSTableDataSource informal protocol.


    • Cell renderers are subclasses of NSCell.


    • An NSTableView has a collection of NSTableColumn objects that define the title
    and cell renderer for each column in the table.


    • NSOutlineView displays a tree of data in a hierarchical view where parent nodes
    can be expanded and collapsed, and subnodes are indented.


    • The data for an outline is supplied by a dataSource object that conforms to
    the NSOutlineViewDataSource informal protocol.


    • Unlike Java, NSOutlineView is a subclass of NSTableView, where it inherits its
    column and cell behavior. The equivalent of a tree view in Swing is a single column
    NSOutlineView. One column is designated as the tree; the rest of the view can
    display other tabular data associated with each node. The List view in the Finder
    is an example of an outline view.


    • NSBrowserView is an alternate tree viewer that displays each level of tree in
    separate columns.'
  trans: "\n# Cocoa 框架与响应者链\n\nCocoa 框架通过检查响应者链中的对象来动态确定菜单项的状态。每个菜单项都与一个动作相关联。当用户下拉菜单时，框架会搜索响应者链，以找到能响应菜单中每个项的对象。如果链中存在能响应某个动作的对象，则启用该菜单项；否则，将其禁用。\n\
    \n**注意：** 您可以使用 `-[NSApplication targetForAction:to:from:]` 自行搜索响应者链中的对象。\n\n\
    这个系统的妙处在于，视图和控制器无需花费任何时间或精力来决定哪些菜单项应该启用。菜单项的状态是根据响应者链中对象的集合，通过经验方法自动确定的。\n\n要在应用程序中实现一个执行特定功能并能自动启用和禁用的菜单命令，请执行以下步骤：\n\
    \n1.  在负责实现命令的对象中，创建一个动作方法：\n\n    ```\n    -(IBAction)action:(id)sender\n   \
    \ ```\n\n2.  在 Interface Builder 中创建一个菜单项，并将其动作设置为步骤 1 中的消息标识符，**连接到第一响应者**。\n\
    \n仅此而已。这就是您需要做的全部工作。菜单项发送的动作将自动连接到响应者链中的适当对象，否则该菜单项将被禁用。\n\n在 TicTacToe 项目中，`TTTDocument`\
    \ 对象实现了两个动作：`-reset:` 和 `-playForPlayer:`。菜单项 *Reset* 和 *Play One Move* 会发送这些动作。此外，还有一个\
    \ *Reset* 按钮也会发送相同的动作。打开和关闭 TicTacToe 文档窗口，观察这对菜单项状态的影响。\n\n## 禁用动作菜单项\n\n虽然根据响应者链中的对象自动调整菜单项外观的功能很酷，但有些情况下，响应者链中的某个对象实现了某个动作，但该动作并非总是不合时宜。Cocoa\
    \ 框架再次利用响应者链，让实现这一目标变得简单。\n\n在前一节中，我遗漏了一个关于菜单项的步骤。一旦定位到菜单项的响应者，菜单框架会检查它是否实现了 `-validateMenuItem:`\
    \ 方法。如果实现了，框架会通过发送该消息，并将待检查的菜单项作为参数传递，从而给该对象一个禁用菜单项的机会。如果对象返回 `YES`，则启用菜单项。否则，菜单项将被禁用，效果如同该对象未响应此动作。\n\
    \n在 TicTacToe 项目中，*Reset* 和 *Play One Move* 这两个菜单项都会向响应者链发送动作。如果不做任何其他处理，只要文档对象在响应者链中，两个菜单项都将处于启用状态。但是，游戏的复位命令只有在游戏开始后才有意义，而落子命令仅在轮到用户操作时才适用。清单\
    \ 20-7 实现了一个 `-validateMenuItem:` 方法，用于处理这些情况。\n\n**清单 20-7.** 菜单项验证方法\n\n```objective-c\n\
    - (BOOL)validateMenuItem:(NSMenuItem*)menuItem\n{\n    if ([menuItem action]==@selector(reset:))\
    \ {\n        return game.isStarted;\n    } else if ([menuItem action]==@selector(playForPlayer:))\
    \ {\n        return (game.nextPlayer==USER_PLAYER);\n    }\n    return [super\
    \ validateMenuItem:menuItem];\n}\n```\n\n清单 20-7 中的代码检查 `menuItem` 以确定正在验证哪个命令。然后，它根据游戏的当前状态决定是否应该启用该菜单项。这种实现方式通过菜单项发送的动作来识别它。另一种常用的技术是在\
    \ Interface Builder 中为菜单项分配唯一的标签值，以便于识别（例如，`if ([menuItem tag]==1001) …`）。您可以选择任何喜欢的识别方法。您的对象只会接收到它所响应的动作的\
    \ `-validateMenuItem:` 消息。\n\n## 使用响应者链进行设计\n\n响应者链也用于其他一些杂项目的。例如，它用于转换错误对象（参见第\
    \ 14 章）以及确定哪些服务可用（服务是一种插件架构，允许其他应用与您的应用交互）。\n\n响应者链将深刻影响您如何以及具体在何处实现应用的功能。在设计\
    \ Cocoa 应用时，请牢记以下准则：在菜单命令适用时位于响应者链中的对象中实现菜单项动作，而在不适用时将该对象从链中移除。\n\n通常，动作应在涵盖该动作领域的最根对象中实现：\n\
    \n-   读取或写入文档的命令应在文档对象中实现，而不是在窗口中。\n-   改变数据模型状态的动作应在控制器或数据模型对象中实现，而不是在视图中。\n\
    -   视图应直接实现编辑动作，但最终的更改应作为离散动作发送给控制器或数据模型。\n\n在层级结构中逻辑正确的对象中实现您的目标动作，即使这会导致功能重复（除了向另一个对象发送单个消息外什么都不做）。这比试图对抗响应者链的组织方式要容易得多。\n\
    \n至此，我们终于讲完了视图对象。您的应用的整个外观和感觉都是由视图对象实现的，因此它们承担了很多工作。接下来的几个部分将探讨数据模型对象，最后是控制器对象。\n\
    \n# 数据模型\n\n数据模型本质上是任何持有应用数据的对象。数据采取的形式、如何使用以及如何呈现给用户，因应用而异，千差万别。在 Cocoa 应用中，有四种通用类型的数据模型对象：传统表和树数据源、集合控制器、Core\
    \ Data 对象以及自定义类。\n\n## 传统表和树模型\n\n与 Swing 类似，Cocoa 提供了将对象集合显示为表格和树的视图。这些视图可以与传统的、与\
    \ Swing 非常相似的数据模型提供者接口，也可以绑定到 `NSObjectController` 对象。等效的视图和数据源类列于表 20-7。\n\n\
    **表 20-7.** 集合视图类\n\n| Swing                          | Cocoa                \
    \  |\n| ------------------------------ | ---------------------- |\n| `javax.swing.JTable`\
    \           | `NSTableView`          |\n| `javax.swing.table.TableModel` | `NSTableDataSource`\
    \    |\n| `javax.swing.table.TableCellRenderer` | `NSCell`          |\n| `javax.swing.table.JTableHeader`\
    \ | `NSTableHeaderView` |\n| `javax.swing.table.TableColumn` | `NSTableColumn`\
    \      |\n| `javax.swing.JTree`            | `NSOutlineView`, `NSBrowserView`\
    \ |\n| `javax.swing.tree.TreeModel`   | `NSOutlineViewDataSource` |\n| `javax.swing.tree.TreeCellRenderer`\
    \ | `NSCell`          |\n\n如果您习惯于使用 Swing 中的表格和树，那么您会非常熟悉 Cocoa 的类。两者的架构惊人的相似：\n\
    \n-   `NSTableView` 实现数据集合的表格视图。\n-   表格数据由一个符合 `NSTableDataSource` 非正式协议的 `dataSource`\
    \ 对象提供。\n-   单元格渲染器是 `NSCell` 的子类。\n-   一个 `NSTableView` 拥有一系列 `NSTableColumn`\
    \ 对象，这些对象定义了表格中每列的标题和单元格渲染器。\n-   `NSOutlineView` 以分层视图显示数据树，父节点可以展开和折叠，子节点可以缩进。\n\
    -   大纲视图的数据由一个符合 `NSOutlineViewDataSource` 非正式协议的 `dataSource` 对象提供。\n-   与 Java\
    \ 不同，`NSOutlineView` 是 `NSTableView` 的子类，并继承其列和单元格行为。在 Swing 中，等效的树视图是一个单列的 `NSOutlineView`。其中一列被指定为树；视图的其余部分可以显示与每个节点关联的其他表格数据。Finder\
    \ 中的列表视图就是大纲视图的一个例子。\n-   `NSBrowserView` 是另一种树形查看器，它在不同的列中显示树的每一层。\n"
- fmt: '# The data is obtained from the view’s delegate object. The `Column` view
    in the `Finder` is an example of a browser.


    Your data source object must conform to an informal protocol, either `NSTableDataSource`
    or `NSOutlineViewDataSource`. The protocol defines a number of required methods
    that supply cell and node data to the view. There are also a number of optional
    methods, many of which define whether the cells in the view are editable or not.
    If you omit these methods, the collection is immutable and the view is display
    only.


    > **Caution** A common mistake is to overlook the fact that `NSCell` conforms
    to `NSCopying`. `NSCell` objects get copied—a lot. If you subclass `NSCell`, you
    must make sure it still conforms to the `NSCoping` protocol. You may have to override
    `-copyWithZone:`.


    iPhone developers will find a similar, but vastly simplified, set of view classes
    for displaying tables and lists. The principal class is `UITableView`. It communicates
    with objects that conform to `UITableViewDelegate` and `UITableViewDataSource`
    in much the same way that `NSTableView` uses an `NSTableDataSource` object. `UITableView`
    splits its queries between its delegate, which provides display and behavior properties,
    and its data source, which provides individual cell values. In practice, the two
    sources are often the same object—usually the view’s controller. These are the
    only data sources for iPhone table views, since the iPhone OS does not support
    the `Cocoa bindings` technology that allows collection controllers, described
    in the next section, to work.


    While the traditional data source objects are considered “legacy” interfaces,
    they still afford a few advantages. They are particularly well suited to data
    that’s generated dynamically. They can provide better performance than the modern
    data model interfaces. And they’re similar in organization to other frameworks,
    like `Swing`, which might make porting easier.


    ## Collection Controllers


    The “modern” way of populating an `NSTableView`, `NSOutlineView`, `NSBrowser`,
    or any other collection view is by binding the content property of the view to
    an `NSArrayController` or `NSTreeController`. The advantage is that you don’t
    have to create your own data model or data source class, just bind your existing
    compatible data model—typically an `NSArray`—to the controller and the controller
    to the view; the framework takes care of the rest. How to create the bindings
    is not entirely intuitive. Unlike the traditional data source method, which is
    connected to the table view object, table bindings are set for each column:


    - Bind the individual columns of a table to an array controller, specifying the
    model key path of the object’s property to display in that cell. To display the
    object itself, set the model key path to `"self"`.

    - Bind the individual columns of an outline to a tree controller, specifying the
    model key path of the object’s property to display in that cell. To display the
    object itself, set the model key path to `"self"`.


    The controller’s key—that is, the whole collection of objects being bound to—will
    typically be the same for all of the columns, ensuring that the cells in a row
    all reflect the same object. However, your data can be organized into multiple
    arrays or trees—just make sure that the collections agree.


    While the mechanics of supplying the data is done for you, you are still free
    to customize the look and feel of the view by supplying your own cell renderers,
    specifying column properties, and customizing the header view, just as you would
    with the traditional data models.


    `NSCollectionView` is a modern view that largely replaces `NSMatrix` and works
    with bindings.


    ---


    ## Core Data


    Core Data is a data modeling and persistence framework that delivers soup-to-nuts
    data modeling and storage. It handles many of the “tasks associated with object
    life-cycle and object graph management, including persistence.”[^1] If you want
    to use Core Data objects as a (or the) data model of your applications, you will
    generally follow these steps:


    1. Create your Xcode project using one of the Core Data or Core Data Document–based
    project templates. These templates include generic support for encoding your Core
    Data objects as an XML document, or documents. This isn’t difficult to set up,
    but starting with the templates saves you the effort.


    2. The default persistence store (i.e., the place where Core Data encodes and
    saves your data model) will be an XML document. You can override this to store
    your objects in an SQLite database or some other format; just note that creating
    a custom storage format can be rather involved.


    3. Design your data model in Xcode using the Data Modeling tool. You define entities
    (objects) that have attributes (properties) and relationships (connections). When
    you build your application, the model is compiled into a Managed Object Model
    (`mom`) file that’s loaded at runtime. This model is used to create your data
    model objects.


    4. If you are creating a document-based Core Data application, make sure you use
    or subclass `NSPersistentDocument`. It handles much of the document-level management
    of your document data model for you.


    5. Use `NSManagedObject` instances created by Core Data pretty much as you would
    use your own custom data model objects. You can get and set their properties,
    add them to collections, bind views to them, observe them, and so on. The Core
    Data framework takes care of the fetching, caching, and encoding of your objects
    automatically.


    One initially confusing aspect, particularly for Java developers, is the dynamic
    nature of the `NSManagedObject` class. Each entity in your data model instantiates
    an `NSManagedObject` at runtime; every object managed by Core Data must be an
    instance of `NSManagedObject`, or a subclass. While it’s possible to subclass
    `NSManagedObject` in special cases, most of the time you don’t. The attributes
    that you assign the entity in the data modeling tool become Objective-C properties
    at runtime—and it’s done without subclassing. `NSManagedObject` uses Objective-C’s
    ability to respond to messages and properties that it doesn’t implement and “synthesize”
    those properties at runtime. So, if you define an entity with an integer property
    named `tag`, you can treat that object at runtime as though it was a subclass
    of `NSManagedObject` with an `int` `tag` property: `if (entity.tag>0) entity.tag
    -= 1`. See Chapters 6 and 10 for more details.


    The Core Data tools and frameworks make it really easy to start using Core Data
    in your application. But Core Data is actually a deep and complex architecture
    that’s highly customizable and extensible. For a complete explanation, consult
    the Core Data Programming Guide.[^2]


    ## Custom Data Model Objects


    Often the best data model solution is to simply define a class and populate it
    with data. The `TicTacToeGame` class in the `TicTacToe` project is a custom data
    model.


    When designing an application, first look at the ready-made classes like `NSArray`,
    `NSArrayController`, and Core Data to see if they can effectively model your data.
    If they can, then by all means use the solution that’s already solved. If not,
    then create your own classes or subclass existing ones, like `NSManagedObject`
    and `NSObjectController`.


    [^1]: Apple Inc., Core Data Programming Guide, http://developer.apple.com/documentation/Cocoa/Conceptual/CoreData/,
    2009.

    [^2]: Ibid.


    ---


    ## Controllers


    The Cocoa framework provides a few basic controller objects, like `NSApplication`
    and `NSDocument`. It also provides mediating controller objects that are subclasses
    of `NSController`.


    ### Custom Controllers'
