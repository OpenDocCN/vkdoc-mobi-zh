    ## 提示

    这是 `@dynamic` 指令的一个实际应用。由于父类已经实现了属性的访问器方法，子类可以重新声明该属性，并使用 `@dynamic` 指令来忽略重新实现两个访问器方法的要求，然后仅重写
    `getter` 或 `setter` 方法。


    ## 访问属性


    属性的访问器方法可以像其他任何方法一样被调用。但正式声明的属性还有一个额外的好处。Objective-C 2.0 扩展了成员变量运算符（`.`），以允许轻松访问正式定义的属性。这种所谓的“点语法”让你能够像在
    Java 中访问成员变量一样，与对象的属性进行交互。


    使用清单 3-9 中定义的类，清单 3-10 中的代码设置并访问了一个 `Person` 对象的多个属性。编译器会将点语法扩展为调用每个属性对应的 `getter`
    或 `setter` 方法；而不是像 Java 那样直接访问对象的实例变量。这被视为“语法糖”，旨在提高可读性并减少杂乱。清单 3-10 生成的代码与清单
    3-11 所示的代码完全相同。


    **清单 3-10. 通过点语法访问对象属性**


    ```objectivec

    Person *person = ...;


    person.firstName = @"James";


    if (person.lastName.length==0)


    person.lastName = @"Smith";


    person.tag += 3;

    ```


    > [www.it-ebooks.info](http://www.it-ebooks.info/)


    **第 3 章 ■ 欢迎来到 Objective-C**


    **清单 3-11. 点语法的等效代码**


    ```objectivec

    Person *person = ...;


    [person setFirstName:@"James"];


    if ([[person lastName] length]==0)


    [person setLastName:@"Smith"];


    [person setTag:[person tag]+3];

    ```


    ## 作用域


    我先说一个坏消息：Objective-C 中没有包的概念。所有类名、C 函数和全局变量共享一个名称空间。类内部的实例变量由该类封装，并且 Objective-C
    确实提供了对其作用域的控制。Objective-C 不限制对类方法的访问，但有一些实用的方法可以模拟你在 Java 中享受的那种访问限制。


    ### 类名作用域


    类名都是公开的，并且存在于同一个全局可访问的名称空间中。为了避免命名冲突，Objective-C 开发者采用了一种命名约定，以便类能够与其他类共存。逻辑组中的类都以通用的两个字符缩写开头。在
    Apple 的框架中，所有 Core Image 类都以 `CI` 开头（`CIColor`、`CIFilterShape`、`CIVector`……）。QuickTime
    的类以 `QT` 开头（`QTTrack`、`QTMovie`、`QTTimeValue`……）。


    > **注意** 如果你好奇的话，Cocoa 基础类中出现的 `NS` 前缀代表 NextStep。NextStep 是由 NeXT Computer 开发的
    Objective-C 操作系统。当 Apple 在 1996 年收购 NeXT 时，将 NextStep 采用为新兴 Mac OS X 的核心技术。在乔治·奥威尔会钦佩的壮举中，几乎所有对
    NeXT 和 NextStep 的引用都从 Mac OS X 的源代码和文档中被删除了。但是要重命名这个庞大框架中的每一个类几乎是不可能的，因此遗留的 `NS`
    前缀一直沿用至今。


    由第三方开发的类遵循同样的约定。OmniGroup 提供了一套广泛的应用程序类供其他开发者使用。`OmniAppKit` 类都以 `OA` 开头（`OAController`、`OAUtilities`、`OAScriptMenuItem`……）。`OmniNetworking`
    类都以 `ON` 开头（`ONHost`、`ONPortAddress`……）。


    在你自己的开发中，需要考虑你所创建类的作用域。如果该类仅在你的应用程序开发环境中使用，则无需担心前缀。给你的类起简单的名字，比如 `Student`、`BoardGame`、`Troll`
    等。如果你正在开发供其他程序员使用的类，即使仅限于组织内部，也要选择一个可能唯一的前缀，并相应地命名你的类。如果你的公司是 Widget Makers，你可以将类命名为
    `WMToy`、`WMAlarm` 等。你也不必现在就做出决定。Xcode IDE 包含重构工具，使得重命名类相对容易。


    > [www.it-ebooks.info](http://www.it-ebooks.info/)


    **第 3 章 ■ 欢迎来到 Objective-C**


    ### 实例变量作用域


    对实例变量的访问控制方式与 Java 相同，并且很方便地使用了相同的术语。Objective-C 没有单独指定每个变量的作用域，而是采用了 C++ 风格的作用域指令。在
    `@interface` 指令的实例变量块中，可以在任何变量声明之前使用 `@public`、`@protected` 和 `@private` 指令。在某个作用域指令之后声明的所有变量都继承指定的可见性。清单
    3-12 显示了四个具有不同可见性级别的实例变量。


    **清单 3-12. 实例变量作用域**


    ```objectivec

    @interface Toy : NSObject {


    NSString *name;


    @public


    int starRating;


    @protected


    NSRange recommendedAge;


    int playCount;


    @private


    NSSet *toyBox;


    }


    @end

    ```


    变量 `starRating` 是公开的。它可以被任何上下文中的任何代码访问。


    变量 `name`、`recommendedAge` 和 `playCount` 的作用域是受保护的。定义在此类或其任何子类中的方法可以直接访问这些变量。`@protected`
    是实例变量的默认作用域。在第一个作用域指令之前或没有任何作用域指令的情况下定义的变量都是受保护的。


    变量 `toyBox` 是私有的。它只能被此类中定义的方法访问。


    请记住，Objective-C 的变量作用域仅仅是阻止对实例变量的访问。如果你尝试在无权访问的上下文中使用成员变量，编译器会报错。仍然可以通过内省或强制转换指针来访问这些变量——Objective-C
    没有 Java 意义上的“安全性”。此外，变量名称在技术上并不像 Java 那样在类的名称空间内进行作用域限定。`toyBox` 实例变量对于 `Toy`
    类的所有子类都存在。`Toy` 的子类不能声明自己的实例变量 `toyBox`；编译器会发出重复成员的错误。


    ### 方法作用域


    方法始终是公开的，就 Java 意义上的公开而言。Objective-C 对谁可以调用指向该对象的方法没有运行时限制。虽然没有明确的方法来限制方法被调用，但有几种技术可以隐藏方法，以阻止在其预期作用域之外使用。


    最简单的技术是将方法包含在 `@implementation` 部分，但从 `@interface` 指令中省略方法原型。其他 `#import` 该类接口的模块将不知道该方法的存在，如果尝试发送该消息，编译器会报错。


    这种技术之所以有效，是因为 `@implementation` 部分中的方法隐含了自身的原型。一旦方法出现在实现中，编译器就知道该方法，并允许你像在类的接口中预定义它一样调用它。这种技术是随意且简单的。它最大的缺点是所有未声明的方法必须在被引用之前定义。这可能会使源代码组织变得尴尬。在某些递归情况下，这使得它不可能实现。


    > [www.it-ebooks.info](http://www.it-ebooks.info/)


    **第 3 章 ■ 欢迎来到 Objective-C**'
