- fmt: "### The demonstration project includes examples of four common connection\
    \ methods. You can try them out using the command’s `mode` argument. Each is described\
    \ below.\n\n## Inter-Thread Connection\n\nDistributed objects’ focus is inter-process\
    \ communications, but DO works just as well between threads in the same process.\
    \ Using DO, it is relatively easy to create a class that receives and executes\
    \ messages in its own thread, making powerful multi-threaded services as easy\
    \ to use as simple objects. It also provides a flexible deployment environment\
    \ for remote services. A service designed to run on a remote computer could just\
    \ as easily run in a separate process on the same machine, or as a thread in the\
    \ local process for testing. The client’s interface to all three would be identical.\n\
    \nCreating an inter-thread connection is simple. Create two generic `NSPorts`\
    \ to provide the communications, and use those to create the `NSConnection` objects,\
    \ as shown in Listing 13-6. To run this example in the demonstration project,\
    \ issue the command `./Guest --thread`.\n\n### Listing 13-6. Inter-Thread DO Connection\n\
    \n```\nNSPort *receivePort = [NSPort port];\nNSPort *sendPort = [NSPort port];\n\
    NSConnection *clientConnection;\nNSConnection *serverConnection;\n\nclientConnection\
    \ = [NSConnection connectionWithReceivePort:receivePort sendPort:sendPort];\n\
    serverConnection = [NSConnection connectionWithReceivePort:sendPort sendPort:receivePort];\n\
    \n[serverConnection setRootObject:[Server new]];\n[serverConnection runInNewThread];\n\
    …\nid server = [clientConnection rootProxy];\n[server doSomething];\n```\n\nNote\
    \ that the port order is reversed in `serverConnection`. The client’s receive\
    \ port is connected to the server’s send port, and vice versa. The `-runInNewThread`\
    \ method detaches a new thread, running its own run loop, attached to the connection.\
    \ There are lots of variations to this code. Some programmers prefer to create\
    \ their own thread, pass it the `NSPort` objects, and let the server object create\
    \ its `NSConnection`. It doesn’t matter, as long as the end result is the same.\n\
    \n## Mach Ports Connection\n\nMach ports provide extremely efficient inter-process\
    \ communications within the scope of a single user or with a system process. The\
    \ `NSMachPortNameServer` registers server processes by name, and any client can\
    \ connect to it easily. The code for both client and server are shown in Listing\
    \ 13-7. Try it yourself by executing the demonstration commands `./Greeter --mach`\
    \ and `./Guest --mach` in separate terminal windows.\n\n### Listing 13-7. DO Connection\
    \ Through Mach Ports\n\n**Server**\n\n```\nNSConnection *connection = [NSConnection\
    \ defaultConnection];\n[connection setRootObject:[Server new]];\nif ([connection\
    \ registerName:@\"Server\"])\n    [[NSRunLoop currentRunLoop] run];\n```\n\n**Client**\n\
    \n```\nNSConnection *connection = [NSConnection connectionWithRegisteredName:@\"\
    Server\"\n    host:nil];\nid server = [connection rootProxy];\n[server doSomething];\n\
    ```\n\nThe server creates its server object and registers it with its public name.\
    \ The client uses the convenience constructor `-connectionWithRegisteredName:host:`\
    \ to obtain an `NSConnection`, preconfigured with `NSPorts` connected to the Mach\
    \ ports registered under the name `@\"Server\"`.\n\nIt’s also possible that both\
    \ server and client could be running in two threads of the same process. The service,\
    \ registered with the `NSMachBootstrapServer`, would be accessible to other processes,\
    \ but could just as easily be connected from another thread.\n\n## Network Connection\n\
    \nThe flexibility of distributed objects becomes particularly keen when used to\
    \ interact with objects over a network. The `NSSocketPortNameServer` provides\
    \ registration and discovery services accessible from all the systems on a local\
    \ area network, as shown in Listing 13-8. The `./Greeter --network` and `./Guest\
    \ --network` demonstrations can be run on the same computer, or on multiple computers\
    \ on the same network."
