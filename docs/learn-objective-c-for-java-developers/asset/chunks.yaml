  trans: "\n还有许多方法（大部分将在后续章节中介绍）会条件性地让线程休眠一段时间。这些消息接受一个 `NSDate` 对象，用于指定未来放弃等待条件并恢复执行的时间。最简单的例子是\
    \ `-[NSLock lock]` 和 `-[NSLock lockBeforeDate:(NSDate*)limit]` 这两个方法。两者都尝试获取 `NSLock`\
    \ 信号量上的锁。`-lock` 方法会一直等待直到获得锁。相比之下，`-lockBeforeDate:` 方法会在获得锁或达到 `NSDate` 指定的时间时返回。\n\
    \n> **提示：** 要创建一个代表未来 2.5 秒时间的 `NSDate` 对象，请使用 `[NSDate dateWithTimeIntervalSinceNow:2.5]`。要获取一个永远不会被达到的\
    \ `NSDate` 对象，请使用 `[NSDate distantFuture]`。\n\n当线程需要按固定时间间隔执行操作时，应将其置于休眠状态。清单\
    \ 15-2 展示了一个简单的类，它运行一个“心跳”线程，该线程每秒最多更新进度指示器两次。\n\n**清单 15-2. 心跳线程**\n\n```objc\n\
    @interface Process : NSObject\n\n@property double progress;\n\n@end\n\n@interface\
    \ Heartbeat : NSObject {\n    NSThread *thread;\n    Process *monitor;\n    NSProgressIndicator\
    \ *indicator;\n}\n\n+ (Heartbeat*)startHeartbeatProcess:(id)process\n        \
    \          withIndicator:(NSProgressIndicator*)progress;\n- (void)stop;\n- (void)heartbeatThread:(id)ignored;\n\
    - (void)updateIndicator;\n\n@end\n\n…\n\n@implementation Heartbeat\n\n+ (Heartbeat*)startHeartbeatProcess:(id)process\n\
    \                  withIndicator:(NSProgressIndicator*)progress\n{\n    Heartbeat\
    \ *heartbeat = [Heartbeat new];\n    heartbeat->monitor = process;\n    heartbeat->indicator\
    \ = progress;\n    heartbeat->thread = [[NSThread alloc] initWithTarget:heartbeat\n\
    \                                                selector:@selector(heartbeatThread:)\n\
    \                                                  object:nil];\n    [heartbeat->thread\
    \ start];\n    return heartbeat;\n}\n\n- (void)stop\n{\n    [thread cancel];\n\
    }\n\n- (void)heartbeatThread:(id)ignored\n{\n    while (![thread isCancelled])\
    \ {\n        [self performSelectorOnMainThread:@selector(updateIndicator)\n  \
    \                             withObject:nil\n                            waitUntilDone:YES];\n\
    \        [NSThread sleepForTimeInterval:0.5];\n    }\n}\n\n- (void)updateIndicator\n\
    {\n    [indicator setDoubleValue:monitor.progress];\n}\n\n@end\n```\n\n消息 `+startHeartbeatProcess:withIndicator:`\
    \ 会创建一个 `Heartbeat` 对象，并在新线程中启动其 `-heartbeatThread:` 方法。大约每半秒钟，该线程就会将一个 `-updateIndicator`\
    \ 消息排入主线程执行队列。线程会一直运行，直到 `Heartbeat` 对象收到 `-stop` 消息。\n\n请注意，清单 15-2 中的示例远非线程的最有效用法。虽然它能工作，但本章末尾的“定时器”部分提供了一个更合理的解决方案。\n\
    \n## 线程属性\n\n线程对象拥有许多关联的、能提供相关信息的属性。尽管存在关于过度线程管理的注意事项，但仍有一些线程属性你可能需要修改。有些属性只能在线程启动前设置，而另一些则只能在启动后设置。\n\
    \n### 信息\n\n线程信息属性列在表 15-2 中。你可以使用它们来获取相关的 `NSThread` 对象或检查线程的状态。类方法返回全局值或关于当前执行线程的信息。实例方法可以从任何线程发送给任何\
    \ `NSThread` 对象。\n\n**表 15-2. 信息性线程属性**\n\n| `NSThread` 方法 | 描述 |\n| :--- | :---\
    \ |\n| `+currentThread` | 当前执行线程的 `NSThread` 对象 |\n| `+mainThread` | 主线程的 `NSThread`\
    \ 对象 |\n| `+isMainThread` | 如果当前线程是主线程，则返回 `YES` |\n| `+isMultiThreaded` | 如果除了主线程之外，还有另一个线程曾经由\
    \ `NSThread` 启动，则返回 `YES` |\n| `-isMainThread` | 如果该线程对象代表主线程，则返回 `YES` |\n| `-isExecuting`\
    \ | |\n"
- fmt: "# Thread Status\n\nReturns `YES` if the thread has been started and has not\
    \ finished.\n\n`-isFinished`\n\nReturns `YES` if the thread has executed and exited.\n\
    \n`-isCancelled`\n\nReturns `YES` if the thread has ever received a `-cancel`\
    \ message.\n\n## Thread-Specific Values\n\nSometimes you need a global variable,\
    \ but only within the context of a specific thread. Each `NSThread` object has\
    \ a `threadDictionary` property exactly for this purpose. The property is a mutable\
    \ dictionary that your application can use to store whatever values it needs.\
    \ The example in Listing 15-3 creates an `NSNotificationCenter` object for a single\
    \ thread.\n\n**Listing 15-3.** Storing a Thread Specific Value\n\n```\nNSMutableDictionary\
    \ *threadLocal = [[NSThread currentThread] threadDictionary];\n[threadLocal setObject:[NSNotificationCenter\
    \ new]\n               forKey:@\"NotificationCenter\"];\n```\n\nThe purpose is\
    \ to create a notification center that will be used to send and observe notifications\
    \ within the thread. Any object can obtain its thread-specific notification center\
    \ using the statement:\n\n```\n[[[NSThread currentThread] threadDictionary] objectForKey:@\"\
    NotificationCenter\"]\n```\n\n## Priority\n\nThe priority of the currently running\
    \ thread can be altered using the `+[NSThread setThreadPriority:]` message. The\
    \ priority is a floating point value between `0.0` and `1.0`, `1.0` being the\
    \ highest. You can obtain a thread’s current priority with `+[NSThread threadPriority]`.\
    \ The typical default priority is `0.5`. The actual range of priorities—if they’re\
    \ acknowledged at all—is operating system and kernel dependent.\n\nThe kernel\
    \ makes few guarantees about thread priority other than it will tend to give threads\
    \ with a higher priority more CPU time than those with a lower priority. Use thread\
    \ priorities judiciously.\n\n## Stack Size\n\nAnother rarely used property is\
    \ the thread’s stack size, which must be set before the thread is started. This\
    \ requires that you create an `NSThread` object, set its stack size, and then\
    \ start the thread using the `-start` message. Stack sizes must be set in even\
    \ multiples of 4K (4096) bytes and currently default to 512K.\n\nThe two situations\
    \ where you would want to change the stack size are:\n\n- A thread is overflowing\
    \ its stack. In this situation, increase its stack size before starting the thread.\n\
    - You create lots of threads that don’t use much stack space, and the stack space\
    \ allocated to each is impacting address space allocation. Reduce the default\
    \ stack size so that each thread allocates less memory.\n\n## Name\n\nEach thread\
    \ also has a mutable `-name` property that’s an arbitrary `NSString` value. Thread\
    \ names are largely ignored by the operating system, so use them for whatever\
    \ purpose you wish.\n\n## Terminating a Thread\n\nA thread stops running when:\n\
    \n- The thread’s `-main` method, or the method specified when the thread was created,\
    \ returns\n- The thread’s code throws an uncaught exception\n- The process terminates\n\
    \nIn the first two situations, the thread is destroyed and its resources reclaimed.\
    \ The uncaught exception handler, described in Chapter 14, handles uncaught exceptions.\
    \ An `NSThread` object cannot be restarted. Create a new `NSThread` object if\
    \ you want to start another thread.\n\nWhen the process terminates, all threads\
    \ are abandoned, regardless of their state. This is not like Java, whose virtual\
    \ machine will run until all non-daemon threads have finished. If you’ve created\
    \ background threads, you do not need to arrange for them to finish for your application\
    \ to terminate. Conversely, if your background threads need to finish before your\
    \ application terminates, you will have to coordinate that through semaphores\
    \ or other means.\n\n## Run Loops\n\nRun loops are an integral part of the Cocoa\
    \ framework. They are the principal event dispatching mechanism for applications,\
    \ user interface events, distributed objects, timers, deferred object messages,\
    \ and distributed notifications.\n\nA run loop is an event processing service\
    \ that synchronously processes events from one or more asynchronous sources. Event\
    \ sources are referred to as input sources, and there are several predefined kinds:\n\
    \n- User interface events (mouse events, keyboard events, etc.)\n- Deferred method\
    \ invocation (`-performSelector:withObject:afterDelay:`, etc.)\n- Distributed\
    \ object messages\n- Timer events\n\nThere are other input sources and it’s possible\
    \ to develop your own, although that’s exceptional.\n\nThere is one (optional)\
    \ run loop object associated with every thread. The code `+[NSRunLoop currentRunLoop]`\
    \ will return the single run loop object associated with the current thread, and\
    \ `+[NSRunLoop mainRunLoop]` returns the run loop for the main thread. Run loops\
    \ are created lazily; if no run loop object exists for the thread, one is created\
    \ when you send the message. The run loop associated with the main thread is called\
    \ the main run loop.\n\n> **Caution:** `NSRunLoop` is not thread safe. Manipulations\
    \ of a run loop object should be done from the thread it belongs to.\n\nRun loops\
    \ are very efficient. They block the thread until an event appears on one of their\
    \ input sources. The run loop then immediately processes the event, taking whatever\
    \ action is appropriate, and then “loops” around to wait for the next event. Run\
    \ loops also take care of periodic housecleaning, like managed memory and stack\
    \ object garbage collection. You can hand off control of your thread entirely\
    \ to the run loop, or write your own loop to keep the run loop working.\n\n###\
    \ Starting a Run Loop\n\nYou normally don’t need to start a run loop. If you are\
    \ writing a standard application, the `NSApplication` object will start the main\
    \ run loop automatically. The main run loop will process all of the significant\
    \ events of your application. Modal dialogs and `NSConnections` will also start\
    \ run loops.\n\nYou would need to start your own run loop under the following\
    \ circumstances:\n\n- You have created a new thread that needs to fire timers\
    \ or send deferred messages to objects.\n- You are vending a distributed object\
    \ in its own thread, or have passed objects by reference that might receive asynchronous\
    \ messages from a remote process.\n- You are writing a command-line tool or daemon\
    \ that does not use the application framework and needs to process deferred method\
    \ invocations, timer events, or distributed objects on the main thread. (The third\
    \ case is just a special instance of the first two, since the main thread of a\
    \ command-line tool does not automatically start a run loop.)\n\nA run loop requires\
    \ input sources, and runs only as long as it has input sources. To start a run\
    \ loop, you must first provide it with one or more input sources. Otherwise, the\
    \ run loop will do nothing and end immediately.\n\n- Creating and scheduling a\
    \ timer, described later in this chapter, will create a timer input source for\
    \ the current run loop.\n- Queuing a deferred method invocation will add a message\
    \ dispatch source to the run loop.\n- An `NSConnection` will add its communication\
    \ ports to the current run loop.\n- The main thread has several input sources\
    \ already created by the Objective-C framework. A run loop started on the main\
    \ thread will always start and run forever.\n\nBy starting a run loop, you essentially\
    \ relinquish control of the thread to the run loop. The thread will block until\
    \ it receives an event from its input sources. To start a run loop and let it\
    \ run forever—or at least while it has input sources—execute the following:\n\n\
    ```\n[[NSRunLoop currentRunLoop] run];\n```\n\nThe message `-runUntilDate:` is\
    \ a slight variation that runs the run loop for a period of time. You can use\
    \ this to perform periodic actions, but using timers is preferable."
  raw: 'Returns YES if the thread has been started and has not finished


    -isFinished


    Returns YES if the thread has executed and exited


    -isCancelled


    Returns YES if the thread has ever received a -cancel message Thread-Specific
    Values


    Sometimes you need a global variable, but only within the context of a specific
    thread. Each NSThread object has a threadDictionary property exactly for this
    purpose. The property is a mutable dictionary that your application can use to
    store whatever values it needs. The example in Listing 15-3 creates an NSNotificationCenter
    object for a single thread.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ THREADS


    Listin g 15-3\. Storing a Thread Specific Value


    NSMutableDictionary *threadLocal = [[NSThread currentThread] threadDictionary];


    [threadLocal setObject:[NSNotificationCenter new]


    forKey:@"NotificationCenter"];


    The purpose is to create a notification center that will be used to send and observe
    notification within the thread. Any object can obtain its thread-specific notification
    center using the statement:


    [[[NSThread currentThread] threadDictionary] objectForKey:@"NotificationCenter"]


    Priority


    The priority of the currently running thread can be altered using the +[NSThread
    setThreadPriority:]


    message. The priority is a floating point value between 0.0 and 1.0, 1.0 being
    the highest. You can obtain a thread’s current priority with +[NSThread threadPriority].
    The typical default priority is 0.5\. The actual range of priorities—if they’re
    acknowledged at all—is operating system and kernel dependent.


    The kernel makes few guarantees about thread priority other than it will tend
    to give threads with a higher priority more CPU time than those with a lower priority.
    Use thread priorities judiciously.


    Stack Size


    Another rarely used property is the thread’s stack size, which must be set before
    the thread is started.


    This requires that you create an NSThread object, set its stack size, and then
    start the thread using the


    -start message. Stack sizes must be set in even multiples of 4K (4096) bytes and
    currently default to 512K.


    The two situations where you would want to change the stack size are:


    • A thread is overflowing its stack. In this situation, increase its stack size
    before starting the thread.


    • You create lots of threads that don’t use much stack space, and the stack space
    allocated to each is impacting address space allocation. Reduce the default stack
    size so that each thread allocates less memory.


    Name


    Each thread also has a mutable -name property that’s an arbitrary NSString value.
    Thread names are largely ignored by the operating system, so use them for whatever
    purpose you wish.


    Terminating a Thread


    A thread stops running when


    • The thread’s -main method, or the method specified when the thread was created,
    returns


    • The thread’s code throws an uncaught exception


    • The process terminates


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ THREADS


    In the first two situations, the thread is destroyed and its resources reclaimed.
    The uncaught exception handler, described in Chapter 14, handles uncaught exceptions.
    An NSThread object cannot be restarted. Create a new NSThread object if you want
    to start another thread.


    When the process terminates, all threads are abandoned, regardless of their state.
    This is not like Java, whose virtual machine will run until all non-daemon threads
    have finished. If you’ve created background threads, you do not need to arrange
    for them to finish for your application to terminate.


    Conversely, if your background threads need to finish before your application
    terminates, you will have to coordinate that through semaphores or other means.


    Run Loops


    Run loops are an integral part of the Cocoa framework. They are the principal
    event dispatching mechanism for applications, user interface events, distributed
    objects, timers, deferred object messages, and distributed notifications.


    A run loop is an event processing service that synchronously processes events
    from one or more asynchronous sources. Event sources are referred to as input
    sources, and there are several predefined kinds:


    • User interface events (mouse events, keyboard events, etc.)


    • Deferred method invocation (-performSelector:withObject:afterDelay:, etc.)


    • Distributed object messages


    • Timer events


    There are other input sources and it’s possible to develop your own, although
    that’s exceptional.


    There is one (optional) run loop object associated with every thread. The code
    +[NSRunLoop currentRunLoop] will return the single run loop object associated
    with the current thread, and


    +[NSRunLoop mainRunLoop] returns the run loop for the main thread. Run loops are
    created lazily; if no run loop object exists for the thread, one is created when
    you send the message. The run loop associated with the main thread is called the
    main run loop.


    ■Caution NSRunLoop is not thread safe. Manipulations of a run loop object should
    be done from the thread it belongs to.


    Run loops are very efficient. They block the thread until an event appears on
    one of their input sources. The run loop then immediately processes the event,
    taking whatever action is appropriate, and then “loops” around to wait for the
    next event. Run loops also take care of periodic housecleaning, like managed memory
    and stack object garbage collection. You can hand off control of your thread entirely
    to the run loop, or write your own loop to keep the run loop working.


    Starting a Run Loop


    You normally don’t need to start a run loop. If you are writing a standard application,
    the NSApplication object will start the main run loop automatically. The main
    run loop will process all of the significant events of your application. Modal
    dialogs and NSConnections will also start run loops.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ THREADS


    You would need to start your own run loop under the following circumstances:


    • You have created a new thread that needs to fire timers or send deferred messages
    to objects.


    • You are vending a distributed object in its own thread, or have passed objects
    by reference that might receive asynchronous messages from a remote process.


    • You are writing a command-line tool or daemon that does not use the application
    framework and needs to process deferred method invocations, timer events, or distributed
    objects on the main thread.


    The third case is just a special instance of the first two, since the main thread
    of a command-line tool does not automatically start a run loop.


    A run loop requires input sources, and runs only as long as it has input sources.
    To start a run loop, you must first provide it with one or more input sources.
    Otherwise, the run loop will do nothing and end immediately.


    • Creating and scheduling a timer, described later in this chapter, will create
    a timer input source for the current run loop.


    • Queuing a deferred method invocation will add a message dispatch source to the
    run loop.


    • An NSConnection will add its communication ports to the current run loop.


    • The main thread has several input sources already created by the Objective-C
    framework. A run loop started on the main thread will always start and run forever.


    By starting a run loop, you essentially relinquish control of the thread to the
    run loop. The thread will block until it receives an event from its input sources.
    To start a run loop and let it run forever—or at least while it has input sources—execute
    the following:


    [[NSRunLoop currentRunLoop] run];


    The message -runUntilDate: is a slight variation that runs the run loop for a
    period of time. You can use this to perform periodic actions, but using timers
    is preferable.'
  trans: "\n# 线程状态\n\n如果线程已启动且尚未结束，则返回 `YES`。\n\n`-isFinished`\n\n如果线程已执行并退出，则返回 `YES`。\n\
    \n`-isCancelled`\n\n如果线程曾收到过 `-cancel` 消息，则返回 `YES`。\n\n## 线程特定值\n\n有时你需要一个全局变量，但仅限于特定线程的上下文中。每个\
    \ `NSThread` 对象都有一个 `threadDictionary` 属性专门用于此目的。该属性是一个可变字典，你的应用程序可以用它来存储所需的任何值。清单\
    \ 15-3 中的示例为单个线程创建了一个 `NSNotificationCenter` 对象。\n\n**清单 15-3.** 存储线程特定值\n\n```\n\
    NSMutableDictionary *threadLocal = [[NSThread currentThread] threadDictionary];\n\
    [threadLocal setObject:[NSNotificationCenter new]\n               forKey:@\"NotificationCenter\"\
    ];\n```\n\n其目的是创建一个通知中心，用于在线程内发送和观察通知。任何对象都可以通过以下语句获取其线程特定的通知中心：\n\n```\n[[[NSThread\
    \ currentThread] threadDictionary] objectForKey:@\"NotificationCenter\"]\n```\n\
    \n## 优先级\n\n可以使用 `+[NSThread setThreadPriority:]` 消息来更改当前运行线程的优先级。优先级是一个介于 `0.0`\
    \ 和 `1.0` 之间的浮点值，`1.0` 为最高优先级。你可以通过 `+[NSThread threadPriority]` 获取线程的当前优先级。典型的默认优先级是\
    \ `0.5`。实际优先级范围（如果内核认可的话）取决于操作系统和内核。\n\n内核除了倾向于将更多 CPU 时间分配给优先级较高的线程外，几乎不保证线程的优先级。请明智地使用线程优先级。\n\
    \n## 栈大小\n\n另一个很少使用的属性是线程的栈大小，该属性必须在线程启动前设置。这要求你先创建一个 `NSThread` 对象，设置其栈大小，然后使用\
    \ `-start` 消息启动线程。栈大小必须以 4K（4096）字节的偶数倍设置，当前默认为 512K。\n\n以下两种情况你可能需要更改栈大小：\n\n\
    - 线程发生栈溢出。在这种情况下，请在启动线程前增加其栈大小。\n- 你创建了大量不占用太多栈空间的线程，并且分配给每个线程的栈空间影响了地址空间的分配。请减少默认栈大小，以便每个线程分配更少的内存。\n\
    \n## 名称\n\n每个线程还有一个可变的 `-name` 属性，它是一个任意的 `NSString` 值。操作系统在很大程度上会忽略线程名称，因此你可以将其用于任何目的。\n\
    \n## 终止线程\n\n线程在以下情况下停止运行：\n\n- 线程的 `-main` 方法或创建线程时指定的方法返回\n- 线程代码抛出一个未捕获的异常\n\
    - 进程终止\n\n在前两种情况下，线程会被销毁，其资源会被回收。第 14 章中描述的未捕获异常处理程序会处理未捕获的异常。`NSThread` 对象无法重新启动。如果你想启动另一个线程，请创建一个新的\
    \ `NSThread` 对象。\n\n当进程终止时，所有线程都会被放弃，无论其状态如何。这与 Java 不同，Java 的虚拟机会一直运行到所有非守护线程完成。如果你创建了后台线程，则无需安排它们完成即可终止应用程序。相反，如果你的后台线程需要在应用程序终止前完成，则必须通过信号量或其他方式进行协调。\n\
    \n## 运行循环\n\n运行循环是 Cocoa 框架不可分割的一部分。它们是应用程序、用户界面事件、分布式对象、定时器、延迟对象消息和分布式通知的主要事件分发机制。\n\
    \n运行循环是一种事件处理服务，它同步处理来自一个或多个异步源的事件。事件源被称为输入源，有几种预定义的类型：\n\n- 用户界面事件（鼠标事件、键盘事件等）\n\
    - 延迟方法调用（`-performSelector:withObject:afterDelay:` 等）\n- 分布式对象消息\n- 定时器事件\n\n\
    还有其他输入源，并且你也可以开发自己的输入源，但这属于特殊情况。\n\n每个线程都关联一个（可选的）运行循环对象。代码 `+[NSRunLoop currentRunLoop]`\
    \ 会返回与当前线程关联的单个运行循环对象，而 `+[NSRunLoop mainRunLoop]` 会返回主线程的运行循环。运行循环是延迟创建的；如果线程没有运行循环对象，则在发送消息时会创建一个。与主线程关联的运行循环称为主运行循环。\n\
    \n> **警告：** `NSRunLoop` 不是线程安全的。对运行循环对象的操作应在其所属的线程内进行。\n\n运行循环非常高效。它们会阻塞线程，直到其中一个输入源上出现事件。然后运行循环会立即处理该事件，采取适当的操作，然后“循环”等待下一个事件。运行循环还会处理周期性的清理工作，例如管理内存和栈对象垃圾回收。你可以将线程的控制权完全交给运行循环，或者编写自己的循环来保持运行循环工作。\n\
    \n### 启动运行循环\n\n通常你不需要启动运行循环。如果你在编写标准应用程序，`NSApplication` 对象会自动启动主运行循环。主运行循环会处理你应用程序中的所有重要事件。模态对话框和\
    \ `NSConnections` 也会启动运行循环。\n\n在以下情况下，你需要启动自己的运行循环：\n\n- 你创建了一个需要触发定时器或向对象发送延迟消息的新线程。\n\
    - 你在自己的线程中提供分布式对象，或者通过引用传递了可能从远程进程接收异步消息的对象。\n- 你正在编写一个不使用应用程序框架的命令行工具或守护进程，并且需要在主线程上处理延迟方法调用、定时器事件或分布式对象。（第三种情况只是前两种情况的特例，因为命令行工具的主线程不会自动启动运行循环。）\n\
    \n运行循环需要输入源，并且只有在有输入源时才会运行。要启动运行循环，你必须首先为其提供一个或多个输入源。否则，运行循环将不执行任何操作并立即结束。\n\n\
    - 创建并调度一个定时器（本章稍后介绍）将为当前运行循环创建一个定时器输入源。\n- 将延迟方法调用加入队列会向运行循环添加一个消息分发源。\n- 一个 `NSConnection`\
    \ 会将其通信端口添加到当前运行循环。\n- 主线程拥有 Objective-C 框架已创建的几个输入源。在主线程上启动的运行循环将始终启动并永远运行。\n\
    \n通过启动运行循环，你基本上将线程的控制权交给了运行循环。线程会阻塞，直到从输入源接收到事件。要启动运行循环并让它永远运行（或者至少在有输入源时运行），请执行以下操作：\n\
    \n```\n[[NSRunLoop currentRunLoop] run];\n```\n\n消息 `-runUntilDate:` 是一个轻微变体，它可以在指定的时间段内运行运行循环。你可以用此方法执行周期性操作，但使用定时器更可取。\n"
- fmt: "# Threads\n\nTo be a little more involved, use something like the code shown\
    \ in Listing 15-4. This second example “drives” the run loop using your own loop.\
    \ The `-runMode:beforeDate:` message suspends the thread until a single event\
    \ is processed or the `beforeDate` time has occurred. This allows your code to\
    \ perform actions between each event or at periodic times, and you can also test\
    \ any global condition that might be used to halt the run loop or thread.\n\n\
    **Listing 15-4.** Starting a Run Loop\n\n```\nstatic BOOL keepRunning = YES;\n\
    …\nwhile (keepRunning\n       && [[NSRunLoop currentRunLoop] runMode:NSDefaultRunLoopMode\
    \ beforeDate:[NSDate distantFuture]]) {\n  …\n}\n```\n\nFinally, the `-[NSConnection\
    \ runInNewThread]` convenience function does everything needed to start a distributed\
    \ object server: it creates and starts a new thread, adds the `NSConnection`’s\
    \ ports to the run loop of the new thread, and sends the run loop a `-run` message.\n\
    \n## Run Loop Modes\n\nRun loops run in modes. Run loop input sources have modes.\
    \ A run loop only processes the events from the input sources consistent with\
    \ its current mode. Normally you don’t need to know anything about run loop modes,\
    \ other than that they exist. The basic run loop modes are listed in Table 15-3.\n\
    \n**Table 15-3.** Run Loop Modes\n\n| Mode | Description |\n|------|-------------|\n\
    | `NSDefaultRunLoopMode` | This is the default mode, and the mode used by any\
    \ run loop method that doesn’t accept a mode parameter. |\n| `NSModalPanelRunLoopMode`\
    \ | Processes only events relevant to a modal dialog. |\n| `NSEventTrackingRunLoopMode`\
    \ | Processes only events relevant to active mouse tracking. |\n| `NSConnectionReplyMode`\
    \ | Processes only distributed object reply events. |\n\nRun loop modes are used\
    \ to defer those events that aren’t appropriate to the circumstances.\n\nThe top-level\
    \ run loop invariably runs in the `NSDefaultRunLoopMode` mode, processing all\
    \ events. If the user interface causes a modal dialog to be displayed, the AppKit\
    \ framework will start a nested run loop running in `NSModalPanelRunLoopMode`.\
    \ This ignores all events that don’t pertain to the modal dialog, essentially\
    \ freezing the rest of the application. Similarly, when a mouse click/drag begins\
    \ its progress it is tracked using `NSEventTrackingRunLoopMode`. The `NSConnectionReplyMode`\
    \ is used when you’ve sent a message to a distant object. The distant object starts\
    \ a nested run loop, ignoring all queued events save the reply from the remote\
    \ object.\n\n## Stopping a Run Loop\n\nStopping a run loop is actually a little\
    \ problematic. Earlier, I stated that run loops run as long as they have input\
    \ sources. That’s correct, except that all manner of obscure features will add\
    \ custom input sources to your run loop. Many of those sources persist for very\
    \ long periods, if not forever, keeping the run loop alive indefinitely. The most\
    \ direct solution is to design your thread so the run loop does not need to be\
    \ stopped. Let the thread sit idle when not doing anything useful, and disappear\
    \ when the application terminates. For distributed objects, close the `NSConnection`\
    \ object when you want to stop sharing your root distributed object. You can always\
    \ reregister the connection or set a new root object to resurrect the service.\n\
    \nIf you must stop a run loop, there are three basic techniques:\n\n- Use code\
    \ like that in Listing 15-4 to periodically check to see if the run loop should\
    \ stop. The problem is that the loop will only execute once per event or after\
    \ the time out. You don’t want to make the time out short—this constitutes polling—because\
    \ it wastes resources.\n- Call the Core Foundation function `CFRunLoopStop()`,\
    \ passing it the `CFRunLoopRef` value obtained via `-[NSRunLoop getCFRunLoop]`.\n\
    - Create a custom run loop input source and combine it with the technique in Listing\
    \ 15-4. Your custom input source’s event handler can set a flag indicating that\
    \ the run loop should stop, which will immediately cause `-runUntilDate:` to return,\
    \ where your outer loop can exit.\n\n## Customizing Run Loops\n\nThe `NSRunLoop`\
    \ class is a simplistic wrapper around the Core Foundation run loop functions\
    \ and types.\n\nIf you want to get involved with run loops at a deeper level,\
    \ possibly developing your own input sources, read the “Run Loop Management” section\
    \ of the *Threading Programming Guide*¹.\n\n## Thread Notifications\n\n`NSThread`\
    \ sends two notifications, listed in Table 15-4. See Chapter 18 for more about\
    \ notifications.\n\n**Table 15-4.** Thread Notifications\n\n| Notification | Description\
    \ |\n|--------------|-------------|\n| `NSThreadWillExitNotification` | Sent after\
    \ a thread’s code has returned, but before the thread is destroyed. This notification\
    \ is sent to all observers on the thread about to be destroyed. |\n| `NSWillBecomeMultiThreadedNotification`\
    \ | Sent to all observers before the first new (non-main) thread in the process\
    \ is created. The notification is sent on the main thread, and is only sent once.\
    \ |\n\nBack in Chapter 7, I presented a FIFO class that could optionally operate\
    \ in a thread-safe environment. Let’s modify that class a little—making it truly\
    \ automatic—by rewriting its `-init` method and adding a notification observer,\
    \ as shown in Listing 15-5.\n\n**Listing 15-5.** Additions to an Automatic Thread-Safe\
    \ FIFO Class\n\n```objc\n@implementation AutoSafeFIFO\n\n- (id) init\n{\n  self\
    \ = [super init];\n  if (self != nil) {\n    stack = [NSMutableArray new];\n \
    \   if ([NSThread isMultiThreaded]) {\n      [self makeThreadSafe];\n    } else\
    \ {\n      NSNotificationCenter *center = [NSNotificationCenter defaultCenter];\n\
    \      [center addObserver:self\n                selector:@selector(willBecomeMultiThreadedNotification)\n\
    \                    name:NSWillBecomeMultiThreadedNotification\n            \
    \      object:nil];\n    }\n  }\n  return self;\n}\n\n- (void)willBecomeMultiThreadedNotification:(NSNotification*)notification\n\
    {\n  [self makeThreadSafe];\n}\n\n…\n@end\n```\n\nThe object’s constructor determines\
    \ if the application is already running with multiple threads. If it is, it makes\
    \ itself thread safe. If not, it subscribes to `NSWillBecomeMultiThreadedNotification`.\
    \ If a second thread is created any time after the FIFO is created, the FIFO object\
    \ automatically switches to thread-safe mode.\n\n## Thread Synchronization\n\n\
    Concurrent access to objects from two or more independent threads presents a consistent\
    \ set of problems across almost all programming languages. Java and Objective-C\
    \ both provide language support in the form of a `@synchronized` (`synchronized`)\
    \ directive. Any block of code marked as `@synchronized` is protected against\
    \ being executed by more than one thread at a time.\n\nThis section will review\
    \ the synchronization support in Objective-C. In addition to the `@synchronized`\
    \ directive, the Cocoa frameworks provide several utility classes that implement\
    \ different kinds of mutual exclusion semaphores, a set of classes for organizing\
    \ concurrent tasks, and timers.\n\n### The `@synchronized` Directive\n\nObjective-C’s\
    \ `@synchronized` directive is almost identical to Java’s `synchronized` keyword,\
    \ with only one minor exception: `@synchronized` can’t be used as a method modifier.\
    \ To accomplish the equivalent, use `@synchronized(self)` as the outermost block\
    \ of your method, as shown in Listing 15-6.\n\n**Listing 15-6.** Synchronized\
    \ Method\n\n**Java**\n\n```java\npublic class Timing\n{\n  public synchronized\
    \ void safe( )\n  {\n    // thread safe code\n  }\n}\n```\n\n**Objective-C**\n\
    \n```objc\n@interface Timing : NSObject\n- (void)safe;\n@end\n\n@implementation\
    \ Timing\n- (void)safe\n{\n  @synchronized(self) {\n    // thread safe code\n\
    \  }\n}\n@end\n```\n\nBeyond that minor limitation, you can use `@synchronized`\
    \ exactly as you would use `synchronized` in Java.\n\n### Mutual Exclusion Semaphore\
    \ Objects\n\n¹ Apple, Inc., *Threading Programming Guide*, http://developer.apple.com/documentation/Cocoa/Conceptual/Multithreading/,\
    \ 2008."
