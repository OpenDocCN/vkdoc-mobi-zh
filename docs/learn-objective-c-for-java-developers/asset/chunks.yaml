- fmt: "■ Note: Objective-C file classes are built on POSIX file concepts, and inherit\
    \ many of the notions of the original UNIX operating system. Most important is\
    \ the concept that everything is a file. In UNIX, the file system is not a concrete\
    \ collection of data files on a disk drive, but an abstract naming system for\
    \ identifying any source of serial data. “Files” in UNIX can be data files, directories,\
    \ network sockets, serial ports, semaphores, random number generators, blocks\
    \ of RAM, logical console devices, and so on. Think of the term “file” as being\
    \ the base class of any named entity in the file system hierarchy. Directories,\
    \ data files, and FIFO pipes are all specialized subclasses of a “file.” This\
    \ terminology percolates through the APIs. For example, the `-[NSFileManager removeFileAtPath:handler:]`\
    \ method deletes much more than just data files. If passed the path to a directory,\
    \ it will delete it and every item it contains. It would also delete a named socket\
    \ or semaphore. In this book, I adhere to the UNIX nomenclature of “file” to mean\
    \ virtually any named entity in a file system—it just gets too confusing otherwise.\
    \ When referring to an actual document file on a volume, I’ll use the term data\
    \ file.\n\nPaths can be absolute or relative. A path that begins with a `/` is\
    \ an absolute path specifying a series of directories beginning at the root directory\
    \ of the file system. Otherwise, the path is a relative path specifying a series\
    \ of directories starting in the current working directory. Some file system functions\
    \ recognize paths that begin with a tilde, as in `~/Documents/Publications`, to\
    \ mean an absolute path beginning with the home directory of the current user.\n\
    \nFor better or worse, the UNIX naming convention of extensions has followed us\
    \ into the twenty-first century. File name extensions intimate the kind of information\
    \ a file contains. They are typically short identifiers—three or four alphabetic\
    \ characters—appended to the end of a file name following a period (`.`). The\
    \ extension of the name `@\"Outline.doc\"` is `@\"doc\"`, and the extension of\
    \ the name `@\"Letter to Jake 2.0.pages\"` is `@\"pages\"`.\n\nJava's `java.io.File`\
    \ object is largely the fundamental object used to identify files in the file\
    \ system. A `File` object can be created for nonexistent files. Path manipulations\
    \ are accomplished by extracting properties of a `File` or creating new `File`\
    \ objects based on an existing `File` object. For example, the parent directory\
    \ of a path can be determined by creating a `File` object to the path then calling\
    \ `getParent()`.\n\nObjective-C does not have an object that can represent abstract\
    \ or nonexistent files. Strings are used to represent file names and paths. How\
    \ you assemble path or file name strings is entirely up to you. You can use any\
    \ of the string manipulation methods, but there are a few provided by the Cocoa\
    \ framework specifically for working the paths. The methods are attached to the\
    \ `NSString` class via the `NSPathUtilities` category. The commonly used ones\
    \ are listed in Table 11-1. Listing 11-1 illustrates the contrast between Java\
    \ and Objective-C path manipulation. As an example, both the Java and Objective-C\
    \ methods in Listing 11-1 generate a path to a nonexistent file.\n\n**Table 11-1.**\
    \ Path and File Name Methods of `NSString`\n\n| Method | Description |\n| ---\
    \ | --- |\n| `+(NSString*)pathWithComponents:(NSArray*)components` | Constructs\
    \ a path from an array of file names. To construct an absolute path, set the first\
    \ element in the array to the string `@\"/\"`. |\n| `-(NSArray*)stringsByAppendingPaths:(NSArray*)paths`\
    \ | Appends the file names in the array to the path in the receiver. |\n| `-(NSString*)pathComponents`\
    \ | Decomposes the path into individual file names, returned in an array. If the\
    \ path is absolute, the first element in the array is `@\"/\"`. |\n| `-(BOOL)isAbsolutePath`\
    \ | Returns `YES` if the path is absolute (begins with `@\"/\"`). |\n| `-(NSString*)lastPathComponent`\
    \ | Extracts the last file name from a path. |\n| `-(NSString*)stringByDeletingLastPathComponent`\
    \ | Removes the last file name in the receiver’s path. |\n| `-(NSString*)stringByAppendingPathComponent:(NSString*)str`\
    \ | Appends an additional name to end of a path. |\n| `-(NSString*)pathExtension`\
    \ | Extracts the extension from that last name in a path. |\n| `-(NSString*)stringByDeletingPathExtension`\
    \ | Removes the extension, if any, from the last name in a path. |\n| `-(NSString*)stringByAppendingPathExtension:(NSString*)str`\
    \ | Appends a new extension to the last name in a path. |\n| `-(NSString*)stringByAbbreviatingWithTildeInPath`\
    \ | If the receiver’s path begins with the current user’s home directory path,\
    \ it is replaced with the shorthand `@\"~\"`. |\n| `-(NSString*)stringByExpandingTildeInPath`\
    \ | Replaces the `@\"~\"` at the beginning of the receiver’s path with the path\
    \ to the current user’s home directory, or replace `@\"~account\"` with the path\
    \ to the home directory of user “account”. |\n| `-(NSString*)stringByStandardizingPath`\
    \ | Simplifies and normalizes the path of the receiver. |\n\nMost of these methods\
    \ are self-explanatory. None of them modifies the receiver. As the `-stringBy…`\
    \ method names imply, each returns a new string object with the results of the\
    \ transformation.\n\nThe first few convert arrays of names into complete paths\
    \ and vice versa. The bulk of the methods extract, delete, or append a single\
    \ name or file name extension to an existing path. The `-stringByStandardizingPath`\
    \ method “normalizes” a path string by replacing the `@\"~\"` or `@\"~user\"`\
    \ shorthand with an explicit path, replacing any relative path references and\
    \ symbolic links with their physical (nonsymbolic) equivalent, and removing any\
    \ extraneous path elements. In short, it’s a “cleanup” method that reduces a path\
    \ to its simplest, most explicit, form.\n\n**Listing 11-1.** Generate a Path to\
    \ a Nonexistent File\n\n**Java**\n\n```java\npublic String autoName( String parentDir,\
    \ String baseName, String ext )\n{\n    int suffix = 0;\n    File parentFile =\
    \ new File(parentDir);\n    File testFile = new File(parentFile,baseName+\".\"\
    +ext);\n    while (testFile.exists()) {\n        suffix += 1;\n        testFile\
    \ = new File(parentFile,baseName+\"-\"+suffix+\".\"+ext);\n    }\n    return testFile.getAbsolutePath();\n\
    }\n```\n\n**Objective-C**\n\n```objc\n- (NSString*)autoNameInDirectory:(NSString*)parentDir\n\
    \                            name:(NSString*)name\n                       extension:(NSString*)ext\n\
    {\n    int suffix = 0;\n    NSString *testPath = [parentDir stringByAppendingPathComponent:name];\n\
    \    testPath = [testPath stringByAppendingPathExtension:ext];\n    while ([[NSFileManager\
    \ defaultManager] fileExistsAtPath:testPath]) {\n        NSString *newName = [NSString\
    \ stringWithFormat:@\"%@-%d\",name,++suffix];\n        testPath = [parentDir stringByAppendingPathComponent:newName];\n\
    \        testPath = [testPath stringByAppendingPathExtension:ext];\n    }\n  \
    \  return testPath;\n}\n```\n\n## Working Directory\n\nEvery process maintains\
    \ a default directory path, referred to as the current directory or working directory.\
    \ This is the directory used to resolve relative paths. All relative paths are\
    \ concatenated with the current working directory path to obtain the file’s explicit\
    \ path. Table 11-2 shows the two `NSFileManager` methods used to get and change\
    \ the current working directory path in Objective-C.\n\n**Table 11-2.** Working\
    \ Directory Messages\n\n| Method | Description |\n| --- | --- |\n| `-(NSString*)currentDirectoryPath`\
    \ | Returns the current working directory path |\n| `-(BOOL)changeCurrentDirectoryPath:(NSString*)path`\
    \ | Sets the working directory path |\n\nIf the path specifies an accessible directory\
    \ in the file system, this method sets the current working directory to the one\
    \ identified by the path and returns `YES`. Otherwise, it does nothing and returns\
    \ `NO`.\n\nThe equivalent functionality in Java is accomplished by setting the\
    \ `\"user.dir\"` system property."
