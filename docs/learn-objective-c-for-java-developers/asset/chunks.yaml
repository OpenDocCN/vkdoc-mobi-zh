    Equality Contracts


    Collection search and sorting features depend on objects responding to the -isEqual:
    message in a consistent and reasonable manner. This is called the equality contract.
    The set and dictionary collections locate objects through the use of a hash table.
    This depends on an object’s -hash message returning a consistent value that has
    a predictable relationship to the -isEqual: response. This is called the hash
    contract.


    The equality and hash contracts are identical to those in Java. The equality contract
    is as follows:


    1\. Two objects with equivalent values must return YES from -isEqual:, and NO
    otherwise.


    2\. Two object pointers that are equal are always considered equal, and identical.
    Thus,


    [self isEqual:self] always returns YES.


    3\. A valid object pointer and a nil object pointer are always considered not
    equal. The statement [self isEqual:nil] must always return NO.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16 ■ COLLECTION PATTERNS


    4\. [a isEqual:b] must always return the same value as [b isEqual:a].


    The equality contract rules must be considered in order. For example, rule 2 supersedes
    rules 3


    and 4 in the special case where both object pointers are nil; nil is always equal
    to nil.


    The hash contract is simple and also consistent with Java’s: 1\. Two objects that
    are equal ([a isEqual:b]==YES) must return the same hash value ([a hash]==[b hash]).


    2\. Ideally, objects that are different ([a isEqual:b]==NO) should return hash
    values that are significantly different and evenly distributed across a large
    integer range.


    The -isEqual: and -hash methods are defined in NSObject, so every object inherits
    them. The default implementation of -hash is not, however, suitable for use in
    sets and dictionaries. If you create a subclass of NSObject that you plan to use
    in a collection, you should override -isEqual: and implement the equality contract.
    If the object will be stored in a set or used as a key in a dictionary, you must
    also override


    -hash to implement the hash contract. Listing 16-5 shows correctly implemented
    equality and hash methods.


