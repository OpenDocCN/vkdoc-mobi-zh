    \n应用工具包（GUI 框架）应用程序中的分布式通知中心会在应用程序变为非活跃状态时自动挂起——即当它不再是前台应用程序时。当应用程序重新变为活跃状态时，它会自动取消挂起。你不应干扰此行为；请使用\
    \ `NSNotificationSuspensionBehaviorDeliverImmediately` 或 `deliverImmediately:`\
    \ 选项，将通知投递给处于挂起状态应用程序中的观察者。守护进程或命令行工具可以根据需要挂起或激活其分布式通知中心。\n\n**总结**\n\n通知为不同对象之间的通信提供了一种灵活的方式。观察者可以注册以接收特定通知或广泛的通知。观察者可以注册以接收来自它们一无所知的对象的通知。通知中心负责为你的对象管理提供者和观察者。\n\
    \n通知也可以被推送到队列中异步投递，或者发布到分布式通知中心以在进程间交换。通过合并冗余通知可以实现简单的负载均衡。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第 19 章 — 观察者模式\n\n观察者模式在源对象和一组观察者之间创建了一种一对多的单向关系。当源对象的某个属性发生变化时，观察者会收到一条通知消息。观察者可以利用这些信息与所观察的对象保持同步，或执行其他任务。\n\
    \n是我多心了，还是这听起来和上一章的提供者/订阅者模式完全一样？在这个抽象层面上，提供者/订阅者模式和观察者模式非常相似。\n\n在 Java 中，两者都会像第\
    \ 18 章所阐述的那样，通过监听器接口、对象和管理来实现。但观察者模式和提供者/订阅者模式是不同的，如表 19-1 所述。\n\n**表 19-1.**\
    \ 提供者/订阅者模式与观察者模式的区别\n\n| 提供者/订阅者模式 | 观察者模式 |\n| --- | --- |\n| 提供者/订阅者模式以通知为中心。通知对象可以包含任意信息，并可以为任何目的而定义。\
    \ | 观察者模式关注对象的特定属性。观察者观察另一个对象的某个属性，并在该属性发生变化时得到通知。通知中包含的唯一信息是对象本身以及变化的详情。 |\n\
    | 提供者对象积极参与提供者/订阅者设计模式。它明确地定义它将发送哪些通知以及何时发送。 | 被观察的对象通常是*被动*的。它不定义哪些属性可以被观察，也不需要在属性变化时执行任何操作；框架会代表它生成通知。\
    \ |\n| 提供者必须实现代码来发布通知。 | 被观察的对象无需实现任何代码即可被观察。如果某个类期望被观察，并且具有非平凡的属性或关系，你可以选择实现自定义通知代码。\
    \ |\n| 通知被发布到通知中心。 | 被观察属性的通知直接从源对象发送到它的观察者。 |\n\nObjective-C 提供了一种非常具体的技术来实现观察者模式，称为键值观察。这是一项需要理解的重要技术，因为它是渗透在用户界面框架中的模型-视图-控制器模式的一个组成部分。由于键值观察具有非常独特的能力，本章中没有\
    \ Java 示例。从本质上讲，它们会与第 18 章中的 Java 示例完全相同。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 第 19 章 ■ 观察者模式\n\n本章描述了观察者模式的基本原理以及键值观察技术。你至少需要阅读这些内容来理解 KVO。后续章节将解释如何使用\
    \ KVO，以及如何为非平凡属性添加 KVO 支持。键值观察使用键值编码。如果这听起来不熟悉，你可能需要回顾一下第 10 章的“键值编码”部分，快速复习一下。\n\
    \n## 键值观察的工作原理\n\n键值观察的工作原理是：当另一个对象（被观察对象）的特定属性发生变化时，通知一个对象（观察者）。这种关系是通过向将被观察的对象发送单条\
    \ `-addObserver:…` 消息来建立的。一旦建立，每当被观察对象的那个属性发生变化时，观察者对象就会收到一条通知消息。清单 19-1 展示了一个键值观察的简单示例。首先是类，然后是执行的代码，最后是程序的输出。\n\
    \n**清单 19-1.** 键值观察示例\n\n```objectivec\n@interface Chameleon : NSObject {\n  \
    \  NSColor *color;\n}\n@property (assign) NSColor *color;\n@end\n\n@implementation\
    \ Chameleon\n- (NSColor*)color {\n    return color;\n}\n- (void)setColor:(NSColor*)newColor\
    \ {\n    color = newColor;\n}\n@end\n\n@interface Watcher : NSObject\n@end\n\n\
    @implementation Watcher\n- (void)observeValueForKeyPath:(NSString*)keyPath\n \
    \                     ofObject:(id)object\n                        change:(NSDictionary*)change\n\
    \                       context:(void*)context {\n    NSLog(@\"对象 '%@' 的属性 '%@'\
    \ 已变更: %@\", keyPath, object, change);\n}\n@end\n\n...\n\nChameleon *chameleon\
    \ = [Chameleon new];\nWatcher *watcher = [Watcher new];\n\n[chameleon addObserver:watcher\n\
    \            forKeyPath:@\"color\"\n               options:NSKeyValueObservingOptionNew\n\
    \               context:NULL];\n\nchameleon.color = [NSColor greenColor];\n\n\
    输出:\n对象 '<Chameleon: 0x139330>' 的属性 'color' 已变更: {\n    kind = 1;\n    new = NSCalibratedRGBColorSpace\
    \ 0 1 0 1;\n}\n```\n\n以下是清单 19-1 中发生的情况：\n\n1. `Chameleon` 类实现了一个属性。这个属性没有什么特别之处，只是它符合键值编码的准则。\n\
    2. `Watcher` 类实现了一个 `-observeValueForKeyPath:ofObject:change:context:` 方法。这使其有资格成为键值观察者。\n\
    3. 观察者对象注册为 `Chameleon` 对象的 `color` 属性的观察者。\n4. 当 `Chameleon` 对象的 `color` 属性发生变化时，观察者对象会收到一条通知，告知它发生变化的是哪个属性（键路径）以及新的值。\n\
    \n简而言之，这就是键值观察。任何实现了 `-observeValueForKeyPath:ofObject:change:context:` 方法的对象，都可以注册来观察另一个对象的几乎任何属性。每当该属性发生变化时，观察者就会收到一条通知。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 键值观察的魔法\n\n如果你正挠头思索键值观察框架是如何知道\
    \ `Chameleon` 对象收到了 `-setColor:` 消息的，那它是通过一种叫做 isa 交换的小魔法做到的。在第 26 章中会对此进行更详细的描述。\n"
- fmt: "# KVO 工作原理\n\n`KVO` 利用了 Objective-C 对象的动态特性。当观察者请求观察 `Chameleon` 对象时，`KVO`\
    \ 框架会动态地为 `Chameleon` 创建一个新的 Objective-C 子类，重写其 `-setColor:` 方法，并将该对象的类更改为新的子类。当\
    \ `Chameleon` 对象随后收到 `-setColor:` 消息时，合成子类的方法会被调用。该子类方法先调用 `[super setColor:newColor]`，然后将请求的属性变化通知发送给所有观察者。\n\
    \n这一过程快速、高效，且对被观察对象完全透明。\n\n`KVO` 仅重写被观察属性的 `setter` 方法，因此对其他方法没有性能影响。如果稍后移除某个对象的所有观察者，`KVO`\
    \ 会将该对象的类恢复为原始类。\n\n## 与提供者/订阅者及观察者模式的比较\n\n延续此前对提供者/订阅者模式与观察者模式的比较，第 18 章中介绍的\
    \ `Thermometer` 和 `TemperatureMonitor` 示例本可以轻松使用键值观察（`Key-Value Observing`）实现，但存在以下注意事项：\n\
    \n- `Thermometer` 对象无法根据其发布通知的通知中心来选择观察者受众。\n- 温度变化通知除了包含新值（以及可能的旧值）外，不会包含关于变化的任何额外信息。\n\
    - 观察者无法注册以接收来自未知对象的通知。\n- 温度变化通知无法排队以进行异步投递或合并。\n- 变化通知只能发送给同一进程内的对象。\n\n## KVO\
    \ 的核心特性\n\n键值观察最重要的特性是，它通常不需要被观察对象提供任何编程支持。例如，`NSProgressIndicator` 类定义了一个符合 `KVC`（`Key-Value\
    \ Coding`）规范的 `indeterminate` 属性。这是一个简单的只读 `BOOL` 属性值，要么设置，要么不设置。如果你有一个用户界面对象需要根据进度指示器的\
    \ `indeterminate` 状态改变外观，你的对象可以观察该视图对象的 `indeterminate` 属性，并在其发生变化时自行更新。漂亮之处在于，`NSProgressIndicator`\
    \ 从未被设计为在其 `indeterminate` 属性变化时通知观察者，但借助 `KVO`，它仍然可以参与观察者设计模式。\n\n> **注意**：键值观察也会注意到通过键值编码（`Key-Value\
    \ Coding`）进行的属性更改，例如 `[chameleon setValue:[NSColor greenColor] forKey:@\"color\"\
    ]`，如第 10 章“键值编码”部分所述。然而，`KVO` 无法观察通过直接赋值进行的属性更改，例如 `chameleon->color=[NSColor\
    \ greenColor]`。如果使用直接赋值并且希望你的类兼容键值观察，则需要实现手动 `KVO` 通知，这将在本章后面解释。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# 第 19 章 ■ 观察者模式\n\n以上就是键值观察的基础知识。本章其余部分将深入探讨观察者可用的选项，然后讲解手动实现 `KVO` 以及支持相互关联和复杂属性的更复杂问题。\n\
    \n## 注册键值观察者\n\n当观察者对象注册以观察另一个对象的属性时，需要提供五条信息：\n\n- 源对象\n- 观察者\n- 源对象属性的键值路径（`key-value\
    \ path`）\n- 一组观察者选项\n- 可选的上下文值\n\n要观察的属性的键值路径比乍看起来要灵活得多。\n\n键路径参数接受一个键值编码路径，如第\
    \ 10 章“键值编码”部分所述。该路径可以描述属性的属性，这巧妙地赋予了 `KVO` 极大的灵活性和能力。考虑清单 19-2 中的代码，它扩展了清单 19-1\
    \ 中的代码。\n\n**清单 19-2. 观察复杂的键值编码路径**\n\n```objectivec\n#import \"Chameleon.h\"\n\
    \n@interface ReptileZoo : NSObject {\n    Chameleon *chameleon;\n}\n```"
  raw: 'KVO exploits the dynamic nature of Objective-C objects. When the watcher requests
    to observe the Chameleon object, the KVO framework spontaneously creates a new
    Objective-C subclass of Chameleon, overrides its -setColor: method, and changes
    the class of the object to the new subclass. When the Chameleon object later receives
    a -setColor: message, the method of the synthetic subclass gets invoked. The subclass
    method calls [super setColor:newColor] and then sends the requested property change
    notifications to its observers.


    It’s fast, effective, and completely transparent to the observed object.


    KVO only overrides the setter methods of the properties being observed, so there
    is no performance penalty for other methods. If you later remove all the observers
    of an object, KVO will change the object back to its original class.


    Continuing the comparison between the provider/subscriber and observer patterns,
    the Thermometer and TemperatureMonitor examples presented in Chapter 18 could
    have easily been implemented using Key-Value Observing, with these caveats:


    • The Thermometer object could not choose its audience of observers based on what
    notification center it posts to.


    • A temperature change notification wouldn’t contain any additional information
    about the change beyond the new, and possibly old, temperature values.


    • An observer couldn’t register to receive notifications from an unknown object.


    • Temperature change notifications could not be queued for asynchronous delivery
    or coalesced.


    • Change notifications could only be sent to objects in the same process.


    The most important feature of Key-Value Observing is that it doesn’t (typically)
    require any programming support on the part of the observed object. For example,
    the NSProgressIndicator class defines a KVC-compliant indeterminate property.
    It’s a simple, read-only, BOOL property value that is either set or not. If you
    had a user interface object that needed to change its appearance based on whether
    the progress indicator was indeterminate, your object could observe the indeterminate
    property of the view object and update itself whenever it changed. The beautiful
    part is that NSProgressIndicator was never designed to notify observers when its
    indeterminate property changes, but with KVO it can still participate in the observer
    design pattern.


    ■NoteKey-Value Observing will also notice property changes made using Key-Value
    Coding, as in [chameleon setValue:[NSColor greenColor] forKey:@"color"], as described
    in the Key-Value Coding section of Chapter 10\. KVO cannot, however, observe changes
    made to properties through direct assignment, as in chameleon->color=[NSColor
    greenColor]. If you use direct assignment and want your class to be compatible
    with Key-Value Observing, you will need to implement manual KVO notifications,
    explained later in this chapter.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ OBSERVER PATTERN


    That’s the basics of Key-Value Observing. The rest of this chapter delves into
    some of the options available to observers, and then gets into the more complex
    issues of manually implementing KVO and supporting interrelated and non-trivial
    properties.


    Registering a Key-Value Observer


    When an observer object registers to observe another object’s property, five pieces
    of information are required:


    • The source object


    • The observer


    • The key-value path of the source object’s property


    • A set of observer options.


    • An optional context value.


    The key-value path of the property to observe is more flexible than might be obvious
    at first.


    The key path parameter accepts a Key-Value Coding path, as described in the “Key-Value
    Coding”


    section of Chapter 10\. The path can describe properties of properties, which
    subtly affords KVO a great deal of flexibility and power. Consider the code in
    Listing 19-2, which extends the code in Listing 19-1.


    Listin g 19-2\. Observing Complex Key-Value Coding Paths


    #import "Chameleon.h"


    @interface ReptileZoo : NSObject {


    Chameleon *chameleon;


