  trans: "\n本章首先展示典型的 Java 监听器接口如何通过 Cocoa 的通知服务来实现。随后将描述其他可能的提供者/订阅者关系，以及如何在设计中运用这些关系。最后，将介绍分布式通知（进程间传递的通知）以及线程安全性等相关考量。你还需要阅读下一章关于观察者模式的内容，因为这两种模式非常相似。\n\
    \n## 通知\n\n在 Objective-C 中，发送给观察者的通知被封装在`NSNotification`实例中。提供者决定`NSNotification`对象的内容，接收者则决定它将要接收的\
    \ Objective-C 消息。\n\n列表 18-1 和 18-2 对比了 Java 监听器与 Objective-C 观察者之间的差异。列表 18-1\
    \ 定义了一个监控温度的`Thermometer`类。每当温度发生变化时，它就会通知其观察者。\n\n### 列表 18-1. 温度计，温度提供者\n\n\
    **Java**\n\n```java\npublic interface TemperatureListener\n{\n    public void\
    \ temperatureChanged( Thermometer thermometer, float temperature );\n}\n```\n\n\
    ```java\npublic class Thermometer\n{\n    private float temperature;\n    private\
    \ HashSet<TemperatureListener> listeners =\n        new HashSet<TemperatureListener>();\n\
    \n    public float getTemperature( )\n    {\n        return temperature;\n   \
    \ }\n\n    public void setTemperature( float newTemp )\n    {\n        if (temperature!=newTemp)\
    \ {\n            temperature = newTemp;\n            fireTemperatureChange();\n\
    \        }\n    }\n\n    public void addListener( TemperatureListener listener\
    \ )\n    {\n        listeners.add(listener);\n    }\n\n    public void removeListener(\
    \ TemperatureListener listener )\n    {\n        listeners.remove(listener);\n\
    \    }\n\n    public void fireTemperatureChange( )\n    {\n        for ( TemperatureListener\
    \ listener : listeners ) {\n            listener.temperatureChanged(this,temperature);\n\
    \        }\n    }\n}\n```\n\n**Objective-C**\n\n```objc\n#define TempDidChange\
    \ @\"TemperatureDidChange\"\n\n@interface Thermometer : NSObject {\n    float\
    \ temperature;\n}\n@property float temperature;\n@end\n\n@implementation Thermometer\n\
    \n- (float)temperature\n{\n    return temperature;\n}\n\n- (void)setTemperature:(float)newTemp\n\
    {\n    if (temperature!=newTemp) {\n        temperature = newTemp;\n        NSNumber\
    \ *tempValue = [NSNumber numberWithFloat:temperature];\n        NSDictionary *info\
    \ = [NSDictionary dictionaryWithObject:tempValue forKey:@\"Temperature\"];\n \
    \       [[NSNotificationCenter defaultCenter] postNotificationName:TempDidChange\
    \ object:self\n                                                          userInfo:info];\n\
    \    }\n}\n\n@end\n```\n\n列表 18-2 展示了一个温度观察者，它接收来自`Thermometer`对象的温度变化通知。该观察者通过待观察的`Thermometer`对象进行初始化，并记录温度值的任何变化。\n\
    \n### 列表 18-2. 温度监视器，温度观察者\n\n**Java**\n\n```java\npublic class TemperatureMonitor\
    \ implements TemperatureListener\n{\n    public TemperatureMonitor( Thermometer\
    \ thermometer )\n    {\n        thermometer.addListener(this);\n    }\n\n    public\
    \ void temperatureChanged( Thermometer thermometer, float temperature )\n    {\n\
    \        System.out.println(\"Temperature is now \"+temperature);\n    }\n}\n\
    ```\n\n**Objective-C**\n\n```objc\n#import \"Thermometer.h\"\n\n@interface TemperatureMonitor\
    \ : NSObject\n- (id)initWithThermometer:(Thermometer*)thermometer;\n- (void)tempChanged:(NSNotification*)notification;\n\
    @end\n\n@implementation TemperatureMonitor\n\n- (id)initWithThermometer:(Thermometer*)thermometer\n\
    {\n    self = [super init];\n    if (self != nil) {\n        [[NSNotificationCenter\
    \ defaultCenter] addObserver:self\n                                          \
    \       selector:@selector(tempChanged:)\n                                   \
    \                  name:TempDidChange\n                                      \
    \             object:thermometer];\n    }\n    return self;\n}\n\n- (void)tempChanged:(NSNotification*)notification\n\
    {\n    id tempValue = [[notification userInfo] objectForKey:@\"Temperature\"];\n\
    \    NSLog(@\"Temperature is now %@\",tempValue);\n}\n\n@end\n```\n\n列表 18-1 和\
    \ 18-2 中的 Java 与 Objective-C 解决方案在功能上是等效的。具体来说：\n\n- `Thermometer`类定义了它将发送的通知。\n\
    - 每当温度发生变化时，`Thermometer`类都会通知其观察者。\n"
- fmt: "• A `TemperatureMonitor` object receives only temperature change notifications\
    \ from the one `Thermometer` object it is observing.  \n• A notification includes\
    \ the new temperature value and a reference to the `Thermometer` object that posted\
    \ the notification.  \n• Notifications are delivered as synchronous method invocations.\
    \ That is, all of the notification methods execute before `setTemperature` returns.\
    \  \n\nThe significant differences are as follows:  \n\n# Chapter 18 ■ Provider/Subscriber\
    \ Pattern  \n\n• The Java `Thermometer` class must maintain its own set of listener\
    \ objects. The observers of the Objective-C `Thermometer` object are maintained\
    \ by its `NSNotificationCenter`.  \n• The Java solution defines the method it\
    \ will invoke via a `TemperatureListener` interface, and the listener object must\
    \ implement this interface. In Objective-C, notifications are always delivered\
    \ as `NSNotification` objects.  \n• The sender defines the Java method that receives\
    \ the notification. In Objective-C, the observer determines the notification message\
    \ it will receive.  \n\nObjective-C objects can register to observe notifications\
    \ using flexible criteria. In addition to the simple case illustrated in the code,\
    \ an observer can choose to receive multiple notifications from a single object,\
    \ or similar notifications from multiple objects. In fact, the observer doesn’t\
    \ have to have a reference to the provider or even know what class it is. In the\
    \ case of distributed notifications, the provider object might not even be in\
    \ the same process.  \n\nAn `NSNotificationCenter` object organizes and manages\
    \ observers and dynamically pairs notifications to observers. `NSNotificationCenter`\
    \ relieves the providers of implementing their own observer management; a provider\
    \ only needs to concern itself with sending notifications. Since `NSNotificationCenter`s\
    \ are the nexus of notifications, they will be discussed next, followed by how\
    \ notifications are posted and how observers register to receive them.  \n\n##\
    \ Notification Centers  \n\nAn `NSNotificationCenter` manages a set of observers.\
    \ Providers can post a notification to a notification center, which will distribute\
    \ it to all of the interested observers registered with that center.  \n\nNormally,\
    \ your objects interact with the single default `NSNotificationCenter` created\
    \ by the Cocoa framework for the process. This per-process instance is obtained\
    \ with the class message `[NSNotificationCenter defaultCenter]`. This is the Grand\
    \ Central Station of notifications, and the notification center used by the bulk\
    \ of the Cocoa framework. Consequently, if you intend to receive any of those\
    \ notifications, you must register your object with `[NSNotificationCenter defaultCenter]`.\
    \  \n\nThere are a few other specialized notification centers and you can create\
    \ your own. Each notification center is completely self-contained. A notification\
    \ posted to a center will only be delivered to the objects registered with that\
    \ notification center. The `NSWorkspace` object defines its own notification center\
    \ that can be obtained with `[[NSWorkspace sharedWorkspace] notificationCenter]`.\
    \ If you want to receive an `NSWorkspace` notification, your object must register\
    \ with that notification center.  \n\n> **Note:** An `NSNotificationCenter` distributes\
    \ all notifications synchronously. You can, however, attach an `NSNotificationQueue`,\
    \ as described in the “Notification Queuing” section later in this chapter, to\
    \ a notification center to deliver notifications asynchronously.  \n\nYou may\
    \ also want to define your own notification centers. Chapter 15 showed code for\
    \ creating a per-thread notification center. Since notifications are always delivered\
    \ in the thread that posted them, a per-thread notification center would allow\
    \ you to organize your observers by thread.  \n\n## Posting Synchronous Notifications\
    \  \n\nPosting a synchronous notification is simple, deftly demonstrated by the\
    \ `Thermometer` class in Listing 18-1. There are three pieces of information that\
    \ make up a notification:  \n\n• The notification name  \n• The sender  \n• A\
    \ dictionary of supplementary information  \n\nThe notification name is a string\
    \ object. It can be any value you choose, as long as it doesn’t conflict with\
    \ the notification names used by other objects. Generally, a descriptive title\
    \ like `@\"TemperatureDidChange\"` is sufficient to be unique. Notification name\
    \ constants defined by frameworks tend to use class naming conventions. For example,\
    \ all of the Cocoa framework notification names begin with “NS.”  \n\nThe object\
    \ property of a notification contains a reference to the sender. Thus, every notification\
    \ includes an implicit reference to the object that sent it. In the example in\
    \ Listings 18-1 and 18-2, it wasn’t strictly necessary to include the temperature\
    \ value in the `userInfo` dictionary. The notification receiver could have obtained\
    \ the value with `((Thermometer*)[notification object]).temperature`.  \n\nThe\
    \ optional `userInfo` dictionary is an immutable dictionary containing whatever\
    \ supplementary objects the provider wants to include. As mentioned, it wasn’t\
    \ strictly necessary to include the temperature value in the `userInfo` dictionary,\
    \ but it’s often a good idea. Having the temperature included in the dictionary\
    \ relieves the observer of having to make too many assumptions about the sender\
    \ (such as, “is the new temperature value still valid when the notification is\
    \ received?”).  \n\nThe `userInfo` dictionary is a great place to include other\
    \ useful or transient information, such as the previous temperature value, the\
    \ rate the temperature is changing, and so on. Then again, in many notifications\
    \ the only interesting bit of information is the sender.  \n\nThe notification\
    \ name and sender are required. The `userInfo` dictionary is optional, or can\
    \ be empty. There are three methods for posting notifications:  \n\n- `- (void)postNotificationName:(NSString*)name\
    \ object:(id)sender`  \n- `- (void)postNotificationName:(NSString*)name object:(id)sender\
    \ userInfo:(NSDictionary*)info`  \n- `- (void)postNotification:(NSNotification*)notification`\
    \  \n\nThe first two messages construct a new `NSNotification` object from the\
    \ name, sender, and optional dictionary. The last message accepts a pre-assembled\
    \ `NSNotification` object and posts it. Note that while the object parameter is\
    \ required, there’s no rule that says it must be the object sending the notification.\
    \ You’re welcome to post notifications on behalf of other objects.  \n\nNotifications\
    \ are delivered synchronously to all observers in the same thread before the `-postNotification…`\
    \ message returns. It’s possible to send notifications asynchronously using an\
    \ `NSNotificationQueue`, described in the “Notification Queuing” section later\
    \ in the chapter.  \n\n## Being a Discriminating Observer  \n\nThe real power\
    \ of notifications is in the flexible ways an observer can register to receive\
    \ them. To register to receive notifications, send the `NSNotificationCenter`\
    \ an `-addObserver:selector:name:object:` message. The four parameters define\
    \ what notifications it will receive and how it will receive them:  \n\n• The\
    \ `observer` and `selector` parameters define the object that will receive the\
    \ notifications and the Objective-C message that will be sent to it. The method\
    \ must be compatible with `-(void)notificationMessage:(NSNotification*)notification`.\
    \ While the `observer` parameter is typically `self`, you are free to register\
    \ other objects.  \n• The `name` parameter is the name of the desired notification.\
    \  \n• The `object` parameter is the desired provider.  \n\nThe `selector` parameter\
    \ allows the observer to choose the message it will receive when the notification\
    \ is sent. Your observer can send multiple notifications to a single method, or\
    \ route the same notification from different sources to different methods."
