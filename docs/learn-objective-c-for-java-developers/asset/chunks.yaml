- fmt: '```objc

    + (CommandCenter*)sharedCommandCenter;


    @end


    static CommandCenter *SharedCommandCenter;


    @implementation CommandCenter


    + (void)initialize


    {


    SharedCommandCenter = [CommandCenter new];


    }


    + (CommandCenter*)sharedCommandCenter


    {


    return SharedCommandCenter;


    }


    @end

    ```


    类的`+initialize`方法总是类收到的第一条消息。它是创建单例的便捷位置。它也简化了类中的代码；任何类方法都可以直接引用`SharedCommandCenter`变量（例如，不必每次都使用`[CommandCenter
    sharedCommandCenter]`），并确保它已被初始化。


    请注意，`+initialize`不会像Java初始化语句那样在应用程序启动时或类被加载时调用。`+initialize`消息在类首次收到消息时发送。如果该类从未被使用，则永远不会发送`+initialize`消息。


    ## 单例工厂


    工厂模式可以被重新利用，将类簇转换为单例工厂。在第22章中，你看到了类的初始化器如何用另一个类替换被请求的类。同样的技术也可以用于返回一个已有的对象。为了实现单例模式，削弱初始化器，使其每次返回同一个对象。清单23-3中的代码使用类的初始化器实现了一个单例。


    **清单 23-3**. 单例工厂模式


    ```objc

    @interface CommandCenter : NSObject


    @end


    static CommandCenter* SharedCommandCenter;


    @implementation CommandCenter


    - (id)init


    {


    self = [super init];


    if (self!=nil) {


    if (SharedCommandCenter!=nil)


    return SharedCommandCenter;


    …


    SharedCommandCenter = self;


    }


    return self;


    }


    @end

    ```


    `CommandCenter`类的初始化器方法实现了单例模式。第一个创建的`CommandCenter`实例（使用`[[CommandCenter alloc]
    init]`）被保存在全局变量中。任何后续尝试创建另一个`CommandCenter`实例的操作都会返回原始实例。


    单例模式的这个实现具有类簇的所有优点和缺点。主要优点是客户端代码不必使用特殊消息来获取单例，甚至不必知道该类是单例。它只需创建对象并使用它。另一个优点是类作者不必采取任何特殊措施来阻止客户端尝试创建类的额外实例。


    > **注意**：出于显而易见的原因，你的单例类可能不会遵循`NSCopying`协议。如果需要遵循（例如，用作`NSDictionary`中的键），请重写`-copyWithZone:`方法并让它返回`self`。


    这种模式的一个变体是从不可变对象池中返回对象。一个封装字母表中字母属性的`Letter`类可以为每个字母实现一个单例工厂。每次调用`[[Letter alloc]
    initWithLetter:''a'']`都将返回一个单例的`''a''`对象，而每次`[[Letter alloc] initWithLetter:''b'']`都将返回一个单例的`''b''`对象，依此类推。这是实现享元设计模式的一种替代方案。


    ## 总结


    单例模式在Java和Objective-C中都极为常见。Objective-C提供了一些有趣的替代方案，可以简化其实现。也可以将类簇转换为单例工厂，隐藏其单例性质。


