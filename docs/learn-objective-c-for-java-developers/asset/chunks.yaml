    = …


    [[NSColor blueColor] setFill]; // set fill color to blue


    [[NSColor greenColor] setStroke]; // set stroke color to green


    [path fill]; // fills a blue shape


    [path stroke]; // draws a green line


    The graphics context also includes a loose set of esoteric attributes and rendering
    hints, much like Graphics2D, that influence scaling, anti-aliasing, color space
    adjustments, and so on.


    Some of the properties of Graphics2D are not properties of the graphics context
