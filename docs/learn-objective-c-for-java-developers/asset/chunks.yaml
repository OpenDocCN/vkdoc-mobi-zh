    \ run];\n    // 此调用永不返回：终止进程以停止程序\n    return 0;\n}\n```\n\n要使用分布式通知，你需要了解其一些限制和复杂性，这些将在接下来的几节中描述。\n\
    \n## 分布式通知中心\n\n要发布或观察分布式通知，你的对象必须与每个进程创建的单例 `NSDistributedNotificationCenter`\
    \ 进行交互。你可以通过 `[NSDistributedNotificationCenter defaultCenter]` 获取它。未来框架可能会定义其他分布式通知中心，但目前只有一个。你不能创建自己的分布式通知中心。\n\
    \n如果需要更复杂的进程间通信路径，可以考虑使用分布式对象，详见第 13 章。\n\n分布式通知中心使用 Mach（内核）端口交换消息。Mac OS X 的安全模型将\
    \ Mach 端口组织成引导命名空间的层次结构。发布的通知将广播到你账户的本地命名空间和父命名空间中的所有进程，但不会广播到其他用户创建的子命名空间。\n\n\
    ## 属性列表值\n\n分布式通知中的信息是序列化的（参见第 12 章“Objective-C 序列化”部分）。这将 `object` 和 `userInfo`\
    \ 参数中传递的对象限制为属性列表值——基本上是数组、字典、字符串、数字和日期对象。分布式通知中心中的 `object` 参数，其使用方式与普通通知中心完全相同，区别仅在于它只是一个字符串，而不是指向提供者对象的指针。使用描述性值（如\
    \ `@\"com.apress.learnobjc.DemoProvider\"`）来标识发送者或对通知进行分组。\n\n## 异步通知传递\n\n与 `NSNotificationQueue`\
    \ 类似，分布式通知会被排队、可选择合并，并异步传递。自 Mac OS X 10.3 起，分布式通知始终在主运行循环上传递。通知队列与分布式通知的主要区别在于，决定通知如何排队和合并的是观察者，而非提供者。\n\
    \n`NSDistributedNotificationCenter` 以两种模式之一运行：挂起或未挂起。未挂起时，通知会在发布时立即传递。挂起时，通知会根据观察者请求的\
    \ `suspensionBehavior:` 模式被丢弃、合并、缓冲或传递。四种可能的模式如表 18-4 所示。\n\n**表 18-4.** *挂起通知中心观察者模式*\n\
    \n| 模式 | 描述 |\n|------|------|\n| `NSNotificationSuspensionBehaviorDrop` | 通知被丢弃。\
    \ |\n| `NSNotificationSuspensionBehaviorCoalesce` | 相似的通知被合并并保存。此为默认模式。 |\n| `NSNotificationSuspensionBehaviorHold`\
    \ | 通知被保存，直到达到通知中心的缓冲区上限。 |\n| `NSNotificationSuspensionBehaviorDeliverImmediately`\
    \ | 忽略分布式通知中心的挂起状态，无论如何立即传递通知。 |\n"
- fmt: "\nThe observer requests a suspension mode using the `-addObserver:selector:name:object:suspensionBehavior:`\
    \ message. The regular `-addObserver:selector:name:object:` message registers\
    \ the observer in the `NSNotificationSuspensionBehaviorCoalesce` mode.\n\nA provider\
    \ can force a notification to be delivered by posting it with the `-postNotificationName:object:userInfo:deliverImmediately:`\
    \ message, passing `YES` in the `deliverImmediately:` parameter. This ignores\
    \ the suspended state and behavior modes and delivers the notification to all\
    \ observers.\n\nSuspending a Distributed Notification Center\n\nA distributed\
    \ notification center is suspended or reactivated with the `-setSuspended:` message.\
    \ When it’s reactivated, any buffered notifications are delivered immediately.\n\
    \nThe distributed notification center in an AppKit (GUI framework) application\
    \ is automatically suspended whenever the application becomes inactive—that is,\
    \ when it is no longer the front application. When the application becomes active\
    \ again, it is automatically unsuspended. You should not interfere with this;\
    \ use the `NSNotificationSuspensionBehaviorDeliverImmediately` or `deliverImmediately:`\
    \ options to deliver notifications to observers in suspended applications. Daemons\
    \ or command-line tools may suspend or activate their distributed notification\
    \ centers as they see fit.\n\nSummary\n\nNotifications provide a flexible way\
    \ for disparate objects to communicate with one another. Observers can register\
    \ to receive specific notifications or a broad range of notifications. Observers\
    \ can register to receive notifications from objects they know nothing about.\
    \ Provider and observer management is handled for your objects by the notification\
    \ center.\n\nNotifications can also be pushed onto queues to be delivered asynchronously,\
    \ or posted to a distributed notification center to be exchanged between processes.\
    \ Simple load balancing can be accomplished by coalescing redundant notifications.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## Chapter 19 — Observer\
    \ Pattern\n\nThe observer pattern creates a one-to-many, unidirectional relationship\
    \ between a source object and a set of observers. The observers receive a notification\
    \ message whenever a property of the source object changes. The observers can\
    \ use this information to stay in synchronization with the observed object or\
    \ perform additional tasks.\n\nIs it just me, or does that sound exactly like\
    \ the provider/subscriber pattern from the last chapter? At this level of abstraction,\
    \ the provider/subscriber and observer patterns are extremely similar.\n\nIn Java,\
    \ both would be implemented using listener interfaces, objects, and management\
    \ as was illustrated in Chapter 18. But the observer and provider/subscriber patterns\
    \ are different, as outlined in Table 19-1.\n\n**Table 19-1.** Differences Between\
    \ Provider/Subscriber and Observer Patterns\n\n| Provider/Subscriber Pattern |\
    \ Observer Pattern |\n| --- | --- |\n| The provider/subscriber pattern is centered\
    \ on notifications. Notification objects can contain arbitrary information and\
    \ be defined for any purpose. | The observer pattern concerns itself with specific\
    \ properties of an object. An observer observes a property of another object and\
    \ is notified when that property changes. The only information contained in the\
    \ notification is the object and the details of the change. |\n| A provider object\
    \ actively participates in the provider/subscriber design pattern. It explicitly\
    \ defines the notifications that it will send and when. | An observed object is\
    \ typically passive. It doesn’t define what properties can be observed nor is\
    \ it required to perform any action when they change; the framework generates\
    \ notifications on its behalf. |\n| A provider must implement code to post notifications.\
    \ | An observed object doesn’t have to implement any code to be observed. You\
    \ may choose to implement custom notification code if the class expects to be\
    \ observed and has non-trivial properties or relationships. |\n| Notifications\
    \ are posted to notification centers. | Observed property notifications are sent\
    \ directly from the source object to its observers. |\n\nObjective-C provides\
    \ a very specific technology for implementing the observer pattern called Key-Value\
    \ Observing (KVO). It’s an important technology to understand, because it’s an\
    \ integral component in the Model-View-Controller pattern that permeates the user\
    \ interface framework. Because of the very unique capabilities of Key-Value Observing,\
    \ there are no Java examples in this chapter. They would, essentially, be identical\
    \ in nature to the Java examples in Chapter 18.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### Chapter 19 ■ Observer Pattern\n\nThis chapter describes the basic principles\
    \ of the observer pattern and the Key-Value Observing technology. You should read\
    \ at least that much to gain an appreciation for KVO. Later sections explain how\
    \ to use KVO and add KVO support for non-trivial properties. Key-Value Observing\
    \ uses Key-Value Coding (KVC). If that doesn’t sound familiar, you may want to\
    \ peek at the “Key-Value Coding” section of Chapter 10 for a quick refresher.\n\
    \n## Key-Value Observing at Work\n\nKey-Value Observing works by notifying an\
    \ object, the observer, whenever a specific property of another object, the observed\
    \ object, changes. The relationship is created using a single `-addObserver:…`\
    \ message sent to the object that will be observed. Once established, the observer\
    \ object will receive a notification message every time that property of the observed\
    \ object changes. Listing 19-1 shows a simple example of Key-Value Observing at\
    \ work. The classes are first, followed by the executed code, and finally the\
    \ program’s output.\n\n**Listing 19-1.** Example of Key-Value Observing\n\n```objectivec\n\
    @interface Chameleon : NSObject {\n    NSColor *color;\n}\n@property (assign)\
    \ NSColor *color;\n@end\n\n@implementation Chameleon\n- (NSColor*)color {\n  \
    \  return color;\n}\n- (void)setColor:(NSColor*)newColor {\n    color = newColor;\n\
    }\n@end\n\n@interface Watcher : NSObject\n@end\n\n@implementation Watcher\n- (void)observeValueForKeyPath:(NSString*)keyPath\n\
    \                      ofObject:(id)object\n                        change:(NSDictionary*)change\n\
    \                       context:(void*)context {\n    NSLog(@\"Property '%@' of\
    \ object '%@' changed: %@\", keyPath, object, change);\n}\n@end\n\n...\n\nChameleon\
    \ *chameleon = [Chameleon new];\nWatcher *watcher = [Watcher new];\n\n[chameleon\
    \ addObserver:watcher\n            forKeyPath:@\"color\"\n               options:NSKeyValueObservingOptionNew\n\
    \               context:NULL];\n\nchameleon.color = [NSColor greenColor];\n\n\
    Output:\nProperty 'color' of object '<Chameleon: 0x139330>' changed: {\n    kind\
    \ = 1;\n    new = NSCalibratedRGBColorSpace 0 1 0 1;\n}\n```\n\nHere’s what happens\
    \ in Listing 19-1:\n\n1. The `Chameleon` class implements a property. There’s\
    \ nothing special about the property, other than it conforms to the Key-Value\
    \ Coding guidelines.\n2. The `Watcher` class implements an `-observeValueForKeyPath:ofObject:change:context:`\
    \ method. This makes it eligible to be a key-value observer.\n3. The watcher object\
    \ registers to be an observer of the chameleon object’s `color` property.\n4.\
    \ When the chameleon object’s `color` property changes, the watcher object receives\
    \ a notification that tells it the property (key path) that changed and the new\
    \ value.\n\nThat’s Key-Value Observing in a nutshell. Any object that implements\
    \ an `-observeValueForKeyPath:ofObject:change:context:` method can register to\
    \ observe almost any property of another object. Whenever the property changes,\
    \ the observer receives a notification.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### Key-Value Observing Magic\n\nIf you’re scratching your head wondering how\
    \ the Key-Value Observing framework knew that the `Chameleon` object received\
    \ a `-setColor:` message, it was done with a little bit of magic called isa swizzling.\
    \ It’s described in a bit more detail in Chapter 26."
