- fmt: "# The `ChessPiece` Class and Lazy Initialization\n\nThe `ChessPiece` class,\
    \ shown in Listings 21-1 and 21-2, accomplishes this by defining two class properties:\
    \ `+[ChessPiece colorNames]` and `+[ChessPiece pieceNames]`. These return an immutable\
    \ collection of strings that can be used to convert a color or piece enum (`int`)\
    \ into a string. They use lazy initialization to create, and save, the immutable\
    \ arrays the first time they are requested.\n\n## Listing 21-1. `ChessPiece.h`\n\
    \n```objective-c\n#import <Cocoa/Cocoa.h>\n\ntypedef enum {\n    White=0,\n  \
    \  Black\n} Color;\n\ntypedef enum {\n    Pawn=0,\n    Rook,\n    Bishop,\n  \
    \  Knight,\n    Queen,\n    King\n} Piece;\n\n@interface ChessPiece : NSObject\
    \ {\n    Color color;\n    Piece piece;\n}\n\n+ (NSArray*)colorNames;\n+ (NSArray*)pieceNames;\n\
    + (NSDictionary*)images;\n+ (NSString*)nameOfPiece:(Piece)piece color:(Color)color;\n\
    \n- (id)initWithPiece:(Piece)thePiece color:(Color)theColor;\n\n@property (readonly)\
    \ Color color;\n@property (readonly) Piece piece;\n@property (readonly) NSString\
    \ *name;\n@property (readonly) NSImage *image;\n\n@end\n```\n\n## Listing 21-2.\
    \ `ChessPiece.m`\n\n```objective-c\n#import \"ChessPiece.h\"\n\nstatic NSArray\
    \ *ColorNames;\nstatic NSArray *PieceNames;\nstatic NSDictionary *PieceImages;\n\
    \n@implementation ChessPiece\n\n+ (NSArray*)colorNames\n{\n    if (ColorNames==nil)\
    \ {\n        ColorNames = [NSArray arrayWithObjects:\n                      @\"\
    White\",\n                      @\"Black\",\n                      nil];\n   \
    \ }\n    return ColorNames;\n}\n\n+ (NSArray*)pieceNames\n{\n    if (PieceNames==nil)\
    \ {\n        PieceNames = [NSArray arrayWithObjects:\n                      @\"\
    Pawn\",\n                      @\"Rook\",\n                      @\"Bishop\",\n\
    \                      @\"Knight\",\n                      @\"Queen\",\n     \
    \                 @\"King\",\n                      nil];\n    }\n    return PieceNames;\n\
    }\n\n+ (NSDictionary*)images\n{\n    if (PieceImages==nil) {\n        // Load\
    \ the entire set of playing piece images\n        NSMutableDictionary *images\
    \ = [NSMutableDictionary new];\n        Color color;\n        Piece piece;\n \
    \       for (color=White; color<=Black; color++) {\n            for (piece=Pawn;\
    \ piece<=King; piece++) {\n                NSString *name = [ChessPiece nameOfPiece:piece\
    \ color:color];\n                [images setObject:[NSImage imageNamed:name] forKey:name];\n\
    \            }\n        }\n        PieceImages = [NSDictionary dictionaryWithDictionary:images];\n\
    \    }\n    return PieceImages;\n}\n\n+ (NSString*)nameOfPiece:(Piece)piece color:(Color)color\n\
    {\n    return [NSString stringWithFormat:@\"%@ %@\",\n            [[ChessPiece\
    \ colorNames] objectAtIndex:color],\n            [[ChessPiece pieceNames] objectAtIndex:piece]];\n\
    }\n\n- (id)initWithPiece:(Piece)thePiece color:(Color)theColor\n{\n    self =\
    \ [super init];\n    if (self != nil) {\n        piece = thePiece;\n        color\
    \ = theColor;\n    }\n    return self;\n}\n\n@synthesize color, piece;\n\n- (NSString*)name\n\
    {\n    return [ChessPiece nameOfPiece:piece color:color];\n}\n\n- (NSImage*)image\n\
    {\n    return [[ChessPiece images] objectForKey:[self name]];\n}\n\n@end\n```\n\
    \nIt also defines a `+[ChessPiece images]` class property that contains the images\
    \ of all the chess pieces. This is lazily initialized the first time a `ChessPiece`\
    \ object attempts to acquire its graphic representation. It’s a time-consuming\
    \ and resource-intensive initialization, and it requires that the application\
    \ be fully initialized and running since it depends on locating image resource\
    \ files in its application bundle.\n\n## The Class `+initialize` Method\n\nObjective-C\
    \ classes are themselves initialized lazily. The structure that defines a class\
    \ is not constructed until the first message is sent to the class. This keeps\
    \ the runtime nimble, allowing it to start up with the minimum amount of initialization\
    \ required. But Objective-C goes one step further; after initializing the `Class`\
    \ object, and before any other messages are sent, the runtime sends a single `+initialize`\
    \ message to the newly created `Class` object. You can override this method to\
    \ perform additional class-level initialization.\n\nBy exploiting the `+initialize`\
    \ message, the `ChessPiece` class can be significantly simplified, as shown in\
    \ Listings 21-3 and 21-4.\n\n## Listing 21-3. `ChessPiece.h` Using `+initialize`\n\
    \n```objective-c\n#import <Cocoa/Cocoa.h>\n\ntypedef enum {\n    White=0,\n  \
    \  Black\n} Color;\n\ntypedef enum {\n    Pawn=0,\n    Rook,\n    Bishop,\n  \
    \  Knight,\n    Queen,\n    King\n} Piece;\n\n@interface ChessPiece : NSObject\
    \ {\n    Color color;\n    Piece piece;\n}\n\n+ (NSString*)nameOfPiece:(Piece)piece\
    \ color:(Color)color;\n```"
