    Accessing Properties


    The accessor methods for a property can be invoked like any other method. But
    formally declared properties carry an additional benefit. Objective-C 2.0 extends
    the member variable operator (.) to allow easy access to formally defined properties.
    This so-called “dot syntax” lets you interact with an object’s property the way
    you would address a member variable in Java.


    Using the class defined in Listing 3-9, the code in Listing 3-10 sets and accesses
    several properties of a Person object. The dot syntax is expanded by the compiler
    to call the appropriate getter or setter method for each property; it does not
    directly access the object’s instance variables as it would in Java. This is considered
    “syntactic sugar,” provided to improve readability and reduce clutter. The code
    produced by Listing 3-10 is identical to the code shown by Listing 3-11.


    Listin g 3-10\. Object Properties via Dot Syntax


    Person *person = ...;


    person.firstName = @"James";


    if (person.lastName.length==0)


    person.lastName = @"Smith";


