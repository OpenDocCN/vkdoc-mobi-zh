- fmt: '每个文档对象可以在一个或多个窗口中查看，每个窗口由一个`NSWindowController`/`NSWindow`对控制。通常，一个文档只出现在单个窗口中，但可以覆盖此行为以允许用户打开同一数据的多个视图。


    非文档窗口不与文档对象关联，通常也没有窗口控制器。文档窗口和非文档窗口可以自由混合。


    ## 事件与响应者


    虽然`Objective-C`中的视图和绘制与`Java`类似，但事件处理完全不同。基本上，您需要忘记关于`Java`事件和监听器的一切知识。


    用户事件——鼠标事件、键盘事件、滚轮事件、绘图板事件和触控板事件——驱动用户界面。事件的处理方式以及应用程序对它们的响应大致分为两个阶段：事件阶段和响应阶段。每个阶段都使用一个对象链，该链由应用程序界面的当前状态动态定义。


    一个事件从操作系统的硬件驱动程序开始，通过主运行循环进入应用程序，并在此传递给应用程序对象。从那里，它沿着一条路径向下进入文档、窗口、视图和子视图对象的层次结构，直到找到一个可以解释它的对象。这个对象序列称为**事件链**。


    一旦某个对象解释了事件，它就变成了一个动作。动作沿着子视图、视图、窗口、文档和应用程序对象的层次结构向上搜索，寻找一个能响应该动作的对象。这个对象序列称为**响应者链**。


    本节描述应用程序中对象的组织方式以及它如何与事件和动作处理交互。它描述了事件是如何分发的，以及您的视图对象如何接收基本事件，但这可能是多余的；大多数应用程序不直接处理事件。


    核心`Cocoa`视图类已经解释了事件，并将它们转化为与响应者链交互的动作。因此，享受事件部分的阅读，但请特别注意接下来的响应者链部分。这是理解`Cocoa`应用程序工作方式的关键。


    ## 动态应用程序


    `Cocoa`应用程序中的一个重要概念是，事件或动作的处理方式是由用户界面当前状态所隐含的对象链决定的。要理解这一点，您需要学习一些`Cocoa`术语。从图20-14所示的用户界面开始。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-401_1.jpg)


    **图20-14.** 主窗口、关键窗口和第一响应者


    `Cocoa`应用程序形成一个对象层次结构，顶部是单个`NSApplication`（非文档应用程序）或`NSWindowController`（基于文档的应用程序）对象。


    在应用程序对象之下可能有`NSDocument`对象。在其之下是`NSWindow`对象，这些对象包含一个嵌套的`NSView`对象树。图20-14显示了该层次结构的可见部分。


    事件和动作处理由活动的窗口和视图指导。`Cocoa`使用特定术语来指代它们，如表20-5所列。


    **表20-5.** 活动窗口和视图术语


    | 术语 | 描述 |

    | --- | --- |

    | 活动应用程序 | 当前活动的、最前端的应用程序。 |

    | 主窗口 | 单个的、前端的活动应用程序窗口。大多数菜单命令应用于主窗口。主窗口具有视觉上不同的标题和边框，以区别于其后面的非活动窗口。 |

    | 关键窗口 | 包含第一响应者的窗口。 |

    | 第一响应者 | 活动或具有当前“焦点”的视图对象。这通常是响应击键的对象。窗口对象也可以是第一响应者。 |

    | 初始第一响应者 | 非关键窗口中的视图，当该窗口成为关键窗口时，（默认情况下）它将变为第一响应者。初始第一响应者在不是关键窗口的主窗口中是有意义的。 |


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    图20-14中的情况并不常见，但它有助于区分主窗口和关键窗口。用户在主窗口中打开了一个电子表格文档，然后打开了一个浮动面板并选择了一个文本字段。在这种情况下，面板中的文本字段成为第一响应者，这使得面板窗口成为关键窗口。但面板窗口不会使文档窗口变为非活动状态，因此它仍然是主窗口。


    更典型的情况发生在用户编辑电子表格中某个单元格的内容时（在图20-14中标识为初始第一响应者）。电子表格单元格成为第一响应者。这使得文档窗口既是主窗口又是关键窗口。


    当用户切换窗口和视图时，从第一响应者到顶层应用程序对象的对象链或“路径”会发生变化。这隐式地改变了应用程序处理事件和动作的方式。对象不会主动参与这些变化——也就是说，它们不会收到“您现在处于响应者链中”的事件。一个对象要么在响应者链中，要么不在。


    ## 事件


    事件由操作系统作为对鼠标移动、鼠标点击、键盘活动、滚轮移动等的响应传递给应用程序。事件所走的路径根据事件类型而有所不同——例如，键盘事件遵循的路径与鼠标事件不同。您可能对创建接收和响应事件的对象感兴趣，但您不太可能参与事件的实际分发。如果您有本节未描述的事件处理或过滤需求，请参考`Cocoa`事件处理指南。¹


    ### 事件对象


    事件通过附加到主运行循环的事件端口之一进入应用程序。主运行循环对事件做的第一件事是将其封装在一个`NSEvent`对象中。一个`NSEvent`对象具有表20-6中列出的属性。


    **表20-6.** `NSEvent`属性


    | 属性 | 描述 |

    | --- | --- |

    | `type` | 事件的类型。典型的事件有`NSLeftMouseDown`、`NSLeftMouseDragged`、`NSLeftMouseUp`、`NSKeyDown`、`NSKeyUp`和`NSScrollWheel`。
    |

    | `timestamp` | 事件发生的时间。 |

    | `window` | 与事件关联的`NSWindow`。 |

    | `locationInWindow` | 事件发生时鼠标在窗口坐标中的位置。 |

    | `clickCount` | 快速连续发生的鼠标点击次数。用于区分单击、双击和三击。 |

    | `modifierFlags` | 事件发生时按下的键盘修饰符（Shift、Option、Command、Control、Caps Lock）。 |

    | `characters` | 与按键事件关联的字符串。 |

    | `charactersIgnoringModifiers` | 与按键事件关联的字符串，去除了任何按键修饰符（Control、Option等）。 |

    | `isARepeat` | 如果按键事件是由按住一个键直到其自动重复引起的，则为`YES`。 |

    | `keyCode` | 按键的虚拟键盘码。 |


    并非所有属性都适用于所有事件，还有许多其他不常见的属性（如压力）仅适用于绘图板或力反馈输入设备。您几乎永远不需要自己创建`NSEvent`对象，但每个事件处理方法都会将事件作为`NSEvent`对象接收。


    ### 按键事件


    ¹ Apple Inc., *Cocoa Event-Handling Guide*, http://developer.apple.com/documentation/Cocoa/Conceptual/EventOverview/,
    2009.'
  raw: 'Each document object can be viewed in one or more windows, each of which is
    controlled by an NSWindowController/NSWindow pair. Normally, a document only appears
    in a single window, but that can be overridden to allow the user to open multiple
    views to the same data.


    Non-document windows are not associated with a document object, and often don’t
    have a window controller, either. Document and non-document windows can be freely
    mixed.


    Events and Responders


    While views and drawing in Objective-C are similar to what’s in Java, event handling
    is completely different. Basically, you need to forget everything you know about
    Java events and listeners.


    User events—mouse events, keyboard events, scroll-wheel events, tablet events,
    and track pad events—drive the user interface. How events are processed, and how
    the applications responds to them, is roughly divided into two phases: The event
    phase and the response phase. Each phase employs a chain of objects, defined dynamically
    by the current state of the application interface.


    An event begins in the hardware drivers of the operating system and enters the
    application via the main run loop, where it is passed to the application object.
    From there, it follows a path down into the hierarchy of document, window, view,
    and subview objects until it finds one to interpret it. This sequence of objects
    is called the event chain.


    Once an object interprets the event, it becomes an action. Actions travel up the
    hierarchy of subview, view, window, document, and application objects searching
    for one that will respond to that action. This sequence of objects is called the
    responder chain.


    This section describes the organization of objects in an application and how that
    interacts with event and action handling. It describes how events are distributed
    and how your view objects can receive basic events, but that’s probably superfluous;
    most applications don’t work with events directly.


    The core Cocoa view classes already interpret events and turn them into actions
    that interact with the responder chain. So enjoy the events section, but pay particular
    attention to the responder chain section that follows. That’s the key to understanding
    how Cocoa applications work.


    The Dynamic Application


    One of the important concepts in a Cocoa application is the idea that how an event
    or action is handled is determined by the chain of objects implied by the current
    state of the user interface. To understand this, you need to learn some Cocoa
    terminology. Start with the user interface depicted in Figure 20-14.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-401_1.jpg)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    ***Figure 20-14.** Main and key windows, first responder* Cocoa applications form
    a hierarchy of objects that begin with a single NSApplication (non-document applications)
    or NSWindowController (document-based applications) object at the top.


    Underneath the application object may be NSDocument objects. Below those are the
    NSWindow objects, which contain a nested tree of NSView objects. Figure 20-14
    shows the visible portion of that hierarchy.


    Event and action processing is directed by the windows and views that are active.
    Cocoa refers to these using specific terms, listed in Table 20-5.


    ***Table 20-5.** Active Window and View Terminology* Ter m


    Des cr ipti on


    Active Application


    The currently active, frontmost application.


    Main Window


    The single, frontmost, active application window. Most menu commands apply to
    the main window. The main window has a visually distinct title and border, which
    differentiates it from the inactive windows behind it.


    Key Window


    The window containing the first responder.


    First Responder


    The view object that is active or has the current “focus.” This is typically the
    object that responds to keystrokes. A window object can also be the first responder.


    Initial First


    The view in a non-key window that will become the first responder (by default)
    Responder


    when the window becomes the key window. The initial first responder is meaningful
    in a main window that is not the key window.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    The situation in Figure 20-14 is not that common, but it is useful in making the
    distinction between the main window and the key window. The user has an open spreadsheet
    document in the main window, then opened a floating palette and selected a text
    field. In this situation, the text field in the palette becomes the first responder,
    which makes the palette window the key window. But the palette window doesn’t
    cause the document window to become inactive, so it’s still the main window.


    A more typical arrangement occurs while the user is editing the content of a cell
    in the spreadsheet (identified as the initial first responder in Figure 20-14).
    The spreadsheet cell becomes the first responder. That makes the document window
    both the main window and the key window.


    As the user switches windows and views, the chain, or “path,” of objects from
    the first responder to the top-level application object changes. This implicitly
    alters how both events and actions are processed by the application. Objects don’t
    actively participate in these changes—that is, they don’t receive “you are now
    in the responder chain” events. An object simply is, or is not, in the responder
    chain.


    Events


    Events are delivered to the application by the operating system in response to
    mouse movement, mouse clicks, keyboard activity, scroll-wheel movement, and so
    on. The path that an event takes varies depending on the event type—keyboard events
    do not follow the same path as mouse events, for example. You may be interested
    in creating objects that receive and respond to events, but you’re unlikely to
    get involved in the actual dissemination of events. If you have event processing
    or filtering needs that aren’t described in this section, refer to the Cocoa Event-Handling
    Guide.9


    Event Objects


    Events enter an application via one of the event ports attached to the main run
    loop. The first thing the main run loop does with an event is to encapsulate it
    in an NSEvent object. An NSEvent object has the properties listed in Table 20-6.


    ***Table 20-6.** NSEvent Properties*


    Pr op er ty


    Des cr ipti on


    type


    The type of events. Typical events are NSLeftMouseDown,


    NSLeftMouseDragged, NSLeftMouseUp, NSKeyDown, NSKeyUp, and NSScrollWheel


    timestamp


    The time the event occurred.


    window


    The NSWindow associated with the event.


    locationInWindow


    The mouse position, in window coordinates, when the event occurred.


    clickCount


    The number of mouse clicks that have occurred in rapid succession.


    Used to distinguish single clicks from double and triple clicks.


    9 Apple Inc., Cocoa Event-Handling Guide, http://developer.apple.com/documentation/Cocoa/


    Conceptual/EventOverview/, 2009.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    modifierFlags


    Keyboard modifiers (Shift, Option, Command, Control, Caps Lock) that were being
    held down when the event occurred.


    characters


    The string of characters associated with the key event.


    charactersIgnoringModifiers


    The string associated with the key event, devoid of any key modifiers (Control,
    Option, …).


    isARepeat


    YES if the key event was caused by holding down a key until it auto-repeats.


    keyCode


    The virtual keyboard code of the key.


    Not all properties are applicable to all events, and there are many other obscure
    properties (like pressure) that apply only to drawing tablet or force-feedback
    input devices. You will almost never need to create NSEvent objects yourself,
    but every event handling method will receive the event as an NSEvent object.


