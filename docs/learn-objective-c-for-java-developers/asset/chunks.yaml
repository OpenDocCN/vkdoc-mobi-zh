    A document-based application has a single NSDocumentController object. This is
    the object responsible for creating new document objects (when you choose New
    or Open from the menu), associating document types with the document classes that
    implement them, and keeping track of the documents that are currently open. An
    application normally only defines a single document type, but NSDocumentController
    can arbitrarily map multiple file types to multiple document classes. When you
    choose to open an existing document, the NSDocumentController uses the file’s
    type to determine what subclass of NSDocument to instantiate.


    ■Tip When creating a document-based application project in Xcode, start with the
    Cocoa Document-based Application template. It will save you a lot of work later.


