    The illustration shows that the Cocoa pen has drawn an anti-aliased line that
    straddles four pixel columns. That’s because the 3.0-pixel-wide pen is centered
    over the Y-axis, so the left edge of the pen’s “brush” is at X coordinate -1.5
    and the right edge is at 1.5\. To draw a 3-pixel-wide line that emulates the one
    drawn in Java, the Cocoa line would need to be drawn from coordinate (1.5,0.0)
    to (1.5,8.0).


    3 Apple Inc., Resolution Independence Guidelines, http://developer.apple.com/documentation/


    UserExperience/Conceptual/HiDPIOverview/, 2007.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-391_1.png)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    Drawing Bounds


    Cocoa rectangles, and any drawing method that draws inside a given bounds, always
    draws inside the coordinate bounds of the rectangle. Figure 20-12 shows filling
    a 35 rectangle.


    ***Figure 20-12.** Filling rectangles in Swing and Cocoa* In Java, the rectangle
    drawn by Graphics2D.fillRect(Shape) with a 11-pixel pen extends 1 pixel beyond
    the rectangle. In Cocoa, only pixels in the interior of the rectangle are filled.
    The code to fill the rectangle was NSRectFill(NSMakeRect(0.0,0.0,3.0,5.0)).


    Drawing Lines and Shapes


    Java provides a number of primitives for immediately drawing lines, rectangles,
    ovals, and other shapes.


    Cocoa provides only a collection of C functions that mostly fill rectangles and
    the versatile NSBezierPath class. NSBezierPath is the catch-all object for drawing
    any kind of line, geometric shape, or both.


    An NSBezierPath can consist of one or more line segments. Line segments can be
    straight or curved, solid or dashed. Line segments can be connected or unconnected.
    They can form closed shapes, like a star or an oval, or open shapes, like an arc.
    Once defined, the Bezier path object can be filled (draw the interior of the shape)
    or stroked (draw the lines that define the shape). The path has a number of properties
    that control how the joints and ends of lines are drawn. It also has a “winding
    rule” that determines what constitutes the interior of a shape when the line segments
    intersect each other. The line in Figure 20-11 was drawn with the code in Listing
    20-2.


    Listin g 20-2\. Drawing a 5.0-Pixel Line


    NSBezierPath *path = [NSBezierPath new];


    [path moveToPoint:NSMakePoint(0.0,0.0)];


    [path lineToPoint:NSMakePoint(0.0,5.0)];


    [path setLineWidth:3.0];


    [path stroke];


    There are convenience constructors that create a Bezier path that form an oval
    or rounded rectangle.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    Custom Views


    Custom view objects are created by subclassing NSView, in almost exactly the way
    you would subclass JComponent in Swing. Your NSView class must provide, at a minimum,
    the following:


    • An -(id)initWithFrame:(NSRect)frame initialization method. This is the designated
    initialization method for all NSView subclasses.


    • Optionally override -(void)drawRect:(NSRect)rect to provide custom drawing of
    your view’s interior. This method is equivalent to javax.swing.JComponent.paint(Graphics).


    The code in Listing 20-3 demonstrates a custom NSView subclass that draws the
    image stored in the file Chalkboard.png. (This was the original version of the
    ChalkboardView class in the TicTacToe project, before it was reworked to add animation.)


    Listin g 20-3\. Custom NSView Drawing Method


    - (void)drawRect:(NSRect)rect


    {


    NSImage *chalkboardImage = [NSImage imageNamed:@"Chalkboard"]; NSRect imageRect;


    imageRect.origin = NSMakePoint(0.0,0.0);


    imageRect.size = [chalkboardImage size];


    [chalkboardImage drawInRect:[self bounds]


    fromRect:imageRect


    operation:NSCompositeSourceOver


    fraction:1.0];


    }


    Invalidating and Drawing Views


    Drawing in Cocoa is almost identical to that in Swing and similar GUI frameworks.
    When the contents of a view need to be redrawn, the region it occupies is invalidated.
    To invalidate an NSView, set needsDisplay to YES or send a -setNeedsDisplayInRect:
    message. The AppKit framework adds the region, or subregion, of the view to the
    conglomerate area of the user interface that needs to be redrawn.


    Eventually, the application framework sends each invalid view object a -drawRect:
    message. The message includes the specific subregion of the view that requires
    drawing. Unless your view is very complex, this can be ignored; all drawing is
    automatically clipped to the invalid region.


    ■Note The -drawRect: method is only responsible for drawing its content. A view
    is actually drawn when it receives a -display message. This is the high-level
    message that recursively sends -drawRect: messages to itself and all of its subviews.
    You typically don’t override -display, and you’d normally never send -display
    to a view object. To redraw a view, set its needsDisplay property and let the
    framework add it to the queue of view objects that need to be updated, and then
    wait to receive a -drawRect: message.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    Graphics Context


    In Java, the graphics object used by the component to draw itself is passed to
    the JComponent.paint(Graphics) method as a parameter. In Cocoa, all drawing occurs
    in the implied context of the global NSGraphicsContext object. The framework will
    prepare the context for your view before the -drawRect: method is sent. Your view
    draws in the local coordinate system defined by its bounds property. You should
    not make any assumptions about the drawing context after your -drawRect: method
    has returned.


    The NSGraphics Context defines a number of properties that apply to all drawing
    commands:


    • clipping region


    • drawing color


    • stroke (pen) color


    • fill color


    • font


    • shadow


    • affine transform


    Quite unlike the organization of java.awt.Graphics, the methods that set these
    properties are scattered among the classes that define them. Table 20-2 lists
    where to find the approximate equivalents of java.awt.Graphics2D properties in
    the Cocoa framework.


    ***Table 20-2.** Graphics Context Property Settings*


    jav a.awt.G r aph ic s2D


    Coc oa F un cti on or M eth od


    setClip(int,int,int,int)


    NSRectClip(…), NSRectClipList(…)


    clipRect(int,int,int,int)


    -[NSBezierPath addClip]


    setColor(Color)


    -[NSColor set], -[NSColor setStroke], -[NSColor setFill]


    setBackground(Color) None:


    NSEraseRect(…) always paints with white. Fill a rectangle with NSRectFill(…).


    setFont(Font)


    -[NSFont set]


    -[NSShadow set]


    setTransform(AffineTransform)


    -[NSAffineTransform set]


    setComposite(Composite)


    -[NSGraphicsContext setCompositingOperation:]


    Setting these properties and using them is identical to Java: set the desired
    properties, and then invoke a drawing command. The drawing command will use the
    applicable properties of the current graphics context, as demonstrated in Listing
    20-4.


