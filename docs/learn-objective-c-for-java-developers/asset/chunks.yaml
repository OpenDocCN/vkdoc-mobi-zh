    \ retain 一次）。\n\n### 使用 Core Foundation 内存管理模式\n\n除非你需要保留或返回一个对 Core Foundation\
    \ 类型的引用，否则最简单的方法是遵循 Core Foundation 内存管理模式。Core Foundation 不使用自动释放池，因此所有返回的 refs\
    \ 要么是新的，要么是拥有的。要使用 Core Foundation 内存管理，你的代码应该执行以下操作：\n\n*   像在托管内存环境中对待一个新对象一样使用一个新\
