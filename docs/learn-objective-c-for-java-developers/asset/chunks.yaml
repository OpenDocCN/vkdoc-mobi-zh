    \ `@implementation` 指令中混合使用 C 函数和 Objective-C 方法，但有些程序员会将他们的 C 函数统一放置在 `@implementation`\
    \ 外部。这属于编码风格的问题。\n\n你的 Objective-C 应用程序可以调用操作系统提供的 C API，可以链接标准 C 库，也可以在项目中包含\
    \ C 源代码模块。这使得与广泛的 POSIX 函数、C 框架、共享库以及开源代码进行交互变得非常容易。\n\n### 在 C 中使用 Objective-C\
    \ 对象\n\nObjective-C 模块（`.m`）中的 C 函数会被编译为 Objective-C 代码，而不仅仅是 C 代码。列表 25-1 中的\
    \ C 函数向对象发送 Objective-C 消息，就像它是一个 Objective-C 方法一样。唯一的区别是它没有对象上下文（`self`）。就此而言，C\
    \ 函数相当于 Java 中的静态类方法。\n\n当你在 Xcode 项目中添加一个 C 源文件（`.c`）时，它会被编译为纯 C 代码。该源文件不能包含任何\
    \ Objective-C 语法。如果你需要在 C 模块中使用 Objective-C 对象，有两种选择：\n\n-   将那些需要使用 Objective-C\
    \ 对象的函数隔离出来，并将它们移动到一个 Objective-C（`.m`）源文件中。该文件可以完全由 C 函数组成，但它会被编译为 Objective-C\
    \ 代码，从而能够使用 Objective-C 语法来引用对象和发送消息。\n-   直接使用一个 Objective-C 运行时函数（例如 `objc_msgSend(id,\
    \ SEL, …)`）来发送 Objective-C 消息。\n\n后一种解决方案比较笨拙，但从技术上讲，你可以在 C 中完成任何在 Objective-C\
    \ 中能完成的事情。毕竟，整个 Objective-C 运行时都是用 C 编写的。具体细节请参阅 *Objective-C 2.0 运行时参考* ¹。\n\n\
    ### Core Foundation\n\nCore Foundation 是一个庞大的 C 函数库，它围绕“对象”这一概念进行设计，并将这些对象称为*不透明类型*或简称*类型*。这些不透明类型具有与\
    \ Objective-C 对象兼容的内部结构，并且相当多的 Core Foundation 类型可以与 Objective-C 类互换。这种互惠性被称为*免费桥接*。Core\
    \ Foundation 的目标是无缝地为 C 和 Objective-C 程序员提供大量操作系统和框架服务。C 程序员使用 `CFTypeRef` 值（指向不透明数据结构的指针）并将其传递给\
    \ Core Foundation 函数。Objective-C 程序员则存储对象指针并向其发送消息。在这两种情况下，执行的代码是相同的。\n\n大多数 Core\
    \ Foundation 类型没有与 Objective-C 的免费桥接。如果你需要它们的功能，则需要直接使用 Core Foundation 数据类型和函数。Core\
    \ Foundation 采用了许多与 Objective-C 相同的概念，只是用其自己的类型、函数和术语来实现它们。常见的 Core Foundation\
    \ 类型和函数及其 Objective-C 对应项的对比列于表 25-1 中。\n\n¹ Apple Inc., *Objective-C 2.0 运行时参考*,\
    \ [`developer.apple.com/documentation/Cocoa/Reference/ObjCRuntimeRef/`](http://developer.apple.com/documentation/Cocoa/Reference/ObjCRuntimeRef/),\
    \ 2008.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### **表 25-1.**\
    \ Core Foundation 术语\n\n| Objective-C | Core Foundation |\n|-------------|----------------|\n\
    | `Class` | `CFTypeID` |\n| `id` 或 `NSObject*` | `CFTypeRef` |\n| `NSString*`\
    \ | `CFStringRef` |\n| `[t class]` | `CFGetTypeID(t)` |\n| `[t isEqual:t2]` |\
    \ `CFEqual(t1,t2)` |\n| `[t description]` | `CFCopyDescription(t)` |\n| `[t retain]`\
    \ | `CFRetain(t)` |\n"
