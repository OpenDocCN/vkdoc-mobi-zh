- fmt: "First, add an instance of `NSArrayController` by dragging a new Array Controller\
    \ object from the Library into the NIB document. You’ll find Array Controller\
    \ in the Controllers group. Start by selecting the first, and only, Table Column\
    \ inside the Table View object. Bind its value to the Array Controller with a\
    \ controller key of `arrangedObjects` and a model key path of `self`. The `self`\
    \ key-value path causes the view object to display the value of each object in\
    \ the collection, rather than a property of each object.\n\nThis is appropriate\
    \ because the array contains simple string objects.\n\nNow the array controller\
    \ needs to be connected to its data model object. Select the newly created Array\
    \ Controller object in the `MainMenu` NIB document and set its Content Array binding\
    \ to `ScrapWordsController` with a model key path of `words`. The key-value path\
    \ `words` tells the controller that the `words` property of `ScrapWordsController`\
    \ is the data source for the array.\n\nFinally, the `ScrapWordsController` will\
    \ need to interact with the array controller object programmatically. To do that,\
    \ it will need an object pointer (reference) to the instance of the array controller\
    \ created by the NIB document. This is established using an outlet and a connection.\
    \ An outlet is just an instance variable that points to another object. The `IBOutlet`\
    \ type modifier, as shown in Listing 4-1, turns the object pointer property into\
    \ a public outlet in Interface Builder. A connection creates a relationship in\
    \ the NIB so that the instance variable will point to its connected object when\
    \ the NIB document is loaded.\n\nObject pointers decorated with the `IBOutlet`\
    \ keyword automatically appear as outlets in Interface Builder. The `IBOutlet`\
    \ keyword can be placed before an instance variable or in a `@property` directive.\
    \ Select the `ScrapWordsController` in the `MainMenu` NIB document and switch\
    \ to the Connections Inspector. Interface Builder lists `wordsController` as an\
    \ outlet of the object. To connect the outlet to the array controller object –\
    \ i.e., to set the instance variable to point to the address of the array controller\
    \ object at runtime – drag the outlet’s connector to the Array Controller object\
    \ and release the mouse button, as shown in Figure 4-11.\n\n***Figure 4-11.**\
    \ Connecting arrayController Outlet to the Array Controller Object*\n\nThe application\
    \ now has an interface and runs, but it does nothing useful. All of the views\
    \ and data model object work together, but since nothing happens when you type\
    \ in the input field, the experience is underwhelming. The application needs business\
    \ logic.\n\n## Getting Down to Business\n\nThe application will read in and construct\
    \ a dictionary of about 200,000 common words. Whenever letters are typed in, it\
    \ will search for the words that can be spelled using those letters. There are\
    \ numerous ways of solving this kind of problem, but this application opts for\
    \ the simple approach: a brute force search of all 200,000 words. This could be\
    \ time consuming, so the search shouldn’t occur on the main UI thread of the application.\
    \ Otherwise, the application will appear to freeze whenever a new letter is typed.\n\
    \nThe solution is to perform the search on a background thread. The search thread\
    \ will send messages to the main thread whenever it finds a word. This could be\
    \ accomplished with threads and semaphores, but it’s easier to let `NSOperationQueue`\
    \ do the heavy lifting for us.\n\nBack in the Xcode project, select the Classes\
    \ group and add a new Objective-C class file named `WordFinder.m`, along with\
    \ its companion `WordFinder.h` header file. Make the `WordFinder` a subclass of\
    \ `NSOperation`, as shown in Listing 4-2.\n\n***Listing 4-2.** WordFinder Interface*\n\
    \n```\n@class ScrapWordsController;\n\n@interface WordFinder : NSOperation {\n\
    \n  ScrapWordsController *controller; // reference to controller\n  NSArray *letterSet;\
    \ // set of letters to search\n\n}\n\n+ (NSArray*)words;\n- (id)initWithLetters:(NSString*)letters\n\
    \  controller:(ScrapWordsController*)windowController;\n- (void)main;\n\n@end\n\
    ```\n\nWhen the user types in some letters, the view object will update the data\
    \ model by sending a `setLetters:` message to the controller. The implementation\
    \ of `setLetters:`, shown in Listing 4-3, creates a new `WordFinder` operation\
    \ and queues it up to execute. When the `WordFinder` thread runs, it sends `removeWords`\
    \ and `foundWord:` messages back to the `ScrapWordsController` on the main thread.\n\
    \nAll the main application thread has to do is start the operation, then sit idly\
    \ and wait for the results to come pouring in. The application’s interface never\
    \ blocks and is never unresponsive. The `removeWords` and `foundWords:` methods\
    \ must modify the data model through the array controller object. The array controller\
    \ is responsible for keeping the data model, the view, and itself in synchronization.\n\
    \n***Listing 4-3.** ScrapWordsController Implementation*\n\n```\n@implementation\
    \ ScrapWordsController\n@synthesize wordsController;\n\n- (id) init\n{\n  self\
    \ = [super init];\n  if (self != nil) {\n    words = [NSMutableArray new];\n \
    \   finderQueue = [NSOperationQueue new];\n  }\n  return self;\n}\n\n- (NSString*)letters\n\
    {\n  return (letters);\n}\n\n- (void)setLetters:(NSString*)newLetters\n{\n  if\
    \ (newLetters==nil)\n    newLetters = @\"\";\n  if (![letters isEqualToString:newLetters])\n\
    \  {\n    letters = newLetters;\n    [finderQueue cancelAllOperations];\n    WordFinder\
    \ *finder = [[WordFinder alloc] initWithLetters:newLetters\n                 \
