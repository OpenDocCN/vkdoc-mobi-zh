    **提前释放的对象**


    与过度释放对象密切相关的一个问题是对象被简单地提前释放——当仍有活跃的引用指向它时。最常见的原因是在设置属性或从集合中移除对象时，作为副作用释放了对象。清单24-15和24-17展示了两种非常常见的对象被提前销毁的场景。


    **清单 24-15.** 对象被集合销毁


    ```objectivec

    @implementation FIFO


    …


    - (id)pop


    {


    id object = [stack objectAtIndex:0];


    [stack removeObjectAtIndex:0];


    return object; // |object| 不存在！


    }


    @end

    ```


    在清单24-15中，`FIFO`中的对象被集合隐式保留。要从栈中取出一个对象，需将其从集合中移除并返回给调用者。问题在于，集合可能是该对象的唯一所有者。移除它会释放该对象，从而销毁它。`-pop`方法随后返回一个指向已销毁对象的指针。解决方案是重新自动释放该对象，如清单24-16所示。


    **清单 24-16.** 重新自动释放对象


    ```objectivec

    - (id)pop


    {


    id object = [[[stack objectAtIndex:0] retain] autorelease];


    [stack removeObjectAtIndex:0];


    return object;


    }

    ```


    解决方案是在从集合中移除对象之前，向其发送`-retain`和`-autorelease`消息。额外的`-retain`防止对象被立即销毁，而`-autorelease`则创建一个适合返回给调用者的自动释放对象。


    ¹ Apple Inc., “Technical Note TN2124: Mac OS X Debugging Magic,” http://developer.apple.com/technotes/

    tn2004/tn2124.html, 2006.


