  trans: '

    通常，类的设计会使委托成为可选项。如果没有委托对象，或者委托未实现可选的委托方法，对象将采用一些默认行为。在少数情况下，委托对对象的运行至关重要。例如，`NSURLConnection`
    对象会将所有连接事件发送给其委托。如果没有委托对象来接收这些消息，该对象将无法完成太多工作。


    ## 委托方法


    一些委托方法是必须实现的，而另一些则是可选的。委托必须实现任何必须实现的委托方法。使用委托的对象会无条件地向委托对象发送必须实现的委托消息。如果委托未能实现这些方法，运行时将抛出无法识别的选择子异常。


    可选的委托方法更为常见，并使得委托模式异常灵活。发送委托消息的对象会首先测试委托对象是否响应该消息。如果响应该消息，则向委托发送该消息。如果不响应，对象将回退到其基准行为。委托对象可以自由地仅实现其所需的那些可选委托方法。


    可选委托方法特别灵活，因为委托对象只需实现它想要或需要影响的方法。如果一个类定义了 4 个委托方法，委托对象就有 15 种不同的自定义组合可供选择。可选委托方法还避免了常见的
    Java 实践，即创建所谓的“简单”类，这些类为一组接口方法实现默认行为，期望你继承该“简单”类并仅覆盖你想要修改的方法。这既简化了类层次结构，又将默认委托行为定位在对象的类中，而非“简单”类中。


    委托对象通常是“真实”的对象，而不是专门设计为委托的类。例如，一个文档对象也可能实现 `NSToolbar` 的委托方法。工具栏委托定义了哪些工具栏控件显示合适，这些信息源自文档对象的特定信息。文档对象无需复杂的对象间依赖，就能透明地影响工具栏用户界面。


    一个委托对象也可以实现多组委托方法，并将其自身设置为各种对象的委托。这在应用程序委托对象的情况下很常见。一个应用程序委托会将自己设置为单个 `NSApplication`
    对象的委托对象，但也可能将自己设置为其他对象（如窗口、文件管理器等）的委托。然后，这个单一的应用程序委托对象就可以利用集中在一个对象中的信息来影响广泛的行为。如果应用程序委托类变得难以管理，可以将其各个角色细分为类别以提高模块化程度。有关类别的更多信息，请参见第
    5 章。


    ## 委托协议


    委托实现的方法在 Cocoa 框架中通常被定义为非正式协议。（如果您需要复习非正式协议和正式协议，请参见第 5 章。）委托对象属性的类型是`id`，允许将其设置为任何对象。委托对象预期实现的方法在文档中有定义。


    您可以在设计中自由地采用相同方式，或者采取更正式的方法，如代码清单 17-2 所示。在 Java 中无法做到这一点，因为 Java 没有可选接口方法的概念。如果您好奇，第
    10 章演示了在 Java 中通过测试方法是否存在来实现非正式协议的代码。


