  trans: "\n-[`NSMutableArray sortUsingDescriptors:`]\n\n使用排序描述符对数组进行原地排序。\n\n-[`NSMutableArray\
    \ sortUsingFunction:context:`]\n\n使用 C 函数比较对象，对数组进行原地排序。\n\n-[`NSMutableArray\
    \ sortUsingSelector:`]\n\n使用 Objective-C 消息对数组进行原地排序。\n\n-[`NSDictionary keysSortedByValueUsingSelector:`]\n\
    \n以数组形式返回字典中所有键的副本，并使用 Objective-C 消息进行排序。\n\n## Objective-C 消息排序\n\n方法 `-sortedArrrayUsingSelector:`、`-sortUsingSelector:`\
    \ 和 `-keysSortedByValueUsingSelector:` 使用 Objective-C 消息比较对象，从而对对象数组进行排序。你可以使用任何消息，只要它兼容以下原型，并且集合中的所有对象都能响应它：\n\
    \n```\n-(NSComparisionResult)comparisonMethod:(id)object\n```\n\n左侧对象会收到消息以及指向右侧对象的指针。它将自身与另一对象进行比较，并返回一个\
    \ `NSComparisionResult` 值。返回值必须是 `NSOrderedAscending`、`NSOrderedSame` 或 `NSOrderedDescending`\
    \ 之一。如果接收者认为自身应排在另一对象之前，则返回 `NSOrderedAscending`；如果相等则返回 `NSOrderedSame`；否则返回\
    \ `NSOrderedDescending`。一个合适的排序消息的典型示例是 `NSString`、`NSNumber` 和 `NSDate` 实现的 `-compare:`\
    \ 方法。包含 `NSString` 对象的可变数组可以使用 `[array sortArrayUsingSelector:@selector(compare:)]`、`[array\
    \ sortArrayUsingSelector:@selector(caseInsensitiveCompare:)]`、`[array sortArrayUsingSelector:@selector(localizedCompare:)]`\
    \ 等方法进行排序。\n\n## C 函数排序\n\n一种无需对象实现自身比较方法的排序技术，是提供一个接受两个 Objective-C 对象指针、比较它们并返回结果的\
    \ C 函数。该函数必须具有与 `NSInteger comparisonFunction( id leftObject, id rightObject,\
    \ void *context )` 兼容的原型。该函数执行与比较消息相同的操作：它将左侧对象与右侧对象进行比较，并返回 `NSOrderedAscending`、`NSOrderedSame`\
    \ 或 `NSOrderedDescending`。传递给排序方法的可选 `context` 指针会一并传递给比较函数，从而允许你的函数调整其行为，或使用单个函数实现不同的排序方案。清单\
    \ 16-12 按字符串长度对字符串数组进行排序。\n\n**清单 16-12.** 字符串排序函数\n\n```\nstatic NSInteger sortStringsByLength(\
    \ id left, id right, void *ignored )\n{\n    // 首先按长度排序对象，然后按内容排序\n    NSUInteger\
    \ lLength = [left length];\n    NSUInteger rLength = [right length];\n    if (lLength<rLength)\n\
    \        return NSOrderedAscending;\n    else if (lLength>rLength)\n        return\
    \ NSOrderedDescending;\n    return [left compare:right];\n}\n…\nNSMutableArray\
    \ *array = …\n[array sortUsingFunction:sortStringsByLength context:NULL];\n```\n\
    \n## 排序描述符\n\n最后，集合类提供了一种比 C 函数方法更面向对象的排序替代方案，即使用排序描述符。排序描述符是 `NSSortDescriptor`\
    \ 的实例，本质上是对封装在对象中的属性进行比较。一个 `NSSortDescriptor` 标识对象的某个属性、排序方向（升序或降序），以及用于比较这两个属性的可选\
    \ Objective-C 消息。如果未指定比较方法，排序描述符将使用 `-compare:` 来比较对象。与之前讨论的 `-sortUsingSelector:`\
    \ 消息不同，排序描述符比较的是通过键值编码获取的两个对象的公共属性，而非对象本身（除非属性是 `@\"self\"`）。清单 16-13 中的代码与清单\
