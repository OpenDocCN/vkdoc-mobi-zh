  raw: 'First, NSMapTable only accepts a narrow subset of the function pointer options
    supported by NSPointerArray. The options in Table 16-8 are the only ones supported
    by NSMapTable, along with a synonymous symbol for use with NSMapTable constructors.
    Basically, map tables only support object values, with either strong or weak references,
    and you have the option of storing a reference or copy of the object. If you restrict
    yourself to using the NSMapTable option synonyms, you won’t accidentally choose
    an NSPointerFunctions option that isn’t supported.


    ***Table 16-8.** NSMapTable Options*


    NSM ap Ta ble S yn on y m


    NSPoi nter Ar r a y


    NSMapTableStrongMemory NSPointerFunctionsStrongMemory


    NSMapTableZeroingWeakMemory NSPointerFunctionsZeroingWeakMemory NSMapTableCopyIn
    NSPointerFunctionsCopyIn


    NSMapTableObjectPointerPersonality NSPointerFunctionsObjectPointerPersonality
    The second difference is that NSMapTable objects are initialized with two sets
    of function pointers: one set for the keys and one set for the values. This allows
    you to define a map that stores copies of keys using strong references and weak
    references to values, references to key and copies of values, weak keys and weak
    values, or any other combination that makes sense to your application.


    There are four convenience constructors for the most common configurations:


    +mapTableWithStrongToStrongObjects, +mapTableWithWeakToStrongObjects,


    +mapTableWithStrongToWeakObjects, and +mapTableWithWeakToWeakObjects.


    Set Collections


    NSSet, NSMutableSet, NSCountedSet, NSIndexSet, and NSHashTable organize sets of
    unordered objects, broadly equivalent to java.util.HashSet and java.util.BitSet.
    The set collections adhere to the mathematical concept of a set: an object is
    a member of a set or it’s not. The objects aren’t organized in any particular
    order, nor are they addressable. You can add an object to the set, test for its
    presence, and remove it. NSIndexSet applies the same concepts to integer values,
    and NSCountedSet is a special set that allows an object to occur more than once
    in a collection. Specifically, Objective-C and Java set classes have these common
    features:


    • Values in the collection are object references or integers.


    • A value can be stored in a set only once. Adding a duplicate value does nothing.
    (NSCountedSet is an exception to this rule.)


    Common Methods


    Tables 16-9 and 16-10 list the common set methods in Java and Objective-C that
    apply to collections of objects. The messages in Table 16-9 do not alter the collection
    and are implemented for both mutable and immutable collections. The messages in
    Table 16-10 can only be sent to mutable sets.


