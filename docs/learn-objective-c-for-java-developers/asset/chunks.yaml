    \ 与 `CFRunLoopRef` *不* 可互换。要在 `NSRunLoop` 上使用 Core Foundation 函数，请向该对象发送 `-getCFRunLoop`\
    \ 消息，它将返回其底层的 `CFRunLoopRef`。\n\n## C 内存管理\n\n第 24 章描述了 C 内存管理，或者说是其缺乏。Core Foundation\
