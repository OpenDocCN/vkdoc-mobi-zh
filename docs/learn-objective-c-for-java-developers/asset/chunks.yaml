    ■ CONTENTS


    **About the Technical Reviewer**


    **Evan DiBiase** lives in Pittsburgh, Pennsylvania with his fiancée, Ellen, and
    their cat, Millie. After graduating from high school, he spent several years working
    at a software startup developing machine learning applications in Java before
    enrolling in the School of Computer Science at Carnegie Mellon University, where
    he will graduate in May 2010\. Evan also hosted the Pittsburgh chapter of Cocoaheads
    from 2007 to 2009, has interned at Apple in the Objective-C group, and enjoys
    programming in Cocoa for Mac OS X and iPhone in his spare time.


    xxii


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ■ CONTENTS


    **Acknowledgments**


    This book would not have been possible without the tireless efforts of the Apress
    editors. I am eternally indebted to my technical editor, Evan DiBiase, who painstakingly
    checked every symbol, method, and line of code for accuracy. I thank Douglas Pundick
    for his astute structural changes, and I would have been completely lost without
    the talented red pen of my copy editor, Elizabeth Berry. The unflagging Kylie
    Johnson held the entire project on course and, amazingly, on schedule.


    Finally, I’d like to chastise Clay Andres who once plucked me out of a WWDC conference
    and told me I could write books.


    xxiii


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ■ CONTENTS


    ## Introduction


    Objective-C is a wonderful language that has received far less attention than
    it deserves. It has suddenly become (more) popular with the success of Apple’s
    Mac OS X and iPhone, where it is the supreme development language. If you’re going
    to learn a language to write applications for Mac OS X or the iPhone, Objective-C
    is *the* language to learn.


    The Objective-C language does not feel like it was developed by a committee or
    a computer science major. It’s a language for minimalists and anarchists. Yet
    it retains many of the features that make Java one of the great programming languages
    of our time. Objective-C lets you write applications that are every bit as structured
    and formal as anything you can write in Java. But at the same time, if you want
    to bore a hole through the language and head off in a direction where no one has
    gone before, it won’t stand in your way.


    After programming in Objective-C for a few years, I was struck at how “Java-like”
    my programs were. If I’d known then just how many of my Java techniques and concepts
    were directly transferable to Objective-C, it would have saved me months of study
    and experimentation. I wrote this book so that you can avoid the same fate.


    Who This Book Is For


    This book is for any Java developer interested in learning and exploring Objective-C
    as quickly as possible.


    How This Book Is Structured


    This book is organized into four parts: the Objective-C language, translating
    technologies, design patterns, and advanced Objective-C.


    The first part describes the basics of the Objective-C language itself. It explains
    how Objective-C


    is like, and unlike, Java. It details the language syntax, class declarations,
    inheritance, and so on.


    The second part examines specific technologies, like garbage collection, the file
    system, and introspection. Each chapter presents side-by-side examples of Java
    code and the equivalent code in Objective-C. Tables list the Java classes that
    you’re familiar with along with the Cocoa classes that perform the same role.
    Each chapter then goes on to advanced topics, often exploring techniques unique
    to Objective-C.


    The third part is organized by design pattern. Java developers use many important
    design patterns, such as the factory and Model-View-Controller patterns. These
    chapters show how each pattern is implemented in Objective-C—often in ways that
    may surprise you.


    The final section of the book explores advanced Objective-C topics: memory management,
    integrating Objective-C with C, and the Objective-C runtime environment.


    xxiv


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ■ INTRODUCTION'
