- fmt: "# Caution\n\nThe size of integers has changed again for 64-bit architectures.\
    \ If you compile your code for a 64-bit CPU, `long int` becomes a 64-bit integer—`short\
    \ int`, `int`, and `long long int` remain the same size. If you need an integer\
    \ value that will be 32 bits on a 32-bit architecture and 64 bits on a 64-bit\
    \ architecture, declare it as `NSInteger` or `NSUInteger`. These are C `typedef`s\
    \ that change size to match the architecture. Pay attention to the APIs to determine\
    \ the correct type. If a method returns an `NSInteger`, declare the variable you\
    \ are assigning it to as `NSInteger`. It will behave consistently when compiled\
    \ for either 32- or 64-bit executables.\n\nJava simplified traditional C by eliminating\
    \ unsigned integer types. In C, integers come in both signed and unsigned flavors.\
    \ The closest equivalent to the Java `char` type is C's `unichar`, but be careful—`char`\
    \ is signed and `unichar` is unsigned. Unsigned integers are fertile ground for\
    \ subtle programming mistakes, which is probably why Java eliminated them. Here\
    \ are the most common ones.\n\nAvoid writing nonsense inequality statements, like\
    \ that shown in Listing 2-1.\n\n**Listing 2-1.** Nonsense Comparison Statement\n\
    \n```\nunsigned int i = 99;\nwhile (i>=0) { … } // nonsense/always true; i can\
    \ never be < 0\n```\n\nBe aware that the sign bit can be reinterpreted through\
    \ assignment, as shown in Listing 2-2.\n\n**Listing 2-2.** Sign Bit Reinterpretation\n\
    \n```\nint i = -3;\nunsigned int j = i; // j = 4294967293\n```\n\nListing 2-3\
    \ illustrates a mix of signed and unsigned types in a comparison. Avoid this or\
    \ cast one of the values so the types are compatible.\n\n**Listing 2-3.** Comparing\
    \ Mixed Types\n\n```\nint i = -3;\nunsigned int j = 3;\nif (i<j) { … } // unpredictable\
    \ condition\n```\n\nMost size, index, and array counts are unsigned. When declaring\
    \ a variable that will be used as an index into a collection, declare an unsigned\
    \ integer. Use signed integers just about everywhere else.\n\n## Constants\n\n\
    Constants are names assigned to unchanging, well-known values. Programming symbolically\
    \ is easier and more informative than working with naked numeric values—even when\
    \ the value is obvious.\n\nModern code libraries and frameworks define thousands\
    \ of constants, but the ones you use regularly are listed in Table 2-2.\n\n**Table\
    \ 2-2.** Common Constants\n\n| Java | Objective-C | Usage |\n|------|-------------|-------|\n\
    | `true` | `YES` | Logical truth |\n| `false` | `NO` | Logical untruth |\n| `null`\
    \ | `nil` | Empty or Invalid Object Reference |\n| | `NULL` | Empty or Invalid\
    \ Pointer |\n\nTechnically, `nil` and `NULL` are interchangeable. For readability,\
    \ use `nil` to set and test Objective-C object references exactly as you would\
    \ use `null` in Java. `NULL` is C's empty pointer constant and is used to set\
    \ and test pointers. Adopting this convention underscores the distinction between\
    \ memory pointers and object references in your code.\n\nThe `const` keyword before\
    \ an integer type means pretty much what `final` means in Java, but is rarely\
    \ used to define simple integer constants. Most constants in C are defined using\
    \ the preprocessor (also described later in this chapter) or using an enumeration\
    \ statement.\n\nThe enumeration, or `enum`, in Listing 2-4 defines a numeric variable\
    \ `v` that can hold one of the integer constants `Zero`, `One`, or `Two`. Unlike\
    \ Java, `v` is not an object. It's just an integer. The three constants (`Zero`,\
    \ `One`, and `Two`) are public symbols with the values 0, 1, and 2 respectively.\
    \ They can be used in any context in which an integer constant would be acceptable.\
    \ The variable is often omitted and the `enum` statement is used only to define\
    \ the constants.\n\n**Listing 2-4.** Enumeration\n\n```\nenum {\n    Zero = 0,\
    \ // = 0 optional, enums start at 0 if omitted\n    One,\n    Two\n} v;\n```\n\
    \n## Typedefs\n\nA `typedef` is a concept foreign to Java, but used extensively\
    \ in C. In Java, new data structures and functionality are accomplished by creating\
    \ new classes. In C, you can define your own primitive data types. The program\
    \ in Listing 2-5 uses an integer value to identify an inventory part."
  raw: '■Caution The size of integers has changed again for 64-bit architectures.
    If you compile your code for a 64-bit CPU, long int becomes a 64-bit integer—short
    int, int, and long long int remain the same size. If you need an integer value
    that will be 32 bits on a 32-bit architecture and 64 bits on a 64-bit architecture,
    declare it as NSInteger or NSUInteger. These are C typedefs that change size to
    match the architecture. Pay attention to the APIs to determine the correct type.
    If a method returns an NSInteger, declare the variable you are assigning it to
    as NSInteger. It will behave consistently when compiled for either 32- or 64-bit
    executables.


    Java simplified traditional C by eliminating unsigned integer types. In C, integers
    come in both signed and unsigned flavors. The closest equivalent to the Java char
    type is C’s unichar, but be careful—


    char is signed and unichar is unsigned. Unsigned integers are fertile ground for
    subtle programming mistakes, which is probably why Java eliminated them. Here
    are the most common ones.


    Avoid writing nonsense inequality statements, like that shown in Listing 2-1.


    Listin g 2-1\. Nonsense Comparison Statement


    unsigned int i = 99;


    while (i>=0) { … } // nonsense/always true; i can never be < 0


    Be aware that the sign bit can be reinterpreted through assignment, as shown in
    Listing 2-2.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ JAVA AND C: KEY DIFFERENCES


    Listin g 2-2\. Sign Bit Reinterpretation


    int i = -3;


    unsigned int j = i; // j = 4294967293


    Listing 2-3 illustrates a mix of signed and unsigned types in a comparison. Avoid
    this or cast one of the values so the types are compatible.


    Listin g 2-3\. Comparing Mixed Types


    int i = -3;


    unsigned int j = 3;


    if (i<j) { … } // unpredictable condition


    Most size, index, and array counts are unsigned. When declaring a variable that
    will be used as an index into a collection, declare an unsigned integer. Use signed
    integers just about everywhere else.


    Constants


    Constants are names assigned to unchanging, well-known values. Programming symbolically
    is easier and more informative than working with naked numeric values—even when
    the value is obvious.


    Modern code libraries and frameworks define thousands of constants, but the ones
    you use regularly are listed in Table 2-2.


    ***Table 2-2.** Common Constants*


    Ja va


    O bje ctiv e- C


    Usa ge


    true YES


    Logical


    truth


    false NO


    Logical


    untruth


    null


    nil


    Empty or Invalid Object Reference


    NULL


    Empty or Invalid Pointer


    Technically, nil and NULL are interchangeable. For readability, use nil to set
    and test Objective-C object references exactly as you would use null in Java.
    NULL is C’s empty pointer constant and is used to set and test pointers. Adopting
    this convention underscores the distinction between memory pointers and object
    references in your code.


    The const keyword before an integer type means pretty much what final means in
    Java, but is rarely used to define simple integer constants. Most constants in
    C are defined using the preprocessor (also described later in this chapter) or
    using an enumeration statement.


    The enumeration, or enum, in Listing 2-4 defines a numeric variable v that can
    hold one of the integer constants Zero, One, or Two. Unlike Java, v is not an
    object. It’s just an integer. The three constants (Zero, One, and Two) are public
    symbols with the values 0, 1, and 2 respectively. They can be used in any 14


