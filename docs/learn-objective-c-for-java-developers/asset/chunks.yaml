    ■ CONTENTS


    **About the Author**


    **James Bucanek** has spent the past 30 years programming and developing microprocessor
    systems.


    He has experience with a broad range of computer hardware and software, from embedded
    consumer products to industrial robotics. His development projects include the
    first local area network for the Apple II, distributed air conditioning control
    systems, a piano teaching system, digital oscilloscopes, silicon wafer deposition
    furnaces, and collaborative writing tools for K-12 education. James holds a Java
    Developer Certification from Sun Microsystems and was awarded a patent for optimizing
    local area networks. James is currently focused on Macintosh and iPhone software
    development, where he can combine his deep knowledge of UNIX and object-oriented
    languages with his passion for elegant design.


    James holds an Associates degree in classical ballet from the Royal Academy of
