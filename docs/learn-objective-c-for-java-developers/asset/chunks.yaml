- fmt: '# Summary


    I’m sure you could make a compelling argument for why the Mercedes C-class sedan
    is one of the best vehicles ever made. Your argument could be supported by an
    impressive list of design choices, engineering specifications, safety features,
    and so on. It would be a persuasive position–unless you needed to haul a half-ton
    of bricks up a dirt road. In that context, a luxury Mercedes sedan could quite
    possibly be the worst vehicle for the task.


    Several years ago, I embarked on a project to develop a backup solution for the
    Macintosh.


    I initially started the project in Java. This was not surprising, since I considered
    Java the best programming language ever created. Despite Mac OS X’s admirable
    support for Java, it quickly became evident that I could not develop a compelling
    solution in Java. A viable commercial application would require a native programming
    language and the choices were `C`, `C++`, and `Objective-C`. This project was
    my half-ton of bricks.


    `Objective-C` has not usurped my love of Java. Instead, it has joined it side
    by side as a capable alternative. There are still situations where Java is unquestionably
    superior to `Objective-C`. There are also situations where the opposite is equally
    true. Rather than obsessing about which tool is best, I focus on which tool is
    best for the job.


    `Objective-C` is a mature and powerful language with very real advantages. But
    you shouldn’t have to approach it like a first-year programming student. The rest
    of this book is dedicated to taking your existing Java knowledge and experience
    and refocusing it on `Objective-C`, turning you into a productive `Objective-C`
    developer as quickly as possible.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # C H A P T E R 2


    ## Java and C: Key Differences


    This chapter highlights the important differences between Java and C. We’ll pay
    particular attention to familiar syntax and keywords that mean substantially different
    things in C—faux amis, as the French would say—and constructs that are foreign
    to Java. Where `Objective-C` adds to the C language in an unambiguous way, the
    similarities between Java and C can be a source of confusion. So the first step
    in your journey to `Objective-C` is to become comfortable with C.


    Java and `C++` are both C derivatives. Both created completely new, sophisticated,
    object-oriented languages while correcting some of the perceived inadequacies
    of C. Each imposes and enforces concepts such as constructors, method access,
    encapsulation, and so forth.


    `Objective-C` takes a radically minimalist approach. `Objective-C` adds the concept
    of classes and objects to traditional C by introducing a thin layer of syntax
    and a handful of keywords—with the emphasis on thin. `Objective-C` does not change
    or redefine the underlying C language in any significant way. In Java you program
    in Java. In `C++` you program in `C++`. In `Objective-C` you program in industry
    standard C overlaid with some object-oriented extras.


    **Note** I should probably mention that there is also an `Objective-C++` language;
    it overlays `C++` with `Objective-C` objects and features. It’s primarily useful
    to programmers who must integrate legacy `C++` code into an `Objective-C` runtime
    environment. This book does not discuss `Objective-C++`, but most of the information
    about C and `Objective-C` is applicable.


    If you’ve previously programmed in C, then you can skip this chapter. Since `Objective-C`
    is C, you won’t find any surprises. If it’s been a while, you might skim over
    the sections to remind yourself of the differences.


    If you’ve never programmed in C, there are differences between Java and C that
    you need to be aware of. Java’s syntax is patterned after C, so you are already
    familiar with the structure of methods, code blocks, conditionals, assignment
    statements, operators, and so on. Here’s a crash course in the key differences
    between Java and C.


    ### Primitive Types


    Primitive types are the atomic types defined by the language and are the building
    blocks for all computations. Most are the scalar variable types with various sizes,
    numerical ranges, and formats. In general, the integer and floating-point types
    in `Objective-C` are similar to those in Java. Table 2-1 lists the basic numeric
    variable types for both.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Table 2-1.** *Primitive Numeric Types*


    | Java | Objective-C | C Typedef | Size | Range |

    |------|-------------|-----------|------|-------|

    | `boolean` | `BOOL` | | 1 bit | `false` … `true` |

    | `byte` | `char` | `int8_t` | 8 bits | -128 … 127 |

    | `unsigned char` | `uint8_t` | | 8 bits | 0 … 255 |

    | `char` | `int16_t` | | 16 bits | -32768 … 32767 |

    | `unichar` | `uint16_t` | | 16 bits | 0 … 65535 |

    | `short` | `short int` | `int16_t` | 16 bits | -32768 … 32767 |

    | | `unsigned short int` | `uint16_t` | 16 bits | 0 … 65535 |

    | `int` | `int` | `int32_t` | 32 bits | -2147483648 … 2147483647 |

    | | `unsigned int` | `uint32_t` | 32 bits | 0 … 4294967295 |

    | `long` | `long long int` | `int64_t` | 64 bits | -9223372036854775808 … 9223372036854775807
    |

    | | `unsigned long long int` | `uint64_t` | 64 bits | 0 … 18446744073709551615
    |

    | `float` | `float` | `float_t` | 32 bits | approximately +/–10+/-38 |

    | `double` | `double` | `double_t` | 64 bits | approximately +/–10+/-308 |


    C does not have a strict Boolean type. In C, Boolean operators (i.e. `==` and
    `&&`) have integer results. C interprets a zero value as `false` and any non-zero
    value as `true`. This allows you to write the statements `if (i!=0)` and `if (p!=nil)`
    as `if (i)` and `if (p)`, respectively. The statements are equivalent, but I believe
    using the more verbose form—even though the language doesn’t require it—makes
    the intent clearer. For convenience and readability, `Objective-C` defines a `BOOL`
    type for declaring Boolean values. The actual type is an unsigned 8-bit integer,
    but you should treat it as if it were only capable of representing `YES` (`true`)
    or `NO` (`false`). The C language also defines a `bool` type, interchangeable
    with `BOOL`, but `Objective-C` programmers use `BOOL` almost exclusively.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Caution** One of the side effects of not having a Boolean type is that C control
    statements accept integer expressions. This makes it easy to use an assignment
    statement where you meant to write a comparison. Be careful not to write `if (i=1)`
    when you mean to write `if (i==1)`. The former means, “assign the value of 1 to
    the variable `i` then test to see if that value is not zero.”


    C’s `long` and `short` keywords are technically modifiers for the `int` type,
    as in `short int` or `long int`. Java’s `long`, `int`, and `short` are three distinct
    integer types and aren’t used in combination. The `int` type in C is implied wherever
    the keywords `long` or `short` appear, so `short int` and `short` are equivalent.
    Which you use is a matter of style.


    One of Java’s significant contributions to programming was to standardize the
    size of integer types. Traditional C does not specify the size of types like `char`
    and `int`; they would vary from one compiler or system to the next. Modern C has
    largely standardized on the sizes listed in Table 2-1. To avoid any possible ambiguity,
    the C standard now includes `typedefs` (covered later in this chapter) that result
    in consistent variable sizes. A variable of type `int32_t` will always be a signed
    32-bit integer, regardless of the compiler’s preferred word size for `int` or
    `short int`.


    Historically, a C `int` was 16 bits and a `long int` was 32 bits. As 32- and 64-bit
    CPUs replaced smaller microprocessors, the standard size of `int` became 32 bits.
    For backwards compatibility, `long int` remained 32 bits and the `long long int`
    type was introduced to define a 64-bit integer.'
  raw: 'I’m sure you could make a compelling argument for why the Mercedes C-class
    sedan is one of the best vehicles ever made. Your argument could be supported
    by an impressive list of design choices, engineering specifications, safety features,
    and so on. It would be a persuasive position–unless you needed to haul a half-ton
    of bricks up a dirt road. In that context, a luxury Mercedes sedan could quite
    possibly be the worst vehicle for the task.


    Several years ago, I embarked on a project to develop a backup solution for the
    Macintosh.


    I initially started the project in Java. This was not surprising, since I considered
    Java the best programming language ever created. Despite Mac OS X’s admirable
    support for Java, it quickly became evident that I could not develop a compelling
    solution in Java. A viable commercial application would require a native programming
    language and the choices were C, C++, and Objective-C. This project was my half-ton
    of bricks.


    Objective-C has not usurped my love of Java. Instead, it has joined it side by
    side as a capable alternative. There are still situations where Java is unquestionably
    superior to Objective-C. There are also situations where the opposite is equally
    true. Rather than obsessing about which tool is best, I focus on which tool is
    best for the job.


    Summary


    Objective-C is a mature and powerful language with very real advantages. But you
    shouldn’t have to approach it like a first-year programming student. The rest
    of this book is dedicated to taking your existing Java knowledge and experience
    and refocusing it on Objective-C, turning you into a productive Objective-C developer
    as quickly as possible.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 2**


    ■ ■ ■


    Java and C: Key Differences


    This chapter highlights the important differences between Java and C. We’ll pay
    particular attention to familiar syntax and keywords that mean substantially different
    things in C—faux amis, as the French would say—and constructs that are foreign
    to Java. Where Objective-C adds to the C language in an unambiguous way, the similarities
    between Java and C can be a source of confusion. So the first step in your journey
    to Objective-C is to become comfortable with C.


    Java and C++ are both C derivatives. Both created completely new, sophisticated,
    object-oriented languages while correcting some of the perceived inadequacies
    of C. Each imposes and enforces concepts such as constructors, method access,
    encapsulation, and so forth.


    Objective-C takes a radically minimalist approach. Objective-C adds the concept
    of classes and objects to traditional C by introducing a thin layer of syntax
    and a handful of keywords—with the emphasis on thin. Objective-C does not change
    or redefine the underlying C language in any significant way. In Java you program
    in Java. In C++ you program in C++. In Objective-C you program in industry standard
    C overlaid with some object-oriented extras.


    ■Note I should probably mention that there is also an Objective-C++ language;
    it overlays C++ with Objective-C


    objects and features. It’s primarily useful to programmers who must integrate
    legacy C++ code into an Objective-C runtime environment. This book does not discuss
    Objective-C++, but most of the information about C


    and Objective-C is applicable.


    If you’ve previously programmed in C, then you can skip this chapter. Since Objective-C
    is C, you won’t find any surprises. If it’s been a while, you might skim over
    the sections to remind yourself of the differences.


    If you’ve never programmed in C, there are differences between Java and C that
    you need to be aware of. Java’s syntax is patterned after C, so you are already
    familiar with the structure of methods, code blocks, conditionals, assignment
    statements, operators, and so on. Here’s a crash course in the key differences
    between Java and C.


