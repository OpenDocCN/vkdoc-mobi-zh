- fmt: "### Section\n\nThe client must be running its own run loop if it expects to\
    \ receive any asynchronous replies from the server. The `oneway` modifier, along\
    \ with the other parameter modifiers described later, only affect messages sent\
    \ through `NSProxy` objects. The behavior of regular Objective-C messages (i.e.,\
    \ `[object doSomething]`) does not change.\n\n### Passing Objects by Copy\n\n\
    Objects passed in parameters or returned from messages can be exchanged with the\
    \ remote object by copy or by reference. Sending an object by reference entails\
    \ creating an `NSDistantObject` proxy for the object and sending that to the receiver.\n\
    \nTo pass an object by copy, the object is archived using sequential archiving,\
    \ then reconstructed at the receiving end. This places three requirements on the\
    \ class. First, the class must conform to `NSCoding` and implement sequential\
    \ archiving, as described in the Serialization chapter. Second, the code for the\
    \ class must exist in the receiving process—otherwise, there’s no way to instantiate\
    \ the object.\n\nFinally, the class must override its `-replacementObjectForPortCoder:`\
    \ method to decide when it should be copied and when it should be passed by reference.\
    \ Objective-C can provide hints to the class with the `bycopy` and `byref` modifiers.\
    \ These type modifiers augment object parameters and return values in the method’s\
    \ implementation, as in\n\n```\n- (bycopy ProjectStatus*)statusForProject:(byref\
    \ Project*)project { …\n```\n\n### The Demonstration Project\n\nThe demonstration\
    \ project includes an implementation of `-replacementObjectForPortCoder:` for\
    \ the `Guest` object, shown in Listing 13-9.\n\n**Listing 13-9.** Guest Class\
    \ `bycopy` Implementation\n\n```\n- (id)replacementObjectForPortCoder:(NSPortCoder*)coder\n\
    {\n    if ([coder isBycopy])\n        return self;\n    return [super replacementObjectForPortCoder:coder];\n\
    }\n```\n\nFrom the perspective of distributed objects, all objects are passed\
    \ by copy. The archived copy of the object is produced using sequential archiving.\
    \ As you learned in Chapter 12, an `NSPortCoder` encoder will first invoke `-replacementObjectForPortCoder:`\
    \ to allow an object to substitute a different object in the archive. `NSObject`’s\
    \ default implementation substitutes an `NSDistantObject` for the object.\n\n\
    The distributed objects framework does not perform the substitution of proxy objects\
    \ for their originals; each object individually decides whether to copy itself\
    \ or provide a proxy object.\n\nThe code in Listing 13-9 makes the by-copy decision\
    \ for the `Guest` object based on the hint embedded in the method definition.\
    \ If the argument or return value type includes the `bycopy` keyword, the `NSPortCoder`\
    \ used to archive the object will return `YES` when sent `-isBycopy`. `-isBycopy`\
    \ will return `NO` if the `byref` modifier, or no modifier, was specified. Or\
    \ you can test `-isByref`, which always returns `!isBycopy`.\n\nAlternatively,\
    \ you can choose to ignore the recommendation of the coder and return `self`,\
    \ `[super replacmentObjectForPortCoder:coder]`, or any other functional substitute.\
    \ Some objects, like `NSString`, elect to always send themselves bycopy, ignoring\
    \ any `byref` hint. By default, subclasses of `NSObject` always send themselves\
    \ by reference, even when the method requests `bycopy`. Your code can use any\
    \ criteria to make its decision. An object might send itself by copy if the `NSPortCoder`\
    \ is connected to a service over a network, but choose to send a reference if\
    \ connected to another process in the same system.\n\n### Passing Pointers\n\n\
    Passing C pointers as parameters presents another problem. Pointers can’t be copied\
    \ by value—since the local address will be meaningless to the receiving process.\
    \ Nor is there any way to create the equivalent of a proxy object for a remote\
    \ structure. Distributed objects solves this problem by copying the value of the\
    \ structure the pointer parameter points to—unless the pointer is `NULL`, in which\
    \ case it simply sends `NULL` to the receiver.\n\n```\n- (void)rectToLocalCoordinates:(NSRect*)rectangle;\n\
    ```\n\nWhen the `-rectToLocalCoordinates:` message is sent to a distant object,\
    \ the contents of the `NSRect` structure are copied, verbatim, to the remote process\
    \ and the C pointer the receiver gets points to a local copy allocated by distributed\
    \ objects. When the method returns, the (possibly modified) contents of the `NSRect`\
    \ structure are copied back to the sender, and the temporary copy is destroyed.\n\
    \nThis isn’t particularly efficient, but it’s safe. For methods that only reference\
    \ the contents of the structure, or ignore its original content, Objective-C provides\
    \ the parameter modifiers listed in Table 13-3.\n\n**Table 13-3.** Pointer Parameter\
    \ Type Modifiers\n\n| Modifier | Effect |\n|---|---|\n| `in` | Structure is copied\
    \ to receiver, but not back to the sender. |\n| `out` | Structure is not copied\
    \ to the receiver, but the modified structure is copied back to the sender upon\
    \ return. |\n| `inout` | Structure is copied to the receiver, then back again\
    \ when the method returns. This is the default. |\n\nUse the `in` modifier for\
    \ parameters that pass information to the receiver, when the receiver doesn’t\
    \ use the pointer to modify the contents of the structure. An example method would\
    \ be\n\n```\n- (BOOL)isValidPoint:(in NSPoint*)inPoint;\n```\n\nUse the `out`\
    \ modifier for parameters used to point to an uninitialized structure that will\
    \ be filled in by the receiver. An example method would be\n\n```\n- (void)getSize:(out\
    \ NSSize*)outSize;\n```\n\nThe `inout` modifier is the default. Including it won’t\
    \ change the method, but makes your intent clear.\n\n> **Caution** Structures\
    \ are sent by copy to the receiver. The structure can only contain primitive values.\
    \ It cannot, for obvious reasons, contain pointers to other structures or objects.\
    \ If the structure is that complex, it will need to be reengineered as an object\
    \ or first translated into some portable format, before it can be used with distributed\
    \ objects.\n\nPointer value modifiers are also applicable to method return values.\
    \ There are similar problems with parameters that are pointers to pointers. These,\
    \ and other esoteric cases, are discussed in the Remote Messaging section of *The\
    \ Objective-C 2.0 Programming Language*¹.\n\n### Is it an Object or a Proxy?\n\
    \nThe `NSObject` protocol defines a special method, `-isProxy`, for determining\
    \ whether an object is actually an `NSProxy` object. It will return `YES` if the\
    \ object reference is not an instance of `NSObject`, or a subclass of `NSObject`.\
    \ It’s impossible to determine if an object is a proxy using any of the `-class`,\
    \ `-className`, `-isMemberOfClass:`, or `-isKindOfClass:` methods; the proxy will\
    \ simply forward these messages to the original object, which will return the\
    \ obvious answer. Use `-isProxy`, for example, to determine if it’s safe to directly\
    \ access the member variables of an object, as in `if (![character isProxy]) character->hitCount++`.\n\
    \n### Networking\n\nThere are a number of classes for communicating over a network.\
    \ Two worth mentioning are Network Services, which assist in registering and locating\
    \ services on a network, and the URL Loading System, which implements various\
    \ network protocols such as HTTP and FTP.\n\n### Network Services\n\nNetwork Services\
    \ doesn’t have a good analog in Java. It works kind of like `java.rmi.Named`,\
    \ in that it will publish services on a local area network, and make it easy for\
    \ remote clients to browse and connect with those services. However, network services\
    \ is much more generic. It’s built on Bonjour, also known as Zeroconf. The `NSSocketPortNameServer`\
    \ class, demonstrated earlier, uses network services to register and find distributed\
    \ object services on the network.\n\nNetwork Services has two principal classes.\
    \ An `NSNetService` object represents a single service.\n\n---\n¹ Apple, Inc.,\
    \ *The Objective-C 2.0 Programming Language*, http://developer.apple.com/documentation/Cocoa/Conceptual/ObjectiveC/Articles/ocRemoteMessaging.html,\
    \ 2009."
