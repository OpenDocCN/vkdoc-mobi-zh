    ## 自动释放的对象


    清单 24-4 中的代码之所以能工作，是因为自动释放池的生命周期规则：在 `-recitePoetry` 开始时使用的自动释放池，在该方法返回之前不会被排空。这意味着任何被添加到自动释放池的对象都会在方法执行完毕前一直存在。


    了解了这一点，清单 24-2 和 24-4 中的代码可以进一步简化，如清单 24-5 所示。


    ### 清单 24-5. 简化的释放管理


    ```

    - (void)recitePoetry


    {


    NSString *myName = [self zombieName];


    [self speakFormat:@"Hello, my name is %@. This is my poem.",myName];


    …


    }


    - (NSString*)zombieName


    {


    NSMutableString *z = [[[NSMutableString alloc] init] autorelease];


    [z appendString:@"Zombie "];


    [z appendString:[self humanName]];


    return z;


    }

    ```


    `清单 24-5` 开始看起来很像为垃圾回收环境编写的代码。唯一的区别在于创建 `NSMutableString` 时调用的那一个 `-autorelease`
    消息。


    原因是字符串对象已被自动释放，并且对该对象的所有引用都包含在执行方法的作用域内。请记住，自动释放池在方法返回之前绝不会被排空，并且其他方法返回的对象总是保留的或自动释放的对象。这为管理对象的保留计数（retain
    counts）创建了一条新的、重要的规则：


    -   只有一个自动释放对象在当前自动释放池的生命周期之外仍被引用时，才需要保留它。


    自动释放池的这个特性正是其如此有用的原因，也是为什么我认为托管内存和垃圾回收在 80% 的情况下是无法区分的。大多数对象引用都是短暂的——在单个方法中定义并使用后就被遗忘。只要这些引用指向的是自动释放的对象，它们就不需要任何内存管理。


    由于这种便利性，大多数对象都会像 `清单 24-5` 所示的那样被立即创建并自动释放，而不是采用 `清单 24-4` 中的模式。一旦自动释放，该对象几乎不需要任何管理，除非其他代码需要保留它——而那将是其他代码的责任。唯一例外的情况是，代码意图创建并保留一个对象。当
    `[[MyClass alloc] init]` 就能达到相同目的时，却写出 `[[[[MyClass alloc] init] autorelease]
    retain]` 是很愚蠢的。


    那么，对于在当前自动释放池生命周期之外持续存在的引用，该如何处理呢？接下来几节中的编程模式正是针对这些情况。


    ## 托管内存模式


    以下各节展示了在托管内存环境中工作时使用的基本编程模式。其中一些模式已经展示过，但为了完整性和将来参考，这里再次包含它们。


    ## 新对象模式


    当创建一个新对象时，它的保留计数（retain count）从 1 开始，隐式地使其创建者成为第一个持有者。返回新对象的主要消息是：`+alloc`、`+new`
    和 `-copy`。当对象不再使用时，这种隐含的持有权必须通过 `-release` 消息（如清单 24-6 所示）或 `-autorelease` 消息（如清单
    24-7 所示）来平衡。


    ### 清单 24-6. 保留新对象模式


    ```

    id object = [[NSObject alloc] init];


    …


    [object release];

    ```


    ### 清单 24-7. 自动释放新对象模式


    ```

    id object = [[[NSObject alloc] init] autorelease];


    …

    ```


    ## 自动释放对象模式


    大多数消息返回的对象都是以自动释放对象的形式返回的。也就是说，该对象已经接收到了一组正确平衡的 `-retain`、`-release` 或 `-autorelease`
    消息，并且不需要任何额外管理。具体来说，类的便利构造器（convenience constructors），例如 `+[NSMutableArray arrayWithCapacity:]`，会返回自动释放的对象。即使便利构造器用于创建新对象，但从内存管理的角度来看，这些对象并不是“新的”。常见的例子如清单
    24-8 所示。


    ### 清单 24-8. 自动释放的对象


    ```

    NSNumber *number = [NSNumber numberWithInt:10];


    NSString *path = [NSString stringWithFormat:@"Folder %@",number]; NSFileManager
    *fileManager = [NSFileManager defaultManager]; NSDictionary *attrs = [fileManager
    attributesOfItemAtPath:path error:NULL]; NSArray *attrKeys = [attrs keysSortedByValueUsingSelector:@selector(compare:)];

    ```


    `清单 24-8` 中每个由类方法或实例方法返回的对象都是自动释放的，不需要额外管理。如果你要将引用存储在持久化的位置（例如实例变量），那么你应该像这样保留该对象：


    ```

    myArray = [[NSMutableArray arrayWithCapacity:100] retain];

    ```


    更多关于在属性中保留引用的信息，请参阅下面的“设置器模式”部分。


    ## 返回自动释放的对象


    为了使你的代码与 Objective-C 的其他部分保持一致，你的方法应该始终返回自动释放的对象，如清单 24-9 所示。


    ### 清单 24-9. 返回一个自动释放的对象


    ```

    - (id)someObject


    {


    id object = [[[NSObject alloc] init] autorelease];


    …


    return object; // 自动释放


    }

    ```


    ## 设置器模式


    在设置对象的属性时，你应该保留被引用的对象，直到你用其他东西替换该引用。被替换的引用应该被释放或自动释放。编写设置器方法有四种流行的模式，如清单 24-10
    所示。


    ### 清单 24-10. 设置器模式


    ```

    @interface MyClass : NSObject {


    id one;


    id two;


    id three;


    id four;


    }


    @property (retain,nonatomic) id one;


    @property (retain,nonatomic) id two;


    @property (retain,nonatomic) id three;


    @property (copy,nonatomic) id four;


    @end


    @implementation MyClass


    - (id)one


    {


    return one;


    }


    - (void)setOne:(id)object


    {


    [one autorelease];


    one = [object retain];


    }


    - (id)two


    {


    return two;


    }


    - (void)setTwo:(id)object


    {


    id oldTwo = two;


    two = [object retain];


    [oldTwo release];


    }


    - (id)three


    {


    return three;


    }


    - (void)setThree:(id)object


    {


    if (three!=object) {


    [three release];


    three = [object retain];


    }


    }


    - (id)four


    {


    return four;


    }


    - (void)setFour:(id)object


    {


    [four autorelease];


    four = [object copy];


    }


    @end

    ```


    `清单 24-10` 中的所有设置器模式都完成了三个重要任务：


    -   向正在存储的对象发送 `-retain` 消息。

    -   向正在被遗忘的对象发送 `-release` 或 `-autorelease` 消息。

    -   在发送 `-release` 消息之前发送 `-retain` 消息。


    最后一点很微妙。如果正在设置的对象与已存储在属性中的对象相同，那么在 `-retain` 消息之前向其发送 `-release` 消息可能会过早地销毁该对象。

