    Those are the big ones, but there are hordes of smaller details. If you’re considering
    compiling 64-bit Objective-C code, you should begin by reviewing the 64-Bit Transition
    Guide for Cocoa.5 Also read some of the many reasons you might not want to convert
    your application to 64-bits in the 64-Bit Transition Guide.6


    Summary


    Unlike Java, which tries to abstract many of the details of the runtime environment,
    Objective-C


    applications run as native code and interact directly with the operating system
    APIs. You can use introspection to run applications on older versions of the operating
    system that might be missing newer APIs and features. Cocoa bundles and frameworks
    simplify the deployment of complex applications and libraries, while user defaults
    make it easy to manage configurable preferences and properties. With some attention
    to a few details, you can produce applications that run smoothly on the latest
    generation of 64bit processors.


    ## Epilogue


