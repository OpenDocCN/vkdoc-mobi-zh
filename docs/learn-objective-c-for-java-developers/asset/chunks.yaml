  trans: "\n> **注意**  \n说到子类，`NSException` 的子类非常少。在 Java 中，你可以通过继承 `java.lang.Exception`\
    \ 来创建不同类型的异常。而 `NSException` 对象有一个 name 属性，通常通过名称而非类名来识别异常类型。这并不是说你不应该继承 `NSException`。我经常这样做，但仅限于是为了向\
    \ `NSException` 对象添加功能，或者创建一个大类别的异常。Cocoa 框架定义了一些常用的异常名称，你可以在 *Cocoa 异常编程主题介绍*[¹]\
    \ 中找到。\n\n如果你可以抛出任何类型的对象，你可能会好奇 `NSException` 类具体扮演什么角色。首先，`NSException` 是专门为传达异常细节而构建的。它包含有用的信息，例如堆栈跟踪和异常描述，并且可以参与本节后面介绍的非处理异常机制。最初，`NSException`\
    \ 是抛出异常的唯一机制。详细信息请参见本章末尾的 *旧版异常* 一节。正因为如此，许多较旧的框架只能捕获 `NSException` 类型的异常。如果你抛出的对象可能不会被你的代码捕获，请确保它是一个\
    \ `NSException` 对象。\n\n[¹]: Apple, Inc., *Cocoa 异常编程主题介绍*, [`developer.apple.com/documentation/Cocoa/Conceptual/Exceptions/`](http://developer.apple.com/documentation/Cocoa/Conceptual/Exceptions/),\
    \ 2007.\n\n---\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 14\
    \ 章 ■ 异常处理\n\n### 重抛异常\n\nObjective-C 包含一种便捷的语法，用于重抛在 `@catch` 块中捕获的异常，如代码清单 14-2\
    \ 所示。\n\n**代码清单 14-2.** 重抛异常\n\n```\n@try {\n    …\n} @catch (NSException *exception)\
    \ {\n    …\n    @throw;\n}\n```\n\n一个空的 `@throw` 指令会重抛其所在 `@catch` 块捕获的异常。在代码清单\
    \ 14-2 中，`@throw` 语句等同于 `@throw exception`。\n\n### 捕获顺序\n\n与 Java 类似，`@catch`\
    \ 块的顺序必须从最具体到最通用。换句话说，捕获特定类的 `@catch` 块不能跟在捕获该类的子类的 `@catch` 块之后。`@catch` 块按顺序依次测试，第一个\
    \ `@catch` 块会阻止后续 `@catch` 块执行。\n\n在 Java 中，顺序不当的 `@catch` 块会导致编译器致命错误。而 Objective-C\
    \ 编译器只会发出警告——并且只有在知道类的继承关系时才能发出该警告。\n\n以代码清单 14-3 中的代码为例。\n\n**代码清单 14-3.** 顺序不当的\
    \ `@catch` 块\n\n```\n@class MysteryException\n…\n@try {\n    …\n} @catch (NSObject\
    \ *anything) {\n    …\n} @catch (MysteryException *exception) {\n    …\n}\n```\n\
    \n第二个 `@catch` 块永远不会被执行，因为 `MysteryException` 是 `NSObject` 的子类。但这段代码不会产生编译器警告。这是因为\
    \ `@class` 语句只让编译器知道 `MysteryException` 类存在，但未说明其任何信息。作为规则，对于你打算捕获的所有对象，都应包含其类定义。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 14 章 ■ 异常处理\n\n###\
    \ 链式处理\n\n`NSException` 类没有像 `java.lang.Throwable` 那样的 cause 属性。相反，`NSException`\
    \ 对象包含一个字典（映射）对象，允许你为异常提供任意上下文信息。如果你想抛出一个引用另一个异常的异常，可以将该异常（连同任何其他相关细节）包含在异常的信息字典中，如代码清单\
    \ 14-4 所示。\n\n**代码清单 14-4.** 链式异常\n\n**Java**\n\n```\ntry {\n    …\n} catch (Exception\
    \ e) {\n    throw new SpecificException(\"encountered exception\", e);\n}\n```\n\
    \n**Objective-C**\n\n```\n@try {\n    …\n} @catch (NSException *exception) {\n\
    \    NSDictionary *userInfo = [NSDictionary dictionaryWithObject:exception\n \
    \                                                       forKey:@\"RootCause\"\
    ];\n    @throw [SpecificException exceptionWithName:@\"MySpecialException\"\n\
    \                                        reason:@\"encountered exception\"\n \
    \                                     userInfo:userInfo];\n}\n```\n\n### 调用堆栈\n"
- fmt: '# Exception Handling


    ## Performance


    Another reason that exceptions are used less frequently in Objective-C is performance.
    Setting up and throwing exceptions costs more in Objective-C than in Java. Alternatives
    to using exceptions are outlined in the "Alternatives to Exceptions" section later
    in this chapter.


    Don''t let the above dissuade you from using exceptions in Objective-C. I use
    exceptions a lot—probably because of my experience programming in Java. I''ve
    never seen Objective-C exception handling become a performance liability. My advice
    is to program using the coding style you are most comfortable with, and if that
    includes exceptions then by all means use exceptions. If, and only if, a performance
    analysis shows exception handling to be a performance problem, would I advise
    considering an alternative error-handling solution.


    ## Uncaught Exceptions


    An uncaught exception is one that is allowed to pass outside your application
    code to the runtime framework. Exceptions can also be generated in response to
    system events and runtime errors.


    Uncaught exception processing can be broadly divided into four categories:


    - Exceptions thrown on the main thread of a GUI application

    - Exceptions thrown in all other situations

    - Exceptions generated by system events, such as an invalid memory access

    - Exceptions generated by runtime events, like sending a message to a freed object


    By default, exceptions thrown in the main thread of an application are absorbed
    by the `NSApplication` framework and ignored. For example, an action invoked by
    the user choosing a menu command throws an uncaught exception. The application''s
    main run loop will discard the exception and continue running. There will be no
    indication that a problem occurred, with the possible exception of a message logged
    to the system console. You may have encountered this behavior in an application.


    In almost all other circumstances, an uncaught exception terminates the thread,
    or the process if the exception is thrown in the main thread. System and runtime
    events immediately terminate the process.


    You can intercept these events using the optional `ExceptionHandling` framework.
    Using the exception handling framework you can:


    - Log or post-process uncaught exceptions thrown on the main thread of a GUI application

    - Log or post-process uncaught exceptions thrown any other time

    - Cause system events to be converted into uncaught exceptions for logging or
    post-processing

    - Cause runtime events to be converted into uncaught exceptions for logging or
    post-processing

    - Cause the process to hang instead of terminate, allowing you to attach a debugger
    or other development tool for post-mortem analysis


    To change how uncaught exceptions are handled, follow these steps:


    1. Link your application to the `ExceptionHandling` framework.

    2. `#import <ExceptionHandling/NSExceptionHandler.h>`

    3. Use `[NSExceptionHandler defaultExceptionHandler]` to obtain the singleton
    `NSExceptionHandler` object for your process.

    4. To cause special handling of uncaught exceptions, system, or runtime events,
    logically OR together any combination of constants in Table 14-1 and pass the
    value to `-[NSExceptionHandler setExceptionHandlingMask:]`. See Listing 14-5.

    5. As an alternate to step 4, the exception handling flags can be set in the user
    defaults property `NSExceptionHandlingMask`. See the "User Defaults" section of
    Chapter 26 for more details about user defaults and how a process acquires them.

    6. To individually filter the exception handling enabled in step 4 or 5, create
    an object that implements `-exceptionHandler:shouldHandleException:mask:` and
    `-exceptionHandler:shouldLogException:mask:` and make it the `NSExceptionHandler`''s
    delegate object. All exceptions are first passed to the delegate for inspection.
    The delegate can process the exception, let the `NSExceptionHandler` perform its
    default processing, neither, or both.

    7. To cause the process to hang—rather than terminate—for debugging purposes,
    logically OR together any of the constants in Table 14-2 and pass the value to
    `-[NSExceptionHandler setExceptionHangingMask:]`.


    The best place to set the exception handling behavior is in your application''s
    initialization code. Here, the term "handling" means that `NSExceptionHandler`
    will pass the exception to its delegate for post-processing and optionally log
    its details before continuing. `NSExceptionHandler` doesn''t really do anything
    significant with the exceptions, although your delegate object could.


    Logging or handling top-level exceptions and low-level exceptions in an `NSApplication`—the
    last four options in Table 14-1—should be used only during development. These
    options can cause a tremendous amount of debug output to be sent to the system
    console, which would not be appropriate for a shipping application. Furthermore,
    intercepting, modifying, or ignoring these exceptions can change how the application
    frameworks normally function.


    Your `NSExceptionHandler` delegate object will only be sent the exceptions whose
    logging or handling has been enabled in steps 4 or 5. If you enable the flags,
    but don''t set a delegate object, exceptions are only logged.


    > **Note:** `NSExceptionHandler` will process an exception before the `finally`
    block of your code executes. If system and runtime event handling is not set in
    step 4 or 5, these events are not translated into exceptions. They are processed
    normally, as they would be in the absence of an `NSExceptionHandler`.


    **Table 14-1.** Exception Handling Flags


    | Constant                              | Effect                                                       |

    | ------------------------------------- | ------------------------------------------------------------
    |

    | `NSLogUncaughtExceptionMask`          | Logs uncaught exceptions.                                    |

    | `NSHandleUncaughtExceptionMask`       | Handles uncaught exceptions.                                 |

    | `NSLogUncaughtSystemExceptionMask`    | Turns system events into exceptions
    and logs them.           |

    | `NSHandleUncaughtSystemExceptionMask` | Turns system events into exceptions
    and handles them.        |

    | `NSLogUncaughtRuntimeErrorMask`       | Turns runtime events into exceptions
    and logs them.          |

    | `NSHandleUncaughtRuntimeErrorMask`    | Turns runtime events into exceptions
    and handles them.       |

    | `NSLogTopLevelExceptionMask`          | Logs uncaught exceptions thrown in the
    main run loop of the application. |

    | `NSHandleTopLevelExceptionMask`       | Handles uncaught exceptions thrown in
    the main run loop of the application. |

    | `NSLogOtherExceptionMask`             | Logs all other exceptions thrown in
    the main run loop of the application, which includes caught exceptions. |

    | `NSHandleOtherExceptionMask`          | Handles all other exceptions thrown
    in the main run loop of the application, which includes caught exceptions. |


    You can also cause the `NSExceptionHandler` to "hang" instead of terminate the
    process for certain kinds of exceptions. Set the desired hang conditions by logically
    ORing together any of the constants in Table 14-2 and passing the value to `-[NSExceptionHandler
    setExceptionHangingMask:]`.


    **Table 14-2.** Exception Hanging Flags


