    Like Java, the Cocoa framework provides a set of classes for creating, manipulating,
    encoding, and decoding XML files. While XML-formatted property lists are an expedient
    way to encode very simple values into XML, the NSXML classes can interpret any
    XML- or HTML-formatted data.


    As with Java, Objective-C can digest an entire XML document producing a document
    object model (DOM). Or it can interpret an XML stream incrementally using an event-driven
    parser. While many of the details are different, the overarching interface that
    Java and Objective-C provide for XML


    processing is almost identical.


