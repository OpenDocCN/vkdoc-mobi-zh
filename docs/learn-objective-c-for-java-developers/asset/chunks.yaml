  trans: '

    ### 表 19-3：变更通知字典键值


    | 键 | 值 | 描述 |

    | --- | --- | --- |

    | `NSKeyValueChangeKindKey` | `NSKeyValueChangeSetting`、`NSKeyValueChangeInsertion`、`NSKeyValueChangeRemoval`
    或 `NSKeyValueChangeReplacement` | 描述属性的变化方式。如果属性是简单属性（如整数或对象），则此值为 `NSKeyValueChangeSetting`。其他三个值描述了对集合属性的更改。
    |

    | `NSKeyValueChangeNewKey` | 值对象 | 包含新的属性值，或插入或替换值的数组。仅当请求了 `NSKeyValueObservingOptionNew`
    选项时才包含此项。 |

    | `NSKeyValueChangeOldKey` | 值对象 | 先前的属性值，或移除或替换值的数组。仅当请求了 `NSKeyValueObservingOptionOld`
    选项时才包含此项。 |

    | `NSKeyValueChangeNotificationIsPriorKey` | `YES` | 如果这是通过 `NSKeyValueObservingOptionPrior`
    观察选项请求的变更前通知，则包含此项。 |

    | `NSKeyValueChangeIndexesKey` | `NSIndexSet` | 对于数组集合属性的更改，此 `NSIndexSet` 值包含受插入、移除或替换影响的索引。
    |


    当观察一个原始值或对象指针类型的属性变化时，变更种类始终是 `NSKeyValueChangeSetting`，并且字典中可能会酌情包含旧值和新值。


    当观察的属性是一个对多对象属性时，变更信息会稍微复杂一些。变更被描述为集合中一个或多个对象的插入、移除或替换。`NSKeyValueChangeIndexesKey`
    值列出了集合中受变更影响的索引。`NSKeyValueChangeNewKey` 和 `NSKeyValueChangeOldKey` 值包含一个紧凑的数组，其中包含了在
    `NSKeyValueChangeIndexesKey` 集合中相应索引处插入、移除或替换（视情况而定）的对象。例如，如果从索引 3 和 5 的属性中移除了两个对象，那么
    `NSKeyValueChangeIndexesKey` 将包含集合 {3, 5}，`NSKeyValueChangeOldKey` 将包含在索引 0 处索引
    3 被移除的对象以及在索引 1 处索引 5 被移除的对象，而 `NSKeyValueChangeNewKey` 值将为空，因为没有添加新对象。


    > **注意：** 观察对多属性要求被观察对象实现第 10 章“设计符合 KVC 的类”一节中描述的可变数组属性访问器方法。常规的 `NSMutableArray`
    类并未实现这些方法。如果你的对象有一个 `NSMutableArray *array` 属性，并且你观察该对象的 `@"array"` 属性，那么当数组对象被设置时，你的观察者会收到通知，但当对象被添加或从该数组中移除时，则不会收到通知。像
    `NSArrayController` 这样的类确实实现了此协议，并且被设计为可观察的。


    ### 注销观察者


    当你的观察者想要停止接收属性变更通知时，请向被观察对象发送一条 `-removeObserver:forKeyPath:` 消息，并传入与添加观察者时相同的键值路径。


    对象对其观察者持有弱引用，因此在观察者可以被回收之前，不必移除观察者。然而，如果存在观察者不再需要接收属性变更通知的逻辑节点，它应该将自己移除。另一方面，仅仅是作为某个对象的观察者，并不会阻止观察者本身被回收；观察者需要至少有一个强引用。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### 使你的类符合 KVO 标准


    当一个对象属性符合键值观察标准时，意味着可以使用键值观察来可靠地观察该属性。要符合 KVO 标准，对象的属性必须：


    - 符合键值编码标准

    - 在被设置时发送键值观察通知

    '
- fmt: '如果您为标准属性实现 getter 和 setter 方法，并通过发送 setter 消息来更改该属性，那么您的属性将 100% 符合 KVO 规范。


    然而，在某些情况下，您的属性将不符合 KVO 规范。这些情况要求您直接向类中添加 KVO 支持代码——假设您希望使该属性可观察。别担心，代码并不复杂。添加什么代码、在哪里添加以及在什么情况下添加，将在接下来的几个部分中描述。以下是属性不符合
    KVO 规范的主要原因：


    - 该属性在其 setter 方法之外使用直接赋值（例如，`object->property = 1`）进行设置。

    - 该属性是其他属性的组合。一个典型的例子是只读的 `fullName` 属性，它由 `firstName` 和 `lastName` 属性拼接而成。

    - 该属性因其他状态变化而改变。例如，一个定义为 `return ([lock condition] != RUNNING)` 的 `isFinished`
    属性。


    直接赋值绕过了 KVO 拦截对象 setter 方法并注入必要通知的能力。要解决此问题，请手动发送 KVO 通知，或在更改属性值时重写代码以使用该属性的 setter
    方法。


    通过将依赖关系告知 Key-Value Observing 框架，可以使依赖属性符合 KVO 规范。KVO 提供了特殊方法，您可以在类中描述依赖键。一旦实现，KVO
    将知道更改 `firstName` 或 `lastName` 属性也会更改 `fullName` 属性，并发送所有预期的通知。


    因其他状态变化而自发更改的属性通常需要结合手动 KVO 通知或依赖属性来解决。


    除了仅仅作为行为良好的 KVO 参与者外，还有其他原因可能促使您直接向类中添加 KVO 支持代码。其中一个原因是性能。Key-Value Observing
    通知有点“笨”。每当调用 setter 方法时，KVO 都会通知其观察者——即使新值与旧值相同。如果这导致性能或递归问题，您可以实现自己的 KVO 通知，仅在您认为适当时才发送。


    而且，毫无疑问，总会出现上述未描述的情况，只能通过实现您自己的 KVO 支持来解决。这些特殊情况不仅涉及向类中添加手动 KVO 通知代码，您可能还需要告诉
    KVO 框架不要执行其正常服务，否则两者会互相干扰。最后，需要注意的是，这些解决方案经常重叠；解决特定的 KVO 问题通常有多种方法。在决定最适合您情况的解决方案之前，请阅读接下来的几个部分。


    ## 发送手动 KVO 通知


    每当可观察属性发生更改时，您需要确保发送正确的 KVO 通知消息。在符合 KVC 规范的 setter 方法中，这会自动发生。在以下情况下，您可能需要手动发送
    KVO 通知：


    - 该属性是只读的，并且没有 setter 方法。

    - 该属性在 setter 方法之外使用直接赋值进行设置。

    - 该属性是一个合成值，从其他属性值计算得出。


    最直接的方法是在可能修改属性的代码之前和之后，手动触发所需的通知，发送 `-[NSObject willChangeValueForKey:]` 和 `-[NSObject
    didChangeValueForKey:]` 消息。这些消息通知 KVO 框架即将发生某些可能导致属性更改的事情。KVO 框架负责向任何观察者发送适当的通知。以下代码清单
    19-3 在一个简单的 `Budget` 类中演示了这一点。'
  raw: 'If you implement standard getter and setter methods for your property and
    change the property by sending setter messages, your property will be 100 percent
    KVO compliant.


    There are, however, some circumstances where your property won’t be KVO compliant.
    These situations require that you add KVO support code directly to your class—assuming
    that you want to make the property observable. Don’t worry; the code isn’t complex.
    What code you add, where, and under what circumstances is described in the next
    few sections. Here are the primary reasons why a property would not be KVO compliant:


    • The property is set using direct assignment (i.e., object->property=1) outside
    its setter method.


    • The property is a combination of other properties. A read-only fullName property
    that’s generated by concatenating the firstName and lastName properties is the
    canonical example.


    • The property changes as a consequence of some other state change. For example,
    an isFinished property that’s defined as return ([lock condition]!=RUNNING).


    Direct assignment circumvents KVO’s ability to intercept the setter methods of
    the object and inject the prerequisite notifications. To fix this, send KVO notifications
    manually or rewrite the code to use the property’s setter method when changing
    its value.


    Dependent properties can be made KVO compliant by communicating the dependencies
    to the Key-Value Observing framework. KVO provides special methods so you can
    describe the dependent keys in your class. Once implemented, KVO will know that
    changing either of the firstName or lastName properties also changes the fullName
    property, and it will send all of the expected notifications.


    Properties that spontaneously change as a result of some other state change will
    usually require a solution that is some combination of manual KVO notifications
    or dependent properties.


    In addition to simply being a well-behaved KVO participant, there are other reasons
    why you might want to add KVO support code directly to your class. One reason
    is performance. Key-Value Observing notifications are a bit “dumb.” Whenever the
    setter method is called, KVO notifies its observers—even if the new value is the
    same as the old one. If this causes performance or recursion problems, you can
    implement your own KVO notifications that are only sent when you deem appropriate.


    And there will also, undoubtedly, arise a situation not described above that can
    only be resolved by implementing your own KVO support. These special cases involve
    not only adding manual KVO


    notification code to your class, but you may also need to tell the KVO framework
    not to perform its normal services, or else one will end up stepping on the other.
    Finally, it should be noted that these solutions frequently overlap; there’s often
    more than one way to solve a particular KVO problem. Read through the next few
    sections before deciding on the solution that’s best for your situation.


    Sending Manual KVO Notifications


    Whenever an observable property is changed, you need to ensure that the correct
    KVO notification messages are sent. In a KVC-compliant setter method, this happens
    automatically. You may need to manually send KVO notifications when


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ OBSERVER PATTERN


    • The property is read-only and has no setter method.


    • The property is set using a direct assignment, outside the property’s setter
    method.


    • The property is a synthesized value, calculated from other property values.


    The most direct approach is to trigger the required notifications manually by
    sending


    -[NSObject willChangeValueForKey:] and -[NSObject didChangeValueForKey:] messages
    before and after the code that might modify the property. These messages inform
    the KVO framework that something is about to happen which may cause the property
    to change. The KVO framework takes care of sending the appropriate notifications
    to any observers. Listing 19-3 demonstrates this in a simple Budget class.'
