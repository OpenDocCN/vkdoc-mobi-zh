    发送消息 `-updateListenersUsingSelector:@selector(startingChat:)` 会向每个实现了 `-startingChat:`\
    \ 方法的监听器发送通知。这种基于对象实现的方法来识别对象角色的做法被称为非正式协议，在第 5 章中有更详细的描述。\n\n## 测试类的成员关系\n\n\
    Java 的 `instanceof` 运算符用于测试一个对象是否是某个类的实例、该类的子类、实现了某个接口或该接口的子接口。秉持其极简主义的传统，**Objective-C**\
    \ 语言本身没有成员运算符。相反，类框架在根类 `NSObject` 中实现了表 10-1 列出的方法。\n\n**表 10-1.** 类和协议成员关系测试\n\
    \n| 消息 | 测试内容 |\n| --- | --- |\n| `-isKindOfClass:(Class)class` | 对象是该类的实例，或是该类的子类的实例。\
    \ |\n| `-isMemberOfClass:(Class)class` | 对象是某个特定类的实例。 |\n| `-conformsToProtocol:(Protocol*)protocol`\
    \ | 对象遵循该协议，或继承自遵循该协议的类。 |\n\n**Objective-C** 在内部机制和语法上，对类成员关系和协议（接口）采纳的处理方式是不同的。因此，没有与\
    \ `instanceof` 运算符完全等价的单一方法。测试类成员关系时使用 `-isKindOfClass:`，测试协议采纳时使用 `-conformsToProtocol:`。代码清单\
    \ 10-3 说明了每种情况应使用的不同方法和语法。特定类的 `Class` 对象通常通过向该类本身或该类的任何实例发送 `-class` 消息来获得。使用\
    \ `@protocol()` 指令生成协议标识符常量。\n\n**代码清单 10-3.** 测试并强制转换类成员关系和协议采纳\n\n**Java**\n\
    \n```\nObject object = …\nif (object instanceof MyClass) {\n    MyClass myObject\
    \ = (MyClass)object;\n    …\n}\nif (object instanceof MyInterface) {\n    MyInterface\
    \ myObject = (MyInterface)object;\n    …\n}\n```\n\n**Objective-C**\n\n```\nid\
    \ object = …\nif ([object isKindOfClass:[MyClass class]]) {\n    MyClass *myObject\
    \ = object;\n    …\n}\nif ([object conformsToProtocol:@protocol(MyProtocol)])\
    \ {\n    id<MyProtocol> myObject = object;\n    …\n}\n```\n\n## 键值编码\n\n正如本章开头所提到的，键值编码本身并非一种自省技术；它无法描述对象支持哪些属性。然而，KVC\
    \ 与自省紧密相连，以至于很难将其归入其他主题。\n\nKVC 是一个强大的工具，是许多其他技术（如键值观察、绑定和脚本）的基础。在实现你自己的属性自省解决方案之前，首先要考虑\
    \ KVC 是否已经解决了你的问题。将你的属性设计为与 KVC 兼容，能使你的对象与其他技术具有最大的互操作性。本节将解释键值编码的基础知识，以及让你的类兼容\
    \ KVC 的技术。\n\n简单来说，键值编码允许你使用标识属性名称的字符串（键）来访问（获取和设置）对象的属性。例如，对象的 `name` 属性可以通过\
    \ `[object setValue:@\"Earnest\" forKey:@\"name\"]` 来设置，这等效于 `[object setName:@\"\
    Earnest\"]`。如果 KVC 仅能如此，其用途将十分有限。当属性名称被组合成路径并应用于集合时，KVC 才真正变得有趣起来。\n\n最好的解释是举个例子。代码清单\
    \ 10-4 展示了可能构成一个学校管理程序的对象。它定义了 `Person`、`Student`、`Parent`、`Teacher` 和 `Period`\
    \ 类。`Student`、`Parent` 和 `Teacher` 对象都是 `Person` 的子类。\n\nRachael 是其中一位老师，她正在计划一次家庭实地考察，将包括她班级里的所有学生，以及他们的兄弟姐妹和继兄弟姐妹。她需要她班级里学生及其兄弟姐妹的名字。\n\
    \n**代码清单 10-4.** 使用 KVC 访问对象属性\n\n**Java**\n\n```\npackage com.apress.java.school;\n\
    \npublic class Person {\n    public String name;\n}\n\npublic class Parent extends\
    \ Person {\n    public ArrayList<Student> children;\n}\n\npublic class Teacher\
    \ extends Person {\n    public ArrayList periods;\n    public Period homeroom;\n\
    }\n\npublic class Student extends Person {\n    public ArrayList<Parent> parents;\n\
    \    public ArrayList classes;\n    public Period homeroom;\n}\n\npublic class\
    \ Period {\n    public ArrayList<Student> students;\n    public Teacher teacher;\n\
    }\n\n// 从 Rachael 班级的学生中收集兄弟姐妹的名字\nClass Teacher teacher = School.teacherWithName(\"\
    Rachael\");\nPeriod homeroom = teacher.homeroom;\nHashSet siblingNames = new HashSet();\n\
    for ( Student student : homeroom.students ) {\n    for ( Parent parent : student.parents\
    \ ) {\n        for ( Student child : parent.children ) {\n            if (!siblingNames.contains(child.name))\
    \ {\n                siblingNames.add(child.name);\n            }\n        }\n\
    \    }\n}\nreturn siblingNames;\n```\n\n**Objective-C**\n\n```\n@class Period;\n\
    \n@interface Person : NSObject {\n    NSString *name;\n}\n@end\n\n@interface Parent\
    \ : Person {\n    NSMutableArray *children;\n}\n@end\n\n@interface Teacher : Person\
    \ {\n    NSMutableArray *periods;\n    Period *homeroom;\n}\n@end\n\n@interface\
    \ Student : Person {\n    NSMutableArray *parents;\n    NSMutableArray *classes;\n\
    \    Period *homeroom;\n}\n@end\n\n@interface Period : NSObject {\n    NSMutableArray\
    \ *students;\n    Teacher *teacher;\n}\n@end\n\n// 从 Rachael 班级的学生中收集兄弟姐妹的集合\n\
    Teacher *rachael = [School teacherWithName:@\"Rachael\"];\nreturn [rachael valueForKeyPath:\n\
    ```\n\n"
- fmt: '`@"homeroom.students.@distinctUnionOfArrays.parents.@unionOfArrays.children.name"`;
    The Java implementation uses a traditional procedural solution to iterate through
    the students in Rachael’s class, their parents, and their children, and assemble
    a set of unique names. The Objective-C solution leverages the power of KVC. Each
    identifier in the path addresses a property of the receiver or preceding object.
    Properties that are collections of objects apply the remainder of the path to
    each item in the collection, assembling the results into a new collection. Thus,
    the path `children.name` returns a collection populated with the `name` property
    of each `Student` object in the `children` property.


    Special path operators, such as `@distinctUnionOfArrays`, perform transformations
    or calculations on the results. In this example, the return value is reduced to
    a single array of unique objects, eliminating any duplicate names and collections
    of collections.


    More importantly, a list view object on the screen, or a scripting property, could
    be bound using that same path. The list would display, or the scripting property
    would return, the result of the search without writing a single line of code.


    ## Using Key-Value Coding


    Using Key-Value Coding is straightforward. The root `NSObject` class defines the
    `-valueForKey:(NSString*)key` and `-valueForKeyPath:(NSString*)path` methods.
    Send either of these methods to retrieve an object’s property value. Mutable values
    can be set by sending either `-setValue:(id)value forKey:(NSString*)key` or `-setValue:(id)value
    forKeyPath:(NSString*)path`.


    A key is a single property name, while a key path may be a simple property name
    or a complex path of multiple property names and operations. Primitive property
    values are automatically converted to and from `NSNumber` or `NSValue` objects.


    Table 10-2 lists some of the KVC operations implemented by the Cocoa framework.
    An operator transforms the result of the path that follows the operator. All of
    the operators in Table 10-2 transform a collection (set or array) of values.


    **Table 10-2.** Key-Value Coding Path Operators


    | Operator | Results |

    | --- | --- |

    | `@count` | Count of objects |

    | `@avg` | Numeric average of values |

    | `@max` | Largest value in a collection |

    | `@min` | Smallest value in a collection |

    | `@sum` | Numeric sum of the values in a collection |

    | `@distinctUnionOfArrays` | Single array of unique objects from a collection
    of arrays |

    | `@distinctUnionOfObjects` | Array of unique objects |

    | `@distinctUnionOfSets` | Single set of unique objects from a collection of sets
    |

    | `@unionOfArrays` | Single array of objects from a collection of arrays |

    | `@unionOfObjects` | Single array of objects |

    | `@unionOfSets` | Single set of objects from a collection of sets |


    You will most likely use KVC indirectly when working with technologies like Key-Value
    Observing, binding, and scripting. These all use KVC paths to identify the property
    being observed, bound, or scripted. For your objects to work with these technologies,
    you’ll want them to be KVC compliant.


    ## Designing KVC-Compliant Classes


    Most properties you define will be KVC compliant without any additional work.
    At a minimum, simply declaring an instance variable—like `NSString *name` in Listing
    10-4—defines a KVC-compliant property. KVC will use instance variable introspection
    to find and use the property.


    If you follow the practice of using `@property` declarations, these too will be
    KVC compliant. Just avoid non-standard getter and setter names. KVC prefers accessor
    methods, and will use them over an instance variable with the same name. If you
    implement your own accessor methods, they must follow the standard getter and
    setter patterns. Table 10-3 lists the acceptable accessor method names for use
    with KVC. Replace the italicized *Property* in each with the actual name of your
    property (paying attention to case). Implement exactly one getter for immutable
    properties, and one of the getters and a setter for mutable properties.


    **Table 10-3.** KVC-Compliant Single Value Accessor Names


    | Method Name | Role |

    | --- | --- |

    | `-property` | Getter |

    | `-getProperty` | Getter |

    | `-isProperty` | Boolean getter |

    | `-setProperty:` | Setter |


    Properties that are arrays or sets (i.e., `@property NSArray *teachers` or `@property
    NSSet *teachers`) are automatically Key-Value Coding–compliant. To implement a
    KVC-compliant collection property that is not one of the standard array or set
    types, you will need to implement a number of special methods. To implement a
    custom array property, implement these methods:


    - `-(unsigned int)countOfProperty`


    Implement at least one of:

    - `-(Class*)objectInPropertyAtIndex:(NSUInteger)index`

    - `-(NSArray*)propertyAtIndexes:(NSIndexSet*)indexes`


    For improved getter performance, you can optionally implement:

    - `-(void)getProperty:(id*)array range:(NSRange)range`


    Mutable properties must implement at least one of the following:

    - `-(void)insertObject:(Class*)object inPropertyAtIndex:(NSUInteger)index`

    - `-(void)insertProperty:(NSArray*)objects atIndexes:(NSIndexSet*)indexes` (better
    performance)


    Mutable properties must implement at least one of the following:

    - `-(void)removeObjectFromPropertyAtIndex:(NSUInteger)index`

    - `-(void)removePropertyAtIndexes:(NSIndexSet*)indexes` (better performance)


    For improved performance, a mutable property may optionally implement any of the
    following:

    - `-(void)replaceObjectInPropertyAtIndex:(NSUInteger)index withObject:(Class*)object`

    - `-(void)replacePropertyAtIndexes:(NSIndexSet*)indexes withProperty:(NSArray*)objects`


    In each of these methods, the italicized *Property* name is replaced with the
    name of the property being defined, as in `-(NSUInteger)countOfTeachers`. Note
    that if you choose a singular property name, consistently use the singular—not
    the plural—form when constructing KVC-compliant method names. Replace *Class*
    with the class of the property object, as in `-(Teacher*)objectInTeachersAtIndex:(NSUInteger)index`.


    To implement a custom set property, implement these methods:


    - `-(NSUInteger)countOfProperty`

    - `-(NSEnumerator*)enumeratorOfProperty`

    - `-(Class*)memberOfProperty:(Class*)object`


    Mutable properties must implement at least one of the following:

    - `-(void)addPropertyObject:(Class*)object`

    - `-(void)addProperty:(NSSet*)objects`


    Mutable properties must implement at least one of the following:

    - `-(void)removePropertyObject:(Class*)object`

    - `-(void)removeProperty:(NSSet*)objects`


    For improved performance, a mutable property may optionally implement:

    - `-(void)intersectProperty:(NSSet*)set`


    ## Custom Key Values


    In addition, named properties can be implemented programmatically by overriding
    `-(id)valueForUndefinedKey:(NSString*)key` and `-(void)setValue:(id)value forUndefinedKey:(NSString*)key`.
    These message are sent to an object whenever an attempt is made to get or set
    a property that KVC doesn’t recognize. Your code can translate the name or synthesize
    a value.


    KVC also defines a standard for validating properties. Consult the Key-Value Coding
    Programming Guide published by Apple for additional details.


    ## Inspecting Classes


    This section describes the primary functions for obtaining information about a
    Class. The next few sections will describe how to perform the most common and
    useful introspections. More advanced developers are encouraged to read the Objective-C
    2.0 Runtime Reference published by Apple.


    Just as in Java, advanced introspection begins with the Class object. Class introspection
    in Java is neatly and logically organized into a class hierarchy starting with
    the `java.lang.Class` class, and working down through `java.lang.reflect.Method`,
    `java.lang.reflect.Field`, and so on.'
