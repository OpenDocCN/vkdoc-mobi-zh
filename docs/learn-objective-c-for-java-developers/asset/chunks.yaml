- fmt: '# CHAPTER 4 ■ CREATING AN XCODE PROJECT


    **Figure 4-3.** *Garbage Collection Build Setting*


    Feel free to explore the other build settings while you''re here (clear the search
    field). Build settings are organized into a three-dimensional matrix of values.
    The first two dimensions are formed by a hierarchical tree of build settings:
    one set for the project, one set for each target, and a limited set for each file.
    Each entity can define or override any build setting. Target build settings override
    those in the project, and file settings override those in the target. Before establishing
    a build setting, decide if it applies to the entire project, a specific target,
    or just one file. The third dimension is formed by *build configurations*. Each
    configuration contains a completely independent set of build settings for each
    entity in the project. The Cocoa application template comes with two build configurations:
    `Debug` and `Release`. The `Debug` build configuration has settings that include
    debugging symbols and disable most code optimizations, suitable for debugging
    and profiling. The `Release` build configuration strips symbol information and
    turns on most code optimizations. You can create your own build configurations,
    but do so sparingly as it multiplies the build settings you must maintain.


    ## Designing the Application


    Now let''s move on to the application design. This application will present a
    graphical user interface, so it adapts the Model-View-Controller (MVC) design
    pattern. Our data model is simple – a string of letters and a list of words that
    can be spelled – provided by a `string` and an `NSArray` object. The `ScrapWordsController`
    class will be our main controller object. The view objects are all subclasses
    of `NSView`, provided by the `AppKit` framework.


    The application will present a window with four components, as shown in Figure
    4-4. An input field lets the user type the letters they have. An output view lists
    the words that can be spelled with those letters. The interface is simple; you
    type letters, you see words.


    **Figure 4-4.** *Scrapbook Words User Interface*


    To get the design started, create a `ScrapWordsController` class. This will be
    our primary controller object. Click on the `Classes` group to select it. Either
    `control+click` (or right-click) on the group and choose **Add** > **New File…**,
    or choose **File** > **New File…** from the main menu. In the New File assistant,
    choose the **Objective-C class** template from the `Cocoa` group. Give it the
    name `ScrapWordsController.m` and have it create a matching `ScrapWordsController.h`
    file. Click the **Finish** button and the assistant will create the new files
    and add them to your project.


    The `ScrapWordsController` object will need to do the following:

    1. Get the letters the user types from the input text field.

    2. Clear the output list whenever the user types something new.

    3. Search a list of words for those that can be spelled using those letters.

    4. Add each word found to the output list for the user to see.


    Listing 4-1 shows the initial version of the `ScrapWordsController.h` file. The
    version of `ScrapWordsController.h` in the finished project has one additional
    instance variable, which you can ignore for now. It has a `letters` property that
    holds the string of letters entered by the user. The `NSMutableArray` object will
    contain the list of words that can be spelled. The `wordsController` variable
    will reference an `NSArrayController` object that does all of the work needed
    to bind the data model to the view object that will display the list words – more
    about that later. Finally, methods are defined to clear and add one word to the
    output display list, respectively.


    **Listing 4-1.** *Initial Version of ScrapWordsController Interface*


    ```

    @interface ScrapWordsController : NSObject {


    NSString *letters;


    NSMutableArray *words;


    NSArrayController *wordsController;


    }


    @property (assign) NSString *letters;


    @property (assign) IBOutlet NSArrayController *wordsController;


    - (void)removeWords;


    - (void)foundWord:(NSString*)word;


    @end

    ```


    ## Designing the User Interface


    To get this to work, the application will need an interface window with an input
    text field and an output list. The user interface will be developed using Interface
    Builder. Interface Builder is an interface design tool that works closely with
    Xcode. Interface Builder edits NIB documents. A NIB document contains an archived
    (serialized) object graph. You can create whatever objects you want in a NIB document.
    Objects in the NIB are created, configured, and connected together using point-and-click
    design tools. When the application runs and loads a NIB document, the objects
    are instantiated, their properties set, and inter-object references are connected
    together. NIB documents are stored as resource files in the application''s bundle.


    **Note** Historically, Xcode projects would include a binary `.nib` document that
    Interface Builder would edit directly. Xcode 3 introduced the `.xib` document
    type, a more robust and flexible XML-based Interface Builder document. An `.xib`
    document is a source document that is compiled into a binary `.nib` document when
    the application is built. I refer to all Interface Builder documents generically
    as NIB documents because that''s the language used by Cocoa developers and in
    the documentation, and they are what will ultimately be loaded by your application.


    Double-click on the `MainMenu.xib` document in the project window; you''ll find
    it in the `Resources` group. This will launch Interface Builder and open the project''s
    `MainMenu` NIB document.


    Interface Builder presents the contents of the `MainMenu` NIB document in a window
    as a hierarchical collection of objects, as shown in Figure 4-5. Top-level visual
    objects in the NIB, like the window and menu bar, are also displayed separately.
    Content can be edited in either one.


    **Figure 4-5.** *MainMenu NIB Document and Top-Level Visual Containers*


    Creating the user interface is as easy as dragging and dropping. Open the Library
    window (**Tools** > **Library**). In the **Objects** tab, find the **Input & Values**
    group under **Views & Cells**. Drag two Labels and a Text Field from the Library
    window into the application''s window, as shown in Figure 4-6. Arrange their position.
    Locate the **Data Views** group and drag a Table View into the window. Resize
    and arrange the objects and window until these objects are in the same position
    as those in Figure 4-4. Edit the labels by double-clicking on them.


    **Figure 4-6.** *Adding View Objects to the Window*


    Properties of objects are edited using a variety of inspector palettes. Choose
    **Tools** > **Inspector**, then select the input text field. The palette presents
    the properties of the selected object (or objects).


    To edit the properties of the Table View object, you must first select it. In
    the Main Menu document window, dig through the nested hierarchy of view objects
    to select the Table View objects, as shown in Figure 4-7. An alternate method
    is to click once on the view in the window. This selects the top level Scroll
    View object. Clicking on the interior again drills down into the view and selects
    the Table View object. Clicking again would select a column within the table,
    and so on.


    **Figure 4-7.** *Editing the Table View Attributes*


    Edit the properties of the Table View: set the number of columns to 1. Turn off
    headers, reordering, and resizing. Turn off column selection.'
