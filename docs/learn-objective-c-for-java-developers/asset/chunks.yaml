- fmt: "# C Labels\n\nC labels, unlike Java, are not limited to jumping to the end\
    \ of code blocks. A `goto` statement can jump forward or backward in the code\
    \ stream, and into or out of code blocks at any level. It’s possible to construct\
    \ `for`, `while`, `do`, and `case` statements using only `label`, `if`, and `goto`\
    \ statements—although I don’t recommend it.\n\nUse `goto` statements sparingly,\
    \ if ever. They can solve very tangled code flow problems, but should be used\
    \ only as a last resort. They are easy to abuse, often defeat code optimization,\
    \ and can make execution order difficult to analyze.\n\n## Summary\n\nThis chapter\
    \ was designed to give you just enough C that you can begin programming in Objective-C.\n\
    \nProgramming in Objective-C liberates you from many of the arcane and mundane\
    \ aspects of programming in C. Using Objective-C classes you can largely avoid\
    \ C strings, memory management, arrays, and a raft of other constructs.\n\nThis\
    \ chapter was not, by any stretch of the imagination, a comprehensive C tutorial.\
    \ The C language is vast—even more so than Java, given that one of Java’s goals\
    \ was to create a simpler and more concise version of C.\n\nWhile this abbreviated\
    \ introduction will give you enough knowledge that you can start programming in\
    \ Objective-C, you will eventually encounter more complex C code or need to interface\
    \ with C libraries. That will require a deeper understanding of the language.\
    \ I highly recommend you procure a book on standard C for further reading and\
    \ future reference.\n\nNow that you understand the salient differences between\
    \ C and Java, you can begin to explore the additional syntax that defines Objective-C.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# Chapter 3: Welcome to\
    \ Objective-C\n\nThis chapter describes the core Objective-C language and how\
    \ its syntax differs from Java. Functional differences and more esoteric language\
    \ features are covered in later chapters.\n\nObjective-C enhances C by adding\
    \ an additional layer of syntax. It does not redefine C, or limit its capabilities,\
    \ in any meaningful way. Objective-C syntax is easily recognized. If Objective-C\
    \ had a logo, it would probably be the “at” sign (`@`); all Objective-C directives,\
    \ including string constants, begin with `@` (as in `@interface`, `@selector()`,\
    \ `@\"string\"`). Other notable traits are the use of square brackets (`[...]`)\
    \ to invoke methods and very descriptive method names.\n\nBut if you ignore these\
    \ peculiarities, you won’t find any significant discord between the two. Both\
    \ are object-oriented languages that let you define classes, declare instance\
    \ variables and methods, instantiate instances of those classes, inherit from\
    \ subclasses, override methods, invoke methods, pass parameters, and return values.\
    \ Good Objective-C programming embraces the same design patterns and practices\
    \ that you are familiar with in Java.\n\n## Defining an Objective-C Class\n\n\
    Objective-C classes are defined in an `@interface` directive. Its implementation\
    \ is defined in an `@implementation` directive. This differs from Java’s single\
    \ class definition, which defines both the class’s interface and its implementation,\
    \ as shown in Listing 3-1.\n\n**Listing 3-1. Objective-C Class Definition**\n\n\
    **Java**\n\n```\nimport com.apress.java.SuperClass;\n\npublic class NewClass extends\
    \ SuperClass\n{\n    int instanceVariable;\n\n    Object method( )\n    {\n  \
    \      return (null);\n    }\n\n    Object method(Object param )\n    {\n    \
    \    return (null);\n    }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**Objective-C**\n\n```\n#import \"SuperClass.h\"\n\n@interface NewClass : SuperClass\
    \ {\n    int instanceVariable;\n}\n\n-method;\n-methodWithParameter:param;\n\n\
    @end\n\n@implementation NewClass\n\n-method\n{\n    return (nil);\n}\n\n-methodWithParameter:param\n\
    {\n    return (nil);\n}\n\n@end\n```\n\nListing 3-1 shows the definition of the\
    \ `NewClass` class in Java and an equivalent class in Objective-C. The `@interface`\
    \ part of a class definition is typically in a header (`.h`) file for inclusion\
    \ by other modules, while the `@implementation` portion is in a source (`.m`)\
    \ file. See the “`#include` and `#import`” section of the previous chapter if\
    \ you need a refresher on C source file organization.\n\nThe `@interface` portion\
    \ of a class declaration has two parts. The first part contains the instance variable\
    \ declarations surrounded by braces. This portion is similar to a C struct declaration.\
    \ Following the variable declaration are the class’s method prototypes. The hyphen\
    \ prefix indicates that the method is an instance method. A plus prefix denotes\
    \ a class method, which is similar to a `static` method in Java.\n\nThe `@implementation`\
    \ directive contains the actual code for the methods that were described in the\
    \ `@interface` section. It is an error to declare a method and not implement it,\
    \ although the opposite is permitted. One of Java’s more elegant design features\
    \ is that a class file defines both a class’s interface and its implementation.\
    \ In Objective-C, it’s the programmer’s responsibility to keep the interface and\
    \ the implementation in agreement.\n\nBoth the `@interface` and `@implementation`\
    \ sections are terminated with an `@end` directive.\n\nClass inheritance works\
    \ the same way it does in Java. The class `NewClass` inherits all of the instance\
    \ variables and methods of the class `SuperClass`. Declaring a method in `NewClass`\
    \ with the same name as a method inherited from `SuperClass` overrides the inherited\
    \ method.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n> **Caution**\
    \ Always declare the superclass in the `@interface` declaration, even when the\
    \ superclass is `NSObject`.\n\n`NSObject` is the logical root class in the Cocoa\
    \ framework, functionally equivalent to Java’s `Object` class. It is not, however,\
    \ the root class of Objective-C. Objective-C’s actual root class, `Object`, is\
    \ so primitive that a direct subclass is essentially useless. It is unlikely that\
    \ you will ever want to create a direct subclass of `Object`.\n\n## Object Pointers\n\
    \nA variable containing a pointer to an Objective-C object is an object pointer\
    \ (reference) or object identifier. Both are equivalent to a Java object reference.\n\
    \nListing 3-2 shows the two ways of declaring an object pointer. An object pointer\
    \ can be declared as a pointer to a specific class or as a generic object identifier\
    \ (`id`). Both contain a pointer to the memory address of an object. The difference\
    \ is in how they are treated by the compiler.\n\n**Listing 3-2. Object Pointer\
    \ Declarations**\n\n```\nSpecificClass *specificObject;\nid anyObject;\n```\n\n\
    > **Note** Like Java, Objective-C does not permit a variable to contain the contents\
    \ of an object, only a pointer (reference) to an object. The declaration `SpecificClass\
    \ object` is invalid. This is one case where Objective-C objects and C structures\
    \ differ; a variable can contain an entire C structure or a pointer to a C structure,\
    \ but you can only declare a pointer to an Objective-C object.\n\nA pointer to\
    \ a specific class acts mostly like a Java object reference. The compiler assumes\
    \ that the pointer refers to an object of that class, or a subclass of that class.\
    \ It will warn you if you attempt to invoke methods that are not defined or inherited\
    \ by that class. It will only allow you access to instance variables defined or\
    \ inherited by that class. The pointer is implicitly compatible with a pointer\
    \ to any of its superclasses, but not with a pointer to a subclass.\n\nThe special\
    \ object identifier type (`id`) is a non-specific object pointer (reference).\
    \ It is not the equivalent of a pointer to a base class object, e.g. `NSObject\
    \ *obj` (`Object obj`). The compiler assumes that a variable of type `id` could\
    \ be any class. The compiler will permit you to invoke any method from any class\
    \ that’s been defined. An object identifier can be assigned to any kind of object\
    \ pointer, or from any kind of object pointer, with no compiler warning. You cannot\
    \ use an object identifier to directly access an object’s instance variables."
