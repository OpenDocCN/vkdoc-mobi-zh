    ### Connections


    In Interface Builder terminology, a relationship between two objects in a `NIB`
    document is called a connection. There are three types of connections: outlets,
    actions, and bindings.


    #### Outlets


    An outlet is nothing more than an object reference. Outlets allow you to set object
    references in Interface Builder using graphical design tools. Any object pointer
    property can be an outlet. If you include the keyword `IBOutlet` in your instance
    variable declaration, as shown in Listing 20-1, Interface Builder will automatically
    recognize it as an outlet and let you set the variable in the `NIB`. You can also
    manually declare outlets by editing a class’s definition in Interface Builder’s
    Identity Inspector palette, but the `IBOutlet` method is preferred and has the
    advantage of documenting your outlets in your source file.


    **Listing 20-1.** Interface Builder Outlet Declaration


    ```

    @interface TTTDocument : NSDocument {


    TicTacToeGame *game;


    NSString *gameOutcome;


    IBOutlet ChalkboardView *chalkboardView;


    }

    ```


    In the `TicTacToe` project, the `TTTDocument` object needs a reference to the
    `ChalkboardView` object that displays the `Tic Tac Toe` game. To make the connection
    in Interface Builder requires two steps: First, declare the outlet variable as
    an `IBOutlet` in `TTTDocument`’s `@interface`, as shown in Listing 20-1.


    Then open the `TTTDocument` `NIB` document, select the `TTTDocument` object, and
    in the Connections Inspector drag the outlet’s connection dot to the `ChalkboardView`
    object, as shown in Figure 20-6.


    ***Figure 20-6.** Connecting an outlet in Interface Builder* 363


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    When the `NIB` is loaded, the `chalkboardView` property of `TTTDocument` will
    be set with the pointer to the newly created instance of `ChalkboardView`. This
    is functionally identical to writing the following code:


    ```

    document.chalkboardView = [ChalkboardView new];

    ```


    Making connections is such a common task in Interface Builder that there are several
    shortcuts:


    - `Right/Control-Click` on an object to bring up a pop-up outlet inspector panel.
    Set or break any connection just as you would with the Inspector palettes.

    - `Right/Control-Drag` from the object with the outlet to the object you want
    it connected to. A pop-up outlet completion panel will appear. Click the outlet
    you want to set.

    - When dragging between objects, you can start or finish using either the symbolic
    object in the `NIB` document window or its visual representation in any other
    window.


    #### Actions


    The second kind of connection is an action. An action is an Objective-C message
    sent to an object when some event occurs. An action is defined by a pair of properties
    that form an informal protocol: an action property of type `SEL` that determines
    the Objective-C message to send, and a target property of type `id` that determines
    the recipient. Action messages are sent to the recipient, typically a controller
    object, when “something” happens. What defines “something” is left to the discretion
    of the view object, but it’s typically a mouse click (buttons, check boxes, menu
    items), editing event (pressing return or tabbing out of an input text field),
    or a keyboard shortcut (menu items).


    The receiver of the action must implement a method to receive the message. The
    form of the message must look like this:


    ```

    - (IBAction)playForPlayer:(id)sender;

    ```'
