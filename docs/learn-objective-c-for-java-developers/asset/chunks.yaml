- fmt: '# 文件系统基础


    每个 Objective-C 进程都有一个 `NSFileManager` 类的单例实例，通过发送 `[NSFileManager defaultManager]`
    获得。`NSFileManager` 实现了大多数全局文件系统方法。本章尽可能提供常见文件系统任务的 Objective-C 解决方案，但某些有用的功能只能通过
    Cocoa、Core Services 或 BSD 框架中的 C 函数获得。


    Java 虚拟机可以托管在各种计算平台上，这些平台具有不同的底层文件系统。因此，Java 文件 API 往往是通用的，并尽可能少做假设。相比之下，Objective-C
    和 BSD API 明确假设存在 POSIX 兼容的文件系统。在 Objective-C 中，你不会找到与 `java.io.File.pathSeparatorChar`
    等价的变量。Objective-C 中的所有文件和目录路径都是 POSIX 路径，路径组件分隔符始终是单个 `''/''` 字符。Core Services
    框架主要假定 HFS+ 文件系统，尽管这主要是为了与遗留代码兼容，因为大多数 HFS+ 文件说明符和数据结构都会被直接转换为 BSD 调用。


    虽然编程接口明确假设存在 POSIX 文件系统，但底层文件服务框架在如何将文件系统 API 调用转化为实际操作方面提供了很大的自由度。最终，所有文件系统调用都会对卷（物理存储设备的逻辑分区）的内容进行某些更改。该卷的格式可能差异很大。HFS+
    卷格式是 Mac OS X 操作系统的原生格式，但 BSD 文件系统框架可以很好地处理 UFS 卷、Samba 卷、AppleShare 卷、Windows
    卷等。你调用的文件系统 API 会通过名为虚拟文件系统（VFS）的插件架构自动转换为适合卷格式的适当操作。你唯一需要意识到这一点的时候是处理卷格式所不支持的晦涩功能时。例如，UFS
    卷可能不支持访问控制列表，而 HFS+ 卷上的文件名可能是区分大小写的，也可能不区分。你通常可以忽略底层卷格式的实现细节；只需注意某些功能可能不会被操作系统支持的所有卷格式实现。


    ## 识别文件系统中的项目


    本节说明文件系统中项目命名的基本规则，以及如何构建指向这些项目的路径。它还详细介绍了如何获取和设置工作目录或默认目录。除了字符串路径外，还可以使用 URL
    对象和别名来标识文件。本节说明如何使用文件 URL 和别名，以及如何将它们转换为字符串路径。最后，Mac OS X 定义了许多标准目录，可以通过符号方式请求其位置，从而避免硬编码那些可能在未来发生变化或本质上是可变路径的系统资源。本节描述了用于获取这些目录路径的函数。


    ### 文件和路径名称


    欢迎学习 POSIX 文件名称基础 101。让我们快速回顾一下基础知识，以免后面产生混淆。要处理卷上的任何实体，必须通过名称来标识它。文件名可以是几乎任何字符串，但有以下限制：不能包含
    `''/''` 路径分隔符字符、不能是保留名称（`"."` 或 `".."`）、不能是空字符串、也不能太长（不超过 255 个 Unicode 字符）。


    字符串 `@"notes.txt"` 是一个有效的文件名。


    路径是一个或多个由 `''/''` 路径分隔符字符分隔的串联名称。字符串 `@"james/Documents/Publications"` 是一个路径。路径的最后一个元素命名一个文件。最后一个元素之前的所有名称必须是目录或其他类型的文件系统容器（例如挂载点）的名称。'
  raw: 'Every Objective-C process has a singleton instance of the NSFileManager class,
    obtained by sending [NSFileManager defaultManager]. NSFileManager implements most
    of the global file system methods. This chapter presents Objective-C solutions
    to common file system tasks whenever possible, but a few useful features are only
    available through C functions in the Cocoa, Core Services, or BSD


    frameworks.


    A Java virtual machine can be hosted on a variety of computing platforms, all
    with different underlying file systems. Consequently, the Java file APIs tend
    to be general and make as few assumptions as possible. The Objective-C and BSD
    APIs, in contrast, unambiguously assume a POSIX-compatible file system. You will
    find no variable that’s equivalent to java.io.File.pathSeparatorChar in Objective-C.
    All file and directory paths in Objective-C are POSIX paths and the path component
    separator is, and will always be, a single ‘/’ character. The Core Services framework
    largely assumes an HFS+ file system, although mostly for compatibility with legacy
    code, as most of the HFS+ file specifiers and data structures are simply translated
    into BSD calls.


    While the programming interfaces explicitly assume a POSIX file system, the underlying
    file services framework allows for a great deal of latitude on how file system
    API calls are translated into action. Ultimately, all file system calls make some
    change to the contents of a volume—a logical partition of a physical storage device.
    The format of that volume can vary dramatically. The HFS+


    volume format is the native format for the Mac OS X operating system, but the
    BSD file system framework is perfectly happy to work with UFS volumes, Samba volumes,
    AppleShare volumes, Windows volumes, and so on. The file system APIs you call
    are automatically translated into the appropriate action for the format of the
    volume through a plug-in architecture called the Virtual File System (VFS). The
    only time you would need to be conscious of this is when dealing with obscure
    features that are foreign to the volume format being used. For example, a UFS
    volume might not support access control lists and the file names on HFS+ volumes
    may, or may not, be case sensitive. You can usually ignore the implementation
    details of the underlying volume format; just be aware that some features might
    not be implemented by every volume format supported by the operating system.


    Identifying Items in the File System


    This section explains the basic rules for how items in a file system are named
    and how to construct paths to those items. It also details how to get and set
    the working or default directory. In addition to string paths, files are also
    identified using URL objects and aliases. This section explains how file URLs
    and aliases are used and how to convert them to string paths. Finally, Mac OS
    X defines a number of standard directories whose location can be requested symbolically,
    avoiding the need to hard-code 164


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 11 ■ FILES


    paths to system resources that might change in the future or are variable by nature.
    This section describes the functions used to obtain those directory paths.


    File and Path Names


    Welcome to POSIX File Names 101\. Let’s start with a quick review of the basics,
    so there’s no confusion later. To work with any entity on a volume you must identify
    it by name. A file name can be just about any string, with the restriction that
    it can’t contain the ‘/’ path separator character, be one of the reserved names
    (“.” or “..”), be an empty string, or be too long (no more than 255 Unicode characters).


    The string @"notes.txt" is a valid file name.


    A path is one or more concatenated names, delineated by the ‘/’ path separator
    character. The string @"james/Documents/Publications" is a path. The last element
    of a path names a file. All of the names before the final one must name directories
    or some other kind of file system container, such as a mount point.'
  trans: '

    # 文件系统基础


    每个 Objective-C 进程都有一个 `NSFileManager` 类的单例实例，通过发送 `[NSFileManager defaultManager]`
    获得。`NSFileManager` 实现了大多数全局文件系统方法。本章尽可能提供常见文件系统任务的 Objective-C 解决方案，但某些有用的功能只能通过
    Cocoa、Core Services 或 BSD 框架中的 C 函数获得。


    Java 虚拟机可以托管在各种计算平台上，这些平台具有不同的底层文件系统。因此，Java 文件 API 往往是通用的，并尽可能少做假设。相比之下，Objective-C
    和 BSD API 明确假设存在 POSIX 兼容的文件系统。在 Objective-C 中，你不会找到与 `java.io.File.pathSeparatorChar`
    等价的变量。Objective-C 中的所有文件和目录路径都是 POSIX 路径，路径组件分隔符始终是单个 `''/''` 字符。Core Services
    框架主要假定 HFS+ 文件系统，尽管这主要是为了与遗留代码兼容，因为大多数 HFS+ 文件说明符和数据结构都会被直接转换为 BSD 调用。


    虽然编程接口明确假设存在 POSIX 文件系统，但底层文件服务框架在如何将文件系统 API 调用转化为实际操作方面提供了很大的自由度。最终，所有文件系统调用都会对卷（物理存储设备的逻辑分区）的内容进行某些更改。该卷的格式可能差异很大。HFS+
    卷格式是 Mac OS X 操作系统的原生格式，但 BSD 文件系统框架可以很好地处理 UFS 卷、Samba 卷、AppleShare 卷、Windows
    卷等。你调用的文件系统 API 会通过名为虚拟文件系统（VFS）的插件架构自动转换为适合卷格式的适当操作。你唯一需要意识到这一点的时候是处理卷格式所不支持的晦涩功能时。例如，UFS
    卷可能不支持访问控制列表，而 HFS+ 卷上的文件名可能是区分大小写的，也可能不区分。你通常可以忽略底层卷格式的实现细节；只需注意某些功能可能不会被操作系统支持的所有卷格式实现。


    ## 识别文件系统中的项目


    本节说明文件系统中项目命名的基本规则，以及如何构建指向这些项目的路径。它还详细介绍了如何获取和设置工作目录或默认目录。除了字符串路径外，还可以使用 URL
    对象和别名来标识文件。本节说明如何使用文件 URL 和别名，以及如何将它们转换为字符串路径。最后，Mac OS X 定义了许多标准目录，可以通过符号方式请求其位置，从而避免硬编码那些可能在未来发生变化或本质上是可变路径的系统资源。本节描述了用于获取这些目录路径的函数。


    ### 文件和路径名称


    欢迎学习 POSIX 文件名称基础 101。让我们快速回顾一下基础知识，以免后面产生混淆。要处理卷上的任何实体，必须通过名称来标识它。文件名可以是几乎任何字符串，但有以下限制：不能包含
    `''/''` 路径分隔符字符、不能是保留名称（`"."` 或 `".."`）、不能是空字符串、也不能太长（不超过 255 个 Unicode 字符）。


    字符串 `@"notes.txt"` 是一个有效的文件名。


    路径是一个或多个由 `''/''` 路径分隔符字符分隔的串联名称。字符串 `@"james/Documents/Publications"` 是一个路径。路径的最后一个元素命名一个文件。最后一个元素之前的所有名称必须是目录或其他类型的文件系统容器（例如挂载点）的名称。

