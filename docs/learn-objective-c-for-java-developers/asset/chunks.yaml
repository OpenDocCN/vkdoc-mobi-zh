    \n另一种替代方案是使用可回收的内存块，这在前面“分配可回收内存”一节中已有描述。\n\n### 不透明指针\n\n分配给既非`__strong`也非`__weak`（即不受写屏障保护）的指针的对象，不会被垃圾回收器考虑。当通过`void*`或其他不透明指针类型传递对象时，这可能会成为一个问题。清单\
