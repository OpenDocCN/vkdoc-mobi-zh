    Timers are not exceedingly accurate, and their accuracy decreases as the time
    interval increases. Timers can fire before, or after, their scheduled time depending
    on a number of factors. Since timers are essentially deferred messages, they are
    inherently thread safe.


    ## Summary


    Basic thread creation and synchronization is very similar to Java. You can create
    threads and control their access to critical code using `@synchronized` directives.
    If you need finer-grained control over thread synchronization, the Objective-C
    frameworks provide a variety of mutually exclusion semaphores, each with unique
    capabilities.


    Like Java, the modern Objective-C frameworks now provide utility classes for simplifying
    the complex job of creating and controlling operations in multiple threads. Finally,
    don''t forget the extremely useful `NSTimer` class. Simple tasks that need to
    be performed at some future time, or at regular intervals, can be easily scheduled
    using timers.


