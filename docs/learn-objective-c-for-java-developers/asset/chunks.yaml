- fmt: 'All of these components are optional, allowing for flexible deployment solutions.
    A framework with shared libraries but no header files is suitable for distribution
    to a wide audience. A framework with code, headers, and documentation is a self-contained
    deployment vehicle, usable by both programmers and end users alike. The frameworks
    included in the Xcode SDK are special frameworks that contain header files and
    documentation, but no actual code—so-called stub libraries. These allow you to
    develop applications that use the system''s frameworks, without actually including
    a copy of the entire OS.


    Frameworks have some very useful features:


    - A single copy of a framework''s code is loaded into memory and is shared by
    all applications that use the framework.

    - A framework can contain multiple versions of itself.

    - Frameworks make it easy to deploy complex collections of code, resources, and
    documentation as a single entity.

    - Frameworks can be loaded automatically or programmatically.


    Most projects link to frameworks directly during development. You add the frameworks
    your application needs to an Xcode project, as shown in Figure 26-1. The header
    and documentation files in the framework define its interface for the programmer,
    and its library files are used to link the application.


    ***Figure 26-1.** Frameworks in an Xcode Project*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Runtime


    At runtime, frameworks are automatically loaded from a number of predefined locations
    (most notably `/System/Library/Frameworks` and `/Library/Frameworks`), very similarly
    to how Java finds classes using its classpath variable. Alternatively, you can
    embed a framework in an application''s bundle, or locate and load a framework
    programmatically. To load a framework directly, create an `NSBundle` object for
    the framework''s package directory and send it a `-load` message. This is approximately
    equivalent to creating a `java.lang.ClassLoader`. Unlike Java, framework code
    is not garbage collected. Send the bundle an `-unload` message if you need to
    release it.


    > **Note:** Although frameworks usually contain shared libraries, loading a framework
    is more like using `java.lang.ClassLoader` than the `java.lang.Runtime.loadLibrary(String)`
    method. The latter is equivalent to the POSIX function `dlopen(…)`.


    Most of the time you use frameworks developed by others, but you can also develop
    and deploy your own frameworks. Frameworks make it easy to develop reusable solutions
    that become the building blocks for new applications, which are deployed with
    those applications. If you are considering developing your own framework, refer
    to the Framework Programming Guide.


    ## User Defaults


    User defaults consist of several layered sets of property values, much like Java
    properties. User defaults are stored as property list dictionaries, so they can
    only contain property value objects (`NSString`, `NSNumber`, `NSDate`, `NSData`,
    `NSArray`, or `NSDictionary`). You employ user defaults much as you would Java
    property values. User defaults also incorporate your application''s editable preferences.
    Preferences are saved automatically and are available the next time your application
    executes.


    User default values are stored by name (key) in one or more domains. Following
    are the major domains (in descending search order):


    1. Command-line argument domain

    2. Application domain

    3. Global domain

    4. Registration domain


    You obtain a value from the user defaults by requesting it from the singleton
    `NSUserDefaults` object, obtained with `[NSUserDefaults standardUserDefaults]`.
    The generic method is `-objectForKey:`, but there are alternate messages that
    return the same value cast or converted to a more convenient type:


    `-stringForKey:`, `-boolForKey:`, `-integerForKey:`, `-floatForKey:`, `-dataForKey:`,
    `-stringArrayForKey:`, `-arrayForKey:`, and `-dictionaryForKey:`. User defaults
    will convert between common representations. For example, requesting a string
    with the value `"YES"` as a Boolean will return the numeric constant `YES`.'
