    • 阅读本章，感受一下 Xcode 开发。下载完成后的项目，并亲自操作一番。


    • 在 Xcode 中按照本章的每个步骤，从完成的项目中复制所需的源代码，自己重新创建项目。


    • 将本章的步骤作为你自己项目的起点。


    接下来，你将创建一个新的 Xcode 项目，配置项目，设计应用程序，创建控制器和数据模型对象以实现模型-视图-控制器（Model-View-Controller）设计，最后添加业务逻辑以生成一个可正常工作的应用。完成这一过程将带你简要了解
    Xcode、Interface Builder、Objective-C 和 Cocoa 框架。本章中很少与 Java 进行比较，因为这更多地涉及开发工具而非编程语言本身。


    ## 创建项目


    安装完成后，启动 Xcode 应用程序。


    首先创建一个新项目。选择“File”→“New Project…”以打开新项目助理（Apple 对向导的称呼）。新项目总是基于众多内置模板之一。每个模板都会创建一个针对特定用途预先配置好的完整项目。这是实现最终目标的一个极好开端，因此请选择最接近你最终产品的模板。大多数项目需要经过大量配置才能生成有用的内容，所以我强烈建议你不要选择“`Empty
    Project`”模板。


    对于本项目，请选择如图 4-1 所示的“`Cocoa Application`”模板。将项目命名为 `Scrapbook Words`，并选择项目及其文件存储的位置。Xcode
    会创建一个以项目名称命名的文件夹。该文件夹将包含一个同名项目文档以及模板中包含的任何其他资源文件。对于某些模板来说，这可能为空，而对于其他模板，则可能包含大量项目。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-81_1.jpg)


    **图 4-1.** *选择项目模板*


    项目窗口用于组织和管理项目的所有组件。如图 4-2 所示的项目窗口采用默认的 Xcode 布局。你可以在“Xcode”→“Preferences”中选择使用一体化窗口或多窗口布局，以符合你的个人喜好和习惯。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-82_1.jpg)


    **图 4-2.** *项目窗口*


    大多数模板生成的项目可以立即构建并运行，但并无实际用途。`Cocoa Application` 模板也不例外。如果你愿意，现在就可以构建并启动该应用程序（“Build”→“Build
    and Run”）。


    项目窗口的“`Group & Files`”窗格用于组织项目的资源。你可以通过创建新的组和子组，以及拖拽重新排列项目，来创建任意复杂的源项目层级结构。你可以直接在项目中创建新文件，或导入现有文件。默认情况下，实际文件都存储在项目根文件夹中。可以将物理文件组织成层级结构，或将其放置在项目文件夹之外，但对于规模适中的项目，将组织工作限制在项目窗口内会简单得多。


    ## 开始之前


    在开始主要设计之前，需要进行一些整理工作。为了获得最接近 Java 的体验，你希望应用程序使用垃圾收集机制。截至本书编写时，垃圾收集是选择加入的；除非重新配置，否则一个新的
    Cocoa 项目将使用遗留内存管理。


    从菜单中选择“Project”→“Edit Project Settings”。切换到“`Build`”选项卡，选择“`All Configurations`”和“`All
    Settings`”，然后在搜索字段中输入 `garbage`。你应看到如图 4-3 所示的“`Objective-C Garbage Collection`”构建设置。点击值弹出菜单，将设置更改为“`Required`”。构建设置的更改会立即生效。

