    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 1 章**\n\n■ ■ ■\n\n## 引言\n\
    \n欢迎阅读《*Java 开发者学习 Objective-C*》。本书将帮助你从 Java 编程过渡到 Objective-C 编程，Objective-C\
    \ 是用于为苹果公司的 Mac OS X 系列计算机和消费产品开发应用程序的主要语言。你将学会用一种充满活力且灵活的语言进行高效编程，这种语言驱动着当今许多尖端的应用程序和移动设备。更重要的是，本书将向你展示如何利用你在\
    \ Java 中学到的编码实践、设计模式和问题解决技能，并将其应用于 Objective-C。\n\n## 什么是 Objective-C？\n\n那么，Objective-C\
