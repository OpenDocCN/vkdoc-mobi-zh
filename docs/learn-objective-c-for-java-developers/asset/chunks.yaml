    Sort Descriptors


    Finally, the collection classes provide a more object-oriented sorting alternative
    to the C function method that uses sort descriptors. Sort descriptors are instances
    of NSSortDescriptor, and are essentially a property comparison encapsulated in
    an object. An NSSortDescriptor identifies a property of an object, whether it
    should be sorted in ascending or descending order, and an optional Objective-C


    message that will be used to compare the two properties. If you don’t specify
