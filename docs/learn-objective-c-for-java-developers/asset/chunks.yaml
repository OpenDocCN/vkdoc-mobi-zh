    \ `allKeys` | `allKeysForObject:`\n`values()` | `allValues` | `dictionaryRepresentation`\n\
    `getObjects:andKeys:` | — | —\n`keysSortedByValueUsingSelector:` | — | —\n`get(Object)`\
    \ | `objectForKey:` | `objectForKey:`\n`objectsForKeys:notFoundMarker:` | — |\
    \ —\n\n**表 16-7.** 常用可变字典集合方法  \n`java.lang.HashMap` | `NSMutableDictionary` |\
    \ `NSMapTable`\n--- | --- | ---\n`put(Object,Object)` | `setObject:forKey:` |\
    \ `setObject:forKey:`\n`putAll(Map)` | `addEntriesFromDictionary:` | `setDictionary:`\n\
    `remove(Object)` | `removeObjectForKey:` | `removeObjectForKey:`\n`clear()` |\
    \ `removeAllObjects` | `removeAllObjects`\n`removeObjectsForKeys:` | — | —\n\n\
    字典集合不会存储 `nil` 值；`nil` 值用于表示键不存在。Java 语句 `dictionary.contains(key)` 可写作 `[dictionary\
    \ objectForKey:key] != nil`。如果必须存储一个不带值的键，请使用 `NSNull`。\n\n`-allKeysForObject:`\
    \ 返回一个数组，包含所有映射到给定值的键。Java 语句 `dictionary.containsValue(object)` 可写作 `[[dictionary\
    \ allKeysForObject:object] count] != 0`。\n\n`-keysSortedByValueUsingSelector:`\
    \ 返回一个 `NSDictionary` 的键数组，该数组按特定顺序排序，允许你以明确定义的顺序遍历集合。请参阅“迭代器模式”和“排序”章节。\n\n##\
    \ `NSDictionary`, `NSMutableDictionary`\n\n除了不允许 `nil`（`null`）值外，`NSMutableDictionary`\
    \ 几乎与 `java.lang.HashMap` 相同。\n\n最大的区别在于对 `nil` 值的处理以及键的复制。\n\n只要对象可被复制（即遵循 `NSCopying`\
    \ 协议），且集合保留的副本从未被修改，你就可以使用任何对象作为键。当字典被复制时，所有键都会被复制。\n\n与 `NSArray` 类似，`NSDictionary`\
    \ 有一些操作条目组的方法。例如，`-objectsForKeys:notFoundMarker:` 接受一个键对象数组，执行批量搜索，并返回一个值对象数组。新数组中的每个条目对应相应键的值，或者“未找到标记”对象。在编写代码以迭代查找、添加或删除对象集合之前，请检查是否有现成的集合方法可以为你完成这项工作。考虑以下语句：\n\
    \n```\n[dictionary removeObjectsForKeys:[dictionary allKeysForObject:value]];\n\
    ```\n\n## `NSMapTable`\n\n`NSMapTable` 是一个较新的集合类。与 `NSPointerArray` 类似，它没有不可变基类，就像\
    \ Java 的 `HashMap` 类一样。同样与 `NSPointerArray` 类似，`NSMapTable` 通过一组定义其行为的委托函数来构造。\n\
    \n`NSMapTable` 实例使用 `NSPointerFunction` 对象或表 16-5 中列出的 `NSPointerFunctionOptions`\
    \ 来创建。关于 `NSPointerFunctions` 类和指针函数选项的描述，请参阅 `NSPointerArray` 章节。初始化 `NSMapTable`\
    \ 和初始化 `NSPointerArray` 之间存在两个显著区别。\n"
- fmt: '首先，NSMapTable 只接受 `NSPointerArray` 所支持的函数指针选项中的一小部分。表 16-8 中列出的选项是 `NSMapTable`
    唯一支持的选项，同时还包含一些用于 `NSMapTable` 构造函数的同义符号。基本上，映射表只支持对象值，并且这些对象值可以是强引用或弱引用，你还可以选择存储对象的引用或副本。如果你只使用
    `NSMapTable` 的选项同义词，就不会意外选到不支持的 `NSPointerFunctions` 选项。


    **表 16-8.** `NSMapTable` 选项


    | `NSMapTable` 同义词 | `NSPointerArray` 选项 |

    | --- | --- |

    | `NSMapTableStrongMemory` | `NSPointerFunctionsStrongMemory` |

    | `NSMapTableZeroingWeakMemory` | `NSPointerFunctionsZeroingWeakMemory` |

    | `NSMapTableCopyIn` | `NSPointerFunctionsCopyIn` |

    | `NSMapTableObjectPointerPersonality` | `NSPointerFunctionsObjectPointerPersonality`
    |


    第二个区别在于，`NSMapTable` 对象在初始化时使用两组函数指针：一组用于键，一组用于值。这使得你可以定义一种映射，例如：使用强引用存储键的副本，同时使用弱引用存储值；或者引用键并存储值的副本；或者使用弱键和弱值；或者任何其他对你的应用程序有意义的组合。


    对于最常见的配置，有四个便利构造方法：


    `+mapTableWithStrongToStrongObjects`、`+mapTableWithWeakToStrongObjects`、

    `+mapTableWithStrongToWeakObjects` 和 `+mapTableWithWeakToWeakObjects`。


    ### 集合（Set Collections）


    `NSSet`、`NSMutableSet`、`NSCountedSet`、`NSIndexSet` 和 `NSHashTable` 组织无序对象的集合，大致相当于
    `java.util.HashSet` 和 `java.util.BitSet`。集合类遵循集合的数学概念：一个对象要么是集合的成员，要么不是。对象不按任何特定顺序组织，也不可寻址。你可以向集合中添加对象、测试其是否存在，以及移除它。`NSIndexSet`
    将相同的概念应用于整数值，而 `NSCountedSet` 是一个特殊的集合，允许一个对象在集合中出现多次。具体来说，Objective-C 和 Java
    的集合类具有以下共同特征：


    - 集合中的值是对象引用或整数。

    - 一个值在集合中只能存储一次。添加重复值不会有任何效果（`NSCountedSet` 是此规则的例外）。


    #### 通用方法


    表 16-9 和 16-10 列出了 Java 和 Objective-C 中适用于对象集合的通用集合方法。表 16-9 中的消息不会改变集合，并且对于可变和不可变集合都已实现。表
    16-10 中的消息只能发送给可变集合。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **第 16 章 ■ 集合模式**


    **表 16-9.** 通用集合方法


    | `java.lang.HashSet` | `NSSet` | `NSHashTable` |

    | --- | --- | --- |

    | `size()` | `count` | `count` |

    | `toArray()` | `allObjects` | `allObjects` |

    |  | `anyObject` | `anyObject` |

    | `contains(Object)` | `containsObject:` | `containsObject:` |

    | `containsAll(Collection)` | `isSubsetOfSet:` | `isSubsetOfHashTable:` |

    |  | `intersectsSet:` | `intersectsHashTable:` |

    |  | `setRepresentation` |  |


    **表 16-10.** 通用可变集合方法


    | `java.lang.HashSet` | `NSMutableSet` | `NSHashTable` |

    | --- | --- | --- |

    | `add(Object)` | `addObject:` | `addObject:` |

    | `remove(Object)` | `removeObject:` | `removeObject:` |

    | `clear()` | `removeAllObjects` | `removeAllObjects` |

    | `addAll(Collection)` | `addObjectsFromArray:` | `addAll(Collection)` |

    |  | `unionSet:` | `unionHashTable:` |

    | `removeAll(Collection)` | `minusSet:` | `minusHashTable:` |

    |  | `intersectSet:` | `intersectHashTable:` |

    |  | `setSet:` |  |


    Objective-C 类包含一些高级方法，例如 `-intersectSet:`，使得执行集合运算变得容易。它们还包含有趣的 `-anyObject` 消息，该方法返回集合中的一个任意成员。


    ### `NSSet`、`NSMutableSet`


    `NSSet` 类在行为上几乎与 `java.util.HashSet` 相同。语句 `set.isEmpty()` 可以替换为 `[set count]==0`。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


