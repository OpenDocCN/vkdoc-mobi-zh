    section, there’s another way that your object can help the Key-Value Observing
    framework. For objects that are heavily observed, you can optimize KVO performance
    by providing a place to store observation information about your object. While
    KVO can mutate the class of your object using isa swizzling, it can’t change its
    structure or store any new values in it. Instead, KVO keeps an object’s observation
    information in a global collection that must be consulted every time a property
    is changed.


    You can reduce this overhead by providing KVO a void *observationInfo property,
    as shown in Listing 19-6\. The Key-Value Observing framework will use this property
    to store your object’s observation information directly in the object.


    Listin g 19-6\. Providing Local Key-Value Observing Information Storage


    @interface KVOFriendly : NSObject {


    @private


    void* observationInfo;


    }


    @property (assign) void *observationInfo;


    @end


    @implementation KVOFriendly


    @synthesize observationInfo;


    @end


    Summary


    Although similar in concept to the provider/subscriber pattern, the observer pattern
    provides a significantly different solution set. Its primary advantage is that
    observation and notifications are largely transparent to the observed object,
    and it typically doesn’t need to be designed in advance to provide the desired
    notifications. While basic properties are Key-Value Observing compliant automatically,
    some properties may require some additional code to fully support KVO.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 2 0**


    ■ ■ ■


    Model-View-Contr oller Pattern


    The Model-View-Controller design pattern is one of the most important design patterns
    in computer science. Whereas most patterns address specific problems, Model-View-Controller
    (MVC) describes the architecture of a system of objects. It can be applied to
    isolated subsystems or entire applications. The Model-View-Controller design pattern
    is also less clearly defined than many other patterns, leaving a lot of latitude
    for alternate implementations. It’s more a philosophy than a recipe.


    A clear understanding of MVC is critical to using Cocoa, because the entire Cocoa
    framework is designed around the Model-View-Controller design pattern (where applicable).
    Where Java adopts MVC


    for many tasks, Cocoa passionately embraces it. MVC is the soul of Cocoa. Designing
    with MVC will smooth your development, since so many of the framework objects
    are designed to integrate effortlessly with an MVC design.


    Befitting a broad design pattern, this is an expansive chapter that touches on
    a wide range of classes and technologies. (It wouldn’t be very useful if it merely
    described the MVC design pattern—


    something you’re probably already familiar with, anyway). To be practical, each
    section not only describes design concepts but goes on to explore the classes,
    protocols, frameworks, and development tools that you’ll use to implement those
    concepts. For example, this chapter begins with the basic MVC


    design principles, and then goes on to describe bindings (a technology used to
    implement MVC


    communications) and Interface Builder (a development tool used to connect MVC
    objects). The section on view objects explains the role of view objects, and then
    goes on to explain how to use pre-built view objects, how to create your own view
    objects, how those view objects draw themselves, and the basics of the Cocoa graphics
    environment. The sections on data model objects describe not only the conceptual
    role of data model objects, but some of the classes and development tools that
    can be used to create complex data models. In short, this is a really long chapter,
    so settle in and take your time. You should be comfortable with each concept before
    moving on to the next.


    To help you put each piece into perspective, I’ve created a simple Cocoa application
    that plays Tic Tac Toe. It’s a relatively small project that touches on most of
    the topics in this chapter, and will be used to illustrate many of them. I recommend
    that you download the project from the Source Code/Downloads section of http://www.apress.com
    so you can see how each concept fits into the whole. There is also a section on
    Interface Builder, a key Cocoa development tool, and how it supports the MVC design
    pattern. At the end of this chapter is a brief section that describes some noteworthy
    aspects of the project that aren’t covered elsewhere.


    Model-View-Controller sits atop a broad base of supporting technologies, at the
    apex of the design pyramid. To master MVC, you need a firm grasp of the technologies
    that support it. You should be familiar with, or review, the following before
    attempting to tackle MVC in Cocoa:


    • Objective-C Messages (Chapter 6)


    • Informal Protocols (Chapter 5)


    • Delegates (Chapter 17)


    • Key-Value Coding (Chapter 10)


    • Key-Value Observing (Chapter 19)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-370_1.png)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    Understanding Model-View-Controller


    The Model-View-Controller design pattern is simply stated:


    • Data model objects encapsulate information.


    • View objects display information to the user.


    • Controller objects implement actions.


    • View objects observe data model objects and update their display whenever it
    changes.


    • View objects gather user input and pass it to a controller object that performs
    the action.


    The key to successfully implementing an MVC design is to pay close attention to
    the role of objects and the communications between those objects. The first three
    rules define the role of your objects.


    • Data model objects store, encapsulate, and abstract your data. They should not
    contain methods or logic specific to making your application function. For example,
    a data model class should implement a method that serializes its data, but it
    should not implement the “Save As…” command. Even if the two functions are nearly
    identical, the code that deals with the abstract data transformation should be
    implemented in the data model object and the code that implements the user command
    should be implemented in the controller object.


    • View objects display the information in the data model to the user. View class
    design runs from the extremely generic to the very specific; generic view classes
    are provided by the framework to display almost any kind of string, number, or
    image, while you are more likely to implement very specific view objects designed
    for your application. View objects also interact with the user and initiate actions
    by interpreting user-initiated events, such as mouse movement and keystrokes.
    It converts those events into actions that are passed to the controller object
    for execution. The event and resulting action are often very simple; clicking
    the mouse over a button object will send an action message to a controller. Complex
    gestures, like drag-and-drop, are more involved.


    • Controller objects implement your application’s actions. Actions are usually
    initiated by view objects in response to user events.


    The other aspect of the Model-View-Controller design is the communication between
    the data model, controller, and view objects. The fundamental communication paths
    are illustrated in Figure 20-1.


    ***Figure 20-1.** Fundamental MVC communications*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-371_1.png)


    ![](index-371_2.png)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    When the user does something, like typing a keyboard shortcut, a view object interprets
    it and sends an action message to the controller object. The controller object
    performs the action, which often involves sending messages to the data model object.
    When the data model changes, it notifies its observers by sending messages to
    the view object, which updates the display.


