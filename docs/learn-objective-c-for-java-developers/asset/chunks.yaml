    \ explores mostly esoteric details of threads that are less relevant to most programmers.\n\
    \n### Starting a Thread\n\nStarting a new thread in Objective-C is even easier\
    \ than it is in Java—which is saying something, since thread creation in Java\
    \ is already pretty simple. There are three ways of creating a thread in Objective-C:\n\
