    function to compare objects.


    -[NSArray


    Same as -sortedArrayUsingFunction:context:


    sortedArrayUsingFunction:context:hint:]


    except that it accepts an optimization hint


    obtained with -sortedArrayHint.'
  trans: "\n关于如何控制排序顺序，请参阅\"`排序集合`\"一节。\n\n**列表 16-10. 有序字典枚举**\n\n```\nNSEnumerator\
    \ *e = [[dictionary keysSortedByValueUsingSelector:@selector(compare:)]\n    objectEnumerator];\n\
    ```\n\n> **提示:** 一个鲜为人知的事实是，`NSEnumerator` 也遵循 `NSFastEnumeration` 协议。这使得任何 `NSEnumerator`\
    \ 对象都可以作为快速枚举语句中的集合。在列表 16-9 中，`while(…)` 语句可以替换为 `for ( key in e )`。枚举器对象承担了集合的角色。这并非优化方案——枚举器只是向自身发送\
    \ `-nextObject` 消息——因此不要期望它具有典型快速枚举的性能。\n\nObjective-C 中没有与 `java.util.Map.Entry`\
    \ 对象等价的东西。最接近的方式是使用 `-[NSDictionary getObjects:andKeys:]` 来填充两个 C 数组，一个存储键，另一个存储值，如列表\
    \ 16-11 所示。\n\n**列表 16-11. 枚举字典键/值对**\n\n```\nNSDictionary *dictionary = …\nNSUInteger\
    \ count = dictionary.count;\n\n__strong id *keys = NSAllocateCollectable(sizeof(id)*count,\
    \ NSScannedOption); \n__strong id *values = NSAllocateCollectable(sizeof(id)*count,\
    \ NSScannedOption);\n\n[dictionary getObjects:values andKeys:keys];\n\nNSUInteger\
    \ i;\nfor (i=0; i<count; i++) {\n    id key = keys[i];\n    id object = values[i];\n\
    \    // ...\n}\n```\n\n### 添加枚举支持\n\n你可以轻松地继承 `NSEnumerator` 来实现自己的枚举器。它实际上只需要实现一个\
    \ `-nextObject` 方法。仅在你认为有用，或者你的枚举器对象面向广泛用户时，才实现很少使用的 `-allObjects` 方法。关于自定义 `NSEnumerator`\
    \ 的示例，请参见第 20 章的 TicTacToe 项目。另外，正如前面提示中提到的，任何 `NSEnumerator` 都可以在快速枚举语句中使用。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 16 章 ■ 集合模式\n\n为自定义对象提供快速枚举支持需要稍微复杂一些。概念上很简单：只需遵循\
    \ `NSFastEnumeration` 协议，并实现 `-countByEnumeratingWithState:objects:count:` 方法。\n\
    \n快速枚举代码会重复向你的对象发送此消息，直到返回 0。每次你的集合收到该消息时，它必须将下一批要处理的对象组装到一个 C 数组中，并返回准备好的数量。当你的类批量组装对象时，快速枚举效率最高，但也可以通过一次返回一个对象来实现简单的非优化方案。\n\
    \n单次迭代的进度通过一个 `NSFastEnumerationState` 结构体来维护。当该结构体首次传递给你的方法时是空的，后续每次传递的消息中会再次传入相同的结构体。你的集合必须更新该结构体以跟踪枚举进度，并防止枚举过程中集合发生更改。如果在枚举过程中修改了集合，快速枚举应抛出异常。\n\
    \n关于 `-countByEnumeratingWithState:objects:count:` 方法和 `NSFastEnumerationState`\
    \ 结构体的完整描述，请参阅 `NSFastEnumeration` 协议的文档。\n\n## 排序集合\n\n有序集合提供了三种对成员对象进行排序的基本技术：使用\
    \ Objective-C 消息排序、使用 C 回调函数比较对象排序、以及使用排序描述符排序。对集合进行排序的方法列于表 16-15 中。\n\n**表 16-15.\
    \ 排序方法**\n\n| 方法 | 描述 |\n|--------|-------------|\n| `-[NSArray sortedArrayUsingDescriptors:]`\
    \ | 返回使用排序描述符排序后的数组副本。 |\n| `-[NSArray sortedArrayUsingSelector:]` | 返回使用 Objective-C\
    \ 消息排序后的数组副本。 |\n| `-[NSArray sortedArrayUsingFunction:context:]` | 返回使用 C 函数比较对象排序后的数组副本。\
    \ |\n| `-[NSArray sortedArrayUsingFunction:context:hint:]` | 与 `-sortedArrayUsingFunction:context:`\
    \ 相同，但接受一个通过 `-sortedArrayHint` 获得的优化提示。 |\n"
- fmt: "-[`NSMutableArray sortUsingDescriptors:`]\n\nSorts the array in situ using\
    \ the sort descriptors.\n\n-[`NSMutableArray sortUsingFunction:context:`]\n\n\
    Sorts the array in situ using a C function to compare objects.\n\n-[`NSMutableArray\
    \ sortUsingSelector:`]\n\nSorts the array in situ using an Objective-C message.\n\
    \n-[`NSDictionary keysSortedByValueUsingSelector:`]\n\nReturns a copy of the keys\
    \ in a dictionary as an array, sorted using an Objective-C message.\n\n## Objective-C\
    \ Message Sorting\n\nThe methods `-sortedArrrayUsingSelector:` , `-sortUsingSelector:`\
    \ , and `-keysSortedByValueUsingSelector:` sort an array of objects using an Objective-C\
    \ message to compare objects. You can use any message you want, as long as it’s\
    \ compatible with the following prototype and all of the objects in the collection\
    \ respond to it:\n\n```\n-(NSComparisionResult)comparisonMethod:(id)object\n```\n\
    \nThe left hand object receives the message along with a pointer to the right\
    \ hand object. It compares itself to the other object and returns an `NSComparisionResult`\
    \ value. The return value must be one of `NSOrderedAscending` , `NSOrderedSame`\
    \ , or `NSOrderedDescending` . The receiver returns `NSOrderedAscending` if it\
    \ considers itself to be before the other object, `NSOrderedSame` if equal, and\
    \ `NSOrderedDescending` otherwise. The canonical example of a suitable sort message\
    \ is the `-compare:` method implemented by `NSString` , `NSNumber` , and `NSDate`\
    \ . A mutable array of `NSString` objects can be sorted using `[array sortArrayUsingSelector:@selector(compare:)]`\
    \ , `[array sortArrayUsingSelector:@selector(caseInsensitiveCompare:)]` , `[array\
    \ sortArrayUsingSelector:@selector(localizedCompare:)]` , and so on.\n\n## C Function\
    \ Sorting\n\nA sorting technique that doesn’t require the object to implement\
    \ its own comparison method is to supply a C function that accepts two Objective-C\
    \ object pointers, compares them, and returns the results. The function must have\
    \ a prototype compatible with `NSInteger comparisonFunction( id leftObject, id\
    \ rightObject, void *context )`. The function performs the same comparison that\
    \ the comparison message does; it compares the left hand object to the right hand\
    \ object and returns `NSOrderedAscending` , `NSOrderedSame` , or `NSOrderedDescending`\
    \ . The optional `context` pointer passed to the sort method is passed along to\
    \ the comparison function, allowing your function to tailor its behavior or implement\
    \ different sorting schemes using a single function. Listing 16-12 sorts an array\
    \ of strings by order of length.\n\n**Listing 16-12.** String Sort Function\n\n\
    ```\nstatic NSInteger sortStringsByLength( id left, id right, void *ignored )\n\
    {\n    // Order objects first by length, then by content\n    NSUInteger lLength\
    \ = [left length];\n    NSUInteger rLength = [right length];\n    if (lLength<rLength)\n\
    \        return NSOrderedAscending;\n    else if (lLength>rLength)\n        return\
    \ NSOrderedDescending;\n    return [left compare:right];\n}\n…\nNSMutableArray\
    \ *array = …\n[array sortUsingFunction:sortStringsByLength context:NULL];\n```\n\
    \n## Sort Descriptors\n\nFinally, the collection classes provide a more object-oriented\
    \ sorting alternative to the C function method that uses sort descriptors. Sort\
    \ descriptors are instances of `NSSortDescriptor` , and are essentially a property\
    \ comparison encapsulated in an object. An `NSSortDescriptor` identifies a property\
    \ of an object, whether it should be sorted in ascending or descending order,\
    \ and an optional Objective-C message that will be used to compare the two properties.\
    \ If you don’t specify a comparison method, the sort descriptor will use `-compare:`\
    \ to compare objects. Unlike the `-sortUsingSelector:` message discussed earlier,\
    \ a sort descriptor compares a common property of the two objects obtained using\
    \ KeyValue coding—not the objects themselves (unless the property is `@\"self\"\
    ` ). The code in Listing 16-13 is equivalent to the sort implemented in Listing\
    \ 16-12, although not as fast.\n\n**Listing 16-13.** Sorting Strings Using `NSSortDescriptor`"
