    A goto statement can jump forward or backward in the code stream, and into or
    out of code blocks at any level. It’s possible to construct for, while, do, and
    case statements using only label, if, and goto statements—although I don’t recommend
    it.


    Use goto statements sparingly, if ever. They can solve very tangled code flow
    problems, but should be used only as a last resort. They are easy to abuse, often
    defeat code optimization, and can make execution order difficult to analyze.


    Summary


    This chapter was designed to give you just enough C that you can begin programming
    in Objective-C.


    Programming in Objective-C liberates you from many of the arcane and mundane aspects
    of programming in C. Using Objective-C classes you can largely avoid C strings,
    memory management, arrays, and a raft of other constructs.


    This chapter was not, by any stretch of the imagination, a comprehensive C tutorial.
    The C


    language is vast—even more so than Java, given that one of Java’s goals was to
    create a simpler and more concise version of C.


    While this abbreviated introduction will give you enough knowledge that you can
    start programming in Objective-C, you will eventually encounter more complex C
    code or need to interface with C libraries. That will require a deeper understanding
    of the language. I highly recommend you procure a book on standard C for further
    reading and future reference.


    Now that you understand the salient differences between C and Java, you can begin
    to explore the additional syntax that defines Objective-C.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 3**


    ■ ■ ■


    Welcome to Objective-C


    This chapter describes the core Objective-C language and how its syntax differs
    from Java. Functional differences and more esoteric language features are covered
    in later chapters.


    Objective-C enhances C by adding an additional layer of syntax. It does not redefine
    C, or limit its capabilities, in any meaningful way. Objective-C syntax is easily
    recognized. If Objective-C had a logo, it would probably be the “at” sign (@);
    all Objective-C directives, including string constants, begin with @


    (as in @interface, @selector(), @"string"). Other notable traits are the use of
    square brackets ([…]) to invoke methods and very descriptive method names.


    But if you ignore these peculiarities, you won’t find any significant discord
    between the two.


    Both are object-oriented languages that let you define classes, declare instance
    variables and methods, instantiate instances of those classes, inherit from subclasses,
    override methods, invoke methods, pass parameters, and return values. Good Objective-C
    programming embraces the same design patterns and practices that you are familiar
    with in Java.


    Defining an Objective-C Class


    Objective-C classes are defined in an @interface directive. Its implementation
    is defined in an


    @implementation directive. This differs from Java’s single class definition, which
    defines both the class’s interface and its implementation, as shown in Listing
    3-1.


    Listin g 3-1\. Objective-C Class Definition


    **Java**


    import com.apress.java.SuperClass;


    public class NewClass extends SuperClass


    {


    int instanceVariable;


    Object method( )


    {


    return (null);


    }


    Object method(Object param )


    {


    return (null);


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ WELCOME TO OBJECTIVE-C


    }


    **Objective-C**


    #import "SuperClass.h"


    @interface NewClass : SuperClass {


    int instanceVariable;


    }


    -method;


    -methodWithParameter:param;


    @end


    @implementation NewClass


    -method


    {


    return (nil);


    }


    -methodWithParameter:param


    {


    return (nil);


    }


    @end


    Listing 3-1 shows the definition of the NewClass class in Java and an equivalent
    class in Objective-C. The @interface part of a class definition is typically in
    a header (.h) file for inclusion by other modules, while the @implementation portion
    is in a source (.m) file. See the “#include and #import”


    section of the previous chapter if you need a refresher on C source file organization.


    The @interface portion of a class declaration has two parts. The first part contains
    the instance variable declarations surrounded by braces. This portion is similar
    to a C struct declaration.


    Following the variable declaration are the class’s method prototypes. The hyphen
    prefix indicates that the method is an instance method. A plus prefix denotes
    a class method, which is similar to a static method in Java.


    The @implementation directive contains the actual code for the methods that were
    described in the @interface section. It is an error to declare a method and not
    implement it, although the opposite is permitted. One of Java’s more elegant design
    features is that a class file defines both a class’s interface and its implementation.
    In Objective-C, it’s the programmer’s responsibility to keep the interface and
    the implementation in agreement.


    Both the @interface and @implementation sections are terminated with an @end directive.


    Class inheritance works the same way it does in Java. The class NewClass inherits
    all of the instance variables and methods of the class SuperClass. Declaring a
    method in NewClass with the same name as a method inherited from SuperClass overrides
    the inherited method.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ WELCOME TO OBJECTIVE-C


    ■Caution Always declare the superclass in the @interface declaration, even when
    the superclass is NSObject.


    NSObject is the logical root class in the Cocoa framework, functionally equivalent
    to Java’s Object class. It is not, however, the root class of Objective-C. Objective-C’s
    actual root class, Object, is so primitive that a direct subclass is essentially
    useless. It is unlikely that you will ever want to create a direct subclass of
    Object.


    Object Pointers


    A variable containing a pointer to an Objective-C object is an object pointer
    (reference) or object identifier. Both are equivalent to a Java object reference.


    Listing 3-2 shows the two ways of declaring an object pointer. An object pointer
    can be declared as a pointer to a specific class or as a generic object identifier
    (id). Both contain a pointer to the memory address of an object. The difference
    is in how they are treated by the compiler.


    Listin g 3-2\. Object Pointer Declarations


    SpecificClass *specificObject;


    id anyObject;


    ■Note Like Java, Objective-C does not permit a variable to contain the contents
    of an object, only a pointer (reference) to an object. The declaration SpecificClass
    object is invalid. This is one case where Objective-C


    objects and C structures differ; a variable can contain an entire C structure
    or a pointer to a C structure, but you can only declare a pointer to an Objective-C
    object.


    A pointer to a specific class acts mostly like a Java object reference. The compiler
    assumes that the pointer refers to an object of that class, or a subclass of that
    class. It will warn you if you attempt to invoke methods that are not defined
    or inherited by that class. It will only allow you access to instance variables
    defined or inherited by that class. The pointer is implicitly compatible with
    a pointer to any of its superclasses, but not with a pointer to a subclass.


    The special object identifier type (id) is a non-specific object pointer (reference).
    It is not the equivalent of a pointer to a base class object, e.g. NSObject *obj
    (Object obj). The compiler assumes that a variable of type id could be any class.
    The compiler will permit you to invoke any method from any class that’s been defined.
    An object identifier can be assigned to any kind of object pointer, or from any
    kind of object pointer, with no compiler warning. You cannot use an object identifier
    to directly access an object’s instance variables.'
  trans: "\n# C 标签\n\n与 Java 不同，C 语言的标签不仅限于跳转到代码块的末尾。`goto` 语句可以在代码流中向前或向后跳转，也可以跳入或跳出任意层级的代码块。仅使用\
    \ `label`、`if` 和 `goto` 语句就可以构建出 `for`、`while`、`do` 和 `case` 语句——尽管我不推荐这样做。\n\n\
    请尽量少用 `goto` 语句（如果确实要用的话）。它们可以解决非常复杂的代码流程问题，但只应作为最后的手段。`goto` 语句容易被滥用，常常会妨碍代码优化，并且会使执行顺序难以分析。\n\
    \n## 本章小结\n\n本章旨在为你提供足够的 C 语言知识，使你能够开始用 Objective-C 进行编程。\n\n使用 Objective-C 编程能让你从\
    \ C 编程的许多晦涩和繁琐的方面中解放出来。通过使用 Objective-C 类，你可以在很大程度上避免使用 C 字符串、内存管理、数组以及大量其他结构。\n\
    \n无论从哪个角度看，本章都不是一篇全面的 C 语言教程。C 语言非常庞大——甚至比 Java 还要庞大，因为 Java 的目标之一就是创建一种更简单、更简洁的\
    \ C 语言版本。\n\n虽然这个简略的介绍能为你提供足够的入门知识，让你可以开始用 Objective-C 编程，但你最终还是会遇到更复杂的 C 代码，或者需要与\
    \ C 库交互。那时就需要对这门语言有更深入的理解。我强烈建议你购买一本关于标准 C 语言的书籍，以便进一步阅读和将来参考。\n\n现在你已经了解了 C 和\
    \ Java 之间的显著差异，可以开始探索定义 Objective-C 的额外语法了。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# 第 3 章：欢迎使用 Objective-C\n\n本章介绍 Objective-C 的核心语言及其语法与 Java 的不同之处。功能上的差异以及更晦涩的语言特性将在后续章节中介绍。\n\
    \nObjective-C 通过增加一层额外的语法来增强 C 语言。它并没有以任何有意义的方式重新定义 C 语言或限制其能力。Objective-C 的语法很容易识别。如果\
    \ Objective-C 有一个标志，那很可能就是“at”符号（`@`）；所有 Objective-C 指令，包括字符串常量，都以 `@` 开头（例如 `@interface`、`@selector()`、`@\"\
    string\"`）。其他显著特征包括使用方括号（`[...]`）来调用方法以及非常具有描述性的方法名称。\n\n但如果你忽略这些特性，就会发现两者之间并没有显著的不协调之处。两者都是面向对象的语言，让你可以定义类、声明实例变量和方法、实例化这些类的实例、从子类继承、重写方法、调用方法、传递参数以及返回值。优秀的\
    \ Objective-C 编程遵循的设计模式和实践与你所熟悉的 Java 相同。\n\n## 定义一个 Objective-C 类\n\nObjective-C\
    \ 类在 `@interface` 指令中定义，其实现则在 `@implementation` 指令中定义。这与 Java 的单一类定义不同，Java 的类定义同时包含了类的接口和实现，如代码清单\
    \ 3-1 所示。\n\n**代码清单 3-1. Objective-C 类定义**\n\n**Java**\n\n```\nimport com.apress.java.SuperClass;\n\
    \npublic class NewClass extends SuperClass\n{\n    int instanceVariable;\n\n \
    \   Object method( )\n    {\n        return (null);\n    }\n\n    Object method(Object\
    \ param )\n    {\n        return (null);\n    }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**Objective-C**\n\n```\n#import \"SuperClass.h\"\n\n@interface NewClass : SuperClass\
    \ {\n    int instanceVariable;\n}\n\n-method;\n-methodWithParameter:param;\n\n\
    @end\n\n@implementation NewClass\n\n-method\n{\n    return (nil);\n}\n\n-methodWithParameter:param\n\
    {\n    return (nil);\n}\n\n@end\n```\n\n代码清单 3-1 显示了在 Java 中定义 `NewClass` 类以及在\
    \ Objective-C 中定义等效类的过程。类定义的 `@interface` 部分通常放在头文件（`.h`）中，供其他模块引用，而 `@implementation`\
    \ 部分则放在源文件（`.m`）中。如果你需要复习 C 语言源文件组织方式，请参阅上一章的“`#include` 和 `#import`”部分。\n\n类声明的\
    \ `@interface` 部分包含两个部分。第一部分包含用花括号括起来的实例变量声明。这部分类似于 C 语言的结构体声明。变量声明之后是类的方法原型。连字符前缀表示该方法是实例方法。加号前缀表示类方法，类似于\
    \ Java 中的 `static` 方法。\n\n`@implementation` 指令包含在 `@interface` 部分中描述的方法的实际代码。声明一个方法却不实现它会导致错误，但相反的情况是允许的。Java\
    \ 的一个更优雅的设计特性是，一个类文件同时定义了类的接口和实现。在 Objective-C 中，程序员有责任保持接口和实现的一致性。\n\n`@interface`\
    \ 和 `@implementation` 部分都以 `@end` 指令结束。\n\n类继承的工作方式与 Java 相同。`NewClass` 类继承了 `SuperClass`\
    \ 类的所有实例变量和方法。在 `NewClass` 中声明一个与从 `SuperClass` 继承的方法同名的方法，会覆盖继承的方法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n> **注意** 始终在 `@interface` 声明中声明父类，即使父类是 `NSObject`。\n\n`NSObject` 是 Cocoa 框架中的逻辑根类，功能上等同于\
    \ Java 的 `Object` 类。但它并不是 Objective-C 的根类。Objective-C 的实际根类 `Object` 过于原始，其直接子类基本上没什么用。你不太可能想要创建一个\
    \ `Object` 的直接子类。\n\n## 对象指针\n\n包含指向 Objective-C 对象的指针的变量称为对象指针（引用）或对象标识符。两者都等同于\
    \ Java 的对象引用。\n\n代码清单 3-2 显示了声明对象指针的两种方式。对象指针可以声明为指向特定类的指针，也可以声明为通用对象标识符（`id`）。两者都包含指向对象内存地址的指针。区别在于编译器如何处理它们。\n\
    \n**代码清单 3-2. 对象指针声明**\n\n```\nSpecificClass *specificObject;\nid anyObject;\n\
    ```\n\n> **注意** 与 Java 一样，Objective-C 不允许变量包含对象的内容，只允许包含指向对象的指针（引用）。声明 `SpecificClass\
    \ object` 是无效的。这是 Objective-C 对象与 C 语言结构体不同的一个例子；变量可以包含整个 C 结构体或指向 C 结构体的指针，但只能声明指向\
    \ Objective-C 对象的指针。\n\n指向特定类的指针在大多数情况下类似于 Java 的对象引用。编译器假定该指针指向该类或其子类的对象。如果你尝试调用该类未定义或未继承的方法，编译器会发出警告。它只允许你访问该类定义或继承的实例变量。该指针隐式地与指向其任何父类的指针兼容，但与指向子类的指针不兼容。\n\
    \n特殊的对象标识符类型（`id`）是一种非特定的对象指针（引用）。它不等同于指向基类对象的指针，例如 `NSObject *obj`（`Object obj`）。编译器假定\
    \ `id` 类型的变量可以是任何类。编译器允许你调用任何已定义类中的任何方法。对象标识符可以赋值给任何类型的对象指针，也可以从任何类型的对象指针赋值，而不会产生编译器警告。你不能使用对象标识符直接访问对象的实例变量。\n"
- fmt: "# If You Declared Every Object Pointer as Type `id`\n\nIf you declared every\
    \ object pointer as type `id`, programming would be similar to some scripting\
    \ languages. The compiler would make no assumptions, allowing you to invoke any\
    \ method and assign the pointer to any other object pointer variable without complaint.\
    \ The appropriateness of those methods and assignments would be vetted at run\
    \ time.\n\nAt the other extreme, declaring every reference as a pointer to a specific\
    \ class results in a programming experience similar to Java. The compiler will\
    \ only allow method calls to those defined for the pointer’s class, and inappropriate\
    \ assignments will be flagged. The only significant difference is that in Java,\
    \ a cast from one class to another is checked at runtime; in Objective-C a cast\
    \ simply suppresses a compiler warning.\n\nReal-world Objective-C is a blend of\
    \ these two extremes. The `id` type is used where the class of an object is not\
    \ known, variable, or indeterminate. Strong, class-specific pointers, are used\
    \ everywhere else. For example, an `NSError` object contains a `recoveryAttempter`\
    \ object reference. It’s the object that will take responsibility for recovering\
    \ from the error. This variable has an `id` type since `NSError` makes no assumptions\
    \ about its class. Type `id` allows the property value to be set, assigned, or\
    \ used to call any method without casting. On the other hand, `NSErrors`' `domain`\
    \ and `userInfo` variables are declared as pointers to `NSString` (`String`) and\
    \ `NSDictionary` (`Map`) objects. There’s no ambiguity about what class of objects\
    \ is stored in these variables or what methods they implement.\n\nAll pointer\
    \ types are functionally identical at runtime. The compiled code retains no pointer\
    \ type information. The two pointers declared in Listing 3-2 will behave exactly\
    \ the same way when the code executes.\n\n# Sending Messages\n\nMethod invocation\
    \ syntax is the most dramatic difference between Java and Objective-C. A method\
    \ invocation consists of an object pointer (reference) and the name of the method\
    \ to execute, surrounded by brackets. Examples are shown in Listing 3-3.\n\n**Listing\
    \ 3-3\\. Objective-C Message Syntax**\n\n- **Java**\n\n```java\nobject.method();\n\
    object.method(param);\n```\n\n- **Objective-C**\n\n```objectivec\n[object method];\n\
    [object methodWithParam:param];\n```\n\nObjective-C does not call object methods,\
    \ as Java does. It sends messages to objects. This is more than a semantic difference.\n\
    \nJava works very much like C or C++ when you call a method. The method name in\
    \ the statement identifies the method to execute. The parameters of the call are\
    \ pushed onto the stack along with a return address. Execution flow is then transferred\
    \ to the method.\n\nObjective-C invokes a method by first pushing the parameters\
    \ of the method onto the stack. It then calls a central dispatching function,\
    \ passing it the object pointer and a compact method identifier called a selector.\
    \ This dispatching function uses the two to locate the object’s method and transfer\
    \ execution to the method’s code. The method executes and returns, just like any\
    \ C or Java method.\n\nThe difference might seem trivial, or even pointless, but\
    \ it is the key to Objective-C’s dynamism and is critical to several important\
    \ and unique language features. This will become more evident as you work through\
    \ the chapters of this book.\n\nTo underscore this concept, Objective-C uses different\
    \ language to describe the process of invoking methods. In Objective-C, you send\
    \ a message to an object. The calling object is the sender and the object whose\
    \ method is being invoked is the receiver. The term \"receiver\" is used extensively\
    \ in Objective-C, especially in documentation (as in the phrase \"... returns\
    \ the number of Unicode characters in the receiver\"). The terms \"method\" and\
    \ \"message\" are often used interchangeably.\n\n# Naming Methods\n\nObjective-C\
    \ method names are verbose, consisting of one or more keywords that naturally\
    \ describe each parameter. Listing 3-4 shows four hypothetical Objective-C methods\
    \ with none, one, two, and three parameters, respectively.\n\n**Listing 3-4\\\
    . Named Parameters**\n\n```objectivec\n-method;\n-methodWithParameter:parameter;\n\
    -methodWithContext:context object:object;\n-methodWithDialog:dialog message:message\
    \ behindWindow:window flags:mode;\n```\n\nThe first Objective-C declaration in\
    \ Listing 3-4 defines a method that takes no parameters. This is the Java equivalent\
    \ of `Object method()`. The second declaration defines a method taking one parameter,\
    \ equivalent to `Object method( Object parameter )`.\n\nThe identifier following\
    \ the colon is the name of the parameter variable; this is the variable name you\
    \ will use to reference the variable in the method’s code (e.g., `dialog`, `message`,\
    \ `window`, `mode`).\n\nThe name of the parameter variable and the keywords that\
    \ form the method’s name are in different name spaces. They can be the same or\
    \ different. Only the parameter variable name is in scope within the body of the\
    \ method’s implementation.\n\n> **Note:** As in Java, parameter names are in the\
    \ same scope as the object’s instance variables. An instance variable (say, `cell`)\
    \ and a parameter variable with the same name create some ambiguity. Like Java,\
    \ the symbol name by itself will always refer to the parameter or local variable.\
    \ The `cell` instance variable must then be addressed indirectly using `self->cell`\
    \ (`this.cell`). Unlike Java, the Objective-C compiler will complain with a warning\
    \ that \"the local declaration of 'cell' hides instance variable.\" To avoid the\
    \ warning, and any possible ambiguity, most Objective-C programmers choose parameter\
    \ names that don't conflict with any instance variables, electing to use names\
    \ like `aCell` or `newCell` instead of just `cell`.\n\nNaming methods in Objective-C\
    \ is a bit of an art. Objective-C method names are generally constructed using\
    \ one of the forms shown in Listing 3-5. The listing shows some abstract method\
    \ names followed by several real-world examples.\n\n**Listing 3-5\\. Method Naming\
    \ Examples**\n\n- **Simple actions:**\n  ```objectivec\n  -action;\n  -draw;\n\
    \  -play;\n  -becomeKeyWindow;\n  ```\n\n- **Action methods with a parameter:**\n\
    \  ```objectivec\n  -actionParameter:param;\n  -drawCell:cell;\n  -sendEvent:event;\n\
    \  ```\n\n- **Actions with multiple parameters:**\n  ```objectivec\n  -actionParameter:firstParam\
    \ secondParameter:secondParam;\n  -replaceSubview:oldView with:newView;\n  -postNotificationName:name\
    \ object:sender;\n  ```\n\n- **Methods returning a value:**\n  ```objectivec\n\
    \  -value;\n  -key;\n  -window;\n  -stringByExpandingTildeInPath;\n  ```\n\n-\
    \ **Methods with parameters that return a value:**\n  ```objectivec\n  -valuePrepositionParameter:parameter;\n\
    \  -objectForKey:key;\n  -stringByAppendingString:string;\n  -numberFromString:string;\n\
    \  ```\n\nReading and inventing your own names isn’t too difficult if you keep\
    \ the following in mind. The general form for a method name begins with a description\
    \ of the returned value (if any), followed by the action the method performs,\
    \ followed by a description of the first parameter (if any). A method named `-menuForEvent:`\
    \ can be reasonably assumed to take an `NSEvent` object as a parameter and return\
    \ an `NSMenu` object. Subsequent keywords describe that parameter and often include\
    \ a preposition such as \"in,\" \"to,\" or \"with.\" The parameter’s description\
    \ is sometimes implied, as in `-replaceSubview:oldView with:newView`. Avoid including\
    \ superfluous verbs like \"do\" or \"does.\"\n\nObjective-C does not support the\
    \ overloading of method names that differ only in their parameter types the way\
    \ Java does. But it really isn’t necessary. If two Objective-C methods differ\
    \ only in their parameters, the methods will have different names: `-drawRect:rect`,\
    \ `-drawCell:cell`, `-drawPage:page` instead of the equivalent overloaded Java\
    \ functions `draw( Rect rect )`, `draw( Cell cell )`, `draw( Page page )`.\n\n\
    There are no hard and fast rules for naming methods. The principal goal is readability."
  raw: 'If you declared every object pointer as type id, programming would be similar
    to some scripting languages. The compiler would make no assumptions, allowing
    you to invoke any method and assign the pointer to any other object pointer variable
    without complaint. The appropriateness of those methods and assignments would
    be vetted at run time.


    At the other extreme, declaring every reference as a pointer to a specific class
    results in a programming experience similar to Java. The compiler will only allow
    method calls to those defined for the pointer’s class, and inappropriate assignments
    will be flagged. The only significant difference is that 29


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ WELCOME TO OBJECTIVE-C


    in Java, a cast from one class to another is checked at runtime; in Objective-C
    a cast simply suppresses a compiler warning.


    Real-world Objective-C is a blend of these two extremes. The id type is used where
    the class of an object is not known, variable, or indeterminate. Strong, class-specific
    pointers, are used everywhere else. For example, an NSError object contains a
    recoveryAttempter object reference. It’s the object that will take responsibility
    for recovering from the error. This variable has an id type since NSError makes
    no assumptions about its class. Type id allows the property value to be set, assigned,
    or used to call any method without casting. On the other hand, NSErrors’ domain
    and userInfo variables are declared as pointers to NSString (String) and NSDictionary
    (Map) objects. There’s no ambiguity about what class of objects is stored in these
    variables or what methods they implement.


    All pointer types are functionally identical at runtime. The compiled code retains
    no pointer type information. The two pointers declared in Listing 3-2 will behave
    exactly the same way when the code executes.


    Sending Messages


    Method invocation syntax is the most dramatic difference between Java and Objective-C.
    A method invocation consists of an object pointer (reference) and the name of
    the method to execute, surrounded by brackets. Examples are shown in Listing 3-3.


    Listin g 3-3\. Objective-C Message Syntax


    **Java**


    object.method();


    object.method(param);


    **Objective-C**


    [object method];


    [object methodWithParam:param];


    Objective-C does not call object methods, as Java does. It sends messages to objects.
    This is more than a semantic difference.


    Java works very much like C or C++ when you call a method. The method name in
    the statement identifies the method to execute. The parameters of the call are
    pushed onto the stack along with a return address. Execution flow is then transferred
    to the method.


    Objective-C invokes a method by first pushing the parameters of the method onto
    the stack. It then calls a central dispatching function, passing it the object
    pointer and a compact method identifier called a selector. This dispatching function
    uses the two to locate the object’s method and transfer execution to the method’s
    code. The method executes and returns, just like any C or Java method.


    The difference might seem trivial, or even pointless, but it is the key to Objective-C’s
    dynamism and is critical to several important and unique language features. This
    will become more evident as you work through the chapters of this book.


    To underscore this concept, Objective-C uses different language to describe the
    process of invoking methods. In Objective-C, you send a message to an object.
    The calling object is the sender and the object whose method is being invoked
    is the receiver. The term receiver is used extensively in Objective-C, especially
    in documentation (as in the phrase “… returns the number of Unicode characters
    in the receiver”). The terms “method” and “message” are often used interchangeably.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ WELCOME TO OBJECTIVE-C


    Naming Methods


    Objective-C method names are verbose, consisting of one or more keywords that
    naturally describe each parameter. Listing 3-4 shows four hypothetical Objective-C
    methods with none, one, two, and three parameters, respectively.


    Listin g 3-4\. Named Parameters


    -method;


    -methodWithParameter:parameter;


    -methodWithContext:context object:object;


    -methodWithDialog:dialog message:message behindWindow:window flags:mode; The first
    Objective-C declaration in Listing 3-4 defines a method that takes no parameters.
    This is the Java equivalent of Object method(). The second declaration defines
    a method taking one parameter, equivalent to Object method( Object parameter ).


    The identifier following the colon is the name of the parameter variable; this
    is the variable name you will use to reference the variable in the method’s code
    (e.g., dialog, message, window, mode).


    The name of the parameter variable and the keywords that form the method’s name
    are in different name spaces. They can be the same or different. Only the parameter
    variable name is in scope within the body of the method’s implementation.


    ■Note As in Java, parameter names are in the same scope as the object’s instance
    variables. An instance variable (say, cell) and a parameter variable with the
    same name create some ambiguity. Like Java, the symbol name by itself will always
    refer to the parameter or local variable. The cell instance variable must then
    be addressed indirectly using self->cell (this.cell). Unlike Java, the Objective-C
    compiler will complain with a warning that “the local declaration of ‘cell’ hides
    instance variable.” To avoid the warning, and any possible ambiguity, most Objective-C
    programmers choose parameter names that don’t conflict with any instance variables,
    electing to use names like aCell or newCell instead of just cell.


    Naming methods in Objective-C is a bit of an art. Objective-C method names are
    generally constructed using one of the forms shown in Listing 3-5\. The listing
    shows some abstract method names followed by several real-world examples.


    Listin g 3-5\. Method Naming Examples


    Simple actions:


    **-action;**


    -draw;


    -play;


    -becomeKeyWindow;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ WELCOME TO OBJECTIVE-C


    Action methods with a parameter:


    **-actionParameter:param;**


    -drawCell:cell;


    -sendEvent:event;


    Actions with multiple parameters:


    **-actionParameter:firstParam secondParameter:secondParam;**


    -replaceSubview:oldView with:newView;


    -postNotificationName:name object:sender;


    Methods returning a value:


    **-value;**


    -key;


    -window;


    -stringByExpandingTildeInPath;


    Methods with parameters that return a value:


    **-valuePrepositionParameter:parameter;**


    -objectForKey:key;


    -stringByAppendingString:string;


    -numberFromString:string;


    Reading and inventing your own names isn’t too difficult if you keep the following
    in mind. The general form for a method name begins with a description of the returned
    value (if any), followed by the action the method performs, followed by a description
    of the first parameter (if any). A method named


    -menuForEvent: can be reasonably assumed to take an NSEvent object as a parameter
    and return an NSMenu object. Subsequent keywords describe that parameter and often
    include a preposition such as


    “in,” “to,” or “with.” The parameter’s description is sometimes implied, as in
    -replaceSubview:oldView with:newView. Avoid including superfluous verbs like “do”
    or “does.”


    Objective-C does not the support overloading of method names that differ only
    in their parameter types the way Java does. But it really isn’t necessary. If
    two Objective-C methods differ only in their parameters, the methods will have
    different names: -drawRect:rect, -drawCell:cell,


    -drawPage:page instead of the equivalent overloaded Java functions draw( Rect
    rect ), draw( Cell cell ), draw( Page page ).


    There are no hard and fast rules for naming methods. The principal goal is readability.'
  trans: "\n# 如果你把所有对象指针都声明为 `id` 类型\n\n如果你把所有对象指针都声明为 `id` 类型，编程风格将类似于某些脚本语言。编译器不做任何假设，允许你调用任何方法，并将指针赋值给任何其他对象指针变量，而不会报错。这些方法和赋值的恰当性将在运行时进行检验。\n\
    \n在另一个极端，如果你将每个引用都声明为指向特定类的指针，编程体验则类似于 Java。编译器只允许调用指针类中定义的方法，并会标记不当的赋值行为。唯一显著的区别是，在\
    \ Java 中，从一种类型强制转换为另一种类型会在运行时检查；而在 Objective-C 中，强制转换仅是简单地抑制编译器警告。\n\n实际应用中的 Objective-C\
    \ 是这两种极端的结合。当对象的类未知、可变或不确定时，会使用 `id` 类型。而在其他所有情况下，则使用强类型、特定类的指针。例如，`NSError` 对象包含一个\
    \ `recoveryAttempter` 对象引用。这个对象负责从错误中恢复。由于 `NSError` 不对其类做任何假设，这个变量的类型是 `id`。`id`\
    \ 类型允许在不进行强制转换的情况下设置、赋值或调用该属性值上的任何方法。另一方面，`NSError` 的 `domain` 和 `userInfo` 变量被声明为指向\
    \ `NSString`（字符串）和 `NSDictionary`（字典）对象的指针。这些变量存储何种类的对象以及它们实现了哪些方法，都不存在歧义。\n\n\
    在运行时，所有指针类型在功能上都是相同的。编译后的代码不保留任何指针类型信息。在代码执行时，清单 3-2 中声明的两个指针的行为将完全相同。\n\n# 发送消息\n\
    \n方法调用语法是 Java 和 Objective-C 之间最显著的区别。一个方法调用由一个对象指针（引用）和要执行的方法名称组成，并用方括号括起来。清单\
    \ 3-3 中展示了一些示例。\n\n**清单 3-3\\. Objective-C 消息语法**\n\n- **Java**\n\n```java\nobject.method();\n\
    object.method(param);\n```\n\n- **Objective-C**\n\n```objectivec\n[object method];\n\
    [object methodWithParam:param];\n```\n\n与 Java 不同，Objective-C 不调用对象方法。它向对象发送消息。这不仅仅是语义上的差异。\n\
    \n当你调用方法时，Java 的工作方式与 C 或 C++ 非常相似。语句中的方法名称标识了要执行的方法。调用的参数连同返回地址一起被压入栈中。然后执行流转移到该方法。\n\
    \nObjective-C 调用方法时，首先将方法的参数压入栈中。然后，它调用一个中央分发函数，并将对象指针和一个称为选择器的紧凑型方法标识符传递给它。这个分发函数使用这两者来定位对象的方法，并将执行转移到该方法的代码。方法执行并返回，就像任何\
    \ C 或 Java 方法一样。\n\n这种差异可能看起来微不足道，甚至毫无意义，但它是 Objective-C 动态特性的关键，并且对于几个重要且独特的语言特性至关重要。当你阅读本书的各个章节时，这一点会变得更加明显。\n\
    \n为了强调这一概念，Objective-C 使用不同的语言来描述调用方法的过程。在 Objective-C 中，你向对象发送一条消息。调用对象是发送者，其方法被调用的对象是接收者。术语“接收者”在\
    \ Objective-C 中被广泛使用，尤其是在文档中（例如短语“……返回接收者中 Unicode 字符的数量”）。“方法”和“消息”这两个术语通常可以互换使用。\n\
    \n# 命名方法\n\nObjective-C 方法名称很冗长，由一个或多个自然描述每个参数的关键词组成。清单 3-4 展示了四个假设的 Objective-C\
    \ 方法，分别带有零个、一个、两个和三个参数。\n\n**清单 3-4\\. 命名参数**\n\n```objectivec\n-method;\n-methodWithParameter:parameter;\n\
    -methodWithContext:context object:object;\n-methodWithDialog:dialog message:message\
    \ behindWindow:window flags:mode;\n```\n\n清单 3-4 中的第一个 Objective-C 声明定义了一个不带参数的方法。这等同于\
    \ Java 的 `Object method()`。第二个声明定义了一个带一个参数的方法，等同于 `Object method( Object parameter\
    \ )`。\n\n冒号后面的标识符是参数变量的名称；这是你将在方法代码中用于引用该变量的变量名（例如，`dialog`、`message`、`window`、`mode`）。\n\
    \n参数变量的名称和构成方法名称的关键词位于不同的命名空间中。它们可以相同，也可以不同。在方法实现的主体中，只有参数变量名在作用域内。\n\n> **注意：**\
    \ 与 Java 一样，参数名与对象的实例变量在同一个作用域内。一个实例变量（例如，`cell`）和一个同名的参数变量会造成一些歧义。与 Java 一样，单独的符号名称始终引用参数或局部变量。`cell`\
    \ 实例变量则必须使用 `self->cell` 间接寻址。与 Java 不同，Objective-C 编译器会发出警告，提示“'cell' 的局部声明隐藏了实例变量”。为避免警告和任何可能的歧义，大多数\
    \ Objective-C 程序员会选择不与任何实例变量冲突的参数名称，例如使用 `aCell` 或 `newCell` 这样的名称，而不是仅仅使用 `cell`。\n\
    \n在 Objective-C 中命名方法是一门艺术。Objective-C 方法名称通常使用清单 3-5 中所示的形式之一构建。该清单显示了一些抽象的方法名称，后面跟着几个真实世界的例子。\n\
    \n**清单 3-5\\. 方法命名示例**\n\n- **简单操作：**\n  ```objectivec\n  -action;\n  -draw;\n\
    \  -play;\n  -becomeKeyWindow;\n  ```\n\n- **带参数的操作方法：**\n  ```objectivec\n  -actionParameter:param;\n\
    \  -drawCell:cell;\n  -sendEvent:event;\n  ```\n\n- **带多个参数的操作：**\n  ```objectivec\n\
    \  -actionParameter:firstParam secondParameter:secondParam;\n  -replaceSubview:oldView\
    \ with:newView;\n  -postNotificationName:name object:sender;\n  ```\n\n- **返回值的方法：**\n\
    \  ```objectivec\n  -value;\n  -key;\n  -window;\n  -stringByExpandingTildeInPath;\n\
    \  ```\n\n- **带参数并返回值的方法：**\n  ```objectivec\n  -valuePrepositionParameter:parameter;\n\
    \  -objectForKey:key;\n  -stringByAppendingString:string;\n  -numberFromString:string;\n\
    \  ```\n\n如果你牢记以下几点，阅读和发明你自己的方法名称就不会太困难。方法名称的通用形式以对返回值的描述（如果有）开头，然后是方法执行的操作，最后是对第一个参数（如果有）的描述。一个名为\
    \ `-menuForEvent:` 的方法可以合理地推测为接受一个 `NSEvent` 对象作为参数，并返回一个 `NSMenu` 对象。后续的关键词描述该参数，并且通常包含一个介词，例如“in”、“to”或“with”。参数的描述有时是隐含的，例如在\
    \ `-replaceSubview:oldView with:newView` 中。避免包含多余的动词，如“do”或“does”。\n\nObjective-C\
    \ 不像 Java 那样支持仅参数类型不同而方法名称相同的方法重载。但这实际上并无必要。如果两个 Objective-C 方法仅参数不同，它们将具有不同的名称：`-drawRect:rect`、`-drawCell:cell`、`-drawPage:page`，而不是\
    \ Java 中等价的重载函数 `draw( Rect rect )`、`draw( Cell cell )`、`draw( Page page )`。\n\
    \n没有一成不变的规则来命名方法。主要目标是可读性。\n"
- fmt: "# Objective-C 方法命名与特性\n\n## 方法命名的可读性\n\n**Objective-C**方法名赋予了代码一种令人耳目一新的冗长性，使其更具自解释性。清单3-6展示了两个将子串\
    \ `\"Walrus\"` 提取到字符数组中的代码片段。\n\n**清单 3-6. 方法命名示例**\n\n**Java**\n\n```java\nchar\
    \ c[] = new char[20];\nString s = \"The time has come, the Walrus said ...\";\n\
    s.getChars(23,29,c,1);\n```\n\n**Objective-C**\n\n```objectivec\nunichar c[20];\n\
    NSString *s = @\"The time has come, the Walrus said ...\";\n[s getCharacters:&c[1]\
    \ range:NSMakeRange(23,6)];\n```\n\n代码短语 `getCharacters:&c[1] range:NSMakeRange(23,6)`\
    \ 比 `(23,29,c,1)` 更具描述性。很明显，第一个参数涉及字符，第二个参数是一个范围。\n\n这在参数较多的方法中尤为有用。当 **Objective-C**\
    \ 方法名变得异常长时，格式约定是将每个参数放在单独一行，并水平对齐冒号，如清单3-7所示。**Xcode**编辑器以及其他支持 **Objective-C**\
    \ 的文本编辑器会自动执行此操作。\n\n**清单 3-7. 多行消息**\n\n```objectivec\nNSString *new = [s stringByReplacingOccurrencesOfString:@\"\
    Walrus\"\n                                          withString:@\"Carpenter\"\n\
    \                                             options:NSLiteralSearch\n      \
    \                                         range:NSMakeRange(20,10)];\n```\n\n\
    ## 参数和返回类型\n\n与 **Java** 一样，**Objective-C** 方法可以向调用者返回单个值。到目前为止展示的方法都省略了返回类型和参数类型。这是为了专注于方法声明和命名的基础。参数和返回类型在方法名或参数变量名之前的圆括号中指定，非常类似于类型转换。清单3-8展示了一些示例。\n\
    \n**清单 3-8. 参数和返回类型**\n\n```objectivec\n- (id)objectForKey:(id)aKey\n- (NSMenuItem*)itemWithTag:(NSInteger)aTag;\n\
    - (unichar)characterAtIndex:(NSUInteger)index;\n- (NSString*)stringByAddingPercentEscapesUsingEncoding:(NSStringEncoding)encoding;\n\
    - (void)runInNewThread;\n- (void)addAttribute:(NSString*)name value:(id)value\
    \ range:(NSRange)aRange;\n```\n\n如果省略类型，则默认为非特定对象标识符类型（`id`）。声明 `-objectForKey:key`\
    \ 和 `-(id)objectForKey:(id)key` 是相同的。为了清晰起见，**Objective-C** 程序员始终指定所有参数和返回值的类型，即使类型是\
    \ `id`。\n\n参数类型可以是任何有效的 **C** 或 **Objective-C** 变量类型。通常是简单类型，如数字基本类型（`int`）、对象指针（`id`\
    \ 或 `NSColumn*`）或小型结构体（`NSPoint`）。方法参数和返回值始终通过拷贝传递，因此任何可以使用赋值运算符（`=`）赋值的类型都可以作为参数传递。如前所述，**Objective-C**\
    \ 不允许声明变量为 **Objective-C** 对象——只能声明指向 **Objective-C** 对象的指针。因此，不能传递 **Objective-C**\
    \ 对象的副本作为参数，只能传递指向该对象的指针（引用）的副本。因此，不能声明方法 `-(NSString)description`，但可以声明方法 `-(NSString*)description`。\n\
    \n除了有效的变量类型外，方法的返回类型也可以是 `(void)`，表示它不返回任何值。如果尝试使用 `void` 方法的返回值，编译器会发出警告。如果尝试从\
    \ `void` 方法返回值，或者未能从非 `void` 方法返回值，编译器也会发出警告。\n\n## 方法选择器\n\n一个 **Objective-C**\
    \ 方法的完整名称（不含参数变量名和任何类型）构成了其唯一标识符。方法 `-(NSFont*)fontWithFamily:(NSString*)family\
    \ traits:(NSFontTraitMask)fontTraitMask weight:(NSInteger)weight size:(CGFloat)size`\
    \ 的标识符是 `fontWithFamily:traits:weight:size:`。这相当于 **Java** 中的方法签名。该标识符的具体体现是一个称为\
    \ **选择器（selector）** 的数值常量。选择器是类型 `SEL` 的值。\n\n**Objective-C** 指令 `@selector()`\
    \ 返回括号内方法标识符的选择器值，例如 `SEL selector = @selector(fontWithFamily:traits:weight:size:)`。\n\
    \n> **注意**：人们很容易将方法名中的关键字视为参数名，但这在技术上并不准确。与具有命名参数的语言不同，**Objective-C** 方法的参数不能省略或重新排列。方法\
    \ `-sendMessage:toRecipient:withAttachement:` 和 `-sendMessage:withAttachement:toRecipient:`\
    \ 是具有唯一签名的不同方法。\n\n选择器在内部用于向对象分发消息。它们可以在编程中用于发送消息、注册消息、执行内省以及后续章节描述的其他技巧。\n\n\
    在文档和程序员之间的交流中，方法名通常像调用一样书写，包括类名和方法标识符。程序员在引用 `NSFontManager` 类定义的实例方法 `fontWithFamily:traits:weight:size:`\
    \ 时，可能会写成 `-[NSFontManager fontWithFamily:traits:weight:size:]`。这是无意义的代码，但简洁地描述了该方法。\n\
    \n## 实例变量\n\n实例变量在类的 `@interface` 指令中声明，如清单3-1所示。这与 **Java** 几乎相同，唯一的微小限制是所有实例变量声明必须组合在一个单独的块中。与\
    \ **Java** 一样，实例方法访问实例变量就像访问局部变量一样。\n\n> **注意**：实例变量和方法名称传统上使用“驼峰命名法”——它们以小写字母开头，并使用大写字母分隔单词。以\
    \ `_`（下划线）开头的实例变量和方法名称由 **Cocoa** 框架保留，应避免使用。\n\n你也看到了如何使用间接成员运算符直接访问另一个对象中的成员变量，例如\
    \ `object->value = 1`（实际上应写为 `object->value = 1`，而非 `object.value = 1`，后者是 **Java**\
    \ 语法）。在 **Java** 中通常不会这样做。良好的 **Java** 实践鼓励使用访问器（getter）和修改器（setter）方法，以将变量的实现与外部代码隔离。实例变量应声明为\
    \ `protected` 或 `private`，并使用 `int getValue()` 和 `void setValue( int value )`\
    \ 方法来获取和设置其值。\n\n良好的 **Objective-C** 实践遵循与 **Java** 相同的原则，原因与 **Java** 相同，甚至更多。在\
    \ **Objective-C** 中，实例变量 `int value` 可通过 `-(int)value` 和 `-(void)setValue:(int)newValue`\
    \ 方法访问。**Objective-C** 非常鼓励使用访问器方法，以至于访问器方法的定义和构造已以内置属性的形式融入语言中。如何声明属性将在关于 `isa`\
    \ 变量的章节之后立即描述。\n\n> **注意**：**Objective-C** 使用名称 `value` 和 `setValue` 作为获取和设置属性值的方法，而不是\
    \ **Java** 中更常见的 `getValue` 和 `setValue`。使用内省通过访问器方法识别属性的技术通常接受 `getValue` 形式作为替代，但首选\
    \ `value` 形式作为 getter。\n\n## `isa`\n\n**Objective-C** 中的每个对象都继承了一个 `isa` 实例变量；`isa`\
    \ 字面上定义了对象的类。"
  raw: 'Objective-C method names lend a refreshing verboseness to code that makes
    it much more self-explanatory. Listing 3-6 shows two code fragments that extract
    the substring “Walrus” into a character array.


    Listin g 3-6\. M ethod Nam e Ex ample


    **Java**


    char c[] = new char[20];


    String s = "The time has come, the Walrus said ..."; s.getChars(23,29,c,1);


    **Objective-C**


    unichar c[20];


    NSString *s = @"The time has come, the Walrus said ...";


    [s getCharacters:&c[1] range:NSMakeRange(23,6)];


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ WELCOME TO OBJECTIVE-C


    The code phrase getCharacters:c range:NSMakeRange(23,6) is more descriptive than
    (23,29,c,1). It is clear that the first parameter involves characters and the
    second parameter is a range.


    This becomes especially helpful with methods that have many parameters. When Objective-C
    method names become exceptionally long, the formatting convention is to place
    each parameter on its own line, horizontally aligning the colons as shown in Listing
    3-7\. The Xcode editor, as well as other Objective-C–


    savvy text editors, will do this automatically.


    Listin g 3-7\. Multiline Message


    NSString *new = [s stringByReplacingOccurrencesOfString:@"Walrus"


    withString:@"Carpenter"


    options:NSLiteralSearch


    range:NSMakeRange(20,10)];


    Parameter and Return Types


    Like Java, an Objective-C method can return a single value to the caller. The
    methods presented so far have omitted the return type and the types of the parameters.
    I did that intentionally to focus on the basics of method declaration and naming.
    Parameter and return types are specified in parentheses before the method name
    or parameter variable name, very much like a type cast. Some examples are shown
    in Listing 3-8.


    Listin g 3-8\. Parameter and Return Types


    - (id)objectForKey:(id)aKey


    - (NSMenuItem*)itemWithTag:(NSInteger)aTag;


    - (unichar)characterAtIndex:(NSUInteger)index;


    - (NSString*)stringByAddingPercentEscapesUsingEncoding:(NSStringEncoding)encoding;


    - (void)runInNewThread;


    - (void)addAttribute:(NSString*)name value:(id)value range:(NSRange)aRange; If
    the type is omitted, the non-specific object identifier type (id) is implied.
    The declarations


    -objectForKey:key; and -(id)objectForKey:(id)key; are identical. For clarity,
    Objective-C


    programmers invariably specify the types of all parameters and return values,
    even when the type is id.


    A parameter type can be any valid C or Objective-C variable type. Usually they
    are simple types such as numeric primitives (int), object pointers (id or NSColumn*),
    or small structures (NSPoint). Method parameters and return values are always
    passed by copy, so any type that can be assigned using the assignment operator
    (=) can be passed as a parameter. As mentioned earlier, Objective-C does not allow
    you to declare a variable to be an Objective-C object—you can only declare pointers
    to Objective-C


    objects. By extension, you cannot pass a copy of an Objective-C object as a parameter,
    only a copy of the pointer (reference) to the object. Thus, you cannot declare
    the method -(NSString)description, but you can declare the method -(NSString*)description.


    In addition to valid variable types, the return type of a method can also be (void),
    indicating that it does not return any value. The compiler will warn you if you
    attempt to use the return value of a void method. It will also warn you if you
    attempt to return a value from a void method, or fail to return a value from a
    non-void method.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ WELCOME TO OBJECTIVE-C


    Method Selectors


    An Objective-C method’s complete name, sans the parameter variable names and any
    types, forms its unique identifier. The identifier for the method -(NSfont*)fontWithFamily:(NSString*)family
    traits:(NSFontTraitMask)fontTraitMask weight:(NSInteger)weight size:(CGFloat)size
    is fontWithFamily:traits:weight:size:. This is equivalent to a method signature
    in Java. The concrete embodiment of this identifier is a numeric constant called
    a selector. Selectors are values of type SEL.


    The Objective-C directive @selector() evaluates to the selector value of the method
    identifier in parentheses, as in SEL selector = @selector(fontWithFamily:traits:weight:size:).


    ■Note It’s tempting to think of the keywords in a method name as parameter names,
    but this is not technically accurate. Unlike languages with named parameters,
    the parameters of an Objective-C method cannot be omitted or rearranged. The methods
    -sendMessage:toRecipient:withAttachement: and


    -sendMessage:withAttachement:toRecipient: are distinct methods with unique signatures.


    Selectors are used internally to dispatch messages to objects. They can be used
    programmatically to send messages, register for messages, perform introspection,
    and other tricks described in later chapters.


    In documentation and in communications between programmers, method names are often
    written like an invocation with the class name and method identifier. A programmer
    might write


    “-[NSFontManager fontWithFamily:traits:weight:size:]” when referring to the fontWithFamily:traits:weight:size:
    instance method defined by the NSFontManager class. It’s nonsense code, but concisely
    describes the method.


    Instance Variables


    Instance variables are declared in the @interface directive of the class, as was
    shown in Listing 3-1\. This is virtually identical to Java, with the minor restriction
    that all instance variable declarations are grouped together in a single block.
    Like Java, instance methods access instance variables as if they were local variables.


    ■Note Instance variable and method names traditionally use “camel case”—they begin
    with a lowercase letter and use uppercase letters to delineate words. Instance
    variable and method names that begin with an underscore (_) are reserved by the
    Cocoa framework and should be avoided.


    You’ve also seen how the indirect member operator is used to directly address
    a member variable in another object, as in object->value = 1 (object.value = 1).
    In Java you normally wouldn’t do that. Good Java practices encourage the use of
    accessor (getter) and mutator (setter) methods to insulate the variable’s implementation
    from external code. The instance variable would be declared protected or private,
    and the methods int getValue() and void setValue( int value ) would be used to
    get and set its value.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ WELCOME TO OBJECTIVE-C


    Good Objective-C follows the same practice for all of the reasons Java does and
    a few more. In Objective-C, the instance variable int value would be accessible
    via the methods -(int)value and


    -(void)setValue:(int)newValue. Objetive-C encourages the use of accessor methods
    so much, the definition and construction of accessor methods has been built into
    the language in the form of properties. How to declare properties is described
    immediately after the section on the isa variable.


    ■Note Objective-C uses the names “value” and “setValue” for the methods that get
    and set the property value, rather than “getValue” and “setValue” which are more
    common in Java. Technologies that use introspection to identify properties via
    accessor methods will often accept the “getValue” form as an alternative, but
    the “value”


    form for getters is preferred.


    isa


    Every object in Objective-C inherits an isa instance variable; isa literally defines
    the class of the object.'
  trans: "\n# Objective-C 方法命名与特性\n\n## 方法命名的可读性\n\n**Objective-C** 方法名赋予了代码一种令人耳目一新的冗长性，使其更具自解释性。清单\
    \ 3-6 展示了两个将子串 `\"Walrus\"` 提取到字符数组中的代码片段。\n\n**清单 3-6. 方法命名示例**\n\n**Java**\n\
    \n```java\nchar c[] = new char[20];\nString s = \"The time has come, the Walrus\
    \ said ...\";\ns.getChars(23,29,c,1);\n```\n\n**Objective-C**\n\n```objectivec\n\
    unichar c[20];\nNSString *s = @\"The time has come, the Walrus said ...\";\n[s\
    \ getCharacters:&c[1] range:NSMakeRange(23,6)];\n```\n\n代码短语 `getCharacters:&c[1]\
    \ range:NSMakeRange(23,6)` 比 `(23,29,c,1)` 更具描述性。很明显，第一个参数涉及字符，第二个参数是一个范围。\n\n\
    这在参数较多的方法中尤为有用。当 **Objective-C** 方法名变得异常长时，格式约定是将每个参数放在单独一行，并水平对齐冒号，如清单 3-7 所示。**Xcode**\
    \ 编辑器以及其他支持 **Objective-C** 的文本编辑器会自动执行此操作。\n\n**清单 3-7. 多行消息**\n\n```objectivec\n\
    NSString *new = [s stringByReplacingOccurrencesOfString:@\"Walrus\"\n        \
    \                                  withString:@\"Carpenter\"\n               \
    \                              options:NSLiteralSearch\n                     \
    \                          range:NSMakeRange(20,10)];\n```\n\n## 参数和返回类型\n\n与\
    \ **Java** 一样，**Objective-C** 方法可以向调用者返回单个值。到目前为止展示的方法都省略了返回类型和参数类型。这是为了专注于方法声明和命名的基础。参数和返回类型在方法名或参数变量名之前的圆括号中指定，非常类似于类型转换。清单\
    \ 3-8 展示了一些示例。\n\n**清单 3-8. 参数和返回类型**\n\n```objectivec\n- (id)objectForKey:(id)aKey\n\
    - (NSMenuItem*)itemWithTag:(NSInteger)aTag;\n- (unichar)characterAtIndex:(NSUInteger)index;\n\
    - (NSString*)stringByAddingPercentEscapesUsingEncoding:(NSStringEncoding)encoding;\n\
    - (void)runInNewThread;\n- (void)addAttribute:(NSString*)name value:(id)value\
    \ range:(NSRange)aRange;\n```\n\n如果省略类型，则默认为非特定对象标识符类型（`id`）。声明 `-objectForKey:key`\
    \ 和 `-(id)objectForKey:(id)key` 是相同的。为了清晰起见，**Objective-C** 程序员始终指定所有参数和返回值的类型，即使类型是\
    \ `id`。\n\n参数类型可以是任何有效的 **C** 或 **Objective-C** 变量类型。通常是简单类型，如数字基本类型（`int`）、对象指针（`id`\
    \ 或 `NSColumn*`）或小型结构体（`NSPoint`）。方法参数和返回值始终通过拷贝传递，因此任何可以使用赋值运算符（`=`）赋值的类型都可以作为参数传递。如前所述，**Objective-C**\
    \ 不允许声明变量为 **Objective-C** 对象——只能声明指向 **Objective-C** 对象的指针。因此，不能传递 **Objective-C**\
    \ 对象的副本作为参数，只能传递指向该对象的指针（引用）的副本。因此，不能声明方法 `-(NSString)description`，但可以声明方法 `-(NSString*)description`。\n\
    \n除了有效的变量类型外，方法的返回类型也可以是 `(void)`，表示它不返回任何值。如果尝试使用 `void` 方法的返回值，编译器会发出警告。如果尝试从\
    \ `void` 方法返回值，或者未能从非 `void` 方法返回值，编译器也会发出警告。\n\n## 方法选择器\n\n一个 **Objective-C**\
    \ 方法的完整名称（不含参数变量名和任何类型）构成了其唯一标识符。方法 `-(NSFont*)fontWithFamily:(NSString*)family\
    \ traits:(NSFontTraitMask)fontTraitMask weight:(NSInteger)weight size:(CGFloat)size`\
    \ 的标识符是 `fontWithFamily:traits:weight:size:`。这相当于 **Java** 中的方法签名。该标识符的具体体现是一个称为\
    \ **选择器（selector）** 的数值常量。选择器是类型 `SEL` 的值。\n\n**Objective-C** 指令 `@selector()`\
    \ 返回括号内方法标识符的选择器值，例如 `SEL selector = @selector(fontWithFamily:traits:weight:size:)`。\n\
