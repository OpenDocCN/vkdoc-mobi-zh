    An example of reference counting is shown in Listing 24-2.


    Listin g 24-2\. Fundamental Reference Counting Pattern


    id myObject = [[MyClass alloc] init];


    …


    [myObject doSomething];


    …


    [myObject release];


    In Listing 24-2, the reference points to an object that was just created. Newly
    created objects have an implicit reference count of 1 (or they wouldn’t exist).
    The program uses the object, and then sends it a -release message to indicate
    that it will never use that object again. The -release message decrements the
    object’s retain count and immediately destroys the object. This assumes that no
    other object or code -retained the object in the interim. If so, the object would
    continue to exist because it still had at least one owner.


    In practice, managing release counts manually isn’t as onerous as it might seem.
    The next few sections will explain the role of autorelease pools and describe
    the common programming patterns for using reference counting with objects. Autorelease
    pools are brilliant, and the patterns are easy to apply.


    If consistently applied—and that’s a big “if”—reference counting provides an experience
    that’s equivalent to using garbage collection about 80 percent of the time. In
    fact the biggest problem you’re likely to encounter, coming from a garbage collection
    environment, is forgetting to apply the required patterns the remaining 20 percent
    of the time.


    Autorelease Pools


    Autorelease pools add the very garbage collection–like concept of deferring the
    destruction of an unreferenced object until some unspecified time in the future.
    Autorelease pools seem to mystify many new Objective-C programmers, but they are
    stunningly simple:


    • An autorelease pool is a collection of objects that will eventually receive
    a -release message.


    That’s it. To use an autorelease pool, send an object an -autorelease message
    instead of a


    -release message. The receiver is not immediately released; it is simply added
    to the autorelease pool.


    Later—usually long after your code has finished—the pool is drained and each object
    in the pool receives its -release message.


    The cardinal rule to remember is this: release an object by sending it either
    a -release or an


    -autorelease message, but never both. The two messages are logically equivalent
    and differ only in timing. The former releases the object immediately. The latter
    adds it to the autorelease pool, to be released at some future time.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 24 ■ MEMORY MANAGEMENT


    To illustrate what autorelease pools do for you, the next few sections describe
    some fundamental problems with reference counting and how autorelease pools avoid
    them.


    Autorelease Pool Lifetime


    Normally, you don’t create autorelease pools yourself. (A later section in this
    chapter explains why, and how, you would.) For the most part, always assume that
    there’s an active autorelease pool and the


    -autorelease message will add the receiver to the current pool. Despite their
    vague assurances of


    “eventually” releasing objects, autorelease pools have a very definite lifespan.
    Most autorelease pools are created by the working run loop at the beginning of
    each event dispatch. The pool is drained after the code that handled the event
    has returned. This mechanism defines an important rule about the lifespan of autorelease
    pools:


    • The current autorelease pool will never be drained before your method or function
    returns.


    The importance of this rule probably isn’t immediately obvious, but it will be
    as you work through the next few sections.


    Returned References


    The reference counting rules laid out in the previous section appear simple and
    sound, but they actually contain one huge flaw: how do you release an object (decrease
    its reference count) after the code no longer has a pointer to it? You could avoid
    this situation in many cases with careful coding, but there’s one inescapable
    case where you can’t—returning an object reference to the sender. Using the reference
    counting rules learned so far, you’d probably be tempted to write something like
    the code shown in Listing 24-3.


    Listin g 24-3\. Retain and Return Problem


    @implementation Zombie


    - (void)recitePoetry


    {


    NSString *myName = [[self zombieName] retain];


    [self speakFormat:@"Hello, my name is %@. This is my poem.",myName];


    …


    [myName release];


    }


    - (NSString*)zombieName


    {


    NSMutableString *z = [[NSMutableString alloc] init];


    [z appendString:@"Zombie "];


    [z appendString:[self humanName]]; // e.g. "Zombie Bob"


    return z;


    // [z release] ? ? ? ? ?


    }


    …


    @end


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 24 ■ MEMORY MANAGEMENT


    In the -recitePoetry method, the NSString object returned by -zombieName is retained,
    used in the body of the method, and then released. In the -zombieName method,
    the string object is implicitly retained when it is created, used in the body
    of the method, and returned to the sender. But wait! It also needs to be released,
    since -zombieNames will never use it again. Yet there’s no way to do that after
    the method has returned to its sender.


    Autorelease pools solve this by deferring the needed release to some later time.
    The -zombieName method is rewritten in Listing 24-4 to use the autorelease pool.


    Listin g 24-4\. Autoreleasing a Returned Object


    - (NSString*)zombieName


    {


    NSMutableString *z = [[NSMutableString alloc] init];


    [z appendString:@"Zombie "];


    [z appendString:[self humanName]];


    **return [z autorelease];**


    }


    The string object is added to the autorelease pool before being returned to the
    sender. This correctly balances the implied retain that occurred when the object
    was created, and ensures that it will eventually be destroyed.


    ■Note The -retain and -autorelease messages returns the receiver to the sender,
    allowing it to be chained into expressions like return [obj autorelease] and property
    = [obj retain]. This avoids having to write


    [obj autorelease] and return obj as separate statements.


    When an object reference is returned to the sender, it has already received the
    correct number of -release or -autorelease messages. In Objective-C parlance,
    this is called an autoreleased object.


    This creates another rule for Objective-C objects:'
  trans: "\n# Objective-C 中的内存管理\n\n这三个问题在过去半个世纪的计算机科学中，一直是寻找更好方式来管理内存块（以及扩展而来的对象）的驱动力。\n\
    \n## Objective-C 的引用计数\n\n虽然垃圾回收是一种优雅得多的解决方案——能一举优雅地解决所有三个问题——但它是一个复杂的系统，需要大量资源，并且直到最近才成熟起来。在垃圾回收之前的\
    \ Objective-C 采用的是简单的替代方案：引用计数。\n\n引用计数引入了“所有者”的概念：持有指向其他对象的指针的代码或对象，被称为拥有该对象。当某个对象或代码块想要持有对一个对象的引用时，它首先会`retain`（保留）该对象。当它使用完该对象后，它会`release`（释放）它。\n\
    \n引用计数的目标是将与垃圾回收相同的逻辑应用于对象管理：只要一个对象有所有者（引用），它就会保持存活。引用计数和垃圾回收的主要区别在于，在引用计数中，由程序员负责在建立或忘记对某个对象的引用时通知该对象。\n\
    \n以下是引用计数的工作原理：\n\n1. 当一个对象被初始分配时，它的引用计数为 1。\n2. 任何想要使用该对象的代码首先将其引用计数增加 1。这称为保留（retain）。\n\
    3. 当持有步骤 1 或 2 中指针的代码不再使用它时，它会将对象的引用计数减少 1，并忘记该指针。这称为释放（release）。\n4. 当对象的引用计数减少到\
    \ 0 时，该对象会立即被销毁，其内存被释放。\n\n引用计数的一个示例显示在列表 24-2 中。\n\n**列表 24-2. 基本引用计数模式**\n\n\
    ```\nid myObject = [[MyClass alloc] init];\n…\n[myObject doSomething];\n…\n[myObject\
    \ release];\n```\n\n在列表 24-2 中，该引用指向一个刚创建的对象。新创建的对象隐式具有引用计数 1（否则它们就不存在了）。程序使用该对象，然后向其发送一个`-release`消息，以指示它将不再使用该对象。`-release`消息会减少对象的保留计数并立即销毁该对象。这假设在此期间没有其他对象或代码`-retain`过该对象。如果有，该对象将继续存在，因为它仍然至少有一个所有者。\n\
    \n在实践中，手动管理释放计数并不像看起来那么繁重。接下来的几节将解释自动释放池的作用，并描述使用引用计数处理对象的常见编程模式。自动释放池非常出色，而且这些模式易于应用。\n\
    \n如果持续一致地应用（这是一个很大的“如果”），引用计数在约 80% 的情况下能提供与使用垃圾回收等效的体验。实际上，从垃圾回收环境转过来时可能遇到的最大问题，是在剩余\
    \ 20% 的情况下忘记应用所需的模式。\n\n## 自动释放池\n\n自动释放池引入了一个非常类似垃圾回收的概念：将对未引用对象的销毁推迟到未来的某个不确定时间。自动释放池似乎让许多\
    \ Objective-C 新手感到困惑，但它们实际上非常简单：\n\n-   自动释放池是一个对象集合，这些对象最终都会收到一条`-release`消息。\n\
    \n仅此而已。要使用自动释放池，向对象发送一条`-autorelease`消息，而不是`-release`消息。接收者不会立即被释放；它只是被添加到自动释放池中。\n\
    \n稍后——通常是在你的代码完成后很久——池会被排空，池中的每个对象都会收到它的`-release`消息。\n\n需要记住的基本规则是：通过向对象发送`-release`或`-autorelease`消息来释放它，但绝不能同时发送两者。这两条消息在逻辑上是等价的，唯一的区别在于时机。前者会立即释放对象。后者将其添加到自动释放池中，以便在将来的某个时间释放。\n\
    \n### 自动释放池的生命周期\n\n通常，你不需要自己创建自动释放池。（本章后面的一节会解释为什么以及如何创建它们。）在大多数情况下，始终假设存在一个活跃的自动释放池，并且`-autorelease`消息会将接收者添加到当前池中。尽管它们含糊地保证会“最终”释放对象，但自动释放池具有非常明确的生命周期。大多数自动释放池由工作运行循环在每个事件分发开始时创建。在处理事件的代码返回后，池被排空。这个机制定义了关于自动释放池生命周期的重要规则：\n\
    \n-   在你的方法或函数返回之前，当前的自动释放池绝不会被排空。\n\n这条规则的重要性可能不是立竿见影的，但当你阅读接下来的几节时，它会变得清晰。\n\
    \n### 返回的引用\n\n上一节中列出的引用计数规则看起来简单合理，但实际上它们包含一个巨大的缺陷：在代码不再持有指向某个对象的指针后，如何释放该对象（减少其引用计数）？在很多情况下，通过仔细编码可以避免这种情况，但有一种你无法避免的、不可避免的情况——将对象引用返回给调用者。使用目前学到的引用计数规则，你可能会倾向于编写类似列表\
    \ 24-3 中所示的代码。\n\n**列表 24-3. 保留与返回问题**\n\n```objective-c\n@implementation Zombie\n\
    \n- (void)recitePoetry\n{\n    NSString *myName = [[self zombieName] retain];\n\
    \    [self speakFormat:@\"Hello, my name is %@. This is my poem.\",myName];\n\
    \    …\n    [myName release];\n}\n\n- (NSString*)zombieName\n{\n    NSMutableString\
    \ *z = [[NSMutableString alloc] init];\n    [z appendString:@\"Zombie \"];\n \
    \   [z appendString:[self humanName]]; // 例如 \"Zombie Bob\"\n    return z;\n \
    \   // [z release] ? ? ? ? ?\n}\n\n…\n@end\n```\n\n在`-recitePoetry`方法中，由`-zombieName`返回的`NSString`对象被保留，在方法体中使用，然后被释放。在`-zombieName`方法中，字符串对象在创建时被隐式保留，在方法体中使用，并返回给调用者。但是等等！它也需要被释放，因为`-zombieName`不会再使用它。然而，在方法返回给调用者之后，就没有办法做到这一点了。\n\
    \n自动释放池通过将所需的释放推迟到稍后的某个时间来解决这个问题。`-zombieName`方法在列表 24-4 中被重写，以使用自动释放池。\n\n**列表\
    \ 24-4. 自动释放返回的对象**\n\n```objective-c\n- (NSString*)zombieName\n{\n    NSMutableString\
    \ *z = [[NSMutableString alloc] init];\n    [z appendString:@\"Zombie \"];\n \
    \   [z appendString:[self humanName]];\n    return [z autorelease];\n}\n```\n\n\
    字符串对象在返回给调用者之前被添加到自动释放池中。这正确地平衡了对象创建时发生的隐式保留，并确保它最终会被销毁。\n\n> **注意** `-retain`和`-autorelease`消息会将接收者返回给发送者，允许将其链接到诸如`return\
    \ [obj autorelease]`和`property = [obj retain]`这样的表达式中。这避免了必须将`[obj autorelease]`和`return\
    \ obj`写成独立的语句。\n\n当一个对象引用被返回给调用者时，它已经接收到了正确数量的`-release`或`-autorelease`消息。用 Objective-C\
    \ 的行话来说，这被称为自动释放对象。\n\n这为 Objective-C 对象创建了另一条规则。\n"
- fmt: '- Every object returned from a method is either owned or autoreleased.


    What it means to you is that you do not have to worry about the ownership of objects
    you receive from other objects. Either they are still owned, they have been autoreleased,
    or maybe both. The point is, your code is only responsible for its ownership of
    the object. Never worry about an object’s ownership by other objects (except in
    a few rare cases that are covered later in the chapter).


    The exception to the above rule are the messages that create new objects: `+alloc`,
    `+new`, `-copy`, and `-mutableCopy`. Theses are just about the only methods that
    return a retained object. That is, the object has an unbalanced `retain` and the
    receiver is implicitly its new owner. You may encounter other methods that return
    retained objects. By convention, these methods have names that begin with `new`,
    as in `-[NSObjectController newObject]`.


    ## Autoreleased Objects


    The code in Listing 24-4 works because of the lifespan rule of autorelease pools;
    the autorelease pool that’s being used when `-recitePoetry` begins won’t be drained
    until it returns. That means that any objects added to the autorelease pool will
    exist until the method is finished.


    Knowing that, the code in Listings 24-2 and 24-4 can be further simplified, as
    shown in Listing 24-5.


    ### Listing 24-5. Simplified Release Management


    ```

    - (void)recitePoetry


    {


    NSString *myName = [self zombieName];


    [self speakFormat:@"Hello, my name is %@. This is my poem.",myName];


    …


    }


    - (NSString*)zombieName


    {


    NSMutableString *z = [[[NSMutableString alloc] init] autorelease];


    [z appendString:@"Zombie "];


    [z appendString:[self humanName]];


    return z;


    }

    ```


    `Listing 24-5` is starting to look a lot like code written for a garbage collection
    environment. The only difference is the single `-autorelease` message when the
    `NSMutableString` is initially created.


    The reason is the string object has been autoreleased, and all references to the
    object are contained within the scope of the executing methods. Remember that
    an autorelease pool will never be drained before a method returns, and objects
    returned by other methods are always retained or autoreleased objects. This creates
    a new, and important, rule for managing object retain counts:


    - An autoreleased object only needs to be retained if it will be referenced beyond
    the lifetime of the current autorelease pool.


    This aspect of autorelease pools is what makes them so useful, and why I wrote
    that managed memory and garbage collection are indistinguishable 80 percent of
    the time. Most object references are fleeting—defined and forgotten within a single
    method. These references, as long as they are to autoreleased objects, don’t require
    any memory management.


    Because of this convenience, most objects are created and autoreleased immediately,
    exactly as shown in `Listing 24-5`, rather than the pattern shown in `Listing
    24-4`. Once autoreleased, the object requires almost no management unless some
    other code needs to retain it—and that would be the responsibility of that other
    code. The exception is the obvious case where an object is created by code that
    intends to retain it. It would be silly to write `[[[[MyClass alloc] init] autorelease]
    retain]` when `[[MyClass alloc] init]` would accomplish the same thing.


    So what about references that persist beyond the lifespan of the current autorelease
    pool? The programming patterns in the next few sections address those very cases.


    ## Managed Memory Patterns


    The following sections show the basic programming patterns used when working in
    a managed memory environment. Some of these patterns have already been shown,
    but are included again for completeness and future reference.


    ## New Object Patterns


    When a new object is created it begins with a retain count of 1, implicitly making
    its creator the first owner. The principal messages that return new objects are:
    `+alloc`, `+new`, and `-copy`. This implied ownership must be balanced by a `-release`
    message when the object is no longer used, as shown in `Listing 24-6`, or an `-autorelease`
    message, as shown in `Listing 24-7`.


    ### Listing 24-6. Retained New Object Pattern


    ```

    id object = [[NSObject alloc] init];


    …


    [object release];

    ```


    ### Listing 24-7. Autoreleased New Object Pattern


    ```

    id object = [[[NSObject alloc] init] autorelease];


    …

    ```


    ## Autoreleased Object Pattern


    Objects returned by most messages are returned as autoreleased objects. That is,
    the object has already received a correctly balanced series of `-retain`, `-release`,
    or `-autorelease` messages and does not demand any additional management. Specifically,
    class convenience constructors, like `+[NSMutableArray arrayWithCapacity:]`, return
    autoreleased objects. Even though the convenience constructors exist to create
    new objects, the objects are not “new” from the perspective of memory management.
    Common examples are shown in `Listing 24-8`.


    ### Listing 24-8. Autoreleased Objects


    ```

    NSNumber *number = [NSNumber numberWithInt:10];


    NSString *path = [NSString stringWithFormat:@"Folder %@",number]; NSFileManager
    *fileManager = [NSFileManager defaultManager]; NSDictionary *attrs = [fileManager
    attributesOfItemAtPath:path error:NULL]; NSArray *attrKeys = [attrs keysSortedByValueUsingSelector:@selector(compare:)];

    ```


    Every object returned by a class or instance method in `Listing 24-8` is autoreleased
    and requires no additional management. If you store the reference in a persistent
    location, like an instance variable, then you should retain the object like this:


    ```

    myArray = [[NSMutableArray arrayWithCapacity:100] retain];

    ```


    See the “Setter Patterns” section below for more about retaining references in
    properties.


    ## Returning Autoreleased Objects


    So that your code is consistent with the rest of Objective-C, your methods should
    always return autoreleased objects, as shown in `Listing 24-9`.


    ### Listing 24-9. Returning an Autoreleased Object


    ```

    - (id)someObject


    {


    id object = [[[NSObject alloc] init] autorelease];


    …


    return object; // autoreleased


    }

    ```


    ## Setter Patterns


    When setting a property of your object, you should retain the referenced object
    until you replace the reference with something else. The reference being replaced
    should be released or autoreleased. There are four popular patterns for writing
    setter methods, as shown in `Listing 24-10`.


    ### Listing 24-10. Setter Patterns


    ```

    @interface MyClass : NSObject {


    id one;


    id two;


    id three;


    id four;


    }


    @property (retain,nonatomic) id one;


    @property (retain,nonatomic) id two;


    @property (retain,nonatomic) id three;


    @property (copy,nonatomic) id four;


    @end


    @implementation MyClass


    - (id)one


    {


    return one;


    }


    - (void)setOne:(id)object


    {


    [one autorelease];


    one = [object retain];


    }


    - (id)two


    {


    return two;


    }


    - (void)setTwo:(id)object


    {


    id oldTwo = two;


    two = [object retain];


    [oldTwo release];


    }


    - (id)three


    {


    return three;


    }


    - (void)setThree:(id)object


    {


    if (three!=object) {


    [three release];


    three = [object retain];


    }


    }


    - (id)four


    {


    return four;


    }


    - (void)setFour:(id)object


    {


    [four autorelease];


    four = [object copy];


    }


    @end

    ```


    All of the setter patterns in `Listing 24-10` accomplish three important tasks:


    - The object being stored is sent a `-retain` message.

    - The object being forgotten is sent a `-release` or `-autorelease` message.

    - The `-retain` message is sent before the `-release` message.


    The last point is the tricky one. If the object being set is the same as the object
    already stored in the property, sending it a `-release` message before the `-retain`
    message could prematurely destroy the object.'
