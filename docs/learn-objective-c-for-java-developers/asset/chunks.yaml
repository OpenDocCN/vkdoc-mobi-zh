- fmt: "# Caution\n\nThe lifetime of the C string pointer returned by `-cStringUsingEncoding:`\
    \ et al is tied to the lifetime of the string object. The temporary string buffer\
    \ is released when the string object is destroyed. Do not continue to use the\
    \ pointer after the string object reference has gone out of scope, or the garbage\
    \ collector might recycle the object—destroying its temporary C string buffer—prematurely.\n\
    \nThe `-cStringUsingEncoding:`, `-UTF8String`, and `-fileSystemRepresentation`\
    \ messages are extremely convenient for passing an `NSString` object to any method\
    \ or function that expects a traditional C string. Listing 8-5 demonstrates how\
    \ temporary C strings can be generated and passed to a traditional C function.\
    \ The `-fileSystemRepresentation` method should be used when the string object\
    \ is a file or path name. If the string only contains ASCII characters, `-UTF8String`\
    \ and `-cStringUsingEncoding:NSASCIIStringEncoding` are equivalent.\n\n## Listing\
    \ 8-5. Passing `NSString` Object as C Strings\n\n```\nNSString *filePath = @\"\
    /tmp/somefile.dat\";\nNSString *fileMode = @\"w+\";\n...\nFILE *file = fopen([filePath\
    \ fileSystemRepresentation], [fileMode UTF8String]);\n```\n\nThe length of an\
    \ encoded string will often be different—typically longer—than the number of Unicode\
    \ characters in the `NSString` object. Either of the `-lengthOfBytesUsingEncoding:(NSStringEncoding)enc`\
    \ or `-maximumLengthOfBytesUsingEncoding:(NSStringEncoding)enc` methods can be\
    \ used to determine the number of 8-bit characters that will be needed to contain\
    \ the encoded string. The latter is faster, but often overestimates the number\
    \ of bytes required. Neither method includes the terminating null character in\
    \ its count. An example of extracting a C string with a specific encoding into\
    \ a dynamically allocated buffer is shown in Listing 8-6.\n\n## Listing 8-6. Extracting\
    \ a C String from an `NSString`\n\n```\nNSString *unicodeString = …\nint len =\
    \ [unicodeString lengthOfBytesUsingEncoding:NSWindowsCP1250StringEncoding];\n\
    NSMutableData *buffer = [NSMutableData dataWithLength:len+1];\n[unicodeString\
    \ getCString:(char*)[buffer bytes]\n                maxLength:len+1\n        \
    \         encoding:NSWindowsCP1250StringEncoding];\n// [buffer bytes] now contains\
    \ a null-terminated C string version of unicodeString\n// encoded using the Windows\
    \ Central and Eastern European character set.\n```\n\nIf the Unicode characters\
    \ of a string cannot be represented by the requested encoding, the previous messages\
    \ will return `NO` or `NULL`. You can preflight the conversion using `-canBeConvertedToEncoding:(NSStringEncoding)enc`,\
    \ or consider using `-dataUsingEncoding:(NSStringEncoding)enc allowLossyConversion:(BOOL)flag`.\
    \ Passing `YES` for `allowLossyConversion` will always return an encoded string,\
    \ omitting or simplifying any characters that can’t be encoded. Also be aware\
    \ that `NSNonLossyASCIIStringEncoding` along with the family of `NSUTF…StringEncoding`\
    \ encodings can represent the entire range of Unicode characters and will always\
    \ return a successfully encoded string.\n\nThe last two methods, `-getCharacters:(unichar*)buffer\
    \ range:(NSRange)range` and `-getCharacters:(unichar*)buffer`, are the complements\
    \ to `+stringWithCharacters:length:`. Both extract Unicode values into a `unichar`\
    \ array. These methods do not perform any encoding. The number of `unichar` characters\
    \ extracted will always be the same as the source range.\n\n# Formatting Strings\n\
    \nCreating strings from other values can be accomplished in a dizzying number\
    \ of ways, but by far the most versatile method is `+[NSString stringWithFormat:(NSString*)format,\
    \ …]`. The Java counterpart is `java.lang.String.format(String,Object…)`. It has\
    \ the same purpose and use, but the format specifiers in the formatting string\
    \ are slightly different.\n\nSimilar to Java, the format string parameter is a\
    \ template of the resulting string, embedded with format specifiers (i.e., `%d`)\
    \ that are replaced using the values in the argument list. Unlike Java, the values\
    \ in the variable argument list are either object pointers or primitive values\
    \ that are not wrapped in objects. In fact, wrapping them in objects severely\
    \ limits the utility of `-stringWithFormat:`. Avoiding the need to convert primitive\
    \ values into objects makes `-stringWithFormat:` much more convenient—and efficient—to\
    \ use. So much so, that you’ll find yourself using it in many places where you\
    \ would have used `java.lang.StringBuffer` or some other technique.\n\nFormat\
    \ specifiers follow this generalized syntax:\n\n```\n%[argument_index$][flags][width][.precision][length]conversion\n\
    ```\n\nThe only significant difference is the optional length modifier, which\
    \ Java doesn’t need. The common conversion format specifiers and their Java equivalents\
    \ are listed in Table 8-7.\n\n**Table 8-7.** Format Conversion Specifiers\n\n\
    | Java Type | Objective-C Type | Replaced With |\n| --- | --- | --- |\n| `%s`/`%S`\
    \ (object) | `%@` | object's `-description` (`toString()`) |\n| `%p` | any pointer\
    \ | hexadecimal memory address |\n| `%s` | `char*` | Null-terminated ASCII C string\
    \ |\n| `%S` | `unichar*` | Null-terminated Unicode C string |\n| `%c` | `char`\
    \ | 8-bit ASCII character |\n| `%c` | `char` `%C` `unichar` | 16-bit Unicode |\n\
    | `%d` | `%d`/`%D`/`%i` `int` | signed decimal value |\n| `%u`/`%U` | `unsigned\
    \ int` | unsigned decimal value |\n| `%o` | `%o`/`%O` `unsigned int` | octal value\
    \ |\n| `%x`/`%X` | `%x`/`%X` `unsigned int` | hexadecimal value |\n| `%e`/`%E`\
    \ | `%e`/`%E` `float`, `double` | value in scientific notation |\n| `%f` | `%f`/`%F`\
    \ `float`, `double` | decimal value |\n| `%g`/`%G` | `%g`/`%G` `float`, `double`\
    \ | decimal value or scientific notation |\n| `%a`/`%A` | `%a`/`%A` `float`, `double`\
    \ | hexadecimal value |\n| `%%` | `%%` | Literal `%` character |\n\nThe most notable\
    \ difference is Objective-C’s use of the `%@` conversion specifier for object\
    \ descriptions; this replaces Java’s `%s` specifier. Use `%@` for all Objective-C\
    \ strings and object arguments. All other format specifiers expect a primitive\
    \ scalar or pointer. The flags, width, and precision modifiers all behave much\
    \ as they do in Java.\n\nVariable argument lists in C provide no type or size\
    \ information about the individual arguments. The mechanics are explained in the\
    \ Variable Arguments section of Chapter 6. The type and size of each argument\
    \ is inferred from the length and conversion specifier found in the format string.\
    \ This imposes two important restrictions.\n\nThe first restriction is on the\
    \ optional argument index modifier: you can’t “skip” arguments. Take the statement\
    \ `[NSString stringWithFormat:@\"%d-%3$d\",1,2,3]` as an example. The format string\
    \ provides no information about the type or size of the second variable parameter.\
    \ Without it, the formatter doesn’t have enough information to extract the third\
    \ variable argument, so the format operation fails.\n\nThe second restriction\
    \ is that the combination of the length modifier and the conversion specifier\
    \ must agree with the type of the parameter. The formatter blindly assumes that\
    \ each argument agrees with the type implied by the specifier, and will interpret\
    \ it accordingly. This is the single most common cause of garbled strings, and\
    \ can occasionally cause catastrophic runtime errors (say, trying to interpret\
    \ an integer as a pointer to an object). Table 8-8 lists the length modifiers\
    \ and the argument type that each implies. If the length modifier is omitted,\
    \ the argument type is assumed to be compatible with the type listed in Table\
    \ 8-7.\n\n**Table 8-8.** Conversion Length Modifiers\n\n| Modifier | Applicable\
    \ Conversions | Argument Type |\n| --- | --- | --- |\n| `hh` | `d`, `i`, `o`,\
    \ `u`, `x`, `X` | `char`, `unsigned char` |\n| `h` | `d`, `i`, `o`, `u`, `x`,\
    \ `X` | `short int`, `unsigned short int` |\n| `l` | `d`, `i`, `o`, `u`, `x`,\
    \ `X` | `long int`, `unsigned long int` |\n| `ll`, `q` | `d`, `i`, `o`, `u`, `x`,\
    \ `X` | `long long int`, `unsigned long long int` |\n| `L` | `a`, `A`, `e`, `E`,\
    \ `f`, `F`, `g`, `G` | `long double` |"
