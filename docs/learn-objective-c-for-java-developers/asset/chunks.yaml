    Summary


    There are many other methods and functions for manipulating the structures that
    define classes and objects at runtime. The functions highlighted in this chapter
    let you perform the common forms of introspection, through which you can examine
    almost every aspect of an object and its class. If you need to dig even deeper
    (no pun intended), I highly recommend reading Apple’s Objective-C 2.0 Runtime
    Reference.3


