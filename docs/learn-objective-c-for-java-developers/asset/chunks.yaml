    \n本章将介绍文件和路径名称的基础知识、如何处理目录中的文件、文件元数据的操作，以及读写数据文件的各种方法。在此过程中，还会涉及其他的`API`。\n\n\
    ### 文件系统 API\n\n您用来与文件系统交互的函数、类和方法统称为文件系统的应用程序编程接口（`API`）。在 Java 中，文件系统`API`被整齐地组织在`java.io`包中。在\
    \ Objective-C 中则不是这样。Objective-C 的 Cocoa 框架提供了一个简单的文件系统接口，足以满足大多数需求。与之并行的是 Core\
