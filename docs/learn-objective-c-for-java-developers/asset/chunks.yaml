    \ `-(BaseClass*)init`）会给子类带来困难。子类必须调用 `[super init]` 并将其赋值给 `self`。如果 `[super\
    \ init]` 返回 `BaseClass*` 类型的值，子类将无法在不进行类型转换的情况下将其赋值给 `self`。\n\n第三步是检查 `nil`。如果父类的\
    \ `init` 方法因任何原因无法创建请求的对象，它将返回 `nil`。例如，当进程耗尽可用内存且无法分配新对象时，会返回 `nil`。类可以因任何原因决定不构造对象并返回\
    \ `nil`。请进行防御性编程；始终假设初始化方法可能返回 `nil`。\n\n如果返回的对象有效，初始化方法应接着执行对象所需的任何初始化。\n\n最后，初始化方法必须向调用者返回其自身，如果初始化失败则返回\
    \ `nil`。\n\n研究代码清单 3-17 中的 `-(id)init` 方法。记住它。你将要编写的每一个对象初始化方法都应该与之相似。你无疑会遇到细微的变体——许多程序员将前两个语句合并为\
    \ `if ((self=[super init])!=nil)`——但每一个编写良好的 `init` 方法都满足初始化方法的四个部分约定。\n\n###\
    \ 链式初始化方法\n\nJava 有用于显式构造函数调用的特殊语法，通过该语法，一个构造函数可以调用带参数的特定父类构造函数（`super(param)`）或另一个构造函数（`this(param)`）。\n\
    \n自然，Objective-C 没有针对此功能的特殊语法，但其原理是相同的。\n\n代码清单 3-18 中所示的 `RepeatableSequence`\
    \ 类是代码清单 3-17 中 `RandomSequence` 类的子类。`RepeatableSequence` 的 `init` 方法构建在其父类的\
    \ `init` 方法以及 `RepeatableSequence` 中的其他方法之上。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**代码清单 3-18. 链式初始化方法**\n\n**Java**\n\n```java\npublic class RepeatableSequence\
    \ extends RandomSequence\n{\n    private long restartSeed;\n    public RepeatableSequence()\n\
    \    {\n        this(1);\n    }\n    public RepeatableSequence( long startingSeed\
    \ )\n    {\n        super(startingSeed);\n        restartSeed = seed;\n    }\n\
    \    void restartSequence( )\n    {\n        seed = restartSeed;\n    }\n}\n```\n\
    \n**Objective-C**\n\n```objc\n#import \"RandomSequence.h\"\n\n@interface RepeatableSequence\
    \ : RandomSequence {\n    long long restartSeed;\n}\n- (id)init;\n- (id)initWithSeed:(long\
    \ long)startingSeed;\n- (void)restartSequence;\n@end\n\n@implementation RepeatableSequence\n\
    \n- (id)init\n{\n    self = [self initWithSeed:1];\n    return (self);\n}\n\n\
    - (id)initWithSeed:(long long)startingSeed\n{\n    self = [super initWithSeed:startingSeed];\n\
    \    if (self!=nil) {\n        restartSeed = seed;\n    }\n    return (self);\n\
    }\n\n- (void)restartSequence\n{\n    seed = restartSeed;\n}\n@end\n```\n\n`-(id)initWithSeed:`\
    \ 方法调用其父类的 `-(id)initWithSeed:` 方法，将初始化参数传递给父类。父类初始化完成后，它再完成自己的初始化。\n\n`-(id)init`\
    \ 方法将初始化工作移交给 `-(id)initWithSeed:` 方法。请注意，消息 `initWithSeed:` 是发送给其自身，而不是其父类。\n\
    \n### 指定初始化方法\n\n当子类化一个类时，请阅读该类相关的文档（或注释）。一些 Objective-C 类有一个或多个指定初始化方法。子类的 `init`\
    \ 方法应仅使用父类的一个指定初始化方法来初始化父类。\n\n许多类的文档都包含一个明确的“子类化说明”部分，其中包含对子类编写者的重要信息和注意事项。\n\
    \n### 便捷构造函数\n\n类方法的一个常见用途是提供便捷构造函数，有时也称为工厂方法。这些是类方法，它们返回一个同类的预配置对象，理想情况下，使用的代码比正式创建和初始化一个新对象所需的代码更少。代码清单\
    \ 3-19 显示了 Cocoa 框架提供的 `NSDictionary` 类的一个片段。所有这些类方法都返回一个新的 `NSDictionary` 对象。\n\
    \n**代码清单 3-19. 类便捷构造函数**\n\n```objc\n@interface NSDictionary\n\n+ (id)dictionary;\n\
    + (id)dictionaryWithObject:(id)object forKey:(id)key;\n+ (id)dictionaryWithDictionary:(NSDictionary\
    \ *)dict;\n+ (id)dictionaryWithObjects:(NSArray *)objects forKeys:(NSArray *)keys;\n\
    \n@end\n```\n\n语句 `[NSDictionary dictionary]` 等效于 `[[NSDictionary alloc] init]`，而语句\
    \ `[NSDictionary dictionaryWithObject:@\"Mary\" forKey:@\"Name\"]` 等效于 `[[NSDictionary\
    \ alloc] initWithObject:@\"Mary\" forKey:@\"Name\"]`。其主要优点是简洁。\n\n■ 注意  \n仅当使用垃圾回收时，语句\
    \ `[NSDictionary dictionary]` 才等效于 `[[NSDictionary alloc] init]`。在传统的托管内存环境中，这两者完全不同。前者返回一个自动释放的对象，而后者返回一个保留的对象。有关完整说明，请参见第\
    \ 9 章（关于垃圾回收）和第 24 章（关于内存管理）。\n\n便捷构造函数通常用于构造那些本来难以创建的对象。例如，`NSString` 类提供了 `+(NSString*)pathWithComponents:(NSArray*)components`\
    \ 便捷构造函数。它接受一个路径组件数组，将它们组合成一个绝对的 POSIX 路径，并将结果作为单个不可变字符串返回。尝试使用 `alloc` 和类的 `init`\
    \ 方法来完成此操作，需要创建一个可变字符串缓冲区，在循环中追加所有组件，然后将临时字符串缓冲区转换为不可变字符串对象。显然，单条语句 `[NSString\
    \ pathWithComponents:array]` 要简洁得多。\n\n### 析构函数\n\n与 Java 类似，Objective-C 对象可以选择性地覆盖其\
    \ `-(void)finalize` 方法。此消息在对象被垃圾回收器销毁之前发送给对象。每个 `finalize` 方法必须在返回前立即向其父类发送一条\
    \ `finalize` 消息。\n\n代码清单 3-20 显示了一个 `-finalize` 方法的示例。请注意，`finalize` 方法应仅用于异常清理和提供健壮性。编写良好的程序不应依赖\
    \ `finalize` 方法来关闭文件；它应该在允许此对象变为可回收之前就关闭文件。`finalize` 代码仅仅是防止在异常情况下泄漏资源，例如，如果文件在程序异常后仍保持打开状态。\n\
    \n**代码清单 3-20. 行为良好的 `finalize` 方法**\n\n```objc\n- (void)finalize\n{\n    if (file!=nil)\
    \ {\n        [file close];\n        file = nil;\n    }\n    [super finalize];\n\
    }\n```\n\n■ 注意  \n`finalize` 消息仅当在垃圾回收环境中运行时才发送给对象。使用托管内存（无垃圾回收）的 Objective-C\
    \ 应用程序则实现 `-(void)dealloc` 方法。更多详细信息请参阅第 24 章。\n\n### 缺失了什么？\n\n表 3-2 简要列出了你在\
    \ Objective-C 中找不到的 Java 特性。\n\n**表 3-2. 缺失的 Java 特性**\n\n| 特性               \
    \ | 描述 |\n|------------------------|-------------|\n| 内部/匿名类 | 你不能在类内部定义类，也不能在方法内部定义类。内部类和匿名类通常用作适配器和代码封装。在\
    \ Objective-C 中，这些模式是通过非正式协议和代码块（C 语言的一个近期补充，允许将可执行的代码块作为变量传递）来实现的。 |\n| 对象数组\
    \          | （原文内容截断） |\n"
- fmt: '# 排版后内容


    Objective-C has no inherit concept of an object array. Arrays of objects can be
    handled as a C array of object pointers or using the `NSArray` collection class.


    There is no `final` keyword in Objective-C. You cannot prevent a class or method
    from being subclassed or overridden. When applied to variables, the keyword `const`
    is largely synonymous with `final`.


    All classes and methods in Objective-C are concrete.


    There are no packages in Objective-C, so there is no package scope.


    Java interfaces, thread synchronization, and exceptions have Objective-C counterparts
    that are detailed in later chapters.


    Many other features of Java, such as serialization, introspection, remote method
    invocation, and copying, are not defined by the Objective-C language; as it does
    with constructors, the Cocoa framework implements these features using classes
    and methods.


    In the upcoming chapters, you’ll also discover many features and capabilities
    unique to Objective-C.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # Chapter 4: Creating an Xcode Project


    The last couple of chapters contained a lot of theory and abstract concepts to
    digest, and the next few chapters contain even more. For me, there’s nothing more
    frustrating than trying to learn a complex topic without any way of exploring
    each individual concept. To that end, I’ll take a brief respite from the theoretical
    and indulge in the purely pragmatic task of creating a working Objective-C application
    in Xcode, Apple’s free software development kit.


    Having a working project that you can tinker with and test on is an invaluable
    learning experience. As you work through the rest of this book, I encourage you
    to code small examples of the concepts you are exploring. Add the code to a test
    project, and step through it using the debugger. A few lines of code can answer
    a lot of questions.


    If you haven’t installed Apple’s Xcode development tools, do so now. Xcode is
    available online at `http://developer.apple.com/`. This tutorial assumes that
    you are using a Macintosh computer running Mac OS X 10.5 or later and are installing
    Xcode 3. The term *Xcode* actually refers to two things: Apple’s entire suite
    of development tools, and the Xcode IDE (Integrated Development Environment) application.
    In this book, *Xcode* refers to the Xcode application and *Xcode development tools*
    refers to the entire package of development applications, utilities, documentation,
    example code, and other support material.


    ## Download the Project


    This project is a simple desktop application called Scrapbook Words. Give the
    application a set of letters and it will tell you what words you can spell with
    them. The code is small (a couple hundred lines), but it dabbles in a number of
    technologies. It uses collection and string objects, reads data from a file, schedules
    tasks to run asynchronously in a background thread, communicates between threads
    using queued messages, and employs controllers and binding to implement a Model-View-Controller
    design.


    You can learn more about these specific technologies in the following chapters:


    - String objects are examined in Chapter 8.

    - Programmatic message sending is explained in Chapter 6.

    - Collections are explored in Chapter 16.

    - Chapter 20 discusses data model, view, and controller objects (the Model-View-Controller
    pattern), as well as bindings.

    - Threads are covered in Chapter 15.


    Before you start, download the finished project files at `www.apress.com` in the
    Source Code/Download area. This chapter will walk you through the steps that were
    used to create this project from scratch, but it does not include every detail.
    The code excerpts in this chapter are used to illustrate concepts, but aren’t
    necessarily complete. Refer to the finished project for the whole implementation.


    There are a number of ways of working through this chapter:'
