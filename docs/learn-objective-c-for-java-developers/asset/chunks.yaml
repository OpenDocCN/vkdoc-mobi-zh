    CHAPTER 26 ■ RUNTIME


    Isa swizzling is a powerful technique, but it’s rather technical and not for the
    faint of heart. This section is designed to be informative, rather than encourage
    you to try it yourself. But if you do encounter a strong need for a solution that
    involves this kind of object mutation, it’s not beyond your reach.


    64-Bit Programming


    If you’ve been around a while, you’ve seen the size of microprocessor registers
    grow from 4 to 32 bits over the decades. It’s inevitable that we now find ourselves
    in a transition from 32- to 64-bit processors.


    Hopefully, the transition to 128-bit processors is some time off.


    For both Java and Objective-C programmers, the change heralds new memory capacities
    and the promise of improved performance. Most object-oriented programmers will
    find little to do during the transition—beyond updating their project settings
    to produce a 64-bit version of their application. If you program exclusively using
    Objective-C classes, methods, and properties, you’ll find very little difference
    between the two environments. The biggest change for Objective-C programmers is
    the size change of some integer variable types, as listed in Table 26-2.


