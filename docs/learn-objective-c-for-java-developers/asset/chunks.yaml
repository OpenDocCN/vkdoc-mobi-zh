    the Cocoa framework, and Mac OS X. The principal differences are the use of strings
    instead of java.io.File objects to manipulate paths, attribute dictionaries instead
    of File object properties, and the reliance on C


    functions for advanced features. Beyond that, you won’t find that the basic file-related
    tasks (reading data files, writing data files, deleting files) changes in any
    significant way.


