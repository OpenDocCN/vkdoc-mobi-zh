    The first feature is what makes class clusters so powerful: any initializer can
    be turned into a class cluster. The change is largely transparent to existing
    code that creates objects. This is extremely helpful in an evolving design. A
    simple base class can be defined and then later replaced with a class cluster
    without requiring global changes to your existing code.


    One side effect of class clusters it that they may make it difficult, or impossible,
    to create your own subclass of the class cluster’s base class. The base class
    initializer is usually where the class decides what class of object to create.
    Since a subclass must call its superclass initializer during initialization, your
    subclass intializer runs the risk that it will be replaced with a different object
    at the whim of the base class. Class clusters that are designed to be subclassed
    will usually have a designated initializer for use by non-cluster subclasses,
    or be written so they will act reasonably when invoked by a subclass. If you have
    a class cluster that you’d like to subclass, refer to the Subclassing Notes section
    of the class’s documentation.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 22 ■ FACTORY PATTERN


    ■Caution A common programming pitfall is to invoke a subclass initializer from
    the base class cluster initializer that recursively invokes the base class initializer.
    If the base class initializer blindly creates a new subclass object, it will result
    in an infinite recursion loop. The Matrix class avoids this by having the -initWithAllocatedArray:
    rows:columns: method examine the class of the object being initialized (i.e.,
    if ([self isMemberOfClass:


    [Matrix class]]) …). Only if it’s the base class does it consider replacing the
    object with a subclass. When a subclass invokes the base class initializer, the
    base class initializer behaves normally. Another approach is to strategically
    organize your subclass initialization methods so that they don’t recursively invoke
    the base class initializer that implements the class cluster.'
