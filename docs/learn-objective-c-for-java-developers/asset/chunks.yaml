    视图对象应随窗口大小调整而缩放。打开尺寸检查器（`Tools > Size Inspector`）。在面板中，编辑输入文本字段和滚动视图的自动调整大小设置，如图
    4-8 所示。确定对象哪些边缘锚定到窗口，然后选择水平或垂直尺寸是否随窗口变化。你需要将输入字段锚定至顶部和两侧并水平调整大小，而输出列表应在所有边缘锚定并同时水平和垂直调整大小。动画预览会显示这些设置的效果。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-88_1.jpg)


    ### 图 4-8. 编辑视图对象的自动调整大小属性


    ## 添加控制器


    应用程序需要创建一个`ScrapWordsController`的实例。它将连接到 NIB 文档中的其他对象，因此 NIB 文档也应实例化该控制器。从库中选择`Objects
    & Controllers`组，将一个新的`Object`对象拖入`MainMenu.xib`文档窗口，如图 4-9 所示。选中新创建的对象，切换到身份检查器（`Tools
    > Identity Inspector`）。将其类设置为`ScrapWordsController`。你可以手动输入或从下拉菜单中选择；Interface
    Builder 会跟踪你在项目中定义的类。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-89_1.jpg)


    ### 图 4-9. 向 NIB 文档添加自定义对象


    当此 NIB 文档在运行时加载，它将创建一个`ScrapWordsController`的实例，就像应用程序执行了以下语句一样：


    ```

    [ScrapWordsController new]

    ```


    这是一个需要理解的重要概念。NIB 文档中的所有对象都代表在 NIB 加载时将被实例化的真实对象。其效果等同于创建这些对象的新实例、设置其所有属性、将其添加到容器对象（针对嵌套对象），以及设置它们之间的引用。但通过使用
    Interface Builder，你可以免去编写大量代码的工作。


    ## 建立绑定


    在 MVC 设计中，数据模型对象在发生变化时会向视图对象广播更改。当用户更改值时，视图对象会更新数据模型对象。这需要视图和数据模型对象之间的连接和通信。本应用程序的数据模型是由控制器对象创建的一组简单值（一个字符串和一个数组）。


    有多种方法可以将数据值与视图对象连接起来，但本应用程序将使用绑定。绑定实际上是一组支持 MVC 设计模式的技术。绑定连接两个对象，使得一个对象属性的变化会自动通知给另一个对象。第二个对象可以发起更改，从而改变第一个对象的属性。通常，第一个对象是数据模型对象，第二个对象是视图对象。一旦绑定在一起，一个对象的变化会自动反映在另一个对象中。这无需你编写任何代码。你只需声明属性并将其绑定到对象即可。


    在 Interface Builder 中，选择文本字段对象（可以在`MainMenu.xib`或窗口本身中）。调出绑定检查器（`Tools > Bindings
    Inspector`）。展开文本字段的 Value 绑定。使用键路径`letters`将其绑定到`ScrapWordsController`对象，设置为`Continuously
    Update Value`，并取消选中其他选项，使其与图 4-10 所示一致。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-90_1.jpg)


    ### 图 4-10. 将文本字段绑定到`ScrapWordsController`的`letters`属性


    此绑定已完成。控制器`letters`属性的任何更改（例如，`[controller setLetters:@"hello"]`，或`controller.letters
    = @"hello"`）都会立即反映在文本字段视图中。编辑文本字段将更新控制器中`letters`的值。


    如果觉得如此少的代码背后竟有如此多的魔法，那么我将稍微揭开帷幕，让你一窥幕后的一些情况。需要牢记的关键点是，Interface Builder 并没有做任何特殊的事情。使得绑定能够工作的技术——键值编码、键值观察和控制器——都是你可以直接使用的。它们可以单独使用，也可以协同使用，以实现广泛的解决方案，而不仅仅是让
    MVC 设计变得简单。


    ## KVC


    键值编码（KVC）允许以解释性方式访问对象的属性。它结合了非正式协议（在第 5 章中解释）和内省机制。例如，假设有一个符合键值编码的`Person`类，它有三个属性：一个字符串类型的`name`属性，以及`father`和`mother`属性，分别引用另外两个`Person`对象。可以使用键值路径`@"name"`来查看一个人的姓名。可以通过路径`@"father.name"`来访问其父亲的姓名，通过路径`@"mother.father.name"`来访问其外公的姓名。KVC
    将在内省章节中更详细地讨论。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## KVO


    键值观察（KVO）是一种用于观察对象变化的通知服务。要观察的属性通过 KVC 路径指定。一旦对象开始观察某个属性，该属性的任何更改都会向观察者（监听器）发送通知。与
    Java 不同，这不需要源对象管理一组监听器或自行触发通知消息——尽管它也可以这样做。它只需声明一个属性。KVO 框架负责管理观察者列表、检测属性何时更改以及发送适当通知的所有工作。KVO
    在第 19 章中解释。


    ## 控制器


    Cocoa 框架定义了一个`NSController`类，为数据模型对象和视图对象之间提供“粘合剂”。Cocoa 框架提供了许多有用的控制器，用于数组、字典（映射）、树和用户偏好设置。如果需要定义自己的控制器，你可以将`NSController`子类化。关于控制器的更多内容请参见第
    20 章。


    ## 绑定


    绑定框架利用 KVC、KVO 和控制器创建了一个统一的 MVC 通知和同步服务。绑定可以在 Interface Builder 中创建，也可以通过`[NSObject
    bind:toObject:withKeyPath:options:]`方法以编程方式创建。绑定也在第 20 章中介绍。


    ## 添加数组控制器


    表格视图和数组对象之间的绑定自然要复杂一些。为了协调显示与数据，需要两个绑定：一个绑定将表格视图中的列连接到数组控制器。第二个绑定将数组控制器连接到实际的值对象数组。数组控制器位于视图和数据模型对象之间，并维护状态信息——例如排序顺序和当前用户选择——这些信息不属于视图或数据模型。这通常被称为调解
    MVC 设计模式，因为控制器对象位于视图和数据模型之间并调解它们的通信。

