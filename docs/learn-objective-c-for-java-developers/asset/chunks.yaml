    在您的`NIB`文档中，会出现一些特殊对象。它们是占位符，代表当`NIB`加载时已存在的对象，仅用于允许您与这些对象建立连接。您在`NIB`中可能包含的代理对象包括：


    - `文件所有者`

    - `第一响应者`

    - `应用`

    - `字体管理器`

    - `用户默认控制器`


    例如，您可以创建`NIB`中某个对象与全局唯一的`NSApplication`对象之间的连接，即使`NSApplication`对象并非`NIB`的一部分。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/index-379_1.jpg)


    ## 第 20 章 ■ 模型-视图-控制器模式


    ### 连接


    在 Interface Builder 的术语中，`NIB`文档中两个对象之间的关系称为连接。连接共有三种类型：出口、动作和绑定。


    #### 出口


    出口本质上就是对象引用。通过出口，您可以在 Interface Builder 中使用图形化设计工具设置对象引用。任何对象指针属性都可以成为出口。如果在实例变量声明中包含关键字`IBOutlet`，如代码清单
    20-1 所示，Interface Builder 将自动将其识别为出口，并允许您在`NIB`中设置该变量。您也可以在 Interface Builder
    的身份检查器面板中编辑类的定义来手动声明出口，但`IBOutlet`方法更受推荐，其优势在于可以在源文件中记录出口信息。


    **代码清单 20-1.** Interface Builder 出口声明


    ```

    @interface TTTDocument : NSDocument {


    TicTacToeGame *game;


    NSString *gameOutcome;


    IBOutlet ChalkboardView *chalkboardView;


    }

    ```


    在`TicTacToe`项目中，`TTTDocument`对象需要引用显示`井字棋`游戏的`ChalkboardView`对象。在 Interface Builder
    中建立连接需要两个步骤：首先，在`TTTDocument`的`@interface`中将出口变量声明为`IBOutlet`，如代码清单 20-1 所示。


    然后打开`TTTDocument`的`NIB`文档，选择`TTTDocument`对象，在连接检查器中将出口的连接点拖拽到`ChalkboardView`对象上，如图
    20-6 所示。


    ***图 20-6.** 在 Interface Builder 中连接出口* 363


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第 20 章 ■ 模型-视图-控制器模式


    当`NIB`被加载时，`TTTDocument`的`chalkboardView`属性将被设置为指向新创建的`ChalkboardView`实例的指针。这在功能上等同于编写以下代码：


    ```

    document.chalkboardView = [ChalkboardView new];

    ```


    在 Interface Builder 中建立连接是一项非常常见的任务，因此提供了多种快捷方式：


    - 对对象执行**右键/Control-单击**，弹出出口检查面板。您可以像使用检查器面板一样设置或断开任何连接。

    - 从包含出口的对象**右键/Control-拖拽**到您想要连接的目标对象。将弹出一个出口补全面板，点击您想要设置的出口。

    - 在对象之间拖拽时，您可以从`NIB`文档窗口中的符号对象开始或结束拖拽，也可以从任何其他窗口中的可视化表示开始或结束拖拽。


    #### 动作


    第二种连接是动作。动作是在某些事件发生时发送给某个对象的 Objective-C 消息。动作由一对属性定义，它们构成了一种非正式协议：一个类型为`SEL`的动作属性，用于确定要发送的
    Objective-C 消息；一个类型为`id`的目标属性，用于确定消息的接收者。当“某事件”发生时，动作消息被发送给接收者（通常是一个控制器对象）。“某事件”的具体定义由视图对象自行决定，但通常包括鼠标点击（按钮、复选框、菜单项）、编辑事件（按回车键或从输入文本字段中跳出）或键盘快捷键（菜单项）。


    动作的接收者必须实现一个方法来接收消息。消息的形式必须如下所示：


    ```

    - (IBAction)playForPlayer:(id)sender;

    ```

