  trans: "\n# 关键事件\n\n关键事件沿着对象层级向下分发，通常是为了寻找第一响应者。事件的类型以及多层过滤会极大地影响关键事件的分发。关键事件首先传递给应用对象，然后传递给关键窗口，再传递给第一响应者，在某些情况下还会传递给菜单栏。\n\
    \n简而言之，关键事件会经历以下步骤：\n\n1.  操作系统将硬件按键码转换为用户当前使用的语言。关键事件会经过系统级按键绑定进行过滤，然后传递给已注册拦截全局关键事件的系统组件。这就是“热键”的处理方式。\n\
    2.  关键事件被推送到活动应用的事件队列中。\n3.  应用的主运行循环取出下一个关键事件，将其包装成一个 `NSEvent` 对象，并通过 `-sendEvent:`\
    \ 消息发送给 `NSApplication` 对象。\n4.  如果该按键可能是等效按键（通常是 Command+ 按键组合），应用会向关键窗口发送一条\
    \ `-performKeyEquivalent:` 消息，该窗口会解释该消息或将其传递给第一响应者。如果两者都没有响应此事件，则将其发送到应用的菜单栏。\n\
    5.  将 `-sendEvent:` 消息发送给关键窗口。\n6.  如果该按键是一个界面控制键（如 Tab、右箭头、向下翻页、Home），则由当前活动视图定义，窗口和/或控件会将其转换为一个操作，并向窗口或其第一响应者发送相应的按键操作消息（分别是\
    \ `-setNextKeyView:`、`-forward:`、`-pageDown:`、`-moveToBeginningOfDocument:`）。\n\
    7.  如果该事件既不是等效按键也不是界面控制，则第一响应者会收到一条 `-keyDown:`、`-keyUp:` 或 `-flagsChanged:` 消息。\n\
    8.  如果没有第一响应者且窗口未处理该关键事件，则会将其传递给菜单栏。\n\n大多数视图只需要重写 `-keyDown:`，可能还需要重写 `-keyUp:`\
    \ 或 `-flagsChanged:`，即可自动接收常规的关键事件。如果你正在编写一个编辑文本的视图——我不建议你尝试这样做——你的视图对象必须遵循 `NSTextInput`\
    \ 协议。\n\n说实话，关键事件的处理过程比这要复杂得多，但除非你正在编写一个需要过滤按键或创建按键绑定的应用程序，否则你通常可以忽略关键事件处理中更深奥的方面。完整的描述可以在\
    \ Cocoa 事件处理指南中找到。\n\n# 鼠标事件\n\n鼠标和触摸事件是利用用户界面的几何形状来分发的。鼠标事件总是与位置和窗口相关联，而位置和窗口则用于确定事件的接收者。\n\
    \n## 鼠标按下事件\n\n鼠标事件处理通常始于鼠标按下事件：\n\n1.  当鼠标被点击时，系统的 `WindowServer` 会确定哪个应用程序应该接收该事件。\n\
    2.  应用的主运行循环通过一条 `-sendEvent:` 消息将鼠标事件发送给 `NSApplication` 对象。\n3.  `NSApplication`\
    \ 使用事件的位置来确定事件发生在哪个窗口中，并通过另一条 `-sendEvent:` 消息将事件转发给该窗口。\n4.  窗口的 `-sendEvent:`\
    \ 方法使用该位置找到与点击相对应的子视图，并向该视图发送一条 `-mouseDown:` 消息。\n\n视图中的第一次鼠标按下事件会试图使其成为第一响应者。这会使该视图成为关键事件的接收者；其窗口将成为关键窗口，并固有地重新定义响应者链，这将在本章后面描述。要符合条件，视图在收到\
    \ `-acceptsFirstResponder` 消息时必须返回 `YES`。默认情况下，`NSView` 返回 `NO`。如果视图同意，它将被指定为第一响应者，并收到一条\
    \ `-becomeFirstResponder` 消息。当窗口被停用，或另一个视图成为第一响应者时，该视图会收到一条匹配的 `-resignFirstResponder`\
    \ 消息。\n\n视图也可以控制“点击穿透”。通常，在非活动窗口中点击鼠标会激活该窗口，但不会对该事件进行任何其他处理。在非活动窗口中点击控件通常需要两次点击：第一次激活窗口，第二次向视图发送\
    \ `-mouseDown:` 事件。视图可以通过重写 `-acceptsFirstMouse:` 来改变此行为。当窗口通过鼠标点击被激活时，它会通过向点击坐标下方的视图发送一条\
    \ `-acceptsFirstMouse:` 消息来查询该视图。如果视图返回 `YES`，窗口将立即向视图发送一条 `-mouseDown:` 消息——通过一个单一事件同时激活窗口和点击视图。默认情况下，对于\
    \ `-acceptsFirstMouse:`，`NSView` 返回 `NO`。\n\n## 鼠标拖动和鼠标松开事件\n\n一旦视图收到一条 `-mouseDown:`\
    \ 消息，它随后可能会收到 `-mouseDragged:` 和 `-mouseUp:` 消息。这些消息统称为鼠标跟踪消息。即使鼠标被拖到视图框架之外，同一个视图对象也会收到随后的\
    \ `-mouseDragged:` 和 `-mouseUp:` 消息。`-mouseDragged:` 仅在鼠标按钮按住的同时移动鼠标时发送。视图可能会收到多条\
    \ `-mouseDragged:` 消息，也可能一条都没有。视图在收到 `-mouseDown:` 消息之前，绝不会收到 `-mouseDragged:`\
    \ 或 `-mouseUp:` 消息。\n\n如果你希望你的视图在鼠标拖动手势期间执行一些有趣的操作，你可能需要重写全部三个方法。如果你只对实现点击行为感兴趣，请重写\
    \ `-mouseUp:` 并测试事件的位置，以确保鼠标仍然位于你的对象之上。\n\nTicTacToe 项目中的 `-mouseUp:` 处理程序如代码清单\
    \ 20-6 所示。\n\n**代码清单 20-6.** `-mouseUp:` 事件处理程序\n\n```\n- (void)mouseUp:(NSEvent*)theEvent\n\
    {\n    NSPoint loc = [self convertPoint:[theEvent locationInWindow] fromView:nil];\n\
    \    SquareIndex index;\n\n    for (index=0; index<9; index++) {\n        if (NSPointInRect(loc,[ChalkboardView\
    \ rectOfSquare:index])) {\n            [[self document] playerClickedSquare:index];\n\
    \            break;\n        }\n    }\n}\n```\n\n代码清单 20-6 中的方法通过一个 `NSEvent`\
    \ 对象接收鼠标事件信息。事件总是在窗口的坐标系中，因此它首先要做的是将位置转换为视图的局部坐标系。然后它进行搜索，看用户是否在游戏板的九个方格中的任何一个内部松开了鼠标。如果是，视图会向其控制器对象发送一条\
    \ `-playerClickedSquare:` 消息，控制器将执行移动并更新游戏板。\n\n处理鼠标拖动事件的另一种方法是留在你的 `-mouseDown:`\
    \ 方法中，并启动一个嵌套的运行循环，直到拖动完成。这实质上是一个“模态”鼠标拖动循环，它会阻止应用程序的其余部分执行，直到拖动结束。Cocoa 事件处理指南中包含一个鼠标跟踪循环的示例。\n\
    \n## 鼠标跟踪\n\n拖动手势期间的鼠标移动是自动提供的。鼠标按钮松开时的鼠标移动通常被忽略。鼠标移动很常见，计算成本高，并且通常对应用程序没有意义。\n\
    \n但是，在某些情况下，你可能希望在界面中接收到普通鼠标移动的通知。有两种技术可以在鼠标按钮松开时跟踪鼠标。\n\n第一种方法是向窗口请求鼠标移动事件：\n\
    \n1.  将包含该视图的窗口的 `acceptsMouseMovedEvents` 属性设置为 `YES`。\n2.  在子视图中实现 `-mouseMoved:`\
    \ 方法。\n\n一旦设置了 `acceptsMouseMovedEvents`，窗口就会开始向其视图发送 `-mouseMoved:` 消息，这与其分发其他鼠标事件的方式非常相似。\n"
- fmt: '# Mouse Tracking Rectangles and the Responder Chain


    The second method is to define a mouse tracking rectangle. A mouse tracking rectangle
    defines a discrete area of your view where mouse tracking is desired. It notifies
    your object when the mouse moves into the region, moves around in the region,
    and again when it leaves the region. This is much more efficient than fielding
    every mouse movement, but it is a little more complicated to set up.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Chapter 20 ■ Model-View-Controller Pattern


    1. Implement the methods `-mouseEntered:`, `-mouseExited:`, `-mouseMoved:` and
    `-cursorUpdate:` in an object. This could be your view object, or something else.

    2. Create an `NSTrackingArea` object using the rectangle of the area to track
    (in view coordinates) and the owner object created in step 1. You may also specify
    additional tracking options or provide a dictionary of context information.

    3. Attach the `NSTrackingArea` object to an `NSView` object by sending it an `-addTrackingArea:`
    message.


    Once attached, the owner object will receive mouse entered, moved, exited, and
    cursor update events.


    ## The Responder Chain


    The responder chain is the sequence of objects that starts with the first responder
    and goes up through the object hierarchy. The responder chain is the principal
    mechanism for determining how your application responds to commands and other
    actions.


    The complete responder chain is shown in Figure 20-15.


    ***Figure 20-15.** The responder chain*


    The responder chain processes action messages, which are Objective-C messages
    of the form `-(IBAction)action:(id)sender`, by examining each object in the chain
    to determine if it responds to (implements) the given message. If it does, the
    object receives the message. If not, the process examines the next object in the
    chain until an object that responds to the message is found, or there are no more
    objects.


    The two first responders in Figure 20-15 require a little explanation: the first
    responder is the single object that’s the “focus” of the interface. When a window
    loses key window status, it remembers the object that was formally its first responder.
    This becomes the window’s initial first responder. The initial first responder
    becomes first responder automatically when the window becomes key—assuming some
    other view doesn’t become first responder in the process. When the key and main
    windows are different, the responder chain starts with the first responder, goes
    through the key window, and then to the initial first responder of the main window.


    Much of the responder chain in Figure 20-15 is optional, and it’s unusual to find
    a situation where the entire chain is traversed. If the key window has no first
    responder object, the responder chain begins with the key window itself. If the
    key and main windows are the same, the responder’s superview hierarchy is only
    traversed once. Windows without controllers do not include a window controller
    in the chain. Non-document windows don’t have controllers or document objects
    and jump directly to the application. Window and application objects might not
    have delegates. Non-document-based applications do not have a document controller
    object, so the responder chain in those applications ends with the application
    or its delegate.


    If you’re developing an iPhone application, the responder chain principles are
    the same. The responder chains themselves will tend to be fairly simple. An iPhone
    application only displays a single `UIWindow` at a time, so the key and main windows
    are always one and the same. Actions passed to a `UIView` are first passed to
    its `UIViewController`, if it has one, before going to its enclosing `UIView`.


    ## Action Messages


    Actions, menu status queries, services, and error interpretations are all filtered
    through the responder chain. The simplest explanation of how the responder chain
    integrates with your application is to use an example. Take the application depicted
    in Figure 20-14, and consider the four menu commands Copy, Close, Save, and New.
    Each of these commands sends an action message (`-copy:`, `-performClose:`, `-saveDocument:`,
    and `-newDocument:`, respectively) to the first responder.


    - The `-copy:` action message is sent to the first responder. The first responder
    in Figure 20-14 is an editable text field that implements clipboard functionality.
    It responds to the `-copy:` message by transferring the current selection to the
    application’s pasteboard (clipboard).

    - The first responder does not implement the `-performClose:` method, nor do any
    of its superviews. The key window does, and it responds to `-performClose:` method
    by closing itself.

    - The first responder does not implement the `-saveDocument:` message. Neither
    do any of its superviews, the key window, its delegate, the views in the main
    window, the main window, its delegate, or the window controller. The `NSDocument`
    object is the object responsible for document management and is the object that
    implements the Save, and Save As… commands. It responds to the `-saveDocument:`
    message by encoding the contents of the active document and writing it to a file.

    - The `-newDocument:` message passes through every object in the responder chain
    until it reaches the single document controller object, created for document-based
    applications. The document controller creates a new document and opens an untitled
    window.


    The application’s response to commands changes, depending on the state of the
    responder chain:


    - If another view object was the first responder, the application might not respond
    to the Copy command.

    - Other windows in the application ignore the Close action, because they aren’t
    in the responder chain.

    - If the main window is not a document window, there would be no `NSDocument`
    object in its responder chain, so that window wouldn’t respond to a Save action.

    - The application always responds to the New command, because the top-level object
    in the chain consistently responds to it.


    ## Sending Action Messages


    An action message sent to a specific object is called a targeted action. An action
    sent to the responder chain is an untargeted action. An action consists of an
    Objective-C message identifier (`SEL`) and an object identifier (`id`). If the
    target identifier points to an object, it’s a targeted action. If the target identifier
    is `nil`, it’s an untargeted action.


    Actions are sent by sending the `NSApplication` object a `-sendAction:to:from:`
    message. The target (`to:`) parameter is either an object (targeted) or `nil`
    (untargeted). The application determines if the target responds to the action,
    or attempts to find a target that responds to the action in the responder chain.
    If successful, the target object is sent the action message and `-sendAction:to:from:`
    returns `YES`. You can send actions programmatically, but `NSControl` views, menu
    items, and keyboard equivalents usually send them for you.


    In Interface Builder, an action is defined as a message/object pair. If the action
    is connected directly to another object in the NIB document, it defines a targeted
    action. Connecting an action to the First Responder placeholder NIB object creates
    an untargeted action that will be delivered to the current first responder at
    runtime.


    ## Menu Actions


    The menu items in a Cocoa application are another prominent use of the responder
    chain. When you drop down an application menu, only those items that are applicable
    to the current interface state are enabled. Menu items that are inappropriate
    are disabled.'
