    **C H A P T E R 6**


    ■ ■ ■


    Sending Messages


    Sending messages (calling methods) is fundamental to programming. You already
    know the basics of Objective-C messages. This chapter delves into the mechanics
    of how messages are sent, describes three different techniques for invoking methods
    programmatically, and explains how to write methods that accept a variable number
    of arguments. It isn’t absolutely necessary to understand these topics in detail,
    but expanding your knowledge makes technologies like notifications, actions, remote
    invocation, and Key-Value Observing a little more comprehensible.


    As briefly explained in Chapter 3, methods in Objective-C are not called in the
    Java sense.


    Messages are sent to objects via a dynamic dispatching function. Sending a message
    to an object involves (approximately) these steps:


    1\. The message parameters are assembled and copied onto the stack.


    2.


    A pointer to the receiver and the message selector constant are copied onto the
    stack.


    3.


    The message dispatch function is called. In Apple’s implementation of Objective-C
    the function called is typically objc_msgSend(), but in general, it’s best to
    ignore the implementation details of the runtime system.


    4.


    If the receiver value is nil, the dispatching function returns immediately.


    5.


    The message dispatch function uses the receiving object’s pointer to obtain its
    isa instance variable. This variable points to the object’s Class object, which
    contains the dispatch table for the class.


    6.


    The selector is used to look up the address of the method’s code in the dispatch
    table.


    7.


    The CPU’s program counter is loaded with the address and the method’s code begins
    executing.


    8.


    Execution proceeds until the method ends, and program control returns to the code
    that originally sent the message.


    ■Note Message dispatching might seem like a convoluted and inefficient procedure,
    but it is highly optimized.


    Selectors are constants and the method dispatch tables are cached. In most cases,
    sending a message takes only a few nanoseconds on modern systems. For performance-sensitive
    applications, even that can be eliminated (see


    “Calling Methods Directly” at the end of this chapter). In general, don’t be overly
    concerned about message performance.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6 ■ SENDING MESSAGES


    A class method receives all of the message parameters as automatic variables,
    including the receiver and the selector. The self variable contains the pointer
    to the receiver and the _cmd variable contains the message selector. The _cmd
    variable is usually uninteresting because it is always the selector for the method.


    Compiling Messages


    The Objective-C compiler translates each method invocation into the machine instructions
    that will send the message. In order to emit the correct machine instructions,
    the compiler must know the size and type of each parameter and the type of the
    return value.


    Java goes to some lengths to ensure that the compiler knows exactly how to construct
    each method call. Java always has the details of each class, the class of an object
    reference is always known, and Java method signatures ensure that there is never
    any ambiguity about the parameter types a method expects. As you might imagine,
    Objective-C is considerably more lax. This occasionally leads to circumstances
    where the exact meaning of a method invocation is ambiguous. I’ll explain why
    this can happen and what you can do to rectify it.


    Keep in mind that these are exceptional cases. The vast majority of the time,
    the compiler knows exactly what to do. If the receiver’s variable type is a pointer
    to a specific class and the method prototypes for that class have been compiled,
    the compiler has all of the information it needs.


    However, if the compiler has not compiled a prototype for the method, or the class
    of the receiver is vague (i.e., id), the compiler must either guess the types
    of the parameters or arbitrarily choose a method prototype from those it knows
    about.


    Undeclared Methods


    The first case arises when a method prototype has never been compiled, either
    by omitting the class definition or when a class definition is incomplete—the
    method might be declared in a category of that class or not declared at all. When
    this occurs, as shown in Listing 6-1, the compiler infers the parameter types
    from the invocation. In other words, the compiler guesses.


    Listin g 6-1\. Undeclared Method Invocation


    @class ToasterController;


    ToasterController *toaster;


    …


    [toaster setDarkness:1];


