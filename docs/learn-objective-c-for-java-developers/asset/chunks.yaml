    Controllers implement the actions of your application; providing custom actions
    will eventually involve implementing your own methods.


    One consideration is to decide whether to implement your application’s actions
    in a subclass of a controller or in a delegate.


    • If you need to override the methods of a controller, create a subclass.


    • If it makes sense to extend the controller class with new instance variables,
    create a subclass.


    • If you are only implementing custom action methods, implement them in the delegate.


    • If you need sets of actions that can be “plugged-in” to different controllers
    to create customized behavior, implement them in a delegate.


    • If your solution has a mixture of needs, you can implement both: subclass the
    controller and attach a delegate.


    There are a couple of steps to creating subclasses of NSApplication and NSDocument,
    because these objects are created by the framework—by the NSApplicationMain()
    function and the NSDocumentController, respectively. If you subclass them, you
    have to tell the framework which class to instantiate.


    Creating a Custom NSApplication


    To create a subclass of NSApplication, do the following:


    1\. Define a subclass of NSApplication.


    2\. Set the Principal Class (NSPrincipalClass) value in the application’s Info.plist
    file to the name of the class created in step 1.


    The NSApplicationMain() function reads the Info.plist property file at startup
    and uses that value to create the single application object. You can obtain a
    reference to the application object using


    +[NSApplication sharedApplication] or through the global NSApp variable.


    If you create a subclass of NSApplication, you can directly access its outlets
    and actions in Interface Builder by changing the class of the Application placeholder
    object in your NIB documents to your custom class.


