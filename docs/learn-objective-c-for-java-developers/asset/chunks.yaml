    ■**注意** `[[object retain] autorelease]`模式被许多Objective-C新手过度使用。它有其适用之处，但通常表明试图应用内存管理“玄学”，而非解决实际问题。


    在清单24-17中，从属性getter返回了一个自动释放的对象。随后更改属性，释放了之前的对象，而该对象仍在被引用。


    **清单 24-17.** 对象被设置器销毁


    ```objectivec

    id two = [self two];


    [self setTwo:nil];


    // |two| 不存在！

    ```


    对此问题有三种解决方案：


    *   使用清单24-10中的`-setOne:`所演示的设置器模式。该设置器会先自动释放之前的对象，而不是立即释放它。

    *   在赋值时显式保留属性对象（例如，`id two = [[[self two] retain] autorelease]`），这将保护它不被`-setTwo:`消息释放。

    *   编写属性getter，使其每次返回值时都重新自动释放该对象（例如，`return [[two retain] autorelease]`）。


    在这些解决方案中，第一种是首选方案。它不需要调用者的介入，保留了返回属性值的自动释放约定，并且高效。如果您无法控制类的实现，则应使用第二种方案。最后一种方案效率低下，并且常被经验不足的程序员无休止地使用。


    **循环引用**


    引用计数的一个主要问题是循环引用，对此没有通用解决方案。如果两个对象都持有了对彼此的引用，这两个对象将永远不会被释放。


    如何解决这个问题取决于具体情况。一种常见的解决方案是存储未保留的引用，即所谓的弱引用。这不应与垃圾回收中使用的术语“弱引用”混淆，因此我将使用术语“未保留引用”。未保留引用通常用于委托、观察者和父对象引用。清单24-18展示了一个对象树中节点的接口，该节点持有对它的父节点的未保留引用。


    **清单 24-18.** 未保留的对象属性


    ```objectivec

    @interface TreeNode : NSObject {


    TreeNode *parent;


    NSMutableArray *children;


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第24章 ■ 内存管理


    @property (assign) TreeNode *parent;


    …


    @end

    ```


    通过使用`assign`属性特性，设置`parent`属性时不会保留该属性。风险在于，该节点可能从树中被移除，随后尝试向其父对象发送消息，而父对象可能已不存在。如果您仔细设计对象，使其在那些对象可能已被释放的情况下，绝不可能试图使用任何未保留的引用，那么这种方法是可行的。


    对此类问题的最佳解决方案是添加代码，在节点从树中移除之前，显式清除对父节点的引用。在引用被保留的情况下，这打破了循环引用并允许节点被销毁。在引用未被保留的情况下，这确保了节点不会尝试使用过时的引用。


    **创建自动释放池**


    通常，您不会自己创建自动释放池，但在少数情况下您必须创建，或者您可能希望创建。'
  raw: 'ObjectAlloc tracks the lifetime of all of the Objective-C objects in your
    application. It records when each was allocated, retained, released, and deallocated.
    It presents the total instances of each class graphically, allowing you to quickly
    identify a group of objects that are being allocated but never deallocated. You
    should occasionally run your application under the gaze of ObjectAlloc to look
    for object leaks.


    Once you find a leak, use ObjectAlloc again to examine the history of +alloc,
    -retain, -release, and -dealloc messages sent to those objects. An instance’s
    history should expose where the imbalance is occurring.


    Overreleased or Underretained Objects


    Overreleased or underretained objects are ones that receive one too many -release
    messages. The object is destroyed while still being retained by other objects.
    The orphaned object pointer then points to invalid memory. The effects of using
    an invalid object pointer can range from the inconsistent to the catastrophic.


    The best debugging tool for finding overreleased objects is NSZombies, not to
    be confused with any of the zombie examples in this book. There are several debugging
    facilities built into the Objective-C


    runtime that can be enabled through environment variables. The two most commonly
    used to find overreleased objects are listed in Table 24-1.


