    http://unicode.org/reports/tr35/tr35-6.html, 2006.'
  raw: 'To format a char as an unsigned numeric value, use the specifier %hhu. To
    format a 64-bit long long integer in hexadecimal, use the specifier %llx or %qx.
    If you are unsure if the type of an argument will match its specifier, force it
    using a typecast, as in [NSString stringWithFormat:@"%hi",(short int)i].


    In 32-bit CPU architectures, the long int type is 32-bits, so int and long int
    mean the same thing. Nevertheless, it’s good programming practice to match the
    correct length modifier (%ld) when passing a long int argument, even though the
    simpler form (%d) is compatible.


    Objective-C string formatting does not provide format specifiers for Boolean values,
    dates, or times. The -[NSDate description] method returns the date and time using
    an ISO-like international format. If that’s sufficient, the date object can be
    formatted using %@. For more complex date formatting, use NSDateFormatter, the
    results of which can then be inserted into a format string using %@. When formatting
    Boolean values, I typically use a trinary conditional expression, as in [NSString
    stringWithFormat:@"%@",(t?@"YES":@"NO")].


    This is by no means a comprehensive exploration of formatting strings. The Cocoa
    framework implements the IEEE printf specification, with some additional Objective-C–specific
    extensions. This IEEE standard is extensive and includes many obscure options,
    features, and specifiers. The “Format 130


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 8 ■ STRINGS AND PRIMITIVE VALUES


    Specifiers” section of “String Programming Guide for Cocoa”1, published by Apple,
    and “Standard 1003.1,”2 published by the IEEE and The Open Group, contain complete
    descriptions.


    NSFormatter


    The NSFormatter class is the abstract base class for objects used to convert value
    objects into strings and vice versa. Don’t confuse it with the java.util.Formatter
    class. Java’s Formatter is where the formatting logic described in the previous
    section is implemented. Cocoa’s NSFormatter class defines an abstract interface
    for creating formatter objects. NSFormatter objects perform the conversion between
    what the user sees and types and (potentially) complex values such as currency,
    calendar dates, and clock times.


    NSFormatter objects are intended to encapsulate features such as normalization,
    localization, and user display preferences—transformations too complex for simple
    format specifiers. They can be used in isolation or attached to certain view objects,
    where they are invoked automatically to translate between the data model and the
    view.


    The Cocoa framework provides two concrete implementations: NSNumberFormatter and
    NSDateFormatter. If you have the need, you can subclass NSFormatter and create
    your own.


    Significant changes have been made to some NSFormatter classes over the years.
    For backwards compatibility, these classes may exhibit legacy behavior unless
    configured otherwise. Review the NSFormatter behavior for your programming environment.
    For the best experience, use the modern behavior when available. If this is not
    the default, Listing 8-7 shows how to set the modern behavior before you begin
    using them.


    Listin g 8-7\. Setting Modern Formatting Behavior


    // Send these two messages before creating any date or number formatter objects.


    // A good place to do this is in your application initialization.


    // This will set the behvior mode for all new date & number formatter objects.


    [NSDateFormatter setDefaultFormatterBehavior:NSDateFormatterBehavior10_4];


    [NSNumberFormatter setDefaultFormatterBehavior:NSNumberFormatterBehavior10_4];


    // Or, you can individually set the behavior of each date & number


    // formatter after it is created.


    NSDateFormatter *dateFormatter = [NSDateFormatter new];


    [dateFormatter setFormatterBehavior:NSDateFormatterBehavior10_4]; NSNumberFormatter
    *numberFormatter = [NSNumberFormatter new];


    [numberFormatter setFormatterBehavior:NSNumberFormatterBehavior10_4]; Formatters
    are configured with the desired formatting options, and then repeatedly used to
    convert values. The -(NSString*)stringForObjectValue:(id)value method uses the
    currently configured format to turn an object value into a string. The -(BOOL)getObjectValue:(id*)object
    forString:(NSString*)string errorDescription:(NSString**)error performs the opposite
    conversion, returning a value for the given string. It returns YES if the conversion
    was successful. If unsuccessful, it returns NO and creates an error object describing
    the problem.


    1 Apple, Inc., “String Programming Guide for Cocoa,” http://developer.apple.com/documentation/


    Cocoa/Conceptual/Strings/index.html, 2008.


    2 The IEEE and The Open Group, “The Open Group Base Specification Issue 6, IEEE
    Std 1003.1,”


    http://www.opengroup.org/onlinepubs/009695399/functions/printf.html, 2004.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 8 ■ STRINGS AND PRIMITIVE VALUES


    NSNumberFormatter


    NSNumberFormatter formats decimal numbers. It implements two convenience methods:


    -stringFromNumber: and -numberFromString:. The easiest way to configure a formatter
    is to use one of the predefined formatting styles using -setNumberStyle:. Styles
    take into account the user’s language, cultural conventions of the user’s locale,
    and their global display preferences. Table 8-9 lists some of the predefined number
    format styles.


    ***Table 8-9.** Predefined Number Formatting Styles*


    Style


    Use f or


    NSNumberFormatterDecimalStyle Decimal


    numbers


    NSNumberFormatterCurrencyStyle Local


    currency


    NSNumberFormatterPercentStyle Percentages


    NSNumberFormatterScientificStyle Scientific


    notation


    NSNumberFormatterSpellOutStyle


    Natural language (i.e., “twenty-two”)


    If one of the predefined styles is insufficient, you can configure a formatter
    using a number format pattern. Number format strings use the Unicode Number Format
    Patterns standard (Unicode Technical Standard #353), and should not be confused
    with the format specifiers used by


    -stringWithFormat: and similar methods. Number format patterns form a template
    describing how many significant digits to display, what punctuation to use, and
    may contain alternate templates for zero and negative values. Table 8-10 shows
    some sample number format patterns and the resulting string when formatting numbers
    for an English-speaking user in the US. Table 8-11 shows the same results for
    a user in Spain.


    ***Table 8-10.** Example Number Format Patterns in English (US)* Nu mb er For
    mat


    123 4.5 6


    - 0.98 76 5


    #,##0.5 7.0


    1,234.6


    0.0


    -1.0


    #,##0.###;zero;#,##0.###- 7


    1,234.56


    zero


    0.988-


    000000.0000 000007.0000


    001234.5601


    000000.0000


    -000000.9876


    00.0% 700.0%


    123456.0%


    00.0%


    -98.8%


    3 Mark Davis, “Unicode Technical Standard #35, Locale Data Markup Language,” http://unicode.org/reports/tr35/


    tr35-6.html, 2006.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 8 ■ STRINGS AND PRIMITIVE VALUES


    ***Table 8-11.** Example Number Format Patterns in Spanish (Spain)* Nu mb er For
    mat


    123 4.5 6


    - 0.98 76 5


    #,##0.5 7,0


    1.234,6


    0,0


    -1,0


    #,##0.###;zero;#,##0.###- 7


    1.234,56


    zero


    0,988-


    000000.0000 000007,0000


    001234,5601


    000000,0000


    -000000,9876


    00.0% 700,0%


    123456,0%


    00,0%


    -98,8%


    Finally, you can take extremely fine-grained control over the formatting by individually
    setting any of the nearly forty properties of NSNumberFormatter directly.


    Number format styles localize the results automatically. The format strings localize
    some elements for you, like the decimal separator character, but not all. Individually
    setting the various NSNumberFormatter properties gives you the ultimate control,
    but ignores the localization and display preferences set by the user.


