- fmt: "The `@interface` directive of an extension is identical to a category, except\
    \ that the category name is empty. An extension does not have a separate `@implementation`.\
    \ Methods declared in extensions must be implemented in the class’s `@implementation`,\
    \ along with the rest of the regular class methods (see Listing 5-10).\n\n**Listin\
    \ g 5-10.** Extension\n\n```objc\n@interface CaseDocument : NSObject {\n@private\n\
    \    CaseNumber caseNumber;\n}\n\n- (CaseNumber)caseNumber;\n\n@end\n\n@interface\
    \ CaseDocument ()\n\n- (void)setCaseNumber:(CaseNumber)number;\n\n@end\n\n@implementation\
    \ CaseDocument\n\n- (CaseNumber)caseNumber { return (caseNumber); }\n- (void)setCaseNumber:(CaseNumber)number\
    \ { caseNumber = number; }\n\n@end\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 5: EXPLORING PROTOCOLS AND CATEGORIES\n\nIt is assumed that the first\
    \ `@interface` directive in Listing 5-10 is stored in the `CaseDocument.h` file,\
    \ and is imported by other modules that use the `CaseDocument` class. The `@interface`\
    \ for the extension could be in its own header file or part of the `CaseDocument`\
    \ implementation file. Either way, the methods in the extension are not publicly\
    \ known, making the `caseNumber` property appear immutable to other modules, but\
    \ mutable within the implementation of the class. When compiling the extension\
    \ declaration, also compile the original class declaration. The compiler works\
    \ best when it can relate the extension to the class.\n\nRemember that category\
    \ and extensions only hide the declaration of methods from the compiler and programmer.\
    \ At runtime, all of these methods exist and can be discovered using introspection.\
    \ In the `CaseDocument` example in Listing 5-10, the `caseNumber` property will\
    \ appear to be mutable to technologies like Key Value Observing. Those technologies\
    \ dynamically examine the object at runtime to determine if it implements a matched\
    \ pair of getter and setting methods for the `caseNumber` property—which `CaseDocument`\
    \ does. To make `caseNumber` appear read-only to introspection, the internal `setCaseNumber:`\
    \ method should be renamed to something like\n\n`-(void)assignToCase:(CaseNumber)number`.\
    \ This breaks the naming contract for the property, leaving `caseNumber` with\
    \ a getter but no setter.\n\n**Summary**\n\nAs you can see, Objective-C protocols\
    \ and categories are more flexible and dynamic than Java interfaces.\n\nThey can\
    \ declare optional methods, subdivide a class’s implementation into multiple modules,\
    \ and augment other classes with new functionality.\n\nClasses, protocols, and\
    \ categories exhaust the techniques for declaring methods. The next chapter explains\
    \ the various ways of invoking them.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**C H A P T E R 6**\n\n■ ■ ■\n\n**Sending Messages**\n\nSending messages (calling\
    \ methods) is fundamental to programming. You already know the basics of Objective-C\
    \ messages. This chapter delves into the mechanics of how messages are sent, describes\
    \ three different techniques for invoking methods programmatically, and explains\
    \ how to write methods that accept a variable number of arguments. It isn’t absolutely\
    \ necessary to understand these topics in detail, but expanding your knowledge\
    \ makes technologies like notifications, actions, remote invocation, and Key-Value\
    \ Observing a little more comprehensible.\n\nAs briefly explained in Chapter 3,\
    \ methods in Objective-C are not called in the Java sense.\n\nMessages are sent\
    \ to objects via a dynamic dispatching function. Sending a message to an object\
    \ involves (approximately) these steps:\n\n1.  The message parameters are assembled\
    \ and copied onto the stack.\n2.  A pointer to the receiver and the message selector\
    \ constant are copied onto the stack.\n3.  The message dispatch function is called.\
    \ In Apple’s implementation of Objective-C the function called is typically `objc_msgSend()`,\
    \ but in general, it’s best to ignore the implementation details of the runtime\
    \ system.\n4.  If the receiver value is `nil`, the dispatching function returns\
    \ immediately.\n5.  The message dispatch function uses the receiving object’s\
    \ pointer to obtain its `isa` instance variable. This variable points to the object’s\
    \ `Class` object, which contains the dispatch table for the class.\n6.  The selector\
    \ is used to look up the address of the method’s code in the dispatch table.\n\
    7.  The CPU’s program counter is loaded with the address and the method’s code\
    \ begins executing.\n8.  Execution proceeds until the method ends, and program\
    \ control returns to the code that originally sent the message.\n\n**Note** Message\
    \ dispatching might seem like a convoluted and inefficient procedure, but it is\
    \ highly optimized.\n\nSelectors are constants and the method dispatch tables\
    \ are cached. In most cases, sending a message takes only a few nanoseconds on\
    \ modern systems. For performance-sensitive applications, even that can be eliminated\
    \ (see “Calling Methods Directly” at the end of this chapter). In general, don’t\
    \ be overly concerned about message performance.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 6: SENDING MESSAGES\n\nA class method receives all of the message\
    \ parameters as automatic variables, including the receiver and the selector.\
    \ The `self` variable contains the pointer to the receiver and the `_cmd` variable\
    \ contains the message selector. The `_cmd` variable is usually uninteresting\
    \ because it is always the selector for the method.\n\n### Compiling Messages\n\
    \nThe Objective-C compiler translates each method invocation into the machine\
    \ instructions that will send the message. In order to emit the correct machine\
    \ instructions, the compiler must know the size and type of each parameter and\
    \ the type of the return value.\n\nJava goes to some lengths to ensure that the\
    \ compiler knows exactly how to construct each method call. Java always has the\
    \ details of each class, the class of an object reference is always known, and\
    \ Java method signatures ensure that there is never any ambiguity about the parameter\
    \ types a method expects. As you might imagine, Objective-C is considerably more\
    \ lax. This occasionally leads to circumstances where the exact meaning of a method\
    \ invocation is ambiguous. I’ll explain why this can happen and what you can do\
    \ to rectify it.\n\nKeep in mind that these are exceptional cases. The vast majority\
    \ of the time, the compiler knows exactly what to do. If the receiver’s variable\
    \ type is a pointer to a specific class and the method prototypes for that class\
    \ have been compiled, the compiler has all of the information it needs.\n\nHowever,\
    \ if the compiler has not compiled a prototype for the method, or the class of\
    \ the receiver is vague (i.e., `id`), the compiler must either guess the types\
    \ of the parameters or arbitrarily choose a method prototype from those it knows\
    \ about.\n\n### Undeclared Methods\n\nThe first case arises when a method prototype\
    \ has never been compiled, either by omitting the class definition or when a class\
    \ definition is incomplete—the method might be declared in a category of that\
    \ class or not declared at all. When this occurs, as shown in Listing 6-1, the\
    \ compiler infers the parameter types from the invocation. In other words, the\
    \ compiler guesses.\n\n**Listin g 6-1.** Undeclared Method Invocation\n\n```objc\n\
    @class ToasterController;\nToasterController *toaster;\n…\n[toaster setDarkness:1];\n\
    ```\n\n**warning: no ‘-setDarkness:’ method found**"
