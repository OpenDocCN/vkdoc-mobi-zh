    CHAPTER 1 ■ INTRODUCTION


    State of the Art Compiler


    Because Objective-C is a thin layer on top of C, it follows the tide of C language
    changes. As new features, optimizations, target processors, and other technologies
    are added to C, Objective-C comes along for the ride. This allows Objective-C
    to remain current with modern technology and techniques.


    The state of compiler technology today also means that Objective-C code is remarkably
    portable. Not too long ago, it was highly unlikely that C written for one platform
    would compile and run on a different system or architecture. This was one of the
    joys of Java’s “write once, run anywhere”


    design. Today, a single C compiler can target scores of different processors and
    hardware with the flick of a (command-line) switch. Case in point: Apple decided
    not too long ago to convert their entire line of personal computer systems from
    Motorola/IBM to Intel processors. Tens of millions of lines of Objective-C were
    ported to an entirely new architecture with little or no disruption in development.'
