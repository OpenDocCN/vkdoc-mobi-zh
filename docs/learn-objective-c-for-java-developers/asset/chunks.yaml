  trans: "\n# Objective-C 线程\n\nObjective-C 线程的创建十分简便，因为线程的代码可以是任意对象的任意方法。在 Java 中，包含代码的对象必须实现\
    \ `Runnable` 接口，并在其 `run()` 方法中实现代码。而 Objective-C 仅有的要求是：包含线程代码的方法需接受一个对象参数（可忽略）并返回\
    \ void。清单 15-1 展示了如何启动一个线程。\n\n**清单 15-1.** 启动一个线程\n\nJava\n\n```java\npublic\
    \ class Runner implements Runnable\n\n{\n\n    public void run()\n\n    {\n\n\
    \        System.out.println(\"使用线程运行。\");\n\n    }\n\n}\n\n…\n\nRunner runner\
    \ = new Runner();\n\nThread thread = new Thread(runner);\n\nthread.start();\n\
    ```\n\nObjective-C\n\n```objc\n@implementation Runner\n\n- (void)runMe:(id)ignored\n\
    \n{\n\n    NSLog(@\"使用线程运行。\");\n\n}\n\n@end\n\n…\n\nRunner *runner = [Runner\
    \ new];\n\n[NSThread detachNewThreadSelector:@selector(runMe:)\n\n           \
    \          toTarget:runner\n\n                   withObject:nil];\n```\n\n**主线程**\n\
    \n主线程是进程创建时启动的第一个线程，具有特殊性。所有用户输入和事件都会被发送到主线程上运行的事件循环。所有用户界面的更改都必须在主线程上进行；用户界面框架并非线程安全。从任何实际意义上讲，应用程序的进程就是主线程。当主线程结束时，进程会终止——并立即杀死所有其他线程。\n\
    \n有许多方法可以引用、定位、检测或返回主线程。这些方法允许你在必要时轻松定位主线程或其事件循环。\n\n**管理线程**\n\n关于管理线程的最佳建议是“不要管理”。线程对微管理反应不佳，这会使你的代码变得脆弱且可移植性差。最重要的是，不要试图猜测内核的线程调度器，也不要试图强制其表现出特定行为。随着内核线程调度变得越来越复杂，用于操作运行线程的应用程序编程接口数量已经减少。例如，Objective-C\
    \ 没有 `yield()` 的等价方法，而 `java.lang.Thread` 中的 `stop()`、`suspend()` 和 `resume()`\
    \ 方法均已弃用。\n\n线程应围绕定义清晰、自洽的任务来组织。它们应尽量减少通信，并使用信号量与其他线程协调工作。除此之外，你只需让线程在有工作时运行，没有工作时挂起即可。如果你发现自己不得不在代码中插入睡眠语句或创建信号量来强制内核切换任务，那么你应该重新审视任务的设计。\n\
    \n话虽如此，在某些特殊情况下，你可能需要更改任务属性或使其休眠。接下来将说明如何使线程休眠。线程属性将在后续小节中讨论。\n\n**使线程休眠**\n\n\
    使线程休眠一段时间是少数保留下来的线程状态操作之一。\n\n使线程休眠会挂起该线程，直到指定的时间间隔过去。之后，该线程会再次变为“可运行”状态，内核会将其重新加入正在运行的线程轮转中。换句话说，并不保证线程在时间间隔过后会立即恢复运行；只是在时间间隔过去之前它不会再次运行而已。\n\
    \n`NSThread` 的 `+sleepUntilDate:` 和 `+sleepForTimeInterval:` 方法会导致当前线程无条件地休眠给定的时间长度。这可以是一个未来的\
    \ `NSDate` 对象，也可以是一个以秒为单位的 `NSTimeInterval` 值。日期和时间间隔使用双精度浮点值来表示秒，因此可以指定纳秒级的时间间隔。内核不保证时间的精确度，只保证在该时间过去之前线程不会再次执行。\n"
- fmt: "There are also many methods—most of which are described in later sections—that\
    \ will conditionally put a thread to sleep for a period of time. These messages\
    \ accept an `NSDate` object that specifies a time in the future to abandon waiting\
    \ for the condition and resume. The simplest example are the methods `-[NSLock\
    \ lock]` and `-[NSLock lockBeforeDate:(NSDate*)limit]`. Both attempt to obtain\
    \ a lock on an `NSLock` semaphore. The `-lock` method will wait forever to obtain\
    \ the lock. In contrast, `-lockBeforeDate:` will return when either the lock is\
    \ obtained or the time specified by the `NSDate` is reached.\n\n> **Tip:** To\
    \ create an `NSDate` object with a time two and a half seconds in the future,\
    \ use `[NSDate dateWithTimeIntervalSinceNow:2.5]`. To get an `NSDate` object with\
    \ a time that will never be reached (in your lifetime), use `[NSDate distantFuture]`.\n\
    \nPut threads to sleep when they need to perform actions at timed intervals. Listing\
    \ 15-2 demonstrates a simple class that runs a “heartbeat” thread which updates\
    \ a progress indicator no more than twice per second.\n\n**Listing 15-2. Heartbeat\
    \ Thread**\n\n```objc\n@interface Process : NSObject\n\n@property double progress;\n\
    \n@end\n\n@interface Heartbeat : NSObject {\n    NSThread *thread;\n    Process\
    \ *monitor;\n    NSProgressIndicator *indicator;\n}\n\n+ (Heartbeat*)startHeartbeatProcess:(id)process\n\
    \                  withIndicator:(NSProgressIndicator*)progress;\n- (void)stop;\n\
    - (void)heartbeatThread:(id)ignored;\n- (void)updateIndicator;\n\n@end\n\n…\n\n\
    @implementation Heartbeat\n\n+ (Heartbeat*)startHeartbeatProcess:(id)process\n\
    \                  withIndicator:(NSProgressIndicator*)progress\n{\n    Heartbeat\
    \ *heartbeat = [Heartbeat new];\n    heartbeat->monitor = process;\n    heartbeat->indicator\
    \ = progress;\n    heartbeat->thread = [[NSThread alloc] initWithTarget:heartbeat\n\
    \                                                selector:@selector(heartbeatThread:)\n\
    \                                                  object:nil];\n    [heartbeat->thread\
    \ start];\n    return heartbeat;\n}\n\n- (void)stop\n{\n    [thread cancel];\n\
    }\n\n- (void)heartbeatThread:(id)ignored\n{\n    while (![thread isCancelled])\
    \ {\n        [self performSelectorOnMainThread:@selector(updateIndicator)\n  \
    \                             withObject:nil\n                            waitUntilDone:YES];\n\
    \        [NSThread sleepForTimeInterval:0.5];\n    }\n}\n\n- (void)updateIndicator\n\
    {\n    [indicator setDoubleValue:monitor.progress];\n}\n\n@end\n```\n\nThe message\
    \ `+startHeartbeatProcess:withIndicator:` creates a `Heartbeat` object and starts\
    \ its `-heartbeatThread:` method running in a new thread. Approximately every\
    \ half-second, the thread queues an `-updateIndicator` message to be executed\
    \ on the main thread. The thread runs until the `Heartbeat` object receives a\
    \ `-stop` message.\n\nNote that the example in Listing 15-2 is far from the most\
    \ effective use of a thread. While it would work, a much more sensible solution\
    \ is provided in the Timer section at the end of this chapter.\n\n## Thread Properties\n\
    \nThread objects have a number of properties that relate pertinent information.\
    \ The caveats about superfluous thread management withstanding, there are also\
    \ a few thread properties that you might need to alter. Some can only be set before\
    \ the thread is started, while others can only be set after.\n\n### Information\n\
    \nThe thread informational properties are listed in Table 15-2. You can use them\
    \ to obtain relevant `NSThread` objects or inspect the state of a thread. The\
    \ class methods return global values or information about the currently executing\
    \ thread. Instance methods can be sent to any `NSThread` object, from any thread.\n\
    \n**Table 15-2.** Informational Thread Properties\n\n| `NSThread` Method | Description\
    \ |\n| :--- | :--- |\n| `+currentThread` | The `NSThread` object of the currently\
    \ executing thread |\n| `+mainThread` | The `NSThread` object of the main thread\
    \ |\n| `+isMainThread` | Returns `YES` if the current thread is the main thread\
    \ |\n| `+isMultiThreaded` | Returns `YES` if another thread, beyond the main thread,\
    \ has ever been started by `NSThread` |\n| `-isMainThread` | Returns `YES` if\
    \ the thread object represents the main thread |\n| `-isExecuting` | |"
