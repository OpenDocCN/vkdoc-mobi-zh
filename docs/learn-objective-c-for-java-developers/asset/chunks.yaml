    When creating a timer object, you specify the time interval in seconds, an optional
    context object, and a flag that determines if the timer repeats. The target of
    the timer is either an NSInvocation object or a receiving object pointer and method
    identifier pair. The method must expect to receive the NSTimer object pointer
    as its only parameter and return void. The receiver can use the timer object’s
    userInfo property to retrieve the supplementary context object.


    NSTimer objects can be created using any of the +timerWithTimeInterval:… messages
    and later scheduled to run on a run loop using -[NSRunLoop addTimer:forMode:].
    However, it is simpler to create and schedule the timer to run using a single
    +scheduledTimerWithTimeInterval:… message.


