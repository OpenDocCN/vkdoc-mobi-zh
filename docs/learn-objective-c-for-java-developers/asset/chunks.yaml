  raw: 'Objective-C’s NSException object provides a callStackReturnAddresses property
    that returns an array of NSNumber objects containing the return addresses of the
    stack’s call chain when the exception was thrown. Unlike Java, Objective-C provides
    no facility for interpreting these values. An Objective-C


    program, being compiled machine code, might not even include any symbolic function
    information, making interpretation impossible.


    The Introduction to Exception Programming Topics for Cocoa2 guide includes sample
    code that uses the atos development tool to translate these numeric stack addresses
    into program symbols—if possible. If you maintain a copy of your compiled application
    with debugging symbols, you can manually use the atos tool to perform the same
    translation for post-mortem analysis of exceptions.


    2 Apple, Inc., Introduction to Exception Programming Topics for Cocoa, http://developer.apple.com/documentation/


    Cocoa/Conceptual/Exceptions/, 2007.


