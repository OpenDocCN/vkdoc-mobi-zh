  trans: "\n# 注意事项\n\n在 64 位架构中，整数的大小再次发生了变化。如果你为 64 位 CPU 编译代码，`long int` 会变为 64\
    \ 位整数——而 `short int`、`int` 和 `long long int` 则保持原有大小。如果你需要一种在 32 位架构上为 32 位、在\
    \ 64 位架构上为 64 位的整数值，请将其声明为 `NSInteger` 或 `NSUInteger`。它们是 C 语言中的 `typedef`，会根据架构改变自身大小。请留意\
    \ API 以确定正确的类型。如果某个方法返回 `NSInteger`，请将接收该值的变量也声明为 `NSInteger`。这样，无论编译为 32 位还是\
    \ 64 位可执行文件，其行为都将保持一致。\n\nJava 通过消除无符号整数类型简化了传统的 C 语言。在 C 语言中，整数分为有符号和无符号两种类型。与\
    \ Java 的 `char` 类型最接近的是 C 语言的 `unichar`，但请小心——`char` 是有符号的，而 `unichar` 是无符号的。无符号整数是滋生细微编程错误的温床，这大概就是\
    \ Java 将其移除的原因。以下是最常见的几种情况。\n\n避免编写无意义的不等式语句，例如清单 2-1 中所示。\n\n**清单 2-1.** 无意义的比较语句\n\
    \n```\nunsigned int i = 99;\nwhile (i>=0) { … } // 无意义/始终为真；i 不可能小于 0\n```\n\n\
    请注意，符号位可能会通过赋值被重新解释，如清单 2-2 所示。\n\n**清单 2-2.** 符号位重新解释\n\n```\nint i = -3;\nunsigned\
    \ int j = i; // j = 4294967293\n```\n\n清单 2-3 演示了在比较运算中混用有符号和无符号类型的情况。请避免这种做法，或者对其中一个值进行强制类型转换，使类型兼容。\n\
    \n**清单 2-3.** 混合类型比较\n\n```\nint i = -3;\nunsigned int j = 3;\nif (i<j) { … }\
    \ // 不可预测的条件\n```\n\n大多数大小、索引和数组计数都是无符号的。在声明将用作集合索引的变量时，请声明为无符号整数。在其他几乎所有场合，都可以使用有符号整数。\n\
    \n## 常量\n\n常量是赋予给不变、已知值的名称。比起使用原始数字值（即使该值显而易见），采用符号化编程更为简单且信息量更大。\n\n现代的代码库和框架定义了数千个常量，但表\
    \ 2-2 列出的是你经常使用的一些常量。\n\n**表 2-2.** 常见常量\n\n| Java | Objective-C | 用途 |\n|------|-------------|------|\n\
    | `true` | `YES` | 逻辑真 |\n| `false` | `NO` | 逻辑假 |\n| `null` | `nil` | 空或无效的对象引用\
    \ |\n| | `NULL` | 空或无效的指针 |\n\n从技术上讲，`nil` 和 `NULL` 是可以互换的。为了提高可读性，在设置和测试 Objective-C\
    \ 对象引用时应使用 `nil`，就像你在 Java 中使用 `null` 一样。`NULL` 是 C 语言的空指针常量，用于设置和测试指针。采用这种约定可以强调代码中内存指针与对象引用之间的区别。\n\
    \n整数类型前的 `const` 关键字含义与 Java 中的 `final` 大致相同，但它很少用于定义简单的整数常量。C 语言中的大多数常量都是通过预处理器（本章后续部分也会介绍）或枚举语句来定义的。\n\
    \n清单 2-4 中的枚举（`enum`）定义了一个数值变量 `v`，它可以保存整数常量 `Zero`、`One` 或 `Two` 中的一个。与 Java\
    \ 不同，`v` 不是一个对象，它只是一个整数。这三个常量（`Zero`、`One` 和 `Two`）是公共符号，其值分别为 0、1 和 2。它们可以在任何能接受整数常量的上下文中使用。变量\
    \ `v` 通常会被省略，`enum` 语句仅用于定义这些常量。\n\n**清单 2-4.** 枚举\n\n```\nenum {\n    Zero =\
    \ 0, // = 0 是可选的，如果省略，枚举从 0 开始\n    One,\n    Two\n} v;\n```\n\n## Typedefs\n\n\
    `typedef` 是 Java 中所没有的概念，但在 C 语言中却被广泛使用。在 Java 中，新的数据结构和功能是通过创建新类来实现的。而在 C 语言中，你可以定义自己的原始数据类型。清单\
    \ 2-5 中的程序使用一个整数值来标识库存中的零件。\n"
- fmt: "### Typedefs\n\n`typedef`关键字放在变量声明前会将其转换为类型定义。与定义一个整型变量`PartCode`不同，`Listing\
    \ 2-5`中的`typedef`语句创建了一个与`int`同义的新变量类型（`PartCode`）。一旦定义完成，新的`PartCode`类型就可以替代`int`类型使用。`aCode`和`bCode`的声明是相同的。\n\
    \n```\ntypedef int PartCode;\nPartCode aCode;\nint bCode;\n```\n\n`typedef`有助于使代码更具可读性。函数原型`add(\
    \ PartCode c )`比`add( int c )`的描述性更强。`typedef`也提升了可维护性。`PartCode`可以在后续重新定义为`unsigned\
    \ int`或`long long int`，而无需修改每个部件代码变量的声明。\n\n`typedef`通常用于复杂声明，例如结构体和枚举。`Listing\
    \ 2-6`中的`typedef`语句同时创建了一个新的枚举类型（`Flavor`）和三个整型常量（`Strawberry`、`Rhubarb`和`Apricot`）。现在你可以编写`Flavor\
    \ favorite = Apricot;`，这会将值`2`赋给变量`favorite`。\n\n```\ntypedef enum {\n    Strawberry,\n\
    \    Rhubarb,\n    Apricot\n} Flavor;\n```\n\n### 指针\n\nJava 通过特意省略任何允许程序员直接访问任意内存位置的编程结构，来“保护”你免受物理内存的影响。在\
    \ Java 中，你只能访问命名的基本类型和对象的引用。\n\nC 语言没有在代码和物理内存之间提供这种隔离。这给了你极大的自由来访问和操作数据。同时，它也将不越界（访问内存）的责任落在了你——程序员——身上。\n\
    \n可以将 C 指针想象成 Java 对象引用，但有两个主要区别。C 指针可以指向任何类型的值或结构——而不仅仅是对象。你可以声明一个指向整数、浮点数、复杂结构、函数、甚至另一个指针的指针。其次，C\
    \ 指针始终是进程地址空间中的一个真实内存地址，而 Java 的对象引用是一个抽象且不透明的值。\n\n除此之外，大多数关于 Java 引用的编程规则也适用于指针。例如，将指针作为参数传递会复制值的引用，而不是值本身。\n\
    \n由于 C 语言同时提供值和指向值的指针，因此必须使用编程语法来区分两者。一元指针运算符（`*`）可以出现在类型定义和表达式中。在声明中，指针运算符将变量类型从简单变量更改为指向该类型变量的指针，如`Listing\
    \ 2-7`所示。\n\n```\nint i = 1;\nint *iptr;\niptr = &i;\n*iptr = 2;\n```\n\n在`Listing\
    \ 2-7`中，变量`iptr`是一个指向整型变量的指针。`iptr`的值是一个存储了整数值的内存地址，而不是存储在那里的整数值本身。换句话说，它是对进程地址空间中其他位置的一个基本整数值的引用。\n\
    \n`&`符号是一元“取地址”运算符。它返回变量的地址，而不是变量的值。`iptr = &i`语句将`iptr`的值设置为变量`i`的内存地址，而不是其值。\n\
    \n表达式中的一元指针运算符（`*`）将引用重定向到指针变量所指向的值。在某种意义上，它是一元取地址运算符的补充。最后一条语句使用指针运算符将赋值重定向到`iptr`所指向的值，而不是`iptr`本身的值。用英语来说，该语句的意思是“将值`2`存储在地址包含在`iptr`中的整型变量里”。最后一条语句不会改变`iptr`的值；它改变了`iptr`所指向的整型变量的值。在这四条语句执行完毕后，变量`i`的值将是`2`。\n\
    \n### 结构体\n\nC 结构体定义了内存块的布局。结构体（`struct`）由其他变量类型构建而成。一旦定义，这些变量集合就可以作为一个单一单元对待。`struct`语句非常类似于\
    \ Java 的类定义，但不包含方法。简单的结构体声明（如枚举）定义了一个具有给定结构的单一变量。更典型的是，结构体会出现在`typedef`语句中，以便可以通过名称重用该结构定义（参见`Listing\
    \ 2-8`）。\n\n```\ntypedef struct {\n    int key;\n    int count;\n} KeyCount;\n\
    \n...\n\nKeyCount counter;\ncounter.key = 1;\ncounter.count = 0;\n```\n\n`Listing\
    \ 2-8`中展示的`KeyCount`结构体定义了一个包含两个成员变量的内存单元，这两个成员变量位于连续的地址中，分别名为`key`和`count`。与\
    \ Java 类似，C 语言使用成员运算符（`.`）来访问结构体中的成员变量。更常见的是，通过指向结构体的指针来间接引用结构体，如`Listing 2-9`所示。\n\
    \n```\nKeyCount *nextCounter = &counter;\nnextCounter->count += 1;\n```\n\n变量`nextCounter`是一个指向`KeyCount`结构体的指针。当变量是指向结构体的指针时，使用间接成员运算符（`->`）来指定成员变量。这在技术上是`(*nextCounter).count`的简写，但更易于读写。\n\
    \n将一个结构体赋值给另一个结构体会复制整个结构体。语句`KeyCount save = counter`会将`counter`结构体中的两个整数复制到`save`结构体中对应的整数。方法参数是按值传递的，因此在参数中传递结构体会复制整个结构体。这与\
    \ Java 不同，后者不允许按值复制对象。\n\n因此，大多数方法声明的参数是指向结构体的指针（引用），而不是结构体本身。但如果你需要按值传递结构体，你也有这种选择。\n\
    \n### 对象引用\n\n如果你认为 C 结构体看起来很像类，而指向结构体的指针作用很像对象引用，那么你非常敏锐。Objective-C 使用 C 结构体来定义对象，并使用结构体指针作为对象引用。\n\
    \n一个 Objective-C 的类定义本质上定义了一个 C 结构体。你首先使用 Objective-C 语法来定义类。一旦定义完成，你就可以使用 C 语言中关于结构体和指针的语法来与对象交互。两者都在`Listing\
    \ 2-10`中展示。\n\n```\n@interface KeyCounter {\n@public\n    int key;\n    int count;\n\
    }\n@end\n\nKeyCounter *countObject = ...;\ncountObject->count += 1;\n```\n\n在幕后，为类创建的结构体包含了额外的成员变量，这些变量用于定义对象的类、提供对其方法的访问、管理内存等等。\n\
    \nObjective-C 甚至提供了一个运算符，可以将类类型转换为 C 结构体类型，允许你无限制地访问对象的内部结构，或者将对象视为一个简单的 C 结构体。这很少使用，但它凸显了\
    \ Objective-C 的透明性。\n\n如果所有这些让你感到不知所措，别担心。你可以在很大程度上忽略`typedef`、结构体和指针的细节。要使用 Objective-C\
    \ 编程，你需要知道类是结构体，指针运算符（`*`）用于声明指向对象的指针（引用），以及间接成员运算符（`->`）用于通过对象指针（引用）直接访问成员变量。"
  raw: 'Listin g 2-5\. Typedef


    typedef int PartCode;


    PartCode aCode;


    int bCode;


    Placing the typedef keyword before a variable declaration turns it into a type
    definition. Instead of defining an integer variable PartCode, the typedef statement
    in Listing 2-5 creates a new variable type (PartCode) synonymous with int. Once
    defined, the new PartCode type can be used instead of the int type. The declarations
    for aCode and bCode are identical.


    Typedefs help to make your code more readable. The function prototype add( PartCode
    c ) is much more descriptive than add( int c ). Typedefs also improve maintenance.
    PartCode can later be redefined as unsigned int or long long int without needing
    to revise every declaration of a part code variable.


    Typedefs are often used with complex declarations such as structs and enums. The
    typedef statement in Listing 2-6 simultaneously creates a new enum type (Flavor)
    and three integer constants (Strawberry, Rhubarb, and Apricot). You can now write
    Flavor favorite = Apricot;, which will assign the value 2 to the variable favorite.


    Listin g 2-6\. enum typedef


    typedef enum {


    Strawberry,


    Rhubarb,


    Apricot } Flavor;


    Pointers


    Java “protects” you from physical memory by purposefully omitting any programming
    construct that gives the programmer direct access to arbitrary memory locations.
    In Java, you only have access to named primitives and references to objects.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ JAVA AND C: KEY DIFFERENCES


    C provides no such insulation between your code and physical memory. This gives
    you a great amount of freedom to access and manipulate data. It also places the
    responsibility of not overstepping boundaries on you, the programmer.


    Think of C pointers as Java object references with two principal differences.
    A C pointer can point to any kind of value or structure—not just objects. You
    can declare a pointer to an integer, a float, a complex structure, a function,
    or even another pointer. Second, a C pointer is always a real memory location
    in the process’s address space, whereas Java’s object reference is an abstract
    and opaque value.


    Beyond that, most of the programming rules for Java references apply to pointers.
    For example, passing a pointer as a parameter copies the reference to the value,
    not the value itself.


    Since C provides both values and pointers to values, programming syntax must be
    used to distinguish between the two. The unary pointer operator (*) can appear
    in both type definitions and expressions. In a declaration, a pointer operator
    changes the variable type from a simple variable to a pointer to that type of
    variable, as shown in Listing 2-7.


    Listin g 2-7\. Using Pointers


    int i = 1;


    int *iptr;


    iptr = &i;


    *iptr = 2;


    In Listing 2-7, the variable iptr is a pointer to an integer variable. The value
    of iptr is a memory address where an integer value is stored, not the value of
    the integer stored there. In other words, it’s a reference to a primitive integer
    value somewhere else in the process’s address space.


    The ampersand character (&) is the unary “address of” operator. It returns the
    address of a variable instead of the value of the variable. The iptr = &i statement
    sets the value of iptr to the memory address, not the value, of variable i.


    The unary pointer operator (*) in an expression redirects the reference to the
    value that the pointer variable points to. In a sense, it’s the complement of
    the unary address of operator. The last statement uses the pointer operator to
    redirect the assignment to the value pointed to by iptr, rather than the value
    of iptr itself. In English the statement says, “store the value 2 in the integer
    variable whose address is contained in iptr.” The last statement does not change
    the value of iptr; it changes the value of the integer variable that iptr points
    to. After these four statements have executed, the value of variable i will be
    2.


    Structures


    C structures define the organization of a block of memory. Structures, or structs,
    are constructed from other variable types. Once defined, the collection of variables
    can be treated as a single unit. A struct statement is very similar to a Java
    class definition, sans methods. Simple struct declarations, like enums, define
    a single variable with a given structure. It is far more typical to find a struct
    in a typedef statement so that the structure definition can be reused by name
    (see Listing 2-8).


    Listin g 2-8\. Structure


    typedef struct {


    int key;


    int count;


    } KeyCount;


    …


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ JAVA AND C: KEY DIFFERENCES


    KeyCount counter;


    counter.key = 1;


    counter.count = 0;


    The KeyCount structure shown in Listing 2-8 defines a unit of memory containing
    two member variables at successive addresses, named key and count. Like Java,
    C uses the member operator (.) to address a member variable within a structure.
    More often, a structure is referred to indirectly using a pointer to the structure,
    like the one in Listing 2-9.


    Listin g 2-9\. Structure Pointer


    KeyCount *nextCounter = &counter;


    nextCounter->count += 1;


    The variable nextCounter is a pointer to a KeyCount structure. When a variable
    is a pointer to a structure, the indirect member operator (->) is used to specify
    a member variable. This is technically shorthand for (*nextCounter).count, but
    is easier to read and write.


    Assigning one structure to another makes a copy of the entire structure. The statement
    KeyCount save = counter copies both integers in the counter structure to the corresponding
    integers in the save structure. Method arguments are passed by value, so passing
    a structure in an argument will make a copy of the entire structure. This differs
    from Java, which doesn’t allow you to copy objects by value.


    Consequently, most methods declare arguments that are pointers (references) to
    structures rather than the structure itself. But should you need to pass a structure
    by value, you have that option.


    Object References


    If you think a C structure looks a lot like a class and a pointer to a structure
    acts a lot like an object reference, you are very astute. Objective-C uses C structures
    to define objects and it uses structure pointers as object references.


    An Objective-C class definition essentially defines a C structure. You start by
    using Objective-C


    syntax to define the class. Once defined, you can interact with the object using
    the C syntax for structures and pointers. Both are shown in Listing 2-10.


    Listin g 2-10\. Objective-C Class as C Structure


    @interface KeyCounter {


    @public


    int key;


    int count;


    }


    @end


    KeyCounter *countObject = …;


    countObject->count += 1;


    Behind the scenes, the structure created for the class includes additional member
    variables which are used to define the object’s class, provide access to its methods,
    manage memory, and so on.


    Objective-C even provides an operator that converts a class type into a C struct
    type, allowing you unfettered access to the internals of an object or to treat
    the object as a simple C structure. This is rarely used, but underscores the transparency
    of Objective-C.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ JAVA AND C: KEY DIFFERENCES


    If all of this is becoming overwhelming, don’t fret. You can largely ignore the
    details of typedefs, structs, and pointers. To program in Objective-C you need
    to know that classes are structures, the pointer (*) operator is used to declare
    a pointer (reference) to an object, and the indirect member operator (->) is used
    to directly access member variables via an object pointer (reference).'
  trans: "\n### Typedefs\n\n`typedef`关键字放在变量声明前会将其转换为类型定义。与定义一个整型变量`PartCode`不同，`Listing\
    \ 2-5`中的`typedef`语句创建了一个与`int`同义的新变量类型（`PartCode`）。一旦定义完成，新的`PartCode`类型就可以替代`int`类型使用。`aCode`和`bCode`的声明是相同的。\n\
    \n```\ntypedef int PartCode;\nPartCode aCode;\nint bCode;\n```\n\n`typedef`有助于使代码更具可读性。函数原型`add(\
    \ PartCode c )`比`add( int c )`的描述性更强。`typedef`也提升了可维护性。`PartCode`可以在后续重新定义为`unsigned\
    \ int`或`long long int`，而无需修改每个部件代码变量的声明。\n\n`typedef`通常用于复杂声明，例如结构体和枚举。`Listing\
    \ 2-6`中的`typedef`语句同时创建了一个新的枚举类型（`Flavor`）和三个整型常量（`Strawberry`、`Rhubarb`和`Apricot`）。现在你可以编写`Flavor\
    \ favorite = Apricot;`，这会将值`2`赋给变量`favorite`。\n\n```\ntypedef enum {\n    Strawberry,\n\
    \    Rhubarb,\n    Apricot\n} Flavor;\n```\n\n### 指针\n\nJava 通过特意省略任何允许程序员直接访问任意内存位置的编程结构，来“保护”你免受物理内存的影响。在\
    \ Java 中，你只能访问命名的基本类型和对象的引用。\n\nC 语言没有在代码和物理内存之间提供这种隔离。这给了你极大的自由来访问和操作数据。同时，它也将不越界（访问内存）的责任落在了你——程序员——身上。\n\
    \n可以将 C 指针想象成 Java 对象引用，但有两个主要区别。C 指针可以指向任何类型的值或结构——而不仅仅是对象。你可以声明一个指向整数、浮点数、复杂结构、函数、甚至另一个指针的指针。其次，C\
    \ 指针始终是进程地址空间中的一个真实内存地址，而 Java 的对象引用是一个抽象且不透明的值。\n\n除此之外，大多数关于 Java 引用的编程规则也适用于指针。例如，将指针作为参数传递会复制值的引用，而不是值本身。\n\
    \n由于 C 语言同时提供值和指向值的指针，因此必须使用编程语法来区分两者。一元指针运算符（`*`）可以出现在类型定义和表达式中。在声明中，指针运算符将变量类型从简单变量更改为指向该类型变量的指针，如`Listing\
    \ 2-7`所示。\n\n```\nint i = 1;\nint *iptr;\niptr = &i;\n*iptr = 2;\n```\n\n在`Listing\
    \ 2-7`中，变量`iptr`是一个指向整型变量的指针。`iptr`的值是一个存储了整数值的内存地址，而不是存储在那里的整数值本身。换句话说，它是对进程地址空间中其他位置的一个基本整数值的引用。\n\
    \n`&`符号是一元“取地址”运算符。它返回变量的地址，而不是变量的值。`iptr = &i`语句将`iptr`的值设置为变量`i`的内存地址，而不是其值。\n\
    \n表达式中的一元指针运算符（`*`）将引用重定向到指针变量所指向的值。在某种意义上，它是一元取地址运算符的补充。最后一条语句使用指针运算符将赋值重定向到`iptr`所指向的值，而不是`iptr`本身的值。用英语来说，该语句的意思是“将值`2`存储在地址包含在`iptr`中的整型变量里”。最后一条语句不会改变`iptr`的值；它改变了`iptr`所指向的整型变量的值。在这四条语句执行完毕后，变量`i`的值将是`2`。\n\
    \n### 结构体\n\nC 结构体定义了内存块的布局。结构体（`struct`）由其他变量类型构建而成。一旦定义，这些变量集合就可以作为一个单一单元对待。`struct`语句非常类似于\
    \ Java 的类定义，但不包含方法。简单的结构体声明（如枚举）定义了一个具有给定结构的单一变量。更典型的是，结构体会出现在`typedef`语句中，以便可以通过名称重用该结构定义（参见`Listing\
    \ 2-8`）。\n\n```\ntypedef struct {\n    int key;\n    int count;\n} KeyCount;\n\
    \n...\n\nKeyCount counter;\ncounter.key = 1;\ncounter.count = 0;\n```\n\n`Listing\
    \ 2-8`中展示的`KeyCount`结构体定义了一个包含两个成员变量的内存单元，这两个成员变量位于连续的地址中，分别名为`key`和`count`。与\
    \ Java 类似，C 语言使用成员运算符（`.`）来访问结构体中的成员变量。更常见的是，通过指向结构体的指针来间接引用结构体，如`Listing 2-9`所示。\n\
    \n```\nKeyCount *nextCounter = &counter;\nnextCounter->count += 1;\n```\n\n变量`nextCounter`是一个指向`KeyCount`结构体的指针。当变量是指向结构体的指针时，使用间接成员运算符（`->`）来指定成员变量。这在技术上是`(*nextCounter).count`的简写，但更易于读写。\n\
    \n将一个结构体赋值给另一个结构体会复制整个结构体。语句`KeyCount save = counter`会将`counter`结构体中的两个整数复制到`save`结构体中对应的整数。方法参数是按值传递的，因此在参数中传递结构体会复制整个结构体。这与\
    \ Java 不同，后者不允许按值复制对象。\n\n因此，大多数方法声明的参数是指向结构体的指针（引用），而不是结构体本身。但如果你需要按值传递结构体，你也有这种选择。\n\
    \n### 对象引用\n\n如果你认为 C 结构体看起来很像类，而指向结构体的指针作用很像对象引用，那么你非常敏锐。Objective-C 使用 C 结构体来定义对象，并使用结构体指针作为对象引用。\n\
    \n一个 Objective-C 的类定义本质上定义了一个 C 结构体。你首先使用 Objective-C 语法来定义类。一旦定义完成，你就可以使用 C 语言中关于结构体和指针的语法来与对象交互。两者都在`Listing\
    \ 2-10`中展示。\n\n```\n@interface KeyCounter {\n@public\n    int key;\n    int count;\n\
    }\n@end\n\nKeyCounter *countObject = ...;\ncountObject->count += 1;\n```\n\n在幕后，为类创建的结构体包含了额外的成员变量，这些变量用于定义对象的类、提供对其方法的访问、管理内存等等。\n\
    \nObjective-C 甚至提供了一个运算符，可以将类类型转换为 C 结构体类型，允许你无限制地访问对象的内部结构，或者将对象视为一个简单的 C 结构体。这很少使用，但它凸显了\
    \ Objective-C 的透明性。\n\n如果所有这些让你感到不知所措，别担心。你可以在很大程度上忽略`typedef`、结构体和指针的细节。要使用 Objective-C\
    \ 编程，你需要知道类是结构体，指针运算符（`*`）用于声明指向对象的指针（引用），以及间接成员运算符（`->`）用于通过对象指针（引用）直接访问成员变量。\n"
- fmt: "# Objective-C and C Concepts\n\nYou can successfully program in Objective-C\
    \ without ever creating your own structures, defining `typedefs`, or using pointers\
    \ to variables other than objects. You do, however, need a passing familiarity\
    \ with these concepts because you will encounter them in other Objective-C programs.\
    \ I anticipate that you will eventually want to explore C types in more detail,\
    \ if only to utilize libraries with C interfaces.\n\n## Arrays\n\nC arrays continue\
    \ in the vein of things you need to be aware of but probably don’t need to use\
    \ yet. C arrays are not like Java arrays. A C array defines a set of values that\
    \ occupy successive memory addresses. A C array is not an object, provides no\
    \ bounds checking, and is often manipulated using pointers.\n\nThe statement in\
    \ Listing 2-11 declares an array of 10 integer variables, then obtains the value\
    \ of the fourth integer in the array. Like a Java array, an individual element\
    \ can be addressed using array subscript syntax (array access expression).\n\n\
    **Listing 2-11.** C Array of Integers\n\n```\nint numbers[10];\nint j = numbers[3];\n\
    ```\n\nC arrays and pointers are deeply intertwined. In Listing 2-12, the symbol\
    \ `numbers` (by itself) evaluates to the address of the first element of the array,\
    \ equivalent to the expression `&numbers[0]`.\n\n**Listing 2-12.** Array and Pointer\
    \ Interchangeability\n\n```\nint *iptr = numbers;\niptr += 3;\nif (*iptr==j) …\n\
    ```\n\nThe pointer `iptr` in Listing 2-12 is first assigned to the address of\
    \ the first element in the array. The second statement adjusts the pointer using\
    \ pointer math. Pointer math (adding or subtracting an integer value from a pointer\
    \ value) adjusts a pointer so that it points to the nth value after the current\
    \ address by adding `n*sizeof(type)` to the pointer’s address value. In this example,\
    \ assuming the size of an integer is 4 bytes, adding 3 to an integer pointer adjusts\
    \ its memory address by 12 bytes. Afterward, the `iptr` variable points to the\
    \ fourth element of the array, and the expressions `numbers[3]` and `*iptr` are\
    \ equivalent.\n\n> **Note:** The `sizeof()` operator is a compile-time function\
    \ that evaluates to the size of the enclosed type in bytes. The argument can be\
    \ either a type or a variable. Using Listing 2-11 as an example, the expressions\
    \ `sizeof(int)`, `sizeof(j)`, and `sizeof(numbers[3])` are all equivalent and\
    \ evaluate to the integer constant 4—the size in bytes of a single 32-bit integer.\
    \ The expression `sizeof(numbers)` evaluates to 40, or `10*sizeof(int)`, since\
    \ `numbers` is an array of 10 integers. You will often see expressions such as\
    \ `(sizeof(numbers)/sizeof(int))` to determine the number of elements in an array.\n\
    \nC pointers and array variables are essentially interchangeable. Arrays are commonly\
    \ assigned and passed as if they were pointers (the value passed will be the address\
    \ of the first element of the array). It is also permissible to use the array\
    \ subscript syntax on a pointer, as in `iptr[3] = 0`. This is equivalent to `*(iptr+3)\
    \ = 0`.\n\nObjective-C provides an object array class and object wrappers for\
    \ most primitive types. These act very much like the Java arrays and collections\
    \ you are familiar with. While you need to be aware of how C arrays are defined\
    \ and accessed, you can avoid them in favor of object-oriented array classes until\
    \ you become comfortable with C arrays, memory management, and pointer arithmetic.\n\
    \n## `static`\n\nThe `static` keyword in C has some additional meanings and is\
    \ not used the way it is in Java. Java uses `static` to declare a single persistent\
    \ class variable within a class declaration. Objective-C does not allow you to\
    \ declare variables in a class definition. Instead, `static` variables are declared\
    \ as global C variables or `static` variables inside a code block. Listing 2-13\
    \ declares two `static` variables.\n\n**Listing 2-13.** Global Static Variables\n\
    \n```\nint scramingZombieHitCount = 1;          // accessible from all modules\n\
    static int screamingZombieBounceCount;  // accessible only from this module\n\
    ```\n\nA variable declaration outside of any method, structure, or class definition\
    \ creates a global variable, approximately equivalent to a Java `static` variable.\
    \ Global variables are pre-initialized to zeros at startup unless explicitly initialized\
    \ to some other value. In this context, the `static` keyword only determines the\
    \ scope of the symbol (all global variables are “static” in the Java sense). Omitting\
    \ the `static` keyword makes the symbol globally accessible. Any module in the\
    \ program can access it by name using an `extern` statement. Including the `static`\
    \ keyword limits the scope of the variable to the file containing the declaration.\
    \ Thus, `screamingZombieHitCount` can be used directly by any module in the program,\
    \ while `screamingZombieBounceCount` will only be accessible to the code in this\
    \ file.\n\nInside a code block, a variable declared to be `static` creates a persistent\
    \ static variable. The scope of the variable is limited to the code block it is\
    \ declared in. Listing 2-14 shows a `static` integer that is incremented each\
    \ time the code block is executed.\n\n**Listing 2-14.** Static Variable in a Code\
    \ Block\n\n```\n{\n    static int hitCount = 0; // global hit count initialized\
    \ at startup to 0\n    hitCount++;              // increment global hit count\
    \ variable\n    return (hitCount);       // return updated hit count\n}\n```\n\
    \n## Functions\n\nC is a procedural language with no concept of objects. In C,\
    \ callable blocks of code are called functions. A C function is equivalent to\
    \ a `static` class method in Java; it has no object context. C function names\
    \ are not scoped within a class or package, they are not inherited, nor can they\
    \ be overridden. Listing 2-15 shows a C function that compares two Objective-C\
    \ date objects and returns the earlier of the two.\n\n**Listing 2-15.** C Function\n\
    \n```\nNSDate* earlierDate( NSDate* a, NSDate* b )\n{\n    if (a==nil)\n     \
    \   return (b); // returns nil if both a & b are nil\n    if (b==nil || [a compare:b]==NSOrderedAscending)\n\
    \        return (a);\n    return (b);\n}\n```\n\nFunction calling syntax is identical\
    \ to Java: `NSDate *first = earlierDate(sometime, whenever)`. The `earlierDate()`\
    \ function is globally accessible to all modules. A `static` keyword preceding\
    \ the function definition would limit its scope to the module being compiled,\
    \ just as it does for `static` variables.\n\n## `extern`\n\nA module uses an `extern`\
    \ statement to access a global variable or C function defined in another module.\
    \ An `extern` statement is typically put in the header file of the module that\
    \ defines it (see Listing 2-16). This is only necessary for global variables and\
    \ functions defined in other modules. You do not use `extern` statements to declare\
    \ or reference Objective-C classes.\n\n**Listing 2-16.** External Variable Declaration\n\
    \n```\nextern int screamingZombieHitCount;\nextern void killAZombie( Zombie *victim\
    \ );\n```\n\nThe statement in Listing 2-16 declares that some other module has\
    \ defined a global integer variable named `screamingZombieHitCount` (from Listing\
    \ 2-13) and a C function named `killAZombie`. The module is compiled with the\
    \ assumption that this variable and function exist in some other module, or 20\
    \ modules. The linker is responsible for connecting this module’s references to\
    \ the actual variable location and function address when the application is built.\n\
    \n## Preprocessor\n\nThe C Preprocessor is a text macro language that is (conceptually)\
    \ applied to the text of a source file before it is input to the Objective-C compiler.\
    \ When a source file is compiled, the preprocessor first scans the text of the\
    \ file, executing all preprocessor directives and performing any text substitutions.\
    \ Java does not have any comparable functionality.\n\nThe important preprocessor\
    \ statements you should know are `#include`, `#import`, `#define`, and `#if`."
