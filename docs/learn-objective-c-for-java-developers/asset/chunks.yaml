    data stream created by a different version. Objective-C addresses this problem
    by using class versions. A newer version of a class can recognize and assimilate
    archive data created by an older version. While providing backward compatibility,
    it does not provide forward compatibility and the solutions tend to be awkward.
    For these reasons, sequential archiving is not recommended for document data or
    other persistent objects. However, that’s not to say that sequential archiving
    isn’t used.


    Distributed objects uses sequential archiving—with a few extra wrinkles—to quickly
    and efficiently exchange objects with other processes. It might be another thread
    in the same process, another process on the same system, or a remote system half
    way around the world. The encoding and decoding technique remains the same, only
