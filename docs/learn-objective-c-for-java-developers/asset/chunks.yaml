- fmt: 'This allows you to pass virtually any object to a remote method. The object
    doesn’t have to be archivable, you just need to be aware that the receiver will
    get a proxy to the original object, spontaneously created by `NSDistantObject`.
    If you need objects to be passed by copy, you can do that by making them conform
    to `NSCoding` and implement sequential archiving, as described in Chapter 12.


    Your object will also have to implement code to decide under what circumstances
    it should be passed by copy or by reference. All of that is explained in the “Passing
    Objects by Copy” section.


    ## Making a Connection


    Using distributed objects is kind of like dating; you first have to find a suitable
    partner before you can begin a conversation. You can use a third-party matchmaking
    service, or you can do it yourself if you have firsthand knowledge about the other’s
    existence.


    Java’s `java.rmi.Naming` class performs the role of matchmaker, allowing the server
    process to publish its existence. For the client, it locates the desired server
    process and returns a proxy object.


    Through the proxy object, the client is connected to the server.


    In Objective-C, `NSConnection` is the central actor that connects two processes
    via distributed objects. `NSConnection` does not, by itself, provide any registration
    services—although it does provide convenience constructers to commonly used ones.
    To establish a connection between a server and a client, you must create an `NSConnection`
    object that uses two unidirectional `NSPort` objects, or one bidirectional `NSPort`
    object. The `NSConnection` uses the `NSPort` objects to communicate data and invocation
    information to the remote process. The general arrangement is shown in Figure
    13-1. The solid arrows are object references within the process. The hollow arrows
    show the direction of data exchanged through some port or socket.


    **Figure 13-1.** Objects in an `NSConnection`


    How you create your `NSConnection` object depends on the type of connection you
    want to create. You can create `NSPort` objects directly, or obtain connected
    `NSPort` objects from a registration service, and then use those to create an
    `NSConnection`. There are also some facilities that will create a preconfigured
    `NSConnection` object for you. Four common `NSConnection` configurations are listed
    in Table 13-2.


    **Table 13-2.** Common `NSConnection` Configurations


    | Connection Type | How to Create It |

    | --- | --- |

    | Two objects in the same process | Create two `NSPort` objects, then use those
    to create an `NSConnection`. |

    | Connection via Mach ports | Let `+[NSConnection connectionWithRegisteredName:host:]`
    create a preconfigured `NSConnection` for you. |

    | Connection via IP socket | Obtain an `NSPort` from `NSSocketPortNameServer`
    and use it to create an `NSConnection`. |


    The role of matchmaker is usually performed by one of the `NSPortNameServer` subclasses.
    Each name server provides a registration and discovery service for a particular
    class of ports.


    `NSMachBootstrapServer` registers Mach message ports. The scope of Mach ports
    is limited to the bootstrap namespace of the current process. `NSSocketPortNameServer`
    registers TCP ports on a local area network. Services registered with `NSSocketPortNameServer`
    are accessible by any computer on the local network.


    Once the `NSConnection` object is created, the server object is vended. This makes
    the object available to any clients that connect to the server’s `NSConnection`.
    This is done using `-[NSConnection setRootObject:]`. Once set, the client sends
    its `NSConnection` a `-rootProxy` message to obtain the `NSDistantObject` of the
    server’s root object. Any other object the client and server need to exchange
    is accomplished by sending messages to the server’s root object. The server can
    change its `rootObject` at any time, but that doesn’t affect any proxy objects
    clients have previously obtained.'
  raw: 'This allows you to pass virtually any object to a remote method. The object
    doesn’t have to be archivable, you just need to be aware that the receiver will
    get a proxy to the original object, spontaneously created by NSDistantObject.
    If you need objects to be passed by copy, you can do that by making them conform
    to NSCoding and implement sequential archiving, as described in Chapter 12.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-245_1.jpg)


    ![](index-245_2.jpg)


    CHAPTER 13 ■ COMMUNICATING NEAR AND FAR


    Your object will also have to implement code to decide under what circumstances
    it should be passed by copy or by reference. All of that is explained in the “Passing
    Objects by Copy” section.


    Making a Connection


    Using distributed objects is kind of like dating; you first have to find a suitable
    partner before you can begin a conversation. You can use a third-party matchmaking
    service, or you can do it yourself if you have firsthand knowledge about the other’s
    existence.


    Java’s java.rmi.Naming class performs the role of matchmaker, allowing the server
    process to publish its existence. For the client, it locates the desired server
    process and returns a proxy object.


    Through the proxy object, the client is connected to the server.


    In Objective-C, NSConnection is the central actor that connects two processes
    via distributed objects. NSConnection does not, by itself, provide any registration
    services—although it does provide convenience constructers to commonly used ones.
    To establish a connection between a server and a client, you must create an NSConnection
    object that uses two unidirectional NSPort objects, or one bidirectional NSPort
    object. The NSConnection uses the NSPort objects to communicate data and invocation
    information to the remote process. The general arrangement is shown in Figure
    13-1\. The solid arrows are object references within the process. The hollow arrows
    show the direction of data exchanged through some port or socket.


    ***Figure 13-1.** Objects in an NSConnection*


    How you create your NSConnection object depends on the type of connection you
    want to create. You can create NSPort objects directly, or obtain connected NSPort
    objects from a registration service, and then use those to create an NSConnection.
    There are also some facilities that will create a preconfigured NSConnection object
    for you. Four common NSConnection configurations are listed in Table 13-2.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 13 ■ COMMUNICATING NEAR AND FAR


    ***Table 13-2.** Common NSConnection Configurations*


    Con ne ctio n T ype


    How to Cr eat e It


    Two objects in the same process


    Create two NSPort objects, then use those to create an


    NSConnection.


    Connection via Mach ports


    Let +[NSConnection connectionWithRegisteredName:host:]


    create a preconfigured NSConnection for you.


    Connection via IP socket


    Obtain an NSPort from NSSocketPortNameServer and use it to create an NSConnection.


    The role of matchmaker is usually performed by one of the NSPortNameServer subclasses.
    Each name server provides a registration and discovery service for a particular
    class of ports.


    NSMachBootstrapServer registers Mach message ports. The scope of Mach ports is
    limited to the bootstrap namespace of the current process. NSSocketPortNameServer
    registers TCP ports on a local area network. Services registered with NSSocketPortNameServer
    are accessible by any computer on the local network.


    Once the NSConnection object is created, the server object is vended. This makes
    the object available to any clients that connect to the server’s NSConnection.
    This is done using -[NSConnection setRootObject:]. Once set, the client sends
    its NSConnection a -rootProxy message to obtain the NSDistantObject of the server’s
    root object. Any other object the client and server need to exchange is accomplished
    by sending messages to the server’s root object. The server can change its rootObject
    at any time, but that doesn’t affect any proxy objects clients have previously
    obtained.'
  trans: '

    这使得你几乎可以将任何对象传递给远程方法。该对象无需是可归档的，你只需注意接收方会获得一个原始对象的代理，该代理由`NSDistantObject`自动创建。如果需要按拷贝传递对象，你可以让对象遵循`NSCoding`协议并实现序列化归档，如第
    12 章所述。


    你的对象还必须实现代码，以决定在何种情况下应通过拷贝或引用传递。所有这些内容都在“通过拷贝传递对象”部分中解释。


    ## 建立连接


    使用分布式对象有点像约会；你必须先找到合适的伴侣才能开始对话。你可以使用第三方媒人服务，或者如果你对对方的存在有第一手了解，也可以自己操作。


    Java 的 `java.rmi.Naming` 类扮演了媒人的角色，允许服务器进程发布其存在。对于客户端而言，它定位所需的服务器进程并返回一个代理对象。


    通过该代理对象，客户端与服务器建立连接。


    在 Objective-C 中，`NSConnection` 是核心角色，通过分布式对象连接两个进程。`NSConnection` 本身并不提供注册服务——尽管它为常用服务提供了便捷构造器。要建立服务器与客户端之间的连接，你必须创建一个使用两个单向
    `NSPort` 对象或一个双向 `NSPort` 对象的 `NSConnection` 对象。`NSConnection` 使用 `NSPort` 对象向远程进程传输数据和调用信息。总体安排如图
    13-1 所示。实线箭头表示进程内的对象引用。空心箭头表示通过某个端口或套接字交换数据的方向。


    **图 13-1.** `NSConnection` 中的对象


    如何创建 `NSConnection` 对象取决于你想要创建的连接类型。你可以直接创建 `NSPort` 对象，或从注册服务获取已连接的 `NSPort`
    对象，然后使用它们来创建 `NSConnection`。此外，还有一些工具可以为你创建预配置的 `NSConnection` 对象。表 13-2 列出了四种常见的
    `NSConnection` 配置。


    **表 13-2.** 常见的 `NSConnection` 配置


    | 连接类型 | 如何创建 |

    | --- | --- |

    | 同一进程中的两个对象 | 创建两个 `NSPort` 对象，然后使用它们创建 `NSConnection`。 |

    | 通过 Mach 端口的连接 | 让 `+[NSConnection connectionWithRegisteredName:host:]` 为你创建预配置的
    `NSConnection`。 |

    | 通过 IP 套接字的连接 | 从 `NSSocketPortNameServer` 获取一个 `NSPort`，并用它创建 `NSConnection`。
    |


    媒人的角色通常由某个 `NSPortNameServer` 子类扮演。每个名称服务器为特定类别的端口提供注册和发现服务。


    `NSMachBootstrapServer` 注册 Mach 消息端口。Mach 端口的作用域限于当前进程的引导命名空间。`NSSocketPortNameServer`
    在局域网中注册 TCP 端口。通过 `NSSocketPortNameServer` 注册的服务，本地网络上的任何计算机都可以访问。


    一旦 `NSConnection` 对象创建完成，服务器对象便被提供。这使得该对象对任何连接到服务器 `NSConnection` 的客户端可用。这是通过
    `-[NSConnection setRootObject:]` 实现的。设置后，客户端向其 `NSConnection` 发送 `-rootProxy`
    消息，以获取服务器根对象的 `NSDistantObject`。客户端和服务器需要交换的任何其他对象，都是通过向服务器根对象发送消息来完成的。服务器可以随时更改其
    `rootObject`，但这不会影响客户端先前获得的任何代理对象。

