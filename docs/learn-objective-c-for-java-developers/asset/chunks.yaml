- fmt: "When the notification arrives, the `Thermometer`’s state may be different\
    \ than it was when it sent the notification.\n\nMultiple notifications pushed\
    \ with the same posting style will be delivered in the order they were queued.\n\
    \n## Coalescing Notifications\n\nWhen you queue a notification, you can optionally\
    \ specify a coalescing mask and a run loop mode. The coalescing mask determines\
    \ how the notification is matched against similar notifications already in the\
    \ queue. The matching criteria are the same used to request notifications: the\
    \ notification must match the name, the sender, or both, of any currently queued\
    \ notifications. The criteria selection is formed by logically ORing one or both\
    \ `NSNotificationCoalescingOnName` or `NSNotificationCoalescingOnSender`. If the\
    \ notification matches other notifications in the queue, those notifications are\
    \ removed and the new notification replaces them. Again, we modify the `Thermometer`\
    \ class by replacing the `-enqueueNotification:postingStyle:` message with the\
    \ code in Listing 18-4.\n\n**Listing 18-4.** Coalesced Temperature Notifications\n\
    \n```\n[[NSNotificationQueue defaultQueue] enqueueNotification:n\n           \
    \                       postingStyle:NSPostWhenIdle\n                        \
    \          coalesceMask:(NSNotificationCoalescingOnName|NSNotificationCoalescingOnSender)\n\
    \                                      forModes:nil];\n```\n\nNow temperature\
    \ change events are pushed onto the queue, only to be delivered to their observers\
    \ when the run loop is idle. If a second or third temperature change notification\
    \ from the same `Thermometer` object is posted before the first is delivered,\
    \ the earlier ones are discarded. Eventually, only the last posted notification\
    \ is sent to the observers.\n\nThe `forModes:` parameter lets you specify the\
    \ run loop modes that the notification will be delivered in. Normally this is\
    \ `nil` or `NSDefaultRunLoopMode`. Use this if you want notifications to be delivered\
    \ in a particular mode, like only when the run loop is processing events for a\
    \ modal dialog. See the “Run Loops” section of the Chapter 15 for more about run\
    \ loop modes. You can pass the `NSNotificationNoCoalescing` constant if you want\
    \ to specify a run loop mode, but no coalescing.\n\n## Dequeuing Notifications\n\
    \nIf you should later change your mind about a notification, it can be removed\
    \ form the queue if it hasn’t yet been delivered. Send the notification queue\
    \ a `-dequeueNotificationsMatching:coalesceMask:` message with the notification\
    \ you want to remove and the constant `NSNotificationNoCoalescing`. If instead\
    \ you pass a combination of the coalescing masks described in the “Coalescing\
    \ Notifications” section, any other notifications that would be coalesced with\
    \ that notification will also be removed.\n\n## Distributed Notifications\n\n\
    Distributed notifications have the ability to send notifications to objects in\
    \ other processes. They are very similar to regular notifications, with three\
    \ important differences:\n\n- The notifications are sent to all processes.\n-\
    \ Notifications can only include property-list values.\n- Notifications are posted\
    \ and received asynchronously.\n\nThe first feature is what makes distributed\
    \ notifications so powerful. A single `-postNotification…` message is all that’s\
    \ required to communicate between objects in separate processes, making distributed\
    \ notifications by far the easiest inter-process communications service available.\
    \ While the objects can be in different processes, they don’t have to be; distributed\
    \ notifications will be delivered to any local observers as well.\n\nThe program\
    \ in Listing 18-5 can be entertaining. It registers to receive all distributed\
    \ notifications and logs them. Build it as a command-line tool, run it, and then\
    \ go about using your system. Or use it to test sending notifications from your\
    \ application. Kill the process to stop it.\n\n**Listing 18-5.** Distributed Notifications\
    \ Monitor\n\n```\n#import <Foundation/Foundation.h>\n#import <AppKit/NSWorkspace.h>\n\
    \n@interface DistributedNotificationListener : NSObject\n- (void)dumpNotification:(NSNotification*)notification;\n\
    @end\n```"
  raw: 'When the notification arrives, the Thermometer’s state may be different than
    it was when it sent the notification.


    Multiple notifications pushed with the same posting style will be delivered in
    the order they were queued.


    Coalescing Notifications


    When you queue a notification, you can optionally specify a coalescing mask and
    a run loop mode. The coalescing mask determines how the notification is matched
    against similar notifications already in the queue. The matching criteria are
    the same used to request notifications: the notification must match the name,
    the sender, or both, of any currently queued notifications. The criteria selection
    is formed by logically ORing one or both NSNotificationCoalescingOnName or NSNotificationCoalescingOnSender.
    If the notification matches other notifications in the queue, those notifications
    are removed and the new notification replaces them. Again, we modify the Thermometer
    class by replacing the


    -enqueueNotification:postingStyle: message with the code in Listing 18-4.


    Listin g 18-4\. Coalesced Temperature Notifications


    [[NSNotificationQueue defaultQueue] enqueueNotification:n


    postingStyle:NSPostWhenIdle


    coalesceMask:(NSNotificationCoalescingOnName|NSNotificationCoalescingOnSender)
    forModes:nil];


    Now temperature change events are pushed onto the queue, only to be delivered
    to their observers when the run loop is idle. If a second or third temperature
    change notification from the same Thermometer object is posted before the first
    is delivered, the earlier ones are discarded. Eventually, only the last posted
    notification is sent to the observers.


    The forModes: parameter lets you specify the run loop modes that the notification
    will be delivered in. Normally this is nil or NSDefaultRunLoopMode. Use this if
    you want notifications to be delivered in a particular mode, like only when the
    run loop is processing events for a modal dialog. See the “Run Loops” section
    of the Chapter 15 for more about run loop modes. You can pass the NSNotificationNoCoalescing
    constant if you want to specify a run loop mode, but no coalescing.


    Dequeuing Notifications


    If you should later change your mind about a notification, it can be removed form
    the queue if it hasn’t yet been delivered. Send the notification queue a -dequeueNotificationsMatching:coalesceMask:
    message with the notification you want to remove and the constant NSNotificationNoCoalescing.
    If instead you pass a combination of the coalescing masks described in the “Coalescing
    Notifications”


    section, any other notifications that would be coalesced with that notification
    will also be removed.


    Distributed Notifications


    Distributed notifications have the ability to send notifications to objects in
    other processes. They are very similar to regular notifications, with three important
    differences:


    • The notifications are sent to all processes.


    • Notifications can only include property-list values.


    • Notifications are posted and received asynchronously.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18 ■ PROVIDER/SUBSCRIBER PATTERN


    The first feature is what makes distributed notifications so powerful. A single


    -postNotification… message is all that’s required to communicate between objects
    in separate processes, making distributed notifications by far the easiest inter-process
    communications service available. While the objects can be in different processes,
    they don’t have to be; distributed notifications will be delivered to any local
    observers as well.


    The program in Listing 18-5 can be entertaining. It registers to receive all distributed
    notifications and logs them. Build it as a command-line tool, run it, and then
    go about using your system. Or use it to test sending notifications from your
    application. Kill the process to stop it.


    Listin g 18-5\. Distributed Notifications Monitor


    #import <Foundation/Foundation.h>


    #import <AppKit/NSWorkspace.h>


    @interface DistributedNotificationListener : NSObject


    - (void)dumpNotification:(NSNotification*)notification;


    @end'
  trans: "\n当通知到达时，`Thermometer` 的状态可能与其发送通知时的状态不同。\n\n以相同投递样式推送的多个通知将按照入队顺序依次传递。\n\
    \n## 通知合并\n\n当你将通知加入队列时，可以选择性地指定一个合并掩码和一个运行循环模式。合并掩码决定该通知如何与队列中已有的类似通知进行匹配。匹配标准与请求通知时使用的相同：通知必须与当前队列中任意通知的名称、发送者或两者兼匹配。匹配条件是通过对\
    \ `NSNotificationCoalescingOnName` 或 `NSNotificationCoalescingOnSender` 中的一个或两个进行逻辑或运算形成的。如果该通知与队列中的其他通知匹配，则这些通知会被移除，并由新通知替换。同样，我们通过将\
    \ `-enqueueNotification:postingStyle:` 消息替换为代码清单 18-4 中的代码来修改 `Thermometer` 类。\n\
    \n**代码清单 18-4.** 合并后的温度通知\n\n```\n[[NSNotificationQueue defaultQueue] enqueueNotification:n\n\
    \                                  postingStyle:NSPostWhenIdle\n             \
    \                     coalesceMask:(NSNotificationCoalescingOnName|NSNotificationCoalescingOnSender)\n\
    \                                      forModes:nil];\n```\n\n现在，温度变化事件会被推入队列，只有当运行循环空闲时才会传递给它们的观察者。如果在第一个通知传递之前，来自同一\
    \ `Thermometer` 对象的第二个或第三个温度变化通知被发出，则较早的那些通知会被丢弃。最终，只有最后一个发出的通知会被发送给观察者。\n\n`forModes:`\
    \ 参数让你可以指定通知传递时的运行循环模式。通常这是 `nil` 或 `NSDefaultRunLoopMode`。如果你希望通知在特定模式下传递（例如，仅在运行循环处理模态对话框事件时），可以使用此参数。有关运行循环模式的更多信息，请参阅第\
    \ 15 章的“运行循环”部分。如果你想指定运行循环模式但不进行合并，可以传递常量 `NSNotificationNoCoalescing`。\n\n##\
    \ 通知出列\n\n如果你后来改变了对某个通知的主意，并且它尚未被传递，则可以从队列中删除它。向通知队列发送一条带有你要移除的通知以及常量 `NSNotificationNoCoalescing`\
    \ 的 `-dequeueNotificationsMatching:coalesceMask:` 消息即可。如果改为传递“通知合并”部分中描述的合并掩码组合，则所有会与该通知合并的其他通知也将被移除。\n\
    \n## 分布式通知\n\n分布式通知能够向其他进程中的对象发送通知。它们与常规通知非常相似，但有三个重要区别：\n\n- 通知会发送给所有进程。\n- 通知只能包含属性列表值。\n\
    - 通知以异步方式发布和接收。\n\n第一个特点正是分布式通知如此强大的原因。只需一条 `-postNotification…` 消息，就能在不同进程中的对象之间进行通信，这使得分布式通知成为迄今为止最易用的进程间通信服务。虽然对象可以位于不同进程中，但并非必须如此；分布式通知也会传递给所有本地观察者。\n\
    \n代码清单 18-5 中的程序可能很有趣。它会注册以接收所有分布式通知并将其记录下来。将其构建为命令行工具，运行它，然后正常使用你的系统。或者用它来测试从你的应用程序发送通知。终止该进程即可停止它。\n\
    \n**代码清单 18-5.** 分布式通知监视器\n\n```\n#import <Foundation/Foundation.h>\n#import <AppKit/NSWorkspace.h>\n\
    \n@interface DistributedNotificationListener : NSObject\n- (void)dumpNotification:(NSNotification*)notification;\n\
    @end\n```\n"
- fmt: "# `@implementation DistributedNotificationListener`\n\n```objc\n- (void)dumpNotification:(NSNotification*)notification\n\
    {\n    NSString* message = [notification name];\n    id object = [notification\
    \ object];\n    NSDictionary* info = [notification userInfo];\n    if (info !=\
    \ nil) {\n        NSLog(@\"%@ from %@ with %@\", message, object, info);\n   \
    \ } else {\n        if (object != nil)\n            NSLog(@\"%@ from %@\", message,\
    \ object);\n        else\n            NSLog(@\"%@\", message);\n    }\n}\n@end\n\
    ```\n\n```objc\nint main (int argc, const char * argv[])\n{\n    DistributedNotificationListener\
    \ *listener;\n    NSDistributedNotificationCenter *center;\n \n    listener =\
    \ [DistributedNotificationListener new];\n    center = [NSDistributedNotificationCenter\
    \ defaultCenter];\n    [center addObserver:listener\n              selector:@selector(dumpNotification:)\n\
    \                  name:nil\n                object:nil];\n    [[NSRunLoop currentRunLoop]\
    \ run];\n    // This never returns: kill the process to stop the program\n   \
    \ return 0;\n}\n```\n\nTo use distributed notifications, you need to be aware\
    \ of some of its limitations and complications, described in the next few sections.\n\
    \n## Distributed Notifications Center\n\nTo post or observe distributed notifications,\
    \ your objects must interact with the singleton `NSDistributedNotificationCenter`\
    \ created for each process. You obtain it with `[NSDistributedNotificationCenter\
    \ defaultCenter]`. The framework may define other distributed notification centers\
    \ in the future, but for now there's only one. You cannot create your own distributed\
    \ notification centers.\n\nIf you need a more sophisticated inter-process communications\
    \ path, consider distributed objects, described in Chapter 13.\n\nDistributed\
    \ notification centers exchange messages using Mach (kernel) ports. The security\
    \ model of Mac OS X organizes Mach ports into a hierarchy of bootstrap namespaces.\
    \ Posted notifications will be broadcast to all of the processes in your account's\
    \ local and parent namespaces, but not to sister namespaces created by other users.\n\
    \n## Property List Values\n\nThe information in a distributed notification is\
    \ serialized (see the \"Objective-C Serialization\" section of Chapter 12). This\
    \ restricts the objects passed in the `object` and `userInfo` parameters to property-list\
    \ values—basically array, dictionary, string, number, and date objects. The `object`\
    \ parameter in a distributed notification center is used exactly the same way\
    \ it is in a regular notification center, except it's just a string instead of\
    \ a pointer to the provider object. Use a descriptive value like `@\"com.apress.learnobjc.DemoProvider\"\
