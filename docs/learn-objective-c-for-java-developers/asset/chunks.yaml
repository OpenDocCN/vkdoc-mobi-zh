    Objective-C coding is somewhat simpler, because the NSXMLDocument class provides
    the DOM translator automatically. To transform an XML or HTML file into a document
    object model, simply initialize a new NSXMLDocument object with the contents of
    the XML source. Similarly, transforming an existing DOM into its XML representation
    is simply a matter of asking the NSXMLDocument for its NSData representation.
    An alternate method, -[NSXMLDocument XMLDataWithOptions:], accepts a set of flags
    that influence how the XML is encoded.


    Objective-C event-driven XML parsing parallels its Java cousin SAX (Simple API
    for XML). In Java, you create a custom object that implements the org.xml.sax.ContentHandler
    interface. This interface defines a number of callback methods (startDocument(),
    startElement(String,String,String,Attributes), characters(char[],int,int), etc.)
    that are invoked as each XML element is parsed. Your implementation of these methods
    would typically use the parsed content to create custom data model objects or
    feed the information to another object.


    In Objective-C the process is nearly identical, except that delegate methods—defined
    by an informal protocol—receive the parsing events. To parse an XML file using
    Objective-C, implement the appropriate delegate methods (-parserDidStartDocument:,


    -parser:didStartElement:namespaceURI:qualifiedName:attributes:, -parser:foundCharacters:,
    and so on) in your class. Create an instance of the NSXMLParser object using -initWithData:
    or


    -initWithContentsOfURL: to specify a source for the XML. Set your custom object
    as the delegate of the parser ([xmlParser setDelegate:myParser]) and then send
    it a parse message to begin decoding.


    Copying Objects


    Archiving and serialization essentially copy an object. If you just need to efficiently
    copy an object, Objective-C provides the -copy message that will duplicate an
    object in almost exactly the same way as Java’s Object.clone() method. In addition,
    Objective-C defines a protocol for obtaining mutable copies of immutable objects.


    Copying an object may produce a shallow copy or a deep copy. Which depends on
    the nature of the object. A shallow copy is the default in both Java and Objective-C.
    A shallow copy creates a new object 207


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 ■ SERIALIZATION


    whose instance variables contain the same values as the original. It’s shallow
    because the duplicate object will refer to all of the same objects that the original
    does. For references to immutable objects, that’s the preferred result as it avoids
    unnecessary object duplication. For mutable objects, however, changing a property
    value affects the value of the copy too. To be truly independent of the original,
    the copied object must recursively copy any mutable objects it refers to. This
    is called a deep copy.


    In Java, a clonable object must implement java.lang.Cloneable. If you do nothing
    else, calling Object.clone() will produce a shallow copy of the object. If the
    object needs to perform a deep copy, it must override Object.clone() and perform
    whatever additional duplication is required.


    Objective-C is very similar. For an object to be copyable, it must conform to
    the NSCopying protocol and implement the -copyWithZone: method. To perform a shallow
    copy, -copyWithZone: can call NSCopyObject(…) to produce and return a duplicate
    of the object. If a deep copy is needed, additional copy operations or other memory
    management should be performed before returning.


    Listing 12-15 shows a simple object that performs a deep copy of itself.


    Listin g 12-15\. Copying Objects


    **Java**


    public class StormTrooper implements Cloneable


    {


    ArrayList evilOrders;


    public Object clone() throws CloneNotSupportedException


    {


    try {


    StormTrooper clone = (StormTrooper)super.clone();


    clone.evilOrders = (ArrayList)this.evilOrders.clone();


    return (clone);


    }


    catch (CloneNotSupportedException e) {


    throw new InternalError(e.toString());


    }


    }


    }


    **Objective-C**


    @interface StormTrooper : NSObject <NSCopying> {


    NSMutableArray *evilOrders;


    }


    @end


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 ■ SERIALIZATION


    @implementation StormTrooper


    - (id)copyWithZone:(NSZone*)zone


    {


    StormTrooper *clone = NSCopyObject(self,0,zone);


    if (clone!=nil)


    clone->evilOrders = [evilOrders copy];


    return (clone);


    }


    @end


    To copy an object that conforms to NSCopying, send it the -copy message. The object
    will send itself a -copyWithZone: message, or raise an exception if the object
    doesn’t conform to NSCopying. Do not customize object copying by overriding -copy.


    NSCopyObject creates a new object. If an object inherits from a class that already
    implements


    -copyWithZone: it should create the copy by sending its superclass -copyWithZone:,
    as in MyClass *clone


    = [super copyWithZone:zone], and then proceed with any subclass-specific copying.


    NSCopyObject is convenient, but you don’t have to use it. You can elect to create
    and initialize an equivalent object using any means available. For example, you
    could create a new object using something like [[[self class] alloc] init], and
    then initialize the new object so that it is equal to the original. You could
    pull an already created object from a pool of similar objects and set its properties
    to match. An immutable object may elect to return self, instead of actually making
    a copy.


    Objective-C also defines an interface for obtaining mutable copies of immutable
    objects. If you implement a copyable immutable class that has a mutable subclass,
    you should follow this design:'
