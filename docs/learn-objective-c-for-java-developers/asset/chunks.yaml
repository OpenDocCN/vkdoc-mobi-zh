    ## Archives and Documents


    The `NSDocument` classes are designed to work hand-in-hand with archiving to implement
    a simple, and seamless, document storage solution for your application. The basic
    concept is that your document’s data model will consist of a graph of archivable
    objects. To save your document in a file, those objects are archived into an `NSData`
    object that is then written to disk. To open the document again, the document’s
    data file is read into a new `NSData` object and unarchived to re-create your
    document’s data model.


    Listing 12-3 demonstrates the minimal implementation for an `NSDocument` object
    that can read and write its content to a document file. This tiny bit of “glue”
    is all that’s required to implement all of the standard document commands (Open…,
    Save, Save As…, Revert) in a Cocoa application.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # CHAPTER 12 ■ SERIALIZATION


    ### Listing 12-3. Using Archiving to Implement a Document Class


    ```objc

    @interface SimpleDocument : NSDocument {


    id dataModel;


    }


    @end


    @implementation SimpleDocument


    - (NSData*)dataOfType:(NSString*)typeName error:(NSError**)outError


    {


    return [NSKeyedArchiver archivedDataWithRootObject:dataModel];


    }


    - (BOOL)readFromData:(NSData*)data


    ofType:(NSString*)typeName


    error:(NSError**)outError


    {


    dataModel = [NSKeyedUnarchiver unarchiveObjectWithData:data];


    return (dataModel!=nil);


    }


    @end

    ```


