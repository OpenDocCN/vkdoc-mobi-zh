    \ will send your delegate object the delegate messages that class has defined.\n\
    \nThe methods a delegate is expected to implement are usually defined informally.\
    \ Their use, however, is so common that Objective-C class documentation will explicitly\
    \ identify them as a “delegate method” or group them together in a “Delegate Methods”\
    \ section. Remember that these document the methods the delegate property object\
    \ should, or could, respond to, not the methods implemented by the class. When\
    \ looking to customize the behavior of any object, first look for delegate methods\
    \ in its documentation.\n\n> **Note:** Some methods listed in the delegate methods\
    \ section of the documentation are actually notifications sent to observers, not\
    \ messages sent to the delegate object. The documentation should make this distinction\
    \ clear, but the biggest clue is that notification methods always receive an `NSNotification`\
    \ object as their only parameter. See Chapter 18 for more about notifications.\n\
    \nThe delegation pattern is widely used in the Cocoa framework. So much so that\
    \ it catches Java and C++ developers off guard at first. For example, most customization\
    \ of the single `NSApplication` object is not accomplished by subclassing `NSApplication`,\
    \ but by attaching a delegate object to `NSApplication` during initialization.\
    \ Here’s a sample of the tasks that `NSApplication` defers to its delegate object:\n\
    \n- Open one or more document files.\n- Open a temporary document file.\n- Automatically\
    \ reopen documents.\n- Open an untitled document window.\n- Print a document.\n\
    - Present an error message to the user.\n- Determine if the application should\
    \ quit when the last window is closed.\n- Determine if the application is ready\
    \ to quit.\n\nIn other object-oriented programming languages, customizations like\
    \ these would typically be accomplished by subclassing the `Application` class\
    \ and overriding its methods. Because of the power of delegates to augment the\
    \ behavior of the `NSApplication` object, subclassing `NSApplication` is actually\
    \ quite rare.\n\nListing 17-1 shows a simple delegate object that performs validation\
    \ for an `NSControl` view object. The `NSControl` object sends its delegate a\
    \ `-control:isValidObject:` message whenever it needs to validate its input value.\n\
    \n**Listing 17-1.** Input Value Validation Delegate\n\n```objectivec\n@interface\
    \ PositiveIntValidationDelegate : NSObject\n\n- (BOOL)control:(NSControl*)control\
    \ isValidObject:(id)object;\n\n@end\n\n@implementation PositiveIntValidationDelegate\n\
    \n- (BOOL)control:(NSControl*)control isValidObject:(id)object\n{\n    return\
    \ ([object intValue] > 0);\n}\n\n@end\n\n…\n\nNSTextField *inputTextField = …\n\
    [inputTextField setDelegate:[PositiveIntValidationDelegate new]];\n```\n\nOnce\
    \ the delegate object is set for the input view, the `NSTextField` (a subclass\
    \ of `NSControl`) will only accept text values that are interpreted as a positive\
    \ integer value."
  raw: 'The delegation pattern externalizes, or delegates, selected decisions or actions
    to another object, termed the delegate object. It embodies a design principle
    known as inversion of responsibility. The delegate can customize or influence
    the normal behavior of the object with code that is not contained within the object’s
    class hierarchy. Delegates can be queried to make decisions, filter data, define
    conditional behavior, or inject additional processing at key times. Delegate objects
    are invariably optional. The class implements a default strategy in the absence
    of a delegate object or method.


    The traditional way to customize a class is to subclass it and override specific
    methods. To redefine how your object gets copied, you override -copyWithZone:.
    To redefine how it compares itself with other objects, you override -isEqual:,
    and so forth. However, the inheritance pattern is not as effective when trying
    to customize the behavior of a tree of existing classes. Take the example in Figure
    17-1.


    ***Figure 17-1.** Window class model*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-334_1.png)


    CHAPTER 17 ■ DELEGATION PATTERN


    Figure 17-1 shows a set of window classes. At the base is the abstract Window
    class that defines common properties like position, dimensions, and order, along
    with common behavior such as dragging, resizing, minimizing, and reordering. The
    TitledWindow class defines additional attributes, like the window’s title, and
    behavior such as inserting the window’s title into the application’s Window menu.
    There are non-titled subclasses of the Window class along with specialized subclasses
    of the titled window class. In short, it’s a succinct and logical class hierarchy.


    Now the application developer—that’s you—would like to enhance the user experience
    by implementing windows that “snap” to optimal positions as the user drags them
    around. Using inheritance, your only customization strategy is to subclass DocumentWindow
    and override its


    -dragWindow method. But that only redefines the behavior for the DocumentWindow.
    To implement the same customization for the palette, help, and info windows, additional
    subclasses must be defined, each duplicating the same customization. The modified
    class tree is shown in Figure 17-2.


    ***Figure 17-2.** Customization using inheritance*


    Not only is this a lot of work and duplicate code, but the poor programmer—that’s
    you—now discovers that the application doesn’t work on systems with more than
    one monitor. Apparently, Window’s -dragWindow method handles some special cases
    when dragging between monitors that only the original designer is privy to. Not
    knowing what that solution is, it’s impossible to effectively duplicate the behavior
    of -dragWindow in the subclasses. The feature is a disaster and must be abandoned,
    or you risk additional development and the potential for future incompatibility.


    Had the original developers of the Window class foreseen this situation, they
    could have easily avoided the problem by adopting the delegation pattern. The
    solution is to define a delegate object in the Window base class, as shown in
    Figure 17-3.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-335_1.png)


    CHAPTER 17 ■ DELEGATION PATTERN


    ***Figure 17-3.** Customization using delegation*


    In its -dragWindow method, the Window class repeatedly sends the delegate object
    a


    -willDragWindow:to: message as the user drags the window. The message includes
    the window and the user’s latest drag position. The delegate is expected to return
    the same or a modified position that the Window class will actually use when positioning
    the window.


    It’s a trivial but powerful interface. The delegate object is free to implement
    whatever drag position scheme it desires. It can “snap” the window’s position
    to nearby edges, prevent the window from being dragged to certain regions, or
    use the information to move other windows out of the way.


    More importantly:


    • All of the subclasses (InfoWindow, HelpWindow, PaletteWindow, and DocumentWindow)
    can be customized using a single delegate.


    • Different delegate objects can be created to define different customizations.


    • Customization can be applied per window instance, rather than per class.


    • The new feature will be compatible with future versions of the Window class
    and all of its subclasses.


    • Existing classes and interfaces that create DocumentWindow objects do not have
    to be modified.


    • Any Window object that does not have a delegate object will use the standard
    window drag behavior.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 17 ■ DELEGATION PATTERN


    Using Delegates


    Using a delegate object is very simple, which is one of the features that makes
    them so useful.


    1.


    Implement the appropriate delegate methods in your class.


    2.


    Set


    the


    delegate property of the object you want to customize to your delegate object,
    typically by sending -setDelegate:.


    That’s it. Once set, the object will send your delegate object the delegate messages
    that class has defined.


    The methods a delegate is expected to implement are usually defined informally.
    Their use, however, is so common that Objective-C class documentation will explicitly
    identify them as a “delegate method” or group them together in a “Delegate Methods”
    section. Remember that these document the methods the delegate property object
    should, or could, respond to, not the methods implemented by the class. When looking
    to customize the behavior of any object, first look for delegate methods in its
    documentation.


    ■Note Some methods listed in the delegate methods section of the documentation
    are actually notifications sent to observers, not messages sent to the delegate
    object. The documentation should make this distinction clear, but the biggest
    clue is that notification methods always receive an NSNotification object as their
    only parameter. See Chapter 18 for more about notifications.


    The delegation pattern is widely used in the Cocoa framework. So much so that
    it catches Java and C++ developers off guard at first. For example, most customization
    of the single NSApplication object is not accomplished by subclassing NSApplication,
    but by attaching a delegate object to NSApplication during initialization. Here’s
    a sample of the tasks that NSApplication defers to its delegate object:


    • Open one or more document files.


    • Open a temporary document file.


    • Automatically reopen documents.


    • Open an untitled document window.


    • Print a document.


    • Present an error message to the user.


    • Determine if the application should quit when the last window is closed.


    • Determine if the application is ready to quit.


    In other object-oriented programming languages, customizations like these would
    typically be accomplished by subclassing the Application class and overriding
    its methods. Because of the power of delegates to augment the behavior of the
    NSApplication object, subclassing NSApplication is actually quite rare.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 17 ■ DELEGATION PATTERN


    Listing 17-1 shows a simple delegate object that performs validation for an NSControl
    view object. The NSControl object sends its delegate a -control:isValidObject:
    message whenever it needs to validate its input value.


    Listin g 17-1\. Input Value Validation Delegate


    @interface PositiveIntValidationDelegate : NSObject


    - (BOOL)control:(NSControl*)control isValidObject:(id)object;


    @end


    @implementation PositiveIntValidationDelegate


    - (BOOL)control:(NSControl*)control isValidObject:(id)object


    {


    return ([object intValue]>0);


    }


    @end


    …


    NSTextField *inputTextField = …


    [inputTextField setDelegate:[PositiveIntValidationDelegate new]]; Once the delegate
    object is set for the input view, the NSTexField (a subclass of NSControl) will
    only accept text values that are interpreted as a positive integer value.'
  trans: "\n# 委托模式\n\n委托模式将特定决策或操作外部化（即委托）给另一个对象，称为委托对象。它体现了一种被称为责任反转的设计原则。委托对象可以使用不包含在对象类层次结构中的代码来定制或影响对象的正常行为。委托对象可以被查询以做出决策、过滤数据、定义条件行为，或在关键时刻注入额外处理。委托对象始终是可选的。当没有委托对象或方法时，类会实现一个默认策略。\n\
    \n定制的传统方式是创建子类并重写特定方法。要重新定义对象如何被复制，你可以重写 `-copyWithZone:` 方法。要重新定义它与其他对象比较的方式，你可以重写\
    \ `-isEqual:` 方法，以此类推。然而，当试图定制现有类树的行为时，继承模式就不那么有效了。以图 17-1 中的示例为例。\n\n**图 17-1.**\
    \ 窗口类模型\n\n![图 17-1](img/index-334_1.png)\n\n图 17-1 展示了一组窗口类。最底层是抽象的 `Window`\
    \ 类，它定义了通用属性（如位置、尺寸和顺序）以及通用行为（如拖拽、调整大小、最小化和重新排序）。`TitledWindow` 类定义了额外属性，如窗口标题，以及行为，如将窗口标题插入应用程序的“窗口”菜单。`Window`\
    \ 类下有非标题子类，以及标题窗口类的专用子类。简而言之，这是一个简洁且逻辑清晰的类层次结构。\n\n现在，应用程序开发者（也就是你）希望通过实现窗口在用户拖拽时“吸附”到最佳位置来增强用户体验。使用继承，你唯一的定制策略是创建\
    \ `DocumentWindow` 的子类并重写其 `-dragWindow` 方法。但这只重新定义了 `DocumentWindow` 的行为。要为面板、帮助和信息窗口实现相同的定制，必须定义额外的子类，每个子类都重复相同的定制。修改后的类树如图\
    \ 17-2 所示。\n\n**图 17-2.** 使用继承进行定制\n\n这不仅工作量大且代码重复，而且这位可怜的开发者（也就是你）现在发现应用程序无法在有多台显示器的系统上工作。显然，`Window`\
    \ 的 `-dragWindow` 方法处理了一些在显示器之间拖拽时的特殊情形，而这些情形只有原始设计者知道。由于不清楚那个解决方案是什么，因此在子类中有效复制\
    \ `-dragWindow` 的行为是不可能的。这个特性是一场灾难，必须放弃，否则你将面临额外的开发和未来不兼容的风险。\n\n如果 `Window` 类的原始开发者预见到了这种情况，他们本可以通过采用委托模式轻松避免此问题。解决方案是在\
    \ `Window` 基类中定义一个委托对象，如图 17-3 所示。\n\n**图 17-3.** 使用委托进行定制\n\n![图 17-3](img/index-335_1.png)\n\
    \n在其 `-dragWindow` 方法中，当用户拖拽窗口时，`Window` 类会反复向委托对象发送 `-willDragWindow:to:` 消息。该消息包含窗口对象和用户最新的拖拽位置。委托对象预期会返回相同或修改后的位置，而\
    \ `Window` 类在实际定位窗口时会使用该位置。\n\n这是一个简单但强大的接口。委托对象可以自由实现其想要的任何拖拽位置方案。它可以将窗口位置“吸附”到附近的边缘，阻止窗口被拖拽到某些区域，或者利用该信息移开其他窗口。\n\
    \n更重要的是：\n\n- 所有子类（`InfoWindow`、`HelpWindow`、`PaletteWindow` 和 `DocumentWindow`）都可以使用单个委托对象进行定制。\n\
    - 可以创建不同的委托对象来定义不同的定制行为。\n- 定制可以应用于每个窗口实例，而不是每个类。\n- 新特性将与 `Window` 类及其所有子类的未来版本兼容。\n\
    - 创建 `DocumentWindow` 对象的现有类和接口无需修改。\n- 任何没有委托对象的 `Window` 对象将使用标准的窗口拖拽行为。\n\n\
    ## 使用委托\n\n使用委托对象非常简单，这也是其如此有用的特性之一。\n\n1. 在你的类中实现相应的委托方法。\n2. 将你想要定制的对象的委托属性设置为你的委托对象，通常通过发送\
    \ `-setDelegate:` 消息来实现。\n\n就是这样。一旦设置好，对象就会向你的委托对象发送该类已定义的委托消息。\n\n委托预期要实现的方法通常是非正式定义的。然而，它们的使用非常普遍，以至于\
    \ Objective-C 类的文档会明确将其标识为“委托方法”，或将它们分组到“委托方法”部分。请记住，这些文档记录的是委托属性对象应该或可以响应的方法，而不是类本身实现的方法。当希望定制任何对象的行为时，首先应在文档中查找其委托方法。\n\
    \n> **注意：** 文档委托方法部分列出的某些方法实际上是发送给观察者的通知，而不是发送给委托对象的消息。文档应明确区分这一点，但最大的线索在于，通知方法始终接收一个\
    \ `NSNotification` 对象作为其唯一参数。更多关于通知的内容，请参见第 18 章。\n\n委托模式在 Cocoa 框架中被广泛使用。以至于刚开始时会让\
    \ Java 和 C++ 开发者措手不及。例如，对单个 `NSApplication` 对象的大部分定制并非通过创建 `NSApplication` 的子类来实现，而是在初始化期间将一个委托对象附加到\
    \ `NSApplication` 上。以下是 `NSApplication` 委托给其委托对象的一些任务示例：\n\n- 打开一个或多个文档文件。\n-\
    \ 打开临时文档文件。\n- 自动重新打开文档。\n- 打开无标题的文档窗口。\n- 打印文档。\n- 向用户呈现错误消息。\n- 确定当最后一个窗口关闭时应用程序是否应退出。\n\
    - 确定应用程序是否准备好退出。\n\n在其他面向对象编程语言中，此类定制通常通过创建 `Application` 类的子类并重写其方法来实现。由于委托能够增强\
    \ `NSApplication` 对象行为的能力，实际中创建 `NSApplication` 的子类非常罕见。\n\n清单 17-1 展示了一个为 `NSControl`\
    \ 视图对象执行验证的简单委托对象。每当需要验证其输入值时，`NSControl` 对象会向其委托发送一条 `-control:isValidObject:`\
    \ 消息。\n\n**清单 17-1.** 输入值验证委托\n\n```objectivec\n@interface PositiveIntValidationDelegate\
    \ : NSObject\n\n- (BOOL)control:(NSControl*)control isValidObject:(id)object;\n\
    \n@end\n\n@implementation PositiveIntValidationDelegate\n\n- (BOOL)control:(NSControl*)control\
    \ isValidObject:(id)object\n{\n    return ([object intValue] > 0);\n}\n\n@end\n\
    \n…\n\nNSTextField *inputTextField = …\n[inputTextField setDelegate:[PositiveIntValidationDelegate\
    \ new]];\n```\n\n一旦为输入视图设置了委托对象，`NSTextField`（`NSControl` 的子类）将只接受被解释为正整数的文本值。\n"
- fmt: 'Usually, classes are designed so that delegates are optional. The object will
    adopt some default behavior if there is no delegate, or if the delegate doesn’t
    implement an optional delegate method. In a few cases, the delegate is critical
    to the object’s operation. For example, an `NSURLConnection` object sends all
    of the connection’s events to its delegate. Without a delegate object to receive
    those messages, the object won’t accomplish much.


    ## Delegate Methods


    Some delegate methods are expected while others are optional. The delegate must
    implement any expected delegate methods. The object using the delegate will send
    expected delegate messages to the delegate object unconditionally. If the delegate
    fails to implement them, an unrecognized selector exception will be thrown at
    runtime.


    Optional delegate methods are more common, and make the delegation pattern exceptionally
    flexible. The object sending the delegate message will first test to see if the
    delegate object responds to it. If it does, the delegate is sent the message.
    If not, the object falls back to using its baseline behavior. The delegate object
    is free to implement just those optional delegate methods that it requires.


    Optional delegate methods are particularly flexible because the delegate object
    only needs to implement those methods it wants, or needs, to affect. If a class
    defines 4 delegate methods, the delegate object has 15 different combinations
    of customizations available to it. Optional delegate methods also avoid the common
    Java practice of creating so-called “Simple” classes that implement default behavior
    for a set of interface methods, expecting you to subclass the “Simple” class and
    override only those methods you want to alter. This both simplifies the class
    hierarchy and localizes the default delegate behavior in the object’s class rather
    than in the “Simple” class.


    Delegate objects are often “real” objects, not classes specifically designed to
    be delegates. For example, a document object may also implement the delegate methods
    for `NSToolbar`. The toolbar delegate defines which toolbar controls are shown
    and appropriate, derived from information specific to the document object. The
    document object can transparently influence the toolbar user interface without
    any complicated inter-object dependencies.


    A delegate object could also implement multiple sets of delegate methods and set
    itself as the delegate for a wide variety of objects. This is common in the case
    of the application delegate object. An application delegate will make itself the
    delegate object of the single `NSApplication` object, but may also assign itself
    as the delegate to other objects like windows, the file manager, and so on. The
    single application delegate object can then influence a wide range of behaviors
    using information localized in a single object. If the application delegate class
    becomes unwieldy, its individual roles can be subdivided into categories for improved
    modularity. See Chapter 5 for more about categories.


    ## Delegate Protocols


    The methods implemented by a delegate are typically defined as informal protocols
    in the Cocoa framework. (See Chapter 5 if you need a refresher on informal and
    formal protocols.) Delegate object properties are of type `id`, allowing them
    to be set to any object. The methods the delegate object is expected to implement
    are defined in the documentation.


    You’re free to do the same in your design, or you can adopt a more formal approach,
    as shown in Listing 17-2. You can’t do this in Java, because Java has no concept
    of optional interface methods. If you’re curious, the code to implement an informal
    protocol in Java—by testing for the presence of a method—was demonstrated in Chapter
    10.


    **Listing 17-2. Automatic Defense Gun with Formal Delegate**


    ```

    @interface Gun : NSObject


    …


    @end


    @protocol Targeting


    @required


    - (BOOL)gun:(Gun*)gun shouldShootAt:(id)target;


    @optional

    ```'
