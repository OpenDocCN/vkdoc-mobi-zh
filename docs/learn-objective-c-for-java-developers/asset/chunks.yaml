- fmt: '### NSView 不直接使用布局管理器


    `NSView` 不使用布局管理器。相反，每个 `NSView` 对象都有一组调整大小标志（resizing flags），用于控制其子视图如何重新定位。这些标志可以在
    Interface Builder 中轻松配置。您可以通过将 `autoresizesSubviews` 属性设置为 `NO` 来禁用此功能。您可以通过以下三种方式之一自定义自动调整大小行为：重写父视图的
    `-resizeSubviewsWithOldSize:` 方法来重新定义其子视图如何调整大小；重写子视图的 `-resizeWithOldSuperviewSize:`
    方法来重新定义其自身如何调整大小；或者将 `postsBoundsChangedNotifications` 属性设置为 `YES`，并监听 `NSViewBoundsDidChangeNotification`
    通知。另请参阅本章后面的“动画”一节。此外，还有一些视图类可以实现与使用布局管理器几乎相同的效果；`NSMatrix` 提供了与 `java.awt.GridLayout`
    基本相同的功能。


    `NSView` 定义了一个 `tag` 属性——用于识别单个子视图——但该属性是不可变的，并且在基类中始终返回 0。`NSControl` 和其他一些子类重写了
    `tag`，使其成为可变属性。如果您想创建 `NSView` 的自定义子类并为其分配一个标签（tag），您必须重写 `tag` 属性，使其可变，并提供一个存储该值的地方。


    `NSTextField` 是一个多功能类，用于在窗口中显示大多数文本。它可以配置为显示不可变文本（标签）、显示和编辑单行文本（文本字段），或显示和编辑多行文本（文本区域）。它实现了一组丰富的属性，用于确定文本的显示、对齐、滚动和换行方式。


    **提示：** 在创建您自己的 `NSView` 子类时，请在 Xcode 中使用 Objective-C `NSView` 子类源文件模板。它会创建一个子类，其中包含常用重写
    `NSView` 方法的桩实现。


    现在您已经了解了视图类的基本组织方式，您将希望开始向视图中填充子视图，甚至可能创建自己的自定义视图类。为此，您需要了解 Cocoa 绘图环境以及自定义 `NSView`
    对象的工作原理，这些内容将在接下来的几节中描述。


    ### 视图几何（View Geometry）


    Cocoa 的绘图几何与 Swing 略有不同。Cocoa 的自然坐标系与 Java 使用的坐标系是颠倒的，但可以选择翻转，使其与 Java 相同。笔的位置和绘图边界也不同。


    在 Cocoa 中，所有图形值都是浮点数。这包括坐标、大小、宽度和颜色值。像红色或透明度这样的值通常表示为 0.0 到 1.0（含）之间的范围。这使得所有绘图原语独立于分辨率、显示设备和介质。


    #### 坐标点（Coordinate Points）


    Cocoa 中的坐标是连续坐标系中的抽象点。将坐标网格视为平面上的无限细线。大多数情况下，坐标与填充线条之间空间的像素是一一对应的（参见本节后面的图 20-11
    和 20-12）。


    从坐标的角度思考有助于避免“端点焦虑症”——即由绘图坐标与实际将绘制的像素之间的差异引起的焦虑。Cocoa 绘图始终发生在逻辑坐标之间。一条从坐标 0.0
    到 10.0 的线将绘制一条恰好 10 个坐标空间长的线。填充一个 10×10 的矩形将填充恰好 100 个坐标单位的像素。很少有例外。一个值得注意的例外是贝塞尔曲线（Bezier
    lines），它们可能具有非正方形的线端帽，这可能导致其绘制超出线的终点。


    所有绘图都是抗锯齿的，因此绘图很容易部分影响像素。


    #### 坐标系（Coordinate System）


    Cocoa 的自然坐标系是笛卡尔坐标系，它将 X，Y 原点放置在视图的左下角，如图 20-10 所示。


    **图 20-10.** Java 和原生 Cocoa 坐标系


    这是 Cocoa 的自然坐标系，但并非唯一可用的坐标系。`NSView` 定义了一个只读的 `flipped` 属性，图形系统会查询该属性。如果 `NSView`
    子类在收到 `-isFlipped` 消息时返回 `YES`，Cocoa 将“翻转”视图的 Y 轴，创建一个与 Java 相同的坐标系。基础的 `NSView`
    类、绘制图像的视图类以及作为容器的视图（标签视图、分割视图、滚动视图）都使用自然的笛卡尔坐标系。内容“从上到下流动”的视图对象（表格、大纲、列表、浏览器和文本视图）使用翻转的坐标系。在创建您自己的
    `NSView` 子类时，您可以自由地重写 `isFlipped`，并选择最适合您内容的坐标系。`flipped` 属性被认为是视图的不可变属性；自发地更改它可能会导致不可预测的结果。


    **注意：** 翻转坐标系会改变其子视图的框架矩形（frame rectangles）的含义。在处理框架矩形时，您的代码可能需要考虑父视图的坐标系是否被翻转。


    除了翻转坐标系之外，`NSView` 的框架或内容可以被任意旋转和重新定位。通过设置 `frameRotation` 属性来旋转视图在其父视图中的位置，但不会改变视图内容的本地坐标系。设置
    `boundsRotation` 属性会更改其内容的方向，但不会改变其在父视图中的位置。将 `boundsOrigin` 属性设置为 `(0,0)` 以外的值会移动视图在绘图时使用的坐标系。


    `NSView` 提供了一系列方法用于在不同坐标系之间进行转换。主要的方法是 `-[NSView convertPoint:toView:]` 和 `-[NSView
    convertPoint:fromView:]`。这些方法接受视图本地坐标系中或另一个视图坐标系中的坐标，并将其转换为另一个坐标系中的坐标。另一个视图可以是窗口视图层次结构中的任何视图。如果视图对象参数为
    `nil`，则它会转换为窗口的基本坐标系或从窗口的基本坐标系进行转换。还有一些方法可以在具有任意原点的坐标系之间转换坐标，以及一组转换矩形和大小结构的正交方法。


    **提示：** 如果您需要在窗口之间转换坐标，首先将点转换为窗口的基本坐标系，然后使用 `-[NSWindow convertBaseToScreen:]`
    方法将其转换为全局屏幕坐标。全局屏幕坐标可以使用 `-[NSWindow convertScreenToBase:]` 转换为本地窗口坐标，然后可以将其转换为任何子视图的本地坐标。


    与 Java 一样，Cocoa 在逻辑坐标和物理屏幕像素之间保持区分。大多数情况下，可以忽略这种区别，因为坐标空间中的一个单位通常对应于屏幕上的一个像素。然而，不断变化的屏幕分辨率、辅助技术和手持设备正促使开发者认真对待与分辨率无关的绘图。一旦您熟悉了基本的绘图工具和技术，我建议您阅读《分辨率无关性指南》（Resolution
    Independence Guidelines）。


    #### 笔的方向（Pen Orientation）


    Swing 和 Cocoa 中的线都是使用一个虚拟的笔绘制的，该笔通过将笔的形状从一组坐标“拖”到另一组坐标来更改像素。在 Java 中，笔在坐标的右下方延伸。在
    Cocoa 中，笔是无限细的，并且以逻辑坐标定义的线为中心。图 20-11 中显示的线是从坐标 (0，0) 到 (0，5) 使用 3 像素宽的笔绘制的（在
    Java 中则是 3×3 像素的笔）。'
  raw: 'NSView does not use layout managers. Instead, each NSView object has a set
    of resizing flags that control how its subviews are repositioned. These flags
    are easily configured in Interface Builder. You can disable this by setting the
    autoresizesSubviews property to NO. You can customize autoresizing in one of three
    ways: override the superview’s -resizeSubviewsWithOldSize: to redefine how its
    subviews are resized, override the subview’s -resizeWithOldSuperviewSize: to redefine
    how it resizes itself, or set the postsBoundsChangedNotifications property to
    YES and observe the NSViewBoundsDidChangeNotification notification. Also see the
    section “Animation” later in this chapter. There are also a few view classes that
    accomplish nearly the same effect as using a layout manager; NSMatrix provides
    essentially the same functionality as java.awt.GridLayout.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    NSView defines a tag property—useful for identifying individual subviews—but the
    property is immutable and always returns 0 in the base class. NSControl and some
    other subclasses override tag so that it’s a mutable property. If you want to
    create a custom subclass of NSView and assign it a tag, you must override the
    tag property, make it mutable, and provide a place to store the value.


    NSTextField is a multi-purpose class that is used to display most text in a window.
    It can be configured to display immutable text (a label), display and edit a single
    line of text (text field), or display and edit multiline text (text area). It
    implements a rich set of properties that determine how the text is displayed,
    aligned, scrolled, and wrapped.


    ■Tip When creating your own NSView subclass, use the Objective-C NSView subclass
    source file template in Xcode. It creates a subclass with stub implementations
    of the commonly overridden NSView methods.


    Now that you understand the basic organization of the view classes, you’ll want
    to start populating views with subviews, and possibly even create your own custom
    view classes. To do that, you need to understand the Cocoa drawing environment
    and how a custom NSView objects works, which are described in the next few sections.


    View Geometry


    Drawing geometry is a little different in Cocoa than it is in Swing. Cocoa’s natural
    coordinate system is inverted from the one used in Java, but can optionally be
    flipped so that it’s the same. Pen position and drawing bounds are also different.


    In Cocoa, all graphic values are floating-point numbers. This includes coordinates,
    sizes, widths, and color values. Values like red or transparency are typically
    expressed as a range between 0.0


    and 1.0, inclusive. This keeps all of the drawing primitives independent of resolution,
    display devices, and media.


    Coordinate Points


    Coordinates in Cocoa are abstract points in a continuous coordinate system. Think
    of the coordinate grid as infinitely thin lines on a plane. Most of the time,
    coordinates are mapped 1:1 to pixels that fill the space between the lines (refer
    to Figures 20-11 and 20-12, later in this section).


    Thinking in coordinates helps avoid “enditus”—that anxiety induced by the difference
    between the drawing coordinates and the pixels that will actually be drawn. Cocoa
    drawing always occurs between the logical coordinates. A line from coordinate
    0.0 to 10.0 will draw a line exactly 10 coordinate spaces long. Filling a 1010
    rectangle fills exactly 100 coordinate units’ worth of pixels. There are few exceptions
    to this. One notable exception is Bezier lines that can have non-square line end
    caps, which can cause it to draw beyond the end point of the line.


    All drawing is anti-aliased, so it’s easy for drawing to partially affect pixels.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-389_1.png)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    Coordinate System


    Cocoa’s natural coordinate system is Cartesian, which places the X,Y origin in
    the lower left-hand corner of view, as shown in Figure 20-10.


    ***Figure 20-10.** Java and native Cocoa coordinate systems* This is Cocoa’s natural
    coordinate system, but it’s not the only one available. NSView defines a readonly
    flipped property that’s queried by the graphics system. If an NSView subclass
    returns YES


    when sent -isFlipped, Cocoa will “flip” the view’s Y-axis, creating a coordinate
    system identical to Java’s. The base NSView class, view classes that draw images,
    and views that are containers (tab view, split view, scroll view) all use natural,
    Cartesian, coordinates. View objects with content that “flows”


    from the top down (table, outline, list, browser, and text views) use flipped
    coordinate systems. When creating your own NSView subclass you’re free to override
    isFlipped and choose the coordinate system that works most naturally with your
    content. The flipped property is assumed to be an immutable property of the view;
    changing it spontaneously could have unpredictable results.


    ■Caution A flipped coordinate system changes the meaning of the frame rectangles
    for its subviews. When working with frame rectangles, your code may have to consider
    if the coordinate system of the superview is flipped.


    In addition to flipping the coordinate system, an NSView’s frame or content can
    be arbitrarily rotated and repositioned. Rotating the frame by setting the frameRotation
    property rotates the view in its superview, but does not change the local coordinate
    system of the view’s content. Setting the boundsRotation property changes the
    orientation of its content, but doesn’t change its location in the superview.
    Setting the boundsOrigin property to something other than (0,0) shifts the coordinate
    system used by the view when drawing.


    NSView provides a raft of methods to convert between coordinate systems. The principal
    ones are -[NSView convertPoint:toView:] and -[NSView convertPoint:fromView:].
    These take a coordinate in either the view’s local coordinate system or the coordinate
    system of another view and convert it to the other. The other view can be any
    view within the window’s view hierarchy. If the view object parameter is nil,
    it converts to or from the window’s base coordinate system. There are also methods
    to convert coordinates between coordinate systems with arbitrary origins and an
    orthogonal set of methods that convert rectangle and size structures.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-390_1.png)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    ■Tip If you need to convert coordinates between windows, first convert the point
    to the window’s base coordinate system, and then use the -[NSWindow convertBaseToScreen:]
    method to convert that to global screen coordinates. Global screen coordinates
    can be converted to local window coordinates with -[NSWindow convertScreenToBase:],
    which can then be converted to the local coordinates of any subview.


    Like Java, Cocoa maintains a distinction between logical coordinates and physical
    screen pixels.


    Most of the time this distinction can be ignored, as a unit in the coordinate
    space normally corresponds to a single pixel on the screen. However, ever-changing
    screen resolutions, assistive technologies, and hand-held devices are driving
    developers to take resolution-independent drawing seriously. Once you’re comfortable
    with the basic drawing tools and techniques, I encourage you to read the Resolution
    Independence Guidelines.3


    Pen Orientation


    Lines in both Swing and Cocoa are drawn using an imaginary pen that changes pixels
    by “dragging” the pen shape from one set of coordinates to another. In Java, the
    pen extends down and to the right of coordinates. In Cocoa, the pen is infinitely
    thin and is centered over the line defined by the logical coordinates. The line
    shown in Figure 20-11 is drawn from coordinates (0,0) to (0,5) with a 3-pixel
    pen (a 33 pixel pen in Java).'
