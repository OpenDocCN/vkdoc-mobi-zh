    # TicTacToe 应用与撤销管理


    `TicTacToe` 应用使用了`Undo`管理器。为你的应用添加基本的撤销功能极为简单：


    1. 当文档发生更改时，获取该文档的撤销管理器，并“推入”以下三元组：一个目标对象、一个 Objective-C 消息标识符，以及一个包含先前值的对象。如果你正在实现一个绘图程序，调整形状大小可能会推入一个`-setShapeSize:`消息以及该形状的先前尺寸。

    2. 礼貌的做法是，为推入的操作命名。再次以绘图程序为例，将操作命名为“调整形状大小”，会在“编辑”菜单中向用户显示“撤销调整形状大小”。这有助于用户理解将要撤销的操作内容。

    3. 当用户选择`撤销`命令时，撤销管理器会获取推入栈中的最后一个操作，并将带有值的消息发送给该对象。在此示例中，绘图对象将收到一个包含其旧尺寸的`-setShapeSize:`消息。

    4. 撤销操作处理程序还应将（当前的）先前尺寸作为“重做”操作推入。推入操作到撤销栈的消息完全相同——当撤销一个操作时，撤销管理器会切换到一个临时模式，将操作推入到一个“重做”栈。这使得你的单个`-setShapeSize:`方法能够同时作为“执行”、“撤销”和“重做”方法。


    `TicTacToe`的数据模型极为简单，因此它仅在每次移动后将文档（游戏和消息）的整个状态推入撤销栈。更复杂的数据模型会推入特定的更改，但原理是相同的。


    为了简化撤销和打开/保存命令，`TTTDocument`实现了一个`contents`属性，该属性将整个文档状态作为一个不可变对象返回。


    实现撤销有一个隐藏的优势：撤销管理器还会为你维护文档的`isDocumentEdited`属性。这能告诉文档控制器何时文档包含未保存的更改。如果不使用撤销管理器，则必须自行管理`isDocumentEdited`属性。


    ## 资源


    资源是复制到应用程序包中的数据文件。框架定义了多种资源文件，例如 NIB 文档、托管对象模型文件以及可执行文件。你可以随意添加任何所需的其他文件。通常这些是图像、声音和帮助文件，但并无限制。程序可以包含框架，甚至另一个应用程序，作为其资源的一部分。


    你可以使用`NSBundle`类获取资源。像`NSImage`这样的类通常提供便捷方法，例如`+[NSImage imageNamed:]`，可以定位资源文件并将其加载到对象中。


    ### 本地化资源


    应用程序包中的几乎任何资源都可以按语言组织。这被称为本地化。文件的本地化版本存储在一个变体子文件夹中。`NSBundle`会首先在变体文件夹中查找用户偏好的语言。如果找不到合适的文件（或变体），它将使用不在任何变体中的文件。这允许你为任何资源创建特定于语言的替代版本。这包括
    NIB 文档、图像、声音、向用户显示的字符串列表等。


    在 Xcode 中，资源的本地化版本显示为主文档的子文档。要创建本地化版本，请打开文件的“信息”窗口，然后选择“添加本地化”。每个本地化都是一个完全独立的文件，需要你自行维护。


    ## 总结


    本章涵盖了大量内容。模型-视图-控制器设计模式贯穿于 Cocoa 框架之中。它影响着应用程序的许多不同方面，并将用户界面、业务逻辑和数据组织结合在一起。它涉及大量类，并使用了迄今为止讨论过的几乎所有通信技术。


    理解并拥抱 MVC 是理解 Cocoa 应用程序的关键一步。你还了解了关键的开发工具，例如 Interface Builder，它利用许多 Objective-C
    技术，几乎无需代码即可创建复杂的用户界面。


    ***


    # 懒加载模式


    懒加载模式体现了数据交付的即时加载理念。它将值或数据结构的构建延迟到真正需要该数据的时候。懒加载是 Java 和 Objective-C 中一种流行的设计模式。Objective-C
    通过实现其自身的类结构懒加载增加了另一个层次，你可以将其集成到自己的类中。


    ## 实现该模式


    以下是实现懒加载模式的方法：


    1. 创建一个私有实例变量或私有静态变量，该变量最终将包含数据，但初始化为一个占位值（通常是`nil`）。

    2. 将该变量包装成一个提供公共 getter 方法的属性。

    3. 在 getter 方法中，测试该变量是否为占位值。如果尚未初始化，则构建它并保存结果。将新构建的或先前构建的数据返回给调用者。


    懒加载通常适用于以下情况：

    - 创建或计算数据所需的内存或资源过于庞大，可以推迟。

    - 有很大可能永远不需要这些数据。

    - 实例化对象时，数据的前置条件不存在或不可用。


    延迟计算某个值，或组装一个大型或复杂的数据结构，可以节省内存和 CPU 资源，直到实际需要数据时再使用。在某些情况下，数据可能永远不需要，从而显著提高性能。通过将操作推迟到稍后时间，可以提升感知性能，使应用程序能够立即更新显示或响应用户事件，而更复杂、耗时的工作则在之后完成。典型的例子是照片浏览应用程序，它立即向用户显示占位图或缩略图，而实际图像则在后台加载。用户会感觉应用程序运行得更快，因为它的响应性更好，即使加载和显示最终图像的实际时间可能更慢。


    一个能够快速创建对象且内存需求极小的对象构造器称为轻量级构造器。即使对象本身是重量级的，其构造器也可以是轻量级的。使用上面的例子，图像视图对象可以几乎瞬间初始化，只需图像的尺寸和可以获取图像数据的
    URL。构造器以及更新窗口或布局多页文档所需的属性是轻量级的，并且立即可用——即使实际图像需要数兆字节的内存和几秒钟才能获取。


    ### 全局变量的懒加载


    懒加载通常应用于全局变量。Java 相对于 Objective-C 的一个优势是它能够为静态变量声明对象初始化器。Java 运行时在类加载时评估初始化语句。


    ```

    public final static String[] ColorNames = new String[] { "White", "Black" };

    ```


    Objective-C 中真正的全局变量是 C 静态变量。C 静态变量只能使用常量或静态地址进行初始化，并且此初始化发生在 Objective-C 运行时启动之前。要达到相同的效果，需要在
    Objective-C 运行时启动后以某种形式进行自动初始化。

