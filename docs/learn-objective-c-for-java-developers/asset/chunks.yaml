    \ Builder`识别出一个动作，你可以像设置输出口连接一样设置它。选择发送动作的对象，然后将其\"发送的动作\"连接拖拽到将要接收该动作的对象，如图20-7所示。将动作连接拖拽到接收者后，`Interface\
    \ Builder`会弹出一个动作完成面板，你可以在其中选择要发送的消息来完成连接。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![图20-7](index-381_1.jpg)\n\n**图20-7.** 在`Interface Builder`中连接动作\n\n在`Interface\
    \ Builder`中建立动作连接会同时设置动作（消息标识符）和目标接收者（对象指针）。`First Responder`目标是一个特殊的占位对象，它设置动作消息和`nil`目标。实际目标将在运行时动态确定，如后续响应者链部分所述。\n\
    \n## 绑定\n\n使用\"绑定\"面板为对象设置绑定。在前面的绑定章节中，我描述了将\"重置\"按钮的`enabled`属性绑定到游戏对象的`started`属性。\n\
    \n图20-8展示了如何在`Interface Builder`中设置该绑定。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![图20-8](index-382_1.jpg)\n\n**图20-8.** 在`Interface Builder`中设置绑定\n\n要设置绑定，选择要绑定的对象并打开\"\
    绑定\"面板。在图20-8中，选择了\"重置\"按钮的可视化表示。展开要绑定的属性，然后选择要绑定到的对象和键路径（属性名）。在此示例中，按钮的`enabled`属性绑定到NIB拥有者的`game`属性的`started`属性。由于这是文档的NIB文件，NIB拥有者是`TTTDocument`对象——拥有者对象将在下一节中解释。\n\
    \n绑定中有许多设置，其中很多将根据属性类型和绑定值的类型而变化。最受关注的设置如下：\n\n*   **要绑定到的对象**：这是包含要绑定到的属性的对象。\n\
    *   **模型键路径**：要绑定到的属性的键值路径。这可以是相对于绑定对象的任何KVC路径。要绑定到对象本身，请使用路径`self`。\n*   **控制器键**：如果绑定到`NSController`对象，模型键路径分为两部分。控制器键描述控制器的属性，模型键路径随后指定由控制器键描述的对象的属性。例如，使用控制器键`selection`和模型键路径`name`进行绑定，会将属性绑定到控制器集合中当前选中对象的`name`——相当于路径`selection.name`。以下是一些常见的`NSController`属性：\n\
    \n    *   `content` 绑定到控制器封装的整个内容。这可能是一个对象或整个集合。\n    *   `arrangedContent` 绑定到由控制器排序和过滤后的内容。在表格或其他排序列表中显示内容时绑定到此属性。\n\
    \    *   `selection` 是控制器当前选中的对象。\n    *   `selectedObjects` 是控制器当前选中的对象集合。对允许同时选择多个对象的控制器使用此绑定。\n\
    \    *   `isEditable`、`canAdd`和`canRemove`是控制器提供的众多信息属性中的一部分。例如，你可以将\"添加记录\"按钮的`enabled`属性绑定到控制器的`canAdd`属性。仅当控制器允许添加新对象时，该按钮才会被启用。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)"
  raw: 'An action always receives, as its sole parameter, a pointer to the object
    that sent the message.


    The IBAction keyword is synonymous with void, but is used by Interface Builder
    to automatically recognize action methods. Once Interface Builder knows about
    an action, you can set it almost exactly as you would an outlet connection. Select
    the object that sends the action, then drag its Sent Actions connection to the
    object that will receive the action, as shown in Figure 20-7\. Once you drag the
    action connection to the recipient, Interface Builder will pop up an action completion
    panel where you complete the connection by choosing which message to send.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-381_1.jpg)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    ***Figure 20-7.** Connecting an action in Interface Builder* Making an action
    connection in Interface Builder sets both the action (message identifier) and
    the target recipient (object pointer). The First Responder target is a special
    placeholder object that sets an action message and a nil target. The actual target
    will be determined dynamically, as described later in the Responder Chain section.


    Bindings


    Use the Bindings palette to set the binding for your objects. In the earlier section
    on bindings, I described binding the enabled property of the Reset button to the
    started property of the game object.


    Figure 20-8 shows how that binding is set in Interface Builder.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-382_1.jpg)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    ***Figure 20-8.** Setting a binding in Interface Builder* To set a binding, select
    the object to bind and open the Bindings palette. In Figure 20-8, the visual representation
    of the Reset button is selected. Expand the property to bind, and then choose
    the object and key path (property name) to bind it to. In this example, the enabled
    property of the button is bound to the started property of the game property of
    the NIB’s owner. Since this is the document’s NIB


    file, the NIB’s owner is the TTTDocument object—owner objects are explained in
    the next section.


    There are lots of settings in a binding, many of which will vary depending on
    the type of property and the type of value being bound. The settings of most interest
    are as follows: The object to bind to: This is the object containing the property
    you want to bind to.


    Model Key Path: The key-value path of the property to bind to. This can be any
    KVC path relative to the bound object. To bind to the object itself, use the path
    self.


    Controller Key: If you bind to an NSController object, the model key path is in
    two parts. The controller key describes the property of the controller, and the
    model key path then specifies the property of the object described by the controller
    key. For example, binding with a controller key of selection and a model key path
    of name would bind the property to the name of the currently selected object in
    the controller’s collection—equivalent to a path of selection.name. Here are some
    common NSController properties:


    • content binds to whole content encapsulated by the controller. This might be
    a single object or an entire collection.


    • arrangedContent binds to the content, sorted and filtered by the controller.
    Bind to this property when displaying contents in a table or other sorted list.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    • selection is the object currently selected by the controller.


    • selectedObjects is the collection of objects currently selected by the controller.
    Use this binding with controllers that allow more than one object to be selected
    at a time.


    • isEditable, canAdd, and canRemove are a few of the many informational properties
    provided by controllers. For example, you would bind the enabled property of an
    Add Record button to the canAdd property of the controller. The button will be
    enabled only when the controller allows new objects to be added.'
