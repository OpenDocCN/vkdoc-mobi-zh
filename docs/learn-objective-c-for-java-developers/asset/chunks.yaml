    {\n    CFStringRef cfString = CFUUIDCreateString(kCFAllocatorDefault,uuid);\n\
    \    NSString *objcString = (NSString*)CFMakeCollectable(cfString);\n    return\
    \ objcString;\n}\n\n@end\n```\n\n标准的 Objective-C 类框架不包含封装通用唯一标识符（UUID）的类。然而，Core\
    \ Foundation 框架拥有非常实用的 `CFUUIDRef` 类型以及一组用于创建和编码 UUID 的函数。清单 25-2 中的 `Unique`\
    \ 类存储了一个 `CFUUIDRef` 值（等同于一个对象指针）作为一个 Core Foundation 类型，就像对待任何其他 C 指针一样。`-init`\
    \ 方法创建一个通用唯一 ID 类型并存储一个指向它的引用。\n\nCore Foundation 函数 `CFUUIDCreateString(...)`\
    \ 根据一个 `CFUUIDRef` 创建 UUID 的文本表示，并将其作为一个新的 `CFStringRef` 返回。查看表 25-2，`CFStringRef`\
    \ 和 `NSString` 是无缝桥接的。因此，对 Core Foundation 字符串类型的引用可以被当作一个 `NSString` 对象指针来处理，并返回给调用者。\n\
    \n类似地，`-initWithCoder:` 方法首先从序列化数据流中解码一个 `NSString` 对象。它将 `NSString` 对象指针传递给 `CFUUIDCreateFromString(...)`，就好像它是一个\
    \ `CFStringRef` 一样。`CFUUIDCreateFromString(...)` 函数使用这个 `CFStringRef` 来重建 UUID\
    \ 不透明类型。\n\n无缝桥接意味着你可以无缝地将许多常见的 Core Foundation 类型当作 Objective-C 对象来使用，反之亦然。Core\
    \ Foundation 类型与其对应的 Objective-C 类之间唯一显著的区别在于内存管理。这将在下一节讨论。\n\n**提示** 还有其他一些你可能感兴趣的\
    \ Objective-C 桥接。例如，存在从 Objective-C 到 Ruby 和 Python 编程语言的桥接。Apple 曾开发过一个 Objective-C\
    \ 到 Java 的桥接，但后来已被弃用。\n\n表 25-2 中列出的 Objective-C 类是唯一与 Core Foundation 类型有无缝桥接的。例如，`NSRunLoop`\
    \ 与 `CFRunLoopRef` *不* 可互换。要在 `NSRunLoop` 上使用 Core Foundation 函数，请向该对象发送 `-getCFRunLoop`\
    \ 消息，它将返回其底层的 `CFRunLoopRef`。\n\n## C 内存管理\n\n第 24 章描述了 C 内存管理，或者说是其缺乏。Core Foundation\
    \ 的内存管理要么与 Objective-C 使用的内存管理协同工作，要么在其上分层。当使用 Core Foundation 类型时，你必须采用 Core\
    \ Foundation 内存管理模式，或者将引用过渡到 Objective-C 所使用的内存管理方案。\n\nCore Foundation 类型使用简单的引用计数。如果你跳过了第\
    \ 24 章，你可能想回顾一下，以便理解基本原理。以下是关于 Core Foundation 内存管理你需要了解的关键概念：\n\n*   Core Foundation\
    \ 使用引用计数。\n*   每个 Core Foundation 类型都是使用一个*分配器*分配的。相当于 `+alloc` 的分配器是 `kCFAllocatorDefault`\
    \ 或 `NULL`。\n*   Core Foundation 函数 `CFRetain(o)` 和 `CFRelease(o)` 分别等同于 `[o retain]`\
    \ 和 `[o release]`（在托管内存环境中）。\n*   Core Foundation 不使用自动释放池。函数返回的 refs 要么是新的（刚刚创建，隐式由调用者拥有），要么是拥有的（至少被其他所有者\
    \ retain 一次）。\n\n### 使用 Core Foundation 内存管理模式\n\n除非你需要保留或返回一个对 Core Foundation\
    \ 类型的引用，否则最简单的方法是遵循 Core Foundation 内存管理模式。Core Foundation 不使用自动释放池，因此所有返回的 refs\
    \ 要么是新的，要么是拥有的。要使用 Core Foundation 内存管理，你的代码应该执行以下操作：\n\n*   像在托管内存环境中对待一个新对象一样使用一个新\
    \ ref。\n*   在需要的时间内使用该 ref。\n*   使用完毕后调用 `CFRelease(ref)`。\n\n将拥有的引用视为类似托管内存环境中的自动释放对象。\n\
    \n*   拥有的 refs 通常可以在当前方法或函数返回前自由使用。\n*   或者，调用 `CFRetain(ref)` 来 retain 该类型，在需要的时间内使用它，然后调用\
    \ `CFRelease(ref)` 来 release 它。\n\n关于 Core Foundation 内存管理约定和规则的完整描述可以在 *Memory\
    \ Management Programming Guide for Core Foundation* 中找到。\n\n### 使用垃圾回收的 Core Foundation\n"
- fmt: "# 使用垃圾回收的内存管理\n\n即使在 Objective-C 中使用垃圾回收，Core Foundation 依然采用引用计数。垃圾收集器能够感知\
    \ Core Foundation 的引用计数，并将其整合到收集逻辑中。具体来说，只有当某个 Core Foundation 类型没有 `__strong`\
    \ 引用**并且**其 Core Foundation 引用计数为 0 时，它才会被销毁（回收）。这使得 Core Foundation 和 Objective-C\
    \ 垃圾回收能够共存，但在将 `CFTypeRef` 当作 Objective-C 对象处理时仍需注意。与 Objective-C 不同，使用垃圾回收时不能简单地忽略引用计数。\n\
    \n当将 Core Foundation 类型存储在 Objective-C 对象指针（或任何 `__strong` 或 `__weak` 指针类型）中时，需要通过\
    \ `CFMakeCollectable(CFTypeRef)` 函数将其过渡到垃圾回收，如清单 25-2 所示。该函数执行一次 `CFRelease()`——将其引用计数减至\
    \ 0，但不会销毁该类型——并返回一个指向它的 `__strong` 引用。该类型/对象现在由垃圾收集器负责。\n\n2 Apple Inc., *Memory\
    \ Management Programming Guide for Core Foundation*, [http://developer.apple.com/documentation/CoreFoundation/Conceptual/CFMemoryMgmt/](http://developer.apple.com/documentation/CoreFoundation/Conceptual/CFMemoryMgmt/),\
    \ 2007.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 25 章 ■ 混合\
    \ C 与 Objective-C\n\n**注意** 垃圾回收只能与使用标准或默认分配器函数（`kCFAllocatorDefault` 或 `NULL`）分配的\
    \ Core Foundation 类型一起使用。幸运的是，对于您处理的大多数 Core Foundation 类型来说，这都适用。使用其他分配器（特别是\
    \ `kCFAllocatorMalloc`）分配的 Core Foundation 类型将在另一个内存区域中分配，并且**不会**被垃圾收集器扫描。任何此类类型都必须使用\
    \ Core Foundation 内存管理进行管理。\n\n尽管 `CFRetain()` 和 `CFRelease()` 在功能上与 `-[NSObject\
    \ retain]` 和 `-[NSObject release]` 相同，但在垃圾回收环境中，您不能使用 Objective-C 消息来保留和释放 Core\
    \ Foundation 类型。请记住，当垃圾收集器启动时，Objective-C 消息 `-retain` 和 `-release` 会被禁用。因此，虽然\
    \ `CFRetain()` 和 `CFRelease()` 继续有效，但 `-retain` 和 `-release` 不做任何操作。\n\n## 在托管内存中使用\
    \ Core Foundation\n\n在托管内存环境中，Core Foundation 和 Objective-C 共享相同的引用计数机制。在这种环境中，`CFRetain()`\
    \ 和 `CFRelease()` 等同于 `-[NSObject retain]` 和 `-[NSObject release]`。\n\n处理已保留的\
    \ Core Foundation 类型的最简单方法是立即将其添加到自动释放池中。如果清单 25-2 中的 `-uuid` 方法是为托管内存环境编写的，它将类似于清单\
    \ 25-3 中的代码。\n\n***清单 25-3.** 返回自动释放的 Core Foundation 引用*\n\n```\n- (NSString*)uuid\n\
    {\n    CFStringRef cfString = CFUUIDCreateString(kCFAllocatorDefault, uuid);\n\
    \    return [(NSString*)cfString autorelease];\n}\n```\n\n清单 25-3 中由 `-uuid` 返回的对象是自动释放的，其行为与任何其他自动释放的字符串对象相同。第\
    \ 24 章中描述的大多数托管内存模式同样适用于 Core Foundation 类型。\n\n## 总结\n\n从 Objective-C 调用 C 函数非常简单，让您的代码可以直接访问基于\
    \ C 的解决方案。免费桥接使得处理 Core Foundation 类型变得更加容易，允许您像处理 Objective-C 对象一样与许多 Core Foundation\
    \ 类型交互。最常见的问题是匹配或调整两种语言的内存管理风格。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n---\n\n# 第 26 章 ■ 运行时\n\nObjective-C 应用程序的运行时环境具有一些您应该了解的属性。这些包括构成运行中应用程序的 Mac\
    \ OS X 进程的信息、其环境变量、与其父进程的连接等。其中一些继承自操作系统，而另一些则是 Objective-C 和 Cocoa 框架的特性。许多内容已在其他章节中描述过。我们将在此与运行时环境的其他重要方面一起简要回顾它们。\n\
    \n## 进程\n\n在 Mac OS X 中，每个 Objective-C 程序都作为一个进程执行。从技术上讲，Java 字节码在抽象虚拟机中执行；但大多数虚拟机在进程中运行，并具有几乎相同的属性。每个进程包括：\n\
    \n- 一个内存地址空间\n- 一个或多个执行线程\n- 一组键/值对形式的环境变量\n- 一个命令行参数数组\n\n在 Java 中，虚拟机可以访问进程的本地地址空间，但您（程序员）不能。在\
    \ Objective-C 中，您可以直接访问分配给进程的逻辑地址空间。硬件在物理上禁止直接访问进程本地地址空间之外的内存地址。任何访问尝试都会导致内存地址违规，这通常会导致进程终止。访问进程外部的任何资源都需要通过向内核发送消息来实现。您几乎不会直接这样做，但您应该知道，所有与硬件或操作系统交互的\
    \ API 最终都会向内核发送消息。\n\n在 Mac OS X 中，进程与主线程是同义词。只要主线程存在，进程就存在，并在主线程终止时终止——或者使用 `exit()`\
    \ 等函数有意终止进程。您可以创建或销毁其他线程，如第 15 章所述。\n\n并非所有 Objective-C 代码都在其自己的进程中运行。Objective-C\
    \ 还可以用于开发框架和插件。这些是可以由其他应用程序加载并在该应用程序环境中执行的代码和资源包。例如，您可以通过向操作系统提供 Spotlight 插件包来为文档提供自定义索引。该包包含在\
    \ Spotlight 搜索引擎想要索引您文档类型内容时执行的代码。您的 Spotlight 插件中的代码在元数据导入器进程中运行，而不是在您的应用程序中。\n\
    \n除了环境变量、命令行参数和进程属性之外，还有一些零散的进程级属性，例如当前工作目录。所有这些都将在以下部分中讨论。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第 26 章 ■ 运行时\n\n### 环境\n\n每个进程都继承其父进程（创建您的进程的进程）定义的环境。环境是一组键/值字符串对，允许设置和其他信息从一个进程传递到另一个进程。在\
    \ Java 中，您可以使用 `java.lang.System.getenv()` 或 `java.lang.System.getenv(String)`\
    \ 获取环境变量。在 Objective-C 中，向单例 `NSProcessInfo` 对象发送 `-environment` 消息，该对象通过 `[NSProcessInfo\
    \ processInfo]` 获取。\n\n### 命令行参数\n\n从命令行启动的 Java 进程包含一个命令行参数数组，该数组传递给其 `main(String[])`\
    \ 方法。Objective-C 程序托管在 C 应用程序中，该应用程序在调用 `main(int, char**)` 时启动。您可以在 `main(...)`\
    \ 中拦截和解释命令行参数，或者稍后通过向单例 `NSProcessInfo` 对象发送 `-arguments` 来引用它们。\n\n### 进程属性"
  raw: 'Even when using garbage collection in Objective-C, Core Foundation continues
    to use reference counting. The garbage collector is aware of Core Foundation reference
    counts and incorporates them into its collection logic. Specifically, a Core Foundation
    type is destroyed (collected) only when there are no __strong references to it
    *and* it has a Core Foundation reference count of 0\. This allows Core Foundation
    and Objective-C garbage collection to coexist peacefully, but does require some
    attention when treating CFTypeRefs like Objective-C objects. Unlike Objective-C,
    you can’t simply ignore reference counts when using garbage collection.


    When storing a Core Foundation type in an Objective-C object pointer (or any __strong
    or __weak pointer type), transition it to garbage collection by passing it through
    the CFMakeCollectable(CFTypeRef) function, as was shown in Listing 25-2\. This
    function performs a CFRelease()–decrementing its reference count to 0, but without
    destroying the type–and returns a __strong reference to it. The type/object now
    becomes the responsibility of the garbage collector.


    2 Apple Inc., *Memory Management Programming Guide for Core Foundation*, http://developer.apple.com/


    documentation/CoreFoundation/Conceptual/CFMemoryMgmt/, 2007.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 25 ■ MIXING C AND OBJECTIVE-C


    **Caution** Garbage collection can only be used with Core Foundation types allocated
    using the standard or default allocator function (kCFAllocatorDefault or NULL).
    Fortunately, this will be true for virtually all Core Foundation types you work
    with. Core Foundation types allocated using a different allocator, specifically
    kCFAllocatorMalloc, will be allocated in another memory zone and will *not* be
    scanned by the garbage collector. Any such types must be managed using Core Foundation
    memory management.


    Although CFRetain() and CFRelease() are functionally identical to -[NSObject retain]


    and -[NSObject release], you can’t use the Objective-C messages to retain and
    release Core Foundation types in a garbage collection environment. Remember that
    the Objective-C messages


    -retain and -release are disabled when the garbage collector is started. So while
    CFRetain() and CFRelease() continue to function, -retain and -release do nothing.


    Using Core Foundation with Managed Memory


    In a managed memory environment, Core Foundation and Objective-C share the same
    reference counting mechanism. In this environment, CFRetain() and CFRelease()
    are synonymous with


    -[NSObject retain] and -[NSObject release].


    The simplest way of dealing with a retained Core Foundation type is to immediately
    add it to the autorelease pool. If the -uuid method in Listing 25-2 were written
    for a managed memory environment, it would look something like the code in Listing
    25-3.


    ***Listing 25-3.** Returning an Autoreleased Core Foundation Reference*


    - (NSString*)uuid


    {


    CFStringRef cfString = CFUUIDCreateString(kCFAllocatorDefault,uuid); return [(NSString*)cfString
    autorelease];


    }


    The object returned by -uuid in Listing 25-3 is autoreleased and behaves like
    any other autoreleased string object. Most managed memory patterns described in
    Chapter 24 apply equally to Core Foundation types.


    Summary


    Invoking C functions from Objective-C is effortless, giving your code direct access
    to a universe of C-based solutions. Working with Core Foundation types is made
    easier by the toll-free bridge, allowing you to interact with many Core Foundation
    types as though they were Objective-C objects. The most common programming issue
    to deal with is matching, or rectifying, the memory management styles of the two
    languages.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 26**


    ■ ■ ■


    Runtim e


    The runtime environment of an Objective-C application has some traits that you
    should be aware of.


    These include the information about the Mac OS X process that comprises your running
    application, its environment variables, the connections with its parent process,
    and so on. Some are inherited from the operating system, while others are features
    of Objective-C and the Cocoa framework. Many have already been described in other
    chapters. We will briefly review them here along with other important aspects
    of the runtime environment.


    Process


    In Mac OS X, every Objective-C program executes as a process. Technically, Java
    bytecode executes in an abstract virtual machine; but most virtual machines run
    in a process and embody almost identical attributes. Every process includes


    • A memory address space


    • One or more executing threads


    • A set of environment variables in a map of key/value pairs


    • An array of command-line arguments


    In Java, the virtual machine has access to the process’s local address space,
    but you (the programmer) don’t. In Objective-C, you have direct access to the
    logical address space assigned to the process. The hardware physically prohibits
    direct access to memory addresses outside your process’s local address space.
    Any access attempt will result in a memory address violation, which usually results
    in the termination of your process. Access to any resources outside of your process
    is accomplished by sending messages to the kernel. You’ll almost never do this
    directly, but you should know that all APIs that interact with the hardware or
    operating system ultimately end up sending messages to the kernel.


    In Mac OS X, the process is synonymous with the main thread. The process exists
    as long as the main thread exists, and terminates when the main thread terminates—or
    the process is intentionally terminated using a function like exit(). You can
    create or destroy other threads, as described in Chapter 15.


    Not all Objective-C code will run in its own process. Objective-C can also be
    used to develop frameworks and plug-ins. These are bundles of code and resources
    that can be loaded by another application and execute within that application’s
    environment. For example, you can provide custom indexing of your documents by
    providing the operating system with a Spotlight Plug-In bundle. The bundle contains
    code that’s executed when the Spotlight search engine wants to index the contents
    of your document type. The code in your Spotlight Plug-In runs inside the metadata
    importer process, not your application.


    In addition to its environment variables, command-line arguments, and process
    attributes, there is also an odd collection of per-process properties, such as
    the current working directory. All of these are discussed in the following sections.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 26 ■ RUNTIME


    Environment


    Every process inherits the environment defined by its parent process (the process
    that created your process). An environment is a set of key/value string pairs
    that allow settings and other information to be passed from one process to another.
    In Java, you can obtain the environment variables using java.lang.System.getenv()
    or java.lang.System.getenv(String). In Objective-C, send the -environment message
    to the singleton NSProcessInfo object, obtained using [NSProcessInfo processInfo].


    Command-Line Arguments


    Java processes launched from the command line include an array of command-line
    arguments, which are passed to its main(String[]) method. Objective-C programs
    are hosted in a C application, which is started when main(int,char**) is invoked.
    You can intercept and interpret the command-line arguments in main(…), or refer
    to them later by sending -arguments to the singleton NSProcessInfo object.


    Process Attributes'
