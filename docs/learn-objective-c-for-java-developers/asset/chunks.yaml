  raw: 'First, add an instance of NSArrayController by dragging a new Array Controller
    object from the Library into the NIB document. You’ll find Array Controller in
    the Controllers group. Start by selecting the first, and only, Table Column inside
    the Table View object. Bind its value to the Array Controller with a controller
    key of arrangedObjects and a model key path of self. The self key-value path causes
    the view object to display the value of each object in the collection, rather
    than a property of each object.


    This is appropriate because the array contains simple string objects.


    Now the array controller needs to be connected to its data model object. Select
    the newly created Array Controller object in the MainMenu NIB document and set
    its Content Array binding to ScrapWordsController with a model key path of words.
    The key-value path words tells the controller that the words property of ScrapWordsController
    is the data source for the array.


    Finally, the ScrapWordsController will need to interact with the array controller
    object programmatically. To do that, it will need an object pointer (reference)
    to the instance of the array controller created by the NIB document. This is established
    using an outlet and a connection. An outlet is just an instance variable that
    points to another object. The IBOutlet type modifier, as shown in Listing 4-1,
    turns the object pointer property into a public outlet in Interface Builder. A
    connection creates a 67


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-92_1.jpg)


    CHAPTER 4 ■ CREATING AN XCODE PROJECT


    relationship in the NIB so that the instance variable will point to its connected
    object when the NIB


    document is loaded.


    Object pointers decorated with the IBOutlet keyword automatically appear as outlets
    in Interface Builder. The IBOutlet keyword can be placed before an instance variable
    or in a @property directive. Select the ScrapWordsController in the MainMenu NIB
    document and switch to the Connections Inspector. Interface Builder lists wordsController
    as an outlet of the object. To connect the outlet to the array controller object–i.e.,
    to set the instance variable to point to the address of the array controller object
    at runtime–drag the outlet’s connector to the Array Controller object and release
    the mouse button, as shown in Figure 4-11.


