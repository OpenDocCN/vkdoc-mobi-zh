    tables, there are far more convenience methods, so look for an array method before
    writing your own code to, say, exchange two elements in the collection.


    NSArray makes the distinction between two objects that are equal (-indexOfObject:)
    and two objects that are identical (-indexOfObjectIdenticalTo:). The latter compares
    object pointers for equality, while the former compares the object’s value for
    equality. See the “Collection Equality Contracts” section later in this chapter.


    A number of methods, like -removeObjectsAtIndexes:, operate on an arbitrary list
    of indexes defined by an NSIndexSet object—another collection class discussed
    later in the Unordered Collections section. Methods like -objectsAtIndexes: are
    particularly powerful; it will return a new NSArray object that’s an arbitrary
    subset of the receiver’s collection, chosen using the indexes in an NSIndexSet.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16 ■ COLLECTION PATTERNS


    **COCOA COLLECTION CLASS ORGANIZATION**


    Java collection classes are neatly organized into inheritance trees. The base
    Collection interface has List, Map, and Set sub-interfaces, which are embodied
    in AbstractCollection, AbstractList, AbstractMap, and AbstractSet classes that
    are eventually implemented as the concrete collection classes we use every day.


    Objective-C classes have almost no hierarchy. Most are direct subclasses of NSObject.
    The fact that they all implement a -count method is by convention, not formal
    design. Most of the time this makes little or no difference. Objective-C does
    lack methods like Java’s addAll(Collection) because it has no base class that
    encompasses all collection classes.


    One of the reasons for this is that many of the Objective-C collection classes
    are actually implemented in C.


    For example the Core Foundation CFArray type implements NSArray, and the two are
    interchangeable. See the


    “Toll-Free Bridge” section of Chapter 25 for more details.


    NSPointerArray


    NSPointerArray is a newer collection class. It has no immutable base class, so
    in that respect it is more like Java’s ArrayList class. What sets NSPointerArray
    and its siblings NSMapTable and NSHashSet apart from other collection classes
    is the ability to “program” the collections. The collection is initialized with
    a set of delegate functions that define its personality. NSPointerArray objects
    are constructed using an NSPointerFunctions object that contains a set of callback
    functions that will be used to manipulate the values in the collection. The callback
    functions are: hash, isEqual, size, description, acquire, and relinquish. When
    you add a value to the array, the value is passed to the acquire function. When
    the value is removed, it is processed through relinquish. When comparing values
    in the collection, the candidate values are passed to the isEqual function for
    comparison.


    ■Note You might be wondering why the function pointer set includes delegate functions
    that perform hash and comparisons when NSPointerArray provides no means for searching
    the collection. This is for consistency with the map and set collections. The
    latter classes use the same pointer function objects and do use the hash and comparison
    functions extensively.


    By employing a set of delegate functions, the collection can tailor itself to
    a wide variety of solutions. To make the new collection easy to use, the Cocoa
    framework includes predefined pointer function sets that can be selected by mixing
    pointer function option constants, some of which are listed in Table 16-5\. These
    predefined functions sets implement most of the collection behaviors that you’re
    ever likely to need. The two most common NSPointerArray personalities have convenience
    constructors:


    [NSPointerArray pointerArrayWithStrongObjects] creates a regular object array
    and [NSPointerArray pointerArrayWithWeakObjects] creates an object array that
    uses weak references.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16 ■ COLLECTION PATTERNS


    ***Table 16-5.** Common NSPointerFunctionsOptions*


    O ptio n Ide ntifier


    Des cr ipti on


    NSPointerFunctionsStrongMemory


    Values are pointers, stored using strong references. This


    is the default memory option if no memory option is


    specified.


    NSPointerFunctionsZeroingWeakMemory


    Values are pointers, stored using weak references.


    NSPointerFunctionsObjectPersonality


    Values are object pointers. Objects are compared using


    an -isEqual: message. The -description message is


    used to generate object descriptions. This is the default


    personality if no personality is specified.


    NSPointerFunctionsObjectPointerPersonality


    Values are object pointers. Objects are compared by


    testing their pointers for equality. The -description


    message is used for object descriptions.


    NSPointerFunctionsCStringPersonality


    Values are pointers to C strings. Values are compared


    using the strcmp() function, and descriptions are


    generated by converting the C string into an NSString


    object.


    NSPointerFunctionsIntegerPersonality


    Values are integers.


    NSPointerFunctionsCopyIn


    Values are copied when added to the collection. If the


    values are object pointers, they must conform to


    NSCopying.


    You can also create an NSPointerArray by combining one memory storage option,
    one personality option, and the optional “copy in” option from the list in Table
    16-5\. The code in Listing 16-3


    creates an NSPointerArray collection that makes copies of objects added to the
    collection, and keeps strong references to those copies.


    Listin g 16-3\. Custom NSPointerArray


    NSPointerArray *array = [NSPointerArray pointerArrayWithOptions: (NSPointerFunctionsObjectPersonality


    |NSPointerFunctionsStrongMemory


    |NSPointerFunctionsCopyIn) ];


    There are even more progressively esoteric options that allow NSPointerArray to
    store pointers to C structures, contain copies of whole C structures, use memory
    managed with C’s calloc() and free() functions, and so on. See the documentation
    for NSPointerFunctionsOptions for a complete list. For the ultimate control, you
    can create your own NSPointerFunctions objects if the predefined functions don’t
    meet your needs.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16 ■ COLLECTION PATTERNS


    Dictionary Collections


    NSDictionary, NSMutableDictionary, and NSMapTable organize unordered pairs of
    objects, equivalent to java.util.HashMap. Each pair consists of a key object and
    a value object. Values are addressed using objects equal to their keys. Keys in
    the collection are unique, but values can be duplicated. Specifically, Objective-C
    and Java dictionary classes have these common features:


    • Keys and values in the collection are object references.


    • Key objects should not change value.


    • Keys must adhere to the equality and hash contracts.


    • Keys are unique. Storing a new value for an existing key replaces the exiting
    key/value pair with the new one.'
  trans: "\n# `removeObjectsInRange`:\n\n`removeObjectsInArray`：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第 16 章 ■ 集合模式\n\n`set(int,Object)`\n\n`replaceObjectAtIndex:withObject:`\n\
