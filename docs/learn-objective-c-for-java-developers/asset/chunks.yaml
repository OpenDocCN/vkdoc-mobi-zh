    \n类簇具有一些重要的影响：\n- 可以在不更改创建对象代码的情况下实现类簇。\n- 类簇正是遵守 init 契约如此重要的原因。\n- 对类簇进行子类化通常很困难。\n\
    \n第一个特性正是类簇如此强大的原因：任何初始化方法都可以转变为类簇。这种更改对于创建对象的现有代码来说在很大程度上是透明的。这在不断演化的设计中极为有用。可以先定义一个简单的基类，之后再将其替换为类簇，而无需对现有代码进行全局更改。\n\
    \n类簇的一个副作用是，它可能使你很难（甚至不可能）创建类簇基类的自定义子类。基类的初始化方法通常是决定创建哪个类对象的地方。由于子类必须在初始化期间调用其超类的初始化方法，因此你的子类初始化方法存在风险：可能会被基类随意替换为不同的对象。设计为可被子类化的类簇通常会有一个指定的初始化方法供非簇子类使用，或者其编写方式使得在被子类调用时能够合理运行。如果你有一个想要子类化的类簇，请参阅该类文档中的“子类化注意事项”部分。\n\
    \n**注意** 一个常见的编程陷阱是：从基类簇的初始化方法中调用子类的初始化方法，而该子类初始化方法又递归地调用基类初始化方法。如果基类初始化方法盲目地创建一个新的子类对象，将导致无限递归循环。`Matrix`\
    \ 类通过让 `-initWithAllocatedArray:rows:columns:` 方法检查正在初始化的对象的类（即 `if ([self isMemberOfClass:[Matrix\
    \ class]]) …`）来避免此问题。仅当它是基类时，才会考虑将对象替换为子类。当子类调用基类初始化方法时，基类初始化方法会正常运行。另一种方法是策略性地组织子类初始化方法，使它们不会递归调用实现类簇的基类初始化方法。\n"
- fmt: "# Class Clusters and Singleton Pattern\n\n## Class Clusters\n\n`Class clusters`\
    \ also solve the mystery of why the `init` contract should be followed so carefully.\
    \ See the “Writing an `init` Method” section of Chapter 3. `Class clusters` reinforce\
    \ the maxim that your code should never assume that the object returned from an\
    \ initializer is the same one that was originally created.\n\n### Summary\n\n\
    Objective-C `class clusters` add a new dimension to the factory pattern. They\
    \ make it possible to implement object factories that are completely transparent\
    \ to the client. This means that subclassing must be approached with a bit more\
    \ caution; `class clusters` may make it difficult, or even impossible, for you\
    \ to define subclasses of some classes.\n\n---\n\n# CHAPTER 23 ■ Singleton Pattern\n\
    \n`Singletons` are classes with a single instance. They are usually objects that\
    \ provide an object-oriented interface to a single, often global, facility or\
    \ resource. A class that manages a cache of database objects would want to create\
    \ a single per-process instance of itself so that it could coordinate all of the\
    \ object caching for the entire application. A class that provides file management\
    \ methods could create a singleton object that all other classes would use to\
    \ interact with the file system. The latter could also be implemented by defining\
    \ a class that consists of nothing but class methods, but that pattern is unusual\
    \ in Objective-C.\n\nSingleton objects are typically created by an idempotent\
    \ class method or C function that’s responsible for creating and maintaining the\
    \ single instance of the class. This is essentially a specialized factory method,\
    \ described in Chapter 22. Like factory methods, singletons can be implemented\
    \ using class methods or a degenerate variation of a `class cluster`.\n\n## Implementing\
    \ Singletons\n\nThe following are examples of singleton objects in the Cocoa framework:\n\
    \n- `NSApplication`\n- `NSFileManager`\n- `NSDistributedNotificationCenter`\n\
    - `NSWorkspace`\n\nSingletons are sometimes created during startup, but are usually\
    \ provided through an idempotent method that returns the reference to the singleton,\
    \ creating it for the first time if necessary.\n\nIn the Cocoa framework, the\
    \ following class methods return the singletons for the classes listed above:\n\
    \n- `[NSApplication sharedApplication]`\n- `[NSFileManager defaultManager]`\n\
    - `[NSDistributedNotificationCenter defaultCenter]`\n- `[NSWorkspace sharedWorkspace]`\n\
    \nA typical implementation of the singleton pattern is shown in Listing 23-1.\n\
    \n### Listing 23-1. Singleton Pattern\n\n**Java**\n\n```java\npublic class CommandCenter\
    \ {\n    private static CommandCenter sharedCommandCenter;\n    public static\
    \ CommandCenter getCommandCenter() {\n        if (sharedCommandCenter == null)\
    \ {\n            sharedCommandCenter = new CommandCenter();\n        }\n     \
    \   return sharedCommandCenter;\n    }\n}\n```\n\n**Objective-C**\n\n```objc\n\
    @interface CommandCenter : NSObject\n+ (CommandCenter*)sharedCommandCenter;\n\
    @end\n\nstatic CommandCenter *SharedCommandCenter;\n\n@implementation CommandCenter\n\
    + (CommandCenter*)sharedCommandCenter {\n    if (SharedCommandCenter == nil) {\n\
    \        SharedCommandCenter = [CommandCenter new];\n    }\n    return SharedCommandCenter;\n\
    }\n@end\n```\n\nThe exact same pattern can be implemented in Java or Objective-C.\
    \ However, Objective-C presents two alternatives to the typical singleton design\
    \ pattern. The first is to use the class’s `+initialize` method, and the second\
    \ is a variation on `class clusters`. Both are explored in the next sections.\n\
    \n## Lazy Singletons\n\nMost singletons are lazy; they are spontaneously constructed\
    \ the first time they are requested. An alternative to implementing this yourself\
    \ is to exploit the lazy initialization of the class itself, as demonstrated in\
    \ Chapter 21. Basically, the singleton object is created the first time the class\
    \ receives a message by overriding its `+initialize` class method. A rewriting\
    \ of the `CommandCenter` class is shown in Listing 23-2.\n\n### Listing 23-2.\
    \ Lazy Singleton Pattern\n\n```objc\n@interface CommandCenter : NSObject\n```"
