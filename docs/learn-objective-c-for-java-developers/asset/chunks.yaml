    ## Chapter 12: Serialization


    ### Summary


    Objective-C archiving fills the role of Java serialization. Creating an archivable
    class requires a little more work up front, but follows the same basic pattern
    as it does in Java. It is not difficult to provide backward, and potentially forward,
    compatibility with archived data. Objective-C provides the added benefit of restricting
    the graph of encoded objects to just those relevant to the root object, and there
    is a flexible framework for substituting and simplifying objects during encoding
    and decoding.


    Objective-C serialization is, as you’ve now discovered, not the equivalent of
    Java serialization, but it does provide a simple and convenient means of encoding
    data using XML. You also learned the basics of making in-memory copies of objects.


    With a firm understanding of message dispatching and object archiving, you can
    now appreciate the simplicity of distributed objects, discussed in the next chapter,
    which combines these two features to great effect.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Chapter 13: Communicating Near and Far


    Communication is a very broad term. In an abstract sense, sending an Objective-C
    object a message is “communicating” with that object. At the other extreme, burning
    a file to a compact disc that’s later read by another program “communicates” data
    to that application. This chapter focuses on communication technologies that exchange
    data directly between objects via an independent agent or service.


    Within that scope, communications can be roughly divided into three domains: the
    exchange of messages between objects in the same process, the exchange of messages
    between objects in different processes, and the exchange of data over a network.
    This chapter will survey the common Objective-C technologies used for all three,
    although the details of some are covered in other chapters. The groups overlap
    somewhat. There are technologies that are used almost exclusively to exchange
    messages between objects running in the same process, but that can also be used
    to send messages to other processes, and vice versa. So take a moment to familiarize
    yourself with all of them before settling on a solution.


    ### Communicating Within a Single Process


    There are several technologies for exchanging messages with objects in your process’s
    memory address space. Fundamental Objective-C message dispatching is one, but
    this section is going to review the following technologies that send messages
    to an object on behalf of another object:


    - Deferred messages

    - Notifications

    - Key-Value Observing

    - Distributed Objects


    Deferred messages were discussed in Chapter 6. Deferred messages are sent using
    the `-performSelector:…` family of methods. This is the simplest form of inter-object
    communication. It queues up an Objective-C message that will be sent to an object
    at some later time. The message is usually sent in the same thread, but some variants
    will send it to the object in a different thread.


    Notifications send `NSNotification` objects to the objects interested in receiving
    them. An `NSNotification` is a named message container that can include whatever
    arbitrary information you want to provide the receivers. Notifications are Objective-C’s
    embodiment of the Provider/Subscriber pattern, and are described in Chapter 18.
    The most notable differences between notifications and other communication techniques
    is that notifications are a one-to-many communications path, and the provider
    and subscriber objects aren’t required to have any direct knowledge of each other.
    Notifications are distributed through `NSNotificationCenter` objects. The sender
    describes the nature of the notification it wants to distribute, and the receiver
    describes the types of notifications it would like to receive. The notification
    center matches the senders to the receivers and delivers the requested notifications.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Key-Value Observing (KVO) is a specialized notification service that communicates
    changes about an object’s properties. An observer object can attach itself to
    a particular property of another object. Once attached, any change to that property
    is immediately sent to the observer in the form of an `-observeValueForKeyPath:ofObject:change:context:`
    message. Key-Value Observing is particularly attractive because there are no prerequisite
    design requirements on the part of the object being observed—other than it must
    implement a KVO-compliant property. Thus, your object can request to be notified
    about changes to virtually any property of any object. Key-Value Observing is
    described in Chapter 19.


    Distributed objects (DO) is usually employed to send messages between objects
    in separate processes or across networks to other systems. However, it can also
    be used to send messages between threads of the same process. This use of distributed
    objects is an easy way of adding asynchronous message processing to your design.
    Inter-thread DO is described and demonstrated in the next section.


    ### Communicating with Other Processes


    Communicating with other processes is severely limited by the fact that an address
    in the local process’s memory address space is meaningless to any other process.
    To exchange information with another process, all data must be in, or converted
    into, a transportable form that is meaningful outside the process. This usually
    takes the form of byte arrays that are interpreted serially by the receiving process.
    Fortunately, in the previous chapter you just learned about two key technologies
    that perform this transformation for objects—archiving and serialization.


    Ports, pipes, and sockets are the low-level tools for exchanging blocks of bytes
    between processes. Ports refer to Mach kernel ports, the fundamental mechanism
    by which messages are sent to the kernel and, by extension, other processes. Technically,
    all extra-process communications are performed through Mach ports, since that’s
    the only means by which a process can communicate with the outside world. Layered
    on top of ports are the POSIX concepts of pipes and sockets. Pipes are, conceptually,
    a unidirectional serial communications conduit with a process connected to each
    end. Bytes injected into the pipe by one process instantly appear as readable
    data to the other. Sockets are unidirectional or bidirectional communications
    conduits between two processes. While pipes are limited to two processes running
    on the same system, sockets can be connected—via data networks or another transport
    medium—to a process running on a completely different computer system, possibly
    quite remote. Sockets are more packet oriented, sending and receiving discrete
    blocks of information rather than individual bytes.'
