    Xcode 应用程序是一个很好的基于文档的 MVC 多视图应用示例。一个数据模型对象代表一个文档（源文件）的内容。出现在 Xcode 环境中的源代码编辑窗格就是视图对象。你可以在多个窗口或窗格中打开同一个源文档，它们都会显示相同的内容。更神奇的是，编辑一个窗格会立即更新所有其他窗格。这种机制之所以有效，是因为数据模型和所有视图都遵循相同的
    MVC 通信规则。当某个视图对象被编辑时，它会将这些编辑请求发送给其控制器，控制器再更新数据模型，数据模型再将更改广播给所有观察者。无需编写任何特殊代码，单个数据模型的多个视图就能保持完美的同步。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第 20 章 ■ 模型-视图-控制器模式


    使用设计良好的 MVC 对象进行编程，就像在玩一套巨大的乐高积木。任何对象（数据模型、控制器或视图）都可以与任何功能等价的对象互换。替换对象或附加多个对象，都不会干扰设计的其他部分。MVC
    的口头禅是：通过连接简单的对象来创建复杂的应用程序。


    ### 复用


    复用与灵活性密切相关。通过抽象类的功能，你可以在其他应用程序中或为了其他目的复用你的对象。最常被复用的对象是数据模型和视图对象。Cocoa 核心视图对象（按钮、文本字段、图像查看器）每天都被用于成千上万种不同目的，只需将它们连接到不同的数据模型和控制器对象即可。


    ### 扩展


    模型-视图-控制器设计模式会出现在不同规模的场景中。如果你仔细观察一个像 `NSButton` 这样的 Cocoa 视图对象，你会发现在其内部实际上有一个微型的
    MVC 设计在工作。你通常视为单个视图对象（一个按钮）的东西，实际上是两个或三个对象：


    -   `NSButton` 对象是一个 `NSControl`，在 MVC 设计中扮演控制器的角色。`NSButton` 决定了按钮的行为。

    -   视图的角色由一个 `NSButtonCell` 对象（`NSCell` 的子类）来处理。该对象负责绘制按钮图像，并处理鼠标和键盘事件。

    -   `NSButton` 对象可以维护自己的状态（充当数据模型），也可以绑定到一个独立的数据模型对象。


    要自定义按钮的外观，你不是去创建 `NSButton` 的子类。相反，你应该创建你自己的 `NSCell` 子类来实现你想要的外观，然后将其附加到一个普通的
    `NSButton` 实例上。


    正如 iTunes 可以使用不同的视图来改变你音乐库的外观而无需改变其任何功能一样，你可以改变按钮的外观而不影响其行为。灵活性和复用意味着你自定义的 `NSCell`
    将与未来版本的 `NSButton` 兼容，并且可能也与其他的 `NSControl` 子类一起使用。


    现在，我希望你已经开始认识到使用模型-视图-控制器设计模式的优势了。是时候让我从高谈阔论中下来，详细讲讲 MVC 是如何在应用程序设计中被使用的。


    ### 绑定


    到目前为止，我已经以通用的方式讨论了 MVC 通信，但 Cocoa 框架定义了一种非常具体的 MVC 通信形式，称为绑定。绑定定义了不同对象中两个属性之间的关系。绑定形成一种连接，将一个观察者对象的一个属性绑定到另一个对象的一个属性。绑定使这两个属性保持同步。Cocoa
    为此提供了一个框架和一个非正式的绑定通信协议。这两个对象可以是任意对象，但观察者通常是一个视图对象，而被观察的属性则位于数据模型或控制器对象中。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第 20 章 ■ 模型-视图-控制器模式


    **注意：** 在撰写本文时，iPhone OS 不支持 Cocoa 绑定技术。如果你的目标是 iPhone OS，你将不得不使用 Objective-C
    消息、动作、插座变量、键值观察、通知或其他技术来实现你的 MVC 通信。动作和插座变量在“Interface Builder”部分有描述。


    在实践中，视图对象显示属性的值。在视图中编辑值会通过绑定发送消息给数据模型，以改变其值。对数据模型值的任何更改都会通知视图。绑定具有以下属性：


    -   属性使用键值路径进行标识。两个对象都必须实现符合键值编码的属性。

    -   观察者对象使用键值观察来监听属性值的变化。被绑定的属性必须是 KVO 兼容的。

    -   `NSController` 对象被设计用来与绑定一起工作。具体来说，`NSController` 对象可以绑定复合值，例如集合和数组。`NSController`
    还定义了选择（selection）的概念，因此你可以将一个属性绑定到复合属性的选定值。

    -   绑定可以指定编辑后的值何时提交，以及被绑定属性的更改何时更新。

    -   绑定可以提供一个默认值，用于当被绑定属性为 `nil` 时。

    -   绑定可以通过一个值转换器进行过滤，该转换器将绑定值转换为适合观察者使用的形式，反之亦然。例如，一个转换器可能自动在货币之间转换，或者将摄氏度转换为华氏度。


    绑定可以通过编程方式创建，但这很少见。更不常见的是创建主动参与绑定的自定义类；你可能想要绑定的大多数类（Cocoa 框架提供的 `NSView` 对象）以及具有复杂可绑定属性的对象（`NSController`
    的子类）都已经为你实现了。大多数时候，你是在 Interface Builder 中，将库中的视图对象属性绑定到任何对象的 KVO 兼容属性，或者绑定到 `NSController`
    的子类——这些都不涉及任何严肃的编程。你可能想要创建自己的 `NSController` 或 `NSObjectController` 子类，但基类本身已经是
    Cocoa 绑定兼容的类，所以你还是无需深入绑定的内部机制。如果你发现需要探索这些选项，请参考 Cocoa Bindings Programming Topics
    指南¹。


    绝大多数情况下，你将视图绑定到你自己的对象的属性，唯一的前提条件是这些属性符合键值观察——大多数属性都符合，或者通过少量工作就能轻松使其符合 KVO。如果需要确认，请参考第
    19 章。


    到目前为止，我主要关注的是查看属性的值，但绑定对于许多其他类型的属性也非常有用。像复选框控件这样的视图对象有很多属性：按钮的标题、标题的字体、复选框的状态、是否启用、是否可见等等。这些属性中的任何一个都可以绑定到另一个对象的属性。以
    TicTacToe 项目为例。界面有一个重置按钮，用于清空棋盘并开始新游戏。这个按钮的启用属性被绑定到游戏对象的 `isStarted` 属性。在游戏开始前，当
    `isStarted` 为 `NO` 时，按钮是禁用的。一旦游戏开始，按钮就变为启用状态。


    游戏对象中没有用于启用或禁用按钮的代码，按钮也对井字游戏一无所知。视图的启用属性仅仅是被绑定到了另一个对象的一个可被观察的 `BOOL` 属性上；不需要额外的编程。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ¹ Apple Inc., Cocoa Bindings Programming Topics, http://developer.apple.com/documentation/Cocoa/Conceptual/CocoaBindings/,
    2009.

