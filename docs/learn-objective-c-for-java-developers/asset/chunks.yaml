    \n- 所有指向内存分配的指针都必须声明为`__strong`（或`__weak`，视情况而定）。\n- 使用`NSAllocateCollectable(int\
    \ size, int options)`来分配内存。\n- 如果可回收内存块的内容包含`__strong`或`__weak`指针，则`NSAllocatableCollectable`的`options`参数应为`NSScannedOption`。否则，传递`0`。清单\
