    Unimplemented Methods


    Possibly even more interesting than how messages are sent is what happens when
    an object is sent a message it doesn’t implement. If you don’t do anything special,
    the results are similar to Java; the runtime throws an “unrecognized selector”
    exception.


    But before that exception is thrown, the object is given the opportunity to handle
    the message in some other way. When the message dispatch function finds that an
    object doesn’t implement that 100


