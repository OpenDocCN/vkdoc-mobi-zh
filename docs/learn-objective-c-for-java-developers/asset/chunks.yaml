    CHAPTER 15 ■ THREADS


    Using NSOperationQueue can be very simple, or quite complex, depending on your
    needs. The minimum steps to use NSOperationQueue are as follows:


    1.


    Create an instance of NSOperationQueue.


    2.


    Create an instance of NSInvocationOperation (a concrete subclass of NSOperation)
    specifying the object and method to invoke. Or, create a subclass of NSOperation
    and override its -main method.


    3\. Send


    -addOperation: to the NSOperationQueue, passing the operation object created in
    step 2.


    Without doing anything else, the NSOperationQueue will create new threads and
    use them to execute the code in your NSOperation objects. The sample project used
    in Chapter 4 demonstrates how simple NSOperationQueue is to use. Using NSOperationQueue
    has several advantages:


    • NSOperationQueue will automatically maintain an efficient pool of threads, creating
    and destroying threads for you.


    • NSOperationQueue scales automatically based on the system resources—like the
    number of CPU cores—and will perform load balancing.


    • Operations can be made dependent on other operations, allowing you to define
    complex trees of operations that must be performed in the correct order.


    • You can limit the number of concurrent operations, or let the operation queue
    determine an optimal number automatically.


    • Operations can be prioritized.


    • By subclassing NSOperation, you have extensive control over your operation’s
    behavior. You can also implement code that permits your operation to be prematurely
    canceled.


    See the “Creating and Managing Operation Objects” section in the Threading Programming
    Guide for more details.2


    Timers


    Timers are objects that post method invocations to a run loop at specific time
    intervals. They are incredibly simple to use, and can often replace much more
    elaborate solutions based on threads or other mechanisms.


    Timers run on run loops. They come in two flavors: repeating timers and one-shot
    (non-repeating) timers. A repeating timer fires an Objective-C message at regular
    intervals until stopped. A one-shot timer sends one message, and then invalidates
    itself. When a timer is invalidated, it stops sending messages and removes itself
    from the run loop.


    To use a timer:


    1\. Create a timer object.


    2\. Schedule it to run on the current run loop.


    3\. To stop the timer, send it an -invalidate message.


