    commands that do not specify an explicit compositing mode as a parameter.


    The Graphics Context State Stack


    You may need several graphics contexts, configured differently, to accomplish
    your drawing tasks. It isn’t always easy to undo the changes made to any one graphics
    context, and all subsequent drawing operations will be affected by any changes,
    so it’s easy for the current context to become “polluted.” This is where the graphics
    context state stack is handy.


    The current state of the graphics context can be pushed, preserving all of its
    properties on a per-thread stack. You can then make whatever changes you want
    to the graphics context. When the previous state is restored, any changes made
    since it was saved are discarded. This is particularly useful when setting complex
    properties, like clipping, shadow, and affine transforms, that only apply to a
    few drawing commands. Listing 20-5 demonstrates the basic pattern for pushing
    and restoring a graphics context.


    Listin g 20-5\. Saving and Restoring a Graphics Context


    NSGraphicsContext *currentContext = [NSGraphicsContext currentContext]; NSRect
    circleRect = NSMakeRect(0.0,0.0,20.0,20.0);


    NSBezierPath *path = [NSBezierPath bezierPathWithOvalInRect:circleRect];


    // Fill the circle interior (with a drop shadow)


    **[currentContext saveGraphicsState]; // push context state** NSShadow *shadow
    = [NSShadow new]; // create a shadow


    [shadow setShadowColor:[NSColor blackColor]];


    [shadow setShadowOffset:NSMakeSize(3.0,-3.0)];


    [shadow setShadowBlurRadius:1.5];


    [shadow set]; // set shadow for all drawing


    [[NSColor whiteColor] setFill]; // set fill color to white


    [path fill]; // draw white circle + shadow


    **[currentContext restoreGraphicsState]; // restore previous context** 378


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    // Draw the circle permimeter (without a shadow)


    [[NSColor blueColor] setStroke];


    [path stroke];


    You must balance each -saveGraphicsState message with a -restoreGraphicsState
    message.


