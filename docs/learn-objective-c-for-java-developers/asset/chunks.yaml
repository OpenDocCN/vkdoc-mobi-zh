    classes. This section will show how to take advantage of nil receivers to simplify
    your code and will introduce three design patterns that leverage nil. Abstractly,
    this is about adopting the programming principle of “letting the data make the
    decision” first articulated by Charles Moore, computer science pioneer and inventor
    of the FORTH language. The principle avoids writing conditional statements that
    branch to handle exceptional cases, in favor of data and expressions that incorporate
    those cases.


