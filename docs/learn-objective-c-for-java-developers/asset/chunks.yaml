  trans: '

    # 第 4 章 ■ 创建 Xcode 项目


    **图 4-3.** *垃圾回收构建设置*


    可以在此处随意探索其他构建设置（清除搜索字段）。构建设置组织成一个三维的值矩阵。前两个维度由构建设置的层级树构成：项目级别一组、每个目标一组、每个文件有限的一组。每个实体都可以定义或覆盖任何构建设置。目标的构建设置会覆盖项目的设置，文件的设置则覆盖目标的设置。在确定构建设置之前，需要判断它是适用于整个项目、特定目标，还是仅针对单个文件。第三个维度由*构建配置*构成。每个配置都包含一组完全独立的构建设置，对应项目中的每个实体。Cocoa
    应用模板自带两种构建配置：`Debug` 和 `Release`。`Debug` 构建配置的设置包含调试符号，并禁用大多数代码优化，适用于调试和分析。`Release`
    构建配置则去除符号信息，并开启大多数代码优化。你也可以创建自己的构建配置，但请谨慎操作，因为这会成倍增加需要维护的构建设置。


    ## 设计应用程序


    现在让我们进入应用程序设计阶段。本应用将呈现一个图形用户界面，因此采用模型-视图-控制器（MVC）设计模式。我们的数据模型很简单——一个字母字符串和一个可拼写的单词列表，由
    `string` 和 `NSArray` 对象提供。`ScrapWordsController` 类将是我们的主控制器对象。视图对象均为 `NSView`
    的子类，由 `AppKit` 框架提供。


    应用程序将呈现一个包含四个组件的窗口，如图 4-4 所示。输入字段让用户输入他们拥有的字母。输出视图列出用这些字母可以拼写的单词。界面很简单：你输入字母，就能看到单词。


    **图 4-4.** *Scrapbook Words 用户界面*


    要开始设计，请创建一个 `ScrapWordsController` 类。这将是我们主要的控制器对象。点击 `Classes` 组以选中它。在组上 `control+点击`（或右键点击），选择
    **添加** > **新建文件…**，或者从主菜单中选择 **文件** > **新建文件…**。在新建文件助理中，从 `Cocoa` 组中选择 **Objective-C
    类** 模板。将其命名为 `ScrapWordsController.m`，并让它创建一个对应的 `ScrapWordsController.h` 文件。点击
    **完成** 按钮，助理将创建新文件并将其添加到你的项目中。


    `ScrapWordsController` 对象需要执行以下操作：

    1.  从输入文本字段获取用户输入的字母。

    2.  每当用户输入新内容时，清除输出列表。

    3.  在单词列表中搜索那些能用这些字母拼写出来的单词。

    4.  将找到的每个单词添加到输出列表中，供用户查看。


    代码清单 4-1 显示了 `ScrapWordsController.h` 文件的初始版本。完成版项目中的 `ScrapWordsController.h`
    版本多了一个实例变量，你现在可以忽略它。它有一个 `letters` 属性，用于保存用户输入的字母字符串。`NSMutableArray` 对象将包含可拼写的单词列表。`wordsController`
    变量将引用一个 `NSArrayController` 对象，该对象负责完成将数据模型绑定到显示单词列表的视图对象所需的所有工作——稍后会详细介绍。最后，分别定义了清除输出显示列表和向其中添加一个单词的方法。


    **代码清单 4-1.** *ScrapWordsController 接口的初始版本*


    ```

    @interface ScrapWordsController : NSObject {


    NSString *letters;


    NSMutableArray *words;


    NSArrayController *wordsController;


    }


    @property (assign) NSString *letters;


    @property (assign) IBOutlet NSArrayController *wordsController;


    - (void)removeWords;


    - (void)foundWord:(NSString*)word;


    @end

    ```


    ## 设计用户界面


    为了实现功能，应用程序需要有一个包含输入文本字段和输出列表的界面窗口。用户界面将使用 Interface Builder 开发。Interface Builder
    是一个与 Xcode 紧密配合的界面设计工具。Interface Builder 编辑 NIB 文档。NIB 文档包含一个归档（序列化）的对象图。你可以在
    NIB 文档中创建任何你需要的对象。NIB 中的对象通过点选设计工具来创建、配置并连接在一起。当应用程序运行并加载 NIB 文档时，对象会被实例化，其属性会得到设置，对象间的引用也会被连接起来。NIB
    文档作为资源文件存储在应用程序的捆绑包中。


    **注意** 历史上，Xcode 项目会包含一个二进制的 `.nib` 文档，Interface Builder 会直接编辑它。Xcode 3 引入了 `.xib`
    文档类型，这是一种更健壮、更灵活的基于 XML 的 Interface Builder 文档。`.xib` 文档是一种源文档，在构建应用程序时会被编译成二进制的
    `.nib` 文档。我通常将所有 Interface Builder 文档统称为 NIB 文档，因为这是 Cocoa 开发者和文档中使用的语言，并且它们也最终会由应用程序加载。


    在项目窗口中双击 `MainMenu.xib` 文档；你可以在 `Resources` 组中找到它。这将启动 Interface Builder 并打开项目的
    `MainMenu` NIB 文档。


    Interface Builder 在窗口中呈现 `MainMenu` NIB 文档的内容，作为对象的层级集合，如图 4-5 所示。NIB 中的顶级可视对象（如窗口和菜单栏）也会单独显示。在任一视图中都可以编辑内容。


    **图 4-5.** *MainMenu NIB 文档和顶级可视化容器*


    创建用户界面就像拖放一样简单。打开库窗口（**工具** > **库**）。在 **对象** 标签页中，找到 **视图与单元格** 下的 **输入与值** 组。从库窗口中拖拽两个标签和一个文本字段到应用程序的窗口中，如图
    4-6 所示。调整它们的位置。找到 **数据视图** 组，将一个表格视图拖入窗口。调整对象和窗口的大小与位置，直到这些对象与图 4-4 中的位置一致。双击标签来编辑其文本。


    **图 4-6.** *向窗口添加视图对象*


    对象的属性通过多种检查器面板进行编辑。选择 **工具** > **检查器**，然后选择输入文本字段。检查器面板会显示所选对象（或多个对象）的属性。


    要编辑表格视图对象的属性，必须先选中它。在主菜单文档窗口中，深入视图对象的嵌套层级来选中表格视图对象，如图 4-7 所示。另一种方法是，在窗口中单击一次视图。这会选中顶层的滚动视图对象。再次单击内部，会向下深入视图并选中表格视图对象。再次点击则会选中表格内的某一列，依此类推。


    **图 4-7.** *编辑表格视图属性*


    编辑表格视图的属性：将列数设置为 1。关闭表头、重新排序和调整大小。关闭列选择功能。

    '
- fmt: 'The view objects should resize when the window does. Open the Size Inspector
    (`Tools > Size Inspector`). In that palette, edit the Autosizing settings for
    the input text field and the scroll view, as shown in Figure 4-8. Decide which
    edges of the object are anchored to the window, then choose if the horizontal
    or vertical size changes with the window. You’ll want the input field to be anchored
    top and sides and resize horizontally, and the output list anchored on all sides
    and resize both horizontally and vertically. The animation previews the effect
    of the settings.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-88_1.jpg)


    ### Figure 4-8. Editing a View Object’s Autoresize Attributes


    ## Adding a Controller


    The application will need to create an instance of the `ScrapWordsController`.
    It will be connected to other objects in the NIB document, so the NIB document
    should instantiate the controller as well. From the Library, select the `Objects
    & Controllers` group and drag a new `Object` object into the `MainMenu.xib` document
    window, as shown in Figure 4-9. Select the newly created object and switch to
    the Identity inspector (`Tools > Identity Inspector`). Set its class to `ScrapWordsController`.
    You can type it in or choose it from the pull-down menu; Interface Builder keeps
    track of the classes you’ve defined in your project.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-89_1.jpg)


    ### Figure 4-9. Adding a Custom Object to the NIB Document


    When this NIB document is loaded at runtime, it will create an instance of `ScrapWordsController`,
    just as if your application had executed the statement:


    ```

    [ScrapWordsController new]

    ```


    This is an important concept to grasp. All of the objects in a NIB document represent
    real objects that will be instantiated when the NIB is loaded. The result is identical
    to creating new instances of those objects, setting all of their properties, adding
    them to their container object (for nested objects), and setting references between
    them. But by using Interface Builder, you save yourself from writing a ton of
    code.


    ## Making a Binding


    In an MVC design, data model objects broadcast changes to view objects whenever
    they change. View objects update the data model object whenever the user alters
    the value. This requires connections and communications between the view and data
    model objects. This application’s data model is a couple of simple values (a string
    and an array) created by the controller object.


    There are a variety of ways of connecting the data values to the view objects,
    but this application is going to use a binding. Bindings are actually a collection
    of technologies that support the MVC design pattern. A binding connects two objects
    so that a change in a property of one object is automatically communicated to
    the other object. The second object can initiate changes that alter the property
    of the first object. Typically, the first object is a data model object and the
    second object is a view object. Once bound together, changes to one are automatically
    reflected in the other. This doesn’t require you to write any code. You need only
    declare the property and bind it to an object.


    In Interface Builder, choose the Text Field object (either in the `MainMenu.xib`
    or in the Window itself). Bring up the Bindings Inspector (`Tools > Bindings Inspector`).
    Expand the text field’s Value binding. Bind it to the `ScrapWordsController` object
    using a key path of `letters`, set it to `Continuously Update Value`, and uncheck
    the other options so they match the ones shown in Figure 4-10.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-90_1.jpg)


    ### Figure 4-10. Binding the Text Field to the `letters` Property of `ScrapWordsController`


    This binding is complete. Any change to the controller’s `letters` property (e.g.,
    `[controller setLetters:@"hello"]`, or `controller.letters = @"hello"`) will be
    immediately reflected in the text field view. Editing the text field will update
    the value of `letters` in the controller.


    If that seems like a lot of magic for so little code, I’ll lift the curtain a
    little and give you a peek at some of what’s going on behind the scene. The key
    thing to keep in mind is that Interface Builder isn’t doing anything special.
    The technologies that allow bindings to work – Key-Value Coding, Key-Value Observing,
    and controllers – are available to you directly. They can be used individually,
    or in concert, to implement a wide spectrum of solutions, beyond just making MVC
    designs easy.


    ## KVC


    Key-Value Coding (KVC) allows an object’s properties to be accessed interpretatively.
    It uses a combination of informal protocols (explained in Chapter 5) and introspection.
    As an example, assume there’s a Key-Value Coding—compliant `Person` class that
    has three properties: a string `name` property, and `father` and `mother` properties
    that reference two other `Person` objects. A person’s `name` could be examined
    using the Key-Value path `@"name"`. Their father’s name could be addressed with
    the path `@"father.name"`, and their maternal grandfather’s name could be accessed
    using the path `@"mother.father.name"`. KVC is discussed in more detail in the
    Introspection chapter.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## KVO


    Key-Value Observing (KVO) is a notification service used to observe changes in
    an object. The property to observe is specified using a KVC path. Once an object
    begins observing a property, any change to that property sends a notification
    to the observer (listener). Unlike Java, this doesn’t require the source object
    to manage a set of listeners or fire notification messages itself – although it
    can. All it has to do is declare a property. The KVO framework does all the work
    of managing the list of observers, detecting when the property changes, and sending
    the appropriate notifications. KVO is explained in Chapter 19.


    ## Controllers


    The Cocoa framework defines an `NSController` class that provides the “glue” between
    data model and view objects. The Cocoa framework provides a number of useful controllers
    for arrays, dictionaries (maps), trees, and user preferences. You can subclass
    `NSController` should you need to define your own. There’s more about controllers
    in Chapter 20.


    ## Bindings


    The bindings framework leverages KVC, KVO, and controllers to create a unified
    MVC notification and synchronization service. Bindings can be created in Interface
    Builder or programmatically using the `[NSObject bind:toObject:withKeyPath:options:]`
    method. Bindings are also covered in Chapter 20.


    ## Adding an Array Controller


    The binding between the Table View and Array object is, naturally, a little more
    complicated. To coordinate the display with the data requires two bindings: one
    binding connects a column in the table view to an array controller. A second binding
    connects the array controller to the actual array of value objects. The array
    controller sits between the view and data model objects and maintains state information
    – like the sorting order and current user selection – that doesn’t belong in either
    the view or the data model. This is often called the Mediated MVC design pattern,
    because the controller object sits between the view and the data model and mediates
    their communications.'
