    \ instantiates an object that implements a service. One or more client processes\
    \ connect to the service and obtain a proxy object. The proxy object doesn’t implement\
    \ any of the server’s code. Instead, the proxy forwards any method invocations\
    \ through the connection to the server process, where the desired method is actually\
    \ executed. Any parameters and return values are similarly encoded and transported\
    \ through the connection.\n\nThere are two significant differences between the\
    \ Java and Objective-C implementations. The first is how proxy objects are created.\
    \ In Java, you must first design an interface that defines the methods for the\
    \ server object, along with a class that implements them. The Java `rmic` compiler\
    \ then creates a special `_Stub` class suitable for use as a proxy object. The\
    \ client process obtains the proxy object and invokes its methods, which are forwarded\
    \ back to the server for execution.\n\nObjective-C provides the `NSProxy` class.\
    \ This is a very special class, because it is not a subclass of `NSObject`. `NSObject`\
    \ and `NSProxy` are both subclasses of the root `Object` class. Most of what you\
    \ consider to be base-class methods are defined in `NSObject`, not `Object`. Consequently,\
    \ `NSProxy` inherits no methods—which makes it perfect for what it does.\n\n`NSProxy`\
    \ overrides the `-forwardInvocation:` method described in Chapter 6. Since it\
    \ implements almost no methods, virtually any method you send it will end up invoking\
    \ `-forwardInvocation:`. `NSDistantObject`, the usable subclass of `NSProxy`,\
    \ connects an `NSProxy` with an `NSConnection`. Any message sent to the proxy\
    \ object is archived and transported through the `NSConnection` for execution\
    \ by the remote process. By leveraging Objective-C’s unimplemented method handling,\
    \ a lightweight proxy object can be spontaneously created for any Objective-C\
    \ object.\n\nThis means that you can share virtually any object through an `NSConnection`.\n\
    \n> **Caution**: `NSProxy` objects do not contain any of the instance variables\
    \ of the objects they stand in for. For convenience, proxy object pointers are\
    \ often cast as a pointer to the actual object type. Be careful not to directly\
    \ access any instance variable of the object using a pointer to its proxy, as\
    \ in `distantObject->value`. This will most certainly have disastrous results.\
    \ Use property accessors instead (`[distantObject value]` or `distantObject.value`)\
    \ as these translate into messages, or use the object identifier type (`id`) which\
    \ inherently prohibits direct variable access. When designing distributed objects,\
    \ program defensively. Make all instance variables `@protected` or `@private`\
    \ and provide accessor methods for all public properties.\n\nThe other significant\
    \ difference is how parameters and return values are exchanged. In Java, all parameters\
    \ and return values are passed by copy, and must therefore be serializable. It\
    \ also means that the classes that implement those values must exist in the server.\
    \ Find the “Guest heard ‘I’m pleased to meet you, Guest!’” message for both Java\
    \ and Objective-C in the example output in Listing 13-5. In the Java version,\
    \ the message is emitted by the server process. The client statement `greeter.greetGuest(guest)`\
    \ serialized a copy of the `Guest` object and sent it to the server. When the\
    \ `Greeter` executed `guest.listen(\"I'm pleased to meet you, guest!\")`, the\
    \ `listen(…)` method executed on the server’s local copy of the `guest` object.\n\
    \nIn the Objective-C output, the “Guest heard ‘I’m pleased to meet you, Guest!’”\
    \ message is emitted by the client. That’s because Objective-C’s default is to\
    \ pass values by reference. The `[greeter greetGuest:guest]` statement passed\
    \ a reference to the `guest` object to the server. The server’s `-greetGuest:`\
    \ method received a proxy `NSDistantObject` to the instance of `Guest` that exists\
    \ in the client. When the server sends the message `[guest listen:@\"I'm pleased\
    \ to meet you, guest!\"]`, the message invocation is intercepted, archived, and\
    \ sent back to the client for execution, where the output appears."
