- fmt: '# One or both of the `name` and `object` parameters can be `nil`. When omitted,
    they act as wildcards, accepting any notification that matches the other criteria.
    Table 18-1 lists the combinations of `name` and `object` values that can be specified
    by the observer.


    **Table 18-1.** Observer Notification Criteria


    | `name`  | `object` | Notification Criteria                                          |

    |---------|----------|----------------------------------------------------------------|

    | `@"name"` | `object` | Receive notifications posted by `object` with the name
    `@"name"`. |

    | `@"name"` | `nil`    | Receive all notifications with the name `@"name"` from
    any `object`. |

    | `nil`     | `object` | Receive all notifications posted by `object`.                  |

    | `nil`     | `nil`    | Receive all notifications posted to this notification
    center.  |


    The second form is the most common. The observer will receive all notifications
    with the given name posted by any object. The observer doesn’t have to know what
    that object is, nor does it need a reference to the object to register. It only
    needs to know the name of the notification.


    Here are two practical examples, both using notifications to manage an auxiliary
    window.


    - Your application implements a persistent “inspector” palette window that always
    displays information about the front document window. The palette window object
    will register to receive `NSWindowDidBecomeMainNotification` notifications from
    any object (`nil`). Whenever a document window becomes active, it receives a notification
    and updates its display. The window that became active is included in the notification.


    - Your application implements an “inspector” palette window that’s attached to
    a specific window. The palette window object will register to receive `NSWindowDidBecomeMainNotification`
    and `NSWindowDidResignMainNotification` notifications from the specific document
    window object. The palette will be notified whenever that specific window becomes,
    or ceases to be, active. The palette window uses these events to automatically
    show or hide itself.


    An observer can register to receive notifications as many times as it wants for
    multiple notification names, different providers, or some combination of the two.
    If the observer registers for the same notification in different ways, it may
    receive a single notification multiple times. The order is unpredictable.


    ## Removing an Observer


    Observers can cancel a previous registration by sending a `-removeObserver:` or
    `-removeObserver:name:object:` message to the notification center. The `observer`
    parameter is required, but the `name` and `object` parameters are both optional
    and either may be `nil`. The notification center revokes the subscription for
    all notifications that match the criteria, as listed in Table 18-2.


    **Table 18-2.** Remove Observer Criteria


    | `name`    | `object` | Registration Effect                                                     |

    |-----------|----------|-------------------------------------------------------------------------|

    | `nil`     | `nil`    | Cancels all registrations for the observer. Same as `-removeObserver:`   |

    | `@"name"` | `nil`    | Cancels all registrations for notifications with the
    name `@"name"`      |

    | `nil`     | `object` | Cancels all registrations for notifications posted by
    `object`           |

    | `@"name"` | `object` | Cancels the registration for notifications with the name
    `@"name"` sent by `object` |


    In the second palette window example above, the observer has registered to receive
    two specific notifications, both from a specific provider. The message `[notificationCenter
    -removeObserver:self name:nil object:paletteWindow]` will remove both registrations,
    since both specify the same provider. However, the message `[notificationCenter
    -removeObserver:self name:NSWindowDidBecomeMainNotification object:nil]` will
    remove only one registration.


    In a garbage-collected memory environment, notification centers hold weak references
    to observers. Once your observer is forgotten and collected, it is effectively
    removed from its notification center. So you aren’t required to send `[[NSNotificationCenter
    defaultCenter] removeObserver:self]` before your object can be collected. However,
    if there’s an obvious point at which your object should stop receiving notifications,
    removing it from the notification center is appropriate and desirable.


    ## Notification Queuing'
