- fmt: '• Read the chapter to get a feel for Xcode development. Download the finished
    project and play with it.


    • Copy each step in this chapter in Xcode to re-create the project on your own,
    copying source code from the finished project where needed.


    • Use the steps here as the starting point for your own project.


    In the following sections, you’re going to create a new Xcode project, configure
    the project, design an application, create controller and data model objects to
    implement a Model-View-Controller design, and finally add the business logic to
    produce a working app. Working through this process will take you on a mini-tour
    of Xcode, Interface Builder, Objective-C, and the Cocoa frameworks. There are
    few comparisons to Java in this chapter, since this is more about the development
    tools than the language.


    ## Creating a Project


    Once installed, launch the Xcode application.


    Start by creating a new project. Choose File → New Project… to open the new project
    assistant (Apple’s term for a wizard). A new project is always based on one of
    the many templates included. Each template creates a complete project preconfigured
    for a particular purpose. It’s a great head start towards your final goal, so
    choose the template that most closely describes your end product. Most projects
    require a non-trivial amount of configuration before they will produce anything
    useful, so I strongly discourage you from choosing the `Empty Project` template.


    For this project, choose the `Cocoa Application` template as shown in Figure 4-1.
    Name the project `Scrapbook Words` and select a location where the project and
    its files will be stored. Xcode will create a folder with the name of your project.
    The folder will contain a similarly named project document and whatever additional
    resource files are included in the template. This might be nothing for some templates,
    or scores of items for others.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-81_1.jpg)


    **Figure 4-1.** *Choosing a Project Template*


    The project window is where all of the project’s components are organized and
    managed. The project window, shown in Figure 4-2, uses the default Xcode layout.
    You can choose to use an all-in-one window or multiwindow layout in Xcode → Preferences,
    should one of those better suit your tastes and habits.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-82_1.jpg)


    **Figure 4-2.** *Project Window*


    Most templates produce a project that can be immediately built and run, but does
    nothing useful. The `Cocoa Application` template is no exception. If you like,
    you can build and launch the application right now (Build → Build and Run).


    The `Group & Files` pane of the project window is where you organize the project’s
    assets. You can create an arbitrarily complex hierarchy of source items by creating
    new groups and sub-groups, and rearranging items by dragging. You can create new
    files directly in the project or import existing files. By default, the actual
    files are all stored in the root project folder. It’s possible to organize the
    physical files into a hierarchy or have them reside outside the project folder,
    but for even moderately sized projects it’s far less complicated if you confine
    your organizing to the project window.


    ## Getting Started


    Before getting started on the principal design, there’s some housekeeping to do.
    For the most Java-like experience, you’ll want your application to use garbage
    collection. As of the writing of this book, garbage collection is opt-in; a new
    Cocoa project will use legacy memory management unless reconfigured.


    Choose Project → Edit Project Settings from the menu. Switch to the `Build` tab,
    choose `All Configurations` and `All Settings`, and then type `garbage` into the
    search field. You should see the build setting for `Objective-C Garbage Collection`
    as shown in Figure 4-3. Click the value pop-up and change the setting to `Required`.
    Build setting changes occur immediately.'
