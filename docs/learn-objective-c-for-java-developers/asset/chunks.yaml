- fmt: "`-performSelector:onThread:`变体将一个消息排队，以便在任何具有运行循环的线程上执行。如果传递给此方法（或`-performSelectorOnMainThread:`方法隐含的）的目标线程与当前正在运行的线程相同，则该消息会立即发送给对象（使用`-performSelector:`），而不涉及任何运行循环。\n\
    \n上述三种方法都有一个接受额外`mode`参数的替代形式。运行循环在模态（modes）下运行。模式是一种过滤器，会忽略队列中那些在当前模式下不合适的某些事件。更多关于运行循环模式的内容，请参阅“线程”章节。\n\
    \n最后的`-performSelectorInBackground:...`方法在一个新创建的线程中向对象发送消息。此方法不使用运行循环。会创建一个专门用于执行消息的线程，并在执行完毕后销毁该线程。\n\
    \n所有这些方法都提供了一个单一的对象标识符参数，该参数会与消息一起包含在内。如果被调用的方法不期望参数，则该值会被忽略；将其设置为`nil`。\n\n##\
    \ 面向对象的方法调用\n\nJava中`java.lang.reflect.Method`类的角色在Cocoa中主要由`NSMethodSignature`和`NSInvocation`承担。这些类形成了一个高级的、面向对象的接口，用于访问方法的定义以及调用方法的手段。`NSMethodSignature`是方法参数和返回类型的一个不可变描述。`NSInvocation`封装了接收者、消息、参数值以及返回值，这些构成了一次方法调用。可以将`NSMethodSelector`视为方法的原型，而将`NSInvocation`视为发送消息的行为。\n\
    \n虽然简单的`-performSelector:`方法快速且易于使用，但它们缺乏灵活性。\n\n`NSInvocation`可以处理接受任何类型或数量参数的方法。这包括从单个字节到整个结构体的所有内容。\n\
    \n要创建一个`NSInvocation`对象，必须首先获取该方法的`NSMethodSignature`。\n\n任何对象在收到`-methodSignatureForSelector:`消息时，都会返回其某个方法的签名。如果没有代表对象，则向`Class`对象发送`+instanceMethodSignatureForSelector:`消息。一旦获取了方法的`NSMethodSignature`，就可以使用`+invocationWithMethodSignature:`创建一个`NSInvocation`对象。\n\
    \n目标、参数值和返回值是单独设置的，并持久保存在`NSInvocation`对象中。这与Java不同。在Java中，`Method`对象在调用`invoke()`时被传递目标对象和所有参数，该方法在返回后不会保留关于此次调用的任何信息。\n\
    \n`NSInvocation`的参数和返回值通过`-setArgument:atIndex:`一次配置一个。每个参数值都是通过向`-setArgument:atIndex:`传递参数值的地址（而不是要传递的值）来设置的。即使对于对象指针值也是如此；传递指向对象指针的指针，而不是指针本身。`NSInvocation`利用其对参数类型的了解，将该地址处的值复制到参数流中。\n\
    \n清单6-8演示了如何使用`NSInvocation`向`NSString`对象发送`-substring:`消息，以及Java中功能等效的代码。\n\n\
    **清单6-8.** 面向对象的方法调用\n\n**Java**\n\n```\ntry {\n    String prose = \"Do nine men\
    \ interpret?\";\n\n    // Get Method for String.substring(int,int)\n    Class[]\
    \ paramTypes = { int.class, int.class };\n    Method method = prose.getClass().getMethod(\"\
    substring\", paramTypes);\n\n    // Invoke prose.substring(3,7)\n    Object[]\
    \ paramValues = { new Integer(3), new Integer(7) };\n    String count = (String)method.invoke(prose,\
    \ paramValues);\n\n    System.out.println(count + \" men, I nod.\");\n}\ncatch\
    \ (Exception e) {\n    e.printStackTrace();\n}\n```\n\n**Objective-C**\n\n```\n\
    NSString *prose = @\"Do nine men interpret?\";\nNSMethodSignature *signature;\n\
    NSInvocation *invocation;\nNSString *count;\n\n// Create invocation for -[NSString\
    \ substringWithRange:] method\nsignature = [prose methodSignatureForSelector:@selector(substringWithRange:)];\n\
    invocation = [NSInvocation invocationWithMethodSignature:signature];\n\n[invocation\
    \ setSelector:@selector(substringWithRange:)];\n\n// Set range structure as first\
    \ parameter (after self and _cmd)\nNSRange range = NSMakeRange(3,4);\n[invocation\
    \ setArgument:&range atIndex:2];\n\n// Invoke method and extract the return value\n\
    [invocation invokeWithTarget:prose];\n[invocation getReturnValue:&count];\n\n\
    NSLog(@\"%@ men, I nod.\", count);\n```\n\n与Java的`Method`对象不同，`NSInvocation`不执行任何形式的参数类型转换。必须向`-setArgument:atIndex:`传递一个指向方法所期望的精确类型变量的指针。在清单6-8的Java示例中，参数类型被指定为`int.class`，但作为参数传递的值是`Integer`对象。Java知道在将`Integer`对象传递给`substring(int,int)`方法之前，必须将其转换为原始的`int`值。`NSInvocation`不执行此类转换。如果某个方法期望一个`int`参数，那么传递给`-setArgument:atIndex:`的值必须是一个指向包含要发送值的原始`int`变量（`&myValue`）的指针。\n\
    \n变量参数的索引从2开始。前两个参数始终是传递给每个方法的隐藏的`self`和`_cmd`参数。使用`-setTarget:`和`-setSelector:`来配置这两个属性。为方便起见，`-invokeWithTarget:`通过单条消息设置目标并调用方法。\n\
    \n可能会觉得奇怪，为什么必须配置将要发送的方法？毕竟，一开始就是使用方法选择器来创建`invocation`对象的。这是因为`NSMethodSignature`不与特定消息相关联，它只定义参数的“形状”。可以重新配置`NSInvocation`，以发送期望相同类型、数量和顺序参数的不同消息。例如，可以创建一个单一的`NSInvocation`对象，向监听器发送带有四个参数的回调消息，但让服务的客户端选择他们想要接收的消息。只要客户端的方法期望正确的参数，他们就可以灵活地创建任何名称的方法。你的代码可以高效地重用单个`NSInvocation`对象来处理所有回调。\n\
    \n## 直接调用方法\n\n你编写的每个方法最终都会被编译成一个静态的C函数。指向这些函数的指针填充了每个`Class`对象的调度表。\n\n编译器隐藏了这些函数的名称，因此你永远不会接触到它们。但Objective-C会提供每个函数的地址，从而可以直接调用方法——绕过所有常规的消息调度逻辑。这项技术有点专业，但如果你需要从其他编程语言调用Objective-C方法，或者当消息调度对性能有显著影响时，它会非常有用。\n\
    \n`-methodForSelector:`方法返回实现——方法代码的地址——当接收者收到该消息时将会执行该实现。类方法`+instanceMethodForSelector:`返回当实例收到该消息时名义上会执行的代码的地址。我在这里非常谨慎地选择了措辞。可以修改单个对象，使得当它收到一条消息时执行的代码，与另一个相同类的对象执行的代码不同，甚至与`Class`对象认为每个实例都会执行的代码不同。不要轻易假设一个对象的方法实现地址与另一个实例相同，或者等于`-[Class\
    \ instanceMethodForSelector:]`返回的地址。最安全的做法是查询单个对象以获取其实现地址，并且只为该对象使用该地址。"
  raw: 'The -performSelector:onThread: variant queues up a message to be executed
    on any thread with a run loop. If the target thread passed to this, or implied
    by the -performSelectorOnMainThread:, method is the same as the currently running
    thread, the message is immediately sent to the object (using


    -performSelector:) without any run loop involvement.


    All three of the previous methods have an alternate form that accepts an additional
    mode parameter. Run loops operate in modes. A mode is a filter that ignores certain
    events in the queue that aren’t appropriate in the current mode. Read more about
    run loop modes in the Threads chapter.


    The final -performSelectorInBackground:… method sends a message to an object in
    a newly created thread. This method does not use run loops. A thread is created
    for the sole purposes of executing the message, and is destroyed afterwards.


    All of these methods provide a single object identifier parameter that will be
    included with the message. If the method being invoked doesn’t expect an argument,
    the value is ignored; set it to nil.


    Object-Oriented Method Invocation


    The role of Java’s java.lang.reflect.Method class is filled largely by NSMethodSignature
    and NSInvocation in Cocoa. These classes form a high-level, object-oriented, interface
    to the method’s definition, and a means to invoke it. NSMethodSignature is an
    immutable description of the method’s parameters and return type. NSInvocation
    encapsulates the receiver, message, parameter values, and return value that constitute
    an invocation of the method. Think of NSMethodSelector as the method’s prototype
    and NSInvocation as the act of sending the message.


    While the simple -performSelector: methods are fast and easy to use, they lack
    flexibility.


    NSInvocation can deal with methods that take any kind or number of parameters.
    This includes everything from a single byte to an entire structure.


    To create an NSInvocation object you must first obtain the NSMethodSignature for
    the method.


    Any object will return the signature for one of its methods when sent a -methodSignatureForSelector:
    message. If you don’t have a representative object, send the Class object an


    +instanceMethodSignatureForSelector: message. Once you’ve obtained the NSMethodSignature
    for the method, create an NSInvocation object using +invocationWithMethodSignature:.


    The target, parameter values, and return value are set individually and persist
    in the NSInvocation object. This is different than Java. The Method object is
    passed the target object and all of the parameters in the call to invoke(), which
    retains no information about the invocation after it returns.


    NSInvocation parameter and return values are configured one at a time using


    -setArgument:atIndex:. Each parameter value is set by passing -setArgument:atIndex:
    the address of the parameter’s value—not the value to be passed. This is true
    even for object pointer values; pass a pointer to the object pointer, not the
    pointer itself. NSInvocation uses its knowledge of the parameter type to copy
    the value at that address into the parameter stream.


    Listing 6-8 demonstrates using NSInvocation to send an NSString object the -substring:
    message along with the functionally equivalent code in Java.


    Listin g 6-8\. Object-Oriented Method Invocation


    **Java**


    try {


    String prose = "Do nine men interpret?";


    // Get Method for String.substring(int,int)


    Class[] paramTypes = { int.class, int.class };


    Method method = prose.getClass().getMethod("substring",paramTypes); 94


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6 ■ SENDING MESSAGES


    // Invoke prose.substring(3,7)


    Object[] paramValues = { new Integer(3), new Integer(7) }; String count = (String)method.invoke(prose,paramValues);


    System.out.println(count+" men, I nod.");


    }


    catch (Exception e) {


    e.printStackTrace();


    }


    **Objective-C**


    NSString *prose = @"Do nine men interpret?";


    NSMethodSignature *signature;


    NSInvocation *invocation;


    NSString *count;


    // Create invocation for -[NSString substringWithRange:] method signature = [prose
    methodSignatureForSelector:@selector(substringWithRange:)]; invocation = [NSInvocation
    invocationWithMethodSignature:signature];


    [invocation setSelector:@selector(substringWithRange:)];


    // Set range structure as first parameter (after self and _cmd) NSRange range
    = NSMakeRange(3,4);


    [invocation setArgument:&range atIndex:2];


    // Invoke method and extract the return value


    [invocation invokeWithTarget:prose];


    [invocation getReturnValue:&count];


    NSLog(@"%@ men, I nod.",count);


    Unlike Java’s Method object, NSInvocation does not perform any form of parameter
    type conversion. You must pass -setArgument:atIndex: a pointer to the exact type
    of variable the method expects. In the Java example in Listing 6-8, the parameter
    types are given as int.class, but the values passed as parameters are Integer
    objects. Java knows that the Integer object must be converted into a primitive
    int value before being passed to the substring(int,int) method. NSInvocation performs
    no such conversion. If a method expects an int argument, the value passed to -setArgument:atIndex:
    must be a pointer to a primitive int value (&myValue) that contains the value
    to send.


    Variable parameter indexes start at 2\. The first two parameters are always the
    hidden self and _cmd parameters passed to every method. Use -setTarget: and -setSelector:
    to configure those two properties. For convenience, -invokeWithTarget: sets the
    target and invokes the method with a single message.


    You might find it odd that you must configure the method that will be sent. After
    all, you used the method selector to create the invocation object in the first
    place. That’s because the NSMethodSignature isn’t associated with a particular
    message, it only defines the “shape” of the parameters. You can reconfigure NSInvocation
    to send different messages that all expect the same type, number, and order of
    parameters. For example, you could create a single NSInvocation object that sends
    listeners a callback message with four parameters, but lets the clients of your
    service choose the message they want to receive. The client has the flexibility
    to create a method with any name they want, as long as it expects the correct
    parameters. Your code can efficiently reuse a single NSInvocation object for all
    callbacks.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6 ■ SENDING MESSAGES


    Calling Methods Directly


    Every method you write eventually gets compiled into a static C function. Pointers
    to these functions populate the dispatch tables of each Class object.


    The compiler hides the names of these functions, so you are never exposed to them.
    But Objective-C will provide the address of each, making it possible to call methods
    directly—bypassing all of the nominal message dispatch logic. This technique is
    somewhat technical, but is useful if you ever need to invoke Objective-C methods
    from some other programming language or where message dispatching has a significant
    impact on performance.


    The method -methodForSelector: returns the implementation—the address of the method’s
    code—that will execute when the receiver is sent that message. The class method


    +instanceMethodForSelector: returns the address of the code that will nominally
    execute when an instance is sent that message. I’ve chosen my words here very
    carefully. An individual object can be modified so that the code executed when
    sent a message is different than the code executed by another object of the same
    class, or even the code that the Class object assumes each instance will execute.
    Don’t casually assume that the method implementation address for one object is
    the same as that for another instance, or equal to the address returned by -[Class
    instanceMethodForSelector:]. The safest practice is to query an individual object
    for its implementation address and only use that address for that object.'
  trans: "\n`-performSelector:onThread:`变体将一个消息排队，以便在任何具有运行循环的线程上执行。如果传递给此方法（或`-performSelectorOnMainThread:`方法隐含的）的目标线程与当前正在运行的线程相同，则该消息会立即发送给对象（使用`-performSelector:`），而不涉及任何运行循环。\n\
    \n上述三种方法都有一个接受额外`mode`参数的替代形式。运行循环在模态（modes）下运行。模式是一种过滤器，会忽略队列中那些在当前模式下不合适的某些事件。更多关于运行循环模式的内容，请参阅“线程”章节。\n\
    \n最后的`-performSelectorInBackground:...`方法在一个新创建的线程中向对象发送消息。此方法不使用运行循环。会创建一个专门用于执行消息的线程，并在执行完毕后销毁该线程。\n\
    \n所有这些方法都提供了一个单一的对象标识符参数，该参数会与消息一起包含在内。如果被调用的方法不期望参数，则该值会被忽略；将其设置为`nil`。\n\n##\
    \ 面向对象的方法调用\n\nJava 中`java.lang.reflect.Method`类的角色在 Cocoa 中主要由`NSMethodSignature`和`NSInvocation`承担。这些类形成了一个高级的、面向对象的接口，用于访问方法的定义以及调用方法的手段。`NSMethodSignature`是方法参数和返回类型的一个不可变描述。`NSInvocation`封装了接收者、消息、参数值以及返回值，这些构成了一次方法调用。可以将`NSMethodSelector`视为方法的原型，而将`NSInvocation`视为发送消息的行为。\n\
    \n虽然简单的`-performSelector:`方法快速且易于使用，但它们缺乏灵活性。\n\n`NSInvocation`可以处理接受任何类型或数量参数的方法。这包括从单个字节到整个结构体的所有内容。\n\
    \n要创建一个`NSInvocation`对象，必须首先获取该方法的`NSMethodSignature`。\n\n任何对象在收到`-methodSignatureForSelector:`消息时，都会返回其某个方法的签名。如果没有代表对象，则向`Class`对象发送`+instanceMethodSignatureForSelector:`消息。一旦获取了方法的`NSMethodSignature`，就可以使用`+invocationWithMethodSignature:`创建一个`NSInvocation`对象。\n\
    \n目标、参数值和返回值是单独设置的，并持久保存在`NSInvocation`对象中。这与 Java 不同。在 Java 中，`Method`对象在调用`invoke()`时被传递目标对象和所有参数，该方法在返回后不会保留关于此次调用的任何信息。\n\
    \n`NSInvocation`的参数和返回值通过`-setArgument:atIndex:`一次配置一个。每个参数值都是通过向`-setArgument:atIndex:`传递参数值的地址（而不是要传递的值）来设置的。即使对于对象指针值也是如此；传递指向对象指针的指针，而不是指针本身。`NSInvocation`利用其对参数类型的了解，将该地址处的值复制到参数流中。\n\
    \n清单 6-8 演示了如何使用`NSInvocation`向`NSString`对象发送`-substring:`消息，以及 Java 中功能等效的代码。\n\
    \n**清单 6-8.** 面向对象的方法调用\n\n**Java**\n\n```\ntry {\n    String prose = \"Do nine\
    \ men interpret?\";\n\n    // Get Method for String.substring(int,int)\n    Class[]\
    \ paramTypes = { int.class, int.class };\n    Method method = prose.getClass().getMethod(\"\
    substring\", paramTypes);\n\n    // Invoke prose.substring(3,7)\n    Object[]\
    \ paramValues = { new Integer(3), new Integer(7) };\n    String count = (String)method.invoke(prose,\
    \ paramValues);\n\n    System.out.println(count + \" men, I nod.\");\n}\ncatch\
    \ (Exception e) {\n    e.printStackTrace();\n}\n```\n\n**Objective-C**\n\n```\n\
    NSString *prose = @\"Do nine men interpret?\";\nNSMethodSignature *signature;\n\
    NSInvocation *invocation;\nNSString *count;\n\n// Create invocation for -[NSString\
    \ substringWithRange:] method\nsignature = [prose methodSignatureForSelector:@selector(substringWithRange:)];\n\
    invocation = [NSInvocation invocationWithMethodSignature:signature];\n\n[invocation\
    \ setSelector:@selector(substringWithRange:)];\n\n// Set range structure as first\
    \ parameter (after self and _cmd)\nNSRange range = NSMakeRange(3,4);\n[invocation\
    \ setArgument:&range atIndex:2];\n\n// Invoke method and extract the return value\n\
    [invocation invokeWithTarget:prose];\n[invocation getReturnValue:&count];\n\n\
    NSLog(@\"%@ men, I nod.\", count);\n```\n\n与 Java 的`Method`对象不同，`NSInvocation`不执行任何形式的参数类型转换。必须向`-setArgument:atIndex:`传递一个指向方法所期望的精确类型变量的指针。在清单\
    \ 6-8 的 Java 示例中，参数类型被指定为`int.class`，但作为参数传递的值是`Integer`对象。Java 知道在将`Integer`对象传递给`substring(int,int)`方法之前，必须将其转换为原始的`int`值。`NSInvocation`不执行此类转换。如果某个方法期望一个`int`参数，那么传递给`-setArgument:atIndex:`的值必须是一个指向包含要发送值的原始`int`变量（`&myValue`）的指针。\n\
    \n变量参数的索引从 2 开始。前两个参数始终是传递给每个方法的隐藏的`self`和`_cmd`参数。使用`-setTarget:`和`-setSelector:`来配置这两个属性。为方便起见，`-invokeWithTarget:`通过单条消息设置目标并调用方法。\n\
    \n可能会觉得奇怪，为什么必须配置将要发送的方法？毕竟，一开始就是使用方法选择器来创建`invocation`对象的。这是因为`NSMethodSignature`不与特定消息相关联，它只定义参数的“形状”。可以重新配置`NSInvocation`，以发送期望相同类型、数量和顺序参数的不同消息。例如，可以创建一个单一的`NSInvocation`对象，向监听器发送带有四个参数的回调消息，但让服务的客户端选择他们想要接收的消息。只要客户端的方法期望正确的参数，他们就可以灵活地创建任何名称的方法。你的代码可以高效地重用单个`NSInvocation`对象来处理所有回调。\n\
    \n## 直接调用方法\n\n你编写的每个方法最终都会被编译成一个静态的 C 函数。指向这些函数的指针填充了每个`Class`对象的调度表。\n\n编译器隐藏了这些函数的名称，因此你永远不会接触到它们。但\
    \ Objective-C 会提供每个函数的地址，从而可以直接调用方法——绕过所有常规的消息调度逻辑。这项技术有点专业，但如果你需要从其他编程语言调用 Objective-C\
    \ 方法，或者当消息调度对性能有显著影响时，它会非常有用。\n\n`-methodForSelector:`方法返回实现——方法代码的地址——当接收者收到该消息时将会执行该实现。类方法`+instanceMethodForSelector:`返回当实例收到该消息时名义上会执行的代码的地址。我在这里非常谨慎地选择了措辞。可以修改单个对象，使得当它收到一条消息时执行的代码，与另一个相同类的对象执行的代码不同，甚至与`Class`对象认为每个实例都会执行的代码不同。不要轻易假设一个对象的方法实现地址与另一个实例相同，或者等于`-[Class\
    \ instanceMethodForSelector:]`返回的地址。最安全的做法是查询单个对象以获取其实现地址，并且只为该对象使用该地址。\n"
- fmt: "# 排版后的内容\n\nRead Chapter 26（the “isa Swizzling” section）to get a better idea\
    \ about how and why an object’s methods might be dynamically altered.\n\nThe C\
    \ function generated for each method expects a receiver object pointer（`self`）and\
    \ a selector（`_cmd`）as the first two parameters. Any remaining parameters mirror\
    \ those defined by the method. Listing 6-9 demonstrates calling a method via its\
    \ implementation address.\n\n**Listing 6-9.** Calling a Method As a C Function\n\
    \n```\n@interface BezierPathMapper : NSObject {\n    NSBezierPath *path;\n}\n\
    @property (assign) NSBezierPath *path;\n- (BOOL)containsAnyPoint:(NSPoint*)pointArray\
    \ pointCount:(unsigned int)count;\n@end\n\n@implementation BezierPathMapper\n\
    @synthesize path;\n- (BOOL)containsAnyPoint:(NSPoint*)pointArray pointCount:(unsigned\
    \ int)count\n{\n    if (path==nil)\n        return NO;\n    // Get function address\
    \ of -[NSBezierPath containsPoint:]\n    typedef BOOL (*containsPointPtr)(id self,\
    \ SEL _cmd, NSPoint point);\n    containsPointPtr containsPointImpl =\n      \
    \  (containsPointPtr)[path methodForSelector:@selector(containsPoint:)];\n   \
    \ // Test every point in array by sending the path -containsPoint:\n    unsigned\
    \ int i;\n    for (i=0; i<count; i++)\n        if (containsPointImpl(path,@selector(containsPoint:),pointArray[i])!=NO)\n\
    \            return YES;\n    return NO;\n}\n@end\n```\n\nThe `-containsAnyPoint:pointCount:`\
    \ method of `BezierPathMapper` tests a sequence of coordinates to see if any reside\
    \ inside its path property. The method begins by getting the implementation address\
    \ of the path’s `-containsPoint:` method. The crazy syntax you see surrounding\
    \ this is how you declare a pointer to a function in C. The type consists of a\
    \ complete function prototype describing the function’s parameters and return\
    \ type （`BOOL foo(id self, SEL _cmd, NSPoint point)`）, with the name of the function\
    \ replaced with a pointer declaration （`(*containsPointPtr)` replaces `foo`）.\n\
    \nThe result is a variable that points to a function with that prototype. In a\
    \ `typedef` statement, it results in a new pointer type. In Listing 6-9, a `typedef`\
    \ is used so the entire function prototype doesn’t have to be repeated when casting\
    \ the value returned by `-methodForSelector:`. C allows a function pointer variable\
    \ to be used as a function name, just as if there was a function named `containsPointImpl`.\n\
    \nThe receiver and selector parameters must be included in the call. While the\
    \ selector is often ignored, it’s always good programming practice to pass the\
    \ selector constant of the method being called.\n\nSince this technique bypasses\
    \ the dispatcher’s nil receiver test, this code must first make sure that the\
    \ function is never called for a nil path object—that would most likely cause\
    \ the program to crash.\n\nThe code in Listing 6-9 is principally to demonstrate\
    \ the technique. It’s unlikely to result in any significant performance gains,\
    \ even when testing thousands of points—mostly because the computations performed\
    \ by `-[NSBezierPath containsPoint:]` probably far outweigh the trivial overhead\
    \ of sending the message. Nevertheless, if the code executed by the method was\
    \ very fast, and it was called millions of times, this technique could save valuable\
    \ CPU time.\n\nIt should also be noted that calling a method directly might be\
    \ simpler and faster than trying to use an `NSInvocation`, particularly in situations\
    \ where the method being called has well-understood parameters.\n\n## Variable\
    \ Arguments\n\nOne trick that Java doesn’t have is variable arguments. Granted,\
    \ Java 1.5 added variable argument syntax, but that’s just syntactic sugar for\
    \ the way Java has always handled variable arguments. The programmer（pre-Java\
    \ 1.5）or the compiler（Java 1.5 and later）first creates an array to contain the\
    \ variable arguments, populates it with the parameters（wrapping primitive values\
    \ in objects）, and then passes the single array object to the method.\n\nVariable\
    \ arguments in Objective-C are far more direct and raw: the sender may supply\
    \ whatever additional parameters they want in the message. The additional parameters\
    \ are unaltered and are pushed onto the stack exactly like any other parameter.\
    \ The method parses the list of parameters programmatically when it executes.\
    \ The type, order, and meaning of those parameters are agreed on by convention.\
    \ Objective-C doesn’t impose any restrictions on them, nor does it supply any\
    \ type information about them. It’s up to the caller to supply the kind of parameters\
    \ the method is expecting.\n\n> **Note** Objective-C “borrows” variable arguments\
    \ from C. Everything in this section applies equally to plain old C functions.\n\
    \nTo declare a variable argument list, follow the last parameter variable name\
    \ with a comma and three periods（an ellipsis, but don’t use the Unicode ellipsis\
    \ character）. When invoked, the named parameters may be followed by additional\
    \ comma-separated parameters. There is no limit on the number or kind of additional\
    \ parameters. The parameters sent to the method form a kind of data stream. The\
    \ values of each parameter are extracted serially using special library functions.\
    \ The process is loosely analogous to using a `java.io.ObjectInputStream` to read\
    \ a sequence of serialized values.\n\nTwo commonly used Cocoa methods that accept\
    \ variable arguments are demonstrated in Listing 6-10. The `+[NSArray arrayWithObjects:...]`\
    \ method creates a new `NSArray` object pre-populated with the objects passed\
    \ as parameters. The `+[NSString stringWithFormat:...]` method creates strings\
    \ using a format string. The format string includes placeholders that are replaced\
    \ with the values of the additional parameters. The example code shown in Listing\
    \ 6-10 returns the string “Dark toast will take 45 seconds.”\n\n**Listing 6-10.**\
    \ Variable Argument Methods in Cocoa\n\n```\n@interface NSArray\n+ (id)arrayWithObjects:(id)firstObj,\
    \ ...\n@end\n\n@interface NSString\n+ (id)stringWithFormat:(NSString*)format,\
    \ ...\n@end\n\n...\nint toastTimes[] = { 8, 22, 35, 45, 60, 90 };\nNSArray *toastDescriptions\
    \ = [NSArray arrayWithObjects:@\"Warm\",\n                                   \
    \                      @\"Light\",\n                                         \
    \                @\"Medium\",\n                                              \
    \           @\"Dark\",\n                                                     \
    \    @\"Very dark\",\n                                                       \
    \  @\"Burnt\",\n                                                         nil];\n\
    int level = 3;\nint secs = toastTimes[level];\nNSString *desc = [toastDescriptions\
    \ objectAtIndex:level];\nreturn [NSString stringWithFormat:@\"%@ toast will take\
    \ %d seconds.\",desc,secs];\n```\n\nA method with variable arguments must assume\
    \ the number and type of the parameters in the list. The parameter list doesn’t\
    \ include any type information or end-of-list indicator; it’s just a raw sequence\
    \ of bytes formed when the parameter values were pushed onto the stack. Consequently,\
    \ the method must either assume the parameter types or infer them using information\
    \ supplied in the named parameters.\n\nThe two Cocoa methods shown in Listing\
    \ 6-10 demonstrate the two most common solutions to this problem. The `+arrayWithObjects:`\
    \ method assumes that all of the additional parameters will be object pointers\
    \ and the list is terminated by a final `nil` parameter.\n\nThe `+stringWithFormat:`\
    \ method uses the format parameter to infer the sequence of parameter values that\
    \ follow. The format string is scanned for format specifications. The first specification\
    \ (`%@`) is an object formatter. This tells `+stringWithFormat:` that the first\
    \ additional parameter is a pointer to an object. The `%@` is replaced with the\
    \ `-description`（`toString()`）value of the object. The next specification encountered\
    \ is `%d`, indicating that the next parameter is a signed int（`d` stands for decimal）.\
    \ It extracts one `int` from the parameter stream and continues, until all of\
    \ the format specifications in the string have been replaced.\n\nIn both cases,\
    \ a programmer’s agreement exists between the method and the caller. `+arrayWithObjects:`\
    \ assumes that only object pointers are passed, terminated with a `nil` pointer."
