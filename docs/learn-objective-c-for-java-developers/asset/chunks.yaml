    Animation


    Core Animation, a recent addition to Mac OS X, has created an entirely new family
    of view objects, specifically designed to animate the user interface. The new
    framework makes it remarkably easy to add very sophisticated animations to your
    application.


    The Core Animation classes are actually modeled a little closer to Swing than
    the traditional Cocoa view classes. For example, Core Animation views use layout
    managers. There are a number of important concepts to grasp when adding animation
    to your view objects:


    • The central player in Core Animation is the CALayer class. This is logically
    equivalent to NSView, but the two are not interchangeable. A layer has a size,
    position, content, and acts as a container for any number of sublayers.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    • CALayer objects are functional view objects, capable of drawing basic data types,
    like images and text, on their own. To create a custom layer, you can either subclass
    CALayer (much like NSView) or defer drawing to a delegate object. Much like Java’s
    paint(Graphics) method, the


    -[CALayer drawInContext:] is passed the graphics context reference that should
    be used for drawing. The clipping bounds of the context contains the region that
    needs to be redrawn.


    • To add animated objects to your NSView, set the root CALayer object in the NSView’s
    layer property, then send it -setWantsLayer: passing YES. The NSView then becomes
    the host to a hierarchy of CALayer objects, much the way NSWindow hosts a root
    contentView object.


    • Animations occur by transitioning from one state to another; most animations
    are created by simply setting a property and letting Core Animation do the rest.
    For example, setting the size of a layer object spontaneously creates an animation
    that smoothly transitions the view from its old size to its new one.


    • The layer objects you add to a view are collectively called the layer-tree.
    Core Animation creates a parallel set of objects, initially copies of the ones
    you added, collectively called the presentation-tree. Presentation objects hold
    the properties that are being animated. In the example of changing the size of
    a layer, the size of the layer-tree object changes immediately.


    The size of its presentation object changes over time as the animation progresses.
    You can examine a layer’s presentation object—say, to obtain the current position
    of a moving object—


    by sending it a -presentationLayer message.


    • Setting a new layer object property creates implicit animation. You can take
    control of this by creating explicit animations. This gives you control of animation
    attributes, like speed and acceleration. One common use of explicit animations
    is to suppress the animation altogether, allowing you to change layer properties
    without animating them.


    • Unlike NSView, CALayer employs a layout manager object, conforming to the informal
    CALayoutManager protocol, to reposition and resize layers. Core Animation provides
    the CAConstraintLayoutManager, which is very similar to javax.swing.SpringLayout.


    • Core Animation uses Quartz and Core Graphics data types, rather than the Cocoa
    data types discussed so far. Most data types are easy to translate; for example,
    there are NSRectToCGRect() and NSRectFromCGRect() functions that convert between
    NSRect and CGRect structures. Other data types, like NSImage and CGImage, are
    not so easy to translate. This, unfortunately, adds a certain degree of tedium
    to using animation in a Cocoa application.


    The TicTacToe project demonstrates using both implicit and explicit animations.
    For example, simply removing an object from its view creates an implicit animation
    that causes the view to fade out smoothly—rather than simply blinking out of existence.


    [xoLayer removeFromSuperlayer]; // (fade out)


    Making property changes between the statements [CATransaction begin] and [CATransaction
    commit] forms an explicit animation. You can set properties of the animation,
    like speed, or suppress animation altogether before the -commit message groups
    and queues the animation effects to begin.


    If you want to learn more about animation, refer to the Core Animation Programming
    Guide.5


    5 Apple Inc., Core Animation Programming Guide, http://developer.apple.com/documentation/


    Cocoa/Conceptual/CoreAnimation_guide/, 2008.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    iPhone View Classes


    If you’re targeting the iPhone OS, you’ll be using a completely different set
    of view classes: UIView instead of NSView, UIWindow instead of NSWindows, etc.
    However, they are conceptually very similar to their Cocoa counterparts:


    • UIView is functionally the same as NSView. The main properties, such as frame,
    bounds, and subviews, are the same.


    • Customizing a UIView is almost identical to customizing an NSView except that
    the drawing context is a Quartz 2D drawing destination. All drawing is done using
    Core Graphics C


    functions, like those described in the “Drawing Tools” section. The concepts and
    capabilities (coordinate systems, clipping, Bezier paths, colors, graphic context
    stacks, etc.) are nearly identical to those described for NSGraphicsContext—there’s
    just no object-oriented interface.


    • UIViews are designed to be animated and come with a permanently installed CALayer
    object.


    • The iPhone OS conforms to the MVC design pattern more rigorously than the Cocoa
    framework. Almost every iPhone interface requires a UIViewController object. The
    framework also provides a number of specialized subclasses, like UINavigationController
    and UITabBarController. These are the classes that control your view objects and
    are the natural place to add your application’s functionality. You can use or
    subclass these classes as you please.


    • Unlike NSCell, UICell is a subclass of UIView. So cell objects in the iPhone
    OS are fully functional views that can be animated and can contain subviews. You
    can also design them in Interface Builder.


    • Many common user interface elements that you’re familiar with in Swing, like
    menu bars, multiple windows, file chooser dialogs, and so on, simply do not exist
    in the iPhone OS.


    Conversely, the iPhone OS provides many unique interface objects. While your knowledge
    of Objective-C will give you tools to create iPhone applications, you’ll want
    to review Apple’s guides that describe how iPhone user-interface design differs
    from that of traditional desktop applications.


    Advanced View Topics


    Graphics programming in Cocoa is an expansive subject, worthy of an entire book
    itself. In addition to the basic NSView classes discussed so far, here are some
    advanced topics you should be aware of:


    • You can perform off-screen drawing into an NSImage. Create an NSImage with the
    desired properties, and then send it a -lockFocus message. This sets up the current
    graphics context with the NSImage as its output device. Subsequent drawing commands
    will be rendered directly in the NSImage. Send -unlockFocus when you’re done drawing.'
