    \n## 总结\n\nObjective-C 提供了多种通信技术，反映了现代应用面临的各种通信问题。从简单的通知到分布式对象，你选择的解决方案取决于你要解决的问题类型。在大多数情况下，Objective-C\
    \ 的解决方案与你熟悉的 Java 方案相似，尽管实现细节可能有显著差异。\n\n---\n\n# 第 14 章：异常处理\n\nObjective-C 的异常处理能力与\
