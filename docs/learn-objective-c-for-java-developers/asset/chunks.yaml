- fmt: "### Adding Sequential Archive Support to Your Class\n\nAdding sequential archive\
    \ support, which includes distributed objects, is almost identical to adding keyed\
    \ archive support, with two exceptions:\n\n- Sequential archiving uses the sequential\
    \ encoding methods in Table 12-2.\n- The order and type of properties encoded\
    \ in `-encodeWithCoder:` must exactly match the order and type that they are decoded\
    \ in `-initWithCoder:`. Unlike keyed encoding, you cannot ignore values or decode\
    \ them in a different order than they were encoded.\n\nYou’ll notice that there\
    \ are far fewer sequential encoding methods. Most obvious is the lack of methods\
    \ for encoding the primitive C types. That’s because sequential encoders provide\
    \ the catch-all `-encodeValueOfObjCType:at:` method. This takes an encoded C variable\
    \ type string (generated using the `@encode()` directive), and the address of\
    \ a variable. To encode the `duration` property in Listing 12-4, you would write\
    \ `[encoder encodeValueOfObjCType:@encode(NSTimeInterval) at:&duration]`. While\
    \ it’s conceivable to pass the type string of any C type—say, for an arbitrary\
    \ structure like `@encode(RoomIdentifier)`—coders normally only implement the\
    \ primitive types defined by the language. In the previous example, `NSTimeInterval`\
    \ is synonymous with `double` so `@encode(NSTimeInterval)` and `@encode(double)`\
    \ are interchangeable. You can encode an entire array of primitive values using\
    \ `-encodeArrayOfObjCType:count:at:`.\n\n### Supporting Both Keyed and Sequential\
    \ Archiving\n\nBut what if you want your class to support keyed archiving, sequential\
    \ archives, and distributed objects? It’s easy: send the coder an `-allowsKeyedCoding`\
    \ message to determine if it supports keyed archiving, and then use the appropriate\
    \ coder methods. An expanded implementation of the `ScheduledEvent` class that\
    \ supports both keyed and sequential archiving is shown in Listing 12-5.\n\n**Listing\
    \ 12-5.** Class Supporting Keyed and Sequential Archiving\n\n```\n- (id)initWithCoder:(NSCoder*)decoder\n\
    {\n    self = [super init];\n    if (self != nil) {\n        if ([decoder allowsKeyedCoding])\
    \ {\n            startTime = [decoder decodeObjectForKey:@\"Start\"];\n      \
    \      duration = [decoder decodeDoubleForKey:@\"Duration\"];\n            room.buildingNo\
    \ = [decoder decodeInt32ForKey:@\"Room.building\"];\n            room.roomNo =\
    \ [decoder decodeInt32ForKey:@\"Room.number\"];\n        } else {\n          \
    \  startTime = [decoder decodeObject];\n            [decoder decodeValueOfObjCType:@encode(NSTimeInterval)\
    \ at:&duration];\n            [decoder decodeValueOfObjCType:@encode(unsigned\
    \ int) at:&room.buildingNo];\n            [decoder decodeValueOfObjCType:@encode(unsigned\
    \ int) at:&room.roomNo];\n        }\n    }\n    return self;\n}\n\n- (void)encodeWithCoder:(NSCoder*)encoder\n\
    {\n    if ([encoder allowsKeyedCoding]) {\n        [encoder encodeObject:startTime\
    \ forKey:@\"Start\"];\n        [encoder encodeDouble:duration forKey:@\"Duration\"\
    ];\n        [encoder encodeInt32:room.buildingNo forKey:@\"Room.building\"];\n\
    \        [encoder encodeInt32:room.roomNo forKey:@\"Room.number\"];\n    } else\
    \ {\n        [encoder encodeObject:startTime];\n        [encoder encodeValueOfObjCType:@encode(NSTimeInterval)\
    \ at:&duration];\n        [encoder encodeValueOfObjCType:@encode(unsigned int)\
    \ at:&room.buildingNo];\n        [encoder encodeValueOfObjCType:@encode(unsigned\
    \ int) at:&room.roomNo];\n    }\n}\n```\n\nSequential coders do not implement\
    \ any of the `…forKey:` methods, and attempting to send one will raise an exception.\
    \ Similarly, keyed coders don’t implement any of the sequential methods, so make\
    \ sure you know which kind of coder you are using.\n\nIf you want to programmatically\
    \ limit your object’s archive support, you can conditionally raise an exception\
    \ in your `-encodeWithCoder:` method. The class in Listing 12-6 supports both\
    \ keyed and sequential archiving, but will not allow itself to be copied through\
