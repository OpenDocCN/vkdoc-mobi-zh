    \ `nil` 将抑制更新。\n*   `Delegate` 对象：如果设置了委托，则查询委托；否则使用默认答案。这是缺席行为和与“无”的一致性设计的结合，将在下文中讨论。\n\
    \n代码清单 7-5 展示了一个简单的 FIFO 栈类，它可以以线程安全的方式运行，但仅在应用程序需要它线程安全时才如此。\n\n**代码清单 7-5.**\
    \ 缺席对象行为\n\n```\n@interface AutoSafeFIFO : NSObject {\n    NSMutableArray *stack;\n\
    @private\n    NSLock *lock;\n}\n- (void)push:(id)object;\n- (id)pop;\n- (BOOL)hasObjects;\n\
    - (void)makeThreadSafe;\n@end\n\n@implementation AutoSafeFIFO\n\n- (id)init\n\
    {\n    self = [super init];\n    if (self != nil) {\n        stack = [NSMutableArray\
    \ new];\n    }\n    return self;\n}\n\n- (void)push:(id)object\n{\n    [lock lock];\n\
    \    [stack addObject:object];\n    [lock unlock];\n}\n\n- (id)pop\n{\n    id\
    \ object = nil;\n    [lock lock];\n    if ([stack count] != 0) {\n        object\
    \ = [stack objectAtIndex:0];\n        [stack removeObjectAtIndex:0];\n    }\n\
    \    [lock unlock];\n    return object;\n}\n\n- (BOOL)hasObjects\n{\n    [lock\
    \ lock];\n    BOOL answer = ([stack count] != 0);\n    [lock unlock];\n    return\
    \ answer;\n}\n\n- (void)makeThreadSafe\n{\n    lock = [NSLock new];\n}\n\n@end\n\
    ```\n\n`lock` 对象初始为 `nil`，因此所有发送给 `lock` 和 `unlock` 的消息都不会执行任何操作。这提供了最佳性能，但牺牲了线程安全。为了在多线程环境中安全地运行，`-makeThreadSafe`\
    \ 方法将 `lock` 属性设置为一个真正的 `NSLock` 对象。一旦设置，`lock` 和 `unlock` 消息现在会发送给 `NSLock` 对象，从而提供所需的线程同步。\n\
    \n## 与“无”的一致性\n\n设计您的类属性，使得 `nil` 或 `0` 的值与“无”对象的概念保持一致。通常，这意味着定义表达正面属性（而非负面属性）的属性——这通常是一个好习惯。在代码清单\
    \ 7-5 中，`AutoSafeFIFO` 类定义了 `-(BOOL)hasObjects`。您可能想定义一个 `-(BOOL)isEmpty` 方法。但如果接收器是\
    \ `nil`，`isEmpty` 将返回 `NO`，这暗示着 `nil` 对象拥有对象，而显然它并没有。\n\n## 没有免费的午餐\n\nObjective-C\
    \ 对 `nil` 接收器的处理可以使您的代码更简单、更安全、更优雅。然而，这并不意味着 `nil` 在任何对象指针所在的地方都是普遍可接受的。正如您已经看到的，尝试使用\
    \ `nil` 对象指针访问成员值将导致程序突然终止。大多数接受对象指针的方法参数通常期望一个对象，而不是 `nil`。例外情况通常会在文档中说明。\n\n\
    例如，大多数 Cocoa 集合类——就像 Java 一样——不允许将 `nil` 对象作为值存储或用作键。因此，虽然向 `nil` 接收器发送 `-addObject:`\
    \ 消息是完全安全的，但语句 `[array addObject:nil]` 会抛出一个运行时异常（当然，前提是 `array` 不是 `nil`）。\n\n\
    ## 总结\n\n以 Java 背景出身，我可以告诉您，拥抱 `nil` 接收器需要一些时间来适应。有一种潜意识的、近乎本能的趋势，即在设计的每个步骤以及编写代码时都避免空引用。学习如何利用\
    \ `nil` 对象为您带来好处需要一些练习，但最终是值得的。\n\n---\n\n# 第二部分\n\n## 转换技术\n\n---\n\n# 第八章\n\n\
    ## 字符串和原始值\n\nJava 和 Objective-C 对原始值的处理方法非常相似。两者都对原始标量值（即数字）和数组提供了直接的语言支持。两者都提供了一组“包装器”对象，当原始值需要被当作对象处理时，它们可以封装这些原始值。两者都提供了声明字符串对象字面量的语法。\n\
    \n本章介绍了用于在对象和字符串类中“包装”原始值的类。本章的其余部分将重点介绍字符串的转换和格式化。\n\n### 包装标量原始值\n\n与 Java 类似，Objective-C\
    \ 变量可以大致分为原始标量值和对象引用值。要将整数值传递给一个期望对象的方法，您必须将原始值“包装”或“装箱”到一个封装了原始值的对象中。与 Java 一样，Objective-C\
    \ 提供了一组专门用于包装原始 C 变量类型的类。标量值类型已在第二章中列出。表 8-1 列出了这些类型的包装器对象。\n\n**表 8-1.** 原始标量类型包装器类\n\
    \n| Java 类型 | Java | Objective-C |\n|-----------|------|-------------|\n| `boolean`\
    \ | `new Boolean(x)` | `[NSNumber numberWithBool:x]` |\n| `byte` | `new Byte(x)`\
    \ | `[NSNumber numberWithChar:x]` |\n| `char` | `new Character(x)` | `[NSNumber\
    \ numberWithUnsignedShort:x]` |\n| `short` | `new Short(x)` | `[NSNumber numberWithShort:x]`\
    \ |\n| `int` | `new Integer(x)` | `[NSNumber numberWithInteger:x]` |\n| `long`\
    \ | `new Long(x)` | `[NSNumber numberWithLongLong:x]` |\n| `float` | `new Float(x)`\
    \ | `[NSNumber numberWithFloat:x]` |\n| `double` | `new Double(x)` | `[NSNumber\
    \ numberWithDouble:x]` |\n\n我相信您会注意到表 8-1 中的规律。Java 为每种标量类型提供了单独的类，而 Objective-C\
    \ 则使用单一的 `NSNumber` 类来封装所有数字类型。在内部，`NSNumber` 以其原始形式存储原始值的副本。\n\n为简洁起见，表 8-1 中省略了用于无符号整数的并行构造方法集，但它们都遵循相同的形式：`-[NSNumber\
    \ numberWithUnsignedChar:]`、`-[NSNumber numberWithUnsignedShort:]`，等等。\n\n###\
    \ 标量类型转换\n"
- fmt: '# Getting the original primitive value from a wrapper in Objective-C


    Getting the original primitive value from a wrapper in Objective-C, or obtaining
    an equivalent primitive value of a different type, is much as it is in Java. The
    `NSNumber` class has several conversion methods that return the best possible
    representation of the original value. These are listed in Table 8-2.


    **Table 8-2.** *Primitive Type Conversion*


    | Java Type | Java | Objective-C |

    |-----------|------|-------------|

    | boolean | `value.booleanValue()` | `[value boolValue]` |

    | byte | `value.byteValue()` | `[value charValue]` |

    | char | `value.charValue()` | `[value unsignedShortValue]` |

    | short | `value.shortValue()` | `[value shortValue]` |

    | int | `value.intValue()` | `[value integerValue]` |

    | long | `value.longValue()` | `[value longLongValue]` |

    | float | `value.floatValue()` | `[value floatValue]` |

    | double | `value.doubleValue()` | `[value doubleValue]` |


    Because the single `NSNumber` class performs all primitive scalar type conversions,
    type conversion is orthogonal in Objective-C; any `NSNumber` object will return
    its value as a `BOOL`, `char`, `integer`, or floating-point value. This symmetry
    is broken in Java, where the `Boolean` class does not include an `intValue()`
    method, the `Character` class does not include a `boolValue()` method, etc.


    Conversion generally follows the rules for native type conversions in C. That
    is, asking an `NSNumber` for its `intValue` is no different than casting the original
    value to `int`, as in `(int)original`. No exceptions are raised (thrown) if the
    requested type cannot represent the original value.


    ## Converting Strings to Scalars


    In Java, each wrapper class has several methods for parsing strings and interpreting
    its scalar value, returning either a primitive type or an object. For example,
    the `java.lang.Integer` class has a string constructor (`Integer(String)`), a
    static method that takes a string and returns an integer primitive (`parseInt(String)`),
    and a static method that takes a string and returns an `Integer` object (`valueOf(String)`).
    The `Boolean`, `Character`, `Short`, `Float`, and `Double` classes contain similar
    methods.


    In Objective-C, the `NSString` class implements the same scalar conversion methods
    listed in Table 8-2. Send a string object the `-intValue` message to interpret
    it as an integer. Send it `-floatValue` to interpret it as a float. To convert
    a string into an `NSNumber` object, create one from the converted value, as in
    `[NSNumber numberWithInt:[string intValue]]`.


    Hexadecimal strings can be converted using the `NSScanner` object. `NSScanner`
    is a general purpose utility class for parsing strings. To convert a string containing
    a hexadecimal number into an integer, create a scanner for the string then parse
    it using the `-[NSScanner scanHexInt:]` method, as illustrated in Listing 8-1.


    **Listing 8-1.** Converting a Hexadecimal String Into an Integer


    ```

    unsigned int i;

    NSScanner *scanner = [NSScanner scannerWithString:@"cafe1234"];

    [scanner scanHexInt:&i];

    ```


    `NSFormatter` provides yet another, and progressively more sophisticated, means
    of converting a string into a number. While typically used to turn numbers into
    strings, `NSFormatters` are bidirectional and will convert strings back into scalar
    values as well. `NSFormatters` are discussed later in this chapter in the “Formatting”
    section.


    The Cocoa framework classes contain no general purpose numeric conversion for
    arbitrary radixes, like Java’s `java.lang.Integer.parseInt(String s, int radix)`.
    Formatting conversions support octal, decimal and hexadecimal only. Arbitrary
    base conversion can be accomplished using the C library function `strtol(…)`.
    This would require converting the Objective-C string object into a C string—covered
    later in this chapter—and then passing that to the `strtol(…)` function, or one
    of its relatives.


    ## Wrapping Arrays


    In Java, arrays are already objects so the language doesn’t need a wrapper class
    for them. Native arrays in Objective-C are not objects, but they can be wrapped
    with the `NSData` class. `NSData` provides a generic wrapper for any amorphous
    block of memory. `NSData` is particularly convenient for isolating you from the
    underlying C memory allocation functions, letting you create and manage large
    structures and native C arrays as if they were objects.


    `NSData` encapsulates an immutable array of bytes. The `NSMutableData` subclass
    manages a modifiable array of bytes. `NSData` provides methods to obtain the size
    and starting address of the byte array. `NSMutableData` extends `NSData` with
    methods to adjust the size of the array, and the ability to append, replace, and
    remove bytes. Table 8-3 lists the common ways of creating `NSData` objects.


    **Table 8-3.** *Common `NSData` Constructors*


    | Method | Purpose |

    |--------|---------|

    | `+[NSData dataWithBytes:length:]` | Creates a new `NSData` object that contains
    a copy of the memory at the given address and length. |

    | `+[NSData dataWithBytesNoCopy:length:]` | This constructor wraps an `NSData`
    object around a block of memory allocated using one of the C `malloc(…)` functions—low
    level C memory management. The object assumes responsibility for the memory block
    and releases it when the object is destroyed. This is a most efficient way to
    turn a C allocated block of memory into an Objective-C object. |

    | `+[NSData dataWithBytesNoCopy:length:freeWhenDone:]` | If the `freeWithDone:`
    argument is `YES`, this method is equivalent to `+[NSData dataWithBytesNoCopy:
    length:]`. If the argument is `NO`, it wraps an existing block of memory with
    an `NSData` object. The new object simply refers to the original address and length
    given to it during construction. It is the responsibility of the programmer to
    ensure that the memory it refers to is valid for the lifetime of the `NSData`
    object. This constructor is particularly useful in avoiding the performance penalty
    of making a copy of the data. |

    | `+[NSData dataWithContentsOf…:]` | Creates an `NSData` object that contains
    a copy of the raw data contained in the target. This family of convenience constructors
    includes `+dataWithContentsOfFile:`, `+dataWithContentsOfURL:`, and so on. |

    | `+[NSData dataWithData:]` | Creates a new `NSData` object that’s a copy of an
    existing `NSData` object. |

    | `+[NSMutableData data]` | Creates a zero-length `NSMutableData` object. |

    | `+[NSMutableData dataWithLength:]` | Creates a mutable byte array wrapper of
    the given length, filled with zeros. |


    Since `NSMutableData` is a subclass of `NSData`, all of the `NSData` constructors
    apply equally to `NSMutableData`, such as using `[NSMutableData dataWithData:data]`
    to create a mutable copy of an existing `NSData` object. In fact, the `+data`
    constructor is actually defined by `NSData`, where it has limited utility.


    In principle, the contents of an `NSData` object are immutable. In reality, there
    is nothing (beyond hardware) that prohibits its contents from being modified.
    The `-[NSData bytes]` method returns the address of the first byte in the array.
    Once obtained, there is nothing preventing you from modifying any of the values
    at that address. I prefer to construct `NSData` objects for memory that I do not
    intend to modify, and `NSMutableData` objects for modifiable memory, but there’s
    nothing that dictates this in practice.


    `NSData` objects treat their contents as a single contiguous byte array. You will
    often want to treat it as something else—an array of some other type or a structure.
    Listing 8-2 demonstrates the use of `NSMutableArray` to store an array of `NSPoint`
    structures.


    **Listing 8-2.** Using `NSMutableData` to Wrap an Array of Structures


    ```

    NSArray *objects = ... // array of objects with a coordinate

    unsigned int count = [objects count];

    NSMutableData *data = [NSMutableData dataWithLength:count*sizeof(NSPoint)];

    NSPoint *points = (NSPoint*)[data bytes];

    unsigned int i;

    [data retain];

    ```'
