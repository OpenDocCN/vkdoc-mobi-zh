    ## Encouraging Garbage Collection


    You normally do not need to interact with the garbage collection system directly.
    If you do, the `NSGarbageCollection` class provides an object-oriented interface
    to the service. As in Java, there are methods that will encourage the garbage
    collector to start collecting objects. These methods don’t force the garbage collector
    to do anything—for example, it might have just finished collecting objects, so
    collecting again would be waste of time. It just suggests to the GC that it might
    be an opportune time to do so.


    In addition, you can temporarily disable garbage collection in Objective-C by
    sending the`-disable` message. You might do this during an extremely performance-sensitive
    section of code, but I won’t suggest leaving it off for very long. Send an `-enable`
    message to resume collection. The common methods for controlling the garbage collector
    are listed in Table 9-3.


    ***Table 9-3.** Garbage Collector Control Methods*


    | Met ho d | Des cr ipti on |

    | --- | --- |

    | `+[NSGarbageCollector defaultCollector]` | Returns the singleton instance of
    `NSGarbageCollector` for your process. |

    | `-[NSGarbageCollector disable]` | Turns off garbage collection. |

    | `-[NSGarbageCollector enable]` | Starts garbage collection again after sending
    `-disable`. Each `-disable` must be balanced by one `-enable`. |

    | `-[NSGarbageCollector collectIfNeeded]` | Suggests that the garbage collector
    begin a collection cycle if the memory consumption thresholds have been exceeded.
    |

    | `-[NSGarbageCollector collectExhaustively]` | Suggests that the garbage collector
    begin a complete and thorough collection cycle. |


