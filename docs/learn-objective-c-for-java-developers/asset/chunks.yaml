    Objective-C has recently acquired some new collection classes: NSPointerArray,
    NSMapTable, and NSHashTable. These classes are inherently mutable and are more
    like the Java collection classes in that respect. They all have the ability to
    be “programmed” with a particular personality, such as maintaining weak references
    to objects, allowing memory blocks or primitive integers to be used as values,
    or permitting nil object pointers to be stored. The differences between these
    new classes and the old ones are detailed in the sections that discuss them.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16 ■ COLLECTION PATTERNS


    Ordered Collections


    NSArray, NSMutableArray, and NSPointerArray organize ordered collections of values,
    equivalent to java.util.ArrayList. Specifically, Objective-C and Java array classes
    have these common features:


    • Values in the collection are object references.


    • Values are addressed by index.


    • The same value can be stored at more than one index.


    • New values can be appended to the end of the array, or inserted at an existing
    index pushing existing values up one index. Values cannot be inserted beyond the
    end of the array.


    • Removing a value shifts all subsequent values down to occupy the vacated index.


    • NSArray collections can be searched to locate the index of a known value.


    There are a number of key differences:


    • NSArray objects cannot be used to store nil (null) values. Consequently, operations
    that would pad the array with nil values, like -setCount:, are not implemented.


    • NSPointerArray objects will not search their content for values. Thus, methods
    like


    -containsObject, indexOfObject:, and removeObject: are not implemented. You can
    iterate over its content to find values.


    • NSPointerArray can store much more than object pointer values.


    • An NSMutableArray can be initialized with a predetermined capacity. But beyond
    that, the capacity of the array is opaque, save for the single -compact method
    implemented by NSPointerArray.


    Common Methods


