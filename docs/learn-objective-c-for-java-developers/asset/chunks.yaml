    the common ways to create new objects. Variable r1 is assigned a new object, allocated
    and initialized without any parameters, equivalent to the Java statement r1 =
    new RandomSequence().


    The r2 variation calls an alternate initializer, passing additional parameters
    for use in initializing the object. Like Java, you can create whatever additional
    initializers (constructors) your class needs.


    The shorthand form used to create object r3 is functionally identical to the one
    used to create r1\. The root NSObject class implements a +(id)new class method
    that first calls +(id)alloc and then sends the newly created object the -(id)init
    method before returning. It’s only useful for creating an object that can be constructed
    using its -(id)init method (i.e., no parameters), but it does save a little code.


    ■Caution Object constructor customization is always accomplished by overriding
    or defining -(id)init…


    methods for the class. Never override or attempt to intercept the +(id)alloc or
    +(id)new class methods.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ WELCOME TO OBJECTIVE-C


    Writing an init Method


    To write an Objective-C initializer (constructor), your method must fulfill a
    four-part contract: 1.


    The initializer must call its superclass initializer.


    2.


    It must update its self variable.


    3.


    It must check for a nil object.


    4.


    It must return the pointer to itself.


    The first two parts of the contract are satisfied by the statement self = [super
    init]. It should be obvious that every initializer must call its superclass initializer
    before proceeding. In Java, this convention is guaranteed by the language. In
    Objective-C, you’re responsible for calling it.


    Updating self might seem bizarre to a Java programmer, but it’s key to something
    called class clusters. Class clusters are explained in detail in Chapter 22\.
    You might be tempted to leave the assignment to self out. Don’t. The code is actually
    smaller and faster if you leave it in, and you won’t violate the class cluster
    contract.'
  trans: "\n# Objective-C 中的类方法与对象构造\n\n在 `+(NSNumber*)number` 方法体中，`self` 变量指向类对象（`RandomSignature`）。这正是\
    \ Java 类方法和 Objective-C 类方法的不同之处。在 Java 中，类方法没有对象上下文（没有 `this` 变量）。而在 Objective-C\
    \ 中，类消息发送给类对象的方式与发送给普通对象相同。`+(NSNumber*)number` 方法体中的 `[self string]` 语句会调用类方法\
    \ `+(NSString*)string`，而不是实例方法 `-(NSString*)string`。与 Java 静态方法真正等价的是 C 函数。\n\n\
    这一区别对于继承至关重要。类对象继承类方法的方式与实例方法继承相同。如果类 `B` 是类 `A` 的子类，且类 `A` 定义了一个类方法，则类 `B` 会继承该类方法。类\
    \ `B` 也可以重写该类方法。代码清单 3-16 展示了这种关系。\n\n**代码清单 3-16. 类方法继承**\n\n```objectivec\n\
    @interface Classy : NSObject\n\n+ (void)greeting;\n+ (NSString*)salutation;\n\n\
    @end\n\n@implementation Classy\n\n+ (void)greeting\n{\n    NSLog(@\"%@, world!\"\
    ,[self salutation]);\n}\n\n+ (NSString*)salutation\n{\n    return (@\"Greetings\"\
    );\n}\n\n@end\n\n@interface Classic : Classy\n\n+ (NSString*)salutation;\n\n@end\n\
    \n@implementation Classic\n\n+ (NSString*)salutation\n{\n    return (@\"Hello\"\
    );\n}\n\n@end\n\n...\n\n[Classy greeting];   // 输出 \"Greetings, world!\"\n[Classic\
    \ greeting];  // 输出 \"Hello, world!\"\n```\n\n语句 `[Classy greeting]` 将 `greeting`\
    \ 消息发送给 `Classy` 类对象。该方法向自身发送 `salutation` 消息，并用返回值构建日志消息 \"Greetings, world!\"\
    。\n\n语句 `[Classic greeting]` 将 `greeting` 消息发送给 `Classic` 类对象。`Classic` 并未定义类方法\
    \ `+(void)greeting`，但它从 `Classy` 继承了一个。当在此上下文中执行 `+(void)greeting` 时，`self` 变量指向的是\
    \ `Classic`，而非 `Classy`。向 `self` 发送 `salutation` 消息会调用 `Classic` 重写的 `-(NSString*)salutation`\
    \ 方法，因此记录的日志消息是 \"Hello, world!\"。\n\n> **注意：** 如果代码清单 3-16 中的语句是 `NSLog(@\"%@,\
    \ world!\",[Classy salutation])` 而非 `NSLog(@\"%@, world!\",[self salutation])`，那么消息将始终是\
    \ \"Greetings, world!\"。这是因为 `Classy` 是一个常量，始终指向唯一的 `Classy` 类对象，而 `self` 则指向接收\
    \ `greeting` 消息的类对象。\n\n尽管存在细微的技术差异，但 Objective-C 中的类方法被用于许多与 Java 静态方法相同的用途。返回单例对象的方法、工厂方法、对象池以及便捷工具都是类方法的常见用途。\n\
    \n## 构造对象\n\n你可能以为我会在本章更早的地方解释实例化对象的语法，而不是让你费力阅读实例变量、关于 `self` 变量的解释以及类方法。我没有这样做的原因很简单：实例化对象并没有专门的语法。\n\
    \n秉承其极简主义哲学，Objective-C 让类设计者自行决定如何创建和初始化对象。在 Cocoa 框架中，这是通过工厂类方法和一些编写初始化器（构造器）方法的惯例组合来实现的。\n\
    \n> **注意：** 你会反复看到这种极简模式。Java 定义了特定的语法并强制执行预定义的规则，用于对象的创建、序列化、复制等操作。相比之下，Objective-C\
    \ 只提供最基础的内容，将实现决策留给类设计者。你不能在 Java 中改变对象创建的方式，但在 Objective-C 中可以。你可能不需要经常这样做，但确实能够产生巨大效果。\n\
    \n创建对象是一个两步过程。首先，为对象结构分配内存。然后实例被初始化。代码清单 3-17 展示了 `RandomSequence` 类的重写版本，包含两个初始化器（构造器）。\n\
    \n**代码清单 3-17. 对象初始化**\n\n**Java**\n\n```java\npublic class RandomSequence\n{\n\
    \    long seed;\n\n    public RandomSequence()\n    {\n        seed = 1;\n   \
    \ }\n\n    public RandomSequence( long startingSeed )\n    {\n        seed = startingSeed;\n\
    \    }\n}\n\n...\n\nRandomSequence r1 = new RandomSequence();\nRandomSequence\
    \ r2 = new RandomSequence(-43);\n```\n\n**Objective-C**\n\n```objectivec\n@interface\
    \ RandomSequence : NSObject {\n    long long seed;\n}\n\n- (id)init;\n- (id)initWithSeed:(long\
    \ long)startingSeed;\n\n@end\n\n@implementation RandomSequence\n\n- (id)init\n\
    {\n    self = [super init];\n    if (self != nil) {\n        seed = 1; // 默认种子\n\
    \    }\n    return (self);\n}\n\n- (id)initWithSeed:(long long)startingSeed\n\
    {\n    self = [super init];\n    if (self != nil) {\n        seed = startingSeed;\n\
    \    }\n    return (self);\n}\n\n@end\n\n...\n\nRandomSequence *r1 = [[RandomSequence\
    \ alloc] init];\nRandomSequence *r2 = [[RandomSequence alloc] initWithSeed:-43];\n\
    RandomSequence *r3 = [RandomSequence new];\n```\n\n`[RandomSequence alloc]` 语句通过向\
    \ `RandomSequence` 类对象发送 `alloc` 消息来启动过程。根类 `NSObject` 实现了 `+(id)alloc` 类方法，该方法被所有子类继承。`+(id)alloc`\
    \ 使用类引用为新对象分配所需内存，设置其 `isa` 变量，将所有其余实例变量填充为零，并返回指向新分配对象的指针。此时，对象已存在，并属于所请求的类型。然而，该对象尚未被初始化。\n\
    \n接下来，`init` 消息被发送给新创建的对象。该消息负责初始化对象。一旦 `init` 返回，对象即可使用。\n\n代码清单 3-17 中创建对象 `r1`、`r2`\
    \ 和 `r3` 的三个语句演示了创建新对象的常见方式。变量 `r1` 被赋值为一个新对象，该对象在无参数的情况下分配和初始化，等同于 Java 语句 `r1\
    \ = new RandomSequence()`。\n\n`r2` 变体调用了另一个初始化器，传入额外的参数用于初始化对象。与 Java 类似，你可以根据需要创建任意多的额外初始化器（构造器）。\n\
    \n创建对象 `r3` 所使用的简写形式在功能上与创建 `r1` 的形式完全相同。根类 `NSObject` 实现了一个 `+(id)new` 类方法，该方法首先调用\
    \ `+(id)alloc`，然后在新创建的对象返回前向其发送 `-(id)init` 方法。它仅适用于创建可以使用其 `-(id)init` 方法（即无参数）构造的对象，但确实能节省一些代码。\n\
    \n> **警告：** 对象构造的自定义始终通过重写或定义类的 `-(id)init...` 方法来完成。切勿重写或尝试拦截 `+(id)alloc` 或\
    \ `+(id)new` 类方法。\n\n## 编写 init 方法\n\n要编写 Objective-C 初始化器（构造器），你的方法必须满足一个四部分约定：\n\
    \n1.  初始化器必须调用其超类的初始化器。\n2.  它必须更新其 `self` 变量。\n3.  它必须检查 `nil` 对象。\n4.  它必须返回指向自身的指针。\n\
    \n约定的前两部分通过语句 `self = [super init]` 实现。显然，每个初始化器在继续执行之前都必须调用其超类的初始化器。在 Java 中，这一约定由语言本身保证。在\
    \ Objective-C 中，你需要负责调用它。\n\n更新 `self` 对 Java 程序员来说可能有些怪异，但这是实现类簇的关键。类簇将在第 22\
    \ 章详细解释。你可能想省略对 `self` 的赋值。不要这样做。保留赋值实际上会使代码更精简、速度更快，而且你不会违反类簇约定。\n"
- fmt: "■ Note  \nThe return value for `init` methods is traditionally `id`. Logically,\
    \ `init` should always return a pointer to the class or a subclass. However, declaring\
    \ the return value as a class pointer type (i.e., `-(BaseClass*)init`) makes it\
    \ difficult for subclasses. The subclass must call `[super init]` and assign it\
    \ to `self`. If `[super init]` returns a `BaseClass*` type value, the subclass\
    \ can’t assign it to `self` without a cast.\n\nThe third step is to check for\
    \ `nil`. The superclass `init` method will return `nil` if, for any reason, it\
    \ can’t create the requested object. For example, `nil` is returned if the process\
    \ runs out of free memory and a new object can’t be allocated. A class can decide\
    \ not to construct an object and return `nil` for any reason. Program defensively;\
    \ always assume an initializer could return `nil`.\n\nIf the returned object is\
    \ valid, your initializer should then perform whatever initialization your object\
    \ requires.\n\nFinally, the initializer must return itself, or `nil`, if the initialization\
    \ failed, to the caller.\n\nStudy the `-(id)init` method in Listing 3-17. Memorize\
    \ it. Every object initializer you will ever write should look just like it. You\
    \ will undoubtedly encounter subtle variations—many programmers combine the first\
    \ two statements into `if ((self=[super init])!=nil)`—but every well-written `init`\
    \ method satisfies the four-part contract for initializers.\n\n### Chaining Initializers\n\
    \nJava has special syntax for explicit constructor invocation, whereby a constructor\
    \ can invoke a specific superclass constructor with parameters (`super(param)`)\
    \ or an alternate constructor (`this(param)`).\n\nNaturally, Objective-C doesn’t\
    \ have any special syntax for this, but the principle is the same.\n\nThe class\
    \ `RepeatableSequence`, shown in Listing 3-18, is a subclass of `RandomSequence`,\
    \ shown in Listing 3-17. The `init` methods for `RepeatableSequence` build on\
    \ the `init` methods in its superclass as well as the other methods in `RepeatableSequence`.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**Listing 3-18. Chained\
    \ Initializers**\n\n**Java**\n\n```java\npublic class RepeatableSequence extends\
    \ RandomSequence\n{\n    private long restartSeed;\n    public RepeatableSequence()\n\
    \    {\n        this(1);\n    }\n    public RepeatableSequence( long startingSeed\
    \ )\n    {\n        super(startingSeed);\n        restartSeed = seed;\n    }\n\
    \    void restartSequence( )\n    {\n        seed = restartSeed;\n    }\n}\n```\n\
    \n**Objective-C**\n\n```objc\n#import \"RandomSequence.h\"\n\n@interface RepeatableSequence\
    \ : RandomSequence {\n    long long restartSeed;\n}\n- (id)init;\n- (id)initWithSeed:(long\
    \ long)startingSeed;\n- (void)restartSequence;\n@end\n\n@implementation RepeatableSequence\n\
    \n- (id)init\n{\n    self = [self initWithSeed:1];\n    return (self);\n}\n\n\
    - (id)initWithSeed:(long long)startingSeed\n{\n    self = [super initWithSeed:startingSeed];\n\
    \    if (self!=nil) {\n        restartSeed = seed;\n    }\n    return (self);\n\
    }\n\n- (void)restartSequence\n{\n    seed = restartSeed;\n}\n@end\n```\n\nThe\
    \ `-(id)initWithSeed:` method invokes its superclass’s `-(id)initWithSeed:` method,\
    \ passing the initialization parameter to the superclass. After the superclass\
    \ initialization is finished, it completes its initialization.\n\nThe `-(id)init`\
    \ method hands off initialization to the `-(id)initWithSeed:` method. Note that\
    \ the message `initWithSeed:` is sent to itself, not to its superclass.\n\n###\
    \ Designated Initializer\n\nWhen subclassing a class, read the documentation (or\
    \ comments) about that class. Some Objective-C classes have one or more designated\
    \ initializers. An `init` method for a subclass should only initialize the superclass\
    \ using one of its designated initializers.\n\nThe documentation for many classes\
    \ includes an explicit “Subclassing Notes” section that contains important information\
    \ and caveats for subclass authors.\n\n### Convenience Constructors\n\nA very\
    \ common use of class methods is to provide convenience constructors, sometimes\
    \ referred to as factories. These are class methods that return a preconfigured\
    \ object of the same class, ideally using less code than needed to formally create\
    \ and initialize a new object. Listing 3-19 shows a fragment of the `NSDictionary`\
    \ class provided by the Cocoa framework. All of the class methods return a new\
    \ `NSDictionary` object.\n\n**Listing 3-19. Class Convenience Constructors**\n\
    \n```objc\n@interface NSDictionary\n\n+ (id)dictionary;\n+ (id)dictionaryWithObject:(id)object\
    \ forKey:(id)key;\n+ (id)dictionaryWithDictionary:(NSDictionary *)dict;\n+ (id)dictionaryWithObjects:(NSArray\
    \ *)objects forKeys:(NSArray *)keys;\n\n@end\n```\n\nThe statement `[NSDictionary\
    \ dictionary]` is equivalent to `[[NSDictionary alloc] init]`, and the statement\
    \ `[NSDictionary dictionaryWithObject:@\"Mary\" forKey:@\"Name\"]` is equivalent\
    \ to `[[NSDictionary alloc] initWithObject:@\"Mary\" forKey:@\"Name\"]`. The principal\
    \ advantage is brevity.\n\n■ Caution  \nThe statement `[NSDictionary dictionary]`\
    \ is equivalent to `[[NSDictionary alloc] init]` only when using garbage collection.\
    \ In a traditional managed memory environment, these two are quite different.\
    \ The former returns an autoreleased object while the latter returns a retained\
    \ object. See Chapter 9 (on garbage collection) and Chapter 24 (on memory management)\
    \ for a complete explanation.\n\nConvenience constructors are often included to\
    \ construct objects that would otherwise be awkward to create. For example, the\
    \ `NSString` class provides the `+(NSString*)pathWithComponents:(NSArray*)components`\
    \ convenience constructor. It takes an array of path components, assembles them\
    \ into an absolute POSIX path, and returns the result as a single immutable string.\
    \ Trying to accomplish this using `alloc` and class `init` methods would require\
    \ creating a mutable string buffer, appending all of the components in a loop,\
    \ then converting the temporary string buffer into an immutable string object.\
    \ Clearly, the single statement `[NSString pathWithComponents:array]` is significantly\
    \ more compact.\n\n### Destructors\n\nLike Java, Objective-C objects can optionally\
    \ override their `-(void)finalize` method. This message is sent to objects before\
    \ being destroyed by the garbage collector. Every `finalize` method must send\
    \ a `finalize` message to its superclass immediately before returning.\n\nAn example\
    \ `-finalize` method is shown in Listing 3-20. Note that `finalize` methods should\
    \ be used only for exceptional cleanup and to provide robustness. A well-written\
    \ program would not rely on the `finalize` method to close a file; it should have\
    \ closed the file before allowing this object to become collectable. The `finalize`\
    \ code simply protects against the possibility of leaking the resource in unusual\
    \ circumstances, for example, if the file was left open following a program exception.\n\
    \n**Listing 3-20. Well-Behaved `finalize` Method**\n\n```objc\n- (void)finalize\n\
    {\n    if (file!=nil) {\n        [file close];\n        file = nil;\n    }\n \
    \   [super finalize];\n}\n```\n\n■ Caution  \nThe `finalize` message is sent to\
    \ objects only when running in a garbage collection environment. Objective-C applications\
    \ using managed memory (sans garbage collection) implement the `-(void)dealloc`\
    \ method instead. See Chapter 24 for more details.\n\n### What’s Missing?\n\n\
    Table 3-2 has a brief list of Java features that you won’t find in Objective-C.\n\
    \n**Table 3-2. Missing Java Features**\n\n| Feature                | Description\
    \ |\n|------------------------|-------------|\n| Inner/Anonymous Classes | You\
    \ cannot define a class within a class, or a class within a method. Inner and\
    \ anonymous classes are typically used as adaptors and for code encapsulation.\
    \ In Objective-C, these patterns are implemented using informal protocols and\
    \ code blocks (a recent addition to the C language that allows an executable block\
    \ of code to be passed as a variable). |\n| Object Arrays          | (Content\
    \ truncated in original) |"
  raw: '■Note The return value for init methods is traditionally id. Logically, init
    should always return a pointer to the class or a subclass. However, declaring
    the return value as a class pointer type (i.e., -(BaseClass*)init) makes it difficult
    for subclasses. The subclass must call [super init] and assign it to self. If
    [super init] returns a BaseClass* type value, the subclass can’t assign it to
    self without a cast.


    The third step is to check for nil. The superclass init method will return nil
    if, for any reason, it can’t create the requested object. For example, nil is
    returned if the process runs out of free memory and a new object can’t be allocated.
    A class can decide not to construct an object and return nil for any reason. Program
    defensively; always assume an initializer could return nil.


    If the returned object is valid, your initializer should then perform whatever
    initialization your object requires.


    Finally, the initializer must return itself, or nil, if the initialization failed,
    to the caller.


    Study the -(id)init method in Listing 3-17\. Memorize it. Every object initializer
    you will ever write should look just like it. You will undoubtedly encounter subtle
    variations—many programmers combine the first two statements into if ((self=[super
    init])!=nil)—but every well-written init method satisfies the four-part contract
    for initializers.


    Chaining Initializers


    Java has special syntax for explicit constructor invocation, whereby a constructor
    can invoke a specific superclass constructor with parameters (super(param)) or
    an alternate constructor (this(param)).


    Naturally, Objective-C doesn’t have any special syntax for this, but the principle
    is the same.


    The class RepeatableSequence, shown in Listing 3-18, is a subclass of RandomSequence,
    shown in Listing 3-17\. The init methods for RepeatableSequence build on the init
    methods in its superclass as well as the other methods in RepeatableSequence.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ WELCOME TO OBJECTIVE-C


    Listin g 3-18\. Chained Initializers


    **Java**


    public class RepeatableSequence extends RandomSequence


    {


    private long restartSeed;


    public RepeatableSequence()


    {


    this(1);


    }


    public RepeatableSequence( long startingSeed )


    {


    super(startingSeed);


    restartSeed = seed;


    }


    void restartSequence( )


    {


    seed = restartSeed;


    }


    }


    **Objective-C**


    #import "RandomSequence.h"


    @interface RepeatableSequence : RandomSequence {


    long long restartSeed;


    }


    - (id)init;


    - (id)initWithSeed:(long long)startingSeed;


    - (void)restartSequence;


    @end


    @implementation RepeatableSequence


    - (id)init


    {


    self = [self initWithSeed:1];


    return (self);


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ WELCOME TO OBJECTIVE-C


    - (id)initWithSeed:(long long)startingSeed


    {


    self = [super initWithSeed:startingSeed];


    if (self!=nil) {


    restartSeed = seed;


    }


    return (self);


    }


    - (void)restartSequence


    {


    seed = restartSeed;


    }


    @end


    The -(id)initWithSeed: method invokes its superclass’s -(id)initWithSeed: method,
    passing the initialization parameter to the superclass. After the superclass initialization
    is finished, it completes its initialization.


    The -(id)init method hands off initialization to the -(id)initWithSeed: method.
    Note that the message initWithSeed: is sent to itself, not to its superclass.


    Designated Initializer


    When subclassing a class, read the documentation (or comments) about that class.
    Some Objective-C


    classes have one or more designated initializers. An init method for a subclass
    should only initialize the superclass using one of its designated initializers.


    The documentation for many classes includes an explicit “Subclassing Notes” section
    that contains important information and caveats for subclass authors.


    Convenience Constructors


    A very common use of class methods is to provide convenience constructors, sometimes
    referred to as factories. These are class methods that return a preconfigured
    object of the same class, ideally using less code than needed to formally create
    and initialize a new object. Listing 3-19 shows a fragment of the NSDictionary
    class provided by the Cocoa framework. All of the class methods return a new NSDictionary
    object.


    Listin g 3-19\. Class Convenience Constructors


    @interface NSDictionary


    + (id)dictionary;


    + (id)dictionaryWithObject:(id)object forKey:(id)key;


    + (id)dictionaryWithDictionary:(NSDictionary *)dict;


    + (id)dictionaryWithObjects:(NSArray *)objects forKeys:(NSArray *)keys;


    @end


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ WELCOME TO OBJECTIVE-C


    The statement [NSDictionary dictionary] is equivalent to [[NSDictionary alloc]
    init], and the statement [NSDictionary dictionaryObject:@"Mary" forKey:@"Name"]
    is equivalent to


    [[NSDictionary alloc] initWithObject:@"Mary" forKey:@"Name"]. The principal advantage
    is brevity.


    ■Caution The statement [NSDictionary dictionary] is equivalent to [[NSDictionary
    alloc] init] only when using garbage collection. In a traditional managed memory
    environment, these two are quite different. The former returns an autoreleased
    object while the latter returns a retained object. See Chapter 9 (on garbage collection)
    and Chapter 24 (on memory management) for a complete explanation.


    Convenience constructors are often included to construct objects that would otherwise
    be awkward to create. For example, the NSString class provides the


    +(NSString*)pathWithComponents:(NSArray*)components convenience constructor. It
    takes an array of path components, assembles them into an absolute POSIX path,
    and returns the result as a single immutable string. Trying to accomplish this
    using alloc and class init methods would require creating a mutable string buffer,
    appending all of the components in a loop, then converting the temporary string
    buffer into an immutable string object. Clearly, the single statement [NSString
    pathWithComponents:array] is significantly more compact.


    Destructors


    Like Java, Objective-C objects can optionally override their -(void)finalize method.
    This message is sent to objects before being destroyed by the garbage collector.
    Every finalize method must send a finalize message to its superclass immediately
    before returning.


    An example -finalize method is shown in Listing 3-20\. Note that finalize methods
    should be used only for exceptional cleanup and to provide robustness. A well-written
    program would not rely on the finalize method to close a file; it should have
    closed the file before allowing this object to become collectable. The finalize
    code simply protects against the possibility of leaking the resource in unusual
    circumstances, for example, if the file was left open following a program exception.


    Listin g 3-20\. Well-Behaved finalize Method


    - (void)finalize


    {


    if (file!=nil) {


    [file close];


    file = nil;


    }


    [super finalize];


    }


    ■Caution The finalize message is sent to objects only when running in a garbage
    collection environment.


    Objective-C applications using managed memory (sans garbage collection) implement
    the -(void)dealloc method instead. See Chapter 24 for more details.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


