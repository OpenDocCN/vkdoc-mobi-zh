    let them suspend when they don’t. If you find yourself interjecting sleep statements
    or creating semaphores just to force the kernel to switch tasks, then you should
    revisit the design of your tasks.


    Having said that, there are some special circumstances where you may need to alter
    the task’s properties or put it to sleep. Putting a thread to sleep is explained
    next. Thread properties are discussed in the sections that follow.


    Putting a Thread to Sleep


    Putting a thread to sleep for a period of time is one of the few thread state
    manipulations remaining.


    Putting a thread to sleep suspends the thread until the time interval has elapsed.
    Afterward, the thread is made “runnable” again, and the kernel will add the thread
    back into its rotation of running threads. Said another way, the thread isn’t
    guaranteed to start running again immediately after the time interval has elapsed;
    it just won’t run again before the time interval has elapsed.


    The NSThread methods +sleepUntilDate: and +sleepForTimeInterval: will cause the
    current thread to sleep, unconditionally, for the given period of time. This can
    be an NSDate object in the future or an NSTimeInterval value expressed in seconds.
    Dates and time intervals use double floating-point values to express seconds,
    so time intervals down to the nanosecond range can be specified. The kernel doesn’t
    guarantee the accuracy of the time, only that the thread won’t execute again until
    that amount of time has elapsed.


