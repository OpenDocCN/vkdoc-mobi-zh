    NSDistributedLock


    NSDistributedLock is a special kind of mutex semaphore that uses file system objects
    to coordinate actions between processes, or even other computer systems via a
    shared file system. It does not conform to NSLocking protocol and has no -lock
    method. You initialize it by specifying a path to a file on a writeable file system.
    The -tryLock method will test the object and attempt to acquire the lock. If unsuccessful,
    your code must try again later at whatever interval makes sense for your application.


    Listing 15-10 shows NSDistributedLock used to prevent a group of database files
    from being modified during a backup.


