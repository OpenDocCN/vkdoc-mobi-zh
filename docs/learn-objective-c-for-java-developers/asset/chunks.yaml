    - (void)addExpenditure:(double)amount


    {


    [self willChangeValueForKey:@"plannedExpense"]; plannedExpense += amount;


    [self didChangeValueForKey:@"plannedExpense"];


    }


    @end

    ```


    `Budget` 类有一个存储在变量中的 `plannedExpense` 属性。这是一个没有设置方法的只读属性。`-addExpenditure:` 方法在增加金额时会改变该属性。包围该变更的
    `-willChangeValueForKey:` 和 `-didChangeValueForKey:` 消息会将变更通知给键值观察框架，并允许其向观察者发送属性通知。


    ---


    ## 观察者模式


    **注意** 对于给定的键，每条 `-willChangeValueForKey:` 消息必须与同一条键的相应 `-didChangeValueForKey:`
    消息成对出现。


    如果 `-addExpenditure:` 方法修改了多个属性，它就会为每个属性发送一对 `-willChangeValueForKey:`/`-didChangeValueForKey:`
    消息。这些消息可以嵌套：代码可以发送三条 `-willChange...` 消息，修改三个属性，然后再发送三条 `-didChange...` 消息。


    如果要修改的属性是一个对多关系的数组属性，请改用 `-willChange:valuesAtIndexes:forKey:` 和 `-didChange:valuesAtIndexes:forKey:`
    消息。


    ### 创建属性依赖关系


    另一个常见问题是当另一个属性发生变化时，某个属性也会隐式地随之变化。这被称为依赖属性。为 `Budget` 类添加一个 `remainingBudget`
    属性会创建一个同时受 `budget` 或 `plannedExpense` 属性变更影响的依赖属性。键值观察框架定义了一个非正式协议，允许你的类描述其依赖属性。修改后的
    `Budget` 类如 `列表 19-4` 所示。


    `列表 19-4`。定义依赖属性


    ```objc

    @interface Budget : NSObject {


    double budget;


    double plannedExpense;


    }


    @property double budget;


    @property (readonly) double plannedExpense;


    @property (readonly) double remainingBudget;


    - (void)addExpenditure:(double)amount;


    @end


    @implementation Budget


    @synthesize budget, plannedExpense;


    - (void)addExpenditure:(double)amount


    {


    [self willChangeValueForKey:@"plannedExpense"];


    plannedExpense += amount;


    [self didChangeValueForKey:@"plannedExpense"];


    }


    + (NSSet*)keyPathsForValuesAffectingRemainingBudget


    {


    return [NSSet setWithObjects:@"budget", @"plannedExpense", nil];


    }


    - (double)remainingBudget


    {


    // 剩余金额或 0.0


    return MAX(0,budget-plannedExpense);


    }


    @end

    ```


    对于每个被观察的属性，键值观察框架会查找一个名为 `+keyPathsForValuesAffectingProperty` 的类方法；将方法名中的 “`Property`”
    部分替换为依赖属性的名称。该方法返回一个该属性所依赖的属性名称集合。每当这些其他属性中的任何一个发生变化时，KVO 也会为该依赖属性发送一个变更通知。为每个依赖属性实现一个这样的类方法。


    **注意** 使用上一节演示的手动 KVO 通知也可以实现相同的解决方案。你需要修改 `-addExpenditure:` 方法，使其为 `@"remainingBudget"`
    键路径发送额外的 `-willChangeValueForKey:` 和 `-didChangeValueForKey:` 消息，然后在手写的 `-setBudget:`
    方法中执行相同的操作。依赖属性协议的优势在于它不需要修改其他属性的设置方法，也不需要添加更多的手动 KVO 通知。这在定义依赖于其超类属性的子类中特别方便。它还能避免
    KVO 代码使实现变得杂乱。


    实际上有三种方法可以向键值观察框架传达依赖属性：


    -   实现一个按属性的 `+keyPathsForValuesAffectingProperty` 类方法，如 `列表 19-4` 所示。

    -   重写单个 `+keyPathsForValuesAffectingValueForKey:` 类方法，并为请求的键返回依赖集。该方法的基类实现使用键路径来查找并调用选项
    1 中实现的方法名。

    -   在类中任何对象被观察之前的某个时刻（通常是在类的 `+initialization` 方法中），为类中实现的每个依赖键发送一条 `+setKeys:triggerChangeNotificationsForDependentKey:`
    消息。


    对于每个依赖属性，仅实现上述解决方案之一。在实现前两个解决方案中的任何一个时，不要忘记在返回的集合中包含由超类定义的任何依赖键。


    前两个解决方案仅适用于在 Mac OS X 10.5 或更高版本上运行的简单（对一）属性。如果你需要建立一个对多关系的依赖属性，或者目标平台是 Mac OS
    X 10.4 或更早版本，请使用最后一个解决方案。如果你的目标是 Mac OS X 10.5 或更高版本（其中 `+setKey:…` 方法已弃用），请参阅“键值观察编程指南”¹
    中的“注册依赖键”部分，以了解多种可能的解决方案。


    ### 重写键值观察


    要在符合 KVC 的设置方法中实现手动 KVO 通知，你必须禁用键值观察框架将执行的常规变更通知。否则，KVO 和你的代码都会发送通知，导致重复的通知或顺序错乱的通知。


    这样做的一个非常审慎的原因是优化设置方法，使其仅在值实际发生变更时才通知观察者。这可以带来性能优势，并解决递归或循环更新问题。在 `列表 19-5` 中，类的
    `budget` 属性设置器被重新实现，以便仅在 `budget` 值实际发生变化时才发送 KVO 通知。


    `列表 19-5`。优化 KVO 通知


    ```objc

    @implementation Budget


    + (BOOL)automaticallyNotifiesObserversForKey:(NSString*)key


    {


    if ([key isEqualToString:@"budget"])


    return NO;


    return [super automaticallyNotifiesObserversForKey:key];


    }


    - (double)budget


    {


    return budget;


    }


    - (void)setBudget:(double)value


    {


    if (budget!=value) {


    [self willChangeValueForKey:@"budget"]; budget = value;


    [self didChangeValueForKey:@"budget"];


    }


    }

    ```


    为防止 KVO 框架重写 `-setBudget:` 方法并发送其自身的通知，`+automaticallyNotifiesObserversForKey:`
    类方法被重写。对于生成自身通知的可观察属性，该方法应返回 `NO`。基类实现为所有键返回 `YES`。


    然后，`-setBudget:` 方法被重写，使其仅在新预算值与先前值不同时才发送 KVO 通知。这种优化可以产生连锁效应。例如，既然 `remainingBudget`
    属性依赖于 `budget` 属性，那么不发送多余的预算通知实际上避免了两个多余的通知。


    ### 优化键值观察


    ¹ Apple Inc., “键值观察编程指南”, [`developer.apple.com/documentation/Cocoa/Conceptual/KeyValueObserving/`](http://developer.apple.com/documentation/Cocoa/Conceptual/KeyValueObserving/),
    2009.

