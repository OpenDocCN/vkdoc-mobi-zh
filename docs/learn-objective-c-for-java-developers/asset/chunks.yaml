    \ 和 Java 之间的一个概念性区别是，Java 的大部分内容都是围绕读取和写入序列化数据的抽象类（如`java.io.Reader`、`java.io.Writer`、`java.io.InputStream`、`java.io.OutputStream`）组织的，这些抽象类有用于处理数据文件的子类。Objective-C（和\
