    2\. It’s also polite to name the action that was pushed. Using the drawing program
    again, setting


    “Resize Shape” as the name of the action will display “Undo Resize Shape” in the
    Edit menu to the user. This makes it easier for the user to understand what will
    be undone.


    3\. When the user selects the Undo command, the undo manager gets the last action
    pushed onto the stack and sends the object the message with the value. In this
    example, the drawing object would be sent a -setShapeSize: message with its old
    size.


    4\. The undo action handler should also push the (now) previous size as a “redo”
    action. The messages are exactly the same for pushing an action onto the undo
    stack—when undoing an action, the undo manager switches into a temporary mode
    that pushes actions onto a “redo”


    stack. This allows your single -setShapeSize: method to act as a “do,” “undo,”
    and “redo”


    method.


    TicTacToe’s data model is trivially simple, so it just pushes the entire state
    of the document (game and message) on the undo stack after each move. A more complex
    data model would push specific changes, but the principle is the same.


    To simplify both the undo and open/save commands, the TTTDocument implements a
    contents property that returns the entire document state as a single, immutable
    object.


    There is a hidden advantage to implementing undo: the undo manager also maintains
    the document’s isDocumentEdited property for you. This tells the document controller
    when your document 401


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ MODEL-VIEW-CONTROLLER PATTERN


    contains unsaved changes. If you don’t use the undo manager, you must manage the
    isDocumentEdited property yourself.


    Resources


    Resources are data files that are copied into your application’s bundle. The framework
    defines many resource files, such as NIB documents, managed object model files,
    and the executable. You are free to add whatever additional files you want. Typically
    these are image, sound, and help files, but there are no limitations. A program
    can include frameworks, even another application, as part of its resources.


    You can get a resource using the NSBundle class. Classes like NSImage often have
    convenience methods, like +[NSImage imageNamed:], that will locate a resource
    file and load it into an object.


    Localized Resources


    Almost any resource in an application bundle can be organized by language. These
    are referred to as localizations. A localized version of a file is stored inside
    a variant subfolder. NSBundle will first look in the variant folder for the user’s
    preferred languages. If it can’t find a suitable file (or variant) it will use
    the file that’s not in any variant. This allows you to create alternate language-specific
    versions for any resource. This includes NIB documents, images, sounds, lists
    of strings that are shown to the user, and so on.


    In Xcode, localized versions of resources are shown as sub-documents to the main
    document.


    To create a localized version, open the Info window for the file and choose Add
    Localization. Every localization is a completely separate file that you must maintain.


    Summary


    This chapter covered a lot of ground. The Model-View-Controller design pattern
    permeates the Cocoa frameworks. It influences many different aspects of an application,
    and brings together the user interface, business logic, and data organization.
    It involves a dizzying number of classes and employs almost every communications
    technique discussed so far.


    Understanding, and embracing, MVC is a critical step in understanding Cocoa applications.


    You also learned about key development tools, like Interface Builder, that leverage
    many Objective-C


    technologies to create complex user interfaces with almost no code.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 2 1**


    ■ ■ ■


    Lazy Initialization Pattern


    The lazy initialization pattern embodies the just-in-time philosophy of data delivery.
    It delays the construction of values or data structures until that data is actually
    needed. Lazy initialization is a popular design pattern in both Java and Objective-C.
    Objective-C adds another level by implementing its own lazy initialization of
    class structures, which you can integrate into your own classes.


    Implementing the Pattern


    Here’s how to implement the lazy initialization pattern:


    1.


    Create a private instance or private static variable that will eventually contain
    the data, but is initialized with a placeholder value (typically nil).


    2\. Wrap the variable in a property that provides a public getter method.


    3.


    In the getter method, test the variable for its placeholder value. If it has not
    been initialized, construct it and save the results. Return the newly, or previously,
    constructed data to the sender.


    Lazy initialization is usually applied when


    • The memory or resources required to create or calculate the data is excessive
    and can be deferred.


    • There is a significant possibility that the data will never be needed.


    • The prerequisites of the data do not exist, or are not available, when an object
    is instantiated.


    Deferring the calculation of a value, or assembling a large or complex data structure,
    preserves memory and CPU resources until the data is actually needed. In some
    cases, the data may never be needed, resulting in a substantial performance improvement.
    Perceived performance can be improved by deferring operations to a later time,
    allowing the application to immediately update a display or respond to a user
    event, while more complex and time-consuming work is done later. The canonical
    example is a photo browsing application that immediately presents placeholder
    or thumbnail images to the user while the actual images are loaded in the background.
    The user perceives the application as performing faster, because it’s more responsive,
    even if the actual amount of time it takes to load and display the final images
    is slower.


    An object constructor that creates an object, quickly and with minimal memory
    demands, is called a lightweight constructor. The constructor can be lightweight
    even if the object is heavyweight.


    Using the example above, an image view object could be initialized almost instantly
    with nothing more than the dimensions of the image and a URL where the image data
    can be obtained. The constructor, and the properties needed to update a window
    or lay out a multipage document, is lightweight and available immediately—even
    if the actual image takes megabytes of memory and several seconds to obtain.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 21 ■ LAZY INITIALIZATION PATTERN


    Lazy Initialization of Global Variables


    Lazy initialization is often applied to global variables. An advantage that Java
    has over Objective-C is its ability to declare object initializers for static
    variables. The Java runtime evaluates the initialization statements when the class
    is loaded.


    public final static String[] ColorNames = new String[] { "White", "Black" }; A
    truly global variable in Objective-C is a static C variable. Static C variables
    can only be initialized with constants or static addresses, and this initialization
    occurs before the Objective-C


    runtime starts. To achieve the same effect requires some form of automatic initialization
    that occurs after the Objective-C runtime has started.'
