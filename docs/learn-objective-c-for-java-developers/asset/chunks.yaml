    \n## 开始业务逻辑\n\n应用程序将读取并构建一个包含大约 20 万个常用单词的字典。每当有字母被输入时，它将搜索所有能用这些字母拼写出的单词。解决此类问题的方法有很多，但此应用程序选择了一种简单的方法：暴力搜索所有\
    \ 20 万个单词。这可能会很耗时，因此搜索不应发生在应用程序的主 UI 线程上。否则，每当输入一个新字母时，应用程序都会看起来像是卡住了。\n\n解决方案是在后台线程上执行搜索。搜索线程每找到一个单词，就会向主线程发送消息。这可以通过线程和信号量来实现，但让\
