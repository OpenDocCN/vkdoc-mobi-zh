    \ 来构造它。\n-   值的大小由 `@encode()` 指令生成的 Objective-C 类型隐含确定。\n-   封装后，`NSValue` 可以像任何其他对象一样被对待。\n\
    -   要检查存储在 `NSValue` 中的值，请向其发送 `-getValue:` 消息——同样需要传递变量的地址，该变量将被对象中存储的值的副本覆写。\n\
    \n`NSValue` 为常用结构体提供了几个便捷构造函数，例如 `+valueWithPoint:(NSPoint)point`、`+valueWithRange:(NSRange)range`、`+valueWithSize:(NSSize)size`\
    \ 等。请注意，这些方法都接受原始值的副本，而非地址。\n\n`NSNumber` 实际上是 `NSValue` 的一个子类。从某种意义上说，`NSNumber`\
    \ 中的所有方法都可以视为处理原生数据类型的便捷方法。在内部，`NSNumber` 使用 `NSValue` 来存储其值。你可以向 `NSNumber` 或\
    \ `NSValue` 对象发送 `-objCType` 消息，以确定其原始值的类型。\n\n## 包装 nil\n\nObjective-C 提供了 `NSNull`\
    \ 类作为 `nil` 值的对象占位符。这提供了一个可以存储在集合中、归档（序列化）或以其他方式用于表示“无内容”（而 `nil` 在此情况下不可用）的对象。\n\
    \n方法 `+[NSNull nil]` 返回由 Objective-C 运行时创建的 `NSNull` 单例实例。这个唯一的 `NSNull` 对象是不可变且不可销毁的。\n\
    \n清单 8-4 演示了一种编写方法的简单技术，该方法可以接受一个对象、一个 `NSNull` 实例或 `nil`——并对后两者同等处理。\n\n**清单\
    \ 8-4.** 接受对象、`nil` 或 `NSNull` 的方法\n\n```objectivec\n- (void)doSomethingWithObject:(id)object\
    \ {\n    if (object==[NSNull null])\n        object = nil;\n    ...\n}\n```\n\n\
    ## 字符串\n\n在 Java 和 Objective-C 中，字符串都显得有些特别。它们在编程中如此基础，以至于两种语言都包含了声明字符串字面量的特殊语法。然而，除了声明字符串字面量之外，这些语言对字符串的直接支持很少，期望程序员将它们作为对象进行操作。唯一的例外是\
    \ Java 的字符串连接运算符（`+`），Objective-C 并不包含该运算符。本节将涵盖字符串字面量、字符串比较、字符串操作、字符串与标量值的相互转换以及复杂格式化。\n\
    \n在许多层面上，Objective-C 中的字符串遵循与 Java 中类似的熟悉模式。所有 Objective-C 字符串都是 `NSString` 类的对象。`NSString`\
    \ 字符在内部使用 Unicode 表示。`NSString` 对象是不可变的。Objective-C 字符串字面量对象使用 `@\"string\"` 指令编写。表\
    \ 8-4 列出了常见的字符串操作及其 Objective-C 对应项。\n\n**表 8-4.** 常见字符串类和方法\n\n| Java       \
    \                          | Objective-C                                     \
    \             |\n|--------------------------------------|--------------------------------------------------------------|\n\
    | `\"string\"`                           | `@\"string\"`                     \
    \                            |\n| `java.lang.String`                   | `NSString`\
    \                                                   |\n| `java.lang.StringBuffer`\
    \             | `NSMutableString`（虽然非线程安全）                 |\n| `java.lang.StringBuilder`\
    \            | `NSMutableString`                                            |\n\
    | `Object.toString()`                  | `-[NSObject description]`           \
    \                        |\n| `new String(byte[],String)`          | `+[NSString\
    \ stringWithCString:(const char*)cString encoding:(NSStringEncoding)enc]` |\n\
    | `String.length()`                    | `-[NSString length]`                \
    \                         |\n| `String.charAt(int)`                 | `-[NSString\
    \ characterAtIndex:(int)index]`                   |\n| `String.equals(String)`\
    \              | `-[NSString isEqualToString:(NSString*)string]`             |\n\
    | `String.compareTo(String)`           | `-[NSString compare:(NSString*)string]`\
    \                     |\n| `String.compareToIgnoreCase(String)` | `-[NSString\
    \ caseInsensitiveCompare:(NSString*)string]`      |\n| `String.concat(String)`\
    \              | `-[NSString stringByAppendingString:(NSString*)string]`     |\n\
    | `String.substring(int)`              | `-[NSString substringFromIndex:(int)index]`\
    \                |\n| `String.substring(int,int)`          | `-[NSString substringWithRange:(NSRange)range]`\
    \             |\n| `String.toLowerCase()`               | `-[NSString lowercaseString]`\
    \                                |\n| `String.toUpperCase()`               | `-[NSString\
    \ uppercaseString]`                                |\n| `String.trim()`      \
    \                | `-[NSString stringByTrimmingCharactersInSet:(NSCharacterSet*)set]`\
    \ |\n| `String.format(String,Object…)`      | `+[NSString stringWithFormat:(NSString*)format,\
    \ …]`          |\n\n你会在 `String` 和 `NSString` 中找到许多其他类似的方法。`NSString` 倾向于使用更通用的方法处理各种情况，而\
    \ Java 类则实现了许多简单方法。一个很好的例子是 `java.lang.String.trim()`。Objective-C 中与之等价的方法是 `-stringByTrimmingCharactersInSet:`，它接受一个\
    \ `NSCharacterSet` 对象作为参数。要精确实现 `String.trim()` 的功能，请使用 `[string stringByTrimmingCharactersInSet:[NSCharacterSet\
    \ characterSetWithRange:NSMakeRange(0,0x20+1)]]`。虽然更冗长，但其优势在于能够从字符串中修剪任意字符集。如果你经常这样做，可以使用\
    \ Category 为 `NSString` 添加你自己的 `-trim` 方法，如第 5 章所述。\n"
- fmt: '# 字符串与原始值


    ## 注意


    现代 Objective-C 开发工具在构建应用时会合并相同的字符串字面量。无论字符串字面量 `@"Welcome"` 在应用中出现了多少次，每个出现位置在运行时都将引用同一个实例。


    然而，`String` 和 `NSString` 之间有几个关键差异你需要了解：


    - `NSString` 存在子类。

    - 字符串对象可能是可变的。


    ## 字符串类型与特性


    - 存在两种字符串：Objective-C 字符串和 C 字符串。

    - 加法运算符（`+`）不会拼接两个字符串。

    - Objective-C 字符串字面量遵循 C 语言的编译时字符串拼接语法。字面量表达式 `@"Hello" @", World!"` 和 `@"Hello,
    World!"` 是等价的。


    `NSString` 遵循 Cocoa 类框架中的一致模式：当一个类同时具有不可变和可变的变体时，可变类是不可变类的子类。这有三个重要后果。


    **第一**，可变字符串对象的类是 `NSMutableString` 子类。在需要使用 `java.lang.StringBuilder` 的地方，请使用
    `NSMutableString`。


    **第二**，任何 `NSString` 指针或参数都可能包含对可变子类的引用。在 Java 中，`java.lang.String` 类是 `final`
    的，无法被继承，从而保证所有 `String` 对象都是不可变的。要动态创建字符串，需要先构造 `StringBuffer` 对象，然后通过 `toString()`
    将其转换为 `String` 对象。在 Objective-C 中，你可以使用 `NSMutableString` 组装字符串，然后直接返回它，或将其作为普通的
    `NSString` 对象使用。如果之后不修改它，它就与不可变字符串无法区分。在必须保证字符串对象不可变的情况下，请使用 `[NSString stringWithString:possiblyMutableString]`
    构造可疑字符串对象的副本。关于对象复制的信息，请参见第 12 章。


    **第三**个后果更类似于一个优势。由于 `NSMutableString` 是 `NSString` 的子类，它继承了 `NSString` 的所有方法，包括通过分类（categories）添加到
    `NSString` 的方法。


    ## 将对象转换为字符串


    正如每个 Java 对象都继承了一个 `toString()` 方法一样，每个 Objective-C 对象都继承了 `-(NSString *)description`
    方法。其用途和使用方式与 Java 中的 `toString()` 几乎相同。


    值得注意的几点：


    - 基类实现 `-[NSObject description]` 返回一个包含对象类名和地址的字符串。除非被重写，否则这是对象的默认描述。

    - 字符串格式化函数和调试器会在需要字符串表示时向对象发送 `-description` 消息。

    - `-[NSString description]` 返回自身。

    - `-[NSNumber description]` 返回原始值的字符串表示。

    - 许多类重写了 `-description` 以提供更丰富的字符串表示。例如，集合类会返回描述集合中所有对象的字符串——递归地向每个对象发送 `-description`
    消息。


    ## C 字符串


    最后，还有一个额外的混淆点：存在两种字符串类型——Objective-C 字符串对象和传统的 C 字符串。C 字符串只是字符数组的地址，与其说是一个定义明确的实体，不如说是一种编程约定。C
    语言对字符串唯一的支持是声明字面量字符串的语法（`"hi!"`），等价于分配一个以空字符结尾的字符数组（`char string[] = { ''h'',
    ''i'', ''!'', ''\0'' }`）。


    > **提示**：作为 Java 程序员，你在编译 Objective-C 程序时无疑会遇到这样的消息：`"warning: initialization
    from incompatible pointer type"` 或 `"warning: passing argument from incompatible
    pointer type"`。这通常是因为你在 Objective-C 字符串字面量前省略了 `''@''` 符号。你没有声明字面量字符串对象（`@"Hello"`，类型为
    `NSString *`），而是声明了一个 C 字符串字面量（`"Hello"`，类型为 `const char *`）。不必自责，即使经过多年的 Objective-C
    编程，我仍然大约每周犯一次这个错误。


    ### 将 C 字符串转换为 NSString 对象


    虽然你可以在 Objective-C 中长时间编程而不接触 C 字符串，但不可避免地会有需要与期望或返回 C 字符串的 C 函数交互的时候。从 C 字符串构造新
    `NSString` 对象的主要方法列在表 8-5 中。它们与 Java 中从字节或字符数组创建 `String` 对象的构造函数非常相似。


    **表 8-5.** 从字符数组构造 NSString 对象


    | Java | Objective-C |

    |------|-------------|

    | `new String(byte[],String)` | `+stringWithCString:(const char *)cString encoding:(NSStringEncoding)enc`
    |

    | `new String(char[],int,int)` | `+stringWithUTF8String:(const char*)utf8String`
    |

    | `new String(String)` | `+stringWithCharacters:(const unichar*)chars length:(int)length`
    |


    传统的 C 字符串使用 8 位的 `char` 值，通常采用 ASCII 编码，并以单个空字符（`''\0''`）结尾。这是迄今为止最常见的 C 字符串表示形式。要从传统的
    C 字符串创建 `NSString`，请使用 `[NSString stringWithCString:cString encoding:NSASCIIStringEncoding]`。由于空终止字符的存在，字符串的长度是隐含的。如果字符串使用了其他编码，请指定相应的编码。`NSStringEncoding`
    的文档列出了 Cocoa 框架支持的编码。


    另一种流行的 8 位编码是 UTF-8，它由翻译成 8 位字节流的 Unicode 字符组成。大多数 UTF-8 字符串也以空字符结尾。`+stringWithUTF8String:`
    消息会从以空字符结尾的 UTF-8 字符数组创建 `NSString` 对象，等同于 `[NSString stringWithCString:utf8String
    encoding:NSUTF8StringEncoding]`。


    最后，你偶尔会遇到 Unicode 字符数组——相当于 Java 中 `char` 的真正对应物。使用 `+[NSString stringWithCharacters:(const
    unichar*)chars length:(int)length]` 方法从数组构造 `NSString` 对象。你需要向构造函数提供数组中的字符数量。


    对于更特殊的情况，还有其他 `NSString` 构造方法。详情请查阅 `NSString` 文档。


    ### 将 NSString 对象转换为 C 字符串


    将 `NSString` 中的字符提取到 `char` 或 `unichar` 数组的方法与表 8-5 中的方法相对应。表 8-6 列出了提取 `NSString`
    中字符的常见方法以及一些便捷转换方法。


    **表 8-6.** 从 NSString 对象提取字符


    | Java | Objective-C |

    |------|-------------|

    | `getBytes(String)` | `-getCString:(char*)buff maxLength:(int)len encoding:(NSStringEncoding)enc`
    |

    | `new String(String)` | `-cStringUsingEncoding:(NSStringEncoding)enc` |

    | `new String(String)` | `-UTF8String` |

    | `new String(String)` | `-fileSystemRepresentation` |

    | `new String(String)` | `-dataUsingEncoding:(NSStringEncoding)enc` |

    | `getChars(int,int,char[],int)` | `-getCharacters:(unichar*)buffer range:(NSRange)range`
    |

    | `toCharArray()` | `-getCharacters:(unichar*)buffer` |


    将 `NSString` 转换为 C 字符串时，你可以选择自行分配 `char` 数组，然后使用 `-getCString:maxLength:encoding:`
    将字符提取到其中；或者让字符串对象使用 `-cStringUsingEncoding:`、`-UTF8String` 或 `-fileSystemRepresentation`
    为你分配字符数组。这三种方法会分配一个临时字符数组缓冲区，将字符提取到其中，以空字符终止，并返回第一个字符的地址。`-dataUsingEncoding:`
    方法返回一个包含编码后字符串的 `NSData` 对象。只有 `-dataUsingEncoding:` 是 Java 的 `getBytes(String)`
    方法的真正替代品，因为它是唯一一个返回对象的方法。'
  raw: '■Note Modern Objective-C development tools coalesce identical literal strings
    when your application is built. No matter how many times the string literal @"Welcome"
    appears in your application, every occurrence will refer to a single instance
    at runtime.


    There are, however, several key differences between String and NSString that you
    need to be aware of:


    • There are subclasses of NSString.


    • A string object might be mutable.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 8 ■ STRINGS AND PRIMITIVE VALUES


    • There are two kinds of strings: Objective-C strings and C strings.


    • The additional operator (+) will not concatenate two strings.


    • Objective-C string literals do follow the C language’s compile-time string concatenation
    syntax.


    The literal string expressions @"Hello" @", World!" and @"Hello, World!" are identical.


    NSString follows a consistent pattern in the Cocoa class framework; when a class
    has immutable and mutable variants, the mutable class is the subclass of the immutable
    class. This has three important consequences. First, the class for mutable string
    objects is the NSMutableString subclass. Use NSMutableString where you would use
    java.lang.StringBuilder.


    The second consequence is that any NSString pointer or parameter could potentially
    contain a reference to a mutable subclass. In Java, the java.lang.String class
    is final and cannot be subclassed, guaranteeing that all String objects are immutable.
    To dynamically create a string requires first constructing a StringBuffer object,
    then converting that into a String object using toString(). In Objective-C, you
    can use NSMutableString to assemble a string then simply return it or use it as
    a regular NSString object. If you do not modify it thereafter, it’s indistinguishable
    from an immutable string. In the situation where you must guarantee that a string
    object is immutable, construct a copy of the suspicious string object using [NSString
    stringWithString:possiblyMutableString]. Also, see Chapter 12 for information
    about copying objects.


    The last consequence is more of a benefit. Since NSMutableString is a subclass
    of NSString, it inherits all of the methods of NSString. This includes methods
    added to NSString by categories.


    Converting Objects to Strings


    Just as every Java object inherits a toString() method, every Objective-C object
    inherits the


    -(NSString*)description method. Its purpose and use is virtually identical to
    toString() in Java.


    Notably:


    • The base class implementation of -[NSObject description] returns a string containing
    the name of the object’s class and its address. Unless overridden, this is an
    object’s default description.


    • String formatting functions and the debugger send objects a -description message
    whenever they need their string representation.


    • -[NSString description] returns itself.


    • -[NSNumber description] returns a string representation of the original value.


    • Many classes override -description to provide a more informative string representation.
    For example, the collection classes return a string describing all of the objects
    in the collection—


    recursively sending -description to each object.


    C Strings


    Finally, there’s the added confusion of having two types of strings: Objective-C
    string objects and traditional C strings. A C string is just the address of an
    array of characters, and is more of a programming convention than a defined entity.
    The C language’s only concession to strings is the syntax for declaring a literal
    string ("hi!"), equivalent to allocating a null-terminated array of characters
    (char string[] = { ''h'', ''i'', ''!'', ''\0'' }).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 8 ■ STRINGS AND PRIMITIVE VALUES


    ■Tip As a Java programmer, you will undoubtedly compile an Objective-C program
    and encounter the message


    “warning: initialization from incompatible pointer type” or “warning: passing
    argument from incompatible pointer type.” This is typically because you omitted
    the ‘@’ before an Objective-C string literal.


    Instead of declaring a literal string object (@"Hello", of type NSString*), you
    declared a literal C string ("Hello", of type const char*). Don’t feel bad. Even
    after years of Objective-C programming, I still make this mistake about once a
    week.


    Converting C Strings into NSString Objects


    While you can program for ages in Objective-C without ever touching a C string,
    inevitably the day will come when you need to interact with C functions that expect
    or return C strings. The principal methods for constructing a new NSString object
    from a C string are listed in Table 8-5\. These are very similar to the Java constructors
    for creating String objects from byte or character arrays.


    ***Table 8-5.** Constructing NSString Objects from Character Arrays* Ja va


    O bje ctiv e- C


    new String(byte[],String)


    +stringWithCString:(const char *)cString


    encoding:(NSStringEncoding)enc


    +stringWithUTF8String:(const


    char*)utf8String


    new String(char[],int,int)


    +stringWithCharacters:(const unichar*)chars length:(int)length Traditional C strings
    use 8-bit char values, are typically encoded using ASCII, and are terminated with
    a single null (''\0'') character. This is by far the most common representation
    of C


    strings. To create an NSString from a traditional C String, use [NSString stringWithCString:cString
    encoding:NSASCIIStringEncoding]. Because of the null termination character, the
    length of the string is implied. If the string is encoded using some other encoding,
    specify that encoding instead. The documentation for NSStringEncoding lists the
    encodings supported by the Cocoa framework.


    The other popular 8-bit encoding is UTF-8, which consists of Unicode characters
    translated into a stream of 8-bit bytes. Most UTF-8 strings are also null terminated.
    The +stringWithUTF8String: message will create an NSString object from a null-terminated
    UTF-8 character array and is equivalent to [NSString stringWithCString:utf8String
    encoding:NSUTF8StringEncoding].


    Finally, you may occasionally encounter arrays of Unicode characters—the true
    equivalent of a Java char. Use the +[NSString stringWithCharacters:(const unichar*)chars
    length:(int)length]


    method to construct an NSString object from the array. You will have to supply
    the constructor with the number of characters in the array.


    There are other NSString constructors for more specialized situations. Consult
    the NSString documentation for the details.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 8 ■ STRINGS AND PRIMITIVE VALUES


    Converting NSString Objects into C Strings


    Converting the characters in an NSString into a char or unichar array mirrors
    the methods in Table 8-5.


    Table 8-6 lists the common methods of extracting the characters in an NSString
    along with some convenience converters.


    ***Table 8-6.** Extracting Characters from NSString Objects* Ja va


    O bje ctiv e- C


    getBytes(String) -getCString:(char*)buff


    maxLength:(int)len


    encoding:(NSStringEncoding)enc


    -cStringUsingEncoding:(NSStringEncoding)enc


    -UTF8String


    -fileSystemRepresentation


    -dataUsingEncoding:(NSStringEncoding)enc


    getChars(int,int,char[],int) -getCharacters:(unichar*)buffer range:(NSRange)range


    toCharArray() -getCharacters:(unichar*)buffer


    When converting an NSString into a C string you have the option of allocating
    the char array yourself and then using -getCString:maxLength:encoding: to extract
    the characters into it, or letting the string object allocate a character array
    for you using -cStringUsingEncoding:, -UTF8String, or


    -fileSystemRepresentation. These three methods allocate a temporary character
    array buffer, extract the characters into it, terminate it with a null character,
    and return the address of the first character. The


    -dataUsingEncoding: method returns an NSData object containing the encoded string.
    Only


    -dataUsingEncoding: is a true substitute for Java’s getBytes(String) method, because
    it’s the only one that returns an object.'
