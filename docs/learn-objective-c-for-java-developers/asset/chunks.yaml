- fmt: "# `removeObjectsInRange`:\n\n`removeObjectsInArray`:\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 16 ■ COLLECTION PATTERNS\n\n`set(int,Object)`\n\n`replaceObjectAtIndex:withObject:`\n\
    \n`replacePointerAtIndex:`\n\n`withPointer:`\n\n`replaceObjectsAtIndexes:withObjects:`\n\
    \n`replaceObjectsInRange:`\n\n`withObjectsFromArray:range:`\n\n`replaceObjectsInRange:`\n\
    \n`withObjectsFromArray:`\n\n`exchangeObjectAtIndex:`\n\n`withObjectAtIndex:`\n\
    \n`setArray:`\n\n`trimToSize()`\n\n`compact`\n\nA few of the methods in Tables\
    \ 16-3 and 16-4 aren’t one-to-one replacements for Java methods, although most\
    \ are. For example, `toArray()` returns an array object whereas `-getObjects:`\
    \ populates a C array with the collection values. Trivial expressions like `arrayList.isEmpty()`\
    \ are easily replaced with `[array count]==0`. Most methods are self-explanatory.\n\
    \n### `NSArray`, `NSMutableArray`\n\nExcept for not allowing `nil` (null) values,\
    \ `NSMutableArray` is probably as close to `java.lang.ArrayList` as you’re going\
    \ to get. As you can see from the earlier tables, there are far more convenience\
    \ methods, so look for an array method before writing your own code to, say, exchange\
    \ two elements in the collection.\n\n`NSArray` makes the distinction between two\
    \ objects that are equal (`-indexOfObject:`) and two objects that are identical\
    \ (`-indexOfObjectIdenticalTo:`). The latter compares object pointers for equality,\
    \ while the former compares the object’s value for equality. See the “Collection\
    \ Equality Contracts” section later in this chapter.\n\nA number of methods, like\
    \ `-removeObjectsAtIndexes:`, operate on an arbitrary list of indexes defined\
    \ by an `NSIndexSet` object—another collection class discussed later in the Unordered\
    \ Collections section. Methods like `-objectsAtIndexes:` are particularly powerful;\
    \ it will return a new `NSArray` object that’s an arbitrary subset of the receiver’s\
    \ collection, chosen using the indexes in an `NSIndexSet`.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 16 ■ COLLECTION PATTERNS\n\n### COCOA COLLECTION CLASS ORGANIZATION\n\
    \nJava collection classes are neatly organized into inheritance trees. The base\
    \ `Collection` interface has `List`, `Map`, and `Set` sub-interfaces, which are\
    \ embodied in `AbstractCollection`, `AbstractList`, `AbstractMap`, and `AbstractSet`\
    \ classes that are eventually implemented as the concrete collection classes we\
    \ use every day.\n\nObjective-C classes have almost no hierarchy. Most are direct\
    \ subclasses of `NSObject`. The fact that they all implement a `-count` method\
    \ is by convention, not formal design. Most of the time this makes little or no\
    \ difference. Objective-C does lack methods like Java’s `addAll(Collection)` because\
    \ it has no base class that encompasses all collection classes.\n\nOne of the\
    \ reasons for this is that many of the Objective-C collection classes are actually\
    \ implemented in C. For example the Core Foundation `CFArray` type implements\
    \ `NSArray`, and the two are interchangeable. See the “Toll-Free Bridge” section\
    \ of Chapter 25 for more details.\n\n### `NSPointerArray`\n\n`NSPointerArray`\
    \ is a newer collection class. It has no immutable base class, so in that respect\
    \ it is more like Java’s `ArrayList` class. What sets `NSPointerArray` and its\
    \ siblings `NSMapTable` and `NSHashSet` apart from other collection classes is\
    \ the ability to “program” the collections. The collection is initialized with\
    \ a set of delegate functions that define its personality. `NSPointerArray` objects\
    \ are constructed using an `NSPointerFunctions` object that contains a set of\
    \ callback functions that will be used to manipulate the values in the collection.\
    \ The callback functions are: `hash`, `isEqual`, `size`, `description`, `acquire`,\
    \ and `relinquish`. When you add a value to the array, the value is passed to\
    \ the `acquire` function. When the value is removed, it is processed through `relinquish`.\
    \ When comparing values in the collection, the candidate values are passed to\
    \ the `isEqual` function for comparison.\n\n> **Note** You might be wondering\
    \ why the function pointer set includes delegate functions that perform `hash`\
    \ and comparisons when `NSPointerArray` provides no means for searching the collection.\
    \ This is for consistency with the map and set collections. The latter classes\
    \ use the same pointer function objects and do use the `hash` and comparison functions\
    \ extensively.\n\nBy employing a set of delegate functions, the collection can\
    \ tailor itself to a wide variety of solutions. To make the new collection easy\
    \ to use, the Cocoa framework includes predefined pointer function sets that can\
    \ be selected by mixing pointer function option constants, some of which are listed\
    \ in Table 16-5. These predefined functions sets implement most of the collection\
    \ behaviors that you’re ever likely to need. The two most common `NSPointerArray`\
    \ personalities have convenience constructors:\n\n`[NSPointerArray pointerArrayWithStrongObjects]`\
    \ creates a regular object array and `[NSPointerArray pointerArrayWithWeakObjects]`\
    \ creates an object array that uses weak references.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 16 ■ COLLECTION PATTERNS\n\n**Table 16-5.** Common `NSPointerFunctionsOptions`\n\
    \n| Option Identifier | Description |\n|---|---|\n| `NSPointerFunctionsStrongMemory`\
    \ | Values are pointers, stored using strong references. This is the default memory\
    \ option if no memory option is specified. |\n| `NSPointerFunctionsZeroingWeakMemory`\
    \ | Values are pointers, stored using weak references. |\n| `NSPointerFunctionsObjectPersonality`\
    \ | Values are object pointers. Objects are compared using an `-isEqual:` message.\
    \ The `-description` message is used to generate object descriptions. This is\
    \ the default personality if no personality is specified. |\n| `NSPointerFunctionsObjectPointerPersonality`\
    \ | Values are object pointers. Objects are compared by testing their pointers\
    \ for equality. The `-description` message is used for object descriptions. |\n\
    | `NSPointerFunctionsCStringPersonality` | Values are pointers to C strings. Values\
    \ are compared using the `strcmp()` function, and descriptions are generated by\
    \ converting the C string into an `NSString` object. |\n| `NSPointerFunctionsIntegerPersonality`\
    \ | Values are integers. |\n| `NSPointerFunctionsCopyIn` | Values are copied when\
    \ added to the collection. If the values are object pointers, they must conform\
    \ to `NSCopying`. |\n\nYou can also create an `NSPointerArray` by combining one\
    \ memory storage option, one personality option, and the optional “copy in” option\
    \ from the list in Table 16-5. The code in Listing 16-3 creates an `NSPointerArray`\
    \ collection that makes copies of objects added to the collection, and keeps strong\
    \ references to those copies.\n\n**Listing 16-3.** Custom `NSPointerArray`\n\n\
    ```objectivec\nNSPointerArray *array = [NSPointerArray pointerArrayWithOptions:\
    \ (NSPointerFunctionsObjectPersonality\n                                     \
    \                            |NSPointerFunctionsStrongMemory\n               \
    \                                                  |NSPointerFunctionsCopyIn)\
    \ ];\n```\n\nThere are even more progressively esoteric options that allow `NSPointerArray`\
    \ to store pointers to C structures, contain copies of whole C structures, use\
    \ memory managed with C’s `calloc()` and `free()` functions, and so on. See the\
    \ documentation for `NSPointerFunctionsOptions` for a complete list. For the ultimate\
    \ control, you can create your own `NSPointerFunctions` objects if the predefined\
    \ functions don’t meet your needs.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 16 ■ COLLECTION PATTERNS\n\n### Dictionary Collections\n\n`NSDictionary`,\
    \ `NSMutableDictionary`, and `NSMapTable` organize unordered pairs of objects,\
    \ equivalent to `java.util.HashMap`. Each pair consists of a key object and a\
    \ value object. Values are addressed using objects equal to their keys. Keys in\
    \ the collection are unique, but values can be duplicated. Specifically, Objective-C\
    \ and Java dictionary classes have these common features:\n\n- Keys and values\
    \ in the collection are object references.\n- Key objects should not change value.\n\
    - Keys must adhere to the equality and hash contracts.\n- Keys are unique. Storing\
    \ a new value for an existing key replaces the exiting key/value pair with the\
    \ new one."
