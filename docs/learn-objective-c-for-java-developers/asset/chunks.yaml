    NSStream


    Where NSFileHandle is a generic wrapper that can be used with data streams, NSStream
    is a specialized class designed exclusively for use with serial data streams.
    NSStream has two usable subclasses: NSInputStream and NSOuputStream. These are
    the closest Objective-C equivalents of java.io.InputStream and java.io.OutputStream.
    The base NSStream class defines the methods common to both subclasses (i.e., -open,
    -close, -streamStatus). Naturally, NSInputStream defines a -read:…


    method and NSOutputStream defines a -write:… method, along with other methods
    applicable only to input or output streams.


    Like their Java counterparts, NSInputStream and NSOutputStream can be connected
    to a variety of sources including pipes, sockets, data files, and memory buffers.
    But instead of defining explicit subclasses for each variation, Objective-C presents
    a single class that operates in different modes. The object you use might actually
    be a private subclass, but that’s an implementation detail that should be ignored.
    Table 13-1 shows the Java stream classes and the equivalent NSInputStream or NSOutputStream
    constructor.


    Table 13-1\. Creating Stream Objects


    Ja va


    O bje ctiv e- C


    new ByteArrayInputStream(bytes)


    [NSInputStream inputStreamWithData:bytes]


    new FileInputStream(path)


    [NSInputStream inputStreamWithFileAtPath:path]


    new ByteArrayOutputStream()


    [NSOutputStream outputStreamToMemory]


    new ByteArrayOutputStream(size)


    [NSOutputStream outputStreamToBuffer:buffer capacity:size]


    new FileOutputStream(path)


    [NSOutputStream outputStreamToFileAtPath:path append:NO]


    The specific Java subclasses include methods applicable to that type of data stream.
    For example, the java.io.ByteArrayOutputStream includes a toByteArray() method
    that retrieves the collected output data as a byte array object. The NSStream
    classes relate stream-specific information via their properties dictionary. To
    obtain the data collected by an NSOutputStream initialized with


    +outputStreamToMemory, obtain the stream’s NSStreamDataWrittenToMemoryStreamKey
    property, like this:


    NSData *bytes = [outStream propertyForKey:NSStreamDataWrittenToMemoryStreamKey];
    Similarly, the current file position for a stream attached to a data file can
    be examined, or modified, by manipulating the stream’s NSStreamFileCurrentOffsetKey
    property; the value is an NSNumber object. These are the only two stream properties
    of general interest. Other properties are concerned with network socket configuration.


