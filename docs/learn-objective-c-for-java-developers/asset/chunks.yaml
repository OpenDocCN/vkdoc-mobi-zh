    \ getCString:(char*)[buffer bytes]\n                maxLength:len+1\n        \
    \         encoding:NSWindowsCP1250StringEncoding];\n// [buffer bytes] 现在包含了 unicodeString\
    \ 的以 null 结尾的 C 字符串版本\n// 使用 Windows 中欧和东欧字符集进行编码。\n```\n\n如果字符串中的 Unicode 字符无法通过请求的编码来表示，则上述消息将返回`NO`或`NULL`。你可以使用`-canBeConvertedToEncoding:(NSStringEncoding)enc`来预先检查转换，或者考虑使用`-dataUsingEncoding:(NSStringEncoding)enc\
    \ allowLossyConversion:(BOOL)flag`。为`allowLossyConversion`传递`YES`将始终返回一个编码后的字符串，但会省略或简化任何无法编码的字符。另请注意，`NSNonLossyASCIIStringEncoding`以及`NSUTF…StringEncoding`系列的编码可以表示整个\
    \ Unicode 字符范围，并且将始终返回一个成功编码的字符串。\n\n最后两个方法，`-getCharacters:(unichar*)buffer range:(NSRange)range`和`-getCharacters:(unichar*)buffer`，是`+stringWithCharacters:length:`的补充方法。两者都将\
    \ Unicode 值提取到`unichar`数组中。这些方法不执行任何编码。提取的`unichar`字符数量始终与源范围相同。\n\n# 格式化字符串\n\
    \n从其他值创建字符串的方法多得令人眼花缭乱，但迄今为止最通用的方法是`+[NSString stringWithFormat:(NSString*)format,\
    \ …]`。其在 Java 中的对应方法是`java.lang.String.format(String,Object…)`。它具有相同的用途和使用方式，但格式化字符串中的格式说明符略有不同。\n\
    \n与 Java 类似，格式字符串参数是结果字符串的模板，其中嵌入了使用参数列表中的值替换的格式说明符（例如`%d`）。与 Java 不同的是，可变参数列表中的值要么是对象指针，要么是未包装在对象中的原始值。实际上，将它们包装在对象中会严重限制`-stringWithFormat:`的实用性。避免将原始值转换为对象使得`-stringWithFormat:`使用起来更加方便——也更高效。以至于你会发现，在很多本应使用`java.lang.StringBuffer`或其他技术的地方，你会转而使用它。\n\
    \n格式说明符遵循以下通用语法：\n\n```\n%[argument_index$][flags][width][.precision][length]conversion\n\
    ```\n\n唯一显著的区别是可选的长度修饰符，Java 不需要它。常用的转换格式说明符及其 Java 等效项列于表 8-7 中。\n\n**表 8-7.**\
    \ 格式转换说明符\n\n| Java 类型 | Objective-C 类型 | 替换为 |\n| --- | --- | --- |\n| `%s`/`%S`\
    \ (对象) | `%@` | 对象的`-description` (`toString()`) |\n| `%p` | 任意指针 | 十六进制内存地址 |\n\
    | `%s` | `char*` | 以 Null 结尾的 ASCII C 字符串 |\n| `%S` | `unichar*` | 以 Null 结尾的\
    \ Unicode C 字符串 |\n| `%c` | `char` | 8 位 ASCII 字符 |\n| `%c` | `char` `%C` `unichar`\
    \ | 16 位 Unicode |\n| `%d` | `%d`/`%D`/`%i` `int` | 有符号十进制值 |\n| `%u`/`%U` | `unsigned\
    \ int` | 无符号十进制值 |\n| `%o` | `%o`/`%O` `unsigned int` | 八进制值 |\n| `%x`/`%X` |\
    \ `%x`/`%X` `unsigned int` | 十六进制值 |\n| `%e`/`%E` | `%e`/`%E` `float`, `double`\
    \ | 科学记数法表示的值 |\n| `%f` | `%f`/`%F` `float`, `double` | 十进制值 |\n| `%g`/`%G` |\
    \ `%g`/`%G` `float`, `double` | 十进制值或科学记数法表示的值 |\n| `%a`/`%A` | `%a`/`%A` `float`,\
    \ `double` | 十六进制值 |\n| `%%` | `%%` | 字面量`%`字符 |\n\n最显著的区别是 Objective-C 使用`%@`转换说明符来表示对象描述；这取代了\
    \ Java 的`%s`说明符。对所有 Objective-C 字符串和对象参数使用`%@`。所有其他格式说明符都期望一个原始标量或指针。标志、宽度和精度修饰符的行为与它们在\
    \ Java 中的行为大致相同。\n\nC 语言的可变参数列表不提供关于各个参数的类型或大小信息。其机制在第 6 章的“可变参数”部分有解释。每个参数的类型和大小的推断依据是格式字符串中的长度和转换说明符。这带来了两个重要限制。\n\
    \n第一个限制是关于可选的参数索引修饰符：你不能“跳过”参数。以语句`[NSString stringWithFormat:@\"%d-%3$d\",1,2,3]`为例。格式字符串不提供关于第二个可变参数的类型或大小的信息。缺少此信息，格式化器便没有足够的信息来提取第三个可变参数，因此格式化操作会失败。\n\
    \n第二个限制是，长度修饰符和转换说明符的组合必须与参数的类型一致。格式化器盲目地假设每个参数都与说明符隐含的类型一致，并据此进行解释。这是导致乱码字符最常见的一个原因，有时还可能导致灾难性的运行时错误（例如，试图将一个整数解释为指向对象的指针）。表\
    \ 8-8 列出了长度修饰符及每个修饰符所隐含的参数类型。如果省略了长度修饰符，则假定参数类型与表 8-7 中列出的类型兼容。\n\n**表 8-8.**\
    \ 转换长度修饰符\n\n| 修饰符 | 适用的转换 | 参数类型 |\n| --- | --- | --- |\n| `hh` | `d`, `i`, `o`,\
    \ `u`, `x`, `X` | `char`, `unsigned char` |\n| `h` | `d`, `i`, `o`, `u`, `x`,\
    \ `X` | `short int`, `unsigned short int` |\n| `l` | `d`, `i`, `o`, `u`, `x`,\
    \ `X` | `long int`, `unsigned long int` |\n| `ll`, `q` | `d`, `i`, `o`, `u`, `x`,\
    \ `X` | `long long int`, `unsigned long long int` |\n| `L` | `a`, `A`, `e`, `E`,\
    \ `f`, `F`, `g`, `G` | `long double` |\n"
- fmt: '# 格式化字符与数字转换


    要将`char`格式化为无符号数值，请使用说明符`%hhu`。要将64位`long long`整数格式化为十六进制，请使用说明符`%llx`或`%qx`。如果不确定参数类型是否与说明符匹配，请使用类型转换强制转换，如`[NSString
    stringWithFormat:@"%hi",(short int)i]`。


    在32位CPU架构中，`long int`类型是32位的，因此`int`和`long int`含义相同。尽管如此，在传递`long int`参数时，匹配正确的长度修饰符（`%ld`）是良好的编程实践，即使更简单的形式（`%d`）也兼容。


    Objective-C 字符串格式化不提供布尔值、日期或时间的格式说明符。`-[NSDate description]`方法使用类似ISO的国际格式返回日期和时间。如果这足够，可以使用`%@`格式化日期对象。对于更复杂的日期格式化，请使用`NSDateFormatter`，其结果可以通过`%@`插入到格式字符串中。格式化布尔值时，我通常使用三元条件表达式，如`[NSString
    stringWithFormat:@"%@",(t?@"YES":@"NO")]`。


    这绝不是对格式化字符串的全面探讨。Cocoa框架实现了IEEE `printf`规范，并附带一些额外的Objective-C特定扩展。该IEEE标准广泛且包含许多晦涩的选项、功能和说明符。“Format
    Specifiers”部分的“String Programming Guide for Cocoa”[^1]，由Apple发布，以及“Standard 1003.1”[^2]，由IEEE和The
    Open Group发布，包含完整描述。


    # NSFormatter


    `NSFormatter`类是用于将值对象转换为字符串及反向转换的对象的抽象基类。不要将其与`java.util.Formatter`类混淆。Java的`Formatter`是上一节描述的格式化逻辑的实现位置。Cocoa的`NSFormatter`类定义了创建格式化器对象的抽象接口。`NSFormatter`对象执行用户所见所输入的内容与（可能的）复杂值（如货币、日历日期和时钟时间）之间的转换。


    `NSFormatter`对象旨在封装诸如规范化、本地化和用户显示偏好等功能——这些转换对于简单的格式说明符来说过于复杂。它们可以单独使用，也可以附加到某些视图对象上，在视图中自动调用以在数据模型和视图之间进行转换。


    Cocoa框架提供了两个具体实现：`NSNumberFormatter`和`NSDateFormatter`。如果有需要，您可以子类化`NSFormatter`并创建自己的格式化器。


    多年来，某些`NSFormatter`类发生了重大变化。为了向后兼容，除非另行配置，这些类可能表现出旧版行为。请根据您的编程环境检查`NSFormatter`行为。为获得最佳体验，请在可用时使用现代行为。如果这不是默认行为，清单8-7显示了如何在开始使用它们之前设置现代行为。


    **清单8-7. 设置现代格式化行为**


    ```objc

    // 在创建任何日期或数字格式化器对象之前发送这两条消息。

    // 在应用程序初始化中执行此操作是一个好地方。

    // 这将为所有新的日期和数字格式化器对象设置行为模式。


    [NSDateFormatter setDefaultFormatterBehavior:NSDateFormatterBehavior10_4];

    [NSNumberFormatter setDefaultFormatterBehavior:NSNumberFormatterBehavior10_4];


    // 或者，您可以在创建每个日期和数字格式化器后单独设置其行为。


    NSDateFormatter *dateFormatter = [NSDateFormatter new];

    [dateFormatter setFormatterBehavior:NSDateFormatterBehavior10_4];

    NSNumberFormatter *numberFormatter = [NSNumberFormatter new];

    [numberFormatter setFormatterBehavior:NSNumberFormatterBehavior10_4];

    ```


    格式化器使用所需的格式化选项进行配置，然后重复用于转换值。`-(NSString*)stringForObjectValue:(id)value`方法使用当前配置的格式将对象值转换为字符串。`-(BOOL)getObjectValue:(id*)object
    forString:(NSString*)string errorDescription:(NSString**)error`执行反向转换，为给定字符串返回一个值。如果转换成功，它返回`YES`。如果不成功，它返回`NO`并创建一个描述问题的错误对象。


    [^1]: Apple, Inc., “String Programming Guide for Cocoa,” http://developer.apple.com/documentation/Cocoa/Conceptual/Strings/index.html,
    2008.

    [^2]: The IEEE and The Open Group, “The Open Group Base Specification Issue 6,
    IEEE Std 1003.1,” http://www.opengroup.org/onlinepubs/009695399/functions/printf.html,
    2004.


    ## NSNumberFormatter


    `NSNumberFormatter`格式化十进制数字。它实现了两个便捷方法：`-stringFromNumber:`和`-numberFromString:`。配置格式化器的最简单方法是使用`-setNumberStyle:`的预定义格式化样式之一。样式会考虑用户的语言、用户区域设置的文化惯例以及他们的全局显示偏好。表8-9列出了部分预定义的数字格式样式。


    **表8-9. 预定义数字格式样式**


    | 样式 | 用于 |

    | --- | --- |

    | `NSNumberFormatterDecimalStyle` | 十进制数 |

    | `NSNumberFormatterCurrencyStyle` | 本地货币 |

    | `NSNumberFormatterPercentStyle` | 百分比 |

    | `NSNumberFormatterScientificStyle` | 科学计数法 |

    | `NSNumberFormatterSpellOutStyle` | 自然语言（例如“二十二”） |


    如果预定义样式之一不够用，您可以使用数字格式模式配置格式化器。数字格式字符串使用Unicode数字格式模式标准（Unicode技术标准#35[^3]），不应与`-stringWithFormat:`及类似方法使用的格式说明符混淆。数字格式模式形成一个模板，描述显示多少有效数字、使用什么标点符号，并且可能包含零值和负值的备用模板。表8-10显示了一些示例数字格式模式以及为美国英语用户格式化数字时的结果字符串。表8-11显示了西班牙用户的相同结果。


    **表8-10. 英语（美国）中的示例数字格式模式**


    | 数字格式 | 123 | 4.5 | 6 | -0.98765 |

    | --- | --- | --- | --- | --- |

    | `#,##0.5` | 7.0 | | | |

    | `1,234.6` | | | | |

    | `0.0` | -1.0 | | | |

    | `#,##0.###;zero;#,##0.###-` | 7 | | | |

    | `1,234.56` | | | | |

    | `zero` | | | | |

    | `0.988-` | | | | |

    | `000000.0000` | `000007.0000` | | | |

    | `001234.5601` | | | | |

    | `000000.0000` | | | | |

    | `-000000.9876` | | | | |

    | `00.0%` | `700.0%` | | | |

    | `123456.0%` | | | | |

    | `00.0%` | | | | |

    | `-98.8%` | | | | |


    **表8-11. 西班牙语（西班牙）中的示例数字格式模式**


    | 数字格式 | 123 | 4.5 | 6 | -0.98765 |

    | --- | --- | --- | --- | --- |

    | `#,##0.5` | 7,0 | | | |

    | `1.234,6` | | | | |

    | `0,0` | -1,0 | | | |

    | `#,##0.###;zero;#,##0.###-` | 7 | | | |

    | `1.234,56` | | | | |

    | `zero` | | | | |

    | `0,988-` | | | | |

    | `000000.0000` | `000007,0000` | | | |

    | `001234,5601` | | | | |

    | `000000,0000` | | | | |

    | `-000000,9876` | | | | |

    | `00.0%` | `700,0%` | | | |

    | `123456,0%` | | | | |

    | `00,0%` | | | | |

    | `-98,8%` | | | | |


    最后，您可以通过直接单独设置`NSNumberFormatter`的近四十个属性中的任意一个来对格式化进行极其精细的控制。


    数字格式样式会自动本地化结果。格式字符串会为您本地化某些元素，例如小数点分隔符，但并非全部。单独设置各种`NSNumberFormatter`属性可赋予您最终控制权，但会忽略用户设置的本地化和显示偏好。


    ## NSDateFormatter


