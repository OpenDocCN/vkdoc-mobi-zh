    ascending:YES];


    NSSortDescriptor *selfSort = [[NSSortDescriptor alloc] initWithKey:@"self"


    ascending:YES];


    NSArray *sortDescriptors = [NSArray arrayWithObjects:lengthSort,selfSort,nil];
    NSMutableArray *array = …


    [array sortUsingDescriptors:sortDescriptors];


    The collection’s -sortUsingDescriptors: method takes an array of NSSortDescriptor
    objects to form a comparison hierarchy. The objects in the collection are compared
    using the first descriptor in the array. If the first descriptor determines that
    the objects are equal, the second descriptor is used, and so on.


    NSSortDescriptors are very useful in user interfaces. Various views that display
    collections of objects in columns and rows typically have an interface in which
    the user can click on a column and have the items in the display sorted using
    that property. What happens behind the scene is that each column is associated
    with an object property and will produce an NSSortDescriptor object for that property.
    Collecting all of the active sort descriptors into an array produces a sorting
    definition suitable for use with -sortUsingDescriptors:.


    Filtering Collections


    The NSArray and NSSet collections support a sophisticated filtering mechanism
    using predicates. A predicate is a tree of expression objects that describe an
    abstract evaluation, like timeRemaining==0 AND


    projectStatus!=''finished''. Predicates can be obtained from the user through
    a graphical interface, created by interpreting a predicate statement string like
    the example just given, or (rarely) constructed programmatically.


    The immutable collections implement methods that return a new collection with
    only those objects that cause the predicate to evaluate to YES. The mutable collections
    have additional methods that will remove all objects that cause the predicate
    to evaluate to NO.


    See the Predicate Programming Guide1 for a complete description of predicate objects
    and predicate expression syntax.


    1 Apple, Inc., Predicate Programming Guide, http://developer.apple.com/documentation/


    Cocoa/Conceptual/Predicates/, 2008.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16 ■ COLLECTION PATTERNS


    Collection Concurrency


    Collections should not be modified during an enumeration or modified concurrently
    from another thread. This section describes a couple of techniques for avoiding
    changes in a collection until after an enumeration is complete. After that, the
    thread-safety issues are addressed.


    Enumerate a Copy of the Collection


    The first technique to avoid modifying a collection while it is being iterated
    is to simply copy the collection and iterate through the copy, leaving the original
    free to be altered. The code in Listing 16-14


    demonstrates this technique.


    Listin g 16-14\. Enumerating a Collection Copy


    NSMutableDictionary *zombies = …


    for ( NSString *key in [zombies allKeys] ) {


    Zombie *zombie = [zombies objectForKey:key];


    if ([zombie hasExpired])


    [zombies removeObjectForKey:key];


    }


    The expression [zombies allKeys] returns a new, immutable array containing a copy
    of all the keys in the dictionary. The fast enumeration then occurs over the keys
    in the array, not the keys in the dictionary, so you are free to modify the contents
    of the dictionary during the enumeration.


    The technique works equally well for arrays and sets.


    Defer Changes to the Collection


    The other technique is to defer the changes by collecting them and performing
    the changes after the enumeration is complete. Listing 16-15 demonstrates this
    technique using an array and an NSIndexSet.


    Listin g 16-15\. Deferring Collection Changes


    NSMutableArray *zombies = …


    NSMutableIndexSet *deadZombies = [NSMutableIndexSet indexSet]; NSUInteger i;


    for (i=0; i<[zombies count]; i++) {


    Zombie *zombie = [zombies objectAtIndex:i];


    if ([zombie hasExpired])


    [deadZombies addIndex:i];


    }


    [zombies removeObjectsAtIndexes:deadZombies];


    The NSMutableIndexSet collects the indexes of the objects we intend to delete
    from the collection. At the end of the enumeration, all of the identified objects
    are deleted en masse using a single


    -removeObjectsAtIndexes: message.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16 ■ COLLECTION PATTERNS


    Thread Safety


    Like Java, none of the mutable collection classes are thread safe. Unlike Java,
    Objective-C doesn’t provide any thread-safe mutable collections. However, the
    immutable collections are all inherently thread safe.


    All of the immutable collections (NSArray, NSDictionary, NSSet) are thread safe,
    since it’s impossible to change their content. Collections are also thread safe
    if you simply avoid making any changes to them. You could safely share an NSMutableArray
    with another thread as an NSArray object, as long as you could guarantee that
    the underlying mutable array would never be modified in the future.


    If you can’t guarantee that, then make an immutable copy of the collection and
    return that instead.


    ■Caution A thread-safe collection does not automatically protect the objects within
    that collection. Any object used from more than one thread must be thread safe.


    If you need to share a mutable collection between threads, protect the changes
    to the collection with @synchronized accessor functions or semaphores. The AutoSafeFIFO
    and FastFIFO classes shown in Chapter 15 are good examples.


    Garbage Collection and Weak Collections


    Tangentially related to thread safety are the potential problems with collections
    that maintain weak references to objects. Garbage collection runs concurrently
    and can collect weakly referenced objects at any time. Collections that maintain
    weak references can spontaneously lose objects or return nil values.


    This can affect their count and enumerations. Specifically, be mindful of these
    potential problems:


    • The collection -count can change at any time.


    • Any previously stored value in an array may return nil. Any member of a dictionary
    or set may spontaneously disappear.


    • A fast enumeration may iterate over nil values anywhere during the enumeration.


    • NSEnumerator objects should not be used when the collection uses weak references.
    The


    -nextObject message could return nil for any value, which would be interpreted
    as the end of the enumeration. Use fast enumeration or programmatic iteration.


    If these effects are problematic, you can eliminate them by making a temporary
    copy of the collection using a collection object that uses strong references.
    Enumerate the values of the copy, and then forget the temporary collection.


    Summary


    Collections in Objective-C fulfill very similar roles to those in Java. You need
    to be cognizant of some of the subtle differences, like not modifying a collection
    during enumeration. But with those in mind, the familiar programming patterns
    and uses for arrays, dictionaries (maps), and sets remain largely the same.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](index-333_1.png)


    **C H A P T E R 1 7**


    ■ ■ ■


    Delegation Pattern


    The delegation pattern is an alternative to inheritance that allows an object’s
    behavior to be customized or overridden without subclassing. The delegation pattern
    is enthusiastically embraced in Objective-C.


    Understanding the role of delegate objects in the Cocoa framework is crucial to
    effective use of the frameworks, especially the application and user interface
    classes. This chapter will explain the delegation pattern, the role and use of
    delegate objects, how to define your own delegates, and how to incorporate the
    delegation pattern in your own designs.


    Understanding Delegates'
