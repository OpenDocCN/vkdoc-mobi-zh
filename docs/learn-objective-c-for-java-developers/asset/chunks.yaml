    reference


    NSAutoreleasePool’s -drain method is about the only method that’s functional in
    both environments. With garbage collection turned on, it hints to the garbage
    collector that it might want to start a garbage collection cycle.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 24 ■ MEMORY MANAGEMENT


    Summary


    Managed memory requires some additional effort, but it isn’t onerous. Just remember
    these basic rules:


    • When storing an object reference in a persistent variable, retain it.


    • Release or autorelease any retained reference before discarding it.


    • Write a -dealloc method to release all retained objects.


    • Always return retained or autoreleased objects.


    • Autoreleased objects won’t be released until after the current method has returned.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 2 5**


    ■ ■ ■


    **Mixing C and Objective-C**


    One of the great strengths of Objective-C is that it allows seamless integration
    with C functions and variables. This gives you direct access to the vast wealth
    of existing C APIs. This chapter discusses the basic ways to mix C and Objective-C
    code in the same application, and covers Core Foundation, a C


    library that includes data structures that are interchangeable with Objective-C
    objects. Mixing languages creates some interesting memory management issues, which
    are explained toward the end of the chapter.


    Using C in Objective-C


    “Using C in Objective-C” is somewhat misleading, because Objective-C is a strict
    superset of the C


    language. You really can’t *use* C in Objective-C, since Objective-C *is* C. The
    term is usually applied when you write code that uses C structures and calls C
    functions directly, instead of using Objective-C objects and messages.


    Calling C Functions from Objective-C


    There have been a number of code examples presented in the book that implement
    C functions and use them in Objective-C classes. These are standard C functions
    that can be called from C or Objective-C


    code. A C function with a static type limits its scope to the code in the module
    being compiled. Non-static functions are global and can be called from any module.
    (Remember that in this context, “static”


    means private, not static in the Java sense.) An example of a static C function
    is shown in Listing 25-1.'
  trans: "\n# Objective-C 内存管理与 C/Objective-C 混合编程\n\n## 自动释放池\n\n所有 Objective-C 对象都假定它们在一个活跃的自动释放池（autorelease\
    \ pool）范围内运作。如果不存在自动释放池，向对象发送`-autorelease`消息将在控制台打印一条警告消息，提示您的应用程序正在泄漏对象。\n\n\
    运行循环（run loop）和 AppKit 框架会为您创建和清理自动释放池。您必须自行创建自动释放池的两种情况是：在命令行工具的开头，或者创建新线程时。自动释放池属于线程，因此任何新线程都应立即创建一个自动释放池，如代码清单\
    \ 24-19 所示。\n\n**代码清单 24-19.** 创建线程的自动释放池\n\n```\n@implementation Threader\n\n\
    - (void)myThread:(id)ignored\n\n{\n\nNSAutoreleasePool *pool = [NSAutoreleasePool\
    \ new];\n\n…\n\n[pool drain];\n\n}\n\n@end\n```\n\n代码清单 24-19 中的`-myThread:`方法在其自身的线程中启动。它的首要任务是创建一个顶层自动释放池，该池将被所有对象使用，直到线程结束，此时必须清理该池。\n\
    \n**注意：** `-[NSAutoreleasePool drain]`消息是相当新的。旧代码发送`-release`消息代替。在受管内存环境中，两者是相同的。当将受管内存与垃圾回收混合使用时（参见下一节），`-drain`会向垃圾回收器发送一个提示，让其开始回收。两者都是正确的。\n\
    \n如果代码清单 24-19 中的线程在循环中执行某些操作，它应创建嵌套的自动释放池，以定期释放临时对象。这也适用于任何在返回前产生大量临时对象的方法。代码清单\
    \ 24-20 展示了一个循环，它在工作时定期创建和释放自动释放池。\n\n**代码清单 24-20.** 创建嵌套的自动释放池\n\n```\nNSAutoreleasePool\
    \ *wadingPool = nil;\n\nint poolCount = 0;\n\nNSUInteger i;\n\nfor (i=0; i<1000000;\
    \ i++) {\n\nif (wadingPool==nil)\n\n    wadingPool = [NSAutoreleasePool new];\n\
    \n…\n\nif (++poolCount>2000) {\n\n    poolCount = 0;\n\n    [wadingPool drain];\n\
    \n    wadingPool = nil;\n\n}\n\n}\n```\n\n代码清单 24-20 中的循环定期创建一个嵌套的自动释放池，该池被清理以释放循环体中创建的临时对象。这当然打破了“自动释放的对象直到当前方法返回才会被释放”的规则，但这是因为您自己在清理池——所以您应该知道这一点。\n\
    \n新的自动释放池本质上是嵌套在先前活跃的自动释放池内部的。\n\n清理一个池会隐式地清理在其内部创建的所有自动释放池。代码清单 24-19 中的代码不需要确保`wadingPool`在退出循环前被清理。包含`wadingPool`的自动释放池会在其被清理时清理它。例如，异常处理器不需要清理任何嵌套的自动释放池。唯一重要的是，顶层自动释放池在线程终止前被清理。\n\
    \n## 混合受管内存与垃圾回收\n\n您可能会发现自己需要编写既能在受管内存环境又能在垃圾回收环境中运行的 Objective-C 代码。这是可行的，因为受管内存方法和垃圾回收技术重叠很少。在垃圾回收环境中，管理引用计数的消息（`-retain`、`-release`、`-autorelease`）被忽略。在受管内存环境中，编译器对垃圾回收的支持（`__strong`和`__weak`指针类型）被忽略。最终结果是代码在这两种环境中都能正确运行。\n\
    \n当编译将在混合内存环境中运行的代码时，应包含编译器对垃圾回收的支持。在 Xcode 中，将“Objective-C Garbage Collection”构建设置为“Supported”。这会使编译器包含对垃圾回收的支持，但同时也包含支持受管内存所需的代码。当“Objective-C\
    \ Garbage Collection”构建设置为“Required”（仅垃圾回收）时，编译器会主动剥离仅对受管内存有用的代码。这使代码更高效，但牺牲了向后兼容性。\n\
    \n编写能在两种环境中运行的代码相当直接。通常，正确实现受管内存的代码也能在垃圾回收环境中工作。例如，本章中的所有代码示例在启用垃圾回收时都能正确运行。表\
    \ 24-2 列出了每种环境对代码的影响。\n\n**表 24-2.** 受管内存与垃圾回收的效果对比\n\n| 代码 | 受管内存 | 垃圾回收 |\n\
    |------|----------|----------|\n| `-retain` | 保留一个对象 | 忽略 |\n| `-release` | 释放一个对象\
    \ | 忽略 |\n| `-autorelease` | 将对象添加到自动释放池 | 忽略 |\n| `-retainCount` | 返回当前保留计数 |\
    \ 无意义 |\n| `-dealloc` | 发送给对象以销毁它 | 运行时阻止此消息发送 |\n| `-finalize` | 从不发送 | 当对象即将被回收时发送\
    \ |\n| `__strong` | 忽略 | 表示强引用 |\n| `__weak` | 忽略 | 表示弱引用 |\n| `-drain` | 清理自动释放池\
    \ | 触发垃圾回收 |\n| `@property (assign)` | 未保留的属性 | 强引用 |\n| `@property (retain)`\
    \ | 保留的属性 | 强引用 |\n\n`NSAutoreleasePool`的`-drain`方法大约是唯一在两种环境中都有功能的方法。当垃圾回收开启时，它提示垃圾回收器可能想要开始一个垃圾回收周期。\n\
    \n## 总结\n\n受管内存需要一些额外的努力，但并不繁重。只需记住这些基本规则：\n\n- 将对象引用存储在持久变量中时，保留它。\n- 在丢弃任何保留的引用之前，释放或自动释放它。\n\
    - 编写一个`-dealloc`方法来释放所有保留的对象。\n- 始终返回保留或自动释放的对象。\n- 自动释放的对象在当前方法返回之前不会被释放。\n\n\
    ---\n\n# 第 25 章：混合 C 和 Objective-C\n\nObjective-C 的一大优势是它允许与 C 函数和变量无缝集成。这让您可以直接访问大量现有的\
    \ C API。本章讨论了在同一应用程序中混合 C 和 Objective-C 代码的基本方法，并介绍了 Core Foundation，这是一个 C 库，包含可与\
    \ Objective-C 对象互换的数据结构。混合语言会带来一些有趣的内存管理问题，这些问题将在本章末尾进行解释。\n\n## 在 Objective-C\
    \ 中使用 C\n\n“在 Objective-C 中使用 C”这个说法有些误导，因为 Objective-C 是 C 语言的严格超集。您实际上不能*使用*\
    \ C 在 Objective-C 中，因为 Objective-C *就是* C。这个术语通常用于当您编写直接使用 C 结构体和调用 C 函数的代码时，而不是使用\
    \ Objective-C 对象和消息。\n\n### 从 Objective-C 调用 C 函数\n\n本书中已经呈现了许多代码示例，它们实现了 C 函数并在\
    \ Objective-C 类中使用它们。这些是从 C 或 Objective-C 代码中调用的标准 C 函数。具有静态类型的 C 函数将其作用域限制在正在编译的模块中的代码。非静态函数是全局的，可以从任何模块调用。（请记住，在此上下文中，“static”意味着私有，而不是\
    \ Java 意义上的静态。）一个静态 C 函数的示例如代码清单 25-1 所示。\n"
- fmt: "### **Listing 25-1.** C Function and Objective-C Method\n\n```objc\nstatic\
    \ NSInteger compareZombieBrains( id l, id r, void *ignored )\n{\n    float lSize\
    \ = [l brainSize];\n    float rSize = [r brainSize];\n    if (lSize < rSize)\n\
    \        return NSOrderedAscending;\n    else if (lSize > rSize)\n        return\
    \ NSOrderedDescending;\n    return NSOrderedSame;\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 25 ■ MIXING C AND OBJECTIVE-C\n\n```objc\n- (NSArray*)zombiesSortedByIntelligence\n\
    {\n    return [zombieArray sortedArrayUsingFunction:compareZombieBrains context:NULL];\n\
    }\n```\n\nC functions can be defined anywhere outside of an Objective-C directive,\
    \ or anywhere an Objective-C method can be defined. This means that you can mix\
    \ C functions and Objective-C methods in an `@implementation` directive, but some\
    \ programmers will group their C functions outside the `@implementation`. It's\
    \ a matter of style.\n\nYour Objective-C application can call C APIs provided\
    \ by the operating system, it can link to standard C libraries, and you can include\
    \ C source modules in your project. This makes it easy to interface with the wide\
    \ universe of POSIX functions, C frameworks, shared libraries, and open-source\
    \ code.\n\n### Using Objective-C Objects in C\n\nC functions in an Objective-C\
    \ module (`.m`) are compiled as Objective-C code, not just C. The C function in\
    \ Listing 25-1 sends Objective-C messages to objects just as if it were an Objective-C\
    \ method. The only difference is that there is no object context (`self`). In\
    \ this respect, a C function is the equivalent of a static class method in Java.\n\
    \nWhen you add a C source file (`.c`) to your Xcode project, it will be compiled\
    \ as plain C. The source file cannot include any Objective-C syntax. If you need\
    \ to use Objective-C objects in a C module, you have two choices:\n\n- Isolate\
    \ the functions that use Objective-C objects and move them to an Objective-C (`.m`)\
    \ source file. The file can consist entirely of C functions, but it will be compiled\
    \ as Objective-C and can use Objective-C syntax to reference objects and send\
    \ messages.\n- Send Objective-C messages directly using one of the Objective-C\
    \ runtime functions, such as `objc_msgSend(id, SEL, …)`.\n\nThe latter solution\
    \ is awkward, but technically you can do anything in C that you can do in Objective-C.\
    \ The entire Objective-C runtime is, after all, written in C. See the *Objective-C\
    \ 2.0 Runtime Reference* ¹ for specific details.\n\n### Core Foundation\n\nCore\
    \ Foundation is a large library of C functions that are engineered around the\
    \ concept of objects, which it terms *opaque types* or just *types*. These opaque\
    \ types have an internal structure that is compatible with Objective-C objects,\
    \ and a respectable number of Core Foundation types are interchangeable with Objective-C\
    \ classes. This reciprocity is called the *toll-free bridge*. The goal of Core\
    \ Foundation is to seamlessly provide a large number of operating system and framework\
    \ services to *both* C and Objective-C programmers. C programmers use `CFTypeRef`\
    \ values, which are pointers to opaque data structures, and pass them to Core\
    \ Foundation functions. Objective-C programmers store object pointers and send\
    \ them messages. The code executed is the same in both cases.\n\nMost Core Foundation\
    \ types do not have a toll-free bridge to Objective-C. If you need their functionality,\
    \ you'll need to use the Core Foundation data types and functions directly. Core\
    \ Foundation employs many of the same concepts as Objective-C, it just implements\
    \ them with its own types, functions, and terminology. A comparison of common\
    \ Core Foundation types and functions along with their Objective-C equivalents\
    \ are listed in Table 25-1.\n\n¹ Apple Inc., *Objective-C 2.0 Runtime Reference*,\
    \ [http://developer.apple.com/documentation/Cocoa/Reference/ObjCRuntimeRef/](http://developer.apple.com/documentation/Cocoa/Reference/ObjCRuntimeRef/),\
    \ 2008.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### **Table 25-1.**\
    \ Core Foundation Terminology\n\n| Objective-C | Core Foundation |\n|-------------|----------------|\n\
    | `Class` | `CFTypeID` |\n| `id` or `NSObject*` | `CFTypeRef` |\n| `NSString*`\
    \ | `CFStringRef` |\n| `[t class]` | `CFGetTypeID(t)` |\n| `[t isEqual:t2]` |\
    \ `CFEqual(t1,t2)` |\n| `[t description]` | `CFCopyDescription(t)` |\n| `[t retain]`\
    \ | `CFRetain(t)` |"
