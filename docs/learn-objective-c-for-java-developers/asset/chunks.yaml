    The Matrix objects in both Java and Objective-C are simple, clean, and compact.
    There’s only one problem: as the dimensions of a matrix grow, the computations
    required to add and multiply two matrices increases exponentially. In this particular
    application, it’s discovered that a significant number of matrices are the identity
    matrix. Multiplication can be optimized if it’s known that at least one of the
    two matrices is an identity matrix.


    One solution is to first test the two matrices of an operation to determine if
    either is the identity matrix. This could significantly reduce the computations
    to multiply two matrices when one of them is an identity matrix. However, it adds
    additional overhead to all multiplications and only manages to replace exponential
    growth with linear growth.


