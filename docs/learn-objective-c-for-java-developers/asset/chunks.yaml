    ## 归档的复杂性


    与软件工程中的几乎所有事物一样，简单的案例很容易处理；真正棘手的是边界条件。归档（序列化）也不例外。这里有许多令人困扰的问题需要处理。Java 和 Objective-C
    的处理方式大多相似。这些问题包括瞬态值、保存数据与不同类版本之间的兼容性、共享对象、对象图之外的对象以及重复对象。


    ### 瞬态属性


    Java 提供了 `transient` 关键字来标记不应包含在序列化数据流中的实例变量。在 Objective-C 中，解决方案是在编码和解码过程中简单地忽略该属性。列表
    12-7 展示了 `ScheduledEvent` 类的修改版本，其中包含一个屏幕坐标属性，用于保存预定事件最后显示的位置。当事件对象存储在文档中时，该值无关紧要，因此它被排除在数据流之外。


    **列表 12-7.** 瞬态属性


    **Java**


    ```java

    public class ScheduledEvent implements Serializable {

    Date startTime;

    double duration;

    RoomIdentifier room;

    transient java.awt.Point lastScreenPopupPosition;

    …

    }

    ```


    **Objective-C**


    ```objectivec

    @interface ScheduledEvent : NSObject <NSCoding> {

    NSDate *startTime;

    NSTimeInterval duration;

    RoomIdentifier room;

    NSPoint lastScreenPopupPosition;

    }

    @end


    @implementation ScheduledEvent

    …

    - (void)encodeWithCoder:(NSCoder*)encoder

    {

    [encoder encodeObject:startTime forKey:@"Start"];

    [encoder encodeDouble:duration forKey:@"Duration"];

    [encoder encodeInt32:room.buildingNo forKey:@"Room.building"];

    [encoder encodeInt32:room.roomNo forKey:@"Room.number"];

    // 不编码 lastScreenPopupPosition

    }

    @end

    ```


    ### 重复对象


    用于创建归档的对象称为根对象。它在一个无向对象图中形成锚点，该图包含根对象引用的所有对象，以及这些对象引用的任何对象，依此类推。对象图可能很简单，比如数组或树，但也可能形成循环和循环引用。如果编码器盲目地跟随每个对象引用，那么对单个对象的多次引用会导致该对象的数据被多次编码，而循环引用则会导致无限递归。Java
    的 `java.io.ObjectOutputStream` 和 Objective-C 的 `NSCoder` 类几乎以相同的方式解决了这个问题。当一个对象首次通过
    `-encodeObject:` 消息发送给编码器时，编码器会递归地向该对象发送 `-encodeWithCoder:` 消息，以在流中编码其数据。编码器还会记住该对象实例。之后所有引用同一对象的
    `-encodeObject:` 消息，都只是在数据流中插入一个指向原始对象的引用。解码时，所有 `-decodeObject` 消息都会返回指向单一解归档对象实例的指针。你无需做任何操作即可获得此行为；了解其工作原理总是有益的。


    解归档可能会无意中创建重复对象。如果编码对象引用了共享池中的对象，就可能发生这种情况。解码器会为数据流中的每个唯一对象创建新实例。这会导致你的应用程序中出现共享对象的副本。有几种方法可以处理这个问题。一种是使用如前文潘通色彩示例中给出的编码方案；对对象进行某种符号化表示编码，然后从公共资源中获取其实际内容。另一种解决方案是重写
    `- (id)awakeAfterUsingCoder:(NSCoder*)decoder` 方法。该消息在对象被解码后发送给它。该方法返回的对象标识符将替换已解码的对象。默认实现返回
    `self`（即不替换），但如果你重写了它，则可以返回任何等效对象。列表 12-8 演示了一个 `Attendee` 类，它避免了创建重复的 `Attendee`
    对象，并将任何新的 `Attendee` 对象添加到公共池中。


    **列表 12-8.** 解码共享对象


    ```objectivec

    @interface Attendee : NSObject <NSCoding> {

    NSString *name;

    NSString *uuid;

    NSMutableSet *scheduledMeetings;

    }

    @end


    @implementation Attendee

    - (id)initWithCoder:(NSCoder*)decoder

    {

    self = [super init];

    if (self != nil) {

    name = [decoder decodeObjectForKey:@"Name"];

    uuid = [decoder decodeObjectForKey:@"UUID"];

    scheduledMeetings = [decoder decodeObjectForKey:@"Meetings"];

    }

    return self;

    }


    - (void)encodeWithCoder:(NSCoder*)encoder

    {

    [encoder encodeObject:name forKey:@"Name"];

    [encoder encodeObject:uuid forKey:@"UUID"];

    [encoder encodeObject:scheduledMeetings forKey:@"Meetings"];

    }


    - (id)awakeAfterUsingCoder:(NSCoder*)decoder

    {

    ScheduleAssets *assets = [ScheduleAssets sharedAssets];

    Attendee *existingAttendee = [assets attendeeWithUUID:uuid];

    if (existingAttendee==nil) {

    // 将此参与者添加到参与者池中

    [assets addAttendee:self];

    } else {

    // 用已存在的参与者替换此参与者

    self = existingAttendee;

    }

    return self;

    }

    @end

    ```


    ### 限制对象图


    有时归档一个根对象会归档远超你意图的内容。归档根对象通常会归档它所引用的所有对象。在我们假设的日程安排应用程序中，一个 `ProjectMeeting` 对象将一个会议与一个项目任务关联起来。将
    `ProjectMeeting` 对象归档并通过电子邮件发送给团队成员以邀请他们参加会议会很方便。问题是，列表 12-9 中的 `ProjectMeeting`
    对象包含一个对会议所关联的 `ProjectTask` 对象的引用。任务对象自然包含对其项目的引用，而项目又包含对所有项目任务、其里程碑、参与项目的团队成员、为项目安排的其他会议的引用，等等。简而言之，我们尝试向某人发送一个会议对象，结果会导致归档整个项目日程安排系统，甚至可能包括应用程序本身。


    Objective-C 的解决方案是有条件地编码对象。被编码的对象图仅包含使用 `-encodeObject:` 或 `-encodeObject:forKey:`
    添加到流中的无条件对象。条件对象则使用 `-encodeConditionalObject:` 或 `-encodeConditionalObject:forKey:`
    进行编码（参见列表 12-9）。只有当这些对象至少被无条件编码过一次时，它们才会被包含在归档中。如果对象的所有包含关系都是条件性的，则该对象将从归档中被排除。当对象图被解码时，针对被排除对象的
    `-decodeObject...` 请求将返回 `nil`。


    **列表 12-9.** 编码条件对象


    ```objectivec

    @interface ProjectMeeting : ScheduledEvent {

    NSString *meetingDescription;

    ProjectTask *task;

    }

    @end


    @implementation ProjectMeeting

    - (id)initWithCoder:(NSCoder*)decoder

    {

    self = [super initWithCoder:decoder];

    if (self != nil) {

    meetingDescription = [decoder decodeObjectForKey:@"Description"];

    task = [decoder decodeObjectForKey:@"Task"];

    }

    return self;

    }


    - (void)encodeWithCoder:(NSCoder*)encoder

    {

    [super encodeWithCoder:encoder];

    [encoder encodeObject:meetingDescription forKey:@"Description"];

    [encoder encodeConditionalObject:task forKey:@"Task"];

    }

    @end

    ```'
- fmt: "# Class Version Compatibility\n\nThe problem with persistent data is that\
    \ it’s persistent. It could persist for days or even years, while your application\
    \ continues to evolve. Eventually, your class will attempt to decode an archive\
    \ written by an earlier version of itself. On occasion, it might even be necessary\
    \ to decode an archive created by some later version of the same class.\n\nJava\
    \ addresses compatibility using a combination of class versions and key/value\
    \ encoding. Java’s class versions are used strictly to inhibit the decoding of\
    \ data that might be incompatible with the class. Java serialization also uses\
    \ key/value encoding, just like an Objective-C keyed archive. But in Java’s case\
    \ the keys are always the names of the instance variables. Java will automatically\
    \ restore the variables in common with its predecessors, and simply ignore variables\
    \ not encoded in the data stream. More complicated compatibility problems require\
    \ that you implement a custom `readObjects(ObjectInputStream)` method. I’m going\
    \ to skip the lengthy details, because this isn’t a book about Java.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**Note:** Backward compatibility is the ability of a newer version of a class/application\
    \ to interpret data created by an older version. Forward compatibility is the\
    \ ability of an older version of a class/application to, at least partially, interpret\
    \ the data created by a newer version.\n\nHow you provide backward, or forward,\
    \ compatibility in Objective-C depends on the archive type.\n\n## Forward and\
    \ Backward Compatibility in Keyed Archives\n\nKeyed archives confer one huge advantage:\
    \ flexible compatibility between class versions. An improved version of the `ScheduledEvent`\
    \ class, shown in Listing 12-10, has changed a little from the initial version\
    \ in Listing 12-4. It contains a new time zone object and the duration value has\
    \ been replaced with an end time object.\n\nListing 12-10. Forward and Backward\
    \ Compatibility in a Keyed Archive\n\n```\n@interface ScheduledEvent : NSObject\
    \ <NSCoding> {\n@private\n    NSDate *startTime;\n    NSDate *endTime;\n    NSTimeZone\
    \ *timeZone;\n    RoomIdentifier room;\n}\n\n@implementation ScheduledEvent\n\n\
    - (id)initWithCoder:(NSCoder*)decoder\n{\n    self = [super init];\n    if (self\
    \ != nil) {\n        if ([decoder containsValueForKey:@\"TimeZone\"])\n      \
    \      timeZone = [decoder decodeObjectForKey:@\"TimeZone\"];\n        else\n\
    \            timeZone = [NSTimeZone localTimeZone];\n\n        startTime = [decoder\
    \ decodeObjectForKey:@\"Start\"];\n        if ([decoder containsValueForKey:@\"\
    End\"]) {\n            endTime = [decoder decodeObjectForKey:@\"End\"];\n    \
    \    } else {\n            NSTimeInterval duration = [decoder decodeDoubleForKey:@\"\
    Duration\"];\n            endTime = [startTime addTimeInterval:duration];\n  \
    \      }\n\n        room.buildingNo = [decoder decodeInt32ForKey:@\"Room.building\"\
    ];\n        room.roomNo = [decoder decodeInt32ForKey:@\"Room.number\"];\n    }\n\
    \    return self;\n}\n\n- (void)encodeWithCoder:(NSCoder*)encoder\n{\n    [encoder\
    \ encodeObject:startTime forKey:@\"Start\"];\n    [encoder encodeObject:endTime\
    \ forKey:@\"End\"];\n    [encoder encodeObject:timeZone forKey:@\"TimeZone\"];\n\
    \    [encoder encodeInt32:room.buildingNo forKey:@\"Room.building\"];\n    [encoder\
    \ encodeInt32:room.roomNo forKey:@\"Room.number\"];\n    [encoder encodeDouble:[endTime\
    \ timeIntervalSinceDate:startTime]\n                   forKey:@\"Duration\"];\n\
    }\n\n@end\n```\n\nThe implementation in Listing 12-10 provides both forward and\
    \ backward compatibility with its initial version. That is, the new version of\
    \ the class can decode archives created by the original version, and the original\
    \ version can decode archives created by the new version. This is accomplished\
    \ through judicious use of archive keys.\n\nThe new version of `ScheduledEvent`\
    \ has a time zone object that the old version lacks. The new version uses the\
    \ `-containsValueForKey:` method to determine if the archive it’s decoding contains\
    \ a value for that key. If it does, it reads the value. If not, it assumes that\
    \ the archive was created by an earlier version of the class and supplies a reasonable\
    \ default. An old version of the class reading a newer archive ignores the value,\
    \ knowing nothing about time zones.\n\nThe replacement of the duration variable\
    \ with `endTime` requires a little more work. Again, `-initWithCoder:` uses `[decoder\
    \ containsValueForKey:@\"End\"]` to determine if the archive contains an `\"End\"\
    ` value. Modern archives would, but old archives wouldn’t. The new class assumes\
    \ that a missing `\"End\"` value implies that it’s reading an older version of\
    \ the archive; it uses the `\"Duration\"` value written by the old version to\
    \ construct an equivalent `endTime` object.\n\nTo provide forward compatibility,\
    \ it archives the `endTime` value twice. Once as an `NSDate` object and again\
    \ as an `NSTimeInterval` compatible with the class’s original duration value.\
    \ An alternate way of maintaining compatibility would be to not encode the `endTime`\
    \ object at all and continue to encode the `\"Duration\"` value, compatible with\
    \ the old version. This would be the preferred solution when the new property\
    \ is logically equivalent to the old one, and easily converted.\n\nHere are a\
    \ few tips for maintaining backward, and potentially forward, compatibility in\
    \ keyed archives:\n\n- Test for the existence of keys added in later versions\
    \ of the class. The absence of a key indicates the archive was created with an\
    \ earlier version.\n- If a value changes type, encode it using a new key.\n- The\
    \ integer and floating point decoding methods perform some modest type conversion.\
    \ All of the integer encoding and decoding methods are interchangeable, as are\
    \ the floating-point methods. Thus, you can encode a number as a 32 bit integer,\
    \ then decode it as a 64-bit integer and vice versa.\n- Initialize values for\
    \ missing keys with something reasonable.\n- For forward compatibility, continue\
    \ to write the keys and values that earlier versions of the class expect, or translate\
    \ newer values into values compatible with older classes.\n- Consider inserting\
    \ a `\"version\"` value, or any other kind of hint, that would help future classes\
    \ determine how the archive values should be interpreted. The statement `[encoder\
    \ encodeBool:YES forKey:@\"isTimeZoneSavvy\"]` would inform future decoders that\
    \ this archive was created with a version of the class that understands time zones.\n\
    \n## Backward Compatibility in Sequential Archives\n\nThe code in Listing 12-9\
    \ solves the problem by conditionally encoding the reference to its `ProjectTask`\
    \ object. If you archive a single `ProjectMeeting` object, the `ProjectTask` object\
    \ is never unconditionally encoded and is omitted. When unarchived, the statement\
    \ `[decoder decodeObjectForKey:@\"Task\"]` returns `nil`. The resulting object\
    \ wouldn’t be connected to the project scheduling data model, but would be sufficient\
    \ for inviting someone to the meeting.\n\nWhen the scheduling system server archives\
    \ the entire project data model, it will encode the project, its tasks, milestone,\
    \ and team member objects unconditionally. When it gets to the `ProjectMeeting`\
    \ objects, the conditional object references are encoded normally because the\
    \ `ProjectTask` objects have been unconditionally encoded elsewhere in the graph.\
    \ When the project data model is unarchived the next day, the `ProjectMeeting`’s\
    \ reference to its `ProjectTask` is restored.\n\nEncoding an object conditionally\
    \ is usually appropriate when the object pointer is a `__weak` reference, or when\
    \ the object is a delegate, a parent, owner, or container."
