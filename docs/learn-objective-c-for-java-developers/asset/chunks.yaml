    # 模型-视图-控制器模式变体


    基本 MVC 模型具有很大的自由度。各个角色的职责可以相互融合，或使用替代的通信路径。


    接下来的几节将介绍几种重要的变体。


    ## 控制器与数据模型合并


    控制器和数据模型可以是同一个对象，如图 20-2 所示。当数据模型非常简单时，这种情况经常出现。从技术上讲，单个整数就是一个数据模型，但仅仅为了封装一个数字而去创建一个数据模型类，会浪费你的编程才能。相反，该值存储在控制器中，并附加到视图对象上进行显示。


    **图 20-2.** *合并的控制器与数据模型*


    这限制了设计的模块化程度，正如本章后面所述。但只要数据模型和控制器没有不恰当地纠缠在一起，将来将应用程序重构为独立的控制器和数据模型类就应该是容易的，并且不会破坏你的设计。关键是要保持数据模型的概念独立于你的控制器，即使它们存在于同一个对象中。


    ## 中介控制器


    模型-视图-控制器设计模式的一种流行变体是中介 MVC 模式，如图 20-3 所示。这种模式在 Cocoa 框架中反复出现；它也是`NSController`类所采用的模式，本章末尾将会描述。


    **图 20-3.** *中介模型-视图-控制器设计模式*


    在中介 MVC 设计中，控制器也充当视图的数据模型。它是一个数据模型代理。中介控制器将数据模型消息传递给实际的数据模型，并将来自数据模型的任何更改通知转发给它的观察者。


    这种设计特别适合数据库应用程序。数据模型对象封装了原始数据。它负责从持久化存储中获取数据、缓存数据以及对其进行任何修改。控制器对象在履行其正常角色的同时，还将数据（以将在应用程序中呈现的形式）呈现给视图对象。这可能涉及过滤、排序和转换数据。数据如何排序、用户在表格中的当前选择等等，都是特定于应用程序的，而非数据本身。从视图对象的角度来看，控制器就是数据模型。视图显示由控制器提供给它经过排序、过滤和转换的数据，并且对底层数据模型没有直接了解。


    ## 视图与数据模型的直接绑定


    通常，显示值的更改本身并不与特定的“操作”相关联。如果视图对象显示的是一个简单的值（数字、字符串或布尔值），它可以直接将更改传达给数据模型对象，如图 20-4
    所示。


    **图 20-4.** *数据模型与视图的直接绑定*


    数据模型属性与视图之间的关系被描述为一种绑定。视图对象显示该值，并在值发生更改时（通过观察机制）更新其显示。如果用户编辑了显示的值，视图对象会通过直接设置新值的方式将其传达给数据模型。绑定将在本章后面更详细地描述。


    ## 其他变体


    基本的 MVC 设计模式的其他一些常见变体如下：


    -   **视图对象绑定到控制器属性：** 通常视图对象会绑定到控制器对象的属性值。例如，控制器可能会定义数据对象来保存临时事务或搜索结果。这对数据模型来说不是一个合适的属性；它对控制器来说是合适的，但从视图的角度来看，它就是一个数据模型。


    -   **视图与数据模型对象合并：** 一个复选框按钮会维护其当前值（选中或未选中），实际上它本身就是自己的数据模型。控制器可以选择不存储复选框的状态，而是选择查询视图对象的状态来获知其值。这不是一种推荐的模式，但使用得非常普遍。


    # MVC 的优势


    那么，MVC 到底有什么值得大惊小怪的呢？乍一看，MVC 似乎给程序员增加了大量额外的工作，将一个可能很简单的对象拆分成多个对象，并伴随着复杂的通信。例如，要使用
    MVC 创建一个自定义按钮，你需要创建一个新的单元格子类（请参阅“缩放”部分），重写其绘制方法，创建一个控制器类，实现一个操作方法，创建这两个类的实例，并将它们附加到一个`NSButton`视图对象上。如果你认为仅需继承`NSButton`并重写其绘制和“鼠标点击”方法会更简单，那么你需要阅读这一节。


    在极少数情况下，你说得对——仅仅继承`NSButton`会更简单。但大多数应用程序并没有那么简单，或者无法保持简单。MVC 在许多方面就像面向对象编程本身一样。它是一种纪律，偶尔会产生更多的工作，但更多时候，它允许设计出大型、优雅、灵活且复杂的应用程序，这些应用程序既易于理解又行为良好。


    以下部分重点介绍了采用模型-视图-控制器设计模式的一些显著优势。


    ## 模块化


    模型-视图-控制器设计模式是关注点分离和封装这两项计算机科学原则的延伸。它鼓励你识别应用程序扮演的角色，并将这些角色分装到不同的对象中。


    这些原则能够改进你的 MVC 设计，其原因与它们通常能改进面向对象编程的原因相同。它们将相互关联的功能本地化到具有可识别边界的容器中。对类的更改往往是被局限的。当更改影响到其他类时，由于被更改类的接口定义良好，分析它们将如何受影响会更容易。


    这些类以后可以被继承、替换或重用，而对你设计的其余部分几乎没有影响。


    ## 灵活性


    模型-视图-控制器设计模式的最大优势之一就是其灵活性。通过将数据模型和控制器的关注点与显示视图分离，这两者可以随意混合和匹配。


    MVC 最强大的功能可能在于能够轻松地替换视图对象，或使用多个视图对象，而无需更改数据模型或控制器。你可能每天都在使用许多利用此功能的应用程序。这里有两个例子。


    苹果的 iTunes 应用程序使用几个不同的视图对象来显示你的音乐和视频库的内容。有表格列表视图、浏览器视图、缩略图视图和 Cover Flow 视图。所有这四个视图都呈现来自同一数据模型的相同信息，只是方式不同。通过将数据模型与视图分离，可以开发新的视图，而无需对数据模型或其他视图进行任何更改。甚至许多控制器逻辑，例如当前歌曲选择、拖放、播放歌曲操作和获取信息，都可以只实现一次，并在四个视图中的任何一个中互换使用。

    '
- fmt: 'The Xcode application is a good example of a document-based MVC application
    with multiple views. A data model object represents the contents of a document
    (source file). Source code editing panes that appear in the Xcode environment
    are the view objects. You can open the same source document in multiple windows
    or panes and they will all display the same content. More amazingly, editing one
    pane updates all of the other panes instantly. This works because the data model
    and all of the views conform to the same MVC communication rules. When one of
    the view objects is edited, it sends those editing requests to its controller,
    which updates the data modal, which broadcasts the changes to all observers. Without
    writing any special code, multiple views of a single data model are kept in perfect
    synchronization.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Chapter 20 ■ Model-View-Controller Pattern


    Programming with well-designed MVC objects is like working with a giant Lego set.
    Any object (data model, controller, or view) is interchangeable with any functionally
    equivalent object. Substituting objects, or attaching multiple objects, does not
    disturb the rest of the design. The mantra of MVC is to create complex applications
    by interconnecting simple objects.


    ### Reuse


    Reuse is closely related to flexibility. By abstracting the functionality of your
    classes, you can reuse your objects in other applications or for other purposes.
    The most commonly reused objects are data model and view objects. The core Cocoa
    view objects (buttons, text fields, image viewers) are reused daily for thousands
    of different purposes, just by connecting them to different data model and controller
    objects.


    ### Scaling


    The Model-View-Controller design pattern reoccurs at different scales. If you
    take a close look at a Cocoa view object like `NSButton`, you’ll actually discover
    a miniature MVC design at work. What you normally treat as a single view object
    (a button) is actually two or three objects:


    - The `NSButton` object is an `NSControl` that implements the controller role
    in the MVC design. `NSButton` determines how the button behaves.

    - The role of the view is handled by an `NSButtonCell` object, a subclass of `NSCell`.
    This object is responsible for drawing the button image and processing mouse and
    keyboard events.

    - The `NSButton` object can maintain its own state (acting as the data model),
    or be bound to a separate data model object.


    To customize the look of a button, you don’t subclass `NSButton`. Instead, you
    create your own `NSCell` subclass that implements the look you want and attach
    that to a plain-vanilla `NSButton` instance.


    Just as iTunes can use alternate views to change the look of your music library
    without changing any of its functionality, you can change the look of a button
    without interfering with its behavior. Flexibility and reuse mean that your custom
    `NSCell` will be compatible with future versions of `NSButton` and could potentially
    be used with other `NSControl` subclasses as well.


    By now, I hope you appreciate the advantages of using the Model-View-Controller
    design pattern. Now it’s time for me to get off my soap box and get down to the
    details of how MVC is used in application design.


    ### Bindings


    So far I’ve discussed MVC communications in a generic way, but the Cocoa framework
    defines a very specific form of MVC communications called a binding. A binding
    defines a relationship between two properties in different objects. A binding
    forms a connection that binds one property of an observer object to a property
    of another object. A binding keeps the two properties synchronized. Cocoa provides
    a framework and an informal bindings communication protocol that does this for
    you. These can be any two objects, but the observer is invariably a view object
    and the observed property will be in a data model or controller object.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Chapter 20 ■ Model-View-Controller Pattern


    **Note:** As of this writing, the iPhone OS does not support the Cocoa bindings
    technology. If you’re targeting the iPhone OS, you’ll have to use Objective-C
    messages, actions, outlets, Key-Value Observing, notifications, or other techniques
    to implement your MVC communications. Actions and outlets are described in the
    “Interface Builder” section.


    In practice, a view object displays the value of the property. Editing the value
    in the view sends messages, via the binding, to the data model to alter its value.
    Any change to the data model’s value notifies the view. Bindings have the following
    attributes:


    - Properties are identified using Key-Value paths. Both objects must implement
    Key-Value Coding–compliant properties.

    - The observer object listens for changes to the property value using Key-Value
    Observing. The bound property must be KVO compliant.

    - `NSController` objects are designed to work with bindings. Specifically, `NSController`
    objects can bind compound values such as sets and arrays. `NSController` also
    defines the concept of a selection, so you can bind a property to the selected
    value(s) of a compound property.

    - A binding can specify when an edited value is committed and when changes to
    the bound property are updated.

    - A binding can provide a default value to use when the bound property is `nil`.

    - A binding can be filtered through a value transformer that converts a bound
    value to a form suitable for use by the observer, and vice versa. For example,
    a transformer might automatically convert between currencies or change centigrade
    to Fahrenheit.


    Bindings can be created programmatically, but that’s rare. Even more unusual is
    creating your own classes that actively participate in a binding; most of the
    classes that you’d ever want to bind to (the `NSView` objects provided by the
    Cocoa framework) and objects with complex bindable properties (subclasses of `NSController`)
    have already been implemented for you. Most of the time you establish a binding
    in Interface Builder from a library view object property to either a KVO-compliant
    property of any object or to a subclass of `NSController`—none of which involves
    any serious programming. You might want to create your own subclass of `NSController`
    or `NSObjectController`, but the base class is already a Cocoa bindings–compatible
    class, so you still won’t get too involved in the mechanics of bindings. If you
    find you need explore these options, refer to the Cocoa Bindings Programming Topics
    guide.¹


    The vast majority of the time, you bind views to properties of your own objects
    and the only prerequisite is that they be Key-Value Observing compliant—which
    most properties are, or else they can easily be made KVO compliant with a small
    amount of work. See Chapter 19 if you need to make sure.


    So far I’ve focused on viewing the value of a property, but bindings are useful
    for many other kinds of properties. A view object, like a check box control, has
    many properties: the button’s title, the font of the title, the state of the check
    box, whether it’s enabled, whether it’s visible, and so on. Any of these properties
    can be bound to a property of another object. Take the TicTacToe project as an
    example. The interface has a Reset button that clears the board and starts a new
    game. The enabled property of this button is bound to the `isStarted` property
    of the game object. Before the game begins, while `isStarted` is `NO`, the button
    is disabled. As soon as the game starts, the button becomes enabled.


    There’s no code in the game object to enable or disable the button, and the button
    doesn’t know anything about the Tic Tac Toe game. The enabled property of the
    view is simply bound to an observable `BOOL` property of another object; no additional
    programming is required.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ¹ Apple Inc., Cocoa Bindings Programming Topics, http://developer.apple.com/documentation/Cocoa/Conceptual/CocoaBindings/,
    2009.'
