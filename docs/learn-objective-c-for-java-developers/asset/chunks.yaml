    一节。`类簇`强化了一条准则：你的代码永远不应假设初始化方法返回的对象就是最初创建的那个对象。\n\n### 小结\n\nObjective-C 的`类簇`为工厂模式增加了新的维度。它们使得实现完全对客户端透明的对象工厂成为可能。这意味着继承时需要更加谨慎；`类簇`可能会使你很难甚至无法为某些类定义子类。\n\
    \n---\n\n# 第 23 章 ■ 单例模式\n\n`单例`是只有一个实例的类。它们通常是向单个（通常是全局的）设施或资源提供面向对象接口的对象。管理数据库对象缓存的类会希望创建自身的一个单进程实例，以便协调整个应用程序的所有对象缓存。提供文件管理方法的类可以创建一个单例对象，供所有其他类用于与文件系统交互。后者也可以通过定义一个仅包含类方法的类来实现，但这种模式在\
    \ Objective-C 中并不常见。\n\n单例对象通常由一个幂等的类方法或 C 函数创建，该方法负责创建和维护该类的唯一实例。这本质上是一种特殊的工厂方法，在第\
    \ 22 章中有详细描述。与工厂方法类似，单例可以通过类方法或`类簇`的退化变体来实现。\n\n## 实现单例\n\n以下是 Cocoa 框架中单例对象的示例：\n\
    \n- `NSApplication`\n- `NSFileManager`\n- `NSDistributedNotificationCenter`\n\
    - `NSWorkspace`\n\n单例有时在启动时创建，但通常通过一个幂等方法提供，该方法返回单例的引用，并在必要时首次创建它。\n\n在 Cocoa\
    \ 框架中，以下类方法返回上述类对应的单例：\n\n- `[NSApplication sharedApplication]`\n- `[NSFileManager\
    \ defaultManager]`\n- `[NSDistributedNotificationCenter defaultCenter]`\n- `[NSWorkspace\
    \ sharedWorkspace]`\n\n单例模式的典型实现如代码清单 23-1 所示。\n\n### 代码清单 23-1. 单例模式\n\n**Java**\n\
    \n```java\npublic class CommandCenter {\n    private static CommandCenter sharedCommandCenter;\n\
    \    public static CommandCenter getCommandCenter() {\n        if (sharedCommandCenter\
    \ == null) {\n            sharedCommandCenter = new CommandCenter();\n       \
    \ }\n        return sharedCommandCenter;\n    }\n}\n```\n\n**Objective-C**\n\n\
    ```objc\n@interface CommandCenter : NSObject\n+ (CommandCenter*)sharedCommandCenter;\n\
    @end\n\nstatic CommandCenter *SharedCommandCenter;\n\n@implementation CommandCenter\n\
    + (CommandCenter*)sharedCommandCenter {\n    if (SharedCommandCenter == nil) {\n\
