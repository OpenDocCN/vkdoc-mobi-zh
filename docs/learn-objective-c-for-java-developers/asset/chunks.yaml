    objectEnumerator];


    ■Tip A little known fact is that NSEnumerator also conforms to NSFastEnumeration.
    This allows any NSEnumerator object to be the collection in a fast enumeration
    statement. In Listing 16-9, the while(…) statement could be replaced with for
    ( key in e ). The enumerator object assumes the role of the collection. This is
    not optimized—the enumerator simply sends -nextObject messages to itself—so don’t
    expect performance typical of fast enumerations.


    There is no Objective-C equivalent to the java.util.Map.Entry object. The closest
    you can achieve is to use -[NSDictionary getObjects:andKeys:] to populate two
    C arrays, one with the keys and the other with the values, as shown in Listing
