  trans: "\n# 错误处理\n\n一些 Objective-C API 和许多程序员遵循传统的 C 语言错误处理模式：测试函数或方法的返回值以确定成功或失败。清单\
    \ 14-9 展示了一些典型示例。这里所采用的编程理念是，异常应保留用于运行时错误（如索引越界、无效对象、缺少应用程序资源、内存不足）以及其他应在开发过程中从应用程序中消除的编程错误。可预见的、合理预期可能发生的失败（如文件未找到、数据库为空、名称重复）应使用错误代码或错误对象来处理。本节描述了不使用异常处理错误的最常用技术，并稍后解释如何将两者结合。\n\
    \n## 清单 14-9. 错误处理示例\n\n```objectivec\n// Simple Error\nNSString *imagePath =\
    \ [[NSBundle mainBundle] pathForImageResource:@\"picture.png\"];\nif (imagePath==nil)\
    \ {\n    NSLog(@\"missing image resource\");\n    return;\n}\n\n// POSIX Error\n\
    int fd = open(\"filename\",O_RDONLY);\nif (fd<0) {\n    NSLog(@\"open() failed\
    \ with error %d\",errno);\n    return;\n}\n\n// Core Foundation Error\nQTUUID\
    \ quickTimeUUID;\nOSErr err = QTCreateUUID(&quickTimeUUID,0);\nif (err!=noErr)\
    \ {\n    NSLog(@\"could not create UUID, error %d\",err);\n    return;\n}\n\n\
    // Cocoa Error\nNSError *error = nil;\nNSDictionary *attributes;\nattributes =\
    \ [[NSFileManager defaultManager] attributesOfItemAtPath:@\"filename\"\n     \
    \                                                        error:&error];\nif (error!=nil)\
    \ {\n    NSLog(@\"could not get attributes of file: %@\",[error localizedDescription]);\n\
    \    [self presentError:error];\n    return;\n}\n```\n\n## 简单错误\n\n当任何函数或方法未能实现其目标并返回空值时，就会发生简单错误。清单\
    \ 14-9 中的 `-pathForImageResource:` 消息是一个很好的例子。该方法返回所需图像文件的路径，如果找不到此类文件，则返回 `nil`。你的代码应该测试结果——除非你设计代码使用了第\
    \ 7 章描述的缺席行为——并提供默认值、返回 `NSError`、抛出异常或引发断言。\n\n## POSIX 错误代码\n\n大多数 BSD 和 POSIX\
    \ 函数返回一个值来指示函数的成功或失败。在清单 14-9 中，`open(...)` 函数如果成功则返回一个文件描述符整数，如果失败则返回一个负值。描述失败原因的代码从线程局部变量\
    \ `errno` 中读取。注意，`errno` 实际上不是一个变量，而是一个预处理器宏，它展开为一个函数调用以获取错误代码。该变量仅保证在下一个 POSIX\
    \ 函数被调用之前包含错误代码，因此在失败后应立即获取代码并保存。\n\n## Core Foundation 错误代码\n\n许多 Core Foundation\
    \ 函数直接向调用者返回结果代码。结果代码的类型为 `OSError` 或 `OSStatus`，通常是负数。函数的成功由值 `noErr` 指示，如清单\
    \ 14-9 所示。由于此类函数返回错误代码，因此使用指向变量的指针来返回任何附加值。\n\n## Cocoa 错误\n\n现代 Cocoa 类和函数在操作未能成功完成时倾向于返回\
    \ `NSError` 对象。消息的发送者总是包含一个指向 `nil` `NSError` 指针变量的指针，如清单 14-9 所示。如果操作失败，该方法会创建一个新的\
    \ `NSError` 对象，并将其地址存储在发送者的变量中。发送者可以检查其变量以查看接收者是否返回了 `NSError`。当失败细节将呈现给用户时，鼓励使用\
    \ `NSError`。\n\n`NSError` 类包含许多设计特性，使其成为设计良好且灵活的错误处理系统中不可或缺的一部分。将 `NSError` 对象集成到你的应用程序中并非易事，但如果你的目标是提供一致、可本地化、模块化和灵活的错误显示与恢复，则强烈推荐这样做。\n\
    \n本书篇幅有限，无法深入 `NSError` 对象的所有细节，但以下各节将提供足够的概述，让你能够理解其实用性。在应用程序中设计 `NSError` 管理之前，请仔细阅读《Cocoa\
    \ 错误处理编程指南》。\n\n### 错误域\n\n每个 `NSError` 对象都有一个域。该域影响着其属性（特别是数字错误代码）的解释方式。例如，POSIX\
    \ 和 Foundation 函数都返回一个整型错误值来描述失败。域决定了应使用哪一组常量来解释该值。主要的域列于表 14-5 中。鼓励你为应用程序特定的错误定义自己的域。\n\
    \n**表 14-5. Cocoa 错误域**\n\n| 域 | 描述 |\n| --- | --- |\n| `NSMachErrorDomain` |\
    \ 内核返回的错误代码。 |\n| `NSPOSIXErrorDomain` | POSIX 和 BSD 函数返回的错误代码。 |\n| `NSOSStatusErrorDomain`\
    \ | Core Foundation 函数返回的错误代码。 |\n| `WebKitErrorDomain` | WebKit 生成的错误。 |\n| `NSURLErrorDomain`\
    \ | 与 URL 相关的错误。 |\n| `NSXMLParserErrorDomain` | XML 解析器错误。 |\n| `NSCocoaErrorDomain`\
    \ | 所有不属于以上特定域的 Cocoa 框架错误。 |\n\n### 自定义与显示\n\n`NSError` 对象的主要作用之一不仅仅是处理错误（异常可以很好地做到这一点），而是向用户显示错误并根据用户的输入采取行动。该过程的前两步通过响应者链执行。响应者链是视觉层次中通向当前活动界面元素的组件链。它在第\
    \ 20 章中有完整描述。\n\n要将错误显示给用户，请将 `NSError` 传递给响应者链中的任何对象——最好是叶组件——通过向其发送 `-presentError:`\
    \ 消息。响应者将依次通过 `-willPresentError:` 消息将 `NSError` 传递给响应者链中的每个对象。这给了你的应用程序每一层一个机会来拦截错误并将其替换为更具体的内容。例如，一个“添加配乐”按钮可以将一个通用的“文件未找到”\
    \ `NSError` 替换为“配乐不可用。您想选择另一首歌曲还是使用默认配乐？”的错误对象。在所有响应者对象处理完错误后，最终的错误会以模态对话框的形式呈现给用户。如果错误发生在窗口上下文中，推荐的消息是\
    \ `-presentError:modalForWindow:delegate:didPresentSelector:contextInfo:`，它会将错误以模态表单的形式附加到窗口上。\n\
    \n### 本地化\n\n`NSError` 类提供了一种本地化错误消息的机制。本地化的消息可以存储在 `NSError` 的 `userInfo` 字典中，使用预定义的键，也可以通过重写其方法来动态生成。使用哪种方法取决于你的需求。表\
    \ 14-6 列出了将显示给用户的四种消息以及返回它们的方法。每个属性访问器的默认实现是从错误的 `userInfo` 字典中检索第三列的值。\n\n**表\
    \ 14-6. `NSError` 本地化方法和 `userInfo` 键**\n\n| 对话框文本 | `NSError` 属性 | `NSError`\
    \ `userInfo` 键 |\n| --- | --- | --- |\n| 错误描述 | `localizedDescription` | `NSLocalizedDescriptionKey`\
    \ |\n| 失败原因 | `localizedFailureReason` | `NSLocalizedFailureReasonErrorKey` |\n"
- fmt: "# NSLocalized\n\nA brief sentence explaining the `FailureReason` (`FailureReasonErrorKey`)\
    \ reason for the failure. Optional. Not all error dialogs display this property.\n\
    \n`-localizedRecoverySuggestion` (`NSLocalizedRecoverySuggestion`, `RecoverySuggestionErrorKey`):\
    \ A sentence describing what actions the user can take to recover from the error.\
    \ Optional.\n\n`-localizedRecoveryOptions` (`NSLocalizedRecoveryOptions`, `RecoveryOptionsErrorKey`):\
    \ An array of button names that correspond to the user’s options described in\
    \ the recovery suggestion. If `nil`, the only option will be “OK.”\n\nAn `NSError`\
    \ object can provide a recovery attempter object, and should if the error includes\
    \ recovery options. The `-presentError:` message will pass the user’s recovery\
    \ choice to the recovery attempter object, which is expected to carry out the\
    \ user’s wishes. The recovery attempter object must implement one of the methods\
    \ in the informal `NSErrorRecoveryAttempting` protocol.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Chapter 14 ■ Exception Handling\n\n### Combining Errors and Exceptions\n\n\
    Academic arguments about the superiority of exceptions and traditional error handling\
    \ will continue to rage on. In the meantime, I’m a big fan of combining the two.\
    \ `NSError` objects have clear advantages in complex applications that must be\
    \ localized. Java-style exception handling has clear advantages for simplifying\
    \ code and execution flow. Listing 14-10 shows one way in which traditional C\
    \ error handling, `NSError` objects, and exceptions can be combined.\n\n**Listing\
    \ 14-10.** Mixing Error Handling\n\n```\n@try {\n    const char *path = …\n  \
    \  int fd = open(path, O_RDONLY);\n    if (fd < 0) {\n        NSString *errorPath\
    \ = [NSString stringWithCString:path];\n        NSDictionary *info = [NSDictionary\
    \ dictionaryWithObject:errorPath forKey:@\"Path\"];\n        NSError *error =\
    \ [NSError errorWithDomain:NSPOSIXErrorDomain code:errno userInfo:info];\n   \
    \     @throw error;\n    }\n    …\n    close(fd);\n} @catch (NSError *error) {\n\
    \    [self presentError:error];\n}\n```\n\n### Summary\n\nObjective-C exception\
    \ handling is robust, simple, and on a par with that provided by Java. Much of\
    \ Objective-C’s permissiveness can be reined in with the liberal use of assertions.\
    \ POSIX, BSD, Core Foundation, and most Cocoa methods only use exceptions for\
    \ (what are considered to be) runtime errors or programming mistakes. You can\
    \ embrace this philosophy, or continue to program using exceptions by combining\
    \ them with traditional design patterns.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Chapter 15 ■ Threads\n\nJava was one of the first programming languages to\
    \ support threads and thread synchronization directly. It was a very forward-looking\
    \ decision. Multicore, multiprocessor computer systems have become the norm, rather\
    \ than the exception. Efficient multi-threaded programming is now essential to\
    \ effective program development, and it’s a trend that continues to accelerate.\n\
    \nThreads and semaphores are conceptually simple, and the high-level differences\
    \ between Java and Objective-C are trivial. Objective-C also makes extensive use\
    \ of run loops, which transform a thread into an event processor. Beyond the basic\
    \ `@synchronized` directive built into the language, the Cocoa framework provides\
    \ a number of additional synchronization tools, each tailored to a specific need.\
    \ And finally, there are classes that perform deferred actions, manage independent\
    \ threads for you, and perform timed tasks relieving you of the burden of creating\
    \ and managing your own threads.\n\nThis chapter begins by describing how threads\
    \ are created, run, and destroyed in Objective-C. It also explains run loops and\
    \ tells you why you would need to create one, and how. After that, it details\
    \ various ways to synchronize multiple threads and make your code thread safe.\
    \ Finally, it presents a few useful classes that can make thread management simpler,\
    \ or possibly unnecessary.\n\n### Thread API\n\nThread management and control\
    \ is centered on the `NSThread` Objective-C class, and closely resembles Java’s\
    \ `java.lang.Thread` class. The equivalent methods are listed in Table 15-1.\n\
    \n**Table 15-1.** Equivalent Thread Methods\n\n| Java (`java.lang.Thread`) | Objective-C\
    \ (`NSThread`) | Description |\n|---|---|---|\n| `currentThread()` | `+currentThread`\
    \ | The thread object for the currently executing thread |\n| `start()` | `-start`\
    \ | Starts a thread |\n| `run()` | `-main` | The code to execute |\n| `isAlive()`\
    \ | `-isExecuting`, `-isFinished` | Determines if the thread has started or finished\
    \ |\n| `sleep(long)` | `+sleepUntilDate:`, `+sleepForTimeInterval:` | Suspends\
    \ the thread for a period of time |\n| `getPriority()` | `+threadPriority` | The\
    \ thread’s priority |\n| `setPriority(int)` | `+setThreadPriority` | Changes a\
    \ thread’s priority |\n| `getName()` | `-name` | The name of the thread |\n| `setName(String)`\
    \ | `-setName:` | Sets the name of the thread |\n| `getStackTrace()` | `+callStackReturnAddresses`\
    \ | Gets the array of return addresses on the stack |\n\nHere are the key differences\
    \ between threads in Objective-C and Java:\n\n- There are no thread groups in\
    \ Objective-C.\n- The Objective-C interface does not provide a method for obtaining\
    \ the list of existing threads.\n- There is no security model. Some operations—like\
    \ setting a thread’s priority—can only be performed from the currently running\
    \ thread, whereas in Java they can be performed on arbitrary threads.\n- You cannot\
    \ interrupt a thread. `NSThread` does provide a `canceled` property that can be\
    \ set and tested, but canceling a thread will not unblock it.\n- There are no\
    \ daemon threads. An Objective-C process runs as long as the main thread is running,\
    \ and all threads terminate when the process terminates.\n- There is no `join()`\
    \ function, but the same functionality can be easily accomplished using `NSConditionLock`,\
    \ as explained later in this chapter.\n- There is no `yield()` method or any equivalent.\n\
    \nThe life cycle of an Objective-C thread is broadly the same as it is in Java.\
    \ You create a thread that will execute a method of an object. When the method\
