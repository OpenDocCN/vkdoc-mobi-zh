    Symbolic Links, Hard Links, and Aliases


    The Mac OS X operating system provides three types of files that reference another
    file. The first are symbolic links. These are special files that contain the path
    to another directory in the file system.


    Generally, a symbolic link acts as if it were the directory to which it refers.
    For example, the directory


    /Users/hannah/Documents/Updates contains the file Monday.doc, and the file /Users/hannah/Public/New
    is a symbolic link containing the path /Users/hannah/Documents/Updates. In this
    situation, the paths


    /Users/hannah/Documents/Updates/Monday.doc and /Users/hannah/Public/New/Monday.doc
    are functionally equivalent and refer to the same file.


    NSFileManager provides methods for creating symbolic links and obtaining their
    contents.


    Most file operations traverse symbolic links transparently. A path that ends with
    a symbolic link usually refers to the link file itself, not the directory that
    it refers to. For example, the statement [[NSFileManager defaultManager] removeItemAtPath:@"/Users/hannah/Public/New"
    error:NULL] would delete the symbolic link file, not the Updates folder. The notable
    exception is the -[NSFileManager fileAttributesAtPath:traverseLink:] method. Its
    second BOOL parameter determines if it will return the attributes of the symbolic
    link file or the attributes of the file the symbolic link refers to. Table 11-6


    lists the methods for creating and reading the contents of symbolic links.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 11 ■ FILES


    ***Table 11-6.** NSFileManager Symbolic Link Methods* Met ho d


    Des cr ipti on


    -(BOOL)createSymbolicLinkAtPath:(NSString*)path


    Creates a symbolic link file at path


    withDestinationPath:(NSString*)destPath


    that refers to the file at destPath.


    error:(NSError**)error


    -(NSString*)destinationOfSymbolicLinkAtPath:(NSString*)path Extracts the path
    that the symbolic


    error:(NSError**)error


    link file refers to.'
  trans: "\n# 过滤与动态定制\n\n过滤及其他动态定制功能通过 `NSSavePanel` 的委托（delegate）实现。要为显示内容中的项目添加过滤功能，需创建一个实现了\
    \ `-(BOOL)panel:(id)sender shouldShowFilename:(NSString*)filename` 方法的对象，并将其设置为面板对象的\
    \ delegate 属性。\n\n有关委托对象可实现非正式协议的完整列表，请参阅 `NSSavePanel` 文档的“委托方法”章节。\n\n虽然清单 11-4\
    \ 中的 Objective-C 代码与 Java 代码功能等价，但它并非呈现文件对话框的首选方式。清单 11-5 中的代码会挂起整个应用程序，直至用户选择文件。如果文件选择操作与某个窗口关联，更推荐使用表单（sheet）——即附加到特定窗口的模态子窗口——以避免阻塞高级应用程序界面。清单\
    \ 11-5 使用与清单 11-4 相同的面板启动了一个模态表单。`beginSheet…` 消息会立即返回，使主应用程序的运行循环保持连续运行。当用户在表单中做出选择后，`didEndSelector:`\
    \ 参数指定的消息会发送给 `modalDelegate:` 对象。只要方法参数与非正式协议定义的内容匹配，这些对象和消息可由你自由选择。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第 11 章：文件\n\n### 清单 11-5. 使用文件选择表单\n\n```\nNSOpenPanel *panel = [NSOpenPanel\
    \ openPanel];\n[panel setCanChooseFiles:YES];\n[panel setCanChooseDirectories:YES];\n\
    [panel setAllowsMultipleSelection:NO];\n[panel beginSheetForDirectory:nil    \
    \   // 使用默认目录\n                         file:nil       // 不预选任何文件\n          \
    \      modalForWindow:documentWindow  // 表单附加到该窗口\n                 modalDelegate:self\n\
    \                didEndSelector:@selector(myOpenDidEnd:returned:context:)\n  \
    \                 contextInfo:NULL];\n...\n- (void)myOpenDidEnd:(NSSavePanel*)sheet\
    \ returned:(int)code context:(void*)ignored\n{\n    if (code==NSOKButton) {\n\
    \        NSString *file = [sheet filename];\n        …\n    }\n}\n```\n\n## 符号链接、硬链接与别名\n\
    \nMac OS X 操作系统提供了三种引用其他文件的文件类型。第一种是符号链接。这类特殊文件包含指向文件系统中另一个目录的路径。\n\n通常，符号链接的行为表现如同它所指向的目录。例如，目录\
    \ `/Users/hannah/Documents/Updates` 中包含文件 `Monday.doc`，而文件 `/Users/hannah/Public/New`\
    \ 是一个符号链接，包含路径 `/Users/hannah/Documents/Updates`。在这种情况下，路径 `/Users/hannah/Documents/Updates/Monday.doc`\
    \ 与 `/Users/hannah/Public/New/Monday.doc` 在功能上等价，并指向同一文件。\n\n`NSFileManager` 提供了创建符号链接及获取其内容的方法。\n\
    \n大多数文件操作会透明地遍历符号链接。以符号链接结尾的路径通常指向链接文件本身，而非其指向的目录。例如，语句 `[[NSFileManager defaultManager]\
    \ removeItemAtPath:@\"/Users/hannah/Public/New\" error:NULL]` 会删除符号链接文件，而非 `Updates`\
    \ 文件夹。一个值得注意的例外是 `-[NSFileManager fileAttributesAtPath:traverseLink:]` 方法。其第二个\
    \ `BOOL` 参数决定了它是返回符号链接文件的属性，还是返回符号链接所指向文件的属性。表 11-6 列出了用于创建和读取符号链接内容的方法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第 11 章：文件\n\n### 表 11-6. NSFileManager 符号链接方法\n\n| 方法 | 描述 |\n|--------|-------------|\n\
    | `-(BOOL)createSymbolicLinkAtPath:(NSString*)path withDestinationPath:(NSString*)destPath\
    \ error:(NSError**)error` | 在 path 处创建一个指向 destPath 文件的符号链接文件。 |\n| `-(NSString*)destinationOfSymbolicLinkAtPath:(NSString*)path\
    \ error:(NSError**)error` | 提取符号链接文件所指向的路径。 |\n"
- fmt: '`-stringByStandardizingPath`的主要目的之一（如表11-1所述）是替换路径中的符号链接，使其指向原始文件。沿用前述示例，将


    `@"/Users/hannah/Public/New/Monday.doc"`传递给`-stringByStandardizingPath`会返回


    `@"/Users/hannah/Documents/Updates/Monday.doc"`。


    第二种替身文件是别名文件，其概念和数据结构继承自经典Macintosh操作系统。别名文件包含序列化的`AliasRecord`结构。要使用它们，必须读取文件内容，并通过Core
    Services函数解析别名。别名的优势在于其智能性：例如，为文档文件创建别名后，即使原文件在同一卷中被重命名或移动到其他目录，别名仍能定位到它。此外，如果原文件位于外部卷或网络卷上，别名可以自动重新挂载该卷，恢复对原始文件的访问。


    从Cocoa和BSD框架的角度看，别名文件仅是普通数据文件，不会自动被识别或解析。唯一的例外是少数高级文件类（如刚刚讨论过的`NSOpenPanel`）。`NSOpenPanel`具有`resolvesAliases`属性，若该属性被设置，系统会自动解析用户选择的任何别名，返回别名所指向的项目，而非别名文件本身。本章后续部分将介绍一些用于处理别名记录的基础函数。


    最后，某些卷格式支持硬链接。硬链接是指文件系统中两个或多个文件共享相同的内容，修改其中一个的数据会同时改变另一个。与别名和符号链接不同，硬链接文件是平级关系，每个文件都与普通文件无异，不存在一个文件“指向”另一个文件的情况；两者在卷上封装的是相同的物理数据。实际上，硬链接文件并不常用。`NSFileManager`创建硬链接的方法为：


    `-(BOOL)linkItemAtPath:(NSString*)srcPath toPath:(NSString*)dstPath error:(NSError**)error`。


    若要“断开”硬链接，只需删除其中一个文件。删除硬链接文件不会丢弃任何数据，因为数据仍保留在另一个文件中。


    ## 处理目录内容


    通过读取目录内容来发现文件是一项常见的编程任务。通常是为了对目录中的每个文件执行某些操作，可能还会递归处理目录中子目录包含的文件。前者是对目录的浅层检查，后者则是深层检查。


    获取目录内容的三种基本方法如表11-7所示。


    `-contentsOfDirectoryAtPath:…`仅返回目录的直接内容（作为文件名数组，而非路径）。`-subpathsOfDirectoryAtPath:…`返回一个数组，包含目录中每个文件的完整路径，以及所有子目录、子子目录等内容。


    **表11-7.** `NSFileManager`目录内容方法


    | 方法 | 返回值 |

    |------|--------|

    | `-(NSArray*)contentsOfDirectoryAtPath:(NSString*)path error:(NSError**)error`
    | 目录中文件的浅层列表 |

    | `-(NSArray*)subpathsOfDirectoryAtPath:(NSString*)path error:(NSError**)error`
    | 包含目录下所有文件路径的深层列表 |

    | `-(NSDirectoryEnumerator*)enumeratorAtPath:(NSString*)path` | 目录项枚举器 |


    `-enumeratorAtPath:`方法返回一个有状态的`NSDirectoryEnumerator`对象，用于迭代目录中的项目。枚举可以是浅层、深层或任意混合形式，具体通过在枚举对象上战略性地发送`-skipDescendents`消息实现。清单11-6展示了遍历目录层级、处理所有`txt`文件但忽略具有`private`扩展名的任何目录内容的代码。'
  raw: 'One of the primary purposes of -stringByStandardizingPath, described in Table
    11-1, is to replace any symbolic links in the path with their originals. Using
    the previous example, passing


    @"/Users/hannah/Public/New/Monday.doc" to -stringByStandardizingPath would return


    @"/Users/hannah/Documents/Updates/Monday.doc".


    The second kind of file that stands in for another is an alias file. The concept
    and data structure are inherited from the classic Macintosh operating system.
    An alias file contains a serialized AliasRecord structure. To use them, you must
    read the contents of the file and resolve the alias using Core Services functions.
    The advantage of aliases is that they are quite intelligent. For example, if you
    create an alias to a document file, that document file can later be renamed and
    moved to another directory on the same volume and the alias will still locate
    it. Furthermore, if the original file was on an external or network volume, an
    alias can automatically remount the volume restoring access to the original file.


    From the perspective of the Cocoa and BSD frameworks, alias files are just plain
    data files and are not automatically recognized or resolved. The exceptions are
    a few very high-level file classes such as NSOpenPanel, which was just discussed.
    NSOpenPanel has a resolvesAliases property that, if set, will automatically resolve
    any alias the user selects, returning the item the alias refers to rather than
    the alias file itself. Some basic functions for using alias records are described
    later in this chapter.


    Finally, some volume formats support hard links. A hard link describes two or
    more files in the file system that share the same content. Changing the data of
    one changes both. Unlike aliases and symbolic links, hard-linked files are peers
    and each is indistinguishable from a regular file. One file does not “point” to
    the other file; both files encapsulate the same physical data on the volume. In
    practice, hard linked files aren’t used that often. The NSFileManager method for
    creating a hard link is


    -(BOOL)linkItemAtPath:(NSString*)srcPath toPath:(NSString*)dstPath error:(NSError**)error.
    To


    “break” a hard link, delete one of the files. Deleting a hard-linked file doesn’t
    dispose of any data, because it is still contained in the other file.


    Working With the Contents of a Directory


    Discovering files by reading the contents of a directory is a common programming
    task. This is usually done to perform some action on each file in the directory,
    possibly recursively processing the files contained in any subdirectories of the
    directory as well. The former constitutes a shallow examination of the directory,
    while the latter is a deep examination.


    The three basic methods of obtaining the contents of a directory are listed in
    Table 11-7.


    -contentsOfDirectoryAtPath:… returns just the immediate contents of the directory
    as an array of file names (not paths). -subpathsOfDirectoryAtPath:… returns an
    array of complete paths to each file in the directory, any subdirectories of the
    directory, sub-subdirectories, and so on.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 11 ■ FILES


    ***Table 11-7.** NSFileManager Directory Content Methods* Met ho d


    Retur n s


    -(NSArray*)contentsOfDirectoryAtPath:(NSString*)path


    Shallow list of files in the directory


    error:(NSError**)error


    -(NSArray*)subpathsOfDirectoryAtPath:(NSString*)path


    Deep list containing the path of every


    error:(NSError**)error


    file enclosed by the directory


    -(NSDirectoryEnumerator*)enumeratorAtPath:(NSString*)path


    A directory item enumerator


    The -enumeratorAtPath: method returns a stateful NSDirectoryEnumerator object
    that’s ready to iterate through the items in the directory. The enumeration can
    be shallow, deep, or an arbitrary mixture by strategically sending the enumerator
    object the -skipDescendents message. Listing 11-6


    shows code that iterates through a hierarchy of directories, processing all “txt”
    files, but ignoring the contents of any directory with a “private” extension.'
