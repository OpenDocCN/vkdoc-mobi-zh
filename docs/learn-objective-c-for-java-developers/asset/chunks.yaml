    \ [super setFrameSize:size];\n         [mapItems makeObjectsPerformSelector:@selector(resize)];\n\
    \      }\n   }\n}\n```\n\nObjective-C 是如何诞生的，以及它为何如此特别，这是一个有趣的故事。\n\n### 历史\n\n\
    Brad Cox 和 Tim Love 是 Objective-C 背后的主要推动者。它最初被称为“C 语言中的面向对象编程”（OOPC）。其目标是将需要解释器的\
    \ SmallTalk 的功能添加到 C 语言中，而无需设计一种全新的语言。1986 年，Cox 发布了当时已更名为 Objective-C 的首份正式描述。1988\
    \ 年，NeXT Computer 采用 Objective-C 作为其主要开发语言。NeXT 丰富了 Objective-C，创建了广泛的类集合，这些类成为新应用程序、开发工具（尤其是\
    \ Interface Builder）以及其操作系统重要组成部分的基础。NEXTSTEP 操作系统最终发展出了 OpenStep API，该 API 定义了一套可移植到多个平台的一致对象和接口。OpenStep\
    \ 的移植版本，以 OPENSTEP 为首，运行在 Sun 的 Solaris、微软的 Windows NT 及其他系统上。GNU（GNU's Not Unix）项目最终创建了一个名为\
    \ GNUstep 的开源实现。\n\nObjective-C 和 NEXTSTEP 共同被誉为创新的开发环境，是少数真正实现了面向对象设计承诺的环境之一。应用程序的设计和创建快速而灵活。但由于种种原因——最显著的是\
    \ C++ 背后的行业惯性——NeXT 和 Objective-C 仍然只相当于一种新奇事物，一个本可以实现何种成就的光辉范例，倘若它们曾被该行业的主要部分所接纳的话。\n\
    \n这一门槛终于在 1996 年被跨越，那一年苹果公司收购了 NeXT Computer、NEXTSTEP 操作系统以及其整套基于 Objective-C\
    \ 的开发工具。苹果公司将 NEXTSTEP 作为其全新 Mac OS X 操作系统的基石。这些对象框架被重新命名为“Cocoa”，此后成长并成熟为一套丰富而强大的工具集——不仅适用于个人计算机应用程序，也适用于像\
    \ iPhone 这样创新的消费设备。\n\n### 一种现代面向对象语言\n\nObjective-C 实现了一个相当了不起的壮举。这门语言本身是精简的，几乎到了贫瘠的程度，然而它却成功实现了一个丰富的对象范式，足以与远为复杂的语言相媲美。这门语言易于学习，也易于实现。许多功能只需通过创建新类即可添加或增强，而无需修改语言本身。例如，使用\
    \ Objective-C，你也许某天早上醒来，就决定用一种新方式来实例化对象。Objective-C 并不定义对象如何创建或销毁——这是由运行时框架通过类方法提供的。你不太可能想重新定义对象实例化，但这个例子突显了语言的灵活性。\n\
    \n### 先进的编译器\n\n由于 Objective-C 是 C 语言之上的一层薄薄的封装，它紧随 C 语言变化的潮流。随着新特性、优化、目标处理器和其他技术被添加到\
    \ C 语言中，Objective-C 也随之受益。这使得 Objective-C 能够与现代化技术和方法保持同步。\n\n当今的编译器技术也意味着 Objective-C\
    \ 代码具有非凡的可移植性。不久前，为一个平台编写的 C 代码极不可能在另一个不同的系统或架构上编译和运行。这正是 Java“一次编写，到处运行”设计的乐趣之一。如今，一个\
    \ C 编译器只需轻轻拨动（命令行）开关，就能针对数十种不同的处理器和硬件。一个典型的例子：不久前苹果公司决定将其整个个人计算机产品线从摩托罗拉/IBM 处理器转向英特尔处理器。数千万行\
    \ Objective-C 代码被移植到一个全新的架构上，而对开发流程几乎没有造成干扰。\n"
- fmt: "# Performance\n\nApple did it again when they ported their Cocoa framework\
    \ to the embedded processor used in the iPhone, and might port their entire software\
    \ library to yet another processor should the opportunity arise. Today, Apple\
    \ maintains a single repository of Objective-C source code that is regularly recompiled\
    \ to run on no less than five different processor architectures. Objective-C is\
    \ “write once, run anywhere” in practice, if not principle.\n\n## Performance\n\
    \nLanguage performance and benchmark wars are infamous, but few would argue that\
    \ C is the fastest high-level computer language available today. There are many\
    \ that claim to be nearly as fast, but it’s almost impossible to exceed C’s performance\
    \ without resorting to hand-coded optimizations or just trickery. It’s no wonder\
    \ that almost all interpreters are written in C or C++–and that includes Java’s\
    \ own virtual machine.\n\nBecause Objective-C is also C, you can optimize your\
    \ application right to the limits of the hardware. It’s easy to start with a simple\
    \ object-based design. If performance analysis shows that the solution isn’t fast\
    \ enough, it can be optimized with snippets of C. Or the code can be rewritten\
    \ entirely in C. If that’s not fast enough, the C compiler gives you direct access\
    \ to the operating system kernel, graphics coprocessors, vector unit instructions,\
    \ and even raw machine code. If your goal is to create the fastest possible application,\
    \ Objective-C will not get in the way.\n\nProgramming in Objective-C also means\
    \ you have direct access to the vast library of C APIs. The POSIX C functions\
    \ available today represent some of the most mature, stable, and secure code in\
    \ the industry.\n\n## Dynamism\n\nObjective-C is often described as a *dynamic*\
    \ language. That’s a difficult term to define. After all, every program is dynamic\
    \ in some form. The term does describe some aspects of the Objective-C language\
    \ itself, but most often refers to the design patterns embraced by Objective-C\
    \ developers.\n\nThe Objective-C language is more dynamic than languages like\
    \ Java and C++. In Java, the variables and methods you define for a class are\
    \ exactly those at runtime. In Objective-C, class definitions are more malleable.\
    \ Other objects and frameworks, which you may or may not have developed, can augment\
    \ your classes and objects with new capabilities. Conversely, you can augment\
    \ other classes–even system classes–with new functionality.\n\nAnother intriguing\
    \ feature of Objective-C is the ability of the runtime system to modify the behavior\
    \ of an object on the fly. A particularly dramatic example of this is in the observer\
    \ pattern. In Java, an observable object is responsible for maintaining a set\
    \ of listener objects and notifying them of changes to its properties. In Objective-C\
    \ when an object wants to observe the property of another object, it makes a request\
