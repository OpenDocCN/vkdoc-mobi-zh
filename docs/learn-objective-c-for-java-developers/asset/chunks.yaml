    pairs notifications to observers. NSNotificationCenter relieves the providers
    of implementing their own observer management; a provider only needs to concern
    itself with sending notifications. Since NSNotificationCenters are the nexus of
    notifications, they will be discussed next, followed by how notifications are
    posted and how observers register to receive them.


    Notification Centers


    An NSNotificationCenter manages a set of observers. Providers can post a notification
    to a notification center, which will distribute it to all of the interested observers
    registered with that center.


    Normally, your objects interact with the single default NSNotificationCenter created
    by the Cocoa framework for the process. This per-process instance is obtained
    with the class message


    [NSNotificationCenter defaultCenter]. This is the Grand Central Station of notifications,
    and the notification center used by the bulk of the Cocoa framework. Consequently,
    if you intend to receive any of those notifications, you must register your object
    with [NSNotificationCenter defaultCenter].


    There are a few other specialized notification centers and you can create your
    own. Each notification center is completely self-contained. A notification posted
    to a center will only be delivered to the objects registered with that notification
    center. The NSWorkspace object defines its own notification center that can be
    obtained with [[NSWorkspace sharedWorkspace] notificationCenter]. If you want
    to receive an NSWorkspace notification, your object must register with that notification
    center.


    ■Note An NSNotificationCenter distributes all notifications synchronously. You
    can, however, attach an NSNotificationQueue, as described in the “Notification
    Queuing” section later in this chapter, to a notification center to deliver notifications
    asynchronously.


    You may also want to define your own notification centers. Chapter 15 showed code
    for creating a per-thread notification center. Since notifications are always
    delivered in the thread that posted them, a per-thread notification center would
    allow you to organize your observers by thread.


    Posting Synchronous Notifications


    Posting a synchronous notification is simple, deftly demonstrated by the Thermometer
    class in Listing 18-1\. There are three pieces of information that make up a notification:
    329


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18 ■ PROVIDER/SUBSCRIBER PATTERN


    • The notification name


    • The sender


    • A dictionary of supplementary information


    The notification name is a string object. It can be any value you choose, as long
    as it doesn’t conflict with the notification names used by other objects. Generally,
    a descriptive title like


    @"TemperatureDidChange" is sufficient to be unique. Notification name constants
    defined by frameworks tend to use class naming conventions. For example, all of
    the Cocoa framework notification names begin with “NS.”


    The object property of a notification contains a reference to the sender. Thus,
    every notification includes an implicit reference to the object that sent it.
    In the example in Listings 18-1 and 18-2, it wasn’t strictly necessary to include
    the temperature value in the userInfo dictionary. The notification receiver could
    have obtained the value with ((Thermometer*)[notification object]).temperature.


    The optional userInfo dictionary is an immutable dictionary containing whatever
    supplementary objects the provider wants to include. As mentioned, it wasn’t strictly
    necessary to include the temperature value in the userInfo dictionary, but it’s
    often a good idea. Having the temperature included in the dictionary relieves
    the observer of having to make too many assumptions about the sender (such as,
    “is the new temperature value still valid when the notification is received?”).


    The userInfo dictionary is a great place to include other useful or transient
    information, such as the previous temperature value, the rate the temperature
    is changing, and so on. Then again, in many notifications the only interesting
    bit of information is the sender.


    The notification name and sender are required. The userInfo dictionary is optional,
    or can be empty. There are three methods for posting notifications:


    • - (void)postNotificationName:(NSString*)name object:(id)sender


    • - (void)postNotificationName:(NSString*)name object:(id)sender userInfo:(NSDictionary*)info


    • - (void)postNotification:(NSNotification*)notification


    The first two messages construct a new NSNotification object from the name, sender,
    and optional dictionary. The last message accepts a pre-assembled NSNotification
    object and posts it. Note that while the object parameter is required, there’s
    no rule that says it must be the object sending the notification. You’re welcome
    to post notifications on behalf of other objects.


    Notifications are delivered synchronously to all observers in the same thread
    before the


    -postNotification… message returns. It’s possible to send notifications asynchronously
    using an NSNotificationQueue, described in the “Notification Queuing” section
    later in the chapter.


    Being a Discriminating Observer


    The real power of notifications is in the flexible ways an observer can register
    to receive them. To register to receive notifications, send the NSNotificationCenter
    an -addObserver:selector:name:object: message. The four parameters define what
    notifications it will receive and how it will receive them:


    • The observer and selector parameters define the object that will receive the
    notifications and the Objective-C message that will be sent to it. The method
    must be compatible with


    -(void)notificationMessage:(NSNotification*)notification. While the observer parameter
    is typically self, you are free to register other objects.


    • The name parameter is the name of the desired notification.


    • The object parameter is the desired provider.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18 ■ PROVIDER/SUBSCRIBER PATTERN


    The selector parameter allows the observer to choose the message it will receive
    when the notification is sent. Your observer can send multiple notifications to
    a single method, or route the same notification from different sources to different
    methods.'
