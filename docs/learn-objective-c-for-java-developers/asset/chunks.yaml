    \ C 语言的层次。最终形成了一种具有卓越特性的面向对象编程语言：\n\n- 现代的面向对象设计范式\n- 先进的编译器\n- 卓越的性能\n- 直接访问\
    \ C 和 C++ API\n- 动态行为\n\n与大多数其他面向对象语言不同，Objective-C 并非创造一种全新的语言——它是 C 语言的一个严格超集。Objective-C\
    \ 的关键字和语法与常规 C 语言截然不同。代码清单 1-1 展示了一段简短的 Objective-C 代码，以及等价的 Java 代码以供比较。基本的控制语句使用的是纯\
    \ C 语言。方括号之间的语句调用的是 Objective-C 方法。\n\n***代码清单 1-1.** Java 与 Objective-C 语法示例*\
    \ Java\n\n```\npublic void setSize( Dimension size )\n{\n   if (size.height!=0\
    \ && size.width!=0) {\n      if (!this.size.equals(size)) {\n         super.setSize(size);\n\
    \         for ( MapItem i: mapItems )\n            i.resize();\n      }\n   }\n\
    }\n```\n\nObjective-C\n\n```\n- (void)setFrameSize:(NSSize)size\n{\n   if (size.height!=0.0\
