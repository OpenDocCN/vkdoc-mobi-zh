  trans: "\n### 类似的技术也适用于 `@property` 指令。\n\n之前我谨慎地提到“一个`@property`指令通常出现在`@interface`指令中”。`@property`指令也可以出现在`@implementation`中。其含义相同，但从`@interface`中省略它也会对其他模块隐藏该定义。\n\
    \nObjective-C 的类别和扩展是细分类声明的更正式模式，允许你将关于类的知识进行分类整理。这些技术以及如何利用它们来模拟 Java 的 private\
    \ 和 protected 方法，将在后续章节中解释。\n\n最后，创建一个“辅助”类有时也很有用——这种类的目的完全服务于另一个类的内部实现。一个辅助类可以在使用它的类的实现文件中完全声明和实现。辅助类的接口和实现对外部类都是隐藏的。如果该类需要一个指向辅助对象的实例变量，请使用一个`@class`指令（接下来会介绍）或\
    \ `id` 类型。\n\n### 前向 `@class` 指令\n\n`@class` 指令声明了一个类名，而没有定义该类。它允许你声明一个对类的引用，而无需编译该类的`@interface`。在\
    \ `@class` 指令之后，你可以引用这个类，但不能编译任何假设了解该类信息的代码——因为编译器对此一无所知。在该类的实际 `@interface` 指令被编译之前，你无法向该类的对象发送消息，也无法访问它的任何属性。\n\
    \n一旦你开始声明指向对象的指针变量，你就会发现编译器要求这些类先被定义，然后才允许你在语句中使用该类名。很自然的倾向是为你 `@interface` 指令中引用的每个对象\
    \ `#import` 所需的类头文件。对于较小的项目来说，这没问题。\n\n对于大型项目，这会给编译器带来负担（翻译过来就是：它会拖慢你的开发速度）。每个使用类\
    \ A 的类都会导入其接口（`#import \"A.h\"`）。如果类 A 拥有指向类 B、C、D 对象的实例变量，它就会导入所有这些头文件。如果类 B、C、D\
    \ 又共同包含了对类 E 到 N 的引用，它们的头文件就会导入所有这些头文件，依此类推。随着项目复杂度的增长，编译每个模块所需的工作量也会呈几何级数增长。\n\
    \n`@class` 指令可以显著减轻这一负担。一个 `@interface` 指令通常只需要知道一个被引用的类存在即可。`@class` 指令的一个典型应用如代码清单\
    \ 3-13 所示。\n\n**代码清单 3-13.** 前向 `@class` 指令\n\n```\n#import \"Vehicle.h\"\n\n\
    @class Engine;\n@class MoonRoof;\n@class Radio;\n\n@interface Car : Vehicle {\n\
    \    Engine *engine;\n    MoonRoof *moonRoof;\n    Radio *radio;\n}\n\n- (void)startEngine;\n\
    - (void)stopEngine;\n- (void)tuneRadio;\n\n@end\n```\n\n`Car` 类包含了指向 `Engine`、`MoonRoof`\
    \ 和 `Radio` 对象的引用。一个导入了此 `@interface` 的模块可以使用 `Car` 的方法和属性，但对其他对象一无所知。`Car` 的\
    \ `@implementation`（大概会使用到这些其他对象）则以导入这些类的完整定义开始。\n\n作为规则，我会 `#import` 父类、所有公共对象的类以及方法返回的对象类（假设调用者会使用返回的对象）的头文件。`@interface`\
    \ 中所有剩下的类都使用 `@class` 声明。\n\n`@class` 指令也使得声明具有循环引用的类成为可能。换句话说，类 A 引用了类 B，而类 B\
    \ 又引用了类 A。\n\n### `self` 和 `super`\n\nObjective-C 方法有两个预定义的变量用于引用自身：`self`（this）和\
    \ `super`（super）。它们的工作原理与 Java 中的对应物完全相同，如代码清单 3-14 所示。\n\n**代码清单 3-14.** `self`\
    \ 和 `super` 的使用\n\n```\n#import \"Person.h\"\n\n@interface Voter : Person {\n\
    }\n\n- (void)setAdult:(BOOL)isAdult;\n\n@end\n\n@implementation Voter\n\n- (void)setAdult:(BOOL)isAdult\n\
    {\n    if (isAdult && !self.isAdult)\n        [VoterRegistration registerVoter:self];\n\
    \    [super setAdult:isAdult];\n}\n\n@end\n```\n\n`self` 变量始终是指向接收者（其方法被调用的那个对象）的指针。`self`\
    \ 变量的类型是指向实现了该方法的类的指针。它可用于访问该类定义或继承的实例变量（例如 `self->secondName`），但不能访问子类的变量（即使对象的实际类是子类）。\n\
    \n> **注意** Java 程序员最初可能会觉得这很奇怪，但 `self` 是一个可修改的自动变量，可以在方法体中重新赋值。我稍后会解释为什么需要这样做。现在，只需要注意不要无意中更改它即可。\n\
    \n语句 `[self method]` 向自身发送一个消息。等效的 Java 语句是 `this.method()` 或仅仅是 `method()`。伪变量\
    \ `super` 与 `self` 相同，但其唯一实际用途是发送消息。语句 `[super method]` 调用由对象父类定义的方法，等效于 Java\
    \ 语句 `super.method()`。\n\n### 类方法\n\n到目前为止，我们只为类定义了实例方法。回顾一下，实例方法以减号（`-`）前缀声明。它定义了该类实例将响应的消息。\n\
    \n以加号（`+`）开头的方法名定义了一个类方法。正如在 `isa` 部分所述，每个类在运行时创建了一个单一的 Class 对象，该对象定义了该类所有实例的身份和行为。类方法定义了该单一\
    \ Class 对象将响应的消息。类方法（从技术上讲）并不等同于 Java 中的静态方法，尽管它们倾向于扮演相同的角色。\n\n在表达式中使用类名时，它求值为该类的单例\
    \ Class 对象。要调用一个类方法，请使用类名作为接收者，如代码清单 3-15 所示。使用类名会将消息发送给该类的 Class 对象。\n\n**代码清单\
    \ 3-15.** 类方法和实例方法的调用\n\n```\n@interface RandomSequence : NSObject {\n    long\
    \ long int seed;\n}\n\n+ (NSNumber *)number;\n+ (NSString *)string;\n\n- (NSNumber\
    \ *)nextNumber;\n- (NSString *)string;\n\n@end\n\n...\n\nNSNumber *n = [RandomSequence\
    \ number];\nNSString *s = [RandomSequence string];\n\nRandomSequence *r = ...;\n\
    n = [r nextNumber];\ns = [r string];\n```\n\n> **注意** 按照惯例，类方法首先定义，随后是实例方法。\n\n\
    方法 `+(NSNumber*)number` 定义了一个返回 `NSNumber` 对象的类方法。语句 `[RandomSequence number]`\
    \ 将消息 `number` 发送给定义 `RandomSequence` 类的单一 Class 对象。\n\n一个 `string` 方法同时为 Class\
    \ 对象和类的实例定义了。语句 `[RandomSequence string]` 将消息 `string` 发送给 Class 对象，并执行 `+(NString*)string`\
    \ 中的代码。语句 `[r string]` 将消息 `string` 发送给 `RandomSequence` 类的一个实例，并执行 `-(NSString*)string`\
    \ 中的代码。这里没有歧义或命名冲突，因为 `-string` 和 `+string` 是为不同对象实现的。\n"
- fmt: "# Class Methods and Object Construction in Objective-C\n\nIn the body of the\
    \ `+(NSNumber*)number` method, the `self` variable refers to the Class object\
    \ (`RandomSignature`). This is where Java class methods and Objective-C class\
    \ methods differ. In Java, a class method has no object context (it has no `this`\
    \ variable). In Objective-C, class messages are sent to the Class object the same\
    \ way messages are sent to regular objects. The statement `[self string]` in the\
    \ body of the `+(NSNumber*)number` method would invoke the class method `+(NSString*)string`,\
    \ not the instance method `-(NSString*)string`. The true equivalent of a static\
    \ Java method is a C function.\n\nThis distinction is important for inheritance.\
    \ Class objects inherit class methods the same way instance methods are inherited.\
    \ If class `B` is a subclass of class `A`, and class `A` defines a class method,\
    \ class `B` inherits that class method. Class `B` can also override the class\
    \ method. Listing 3-16 illustrates this relationship.\n\n**Listing 3-16. Class\
    \ Method Inheritance**\n\n```objectivec\n@interface Classy : NSObject\n\n+ (void)greeting;\n\
    + (NSString*)salutation;\n\n@end\n\n@implementation Classy\n\n+ (void)greeting\n\
    {\n    NSLog(@\"%@, world!\",[self salutation]);\n}\n\n+ (NSString*)salutation\n\
    {\n    return (@\"Greetings\");\n}\n\n@end\n\n@interface Classic : Classy\n\n\
    + (NSString*)salutation;\n\n@end\n\n@implementation Classic\n\n+ (NSString*)salutation\n\
    {\n    return (@\"Hello\");\n}\n\n@end\n\n...\n\n[Classy greeting];   // Logs\
    \ \"Greetings, world!\"\n[Classic greeting];  // Logs \"Hello, world!\"\n```\n\
    \nThe statement `[Classy greeting]` sends the `greeting` message to the `Classy`\
    \ Class object. That method sends itself a `salutation` message and uses the return\
    \ value to construct the log message \"Greetings, world!\".\n\nThe statement `[Classic\
    \ greeting]` sends the `greeting` message to the `Classic` Class object. `Classic`\
    \ does not define a class method `+(void)greeting`, but it inherits one from `Classy`.\
    \ When `+(void)greeting` executes in this context, the `self` variable refers\
    \ to `Classic`, not `Classy`. Sending `self` the `salutation` message invokes\
    \ `Classic`'s overridden `-(NSString*)salutation` method, and the message logged\
    \ is \"Hello, world!\".\n\n> **Note:** If the statement in Listing 3-16 was `NSLog(@\"\
    %@, world!\",[Classy salutation])` instead of `NSLog(@\"%@, world!\",[self salutation])`,\
    \ the message would always be \"Greetings, world!\". That's because `Classy` is\
    \ a constant that always refers to the single `Classy` Class object, while `self`\
    \ refers to the Class object receiving the `greeting` message.\n\nDespite the\
    \ subtle technical differences, class methods in Objective-C are used for many\
    \ of the same purposes that static methods in Java are. Methods that return a\
    \ singleton object, factory methods, object pools, and convenience utilities are\
    \ common uses for class methods.\n\n## Constructing Objects\n\nYou might have\
    \ expected me to explain the syntax for instantiating objects much earlier in\
    \ this chapter, instead of making you wade through instance variables, explanations\
    \ about the `self` variable, and class methods. The reason I didn't is simple:\
    \ there is no syntax for instantiating objects.\n\nTrue to its minimalist philosophy,\
    \ Objective-C lets the class designer decide how objects are created and initialized.\
    \ In the Cocoa framework, that's through a combination of a factory class method\
    \ and some conventions for writing initializer (constructor) methods.\n\n> **Note:**\
    \ You will see this minimalist pattern repeated again and again. Java defines\
    \ a specific syntax and enforces pre-determined rules for how objects are created,\
    \ serialized, copied, and so on. Objective-C, in contrast, provides only the bare\
    \ essentials and leaves the implementation decisions to the class designers. You\
    \ can't change how objects are created in Java, but you can in Objective-C. You\
    \ might not need to do it often, but you can do it with great effect.\n\nCreating\
    \ an object is a two-step process. First, the memory for the object's structure\
    \ is allocated. The instance is then initialized. Listing 3-17 shows a rewriting\
    \ of the `RandomSequence` class to include two initializers (constructors).\n\n\
    **Listing 3-17. Object Initialization**\n\n**Java**\n\n```java\npublic class RandomSequence\n\
    {\n    long seed;\n\n    public RandomSequence()\n    {\n        seed = 1;\n \
    \   }\n\n    public RandomSequence( long startingSeed )\n    {\n        seed =\
    \ startingSeed;\n    }\n}\n\n...\n\nRandomSequence r1 = new RandomSequence();\n\
    RandomSequence r2 = new RandomSequence(-43);\n```\n\n**Objective-C**\n\n```objectivec\n\
    @interface RandomSequence : NSObject {\n    long long seed;\n}\n\n- (id)init;\n\
    - (id)initWithSeed:(long long)startingSeed;\n\n@end\n\n@implementation RandomSequence\n\
    \n- (id)init\n{\n    self = [super init];\n    if (self != nil) {\n        seed\
    \ = 1; // default seed\n    }\n    return (self);\n}\n\n- (id)initWithSeed:(long\
    \ long)startingSeed\n{\n    self = [super init];\n    if (self != nil) {\n   \
    \     seed = startingSeed;\n    }\n    return (self);\n}\n\n@end\n\n...\n\nRandomSequence\
    \ *r1 = [[RandomSequence alloc] init];\nRandomSequence *r2 = [[RandomSequence\
    \ alloc] initWithSeed:-43];\nRandomSequence *r3 = [RandomSequence new];\n```\n\
    \nThe `[RandomSequence alloc]` statement begins the process by sending an `alloc`\
    \ message to the `RandomSequence` Class object. The root `NSObject` class implements\
    \ the `+(id)alloc` class method, which is inherited by all subclasses. `+(id)alloc`\
    \ uses the class reference to allocate the required memory for the new object,\
    \ sets its `isa` variable, fills all remaining instance variables with zeros,\
    \ and returns the pointer to the newly allocated object. At this point, the object\
    \ exists and is an object of the requested type. However, the object has not yet\
    \ been initialized.\n\nNext, the `init` message is sent to the newly created object.\
    \ This is the message responsible for initializing the object. Once `init` returns,\
    \ the object is ready to use.\n\nThe three statements in Listing 3-17 that create\
    \ the objects `r1`, `r2`, and `r3`, demonstrate the common ways to create new\
    \ objects. Variable `r1` is assigned a new object, allocated and initialized without\
    \ any parameters, equivalent to the Java statement `r1 = new RandomSequence()`.\n\
    \nThe `r2` variation calls an alternate initializer, passing additional parameters\
    \ for use in initializing the object. Like Java, you can create whatever additional\
    \ initializers (constructors) your class needs.\n\nThe shorthand form used to\
    \ create object `r3` is functionally identical to the one used to create `r1`.\
    \ The root `NSObject` class implements a `+(id)new` class method that first calls\
    \ `+(id)alloc` and then sends the newly created object the `-(id)init` method\
    \ before returning. It's only useful for creating an object that can be constructed\
    \ using its `-(id)init` method (i.e., no parameters), but it does save a little\
    \ code.\n\n> **Caution:** Object constructor customization is always accomplished\
    \ by overriding or defining `-(id)init...` methods for the class. Never override\
    \ or attempt to intercept the `+(id)alloc` or `+(id)new` class methods.\n\n##\
    \ Writing an init Method\n\nTo write an Objective-C initializer (constructor),\
    \ your method must fulfill a four-part contract:\n\n1. The initializer must call\
    \ its superclass initializer.\n2. It must update its `self` variable.\n3. It must\
    \ check for a `nil` object.\n4. It must return the pointer to itself.\n\nThe first\
    \ two parts of the contract are satisfied by the statement `self = [super init]`.\
    \ It should be obvious that every initializer must call its superclass initializer\
    \ before proceeding. In Java, this convention is guaranteed by the language. In\
    \ Objective-C, you're responsible for calling it.\n\nUpdating `self` might seem\
    \ bizarre to a Java programmer, but it's key to something called class clusters.\
    \ Class clusters are explained in detail in Chapter 22. You might be tempted to\
    \ leave the assignment to `self` out. Don't. The code is actually smaller and\
    \ faster if you leave it in, and you won't violate the class cluster contract."
