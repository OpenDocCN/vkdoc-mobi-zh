  trans: "\n### 该演示项目包含四种常见连接方式的示例。你可以通过命令的`mode`参数进行尝试。每种方式的说明如下。\n\n## 线程间连接\n\n\
    分布式对象的重点是进程间通信，但 DO 同样适用于同一进程内的线程间通信。使用 DO，可以相对轻松地创建一个在其自身线程中接收并执行消息的类，从而使功能强大的多线程服务像简单对象一样易于使用。它还为远程服务提供了灵活的部署环境。一个设计用于在远程计算机上运行的服务，同样可以轻松地在同一台机器的独立进程中运行，或者作为测试时的本地进程中的线程运行。客户端对所有这三种情况的接口将是相同的。\n\
    \n创建线程间连接很简单。创建两个通用的`NSPorts`来提供通信，并用它们来创建`NSConnection`对象，如代码清单 13-6 所示。要在演示项目中运行此示例，请执行命令`./Guest\
    \ --thread`。\n\n### 代码清单 13-6. 线程间 DO 连接\n\n```\nNSPort *receivePort = [NSPort\
    \ port];\nNSPort *sendPort = [NSPort port];\nNSConnection *clientConnection;\n\
    NSConnection *serverConnection;\n\nclientConnection = [NSConnection connectionWithReceivePort:receivePort\
    \ sendPort:sendPort];\nserverConnection = [NSConnection connectionWithReceivePort:sendPort\
    \ sendPort:receivePort];\n\n[serverConnection setRootObject:[Server new]];\n[serverConnection\
    \ runInNewThread];\n…\nid server = [clientConnection rootProxy];\n[server doSomething];\n\
    ```\n\n请注意，在`serverConnection`中端口顺序是相反的。客户端的接收端口连接到服务器的发送端口，反之亦然。`-runInNewThread`方法会分离出一个新线程，该线程运行自己的运行循环，并连接到连接上。这段代码有很多变体。有些程序员更喜欢创建自己的线程，将`NSPort`对象传递给它，然后让服务器对象创建其`NSConnection`。只要最终结果相同，采用哪种方式都无关紧要。\n\
    \n## Mach 端口连接\n\nMach 端口在单个用户范围内或与系统进程通信时，能提供极其高效的进程间通信。`NSMachPortNameServer`通过名称注册服务器进程，任何客户端都可以轻松连接到它。客户端和服务器的代码如代码清单\
    \ 13-7 所示。你可以在不同的终端窗口中执行演示命令`./Greeter --mach`和`./Guest --mach`来亲自尝试。\n\n### 代码清单\
    \ 13-7. 通过 Mach 端口的 DO 连接\n\n**服务器端**\n\n```\nNSConnection *connection = [NSConnection\
    \ defaultConnection];\n[connection setRootObject:[Server new]];\nif ([connection\
    \ registerName:@\"Server\"])\n    [[NSRunLoop currentRunLoop] run];\n```\n\n**客户端**\n\
    \n```\nNSConnection *connection = [NSConnection connectionWithRegisteredName:@\"\
    Server\"\n    host:nil];\nid server = [connection rootProxy];\n[server doSomething];\n\
    ```\n\n服务器创建其服务器对象，并用其公开名称进行注册。客户端使用便捷构造器`-connectionWithRegisteredName:host:`来获取一个`NSConnection`，该连接已预先配置了连接到注册名称为`@\"\
    Server\"`的 Mach 端口的`NSPorts`。\n\n服务器和客户端也有可能运行在同一进程的两个线程中。通过`NSMachBootstrapServer`注册的服务，其他进程可以访问，但同样也可以很容易地通过另一个线程进行连接。\n\
    \n## 网络连接\n\n当用于通过网络与对象交互时，分布式对象的灵活性尤为突出。`NSSocketPortNameServer`提供注册和发现服务，本地局域网中的所有系统均可访问，如代码清单\
    \ 13-8 所示。`./Greeter --network`和`./Guest --network`演示可以在同一台计算机上运行，也可以在同一网络的多台计算机上运行。\n"
- fmt: "### Listing 13-8. Distributed Objects Connection Through Local Network\n\n\
    **Server**\n\n`NSSocketPort *port = [NSSocketPort new];`  \n`NSConnection *connection\
    \ = [NSConnection connectionWithReceivePort:port sendPort:nil];`  \n`[connection\
    \ setRootObject:[Server new]];`  \n`if ([[NSSocketPortNameServer sharedInstance]\
    \ registerPort:port name:@\"Server\"])`  \n`    [[NSRunLoop currentRunLoop] run];`\n\
    \n**Client**\n\n`NSPort *port = [[NSSocketPortNameServer sharedInstance] portForName:@\"\
    Server\" host:@\"*\"];`  \n`NSConnection *connection = [NSConnection connectionWithReceivePort:nil\
    \ sendPort:port];`  \n`id server = [connection rootProxy];`  \n`[server doSomething];`\n\
    \nThe network version is just a subtle variation on the previous themes. Here,\
    \ the server and client interact directly with the `NSSocketPortNameServer` to\
    \ register and obtain `NSSocketPort` objects directly. The ports are then used\
    \ to create `NSConnection` objects.\n\n`NSSocketPortNameServer` will locate any\
    \ computer on the local network that has registered a `@\"Server\"` service if\
    \ the host is `@\"*\"`. The host parameter can also be a specific machine domain\
    \ name or an IP address if you want to connect with a specific target machine.\n\
    \n### BSD Pipe Connection\n\nThe final example is a bit more exotic. It demonstrates\
    \ connecting two processes using a named BSD pipe \"file\" in the file system.\
    \ A pipe file looks like a data file, but is actually a live buffer between two\
    \ processes. Bytes written to the \"file\" immediately appear as data to the other\
    \ process, but are never written to any storage device. This demonstrates the\
    \ flexibility of distributed objects. Essentially any communications conduit that\
    \ can be connected to an `NSPort` can be used to create an `NSConnection`. Since\
    \ you can create your own subclasses of `NSPort`, the possibilities are unlimited.\n\
    \nThe project commands that demonstrate this technique are `./Greeter --socket`\
    \ and `./Guest --socket`. The code can be found in the `Greeter_main.m` and `Guest_main.m`\
    \ files.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## Chapter 13.\
    \ Communicating Near and Far\n\n### Run Loops\n\nRun loops are the engine that\
    \ drives distributed objects. Run loops are described in more detail in Chapter\
    \ 15.\n\nIn the server examples above, the last step is to start a run loop that\
    \ will process the events received by its `NSPort` object. To receive and dispatch\
    \ asynchronous messages, an `NSConnection` must be driven by a run loop. Messages\
    \ sent by clients are pushed onto the server's `NSPort`. The run loop pops them\
    \ off one at a time and dispatches them to the root object.\n\nIt's obvious that\
    \ the server must use a run loop. What's not obvious is that the client is also\
    \ running a run loop. When the client sends a synchronous message (i.e., `[server\
    \ doSomething]`), it pushes the message onto the `NSPort` and then starts a temporary\
    \ run loop to wait for the response. The server receives the message and replies\
    \ by sending a message back to the client. The client's temporary run loop pops\
    \ the reply off its `NSPort` and returns to the sender.\n\nLook again at the code\
    \ for the Greeter and Guest example in Listing 13-4. Consider the possibility\
    \ that Greeter keeps a reference to the proxy Guest object and uses it to send\
    \ another `-listen:` message after `-greetGuest:` has returned. If the client\
    \ process was not running a run loop, the `-listen:` message would sit in the\
    \ client's `NSPort` forever, never to be executed. Since the method is synchronous,\
    \ the Greeter object would hang, waiting for the Guest object to respond—or at\
    \ least until the `NSConnection` timed out.\n\nTo implement asynchronous, bidirectional,\
    \ messaging between distributed objects, both processes must have active run loops.\n\
    \n### Asynchronous Messages\n\nAs alluded to earlier, messages sent through an\
    \ `NSProxy` can be synchronous or asynchronous. To create an asynchronous message,\
    \ add the `oneway` keyword to the return value of the method's interface.\n\n\
    ```objc\n- (oneway void)doSomething;\n```\n\nThe message will be sent to the remote\
    \ object, but execution will return immediately to the sender. `oneway` methods\
    \ should always have a `void` return type. As mentioned in the \"Run Loops\" section..."
