    Iterator Pattern


    Probably the most common programming task of all time is to iterate through the
    elements of a collection, performing some test or action on each member. Both
    Java and Objective-C have recognized this and have made significant language changes
    designed to simplify this tedious and repetitive (no pun intended) programming
    pattern. You can iterate through the collection using the new syntax, with a legacy
    enumeration class, or by addressing each member object directly. This section
    will explain how each is done, and what it takes to add enumeration support to
    your classes.


    The major differences between Objective-C enumeration and Java iterators are


    • Objective-C collections are not typed.


    • An Objective-C collection must not be modified during enumeration.


    Java added parameterized types to collections, removing much of the tedium required
    to use the collection classes. A parameterized collection ensures that all objects
    added to the collection are of the correct type, and automatically casts objects
    extracted from the collection to a base type. Objective-C


    does not need any such constructs because it doesn’t verify the class of an object
    during assignment. All collection classes accept and return the anonymous id object
    identifier, which the compiler assumes to be freely interchangeable with any class.
    If you want to ensure that an object added to, or obtained from, a collection
    is the correct class, add an assertion. See Chapter 14 for more about assertions.


    The section “Collection Concurrency” describes how to deal with the limitation
    of not being able to modify a collection during enumeration. This also means that
    the Objective-C enumeration classes have no methods to modify the collection.


    Using Fast Enumeration


    Fast enumeration was added in Objective-C 2.0\. It is a shorthand for(…) loop
    syntax for enumerating through the objects in a collection. Java has something
    very similar, called For-Each Loop syntax.


    Examples of both are shown in Listing 16-6\. The use, syntax, and behavior of
    the two are practically identical.


    Listin g 16-6\. Fast Enumeration Syntax


    **Java**


    for ( Object object : collection ) {


    …


    }


    **Objective-C**


    for ( id object in collection ) {


    …


    }


    The “fast” in fast enumeration is more than a euphemistic reference to the time
    saved typing code. Fast enumeration is actually fast. The fast enumeration interface
    allows collections to fetch objects 306


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16 ■ COLLECTION PATTERNS


    in batches, reducing overhead and improving performance. In all but a few cases,
    fast enumeration is the fastest way to iterate through the objects in a collection.'
  trans: "\n在`AircraftIdentifier`类中，分配给`transponderCode`的值在比较两个标识符对象的相等性时不被视为重要因素。这是因为该值可能会变化，但并不会实质性地改变飞机的身份。如何确定类的相等性会有所不同；只需记住，`-hash`方法必须始终返回与`-isEqual:`一致的值。\n\
    \n**比较集合**\n\n集合本身可以与同类集合进行比较。表 16-14 列出了集合比较方法。\n\n***表 16-14.** 集合比较方法*\n\n\
    | 类 | 方法 |\n| --- | --- |\n| `NSArray`, `NSMutableArray` | `-isEqualToArray:`\
    \ |\n| `NSDictionary`, `NSMutableDictionary` | `isEqualToDictionary:` |\n| `NSSet`,\
    \ `NSMutableSet`, `NSCountedSet` | `isEqualToSet:` |\n| `NSIndexSet`, `NSMutableIndexSet`\
    \ | `isEqualToIndexSet:` |\n| `NSHashTable` | `isEqualToHashTable:` |\n\n如果两个对象集合包含相同数量的对象，并且集合中的每个对象在向另一个集合中的对应对象发送`-isEqual:`消息时都返回`YES`，则认为这两个集合相等。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 16 章 ■ 集合模式\n\n某些集合具有不等式比较，用于判断一个集合是否是另一个集合的子集或超集。这些方法包括`-[NSSet\
    \ isSubsetOfSet:]`、`-[NSHashTable isSubsetOfHashTable:]`和`-[NSIndexSet containsIndexes:]`。\n\
    \n**迭代器模式**\n\n可能一直以来最常见的编程任务就是遍历集合中的元素，对每个成员执行某些测试或操作。Java 和 Objective-C 都意识到了这一点，并做出了重要的语言变化，旨在简化这种繁琐且重复的（无意双关）编程模式。你可以使用新的语法、遗留的枚举类，或直接访问每个成员对象来遍历集合。本节将解释每种方法的实现方式，以及为你的类添加枚举支持所需的步骤。\n\
    \nObjective-C 枚举与 Java 迭代器的主要区别在于：\n\n*   Objective-C 集合没有类型化。\n*   在枚举期间不得修改\
    \ Objective-C 集合。\n\nJava 为集合添加了参数化类型，消除了使用集合类所需的大量繁琐操作。参数化集合确保添加到集合中的所有对象都是正确的类型，并自动将从集合中提取的对象转换为基础类型。Objective-C\
    \ 不需要此类构造，因为它在赋值期间不验证对象的类。所有集合类都接受并返回匿名的`id`对象标识符，编译器假定该标识符可以自由地与任何类互换。如果你希望确保添加到集合中或从集合中获取的对象是正确的类，请添加断言。有关断言的更多信息，请参见第\
    \ 14 章。\n\n“集合并发”部分描述了如何处理在枚举期间无法修改集合的限制。这也意味着 Objective-C 枚举类没有修改集合的方法。\n\n**使用快速枚举**\n\
    \n快速枚举是在 Objective-C 2.0 中引入的。它是一种简写的`for(...)`循环语法，用于枚举集合中的对象。Java 有非常类似的东西，称为\
    \ For-Each 循环语法。两者的示例见代码清单 16-6。两者的用法、语法和行为几乎相同。\n\n**代码清单 16-6.** 快速枚举语法\n\n\
    ```java\nJava\nfor ( Object object : collection ) {\n    ...\n}\n```\n\n```objectivec\n\
    Objective-C\nfor ( id object in collection ) {\n    ...\n}\n```\n\n快速枚举中的“快速”不仅仅是对节省编码时间的委婉说法。快速枚举实际上很快。快速枚举接口允许集合批量获取对象，从而减少开销并提高性能。在除少数情况外的所有情况下，快速枚举是遍历集合中对象最快的方式。\n"
- fmt: "# 使用枚举器进行快速枚举\n\n这使得快速枚举成为遍历数组的首选方法，因为它最容易编写、最易读且最高效。\n\n## 使用枚举器\n\n在快速枚举出现之前，Objective-C\
    \ 集合是通过`NSEnumerator`类进行枚举的。\n\n`NSEnumerator`在功能上与`java.util.Iterator`非常相似。与`Iterator`的两个方法`next()`和`hasNext()`不同，`NSEnumerator`只有一个`-nextObject`方法。`-nextObject`消息会返回一个非`nil`的指针，直到枚举结束。之所以能做到这一点，是因为支持`NSEnumerator`的集合类不允许存储`nil`值。那些允许存储`nil`值的集合（如`NSPointerArray`）不支持`NSEnumerator`。清单\
    \ 16-7 中的代码演示了如何使用枚举器对象。\n\n**清单 16-7. 使用`NSEnumerator`遍历集合**\n\n**Java**\n\n\
    ```\nArrayList<Object> array = …\n\nfor (Iterator<Object> i = array.iterator();\
    \ i.hasNext(); ) {\n    Object object = i.next();\n    …\n}\n```\n\n**Objective-C**\n\
    \n```\nNSArray *array = …\nNSEnumerator *e = [array objectEnumerator];\nid object;\n\
    while ( (object=[e nextObject])!=nil ) {\n    …\n}\n```\n\n你获取`NSEnumerator`对象的方式与在\
    \ Java 中获取`Iterator`一样——通过请求集合为你提供一个。集合可能提供几种不同类型的枚举器。\n\n`NSDictionary`会生成一个`-keyEnumerator`和一个`-objectEnumerator`对象，它们分别用于遍历其键对象或值对象。`NSArray`类提供了`-objectEnumerator`和`-reverseObjectEnumerator`对象。\n\
    \n有一些`NSEnumerator`的特殊用途子类，例如`NSDirectoryEnumerator`。除了遍历目录内容之外，它还实现了用于控制递归和获取当前文件属性的额外方法。关于`NSDirectoryEnumerator`的示例，请参见第\
    \ 11 章。\n\n`NSEnumerator`定义的唯一另一个方法是`-allObjects`。这个消息的名称有点误导，因为它返回的是枚举器尚未返回的对象数组。它本应命名为`-remainingObjects`。\n\
    \n枚举器对象无法重置或重启。一旦完成枚举，它们就变为无效状态。枚举器对象在枚举结束之前会保留对其所遍历的集合的引用。\n\n---\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# 第 16 章 集合模式\n\n## 通过寻址访问集合对象\n\n可寻址对象的集合（数组和字典）也可以通过单独访问每个成员对象来进行遍历。这给了你最终的控制权，尽管其效率可能不如使用前面的某种枚举方法。\n\
    \n数组集合最容易以这种方式处理，并且其效率并不比使用枚举器差太多。清单 16-8 展示了一个典型示例。\n\n**清单 16-8. 数组索引循环**\n\n\
    **Java**\n\n```\nArrayList<Object> array = …\n\nfor (int i=0; i<array.size();\
    \ i++) {\n    Object object = array.get(i);\n    …\n}\n```\n\n**Objective-C**\n\
    \n```\nNSArray *array = …\nNSUInteger i;\nfor (i=0; i<[array count]; i++) {\n\
    \    id object = [array objectAtIndex:i];\n    …\n}\n```\n\n字典的值通过其键来寻址。通过键遍历字典需要结合使用枚举和集合寻址，如清单\
    \ 16-9 所示。\n\n**清单 16-9. 通过键枚举字典**\n\n**Java**\n\n```\nHashMap<Object,Object>\
    \ dictionary = …\n\nfor (Iterator<Object> i = dictionary.keySet().iterator();\
    \ i.hasNext(); ) {\n    Object key = i.next();\n    Object object = dictionary.get(key);\n\
    \    …\n}\n```\n\n**Objective-C**\n\n```\nNSDictionary *dictionary = …\nNSEnumerator\
    \ *e = [dictionary keyEnumerator];\nid key;\nwhile ( (key=[e nextObject])!=nil\
    \ ) {\n    id object = [dictionary objectForKey:key];\n    …\n}\n```\n\n---\n\n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 16 章 集合模式\n\n如果你将清单 16-9\
    \ 中的`NSEnumerator`赋值语句替换为清单 16-10 中的代码，那么该清单中的代码就变得特别有趣。`-keysSortedByValueUsingSelector:`消息会返回一个排序后的键数组，允许你以可预测的顺序遍历字典的值。"
  raw: 'This makes fast enumeration far and away the preferred method of iterating
    arrays, since it is the easiest to write, most readable, and most efficient solution.


    Using Enumerators


    Before fast enumeration, Objective-C collections were enumerated via the NSEnumerator
    class.


    NSEnumerator is very similar in function to java.util.Iterator. Instead of Iterator’s
    two methods, next() and hasNext(), NSEnumerator has a single -nextObject method.
    The -nextObject message returns a non-nil pointer until the enumeration is exhausted.
    This is possible because the collection classes that support NSEnumerator do not
    allow nil values. The collections that do allow nil values, like NSPointerArray,
    do not support NSEnumerator. The code in Listing 16-7 demonstrates using enumerator
    objects.


    Listin g 16-7\. Enumerating Through a Collection with NSEnumerator **Java**


    ArrayList<Object> array = …


    for (Iterator<Object> i = array.iterator(); i.hasNext(); ) {


    Object object = i.next();


    …


    }


    **Objective-C**


    NSArray *array = …


    NSEnumerator *e = [array objectEnumerator];


    id object;


    while ( (object=[e nextObject])!=nil ) {


    …


    }


    You obtain an NSEnumerator object just as you obtain an Iterator in Java—by asking
    the collection to provide you with one. Collections may provide several different
    kinds of enumerators.


    NSDictionary will produce a -keyEnumerator and an -objectEnumerator object that
    will iterate its key or value objects, respectively. The NSArray class provides
    -objectEnumerator and


    -reverseObjectEnumerator objects.


    There are a few special-purpose subclasses of NSEnumerator, such as NSDirectoryEnumerator.


    In addition to enumerating through the contents of a directory, it implements
    additional methods for controlling recursion and obtaining the attributes of the
    current file. See Chapter 11 for an example of NSDirectoryEnumerator.


    The only other method defined by NSEnumerator is -allObjects. This message is
    somewhat of a misnomer, because it returns an array of the objects the enumerator
    has yet to return. It really should have been named -remainingObjects.


    Enumerator objects cannot be reset or restarted. Once they have finished their
    enumeration they become inert. Enumerator objects retain a reference to the collection
    that they are enumerating until the enumeration is finished.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16 ■ COLLECTION PATTERNS


    Addressing Collection Objects


    Collections of addressable objects (arrays and dictionaries) can also be iterated
    by addressing each member object individually. This gives you the ultimate control,
    although it might not be as efficient as using one of the earlier enumeration
    methods.


    Array collections are the easiest to process in this way, and are not much less
    efficient than using an enumerator. Listing 16-8 shows a typical example.


    Listin g 16-8\. Array Index Loop


    **Java**


    ArrayList<Object> array = …


    for (int i=0; i<array.size(); i++) {


    Object object = array.get(i);


    …


    }


    **Objective-C**


    NSArray *array = …


    NSUInteger i;


    for (i=0; i<[array count]; i++) {


    id object = [array objectAtIndex:i];


    …


    }


    Dictionary values are addressed by their keys. Iterating through a dictionary
    via its keys requires a combination of enumeration and collection addressing,
    as shown in Listing 16-9.


    Listin g 16-9\. Enumerating a Dictionary by Key


    **Java**


    HashMap<Object,Object> dictionary = …


    for (Iterator<Object> i = dictionary.keySet().iterator(); i.hasNext(); ) {


    Object key = i.next();


    Object object = dictionary.get(key);


    …


    }


    **Objective-C**


    NSDictionary *dictionary = …


    NSEnumerator *e = [dictionary keyEnumerator];


    id key;


    while ( (key=[e nextObject])!=nil ) {


    id object = [dictionary objectForKey:key];


    …


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16 ■ COLLECTION PATTERNS


    The code in listing 16-9 becomes particularly interesting if you replace the NSEnumerator
    assignment statement with the code in Listing 16-10\. The -keysSortedByValueUsingSelector:
    message returns a sorted array of keys, allowing you to iterate the values of
    the dictionary in a predictable order.'
