- fmt: "# The Delegation Pattern\n\nThe delegation pattern externalizes, or delegates,\
    \ selected decisions or actions to another object, termed the delegate object.\
    \ It embodies a design principle known as inversion of responsibility. The delegate\
    \ can customize or influence the normal behavior of the object with code that\
    \ is not contained within the object’s class hierarchy. Delegates can be queried\
    \ to make decisions, filter data, define conditional behavior, or inject additional\
    \ processing at key times. Delegate objects are invariably optional. The class\
    \ implements a default strategy in the absence of a delegate object or method.\n\
    \nThe traditional way to customize a class is to subclass it and override specific\
    \ methods. To redefine how your object gets copied, you override `-copyWithZone:`.\
    \ To redefine how it compares itself with other objects, you override `-isEqual:`,\
    \ and so forth. However, the inheritance pattern is not as effective when trying\
    \ to customize the behavior of a tree of existing classes. Take the example in\
    \ Figure 17-1.\n\n**Figure 17-1.** Window class model\n\n![Figure 17-1](index-334_1.png)\n\
    \nFigure 17-1 shows a set of window classes. At the base is the abstract `Window`\
    \ class that defines common properties like position, dimensions, and order, along\
    \ with common behavior such as dragging, resizing, minimizing, and reordering.\
    \ The `TitledWindow` class defines additional attributes, like the window’s title,\
    \ and behavior such as inserting the window’s title into the application’s Window\
    \ menu. There are non-titled subclasses of the `Window` class along with specialized\
    \ subclasses of the titled window class. In short, it’s a succinct and logical\
    \ class hierarchy.\n\nNow the application developer—that’s you—would like to enhance\
    \ the user experience by implementing windows that “snap” to optimal positions\
    \ as the user drags them around. Using inheritance, your only customization strategy\
    \ is to subclass `DocumentWindow` and override its `-dragWindow` method. But that\
    \ only redefines the behavior for the `DocumentWindow`. To implement the same\
    \ customization for the palette, help, and info windows, additional subclasses\
    \ must be defined, each duplicating the same customization. The modified class\
    \ tree is shown in Figure 17-2.\n\n**Figure 17-2.** Customization using inheritance\n\
    \nNot only is this a lot of work and duplicate code, but the poor programmer—that’s\
    \ you—now discovers that the application doesn’t work on systems with more than\
    \ one monitor. Apparently, `Window`’s `-dragWindow` method handles some special\
    \ cases when dragging between monitors that only the original designer is privy\
    \ to. Not knowing what that solution is, it’s impossible to effectively duplicate\
    \ the behavior of `-dragWindow` in the subclasses. The feature is a disaster and\
    \ must be abandoned, or you risk additional development and the potential for\
    \ future incompatibility.\n\nHad the original developers of the `Window` class\
    \ foreseen this situation, they could have easily avoided the problem by adopting\
    \ the delegation pattern. The solution is to define a delegate object in the `Window`\
    \ base class, as shown in Figure 17-3.\n\n**Figure 17-3.** Customization using\
    \ delegation\n\n![Figure 17-3](index-335_1.png)\n\nIn its `-dragWindow` method,\
    \ the `Window` class repeatedly sends the delegate object a `-willDragWindow:to:`\
    \ message as the user drags the window. The message includes the window and the\
    \ user’s latest drag position. The delegate is expected to return the same or\
    \ a modified position that the `Window` class will actually use when positioning\
    \ the window.\n\nIt’s a trivial but powerful interface. The delegate object is\
    \ free to implement whatever drag position scheme it desires. It can “snap” the\
    \ window’s position to nearby edges, prevent the window from being dragged to\
    \ certain regions, or use the information to move other windows out of the way.\n\
    \nMore importantly:\n\n- All of the subclasses (`InfoWindow`, `HelpWindow`, `PaletteWindow`,\
    \ and `DocumentWindow`) can be customized using a single delegate.\n- Different\
    \ delegate objects can be created to define different customizations.\n- Customization\
    \ can be applied per window instance, rather than per class.\n- The new feature\
    \ will be compatible with future versions of the `Window` class and all of its\
    \ subclasses.\n- Existing classes and interfaces that create `DocumentWindow`\
    \ objects do not have to be modified.\n- Any `Window` object that does not have\
    \ a delegate object will use the standard window drag behavior.\n\n## Using Delegates\n\
    \nUsing a delegate object is very simple, which is one of the features that makes\
