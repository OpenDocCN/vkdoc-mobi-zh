    \ 唯一显著的区别在于，`user.dir` 属性只是一个字符串，直到文件操作需要解析相对路径时才会被求值。`changeCurrentDirectoryPath:`\
    \ 方法会对路径进行鉴定，如果路径不可用，则会拒绝更改。代码清单 11-2 修改了当前工作目录，使其指向一个 “temp” 子目录，但仅在该子目录存在时才进行修改。\n\
    \n### 代码清单 11-2. 更改当前工作目录\n\n**Java**\n\n```java\nString workingPath = System.getProperty(\"\
    user.dir\");\nFile testFile = new File(workingPath, \"temp\");\n\nif (testFile.exists())\
    \ {\n    System.setProperty(\"user.dir\", testFile.getAbsolutePath());\n}\n```\n\
    \n**Objective-C**\n\n```objc\nNSString *current = [[NSFileManager defaultManager]\
    \ currentDirectoryPath];\nNSString *temp = [current stringByAppendingPathComponent:@\"\
    temp\"];\n\n[[NSFileManager defaultManager] changeCurrentDirectoryPath:temp];\n\
    ```\n\nMac OS X 进程的初始当前目录继承自启动该进程的环境。对于命令行工具，它将是启动该工具的 Shell 的工作目录。对于应用程序捆绑包，操作系统通常会在启动进程前，将工作目录设置为包含该应用程序捆绑包的目录。\n\
    \n## 文件 URL\n\n在几个主要版本之前，Cocoa 框架开始采用通用资源定位符 (URL) 作为数据源的首选标识符对象。例如，原有的 `-[NSDocumentController\
    \ openDocumentWithContentsOfFile:display:]` 方法已被弃用，取而代之的是 `-openDocumentWithContentsOfURL:display:error:`。这提高了许多类的灵活性，因为\
    \ URL 可以引用来自各种来源的数据——不仅仅是文件系统中的数据文件。但这同时也意味着，你可能需要将文件系统路径转换为 URL，或者反过来转换。\n\n\
    Java 的 `java.net.URL` 对象可以引用文件，但通常不结合 `java.io.*` 类使用。`java.io.File` 类是对 URL，或者更准确地说，是对\
    \ URI（通用资源标识符）的仅有让步。它支持从 URI 构造 `File` 对象，并提供了 `File.toURI()` 和 `File.toURL()`\
    \ 方法用于获取 `File` 的 URL。表 11-3 列出了在 Cocoa 中路径与文件 URL 之间进行转换的基本方法。\n\n**表 11-3.**\
    \ 与文件相关的 `NSURL` 方法\n\n| 方法                                 | 描述             \
    \                |\n| ------------------------------------ | --------------------------------\
    \ |\n| `+(NSURL*)fileURLWithPath:(NSString*)path` | 为给定文件创建一个文件 URL。     |\n|\
    \ `-(BOOL)isFileURL`                   | 如果接收者是文件方案 URL，则返回 `YES`。 |\n| `-(NSString*)path`\
    \                   | 如果接收者是文件方案 URL，返回该项的文件系统路径。 |\n\n## 创建和删除目录\n\n方法 `-[NSFileManager\
    \ createDirectoryAtPath:withIntermediateDirectories:attributes:error:]` 用于创建新目录。如果\
    \ `withIntermediateDirectories:` 参数为 `YES`，那么任何缺失的中间目录也会一并创建。例如，如果路径 `/Users/daphne/Music`\
    \ 已存在，向 `-createDirectoryAtPath:withIntermediateDirectories:attributes:error:`\
    \ 发送路径 `@\"/Users/daphne/Music/Albums/Cocteau Twins\"` 并将 `withIntermediateDirectories:`\
    \ 设置为 `YES`，将会在 `Music` 目录内创建 `Albums` 目录，然后在 `Albums` 目录内创建 `Cocteau Twins` 目录。在此模式下，该消息等同于\
    \ `java.io.File.mkdirs()` 方法。如果 `withIntermediateDirectories:` 为 `NO`，则会返回一个错误，因为期望其父目录已经存在。这相当于调用\
    \ `java.io.File.mkdir()`。`attributes:` 参数是一个要设置的属性字典。有关属性字典的信息，请参阅本章后面的“文件属性”部分。\n\
    \n删除目录与删除任何文件一样，都使用 `-[NSFileManager removeItemAtPath:error:]`。\n\n## 定位特殊目录\n\
    \n通常认为，将知名目录的路径硬编码为字符串常量是一种不好的做法。这些路径常常会随着时间推移而改变，从而破坏你的应用程序。Mac OS X 操作系统定义了许多具有特定用途的目录。此外，它还定义了一组域，这些域形成了一个层级结构，用以定义资源的作用范围。例如，安装字体的方法是把字体文件放入\
    \ `Fonts` 文件夹。每个用户都有自己的 `Fonts` 文件夹，所有用户共享一个 `Fonts` 文件夹，系统有一个 `Fonts` 文件夹，网络上也有一个\
    \ `Fonts` 文件夹。字体被复制到哪个 `Fonts` 文件夹决定了其作用范围。\n\n通过调用 `NSSearchPathForDirectoriesInDomains(…)`\
    \ 并传入三个参数来定位特殊目录：一个描述知名目录的常量、一个可接受域的位掩码，以及一个用于自动展开返回路径中 “~” 简写标记的标志位。代码清单 11-3\
    \ 展示了如何使用 `NSSearchPathForDirectoriesInDomains(…)` 来获取用户桌面的路径。\n\n### 代码清单 11-3.\
    \ 定位用户的桌面目录\n\n```objc\nNSArray *paths = NSSearchPathForDirectoriesInDomains(NSDesktopDirectory,\
    \ NSUserDomainMask, YES);\nif ([paths count] > 0) {\n    NSString *desktopPath\
    \ = [paths objectAtIndex:0];\n    …\n}\n```\n\n`NSSearchPathForDirectoriesInDomains(…)`\
    \ 返回一个数组，其中包含在所请求的每个域中该目录的路径，顺序按照搜索顺序排列，从最具体到最通用。表 11-4 列出了常用的目录常量。域参数可以是表 11-5\
    \ 中任何域的任意组合（使用 OR 运算），也可以是常量 `NSAllDomainsMask`。\n\n**表 11-4.** 常用目录常量\n\n| 目录常量\
    \                              | 描述（示例路径）                  |\n| ------------------------------------\
    \ | --------------------------------- |\n| `NSApplicationDirectory`          \
    \   | 应用程序 (`/Applications`)        |\n| `NSLibraryDirectory`                \
    \ | 用户资源，如字体、偏好设置和日志文件 (`~/Library`) |\n| `NSUserDirectory`                  \
    \  | 包含所有用户主文件夹的文件夹 (`/Users`) |\n| `NSDocumentDirectory`                | 文档\
    \ (`~/Documents`)              |\n| `NSDesktopDirectory`                 | 桌面\
    \ (`~/Desktop`)                |\n| `NSCachesDirectory`                  | 缓存文件\
    \ (`~/Library/Caches`)     |\n| `NSApplicationSupportDirectory`      | 应用程序使用的辅助文件\
    \ (`/Library/Application Support`) |\n| `NSDownloadsDirectory`               |\
    \ 下载文件夹 (`~/Downloads`)        |\n\n**表 11-5.** 目录域\n\n| 域                   \
    \   | 描述               |\n| ----------------------- | ------------------ |\n|\
    \ `NSUserDomainMask`      | 当前用户           |\n| `NSLocalDomainMask`     | 此系统的所有用户\
    \   |\n| `NSSystemDomainMask`    | 整个系统           |\n| `NSNetworkDomainMask` \
    \  | 本地网络上的所有系统 |\n\n还有两个专门用途的函数可以返回可变路径。`NSHomeDirectory()` 返回当前用户主目录的路径。`NSTemporaryDirectory()`\
    \ 返回专门为创建临时文件而保留的目录路径。\n\n## 向用户请求文件\n\n在 Java 中，提示用户以交互方式选择文件的方式非常相似。Java 使用\
    \ `JFileChooser` 类来选择现有文件或允许用户输入新文件的名称。Cocoa 提供了 `NSSavePanel` 类用于输入新文件名，以及它的子类\
    \ `NSOpenPanel` 用于选择现有文件。代码清单 11-4 展示了用于提示用户从文件系统中选择单个数据文件或目录的等效代码。\n\n### 代码清单\
    \ 11-4. 选择单个文件\n\n**Java**\n\n```java\nJFileChooser chooser = new JFileChooser();\n\
    chooser.setFileSelectionMode(JFileChooser.FILES_AND_DIRECTORIES);\nchooser.setMultiSelectionEnabled(false);\n\
    \nint result = chooser.showOpenDialog(null);\nif (result == JFileChooser.APPROVE_OPTION)\n\
    \    return chooser.getSelectedFile().getAbsolutePath();\nreturn null;\n```\n\n\
    **Objective-C**\n\n```objc\nNSOpenPanel *panel = [NSOpenPanel openPanel];\n[panel\
    \ setCanChooseFiles:YES];\n[panel setCanChooseDirectories:YES];\n[panel setAllowsMultipleSelection:NO];\n\
    \nNSInteger result = [panel runModal];\nif (result == NSFileHandlingPanelOKButton)\n\
    \    return [panel filename];\nreturn nil;\n```\n\n每个类都有许多属性，用于确定可选择项的类型。\n"
- fmt: "# Filtering and Dynamic Customization\n\nFiltering and other dynamic customization\
    \ is done through the `NSSavePanel` delegate. To filter items in the display,\
    \ create an object that implements the `-(BOOL)panel:(id)sender shouldShowFilename:(NSString*)filename`\
    \ method and set it as the delegate property of the panel object.\n\nSee the Delegate\
    \ Methods section of the `NSSavePanel` documentation for a complete list of the\
    \ informal protocols a delegate object can implement.\n\nWhile the Objective-C\
    \ code in Listing 11-4 is equivalent to the Java code, it isn’t the preferred\
    \ method for presenting a file dialog. The code in Listing 11-5 will suspend the\
    \ entire application until the user chooses a file. If a file selection is associated\
    \ with a window, it is much more desirable to use a sheet—a model child window\
    \ attached to a specific window—so that the high-level application interface isn’t\
    \ blocked. Listing 11-5 starts a model sheet with the same panel used in Listing\
    \ 11-4. The `beginSheet…` message returns immediately so that the main application\
    \ run loop continues uninterrupted. When the user makes a selection in the sheet,\
    \ the message specified in the `didEndSelector:` parameter is sent to the `modalDelegate:`\
    \ object. These can be any object and message you choose, as long as the method\
    \ arguments match those defined by the informal protocol.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Chapter 11: Files\n\n### Listing 11-5. Using a File Selection Sheet\n\n```\n\
    NSOpenPanel *panel = [NSOpenPanel openPanel];\n[panel setCanChooseFiles:YES];\n\
    [panel setCanChooseDirectories:YES];\n[panel setAllowsMultipleSelection:NO];\n\
    [panel beginSheetForDirectory:nil       // use default directory\n           \
    \              file:nil       // don't preselect any file\n                modalForWindow:documentWindow\
    \  // sheet attached to this window\n                 modalDelegate:self\n   \
    \             didEndSelector:@selector(myOpenDidEnd:returned:context:)\n     \
    \              contextInfo:NULL];\n...\n- (void)myOpenDidEnd:(NSSavePanel*)sheet\
    \ returned:(int)code context:(void*)ignored\n{\n    if (code==NSOKButton) {\n\
    \        NSString *file = [sheet filename];\n        …\n    }\n}\n```\n\n## Symbolic\
    \ Links, Hard Links, and Aliases\n\nThe Mac OS X operating system provides three\
    \ types of files that reference another file. The first are symbolic links. These\
    \ are special files that contain the path to another directory in the file system.\n\
    \nGenerally, a symbolic link acts as if it were the directory to which it refers.\
    \ For example, the directory `/Users/hannah/Documents/Updates` contains the file\
    \ `Monday.doc`, and the file `/Users/hannah/Public/New` is a symbolic link containing\
    \ the path `/Users/hannah/Documents/Updates`. In this situation, the paths `/Users/hannah/Documents/Updates/Monday.doc`\
    \ and `/Users/hannah/Public/New/Monday.doc` are functionally equivalent and refer\
    \ to the same file.\n\n`NSFileManager` provides methods for creating symbolic\
    \ links and obtaining their contents.\n\nMost file operations traverse symbolic\
    \ links transparently. A path that ends with a symbolic link usually refers to\
    \ the link file itself, not the directory that it refers to. For example, the\
    \ statement `[[NSFileManager defaultManager] removeItemAtPath:@\"/Users/hannah/Public/New\"\
    \ error:NULL]` would delete the symbolic link file, not the `Updates` folder.\
    \ The notable exception is the `-[NSFileManager fileAttributesAtPath:traverseLink:]`\
    \ method. Its second `BOOL` parameter determines if it will return the attributes\
    \ of the symbolic link file or the attributes of the file the symbolic link refers\
    \ to. Table 11-6 lists the methods for creating and reading the contents of symbolic\
    \ links.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## Chapter 11:\
    \ Files\n\n### Table 11-6. NSFileManager Symbolic Link Methods\n\n| Method | Description\
    \ |\n|--------|-------------|\n| `-(BOOL)createSymbolicLinkAtPath:(NSString*)path\
    \ withDestinationPath:(NSString*)destPath error:(NSError**)error` | Creates a\
    \ symbolic link file at path that refers to the file at destPath. |\n| `-(NSString*)destinationOfSymbolicLinkAtPath:(NSString*)path\
    \ error:(NSError**)error` | Extracts the path that the symbolic link file refers\
    \ to. |"
