    The common functionality of NSIndexSet and java.util.BitSet is smaller than most
    of the other collection classes. The Java class has a number of methods for flipping
    bits and performing Boolean operations that the Objective-C class lacks.


    The primary use of NSIndexSet is to efficiently encapsulate an arbitrary subset
    of an ordered collection. The NSArray classes and user interface display classes
    use them extensively. For example, a table view returns the user’s current selection
    as an NSIndexSet that identifies the selected rows. The interface has a number
    of methods, such as -indexLessThanIndex:, that make it easy to iterate through
    the collection in any direction.


    NSHashTable


    NSHashTable is the sister class to NSMapTable. Like NSMapTable, it is constructed
    using a set of delegate functions that define its behavior. Also like NSMapTable,
