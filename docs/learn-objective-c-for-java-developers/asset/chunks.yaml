    \ 24 章中描述的大多数托管内存模式同样适用于 Core Foundation 类型。\n\n## 总结\n\n从 Objective-C 调用 C 函数非常简单，让您的代码可以直接访问基于\
    \ C 的解决方案。免费桥接使得处理 Core Foundation 类型变得更加容易，允许您像处理 Objective-C 对象一样与许多 Core Foundation\
    \ 类型交互。最常见的问题是匹配或调整两种语言的内存管理风格。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n---\n\n# 第 26 章 ■ 运行时\n\nObjective-C 应用程序的运行时环境具有一些您应该了解的属性。这些包括构成运行中应用程序的 Mac\
    \ OS X 进程的信息、其环境变量、与其父进程的连接等。其中一些继承自操作系统，而另一些则是 Objective-C 和 Cocoa 框架的特性。许多内容已在其他章节中描述过。我们将在此与运行时环境的其他重要方面一起简要回顾它们。\n\
    \n## 进程\n\n在 Mac OS X 中，每个 Objective-C 程序都作为一个进程执行。从技术上讲，Java 字节码在抽象虚拟机中执行；但大多数虚拟机在进程中运行，并具有几乎相同的属性。每个进程包括：\n\
    \n- 一个内存地址空间\n- 一个或多个执行线程\n- 一组键/值对形式的环境变量\n- 一个命令行参数数组\n\n在 Java 中，虚拟机可以访问进程的本地地址空间，但您（程序员）不能。在\
    \ Objective-C 中，您可以直接访问分配给进程的逻辑地址空间。硬件在物理上禁止直接访问进程本地地址空间之外的内存地址。任何访问尝试都会导致内存地址违规，这通常会导致进程终止。访问进程外部的任何资源都需要通过向内核发送消息来实现。您几乎不会直接这样做，但您应该知道，所有与硬件或操作系统交互的\
    \ API 最终都会向内核发送消息。\n\n在 Mac OS X 中，进程与主线程是同义词。只要主线程存在，进程就存在，并在主线程终止时终止——或者使用 `exit()`\
    \ 等函数有意终止进程。您可以创建或销毁其他线程，如第 15 章所述。\n\n并非所有 Objective-C 代码都在其自己的进程中运行。Objective-C\
    \ 还可以用于开发框架和插件。这些是可以由其他应用程序加载并在该应用程序环境中执行的代码和资源包。例如，您可以通过向操作系统提供 Spotlight 插件包来为文档提供自定义索引。该包包含在\
    \ Spotlight 搜索引擎想要索引您文档类型内容时执行的代码。您的 Spotlight 插件中的代码在元数据导入器进程中运行，而不是在您的应用程序中。\n\
    \n除了环境变量、命令行参数和进程属性之外，还有一些零散的进程级属性，例如当前工作目录。所有这些都将在以下部分中讨论。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第 26 章 ■ 运行时\n\n### 环境\n\n每个进程都继承其父进程（创建您的进程的进程）定义的环境。环境是一组键/值字符串对，允许设置和其他信息从一个进程传递到另一个进程。在\
    \ Java 中，您可以使用 `java.lang.System.getenv()` 或 `java.lang.System.getenv(String)`\
    \ 获取环境变量。在 Objective-C 中，向单例 `NSProcessInfo` 对象发送 `-environment` 消息，该对象通过 `[NSProcessInfo\
    \ processInfo]` 获取。\n\n### 命令行参数\n\n从命令行启动的 Java 进程包含一个命令行参数数组，该数组传递给其 `main(String[])`\
    \ 方法。Objective-C 程序托管在 C 应用程序中，该应用程序在调用 `main(int, char**)` 时启动。您可以在 `main(...)`\
    \ 中拦截和解释命令行参数，或者稍后通过向单例 `NSProcessInfo` 对象发送 `-arguments` 来引用它们。\n\n### 进程属性\n"
- fmt: '# Chapter 26: Runtime


    Java provides an interface to get properties. These are like environment variables,
    but can be supplied by classes, the virtual machine, and property list files among
    other sources. Most dynamic Java properties, like the current working directory,
    are obtained through function calls or object messages in Objective-C. Properties
    used to store default values and user preferences are called user defaults in
    Objective-C, and there’s a specific interface for working with them described
    later in the chapter.


    `Table 25-1` lists a few of the more interesting process properties supplied by
    Java, and where to find them in Objective-C.


    **Table 25-1.** Process Attributes


    | Java Property | Objective-C |

    |---|---|

    | `os.name` | `-[NSProcessInfo operatingSystemName]` |

    | `os.arch` | N/A |

    | `os.version` | `-[NSProcessInfo operatingSystemVersionString]` |

    | `user.name` | `NSUserName()` |

    | `user.home` | `NSHomeDirectory()` |

    | `user.dir` | `-[NSFileManager currentDirectoryPath]` |


    The `"os.arch"` property is not applicable in Objective-C, because it’s a compiled
    language. The code that executes on a particular processor must be compiled for
    that architecture. The binary file that stores an executable program often contains
    multiple versions of the application, one for each supported architecture. Xcode
    automatically recompiles your application for each architecture, and then combines
    them into a single executable. Architecture-specific traits, like pointer size
    and byte order, can be determined at compile time. You can use the preprocessor
    `#if` directive to compile code that’s specific to a particular processor or architecture.


    `NSProcessInfo` has other useful information about the process, operating system,
    and hardware. It will report, among other things, the amount of physical RAM and
    the number of CPU cores.


    Finer-level detail can be obtained from POSIX functions like `sysctl(...)`.


    ## Version


    Creating applications that are compatible with multiple versions of a framework
    or operating system can be a tricky endeavor. The Cocoa frameworks provide a number
    of version control and compatibility features that make this easier, or at least
    manageable.


    ### Controlling Development and Deployment Versions


    The Xcode build settings for your application project contain two important settings:


    - **Base SDK (`SDKROOT`)** defines the version of headers and frameworks used
    to compile the program.

    - **Deployment Target (`MACOSX_DEPLOYMENT_TARGET`)** defines the earliest version
    of the operating system your application is allowed to run on.


    The base SDK selects the set of source header files and libraries that your application
    will be compiled and linked with. Each version of the operating system defines
    a new set of classes, constants, and data types. By specifying a particular base
    SDK, you limit your code to the APIs that were available when that SDK was produced.
    Your application can’t use new classes, methods, or functions because (at least
    as far as the compiler is concerned) those functions don’t exist and your code
    will fail to compile.


    The deployment target applies only to GUI applications. It determines the earliest
    (oldest) version of the operating system your application is allowed to launch
    in. The value of this build setting is stored in the application’s bundle and
    tested by the OS when launched.


    ### Testing for Classes, Methods, and Functions


    Taken together, the above two build settings define a range of operating system
    versions that your application can function in. This is called cross-development.
    Within that range, later operating systems will have certain functions, classes,
    and methods implemented that earlier ones do not. To use any of those, your code
    will have to test for their existence at runtime:


    - Test for the existence of a class by calling `NSClassFromString()` and checking
    the results for `Nil`.

    - Test for the existence of a method using `-respondsToSelector:`.

    - Test for the existence of a function by comparing its pointer to `NULL`.


    The first two techniques use Objective-C introspection. The last test applies
    to C functions and works through a feature called weak linking. A weak link is
    a reference to a symbol that is assumed to be defined by the operating system.
    If that symbol does not actually exist when the application is loaded, the reference
    is set to `NULL`. In contrast to strong linking, a weakly linked reference won’t
    prevent your application from loading. You can test for the existence of the symbol
    at runtime, like this:


    ```

    if (NSDisableScreenUpdates != NULL) { NSDisableScreenUpdates(); }

    ```


    Remember that the name of C function by itself (without any parentheses) evaluates
    to the address of the function’s entry point. A complete description of cross-development
    settings and techniques can be found in the Cross-Development Programming Guide.¹


    ## Packages and Bundles


    A **package** is a collection of related files. From the user’s perspective, a
    package acts like a single filesystem object: an application, a document, or a
    plug-in component. In reality, a package is a directory that can contain any number
    of files or subdirectories. Packages are used in much the way JAR files are—to
    organize a group of related files and keep them together—except that in Mac OS
    X the content of the package is not compressed or archived.


    > **Tip:** You can explore the contents of a package directly from the Finder.
    Select a package and Control/right-click on the item. In the contextual pop-up
    menu, choose **Show Package Contents**.


    A **bundle** is a package with a predefined structure. Cocoa applications, browser
    plug-ins, Automator Actions, frameworks, and Core Image filters are just a few
    of the bundle types that are defined by the operating system. Any of these bundle
    types can include an arbitrary number of support files: NIB files, string properties,
    images, sounds, movies, HTML documents, scripts, executable utilities, even other
    bundles. What additional files you include in your bundle is entirely up to you.


    You access and interact with bundles using the `NSBundle` class. Basic bundle
    functions and their organization were discussed in Chapter 20. To learn more about
    bundles, refer to the `NSBundle` class documentation and the Bundle Programming
    Guide.²


    Not all program types are contained within bundles. A command-line tool, for example,
    produces a single executable file. Additional resource files can’t be bundled
    in a command-line tool.


    ## Frameworks


    One type of bundle is a **framework**. A framework contains a deployment of programming
    resources that can be shared by multiple applications. A framework can include
    shared libraries, Objective-C classes, images, sounds, NIB files, and other resources.
    In this respect, frameworks are roughly equivalent to JAR files used to deploy
    a library of Java class files, property files, and other resources. They can include
    any or all of the following:


    - Shared libraries of compiled functions and classes

    - Header files that define the interface to the framework API

    - Documentation

    - Arbitrary resources: NIB files, images, localized strings, scripts, help files,
    etc.


    ---


    ¹ Apple Inc., *Cross-Development Programming Guide*, [http://developer.apple.com/documentation/DeveloperTools/Conceptual/cross_development/](http://developer.apple.com/documentation/DeveloperTools/Conceptual/cross_development/),
    2006.


    ² Apple Inc., *Bundle Programming Guide*, [http://developer.apple.com/documentation/CoreFoundation/Conceptual/CFBundles/](http://developer.apple.com/documentation/CoreFoundation/Conceptual/CFBundles/),
    2005.'
