  trans: '

    # 对象实例化


    尽管我将 NIB 对象描述为通过标准反归档过程创建的，但 NIB 加载器对某些对象做了一些特殊处理。以下是 NIB 中对象的创建方式：


    -   自定义视图对象（`NSView` 的子类）通过 `-initWithFrame:` 进行初始化。这是为了与编程方式创建自定义视图对象保持一致。

    -   非视图自定义对象（`NSObject` 的子类）通过发送 `-init` 消息进行初始化。

    -   Interface Builder 提供的所有其他对象（即库面板中出现的那些对象）均通过常规的 `-initWithCoder:` 消息进行反归档。这也适用于您通过
    Interface Builder 插件提供的任何自定义对象。


    通过标准的初始化消息 `-init` 和 `-initWithFrame:` 初始化自定义对象，意味着自定义对象无需遵循 `NSCoding` 协议即可归档到
    NIB 文档中。这也意味着您可以实例化应用程序中几乎任何可用的对象，并将其连接到 NIB 中的其他对象。使用 `-initWithCoder:` 解码对象的好处在于，NIB
    可以包含预设的属性值。但由于 Interface Builder 不允许您编辑自定义对象的属性，这一点其实无关紧要。


    # NIB 对象初始化


    您通常希望执行一些额外的初始化。当 NIB 文档中的所有对象都创建完毕后，每个对象如果实现了 `-awakeFromNib` 方法，都会收到一条 `-awakeFromNib`
    消息。`-awakeFromNib` 消息在所有 NIB 对象创建完成、所有连接和绑定都设置好之后发送。


    请花点时间消化一下目前所介绍的内容。您已经了解了模型-视图-控制器设计模式的原则，以及一些流行的变体。您学习了数据模型、视图和控制器对象的基本通信职责。您还了解了绑定——这是一种非常具体的
    MVC 通信实现。通过使用 Interface Builder，您学会了在应用程序中实例化对象，并建立它们相互通信所需的连接。剩下的唯一事情就是实现这些角色的实际类了。


    接下来的几节将考察每一个 MVC 角色，并向您介绍用于实现自己角色所需的基本 Objective-C 和 Cocoa 技术。视图部分描述了窗口及其内容的视觉层次结构、视图对象的工作方式、图形坐标系以及可供您使用的基本绘图工具。后续章节将描述数据模型对象以及用于创建它们的数据建模工具，接着是一些对绑定有用的预构建控制器对象。其间还会详细描述用户事件如何到达视图对象，以及视图对象如何将产生的动作传递给它们的控制器。


    # 视图


    Cocoa 中视图对象的组织方式与 Java Swing 和其他 GUI 类库惊人地相似。这并不奇怪，因为基于窗口的用户界面中可视元素和控件的逻辑组织在所有现代平台上都相当一致。


    表 20-1 列出了主要的 Swing 类及其对应的 Cocoa 类。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 20 章 ■ 模型-视图-控制器模式


    **表 20-1.** 基础 Java 和 Objective-C 视图类


    | Java (javax.swing) | Cocoa |

    |---|---|

    | `JWindow` | `NSWindow` |

    | `JComponent` | `NSView` |

    | (AbstractButton) | `NSControl` |

    | `JButton` | `NSButton` (style=`NSMomentaryPushInButton`) |

    | `JComboBox` | `NSComboBox` |

    | `JPopupMenu` | `NSPopUpButton` |

    | `JCheckBox` | `NSButton` (style=`NSSwitchButton`) |

    | `JRadioButton` | `NSButton` (style=`NSRadioButton`) |

    | `JSpinner.DateEditor` | `NSDatePicker` |

    | `JSlider` | `NSSlider` |

    | `JLabel` | `NSTextField` |

    | `JTextArea` | `NSTextField` |

    | `JTextField` | `NSTextField` |

    | `JEditorPane` | `NSTextView` |

    | `JPasswordField` | `NSSecureTextField` |

    | `JProgressBar` | `NSProgressIndicator` |

    | `JList` | `NSTableButton` |

    | `JTable` | `NSTableView` |

    | `JTree` | `NSOutlineView`, `NSBrowser` |

    | `JScrollPane` | `NSScrollView` |

    | `JSplitPane` | `NSSplitView` |

    | `JTabbedPane` | `NSTabView` |

    | `JToolbar` | `NSToolbar` |


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    在使用 Cocoa 类时，请注意这些关键差异：`NSWindow` 不是 `NSView` 的子类，它本身也不是视图对象。相反，`NSWindow` 有一个
    `contentView` 属性，该属性是窗口视图层次结构的根节点。要向窗口添加子视图，请将它们添加到 `window.contentView`。这个 `contentView`
    最初是一个通用的 `NSView` 对象，仅充当子视图的容器，但您可以将其替换为任何 `NSView` 子类。


    `NSView` 的尺寸由两个矩形属性描述：`frame` 和 `bounds`。`frame` 属性描述视图在其父视图中的位置和大小，并用父视图的坐标系表示。因此，`NSView`
    的 `frame` 在概念上等同于 `JComponent` 的 `bounds`。`NSView` 的 `bounds` 属性是其内容的逻辑尺寸，用视图相对坐标表示，通常原点为
    `(0,0)`。如果您没有设置自定义的 `bounds`，它将反映 `frame` 在本地坐标中的情况。如果您将 `bounds` 设置为不同的值，它就定义了一个独立于
    `frame` 的本地坐标系（即 `bounds`）。


    与 Swing 不同，所有发送动作事件的 Cocoa 视图类（即所有“执行操作”的视图对象——按钮、文本字段、滑块等）都是 `NSControl` 的子类。`NSControl`
    在概念上类似于 `AbstractButton`，但它是所有 Cocoa 控件对象的基类，而不仅仅是按钮。`NSControl` 为其所有子类定义了四个通用概念：


    -   控件有一个 `cell` 属性，它是一个 `NSCell` 对象。该 cell 负责控件的所有绘制和用户交互；`NSControl` 对象本身不执行任何绘制。实际上，`NSCell`
    是控件的视图对象，而 `NSControl` 是控制器对象。对于每个 `NSControl` 子类的实例，都有一个默认的 `NSCell` 子类：`NSButton`
    使用 `NSButtonCell`，`NSSlider` 使用 `NSSliderCell`，等等。要自定义任何 `NSControl` 的外观，请将其 `NSCell`
    替换为您自己的自定义子类。

    -   控件发送动作消息。`NSControl` 定义了 `action` 和 `target` 属性，这些属性可以通过编程方式或在 Interface Builder
    中设置。通常，控件在其被激活或值改变时发送动作消息。

    -   控件有一个 `objectValue` 属性，用于定义其内容。这并不适用于每个 `NSControl` 子类，但对于表示或显示值的控件来说，这是一个代表其内容的对象。对于文本字段，它是一个普通或格式化的字符串，或者任何可以转换为字符串的内容。对于图像视图，它将是一个图像对象。便捷属性
    `stringValue`、`integerValue`、`doubleValue` 和 `floatValue` 用于获取或设置 `objectValue`
    属性。

    -   `NSControl` 定义了一个 `enabled` 属性，所有子类都应遵循该属性。`NSControl` 还定义了一组通用的编辑、验证和格式化行为，这些行为适用于某些子类。


    要将 `NSView` 从其父视图中移除，请向该 `NSView` 对象发送 `-removeFromSuperview` 消息，或者如果您想抑制自动重绘，则发送
    `-removeFromSuperviewWithoutNeedingDisplay` 消息。这与 Java 不同，在 Java 中，您必须告诉父视图移除特定的组件。

