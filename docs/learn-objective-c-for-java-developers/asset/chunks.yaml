    ## 第 12 章：序列化


    ### 摘要


    Objective-C 的归档功能扮演了 Java 序列化的角色。创建一个可归档的类需要预先多做一些工作，但其基本模式与 Java 中的序列化相同。为归档数据提供向后（甚至可能是向前）兼容性并不困难。Objective-C
    还提供了额外的好处：可以将编码对象的图限制为仅与根对象相关的那些对象，并在编码和解码过程中拥有灵活的对象替换与简化框架。


    正如你现在所发现的，Objective-C 的序列化与 Java 序列化并不等同，但它确实提供了一种使用 XML 对数据进行编码的简单便捷方法。你还学习了创建对象内存副本的基本知识。


    在牢固理解消息分发和对象归档的基础上，你现在可以体会到下一章将要讨论的分布式对象的简洁性了，它巧妙地将这两项特性结合在了一起。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第 13 章：近程与远程通信


    通信是一个非常宽泛的术语。在抽象意义上，向一个 Objective-C 对象发送消息就是在与该对象“通信”。在另一个极端，将文件刻录到光盘上，然后由另一个程序读取，则是向该应用程序“通信”数据。本章重点介绍通过独立代理或服务在对象之间直接交换数据的通信技术。


    在这个范围内，通信可以大致分为三个领域：同一进程内对象之间的消息交换、不同进程内对象之间的消息交换，以及通过网络进行的数据交换。本章将概述用于这三种情况的常用
    Objective-C 技术，但其中一些技术的细节会在其他章节中介绍。这些领域之间有一定重叠。有些技术几乎专门用于在同一进程内运行的对象之间交换消息，但也可以用于向其他进程发送消息，反之亦然。因此，在确定解决方案之前，请花点时间熟悉所有这些技术。


    ### 单进程内通信


    有几种技术可用于与位于你进程内存地址空间中的对象交换消息。基础的 Objective-C 消息分发是其中之一，但本节将回顾以下几种代表其他对象向目标对象发送消息的技术：


    - 延迟消息

    - 通知

    - 键值观察

    - 分布式对象


    延迟消息已在第 6 章讨论过。延迟消息使用 `-performSelector:…` 方法族发送。这是最简单的对象间通信形式。它将一个 Objective-C
    消息排入队列，该消息将在稍后的某个时间发送给一个对象。该消息通常在同一线程中发送，但某些变体会在不同线程中将其发送给对象。


    通知将 `NSNotification` 对象发送给感兴趣接收它们的对象。一个 `NSNotification` 是一个具名的消息容器，可以包含你想提供给接收者的任意信息。通知是
    Objective-C 对提供者/订阅者模式的实现，并在第 18 章中描述。通知与其他通信技术最显著的区别在于，通知是一种一对多的通信路径，并且提供者和订阅者对象之间不需要有任何直接的相互了解。通知通过
    `NSNotificationCenter` 对象进行分发。发送者描述其想要分发的通知的性质，接收者描述它希望接收的通知类型。通知中心将发送者与接收者进行匹配，并传递所请求的通知。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    键值观察（KVO）是一种专门的通知服务，用于传达对象属性的变更。一个观察者对象可以关联到另一个对象的特定属性。一旦关联，该属性的任何更改都会立即以 `-observeValueForKeyPath:ofObject:change:context:`
    消息的形式发送给观察者。键值观察特别有吸引力，因为它对被观察对象没有预先的设计要求——除了它必须实现一个符合 KVO 规范的属性。因此，你的对象可以请求获知几乎任何对象的任何属性的更改。键值观察在第
    19 章中描述。


    分布式对象（DO）通常用于在不同进程中的对象之间，或通过网络向其他系统发送消息。然而，它也可以用于在同一进程的不同线程之间发送消息。这种分布式对象的使用方式是为你的设计添加异步消息处理的一种简便方法。线程间
    DO 将在下一节中描述和演示。


    ### 与其他进程通信


    与其他进程通信受到一个严重限制：本地进程内存地址空间中的一个地址，对于任何其他进程来说都是毫无意义的。要与另一个进程交换信息，所有数据必须处于或转换为一种在进程外部有意义的可传输形式。这通常表现为由接收进程串行解释的字节数组。幸运的是，在上一章中，你刚刚学习了两种能对对象执行此转换的关键技术——归档和序列化。


    端口、管道和套接字是用于在进程间交换字节块的低级工具。端口指的是 Mach 内核端口，这是消息发送到内核以及进而发送到其他进程的基本机制。从技术上讲，所有进程外的通信都是通过
    Mach 端口执行的，因为这是进程与外部世界通信的唯一方式。在端口之上，是 POSIX 概念中的管道和套接字。从概念上讲，管道是一个单向的串行通信管道，两端各连接一个进程。一个进程注入管道中的字节会立即作为可读数据出现在另一端。套接字是两个进程之间的单向或双向通信管道。虽然管道仅限于在同一系统上运行的两个进程，但套接字可以通过数据网络或其他传输介质连接到在完全不同的计算机系统（可能相当遥远）上运行的进程。套接字更面向数据包，发送和接收离散的信息块，而非单个字节。

