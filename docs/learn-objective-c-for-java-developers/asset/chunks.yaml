    C 库函数 `strtol(…)` 来完成任意基数的转换。这需要将 Objective-C 字符串对象转换为 C 字符串（本章后面会介绍），然后将其传递给
    `strtol(…)` 函数或其相关函数。


    ## 包装数组


    在 Java 中，数组本身已是对象，因此语言不需要为它们包装器类。Objective-C 中的原生数组并非对象，但可以使用 `NSData` 类对它们进行包装。`NSData`
    为任何无定形的内存块提供了通用包装器。`NSData` 特别方便，因为它能让你摆脱底层 C 语言内存分配函数的束缚，让你像操作对象一样创建和管理大型结构体及原生
    C 数组。


    `NSData` 封装了一个不可变的字节数组。`NSMutableData` 子类用于管理可变的字节数组。`NSData` 提供了获取字节数组大小和起始地址的方法。`NSMutableData`
    扩展了 `NSData`，增加了调整数组大小以及追加、替换和删除字节的方法。表 8-3 列出了创建 `NSData` 对象的常用方式。


    **表 8-3.** *常用 `NSData` 构造函数*


    | 方法 | 用途 |

    |--------|---------|

    | `+[NSData dataWithBytes:length:]` | 创建一个新的 `NSData` 对象，其中包含给定地址和长度的内存的副本。 |

    | `+[NSData dataWithBytesNoCopy:length:]` | 此构造函数将一个 `NSData` 对象包装在使用 C 语言 `malloc(…)`
    函数（底层 C 内存管理）分配的内存块周围。该对象承担这块内存的管理责任，并在对象被销毁时释放它。这是将 C 分配的内存块转换为 Objective-C 对象最有效的方式。
    |

    | `+[NSData dataWithBytesNoCopy:length:freeWhenDone:]` | 如果 `freeWithDone:` 参数为
    `YES`，则此方法等同于 `+[NSData dataWithBytesNoCopy: length:]`。如果参数为 `NO`，则使用 `NSData`
    对象包装一个现有的内存块。新对象仅引用在构造时给定的原始地址和长度。程序员有责任确保其引用的内存在 `NSData` 对象的生命周期内有效。此构造函数在避免数据复制的性能开销方面尤为有用。
    |

    | `+[NSData dataWithContentsOf…:]` | 创建一个 `NSData` 对象，其中包含目标对象内原始数据的副本。此便捷构造函数系列包括
    `+dataWithContentsOfFile:`、`+dataWithContentsOfURL:` 等。 |

    | `+[NSData dataWithData:]` | 创建一个新的 `NSData` 对象，它是现有 `NSData` 对象的副本。 |

    | `+[NSMutableData data]` | 创建一个长度为零的 `NSMutableData` 对象。 |

    | `+[NSMutableData dataWithLength:]` | 创建一个给定长度的可变字节数组包装器，并用零填充。 |


    由于 `NSMutableData` 是 `NSData` 的子类，所有 `NSData` 的构造函数也同样适用于 `NSMutableData`，例如使用
    `[NSMutableData dataWithData:data]` 来创建现有 `NSData` 对象的可变副本。事实上，`+data` 构造函数实际上是由
    `NSData` 定义的，只是在其上用途有限。


    从原则上讲，`NSData` 对象的内容是不可变的。但实际上，除了硬件限制外，并无任何因素禁止修改其内容。`-[NSData bytes]` 方法返回数组中第一个字节的地址。一旦获得该地址，没有任何东西能阻止你修改该地址上的任何值。我倾向于将
    `NSData` 对象用于我不打算修改的内存，而将 `NSMutableData` 对象用于可修改的内存，但在实践中并无此强制规定。


    `NSData` 对象将其内容视为一个连续的字节数组。你通常需要将其视为其他类型——例如某种其他类型的数组或一个结构体。代码清单 8-2 演示了如何使用 `NSMutableArray`
    来存储一个 `NSPoint` 结构体数组。


