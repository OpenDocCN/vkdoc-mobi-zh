- fmt: "\n在 Objective-C 中，情况变得有些晦涩。到目前为止，我讨论的是定义每个类的单个 Objective-C 类对象，并通过每个对象的 `isa`\
    \ 变量来引用它。这有些误导。严格来说，实际上并不存在一个 `Class` 类。`Class` 类型是一个指向不透明结构体 `objc_class` 的 C\
    \ 结构体指针。眼尖的读者会注意到，对 `Class` 的引用（例如表 10-1 中的那些）总是 `Class` 而不是 `Class*`，如果它是一个真正的\
    \ Objective-C 对象指针的话，情况本应如此。\n\n我可以这样欺骗过去，是因为指向 `objc_class` 结构体的指针像任何 Objective-C\
    \ 对象一样响应消息。这就是为什么你可以使用 Objective-C 方法调用语法向其发送消息，例如 `[MyClass new]`。\n\n因此，`Class`\
    \ 类型存在于真实类和 C 结构体之间的一个模糊地带，通常表现得像一个对象，但没有任何正式的类定义。对类和对象进行更深层次的内省涉及使用 C 函数，这些函数接收一个\
    \ `objc_class` 结构体指针并返回关于它的信息。这些信息通常以其他 C 结构体或 C 字符串的形式出现。这并不特别困难，但请注意你正在越过面向对象编程的边界，进入\
    \ Objective-C 运行时系统的内部。\n\n1. Apple, Inc., *Key-Value Coding Programming Guide*,\
    \ [http://developer.apple.com/documentation/Cocoa/Conceptual/KeyValueCoding/](http://developer.apple.com/documentation/Cocoa/Conceptual/KeyValueCoding/),\
    \ 2009.\n2. Apple, Inc., *Objective-C 2.0 Runtime Reference*, [http://developer.apple.com/documentation/Cocoa/Reference/ObjCRuntimeRef/](http://developer.apple.com/documentation/Cocoa/Reference/ObjCRuntimeRef/),\
    \ 2008.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第十章 内省\n\n>\
    \ **注意：** Objective-C 的运行时系统被设计为完全透明的。与 Java 的 `java.lang.ClassLoader`（其内部机制被保密）不同，Objective-C\
    \ 类的创建、注册、修改、实例化和消息发送所涉及的函数都可以直接通过 Objective-C 运行时 API 获得。希望实现脚本语言或动态定义和增强运行时类的进阶程序员，可以不受限制地访问与\
    \ Cocoa 框架所使用的相同 API。\n\n表 10-4 列出了一些用于探索类信息的函数。表中的前四个函数将名称转换为 `Class` 或 `Protocol`\
    \ 指针，反之亦然。这就是你如何仅凭一个名称就能获得 `Class` 引用的方法。后四个函数只是执行相同功能的包装器，它们接收并返回 Objective-C\
    \ 字符串对象。包装函数简单地调用前四个函数之一，并为你转换字符串。最后，`class_getSuperclass(Class)` 函数返回一个类的超类引用，如果该类是根类则返回\
    \ `Nil`。它相当于向一个对象发送 `-superclass` 消息。\n\n***表 10-4.** 用于内省类的函数*\n\n| 函数 | 返回值\
    \ |\n| --- | --- |\n| `objc_getClass(const char*)` | 具有该名称的 `Class` |\n| `class_getName(Class)`\
    \ | `Class` 的名称 |\n| `objc_getProtocol(const char*)` | 具有该名称的 `Protocol` |\n|\
    \ `protocol_getName(Protocol)` | `Protocol` 的名称 |\n| `NSClassFromString(NSString\
    \ *name)` | 具有该名称的 `Class` |\n| `NSStringFromClass(Class)` | `Class` 的名称 |\n|\
    \ `NSProtocolFromString(NSString *name)` | 具有该名称的 `Protocol` |\n| `NSStringFromProtocol(Protocol*)`\
    \ | `Protocol` 的名称 |\n| `class_getSuperclass(Class)` | `Class` 的超类 |\n\n清单 10-5\
    \ 展示了如何遍历一个对象继承的类。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第十章\
    \ 内省\n\n**清单 10-5.** 向上遍历超类列表\n\n**Java**\n\n```java\nClass objClass = object.getClass();\n\
    while (objClass!=null) {\n  …\n  objClass = objClass.getSuperclass();\n}\n```\n\
    \n**Objective-C**\n\n```objectivec\nClass class = [object class];\nwhile (class!=Nil)\
    \ {\n  …\n  class = class_getSuperclass(class);\n}\n```\n\n> **注意：** Objective-C\
    \ 定义了用于 `Class` 指针的常量 `Nil`。使用 `Class` 指针时，使用 `Nil` 的方式与使用 `nil` 处理对象指针的方式完全相同。\n\
    \n探索协议\n"
  raw: 'In Objective-C, this is where things get a little obscure. Up until now, I’ve
    discussed the single Objective-C Class object that defines each class, and is
    referenced by each object’s isa variable. This was somewhat misleading. There
    actually isn’t a Class class, in the strictest sense. The Class type is a C


    structure pointer to the opaque objc_class structure. Readers with a particularly
    keen eye will have noticed that references to Class, like those in Table 10-1,
    are always just Class not Class*, as they would be for a true Objective-C object
    pointer.


    I could get away with this deception because a pointer to an objc_class structure
    responds to messages much like any Objective-C object. This is why you can send
    it messages using Objective-C


    method invocation syntax, as in [MyClass new].


    So the Class type exists in a kind of twilight zone between a real class and a
    C structure, generally behaving as an object, but without any formal class definition.
    Deeper introspection into classes and objects involves C functions that take an
    objc_class structure pointer and return information about it. This information
    will often be in the form of other C structures or C strings. This isn’t particularly
    difficult, but be aware that you’re stepping outside the bounds of object-oriented
    programming and into the bowels of the Objective-C runtime system.


    1 Apple, Inc., *Key-Value Coding Programming Guide*, http://developer.apple.com/documentation/Cocoa/


    Conceptual/KeyValueCoding/, 2009.


    2 Apple, Inc., *Objective-C 2.0 Runtime Reference*, http://developer.apple.com/documentation/Cocoa/


    Reference/ObjCRuntimeRef/, 2008.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 10 ■ INTROSPECTION


    ■Note Objective-C’s runtime system is designed to be completely transparent. Unlike
    Java’s java.lang.ClassLoader—the internals of which are shrouded in secrecy—the
    functions by which Objective-C


    classes are created, registered, modified, instantiated, and sent messages are
    all directly available through the Objective-C runtime API. Advanced programmers
    who want to implement scripting languages, or dynamically define and augment classes
    at runtime, have unfettered access to the same APIs used by the Cocoa frameworks.


    Table 10-4 lists a few functions that are useful in exploring information about
    classes. The first four functions in the table translate names into Class or Protocol
    pointers, and back again. This is how you could obtain a Class reference from
    nothing but a name. The second four functions are just wrappers that perform the
    same functions, taking and returning Objective-C string objects. The wrapper function
    simply calls one of the first four, converting the strings for you. Finally the
    class_getSuperclass(Class) function returns a class’s superclass reference, or
    Nil if the class is the root class. It’s equivalent to sending the -superclass
    message to an object.


    ***Table 10-4.** Functions for Inspecting Classes*


    Fun ctio n


    Retur n s


    objc_getClass(const char*)


    Class with that name


    class_getName(Class)


    The name of the Class


    objc_getProtocol(const char*)


    Protocol with that name


    protocol_getName(Protocol)


    The name of the Protocol


    NSClassFromString(NSString *name)


    Class with that name


    NSStringFromClass(Class)


    The name of the Class


    NSProtocolFromString(NSString *name)


    Protocol with that name


    NSStringFromProtocol(Protocol*)


    The name of the Protocol


    class_getSuperclass(Class)


    Superclass of Class


    Listing 10-5 shows how to iterate through the classes an object inherits.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 10 ■ INTROSPECTION


    Listin g 10-5\. Walking Up the List of Superclasses


    **Java**


    Class objClass = object.getClass();


    while (objClass!=null) {


    …


    objClass = objClass.getSuperclass();


    }


    **Objective-C**


    Class class = [object class];


    while (class!=Nil) {


    …


    class = class_getSuperclass(class);


    }


    ■Note Objective-C defines the Nil constant for use with Class pointers. Use Nil
    with Class pointers exactly as you would use nil with object pointers.


    Exploring Protocols'
