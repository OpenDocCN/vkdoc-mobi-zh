    Exploring Instance Variables


    The introspection functions for instance variables follows the same pattern as
    those for methods, protocols, and properties. There are functions, listed in Table
    10-9, to obtain a list of Ivar structures that describe all instance variables
    defined by a class, or just one. The functions ivar_getName, ivar_getOffset, ivar_getTypeEncoding
    will reveal the name, byte offset within the object’s structure, and type of each
    Ivar—but these latter two should not generally be used to access the variable.
    To get or set an instance variable, call object_getIvar(id,Ivar) or object_setIvar(id,Ivar,id).
    The value returned or passed is an object that is converted, as needed, to the
    actual type of the variable (a.k.a. auto-boxing).


    Key-Value Coding is implemented using these low-level instance variable introspection
    functions. If you need to programmatically get or set the value of instance variables,
    you might find it easier to use the higher-level KVC methods. Listing 10-8 demonstrates
    setting the name instance variable to the string @"Hugh" via introspection, and
    is equivalent to the statement object->name = @"Hugh".


    Listin g 10-8\. Programmatically Setting an Instance Variable Ivar ivar = class_getInstanceVariable([object
    class],"name"); object_setIvar(object,ivar,@"Hugh");


    As an alternative to object_getIvar and object_setIvar, the functions object_getInstanceVariable(id,const
    char*,void**) and object_setInstanceVariable(id,const char*,void*) get or set
    instance values directly, without using intermediate objects. Both return, as
    a side effect, the Ivar describing the variable they identified as the target.
    The getter function accepts the address of a pointer, which will be set to point
    to the actual variable in the object, and the setter function accepts a pointer
    to a value to copy into the object.


