    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 16 章 集合模式\n\n如果你将清单 16-9\
    \ 中的`NSEnumerator`赋值语句替换为清单 16-10 中的代码，那么该清单中的代码就变得特别有趣。`-keysSortedByValueUsingSelector:`消息会返回一个排序后的键数组，允许你以可预测的顺序遍历字典的值。\n"
- fmt: "See the “Sorting Collections” section about how to control the sorting order.\n\
    \n**Listing 16-10. Ordered Dictionary Enumeration**\n\n```\nNSEnumerator *e =\
    \ [[dictionary keysSortedByValueUsingSelector:@selector(compare:)]\n    objectEnumerator];\n\
    ```\n\n> **Tip:** A little known fact is that `NSEnumerator` also conforms to\
    \ `NSFastEnumeration`. This allows any `NSEnumerator` object to be the collection\
    \ in a fast enumeration statement. In Listing 16-9, the `while(…)` statement could\
    \ be replaced with `for ( key in e )`. The enumerator object assumes the role\
    \ of the collection. This is not optimized—the enumerator simply sends `-nextObject`\
    \ messages to itself—so don’t expect performance typical of fast enumerations.\n\
    \nThere is no Objective-C equivalent to the `java.util.Map.Entry` object. The\
    \ closest you can achieve is to use `-[NSDictionary getObjects:andKeys:]` to populate\
    \ two C arrays, one with the keys and the other with the values, as shown in Listing\
    \ 16-11.\n\n**Listing 16-11. Enumerating Dictionary Key/Value Pairs**\n\n```\n\
    NSDictionary *dictionary = …\nNSUInteger count = dictionary.count;\n\n__strong\
    \ id *keys = NSAllocateCollectable(sizeof(id)*count, NSScannedOption); \n__strong\
    \ id *values = NSAllocateCollectable(sizeof(id)*count, NSScannedOption);\n\n[dictionary\
    \ getObjects:values andKeys:keys];\n\nNSUInteger i;\nfor (i=0; i<count; i++) {\n\
    \    id key = keys[i];\n    id object = values[i];\n    // ...\n}\n```\n\n###\
    \ Adding Enumeration Support\n\nYou can easily subclass `NSEnumerator` to implement\
    \ your own enumerators. It really only has to implement a `-nextObject` method.\
    \ Implement the rarely used `-allObjects` method only if you find it useful, or\
    \ your enumerator object is meant for a wide audience. See the TicTacToe project\
    \ in Chapter 20 for an example of custom `NSEnumerator`s. And, as mentioned in\
    \ the earlier Tip, any `NSEnumerator` can be used in a fast enumeration statement.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nCHAPTER 16 ■ COLLECTION\
    \ PATTERNS\n\nProviding fast enumerator support for a custom object is a little\
    \ more involved. In concept, it’s easy; simply conform to the `NSFastEnumeration`\
    \ protocol and implement the `-countByEnumeratingWithState:objects:count:` method.\n\
    \nThe fast enumeration code sends this message to your object repeatedly until\
    \ it returns 0\\. Each time your collection receives the message, it must assemble\
    \ the next batch of objects to be processed in a C array and return the number\
    \ prepared. Fast enumeration is most efficient when your class assembles batches\
    \ of objects, but a simple non-optimized implementation can be achieved by returning\
    \ one object at a time.\n\nThe progress of an individual iteration is maintained\
    \ in an `NSFastEnumerationState` structure. This structure is empty when first\
    \ passed to your method, and the same structure is passed again with each subsequent\
    \ message. Your collection must update the structure to keep track of the enumeration’s\
    \ progress and protect against the collection changing during the enumeration.\
    \ Fast enumerations are expected to throw an exception if the collection is modified\
    \ during the course of the enumeration.\n\nSee the documentation for the `NSFastEnumeration`\
    \ protocol for a complete description of the `-countByEnumeratingWithState:objects:count:`\
    \ method and `NSFastEnumerationState` structures.\n\n## Sorting Collections\n\n\
    Ordered collections provide three basic techniques for sorting member objects\
    \ into order: sort using an Objective-C message, sort using a C callback function\
    \ to compare objects, and sort using sort descriptors. The methods that sort collections\
    \ are listed in Table 16-15.\n\n**Table 16-15. Sort Methods**\n\n| Method | Description\
    \ |\n|--------|-------------|\n| `-[NSArray sortedArrayUsingDescriptors:]` | Returns\
    \ a copy of the array sorted using the sort descriptors. |\n| `-[NSArray sortedArrayUsingSelector:]`\
    \ | Returns a copy of the array, sorted using an Objective-C message. |\n| `-[NSArray\
