  | `true` | `YES` | 逻辑真 |\n| `false` | `NO` | 逻辑假 |\n| `null` | `nil` | 空或无效的对象引用\
  \ |\n| | `NULL` | 空或无效的指针 |\n\n从技术上讲，`nil` 和 `NULL` 是可以互换的。为了提高可读性，在设置和测试 Objective-C\
  \ 对象引用时应使用 `nil`，就像你在 Java 中使用 `null` 一样。`NULL` 是 C 语言的空指针常量，用于设置和测试指针。采用这种约定可以强调代码中内存指针与对象引用之间的区别。\n\
  \n整数类型前的 `const` 关键字含义与 Java 中的 `final` 大致相同，但它很少用于定义简单的整数常量。C 语言中的大多数常量都是通过预处理器（本章后续部分也会介绍）或枚举语句来定义的。\n\
  \n清单 2-4 中的枚举（`enum`）定义了一个数值变量 `v`，它可以保存整数常量 `Zero`、`One` 或 `Two` 中的一个。与 Java 不同，`v`\
  \ 不是一个对象，它只是一个整数。这三个常量（`Zero`、`One` 和 `Two`）是公共符号，其值分别为 0、1 和 2。它们可以在任何能接受整数常量的上下文中使用。变量\
  \ `v` 通常会被省略，`enum` 语句仅用于定义这些常量。\n\n**清单 2-4.** 枚举\n\n```\nenum {\n    Zero = 0,\
  \ // = 0 是可选的，如果省略，枚举从 0 开始\n    One,\n    Two\n} v;\n```\n\n### Typedefs\n\n`typedef`\
  \ 是 Java 中所没有的概念，但在 C 语言中却被广泛使用。在 Java 中，新的数据结构和功能是通过创建新类来实现的。而在 C 语言中，你可以定义自己的原始数据类型。清单\
  \ 2-5 中的程序使用一个整数值来标识库存中的零件。\n\n\n\n### Typedefs\n\n`typedef`关键字放在变量声明前会将其转换为类型定义。与定义一个整型变量`PartCode`不同，`Listing\
  \ 2-5`中的`typedef`语句创建了一个与`int`同义的新变量类型（`PartCode`）。一旦定义完成，新的`PartCode`类型就可以替代`int`类型使用。`aCode`和`bCode`的声明是相同的。\n\
  \n```\ntypedef int PartCode;\nPartCode aCode;\nint bCode;\n```\n\n`typedef`有助于使代码更具可读性。函数原型`add(\
  \ PartCode c )`比`add( int c )`的描述性更强。`typedef`也提升了可维护性。`PartCode`可以在后续重新定义为`unsigned\
  \ int`或`long long int`，而无需修改每个部件代码变量的声明。\n\n`typedef`通常用于复杂声明，例如结构体和枚举。`Listing\
  \ 2-6`中的`typedef`语句同时创建了一个新的枚举类型（`Flavor`）和三个整型常量（`Strawberry`、`Rhubarb`和`Apricot`）。现在你可以编写`Flavor\
  \ favorite = Apricot;`，这会将值`2`赋给变量`favorite`。\n\n```\ntypedef enum {\n    Strawberry,\n\
  \    Rhubarb,\n    Apricot\n} Flavor;\n```\n\n### 指针\n\nJava 通过特意省略任何允许程序员直接访问任意内存位置的编程结构，来“保护”你免受物理内存的影响。在\
  \ Java 中，你只能访问命名的基本类型和对象的引用。\n\nC 语言没有在代码和物理内存之间提供这种隔离。这给了你极大的自由来访问和操作数据。同时，它也将不越界（访问内存）的责任落在了你——程序员——身上。\n\
  \n可以将 C 指针想象成 Java 对象引用，但有两个主要区别。C 指针可以指向任何类型的值或结构——而不仅仅是对象。你可以声明一个指向整数、浮点数、复杂结构、函数、甚至另一个指针的指针。其次，C\
  \ 指针始终是进程地址空间中的一个真实内存地址，而 Java 的对象引用是一个抽象且不透明的值。\n\n除此之外，大多数关于 Java 引用的编程规则也适用于指针。例如，将指针作为参数传递会复制值的引用，而不是值本身。\n\
  \n由于 C 语言同时提供值和指向值的指针，因此必须使用编程语法来区分两者。一元指针运算符（`*`）可以出现在类型定义和表达式中。在声明中，指针运算符将变量类型从简单变量更改为指向该类型变量的指针，如`Listing\
  \ 2-7`所示。\n\n```\nint i = 1;\nint *iptr;\niptr = &i;\n*iptr = 2;\n```\n\n在`Listing\
  \ 2-7`中，变量`iptr`是一个指向整型变量的指针。`iptr`的值是一个存储了整数值的内存地址，而不是存储在那里的整数值本身。换句话说，它是对进程地址空间中其他位置的一个基本整数值的引用。\n\
  \n`&`符号是一元“取地址”运算符。它返回变量的地址，而不是变量的值。`iptr = &i`语句将`iptr`的值设置为变量`i`的内存地址，而不是其值。\n\
  \n表达式中的一元指针运算符（`*`）将引用重定向到指针变量所指向的值。在某种意义上，它是一元取地址运算符的补充。最后一条语句使用指针运算符将赋值重定向到`iptr`所指向的值，而不是`iptr`本身的值。用英语来说，该语句的意思是“将值`2`存储在地址包含在`iptr`中的整型变量里”。最后一条语句不会改变`iptr`的值；它改变了`iptr`所指向的整型变量的值。在这四条语句执行完毕后，变量`i`的值将是`2`。\n\
  \n### 结构体\n\nC 结构体定义了内存块的布局。结构体（`struct`）由其他变量类型构建而成。一旦定义，这些变量集合就可以作为一个单一单元对待。`struct`语句非常类似于\
  \ Java 的类定义，但不包含方法。简单的结构体声明（如枚举）定义了一个具有给定结构的单一变量。更典型的是，结构体会出现在`typedef`语句中，以便可以通过名称重用该结构定义（参见`Listing\
  \ 2-8`）。\n\n```\ntypedef struct {\n    int key;\n    int count;\n} KeyCount;\n\n\
  ...\n\nKeyCount counter;\ncounter.key = 1;\ncounter.count = 0;\n```\n\n`Listing\
  \ 2-8`中展示的`KeyCount`结构体定义了一个包含两个成员变量的内存单元，这两个成员变量位于连续的地址中，分别名为`key`和`count`。与 Java\
  \ 类似，C 语言使用成员运算符（`.`）来访问结构体中的成员变量。更常见的是，通过指向结构体的指针来间接引用结构体，如`Listing 2-9`所示。\n\n\
  ```\nKeyCount *nextCounter = &counter;\nnextCounter->count += 1;\n```\n\n变量`nextCounter`是一个指向`KeyCount`结构体的指针。当变量是指向结构体的指针时，使用间接成员运算符（`->`）来指定成员变量。这在技术上是`(*nextCounter).count`的简写，但更易于读写。\n\
  \n将一个结构体赋值给另一个结构体会复制整个结构体。语句`KeyCount save = counter`会将`counter`结构体中的两个整数复制到`save`结构体中对应的整数。方法参数是按值传递的，因此在参数中传递结构体会复制整个结构体。这与\
  \ Java 不同，后者不允许按值复制对象。\n\n因此，大多数方法声明的参数是指向结构体的指针（引用），而不是结构体本身。但如果你需要按值传递结构体，你也有这种选择。\n\
  \n### 对象引用\n\n如果你认为 C 结构体看起来很像类，而指向结构体的指针作用很像对象引用，那么你非常敏锐。Objective-C 使用 C 结构体来定义对象，并使用结构体指针作为对象引用。\n\
  \n一个 Objective-C 的类定义本质上定义了一个 C 结构体。你首先使用 Objective-C 语法来定义类。一旦定义完成，你就可以使用 C 语言中关于结构体和指针的语法来与对象交互。两者都在`Listing\
  \ 2-10`中展示。\n\n```\n@interface KeyCounter {\n@public\n    int key;\n    int count;\n\
  }\n@end\n\nKeyCounter *countObject = ...;\ncountObject->count += 1;\n```\n\n在幕后，为类创建的结构体包含了额外的成员变量，这些变量用于定义对象的类、提供对其方法的访问、管理内存等等。\n\
  \nObjective-C 甚至提供了一个运算符，可以将类类型转换为 C 结构体类型，允许你无限制地访问对象的内部结构，或者将对象视为一个简单的 C 结构体。这很少使用，但它凸显了\
  \ Objective-C 的透明性。\n\n如果所有这些让你感到不知所措，别担心。你可以在很大程度上忽略`typedef`、结构体和指针的细节。要使用 Objective-C\
  \ 编程，你需要知道类是结构体，指针运算符（`*`）用于声明指向对象的指针（引用），以及间接成员运算符（`->`）用于通过对象指针（引用）直接访问成员变量。\n\
  \n\n\n"
- "# Objective-C 与 C 语言概念\n\n即便从未自行创建结构体、定义 `typedefs`，或使用指向对象之外变量的指针，你也能成功编写 Objective-C\
  \ 程序。不过，你仍需要对这些概念有所了解，因为你会其他 Objective-C 代码中遇到它们。我猜想，你最终会想要更深入地探索 C 语言类型，哪怕只是为了使用那些带\
  \ C 语言接口的库。\n\n### 数组\n\nC 语言数组同样属于你需要了解、但可能暂时还用不到的知识。C 语言数组与 Java 数组不同。C 语言数组定义了一组占据连续内存地址的值。它不是一个对象，不提供边界检查，并且通常通过指针来操作。\n\
  \n清单 2-11 中的语句声明了一个包含 10 个整型变量的数组，然后获取了数组中第四个整数的值。与 Java 数组类似，可以使用数组下标语法（数组访问表达式）来寻址单个元素。\n\
  \n**清单 2-11.** C 语言整型数组\n\n```\nint numbers[10];\nint j = numbers[3];\n```\n\nC\
  \ 语言数组和指针紧密交织。在清单 2-12 中，符号 `numbers`（单独使用）会求值为数组第一个元素的地址，等价于表达式 `&numbers[0]`。\n\
  \n**清单 2-12.** 数组与指针的可互换性\n\n```\nint *iptr = numbers;\niptr += 3;\nif (*iptr==j)\
  \ …\n```\n\n清单 2-12 中的指针 `iptr` 首先被赋值为数组中第一个元素的地址。第二条语句使用指针运算调整了指针。指针运算（在指针值上加或减一个整数值）通过将\
  \ `n*sizeof(类型)` 加到指针的地址值上，使指针指向当前地址之后的第 n 个值。在此例中，假设一个整数的大小为 4 字节，那么给一个整型指针加 3，会将其内存地址调整\
  \ 12 字节。之后，`iptr` 变量指向数组的第四个元素，表达式 `numbers[3]` 和 `*iptr` 是等价的。\n\n> **注意：** `sizeof()`\
  \ 运算符是一个编译时函数，它会计算所包含类型的大小（以字节为单位）。参数可以是类型或变量。以清单 2-11 为例，表达式 `sizeof(int)`、`sizeof(j)`\
  \ 和 `sizeof(numbers[3])` 都是等价的，并且都求值为整型常量 4——即一个 32 位整数的字节大小。表达式 `sizeof(numbers)`\
  \ 求值为 40，即 `10*sizeof(int)`，因为 `numbers` 是一个包含 10 个整数的数组。你经常会看到诸如 `(sizeof(numbers)/sizeof(int))`\
  \ 的表达式，用于确定数组中的元素个数。\n\nC 语言指针和数组变量本质上是可互换的。数组通常被当作指针来赋值和传递（传递的值将是数组第一个元素的地址）。在指针上使用数组下标语法也是允许的，例如\
  \ `iptr[3] = 0`。这等价于 `*(iptr+3) = 0`。\n\nObjective-C 提供了一个对象数组类，并为大多数基本类型提供了对象包装器。它们的行为与你熟悉的\
  \ Java 数组和集合非常相似。虽然你需要了解 C 语言数组是如何定义和访问的，但在你熟练掌握 C 语言数组、内存管理和指针运算之前，可以优先使用面向对象的数组类来避开它们。\n\
  \n### `static`\n\n`static` 关键字在 C 语言中有一些额外的含义，并且其使用方式与 Java 不同。Java 使用 `static`\
  \ 在类声明中声明一个单一的持久类变量。Objective-C 不允许你在类定义中声明变量。相反，`static` 变量被声明为全局 C 变量或代码块内部的 `static`\
  \ 变量。清单 2-13 声明了两个 `static` 变量。\n\n**清单 2-13.** 全局静态变量\n\n```\nint scramingZombieHitCount\
  \ = 1;          // 所有模块均可访问\nstatic int screamingZombieBounceCount;   // 仅此模块可访问\n\
  ```\n\n在任何方法、结构体或类定义之外声明的变量会创建一个全局变量，大致等价于 Java 的 `static` 变量。全局变量在启动时会被预初始化为零，除非显式初始化为其他值。在此上下文中，`static`\
  \ 关键字仅决定符号的作用域（所有全局变量在 Java 意义下都是“静态的”）。省略 `static` 关键字会使该符号全局可访问。程序中的任何模块都可以通过\
  \ `extern` 语句按名称访问它。包含 `static` 关键字则会将变量的作用域限制在包含该声明的文件内。因此，`screamingZombieHitCount`\
  \ 可以被程序中任何模块直接使用，而 `screamingZombieBounceCount` 仅能由此文件中的代码访问。\n\n在代码块内部，声明为 `static`\
  \ 的变量会创建一个持久的静态变量。该变量的作用域被限制在其声明的代码块内。清单 2-14 展示了一个每次执行代码块时都会递增的 `static` 整数。\n\n\
  **清单 2-14.** 代码块中的静态变量\n\n```\n{\n    static int hitCount = 0; // 全局命中次数，启动时初始化为\
  \ 0\n    hitCount++;              // 增加全局命中次数变量\n    return (hitCount);       //\
  \ 返回更新后的命中次数\n}\n```\n\n### 函数\n\nC 语言是一种过程式语言，没有对象的概念。在 C 语言中，可调用的代码块被称为函数。一个 C\
  \ 函数等价于 Java 中的 `static` 类方法；它没有对象上下文。C 函数名没有作用域限制（不在类或包内），它们不能被继承，也不能被重写。清单 2-15\
  \ 展示了一个比较两个 Objective-C 日期对象并返回较早日期的 C 函数。\n\n**清单 2-15.** C 函数\n\n```\nNSDate*\
  \ earlierDate( NSDate* a, NSDate* b )\n{\n    if (a==nil)\n        return (b); //\
  \ 如果 a 和 b 都为 nil，则返回 nil\n    if (b==nil || [a compare:b]==NSOrderedAscending)\n\
  \        return (a);\n    return (b);\n}\n```\n\n函数调用语法与 Java 相同：`NSDate *first\
  \ = earlierDate(sometime, whenever)`。`earlierDate()` 函数对所有模块全局可访问。函数定义前的 `static`\
  \ 关键字会将其作用域限制在正在编译的模块内，这与 `static` 变量的情况相同。\n\n### `extern`\n\n一个模块使用 `extern` 语句来访问定义在另一个模块中的全局变量或\
  \ C 函数。`extern` 语句通常放在定义它的模块的头文件中（参见清单 2-16）。这仅对定义在其他模块中的全局变量和函数是必需的。你不需要使用 `extern`\
  \ 语句来声明或引用 Objective-C 类。\n\n**清单 2-16.** 外部变量声明\n\n```\nextern int screamingZombieHitCount;\n\
  extern void killAZombie( Zombie *victim );\n```\n\n清单 2-16 中的语句声明了其他某个模块已经定义了一个名为\
  \ `screamingZombieHitCount` 的全局整型变量（来自清单 2-13）和一个名为 `killAZombie` 的 C 函数。编译器在编译此模块时假定该变量和函数存在于某个（或\
  \ 20 个）其他模块中。链接器负责在构建应用程序时，将此模块的引用连接到实际的变量位置和函数地址。\n\n### 预处理器\n\nC 语言预处理器是一种文本宏语言，（概念上）它在源文件文本被输入到\
  \ Objective-C 编译器之前应用于该文本。当编译源文件时，预处理器首先扫描文件文本，执行所有预处理指令并执行任何文本替换。Java 没有类似的功能。\n\
  \n你应该了解的重要预处理语句包括 `#include`、`#import`、`#define` 和 `#if`。\n\n\n\n### 预处理器指令（`#if`等）\n\
  \n所有预处理器指令都以换行符分隔。Java 和 C 通常忽略换行符，将它们视为与任何其他空白字符无异。C 预处理器一次处理一行，因此预处理器指令不能与 Objective-C\
  \ 源代码混在同一行上。\n\n### `#include` 和 `#import`\n\n`#include` 和 `#import` 语句将另一个源文件的内容插入到正在编译的文件中，如代码清单\
  \ 2-17 所示。`#include` 和 `#import` 语句可以嵌套。也就是说，一个文件可以 `#include` 另一个文件，而该文件又 `#include`\
  \ 第三个文件，依此类推。\n\n**代码清单 2-17. `#include` 和 `#import` 指令**\n\n```\n#include <Cocoa/Cocoa.h>\n\
  #import \"MyClass.h\"\n```\n\nC 编译器对其他文件中定义的类或符号一无所知。要使用任何类或符号，正在编译的源代码必须首先定义它。这与\
  \ Java 编译器不同，Java 编译器会自动查找并解释其他 `.java` 文件，以获取其他类的定义。\n\n显然，手动输入计划使用的每个类或符号的定义是不切实际的。C\
  \ 语言社区早就通过一种简单的文件组织方式解决了这个问题。每个模块被分为两个文件：一个源文件和一个头文件。Objective-C 源文件（有时称为实现文件）包含方法的代码，并以\
  \ `.m` 文件扩展名保存。头文件（有时称为接口文件）仅包含程序员希望公开供其他模块使用的类定义、变量和常量。\n\n源文件不可避免地以一系列 `#include`\
  \ 和 `#import` 语句开头，以获取模块所需的定义，如代码清单 2-17 所示。随后是实现该模块中方法的代码。实际上，这类似于 Java 的 `import`\
  \ 语句。但与简单地声明引入作用域的包名（并将查找这些定义的工作留给 Java）不同，`#import` 指令会插入模块头文件的内容，以声明所需的类和常量。\n\
  \nJava 要求一个完整的类必须在一个文件中定义。虽然可以在一个文件中包含多个 Java 类，但不可能将一个类拆分到多个文件中。Objective-C 没有此类限制，但强烈建议将整个类定义在单个源文件中。Objective-C\
  \ 的类别（categories）——将在后续章节中介绍——是一种用于将单个类细分为多个部分的正式编程模式。但在开始编写类别之前，请将一个类的所有定义放在以该类命名的头文件中（例如\
  \ `MyClass.h`），并将实现该类方法的所有代码放在同名的源文件（例如 `MyClass.m`）中。`MyClass.m` 文件应以导入其 `MyClass.h`\
  \ 文件开头。然后，为实现需要了解的其它类添加 `#import` 指令。代码清单 2-18 展示了 `StringPool` 类的一对典型源文件的起始部分。\n\
  \n**代码清单 2-18. `StringPool` 类源文件的第一行**\n\n```\n// StringPool.h\n#include <libkern/OSAtomic.h>\n\
  #import <Cocoa/Cocoa.h>\n\n@interface StringPool : NSObject {\n@private\n    NSHashTable\
  \ *strings;\n    OSSpinLock spinLock;\n}\n…\n\n// StringPool.m\n#import \"StringPool.h\"\
  \n#import \"InverseHashTable.h\"\n#import \"StringUtilities.h\"\n\n@implementation\
  \ StringPool\n…\n```\n\n`#import` 与 `#include` 略有不同。`#include` 无条件地将另一个文件的内容插入进来，而\
  \ `#import` 仅在该文件尚未被插入时才插入它。所有类定义头文件都应使用 `#import`，因为它避免了重复包含头文件的可能性，而重复包含会导致重复定义错误。\n\
  \n`#include` 和 `#import` 都接受一个文件名，该文件名由双引号或尖括号分隔。\n\n\n\n在包含系统头文件时使用尖括号，在包含自己项目中的文件时使用双引号。\n\
  \n`#define`\n\n`#define`指令创建一个文本宏，如清单 2-19 所示。文本宏会用宏的内容替换源代码中的标记。宏可以包含参数，这些参数看起来类似于函数定义，并执行复杂的替换。更常见的是，预处理器宏简单地用于定义常量。\n\
  \n清单 2-19\\. 定义字面常量\n\n**Java**\n\n```\nfinal int MAX_ZOMBIES = 999;\nfinal int\
  \ MANY_ZOMBIES = MAX_ZOMBIES-100;\n```\n\n**C**\n\n```\n#define MAX_ZOMBIES 999\n\
  #define MANY_ZOMBIES (MAX_ZOMBIES-100)\n```\n\n一旦定义了`MAX_ZOMBIES`文本宏，之后任何出现的标记`MAX_ZOMBIES`都将被替换为文本“999”。预处理器会重写语句`if\
  \ (zombieCount>=MAX_ZOMBIES)`，即替换该标记。Objective-C 编译器最终将编译语句`if (zombieCount>=999)`。Objective-C\
  \ 编译器从未看到`MAX_ZOMBIES`符号，因为预处理器标记替换是在 C 语言编译器阶段之前执行的。\n\n标记替换仅在单词边界上进行，不会发生在字面字符串或注释内部。\n\
  \n标记替换是递归的。代码`if (zombieCount>MANY_ZOMBIES)`会被替换为`if (zombieCount>(MAX_ZOMBIES-100))`，然后进一步被替换为`if\
  \ (zombieCount>(999-100))`。为了避免意外的求值顺序，请将包含运算符的任何预处理器宏用括号括起来。\n\n另外请注意，预处理器宏不是 C\
  \ 语言语句。它们不使用等号进行赋值，也不以分号结尾。如果这样做，这些符号会被包含在替换后的文本中。指令`#define MAX_ZOMBIES = 999;`会将\
  \ C 语句`if (zombieCount>=MAX_ZOMBIES)`变成`if (zombieCount>== 999;)`，最终导致编译器错误。\n\n\
  `#if`\n\n`#if`指令在 Java 中没有对应的功能。`#if`指令根据表达式的值包含或忽略一个文本块，如清单 2-20 所示。\n\n清单 2-20\\\
  . `#if`预处理器指令\n\n```\n#if LOG_OUTPUT > 1\nNSLog(@\"game now contains %d zombies\"\
  ,zombieCount);\n#endif\n```\n\n清单 2-20 中`#if`指令和`#endif`指令之间的文本仅在表达式求值为非零值时才会被编译。该表达式只能使用编译时已知的常量。在此示例中，仅当`LOG_OUTPUT`预处理器宏求值大于\
  \ 1 时，`NSLog`语句才会被编译。否则，该文本不会被编译，就像该`NSLog`语句被注释掉一样。\n\n你可以在`#if`和`#endif`指令之间放置一个`#else`指令。`#if`和`#else`之间的文本在条件表达式为真时被包含。`#else`和`#endif`之间的文本在条件为假时被包含。\n\
  \n`#ifdef`和`#ifndef`是`#if`指令的两种便捷变体。它们的参数都是一个单独的预处理器宏名称。如果该宏已被定义（无论其值是什么），`#ifdef`会包含直到`#endif`的文本。`#ifndef`则相反，仅当该宏名称从未被定义时才包含文本。这些指令常用于根据不同环境修改代码，如清单\
  \ 2-21 所示。\n\n清单 2-21\\. `#ifdef`预处理器指令\n\n```\n#ifdef DEVELOPMENT_VERSION\nNSAssert(poolSize<256,@\"\
  pool overflow\"); // alert developer\n#else\nif (poolSize>=256)\n    return; //\
  \ return immediately if pool overflows\n#endif\n```\n\n在源文件中或通过构建设置定义预处理器宏`DEVELOPMENT_VERSION`，将会编译代码以在`poolSize`变量大于或等于\
  \ 256 时抛出断言（程序异常）。如果`DEVELOPMENT_VERSION`宏未被定义，则会编译`if/return`语句。\n\n\n\n`#if`指令可以嵌套。被`#if`指令省略的文本同样会被预处理器忽略，这使得我们可以有条件地包含文件或有条件地定义其他预处理宏。\n\
  \n通常也会看到使用`#if 0 … #endif`来注释掉大块不需要或实验性的代码。\n\n### 初始化自动变量\n\nJava 确保所有变量在使用前都被初始化为一个可预测的值。这是\
  \ Java 的“明确赋值”规则。类似地，Objective-C 在创建对象时将所有实例变量初始化为零。C 语言将所有静态变量初始化为零，除非显式初始化为其他值。\n\
  \n然而，C 语言不会初始化自动（局部）变量，也不要求它们在使用前被初始化（参见清单 2-22）。\n\n**清单 2-22. 未初始化的自动变量**\n```\n\
  {\nint i;\nwhile (i==0)\n…\n}\n```\n清单 2-22 中的整型变量`i`是一个分配在方法栈帧上的自动（局部）变量。C 语言不要求将其初始化为任何值。如果没有初始化，其值是不可预测的。它将是从前占据该栈或\
  \ CPU 寄存器中那个字位置的任何值。请确保在使用自动变量之前对其进行初始化。\n\n### 标签：break、continue 和 goto\n\nC 语言的`break`和`continue`语句执行的功能与其\
  \ Java 对应项相同。\n\nJava 标签标识一个代码块，通常是`for`或`while`循环。Java 的`break`或`continue`语句可以选择性地指定一个外层控制块的标签，从而允许退出该命名块或跳转到其末尾。C\
  \ 语言的`break`和`continue`语句不接受标签。\n\n在 C 语言中，执行控制更为宽松。除了将异常流程控制限制在`break`和`continue`语句之外，C\
  \ 语言还提供了通用的`goto`语句。C 语言标签标识代码块中的一个语句。`goto`语句立即将执行转移到由标签标识的代码。标签和`goto`语句可以出现在函数或方法内的任何位置，如清单\
  \ 2-23 所示。\n\n**清单 2-23. break、continue 和 goto**\n\n**Java**\n```\nint segment[][]\
  \ = new int[100][100];\n...\nint optimalLength = 200000;\nint lineLength = 0;\n\
  int bestFit = 0;\nlineLoop:\nfor (int i=0; i<100; i++) {\n    lineLength = 0;\n\
  \    for (int j=0; j<100; j++) {\n        int s = segment[i][j]; // get segment\
  \ length\n        if (s==0)              // stop at zero length\n            break;\n\
  \        lineLength += segment[i][j]; // accumulated line length\n        if (lineLength>optimalLength)\
  \ // line too long\n            continue lineLoop;\n        if (lineLength==optimalLength)\
  \ // line perfect fit\n            break lineLoop;\n        if (lineLength>bestFit)\
  \       // remember best fit\n            bestFit = lineLength;\n    }\n}\nreturn\
  \ (lineLength);\n```\n\n**C**\n```\nint segment[100][100];\n...\nint optimalLength\
  \ = 200000;\nint lineLength;\nint bestFit = 0;\nfor (int i=0; i<100; i++) {\n  \
  \  lineLength = 0;\n    for (int j=0; j<100; j++) {\n        int s = segment[i][j];\n\
  \        if (s==0)\n            break; // Same as Java\n        lineLength += segment[i][j];\n\
  \        if (lineLength>optimalLength)\n            goto nextLine; // Jump to end\
  \ of outer loop\n        if (lineLength==optimalLength)\n            goto stop;\
  \ // Continue after outer loop\n        if (lineLength>bestFit)\n            bestFit\
  \ = lineLength;\n    }\nnextLine:\n    ;\n}\nstop:\nreturn (lineLength);\n```\n\n\
  清单 2-23 中的代码片段演示了`break`、`continue`和`goto`语句的使用。`goto nextLine`语句继续在外层循环控制块的末尾执行，这等同于\
  \ Java 中的`continue lineLoop`语句。`goto stop`语句跳转到紧随外层循环之后的语句，等同于`break lineLoop`语句。\n\
  \n`nextLine`标签说明了 C 语言标签的一个特性：它们必须位于一个可执行语句之前。在其后跟一个空语句（`;`）即可满足此要求。\n\n\n\n"
- "# C 标签\n\n与 Java 不同，C 语言的标签不仅限于跳转到代码块的末尾。`goto` 语句可以在代码流中向前或向后跳转，也可以跳入或跳出任意层级的代码块。仅使用\
  \ `label`、`if` 和 `goto` 语句就可以构建出 `for`、`while`、`do` 和 `case` 语句——尽管我不推荐这样做。\n\n\
  请尽量少用 `goto` 语句（如果确实要用的话）。它们可以解决非常复杂的代码流程问题，但只应作为最后的手段。`goto` 语句容易被滥用，常常会妨碍代码优化，并且会使执行顺序难以分析。\n\
  \n### 本章小结\n\n本章旨在为你提供足够的 C 语言知识，使你能够开始用 Objective-C 进行编程。\n\n使用 Objective-C 编程能让你从\
  \ C 编程的许多晦涩和繁琐的方面中解放出来。通过使用 Objective-C 类，你可以在很大程度上避免使用 C 字符串、内存管理、数组以及大量其他结构。\n\
  \n无论从哪个角度看，本章都不是一篇全面的 C 语言教程。C 语言非常庞大——甚至比 Java 还要庞大，因为 Java 的目标之一就是创建一种更简单、更简洁的\
  \ C 语言版本。\n\n虽然这个简略的介绍能为你提供足够的入门知识，让你可以开始用 Objective-C 编程，但你最终还是会遇到更复杂的 C 代码，或者需要与\
  \ C 库交互。那时就需要对这门语言有更深入的理解。我强烈建议你购买一本关于标准 C 语言的书籍，以便进一步阅读和将来参考。\n\n现在你已经了解了 C 和 Java\
  \ 之间的显著差异，可以开始探索定义 Objective-C 的额外语法了。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 3 章：欢迎使用 Objective-C\n\n本章介绍 Objective-C 的核心语言及其语法与 Java 的不同之处。功能上的差异以及更晦涩的语言特性将在后续章节中介绍。\n\
  \nObjective-C 通过增加一层额外的语法来增强 C 语言。它并没有以任何有意义的方式重新定义 C 语言或限制其能力。Objective-C 的语法很容易识别。如果\
  \ Objective-C 有一个标志，那很可能就是“at”符号（`@`）；所有 Objective-C 指令，包括字符串常量，都以 `@` 开头（例如 `@interface`、`@selector()`、`@\"\
  string\"`）。其他显著特征包括使用方括号（`[...]`）来调用方法以及非常具有描述性的方法名称。\n\n但如果你忽略这些特性，就会发现两者之间并没有显著的不协调之处。两者都是面向对象的语言，让你可以定义类、声明实例变量和方法、实例化这些类的实例、从子类继承、重写方法、调用方法、传递参数以及返回值。优秀的\
  \ Objective-C 编程遵循的设计模式和实践与你所熟悉的 Java 相同。\n\n### 定义一个 Objective-C 类\n\nObjective-C\
  \ 类在 `@interface` 指令中定义，其实现则在 `@implementation` 指令中定义。这与 Java 的单一类定义不同，Java 的类定义同时包含了类的接口和实现，如代码清单\
  \ 3-1 所示。\n\n**代码清单 3-1. Objective-C 类定义**\n\n**Java**\n\n```\nimport com.apress.java.SuperClass;\n\
  \npublic class NewClass extends SuperClass\n{\n    int instanceVariable;\n\n   \
  \ Object method( )\n    {\n        return (null);\n    }\n\n    Object method(Object\
  \ param )\n    {\n        return (null);\n    }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**Objective-C**\n\n```\n#import \"SuperClass.h\"\n\n@interface NewClass : SuperClass\
  \ {\n    int instanceVariable;\n}\n\n-method;\n-methodWithParameter:param;\n\n@end\n\
  \n@implementation NewClass\n\n-method\n{\n    return (nil);\n}\n\n-methodWithParameter:param\n\
  {\n    return (nil);\n}\n\n@end\n```\n\n代码清单 3-1 显示了在 Java 中定义 `NewClass` 类以及在 Objective-C\
  \ 中定义等效类的过程。类定义的 `@interface` 部分通常放在头文件（`.h`）中，供其他模块引用，而 `@implementation` 部分则放在源文件（`.m`）中。如果你需要复习\
  \ C 语言源文件组织方式，请参阅上一章的“`#include` 和 `#import`”部分。\n\n类声明的 `@interface` 部分包含两个部分。第一部分包含用花括号括起来的实例变量声明。这部分类似于\
  \ C 语言的结构体声明。变量声明之后是类的方法原型。连字符前缀表示该方法是实例方法。加号前缀表示类方法，类似于 Java 中的 `static` 方法。\n\n\
  `@implementation` 指令包含在 `@interface` 部分中描述的方法的实际代码。声明一个方法却不实现它会导致错误，但相反的情况是允许的。Java\
  \ 的一个更优雅的设计特性是，一个类文件同时定义了类的接口和实现。在 Objective-C 中，程序员有责任保持接口和实现的一致性。\n\n`@interface`\
  \ 和 `@implementation` 部分都以 `@end` 指令结束。\n\n类继承的工作方式与 Java 相同。`NewClass` 类继承了 `SuperClass`\
  \ 类的所有实例变量和方法。在 `NewClass` 中声明一个与从 `SuperClass` 继承的方法同名的方法，会覆盖继承的方法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n> **注意** 始终在 `@interface` 声明中声明父类，即使父类是 `NSObject`。\n\n`NSObject` 是 Cocoa 框架中的逻辑根类，功能上等同于\
  \ Java 的 `Object` 类。但它并不是 Objective-C 的根类。Objective-C 的实际根类 `Object` 过于原始，其直接子类基本上没什么用。你不太可能想要创建一个\
  \ `Object` 的直接子类。\n\n### 对象指针\n\n包含指向 Objective-C 对象的指针的变量称为对象指针（引用）或对象标识符。两者都等同于\
  \ Java 的对象引用。\n\n代码清单 3-2 显示了声明对象指针的两种方式。对象指针可以声明为指向特定类的指针，也可以声明为通用对象标识符（`id`）。两者都包含指向对象内存地址的指针。区别在于编译器如何处理它们。\n\
  \n**代码清单 3-2. 对象指针声明**\n\n```\nSpecificClass *specificObject;\nid anyObject;\n```\n\
  \n> **注意** 与 Java 一样，Objective-C 不允许变量包含对象的内容，只允许包含指向对象的指针（引用）。声明 `SpecificClass\
  \ object` 是无效的。这是 Objective-C 对象与 C 语言结构体不同的一个例子；变量可以包含整个 C 结构体或指向 C 结构体的指针，但只能声明指向\
  \ Objective-C 对象的指针。\n\n指向特定类的指针在大多数情况下类似于 Java 的对象引用。编译器假定该指针指向该类或其子类的对象。如果你尝试调用该类未定义或未继承的方法，编译器会发出警告。它只允许你访问该类定义或继承的实例变量。该指针隐式地与指向其任何父类的指针兼容，但与指向子类的指针不兼容。\n\
  \n特殊的对象标识符类型（`id`）是一种非特定的对象指针（引用）。它不等同于指向基类对象的指针，例如 `NSObject *obj`（`Object obj`）。编译器假定\
  \ `id` 类型的变量可以是任何类。编译器允许你调用任何已定义类中的任何方法。对象标识符可以赋值给任何类型的对象指针，也可以从任何类型的对象指针赋值，而不会产生编译器警告。你不能使用对象标识符直接访问对象的实例变量。\n\
  \n\n\n### 如果你把所有对象指针都声明为 `id` 类型\n\n如果你把所有对象指针都声明为 `id` 类型，编程风格将类似于某些脚本语言。编译器不做任何假设，允许你调用任何方法，并将指针赋值给任何其他对象指针变量，而不会报错。这些方法和赋值的恰当性将在运行时进行检验。\n\
  \n在另一个极端，如果你将每个引用都声明为指向特定类的指针，编程体验则类似于 Java。编译器只允许调用指针类中定义的方法，并会标记不当的赋值行为。唯一显著的区别是，在\
  \ Java 中，从一种类型强制转换为另一种类型会在运行时检查；而在 Objective-C 中，强制转换仅是简单地抑制编译器警告。\n\n实际应用中的 Objective-C\
  \ 是这两种极端的结合。当对象的类未知、可变或不确定时，会使用 `id` 类型。而在其他所有情况下，则使用强类型、特定类的指针。例如，`NSError` 对象包含一个\
  \ `recoveryAttempter` 对象引用。这个对象负责从错误中恢复。由于 `NSError` 不对其类做任何假设，这个变量的类型是 `id`。`id`\
  \ 类型允许在不进行强制转换的情况下设置、赋值或调用该属性值上的任何方法。另一方面，`NSError` 的 `domain` 和 `userInfo` 变量被声明为指向\
  \ `NSString`（字符串）和 `NSDictionary`（字典）对象的指针。这些变量存储何种类的对象以及它们实现了哪些方法，都不存在歧义。\n\n在运行时，所有指针类型在功能上都是相同的。编译后的代码不保留任何指针类型信息。在代码执行时，清单\
  \ 3-2 中声明的两个指针的行为将完全相同。\n\n### 发送消息\n\n方法调用语法是 Java 和 Objective-C 之间最显著的区别。一个方法调用由一个对象指针（引用）和要执行的方法名称组成，并用方括号括起来。清单\
  \ 3-3 中展示了一些示例。\n\n**清单 3-3\\. Objective-C 消息语法**\n\n- **Java**\n\n```java\nobject.method();\n\
  object.method(param);\n```\n\n- **Objective-C**\n\n```objectivec\n[object method];\n\
  [object methodWithParam:param];\n```\n\n与 Java 不同，Objective-C 不调用对象方法。它向对象发送消息。这不仅仅是语义上的差异。\n\
  \n当你调用方法时，Java 的工作方式与 C 或 C++ 非常相似。语句中的方法名称标识了要执行的方法。调用的参数连同返回地址一起被压入栈中。然后执行流转移到该方法。\n\
  \nObjective-C 调用方法时，首先将方法的参数压入栈中。然后，它调用一个中央分发函数，并将对象指针和一个称为选择器的紧凑型方法标识符传递给它。这个分发函数使用这两者来定位对象的方法，并将执行转移到该方法的代码。方法执行并返回，就像任何\
  \ C 或 Java 方法一样。\n\n这种差异可能看起来微不足道，甚至毫无意义，但它是 Objective-C 动态特性的关键，并且对于几个重要且独特的语言特性至关重要。当你阅读本书的各个章节时，这一点会变得更加明显。\n\
  \n为了强调这一概念，Objective-C 使用不同的语言来描述调用方法的过程。在 Objective-C 中，你向对象发送一条消息。调用对象是发送者，其方法被调用的对象是接收者。术语“接收者”在\
  \ Objective-C 中被广泛使用，尤其是在文档中（例如短语“……返回接收者中 Unicode 字符的数量”）。“方法”和“消息”这两个术语通常可以互换使用。\n\
  \n### 命名方法\n\nObjective-C 方法名称很冗长，由一个或多个自然描述每个参数的关键词组成。清单 3-4 展示了四个假设的 Objective-C\
  \ 方法，分别带有零个、一个、两个和三个参数。\n\n**清单 3-4\\. 命名参数**\n\n```objectivec\n-method;\n-methodWithParameter:parameter;\n\
  -methodWithContext:context object:object;\n-methodWithDialog:dialog message:message\
  \ behindWindow:window flags:mode;\n```\n\n清单 3-4 中的第一个 Objective-C 声明定义了一个不带参数的方法。这等同于\
  \ Java 的 `Object method()`。第二个声明定义了一个带一个参数的方法，等同于 `Object method( Object parameter\
  \ )`。\n\n冒号后面的标识符是参数变量的名称；这是你将在方法代码中用于引用该变量的变量名（例如，`dialog`、`message`、`window`、`mode`）。\n\
  \n参数变量的名称和构成方法名称的关键词位于不同的命名空间中。它们可以相同，也可以不同。在方法实现的主体中，只有参数变量名在作用域内。\n\n> **注意：**\
  \ 与 Java 一样，参数名与对象的实例变量在同一个作用域内。一个实例变量（例如，`cell`）和一个同名的参数变量会造成一些歧义。与 Java 一样，单独的符号名称始终引用参数或局部变量。`cell`\
  \ 实例变量则必须使用 `self->cell` 间接寻址。与 Java 不同，Objective-C 编译器会发出警告，提示“'cell' 的局部声明隐藏了实例变量”。为避免警告和任何可能的歧义，大多数\
  \ Objective-C 程序员会选择不与任何实例变量冲突的参数名称，例如使用 `aCell` 或 `newCell` 这样的名称，而不是仅仅使用 `cell`。\n\
  \n在 Objective-C 中命名方法是一门艺术。Objective-C 方法名称通常使用清单 3-5 中所示的形式之一构建。该清单显示了一些抽象的方法名称，后面跟着几个真实世界的例子。\n\
  \n**清单 3-5\\. 方法命名示例**\n\n- **简单操作：**\n  ```objectivec\n  -action;\n  -draw;\n \
  \ -play;\n  -becomeKeyWindow;\n  ```\n\n- **带参数的操作方法：**\n  ```objectivec\n  -actionParameter:param;\n\
  \  -drawCell:cell;\n  -sendEvent:event;\n  ```\n\n- **带多个参数的操作：**\n  ```objectivec\n\
  \  -actionParameter:firstParam secondParameter:secondParam;\n  -replaceSubview:oldView\
  \ with:newView;\n  -postNotificationName:name object:sender;\n  ```\n\n- **返回值的方法：**\n\
  \  ```objectivec\n  -value;\n  -key;\n  -window;\n  -stringByExpandingTildeInPath;\n\
  \  ```\n\n- **带参数并返回值的方法：**\n  ```objectivec\n  -valuePrepositionParameter:parameter;\n\
  \  -objectForKey:key;\n  -stringByAppendingString:string;\n  -numberFromString:string;\n\
  \  ```\n\n如果你牢记以下几点，阅读和发明你自己的方法名称就不会太困难。方法名称的通用形式以对返回值的描述（如果有）开头，然后是方法执行的操作，最后是对第一个参数（如果有）的描述。一个名为\
  \ `-menuForEvent:` 的方法可以合理地推测为接受一个 `NSEvent` 对象作为参数，并返回一个 `NSMenu` 对象。后续的关键词描述该参数，并且通常包含一个介词，例如“in”、“to”或“with”。参数的描述有时是隐含的，例如在\
  \ `-replaceSubview:oldView with:newView` 中。避免包含多余的动词，如“do”或“does”。\n\nObjective-C\
  \ 不像 Java 那样支持仅参数类型不同而方法名称相同的方法重载。但这实际上并无必要。如果两个 Objective-C 方法仅参数不同，它们将具有不同的名称：`-drawRect:rect`、`-drawCell:cell`、`-drawPage:page`，而不是\
  \ Java 中等价的重载函数 `draw( Rect rect )`、`draw( Cell cell )`、`draw( Page page )`。\n\n\
  没有一成不变的规则来命名方法。主要目标是可读性。\n\n\n\n"
- "# Objective-C 方法命名与特性\n\n### 方法命名的可读性\n\n**Objective-C** 方法名赋予了代码一种令人耳目一新的冗长性，使其更具自解释性。清单\
  \ 3-6 展示了两个将子串 `\"Walrus\"` 提取到字符数组中的代码片段。\n\n**清单 3-6. 方法命名示例**\n\n**Java**\n\n\
  ```java\nchar c[] = new char[20];\nString s = \"The time has come, the Walrus said\
  \ ...\";\ns.getChars(23,29,c,1);\n```\n\n**Objective-C**\n\n```objectivec\nunichar\
  \ c[20];\nNSString *s = @\"The time has come, the Walrus said ...\";\n[s getCharacters:&c[1]\
  \ range:NSMakeRange(23,6)];\n```\n\n代码短语 `getCharacters:&c[1] range:NSMakeRange(23,6)`\
  \ 比 `(23,29,c,1)` 更具描述性。很明显，第一个参数涉及字符，第二个参数是一个范围。\n\n这在参数较多的方法中尤为有用。当 **Objective-C**\
  \ 方法名变得异常长时，格式约定是将每个参数放在单独一行，并水平对齐冒号，如清单 3-7 所示。**Xcode** 编辑器以及其他支持 **Objective-C**\
  \ 的文本编辑器会自动执行此操作。\n\n**清单 3-7. 多行消息**\n\n```objectivec\nNSString *new = [s stringByReplacingOccurrencesOfString:@\"\
  Walrus\"\n                                          withString:@\"Carpenter\"\n\
  \                                             options:NSLiteralSearch\n        \
  \                                       range:NSMakeRange(20,10)];\n```\n\n### 参数和返回类型\n\
  \n与 **Java** 一样，**Objective-C** 方法可以向调用者返回单个值。到目前为止展示的方法都省略了返回类型和参数类型。这是为了专注于方法声明和命名的基础。参数和返回类型在方法名或参数变量名之前的圆括号中指定，非常类似于类型转换。清单\
  \ 3-8 展示了一些示例。\n\n**清单 3-8. 参数和返回类型**\n\n```objectivec\n- (id)objectForKey:(id)aKey\n\
  - (NSMenuItem*)itemWithTag:(NSInteger)aTag;\n- (unichar)characterAtIndex:(NSUInteger)index;\n\
  - (NSString*)stringByAddingPercentEscapesUsingEncoding:(NSStringEncoding)encoding;\n\
  - (void)runInNewThread;\n- (void)addAttribute:(NSString*)name value:(id)value range:(NSRange)aRange;\n\
  ```\n\n如果省略类型，则默认为非特定对象标识符类型（`id`）。声明 `-objectForKey:key` 和 `-(id)objectForKey:(id)key`\
  \ 是相同的。为了清晰起见，**Objective-C** 程序员始终指定所有参数和返回值的类型，即使类型是 `id`。\n\n参数类型可以是任何有效的 **C**\
  \ 或 **Objective-C** 变量类型。通常是简单类型，如数字基本类型（`int`）、对象指针（`id` 或 `NSColumn*`）或小型结构体（`NSPoint`）。方法参数和返回值始终通过拷贝传递，因此任何可以使用赋值运算符（`=`）赋值的类型都可以作为参数传递。如前所述，**Objective-C**\
  \ 不允许声明变量为 **Objective-C** 对象——只能声明指向 **Objective-C** 对象的指针。因此，不能传递 **Objective-C**\
  \ 对象的副本作为参数，只能传递指向该对象的指针（引用）的副本。因此，不能声明方法 `-(NSString)description`，但可以声明方法 `-(NSString*)description`。\n\
  \n除了有效的变量类型外，方法的返回类型也可以是 `(void)`，表示它不返回任何值。如果尝试使用 `void` 方法的返回值，编译器会发出警告。如果尝试从\
  \ `void` 方法返回值，或者未能从非 `void` 方法返回值，编译器也会发出警告。\n\n### 方法选择器\n\n一个 **Objective-C**\
  \ 方法的完整名称（不含参数变量名和任何类型）构成了其唯一标识符。方法 `-(NSFont*)fontWithFamily:(NSString*)family\
  \ traits:(NSFontTraitMask)fontTraitMask weight:(NSInteger)weight size:(CGFloat)size`\
  \ 的标识符是 `fontWithFamily:traits:weight:size:`。这相当于 **Java** 中的方法签名。该标识符的具体体现是一个称为\
  \ **选择器（selector）** 的数值常量。选择器是类型 `SEL` 的值。\n\n**Objective-C** 指令 `@selector()` 返回括号内方法标识符的选择器值，例如\
  \ `SEL selector = @selector(fontWithFamily:traits:weight:size:)`。\n\n> **注意**：人们很容易将方法名中的关键字视为参数名，但这在技术上并不准确。与具有命名参数的语言不同，**Objective-C**\
  \ 方法的参数不能省略或重新排列。方法 `-sendMessage:toRecipient:withAttachement:` 和 `-sendMessage:withAttachement:toRecipient:`\
  \ 是具有唯一签名的不同方法。\n\n选择器在内部用于向对象分发消息。它们可以在编程中用于发送消息、注册消息、执行内省以及后续章节描述的其他技巧。\n\n在文档和程序员之间的交流中，方法名通常像调用一样书写，包括类名和方法标识符。程序员在引用\
  \ `NSFontManager` 类定义的实例方法 `fontWithFamily:traits:weight:size:` 时，可能会写成 `-[NSFontManager\
  \ fontWithFamily:traits:weight:size:]`。这是无意义的代码，但简洁地描述了该方法。\n\n### 实例变量\n\n实例变量在类的\
  \ `@interface` 指令中声明，如清单 3-1 所示。这与 **Java** 几乎相同，唯一的微小限制是所有实例变量声明必须组合在一个单独的块中。与\
  \ **Java** 一样，实例方法访问实例变量就像访问局部变量一样。\n\n> **注意**：实例变量和方法名称传统上使用“驼峰命名法”——它们以小写字母开头，并使用大写字母分隔单词。以\
  \ `_`（下划线）开头的实例变量和方法名称由 **Cocoa** 框架保留，应避免使用。\n\n你也看到了如何使用间接成员运算符直接访问另一个对象中的成员变量，例如\
  \ `object->value = 1`（实际上应写为 `object->value = 1`，而非 `object.value = 1`，后者是 **Java**\
  \ 语法）。在 **Java** 中通常不会这样做。良好的 **Java** 实践鼓励使用访问器（getter）和修改器（setter）方法，以将变量的实现与外部代码隔离。实例变量应声明为\
  \ `protected` 或 `private`，并使用 `int getValue()` 和 `void setValue( int value )` 方法来获取和设置其值。\n\
  \n良好的 **Objective-C** 实践遵循与 **Java** 相同的原则，原因与 **Java** 相同，甚至更多。在 **Objective-C**\
  \ 中，实例变量 `int value` 可通过 `-(int)value` 和 `-(void)setValue:(int)newValue` 方法访问。**Objective-C**\
  \ 非常鼓励使用访问器方法，以至于访问器方法的定义和构造已以内置属性的形式融入语言中。如何声明属性将在关于 `isa` 变量的章节之后立即描述。\n\n> **注意**：**Objective-C**\
  \ 使用名称 `value` 和 `setValue` 作为获取和设置属性值的方法，而不是 **Java** 中更常见的 `getValue` 和 `setValue`。使用内省通过访问器方法识别属性的技术通常接受\
  \ `getValue` 形式作为替代，但首选 `value` 形式作为 getter。\n\n### `isa`\n\n**Objective-C** 中的每个对象都继承了一个\
  \ `isa` 实例变量；`isa` 字面上定义了对象的类。\n\n\n\n### 属性\n\n在运行时，每个类都有且只有一个`Class`对象的实例。`Class`对象定义了该类所有实例的行为。该类中的每个实例都通过其`isa`变量引用其所属的`Class`对象。\n\
  \n你不应直接访问对象的`isa`变量。若要获取对象的`Class`，`-(Class)class`方法会返回它。你还可以使用`-(NSString*)className`方法：该方法以字符串形式返回对象所属类的名称。\n\
  \n某些技术会修改对象的`isa`变量（这种技术称为“isa 混写”）以动态改变该对象的行为。在未清晰且深入理解 Objective-C 运行时架构之前，切勿自行更改对象`isa`变量的值。\n\
  \n### 属性\n\nObjective-C 2.0 新增了`@property`和`@synthesize`关键字，用于定义对象属性并实现其对应的访问器方法。属性是一种通过访问器方法获取、通过设值器方法设置的值。属性的值通常存储在实例变量中，但这并非必需。\n\
  \n`@property`指令用于声明类的属性。`@property`指令通常出现在`@interface`指令中。它既不会实现访问器方法，也不会创建任何实例变量。它仅仅是一个承诺，表明该类实现了该属性。清单\
  \ 3-9 展示了分别用 Java 和 Objective-C 编写的`Person`类。该类定义了五个属性：`tag`、`firstName`、`lastName`、`fullName`和`adult`。\n\
  \n### 清单 3-9\\. 属性声明\n\n**Java**\n\n```java\npublic class Person\n{\n    int tag;\n\
  \    String firstName;\n    String secondName;\n    boolean adult;\n\n    synchronized\
  \ int getTag()\n    {\n        return (tag);\n    }\n\n    synchronized void setTag(\
  \ int tag )\n    {\n        this.tag = tag;\n    }\n\n    public synchronized String\
  \ getFirstName()\n    {\n        return firstName;\n    }\n\n    public synchronized\
  \ void setFirstName( String firstName )\n    {\n        this.firstName = firstName;\n\
  \    }\n\n    public synchronized String getLastName()\n    {\n        return secondName;\n\
  \    }\n\n    public synchronized void setLastName( String lastName )\n    {\n \
  \       secondName = lastName;\n    }\n\n    public synchronized boolean isAdult()\n\
  \    {\n        return adult;\n    }\n\n    public synchronized void setAdult( boolean\
  \ adult )\n    {\n        this.adult = adult;\n    }\n\n    public String getFullName()\n\
  \    {\n        return (firstName+\" \"+secondName);\n    }\n}\n```\n\n**Objective-C**\n\
  \n```objectivec\n@interface Person : NSObject {\n    int tag;\n    NSString *firstName;\n\
  \    NSString *secondName;\n    BOOL adult;\n}\n\n@property int tag;\n@property\
  \ (copy) NSString *firstName;\n@property (copy) NSString *lastName;\n@property (getter=isAdult)\
  \ BOOL adult;\n@property (readonly,nonatomic) NSString *fullName;\n\n@end\n\n@implementation\
  \ Person\n\n@synthesize tag;\n@synthesize firstName;\n@synthesize lastName = secondName;\n\
  @synthesize adult;\n\n- (NSString *)fullName\n{\n    return ([NSString stringWithFormat:@\"\
  %@ %@\",firstName,secondName]);\n}\n\n@end\n```\n\n`@synthesize`指令出现在类的`@implementation`中。`@synthesize`指令会告诉编译器生成实现属性所需的访问器和设值器方法。\n\
  \n如果缺少`@synthesize`指令，则需要由程序员来实现满足`@property`指令中声明的约定的方法。如果既未包含`@synthesize`指令，也未实现预期的访问器方法，则视为错误。\n\
  \n> **注意：** 特殊的`@dynamic`指令可以抑制编译器对所需访问器方法的预期。在某些情况下（例如，类扩展、分类、子类化、动态加载的框架），类可能在运行时实现编译器未知的方法。`@dynamic`指令告知编译器无需为此担心；程序员承诺程序执行时预期的方法将会存在。很少使用`@dynamic`。\n\
  \n前两个属性较为简单。`@property int tag`声明了`Person`类实现了满足名为`tag`的整型属性契约的 getter 和 setter\
  \ 方法。\n\n\n\n"
- "# 第三章：欢迎使用 Objective-C\n\n`@synthesize` 标签指令会指示编译器为你生成 `-(int)tag` 和 `-(void)setTag:(int)newTag`\
  \ 方法。`tag` 属性将存储在同名的实例变量中。\n\n第二个属性声明与之类似，但由于该属性是一个对象，我们必须包含一个属性特性来阐明如何处理赋值操作。`copy`\
  \ 特性会使合成后的设置器创建并存储传递给它的对象副本（而非存储对该对象的引用）。与 `tag` 类似，`firstName` 属性的值将存储在 `firstName`\
  \ 实例变量中。\n\n第三个 `@property` 指令与第二个相同，只是属性名称与任何已声明的实例变量都不对应。这对 `@property` 指令无关紧要；该语句仅承诺该类将实现该属性，而不承诺如何实现。`@synthesize\
  \ lastName = secondName` 指令使用 `secondName` 实例变量来存储，并为 `lastName` 属性实现所需的 getter\
  \ 和 setter 方法。获取 `lastName` 属性会返回 `secondName` 变量；设置 `lastName` 属性会用传递给 `-setLastName:`\
  \ 的值的副本替换 `secondName` 变量。\n\n> **提示：** 如果你更喜欢极其紧凑的代码，清单 3-9 中的四条 `@synthesize`\
  \ 指令本可以写成 `@synthesize tag, firstName, lastName=secondName, adult`。\n\n`@property\
  \ (getter=isAdult) BOOL adult` 指令声明了一个名为 `adult` 的布尔属性。`getter=` 特性将 getter 方法重命名为\
  \ `-(BOOL)isAdult`，而不是默认的 `-(BOOL)adult`。与 Java 中一样，布尔属性的 getter 方法传统上以“is”或“has”开头。\n\
  \n最后一个 `@property (readonly,nonatomic) NSString *fullName` 指令声明 `Person` 对象提供了一个名为\
  \ `fullName` 的字符串属性。该属性是只读的（它有 getter 方法但没有 setter 方法），并且 getter 方法不是线程安全的。在该类的\
  \ `@implementation` 部分中没有针对 `fullName` 的 `@synthesize` 指令。所需的 getter 方法由程序员实现。\n\
  \n> **警告：** 在实现访问器方法以满足 `@property` 指令时，程序员有责任履行声明中隐含的契约。如果你省略了 `nonatomic` 特性，则需要你自行确保这些方法是线程安全的。如果指定了\
  \ `copy` 特性，setter 方法应创建并存储值的副本，而不是指向值的引用（除非你能保证该值是不可变的）。\n\n#### 属性特性\n\n清单 3-9\
  \ 中的示例展示了属性定义中使用的一些常见特性。表 3-1 描述了所有可以包含在 `@property` 指令中的属性特性。多个特性之间用逗号分隔。\n\n**表\
  \ 3-1. 属性特性**\n\n| 属性特性 | 描述 |\n| --- | --- |\n| `readonly` | 声明该属性是不可变的。针对 `readonly`\
  \ 属性的 `@synthesize` 指令将生成一个 getter 方法，但不会生成 setter 方法。`readonly` 与 `readwrite` 互斥。\
  \ |\n| `readwrite` | 声明该属性是可变的。这是默认的可变性特性。如果既未指定 `readonly` 也未指定 `readwrite`，则假定为\
  \ `readwrite`。`readwrite` 与 `readonly` 互斥。 |\n| `copy` | 声明 setter 方法会创建传递给它的对象的副本，并存储对该副本的引用，而不是对原始对象的引用。此特性仅适用于对象指针属性——原始值总是通过复制传递。`copy`\
  \ 与 `assign` 和 `retain` 互斥。当用于设置属性的对象可能可变，且你不希望因原始对象被修改而导致接收者属性的值发生变化时，请使用 `copy`。\
  \ |\n| `assign` | 声明 setter 方法通过保留指向传递给它的对象的指针来设置属性。实际上，这意味着 getter 和 setter 方法是通过简单的赋值来实现的（例如，`self->firstName\
  \ = name`）。在垃圾回收环境中，当你希望保留对原始对象值的引用，或者对象值始终是不可变时，请使用 `assign`。如果未指定存储特性，通常假定为 `assign`，但在某些环境中，你必须显式包含\
  \ `assign`、`copy` 或 `retain`。`assign` 与 `copy` 和 `retain` 互斥，并且仅适用于对象指针属性。 |\n|\
  \ `retain` | 此特性类似于 `assign`，但在托管内存（非垃圾回收）环境中会保留对对象的引用。有关非 GC 内存管理的信息，请参考第 4 部分。\
  \ |\n| `getter=名称` | 重命名用作 getter 方法的方法。当需要默认 getter 方法名称的替代形式（例如 `-isValue` 或 `-getValue`）时非常有用。请谨慎使用此特性；它可能会破坏\
  \ getter 和 setter 名称的标准模式，导致键值编码等技术无法识别该属性。 |\n| `setter=名称` | 重命名用于 setter 方法的方法。如果指定了\
  \ `readonly` 特性，则不能使用。适用于 `getter=` 的相同警告也适用于 `setter=`。 |\n| `nonatomic` | 声明 getter\
  \ 和 setter 方法不是线程安全的。不存在“atomic”特性；省略 `nonatomic` 意味着该属性是原子的。如果省略，`@synthesize`\
  \ 可能会用代码包裹 getter 和 setter 方法，这些代码首先获取对象特定的锁，以确保访问器方法在多线程环境中行为良好。它还能确保返回的对象在执行线程的内存空间中是完全实现的。当你手动编写的访问器方法不提供这些安全保障，或不希望采取此类预防措施时，请使用\
  \ `nonatomic`。线程安全特性会给访问器方法增加相当大的运行时开销，这可能会影响性能。在某些平台上，对于原始标量属性和 `assign` 对象属性存在例外情况，因为处理器保证了原子赋值。\
  \ |\n\n与 Java 相比，`copy` 特性更适用于字符串和集合对象。在 Objective-C 中，字符串和集合类具有可变子类。因此，`NSString`\
  \ 不能像 Java 的 `String` 对象那样保证是不可变的。制作副本可以确保属性不会受到用于设置属性的原始对象更改的影响。\n\n#### 重写属性\n\
  \n属性是通过在接收者中获取和设置值的访问器方法实现的。由于它们是使用方法实现的，子类可以重写这些方法，本质上就是重写属性。\n\n非正式或正式地重写属性的访问器方法都是可以的。要非正式地重写，只需重写相应的访问器方法即可。要重写由\
  \ `@property int tag` 隐含的 setter 方法，只需在子类中实现一个新的 `-(void)setTag:(int)newTag` 方法。甚至不必在子类的\
  \ `@interface` 中声明它。\n\n要正式地重写属性，请在子类中声明一个重复的 `@property` 指令。`@property` 指令必须与父类中的完全相同，但有一个例外：当父类的属性是\
  \ `readonly` 时，子类可以将其声明为 `readwrite`。这支持了不可变父类的可变子类的设计模式。一旦声明，就可以使用 `@synthesize`\
  \ 指令为子类重新实现访问器方法，或者你也可以自己实现它们。\n\n\n\n### 格式规范说明\n\n本文档遵循标准 Markdown 语法，对原文进行了排版优化：调整了标题层级、删除了多余空行、保留了核心内容，并对代码、变量、类名等元素添加了反引号。代码块使用三个反引号包裹。\n\
  \n---\n\n### 提示\n这是 `@dynamic` 指令的一个实际应用。由于父类已经实现了属性的访问器方法，子类可以重新声明该属性，并使用 `@dynamic`\
  \ 指令来忽略重新实现两个访问器方法的要求，然后仅重写 `getter` 或 `setter` 方法。\n\n### 访问属性\n\n属性的访问器方法可以像其他任何方法一样被调用。但正式声明的属性还有一个额外的好处。Objective-C\
  \ 2.0 扩展了成员变量运算符（`.`），以允许轻松访问正式定义的属性。这种所谓的“点语法”让你能够像在 Java 中访问成员变量一样，与对象的属性进行交互。\n\
  \n使用清单 3-9 中定义的类，清单 3-10 中的代码设置并访问了一个 `Person` 对象的多个属性。编译器会将点语法扩展为调用每个属性对应的 `getter`\
  \ 或 `setter` 方法；而不是像 Java 那样直接访问对象的实例变量。这被视为“语法糖”，旨在提高可读性并减少杂乱。清单 3-10 生成的代码与清单\
  \ 3-11 所示的代码完全相同。\n\n**清单 3-10. 通过点语法访问对象属性**\n\n```objectivec\nPerson *person =\
  \ ...;\n\nperson.firstName = @\"James\";\n\nif (person.lastName.length==0)\n\nperson.lastName\
  \ = @\"Smith\";\n\nperson.tag += 3;\n```\n\n> [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 3 章 ■ 欢迎来到 Objective-C**\n\n**清单 3-11. 点语法的等效代码**\n\n```objectivec\nPerson\
  \ *person = ...;\n\n[person setFirstName:@\"James\"];\n\nif ([[person lastName]\
  \ length]==0)\n\n[person setLastName:@\"Smith\"];\n\n[person setTag:[person tag]+3];\n\
  ```\n\n### 作用域\n\n我先说一个坏消息：Objective-C 中没有包的概念。所有类名、C 函数和全局变量共享一个名称空间。类内部的实例变量由该类封装，并且\
  \ Objective-C 确实提供了对其作用域的控制。Objective-C 不限制对类方法的访问，但有一些实用的方法可以模拟你在 Java 中享受的那种访问限制。\n\
  \n#### 类名作用域\n\n类名都是公开的，并且存在于同一个全局可访问的名称空间中。为了避免命名冲突，Objective-C 开发者采用了一种命名约定，以便类能够与其他类共存。逻辑组中的类都以通用的两个字符缩写开头。在\
  \ Apple 的框架中，所有 Core Image 类都以 `CI` 开头（`CIColor`、`CIFilterShape`、`CIVector`……）。QuickTime\
  \ 的类以 `QT` 开头（`QTTrack`、`QTMovie`、`QTTimeValue`……）。\n\n> **注意** 如果你好奇的话，Cocoa 基础类中出现的\
  \ `NS` 前缀代表 NextStep。NextStep 是由 NeXT Computer 开发的 Objective-C 操作系统。当 Apple 在 1996\
  \ 年收购 NeXT 时，将 NextStep 采用为新兴 Mac OS X 的核心技术。在乔治·奥威尔会钦佩的壮举中，几乎所有对 NeXT 和 NextStep\
  \ 的引用都从 Mac OS X 的源代码和文档中被删除了。但是要重命名这个庞大框架中的每一个类几乎是不可能的，因此遗留的 `NS` 前缀一直沿用至今。\n\n\
  由第三方开发的类遵循同样的约定。OmniGroup 提供了一套广泛的应用程序类供其他开发者使用。`OmniAppKit` 类都以 `OA` 开头（`OAController`、`OAUtilities`、`OAScriptMenuItem`……）。`OmniNetworking`\
  \ 类都以 `ON` 开头（`ONHost`、`ONPortAddress`……）。\n\n在你自己的开发中，需要考虑你所创建类的作用域。如果该类仅在你的应用程序开发环境中使用，则无需担心前缀。给你的类起简单的名字，比如\
  \ `Student`、`BoardGame`、`Troll` 等。如果你正在开发供其他程序员使用的类，即使仅限于组织内部，也要选择一个可能唯一的前缀，并相应地命名你的类。如果你的公司是\
  \ Widget Makers，你可以将类命名为 `WMToy`、`WMAlarm` 等。你也不必现在就做出决定。Xcode IDE 包含重构工具，使得重命名类相对容易。\n\
  \n> [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 3 章 ■ 欢迎来到 Objective-C**\n\
  \n#### 实例变量作用域\n\n对实例变量的访问控制方式与 Java 相同，并且很方便地使用了相同的术语。Objective-C 没有单独指定每个变量的作用域，而是采用了\
  \ C++ 风格的作用域指令。在 `@interface` 指令的实例变量块中，可以在任何变量声明之前使用 `@public`、`@protected` 和 `@private`\
  \ 指令。在某个作用域指令之后声明的所有变量都继承指定的可见性。清单 3-12 显示了四个具有不同可见性级别的实例变量。\n\n**清单 3-12. 实例变量作用域**\n\
  \n```objectivec\n@interface Toy : NSObject {\n\nNSString *name;\n\n@public\n\nint\
  \ starRating;\n\n@protected\n\nNSRange recommendedAge;\n\nint playCount;\n\n@private\n\
  \nNSSet *toyBox;\n\n}\n\n@end\n```\n\n变量 `starRating` 是公开的。它可以被任何上下文中的任何代码访问。\n\n\
  变量 `name`、`recommendedAge` 和 `playCount` 的作用域是受保护的。定义在此类或其任何子类中的方法可以直接访问这些变量。`@protected`\
  \ 是实例变量的默认作用域。在第一个作用域指令之前或没有任何作用域指令的情况下定义的变量都是受保护的。\n\n变量 `toyBox` 是私有的。它只能被此类中定义的方法访问。\n\
  \n请记住，Objective-C 的变量作用域仅仅是阻止对实例变量的访问。如果你尝试在无权访问的上下文中使用成员变量，编译器会报错。仍然可以通过内省或强制转换指针来访问这些变量——Objective-C\
  \ 没有 Java 意义上的“安全性”。此外，变量名称在技术上并不像 Java 那样在类的名称空间内进行作用域限定。`toyBox` 实例变量对于 `Toy`\
  \ 类的所有子类都存在。`Toy` 的子类不能声明自己的实例变量 `toyBox`；编译器会发出重复成员的错误。\n\n#### 方法作用域\n\n方法始终是公开的，就\
  \ Java 意义上的公开而言。Objective-C 对谁可以调用指向该对象的方法没有运行时限制。虽然没有明确的方法来限制方法被调用，但有几种技术可以隐藏方法，以阻止在其预期作用域之外使用。\n\
  \n最简单的技术是将方法包含在 `@implementation` 部分，但从 `@interface` 指令中省略方法原型。其他 `#import` 该类接口的模块将不知道该方法的存在，如果尝试发送该消息，编译器会报错。\n\
  \n这种技术之所以有效，是因为 `@implementation` 部分中的方法隐含了自身的原型。一旦方法出现在实现中，编译器就知道该方法，并允许你像在类的接口中预定义它一样调用它。这种技术是随意且简单的。它最大的缺点是所有未声明的方法必须在被引用之前定义。这可能会使源代码组织变得尴尬。在某些递归情况下，这使得它不可能实现。\n\
  \n> [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 3 章 ■ 欢迎来到 Objective-C**\n\
  \n\n\n#### 类似的技术也适用于 `@property` 指令。\n\n之前我谨慎地提到“一个`@property`指令通常出现在`@interface`指令中”。`@property`指令也可以出现在`@implementation`中。其含义相同，但从`@interface`中省略它也会对其他模块隐藏该定义。\n\
  \nObjective-C 的类别和扩展是细分类声明的更正式模式，允许你将关于类的知识进行分类整理。这些技术以及如何利用它们来模拟 Java 的 private\
  \ 和 protected 方法，将在后续章节中解释。\n\n最后，创建一个“辅助”类有时也很有用——这种类的目的完全服务于另一个类的内部实现。一个辅助类可以在使用它的类的实现文件中完全声明和实现。辅助类的接口和实现对外部类都是隐藏的。如果该类需要一个指向辅助对象的实例变量，请使用一个`@class`指令（接下来会介绍）或\
  \ `id` 类型。\n\n#### 前向 `@class` 指令\n\n`@class` 指令声明了一个类名，而没有定义该类。它允许你声明一个对类的引用，而无需编译该类的`@interface`。在\
  \ `@class` 指令之后，你可以引用这个类，但不能编译任何假设了解该类信息的代码——因为编译器对此一无所知。在该类的实际 `@interface` 指令被编译之前，你无法向该类的对象发送消息，也无法访问它的任何属性。\n\
  \n一旦你开始声明指向对象的指针变量，你就会发现编译器要求这些类先被定义，然后才允许你在语句中使用该类名。很自然的倾向是为你 `@interface` 指令中引用的每个对象\
  \ `#import` 所需的类头文件。对于较小的项目来说，这没问题。\n\n对于大型项目，这会给编译器带来负担（翻译过来就是：它会拖慢你的开发速度）。每个使用类\
  \ A 的类都会导入其接口（`#import \"A.h\"`）。如果类 A 拥有指向类 B、C、D 对象的实例变量，它就会导入所有这些头文件。如果类 B、C、D\
  \ 又共同包含了对类 E 到 N 的引用，它们的头文件就会导入所有这些头文件，依此类推。随着项目复杂度的增长，编译每个模块所需的工作量也会呈几何级数增长。\n\n\
  `@class` 指令可以显著减轻这一负担。一个 `@interface` 指令通常只需要知道一个被引用的类存在即可。`@class` 指令的一个典型应用如代码清单\
  \ 3-13 所示。\n\n**代码清单 3-13.** 前向 `@class` 指令\n\n```\n#import \"Vehicle.h\"\n\n@class\
  \ Engine;\n@class MoonRoof;\n@class Radio;\n\n@interface Car : Vehicle {\n    Engine\
  \ *engine;\n    MoonRoof *moonRoof;\n    Radio *radio;\n}\n\n- (void)startEngine;\n\
  - (void)stopEngine;\n- (void)tuneRadio;\n\n@end\n```\n\n`Car` 类包含了指向 `Engine`、`MoonRoof`\
  \ 和 `Radio` 对象的引用。一个导入了此 `@interface` 的模块可以使用 `Car` 的方法和属性，但对其他对象一无所知。`Car` 的 `@implementation`（大概会使用到这些其他对象）则以导入这些类的完整定义开始。\n\
  \n作为规则，我会 `#import` 父类、所有公共对象的类以及方法返回的对象类（假设调用者会使用返回的对象）的头文件。`@interface` 中所有剩下的类都使用\
  \ `@class` 声明。\n\n`@class` 指令也使得声明具有循环引用的类成为可能。换句话说，类 A 引用了类 B，而类 B 又引用了类 A。\n\n\
  #### `self` 和 `super`\n\nObjective-C 方法有两个预定义的变量用于引用自身：`self`（this）和 `super`（super）。它们的工作原理与\
  \ Java 中的对应物完全相同，如代码清单 3-14 所示。\n\n**代码清单 3-14.** `self` 和 `super` 的使用\n\n```\n\
  #import \"Person.h\"\n\n@interface Voter : Person {\n}\n\n- (void)setAdult:(BOOL)isAdult;\n\
  \n@end\n\n@implementation Voter\n\n- (void)setAdult:(BOOL)isAdult\n{\n    if (isAdult\
  \ && !self.isAdult)\n        [VoterRegistration registerVoter:self];\n    [super\
  \ setAdult:isAdult];\n}\n\n@end\n```\n\n`self` 变量始终是指向接收者（其方法被调用的那个对象）的指针。`self`\
  \ 变量的类型是指向实现了该方法的类的指针。它可用于访问该类定义或继承的实例变量（例如 `self->secondName`），但不能访问子类的变量（即使对象的实际类是子类）。\n\
  \n> **注意** Java 程序员最初可能会觉得这很奇怪，但 `self` 是一个可修改的自动变量，可以在方法体中重新赋值。我稍后会解释为什么需要这样做。现在，只需要注意不要无意中更改它即可。\n\
  \n语句 `[self method]` 向自身发送一个消息。等效的 Java 语句是 `this.method()` 或仅仅是 `method()`。伪变量\
  \ `super` 与 `self` 相同，但其唯一实际用途是发送消息。语句 `[super method]` 调用由对象父类定义的方法，等效于 Java 语句\
  \ `super.method()`。\n\n### 类方法\n\n到目前为止，我们只为类定义了实例方法。回顾一下，实例方法以减号（`-`）前缀声明。它定义了该类实例将响应的消息。\n\
  \n以加号（`+`）开头的方法名定义了一个类方法。正如在 `isa` 部分所述，每个类在运行时创建了一个单一的 Class 对象，该对象定义了该类所有实例的身份和行为。类方法定义了该单一\
  \ Class 对象将响应的消息。类方法（从技术上讲）并不等同于 Java 中的静态方法，尽管它们倾向于扮演相同的角色。\n\n在表达式中使用类名时，它求值为该类的单例\
  \ Class 对象。要调用一个类方法，请使用类名作为接收者，如代码清单 3-15 所示。使用类名会将消息发送给该类的 Class 对象。\n\n**代码清单\
  \ 3-15.** 类方法和实例方法的调用\n\n```\n@interface RandomSequence : NSObject {\n    long long\
  \ int seed;\n}\n\n+ (NSNumber *)number;\n+ (NSString *)string;\n\n- (NSNumber *)nextNumber;\n\
  - (NSString *)string;\n\n@end\n\n...\n\nNSNumber *n = [RandomSequence number];\n\
  NSString *s = [RandomSequence string];\n\nRandomSequence *r = ...;\nn = [r nextNumber];\n\
  s = [r string];\n```\n\n> **注意** 按照惯例，类方法首先定义，随后是实例方法。\n\n方法 `+(NSNumber*)number`\
  \ 定义了一个返回 `NSNumber` 对象的类方法。语句 `[RandomSequence number]` 将消息 `number` 发送给定义 `RandomSequence`\
  \ 类的单一 Class 对象。\n\n一个 `string` 方法同时为 Class 对象和类的实例定义了。语句 `[RandomSequence string]`\
  \ 将消息 `string` 发送给 Class 对象，并执行 `+(NString*)string` 中的代码。语句 `[r string]` 将消息 `string`\
  \ 发送给 `RandomSequence` 类的一个实例，并执行 `-(NSString*)string` 中的代码。这里没有歧义或命名冲突，因为 `-string`\
  \ 和 `+string` 是为不同对象实现的。\n\n\n\n"
- "# Objective-C 中的类方法与对象构造\n\n在 `+(NSNumber*)number` 方法体中，`self` 变量指向类对象（`RandomSignature`）。这正是\
  \ Java 类方法和 Objective-C 类方法的不同之处。在 Java 中，类方法没有对象上下文（没有 `this` 变量）。而在 Objective-C\
  \ 中，类消息发送给类对象的方式与发送给普通对象相同。`+(NSNumber*)number` 方法体中的 `[self string]` 语句会调用类方法 `+(NSString*)string`，而不是实例方法\
  \ `-(NSString*)string`。与 Java 静态方法真正等价的是 C 函数。\n\n这一区别对于继承至关重要。类对象继承类方法的方式与实例方法继承相同。如果类\
  \ `B` 是类 `A` 的子类，且类 `A` 定义了一个类方法，则类 `B` 会继承该类方法。类 `B` 也可以重写该类方法。代码清单 3-16 展示了这种关系。\n\
  \n**代码清单 3-16. 类方法继承**\n\n```objectivec\n@interface Classy : NSObject\n\n+ (void)greeting;\n\
  + (NSString*)salutation;\n\n@end\n\n@implementation Classy\n\n+ (void)greeting\n\
  {\n    NSLog(@\"%@, world!\",[self salutation]);\n}\n\n+ (NSString*)salutation\n\
  {\n    return (@\"Greetings\");\n}\n\n@end\n\n@interface Classic : Classy\n\n+ (NSString*)salutation;\n\
  \n@end\n\n@implementation Classic\n\n+ (NSString*)salutation\n{\n    return (@\"\
  Hello\");\n}\n\n@end\n\n...\n\n[Classy greeting];   // 输出 \"Greetings, world!\"\n\
  [Classic greeting];  // 输出 \"Hello, world!\"\n```\n\n语句 `[Classy greeting]` 将 `greeting`\
  \ 消息发送给 `Classy` 类对象。该方法向自身发送 `salutation` 消息，并用返回值构建日志消息 \"Greetings, world!\"\
  。\n\n语句 `[Classic greeting]` 将 `greeting` 消息发送给 `Classic` 类对象。`Classic` 并未定义类方法\
  \ `+(void)greeting`，但它从 `Classy` 继承了一个。当在此上下文中执行 `+(void)greeting` 时，`self` 变量指向的是\
  \ `Classic`，而非 `Classy`。向 `self` 发送 `salutation` 消息会调用 `Classic` 重写的 `-(NSString*)salutation`\
  \ 方法，因此记录的日志消息是 \"Hello, world!\"。\n\n> **注意：** 如果代码清单 3-16 中的语句是 `NSLog(@\"%@,\
  \ world!\",[Classy salutation])` 而非 `NSLog(@\"%@, world!\",[self salutation])`，那么消息将始终是\
  \ \"Greetings, world!\"。这是因为 `Classy` 是一个常量，始终指向唯一的 `Classy` 类对象，而 `self` 则指向接收\
  \ `greeting` 消息的类对象。\n\n尽管存在细微的技术差异，但 Objective-C 中的类方法被用于许多与 Java 静态方法相同的用途。返回单例对象的方法、工厂方法、对象池以及便捷工具都是类方法的常见用途。\n\
  \n### 构造对象\n\n你可能以为我会在本章更早的地方解释实例化对象的语法，而不是让你费力阅读实例变量、关于 `self` 变量的解释以及类方法。我没有这样做的原因很简单：实例化对象并没有专门的语法。\n\
  \n秉承其极简主义哲学，Objective-C 让类设计者自行决定如何创建和初始化对象。在 Cocoa 框架中，这是通过工厂类方法和一些编写初始化器（构造器）方法的惯例组合来实现的。\n\
  \n> **注意：** 你会反复看到这种极简模式。Java 定义了特定的语法并强制执行预定义的规则，用于对象的创建、序列化、复制等操作。相比之下，Objective-C\
  \ 只提供最基础的内容，将实现决策留给类设计者。你不能在 Java 中改变对象创建的方式，但在 Objective-C 中可以。你可能不需要经常这样做，但确实能够产生巨大效果。\n\
  \n创建对象是一个两步过程。首先，为对象结构分配内存。然后实例被初始化。代码清单 3-17 展示了 `RandomSequence` 类的重写版本，包含两个初始化器（构造器）。\n\
  \n**代码清单 3-17. 对象初始化**\n\n**Java**\n\n```java\npublic class RandomSequence\n{\n\
  \    long seed;\n\n    public RandomSequence()\n    {\n        seed = 1;\n    }\n\
  \n    public RandomSequence( long startingSeed )\n    {\n        seed = startingSeed;\n\
  \    }\n}\n\n...\n\nRandomSequence r1 = new RandomSequence();\nRandomSequence r2\
  \ = new RandomSequence(-43);\n```\n\n**Objective-C**\n\n```objectivec\n@interface\
  \ RandomSequence : NSObject {\n    long long seed;\n}\n\n- (id)init;\n- (id)initWithSeed:(long\
  \ long)startingSeed;\n\n@end\n\n@implementation RandomSequence\n\n- (id)init\n{\n\
  \    self = [super init];\n    if (self != nil) {\n        seed = 1; // 默认种子\n \
  \   }\n    return (self);\n}\n\n- (id)initWithSeed:(long long)startingSeed\n{\n\
  \    self = [super init];\n    if (self != nil) {\n        seed = startingSeed;\n\
  \    }\n    return (self);\n}\n\n@end\n\n...\n\nRandomSequence *r1 = [[RandomSequence\
  \ alloc] init];\nRandomSequence *r2 = [[RandomSequence alloc] initWithSeed:-43];\n\
  RandomSequence *r3 = [RandomSequence new];\n```\n\n`[RandomSequence alloc]` 语句通过向\
  \ `RandomSequence` 类对象发送 `alloc` 消息来启动过程。根类 `NSObject` 实现了 `+(id)alloc` 类方法，该方法被所有子类继承。`+(id)alloc`\
  \ 使用类引用为新对象分配所需内存，设置其 `isa` 变量，将所有其余实例变量填充为零，并返回指向新分配对象的指针。此时，对象已存在，并属于所请求的类型。然而，该对象尚未被初始化。\n\
  \n接下来，`init` 消息被发送给新创建的对象。该消息负责初始化对象。一旦 `init` 返回，对象即可使用。\n\n代码清单 3-17 中创建对象 `r1`、`r2`\
  \ 和 `r3` 的三个语句演示了创建新对象的常见方式。变量 `r1` 被赋值为一个新对象，该对象在无参数的情况下分配和初始化，等同于 Java 语句 `r1\
  \ = new RandomSequence()`。\n\n`r2` 变体调用了另一个初始化器，传入额外的参数用于初始化对象。与 Java 类似，你可以根据需要创建任意多的额外初始化器（构造器）。\n\
  \n创建对象 `r3` 所使用的简写形式在功能上与创建 `r1` 的形式完全相同。根类 `NSObject` 实现了一个 `+(id)new` 类方法，该方法首先调用\
  \ `+(id)alloc`，然后在新创建的对象返回前向其发送 `-(id)init` 方法。它仅适用于创建可以使用其 `-(id)init` 方法（即无参数）构造的对象，但确实能节省一些代码。\n\
  \n> **警告：** 对象构造的自定义始终通过重写或定义类的 `-(id)init...` 方法来完成。切勿重写或尝试拦截 `+(id)alloc` 或 `+(id)new`\
  \ 类方法。\n\n### 编写 init 方法\n\n要编写 Objective-C 初始化器（构造器），你的方法必须满足一个四部分约定：\n\n1.  初始化器必须调用其超类的初始化器。\n\
  2.  它必须更新其 `self` 变量。\n3.  它必须检查 `nil` 对象。\n4.  它必须返回指向自身的指针。\n\n约定的前两部分通过语句 `self\
  \ = [super init]` 实现。显然，每个初始化器在继续执行之前都必须调用其超类的初始化器。在 Java 中，这一约定由语言本身保证。在 Objective-C\
  \ 中，你需要负责调用它。\n\n更新 `self` 对 Java 程序员来说可能有些怪异，但这是实现类簇的关键。类簇将在第 22 章详细解释。你可能想省略对\
  \ `self` 的赋值。不要这样做。保留赋值实际上会使代码更精简、速度更快，而且你不会违反类簇约定。\n\n\n\n■ 注意  \n`init` 方法的返回值传统上是\
  \ `id`。从逻辑上讲，`init` 应始终返回指向该类或其子类的指针。然而，将返回值声明为类指针类型（例如 `-(BaseClass*)init`）会给子类带来困难。子类必须调用\
  \ `[super init]` 并将其赋值给 `self`。如果 `[super init]` 返回 `BaseClass*` 类型的值，子类将无法在不进行类型转换的情况下将其赋值给\
  \ `self`。\n\n第三步是检查 `nil`。如果父类的 `init` 方法因任何原因无法创建请求的对象，它将返回 `nil`。例如，当进程耗尽可用内存且无法分配新对象时，会返回\
  \ `nil`。类可以因任何原因决定不构造对象并返回 `nil`。请进行防御性编程；始终假设初始化方法可能返回 `nil`。\n\n如果返回的对象有效，初始化方法应接着执行对象所需的任何初始化。\n\
  \n最后，初始化方法必须向调用者返回其自身，如果初始化失败则返回 `nil`。\n\n研究代码清单 3-17 中的 `-(id)init` 方法。记住它。你将要编写的每一个对象初始化方法都应该与之相似。你无疑会遇到细微的变体——许多程序员将前两个语句合并为\
  \ `if ((self=[super init])!=nil)`——但每一个编写良好的 `init` 方法都满足初始化方法的四个部分约定。\n\n#### 链式初始化方法\n\
  \nJava 有用于显式构造函数调用的特殊语法，通过该语法，一个构造函数可以调用带参数的特定父类构造函数（`super(param)`）或另一个构造函数（`this(param)`）。\n\
  \n自然，Objective-C 没有针对此功能的特殊语法，但其原理是相同的。\n\n代码清单 3-18 中所示的 `RepeatableSequence` 类是代码清单\
  \ 3-17 中 `RandomSequence` 类的子类。`RepeatableSequence` 的 `init` 方法构建在其父类的 `init` 方法以及\
  \ `RepeatableSequence` 中的其他方法之上。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**代码清单 3-18. 链式初始化方法**\n\n**Java**\n\n```java\npublic class RepeatableSequence\
  \ extends RandomSequence\n{\n    private long restartSeed;\n    public RepeatableSequence()\n\
  \    {\n        this(1);\n    }\n    public RepeatableSequence( long startingSeed\
  \ )\n    {\n        super(startingSeed);\n        restartSeed = seed;\n    }\n \
  \   void restartSequence( )\n    {\n        seed = restartSeed;\n    }\n}\n```\n\
  \n**Objective-C**\n\n```objc\n#import \"RandomSequence.h\"\n\n@interface RepeatableSequence\
  \ : RandomSequence {\n    long long restartSeed;\n}\n- (id)init;\n- (id)initWithSeed:(long\
  \ long)startingSeed;\n- (void)restartSequence;\n@end\n\n@implementation RepeatableSequence\n\
  \n- (id)init\n{\n    self = [self initWithSeed:1];\n    return (self);\n}\n\n- (id)initWithSeed:(long\
  \ long)startingSeed\n{\n    self = [super initWithSeed:startingSeed];\n    if (self!=nil)\
  \ {\n        restartSeed = seed;\n    }\n    return (self);\n}\n\n- (void)restartSequence\n\
  {\n    seed = restartSeed;\n}\n@end\n```\n\n`-(id)initWithSeed:` 方法调用其父类的 `-(id)initWithSeed:`\
  \ 方法，将初始化参数传递给父类。父类初始化完成后，它再完成自己的初始化。\n\n`-(id)init` 方法将初始化工作移交给 `-(id)initWithSeed:`\
  \ 方法。请注意，消息 `initWithSeed:` 是发送给其自身，而不是其父类。\n\n#### 指定初始化方法\n\n当子类化一个类时，请阅读该类相关的文档（或注释）。一些\
  \ Objective-C 类有一个或多个指定初始化方法。子类的 `init` 方法应仅使用父类的一个指定初始化方法来初始化父类。\n\n许多类的文档都包含一个明确的“子类化说明”部分，其中包含对子类编写者的重要信息和注意事项。\n\
  \n#### 便捷构造函数\n\n类方法的一个常见用途是提供便捷构造函数，有时也称为工厂方法。这些是类方法，它们返回一个同类的预配置对象，理想情况下，使用的代码比正式创建和初始化一个新对象所需的代码更少。代码清单\
  \ 3-19 显示了 Cocoa 框架提供的 `NSDictionary` 类的一个片段。所有这些类方法都返回一个新的 `NSDictionary` 对象。\n\
  \n**代码清单 3-19. 类便捷构造函数**\n\n```objc\n@interface NSDictionary\n\n+ (id)dictionary;\n\
  + (id)dictionaryWithObject:(id)object forKey:(id)key;\n+ (id)dictionaryWithDictionary:(NSDictionary\
  \ *)dict;\n+ (id)dictionaryWithObjects:(NSArray *)objects forKeys:(NSArray *)keys;\n\
  \n@end\n```\n\n语句 `[NSDictionary dictionary]` 等效于 `[[NSDictionary alloc] init]`，而语句\
  \ `[NSDictionary dictionaryWithObject:@\"Mary\" forKey:@\"Name\"]` 等效于 `[[NSDictionary\
  \ alloc] initWithObject:@\"Mary\" forKey:@\"Name\"]`。其主要优点是简洁。\n\n■ 注意  \n仅当使用垃圾回收时，语句\
  \ `[NSDictionary dictionary]` 才等效于 `[[NSDictionary alloc] init]`。在传统的托管内存环境中，这两者完全不同。前者返回一个自动释放的对象，而后者返回一个保留的对象。有关完整说明，请参见第\
  \ 9 章（关于垃圾回收）和第 24 章（关于内存管理）。\n\n便捷构造函数通常用于构造那些本来难以创建的对象。例如，`NSString` 类提供了 `+(NSString*)pathWithComponents:(NSArray*)components`\
  \ 便捷构造函数。它接受一个路径组件数组，将它们组合成一个绝对的 POSIX 路径，并将结果作为单个不可变字符串返回。尝试使用 `alloc` 和类的 `init`\
  \ 方法来完成此操作，需要创建一个可变字符串缓冲区，在循环中追加所有组件，然后将临时字符串缓冲区转换为不可变字符串对象。显然，单条语句 `[NSString pathWithComponents:array]`\
  \ 要简洁得多。\n\n#### 析构函数\n\n与 Java 类似，Objective-C 对象可以选择性地覆盖其 `-(void)finalize` 方法。此消息在对象被垃圾回收器销毁之前发送给对象。每个\
  \ `finalize` 方法必须在返回前立即向其父类发送一条 `finalize` 消息。\n\n代码清单 3-20 显示了一个 `-finalize` 方法的示例。请注意，`finalize`\
  \ 方法应仅用于异常清理和提供健壮性。编写良好的程序不应依赖 `finalize` 方法来关闭文件；它应该在允许此对象变为可回收之前就关闭文件。`finalize`\
  \ 代码仅仅是防止在异常情况下泄漏资源，例如，如果文件在程序异常后仍保持打开状态。\n\n**代码清单 3-20. 行为良好的 `finalize` 方法**\n\
  \n```objc\n- (void)finalize\n{\n    if (file!=nil) {\n        [file close];\n  \
  \      file = nil;\n    }\n    [super finalize];\n}\n```\n\n■ 注意  \n`finalize` 消息仅当在垃圾回收环境中运行时才发送给对象。使用托管内存（无垃圾回收）的\
  \ Objective-C 应用程序则实现 `-(void)dealloc` 方法。更多详细信息请参阅第 24 章。\n\n#### 缺失了什么？\n\n表 3-2\
  \ 简要列出了你在 Objective-C 中找不到的 Java 特性。\n\n**表 3-2. 缺失的 Java 特性**\n\n| 特性         \
  \       | 描述 |\n|------------------------|-------------|\n| 内部/匿名类 | 你不能在类内部定义类，也不能在方法内部定义类。内部类和匿名类通常用作适配器和代码封装。在\
  \ Objective-C 中，这些模式是通过非正式协议和代码块（C 语言的一个近期补充，允许将可执行的代码块作为变量传递）来实现的。 |\n| 对象数组  \
  \        | （原文内容截断） |\n\n\n\n"
- '# 排版后内容


  Objective-C 没有继承自对象数组的概念。对象数组可以作为对象指针的 C 数组来处理，或者使用 `NSArray` 集合类。


  Objective-C 中没有 `final` 关键字。你无法阻止一个类或方法被子类化或重写。当应用于变量时，关键字 `const` 在很大程度上与 `final`
  同义。


  Objective-C 中的所有类和方法都是具体的。


  Objective-C 中没有包的概念，因此也没有包作用域。


  Java 中的接口、线程同步和异常，在 Objective-C 中有对应的实现，这些将在后续章节中详细介绍。


  Java 的许多其他特性，例如序列化、内省、远程方法调用和复制，并非由 Objective-C 语言定义；与构造器类似，Cocoa 框架使用类和方法来实现这些特性。


  在接下来的章节中，你还将发现 Objective-C 独有的许多特性和功能。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ## 第 4 章：创建 Xcode 项目


  前几章包含了大量需要消化的理论和抽象概念，接下来几章的内容甚至更多。对我来说，没有什么比尝试学习一个复杂主题却无法探索每个单独概念更令人沮丧的了。为此，我将暂时从理论中抽身，投入到创建一个可运行的
  Objective-C 应用程序这一纯粹务实的任务中，使用苹果公司的免费软件开发工具包 Xcode。


  拥有一个你可以摆弄和测试的可工作项目，是一种无价的学习体验。在阅读本书其余部分的过程中，我鼓励你为所探索的概念编写一些小的代码示例。将代码添加到一个测试项目中，并使用调试器单步执行。几行代码就能解答许多疑问。


  如果你还没有安装苹果的 Xcode 开发工具，请现在就安装。Xcode 在线获取地址为 `http://developer.apple.com/`。本教程假定你使用的是运行
  Mac OS X 10.5 或更高版本的 Macintosh 计算机，并且正在安装 Xcode 3。术语 *Xcode* 实际上指代两样东西：苹果公司的整套开发工具，以及
  Xcode IDE（集成开发环境）应用程序。在本书中，*Xcode* 指代 Xcode 应用程序，而 *Xcode 开发工具* 指代整套开发应用程序、工具、文档、示例代码和其他支持材料。


  ### 下载项目


  这个项目是一个名为 Scrapbook Words 的简单桌面应用程序。给这个应用程序一组字母，它会告诉你用这些字母可以拼出哪些单词。代码量很小（几百行），但涉及了多项技术。它使用了集合和字符串对象、从文件读取数据、在后台线程中异步调度任务、使用队列消息在线程间通信，并采用控制器和绑定来实现模型-视图-控制器设计。


  你可以在以下章节中了解更多关于这些特定技术的信息：


  -   字符串对象将在第 8 章中探讨。

  -   程序化消息发送将在第 6 章中解释。

  -   集合将在第 16 章中探讨。

  -   第 20 章讨论数据模型、视图和控制器对象（模型-视图-控制器模式），以及绑定。

  -   线程将在第 15 章中涉及。


  在开始之前，请从 `www.apress.com` 的源代码/下载区域下载完成的项目文件。本章将引导你完成从头创建此项目所采用的步骤，但并未包含所有细节。本章中的代码摘录用于说明概念，但不一定完整。请参考完成的项目以获取完整的实现。


  本章有多种学习方式：




  • 阅读本章，感受一下 Xcode 开发。下载完成后的项目，并亲自操作一番。


  • 在 Xcode 中按照本章的每个步骤，从完成的项目中复制所需的源代码，自己重新创建项目。


  • 将本章的步骤作为你自己项目的起点。


  接下来，你将创建一个新的 Xcode 项目，配置项目，设计应用程序，创建控制器和数据模型对象以实现模型-视图-控制器（Model-View-Controller）设计，最后添加业务逻辑以生成一个可正常工作的应用。完成这一过程将带你简要了解
  Xcode、Interface Builder、Objective-C 和 Cocoa 框架。本章中很少与 Java 进行比较，因为这更多地涉及开发工具而非编程语言本身。


  ### 创建项目


  安装完成后，启动 Xcode 应用程序。


  首先创建一个新项目。选择“File”→“New Project…”以打开新项目助理（Apple 对向导的称呼）。新项目总是基于众多内置模板之一。每个模板都会创建一个针对特定用途预先配置好的完整项目。这是实现最终目标的一个极好开端，因此请选择最接近你最终产品的模板。大多数项目需要经过大量配置才能生成有用的内容，所以我强烈建议你不要选择“`Empty
  Project`”模板。


  对于本项目，请选择如图 4-1 所示的“`Cocoa Application`”模板。将项目命名为 `Scrapbook Words`，并选择项目及其文件存储的位置。Xcode
  会创建一个以项目名称命名的文件夹。该文件夹将包含一个同名项目文档以及模板中包含的任何其他资源文件。对于某些模板来说，这可能为空，而对于其他模板，则可能包含大量项目。


