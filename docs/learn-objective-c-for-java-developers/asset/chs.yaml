  **图 4-1.** *选择项目模板*


  项目窗口用于组织和管理项目的所有组件。如图 4-2 所示的项目窗口采用默认的 Xcode 布局。你可以在“Xcode”→“Preferences”中选择使用一体化窗口或多窗口布局，以符合你的个人喜好和习惯。


