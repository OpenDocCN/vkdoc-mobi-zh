  \ 消息来取消先前的注册。`observer` 参数是必需的，而 `name` 和 `object` 参数都是可选的，且都可以是 `nil`。通知中心会撤销所有与条件匹配的通知的订阅，如表\
  \ 18-2 所列。\n\n**表 18-2.** 移除观察者条件\n\n| `name`    | `object` | 注册效果             \
  \                                                 |\n|-----------|----------|------------------------------------------------------------------------|\n\
