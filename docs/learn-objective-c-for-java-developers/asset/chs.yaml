- "# 第 21 章 ■ 懒初始化模式\n\n使用`+initialize`方法进行类级别的懒初始化时，请牢记以下几点：\n\n- 向类发送的第一条消息，或首次尝试创建类的实例，都会为该类创建类对象并向其发送`+initialize`消息。\n\
  - `+initialize`方法每个类仅会被发送一次。但这可能会产生误导，因为 Objective-C 子类会继承其超类的类方法。因此，一个类可能会因为其子类而接收到额外的`+initialize`消息。这就是代码清单\
  \ 21-4 中的`+initialize`方法会检查`PieceImages`是否已初始化的原因。如果已知`ChessPiece`没有子类，则可以省略此检查。\n\
  - 类对象在`+initialize`消息发送之前已完全初始化，因此在`+initialize`方法内部调用其他类方法或创建自身的实例是安全的。\n\n###\
  \ 总结\n\n懒初始化对于全局变量和实例变量而言都是一种有用的设计模式。它通过仅构建实际需要的信息来优化性能，并将可选和辅助计算推迟到更合适的时机。通过使用`+initialize`类方法来编程构造类运行所需的任何全局变量，可以在很大程度上克服\
  \ Objective-C 缺乏静态初始化语句的局限。\n\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 22 章：工厂模式\n\n工厂模式将创建对象的任务委托给另一个类，即工厂。工厂有多种形式。工厂可以实现便捷构造函数，通过封装重复或繁琐的准备工作来简化常见对象的构造。它们可用于实现单例和可复用的对象池。但最重要的用途是代表客户端决定新对象的类——这便是本章要探讨的模式。（单例工厂模式将在第\
  \ 23 章中描述）。\n\n当客户端（即创建对象的代码）无法轻松确定新对象的类时，就会采用工厂模式，因为客户端无法知晓或不应知晓要创建哪个类。\n\n通常在多个密切相关的子类之间需要进行选择，而正确的选择取决于对客户端隐藏的决策或实现细节。在\
  \ Java 中，这通常通过静态方法或抽象工厂对象来实现。Objective-C 则拥有一种强大的模式，称为类簇，它直接在对象初始化器中实现工厂模式。\n\n\
  ### URL 工厂\n\n工厂模式的一个典型例子是 URL 对象工厂。URL 对象可以根据 URI 字符串（例如`\"http://www.apress.com/\"\
  `）来创建。URL 类库可能定义了多个 URL 类：一个基础的`URL`类，以及专门的子类，如`FileURL`、`HTTPURL`、`SecureURL`等。\n\
  \n要求`URL`类的客户端通过检查字符串来决定实例化哪个子类，将是一个非常糟糕的设计。相反，基础`URL`类会声明一个 URL 对象工厂，如下所示：\n\n\
  ```java\npublic static URL makeURL( String uri );\n```\n\n静态方法`URL.makeURL(String)`会解析字符串，确定其协议，然后创建并返回相应类的对象。字符串`\"\
  file://users/home/file.data\"`可能返回一个`FileURL`实例，而字符串`\"https://secure.apress.com/\"\
  `则可能返回一个`SecureURL`实例。实际的子类以及用于确定创建哪个类的逻辑，对客户端来说几乎无关紧要。\n\n### 矩阵类\n\n我们将通过类的典型演化过程来探索这种工厂模式。使用的示例是一个`Matrix`类，它封装了数学矩阵的概念并执行简单的矩阵运算。清单\
  \ 22-1 展示了 Java 版本的初始类，清单 22-2 展示了 Objective-C 中的等效实现。\n\n为了让你能专注于工厂模式，这些清单省略了实际实现中的许多细节。完整的实现可从[`www.apress.com/`](http://www.apress.com/)的源代码/下载部分获取。\n\
