  - `[[NSIndexSet alloc] initWithIndexSet:]`  \n  创建另一个索引集合副本的不可变索引集合。\n\n从其他集合创建的集合通常通过简单地复制对象指针来制作浅拷贝。这是高度优化的，通常非常快。通常的做法是创建一个可变集合来组装一组对象，然后返回一个不可变副本，如清单\
