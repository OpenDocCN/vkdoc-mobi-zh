  \ Unicode 数字格式模式标准（Unicode 技术标准#35[³]），不应与`-stringWithFormat:`及类似方法使用的格式说明符混淆。数字格式模式形成一个模板，描述显示多少有效数字、使用什么标点符号，并且可能包含零值和负值的备用模板。表\
  \ 8-10 显示了一些示例数字格式模式以及为美国英语用户格式化数字时的结果字符串。表 8-11 显示了西班牙用户的相同结果。\n\n**表 8-10. 英语（美国）中的示例数字格式模式**\n\
