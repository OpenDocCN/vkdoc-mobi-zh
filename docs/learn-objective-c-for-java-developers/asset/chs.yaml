  \ boolean copyValues, int dimensions )\n\n{\n\nsuper(values,copyValues,dimensions,dimensions);\n\
  \n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 22 章 ■ 工厂模式\n\npublic\
