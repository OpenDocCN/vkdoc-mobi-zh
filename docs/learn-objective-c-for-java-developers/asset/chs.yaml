  \ 2004.\n\n##### NSNumberFormatter\n\n`NSNumberFormatter`格式化十进制数字。它实现了两个便捷方法：`-stringFromNumber:`和`-numberFromString:`。配置格式化器的最简单方法是使用`-setNumberStyle:`的预定义格式化样式之一。样式会考虑用户的语言、用户区域设置的文化惯例以及他们的全局显示偏好。表\
