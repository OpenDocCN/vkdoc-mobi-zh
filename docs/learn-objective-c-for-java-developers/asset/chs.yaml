- "# 文件系统基础\n\n每个 Objective-C 进程都有一个 `NSFileManager` 类的单例实例，通过发送 `[NSFileManager defaultManager]`\
  \ 获得。`NSFileManager` 实现了大多数全局文件系统方法。本章尽可能提供常见文件系统任务的 Objective-C 解决方案，但某些有用的功能只能通过\
  \ Cocoa、Core Services 或 BSD 框架中的 C 函数获得。\n\nJava 虚拟机可以托管在各种计算平台上，这些平台具有不同的底层文件系统。因此，Java\
  \ 文件 API 往往是通用的，并尽可能少做假设。相比之下，Objective-C 和 BSD API 明确假设存在 POSIX 兼容的文件系统。在 Objective-C\
  \ 中，你不会找到与 `java.io.File.pathSeparatorChar` 等价的变量。Objective-C 中的所有文件和目录路径都是 POSIX\
  \ 路径，路径组件分隔符始终是单个 `'/'` 字符。Core Services 框架主要假定 HFS+ 文件系统，尽管这主要是为了与遗留代码兼容，因为大多数\
  \ HFS+ 文件说明符和数据结构都会被直接转换为 BSD 调用。\n\n虽然编程接口明确假设存在 POSIX 文件系统，但底层文件服务框架在如何将文件系统 API\
  \ 调用转化为实际操作方面提供了很大的自由度。最终，所有文件系统调用都会对卷（物理存储设备的逻辑分区）的内容进行某些更改。该卷的格式可能差异很大。HFS+ 卷格式是\
  \ Mac OS X 操作系统的原生格式，但 BSD 文件系统框架可以很好地处理 UFS 卷、Samba 卷、AppleShare 卷、Windows 卷等。你调用的文件系统\
  \ API 会通过名为虚拟文件系统（VFS）的插件架构自动转换为适合卷格式的适当操作。你唯一需要意识到这一点的时候是处理卷格式所不支持的晦涩功能时。例如，UFS\
  \ 卷可能不支持访问控制列表，而 HFS+ 卷上的文件名可能是区分大小写的，也可能不区分。你通常可以忽略底层卷格式的实现细节；只需注意某些功能可能不会被操作系统支持的所有卷格式实现。\n\
  \n## 识别文件系统中的项目\n\n本节说明文件系统中项目命名的基本规则，以及如何构建指向这些项目的路径。它还详细介绍了如何获取和设置工作目录或默认目录。除了字符串路径外，还可以使用\
  \ URL 对象和别名来标识文件。本节说明如何使用文件 URL 和别名，以及如何将它们转换为字符串路径。最后，Mac OS X 定义了许多标准目录，可以通过符号方式请求其位置，从而避免硬编码那些可能在未来发生变化或本质上是可变路径的系统资源。本节描述了用于获取这些目录路径的函数。\n\
  \n### 文件和路径名称\n\n欢迎学习 POSIX 文件名称基础 101。让我们快速回顾一下基础知识，以免后面产生混淆。要处理卷上的任何实体，必须通过名称来标识它。文件名可以是几乎任何字符串，但有以下限制：不能包含\
  \ `'/'` 路径分隔符字符、不能是保留名称（`\".\"` 或 `\"..\"`）、不能是空字符串、也不能太长（不超过 255 个 Unicode 字符）。\n\
  \n字符串 `@\"notes.txt\"` 是一个有效的文件名。\n\n路径是一个或多个由 `'/'` 路径分隔符字符分隔的串联名称。字符串 `@\"james/Documents/Publications\"\
  ` 是一个路径。路径的最后一个元素命名一个文件。最后一个元素之前的所有名称必须是目录或其他类型的文件系统容器（例如挂载点）的名称。\n\n\n\n■ 注意：Objective-C\
  \ 文件类构建于 POSIX 文件概念之上，并继承了原始 UNIX 操作系统的许多概念。其中最重要的概念是“一切皆文件”。在 UNIX 中，文件系统并非磁盘驱动器上数据文件的具象集合，而是一个用于标识任何串行数据来源的抽象命名系统。UNIX\
  \ 中的“文件”可以是数据文件、目录、网络套接字、串行端口、信号量、随机数生成器、内存块、逻辑控制台设备等等。可以将术语“文件”视为文件系统层次结构中任何命名实体的基类。目录、数据文件和\
  \ FIFO 管道都是“文件”的特化子类。这一术语贯穿于各类 API 中。例如，`-[NSFileManager removeFileAtPath:handler:]`\
  \ 方法删除的远不止数据文件。如果传入一个目录路径，它会删除该目录及其包含的所有项目。它也会删除一个命名套接字或信号量。在本书中，我遵循 UNIX 对“文件”的命名惯例，意指文件系统中几乎任何命名实体——否则会变得过于混乱。当指代某个卷上的实际文档文件时，我会使用术语“数据文件”。\n\
  \n路径可以是绝对路径或相对路径。以 `/` 开头的路径是绝对路径，指定从文件系统根目录开始的一系列目录。否则，路径是相对路径，指定从当前工作目录开始的一系列目录。某些文件系统函数会识别以波浪号开头的路径，如\
  \ `~/Documents/Publications`，表示从当前用户的主目录开始的绝对路径。\n\n无论好坏，UNIX 的扩展名命名惯例都跟随我们进入了二十一世纪。文件扩展名暗示文件包含的信息类型。它们通常是简短标识符——三到四个字母字符——附加在文件名末尾的句点（`.`）之后。名称\
  \ `@\"Outline.doc\"` 的扩展名是 `@\"doc\"`，名称 `@\"Letter to Jake 2.0.pages\"` 的扩展名是 `@\"\
  pages\"`。\n\nJava 的 `java.io.File` 对象大体上是用于标识文件系统中文件的基本对象。可以为不存在的文件创建 `File` 对象。路径操作通过提取\
  \ `File` 的属性或基于现有 `File` 对象创建新的 `File` 对象来完成。例如，可以通过创建一个指向该路径的 `File` 对象，然后调用 `getParent()`\
  \ 来确定路径的父目录。\n\nObjective-C 没有能够表示抽象或不存在的文件的对象。字符串用于表示文件名和路径。如何组装路径或文件名完全由你决定。你可以使用任何字符串操作方法，但\
  \ Cocoa 框架提供了几个专门用于处理路径的方法。这些方法通过 `NSPathUtilities` 分类附加到 `NSString` 类上。常用的方法列于表\
  \ 11-1 中。清单 11-1 展示了 Java 与 Objective-C 路径操作之间的对比。例如，清单 11-1 中的 Java 和 Objective-C\
  \ 方法都生成了一个指向不存在的文件的路径。\n\n**表 11-1.** `NSString` 的路径和文件名方法\n\n| 方法 | 描述 |\n| ---\
  \ | --- |\n| `+(NSString*)pathWithComponents:(NSArray*)components` | 从文件名数组构建一个路径。要构建绝对路径，请将数组的第一个元素设置为字符串\
  \ `@\"/\"`。 |\n| `-(NSArray*)stringsByAppendingPaths:(NSArray*)paths` | 将数组中的文件名追加到接收器的路径上。\
  \ |\n| `-(NSString*)pathComponents` | 将路径分解为单独的文件名，并以数组形式返回。如果路径是绝对的，数组的第一个元素是 `@\"\
  /\"`。 |\n| `-(BOOL)isAbsolutePath` | 如果路径是绝对的（以 `@\"/\"` 开头），则返回 `YES`。 |\n| `-(NSString*)lastPathComponent`\
  \ | 从路径中提取最后一个文件名。 |\n| `-(NSString*)stringByDeletingLastPathComponent` | 移除接收器路径中的最后一个文件名。\
  \ |\n| `-(NSString*)stringByAppendingPathComponent:(NSString*)str` | 将附加名称追加到路径的末尾。\
  \ |\n| `-(NSString*)pathExtension` | 从路径中的最后一个名称提取扩展名。 |\n| `-(NSString*)stringByDeletingPathExtension`\
  \ | 从路径中的最后一个名称移除扩展名（如果有）。 |\n| `-(NSString*)stringByAppendingPathExtension:(NSString*)str`\
  \ | 将新的扩展名追加到路径中的最后一个名称。 |\n| `-(NSString*)stringByAbbreviatingWithTildeInPath`\
  \ | 如果接收器的路径以当前用户的主目录路径开头，则将其替换为简写 `@\"~\"`。 |\n| `-(NSString*)stringByExpandingTildeInPath`\
  \ | 将接收器路径开头的 `@\"~\"` 替换为当前用户主目录的路径，或将 `@\"~account\"` 替换为用户“account”的主目录路径。 |\n\
  | `-(NSString*)stringByStandardizingPath` | 简化并规范化接收器的路径。 |\n\n这些方法大多不言自明。它们都不会修改接收器。正如\
  \ `-stringBy…` 方法名所暗示的，每个方法都返回一个新的字符串对象，其中包含转换的结果。\n\n前几个方法将名称数组转换为完整路径，反之亦然。大部分方法用于提取、删除或向现有路径追加单个名称或文件扩展名。`-stringByStandardizingPath`\
  \ 方法通过将 `@\"~\"` 或 `@\"~user\"` 简写替换为显式路径，将所有相对路径引用和符号链接替换为其物理（非符号）等价物，并移除任何无关的路径元素来“规范化”路径字符串。简而言之，这是一个“清理”方法，将路径简化为其最简单、最明确的形式。\n\
  \n**清单 11-1.** 生成指向不存在的文件的路径\n\n**Java**\n\n```java\npublic String autoName( String\
  \ parentDir, String baseName, String ext )\n{\n    int suffix = 0;\n    File parentFile\
  \ = new File(parentDir);\n    File testFile = new File(parentFile,baseName+\".\"\
  +ext);\n    while (testFile.exists()) {\n        suffix += 1;\n        testFile\
  \ = new File(parentFile,baseName+\"-\"+suffix+\".\"+ext);\n    }\n    return testFile.getAbsolutePath();\n\
  }\n```\n\n**Objective-C**\n\n```objc\n- (NSString*)autoNameInDirectory:(NSString*)parentDir\n\
  \                            name:(NSString*)name\n                       extension:(NSString*)ext\n\
  {\n    int suffix = 0;\n    NSString *testPath = [parentDir stringByAppendingPathComponent:name];\n\
  \    testPath = [testPath stringByAppendingPathExtension:ext];\n    while ([[NSFileManager\
  \ defaultManager] fileExistsAtPath:testPath]) {\n        NSString *newName = [NSString\
  \ stringWithFormat:@\"%@-%d\",name,++suffix];\n        testPath = [parentDir stringByAppendingPathComponent:newName];\n\
  \        testPath = [testPath stringByAppendingPathExtension:ext];\n    }\n    return\
  \ testPath;\n}\n```\n\n##### 工作目录\n\n每个进程都维护一个默认的目录路径，称为当前目录或工作目录。这是用于解析相对路径的目录。所有相对路径都与当前工作目录路径拼接，以获得文件的显式路径。表\
  \ 11-2 显示了在 Objective-C 中用于获取和更改当前工作目录路径的两个 `NSFileManager` 方法。\n\n**表 11-2.** 工作目录消息\n\
  \n| 方法 | 描述 |\n| --- | --- |\n| `-(NSString*)currentDirectoryPath` | 返回当前工作目录路径\
  \ |\n| `-(BOOL)changeCurrentDirectoryPath:(NSString*)path` | 设置工作目录路径 |\n\n如果路径指定了文件系统中一个可访问的目录，该方法会将当前工作目录设置为该路径标识的目录并返回\
  \ `YES`。否则，它不做任何操作并返回 `NO`。\n\nJava 中的等效功能通过设置 `\"user.dir\"` 系统属性来实现。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n"
- "# 文件和目录操作\n\n## 唯一显著的区别在于，`user.dir` 属性只是一个字符串，直到文件操作需要解析相对路径时才会被求值。`changeCurrentDirectoryPath:`\
  \ 方法会对路径进行鉴定，如果路径不可用，则会拒绝更改。代码清单 11-2 修改了当前工作目录，使其指向一个 “temp” 子目录，但仅在该子目录存在时才进行修改。\n\
  \n### 代码清单 11-2. 更改当前工作目录\n\n**Java**\n\n```java\nString workingPath = System.getProperty(\"\
  user.dir\");\nFile testFile = new File(workingPath, \"temp\");\n\nif (testFile.exists())\
  \ {\n    System.setProperty(\"user.dir\", testFile.getAbsolutePath());\n}\n```\n\
  \n**Objective-C**\n\n```objc\nNSString *current = [[NSFileManager defaultManager]\
  \ currentDirectoryPath];\nNSString *temp = [current stringByAppendingPathComponent:@\"\
  temp\"];\n\n[[NSFileManager defaultManager] changeCurrentDirectoryPath:temp];\n\
  ```\n\nMac OS X 进程的初始当前目录继承自启动该进程的环境。对于命令行工具，它将是启动该工具的 Shell 的工作目录。对于应用程序捆绑包，操作系统通常会在启动进程前，将工作目录设置为包含该应用程序捆绑包的目录。\n\
  \n##### 文件 URL\n\n在几个主要版本之前，Cocoa 框架开始采用通用资源定位符 (URL) 作为数据源的首选标识符对象。例如，原有的 `-[NSDocumentController\
  \ openDocumentWithContentsOfFile:display:]` 方法已被弃用，取而代之的是 `-openDocumentWithContentsOfURL:display:error:`。这提高了许多类的灵活性，因为\
  \ URL 可以引用来自各种来源的数据——不仅仅是文件系统中的数据文件。但这同时也意味着，你可能需要将文件系统路径转换为 URL，或者反过来转换。\n\nJava\
  \ 的 `java.net.URL` 对象可以引用文件，但通常不结合 `java.io.*` 类使用。`java.io.File` 类是对 URL，或者更准确地说，是对\
  \ URI（通用资源标识符）的仅有让步。它支持从 URI 构造 `File` 对象，并提供了 `File.toURI()` 和 `File.toURL()` 方法用于获取\
  \ `File` 的 URL。表 11-3 列出了在 Cocoa 中路径与文件 URL 之间进行转换的基本方法。\n\n**表 11-3.** 与文件相关的 `NSURL`\
  \ 方法\n\n| 方法                                 | 描述                             |\n\
  | ------------------------------------ | -------------------------------- |\n| `+(NSURL*)fileURLWithPath:(NSString*)path`\
  \ | 为给定文件创建一个文件 URL。     |\n| `-(BOOL)isFileURL`                   | 如果接收者是文件方案\
  \ URL，则返回 `YES`。 |\n| `-(NSString*)path`                   | 如果接收者是文件方案 URL，返回该项的文件系统路径。\
  \ |\n\n## 创建和删除目录\n\n方法 `-[NSFileManager createDirectoryAtPath:withIntermediateDirectories:attributes:error:]`\
  \ 用于创建新目录。如果 `withIntermediateDirectories:` 参数为 `YES`，那么任何缺失的中间目录也会一并创建。例如，如果路径\
  \ `/Users/daphne/Music` 已存在，向 `-createDirectoryAtPath:withIntermediateDirectories:attributes:error:`\
  \ 发送路径 `@\"/Users/daphne/Music/Albums/Cocteau Twins\"` 并将 `withIntermediateDirectories:`\
  \ 设置为 `YES`，将会在 `Music` 目录内创建 `Albums` 目录，然后在 `Albums` 目录内创建 `Cocteau Twins` 目录。在此模式下，该消息等同于\
  \ `java.io.File.mkdirs()` 方法。如果 `withIntermediateDirectories:` 为 `NO`，则会返回一个错误，因为期望其父目录已经存在。这相当于调用\
  \ `java.io.File.mkdir()`。`attributes:` 参数是一个要设置的属性字典。有关属性字典的信息，请参阅本章后面的“文件属性”部分。\n\
  \n删除目录与删除任何文件一样，都使用 `-[NSFileManager removeItemAtPath:error:]`。\n\n##### 定位特殊目录\n\
  \n通常认为，将知名目录的路径硬编码为字符串常量是一种不好的做法。这些路径常常会随着时间推移而改变，从而破坏你的应用程序。Mac OS X 操作系统定义了许多具有特定用途的目录。此外，它还定义了一组域，这些域形成了一个层级结构，用以定义资源的作用范围。例如，安装字体的方法是把字体文件放入\
  \ `Fonts` 文件夹。每个用户都有自己的 `Fonts` 文件夹，所有用户共享一个 `Fonts` 文件夹，系统有一个 `Fonts` 文件夹，网络上也有一个\
  \ `Fonts` 文件夹。字体被复制到哪个 `Fonts` 文件夹决定了其作用范围。\n\n通过调用 `NSSearchPathForDirectoriesInDomains(…)`\
  \ 并传入三个参数来定位特殊目录：一个描述知名目录的常量、一个可接受域的位掩码，以及一个用于自动展开返回路径中 “~” 简写标记的标志位。代码清单 11-3 展示了如何使用\
  \ `NSSearchPathForDirectoriesInDomains(…)` 来获取用户桌面的路径。\n\n### 代码清单 11-3. 定位用户的桌面目录\n\
  \n```objc\nNSArray *paths = NSSearchPathForDirectoriesInDomains(NSDesktopDirectory,\
  \ NSUserDomainMask, YES);\nif ([paths count] > 0) {\n    NSString *desktopPath =\
  \ [paths objectAtIndex:0];\n    …\n}\n```\n\n`NSSearchPathForDirectoriesInDomains(…)`\
  \ 返回一个数组，其中包含在所请求的每个域中该目录的路径，顺序按照搜索顺序排列，从最具体到最通用。表 11-4 列出了常用的目录常量。域参数可以是表 11-5\
  \ 中任何域的任意组合（使用 OR 运算），也可以是常量 `NSAllDomainsMask`。\n\n**表 11-4.** 常用目录常量\n\n| 目录常量\
  \                              | 描述（示例路径）                  |\n| ------------------------------------\
  \ | --------------------------------- |\n| `NSApplicationDirectory`            \
  \ | 应用程序 (`/Applications`)        |\n| `NSLibraryDirectory`                 | 用户资源，如字体、偏好设置和日志文件\
  \ (`~/Library`) |\n| `NSUserDirectory`                    | 包含所有用户主文件夹的文件夹 (`/Users`)\
  \ |\n| `NSDocumentDirectory`                | 文档 (`~/Documents`)              |\n\
  | `NSDesktopDirectory`                 | 桌面 (`~/Desktop`)                |\n| `NSCachesDirectory`\
  \                  | 缓存文件 (`~/Library/Caches`)     |\n| `NSApplicationSupportDirectory`\
  \      | 应用程序使用的辅助文件 (`/Library/Application Support`) |\n| `NSDownloadsDirectory`\
  \               | 下载文件夹 (`~/Downloads`)        |\n\n**表 11-5.** 目录域\n\n| 域     \
  \                 | 描述               |\n| ----------------------- | ------------------\
  \ |\n| `NSUserDomainMask`      | 当前用户           |\n| `NSLocalDomainMask`     | 此系统的所有用户\
  \   |\n| `NSSystemDomainMask`    | 整个系统           |\n| `NSNetworkDomainMask`   |\
  \ 本地网络上的所有系统 |\n\n还有两个专门用途的函数可以返回可变路径。`NSHomeDirectory()` 返回当前用户主目录的路径。`NSTemporaryDirectory()`\
  \ 返回专门为创建临时文件而保留的目录路径。\n\n### 向用户请求文件\n\n在 Java 中，提示用户以交互方式选择文件的方式非常相似。Java 使用 `JFileChooser`\
  \ 类来选择现有文件或允许用户输入新文件的名称。Cocoa 提供了 `NSSavePanel` 类用于输入新文件名，以及它的子类 `NSOpenPanel` 用于选择现有文件。代码清单\
  \ 11-4 展示了用于提示用户从文件系统中选择单个数据文件或目录的等效代码。\n\n### 代码清单 11-4. 选择单个文件\n\n**Java**\n\n\
  ```java\nJFileChooser chooser = new JFileChooser();\nchooser.setFileSelectionMode(JFileChooser.FILES_AND_DIRECTORIES);\n\
  chooser.setMultiSelectionEnabled(false);\n\nint result = chooser.showOpenDialog(null);\n\
  if (result == JFileChooser.APPROVE_OPTION)\n    return chooser.getSelectedFile().getAbsolutePath();\n\
  return null;\n```\n\n**Objective-C**\n\n```objc\nNSOpenPanel *panel = [NSOpenPanel\
  \ openPanel];\n[panel setCanChooseFiles:YES];\n[panel setCanChooseDirectories:YES];\n\
  [panel setAllowsMultipleSelection:NO];\n\nNSInteger result = [panel runModal];\n\
  if (result == NSFileHandlingPanelOKButton)\n    return [panel filename];\nreturn\
  \ nil;\n```\n\n每个类都有许多属性，用于确定可选择项的类型。\n\n\n\n"
- "# 过滤与动态定制\n\n过滤及其他动态定制功能通过 `NSSavePanel` 的委托（delegate）实现。要为显示内容中的项目添加过滤功能，需创建一个实现了\
  \ `-(BOOL)panel:(id)sender shouldShowFilename:(NSString*)filename` 方法的对象，并将其设置为面板对象的\
  \ delegate 属性。\n\n有关委托对象可实现非正式协议的完整列表，请参阅 `NSSavePanel` 文档的“委托方法”章节。\n\n虽然清单 11-4\
  \ 中的 Objective-C 代码与 Java 代码功能等价，但它并非呈现文件对话框的首选方式。清单 11-5 中的代码会挂起整个应用程序，直至用户选择文件。如果文件选择操作与某个窗口关联，更推荐使用表单（sheet）——即附加到特定窗口的模态子窗口——以避免阻塞高级应用程序界面。清单\
  \ 11-5 使用与清单 11-4 相同的面板启动了一个模态表单。`beginSheet…` 消息会立即返回，使主应用程序的运行循环保持连续运行。当用户在表单中做出选择后，`didEndSelector:`\
  \ 参数指定的消息会发送给 `modalDelegate:` 对象。只要方法参数与非正式协议定义的内容匹配，这些对象和消息可由你自由选择。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 11 章：文件\n\n### 清单 11-5. 使用文件选择表单\n\n```\nNSOpenPanel *panel = [NSOpenPanel\
  \ openPanel];\n[panel setCanChooseFiles:YES];\n[panel setCanChooseDirectories:YES];\n\
  [panel setAllowsMultipleSelection:NO];\n[panel beginSheetForDirectory:nil      \
  \ // 使用默认目录\n                         file:nil       // 不预选任何文件\n              \
  \  modalForWindow:documentWindow  // 表单附加到该窗口\n                 modalDelegate:self\n\
  \                didEndSelector:@selector(myOpenDidEnd:returned:context:)\n    \
  \               contextInfo:NULL];\n...\n- (void)myOpenDidEnd:(NSSavePanel*)sheet\
  \ returned:(int)code context:(void*)ignored\n{\n    if (code==NSOKButton) {\n  \
  \      NSString *file = [sheet filename];\n        …\n    }\n}\n```\n\n### 符号链接、硬链接与别名\n\
  \nMac OS X 操作系统提供了三种引用其他文件的文件类型。第一种是符号链接。这类特殊文件包含指向文件系统中另一个目录的路径。\n\n通常，符号链接的行为表现如同它所指向的目录。例如，目录\
  \ `/Users/hannah/Documents/Updates` 中包含文件 `Monday.doc`，而文件 `/Users/hannah/Public/New`\
  \ 是一个符号链接，包含路径 `/Users/hannah/Documents/Updates`。在这种情况下，路径 `/Users/hannah/Documents/Updates/Monday.doc`\
  \ 与 `/Users/hannah/Public/New/Monday.doc` 在功能上等价，并指向同一文件。\n\n`NSFileManager` 提供了创建符号链接及获取其内容的方法。\n\
  \n大多数文件操作会透明地遍历符号链接。以符号链接结尾的路径通常指向链接文件本身，而非其指向的目录。例如，语句 `[[NSFileManager defaultManager]\
  \ removeItemAtPath:@\"/Users/hannah/Public/New\" error:NULL]` 会删除符号链接文件，而非 `Updates`\
  \ 文件夹。一个值得注意的例外是 `-[NSFileManager fileAttributesAtPath:traverseLink:]` 方法。其第二个 `BOOL`\
  \ 参数决定了它是返回符号链接文件的属性，还是返回符号链接所指向文件的属性。表 11-6 列出了用于创建和读取符号链接内容的方法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 11 章：文件\n\n### 表 11-6. NSFileManager 符号链接方法\n\n| 方法 | 描述 |\n|--------|-------------|\n\
  | `-(BOOL)createSymbolicLinkAtPath:(NSString*)path withDestinationPath:(NSString*)destPath\
  \ error:(NSError**)error` | 在 path 处创建一个指向 destPath 文件的符号链接文件。 |\n| `-(NSString*)destinationOfSymbolicLinkAtPath:(NSString*)path\
  \ error:(NSError**)error` | 提取符号链接文件所指向的路径。 |\n\n\n\n`-stringByStandardizingPath`的主要目的之一（如表\
  \ 11-1 所述）是替换路径中的符号链接，使其指向原始文件。沿用前述示例，将\n\n`@\"/Users/hannah/Public/New/Monday.doc\"\
  `传递给`-stringByStandardizingPath`会返回\n\n`@\"/Users/hannah/Documents/Updates/Monday.doc\"\
  `。\n\n第二种替身文件是别名文件，其概念和数据结构继承自经典 Macintosh 操作系统。别名文件包含序列化的`AliasRecord`结构。要使用它们，必须读取文件内容，并通过\
  \ Core Services 函数解析别名。别名的优势在于其智能性：例如，为文档文件创建别名后，即使原文件在同一卷中被重命名或移动到其他目录，别名仍能定位到它。此外，如果原文件位于外部卷或网络卷上，别名可以自动重新挂载该卷，恢复对原始文件的访问。\n\
  \n从 Cocoa 和 BSD 框架的角度看，别名文件仅是普通数据文件，不会自动被识别或解析。唯一的例外是少数高级文件类（如刚刚讨论过的`NSOpenPanel`）。`NSOpenPanel`具有`resolvesAliases`属性，若该属性被设置，系统会自动解析用户选择的任何别名，返回别名所指向的项目，而非别名文件本身。本章后续部分将介绍一些用于处理别名记录的基础函数。\n\
  \n最后，某些卷格式支持硬链接。硬链接是指文件系统中两个或多个文件共享相同的内容，修改其中一个的数据会同时改变另一个。与别名和符号链接不同，硬链接文件是平级关系，每个文件都与普通文件无异，不存在一个文件“指向”另一个文件的情况；两者在卷上封装的是相同的物理数据。实际上，硬链接文件并不常用。`NSFileManager`创建硬链接的方法为：\n\
  \n`-(BOOL)linkItemAtPath:(NSString*)srcPath toPath:(NSString*)dstPath error:(NSError**)error`。\n\
  \n若要“断开”硬链接，只需删除其中一个文件。删除硬链接文件不会丢弃任何数据，因为数据仍保留在另一个文件中。\n\n### 处理目录内容\n\n通过读取目录内容来发现文件是一项常见的编程任务。通常是为了对目录中的每个文件执行某些操作，可能还会递归处理目录中子目录包含的文件。前者是对目录的浅层检查，后者则是深层检查。\n\
  \n获取目录内容的三种基本方法如表 11-7 所示。\n\n`-contentsOfDirectoryAtPath:…`仅返回目录的直接内容（作为文件名数组，而非路径）。`-subpathsOfDirectoryAtPath:…`返回一个数组，包含目录中每个文件的完整路径，以及所有子目录、子子目录等内容。\n\
  \n**表 11-7.** `NSFileManager`目录内容方法\n\n| 方法 | 返回值 |\n|------|--------|\n| `-(NSArray*)contentsOfDirectoryAtPath:(NSString*)path\
  \ error:(NSError**)error` | 目录中文件的浅层列表 |\n| `-(NSArray*)subpathsOfDirectoryAtPath:(NSString*)path\
  \ error:(NSError**)error` | 包含目录下所有文件路径的深层列表 |\n| `-(NSDirectoryEnumerator*)enumeratorAtPath:(NSString*)path`\
  \ | 目录项枚举器 |\n\n`-enumeratorAtPath:`方法返回一个有状态的`NSDirectoryEnumerator`对象，用于迭代目录中的项目。枚举可以是浅层、深层或任意混合形式，具体通过在枚举对象上战略性地发送`-skipDescendents`消息实现。清单\
  \ 11-6 展示了遍历目录层级、处理所有`txt`文件但忽略具有`private`扩展名的任何目录内容的代码。\n\n\n\n### 递归处理目录内容 (Listing\
  \ 11-6)\n\n**Java**\n\n`scanDirectory(\"/Users/ann/Documents\");`\n\n…\n\n```java\n\
  void scanDirectory( File directory )\n{\n    File[] files = directory.listFiles();\n\
  \    for ( File file: files ) {\n        if (file.isFile()) {\n            if (file.getName().endsWith(\"\
  .txt\"))\n                scanTextFile(file);\n        }\n        else if (file.isDirectory())\
  \ {\n            if (!file.getName().endsWith(\".private\"))\n                scanDirectory(file);\n\
  \        }\n    }\n}\n\nvoid scanTextFile( File textFile )\n{\n    …\n}\n```\n\n\
  **Objective-C**\n\n`NSString *path = @\"/Users/ann/Documents\";`\n\n`NSDirectoryEnumerator\
  \ *e = [[NSFileManager defaultManager] enumeratorAtPath:path];`\n\n`while ( (path=[e\
  \ nextObject])!=nil ) {`\n\n`NSString *type = [[e fileAttributes] objectForKey:NSFileType];`\n\
  \n```objectivec\nif ([type isEqualToString:NSFileTypeRegular]) {\n    if ([[path\
  \ pathExtension] isEqualToString:@\"txt\"])\n        [self scanTextFile:path];\n\
  }\nelse if ([type isEqualToString:NSFileTypeDirectory]) {\n    if ([[path pathExtension]\
  \ isEqualToString:@\"private\"])\n        [e skipDescendents];\n}\n```\n\n…\n\n\
  ```objectivec\n- (void)scanTextFile:(NSString*)textFilePath\n{\n    …\n}\n```\n\n\
  Java 与 Objective-C 代码（如 Listing 11-6 所示）最显著的区别在于，Java 方案使用了递归方法，而线性循环的 Objective-C\
  \ 则将目录递归委托给了 `NSDirectoryEnumerator` 对象。\n\n### 文件属性\n\n文件的属性或元数据是关于文件的信息。Java 的\
  \ `java.io.File` 对象是获取文件属性的主要接口。它实现了多种特定的方法（即 `boolean isFile()`、`long lastModified()`、`long\
  \ length()`），用于描述文件的各种属性。\n\nObjective-C 有一个单一的 `-[NSFileManager fileAttributesAtPath:traverseLink:]`\
  \ 方法，该方法接受一个文件路径，并返回一个包含文件所有显著属性的不可变字典。`traverseLink:` 参数决定如果路径指定了一个符号链接文件应如何处理。如果为\
  \ `YES`，则返回的属性将是符号链接所指向文件的属性；如果为 `NO`，则属性描述的是符号链接文件本身。\n\n要检查某个特定属性，可以从字典集合中检索其值。Listing\
  \ 11-6 中已经演示了一个使用文件属性的示例。这些键是字符串常量，其值为 `NSNumber`、`NSDate` 或 `NSString` 对象。表 11-8\
  \ 列出了 `java.io.File` 中的属性方法及其 Objective-C 等价物。其中一些是方法，而另一些是属性字典的键。\n\n#### *表 11-8.\
  \ 文件属性键*\n\n| `java.io.File` 方法 | Objective-C 方法或键 | 描述                        \
  \             |\n| :----------------- | :------------------------- | :---------------------------------------\
  \ |\n| `exists()`         | `-[NSFileManager fileExistsAtPath:]` | 文件是否存在      \
  \                       |\n| `canRead()`        | `-[NSFileManager isReadableFileAtPath:]`\
  \ | 文件是否可读                           |\n| `canWrite()`       | `-[NSFileManager\
  \ isWritableFileAtPath:]` | 文件是否可写                           |\n|              \
  \      | `NSFilePosixPermissions`   | 包含用户、组和全局读/写/执行权限位的整数 |\n| `isFile()`    \
  \     | `NSFileType`               | 如果类型为 `NSFileTypeRegular` 则为真    |\n| `isDirectory()`\
  \    | `NSFileType`               | 如果类型为 `NSFileTypeDirectory` 则为真  |\n| `isHidden()`\
  \       | `LSCopyItemInfoForURL(…)`  | Launch Services API 提供显示信息        |\n| `lastModified()`\
  \   | `NSFileModificationDate`   | 文件最后修改的 `NSDate`                 |\n| `length()`\
  \         | `NSFileSize`               | 文件的逻辑长度                         |\n|  \
  \                  | `NSFileCreationDate`       | 文件创建的 `NSDate`               \
  \      |\n|                    | `NSFileOwnerAccountID`     | 文件所有者的账户编号       \
  \            |\n|                    | `NSFileOwnerAccountName`   | 文件所有者的账户名  \
  \                   |\n|                    | `NSFileGroupOwnerAccountID` | 文件组的组编号\
  \                       |\n|                    | `NSFileGroupOwnerAccountName`\
  \ | 文件组的组名                         |\n\n文件的类型是通过检查其 `NSFileType` 属性来确定的。该属性值将是以下之一：`NSFileTypeDirectory`、`NSFileTypeRegular`、`NSFileTypeSymbolicLink`、`NSFileTypeSocket`、`NSFileTypeCharacterSpecial`、`NSFileTypeBlockSpecial`\
  \ 或 `NSFileTypeUnknown`。关于项目显示名称的详细信息、文件的扩展名是否应对用户隐藏，或者整个文件是否应被隐藏，都可以通过各种 Launch\
  \ Services 函数获得。有关文件属性键的完整列表，请参阅 `NSFileManager` 文档。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n\n\n大多数文件属性可以通过`-[NSFileManager setAttributes:ofItemAtPath:error:]`方法进行修改。你需要提供一个包含要修改属性的字典以及文件路径。\n\
  \n某些属性（如`NSFileType`和`NSFileSize`）无法通过`-setAttributes:…`修改。安全策略可能会条件性地禁止修改其他属性，例如`NSFileOwnerAccountID`。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 11 章 ■ 文件\n\n如果所有属性更改均成功生效，该方法返回`YES`。如果返回`NO`，则表示更改结果不确定。\n\
  \n### 高级文件操作\n\nObjective-C 应用程序倾向于以整体方式处理文件，而不是采用更传统的做法：打开文件、读取部分或全部数据、然后再次关闭。应用类（如文档管理类）更倾向于将整个文件读取到单个数据对象中。文档文件的典型生命周期是：完整读取到单个`NSData`对象中、编辑、然后写回覆盖原始文件。\n\
  \n在现代化文件系统中，即使是执行像复制文件这样的简单操作，也很难“正确”完成。扩展元数据、访问控制列表、文件所有权、多个数据分支、显示属性以及远程文件复制协议，仅仅是复制一个文件时需要考虑的看似无穷无尽的细节中的一小部分。\n\
  \n为了减轻你的负担，Cocoa 框架提供了许多高级方法，这些方法能够正确地对整个文件执行各种原子操作。常用的方法列于表 11-9。\n\n**表 11-9.\
  \ 常见的高级文件操作**\n\n| 方法 | 描述 |\n| :--- | :--- |\n| `-[NSFileManager contentsAtPath:]`\
  \ | 返回整个文件的内容作为`NSData`对象 |\n| `+[NSData dataWithContentsOfFile:]` | 使用文件内容创建新的`NSData`对象\
  \ |\n| `+[NSData dataWithContentsOfMappedFile:]` | 创建映射到文件数据的虚拟内存区域 |\n| `-[NSData\
  \ writeToFile:atomically:]` | 将数据对象的内容写入文件 |\n| `+[NSString stringWithContentsOfFile:encoding:error:]`\
  \ | 使用文件内容创建新的`NSString`对象 |\n| `-[NSString writeToFile:atomically:encoding:error:]`\
  \ | 将字符串内容写入文件 |\n| `-[NSFileManager copyItemAtPath:toPath:error:]` | 复制文件 |\n|\
  \ `-[NSFileManager moveItemAtPath:toPath:error:]` | 移动或重命名文件 |\n| `-[NSFileManager\
  \ removeItemAtPath:error:]` | 删除文件 |\n| `-[NSFileManager contentsEqualsAtPath:andPath:]`\
  \ | 比较两个文件或两个目录的内容 |\n| `-[NSWorkspace performFileOperation:source:destination:files:tag:]`\
  \ | 移动、复制、链接或丢弃一组文件 |\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n##\
  \ 第 11 章 ■ 文件\n\n有很多方法可以将整个文件内容读取到`NSData`或`NSString`对象中，此处并未全部列出。如果表 11-9 中的方法不能满足需求，请查阅`NSData`和`NSString`文档中与这些方法类似但不完全相同的变体。接受`atomically:`参数的写入方法可以选择执行所谓的“安全保存”：它们将数据写入一个临时文件，将临时文件与目标文件交换，然后删除原始文件。如果在保存过程中发生任何意外，原始文件不会丢失。\n\
  \n`NSFileManager`中用于复制、移动、删除文件或比较两个文件的方法，同样适用于数据文件和目录。\n\n`NSWorkspace`的`-performFileOperation:source:destination:files:tag:`方法也可用于移动、复制或链接文件，具体取决于传递给`operation`参数的常量。这些操作等同于`NSFileManger`提供的方法。其一个特殊功能是`NSWorkspaceRecycleOperation`操作，该操作会将文件移动到废纸篓。将文件移动到废纸篓实际上是一个复杂的过程，最好由操作系统来处理。\n\
  \n`NSWorkspace`\n\n\n\n`NSWorkspace`类提供了许多高级文件和用户相关函数，这些函数仅在图形化应用程序的上下文中有效。例如，方法`-[NSWorkspace\
  \ iconForFile:]`会返回包含文件图标的`NSImage`对象，而`-[NSWorkspace launchApplication:]`则会启动另一个\
  \ GUI 应用程序。这些信息对于不在图形界面上下文中运行的守护进程或进程是不可用的。因此，你无法在守护进程中使用`NSWorkspace`，但可以使用`NSFileManager`。其他文件显示细节可通过本章末尾将介绍的\
  \ Launch Services API 获得。这类信息正是你需要使用`javax.swing.filechooser.FileSystemView`来获取的。\n\
  \n### 随机文件访问\n\n如果你需要更传统的打开-读取-写入-关闭文件接口，Cocoa 提供了`NSFileHandle`类，其功能大致相当于`java.io.RandomAccessFile`。`NSFileHandle`比`RandomAccessFile`更通用，因为它本质上是一个\
  \ BSD 文件描述符的对象包装器。POSIX 文件系统中的“文件”可以是数据文件、串行通信端口或管道。因此，`NSFileHandle`对象可用于与所有这些构造进行交互。基本的`NSFileHandle`方法列于表\
  \ 11-10 中。\n\n***表 11-10.** 文件方法*\n\n| 随机文件访问 | `NSFileHandle` | 描述 | `RandomAccessFile`\
  \ |\n| :--- | :--- | :--- | :--- |\n| `new` | `+fileHandleForReadingAtPath:` | 打开文件进行读取\
  \ | `RandomAccessFile(…,\"r\")` |\n| `new` | `+fileHandleForWritingAtPath:` | 打开文件进行写入\
  \ | `RandomAccessFile(…,\"w\")` |\n| `new` | `+fileHandleForUpdatingAtPath:` | 打开文件进行读写\
  \ | `RandomAccessFile(…,\"rw\")` |\n| `close()` | `-closeFile` | 关闭文件 | `close()`\
  \ |\n| `getFD()` | `-fileDescriptor` | 返回底层文件描述符 | `getFD()` |\n| `length()` | 使用`-seekToEndOfFile`或获取属性\
  \ | 获取文件长度 | `length()` |\n| `readFully(byte[])` | `-readDataOfLength:` | 读取指定数量的字节\
  \ | `readFully(byte[])` |\n| `read(byte[])` | `-availableData` | 读取尽可能多的可用数据 | `read(byte[])`\
  \ |\n| -- | `-readInBackgroundAndNotify` | 异步读取可用数据 | -- |\n| -- | `-readToEndOfFileInBackgroundAndNotify`\
  \ | 异步读取所有数据 | -- |\n| -- | `-waitForDataInBackgroundAndNotify` | 等待数据变为可用 | --\
  \ |\n| `getFilePointer()` | `-offsetInFile` | 当前文件位置 | `getFilePointer()` |\n| `seek(long)`\
  \ | `-seekToFileOffset:` | 设置文件位置 | `seek(long)` |\n| -- | `-seekToEndOfFile` |\
  \ 将文件位置设置为文件长度 | `seek(long)` |\n| `setLength()` | `-truncateFileAtOffset:` | 设置文件的逻辑长度\
  \ | `setLength()` |\n| `skipBytes()` | 使用`-seekToFileOffset:` | 跳过字节 | `skipBytes()`\
  \ |\n| `write(byte[])` | `-writeData:` | 写入字节 | `write(byte[])` |\n\n异步方法在派生出最终执行操作的新线程后会立即返回。操作完成后，你的应用程序会收到一个通知。对于读取操作，通知中包含获取的数据。通知将在第\
  \ 18 章中介绍。此外，还有专门用于`NSFileHandle`包装通信套接字文件时的异步通知。有关更多细节和发送的特定通知，请参阅`NSFileHandle`文档。\n\
  \n若需要更精细的控制，你可以转向使用 BSD 文件函数。你可以使用 BSD 函数执行所有文件操作，或者在需要执行特定操作时从`NSFileHandle`对象获取文件描述符。\n\
  \n### NSFileManager 委托\n\n与许多 Objective-C 对象一样，`NSFileManager`支持委托模式。你的委托对象可以预先拦截特定操作，或在发生某些故障时尝试恢复。表\
  \ 11-11 列出了文件管理器会发送给委托对象的消息（如果实现了这些方法）。\n\n`NSFileManager`同时使用持久委托和临时委托。设置为单例`NSFileManager`对象委托的对象会接收关于一般文件管理器操作的相关消息。少数`NSFileManager`方法接受一个临时委托对象，即其处理程序。这些方法是`-copyPath:toPath:handler:`、`-movePath:toPath:handler:`、`-removeFileAtPath:handler:`和`-linkPath:toPath:handler:`。在这些方法中，委托消息会发送给处理程序对象，而非全局委托。\n\
  \n***表 11-11.** NSFileManager 委托方法*\n\n| 方法 | 接收者 | 发送时机 |\n| :--- | :--- | :---\
  \ |\n| `-fileManager:willProcessPath:` | 处理程序 | 在尝试复制、移动、删除或创建文件的硬链接之前 |\n| `-fileManager:shouldCopyItemAtPath:toPath:`\
  \ | 委托 | 在复制文件之前 |\n| `-fileManager:shouldMoveItemAtPath:toPath:` | 委托 | 在移动文件之前\
  \ |\n| `-fileManager:shouldRemoveItemAtPath:` | 委托 | 在删除文件之前 |\n| `-fileManager:shouldLinkItemAtPath:toPath:`\
  \ | 委托 | 在创建硬链接之前 |\n| `-fileManager:shouldProceedAfterError:copyingItemAtPath:toPath:`\
  \ | 处理程序 | 在复制、移动、删除或链接文件出错后 |\n| `-fileManager:shouldProceedAfterError:copyingItemAtPath:toPath:`\
  \ | 委托 | 在复制文件出错后 |\n| `-fileManager:shouldProceedAfterError:movingItemAtPath:toPath:`\
  \ | 委托 | 在移动文件出错后 |\n| `-fileManager:shouldProceedAfterError:removingItemAtPath:`\
  \ | 委托 | 在删除文件出错后 |\n| `-fileManager:shouldProceedAfterError:linkingItemAtPath:toPath:`\
  \ | 委托 | 在创建硬链接出错后 |\n\n`should…AtPath:`方法在操作开始前发送，允许委托有机会禁止该操作发生。你可以用此方法来监控文件管理器的进度或筛选其处理的项目。`shouldProceedAfterError:…`方法在操作处理某个项目时遇到错误时发送，允许处理程序记录错误、从故障中恢复或忽略它。\n\
  \n### 其他 API\n\n本章主要集中于与文件系统交互的 Objective-C 类和方法。这些对于大多数用途来说已经足够，但许多重要功能只能通过 Core\
  \ Services 和 BSD API 获得。\n\n各个框架的功能之间存在大量重叠。例如，Core Services 框架提供了`FSCopyObjectSync`函数，其功能大致相当于`-[NSFileManager\
  \ copyItemAtPath:toPath:error:]`。然而，它还包括`FSCopyObjectAsync`，该函数会在其自身线程中执行复制操作。因此，你选择使用哪个\
  \ API 在很大程度上将取决于你需要的特殊功能或能力。\n\nCore Services 框架实际上是一个框架的集合，其中包含基本的文件 I/O 函数。其中值得关注的子框架是\
  \ Carbon Core 和 Launch Services 框架。Carbon 函数除了提供与经典 Macintosh OS 编写应用程序的向后兼容性外，还提供了基本的文件函数。Launch\
  \ Services 提供了当用户与文件系统交互时至关重要的函数。这包括文件的可见性信息、显示名称、图标、用户打开文档时将启动哪个应用程序、哪些应用程序能够打开给定文档等等。一些常见的\
  \ Core Services 函数列于表 11-12 中。通常，Carbon 框架中的文件系统函数都以“FS”开头，而 Launch Services 的函数则以“LS”开头。\n\
  \n\n\n"
- "# 注意\n\n经典 Macintosh OS 中的每个文件都有两个分支：数据分支和资源分支。虽然资源分支被假设具有特定结构，但基本事实是每个文件都可能是两个文件。当你使用\
  \ Carbon 函数打开文件时，不仅要指定要打开的文件，还要指定要打开哪个分支。该 API 后来被泛化以支持任意数量的文件分支。但实际上，只有最初的两个分支得到持续支持。数据分支是文件的未命名分支，也是\
  \ BSD 函数和 Cocoa 方法访问的分支。虚拟文件系统可以通过创建额外的、不可见的文件来容纳数据，从而在不原生支持多分支文件的文件系统上模拟多分支文件。BSD\
  \ 和 Cocoa 函数可以使用形式为 `file.data/rsrc` 的合成路径名来访问文件的资源分支。这种语法本质上是将每个数据文件视为一个目录，其中包含任意数量的命名分支文件。\n\
  \n## 表 11-12. 核心服务\n\n| 功能 | 描述 |\n|----------|-------------|\n| `FSPathMakeRef`\
  \ | 从 POSIX 路径创建一个 `FSRef` |\n| `FSRefMakePath` | 返回与 `FSRef` 等价的 POSIX 路径 |\n|\
  \ `FSMakeFSRefUnicode` | 从父 `FSRef` 和文件名创建一个新的 `FSRef` |\n| `FSCompareFSRefs` |\
  \ 判断两个 `FSRef` 结构是否指向同一实体 |\n| `FSGetCatalogInfo` | 获取文件的目录信息 |\n| `FSGetCatalogInfoBulk`\
  \ | 一次性获取多个文件的目录信息 |\n| `FSSetCatalogInfo` | 更改文件的目录信息 |\n| `FSGetVolumeInfo` |\
  \ 获取卷的信息 |\n| `FSSetVolumeInfo` | 更改卷的信息 |\n| `FSCreateFileUnicode` | 创建一个新的空文件\
  \ |\n| `FSDeleteObject` | 删除一个文件 |\n| `FSExchangeObjects` | 交换两个文件的数据内容 |\n| `FSCreateFork`\
  \ | 创建一个数据分支或资源分支 |\n| `FSOpenFork` | 打开一个数据分支或资源分支 |\n| `FSReadFork` | 从文件中读取数据\
  \ |\n| `FSWriteFork` | 向文件中写入数据 |\n| `FSGetForkPosition` | 获取当前文件位置 |\n| `FSSetForkPosition`\
  \ | 更改文件位置 |\n| `FSGetForkSize` | 获取文件的逻辑长度 |\n| `FSSetForkSize` | 更改文件的逻辑长度 |\n\
  | `FSFlushFork` | 将所有缓存的更改写入物理介质 |\n| `FSCloseFork` | 关闭文件 |\n| `FSNewAlias` | 为文件创建别名记录\
  \ |\n| `FSResolveAlias` | 获取别名记录最佳描述的文件 |\n| `FSResolveAliasFile` | 获取别名文件最佳描述的文件\
  \ |\n| `FSMatchAliasBulk` | 获取别名记录可能描述的所有文件的列表 |\n| `LSCopyDisplayNameForRef` |\
  \ 应向用户显示的文件名 |\n| `LSCopyItemInfoForRef` | 获取文件的显示属性（隐藏、捆绑包等） |\n| `LSGetExtensionInfo`\
  \ | 获取文件的扩展名和显示信息 |\n| `LSGetApplicationForItem` | 获取用户打开文件时将启动的应用程序 |\n\n许多核心服务函数接受或返回一个\
  \ `FSRef`（文件系统引用）数据结构。`FSRef` 是一种不透明且不可移植的结构，用于在文件系统中唯一标识一个文件。你不能解释该结构的内容（不透明部分），也不能在当前进程的内存地址之外使用该结构（不可移植部分）。因此，不要试图将其保存到磁盘或复制到另一个进程。没有用于初始化或销毁\
  \ `FSRef` 结构的调用，因此它们可以声明为未初始化的变量，然后设置、使用、按值复制，最终被遗忘。\n\n`FSRefMakePath` 和 `FSPathMakeRef`\
  \ 是将 C 路径字符串转换为 `FSRef` 结构以及反向转换的主要函数。\n\n清单 11-7 中的示例代码从一个 Objective-C 字符串对象中的\
  \ POSIX 路径开始，并将其转换为一个可移植的别名记录。该记录存储在由 `FSNewAlias` 函数分配的结构中。“句柄”只是一个指向指针的指针。该别名稍后被解析并转换回路径字符串，适用于\
  \ `NSFileManager` 消息。在此过程中，代码演示了如何在 Objective-C 路径字符串和 `FSRef` 结构之间进行转换。请注意，清单 11-7\
  \ 中的代码本可以通过使用 `FSNewAliasPath` 函数来节省将路径转换为 `FSRef` 的第一步，但此处包含此步骤是为了说明这种常见做法。\n\n\
  ## 清单 11-7. Objective-C 路径到别名\n\n```\nNSString *path = @\"/Users/james/Desktop\"\
  ;\nOSStatus err;\n\n// 将 POSIX 路径字符串转换为别名记录\nFSRef pathRef;\nAliasHandle aliasHndl;\n\
  err = FSPathMakeRef((const UInt8*)[path fileSystemRepresentation],&pathRef,NULL);\n\
  if (err!=noErr)\n    /* 错误处理 */;\nerr = FSNewAlias(NULL,&pathRef,&aliasHndl);\n\
  if (err!=noErr)\n    /* 错误处理 */;\n/* 成功 */\n...\n// 解析 aliasHndl 并获取其 POSIX 路径字符串\n\
  FSRef originalRef;\nBoolean aliasWasUpdated;\nerr = FSResolveAlias(NULL,aliasHndl,&originalRef,&aliasWasUpdated);\n\
  if (err!=noErr)\n    /* 错误处理 */;\nNSMutableData *pathBuffer = [NSMutableData dataWithLength:2048];\n\
  char *pathBytes = (char*)[pathBuffer bytes];\nerr = FSRefMakePath(&originalRef,(UInt8*)pathBytes,[pathBuffer\
  \ length]);\nif (err!=noErr)\n    /* 错误处理 */;\nNSFileManager *fm = [NSFileManager\
  \ defaultManager];\nNSString *originalPath = [fm stringWithFileSystemRepresentation:pathBytes\
  \ length:strlen(pathBytes)];\n/* 成功 */\n```\n\n表 11-12 仅列出了核心服务框架中实现的一小部分函数。列出的函数有多种变体，此外还有数百个其他函数。核心服务提供了获取和设置卷信息、挂载和弹出卷、接收文件系统通知、实时跟踪更改、记录光学介质以及对远程卷执行操作的函数——仅举几例。对于这些专用函数，Mac\
  \ OS X 文档是你最好的资源。\n\n在这些框架之下，是实现了底层文件系统的核心 BSD 函数。这些是自 UNIX 诞生以来就存在的传统 `open(...)`、`read(...)`、`write(...)`、`close(...)`\
  \ 函数。关于这个 API 已经有很多书籍，它被充分记录，并且网上有大量教程和资源——因此我无需赘述。如果你有一个 `NSFileHandle` 对象，并且需要对底层文件应用\
  \ BSD 函数，请向其发送 `-fileDescriptor` 消息。返回的整数是用于标识打开文件的 BSD 文件描述符令牌。如果你已经有了一个 BSD 文件描述符，可以使用\
  \ `[[NSFileHandle alloc] initWithFileDescriptor:fd]` 将其包装在 `NSFileHandle` 中。\n\n\
  ### 总结\n\n你现在应该对 Objective-C、Cocoa 框架和 Mac OS X 的基本文件 I/O 工具有了良好的基础理解。主要的区别在于使用字符串而不是\
  \ `java.io.File` 对象来操作路径，使用属性字典而不是文件对象属性，以及依赖 C 函数来实现高级功能。除此之外，你会发现基本的文件相关任务（读取数据文件、写入数据文件、删除文件）没有显著变化。\n\
  \n---\n\n"
- '# 第 12 章. 序列化


  序列化是将一个或多个对象的属性转换为一系列可传输的字节的过程，这些字节捕获了它们的内部状态和关系。序列化后的数据可以保存或传输到另一个进程或系统，之后这些数据可以用来重新创建原始的对象集。




  '
- "# Java 与 Objective-C 中的对象序列化\n\n对象序列化是 Java 的定义性特征之一，主要由 Java 运行时实现。秉承其极简主义特性，对象序列化并非\
  \ Objective-C 语言的原生组成部分。\n\n对象归档（序列化）是通过一组实现序列化过程的类，以及一个对象为了能被归档（序列化）而必须遵循的协议（接口）来完成的。\n\
  \nJava 最大的优势在于序列化是语言的一部分。对象的所有成员变量都会被自动序列化。而在 Objective-C 中，除非程序员提供相应代码，否则对象的任何部分都不会被序列化。除此之外，你为准备对象进行序列化、执行序列化和反序列化所需采取的步骤却惊人地相似。Java\
  \ 和 Objective-C 都允许你自定义序列化过程，并且都提供了处理向前兼容和向后兼容的机制。\n\n本章将介绍 Objective-C 归档（序列化）和\
  \ Objective-C 序列化——请注意不要与 Java 序列化混淆。本章会解释 Objective-C 提供的不同类型的归档，以及让你的类可归档所需采取的步骤。同时还会涵盖常见的归档问题及其解决方法。最后，将简要介绍对\
  \ Objective-C 序列化和 XML 文档（序列化的其他形式）的支持，以及如何创建对象的简单内存副本。\n\n### 归档\n\n你在 Java 中认为的序列化，在\
  \ Objective-C 中被称为归档：一个对象图被编码成非人类可读的二进制数据流。这种与架构无关的数据之后可以被解码，以实例化一个等价的对象图。Objective-C\
  \ 所谓的序列化略有不同，将在本章后面部分介绍。\n\n在 Java 中，主要负责序列化对象的类是 `java.io.ObjectOutputStream` 和\
  \ `java.io.ObjectInputStream`。它们获取对象引用和原始值，并将其“扁平化”到连续的 `java.io.OutputStream` 中，或者从\
  \ `java.io.InputStream` 中读取序列化数据并将其还原为对象。要使对象能够包含在流中，它必须实现 `java.io.Serializable`\
  \ 接口。Java 运行时使用内省机制来自动编码对象的实例变量。\n\n你可以通过使用 Java 的 `transient` 关键字或自定义序列化过程来影响这一行为。\n\
  \n在 Objective-C 中，实现序列化的类是 `NSCoder` 的子类。\n\n从概念上讲，`NSCoder` 同时实现了 `ObjectOutputStream`\
  \ 和 `ObjectInputStream` 的功能。`NSCoder` 基类实现了用于编码和解码对象的抽象方法，但 `NSCoder` 的子类可以选择仅实现其一半的功能。与\
  \ Java 类似，支持归档的 Objective-C 类必须遵循 `NSCoding` 协议（接口）。与 Java 不同的是，`NSCoding` 并非空协议；它声明了两个必须由类实现的方法：`-initWithCoder:`\
  \ 和 `-encodeWithCoder:`。`-encodeWithCoder:` 消息用于归档接收者。`-initWithCoder:` 是一个备用的 `-init`\
  \ 方法，用于初始化在解码过程中创建的新对象。\n\n#### 归档类型\n\nObjective-C 实际上提供了三种不同类型的归档，如表 12-1 所示。\n\
  \n**表 12-1. 归档类型**\n\n| 类型                 | NSCoder 类                        |\
  \ 描述                                                         |\n| --------------------\
  \ | -------------------------------- | ------------------------------------------------------------\
  \ |\n| 键值归档             | `NSKeyedArchiver`, `NSKeyedUnarchiver` | 使用键/值对来归档对象属性。这是归档文档数据或其他持久化对象的首选方法。\
  \ |\n| 顺序归档             | `NSArchiver`, `NSUnarchiver`     | 通过按特定顺序写入属性值来归档对象。作为持久化存储格式，其使用已被弃用。\
  \ |\n| 分布式对象           | `NSPortCoder`                    | 使用顺序编码来归档对象，用于与其他线程、进程和远程系统交换。\
  \ |\n\n键值归档会将每个属性值与程序员分配的“键”字符串关联起来。\n\n\n\nJava 序列化与之类似，但键始终是成员变量的名称。这是一种特别灵活且健壮的格式，能够容忍类定义的变更。通过使用键，属性在数据流中的编码顺序无关紧要。这允许你添加新属性或重新排序现有属性，而不会破坏与使用旧版本类创建的存档的兼容性。你还可以提供前向兼容性，允许旧版本的应用程序解码由新版本写入的存档。键控归档会产生更多的序列化数据，但最终更加灵活和稳定。因此，它是文档数据或任何旨在存储在持久化介质上以便后续重构的对象集的推荐归档格式。\n\
  \n顺序归档会以预定顺序将未修饰的值编码到数据流中。不使用属性名称或键来标识这些值，也不包含任何类型信息。要重建对象，必须按相同的顺序解码这些值。虽然快速且紧凑，但数据格式是“脆弱的”。任何对值的顺序、数量或类型的更改都会使其与不同版本创建的归档数据流不兼容。Objective-C\
  \ 通过使用类版本来解决这个问题。较新版本的类可以识别并吸收旧版本创建的归档数据。虽然提供了向后兼容性，但它不提供前向兼容性，而且解决方案往往很笨拙。由于这些原因，不建议将顺序归档用于文档数据或其他持久化对象。然而，这并不是说顺序归档没有被使用。\n\
  \n分布式对象使用顺序归档（加上一些额外的技巧）来与其他进程快速高效地交换对象。这些进程可能是同一进程中的另一个线程、同一系统上的另一个进程，或者位于地球另一端的一个远程系统。编码和解码技术保持不变，只是数据传输方式发生了变化。因为分布式对象使用了顺序归档，所以它也具有所有相同的缺点。然而，进程之间的版本差异通常是有限的，或者可以被严格控制。例如，客户端应用程序可能会启动一个辅助进程并使用分布式对象与之通信。该辅助可执行文件是应用程序资源包的一部分，因此保证包含客户端正在使用的类的相同版本——这使得数据兼容性变得无关紧要。\n\
  \n关于 Objective-C 归档的文档会不厌其烦地重复，顺序归档已被弃用，你应该改用键控归档。这对于打算存储在文档文件、偏好设置或其他持久化位置的数据模型对象来说是正确的。然而，分布式对象使用了顺序归档。要在分布式环境中使用你的对象，你的类必须实现顺序归档，并且理解分布式对象需要牢固掌握归档技术。本章将解释如何实现这两种归档。区分分布式对象与普通顺序归档的特性将在第\
  \ 13 章中描述。\n\n#### 归档编码器\n\n使用归档编码器类来编码和解码对象与 Java 中的做法并没有太大不同。代码清单 12-1 展示了在 Java\
  \ 和 Objective-C 中如何对一个对象进行归档（序列化）和解归档。\n\n**代码清单 12-1.** 归档和解归档一个对象\n\n**Java**\n\
  \n```\nObject something = …\nByteArrayOutputStream outStream = null;\nObjectOutputStream\
  \ objectEncoder = null;\ntry {\n    outStream = new ByteArrayOutputStream();\n \
  \   objectEncoder = new ObjectOutputStream(outStream);\n    objectEncoder.writeObject(something);\n\
  \    objectEncoder.close();\n}\ncatch (IOException ioException) {\n    ioException.printStackTrace();\n\
  }\nbyte[] bytes = outStream.toByteArray();\n…\n```\n\n\n\n```java\nByteArrayInputStream\
  \ inStream = null;\n\nObjectInputStream objectDecoder = null;\n\ntry {\n\ninStream\
  \ = new ByteArrayInputStream(bytes);\n\nobjectDecoder = new ObjectInputStream(inStream);\n\
  \nsomething = objectDecoder.readObject();\n\nobjectDecoder.close();\n\n}\n\ncatch\
  \ (Exception exception) {\n\nexception.printStackTrace();\n\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- '# 第 12 章 ■ 序列化


  ## **Objective-C**


  ```objc

  id something = …;


  NSData *bytes = [NSKeyedArchiver archivedDataWithRootObject:something];


  …


  something = [NSKeyedUnarchiver unarchiveObjectWithData:bytes];

  ```


  清单 12-1 中的 Objective-C 代码尤为简洁，因为`NSKeyedArchiver`和`NSKeyedUnarchiver`提供了便捷方法，可以创建临时编码器对象，对单个对象进行编码或解码，并返回结果。此外还有一对方法可以直接将数据写入或读取到文件。清单
  12-2 中的 Objective-C 代码更接近清单 12-1 中的 Java 代码。如果你需要在编码或解码任何对象之前自定义编码器，或者需要编码多个根对象，则应使用此形式。


  ### 清单 12-2. 归档和解档多个对象


  ```objc

  id something = …;


  id somethingElse = …;


  NSKeyedArchiver *archiver;


  NSMutableData *bytes = [NSMutableData data];


  archiver = [[NSKeyedArchiver alloc] initForWritingWithMutableData:bytes];


  // 在此处自定义 |archiver|...


  [archiver encodeObject:something forKey:@"Something"];


  [archiver encodeObject:somethingElse forKey:@"Alternate"];


  [archiver finishEncoding];


  // |bytes| 现在包含编码后的对象流


  …


  NSKeyedUnarchiver *unarchiver;


  unarchiver = [[NSKeyedUnarchiver alloc] initForReadingWithData:bytes];


  // 在此处自定义 |unarchiver|...


  something = [unarchiver decodeObjectForKey:@"Something"];


  somethingElse = [unarchiver decodeObjectForKey:@"Alternate"];


  [unarchiver finishDecoding];

  ```


  #### 归档与文档


  `NSDocument`类设计为与归档紧密配合，为你的应用实现一个简单且无缝的文档存储方案。基本概念是，你的文档数据模型将包含一个可归档对象的对象图。为了将文档保存到文件中，这些对象会被归档成一个`NSData`对象，然后写入磁盘。若要重新打开文档，文档的数据文件会被读入一个新的`NSData`对象，然后解档以重新创建文档的数据模型。


  清单 12-3 演示了`NSDocument`对象的最小化实现，它能够将内容读写到文档文件中。这一小段“胶水”代码就是实现 Cocoa 应用中所有标准文档命令（打开…、保存、另存为…、还原）所需的全部内容。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


