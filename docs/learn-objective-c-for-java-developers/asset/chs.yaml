  ```\n\n**Objective-C 访客：**\n```\n$ ./Guest --mach\n正在通过 Mach 端口连接到迎宾器 'ObjCGreeter'\n\
  <Guest: 0x1014bc0> 听到 \"很高兴见到你，<Guest: 0x1014bc0>！\"\n迎宾器的最终回应是 \"很荣幸为您服务。\"\n```\n\
  \nJava 和 Objective-C 的远程方法调用在概念上非常相似：服务器进程实例化一个实现服务的对象。一个或多个客户端进程连接到该服务并获取一个代理对象。代理对象并不实现服务器的任何代码。相反，代理会通过连接将任何方法调用转发到服务器进程，在那里实际执行所需的方法。任何参数和返回值也通过类似的方式进行编码并通过连接传输。\n\
  \nJava 和 Objective-C 的实现之间存在两个显著差异。第一个差异在于代理对象的创建方式。在 Java 中，你必须首先设计一个接口来定义服务器对象的方法，以及一个实现这些方法的类。然后，Java\
  \ 的 `rmic` 编译器会创建一个适合用作代理对象的特殊 `_Stub` 类。客户端进程获取该代理对象并调用其方法，这些方法会被转发回服务器执行。\n\n\
  Objective-C 提供了 `NSProxy` 类。这是一个非常特殊的类，因为它不是 `NSObject` 的子类。`NSObject` 和 `NSProxy`\
  \ 都是根类 `Object` 的子类。你所认为的大多数基类方法都是在 `NSObject` 中定义的，而不是 `Object`。因此，`NSProxy` 不继承任何方法——这使其非常适合其用途。\n\
  \n`NSProxy` 重写了第 6 章中描述的 `-forwardInvocation:` 方法。由于它几乎不实现任何方法，实际上你发送给它的任何方法最终都会调用\
  \ `-forwardInvocation:`。`NSDistantObject` 是 `NSProxy` 的一个可用子类，它将 `NSProxy` 与 `NSConnection`\
  \ 连接起来。任何发送给代理对象的消息都会被归档并通过 `NSConnection` 传输，由远程进程执行。通过利用 Objective-C 的未实现方法处理机制，可以针对任何\
  \ Objective-C 对象动态创建一个轻量级的代理对象。\n\n这意味着你可以通过 `NSConnection` 共享几乎任何对象。\n\n> **警告**：`NSProxy`\
  \ 对象并不包含其所代表对象的任何实例变量。为方便起见，代理对象指针常常被强制转换为实际对象类型的指针。注意不要使用指向代理的指针直接访问对象的任何实例变量，例如\
  \ `distantObject->value`。这几乎肯定会造成灾难性后果。请改用属性访问器（`[distantObject value]` 或 `distantObject.value`），因为这些访问器会被转换为消息；或者使用对象标识符类型（`id`），它本质上禁止了直接变量访问。在设计分布式对象时，请进行防御性编程。将所有实例变量设为\
  \ `@protected` 或 `@private`，并为所有公共属性提供访问器方法。\n\n另一个显著差异在于参数和返回值的交换方式。在 Java 中，所有参数和返回值通过副本传递，因此必须可序列化。这也意味着实现这些值的类必须存在于服务器中。在清单\
  \ 13-5 的示例输出中，找到 Java 和 Objective-C 中“Guest heard ‘I’m pleased to meet you, Guest!’”这一消息。在\
  \ Java 版本中，该消息由服务器进程发出。客户端语句 `greeter.greetGuest(guest)` 将 `Guest` 对象的副本序列化并发送给服务器。当\
  \ `Greeter` 执行 `guest.listen(\"I'm pleased to meet you, guest!\")` 时，`listen(…)`\
  \ 方法在服务器本地 `guest` 对象的副本上执行。\n\n在 Objective-C 的输出中，“Guest heard ‘I’m pleased to\
  \ meet you, Guest!’”这一消息由客户端发出。这是因为 Objective-C 的默认行为是按引用传递值。`[greeter greetGuest:guest]`\
  \ 语句将 `guest` 对象的引用传递给了服务器。服务器的 `-greetGuest:` 方法接收到一个指向客户端中 `Guest` 实例的代理 `NSDistantObject`。当服务器发送消息\
  \ `[guest listen:@\"I'm pleased to meet you, guest!\"]` 时，消息调用被截获、归档并发送回客户端执行，从而在客户端输出了该消息。\n\
  \n\n这使得你几乎可以将任何对象传递给远程方法。该对象无需是可归档的，你只需注意接收方会获得一个原始对象的代理，该代理由`NSDistantObject`自动创建。如果需要按拷贝传递对象，你可以让对象遵循`NSCoding`协议并实现序列化归档，如第\
  \ 12 章所述。\n\n你的对象还必须实现代码，以决定在何种情况下应通过拷贝或引用传递。所有这些内容都在“通过拷贝传递对象”部分中解释。\n\n## 建立连接\n\
  \n使用分布式对象有点像约会；你必须先找到合适的伴侣才能开始对话。你可以使用第三方媒人服务，或者如果你对对方的存在有第一手了解，也可以自己操作。\n\nJava\
  \ 的 `java.rmi.Naming` 类扮演了媒人的角色，允许服务器进程发布其存在。对于客户端而言，它定位所需的服务器进程并返回一个代理对象。\n\n通过该代理对象，客户端与服务器建立连接。\n\
  \n在 Objective-C 中，`NSConnection` 是核心角色，通过分布式对象连接两个进程。`NSConnection` 本身并不提供注册服务——尽管它为常用服务提供了便捷构造器。要建立服务器与客户端之间的连接，你必须创建一个使用两个单向\
  \ `NSPort` 对象或一个双向 `NSPort` 对象的 `NSConnection` 对象。`NSConnection` 使用 `NSPort` 对象向远程进程传输数据和调用信息。总体安排如图\
  \ 13-1 所示。实线箭头表示进程内的对象引用。空心箭头表示通过某个端口或套接字交换数据的方向。\n\n**图 13-1.** `NSConnection`\
  \ 中的对象\n\n如何创建 `NSConnection` 对象取决于你想要创建的连接类型。你可以直接创建 `NSPort` 对象，或从注册服务获取已连接的 `NSPort`\
  \ 对象，然后使用它们来创建 `NSConnection`。此外，还有一些工具可以为你创建预配置的 `NSConnection` 对象。表 13-2 列出了四种常见的\
  \ `NSConnection` 配置。\n\n**表 13-2.** 常见的 `NSConnection` 配置\n\n| 连接类型 | 如何创建 |\n|\
  \ --- | --- |\n| 同一进程中的两个对象 | 创建两个 `NSPort` 对象，然后使用它们创建 `NSConnection`。 |\n| 通过\
  \ Mach 端口的连接 | 让 `+[NSConnection connectionWithRegisteredName:host:]` 为你创建预配置的 `NSConnection`。\
  \ |\n| 通过 IP 套接字的连接 | 从 `NSSocketPortNameServer` 获取一个 `NSPort`，并用它创建 `NSConnection`。\
  \ |\n\n媒人的角色通常由某个 `NSPortNameServer` 子类扮演。每个名称服务器为特定类别的端口提供注册和发现服务。\n\n`NSMachBootstrapServer`\
  \ 注册 Mach 消息端口。Mach 端口的作用域限于当前进程的引导命名空间。`NSSocketPortNameServer` 在局域网中注册 TCP 端口。通过\
  \ `NSSocketPortNameServer` 注册的服务，本地网络上的任何计算机都可以访问。\n\n一旦 `NSConnection` 对象创建完成，服务器对象便被提供。这使得该对象对任何连接到服务器\
  \ `NSConnection` 的客户端可用。这是通过 `-[NSConnection setRootObject:]` 实现的。设置后，客户端向其 `NSConnection`\
  \ 发送 `-rootProxy` 消息，以获取服务器根对象的 `NSDistantObject`。客户端和服务器需要交换的任何其他对象，都是通过向服务器根对象发送消息来完成的。服务器可以随时更改其\
  \ `rootObject`，但这不会影响客户端先前获得的任何代理对象。\n\n\n\n### 该演示项目包含四种常见连接方式的示例。你可以通过命令的`mode`参数进行尝试。每种方式的说明如下。\n\
  \n## 线程间连接\n\n分布式对象的重点是进程间通信，但 DO 同样适用于同一进程内的线程间通信。使用 DO，可以相对轻松地创建一个在其自身线程中接收并执行消息的类，从而使功能强大的多线程服务像简单对象一样易于使用。它还为远程服务提供了灵活的部署环境。一个设计用于在远程计算机上运行的服务，同样可以轻松地在同一台机器的独立进程中运行，或者作为测试时的本地进程中的线程运行。客户端对所有这三种情况的接口将是相同的。\n\
  \n创建线程间连接很简单。创建两个通用的`NSPorts`来提供通信，并用它们来创建`NSConnection`对象，如代码清单 13-6 所示。要在演示项目中运行此示例，请执行命令`./Guest\
  \ --thread`。\n\n### 代码清单 13-6. 线程间 DO 连接\n\n```\nNSPort *receivePort = [NSPort port];\n\
  NSPort *sendPort = [NSPort port];\nNSConnection *clientConnection;\nNSConnection\
  \ *serverConnection;\n\nclientConnection = [NSConnection connectionWithReceivePort:receivePort\
  \ sendPort:sendPort];\nserverConnection = [NSConnection connectionWithReceivePort:sendPort\
  \ sendPort:receivePort];\n\n[serverConnection setRootObject:[Server new]];\n[serverConnection\
  \ runInNewThread];\n…\nid server = [clientConnection rootProxy];\n[server doSomething];\n\
  ```\n\n请注意，在`serverConnection`中端口顺序是相反的。客户端的接收端口连接到服务器的发送端口，反之亦然。`-runInNewThread`方法会分离出一个新线程，该线程运行自己的运行循环，并连接到连接上。这段代码有很多变体。有些程序员更喜欢创建自己的线程，将`NSPort`对象传递给它，然后让服务器对象创建其`NSConnection`。只要最终结果相同，采用哪种方式都无关紧要。\n\
  \n## Mach 端口连接\n\nMach 端口在单个用户范围内或与系统进程通信时，能提供极其高效的进程间通信。`NSMachPortNameServer`通过名称注册服务器进程，任何客户端都可以轻松连接到它。客户端和服务器的代码如代码清单\
  \ 13-7 所示。你可以在不同的终端窗口中执行演示命令`./Greeter --mach`和`./Guest --mach`来亲自尝试。\n\n### 代码清单\
  \ 13-7. 通过 Mach 端口的 DO 连接\n\n**服务器端**\n\n```\nNSConnection *connection = [NSConnection\
  \ defaultConnection];\n[connection setRootObject:[Server new]];\nif ([connection\
  \ registerName:@\"Server\"])\n    [[NSRunLoop currentRunLoop] run];\n```\n\n**客户端**\n\
  \n```\nNSConnection *connection = [NSConnection connectionWithRegisteredName:@\"\
  Server\"\n    host:nil];\nid server = [connection rootProxy];\n[server doSomething];\n\
  ```\n\n服务器创建其服务器对象，并用其公开名称进行注册。客户端使用便捷构造器`-connectionWithRegisteredName:host:`来获取一个`NSConnection`，该连接已预先配置了连接到注册名称为`@\"\
  Server\"`的 Mach 端口的`NSPorts`。\n\n服务器和客户端也有可能运行在同一进程的两个线程中。通过`NSMachBootstrapServer`注册的服务，其他进程可以访问，但同样也可以很容易地通过另一个线程进行连接。\n\
  \n## 网络连接\n\n当用于通过网络与对象交互时，分布式对象的灵活性尤为突出。`NSSocketPortNameServer`提供注册和发现服务，本地局域网中的所有系统均可访问，如代码清单\
  \ 13-8 所示。`./Greeter --network`和`./Guest --network`演示可以在同一台计算机上运行，也可以在同一网络的多台计算机上运行。\n\
  \n\n\n### 列表 13-8. 通过本地网络的分部对象连接\n\n**服务器**\n\n`NSSocketPort *port = [NSSocketPort\
  \ new];`\n`NSConnection *connection = [NSConnection connectionWithReceivePort:port\
  \ sendPort:nil];`\n`[connection setRootObject:[Server new]];`\n`if ([[NSSocketPortNameServer\
  \ sharedInstance] registerPort:port name:@\"Server\"])`\n`    [[NSRunLoop currentRunLoop]\
  \ run];`\n\n**客户端**\n\n`NSPort *port = [[NSSocketPortNameServer sharedInstance]\
  \ portForName:@\"Server\" host:@\"*\"];`\n`NSConnection *connection = [NSConnection\
  \ connectionWithReceivePort:nil sendPort:port];`\n`id server = [connection rootProxy];`\n\
  `[server doSomething];`\n\n网络版本只是对前述主题的细微变体。在此，服务器和客户端直接与 `NSSocketPortNameServer`\
  \ 交互，以直接注册和获取 `NSSocketPort` 对象。然后，这些端口被用于创建 `NSConnection` 对象。\n\n如果主机参数为 `@\"\
  *\"`，则 `NSSocketPortNameServer` 会在本地网络上定位任何已注册 `@\"Server\"` 服务的计算机。如果你希望连接到特定目标机器，主机参数也可以指定为具体的域名或\
  \ IP 地址。\n\n### BSD 管道连接\n\n最后一个例子稍微有点特殊。它演示了如何通过文件系统中的命名 BSD 管道“文件”来连接两个进程。管道文件看起来像数据文件，但实际上它是两个进程之间的实时缓冲区。写入该“文件”的字节会立即作为数据出现在另一个进程中，但永远不会写入任何存储设备。这展示了分布式对象的灵活性。本质上，任何能够连接到\
  \ `NSPort` 的通信管道都可以用来创建 `NSConnection`。由于你可以创建 `NSPort` 的自定义子类，因此可能性是无限的。\n\n演示该技术的项目命令是\
  \ `./Greeter --socket` 和 `./Guest --socket`。相关代码位于 `Greeter_main.m` 和 `Guest_main.m`\
  \ 文件中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 13 章 远近通信\n\n\
  ### 运行循环\n\n运行循环是驱动分布式对象的引擎。第 15 章会更详细地描述运行循环。\n\n在上述服务器示例中，最后一步是启动一个运行循环，用于处理其\
  \ `NSPort` 对象接收到的事件。为了接收和分发异步消息，`NSConnection` 必须由运行循环驱动。客户端发送的消息被推送到服务器的 `NSPort`\
  \ 中。运行循环逐一弹出这些消息，并将它们分发给根对象。\n\n很明显，服务器必须使用运行循环。不太明显的是，客户端也在运行一个运行循环。当客户端发送同步消息（即\
  \ `[server doSomething]`）时，它会将消息推送到 `NSPort`，然后启动一个临时运行循环来等待响应。服务器接收消息并通过向客户端发送回复消息来响应。客户端的临时运行循环从其\
  \ `NSPort` 中弹出回复，并将控制权返回给发送方。\n\n请再次查看列表 13-4 中 Greeter 和 Guest 示例的代码。假设 Greeter\
  \ 保存了对代理 Guest 对象的引用，并在 `-greetGuest:` 返回后使用该引用发送另一条 `-listen:` 消息。如果客户端进程没有运行运行循环，那么\
  \ `-listen:` 消息将永远停留在客户端的 `NSPort` 中而不会被执行。由于该方法是同步的，Greeter 对象将会挂起，等待 Guest 对象响应——或者至少会一直等到\
  \ `NSConnection` 超时。\n\n为了实现分布式对象之间的异步双向消息传递，两个进程都必须拥有活跃的运行循环。\n\n### 异步消息\n\n如前所述，通过\
  \ `NSProxy` 发送的消息可以是同步或异步的。要创建异步消息，请在方法接口的返回值前添加 `oneway` 关键字。\n\n```objc\n- (oneway\
  \ void)doSomething;\n```\n\n该消息将被发送到远程对象，但执行会立即返回到发送方。`oneway` 方法应始终具有 `void` 返回类型。如“运行循环”一节所述...\n\
  \n\n\n### 节\n\n如果客户端期望从服务器接收任何异步回复，则必须运行自己的运行循环。`oneway` 修饰符以及稍后介绍的其他参数修饰符，仅影响通过`NSProxy`对象发送的消息。常规\
  \ Objective-C 消息（即`[object doSomething]`）的行为不会改变。\n\n### 按副本传递对象\n\n在参数中传递或从消息返回的对象，可以通过副本或引用与远程对象交换。通过引用发送对象需要为该对象创建一个`NSDistantObject`代理，并将其发送给接收方。\n\
  \n要按副本传递对象，需要使用顺序归档技术对该对象进行归档，然后在接收端重构。这给该类提出了三个要求。首先，该类必须遵循`NSCoding`协议并实现顺序归档，如序列化章节所述。其次，该类的代码必须存在于接收进程中——否则，就无法实例化该对象。\n\
  \n最后，该类必须重写其`-replacementObjectForPortCoder:`方法，以决定何时应复制该对象，何时应通过引用传递。Objective-C\
  \ 可以通过`bycopy`和`byref`修饰符向该类提供提示。这些类型修饰符会增强方法实现中的对象参数和返回值，如下所示：\n\n```\n- (bycopy\
  \ ProjectStatus*)statusForProject:(byref Project*)project { …\n```\n\n### 演示项目\n\
  \n演示项目包含了`Guest`对象的`-replacementObjectForPortCoder:`方法的实现，如代码清单 13-9 所示。\n\n**代码清单\
  \ 13-9.** Guest 类的 `bycopy` 实现\n\n```\n- (id)replacementObjectForPortCoder:(NSPortCoder*)coder\n\
  {\n    if ([coder isBycopy])\n        return self;\n    return [super replacementObjectForPortCoder:coder];\n\
  }\n```\n\n从分布式对象的角度来看，所有对象都是按副本传递的。对象的归档副本是使用顺序归档生成的。如你在第 12 章中所学，`NSPortCoder`编码器首先会调用`-replacementObjectForPortCoder:`，以允许对象在归档中替换为另一个不同的对象。`NSObject`的默认实现会为该对象替换为一个`NSDistantObject`。\n\
  \n分布式对象框架不执行将原始对象替换为代理对象的操作；每个对象自行决定是复制自身还是提供一个代理对象。\n\n代码清单 13-9 中的代码根据方法定义中嵌入的提示，为`Guest`对象做出了按副本传递的决策。如果参数或返回值类型包含了`bycopy`关键字，那么用于归档该对象的`NSPortCoder`在收到`-isBycopy`消息时会返回`YES`。如果指定了`byref`修饰符或未指定任何修饰符，`-isBycopy`将返回`NO`。或者你也可以测试`-isByref`，它始终返回`!isBycopy`。\n\
  \n或者，你可以选择忽略编码器的建议，返回`self`、`[super replacmentObjectForPortCoder:coder]`或任何其他功能等效的替代对象。某些对象，如`NSString`，选择始终按副本发送自身，忽略任何`byref`提示。默认情况下，`NSObject`的子类始终通过引用发送自身，即使方法请求了`bycopy`。你的代码可以使用任何标准来做出决策。如果`NSPortCoder`通过网络连接到某个服务，对象可能会按副本发送自身；但如果连接到同一系统中的另一个进程，则可能会选择发送引用。\n\
  \n### 传递指针\n\n将 C 指针作为参数传递带来了另一个问题。指针不能按值复制——因为本地地址对接收进程毫无意义。也无法为远程结构创建等效的代理对象。分布式对象通过复制指针参数所指向的结构的值来解决这个问题——除非指针是`NULL`，在这种情况下，它只会向接收者发送`NULL`。\n\
  \n```\n- (void)rectToLocalCoordinates:(NSRect*)rectangle;\n```\n\n当`-rectToLocalCoordinates:`消息被发送给一个远程对象时，`NSRect`结构的内容会被逐字复制到远程进程，接收方获得的\
  \ C 指针指向由分布式对象分配的本地副本。当方法返回时，`NSRect`结构（可能已修改）的内容会被复制回发送方，临时副本则被销毁。\n\n这种方式效率不算特别高，但很安全。对于仅引用结构内容或忽略其原始内容的方法，Objective-C\
  \ 提供了表 13-3 中列出的参数修饰符。\n\n**表 13-3.** 指针参数类型修饰符\n\n| 修饰符 | 效果 |\n|---|---|\n| `in`\
  \ | 结构会被复制到接收方，但不会复制回发送方。 |\n| `out` | 结构不会被复制到接收方，但修改后的结构会在返回时复制回发送方。 |\n| `inout`\
  \ | 结构会被复制到接收方，然后在方法返回时再复制回来。此为默认行为。 |\n\n对于向接收方传递信息、且接收方不使用指针修改结构内容的参数，请使用`in`修饰符。示例方法如下：\n\
  \n```\n- (BOOL)isValidPoint:(in NSPoint*)inPoint;\n```\n\n对于用于指向一个未初始化结构、并由接收方填充其内容的参数，请使用`out`修饰符。示例方法如下：\n\
  \n```\n- (void)getSize:(out NSSize*)outSize;\n```\n\n`inout`修饰符是默认行为。包含它不会改变方法的行为，但会使你的意图更清晰。\n\
  \n> **警告** 结构通过副本发送给接收方。结构只能包含原始值。显而易见，它不能包含指向其他结构或对象的指针。如果结构如此复杂，则需将其重新设计为对象，或先转换为某种可移植格式，然后才能与分布式对象一起使用。\n\
  \n指针值修饰符也适用于方法的返回值。指向指针的指针参数也存在类似问题。这些问题以及其他特殊情况，在 *《Objective-C 2.0 编程语言》*¹ 的“远程消息传递”部分中有详细讨论。\n\
  \n### 是对象还是代理？\n\n`NSObject`协议定义了一个特殊方法`-isProxy`，用于确定某个对象是否实际上是`NSProxy`对象。如果该对象引用不是`NSObject`或其子类的实例，则此方法将返回`YES`。使用`-class`、`-className`、`-isMemberOfClass:`或`-isKindOfClass:`等方法无法判断对象是否为代理；代理只会将这些消息转发给原始对象，而原始对象会返回显而易见的答案。例如，使用`-isProxy`来判断直接访问对象的成员变量是否安全，如`if\
  \ (![character isProxy]) character->hitCount++`。\n\n### 网络\n\n有许多用于通过网络通信的类。其中值得提及的两个是：网络服务，它有助于在网络中注册和定位服务；以及\
  \ URL 加载系统，它实现了诸如 HTTP 和 FTP 等各种网络协议。\n\n#### 网络服务\n\nJava 中没有与网络服务完全对应的机制。它的工作方式有点像`java.rmi.Named`，即在局域网内发布服务，并使远程客户端能够轻松浏览和连接这些服务。然而，网络服务要通用得多。它构建在\
  \ Bonjour（也称为 Zeroconf）之上。前面演示过的`NSSocketPortNameServer`类，就是使用网络服务在网络中注册和查找分布式对象服务的。\n\
  \n网络服务主要有两个类。一个`NSNetService`对象代表一个单一的服务。\n\n---\n¹ Apple, Inc., *《Objective-C 2.0\
  \ 编程语言》*, http://developer.apple.com/documentation/Cocoa/Conceptual/ObjectiveC/Articles/ocRemoteMessaging.html,\
  \ 2009 年。\n\n\n\n与 `NSConnection` 类似，服务器和客户端进程各自创建一个 `NSNetService` 对象，用于发布服务或连接现有服务。`NSNetServiceBrowser`\
  \ 则扮演着“媒人”的角色。`NSNetServiceBrowser` 对象会帮助你的应用程序发现当前可用的服务。它可以描述所有可用的资源，搜索特定服务，并与它们建立连接。\n\
  \n使用网络服务需要经历三个操作阶段：\n\n1.  发布\n2.  发现\n3.  解析\n\n发布是指注册你的服务，使其能够被网络上的其他进程和计算机公开可见。你必须首先创建一个套接字（例如\
  \ `NSSocketPort`），客户端可以通过它与你的服务通信。然后，你创建一个 `NSNetService` 对象，连接到该端口，并描述你的服务。接着，通过向\
  \ `NSNetService` 对象发送 `-publish` 或 `-publishWithOptions:` 消息来发布服务。发布后，远程客户端就可以找到、连接并与你的服务通信。\n\
  \n使用 `NSNetServiceBrowser` 类来查找你网络上的服务。首先，创建一个 `NSNetServiceBrowser` 实例，然后配置它以查找你感兴趣的服务类型。浏览器会开始工作，并在发现服务时进行报告。\n\
  \n一旦通过浏览或其他方式了解到某个远程服务，最后一步就是解析它。同样，你需要创建一个 `NSNetService` 对象，并用定位该远程服务所需的信息来配置它。然后，向其发送一条\
  \ `-resolveWithTimeout:` 消息。随后，`NSNetService` 对象会着手建立连接。成功后，`-getInputStream:outputStream:`\
  \ 消息会返回输入和输出流对象，通过这些对象，你可以与远程服务进行通信。\n\n网络服务的发布和发现可能非常耗时，并且新的服务可能会自发地出现和消失。因此，几乎所有网络服务的方法都是异步执行的。结果通过你提供的委托对象进行传递。例如，`-resolveWithTimeout:`\
  \ 消息会立即返回，但会在后台启动解析过程。完成后，你的委托对象会收到 `-netServiceDidResolveAddress:` 消息；如果解析失败，则会收到\
  \ `-netService:didNotResolve:` 消息。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n《`NSNetServices Programming Guide`》详细介绍了网络服务的工作原理，并提供了大量的代码示例。\n\n#### URL 加载\n\
  \nJava 和 Objective-C 都提供了一组类，用于协助访问由统一资源定位符（URL）标识的服务和实体。两者都内置了对 HTTP、HTTPS、FTP\
  \ 和 FILE 协议的支持。URL 协议通常很复杂，但这些类巧妙地封装了这些复杂性，使你能够轻松地与它们交互。这使得只需几行代码，即可向 URL（例如 `http://www.apress.com`）发送\
  \ Web 服务器请求并接收响应。\n\nJava 和 Objective-C 中 URL 类的组织和角色几乎相同，尽管 Objective-C 的粒度更细一些。`NSURL`（`java.net.URL`）类定义了一个单一的\
  \ URL。`NSURLConnection`（`java.net.URLConnection`）管理与 URL 所描述的远程服务的通信。Objective-C\
  \ 将 Java 单一的 `URLConnection` 对象分解为三个对象：`NSURLConnection` 只关心连接的状态；请求参数封装在 `NSURLRequest`\
  \ 中；服务的回复包含在 `NSURLResponse` 中。任何数据——请求或响应的“主体”——都通过流或事件进行交换。\n\n本节将介绍几种常见的 URL\
  \ 加载技术，以及它们与类似 Java 实现的对比。\n\n##### 简单 URL 请求\n\n最简单的 URL 交互就是获取 URL 的内容。两种语言都能轻松实现这一点，如列表\
  \ 13-10 所示。\n\n**列表 13-10. 简单 URL 请求**\n\n**Java**\n\n```\ntry {\n    URL url =\
  \ new URL(\"http://www.apress.com/\");\n    Reader inStream = new InputStreamReader(url.openStream());\n\
  \    int c;\n    System.out.print(\"URL Response: \");\n    while ((c=inStream.read())\
  \ != -1)\n        System.out.print((char)c);\n    inStream.close();\n} catch (Exception\
  \ e) {\n    e.printStackTrace();\n}\n```\n\n**Objective-C**\n\n```\nNSURL *url =\
  \ [NSURL URLWithString:@\"http://www.apress.com/\"];\nNSURLRequest* request = [NSURLRequest\
  \ requestWithURL:url];\nNSURLResponse *response = nil;\nNSData *data = [NSURLConnection\
  \ sendSynchronousRequest:request returningResponse:&response\n                 \
  \                                 error:NULL];\nNSLog(@\"URL response: %@\",[NSString\
  \ stringWithCString:[data bytes]\n                                             \
  \ length:[data length]]);\n```\n\nJava 代码利用了便捷方法 `java.net.URL.openStream()`，该方法会创建一个\
  \ `URLConnection` 对象，发起请求，并返回一个连接到响应流的 `InputStreamReader` 对象。Objective-C 代码的设置稍微复杂一些，首先需要创建一个\
  \ `NSURLRequest` 对象。完成这一步后，整个事务通过使用 `+[NSURLConnection sendSynchronousRequest:returningResponse:error:]`\
  \ 类方法执行。会创建一个临时的 `NSURLConnection` 对象，发送请求，并将响应通过两个对象返回：一个包含回复头部的 `NSURLResponse`\
  \ 对象和一个包含响应主体的 `NSData` 对象。\n\n##### 异步 URL 请求\n\nJava 中的 URL 交互本质上是同步的。如果加载的 URL\
  \ 数据需要很长时间才能获取到，列表 13-10 中的代码将会阻塞，直到数据接收完毕。如果加载 URL 所花费的时间无关紧要，这可能是合适的。但通常情况并非如此。为了避免挂起主应用程序，可以将列表\
  \ 13-10 中的代码放在其自己的线程中执行。在 Java 中，这是首选的解决方案。\n\n在 Objective-C 中，使用 `NSURLConnection`\
  \ 的自然方式是异步的。大多数 `NSURLConnection` 方法都会启动异步操作——同步操作反而是特例。就像本章前面描述的 `NSStream` 一样，`NSURLConnection`\
  \ 通过向其委托发送消息来报告其进度。异步读取 URL 内容的代码如列表 13-11 所示。\n\n**列表 13-11. 异步 URL 请求**\n\n```\n\
  @interface URLGetter : NSObject {\n    NSMutableData *body;\n    NSURLConnection\
  \ *connection;\n}\n- (void)loadURL:(NSString*)string;\n@end\n\n@implementation URLGetter\n\
  - (void)loadURL:(NSString*)string\n{\n    NSURL *url = [NSURL URLWithString:string];\n\
  \    NSURLRequest *request = [NSURLRequest requestWithURL:url];\n    // 分配缓冲区来存储接收到的数据\n\
  \    body = [NSMutableData data];\n    connection = [NSURLConnection connectionWithRequest:request\
  \ delegate:self];\n}\n\n- (void)connection:(NSURLConnection*)connection didReceiveData:(NSData*)data\n\
  {\n    [body appendData:data];\n}\n\n- (void)connection:(NSURLConnection*)connection\n\
  didReceiveResponse:(NSURLResponse*)response\n{\n    // 成功接收到响应头部和元数据\n    // 每个新主体之前都会有连续的响应，因此重置缓冲区\n\
  \    [body setLength:0];\n}\n\n- (void)connectionDidFinishLoading:(NSURLConnection*)connection\n\
  {\n    // URL 加载完成；NSURLConnection 已关闭，|body| 已完成\n}\n\n- (void)connection:(NSURLConnection*)connection\
  \ didFailWithError:(NSError*)error\n{\n    // URL 加载失败；原因在 |error| 中\n}\n@end\n\
  ```\n\n\n\n"
- "# 排版后的文档\n\n`+connectionWithRequest:delegate:`便利构造器创建了一个`NSConnection`对象，并立即发起请求。响应通过一系列事件传达给委托对象。`NSURLConnection`必须在活动运行循环的上下文中创建。\n\
  \n**提示** 当从`NSURLRequest`创建`NSURLConnection`时，连接会深拷贝请求对象。后续对请求的修改不会影响连接。`NSURLRequest`对象可以立即修改并用于创建另一个连接，而不会影响任何先前创建的连接。\n\
  \n一旦初始标头和元数据被读取并组装成`NSURLResponse`对象，委托会收到`-connection:didReceiveResponse:`消息。随后，零次或多次`-connection:didReceiveData:`消息将剩余内容传递给委托。最后，`-connectionDidFinishLoading:`消息表示事务完成。在任何时候，收到`-connection:didFailWithError:`消息表示请求未成功完成，并说明原因。\n\
  \n如果服务将请求重定向到另一个 URL（这本质上会重新启动连接），则可能会收到多次`-connection:didReceiveResponse:`消息。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 13 章 ■ 近远程通信\n\n#####\
  \ 写入 URL\n\n到目前为止，只处理了最基本的请求。要定义更复杂的请求，或向请求包含额外数据，需要更细粒度的对象构造。清单 13-12 展示了一个示例，该示例将包含表单数据的字节数组发布到\
  \ HTTP 服务器。\n\n**清单 13-12\\. 向 HTTP 服务器发布表单数据**\n\n**Java**\n\n```java\npublic byte[]\
  \ submitForm( byte[] formData )\n{\n    byte[] response = null;\n    try {\n   \
  \     URL url = new URL(\"http://localhost/form.jsp\");\n        HttpURLConnection\
  \ connection = (HttpURLConnection)url.openConnection();\n        connection.setDoOutput(true);\n\
  \        connection.setRequestMethod(\"POST\");\n        // (configure any additional\
  \ headers or properties here)\n        OutputStream requestStream = connection.getOutputStream();\n\
  \        requestStream.write(formData);\n        InputStream responseStream = connection.getInputStream();\n\
  \        ByteArrayOutputStream buffer = new ByteArrayOutputStream();\n        int\
  \ c;\n        while ( (c=responseStream.read()) != -1)\n            buffer.write(c);\n\
  \        response = buffer.toByteArray();\n    } catch (Exception e) {\n       \
  \ e.printStackTrace();\n    }\n    return (response);\n}\n```\n\n**Objective-C**\n\
  \n```objective-c\n- (NSData*)submitForm:(NSData*)formData\n{\n    NSURL *url = [NSURL\
  \ URLWithString:@\"http://localhost/form.jsp\"];\n    NSMutableURLRequest* urlRequest\
  \ = [NSMutableURLRequest requestWithURL:url];\n    [urlRequest setHTTPMethod:@\"\
  POST\"];\n    [urlRequest setHTTPBodyStream:[NSInputStream inputStreamWithData:formData]];\n\
  \    // (configure any additional headers or properties here)\n    NSURLResponse\
  \ *response = nil;\n    NSData *responseData = [NSURLConnection sendSynchronousRequest:urlRequest\n\
  \                                                returningResponse:&response\n \
  \                                                           error:NULL];\n    return\
  \ responseData;\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  ## 第 13 章 ■ 近远程通信\n\nObjective-C 和 Java 之间的两个显著区别如下：\n\n- 在 Java 中，`URLConnection`对象用于配置请求。在\
  \ Objective-C 中，你需要创建`NSMutableURLRequest`来自定义请求。\n- Java 的`URLConnection`创建连接到请求数据流和响应数据流的`OutputStream`和`InputStream`对象。Objective-C\
  \ 则完全相反。它不是获取`OutputStream`来写入请求数据，而是提供一个输入流对象，`NSURLConnection`将读取该对象以获取请求数据。\n\
  \n##### 下载 URL\n\nCocoa 框架提供了一个便捷的实用类，专门用于从 URL 下载文件。\n\n`NSURLDownload`对象的构造方式与`NSURLConnection`对象非常相似，但除了请求对象外，还需要提供目标文件路径。下载将自动启动，并根据成功与否向你的委托对象发送`-downloadDidFinish:`消息。\n\
  \n\n\n-   否则会收到`download:didFailWithError:`消息。一个简单下载器类的代码如代码清单 13-13 所示。\n\n## 代码清单\
  \ 13-13\\. 简易文件下载器类\n\n```\n@interface FileDownloader : NSObject\n\n- (void)downloadURL:(NSString*)source\
  \ toPath:(NSString*)destination;\n\n@end\n\n@implementation FileDownloader\n\n-\
  \ (void)downloadURL:(NSString*)source toPath:(NSString*)destination\n{\n    NSURL\
  \ *url = [NSURL URLWithString:source];\n    NSURLRequest *urlRequest = [NSURLRequest\
  \ requestWithURL:url];\n    NSURLDownload *download = [[NSURLDownload alloc] initWithRequest:urlRequest\
  \ delegate:self];\n    [download setDestination:destination allowOverwrite:YES];\n\
  \    // 下载自动开始\n}\n\n- (void)download:(NSURLDownload*)download didFailWithError:(NSError*)error\n\
  {\n    // 下载失败\n}\n\n- (void)downloadDidFinish:(NSURLDownload*)download\n{\n   \
  \ // 下载成功完成\n}\n\n@end\n```\n\n`NSURLDownload` 还支持许多其他委托方法，用于监控下载进度、响应身份验证挑战以及交互式地决定目标文件路径。它还通过\
  \ `-initWithResumeData:delegate:path:` 构造器支持恢复中断的下载。\n\n## 缓存和 Cookie\n\n与 Java\
  \ 类似，Objective-C 的 URL 连接支持本地缓存和 Cookie。在 Java 中，通过`java.net.URLConnection.setUseCaches(boolean)`配置缓存，Cookie\
  \ 则自动处理。\n\nObjective-C 提供了一个进程级缓存管理器，可将频繁请求的数据保存在内存或磁盘中以提高性能。你可以通过两种方式影响请求对缓存的使用：一是在创建`NSURLRequest`时指定`NSURLRequestCachePolicy`，二是在发送请求前设置`NSMutableURLRequest`的策略。策略可以选择使用最佳默认设置（推荐），或者从多种策略中选取，例如忽略所有缓存数据或仅响应缓存数据。更复杂的缓存管理可以通过在`NSURLConnection`委托对象中实现`-connection:willCacheResponse:`方法来完成。在将接收到的任何数据存入缓存之前，会向委托发送此消息。委托可以允许原样存储、阻止存储，或提供修改后的数据替代存储。\n\
  \nCookie 由系统范围的 Cookie 存储服务自动提供。默认情况下，会根据用户选择的安全策略处理 Cookie。你可以通过创建`NSMutableURLRequest`对象并发送`[request\
  \ setHTTPShouldHandleCookies:NO]`来禁用单个请求的 Cookie。你也可以更改 Cookie 策略，但这会改变系统上所有进程的策略。\n\
  \n### 总结\n\nObjective-C 提供了多种通信技术，反映了现代应用面临的各种通信问题。从简单的通知到分布式对象，你选择的解决方案取决于你要解决的问题类型。在大多数情况下，Objective-C\
  \ 的解决方案与你熟悉的 Java 方案相似，尽管实现细节可能有显著差异。\n\n---\n\n## 第 14 章：异常处理\n\nObjective-C 的异常处理能力与\
  \ Java 几乎相同。自然地，Objective-C 对异常的处理更加随意，没有 Java 那样的严格要求。你可以像在 Java 中一样使用 Objective-C\
  \ 异常来设计和编写代码，也可以完全忽略它们，或者采取折中方案。本章将简要比较 Objective-C 和 Java 异常处理的相似之处（两者有很多共同点），然后解释一些细微的差异。\n\
  \n后续章节将讨论断言和异常的替代方案。\n\n### 使用异常\n\n在 Objective-C 和 Java 中，创建、抛出和捕获异常的方式几乎相同。代码清单\
  \ 14-1 展示了一些简单的异常处理。\n\n### 代码清单 14-1\\. 异常处理\n\n**Java**\n\n```\npublic class Tosser\n\
  {\n    public void catcher( ) throws Exception\n    {\n        try {\n         \
  \   System.out.println(\"Tosser.catcher(): trying\");\n            thrower();\n\
  \        } catch ( SpecificException se ) {\n            System.out.println(\"caught\
  \ SpecificException: \"+se);\n        } catch ( Exception e ) {\n            System.out.println(\"\
  caught Exception: \"+e);\n            throw e;\n        } finally {\n          \
  \  System.out.println(\"Tosser.catcher(): finished\");\n        }\n    }\n\n   \
  \ public void thrower( ) throws Exception\n    {\n        throw new Exception(\"\
  thrower() does not work\");\n    }\n}\n```\n\n**Objective-C**\n\n```\n@interface\
  \ Tosser : NSObject\n- (void)catcher;\n- (void)thrower;\n@end\n\n@implementation\
  \ Tosser\n- (void)catcher\n{\n    @try {\n        NSLog(@\"%s trying\",__func__);\n\
  \        [self thrower];\n    } @catch ( SpecificException *se ) {\n        NSLog(@\"\
  caught SpecificException: %@\",se);\n    } @catch ( NSException *e ) {\n       \
  \ NSLog(@\"caught NSException: %@\",e);\n        @throw e;\n    } @finally {\n \
  \       NSLog(@\"%s finished\",__func__);\n    }\n}\n\n- (void)thrower\n{\n    @throw\
  \ [NSException exceptionWithName:@\"MyException\"\n                            \
  \      reason:@\"-thrower does not work\"\n                                userInfo:nil];\n\
  }\n@end\n```\n\n两者的相似之处远比差异更为显著。具体来说，`@try`、`@catch`和`@finally`块与 Java 中的`try`、`catch`和`finally`块具有相同的语法、顺序和执行流程。你可以像使用\
  \ Java 的`throw`语句一样，使用 Objective-C 的`@throw`指令抛出异常对象。捕获的异常可以以相同方式进行处理或重新抛出。\n\n\
  如果你希望像在 Java 中那样在 Objective-C 中使用异常，完全可以。Objective-C 异常的能力与 Java 非常接近，你很可能不会注意到任何显著差异。然而，确实存在一些差异——主要在于\
  \ Objective-C 允许而你 Java 不允许的操作。下一节将详细解释这些差异以及它们可能对你的设计产生的影响。\n\n## 异常处理差异\n\nObjective-C\
  \ 对异常的处理比 Java 宽松得多。有人可能会认为它过于宽松，但这属于学术讨论。Java 与 Objective-C 异常处理的大多数差异都超出了 Java\
  \ 的允许范围。\n\n### 无捕获或声明要求\n\nJava 语言有“捕获或声明”规则，要求你要么声明方法可能抛出的异常，要么在方法体内捕获这些异常。Objective-C\
  \ 不会检查你的代码是否捕获了异常，甚至没有用于声明方法抛出异常的语法。这主要是因为（由于类方法的动态特性）它无法预知这些信息。用 Java 的术语来说，所有\
  \ Objective-C 异常都属于未检查异常。\n\n### 可抛出任意对象\n\nObjective-C 可以抛出或捕获任何对象，而 Java 要求`throw`语句的对象必须实现`Throwable`接口。如果仅仅一个`NSString`对象就足以传达你关于异常的所有信息，那么以下代码完全有效：\n\
  \n```\n@throw @\"出了点问题\";\n```\n\n例如，当`NSOperation`失败时，你的代码可以抛出一个异常。但与其抛出一个引用该`NSOperation`的`NSException`，你不如直接抛出`NSOperation`对象本身。具体抛出什么当然取决于你想要实现的目标，但你不必局限于`NSException`及其子类。\n\
  \n\n\n> **注意**  \n说到子类，`NSException` 的子类非常少。在 Java 中，你可以通过继承 `java.lang.Exception`\
  \ 来创建不同类型的异常。而 `NSException` 对象有一个 name 属性，通常通过名称而非类名来识别异常类型。这并不是说你不应该继承 `NSException`。我经常这样做，但仅限于是为了向\
  \ `NSException` 对象添加功能，或者创建一个大类别的异常。Cocoa 框架定义了一些常用的异常名称，你可以在 *Cocoa 异常编程主题介绍*[¹]\
  \ 中找到。\n\n如果你可以抛出任何类型的对象，你可能会好奇 `NSException` 类具体扮演什么角色。首先，`NSException` 是专门为传达异常细节而构建的。它包含有用的信息，例如堆栈跟踪和异常描述，并且可以参与本节后面介绍的非处理异常机制。最初，`NSException`\
  \ 是抛出异常的唯一机制。详细信息请参见本章末尾的 *旧版异常* 一节。正因为如此，许多较旧的框架只能捕获 `NSException` 类型的异常。如果你抛出的对象可能不会被你的代码捕获，请确保它是一个\
  \ `NSException` 对象。\n\n[¹]: Apple, Inc., *Cocoa 异常编程主题介绍*, [`developer.apple.com/documentation/Cocoa/Conceptual/Exceptions/`](http://developer.apple.com/documentation/Cocoa/Conceptual/Exceptions/),\
  \ 2007.\n\n---\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 14 章\
  \ ■ 异常处理\n\n### 重抛异常\n\nObjective-C 包含一种便捷的语法，用于重抛在 `@catch` 块中捕获的异常，如代码清单 14-2\
  \ 所示。\n\n**代码清单 14-2.** 重抛异常\n\n```\n@try {\n    …\n} @catch (NSException *exception)\
  \ {\n    …\n    @throw;\n}\n```\n\n一个空的 `@throw` 指令会重抛其所在 `@catch` 块捕获的异常。在代码清单\
  \ 14-2 中，`@throw` 语句等同于 `@throw exception`。\n\n#### 捕获顺序\n\n与 Java 类似，`@catch` 块的顺序必须从最具体到最通用。换句话说，捕获特定类的\
  \ `@catch` 块不能跟在捕获该类的子类的 `@catch` 块之后。`@catch` 块按顺序依次测试，第一个 `@catch` 块会阻止后续 `@catch`\
  \ 块执行。\n\n在 Java 中，顺序不当的 `@catch` 块会导致编译器致命错误。而 Objective-C 编译器只会发出警告——并且只有在知道类的继承关系时才能发出该警告。\n\
  \n以代码清单 14-3 中的代码为例。\n\n**代码清单 14-3.** 顺序不当的 `@catch` 块\n\n```\n@class MysteryException\n\
  …\n@try {\n    …\n} @catch (NSObject *anything) {\n    …\n} @catch (MysteryException\
  \ *exception) {\n    …\n}\n```\n\n第二个 `@catch` 块永远不会被执行，因为 `MysteryException` 是\
  \ `NSObject` 的子类。但这段代码不会产生编译器警告。这是因为 `@class` 语句只让编译器知道 `MysteryException` 类存在，但未说明其任何信息。作为规则，对于你打算捕获的所有对象，都应包含其类定义。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 14 章 ■ 异常处理\n\n### 链式处理\n\
  \n`NSException` 类没有像 `java.lang.Throwable` 那样的 cause 属性。相反，`NSException` 对象包含一个字典（映射）对象，允许你为异常提供任意上下文信息。如果你想抛出一个引用另一个异常的异常，可以将该异常（连同任何其他相关细节）包含在异常的信息字典中，如代码清单\
  \ 14-4 所示。\n\n**代码清单 14-4.** 链式异常\n\n**Java**\n\n```\ntry {\n    …\n} catch (Exception\
  \ e) {\n    throw new SpecificException(\"encountered exception\", e);\n}\n```\n\
  \n**Objective-C**\n\n```\n@try {\n    …\n} @catch (NSException *exception) {\n \
  \   NSDictionary *userInfo = [NSDictionary dictionaryWithObject:exception\n    \
  \                                                    forKey:@\"RootCause\"];\n \
  \   @throw [SpecificException exceptionWithName:@\"MySpecialException\"\n      \
  \                                  reason:@\"encountered exception\"\n         \
  \                             userInfo:userInfo];\n}\n```\n\n#### 调用堆栈\n\n\n\n"
- '# 异常处理


  #### 性能


  在 Objective-C 中异常使用较少，另一个原因是性能问题。在 Objective-C 中设置和抛出异常的开销要高于 Java。本章后续"异常处理的替代方案"一节将概述除异常外的其他选择。


  不过，不要因此就放弃在 Objective-C 中使用异常。我个人就大量使用异常——这很可能源于我在 Java 编程中的经验。我从未见过 Objective-C
  的异常处理成为性能瓶颈。我的建议是：使用你最熟悉的编码风格进行编程。如果这种风格包含异常，那就尽管放心使用。只有当性能分析明确显示异常处理是性能问题时，我才会建议考虑其他错误处理方案。


  ## 未捕获的异常


  未捕获的异常是指那些从应用程序代码中逸出，进入运行时框架的异常。异常也可能由系统事件和运行时错误触发而产生。


  未捕获异常的处理过程大致可分为四类：


  - 在 GUI 应用的主线程中抛出的异常

  - 在所有其他情况下抛出的异常

  - 由系统事件（如无效内存访问）产生的异常

  - 由运行时事件（如向已释放对象发送消息）产生的异常


  默认情况下，应用程序主线程中抛出的异常会被 `NSApplication` 框架吸收并忽略。例如，用户选择某个菜单命令触发的操作抛出了未捕获异常，应用程序的主运行循环会丢弃该异常并继续运行。除了可能有一条消息记录到系统控制台外，不会有任何问题提示。你可能曾在某些应用中遇到过这种现象。


  在几乎所有其他情况下，未捕获异常会终止线程；如果异常在主线程中抛出，则会终止进程。系统事件和运行时事件会立即终止进程。


  你可以使用可选的 `ExceptionHandling` 框架来拦截这些事件。通过异常处理框架，你可以：


  - 记录或后处理 GUI 应用主线程中抛出的未捕获异常

  - 记录或后处理任何其他情况下抛出的未捕获异常

  - 将系统事件转换为未捕获异常，以便记录或后处理

  - 将运行时事件转换为未捕获异常，以便记录或后处理

  - 使进程挂起而非终止，以便连接调试器或其他开发工具进行事后分析


  如需更改未捕获异常的处理方式，请按以下步骤操作：


  1. 将你的应用程序链接到 `ExceptionHandling` 框架。

  2. `#import <ExceptionHandling/NSExceptionHandler.h>`

  3. 使用 `[NSExceptionHandler defaultExceptionHandler]` 获取进程的单例 `NSExceptionHandler`
  对象。

  4. 要对未捕获异常、系统事件或运行时事件进行特殊处理，可将表 14-1 中的常量通过逻辑"或"运算组合，然后将结果值传递给 `-[NSExceptionHandler
  setExceptionHandlingMask:]`。参见清单 14-5。

  5. 作为第 4 步的替代方案，可以在用户默认属性 `NSExceptionHandlingMask` 中设置异常处理标志。有关用户默认值及其获取方式的更多详情，请参见第
  26 章的"用户默认值"一节。

  6. 要单独筛选第 4 步或第 5 步中启用的异常处理，请创建一个实现 `-exceptionHandler:shouldHandleException:mask:`
  和 `-exceptionHandler:shouldLogException:mask:` 方法的对象，并将其设为 `NSExceptionHandler`
  的代理对象。所有异常都会先传递给代理进行检查。代理可以自行处理异常，让 `NSExceptionHandler` 执行默认处理，两者都做，或两者都不做。

  7. 出于调试目的要使进程挂起而非终止，可将表 14-2 中的常量通过逻辑"或"运算组合，然后将结果值传递给 `-[NSExceptionHandler setExceptionHangingMask:]`。


  设置异常处理行为的最佳位置是应用程序的初始化代码中。这里的"处理"是指 `NSExceptionHandler` 会将异常传递给其代理进行后处理，并选择性地在继续执行前记录异常详情。虽然你的代理对象可以做更多事情，但
  `NSExceptionHandler` 本身并不会对异常进行任何实质性的操作。


  在 `NSApplication` 中记录或处理顶层异常和底层异常（表 14-1 中的最后四个选项）应仅在开发阶段使用。这些选项会向系统控制台发送大量调试输出，不适用于发布的应用程序。此外，拦截、修改或忽略这些异常可能会改变应用程序框架的正常运行方式。


  你的 `NSExceptionHandler` 代理对象只会收到在第 4 步或第 5 步中启用了记录或处理的异常。如果你启用了这些标志，但没有设置代理对象，则仅会记录异常。


  > **注意：** `NSExceptionHandler` 会在你的代码执行 `finally` 块之前处理异常。如果在第 4 步或第 5 步中没有设置系统和运行时事件处理，这些事件不会转换为异常。它们会像没有
  `NSExceptionHandler` 时一样被正常处理。


  **表 14-1.** 异常处理标志


  | 常量                                      | 效果                                                         |

  | ----------------------------------------- | ------------------------------------------------------------
  |

  | `NSLogUncaughtExceptionMask`              | 记录未捕获的异常。                                           |

  | `NSHandleUncaughtExceptionMask`           | 处理未捕获的异常。                                           |

  | `NSLogUncaughtSystemExceptionMask`        | 将系统事件转换为异常并记录。                                 |

  | `NSHandleUncaughtSystemExceptionMask`     | 将系统事件转换为异常并处理。                                 |

  | `NSLogUncaughtRuntimeErrorMask`           | 将运行时事件转换为异常并记录。                               |

  | `NSHandleUncaughtRuntimeErrorMask`        | 将运行时事件转换为异常并处理。                               |

  | `NSLogTopLevelExceptionMask`              | 记录应用程序主运行循环中抛出的未捕获异常。                   |

  | `NSHandleTopLevelExceptionMask`           | 处理应用程序主运行循环中抛出的未捕获异常。                   |

  | `NSLogOtherExceptionMask`                 | 记录应用程序主运行循环中抛出的所有其他异常，包括已捕获的异常。 |

  | `NSHandleOtherExceptionMask`              | 处理应用程序主运行循环中抛出的所有其他异常，包括已捕获的异常。 |


  你也可以让 `NSExceptionHandler` 对于特定类型的异常"挂起"进程，而不是终止进程。通过将表 14-2 中的常量进行逻辑"或"运算组合，并将结果值传递给
  `-[NSExceptionHandler setExceptionHangingMask:]`，即可设置所需的挂起条件。


