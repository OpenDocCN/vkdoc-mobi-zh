- "# 第 12 章 ■ 序列化\n\n```objc\n@implementation ScheduledEvent\n\n- (id)initWithCoder:(NSCoder*)decoder\n\
  \n{\n\nself = [super init];\n\nif (self != nil) {\n```\n\n\n\n```objectivec\nstartTime\
  \ = [decoder decodeObjectForKey:@\"Start\"];\nduration = [decoder decodeDoubleForKey:@\"\
  Duration\"];\nroom.buildingNo = [decoder decodeInt32ForKey:@\"Room.building\"];\n\
  room.roomNo = [decoder decodeInt32ForKey:@\"Room.number\"];\n}\n\nreturn self;\n\
  \n}\n\n- (void)encodeWithCoder:(NSCoder*)encoder\n\n{\n\n[encoder encodeObject:startTime\
  \ forKey:@\"Start\"];\n\n[encoder encodeDouble:duration forKey:@\"Duration\"];\n\
  \n[encoder encodeInt32:room.buildingNo forKey:@\"Room.building\"];\n\n[encoder encodeInt32:room.roomNo\
  \ forKey:@\"Room.number\"];\n\n}\n\n@end\n```\n\n现在，`ScheduledEvent` 对象可以使用 `NSKeyedArchiver`\
  \ 类进行归档。清单 12-4 中的代码仅支持键控归档，因此该对象仍然不能用于顺序归档或分布式对象。创建可归档类的基本步骤如下：\n\n- 遵循 `NSCoding`\
  \ 协议，或继承一个遵循 `NSCoding` 协议的类。\n- 实现 `-initWithCoder:` 方法，使用解码器中的数据初始化新对象。如果该类继承自\
  \ `NSCoding`，则该方法应以 `self = [super initWithCoder:decoder]` 开头。\n- 实现 `-encodeWithCoder:`\
  \ 方法，对对象进行编码。如果该类继承自 `NSCoding`，则该方法应以 `[super encodeWithCoder:coder]` 开头。\n- 通过向编码器对象发送适当的\
  \ `-encode…` 或 `-decode…` 消息，对所有持久化成员变量进行编码或解码。复杂的变量（如结构体）必须解构为其原始基本值。编码方法列于表 12-2\
  \ 中。\n\n用于键控归档的 `NSCoding` 方法仅应发送 `-encode…:forKey:` 和 `-decode…ForKey:` 消息。用于顺序归档或分布式对象的类仅应发送\
  \ `-encode…:` 和 `-decode…` 消息。如何使一个类同时支持这两种方式将在稍后描述。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第十二章 ■ 序列化\n\n### 表 12-2. 编码方法\n\n| Objective-C 类型 | 键控编码器 | 顺序编码器 |\n|-----------------|---------------|--------------------|\n\
  | `id` | `encodeObject:forKey:` | `encodeObject:` |\n| `NSInteger` | `encodeInteger:forKey:`\
  \ | `int` |\n| `long long int` | `encodeInt32:forKey:` | - |\n| `BOOL` | `encodeBool:forKey:`\
  \ | - |\n| 字节数组 | `encodeBytes:length:forKey:` | `encodeBytes:length:` |\n| `double`\
  \ | `encodeDouble:forKey:` | - |\n| `float` | `encodeFloat:forKey:` | - |\n| `NSPoint`\
  \ | `encodePoint:forKey:` | `encodePoint:` |\n| `NSRect` | `encodeRect:forKey:`\
  \ | `encodeRect:` |\n| `NSSize` | `encodeSize:forKey:` | `encodeSize:` |\n| 任何 C\
  \ 类型 | - | `encodeValueOfObjCType:at:` |\n\n你为键选择的值完全是任意的。你可以选择使用任何你喜欢的键，只需保证这些键在对象的范围内保持一致且唯一即可。\n\
  \n与典型的 Java 序列化不同，你可以完全控制哪些值被编码，以及它们在解码时如何被解释。你可以自由选择你的对象在数据流中的表示方式。例如，假设有一个出版应用程序，包含一个墨水颜色对象。该对象的\
  \ `-encodeWithCoder:` 方法可以简单地编码墨水颜色的所有属性（青、品红、黄、黑等的量），也可以仅编码颜色的潘通色号。当对象被解码时，它将使用颜色名称来用等价的颜色值初始化自身。像这样的技术可以使你对象的编码版本更具可移植性和持久性。\n\
  \n> **注意：** 在 `-initWithCoder:` 方法的作用域内，避免向由 `-decodeObject...` 返回的对象指针发送消息。循环引用可能导致\
  \ `-decodeObject…` 返回的对象指针引用一个部分初始化的对象。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第十二章 ■ 序列化\n\n两个 `NSCoding` 方法都接收一个 `NSCoder` 对象。这个对象可能是同一个，但通常不同。在键控归档的情况下，`-initWithCoder:`\
  \ 会接收到一个 `NSKeyedUnarchiver` 对象，而 `-encodeWithCoder:` 会接收到一个 `NSKeyedArchiver` 对象。`NSKeyedArchiver`\
  \ 仅实现了 `-encode…:forKey:` 方法，任何向其发送 `-decode…` 消息的尝试都会引发异常。`NSKeyedUnarchiver` 仅实现了对应的\
  \ `-decode…ForKey:` 方法。\n\n\n\n### 为类添加顺序归档支持\n\n添加顺序归档支持（包含分布式对象）与添加键值归档支持几乎完全相同，但有两个例外：\n\
  \n- 顺序归档使用表 12-2 中的顺序编码方法。\n- 在 `-encodeWithCoder:` 中编码的属性的顺序和类型，必须与在 `-initWithCoder:`\
  \ 中解码时的顺序和类型完全一致。与键值编码不同，你不能忽略某些值，也不能以与编码时不同的顺序进行解码。\n\n你会注意到顺序编码方法的数量要少得多。最明显的是缺少用于编码原始\
  \ C 类型的方法。这是因为顺序编码器提供了通用的 `-encodeValueOfObjCType:at:` 方法。该方法接受一个编码后的 C 变量类型字符串（使用\
  \ `@encode()` 指令生成），以及一个变量的地址。要编码列表 12-4 中的 `duration` 属性，你可以这样写：`[encoder encodeValueOfObjCType:@encode(NSTimeInterval)\
  \ at:&duration]`。虽然理论上可以传递任何 C 类型的类型字符串（例如，对于像 `@encode(RoomIdentifier)` 这样的任意结构体），但编码器通常只实现语言定义的原始类型。在上一个例子中，`NSTimeInterval`\
  \ 与 `double` 是同义词，因此 `@encode(NSTimeInterval)` 和 `@encode(double)` 可以互换。你可以使用 `-encodeArrayOfObjCType:count:at:`\
  \ 方法来编码一个原始值构成的完整数组。\n\n### 同时支持键值归档和顺序归档\n\n但如果你希望你的类同时支持键值归档、顺序归档以及分布式对象呢？这很简单：向编码器发送\
  \ `-allowsKeyedCoding` 消息来判断它是否支持键值归档，然后使用相应的编码器方法即可。列表 12-5 展示了一个 `ScheduledEvent`\
  \ 类的扩展实现，它同时支持键值归档和顺序归档。\n\n**列表 12-5.** 支持键值和顺序归档的类\n\n```\n- (id)initWithCoder:(NSCoder*)decoder\n\
  {\n    self = [super init];\n    if (self != nil) {\n        if ([decoder allowsKeyedCoding])\
  \ {\n            startTime = [decoder decodeObjectForKey:@\"Start\"];\n        \
  \    duration = [decoder decodeDoubleForKey:@\"Duration\"];\n            room.buildingNo\
  \ = [decoder decodeInt32ForKey:@\"Room.building\"];\n            room.roomNo = [decoder\
  \ decodeInt32ForKey:@\"Room.number\"];\n        } else {\n            startTime\
  \ = [decoder decodeObject];\n            [decoder decodeValueOfObjCType:@encode(NSTimeInterval)\
  \ at:&duration];\n            [decoder decodeValueOfObjCType:@encode(unsigned int)\
  \ at:&room.buildingNo];\n            [decoder decodeValueOfObjCType:@encode(unsigned\
  \ int) at:&room.roomNo];\n        }\n    }\n    return self;\n}\n\n- (void)encodeWithCoder:(NSCoder*)encoder\n\
  {\n    if ([encoder allowsKeyedCoding]) {\n        [encoder encodeObject:startTime\
  \ forKey:@\"Start\"];\n        [encoder encodeDouble:duration forKey:@\"Duration\"\
  ];\n        [encoder encodeInt32:room.buildingNo forKey:@\"Room.building\"];\n \
  \       [encoder encodeInt32:room.roomNo forKey:@\"Room.number\"];\n    } else {\n\
  \        [encoder encodeObject:startTime];\n        [encoder encodeValueOfObjCType:@encode(NSTimeInterval)\
  \ at:&duration];\n        [encoder encodeValueOfObjCType:@encode(unsigned int) at:&room.buildingNo];\n\
  \        [encoder encodeValueOfObjCType:@encode(unsigned int) at:&room.roomNo];\n\
  \    }\n}\n```\n\n顺序编码器不实现任何 `…forKey:` 方法，尝试调用这些方法会引发异常。同样，键值编码器也不实现任何顺序方法，因此请确保你知道自己正在使用的是哪种编码器。\n\
  \n如果你想要在程序层面限制对象的归档支持，你可以在 `-encodeWithCoder:` 方法中有条件地引发异常。列表 12-6 中的类同时支持键值和顺序归档，但不允许通过分布式对象连接进行复制。这相当于覆盖\
  \ Java 对象的 `writeObject(ObjectOutputStream)` 方法并抛出 `NotSerializableException` 异常。\n\
  \n**列表 12-6.** 在程序层面限制归档支持\n\n```\n- (void)encodeWithCoder:(NSCoder*)encoder\n{\n\
  \    if ([encoder isKindOfClass:[NSPortCoder class]])\n```\n\n\n```objectivec\n\
  [NSException raise:NSInvalidArchiveOperationException\nformat:@\"%@ not distributable\"\
  ,[self className]]; if ([encoder allowsKeyedCoding]) {\n// Keyed encoding...\n}\
  \ else {\n// Sequential encoding...\n}\n}\n```\n\n### 归档的复杂性\n\n与软件工程中的几乎所有事物一样，简单的案例很容易处理；真正棘手的是边界条件。归档（序列化）也不例外。这里有许多令人困扰的问题需要处理。Java\
  \ 和 Objective-C 的处理方式大多相似。这些问题包括瞬态值、保存数据与不同类版本之间的兼容性、共享对象、对象图之外的对象以及重复对象。\n\n####\
  \ 瞬态属性\n\nJava 提供了 `transient` 关键字来标记不应包含在序列化数据流中的实例变量。在 Objective-C 中，解决方案是在编码和解码过程中简单地忽略该属性。列表\
  \ 12-7 展示了 `ScheduledEvent` 类的修改版本，其中包含一个屏幕坐标属性，用于保存预定事件最后显示的位置。当事件对象存储在文档中时，该值无关紧要，因此它被排除在数据流之外。\n\
  \n**列表 12-7.** 瞬态属性\n\n**Java**\n\n```java\npublic class ScheduledEvent implements\
  \ Serializable {\nDate startTime;\ndouble duration;\nRoomIdentifier room;\ntransient\
  \ java.awt.Point lastScreenPopupPosition;\n…\n}\n```\n\n**Objective-C**\n\n```objectivec\n\
  @interface ScheduledEvent : NSObject <NSCoding> {\nNSDate *startTime;\nNSTimeInterval\
  \ duration;\nRoomIdentifier room;\nNSPoint lastScreenPopupPosition;\n}\n@end\n\n\
  @implementation ScheduledEvent\n…\n- (void)encodeWithCoder:(NSCoder*)encoder\n{\n\
  [encoder encodeObject:startTime forKey:@\"Start\"];\n[encoder encodeDouble:duration\
  \ forKey:@\"Duration\"];\n[encoder encodeInt32:room.buildingNo forKey:@\"Room.building\"\
  ];\n[encoder encodeInt32:room.roomNo forKey:@\"Room.number\"];\n// 不编码 lastScreenPopupPosition\n\
  }\n@end\n```\n\n#### 重复对象\n\n用于创建归档的对象称为根对象。它在一个无向对象图中形成锚点，该图包含根对象引用的所有对象，以及这些对象引用的任何对象，依此类推。对象图可能很简单，比如数组或树，但也可能形成循环和循环引用。如果编码器盲目地跟随每个对象引用，那么对单个对象的多次引用会导致该对象的数据被多次编码，而循环引用则会导致无限递归。Java\
  \ 的 `java.io.ObjectOutputStream` 和 Objective-C 的 `NSCoder` 类几乎以相同的方式解决了这个问题。当一个对象首次通过\
  \ `-encodeObject:` 消息发送给编码器时，编码器会递归地向该对象发送 `-encodeWithCoder:` 消息，以在流中编码其数据。编码器还会记住该对象实例。之后所有引用同一对象的\
  \ `-encodeObject:` 消息，都只是在数据流中插入一个指向原始对象的引用。解码时，所有 `-decodeObject` 消息都会返回指向单一解归档对象实例的指针。你无需做任何操作即可获得此行为；了解其工作原理总是有益的。\n\
  \n解归档可能会无意中创建重复对象。如果编码对象引用了共享池中的对象，就可能发生这种情况。解码器会为数据流中的每个唯一对象创建新实例。这会导致你的应用程序中出现共享对象的副本。有几种方法可以处理这个问题。一种是使用如前文潘通色彩示例中给出的编码方案；对对象进行某种符号化表示编码，然后从公共资源中获取其实际内容。另一种解决方案是重写\
  \ `- (id)awakeAfterUsingCoder:(NSCoder*)decoder` 方法。该消息在对象被解码后发送给它。该方法返回的对象标识符将替换已解码的对象。默认实现返回\
  \ `self`（即不替换），但如果你重写了它，则可以返回任何等效对象。列表 12-8 演示了一个 `Attendee` 类，它避免了创建重复的 `Attendee`\
  \ 对象，并将任何新的 `Attendee` 对象添加到公共池中。\n\n**列表 12-8.** 解码共享对象\n\n```objectivec\n@interface\
  \ Attendee : NSObject <NSCoding> {\nNSString *name;\nNSString *uuid;\nNSMutableSet\
  \ *scheduledMeetings;\n}\n@end\n\n@implementation Attendee\n- (id)initWithCoder:(NSCoder*)decoder\n\
  {\nself = [super init];\nif (self != nil) {\nname = [decoder decodeObjectForKey:@\"\
  Name\"];\nuuid = [decoder decodeObjectForKey:@\"UUID\"];\nscheduledMeetings = [decoder\
  \ decodeObjectForKey:@\"Meetings\"];\n}\nreturn self;\n}\n\n- (void)encodeWithCoder:(NSCoder*)encoder\n\
  {\n[encoder encodeObject:name forKey:@\"Name\"];\n[encoder encodeObject:uuid forKey:@\"\
  UUID\"];\n[encoder encodeObject:scheduledMeetings forKey:@\"Meetings\"];\n}\n\n\
  - (id)awakeAfterUsingCoder:(NSCoder*)decoder\n{\nScheduleAssets *assets = [ScheduleAssets\
  \ sharedAssets];\nAttendee *existingAttendee = [assets attendeeWithUUID:uuid];\n\
  if (existingAttendee==nil) {\n// 将此参与者添加到参与者池中\n[assets addAttendee:self];\n} else\
  \ {\n// 用已存在的参与者替换此参与者\nself = existingAttendee;\n}\nreturn self;\n}\n@end\n```\n\
  \n#### 限制对象图\n\n有时归档一个根对象会归档远超你意图的内容。归档根对象通常会归档它所引用的所有对象。在我们假设的日程安排应用程序中，一个 `ProjectMeeting`\
  \ 对象将一个会议与一个项目任务关联起来。将 `ProjectMeeting` 对象归档并通过电子邮件发送给团队成员以邀请他们参加会议会很方便。问题是，列表 12-9\
  \ 中的 `ProjectMeeting` 对象包含一个对会议所关联的 `ProjectTask` 对象的引用。任务对象自然包含对其项目的引用，而项目又包含对所有项目任务、其里程碑、参与项目的团队成员、为项目安排的其他会议的引用，等等。简而言之，我们尝试向某人发送一个会议对象，结果会导致归档整个项目日程安排系统，甚至可能包括应用程序本身。\n\
  \nObjective-C 的解决方案是有条件地编码对象。被编码的对象图仅包含使用 `-encodeObject:` 或 `-encodeObject:forKey:`\
  \ 添加到流中的无条件对象。条件对象则使用 `-encodeConditionalObject:` 或 `-encodeConditionalObject:forKey:`\
  \ 进行编码（参见列表 12-9）。只有当这些对象至少被无条件编码过一次时，它们才会被包含在归档中。如果对象的所有包含关系都是条件性的，则该对象将从归档中被排除。当对象图被解码时，针对被排除对象的\
  \ `-decodeObject...` 请求将返回 `nil`。\n\n**列表 12-9.** 编码条件对象\n\n```objectivec\n@interface\
  \ ProjectMeeting : ScheduledEvent {\nNSString *meetingDescription;\nProjectTask\
  \ *task;\n}\n@end\n\n@implementation ProjectMeeting\n- (id)initWithCoder:(NSCoder*)decoder\n\
  {\nself = [super initWithCoder:decoder];\nif (self != nil) {\nmeetingDescription\
  \ = [decoder decodeObjectForKey:@\"Description\"];\ntask = [decoder decodeObjectForKey:@\"\
  Task\"];\n}\nreturn self;\n}\n\n- (void)encodeWithCoder:(NSCoder*)encoder\n{\n[super\
  \ encodeWithCoder:encoder];\n[encoder encodeObject:meetingDescription forKey:@\"\
  Description\"];\n[encoder encodeConditionalObject:task forKey:@\"Task\"];\n}\n@end\n\
  ```\n\n\n#### 类版本兼容性\n\n持久化数据的问题在于它确实会持久存在。这些数据可能持续存在数天甚至数年，而你的应用程序则在不断演进。最终，你的类会尝试解码由早期版本自身编码的归档文件。有时，甚至可能需要解码由同一类的某个后续版本创建的归档文件。\n\
  \nJava 通过结合使用类版本和键/值编码来解决兼容性问题。Java 的类版本严格用于禁止解码可能与类不兼容的数据。Java 序列化也使用键/值编码，就像 Objective-C\
  \ 的键控归档一样。但在 Java 中，键始终是实例变量的名称。Java 会自动恢复与其先前版本共有的变量，并直接忽略数据流中未编码的变量。更复杂的兼容性问题需要你实现一个自定义的\
  \ `readObjects(ObjectInputStream)` 方法。我打算跳过冗长的细节，因为这不是一本关于 Java 的书。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**注意：** 向后兼容是指较新版本的类/应用程序能够解释由较旧版本创建的数据。向前兼容是指较旧版本的类/应用程序能够（至少部分地）解释由较新版本创建的数据。\n\
  \n如何在 Objective-C 中提供向后或向前兼容性，取决于归档类型。\n\n## 键控归档中的向前与向后兼容性\n\n键控归档有一个巨大的优势：类版本之间灵活的兼容性。如列表\
  \ 12-10 所示，改进后的 `ScheduledEvent` 类与列表 12-4 中的初始版本相比略有变化。它包含了一个新的时区对象，并且持续时间值已被结束时间对象所取代。\n\
  \n列表 12-10. 键控归档中的向前与向后兼容性\n\n```\n@interface ScheduledEvent : NSObject <NSCoding>\
  \ {\n@private\n    NSDate *startTime;\n    NSDate *endTime;\n    NSTimeZone *timeZone;\n\
  \    RoomIdentifier room;\n}\n\n@implementation ScheduledEvent\n\n- (id)initWithCoder:(NSCoder*)decoder\n\
  {\n    self = [super init];\n    if (self != nil) {\n        if ([decoder containsValueForKey:@\"\
  TimeZone\"])\n            timeZone = [decoder decodeObjectForKey:@\"TimeZone\"];\n\
  \        else\n            timeZone = [NSTimeZone localTimeZone];\n\n        startTime\
  \ = [decoder decodeObjectForKey:@\"Start\"];\n        if ([decoder containsValueForKey:@\"\
  End\"]) {\n            endTime = [decoder decodeObjectForKey:@\"End\"];\n      \
  \  } else {\n            NSTimeInterval duration = [decoder decodeDoubleForKey:@\"\
  Duration\"];\n            endTime = [startTime addTimeInterval:duration];\n    \
  \    }\n\n        room.buildingNo = [decoder decodeInt32ForKey:@\"Room.building\"\
  ];\n        room.roomNo = [decoder decodeInt32ForKey:@\"Room.number\"];\n    }\n\
  \    return self;\n}\n\n- (void)encodeWithCoder:(NSCoder*)encoder\n{\n    [encoder\
  \ encodeObject:startTime forKey:@\"Start\"];\n    [encoder encodeObject:endTime\
  \ forKey:@\"End\"];\n    [encoder encodeObject:timeZone forKey:@\"TimeZone\"];\n\
  \    [encoder encodeInt32:room.buildingNo forKey:@\"Room.building\"];\n    [encoder\
  \ encodeInt32:room.roomNo forKey:@\"Room.number\"];\n    [encoder encodeDouble:[endTime\
  \ timeIntervalSinceDate:startTime]\n                   forKey:@\"Duration\"];\n\
  }\n\n@end\n```\n\n列表 12-10 中的实现提供了与其初始版本的向前和向后兼容性。也就是说，该类的新版本可以解码由原始版本创建的归档，而原始版本也可以解码由新版本创建的归档。这是通过明智地使用归档键来实现的。\n\
  \n`ScheduledEvent` 的新版本有一个旧版本所没有的时区对象。新版本使用 `-containsValueForKey:` 方法来判断它正在解码的归档是否包含该键的值。如果包含，则读取该值；如果不包含，则假定该归档是由该类的早期版本创建的，并提供一个合理的默认值。旧版本的类在读取较新归档时，会忽略该值，因为其对时区一无所知。\n\
  \n用 `endTime` 替换持续时间变量需要做更多工作。同样，`-initWithCoder:` 使用 `[decoder containsValueForKey:@\"\
  End\"]` 来判断归档是否包含 `\"End\"` 值。现代的归档会包含，但旧的则不会。新类假设缺少 `\"End\"` 值意味着它正在读取旧版本的归档；它使用旧版本写入的\
  \ `\"Duration\"` 值来构造一个等价的 `endTime` 对象。\n\n为了提供向前兼容性，它将 `endTime` 值存档了两次。一次作为 `NSDate`\
  \ 对象，另一次作为与该类原始持续时间值兼容的 `NSTimeInterval`。另一种保持兼容性的方法是完全不编码 `endTime` 对象，并继续编码与旧版本兼容的\
  \ `\"Duration\"` 值。当新属性在逻辑上等同于旧属性，并且易于转换时，这将是首选的解决方案。\n\n以下是在键控归档中维护向后以及潜在的向前兼容性的一些技巧：\n\
  \n-   测试该类后续版本中添加的键是否存在。键的缺失表明归档是由早期版本创建的。\n-   如果某个值的类型发生了变化，请使用新的键对其进行编码。\n- \
  \  整数和浮点数解码方法会执行一些适度的类型转换。所有的整数编码和解码方法都是可互换的，浮点数方法也是如此。因此，你可以将一个数字编码为 32 位整数，然后将其解码为\
  \ 64 位整数，反之亦然。\n-   用一些合理的值来初始化缺失的键。\n-   为了向前兼容，请继续写入该类早期版本所期望的键和值，或者将较新的值转换为与旧类兼容的值。\n\
  -   考虑插入一个 `\"version\"` 值，或任何其他类型的提示，以帮助未来的类确定如何解释归档值。语句 `[encoder encodeBool:YES\
  \ forKey:@\"isTimeZoneSavvy\"]` 将通知未来的解码器，此归档是由一个理解时区的类版本创建的。\n\n## 顺序归档中的向后兼容性\n\
  \n列表 12-9 中的代码通过有条件地编码其对 `ProjectTask` 对象的引用来解决这个问题。如果你归档一个单独的 `ProjectMeeting`\
  \ 对象，`ProjectTask` 对象永远不会被无条件地编码，从而被省略。当解档时，语句 `[decoder decodeObjectForKey:@\"\
  Task\"]` 返回 `nil`。结果对象将不会连接到项目调度数据模型，但足以用于邀请某人参加会议。\n\n当调度系统服务器归档整个项目数据模型时，它将无条件地编码项目、其任务、里程碑和团队成员对象。当它处理到\
  \ `ProjectMeeting` 对象时，条件对象引用会被正常编码，因为 `ProjectTask` 对象已经在图中的其他位置被无条件地编码了。当第二天项目数据模型被解档时，`ProjectMeeting`\
  \ 对其 `ProjectTask` 的引用会被恢复。\n\n通常，当对象指针是 `__weak` 引用，或者该对象是委托、父对象、所有者或容器时，有条件地编码对象是合适的。\n\
  \n\n\n"
- "# 序列化中的向后兼容性与类替换\n\n## 类版本控制\n\n在顺序归档中，向后兼容性是通过类版本（class version）实现的，这种方式与 Java\
  \ 有些类似。在 Java 中，每个类都会被自动分配一个类版本——这相当于该类定义的哈希码。默认情况下，Java 运行时仅当对象的版本与创建序列化数据时使用的版本完全匹配时，才会重构该对象。因此，对类的任何更改都会使其与之前版本的序列化数据不兼容。这是极其严格的限制，但非常安全。程序员可以通过为类声明一个永久的`serialVersionUID`常量来覆盖此行为。程序员有责任确保所有具有相同`serialVersionUID`的类版本是兼容的。\n\
  \nObjective-C 也使用类版本，但方式完全不同。每个类都有一个`version`属性，编码器会将该属性包含在归档中。Objective-C 并不关心你的类版本是否与正在解码的版本不同。在解码时，你的类可以查询编码器，以确定用于编码归档的类版本。你可以利用此信息，以与先前版本兼容的方式解码这些值。\n\
  \n为了使这一点有效，你必须为每个功能上不同的类版本分配一个唯一的版本号，并且在编码任何归档之前，必须设置类的`version`属性。默认情况下，每个类的版本都是`0`。清单\
  \ 12-11 展示了来自清单 12-5 的`ScheduledEvent`类的实现，已重写以提供向后兼容性。为清晰起见，已移除键归档支持。\n\n**清单 12-11.\
  \ 顺序归档中的向后兼容性**\n\n```\n+ (void)initialize\n{\n    [ScheduledEvent setVersion:1];\
  \ // 第二个版本\n}\n\n- (id)initWithCoder:(NSCoder*)decoder\n{\n    self = [super init];\n\
  \    if (self != nil) {\n        startTime = [decoder decodeObject];\n        if\
  \ ([decoder versionForClassName:@\"ScheduledEvent\"] == 1) {\n            endTime\
  \ = [decoder decodeObject];\n            timeZone = [decoder decodeObject];\n  \
  \      } else {\n            NSTimeInterval duration;\n            [decoder decodeValueOfObjCType:@encode(NSTimeInterval)\
  \ at:&duration];\n            endTime = [startTime addTimeInterval:duration];\n\
  \            timeZone = [NSTimeZone localTimeZone];\n        }\n        [decoder\
  \ decodeValueOfObjCType:@encode(unsigned int)\n                                \
  \    at:&room.buildingNo];\n        [decoder decodeValueOfObjCType:@encode(unsigned\
  \ int)\n                                    at:&room.roomNo];\n    }\n    return\
  \ self;\n}\n\n- (void)encodeWithCoder:(NSCoder*)encoder\n{\n    [encoder encodeObject:startTime];\n\
  \    [encoder encodeObject:endTime];\n    [encoder encodeObject:timeZone];\n   \
  \ [encoder encodeValueOfObjCType:@encode(unsigned int) at:&room.buildingNo];\n \
  \   [encoder encodeValueOfObjCType:@encode(unsigned int) at:&room.roomNo];\n}\n\
  ```\n\n`+initialize`类方法用于在创建该类的任何实例之前设置类的版本。更多关于`+initialize`方法的信息，请参见第 21 章。在解码时，对象会查询编码器以发现用于创建归档的类的版本号，并相应调整其解码逻辑。\n\
  \n每当你的类的编码方式发生变化时，你必须建立一个新的类版本，并更新解码器以处理你想要支持的所有早期格式。类版本控制无法提供前向兼容性。那将需要一台时间机器。\n\
  \n## 类替换\n\n有时，对应用程序的更改不仅仅涉及添加或重新定义成员变量。重构应用程序可能涉及重命名或完全废弃某些类。当尝试解码由应用程序早期版本编写的归档时，这会成为一个问题，因为归档中记录的类已不再存在。这个问题通常可以通过在编码或解码期间使用类替换来解决。\n\
  \n### 解码期间的类替换\n\n假设我们的日程安排应用程序已被重构，完全消除了`ScheduledEvent`类。它已被一个`AbstractEvent`类及其子类`MeetingEvent`、`ProjectEvent`和`HolidayEvent`取代。任何解码包含`ScheduledEvent`对象的归档的尝试都将失败，因为解码器无法找到要创建的`ScheduledEvent`类。有三种解决方案，而且所有方案都涉及创建一个仅用于提供向后兼容性的替身`ScheduledEvent`类。\n\
  \n第一种解决方案是实现一个外壳（shell）`ScheduledEvent`类，其中包含一个传统的`-initWithCoder:`方法。它还会像前面“重复对象”部分描述的那样，覆盖`-awakeAfterUsingCoder:`方法。在后一个方法中，将创建一个等价对象来替换原始对象。\n\
  \n一种更直接的方法借鉴了类簇（class clusters）的思想——参见第 22 章——在`-initWithCoder:`方法中直接执行对象替换，如清单\
  \ 12-12 所示。当编码器尝试初始化一个新创建的`ScheduledEvent`对象时，构造函数会销毁该临时对象，并创建一个具有正确类的新对象来替代。\n\n\
  **清单 12-12. 在解码期间替换一个类**\n\n```\n@interface ScheduledEvent : NSObject <NSCoding>\n\
  @end\n\n@implementation ScheduledEvent\n\n- (id)initWithCoder:(NSCoder*)decoder\n\
  {\n    self = [super init];\n    if (self != nil) {\n        // 读取已废弃的 ScheduledEvent\
  \ 的属性\n        NSDate *startTime = [decoder decodeObjectForKey:@\"Start\"];\n  \
  \      NSTimeInterval duration = [decoder decodeDoubleForKey:@\"Duration\"];\n \
  \       RoomIdentifier room;\n        room.buildingNo = [decoder decodeInt32ForKey:@\"\
  Room.building\"];\n        room.roomNo = [decoder decodeInt32ForKey:@\"Room.number\"\
  ];\n\n        // 用等价的 MeetingEvent 对象替换它\n        id replacement = [MeetingEvent\
  \ new];\n        [replacement setStartTime:startTime];\n        [replacement setEndTime:[startTime\
  \ addTimeInterval:duration]];\n        [replacement setRoom:room];\n        self\
  \ = replacement;\n    }\n    return self;\n}\n\n- (void)encodeWithCoder:(NSCoder*)encoder\n\
  {\n    [NSException raise:NSInvalidArchiveOperationException\n                format:@\"\
  ScheduledEvent obsolete\"];\n}\n\n@end\n```\n\n解归档器（unarchiver）的委托对象也可以在不要求对象本身协作的情况下，执行解码时的对象替换。当对象被解码时，会向解归档器的委托对象发送一条`-unarchiver:didDecodeObject:`消息。委托可以选择返回一个与原始对象不同的对象，从而替换它。解归档器必须通过在解码任何对象之前设置其`delegate`属性来进行自定义。使用清单\
  \ 12-2 中的代码作为创建自定义解码器的模板。第 17 章详细解释了委托对象。\n\n> **注意：** 如果对象包含循环引用，解码期间的对象替换将无法可靠工作。循环引用会导致对象被递归地构造。返回给嵌套构造函数的对象引用将是部分初始化的对象，此时它尚未完成执行`-initWithCoder:`或收到`-replacementObjectForCoder:`消息。即使第一个对象已经替换了自身，第二个创建的对象仍将引用原始对象。\n\
  \n### 编码期间的类替换\n\n在其他情况下，一个类可能不希望归档自身。该类可能是某个类簇的私有子类——关于类簇的更多信息，请参见第 22 章。或者，为了与早期设计实现前向兼容性，它可能希望将其自身归档为另一个不同的类。无论出于何种原因，一个类可以选择在编码期间“假装”是另一个类，或者提供一个完全不同的对象来编码到它的位置。有三种方法可以实现编码时替换。\n\
  \n\n"
- "# Objective-C 序列化与归档\n\n## 类编码与对象替换\n\n第一种方式是重写 `-classForCoder` 方法。在编码过程中，此消息会被发送给对象。归档中对象的类由返回值决定。基类实现返回\
  \ `[self class]`，这会使对象以其实际类进行记录。如果对象的 `-classForCoder` 方法返回不同的类，则在解码时将创建该返回类对应的对象。请注意，在\
  \ `-encodeWithCoder:` 方法中编码的数据必须与 `-classForCoder:` 返回的类兼容。\n\n`-classForCoder`\
  \ 影响所有归档类型。如果只想将类替换限制在特定归档类型，可以重写 `-classForArchiver`、`-classForKeyedArchiver` 或\
  \ `-classForPortCoder`。如果未重写，这些方法将返回 `-classForCoder` 的值。\n\n第二种技术允许对象替换为完全不同的对象进行编码。这是通过重写\
  \ `-replacementObjectForCoder` 实现的，该方法通常返回 `self`（从而编码原始对象）。如果返回不同的对象，则编码该代理对象。`-replacementObjectForCoder:`\
  \ 会对所有归档编码执行此替换，但可以重写替代方法 `-replacementObjectForKeyedArchiver:`、`-replacementObjectForArchiver:`\
  \ 或 `-replacementObjectForPortCoder:`，以仅对特定归档类型执行替换。默认情况下，前两个方法会调用 `-replacementObjectForCoder:`。`-replacementObjectForPortCoder:`\
  \ 方法是分布式对象中的关键机制，其默认实现会将原始对象替换为远程代理对象。有关重写此方法的原因，请参见第 13 章。\n\n如果这还不够灵活，编码器的委托对象也可以通过实现\
  \ `-archiver:willEncodeObject:` 方法来执行对象替换。委托可以返回替换对象，临时执行替换，无需修改被编码的类。\n\n### Objective-C\
  \ 序列化\n\n在 Objective-C 术语中，序列化将一组数据对象转换为可传输的字节流，通常采用人类可读的格式。Objective-C 中有两种标准的序列化形式：属性列表（Property\
  \ Lists）和 XML。属性列表简单但非常方便，构成了用户默认设置（偏好设置）服务的基础。Cocoa 的 XML 支持包括常见的 DOM 和基于事件的 XML\
  \ 解析与编码。Objective-C 序列化不像归档那样可以编码任意对象，属性列表仅限于属性列表对象，XML DOM 编码则仅限于 XML 文档对象模型类。\n\
  \n### 属性列表\n\n属性列表是一个或多个属性列表对象中值的文本或二进制表示。属性列表对象是那些可以编码到属性列表中的对象。表 12-3 列出了所有属性列表对象。\n\
  \n**表 12-3.** 属性列表对象\n\n| 对象类 | 描述 |\n|--------|------|\n| `NSDictionary` | 属性列表对象的键/值映射\
  \ |\n| `NSArray` | 属性列表对象的顺序列表 |\n| `NSString` | 字符串 |\n| `NSNumber` | 整数、浮点数或布尔值\
  \ |\n| `NSDate` | 日期和时间 |\n| `NSData` | 任意字节数组 |\n\n属性列表用于多种目的，如存储用户默认设置（详见第 26\
  \ 章）。它们也非常适合编码简单值的集合，以便持久化或供其他应用程序解析。通常，属性列表是一个包含属性列表对象的键/值对字典，这些对象可以包含其他数组和字典。这使得属性列表对象能够形成任意复杂的树结构，叶节点由字符串、数字、日期或不透明数据组成。实际上，任何对象都可以通过先归档对象，然后将生成的\
  \ `NSData` 对象存储在属性列表树中，来存储到属性列表中。清单 12-13 创建了一个属性列表对象树，并将其序列化为属性列表。\n\n**清单 12-13.**\
  \ 生成属性列表\n\n```\nNSArray *attendees = [NSArray arrayWithObjects:\n    @\"Randy\"\
  ,\n    @\"Joy\",\n    @\"Douglas\",\n    @\"Heather\",\n    @\"Jon\",\n    nil];\n\
  \nNSDictionary *invitation = [NSDictionary dictionaryWithObjectsAndKeys:\n    @\"\
  X-Prize Launch Strategy\", @\"Description\",\n    [NSDate dateWithString:@\"2009-04-02\
  \ 10:00:00 -0700\"], @\"StartTime\",\n    [NSNumber numberWithInt:55], @\"Duration\"\
  ,\n    attendees, @\"Attendees\",\n    @\"Room 312\", @\"Location\",\n    nil];\n\
  \nNSData *data = [NSPropertyListSerialization dataFromPropertyList:invitation\n\
  \    format:NSPropertyListXMLFormat_v1_0\n    errorDescription:NULL];\n```\n\n`data`\
  \ 现在包含以下内容：\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist\
  \ PUBLIC \"-//Apple//DTD PLIST 1.0//EN\"\n    \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\"\
  >\n<plist version=\"1.0\">\n<dict>\n    <key>Attendees</key>\n    <array>\n    \
  \    <string>Randy</string>\n        <string>Joy</string>\n        <string>Douglas</string>\n\
  \        <string>Heather</string>\n        <string>Jon</string>\n    </array>\n\
  \    <key>Description</key>\n    <string>X-Prize Launch Stratagy</string>\n    <key>Duration</key>\n\
  \    <integer>55</integer>\n    <key>Location</key>\n    <string>Room 312</string>\n\
  \    <key>StartTime</key>\n    <date>2009-04-02T17:00:00Z</date>\n</dict>\n</plist>\n\
  ```\n\n用于编码和解码属性列表的 Objective-C 接口是 `NSPropertyListSerialization` 类。它提供了三个方法：\n\n\
  - `+dataFromPropertyList:format:errorDescription:`：将对象编码为属性列表。\n- `+propertyListFromData:mutabilityOption:format:errorDescription:`：解码属性列表。\n\
  - `+propertyList:isValidForFormat:`：确定数据是否包含有效的属性列表。\n\n对于所有转换，必须指定属性列表的格式。可能的格式如表\
  \ 12-4 所示。\n\n**表 12-4.** 属性列表格式\n\n| 格式 | 描述 |\n|------|------|\n| `NSPropertyListXMLFormat_v1_0`\
  \ | 属性值的 XML 表示 |\n| `NSPropertyListBinaryFormat_v1_0` | 属性值的紧凑二进制表示 |\n| `NSPropertyListOpenStepFormat`\
  \ | 已弃用的 ASCII 格式；可用于读取旧版 `.plist` 文件，但不能用于编码新的属性列表 |\n\n`NSDictionary` 和 `NSArray`\
  \ 都接受 `-writeToFile:atomically:` 或 `-writeToURL:atomically:` 消息。这会将它们的内容序列化，并将生成的\
  \ XML 属性列表写入文件或 URL。这些消息仅在集合包含属性列表对象时才能成功；任何非属性列表对象都会导致操作失败并返回 `NO`。不要将这些方法与 `NSData`\
  \ 和 `NSString` 实现的 `-writeToFile:atomically:` 和 `-writeToURL:atomically:` 混淆，后者将对象的原始内容写入文件，而非属性列表。\n\
  \n与 `-writeTo…:atomically:` 消息互补的是 `+[NSArray arrayWithContentsOfFile:]`、`+[NSArray\
  \ arrayWithContentsOfURL:]`、`+[NSDictionary dictionaryWithContentsOfFile:]` 和 `+[NSDictionary\
  \ dictionaryWithContentsOfURL:]` 便捷构造器。这些方法通过解释属性列表的内容来创建新的集合。\n\n默认情况下，通过解码属性列表创建的属性列表集合对象是不可变的，无论最初用于创建属性列表的对象的可变性如何。要创建可变的属性列表对象，请使用\
  \ `+[NSPropertyListSerialization propertyListFromData:mutabilityOption:format:errorDescription:]`。\n\
  \n\n\n`propertyListFromData:mutabilityOption:format:errorDescription:` 并在`mutabilityOption:`参数中传入`NSPropertyListMutableContainers`或`NSPropertyListMutableContainersAndLeaves`。前者会返回包含不可变叶子值的可变集合对象，后者将导致树中所有对象在可能的情况下变为可变。此选项不影响`NSNumber`或`NSDate`对象，它们本质上是不可变的。你也可以通过显式创建可变集合来创建顶层可变集合，例如`[NSMutableDictionary\
  \ dictionaryWithContentsOfFile:propertyFilePath]`。\n\n### XML\n\n与 Java 类似，Cocoa\
  \ 框架提供了一组用于创建、操作、编码和解码 XML 文件的类。虽然 XML 格式的属性列表是将非常简单值编码为 XML 的一种便捷方式，但`NSXML`类可以解释任何\
  \ XML 或 HTML 格式的数据。\n\n与 Java 一样，Objective-C 可以解析整个 XML 文档，生成文档对象模型（DOM）。或者它可以使用事件驱动解析器增量式地解释\
  \ XML 流。尽管许多细节有所不同，但 Java 和 Objective-C 为 XML 处理提供的总体接口几乎相同。\n\n清单 12-14 展示了用于从\
  \ XML 文件创建文档对象模型，然后将该 DOM 编码回 XML 文件的代码。\n\n**清单 12-14 XML 使用文档对象模型**\n\n**Java**\n\
  \n```java\nString filePath = ...\nDocument document = null;\nDocumentBuilderFactory\
  \ factory = DocumentBuilderFactory.newInstance();\nfactory.setValidating(false);\n\
  factory.setNamespaceAware(true);\ntry {\n    DocumentBuilder builder = factory.newDocumentBuilder();\n\
  \    document = builder.parse(new File(filePath));\n}\ncatch (Exception e) {\n \
  \   e.printStackTrace();\n}\n...\ntry {\n    Source source = new DOMSource(document);\n\
  \    Result result = new StreamResult(new File(filePath));\n    Transformer transformer\
  \ = TransformerFactory.newInstance().newTransformer();\n    transformer.transform(source,\
  \ result);\n}\ncatch (Exception e) {\n    e.printStackTrace();\n}\n```\n\n**Objective-C**\n\
  \n```objectivec\nNSString *filePath = ...\nNSXMLDocument *document;\nNSURL *furl\
  \ = [NSURL fileURLWithPath:filePath];\ndocument = [[NSXMLDocument alloc] initWithContentsOfURL:furl\
  \ options:NSXMLNodePreserveAll error:NULL];\n...\nNSData *xmlData = [document XMLData];\n\
  [xmlData writeToFile:filePath atomically:YES];\n```\n\nObjective-C 编码更为简单，因为`NSXMLDocument`类自动提供了\
  \ DOM 转换器。要将 XML 或 HTML 文件转换为文档对象模型，只需使用 XML 源的内容初始化一个新的`NSXMLDocument`对象。类似地，将现有\
  \ DOM 转换为其 XML 表示形式，只需向`NSXMLDocument`请求其`NSData`表示形式。另一种方法`-[NSXMLDocument XMLDataWithOptions:]`接受一组影响\
  \ XML 编码方式的标志。\n\nObjective-C 的事件驱动 XML 解析与其 Java 同类 SAX（Simple API for XML）相似。在\
  \ Java 中，你创建一个实现`org.xml.sax.ContentHandler`接口的自定义对象。该接口定义了许多回调方法（`startDocument()`、`startElement(String,\
  \ String, String, Attributes)`、`characters(char[], int, int)`等），这些方法在解析每个 XML 元素时被调用。你对这些方法的实现通常会使用解析后的内容来创建自定义数据模型对象，或将信息提供给另一个对象。\n\
  \n在 Objective-C 中，过程几乎相同，只是由委托方法（由非正式协议定义）接收解析事件。要使用 Objective-C 解析 XML 文件，需在你的类中实现相应的委托方法（`-parserDidStartDocument:`、`-parser:didStartElement:namespaceURI:qualifiedName:attributes:`、`-parser:foundCharacters:`等）。使用`-initWithData:`或`-initWithContentsOfURL:`创建`NSXMLParser`对象的实例，以指定\
  \ XML 源。将你的自定义对象设置为解析器的委托（`[xmlParser setDelegate:myParser]`），然后向其发送`parse`消息以开始解码。\n\
  \n### 复制对象\n\n归档和序列化实际上都是复制对象。如果你只需要高效地复制对象，Objective-C 提供了`-copy`消息，它可以几乎以与 Java\
  \ 的`Object.clone()`方法完全相同的方式复制对象。此外，Objective-C 定义了一个用于获取不可变对象可变副本的协议。\n\n复制对象可能产生浅拷贝或深拷贝，具体取决于对象的性质。浅拷贝是\
  \ Java 和 Objective-C 中的默认方式。浅拷贝创建一个新对象，其实例变量包含与原始对象相同的值。之所以称为浅拷贝，是因为复制后的对象将引用原始对象所引用的所有相同对象。对于不可变对象的引用，这是首选结果，因为它避免了不必要的对象重复。然而，对于可变对象，更改某个属性值也会影响副本的值。要真正独立于原始对象，复制的对象必须递归地复制其引用的任何可变对象，这称为深拷贝。\n\
  \n在 Java 中，一个可克隆的对象必须实现`java.lang.Cloneable`。如果你没有做其他操作，调用`Object.clone()`将对该对象执行浅拷贝。如果对象需要执行深拷贝，则必须重写`Object.clone()`并执行所需的任何额外复制操作。\n\
  \nObjective-C 非常类似。要使一个对象可复制，它必须遵循`NSCopying`协议并实现`-copyWithZone:`方法。要执行浅拷贝，`-copyWithZone:`可以调用`NSCopyObject(...)`来生成并返回对象的副本。如果需要进行深拷贝，应在返回之前执行额外的复制操作或其他内存管理。\n\
  \n清单 12-15 展示了一个对自身执行深拷贝的简单对象。\n\n**清单 12-15 复制对象**\n\n**Java**\n\n```java\npublic\
  \ class StormTrooper implements Cloneable {\n    ArrayList evilOrders;\n    public\
  \ Object clone() throws CloneNotSupportedException {\n        try {\n          \
  \  StormTrooper clone = (StormTrooper)super.clone();\n            clone.evilOrders\
  \ = (ArrayList)this.evilOrders.clone();\n            return (clone);\n        }\n\
  \        catch (CloneNotSupportedException e) {\n            throw new InternalError(e.toString());\n\
  \        }\n    }\n}\n```\n\n**Objective-C**\n\n```objectivec\n@interface StormTrooper\
  \ : NSObject <NSCopying> {\n    NSMutableArray *evilOrders;\n}\n@end\n\n@implementation\
  \ StormTrooper\n- (id)copyWithZone:(NSZone*)zone {\n    StormTrooper *clone = NSCopyObject(self,\
  \ 0, zone);\n    if (clone != nil)\n        clone->evilOrders = [evilOrders copy];\n\
  \    return (clone);\n}\n@end\n```\n\n要复制一个遵循`NSCopying`协议的对象，请向其发送`-copy`消息。该对象将向自身发送`-copyWithZone:`消息，如果该对象不遵循`NSCopying`协议，则会引发异常。请勿通过重写`-copy`来自定义对象复制。\n\
  \n`NSCopyObject`创建一个新对象。如果一个对象继承自已实现`-copyWithZone:`的类，则应通过向父类发送`-copyWithZone:`来创建副本，例如`MyClass\
  \ *clone = [super copyWithZone:zone]`，然后继续执行任何子类特定的复制操作。\n\n`NSCopyObject`很方便，但你并非必须使用它。你可以选择使用任何可用方法创建并初始化一个等效对象。例如，你可以使用`[[[self\
  \ class] alloc] init]`之类的方法创建一个新对象，然后初始化该新对象使其与原始对象相等。你也可以从类似对象的池中取出一个已创建的对象，并设置其属性使其匹配。一个不可变对象可以选择返回`self`，而不是实际进行复制。\n\
  \nObjective-C 还定义了一个用于获取不可变对象可变副本的接口。如果你实现了一个可复制的不可变类，并且该类有一个可变子类，你应遵循以下设计：\n\n\n\
  \n• 不可变的超类也应遵循 `NSMutableCopying` 协议并实现 `-mutableCopyWithZone:` 方法。\n• 在不可变的超类中，`-mutableCopyWithZone:`\
  \ 方法应创建一个可变子类的实例，复制相关数据，并返回新实例。\n• 在可变子类中，`-mutableCopyWithZone:` 方法应模仿 `-copyWithZone:`\
  \ 的行为，返回自身的一个可变副本。\n\n现在，你的对象将智能地响应 `-mutableCopy` 消息。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 12 章：序列化\n\n### 摘要\n\nObjective-C 的归档功能扮演了 Java 序列化的角色。创建一个可归档的类需要预先多做一些工作，但其基本模式与\
  \ Java 中的序列化相同。为归档数据提供向后（甚至可能是向前）兼容性并不困难。Objective-C 还提供了额外的好处：可以将编码对象的图限制为仅与根对象相关的那些对象，并在编码和解码过程中拥有灵活的对象替换与简化框架。\n\
  \n正如你现在所发现的，Objective-C 的序列化与 Java 序列化并不等同，但它确实提供了一种使用 XML 对数据进行编码的简单便捷方法。你还学习了创建对象内存副本的基本知识。\n\
  \n在牢固理解消息分发和对象归档的基础上，你现在可以体会到下一章将要讨论的分布式对象的简洁性了，它巧妙地将这两项特性结合在了一起。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 13 章：近程与远程通信\n\n通信是一个非常宽泛的术语。在抽象意义上，向一个 Objective-C 对象发送消息就是在与该对象“通信”。在另一个极端，将文件刻录到光盘上，然后由另一个程序读取，则是向该应用程序“通信”数据。本章重点介绍通过独立代理或服务在对象之间直接交换数据的通信技术。\n\
  \n在这个范围内，通信可以大致分为三个领域：同一进程内对象之间的消息交换、不同进程内对象之间的消息交换，以及通过网络进行的数据交换。本章将概述用于这三种情况的常用\
  \ Objective-C 技术，但其中一些技术的细节会在其他章节中介绍。这些领域之间有一定重叠。有些技术几乎专门用于在同一进程内运行的对象之间交换消息，但也可以用于向其他进程发送消息，反之亦然。因此，在确定解决方案之前，请花点时间熟悉所有这些技术。\n\
  \n### 单进程内通信\n\n有几种技术可用于与位于你进程内存地址空间中的对象交换消息。基础的 Objective-C 消息分发是其中之一，但本节将回顾以下几种代表其他对象向目标对象发送消息的技术：\n\
  \n- 延迟消息\n- 通知\n- 键值观察\n- 分布式对象\n\n延迟消息已在第 6 章讨论过。延迟消息使用 `-performSelector:…` 方法族发送。这是最简单的对象间通信形式。它将一个\
  \ Objective-C 消息排入队列，该消息将在稍后的某个时间发送给一个对象。该消息通常在同一线程中发送，但某些变体会在不同线程中将其发送给对象。\n\n\
  通知将 `NSNotification` 对象发送给感兴趣接收它们的对象。一个 `NSNotification` 是一个具名的消息容器，可以包含你想提供给接收者的任意信息。通知是\
  \ Objective-C 对提供者/订阅者模式的实现，并在第 18 章中描述。通知与其他通信技术最显著的区别在于，通知是一种一对多的通信路径，并且提供者和订阅者对象之间不需要有任何直接的相互了解。通知通过\
  \ `NSNotificationCenter` 对象进行分发。发送者描述其想要分发的通知的性质，接收者描述它希望接收的通知类型。通知中心将发送者与接收者进行匹配，并传递所请求的通知。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n键值观察（KVO）是一种专门的通知服务，用于传达对象属性的变更。一个观察者对象可以关联到另一个对象的特定属性。一旦关联，该属性的任何更改都会立即以\
  \ `-observeValueForKeyPath:ofObject:change:context:` 消息的形式发送给观察者。键值观察特别有吸引力，因为它对被观察对象没有预先的设计要求——除了它必须实现一个符合\
  \ KVO 规范的属性。因此，你的对象可以请求获知几乎任何对象的任何属性的更改。键值观察在第 19 章中描述。\n\n分布式对象（DO）通常用于在不同进程中的对象之间，或通过网络向其他系统发送消息。然而，它也可以用于在同一进程的不同线程之间发送消息。这种分布式对象的使用方式是为你的设计添加异步消息处理的一种简便方法。线程间\
  \ DO 将在下一节中描述和演示。\n\n### 与其他进程通信\n\n与其他进程通信受到一个严重限制：本地进程内存地址空间中的一个地址，对于任何其他进程来说都是毫无意义的。要与另一个进程交换信息，所有数据必须处于或转换为一种在进程外部有意义的可传输形式。这通常表现为由接收进程串行解释的字节数组。幸运的是，在上一章中，你刚刚学习了两种能对对象执行此转换的关键技术——归档和序列化。\n\
  \n端口、管道和套接字是用于在进程间交换字节块的低级工具。端口指的是 Mach 内核端口，这是消息发送到内核以及进而发送到其他进程的基本机制。从技术上讲，所有进程外的通信都是通过\
  \ Mach 端口执行的，因为这是进程与外部世界通信的唯一方式。在端口之上，是 POSIX 概念中的管道和套接字。从概念上讲，管道是一个单向的串行通信管道，两端各连接一个进程。一个进程注入管道中的字节会立即作为可读数据出现在另一端。套接字是两个进程之间的单向或双向通信管道。虽然管道仅限于在同一系统上运行的两个进程，但套接字可以通过数据网络或其他传输介质连接到在完全不同的计算机系统（可能相当遥远）上运行的进程。套接字更面向数据包，发送和接收离散的信息块，而非单个字节。\n\
  \n\n\n"
- "# 分布式通知与分布式对象\n\n`分布式通知`和`分布式对象`是两种主要的进程间高级通信技术。它们都是面向对象的设施，能够自动归档或序列化对象数据，以便传输到另一个进程或系统。`端口`、`管道`或`socket`被用于传输这些序列化数据。\n\
  \n本节将简要介绍 Objective-C 中与端口、管道和 socket 相关的接口，然后简要提及分布式通知，最后深入探讨分布式对象。分布式对象是面向对象进程间通信的巅峰，本章剩余大部分内容都将围绕它展开。\n\
  \n#### 底层通信\n\nObjective-C 提供了四个关键类来表示串行数据源：\n\n- `NSPort`\n- `NSPipe`\n- `NSStream`\n\
  - `NSFileHandle`\n\n这些类在功能和特性上有大量重叠之处。\n\n例如，可以通过`NSPort`、`NSPipe`和`NSFileHandle`连接到\
  \ BSD socket。它们都允许通过数据通道发送和接收串行数据。具体选择哪个类，很大程度上取决于使用场景。需要由运行循环处理的数据源必须是`NSPort`的子类。用于连接进程的\
  \ POSIX 管道（更常见的叫法是标准输入、标准输出和标准错误）可以是`NSPipe`或`NSFileHandle`对象。网络服务则提供`NSStream`对象与已连接的进程进行通信。\n\
  \n## NSPort\n\n`NSPort`是将数据源连接到运行循环的基类。推送到端口上的消息由运行循环处理。`NSMachPort`是一个子类，用于连接到\
  \ Mach 内核端口，实现直接的进程间通信。`NSSocketPort`可以连接到 BSD 管道或 socket，为不同进程和系统之间提供等效的功能。`NSPort`是分布式对象的基础，本章后面的\"\
  分布式对象\"部分将演示其中的几种类型。\n\n`NSMachPort`效率极高，是运行循环最常用的端口类型。用户事件、系统事件、延迟消息、定时事件以及许多其他底层消息，都通过应用程序的运行循环进行处理。大多数事件由系统或应用程序内部推送到运行循环的\
  \ Mach 端口上。Mach 端口也可用于在进程之间发送消息。其唯一限制在于操作系统的安全模型。所有 Mach 内核端口都存在于一个称为引导命名空间的域中。每个登录到\
  \ Mac OS X 系统的用户都会创建一个引导命名空间。一个进程只能与其命名空间及其父命名空间中的 Mach 端口进行通信。因此，应用程序可以使用 Mach\
  \ 端口与同一用户启动的另一个进程或系统守护进程建立通信，但不能与另一个用户启动的进程通信。\n\n当运行循环需要与其引导命名空间之外的进程或另一台计算机系统通信时，会使用`NSSocketPort`。`NSSocketPort`可以连接到多种不同的数据源；其中最有用的两种是\
  \ BSD 管道和 socket。管道可以是文件系统中的命名管道。文件系统名称对所有进程都是公开的，为不同引导命名空间中的两个进程提供了通信手段。网络 socket\
  \ 允许两个进程通过网络传输协议交换数据。其优势在于，另一个进程可以运行在同一台机器上，也可以运行在数千英里之外。其缺点是网络端口通常可以从计算机系统外部访问，这可能不适合某些通信场景，并存在安全隐患。\n\
  \n## NSPipe\n\n`NSPipe`本质上是对一对`NSFileHandle`对象的轻量封装。`NSPipe`用于与 BSD 管道交互。通常，这些管道就是连接进程的传统标准输入、标准输出和标准错误管道。清单\
  \ 13-1 演示了如何启动一个可执行文件并捕获新进程的文本输出。\n\n### 清单 13-1. 捕获标准输出\n\n**Java**\n\n```java\n\
  ProcessBuilder pb = new ProcessBuilder(\"/bin/echo\",\"Hello, Objective-C\");\n\
  try {\n    Process echo = pb.start();\n    InputStream stdOut = echo.getInputStream();\n\
  \    int c = (int)' ';\n    System.out.print(\"echo says:\");\n    do {\n      \
  \  System.out.print((char)c);\n        c = stdOut.read();\n    } while (c!=(-1));\n\
  } catch (IOException e) {\n    e.printStackTrace();\n}\n```\n\n**Objective-C**\n\
  \n```objc\nNSTask *echo = [NSTask new];\nNSPipe *stdOut = [NSPipe pipe];\n[echo\
  \ setLaunchPath:@\"/bin/echo\"];\n[echo setArguments:[NSArray arrayWithObject:@\"\
  Hello, Objective-C\"]];\n[echo setStandardOutput:stdOut];\n[echo launch];\n\nNSFileHandle\
  \ *outStream = [stdOut fileHandleForReading];\nNSData *output = [outStream readDataToEndOfFile];\n\
  NSLog(@\"echo says: %@\",[NSString stringWithCString:[output bytes]\n          \
  \                                  length:[output length]]);\n```\n\n在 Java 中，`java.lang.Process`对象会创建所需的`java.io.InputStream`或`java.io.OutputStream`对象并直接提供给你。而在\
  \ Objective-C 中，一切恰好相反。你需要先创建用于通信的`NSPipe`或`NSFileHandle`对象，然后通过`-setStandardInput:`、`-setStandardOutput:`或`-setStandardError:`消息将其传入。这必须在进程启动之前完成。启动时，`NSTask`会将你提供的管道或文件句柄连接到进程的实际管道上。另外请注意，术语的含义是相反的。在\
  \ Objective-C 中，`standardOut`属性是指进程的标准输出（即进程的输出）。在 Java 中，`java.lang.Process.getInputStream`获取的是连接到进程标准输出的`InputStream`。换句话说，Objective-C\
  \ 中的管道标识是基于进程的视角。而在 Java 中，则是基于父进程的视角。\n\n要获取实际的输入数据，需要从管道中获取用于读取的`NSFileHandle`。也可以完全绕过`NSPipe`，因为`-setStandardInput:`、`-setStandardOutput:`和`-setStandardError:`消息也接受`NSFileHandle`对象。因此，清单\
  \ 13-1 中的代码可以轻松改写为直接设置一个`NSFileHandle`作为其标准输出的连接，效果是相同的。\n\n## NSFileHandle\n\n\
  `NSFileHandle`是对 POSIX 文件进行通用封装的类。当与管道和 socket 一起使用时，它们就变成了流式接口。`NSFileHandle`的方法已在\"\
  文件\"章节中描述过。当与管道文件一起使用时，那些对串行数据没有意义的方法——特别是`-offsetInFile`、`-seekToFileOffset:`和`-seekToEndOfFile`——不应被使用。单向输出管道不应发送任何`-read...`消息，而单向输入管道则不会接受`-writeData:`消息。\n\
  \n与 Java 的`InputStream`类似，逻辑上的文件结束（EOF）条件仅在管道的输入侧关闭时才存在。因此，清单 13-1 中的`-[NSFileHandle\
  \ readDataToEndOfFile]`方法会一直挂起，直到管道的另一端关闭，即使管道中的所有数据都已被读取完毕。\n\n`NSFileHandle`的`-readInBackgroundAndNotify`、`-readToEndOfFileInBackgroundAndNotify`和`-waitForDataInBackgroundAndNotify`方法在与管道和\
  \ socket 一起使用时特别有用。这些消息会创建一个新线程，该线程等待管道中出现数据，然后发布一个你的应用程序可以观察到的通知。`-waitForData…`仅仅通知你数据已可用，但不会读取任何数据。而`-readInBackground…`\n\
  \n\n\n"
- "# 排版后\n\n`immediately reads what’s available and supplies that in the notification.\
  \ -readToEndOfFile…` 等待管道关闭，然后发送包含管道中所有剩余数据的通知。\n\n##### `NSStream`\n\n`NSFileHandle`是一个可用于数据流的通用包装器，而`NSStream`是一个专为串行数据流设计的专用类。`NSStream`有两个可用的子类：`NSInputStream`和`NSOutputStream`。它们是最接近`java.io.InputStream`和`java.io.OutputStream`的\
  \ Objective-C 等价类。基类`NSStream`定义了两个子类共有的方法（即`-open`、`-close`、`-streamStatus`）。自然地，`NSInputStream`定义了`-read:`...方法，`NSOutputStream`定义了`-write:`...方法，以及其他仅适用于输入或输出流的方法。\n\
  \n与它们的 Java 对应类类似，`NSInputStream`和`NSOutputStream`可以连接到各种源，包括管道、套接字、数据文件和内存缓冲区。但\
  \ Objective-C 并未为每种变体定义显式子类，而是提供了一个可以不同模式运行的单一类。你实际使用的对象可能是一个私有子类，但这是一个应被忽略的实现细节。表\
  \ 13-1 展示了 Java 流类及其对应的`NSInputStream`或`NSOutputStream`构造函数。\n\n**表 13-1. 创建流对象**\n\
  \n| Java | Objective-C |\n|------|-------------|\n| `new ByteArrayInputStream(bytes)`\
  \ | `[NSInputStream inputStreamWithData:bytes]` |\n| `new FileInputStream(path)`\
  \ | `[NSInputStream inputStreamWithFileAtPath:path]` |\n| `new ByteArrayOutputStream()`\
  \ | `[NSOutputStream outputStreamToMemory]` |\n| `new ByteArrayOutputStream(size)`\
  \ | `[NSOutputStream outputStreamToBuffer:buffer capacity:size]` |\n| `new FileOutputStream(path)`\
  \ | `[NSOutputStream outputStreamToFileAtPath:path append:NO]` |\n\n特定的 Java 子类包含适用于该类型数据流的方法。例如，`java.io.ByteArrayOutputStream`包含一个`toByteArray()`方法，可将收集到的输出数据作为字节数组对象检索。`NSStream`类通过其属性字典关联流特定信息。要获取由`+outputStreamToMemory`初始化的`NSOutputStream`收集的数据，请获取流的`NSStreamDataWrittenToMemoryStreamKey`属性，如下所示：\n\
  \n```\nNSData *bytes = [outStream propertyForKey:NSStreamDataWrittenToMemoryStreamKey];\n\
  ```\n\n类似地，连接到数据文件的流的当前文件位置可以通过操作流的`NSStreamFileCurrentOffsetKey`属性来检查或修改；该值是一个`NSNumber`对象。这些是仅有的两个通常感兴趣的流属性。其他属性与网络套接字配置有关。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 13 章 远近通信\n\n与 Java 类似，其他服务可能会创建并返回`NSInputStream`或`NSOutputStream`的特化子类——这些子类你不能、也不应尝试自行创建。这些不透明的子类通常是`NSStream`如何连接到管道或如何获取网络套接字端口的方式。\n\
  \n`NSFileHandle`和`NSStream`类之间的一个显著区别是异步数据的处理方式。`NSFileHandle`具有创建临时线程的方法，该线程等待数据可用，然后发送通知。`NSStream`对象设计为在运行循环内工作，提供事件驱动的流处理，而无需创建额外线程。要利用这一点，必须将流附加到正在运行的运行循环，如清单\
  \ 13-2 所示。\n\n**清单 13-2. `NSStream`事件处理**\n\n```\nNSInputStream *inStream = …\n\
  MyStreamHandler *delegate = [MyStreamHandler new];\n[inStream setDelegate:delegate];\n\
  [inStream scheduleInRunLoop:[NSRunLoop currentRunLoop]\n                   forMode:NSDefaultRunLoopMode];\n\
  [inStream open];\n…\n\n@implementation MyStreamHandler\n- (void)stream:(NSStream*)stream\
  \ handleEvent:(NSStreamEvent)eventCode\n{\n    switch (eventCode) {\n        case\
  \ NSStreamEventHasBytesAvailable:\n        {\n            uint8_t buffer[1024];\n\
  \            NSUInteger length;\n```\n\n\n\n`length = [(NSInputStream*)stream read:buffer\
  \ maxLength:sizeof(buffer)];`\n\n```objc\nif (length!=0) {\n// 对 buffer[] 中的数据进行处理……\n\
  }\nbreak;\n}\n\ncase NSStreamEventEndEncountered:\n{\n// 在流结束时执行操作……\nbreak;\n}\n\
  \ncase NSStreamEvent…:\n…\nbreak;\n}\n}\n\n@end\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- '# 第 13 章 ■ 近程与远程通信


  一旦调度完成，运行循环就会像分发其他类型的事件一样，向你的委托发送流事件消息。使用流事件是处理流数据最高效且首选的方法。你也可以通过在一个紧凑循环中反复向流发送`-hasBytesAvailable`消息来轮询流，但这很可能会造成
  CPU 资源的巨大浪费。


  ## 高级通信


  高级通信框架是一种面向对象的接口，用于交换消息和对象。主要有两种高级通信机制：


  - 分布式通知

  - 分布式对象


  这些框架使用上一节中描述的底层通信类来执行实际的数据交换，从而使你摆脱大部分繁琐的细节。高级框架都具备某种形式的注册表或自动发现机制，用于连接发送方和接收方。大多数情况下，客户端和远程服务只需约定一个公共标识符；框架将负责连接两者。


  ### 分布式通知


  分布式通知将在第 18 章中介绍，但这里也没什么可多说的。分布式通知与常规通知类似，但有两点关键区别：


  - 通知会被广播到所有进程。

  - 通知内容仅限于属性列表对象。


  分布式通知使用 Mach 端口，这将其通信范围限制在同一引导命名空间内的进程。它们使用序列化将数据转换为适合进程间交换的形式，因此通知的名称、源对象和信息都必须为属性列表对象，详见第
  12 章“Objective-C 序列化”一节。代码清单 13-3 展示了如何向运行在同一系统上的任意数量的观察者进程发送通知。


  **代码清单 13-3.** 发送分布式通知


  ```objc

  NSDictionary *info = [NSDictionary dictionaryWithObjectsAndKeys:

  @"会议提醒", @"消息",

  @"X-奖启动策略", @"描述",

  [NSDate dateWithString:@"2009-04-02 10:00:00 -0700"], @"开始时间",

  @"312 室", @"地点", nil];


  [[NSDistributedNotificationCenter defaultCenter]

  postNotificationName:@"PSEventReminder"

  object:@"com.apress.schedule"

  userInfo:info];

  ```


  分布式通知的发布和订阅非常容易。对于独立的、低频率的、单向的广播式消息，这是目前为止最简单的进程间通信解决方案。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


