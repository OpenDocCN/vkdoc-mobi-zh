  \n}\n\n}\n```\n\n`IdentityMatrix` 子类只表示单位矩阵。它用优化后的版本重写了 `Matrix` 的数学方法。通过重写 `multiply(Matrix)`\
  \ 和 `leftMultiply(Matrix)` 方法，无论它作为左操作数还是右操作数，都能拦截乘法运算。\n\n现在，每当为某个单位矩阵创建 `Matrix`\
  \ 对象时，`makeMatrix(…)` 方法会转而创建一个 `IdentityMatrix` 实例。这对客户端是完全透明的；客户端将所有对象都当作 `Matrix`\
