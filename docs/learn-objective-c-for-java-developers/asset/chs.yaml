  \ `NSWindowDidBecomeMainNotification` 通知。每当某个文档窗口变为活动窗口时，它会收到通知并更新其显示内容。变为活动的窗口包含在通知中。\n\
  \n- 您的应用程序实现了一个附加到特定窗口的“检查器”面板窗口。面板窗口对象将注册以接收来自特定文档窗口对象的 `NSWindowDidBecomeMainNotification`\
