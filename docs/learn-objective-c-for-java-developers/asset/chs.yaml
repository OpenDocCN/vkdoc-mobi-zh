  \ | 7.0 | | | |\n| `1,234.6` | | | | |\n| `0.0` | -1.0 | | | |\n| `#,##0.###;zero;#,##0.###-`\
  \ | 7 | | | |\n| `1,234.56` | | | | |\n| `zero` | | | | |\n| `0.988-` | | | | |\n\
  | `000000.0000` | `000007.0000` | | | |\n| `001234.5601` | | | | |\n| `000000.0000`\
  \ | | | | |\n| `-000000.9876` | | | | |\n| `00.0%` | `700.0%` | | | |\n| `123456.0%`\
  \ | | | | |\n| `00.0%` | | | | |\n| `-98.8%` | | | | |\n\n**表 8-11. 西班牙语（西班牙）中的示例数字格式模式**\n\
  \n| 数字格式 | 123 | 4.5 | 6 | -0.98765 |\n| --- | --- | --- | --- | --- |\n| `#,##0.5`\
  \ | 7,0 | | | |\n| `1.234,6` | | | | |\n| `0,0` | -1,0 | | | |\n| `#,##0.###;zero;#,##0.###-`\
  \ | 7 | | | |\n| `1.234,56` | | | | |\n| `zero` | | | | |\n| `0,988-` | | | | |\n\
  | `000000.0000` | `000007,0000` | | | |\n| `001234,5601` | | | | |\n| `000000,0000`\
