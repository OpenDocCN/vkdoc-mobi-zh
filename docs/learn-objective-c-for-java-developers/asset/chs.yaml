  }\n\n@end\n\n@interface TacticalDisplay : NSView {\n    TerrainMap *terrainMap;\n\
  \    …\n}\n\n@property (copy) TerrainMap *terrainMap;\n- (void)drawRect:(NSRect)dirtyRect;\n\
  \n@end\n\n…\n\n@implementation TacticalDisplay\n\n@synthesize terrainMap;\n\n- (void)drawRect:(NSRect)dirtyRect\
  \ {\n    …\n    [[NSColor cyanColor] setStroke]; // 设置默认位置颜色\n    **TerrainMap *map\
  \ = [self terrainMap];**\n    **[map drawRect:dirtyRect];**\n    **[[map customLocationColor]\
  \ setStroke];**\n    **[[map locationHighlightPath] stroke];**\n}\n\n@end\n```\n\
  \nObjective-C 版本充分利用了 `nil` 对象指针的能力。向 `nil` 指针发送消息不会执行任何操作。由于发送给 `nil` 的任何消息都返回\
  \ `nil`，因此对前一条消息返回的对象发送消息的嵌套调用也同样不会执行任何操作。如果清单 7-2 中的 `map` 对象指针为 `nil`，则后续的所有消息都不会被发送。如果\
  \ `map` 确实存在，但 `-customLocationColor` 消息返回了 `nil`，那么 `-setStroke` 消息会被忽略，并且不会设置自定义颜色。如果\
  \ `-locationHighlightPath` 消息返回了 `nil`，那么 `-stroke` 消息会被忽略，并且不会绘制位置图形。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 7 章 ■ 与 nil 交朋友\n\n> **注意** 虽然向 `nil` 发送消息不会执行任何操作，但这并不排除参数可能带来的副作用。消息的参数会在消息分发之前被组装并压入栈中。参数表达式中发送的消息或其他副作用（例如对某个值进行后置自增）仍然会发生。将接收者显式地与\
  \ `nil` 进行比较并在相等时跳过消息发送的一个原因，就是为了避免组装参数时产生不必要的副作用。\n\n**nil 返回零**\n\n只要调用者期望消息返回的是表\
  \ 7-1 中的一种变量类型，`nil` 接收者总是向调用者返回 `nil` 或 `0`。兼容的变量类型本质上包括任何指针或标量。\n\n***表 7-1.**\
  \ nil 消息返回值*\n\n| 返回类型 | 返回值 |\n|-------------|----------------|\n| `id` | `nil`\
  \ |\n| 指向任何类型的指针 | `NULL` |\n| `BOOL` | `NO` |\n| `(unsigned) char` | `'\\0'` |\n\
  | `(unsigned) int` / `(unsigned) long int` | `0L` |\n| `(unsigned) long long int`\
  \ | `0LL` |\n| `float` | `0.0f` |\n| `double` | `0.0` |\n| `long double` | `0.0`\
  \ |\n\n期望消息返回结构体的调用者与 `nil` 接收者不兼容。在这些情况下，你必须像在 Java 中一样避免向 `nil` 发送消息。清单 7-3 展示了一个简单示例。结构体通过使用特殊的“复制板”寄存器进行交换，这些寄存器不属于返回值的一部分。这条规则的一个晦涩例外是当整个结构体通过寄存器返回时。其机制在“Mac\
  \ OS X ABI 函数调用指南”（可从 [`developer.apple.com/`](http://developer.apple.com/) 获取）中有描述，并且与体系结构相关。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 7 章 ■ 与 nil 交朋友\n\n**清单\
  \ 7-3.** 避免向返回结构体的 nil 消息发送消息\n\n```objectivec\nNSView *headsUpDisplay = [self headsUpDisplay];\n\
  NSRect hudRect = NSMakeRect(0.0,0.0,0.0,0.0);\nif (headsUpDisplay != nil)\n    hudRect\
  \ = [headsUpDisplay visibleRect];\n```\n\n\n`if (hudRect.size.width > 0.0 && hudRect.size.height\
  \ > 0.0) {`\n\n`    …`\n\n`}`\n\n## 与 `nil` 设计\n\n拥抱 Objective-C 中的 `nil` 接收者将改变你编写代码和设计类的方式。本节将展示如何利用\
  \ `nil` 接收者来简化代码，并介绍三种利用 `nil` 的设计模式。抽象地说，这是采纳了“让数据做决定”的编程原则，该原则最早由计算机科学先驱、FORTH\
  \ 语言发明者 Charles Moore 提出。该原则避免编写用于处理异常情况的条件分支语句，转而倾向于使用包含这些情况的数据和表达式。\n\n对比清单 7-4\
  \ 中的两段代码片段。该代码是一个食谱管理程序的一部分。`makeLists` 方法负责汇总本周计划的食谱列表，以及一份必须在当前预算内的食材购物清单。如果所有食材的总成本超出预算，则省略本周后期餐食所需的食材。\n\
  \n该程序使用了多个类，其中许多类拥有必须考虑的*可选*属性。可能没有 `Budget` 对象，此时对购物清单没有预算限制。规划器中可能没有餐食，此时生成的列表将为空。\n\
  \n某餐可能没有 `recipe` 属性（有些餐食可能是外卖），此时它会进入餐食列表，但不会向购物清单添加任何食材。\n\n**清单 7-4.** 让 `nil`\
  \ 接收者做决定\n\n**Java**\n\n```java\npackage com.apress.java;\n\nimport java.util.*;\n\
  \npublic class Ingredient\n{\n    public double getCost( ) { ... }\n}\n\npublic\
  \ class Recipe\n{\n    protected ArrayList ingredients;\n    public synchronized\
  \ List<Ingredient> getIngredients() { ... }\n}\n\npublic class Meal\n{\n    protected\
  \ Recipe recipe;\n    public synchronized Recipe getRecipe() { ... }\n    public\
  \ synchronized void setRecipe( Recipe recipe ) { ... }\n}\n\npublic class Budget\n\
  {\n    public void planExpendature( double amount ) { ... }\n    public boolean\
  \ isOverBudget( ) { ... }\n}\n\npublic class RecipeBox\n{\n    protected ArrayList\
  \ meals;\n    public synchronized Budget getMealBudget() { ... }\n    public synchronized\
  \ List<Meal> getMeals() { ... }\n    public synchronized void setMeals( List<Meal>\
  \ meals ) { ... }\n\n    public void makesLists( )\n    {\n        ArrayList mealList\
  \ = new ArrayList();\n        ArrayList shoppingList = new ArrayList();\n\n    \
  \    Budget budget = getMealBudget();\n        List meals = getMeals();\n\n    \
  \    if (meals != null) {\n            boolean isOverBudget = false;\n         \
  \   for ( Meal meal: getMeals() ) {\n                Recipe recipe = meal.getRecipe();\n\
  \n                if (recipe != null) {\n                    List<Ingredient> ingredients\
  \ = recipe.getIngredients();\n                    for (Ingredient ingredient: ingredients)\
  \ {\n                        if (budget != null) {\n                           \
  \ budget.planExpendature(ingredient.getCost());\n                            if\
  \ (budget.isOverBudget())\n                                isOverBudget = true;\n\
  \                        }\n                    }\n                }\n         \
  \       mealList.add(meal);\n\n                if (!isOverBudget)\n            \
  \        shoppingList.addAll(recipe.getIngredients());\n            }\n        }\n\
  \    }\n}\n```\n\n**Objective-C**\n\n```objc\n#import <Cocoa/Cocoa.h>\n\n@interface\
  \ Ingredient : NSObject\n@property (readonly) double cost;\n@end\n\n@interface Recipe\
  \ : NSObject {\n    NSMutableArray *ingredients;\n}\n@property (assign) NSMutableArray\
  \ *ingredients;\n@end\n\n@interface Meal : NSObject {\n    Recipe *recipe;\n}\n\
  @property (assign) Recipe* recipe;\n@end\n\n@interface Budget : NSObject\n- (void)planExpenditure:(double)amount;\n\
  - (BOOL)isOverBudget;\n@end\n\n@interface RecipeBoxController : NSObject {\n   \
  \ NSMutableArray *meals;\n}\n@property (assign) NSMutableArray *meals;\n@property\
  \ (readonly,copy) Budget *mealBudget;\n- (void)makeLists;\n@end\n\n@implementation\
  \ RecipeBoxController\n…\n\n- (void)makeLists\n{\n    NSMutableArray *mealList =\
  \ [NSMutableArray new];\n    NSMutableArray *shoppingList = [NSMutableArray new];\n\
  \n    NSMutableArray *affordableGroceryList = shoppingList;\n    Budget *budget\
  \ = [self mealBudget];\n```\n\n\n\n"
- "# 排版后内容\n\n```\nfor (Meal *meal in [self meals]) {\n    for (Ingredient *ingredient\
  \ in [[meal recipe] ingredients])\n        [budget planExpenditure:[ingredient cost]];\n\
  \    if ([budget isOverBudget])\n        affordableGroceryList = nil;\n    [mealList\
  \ addObject:meal];\n    [affordableGroceryList addObjectsFromArray:[[meal recipe]\
  \ ingredients]];\n}\n@end\n```\n\nJava 方法使用传统条件语句来分支处理各种情况。而 Objective-C 方法则很大程度上依赖于对象的存在与否来决定其行为。如果\
  \ `budget` 对象是 `nil`，则不会发送 `-planExpenditure:` 消息，且 `-isOverBudget` 消息始终返回 `NO`。如果某餐的\
  \ `recipe` 属性为 `nil`，则不处理任何食材。如果超出预算，则将 `affordableGroceryList` 指针设置为 `nil`，并且 `shoppingList`\
  \ 将停止接收 `-addObjectsFromArray:` 消息。\n\n要开始使用 `nil` 进行设计，请遵循以下三个原则：属性访问器、缺席行为和与“无”的一致性。\n\
  \n#### 属性访问器\n\n您可能已经遵循 Java 的实践，为所有类属性编写访问器方法。Objective-C 只是为您提供了继续进行这项实践的一个理由。\n\
  \n由于 `nil` 对象始终返回 `nil` 或 `0`，因此所有获取或设置表 7-1 中某一类型的属性访问器方法都可以安全地用于 `nil` 接收器。在代码清单\
  \ 7-4 中，无论 `meal` 指向的是 `Meal` 对象还是 `nil`，表达式 `[meal recipe]` 都可以被调用。相比之下，如果 `meal`\
  \ 是 `nil`，表达式 `meal->recipe` 将导致应用程序崩溃。同样地，如果 `meal` 是 `nil`，语句 `[meal setRecipe:recipe]`\
  \ 将不执行任何操作。\n\n## 缺席行为\n\n围绕对象的存在与否来设计可选行为。当对象存在时，对象执行消息；当对象不存在时，则什么都不发生。简单的例子有：\n\
  \n*   `Logger` 对象：发送给日志记录器的消息会被记录，如果日志记录器为 `nil`，则忽略。\n*   `Listener` 对象：只有在建立了监听器后，才会发送状态和更新消息。将监听器设置为\
  \ `nil` 将抑制更新。\n*   `Delegate` 对象：如果设置了委托，则查询委托；否则使用默认答案。这是缺席行为和与“无”的一致性设计的结合，将在下文中讨论。\n\
  \n代码清单 7-5 展示了一个简单的 FIFO 栈类，它可以以线程安全的方式运行，但仅在应用程序需要它线程安全时才如此。\n\n**代码清单 7-5.** 缺席对象行为\n\
  \n```\n@interface AutoSafeFIFO : NSObject {\n    NSMutableArray *stack;\n@private\n\
  \    NSLock *lock;\n}\n- (void)push:(id)object;\n- (id)pop;\n- (BOOL)hasObjects;\n\
  - (void)makeThreadSafe;\n@end\n\n@implementation AutoSafeFIFO\n\n- (id)init\n{\n\
  \    self = [super init];\n    if (self != nil) {\n        stack = [NSMutableArray\
  \ new];\n    }\n    return self;\n}\n\n- (void)push:(id)object\n{\n    [lock lock];\n\
  \    [stack addObject:object];\n    [lock unlock];\n}\n\n- (id)pop\n{\n    id object\
  \ = nil;\n    [lock lock];\n    if ([stack count] != 0) {\n        object = [stack\
  \ objectAtIndex:0];\n        [stack removeObjectAtIndex:0];\n    }\n    [lock unlock];\n\
  \    return object;\n}\n\n- (BOOL)hasObjects\n{\n    [lock lock];\n    BOOL answer\
  \ = ([stack count] != 0);\n    [lock unlock];\n    return answer;\n}\n\n- (void)makeThreadSafe\n\
  {\n    lock = [NSLock new];\n}\n\n@end\n```\n\n`lock` 对象初始为 `nil`，因此所有发送给 `lock`\
  \ 和 `unlock` 的消息都不会执行任何操作。这提供了最佳性能，但牺牲了线程安全。为了在多线程环境中安全地运行，`-makeThreadSafe` 方法将\
  \ `lock` 属性设置为一个真正的 `NSLock` 对象。一旦设置，`lock` 和 `unlock` 消息现在会发送给 `NSLock` 对象，从而提供所需的线程同步。\n\
  \n## 与“无”的一致性\n\n设计您的类属性，使得 `nil` 或 `0` 的值与“无”对象的概念保持一致。通常，这意味着定义表达正面属性（而非负面属性）的属性——这通常是一个好习惯。在代码清单\
  \ 7-5 中，`AutoSafeFIFO` 类定义了 `-(BOOL)hasObjects`。您可能想定义一个 `-(BOOL)isEmpty` 方法。但如果接收器是\
  \ `nil`，`isEmpty` 将返回 `NO`，这暗示着 `nil` 对象拥有对象，而显然它并没有。\n\n### 没有免费的午餐\n\nObjective-C\
  \ 对 `nil` 接收器的处理可以使您的代码更简单、更安全、更优雅。然而，这并不意味着 `nil` 在任何对象指针所在的地方都是普遍可接受的。正如您已经看到的，尝试使用\
  \ `nil` 对象指针访问成员值将导致程序突然终止。大多数接受对象指针的方法参数通常期望一个对象，而不是 `nil`。例外情况通常会在文档中说明。\n\n例如，大多数\
  \ Cocoa 集合类——就像 Java 一样——不允许将 `nil` 对象作为值存储或用作键。因此，虽然向 `nil` 接收器发送 `-addObject:`\
  \ 消息是完全安全的，但语句 `[array addObject:nil]` 会抛出一个运行时异常（当然，前提是 `array` 不是 `nil`）。\n\n\
  ### 总结\n\n以 Java 背景出身，我可以告诉您，拥抱 `nil` 接收器需要一些时间来适应。有一种潜意识的、近乎本能的趋势，即在设计的每个步骤以及编写代码时都避免空引用。学习如何利用\
  \ `nil` 对象为您带来好处需要一些练习，但最终是值得的。\n\n---\n\n"
