  **图 4-2.** *项目窗口*


  大多数模板生成的项目可以立即构建并运行，但并无实际用途。`Cocoa Application` 模板也不例外。如果你愿意，现在就可以构建并启动该应用程序（“Build”→“Build
  and Run”）。


  项目窗口的“`Group & Files`”窗格用于组织项目的资源。你可以通过创建新的组和子组，以及拖拽重新排列项目，来创建任意复杂的源项目层级结构。你可以直接在项目中创建新文件，或导入现有文件。默认情况下，实际文件都存储在项目根文件夹中。可以将物理文件组织成层级结构，或将其放置在项目文件夹之外，但对于规模适中的项目，将组织工作限制在项目窗口内会简单得多。


  ### 开始之前


  在开始主要设计之前，需要进行一些整理工作。为了获得最接近 Java 的体验，你希望应用程序使用垃圾收集机制。截至本书编写时，垃圾收集是选择加入的；除非重新配置，否则一个新的
  Cocoa 项目将使用遗留内存管理。


  从菜单中选择“Project”→“Edit Project Settings”。切换到“`Build`”选项卡，选择“`All Configurations`”和“`All
  Settings`”，然后在搜索字段中输入 `garbage`。你应看到如图 4-3 所示的“`Objective-C Garbage Collection`”构建设置。点击值弹出菜单，将设置更改为“`Required`”。构建设置的更改会立即生效。




