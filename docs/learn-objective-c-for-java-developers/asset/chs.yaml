- "# 第 13 章 ■ 近程与远程通信\n\n##### 分布式对象\n\n分布式对象（DO）是对象间通信的巅峰，等同于 Java 的远程方法调用（RMI）技术。分布式对象比\
  \ RMI 更灵活、更易用，使其成为解决多种设计问题的便捷方案。本节将介绍分布式对象的基本工作原理、建立与远程对象连接的几种不同方式、如何发送和接收消息，以及如何影响进程间的对象交换。\n\
  \n### 分布式对象的工作原理\n\n在 Java 中使用远程方法调用通常涉及以下步骤：\n\n1. 创建一个接口，定义你的远程对象所实现的方法。\n2. 创建一个类，实现步骤\
  \ 1 中的接口。\n3. 执行 `rmic` 工具，根据实现类生成 `_Stub` 类。\n4. 将所有传递给接口方法或从接口方法返回的对象设置为 `Serializable`。\n\
  5. 启动 `rmiregistry` 进程。\n6. 在你的服务器进程中创建实现类的一个实例。\n\n\n7.  将该对象注册为命名服务。\n\n8.  在客户端进程中，请求该服务的代理对象。\n\
  \n9.  调用代理对象的方法，以在服务器进程中的对象实例上调用相同的方法。\n\n在 Objective-C 中使用分布式对象遵循相同的一般工作流程，但 Objective-C\
  \ 省略了步骤 3 和 5，并使步骤 1、2、4 和 7 变为可选。在 Objective-C 中，使用分布式对象所需的最小步骤如下：\n\n1.  通过附加到运行循环的连接对象提供任意对象。\n\
  2.  客户端从连接请求所提供对象的代理对象。\n3.  客户端向代理对象发送消息。\n\n关键区别在于，你无需做任何特殊操作即可创建远程对象的代理——Objective-C\
  \ 会自动创建代理对象——并且对象无需可归档即可传递给远程消息或从远程消息返回。尽管使对象可归档可能带来一些优势，如“按副本传递对象”一节所述。\n\n清单 13-4\
  \ 对比了 Java RMI 与 Objective-C 分布式对象。这些演示的完整源代码和项目可在 `http://www.apress.com/` 的“源代码/下载”区域获取。其中包含了用于编译和运行示例的\
  \ Shell 脚本。要逐个尝试 Objective-C 示例，请打开并构建 Xcode 项目。打开一个终端窗口，`cd` 到包含 `Greeter` 和 `Guest`\
  \ 可执行文件的构建目录。使用 `./Greeter` 或 `./Guest` 从 Shell 运行命令。你可能希望打开多个窗口来测试进程间通信，或者将可执行文件复制到同一网络上的另一台计算机，以试验网络连接。按\
  \ `Control-C` 停止正在运行的服务器进程。\n\nJava 实现在功能上与 Objective-C 版本类似。两个示例都在两个独立的进程中运行：一个\
  \ `Greeter` 服务器和一个 `Guest` 客户端。`Greeter` 进程创建并发布一个单一的 `Greeter` 对象。客户端应用程序通过按名称查找\
  \ `Greeter` 服务来连接到远程进程，获取服务器中存在的 `Greeter` 对象的代理，并与其进行交互。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 13 章 ■ 远近通信\n\n这些程序的输出如清单 13-5 所示。服务器和客户端形成一对多的关系。你可以根据需要启动任意数量的客户端进程；它们都将连接并与单个\
  \ `Greeter` 对象进行交互。\n\n清单 13-4. 远程方法调用\n\nJava：`Greeter` 和 `Guest` 类\n\n```java\n\
