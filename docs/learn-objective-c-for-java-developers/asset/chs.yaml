  迎宾器的最终回应是 \"很荣幸为您服务。\"\n```\n\n**Objective-C 迎宾器：**\n```\n$ ./Greeter --mach\n正在启动迎宾服务\
  \ 'ObjCGreeter'\n迎宾器 <Greeter: 0x1011bf0> 被请求执行 sayHello\n迎宾器 <Greeter: 0x1011bf0>\
