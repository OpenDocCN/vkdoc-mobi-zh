- "# 注意事项\n\n在 64 位架构中，整数的大小再次发生了变化。如果你为 64 位 CPU 编译代码，`long int` 会变为 64 位整数——而 `short\
  \ int`、`int` 和 `long long int` 则保持原有大小。如果你需要一种在 32 位架构上为 32 位、在 64 位架构上为 64 位的整数值，请将其声明为\
