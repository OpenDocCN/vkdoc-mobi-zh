- '# 懒加载模式


  懒加载模式体现了数据交付的即时加载理念。它将值或数据结构的构建延迟到真正需要该数据的时候。懒加载是 Java 和 Objective-C 中一种流行的设计模式。Objective-C
  通过实现其自身的类结构懒加载增加了另一个层次，你可以将其集成到自己的类中。


  ### 实现该模式


  以下是实现懒加载模式的方法：


  1. 创建一个私有实例变量或私有静态变量，该变量最终将包含数据，但初始化为一个占位值（通常是`nil`）。

  2. 将该变量包装成一个提供公共 getter 方法的属性。

  3. 在 getter 方法中，测试该变量是否为占位值。如果尚未初始化，则构建它并保存结果。将新构建的或先前构建的数据返回给调用者。


  懒加载通常适用于以下情况：

  - 创建或计算数据所需的内存或资源过于庞大，可以推迟。

  - 有很大可能永远不需要这些数据。

  - 实例化对象时，数据的前置条件不存在或不可用。


  延迟计算某个值，或组装一个大型或复杂的数据结构，可以节省内存和 CPU 资源，直到实际需要数据时再使用。在某些情况下，数据可能永远不需要，从而显著提高性能。通过将操作推迟到稍后时间，可以提升感知性能，使应用程序能够立即更新显示或响应用户事件，而更复杂、耗时的工作则在之后完成。典型的例子是照片浏览应用程序，它立即向用户显示占位图或缩略图，而实际图像则在后台加载。用户会感觉应用程序运行得更快，因为它的响应性更好，即使加载和显示最终图像的实际时间可能更慢。


  一个能够快速创建对象且内存需求极小的对象构造器称为轻量级构造器。即使对象本身是重量级的，其构造器也可以是轻量级的。使用上面的例子，图像视图对象可以几乎瞬间初始化，只需图像的尺寸和可以获取图像数据的
  URL。构造器以及更新窗口或布局多页文档所需的属性是轻量级的，并且立即可用——即使实际图像需要数兆字节的内存和几秒钟才能获取。


  ### 全局变量的懒加载


  懒加载通常应用于全局变量。Java 相对于 Objective-C 的一个优势是它能够为静态变量声明对象初始化器。Java 运行时在类加载时评估初始化语句。


  ```

  public final static String[] ColorNames = new String[] { "White", "Black" };

  ```


  Objective-C 中真正的全局变量是 C 静态变量。C 静态变量只能使用常量或静态地址进行初始化，并且此初始化发生在 Objective-C 运行时启动之前。要达到相同的效果，需要在
  Objective-C 运行时启动后以某种形式进行自动初始化。




  '
- "# `ChessPiece` 类与惰性初始化\n\n`ChessPiece` 类（如代码清单 21-1 和 21-2 所示）通过定义两个类属性 `+[ChessPiece\
  \ colorNames]` 和 `+[ChessPiece pieceNames]` 来实现这一点。这两个属性返回一个不可变的字符串集合，可用于将颜色或棋子枚举（`int`）转换为字符串。它们在首次被请求时，采用**惰性初始化**来创建并保存这些不可变数组。\n\
  \n## 代码清单 21-1：`ChessPiece.h`\n\n```objective-c\n#import <Cocoa/Cocoa.h>\n\ntypedef\
  \ enum {\n    White=0,\n    Black\n} Color;\n\ntypedef enum {\n    Pawn=0,\n   \
  \ Rook,\n    Bishop,\n    Knight,\n    Queen,\n    King\n} Piece;\n\n@interface\
  \ ChessPiece : NSObject {\n    Color color;\n    Piece piece;\n}\n\n+ (NSArray*)colorNames;\n\
  + (NSArray*)pieceNames;\n+ (NSDictionary*)images;\n+ (NSString*)nameOfPiece:(Piece)piece\
  \ color:(Color)color;\n\n- (id)initWithPiece:(Piece)thePiece color:(Color)theColor;\n\
  \n@property (readonly) Color color;\n@property (readonly) Piece piece;\n@property\
  \ (readonly) NSString *name;\n@property (readonly) NSImage *image;\n\n@end\n```\n\
  \n## 代码清单 21-2：`ChessPiece.m`\n\n```objective-c\n#import \"ChessPiece.h\"\n\nstatic\
  \ NSArray *ColorNames;\nstatic NSArray *PieceNames;\nstatic NSDictionary *PieceImages;\n\
  \n@implementation ChessPiece\n\n+ (NSArray*)colorNames\n{\n    if (ColorNames==nil)\
  \ {\n        ColorNames = [NSArray arrayWithObjects:\n                      @\"\
  White\",\n                      @\"Black\",\n                      nil];\n    }\n\
  \    return ColorNames;\n}\n\n+ (NSArray*)pieceNames\n{\n    if (PieceNames==nil)\
  \ {\n        PieceNames = [NSArray arrayWithObjects:\n                      @\"\
  Pawn\",\n                      @\"Rook\",\n                      @\"Bishop\",\n\
  \                      @\"Knight\",\n                      @\"Queen\",\n       \
  \               @\"King\",\n                      nil];\n    }\n    return PieceNames;\n\
  }\n\n+ (NSDictionary*)images\n{\n    if (PieceImages==nil) {\n        // 加载整组棋子图片\n\
  \        NSMutableDictionary *images = [NSMutableDictionary new];\n        Color\
  \ color;\n        Piece piece;\n        for (color=White; color<=Black; color++)\
  \ {\n            for (piece=Pawn; piece<=King; piece++) {\n                NSString\
  \ *name = [ChessPiece nameOfPiece:piece color:color];\n                [images setObject:[NSImage\
  \ imageNamed:name] forKey:name];\n            }\n        }\n        PieceImages\
  \ = [NSDictionary dictionaryWithDictionary:images];\n    }\n    return PieceImages;\n\
  }\n\n+ (NSString*)nameOfPiece:(Piece)piece color:(Color)color\n{\n    return [NSString\
  \ stringWithFormat:@\"%@ %@\",\n            [[ChessPiece colorNames] objectAtIndex:color],\n\
  \            [[ChessPiece pieceNames] objectAtIndex:piece]];\n}\n\n- (id)initWithPiece:(Piece)thePiece\
  \ color:(Color)theColor\n{\n    self = [super init];\n    if (self != nil) {\n \
  \       piece = thePiece;\n        color = theColor;\n    }\n    return self;\n\
  }\n\n@synthesize color, piece;\n\n- (NSString*)name\n{\n    return [ChessPiece nameOfPiece:piece\
  \ color:color];\n}\n\n- (NSImage*)image\n{\n    return [[ChessPiece images] objectForKey:[self\
  \ name]];\n}\n\n@end\n```\n\n它还定义了一个类属性 `+[ChessPiece images]`，其中包含所有棋子的图像。该属性在\
  \ `ChessPiece` 对象首次尝试获取其图形表示时进行惰性初始化。这是一个耗时且资源密集的初始化过程，并且需要应用程序完全初始化并正常运行，因为它依赖于在其应用包中查找图像资源文件。\n\
  \n### 类的 `+initialize` 方法\n\nObjective-C 类本身也是惰性初始化的。定义类的结构直到第一条消息发送给该类时才构建。这使得运行时更加敏捷，能够以最少的初始化量启动。但\
  \ Objective-C 更进一步：在初始化 `Class` 对象之后、发送任何其他消息之前，运行时会向新创建的 `Class` 对象发送一条单独的 `+initialize`\
  \ 消息。你可以重写此方法以执行额外的类级别初始化。\n\n通过利用 `+initialize` 消息，`ChessPiece` 类可以显著简化，如代码清单 21-3\
  \ 和 21-4 所示。\n\n## 代码清单 21-3：使用 `+initialize` 的 `ChessPiece.h`\n\n```objective-c\n\
  #import <Cocoa/Cocoa.h>\n\ntypedef enum {\n    White=0,\n    Black\n} Color;\n\n\
  typedef enum {\n    Pawn=0,\n    Rook,\n    Bishop,\n    Knight,\n    Queen,\n \
  \   King\n} Piece;\n\n@interface ChessPiece : NSObject {\n    Color color;\n   \
  \ Piece piece;\n}\n\n+ (NSString*)nameOfPiece:(Piece)piece color:(Color)color;\n\
  ```\n\n\n\n- (id)initWithPiece:(Piece)thePiece color:(Color)theColor; 407\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
