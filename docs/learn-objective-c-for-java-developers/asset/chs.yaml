  \ Java 中非常相似。`NSNumber` 类提供了多种转换方法，用于返回原始值的最佳表示形式。这些方法列于表 8-2 中。\n\n**表 8-2.** *基本类型转换*\n\
  \n| Java 类型 | Java | Objective-C |\n|-----------|------|-------------|\n| boolean\
  \ | `value.booleanValue()` | `[value boolValue]` |\n| byte | `value.byteValue()`\
  \ | `[value charValue]` |\n| char | `value.charValue()` | `[value unsignedShortValue]`\
  \ |\n| short | `value.shortValue()` | `[value shortValue]` |\n| int | `value.intValue()`\
  \ | `[value integerValue]` |\n| long | `value.longValue()` | `[value longLongValue]`\
  \ |\n| float | `value.floatValue()` | `[value floatValue]` |\n| double | `value.doubleValue()`\
  \ | `[value doubleValue]` |\n\n由于单一的 `NSNumber` 类负责所有原始标量类型的转换，因此在 Objective-C 中类型转换是正交的；任何\
  \ `NSNumber` 对象都能将它的值作为 `BOOL`、`char`、`integer` 或浮点值返回。这种对称性在 Java 中被打破，例如 `Boolean`\
  \ 类不包含 `intValue()` 方法，`Character` 类不包含 `boolValue()` 方法，等等。\n\n转换通常遵循 C 语言中原生类型转换的规则。这意味着，向\
  \ `NSNumber` 请求其 `intValue` 与将原始值转换为 `int`（如 `(int)original`）并无区别。如果请求的类型无法表示原始值，不会抛出任何异常。\n\
  \n#### 将字符串转换为标量\n\n在 Java 中，每个包装器类都有多个方法用于解析字符串并解释其标量值，可返回原始类型或对象。例如，`java.lang.Integer`\
  \ 类包含一个字符串构造函数（`Integer(String)`）、一个接收字符串并返回整数原始值的静态方法（`parseInt(String)`），以及一个接收字符串并返回\
  \ `Integer` 对象的静态方法（`valueOf(String)`）。`Boolean`、`Character`、`Short`、`Float` 和 `Double`\
  \ 类也包含类似的方法。\n\n在 Objective-C 中，`NSString` 类实现了表 8-2 中列出的相同标量转换方法。向字符串对象发送 `-intValue`\
  \ 消息可将其解释为整数。向其发送 `-floatValue` 可将其解释为浮点数。要将字符串转换为 `NSNumber` 对象，可从转换后的值创建一个新的 `NSNumber`，如\
  \ `[NSNumber numberWithInt:[string intValue]]`。\n\n十六进制字符串可以使用 `NSScanner` 对象进行转换。`NSScanner`\
  \ 是一个用于解析字符串的通用工具类。要将包含十六进制数字的字符串转换为整数，可以为该字符串创建一个扫描器，然后使用 `-[NSScanner scanHexInt:]`\
  \ 方法进行解析，如代码清单 8-1 所示。\n\n**代码清单 8-1.** 将十六进制字符串转换为整数\n\n```\nunsigned int i;\n\
  NSScanner *scanner = [NSScanner scannerWithString:@\"cafe1234\"];\n[scanner scanHexInt:&i];\n\
  ```\n\n`NSFormatter` 提供了另一种且更为复杂的方法来将字符串转换为数字。虽然通常用于将数字转换为字符串，但 `NSFormatters` 是双向的，也能将字符串转换回标量值。本章后续的“格式化”部分将进一步讨论\
  \ `NSFormatters`。\n\nCocoa 框架类中不包含像 Java 的 `java.lang.Integer.parseInt(String s,\
  \ int radix)` 那样用于任意基数转换的通用数字转换方法。格式化转换仅支持八进制、十进制和十六进制。可以使用 C 库函数 `strtol(…)` 来完成任意基数的转换。这需要将\
  \ Objective-C 字符串对象转换为 C 字符串（本章后面会介绍），然后将其传递给 `strtol(…)` 函数或其相关函数。\n\n### 包装数组\n\
  \n在 Java 中，数组本身已是对象，因此语言不需要为它们包装器类。Objective-C 中的原生数组并非对象，但可以使用 `NSData` 类对它们进行包装。`NSData`\
  \ 为任何无定形的内存块提供了通用包装器。`NSData` 特别方便，因为它能让你摆脱底层 C 语言内存分配函数的束缚，让你像操作对象一样创建和管理大型结构体及原生\
  \ C 数组。\n\n`NSData` 封装了一个不可变的字节数组。`NSMutableData` 子类用于管理可变的字节数组。`NSData` 提供了获取字节数组大小和起始地址的方法。`NSMutableData`\
  \ 扩展了 `NSData`，增加了调整数组大小以及追加、替换和删除字节的方法。表 8-3 列出了创建 `NSData` 对象的常用方式。\n\n**表 8-3.**\
  \ *常用 `NSData` 构造函数*\n\n| 方法 | 用途 |\n|--------|---------|\n| `+[NSData dataWithBytes:length:]`\
  \ | 创建一个新的 `NSData` 对象，其中包含给定地址和长度的内存的副本。 |\n| `+[NSData dataWithBytesNoCopy:length:]`\
  \ | 此构造函数将一个 `NSData` 对象包装在使用 C 语言 `malloc(…)` 函数（底层 C 内存管理）分配的内存块周围。该对象承担这块内存的管理责任，并在对象被销毁时释放它。这是将\
  \ C 分配的内存块转换为 Objective-C 对象最有效的方式。 |\n| `+[NSData dataWithBytesNoCopy:length:freeWhenDone:]`\
  \ | 如果 `freeWithDone:` 参数为 `YES`，则此方法等同于 `+[NSData dataWithBytesNoCopy: length:]`。如果参数为\
  \ `NO`，则使用 `NSData` 对象包装一个现有的内存块。新对象仅引用在构造时给定的原始地址和长度。程序员有责任确保其引用的内存在 `NSData` 对象的生命周期内有效。此构造函数在避免数据复制的性能开销方面尤为有用。\
  \ |\n| `+[NSData dataWithContentsOf…:]` | 创建一个 `NSData` 对象，其中包含目标对象内原始数据的副本。此便捷构造函数系列包括\
  \ `+dataWithContentsOfFile:`、`+dataWithContentsOfURL:` 等。 |\n| `+[NSData dataWithData:]`\
  \ | 创建一个新的 `NSData` 对象，它是现有 `NSData` 对象的副本。 |\n| `+[NSMutableData data]` | 创建一个长度为零的\
  \ `NSMutableData` 对象。 |\n| `+[NSMutableData dataWithLength:]` | 创建一个给定长度的可变字节数组包装器，并用零填充。\
  \ |\n\n由于 `NSMutableData` 是 `NSData` 的子类，所有 `NSData` 的构造函数也同样适用于 `NSMutableData`，例如使用\
  \ `[NSMutableData dataWithData:data]` 来创建现有 `NSData` 对象的可变副本。事实上，`+data` 构造函数实际上是由\
  \ `NSData` 定义的，只是在其上用途有限。\n\n从原则上讲，`NSData` 对象的内容是不可变的。但实际上，除了硬件限制外，并无任何因素禁止修改其内容。`-[NSData\
  \ bytes]` 方法返回数组中第一个字节的地址。一旦获得该地址，没有任何东西能阻止你修改该地址上的任何值。我倾向于将 `NSData` 对象用于我不打算修改的内存，而将\
  \ `NSMutableData` 对象用于可修改的内存，但在实践中并无此强制规定。\n\n`NSData` 对象将其内容视为一个连续的字节数组。你通常需要将其视为其他类型——例如某种其他类型的数组或一个结构体。代码清单\
  \ 8-2 演示了如何使用 `NSMutableArray` 来存储一个 `NSPoint` 结构体数组。\n\n**代码清单 8-2.** 使用 `NSMutableData`\
  \ 包装结构体数组\n\n```\nNSArray *objects = ... // 包含坐标的对象数组\nunsigned int count = [objects\
  \ count];\nNSMutableData *data = [NSMutableData dataWithLength:count*sizeof(NSPoint)];\n\
  NSPoint *points = (NSPoint*)[data bytes];\nunsigned int i;\n[data retain];\n```\n\
  \n\n\n```c\nfor (i=0; i<[objects count]; i++) {\n\npoints[i] = [[objects objectAtIndex:i]\
  \ coordinate];\n\n}\n\n[data release];\n```\n\n清单 8-2 中的代码分配了一个空的字节数组，其大小足以容纳 `count`\
  \ 个 `NSPoint` 结构体。分配完成后，数组的地址被转换为指向 `NSPoint` 结构体的指针。C 语言中，指针与数组变量可以互换，因此该指针可用于寻址数组中的各个元素。此技术适用于单个结构体或任意类型的数组。\n\
  \n**注意：** 在清单 8-2 中，你会注意到两个奇怪的语句：`[data retain]` 和 `[data release]`。由于 Objective-C\
  \ 2.0 垃圾回收器的一个特性，指向 `NSData` 对象内部的变量（`points`）不足以在 `[data bytes]` 语句之后立即阻止该对象被垃圾回收器回收。这些额外的语句通过保持其对象引用在作用域内来防止\
  \ `NSData` 对象被回收。这仅对于临时的 `NSData` 对象是一个问题。如果 `NSData` 对象是从此函数返回的、存储在全局可访问的变量中，或在\
  \ `for` 循环之后以任何其他方式被引用，就不会有问题。`-retain` 和 `-release` 方法用于传统内存管理，在垃圾回收环境下运行时不会执行任何操作。有关解释及另一种解决方案，请参阅第\
  \ 9 章“GC 与非 GC 指针”部分。\n\n### 包装任意值\n\nC 语言允许你使用 `struct` 和 `typedef` 声明来定义自己的内存结构和变量类型。因此，除了语言本身提供的整数和浮点数类型外，还有更多类型可以被包装。这就是\
  \ `NSValue` 的职责。\n\n`NSValue` 可以包装任何 C 数据类型，包括由语言或程序员定义的所有非对象类型。创建 `NSValue` 对象的主要方法是\
  \ `+[NSValue valueWithBytes:objCType:]`。该方法接收的是值的地址（而非值本身）和一个 Objective-C 类型值。该类型值通过\
  \ Objective-C 的 `@encode()` 指令生成。这会生成一个常量 C 字符串，用于正式标识值的类型。`NSValue` 根据这些信息确定值的大小，并对其进行复制。清单\
  \ 8-3 展示了如何将任意 C 结构体包装到 `NSValue` 对象中，然后将其添加到集合中。\n\n**清单 8-3.** 将任意结构体包装到 `NSValue`\
  \ 中\n\n```c\ntypedef struct {\n    int population;\n    long long hectares;\n  \
  \  BOOL landLocked;\n} CountryStats;\n\n...\nCountryStats stats;\nstats.population\
  \ = 195450000;\nstats.hectares = 859250000;\nstats.landLocked = NO;\n\nNSValue *value\
  \ = [NSValue valueWithBytes:&stats objCType:@encode(CountryStats)];\nNSMutableArray\
  \ *array = [NSMutableArray array];\n[array addObject:value];\n\n...\nCountryStats\
  \ lastStats;\nvalue = [array lastObject];\n[value getValue:&lastStats];\nreturn\
  \ (lastStats.population);\n```\n\n清单 8-3 的关键点如下：\n\n-   通过将值的地址（而非值本身）传递给 `NSValue`\
  \ 来构造它。\n-   值的大小由 `@encode()` 指令生成的 Objective-C 类型隐含确定。\n-   封装后，`NSValue` 可以像任何其他对象一样被对待。\n\
  -   要检查存储在 `NSValue` 中的值，请向其发送 `-getValue:` 消息——同样需要传递变量的地址，该变量将被对象中存储的值的副本覆写。\n\
  \n`NSValue` 为常用结构体提供了几个便捷构造函数，例如 `+valueWithPoint:(NSPoint)point`、`+valueWithRange:(NSRange)range`、`+valueWithSize:(NSSize)size`\
  \ 等。请注意，这些方法都接受原始值的副本，而非地址。\n\n`NSNumber` 实际上是 `NSValue` 的一个子类。从某种意义上说，`NSNumber`\
  \ 中的所有方法都可以视为处理原生数据类型的便捷方法。在内部，`NSNumber` 使用 `NSValue` 来存储其值。你可以向 `NSNumber` 或 `NSValue`\
  \ 对象发送 `-objCType` 消息，以确定其原始值的类型。\n\n### 包装 nil\n\nObjective-C 提供了 `NSNull` 类作为\
  \ `nil` 值的对象占位符。这提供了一个可以存储在集合中、归档（序列化）或以其他方式用于表示“无内容”（而 `nil` 在此情况下不可用）的对象。\n\n\
  方法 `+[NSNull nil]` 返回由 Objective-C 运行时创建的 `NSNull` 单例实例。这个唯一的 `NSNull` 对象是不可变且不可销毁的。\n\
  \n清单 8-4 演示了一种编写方法的简单技术，该方法可以接受一个对象、一个 `NSNull` 实例或 `nil`——并对后两者同等处理。\n\n**清单 8-4.**\
  \ 接受对象、`nil` 或 `NSNull` 的方法\n\n```objectivec\n- (void)doSomethingWithObject:(id)object\
  \ {\n    if (object==[NSNull null])\n        object = nil;\n    ...\n}\n```\n\n\
  ### 字符串\n\n在 Java 和 Objective-C 中，字符串都显得有些特别。它们在编程中如此基础，以至于两种语言都包含了声明字符串字面量的特殊语法。然而，除了声明字符串字面量之外，这些语言对字符串的直接支持很少，期望程序员将它们作为对象进行操作。唯一的例外是\
  \ Java 的字符串连接运算符（`+`），Objective-C 并不包含该运算符。本节将涵盖字符串字面量、字符串比较、字符串操作、字符串与标量值的相互转换以及复杂格式化。\n\
  \n在许多层面上，Objective-C 中的字符串遵循与 Java 中类似的熟悉模式。所有 Objective-C 字符串都是 `NSString` 类的对象。`NSString`\
  \ 字符在内部使用 Unicode 表示。`NSString` 对象是不可变的。Objective-C 字符串字面量对象使用 `@\"string\"` 指令编写。表\
  \ 8-4 列出了常见的字符串操作及其 Objective-C 对应项。\n\n**表 8-4.** 常见字符串类和方法\n\n| Java         \
  \                        | Objective-C                                         \
  \         |\n|--------------------------------------|--------------------------------------------------------------|\n\
  | `\"string\"`                           | `@\"string\"`                       \
  \                          |\n| `java.lang.String`                   | `NSString`\
  \                                                   |\n| `java.lang.StringBuffer`\
  \             | `NSMutableString`（虽然非线程安全）                 |\n| `java.lang.StringBuilder`\
  \            | `NSMutableString`                                            |\n\
  | `Object.toString()`                  | `-[NSObject description]`             \
  \                      |\n| `new String(byte[],String)`          | `+[NSString stringWithCString:(const\
  \ char*)cString encoding:(NSStringEncoding)enc]` |\n| `String.length()`        \
  \            | `-[NSString length]`                                         |\n\
  | `String.charAt(int)`                 | `-[NSString characterAtIndex:(int)index]`\
  \                   |\n| `String.equals(String)`              | `-[NSString isEqualToString:(NSString*)string]`\
  \             |\n| `String.compareTo(String)`           | `-[NSString compare:(NSString*)string]`\
  \                     |\n| `String.compareToIgnoreCase(String)` | `-[NSString caseInsensitiveCompare:(NSString*)string]`\
  \      |\n| `String.concat(String)`              | `-[NSString stringByAppendingString:(NSString*)string]`\
  \     |\n| `String.substring(int)`              | `-[NSString substringFromIndex:(int)index]`\
  \                |\n| `String.substring(int,int)`          | `-[NSString substringWithRange:(NSRange)range]`\
  \             |\n| `String.toLowerCase()`               | `-[NSString lowercaseString]`\
  \                                |\n| `String.toUpperCase()`               | `-[NSString\
  \ uppercaseString]`                                |\n| `String.trim()`        \
  \              | `-[NSString stringByTrimmingCharactersInSet:(NSCharacterSet*)set]`\
  \ |\n| `String.format(String,Object…)`      | `+[NSString stringWithFormat:(NSString*)format,\
  \ …]`          |\n\n你会在 `String` 和 `NSString` 中找到许多其他类似的方法。`NSString` 倾向于使用更通用的方法处理各种情况，而\
  \ Java 类则实现了许多简单方法。一个很好的例子是 `java.lang.String.trim()`。Objective-C 中与之等价的方法是 `-stringByTrimmingCharactersInSet:`，它接受一个\
  \ `NSCharacterSet` 对象作为参数。要精确实现 `String.trim()` 的功能，请使用 `[string stringByTrimmingCharactersInSet:[NSCharacterSet\
  \ characterSetWithRange:NSMakeRange(0,0x20+1)]]`。虽然更冗长，但其优势在于能够从字符串中修剪任意字符集。如果你经常这样做，可以使用\
  \ Category 为 `NSString` 添加你自己的 `-trim` 方法，如第 5 章所述。\n\n\n\n"
- '# 字符串与原始值


  ## 注意


  现代 Objective-C 开发工具在构建应用时会合并相同的字符串字面量。无论字符串字面量 `@"Welcome"` 在应用中出现了多少次，每个出现位置在运行时都将引用同一个实例。


  然而，`String` 和 `NSString` 之间有几个关键差异你需要了解：


  - `NSString` 存在子类。

  - 字符串对象可能是可变的。


  ## 字符串类型与特性


  - 存在两种字符串：Objective-C 字符串和 C 字符串。

  - 加法运算符（`+`）不会拼接两个字符串。

  - Objective-C 字符串字面量遵循 C 语言的编译时字符串拼接语法。字面量表达式 `@"Hello" @", World!"` 和 `@"Hello,
  World!"` 是等价的。


  `NSString` 遵循 Cocoa 类框架中的一致模式：当一个类同时具有不可变和可变的变体时，可变类是不可变类的子类。这有三个重要后果。


  **第一**，可变字符串对象的类是 `NSMutableString` 子类。在需要使用 `java.lang.StringBuilder` 的地方，请使用 `NSMutableString`。


  **第二**，任何 `NSString` 指针或参数都可能包含对可变子类的引用。在 Java 中，`java.lang.String` 类是 `final` 的，无法被继承，从而保证所有
  `String` 对象都是不可变的。要动态创建字符串，需要先构造 `StringBuffer` 对象，然后通过 `toString()` 将其转换为 `String`
  对象。在 Objective-C 中，你可以使用 `NSMutableString` 组装字符串，然后直接返回它，或将其作为普通的 `NSString` 对象使用。如果之后不修改它，它就与不可变字符串无法区分。在必须保证字符串对象不可变的情况下，请使用
  `[NSString stringWithString:possiblyMutableString]` 构造可疑字符串对象的副本。关于对象复制的信息，请参见第
  12 章。


  **第三**个后果更类似于一个优势。由于 `NSMutableString` 是 `NSString` 的子类，它继承了 `NSString` 的所有方法，包括通过分类（categories）添加到
  `NSString` 的方法。


  #### 将对象转换为字符串


  正如每个 Java 对象都继承了一个 `toString()` 方法一样，每个 Objective-C 对象都继承了 `-(NSString *)description`
  方法。其用途和使用方式与 Java 中的 `toString()` 几乎相同。


  值得注意的几点：


  - 基类实现 `-[NSObject description]` 返回一个包含对象类名和地址的字符串。除非被重写，否则这是对象的默认描述。

  - 字符串格式化函数和调试器会在需要字符串表示时向对象发送 `-description` 消息。

  - `-[NSString description]` 返回自身。

  - `-[NSNumber description]` 返回原始值的字符串表示。

  - 许多类重写了 `-description` 以提供更丰富的字符串表示。例如，集合类会返回描述集合中所有对象的字符串——递归地向每个对象发送 `-description`
  消息。


  ## C 字符串


  最后，还有一个额外的混淆点：存在两种字符串类型——Objective-C 字符串对象和传统的 C 字符串。C 字符串只是字符数组的地址，与其说是一个定义明确的实体，不如说是一种编程约定。C
  语言对字符串唯一的支持是声明字面量字符串的语法（`"hi!"`），等价于分配一个以空字符结尾的字符数组（`char string[] = { ''h'', ''i'',
  ''!'', ''\0'' }`）。


  > **提示**：作为 Java 程序员，你在编译 Objective-C 程序时无疑会遇到这样的消息：`"warning: initialization from
  incompatible pointer type"` 或 `"warning: passing argument from incompatible pointer
  type"`。这通常是因为你在 Objective-C 字符串字面量前省略了 `''@''` 符号。你没有声明字面量字符串对象（`@"Hello"`，类型为 `NSString
  *`），而是声明了一个 C 字符串字面量（`"Hello"`，类型为 `const char *`）。不必自责，即使经过多年的 Objective-C 编程，我仍然大约每周犯一次这个错误。


  ### 将 C 字符串转换为 NSString 对象


  虽然你可以在 Objective-C 中长时间编程而不接触 C 字符串，但不可避免地会有需要与期望或返回 C 字符串的 C 函数交互的时候。从 C 字符串构造新
  `NSString` 对象的主要方法列在表 8-5 中。它们与 Java 中从字节或字符数组创建 `String` 对象的构造函数非常相似。


  **表 8-5.** 从字符数组构造 NSString 对象


  | Java | Objective-C |

  |------|-------------|

  | `new String(byte[],String)` | `+stringWithCString:(const char *)cString encoding:(NSStringEncoding)enc`
  |

  | `new String(char[],int,int)` | `+stringWithUTF8String:(const char*)utf8String`
  |

  | `new String(String)` | `+stringWithCharacters:(const unichar*)chars length:(int)length`
  |


  传统的 C 字符串使用 8 位的 `char` 值，通常采用 ASCII 编码，并以单个空字符（`''\0''`）结尾。这是迄今为止最常见的 C 字符串表示形式。要从传统的
  C 字符串创建 `NSString`，请使用 `[NSString stringWithCString:cString encoding:NSASCIIStringEncoding]`。由于空终止字符的存在，字符串的长度是隐含的。如果字符串使用了其他编码，请指定相应的编码。`NSStringEncoding`
  的文档列出了 Cocoa 框架支持的编码。


  另一种流行的 8 位编码是 UTF-8，它由翻译成 8 位字节流的 Unicode 字符组成。大多数 UTF-8 字符串也以空字符结尾。`+stringWithUTF8String:`
  消息会从以空字符结尾的 UTF-8 字符数组创建 `NSString` 对象，等同于 `[NSString stringWithCString:utf8String
  encoding:NSUTF8StringEncoding]`。


  最后，你偶尔会遇到 Unicode 字符数组——相当于 Java 中 `char` 的真正对应物。使用 `+[NSString stringWithCharacters:(const
  unichar*)chars length:(int)length]` 方法从数组构造 `NSString` 对象。你需要向构造函数提供数组中的字符数量。


  对于更特殊的情况，还有其他 `NSString` 构造方法。详情请查阅 `NSString` 文档。


  ### 将 NSString 对象转换为 C 字符串


  将 `NSString` 中的字符提取到 `char` 或 `unichar` 数组的方法与表 8-5 中的方法相对应。表 8-6 列出了提取 `NSString`
  中字符的常见方法以及一些便捷转换方法。


  **表 8-6.** 从 NSString 对象提取字符


  | Java | Objective-C |

  |------|-------------|

  | `getBytes(String)` | `-getCString:(char*)buff maxLength:(int)len encoding:(NSStringEncoding)enc`
  |

  | `new String(String)` | `-cStringUsingEncoding:(NSStringEncoding)enc` |

  | `new String(String)` | `-UTF8String` |

  | `new String(String)` | `-fileSystemRepresentation` |

  | `new String(String)` | `-dataUsingEncoding:(NSStringEncoding)enc` |

  | `getChars(int,int,char[],int)` | `-getCharacters:(unichar*)buffer range:(NSRange)range`
  |

  | `toCharArray()` | `-getCharacters:(unichar*)buffer` |


  将 `NSString` 转换为 C 字符串时，你可以选择自行分配 `char` 数组，然后使用 `-getCString:maxLength:encoding:`
  将字符提取到其中；或者让字符串对象使用 `-cStringUsingEncoding:`、`-UTF8String` 或 `-fileSystemRepresentation`
  为你分配字符数组。这三种方法会分配一个临时字符数组缓冲区，将字符提取到其中，以空字符终止，并返回第一个字符的地址。`-dataUsingEncoding:` 方法返回一个包含编码后字符串的
  `NSData` 对象。只有 `-dataUsingEncoding:` 是 Java 的 `getBytes(String)` 方法的真正替代品，因为它是唯一一个返回对象的方法。




