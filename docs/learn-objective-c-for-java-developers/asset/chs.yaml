- "# `removeObjectsInRange`:\n\n`removeObjectsInArray`：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 16 章 ■ 集合模式\n\n`set(int,Object)`\n\n`replaceObjectAtIndex:withObject:`\n\n\
  `replacePointerAtIndex:`\n\n`withPointer:`\n\n`replaceObjectsAtIndexes:withObjects:`\n\
  \n`replaceObjectsInRange:`\n\n`withObjectsFromArray:range:`\n\n`replaceObjectsInRange:`\n\
  \n`withObjectsFromArray:`\n\n`exchangeObjectAtIndex:`\n\n`withObjectAtIndex:`\n\n\
  `setArray:`\n\n`trimToSize()`\n\n`compact`\n\n表 16-3 和 16-4 中的一些方法并非与 Java 方法一一对应，尽管大部分都是。例如，`toArray()`返回一个数组对象，而`-getObjects:`则用集合的值填充一个\
  \ C 数组。像`arrayList.isEmpty()`这样的简单表达式很容易被替换为`[array count]==0`。大多数方法都是不言自明的。\n\n\
  #### `NSArray`、`NSMutableArray`\n\n除了不允许使用`nil`（null）值之外，`NSMutableArray`可能与你所能找到的`java.lang.ArrayList`非常接近。正如你从前面的表格中看到的，这里有更多便捷方法，因此在你编写自己的代码（例如交换集合中的两个元素）之前，先查找一下数组方法。\n\
  \n`NSArray`区分了两个相等对象（`-indexOfObject:`）和两个相同对象（`-indexOfObjectIdenticalTo:`）之间的区别。后者比较对象指针是否相等，而前者比较对象的值是否相等。请参阅本章后面的“集合相等契约”部分。\n\
  \n许多方法，如`-removeObjectsAtIndexes:`，操作由`NSIndexSet`对象定义的任意索引列表——这是另一个集合类，将在后面的“无序集合”部分讨论。像`-objectsAtIndexes:`这样的方法特别强大；它会返回一个新的`NSArray`对象，该对象是接收者集合的任意子集，通过使用`NSIndexSet`中的索引来选择。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 16 章 ■ 集合模式\n\n### COCOA\
  \ 集合类组织\n\nJava 集合类被整齐地组织成继承树。基础`Collection`接口有`List`、`Map`和`Set`子接口，这些接口体现在`AbstractCollection`、`AbstractList`、`AbstractMap`和`AbstractSet`类中，并最终实现为我们每天使用的具体集合类。\n\
  \nObjective-C 类几乎没有层次结构。大多数是`NSObject`的直接子类。它们都实现`-count`方法是基于约定，而非正式设计。大多数情况下这几乎没什么区别。Objective-C\
  \ 确实缺少像 Java 的`addAll(Collection)`这样的方法，因为它没有涵盖所有集合类的基类。\n\n原因之一是许多 Objective-C\
  \ 集合类实际上是用 C 语言实现的。例如，Core Foundation 的`CFArray`类型实现了`NSArray`，两者可以互换。有关更多详细信息，请参阅第\
  \ 25 章的“免费桥接”部分。\n\n#### `NSPointerArray`\n\n`NSPointerArray`是一个较新的集合类。它没有不可变的基类，所以在这方面它更像\
  \ Java 的`ArrayList`类。使`NSPointerArray`及其同类`NSMapTable`和`NSHashSet`与其他集合类不同的是能够“编程”这些集合。该集合通过一组定义其特性的委托函数进行初始化。`NSPointerArray`对象是使用一个包含一组回调函数的`NSPointerFunctions`对象构建的，这些回调函数将用于操作集合中的值。回调函数包括：`hash`、`isEqual`、`size`、`description`、`acquire`和`relinquish`。当你向数组添加一个值时，该值会被传递给`acquire`函数。当值被移除时，它会通过`relinquish`处理。当比较集合中的值时，候选值会被传递给`isEqual`函数进行比较。\n\
  \n> **注意** 你可能会好奇，当`NSPointerArray`不提供搜索集合的方法时，为什么函数指针集还包括执行`hash`和比较的委托函数。这是为了与映射和集合集合保持一致。后两个类使用相同的指针函数对象，并且确实广泛使用了`hash`和比较函数。\n\
  \n通过使用一组委托函数，集合可以适应各种不同的解决方案。为了便于使用这个新集合，Cocoa 框架包含了预定义的指针函数集，可以通过混合指针函数选项常量来选择它们，其中一些列在表\
  \ 16-5 中。这些预定义的函数集实现了你可能需要的大部分集合行为。两种最常见的`NSPointerArray`特性有便捷构造函数：\n\n`[NSPointerArray\
  \ pointerArrayWithStrongObjects]`创建一个常规对象数组，`[NSPointerArray pointerArrayWithWeakObjects]`创建一个使用弱引用的对象数组。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 16 章 ■ 集合模式\n\n**表 16-5.**\
  \ 常用`NSPointerFunctionsOptions`\n\n| 选项标识符 | 描述 |\n|---|---|\n| `NSPointerFunctionsStrongMemory`\
  \ | 值是指针，使用强引用存储。如果未指定内存选项，这是默认的内存选项。 |\n| `NSPointerFunctionsZeroingWeakMemory`\
  \ | 值是指针，使用弱引用存储。 |\n| `NSPointerFunctionsObjectPersonality` | 值是对象指针。对象使用`-isEqual:`消息进行比较。`-description`消息用于生成对象描述。如果未指定特性，这是默认的特性。\
  \ |\n| `NSPointerFunctionsObjectPointerPersonality` | 值是对象指针。通过测试对象指针是否相等来比较对象。`-description`消息用于对象描述。\
  \ |\n| `NSPointerFunctionsCStringPersonality` | 值是指向 C 字符串的指针。使用`strcmp()`函数比较值，并通过将\
  \ C 字符串转换为`NSString`对象来生成描述。 |\n| `NSPointerFunctionsIntegerPersonality` | 值是整数。\
  \ |\n| `NSPointerFunctionsCopyIn` | 添加到集合时复制值。如果值是对象指针，它们必须符合`NSCopying`协议。 |\n\n\
  你也可以通过组合表 16-5 中的一个内存存储选项、一个特性选项以及可选的“复制到”选项来创建一个`NSPointerArray`。清单 16-3 中的代码创建了一个`NSPointerArray`集合，它会复制添加到集合中的对象，并对这些副本保持强引用。\n\
  \n**清单 16-3.** 自定义`NSPointerArray`\n\n```objectivec\nNSPointerArray *array = [NSPointerArray\
  \ pointerArrayWithOptions: (NSPointerFunctionsObjectPersonality\n              \
  \                                                   |NSPointerFunctionsStrongMemory\n\
  \                                                                 |NSPointerFunctionsCopyIn)\
  \ ];\n```\n\n甚至还有更多逐渐深奥的选项，允许`NSPointerArray`存储指向 C 结构的指针、包含整个 C 结构的副本、使用 C 语言的`calloc()`和`free()`函数管理内存等等。有关完整列表，请参阅`NSPointerFunctionsOptions`的文档。为了获得最终控制权，如果预定义函数不能满足你的需求，你可以创建自己的`NSPointerFunctions`对象。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 16 章 ■ 集合模式\n\n### 字典集合\n\
  \n`NSDictionary`、`NSMutableDictionary`和`NSMapTable`组织无序的对象对，相当于`java.util.HashMap`。每对包含一个键对象和一个值对象。使用与键相等的对象来访问值。集合中的键是唯一的，但值可以重复。具体而言，Objective-C\
  \ 和 Java 字典类具有以下共同特征：\n\n- 集合中的键和值是对象引用。\n- 键对象不应更改其值。\n- 键必须遵守相等性和哈希契约。\n- 键是唯一的。为现有键存储新值会用新键/值对替换现有的键/值对。\n\
  \n\n\n"
- "# 集合模式\n\n- 单个值可以用不同的键存储多次。\n- `NSMapTable` 可以为键和/或值对象使用强引用或弱引用，使其成为 `java.util.WeakHashMap`\
  \ 的灵活替代品。\n\n有两个关键区别：\n\n- 值对象不能为 `nil`（`null`）。`nil` 值表示键不存在。若要存储 `nil` 值，可从集合中移除该键。\n\
  - 键对象始终被复制，且必须遵循 `NSCopying` 协议。集合会保留键对象的副本，而非用于添加键/值对的原始实例。\n\n#### 常用方法\n\n表 16-6\
  \ 和 16-7 列出了 Java 和 Objective-C 中常见的字典（映射）方法。表 16-6 中的消息不会更改集合，并同时适用于可变和不可变集合。表\
  \ 16-7 中的消息只能发送给可变字典。\n\n**表 16-6.** 常用字典集合方法  \n`java.lang.HashMap` | `NSDictionary`\
  \ | `NSMapTable`\n--- | --- | ---\n`size()` | `count` | `count`\n`keySet()` | `allKeys`\
  \ | `allKeysForObject:`\n`values()` | `allValues` | `dictionaryRepresentation`\n\
  `getObjects:andKeys:` | — | —\n`keysSortedByValueUsingSelector:` | — | —\n`get(Object)`\
  \ | `objectForKey:` | `objectForKey:`\n`objectsForKeys:notFoundMarker:` | — | —\n\
  \n**表 16-7.** 常用可变字典集合方法  \n`java.lang.HashMap` | `NSMutableDictionary` | `NSMapTable`\n\
  --- | --- | ---\n`put(Object,Object)` | `setObject:forKey:` | `setObject:forKey:`\n\
  `putAll(Map)` | `addEntriesFromDictionary:` | `setDictionary:`\n`remove(Object)`\
  \ | `removeObjectForKey:` | `removeObjectForKey:`\n`clear()` | `removeAllObjects`\
  \ | `removeAllObjects`\n`removeObjectsForKeys:` | — | —\n\n字典集合不会存储 `nil` 值；`nil`\
  \ 值用于表示键不存在。Java 语句 `dictionary.contains(key)` 可写作 `[dictionary objectForKey:key]\
  \ != nil`。如果必须存储一个不带值的键，请使用 `NSNull`。\n\n`-allKeysForObject:` 返回一个数组，包含所有映射到给定值的键。Java\
  \ 语句 `dictionary.containsValue(object)` 可写作 `[[dictionary allKeysForObject:object]\
  \ count] != 0`。\n\n`-keysSortedByValueUsingSelector:` 返回一个 `NSDictionary` 的键数组，该数组按特定顺序排序，允许你以明确定义的顺序遍历集合。请参阅“迭代器模式”和“排序”章节。\n\
  \n## `NSDictionary`, `NSMutableDictionary`\n\n除了不允许 `nil`（`null`）值外，`NSMutableDictionary`\
  \ 几乎与 `java.lang.HashMap` 相同。\n\n最大的区别在于对 `nil` 值的处理以及键的复制。\n\n只要对象可被复制（即遵循 `NSCopying`\
  \ 协议），且集合保留的副本从未被修改，你就可以使用任何对象作为键。当字典被复制时，所有键都会被复制。\n\n与 `NSArray` 类似，`NSDictionary`\
  \ 有一些操作条目组的方法。例如，`-objectsForKeys:notFoundMarker:` 接受一个键对象数组，执行批量搜索，并返回一个值对象数组。新数组中的每个条目对应相应键的值，或者“未找到标记”对象。在编写代码以迭代查找、添加或删除对象集合之前，请检查是否有现成的集合方法可以为你完成这项工作。考虑以下语句：\n\
  \n```\n[dictionary removeObjectsForKeys:[dictionary allKeysForObject:value]];\n\
  ```\n\n#### `NSMapTable`\n\n`NSMapTable` 是一个较新的集合类。与 `NSPointerArray` 类似，它没有不可变基类，就像\
  \ Java 的 `HashMap` 类一样。同样与 `NSPointerArray` 类似，`NSMapTable` 通过一组定义其行为的委托函数来构造。\n\
  \n`NSMapTable` 实例使用 `NSPointerFunction` 对象或表 16-5 中列出的 `NSPointerFunctionOptions`\
  \ 来创建。关于 `NSPointerFunctions` 类和指针函数选项的描述，请参阅 `NSPointerArray` 章节。初始化 `NSMapTable`\
  \ 和初始化 `NSPointerArray` 之间存在两个显著区别。\n\n\n\n首先，NSMapTable 只接受 `NSPointerArray` 所支持的函数指针选项中的一小部分。表\
  \ 16-8 中列出的选项是 `NSMapTable` 唯一支持的选项，同时还包含一些用于 `NSMapTable` 构造函数的同义符号。基本上，映射表只支持对象值，并且这些对象值可以是强引用或弱引用，你还可以选择存储对象的引用或副本。如果你只使用\
  \ `NSMapTable` 的选项同义词，就不会意外选到不支持的 `NSPointerFunctions` 选项。\n\n**表 16-8.** `NSMapTable`\
  \ 选项\n\n| `NSMapTable` 同义词 | `NSPointerArray` 选项 |\n| --- | --- |\n| `NSMapTableStrongMemory`\
  \ | `NSPointerFunctionsStrongMemory` |\n| `NSMapTableZeroingWeakMemory` | `NSPointerFunctionsZeroingWeakMemory`\
  \ |\n| `NSMapTableCopyIn` | `NSPointerFunctionsCopyIn` |\n| `NSMapTableObjectPointerPersonality`\
  \ | `NSPointerFunctionsObjectPointerPersonality` |\n\n第二个区别在于，`NSMapTable` 对象在初始化时使用两组函数指针：一组用于键，一组用于值。这使得你可以定义一种映射，例如：使用强引用存储键的副本，同时使用弱引用存储值；或者引用键并存储值的副本；或者使用弱键和弱值；或者任何其他对你的应用程序有意义的组合。\n\
  \n对于最常见的配置，有四个便利构造方法：\n\n`+mapTableWithStrongToStrongObjects`、`+mapTableWithWeakToStrongObjects`、\n\
  `+mapTableWithStrongToWeakObjects` 和 `+mapTableWithWeakToWeakObjects`。\n\n### 集合（Set\
  \ Collections）\n\n`NSSet`、`NSMutableSet`、`NSCountedSet`、`NSIndexSet` 和 `NSHashTable`\
  \ 组织无序对象的集合，大致相当于 `java.util.HashSet` 和 `java.util.BitSet`。集合类遵循集合的数学概念：一个对象要么是集合的成员，要么不是。对象不按任何特定顺序组织，也不可寻址。你可以向集合中添加对象、测试其是否存在，以及移除它。`NSIndexSet`\
  \ 将相同的概念应用于整数值，而 `NSCountedSet` 是一个特殊的集合，允许一个对象在集合中出现多次。具体来说，Objective-C 和 Java\
  \ 的集合类具有以下共同特征：\n\n- 集合中的值是对象引用或整数。\n- 一个值在集合中只能存储一次。添加重复值不会有任何效果（`NSCountedSet`\
  \ 是此规则的例外）。\n\n#### 通用方法\n\n表 16-9 和 16-10 列出了 Java 和 Objective-C 中适用于对象集合的通用集合方法。表\
  \ 16-9 中的消息不会改变集合，并且对于可变和不可变集合都已实现。表 16-10 中的消息只能发送给可变集合。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 16 章 ■ 集合模式**\n\n**表 16-9.** 通用集合方法\n\n| `java.lang.HashSet` | `NSSet` | `NSHashTable`\
  \ |\n| --- | --- | --- |\n| `size()` | `count` | `count` |\n| `toArray()` | `allObjects`\
  \ | `allObjects` |\n|  | `anyObject` | `anyObject` |\n| `contains(Object)` | `containsObject:`\
  \ | `containsObject:` |\n| `containsAll(Collection)` | `isSubsetOfSet:` | `isSubsetOfHashTable:`\
  \ |\n|  | `intersectsSet:` | `intersectsHashTable:` |\n|  | `setRepresentation`\
  \ |  |\n\n**表 16-10.** 通用可变集合方法\n\n| `java.lang.HashSet` | `NSMutableSet` | `NSHashTable`\
  \ |\n| --- | --- | --- |\n| `add(Object)` | `addObject:` | `addObject:` |\n| `remove(Object)`\
  \ | `removeObject:` | `removeObject:` |\n| `clear()` | `removeAllObjects` | `removeAllObjects`\
  \ |\n| `addAll(Collection)` | `addObjectsFromArray:` | `addAll(Collection)` |\n\
  |  | `unionSet:` | `unionHashTable:` |\n| `removeAll(Collection)` | `minusSet:`\
  \ | `minusHashTable:` |\n|  | `intersectSet:` | `intersectHashTable:` |\n|  | `setSet:`\
  \ |  |\n\nObjective-C 类包含一些高级方法，例如 `-intersectSet:`，使得执行集合运算变得容易。它们还包含有趣的 `-anyObject`\
  \ 消息，该方法返回集合中的一个任意成员。\n\n#### `NSSet`、`NSMutableSet`\n\n`NSSet` 类在行为上几乎与 `java.util.HashSet`\
  \ 相同。语句 `set.isEmpty()` 可以替换为 `[set count]==0`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 16 章 ■ 集合模式**\n\n\n\n可变集合对象可以通过初始容量进行初始化，这有助于优化其性能。在创建大型集合时，准确的初始容量最为有用。\n\
  \n#### `NSCountedSet`\n\n`NSCountedSet` 是 `NSMutableSet` 的子类，允许将单个对象多次添加到集合中。本质上，它将添加到集合中的每个对象视为一个独特但不可区分的实体。\n\
  \n在内部，该集合维护对对象的单个引用以及该对象被添加到集合中的次数计数。要移除一个对象，集合必须为之前收到的每个 `-addObject:` 消息接收一次 `-removeObject:`\
  \ 消息。`-countForObject:` 方法将返回该对象收到的 `-addObject:` 消息数量减去 `-removeObject:` 消息数量所得的值。\n\
  \n#### `NSIndexSet`\n\n`NSIndexSet` 是一个特殊的集合类，用于维护一组整数值，与 `java.util.BitSet` 非常相似。\n\
  \n表 16-11 和 16-12 列出了 Java 和 Objective-C 中的常用方法。\n\n**表 16-11.** 常用索引集合方法\n\n| `java.util.BitSet`\
  \ | `NSIndexSet` |\n| --- | --- |\n| `cardinality()` | `count` |\n| | `countOfIndexesInRange:`\
  \ |\n| `get(int)` | `containsIndex:` |\n| | `containsIndexes:` |\n| | `containsIndexesInRange:`\
  \ |\n| `intersects(BitSet)` | `intersectsIndexesInRange:` |\n| | `firstIndex` |\n\
  | `length()` | `lastIndex` |\n| | `indexLessThanIndex:` |\n| | `indexLessThanOrEqualToIndex:`\
  \ |\n| `nextBitSet(int)` | `indexGreaterThanOrEqualToIndex:` |\n| | `indexGreaterThanIndex:`\
  \ |\n| `get(int,int)` | `getIndexes:maxCount:inIndexRange:` |\n\n**表 16-12.** 常用可变索引集合方法\n\
  \n| `java.util.BitSet` | `NSMutableIndexSet` |\n| --- | --- |\n| `set(int)` | `addIndex:`\
  \ |\n| `or(BitSet)` | `addIndexes:` |\n| `set(int,int,true)` | `addIndexesInRange:`\
  \ |\n| `clear(int)` | `removeIndex:` |\n| `andNot(BitSet)` | `removeIndexes:` |\n\
  | `clear()` | `removeAllIndexes` |\n| `clear(int,int)` | `removeIndexesInRange:`\
  \ |\n| | `shiftIndexesStartingAtIndex:by:` |\n\n`NSIndexSet` 和 `java.util.BitSet`\
  \ 的共同功能比其他大多数集合类要少。Java 类有多个用于翻转位和执行布尔运算的方法，而 Objective-C 类则缺少这些方法。\n\n`NSIndexSet`\
  \ 的主要用途是高效地封装有序集合的任意子集。`NSArray` 类和用户界面显示类广泛使用它。例如，表格视图将用户的当前选择作为一个 `NSIndexSet`\
  \ 返回，以标识所选择的行。该接口有许多方法，例如 `-indexLessThanIndex:`，使得可以轻松地沿任意方向遍历集合。\n\n#### `NSHashTable`\n\
  \n`NSHashTable` 是 `NSMapTable` 的姊妹类。与 `NSMapTable` 类似，它使用一组定义其行为的委托函数构建。同样与 `NSMapTable`\
  \ 类似，它只接受有限数量的函数指针选项，这些选项列在表 16-13 中。有关这些函数指针选项的说明，请参阅 `NSMapTable` 和 `NSPointerArray`\
  \ 部分。\n\n**表 16-13.** `NSMapTable` 选项\n\n| `NSHashTable` 同义词 | `NSPointerArray`\
  \ |\n| --- | --- |\n| `NSHashTableStrongMemory` | `NSPointerFunctionsStrongMemory`\
  \ |\n| `NSHashTableZeroingWeakMemory` | `NSPointerFunctionsZeroingWeakMemory` |\n\
  | `NSHashTableCopyIn` | `NSPointerFunctionsCopyIn` |\n| `NSHashTableObjectPointerPersonality`\
  \ | `NSPointerFunctionsObjectPointerPersonality` |\n\n`NSHashTable` 和 `NSMapTable`\
  \ 之间唯一显著的区别是 `NSHashTable` 是一个集合，只需要一组函数指针来定义其行为。\n\n> **注意：** 不要混淆 `NSHashTable`（类名）和\
  \ `NSHashTable`（C 类型）。后者属于较旧的 C API，用于实现底层哈希表。Objective-C 的 `NSHashTable` 类包含了其大部分功能。\n\
  \n### 组合模式\n\n组合模式的一个方面是能够通过单个对象与对象组进行交互。`NSArray` 和 `NSSet` 类各自提供了两个方法，允许您向集合中的所有对象发送一条消息：\n\
  \n- `(void)makeObjectsPerformSelector:(SEL)aSelector`\n- `(void)makeObjectsPerformSelector:(SEL)aSelector\
  \ withObject:(id)anObject`\n\n清单 16-4 中的代码演示了如何向集合中的每个对象发送消息。\n\n**清单 16-4.** 组合消息\n\
  \n**Java**\n\n```java\nArrayList<Example> array = …\nfor ( Example example : array\
  \ ) {\n   example.setDelegate(this);\n}\n```\n\n**Objective-C**\n\n```objc\nNSArray\
  \ *array = …\n[array makeObjectsPerformSelector:@selector(setDelegate:) withObject:self];\n\
  ```\n\n### 集合相等性约定\n\n集合的搜索和排序功能依赖于对象以一致且合理的方式响应 `-isEqual:` 消息。这被称为相等性约定。集合和字典通过哈希表定位对象。这依赖于对象的\
  \ `-hash` 消息返回一个一致的值，该值与 `-isEqual:` 的响应具有可预测的关系。这被称为哈希约定。\n\n相等性约定和哈希约定与 Java 中的相同。相等性约定如下：\n\
  \n1.  具有等效值的两个对象必须从 `-isEqual:` 返回 `YES`，否则返回 `NO`。\n2.  相等的两个对象指针始终被视为相等且相同。因此，`[self\
  \ isEqual:self]` 始终返回 `YES`。\n3.  有效的对象指针和 `nil` 对象指针始终被视为不相等。语句 `[self isEqual:nil]`\
  \ 必须始终返回 `NO`。\n4.  `[a isEqual:b]` 必须始终返回与 `[b isEqual:a]` 相同的值。\n\n必须按顺序考虑相等性约定的规则。例如，在两个对象指针都为\
  \ `nil` 的特殊情况下，规则 2 优先于规则 3 和 4；`nil` 始终等于 `nil`。\n\n哈希约定很简单，也与 Java 的一致：\n\n1.\
  \  相等的两个对象（`[a isEqual:b]==YES`）必须返回相同的哈希值（`[a hash]==[b hash]`）。\n2.  理想情况下，不同的对象（`[a\
  \ isEqual:b]==NO`）应返回显著不同且在大整数范围内均匀分布的哈希值。\n\n`-isEqual:` 和 `-hash` 方法在 `NSObject`\
  \ 中定义，因此每个对象都继承它们。然而，`-hash` 的默认实现并不适用于集合和字典。如果您创建了一个计划在集合中使用的 `NSObject` 子类，则应重写\
  \ `-isEqual:` 并实现相等性约定。如果该对象将存储在集合中或用作字典中的键，则还必须重写 `-hash` 以实现哈希约定。清单 16-5 显示了正确实现的相等性和哈希方法。\n\
  \n**清单 16-5.** 相等性与哈希方法\n\n```objc\n@interface AircraftIdentifier : NSObject {\n\
  \    NSString *registrationNumber;\n    unsigned int transponderCode;\n}\n@property\
  \ (readonly) NSString *registrationNumber;\n@property unsigned int transponderCode;\n\
  - (id)initWithRegistrationNumber:(NSString*)registration;\n@end\n\n@implementation\
  \ AircraftIdentifier\n@synthesize registrationNumber, transponderCode;\n\n- (id)initWithRegistrationNumber:(NSString*)registration\n\
  {\n    self = [super init];\n    if (self != nil) {\n        registrationNumber\
  \ = registration;\n        transponderCode = 1200; // VFR 模式下的默认应答机编码\n    }\n \
  \   return self;\n}\n\n- (BOOL)isEqual:(id)object\n{\n    if (self==object) // 恒等规则\n\
  \        return YES;\n    if (object==nil) // nil 规则\n        return NO;\n    if\
  \ (![object isKindOfClass:[AircraftIdentifier class]])\n        return NO; // 类不可识别\n\
  \n    // 如果航空器识别符的注册号相同，则它们相等\n    AircraftIdentifier *r = (AircraftIdentifier*)object;\n\
  \    return [registrationNumber isEqualToString:r->registrationNumber];\n}\n\n-\
  \ (NSUInteger)hash\n{\n    // 返回用于判断相等性的属性的哈希值\n    return [registrationNumber hash];\n\
  }\n\n@end\n```\n\n\n\n在`AircraftIdentifier`类中，分配给`transponderCode`的值在比较两个标识符对象的相等性时不被视为重要因素。这是因为该值可能会变化，但并不会实质性地改变飞机的身份。如何确定类的相等性会有所不同；只需记住，`-hash`方法必须始终返回与`-isEqual:`一致的值。\n\
  \n**比较集合**\n\n集合本身可以与同类集合进行比较。表 16-14 列出了集合比较方法。\n\n***表 16-14.** 集合比较方法*\n\n| 类\
  \ | 方法 |\n| --- | --- |\n| `NSArray`, `NSMutableArray` | `-isEqualToArray:` |\n\
  | `NSDictionary`, `NSMutableDictionary` | `isEqualToDictionary:` |\n| `NSSet`, `NSMutableSet`,\
  \ `NSCountedSet` | `isEqualToSet:` |\n| `NSIndexSet`, `NSMutableIndexSet` | `isEqualToIndexSet:`\
  \ |\n| `NSHashTable` | `isEqualToHashTable:` |\n\n如果两个对象集合包含相同数量的对象，并且集合中的每个对象在向另一个集合中的对应对象发送`-isEqual:`消息时都返回`YES`，则认为这两个集合相等。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 16 章 ■ 集合模式\n\n某些集合具有不等式比较，用于判断一个集合是否是另一个集合的子集或超集。这些方法包括`-[NSSet\
  \ isSubsetOfSet:]`、`-[NSHashTable isSubsetOfHashTable:]`和`-[NSIndexSet containsIndexes:]`。\n\
  \n**迭代器模式**\n\n可能一直以来最常见的编程任务就是遍历集合中的元素，对每个成员执行某些测试或操作。Java 和 Objective-C 都意识到了这一点，并做出了重要的语言变化，旨在简化这种繁琐且重复的（无意双关）编程模式。你可以使用新的语法、遗留的枚举类，或直接访问每个成员对象来遍历集合。本节将解释每种方法的实现方式，以及为你的类添加枚举支持所需的步骤。\n\
  \nObjective-C 枚举与 Java 迭代器的主要区别在于：\n\n*   Objective-C 集合没有类型化。\n*   在枚举期间不得修改 Objective-C\
  \ 集合。\n\nJava 为集合添加了参数化类型，消除了使用集合类所需的大量繁琐操作。参数化集合确保添加到集合中的所有对象都是正确的类型，并自动将从集合中提取的对象转换为基础类型。Objective-C\
  \ 不需要此类构造，因为它在赋值期间不验证对象的类。所有集合类都接受并返回匿名的`id`对象标识符，编译器假定该标识符可以自由地与任何类互换。如果你希望确保添加到集合中或从集合中获取的对象是正确的类，请添加断言。有关断言的更多信息，请参见第\
  \ 14 章。\n\n“集合并发”部分描述了如何处理在枚举期间无法修改集合的限制。这也意味着 Objective-C 枚举类没有修改集合的方法。\n\n**使用快速枚举**\n\
  \n快速枚举是在 Objective-C 2.0 中引入的。它是一种简写的`for(...)`循环语法，用于枚举集合中的对象。Java 有非常类似的东西，称为\
  \ For-Each 循环语法。两者的示例见代码清单 16-6。两者的用法、语法和行为几乎相同。\n\n**代码清单 16-6.** 快速枚举语法\n\n```java\n\
  Java\nfor ( Object object : collection ) {\n    ...\n}\n```\n\n```objectivec\nObjective-C\n\
  for ( id object in collection ) {\n    ...\n}\n```\n\n快速枚举中的“快速”不仅仅是对节省编码时间的委婉说法。快速枚举实际上很快。快速枚举接口允许集合批量获取对象，从而减少开销并提高性能。在除少数情况外的所有情况下，快速枚举是遍历集合中对象最快的方式。\n\
  \n\n\n### 使用枚举器进行快速枚举\n\n这使得快速枚举成为遍历数组的首选方法，因为它最容易编写、最易读且最高效。\n\n#### 使用枚举器\n\n\
  在快速枚举出现之前，Objective-C 集合是通过`NSEnumerator`类进行枚举的。\n\n`NSEnumerator`在功能上与`java.util.Iterator`非常相似。与`Iterator`的两个方法`next()`和`hasNext()`不同，`NSEnumerator`只有一个`-nextObject`方法。`-nextObject`消息会返回一个非`nil`的指针，直到枚举结束。之所以能做到这一点，是因为支持`NSEnumerator`的集合类不允许存储`nil`值。那些允许存储`nil`值的集合（如`NSPointerArray`）不支持`NSEnumerator`。清单\
  \ 16-7 中的代码演示了如何使用枚举器对象。\n\n**清单 16-7. 使用`NSEnumerator`遍历集合**\n\n**Java**\n\n```\n\
  ArrayList<Object> array = …\n\nfor (Iterator<Object> i = array.iterator(); i.hasNext();\
  \ ) {\n    Object object = i.next();\n    …\n}\n```\n\n**Objective-C**\n\n```\n\
  NSArray *array = …\nNSEnumerator *e = [array objectEnumerator];\nid object;\nwhile\
  \ ( (object=[e nextObject])!=nil ) {\n    …\n}\n```\n\n你获取`NSEnumerator`对象的方式与在\
  \ Java 中获取`Iterator`一样——通过请求集合为你提供一个。集合可能提供几种不同类型的枚举器。\n\n`NSDictionary`会生成一个`-keyEnumerator`和一个`-objectEnumerator`对象，它们分别用于遍历其键对象或值对象。`NSArray`类提供了`-objectEnumerator`和`-reverseObjectEnumerator`对象。\n\
  \n有一些`NSEnumerator`的特殊用途子类，例如`NSDirectoryEnumerator`。除了遍历目录内容之外，它还实现了用于控制递归和获取当前文件属性的额外方法。关于`NSDirectoryEnumerator`的示例，请参见第\
  \ 11 章。\n\n`NSEnumerator`定义的唯一另一个方法是`-allObjects`。这个消息的名称有点误导，因为它返回的是枚举器尚未返回的对象数组。它本应命名为`-remainingObjects`。\n\
  \n枚举器对象无法重置或重启。一旦完成枚举，它们就变为无效状态。枚举器对象在枚举结束之前会保留对其所遍历的集合的引用。\n\n---\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- "# 第 16 章 集合模式\n\n## 通过寻址访问集合对象\n\n可寻址对象的集合（数组和字典）也可以通过单独访问每个成员对象来进行遍历。这给了你最终的控制权，尽管其效率可能不如使用前面的某种枚举方法。\n\
  \n数组集合最容易以这种方式处理，并且其效率并不比使用枚举器差太多。清单 16-8 展示了一个典型示例。\n\n**清单 16-8. 数组索引循环**\n\n\
  **Java**\n\n```\nArrayList<Object> array = …\n\nfor (int i=0; i<array.size(); i++)\
  \ {\n    Object object = array.get(i);\n    …\n}\n```\n\n**Objective-C**\n\n```\n\
  NSArray *array = …\nNSUInteger i;\nfor (i=0; i<[array count]; i++) {\n    id object\
  \ = [array objectAtIndex:i];\n    …\n}\n```\n\n字典的值通过其键来寻址。通过键遍历字典需要结合使用枚举和集合寻址，如清单\
  \ 16-9 所示。\n\n**清单 16-9. 通过键枚举字典**\n\n**Java**\n\n```\nHashMap<Object,Object> dictionary\
  \ = …\n\nfor (Iterator<Object> i = dictionary.keySet().iterator(); i.hasNext();\
  \ ) {\n    Object key = i.next();\n    Object object = dictionary.get(key);\n  \
  \  …\n}\n```\n\n**Objective-C**\n\n```\nNSDictionary *dictionary = …\nNSEnumerator\
  \ *e = [dictionary keyEnumerator];\nid key;\nwhile ( (key=[e nextObject])!=nil )\
  \ {\n    id object = [dictionary objectForKey:key];\n    …\n}\n```\n\n---\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- "# 第 16 章 集合模式\n\n如果你将清单 16-9 中的`NSEnumerator`赋值语句替换为清单 16-10 中的代码，那么该清单中的代码就变得特别有趣。`-keysSortedByValueUsingSelector:`消息会返回一个排序后的键数组，允许你以可预测的顺序遍历字典的值。\n\
  \n\n\n关于如何控制排序顺序，请参阅\"`排序集合`\"一节。\n\n**列表 16-10. 有序字典枚举**\n\n```\nNSEnumerator *e\
  \ = [[dictionary keysSortedByValueUsingSelector:@selector(compare:)]\n    objectEnumerator];\n\
  ```\n\n> **提示:** 一个鲜为人知的事实是，`NSEnumerator` 也遵循 `NSFastEnumeration` 协议。这使得任何 `NSEnumerator`\
  \ 对象都可以作为快速枚举语句中的集合。在列表 16-9 中，`while(…)` 语句可以替换为 `for ( key in e )`。枚举器对象承担了集合的角色。这并非优化方案——枚举器只是向自身发送\
  \ `-nextObject` 消息——因此不要期望它具有典型快速枚举的性能。\n\nObjective-C 中没有与 `java.util.Map.Entry`\
  \ 对象等价的东西。最接近的方式是使用 `-[NSDictionary getObjects:andKeys:]` 来填充两个 C 数组，一个存储键，另一个存储值，如列表\
  \ 16-11 所示。\n\n**列表 16-11. 枚举字典键/值对**\n\n```\nNSDictionary *dictionary = …\nNSUInteger\
  \ count = dictionary.count;\n\n__strong id *keys = NSAllocateCollectable(sizeof(id)*count,\
  \ NSScannedOption); \n__strong id *values = NSAllocateCollectable(sizeof(id)*count,\
  \ NSScannedOption);\n\n[dictionary getObjects:values andKeys:keys];\n\nNSUInteger\
  \ i;\nfor (i=0; i<count; i++) {\n    id key = keys[i];\n    id object = values[i];\n\
  \    // ...\n}\n```\n\n#### 添加枚举支持\n\n你可以轻松地继承 `NSEnumerator` 来实现自己的枚举器。它实际上只需要实现一个\
  \ `-nextObject` 方法。仅在你认为有用，或者你的枚举器对象面向广泛用户时，才实现很少使用的 `-allObjects` 方法。关于自定义 `NSEnumerator`\
  \ 的示例，请参见第 20 章的 TicTacToe 项目。另外，正如前面提示中提到的，任何 `NSEnumerator` 都可以在快速枚举语句中使用。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 16 章 ■ 集合模式\n\n为自定义对象提供快速枚举支持需要稍微复杂一些。概念上很简单：只需遵循\
  \ `NSFastEnumeration` 协议，并实现 `-countByEnumeratingWithState:objects:count:` 方法。\n\
  \n快速枚举代码会重复向你的对象发送此消息，直到返回 0。每次你的集合收到该消息时，它必须将下一批要处理的对象组装到一个 C 数组中，并返回准备好的数量。当你的类批量组装对象时，快速枚举效率最高，但也可以通过一次返回一个对象来实现简单的非优化方案。\n\
  \n单次迭代的进度通过一个 `NSFastEnumerationState` 结构体来维护。当该结构体首次传递给你的方法时是空的，后续每次传递的消息中会再次传入相同的结构体。你的集合必须更新该结构体以跟踪枚举进度，并防止枚举过程中集合发生更改。如果在枚举过程中修改了集合，快速枚举应抛出异常。\n\
  \n关于 `-countByEnumeratingWithState:objects:count:` 方法和 `NSFastEnumerationState`\
  \ 结构体的完整描述，请参阅 `NSFastEnumeration` 协议的文档。\n\n### 排序集合\n\n有序集合提供了三种对成员对象进行排序的基本技术：使用\
  \ Objective-C 消息排序、使用 C 回调函数比较对象排序、以及使用排序描述符排序。对集合进行排序的方法列于表 16-15 中。\n\n**表 16-15.\
  \ 排序方法**\n\n| 方法 | 描述 |\n|--------|-------------|\n| `-[NSArray sortedArrayUsingDescriptors:]`\
  \ | 返回使用排序描述符排序后的数组副本。 |\n| `-[NSArray sortedArrayUsingSelector:]` | 返回使用 Objective-C\
  \ 消息排序后的数组副本。 |\n| `-[NSArray sortedArrayUsingFunction:context:]` | 返回使用 C 函数比较对象排序后的数组副本。\
  \ |\n| `-[NSArray sortedArrayUsingFunction:context:hint:]` | 与 `-sortedArrayUsingFunction:context:`\
  \ 相同，但接受一个通过 `-sortedArrayHint` 获得的优化提示。 |\n\n\n\n-[`NSMutableArray sortUsingDescriptors:`]\n\
  \n使用排序描述符对数组进行原地排序。\n\n-[`NSMutableArray sortUsingFunction:context:`]\n\n使用 C 函数比较对象，对数组进行原地排序。\n\
  \n-[`NSMutableArray sortUsingSelector:`]\n\n使用 Objective-C 消息对数组进行原地排序。\n\n-[`NSDictionary\
  \ keysSortedByValueUsingSelector:`]\n\n以数组形式返回字典中所有键的副本，并使用 Objective-C 消息进行排序。\n\
  \n#### Objective-C 消息排序\n\n方法 `-sortedArrrayUsingSelector:`、`-sortUsingSelector:`\
  \ 和 `-keysSortedByValueUsingSelector:` 使用 Objective-C 消息比较对象，从而对对象数组进行排序。你可以使用任何消息，只要它兼容以下原型，并且集合中的所有对象都能响应它：\n\
  \n```\n-(NSComparisionResult)comparisonMethod:(id)object\n```\n\n左侧对象会收到消息以及指向右侧对象的指针。它将自身与另一对象进行比较，并返回一个\
  \ `NSComparisionResult` 值。返回值必须是 `NSOrderedAscending`、`NSOrderedSame` 或 `NSOrderedDescending`\
  \ 之一。如果接收者认为自身应排在另一对象之前，则返回 `NSOrderedAscending`；如果相等则返回 `NSOrderedSame`；否则返回 `NSOrderedDescending`。一个合适的排序消息的典型示例是\
  \ `NSString`、`NSNumber` 和 `NSDate` 实现的 `-compare:` 方法。包含 `NSString` 对象的可变数组可以使用\
  \ `[array sortArrayUsingSelector:@selector(compare:)]`、`[array sortArrayUsingSelector:@selector(caseInsensitiveCompare:)]`、`[array\
  \ sortArrayUsingSelector:@selector(localizedCompare:)]` 等方法进行排序。\n\n#### C 函数排序\n\
  \n一种无需对象实现自身比较方法的排序技术，是提供一个接受两个 Objective-C 对象指针、比较它们并返回结果的 C 函数。该函数必须具有与 `NSInteger\
  \ comparisonFunction( id leftObject, id rightObject, void *context )` 兼容的原型。该函数执行与比较消息相同的操作：它将左侧对象与右侧对象进行比较，并返回\
  \ `NSOrderedAscending`、`NSOrderedSame` 或 `NSOrderedDescending`。传递给排序方法的可选 `context`\
  \ 指针会一并传递给比较函数，从而允许你的函数调整其行为，或使用单个函数实现不同的排序方案。清单 16-12 按字符串长度对字符串数组进行排序。\n\n**清单\
  \ 16-12.** 字符串排序函数\n\n```\nstatic NSInteger sortStringsByLength( id left, id right,\
  \ void *ignored )\n{\n    // 首先按长度排序对象，然后按内容排序\n    NSUInteger lLength = [left length];\n\
  \    NSUInteger rLength = [right length];\n    if (lLength<rLength)\n        return\
  \ NSOrderedAscending;\n    else if (lLength>rLength)\n        return NSOrderedDescending;\n\
  \    return [left compare:right];\n}\n…\nNSMutableArray *array = …\n[array sortUsingFunction:sortStringsByLength\
  \ context:NULL];\n```\n\n#### 排序描述符\n\n最后，集合类提供了一种比 C 函数方法更面向对象的排序替代方案，即使用排序描述符。排序描述符是\
  \ `NSSortDescriptor` 的实例，本质上是对封装在对象中的属性进行比较。一个 `NSSortDescriptor` 标识对象的某个属性、排序方向（升序或降序），以及用于比较这两个属性的可选\
  \ Objective-C 消息。如果未指定比较方法，排序描述符将使用 `-compare:` 来比较对象。与之前讨论的 `-sortUsingSelector:`\
  \ 消息不同，排序描述符比较的是通过键值编码获取的两个对象的公共属性，而非对象本身（除非属性是 `@\"self\"`）。清单 16-13 中的代码与清单 16-12\
  \ 中实现的排序等效，但速度较慢。\n\n**清单 16-13.** 使用 `NSSortDescriptor` 对字符串进行排序\n\n\n\n`NSSortDescriptor\
  \ *lengthSort = [[NSSortDescriptor alloc] initWithKey:@\"length\" ascending:YES];`\n\
  \n`NSSortDescriptor *selfSort = [[NSSortDescriptor alloc] initWithKey:@\"self\"\
  \ ascending:YES];`\n\n`NSArray *sortDescriptors = [NSArray arrayWithObjects:lengthSort,\
  \ selfSort, nil];`\n\n`NSMutableArray *array = …`\n\n`[array sortUsingDescriptors:sortDescriptors];`\n\
  \n集合的`-sortUsingDescriptors:`方法接受一个`NSSortDescriptor`对象数组，用于形成比较层次结构。集合中的对象会首先使用数组中的第一个描述符进行比较，如果第一个描述符判定对象相等，则使用第二个描述符，以此类推。\n\
  \n`NSSortDescriptor`在用户界面中非常实用。许多以列和行形式显示对象集合的视图，通常都具备一个用户界面，用户可以通过点击列标题，依据该属性对显示的项目进行排序。其幕后原理是，每一列都与一个对象属性相关联，并为该属性生成一个`NSSortDescriptor`对象。将所有活跃的排序描述符收集到一个数组中，就形成了一个适用于`-sortUsingDescriptors:`方法的排序定义。\n\
  \n### 过滤集合\n\n`NSArray`和`NSSet`集合支持使用谓词（predicate）进行复杂的过滤。谓词是一个由表达式对象构成的树状结构，用于描述抽象的求值过程，例如`timeRemaining==0\
  \ AND projectStatus!='finished'`。谓词可以通过图形界面从用户处获取，通过解释像上述例子那样的谓词语句字符串来创建，或者（较少情况下）通过编程方式构建。\n\
  \n不可变集合实现了返回一个新集合的方法，该新集合仅包含那些使谓词求值为`YES`的对象。可变集合则拥有额外的方法，这些方法会移除所有使谓词求值为`NO`的对象。\n\
  \n有关谓词对象和谓词表达式语法的完整描述，请参阅《谓词编程指南》¹。\n\n¹ Apple, Inc.，《谓词编程指南》，http://developer.apple.com/documentation/Cocoa/Conceptual/Predicates/，2008\
  \ 年。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 16 章 ■ 集合模式**\n\n\
  ### 集合并发性\n\n在枚举期间不应修改集合，也不应从其他线程并发修改集合。本节将介绍几种在枚举完成前避免修改集合的技术，随后会讨论线程安全问题。\n\n\
  #### 枚举集合的副本\n\n避免在迭代集合时修改它的第一种方法，是简单地复制集合，然后遍历该副本，从而使原始集合能够自由地被修改。清单 16-14 中的代码演示了这种技术。\n\
  \n**清单 16-14. 枚举集合的副本**\n\n```\nNSMutableDictionary *zombies = …\nfor ( NSString\
  \ *key in [zombies allKeys] ) {\n    Zombie *zombie = [zombies objectForKey:key];\n\
  \    if ([zombie hasExpired])\n        [zombies removeObjectForKey:key];\n}\n```\n\
  \n表达式`[zombies allKeys]`会返回一个新的、不可变的数组，其中包含字典中所有键的副本。随后，快速枚举是在这个数组的键上进行，而不是字典本身的键，因此你可以在枚举期间自由地修改字典的内容。\n\
  \n这种技术同样适用于数组和集合。\n\n#### 延迟对集合的修改\n\n另一种技术是推迟修改，即先收集待修改的信息，然后在枚举完成后再执行修改。清单 16-15\
  \ 演示了如何使用数组和`NSIndexSet`来实现这项技术。\n\n**清单 16-15. 延迟集合的修改**\n\n```\nNSMutableArray\
  \ *zombies = …\nNSMutableIndexSet *deadZombies = [NSMutableIndexSet indexSet];\n\
  NSUInteger i;\nfor (i=0; i<[zombies count]; i++) {\n    Zombie *zombie = [zombies\
  \ objectAtIndex:i];\n    if ([zombie hasExpired])\n        [deadZombies addIndex:i];\n\
  }\n[zombies removeObjectsAtIndexes:deadZombies];\n```\n\n`NSMutableIndexSet`收集了我们打算从集合中删除的对象的索引。在枚举结束时，所有被标识出的对象会通过一条`-removeObjectsAtIndexes:`消息被一次性删除。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 16 章 ■ 集合模式**\n\n####\
  \ 线程安全\n\n与 Java 一样，没有任何可变集合类是线程安全的。与 Java 不同的是，Objective-C 不提供任何线程安全的可变集合。然而，所有不可变集合本质上都是线程安全的。\n\
  \n所有不可变集合（`NSArray`、`NSDictionary`、`NSSet`）都是线程安全的，因为无法更改其内容。如果你能保证不对集合进行任何修改，那么可变集合也是线程安全的。你可以安全地将一个`NSMutableArray`作为`NSArray`对象与另一个线程共享，只要你能确保该底层可变数组将来永远不会被修改。\n\
  \n如果你无法保证这一点，那么就制作该集合的一个不可变副本并返回它。\n\n> **注意** 一个线程安全的集合并不能自动保护该集合内的对象。任何被多个线程使用的对象都必须是线程安全的。\n\
  \n如果你需要在线程间共享一个可变集合，请使用`@synchronized`访问器函数或信号量来保护对集合的修改。第 15 章中展示的`AutoSafeFIFO`和`FastFIFO`类就是很好的例子。\n\
  \n#### 垃圾回收与弱引用集合\n\n与线程安全间接相关的是，维护对象弱引用的集合可能会存在问题。垃圾回收是并发运行的，可能在任何时候回收弱引用对象。维护弱引用的集合可能会自发地丢失对象或返回`nil`值。\n\
  \n这会影响它们的`count`和枚举操作。具体来说，请注意以下潜在问题：\n\n- 集合的`-count`方法返回值可能随时变化。\n- 数组中任何先前存储的值都可能返回`nil`。字典或集合中的任何成员都可能自发消失。\n\
  - 快速枚举可能在枚举过程中的任何位置遇到`nil`值。\n- 当集合使用弱引用时，不应使用`NSEnumerator`对象。`-nextObject`消息可能为任何值返回`nil`，这会被解释为枚举结束。请使用快速枚举或编程式迭代。\n\
  \n如果这些问题会带来困扰，你可以通过使用强引用集合对象制作一个集合的临时副本来解决。枚举副本中的值，然后丢弃临时集合。\n\n### 总结\n\nObjective-C\
  \ 中的集合与 Java 中的集合扮演着非常相似的角色。你需要留意一些细微的差异，例如不要在枚举期间修改集合。但只要注意了这些，数组、字典（映射）和集合的常用编程模式及用途在很大程度上是保持一致的。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/index-333_1.png)\n\
  \n**第 17 章**\n\n■ ■ ■\n\n"
- '# 委托模式


  委托模式是继承的一种替代方案，它允许在不进行子类化的情况下自定义或覆盖对象的行为。委托模式在 Objective-C 中得到了广泛的应用。理解委托对象在 Cocoa
  框架中的作用，对于有效使用这些框架至关重要，尤其是对于应用程序和用户界面相关的类。本章将解释委托模式、委托对象的角色和用途、如何定义你自己的委托，以及如何将委托模式融入到你自己的设计中。


  ### 理解委托




  '
- "# 委托模式\n\n委托模式将特定决策或操作外部化（即委托）给另一个对象，称为委托对象。它体现了一种被称为责任反转的设计原则。委托对象可以使用不包含在对象类层次结构中的代码来定制或影响对象的正常行为。委托对象可以被查询以做出决策、过滤数据、定义条件行为，或在关键时刻注入额外处理。委托对象始终是可选的。当没有委托对象或方法时，类会实现一个默认策略。\n\
  \n定制的传统方式是创建子类并重写特定方法。要重新定义对象如何被复制，你可以重写 `-copyWithZone:` 方法。要重新定义它与其他对象比较的方式，你可以重写\
  \ `-isEqual:` 方法，以此类推。然而，当试图定制现有类树的行为时，继承模式就不那么有效了。以图 17-1 中的示例为例。\n\n**图 17-1.**\
  \ 窗口类模型\n\n![图 17-1](img/index-334_1.png)\n\n图 17-1 展示了一组窗口类。最底层是抽象的 `Window` 类，它定义了通用属性（如位置、尺寸和顺序）以及通用行为（如拖拽、调整大小、最小化和重新排序）。`TitledWindow`\
  \ 类定义了额外属性，如窗口标题，以及行为，如将窗口标题插入应用程序的“窗口”菜单。`Window` 类下有非标题子类，以及标题窗口类的专用子类。简而言之，这是一个简洁且逻辑清晰的类层次结构。\n\
  \n现在，应用程序开发者（也就是你）希望通过实现窗口在用户拖拽时“吸附”到最佳位置来增强用户体验。使用继承，你唯一的定制策略是创建 `DocumentWindow`\
  \ 的子类并重写其 `-dragWindow` 方法。但这只重新定义了 `DocumentWindow` 的行为。要为面板、帮助和信息窗口实现相同的定制，必须定义额外的子类，每个子类都重复相同的定制。修改后的类树如图\
  \ 17-2 所示。\n\n**图 17-2.** 使用继承进行定制\n\n这不仅工作量大且代码重复，而且这位可怜的开发者（也就是你）现在发现应用程序无法在有多台显示器的系统上工作。显然，`Window`\
  \ 的 `-dragWindow` 方法处理了一些在显示器之间拖拽时的特殊情形，而这些情形只有原始设计者知道。由于不清楚那个解决方案是什么，因此在子类中有效复制\
  \ `-dragWindow` 的行为是不可能的。这个特性是一场灾难，必须放弃，否则你将面临额外的开发和未来不兼容的风险。\n\n如果 `Window` 类的原始开发者预见到了这种情况，他们本可以通过采用委托模式轻松避免此问题。解决方案是在\
  \ `Window` 基类中定义一个委托对象，如图 17-3 所示。\n\n**图 17-3.** 使用委托进行定制\n\n![图 17-3](img/index-335_1.png)\n\
  \n在其 `-dragWindow` 方法中，当用户拖拽窗口时，`Window` 类会反复向委托对象发送 `-willDragWindow:to:` 消息。该消息包含窗口对象和用户最新的拖拽位置。委托对象预期会返回相同或修改后的位置，而\
  \ `Window` 类在实际定位窗口时会使用该位置。\n\n这是一个简单但强大的接口。委托对象可以自由实现其想要的任何拖拽位置方案。它可以将窗口位置“吸附”到附近的边缘，阻止窗口被拖拽到某些区域，或者利用该信息移开其他窗口。\n\
  \n更重要的是：\n\n- 所有子类（`InfoWindow`、`HelpWindow`、`PaletteWindow` 和 `DocumentWindow`）都可以使用单个委托对象进行定制。\n\
  - 可以创建不同的委托对象来定义不同的定制行为。\n- 定制可以应用于每个窗口实例，而不是每个类。\n- 新特性将与 `Window` 类及其所有子类的未来版本兼容。\n\
  - 创建 `DocumentWindow` 对象的现有类和接口无需修改。\n- 任何没有委托对象的 `Window` 对象将使用标准的窗口拖拽行为。\n\n###\
  \ 使用委托\n\n使用委托对象非常简单，这也是其如此有用的特性之一。\n\n1. 在你的类中实现相应的委托方法。\n2. 将你想要定制的对象的委托属性设置为你的委托对象，通常通过发送\
  \ `-setDelegate:` 消息来实现。\n\n就是这样。一旦设置好，对象就会向你的委托对象发送该类已定义的委托消息。\n\n委托预期要实现的方法通常是非正式定义的。然而，它们的使用非常普遍，以至于\
  \ Objective-C 类的文档会明确将其标识为“委托方法”，或将它们分组到“委托方法”部分。请记住，这些文档记录的是委托属性对象应该或可以响应的方法，而不是类本身实现的方法。当希望定制任何对象的行为时，首先应在文档中查找其委托方法。\n\
  \n> **注意：** 文档委托方法部分列出的某些方法实际上是发送给观察者的通知，而不是发送给委托对象的消息。文档应明确区分这一点，但最大的线索在于，通知方法始终接收一个\
  \ `NSNotification` 对象作为其唯一参数。更多关于通知的内容，请参见第 18 章。\n\n委托模式在 Cocoa 框架中被广泛使用。以至于刚开始时会让\
  \ Java 和 C++ 开发者措手不及。例如，对单个 `NSApplication` 对象的大部分定制并非通过创建 `NSApplication` 的子类来实现，而是在初始化期间将一个委托对象附加到\
  \ `NSApplication` 上。以下是 `NSApplication` 委托给其委托对象的一些任务示例：\n\n- 打开一个或多个文档文件。\n- 打开临时文档文件。\n\
  - 自动重新打开文档。\n- 打开无标题的文档窗口。\n- 打印文档。\n- 向用户呈现错误消息。\n- 确定当最后一个窗口关闭时应用程序是否应退出。\n- 确定应用程序是否准备好退出。\n\
  \n在其他面向对象编程语言中，此类定制通常通过创建 `Application` 类的子类并重写其方法来实现。由于委托能够增强 `NSApplication` 对象行为的能力，实际中创建\
  \ `NSApplication` 的子类非常罕见。\n\n清单 17-1 展示了一个为 `NSControl` 视图对象执行验证的简单委托对象。每当需要验证其输入值时，`NSControl`\
  \ 对象会向其委托发送一条 `-control:isValidObject:` 消息。\n\n**清单 17-1.** 输入值验证委托\n\n```objectivec\n\
  @interface PositiveIntValidationDelegate : NSObject\n\n- (BOOL)control:(NSControl*)control\
  \ isValidObject:(id)object;\n\n@end\n\n@implementation PositiveIntValidationDelegate\n\
  \n- (BOOL)control:(NSControl*)control isValidObject:(id)object\n{\n    return ([object\
  \ intValue] > 0);\n}\n\n@end\n\n…\n\nNSTextField *inputTextField = …\n[inputTextField\
  \ setDelegate:[PositiveIntValidationDelegate new]];\n```\n\n一旦为输入视图设置了委托对象，`NSTextField`（`NSControl`\
  \ 的子类）将只接受被解释为正整数的文本值。\n\n\n\n通常，类的设计会使委托成为可选项。如果没有委托对象，或者委托未实现可选的委托方法，对象将采用一些默认行为。在少数情况下，委托对对象的运行至关重要。例如，`NSURLConnection`\
  \ 对象会将所有连接事件发送给其委托。如果没有委托对象来接收这些消息，该对象将无法完成太多工作。\n\n### 委托方法\n\n一些委托方法是必须实现的，而另一些则是可选的。委托必须实现任何必须实现的委托方法。使用委托的对象会无条件地向委托对象发送必须实现的委托消息。如果委托未能实现这些方法，运行时将抛出无法识别的选择子异常。\n\
  \n可选的委托方法更为常见，并使得委托模式异常灵活。发送委托消息的对象会首先测试委托对象是否响应该消息。如果响应该消息，则向委托发送该消息。如果不响应，对象将回退到其基准行为。委托对象可以自由地仅实现其所需的那些可选委托方法。\n\
  \n可选委托方法特别灵活，因为委托对象只需实现它想要或需要影响的方法。如果一个类定义了 4 个委托方法，委托对象就有 15 种不同的自定义组合可供选择。可选委托方法还避免了常见的\
  \ Java 实践，即创建所谓的“简单”类，这些类为一组接口方法实现默认行为，期望你继承该“简单”类并仅覆盖你想要修改的方法。这既简化了类层次结构，又将默认委托行为定位在对象的类中，而非“简单”类中。\n\
  \n委托对象通常是“真实”的对象，而不是专门设计为委托的类。例如，一个文档对象也可能实现 `NSToolbar` 的委托方法。工具栏委托定义了哪些工具栏控件显示合适，这些信息源自文档对象的特定信息。文档对象无需复杂的对象间依赖，就能透明地影响工具栏用户界面。\n\
  \n一个委托对象也可以实现多组委托方法，并将其自身设置为各种对象的委托。这在应用程序委托对象的情况下很常见。一个应用程序委托会将自己设置为单个 `NSApplication`\
  \ 对象的委托对象，但也可能将自己设置为其他对象（如窗口、文件管理器等）的委托。然后，这个单一的应用程序委托对象就可以利用集中在一个对象中的信息来影响广泛的行为。如果应用程序委托类变得难以管理，可以将其各个角色细分为类别以提高模块化程度。有关类别的更多信息，请参见第\
  \ 5 章。\n\n### 委托协议\n\n委托实现的方法在 Cocoa 框架中通常被定义为非正式协议。（如果您需要复习非正式协议和正式协议，请参见第 5 章。）委托对象属性的类型是`id`，允许将其设置为任何对象。委托对象预期实现的方法在文档中有定义。\n\
  \n您可以在设计中自由地采用相同方式，或者采取更正式的方法，如代码清单 17-2 所示。在 Java 中无法做到这一点，因为 Java 没有可选接口方法的概念。如果您好奇，第\
  \ 10 章演示了在 Java 中通过测试方法是否存在来实现非正式协议的代码。\n\n**代码清单 17-2. 带正式委托的自动防御炮**\n\n```\n@interface\
  \ Gun : NSObject\n\n…\n\n@end\n\n@protocol Targeting\n\n@required\n\n- (BOOL)gun:(Gun*)gun\
  \ shouldShootAt:(id)target;\n\n@optional\n```\n\n\n\n```objc\n- (NSArray*)gun:(Gun*)gun\
  \ prioritizeTargets:(NSArray*)targets;\n\n- (BOOL)gunShouldStopFiring:(Gun*)gun;\n\
  \n@end\n```\n\n```objc\n@interface AutomaticPerimeterDefenseGun : Gun {\n    id<Targeting>\
  \ delegate;\n}\n```\n\n- [`www.it-ebooks.info`](http://www.it-ebooks.info/)\n\n\
  ## 第 17 章 — 委托模式\n\n```objc\n@property (assign) id<Targeting> delegate;\n\n- (void)engage;\n\
  - (void)disengage;\n- (float)ammunitionRemaining;\n- (void)reload;\n\n@end\n```\n\
  \n…\n\n```objc\n@interface AutomaticPerimeterDefenseGun () // 私有方法\n\n- (void)defendPerimeter;\n\
  - (NSArray*)acquireTargets;\n- (NSArray*)targetsFromSensor;\n- (void)fireAtTarget:(id)target;\n\
  \n@end\n\n@implementation AutomaticPerimeterDefenseGun\n\n@synthesize delegate;\n\
  \n- (void)defendPerimeter\n{\n    // 向委托检查枪械是否应该停止开火\n    if ([(id)delegate respondsToSelector:@selector(gunShouldStopFiring:)])\
  \ {\n        if ([delegate gunShouldStopFiring:self]) {\n            [self disengage];\n\
  \            return;\n        }\n    }\n\n    // 收集潜在目标\n    NSArray *targets =\
  \ [self aquireTargets];\n\n    // 只向委托识别为敌人的目标开火\n    for ( id target in targets\
  \ ) {\n        if ([delegate gun:self shouldShootAt:target]) {\n            [self\
  \ fireAtTarget:target];\n        }\n    }\n}\n```\n\n- [`www.it-ebooks.info`](http://www.it-ebooks.info/)\n\
  \n## 第 17 章 — 委托模式\n\n```objc\n- (NSArray*)acquireTargets\n{\n    NSArray *targets\
  \ = [self targetsFromSensor];\n\n    // 将目标列表传递给委托，由它进行优先级排序、过滤等操作\n    if ([(id)delegate\
  \ respondsToSelector:@selector(gun:prioritizeTargets:)])\n        targets = [delegate\
  \ gun:self prioritizeTargets:targets];\n\n    return targets;\n}\n\n- (NSArray*)targetsFromSensor\n\
  {\n    …\n}\n\n- (void)fireAtTarget:(id)target\n{\n    …\n}\n\n…\n\n@end\n```\n\n\
  这段代码为我们虚构的冒险游戏实现了一个自动周界防御枪械。一旦启动，它会自主获取目标并开火射击。它将多个目标识别和枪械控制决策委托给一个委托对象。其中最为重要的决策是识别应该射击哪些目标。\n\
  \n`delegate` 属性被正式声明为遵循 `Targeting` 协议的对象。\n\n通过使用 Objective-C 2.0 的 `@required`\
  \ 和 `@optional` 指令，委托的需求被明确告知编译器。委托必须实现 `-gun:shouldShootAt:` 方法，并且可以选择性地实现 `-gun:prioritizeTargets:`\
  \ 或 `-gunShouldStopFiring:` 方法。\n\n如果你不为你创建的类生成文档，那么这是向编译器和其他程序员传达委托需求的一种有效方式。\n\
  \n> **提示：** 在向委托发送 `-respondsToSelector:` 消息时，需要将其转换为 `(id)` 类型。原因是 `id<Targeting>`\
  \ 类型定义的对象指针被认为仅会响应 `Targeting` 协议中定义的方法。这并不包括 `NSObject` 中定义的任何方法，因此编译器会警告该委托可能不响应\
  \ `-respondsToSelector:`。另一种替代方案是将委托对象的指针声明为 `id<Targeting,NSObject>`。这里的 `NSObject`\
  \ 协议（并非类）是一个便利协议，它声明了由 `NSObject` 及其子类定义的核心方法集。\n\n- [`www.it-ebooks.info`](http://www.it-ebooks.info/)\n\
  \n## 第 17 章 — 委托模式\n\n这种方法的唯一缺点出现在你之后继承 `AutomaticPerimeterDefenseGun` 并希望定义额外的委托方法时。`delegate`\
  \ 属性已被定义为 `id<Targeting>`，而子类无法更改继承属性的类型。子类可选的方案不多，只能记录它们使用的额外委托方法，并将其作为非正式协议。\n\
  \n### 结合委托模式\n\n委托模式简化了许多棘手的继承和领域设计问题。在应用程序中融入委托模式时，请考虑以下原则：\n\n- 当对象的行为应允许定制，且实现该定制所需的知识或性质超出了该类的领域时，应使用委托模式。在\
  \ `AutomaticPerimeterDefenseGun` 示例中，该类封装了一种射击目标的武器，但判断哪些目标是友军则超出了它的领域。\n\n- 当在基类中实现多个子类时，委托模式特别有效。每个子类都可以一致地使用委托，而不会增加子类的数量或组织的复杂性。\n\
  \n- 当委托对象不存在时（`delegate == nil`），对象应具有明确定义的行为。在 `-defendPerimeter` 方法中，无条件地向委托发送\
  \ `-gun:shouldShootAt:` 消息。如果委托为 `nil`，则消息返回 `nil`，枪械将不射击任何目标——这恰是在没有目标识别信息时的理想特征。请参见第\
  \ 7 章中的“缺失行为”和“与空值保持一致”的设计模式。\n\n- 类似地，当可选的委托方法缺失时，对象应提供一些自然的基准功能。清单 17-2 中的 `-acquireTargets`\
  \ 方法会测试委托是否响应 `-gun:prioritizeTargets:`。如果响应，则将已知的目标列表传递给委托，由它进行优先级排序、过滤或提供自己的目标列表。如果委托未实现该方法，枪械则使用从其传感器获取的目标。请注意，这也符合前述原则，因为如果委托为\
  \ `nil`，`-respondsToSelector:` 将返回 `NO`。\n\n- 对象应始终在委托消息中提供上下文。清单 17-2 中的委托方法均包含了正在发送消息给接收者的\
  \ `Gun` 对象。这允许委托将发送者纳入其决策过程，例如在弹药过低时通知枪械停止开火。请记住，单个委托对象可能被设置为两个甚至一百个不同对象的委托。有些委托充当可重用的特征，例如清单\
  \ 17-1 中的验证例程，它可以被任意一组相似对象共享。\n\n### 总结\n\n委托模式在 Objective-C 中无处不在。它简化了类的结构，并为你提供了广泛的定制空间。Objective-C\
  \ 程序员和 Cocoa 框架都热情地拥抱这一模式，建议你也这样做。委托模式同样适用于 Java 开发，但 Java 接口的形式化特性以及缺乏简单的“方法是否已实现”的测试，使得它的使用更加繁琐。\n\
  \n- [`www.it-ebooks.info`](http://www.it-ebooks.info/)\n\n"
- "# 第 18 章 — 提供者/订阅者模式\n\n提供者/订阅者模式定义了一种从提供者对象到任意数量订阅者对象的一对多、单向信息流。其概念是提供者拥有有用的信息或事件，需要传递给其他对象（即它的订阅者），这些订阅者将利用这些信息来执行额外的操作或与提供者保持同步。用\
  \ Java 的术语来说，提供者向其监听器触发通知。用 Objective-C 的术语来说，提供者向其观察者发布通知。\n\n提供者/订阅者模式在 Java 中被大量使用，但\
  \ Java 没有提供任何内在的服务来帮助对象管理其订阅者或协调消息。因此，大多数 Java 对象实现了自己的订阅者管理。这并非特别困难，但它确实带来一个重要的限制：提供者和订阅者必须持有彼此的引用。Objective-C\
  \ 通过提供系统范围的服务来管理提供者的订阅者并向他们传递通知，从而大力提倡提供者/订阅者模式。通过提供中间管理层，提供者和观察者（订阅者）可能彼此完全了解，也可能几乎一无所知。\n\
  \n\n\n本章首先展示典型的 Java 监听器接口如何通过 Cocoa 的通知服务来实现。随后将描述其他可能的提供者/订阅者关系，以及如何在设计中运用这些关系。最后，将介绍分布式通知（进程间传递的通知）以及线程安全性等相关考量。你还需要阅读下一章关于观察者模式的内容，因为这两种模式非常相似。\n\
  \n### 通知\n\n在 Objective-C 中，发送给观察者的通知被封装在`NSNotification`实例中。提供者决定`NSNotification`对象的内容，接收者则决定它将要接收的\
  \ Objective-C 消息。\n\n列表 18-1 和 18-2 对比了 Java 监听器与 Objective-C 观察者之间的差异。列表 18-1 定义了一个监控温度的`Thermometer`类。每当温度发生变化时，它就会通知其观察者。\n\
  \n### 列表 18-1. 温度计，温度提供者\n\n**Java**\n\n```java\npublic interface TemperatureListener\n\
  {\n    public void temperatureChanged( Thermometer thermometer, float temperature\
  \ );\n}\n```\n\n```java\npublic class Thermometer\n{\n    private float temperature;\n\
  \    private HashSet<TemperatureListener> listeners =\n        new HashSet<TemperatureListener>();\n\
  \n    public float getTemperature( )\n    {\n        return temperature;\n    }\n\
  \n    public void setTemperature( float newTemp )\n    {\n        if (temperature!=newTemp)\
  \ {\n            temperature = newTemp;\n            fireTemperatureChange();\n\
  \        }\n    }\n\n    public void addListener( TemperatureListener listener )\n\
  \    {\n        listeners.add(listener);\n    }\n\n    public void removeListener(\
  \ TemperatureListener listener )\n    {\n        listeners.remove(listener);\n \
  \   }\n\n    public void fireTemperatureChange( )\n    {\n        for ( TemperatureListener\
  \ listener : listeners ) {\n            listener.temperatureChanged(this,temperature);\n\
  \        }\n    }\n}\n```\n\n**Objective-C**\n\n```objc\n#define TempDidChange @\"\
  TemperatureDidChange\"\n\n@interface Thermometer : NSObject {\n    float temperature;\n\
  }\n@property float temperature;\n@end\n\n@implementation Thermometer\n\n- (float)temperature\n\
  {\n    return temperature;\n}\n\n- (void)setTemperature:(float)newTemp\n{\n    if\
  \ (temperature!=newTemp) {\n        temperature = newTemp;\n        NSNumber *tempValue\
  \ = [NSNumber numberWithFloat:temperature];\n        NSDictionary *info = [NSDictionary\
  \ dictionaryWithObject:tempValue forKey:@\"Temperature\"];\n        [[NSNotificationCenter\
  \ defaultCenter] postNotificationName:TempDidChange object:self\n              \
  \                                            userInfo:info];\n    }\n}\n\n@end\n\
  ```\n\n列表 18-2 展示了一个温度观察者，它接收来自`Thermometer`对象的温度变化通知。该观察者通过待观察的`Thermometer`对象进行初始化，并记录温度值的任何变化。\n\
  \n### 列表 18-2. 温度监视器，温度观察者\n\n**Java**\n\n```java\npublic class TemperatureMonitor\
  \ implements TemperatureListener\n{\n    public TemperatureMonitor( Thermometer\
  \ thermometer )\n    {\n        thermometer.addListener(this);\n    }\n\n    public\
  \ void temperatureChanged( Thermometer thermometer, float temperature )\n    {\n\
  \        System.out.println(\"Temperature is now \"+temperature);\n    }\n}\n```\n\
  \n**Objective-C**\n\n```objc\n#import \"Thermometer.h\"\n\n@interface TemperatureMonitor\
  \ : NSObject\n- (id)initWithThermometer:(Thermometer*)thermometer;\n- (void)tempChanged:(NSNotification*)notification;\n\
  @end\n\n@implementation TemperatureMonitor\n\n- (id)initWithThermometer:(Thermometer*)thermometer\n\
  {\n    self = [super init];\n    if (self != nil) {\n        [[NSNotificationCenter\
  \ defaultCenter] addObserver:self\n                                            \
  \     selector:@selector(tempChanged:)\n                                       \
  \              name:TempDidChange\n                                            \
  \       object:thermometer];\n    }\n    return self;\n}\n\n- (void)tempChanged:(NSNotification*)notification\n\
