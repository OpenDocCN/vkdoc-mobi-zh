- '# 高级 Objective-C


  ---


  ## 第 24 章


  ## 内存管理


  垃圾回收是 Objective-C 的一个近期特性，虽然这朝着正确方向迈出了一大步，但它并非普遍可用。替代方案是传统的 Objective-C 托管内存，其中你的代码负责销毁对象。


  你选择使用托管内存而非垃圾回收的主要原因如下：


  - 操作系统或编译器不支持垃圾回收（具体而言，iPhone OS 和旧版本的 Mac OS X 就是这种情况）。

  - 你正在处理一个已经在使用托管内存的项目。

  - 代码必须在托管内存环境中运行（例如，插件）。


  在第一种情况下，你唯一的选择就是接受托管内存。本章将向你展示传统内存管理的基础知识。Objective-C 提供了一个非常合理且易于学习的对象管理模型。如果你认为这会像
  C 或 C++内存管理一样，那你可以放心了。


  在第二种情况下，将现有项目从托管内存转换为垃圾回收可能得不偿失。Objective-C 中的托管内存与垃圾回收并无根本性不同，因此采用现有方案可能是最便捷的解决方案。


  > **注意**：在编译将在托管内存环境中运行的代码时，应关闭编译器对垃圾回收的支持。在 Xcode 中，通过将`Objective-C Garbage Collection`构建设置设置为`Unsupported`来完成此操作。这会关闭所有垃圾回收支持，生成与缺少垃圾回收的操作系统兼容的代码。


  专用的组件（如插件、框架和服务）被加载到另一个应用程序的运行时环境中，必须与其宿主采用的内存管理方案共存。甚至可能需要编写代码使其既能运行在垃圾回收环境，也能运行在托管内存环境中。本章末尾有一些关于如何做到这一点的说明。


  本章解释了内存分配和释放的基础知识。然后描述了 Objective-C 的引用计数方案和自动释放池。在检查每个概念时，会引入简单的编程规则。综合起来，它们定义了你在使用托管内存时应采用的编程实践。后续部分将涉及引用计数可能变得棘手的一些情况以及如何处理它们。


  ### C 语言内存分配


  所有内存管理的核心是 POSIX 内存分配函数。它们被所有高级 API 使用，你也可以自己使用它们。它们极其简单、快速且高效。基本的使用模式如清单 24-1 所示。


  **清单 24-1**. C 语言内存分配


  ```c

  void *memory = malloc(100);


  …


  free(memory);

  ```


  清单 24-1 中的`malloc()`函数分配了 100 个连续的内存字节，并返回第一个字节的地址。你可以以任何你认为合适的方式使用这 100 个字节。当你处理完该内存块后，`free()`函数会释放并回收它，之后你不应再访问该内存范围。


  `malloc()`还有一些变体。最常见的两个是`calloc()`（分配内存并用零填充）和`realloc()`（更改先前分配的内存块的大小）。无论你使用哪个
  POSIX 函数来分配内存，`free()`都会释放它。


  尽管 POSIX 内存分配很简单，但它也非常笨拙：应用程序有责任在使用完内存后释放它，它只能被释放一次，并且之后不能再使用该指针。这带来了以下困难：


  - 如果你未能释放内存，但“忘记”了指向它的指针，该内存块将永久不可用。这称为**内存泄漏**。

  - 与其他代码共享指针会造成关于哪段代码应负责释放内存以及何时释放的歧义。

  - 使用指向已释放内存块的指针可能是灾难性的。




  '
- "# Objective-C 中的内存管理\n\n这三个问题在过去半个世纪的计算机科学中，一直是寻找更好方式来管理内存块（以及扩展而来的对象）的驱动力。\n\n\
  ### Objective-C 的引用计数\n\n虽然垃圾回收是一种优雅得多的解决方案——能一举优雅地解决所有三个问题——但它是一个复杂的系统，需要大量资源，并且直到最近才成熟起来。在垃圾回收之前的\
  \ Objective-C 采用的是简单的替代方案：引用计数。\n\n引用计数引入了“所有者”的概念：持有指向其他对象的指针的代码或对象，被称为拥有该对象。当某个对象或代码块想要持有对一个对象的引用时，它首先会`retain`（保留）该对象。当它使用完该对象后，它会`release`（释放）它。\n\
  \n引用计数的目标是将与垃圾回收相同的逻辑应用于对象管理：只要一个对象有所有者（引用），它就会保持存活。引用计数和垃圾回收的主要区别在于，在引用计数中，由程序员负责在建立或忘记对某个对象的引用时通知该对象。\n\
  \n以下是引用计数的工作原理：\n\n1. 当一个对象被初始分配时，它的引用计数为 1。\n2. 任何想要使用该对象的代码首先将其引用计数增加 1。这称为保留（retain）。\n\
  3. 当持有步骤 1 或 2 中指针的代码不再使用它时，它会将对象的引用计数减少 1，并忘记该指针。这称为释放（release）。\n4. 当对象的引用计数减少到\
  \ 0 时，该对象会立即被销毁，其内存被释放。\n\n引用计数的一个示例显示在列表 24-2 中。\n\n**列表 24-2. 基本引用计数模式**\n\n```\n\
  id myObject = [[MyClass alloc] init];\n…\n[myObject doSomething];\n…\n[myObject\
  \ release];\n```\n\n在列表 24-2 中，该引用指向一个刚创建的对象。新创建的对象隐式具有引用计数 1（否则它们就不存在了）。程序使用该对象，然后向其发送一个`-release`消息，以指示它将不再使用该对象。`-release`消息会减少对象的保留计数并立即销毁该对象。这假设在此期间没有其他对象或代码`-retain`过该对象。如果有，该对象将继续存在，因为它仍然至少有一个所有者。\n\
  \n在实践中，手动管理释放计数并不像看起来那么繁重。接下来的几节将解释自动释放池的作用，并描述使用引用计数处理对象的常见编程模式。自动释放池非常出色，而且这些模式易于应用。\n\
  \n如果持续一致地应用（这是一个很大的“如果”），引用计数在约 80% 的情况下能提供与使用垃圾回收等效的体验。实际上，从垃圾回收环境转过来时可能遇到的最大问题，是在剩余\
  \ 20% 的情况下忘记应用所需的模式。\n\n### 自动释放池\n\n自动释放池引入了一个非常类似垃圾回收的概念：将对未引用对象的销毁推迟到未来的某个不确定时间。自动释放池似乎让许多\
  \ Objective-C 新手感到困惑，但它们实际上非常简单：\n\n-   自动释放池是一个对象集合，这些对象最终都会收到一条`-release`消息。\n\
  \n仅此而已。要使用自动释放池，向对象发送一条`-autorelease`消息，而不是`-release`消息。接收者不会立即被释放；它只是被添加到自动释放池中。\n\
  \n稍后——通常是在你的代码完成后很久——池会被排空，池中的每个对象都会收到它的`-release`消息。\n\n需要记住的基本规则是：通过向对象发送`-release`或`-autorelease`消息来释放它，但绝不能同时发送两者。这两条消息在逻辑上是等价的，唯一的区别在于时机。前者会立即释放对象。后者将其添加到自动释放池中，以便在将来的某个时间释放。\n\
  \n#### 自动释放池的生命周期\n\n通常，你不需要自己创建自动释放池。（本章后面的一节会解释为什么以及如何创建它们。）在大多数情况下，始终假设存在一个活跃的自动释放池，并且`-autorelease`消息会将接收者添加到当前池中。尽管它们含糊地保证会“最终”释放对象，但自动释放池具有非常明确的生命周期。大多数自动释放池由工作运行循环在每个事件分发开始时创建。在处理事件的代码返回后，池被排空。这个机制定义了关于自动释放池生命周期的重要规则：\n\
  \n-   在你的方法或函数返回之前，当前的自动释放池绝不会被排空。\n\n这条规则的重要性可能不是立竿见影的，但当你阅读接下来的几节时，它会变得清晰。\n\n\
  #### 返回的引用\n\n上一节中列出的引用计数规则看起来简单合理，但实际上它们包含一个巨大的缺陷：在代码不再持有指向某个对象的指针后，如何释放该对象（减少其引用计数）？在很多情况下，通过仔细编码可以避免这种情况，但有一种你无法避免的、不可避免的情况——将对象引用返回给调用者。使用目前学到的引用计数规则，你可能会倾向于编写类似列表\
  \ 24-3 中所示的代码。\n\n**列表 24-3. 保留与返回问题**\n\n```objective-c\n@implementation Zombie\n\
  \n- (void)recitePoetry\n{\n    NSString *myName = [[self zombieName] retain];\n\
  \    [self speakFormat:@\"Hello, my name is %@. This is my poem.\",myName];\n  \
  \  …\n    [myName release];\n}\n\n- (NSString*)zombieName\n{\n    NSMutableString\
  \ *z = [[NSMutableString alloc] init];\n    [z appendString:@\"Zombie \"];\n   \
  \ [z appendString:[self humanName]]; // 例如 \"Zombie Bob\"\n    return z;\n    //\
  \ [z release] ? ? ? ? ?\n}\n\n…\n@end\n```\n\n在`-recitePoetry`方法中，由`-zombieName`返回的`NSString`对象被保留，在方法体中使用，然后被释放。在`-zombieName`方法中，字符串对象在创建时被隐式保留，在方法体中使用，并返回给调用者。但是等等！它也需要被释放，因为`-zombieName`不会再使用它。然而，在方法返回给调用者之后，就没有办法做到这一点了。\n\
  \n自动释放池通过将所需的释放推迟到稍后的某个时间来解决这个问题。`-zombieName`方法在列表 24-4 中被重写，以使用自动释放池。\n\n**列表\
  \ 24-4. 自动释放返回的对象**\n\n```objective-c\n- (NSString*)zombieName\n{\n    NSMutableString\
  \ *z = [[NSMutableString alloc] init];\n    [z appendString:@\"Zombie \"];\n   \
  \ [z appendString:[self humanName]];\n    return [z autorelease];\n}\n```\n\n字符串对象在返回给调用者之前被添加到自动释放池中。这正确地平衡了对象创建时发生的隐式保留，并确保它最终会被销毁。\n\
  \n> **注意** `-retain`和`-autorelease`消息会将接收者返回给发送者，允许将其链接到诸如`return [obj autorelease]`和`property\
  \ = [obj retain]`这样的表达式中。这避免了必须将`[obj autorelease]`和`return obj`写成独立的语句。\n\n当一个对象引用被返回给调用者时，它已经接收到了正确数量的`-release`或`-autorelease`消息。用\
  \ Objective-C 的行话来说，这被称为自动释放对象。\n\n这为 Objective-C 对象创建了另一条规则。\n\n\n\n- 从方法返回的每个对象要么是持有的（owned），要么是自动释放的（autoreleased）。\n\
  \n这意味你不必担心从其他对象接收到的对象的持有权。这些对象可能是被持有的，可能是自动释放的，或者两者兼而有之。关键在于，你的代码只负责其自身对对象的持有权。永远不要担心其他对象对某个对象的持有权（除了本章后面会提到的极少数情况）。\n\
  \n上述规则的一个例外是那些创建新对象的消息：`+alloc`、`+new`、`-copy` 和 `-mutableCopy`。这些几乎是仅有的返回保留（retained）对象的方法。也就是说，该对象有一个不平衡的\
  \ `retain`，而接收者隐式地成为它的新持有者。你可能会遇到其他返回保留对象的方法。按照约定，这些方法的名字以 `new` 开头，例如 `-[NSObjectController\
  \ newObject]`。\n\n## 自动释放的对象\n\n清单 24-4 中的代码之所以能工作，是因为自动释放池的生命周期规则：在 `-recitePoetry`\
  \ 开始时使用的自动释放池，在该方法返回之前不会被排空。这意味着任何被添加到自动释放池的对象都会在方法执行完毕前一直存在。\n\n了解了这一点，清单 24-2\
  \ 和 24-4 中的代码可以进一步简化，如清单 24-5 所示。\n\n### 清单 24-5. 简化的释放管理\n\n```\n- (void)recitePoetry\n\
  \n{\n\nNSString *myName = [self zombieName];\n\n[self speakFormat:@\"Hello, my name\
  \ is %@. This is my poem.\",myName];\n\n…\n\n}\n\n- (NSString*)zombieName\n\n{\n\
  \nNSMutableString *z = [[[NSMutableString alloc] init] autorelease];\n\n[z appendString:@\"\
  Zombie \"];\n\n[z appendString:[self humanName]];\n\nreturn z;\n\n}\n```\n\n`清单\
  \ 24-5` 开始看起来很像为垃圾回收环境编写的代码。唯一的区别在于创建 `NSMutableString` 时调用的那一个 `-autorelease` 消息。\n\
  \n原因是字符串对象已被自动释放，并且对该对象的所有引用都包含在执行方法的作用域内。请记住，自动释放池在方法返回之前绝不会被排空，并且其他方法返回的对象总是保留的或自动释放的对象。这为管理对象的保留计数（retain\
  \ counts）创建了一条新的、重要的规则：\n\n-   只有一个自动释放对象在当前自动释放池的生命周期之外仍被引用时，才需要保留它。\n\n自动释放池的这个特性正是其如此有用的原因，也是为什么我认为托管内存和垃圾回收在\
  \ 80% 的情况下是无法区分的。大多数对象引用都是短暂的——在单个方法中定义并使用后就被遗忘。只要这些引用指向的是自动释放的对象，它们就不需要任何内存管理。\n\
  \n由于这种便利性，大多数对象都会像 `清单 24-5` 所示的那样被立即创建并自动释放，而不是采用 `清单 24-4` 中的模式。一旦自动释放，该对象几乎不需要任何管理，除非其他代码需要保留它——而那将是其他代码的责任。唯一例外的情况是，代码意图创建并保留一个对象。当\
  \ `[[MyClass alloc] init]` 就能达到相同目的时，却写出 `[[[[MyClass alloc] init] autorelease]\
  \ retain]` 是很愚蠢的。\n\n那么，对于在当前自动释放池生命周期之外持续存在的引用，该如何处理呢？接下来几节中的编程模式正是针对这些情况。\n\n\
  ### 托管内存模式\n\n以下各节展示了在托管内存环境中工作时使用的基本编程模式。其中一些模式已经展示过，但为了完整性和将来参考，这里再次包含它们。\n\n\
  #### 新对象模式\n\n当创建一个新对象时，它的保留计数（retain count）从 1 开始，隐式地使其创建者成为第一个持有者。返回新对象的主要消息是：`+alloc`、`+new`\
  \ 和 `-copy`。当对象不再使用时，这种隐含的持有权必须通过 `-release` 消息（如清单 24-6 所示）或 `-autorelease` 消息（如清单\
  \ 24-7 所示）来平衡。\n\n### 清单 24-6. 保留新对象模式\n\n```\nid object = [[NSObject alloc] init];\n\
  \n…\n\n[object release];\n```\n\n### 清单 24-7. 自动释放新对象模式\n\n```\nid object = [[[NSObject\
  \ alloc] init] autorelease];\n\n…\n```\n\n#### 自动释放对象模式\n\n大多数消息返回的对象都是以自动释放对象的形式返回的。也就是说，该对象已经接收到了一组正确平衡的\
  \ `-retain`、`-release` 或 `-autorelease` 消息，并且不需要任何额外管理。具体来说，类的便利构造器（convenience\
  \ constructors），例如 `+[NSMutableArray arrayWithCapacity:]`，会返回自动释放的对象。即使便利构造器用于创建新对象，但从内存管理的角度来看，这些对象并不是“新的”。常见的例子如清单\
  \ 24-8 所示。\n\n### 清单 24-8. 自动释放的对象\n\n```\nNSNumber *number = [NSNumber numberWithInt:10];\n\
  \nNSString *path = [NSString stringWithFormat:@\"Folder %@\",number]; NSFileManager\
  \ *fileManager = [NSFileManager defaultManager]; NSDictionary *attrs = [fileManager\
  \ attributesOfItemAtPath:path error:NULL]; NSArray *attrKeys = [attrs keysSortedByValueUsingSelector:@selector(compare:)];\n\
  ```\n\n`清单 24-8` 中每个由类方法或实例方法返回的对象都是自动释放的，不需要额外管理。如果你要将引用存储在持久化的位置（例如实例变量），那么你应该像这样保留该对象：\n\
  \n```\nmyArray = [[NSMutableArray arrayWithCapacity:100] retain];\n```\n\n更多关于在属性中保留引用的信息，请参阅下面的“设置器模式”部分。\n\
  \n#### 返回自动释放的对象\n\n为了使你的代码与 Objective-C 的其他部分保持一致，你的方法应该始终返回自动释放的对象，如清单 24-9 所示。\n\
  \n### 清单 24-9. 返回一个自动释放的对象\n\n```\n- (id)someObject\n\n{\n\nid object = [[[NSObject\
  \ alloc] init] autorelease];\n\n…\n\nreturn object; // 自动释放\n\n}\n```\n\n#### 设置器模式\n\
  \n在设置对象的属性时，你应该保留被引用的对象，直到你用其他东西替换该引用。被替换的引用应该被释放或自动释放。编写设置器方法有四种流行的模式，如清单 24-10\
  \ 所示。\n\n### 清单 24-10. 设置器模式\n\n```\n@interface MyClass : NSObject {\n\nid one;\n\
  \nid two;\n\nid three;\n\nid four;\n\n}\n\n@property (retain,nonatomic) id one;\n\
  \n@property (retain,nonatomic) id two;\n\n@property (retain,nonatomic) id three;\n\
  \n@property (copy,nonatomic) id four;\n\n@end\n\n@implementation MyClass\n\n- (id)one\n\
  \n{\n\nreturn one;\n\n}\n\n- (void)setOne:(id)object\n\n{\n\n[one autorelease];\n\
  \none = [object retain];\n\n}\n\n- (id)two\n\n{\n\nreturn two;\n\n}\n\n- (void)setTwo:(id)object\n\
  \n{\n\nid oldTwo = two;\n\ntwo = [object retain];\n\n[oldTwo release];\n\n}\n\n\
  - (id)three\n\n{\n\nreturn three;\n\n}\n\n- (void)setThree:(id)object\n\n{\n\nif\
  \ (three!=object) {\n\n[three release];\n\nthree = [object retain];\n\n}\n\n}\n\n\
  - (id)four\n\n{\n\nreturn four;\n\n}\n\n- (void)setFour:(id)object\n\n{\n\n[four\
  \ autorelease];\n\nfour = [object copy];\n\n}\n\n@end\n```\n\n`清单 24-10` 中的所有设置器模式都完成了三个重要任务：\n\
  \n-   向正在存储的对象发送 `-retain` 消息。\n-   向正在被遗忘的对象发送 `-release` 或 `-autorelease` 消息。\n\
  -   在发送 `-release` 消息之前发送 `-retain` 消息。\n\n最后一点很微妙。如果正在设置的对象与已存储在属性中的对象相同，那么在 `-retain`\
  \ 消息之前向其发送 `-release` 消息可能会过早地销毁该对象。\n\n\n\n`object`。第三种模式（如`-setThree:`中所示）通过显式测试该条件来避免此问题。\n\
  \n最后一个属性会存储原始对象的一份副本。它可以采用前三种模式中的任何一种；只需将`[object retain]`替换为`[object copy]`即可。需要注意的是，所有这些模式都与`nil`值兼容。\n\
  \n■注意 你的属性设置器方法的行为必须与你的`@property`指令一致。前三种模式与`retain`属性特性一致，最后一种模式与`copy`特性一致。如果你让\
  \ Objective-C 编译器为你`@synthesize`设置器方法，它将生成与所示代码等效的代码。\n\n设置器模式代码示例是编写行为良好的属性访问器的指南，但这些原则适用于你存储在持久变量中的任何对象引用。如果你直接设置实例变量或静态变量，你的代码必须遵循相同的模式——保留新引用并释放旧引用。\n\
  \n## `init`模式\n\n这实际上是“对象应保留其引用的对象”这一规则的推论，但仍然值得强调。大多数对象的`-init`方法会创建新对象，并且这些对象必须被保留，如清单\
  \ 24-11 所示。\n\n**清单 24-11. `-init`模式**\n\n```\n@interface ZombiePoetryGroup : NSObject\
  \ {\n\nNSMutableSet *zombies;\n\n}\n\n@end\n\n@implementation ZombiePoetryGroup\n\
  \n- (id) init\n\n{\n\nself = [super init];\n\nif (self != nil) {\n\nzombies = [[NSMutableSet\
  \ set] retain];\n\n}\n\nreturn self;\n\n}\n\n@end\n```\n\n请记住，使用`+new`、`+alloc`和`-init`或`-copy`创建的新对象已经被保留。与清单\
  \ 24-11 中高亮语句等价的语句是`zombies = [NSMutableSet new];`。\n\n## `dealloc`模式\n\n当一个引用计数为\
  \ 1 的对象接收到`-release`消息时，它会立即被销毁。这是通过向该对象发送一条`-dealloc`消息来实现的。对象的`-dealloc`方法执行的角色与`-finalize`方法大致相同，但它还负责释放所有被保留的对象、分配的内存以及它拥有的任何其他资源，并最终释放其占用的内存。如果你的对象保留了任何对象引用，那么它必须有一个`-dealloc`方法。清单\
  \ 24-12 和 24-13 展示了编写`-dealloc`方法的两种常见模式。\n\n**清单 24-12. 使用`-release`的`-dealloc`**\n\
  \n```\n- (void)dealloc\n\n{\n\n[one release];\n\n[two release];\n\n[three release];\n\
  \n[four release];\n\n[super dealloc];\n\n}\n```\n\n**清单 24-13. 使用属性设置器的`-dealloc`**\n\
  \n```\n- (void)dealloc\n\n{\n\n[self setOne:nil];\n\n[self setTwo:nil];\n\n[self\
  \ setThree:nil];\n\n[self setFour:nil];\n\n[super dealloc];\n\n}\n```\n\n`-dealloc`方法必须执行以下操作：\n\
  \n*   关闭所有打开的文件，释放所有资源，释放所有非对象内存，以及任何其他在`-finalize`方法中合适的操作。\n*   使用`-release`或`-autorelease`消息释放所有被保留的对象。\n\
  *   将`[super dealloc]`作为其最后一条语句发送。\n\n清单 24-12 中的模式是最快且最高效的，它避免了属性设置器的副作用，并且是最常用的模式。\n\
  \n清单 24-13 中的模式效率较低，但有几个优点。它使用属性设置器来清除引用。如果设置器需要通知观察者或执行其他内务处理，此模式允许它们这样做。除了释放持有的属性外，它还将属性值设置为`nil`。如果`-dealloc`方法中的后续代码试图将该属性用于任何目的（如果该属性仍然指向一个已释放的实例，后果将非常严重），那么这一点可能很重要。第一个模式（如代码所示）试图通过在解除分配期间不向自身发送任何其他消息来避免此问题。但随着对象关系变得更加复杂，很难确保这一点始终有效。例如，一个被保留的对象可能有一个指向其拥有者（`self`）的指针，并且在被解除分配时可能会尝试使用其拥有者的某个属性。\n\
  \n■注意 `-dealloc`是由`-release`发送给对象的。你绝不应向另一个对象发送`-dealloc`消息。\n\n向超类发送`-dealloc`是绝对的要求。现代\
  \ Objective-C 编译器现在如果检测到你没有这样做，就会发出警告。基类的`-dealloc`方法是实际解除分配（释放）实例所占内存的方法。未能发送`-dealloc`将导致内存泄漏。在超类的`-dealloc`消息返回后，该对象不再存在，并且`self`是无效的。你不能访问该对象的任何实例变量，也不能向它发送消息。\n\
  \n### 隐式保留的对象\n\n被你的对象所保留的其他对象所保留的对象，被称为隐式保留的对象。一个对象只应保留它保持直接引用的对象；被其他对象保留的对象由那些对象管理。清单\
  \ 24-14 展示了一个隐式保留 Zombie 对象的例子。\n\n**清单 24-14. 隐式保留的对象**\n\n```\n@class Zombie;\n\
  \n@interface ZombiePoetryGroup : NSObject {\n\nNSMutableDictionary *members;\n\n\
  }\n\n- (BOOL)hasMemberNamed:(NSString*)zombieName;\n\n- (void)addMember:(Zombie*)newZombie;\n\
  \n- (void)removeMember:(Zombie*)zombieZombie;\n\n@end\n\n@implementation ZombiePoetryGroup\n\
  \n- (id) init\n\n{\n\nself = [super init];\n\nif (self != nil) {\n\nmembers = [NSMutableDictionary\
  \ new];\n\n}\n\nreturn self;\n\n}\n\n- (void) dealloc\n\n{\n\n[members release];\n\
  \n[super dealloc];\n\n}\n\n- (BOOL)hasMemberNamed:(NSString*)zombieName\n\n{\n\n\
  return ([members objectForKey:zombieName]!=nil);\n\n}\n\n- (void)addMember:(Zombie*)newZombie\n\
  \n{\n\n[members setObject:newZombie forKey:[newZombie zombieName]];\n\n}\n\n- (void)removeMember:(Zombie*)zombie\n\
  \n{\n\n[members removeObjectForKey:[zombie zombieName]];\n\n}\n\n@end\n```\n\n`ZombiePoetryGroup`对象创建并保留了一个`NSMutableDictionary`对象。所有\
  \ Cocoa 集合类都会保留添加到集合中的对象，并在它们被移除时再次释放它们。`ZombiePoetryGroup`对象保留其对`NSMutableDictionary`对象的直接引用，并让字典对象自行保留和释放其对象。\n\
  \n### 管理内存的问题\n\n在使用托管内存时，会遇到一些独特的编码难题。接下来的几节将描述最常见的问题以及你可以如何处理它们。\n\n#### 过度保留或释放不足的对象\n\
  \n过度保留（或释放不足）的对象是指那些接收到的`-retain`消息次数超过了适当次数，或者未能接收到平衡数量的`-release`消息的对象。该对象永远不会被解除分配，从而导致内存泄漏。这通常是一个难以察觉的微妙问题，因为即使泄漏几千个对象，其影响也不会很明显。\n\
  \n解决这个问题的最佳方法是明智地使用开发者工具。Xcode 开发者工具包含了多种内存泄漏检测工具，但对于 Objective-C 开发者来说，最重要的工具是`ObjectAlloc`，如图\
  \ 24-1 所示。\n\n***图 24-1. ObjectAlloc***\n\n\n\n`ObjectAlloc` 追踪应用程序中所有 Objective-C\
  \ 对象的生命周期。它记录每个对象何时被分配、保留、释放和销毁。它以图形方式呈现每个类的总实例数，使您能够快速识别一组被分配但从未释放的对象。您应偶尔在 `ObjectAlloc`\
  \ 的监视下运行应用程序，以查找对象泄漏。\n\n一旦发现泄漏，再次使用 `ObjectAlloc` 来检查发送给这些对象的 `+alloc`、`-retain`、`-release`\
  \ 和 `-dealloc` 消息的历史记录。实例的历史记录应能暴露失衡发生的位置。\n\n**过度释放或未充分保留的对象**\n\n过度释放或未充分保留的对象是指接收到一次过多\
  \ `-release` 消息的对象。该对象在其他对象仍持有对其的引用时被销毁。孤立的对象指针随后指向无效内存。使用无效对象指针的影响范围可能从不一致到灾难性。\n\
  \n用于查找过度释放对象的最佳调试工具是 `NSZombie`，请勿与本书中的任何僵尸示例混淆。Objective-C 运行时内置了多种可通过环境变量启用的调试工具。表\
  \ 24-1 列出了最常用于查找过度释放对象的两个环境变量。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/index-464_1.jpg)\n\n第 24 章 ■ 内存管理\n\n**表 24-1.** `NSZombie` 环境变量\n\n|\
  \ 环境变量 | 描述 |\n| --- | --- |\n| `NSZombieEnabled` | 如果设置为 `YES`，被销毁的对象将被替换为僵尸对象，该对象在收到任何消息时会抛出异常。\
  \ |\n| `NSAutoreleaseFreedObjectCheckEnabled` | 如果设置为 `YES`，自动释放池在尝试释放一个已被销毁的对象时会打印警告信息。\
  \ |\n\n要使用这些工具，请设置所需的环境变量，并在启动应用程序时将该环境传递给它。其中一些功能也可以在应用程序中通过编程方式启用。\n\n僵尸对象在对象被销毁时创建。它不会被释放，而是将其类更改为特殊的僵尸类。它仍是一个对象，任何发送给该对象的消息都将抛出异常，帮助您识别哪个对象被过度释放了。一旦识别出来，您可以使用\
  \ `ObjectAlloc` 工具来检查该对象的历史记录，并定位提前释放它的代码。\n\n图 24-2 显示了如何在 Xcode 中为可执行文件设置环境变量。\n\
  \n**图 24-2.** 设置 `NSZombie` 调试环境变量\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 24 章 ■ 内存管理\n\n关于用于检测内存泄漏和过度释放错误的工具的完整描述，请参见苹果公司的“技术说明 TN2124：Mac OS X 调试魔法”。¹\n\
  \n**提前释放的对象**\n\n与过度释放对象密切相关的一个问题是对象被简单地提前释放——当仍有活跃的引用指向它时。最常见的原因是在设置属性或从集合中移除对象时，作为副作用释放了对象。清单\
  \ 24-15 和 24-17 展示了两种非常常见的对象被提前销毁的场景。\n\n**清单 24-15.** 对象被集合销毁\n\n```objectivec\n\
  @implementation FIFO\n\n…\n\n- (id)pop\n\n{\n\nid object = [stack objectAtIndex:0];\n\
  \n[stack removeObjectAtIndex:0];\n\nreturn object; // |object| 不存在！\n\n}\n\n@end\n\
  ```\n\n在清单 24-15 中，`FIFO` 中的对象被集合隐式保留。要从栈中取出一个对象，需将其从集合中移除并返回给调用者。问题在于，集合可能是该对象的唯一所有者。移除它会释放该对象，从而销毁它。`-pop`\
  \ 方法随后返回一个指向已销毁对象的指针。解决方案是重新自动释放该对象，如清单 24-16 所示。\n\n**清单 24-16.** 重新自动释放对象\n\n\
  ```objectivec\n- (id)pop\n\n{\n\nid object = [[[stack objectAtIndex:0] retain] autorelease];\n\
  \n[stack removeObjectAtIndex:0];\n\nreturn object;\n\n}\n```\n\n解决方案是在从集合中移除对象之前，向其发送\
  \ `-retain` 和 `-autorelease` 消息。额外的 `-retain` 防止对象被立即销毁，而 `-autorelease` 则创建一个适合返回给调用者的自动释放对象。\n\
  \n¹ Apple Inc., “Technical Note TN2124: Mac OS X Debugging Magic,” http://developer.apple.com/technotes/\n\
  tn2004/tn2124.html, 2006.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  第 24 章 ■ 内存管理\n\n■ **注意** `[[object retain] autorelease]` 模式被许多 Objective-C 新手过度使用。它有其适用之处，但通常表明试图应用内存管理“玄学”，而非解决实际问题。\n\
  \n在清单 24-17 中，从属性 getter 返回了一个自动释放的对象。随后更改属性，释放了之前的对象，而该对象仍在被引用。\n\n**清单 24-17.**\
  \ 对象被设置器销毁\n\n```objectivec\nid two = [self two];\n\n[self setTwo:nil];\n\n// |two|\
  \ 不存在！\n```\n\n对此问题有三种解决方案：\n\n*   使用清单 24-10 中的 `-setOne:` 所演示的设置器模式。该设置器会先自动释放之前的对象，而不是立即释放它。\n\
  *   在赋值时显式保留属性对象（例如，`id two = [[[self two] retain] autorelease]`），这将保护它不被 `-setTwo:`\
  \ 消息释放。\n*   编写属性 getter，使其每次返回值时都重新自动释放该对象（例如，`return [[two retain] autorelease]`）。\n\
  \n在这些解决方案中，第一种是首选方案。它不需要调用者的介入，保留了返回属性值的自动释放约定，并且高效。如果您无法控制类的实现，则应使用第二种方案。最后一种方案效率低下，并且常被经验不足的程序员无休止地使用。\n\
  \n**循环引用**\n\n引用计数的一个主要问题是循环引用，对此没有通用解决方案。如果两个对象都持有了对彼此的引用，这两个对象将永远不会被释放。\n\n如何解决这个问题取决于具体情况。一种常见的解决方案是存储未保留的引用，即所谓的弱引用。这不应与垃圾回收中使用的术语“弱引用”混淆，因此我将使用术语“未保留引用”。未保留引用通常用于委托、观察者和父对象引用。清单\
  \ 24-18 展示了一个对象树中节点的接口，该节点持有对它的父节点的未保留引用。\n\n**清单 24-18.** 未保留的对象属性\n\n```objectivec\n\
  @interface TreeNode : NSObject {\n\nTreeNode *parent;\n\nNSMutableArray *children;\n\
  \n}\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 24 章 ■ 内存管理\n\n@property\
  \ (assign) TreeNode *parent;\n\n…\n\n@end\n```\n\n通过使用 `assign` 属性特性，设置 `parent`\
  \ 属性时不会保留该属性。风险在于，该节点可能从树中被移除，随后尝试向其父对象发送消息，而父对象可能已不存在。如果您仔细设计对象，使其在那些对象可能已被释放的情况下，绝不可能试图使用任何未保留的引用，那么这种方法是可行的。\n\
  \n对此类问题的最佳解决方案是添加代码，在节点从树中移除之前，显式清除对父节点的引用。在引用被保留的情况下，这打破了循环引用并允许节点被销毁。在引用未被保留的情况下，这确保了节点不会尝试使用过时的引用。\n\
  \n**创建自动释放池**\n\n通常，您不会自己创建自动释放池，但在少数情况下您必须创建，或者您可能希望创建。\n\n\n\n"
- "# Objective-C 内存管理与 C/Objective-C 混合编程\n\n### 自动释放池\n\n所有 Objective-C 对象都假定它们在一个活跃的自动释放池（autorelease\
  \ pool）范围内运作。如果不存在自动释放池，向对象发送`-autorelease`消息将在控制台打印一条警告消息，提示您的应用程序正在泄漏对象。\n\n运行循环（run\
  \ loop）和 AppKit 框架会为您创建和清理自动释放池。您必须自行创建自动释放池的两种情况是：在命令行工具的开头，或者创建新线程时。自动释放池属于线程，因此任何新线程都应立即创建一个自动释放池，如代码清单\
  \ 24-19 所示。\n\n**代码清单 24-19.** 创建线程的自动释放池\n\n```\n@implementation Threader\n\n-\
  \ (void)myThread:(id)ignored\n\n{\n\nNSAutoreleasePool *pool = [NSAutoreleasePool\
  \ new];\n\n…\n\n[pool drain];\n\n}\n\n@end\n```\n\n代码清单 24-19 中的`-myThread:`方法在其自身的线程中启动。它的首要任务是创建一个顶层自动释放池，该池将被所有对象使用，直到线程结束，此时必须清理该池。\n\
  \n**注意：** `-[NSAutoreleasePool drain]`消息是相当新的。旧代码发送`-release`消息代替。在受管内存环境中，两者是相同的。当将受管内存与垃圾回收混合使用时（参见下一节），`-drain`会向垃圾回收器发送一个提示，让其开始回收。两者都是正确的。\n\
  \n如果代码清单 24-19 中的线程在循环中执行某些操作，它应创建嵌套的自动释放池，以定期释放临时对象。这也适用于任何在返回前产生大量临时对象的方法。代码清单\
  \ 24-20 展示了一个循环，它在工作时定期创建和释放自动释放池。\n\n**代码清单 24-20.** 创建嵌套的自动释放池\n\n```\nNSAutoreleasePool\
  \ *wadingPool = nil;\n\nint poolCount = 0;\n\nNSUInteger i;\n\nfor (i=0; i<1000000;\
  \ i++) {\n\nif (wadingPool==nil)\n\n    wadingPool = [NSAutoreleasePool new];\n\n\
  …\n\nif (++poolCount>2000) {\n\n    poolCount = 0;\n\n    [wadingPool drain];\n\n\
  \    wadingPool = nil;\n\n}\n\n}\n```\n\n代码清单 24-20 中的循环定期创建一个嵌套的自动释放池，该池被清理以释放循环体中创建的临时对象。这当然打破了“自动释放的对象直到当前方法返回才会被释放”的规则，但这是因为您自己在清理池——所以您应该知道这一点。\n\
  \n新的自动释放池本质上是嵌套在先前活跃的自动释放池内部的。\n\n清理一个池会隐式地清理在其内部创建的所有自动释放池。代码清单 24-19 中的代码不需要确保`wadingPool`在退出循环前被清理。包含`wadingPool`的自动释放池会在其被清理时清理它。例如，异常处理器不需要清理任何嵌套的自动释放池。唯一重要的是，顶层自动释放池在线程终止前被清理。\n\
  \n### 混合受管内存与垃圾回收\n\n您可能会发现自己需要编写既能在受管内存环境又能在垃圾回收环境中运行的 Objective-C 代码。这是可行的，因为受管内存方法和垃圾回收技术重叠很少。在垃圾回收环境中，管理引用计数的消息（`-retain`、`-release`、`-autorelease`）被忽略。在受管内存环境中，编译器对垃圾回收的支持（`__strong`和`__weak`指针类型）被忽略。最终结果是代码在这两种环境中都能正确运行。\n\
  \n当编译将在混合内存环境中运行的代码时，应包含编译器对垃圾回收的支持。在 Xcode 中，将“Objective-C Garbage Collection”构建设置为“Supported”。这会使编译器包含对垃圾回收的支持，但同时也包含支持受管内存所需的代码。当“Objective-C\
  \ Garbage Collection”构建设置为“Required”（仅垃圾回收）时，编译器会主动剥离仅对受管内存有用的代码。这使代码更高效，但牺牲了向后兼容性。\n\
  \n编写能在两种环境中运行的代码相当直接。通常，正确实现受管内存的代码也能在垃圾回收环境中工作。例如，本章中的所有代码示例在启用垃圾回收时都能正确运行。表 24-2\
  \ 列出了每种环境对代码的影响。\n\n**表 24-2.** 受管内存与垃圾回收的效果对比\n\n| 代码 | 受管内存 | 垃圾回收 |\n|------|----------|----------|\n\
  | `-retain` | 保留一个对象 | 忽略 |\n| `-release` | 释放一个对象 | 忽略 |\n| `-autorelease` | 将对象添加到自动释放池\
  \ | 忽略 |\n| `-retainCount` | 返回当前保留计数 | 无意义 |\n| `-dealloc` | 发送给对象以销毁它 | 运行时阻止此消息发送\
  \ |\n| `-finalize` | 从不发送 | 当对象即将被回收时发送 |\n| `__strong` | 忽略 | 表示强引用 |\n| `__weak`\
  \ | 忽略 | 表示弱引用 |\n| `-drain` | 清理自动释放池 | 触发垃圾回收 |\n| `@property (assign)` | 未保留的属性\
  \ | 强引用 |\n| `@property (retain)` | 保留的属性 | 强引用 |\n\n`NSAutoreleasePool`的`-drain`方法大约是唯一在两种环境中都有功能的方法。当垃圾回收开启时，它提示垃圾回收器可能想要开始一个垃圾回收周期。\n\
  \n### 总结\n\n受管内存需要一些额外的努力，但并不繁重。只需记住这些基本规则：\n\n- 将对象引用存储在持久变量中时，保留它。\n- 在丢弃任何保留的引用之前，释放或自动释放它。\n\
  - 编写一个`-dealloc`方法来释放所有保留的对象。\n- 始终返回保留或自动释放的对象。\n- 自动释放的对象在当前方法返回之前不会被释放。\n\n---\n\
  \n## 第 25 章：混合 C 和 Objective-C\n\nObjective-C 的一大优势是它允许与 C 函数和变量无缝集成。这让您可以直接访问大量现有的\
  \ C API。本章讨论了在同一应用程序中混合 C 和 Objective-C 代码的基本方法，并介绍了 Core Foundation，这是一个 C 库，包含可与\
  \ Objective-C 对象互换的数据结构。混合语言会带来一些有趣的内存管理问题，这些问题将在本章末尾进行解释。\n\n### 在 Objective-C\
  \ 中使用 C\n\n“在 Objective-C 中使用 C”这个说法有些误导，因为 Objective-C 是 C 语言的严格超集。您实际上不能*使用* C\
  \ 在 Objective-C 中，因为 Objective-C *就是* C。这个术语通常用于当您编写直接使用 C 结构体和调用 C 函数的代码时，而不是使用\
  \ Objective-C 对象和消息。\n\n#### 从 Objective-C 调用 C 函数\n\n本书中已经呈现了许多代码示例，它们实现了 C 函数并在\
  \ Objective-C 类中使用它们。这些是从 C 或 Objective-C 代码中调用的标准 C 函数。具有静态类型的 C 函数将其作用域限制在正在编译的模块中的代码。非静态函数是全局的，可以从任何模块调用。（请记住，在此上下文中，“static”意味着私有，而不是\
  \ Java 意义上的静态。）一个静态 C 函数的示例如代码清单 25-1 所示。\n\n\n\n### **列表 25-1.** C 函数与 Objective-C\
  \ 方法\n\n```objc\nstatic NSInteger compareZombieBrains( id l, id r, void *ignored\
  \ )\n{\n    float lSize = [l brainSize];\n    float rSize = [r brainSize];\n   \
  \ if (lSize < rSize)\n        return NSOrderedAscending;\n    else if (lSize > rSize)\n\
  \        return NSOrderedDescending;\n    return NSOrderedSame;\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 25 章 ■ 混合使用 C 与 Objective-C\n\n```objc\n- (NSArray*)zombiesSortedByIntelligence\n\
  {\n    return [zombieArray sortedArrayUsingFunction:compareZombieBrains context:NULL];\n\
  }\n```\n\nC 函数可以定义在任何 Objective-C 指令之外的位置，或者任何可以定义 Objective-C 方法的位置。这意味着你可以在 `@implementation`\
  \ 指令中混合使用 C 函数和 Objective-C 方法，但有些程序员会将他们的 C 函数统一放置在 `@implementation` 外部。这属于编码风格的问题。\n\
  \n你的 Objective-C 应用程序可以调用操作系统提供的 C API，可以链接标准 C 库，也可以在项目中包含 C 源代码模块。这使得与广泛的 POSIX\
  \ 函数、C 框架、共享库以及开源代码进行交互变得非常容易。\n\n#### 在 C 中使用 Objective-C 对象\n\nObjective-C 模块（`.m`）中的\
  \ C 函数会被编译为 Objective-C 代码，而不仅仅是 C 代码。列表 25-1 中的 C 函数向对象发送 Objective-C 消息，就像它是一个\
  \ Objective-C 方法一样。唯一的区别是它没有对象上下文（`self`）。就此而言，C 函数相当于 Java 中的静态类方法。\n\n当你在 Xcode\
  \ 项目中添加一个 C 源文件（`.c`）时，它会被编译为纯 C 代码。该源文件不能包含任何 Objective-C 语法。如果你需要在 C 模块中使用 Objective-C\
  \ 对象，有两种选择：\n\n-   将那些需要使用 Objective-C 对象的函数隔离出来，并将它们移动到一个 Objective-C（`.m`）源文件中。该文件可以完全由\
  \ C 函数组成，但它会被编译为 Objective-C 代码，从而能够使用 Objective-C 语法来引用对象和发送消息。\n-   直接使用一个 Objective-C\
  \ 运行时函数（例如 `objc_msgSend(id, SEL, …)`）来发送 Objective-C 消息。\n\n后一种解决方案比较笨拙，但从技术上讲，你可以在\
  \ C 中完成任何在 Objective-C 中能完成的事情。毕竟，整个 Objective-C 运行时都是用 C 编写的。具体细节请参阅 *Objective-C\
  \ 2.0 运行时参考* ¹。\n\n### Core Foundation\n\nCore Foundation 是一个庞大的 C 函数库，它围绕“对象”这一概念进行设计，并将这些对象称为*不透明类型*或简称*类型*。这些不透明类型具有与\
  \ Objective-C 对象兼容的内部结构，并且相当多的 Core Foundation 类型可以与 Objective-C 类互换。这种互惠性被称为*免费桥接*。Core\
  \ Foundation 的目标是无缝地为 C 和 Objective-C 程序员提供大量操作系统和框架服务。C 程序员使用 `CFTypeRef` 值（指向不透明数据结构的指针）并将其传递给\
  \ Core Foundation 函数。Objective-C 程序员则存储对象指针并向其发送消息。在这两种情况下，执行的代码是相同的。\n\n大多数 Core\
  \ Foundation 类型没有与 Objective-C 的免费桥接。如果你需要它们的功能，则需要直接使用 Core Foundation 数据类型和函数。Core\
  \ Foundation 采用了许多与 Objective-C 相同的概念，只是用其自己的类型、函数和术语来实现它们。常见的 Core Foundation 类型和函数及其\
  \ Objective-C 对应项的对比列于表 25-1 中。\n\n¹ Apple Inc., *Objective-C 2.0 运行时参考*, [`developer.apple.com/documentation/Cocoa/Reference/ObjCRuntimeRef/`](http://developer.apple.com/documentation/Cocoa/Reference/ObjCRuntimeRef/),\
  \ 2008.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### **表 25-1.** Core\
  \ Foundation 术语\n\n| Objective-C | Core Foundation |\n|-------------|----------------|\n\
  | `Class` | `CFTypeID` |\n| `id` 或 `NSObject*` | `CFTypeRef` |\n| `NSString*` |\
  \ `CFStringRef` |\n| `[t class]` | `CFGetTypeID(t)` |\n| `[t isEqual:t2]` | `CFEqual(t1,t2)`\
  \ |\n| `[t description]` | `CFCopyDescription(t)` |\n| `[t retain]` | `CFRetain(t)`\
  \ |\n\n\n\n`CFRetain(t)`\n\n`[t release]`\n\n`CFRelease(t)`\n\n一个 Core Foundation\
  \ *类型* 是一个标识符，它在概念上等同于一个 Objective-C 类。一个 Core Foundation *引用*（简称 `ref`）是一个类型的实例，在功能上等同于一个标识符（`id`）或对象指针。\n\
  \n类型像类一样按继承层次结构组织。`CFStringRef` 是 `CFTypeRef` 的子类型，就像 `NSString` 是 `NSObject` 的子类一样。`CFStringRef`\
  \ 可以传递给任何接受 `CFStringRef` 或 `CFTypeRef` 参数的函数，正如 `NSString` 对象会响应为 `NSString` 或\
  \ `NSObject` 定义的任何消息一样。\n\n### 无缝桥接\n\nCore Foundation 和 Objective-C 类框架被设计成使特定的\
  \ Core Foundation 类型与等价的 Objective-C 类可互换。形成无缝桥接的类型和类别于表 25-2 中。\n\n**表 25-2.**\
  \ Core Foundation 无缝桥接\n\n| Cocoa 类 | Core Foundation 类型 |\n| :--- | :--- |\n| `NSArray`\
  \ | `CFArrayRef` |\n| `NSAttributedString` | `CFAttributedStringRef` |\n| `NSCalendar`\
  \ | `CFCalendarRef` |\n| `NSCharacterSet` | `CFCharacterSetRef` |\n| `NSData` |\
  \ `CFDataRef` |\n| `NSDate` | `CFDateRef` |\n| `NSDictionary` | `CFDictionaryRef`\
  \ |\n| `NSError` | `CFErrorRef` |\n| `NSInputStream` | `CFReadStreamRef` |\n| `NSLocale`\
  \ | `CFLocaleRef` |\n| `NSMutableArray` | `CFMutableArrayRef` |\n| `NSMutableAttributedString`\
  \ | `CFMutableAttributedStringRef` |\n| `NSMutableCharacterSet` | `CFMutableCharacterSetRef`\
  \ |\n| `NSMutableData` | `CFMutableDataRef` |\n| `NSMutableDictionary` | `CFMutableDictionaryRef`\
  \ |\n| `NSMutableSet` | `CFMutableSetRef` |\n| `NSMutableString` | `CFMutableStringRef`\
  \ |\n| `NSNumber` | `CFNumberRef` |\n| `NSOutputStream` | `CFWriteStreamRef` |\n\
  | `NSSet` | `CFSetRef` |\n| `NSString` | `CFStringRef` |\n| `NSTimer` | `CFRunLoopTimerRef`\
  \ |\n| `NSTimeZone` | `CFTimeZoneRef` |\n| `NSURL` | `CFURLRef` |\n\n简而言之，指向表 25-2\
  \ 中某个类的对象指针，在功能上等同于其匹配的 Core Foundation 类型引用。这个单一值可以被透明地视为任何一种类型。\n\n清单 25-2 中的代码通过一个结合了\
  \ Core Foundation UUID 类型的 Objective-C 类演示了这一点。\n\n**清单 25-2.** 在 Objective-C 类中使用\
  \ Core Foundation 类型\n\n```\n#include <CoreFoundation/CoreFoundation.h>\n\n@interface\
  \ Unique : NSObject <NSCoding> {\n@private\n    __strong CFUUIDRef uuid;\n}\n\n\
  @property (readonly) NSString *uuid;\n\n@end\n\n@implementation Unique\n\n- (id)init\n\
  {\n    self = [super init];\n    if (self != nil) {\n        CFUUIDRef newUUID =\
  \ CFUUIDCreate(kCFAllocatorDefault);\n        uuid = CFMakeCollectable(newUUID);\n\
  \    }\n    return self;\n}\n\n- (id)initWithCoder:(NSCoder*)decoder\n{\n    self\
  \ = [super init];\n    if (self != nil) {\n        NSString *uuidString = [decoder\
  \ decodeObjectForKey:@\"UUID\"];\n        CFUUIDRef savedUUID = CFUUIDCreateFromString(kCFAllocatorDefault,\
  \ (CFStringRef)uuidString);\n        uuid = CFMakeCollectable(savedUUID);\n    }\n\
  \    return self;\n}\n\n- (void)encodeWithCoder:(NSCoder*)encoder\n{\n    [encoder\
  \ encodeObject:self.uuid forKey:@\"UUID\"];\n}\n\n- (NSString*)uuid\n{\n    CFStringRef\
  \ cfString = CFUUIDCreateString(kCFAllocatorDefault,uuid);\n    NSString *objcString\
  \ = (NSString*)CFMakeCollectable(cfString);\n    return objcString;\n}\n\n@end\n\
  ```\n\n标准的 Objective-C 类框架不包含封装通用唯一标识符（UUID）的类。然而，Core Foundation 框架拥有非常实用的 `CFUUIDRef`\
  \ 类型以及一组用于创建和编码 UUID 的函数。清单 25-2 中的 `Unique` 类存储了一个 `CFUUIDRef` 值（等同于一个对象指针）作为一个\
  \ Core Foundation 类型，就像对待任何其他 C 指针一样。`-init` 方法创建一个通用唯一 ID 类型并存储一个指向它的引用。\n\nCore\
  \ Foundation 函数 `CFUUIDCreateString(...)` 根据一个 `CFUUIDRef` 创建 UUID 的文本表示，并将其作为一个新的\
  \ `CFStringRef` 返回。查看表 25-2，`CFStringRef` 和 `NSString` 是无缝桥接的。因此，对 Core Foundation\
  \ 字符串类型的引用可以被当作一个 `NSString` 对象指针来处理，并返回给调用者。\n\n类似地，`-initWithCoder:` 方法首先从序列化数据流中解码一个\
  \ `NSString` 对象。它将 `NSString` 对象指针传递给 `CFUUIDCreateFromString(...)`，就好像它是一个 `CFStringRef`\
  \ 一样。`CFUUIDCreateFromString(...)` 函数使用这个 `CFStringRef` 来重建 UUID 不透明类型。\n\n无缝桥接意味着你可以无缝地将许多常见的\
  \ Core Foundation 类型当作 Objective-C 对象来使用，反之亦然。Core Foundation 类型与其对应的 Objective-C\
  \ 类之间唯一显著的区别在于内存管理。这将在下一节讨论。\n\n**提示** 还有其他一些你可能感兴趣的 Objective-C 桥接。例如，存在从 Objective-C\
  \ 到 Ruby 和 Python 编程语言的桥接。Apple 曾开发过一个 Objective-C 到 Java 的桥接，但后来已被弃用。\n\n表 25-2\
  \ 中列出的 Objective-C 类是唯一与 Core Foundation 类型有无缝桥接的。例如，`NSRunLoop` 与 `CFRunLoopRef`\
  \ *不* 可互换。要在 `NSRunLoop` 上使用 Core Foundation 函数，请向该对象发送 `-getCFRunLoop` 消息，它将返回其底层的\
  \ `CFRunLoopRef`。\n\n### C 内存管理\n\n第 24 章描述了 C 内存管理，或者说是其缺乏。Core Foundation 的内存管理要么与\
  \ Objective-C 使用的内存管理协同工作，要么在其上分层。当使用 Core Foundation 类型时，你必须采用 Core Foundation\
  \ 内存管理模式，或者将引用过渡到 Objective-C 所使用的内存管理方案。\n\nCore Foundation 类型使用简单的引用计数。如果你跳过了第\
  \ 24 章，你可能想回顾一下，以便理解基本原理。以下是关于 Core Foundation 内存管理你需要了解的关键概念：\n\n*   Core Foundation\
  \ 使用引用计数。\n*   每个 Core Foundation 类型都是使用一个*分配器*分配的。相当于 `+alloc` 的分配器是 `kCFAllocatorDefault`\
  \ 或 `NULL`。\n*   Core Foundation 函数 `CFRetain(o)` 和 `CFRelease(o)` 分别等同于 `[o retain]`\
  \ 和 `[o release]`（在托管内存环境中）。\n*   Core Foundation 不使用自动释放池。函数返回的 refs 要么是新的（刚刚创建，隐式由调用者拥有），要么是拥有的（至少被其他所有者\
  \ retain 一次）。\n\n#### 使用 Core Foundation 内存管理模式\n\n除非你需要保留或返回一个对 Core Foundation\
  \ 类型的引用，否则最简单的方法是遵循 Core Foundation 内存管理模式。Core Foundation 不使用自动释放池，因此所有返回的 refs\
  \ 要么是新的，要么是拥有的。要使用 Core Foundation 内存管理，你的代码应该执行以下操作：\n\n*   像在托管内存环境中对待一个新对象一样使用一个新\
  \ ref。\n*   在需要的时间内使用该 ref。\n*   使用完毕后调用 `CFRelease(ref)`。\n\n将拥有的引用视为类似托管内存环境中的自动释放对象。\n\
  \n*   拥有的 refs 通常可以在当前方法或函数返回前自由使用。\n*   或者，调用 `CFRetain(ref)` 来 retain 该类型，在需要的时间内使用它，然后调用\
  \ `CFRelease(ref)` 来 release 它。\n\n关于 Core Foundation 内存管理约定和规则的完整描述可以在 *Memory\
  \ Management Programming Guide for Core Foundation* 中找到。\n\n#### 使用垃圾回收的 Core Foundation\n\
  \n\n\n"
- "# 使用垃圾回收的内存管理\n\n即使在 Objective-C 中使用垃圾回收，Core Foundation 依然采用引用计数。垃圾收集器能够感知 Core\
  \ Foundation 的引用计数，并将其整合到收集逻辑中。具体来说，只有当某个 Core Foundation 类型没有 **__strong** 引用**并且**其\
  \ Core Foundation 引用计数为 0 时，它才会被销毁（回收）。这使得 Core Foundation 和 Objective-C 垃圾回收能够共存，但在将\
  \ `CFTypeRef` 当作 Objective-C 对象处理时仍需注意。与 Objective-C 不同，使用垃圾回收时不能简单地忽略引用计数。\n\n\
  当将 Core Foundation 类型存储在 Objective-C 对象指针（或任何 **__strong** 或 **__weak** 指针类型）中时，需要通过\
  \ `CFMakeCollectable(CFTypeRef)` 函数将其过渡到垃圾回收，如清单 25-2 所示。该函数执行一次 `CFRelease()`——将其引用计数减至\
  \ 0，但不会销毁该类型——并返回一个指向它的 **__strong** 引用。该类型/对象现在由垃圾收集器负责。\n\n2 Apple Inc., *Core\
  \ Foundation 内存管理编程指南*, [`developer.apple.com/documentation/CoreFoundation/Conceptual/CFMemoryMgmt/`](http://developer.apple.com/documentation/CoreFoundation/Conceptual/CFMemoryMgmt/),\
  \ 2007.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 25 章 ■ 混合 C\
  \ 与 Objective-C\n\n**注意** 垃圾回收只能与使用标准或默认分配器函数（`kCFAllocatorDefault` 或 `NULL`）分配的\
  \ Core Foundation 类型一起使用。幸运的是，对于您处理的大多数 Core Foundation 类型来说，这都适用。使用其他分配器（特别是 `kCFAllocatorMalloc`）分配的\
  \ Core Foundation 类型将在另一个内存区域中分配，并且**不会**被垃圾收集器扫描。任何此类类型都必须使用 Core Foundation 内存管理进行管理。\n\
  \n尽管 `CFRetain()` 和 `CFRelease()` 在功能上与 `-[NSObject retain]` 和 `-[NSObject release]`\
  \ 相同，但在垃圾回收环境中，您不能使用 Objective-C 消息来保留和释放 Core Foundation 类型。请记住，当垃圾收集器启动时，Objective-C\
  \ 消息 `-retain` 和 `-release` 会被禁用。因此，虽然 `CFRetain()` 和 `CFRelease()` 继续有效，但 `-retain`\
  \ 和 `-release` 不做任何操作。\n\n#### 在托管内存中使用 Core Foundation\n\n在托管内存环境中，Core Foundation\
  \ 和 Objective-C 共享相同的引用计数机制。在这种环境中，`CFRetain()` 和 `CFRelease()` 等同于 `-[NSObject\
  \ retain]` 和 `-[NSObject release]`。\n\n处理已保留的 Core Foundation 类型的最简单方法是立即将其添加到自动释放池中。如果清单\
  \ 25-2 中的 `-uuid` 方法是为托管内存环境编写的，它将类似于清单 25-3 中的代码。\n\n***清单 25-3.** 返回自动释放的 Core\
  \ Foundation 引用*\n\n```\n- (NSString*)uuid\n{\n    CFStringRef cfString = CFUUIDCreateString(kCFAllocatorDefault,\
  \ uuid);\n    return [(NSString*)cfString autorelease];\n}\n```\n\n清单 25-3 中由 `-uuid`\
  \ 返回的对象是自动释放的，其行为与任何其他自动释放的字符串对象相同。第 24 章中描述的大多数托管内存模式同样适用于 Core Foundation 类型。\n\
  \n### 总结\n\n从 Objective-C 调用 C 函数非常简单，让您的代码可以直接访问基于 C 的解决方案。免费桥接使得处理 Core Foundation\
  \ 类型变得更加容易，允许您像处理 Objective-C 对象一样与许多 Core Foundation 类型交互。最常见的问题是匹配或调整两种语言的内存管理风格。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n---\n\n"
- "# 第 26 章 ■ 运行时\n\nObjective-C 应用程序的运行时环境具有一些您应该了解的属性。这些包括构成运行中应用程序的 Mac OS X 进程的信息、其环境变量、与其父进程的连接等。其中一些继承自操作系统，而另一些则是\
  \ Objective-C 和 Cocoa 框架的特性。许多内容已在其他章节中描述过。我们将在此与运行时环境的其他重要方面一起简要回顾它们。\n\n### 进程\n\
  \n在 Mac OS X 中，每个 Objective-C 程序都作为一个进程执行。从技术上讲，Java 字节码在抽象虚拟机中执行；但大多数虚拟机在进程中运行，并具有几乎相同的属性。每个进程包括：\n\
  \n- 一个内存地址空间\n- 一个或多个执行线程\n- 一组键/值对形式的环境变量\n- 一个命令行参数数组\n\n在 Java 中，虚拟机可以访问进程的本地地址空间，但您（程序员）不能。在\
  \ Objective-C 中，您可以直接访问分配给进程的逻辑地址空间。硬件在物理上禁止直接访问进程本地地址空间之外的内存地址。任何访问尝试都会导致内存地址违规，这通常会导致进程终止。访问进程外部的任何资源都需要通过向内核发送消息来实现。您几乎不会直接这样做，但您应该知道，所有与硬件或操作系统交互的\
  \ API 最终都会向内核发送消息。\n\n在 Mac OS X 中，进程与主线程是同义词。只要主线程存在，进程就存在，并在主线程终止时终止——或者使用 `exit()`\
  \ 等函数有意终止进程。您可以创建或销毁其他线程，如第 15 章所述。\n\n并非所有 Objective-C 代码都在其自己的进程中运行。Objective-C\
  \ 还可以用于开发框架和插件。这些是可以由其他应用程序加载并在该应用程序环境中执行的代码和资源包。例如，您可以通过向操作系统提供 Spotlight 插件包来为文档提供自定义索引。该包包含在\
  \ Spotlight 搜索引擎想要索引您文档类型内容时执行的代码。您的 Spotlight 插件中的代码在元数据导入器进程中运行，而不是在您的应用程序中。\n\
  \n除了环境变量、命令行参数和进程属性之外，还有一些零散的进程级属性，例如当前工作目录。所有这些都将在以下部分中讨论。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 26 章 ■ 运行时\n\n#### 环境\n\n每个进程都继承其父进程（创建您的进程的进程）定义的环境。环境是一组键/值字符串对，允许设置和其他信息从一个进程传递到另一个进程。在\
  \ Java 中，您可以使用 `java.lang.System.getenv()` 或 `java.lang.System.getenv(String)` 获取环境变量。在\
  \ Objective-C 中，向单例 `NSProcessInfo` 对象发送 `-environment` 消息，该对象通过 `[NSProcessInfo\
  \ processInfo]` 获取。\n\n#### 命令行参数\n\n从命令行启动的 Java 进程包含一个命令行参数数组，该数组传递给其 `main(String[])`\
  \ 方法。Objective-C 程序托管在 C 应用程序中，该应用程序在调用 `main(int, char**)` 时启动。您可以在 `main(...)`\
  \ 中拦截和解释命令行参数，或者稍后通过向单例 `NSProcessInfo` 对象发送 `-arguments` 来引用它们。\n\n#### 进程属性\n\n\
  \n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，对给定的英文文本进行专业、准确的中文翻译。\n\n\n## 第 26 章：运行时\n\
  \nJava 提供了一个获取属性的接口。这些属性类似于环境变量，但可以由类、虚拟机以及属性列表文件等来源提供。大多数动态的 Java 属性，例如当前工作目录，在\
  \ Objective-C 中是通过函数调用或对象消息获得的。用于存储默认值和用户偏好的属性在 Objective-C 中称为用户默认设置，本章后面将介绍一个用于处理它们的特定接口。\n\
  \n`表 25-1`列出了 Java 提供的几个更有趣的进程属性，以及如何在 Objective-C 中找到它们。\n\n**表 25-1.** 进程属性\n\n\
  | Java 属性 | Objective-C |\n|---|---|\n| `os.name` | `-[NSProcessInfo operatingSystemName]`\
  \ |\n| `os.arch` | 不适用 |\n| `os.version` | `-[NSProcessInfo operatingSystemVersionString]`\
  \ |\n| `user.name` | `NSUserName()` |\n| `user.home` | `NSHomeDirectory()` |\n|\
  \ `user.dir` | `-[NSFileManager currentDirectoryPath]` |\n\n`\"os.arch\"` 属性在 Objective-C\
  \ 中不适用，因为它是一种编译型语言。在特定处理器上执行的代码必须为该架构编译。存储可执行程序的二进制文件通常包含应用程序的多个版本，每个支持的架构对应一个。Xcode\
  \ 会自动为每个架构重新编译你的应用程序，然后将它们合并到一个可执行文件中。架构相关的特性，如指针大小和字节序，可以在编译时确定。你可以使用预处理器 `#if`\
  \ 指令来编译特定于某个处理器或架构的代码。\n\n`NSProcessInfo` 还提供有关进程、操作系统和硬件的其他有用信息。它会报告物理 RAM 的大小和\
  \ CPU 核心数量等信息。\n\n更精细的细节可以通过像 `sysctl(...)` 这样的 POSIX 函数获得。\n\n### 版本控制\n\n创建与框架或操作系统的多个版本兼容的应用程序可能是一项棘手的工作。Cocoa\
  \ 框架提供了许多版本控制和兼容性特性，使这变得更容易，或者至少是可管理的。\n\n#### 控制开发与部署版本\n\n应用程序项目的 Xcode 构建设置包含两个重要的设置：\n\
  \n- **基础 SDK (`SDKROOT`)** 定义了用于编译程序的头文件和框架的版本。\n- **部署目标 (`MACOSX_DEPLOYMENT_TARGET`)**\
  \ 定义了允许你的应用程序运行的最早操作系统版本。\n\n基础 SDK 选择了一组源头文件和库，你的应用程序将与之编译和链接。每个操作系统版本都定义了一组新的类、常量和数据类型。通过指定一个特定的基础\
  \ SDK，你将自己的代码限制在该 SDK 发布时可用的 API 上。你的应用程序不能使用新的类、方法或函数，因为（至少对编译器而言）这些函数不存在，你的代码将无法编译。\n\
  \n部署目标仅适用于 GUI 应用程序。它决定了允许你的应用程序启动的最早（最旧）操作系统版本。此构建设置的值存储在应用程序的包中，并在启动时由操作系统进行测试。\n\
  \n#### 测试类、方法和函数\n\n综合来看，上述两个构建设置定义了一个你的应用程序可以运行的操作系统版本范围。这称为跨版本开发。在这个范围内，较新的操作系统将实现一些早期系统没有的特定函数、类和方法。要使用其中任何一个，你的代码必须在运行时测试它们是否存在：\n\
  \n- 通过调用 `NSClassFromString()` 并检查结果是否为 `Nil` 来测试类的存在性。\n- 使用 `-respondsToSelector:`\
  \ 测试方法的存在性。\n- 通过将函数指针与 `NULL` 进行比较来测试函数的存在性。\n\n前两种技术使用了 Objective-C 的内省机制。最后一种测试适用于\
  \ C 函数，并通过一个称为弱链接的特性工作。弱链接是对一个符号的引用，该符号被假定为由操作系统定义。如果在加载应用程序时该符号实际上不存在，则该引用被设置为\
  \ `NULL`。与强链接相反，弱链接的引用不会阻止你的应用程序加载。你可以在运行时测试符号是否存在，如下所示：\n\n```\nif (NSDisableScreenUpdates\
  \ != NULL) { NSDisableScreenUpdates(); }\n```\n\n请记住，C 函数本身的名称（不带任何括号）会计算为该函数入口点的地址。关于跨版本开发设置和技术的完整描述，请参见《跨版本开发编程指南》。¹\n\
  \n### 软件包和捆绑包\n\n**软件包** 是相关文件的集合。从用户的角度来看，软件包就像一个单一的文件系统对象：一个应用程序、一个文档或一个插件组件。实际上，软件包是一个可以包含任意数量文件或子目录的目录。软件包的使用方式与\
  \ JAR 文件非常相似——用于组织一组相关文件并将它们保持在一起——区别在于在 Mac OS X 中，软件包的内容没有被压缩或归档。\n\n> **提示：**\
  \ 你可以直接从 Finder 浏览软件包的内容。选择一个软件包，然后 Control/右键单击该项目。在上下文弹出菜单中选择 **显示包内容**。\n\n**捆绑包**\
  \ 是一种具有预定义结构的软件包。Cocoa 应用程序、浏览器插件、自动操作、框架和 Core Image 滤镜只是操作系统定义的几种捆绑包类型。这些捆绑包类型中的任何一种都可以包含任意数量的支持文件：NIB\
  \ 文件、字符串属性、图像、声音、电影、HTML 文档、脚本、可执行实用程序，甚至其他捆绑包。你的捆绑包中包含哪些额外文件完全由你决定。\n\n你可以使用 `NSBundle`\
  \ 类来访问捆绑包并与之交互。基本的捆绑包功能及其组织方式已在第 20 章讨论过。要了解更多关于捆绑包的信息，请参考 `NSBundle` 类文档和《捆绑包编程指南》。²\n\
  \n并非所有程序类型都包含在捆绑包中。例如，命令行工具生成一个单一的可执行文件。额外的资源文件不能打包在命令行工具中。\n\n### 框架\n\n捆绑包的一种类型是**框架**。框架包含可供多个应用程序共享的编程资源的部署。一个框架可以包含共享库、Objective-C\
  \ 类、图像、声音、NIB 文件和其他资源。在这方面，框架大致相当于用于部署 Java 类文件、属性文件和其他资源库的 JAR 文件。它们可以包含以下任意或全部内容：\n\
  \n- 已编译函数和类的共享库\n- 定义框架 API 接口的头文件\n- 文档\n- 任意资源：NIB 文件、图像、本地化字符串、脚本、帮助文件等。\n\n\
  ---\n\n¹ Apple Inc., *跨版本开发编程指南*, [`developer.apple.com/documentation/DeveloperTools/Conceptual/cross_development/`](http://developer.apple.com/documentation/DeveloperTools/Conceptual/cross_development/),\
  \ 2006。\n\n² Apple Inc., *捆绑包编程指南*, [`developer.apple.com/documentation/CoreFoundation/Conceptual/CFBundles/`](http://developer.apple.com/documentation/CoreFoundation/Conceptual/CFBundles/),\
  \ 2005。\n\n\n\n所有这些组件都是可选的，允许灵活的部署方案。一个包含共享库但没有头文件的框架适合分发给广大受众。一个包含代码、头文件和文档的框架则是一个自包含的部署工具，程序员和最终用户都可以使用。Xcode\
  \ SDK 中包含的框架是特殊的框架，它们包含头文件和文档，但没有实际代码——即所谓的存根库。这些框架允许你开发使用系统框架的应用程序，而无需实际包含整个操作系统的副本。\n\
  \n框架具有一些非常有用的特性：\n\n-   框架代码的单个副本会被加载到内存中，并由所有使用该框架的应用程序共享。\n-   一个框架可以包含自身的多个版本。\n\
  -   框架使得将复杂的代码、资源和文档集合作为一个实体进行部署变得容易。\n-   框架可以自动加载，也可以通过编程方式加载。\n\n大多数项目在开发过程中会直接链接到框架。你将应用程序所需的框架添加到\
  \ Xcode 项目中，如图 26-1 所示。框架中的头文件和文档文件为程序员定义了其接口，而其库文件则用于链接应用程序。\n\n***图 26-1.** Xcode\
  \ 项目中的框架*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 运行时\n\n在运行时，框架会自动从多个预定义位置（最显著的是\
  \ `/System/Library/Frameworks` 和 `/Library/Frameworks`）加载，这与 Java 使用其类路径变量查找类的方式非常相似。或者，你也可以将框架嵌入到应用程序的包中，或通过编程方式定位和加载框架。要直接加载框架，请为框架的包目录创建一个\
  \ `NSBundle` 对象，并向其发送 `-load` 消息。这大致相当于创建一个 `java.lang.ClassLoader`。与 Java 不同，框架代码不会被垃圾回收。如果需要释放它，请向该包发送\
  \ `-unload` 消息。\n\n> **注意：** 尽管框架通常包含共享库，但加载框架更像是使用 `java.lang.ClassLoader`，而不是\
  \ `java.lang.Runtime.loadLibrary(String)` 方法。后者相当于 POSIX 函数 `dlopen(…)`。\n\n大多数时候你使用的是他人开发的框架，但你也可以开发并部署自己的框架。框架使得开发可重用的解决方案变得容易，这些解决方案将成为新应用程序的构建块，并与这些应用程序一起部署。如果你正在考虑开发自己的框架，请参考《框架编程指南》。\n\
  \n### 用户默认设置\n\n用户默认设置由多组分层的属性值组成，与 Java 属性非常相似。用户默认设置以属性列表字典的形式存储，因此它们只能包含属性值对象（`NSString`、`NSNumber`、`NSDate`、`NSData`、`NSArray`\
  \ 或 `NSDictionary`）。你使用用户默认设置的方式与使用 Java 属性值非常相似。用户默认设置还包含你应用程序的可编辑偏好设置。偏好设置会自动保存，并在你的应用程序下次执行时可用。\n\
  \n用户默认值按名称（键）存储在一个或多个域中。以下是主要域（按搜索顺序降序排列）：\n\n1.  命令行参数域\n2.  应用程序域\n3.  全局域\n4.\
  \  注册域\n\n你可以通过向单例对象 `NSUserDefaults`（通过 `[NSUserDefaults standardUserDefaults]`\
  \ 获取）请求来获取用户默认设置中的值。通用方法是 `-objectForKey:`，但还有其他消息可以返回相同值，但已转换或将转换为更方便的类型：\n\n`-stringForKey:`、`-boolForKey:`、`-integerForKey:`、`-floatForKey:`、`-dataForKey:`、`-stringArrayForKey:`、`-arrayForKey:`\
  \ 和 `-dictionaryForKey:`。用户默认设置会在常见表示形式之间进行转换。例如，将值为 `\"YES\"` 的字符串作为布尔值请求，将返回数字常量\
  \ `YES`。\n\n\n\n`(true)`。`Listing 26-1` 中的代码测试一个用户默认设置，以确定视图的绘制方式。\n\n3 苹果公司，*框架编程指南*，[`developer.apple.com/documentation/MacOSX/Conceptual/BPFrameworks/`](http://developer.apple.com/documentation/MacOSX/Conceptual/BPFrameworks/)，2006\
  \ 年。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 26 章 ■ 运行时\n\n\
  ### 清单 26-1. 读取用户默认设置\n\n```\nif ([[NSUserDefaults standardUserDefaults] boolForKey:@\"\
  ShowTerrainInMap\"]) {\n  [terrainMap draw];\n}\n```\n\n`NSUserDefaults` 会依次搜索每个域，查找指定键，并返回第一个包含该键的域中的值。在高层级域中设置的值会覆盖在较低层级域中设置的值。\n\
  \n命令行参数域是最高层级的域，其中填充了进程启动时命令行中包含的参数值。通常没有命令行参数，但您可以在开发过程中通过编辑应用程序可执行文件的启动参数来包含它们。命令行参数值的形式是\
  \ `-key value`。\n\n使用参数 `-ZombieNightVision NO` 启动应用程序，会在参数域中创建键/值对 `ZombieNightVision=\"\
  NO\"`。\n\n应用程序域用于存储应用的用户偏好设置。这是一个持久性域。也就是说，在此设置的值会自动保存到磁盘上的属性列表文件中，并在下次应用程序启动时自动重新加载。属性列表文件以应用程序的标识符命名，位于\
  \ `~/Library/Preferences` 目录中。第 20 章的 TicTacToe 应用程序将其用户默认设置存储在 `~/Library/Preferences/com.apress.learnobjc.TicTacToe.plist`\
  \ 文件中。\n\n> **提示** 您可以通过在 Interface Builder 中将视图（如复选框或文本字段）绑定到单例 `NSUserDefaultsController`\
  \ 的任意属性，来为简单的应用偏好设置创建用户界面。该对象是一个可绑定的控制器，其属性反映了用户默认设置的值。更改控制器的属性会在应用程序域中设置该值，并且该值会被保留。如果您更喜欢程序化方式而非\
  \ `清单 26-1` 中所示的语法，也可以使用 `NSUserDefaultsController` 进行程序化操作。\n\n全局域是另一个持久性域，但通常您不会自行更改它。该域包含适用于用户启动的所有应用程序的用户默认设置。这些设置包括用户的位置、时区、货币、时间和数字格式、首选字体等。它们通常由操作系统定义，并通过系统偏好设置进行配置。\n\
  \n最后，还有注册域。该域不是持久性的，并且除非您在程序初始化期间自行填充，否则它为空。它旨在作为默认用户默认设置的域。也就是说，当其他域都不包含某个键的值时，它会提供一个值。`清单\
  \ 26-2` 中的代码使用一些值初始化了注册域。如果其他域都不包含这些键的值，则会返回注册域中的值。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 清单 26-2. 在应用程序启动期间创建注册域\n\n```\n[[NSUserDefaults standardUserDefaults] registerDefaults:\n\
  \  [NSDictionary dictionaryWithObjectsAndKeys:\n    [NSNumber numberWithInt:999],\
  \ @\"MaximumZombies\",\n    [NSNumber numberWithBool:NO], @\"ZombiesCanWiggleEars\"\
  ,\n    [NSNumber numberWithBool:YES], @\"ShowTerrianInMap\",\n    @\"Bob\", @\"\
  GenericZombieName\", nil]\n];\n```\n\n将注册默认值硬编码的一种流行替代方案是将它们保存为应用程序 bundle 中的属性列表。在应用程序启动期间，加载一个包含属性列表中值的字典，并将其传递给\
  \ `-registerDefaults:`。这也使得属性列表可以轻松地针对不同语言进行本地化。\n\n您可以从 `NSUserDefaults` 类文档和 *Cocoa\
  \ 用户默认设置编程主题*[⁴] 中了解更多关于用户默认设置的信息。\n\n### isa 交换\n\nObjective-C 的一些“魔法”是通过一种称为 isa\
  \ 交换的技巧实现的。它的名字来源于它搅动或交换了定义对象行为的 `isa` 变量。\n\n通常，对象的 `isa` 变量在 `+alloc` 期间设置，并且永远不会改变。更改对象的\
  \ `isa` 变量实际上会更改对象的类，这定义了其结构以及它响应的所有消息。显然，您可以发现任意更改它可能会产生严重后果。\n\n有几种技术，特别是键值观察，利用对象类的可变性来精确替换特定方法的行为。以下是当您请求观察特定属性时，键值观察所做的操作：\n\
  \n1.  获取对象的类。\n2.  创建对象类的一个新子类。\n3.  用一个返回原始对象 Class 的方法覆盖 `-class` 方法。\n4.  覆盖原始类中所需的\
  \ setter 方法。\n5.  将对象的 `isa` 变量设置为步骤 2 中创建的新子类。\n\nObjective-C 类是使用 `objc_allocateClassPair()`\
  \ 以编程方式创建的（尽管 KVO 可能使用一个名为 `objc_duplicateClass()` 的私有函数）。一旦定义了空类，您就可以使用 `class_addMethod()`\
  \ 在类中添加或覆盖方法，使用 `class_addProtocol()` 使其符合某个协议，或者使用 `class_addIvar()` 定义实例变量。事实上，您可以以编程方式执行任何可以在\
  \ Objective-C 语言中定义的操作。\n\n完成后，对象的行为与之前完全相同，只是步骤 4 中覆盖的消息会调用 KVO 定义的方法，而不是原始类的方法。由于\
  \ KVO 也覆盖了 `-class` 方法，因此该对象仍然显示为其原始类。您需要查看原始的 `isa` 实例变量才能看到对象中的差异。\n\n[⁴]: 苹果公司，*Cocoa\
  \ 用户默认设置编程主题*，[`developer.apple.com/documentation/Cocoa/Conceptual/UserDefaults/`](http://developer.apple.com/documentation/Cocoa/Conceptual/UserDefaults/)，2007\
  \ 年。\n\nIsa 交换是一种强大的技术，但它相当技术性，不适合胆小的人。本节旨在提供信息，而不是鼓励您自己尝试。但是，如果您确实遇到强烈需要涉及此类对象变异的解决方案，它并非遥不可及。\n\
  \n### 64 位编程\n\n如果您已经涉足编程一段时间，您会看到几十年来微处理器寄存器的大小从 4 位增长到 32 位。我们现在不可避免地发现自己正处于从\
  \ 32 位处理器向 64 位处理器过渡的过程中。希望向 128 位处理器的过渡还需要一段时间。\n\n对于 Java 和 Objective-C 程序员来说，这一变革预示着新的内存容量和性能提升的前景。大多数面向对象的程序员在过渡期间几乎无事可做——除了更新他们的项目设置以生成应用程序的\
  \ 64 位版本。如果您完全使用 Objective-C 类、方法和属性进行编程，您会发现这两个环境之间几乎没有什么区别。对于 Objective-C 程序员来说，最大的变化是某些整数变量类型的大小变化，如\
  \ `表 26-2` 所列。\n\n**表 26-2.** 32 位和 64 位变量大小\n\n| 类型 | 32 位大小 | 64 位大小 |\n|------|-----------|-----------|\n\
  | `char` | 1 字节 | 1 字节 |\n| `short` | 2 字节 | 2 字节 |\n| `int` | 4 字节 | 4 字节 |\n|\
  \ `long` | 4 字节 | 8 字节 |\n| `NSInteger` | 4 字节 | 8 字节 |\n| `pointer` | 4 字节 | 8\
  \ 字节 |\n| `long long` | 8 字节 | 8 字节 |\n\n\n\n"
- "# 大多数整数类型的大小保持不变，但 `long int` 除外。在 32 位架构中，`long int` 的长度为 32 位；而在编译为 64 位架构时，其长度为\
  \ 64 位。更易记忆的 `NSInteger`（及 `NSUInteger`）类型定义与 `long int` 等价。你会注意到，大多数 Objective-C\
  \ 集合类使用 `NSUInteger` 值来计数和寻址元素，这使得 64 位架构中的集合能够包含超过 4,294,967,296 个元素——这是 32 位处理器地址空间无法实现的。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 26 章：运行时\n\n**提示** 一个常见错误是使用错误的格式字符串说明符来格式化\
  \ `int` 值。当编译为 64 位时，语句 `[NSString stringWithFormat:@\"%d\",(NSInteger)x]` 将无法正常工作；整数格式说明符（`\"\
  %d\"`）期望的是 32 位整数。务必将格式说明符（`\"%ld\"`）与其期望的类型（`long int`）匹配。\n\n指针变量大小的变化对于 Objective-C\
  \ 程序员来说通常不是问题。所有指针（对象指针、C 类型指针、结构体指针、`CFTypeRef` 等）都始终存储在指针变量中。这种大小变化是透明的，不同指针类型之间的强制类型转换也同样透明。\n\
  \n除了大小变化之外，64 位的 `long int`、`long long int` 和指针变量都从 4 字节对齐变为 8 字节对齐。变量的对齐方式决定了该变量倾向于被放置到的地址位置。8\
  \ 字节对齐意味着变量的地址应能被 8 整除。这主要影响结构体的组织，例如代码清单 26-3 所示的结构体。\n\n### 代码清单 26-3. 结构体中的变量对齐\n\
  \n```\n@interface Marker : NSObject {\n    int tag;\n    long long int position;\n\
  }\n@end\n```\n\n在 32 位架构中，代码清单 26-3 中 `tag` 和 `position` 变量的相对地址偏移量分别为 0 和 4。当编译为\
  \ 64 位架构时，相对偏移量将变为 0 和 8。变量的大小没有改变，但 `position` 整数的首选地址对齐方式从 4 字节变为 8 字节。编译器在这两个变量之间插入了\
  \ 4 个未使用的字节，以便将第二个变量对齐到 8 字节地址边界。这意味着，当编译为 64 位时，该对象在内存中的大小增加了 4 个字节，尽管变量的尺寸没有变化。\n\
  \n以下是一个简短的清单，列出了让你的代码在 32 位和 64 位架构中都能顺畅运行的最佳实践：\n\n*   切勿将指针值存储或传递给整型变量，反之亦然。\n\
  *   将返回的 `NSInteger` 值存储在 `NSInteger` 变量中。具体来说，`NSUInteger count = [collection count]`。\n\
  *   使用 `NSInteger` 值时，应使用对应的“整型”对象消息：使用 `-[NSCoder encodeInteger:forKey:]` 而非 `-[NSCoder\
  \ encodeInt:forKey:]`，使用 `-[NSString integerValue]` 而非 `-[NSString intValue]`，依此类推。\n\
  *   确保格式字符串说明符与正确的变量类型匹配。\n*   不要依赖或假设结构体的大小或组织方式。\n*   通常，应使用对象和属性进行设计，而非操作结构体和指针。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 26 章：运行时\n\n这些都是主要问题，但还有大量微小的细节。如果你正考虑编译\
  \ 64 位 Objective-C 代码，应先查阅《Cocoa 64 位迁移指南》。同时也可以阅读《64 位迁移指南》中列举的、你可能不想将应用转换为 64\
  \ 位的诸多原因。\n\n### 总结\n\n与试图抽象运行时环境许多细节的 Java 不同，Objective-C 应用以本地代码运行，并直接与操作系统 API\
  \ 交互。你可以使用内省（Introspection）技术在可能缺少新 API 和特性的旧版操作系统上运行应用。Cocoa 捆绑包和框架简化了复杂应用和库的部署，而用户默认设置则让管理可配置偏好和属性变得简单。只需注意一些细节，你就能开发出在最新一代\
  \ 64 位处理器上顺畅运行的应用。\n\n## 结语\n\n祝贺你自己。你已经学到了很多关于 Objective-C 的知识！而且不仅仅是基础——本书探讨了一些非常高级的技术。你已经了解了\
  \ Objective-C 和 Java 在处理基本类型、控制结构、类继承、协议（接口）、垃圾回收、归档（序列化）、异常、线程和集合方面有多么相似。你还了解了\
  \ Objective-C 在调用方法时的微妙差异——语法、技术和哲学层面。最重要的是，你探索了一些真正新颖的概念，比如类别（Categories）、键值观察（Key-Value\
  \ Observing）和类簇（Class Clusters）。你（希望！）已经接纳了一些新的设计模式，如代理（Delegates）、单例（Singletons）以及利用\
  \ `nil` 对象指针，并将其化为优势。你还了解了 Objective-C 如何拥抱模型-视图-控制器和懒加载等设计模式，同时在订阅者/提供者和工厂模式上采取了独特的方法。\n\
  \n当然，关于 Objective-C、类框架以及 C 语言，还有远比一本书能涵盖的更多的知识。但我真心希望你觉得这本书富有启发性，并能加速你掌握知识和技能，最终达成你的目标。Java\
  \ 和 Objective-C 都是优秀的语言。鉴于它们有诸多相似之处，你完全有能力精通两者——从而拓展你的视野和机遇。\n\n"
