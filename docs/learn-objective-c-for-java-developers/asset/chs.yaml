  \ 混合类型比较\n\n```\nint i = -3;\nunsigned int j = 3;\nif (i<j) { … } // 不可预测的条件\n```\n\
  \n大多数大小、索引和数组计数都是无符号的。在声明将用作集合索引的变量时，请声明为无符号整数。在其他几乎所有场合，都可以使用有符号整数。\n\n### 常量\n\
  \n常量是赋予给不变、已知值的名称。比起使用原始数字值（即使该值显而易见），采用符号化编程更为简单且信息量更大。\n\n现代的代码库和框架定义了数千个常量，但表\
