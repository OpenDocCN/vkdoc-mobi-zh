- "# 异常处理\n\n这严格用于调试，并允许你正常启动应用程序。如果未捕获的异常导致应用程序挂起，你仍然可以附加调试器到进程以调查原因，因为该进程（从技术上讲）仍在运行。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 14 章 异常处理\n\n### 表 14-2.\
  \ 进程挂起条件标志\n\n| 常量 | 效果 |\n|------|------|\n| `NSHangOnUncaughtExceptionMask` |\
  \ 如果遇到未捕获的异常，挂起进程。 |\n| `NSHangOnUncaughtSystemExceptionMask` | 如果发生系统事件，挂起进程。 |\n\
  | `NSHangOnUncaughtRuntimeErrorMask` | 如果发生运行时事件，挂起进程。 |\n| `NSHangOnTopLevelExceptionMask`\
  \ | 如果主运行循环遇到未捕获的异常，挂起进程。 |\n| `NSHangOnOtherExceptionMask` | 如果抛出任何其他类型的异常，挂起进程。\
  \ |\n\n清单 14-5 展示了一个应用程序的初始化代码，该程序希望记录所有未捕获的异常、系统事件和运行时事件。\n\n### 清单 14-5. 初始化未捕获异常处理\n\
  \n```objectivec\n#import <ExceptionHandling/NSExceptionHandler.h>\n\n@implementation\
  \ MyApplicationDelegate\n\n- (void)applicationWillFinishLaunching:(NSNotification*)notification\n\
  {\n    // Log all uncaught exceptions, but not low-level exceptions\n    [[NSExceptionHandler\
  \ defaultExceptionHandler] setExceptionHandlingMask:\n        NSLogUncaughtExceptionMask\n\
  \        |NSLogUncaughtSystemExceptionMask\n        |NSLogUncaughtRuntimeErrorMask\n\
  \        |NSLogTopLevelExceptionMask\n        /*|NSLogOtherExceptionMask*/\n   \
  \ ];\n}\n\n@end\n```\n\n### 遗留异常\n\nObjective-C 中的异常语法相对较新。在它被添加之前，Objective-C 语言没有直接支持异常。相反，异常处理由一组类和巧妙的预处理器宏提供。清单\
  \ 14-6 展示了遗留异常处理的样子。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第\
  \ 14 章 异常处理\n\n### 清单 14-6. 遗留异常处理\n\n```objectivec\nNS_DURING\n    NSLog(@\"%s\
  \ trying\",__func__);\n    [self thrower];\nNS_HANDLER\n    NSLog(@\"caught NSException:\
  \ %@\",localException);\n    [localException raise];\nNS_ENDHANDLER\n```\n\n遗留的`NS_DURING`、`NS_HANDLER`和`NS_ENDHANDLER`预处理器宏展开为使用\
  \ C 语言`longjmp(...)`函数创建必要执行流程控制的 C 代码。只有一个处理程序块，它捕获所有异常。变量`localException`包含捕获的异常。没有`finally`块。通过向`NSException`对象发送`-raise`消息来抛出异常。\n\
  \n表 14-3 展示了遗留异常语法及其现代等价物。\n\n### 表 14-3. 遗留和现代异常语法\n\n| 遗留语法 | 等价现代语法 |\n|---------|-------------|\n\
  | `NS_DURING` | `@try` |\n| `{` | `{` |\n| `NS_HANDLER` | `} @catch (NSException\
  \ *localException) {` |\n| `NS_ENDHANDLER` | `}` |\n| `[exception raise]` | `@throw\
  \ exception` |\n| `NS_VALUERETURN(value,type)` | `return (value)` |\n| `NS_VOIDRETURN`\
  \ | `return` |\n\n如果你想要从`NS_DURING`和`NS_HANDLER`之间的代码块返回，则必须使用`NS_...RETURN`宏。\n\
  \n如果你的 Objective-C 编译器启用了现代异常处理（很可能如此），表 14-3 中的预处理器宏将展开为现代语法。因此，对于为遗留异常编写的代码来说，没有惩罚或不兼容性，你可以自由地混合使用两者。\n\
  \n一个小的区别是：`-raise`方法执行`@throw`，但现代的`@throw`指令不会向被抛出的对象发送`-raise`消息。这可能对已覆写`-raise`的子类有影响。\n\
  \n### 断言\n\n断言是一种编程技术，允许你定义自己的运行时异常。断言是一条语句，它确认（断言）程序员期望为真的条件确实为真。如果该语句被发现为假，则会抛出一个`NSInternalInconsistencyException`异常。清单\
  \ 14-7 中的断言确保从集合中获取的对象的类是预期的类型。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 14 章 异常处理\n\n\n\n## 使用断言确认类成员身份\n\n`NSDictionary *dictionary = …`  \n`NSNumber\
  \ *value = [dictionary objectForKey:@\"Value\"];`  \n`NSAssert([value isKindOfClass:[NSNumber\
  \ class]], @\"wrong class\");`\n\n失败断言输出：\n\n```\n*** Assertion failure in -[Tosser\
  \ catcher], Tosser.m:45\n*** Terminating app due to uncaught exception 'NSInternalInconsistencyException',\
  \ reason: 'wrong class'\n```\n\n断言是将 Java 的一些严谨性引入 Objective-C 的实用方法。Objective-C\
  \ 在赋值时不会测试对象的类，但断言可以做到。Objective-C 不会检查 C 数组语句中的索引是否越界，但断言可以做到。简而言之，几乎所有你期望 Java\
  \ 为你执行的运行时检查，都可以通过断言来表达。\n\n断言可以用于任何预期的程序条件。如果某个参数应为非 `nil`，请断言它；如果某个整数值应为正数，请断言它。\n\
  \n> **注意**：断言也是异常，与其他异常类似。大多数 Java 运行时异常是未检查的，并且通常不被捕获。如果你希望在遇到异常时应用程序终止，请小心不要在\
  \ catch 块中吞掉异常。请参见清单 14-8 中的 `RethrowAssertion` 宏。\n\n断言一个特别吸引人的特性是，它们可以统一关闭。Cocoa\
  \ 框架提供的断言宏（见表 14-4）都基于 `NS_BLOCK_ASSERTIONS` 预处理器宏进行条件定义。如果定义了该宏（值无关紧要），所有 `NSAssert…`\
  \ 宏都会被重新定义为空。这意味着你的断言语句实际上会消失，仿佛从未存在过。你可以在应用程序中填充数千条在开发期间活跃的断言语句，然后在编译发布版本时将它们全部关闭。这通常通过在\
  \ Release 配置的 Preprocessor Macros 构建设置中定义 `NS_BLOCK_ASSERTIONS` 宏来实现。在开发期间，你的应用程序会检查任何意外条件，而发布版本则没有多余的代码和每个断言的性能开销。\n\
  \n**表 14-4. 标准断言宏**\n\n| 宏 | 描述 |\n|---|---|\n| `NSAssert(condition, description)`\
  \ | 测试一个条件，如果为 false，则抛出带有描述的异常。 |\n| `NSAssert1(condition, format, arg1)` | 如果条件为\
  \ false，则通过使用一个参数格式化字符串来创建描述，并抛出异常。 |\n| `NSAssert2(condition, format, arg1, arg2)`\
  \ | 如果条件为 false，则通过使用两个参数格式化字符串来创建描述，并抛出异常。 |\n| `NSParameterAssert(condition)`\
  \ | 如果条件为 false，则抛出带有描述（给定条件不成立）的异常。 |\n\n实际上有六个 `NSAssert` 宏：`NSAssert`、`NSAssert1`、`NSAssert2`、`NSAssert3`、`NSAssert4`\
  \ 和 `NSAssert5`。它们仅在格式字符串后的参数数量上有所不同。（预处理器宏不支持可变参数。）这些断言只能在 Objective-C 方法的主体中使用。一组并行的\
  \ `NSCAssert…` 宏可用于 C 函数。\n\n我强烈建议定义你自己的断言宏。简洁、具体的断言语句更有可能被使用。清单 14-8 分享了我最喜欢的一些自定义断言宏以及使用它们的代码。\n\
  \n## 清单 14-8. 自定义断言宏\n\n```\n#if !defined(NS_BLOCK_ASSERTIONS)\n\n#define RethrowAssertion(EXCEPTION)\
  \ \\\nif ([[EXCEPTION name] isEqualToString:NSInternalInconsistencyException]) \\\
  \n    [EXCEPTION raise]\n\n#define AssertObjectIsClass(OBJECT,CLASS) \\\ndo { \\\
  \n    if (![OBJECT isKindOfClass:[CLASS class]]) { \\\n        [[NSAssertionHandler\
  \ currentHandler] handleFailureInMethod:_cmd \\\n            object:self \\\n  \
  \          file:[NSString stringWithUTF8String:__FILE__] \\\n            lineNumber:__LINE__\
  \ \\\n            description:@\"object isa %@@%p; expected %s\", \\\n         \
  \   [OBJECT className],OBJECT,#CLASS]; \\\n    } \\\n} while(NO)\n\n#define AssertObjectIsNilOrClass(OBJECT,CLASS)\
  \ \\\ndo { \\\n    if ((OBJECT!=nil) && ![OBJECT isKindOfClass:[CLASS class]]) {\
  \ \\\n        [[NSAssertionHandler currentHandler] handleFailureInMethod:_cmd \\\
  \n            object:self \\\n            file:[NSString stringWithUTF8String:__FILE__]\
  \ \\\n            lineNumber:__LINE__ \\\n            description:@\"object isa\
  \ %@@%p; expected %s\", \\\n            [OBJECT className],OBJECT,#CLASS]; \\\n\
  \    } \\\n} while(NO)\n\n#define AssertObjectRespondsTo(OBJECT,MESSAGE) \\\ndo\
  \ { \\\n    if (![OBJECT respondsToSelector:@selector(MESSAGE)]) { \\\n        [[NSAssertionHandler\
  \ currentHandler] handleFailureInMethod:_cmd \\\n            object:self \\\n  \
  \          file:[NSString stringWithUTF8String:__FILE__] \\\n            lineNumber:__LINE__\
  \ \\\n            description:@\"object %@@%p does not respond to %s\", \\\n   \
  \         [OBJECT className],OBJECT,#MESSAGE]; \\\n    } \\\n} while(NO)\n\n#define\
  \ AssertNotNil(OBJ) NSAssert1(OBJ!=nil,@\"%s is nil\",#OBJ)\n#define ParameterAssert\
  \ NSParameterAssert\n\n#else\n\n#define RethrowAssertion(EXCEPTION)\n#define AssertObjectIsClass(OBJECT,CLASS)\n\
  #define AssertObjectIsNilOrClass(OBJECT,CLASS)\n#define AssertObjectRespondsTo(OBJECT,MESSAGE)\n\
  #define AssertNotNil(OBJ)\n#define ParameterAssert NSParameterAssert\n\n#endif\n\
  \n// 确保委托已设置并实现了非正式协议\nAssertNotNil(delegate);\nAssertObjectRespondsTo(delegate,lookupPartNumber:);\n\
  PartNumber part = [delegate lookupPartNumber:inventoryCode];\nNSAssert(part>=100000&&part<=999999,@\"\
  invalid part number\");\nRecord *partRecord = [PartsDatabase recordForPartNumber:part];\n\
  AssertObjectIsClass(partRecord,Record);\n```\n\n你可以用其他宏来定义这些宏——比如 `AssertNotNil`\
  \ 和 `ParameterAssert` 宏——或者将它们定义为调用单例 `NSAssertionHandler`，该处理程序用于抛出断言异常。在设计宏时，始终确保它们在被展开时像一个单一的\
  \ C 语句一样工作。\n\n这些宏使用了多个高级预处理器特性：\n\n-   行尾的单个 `\\` 将 `#define` 语句延续到下一行，就像它被写在一行上一样。\n\
  -   宏可以采取带参数的 C 函数形式。这些参数创建了在宏主体展开期间存在的临时宏定义。语句 `#define DO(THIS) [self THIS]` 会将代码\
  \ `DO(something)` 替换为 `[self something]`。\n-   宏展开是递归的。给定 `#define A B` 和 `#define\
  \ B(X) return X`，语句 `A(3)` 会被替换为 `B(3)`，然后再替换为 `return 3`。定义顺序并不重要。\n-   宏文本中的特殊语法\
  \ `#TOKEN` 会被替换为包含 `TOKEN` 文本的 C 字符串常量。`#define RETURN_STR(S) return (#S)` 会将源代码\
  \ `RETURN_STR(100-1)` 替换为 `return (\"100-1\")`。这对于将条件语句之类的东西转换为描述条件的字符串特别方便。\n-\
  \   特殊宏 `__FILE__` 和 `__LINE__` 由编译器生成，计算结果为正在编译的源文件的文件名和行号。`__func__`、`__DATE__`\
  \ 和 `__TIME__` 也非常有用。`__func__` 会被替换为当前的 Objective-C 方法名（作为 C 字符串）。`__DATE__` 和\
  \ `__TIME__` 会展开为编译执行的日期和时间。\n\n我通常将清单 14-8 中的宏更进一步，定义一组仅在开发期间编译的宏（`DevAssert`、`DevAssertObjectIsClass`、…）、一组在开发和\
  \ Beta 测试期间编译的宏（`BetaAssert`、`BetaAssertObjectIsClass`、…）以及一组始终编译的宏（`RelAssert`、`RelAssertObjectIsClass`、…）。这使我能够逐步使用断言，以安全性为代价，生成逐步变小且更快的应用程序版本。\n\
  \n## 异常的替代方案\n\n\n\n"
- "# 错误处理\n\n一些 Objective-C API 和许多程序员遵循传统的 C 语言错误处理模式：测试函数或方法的返回值以确定成功或失败。清单 14-9\
  \ 展示了一些典型示例。这里所采用的编程理念是，异常应保留用于运行时错误（如索引越界、无效对象、缺少应用程序资源、内存不足）以及其他应在开发过程中从应用程序中消除的编程错误。可预见的、合理预期可能发生的失败（如文件未找到、数据库为空、名称重复）应使用错误代码或错误对象来处理。本节描述了不使用异常处理错误的最常用技术，并稍后解释如何将两者结合。\n\
  \n## 清单 14-9. 错误处理示例\n\n```objectivec\n// Simple Error\nNSString *imagePath = [[NSBundle\
  \ mainBundle] pathForImageResource:@\"picture.png\"];\nif (imagePath==nil) {\n \
  \   NSLog(@\"missing image resource\");\n    return;\n}\n\n// POSIX Error\nint fd\
  \ = open(\"filename\",O_RDONLY);\nif (fd<0) {\n    NSLog(@\"open() failed with error\
  \ %d\",errno);\n    return;\n}\n\n// Core Foundation Error\nQTUUID quickTimeUUID;\n\
  OSErr err = QTCreateUUID(&quickTimeUUID,0);\nif (err!=noErr) {\n    NSLog(@\"could\
  \ not create UUID, error %d\",err);\n    return;\n}\n\n// Cocoa Error\nNSError *error\
  \ = nil;\nNSDictionary *attributes;\nattributes = [[NSFileManager defaultManager]\
  \ attributesOfItemAtPath:@\"filename\"\n                                       \
  \                      error:&error];\nif (error!=nil) {\n    NSLog(@\"could not\
  \ get attributes of file: %@\",[error localizedDescription]);\n    [self presentError:error];\n\
  \    return;\n}\n```\n\n#### 简单错误\n\n当任何函数或方法未能实现其目标并返回空值时，就会发生简单错误。清单 14-9 中的 `-pathForImageResource:`\
  \ 消息是一个很好的例子。该方法返回所需图像文件的路径，如果找不到此类文件，则返回 `nil`。你的代码应该测试结果——除非你设计代码使用了第 7 章描述的缺席行为——并提供默认值、返回\
  \ `NSError`、抛出异常或引发断言。\n\n## POSIX 错误代码\n\n大多数 BSD 和 POSIX 函数返回一个值来指示函数的成功或失败。在清单\
  \ 14-9 中，`open(...)` 函数如果成功则返回一个文件描述符整数，如果失败则返回一个负值。描述失败原因的代码从线程局部变量 `errno` 中读取。注意，`errno`\
  \ 实际上不是一个变量，而是一个预处理器宏，它展开为一个函数调用以获取错误代码。该变量仅保证在下一个 POSIX 函数被调用之前包含错误代码，因此在失败后应立即获取代码并保存。\n\
  \n## Core Foundation 错误代码\n\n许多 Core Foundation 函数直接向调用者返回结果代码。结果代码的类型为 `OSError`\
  \ 或 `OSStatus`，通常是负数。函数的成功由值 `noErr` 指示，如清单 14-9 所示。由于此类函数返回错误代码，因此使用指向变量的指针来返回任何附加值。\n\
  \n#### Cocoa 错误\n\n现代 Cocoa 类和函数在操作未能成功完成时倾向于返回 `NSError` 对象。消息的发送者总是包含一个指向 `nil`\
  \ `NSError` 指针变量的指针，如清单 14-9 所示。如果操作失败，该方法会创建一个新的 `NSError` 对象，并将其地址存储在发送者的变量中。发送者可以检查其变量以查看接收者是否返回了\
  \ `NSError`。当失败细节将呈现给用户时，鼓励使用 `NSError`。\n\n`NSError` 类包含许多设计特性，使其成为设计良好且灵活的错误处理系统中不可或缺的一部分。将\
  \ `NSError` 对象集成到你的应用程序中并非易事，但如果你的目标是提供一致、可本地化、模块化和灵活的错误显示与恢复，则强烈推荐这样做。\n\n本书篇幅有限，无法深入\
  \ `NSError` 对象的所有细节，但以下各节将提供足够的概述，让你能够理解其实用性。在应用程序中设计 `NSError` 管理之前，请仔细阅读《Cocoa\
  \ 错误处理编程指南》。\n\n##### 错误域\n\n每个 `NSError` 对象都有一个域。该域影响着其属性（特别是数字错误代码）的解释方式。例如，POSIX\
  \ 和 Foundation 函数都返回一个整型错误值来描述失败。域决定了应使用哪一组常量来解释该值。主要的域列于表 14-5 中。鼓励你为应用程序特定的错误定义自己的域。\n\
  \n**表 14-5. Cocoa 错误域**\n\n| 域 | 描述 |\n| --- | --- |\n| `NSMachErrorDomain` | 内核返回的错误代码。\
  \ |\n| `NSPOSIXErrorDomain` | POSIX 和 BSD 函数返回的错误代码。 |\n| `NSOSStatusErrorDomain`\
  \ | Core Foundation 函数返回的错误代码。 |\n| `WebKitErrorDomain` | WebKit 生成的错误。 |\n| `NSURLErrorDomain`\
  \ | 与 URL 相关的错误。 |\n| `NSXMLParserErrorDomain` | XML 解析器错误。 |\n| `NSCocoaErrorDomain`\
  \ | 所有不属于以上特定域的 Cocoa 框架错误。 |\n\n##### 自定义与显示\n\n`NSError` 对象的主要作用之一不仅仅是处理错误（异常可以很好地做到这一点），而是向用户显示错误并根据用户的输入采取行动。该过程的前两步通过响应者链执行。响应者链是视觉层次中通向当前活动界面元素的组件链。它在第\
  \ 20 章中有完整描述。\n\n要将错误显示给用户，请将 `NSError` 传递给响应者链中的任何对象——最好是叶组件——通过向其发送 `-presentError:`\
  \ 消息。响应者将依次通过 `-willPresentError:` 消息将 `NSError` 传递给响应者链中的每个对象。这给了你的应用程序每一层一个机会来拦截错误并将其替换为更具体的内容。例如，一个“添加配乐”按钮可以将一个通用的“文件未找到”\
  \ `NSError` 替换为“配乐不可用。您想选择另一首歌曲还是使用默认配乐？”的错误对象。在所有响应者对象处理完错误后，最终的错误会以模态对话框的形式呈现给用户。如果错误发生在窗口上下文中，推荐的消息是\
  \ `-presentError:modalForWindow:delegate:didPresentSelector:contextInfo:`，它会将错误以模态表单的形式附加到窗口上。\n\
  \n##### 本地化\n\n`NSError` 类提供了一种本地化错误消息的机制。本地化的消息可以存储在 `NSError` 的 `userInfo` 字典中，使用预定义的键，也可以通过重写其方法来动态生成。使用哪种方法取决于你的需求。表\
  \ 14-6 列出了将显示给用户的四种消息以及返回它们的方法。每个属性访问器的默认实现是从错误的 `userInfo` 字典中检索第三列的值。\n\n**表 14-6.\
  \ `NSError` 本地化方法和 `userInfo` 键**\n\n| 对话框文本 | `NSError` 属性 | `NSError` `userInfo`\
  \ 键 |\n| --- | --- | --- |\n| 错误描述 | `localizedDescription` | `NSLocalizedDescriptionKey`\
  \ |\n| 失败原因 | `localizedFailureReason` | `NSLocalizedFailureReasonErrorKey` |\n\n\
  \n\n"
- "# NSLocalized\n\n简要说明`FailureReason`（`FailureReasonErrorKey`）对应的失败原因。可选属性。并非所有错误对话框都会显示该属性。\n\
  \n`-localizedRecoverySuggestion`（`NSLocalizedRecoverySuggestion`，`RecoverySuggestionErrorKey`）：描述用户可采取哪些操作来从错误中恢复的句子。可选属性。\n\
  \n`-localizedRecoveryOptions`（`NSLocalizedRecoveryOptions`，`RecoveryOptionsErrorKey`）：一个按钮名称数组，对应恢复建议中描述的用户选项。如果为`nil`，则唯一选项为“OK。”\n\
  \n一个`NSError`对象可以提供恢复尝试对象，并且如果错误包含恢复选项，则应提供该对象。`-presentError:`消息会将用户的恢复选择传递给恢复尝试对象，该对象需执行用户的意愿。恢复尝试对象必须实现非正式协议`NSErrorRecoveryAttempting`中的某个方法。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 14 章 ■ 异常处理\n\n### 结合错误与异常\n\
  \n学术界关于异常与传统错误处理孰优孰劣的争论仍将持续。与此同时，我个人非常推崇将两者结合。`NSError`对象在需要本地化的复杂应用程序中具有明显优势，而\
  \ Java 风格的异常处理在简化代码和执行流程方面则优势显著。清单 14-10 展示了如何将传统的 C 语言错误处理、`NSError`对象和异常结合起来。\n\
  \n**清单 14-10.** 混合错误处理\n\n```\n@try {\n    const char *path = …\n    int fd = open(path,\
  \ O_RDONLY);\n    if (fd < 0) {\n        NSString *errorPath = [NSString stringWithCString:path];\n\
  \        NSDictionary *info = [NSDictionary dictionaryWithObject:errorPath forKey:@\"\
  Path\"];\n        NSError *error = [NSError errorWithDomain:NSPOSIXErrorDomain code:errno\
  \ userInfo:info];\n        @throw error;\n    }\n    …\n    close(fd);\n} @catch\
  \ (NSError *error) {\n    [self presentError:error];\n}\n```\n\n### 总结\n\nObjective-C\
  \ 的异常处理强大、简单，与 Java 提供的异常处理不相上下。通过大量使用断言，可以约束 Objective-C 的许多许可性。POSIX、BSD、Core\
  \ Foundation 以及大多数 Cocoa 方法仅在（被视为）运行时错误或编程错误时才使用异常。你可以接纳这一理念，或者通过将异常与传统的设计模式结合，继续使用异常进行编程。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 15 章 ■ 线程\n\nJava 是最早直接支持线程和线程同步的编程语言之一。这是一个非常有远见的决定。多核、多处理器计算机系统已成为常态，而非例外。高效的多线程编程现在对于有效的程序开发至关重要，并且这一趋势仍在加速。\n\
  \n线程和信号量在概念上很简单，Java 与 Objective-C 之间的高层差异微不足道。Objective-C 还广泛使用了运行循环，它可以将线程转变为事件处理器。除了语言内置的基本`@synchronized`指令外，Cocoa\
  \ 框架还提供了许多额外的同步工具，每个工具都针对特定需求而量身定制。最后，还有一些类可以执行延迟操作、为您管理独立的线程以及执行定时任务，从而减轻您创建和管理自己线程的负担。\n\
  \n本章首先描述如何在 Objective-C 中创建、运行和销毁线程。同时解释运行循环，并说明为什么需要创建一个运行循环以及如何创建。之后，详细介绍同步多个线程以及使代码线程安全的多种方式。最后，介绍一些有用的类，它们可以使线程管理更简单，甚至可能无需管理。\n\
  \n### 线程 API\n\n线程管理和控制以 Objective-C 类`NSThread`为核心，与 Java 的`java.lang.Thread`类非常相似。对应的方法列于表\
  \ 15-1 中。\n\n**表 15-1.** 等效的线程方法\n\n| Java (`java.lang.Thread`) | Objective-C (`NSThread`)\
  \ | 描述 |\n|---|---|---|\n| `currentThread()` | `+currentThread` | 当前执行线程的线程对象 |\n\
  | `start()` | `-start` | 启动一个线程 |\n| `run()` | `-main` | 要执行的代码 |\n| `isAlive()`\
  \ | `-isExecuting`, `-isFinished` | 判断线程是否已启动或已结束 |\n| `sleep(long)` | `+sleepUntilDate:`,\
  \ `+sleepForTimeInterval:` | 将线程挂起一段时间 |\n| `getPriority()` | `+threadPriority`\
  \ | 线程的优先级 |\n| `setPriority(int)` | `+setThreadPriority` | 更改线程的优先级 |\n| `getName()`\
  \ | `-name` | 线程的名称 |\n| `setName(String)` | `-setName:` | 设置线程的名称 |\n| `getStackTrace()`\
  \ | `+callStackReturnAddresses` | 获取堆栈上的返回地址数组 |\n\n以下是 Objective-C 与 Java 中线程的关键区别：\n\
  \n- Objective-C 中没有线程组。\n- Objective-C 接口没有提供获取现有线程列表的方法。\n- 没有安全模型。某些操作（例如设置线程优先级）只能从当前运行的线程执行，而在\
  \ Java 中则可以在任意线程上执行。\n- 不能中断线程。`NSThread`确实提供了一个可以设置和测试的`canceled`属性，但取消线程不会解除其阻塞状态。\n\
  - 没有守护线程。只要主线程在运行，Objective-C 进程就会持续运行，并且当进程终止时，所有线程都会终止。\n- 没有`join()`函数，但可以使用`NSConditionLock`轻松实现相同的功能，本章稍后将对此进行说明。\n\
  - 没有`yield()`方法或任何等效方法。\n\nObjective-C 线程的生命周期与 Java 中的大致相同。您创建一条线程，该线程将执行一个对象的方法。当方法返回时，线程被终止并销毁。与共享给其他线程的任何对象的交互都必须使用信号量进行协调。\n\
  \n如果您对线程的需求仅此而已，请阅读“启动线程”和“线程同步”部分。如果您想考虑已经为您管理线程的现成类，请查看“操作”部分。本章其余部分主要探讨线程中较为深奥的细节，这些细节对大多数程序员来说关系不大。\n\
  \n### 启动线程\n\n在 Objective-C 中启动新线程甚至比在 Java 中还要简单——考虑到 Java 中创建线程已经相当简单，这足以说明问题。在\
  \ Objective-C 中创建线程有三种方法：\n\n- 通过发送消息`+detachNewThreadSelector:toTarget:withObject:`创建并立即启动一个线程。该消息指定了包含线程代码的对象和方法，以及一个可选参数，该参数将在线程开始执行时传递给线程。\n\
  - 使用`-initWithTarget:selector:object:`创建一个新的`NSThread`对象。这与第一种技术相同，区别在于线程不会启动。您可以在使用`-start`消息启动线程之前自定义该线程对象。\n\
  - 定义您自己的`NSThread`子类，重写`-main`方法，并使用`-init`创建您的实例。这相当于继承`java.lang.Thread`并重写`run()`。当对象收到`-start`消息时，它会创建一个新线程，并在新线程中执行其`-main`方法。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n> **注意** 创建并返回`NSThread`对象的构造器是操作系统中相当新的添加。在早于\
  \ 10.5 版本的 Mac OS X 中，只有`+detachNewThreadSelector:toTarget:withObject:`可以创建新线程。您不能继承`NSThread`或在启动前自定义线程。\n\
  \n\n\n"
- "# Objective-C 线程\n\nObjective-C 线程的创建十分简便，因为线程的代码可以是任意对象的任意方法。在 Java 中，包含代码的对象必须实现\
  \ `Runnable` 接口，并在其 `run()` 方法中实现代码。而 Objective-C 仅有的要求是：包含线程代码的方法需接受一个对象参数（可忽略）并返回\
  \ void。清单 15-1 展示了如何启动一个线程。\n\n**清单 15-1.** 启动一个线程\n\nJava\n\n```java\npublic class\
  \ Runner implements Runnable\n\n{\n\n    public void run()\n\n    {\n\n        System.out.println(\"\
  使用线程运行。\");\n\n    }\n\n}\n\n…\n\nRunner runner = new Runner();\n\nThread thread\
  \ = new Thread(runner);\n\nthread.start();\n```\n\nObjective-C\n\n```objc\n@implementation\
  \ Runner\n\n- (void)runMe:(id)ignored\n\n{\n\n    NSLog(@\"使用线程运行。\");\n\n}\n\n\
  @end\n\n…\n\nRunner *runner = [Runner new];\n\n[NSThread detachNewThreadSelector:@selector(runMe:)\n\
  \n                     toTarget:runner\n\n                   withObject:nil];\n\
  ```\n\n**主线程**\n\n主线程是进程创建时启动的第一个线程，具有特殊性。所有用户输入和事件都会被发送到主线程上运行的事件循环。所有用户界面的更改都必须在主线程上进行；用户界面框架并非线程安全。从任何实际意义上讲，应用程序的进程就是主线程。当主线程结束时，进程会终止——并立即杀死所有其他线程。\n\
  \n有许多方法可以引用、定位、检测或返回主线程。这些方法允许你在必要时轻松定位主线程或其事件循环。\n\n**管理线程**\n\n关于管理线程的最佳建议是“不要管理”。线程对微管理反应不佳，这会使你的代码变得脆弱且可移植性差。最重要的是，不要试图猜测内核的线程调度器，也不要试图强制其表现出特定行为。随着内核线程调度变得越来越复杂，用于操作运行线程的应用程序编程接口数量已经减少。例如，Objective-C\
  \ 没有 `yield()` 的等价方法，而 `java.lang.Thread` 中的 `stop()`、`suspend()` 和 `resume()` 方法均已弃用。\n\
  \n线程应围绕定义清晰、自洽的任务来组织。它们应尽量减少通信，并使用信号量与其他线程协调工作。除此之外，你只需让线程在有工作时运行，没有工作时挂起即可。如果你发现自己不得不在代码中插入睡眠语句或创建信号量来强制内核切换任务，那么你应该重新审视任务的设计。\n\
  \n话虽如此，在某些特殊情况下，你可能需要更改任务属性或使其休眠。接下来将说明如何使线程休眠。线程属性将在后续小节中讨论。\n\n**使线程休眠**\n\n使线程休眠一段时间是少数保留下来的线程状态操作之一。\n\
  \n使线程休眠会挂起该线程，直到指定的时间间隔过去。之后，该线程会再次变为“可运行”状态，内核会将其重新加入正在运行的线程轮转中。换句话说，并不保证线程在时间间隔过后会立即恢复运行；只是在时间间隔过去之前它不会再次运行而已。\n\
  \n`NSThread` 的 `+sleepUntilDate:` 和 `+sleepForTimeInterval:` 方法会导致当前线程无条件地休眠给定的时间长度。这可以是一个未来的\
  \ `NSDate` 对象，也可以是一个以秒为单位的 `NSTimeInterval` 值。日期和时间间隔使用双精度浮点值来表示秒，因此可以指定纳秒级的时间间隔。内核不保证时间的精确度，只保证在该时间过去之前线程不会再次执行。\n\
  \n\n\n还有许多方法（大部分将在后续章节中介绍）会条件性地让线程休眠一段时间。这些消息接受一个 `NSDate` 对象，用于指定未来放弃等待条件并恢复执行的时间。最简单的例子是\
  \ `-[NSLock lock]` 和 `-[NSLock lockBeforeDate:(NSDate*)limit]` 这两个方法。两者都尝试获取 `NSLock`\
  \ 信号量上的锁。`-lock` 方法会一直等待直到获得锁。相比之下，`-lockBeforeDate:` 方法会在获得锁或达到 `NSDate` 指定的时间时返回。\n\
  \n> **提示：** 要创建一个代表未来 2.5 秒时间的 `NSDate` 对象，请使用 `[NSDate dateWithTimeIntervalSinceNow:2.5]`。要获取一个永远不会被达到的\
  \ `NSDate` 对象，请使用 `[NSDate distantFuture]`。\n\n当线程需要按固定时间间隔执行操作时，应将其置于休眠状态。清单 15-2\
  \ 展示了一个简单的类，它运行一个“心跳”线程，该线程每秒最多更新进度指示器两次。\n\n**清单 15-2. 心跳线程**\n\n```objc\n@interface\
  \ Process : NSObject\n\n@property double progress;\n\n@end\n\n@interface Heartbeat\
  \ : NSObject {\n    NSThread *thread;\n    Process *monitor;\n    NSProgressIndicator\
  \ *indicator;\n}\n\n+ (Heartbeat*)startHeartbeatProcess:(id)process\n          \
  \        withIndicator:(NSProgressIndicator*)progress;\n- (void)stop;\n- (void)heartbeatThread:(id)ignored;\n\
  - (void)updateIndicator;\n\n@end\n\n…\n\n@implementation Heartbeat\n\n+ (Heartbeat*)startHeartbeatProcess:(id)process\n\
  \                  withIndicator:(NSProgressIndicator*)progress\n{\n    Heartbeat\
  \ *heartbeat = [Heartbeat new];\n    heartbeat->monitor = process;\n    heartbeat->indicator\
  \ = progress;\n    heartbeat->thread = [[NSThread alloc] initWithTarget:heartbeat\n\
  \                                                selector:@selector(heartbeatThread:)\n\
  \                                                  object:nil];\n    [heartbeat->thread\
  \ start];\n    return heartbeat;\n}\n\n- (void)stop\n{\n    [thread cancel];\n}\n\
  \n- (void)heartbeatThread:(id)ignored\n{\n    while (![thread isCancelled]) {\n\
  \        [self performSelectorOnMainThread:@selector(updateIndicator)\n        \
  \                       withObject:nil\n                            waitUntilDone:YES];\n\
  \        [NSThread sleepForTimeInterval:0.5];\n    }\n}\n\n- (void)updateIndicator\n\
  {\n    [indicator setDoubleValue:monitor.progress];\n}\n\n@end\n```\n\n消息 `+startHeartbeatProcess:withIndicator:`\
  \ 会创建一个 `Heartbeat` 对象，并在新线程中启动其 `-heartbeatThread:` 方法。大约每半秒钟，该线程就会将一个 `-updateIndicator`\
  \ 消息排入主线程执行队列。线程会一直运行，直到 `Heartbeat` 对象收到 `-stop` 消息。\n\n请注意，清单 15-2 中的示例远非线程的最有效用法。虽然它能工作，但本章末尾的“定时器”部分提供了一个更合理的解决方案。\n\
  \n#### 线程属性\n\n线程对象拥有许多关联的、能提供相关信息的属性。尽管存在关于过度线程管理的注意事项，但仍有一些线程属性你可能需要修改。有些属性只能在线程启动前设置，而另一些则只能在启动后设置。\n\
  \n##### 信息\n\n线程信息属性列在表 15-2 中。你可以使用它们来获取相关的 `NSThread` 对象或检查线程的状态。类方法返回全局值或关于当前执行线程的信息。实例方法可以从任何线程发送给任何\
  \ `NSThread` 对象。\n\n**表 15-2. 信息性线程属性**\n\n| `NSThread` 方法 | 描述 |\n| :--- | :---\
  \ |\n| `+currentThread` | 当前执行线程的 `NSThread` 对象 |\n| `+mainThread` | 主线程的 `NSThread`\
  \ 对象 |\n| `+isMainThread` | 如果当前线程是主线程，则返回 `YES` |\n| `+isMultiThreaded` | 如果除了主线程之外，还有另一个线程曾经由\
  \ `NSThread` 启动，则返回 `YES` |\n| `-isMainThread` | 如果该线程对象代表主线程，则返回 `YES` |\n| `-isExecuting`\
  \ | |\n\n\n\n"
- "# 线程状态\n\n如果线程已启动且尚未结束，则返回 `YES`。\n\n`-isFinished`\n\n如果线程已执行并退出，则返回 `YES`。\n\n\
  `-isCancelled`\n\n如果线程曾收到过 `-cancel` 消息，则返回 `YES`。\n\n##### 线程特定值\n\n有时你需要一个全局变量，但仅限于特定线程的上下文中。每个\
  \ `NSThread` 对象都有一个 `threadDictionary` 属性专门用于此目的。该属性是一个可变字典，你的应用程序可以用它来存储所需的任何值。清单\
  \ 15-3 中的示例为单个线程创建了一个 `NSNotificationCenter` 对象。\n\n**清单 15-3.** 存储线程特定值\n\n```\n\
  NSMutableDictionary *threadLocal = [[NSThread currentThread] threadDictionary];\n\
  [threadLocal setObject:[NSNotificationCenter new]\n               forKey:@\"NotificationCenter\"\
  ];\n```\n\n其目的是创建一个通知中心，用于在线程内发送和观察通知。任何对象都可以通过以下语句获取其线程特定的通知中心：\n\n```\n[[[NSThread\
  \ currentThread] threadDictionary] objectForKey:@\"NotificationCenter\"]\n```\n\n\
  ##### 优先级\n\n可以使用 `+[NSThread setThreadPriority:]` 消息来更改当前运行线程的优先级。优先级是一个介于 `0.0`\
  \ 和 `1.0` 之间的浮点值，`1.0` 为最高优先级。你可以通过 `+[NSThread threadPriority]` 获取线程的当前优先级。典型的默认优先级是\
  \ `0.5`。实际优先级范围（如果内核认可的话）取决于操作系统和内核。\n\n内核除了倾向于将更多 CPU 时间分配给优先级较高的线程外，几乎不保证线程的优先级。请明智地使用线程优先级。\n\
  \n##### 栈大小\n\n另一个很少使用的属性是线程的栈大小，该属性必须在线程启动前设置。这要求你先创建一个 `NSThread` 对象，设置其栈大小，然后使用\
  \ `-start` 消息启动线程。栈大小必须以 4K（4096）字节的偶数倍设置，当前默认为 512K。\n\n以下两种情况你可能需要更改栈大小：\n\n-\
  \ 线程发生栈溢出。在这种情况下，请在启动线程前增加其栈大小。\n- 你创建了大量不占用太多栈空间的线程，并且分配给每个线程的栈空间影响了地址空间的分配。请减少默认栈大小，以便每个线程分配更少的内存。\n\
  \n##### 名称\n\n每个线程还有一个可变的 `-name` 属性，它是一个任意的 `NSString` 值。操作系统在很大程度上会忽略线程名称，因此你可以将其用于任何目的。\n\
  \n### 终止线程\n\n线程在以下情况下停止运行：\n\n- 线程的 `-main` 方法或创建线程时指定的方法返回\n- 线程代码抛出一个未捕获的异常\n\
  - 进程终止\n\n在前两种情况下，线程会被销毁，其资源会被回收。第 14 章中描述的未捕获异常处理程序会处理未捕获的异常。`NSThread` 对象无法重新启动。如果你想启动另一个线程，请创建一个新的\
  \ `NSThread` 对象。\n\n当进程终止时，所有线程都会被放弃，无论其状态如何。这与 Java 不同，Java 的虚拟机会一直运行到所有非守护线程完成。如果你创建了后台线程，则无需安排它们完成即可终止应用程序。相反，如果你的后台线程需要在应用程序终止前完成，则必须通过信号量或其他方式进行协调。\n\
  \n### 运行循环\n\n运行循环是 Cocoa 框架不可分割的一部分。它们是应用程序、用户界面事件、分布式对象、定时器、延迟对象消息和分布式通知的主要事件分发机制。\n\
  \n运行循环是一种事件处理服务，它同步处理来自一个或多个异步源的事件。事件源被称为输入源，有几种预定义的类型：\n\n- 用户界面事件（鼠标事件、键盘事件等）\n\
  - 延迟方法调用（`-performSelector:withObject:afterDelay:` 等）\n- 分布式对象消息\n- 定时器事件\n\n还有其他输入源，并且你也可以开发自己的输入源，但这属于特殊情况。\n\
  \n每个线程都关联一个（可选的）运行循环对象。代码 `+[NSRunLoop currentRunLoop]` 会返回与当前线程关联的单个运行循环对象，而 `+[NSRunLoop\
  \ mainRunLoop]` 会返回主线程的运行循环。运行循环是延迟创建的；如果线程没有运行循环对象，则在发送消息时会创建一个。与主线程关联的运行循环称为主运行循环。\n\
  \n> **警告：** `NSRunLoop` 不是线程安全的。对运行循环对象的操作应在其所属的线程内进行。\n\n运行循环非常高效。它们会阻塞线程，直到其中一个输入源上出现事件。然后运行循环会立即处理该事件，采取适当的操作，然后“循环”等待下一个事件。运行循环还会处理周期性的清理工作，例如管理内存和栈对象垃圾回收。你可以将线程的控制权完全交给运行循环，或者编写自己的循环来保持运行循环工作。\n\
  \n#### 启动运行循环\n\n通常你不需要启动运行循环。如果你在编写标准应用程序，`NSApplication` 对象会自动启动主运行循环。主运行循环会处理你应用程序中的所有重要事件。模态对话框和\
  \ `NSConnections` 也会启动运行循环。\n\n在以下情况下，你需要启动自己的运行循环：\n\n- 你创建了一个需要触发定时器或向对象发送延迟消息的新线程。\n\
  - 你在自己的线程中提供分布式对象，或者通过引用传递了可能从远程进程接收异步消息的对象。\n- 你正在编写一个不使用应用程序框架的命令行工具或守护进程，并且需要在主线程上处理延迟方法调用、定时器事件或分布式对象。（第三种情况只是前两种情况的特例，因为命令行工具的主线程不会自动启动运行循环。）\n\
  \n运行循环需要输入源，并且只有在有输入源时才会运行。要启动运行循环，你必须首先为其提供一个或多个输入源。否则，运行循环将不执行任何操作并立即结束。\n\n-\
  \ 创建并调度一个定时器（本章稍后介绍）将为当前运行循环创建一个定时器输入源。\n- 将延迟方法调用加入队列会向运行循环添加一个消息分发源。\n- 一个 `NSConnection`\
  \ 会将其通信端口添加到当前运行循环。\n- 主线程拥有 Objective-C 框架已创建的几个输入源。在主线程上启动的运行循环将始终启动并永远运行。\n\n\
  通过启动运行循环，你基本上将线程的控制权交给了运行循环。线程会阻塞，直到从输入源接收到事件。要启动运行循环并让它永远运行（或者至少在有输入源时运行），请执行以下操作：\n\
  \n```\n[[NSRunLoop currentRunLoop] run];\n```\n\n消息 `-runUntilDate:` 是一个轻微变体，它可以在指定的时间段内运行运行循环。你可以用此方法执行周期性操作，但使用定时器更可取。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n"
- "# 线程\n\n若要更深入一些，可以使用类似于代码清单 15-4 所示的代码。这第二个示例使用你自己的循环来“驱动”运行循环。`-runMode:beforeDate:`\
  \ 消息会使线程挂起，直到处理完单个事件或到达 `beforeDate` 指定的时间。这允许你的代码在每次事件之间或定期执行操作，并且你还可以测试任何可能用于停止运行循环或线程的全局条件。\n\
  \n**代码清单 15-4.** 启动一个运行循环\n\n```\nstatic BOOL keepRunning = YES;\n…\nwhile (keepRunning\n\
  \       && [[NSRunLoop currentRunLoop] runMode:NSDefaultRunLoopMode beforeDate:[NSDate\
  \ distantFuture]]) {\n  …\n}\n```\n\n最后，`-[NSConnection runInNewThread]` 便捷函数完成了启动分布式对象服务器所需的所有工作：它创建并启动一个新线程，将\
  \ `NSConnection` 的端口添加到新线程的运行循环中，并向该运行循环发送一条 `-run` 消息。\n\n#### 运行循环模式\n\n运行循环在模式下运行。运行循环的输入源具有模式。运行循环只处理与其当前模式一致的输入源中的事件。通常你不需要了解关于运行循环模式的任何信息，只需要知道它们存在即可。基本的运行循环模式在表\
  \ 15-3 中列出。\n\n**表 15-3.** 运行循环模式\n\n| 模式 | 描述 |\n|------|-------------|\n| `NSDefaultRunLoopMode`\
  \ | 这是默认模式，也是不接受模式参数的运行循环方法使用的模式。 |\n| `NSModalPanelRunLoopMode` | 只处理与模态对话框相关的事件。\
  \ |\n| `NSEventTrackingRunLoopMode` | 只处理与活跃鼠标追踪相关的事件。 |\n| `NSConnectionReplyMode`\
  \ | 只处理分布式对象回复事件。 |\n\n运行循环模式用于推迟那些不适合当前环境的事件。\n\n顶层运行循环总是在 `NSDefaultRunLoopMode`\
  \ 模式下运行，处理所有事件。如果用户界面导致显示一个模态对话框，AppKit 框架将启动一个在 `NSModalPanelRunLoopMode` 模式下运行的嵌套运行循环。这会忽略所有与模态对话框无关的事件，实质上冻结了应用程序的其余部分。类似地，当鼠标点击/拖动开始时，它会使用\
  \ `NSEventTrackingRunLoopMode` 进行追踪。当你向一个远程对象发送消息时，会使用 `NSConnectionReplyMode`。远程对象会启动一个嵌套运行循环，忽略所有排队的输入源事件，只处理来自远程对象的回复。\n\
  \n#### 停止运行循环\n\n停止运行循环实际上有点棘手。之前，我提到运行循环只要有输入源就会一直运行。这没错，但各种晦涩的特性会向你的运行循环添加自定义输入源。许多这样的输入源会持续很长时间，甚至永远存在，从而使运行循环无限期地保持活动状态。最直接的解决方案是设计你的线程，使其不需要停止运行循环。让线程在不做任何有用的事情时空闲，并在应用程序终止时消失。对于分布式对象，当你想要停止共享你的根分布式对象时，请关闭\
  \ `NSConnection` 对象。你始终可以重新注册连接或设置一个新的根对象来恢复该服务。\n\n如果你必须停止一个运行循环，有三种基本技术：\n\n-\
  \ 使用类似于代码清单 15-4 中的代码来定期检查运行循环是否应该停止。问题是循环在每个事件之后或超时之后只会执行一次。你不希望将超时时间设置得太短——这构成了轮询——因为这会浪费资源。\n\
  - 调用 Core Foundation 函数 `CFRunLoopStop()`，并将通过 `-[NSRunLoop getCFRunLoop]` 获取的 `CFRunLoopRef`\
  \ 值传递给它。\n- 创建一个自定义的运行循环输入源，并将其与代码清单 15-4 中的技术结合使用。自定义输入源的事件处理器可以设置一个标志，指示运行循环应该停止，这将立即导致\
  \ `-runUntilDate:` 返回，然后你的外层循环就可以退出。\n\n#### 自定义运行循环\n\n`NSRunLoop` 类是对 Core Foundation\
  \ 运行循环函数和类型的一个简单封装。\n\n如果你想更深入地研究运行循环，可能开发你自己的输入源，请阅读《线程编程指南》¹ 中的“运行循环管理”部分。\n\n\
  ### 线程通知\n\n`NSThread` 发送两个通知，在表 15-4 中列出。有关通知的更多信息，请参见第 18 章。\n\n**表 15-4.** 线程通知\n\
  \n| 通知 | 描述 |\n|--------------|-------------|\n| `NSThreadWillExitNotification`\
  \ | 在线程代码返回之后，但在线程被销毁之前发送。此通知会发送给即将被销毁的线程上的所有观察者。 |\n| `NSWillBecomeMultiThreadedNotification`\
  \ | 在进程中创建第一个新的（非主）线程之前发送给所有观察者。该通知在主线程上发送，并且只发送一次。 |\n\n回到第 7 章，我介绍了一个可以在线程安全环境中选择性运行的\
  \ FIFO 类。让我们稍微修改一下这个类——使其真正自动化——通过重写其 `-init` 方法并添加一个通知观察者，如代码清单 15-5 所示。\n\n**代码清单\
  \ 15-5.** 对自动线程安全 FIFO 类的补充\n\n```objc\n@implementation AutoSafeFIFO\n\n- (id) init\n\
  {\n  self = [super init];\n  if (self != nil) {\n    stack = [NSMutableArray new];\n\
  \    if ([NSThread isMultiThreaded]) {\n      [self makeThreadSafe];\n    } else\
  \ {\n      NSNotificationCenter *center = [NSNotificationCenter defaultCenter];\n\
  \      [center addObserver:self\n                selector:@selector(willBecomeMultiThreadedNotification)\n\
  \                    name:NSWillBecomeMultiThreadedNotification\n              \
  \    object:nil];\n    }\n  }\n  return self;\n}\n\n- (void)willBecomeMultiThreadedNotification:(NSNotification*)notification\n\
  {\n  [self makeThreadSafe];\n}\n\n…\n@end\n```\n\n对象的构造器会判断应用程序是否已经在多线程下运行。如果是，它会使自身成为线程安全的。如果不是，它会订阅\
  \ `NSWillBecomeMultiThreadedNotification`。如果在 FIFO 创建后的任何时间创建了第二个线程，FIFO 对象会自动切换到线程安全模式。\n\
  \n### 线程同步\n\n两个或多个独立线程对对象的并发访问，在几乎所有编程语言中都带来一系列相同的问题。Java 和 Objective-C 都通过 `@synchronized`（`synchronized`）指令提供了语言支持。任何标记为\
  \ `@synchronized` 的代码块都会被保护起来，防止同时被多个线程执行。\n\n本节将回顾 Objective-C 中的同步支持。除了 `@synchronized`\
  \ 指令之外，Cocoa 框架还提供了几个实用程序类，它们实现了不同类型的互斥信号量、一组用于组织并发任务的类以及定时器。\n\n#### `@synchronized`\
  \ 指令\n\nObjective-C 的 `@synchronized` 指令与 Java 的 `synchronized` 关键字几乎完全相同，只有一个很小的例外：`@synchronized`\
  \ 不能用作方法修饰符。要获得等效的功能，请使用 `@synchronized(self)` 作为方法的最外层代码块，如代码清单 15-6 所示。\n\n**代码清单\
  \ 15-6.** 同步方法\n\n**Java**\n\n```java\npublic class Timing\n{\n  public synchronized\
  \ void safe( )\n  {\n    // 线程安全代码\n  }\n}\n```\n\n**Objective-C**\n\n```objc\n\
  @interface Timing : NSObject\n- (void)safe;\n@end\n\n@implementation Timing\n- (void)safe\n\
  {\n  @synchronized(self) {\n    // 线程安全代码\n  }\n}\n@end\n```\n\n除了这个微小的限制之外，你可以像在\
  \ Java 中使用 `synchronized` 一样使用 `@synchronized`。\n\n#### 互斥信号量对象\n\n¹ Apple 公司，《线程编程指南》，http://developer.apple.com/documentation/Cocoa/Conceptual/Multithreading/，2008\
  \ 年。\n\n\n\nJava 5.0 引入了一系列新的并发流程控制类，包括各种互斥信号量、队列、资源计数器等。Objective-C 一直拥有`NSLock`、`NSRecursiveLock`和`NSConditionLock`类。操作系统的较新版本增加了`NSOperation`用于管理复杂的任务集。`NSOperation`将在下一节讨论。\n\
  \n这三个`NS…Lock`类各自提供了一种不同类型的互斥信号量，简称 mutex。它们都通过获取锁来工作，这大致相当于进入一个`@synchronized`代码块。所有其他尝试获取同一对象锁的线程将被挂起，直到原始锁被释放。一旦信号量解锁，其他线程中的一个将获得锁并恢复执行。\n\
  \n所有互斥信号量类都有几个共同点：\n\n- 它们都遵循`NSLocking`协议，该协议定义了基本的`-lock`和`-unlock`方法。\n- 它们都实现了`-lockBeforeDate:`和`-tryLock`方法。\n\
  - 它们都实现了`-name`和`-setName:`方法。\n\n`-tryLock`和`-lockBeforeDate:`消息尝试获取锁，如果成功则返回`YES`。`-tryLock`立即返回，而`-lockBeforeDate:`会挂起，直到获取锁或`NSDate`对象指定的时间到来。这是使用`NS…Lock`对象相比`@synchronized`指令的显著优势之一。\n\
  \n最后，你可以出于任何原因给你的锁命名。\n\n#### NSRecursiveLock\n\n`NSRecursiveLock`对象的行为与`@synchronized`块非常相似。`NSRecursiveLock`是线程之间的互斥信号量，但在单个线程内，它可以被锁定任意多次。锁在初始的`-lock`消息期间被获取一次，相当于进入一个`@synchronized`块。之后在同一个线程上发送的`-lock`消息会递增一个计数器。一旦锁为每个`-lock`消息接收到一个`-unlock`消息，锁就会被释放。\n\
  \n一个显著的区别是，`@synchronized`块会在重新抛出异常之前自动捕获异常并释放锁。如果你在可能抛出异常的代码周围使用`NSRecursiveLock`对象，请确保捕获异常并清理你的锁。\n\
  \n#### NSLock\n\n`NSLock`是最简单的互斥信号量，只实现了基本的`-lock`、`-tryLock`、`-lockBeforeDate:`和`-unlock`方法。在`@synchronized`指令被添加之前编写的\
  \ Objective-C 代码很可能使用`NSLock`对象而不是`@synchronized`块，尽管`@synchronized`的行为更接近于`NSRecursiveLock`。\n\
  \n> **注意：** `NSLock`必须始终从锁定它的同一个线程解锁。一些程序员为了试图实现跨线程同步，会在同一个线程上两次锁定一个`NSLock`对象——导致死锁——然后通过从另一个线程解锁该对象来释放它。这不能保证有效，并可能导致致命的程序错误。正确的解决方案是使用`NSConditionLock`，稍后描述。\n\
  \n`NSLock`的主要优势在于速度和简单性。与`NSRecursiveLock`不同，一个`NSLock`在再次解锁之前只能被获取一次。考虑清单 15-7\
  \ 中的代码。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 清单 15-7. 递归互斥信号量\n\
  \n```\n@interface ZombieController : NSObject {\n    NSMutableArray *nearbyZombies;\n\
  \    double totalDamage;\n    NSLock *lock;\n}\n- (void)inflictDamage:(double)damage\
  \ onZombieAtIndex:(NSUInteger)index;\n- (void)detonateFlashBomb;\n@end\n\n@implementation\
  \ ZombieController\n- (id)init\n{\n    self = [super init];\n    if (self != nil)\
  \ {\n        lock = [NSLock new];\n        …\n    }\n    return self;\n}\n\n- (void)inflictDamage:(double)damage\
  \ onZombieAtIndex:(NSUInteger)index\n{\n    [lock lock];\n    Zombie *zombie = [nearbyZombies\
  \ objectAtIndex:index];\n    [zombie inflictDamage:damage];\n    totalDamage +=\
  \ damage;\n    [lock unlock];\n}\n\n- (void)detonateFlashBomb\n{\n```\n\n\n\n```\
  \  \n// 对所有附近的僵尸造成 10 点伤害  \nNSUInteger i;  \n\n[lock lock];  \n\nfor (i=0; i<[nearbyZombies\
  \ count]; i++) {  \n[self inflictDamage:10.0 onZombieAtIndex:i];  \n}  \n\n[lock\
  \ unlock];  \n}  \n\n@end  \n```  \n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\
  \  \n\n## 第 15 章 ■ 线程  \n\n清单 15-7 中的代码在收到 `detonateFlashBomb` 消息时会发生死锁（即卡死，永远无法继续运行）。`detonateFlashBomb`\
  \ 中的 `[lock lock]` 语句会获取 `NSLock`，从而阻止其他线程执行该方法，直到该方法执行完毕。当对象向自身发送 `inflictDamage:onZombieAtIndex:`\
  \ 方法时，第二次尝试获取锁会使线程永久挂起，因为它要等待自己释放最初的锁——而这一释放永远不会发生。  \n\n可以通过将 `NSLock` 替换为 `NSRecursiveLock`，或者重写代码使用\
  \ `@synchronized` 指令来修复此问题。  \n\n## NSConditionLock  \n\n`NSConditionLock` 类的作用类似于\
  \ `NSLock`，但增加了一个条件属性。该条件是一个任意的整型状态值。当你请求获取对象上的锁时，可以指定必须满足的条件值，锁才会被获取。这提供了一种简单、灵活且高效的方式来协调线程间的状态信息或同步事件。例如，`NSThread`\
  \ 没有类似 Java 的 `join()` 方法，但使用 `NSConditionLock` 对象可以轻松实现这一功能，如清单 15-8 所示。  \n\n\
  ### 清单 15-8. 执行 `join()` 操作  \n\n**Java**  \n\n```java  \npublic class Party implements\
  \ Runnable {  \n\n    public static void main(String[] args) {  \n        Party\
  \ party = new Party();  \n        Thread thread = new Thread(party);  \n\n     \
  \   try {  \n            System.out.println(\"Party starting\");  \n           \
  \ thread.start();  \n            thread.join();  \n            System.out.println(\"\
  Party is over\");  \n        } catch (InterruptedException e) {  \n            e.printStackTrace();\
  \  \n        }  \n    }  \n\n    public void run() {  \n        System.out.println(\"\
  partying...\");  \n    }  \n}  \n```  \n\n**Objective-C**  \n\n```objc  \n@interface\
  \ Party : NSObject {  \n    NSConditionLock *joinLock;  \n}  \n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\
