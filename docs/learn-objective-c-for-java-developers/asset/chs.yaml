  \n以下是 `Matrix` 中的改动：\n\n-   公有的 `Matrix(…)` 构造函数被改为受保护，并由一个公有的静态工厂方法 `makeMatrix(…)`\
  \ 所取代。任何需要创建 `Matrix` 对象的客户端代码都必须重写，改为调用 `Matrix.makeMatrix(…)` 而非 `new Matrix(…)`。\n\
  -   `makeMatrix(…)` 工厂方法会利用旧 `isIdentity()` 测试的静态版本，来确定矩阵中的值是否描述一个单位矩阵。如果确实如此，工厂方法便创建并返回一个\
  \ `IdentityMatrix` 实例；否则，它创建一个 `Matrix` 对象。\n-   `multiply(Matrix)` 方法经过重新设计，会调用右操作数对象的受保护方法\
  \ `leftMultiply(Matrix)`。这使得 `Matrix` 的子类无论作为等式中的左矩阵还是右矩阵，都能够拦截乘法运算。\n\n现在创建了一个\
  \ `IdentityMatrix` 子类，如清单 22-5 所示。\n\n**清单 22-5. Java 的 IdentityMatrix 类**\n\n```\n\
