  name\"` 的通知的注册。                   |\n\n在上面的第二个面板窗口示例中，观察者已注册接收两个特定通知，且均来自同一特定提供者。消息\
  \ `[notificationCenter -removeObserver:self name:nil object:paletteWindow]` 会移除这两个注册，因为两者都指定了相同的提供者。但是，消息\
