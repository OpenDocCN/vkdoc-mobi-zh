  \"\", lastWord);\n    return 0;\n}\n```\n\n## 清单 13-5. 迎宾演示的输出\n\n**Java GreeterImpl：**\n\
  ```\n$ java com.apress.java.rmi.GreeterImpl\n正在启动迎宾服务，地址为 rmi://localhost/JavaGreeter\n\
  迎宾器 com.apress.java.rmi.GreeterImpl 被请求执行 sayHello()\n迎宾器 com.apress.java.rmi.GreeterImpl\
