  \ object:nil]` 只会移除一个注册。\n\n在垃圾回收内存环境中，通知中心对观察者持有弱引用。一旦您的观察者被遗忘并被回收，它实际上就会从其通知中心移除。因此，在您的对象可以被回收之前，并不需要发送\
  \ `[[NSNotificationCenter defaultCenter] removeObserver:self]`。但是，如果存在一个明显的时机，您的对象应该在此后停止接收通知，那么将其从通知中心移除是恰当且可取的。\n\
  \n### 通知队列\n\n\n\n## 排版后\n\n`NSNotificationQueue`对象管理一个尚未投递的通知队列。`NSNotificationQueue`对象（或简称通知队列）允许你将同步的通知中心转变为异步的通知服务。通知被投递到通知队列中，该队列将在未来的某个时间将它们传递给其通知中心进行分发。\n\
  \n每个通知队列都附属于一个现有的通知中心。它不会改变通知中心的行为。通知队列将通知放入缓冲区，然后使用当前的运行循环（run loop）稍后将其出队并投递到其通知中心。每个线程都有一个默认的通知队列，你也可以根据需要创建额外的队列。你可以创建多个共享同一个通知中心的队列；请记住，从通知中心的角度来看，队列只是另一个通知来源。\n\
  \n通知队列具有几个有用的特性：\n\n- 队列中的通知可以以不同程度的紧急程度进行投递。\n- 相似的通知可以被合并（coalesced），以便在生成多个通知但尚未投递时，观察者只收到一个通知。\n\
  - 可以将未投递的通知从队列中移除。\n\n以下章节描述了从队列中排队、合并和移除通知的过程。\n\n■ 注意事项 通知队列需要正在运行的运行循环才能正常工作。如果你的线程未使用运行循环，则无法使用该线程的通知队列。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 18 章 ■ 提供者/订阅者模式**\n\n\
  #### 排队一个通知\n\n排队一个通知与直接将通知投递到通知中心并没有太大区别。首先，你必须为队列提供一个`NSNotification`对象——没有便捷方法可以为你创建一个。其次，你必须指定其紧急程度，称为其投递样式（posting\
  \ style），并且可选地指定它应如何与队列中已有的相似通知进行合并。合并将在下一节中描述。\n\n要将*清单 18-1*中的`Thermometer`类改为使用通知队列而不是通知中心，请将`-setTemperature:`方法替换为*清单\
  \ 18-3*中的代码。\n\n**清单 18-3. 排队的温度通知**\n\n```\n- (void)setTemperature:(float)newTemp\n\
  \n{\n\nif (temperature!=newTemp) {\n\ntemperature = newTemp;\n\nNSNumber *tempValue\
  \ = [NSNumber numberWithFloat:temperature]; NSDictionary *info = [NSDictionary dictionaryWithObject:tempValue\
  \ forKey:@\"Temperature\"];\n\nNSNotification *n = [NSNotification notificationWithName:TempDidChange\
  \ object:self\n\nuserInfo:info];\n\n[[NSNotificationQueue defaultQueue] enqueueNotification:n\n\
  \npostingStyle:NSPostASAP];\n\n}\n\n}\n```\n\n一个通知对象被创建并放入队列中。它将在下一次机会时被运行循环从队列中取出，并投递到默认的通知中心。有三种可能的投递样式，列于*表\
  \ 18-3*中。\n\n**表 18-3. 通知队列投递样式**\n\n| 样式 | 描述 |\n|------|------|\n| `NSPostASAP`\
  \ | 通知将在下一次机会时由运行循环投递，与其他常规运行循环事件一起处理。这是典型的投递样式。 |\n| `NSPostWhenIdle` | 通知将留在队列中，直到运行循环空闲。也就是说，运行循环没有其他等待立即分发的事件。\
  \ |\n| `NSPostNow` | 同步投递通知。这与直接将通知投递到通知中心相同，不同之处在于队列可能首先执行通知合并。 |\n\n现在，`Thermometer`类将通知排队，以便在未来的某个时间点异步投递。在异步设计中，提供者更需要在通知的`userInfo`字典中包含相关信息（例如当前温度值），这一点甚至更为重要。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 18 章 ■ 提供者/订阅者模式**\n\n\
  \n\n当通知到达时，`Thermometer` 的状态可能与其发送通知时的状态不同。\n\n以相同投递样式推送的多个通知将按照入队顺序依次传递。\n\n####\
  \ 通知合并\n\n当你将通知加入队列时，可以选择性地指定一个合并掩码和一个运行循环模式。合并掩码决定该通知如何与队列中已有的类似通知进行匹配。匹配标准与请求通知时使用的相同：通知必须与当前队列中任意通知的名称、发送者或两者兼匹配。匹配条件是通过对\
  \ `NSNotificationCoalescingOnName` 或 `NSNotificationCoalescingOnSender` 中的一个或两个进行逻辑或运算形成的。如果该通知与队列中的其他通知匹配，则这些通知会被移除，并由新通知替换。同样，我们通过将\
  \ `-enqueueNotification:postingStyle:` 消息替换为代码清单 18-4 中的代码来修改 `Thermometer` 类。\n\
  \n**代码清单 18-4.** 合并后的温度通知\n\n```\n[[NSNotificationQueue defaultQueue] enqueueNotification:n\n\
  \                                  postingStyle:NSPostWhenIdle\n               \
  \                   coalesceMask:(NSNotificationCoalescingOnName|NSNotificationCoalescingOnSender)\n\
  \                                      forModes:nil];\n```\n\n现在，温度变化事件会被推入队列，只有当运行循环空闲时才会传递给它们的观察者。如果在第一个通知传递之前，来自同一\
  \ `Thermometer` 对象的第二个或第三个温度变化通知被发出，则较早的那些通知会被丢弃。最终，只有最后一个发出的通知会被发送给观察者。\n\n`forModes:`\
  \ 参数让你可以指定通知传递时的运行循环模式。通常这是 `nil` 或 `NSDefaultRunLoopMode`。如果你希望通知在特定模式下传递（例如，仅在运行循环处理模态对话框事件时），可以使用此参数。有关运行循环模式的更多信息，请参阅第\
  \ 15 章的“运行循环”部分。如果你想指定运行循环模式但不进行合并，可以传递常量 `NSNotificationNoCoalescing`。\n\n####\
  \ 通知出列\n\n如果你后来改变了对某个通知的主意，并且它尚未被传递，则可以从队列中删除它。向通知队列发送一条带有你要移除的通知以及常量 `NSNotificationNoCoalescing`\
  \ 的 `-dequeueNotificationsMatching:coalesceMask:` 消息即可。如果改为传递“通知合并”部分中描述的合并掩码组合，则所有会与该通知合并的其他通知也将被移除。\n\
  \n### 分布式通知\n\n分布式通知能够向其他进程中的对象发送通知。它们与常规通知非常相似，但有三个重要区别：\n\n- 通知会发送给所有进程。\n- 通知只能包含属性列表值。\n\
  - 通知以异步方式发布和接收。\n\n第一个特点正是分布式通知如此强大的原因。只需一条 `-postNotification…` 消息，就能在不同进程中的对象之间进行通信，这使得分布式通知成为迄今为止最易用的进程间通信服务。虽然对象可以位于不同进程中，但并非必须如此；分布式通知也会传递给所有本地观察者。\n\
  \n代码清单 18-5 中的程序可能很有趣。它会注册以接收所有分布式通知并将其记录下来。将其构建为命令行工具，运行它，然后正常使用你的系统。或者用它来测试从你的应用程序发送通知。终止该进程即可停止它。\n\
  \n**代码清单 18-5.** 分布式通知监视器\n\n```\n#import <Foundation/Foundation.h>\n#import <AppKit/NSWorkspace.h>\n\
  \n@interface DistributedNotificationListener : NSObject\n- (void)dumpNotification:(NSNotification*)notification;\n\
  @end\n```\n\n\n\n"
- "# `@implementation DistributedNotificationListener`\n\n```objc\n- (void)dumpNotification:(NSNotification*)notification\n\
  {\n    NSString* message = [notification name];\n    id object = [notification object];\n\
  \    NSDictionary* info = [notification userInfo];\n    if (info != nil) {\n   \
  \     NSLog(@\"%@ from %@ with %@\", message, object, info);\n    } else {\n   \
  \     if (object != nil)\n            NSLog(@\"%@ from %@\", message, object);\n\
  \        else\n            NSLog(@\"%@\", message);\n    }\n}\n@end\n```\n\n```objc\n\
  int main (int argc, const char * argv[])\n{\n    DistributedNotificationListener\
  \ *listener;\n    NSDistributedNotificationCenter *center;\n \n    listener = [DistributedNotificationListener\
  \ new];\n    center = [NSDistributedNotificationCenter defaultCenter];\n    [center\
  \ addObserver:listener\n              selector:@selector(dumpNotification:)\n  \
  \                name:nil\n                object:nil];\n    [[NSRunLoop currentRunLoop]\
  \ run];\n    // 此调用永不返回：终止进程以停止程序\n    return 0;\n}\n```\n\n要使用分布式通知，你需要了解其一些限制和复杂性，这些将在接下来的几节中描述。\n\
  \n#### 分布式通知中心\n\n要发布或观察分布式通知，你的对象必须与每个进程创建的单例 `NSDistributedNotificationCenter`\
  \ 进行交互。你可以通过 `[NSDistributedNotificationCenter defaultCenter]` 获取它。未来框架可能会定义其他分布式通知中心，但目前只有一个。你不能创建自己的分布式通知中心。\n\
  \n如果需要更复杂的进程间通信路径，可以考虑使用分布式对象，详见第 13 章。\n\n分布式通知中心使用 Mach（内核）端口交换消息。Mac OS X 的安全模型将\
  \ Mach 端口组织成引导命名空间的层次结构。发布的通知将广播到你账户的本地命名空间和父命名空间中的所有进程，但不会广播到其他用户创建的子命名空间。\n\n\
  #### 属性列表值\n\n分布式通知中的信息是序列化的（参见第 12 章“Objective-C 序列化”部分）。这将 `object` 和 `userInfo`\
  \ 参数中传递的对象限制为属性列表值——基本上是数组、字典、字符串、数字和日期对象。分布式通知中心中的 `object` 参数，其使用方式与普通通知中心完全相同，区别仅在于它只是一个字符串，而不是指向提供者对象的指针。使用描述性值（如\
  \ `@\"com.apress.learnobjc.DemoProvider\"`）来标识发送者或对通知进行分组。\n\n#### 异步通知传递\n\n与 `NSNotificationQueue`\
  \ 类似，分布式通知会被排队、可选择合并，并异步传递。自 Mac OS X 10.3 起，分布式通知始终在主运行循环上传递。通知队列与分布式通知的主要区别在于，决定通知如何排队和合并的是观察者，而非提供者。\n\
  \n`NSDistributedNotificationCenter` 以两种模式之一运行：挂起或未挂起。未挂起时，通知会在发布时立即传递。挂起时，通知会根据观察者请求的\
  \ `suspensionBehavior:` 模式被丢弃、合并、缓冲或传递。四种可能的模式如表 18-4 所示。\n\n**表 18-4.** *挂起通知中心观察者模式*\n\
  \n| 模式 | 描述 |\n|------|------|\n| `NSNotificationSuspensionBehaviorDrop` | 通知被丢弃。\
  \ |\n| `NSNotificationSuspensionBehaviorCoalesce` | 相似的通知被合并并保存。此为默认模式。 |\n| `NSNotificationSuspensionBehaviorHold`\
  \ | 通知被保存，直到达到通知中心的缓冲区上限。 |\n| `NSNotificationSuspensionBehaviorDeliverImmediately`\
  \ | 忽略分布式通知中心的挂起状态，无论如何立即传递通知。 |\n\n\n\n\n观察者使用 `-addObserver:selector:name:object:suspensionBehavior:`\
  \ 消息请求挂起模式。常规的 `-addObserver:selector:name:object:` 消息会将观察者注册到 `NSNotificationSuspensionBehaviorCoalesce`\
  \ 模式下。\n\n提供者可以通过使用 `-postNotificationName:object:userInfo:deliverImmediately:`\
  \ 消息并传递 `YES` 作为 `deliverImmediately:` 参数，强制通知立即投递。此操作会忽略挂起状态和行为模式，直接将通知投递给所有观察者。\n\
  \n**暂停分布式通知中心**\n\n分布式通知中心可以通过 `-setSuspended:` 消息进行挂起或重新激活。当它被重新激活时，所有缓冲的通知会立即被投递。\n\
  \n应用工具包（GUI 框架）应用程序中的分布式通知中心会在应用程序变为非活跃状态时自动挂起——即当它不再是前台应用程序时。当应用程序重新变为活跃状态时，它会自动取消挂起。你不应干扰此行为；请使用\
  \ `NSNotificationSuspensionBehaviorDeliverImmediately` 或 `deliverImmediately:` 选项，将通知投递给处于挂起状态应用程序中的观察者。守护进程或命令行工具可以根据需要挂起或激活其分布式通知中心。\n\
  \n**总结**\n\n通知为不同对象之间的通信提供了一种灵活的方式。观察者可以注册以接收特定通知或广泛的通知。观察者可以注册以接收来自它们一无所知的对象的通知。通知中心负责为你的对象管理提供者和观察者。\n\
  \n通知也可以被推送到队列中异步投递，或者发布到分布式通知中心以在进程间交换。通过合并冗余通知可以实现简单的负载均衡。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 19 章 — 观察者模式\n\n观察者模式在源对象和一组观察者之间创建了一种一对多的单向关系。当源对象的某个属性发生变化时，观察者会收到一条通知消息。观察者可以利用这些信息与所观察的对象保持同步，或执行其他任务。\n\
  \n是我多心了，还是这听起来和上一章的提供者/订阅者模式完全一样？在这个抽象层面上，提供者/订阅者模式和观察者模式非常相似。\n\n在 Java 中，两者都会像第\
  \ 18 章所阐述的那样，通过监听器接口、对象和管理来实现。但观察者模式和提供者/订阅者模式是不同的，如表 19-1 所述。\n\n**表 19-1.** 提供者/订阅者模式与观察者模式的区别\n\
  \n| 提供者/订阅者模式 | 观察者模式 |\n| --- | --- |\n| 提供者/订阅者模式以通知为中心。通知对象可以包含任意信息，并可以为任何目的而定义。\
  \ | 观察者模式关注对象的特定属性。观察者观察另一个对象的某个属性，并在该属性发生变化时得到通知。通知中包含的唯一信息是对象本身以及变化的详情。 |\n| 提供者对象积极参与提供者/订阅者设计模式。它明确地定义它将发送哪些通知以及何时发送。\
  \ | 被观察的对象通常是*被动*的。它不定义哪些属性可以被观察，也不需要在属性变化时执行任何操作；框架会代表它生成通知。 |\n| 提供者必须实现代码来发布通知。\
  \ | 被观察的对象无需实现任何代码即可被观察。如果某个类期望被观察，并且具有非平凡的属性或关系，你可以选择实现自定义通知代码。 |\n| 通知被发布到通知中心。\
  \ | 被观察属性的通知直接从源对象发送到它的观察者。 |\n\nObjective-C 提供了一种非常具体的技术来实现观察者模式，称为键值观察。这是一项需要理解的重要技术，因为它是渗透在用户界面框架中的模型-视图-控制器模式的一个组成部分。由于键值观察具有非常独特的能力，本章中没有\
  \ Java 示例。从本质上讲，它们会与第 18 章中的 Java 示例完全相同。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 第 19 章 ■ 观察者模式\n\n本章描述了观察者模式的基本原理以及键值观察技术。你至少需要阅读这些内容来理解 KVO。后续章节将解释如何使用 KVO，以及如何为非平凡属性添加\
  \ KVO 支持。键值观察使用键值编码。如果这听起来不熟悉，你可能需要回顾一下第 10 章的“键值编码”部分，快速复习一下。\n\n### 键值观察的工作原理\n\
  \n键值观察的工作原理是：当另一个对象（被观察对象）的特定属性发生变化时，通知一个对象（观察者）。这种关系是通过向将被观察的对象发送单条 `-addObserver:…`\
  \ 消息来建立的。一旦建立，每当被观察对象的那个属性发生变化时，观察者对象就会收到一条通知消息。清单 19-1 展示了一个键值观察的简单示例。首先是类，然后是执行的代码，最后是程序的输出。\n\
  \n**清单 19-1.** 键值观察示例\n\n```objectivec\n@interface Chameleon : NSObject {\n    NSColor\
  \ *color;\n}\n@property (assign) NSColor *color;\n@end\n\n@implementation Chameleon\n\
  - (NSColor*)color {\n    return color;\n}\n- (void)setColor:(NSColor*)newColor {\n\
  \    color = newColor;\n}\n@end\n\n@interface Watcher : NSObject\n@end\n\n@implementation\
  \ Watcher\n- (void)observeValueForKeyPath:(NSString*)keyPath\n                 \
  \     ofObject:(id)object\n                        change:(NSDictionary*)change\n\
  \                       context:(void*)context {\n    NSLog(@\"对象 '%@' 的属性 '%@'\
  \ 已变更: %@\", keyPath, object, change);\n}\n@end\n\n...\n\nChameleon *chameleon =\
  \ [Chameleon new];\nWatcher *watcher = [Watcher new];\n\n[chameleon addObserver:watcher\n\
  \            forKeyPath:@\"color\"\n               options:NSKeyValueObservingOptionNew\n\
  \               context:NULL];\n\nchameleon.color = [NSColor greenColor];\n\n输出:\n\
  对象 '<Chameleon: 0x139330>' 的属性 'color' 已变更: {\n    kind = 1;\n    new = NSCalibratedRGBColorSpace\
  \ 0 1 0 1;\n}\n```\n\n以下是清单 19-1 中发生的情况：\n\n1. `Chameleon` 类实现了一个属性。这个属性没有什么特别之处，只是它符合键值编码的准则。\n\
  2. `Watcher` 类实现了一个 `-observeValueForKeyPath:ofObject:change:context:` 方法。这使其有资格成为键值观察者。\n\
  3. 观察者对象注册为 `Chameleon` 对象的 `color` 属性的观察者。\n4. 当 `Chameleon` 对象的 `color` 属性发生变化时，观察者对象会收到一条通知，告知它发生变化的是哪个属性（键路径）以及新的值。\n\
  \n简而言之，这就是键值观察。任何实现了 `-observeValueForKeyPath:ofObject:change:context:` 方法的对象，都可以注册来观察另一个对象的几乎任何属性。每当该属性发生变化时，观察者就会收到一条通知。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 键值观察的魔法\n\n如果你正挠头思索键值观察框架是如何知道\
  \ `Chameleon` 对象收到了 `-setColor:` 消息的，那它是通过一种叫做 isa 交换的小魔法做到的。在第 26 章中会对此进行更详细的描述。\n\
  \n\n\n"
- '# KVO 工作原理


  `KVO` 利用了 Objective-C 对象的动态特性。当观察者请求观察 `Chameleon` 对象时，`KVO` 框架会动态地为 `Chameleon`
  创建一个新的 Objective-C 子类，重写其 `-setColor:` 方法，并将该对象的类更改为新的子类。当 `Chameleon` 对象随后收到 `-setColor:`
  消息时，合成子类的方法会被调用。该子类方法先调用 `[super setColor:newColor]`，然后将请求的属性变化通知发送给所有观察者。


  这一过程快速、高效，且对被观察对象完全透明。


  `KVO` 仅重写被观察属性的 `setter` 方法，因此对其他方法没有性能影响。如果稍后移除某个对象的所有观察者，`KVO` 会将该对象的类恢复为原始类。


  ### 与提供者/订阅者及观察者模式的比较


  延续此前对提供者/订阅者模式与观察者模式的比较，第 18 章中介绍的 `Thermometer` 和 `TemperatureMonitor` 示例本可以轻松使用键值观察（`Key-Value
  Observing`）实现，但存在以下注意事项：


  - `Thermometer` 对象无法根据其发布通知的通知中心来选择观察者受众。

  - 温度变化通知除了包含新值（以及可能的旧值）外，不会包含关于变化的任何额外信息。

  - 观察者无法注册以接收来自未知对象的通知。

  - 温度变化通知无法排队以进行异步投递或合并。

  - 变化通知只能发送给同一进程内的对象。


  ### KVO 的核心特性


  键值观察最重要的特性是，它通常不需要被观察对象提供任何编程支持。例如，`NSProgressIndicator` 类定义了一个符合 `KVC`（`Key-Value
  Coding`）规范的 `indeterminate` 属性。这是一个简单的只读 `BOOL` 属性值，要么设置，要么不设置。如果你有一个用户界面对象需要根据进度指示器的
  `indeterminate` 状态改变外观，你的对象可以观察该视图对象的 `indeterminate` 属性，并在其发生变化时自行更新。漂亮之处在于，`NSProgressIndicator`
  从未被设计为在其 `indeterminate` 属性变化时通知观察者，但借助 `KVO`，它仍然可以参与观察者设计模式。


  > **注意**：键值观察也会注意到通过键值编码（`Key-Value Coding`）进行的属性更改，例如 `[chameleon setValue:[NSColor
  greenColor] forKey:@"color"]`，如第 10 章“键值编码”部分所述。然而，`KVO` 无法观察通过直接赋值进行的属性更改，例如 `chameleon->color=[NSColor
  greenColor]`。如果使用直接赋值并且希望你的类兼容键值观察，则需要实现手动 `KVO` 通知，这将在本章后面解释。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- "# 第 19 章 ■ 观察者模式\n\n以上就是键值观察的基础知识。本章其余部分将深入探讨观察者可用的选项，然后讲解手动实现 `KVO` 以及支持相互关联和复杂属性的更复杂问题。\n\
  \n### 注册键值观察者\n\n当观察者对象注册以观察另一个对象的属性时，需要提供五条信息：\n\n- 源对象\n- 观察者\n- 源对象属性的键值路径（`key-value\
  \ path`）\n- 一组观察者选项\n- 可选的上下文值\n\n要观察的属性的键值路径比乍看起来要灵活得多。\n\n键路径参数接受一个键值编码路径，如第 10\
  \ 章“键值编码”部分所述。该路径可以描述属性的属性，这巧妙地赋予了 `KVO` 极大的灵活性和能力。考虑清单 19-2 中的代码，它扩展了清单 19-1 中的代码。\n\
  \n**清单 19-2. 观察复杂的键值编码路径**\n\n```objectivec\n#import \"Chameleon.h\"\n\n@interface\
  \ ReptileZoo : NSObject {\n    Chameleon *chameleon;\n}\n```\n\n\n\n```objc\n@property\
  \ (assign) Chameleon *chameleon;\n\n@end\n\n@implementation ReptileZoo\n\n@synthesize\
  \ chameleon;\n\n@end\n\n…\n\nReptileZoo *zoo = [ReptileZoo new];\n\nChameleon *chameleon1\
  \ = [Chameleon new];\n\nChameleon *chameleon2 = [Chameleon new];\n\nWatcher *watcher\
  \ = [Watcher new];\n\nchameleon1.color = [NSColor blueColor];\n\nchameleon2.color\
  \ = [NSColor redColor];\n```\n\n`zoo.chameleon = chameleon1;`\n\n`[zoo addObserver:watcher\
  \ forKeyPath:@\"chameleon.color\" options:NSKeyValueObservingOptionNew context:NULL];`\n\
  \n`chameleon1.color = [NSColor greenColor];`\n\n`zoo.chameleon = chameleon2;`\n\n\
  输出：\n\n```\n属性 'chameleon.color' 的对象 '<ReptileZoo: 0x13a0c0>' 已更改：{\n    kind =\
  \ 1;\n    new = NSCalibratedRGBColorSpace 0 1 0 1;\n}\n属性 'chameleon.color' 的对象\
  \ '<ReptileZoo: 0x13a0c0>' 已更改：{\n    kind = 1;\n    new = NSCalibratedRGBColorSpace\
  \ 1 0 0 1;\n}\n```\n\n清单 19-2 中的观察者对象被设置为观察 `zoo` 对象的 `chameleon` 属性的 `color` 属性。它接收到了两条属性变更通知。第一条通知是因为\
  \ `zoo` 当前 `chameleon` 属性的 `color` 属性被直接设置了新值。第二条通知是因为 `chameleon` 属性被替换为另一个不同的对象，从而间接改变了\
  \ `zoo` 的 `chameleon` 属性的 `color` 值。在这两种情况下，观察者都会收到关于受影响完整路径及其新值的通知。\n\n在注册以接收属性变更通知时，通知会通过一个变更字典包含一些关于变更的信息。有四个选项，通过逻辑或运算组合表\
  \ 19-2 中的任意常量来选定，这些选项控制变更字典中包含哪些信息以及发送通知的顺序。如果您的观察者对所有这些选项都不感兴趣，则在 `options:` 参数中传入\
  \ `0`。\n\n**表 19-2.** 键值观察选项\n\n| KVO 选项 | 效果 |\n|------------|--------|\n| `NSKeyValueObservingOptionNew`\
  \ | 通知的变更字典包含新值。 |\n| `NSKeyValueObservingOptionOld` | 通知的变更字典包含旧值。 |\n| `NSKeyValueObservingOptionInitial`\
  \ | 在 `-addObserver:...` 返回之前立即发送一条包含当前值的通知。 |\n| `NSKeyValueObservingOptionPrior`\
  \ | 每次变更发送两条通知：一条在值变更之前发送的预变更通知，以及其后的一条常规通知。预变更通知的变更字典中会包含一个 `NSKeyValueChangeNotificationIsPriorKey`\
  \ 键。 |\n\n最后一个参数是一个可选的上下文值。它是一个不受垃圾收集系统管理的 C 指针，因此如果您用它来传递对象指针，请确保该对象不会被过早回收。除此限制之外，它可以包含任何兼容的值，并且会通过该注册触发的所有通知，原样传递回观察者的\
  \ `-observeValueForKeyPath:ofObject:change:context:` 方法。\n\n### 处理键值变更通知\n\n注册之后，您的对象将开始以\
  \ `-observeValueForKeyPath:ofObject:change:context:` 消息的形式接收键值观察变更通知。该消息包含四个参数：\n\
  \n- 被观察属性的键值路径\n- 源对象\n- 一个 `change:` 参数，包含一个描述变更的不可变字典\n- 一个 `context:` 参数，包含观察者注册时传入\
  \ `-addObserver:forKeyPath:options:context:` 的 `context:` 值\n\n如果您的对象注册观察了多个属性，请使用键值路径参数、源对象指针或上下文值来区分属性并分别处理。\n\
  \n变更字典包含关于变更的信息。其内容取决于属性的类型、变更的性质以及您请求包含的信息（由表 19-2 中的选项决定）。可能的字典键以及每个值的说明列于表 19-3\
  \ 中。\n\n\n\n### 表 19-3：变更通知字典键值\n\n| 键 | 值 | 描述 |\n| --- | --- | --- |\n| `NSKeyValueChangeKindKey`\
  \ | `NSKeyValueChangeSetting`、`NSKeyValueChangeInsertion`、`NSKeyValueChangeRemoval`\
  \ 或 `NSKeyValueChangeReplacement` | 描述属性的变化方式。如果属性是简单属性（如整数或对象），则此值为 `NSKeyValueChangeSetting`。其他三个值描述了对集合属性的更改。\
  \ |\n| `NSKeyValueChangeNewKey` | 值对象 | 包含新的属性值，或插入或替换值的数组。仅当请求了 `NSKeyValueObservingOptionNew`\
  \ 选项时才包含此项。 |\n| `NSKeyValueChangeOldKey` | 值对象 | 先前的属性值，或移除或替换值的数组。仅当请求了 `NSKeyValueObservingOptionOld`\
  \ 选项时才包含此项。 |\n| `NSKeyValueChangeNotificationIsPriorKey` | `YES` | 如果这是通过 `NSKeyValueObservingOptionPrior`\
  \ 观察选项请求的变更前通知，则包含此项。 |\n| `NSKeyValueChangeIndexesKey` | `NSIndexSet` | 对于数组集合属性的更改，此\
  \ `NSIndexSet` 值包含受插入、移除或替换影响的索引。 |\n\n当观察一个原始值或对象指针类型的属性变化时，变更种类始终是 `NSKeyValueChangeSetting`，并且字典中可能会酌情包含旧值和新值。\n\
  \n当观察的属性是一个对多对象属性时，变更信息会稍微复杂一些。变更被描述为集合中一个或多个对象的插入、移除或替换。`NSKeyValueChangeIndexesKey`\
  \ 值列出了集合中受变更影响的索引。`NSKeyValueChangeNewKey` 和 `NSKeyValueChangeOldKey` 值包含一个紧凑的数组，其中包含了在\
  \ `NSKeyValueChangeIndexesKey` 集合中相应索引处插入、移除或替换（视情况而定）的对象。例如，如果从索引 3 和 5 的属性中移除了两个对象，那么\
  \ `NSKeyValueChangeIndexesKey` 将包含集合 {3, 5}，`NSKeyValueChangeOldKey` 将包含在索引 0 处索引\
  \ 3 被移除的对象以及在索引 1 处索引 5 被移除的对象，而 `NSKeyValueChangeNewKey` 值将为空，因为没有添加新对象。\n\n> **注意：**\
  \ 观察对多属性要求被观察对象实现第 10 章“设计符合 KVC 的类”一节中描述的可变数组属性访问器方法。常规的 `NSMutableArray` 类并未实现这些方法。如果你的对象有一个\
  \ `NSMutableArray *array` 属性，并且你观察该对象的 `@\"array\"` 属性，那么当数组对象被设置时，你的观察者会收到通知，但当对象被添加或从该数组中移除时，则不会收到通知。像\
  \ `NSArrayController` 这样的类确实实现了此协议，并且被设计为可观察的。\n\n### 注销观察者\n\n当你的观察者想要停止接收属性变更通知时，请向被观察对象发送一条\
  \ `-removeObserver:forKeyPath:` 消息，并传入与添加观察者时相同的键值路径。\n\n对象对其观察者持有弱引用，因此在观察者可以被回收之前，不必移除观察者。然而，如果存在观察者不再需要接收属性变更通知的逻辑节点，它应该将自己移除。另一方面，仅仅是作为某个对象的观察者，并不会阻止观察者本身被回收；观察者需要至少有一个强引用。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 使你的类符合 KVO 标准\n\n当一个对象属性符合键值观察标准时，意味着可以使用键值观察来可靠地观察该属性。要符合\
  \ KVO 标准，对象的属性必须：\n\n- 符合键值编码标准\n- 在被设置时发送键值观察通知\n\n\n\n如果您为标准属性实现 getter 和 setter\
  \ 方法，并通过发送 setter 消息来更改该属性，那么您的属性将 100% 符合 KVO 规范。\n\n然而，在某些情况下，您的属性将不符合 KVO 规范。这些情况要求您直接向类中添加\
  \ KVO 支持代码——假设您希望使该属性可观察。别担心，代码并不复杂。添加什么代码、在哪里添加以及在什么情况下添加，将在接下来的几个部分中描述。以下是属性不符合\
  \ KVO 规范的主要原因：\n\n- 该属性在其 setter 方法之外使用直接赋值（例如，`object->property = 1`）进行设置。\n- 该属性是其他属性的组合。一个典型的例子是只读的\
  \ `fullName` 属性，它由 `firstName` 和 `lastName` 属性拼接而成。\n- 该属性因其他状态变化而改变。例如，一个定义为 `return\
  \ ([lock condition] != RUNNING)` 的 `isFinished` 属性。\n\n直接赋值绕过了 KVO 拦截对象 setter 方法并注入必要通知的能力。要解决此问题，请手动发送\
  \ KVO 通知，或在更改属性值时重写代码以使用该属性的 setter 方法。\n\n通过将依赖关系告知 Key-Value Observing 框架，可以使依赖属性符合\
  \ KVO 规范。KVO 提供了特殊方法，您可以在类中描述依赖键。一旦实现，KVO 将知道更改 `firstName` 或 `lastName` 属性也会更改\
  \ `fullName` 属性，并发送所有预期的通知。\n\n因其他状态变化而自发更改的属性通常需要结合手动 KVO 通知或依赖属性来解决。\n\n除了仅仅作为行为良好的\
  \ KVO 参与者外，还有其他原因可能促使您直接向类中添加 KVO 支持代码。其中一个原因是性能。Key-Value Observing 通知有点“笨”。每当调用\
  \ setter 方法时，KVO 都会通知其观察者——即使新值与旧值相同。如果这导致性能或递归问题，您可以实现自己的 KVO 通知，仅在您认为适当时才发送。\n\
  \n而且，毫无疑问，总会出现上述未描述的情况，只能通过实现您自己的 KVO 支持来解决。这些特殊情况不仅涉及向类中添加手动 KVO 通知代码，您可能还需要告诉\
  \ KVO 框架不要执行其正常服务，否则两者会互相干扰。最后，需要注意的是，这些解决方案经常重叠；解决特定的 KVO 问题通常有多种方法。在决定最适合您情况的解决方案之前，请阅读接下来的几个部分。\n\
  \n### 发送手动 KVO 通知\n\n每当可观察属性发生更改时，您需要确保发送正确的 KVO 通知消息。在符合 KVC 规范的 setter 方法中，这会自动发生。在以下情况下，您可能需要手动发送\
  \ KVO 通知：\n\n- 该属性是只读的，并且没有 setter 方法。\n- 该属性在 setter 方法之外使用直接赋值进行设置。\n- 该属性是一个合成值，从其他属性值计算得出。\n\
  \n最直接的方法是在可能修改属性的代码之前和之后，手动触发所需的通知，发送 `-[NSObject willChangeValueForKey:]` 和 `-[NSObject\
  \ didChangeValueForKey:]` 消息。这些消息通知 KVO 框架即将发生某些可能导致属性更改的事情。KVO 框架负责向任何观察者发送适当的通知。以下代码清单\
  \ 19-3 在一个简单的 `Budget` 类中演示了这一点。\n\n\n\n`列表 19-3`。手动触发 KVO 通知\n\n```objc\n@interface\
  \ Budget : NSObject {\n\ndouble budget;\n\ndouble plannedExpense;\n\n}\n\n@property\
  \ double budget;\n\n@property (readonly) double plannedExpense;\n\n- (void)addExpenditure:(double)amount;\n\
  \n@end\n\n@implementation Budget\n\n@synthesize budget, plannedExpense;\n\n- (void)addExpenditure:(double)amount\n\
  \n{\n\n[self willChangeValueForKey:@\"plannedExpense\"]; plannedExpense += amount;\n\
  \n[self didChangeValueForKey:@\"plannedExpense\"];\n\n}\n\n@end\n```\n\n`Budget`\
  \ 类有一个存储在变量中的 `plannedExpense` 属性。这是一个没有设置方法的只读属性。`-addExpenditure:` 方法在增加金额时会改变该属性。包围该变更的\
  \ `-willChangeValueForKey:` 和 `-didChangeValueForKey:` 消息会将变更通知给键值观察框架，并允许其向观察者发送属性通知。\n\
  \n---\n\n## 观察者模式\n\n**注意** 对于给定的键，每条 `-willChangeValueForKey:` 消息必须与同一条键的相应 `-didChangeValueForKey:`\
  \ 消息成对出现。\n\n如果 `-addExpenditure:` 方法修改了多个属性，它就会为每个属性发送一对 `-willChangeValueForKey:`/`-didChangeValueForKey:`\
  \ 消息。这些消息可以嵌套：代码可以发送三条 `-willChange...` 消息，修改三个属性，然后再发送三条 `-didChange...` 消息。\n\n\
  如果要修改的属性是一个对多关系的数组属性，请改用 `-willChange:valuesAtIndexes:forKey:` 和 `-didChange:valuesAtIndexes:forKey:`\
  \ 消息。\n\n### 创建属性依赖关系\n\n另一个常见问题是当另一个属性发生变化时，某个属性也会隐式地随之变化。这被称为依赖属性。为 `Budget` 类添加一个\
  \ `remainingBudget` 属性会创建一个同时受 `budget` 或 `plannedExpense` 属性变更影响的依赖属性。键值观察框架定义了一个非正式协议，允许你的类描述其依赖属性。修改后的\
  \ `Budget` 类如 `列表 19-4` 所示。\n\n`列表 19-4`。定义依赖属性\n\n```objc\n@interface Budget :\
  \ NSObject {\n\ndouble budget;\n\ndouble plannedExpense;\n\n}\n\n@property double\
  \ budget;\n\n@property (readonly) double plannedExpense;\n\n@property (readonly)\
  \ double remainingBudget;\n\n- (void)addExpenditure:(double)amount;\n\n@end\n\n\
  @implementation Budget\n\n@synthesize budget, plannedExpense;\n\n- (void)addExpenditure:(double)amount\n\
  \n{\n\n[self willChangeValueForKey:@\"plannedExpense\"];\n\nplannedExpense += amount;\n\
  \n[self didChangeValueForKey:@\"plannedExpense\"];\n\n}\n\n+ (NSSet*)keyPathsForValuesAffectingRemainingBudget\n\
  \n{\n\nreturn [NSSet setWithObjects:@\"budget\", @\"plannedExpense\", nil];\n\n\
  }\n\n- (double)remainingBudget\n\n{\n\n// 剩余金额或 0.0\n\nreturn MAX(0,budget-plannedExpense);\n\
  \n}\n\n@end\n```\n\n对于每个被观察的属性，键值观察框架会查找一个名为 `+keyPathsForValuesAffectingProperty`\
  \ 的类方法；将方法名中的 “`Property`” 部分替换为依赖属性的名称。该方法返回一个该属性所依赖的属性名称集合。每当这些其他属性中的任何一个发生变化时，KVO\
  \ 也会为该依赖属性发送一个变更通知。为每个依赖属性实现一个这样的类方法。\n\n**注意** 使用上一节演示的手动 KVO 通知也可以实现相同的解决方案。你需要修改\
  \ `-addExpenditure:` 方法，使其为 `@\"remainingBudget\"` 键路径发送额外的 `-willChangeValueForKey:`\
  \ 和 `-didChangeValueForKey:` 消息，然后在手写的 `-setBudget:` 方法中执行相同的操作。依赖属性协议的优势在于它不需要修改其他属性的设置方法，也不需要添加更多的手动\
  \ KVO 通知。这在定义依赖于其超类属性的子类中特别方便。它还能避免 KVO 代码使实现变得杂乱。\n\n实际上有三种方法可以向键值观察框架传达依赖属性：\n\
  \n-   实现一个按属性的 `+keyPathsForValuesAffectingProperty` 类方法，如 `列表 19-4` 所示。\n-   重写单个\
  \ `+keyPathsForValuesAffectingValueForKey:` 类方法，并为请求的键返回依赖集。该方法的基类实现使用键路径来查找并调用选项\
  \ 1 中实现的方法名。\n-   在类中任何对象被观察之前的某个时刻（通常是在类的 `+initialization` 方法中），为类中实现的每个依赖键发送一条\
  \ `+setKeys:triggerChangeNotificationsForDependentKey:` 消息。\n\n对于每个依赖属性，仅实现上述解决方案之一。在实现前两个解决方案中的任何一个时，不要忘记在返回的集合中包含由超类定义的任何依赖键。\n\
  \n前两个解决方案仅适用于在 Mac OS X 10.5 或更高版本上运行的简单（对一）属性。如果你需要建立一个对多关系的依赖属性，或者目标平台是 Mac OS\
  \ X 10.4 或更早版本，请使用最后一个解决方案。如果你的目标是 Mac OS X 10.5 或更高版本（其中 `+setKey:…` 方法已弃用），请参阅“键值观察编程指南”¹\
  \ 中的“注册依赖键”部分，以了解多种可能的解决方案。\n\n### 重写键值观察\n\n要在符合 KVC 的设置方法中实现手动 KVO 通知，你必须禁用键值观察框架将执行的常规变更通知。否则，KVO\
  \ 和你的代码都会发送通知，导致重复的通知或顺序错乱的通知。\n\n这样做的一个非常审慎的原因是优化设置方法，使其仅在值实际发生变更时才通知观察者。这可以带来性能优势，并解决递归或循环更新问题。在\
  \ `列表 19-5` 中，类的 `budget` 属性设置器被重新实现，以便仅在 `budget` 值实际发生变化时才发送 KVO 通知。\n\n`列表 19-5`。优化\
  \ KVO 通知\n\n```objc\n@implementation Budget\n\n+ (BOOL)automaticallyNotifiesObserversForKey:(NSString*)key\n\
  \n{\n\nif ([key isEqualToString:@\"budget\"])\n\nreturn NO;\n\nreturn [super automaticallyNotifiesObserversForKey:key];\n\
  \n}\n\n- (double)budget\n\n{\n\nreturn budget;\n\n}\n\n- (void)setBudget:(double)value\n\
  \n{\n\nif (budget!=value) {\n\n[self willChangeValueForKey:@\"budget\"]; budget\
  \ = value;\n\n[self didChangeValueForKey:@\"budget\"];\n\n}\n\n}\n```\n\n为防止 KVO\
  \ 框架重写 `-setBudget:` 方法并发送其自身的通知，`+automaticallyNotifiesObserversForKey:` 类方法被重写。对于生成自身通知的可观察属性，该方法应返回\
  \ `NO`。基类实现为所有键返回 `YES`。\n\n然后，`-setBudget:` 方法被重写，使其仅在新预算值与先前值不同时才发送 KVO 通知。这种优化可以产生连锁效应。例如，既然\
  \ `remainingBudget` 属性依赖于 `budget` 属性，那么不发送多余的预算通知实际上避免了两个多余的通知。\n\n### 优化键值观察\n\
  \n¹ Apple Inc., “键值观察编程指南”, [`developer.apple.com/documentation/Cocoa/Conceptual/KeyValueObserving/`](http://developer.apple.com/documentation/Cocoa/Conceptual/KeyValueObserving/),\
  \ 2009.\n\n\n\n\n除了上一节中描述的消除冗余通知外，你的对象还可以通过另一种方式帮助键值观察框架。对于被大量观察的对象，你可以提供一个位置来存储关于该对象的观察信息，从而优化\
  \ KVO 性能。虽然 KVO 可以使用 `isa swizzling` 来改变对象的类，但它无法改变对象的结构或在其中存储任何新值。相反，KVO 会将对象的观察信息保存在一个全局集合中，每次属性发生变化时都必须查询该集合。\n\
  \n你可以通过为 KVO 提供一个 `void *observationInfo` 属性来减少这种开销，如 代码清单 19-6 所示。键值观察框架将使用此属性将对象的观察信息直接存储在对象内部。\n\
  \n**代码清单 19-6.** 提供本地键值观察信息存储\n\n```\n@interface KVOFriendly : NSObject {\n@private\n\
  \    void* observationInfo;\n}\n@property (assign) void *observationInfo;\n@end\n\
  \n@implementation KVOFriendly\n@synthesize observationInfo;\n@end\n```\n\n### 摘要\n\
  \n虽然在概念上与提供者/订阅者模式相似，但观察者模式提供了一套截然不同的解决方案。其主要优势在于，对于被观察对象而言，观察和通知在很大程度上是透明的，并且通常无需预先设计即可提供所需的通知。虽然基本属性会自动兼容键值观察，但某些属性可能需要添加一些额外代码才能完全支持\
  \ KVO。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n---\n\n"
- '# 第 20 章

  ## 模型-视图-控制器模式


  模型-视图-控制器设计模式是计算机科学中最重要的设计模式之一。大多数模式解决的是特定问题，而模型-视图-控制器（MVC）描述的是一个对象系统的架构。它可以应用于独立的子系统或整个应用程序。模型-视图-控制器设计模式的定义也比许多其他模式更模糊，为不同的实现方式留下了很大的空间。它更像是一种理念，而非一种配方。


  清晰理解 MVC 对于使用 Cocoa 至关重要，因为整个 Cocoa 框架（在适用的情况下）都是围绕模型-视图-控制器设计模式设计的。如果说 Java 在许多任务中采用了
  MVC，那么 Cocoa 则热切地拥抱了它。MVC 是 Cocoa 的灵魂。采用 MVC 设计将有助于你的开发，因为许多框架对象都被设计为能与 MVC 设计轻松集成。


  作为一个广泛的设计模式，本章内容涵盖广泛，涉及众多类和技术。（如果仅仅描述你可能已经熟悉的 MVC 设计模式，那本章将毫无用处）。为了实用起见，每节不仅描述设计理念，还会深入探讨你将用于实现这些理念的类、协议、框架和开发工具。例如，本章从基本的
  MVC 设计原则开始，接着介绍绑定（用于实现 MVC 通信的技术）和 Interface Builder（用于连接 MVC 对象的开发工具）。关于视图对象的部分解释了视图对象的作用，然后进一步说明如何使用预构建的视图对象、如何创建自己的视图对象、这些视图对象如何绘制自身，以及
  Cocoa 图形环境的基础知识。关于数据模型对象的部分不仅描述了数据模型对象的概念性角色，还介绍了一些可用于创建复杂数据模型的类和开发工具。简而言之，这是一章非常长的内容，所以请静下心来慢慢阅读。你应该在充分理解每个概念之后再进入下一个概念。


  为了帮助你全面理解各部分内容，我创建了一个简单的玩井字棋的 Cocoa 应用程序。这个项目相对较小，涉及本章的大部分主题，并将用于说明其中许多概念。我建议你从
  `http://www.apress.com` 的源码/下载部分下载该项目，以便了解每个概念如何融入整体。本章还有一节关于 Interface Builder（一个关键的
  Cocoa 开发工具）以及它如何支持 MVC 设计模式的内容。在本章末尾，有一个简短的部分描述了项目中其他章节未涉及的一些值得注意的方面。


  模型-视图-控制器位于广泛的支持技术基础之上，处于设计金字塔的顶端。要掌握 MVC，你需要牢牢掌握支持它的技术。在尝试在 Cocoa 中处理 MVC 之前，你应该熟悉或回顾以下内容：


  *   Objective-C 消息（第 6 章）

  *   非正式协议（第 5 章）

  *   委托（第 17 章）

  *   键值编码（第 10 章）

  *   键值观察（第 19 章）


