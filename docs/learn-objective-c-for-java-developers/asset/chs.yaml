  \n■ 目录\n\n## 引言\n\nObjective-C 是一种精彩的语言，但它所获得的关注远低于其应得的。随着苹果 Mac OS X 和 iPhone 的成功——在这两个平台上它是首屈一指的开发语言——它突然变得（更加）流行。如果你打算学习一门语言来为\
  \ Mac OS X 或 iPhone 编写应用程序，Objective-C 就是*那门*值得学习的语言。\n\nObjective-C 语言给人的感觉不像是某个委员会或计算机科学专业学生开发出来的。它是一门为极简主义者和无政府主义者准备的语言。然而，它保留了许多使\
  \ Java 成为我们时代伟大编程语言之一的特性。Objective-C 允许你编写在结构和形式上与 Java 编写的任何程序一样严谨的应用程序。但同时，如果你想在语言上钻个洞，踏上一条从未有人探索过的道路，它也不会阻拦你。\n\
  \n在用 Objective-C 编程几年后，我惊讶地发现我的程序是多么“像 Java”。如果我当时就知道我的 Java 技术和概念中有多少可以直接移植到 Objective-C\
  \ 上，就能省下我数月的学习和试验时间。我写这本书就是为了让你能避免同样的命运。\n\n### 本书读者对象\n\n本书面向任何希望尽快学习和探索 Objective-C\
  \ 的 Java 开发者。\n\n### 本书结构\n\n本书分为四个部分：Objective-C 语言、技术转换、设计模式以及高级 Objective-C。\n\
  \n第一部分描述了 Objective-C 语言本身的基础知识。它解释了 Objective-C 如何与 Java 相似，以及如何不同。它详细阐述了语言语法、类声明、继承等。\n\
  \n第二部分考察了特定的技术，如垃圾回收、文件系统和内省。每一章都并排展示了 Java 代码示例以及对应的 Objective-C 代码示例。表格列出了你熟悉的\
  \ Java 类以及执行相同角色的 Cocoa 类。然后，每一章会继续深入探讨高级主题，通常涉及 Objective-C 独有的技术。\n\n第三部分按设计模式组织。Java\
  \ 开发者使用许多重要的设计模式，例如工厂模式和模型-视图-控制器模式。这些章节展示了每种模式如何在 Objective-C 中实现——其方式往往可能会让你感到惊讶。\n\
  \n本书的最后一部分探讨了高级 Objective-C 主题：内存管理、Objective-C 与 C 的集成，以及 Objective-C 运行时环境。\n\n\
