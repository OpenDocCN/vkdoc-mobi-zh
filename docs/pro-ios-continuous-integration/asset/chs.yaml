- "# 第 4 章：调用命令行的力量\n\n在第一章中，我们曾提到过这样一个人：当测试人员轻轻拍他肩膀要求安装应用的测试版时，他就会插上测试设备，构建一个应用版本，然后把设备交还回去。好消息是，现在你已经掌握了成为那个人的所有工具和知识。但别止步于此——请继续阅读，接下来的章节将教你如何自动化这一流程，并为测试人员提供更好的用户体验。\n\
  \n即便拥有多种用户界面，包括像 Xcode 提供的那些设计精良且直观的界面，也依然不够。事实上，前一章已经向你展示了使用 Xcode 和 iTunes 或 iPhone\
  \ 配置实用工具在 App Store 之外发布应用是多么繁琐的过程。\n\n好的界面并不能解决所有问题。在本章中，我们将深入探讨这些界面所基于的工具，并通过直接使用命令行来调用它们。\n\
  \n## 命令行界面？\n\n命令行界面（通常称为 CLI）是一种让用户以较低层级与计算机交互的方式，它使用计算机可理解的文本命令语法。这种语法在可读性方面对双方来说都是一个不错的折中方案。很多开发者对它感到畏惧，有些人甚至整个职业生涯都不使用一次\
  \ shell（用于执行命令的界面）。他们为什么要用呢？用 Photoshop 设计应用，用 Xcode 编写代码，同时使用图形化的版本控制客户端（如果有的话）和应用加载器向\
  \ App Store 提交构建——完全不打开 shell 也能开发一个应用。\n\n关键在于，使用命令行能让你访问高级用户功能，并且在我们设置持续集成环境时，它实际上会变得非常方便。\n\
  \n在本章中，我们将试着向你展示，在 iOS 开发的背景下，命令行并不像你想象的那么可怕，尤其是在 OSX 系统上。既然你购买了这本书，我们无需再向你证明 OS\
  \ X 对开发者来说是多么出色的操作系统。这要归功于其 UNIX 的血统。OS X 自带了一个相当不错的 shell 供你使用，叫做 `Terminal.app`，它和其他许多工具一起位于\
  \ `/Applications/Utilities` 目录中。如果你仔细看看图 4-1，就会发现我们上一章讨论的 iPhone 配置实用工具正是安装在这里。\n\
  \n![图 40](img/index-45_1.jpg)\n\n**图 4-1.** 工具列表，主要由 OSX 提供\n\n开发者之所以害怕或不愿深入使用 shell\
  \ 的原因之一，可能在于 OSX 上首次打开它时的样子——一个黑底白字的界面，没有任何提示告诉你该做什么。我们实话实说——命令行界面确实令人困惑，而且主要是为高级用户设计的。好消息是，要熟悉命令行其实相当容易。难点在于知道在什么时候运行哪个命令、带上哪些参数，但这只能随着经验和时间的积累而掌握。\n\
  \n现在，让我们看看如何用命令行来实现我们在上一章中做过的创建发布版构建的操作。\n\n## 认识 Shenzhen\n\niOS 和 OSX 开发者社区人才济济，他们持续撰写博客文章，并发布我们将在项目中使用的库和工具。马特·汤普森就是其中之一。\n\
  \n除了运营 NSHipster 网站（网址：[`nshipster.com`](http://nshipster.com/)）——他在上面撰写关于\"Objective-C\
  \ 和 Cocoa 中被忽视的细节\"的隐藏技巧和心得之外，他还创建了 Shenzhen，一个用于构建 IPA 文件的命令行工具。Shenzhen 还支持将应用分发到\
  \ Testflight 和 HockeyApp 等第三方服务，但我们将在第 7 章才讨论空中下载（OTA）分发。\n\nShenzhen 是用 Ruby 编写的，因此最简单的安装方法是使用\
  \ Rubygems。在开始之前，请确保你安装了最新版本的 Ruby。在撰写本书时，当前的 Ruby 稳定版本是 2.1.1。\n\n```\n$ ruby –v\n\
  ruby 2.1.1p76 (2014-02-24 revision 45161) [x86_64-darwin13.0]\n```\n\n同样，如果你仍在使用\
  \ OS X 自带的 Ruby 安装版本，应考虑使用 `rbenv`（[`rbenv.org/`](http://rbenv.org/)）或 `RVM`（[`rvm.io/`](https://rvm.io/)）升级到更新的版本。\n\
  \n要安装 Shenzhen，只需运行以下命令：\n\n```\n$ gem install shenzhen\n```\n\n安装完成后，你的终端中将出现一个名为\
  \ `ipa` 的新可执行文件。不带任何参数运行它，应该会显示以下输出：\n\n```\n$ ipa\nipa\n\n构建和分发 iOS 应用（.ipa 文件）\n\
  \n命令：\n  build                              为你的应用创建新的 .ipa 文件\n  distribute:ftp\
  \                     通过 FTP 分发 .ipa 文件\n  distribute:hockeyapp               通过\
  \ HockeyApp 分发 .ipa 文件\n  distribute:s3                      通过 Amazon S3 分发 .ipa\
  \ 文件\n  distribute:testflight              通过 testflight 分发 .ipa 文件\n  help    \
  \                           显示全局或 [命令] 帮助文档。\n  info                           \
  \    显示 .ipa 文件的移动设备配置文件信息\n\n别名：\n  distribute                         distribute:testflight\n\
  \  distribute:sftp                    distribute:ftp --protocol sftp\n\n全局选项：\n\
  \  --verbose\n  -h, --help                         显示帮助文档\n  -v, --version     \
  \                 显示版本信息\n  -t, --trace                        发生错误时显示回溯信息\n\n作者：\n\
  \  Mattt Thompson <m@mattt.me>\n\n网站：\n  [`mattt.me`](http://mattt.me/)\n```\n\n\
  如你所见，这个工具功能很多，但我们只关心 `build` 命令。在终端中，导航到 Github Jobs Xcode 项目的根目录，然后运行 `build` 命令：\n\
  \n```\n$ cd ~/Projects/Apress/Github\\ Jobs\n$ ipa build -c AdHoc -d ~/Desktop\n\
  xcodebuild Github Jobs.xcworkspace\nxcrun PackageApplication\nzip /Users/Palleas/Projects/Apress/Github\
  \ Jobs/Github Jobs.app.dSYM\n~/Desktop/Github Jobs.ipa 构建成功\n```\n\n那么刚才发生了什么？其实就几件事：Shenzhen\
  \ 为 AdHoc 配置构建了应用（`-c` 参数），将其归档，并在你的桌面上创建了 IPA 文件（`-d` 参数）。\n\n我们也使用了 `cd` 这个内置命令来更改当前目录，就像使用\
  \ Finder 窗口一样。恭喜你！你只用了十秒钟和一个非常易懂的命令，就完成了我们在整整一章中讲述的内容！\n\n公平地说，在 Xcode 及其发布流程方面，我们有点作弊了。毕竟，Shenzhen\
  \ 是一个功能齐全的工具，仅用了几百行 Ruby 代码编写而成。但这正是命令行的强大之处。我们来看看 Xcode 提供的工具。\n\n## 处理多个 Xcode\
  \ 安装\n\n让我们从一个简单的命令开始，叫做 `xcode-select`。如果你还记得我们在第 2 章中讲过的内容，当我们想知道 Xcode 内嵌的 git\
  \ 版本时，我们就使用过这个命令。`xcode-select` 是一个命令行工具，用于管理 Xcode 及其附带工具（如 `git`，以及 `svn`、`clang`\
  \ 和 `make`）的活动开发者目录。在你的 shell 中运行以下命令会打印出当前目录，如果你需要 Xcode 提供的某些工具，又不想硬编码路径，这会很有用。再次回顾第\
  \ 2 章，看看如何在脚本中使用此命令的结果。\n\n\n\n```bash\n$ xcode-select –print-path\n/Applications/Xcode.app/Contents/Developer\n\
  ```\n\n如果你使用 OSX 已经有一段时间了，那么你很可能听说过 Xcode 的命令行工具。安装命令行工具是使用 Homebrew 包管理器等工具的前提条件。虽然可以通过\
  \ Xcode 的首选项面板来安装这些命令行工具，但 `xcode-select` 是用于打开如图 4-2 所示安装窗口的命令行等效工具。\n\n```bash\n\
  $ xcode-select –install\nxcode-select: note: install requested for command line\
  \ developer tools\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image\
  \ 41](img/index-48_1.jpg)\n\n**第 4 章：调用命令行的力量**\n\n**45**\n\n***图 4-2.** xcode-select\
  \ 工具可以启动 Xcode 命令行工具的安装*\n\n如果你是 Apple 注册开发者，你可以访问 Xcode 的私有 beta 版本，而 `xcode-select`\
  \ 在此处大显身手。`xcode-select` 允许你在不同版本的 Xcode 之间切换。由于它是在全局级别管理开发者目录的路径，因此需要使用 `sudo`\
  \ 以“超级用户”身份运行此命令。\n\n```bash\n$ sudo xcode-select --switch /Applications/XCode6-beta.app\n\
  ```\n\n通过这种方式，你将能够使用 Xcode6-beta 提供的命令行工具。这在以下场景中很有帮助：确保你的应用程序仍能使用新版本的 Xcode 构建，或者你发现了之前\
  \ Xcode 版本的一个 bug，并想检查它是否已被修复。关键在于，借助这个小工具，在 Xcode 版本之间切换变得非常容易。作为额外优势，`xcode-select`\
  \ 会确保你尝试使用的开发者目录是有效的：\n\n```bash\nsudo xcode-select -s /Applications/Dashboard.app\n\
  xcode-select: error: invalid developer directory '/Applications/Dashboard.app'\n\
  ```\n\n我们通常使用的开发者目录是 `/Applications/Xcode.app`，但由于历史原因，实际的开发者目录是应用程序包内的一个子目录。这就是为什么我们首次使用\
  \ `xcode-select –p` 命令时，打印的不是 “`/Applications/Xcode.app`”，而是 “`/Applications/Xcode.app/Contents/Developer`”。当你使用\
  \ `xcode-select` 切换到不同版本的 Xcode 时，你可以使用这两个值。如果你输入较短的路径，它会自动扩展为完整的开发者目录路径。\n\n当然，全局切换到\
  \ Xcode 的 beta 版本可能有点极端，而且最重要的是，这存在风险。想象一台专门用于自动构建应用程序的 Apple 电脑——例如一台 Mac Mini。你不会想冒险切换到\
  \ Xcode 的 beta 版本，从而危及整个环境。正因如此，还有一种较为温和的切换 Xcode 版本的方法：使用 `DEVELOPER_DIR` 环境变量。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**46**\n\n**第 4 章：调用命令行的力量**\n\
  \n**注意** 环境变量，顾名思义，是命令运行的环境所使用的变量。其中一些变量由操作系统自动设置，例如包含当前用户主目录路径的 `$HOME` 变量（如 `/Users/Palleas`），或包含当前工作目录路径的\
  \ `$PWD` 变量（如 `/Users/Palleas/Projects/Apress/Github Jobs`）。也可以使用非常简单的语法为当前会话定义一些变量：`MY_ENV_VARIABLE=\"\
  My Value\"`，然后稍后使用 `$MY_ENV_VARIABLE`。基于此，使用 `DEVELOPER_DIR` 同样简单。\n\n无论你选择哪种解决方案，在不同\
  \ Xcode 环境之间切换都非常容易。例如，如果你怀念旧版本的 Xcode，或者因为你一个旧项目无法用最新版本构建，你可以直接访问“Apple 开发者下载”页面（网址为\
  \ [`developer.apple.com/downloads/index.action`](https://developer.apple.com/downloads/index.action)），下载一个较旧版本的\
  \ Xcode 并使用它。\n\n请注意，与 `xcode-select` 方法不同，使用环境变量并不会在你尝试使用该目录之前检查它是否有效，直到它实际尝试使用时才会验证，如下例所示，我们尝试使用一个众所周知的\
  \ OSX 应用程序 `Dashboard.app` 作为开发者目录。\n\n```bash\nDEVELOPER_DIR=/Applications/Dashboard.app\
  \ xcodebuild -v\nxcrun: error: invalid DEVELOPER_DIR path (/Applications/Dashboard.app),\
  \ missing xcrun at:\n/Applications/Dashboard.app/usr/bin/xcrun\n```\n\n你可能注意到了 `xcodebuild`\
  \ 命令的使用。是时候让我们亲自动手，看看如何实际使用命令行构建应用程序了。毕竟，这正是我们来到这里的目的。\n\n## 构建应用程序\n\n现在我们对 Xcode\
  \ 安装提供的命令行工具的位置有了大致了解，让我们看看如何直接从终端构建应用程序。你在上一节已经初步了解了 `xcodebuild` 命令，而这正是我们实际要使用的命令。\n\
  \n### 使用 xcodebuild 构建应用程序\n\n如果你在终端中使用帮助选项运行 `xcodebuild` 命令，你可能会感到不知所措。\n\n```bash\n\
  $ xcodebuild -h\nUsage: xcodebuild [-project <projectname>] [[-target <targetname>]...|-alltargets]\n\
  [-configuration <configurationname>] [-arch <architecture>]... [-sdk [<sdkname>|<sdkpath>]]\n\
  [-showBuildSettings] [<buildsetting>=<value>]... [<buildaction>]...\nxcodebuild\
  \ [-project <projectname>] -scheme <schemeName> [-destination <destinationspecifier>]...\n\
  [-configuration <configurationname>] [-arch <architecture>]... [-sdk [<sdkname>|<sdkpath>]]\n\
  [-showBuildSettings] [<buildsetting>=<value>]... [<buildaction>]...\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 4 章：调用命令行的力量**\n\n**47**\n\n```bash\nxcodebuild -workspace <workspacename>\
  \ -scheme <schemeName> [-destination <destinationspecifier>]...\n[-configuration\
  \ <configurationname>] [-arch <architecture>]... [-sdk [<sdkname>|<sdkpath>]]\n\
  [-showBuildSettings] [<buildsetting>=<value>]... [<buildaction>]...\nxcodebuild\
  \ -version [-sdk [<sdkfullpath>|<sdkname>] [<infoitem>] ]\nxcodebuild -list [[-project\
  \ <projectname>]|[-workspace <workspacename>]]\nxcodebuild -showsdks\nxcodebuild\
  \ -exportArchive -exportFormat <format> -archivePath <xcarchivepath> -exportPath\n\
  <destinationpath> [-exportProvisioningProfile <profilename>] [-exportSigningIdentity\
  \ <identityname>]\n[-exportInstallerIdentity <identityname>]\n```\n\n`xcodebuild`\
  \ 是那种一旦你学会如何使用，就能为你完成大量工作的工具之一。如果你开始使用命令行，你会经常用到这个命令：`xcodebuild` 用于构建 Xcode 项目和\
  \ workspace，实际上当你按下 `⌘ + B` 时，Xcode 使用的就是这个命令。\n\nXcode 依赖 `xcodebuild` 来执行“Product”菜单中的大部分操作，事实上，以下这些功能都可以通过\
  \ `xcodebuild` 的“构建动作”来完成：`build`、`analyze`、`archive`、`test`、`install` & `installsrc`\
  \ 和 `clean`。\n\n让我们回到终端，导航到 Github Jobs Xcode 项目所在的目录，直接切入正题，使用 `xcodebuild` 命令且不带任何选项或参数来构建应用程序。在这种情况下，构建应用程序是默认行为。\n\
  \n```bash\n$ xcodebuild\nThe following build commands failed:\nLd build/Github\\\
  \ Jobs.build/Release-iphoneos/Github\\ Jobs.build/Objects-normal/armv7s/Github\\\
  \ Jobs normal armv7s\n```\n\n\n\n``` \nLd build/Github\\ Jobs.build/Release-iphoneos/Github\\\
  \ Jobs.build/Objects-normal/arm64/Github\\ Jobs normal arm64\n\nLd build/Github\\\
  \ Jobs.build/Release-iphoneos/Github\\ Jobs.build/Objects-normal/armv7/Github\\\
  \ Jobs normal armv7\n\n(3 failures)\n```\n\n如上所示，未传入任何参数就尝试构建应用程序将导致失败，并恰好遇到三个错误。实际上，每个架构对应一个错误：`armv7`、`armv7s`\
  \ 和 `arm64`，这些是 iOS 设备中嵌入的处理器类型。每个 ARM 版本在引入改进的同时，也向后兼容之前的版本。在编译代码时，处理编译过程的编译器只会为目标架构生成指令。目前市面上有很多\
  \ iPhone 设备，但苹果的建议是您只需支持最新的几款机型。不同的机型配备不同的处理器。\n\n这就是为什么应用程序需要为所有需要支持的架构多次构建的原因。iPhone\
  \ 3GS、4 和 4S 搭载的是 `ARMV7` 处理器。虽然可以假设现在还在正常使用的 iPhone 3GS 已经不多了，但仍然有很多 iPhone 4S\
  \ 每天都在被使用。iPhone 5 搭载的是 `ARMV7s` 处理器，而 iPhone 5S 则采用了 `ARM64` 架构。这样一来，您就有三个需要支持的架构，这也正是\
  \ `xcodebuild` 指令给出三个错误的原因：应用程序无法为任何一个架构构建。实际上，这些信息很难全部记住，因此有一个非常有用的网站以一种非常易于理解的方式展示了这些内容：[`iossupportmatrix.com/`](http://iossupportmatrix.com/)。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 4 章：调用命令行的强大功能**\n\n首先要注意到的一点是，由于我们没有指定要使用的配置，`xcodebuild`\
  \ 选择了默认配置：Release。然而，这并不是我们想要的。在上一章中，我们使用 AdHoc 配置构建了应用程序，而当我们在这里尝试做同样的事情时，我们将使用\
  \ `–configuration` 选项来告诉 `xcodebuild` 使用我们在第 2 章中创建的 **AdHoc** 配置。\n\n```\n$ xcodebuild\
  \ –configuration AdHoc\n```\n\n以下构建命令失败：\n\n```\nLd build/Github\\ Jobs.build/AdHoc-iphoneos/Github\\\
  \ Jobs.build/Objects-normal/armv7/Github\\ Jobs normal armv7\n\nLd build/Github\\\
  \ Jobs.build/AdHoc-iphoneos/Github\\ Jobs.build/Objects-normal/armv7s/Github\\ Jobs\
  \ normal armv7s\n\nLd build/Github\\ Jobs.build/AdHoc-iphoneos/Github\\ Jobs.build/Objects-normal/arm64/Github\\\
  \ Jobs normal arm64\n\n(3 failures)\n```\n\n情况有所好转，但命令在构建过程中仍然失败，并且似乎无法使用链接器命令 `ld`。它的目标是组合多个目标文件和库，解析引用，并生成一个输出文件。由于它总是生成单一架构的文件，因此由于我们之前提到的项目有三个有效架构，它必须被使用三次。\n\
  \n`ld` 是您实际上不需要了解的命令之一，因为您永远不必直接使用它。编译器通常会处理它。\n\n让我们尝试通过分析 `xcodebuild` 命令的输出来查看实际错误是什么。好消息是我们的应用程序足够小，因此编译过程不需要做很多事情，例如编译一堆实现\
  \ `.m` 文件，将非常简单的故事板文件转换为应用程序启动时将加载的 Nib 文件。这意味着理解正在发生的事情会相当容易。如果您滚动到输出底部，即第一个 `ld`\
  \ 命令运行的地方，您应该会找到类似这样的内容：\n\n```\nld build/Github\\ Jobs.build/AdHoc-iphoneos/Github\\\
  \ Jobs.build/Objects-normal/armv7/Github\\ Jobs\\ beta normal armv7\n\ncd \"/Users/Palleas/Projects/Apress/Github\
  \ Jobs\"\n\nexport IPHONEOS_DEPLOYMENT_TARGET=7.1\n\nexport PATH=\"/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/usr/bin:/Applications/Xcode.app/Contents/Developer/usr/bin\"\
  \n\n/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/clang\
  \ -arch armv7 -isysroot /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS7.1.sdk\
  \ -L/Users/Palleas/Projects/Apress/Github\\ Jobs/build/AdHoc-iphoneos -F/Users/Palleas/Projects/Apress/Github\\\
  \ Jobs/build/AdHoc-iphoneos -filelist /Users/Palleas/Projects/Apress/Github\\ Jobs/build/Github\\\
  \ Jobs.build/AdHoc-iphoneos/Github\\ Jobs.build/Objects-normal/armv7/Github\\ Jobs\\\
  \ beta.LinkFileList -dead_strip -ObjC -framework QuartzCore -fobjc-arc -fobjc-link-runtime\
  \ -miphoneos-version-min=7.1 -framework CoreGraphics -framework UIKit -framework\
  \ Foundation -lPods-Github\\ Jobs -Xlinker -dependency_info -Xlinker /Users/Palleas/Projects/Apress/Github\\\
  \ Jobs/build/Github\\ Jobs.build/AdHoc-iphoneos/Github\\ Jobs.build/Objects-normal/armv7/Github\\\
  \ Jobs\\ beta_dependency_info.dat -o /Users/Palleas/Projects/Apress/Github\\ Jobs/build/Github\\\
  \ Jobs.build/AdHoc-iphoneos/Github\\ Jobs.build/Objects-normal/armv7/Github\\ Jobs\\\
  \ beta\n\nld: library not found for -lPods-Github Jobs\n\nclang: error: linker command\
  \ failed with exit code 1 (use -v to see invocation)\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 42](img/index-52_1.jpg)\n\n**第 4 章：调用命令行的强大功能**\n\n这段文本块是在 `xcodebuild`\
  \ 过程中实际在底层调用 `clang` 时运行的命令。`clang` 是 Xcode 用于编译 C、C++ 和 Objective-C 的编译器，它还提供诸如静态代码分析器和代码风格检查工具等工具。虽然深入讨论这些不是本章的目标，但我们将在第\
  \ 10 章讨论质量保证时进一步介绍它们。这一段中重要的是，`clang` 被调用了很多参数。当您在应用程序的构建设置中进行配置时，Xcode 会管理这些参数，但您也可以显式地在“Other\
  \ linker flags”部分中设置一些参数，如图 4-3 所示。\n\n**图 4-3.** “Other linker flags”设置可用于添加框架（QuartzCore）并告诉链接器将源输入文件视为\
  \ Objective-C 输入\n\n我们在这里遇到的问题源于在调用 `clang` 时传递的 `-lPods-Github\\ Jobs` 参数，它不知道我们要求链接到编译后的应用程序的这个库——这是由于\
  \ Cocoapods 引起的。\n\n当您使用 Cocoapods 在 PodFile 中声明依赖项时，Cocoapods 实际上会修改您的项目，并要求您使用生成的工作区文件。在这个工作区中，您会找到您原始的\
  \ Xcode 项目 Github Jobs，以及一个名为“Pods”的新项目。它包含了在运行 `pod install` 期间下载的依赖项，我们在第 2 章中已经讨论过这一点。\n\
  \n当您构建 Github Jobs 应用程序时，Pods 项目实际上首先被编译成一个静态库，然后与主应用程序链接。虽然完全可以使用子项目而不是工作区来避免我们遇到的这个问题，但这是默认行为，也是苹果建议您管理依赖项的方式。\n\
  \n`xcodebuild` 不会自动检测您是否在使用工作区而不是简单的项目文件，您必须使用 `–workspace` 选项显式地将其传递给 `xcodebuild`。当您使用\
  \ `–workspace` 选项时，还必须使用 `-scheme` 选项，否则 `xcodebuild` 会向您报错：\n\n```\n$ xcodebuild\
  \ -workspace Github\\ Jobs.xcworkspace -scheme Github\\ Jobs\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 4 章：调用命令行的强大功能**\n\n\n\n此命令执行后，屏幕上应显示大量指令信息，并在最后看到“构架成功”的提示。恭喜你，你已经通过命令行成功构建了\
  \ iOS 应用程序。不过，此时应用程序实际上还不可用。正如我们之前所说，这仅仅是模拟了在 Xcode 中按下 ⌘ + B 时的操作，而不是 ⌘ + R（运行），更不是\
  \ ⌘ + B（归档）。在能够发送应用程序的构建版本之前，还缺少几个步骤，这也是整个流程的最后阶段。\n\n尽管如此，现在我们已经能够构建应用程序了，这是判断应用程序当前状态的首要指标。一旦搭建好持续集成平台，我们就能够检测到：在你或同事对应用程序进行修改后，应用程序是否依然能够成功构建。\n\
  \n虽然这些反馈信息对于判断是否应该将这段代码集成到应用程序中帮助有限，但它却是最重要的一个环节。\n\n你现在可能会问：既然可以直接给出正确的命令，为什么我们还要绕这么大弯子写这么多内容？答案在于：如果你想将\
  \ `xcodebuild` 命令作为持续集成流程的一部分来使用，就必须理解其工作原理。只有能够深入分析 `xcodebuild` 产生的大量输出信息，你才能明白应用程序为何构建失败。\n\
  \n然而，即使是经验丰富的 iOS 和 OSX 开发者，也会觉得 `xcodebuild` 的输出如同天书。要从海量文本中找出构建失败的原因不仅令人恼火，更关键的是非常耗时。正因如此，像\
  \ `xctool` 这样的替代构建工具应运而生。\n\n### 使用 Xctool 构建应用\n\n别担心，这次我们直接切入正题。`xctool` 是苹果 `xcodebuild`\
  \ 的替代工具，能让你更轻松地通过命令行构建和测试 iOS 及 OSX 应用程序。它由 Facebook 创建并维护，旨在提供更易读的构建输出信息，并具备一些对持续集成特别有用的功能。\n\
  \n在相当长一段时间里，`xctool` 也是从命令行运行 iOS 应用程序单元测试的唯一解决方案。苹果在 Xcode 5.1 中修复了这个问题，现在 iOS\
  \ 项目也可以使用 `xcodebuild` 的“test”构建操作了。\n\n要安装 `xctool`，只需将其克隆到计算机的某个目录下。例如，我们在 `$HOME`\
  \ 目录下创建了一个 `Tools` 文件夹，然后将其克隆到该目录中。\n\n```\n$ mkdir ~/Tools\n$ cd ~/Tools\n$ git\
  \ clone git@github.com:facebook/xctool.git\n$ cd xctool\n```\n\n`xctool` 仓库包含大量文件，但对我们最重要的是\
  \ `xctool.sh` 文件：所有命令都将通过这个 shell 脚本来运行。仅克隆仓库还不足以在项目中使用 `xctool`：你还需要构建它。不过别担心，你无需使用开源项目文档中常见的复杂构建流程。对于\
  \ `xctool` 来说，过程非常直接：它会在首次调用时自行构建。讽刺的是，`xctool` 本身正是通过 `xcodebuild` 来构建的。\n\n我们先来查询\
  \ `xctool` 的当前版本。\n\n```\n$ ./xctool.sh -version\n=== 构建 XCTOOL ===\n/Users/Palleas/Tools/xctool/scripts/build.sh\n\
  ✓ 成功构建 xctool（耗时 98000 毫秒）\n0.1.15\n```\n\n现在我们已经成功安装了 `xctool`，回到 Github Jobs 项目所在的目录，并在此处构建应用程序。需要注意的是，还有其他安装\
  \ `xctool` 的方法，最简便的方式可能是使用 `Homebrew`——这是一个用 Ruby 编写的 OSX 包管理器，能大幅简化你的工作。如果你尚未安装，建议立即访问\
  \ [`brew.sh/`](http://brew.sh/) 进行安装。\n\n\n\nHomebrew 需要 Xcode 命令行工具才能正常运行，因此如果你不记得如何轻松安装它们，请返回前几页查看！\n\
  \n我们已经将 `xctool` 安装在 `~/Tools/xctool` 目录中。这就是为什么我们应该使用相对路径来调用 `xctool.sh` 脚本，如下所示：\n\
  \n```\n$ ~/Tools/xctool/xctool.sh -v\n0.1.15\n```\n\n不过，这显然不是理想的做法。这就是为什么我们将使用另一个名为\
  \ `$PATH` 的环境变量。此变量包含一个由冒号分隔的列表，列出了用户可访问的所有包含可执行工具的目录。让我们将 `xctool` 的安装文件夹添加到这个列表中。\n\
  \n```\n$ export PATH=$HOME/Tools/xctool:$PATH\n```\n\n请注意，无法简单地向此路径变量中推送一个值，这就是我们只是将\
  \ `~/Tools/xctool` 目录拼接在现有变量开头的原因，也是你在修改此环境变量时必须格外小心的原因。\n\n`xctool` 在许多方面与 `xcodebuild`\
  \ 类似：大多数选项和参数都是相同的。不过，该工具本身稍微严格一些，如果不至少指定一个 `-scheme` 参数，你将无法调用它。在我们的例子中，我们还希望构建一个工作区，而不是一个简单的\
  \ Xcode 项目（默认行为），并且我们希望使用 `AdHoc` 配置。这就是我们使用 `--workspace` 和 `-configuration` 参数的原因：\n\
  \n```\n$ xctool.sh -workspace Github\\ Jobs.xcworkspace -scheme Github\\ Jobs\n\
  [Info] 正在加载方案 'Github Jobs' 的设置... (1142 ms)\n=== 构建 ===\nxcodebuild build Github\
  \ Jobs\nPods / Pods-Github Jobs-SVProgressHUD (AdHoc)\n√ 检查依赖项 (111 ms)\n√ 写入辅助文件\
  \ (7 ms)\n...\n```\n\n首先要注意的是 `xctool` 的输出更加清晰。不再是一大堆难以理解的文本，现在你可以获得按构建过程所有主要步骤分组的输出。\n\
  \n如果你也在自己的电脑上运行了该命令，你应该会注意到输出还带有颜色。\n\n`xctool` 的优点众多。界面美观漂亮是一回事，提供真正有用的功能则是另一回事。除了美观的（默认）报告器外，`xctool`\
  \ 还提供了不同的报告器，使其更容易与持续集成工具（例如 Jenkins，我们将在下一章中介绍）集成。它还支持基于 JSON 的配置文件格式，因此调用 `xctool`\
  \ 不再是一件痛苦的事。要使用它，只需创建一个包含以下内容的 `.xctool-args` 文件：\n\n```\n[\n  \"-workspace\", \"\
  Github Jobs.xcworkspace\",\n  \"-scheme\", \"Github Jobs\",\n  \"-configuration\"\
  , \"AdHoc\"\n]\n```\n\n有了这个文件，现在可以在不带任何选项或参数的情况下调用 `xctool`，并使用正确的工作区和方案构建应用程序。\n\
  \n即使 `xctool` 是一个非常棒的工具，你也必须再次记住，这并非万能灵药。\n\n如前所述，`xctool` 是 iOS 和 OSX 项目替代 Apple\
  \ 的 `xcodebuild` 的构建解决方案，由 Facebook 维护。例如，这意味着该工具可能会随着 Apple 开发者工具的新版本发布而失效。事实上，在很长一段时间里，`xctool`\
  \ 都无法构建 Xcode 5.1 项目。\n\n这就是为什么你也应该考虑其他解决方案，例如 `xcpretty`。它的创建者 Marin Usalj 选择了一种不同的方法。他没有创建一个新的构建工具来解决输出可读性问题，而是选择格式化输出并使其美观。\n\
  \n### 使用 `xcpretty` 格式化 `xcodebuild` 输出\n\n安装 `xcpretty` 最简单的方法，就像任何其他 Ruby 工具一样，是使用\
  \ Rubygem。\n\n```\n$ gem install xcpretty\n```\n\n然后，使用 `xcpretty` 就非常简单了。你所要做的就是利用一个名为管道（pipes）的\
  \ shell 功能。\n\n```\n$ xcodebuild -workspace Github\\ Jobs.xcworkspace -scheme Github\\\
  \ Jobs -configuration AdHoc build | xcpretty -c\n▸ 正在构建 Pods/Pods-Github Jobs-SVProgressHUD\
  \ [AdHoc]\n▸ 预编译 Jobs-SVProgressHUD-prefix.pch\n▸ 预编译 Jobs-SVProgressHUD-prefix.pch\n\
  ▸ 预编译 Jobs-SVProgressHUD-prefix.pch\n▸ 预编译 Jobs-SVProgressHUD-prefix.pch\n▸ 预编译\
  \ Jobs-SVProgressHUD-prefix.pch\n▸ 预编译 Jobs-SVProgressHUD-prefix.pch\n▸ 编译 Pods-Github\\\
  \ Jobs-SVProgressHUD-dummy.o Pods-Github\\ Jobs-SVProgressHUD-dummy.m\n▸ 编译 Pods-Github\\\
  \ Jobs-SVProgressHUD-dummy.o Pods-Github\\ Jobs-SVProgressHUD-dummy.m\n▸ 编译 SVProgressHUD.m\n\
  ▸ 编译 SVProgressHUD.m\n▸ 编译 Pods-Github\\ Jobs-SVProgressHUD-dummy.o Pods-Github\\\
  \ Jobs-SVProgressHUD-dummy.m\n▸ 编译 SVProgressHUD.m\n...\n```\n\n格式化后的输出与 `xctool`\
  \ 生成的输出非常相似：按构建的主要步骤分组，并且 `-c` 选项为输出添加了一些颜色。与 `xctool` 一样，它也提供了多种格式化器，例如 `junit`\
  \ 以便于集成（与 `xctool` 一样）到 Jenkins，以及 `html`、`tap` 或 `rspec`。\n\n本章的目的并不是告诉你 `xcpretty`\
  \ 比 `xctool` 做得更好，而只是为你提供备选方案。这两种解决方案都是为了提供更好的输出，特别是 `junit` 输出，它将在我们后续章节设置 Jenkins\
  \ 和 Bamboo 中的单元测试时派上用场。\n\n## Xcode 项目文件剖析与方案共享\n\n现在你已经了解了如何使用两种不同的工具从命令行构建 iOS\
  \ 应用程序，你可能已经注意到两者有一个共同的行为：它们都需要一个有效的 Xcode 项目文件或工作区（本质上是一个包含 Xcode 项目的增强型文件夹），更重要的是，它们都需要一个有效的方案。\n\
  \n无论你是否意识到，你已经使用过 Xcode 目标（targets）。目标指定了要构建的产品以及如何通过构建阶段（例如编译源代码、复制头文件和资源、链接框架和构建设置）来构建它。在我们的“Github\
  \ Jobs”Xcode 项目中，我们已经有了两个目标——一个用于主应用程序，另一个用于运行单元测试。你可以根据需要拥有任意数量的目标，并且某些目标可以依赖于其他目标。方案本质上是一组目标的集合，以及其他一些东西，并且可以存储在不同的层级：项目层级和工作区层级。你可以通过使用\
  \ `xcodebuild` 命令的 `-list` 参数从命令行查看所有可用方案的列表。\n\n```\n$ xcodebuild -list\n项目 \"\
  Github Jobs\" 的信息：\n目标：\n    Github Jobs\n    Github JobsTests\n构建配置：\n    Debug\n\
  \    AdHoc\n    Release\n如果未指定构建配置且未传递 -scheme，则使用 \"Release\"。\n方案：\n    Github\
  \ Jobs\n```\n\n如果在工作区文件内运行相同的命令，你应该只会看到 Cocoapods 在首次运行 `pod install` 命令创建工作区时自动生成的方案。\n\
  \n```\n$ xcodebuild -list -workspace Github\\ Jobs.xcworkspace\n工作区 \"Github Jobs\"\
  \ 的信息：\n方案：\n    Pods-Github Jobs\n    Pods-Github Jobs-SVProgressHUD\n```\n\n在我们的例子中，我们只关心“Github\
  \ Jobs”方案。这也是我们到目前为止一直在使用的方案。\n\n顺便说一下，不要让关于“Release”配置的信息误导你；当你的项目使用工作区时，你实际上需要向\
  \ `xcodebuild` 命令传递一个有效的方案参数。\n\n事实上，如果你不这样做，将会收到以下错误：\n\n```\n$ xcodebuild -workspace\
  \ Github\\ Jobs.xcworkspace build\nxcodebuild: 错误: 如果你指定了工作区，则还必须指定一个方案。使用 -list\
  \ 查看此工作区中的方案。\n```\n\n\n\n假设现在是时候让第二位开发者加入团队，与你一起开发这款应用。他首先会从公司的 Git 仓库中拉取最新源码，然后执行`pod\
  \ install`命令（还记得我们建议你忽略`Pods`文件夹吧），并希望确保一切顺利。在打开终端窗口后，他会尝试从命令行构建应用：\n\n```\n$ xcodebuild\
  \ -workspace Github\\ Jobs.xcworkspace –scheme Github\\ Jobs build\nxcodebuild:\
  \ error: The workspace 'Github Jobs' does not contain a scheme named 'Github Jobs'.\n\
  ```\n\n还记得我们提到过，`scheme`可以存储在不同层级吗？现在设想一下，在接下来的章节中，这位新开发者实际上是一个自动化构建平台，比如`Jenkins`或`Bamboo`，那么你就会因为一个愚蠢的原因而获得一个构建失败的结果。\n\
  \n从命令行或直接从访达（Finder）中查看关于一个`scheme`的所有信息是很容易的。\n\n1.  打开一个访达窗口，导航到存储`Github Jobs`项目的文件夹。\n\
  2.  右键点击`Github Jobs.xcodeproj`，然后选择“显示包内容”。\n3.  选择`xcuserdata`文件夹，然后是`YourUser.xcuserdatad`，最后是`xcschemes`文件夹。你应该能在那里找到你的`Github\
  \ Jobs` scheme，如图 4-4 所示。\n\n**图 4-4.** `Github Jobs` scheme 是存储在`Xcodeproj`包中某个位置的一个文件\n\
  \n公平地说，对于 Xcode 和这位新开发者来说，当他第一次在 Xcode 中打开项目时，`Github Jobs` scheme 会被自动创建，并且可以在与`Palleas.xcuserdatad`同级的新`xcuserdatad`包中找到。\n\
  \n不过，自动化构建平台不会用 Xcode 打开项目。即使从技术上讲，考虑到构建平台运行在一台能够启动 Xcode 的 OSX 电脑上，这是可行的，但这绝对不是此类工具的目的。\n\
  \n解决方案在于 Xcode 的 scheme 管理面板中的一个 UI 元素。回到 Xcode，在窗口左上方，靠近“构建并运行”按钮的地方，选择`Github\
  \ Jobs`下拉菜单。\n\n选择“管理 Schemes...”菜单项。你应该会看到项目中所有可用 scheme 的列表。勾选“共享”列中的第一个复选框，然后点击“确定”。\n\
  \n此时发生了两件事。首先，如果你回去探索`Xcodeproj`包的内容，你将不再看到存储在`YourUser.xcuserdatad`中的`Github Jobs.xcscheme`文件。\n\
  \n然后，会创建一个`xcshareddata`文件夹，其中包含缺失的`Github Jobs.xcscheme`文件，该文件位于一个类似的`xcschemes`文件夹中。\n\
  \n这看起来有点复杂，但我们之所以要讨论这种架构，是有很多原因的。\n\n最明显的一个原因是，正如我们之前提到的，这可以防止自动化构建平台出现构建失败。更准确地说，当你设置持续集成平台时，它将帮助你理解为什么首次构建会失败。无论\
  \ iOS 开发经验有多少年，开发者偶尔都会忘记勾选那个复选框。\n\n重要的是，与你的同事和自动化构建平台共享 scheme，可以让你在完全相同的环境中工作。毕竟，`scheme`只不过是一堆配置设置，在你的团队中共享它们，并避免来自同事的误报和“但它在我的电脑上构建成功了”这类消息，是非常重要的。\n\
  \n## 从命令行创建 IPA 文件\n\n我们已经花了足够多的时间来构建应用，却无法实际运行它，更不用说向你的客户或 QA 团队成员发送测试版本了。如果你还记得第\
  \ 2 章的内容，或者仅仅是从经验出发，创建 IPA 文件是 Organizer 窗口中的一个可用操作。\n\n这是一个需要两到三步的过程，最终会在你的桌面上生成一个可分发的文件。让我们看看如何通过命令行实现同样的目标。\n\
  \n现在是时候了解 Xcode 生态系统中的另一个工具了：`xcrun`；但首先，让我们谈谈`IPA`文件格式。`IPA`文件包含一个 iOS 应用。它们只能在\
  \ iOS 设备（如 iPhone 和 iPad）上运行，并且只能通过 iTunes 或 iPhone 配置实用工具（如第 3 章所示）打开。`IPA`文件基本上是一个经过加密的、被美化的\
  \ ZIP 归档文件，其中包含一个`.app`文件，就像我们在过去十页左右一直在创建的那种。实际上，你可以不使用任何专用工具来创建`IPA`文件。考虑到`xcrun`会为你完成这项工作（甚至更多），这会是浪费时间，但从技术上讲是可行的。\n\
  \n让我们看看我们在上一章中创建的`IPA`文件。首先将其重命名为`Github Jobs.zip`，然后直接在访达中双击该文件。使用`unzip`命令的等效命令行过程会快得多，结果如下：\n\
  \n```\n$ unzip Github\\ Jobs.ipa\nArchive: Github Jobs.ipa\ncreating: Payload/\n\
  creating: Payload/Github Jobs.app/\ncreating: Payload/Github Jobs.app/_CodeSignature/\n\
  inflating: Payload/Github Jobs.app/_CodeSignature/CodeResources\ninflating: Payload/Github\
  \ Jobs.app/Assets.car\ncreating: Payload/Github Jobs.app/Base.lproj/\ncreating:\
  \ Payload/Github Jobs.app/Base.lproj/Main.storyboardc/\ninflating: Payload/Github\
  \ Jobs.app/Base.lproj/Main.storyboardc/72K-nL-0Mz-view-WoX-oB-R4e.nib\ninflating:\
  \ Payload/Github Jobs.app/Base.lproj/Main.storyboardc/Info.plist\ninflating: Payload/Github\
  \ Jobs.app/Base.lproj/Main.storyboardc/UIViewController-1Id-ia-L1b.nib\ninflating:\
  \ Payload/Github Jobs.app/embedded.mobileprovision\ncreating: Payload/Github Jobs.app/en.lproj/\n\
  inflating: Payload/Github Jobs.app/en.lproj/InfoPlist.strings\ninflating: Payload/Github\
  \ Jobs.app/Github Jobs\ninflating: Payload/Github Jobs.app/Info.plist\ninflating:\
  \ Payload/Github Jobs.app/LaunchImage-700-568h@2x.png\nextracting: Payload/Github\
  \ Jobs.app/PkgInfo\ninflating: Payload/Github Jobs.app/ResourceRules.plist\ncreating:\
  \ Payload/Github Jobs.app/SVProgressHUD.bundle/\ninflating: Payload/Github Jobs.app/SVProgressHUD.bundle/angle-mask@2x.png\n\
  extracting: Payload/Github Jobs.app/SVProgressHUD.bundle/error@2x.png\nextracting:\
  \ Payload/Github Jobs.app/SVProgressHUD.bundle/success@2x.png\n```\n\n如你所见，所有内容就是一个包含应用的`Payload`文件夹。\n\
  \n`xcrun`可执行文件是一个命令行工具，它和 Xcode 一起提供，就像`xcodebuild`一样，并且它也受到开发者目录位置和`$DEVELOPER_DIR`环境变量的影响。它有两个主要目的：查找开发工具并执行它们。\n\
  \n我们之前提到过，名为`ld`的链接可执行文件是 Xcode 开发工具链的一部分，可以使用`xcrun`来定位，就像`clang`、`git`或任何其他随 Xcode\
  \ 提供的工具一样：\n\n```\n$ xcrun --find ld\n/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/ld\n\
  \n$ xcrun --find git\n/Applications/Xcode.app/Contents/Developer/usr/bin/git\n\n\
  $ xcrun --find clang\n```\n\n\n\n`/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/clang`\
  \ `xcrun` 还能在定位到开发者工具后直接为您运行这些工具。要使用 `xcrun` 执行命令，只需在命令前加上 `xcrun` 即可。但请注意，`xcrun`\
  \ 可能会绕过传统的 `$PATH` 环境变量来定位可执行文件。因此，如果您要求它执行以下操作，不要指望它会直接使用电脑上新安装的 `git` 版本：`$ git\
  \ –version`\n\n```\ngit version 1.9.1\n```\n\n`$ xcrun git --version`\n\n```\ngit\
  \ version 1.8.5.2 (Apple Git-48)\n```\n\n那么，这个命令的意义何在？当然，它并非仅仅为了把事情搞得复杂。接下来，我们看看如何使用\
  \ `PackageApplication` 可执行文件来打包应用程序。根据我们刚才学到的——使用 `xcrun` 查找可执行文件——您可能认为自己能够找到 `PackageApplication`，但实际情况并非如此简单。\n\
  \n`$ xcrun PackageApplication`\n\n```\nxcrun: error: unable to find utility \"PackageApplication\"\
  , not a developer tool or in PATH\n```\n\n`xcrun` 无法找到该可执行文件，原因有二。第一，它根本不在您的 `PATH`\
  \ 环境变量中。第二，`PackageApplication` 是 iOS SDK 专属的可执行文件。由于我们没有指定要使用的 SDK，并且 `SDKROOT`\
  \ 环境变量也未设置，`xcrun` 无法找到该可执行文件的存储位置。幸运的是，解决起来很简单：我们只需使用 `--sdk` 参数即可。\n\n`$ xcrun\
  \ --sdk iphoneos --f PackageApplication`\n\n```\n/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/usr/bin/\n\
  PackageApplication\n```\n\n`PackageApplication` 最简单的用法只需提供 `xcodebuild` 命令执行完毕后生成的\
  \ `.app` 包路径，但它也会为您处理一些边界情况，例如在将应用程序打包成 IPA 文件前重新签名。您可以在命令输出的末尾找到该包的路径，其中会显示代码签名过程：\n\
  \n```\nCodeSign /Users/Palleas/Library/Developer/Xcode/DerivedData/Github_Jobs-\n\
  fxohiqkccwdfjbewpeaigyxjxsfd/Build/Products/Debug-iphoneos/Github\\ Jobs.app\n```\n\
  \n您只需使用此包的路径来调用 `PackageApplication` 命令即可：\n\n`$ xcrun -sdk iphoneos PackageApplication\
  \ /Users/Palleas/Library/Developer/Xcode/DerivedData/\nGithub_Jobs-fxohiqkccwdfjbewpeaigyxjxsfd/Build/Products/Debug-iphoneos/Github\\\
  \ Jobs.app`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图 44](img/index-61_1.jpg)\n\
  \n**第四章：调用命令行的强大功能**\n\n默认情况下，`PackageApplication` 命令非常安静：如果成功，终端不会显示任何内容，但会在被打包的\
  \ `.app` 文件附近生成一个 IPA 文件。如果您想确认操作确实发生了，需要使用 `-verbose` 参数启用详细模式。您也可以使用 `xcrun` 的\
  \ `--log` 参数来获取 `xcrun` 实际运行的命令详情。\n\n`$ xcrun --log -sdk iphoneos PackageApplication\
  \ /Users/Palleas/Library/Developer/Xcode/DerivedData/\nGithub_Jobs-fxohiqkccwdfjbewpeaigyxjxsfd/Build/Products/Debug-iphoneos/Github\\\
  \ Jobs.app -verbose`\n\n我们不会详细说明 `PackageApplication` 命令输出的每一行，但您应该会看到三个主要步骤。首先，`.app`\
  \ 包被复制到临时文件夹中新建的 `Payload` 文件夹中。此文件夹的路径可通过 `$TMPDIR` 环境变量获取。在我们的例子中，路径类似于：`/var/folders/1v/d8vqkw8x23ndw49f5vs3fzw00000gn/T/`。然后，使用\
  \ `--verify` 参数调用 `Codesign`，以确保在 `Xcodebuild` 过程中 `.app` 已正确进行代码签名。最后，之前创建的 `Payload`\
  \ 文件夹被压缩成扩展名为 “ipa” 的新归档文件。\n\n## 选择目标路径\n\n让我们花几分钟回顾一下我们所做的事情。我们获取了一个 iOS 应用的源码，使用\
  \ `xcodebuild` 命令行工具构建了应用，并创建了一个包含编译后代码和所有资源的 `.app` 包。接着，我们通过 `xcrun` 使用 `PackageApplication`\
  \ 命令行工具将应用打包成一个可在 iOS 设备上运行的归档文件。\n\n不过，这个过程还可以改进：深入挖掘 `xcodebuild` 命令的输出既痛苦又难以自动化！这就是为什么我们需要指定\
  \ `.app` 包和 `.ipa` 归档文件的目标路径。\n\n`.app` 包的目标位置是一个构建设置，如果您回到 Xcode，打开 Github Jobs\
  \ 目标（target）的构建设置，并查找存储为 `CONFIGURATION_BUILD_DIR` 的“按配置的构建产品路径”(Per-configuration\
  \ Build Products Paths)，就能看到它，如图 4-5 所示。\n\n**图 4-5.** *按配置的构建目录设置具有一个按配置的值，用于确定构建后的应用将存储在哪里*\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第四章：调用命令行的强大功能**\n\n您可以直接在\
  \ Xcode 中更改此构建设置的值，并使用显式值，但这可能会对您的同事或持续集成工具造成风险。`CONFIGURATION_BUILD_DIR` 构建设置属于那种最好在调用\
  \ `xcodebuild` 时显式传递给构建过程的设置。\n\n`$ xcodebuild -configuration AdHoc -workspace Github\\\
  \ Jobs.xcworkspace -scheme Github\\ Jobs CONFIGURATION_BUILD_DIR=\"/Users/Palleas/Projects/Github\
  \ Jobs/build\" clean build`\n\n为此使用绝对路径非常重要。您正在临时覆盖一个构建设置，这意味着在构建期间，`CONFIGURATION_BUILD_DIR`\
  \ 的值将是 “`/Users/Palleas/Projects/Github Jobs/build`”。如果您使用相对路径，例如 “`./build`”，构建将直接失败。\n\
  \n现在，我们有了 `.app` 包并且确切知道它的位置，我们可以对 IPA 文件做同样的事情，并将应用打包到一个更容易定位的文件夹，例如桌面。幸运的是，`PackageApplication`\
  \ 工具有一个 `-o`（输出）参数。\n\n`$ xcrun -sdk iphoneos PackageApplication ~/Projects/Apress/Github\\\
  \ Jobs/build/Github\\ Jobs.app -o ~/Desktop/Github\\ Jobs.ipa`\n\n## 修改应用清单\n\n\
  通过 `xcodebuild` 和 `xcrun` 命令下的 `PackageApplication`，我们现在能够仅从命令行获取一个 iOS 应用、构建它并发布它。这意味着您可以从团队成员那里接收一个项目，并在完全不打开\
  \ Xcode 的情况下完成整个过程！当然，您可能还想做一些事情，就像我们在前一章中做的那样，例如更改应用的 bundle identifier 并更新 bundle\
  \ version。\n\n我们需要的只是找到一种方法来编辑 `Info.plist`，就像我们在前一章中做的那样，而这正是 `PlistBuddy` 命令的用途。\n\
  \n在开始摆弄它之前，让我们花几分钟时间了解属性列表文件格式的工作原理。plist 文件格式在您的 Mac 或 iOS 设备上运行的操作系统中被广泛使用。它用于描述应用程序（很像\
  \ Xcode 项目中的 `Info.plist` 文件）、存储偏好设置、缓存信息。您可以用它来存储多种不同类型的信息：\n\n-   字符串（String）\n\
  -   布尔值（Boolean）\n-   整数和浮点数\n-   日期（Dates）\n-   二进制数据（Binary data）\n-   数组和字典，它们可以包含一个或多个上述所有类型的值\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第四章：调用命令行的强大功能**\n\nplist\
  \ 文件格式的众多优点之一是它基于 XML 的语法，使其易于阅读。我们已经从 Xcode 编辑过 “Github Jobs-Info.plist”，但让我们看看它的源码。您可以通过右键单击该文件并选择“打开方式...源代码”(Open\
  \ as... Source Code) 来达到同样的效果。\n\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
  ?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\"\
  >\n<plist version=\"1.0\">\n<dict>\n    <key>CFBundleDevelopmentRegion</key>\n \
  \   <string>en</string>\n    <key>CFBundleDisplayName</key>\n    <string>${PRODUCT_NAME}</string>\n\
  \    <key>CFBundleExecutable</key>\n    <string>${EXECUTABLE_NAME}</string>\n  \
  \  <key>CFBundleIdentifier</key>\n    <string>com.perfectly-cooked.${PRODUCT_NAME:rfc1034identifier}</string>\n\
  \    <key>CFBundleInfoDictionaryVersion</key>\n    <string>6.0</string>\n    <key>CFBundleName</key>\n\
  \    <string>${PRODUCT_NAME}</string>\n    <key>CFBundlePackageType</key>\n    <string>APPL</string>\n\
  \    <key>CFBundleShortVersionString</key>\n    <string>0.1</string>\n    <key>CFBundleSignature</key>\n\
  \    <string>????</string>\n    <key>CFBundleVersion</key>\n    <string>0.1</string>\n\
  \    <key>GithubJobsEndpoint</key>\n    <string>$(GITHUB_JOBS_ENDPOINT)</string>\n\
  \    <key>LSRequiresIPhoneOS</key>\n    <true/>\n    <key>UIMainStoryboardFile</key>\n\
  \    <string>Main</string>\n    <key>UIRequiredDeviceCapabilities</key>\n    <array>\n\
  \        <string>armv7</string>\n    </array>\n    <key>UISupportedInterfaceOrientations</key>\n\
  \    <array>\n        <string>UIInterfaceOrientationPortrait</string>\n        <string>UIInterfaceOrientationLandscapeLeft</string>\n\
  \        <string>UIInterfaceOrientationLandscapeRight</string>\n    </array>\n</dict>\n\
  </plist>\n```\n\n## 第四章：调用命令行之力\n\n`PlistBuddy` 可执行程序是你日常轻松处理属性列表文件的工具。它默认不在你的`PATH`中，也无法通过`xcrun`找到，因为它本身并不是一个开发者工具。我们来帮你节省一些时间，你可以在`/usr/libexec`中找到它。就像我们为`xcrun`所做的那样，我们将它添加到`PATH`中，因为我们将多次使用它。\n\
  \n```bash\n$ export PATH=/usr/libexec:$PATH\n```\n\n`PlistBuddy` 的默认行为是交互式工作。如果你不带任何参数调用它，它会打开一个功能受限的、用于属性列表文件操作的简化版\
  \ shell，你可以在其中运行简单命令来显示或更新现有值，并添加新值。\n\n让我们开始摆弄我们的`Info.plist`，以实现一个非常简单的目标：更新构建版本并存储上次更新时间。我们将从以下命令开始：\n\
  \n```bash\n$ PlistBuddy \"Github Jobs/Github Jobs-Info.plist\"\n```\n\n你可以检索当前的包版本：\n\
  \n```bash\nCommand: Print CFBundleVersion\n0.1\n```\n\n然后将其提升到 0.2：\n\n```bash\n\
  Command: Set CFBundleVersion 0.2\n```\n\n最后存储应用程序构建时的时间（注意非常特定的日期格式）：\n\n```bash\n\
  Command: add PCSLastUpdate date \"Sat Apr 19 01:14:45 GMT 2014\"\n```\n\n虽然从技术角度来看这种方法没问题，但远非方便。你可以使用`PlistBuddy`的交互模式进行调试和手动操作——尽管在你喜欢的编辑器中打开它可能更好——但`PlistBuddy`也允许你使用`-c`参数直接运行命令。在我们的例子中，这将得到以下命令：\n\
  \n```bash\n$ PlistBuddy -c \"Print CFBundleVersion\" Github\\ Jobs/Github\\ Jobs-Info.plist\n\
  0.1\n\n$ PlistBuddy -c \"Set CFBundleVersion 0.2\" Github\\ Jobs/Github\\ Jobs-Info.plist\n\
  $ PlistBuddy -c \"Add PCSLastUpdate date Sat Apr 19 01:14:45 GMT 2014\" Github\\\
  \ Jobs/Github\\ Jobs-Info.plist\n```\n\n我们在前一章提到过，发布应用程序的多个版本的缺点是之前安装的版本会被清除，而唯一可用的解决方案是更改包标识符。现在我们知道`PlistBuddy`是如何工作的了，可能性几乎是无限的。以下是你为发布某个特定分支的构建版本可以做的事情。\n\
  \n首先要做的是检索你当前所在的 git 分支名称：\n\n```bash\n$ git rev-parse --abbrev-ref HEAD\nbug-fixing-branch\n\
  ```\n\n然后，只需使用`PlistBuddy`在非交互模式下执行一条命令：\n\n```bash\n$ PlistBuddy -c \"Set CFBundleIdentifier\
  \ com.perfectly-cooked.\\${PRODUCT_NAME:rfc1034identifier}-$(git rev-parse --abbrev-ref\
  \ HEAD)\" Github\\ Jobs/Github\\ Jobs-Info.plist\n```\n\n注意，我们需要转义第一个美元符号，因为我们不希望它被\
  \ bash 求值，并且我们仍然希望使用带有 RFC1034 过滤器的占位符。在我们的例子中，我们本可以直接硬编码 \"github-jobs\" 部分，但我们已经对应用程序清单文件做了足够多的改动了。\n\
  \n你可能想知道我们为什么要用命令行来做这件事（尽管你购买这本书的事实告诉我们你可能不会这么想）。试想一个自动化构建平台，它会为你的同事希望合并的每个分支创建一个你可以测试的构建版本！\n\
  \n### 使用 Agvtool 提升构建版本\n\n使用`PlistBuddy`更新构建版本号容易出错且过于复杂。你必须确保在两个不同的地方正确更新它：简短的营销版本号和构建版本号。如果你的应用程序使用多个目标，例如一个\
  \ iOS 版本和一个 iPad 版本，你将需要更新两个`Info.plist`清单文件中的版本号。那就是要运行四条`PlistBuddy`命令！不过别担心，还有一个工具我们需要向你介绍：苹果通用版本控制工具（`agvtool`）。\n\
  \n`agvtool` 是苹果提供的一个实用程序，随 Xcode 一起提供，可以在其 Developers 目录中找到，就像我们迄今为止使用的许多其他工具一样。再次，快速使用`xcrun`将帮助你找到它：\n\
  \n```bash\n$ xcrun -f agvtool\n/Applications/Xcode.app/Contents/Developer/usr/bin/agvtool\n\
  ```\n\n`agvtool` 可以执行不同的操作，但其中大部分对我们来说都没用。如果你仔细查看文档，你应该看到“提交”操作只有在你是一名苹果员工时才能工作。此外，`agvtool`与\
  \ SVN 和 CVS 集成得非常好。我们已经阐明了我们对这两个版本控制系统的立场，所以关于这个主题我们就说这么多。我们关心的操作是`what-version`、`new-version`和`next-version`。\n\
  \n`agvtool` 不是一个简单的实用程序，它接受一个版本号作为输入并神奇地返回下一个版本。事实上，在你使用`agvtool`之前，你需要对你的 Xcode\
  \ 项目做一些修改。如果你尝试立即使用它，你将收到以下错误：\n\n```bash\n$ agvtool what-version\nThere does not\
  \ seem to be a CURRENT_PROJECT_VERSION key set for this project.\nAdd this key to\
  \ your target's expert build settings.\n```\n\n回到 \"Github Jobs\" Xcode 项目，查找版本控制构建设置。我们需要做的第一件事是将“版本控制系统”（Versioning\
  \ System）构建设置更改为 Apple Generic，并将“当前项目版本”（Current Project Version）设置为 1，如图 4-6 所示。\n\
  \n![Image 45](img/index-66_1.jpg)\n\n**图 4-6.** *Github Jobs 项目使用 Apple Generic\
  \ 版本控制系统，当前版本为 1*\n\n当我们直接设置构建版本时，使用应用程序通用版本控制系统意味着你的“当前项目版本”构建设置和应用程序清单文件中的“构建版本”属性应该同步。返回到\
  \ \"Github Jobs-Info.plist\" 并确保“包版本”（Bundle version）是 1。\n\n我们现在可以使用`agvtool`来检索当前项目的版本：\n\
  \n```bash\n$ agvtool what-version\nCurrent version of project Github Jobs is:\n\
  ```\n\n我们还可以使用它来更改“当前项目版本”构建设置以及项目中所有`Info.plist`文件的`CFBundleVersion`属性中的当前版本：\n\
  \n```bash\n$ agvtool new-version -all 1.2.3\nSetting version of project Github Jobs\
  \ to:\n1.2.3.\nAlso setting CFBundleVersion key (assuming it exists)\nUpdating CFBundleVersion\
  \ in Info.plist(s)...\n```\n\n\n已将`\"Github Jobs.xcodeproj/../Github Jobs/Github\
  \ Jobs-Info.plist\"`中的 CFBundleVersion 更新为`1.2.3`\n\n已将`\"Github Jobs.xcodeproj/../Github\
  \ JobsTests/Github JobsTests-Info.plist\"`中的 CFBundleVersion 更新为`1.2.3`\n\n在持续集成领域有一条黄金法则：在构建应用程序之前，尽量避免对应用进行过多修改。目前我们处于交互式模式，手动运行构建命令，但当我们在自动化构建平台上运行这些命令时，你会发现它们远没有那么宽容。\n\
  \n## 总结与收官\n\n在过去十五页左右的内容中，我们一直在编写命令，现在是时候将这些命令整合起来，以便一次性重新运行所有操作：包括构建和应用程序打包。为此，我们将编写一个简单的\
  \ bash 脚本。首先，在`\"Github Jobs\"`项目的根目录下创建一个`bin`目录。按照惯例，这是存放项目可执行工具的地方。\n\n```\n\
  $ mkdir bin\n$ touch bin/cibuild\n$ chmod +x bin/cibuild\n```\n\n请注意，我们使用了`chmod`命令来为新创建的脚本添加可执行文件权限。\n\
  \n这个构建脚本的内容相当直接明了：\n\n```bash\n#!/bin/bash\n\nWORKSPACE=\"Github Jobs.xcworkspace\"\
  \nSCHEME=\"Github Jobs\"\nBUILD_DIR=\"$(pwd)/build\"\nCONFIGURATION=\"AdHoc\"\n\
  ARCHIVE_FILENAME=\"Github Jobs.app\"\nIPA_FILENAME=\"Github Jobs.ipa\"\n\nsecurity\
  \ unlock-keychain -p $PASSWORD $HOME/Library/Keychains/login.keychain\n\npod install\n\
  \nxcodebuild -workspace \"$WORKSPACE\" -scheme \"$SCHEME\" -configuration CONFIGURATION_BUILD_DIR=\"\
  $BUILD_DIR\" clean build | xcpretty -c\n\nxcrun -sdk iphoneos PackageApplication\
  \ \"$BUILD_DIR/$ARCHIVE_FILENAME\" -o \"$BUILD_DIR/$IPA_FILENAME\"\n```\n\n第一行被称为\"\
  shebang\"，它告诉 shell 该脚本应使用 bash 进行解析。\n\n这个脚本非常简单，没有使用任何 shell 特有的工具，因此这部分并非必需，但这是一个良好的习惯。\n\
  \n接下来的代码块定义了一堆变量，没什么特别的，脚本其余部分除了`security`命令外，都是本章前几节已经介绍过的内容。\n\n`security`命令是钥匙串及相关安全功能的命令行接口。\n\
  \n它能够做的事情之一是在短时间内解锁钥匙串。当你首次构建应用程序时，会弹出一个面板，询问你是否授权某个进程访问你的钥匙串。在我们的案例中，这个进程是`CodeSign`，该命令在`xcodebuild`结束时执行，需要访问存储在钥匙串中的私钥和证书来为构建签名。\n\
  \n请注意，在代码中硬编码密码确实不够安全，因此脚本中并未定义`$PASSWORD`变量，而是像这样调用脚本：\n\n```\n$ PASSWORD=mypassword\
  \ bin/cibuild\n```\n\n这样虽然好不了多少，但至少你可以分享脚本并将其加入版本控制，而不会泄露密码。在接下来的章节中，我们将开始讨论如何将此脚本集成到带有安全凭据存储方式的自动化构建平台中。\n\
  \n## 本章小结\n\n在本章中，我们简要介绍了 iOS 开发者可用的命令行工具，这些工具能帮助开发者提高效率并了解底层工作原理。Shenzhen、`xctool`和`xcpretty`都是由其他开发者创建的，他们希望利用命令行的强大功能，并通过分享他们的工作来回馈社区。\n\
  \n我们希望已经说服你，命令行并不可怕，而且能提供巨大帮助。使用`xcodebuild`构建应用程序、`xcrun`定位所需工具、`PackageApplication`生成最终的`ipa`文件……苹果为开发者提供了许多工具，有助于我们搭建持续集成环境。\n\
  \n下一章将正式开始介绍这方面内容，从一个名为 Jenkins 的持续集成平台开始。\n\n---\n\n"
- "# 使用 Jenkins 进行自动化构建\n\n我们花了几乎半本书的篇幅来介绍概念，现在终于到了开始讨论持续集成的时候了。在过去的章节中，我们的目标是带你了解可用的工具。既然我们已经知道苹果提供了所需的一切，那么接下来就用\
  \ Jenkins 搭建我们的持续集成自动化构建平台。\n\n在动手之前，我们需要回答一个问题：什么是自动化构建平台？为什么需要它？\n\n## 为什么我们需要自动化构建平台？\n\
  \n自动化构建平台运行专门的构建流程，我们通常称之为\"任务\"。一个任务可以执行多种操作，从构建应用程序到根据团队规范检查代码风格。每当项目发生变更时，任务会自动启动，或者甚至手动启动，有时一天会运行多次。自动化构建平台通常提供用户界面，以简化任务的创建和任务执行结果的利用。这样看来，它基本上就是一个美化的`crontab`网页界面。那么，它的附加价值在哪里？\n\
  \n在项目的生命周期中，你需要集成同事的代码片段，并确保这些代码片段不会以任何方式损害最终产品。我们已经介绍了如何从命令行快速构建应用程序，在接下来的章节中，我们将讨论单元测试和质量保证。事实是，如果你忘记运行这些工具，它们就毫无用处，而你很可能会忘记。这可能是因为你过于自信于自己的代码审查技能，或者仅仅是因为截止日期太近，但指望开发者去运行那些会让他们感到烦扰的工具是不切实际的。自动化构建平台的主要目的是通过尽可能频繁地构建应用程序，来维持对应用程序代码库的一定信心。\n\
  \n持续集成旨在通过提高集成频率来减少集成的痛苦，这正是自动化构建平台能够提供帮助的原因。\n\n自动化构建平台必须运行在独立的环境中，绝对不能运行在开发者的个人电脑上。再次强调，你需要能够信任你的自动化构建平台。\"\
  但我搞不懂，应用程序在我的电脑上能构建成功啊！\"这种争论是你希望避免的。\n\n我们将从一个非常著名的自动化构建平台开始：Jenkins。\n\n## Jenkins\
  \ 与 Hudson：一段历史\n\nJenkins 是一个用 Java 编写的持续集成平台，发布于十年前。它最初于 2004 年在 Sun Microsystems\
  \ 以\"Hudson\"的名字问世，是 CruiseControl（同样用 Java 编写）的第一个可行替代品。\n\n2010 年 Sun Microsystems\
  \ 被 Oracle 收购时，社区中出现了一个问题，结果是当 Oracle 申请商标时，项目更名，Jenkins 由此诞生。不过，Oracle 宣布 Hudson\
  \ 仍将得到维护，项目将继续发展。如今，这两个项目都仍在运营，尽管根据各自 GitHub 组织的最新成员和公共仓库数量来看，Jenkins 似乎赢得了人气竞赛。\n\
  \n\n\n它们共享同一个代码库，时至今日，双方的领导者仍认为对方是自己的分支。尽管本书将使用 `Jenkins`，但我们执行的大部分操作、调整的配置以及安装的插件，在\
  \ `Hudson` 上也同样适用。\n\n## Jenkins 入门\n\n在一台计算机上运行 `Jenkins` 的要求相当简单，只需要安装 `Java 6`\
  \ 即可。\n\n由于苹果公司已停止在 OS X 系统中预装 Java，我们需要确保你的计算机上已安装 Java。时至今日，许多工具仍需 Java 才能运行，因此你可能已经在不经意间安装好了。打开终端并运行以下命令：\n\
  \n```\n$ java -version\njava version \"1.7.0_25\"\nJava(TM) SE Runtime Environment\
  \ (build 1.7.0_25-b15)\nJava HotSpot(TM) 64-Bit Server VM (build 23.25-b01, mixed\
  \ mode)\n```\n\n如果输出与上述不完全相同，也没有关系，只要显示的是高于 1.6 版本的 Java 即可。如果根本未安装 Java，则会出现类似“No\
  \ Java runtime present, requesting install.”（未找到 Java 运行时环境，请求安装。）的消息。此时，你应该访问 Apple\
  \ 支持页面下载 Java 运行时环境，[该页面地址为：http://support.apple.com/kb/DL1572](http://support.apple.com/kb/DL1572)。\n\
  \n### 使用命令行安装 Jenkins\n\n你可以使用我们在前几章讨论过的 `Homebrew` 包管理器来安装 `Jenkins`，也可以直接使用 `Jenkins`\
  \ 网站提供的原生安装包。根据经验，`Homebrew` 可能是最简单的方法，因为它使得在有新版本发布（并且 Homebrew 可用）时更新 `Jenkins`\
  \ 变得极其容易。为此，打开终端并直接运行以下命令：\n\n```\n$ brew install jenkins\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 5 章：使用 Jenkins 实现自动化构建 - 69**\n\n只要仔细阅读命令的全部输出内容，它将下载 `homebrew` 上可用的最新版 `Jenkins`，并设置好你启动它所需的一切。\n\
  \n不过，本书将不会使用这种方法。我们希望你能够真正理解它在底层是如何工作的——从下载 `Jenkins` 到最终让它构建我们的应用程序。如果你并不关心如何运行一个基于\
  \ Java 的 Web 应用程序，可以直接跳到“初步了解”部分。\n\n打开终端，创建一个“Jenkins”文件夹，并将你的工作目录切换到这个新创建的文件夹中。完成后，使用\
  \ `curl` 命令行工具下载最新版本的 `Jenkins`。\n\n请注意 `–L` 参数，它的意思是“跟随重定向”，当你使用“latest” `Jenkins`\
  \ URL 时，你实际上会被重定向到最新的版本。在编写本书时，当前版本是 1.560。\n\n```\n$ mkdir ~/Jenkins\n$ cd ~/Jenkins\n\
  $ curl -L http://mirrors.jenkins-ci.org/war/latest/jenkins.war -O\n```\n\n如果说 `Jenkins`\
  \ 的安装很简单，那一点都不为过。我们刚刚下载了最新版本的 `Jenkins` WAR 包，WAR 代表“Web Application ARchive”（Web\
  \ 应用程序归档）。这意味着你使用 `Jenkins` 所需的一切都包含在这个单一文件中；你现在可以使用 Java 命令行工具运行 `Jenkins`。\n\n\
  ```\n$ java –jar jenkins.war\nRunning from: /Users/Palleas/Jenkins/jenkins.war\n\
  webroot: $user.home/.jenkins\n...\nINFO: Started SelectChannelConnector@0.0.0.0:8080\n\
  ```\n\n如果你看到了类似的 Java 命令输出，那么 `Jenkins` 应该已经正常启动了。\n\n正如最后一行所示，你新安装的 `Jenkins` 可以在地址\
  \ `0.0.0.0`（基本上代表你自己的 IP 地址）的 `8080` 端口上访问。你可以使用 `--httpListenAddress` 和 `--httpPort`\
  \ 参数自定义 HTTP 地址和端口，如下所示：\n\n```\n$ java -jar jenkins.war --httpPort=8908 --httpListenAddress=192.168.1.14\n\
  ```\n\n恭喜你，现在你已经成功启动了你的第一个 `Jenkins` 实例！打开你的默认网络浏览器，加载以下地址：`http://localhost:8080`。如果一切正常，你应该会看到一个空白的界面，背景是一个老管家（与\
  \ Hudson 的那个无关），并有一条欢迎消息，提示你创建一个任务来开始使用。别担心，我们稍后会介绍如何操作。\n\n`Jenkins` 最令人惊叹的地方可能是它的设计，大多数开发者会认为它“足够好”。你可能会觉得它确实如此（以为一旦配置好任务，就不会在\
  \ `Jenkins` 上花很多时间），但这是个谎言。事实上，你**会**在 `Jenkins` 上花费大量时间。可能每天只有几分钟，但到了周末，你会发现在不知不觉中，竟然已经在\
  \ `Jenkins` 上耗掉了两个小时。这两小时并非浪费，请别误会，但这足以让你认为 `Jenkins` 可以做得更美观，就像许多开源项目通过使用 Twitter\
  \ Bootstrap 提供的默认 CSS 文件来解决这个问题一样。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 46](img/index-72_1.jpg)\n\n**第 5 章：使用 Jenkins 实现自动化构建 - 70**\n\n### 在系统启动时加载\
  \ Jenkins\n\n从命令行运行 `Jenkins` 在某种程度上是可以的。正如我们之前提到的，你不会希望依赖开发者去启动那些会让他们感到厌烦的工具。事实上，你不应该在开发者的计算机上运行\
  \ `Jenkins`，而应该在一个无人编码的中立环境中运行。大多数人和公司通常选择 Mac Mini，这在苹果硬件世界里算是比较便宜的。管理应在启动时运行的命令是通过\
  \ OS X 核心组件“Launch Daemon”完成的。它只需要按照正确的格式编写属性列表文件即可。这有点超出本书的范围，所以我们就不详细介绍了。请注意，如果你决定使用\
  \ `Homebrew` 在实际执行构建的计算机上安装 `Jenkins`，系统会提供一个启动守护进程文件。\n\n## 初步了解\n\n如图 5-1 所示，正如我们之前提到的，用户界面非常简单。你会在左侧看到一个菜单，包含从创建新任务到管理\
  \ `Jenkins` 的主要操作，以及一个中央区域，你可以在那里看到你的任务及其当前状态。我们现在真正关心的是用于配置 `Jenkins` 的部分。点击“Manage\
  \ Jenkins”链接，然后点击“Manage Plugins”链接。\n\n***图 5-1.** 首次打开的 Jenkins 实例主页*\n\n`Jenkins`\
  \ 附带了一些预装的插件。首先，有几个用于管理用户凭据的插件。默认的“credential plugin”会为 `Jenkins` 添加一些基本的安全功能，并将用户的凭据存储在本地，而不是依赖像\
  \ LDAP（也已预装）这样的外部系统或第三方服务的 OAuth。它还附带了“Matrix Authorization Strategy Plugin”，一旦配置好，你就可以设置更复杂的授权策略。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 5 章：使用 Jenkins 实现自动化构建\
  \ - 71**\n\n`Jenkins` 最初是作为 Java 生态系统的持续集成平台而诞生的。既然一个 Java 项目离不开庞大的 XML 配置文件，那么\
  \ `Jenkins` 的标准安装自然包括了 Maven、Ant 和 Javadoc 支持。它还可以通过 SSH 与远程计算机通信，并通过 DCOM（分布式组件对象模型）与运行\
  \ Windows 的计算机通信，并提供了通过电子邮件发送构建结果的插件。最后，`Jenkins` 本质上是一个社区驱动的项目。正因如此，`Jenkins` 内置了“Translation\
  \ Assistance Plugin”（翻译辅助插件），以便你可以为你自己的语言翻译 `Jenkins` 做出贡献。\n\n\n\n如您所见，Jenkins\
  \ 在您首次运行 `java` 命令时便已准备就绪。如果您是一位需求非常简单的 Java 开发者。在我们这里，我们并不需要所有这些插件。只有两个与 SSH 相关的插件会在本章稍后讨论如何在远程计算机上构建应用程序时派上用场。对于像支持\
  \ Git 以便 Jenkins 能克隆我们项目这样基础的功能，我们必须安装一个插件。\n\n## 调整 Jenkins 配置\n\n让我们从一项简单的修改开始。首次打开“管理\
  \ Jenkins”部分时，您会看到一条警告，提醒您安装环境不受保护。如果您的 Jenkins 安装在大规模网络中可用（即不仅侦听本地主机），那么任何人都可以代表您手动启动作业，并访问存档的打包\
  \ IPA 文件等。更糟糕的是，人们还能创建执行恶意 shell 脚本的作业！\n\n因为那可能不是您想要的结果，所以让我们添加简单的凭据并保护 Jenkins。\n\
  \n1. 回到“管理 Jenkins”部分，点击紧邻那条吓人警告信息的“设置安全”按钮。如果您此前尚未关闭警告信息，也可以点击“配置全局安全”按钮。\n2. 在出现的屏幕上，勾选“启用安全”和“防止跨站请求伪造”两个复选框。\n\
  3. 在“启用安全”下方出现的区块中，选择“Jenkins 自有用户数据库”，并选择“任何人可以做任何事”选项。再次提醒，如果您开始向 Jenkins 添加多个账户，应考虑切换到专用工具，如\
  \ LDAP。\n4. 返回并点击“管理用户”链接，最后点击“创建用户”。\n5. 输入您的用户名、密码、全名和电子邮件地址，如图 5-2 所示，然后点击确定。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 47](img/index-74_1.jpg)\n\
  \n**72**\n\n**第 5 章：使用 Jenkins 进行自动构建**\n\n***图 5-2.** 创建新用户*\n\n6. 然后，最后一次打开“配置全局安全”部分，选择“已登录用户可以操作任何事情”选项，而不是“任何人可以做任何事”。\n\
  \n您应该会被重定向到一个登录表单，在其中输入您的凭据，然后我们就可以准备安装所需的插件了。\n\n此时，我们的需求相当简单。我们需要能够克隆一个托管在互联网上某处\
  \ Git 仓库中的项目。考虑到整个应用的一致性，我们选择使用 Github。该项目应可通过以下远程 URL 供您下载：`git@github.com:Palleas/Github-Jobs.git`。\n\
  \n要安装我们所需的 Git 插件，请导航至“管理插件”部分的“可选插件”选项卡，并搜索“Git Plugin”。您将看到少数几个结果，其中包括“Git Plugin”。勾选第一列的复选框。对“Xcode\
  \ Plugin”重复相同过程，然后点击“不重启直接安装”按钮，如图 5-3 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 48](img/index-75_1.jpg)\n\n**第 5 章：使用 Jenkins 进行自动构建**\n\n**73**\n\n***图\
  \ 5-3.** 您可以安装插件并立即开始使用它们*\n\n您可以将 Jenkins 的“不重启直接安装”功能视为 Windows 系统中安全移除 USB 设备的菜单。理论上说这样做更安全，但几乎没人会这么做。更严肃地说，不重启整个安装环境来安装插件是完全没问题的。事实上，这是\
  \ Jenkins 1.442 版本引入的功能，现在唯一需要重启 Jenkins 的情况是卸载和升级插件。\n\n您可能还想考虑安装一个名为“Green Balls”的插件，它会向您展示\
  \ Jenkins 的可扩展性有多强。这个插件可能只花了作者 300 行代码，但它会将成功构建的蓝色球体替换为绿色球体。\n\n\n\n## 使用 Xcode\
  \ 插件创建您的第一个 Jenkins 任务\n\n是时候创建我们的第一个构建了。我们将从克隆应用、构建应用以及生成 IPA 文件这一简单流程开始，这与我们在前几章中所做的完全一致。要开始创建构建，只需点击左侧菜单中的“新建任务”，在“任务名称”字段中输入“Github\
  \ Jobs for iOS”，然后选择“构建一个自由风格的软件项目”，最后点击“确定”。\n\n尽管任务创建过程分为两步，但实际上当您首次点击“确定”时任务就已经创建完成了，只是目前它还是空的，不会执行任何操作。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图 49](img/index-76_1.png)\n\
  \n**74**\n\n**第 5 章：使用 Jenkins 进行自动化构建**\n\n一个 Jenkins 任务主要由一系列选项和指令组成：名称、描述、同一任务是否可以并发构建、此任务是否依赖其他任务等等。对于这部分，您可以使用默认选项。不过大多数情况下，创建\
  \ Jenkins 任务是为了构建存储在源代码管理平台（如 Git 或 SVN）中的项目。我们希望 Jenkins 从托管在 Github 上的 Git 仓库中获取应用的源代码。为此，请在“源代码管理”部分选择“Git”，并在出现的仓库\
  \ URL 字段中填写 `git@github.com:Palleas/Github-Jobs.git`。\n\n根据您的配置，您可能会遇到如图 5-4 所示的错误，这是因为\
  \ Jenkins 试图访问一个它无权访问的仓库，而这其实是一件好事。\n\n实际上，我们之前提到过 Jenkins 自带一个凭证管理插件。在我们的案例中，我们需要用它来存储公钥和私钥\
  \ SSH 密钥，以便与 Github 进行身份验证。\n\n***图 5-4.** Jenkins 无法访问受保护的仓库*\n\n### 创建专用于 Github\
  \ 的 SSH 密钥\n\n通过 SSH 与仓库进行身份验证最简单（可能也更安全）的方法是使用私钥。为此，我们需要生成一个新密钥，将公钥添加到我们的 Github\
  \ 账户，并将私钥交给 Jenkins。打开终端，使用 `ssh-keygen` 生成一个新的 SSH 密钥：\n\n```\n$ ssh-keygen -t\
  \ rsa -N \"\" -f ~/Tools/jenkins.key\nGenerating public/private rsa key pair.\n\
  /Users/Palleas/Tools/jenkins.key already exists.\nOverwrite (y/n)? y\nYour identification\
  \ has been saved in /Users/Palleas/Tools/jenkins.key.\nYour public key has been\
  \ saved in /Users/Palleas/Tools/jenkins.key.pub.\nThe key fingerprint is:\n22:69:9f:c0:f8:9c:14:18:ac:47:77:a1:59:d8:a4:33\
  \ Palleas@local\nThe key's randomart image is:\n+--[ RSA 2048]----+\n|       ..\
  \ ++.    |\n|      ooo=o      |\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图 50](img/index-77_1.jpg)\n\n**第 5 章：使用 Jenkins 进行自动化构建**\n\n**75**\n\n```\n\
  |      o..E.      |\n|      .  .o =     |\n|       .. B . S  |\n|        = = o \
  \   |\n|         + o     |\n|                 |\n|                 |\n+-----------------+\n\
  ```\n\n现在，我们已经在 Tools 文件夹中存储了一个 SSH 密钥，并且通过 `ssh-keygen` 命令，该密钥也已保存到 Jenkins 存档中。\n\
  \n-   `-t` 参数指示命令使用 RSA，这是一种用于保护数据传输安全的加密通信系统，由 Ron Rivest、Adi Shamir 和 Leonard\
  \ Adleman 发明，因此得名 RSA。\n-   `-N` 参数用于为密钥关联一个空密码短语。大多数人是出于懒惰才使用空密码短语，以避免在发起 SSH 连接时输入密码，但在我们的案例中，我们在编写本书时\
  \ Jenkins 尚不支持这种操作。不过，有一个相关的 `JENKINS-20879` 问题正在处理中。\n\n### 告知 Jenkins 使用这个全新的密钥\n\
  \n借助 Jenkins 的凭证插件，告知 Jenkins 使用这个全新的密钥非常简单。返回 Jenkins 首页，从左侧菜单中选择“凭证”。然后，从左侧菜单中选择“全局凭证”和“添加凭证”。最后，按照图\
  \ 5-5 所示填写表单。\n\n***图 5-5.** 添加新的 SSH 密钥，以便 Jenkins 与 Github 通信*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图 51](img/index-78_1.jpg)\n\n**76**\n\n**第 5 章：使用 Jenkins 进行自动化构建**\n\n\n\n\
  请注意，您可以通过以下命令获取私钥内容并粘贴到表单中：\n\n```\n$ cat ~/Tools/jenkins.key | pbcopy\n```\n\n\
  然后，前往您的 GitHub 个人资料，将您的公钥（即 `Jenkins.key.pub` 文件的内容）添加到您的个人资料中。如果您不知道如何操作，请查阅 GitHub\
  \ 官方文档：\n\n`https://help.github.com/articles/generating-ssh-keys`\n\n现在，您应该能够将 Git\
  \ 仓库 URL 添加到任务配置中，如图 5-6 所示。\n\n**图 5-6.** 明确选择凭据允许 Jenkins 与 Git 仓库通信\n\n“构建触发器”目前并不重要，我们只会手动启动构建，将在后续详细讨论此部分。Jenkins\
  \ 任务的第三部分才是真正值得关注的部分。仅仅向 Jenkins 提供一个源代码仓库是不够的，您还必须明确告诉它构建将包含哪些内容。\n\n#### 构建 GitHub\
  \ 任务应用\n\n幸运的是，我们之前下载的 Xcode 插件使得描述构建 Xcode 项目的过程变得非常简单。\n\n1. 在“构建”部分，点击“添加构建步骤”并选择“Xcode”。\n\
  \n2. 展开“设置...”面板，并在配置字段中输入“AdHoc”。\n\n如果您在自己的计算机上运行 Jenkins 进行试用，那么您可能已经满足了代码签名的要求——也就是说，您的钥匙串中已经拥有私钥和配置文件。\n\
  \n3. 勾选“打包应用并构建 IPA”复选框。展开“代码签名与 OS X 钥匙串选项”部分，并勾选“解锁钥匙串”复选框。即使“钥匙串路径”旁边的帮助说明提示它会使用默认值，也请在文本字段中填写`${HOME}/Library/Keychains/login.keychain`，否则将无法工作。\n\
  \n4. 在“钥匙串密码”字段中输入您的密码并继续。\n\n`www.it-ebooks.info`\n\n![Image 52](img/index-79_1.jpg)\n\
  \n**第 5 章：使用 Jenkins 进行自动构建**\n\n**77**\n\n**注意** 如果您是在一台全新的计算机（例如您为公司新买的 Mac Mini）上运行\
  \ Jenkins，请不要担心，我们将在几节后回到打包过程。\n\n5. 如果您记得前一章的内容，我们正在尝试构建一个工作区并使用一个 scheme。展开“高级”部分。在“Xcode\
  \ Schema File”字段中填写“Github Jobs”，在“Xcode Workspace File”字段中填写“Github Jobs”。不要添加`.xcworkspace`扩展名，否则它将查找名为“Github\
  \ Jobs.xcworkspace.xcworkspace”的文件，构建将会失败。\n\n6. 最后，将“构建输出目录”设置为`${WORKSPACE}/build`，其中`WORKSPACE`是在构建过程中可用的环境变量，包含项目根目录的路径。\n\
  \n您可能已经猜到，当前的构建不会成功，因为我们没有将项目依赖项添加到项目仓库中。再次点击“添加构建步骤”，选择“执行 Shell”，然后将刚刚出现的块拖到 Xcode\
  \ 块之上。在文本区域中填写`pod install`。\n\n目前，我们的任务基本上就是这些：安装依赖项，构建并打包应用程序。您可以拥有任意数量的构建步骤，只要记住它们是按顺序运行的，并且任何一个步骤失败都会导致整个构建失败即可——这在思考时是合理的。\n\
  \n#### 归档生成的 IPA\n\n构建的最后一部分是可选的构建后操作列表，无论构建结果如何，这些操作都会执行。这些操作可以是任何内容，从生成和发布文档到归档构建结果。在这种情况下，我们需要跟踪构建过程中创建的\
  \ IPA 文件。\n\n为此，点击“添加构建后操作”并选择“归档制品”，然后填写您期望在构建过程中创建的文件的模式——在本例中为扩展名为`.ipa`的文件，如图\
  \ 5-7 所示。\n\n**图 5-7.** 要求 Jenkins 在构建结束时查找并归档 ipa 文件\n\n`www.it-ebooks.info`\n\n\
  ![Image 53](img/index-80_1.jpg)\n\n**78**\n\n**第 5 章：使用 Jenkins 进行自动构建**\n\n此构建后操作提供了一些高级选项，例如要求\
  \ Jenkins 仅保留最新的制品以节省空间。如果我们在构建非常大的应用程序，这可能会很有用，但也会阻止构建多个分支并保留生成的 ipa 文件。此外，我们上次打包应用程序时，生成的包大小约为\
  \ 150KB，因此暂时不会出现空间问题。\n\n任务现已正确配置，是时候触发构建了。准备好后，点击左侧菜单中的“立即构建”按钮开始构建，并点击左侧菜单中出现的链接。\n\
  \n应用程序很小，因此第一次构建（包括从 GitHub 仓库获取内容的时间）应该不会超过一分钟。构建完成后刷新页面，或点击页面右上角的“启用自动刷新”链接。最后，您应该看到类似于图\
  \ 5-8 的内容。\n\n**图 5-8.** 一次成功的 Jenkins 构建\n\n一个成功的构建页面包含关于刚刚发生事件的有用信息：持续时间、自上次构建以来的更改、版本控制的其他信息，包括构建时工作区所在的提交哈希。当然，如果您实际安装了\
  \ Green Balls 插件（让一切看起来更漂亮），上面的截图可能会略有不同。\n\n此截图中有趣的是“构建制品”部分，它显示了我们希望 Jenkins 归档的\
  \ IPA 文件。通过这种方式，您可以简单地构建应用程序的任何分支，以便您的测试人员可以访问 Jenkins，下载生成的 IPA，并通过 iTunes 安装它。当然，我们已经经历过这一点，并且不用担心，还有更强大的构建后操作可以安装。\n\
  \n`www.it-ebooks.info`\n\n**第 5 章：使用 Jenkins 进行自动构建**\n\n**79**\n\nJenkins 默认的主目录位于以下路径：`~/.jenkins`。如果您正在查找已归档构建的路径，可以在那里找到它们：\n\
  \n```\n$ find .jenkins/jobs/Github\\ Jobs\\ for\\ iOS -name \"*.ipa\"\n.jenkins/jobs/Github\
  \ Jobs for iOS/builds/2014-04-26_15-34-48/archive/build/Github_Jobs-0.1-1.2.3.ipa\n\
  ```\n\n恭喜，您已经踏入了持续集成世界的第一步。还有一些地方可以改进。首先，Xcode Build 插件不错，但并非完美。\n\n它让您可以控制构建过程中的许多事情，但有时方式令人困惑，例如工作区文件的路径不需要扩展名。\n\
  \n如果回顾一下我们在前一章编写的脚本，您会发现我们不需要那么多选项。这就是为什么从现在开始我们将使用自己的脚本。此外，更新它也会容易得多。不过在此之前，让我们看看\
  \ Jenkins 提供的其他功能。\n\n## Jenkins 高级用户功能\n\nJenkins 是一个非常强大的工具，即使您从未使用过持续集成平台，也可以在几小时内学会使用。但不要忽视它，因为它也提供了一些帮助高级用户的功能。\n\
  \n### Jenkins REST API\n\n\n\n如果你仔细看，几乎每个页面底部都有一个“REST API”链接。Jenkins REST API 允许你完成所有通过按钮和表单能完成的操作，包括创建任务，这在自动化视角下非常有用。你可以与\
  \ Jenkins 的几乎每个部分进行通信。要访问与特定资源（例如，一个任务）交互的可用方式的文档，只需在 URL 末尾添加`/api`：`http://localhost:8080/job/Github%20Jobs%20for%20iOS/api`。别忘了，我们安装\
  \ Jenkins 时已对其访问进行了安全保护。因此，如果你尝试通过命令行获取内容，别忘了添加你的凭据。例如，如果你使用`cURL`：\n\n```\n$ curl\
  \ -u romain.pouclet:pwd http://localhost:8080/job/Github%20Jobs%20for%20iOS/api/json\n\
  {\n   \"actions\" : [\n   ],\n   \"description\" : \"\",\n   \"displayName\" : \"\
  Github Jobs for iOS\",\n   \"displayNameOrNull\" : null,\n   \"name\" : \"Github\
  \ Jobs for iOS\",\n   \"url\" : \"http://localhost:8080/job/Github%20Jobs%20for%20iOS/\"\
  ,\n   ...\n}\n```\n\n使用 REST API 创建和更新任务需要任务的基于 XML 的描述。如果你查看 `Github Jobs for iOS`\
  \ 任务在 `http://localhost:8080/job/Github%20Jobs%20for%20iOS/config.xml` URL 上的 `config.xml`\
  \ 内容，你可以获取构建的三个重要部分。\n\n首先，`scm` 部分包含我们希望 Jenkins 克隆的 git 仓库 URL：\n\n```\n<scm class=\"\
  hudson.plugins.git.GitSCM\" plugin=\"git@2.2.1\">\n   <configVersion>2</configVersion>\n\
  \   <userRemoteConfigs>\n      <hudson.plugins.git.UserRemoteConfig>\n         <url>git@github.com:Palleas/Github-Jobs.git</url>\n\
  \         <credentialsId>5aeb7acd-ba7f-4687-aa8e-ba59c809eb38</credentialsId>\n\
  \      </hudson.plugins.git.UserRemoteConfig>\n   </userRemoteConfigs>\n   <branches>\n\
  \      <hudson.plugins.git.BranchSpec>\n         <name>*/master</name>\n      </hudson.plugins.git.BranchSpec>\n\
  \   </branches>\n   <doGenerateSubmoduleConfigurations>false</doGenerateSubmoduleConfigurations>\n\
  \   <submoduleCfg class=\"list\"/>\n   <extensions/>\n</scm>\n```\n\n其次，`builders`\
  \ 部分包含了我们添加的构建阶段列表。这包括使用 `cocoapods` 安装依赖的 shell 脚本，以及构建应用的 Xcode 构建：\n\n```\n<builders>\n\
  \   <hudson.tasks.Shell>\n      <command>pod install</command>\n   </hudson.tasks.Shell>\n\
  \   <au.com.rayh.XCodeBuilder plugin=\"xcode-plugin@1.4.2\">\n      <cleanBeforeBuild>false</cleanBeforeBuild>\n\
  \      <cleanTestReports>true</cleanTestReports>\n      <configuration>AdHoc</configuration>\n\
  \      <target></target>\n      <sdk></sdk>\n      <symRoot></symRoot>\n      <configurationBuildDir>${WORKSPACE}/build</configurationBuildDir>\n\
  \      <xcodeProjectPath></xcodeProjectPath>\n      <xcodeProjectFile></xcodeProjectFile>\n\
  \      <xcodebuildArguments></xcodebuildArguments>\n      <xcodeSchema>Github Jobs</xcodeSchema>\n\
  \      <xcodeWorkspaceFile>Github Jobs</xcodeWorkspaceFile>\n      <embeddedProfileFile></embeddedProfileFile>\n\
  \      <cfBundleVersionValue></cfBundleVersionValue>\n      <cfBundleShortVersionStringValue></cfBundleShortVersionStringValue>\n\
  \      <buildIpa>true</buildIpa>\n      <generateArchive>false</generateArchive>\n\
  \      <unlockKeychain>true</unlockKeychain>\n      <keychainName>none (specify\
  \ one below)</keychainName>\n      <keychainPath>${HOME}/Library/Keychains/login.keychain</keychainPath>\n\
  \      <keychainPwd>keychain-password</keychainPwd>\n      <codeSigningIdentity></codeSigningIdentity>\n\
  \      <allowFailingBuildResults>false</allowFailingBuildResults>\n      <ipaName></ipaName>\n\
  \      <ipaOutputDirectory></ipaOutputDirectory>\n      <provideApplicationVersion>false</provideApplicationVersion>\n\
  \   </au.com.rayh.XCodeBuilder>\n</builders>\n```\n\n最后，`publishers` 部分展示了构建后阶段的产品归档：\n\
  \n```\n<publishers>\n   <hudson.tasks.ArtifactArchiver>\n      <artifacts>**/*.ipa</artifacts>\n\
  \      <latestOnly>false</latestOnly>\n      <allowEmptyArchive>false</allowEmptyArchive>\n\
  \   </hudson.tasks.ArtifactArchiver>\n</publishers>\n```\n\n\n\n`config.xml`导出文件非常易于理解，看起来很像遵循`NSCoding`协议的对象在`plist`中的表示形式。此功能也很方便，因为它允许您通过向同一\
  \ URL 发布更新后的`config.xml`来更新任务。\n\n使用 Jenkins REST API 启用或禁用任务也同样简单，您只需向`/disable`和`/enable`端点发送\
  \ POST 请求即可。更有趣的是，您可以使用`/build`端点触发构建，但需要考虑到一些安全问题。\n\n在创建“Github for iOS”任务时，您可能已经注意到表单的“构建触发器”部分中有一个“远程触发构建”选项。如图\
  \ 5-9 所示，该选项允许您添加一个身份验证令牌，用于保护对`/build`端点的调用。\n\n```\n$ curl -v http://localhost:8080/job/Github%20Jobs%20for%20iOS/build?token=BewareMyToken\n\
  ```\n\n***图 5-9.** 添加令牌以保护对 HTTP 端点的调用将触发构建* 不过，您不应该依赖此令牌，因为即使它在创建任务表单中仍然可用，它已被认为是弃用的，并可能在未来的\
  \ Jenkins 版本中被移除。相反，您应该像之前一直做的那样使用基本身份验证。\n\n```\n$ curl -X POST -u romain.pouclet:pwd\
  \ http://localhost:8080/job/Github%20Jobs%20for%20iOS/build\n```\n如果构建被创建，响应结果应为“201\
  \ Created”状态码，并且`Location`头应包含刚刚在队列中创建的项的 URL。队列是一个应该执行的任务列表。它拥有自己独立的 API。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 5 章：使用 Jenkins 进行自动构建**\n\n拥有此 API 的最大好处在于，它使得通过脚本与 Jenkins 交互变得极其容易。我们将在“获取反馈”部分进一步讨论这一点。您应该记住的是，您现在知道了触发构建的两种方式：手动触发或通过调用\
  \ HTTP URL 触发。\n\n让我们继续！\n\n### 命令行中的 Jenkins\n\n如果 HTTP REST API 还没有让 Jenkins 足够“可入侵”，您还可以使用一个\
  \ Jenkins 命令行工具。它用 Java 编写，将以最简单的方式允许您执行不同的操作。要下载 Jenkins 命令行工具，只需访问您安装的`/cli`部分（例如`http://localhost:8080/cli`），然后获取\
  \ JAR 文件的 URL。复制该 URL 并在终端中输入以下命令。首次使用命令行工具时，您会收到一条警告，提示无法进行身份验证。\n\n```\n$ cd ~/Tools\n\
  $ curl http://localhost:8080/jnlpJars/jenkins-cli.jar -O\n$ java -jar jenkins-cli.jar\
  \ –s http://localhost:8080 who-am-i\n[WARN] Failed to authenticate with your SSH\
  \ keys. Proceeding as anonymous\n```\n\n这次，您将无法简单地输入登录名和密码来验证您的 Jenkins 安装，即使您可以向任何命令传递`--username`参数来提示输入密码。不推荐使用这种方法。您需要做的是将一个\
  \ SSH 公钥关联到您的个人资料，可在`/me/configure`URL 处完成，或者点击屏幕右上角的您的名字，然后点击左侧菜单中的“Configure”链接。\n\
  \n您可能已经在`~/.ssh`文件夹中有一个 SSH 公钥，但我们将使用之前生成用于与 Github 通信的那个密钥。检索存储在`~/Jenkins/Jenkins.key.pub`中的公钥内容，并将其粘贴到“SSH\
  \ 公钥”文本区域。按“保存”，返回终端，并使用`-i`选项重新运行之前的命令，该选项指定用于身份验证的私钥。\n\n```\n$ java -jar jenkins-cli.jar\
  \ -s http://localhost:8080 -i ~/Tools/jenkins.key who-am-i\nAuthenticated as: romain.pouclet\n\
  Authorities:\nauthenticated\n```\n\n当然，每次使用带有`-s`和`-i`选项的这个命令有点烦人，特别是如果您想多次使用它。如果使用存储在`~/.ssh/id_rsa[.pub]`（即`ssh-keygen`存储\
  \ SSH 密钥的默认路径）的密钥，则可以避免指定 Identity 文件。此外，服务器选项也不是问题，因为再次强调，您可以通过一个环境变量来省去此步骤，在这种情况下是`JENKINS_URL`环境变量，您只需声明一次即可。\n\
  \n```\n$ export JENKINS_URL=http://localhost:8080\n$ java -jar jenkins-cli.jar who-am-i\n\
  Authenticated as: romain.pouclet\nAuthorities:\nauthenticated\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 5 章：使用 Jenkins 进行自动构建**\n\n与 REST API 一样，您可以导出任务的 XML 表示：\n\n```\n$ java -jar\
  \ jenkins-cli.jar get-job \"Github Jobs for iOS\"\n```\n\n您可以启用/禁用一个任务：\n\n```\n\
  $ java –jar jenkins-cli.jar disable-job \"Github Jobs for iOS\"\n```\n\n最后，您可以触发构建：\n\
  \n```\n$ java -jar jenkins-cli.jar build -w -s \"Github Jobs for iOS\"\nStarted\
  \ Github Jobs for iOS #29\nCompleted Github Jobs for iOS #29 : SUCCESS\n```\n\n\
  如您所见，可以通过多种不同的方式与 Jenkins 进行通信，其中一些我们尚未涵盖。如果您不喜欢以`java –jar...`命令开头，也可以通过 SSH 直接与\
  \ Jenkins 通信。事实上，如果您查看对您的 Jenkins 主页安装进行 HTTP 调用返回的头部信息，您可以在响应中看到一些与 SSH 相关的头部，这些头部提供了\
  \ SSH 监听的主机和端口：\n\n```\n$ curl -D - http://localhost:8080 -o /dev/null\n...\nX-Jenkins-CLI-Port:\
  \ 52722\nX-SSH-Endpoint: localhost:52716\n...\n$ ssh -p 52716 romain.pouclet@localhost\
  \ who-am-i\nAuthenticated as: romain.pouclet\nAuthorities:\nauthenticated\n```\n\
  \n我们不会详细讨论 Jenkins SSH 端点，因为它与 Jenkins CLI 的工作方式非常相似。所有这些访问点都有一些明显的优势：HTTP 使得从脚本自动执行操作变得非常容易，而命令行工具是与\
  \ Jenkins 手动交互的强大方式。CLI 的明显优势是，无需在您希望与之交互的页面底部寻找“REST API”链接，即可获得所有可用命令的列表。\n\n\
  重要的是要认识到，如果您还没有找到一种适合您需求的与 Jenkins 通信的方式，那么您很可能没有进行足够的探索。\n\n### 获取反馈\n\n如果您忘记运行构建，那么拥有一个构建应用程序的持续集成平台是毫无用处的，这就是为什么您的平台需要为您处理这部分工作的原因。大多数仓库托管服务都带有钩子，一旦您将新的提交推送到远程仓库，这些钩子就可以调用一个\
  \ URL。您也可以决定每天在 10 点自动构建您的`master`分支，并创建所谓的“夜间构建”。重要的是保持您的任务健康报告有意义。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 55](img/index-86_1.png)\n![Image 56](img/index-86_2.jpg)\n\n**第 5 章：使用\
  \ Jenkins 进行自动构建**\n\n对于您创建的每个任务，Jenkins 都会根据最近几次构建的结果计算一份健康报告，并用一个小天气图标来表示。如图 5-10\
  \ 所示，我们的项目运行良好，因为它是一个简单的项目，没有任何理由构建失败。\n\n\n\n***图 5-10.** 如果过去的构建全部通过，说明项目运行状况良好*\n\
  \n健康报告基于之前构建的结果，但这相当抽象，因为它只考虑了最终结果：通过或失败。当然，一次通过的构建并不意味着任务运行良好。我们将在关于单元测试的章节中详细讨论这一点，但先考虑以下情况：一个项目中有大量测试失败。由于懒惰、缺乏优先级或紧迫的截止日期，这些失败的测试被停用了，那么你的项目肯定运行不佳。你需要通过添加一些背景信息来让这份健康报告变得有意义，例如使用“Project\
  \ Health Report Plugin”插件来创建更详细的报告，如图 5-11 所示。现在，你应该能够自行安装该插件了。\n\n***图 5-11.**\
  \ “Project Health Report”插件显示了项目健康状况的更详细概览*\n\n**及时接收通知并修复构建**\n\n如果你希望项目保持健康，没有什么比修复构建更重要的了。人们很容易产生“我稍后再修复构建”的想法，然后忘记这件事。即使应用程序在你的电脑和测试设备上运行正常，你的同事可能并不知道这一点。\n\
  \n为了能够立即修复构建，你需要在构建失败时立即收到通知，例如通过一封简单的电子邮件。Jenkins 的默认安装会使用 `localhost` 和一系列默认设置作为\
  \ SMTP 服务器来发送这些邮件，但如果你没有运行这样的服务器，这很可能无法工作。要解决这种情况，你可以使用你的 Gmail 账户凭据，在 Jenkins 系统配置部分的\
  \ **E-mail Notifications** 表单中进行配置，该表单还提供了测试配置的功能。完成后，你只需在“Github Jobs for iOS”任务配置的末尾添加一个新的构建后操作，如图\
  \ 5-12 所示。\n\n***图 5-12.** 对于每次不稳定的构建，`romain.pouclet@gmail.com` 背后的用户都会收到一封邮件*\n\
  \n每次构建失败时，都会有人收到一封包含构建直接链接的邮件通知。控制台输出会准确显示发生了什么，这样你就可以自责一下，因为你又一次忘记在构建应用程序之前共享 scheme\
  \ 或安装依赖了。\n\n参见 `http://localhost:8080/job/Github%20Jobs%20for%20iOS/34/`\n\n```\n\
  Started by user Romain Pouclet\nBuilding in workspace http://localhost:8080/job/Github%20Jobs%20for%20iOS/ws/\n\
  Fetching changes from the remote Git repository\nFetching upstream changes from\
  \ git@github.com:Palleas/Github-Jobs.git\nusing GIT_SSH to set credentials Palleas\
  \ Jenkins private key to communicate with github\nChecking out Revision 948ff10d7228ec8d1d6bda405d403aef9150a336\
  \ (origin/master)\nWorking directory is http://localhost:8080/job/Github%20Jobs%20for%20iOS/ws/\n\
  ...\n```\n\n在这个时不时就有新创公司推出新服务、号称通过“消灭电子邮件”来革新公司内部沟通方式的时代，使用电子邮件来接收构建失败的通知似乎有点奇怪。但问题是，电子邮件通知是\
  \ Jenkins 标准安装自带的免费功能。如果你需要更适合公司环境的通知方式，比如在特定聊天室里发送消息，很可能有相应的插件可以做到。事实上，你应该仔细考虑你将使用的通知类型。如果你讨厌收到电子邮件，你甚至不会费心去阅读\
  \ Jenkins 发来的邮件，你就不会去修复构建，那么一切又会回到原点。\n\n**监控多个项目的状态**\n\n到目前为止，我们介绍的方法对开发者——那些实际有能力处理失败构建的人来说——非常有用。你大概不想让你的老板收到那些邮件（他可能也不想）。而且，这些通知是针对特定项目的，有时你可能希望更广泛地了解整体状况。\n\
  \n这就是为什么会有一些插件可以显示多个任务的状态，例如“Wall Display Plugin”。如图 5-13 所示，你可以使用这类插件来展示项目（包括你应用的安卓版本、后端等）的运行状况。\n\
  \n***图 5-13.** 包含所有平台的“Github Jobs”项目状态*\n\n最后，如果你不喜欢它的外观，或者想要更符合需求、集成到其他解决方案中的东西，你仍然可以使用\
  \ `/cc.xml` 提供的 feed。当 Jenkins/Hudson 的第一个版本发布时，CruiseControl 主导着自动化构建平台市场，并确立了一个标准：\n\
  \n```xml\n<?xml version=\"1.0\" ?>\n<Projects>\n  <Project activity=\"Sleeping\"\
  \ lastBuildLabel=\"1\" lastBuildStatus=\"Success\" lastBuildTime=\"2014-04-27T22:06:35Z\"\
  \ name=\"Github Jobs Backend\" webUrl=\"http://localhost:8080/job/Github%20Jobs%20Backend/\"\
  />\n  <Project activity=\"Sleeping\" lastBuildLabel=\"1\" lastBuildStatus=\"Failure\"\
  \ lastBuildTime=\"2014-04-27T21:05:02Z\" name=\"Github Jobs for Android\" webUrl=\"\
  http://localhost:8080/job/Github%20Jobs%20for%20Android/\"/>\n  <Project activity=\"\
  Sleeping\" lastBuildLabel=\"35\" lastBuildStatus=\"Success\" lastBuildTime=\"2014-04-27T21:03:55Z\"\
  \ name=\"Github Jobs for iOS\" webUrl=\"http://localhost:8080/job/Github%20Jobs%20for%20iOS/\"\
  />\n</Projects>\n```\n\n既然我们已经了解了 Jenkins 能为我们做什么，让我们回到我们的 Github Jobs for iOS 应用程序，并更新任务以满足我们的需求。\n\
  \n**集成我们的构建脚本**\n\n我们已经介绍了如何使用 **Xcode Build** 插件来构建 Github Jobs 应用程序，这个插件为我们做了一切，甚至更多。这类插件的问题在于，它们有点像“黑盒”，当然这并不是贬义，因为大部分插件都是开源的。问题是，它们抽象了很多底层发生的事情，并且在我们成功编写了一个大约十行代码（包括\
  \ shebang 和注释）的构建脚本之后，它们反而增加了许多复杂性。此外，如果你遇到了特定环境的构建问题，手动重新运行构建脚本也只需一个 SSH 命令。\n\n\
  考虑到这一点，回到我们创建的任务，移除“Xcode”构建阶段。由于我们编写的脚本也通过 Cocoapods 处理了依赖的安装，请清空“Execute Shell”构建阶段的文本区域，并填入以下命令（别忘了引号）：\n\
  \n```\n\"$WORKSPACE/bin/cibuild\"\n```\n\n如果你还记得上一章，我们的脚本使用了 `xcpretty` 来让 xcode\
  \ 输出更易读、更美观。问题是，Jenkins 的构建控制台输出是纯文本，除非你安装了 **AnsiColor Plugin**。安装该插件后，在 **Build\
  \ Environment** 部分勾选“Color ANSI Console Output”选项，然后重新运行任务，并前往任务的 **Console Output**\
  \ 部分。你应该会看到带有颜色的输出，就像图 5-14 所示的那样。\n\n***图 5-14.** 构建 Github Jobs 应用程序的任务输出（带颜色）*\n\
  \n回到我们输入的脚本，`$WORKSPACE` 是 Jenkins 提供的另一个环境变量，供你在构建脚本中使用。大约有 15 个环境变量可供 shell 脚本使用，它们列在\
  \ `http://localhost:8080/env-vars.html/` 上。\n\n\n\n`$JENKINS_HOME` 和 `$WORKSPACE`\
  \ 是绝对路径，分别对应于 Jenkins 的安装目录（在我们的例子中是 `~/.jenkins`）和仓库内容存储的目录（在我们的例子中是 `/Users/Paleas/.jenkins/jobs/Github\
  \ Jobs for iOS/workspace`）。我们已经使用第二个路径来定位构建脚本，并且可以轻松找到 `BUILD_NUMBER` 的用途。\n\n##\
  \ 更新构建编号\n\n返回“Github Jobs”项目，在你喜欢的文本编辑器中打开 `cibuild` 脚本。我们在前一章讨论了 `agvtool`，它可以自动更新应用程序的构建编号。在\
  \ `pod install` 命令之前添加以下行：\n\n```\nagvtool new-version -all ${BUILD_NUMBER:?\"BUILD_NUMBER\
  \ should be set, are you sure this script is run within a ci job?\"}\n```\n\n除了最后一部分，语法应该不难理解。我们使用了一个巧妙的\
  \ bash 技巧，称为“参数展开”。基本含义是，如果 `BUILD_NUMBER` 变量不可用（或为空），脚本将以非零返回码退出。\n\n在更新构建脚本并测试其正常工作时，你的\
  \ Jenkins 实例可能无法从外部访问，因此你的仓库托管服务无法在你每次推送时自动发送请求来触发构建。从现在开始，你应考虑运行以下命令：\n\n```\n\
  $ git push && java –jar ~/Jenkins/jenkins-cli.jar build \"Github Jobs for iOS\"\n\
  ```\n\n## 解锁钥匙串\n\n在我们的脚本中，我们还需要一个 `PASSWORD` 环境变量来在代码签名前解锁钥匙串。将密码硬编码在构建脚本中并不安全，因此我们做了一个简单的补救措施：在运行脚本之前声明环境变量。这虽然不太安全，但至少密码不会在仓库中可见。\n\
  \n我们无法使用同样的补救措施将密码写在作业的配置表单中。为确保安全，我们需要使用另一个名为“Mask Password”的插件。返回 Jenkins 配置部分并安装它。\n\
  \n完成后，进入“Github Jobs”Jenkins 作业的配置，在“构建环境”部分找到“mask passwords (and enable global\
  \ passwords)”选项。点击“添加”按钮并在此添加密码，如图 5-15 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 60](img/index-91_1.jpg)\n\n**第 5 章：使用 Jenkins 进行自动构建**  \n**89**\n\n***图\
  \ 5-15.** 将密码添加为环境变量，以便在构建脚本中使用*\n\n就这样！我们的脚本应该会自动解锁钥匙串。不要担心这样存储密码的安全性。密码已被正确编码并存储在我们之前提到的\
  \ `config.xml` 文件中。如果你使用 Jenkins 管理中定义的全局密码，它将更加安全。此外，即使你添加一个新的 shell 构建步骤来运行以下脚本：`echo\
  \ $PASSWORD`，该命令的输出（即密码）也会被插件自动混淆。\n\n## 事后清理\n\n最后一步我们尚未提及，但你需要在此上下文中认真考虑。请记住，作业的第一个阶段是从远程仓库获取内容，然后实际执行一些任务，而我们的任务之一就是更新构建编号。这意味着需要在多个地方更改信息，运行脚本后，工作副本的状态如下：\n\
  \n```\n$ git status --short\nM \"Github Jobs.xcodeproj/project.pbxproj\"\nM \"Github\
  \ Jobs/Github Jobs-Info.plist\"\nM \"Github JobsTests/Github JobsTests-Info.plist\"\
  \n```\n\n这并不好。下次从远程仓库拉取新内容时，如果这三个文件中有任何一个被修改，就会发生冲突，导致构建失败。这就是为什么你需要事后清理。要做到这一点，你有多种选择。最简单的方法是在构建的“源代码管理”部分中打开“附加行为”下拉菜单，并选择“Clean\
  \ before checkout”：这将把工作空间恢复到干净状态，然后安全地拉取新内容。\n\n## 将 Xcode 构建集成到现有 Jenkins 安装中\n\
  \n有时在公司里，iOS 开发可能不是唯一的开发类型。其他移动开发（如 Android 或 Blackberry）、使用 PHP、Java 或 Ruby 的后端开发，这些技术几乎可以在任何环境中运行。如果\
  \ iOS 开发是在之后才开始的，你可能会发现一台 Jenkins 已安装在非 OS X 平台上，该平台无法运行 Xcode 和构建 iOS 应用程序。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)  \n**90**  \n**第 5 章：使用 Jenkins\
  \ 进行自动构建**\n\n简单的解决方案是安装一个专用于构建 iOS 应用程序的新 Jenkins，但这将导致你需要维护两个 Jenkins 安装。此外，你将无法从一个地方看到所有项目的状态。既然你可能不想成为持续集成中的“异类”，并且希望与他人良好协作，那么你可以考虑使用更合适的解决方案——称为“从节点”。\n\
  \n## 从节点基础\n\nJenkins 从节点本质上是在专用节点上运行的轻量级 Jenkins 实例，可用于扩展目的——当你的实例构建了大量作业，且希望在多台构建机器之间平衡负载时。另一种情况是，你需要在具有特定要求的平台上构建作业，例如能够运行\
  \ Xcode 和命令行工具。\n\n此时，你需要做的事情和你之前做过的没什么不同：进入管理 Jenkins 部分，添加专用凭据，填写文本字段，并勾选复选框。\n\
  \n## Jenkins 从节点的结构\n\n打开 Jenkins 的管理部分，点击“管理节点”链接。你应该会看到主节点，即自本章开始以来一直在运行的 Jenkins\
  \ 安装。点击左侧菜单中的“新建节点”链接。在出现的表单中，选择“Dumb Slave”选项（这应该是唯一可用的选项），并在文本字段中为节点填写一个名称。你可以自由发挥创意，但务实的方法建议将其命名为“Xcode\
  \ builder”之类的。找到名称后，点击“确定”。\n\n创建节点非常简单。一旦你确定了名称（以及可选的描述），有几个必填字段需要填写：构建将在哪里执行、与此节点关联的标签，以及如何与该节点通信。\n\
  \n“Remote FS root”是从节点上用于存储作业的绝对路径。可以将其视为桌面上 `~/.jenkins/jobs` 文件夹的远程等效项。由于你将与一台运行\
  \ OS X 的远程计算机通信，你应该使用主目录并填写类似 `/Users/RemoteUserName/JenkinsBuilds` 的内容。\n\n标签也非常重要。使用从节点时，你不需要明确指定希望作业在何处运行。相反，你设置一系列限制条件，以便\
  \ Jenkins 找到满足这些要求的节点。在“标签”字段中填写 `xcode`。\n\n\n\n最后，有多种启动方式可以与从节点通信，但我们将使用 SSH 方式。从下拉框中选择“Launch\
  \ Slave Agents on Unix Machines via SSH”选项。在主机（`Host`）字段中，输入节点的 IP 地址。就像配置与 GitHub\
  \ 的连接一样，我们将使用 Jenkins 的凭据存储来与远程主机进行身份验证。点击下拉框附近的“Add”链接，并填写用于连接该计算机的凭据。这可以是用户名和密码，或者私钥。前者可能更安全，但从节点无法从外部访问，因此使用用户名和密码就足够了。请注意，如果要通过\
  \ SSH 连接到节点，则必须启用远程访问。\n\n完成此过程后，您的表单应类似于图 5-16 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 61](img/index-93_1.jpg)\n\n![Image 62](img/index-93_2.jpg)\n\n**第 5 章：使用\
  \ Jenkins 自动构建**\n\n**91**\n\n***图 5-16.** 节点已准备好创建*\n\n节点应自动启动。如果日志显示错误，请确保您尝试使用的凭据有效，您输入了正确的主机和端口，远程访问已激活，并且计算机上安装了有效的\
  \ Java 环境。主节点和从节点之间的通信通过`slave.jar`归档文件进行，该文件在主节点首次连接时通过 SFTP 复制到从节点上。\n\n```\n\
  $ ssh Camille@192.168.1.14\n$ cd /JenkinsBuilds\n$ ls\nslave.jar\n```\n\n如果您返回到“Github\
  \ Jobs for iOS”并点击配置链接，会出现一个新的配置区域，您可以通过该区域告诉您的任务在运行 Xcode 的计算机上执行。勾选“Restrict Where\
  \ this Project Can be Run”复选框，并在“Label Expression”字段中填入`xcode`，这是我们上面输入的标签，如图 5-17\
  \ 所示。\n\n***图 5-17.** 应用程序将在能够运行 xcode 的从节点上构建* 就是这么简单！\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**92**\n\n**第 5 章：使用 Jenkins 自动构建**\n\n管理配置文件（Provisioning Profiles）和私钥\n\n在本章中，我们多次构建和签名应用程序，但还有一件事没有涉及：该如何处理我们的配置文件和私钥？\n\
  \n通常的答案很简单：没有神奇的解决方案。配置文件存储在您的`Library`文件夹中，您可以使用以下简单命令找到它们：\n\n```\n$ ls -l /Users/Palleas/Library/MobileDevice/Provisioning\\\
  \ Profiles\n-rw-r--r-- 1 Palleas staff 15799 4 Apr 11:22 0255A8B8-3DD3-4893-8E6E-9F6664DF89B5.mobileprovision\n\
  -rw-r--r-- 1 Palleas staff 14153 26 Dec 17:06 05A46FE9-236E-4B40-8625-57A857155A7F.mobileprovision\n\
  -rw-r--r-- 1 Palleas staff 15775 4 Apr 11:22 10F8378B-6638-4A94-AB4B-E505BF562DA9.mobileprovision\n\
  -rw-r--r-- 1 Palleas staff 15757 4 Apr 11:22 18E20B0C-9446-4A68-A4F2-3483D02624E2.mobileprovision\n\
  -rw-r--r-- 1 Palleas staff 15846 4 Apr 11:22 1F908F91-7B22-4B31-8629-7D286FE20ECD.mobileprovision\n\
  -rw-r--r-- 1 Palleas staff 15787 4 Apr 11:22 1FA4FB89-845B-43B9-98DC-07A26B5F3920.mobileprovision\n\
  ...\n```\n\n私钥存储在钥匙串中，我们已经使用`security`命令行工具进行了一些基本的钥匙串操作，但还有其他与钥匙串相关的方法我们尚未涉及。您可能可以通过\
  \ SSH 在运行构建的计算机上操作钥匙串，并以相同的方式安装配置文件。\n\n问题是，即使 Apple 在代码签名身份管理方面取得了巨大进步，它仍然是一个复杂的概念。一个简单的解决方案是：将屏幕插入您的构建计算机一次，并在第一次构建应用程序时手动运行\
  \ Xcode，确保一切顺利运行。再次强调，没有银弹，但我们正在慢慢接近目标。\n\n我们接下来该做什么？\n\n恭喜，您已经搭建了一个相当不错的持续集成平台。目前它功能有限，但在后续章节中，我们将使用它来通过无线方式部署应用程序，并通过单元测试和质量保证工具更新构建流程，以获得更详细的反馈。\n\
  \n总结\n\n本章带您了解了世界上最常用的持续集成平台。现在，您将能够检测是否有同事在尝试向项目导入新框架时忘记勾选“Copy Items into Destination’s\
  \ Group”复选框（尽管他或她应该使用 Cocoapods）。我们希望您现在已经理解为什么一个中立的构建平台很重要，以及需要做些什么来让它对您的团队保持有用。\n\
  \n下一章将介绍一家名为“Atlassian”的澳大利亚公司提供的替代方案——Bamboo。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 6 章：使用 Bamboo 自动构建\n\n在前一章中，我们大量讨论了开源自动构建平台 Jenkins。\n\n即使它存在一些问题和奇怪的行为，我们仍然希望您在章节结束时意识到它实际上是一个多么优秀的平台。我们向您展示了启动它有多么容易，并描述了在家中拥有一个这样的平台的好处。您现在可能会问自己一个问题：“为什么我们还需要另一个？”这是个好问题，但在回答之前，让我们明确一点：本书的目的不是推广\
  \ Bamboo 而非 Jenkins。这只是简单介绍 Bamboo 如何帮助您作为 iOS 开发人员的日常工作。\n\nBamboo 是由澳大利亚公司 Atlassian\
  \ 创建的一个商业产品，该公司也负责开发 Confluence 以及 Jira。如果您曾经寻找过错误跟踪器，那么您可能至少遇到过 Jira 一次，并且可能正在您的公司中使用它。如果是这样，您会很高兴知道\
  \ Bamboo 与 Jira 深度集成，使得从失败的构建创建问题变得非常容易。\n\n有什么充分的理由让我们从一个免费的、开源平台切换到一个付费的、半专有的平台（部分组件是开源的，并且通过合适的许可证您可以获取源代码进行修改）？说实话，我们不是来给您一个理由的；我们是来告诉您\
  \ Atlassian 在开始开发 Bamboo 时采取的不同方法。\n\n在本章结束时，我们真诚希望我们已经让您对 Bamboo 有了很好的了解，并且您能够选择哪种解决方案最适合您的公司。\n\
  \n上一章是一次旅程，帮助您发现了 Jenkins 和美妙的持续集成平台世界。现在您已经掌握了入门所需的一切知识，我们将以更直接的方式使用 Bamboo，并尽可能直奔主题：使用我们在过去三章中一直编写的\
  \ bash 脚本构建 Github Jobs iOS 应用程序。为此，我们可能需要参考一些 Jenkins 的工作方式。\n\n**93**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**94**\n\n**第 6 章：使用 Bamboo 自动构建**\n\n开始使用 Bamboo\n\n如果您期望一个基于不那么臃肿平台的软件，您会失望的：Bamboo\
  \ 是用 Java 编写的。如果您像我们在前几章那样使用过 Jenkins，那么您很可能能够在您的计算机上安装和配置 Bamboo：Bamboo 只需要一个有效的\
  \ Java 环境。\n\n\n\n让我们开始吧，从 Atlassian 试用页面（地址：`https://www.atlassian.com/software/bamboo/try/`）下载\
  \ Bamboo 的试用版。点击“下载”部分的“Start My Free Trial”按钮。与大多数 Atlassian 产品一样，Bamboo 也提供“OnDemand”解决方案，使您可以访问其云版本。如果您选择继续使用\
  \ Jenkins，也可以获得类似的解决方案。例如，`Cloudbees`（`http://www.cloudbees.com`）是一个专注于 Java 的云平台，提供诸如在云端安装\
  \ Jenkins 等多种服务。虽然这些解决方案具有将开发人员和系统管理员的工作交给真正喜欢它的人的优势，但它们通常比自托管解决方案贵得多。\n\n点击“Start\
  \ my free trial”按钮后，复制 `tar.gz` 链接，我们将在下一节中使用它。\n\n## 使用命令行安装 Bamboo\n\n与 Jenkins\
  \ 一样，Bamboo 的出色之处在于它开箱即用。您只需下载存档文件，然后运行正确的命令即可。在我们的示例中，需要使用 `tar` 解压存档，并使用带有正确参数的一个简单\
  \ `bash` 脚本让 Bamboo 在前台运行。\n\n```bash\n$ mkdir ~/Bamboo\n$ curl –L http://www.atlassian.com/software/bamboo/downloads/binary/atlassian-bamboo-5.5.0.tar.gz\
  \ -O\n$ tar -zxvf atlassian-bamboo-5.5.0.tar.gz\n$ cd atlassian-bamboo-5.5.0\n$\
  \ bin/start-bamboo.sh –fg\n```\n\n服务器启动日志位于 `/Users/Palleas/Bamboo/atlassian-bamboo-5.5.0/logs/catalina.out`。Bamboo\
  \ 独立版版本：5.5.0。检测 JVM PermGen 支持… PermGen 开关已支持。设置为 256m。\n\n如果您在启动或停止 Bamboo 独立版时遇到问题，请参阅位于\
  \ `https://confluence.atlassian.com/display/BAMBOO/Bamboo+installation+guide` 的故障排除指南。\n\
  \n```\nUsing CATALINA_BASE:   /Users/Palleas/Projects/Apress/Bamboo/atlassian-bamboo-5.5.0\n\
  Using CATALINA_HOME:   /Users/Palleas/Projects/Apress/Bamboo/atlassian-bamboo-5.5.0\n\
  Using CATALINA_TMPDIR: /Users/Palleas/Projects/Apress/Bamboo/atlassian-bamboo-5.5.0/temp\n\
  Using JRE_HOME:        /Library/Java/JavaVirtualMachines/jdk1.7.0_25.jdk/Contents/Home\n\
  Using CLASSPATH:       /Users/Palleas/Projects/Apress/Bamboo/atlassian-bamboo-5.5.0/bin/bootstrap.jar:/Users/Palleas/Projects/Apress/Bamboo/atlassian-bamboo-5.5.0/bin/tomcat-juli.jar\n\
  May 05, 2014 7:26:38 PM org.apache.catalina.core.AprLifecycleListener init\n...\n\
  INFO: Server startup in 13062 ms\n```\n\n如果一切按预期进行，您应该会看到最后的“Server startup in…”消息。如果没有看到此消息而是看到了错误，请运行以下命令检查\
  \ Java 是否正确安装：\n\n```bash\n$ java -version\njava version \"1.7.0_25\"\nJava(TM)\
  \ SE Runtime Environment (build 1.7.0_25-b15)\nJava HotSpot(TM) 64-Bit Server VM\
  \ (build 23.25-b01, mixed mode)\n```\n\n如果 Java 已正确安装，但 Bamboo 仍未在您的计算机上启动，您可以随时联系\
  \ Atlassian 以获得设置帮助。事实上，这是使用付费产品的好处之一：技术支持。\n\n在跳转到浏览器并打开我们刚刚启动的 Bamboo 网站（可在 `http://localhost:8085`\
  \ 访问）之前，我们需要指定 Bamboo 的“home”目录（Jenkins 仅仅选择使用 `~/.jenkins`）。打开 `/WEB-INF/classes/`\
  \ 文件夹中的 `bamboo-init.properties` 文件，找到包含 `Bamboo.home` 的注释行。取消注释并输入您希望存储所有数据的目标目录路径。我们使用\
  \ `.bamboo`，这样 `.jenkins` 主目录就不会感到孤单。\n\n```\nbamboo.home=/Users/Palleas/.bamboo\n\
  ```\n\n如果您还不确定该目录，您会很高兴地知道，您还可以使用另一个环境变量：\n\n```bash\n$ BAMBOO_HOME=/Users/Palleas/.bamboo\
  \ bin/start-bamboo.sh –fg\n```\n\n这里重要的是 `-fg` 参数，它代表“前台”（foreground），意味着 Bamboo\
  \ 将在前台运行，以便您可以操作它并随时停止它。请注意，如果您不使用此参数，可以使用 `stop-bamboo.sh` 脚本来终止在后台运行的 Bamboo 实例。\n\
  \n打开浏览器并访问 `http://localhost:8085` URL，您应该会看到一个带有大文本区域的表单，这就是乐趣的开始。即使出于演示目的，您也需要输入一个将在\
  \ 30 天后过期的许可证密钥。您可以通过单击文本区域下方的“contact Atlassian”链接并按照几个步骤（例如创建 Atlassian 账户）来申请许可证。完成后，将许可证密钥粘贴到文本区域中，如图\
  \ 6-1 所示，然后准备按下“Express installation”。\n\n**图 6-1.** 使用评估许可证密钥设置 Bamboo 安装\n\nBamboo\
  \ 提供两种不同的安装方式，但我们将使用快速安装，它不需要您安装 MySQL 数据库等。相反，快速安装将设置一个更简单的数据库，存储在您的 `BAMBOO_HOME`\
  \ 目录下的文件中。\n\n按下“Express installation”按钮。您将被带到一个页面，在其中填写管理员凭据，然后进入您的 Bamboo 安装主页。恭喜，您的\
  \ Bamboo 安装已就绪！\n\n## 为生产环境做准备\n\n现在我们只是在玩转 Bamboo，以便向您展示它的功能，但不用担心。嵌入式数据库可以轻松迁移到更持久的引擎（如\
  \ MySQL），如下页面所示：`https://confluence.atlassian.com/display/BAMBOO/MySQL+5.1`。此外，如果试用期过期，您的数据也不会丢失，您只是无法构建应用程序；购买永久许可证即可解决这个问题。\n\
  \n既然您知道没有任何障碍阻止您将其推向生产环境，那么让我们四处看看，了解 Bamboo 是如何工作的。\n\n## 环顾四周：与 Jenkins 不同的方法\n\
  \nBamboo 在构建方面选择了一种略有不同的方法。实际上，存在某种层次结构，其中“计划”是根级别。点击大大的蓝色“Create”按钮，选择“create a\
  \ new plan”。在出现的表单中，将“Project name”填写为“Github Jobs”，将“Plan name”填写为“iOS application”，如图\
  \ 6-2 所示。如果您仔细观察该表单，您会注意到实际上有一个更高的层级：项目。事实上，如果您尝试创建一个新计划（例如，用于构建 Android 版本的计划），您将能够从列表中选择“Github\
  \ Jobs”项目。这是一个简洁的功能，因为有了适当的凭据，您可以授予团队成员访问项目所有计划的权限。\n\n**图 6-2.** 创建一个新计划并同时隐式创建一个新项目\n\
  \n完成此操作后，向下滚动到下一部分，Bamboo 希望知道代码的来源。在我们的示例中，这将是 Github，但 Bamboo 也支持 Stash 和 Bitbucket——两者都是\
  \ Atlassian 产品——以及 Git、CVS、Subversion、Perforce 和 Mercurial 系统的原始仓库。\n\n\n\n### 点击你选择的平台并填写凭据\n\
  \n请注意，在我们撰写本书时，GitHub 为账户增加额外安全层所部署的双因素认证功能，Bamboo 尚不支持。实际上，Bitbucket 官方页面上已经有一个相关问题被提出：[`bitbucket.org/site/master/issue/5811/support-two-factor-authentication-bb-7016`](https://bitbucket.org/site/master/issue/5811/support-two-factor-authentication-bb-7016)。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 65](img/index-100_1.jpg)\n\
