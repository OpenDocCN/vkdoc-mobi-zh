  # 第 6 章：使用 Bamboo 实现自动化构建\n\n**107**\n\n```json\n{\n  \"name\": \"Github Jobs -\
  \ iOS application\",\n  \"planKey\": {\n    \"key\": \"GJ-IA\"\n  },\n  \"shortKey\"\
  : \"IA\",\n  \"shortName\": \"iOS application\",\n  \"type\": \"chain\"\n},\n\"\
  planResultKey\": {\n  \"entityKey\": {\n    \"key\": \"GJ-IA\"\n  },\n  \"key\"\
  : \"GJ-IA-33\",\n  \"resultNumber\": 33\n},\n\"state\": \"Successful\"\n```\n\n\
  ```json\n],\n\"size\": 1,\n\"start-index\": 0\n```\n\n这是通过 API 提供的众多资源之一，此外还有项目（Project）、构建（Build）、报告（Report）、队列（Queue）、标签（Label）和服务器信息（Server\
