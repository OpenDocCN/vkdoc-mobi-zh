  \n## 使用`Xcode`机器人运行测试\n\n我们已经创建了一个机器人，其唯一目的是构建应用程序，然后将其存档以便用户可以下载。这个机器人名为“`Github\
  \ Jobs (nightly build)`”，并且每天凌晨 1:00 运行一次。我们可以简单地将测试执行添加到其任务列表中，但我们将创建一个新的机器人，以便每次我们向远程仓库推送新提交时运行单元测试。\n\
  \n\n\n在 Xcode 中打开 `Github Jobs` 项目，进入 Product 菜单，利用已有的知识创建一个机器人（bot），该机器人将在每次有新提交推送到远程仓库时运行（轮询间隔为\
  \ 5 分钟），并仅选择“执行测试操作”任务。上次我们创建的机器人仅用于构建和归档应用程序，而现在我们只需要测试。因此，如图 9-10 所示，Xcode Service\
  \ 能够在多个设备和模拟器上运行测试，这对于确保与 32 位或 64 位架构相关的错误不复存在来说非常方便。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图 110](img/index-181_1.jpg)\n\n**第 9 章：将单元测试纳入其中**\n\n**181**\n\n***图 9-10.**\
  \ Xcode 服务允许您在多台设备上运行测试* 请注意，此界面不仅支持模拟器，也适用于真实设备。实际上，“设备”组合框中提供了多个选项，允许您针对所有 iOS\
  \ 设备或所有 iOS 模拟器运行测试套件。当然，您不一定有多个备用设备可以一直插在负责运行所有测试的计算机上。例如，您可能在白天使用几台测试设备。这时，夜间构建就会派上用场：创建一个机器人在白天针对所有模拟器运行测试，再创建另一个机器人在夜间针对真实设备运行测试。创建机器人非常简单，只需几分钟，何不充分利用这个功能呢？\n\
  \n当机器人完成测试套件的运行后，从 Xcode 或浏览器中打开集成的详细信息，查看结果。不出所料，测试在所有模拟器上均告失败，如图 9-11 所示。请记住，在撰写本书时\
  \ Xcode 6 仍处于测试阶段，因此请忽略此图中显示的两个错误。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图 111](img/index-182_1.jpg)\n\n**182**\n\n**第 9 章：将单元测试纳入其中**\n\n***图 9-11.**\
  \ Xcode 服务网页界面显示了失败测试的详细信息* 公平地说，对于其他持续集成平台，我们本可以直接配置它们，使其使用不同的模拟器多次运行。不过，那样会花费更多时间，而且结果也会不够清晰。但这再次体现了使用专属于一个平台的持续集成工具的优势之一。\n\
  \n## 总结\n\n本章我们介绍了单元测试这一并非全新的概念。尽管从 Xcode 2 版本开始您就能编写和运行单元测试，但直到三个大版本之后，Apple 才将其提升为开发过程中的一等公民。现在创建项目时无法不包含单元测试，您可以轻松运行非常具体的测试用例，并且只需点击几下即可从持续集成平台自动运行测试。\n\
  \n首先，我们讨论了什么是单元测试，以及它如何能帮助您在回家时比仅依赖个人技能来确保产品稳定性多一份安心。随后，我们更新了 Bamboo 和 Jenkins 上的持续集成流程，并创建了一个专门的\
  \ Xcode Bot。\n\n下一章将涵盖我们持续集成安装所提供的反馈的最后一环：质量保证。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n# 第 10 章\n\n## 质量保证\n\n让我们回顾一下前几章所做的事情。我们构建了一个非常简单的应用程序，用于检索纽约的 iOS 职位简短列表，并在\
  \ Safari 浏览器中显示职位详情。然后，我们学习了如何仅使用 Xcode 和 iTunes 将应用程序手动发布给团队——尽管我们承认这不是个好主意。最后，我们介绍了如何从命令行构建应用程序，以便使用几种主流的持续集成平台（Jenkins\
  \ 和 Bamboo，即开源解决方案与企业级解决方案的对比）按固定计划构建应用程序。我们还向您介绍了 Apple 随 Xcode 5 发布的工具：用于 OS X\
  \ Server 的 Xcode 服务和 Xcode Bots。最终，我们通过自动运行项目中的测试套件，将持续集成提升到了新水平。本章将介绍最后一个概念：质量保证，这是您的持续集成平台能够提供的另一种反馈。\n\
  \n首先，我将解释质量保证的含义，以及它如何对您和您的项目有所帮助。\n\n随后，我们将讨论在**不运行代码**的情况下对其进行分析操作，即所谓的**静态分析**。事实上，市面上有多种工具可以帮助您追踪复杂的代码片段和其他未使用的变量。\n\
  \n## 什么是质量保证？\n\n您的持续集成部署能让您知道应用程序是否成功构建、测试是否运行，但它并不能指示您为某个功能或缺陷修复所编写的代码是否损害了产品。这并不意味着您没有犯下错误，比如因为一个放错位置的\
  \ `goto` 指令而跳过了关键的安全检查。这也不意味着您声明了一个变量却忘记使用，或者忘记在 `if` 语句中放入某些代码。\n\n“损害”这个词听起来可能有点重，但请设想一下，六个月后，某个开发者不得不回头研究这段代码，因为你的方法里嵌套了\
  \ 17 层 `if` 语句而抓狂。世上没有完美的代码，即使是一位有着 20 年 Objective-C 经验的开发者也会犯错。这就是质量保证工具派上用场的地方。由于它们是自动化的，关于对错的争论就不复存在了。它们只是遵循一套规则，执行特定的分析，并向您提供一份报告。正因如此，您**不会**因为代码过于复杂而**183**\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**184**\n\n**第 10 章：质量保证**\n\
  \n导致自动构建失败，不会因为有几行超过 200 个字符的代码就导致构建失败，当然也不会因为没有对 100% 的代码进行单元测试而导致构建失败。它们只会为您提供另一种反馈，帮助您编写更好的代码。\n\
  \n### 静态分析\n\n如果您从事 iOS 开发足够久，可能已经听说过 LLVM（原名“低级虚拟机”）和 Clang 这类东西。简单来说，Clang 是一个依赖于\
  \ LLVM 的工具。它附带了许多便捷功能，如编译、重构，当然还包括对代码进行**静态分析**。让我们看看它是如何工作的。\n\n首先，您需要理解，进行静态分析并非只有一种方法，因为这个词仅表示在不实际运行代码的情况下对其进行分析。这与逻辑上称之为“动态分析”的方式正好相反。静态分析生成的警告类似于您在\
  \ Xcode 中尝试将 `NSArray` 存储到声明为 `NSString` 的属性时得到的警告。这些都是编译器警告，其精神本质相同。当然，它们可以检测出像这样简单的问题，但随着它们的演进，静态分析工具通过开始推断代码的语义，将工作又推进了一步。\n\
  \n\n\n它们现在能够检测潜在的代码缺陷，从而减少你可能需要编写的冗余单元测试数量，让你专注于那些真正测试**你代码**（而非平台）的测试用例。\n\n静态分析需要考虑的缺点很少。首先，这些工具通常比简单的编译运行得更慢，这是有充分理由的：它们不仅仅是转换代码，而是试图在其中定位潜在的缺陷。这需要对解析后的代码运行复杂算法，而这会花费你的时间。\n\
  \n此外，这些工具并非魔法，它们只能检测出已被编程设定要查找的缺陷。\n\n它们也并非完美无缺，有时会将完全正常的代码行误判为缺陷。这些被称为**“误报”**，必须予以报告，以便让工具变得更好、更值得信赖。\n\
  \n基于所有这些原因，静态分析工具不应导致你的构建失败，但这并不意味着它们没有帮助：再说一次，没有银弹，但我们目前展示过的工具也并非银弹。\n\n让我们对我们为`Github\
  \ Jobs`的`iOS`应用编写的代码执行一次简单的静态分析。\n\n目前，你只需要使用命令行。\n\n### 使用 clang 执行简单的静态分析\n\n\
  `Clang`作为`Xcode`命令行工具提供的开发者工具之一而自带，你已经安装了这些工具，要么是因为你需要像`make`这样的命令来安装`homebrew`，要么仅仅是因为我们在命令行的章节中友好地要求你这样做。然而，它并没有附带静态分析工具，你需要手动下载。\n\
  \n有一个专门的章节介绍基于`Clang`的静态分析工具，可在以下网址找到：\n\n[`clang-analyzer.llvm.org/`](http://clang-analyzer.llvm.org/)。请导航至该网站下载最新的可用二进制文件。在我们编写本书时，最新的版本是\
  \ #276，发布于 2014 年 2 月 19 日。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 10 章：质量保证**\n\n**185**\n\n将归档文件下载并解压到你选择的文件夹中（我们将它放到`Tools`文件夹中）。在这里你将找到运行实际分析的`scan-build`二进制文件。\n\
  \n```\n$ cd ~/Tools\n$ curl -O http://clang-analyzer.llvm.org/downloads/checker-276.tar.bz2\n\
  $ tar -zxvf checker-276.tar.bz2\n$ cd checker-276\n$ ./scan-buid –h\n用法：scan-build\
  \ [选项] <构建命令> [构建选项]\n分析器构建版本：checker-276 (2014-02-18 22:53:01)\n...\n```\n\n你必须将`scan-build`命令视为某种代理，因为它的工作方式如此。这个命令最简单的用法是`scan-build\
  \ xcodebuild`。它会构建应用程序，并使用`xcodebuild`命令的输出来了解要分析哪些文件。你现在可能已经熟悉了从命令行构建应用程序的命令。只需在该命令的开头调用`scan-build`。在执行之前，你应该将`~/Tools/checker-276`文件夹添加到`PATH`环境变量中，以便让事情更简单。为了练习起见，我们现在保留命令中的完整路径。该命令将按预期运行，你只会看到`scan-build`相关的指令出现在`xcodebuild`指令的前后。\n\
  \n```\n$ ~/Tools/checker-276/scan-build xcodebuild -workspace Github\\ Jobs.xcworkspace\
  \ -scheme Github\\ Jobs clean build\nscan-build：正在使用 '/Users/Palleas/Tools/checker-276/bin/clang'\
  \ 进行静态分析\n来自命令行的构建设置：\n    CLANG_ANALYZER_EXEC = /Users/Palleas/Tools/checker-276/bin/clang\n\
  \    CLANG_ANALYZER_OTHER_FLAGS =\n    CLANG_ANALYZER_OUTPUT = plist-html\n    CLANG_ANALYZER_OUTPUT_DIR\
  \ = /var/folders/1v/d8vqkw8x23ndw49f5vs3fzw00000gn/T/scan-\nbuild-2014-06-13-225334-95796-1\n\
  \    RUN_CLANG_STATIC_ANALYZER = YES\nXcodebuild 经典输出...\n** 构建成功 **\n以下命令产生了分析器问题：\n\
  \    分析浅层 Github\\ Jobs/PCSViewController.m\n    （1 个命令存在分析器问题）\n```\n\n\n\n`scan-build:\
  \ 发现 1 个错误。`\n\n`scan-build: 运行 'scan-view /var/folders/1v/d8vqkw8x23ndw49f5vs3fzw00000gn/T/scan-build-2014-06-13-225403-95826-1'\
  \ 查看错误报告。`\n\n第一个代码块很重要。其中包含了一些可以被使用或覆盖的构建设置，就像我们之前用 `xcodebuild` 命令和 `CONFIGURATION_BUILD_DIR`\
  \ 设置所做的那样。第一个设置显示了正在使用的 Clang 可执行文件的路径。Clang 的静态分析工具自带了一个版本的 Clang，正如你在解压后的文件夹中的\
  \ `bin` 子目录里看到的那样。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image\
  \ 112](img/index-186_1.png)\n\n**186**\n**第 10 章：质量保证**\n\n你可以使用 `--use-analyzer`\
  \ 选项轻松覆盖此设置，例如，用于在 Xcode 中日常工作时使用完全相同的编译器：\n\n```\n$ ~/Tools/checker-276/scan-build\
  \ --use-analyzer=Xcode xcodebuild -workspace Github\\ Jobs.xcworkspace -scheme Github\\\
  \ Jobs clean build\n```\n\n`scan-build: 正在使用 '/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/clang'\
  \ 进行静态分析`\n\n来自命令行的构建设置：\n\n`CLANG_ANALYZER_EXEC = /Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/clang`\n\
  \n通过使用 `Xcode` 而不是 Clang 可执行文件的实际路径，`scan-build` 将使用 `xcrun` 来定位 Xcode 所使用的 Clang\
  \ 可执行文件的完整路径。\n\n另两个重要参数是关于命令输出的：`CLANG_ANALYZER_OUTPUT` 和 `CLANG_ANALYZER_OUTPUT_DIR`。它们分别包含需要生成的报告类型以及报告的存储路径。事实上，命令执行后显示的输出指出了在哪里可以找到这份报告。事实证明，我们为\
  \ Github Jobs 应用程序编写的代码包含一个错误。让我们看一下生成的报告。如显示所示，你只需要调用 `scan-view` 命令。该命令的默认行为是在你的计算机上启动一个\
  \ Web 服务器，并以适当格式打开报告，如图 10-1 所示。\n\n***图 10-1.** Clang 静态分析器生成的格式化报告显示了一个错误*\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 10 章：质量保证**\n**187**\n\n\
  老实说，我们在编写本书时并没有预料到这个错误，但这却是一个很好的机会，让我们看到了使用静态分析器的好处。我们确实忘了调用 `[super viewWillAppear]`。这并不太重要，因为我们没有继承像\
  \ `UINavigationController` 这样的容器视图控制器。实际上，`viewWillAppear` 声明附近的注释是这样写的：\n\n```\n\
  // Called when the view is about to made visible. Default does nothing\n```\n\n\
  更有趣的是，当你使用最新稳定版 Xcode 5.1.1 (5B1008) 提供的 Clang 可执行文件时，这个错误不会被检测到。这就是我们在第 2 章提到 Xcode\
  \ 中 Git 集成时讨论的问题。由于苹果的发布流程缓慢，你很容易在开发者工具方面落后一步。事实上，如果你查看我们现在使用的 Clang 最新版本的更新日志（可在\
  \ [`clang-analyzer.llvm.org/release_notes.html`](http://clang-analyzer.llvm.org/release_notes.html)\
  \ 获取），你会看到以下内容：\n\n> *新增了一个“缺少对 super 的调用”警告，用于查找 iOS/OS X API 中需要链式调用父类方法实现的常见模式。*\n\
  \n平心而论，在编写本书时仅作为测试版发布的 Apple Xcode 6 附带了最新版本的 Clang，并支持这些新功能。我们已经讨论过 `xcrun` 工具和\
  \ `DEVELOPER_DIR` 环境变量，因此你应该能够检查两个 Clang 可执行文件的版本。\n\n这份报告是以人类可读的方式生成的。当然，计算机也可以轻松解析它，以便将其集成到你的持续集成平台中，毕竟这是非常简单的\
  \ HTML 代码。\n\n不过还有另一种方法。分析结果可以导出为……没错：plist 文件。你可以使用 `-plist` 选项来跳过 HTML 报告文件的生成，因为默认导出格式会同时生成\
  \ plist 文件和 HTML 文件。你也可以使用 `-o` 选项来决定报告的存储位置，而不是使用临时文件夹：\n\n```\n$ scan-build -plist\
  \ -o build xcodebuild -workspace Github\\ Jobs.xcworkspace -scheme Github\\ Jobs\
  \ clean build\n```\n\n命令运行完毕后，你可以导航到报告目录，然后一直找到 `PCSViewController.plist` 文件，即可轻松找到与\
  \ `PCSViewController` 类相关的报告。该文件将包含以下格式描述的异常列表：\n\n```\n<dict>\n  <key>kind</key>\n\
  \  <string>event</string>\n  <key>location</key>\n  <dict>\n    <key>line</key><integer>60</integer>\n\
  \    <key>col</key><integer>1</integer>\n    <key>file</key><integer>0</integer>\n\
  \  </dict>\n  <key>depth</key>\n  <integer>0</integer>\n  <key>extended_message</key>\n\
  \  <string>UIViewController 子类 'PCSViewController' 中的实例方法 'viewWillAppear:' 缺少对\
  \ [super viewWillAppear:] 的调用</string>\n  <key>message</key>\n  <string>UIViewController\
  \ 子类 'PCSViewController' 中的实例方法 'viewWillAppear:' 缺少对 [super viewWillAppear:] 的调用</string>\n\
  </dict>\n```\n\n正如你所料，这种格式更容易被其他软件（例如 Xcode）解析和分析。问题是，如果你在自己电脑上运行的静态代码分析结果与持续集成平台上运行的结果不同，那么在持续集成平台上运行静态代码分析就没有意义了。幸运的是，检查器归档文件中包含一个专门为此目的设计的命令，叫做\
  \ `set-xcode-analyzer`。\n\n就像在全局级别更改开发者目录路径的 `xcode-select` 命令一样，此命令必须以超级用户身份运行。关闭\
  \ Xcode 并运行以下命令：\n\n```\n$ sudo set-xcode-analyzer --use-checker-build=/Users/Palleas/Tools/checker-276\n\
  (+) 使用检查器构建附带的 Clang：/Users/Palleas/Tools/checker-276\n(+) 在以下位置搜索 xcspec 文件：/Applications/Xcode.app/Contents\n\
  (+) 正在处理：/Applications/Xcode.app/Contents/PlugIns/Xcode3Core.ideplugin/Contents/SharedSupport/Developer/Library/Xcode/Plug-ins/Clang\
  \ LLVM 1.0.xcplugin/Contents/Resources/Clang LLVM 1.0.xcspec\n```\n\n此命令将定位 Xcode\
  \ 规范文件（`xcspec`）的路径，并更改到你想要使用的静态分析器所在目录的路径。这有几个目的。第一个目的当然是能够在自己的 Xcode 版本中使用最新版本的分析器，从而获得相同的结果。第二个更重要的目的是，由于\
  \ OS X Server 的 Xcode 服务需要指向有效 Xcode 开发者目录的路径，你将能够通过 Xcode Bot 始终使用最新版本的静态分析器来运行静态分析！既然我们已经了解了它的工作原理，现在让我们更新上一章创建的、运行单元测试的\
  \ Bot，让它也运行静态代码分析。\n\n#### 从 Xcode Bot 执行静态分析\n\n打开我们之前创建的 Github Jobs（夜间构建）Bot\
  \ 的设置，将其名称更改为简单的 `Github Jobs`。导航到 `Schedule` 步骤，勾选 `Perform analyze action`，然后按下\
  \ `Save`。按下 `integrate` 手动启动 Xcode Bot，等待其完成。如图 10-2 所示，发现了一个错误，但分析并未因此导致构建失败。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 113](img/index-189_1.jpg)\n\
  \n**第 10 章：质量保证**\n**189**\n\n\n\n***图 10-2.** 集成已完成。构建成功，但静态分析器发现了一个错误* 这样一来，只要你将更改推送到远程仓库，每\
  \ 5 分钟测试套件就会像之前一样运行，而且得益于 Clang 静态分析，你还能收到关于代码的反馈。\n\n现在你已经能够充分利用你的 Xcode bot：运行测试、进行静态分析以及归档构建。既然在\
  \ Xcode 中创建 Xcode bot 如此简单（当然，除了 CocoaPods 那部分），实在没有理由不使用它们。\n\n在像 Jenkins 和 Bamboo\
  \ 这样的其他持续集成平台上集成使用 Clang 的静态分析也同样简单。有一个 Jenkins 插件可以实现这一点，尽管它自 2013 年 3 月以来就未更新过，所以你只能祈祷最新版本的\
  \ Clang 静态分析器中报告格式没有太大变化。目前似乎还没有用于 Bamboo 的插件，但仔细想想，集成它也并不困难。它只需要调用特定的命令行指令并归档结果，这些结果就是简单的\
  \ HTML“构建产物”。然后你可以创建一个部署流程，将这些结果发布到专用的 Web 服务器上。\n\n由于展示如何从 Bamboo 构建中执行命令行指令并无新意，我们将向你介绍另一款静态分析器：`oclint`。\n\
  \n### 使用 OCLint 获取额外反馈\n\n我们之前提到过，静态分析工具分为不同类型，因为“静态”一词仅表示分析是在不实际运行代码的情况下进行的。Clang\
  \ 静态分析器会为你执行大量检查，而 OCLint 是一种能够执行与代码异味、未使用变量以及其他常见不良实践相关的其他测试的工具。与 Clang 一样，OCLint\
  \ 也是一个标准可执行程序，可以从网站下载或手动编译。\n\n请注意，选择后者（手动编译）将花费你几个小时的时间，因此你可能会考虑直接下载的方案。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**190**\n\n**第 10 章：质量保证**\n\n导航至 [`oclint.org/downloads.html`](http://oclint.org/downloads.html)\
  \ 上的 OCLint 下载页面，选择最新稳定版本的归档文件。下载它，解压归档文件，并将 `bin` 文件夹添加到你的 `PATH` 中。\n\n```\n$\
  \ curl –O http://archives.oclint.org/nightly/oclint-0.9.dev.43e26f7-x86_64-darwin-12.4.0.tar.gz\n\
  $ tar -zxvf oclint-0.9.dev.43e26f7-x86_64-darwin-12.4.0.tar.gz\n$ PATH=$PATH:/Users/Palleas/Tools/oclint-0.9.dev.43e26f7/bin\n\
  $ oclint -version\nLLVM (http://llvm.org/):\nLLVM version 3.3svn\nOptimized build.\n\
  Built Jun 16 2013 (17:54:11).\nDefault target: x86_64-apple-darwin13.2.0\nHost CPU:\
  \ corei7-avx\n```\n\n主站解释了如何对单个文件运行 OCLint，但如果你尝试对你的项目中的一个文件执行相同操作，很可能会收到一个错误，提示找不到\
  \ `UIKit.h` 文件。\n\niOS 项目使用 `xcodebuild` 构建是有原因的。是的，它在底层调用了 Clang，但带有关于构建设置、要检测的警告、要链接的框架以及要添加的标志等非常具体的参数。还记得\
  \ `DEBUG=1` 吗？\n\nOCLint 可以对单个文件运行，但前提是它确切知道如何构建该文件。如果你查看 `xcodebuild` 的输出，就能看到每个文件使用了什么命令。它看起来像这样：\n\
  \n```\n/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/clang\
  \ -x objective-c-header -arch armv7s -fmessage-length=145 -fdiagnostics-show-note-include-stack\
  \ -fmacro-backtrace-limit=0 -fcolor-diagnostics -std=gnu99 -fmodules -fmodules-cache-path=/Users/Palleas/\n\
  Library/Developer/Xcode/DerivedData/ModuleCache -Wno-trigraphs -fpascal-strings\
  \ -O0 -Wno-missing-field-initializers -Wno-missing-prototypes -Wno-implicit-atomic-properties\
  \ -Wno-receiver-is-weak\n-Wno-arc-repeated-use-of-weak -Wno-missing-braces -Wparentheses\
  \ -Wswitch -Wunused-function -Wno-unused-label -Wno-unused-parameter -Wunused-variable\
  \ -Wunused-value -Wempty-body -Wuninitialized\n-Wno-unknown-pragmas -Wno-shadow\
  \ -Wno-four-char-constants -Wno-conversion -Wconstant-conversion\n-Wint-conversion\
  \ -Wbool-conversion -Wenum-conversion -Wshorten-64-to-32 -Wpointer-sign -Wno-newline-eof\
  \ -Wno-selector -Wno-strict-selector-match -Wundeclared-selector -Wno-deprecated-implementations\n\
  -DDEBUG=1 -DCOCOAPODS=1 -isysroot /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.\n\
  platform/Developer/SDKs/iPhoneOS7.1.sdk...\n```\n\n（实际上它的长度是这个的三倍）别担心，你无需复制此命令并对每个要使用\
  \ OCLint 分析的文件都运行它。它采用了一种类似于 Clang 静态分析器的方法，该方法作为编译应用程序的构建命令的代理。有一种称为“JSON 编译数据库”的文件格式，其规范可在以下网址找到：[`clang.llvm.org/docs/JSONCompilationDatabase.html`](http://clang.llvm.org/docs/JSONCompilationDatabase.html)。基本上，该文件包含一个项目列表，每个项目包含一个文件、该文件所在目录的路径以及构建该文件的命令：\n\
  \n```\n{\n  \"directory\": \"Github Jobs\",\n  \"file\": \"PCSAppDelegate.m\",\n\
  \  \"command\": \"/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/\n\
  bin/clang -x objective-c -arch armv7...\"\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 10 章：质量保证**\n\n**191**\n\n借助 OCLint 提供的一个 Python 工具，可以轻松生成此文件，该工具会查找 `xcodebuild`\
  \ 命令的输出，并将其转换为 `compile_commands.json`。该工具位于你下载的 OCLint 包中的 `bin` 文件夹中。如果像我们之前告诉你的那样，将此目录添加到你的\
  \ `PATH` 中，那么它应该也可以使用。首先使用适当的参数运行 `xcodebuild` 命令，并将输出存储到专用文件中，然后运行 `oclint-xcodebuild`\
  \ 工具：\n\n```\n$ xcodebuild -workspace Github\\ Jobs.xcworkspace -scheme Github\\\
  \ Jobs -configuration Debug clean build | tee xcodebuild.log\n$ oclint-xcodebuild\n\
  ```\n\n**注意**，我们使用了 `tee`，这是一个非常方便的工具，它可以将标准输入复制到标准输出，同时将其复制到一个或多个文件中。这样，你可以将输出复制到日志文件中，同时仍然可以在终端中查看输出。\n\
  \n现在，我们已经将 `xcodebuild` 命令的结果转换为正确的 JSON 编译数据库文件，我们可以使用 OCLint 来实际分析我们的文件了，我们将使用一个工具来获取\
  \ JSON 编译数据库文件的内容，并将其转换为实际的 `oclint` 命令。\n\n```\n$ oclint-json-compilation-database\n\
  1 error generated.\n1 error generated.\n1 error generated.\n...\n[OCLint (http://oclint.org)\
  \ v0.8rc1]\noclint: error: violations exceed threshold\nP1=0[0] P2=30[10] P3=221[20]\n\
  ```\n\n我们收到的这条错误信息是由于 OCLint 检测到的错误数量过多所致。每个错误都有一个优先级，并且在退出之前，OCLint 会接受一定数量的错误。默认情况下，允许的优先级\
  \ 3 违规少于 20 个，优先级 2 违规少于 10 个，并且不能容忍任何优先级 1 违规。当达到这些限制之一时，OCLint 将使用非零状态码退出，这将导致构建失败。\n\
  \n\n\n我们收到了大量错误，因为被分析的不仅是我们自己的代码，还包括来自 `SVProgressHUD` 等第三方库的代码——而你无需为第三方库的代码质量负责。当然，如果在开源代码中发现了明显错误，随时欢迎贡献修复，但这并非关键所在。重要的是，第三方库代码的分析结果与你关联度较低。因此\
  \ `OCLint` 提供了忽略不必要文件夹的选项。在我们的场景中，需要忽略的是 `Pods` 文件夹：\n\n```\n$ oclint-json-compilation-database\
  \ **-e Pods**\n```\n\nOCLint 提供多种输出格式：HTML、纯文本、JSON 和 XML 等。你可以通过 `\"-report-type\"\
  ` 和 `\"-o\"` 参数指定报告类型及保存位置。这些参数属于 `OCLint` 而非 `oclint-json-compilation-database`，因此我们需要用\
  \ `\"--\"` 将两者分隔。位于 `\"--\"` 之后的所有字符都将作为参数传递给生成的 `oclint` 命令。\n\n要生成如图 10-3 所示的\
  \ HTML 报告，请使用以下命令：\n\n```\n$ oclint-json-compilation-database -v -e Pods/SVProgressHUD\
  \ -- -report-type html -o oclint_result.html\n```\n\n**图 10-3.** HTML 报告显示 OCLint\
  \ 检测到的错误列表\n\n报告会像之前提到的那样，显示违规列表及其优先级，同时还会标明文件中的位置，更重要的是，会显示未被遵守的规则（这里由于长行规则，我们收到了大量错误）以及对应的错误信息。\n\
  \n长行规则具有一定主观性，尤其是在 Cocoa API 的场景下。事实上，`NSBitmapImageRep` 的方法名称长度可达 148 个字符。`OCLint`\
  \ 的优秀之处在于，你可以调整某些规则的常量值（例如长行规则）。只需使用 `\"-rc\"` 选项，并传入属性名称及其值即可。考虑到在巨大的 iMac 屏幕上工作，却因为某行代码长度为\
  \ 110 字符（只允许 100 字符）而收到警告，这确实有些荒谬——让我们将限制提高到 120 吧。这样一来，大量警告应该会消失。不过 120 已经是个相当大的数字了，如果之后仍然出现长行警告（图\
  \ 10-3 显示确实存在），那么进行小规模重构可能是解决方案。\n\n```\n$ oclint-json-compilation-database -v -e\
  \ Pods/SVProgressHUD -e Xcode/DerivedData -e /Applications/Xcode.app/ -- -report-type\
  \ html -o oclint_result.html -rc=LONG_LINE=120\n```\n\n长行规则是典型的、需要根据团队需求自定义的规则类型——因为一旦规则确定，就无需争论：`PCSVIewController`\
  \ 中那行 140 个字符的代码确实过长，我们应该考虑修复它。\n\n你可能已经注意到报告中包含 `\"Clang Static Analyzer\"` 列。这或许能解答你心中的疑问：“既然有了\
  \ Clang，我真的还需要 `OCLint` 吗？”`OCLint` 的目标并非取代 Clang，而是提供关于代码质量的额外反馈。为简化操作，`OCLint`\
  \ 可以自动调用 Clang 静态分析器，从而只生成一份统一的报告。是否使用 `\"-enable-clang-static-analyzer\"` 参数来启用此功能，完全取决于你。\n\
  \n现在我们已经了解了它的工作原理，接下来将其报告集成到 Jenkins 任务中。\n\n### 将 OCLint 集成到 Jenkins\n\n再次强调，依赖开发者手动运行这类工具并非明智之选——无论有意还是无意，他/她总会忘记运行。因此，我们将把\
  \ `OCLint` 集成到 Jenkins 中，以便定期执行静态分析。\n\n\n\n/Users/Palleas/Projects/Apress/Github\
  \ Jobs/Github Jobs/PCSViewController.m\n\n```\n<file name=\"/Users/Palleas/Projects/Apress/Github\
  \ Jobs/Github Jobs/PCSViewController.m\">\n<violation begincolumn=\"1\" endcolumn=\"\
  195\" beginline=\"56\" endline=\"56\" priority=\"5\"\nrule=\"long line\">\nLine\
  \ with 195 characters exceeds limit of 100\n</violation>\n</file>\n```\n\n你已经知道如何设置\
  \ `oclint` 命令生成的报告格式。只需将 `html` 替换为 `pmd`，并将报告名称从 `oclint_result.html` 改为 `oclint_result.xml`。为了保持整洁，我们将报告放在\
  \ `build` 文件夹中。\n\n在 **Github Jobs for iOS** 的作业配置中，点击\"添加构建阶段\"按钮，然后选择\"执行 Shell\"\
  。在出现的文本区域中填入我们之前提到的几条命令，用于将 `xcodebuild` 的日志转换为编译数据库并调用 OCLint：\n\n```\n$ oclint-xcodebuild\
  \ \"$WORKSPACE/build/xcodebuild.log\"\n$ oclint-json-compilation-database -v -e\
  \ Pods/SVProgressHUD -- -report-type pmd –o\n\"$WORKSPACE/build/oclint_result.xml\"\
  \ -rc=LONG_LINE=130\n```\n\n这将在 `build` 目录中以 Jenkins 可理解的格式生成一份报告。最后一步就是收集这份报告，以便\
  \ Jenkins 使用插件以更友好的方式呈现它。\n\n尽管 PMD 格式是一种广为人知的格式，但 Jenkins 并不原生支持它。导航到 Jenkins 配置部分，选择\"\
  管理插件\"部分。进入\"可选插件\"部分，搜索\"PMD 插件\"。有几个插件能够解析和呈现 PMD 文件，但这个插件就足够了。无需重启 Jenkins 即可安装此插件，然后返回\
  \ **Github Jobs for iOS** 的配置面板。\n\n如你所料，收集报告将在构建后操作中完成。点击\"添加构建后操作\"按钮，选择\"发布 PMD\
  \ 分析结果\"。后续步骤与之前所见并无不同。构建后操作只需为要收集的文件添加一个模式，与我们用于收集构件的模式类似。在\"PMD 结果\"字段中填入 `**/build/oclint_result.xml`，然后按下\"\
  高级\"按钮，以显示此插件附带的一些高级用户功能。\n\n选择\"始终运行\"选项。我们知道，如果代码中检测到太多错误，OCLint 可能会导致构建失败。当这种情况发生时，报告无论如何都会生成，不收集这些报告毫无意义。按下\"\
  保存\"按钮，并开始一次新的构建。\n\n\n# 第 10 章：质量保证\n\n构建运行后，项目侧边栏中会出现一个新条目：“PMD 警告”。如图 10-4 所示，该报告与\
  \ OCLint 生成的 HTML 报告非常相似。其显著优势在于此报告已格式化并集成到 Jenkins 中。\n\n![图 115](img/index-195_1.jpg)\n\
  \n**图 10-4.** 每个 XML 报告都会被检索、格式化并显示在 Jenkins 中\n\n**注意** 此次构建失败，因为太多行代码超过了 120 个字符的限制，如何解决这个问题完全取决于你。你可以使用三个选项进行调整：`-max-priority-1`、`-max-priority-2`\
  \ 和 `-max-priority-3`。这些选项将增加 OCLint 在判定构建失败前所允许的错误数量。另一种解决方案是再次增加每行代码允许的字符数。\n\n\
  在 Bamboo 中集成质量检查与我们之前在 Jenkins 中的做法非常相似。主要的区别（再次强调）在于它将在独立的任务中完成。这样，构建、测试和静态分析可以并行执行。唯一的问题是，目前\
  \ Bamboo 没有足够好的插件来处理 PMD 文件，因此我们无法涵盖这部分内容。\n\n## 总结\n\n本章重点介绍了使用 Clang 和 OCLint\
  \ 等工具进行质量保证。我们首先讨论了质量保证是什么，以及它如何对你和你的团队有所帮助。然后，我们详细介绍了 Clang 静态分析器，它可以轻松安装并与 OS\
  \ X 服务器集成，以便在你每次推送提交时运行。最后，我们介绍了 OCLint，这是另一种静态代码分析工具，它提供了不同类型的反馈，例如代码行过长。\n\n至此，我们的旅程已接近尾声。我们从一款功能非常简单的应用开始：调用\
  \ Web 服务、在表格视图中显示结果，并使用 Safari 显示工作机会的详细信息。\n\n在接下来的章节中，我们开始讨论命令行，更重要的是，如何使用 Xcode\
  \ 的命令行工具（而非 Xcode 的用户界面）来构建应用。我们从一个小工具开始，它为我们处理了整个过程，最后转向了我们自己用 Bash 编写的构建脚本。\n\n\
  在确认一切底层机制都正常工作后，是时候实现整个流程的自动化了，因此我们了解了如何使用 Jenkins 和 Bamboo 等持续集成平台来每日构建我们的应用。\n\
  \n之后，我们需要稍作休息，于是我们介绍了在构建完成后将应用分发给 Beta 测试人员所需的步骤，因为这是持续集成环境的好处之一：省去构建、打包和分发应用的麻烦。\n\
  \n我们还讨论了 OS X 服务器的 XCode 服务，它可以托管 Git 仓库、运行 Xcode 任务，并以一种相当优雅的方式展示构建状态。\n\n至此，我们拥有了一套相当不错的持续集成环境，能够在有新提交时自动构建应用。剩下的工作就是配置我们的工具，以便它们能提供更多反馈：单元测试和静态分析。\n\
  \n我们的环境并不完美，但我们几乎已经向你展示了所有的工作原理。这里重要的是，你（我希望！）已经看到持续集成并不可怕，而是一个能提供非常有价值的反馈、帮助你编写更优秀代码和更出色应用的利器。\n\
