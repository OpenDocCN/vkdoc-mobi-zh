  \ 和 `showWithStatus:maskType`。我们使用第二种方法，以便能够设置深色背景。否则，我们将无法正常看到 `HUD` 的动画效果。\n\n\
  一旦职位信息被获取，并且 JSON 被正确解码并转换为要显示的职位列表后，我们希望给用户一个处理完成的小提示。为此，请在 `NSURLSession` 的 `dataTaskWithURL:completionHandler:`\
