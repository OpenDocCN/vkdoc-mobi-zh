  \ Beta 版本。这是一个手动过程，即使用户界面非常直观，这项工作也可能很快变得耗时。幸运的是，`REST API` 使得自动化此过程成为可能，并能够在您喜欢的持续集成平台上的构建结束时提交打包好的应用程序。让我们从\
