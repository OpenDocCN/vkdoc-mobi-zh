  \n其中只有少量内容是可读的：“Apple Computer Certificate Authority”。Apple 生成的配置文件（provisioning\
  \ profile）使用了公钥密码学标准 `PCKS#7` 进行代码签名。其中第 7 版用于对消息签名，被称为加密消息语法（CMS）标准。\n\n这些奇怪的字符是一种验证机制，用于确保配置文件在\
  \ Apple 生成后未被篡改。还记得 Apple 只给你一百个设备名额吗？如果通过修改一个易于阅读的 Plist 文件就能轻松添加新的唯一设备标识符（UDID），那可就太遗憾了。\n\
  \n如果你仔细浏览这个 XML 文件的内容，应该会看到一些关键信息，比如这个配置文件的名称：\n\n```xml\n<key>Name</key>\n<string>Github\
  \ Jobs Ad Hoc Distribution</string>\n```\n\n一个由 Apple 生成的通用唯一标识符（UUID）：\n\n```xml\n\
  <key>UUID</key>\n<string>227G45F1-0BAF-4A6F-AE5A-B96F5825DBA8</string>\n```\n\n\
  以及你在生成这个配置文件时添加的 iOS 唯一设备标识符列表：\n\n```xml\n<key>ProvisionedDevices</key>\n<array>\n\
  \    <string>THIS-IS-A-DEVICE-UDID</string>\n    <string>THIS-IS-ANOTER-DEVICE-UDID</string>\n\
  \    <string>THIS-IS-A-THIRD-DEVICE-UDID</string>\n    <string>THIS-IS-A-FOURTH-DEVICE-UDID</string>\n\
  \    <string>THIS-IS-A-FIFTH-DEVICE-UDID</string>\n</array>\n```\n\n`UUID` 很重要。如果你曾经更改过应用的代码签名设置，并试图通过\
  \ git 或其他版本控制系统（VCS）提交这些更改，你可能已经见过它。如果你回到 Xcode，在构建设置中搜索“`UUID`”，应该只会看到配置文件部分，如图\
  \ 7-11 所示。这是因为你想要 Xcode 使用的配置文件实际上是通过其唯一标识符来识别的，而你只能看到它的名称。\n\n![Image 86***图 7-11.**\
  \ 搜索“UUID”将显示你应用的构建设置中的配置文件部分*配置文件还包含关于应用授权的信息，例如你是否会使用 iCloud 或 Apple Push Service\
  \ (aps)。当你遇到 Xcode 因上述错误之一而无法构建应用的莫名问题时，不妨检查一下你正在尝试使用的配置文件的内容。## 借助 iTunes Music\
  \ Store XML 清单现在你对配置文件有了更多了解，接下来让我们搭建自己的分发平台。我们需要一个简单的 HTML 页面、一个打包好的应用，以及一个我们将称之为清单的\
  \ XML 文件。在 Android 生态系统中，不使用 Play 商店分发应用是很容易的：你只需要提供一个直接下载应用的链接，用户通过移动设备浏览器点击即可。但如果你在\
  \ iPhone 上尝试同样操作，用户会收到来自 iOS 的错误消息，提示它不知道如何处理这个 IPA 文件。这有点烦人，而且我们都知道事实并非如此。分享 IPA\
  \ 文件是一个更复杂的过程，需要正确的 URL 方案，以及我们之前提到的 XML 清单。这些信息是必需的，这样 iTunes 才能理解如何处理该文件。### 创建一个简单的\
  \ HTML 页面为了举例说明，我们自己的分发平台将包含一个单一的 HTML 页面，其中包括标题、应用截图和下载按钮。在你选择的文件夹中，创建一个包含以下内容的\
  \ `index.html` 文件：```html<!doctype html><html><head>    <title>Download Github Jobs\
  \ for iOS</title></head><body>    <h1>Github Jobs for iOS</h1>    <a href=\"<URL>\"\
  >Click here to download the application</a></body></html>```![Image 87](img/index-138_1.jpg)\n\
  \nRuby 自带了一个捆绑的 HTTP 服务器，我们可以用它来在本地网络上共享这个页面。\n\n打开终端，导航到存储 `index.html` 文件的目录，并运行以下命令：\n\
  \n```\n$ ruby -run -e httpd -- --bind-address 0.0.0.0 --port 5000 .\n```\n\n```\n\
  [2014-05-25 16:43:51] INFO WEBrick 1.3.1\n[2014-05-25 16:43:51] INFO ruby 2.1.1\
  \ (2014-02-24) [x86_64-darwin13.0]\n[2014-05-25 16:43:51] INFO WEBrick::HTTPServer#start:\
  \ pid=46428 port=5000\n```\n\n如果你打开浏览器并访问 URL `localhost:5000`，应该会看到一个类似于图 7-12\
  \ 的页面。\n\n***图 7-12.** 我们非常棒的分发平台*\n\n### 清单文件\n\n现在我们有了看起来很棒的 HTML 页面，接下来谈谈我们需要创建的\
  \ XML 清单文件，以便你可以下载应用。如果你还记得，我们第一次将 Github Jobs for iOS 应用打包成 IPA 文件时，使用的是 Xcode\
  \ 的 Organizer。当 Organizer 问你希望将生成的文件放在哪里时，有一个带有“Save for Enterprise Distribution”标签的小复选框。选中后，会弹出一个表单，要求你填写一些信息。在后台，这些信息会被存储在一个类似于我们将要编写的\
  \ Plist 文件中。\n\n回到文本编辑器，在 `index.html` 文件旁边创建一个 `github-jobs.plist` 文件，内容如下：\n\n\
  ```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD\
  \ PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist version=\"\
  1.0\">\n<dict>\n    <key>items</key>\n    <array>\n        <dict>\n            <key>assets</key>\n\
  \            <array>\n                <dict>\n                    <key>kind</key>\n\
  \                    <string>software-package</string>\n                    <key>url</key>\n\
  \                    <string>http://<YOUR-LOCAL-IP>:5000/GithubJobs.ipa</string>\n\
  \                </dict>\n            </array>\n            <key>metadata</key>\n\
  \            <dict>\n                <key>bundle-identifier</key>\n            \
  \    <string>com.perfectly-cooked.Github-Jobs</string>\n                <key>bundle-version</key>\n\
  \                <string>0.1</string>\n                <key>kind</key>\n       \
  \         <string>software</string>\n                <key>title</key>\n        \
  \        <string>Github Jobs for iOS</string>\n            </dict>\n        </dict>\n\
  \    </array>\n</dict>\n</plist>\n```\n\n确保将 `<YOUR-LOCAL-IP>` 替换为你实际的本地 IP 地址，并确保\
  \ `bundle-identifier` 和 `bundle-version` 与你应用的信息一致。然后，复制你的应用的最新版本——或者更好的是，从你最新的\
  \ Jenkins 或 Bamboo 构建的 artifacts 部分下载它——并将其保存在与 `index.html` 和 `github-jobs.plist`\
  \ 相同的目录层级中。\n\n\n\n打开你的`index.html`文件，使用以下 URL 作为下载链接的`href`属性值：\n\n`itms-services://?action=download-manifest&url=http://172.16.43.115:5000/github-jobs.plist`\n\
  \n最后，在你的 iOS 设备（当然，该设备需被授权执行此应用）上打开 Safari 浏览器，并使用你的本地 IP 地址导航到你的网站。如果你不知道自己的 IP\
  \ 地址，请打开系统偏好设置的“网络”部分，那里会显示该信息。请记住，我们使用了`0.0.0.0`作为绑定地址，因此你的“网站”可以在本地网络中访问，而不仅仅是你自己的电脑。点击下载链接，系统会询问你是否真的要下载该应用。\n\
  \n恭喜，你已经搭建好了一个非常简单的分发平台！\n\n**练习：在任务结束时发送新的 IPA 文件**\n\n如果你对 Web 开发也感兴趣，这里有一个简单的练习。在\
  \ Jenkins 或 Bamboo 任务结束时，将新的 IPA 文件发送到你的 Web 服务器，这样你就可以随时下载最新版本的构建产物。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**138**\n\n**第 7 章：无线（OTA）分发**\n\n**额外功能：使用配置文件设置访问控制列表（ACL）**\n\n我们自己的平台存在一些问题：设计、手动编辑`index.html`和`github-jobs.plist`文件，当然还有安全性！目前，任何能访问你本地网络的人都可以轻松安装并使用该应用。如果你把这个小平台上传到云端，基本上任何人都可以下载并安装你的应用。\n\
  \n事实上，检查用户是否有权下载你的应用是非常简单的，同样可以利用应用本身。即使你想为应用添加简单的登录/密码认证过程，你仍然需要检查用户是否有权安装该应用。\n\
  \n幸运的是，你在创建配置文件时已经指定了这一点。让我们再次利用它！\n\n**解读配置文件**\n\n我们之前提到过，IPA 文件只不过是一个经过代码签名的\
  \ ZIP 归档文件，其中包含了应用。而应用本身又包含了配置文件。实际上，如果你解压归档文件并查看`Payload`文件夹，你应该会看到一个名为`embedded.mobileprovision`的文件。\n\
  \n使用终端，导航到包含生成的 IPA 文件的文件夹（使用`cd`命令），然后运行以下命令：\n\n```\n$ unzip Github\\ Jobs.ipa\n\
  $ cd Payload/Github\\ Jobs.app/\nGithub Jobs.app|master ⇒ ls -hal\ntotal 1032\n\
  drwxr-xr-x  13 Palleas  staff   442B 20 May 20:03 .\ndrwxr-xr-x   3 Palleas  staff\
  \   102B 20 May 20:03 ..\n-rw-r--r--   1 Palleas  staff    74K 20 May 20:03 Assets.car\n\
  drwxr-xr-x   3 Palleas  staff   102B 20 May 20:03 Base.lproj\n-rwxr-xr-x   1 Palleas\
  \  staff   397K 20 May 20:03 Github Jobs\n-rw-r--r--   1 Palleas  staff   1.4K 20\
  \ May 20:03 Info.plist\n-rw-r--r--   1 Palleas  staff    15K 20 May 20:03 LaunchImage-700-568h@2x.png\n\
  -rw-r--r--   1 Palleas  staff     8B 20 May 20:03 PkgInfo\n-rw-r--r--   1 Palleas\
  \  staff   150B 20 May 20:03 ResourceRules.plist\ndrwxr-xr-x   5 Palleas  staff\
  \   170B 20 May 19:49 SVProgressHUD.bundle\ndrwxr-xr-x   3 Palleas  staff   102B\
  \ 20 May 20:03 _CodeSignature\n-rw-r--r--   1 Palleas  staff    12K 20 May 20:03\
  \ embedded.mobileprovision\ndrwxr-xr-x   3 Palleas  staff   102B 20 May 20:03 en.lproj\n\
  ```\n\n`embedded.mobileprovision`文件包含了一组授权运行该应用的设备列表。如果你要搭建一个真实的应用，只需将一个或多个设备标识符与用户账户关联起来，然后利用最新构建中包含的信息来判断是否应向该用户显示下载链接。当然，这只是一个理论上的方案，但足以让你入门。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 7 章：无线（OTA）分发**\n\n**139**\n\
  \n**总结**\n\n在 2014 年 WWDC 上，苹果公司宣布了他们在收购 TestFlight 背后的公司后的计划。内部测试团队、面向多达一千名用户的\
  \ Beta 分发、崩溃报告以及用户反馈都在计划任务之中。在撰写本书时，这些功能大多仍处于测试阶段，并且将仅限于 iOS 8。其他一些功能，如崩溃报告，预计将在\
  \ 2015 年晚些时候发布。你还不能指望这些解决方案现在就完美无缺，但大多数开发者对此感到非常高兴。关键在于，你已经基本了解了整个运作机制，从使用现有的分发平台到开发自己的平台。\n\
  \n本章主要讨论的是无线部署。我们向你介绍（或再次介绍）了一个非常著名的解决方案——TestFlight，它最近被苹果收购。这个解决方案非常强大，因为它能帮助你管理应用和多个用户团队，从而让你可以轻松地发送应用的\
  \ Beta 版本。我们向你展示了如何使用命令行将这些构建版本发送到 TestFlight，甚至可以在构建过程结束时，使用你偏好的持续集成平台自动完成此操作。\n\
  \n在了解了持续集成平台之后，你已经准备好探索苹果去年发布的一个新工具：Xcode Bots。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 8 章**\n\n**Xcode Bots 的日常使用**\n\n我们在第一章中提到，本书将像一次旅程。我们从介绍你手头的工具开始，然后使用多个平台构建了一个简单但功能强大的持续集成架构。到现在，我们希望你已经能在\
  \ Jenkins 和 Bamboo 之间做出选择。但如果你还没下定决心，这一章可能会让决策过程更加困难。\n\n之前的章节涵盖了苹果公司不太关注持续集成时期的工具。幸运的是，聪明的人们找到了将现有工具适配到新技术的方法。借助\
  \ Jenkins 和 Bamboo，你应该能构建出相当不错的持续集成架构。\n\nXcode 5 的发布不仅让你得以一窥 OS X 10.10 可能的样子，并让你可以无痛地合并故事板文件。它还带来了你可以使用的重要改进：OS\
  \ X Server 的 Xcode 服务和 Xcode Bots。当然，它并不完美——我们还没发现哪个苹果开发者工具从第一天起就是完美的。有些人会说苹果不在乎，但我们认同那些认为他们确实在乎的人。Xcode\
  \ Bots 在宣布的那一天就大受欢迎。然而，在 2014 年 WWDC 上，苹果宣布了一系列变更和改进，使得 Xcode Bots 成为了 iOS 和 OS\
  \ X 开发者必备的工具。\n\n我们将先简要说明为什么需要关注又一个持续集成工具，然后介绍 OS X Server，并附带一点苹果公司的历史。接着，我们将介绍\
  \ Xcode 5，以及如何将其与 OS X Server 集成以管理我们的`git`仓库，并创建漂亮的新 Bot。最后，我们将使用这个 Bot 每晚构建`Github\
  \ Jobs for iOS`应用，并观察它如何与一个非官方支持的第三方工具——Cocoapods 协同工作。\n\n**为什么还需要另一个持续集成工具？**\n\
  \n在我们介绍了如何搭建 Jenkins 和 Bamboo 这两个持续集成平台之后，我们通过涵盖一个不同的主题（无线应用部署）而有点打断了流程。现在，你可能会疑惑为什么我们还需要另一个持续集成平台，因为仅凭目前所知的一切，已经足以自动构建和部署一个应用了。\n\
  \n**141**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**142**\n\n**第\
  \ 8 章：Xcode Bots 的日常使用**\n\n\n\n# 最终追求：使用 Xcode Bots 实现持续集成\n\n事实是，`Xcode` 机器人并非旨在取代你的\
  \ `Jenkins` 或 `Bamboo` 安装。至少目前还不是。现阶段，`Xcode` 机器人虽然前景广阔，但也存在不少缺陷。在本章中，我们将向你展示如何安装、设置并使用这些新功能，以及它们如何融入你的日常工作流程。\n\
  \n我们将这一章称为你通往理想持续集成平台之旅的最终追求。\n\n在我们详细介绍其工作原理之后，将利用剩余章节讨论自动化测试和质量保证。\n\n闲言少叙，请准备好信用卡打开\
  \ `Mac App Store`，让我们开始吧。\n\n## OS X Server\n\n在我们开始讨论 `OS X Server` 的工作原理之前，需要先了解促成该工具首次发布的历程。\n\
  \n### 一点历史\n\n在 `OS X Lion` 之前，Mac OS X 和 Mac OS X Server 是两个独立的操作系统；后者与桌面版类似，但附带了额外的管理工具。服务器版是为机架式服务器计算机\
  \ `Xserve` 设计的，现在已被 `Mac mini server` 和 `Mac Pro server` 取代。\n\n当 `OS X Lion` 发布时，Mac\
  \ OS X 和 Mac OS X Server 合并为一个名为 `OS X` 的操作系统。与服务器相关的组件现在以独立的打包应用程序形式发布，你可以从 `Mac\
  \ App Store` 下载。请注意，`Mac Pro` 和 `Mac Mini` 计算机可以预装 `OS X` 购买，但正如我们将要展示的，在计算机上设置\
  \ `OS X Server` 非常简便。\n\n### 在你的计算机上安装 OS X Server\n\n`OS X Server` 售价 20 美元，如果不安装它，你将无法使用\
  \ `Xcode` 的持续集成功能。要运行最新版本的 `OS X Server`，你至少需要 `OS X Mavericks` 和最新版本的 `Xcode`。我们使用的是\
  \ `Xcode 6` 的第三个测试版和 `OS X Server` 的 `3.1.5` 版本。\n\n打开 `Mac App Store`，搜索“OS X Server”并在你的计算机上安装。\n\
  \n安装完成后，启动它以开始安装过程，该过程需要 root 权限。\n\n不过别担心：它不会擦除你计算机上的内容。在安装过程结束时，你应该会看到通过 `OS X\
  \ Server` 可用于你的服务概览，类似于图 8-1：日历、信息、邮件、时间机器，当然还有 Xcode。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图 88](img/index-144_1.jpg)\n\n**第 8 章：Xcode bots 的日常使用**  \n**143**\n\n***图\
  \ 8-1.** OS X Server 开箱即支持许多服务*\n\n如你所见，只需点击几下，我们就拥有了一个几乎可以为我们工作的服务器，而使用 `Jenkins`\
  \ 或 `Bamboo` 完成同样的工作需要更多步骤。这就是使用 `OS X Server` 构建持续集成平台有意义的理由之一：它依赖于你已经熟悉的工具（如 `App\
  \ Store`），并且外观和感觉都像一个 OS X 应用程序。\n\n我们现在真正关心的服务是 `Xcode`，它默认是禁用的。让我们激活它以便开始使用。在左侧菜单中选择\
  \ `Xcode` 项。切换右上角的开关，当文件面板打开时，导航到你的 `Application` 文件夹并选择 `Xcode` 应用程序。\n\n一旦 `Xcode`\
  \ 设置完成，你应该会看到关于新激活的 `Xcode` 服务的更多信息。\n\n首先要知道的是，你的 `Xcode` 服务器会自动在你的本地网络上可用，在我们的例子中，它是“romain.local”，这是基于计算机名称生成的默认主机名。\n\
  \n其次，`Xcode` 服务带有一个默认权限方案，其中只有经过身份验证的用户才能创建机器人，而每个人都可以看到它们，当然前提是他们在同一网络上。\n\n`OS\
  \ X Server` 使用与操作系统相同的用户数据库。如果你从左侧菜单进入 `Users` 部分，你应该会看到计算机上的所有用户。假设明年夏天会有一名实习生加入你的公司，但你不希望他拥有托管\
  \ `OS X Server` 的计算机的完全访问权限。让我们创建一个账户。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图 89](img/index-145_1.jpg)\n\n**144**  \n**第 8 章：Xcode bots 的日常使用**\n\n点击 `Users`\
  \ 部分左下角的加号，并根据图 8-2 填写表单，信息自定。请注意，我们还为该用户添加了“internship”标签，并添加了一段简短的信息说明。重要的是，我们并没有选择创建一个实际用户，而只创建了一组凭据。这就是为什么在\
  \ `Home folder` 中，你会选择“None – Service only”：我们只希望 Camille 能够管理机器人。我们也可以使用类似的面板将我们的新用户分配到一个实习生组等等，但是\
  \ a) 这有点超出了本书的范围，b) 对于像我们这样简单的项目来说，这太过复杂了。按下 `Create` 按钮，然后返回 `Xcode` 的服务管理。\n\n\
  ***图 8-2.** 实习生 Camille 将能够使用她的凭据访问某些服务*\n\n让我们调整一下权限，使得只有管理员和我们的实习生能够创建机器人，并且只有登录用户才能查看所有机器人。为此，点击权限部分旁边的\
  \ `edit` 按钮。在第一个组合框中选择“only some users”，点击加号，并在出现的字段中搜索 Camille。同时，勾选面板底部的复选框，并在其旁边的组合框中选择“only\
  \ logged in users”。最后，按 `OK`。\n\n此部分下方是有关构建将如何执行的更多信息。你首先看到的是将用于构建应用程序的 `Xcode`\
  \ 版本。如果你还记得我们在第 3 章中讨论的内容，可以使用 `xcode-select` 或 `DEVELOPER_DIR` 环境变量在开发者目录之间切换。这基本上就是本节的目的，只是在这里你拥有一个用户界面，并且当你尝试选择无效的\
  \ `Xcode` 应用程序时，会收到一条稍微令人困惑的错误消息：“此应用程序无法与 OS X Server 一起使用。”\n\n`Xcode` 服务还可以使用凭据连接到你的现有\
  \ Apple 开发者账户，以便自动下载代码签名身份和配置文件。点击 `Developer teams` 部分附近的 `Add` 按钮，并填写你的凭据。如果此\
  \ Apple 标识链接到多个团队，请选择你希望用于此 `OS X Server` 安装的团队。如果你只属于一个团队，只需确认你确实希望将此服务器添加到你的团队即可。\n\
  \n最后但同样重要的是，适用于 `OS X Server` 的 `Xcode` 服务将能够同时在多个设备上运行测试。即使我们将在下一章中介绍单元测试，也请将你的一个设备插入运行\
  \ `OS X Server` 的计算机，并等待它检测到该设备。\n\n我们已使 `Xcode` 服务在我们的本地网络上可用，设置了基本权限，配置了开发者目录（它将在此目录中找到构建应用程序所需的所有工具），最后配置了我们的\
  \ Apple 开发者账户并插入了一个设备。最终，你的服务配置应如图 8-3 所示。\n\n***图 8-3.** 一切均已正确配置，Xcode 服务现已准备好为我们工作*\n\
  \n此新版本的一个出色功能是，`OS X Server` 现在能够托管 Git（以及 SVN，但……）仓库，并连接到现有仓库，如“Repositories”部分所示。\n\
  \n\n\n## Xcode Bots 的日常使用\n\n### Xcode 6\n\n`Xcode 5` 对许多开发者来说是一个非常重要的版本。它带来了大量针对界面构建器的升级和修复，尤其是对自动布局的改进。更重要的是，得益于我们之前配置的\
  \ `Xcode` 服务，它实现了与 OS X Server 的集成。在 `WWDC 2014` 上，Apple 发布了更好的新版本 `Xcode`。\n\n\
  就像 `iOS 7.0` 一样，`Xcode` 与 OS X Server 最初通信的过程有些坎坷。本节将介绍如何仅使用 Apple 技术为项目搭建持续集成架构。\n\
  \n### 持续集成\n\n通过一次按键就能运行单元测试，或者通过几个步骤就能编译、归档和打包应用，这并非新事物。第一种方式的缺点是会耗费你不一定拥有的时间，而且大多数时候开发者会忘记执行此操作，这会让你的测试套件变得毫无意义。第二种方式则是一个乏味的过程。为了解决这个问题，我们发现了一些可以直接使用或封装到构建脚本中的工具，比如\
  \ Facebook 的 `xctool` 或 Marin Usalj 的 `xcpretty`。\n\n有了 `Xcode 5`，我们终于能够从命令行运行 iOS\
  \ 单元测试（稍后会有更多信息），这使得我们可以从持续集成平台上自动执行这些测试。更重要的是，我们现在可以直接从 `Xcode` 配置持续集成平台了。\n\n\
  ### 从 Xcode 与 Xcode 服务通信\n\n打开 `Xcode` 的偏好设置（或在 Xcode 打开时按 `⌘ + ,`），然后选择账户部分。点击窗口左下角的加号，从弹出的菜单中选择\"\
  添加服务器...\"。如果一切正常，并且没有代理阻止连接，你应该会看到你的服务器已经通过 Bonjour 在本地网络中被自动发现，如图 8-4 所示。\n\n\
  ![图片 91](img/index-148_1.jpg)\n\n**图 8-4.** 我们设置的 OS X Server 实例在本地网络中被自动发现\n\n\
  **注意** Bonjour：Bonjour 是 Apple 对零配置网络协议组的实现。最初名为 \"RendezVous\"，Bonjour 可用于通过多播域名系统\
  \ (mDNS) 服务记录定位其他计算机。\n\n请注意，使用 Jenkins 也可以实现类似的行为，如果你在网络中发送 UDP 广播，它会响应一个包含安装信息的\
  \ XML 消息，如下所示：\n\n```\n$ echo \"Hey Jenkins\" | nc -u 0.0.0.0 33848\n\n<hudson>\n\
  \  <version>1.560</version>\n  <url>http://localhost:8080/</url>\n  <server-id>990ad56b5659020020aee81d644db8ca</server-id>\n\
  \  <slave-port>57621</slave-port>\n</hudson>\n```\n\n如果你想确保 Jenkins 主节点和从节点的一个或多个实例可以相互访问，这会很有用。\n\
  \n从列表中选择你的 OS X Server，然后点击**下一步**按钮。在出现的窗口中，输入你之前为内部用户设置的凭据，然后点击**确定**。请注意，虽然提供了**访客**访问权限，但由于我们这样配置了，访客用户将无法访问现有\
  \ bots，更别提创建新的了。\n\n现在我们已经将 OS X Server 添加到了 `Xcode` 中，打开 Github Jobs for iOS 应用，并从**产品**菜单中选择\"\
  创建 Bot...\"项。\n\n### 什么是 Bot？\n\n如果你还记得我们在 Bamboo 和 Jenkins 中的任务是如何工作的，它们都从一个简单的步骤开始：从远程仓库获取源代码的最新版本，然后开始构建。Xcode\
  \ Bot 也是如此。实际上，什么是 bot？\n\nXcode Bot 类似于 Xcode 的 scheme，它们都是一组封装的信息和指令。一个 bot 将包含一个它有权访问的远程仓库的引用，以及关于要构建的项目的其他信息：何时构建、如何构建以及构建后做什么。\n\
  \n当你设置一个 bot 时（我们稍后将介绍这个部分），您需要像在几乎任何持续集成平台上一样，决定何时要构建项目。一旦决定了这一点，你还需要决定项目将如何构建：它将使用哪个共享\
  \ scheme？是否应该运行静态代码分析？是否应该运行测试套件？如果运行，它是在模拟器上运行测试，还是在连接的设备上运行？是否应该归档构建产物？\n\n最后，你还需要决定构建完成后要做什么。例如，如果构建失败，是否应该向团队发送电子邮件？\n\
  \n所有这些信息都包含在一个 bot 中，我们将使用这个 bot 在 OS X Server 实例上构建应用程序。\n\n### 设置 Github Jobs\n\
  \n新版 OS X Server 的一个出色功能是能够托管 git 仓库，这使其在技术上可以替代 Github 或 Bitbucket 等第三方服务。当然，这并不完全正确，因为这些服务不仅提供托管，还提供拉取请求、发布管理等功能。在本节中，我们将介绍如何创建我们的第一个\
  \ bot，授予 Xcode 服务器访问远程仓库的权限，并了解如何处理依赖管理。\n\n### 使用 Xcode Bots 对 Github Jobs for\
  \ iOS 进行每日构建\n\n一个 bot 可以执行不同的操作：运行测试、进行代码静态分析以及归档应用程序。由于我们把最好的内容留到本书最后，我们将只创建一个每晚归档构建的\
  \ bot。\n\n我们之前提到过，Xcode Bot 提供的信息是应该用于构建应用的 scheme。如果我们使用命令行快速查看可用的 schemes，结果如下：\n\
  \n```\n$ xcodebuild -list\n\n关于项目 \"Github Jobs\" 的信息：\n\nTargets:\n  Github Jobs\n\
  \  Github JobsTests\n\n构建配置：\n  Debug\n  Adhoc\n  Release\n```\n\n![图片 92](img/index-150_1.jpg)\n\
  \n如果未指定构建配置且未传递 `-scheme`，则使用 `Release`。\n\nSchemes:\n- Github Jobs\n\n唯一可用的 scheme\
  \ 是我们在脚本中用来通过 Bamboo 或 Jenkins 构建应用的 Github Jobs scheme。从 `Xcode` 打开\"管理 Scheme\"\
  面板，打开此 scheme 的详细信息，然后根据需要取消选中**共享**复选框。关闭\"管理 schemes\"窗口，返回 bot 创建窗口。如果你尝试使用该\
  \ scheme 来构建 Github Jobs for iOS 应用，\"共享 scheme\"复选框将自动被选中，如图 8-5 所示。如果你尝试取消选中该\
  \ scheme，**确定**按钮将被禁用。\n\n我们已经在第 3 章中讨论过 scheme 共享问题，并提到忘记这个选项是多么容易。这是使用专为 `Xcode`\
  \ 项目设计的工具的另一个优势：你根本无法基于非共享的 scheme 创建 Xcode Bot。\n\n在**名称**字段中为你的每日构建 bot 填写一个专用名称。可以发挥创意——毕竟，如果你不能给它们起个酷炫的名字，使用与机器人相关的工具还有什么意义呢？我们将它命名为\"\
  Klaus\"。\n\n确保选择的服务器是你在上一节中设置的那个，并且如图 8-5 所示，确保\"提交更改并立即集成\"选项已选中。\n\n**图 8-5.**\
  \ 你不能基于非共享的 scheme 创建 Xcode bot\n\n\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图片 93](img/index-151_1.jpg)\n\n**150** **第 8 章：Xcode Bots 的日常使用**\n\n#### 授予对\
  \ GitHub 远程仓库的访问权限\n\n配置此 Bot 的下一步将搜索你的工作副本，查找服务器有权访问的远程仓库。不幸的是，它没有任何访问权限，你将收到一条警告，如图\
  \ 8-6 所示。\n\n***图 8-6.** 服务器无法访问远程仓库*\n\n这个问题很容易解决，我们只需找到一种方法让服务器能够访问我们的仓库。为此，根据仓库托管的位置，我们有两种不同的选择：提供用户名和密码，或者使用\
  \ SSH 密钥。由于我们的仓库托管在 GitHub 上，而这家公司让 SSH 密钥管理变得轻而易举，因此我们将选择 SSH 密钥。\n\n点击此警告右侧的 `change`\
  \ 按钮，在出现的菜单中选择“New SSH Key”。将用户名保留为“git”，然后点击生成的公钥前几个字符附近的小齿轮图标。在出现的菜单中选择“copy”，将公钥存储到剪贴板，并将此公钥添加到你的账户。完成后，按下\
  \ `next`。它将检查凭据，如果密钥正确添加，则会有一个绿色的大勾号确认凭据已验证。\n\n#### 配置 Bot 并获取反馈\n\n在下一个窗口中，在计划组合框中选择“Periodically”，并将其设置为每天凌晨\
  \ 1 点执行一次每日构建。然后，取消选中“Perform analyze action”和“Perform test section”：目前我们只想像前几章中持续集成脚本所做的那样构建应用程序。最后，按下“Next”。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 8 章：Xcode Bots 的日常使用**\
  \ **151**\n\n最后一个屏幕非常重要。我们之前提到过，Xcode Bot 只是一个简单的信息容器，用于描述如何以及何时执行特定的操作。而此面板还允许你配置这些操作前后应发生的事情。此屏幕的默认配置是，在构建或分析失败时向提交者发送邮件。每次提交时，这些提交者都会通过其姓名和电子邮件被识别：\n\
  \n```\n$ git show 1e93f4d83499660e63fc9ec21cbd16803f7f4268\ncommit 1e93f4d83499660e63fc9ec21cbd16803f7f4268\n\
  Author: Romain Pouclet <palleas@gmail.com>\nDate: Sat May 31 18:38:52 2014 -0400\n\
  Fix script and scheme and stuff\n```\n\n这也意味着，如果你决定通过 Xcode Bot 构建在 GitHub 上找到的开源库，原作者可能会收到关于构建失败的邮件。集成前请三思！\n\
  \n我们稍后会回到这个屏幕，现在只需点击“Create”按钮，静待奇迹发生。事实上，这是一种极好的反馈方式，让你在早晨开始工作时就能立即知道项目是否有任何问题。\n\
  \n在最后一个屏幕中，选中两个“committers”复选框，以便所有为正在构建的项目做出贡献的人都能了解夜间构建的结果。\n\n**警告/注意** 由于某些原因，Xcode\
  \ 可能无法自动打开提交面板。如果是这种情况，请选择 `Source Control > Commit` 并手动提交你的更改。这一点很重要，因为如果方案配置不当，Xcode\
  \ 服务将无法构建你的应用程序。\n\n准备就绪后，导航到日志导航器，这是 Xcode 文件浏览器的最后一个选项卡。\n\n这是你将会找到所有已执行操作列表的面板。如果\
  \ Bot 尚未开始，请右键单击你的 Bot，然后选择“Integrate Now”项，以便立即查看集成结果，这很可能因与你的 `Podfile` 相关的错误而失败。请稍安勿躁，我们将在下一节中修复它。首先，让我们看看直接在\
  \ Xcode 中可用的反馈。第一个部分，如图 8-7 所示，总结了构建期间发生的情况：实际错误、警告、静态分析结果以及单元测试结果。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图片 94](img/index-153_1.jpg)\n\n![图片 95](img/index-153_2.jpg)\n\n**152** **第\
  \ 8 章：Xcode Bots 的日常使用**\n\n***图 8-7.** 集成失败，出现三个错误和一个警告*\n\n请注意，此图中可见的问题列在“Unresolved\
  \ Issues”部分下。由于这实际上是该 Bot 执行的第一次集成，这些问题被标记为新的。\n\n第二个部分，如图 8-8 所示，显示了稍后发生的集成中所涉及的提交列表。当执行新的集成时，Bot\
  \ 会从远程仓库获取新的提交。如果构建失败，你可以轻松地看到错误可能是在何时引入的。\n\n***图 8-8.** 集成详情的第二部分显示了所涉及的提交者列表*\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图片 96](img/index-154_1.png)\n\
  \n**第 8 章：Xcode Bots 的日常使用** **153**\n\n**注意** 仅凭 Git 就能通过执行“二分”搜索，使用 `git bisect`\
  \ 命令定位回归是在哪里引入的。更多信息请访问此页面：\n\n[`git-scm.com/book/en/Git-Tools-Debugging-with-Git#Binary-Search`](http://git-scm.com/book/en/Git-Tools-Debugging-with-Git#Binary-Search)\n\
  \n现在让我们来看看集成失败的原因。如果你查看图 8-9，可以看到明显的与 CocoaPods 相关的错误：找不到 `PodFile.lock` 和 `Manifest.lock`\
  \ 文件，也找不到 `xconfig` 文件，而且我们收到了一个关于沙箱不同步的错误。\n\n***图 8-9.** 由于某些与 CocoaPods 相关的原因，集成仍然失败*\n\
  \n要理解这个错误，你首先必须回忆起我们在第 2 章中提到的，关于我们可用于设置持续集成平台的所有工具。其中一个工具是“Run script build phases”，你可以将其添加到构建过程中，它会运行任意的\
  \ Shell 脚本。\n\n导航到 Github Jobs 目标详情的“build phases”选项卡，你应该会看到一个名为“Check Pods Manifest.lock”的阶段，它运行以下脚本：\n\
  \n```\ndiff \"${PODS_ROOT}/../Podfile.lock\" \"${PODS_ROOT}/Manifest.lock\" > /dev/null\n\
  if [[ $? != 0 ]] ; then\ncat << EOM\nerror: The sandbox is not in sync with the\
  \ Podfile.lock. Run 'pod install' or update your CocoaPods installation.\nEOM\n\
  exit 1\nfi\n```\n\n此脚本使用 `PODS_ROOT`（这是 CocoaPods 在你首次运行 `pod install` 命令时添加的用户定义的构建设置）来定位\
  \ `Podfile.lock` 和 `Manifest.lock` 文件。此文件包含关于你项目依赖项的信息，以便下次你或你的合作者需要安装项目最新版本时，依赖项将以相同版本安装。拿到这两个文件的路径后，它使用\
  \ `diff` 命令来比较这些文件。如果不匹配，则意味着当前与项目捆绑的依赖项版本不正确。你可以通过在项目目录中运行 `pod install` 来解决此问题。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**154** **第 8 章：Xcode Bots\
  \ 的日常使用**\n\n\n\n此脚本会失败，因为 `Manifest.lock` 文件不存在，包含你依赖项的 `Pods` 文件夹也不存在。这可能意味着需要将\
  \ `Pods` 文件夹添加到你的主仓库中，但我们确实不想这么做。我们想要做的是在构建实际开始之前安装我们的依赖项。\n\n### 在 Xcode Bot 执行的集成过程中安装依赖项\n\
  \n首先想到的解决方案是再添加一个运行脚本构建阶段，但这会引发一些问题。构建阶段存储在目标级别，在我们的案例中，我们将修改 \"Github Jobs\" 这个目标。这也意味着每次我们从\
  \ Xcode 构建应用程序时，该脚本都会运行。我们可以简单地在脚本中添加一个`if`条件，如果脚本不是由 \"_teammserver\" 用户执行的，则退出，但这并不是一个非常稳定和可靠的解决方案。\n\
  \n我们也可以复制该目标，但这意味着要管理两个目标：一个用于日常工作，另一个用于持续集成。修改目标绝对不是一个好办法。\n\n在 Xcode 5 中，至少可以说，安装依赖项是一个繁琐的过程。你必须使用一个预构建的\
  \ scheme 操作来执行一个运行著名的 `pod install` 命令的脚本。\n\n这种方法有几个缺点：由于该脚本存储在 scheme 级别，你无法从脚本执行中获得任何输出，并且必须手动将此输出重定向到某个文件。\n\
  \n好消息是我们不再需要这种变通方法了，因为 Apple 在 Xcode 6 中引入了**集成前**和**集成后**触发器。我们已经看到了如何使用集成后触发器在构建失败时向提交者发送电子邮件，现在让我们看看如何使用集成前触发器来调用\
  \ Cocoapods 可执行程序。\n\n在集成界面中，点击屏幕右上角的设置齿轮图标，这将允许你编辑你的 Bot 的设置。点击下一步，直到到达“配置 Bot\
  \ 触发器”部分。在“集成前”标题下，点击“添加触发器”按钮，然后选择“运行脚本”。在出现的字段中，输入以下脚本：\n\n```\nexport LC_ALL=\"\
  en_US.UTF-8\"\n\nPODFILE=`find . –type f – name Podfile`\n\ncd `dirname $PODFILE`\n\
  \npod install\n```\n\n这个脚本相当直接。它做的第一件事是定义当前语言环境。这是 Cocoapods 的要求，否则你会得到以下错误：\n\n\
  `CocoaPods requires your terminal to be using UTF-8 encoding. See`\n\n[`github.com/CocoaPods/guides.cocoapods.org/issues/26`](https://github.com/CocoaPods/guides.cocoapods.org/issues/26)\
  \ 寻求可能的解决方案。\n\n然后，它使用 `find` 命令来定位 `Podfile`。当执行此脚本时，当前目录并不是你的项目根目录。一旦定位到这个文件，就会使用\
  \ `dirname` 命令来获取包含该文件的目录路径并导航到该目录。请注意，我们本可以对文件夹路径进行硬编码，但这种方式可能更清晰，例如，万一你更改了项目名称。\n\
  \n一旦我们导航到这个文件夹，我们就运行 `pod install` 命令来安装依赖项。`Pods` 文件夹会被创建，里面包含 `Manifest.lock`\
  \ 文件以及 `xcconfig` 文件，后者包含 Cocoapods 正常运行所需的额外信息。例如，以下是为我们项目生成的文件：\n\n```\nGCC_PREPROCESSOR_DEFINITIONS\
  \ = $(inherited) COCOAPODS=1\nHEADER_SEARCH_PATHS = \"${PODS_ROOT}/Headers\" \"\
  ${PODS_ROOT}/Headers/SVProgressHUD\"\nOTHER_CFLAGS = $(inherited) -isystem \"${PODS_ROOT}/Headers\"\
  \ -isystem\n\"${PODS_ROOT}/Headers/SVProgressHUD\"\nOTHER_LDFLAGS = -ObjC -framework\
  \ QuartzCore\nPODS_ROOT = ${SRCROOT}/Pods\n```\n\n这里重要的部分是声明的 `PODS_ROOT`，它包含了 `Pods`\
  \ 目录的路径。\n\n当无法加载此文件时，构建设置 `PODS_ROOT` 在构建期间就不可用。这也意味着无法计算出 `Manifest.lock` 文件的路径，因此我们一直遇到的集成失败就发生了。\n\
  \nApple 发布了一个需要如此多工作才能正常运行的工具，这可能看起来令人惊讶，但请记住，我们使用的是与 Apple 毫无关联的第三方工具。\n\n平心而论，对于\
  \ Xcode 和 OS X Server Xcode 服务器，如果我们不依赖 Cocoapods 来管理依赖项，我们本可以在几分钟内完成所有设置。包括创建项目、使用\
  \ Bot 构建项目以及将其托管在 OS X Server 上。\n\n如果你现在尝试启动一次集成，与 Cocoapods 相关的错误将不再发生，并会列在已解决问题列表下，如图\
  \ 8-10 所示。\n\n**图 8-10.** *集成成功，我们在上次集成中遇到的错误被标记为已解决*\n\n当我们使用 Jenkins 或 Bamboo\
  \ 来构建应用程序时，这两个平台都有一个共同的特点，即能够将构建限制在应用程序的特定分支上。我们还没有在 Xcode Bot 中看到这个功能，但这并不意味着它不存在。\n\
  \n当你在 Xcode 中创建一个 Bot 时，它会检索你项目当前使用的分支名称，并将 Bot 限制在这个特定分支上。如果你想更改分支名称，你将不得不从日志面板编辑\
  \ Bot，并且在不更改任何内容的情况下，只需点击完成过程中的几个步骤。我们承认这不是一个非常好的流程，但这只是因为 Xcode 对 Bot 参数的控制有限。Xcode\
  \ 集成本意是一个非常简单明了的过程：你正在开发一个功能，并且想知道你是否破坏了什么。一旦你的功能完成，删除（或更新）Bot 并继续前进。\n\n老实说，你可能找不到比\
  \ `Klaus` 更糟糕的 Bot 名称了；我们使用它只是为了之后有个理由去更改它。你应该始终使用不言自明的名称，这样你可以快速了解它们的用途。例如，我们的\
  \ Bot 可能应该命名为 “Github Jobs (Nightly)”，这样会更有意义，并且在 Bot 列表中更容易找到。要做到这一点，同时更改集成运行的分支，只需使用我们之前添加集成前触发器时用过的屏幕右上角的齿轮按钮，返回到设置面板。\n\
  \n要更好地控制你的 OS X Server 持续集成平台的唯一方法是使用另一种直接与服务器通信的界面：**Web 界面**。既然我们已经涵盖了 Xcode 端关于\
  \ Bot 几乎所有需要了解的内容，那么让我们继续探讨 Web 界面。请注意，在 Xcode 5 中，有一种方法可以从 Web 界面直接编辑 Bot 的设置，但根据\
  \ Xcode Server 的最新测试版，这个功能似乎已经消失了。\n\n### 从 Web 界面管理 Xcode 服务\n\n用于 Xcode 服务的 OS\
  \ X Server Web 界面可通过一个由你计算机在网络上的名称组成的 URL 访问，在我们的例子中是 `romain.local`，后面跟着路径组件 `xcode`，因此得到：`http://romain.local/xcode`。你可以自己猜测\
  \ URL，或者从 OS X Server Xcode 服务面板中，点击屏幕底部的“查看 Bots”按钮。你也可以点击 Xcode 屏幕右上角的设置滚轮并选择“在浏览器中查看\
  \ Bot”。当然，最后一种方法将打开某个 Bot 的详细信息，而不是你的 Xcode 服务的“主页”。\n\n\n\n## OS X Server 与 Xcode\
  \ Bots\n\n如果您尚未通过身份验证，`OS X Server` 不会显示错误信息，但正如本章开头所配置的那样，您需要先进行身份验证才能查看现有机器人的信息，如图\
  \ 8-11 所示。请输入您先前创建的用户凭据，然后点击“登录”。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图 98](img/index-158_1.jpg)\n\n![图 99](img/index-158_2.jpg)\n\n**第 8 章：Xcode\
  \ Bots 的日常使用**\n\n**157**\n\n***图 8-11.** 网页界面附带了登录表单*\n\n主界面会显示最近一次集成以及下一次集成的相关信息，同时还列出了最新可供下载的版本。在这些信息块下方，是所有现有机器人的列表，包括它们的状态和最近一次集成的时间。从该列表中点击您的\
  \ Bot 名称，即可查看更多详细信息。\n\n这个网页界面与我们之前在 `Xcode` 中看到的非常相似，如图 8-12 所示。左侧是过去集成的历史列表，右侧则是机器人的当前状态，重点展示了最新一次集成的结果。\n\
  \n***图 8-12.** 此网页显示了名为 Klaus 的机器人的详细信息*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**158**\n\n**第 8 章：Xcode Bots 的日常使用**\n\n### 下载最新版应用程序\n\n我们安装过程中缺失的最后一步，是能够下载应用程序并将其安装到测试设备上。请导航至“归档”选项卡，那里应会列出每次成功集成后所创建的应用程序包。每一次，项目的归档版本以及生成的\
  \ `IPA` 文件都会被检索并存储在此处，就像我们之前使用 `Jenkins` 和 `Bamboo` 时那样。只不过现在这个过程是自动完成的，因为它确切知道要查找哪种文件模式。\n\
  \n如果您在桌面电脑上点击某个“产品”链接，便可以下载该文件，例如将其上传到像 `Testflight` 这样的第三方分发平台。毕竟，您不希望让所有测试人员都能直接访问您的\
  \ `OS X Server`。另一方面，如果您在 iOS 设备上点击此链接，则可以直接下载该应用程序并在设备上运行它！这正是专用于某一技术的持续集成平台所带来的优势之一。在我们的场景中，就是指\
  \ `Xcode` 项目。\n\n### 使用大屏幕功能获取实时反馈\n\n我们之前提到过，持续集成平台的关键在于能够获得即时反馈，以便了解应用程序是否出错或对产品造成了任何损害。正因如此，`Jenkins`\
  \ 和 `Bamboo` 都提供了显示安装状态的功能。而 `OS X Server` 及其 `Xcode` 服务则有所不同。如果您点击屏幕顶部菜单中的第一个图标，它会打开“大屏幕”，这是一个专为电视等大屏幕设计的网页。如图\
  \ 8-13 所示，该界面会自动更新，显示最新集成操作的详细信息。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图 100](img/index-160_1.jpg)\n\n**第 8 章：Xcode Bots 的日常使用**\n\n**159**\n\n***图\
  \ 8-13.** “大屏幕”模式提供了一种更合适的构建结果展示方式*\n\n## 总结\n\n虽然花了些时间，但苹果终于开始拥抱持续集成这一领域。尽管我们现在还远未能用一个工具来完全取代\
  \ `Jenkins` 或 `Bamboo` 的安装，但它确实展现出了使用专用平台工具的优势。忘掉方案共享和获取夜间构建的复杂流程吧，有了 `OS X Server`\
  \ 和 `Xcode` 服务，只需点击几下，就能创建一个项目，托管在你的服务器上，每次向远程仓库推送提交时都会自动构建。\n\n我们已经向您展示了如何安装并开始使用\
  \ `OS X Server`，以及即使您不按照苹果建议的方式（例如使用自己的配置文件并依赖第三方工具管理依赖关系）工作，也能使用该工具的方法。\n\n我们并未涵盖该工具提供的所有功能，事实上，它还能运行你的测试套件，而这正是下一章将要介绍的内容。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 9 章：引入单元测试\n\n本书已接近尾声，这意味着您现在应该对持续集成有了一定的了解。我们涵盖了设置持续集成环境的主要解决方案：免费且开源的\
  \ `Jenkins`；具有既定工作流的企业级方案 `Bamboo`；以及苹果官方的 `Xcode Bots`。`Xcode Bots` 成为 `Xcode`\
  \ 项目持续集成的事实标准还需要一些时间，但前一章表明我们正在逐步接近这个目标。\n\n尽管我们介绍了几种不同的解决方案，但最终我们所做的仅仅是构建应用程序。\n\
  \n当然，我们还需要获取最新版本的源代码并安装依赖，同时确保钥匙串可访问以便对应用程序进行代码签名。这个过程可能很复杂，但它只是持续集成平台能够提供的反馈中的一小部分。一个能成功构建的应用程序，并不意味着它能按预期工作。\n\
  \n本章将介绍另一种有助于检测应用程序是否按预期工作的反馈：自动化单元测试。\n\n第一部分将介绍自动化测试是什么以及它的重要性。尽管自动化测试并非本书的核心主题，但大多数人只看到了编写测试耗时的一面，当项目截止日期变得难以满足时，测试往往是最先被砍掉的部分。接着，我们将深入探讨该主题，为\
  \ Github Jobs for iOS 应用程序编写首批单元测试，讨论它们的工作原理、最佳实践以及如何运行它们。更重要的是，我们将介绍如何从命令行运行它们，以便将其与我们构建应用程序的过程一起，纳入持续集成流程中。\n\
  \n## 自动化测试\n\n在软件世界中，自动化测试是指使用专用工具来重复执行预定数量的测试场景。对于每个场景，将最终结果与预期结果进行比较。如果两者相等，则测试标记为通过；如果不等，则标记为失败。\n\
  \n大多数可用测试工具的主要优势在于，能够重新运行失败的测试用例，直到“所有测试通过”为止。\n\n**161**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**162**\n\n**第 9 章：引入单元测试**\n\n### 测试的原因\n\n进行测试的原因有很多，最显而易见的当然是要确保一切按预期工作。无论您编写的是哪种类型的测试，它们都有一个共同模式：从一组初始参数开始，对这些参数应用一些特定的修改，然后确保最终结果与预期结果相符。就单元测试而言，这意味着将通过特定参数调用方法所返回的结果，与一个固定的最终值进行比较。\n\
  \n\n\n很多人认为测试属于某种拥有特殊技能的精英开发者，他们能理解什么是断言。对于一些比较冷门的技术来说，这也许是真的，但对于 iOS 和 OS X 应用程序来说绝非如此，尤其是现在\
  \ Apple 已将自动化测试作为开发过程中的一等公民。你的应用程序会自动带有一个测试目标，运行测试套件只需按一下键。曾几何时，对 iOS 项目进行单元测试很困难，但\
  \ Apple 确保那个时代已经过去了。\n\n一旦你的产品达到一个稳定版本，比如第一个成功上架的版本，你或许有幸能抽出一些时间来清理和重构代码。我们都知道这是怎么回事，每个人都曾为了赶工期而不得不走捷径，采取更务实的方法。正是在这些情况下，你应该强迫自己为你正在编写的“权宜之计”编写一个测试用例。当你日后不得不回头处理这些代码时，了解它们应有的行为将帮助你重写代码，而你的测试套件将帮助你检测是否破坏了某些东西。这就是自动化测试的美妙之处：只要最终结果符合预期，实现方式并不（太）重要。\n\
  \n糟糕的项目经理通常认为，让项目进度加快的一个方法就是不断投入开发者，直到项目完成。我们都知道这完全不符合事实。当现有开发者需要花时间向新加入团队的开发者讲解项目是如何运作的时，问题尤其严重。我们并不是说你应该对新开发者不客气，但一旦你的项目在测试套件方面达到了一定水平，它就会成为你所能写出的最好的项目文档。测试用例描述了应用程序的各个部分。新开发者只需浏览不同的场景，就能更好地理解项目。\n\
  \n请注意，这个“新开发者”也可以看作是“未来的你”（六个月后当你需要回头处理这个项目时）。不要忽视你应用程序中的测试场景：没有人喜欢编写文档。\n\n最后但同样重要的是，观看一个没有失败的测试套件执行过程会带来强烈的满足感。如果对“绿条”的追求很容易让人上瘾，那么能在辛苦工作一天后回到家，知道自己拥有应用程序健康运行的数字化证明，这种价值是无价的。我们中有多少人曾因为一个上线时明知不稳定的功能而失眠？\n\
  \n### 不测试的理由\n\n稍有一点经验，就很难找到不测试的理由，尤其是考虑到我们在上一节中列出的所有优点。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 9 章：将单元测试融入开发**\n\n**163**\n\n我们之前提到过，在截止日期很紧的项目中，自动化测试通常是第一个被舍弃的。别担心，你会在下一个迭代中补回来的。但事实上你不会。如果你当时没有抽出时间，那么现在很可能也不会。而且，你等待的时间越长，需要编写或更新的测试就越多，以便让它们通过。自动化测试可以有效减轻压力，让你知道即使项目延期，已经实现的功能也能按预期工作。\n\
  \n说实话，唯一可以接受不编写测试的情况是针对非常简单的项目。在本书开头，我们提到过你必须务实对待你的持续集成平台。单元测试也是如此。不要为了测试而编写测试用例，而是因为它能帮助你创建更好的产品。\n\
  \n## 单元测试\n\n在软件编程中，单元测试是一种用于测试软件源代码中小片段的方法。在面向对象编程范式中，一个单元通常指一个类，每个测试用例意味着一个针对该类中方法运行的场景。\n\
  \n单元测试的概念与语言无关，每种语言通常都有其事实上的单元测试框架：Java 生态系统使用 `JUnit`，PHP 使用 `PHPUnit`，当然，Objective-C\
  \ 使用 `XCTest`。这个框架随 Xcode 5 发布给公众，它取代了 `SenTestingKit`（一个自 Xcode 2 起就捆绑在 Xcode 中的旧测试框架）。\n\
  \n我们之前提到过，单元测试现在是 Xcode 项目中的一等公民。本项目的 `iOS` 应用程序是一个非常小的应用程序，但由于单元测试不是本书的核心主题，用它来向你介绍并让你自己动手练习已经足够了。当然，如果你已经是一位经验丰富的开发者，在编写单元测试方面有很强的经验，可以随意跳到我们通过命令行运行测试套件并将其集成到\
  \ `Bamboo`、`Jenkins` 和 `Xcode Server` 的部分。\n\n## Xcode 单元测试集成\n\n打开你的 Xcode 项目，确保导航面板已打开，然后选择顶部菜单中的第\
  \ 5 个标签，那就是“测试导航器”。正如你在图 9-1 中所看到的，你将在这里看到项目中所有可用单元测试的列表。因为我们使用了 Apple 的默认模板，所以生成了一个测试目标，其中包含一个失败的测试用例。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 101](img/index-164_1.jpg)\n\
  \n**164**\n\n**第 9 章：将单元测试融入开发**\n\n***图 9-1.** 默认项目模板带有一个测试目标和一个失败的测试用例*\n\n要使一个测试用例类显示在此导航器中，它必须继承自\
  \ `XCTestCase`（`XCTest` 框架的一个类），尽管隐含的约定是给你的类一个以“Tests”结尾的名称，以便你以后更容易找到你的测试类。测试用例方法也是如此，你的方法名必须以“test”开头，并且不能返回任何值。这些是与\
  \ Xcode 集成工作的条件。\n\n正如你所见，我们的项目不是很大，所以没有太多东西需要测试，但我们会找一些简单的东西。我们希望 web 服务返回的每个职位信息都包装到一个专用类中，以防我们变得贪心并想添加其他职位信息服务提供商。\n\
  \n## 为 `PCSJobOffer` 类添加测试\n\n以防你不记得，以下是 Github Jobs API 返回的职位信息格式：\n\n```json\n\
  {\n  \"url\": \"abced-fghij-klmnop-1234567\",\n  \"company_logo\": \"http://github-jobs.s3.amazonaws.com/abced-fghij-klmnop.png\"\
  ,\n  \"company_url\": \"http://our-company.com\",\n  \"id\": \"abced-fghij-klmnop-1234567\"\
  ,\n  \"created_at\": \"Wed Jun 04 20:06:50 UTC 2014\",\n  \"title\": \"iOS developer\"\
  ,\n  \"location\": \"Bay Area, CA\",\n  \"type\": \"Full Time\",\n  \"description\"\
  : \"Our company is awesome.\",\n  \"how_to_apply\": \"Email your resume to jobs@company.com\"\
  ,\n  \"company\": \"Company, Inc.\"\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 102](img/index-165_1.jpg)\n\n**第 9 章：将单元测试融入开发**\n\n**165**\n\n当然，我们不需要所有这些字段，因为我们的应用只显示标题和公司。为了举例，我们的\
  \ `PCSJobOffer` 类将包含以下字段：`title`、`location`、`date` 和 `URL`。\n\n## 创建测试用例类\n\n回到\
  \ Xcode 并创建这个类。点击“File”，然后选择“New ➤ File”。选择 Objective-C 类，将其命名为 `PCSJobOffer` 并保存到你的项目中。在\
  \ `PCSJobOffer.h` 文件中，添加我们之前提到的属性，如图 9-2 所示。\n\n***图 9-2.** 包含主要属性的 PCSJobOffer\
  \ 类*\n\n\n\n目前我们不需要做其他任何事，这个类已经存在并声明了它的第一个属性，如果我们想遵循测试驱动开发（TDD）方法，这些属性可能已经足够多了。\n\
  \n我们只在测试用例类之前创建了实现文件，这是为了避免在 Xcode 中出现无谓的“文件未找到”和“未声明的标识符 `PCSJobOffer`”错误。\n\n\
  **注意：** 测试驱动开发方法（TDD）是一种广为人知的应用程序开发方式。\n\n基本上，它的流程是先编写测试用例，然后实现所需的代码，使这些测试在实际开发过程中能够通过。如果你想了解更多关于\
  \ iOS 中的测试驱动开发，Graham Lee（又名 `@secboffin`）写了一本关于这个主题的精彩书籍，可通过以下网址获取：\n\n[`www.amazon.com/Test-Driven-iOS-Development-Developers-Library/dp/0321774183`](http://www.amazon.com/Test-Driven-iOS-Development-Developers-Library/dp/0321774183)\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 添加单元测试\n\n现在我们已经准备好创建相关的测试用例类，以确保\
  \ `PCSJobOffer` 类在接收正确的 JSON 字典时，能够提取标题、地点、日期和 URL 属性并正确存储。让我们创建 `PCSJobOfferTests`。点击\
  \ File 菜单并选择“New ➤ File”。从模板面板中选择“Objective-C test case class”。将其命名为 `PCSJobOfferTests`，确保它是\
  \ `XCTestCase` 类的子类，当询问文件保存路径时选择“GithubJobs Tests”文件夹，然后点击“Save”按钮。顺便提一下，删除 `Github_JobsTests.m`\
  \ 文件，因为它本身是一个会失败的测试用例。注意，这些测试类没有头文件，因为它们永远不会被直接调用。\n\n在这个类中，我们只打算包含一个测试用例，以确保传递给\
  \ `PCSJobOffer` 类初始化器的 JSON 字典内容最终能生成一个正确映射的对象。我们之前提到过，在面向对象编程范式中，一个测试用例实际上是测试用例**类**中的一个**方法**。在\
  \ `PCSJobOfferTests.m` 文件中，删除自带的 `testExample` 方法，并创建一个名为 `testThatDictionaryIsProperlyMappedToProperties`\
  \ 的测试方法。\n\n测试类的命名永远不应过于冗长，尤其是在 Objective-C 中，方法签名长度达到 100 个字符并不罕见。在编写测试用例时，你必须设想自己或其他人将来可能会阅读这些测试。它们必须足够清晰明确，让人能够准确理解正在测试的内容。\n\
  \n一个有效的测试用例会向代码单元输入已知数据，并将方法执行的结果与预期结果进行比较。在我们的案例中，已知输入是我们之前展示的包含职位信息的 JSON，而代码单元则是\
  \ `PCSJobOffer` 初始化器。\n\n首先，我们需要获取 JSON 数据。我们提供给这个类的输入必须是已知的。由于明显的网络延迟以及无法预测返回职位列表的精确内容，我们需要将这个\
  \ JSON 存储在一个文件中，该文件会在每次测试运行之前被加载。选择 `File ➤ New ➤ File`，从“Other”部分选择“Empty”。将文件命名为\
  \ `job.json`，并保存到 Github JobsTests 文件夹中，这样我们就能在下一节中加载它。在 `job.json` 文件中，粘贴我们之前提到的\
  \ JSON 数据。请注意，如果你正在阅读本书的纸质版，这可能会有点困难。只需记住这个项目在 Github 上可用，你可以从这里获取内容：[`github.com/Palleas/Github-Jobs/blob/master/Github%20JobsTests/job.json`](https://github.com/Palleas/Github-Jobs/blob/master/Github%20JobsTests/job.json)\n\
  \n注意，每个测试用例类都带有 `setUp` 和 `tearDown` 方法。这两个方法将分别在每个测试用例之前和之后被调用。这意味着我们的测试文件每次都会被加载。这看起来可能有点浪费资源，但在这种特定情况下，这不是你需要担心的问题。为\
  \ `PCSJobOfferTests` 类添加一个 `NSDictionary` 类型的 `jobPayload` 属性，并在 `setUp` 方法中编写以下代码：\n\
  \n```\n- (void)setUp\n{\n    [super setUp];\n    NSString *path = [[NSBundle bundleForClass:\
  \ [self class]] pathForResource: @\"job\" ofType: @\"json\"];\n    NSData *content\
  \ = [NSData dataWithContentsOfFile: path];\n    NSError *jsonError = nil;\n    self.jobPayload\
  \ = [NSJSONSerialization JSONObjectWithData: content options: 0 error: &jsonError];\n\
  \    XCTAssertNil(jsonError, @\"The Job payload should be loaded without error,\
  \ got %@\", jsonError);\n    XCTAssertNotNil(self.jobPayload, @\"The job payload\
  \ should be properly loaded\");\n    XCTAssertTrue([self.jobPayload isKindOfClass:\
  \ [NSDictionary class]], @\"Job payload should be a dictionary\");\n}\n```\n\n我们在这里做了什么？首先，我们使用\
  \ `NSBundle` 方法获取 JSON 文件的路径。注意，我们没有使用 `[NSBundle mainBundle]` 单例，因为在这种特定上下文中，我们并不从主\
  \ bundle（即你的应用程序）中加载内容。在我们的案例中，所有与测试用例相关的内容都包含在不同的 bundle 中，这就是我们使用 `bundleForClass:`\
  \ 方法的原因。然后，我们将此文件的内容加载到一个名为 `content` 的 `NSData` 类型变量中，并使用 `NSJSONSerialization`\
  \ 类将这些字节数据转换为一个有效的 `NSDictionary`。\n\n在这种场景下，我们手动加载了 JSON 数据，但如果你想要测试封装了网络调用的对象，有一些非常好的库，比如\
  \ `OHHTTPStubs`（可在 [`github.com/AliSoftware/OHHTTPStubs`](https://github.com/AliSoftware/OHHTTPStubs)\
  \ 获取），它可以拦截实际的网络调用。\n\n接下来的内容更有趣。这些以 `XCT` 开头的函数被称为断言，如果某个条件不满足（例如，对象本不该为空却为空了，或者条件本不该为\
  \ true 却为 true 了），就会抛出异常，导致该断言和测试用例标记为失败。我们现在使用这些断言，是因为我们希望测试尽早失败。没有什么比因为初始条件声明错误而导致测试失败更糟糕的了。\n\
  \n在 `tearDown` 方法中，添加以下代码：\n\n```\n- (void)tearDown\n{\n    self.jobPayload = nil;\n\
  \    [super tearDown];\n}\n```\n\n这里没什么特别的，我们只是在下一个测试用例运行之前，将 `jobPayload` 属性的内容重置为\
  \ nil，尽管我们知道它会在下一次执行 `setUp` 方法时被覆盖。现在我们可以编写实际的测试了。\n\n在 `testThatDictionaryIsProperlyMappedToProperties`\
  \ 方法中，添加以下代码：\n\n```\n- (void)testThatDictionaryIsProperlyMappedToProperties {\n\
  \    PCSJobOffer *offer = [[PCSJobOffer alloc] initWithPayload: self.jobPayload];\n\
  \    XCTAssertEqualObjects([NSURL URLWithString: @\"http://jobs.github.com/positions/abced-fghij-klmnop-1234567\"\
  ], offer.url, @\"URL should be http://jobs.github.com/positions/abced-fghij-klmnop-1234567\"\
  );\n    XCTAssertEqualObjects(@\"iOS developer\", offer.title, @\"Title of the job\
  \ offer should be \\\"iOS developer\\\"\");\n    XCTAssertEqualObjects(@\"Bay Area,\
  \ CA\", offer.location, @\"Location of the job offer should be \\\"Bay Area, CA\\\
  \"\");\n}\n```\n\n请注意，`PCSJobOffer` 类中并不存在 `initWithPayload` 这个初始化器，所以目前先创建一个空的：\n\
  \n\n\n```objc\n- (instancetype)initWithPayload:(NSDictionary *)payload {\n    self\
  \ = [super init];\n    if (self) {\n        // 这里我们将添加一些内容\n    }\n    return self;\n\
  }\n```\n\n现在我们可以准备运行测试了。\n\n## 运行测试\n\n我们之前提到过，Xcode 对单元测试的集成可以在左侧边栏的“测试导航器”中看到。这不仅仅是一个简单的视觉指示，实际上这种集成比表面上看到的更深。如果你观察显示行号和通常添加断点的那一窄列，你会看到在\
  \ `@implementation` 符号附近和测试用例方法附近有一些小方块，如图 9-3 所示。\n\n*图 9-3. Xcode 自动识别测试用例类和测试用例方法，让你能够轻松运行特定测试*\n\
  这些形状实际上是按钮，你可以点击它们来运行特定的测试用例或某个类中的所有测试用例。由于我们只有一个测试用例类，其中仅包含一个测试用例，因此我们可以运行所有测试。当你只有一个失败的测试用例，需要反复运行直到它通过时，这些按钮会非常有用。\n\
  \n打开 `Product` 菜单，选择“Test”，或者按下 **⌘U**。不出所料，测试应该会失败，并且失败的断言会在主编辑器中高亮显示，同时在测试导航器中列出，如图\
  \ 9-4 所示。\n\n*图 9-4. 失败的断言在主编辑器中高亮显示，失败的测试方法在测试导航器中显示*\n我们的情况很容易解释。由于我们的类初始化器是空的，在对象初始化时，实际上并没有对提供的\
  \ `NSDictionary` 实例做任何处理。这意味着这些属性仍然包含它们的默认值，即 `nil`。我们使用 `XCTAssertEqualObjects`\
  \ 断言来比较这些对象；请注意，我们也可以从 `XCTAssertNotNil` 开始，然后逐步推进。\n\n我们在第 2 章中提到，Xcode 5 引入了一种新的导航方式，允许你从项目中的另一个类打开关联的测试用例类。打开\
  \ `PCSJobOffer.m` 文件。将光标放在 `initWithPayload:` 方法上，点击编辑器左上角的“相关文件”按钮，然后按住 `alt` 键，选择“Test\
  \ Callers ➤ `[PCSJobOfferTests testThatDictionaryIsProperlyMappedToProperties]`”，这样测试文件和实现文件就可以在同一屏幕上显示。\n\
  \n最后，用以下代码实现 `initWithPayload:` 方法的内容，并重新运行失败的测试用例：\n\n```objc\n- (instancetype)initWithPayload:(NSDictionary\
  \ *)payload {\n    self = [super init];\n    if (self) {\n        self.title = payload[@\"\
  title\"];\n        self.url = [NSURL URLWithString:payload[@\"url\"]];\n       \
  \ self.location = payload[@\"location\"];\n    }\n    return self;\n}\n```\n\n现在我们已经实现了\
  \ `initWithPayload:` 初始化器的内容，测试应该会通过，并且在测试用例和测试用例类的 `@implementation` 符号附近会显示一个可视标记，如图\
  \ 9-5 所示。\n\n*图 9-5. Xcode 用绿色符号显示通过的测试用例*\n\n本节为你简单介绍了单元测试。我们创建了一个类来封装每个职位信息的 JSON\
  \ 描述，这样我们就可以使用漂亮的对象，而不是不可预测的 `NSDictionary` 实例。我们先编写了测试用例，因此我们知道自己希望初始化器如何工作，然后才编写了实际的实现代码。\n\
  \n**注意：** 映射库：这个例子是开发者经常需要做的重复性工作的典型代表。这就是为什么如果你的应用程序大量使用远程对象，并且需要将许多描述映射到普通的 Objective-C\
  \ 对象，你应该考虑使用诸如 Mantle (https://github.com/Mantle/Mantle) 或 KZPropertyMapper (https://github.com/krzysztofzablocki/KZPropertyMapper)\
  \ 之类的库。\n\n恭喜你，你已经编写了一个值得信赖的测试套件的开头部分，以后每次你想为应用程序添加功能时，都可以对它进行改进。请记住，既然你已经建立了测试套件的基础，那么你不再有任何借口不先编写测试，再编写实现代码。\n\
  \n请注意，我们还没有更新主视图控制器中的代码，使其使用 `PCSJobOffer` 类而不是字典。不过，这很容易做到。打开 `PCSViewController.m`\
  \ 文件，更新 `NSURLSessionDataTask` 完成处理程序的内容。不要使用以下代码：\n\n```objc\nself.jobs = [NSJSONSerialization\
  \ JSONObjectWithData:data options:0 error:&jsonError];\n```\n\n而是使用：\n\n```objc\n\
  NSArray *results = [NSJSONSerialization JSONObjectWithData:data options:0 error:&jsonError];\n\
  NSMutableArray *jobs = [NSMutableArray array];\n[results enumerateObjectsUsingBlock:^(NSDictionary\
  \ *jobPayload, NSUInteger idx, BOOL *stop) {\n    [jobs addObject:[[PCSJobOffer\
  \ alloc] initWithPayload:jobPayload]];\n}];\n```\n\n不要忘记更新 `tableView:cellForRowAtIndexPath:`\
  \ 方法的内容，否则你会得到一个错误：\n\n```objc\n- (UITableViewCell *)tableView:(UITableView *)tableView\
  \ cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n    PCSJobOffer *offer = self.jobs[indexPath.row];\n\
  \    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"Cell\"\
  \ forIndexPath:indexPath];\n    cell.textLabel.text = offer.title;\n    return cell;\n\
  }\n```\n\n请注意，我们可以将所有这些过程包装到一个专门的类中，该类将抽象获取职位信息的整个过程，并对该类进行单元测试。这样做需要引入模拟和桩对象的概念，以调整获取数据的方式，这样我们就不会真正调用\
  \ Github 的职位接口。请记住，我们需要能够信任我们获取的数据。这已经远远超出了本书的范围。同样，你应该考虑购买 Graham Lee 的书籍，该书涵盖了所有这些概念以及更多内容。\n\
  \n一个好的测试套件必须具备以下品质：\n\n-   **易于阅读**，这样你一眼就能看出当前正在测试哪个单元。没有什么比无法理解的测试套件更糟糕的了，尤其是当它们不能正确通过时。\n\
  -   **运行速度快**。如果你知道测试全部运行完需要花费一个小时，你就不会花时间去运行所有测试。当然，正如我们之前提到的，可以使用 Xcode 来运行特定的测试用例。另一方面，如果测试套件需要一个小时才能执行完毕，那么当你获得与你正在开发的功能相关的结果时，这个功能可能已经过时了。\n\
  \n这些品质很重要，但即使你严格遵守它们，你仍然需要运行你的测试套件。这正是你的持续集成平台的作用所在。它会自动为你运行测试套件，但要做到这一点，我们需要能够从命令行运行它们。\n\
  \n## 从命令行运行测试\n\n在 Xcode 5 之前，`xcodebuild` 工具只能运行 OSX 项目的测试。这对 iOS 开发者来说是一个巨大的问题，但幸运的是，Facebook\
  \ iOS 团队在首次发布 `xctool` 时修复了这个问题：\n\n```bash\n$ xctool test -sdk iphonesimulator\n\
  [Info] Collecting info for testables... (2471 ms)\nrun-test Github JobsTests.xctest\
  \ (iphonesimulator7.1, application-test)\n[Info] Installed 'com.perfectly-cooked.Github-Jobs'.\
  \ (11709 ms)\n```\n\n\n\n[信息] 启动测试宿主并运行测试... (0 毫秒)\n\n✓ `-[PCSJobOfferTests testThatDictionaryIsProperlyMappedToProperties]`\
  \ (12 毫秒)\n\n1 通过，0 失败，0 错误，总计 1 项 (12 毫秒)\n\n** 测试成功：1 通过，0 失败，0 错误，总计 1 项 ** (27536\
  \ 毫秒)\n\n这发生在 Xcode 5 之前，仔细想想这是有道理的。该版本随第一版 XCode Bots 一同发布，这些 Bots 能够自动为你运行测试套件，我们将在本章后面部分介绍。\n\
  \n使用官方的 `xcodebuild` 命令行工具从命令行运行测试，需执行以下指令：\n\n```\n$ xcodebuild -workspace Github\\\
  \ Jobs.xcworkspace -scheme \"Github Jobs\" -sdk iphonesimulator7.1 test\n```\n\n\
  ...\n\n测试套件“所有测试”于 2014-06-06 22:17:00 +0000 启动\n\n测试套件“Github JobsTests.xctest”于\
  \ 2014-06-06 22:17:00 +0000 启动\n\n测试套件“PCSJobOfferTests”于 2014-06-06 22:17:00 +0000\
  \ 启动\n\n测试用例“-[PCSJobOfferTests testThatDictionaryIsProperlyMappedToProperties]”已启动。\n\
  \n测试用例“-[PCSJobOfferTests testThatDictionaryIsProperlyMappedToProperties]”已通过 (0.019\
  \ 秒)。\n\n测试套件“PCSJobOfferTests”于 2014-06-06 22:17:00 +0000 完成。\n\n执行了 1 个测试，0 个失败（0\
  \ 个意外）在 0.019 (0.019) 秒内\n\n测试套件“Github JobsTests.xctest”于 2014-06-06 22:17:00 +0000\
  \ 完成。\n\n执行了 1 个测试，0 个失败（0 个意外）在 0.019 (0.019) 秒内\n\n测试套件“所有测试”于 2014-06-06 22:17:00\
  \ +0000 完成。\n\n执行了 1 个测试，0 个失败（0 个意外）在 0.019 (0.022) 秒内\n\n** 测试成功 **\n\n这个命令我们之前已经介绍过。它需要指定工作区和方案路径；以及一个新增的“sdk”参数，你应该能猜到它的用途。如果需要列出电脑上可用的\
  \ sdk，只需运行以下命令：\n\n```\n$ xcodebuild -showsdks\n```\n\nOS X SDK:\n\nOS X 10.8 -sdk\
  \ macosx10.8\n\nOS X 10.9 -sdk macosx10.9\n\niOS SDK:\n\niOS 7.1 -sdk iphoneos7.1\n\
  \niOS 模拟器 SDK:\n\n模拟器 - iOS 7.1 -sdk iphonesimulator7.1\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 9 章：将单元测试融入其中**\n\n**173**\n\n这意味着你可以轻松地多次运行 `xcodebuild`，使用不同的 SDK 来比较结果，并确保你的应用在你所针对的所有\
  \ iOS 版本上都能正常运行。\n\n当苹果发布新版本的 iOS 时，这就更加方便了。如果你确保在 beta 版本一发布时就下载，就能轻松修复因版本变更导致的回归问题。\n\
  \n我们的构建脚本已经使用了 `xcpretty`，这是一个简单的工具，它能获取 `xcodebuild` 命令的输出，并以更易读的方式显示出来。我们之前没有贴出这部分，但实际上从命令行运行测试是从构建应用开始的，这意味着你会得到\
  \ Xcode 的完整输出，而这些输出我们并不太关心。\n\n让我们看看如何使用 XCPretty 来格式化结果，以便以后在我们的持续集成环境中使用。\n\n\
  ## 分析结果\n\n到目前为止，我们以最简单的方式使用了 XCPretty，但如果你查看命令的描述，实际上有几个参数我们可以用来格式化结果并在后续使用。现在，我们先使用\
  \ `--test` 参数。\n\n```\n$ xcpretty\n[!] 用法: xcodebuild [选项] | xcpretty\n    -t, --test\
  \                       使用 RSpec 风格输出\n    -s, --simple                     使用简单输出（默认）\n\
  \    -k, --knock                      使用 knock 风格输出\n        --tap             \
  \           使用 TAP 格式输出\n    -f, --formatter PATH             使用指定 Ruby 文件评估返回的格式化程序\n\
  \    -c, --color                      使用彩色输出\n        --no-utf                 \
  \    在输出中禁用 Unicode 字符\n    -r, --report FORMAT              运行 FORMAT 报告器\n   \
  \     选项: junit, html, json-compilation-database\n    -o, --output PATH        \
  \        将报告输出写入指定路径\n    -h, --help                       显示此消息\n    -v, --version\
  \                    显示版本\n```\n\n经过 XCPretty 转换后的默认输出是 rspec，这是一种用于 Ruby 编程语言的测试工具。它不会显示任何构建日志，因为你可能并不关心这些，它只显示一系列点和其他符号作为结果。\n\
  \n\n`$ xcodebuild -workspace Github\\ Jobs.xcworkspace -scheme \"Github Jobs\" -sdk\
  \ iphonesimulator7.1`\n\n`clean test | xcpretty -ct`\n\n```\n.\nExecuted 1 test,\
  \ with 0 failures (0 unexpected) in 0.001 (0.001) seconds\n```\n\n这让一切变得清晰多了，特别是当你每天手动多次运行测试时，一堆构建日志确实会妨碍“让我们让这些测试通过”的工作流程。\n\
  \n另一方面，这并非我们的最终目标。我们想要找到一种方法，将测试集成到我们选择的持续集成平台中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**174**\n\n## 第 9 章：将单元测试纳入体系\n\n`Xcodebuild` 与所有其他命令行工具并无不同。和它们一样，这个命令行工具在退出时会返回一个状态码，任何非零状态码都应被视为错误。下面，我们使用任何命令执行后\
  \ bash 中可用的 `$?` 变量，来看一个典型的 `xcodebuild test` 命令返回的错误码：\n\n```\n$ xcodebuild -workspace\
  \ Github\\ Jobs.xcworkspace -scheme \"Github Jobs\" -sdk iphonesimulator7.1\nclean\
  \ ...\n\n** TEST SUCCEEDED **\n\n$ echo \"Exit code was $?\"\nExit code was 0\n\
  ```\n\n当测试成功时，`xcodebuild` 会按预期退出并返回 0。现在我们来让测试失败。打开 `PCSJobOffer.m` 文件，将把标题赋值给同名对象属性的那一行替换为以下代码（完成后别忘了将文件恢复原样）：\n\
  \n```\nself.title = @\"No job title for you!\";\n```\n\n然后，使用完全相同的命令重新运行测试，并查看退出码：\n\
  \n```\n$ xcodebuild -workspace Github\\ Jobs.xcworkspace -scheme \"Github Jobs\"\
  \ -sdk iphonesimulator7.1\nclean test\n\nTest Suite 'All tests' started at 2014-06-07\
  \ 22:56:54 +0000\nTest Suite 'Github JobsTests.xctest' started at 2014-06-07 22:56:54\
  \ +0000\nTest Suite 'PCSJobOfferTests' started at 2014-06-07 22:56:54 +0000\nTest\
  \ Case '-[PCSJobOfferTests testThatDictionaryIsProperlyMappedToProperties]' started.\n\
  /Users/Palleas/Projects/Apress/Github Jobs/Github JobsTests/PCSJobOfferTests.m:44:\
  \ error:\n-[PCSJobOfferTests testThatDictionaryIsProperlyMappedToProperties] : ((@\"\
  iOS developer\") equal to (offer.title)) failed: (\"iOS developer\") is not equal\
  \ to (\"pouet\") - Title of the job offer should be \"iOS developer\"\nTest Case\
  \ '-[PCSJobOfferTests testThatDictionaryIsProperlyMappedToProperties]' failed (0.017\
  \ seconds).\nTest Suite 'PCSJobOfferTests' finished at 2014-06-07 22:56:54 +0000.\n\
  Executed 1 test, with 1 failure (0 unexpected) in 0.017 (0.017) seconds\nTest Suite\
  \ 'Github JobsTests.xctest' finished at 2014-06-07 22:56:54 +0000.\nExecuted 1 test,\
  \ with 1 failure (0 unexpected) in 0.017 (0.017) seconds\nTest Suite 'All tests'\
  \ finished at 2014-06-07 22:56:54 +0000.\nExecuted 1 test, with 1 failure (0 unexpected)\
  \ in 0.017 (0.094) seconds\n\n** TEST FAILED **\n\n$ echo $?\n```\n\n当你从事 iOS 编程并使用命令行一段时间后，65\
  \ 是一个众所周知的退出码，它并不局限于测试执行。实际上，官方文档对“sysexits”（一个列出了“程序推荐退出码”的文件）是这样描述的：**EX_DATAERR**\
  \ (65) 输入数据在某些方面不正确。这个错误码应仅用于用户数据，而不是系统文件。\n\n如果第 4 章关于命令行威力的内容说服了你更多地使用它，那么请准备好经常遇到这个家伙：当\
  \ `xcodebuild` 无法构建你的应用程序时，基本上返回的都是这个错误码。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 9 章：将单元测试纳入体系**\n\n**175**\n\n现在我们知道了 `xcodebuild` 在构建失败时会返回一个非零状态码，让我们把 `xcpretty`\
  \ 加入进来，看看会发生什么：\n\n```\n$ xcodebuild -workspace Github\\ Jobs.xcworkspace -scheme\
  \ \"Github Jobs\" -sdk iphonesimulator7.1\nclean test | xcpretty -t\n\n...\n\n**\
  \ TEST FAILED **\n\n$ echo \"Exit code was $?\"\nExit code was 0\n```\n\n这里发生的事情其实很简单：当你在命令行执行中使用管道时，最终的退出码实际上是管道中最后一个命令的退出码，因为它是最后执行的命令。无法从\
  \ `xcodebuild` 获取退出码会让我们根本无法使用 `xcpretty`，但幸运的是，bash 还提供了另一个超级有用的内部变量，名为 `PIPESTATUS`。\n\
  \n根据文档，这个变量是一个“数组变量，用于存放最后执行的前台管道中各命令的退出状态。”这意味着，在我们的例子中，`xcodebuild` 命令的退出状态是这个数组的第一个元素，可以像这样获取。\n\
  \n```\n$ xcodebuild -workspace Github\\ Jobs.xcworkspace -scheme \"Github Jobs\"\
  \ -sdk iphonesimulator7.1\nclean test | xcpretty -t\n\n...\n\n** TEST FAILED **\n\
  \n$ echo \"xcodebuild exit code was ${PIPESTATUS[0]}\"\nxcodebuild exit code was\
  \ 65\n```\n\n最后，我们需要做的是确保退出值始终是 `xcodebuild` 执行返回的那个值，这可以通过使用 `exit` 命令来实现，它的作用是退出当前\
  \ shell，并将第一个参数提供的状态码作为退出码，就像这样：\n\n```\n$ xcodebuild -workspace Github\\ Jobs.xcworkspace\
  \ -scheme \"Github Jobs\" -sdk iphonesimulator7.1\nclean test | xcpretty -t && exit\
  \ ${PIPESTATUS[0]}\n```\n\n我们终于得到了一个在持续集成测试安装中执行测试的完美命令，但这还不够。确实，当一次测试运行失败时，我们想要知道具体是哪个测试用例失败了，否则这个反馈就没有意义。当然，你可以简单地在\
  \ Jenkins 或 Bamboo 中查看构建日志，但把时间花在寻找导致测试失败的代码片段上会更有价值。你实际需要的是能够查看构建结果并直接看到测试结果。为此，你需要将测试套件的结果导出为你的持续集成平台能够理解的格式。幸运的是，Java\
  \ 社区很久以前就解决了这个问题，当时 JUnit（一个用于 Java 编程语言的单元测试框架）首次被集成到持续集成平台中。更妙的是，`xcpretty` 能够为我们生成这种报告。\n\
  \n```\n$ xcodebuild -workspace Github\\ Jobs.xcworkspace -scheme \"Github Jobs\"\
  \ -sdk iphonesimulator7.1\nclean test | xcpretty -t -r junit && exit ${PIPESTATUS[0]}\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**176**\n\n## 第 9 章：将单元测试纳入体系\n\
  \n执行完这个命令后，会在 `build/reports/` 文件夹中生成一个 XML 文件，这很方便，因为我们已经在把构建过程中产生的所有内容（应用程序、dSYM...）都放在这个文件夹里了。打开这个文件夹，查看一下\
  \ `junit.xml` 文件。\n\n```\n<?xml version='1.0' encoding='UTF-8'?>\n<testsuites tests='1'\
  \ failures='1'>\n<testsuite name='PCSJobOfferTests' tests='1' failures='1'>\n<testcase\
  \ classname='PCSJobOfferTests' name='testThatDictionaryIsProperlyMappedToProperties'>\n\
  <failure message='((@&quot;iOS developer&quot;) equal to (offer.title)) failed:\
  \ (&quot;iOS\ndeveloper&quot;) is not equal to (&quot; No job title for you!&quot;)\
  \ - Title of the job offer should be &quot;iOS developer&quot;'>Github JobsTests/PCSJobOfferTests.m:44</failure>\n\
  </testcase>\n</testsuite>\n```\n\n这个文件实际上并不是人类可读的，但这并不是重点，重点是这是大多数持续集成平台所期望的格式。那么，让我们从\
  \ Jenkins 运行测试套件吧！请注意，我们也会将这个测试套件作为 Bamboo 构建计划的一部分，所以如果你不太关心 Jenkins，可以直接跳到那部分。\n\
  \n## 从 Jenkins 运行测试\n\n\n\n打开`Jenkins`，使用之前创建的用户进行身份验证，并导航到“`Github Jobs for iOS`”配置部分。回顾到目前为止的实现，我们的任务调用了之前编写的构建脚本，该脚本负责处理所有事宜。它还会在构建结束时检索生成的`IPA`文件，并将其上传到`Testflight`。这已经是一个相当不错的配置，但我们希望获得更多反馈。现在，我们希望运行测试。\n\
  \n我们的构建脚本已经负责安装依赖项，由于`Jenkins`不像`Bamboo`那样为一个计划设置多个任务，我们只需在构建和打包应用程序的步骤之后运行测试套件即可。为此，添加一个“执行`shell`”构建操作，并在命令字段中输入我们之前完善的命令：\n\
  \n```\n$ xcodebuild -workspace Github\\ Jobs.xcworkspace -scheme \"Github Jobs\"\
  \ -sdk iphonesimulator7.1\nclean test | xcpretty -t –r junit && exit ${PIPESTATUS[0]}\n\
  ```\n\n然后，向下滚动到构建后操作，点击“添加构建后操作”并选择“发布`JUnit`测试结果报告”。我们已经知道导出的`JUnit`结果报告的默认路径是`build/reports/junit.xml`，因此在“测试报告`XML`”字段中填写`**/build/reports/junit.xml`，然后点击“保存”。\n\
  \n在开始构建之前，更新`PCSJobOffer`类以确保测试不会通过。我们可以使用之前做的小改动，在将`title`属性的内容硬编码为“`No job title\
  \ for you!`”时使测试失败。提交该更改，将此提交推送到远程仓库，然后在`Jenkins`上启动构建。如果一切按预期进行，构建应该会失败。\n\n这意味着当测试未通过时，整个构建将被标记为失败。在我们的案例中，将所有内容捆绑到一个简单的构建中，是因为我们正在处理的项目非常简单。如果你想将运行测试的部分与构建应用程序并发送给测试人员的部分分开，完全可以这样做。你只需创建一个新的`Jenkins`任务即可！\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 106](img/index-177_1.jpg)\n\
  \n**第 9 章：将单元测试纳入流程**\n\n**177**\n\n打开刚刚运行的构建的详细信息，如图 9-6 所示。详细信息列表中添加了一个新条目，显示了关于`git`修订版等的所有信息：测试结果。如您所见，它可以让你大致了解哪个测试失败了。请注意，此条目在“`Github\
  \ Jobs for iOS`”主构建页面上也是可见的。\n\n***图 9-6.** 刚刚运行的构建的详细信息显示了失败的测试列表*\n\n当然，您可能希望了解关于测试失败原因的更多细节。毕竟，这个测试用例中可能有多个断言失败。为此，只需点击“测试结果”链接，然后点击“`PCSJobOfferTests.testThatDictionaryIsProperlyMappedToProperties`”旁边的加号以及“堆栈跟踪”旁边的加号来展开测试部分。如图\
  \ 9-7 所示，您可以直接看到测试失败的原因。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
