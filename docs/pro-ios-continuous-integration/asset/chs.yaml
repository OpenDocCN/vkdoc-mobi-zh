  Finished\",\n                \"link\": {\n                    \"href\": \"http://localhost:8085/rest/api/latest/result/GJ-IA-33\"\
  ,\n                    \"rel\": \"self\"\n                },\n                \"\
  number\": 33,\n                \"plan\": {\n                    \"enabled\": true,\n\
  \                    \"key\": \"GJ-IA\",\n                    \"link\": {\n    \
  \                    // ...后续字段省略\n                    }\n                }\n  \
  \          }\n        ]\n    }\n}\n```\n\n\n\n```json\n{\n  \"href\": \"http://localhost:8085/rest/api/latest/plan/GJ-IA\"\
