  \ Jobs (deflated 66%)`  \n\n在构建过程结束时，但在构建后操作之前，我们之前添加的脚本会运行。\n\n正如你在输出中所见，它找到了一个\
  \ dSYM 文件，将其内容创建为一个压缩包（因此使用了 `-r` 选项），并将其命名为 `\"Github Jobs.dSYM.zip\"`。\n\n####\
  \ 上传到 TestFlight\n\n`文件：/Users/Palleas/.jenkins/jobs/Github Jobs for iOS/workspace/build/GithubJobs.ipa`\
  \  \n`DSYM：/Users/Palleas/.jenkins/jobs/Github Jobs for iOS/workspace/build/GithubJobs.dSYM.zip`\
  \  \n\n### TestFlight 上传\n\n`TestFlight 上传速度：741.05Kbps`  \n\n`TestFlight 安装链接：[`testflightapp.com/install/jdiejdi787b13dec113902b4ii343a1-MTExNTY5NzA/`](https://testflightapp.com/install/jdiejdi787b13dec113902b4ii343a1-MTExNTY5NzA/)`\
  \  \n\n`TestFlight 配置链接：[`testflightapp.com/dashboard/builds/permissions/11129470/`](https://testflightapp.com/dashboard/builds/permissions/11129470/)`\
  \  \n\n一旦构建完成，构建后操作将按顺序执行。我们在上一节添加的 TestFlight 操作显示它找到了 IPA 文件，并推断出了压缩后的 dSYM 文件的路径。有了这些信息，我们使用\
  \ REST API 向 TestFlight 发送了一个上传请求，并得到了一个包含有效负载的响应，其中包含了配置页面的 URL。你可以前往该页面选择应接收此版本的用户，以及我们之前用过的安装\
  \ URL，你可以将该 URL 发送给用户，以便他们安装应用程序。\n\n如果你返回 TestFlight 并从顶部菜单的\"Apps\"部分打开 Github\
  \ Jobs for iOS 应用，你应该会看到你的构建版本，如图 7-6 所示。\n\n**图 7-6。** 构建版本 #84 已成功上传到 TestFlight\n\
  \n点击此构建版本，然后从左侧菜单导航到\"构建信息\"部分。在此部分，你将看到有关构建版本的所有信息，包括如图 7-7 所示的从提交历史中检索到的发布说明。\n\
  \n**图 7-7。** 构建版本的发布说明是通过仓库历史创建的，并包含了作者的姓名\n\n作为额外福利，展示 Github Jobs for iOS 作业的页面也已更新，如图\
  \ 7-8 所示，并包含我们刚才提到的信息，因此你无需再返回 TestFlight 查找你的构建版本。\n\n**图 7-8。** 作业页面已更新，包含有关最新构建版本的信息\n\
  \n让我们总结一下我们所做的工作。我们创建并设置了一个 TestFlight 帐户，以便能够访问 API 令牌和团队令牌。这些令牌是对 TestFlight 上传\
  \ API 进行经过身份验证的调用所必需的。有了这些信息，我们返回 Jenkins 并安装了 TestFlight 插件，这样我们就可以更新 Github Jobs\
  \ for iOS 作业，并在构建结束时上传打包的应用程序。但是由于我们希望添加 dSYM 文件，并且该文件夹需要作为 ZIP 压缩包发送到 TestFlight，我们首先更新了作业，并添加了一个\"\
  运行脚本\"构建阶段，该阶段负责压缩过程。最后，我们添加了一个\"上传到 TestFlight\"构建后操作，该操作将上传构建期间生成的构建产物，而不是像之前那样简单地归档它们。\n\
  \n你可能会想，为什么我们不更新构建脚本，简单地添加压缩操作和上传到 TestFlight 的操作，然后一劳永逸地运行一个脚本呢？这是因为将构建版本发送到 TestFlight\
  \ 本身并不是构建过程的一部分。我们希望持续集成架构能够为我们提供有效且有意义的反馈。这就是为什么因构建无法工作而失败的作业与因上传到 TestFlight 时出现问题而失败的作业，处理方式会有所不同。实际上，关注点分离是一个适用于此的设计原则。通过将构建阶段拆分为小的部分，更容易检测故障点并在它们危及整个构建稳定性之前进行修复。\n\
  \n现在我们已经知道如何在 Jenkins 构建结束时上传构建版本，接下来让我们看看如何使用 Bamboo 完成同样的操作。\n\n### 在 Bamboo 作业结束时将应用上传到\
  \ TestFlight\n\n如果你跳过前面的内容直接阅读本节，认为不需要阅读关于 Jenkins 的内容，因为你选择了 Bamboo，那么你可能会发现很难跟上。与上一章一样，实际上会有一些与\
  \ Jenkins 工作方式的小比较。\n\n打开 Bamboo 并导航到 Github Jobs for iOS 计划的配置部分。在能够上传我们上一章设置的\
  \ Bamboo 计划执行期间生成的构建版本之前，我们需要处理几个步骤。\n\n再次强调，Bamboo 选择的方法与 Jenkins 略有不同。我们不再有单个作业，而是一个包含多个阶段、多个作业和多个任务的计划。在\"\
  阶段\"部分，你应该会看到一个\"相关部署项目\"子部分，其中包含一个\"创建部署项目\"按钮。这确实是我们将要使用的：一个部署项目。\n\n部署项目与构建项目相关联，并通过\"\
  共享构建产物\"进行通信。这意味着该项目将需要生成的 IPA 文件，以及，没错，压缩后的 dSYM 文件。同样，如果你不了解压缩后的 dSYM 文件，请查阅本章的\
  \ Jenkins 部分。\n\n#### 更新默认作业配置\n\n首先，我们需要更新我们的构建，将 dSYM 文件压缩成我们可以发送到 TestFlight\
  \ 的 zip 文件。点击\"默认作业\"链接，然后点击\"添加任务\"按钮并选择脚本任务。在出现的描述字段中，填写\"压缩 dSYM 文件\"。选择\"内联\"\
  作为脚本位置，并在文本区域粘贴以下命令：\n\n```\ncd ${bamboo.build.working.directory}/build\n```\n\n\
  \n\n`find . -name \"*.dSYM\" -exec zip ${bamboo.build.working.directory}/build/GithubJobs.dSYM.zip\
  \ {} \\;` 这个命令与我们用于 Jenkins 的命令几乎相同，只是环境变量不同。该命令会创建一个 dSYM 文件的 ZIP 包，为了在部署计划中使用这个\
  \ dSYM 归档文件，我们需要将其作为构建产物进行归档，就像上一章中处理 IPA 文件一样。点击\"保存\"并选择\"构建产物\"（Artifacts）标签页，你应能看到\"\
  Github Job IPA 文件\"这一构建产物定义已配置完成。\n\n新建一个构建产物定义。在\"名称\"（Name）字段中填写\"Github Job 压缩版\
  \ dSYM 文件\"，\"位置\"（Location）字段填写\"build\"，\"复制模式\"（Copy pattern）字段填写`*.dSYM.zip`。完成后点击\"\
  创建\"（Create）。\n\n现在你应该有了两个构建产物定义，如图 7-9 所示。\n\n***图 7-9.** 我们配置了两个构建产物定义*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 7 章：无线分发**\n\n**129**\n\n构建产物归档的默认行为是保持私有。如果你需要它们用于其他任务（例如部署任务），则必须进行共享。为此，请点击\
  \ IPA 和 dSYM 压缩文件夹的\"共享\"（Share）链接。请注意，我们本可以在创建它们时就立即共享。现在已准备好创建部署任务。\n\n### 创建部署任务\n\
  \n返回到 Github Jobs for iOS 的配置页面，在\"阶段\"（Stages）部分，点击\"创建部署项目\"（Create deployment\
  \ project）按钮。在\"部署项目详情\"（Deployment project details）部分的描述字段中，填写\"将构建包发送至 TestFlight\"\
  ，因为这是我们想要实现的目标。保留其他默认选项：由于我们尚未讨论合适的 Git 工作流，我们将构建 master 分支或 Github Jobs 项目中的 iOS\
  \ 应用程序计划。点击\"创建部署项目\"按钮。\n\n接下来我们需要创建一个环境，该环境是一个配置，用于指定应用程序的部署位置。在我们的案例中，我们需要创建一个\"\
  beta\"环境，用于将构建包发送到 TestFlight。但理论上我们可以拥有一个生产环境，例如直接将构建包发送到 App Store。点击\"添加环境\"\
  （Add environment）按钮，在\"环境名称\"（Environment name）字段中填写\"Beta\"，然后点击\"继续任务设置\"（Continue\
  \ to task setup）按钮。\n\n配置部署任务与配置标准任务非常相似：你需要配置一个将按顺序执行的任务列表。部署任务默认包含两个任务：一个用于清理工作目录，另一个用于将构建产物下载到工作目录中。工作目录是部署过程发生的位置。\n\
  \n与我们将部署过程添加到任务末尾的 Jenkins 不同，Bamboo 的工作方式略有不同，因为部署和构建任务是两个不同的概念。完全公平地说，我们也可以通过在任务结束后触发另一个任务的方式在\
  \ Jenkins 中实现相同的行为。我们完全可以建立一个构建任务，让它触发一个部署任务。\n\n点击保存并返回到部署项目——即使我们尚未添加任何任务——然后点击部署（Deploy）。一次部署构建基于一个分支（在我们的案例中，我们想部署针对\
  \ master 分支运行的构建结果）和一个构建编号（通常为最新的那个）。最后，部署需要一个名称。此字段的默认值是构建计划的名称加上你想要部署的构建编号，例如\"\
  iOS application-26\"。点击\"开始部署\"（Start Deployment）按钮，等待几秒钟。\n\n目前唯一耗时的任务是下载构建产物。耗时取决于构建产物来源的位置，但在大多数情况下，它们只是从一个代理的位置复制到另一个位置。这意味着，当你读完这句话时，部署任务应该已经结束了。\n\
  \n如果你查看日志，应该会看到类似以下的内容：\n\n```\n24-May-2014 15:10:44 在 'Beta' 环境上开始构建 'release-2'\
  \ 的部署任务，代理为 Default Agent\n24-May-2014 15:10:44 构建工作目录为 /Users/Palleas/.bamboo/xml-data/build-dir/2981890-3145731\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**130**\n\n**第 7 章：无线分发**\n\
  \n打开你的终端并使用`tree`命令（例如，可通过 Homebrew 获取）查看此构建目录的内容，应会得到以下输出：\n\n```\n$ cd /Users/Palleas/.bamboo/xml-data/build-dir/2981890-3145731\n\
  $ tree\n.\n└── build\n    ├── GithubJobs.dSYM.zip\n    └── GithubJobs.ipa\n1 directory,\
  \ 2 files\n```\n\n这意味着这两个文件可以供我们随意使用，而我们要做的就是将它们上传到 TestFlight！\n\n如果你返回到部署任务的任务列表管理界面，点击\"\
  添加任务\"（Add task）并查找名称包含\"TestFlight\"的任务，你实际上应该能找到一个。它的完整名称是\"Upload iOS application\
  \ to [TestFlightApp.com](http://testflightapp.com/) configuration\"，并且这个任务是可用的，因为你在上一章安装了\
  \ Atlassian 的 Xcode 插件。它的工作方式与 Jenkins 的插件非常相似，但在我们撰写本书时，该插件的最新版本与 Bamboo 的最新版本配合得并不太好，会导致任务因\
  \ Java 依赖注入错误而失败。\n\n再次强调，这就是使用半官方插件的缺点。但别担心，我们自有解决方案！还记得我们在第 3 章提到的那个名为 Shenzhen\
  \ 的小工具吗？它附带了一条非常有用的命令，用于将 ipa 文件上传到 TestFlight，因此我们将改用这个工具。\n\n使用 Shenzhen 将文件上传到\
  \ TestFlight 非常简单。语法如下所示：\n\n```\n$ ipa distribute:testflight –help\n用法: ipa distribute:testflight\
  \ [选项]\n选项:\n    -f, --file FILE 构建包的 .ipa 文件\n    -d, --dsym FILE 构建包的压缩版 .dsym\
  \ 包\n    -a, --api_token TOKEN API 令牌。可在 https://testflightapp.com/account/#api-token\
  \ 获取\n    -T, --team_token TOKEN 团队令牌。可在 https://testflightapp.com/dashboard/team/edit/\
  \ 获取\n    -m, --notes NOTES 构建包的发布说明\n    -l, --lists LISTS 逗号分隔的发布列表名称，这些列表将获得访问构建包的权限\n\
  \    --notify 通知已授权的团队成员安装构建包\n    --replace 如果发现同名的现有构建包，则替换其二进制文件\n```\n\n与 Jenkins\
  \ 插件不同的是，这里无法自动获取 Git 历史记录并将其用作发布说明。你或许可以在构建过程的执行期间编写一些脚本，并将结果存储为文本文件构建产物，然后在部署任务中检索并使用该产物，但这有点超出了讨论范围。只需知道这是可行的即可。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 7 章：无线分发**\n\n**131**\n\
  \n仍然在\"添加任务\"（Add Task）面板中，清除搜索字段，然后再次查找\"脚本\"（Script）任务。在任务描述（Task description）字段中填写\"\
  使用 Shenzhen 将文件上传到 TestFlight\"，从脚本位置（Script Location）组合框中选择\"内联\"（Inline），然后在脚本主体（Script\
  \ Body）文本区域中输入以下命令：\n\n```\nipa distribute:testflight \\\n    -f \"build/Github\
  \ Jobs.ipa\" \\\n    -d \"build/Github\\ Jobs.ipa-dSYM.zip\" \\\n    -T 17a2c80c77933a14e002c369560b73ee_MzgyNjAzMjAxNC0wNS0xOSAyMjo0Njo1MS4yNjE2MzA\
  \ \\\n    -a 4d219661d922badbc7489b2173791483_MTg2MDU0NzIwMTQtMDUtMTkgMjI6NDA6MzEuOTE3NDU4\
  \ \\\n    -m \"改变了很多内容\"\n```\n\n\n\n最后，点击“Save”按钮，然后点击“Back to deployment project”按钮。当你准备好后，点击部署按钮。除非你在阅读本书时一直在后台运行构建，否则这次不会要求你输入分支、构建结果以及用于本次部署的名称。这是`Bamboo`的默认行为。你希望每次发布都有意义，而创建一个新发布来部署完全相同的构建结果又有什么意义呢？点击“Start\
  \ deployment”按钮。\n\n你应该会在作业日志末尾看到以下输出：\n\n```\n24-May-2014 17:06:58 Build successfully\
  \ uploaded to TestFlight\n24-May-2014 17:06:58 Finished task 'Using Shenzhen to\
  \ upload the file to testflight'\n24-May-2014 17:06:58 Finalising the build...\n\
  24-May-2014 17:06:58 Stopping timer.\n24-May-2014 17:06:58 Build 2981890-3145731-3637262\
  \ completed.\n24-May-2014 17:06:58 Finished processing deployment result Deployment\
  \ of 'release-5' on 'Beta'\n```\n\n构建已成功上传到`TestFlight`，这算是一个胜利，但有一件事我们需要修复。部署作业现在依赖于一个第三方工具`Shenzhen`来通过无线方式发送构建。当然，正如我们之前所示，我们本可以使用`curl`，但这不会给我们最后一次机会来讨论远程代理。\n\
  \n当我们设置默认作业来构建应用程序时，我们使用了代理矩阵兼容性，让`Bamboo`决定应在哪个代理上运行构建。我们的需求很简单：需要一台安装了`xcodebuild`命令的计算机。部署环境也可以运行在特定的代理上。这里的小区别在于它不使用代理兼容性矩阵。这次，你需要明确设置要在哪个代理上运行作业。返回部署作业配置面板，选择我们之前创建的“Beta”部署环境，然后点击“Agents”按钮。在列表中，选择允许部署应用的代理。请注意，它不必是具有运行构建任务能力的代理。毕竟，`Shenzhen`是用`Ruby`编写的，它在每个平台上的运行方式几乎相同。你可能希望从一个因\
  \ IP 地址或私钥而被明确允许上传文件到服务器的代理上运行部署作业。\n\n最后，我们的计划中还缺少一个最终步骤：我们仍然在手动运行部署作业！\n\n在同一环境配置面板中，点击“Triggers”按钮。点击“Add\
  \ trigger”按钮，如图 7-10 所示，在“Trigger type”组合框中选择“After successful build plan”，并确保勾选了“Use\
  \ the main plan branch”：你可能不希望为每个成功构建的特性分支都触发部署。点击“Save Trigger”按钮。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
