  ***图 2-8.** 默认情况下，Xcode 项目包含两个配置层级：Debug 和 Release*


  由于我们需要一个名为“AdHoc”的第三个配置，请点击配置列表下方的加号，选择“复制 Debug 配置”，因为从 Debug 配置中删除不需要的内容，远比将所需内容添加到
  Release 配置中容易得多。在新出现的行的第一个单元格中，填入“AdHoc”。现在我们便有了三个配置层级。


  你可能会好奇为什么选择“AdHoc”作为配置名称。“Ad Hoc”源自拉丁语，意为“为了这个”。这是苹果公司制定的一个流行惯例。实际上，当你在 iOS 开发者中心创建分发证书时，可以选择创建一个“Ad
  Hoc”预置描述文件，从而无需通过 App Store 即可部署你的应用。我们将在第 7 章中更详细地讨论 Ad Hoc 预置描述文件和无线分发。


  我们现在有了三个配置层级。来看看它们如何在持续集成过程中帮助我们。进入项目配置中的“构建设置”标签页。你会看到许多你不想调整的设置，主要是因为其中一些看起来像是天书，而且老实说，苹果已经很好地设置了这些默认值。我们来看看其中的几个。你可以通过界面顶部的搜索字段快速跳转到特定设置，并比较不同配置下的设置差异，例如“仅构建活动架构”。


  在开发应用程序时，你希望构建过程尽可能快。这就是为什么你不会为所有有效架构进行构建。考虑到当前市场上从 iPad 3 到 iPhone 5S 的各种活跃设备，你最终需要为三种不同架构构建：`armv7`、`armv7s`
  和 `arm64`，这会使构建速度变慢。


  查看“仅构建活动架构”选项，你会发现 Debug 配置下该选项设为 `YES`，而 Adhoc 和 Release 构建下设为 `NO`。保持构建尽可能快非常重要，这也是为什么其他设置（例如“验证产品”）在
  Debug 构建中被禁用。另一方面，当你的应用程序由自动化构建


