  ![Image 25](img/index-26_1.jpg)


  ![Image 26](img/index-26_2.jpg)


  工具定期构建时，你并不介意构建变慢，实际上还希望获得这些设置提供的额外反馈。


  对于 AdHoc 配置，请为此构建设置选择 `NO`，如图 2-9 所示。我们希望获得 Debug 配置提供的额外反馈，但由于不知道应用程序将安装在哪些设备上，我们实际上需要这三种架构。我们将在第
  4 章中进一步讨论这些架构。


