  \ 测试报告详细显示了哪个测试失败及其原因*\n\n关于从像`Jenkins`这样的持续集成平台运行单元测试，需要了解的内容基本上就是这些，这主要是因为我们已经有了一个之前配置好的任务，并且我们使用了像`xcpretty`这样出色的工具来处理困难的工作。在接下来的部分中，我们将了解如何从`Bamboo`以及使用`Xcode`机器人运行测试。\n\
  \n## 从`Bamboo`运行测试\n\n同样，`Bamboo`的开发人员在运行测试操作时采用了一种稍显复杂的方法。事实上，配置计划的“阶段”部分是这样说的：*计划中的每个阶段代表构建过程中的一个步骤。一个阶段可以包含一个或多个`Bamboo`可以并行执行的任务。例如，您可能有一个用于编译任务的阶段，接着是一个或多个用于各种测试任务的阶段，然后是一个用于部署任务的阶段。*\n\
  \n既然我们已经配置了一个构建任务和一个部署任务，那么让我们添加一个测试任务！这正是我们之前提到的将整个持续集成过程拆分为多个任务的做法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 108](img/index-179_1.jpg)\n\n**第 9 章：将单元测试纳入流程**\n\n**179**\n\n点击“添加任务”按钮，然后选择“克隆现有任务”，这样您就不必重新输入关于要克隆的仓库的所有信息。在“任务名称”字段中填写“`Automated\
  \ testing`”，然后点击“创建任务”。在列表中点击“`Automated Testing`”任务，并删除两个脚本构建阶段（即构建应用程序和压缩`dSYM`文件夹的阶段），因为我们不需要它们。\n\
  \n添加第一个脚本任务来为我们安装依赖项。在“任务描述”字段中输入“`Installing the dependencies`”，在“脚本主体”字段中输入“`pod\
  \ install`”，然后点击“保存”。添加第二个脚本任务来实际执行测试。在“任务描述”字段中输入“`Running the test suite`”，在“脚本主体”字段中输入我们之前使用的命令（就像在`Jenkins`上所做的那样），然后点击“保存”。\n\
  \n```\nxcodebuild -workspace \"Github Jobs.xcworkspace\" -scheme \"Github Jobs\"\
  \ -sdk iphonesimulator7.1 clean test | xcpretty -t -r junit && exit ${PIPESTATUS[0]}\n\
  ```\n\n最后，添加一个“`JUnit`解析器”任务来查找`junit xml`报告。在“任务描述”字段中输入“`Parsing the JUnit test\
  \ reports`”，在“自定义结果目录”字段中输入“`**/build/reports/junit.xml`”，然后点击“保存”。我们在关于`Bamboo`的章节中提到过，与`Jenkins`一样，任务是顺序运行的。目前，`JUnit`任务紧跟在运行测试套件的脚本任务之后。这意味着当测试失败时（就像现在这样），归档`Junit`报告的任务将不会执行。要解决此问题，将“`Junit\
  \ Parser`”任务拖到“最终任务”部分，如图 9-8 所示。\n\n***图 9-8.** `JUnit Parser`任务必须移动到最终任务部分，否则当测试失败时它将不会运行*\n\
  \n准备就绪后，运行整个“`Github Jobs for iOS`”计划：它将运行构建和打包应用程序的任务，以及运行测试套件并发布报告的任务。在“`Automated\
  \ Testing`”任务运行完毕后点击它，然后选择“测试”选项卡。如图 9-9 所示，它显示了失败测试的详细信息。更棒的是（这也是使用`Atlassian`公司产品的好处之一），您可以直接从那个特定的失败测试用例创建`Jira`问题。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 109](img/index-180_1.jpg)\n\
