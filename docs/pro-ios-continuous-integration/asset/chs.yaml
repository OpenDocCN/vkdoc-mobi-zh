  \ 更广泛的主题。\n\n如果您还记得，我们在 `Jenkins` 中设置的构建过程非常简单：克隆应用程序并运行一个负责所有其他事情的 `bash` 脚本。在构建过程结束时，我们添加了一个后构建阶段，用于归档生成的工件并确保其安全。\n\
  \n现在，我们的需求发生了变化，仅能从 `Jenkins` 下载打包好的应用程序已经不够了。幸运的是，`Jenkins` 拥有一个非常棒的社区。在需要集成像 `TestFlight`\
  \ 这样非常流行的服务的情况下，很可能已经有人为此开发了插件。让我们安装 `Jenkins` 的 `TestFlight` 插件。\n\n### 为 Jenkins\
  \ 安装 TestFlight 插件\n\n打开“管理 `Jenkins`”部分，导航到“管理插件”页面。在“可选插件”标签页中，查找 `TestFlight`。勾选左边的安装复选框，然后按下“不重启安装”按钮。如果您还记得，我们之前提到过为什么在不重启实例的情况下安装插件是安全的。\n\
  \n现在我们需要获取我们的凭证、`API Token` 和 `Team Token`，并将它们安全地存储在 `Jenkins` 中：我们不希望任何有权访问 `Jenkins`\
  \ 构建的人能够检索到这些 `Token`，也不希望这些 `Token` 出现在构建日志中。\n\n在“管理 `Jenkins`”部分，导航到“配置系统”页面，滚动到页面底部，您应该会看到一个专门用于\
  \ `TestFlight` 的配置区域。按下添加按钮以添加一对新的 `API Token` 和 `Team Token`，并为其命名，例如 `Github Jobs\
