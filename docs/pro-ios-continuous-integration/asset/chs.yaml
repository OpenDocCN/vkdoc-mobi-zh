  \ `TestFlight`”。\n\n勾选“`Token Pair`”。确保您已选择了 `Github Jobs for iOS`。如果您刚刚安装插件并且只添加了一对\
  \ `Token`，情况应该如此。接下来的两个选项应包含 `Jenkins` 用于检索 `IPA` 和（可能的）`dSYM` 文件的 `Ant` 模式。这些模式依赖于我们之前用于归档工件的相同语法：`Ant`\
  \ 模式。`IPA` 的默认值是`**/*.ipa`，这适用于我们，因为构建存储在工作区相对路径下的构建文件夹中。另一方面，`dSYM` 文件必须在上传到 `TestFlight`\
  \ 之前进行压缩。事实上，插件不会查找 `dSYM` 文件，而是查找相关的`-dSYM.zip`或`.dSYM.zip`文件。\n\n我们在第 2 章中已经提到过\
  \ `dSYM` 文件是什么以及它的用途：它包含应用程序的调试符号。没有这个文件，由 `TestFlight` 收集的崩溃日志是无用的，因为它们无法被转换为用于调试的、适当的、有用的堆栈跟踪。在苹果收购\
  \ `TestFlight` 背后的公司 `Burstly` 之前，`TestFlight` 附带了一个官方的 `SDK`，该 `SDK` 会收集崩溃日志，但要做到这一点，它实际上需要\
  \ `dSYM` 文件来符号化 `SDK` 收集和发送的日志。那么，如果 `SDK` 不再可用，我们为什么还要提这个呢？\n\n仅仅是因为苹果宣布将在明年（2015\
  \ 年）晚些时候提供收集崩溃日志的功能。到那时，使用命令行指令检索和发送 `dSYM` 文件对您来说应该很容易。让我们看看如何做到这一点。\n\n我们知道 `dSYM`\
  \ 文件是在构建应用程序时生成的，这意味着在执行 `xcodebuild` 命令期间生成。我们可以更新我们的 `cibuild` 脚本，并在 `xcodebuild`\
  \ 命令之后立即将其压缩，但这并不推荐：我们希望尽可能保持构建脚本的中立性。另一方面，我们可以做的是使用一个专用的构建阶段来找到 `dSYM` 文件并压缩它。\n\
  \n向上滚动一点，按下“添加构建步骤”按钮，然后在列表中选择“执行 `Shell`”。在出现的文本区域中，输入以下命令：\n\n```\ncd \"$WORKSPACE/build\"\
  \nfind . -name \"*.dSYM\" -exec zip -r \"$WORKSPACE/build/Github Jobs.dSYM.zip\"\
  \ {} \\;\n```\n\n它将找到所有`*.dSYM`文件，并将所有这些文件添加到创建的 `ZIP` 文件中。由于我们知道 `IPA` 文件的命名方式，我们也知道压缩后的\
  \ `dSYM` 文件应该叫什么名字才能被 `TestFlight` 插件找到。我们也可以在为此提供的字段中显式设置压缩后的 `dSYM` 文件的名称。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 7 章：空中分发**\n\n**125**\n\n\
  我们之前提到过发布说明的重要性，尤其是在 Beta 测试应用程序的背景下。事实上，如果您尝试上传没有发布说明的新构建，`TestFlight REST API`\
  \ 会抛出错误：\n\n```\n$ curl http://testflightapp.com/api/builds.json \\\n-F file=@Github\\\
  \ Jobs.ipa \\\n-F api_token=<API_TOKEN> \\\n-F team_token=<TEAM_TOKEN>\n```\n\n\
  **必须提供 `api_token`、`team_token`、文件和说明（缺少说明）**\n\n我们使用的插件有两种设置发布说明的方式：手动方式和自动方式。手动方式使用“构建说明”文本区域的内容。老实说，除非您愿意在每次构建前更新它，否则这种方式意义不大。第二种方式使用来自版本控制系统（在我们的案例中是\
  \ `Git`）的变更日志。\n\n如果发布说明对您的用户很重要，那么变更日志对开发人员来说也同样重要。通过编写明确的提交信息，意味着没有“修复这个”或“修复那个”，`TestFlight`\
  \ 插件将自动为用户生成适当的发布说明。勾选“将变更日志附加到构建说明”选项，然后按下“保存”。\n\n### 构建应用程序并将生成的 IPA 发送到 TestFlight\n\
  \n在 `Github Jobs for iOS` 任务页面上，按下侧边栏中的“立即构建”链接。一旦开始，点击构建并导航到“控制台输出”部分。输出中有几个部分让我们感兴趣，特别是在执行\
  \ `cibuild` 脚本之后。\n\n```\n$ /bin/sh -xe /var/folders/1v/d8vqkw8x23ndw49f5vs3fzw00000gn/T/hudson65668607800036881.sh\n\
  + find '/Users/Palleas/.jenkins/jobs/Github Jobs for iOS/workspace/build' -name\
  \ '*.dSYM' -exec zip\n-r '/Users/Palleas/.jenkins/jobs/Github Jobs for iOS/workspace/build/Github\
  \ Jobs.dSYM.zip' '{}' ';'\n  adding: Users/Palleas/.jenkins/jobs/Github Jobs for\
  \ iOS/workspace/build/Github Jobs.app.dSYM/\n(stored 0%)\n  adding: Users/Palleas/.jenkins/jobs/Github\
  \ Jobs for iOS/workspace/build/Github Jobs.app.dSYM/\nContents/ (stored 0%)\n```\n\
  \n\n\n`adding: Users/Palleas/.jenkins/jobs/Github Jobs for iOS/workspace/build/Github\
  \ Jobs.app.dSYM/`  \n`Contents/Info.plist (deflated 52%)`  \n\n`adding: Users/Palleas/.jenkins/jobs/Github\
  \ Jobs for iOS/workspace/build/Github Jobs.app.dSYM/`  \n`Contents/Resources/ (stored\
  \ 0%)`  \n\n`adding: Users/Palleas/.jenkins/jobs/Github Jobs for iOS/workspace/build/Github\
  \ Jobs.app.dSYM/`  \n`Contents/Resources/DWARF/ (stored 0%)`  \n\n`adding: Users/Palleas/.jenkins/jobs/Github\
