  \n## 关于作者\n\n**罗曼·普克莱**是一位居住在蒙特利尔的开发者，与女友和两只猫为伴。他曾在法国学习计算机科学和移动开发，参与过从网站到富界面及移动应用等多种项目。目前他在一家加拿大公司担任\
  \ iOS 开发者，同时学习如何走扁带。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image\
  \ 118](img/index-211_1.jpg)\n\n![Image 119](img/index-211_2.jpg)\n\n## 关于技术审校者\n\
  \n**斯科特·加德纳**是一名企业级 iOS 应用架构师、开发者和顾问。他与妻子和女儿居住在美国中西部。\n\n**阿比盖尔·古德威尔**是科罗拉多大学斯普林斯分校的学生。她主修英语（文学方向）以及计算机科学。作为一名有抱负的小说家，她花费大量时间写作并训练综合格斗。她希望有朝一日能出版一本《纽约时报》畅销书。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 120](img/index-212_1.jpg)\n\
  \n## 关于技术审校者（续）\n\n**费利佩·古铁雷斯**是一名软件架构师，拥有墨西哥城蒙特雷理工学院计算机科学学士和硕士学位。他拥有超过 20 年的 IT\
  \ 经验，期间为政府、零售、医疗、教育和银行等多个垂直行业的公司开发程序。目前他在 EMC/Pivotal 担任高级顾问，专攻 Spring 框架、Groovy\
  \ 和 RabbitMQ 等技术。他还为诺基亚、苹果、Redbox 和高通等大公司提供咨询服务，同时也是 Apress 出版社《Spring 框架入门》一书的作者。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 致谢\n\n当 Apress 给我机会撰写一本关于\
  \ iOS 持续集成的书时，我既兴奋又恐惧。兴奋的是，自从 2008 年开始担任技术审校以来，写书一直是我心中的愿望；恐惧的是，当我开始整理所有想在书中讨论的内容时，我意识到自己低估了所需的工作量。但幸运的是，我有机会与一群出色的人共事。\n\
  \n我要感谢 Apress 所有帮助我完成本书的人。现在回想起来，书中使用“我们”来与你对话，不仅仅是一种教学方式：我确实不是独自在写作。首先，非常感谢路易丝·科里根，她是我在\
  \ Apress 的第一个联系人，是她启动了整个项目，从完善我的提案开始。非常感谢随后接手并将项目推进到新阶段的米歇尔·洛曼，她始终高度警觉，尤其是在 WWDC\
  \ 临近、而我的第一章关于 Xcode 机器人的截稿日期也同时到来的时候。\n\n没有我的日常联系人，我无法完成这一切：道格拉斯·彭迪克，他纠正了大量表述不清的句子和其他文体错误；还有凯文·沃尔特，我发现他站在对手那边，而那种在加拿大才能找到的冰球狂热也开始影响我。感谢你们在需要时提供的工具、帮助和鼓励。\n\
  \n参与这个项目的技术编辑——斯科特·加德纳、阿比·古德威尔和费利佩·古铁雷斯，应该为他们提供的反馈质量和有用性感到自豪。感谢你们的陪伴，你们是我的安全网。\n\
  \n我还要感谢我的公司 TechSolCom，它让我有机会接触许多出色的工具，因为他们信任我，让我负责所有 iOS 项目的持续集成。\n\n我要感谢马克·韦斯特罗夫，他在这一切开始时就在我身边，当我又一次抱怨\
  \ Jenkins 时，他让我明白表面之下还有更多东西。当我怀疑自己是否真的能胜任这个挑战时，他也提供了巨大的支持。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 致谢（续）\n\n还要感谢我多年的朋友本杰明·休伯特，他在过去三个月里支持着我，我在 IM 上那些 GIF 图片的间隙，不断向他汇报我的进展。非常感谢你的支持，期待能成为你的伴郎！\n\
  \n最后但同样重要的是，我要感谢我的女友卡米尔的耐心，在过去几个月里，我虽然人在她身边却心不在焉，在离她三米远的笔记本电脑上写作。她一直鼓励我坚持工作，每当需要时她都能让我重回正轨，我对她感激不尽。\n\
  \n愿我们未来还能相伴许多年，甚至更久。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 文档大纲\n\
