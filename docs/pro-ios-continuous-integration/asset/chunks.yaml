    Only a few pieces are understandable: “Apple Computer Certificate Authority”.
    The provisioning profile that was generated by Apple is code-signed using the
    PCKS#7, a public-key cryptography standard. The 7th version is the one that is
    used to sign messages and is called the Cryptographic Message Syntax (CMS) Standard.


    These weird characters are a way to check that the provisioning profile file was
    not altered after Apple generated it. Remember that Apple only gives you a hundred
    slots of devices? That would be a shame that you could simply add new Unique Device
    Identifier by modifying an easy to read Plist file.


    If you navigate through the content of this XML file you should see a few key
    pieces of information, like the name of this provisioning profile:


    <key>Name</key>


    <string>Github Jobs Ad Hoc Distribution</string>


    A Universally Unique Identifier (UUID) that was generated by Apple:


    <key>UUID</key>


    <string>227G45F1-0BAF-4A6F-AE5A-B96F5825DBA8</string>


    And the list of iOS Unique Device Identifiers that you added when you generated
    this provisioning profile:


    <key>ProvisionedDevices</key>


