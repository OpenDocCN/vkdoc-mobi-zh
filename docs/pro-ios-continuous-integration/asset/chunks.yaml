    \ (origin/master)\nWorking directory is http://localhost:8080/job/Github%20Jobs%20for%20iOS/ws/\n\
    ...\n```\n\nAt a time when every once in a while a new startup comes up with a\
    \ new service that will revolutionize the way you communicate within your company\
    \ by removing e-mails, it may seem a little bit weird to use them to be notified\
    \ of a failing build. The thing is, e-mail notifications come free with a standard\
    \ installation of Jenkins. If you need something that would fit better in your\
