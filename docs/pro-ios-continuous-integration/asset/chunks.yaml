    在持续集成领域有一条黄金法则：在构建应用程序之前，尽量避免对应用进行过多修改。目前我们处于交互式模式，手动运行构建命令，但当我们在自动化构建平台上运行这些命令时，你会发现它们远没有那么宽容。


    ## 总结与收官


    在过去十五页左右的内容中，我们一直在编写命令，现在是时候将这些命令整合起来，以便一次性重新运行所有操作：包括构建和应用程序打包。为此，我们将编写一个简单的
    bash 脚本。首先，在`"Github Jobs"`项目的根目录下创建一个`bin`目录。按照惯例，这是存放项目可执行工具的地方。


    ```

    $ mkdir bin

    $ touch bin/cibuild

    $ chmod +x bin/cibuild

    ```


    请注意，我们使用了`chmod`命令来为新创建的脚本添加可执行文件权限。


    这个构建脚本的内容相当直接明了：


    ```bash

    #!/bin/bash


    WORKSPACE="Github Jobs.xcworkspace"

    SCHEME="Github Jobs"

    BUILD_DIR="$(pwd)/build"

    CONFIGURATION="AdHoc"

    ARCHIVE_FILENAME="Github Jobs.app"

    IPA_FILENAME="Github Jobs.ipa"


    security unlock-keychain -p $PASSWORD $HOME/Library/Keychains/login.keychain


    pod install


    xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration CONFIGURATION_BUILD_DIR="$BUILD_DIR"
    clean build | xcpretty -c


    xcrun -sdk iphoneos PackageApplication "$BUILD_DIR/$ARCHIVE_FILENAME" -o "$BUILD_DIR/$IPA_FILENAME"

    ```


    第一行被称为"shebang"，它告诉 shell 该脚本应使用 bash 进行解析。


    这个脚本非常简单，没有使用任何 shell 特有的工具，因此这部分并非必需，但这是一个良好的习惯。


    接下来的代码块定义了一堆变量，没什么特别的，脚本其余部分除了`security`命令外，都是本章前几节已经介绍过的内容。


    `security`命令是钥匙串及相关安全功能的命令行接口。


    它能够做的事情之一是在短时间内解锁钥匙串。当你首次构建应用程序时，会弹出一个面板，询问你是否授权某个进程访问你的钥匙串。在我们的案例中，这个进程是`CodeSign`，该命令在`xcodebuild`结束时执行，需要访问存储在钥匙串中的私钥和证书来为构建签名。


    请注意，在代码中硬编码密码确实不够安全，因此脚本中并未定义`$PASSWORD`变量，而是像这样调用脚本：


    ```

    $ PASSWORD=mypassword bin/cibuild

    ```


    这样虽然好不了多少，但至少你可以分享脚本并将其加入版本控制，而不会泄露密码。在接下来的章节中，我们将开始讨论如何将此脚本集成到带有安全凭据存储方式的自动化构建平台中。


    ## 本章小结


    在本章中，我们简要介绍了 iOS 开发者可用的命令行工具，这些工具能帮助开发者提高效率并了解底层工作原理。Shenzhen、`xctool`和`xcpretty`都是由其他开发者创建的，他们希望利用命令行的强大功能，并通过分享他们的工作来回馈社区。


    我们希望已经说服你，命令行并不可怕，而且能提供巨大帮助。使用`xcodebuild`构建应用程序、`xcrun`定位所需工具、`PackageApplication`生成最终的`ipa`文件……苹果为开发者提供了许多工具，有助于我们搭建持续集成环境。


    下一章将正式开始介绍这方面内容，从一个名为 Jenkins 的持续集成平台开始。


    ---


    # 使用 Jenkins 进行自动化构建


    我们花了几乎半本书的篇幅来介绍概念，现在终于到了开始讨论持续集成的时候了。在过去的章节中，我们的目标是带你了解可用的工具。既然我们已经知道苹果提供了所需的一切，那么接下来就用
    Jenkins 搭建我们的持续集成自动化构建平台。


    在动手之前，我们需要回答一个问题：什么是自动化构建平台？为什么需要它？


    ## 为什么我们需要自动化构建平台？


    自动化构建平台运行专门的构建流程，我们通常称之为"任务"。一个任务可以执行多种操作，从构建应用程序到根据团队规范检查代码风格。每当项目发生变更时，任务会自动启动，或者甚至手动启动，有时一天会运行多次。自动化构建平台通常提供用户界面，以简化任务的创建和任务执行结果的利用。这样看来，它基本上就是一个美化的`crontab`网页界面。那么，它的附加价值在哪里？


    在项目的生命周期中，你需要集成同事的代码片段，并确保这些代码片段不会以任何方式损害最终产品。我们已经介绍了如何从命令行快速构建应用程序，在接下来的章节中，我们将讨论单元测试和质量保证。事实是，如果你忘记运行这些工具，它们就毫无用处，而你很可能会忘记。这可能是因为你过于自信于自己的代码审查技能，或者仅仅是因为截止日期太近，但指望开发者去运行那些会让他们感到烦扰的工具是不切实际的。自动化构建平台的主要目的是通过尽可能频繁地构建应用程序，来维持对应用程序代码库的一定信心。


    持续集成旨在通过提高集成频率来减少集成的痛苦，这正是自动化构建平台能够提供帮助的原因。


    自动化构建平台必须运行在独立的环境中，绝对不能运行在开发者的个人电脑上。再次强调，你需要能够信任你的自动化构建平台。"但我搞不懂，应用程序在我的电脑上能构建成功啊！"这种争论是你希望避免的。


    我们将从一个非常著名的自动化构建平台开始：Jenkins。


    ## Jenkins 与 Hudson：一段历史


    Jenkins 是一个用 Java 编写的持续集成平台，发布于十年前。它最初于 2004 年在 Sun Microsystems 以"Hudson"的名字问世，是
    CruiseControl（同样用 Java 编写）的第一个可行替代品。


    2010 年 Sun Microsystems 被 Oracle 收购时，社区中出现了一个问题，结果是当 Oracle 申请商标时，项目更名，Jenkins
    由此诞生。不过，Oracle 宣布 Hudson 仍将得到维护，项目将继续发展。如今，这两个项目都仍在运营，尽管根据各自 GitHub 组织的最新成员和公共仓库数量来看，Jenkins
    似乎赢得了人气竞赛。

    '
- fmt: 'They both share a common codebase and to this day, each one is considered
    to be a fork of the other by the respective leaders. Even if we wil be using `Jenkins`
    in this book, most of the manipulation we will be doing, the configuration we
    will be tweaking, and the plugins we will be installing, should work on `Hudson`.


    ## Getting Started with Jenkins


    The requirements to run `Jenkins` on a computer are pretty simple, you only need
    `Java 6` installed.


    Since Apple stopped shipping OS X with Java pre-installed, we need to make sure
    Java is available on your computer. Many tools require Java to run even today,
    so you probably have already installed it without paying much attention. Open
    a terminal and run the following command:


    ```

    $ java -version

    java version "1.7.0_25"

    Java(TM) SE Runtime Environment (build 1.7.0_25-b15)

    Java HotSpot(TM) 64-Bit Server VM (build 23.25-b01, mixed mode)

    ```


    If the output isn’t exactly the same as above, that’s okay, as long as it shows
    a version of Java that is superior to 1.6. If Java isn’t installed at all, a message
    such as, “No Java runtime present, requesting install.” should appear. You should
    then visit the Apple support page to download the Java runtime, [which can be
    found at: http://support.apple.com/kb/DL1572](http://support.apple.com/kb/DL1572).


    ## Installing Jenkins Using the Command Line


    You can install `Jenkins` using the `Homebrew` package manager we’ve talked about
    in the previous chapters or you could simply use the native package provided on
    the `Jenkins` website. From experience, `Homebrew` is probably the simplest approach
    since it makes it super easy to update `Jenkins` when a new version is released
    (and available via homebrew, of course). To do that, open a terminal and simply
    run the following command:


    ```

    $ brew install jenkins

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 5: Automatic Builds with Jenkins - 69**


    It will download the most recent version of `Jenkins` available on `homebrew`
    and set up everything you need to be able to start it at launch, as long as you
    read the whole output of the command.


    We, on the other hand, won’t be using that method in this book. We want to make
    sure you actually understand how it works under the hood, from downloading `Jenkins`
    to actually getting it to build our application. Feel free to jump to the “Having
    a look around” section if you don’t really care about how to run a Java-based
    web application.


    Open a terminal, create a “Jenkins” folder, and change your working directory
    to the newly created folder. Once this is done, download the latest version of
    `Jenkins` using the `curl` command line tool.


    Note the `–L` argument that means, “follow redirects”, when you use the “latest”
    `Jenkins` URL, you will actually be redirected to the most recent version. At
    the time we are writing this book, the current version is 1.560.


    ```

    $ mkdir ~/Jenkins

    $ cd ~/Jenkins

    $ curl -L http://mirrors.jenkins-ci.org/war/latest/jenkins.war -O

    ```


    The installation of `Jenkins` is nothing if not easy. We just downloaded the latest
    version of `Jenkins` in a WAR format, which stands for “Web Application ARchive”.
    This means that everything you need to use `Jenkins` is in this single file; you
    can now run `Jenkins` using the Java command line tool.


    ```

    $ java –jar jenkins.war

    Running from: /Users/Palleas/Jenkins/jenkins.war

    webroot: $user.home/.jenkins

    ...

    INFO: Started SelectChannelConnector@0.0.0.0:8080

    ```


    If you see a similar output from the Java command, then `Jenkins` should have
    started normally.


    As it says in the last line, your fresh installation of `Jenkins` is available
    at the address `0.0.0.0` (which basically means your own IP address) on port `8080`.
    You can customize the HTTP address and the port with the `--httpListenAddress`
    and the `--httpPort` arguments, like this:


    ```

    $ java -jar jenkins.war --httpPort=8908 --httpListenAddress=192.168.1.14

    ```


    Congratulations, you now have your first instance of `Jenkins` up and running!
    Open your default Internet browser and load the following address: `http://localhost:8080`.
    If everything worked as expected, you should see an empty interface with an old
    butler (which has nothing to do with the other one from Hudson) in the background
    and a welcome message asking you to create a job to get started. Don’t worry we
    will get to that in a few moments.


    The most amazing thing with `Jenkins` is probably its design, which most developers
    would consider “good enough”. You wil probably think that it is (thinking you
    won’t be spending a lot of time on `Jenkins` once you’ve configured your jobs),
    but that’s a lie. In fact, you WILL be spending a lot of time on `Jenkins`. It
    may be a couple of minutes every day, but at the end of the week, you’l realize
    that you’ve actual y spent two hours on `Jenkins` before you know it. Those two
    hours are not wasted, don’t get us wrong, but that’s enough time to assert that
    `Jenkins` could be prettier, just like many open-source projects that solved this
    issue by using the default CSS file provided for by twitter bootstrap.


