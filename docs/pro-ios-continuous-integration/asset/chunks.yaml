  raw: 'The thing is, Xcode bots are not meant to replace your Jenkins or Bamboo installation.
    Not yet anyway. At this point, Xcode bots are very promising but also really flawed.
    In this chapter, we will show you how to install, set up, and use these new features,
    and how they will fit in your day-to-day workflow.


    Let’s call this chapter the final quest on your journey to the ideal continuous
    integration platform.


    Once we have covered in detail how it works, we will use the remaining chapters
    to talk about automated testing and quality assurance.


    Without further ado, open the Mac app store with a credit card ready and let’s
    dive in.


    OS X server


    Before we start talking about how the OS X Server works, we need to understand
    the process that led to the very first release of this tool.


    A bit of history


    Before OS X Lion, Mac OS X and Mac OS X server where two separate operating systems,
    the latter was similar to the desktop version but came with additional administrations
    tools. The server version was meant for rack-mounted server computers called Xserve
    which have now been replaced by the Mac mini server and the Mac Pro server.


    When OS X Lion was released, Mac OS X and Mac OS X server merged into a single
    operating system called OS X. The server-related components are now released in
    a separate packaged application that you can download form the Mac App Store.
    Note that Mac Pro and Mac Mini computers can be bought with OS X preinstalled
    but as we are going to show you, setting up OS X


    Server on a computer is pretty trivial.


    Installing OS X server on your computer


    OS X server will cost $20, and you won’t be able to use Xcode’s continuous integration
    features if you don’t install it. To run the latest version of OS X server, you
    will need at least OS X Mavericks and the latest version of Xcode. We are using
    the third beta of Xcode 6 and version 3.1.5 of OS X Server.


    Open the Mac App store, search for “OS X Server” and install it on your computer.


    Once it’s installed, launch it to start the installation process, which will require
    root privileges.


    Don’t worry though: it will not erase the contents of your computer. At the end
    of the installation process, you should have an overview of the services available
    to you through OS X server, similar to Figure [8-1](#index_split_002.html#p144):
    calendars, messages, mail, time machines, and Xcode, of course.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 88](index-144_1.jpg)


    **CHAPTER 8: Day-to-day use of Xcode bots**


    **143**


    ***Figure 8-1.** OS X Server comes with out of the box support of many services*
    As you can see, in a couple of clicks we have a server almost ready to work for
    us where it took a few more steps to do the same with Jenkins or Bamboo. This
    is one of the reasons a continuous integration platform using OS X Server makes
    sense: it relies on tools you’re already familiar with - like the app store -
    and it looks and feels like an OS X application.


    The service we really care about for now is Xcode, which is disabled by default.
    Let’s activate it so we can get started. Select the Xcode item in the left menu.
    Toggle the switch in the top-right corner and when the file panel opens, navigate
    to your Application folder and select the Xcode application.


    Once the Xcode setup is complete, you should see more information about your newly
    activated Xcode service.


    The first thing to know is that your Xcode server is automatically made available
    on your local network, in our case that would be “romain.local”, which is the
    default generated hostname of the computer based on its name.


    Second, the Xcode service comes with a default permission scheme where only the
    authenticated users can create Bots and everyone can see them, as long as they
    are on the same network, of course.


    OS X server use the same database of user that the operating system. If you go
    to the Users section from the left menu, you should see al the users present on
    your computer. Let’s say that an intern will join your company next summer, but
    you don’t want to create him a full access to the computer that hosts your OS
    X server. Let’s create an account.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 89](index-145_1.jpg)


    **144**


    **CHAPTER 8: Day-to-day use of Xcode bots**


    Click on the plus sign at the bottom left of the Users section and fill the form
    according to the Figure [8-2](#index_split_002.html#p145), with information of
    your choosing. Note that we’ve also tagged the user with the


    “internship” label and added a small informative text about her. What’s important
    to notice is that we did not choose to create an actual user, but only a couple
    of credentials. That’s why in the Home folder, you will choose “None – Service
    only”: we only want Camille to be able to manage bots. We could also use a similar
    panel to assign our new user to a group of interns and things like that but a)
    that’s a bit out of the scope of this book and b) that would be too much for a
    simple project such as ours. Press the “Create” button and go back to Xcode’s
    service management.


    ***Figure 8-2.** Camille the intern will be able to use her credentials to access
    some of the services* Let’s tweak the permissions and make it so only administrators
    and our intern can create bots, and that only logged in users can view all the
    bots. To do that, click the edit button next to the permissions section. Select
    “only some users” in the first combo box, hit the plus sign and search for Camille
    in the field that appears. Also, check the checkbox button at the bottom of the
    panel and select “only logged in users” in the combo box next to it. Finally,
    press OK.


    Under this section is more information about how the builds will be performed.
    The first thing you see is the version of Xcode that will be used to build the
    application. If you remember correctly what we talked about in Chapter 3, that
    it is possible to switch between developers directories using xcode-select or
    the DEVELOPER_DIR environment variable. This is pretty much what this section
    is


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 90](index-146_1.jpg)


    **CHAPTER 8: Day-to-day use of Xcode bots**


    **145**


    here for, only here you have a user interface and a little bit more confusing
    error message when you try to select an invalid Xcode app: “This application cannot
    be used with OS X Server.”


    The Xcode service can also use credentials to connect to your existing Apple developer
    account so it can automatically download code signing identities and provisioning
    profiles. Click on the “add”


    button near to the Developer teams section and fill in your credentials. If this
    Apple identifier is linked to multiple teams, select the one you want to use with
    this installation of OS X server. If you’re a member of only one team, simply
    confirm that you really want to add this server to your team.


    Last but not least, the Xcode service for OS X server will be able to run tests
    on multiple devices at once. Even if we’ll cover unit testing in the next chapter,
    plug one of your devices into the computer that runs OS X server and wait until
    it detects it.


    We’ve made an Xcode service available on our local network, set up basic permissions,
    configured the developer directory where it will find all the tool it needs to
