    # 第 8 章 - Xcode Server 与 Xcode Bots 的日常使用


    正如我们所说，苹果终于发布了自家的持续集成工具。我们将教你如何使用这些工具，以及如何将它们融入你的日常工作流程中。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **4**


    ## 第 1 章：持续集成简介


    ## 第 9 章 - 将单元测试加入其中


    无论你选择的是免费的 `Jenkins` 方案、企业级的 `Bamboo` 方案，还是我们未提及的其他完全不同的方案，你都将学习如何将单元测试和功能测试的自动化执行作为构建流程的一部分。


    ## 第 10 章 - 质量保证


    作为锦上添花，我们将向你展示可以使用哪些工具来维持高质量的代码。


    在这段旅程中，你可以随时直接跳转到某个章节。毕竟，你可能只想学习如何使用 `Jenkins`，而对 `Bamboo` 的工作原理并不关心，这完全没问题！


    ## 示例应用：Github Jobs


    本书的目标不是教你如何使用 `Objective-C` 和 `Xcode` 创建 iPhone 或 iPad 应用。要充分利用本书，请确保你已经熟悉 `Objective-C`
    和 `Xcode`。


    作为示例，我们将创建一个与 `Github jobs` API 通信的 iOS 应用。这个应用将是一个非常简单的主从（master/detail）应用。编写应用的代码不会花费太长时间，但请做好在项目配置上花费大量时间的准备。


    ## 先决条件


    请确保你安装了 `Xcode 5.1`，因为本书中的所有截图都将使用此特定版本。你总不想因为 `Xcode` 版本过旧而迷失方向吧？


    闲话少叙，让我们开始吧！


    ## 总结


    持续集成是一个宽泛的概念，无法通过一个章节解释清楚。这是一个影响你选择的技术和工作方法的复杂话题。本章只是介绍了这种复杂性的概念。既然你已经了解了我们的方法，那么让我们在开发示例应用的同时，先浏览一下可用的工具和特性，以此开启这段旅程。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 2 章：iOS 和 Xcode 中的持续集成特性


    持续集成关乎选择正确的工具，iOS 社区并未等待苹果就自行搭建了他们的环境。他们又能如何呢？众所周知，苹果的工作是保密的，并且每年通常在 WWDC 上发布一次所有的新工具。首先，让我们看看那些一直存在的事物，无论是特指
    `Xcode` 内部，还是更广泛的社区。


    如果说 `Xcode 5` 带来了一些闪亮的持续集成新工具，比如我们将在本书后面讨论的 `Xcode bots`，那么之前的版本已经提供了有用的集成来帮助你完成一些工作。即使现在替代方案越来越流行（例如
    `AppCode`），即使仍有人使用他们最喜欢的文本编辑器和终端来构建应用，`Xcode` 仍然是事实上的 IDE。


    当然，它也有缺陷，就像著名的网站 “Text from Xcode”（可访问 [textfromxcode.com](http://textfromxcode.com/)）在过去几年里幽默地展示的那样。没有软件是完美的，我们作为开发者往往认为一切都是理所当然的，但实际上
    `Xcode` 为你处理了很多事情。让我们看看它能做什么，以及它将如何帮助我们建立持续集成环境。


    在本书中，我们将花大量时间在 `Xcode` 中。直接给你一些随机截图让你自己去适配现有应用是没有意义的，因此我们将使用 `GitHub Jobs API`
    创建一个非常简单的应用。


    我们将从创建示例应用开始，并浏览默认项目模板为我们提供了什么：应用的 info 文件在哪里，单元测试在哪里，以及它们依赖于哪个框架。然后，我们将继续学习一些更高级的内容，比如使用
    `Git` 对项目进行版本控制，以及使用 `CocoaPods`（一个著名的 `Xcode` 项目依赖管理器）来管理依赖关系。最后，我们将设置好一切，先向测试人员发布应用，最终向全世界发布。这将为我们深入探讨
    `Xcode` 如何帮助我们管理多个环境提供绝佳机会。


    **5**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 17](img/index-10_1.jpg)


    **6**


    ## 示例应用：Github jobs


    [GitHub 是一个托管服务，访问地址为 github.com](http://github.com/)，用于使用 Git 版本控制系统的软件开发项目。它提供免费、付费和企业计划，并且在社区中非常知名。在其他服务中，它专门为求职者和公司提供了一个专属的招聘版块。如果你想了解更多关于此服务的信息，请访问
    [`jobs.github.com.`](https://jobs.github.com/)


    正如我们之前所说，本书的目的不是教你如何用 `Objective-C` 编程。既然你在阅读本书，很可能你已经相当了解它了。这就是为什么我们让应用保持非常简单：它将调用
    `GitHub API`，获取一批招聘信息，并使用 `UITableView` 在列表中显示它们。仅此而已。


    ### 创建应用


    首先，使用苹果的模板创建一个新的 iOS 项目。打开 `Xcode` 并点击 “Create a new Xcode project” 按钮，或者在 `Xcode`
    打开时，从 “File” 菜单中选择 “New → Project . . .”。


    确保从侧边栏中选择了 iOS 应用模板，并选择 “Single view application”，如图 2-1 所示。


    **图 2-1.** 选择我们想要开始开发应用的基础模板


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **第 2 章：iOS 和 Xcode 中的持续集成特性**


    **7**


    使用 “Github Jobs” 作为产品名称，“com.perfectly-cooked” 作为公司标识符，“PCS” 作为类前缀。这是我们将会使用的名称，它会使你更容易理解截图。其他选项不太重要，只需确保勾选
    “Create Git repository on . . .” 并暂时选择 “My Mac”。`Xcode` 允许你使用 OS X 服务器来托管代码以及其他功能，但我们稍后会讨论这个问题。


    ### Xcode 提供了什么


    我们使用的是 `Xcode` 提供的标准模板。它自带一个简单的 `Storyboard` 文件、一个应用代理以及一个 `UIViewController`
    子类。让我们看看在日常工作流程中可以使用哪些内容，以及它们将如何融入我们的持续集成过程中。


    #### 应用的 Info 文件


    每个应用都带有一个以属性列表格式编写的 `Info` 文件，你会在 “MyApplicationInfo.plist” 或本例中的 “Github Jobs-Info.plist”
    名称下找到它。当你打开该文件时，基本上可以找到关于该应用的所有公开信息，其中包括：应用的名称以及你在创建项目时设置的产品标识符。


    **关于属性列表格式的说明：** 属性列表文件是使用 “.plist” 文件扩展名存储序列化对象的文件，因此通常被称为 `Plist` 文件。由于 iOS
    和 OSX SDK 中提供了你所需的所有 API，属性列表文件通常是存储应用信息以及其他各种设置和数据的标准文件格式。

