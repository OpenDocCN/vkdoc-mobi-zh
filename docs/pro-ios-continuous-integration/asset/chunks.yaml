    ## CHAPTER 9: Adding Unit testing to the mix


    `Xcodebuild` is not different from all the command line tools around. Like any
    of them, this command line tool will exit with a status code and any non-zero
    code should be considered as an error. Let’s have a look at the error code returned
    by a typical `xcodebuild test`, using the `$?` variable available in bash after
    any command execution:


    ```

    $ xcodebuild -workspace Github\ Jobs.xcworkspace -scheme "Github Jobs" -sdk iphonesimulator7.1

    clean ...


    ** TEST SUCCEEDED **


    $ echo "Exit code was $?"

    Exit code was 0

    ```


    When a test succeeded, `xcodebuild` exits with 0, as it should. Now let’s fail
    the test. Open the `PCSJobOffer.m` file, and replace the line that assigns the
    title to the object’s property of the same name with this (don’t forget to restore
    your file back to the way it was after):


    ```

