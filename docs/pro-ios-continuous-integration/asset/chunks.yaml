    the Github Jobs project or by looking at the big


    “Source Control” menu in Xcode.


    Back in the old days, Xcode only supported Subversion and CVS. While the first
    one stil exists, even if it’s grown a bit out of date due to the arrival of Decentralized
    Version Control System (DVCS), such as Git and Mercurial, the second one was clearly
    a legacy from the sad old days of versioning control.


    Git is a really popular Version Control Systems that works in a decentralized
    way. Meaning the opposite way of how SVN works, every single working copy of a
    project can be used as a remote and even better, can work independently.


    To show you how useful it is to have Git deeply integrated in your Xcode project,
    let’s break it. That’s right, let’s create a very simple conflict and see what
    happens. In the world of Version Control Systems, conflicts are what happen when
    merging two versions of a file is not possible. If you changed the same part of
    the same file differently in the two branches you’re merging together, it won’t
    be able to merge them and a manual intervention will be required.


    In Xcode, from the Source Control menu, select “Github Jobs – master” and then,
    select “New Branch . . . ”. In the field that appears, fill the branch name field
    with “saying-hi” and press “Create.”


    At the end of this process, you will be working on a dedicated branch for your
    “Saying Hi” feature.


    This means that your application will evolve while a stable version, the master
    branch, is still available somewhere.


    Now, open the “AppDelegate.m” file and add a simple NSLog instruction that greets
    the user when the application finishes launching:


    #import "PCSAppDelegate.h"


    @implementation PCSAppDelegate


    - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *) launchOptions


    {


    **NSLog(@"Hi, I''m a sample application for a book.");**


    return YES;


    }


    @end


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 20](index-16_1.jpg)


    **12**


    **CHAPTER 2: Continuous integration features in iOS and Xcode**


    With this greeting implemented, open the Source control menu and select “Commit
    . . .”. In the form that appears, enter a simple commit message such as “Saying
    hi when the application starts” and press the “Commit 1 File” button. You’ve now
    made your very first commit in this feature branch.


    To create a conflict, a file must have been modified at a similar place in the
    file in a different branch, so we need to go back to the master branch and create
    a commit similar to the one we’ve just made.


    From the Source Control menu, select “Github Jobs – saying-hi” and then “Switch
    to Branch . . .”.


    In the list that appears, select the master branch and press “Switch.” We are
    now back to the master branch, and the NSLog instruction we’ve added is no longer
    here.


    Let’s repeat the process with a slightly different greeting message while still
    on the master branch.


    We chose to go with “Hi, I’m a book created for a sample application,” which indeed
    doesn’t make much sense. Commit your modification like we did before. We now have
    2 branches, both with a slightly different greeting instruction at the same position
    in the same file.


    Finally, from the Source Control menu, select “Github Jobs – master” and then
    “Merge from Branch . . .”. In the list that appears, select “saying-hi” and press
    “Merge”: a window similar to the one shown in Figure [2-4 will appear](#index_split_000.html#p16).
    Select the third button in the menu at the bottom of the screen to integrate the
    modifications on the right and press the “Merge.”


    ***Figure 2-4.** Xcode has detected a conflict and will help you to fix it*


    That’s basically how conflicts work and that’s how Xcode will assist you to fix
    them and keep your project clean. However, sometimes conflict will happen outside
    of Xcode, because you decided to merge a branch using the command line or because
    you started using a dedicated Git client.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 21](index-17_1.jpg)


    **CHAPTER 2: Continuous integration features in iOS and Xcode**


    **13**


    That’s the kind of thing Xcode will understand. When that happens and some of
    your files become disfigured with weird characters all over the place, building
    your application could simply throw you some random syntax error and let you find
    out why your build is failing. Xcode is much more clever than that. Indeed, you
    won’t even be able to build your application unless the conflict is marked as
    resolved manually using your shell or your favorite Git client, or directly in
    Xcode, as shown in Figure [2-5](#index_split_000.html#p17).


    ***Figure 2-5.** Xcode has detected a conflicted file and marked it as such in
    the sidebar and the primary editor* To fix this conflict and mark it as resolved,
    edit the “AppDelegate.m” file until it looks good to you.


    In our case, that would be keeping only one “application:didFinishLaunchingWithOptions:”
    method and choosing the second message. You must remove all the conflict markers,
    which are the lines with the multiple chevrons and equal signs, for your application
    to build again. After al , in this context, they are nothing more than syntax
    errors. Once this is done, simply right-click on the conflicted file and select
    “Mark Selected File as Resolved” in the “Source Control” menu item.


    Versioning control in Xcode is not all sparkles and rainbows. There are edge cases
    that come with Apple using file formats such as the one for the “xcodeproj” file
    or even “xib” and “storyboards.” In Xcode 5, Apple came with a much simpler file
    format for those Interface Builder files, making merge operations and conflict
    resolutions a lot easier. From NIB to bloated XIB, to almost-readable, ten-times
    shorter XIB, Apple is indeed working at easing this process. Once again, we’ve
    come a long way, even if we are still waiting for a simpler file format for those
    “xcodeproj,” which still uses an old-style brace based format to delimit the configuration
    hierarchy.'
  trans: '

    # Git 集成


    正如我们在引言中所述，将代码片段集成到项目中，通常意味着使用你喜爱的版本控制系统来合并分支。一个成功的持续集成通常意味着一个完善的工作流程。当你参与一个应用的开发时，会发生几件事情。一旦第一个版本发布，你就会开始着手新功能，其中一些功能需要花费时间，因此你会在仓库的独立分支上工作。在此期间，你的用户可能会向你发送关于应用中各种小问题的错误报告和反馈。这些问题必须尽快修复，并作为应用的新小版本发布。同样，为了避免搞乱应用，你会像开发新功能一样，在独立的分支上工作。


    需要牢记的主要一点是，无论何时工作，你都需要获得关于当前任务的反馈。你希望知道在实现新功能时是否破坏了某些东西，或者报告给你的 bug 是否正在被修复。此外，你的
    QA 团队、老板，甚至客户可能也需要这样的反馈，很可能还需要一份应用的新构建版本。因为“抱歉，我现在把应用搞坏了，请一两个小时后再打给我”并不是一个可以接受的回答，所以你必须将所有内容保持分离。


    好消息是，在 Git 中创建分支成本很低。你可以随心所欲地创建任意数量的分支，而不会给你或同事带来任何麻烦。更棒的消息是，正如你在创建 Github Jobs
    项目或查看 Xcode 中那个大大的“源代码控制”菜单时可能已经注意到的，Xcode 直接内置了 Git 支持。


    在过去，Xcode 只支持 Subversion 和 CVS。尽管前者仍然存在（尽管由于 Git 和 Mercurial 等分布式版本控制系统（DVCS）的出现，它已经显得有些过时），而后者则明显是版本控制黑暗年代遗留的产物。


    Git 是一种非常流行的版本控制系统，它以分布式方式工作。这意味着与 SVN 的工作方式相反，项目的每一个工作副本都可以被用作远程仓库，甚至更好，可以独立工作。


    为了向你展示将 Git 深度集成到 Xcode 项目中是多么有用，我们来破坏它。没错，让我们创建一个非常简单的冲突，看看会发生什么。在版本控制系统的世界里，冲突是指合并文件的两个版本变得不可能的情况。如果你在要合并的两个分支中，以不同的方式修改了同一个文件的同一部分，那么
    Git 将无法自动合并它们，需要人工介入。


    在 Xcode 中，从“源代码控制”菜单中选择“Github Jobs – master”，然后选择“新建分支...”。在弹出的字段中，将分支名称字段填写为
    `"saying-hi"`，然后点击“创建”。


    此过程结束后，你将在一个专门用于“Saying Hi”功能的分支上工作。


    这意味着你的应用将继续演进，同时一个稳定版本（master 分支）仍然存放在某处。


    现在，打开 `AppDelegate.m` 文件，并添加一条简单的 `NSLog` 指令，在应用启动完成时向用户问好：


    ```

    #import "PCSAppDelegate.h"


    @implementation PCSAppDelegate


    - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *) launchOptions


    {


    NSLog(@"Hi, I''m a sample application for a book.");


    return YES;


    }


    @end

    ```


    实现这个问候语后，打开“源代码控制”菜单，选择“提交...”。在出现的表单中，输入一条简单的提交消息，例如“在应用启动时问好”，然后点击“提交 1 个文件”按钮。现在你已经在这个功能分支上进行了第一次提交。


    要创建一个冲突，文件必须在不同分支的相似位置被修改过，所以我们需要回到 master 分支，创建一个与我们刚刚所做的类似的提交。


    从“源代码控制”菜单中，选择“Github Jobs – saying-hi”，然后选择“切换到分支...”。


    在出现的列表中，选择 master 分支，然后点击“切换”。现在我们已经回到了 master 分支，我们之前添加的 `NSLog` 指令已经不在了。


    让我们在仍然处于 master 分支的情况下，用一条略有不同的问候消息重复这个过程。


    我们选择使用“Hi, I''m a book created for a sample application”，这确实意义不大。像之前一样提交你的修改。现在我们有了两个分支，它们都在同一个文件的相同位置有一条略有不同的问候指令。


    最后，从“源代码控制”菜单中，选择“Github Jobs – master”，然后选择“从分支合并...”。在出现的列表中，选择 `"saying-hi"`，然后点击“合并”：将会出现一个类似于图
    2-4 所示的窗口。选择屏幕底部菜单中的第三个按钮以集成右侧的修改，然后点击“合并”。


    **图 2-4.** Xcode 已检测到冲突并将帮助你修复它


    这基本上就是冲突的工作原理，也是 Xcode 如何协助你修复冲突并保持项目清洁的方式。然而，有时冲突会发生在 Xcode 之外，因为你决定使用命令行来合并分支，或者因为你开始使用专用的
    Git 客户端。


    这就是 Xcode 能够理解的情况。当这种情况发生，并且你的一些文件被奇怪的字符弄得面目全非时，构建你的应用可能只会抛出一些随机的语法错误，然后让你自己去寻找构建失败的原因。Xcode
    比这聪明得多。实际上，除非冲突被你使用 shell、你喜爱的 Git 客户端，或者直接在 Xcode 中手动标记为已解决（如图 2-5 所示），否则你甚至无法构建你的应用。


    **图 2-5.** Xcode 已检测到冲突文件，并在侧边栏和主编辑器中将其标记出来


    要修复此冲突并将其标记为已解决，请编辑 `AppDelegate.m` 文件，直到它看起来令你满意为止。


    在我们的例子中，就是只保留一个 `application:didFinishLaunchingWithOptions:` 方法，并选择第二条消息。你必须删除所有冲突标记，即那些包含多个尖括号和等号的行，这样你的应用才能再次构建。毕竟，在此上下文中，它们不过是语法错误。完成后，只需右键单击冲突文件，然后在“源代码控制”菜单项中选择“将选定文件标记为已解决”。


    Xcode 中的版本控制并非总是美好和完美的。使用 Apple 的文件格式（如 `xcodeproj` 文件，甚至 `xib` 和 `storyboards`）会带来一些边缘情况。在
    Xcode 5 中，Apple 为这些 Interface Builder 文件带来了一种更简单的文件格式，使得合并操作和冲突解决变得容易得多。从 NIB
    到臃肿的 XIB，再到几乎可读、体积缩小十倍的 XIB，Apple 确实在努力简化这一过程。再一次，我们已经走了很长的路，尽管我们仍在等待那些 `xcodeproj`
    能有更简单的文件格式，它目前仍然使用一种老式的基于大括号的格式来划分配置层次结构。

