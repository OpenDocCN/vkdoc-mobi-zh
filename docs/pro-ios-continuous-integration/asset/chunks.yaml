    **CHAPTER 5: Automatic Builds with Jenkins**


    Managing Provisioning Profiles and Private Keys


    In this chapter, we’ve been building and code signing applications multiple times
    and there is one final thing we haven’t covered: what should we do about our provisioning
    profiles and private keys?


    The usual answer is simple: there is no magic solution. The provisioning profiles
    are stored in your Library folder, and you can find them with this simple command:


    $ ls -l /Users/Palleas/Library/MobileDevice/Provisioning\ Profiles


    -rw-r--r-- 1 Palleas staff 15799 4 Apr 11:22 0255A8B8-3DD3-4893-8E6E-9F6664DF89B5.mobileprovision


    -rw-r--r-- 1 Palleas staff 14153 26 Dec 17:06 05A46FE9-236E-4B40-8625-57A857155A7F.mobileprovision


    -rw-r--r-- 1 Palleas staff 15775 4 Apr 11:22 10F8378B-6638-4A94-AB4B-E505BF562DA9.mobileprovision


    -rw-r--r-- 1 Palleas staff 15757 4 Apr 11:22 18E20B0C-9446-4A68-A4F2-3483D02624E2.mobileprovision


    -rw-r--r-- 1 Palleas staff 15846 4 Apr 11:22 1F908F91-7B22-4B31-8629-7D286FE20ECD.mobileprovision


    -rw-r--r-- 1 Palleas staff 15787 4 Apr 11:22 1FA4FB89-845B-43B9-98DC-07A26B5F3920.mobileprovision


    ...


    The private keys are stored in the keychain and we’ve already used the security
    command line tools for some basic keychain manipulation but there are other keychain-related
    methods we haven’t covered. You could probably manipulate the keychain on the
    computer that is running your builds via SSH and install provisioning profiles
    the same way.


    The thing is, even Apple has made huge progress with the management of code signing
    identities, it remains a complex concept that could be easily solved by plugging
    a screen into your building computer once and running Xcode manually the first
    time you want to build an app, making sure everything works smoothly. Once again,
    there is no silver bullet but we are slowly getting there.


    Where Do We Go From Here?


    Congratulations, you’ve set up a pretty decent continuous integration platform.
    For now, it doesn’t do much but in the chapters. We’ll use it to deploy the application
    over the air and update the build process to have a more detailed feedbacks with
    unit tests and quality assurance tools.


    Summary


    This chapter was about giving you a tour of the most used continuous integration
    platform in the world. Now, you will be able to detect if a coworker forgot to
    check the “Copy Items into Destination’s Group” checkbox when he tried to import
    a new framework into the project (although he or she should have used Cocoapods).
    We hope you’ve understood by now why a neutral building platform is important
    and what you need to do to keep it useful for your team.


    The next chapter will cover an alternative solution made by an Australian company
    called “Atlassian”


    Bamboo.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter


    Automated builds with Bamboo


    In the previous chapter, we talked a lot about Jenkins, the open source automated
    build platform.


    Even if it comes with some issues and weird behaviors, we really hope that at
    the end of the chapter you realized what a great platform it actually is. We’ve
    showed you how easy it is to get it started and described the benefits of having
    one at home. The question you might me asking yourself right now is “why do we
    need another one?” That’s a good question but before we answer it, let’s make
    one thing clear: this book does not aim to promote Bamboo over Jenkins. This is
    a simple introduction to how Bamboo will help you in your day-to-day work as an
    iOS developer.


    Bamboo is a commercial product created by an Australian company named Atlassian,
    also responsible for products like Confluence and, of course, Jira. If you’ve
    already been looking for a bug tracker, you’ve probably run into Jira at least
    once and may be using it at your company. If that’s the case, then you will be
    happy to know that Bamboo is deeply integrated with Jira, making it super easy
    to create issues from a failing build, for example.


    What is a good enough reason to switch from a free, open source platform to a
    paying, semi-proprietary one (some of the components are open-source and sources
    are available for you to hack with the right license)? To be honest, we are not
    here to give you a reason; we’re here to tell you about a different approach Atlassian
    took when they started working on Bamboo.


    At the end of this chapter, we really hope that we will have given you a good
    look into Bamboo and that you will be able to choose which solution works best
    for your company.


    The previous chapter was kind of a journey that helped you discover Jenkins and
    the wonderful world of continuous integration platforms. Now that you know everything
    there is to know to get started, we will use a lot less naïve approach with Bamboo
    and will try to go as straight as possible to the point: building the Github Jobs
    iOS application using the bash script we’ve been working on for the past three
    chapters. To do that, we will probably have to make some references to the way
    Jenkins works.


    **93**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **94**


    **CHAPTER 6: Automated builds with Bamboo**


    Getting started with Bamboo


    If you were expecting software based on a less-bloated platform you will be disappointed:
    Bamboo is written in Java. If you’ve been playing with Jenkins as we did in the
    previous chapters, chances are you will be able to install and configure Bamboo
    on your computer: Bamboo only requires a valid Java environment.'
