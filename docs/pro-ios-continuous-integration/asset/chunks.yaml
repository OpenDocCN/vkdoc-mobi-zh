    NSURLSessionDataTask *jobTask = [[NSURLSession sharedSession] dataTaskWithURL:
    url


    completionHandler:^(NSData *data, NSURLResponse *response, NSError *error) {


    // ...


    **[SVProgressHUD showSuccessWithStatus: [NSString stringWithFormat: @"%lu jobs
    fetched",** **(unsigned long)[self.jobs count]]];**


    }];


    When you run your application, you should see the HUD in both situations, similar
    to Figure [2-7.](#index_split_000.html#p23)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


