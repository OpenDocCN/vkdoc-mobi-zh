- fmt: "# Chapter 7: Over-The-Air Distribution\n\nThe goal of this chapter was to\
    \ give you a tour of an alternative to `Jenkins`, because nothing is more dangerous\
    \ than sticking with your favorite toys without looking at the alternatives. Once\
    \ again, we didn’t want to tell you that one was better than the other; in fact\
    \ both solutions come with pros and cons. By now, you should be able to choose\
    \ which solution suits you best.\n\n`Bamboo` is a full-featured product maintained\
    \ by a profitable company that comes with a nicely designed interface, powerful\
    \ add-ons, and well-organized build plans.\n\nThis book will also cover the new\
    \ tool released by Apple to set up continuous integration for your project but\
    \ because you probably need a break from building platforms, the next chapter\
    \ will cover an equally important part of the build process: Over The Air deployment!\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## Over-The-Air Distribution\n\
    \nIn the previous chapters we covered how to build the application manually or\
    \ by using the continuous integration platforms `Jenkins` and `Bamboo`. We mentioned\
    \ earlier that the question that usually follows a successful build is whether\
    \ or not to send it to your quality assurance team.\n\nNo matter how many tools\
    \ you’ve added to your build process (automated testing, static code analysis,\
    \ etc.) you will still need feedback from actual users to know if your application\
    \ is ready to be released. In this chapter we will talk a little bit about Over\
    \ The Air (OTA) distribution and how people decided to create a business based\
    \ on a product that would ease the process of distributing applications. Then,\
    \ we’ll integrate with one of these services: `TestFlight`. Finally, we’ll see\
    \ how it actually works and develop our own, homemade, continuous integration\
    \ platform.\n\n### What is Over The Air Distribution?\n\nDistributing software\
    \ is an old problem developers had to solve years ago and is not limited to mobile\
    \ applications. There was a time that the problem faced when releasing new or\
    \ updated software was how to ship a few thousand CDs containing the software\
    \ for users to install. With the advent of the Internet, the problem of distributing\
    \ mobile applications became how to distribute these applications via Wi-Fi or\
    \ cellular network. In the end, OTA is simply a fancy term referring to the way\
    \ the application is distributed.\n\n### What Does It Have to Do With Continuous\
    \ Integration?\n\nA common misconception with continuous integration is thinking\
    \ it is solely about building an application every day or so and releasing beta\
    \ versions when it’s ready. That is not continuous integration but actually continuous\
    \ delivery. As we’ve shown in the previous chapters, it’s a more complex process.\n\
    \nThat being so, the concept of continuous integration is never far from the one\
    \ of distribution because being able to release a build of your application and\
    \ retrieve feedback from the users is yet another feedback helping you to decide\
    \ if you should integrate a feature or a bugfix, or not.\n\n**117**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**118**\n\n**CHAPTER 7: Over-The-Air distribution**\n\n### iOS App Distribution:\
    \ A Valid Business Model\n\nAs mentioned in previous chapters, releasing an iOS\
    \ application is a complex process. Code signing the application and using the\
    \ proper provisioning profile is a task most of the iOS developers struggle with.\
    \ It took a long time before Apple actually started providing a way of releasing\
    \ beta versions of your application without using the App Store. At the time of\
    \ writing this book, distributing beta versions via Apple is still in beta. Of\
    \ course, you can always install the application manually on your testers’ device,\
    \ but you don’t want to be that guy.\n\nWith the release of iOS 4, Apple introduced\
    \ Ad-Hoc provisioning profiles that allow you to install applications on an iOS\
    \ device without the help of `Xcode`. An Ad-Hoc provisioning profile is pretty\
    \ much similar to a standard distribution profile you use to submit your application\
    \ on the App Store.\n\nThe main difference is that it contains the unique device\
    \ identifier (UDID) of all the devices allowed to run the application. At this\
    \ time, you can register up to 100 device identifiers, including your own.\n\n\
    That’s usually enough to send your application to a small number of testers, but\
    \ these slots have to be used carefully: you can only remove a device id once\
    \ a year, when your Apple developer account is renewed.\n\nOnce you’ve generated\
    \ your Ad-Hoc distribution profile (we’ll come back to that part later), it is\
    \ actually possible to install an iOS application on a device without plugging\
    \ it into a computer, simply using a webpage. After all, that’s what the App Store\
    \ application on your device does. To do that, all you need is a server and a\
    \ couple of files accessible from your iPhone’s browser. Additionally, you probably\
    \ don’t want your website to be “free for all” and let anybody download your application,\
    \ you will need a security layer. All of this will take you time and knowledge\
    \ you don’t necessary have nor do you want to learn it. This is how third-party\
    \ services were born.\n\n[TestFlight (testflightapp.com)](http://testflightapp.com/)\
    \ and [HockeyApp (hockeyapp.net)](http://hockeyapp.net/) are services that were\
    \ born out of the need to ease this process for developers and beta testers. Create\
    \ an account, build your application with the proper provisioning profile, and\
    \ that’s it. The authorized users are ready to download beta versions of your\
    \ application. Both services used to work for the Android and iOS platforms but\
    \ in February 2014, Burtsly, the company behind `TestFlight`, was acquired by\
    \ Apple, who removed the support for the Android platform.\n\nSince Apple made\
    \ `TestFlight` the encouraged way of distributing beta versions of your application\
    \ by acquiring it, we will be using it to release a beta version of the Github\
    \ Jobs for iOS application.\n\n### Distributing the App Using TestFlight\n\nThe\
    \ next part will be about distributing a build manually using `TestFlight`. If\
    \ you’re already familiar with the service, you will probably not learn anything\
    \ new. Feel free to jump to the next section where we’ll submit the build automatically\
    \ via `Jenkins` and `Bamboo`, before writing our very own simple distribution\
    \ platform!\n\nVisit `TestFlight`’s registering page ([https://testflightapp.com/register/](https://testflightapp.com/register/))\
    \ and create an account, we will need it later when we have a functional build\
    \ we want to send to our users. First, let’s create an Ad Hoc provisioning profile\
    \ and use it to package our Github Jobs for iOS application.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 76](index-121_1.jpg)\n\n**CHAPTER 7: Over-The-Air distribution**\n\n\
    **119**\n\nTo do that, gather a few unique device identifiers from your team or\
    \ your testing devices and add them to Apple’s developer portal, then:\n\n1. \
    \ In the left menu, select the “Distribution” link under the “Provisioning Profile”\
    \ section and then clink on the plus sign at the top right of the screen. Chances\
    \ are you’ve already visited this section to generate a Development provisioning\
    \ profile or a distribution one to submit your application on the App Store. This\
    \ time though, select the “Ad Hoc” distribution and press the “Continue” button.\n\
    \n2.  Select your application identifier, in our case that would be something\
    \ like `UBSUPPBORX.com.perfectly-cooked.github-jobs`. Press the continue button.\n\
    \n3.  From the list that appears, check the list of iOS device you want to distribute\
    \ the application to, as shown in Figure [7-1](#index_split_002.html#p121).\n\n\
    ***Figure 7-1.** The beta version of the iOS application will be sent to four\
    \ beta testers* \n\nThat’s the kind of process you should do very carefully. Remember\
    \ that a) you’ve a limited number of slots and b) every time you want to add a\
    \ new beta tester, you have to update your provisioning profile and generate a\
    \ new build."
