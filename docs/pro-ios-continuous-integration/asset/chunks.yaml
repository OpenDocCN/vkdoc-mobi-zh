    few minutes. From creating the project, to building it using a bot as well as
    hosting it on the OS X Server.


    If you try to start an integration now the errors related to Cocoapods should
    no longer happen and be listed under the list of resolved issues, as shown in
    Figure [8-10](#index_split_002.html#p156).


    ***Figure 8-10.** The integration succeeded and the errors we had the in previous
    integration are marked as resolved*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **156**


    **CHAPTER 8: Day-to-day use of Xcode bots**


    When we used Jenkins or Bamboo to build the application, both platforms had in
    common the ability to restrict the build to a specific branch of the application.
    We haven’t seen this feature with the Xcode Bot, but that does not mean it’s not
    there.


    When you create a bot from Xcode, it will retrieve the name of the branch your
    project currently uses and restrict the Bot to this specific branch. If you want
    to change the name of the branch, you’ll have to edit the Bot from the log panel
    and without changing anything, simply click your way through the few steps of
    the process. We’ll admit that this is not a very good process but that’s only
    because Xcode has limited control over the parameters of a Bot. The Xcode integration
    is meant to be very simple process: you are working on a feature and want to know
    if you’ve broken anything. Once your feature is done, delete (or update) the Bot
    and move on.


    To be honest, you could probably not find a worse name than Klaus for your bot;
    we’ve only used it so we have a reason to change it later. You should always use
    self-explanatory names so you can quickly know their purpose. For example, our
    bot should probably be named “Github Jobs (Nightly)”, that would make more sense
    and be easier to find in the list of bots. To do that, as well as to change the
    branch the integration will be run on, simply go back to the setting panel using
    the gear button at the top right of the screen we used earlier to add a pre-integration
    trigger.


    The only way to have better control over your OS X server continuous integration
    platform is to use a different interface that communicates directly with your
    server: the web interface. Since we’ve covered pretty much everything there is
    to know about the bots, Xcode side, let’s move on to the web interface. Note that
    in Xcode 5 there was a way to edit directly a Bot’s settings from the web interface
    but as of the latest beta of the Xcode server, this feature seems to be gone.


    Managing the Xcode service from the web interface


    OS X server’s web interface to the Xcode service is available through a URL composed
    of the name of your computer on the network, in our case that would be romain.local
    followed by the path component “xcode”, which gives us: http://romain.local/xcode.
    You can guess the URL by yourself or, from the OS X server Xcode service panel,
    click on the “View bots” button at the bottom of the screen. You can also click
    on the settings wheel at the top right of the Xcode screen and select “View Bot
    in browser”. Of course, this last solution will open the details about a bot,
    not the


    “homepage” of your Xcode service.'
