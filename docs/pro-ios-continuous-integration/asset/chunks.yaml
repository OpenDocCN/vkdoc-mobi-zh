    **CHAPTER 8: Day-to-day use of Xcode bots**


    ## Downloading the latest version of the application


    The final piece missing from our installation here is to be able to download the
    application and install it on testing devices. Navigate to the “Archives” tab
    where you should see a list of the packages application that was created at the
    end of each successful integration. Every time, both the archived version of the
    project and the generated `IPA` file were retrieved and stored here, like we’ve
    been doing with `Jenkins` and `Bamboo`. Only this time, the process is automatic
    since it knows exactly what pattern of file to look for.


    If you click on one of the “Product” links from a desktop computer, you will be
    able to download it so you can, for example, upload it to a third-party distribution
    platform like `Testflight`. After all, you don’t want to give access to your `OS
    X Server` to all of your beta testers. On the other end, if you try to click on
    this link from an iOS device, you will actually be able to download this application
    and run it on your device! That’s the kind of advantages that come with a continuous
    integration platform dedicated to one technology. In our case, that’s `Xcode`
    projects.


    ## Using the big screen feature to get live feedback


    We mentioned earlier that the crucial part of a continuous integration platform
    was being able to get instantaneous feedback to know if you’ve broken your application
    or if you’re hurting the product in any way. That’s why both `Jenkins` and `Bamboo`
    come with solutions to display the current status of an installation. `OS X Server`
    and its `Xcode` service are now different. If you click on the first icon in the
    menu at the top of the screen, it will open the “Big screen”, a web page dedicated
    to, well, big screens such as TVs. As shown in Figure 8-13, this interface will
    automatically update to show the details on the latest integrations.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 100](index-160_1.jpg)


    **CHAPTER 8: Day-to-day use of Xcode bots**


    **159**


    ***Figure 8-13.** The “big screen” mode provides a more suitable way to display
    results about builds*


    ## Summary


    It took a while but Apple is finally stepping up to the world of continuous integration.
    Even if we are still far from a tool capable of replacing our installation of
    `Jenkins` or `Bamboo`, it really shows the advantages of using a tool dedicated
    to a platform. Forget about scheme sharing and complex processes to get a nightly
    build, with `OS X Server` and the `Xcode` service, you’re a couple of clicks away
    from creating a project, hosted on your server automatically building every time
    you push a commit to your remote.


    We’ve showed you how to install and get started with `OS X Server` and how to
    be able to use it even if you’re not working the way Apple suggests by using your
    own provisioning profile and relying on a third-party tool to manage your dependencies.


    We haven’t covered all the features provided by this tool, it is in fact also
    capable of running your test suites and that’s exactly what the next chapter will
    be about.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # Chapter 9: Adding Unit testing to the mix


    We are approaching the end of this book, which means you should have learned a
    few things about continuous integration by now. We’ve covered the major solutions
    to setting up a continuous integration environment: The free and open-source solution
    that is `Jenkins`; the enterprise one with an opinionated workflow that is `Bamboo`;
    and finally the official one, the `Xcode Bots`. It will take some time before
    the `Xcode Bots` become the de-facto solution for continuous integration of `Xcode`
    projects, but the previous chapter showed that we are slowly getting there.


    Although we covered a few different solutions, in the end all we did was build
    the application.


    Of course we also had to fetch the latest version of the source and install the
    dependencies while making sure the keychain was accessible so we could codesign
    the application. As complex as this process may be, it’s only a small part of
    the feedback that can provide a continuous integration platform. An application
    that builds properly doesn’t mean an application that works as expected.


    This chapter will cover another kind of feedback that can help you detect that
    your application doesn’t work as it should: automated unit testing.


    The first part will be about automated testing, what it is and it is important.
    Even if automated testing is not the core topic of this book, most people only
    see the time-consuming part of writing tests and when a project’s deadline starts
    to look difficult to meet, they usually are the first things to go. Then, we’ll
    go deeper into the subject and write our first unit tests for the Github Jobs
    for iOS application, talk about how they work, best practices, and how to run
    them. More importantly, we’ll cover how to run them from the command line so we
    can make them a part of our continuous integration process, along with the one
    that builds the application.


    ## Automated Testing


    In the software world, automated testing is the use of a dedicated tool that can
    repeat a predefined number of testing scenarios. For each scenario, the resulting
    outcome is compared to the expected one. If they are equal, then the test is marked
    as passing. If they are not, the test is marked a failed.


    The main advantage of most of the available testing tools is to be able to re-run
    failed test cases until “all is green”.


    **161**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **162**


    **CHAPTER 9: Adding Unit testing to the mix**


    ### Reasons to test


    There are many reasons to test, the most obvious one being that you need to make
    sure everything works as expected. It doesn’t matter which kind of test you are
    writing, this is a common pattern for all of them: starting with a couple of initial
    parameters, apply a few specific modifications to those parameters, and make sure
    the final outcome matches the expected one. In the case of unit testing, it would
    mean comparing the result of a method invoked with specific parameters to a final,
    fixed value.'
