    change its name to simply “Github Jobs”. Navigate to the “Schedule” step, check
    the “Perform analyze action” and press “Save”. Press “integrate” to manually start
    the Xcode bot and wait until it’s over. As you can see in Figure [10-2](#index_split_003.html#p189),
    a bug has been found, but the analysis did not fail the build because of it.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


