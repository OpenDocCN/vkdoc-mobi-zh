    ## About the Author


    **Romain Pouclet** is a developer living in Montreal with his girlfriend and two
    cats. He previously lived in France where he studied computer science and mobile
    development. He has worked on various kinds of projects, from websites to rich
    interface and mobile applications. He currently works as an iOS developer for
    a Canadian company while learning how to walk a Slackline.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 118](index-211_1.jpg)


    ![Image 119](index-211_2.jpg)


    ## About the Technical Reviewers


    **Scott Gardner** is an enterprise iOS app architect, developer, and consultant.
    He resides in the Midwest with his wife and daughter.


    **Abigail Goodwill** is a student at the University of Colorado Colorado Springs.
    She is studying English with a concentration in Literature, as well as Computer
    Science. She is an aspiring novelist who spends a great deal of her time writing
    stories and training Mixed Martial Arts. She one day hopes to publish a *New York
    Times* bestseller.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 120](index-212_1.jpg)


    ## About the Technical Reviewers (continued)


    **Felipe Gutierrez** is a software architect, with a bachelors and master degree
    in computer science from Instituto Tecnologico y de Estudios Superiores de Monterrey
    Campus Ciudad de Mexico. With over 20 years of IT experience, during which time
    he developed programs for companies in multiple vertical industries, such as government,
    retail, healthcare, education, and banking. Right now, he is currently working
    as a senior consultant for EMC/Pivotal, specializing in the Spring Framework,
    Groovy, and RabbitMQ, among other technologies. He works as a consultant for big
    companies like Nokia, Apple, Redbox, and Qualcomm, among others. He is also author
    of the book: Introducing Spring Framework, from Apress.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Acknowledgments


    When Apress gave me the opportunity to write a book about continuous integration
    in iOS, I was both excited and scared at the same time. Excited because writing
    a book has been in the back of my mind since I started working as a technical
    reviewer in 2008. Scared because when I started gathering all the things I wanted
    to talk about in this book, I realized I had underestimated the amount of work
    that it would require. But then again I had the chance to work with awesome people.


    I’d like to thank all the people at Apress that were here to help me write this
    book. Now that I think about it, using “we” when I speak to you in this book is
    not simply an educational thing: I really wasn’t alone writing this book. First,
    a big thanks to Louise Corrigan who was my very first contact with Apress, she
    really was the one that bootstrapped the whole thing, starting with making my
    proposal pretty. Thanks a lot to Michelle Lowman who then stepped in and took
    this project to the next level and always stayed on alert while the WWDC was approaching
    at the same time than my deadline for the first chapter about the Xcode bots.


    I couldn’t have done this without my day-to-day contacts who kept the whole thing
    organized: Douglas Pundick, who caught a huge number of unclear sentences and
    other misuses of style and Kevin Walter, who I discovered, rooted for the enemy
    as the frenzy of hockey you can only find in Canada started to rub off on me.
    Thank you both for providing the tools, help, and encouragement when needed.


    The technical editors that were picked to work on this project, Scott Gardner,
    Abby Goodwill, and Felipe Gutierrez should be proud of the quality and the usefulness
    of the feedback they provided me with. Thanks you all for being here, you were
    my safety net.


    I also would like to thank my company, TechSolCom, who gave me the opportunity
    to play with a lot of great toys, as they trusted me with the continuous integration
    of all our iOS projects.


    I want to thank Marc Weistroff who was here when all this started and, as I was
    one more time complaining about Jenkins, made me understand that there is a lot
    more than meets the eyes. He also provided great support when I wondered if I
    really was up to this challenge.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Acknowledgments (continued)


    Further thanks go to Benjamin Hubert, my friend of many years who supported me
    for the past three months, as I kept him posted of my progress in the middle of
    all those GIFs posted on IM. Thanks a lot for the support and looking forward
    to be your best man!


    Last but not least, I want to thank my girlfriend Camille for her patience during
    those past months while I was here but not really here, writing on my laptop 3
    meters from her. She kept me working at this continuously and I couldn’t thank
    her enough for getting me back on track when needed.


    Here’s to many more years by your side, and then some.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


