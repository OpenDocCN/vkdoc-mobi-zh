    The Github Jobs API is very simple, all you need is calling a specific URL to
    retrieve a JSON-encoded list of iOS job offers in New-York. Using the iOS 7.0
    new NSURLSession API, go back to the implementation file of your view controller
    and fetch content from that famous URL in the viewWillAppear: method as follows:


    - (void)viewWillAppear:(BOOL)animated {


    NSURL *url = [NSURL URLWithString:


    @" [https://jobs.github.com/positions.json?description=ios&location=NY](https://jobs.github.com/positions.json?description=ios&location=NY)"];
    NSURLSessionDataTask *jobTask = [[NSURLSession sharedSession] dataTaskWithURL:


    url completionHandler:^(NSData *data, NSURLResponse *response, NSError *error)
    {


    dispatch_async(dispatch_get_main_queue(), ^{


    if (error) {


    UIAlertView *alert = [[UIAlertView alloc] initWithTitle: @"An error occured"


