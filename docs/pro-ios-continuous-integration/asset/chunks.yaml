    ## Summing up the Bamboo Basics


    Let’s sum up what we’ve just did, because understanding the hierarchy and the
    pieces that click together is important if you wish to use Bamboo as your continuous
    integration platform. We created a plan for the Github Jobs for iOS application,
    part of the Github Jobs project. In this plan, a default stage containing a default
    job was automatically created. We customized this default job with multiple tasks:
    fetching the content from our git repository, installing the dependencies using
    Cocoapods and building the application using `xcodebuild`.


    Once again, if there is something to remember it’s that you should not be using
    plugin for critical parts of your build. In this particular situation, the Xcode
    plugin hasn’t been updated for more than a year. Plus, the wrong documentation
    really doesn’t help.


    With that in mind, let’s build our iOS application and package it into a valid
    IPA file. To achieve that, we’ll use the bash script we’ve used in the previous
    chapter, available at `bin/cibuild` in our project.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


