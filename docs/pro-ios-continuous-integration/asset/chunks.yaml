- fmt: '### Figure 2-11. Static code analysis is now enabled for build using the Adhoc
    configuration


    Of course, we are not telling you to avoid quality assurance at all in your projects.
    In fact, Chapter 10 will be dedicated to that subject.


    ## Custom Build Settings


    Having multiple configurations for your application does not only allow you to
    play with the build settings that came with the project. In a real application
    you may want to interact with different web services, such as YouTube, Twitter,
    or even a custom backend. Of course, you don’t want to pollute the live application
    and with the example of Twitter, post a lot of testing tweets on a real account.


    In your different configurations, you will want different endpoints for your web
    services and different security tokens.


    In our case, we will assume we have the source of the application and run multiple
    instances: a local one on our computer, a staging one for testing and review purposes,
    and a live one, located at [http://jobs.github.com](http://jobs.github.com/).


    There is a very simple way of switching between developing tokens and web services
    endpoints.


    One of the settings provided by the compiler and easily editable from Xcode are
    preprocessor macros, which are evaluated at compile time, once and for all. This
    setting is named `GCC_PREPROCESSOR_DEFINITIONS` and can be found in Xcode under
    the `Preprocessor Macros` section. As you will see in Figure [2-12](#index_split_000.html#p28),
    Xcode already declared a `DEBUG` macro, only available in the `Debug` environment
    (and the `Adhoc` one, which is based on `Debug`).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 28](index-28_1.jpg)


    ### Figure 2-12. The debug macro is available for Debug and Adhoc configurations


    In your code, it’s pretty easy to use this information using preprocessor conditionals.
    These conditions will be evaluated during compilation and portions of code will
    actually be compiled and some of them will be ignored. You can use this simple
    trick to handle a debug environment and a production one. For example, in our
    code:


    ```

    - (void)viewWillAppear:(BOOL)animated {

    #if DEBUG

    NSURL *url = [NSURL URLWithString:

    @"https://127.0.0.1:9000/positions.json?description=ios&location=NY"];

    #else

    NSURL *url = [NSURL URLWithString:

    @"https://jobs.github.com/positions.json?description=ios&location=NY"];

    #endif

    }

    ```


    While this solution works despite the fact it will only handle two configurations,
    it has a couple of cons. The most important downside to this solution is the code
    getting more complicated. A few lines back we talked about three configurations,
    so we will need to add a new conditional block using `#elseif`.


    Keeping your code clean has to be your main objective and with this approach,
    the code will get a lot less clear while you keep using this solution for tokens,
    endpoints, and images. What we really need is a way to link a URL endpoint to
    a configuration, and that is easily achievable with Xcode using custom build settings.


    Open the `Editor` menu, then from `Add Build Setting`, select `Add User-Defined
    Setting`. In the cell that will appear, fill in `GITHUB_JOBS_ENDPOINT` and press
    enter. We now have a new build setting, able to contain different values depending
    on the configuration, as shown in Figure [2-13.](#index_split_000.html#p29)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 29](index-29_1.jpg)


    ![Image 30](index-29_2.jpg)


    ### Figure 2-13. Our application now comes with a new build setting dedicated
    to the Github Jobs API endpoint


    Now that this setting is available to us, there are a couple of ways to access
    it within our code. The easiest one is to make it available in your application
    Info property list file and fetch it from there during runtime.


    Open the `Github Jobs-Info.plist` and click on the plus sign that appears when
    you hover the `Information Property List` cell. In the row that appears, enter
    `GithubJobsEndpoint` as the new property’s key, as shown in Figure [2-14](#index_split_000.html#p29).
    Make sure `string` is selected in the type column and use `$(GITHUB_JOBS_ENDPOINT)`
    as the value: the value of this property will be automatically replaced by the
    content of the `GITHUB_JOBS_ENDPOINT` build setting, which may vary across our
    different configurations.


    ### Figure 2-14. The application manifest now contains the URL base on the value
    of the current configuration’s endpoint setting


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 31](index-30_1.jpg)


    The content of this file is available as a property named `infoDictionary` of
    the `NSBundle` class. All we need to do is use it in our view controller, instead
    of the hardcoded endpoint.


    ```

    NSString *endpoint = [[NSBundle bundleForClass: [self class]] infoDictionary]

    [@"GithubJobsEndpoint"];

    NSURL *url = [NSURL URLWithString: [endpoint stringByAppendingString:

    @"?description=ios&location=NY"]];

    ```


    Note that if you try to run the application, you will get an error since you don’t
    really have a server running on your computer and listening for requests on port
    9000. In case you wanted to give it a try anyway, you can easily create an HTTP
    server on your computer, using ruby. To do that, create a folder called `Github
    Jobs Server`. Fetch the JSON response from the GitHub Jobs API and store into
    a `positions.json` file. Then from the command line, start your HTTP server using
    the following command:


    ```

    $ ruby -run -e httpd -- --bind-address 0.0.0.0 --port 9000.

    ```


    It’s okay to feel lost if you are not very comfortable with the command line;
    you haven’t read Chapter 4 yet! We are only talking about this local HTTP server
    for the most advanced of you.


    ## Build Phases


    There is one more feature that will help you called `build phases`. As the name
    would suggest, the build process is split into multiple subtasks. Select the `Github
    Job` top item at the top of Xcode’s file navigator, select the `Github Jobs` target
    and navigate to the `Build Phases` tab. As you can see in Figure [2-15,](#index_split_000.html#p30)
    our project comes with several build phases already.


    ### Figure 2-15. An empty project comes with a few required build steps


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    First, you will find `Compile source` (we are deliberately ignoring the `Target
    Dependencies` build phase), which turns all your implementation files into machine
    code. This is the most important part of the build process. Then, the frameworks
    and libraries you are using are linked into the generated binary, in the `Link
    Binary With Libraries` build phase. Finally, the `Copy Bundle resources` build
    phase copies your resources (images, sounds, etc.), into the final bundle.


    These are the default phases when you create a project, but if you look at the
    build phases in the `Github Jobs` application, you will notice two other phases
    we haven’t talked about. These two phases were added to your project when you
    ran `pod init` and started using CocoaPods. Their goal is to make sure your project
    is up to date with its dependencies, meaning you did not forgot to run a `pod
    install` after you or your coworker added a dependency. The final one copies all
    CocoaPods-related assets into your project. That comes in handy when you use dependencies
    that come with images, sounds, or even if you decided to split your application
    into multiple modules, as CocoaPods can also handle XIB and Storyboard files.'
