    for the first time. If you’re a Java developer with very simple needs. In our
    situation, we won’t need all of these plugins. Only the two SSH related ones will
    come in handy later in this chapter when we’ll talk about building applications
    on remote computers. For something as basic as Git support so that Jenkins can
    clone our project, we will have to install a plugin.


    Tuning Jenkins


    Let’s start with an easy modification. The first time you open the “Manage Jenkins”
    section, you get a message warning you against unprotected installations. If your
    installation of Jenkins is available on a large network - meaning not only listening
    on the local host - anyone would be able to start jobs manually on your behalf
    and access archived, packaged IPA files, for example. Even worse, people would
    be able to create jobs that would execute malicious shell scripts!


    Because that’s probably not what you want, let’s add simple credentials and secure
    Jenkins.


    1\. Go back to the “Manage Jenkins” section and hit the “Setup Security” button


    that appears right next to the scary warning message. You can also click on


    the “Configure Global Security” button if you haven’t dismissed the warning


    message before.


    2\. On the screen that appears, check both the “Enable Security” and “Prevent


    Cross Site Request Forgery” boxes.


    3\. In the block that appeared beneath the “Enable Security”, select the


    “Jenkins’ Own User Database” and select the “Anyone Can Do Anything”


    option. Once again, if you start adding multiple accounts to Jenkins, you


    should consider switching to a dedicated tool such as LDAP.


    4\. Go back and click on the “Manage Users” link, and finally, click on


    “Create User”.


    5\. Enter your username, password, full name and E-mail address, as shown in


    Figure [5-2, and pr](#index_split_001.html#p74)ess OK.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 47](index-74_1.jpg)


    **72**


    **CHAPTER 5: Automatic Builds with Jenkins**


    ***Figure 5-2.** Creating a new user*


    6\. Then, open for one last time the “Configure Global Security” section and


    select the “Logged-in Users Can Do Anything” option instead of the “Anyone


    Can Do Anything”.


    You should be redirected to a login form where you can enter your credentials
    and we should be ready to install the plugins we need.


    At this point, our needs are pretty simple. We need to be able to clone a project
    hosted in a Git repository hosted somewhere on the Internet. For the consistency
    with which the whole application is about, let’s go for Github. The project should
    be available for you to download at the following remote URL: git@github.com:Palleas/Github-Jobs.git.


    To install the git plugins we need, navigate to the “Available” tab of the “Manage
    Plugins” section and search for ”Git Plugin”. You will see only a few results
    including the “Git Plugin” one. Check the checkbox in the first column. Repeat
    the same process for the “Xcode Plugin” and click the “Install Without Restart”
    button, as shown in Figure [5-3](#index_split_001.html#p75).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 48](index-75_1.jpg)


    **CHAPTER 5: Automatic Builds with Jenkins**


    **73**


    ***Figure 5-3.** You can install plugin and start using them right away*


    You can think of the “Install Without Restart” feature of Jenkins as the Windows
    menu to unplug a USB device safely. It would probably be safer to use but nobody
    does it anyway. More seriously, it is a 100% fine to install plugins without restarting
    the whole installation. In fact, it was a feature introduced in version 1.442
    of Jenkins and now, the only time when you’ll need to restart Jenkins would be
    for plugin uninstallation and upgrades.


    There is one more plugin you may want to consider installing called “Green Balls”
    that will show you how extendable Jenkins really is. It may have taken its author
    300 lines of code, but this plugin will show green balls instead of blue ones
    for successful builds.'
  trans: '

    如您所见，Jenkins 在您首次运行 `java` 命令时便已准备就绪。如果您是一位需求非常简单的 Java 开发者。在我们这里，我们并不需要所有这些插件。只有两个与
    SSH 相关的插件会在本章稍后讨论如何在远程计算机上构建应用程序时派上用场。对于像支持 Git 以便 Jenkins 能克隆我们项目这样基础的功能，我们必须安装一个插件。


    ## 调整 Jenkins 配置


    让我们从一项简单的修改开始。首次打开“管理 Jenkins”部分时，您会看到一条警告，提醒您安装环境不受保护。如果您的 Jenkins 安装在大规模网络中可用（即不仅侦听本地主机），那么任何人都可以代表您手动启动作业，并访问存档的打包
    IPA 文件等。更糟糕的是，人们还能创建执行恶意 shell 脚本的作业！


    因为那可能不是您想要的结果，所以让我们添加简单的凭据并保护 Jenkins。


    1. 回到“管理 Jenkins”部分，点击紧邻那条吓人警告信息的“设置安全”按钮。如果您此前尚未关闭警告信息，也可以点击“配置全局安全”按钮。

    2. 在出现的屏幕上，勾选“启用安全”和“防止跨站请求伪造”两个复选框。

    3. 在“启用安全”下方出现的区块中，选择“Jenkins 自有用户数据库”，并选择“任何人可以做任何事”选项。再次提醒，如果您开始向 Jenkins 添加多个账户，应考虑切换到专用工具，如
    LDAP。

    4. 返回并点击“管理用户”链接，最后点击“创建用户”。

    5. 输入您的用户名、密码、全名和电子邮件地址，如图 5-2 所示，然后点击确定。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 47](img/index-74_1.jpg)


    **72**


    **第 5 章：使用 Jenkins 进行自动构建**


    ***图 5-2.** 创建新用户*


    6. 然后，最后一次打开“配置全局安全”部分，选择“已登录用户可以操作任何事情”选项，而不是“任何人可以做任何事”。


    您应该会被重定向到一个登录表单，在其中输入您的凭据，然后我们就可以准备安装所需的插件了。


    此时，我们的需求相当简单。我们需要能够克隆一个托管在互联网上某处 Git 仓库中的项目。考虑到整个应用的一致性，我们选择使用 Github。该项目应可通过以下远程
    URL 供您下载：`git@github.com:Palleas/Github-Jobs.git`。


    要安装我们所需的 Git 插件，请导航至“管理插件”部分的“可选插件”选项卡，并搜索“Git Plugin”。您将看到少数几个结果，其中包括“Git Plugin”。勾选第一列的复选框。对“Xcode
    Plugin”重复相同过程，然后点击“不重启直接安装”按钮，如图 5-3 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 48](img/index-75_1.jpg)


    **第 5 章：使用 Jenkins 进行自动构建**


    **73**


    ***图 5-3.** 您可以安装插件并立即开始使用它们*


    您可以将 Jenkins 的“不重启直接安装”功能视为 Windows 系统中安全移除 USB 设备的菜单。理论上说这样做更安全，但几乎没人会这么做。更严肃地说，不重启整个安装环境来安装插件是完全没问题的。事实上，这是
    Jenkins 1.442 版本引入的功能，现在唯一需要重启 Jenkins 的情况是卸载和升级插件。


    您可能还想考虑安装一个名为“Green Balls”的插件，它会向您展示 Jenkins 的可扩展性有多强。这个插件可能只花了作者 300 行代码，但它会将成功构建的蓝色球体替换为绿色球体。

