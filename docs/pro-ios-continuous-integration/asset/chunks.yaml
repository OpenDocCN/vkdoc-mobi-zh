    page* That’s two continuous integration platforms we’ve covered so let’s run our
    tests one more time using Apple’s continuous integration solution: XCode bots.


    Running tests using an Xcode bot


    We’ve already created a bot whose sole purpose was to build the application and
    archive it later so users can download it. This bot is named “Github Jobs (nightly
    build)” and is run every day at 1:00


    AM. We could simply add the execution of tests to its list of tasks but instead
    we are going to create a new bot that will run the unit tests every time we push
    new commits to the remote repository.'
