    \ one from Jenkins, you won’t fix the builds, and we’ll be back to square one.\n\
    \n**Watching the State of Multiple Projects**\n\nSo far the approaches we’ve covered\
    \ are useful from a developer’s point of view, somebody who can actually do something\
    \ about the failing build. You don’t really want your boss to receive those e-mails\
