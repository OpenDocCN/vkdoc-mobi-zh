    # 在上一章中


    在上一章中，我们不得不管理凭据，以便 Jenkins 能够通过 SSH 连接到从节点，并通过 Java 归档文件与从节点通信。这个解决方案很棒，因为它简单且易于设置，因为你很可能已经能够通过
    SSH 与从节点通信。不过，一个缺点是 Jenkins 必须能够访问你的从节点。在大多数情况下，如果你的 Jenkins 实例在本地运行，或者你已通过某种私有网络将实例配置为
    Jenkins 可以与从节点通信，那么这没有问题。


    另一方面，Bamboo 选择了相反的方法：远程代理将通过 TCP 连接与 Bamboo 的主实例通信。


    # 安装远程代理


    出于安全原因，标准的 Bamboo 安装默认禁用远程代理支持。


    要启用远程代理支持，请转到实例的配置部分，并点击“启用远程代理支持”。如果你担心安全问题，Atlassian 文档中有一个专用页面，该页面也在 Bamboo
    安装的“代理”部分中链接：


    [`docs.atlassian.com/bamboo/docs-055/Security`](http://docs.atlassian.com/bamboo/docs-055/Security)。


    一旦你启用了远程代理支持，点击出现的“安装远程代理”按钮。在被重定向到的页面上，你应该会看到一个下载远程代理安装程序的链接。和 Jenkins 一样，它也是一个
    Java 归档文件。


    从现在开始，我们假设你已经在某处安装了一个远程 Bamboo 实例。如果没有，我们将尽可能详尽地展示 Bamboo 中代理的工作方式。


    首先，下载远程代理安装程序并开始安装过程。


    ```

    $ curl http://bamboo:8085/agentServer/agentInstaller/atlassian-bamboo-agent-installer-5.5.0.jar
    -O

    ```


    ```

    $ java –jar atlassian-bamboo-agent-installer-5.5.0.jar http://bamboo:8085/agentServer

    ```


    运行代理安装程序会下载大量 Java 库，并在一个名为**远程代理主目录**的目录中设置一个远程代理。该目录的默认路径是启动安装过程的用户主目录下的 `Bamboo-agent-home`。你可以使用
    `-Dbamboo.home=/path/to/the/home` 参数覆盖此值。


    Bamboo 代理目录当然会包含有关远程代理的信息，但也会包含 Bamboo 主安装的信息。在 `conf` 目录中，你会找到一个名为 `wrapper.conf`
    的文件，其中包含大量与 Java 相关的设置（例如你愿意为此进程分配的最大内存量），你还会找到有关默认代理的信息，例如其 URL：


    ```

    wrapper.app.parameter.2=http://192.168.2.10:8085/agentServer/

    ```


    首先，这意味着如果你想要调整远程代理的配置，这里就是你进行更改的地方。正如我们所说，你将在这里设置最大内存和其他选项。其次，也是最重要的一点是，这意味一个代理不能用于多个
    Bamboo 实例。如果你曾考虑过让一个远程代理被多个 Bamboo 实例共享，请再想想：它并非为此而设计。


    在此文件夹中，你还会找到一个可用于手动启动远程代理的 Shell 脚本。要使用它，只需运行以下命令：


    ```

    $ bin/bamboo-agent.sh –h

    Usage: ./bamboo-agent.sh { console | start | stop | restart | status | dump }

    ```


    控制台模式会启动远程代理，使其连接到 Bamboo 主安装，更重要的是，它会将进程保持在前台，因此这足以用于测试目的。


    你最终需要设置一个已启动的进程，就像我们之前为 Jenkins 和 Bamboo 所做的那样，以便随计算机启动远程代理。这是 Bamboo 所选方法的一个缺点：对于
    Jenkins，由于主节点会连接到从节点，因此可以在需要时轻松唤醒从节点。


    使用以下命令启动进程：


    ```

    $ bin/bamboo-agent.sh console

    Running Bamboo Agent...

    Removed stale pid file: /Users/Palleas/bamboo-agent-home/bin/./bamboo-agent.pid

    STATUS | wrapper | 2014/05/13 20:21:46 | --> Wrapper Started as Console

    ...

    ```


    现在我们已经有了一个连接到主安装的远程代理，如图 6-11 所示，是时候配置代理并使用它来构建应用程序了。


    ![Image 73](img/index-117_1.jpg)


    ![Image 74](img/index-117_2.jpg)


    **图 6-11.** 一个名为“Mac Mini”的代理已连接到我们的 Bamboo 主安装


    # 配置代理


    使用远程代理构建应用程序的主要目的与其说是为了扩展持续集成平台必须处理的大量构建，不如说是为了能够使用具有特定能力的代理运行作业。就我们而言，这将是一个具有
    `xcodebuild` 命令的代理。


    点击顶部菜单末尾的“设置”按钮，然后选择“代理…”项。在“远程代理”部分，你应该会看到已设置的远程代理，如图 6-11 所示。


    这张截图截取得有点早，但当你点击“编辑”链接时，你可以为这个代理指定一个名称。就我们而言，我们将其命名为 Mac Mini，因为我们在命名上实在缺乏想象力。


    点击你的远程代理名称。你会在这里看到关于代理的信息，如图 6-12 所示。这里重要的是“能力”部分。“代理特定能力”部分是你添加代理能力的地方。例如，我们想指定我们的构建可以运行
    `xcodebuild` 命令。


    **图 6-12.** 已连接到 Bamboo 主安装的远程代理具有许多能力


    ![Image 75](img/index-118_1.jpg)


    为此，请点击“添加可执行文件”链接，在“类型”字段中选择“命令”，在“标签”字段中填入 `xcodebuild`，在“路径”字段中填入 `/usr/bin/xcodebuild`，然后点击“添加”。你应该会在列表中看到该要求，如图
    6-12 所示。


    你可以根据需要添加任意数量的要求，并且这些要求不必是可执行命令的列表。它们可以是 Java 开发工具包 (JDK) 的版本，甚至是简单的键/值属性。


    # 更新作业以在远程代理上运行


    打开 Github Jobs 应用程序的 iOS 应用程序计划中的“默认作业”配置，并点击“要求”选项卡。在要求列表中，选择我们之前创建的“Xcodebuild”要求，然后点击“添加”。如果一切按预期工作，你应该会看到要求已成功添加，并且确认至少有一个代理能够运行你的作业，如图
    6-13 所示。


    **图 6-13.** 由于我们需要 `xcodebuild`，因此有一个代理能够运行我们的作业


    如果你想知道，是的，我们本可以在要求上更具体一些，因为我们的构建脚本需要 `bash` 等工具来运行，`xcpretty` 来美化输出，以及 `xcrun`
    来打包应用程序，但我们决定保持简单。


    # 总结

