    name. During the life cycle of a project, you will be continuously integrating
    small pieces of software into your project. Then, as the project grows, you’ll
    need to make sure these pieces actually fit the way they are supposed to. It may
    sound like a very metaphoric way of saying you will merge branches using your
    favorite version control system, but that’s actually what happens - no matter
    which tool you will be using or how often you will be integrating code.


    The principle of continuous integration is never far from the concept of “automated
    testing” and


    “Software Quality Assurance” (SQA). Indeed, integrating pieces of software is
    one thing, but making sure they fit - meaning they don’t break your software,
    respect your coding conventions, or hurt the final product in any way - is a whole
    other thing.


    **1**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **2**


    **CHAPTER 1: Introduction to Continuous Integration**


    Apple History 101


    At the time of writing this book, Apple has just released the final version of
    Xcode 5.1\. This 5.0


    version was a pretty big release for Apple. It arrived at the same time that iOS
    7 did, which was a whole new operating system with a completely new paradigm.
    What is even more interesting for us is that Apple finally stepped up in the world
    of continuous integration by starting to promote new tools. We will try to cover
    as many of these tools as we can in the following chapters.


    Of course, the community of iOS developers didn’t wait for Apple to finally make
    a move, and the principle of continuous integration had been advocated for way
    before the first public release of the iOS SDK. In the case of Cruise Control,
    Jenkins, Apache Continuum, etc., it was mostly a matter of adapting existing tools
    to new technologies.


    The first version of Xcode was released in 2003\. More than ten years later, Apple
    has finally started giving us officially supported tools such as the Xcode Bots.
    Needless to say, we have come a long way!


    Pros & Cons


    The advantages of continuous integration are numerous. The most important is the
    immediate feedback you get when working on a part of your application. It may
    be because you broke your test suite or you did not follow your team’s coding
    conventions. It may even be simply because one of the generated reports told you
    that you were writing code that was too complex. In the end, that feedback results
    in considerable time saved and not spent - or even wasted - debugging.


    Equally important is the peace of mind you and your team will get from being able
    to diagnose broken code, bugs, or poor quality code early.


    Finally, integrating a new, significant, portion of code usually means deploying
    a new version of your application that a member of your QA team will need to test.
    When working as part of a team, there is always someone coming to your desk, asking
    you to install the latest version of the application you are working on on his
    device; don’t be that guy! Be the smart one who automated everything.


    Building, automated testing, code coverage… all these concepts are simply a shell
    command execution away; why not let them work for you? As Douglas McIlroy, a well-known
    UNIX contributor said, “What you do today can be automated tomorrow.” That could
    not be more true in the world of iOS development.


    Making a build of your application available for the member of your team, your
    clients, or your boss to download, is complicated. For mobile, it’s actually a
    multi-step process requiring building, code-signing, and finally deploying.


    While we will show in the next chapters that it is totally achievable to do this
    by yourself, some services were born with the purpose of easing that process.
    Testflight, Hockey, or even Cloudbees, to name a few are some of the numerous
    services out there filling the gap. Some are free, some come with a price, some
    are in the cloud, and some are self-hosted, but all of them share the same common
    goal.


    This book does not aim at comparing these services and telling you which one is
    the best. It will not give you an exhaustive list, and it will certainly not turn
    you into an expert in the utilization of the one we chose to talk about.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 1: Introduction to Continuous Integration**


    **3**


    *“There is no single development, in either technology or management technique,*


    *which by itself promises even one order of magnitude [tenfold] improvement within*
    *a decade in productivity, in reliability, in simplicity.”*


    “No Silver Bullet — Essence and Accidents of Software Engineering” - Fred Brooks
    (1986) Of course, all of this is not magic. Being able to receive immediate feedback,
    while a neat advantage, comes at a cost. Setting up a continuous integration system
    takes time. This time is not lost - don’t get us wrong - but that’s something
    you have to take into account. You may not need a full-featured, continuous integration
    platform that builds your app every five minutes when you are working alone on
    a two-screen application. Sometimes, you have to be pragmatic.


    Plus, your tools are only as good as the way you use them. You may not be able
    to take the feedback from your CI platform for granted if you set it up incorrectly.


    The Road Ahead


    Each chapter will try to cover a very specific part of the principle of continuous
    integration for iOS.


    Reading this book is kind of like taking a journey. You will start by learning
    how to build an iOS


    application and release it to your team using the simplest approach, and end with
    a fully set up continuous integration installation. Here is an overview of the
    chapters we will cover together.


    **Chapter 2 - Continuous Integration Tools and Features in iOS and Xcode -** We
    will create a simple iOS application that we will use as an example for our continuous
    integration process, and use it as an example for the rest of the book. In this
    chapter, we’ll see what tools Xcode provides to help you in your day-to-day workflow.


    **Chapter 3 - Using Xcode to Release an Application Outside the App Store -**
    With the application created in Chapter 2, we will see how we can create a build
    that you will be able to send to your testers. This will be the simplest approach
    of all, but you have to start somewhere, right?


    **Chapter 4 - Invoking the Power of the Command Line -** Pressing a bunch of buttons
    is one thing, but knowing what they mean is another. In this chapter, you will
    learn how to leverage the power of the command line and what Xcode actually means
    by “build,” among other things.


    **Chapter 5 - Automating Builds with Jenkins -** Jenkins is probably the de-facto
    solution for continuous integration. You will learn how to get it started and
    how it can build your iOS applications.


    **Chapter 6 - Automating Builds with Bamboo -** Atlassian is an Australian enterprise
    software company that develops products for software developers and project managers.
    One of their products is a commercial alternative to Jenkins. You will learn how
    to get it started and how you can use it to build your iOS applications.


    **Chapter 7 - Over The Air (OTA) Distribution -** Continuous shipping is a bit
    different than continuous integration and usually the final step of a successful
    build process. You will learn how you can make your life and the life of your
    testers easier by sending them new builds of your application as soon as they
    are available.'
  trans: "\n# 排版后的文本\n\n持续集成是一个软件工程原则，其名称本身就非常直观易懂。在项目的生命周期中，你会不断将小的软件片段集成到你的项目中。然后，随着项目的增长，你需要确保这些片段确实能按照预期的方式契合在一起。这听起来像是在用一种隐喻式的方式说，你将使用自己喜欢的版本控制系统来合并分支，但实际上这正是发生的事情——无论你使用什么工具，或者你多久集成一次代码。\n\
    \n持续集成的原则与“自动化测试”和“软件质量保证”（SQA）的概念密不可分。确实，集成软件片段是一回事，但确保它们能契合——意味着它们不会破坏你的软件、尊重你的编码规范，或对最终产品造成任何损害——则完全是另一回事。\n\
    \n**1**  \n[www.it-ebooks.info](http://www.it-ebooks.info/)  \n**2**\n\n## 第 1\
    \ 章：持续集成简介\n\n### Apple 历史 101\n\n在撰写本书时，Apple 刚刚发布了 Xcode 5.1 的最终版本。对于 Apple\
    \ 来说，5.0 版本是一个相当重大的发布。它与 iOS 7 同时推出，而 iOS 7 是一个搭载了全新范式的完整新操作系统。对我们而言更有趣的是，Apple\
    \ 终于向持续集成世界迈出了一步，开始推广新的工具。在接下来的章节中，我们将尽力涵盖尽可能多的这类工具。\n\n当然，iOS 开发者社区并没有等待 Apple\
    \ 最终采取行动。在 iOS SDK 首次公开发布之前，持续集成的原则就已经被倡导了。对于 Cruise Control、Jenkins、Apache Continuum\
    \ 等情况，这主要是将现有工具适配到新技术的问题。\n\nXcode 的第一个版本于 2003 年发布。十多年后，Apple 终于开始提供官方支持的工具，例如\
    \ Xcode Bots。毋庸置疑，我们一路走来，进步巨大！\n\n### 优点与缺点\n\n持续集成的优点众多。最重要的是，当你在处理应用程序的某一部分时，能立即获得反馈。这可能是因为你破坏了测试套件，或者没有遵循团队的编码规范。甚至可能仅仅是因为某个生成的报告告诉你，你编写的代码过于复杂。最终，这种反馈能为你节省大量时间，避免将这些时间花费（甚至浪费）在调试上。\n\
    \n同样重要的是，你和你的团队能够尽早诊断出损坏的代码、bug 或劣质代码，从而获得内心的平静。\n\n最后，集成一个重要的新代码片段通常意味着需要部署一个应用程序的新版本，供你质量保证团队的成员进行测试。当作为团队一员工作时，总会有人走到你桌前，要求你在他的设备上安装你正在开发的最新版本应用；不要做那个人！做一个将所有事情都自动化的聪明人。\n\
    \n构建、自动化测试、代码覆盖率……所有这些概念都只是一条 shell 命令的执行距离；为什么不让他们为你工作呢？正如著名的 UNIX 贡献者道格拉斯·麦克罗伊所说：“你今天做的事情，明天就能自动化。”这在\
    \ iOS 开发领域是千真万确的。\n\n让你的团队成员、客户或老板能够在他们的设备上下载你的应用程序的构建版本，这是一件很复杂的事情。对于移动应用来说，这实际上是一个多步骤的过程，包括构建、代码签名，最后是部署。\n\
    \n虽然在接下来的章节中我们会展示，完全靠自己也能实现这一点，但一些服务的诞生就是为了简化这个过程。例如 Testflight、Hockey 甚至 Cloudbees，这些都是众多填补空白的服务中的几个。有些是免费的，有些是收费的，有些是基于云的，有些是自托管的，但它们都有一个共同的目标。\n\
    \n本书的目的不是比较这些服务并告诉你哪个最好。它不会提供一份详尽的列表，当然也不会让你成为我们所选择要讨论的服务的专家。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\
    \  \n**第 1 章：持续集成简介**  \n**3**\n\n> *“在技术或管理技巧中，没有哪一种单独的发展能够在一代人的时间里，将软件在生产力、可靠性和简洁性上提升一个数量级（十倍）。”*\
    \  \n> “没有银弹——软件工程中的本质与意外” - 弗雷德·布鲁克斯 (1986)\n\n当然，这一切都不是魔法。能够立即获得反馈虽然是一个显著的优势，但也需要付出代价。建立一个持续集成系统需要时间。这时间没有白费——请不要误解——但这是你必须考虑的因素。当你独自开发一个只有两个屏幕的应用程序时，你可能不需要一个功能完善的、每五分钟就构建一次应用的持续集成平台。有时候，你必须务实一点。\n\
    \n另外，你的工具只取决于你用它们的方式。如果你设置不正确，你可能无法想当然地接受来自 CI 平台的反馈。\n\n### 未来的道路\n\n每一章都会试图涵盖\
    \ iOS 持续集成原则中一个非常具体的部分。\n\n阅读这本书有点像踏上一段旅程。你将从一个最简单的入门方法开始，学习如何构建一个 iOS 应用程序并将其发布给你的团队，最终以建立一个完整的持续集成环境结束。以下是我们将共同涵盖的各章概览。\n\
    \n**第 2 章 - iOS 和 Xcode 中的持续集成工具与功能** - 我们将创建一个简单的 iOS 应用程序，并将其作为我们持续集成流程的示例，并在本书的其余部分中以此为示例。在本章中，我们将看到\
    \ Xcode 提供了哪些工具来帮助你进行日常开发工作。\n\n**第 3 章 - 使用 Xcode 在 App Store 之外发布应用程序** - 利用第\
    \ 2 章中创建的应用程序，我们将看到如何创建一个可以发送给测试人员的构建版本。这将是最简单的方法，但你总得从某个地方开始，对吧？\n\n**第 4 章 -\
    \ 调用命令行的强大功能** - 按下许多按钮是一回事，但理解它们的含义是另一回事。在本章中，你将学习如何利用命令行的强大功能，以及 Xcode 对“构建”等操作的实际含义。\n\
    \n**第 5 章 - 使用 Jenkins 自动化构建** - Jenkins 很可能是持续集成的事实标准解决方案。你将学习如何启动它，以及它如何构建你的\
    \ iOS 应用程序。\n\n**第 6 章 - 使用 Bamboo 自动化构建** - Atlassian 是一家澳大利亚企业软件公司，为软件开发人员和项目经理开发产品。他们的产品之一是\
    \ Jenkins 的商业替代品。你将学习如何启动它，以及如何使用它来构建你的 iOS 应用程序。\n\n**第 7 章 - 空中（OTA）分发** - 持续交付与持续集成略有不同，通常是成功构建过程的最后一步。你将学习如何让你的生活以及测试人员的生活更轻松——只要新版本的应用程序可用，就立即发送给他们。\n"
- fmt: '# Chapter 8 - Day-to-Day Use of Xcode Server and Xcode Bots


    As we have said, Apple finally released its own continuous integration tools.
    We will teach you how to use them and how you can fit them into your day-to-day
    workflow.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **4**


    ## Chapter 1: Introduction to Continuous Integration


    ## Chapter 9 - Adding Unit Testing to the mix


    Whether you’ve decided to go for the free solution that is `Jenkins`, the enterprise
    one that is `Bamboo`, or a totally different solution we haven’t included, you
    will learn how to automate the execution of your unit and functional testing as
    part of your build process.


    ## Chapter 10 - Quality Assurance


    As the cherry on top, we will show you which tool can be used to maintain high-quality
    code.


    During this journey, don’t hesitate to jump directly to a chapter. You may after
    all want to learn how to use `Jenkins`, but don’t care about how `Bamboo` works,
    and that would be totally fine with us!


    ## Sample Application: Github Jobs


    This book’s goal is not to teach you how to create iPhone or iPad applications
    using `Objective-C` and `Xcode`. To get the most out of this book, make sure you’re
    comfortable with `Objective-C` and `Xcode` first.


    As an example, we will create an iOS application communicating with `Github jobs’`
    API. This application will be a very simple master/detail application. Coding
    the application won’t take long, but be prepared to spend a lot of time configuring
    your project.


    ## Prerequisites


    Make sure you have `Xcode 5.1` installed, as all screenshots in this book will
    use this version specifically. You wouldn’t want to get lost because of an outdated
    `Xcode`, would you?


    Without any further ado, let’s dive in!


    ## Summary


    Continuous integration is a vast notion that can’t be explained in a single chapter.
    It is a complex topic that impacts the technology you choose and the methodology
    you work with. This chapter merely introduced that notion of complexity. Now that
    you know more about the approach we took, let’s start this journey by taking a
    tour of the tools and features available, while we work on the sample application.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # Chapter 2: Continuous integration features in iOS and Xcode


    Continuous integration is a matter of choosing the right tools, and the iOS community
    didn’t wait for Apple before setting up their environments. How could they have?
    It has been known that Apple works in secret and releases all their new tools
    once a year, usually at WWDC. First, let’s have a look at the things that have
    always been around, in `Xcode` specifically or in the community abroad.


    If `Xcode 5` came with a couple of shiny new tools for continuous integration,
    like the `Xcode bots` we will talk about later in this book, the previous versions
    already came with useful integrations to help you get some work done. Even if
    alternatives are getting more and more popular nowadays (for example, `AppCode`),
    and even if there are still people using their favorite text editor and a terminal
    to build the app, `Xcode` remains the de-facto IDE.


    Of course it has its flaws, like the famous website “Text from Xcode,” available
    at [textfromxcode.com](http://textfromxcode.com/), has funnily shown in the past
    few years. No software is perfect, and we as developers tend to take everything
    for granted, but `Xcode` actually handles a lot for you. Let’s see what it can
    do and how it will help us in setting up our continuous integration environment.


    In this book we will be spending a lot of time in `Xcode`. As it wouldn’t make
    sense to give you random screenshots to adapt to your existing application yourself,
    we will create a very simple application using the `GitHub Jobs API`.


    We will start by creating the sample application and taking a tour of what the
    default project template gives us: what the application’s info file is, where
    the unit tests are, and which framework do they rely on. Then, we’ll move on to
    some more advanced stuff like versioning the project using `Git` and managing
    our dependencies using `CocoaPods`, a well-known dependency-manager for `Xcode`
    projects. Finally we will set up everything we need to be ready to release the
    application first to our beta testers and finally to the rest of the world. That
    will give us a great opportunity to cover in depth how `Xcode` will help us to
    manage multiple environments.


    **5**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 17](index-10_1.jpg)


    **6**


    ## Sample application: Github jobs


    [GitHub is a hosting service, available at github.com](http://github.com/), for
    software development projects that uses the Git revision control system. It comes
    with free, paying, and enterprise plans and is very well known in the community.
    Among other services, it comes with a dedicated job offers section for both job
    hunters and companies. If you want to know more about this service, visit [https://jobs.github.com.](https://jobs.github.com/)


    As we said earlier, this book does not aim at teaching you how to code in `Objective-C`.
    Chances are you know enough of it if you’re reading this book. That’s why we are
    keeping the application very simple: it will call the `GitHub API`, retrieve a
    bunch of job offers, and display them in a list using a `UITableView`. Nothing
    fancy.


    ### Creating the Application


    Start by setting up a new iOS project using Apple’s template. Open `Xcode` and
    hit the “Create a new Xcode project” button or, with `Xcode` open, choose “New
    → Project . . .” from the “File” menu.


    Make sure the iOS application templates are selected from the sidebar and choose
    “Single view application,” as seen in Figure 2-1.


    **Figure 2-1.** Selecting the template we want to start working on the application


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 2: Continuous integration features in iOS and Xcode**


    **7**


    Using “Github Jobs” as the product name, “com.perfectly-cooked” as the company
    identifier and “PCS” as the class prefix. It’s the one we’ll use and it will make
    it easier for you to understand the screenshots. The other options don’t matter
    much, just make sure to check the “Create Git repository on . . .” and select
    “My Mac” for now. `Xcode` allows you to use OS X server to host your code, among
    other things, but we will talk about that later.


    ### What Xcode Gives Us


    We are using a standard template given by `Xcode`. It comes with a simple `Storyboard`
    file, an application delegate, and a `UIViewController` subclass. Let’s take a
    look at the things we can use in our day-to-day workflow and how they’ll fit in
    our continuous integration process.


    #### Application’s Info file


    Every application comes with an `Info` file written in the property list format,
    you will find it under the name “MyApplicationInfo.plist” or in our case, “Github
    Jobs-Info.plist.” When you open that file, you will basically find all the public
    information about the application, among other things: The name of the application
    and the product identifier you set earlier when you created the project.


    **Note about property list format:** Property list files are files that store
    serialized objects using the filename extension “.plist,” and thus are often referred
    to as `Plist` files. Because there are all the APIs you need in the iOS and OSX
    SDKs, property list files usually are the de-facto file format to store information
    about an application and other various settings and data.'
