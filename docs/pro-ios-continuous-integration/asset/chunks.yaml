  trans: '

    我们收到了大量错误，因为被分析的不仅是我们自己的代码，还包括来自 `SVProgressHUD` 等第三方库的代码——而你无需为第三方库的代码质量负责。当然，如果在开源代码中发现了明显错误，随时欢迎贡献修复，但这并非关键所在。重要的是，第三方库代码的分析结果与你关联度较低。因此
    `OCLint` 提供了忽略不必要文件夹的选项。在我们的场景中，需要忽略的是 `Pods` 文件夹：


    ```

    $ oclint-json-compilation-database **-e Pods**

    ```


    OCLint 提供多种输出格式：HTML、纯文本、JSON 和 XML 等。你可以通过 `"-report-type"` 和 `"-o"` 参数指定报告类型及保存位置。这些参数属于
    `OCLint` 而非 `oclint-json-compilation-database`，因此我们需要用 `"--"` 将两者分隔。位于 `"--"`
    之后的所有字符都将作为参数传递给生成的 `oclint` 命令。


    要生成如图 10-3 所示的 HTML 报告，请使用以下命令：


    ```

    $ oclint-json-compilation-database -v -e Pods/SVProgressHUD -- -report-type html
    -o oclint_result.html

    ```


    **图 10-3.** HTML 报告显示 OCLint 检测到的错误列表


    报告会像之前提到的那样，显示违规列表及其优先级，同时还会标明文件中的位置，更重要的是，会显示未被遵守的规则（这里由于长行规则，我们收到了大量错误）以及对应的错误信息。


    长行规则具有一定主观性，尤其是在 Cocoa API 的场景下。事实上，`NSBitmapImageRep` 的方法名称长度可达 148 个字符。`OCLint`
    的优秀之处在于，你可以调整某些规则的常量值（例如长行规则）。只需使用 `"-rc"` 选项，并传入属性名称及其值即可。考虑到在巨大的 iMac 屏幕上工作，却因为某行代码长度为
    110 字符（只允许 100 字符）而收到警告，这确实有些荒谬——让我们将限制提高到 120 吧。这样一来，大量警告应该会消失。不过 120 已经是个相当大的数字了，如果之后仍然出现长行警告（图
    10-3 显示确实存在），那么进行小规模重构可能是解决方案。


    ```

    $ oclint-json-compilation-database -v -e Pods/SVProgressHUD -e Xcode/DerivedData
    -e /Applications/Xcode.app/ -- -report-type html -o oclint_result.html -rc=LONG_LINE=120

    ```


    长行规则是典型的、需要根据团队需求自定义的规则类型——因为一旦规则确定，就无需争论：`PCSVIewController` 中那行 140 个字符的代码确实过长，我们应该考虑修复它。


    你可能已经注意到报告中包含 `"Clang Static Analyzer"` 列。这或许能解答你心中的疑问：“既然有了 Clang，我真的还需要 `OCLint`
    吗？”`OCLint` 的目标并非取代 Clang，而是提供关于代码质量的额外反馈。为简化操作，`OCLint` 可以自动调用 Clang 静态分析器，从而只生成一份统一的报告。是否使用
    `"-enable-clang-static-analyzer"` 参数来启用此功能，完全取决于你。


    现在我们已经了解了它的工作原理，接下来将其报告集成到 Jenkins 任务中。


    ## 将 OCLint 集成到 Jenkins


    再次强调，依赖开发者手动运行这类工具并非明智之选——无论有意还是无意，他/她总会忘记运行。因此，我们将把 `OCLint` 集成到 Jenkins 中，以便定期执行静态分析。

    '
- fmt: '/Users/Palleas/Projects/Apress/Github Jobs/Github Jobs/PCSViewController.m


    ```

    <file name="/Users/Palleas/Projects/Apress/Github Jobs/Github Jobs/PCSViewController.m">

    <violation begincolumn="1" endcolumn="195" beginline="56" endline="56" priority="5"

    rule="long line">

    Line with 195 characters exceeds limit of 100

    </violation>

    </file>

    ```


    You already know how to set the format of the report generated by the `oclint`
    command. Simply replace `html` with `pmd` and change the name of the report from
    `oclint_result.html` to `oclint_result.xml` . To keep things clean, we will put
    the report in the build folder.


    From the **Github Jobs for iOS** job configuration, click on the “Add build phase”
    button and select “Execute shell”. Fill in the text area that appears with the
    few commands we mentioned earlier to convert the log from `xcodebuild` to a compilation
    database and call OCLint:


    ```

    $ oclint-xcodebuild "$WORKSPACE/build/xcodebuild.log"

    $ oclint-json-compilation-database -v -e Pods/SVProgressHUD -- -report-type pmd
    –o

    "$WORKSPACE/build/oclint_result.xml" -rc=LONG_LINE=130

    ```


    This will generate a report in the build directory in a format understandable
    by Jenkins. The final step is simply to collect this report so Jenkins can present
    it in a more user-friendly way, using a plugin.


    Even if the PMD format is a really well known format, it’s not natively supported
    by Jenkins. Navigate to the Jenkins configuration section and select the “manage
    plugin” section. Go to the “available” section and look for the “PMD plugin”.
    There are a few plugins capable of parsing and presenting PMD files but this one
    will do just fine. Install this plugin without restarting Jenkins and go back
    to the **Github Jobs for iOS** configuration panel.


    As you may expect, collecting the report will happen in a post-build action. Click
    on the “Add post-build action” and select “Publish PMD analysis results”. The
    rest of the process is nothing we haven’t seen before. The post-build action simply
    adds a pattern to the files to collect, a bit like the one we used to collect
    artifacts. Fill in the “PMD results” field with `**/build/oclint_result.xml` and
    press the “Advanced” button to display some of the power-user features that come
    with this plugin.


    Select the “run always” option. We know that OCLint may fail the build if too
    many errors are detected in your code. When this happens, the reports are generated
    anyway and not collecting those reports would not make a lot of sense. Press the
    “Save” button and start a new build.'
  raw: 'Because Jenkins does not have a clean way of grouping jobs by project, we
    will simply add a new build phase to the existing job that will run OCLint. Before
    we do, remember that we need the output of the xcodebuild command so we can transform
    it into a JSON compilation database file. It would be a waste of resources to
    re-build the application. Let’s update the script we are using to build the app
    to have the log copied into a “xcodebuild.log” file.


    Open the bin/cibuild file and at the end of the xcodebuild command (but before
    the call to xcpretty!) add a call to tee. The command should look like this:


    xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration "$CONFIGURATION"


    CONFIGURATION_BUILD_DIR="$BUILD_DIR" clean build **| tee “$BUILD_DIR/xcodebuild.log”**
    | xcpretty -c Commit this change and push it to the remote repository. We will
    be able to use it in our new build phase, but before we do, let’s talk about a
    new kind of report we haven’t mentioned yet: PMD.


    Originally, PMD is also a static rule-set based source code analyzer, but for
    the Java platform. By now, you shouldn’t be surprised to have yet another tool
    used in a continuous integration platform that comes from Java. Because Jenkins
    understands the format PMD static analysis reports are written in, pretty much
    all languages that come with a static analysis tool provides a way to generate
    reports in this format.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **194**


    **CHAPTER 10: Quality assurance**


    In our case an error, here called “violation” of the long line rule, would be
    represented as follow:


    <file name="/Users/Palleas/Projects/Apress/Github Jobs/Github Jobs/PCSViewController.m">


    <violation begincolumn="1" endcolumn="195" beginline="56" endline="56" priority="5"


    rule="long line">


    Line with 195 characters exceeds limit of 100


    </violation>


    </file>


    You already know how to set the format of the report generated by the oclint command.
    Simply replace html with “pmd” and change the name of the report from “oclint_result.html”
    to


    “oclint_result.xml”. To keep things clean, we will put the report in the build
    folder.


    From the Github Jobs for iOS job configuration, click on the “Add build phase”
    button and select


    “Execute shell”. Fill in the text area that appears with the few commands we mentioned
    earlier to convert the log from xcodebuild to a compilation database and call
    OCLint:


    $ oclint-xcodebuild "$WORKSPACE/build/xcodebuild.log"


    $ oclint-json-compilation-database -v -e Pods/SVProgressHUD -- -report-type pmd
    –o


    "$WORKSPACE/build/oclint_result.xml" -rc=LONG_LINE=130


    This will generate a report in the build directory in a format understandable
    by Jenkins. The final step is simply to collect this report so Jenkins can present
    it in a more user-friendly way, using a plugin.


    Even if the PMD format is a really well known format, it’s not natively supported
    by Jenkins.


    Navigate to the Jenkins configuration section and select the “manage plugin” section.
    Go to the


    “available” section and look for the “PMD plugin”. There are a few plugins capable
    of parsing and presenting PMD files but this one will do just fine. Install this
    plugin without restarting Jenkins and go back to the Github Jobs for iOS configuration
    panel.


    As you may expect, collecting the report will happen in a post-build action. Click
    on the “Add post-build action” and select “Publish PMD analysis results”. The
    rest of the process is nothing we haven’t seen before. The post-build action simply
    adds a pattern to the files to collect, a bit like the one we used to collect
    artifacts. Fill in the “PMD results” field with “**/build/oclint_result.xml” and
    press the “Advanced” button to display some of the power-user features that come
    with this plugin.


    Select the “run always” option. We know that OCLint may fail the build if too
    many errors are detected in your code. When this happens, the reports are generated
    anyway and not collecting those reports would not make a lot of sense. Press the
    “Save” button and start a new build.'
