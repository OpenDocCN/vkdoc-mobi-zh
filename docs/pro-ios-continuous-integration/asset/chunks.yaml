    \ to create a “beta” environment that will send the build to TestFlight, but we\
    \ could have a production environment that sends the build directly to the App\
    \ store, for example. Press the “Add environment” button, fill in the “Environment\
    \ name” with “Beta” and press the “Continue to task setup” button.\n\nConfiguring\
    \ a deployment job is very similar to configuring a standard job: you need to\
    \ configure a list of tasks that will be run sequentially. The deployment job\
    \ already comes with two tasks: one that will clean the working directory and\
    \ one that will download the artifacts in the working directory. The working directory\
    \ is the location when the deploy process will happen.\n\nContrary to Jenkins\
    \ where we added the deploy process at the end of the job, the way Bamboo works\
