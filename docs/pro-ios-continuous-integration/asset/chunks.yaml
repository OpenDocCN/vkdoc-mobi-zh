    构建已成功上传到`TestFlight`，这算是一个胜利，但有一件事我们需要修复。部署作业现在依赖于一个第三方工具`Shenzhen`来通过无线方式发送构建。当然，正如我们之前所示，我们本可以使用`curl`，但这不会给我们最后一次机会来讨论远程代理。


    当我们设置默认作业来构建应用程序时，我们使用了代理矩阵兼容性，让`Bamboo`决定应在哪个代理上运行构建。我们的需求很简单：需要一台安装了`xcodebuild`命令的计算机。部署环境也可以运行在特定的代理上。这里的小区别在于它不使用代理兼容性矩阵。这次，你需要明确设置要在哪个代理上运行作业。返回部署作业配置面板，选择我们之前创建的“Beta”部署环境，然后点击“Agents”按钮。在列表中，选择允许部署应用的代理。请注意，它不必是具有运行构建任务能力的代理。毕竟，`Shenzhen`是用`Ruby`编写的，它在每个平台上的运行方式几乎相同。你可能希望从一个因
    IP 地址或私钥而被明确允许上传文件到服务器的代理上运行部署作业。


