    管理配置文件（Provisioning Profiles）和私钥


    在本章中，我们多次构建和签名应用程序，但还有一件事没有涉及：该如何处理我们的配置文件和私钥？


    通常的答案很简单：没有神奇的解决方案。配置文件存储在您的`Library`文件夹中，您可以使用以下简单命令找到它们：


    ```

    $ ls -l /Users/Palleas/Library/MobileDevice/Provisioning\ Profiles

    -rw-r--r-- 1 Palleas staff 15799 4 Apr 11:22 0255A8B8-3DD3-4893-8E6E-9F6664DF89B5.mobileprovision

    -rw-r--r-- 1 Palleas staff 14153 26 Dec 17:06 05A46FE9-236E-4B40-8625-57A857155A7F.mobileprovision

    -rw-r--r-- 1 Palleas staff 15775 4 Apr 11:22 10F8378B-6638-4A94-AB4B-E505BF562DA9.mobileprovision

    -rw-r--r-- 1 Palleas staff 15757 4 Apr 11:22 18E20B0C-9446-4A68-A4F2-3483D02624E2.mobileprovision

    -rw-r--r-- 1 Palleas staff 15846 4 Apr 11:22 1F908F91-7B22-4B31-8629-7D286FE20ECD.mobileprovision

    -rw-r--r-- 1 Palleas staff 15787 4 Apr 11:22 1FA4FB89-845B-43B9-98DC-07A26B5F3920.mobileprovision

    ...

    ```


    私钥存储在钥匙串中，我们已经使用`security`命令行工具进行了一些基本的钥匙串操作，但还有其他与钥匙串相关的方法我们尚未涉及。您可能可以通过SSH在运行构建的计算机上操作钥匙串，并以相同的方式安装配置文件。


    问题是，即使Apple在代码签名身份管理方面取得了巨大进步，它仍然是一个复杂的概念。一个简单的解决方案是：将屏幕插入您的构建计算机一次，并在第一次构建应用程序时手动运行Xcode，确保一切顺利运行。再次强调，没有银弹，但我们正在慢慢接近目标。


    我们接下来该做什么？


    恭喜，您已经搭建了一个相当不错的持续集成平台。目前它功能有限，但在后续章节中，我们将使用它来通过无线方式部署应用程序，并通过单元测试和质量保证工具更新构建流程，以获得更详细的反馈。


    总结


    本章带您了解了世界上最常用的持续集成平台。现在，您将能够检测是否有同事在尝试向项目导入新框架时忘记勾选“Copy Items into Destination’s
    Group”复选框（尽管他或她应该使用Cocoapods）。我们希望您现在已经理解为什么一个中立的构建平台很重要，以及需要做些什么来让它对您的团队保持有用。


    下一章将介绍一家名为“Atlassian”的澳大利亚公司提供的替代方案——Bamboo。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第6章：使用Bamboo自动构建


    在前一章中，我们大量讨论了开源自动构建平台Jenkins。


    即使它存在一些问题和奇怪的行为，我们仍然希望您在章节结束时意识到它实际上是一个多么优秀的平台。我们向您展示了启动它有多么容易，并描述了在家中拥有一个这样的平台的好处。您现在可能会问自己一个问题：“为什么我们还需要另一个？”这是个好问题，但在回答之前，让我们明确一点：本书的目的不是推广Bamboo而非Jenkins。这只是简单介绍Bamboo如何帮助您作为iOS开发人员的日常工作。


    Bamboo是由澳大利亚公司Atlassian创建的一个商业产品，该公司也负责开发Confluence以及Jira。如果您曾经寻找过错误跟踪器，那么您可能至少遇到过Jira一次，并且可能正在您的公司中使用它。如果是这样，您会很高兴知道Bamboo与Jira深度集成，使得从失败的构建创建问题变得非常容易。


    有什么充分的理由让我们从一个免费的、开源平台切换到一个付费的、半专有的平台（部分组件是开源的，并且通过合适的许可证您可以获取源代码进行修改）？说实话，我们不是来给您一个理由的；我们是来告诉您Atlassian在开始开发Bamboo时采取的不同方法。


    在本章结束时，我们真诚希望我们已经让您对Bamboo有了很好的了解，并且您能够选择哪种解决方案最适合您的公司。


    上一章是一次旅程，帮助您发现了Jenkins和美妙的持续集成平台世界。现在您已经掌握了入门所需的一切知识，我们将以更直接的方式使用Bamboo，并尽可能直奔主题：使用我们在过去三章中一直编写的bash脚本构建Github
    Jobs iOS应用程序。为此，我们可能需要参考一些Jenkins的工作方式。


    **93**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


