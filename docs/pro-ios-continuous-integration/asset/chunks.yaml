    ***Figure 7-10.** A successful build of the master branch will automatically start
    a deployment job* To make sure everything worked, go back to the “Github Jobs
    iOS application” plan and hit the build button.


    EXERCISE: OBFUSCATE THE TOKENS


    Now that you’re really starting to master Bamboo, you may not feel confortable
    that we hardcode the API and team tokens in the shell script that calls Shenzhen’s
    ipa command. To make sure you understand how everything works, make sure those
    token don’t appear anywhere without being obfuscated.


    Hint: A bamboo deployment job can use build environment variables just like a
    regular job.


    TestFlight and HockeyApp are great products but the downside with putting everything
    in the cloud, besides the obvious fact that when Amazon is down you basically
    can go home and call it a day, is a matter of privacy. Some people don’t like
    not to be able to see where their data is stored or simply want to hack their
    own distribution platform. This is exactly what we are going to do in the next
    section!


    Writing your own distribution platform


    Guiding you through the steps required to develop and deploy a full-featured tool
    such as TestFlight would take a lot more than a couple of pages. Plus, only a
    few of these pages would be about iOS


    and iPhone applications. Because web development is not the goal of this chapter,
    we are going to focus of the distribution process, and let you work on the remaining
    part of the apps using the web technology of your choice.


    A distribution platform needs to be able to store the built application and a
    couple of other files we’ll cover in the next section.


