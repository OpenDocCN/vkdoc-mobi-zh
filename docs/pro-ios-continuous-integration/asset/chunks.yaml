    Testing`”任务运行完毕后点击它，然后选择“测试”选项卡。如图[9-9](#index_split_003.html#p180)所示，它显示了失败测试的详细信息。更棒的是（这也是使用`Atlassian`公司产品的好处之一），您可以直接从那个特定的失败测试用例创建`Jira`问题。


