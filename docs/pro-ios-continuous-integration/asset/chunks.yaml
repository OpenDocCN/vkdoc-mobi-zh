    \nOnly a few pieces are understandable: “Apple Computer Certificate Authority”.\
    \ The provisioning profile that was generated by Apple is code-signed using the\
    \ `PCKS#7`, a public-key cryptography standard. The 7th version is the one that\
    \ is used to sign messages and is called the Cryptographic Message Syntax (CMS)\
    \ Standard.\n\nThese weird characters are a way to check that the provisioning\
    \ profile file was not altered after Apple generated it. Remember that Apple only\
    \ gives you a hundred slots of devices? That would be a shame that you could simply\
    \ add new Unique Device Identifier by modifying an easy to read Plist file.\n\n\
    If you navigate through the content of this XML file you should see a few key\
    \ pieces of information, like the name of this provisioning profile:\n\n```xml\n\
    <key>Name</key>\n<string>Github Jobs Ad Hoc Distribution</string>\n```\n\nA Universally\
    \ Unique Identifier (UUID) that was generated by Apple:\n\n```xml\n<key>UUID</key>\n\
    <string>227G45F1-0BAF-4A6F-AE5A-B96F5825DBA8</string>\n```\n\nAnd the list of\
    \ iOS Unique Device Identifiers that you added when you generated this provisioning\
    \ profile:\n\n```xml\n<key>ProvisionedDevices</key>\n<array>\n    <string>THIS-IS-A-DEVICE-UDID</string>\n\
    \    <string>THIS-IS-ANOTER-DEVICE-UDID</string>\n    <string>THIS-IS-A-THIRD-DEVICE-UDID</string>\n\
    \    <string>THIS-IS-A-FOURTH-DEVICE-UDID</string>\n    <string>THIS-IS-A-FIFTH-DEVICE-UDID</string>\n\
    </array>\n```\n\nThe `UUID` is important. You’ve probably already seen it if you\
    \ changed the code signing settings of your application and wanted to commit these\
    \ changes through git or another VCS. If you go back to Xcode filter the build\
    \ settings on “`UUID`”, you should only see the provisioning profiles section,\
    \ as shown in Figure 7-11. That’s because the provisioning profile you want Xcode\
    \ to use is actually identified by its unique identifier, while you only see its\
    \ name.\n\n![Image 86](index-137_1.jpg)\n\n***Figure 7-11.** Looking for “UUID”\
    \ will show you the provisioning profile section of you’re application’s build\
    \ setting*\n\nThe provisioning profile also contains information about the entitlement\
    \ of your application, like if you’re going to use iCloud or Apple Push Service\
    \ (aps). When you run into an inexplicable issue where Xcode is not able to build\
    \ your application because of one of the errors mentioned above, you might want\
    \ to take a look at the content of the provisioning profile you are trying to\
    \ use.\n\n## iTunes Music Store XML manifest to the rescue\n\nNow that you know\
    \ more about the provisioning profile, let’s set up our own distribution platform.\n\
    \nWe will need a simple HTML page, a packaged application, and a XML file that\
    \ we will call the manifest. In the Android ecosystem, distributing an Application\
    \ without using the Play store is easy: all you need to do is to show a direct\
    \ download link to your application that a user will click via the mobile device’s\
    \ browser. If you were to try to do the same on an iPhone, the user would get\
    \ an error message from iOS saying that it doesn’t know what to do with this IPA\
    \ file. This is a bit annoying and we all know that it is not true.\n\nSharing\
    \ an IPA file is a more complex process that requires a proper URL scheme and,\
    \ as we mentioned earlier, a XML manifest. This information is required so iTunes\
    \ understand what to do with the file.\n\n### Creating a simple HTML page\n\n\
    For the sake of the example, our own distribution platform will contain a single\
    \ HTML page with a title, a capture of the application, and a download button.\
    \ From the folder of your choice, create an `index.html` file with the following\
    \ content:\n\n```html\n<!doctype html>\n<html>\n<head>\n    <title>Download Github\
    \ Jobs for iOS</title>\n</head>\n<body>\n    <h1>Github Jobs for iOS</h1>\n  \
    \  <a href=\"<URL>\">Click here to download the application</a>\n</body>\n</html>\n\
    ```\n\n![Image 87](index-138_1.jpg)\n\nRuby comes with a bundled HTTP server that\
    \ we can use to share this page on our local network.\n\nOpen a terminal, navigate\
    \ to the directory where you stored the `index.html` file and run the following\
    \ command:\n\n```\n$ ruby -run -e httpd -- --bind-address 0.0.0.0 --port 5000\
    \ .\n```\n\n```\n[2014-05-25 16:43:51] INFO WEBrick 1.3.1\n[2014-05-25 16:43:51]\
    \ INFO ruby 2.1.1 (2014-02-24) [x86_64-darwin13.0]\n[2014-05-25 16:43:51] INFO\
    \ WEBrick::HTTPServer#start: pid=46428 port=5000\n```\n\nIf you open your browser\
    \ and navigate to the URL `localhost:5000`, you should see a page similar to the\
    \ Figure 7-12.\n\n***Figure 7-12.** Our very distribution platform looks really\
    \ great*\n\n### The manifest\n\nNow that we have our pretty good looking HTML\
    \ page, let’s talk about the XML manifest we need to create so you can download\
    \ your application. If you remember correctly, the first time we packaged the\
    \ Github Jobs for iOS application into an IPA file, we used Xcode’s organizer.\
    \ When the organizer asks you where you want to post the generated file, there\
    \ is a small check box with the label “Save for Enterprise Distribution”. When\
    \ selected, a form appears and asks you some information. Under the hood this\
    \ information will be stored in a Plist file similar to the one we are about to\
    \ write.\n\nGo back to your text editor and create a `github-jobs.plist` file\
    \ near the `index.html`, one with the following content:\n\n```xml\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\"\
    \ \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist version=\"1.0\"\
    >\n<dict>\n    <key>items</key>\n    <array>\n        <dict>\n            <key>assets</key>\n\
    \            <array>\n                <dict>\n                    <key>kind</key>\n\
    \                    <string>software-package</string>\n                    <key>url</key>\n\
    \                    <string>http://<YOUR-LOCAL-IP>:5000/GithubJobs.ipa</string>\n\
    \                </dict>\n            </array>\n            <key>metadata</key>\n\
    \            <dict>\n                <key>bundle-identifier</key>\n          \
    \      <string>com.perfectly-cooked.Github-Jobs</string>\n                <key>bundle-version</key>\n\
    \                <string>0.1</string>\n                <key>kind</key>\n     \
    \           <string>software</string>\n                <key>title</key>\n    \
    \            <string>Github Jobs for iOS</string>\n            </dict>\n     \
    \   </dict>\n    </array>\n</dict>\n</plist>\n```\n\nMake sure to replace `<YOUR-LOCAL-IP>`\
    \ with your actual local IP address and ensure that the `bundle-identifier` and\
    \ the `bundle-version` are the one of your application. Then, copy the latest\
    \ version of your application – or even better, download it from the artifacts\
    \ section of your latest Jenkins or Bamboo build – and store it at the same level\
    \ as your `index.html` and your `github-jobs.plist`."
