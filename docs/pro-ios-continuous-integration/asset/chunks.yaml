    of where the application must be deployed. In our case we need to create a “beta”
    environment that will send the build to TestFlight, but we could have a production
    environment that sends the build directly to the App store, for example. Press
    the “Add environment” button, fill in the “Environment name” with


    “Beta” and press the “Continue to task setup” button.


    Configuring a deployment job is very similar to configuring a standard job: you
    need to configure a list of tasks that will be run sequentially. The deployment
    job already comes with two tasks: one that will clean the working directory and
    one that will download the artifacts in the working directory.


    The working directory is the location when the deploy process will happen.


    Contrary to Jenkins where we added the deploy process at the end of the job, the
    way Bamboo works is a bit different, as deploying and building jobs are two different
    things. In total fairness we could achieve the same behavior with Jenkins as a
    job can be triggered at the end of another job.


    We could totally have a build job that would trigger a deploy job.


    Click Save and go back to the deployment project - even if we haven’t added any
    tasks yet – and press Deploy. A deploy build is based on a branch (in our case,
    we want to deploy the result of the build run against the master branch) and a
    build number, usually the last one. Finally, the deployment needs a name. The
    default value for this field the name of the build plan with the number of the
    build you want to deploy, for example “iOS application-26”. Press the “start deployment”
    button, and wait a few seconds.


    For now the only time-consuming task performed is the download of the artifacts.
    The duration depends on the location artifacts are coming from but in most situations,
    they are simply copied from one place on an agent to another. This means that
    by the time you’ve finished reading this sentence, the deploy job should be over.


    If you look at the log, you should see something similar to the following:


    24-May-2014 15:10:44 Build Deployment of ''release-2'' on ''Beta'' started building
    on agent Default Agent


    24-May-2014 15:10:44 Build working directory is /Users/Palleas/.bamboo/xml-data/build-dir/2981890-3145731


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **130**


    **CHAPTER 7: Over-The-Air distribution**


    Opening your terminal and displaying the content using the command tree (available
    via homebrew, for example) of this build directory should give you the following
    output:


    $ cd /Users/Palleas/.bamboo/xml-data/build-dir/2981890-3145731


    $ tree


    .└── build


    ├── GithubJobs.dSYM.zip


    └── GithubJobs.ipa


    1 directory, 2 files


    This means that these two files are available for us to use the way we want to,
    and we want to upload them to TestFlight!


    If you go back to the tasks list management of your deployment job, click on “Add
    task” and look for a task which name contains “TestFlight” you should actual y
    find one. Its ful name is “Upload iOS


    application to [TestFlightApp.com](http://testflightapp.com/) configuration” and
    is available because, in the previous chapter, you instal ed the Xcode plugin
    for Atlassian. It works pretty much the way the one for Jenkins does but at the
    time we are writing this book, the latest version of this plugin doesn’t work
    very wel with the latest version of Bamboo and causes the job to fail for some
    Java dependency injection error.


    Once again, that is the downside of using with a semi-supported plugin. But fear
    no more, for we have a solution! Remember that little gem cal ed Shenzhen we mentioned
    in Chapter 3? Wel it comes with a helpful command to upload ipa files to TestFlight,
    so that’s what we are going to use instead.


    Uploading a file to TestFlight using Shenzhen is super simple. The syntax looks
    like this: $ ipa distribute:testflight –help


    Usage: ipa distribute:testflight [options]


    Options:


    -f, --file FILE .ipa file for the build


    -d, --dsym FILE zipped .dsym package for the build


    -a, --api_token TOKEN API Token. Available at [https://testflightapp.com/account/#api-token](https://testflightapp.com/account/#api-token)


    -T, --team_token TOKEN Team Token. Available at [https://testflightapp.com/dashboard/team/edit/](https://testflightapp.com/dashboard/team/edit/)


    -m, --notes NOTES Release notes for the build


    -l, --lists LISTS Comma separated distribution list names which will receive access
    to the build


    --notify Notify permitted teammates to install the build


    --replace Replace binary for an existing build if one is found with the same name/bundle
    version Contrary to the Jenkins plugin, there is no way to automatically fetch
    the Git history and use it as the release notes. You could probably hack something
    during the execution of the build process and store the result as a text file
    artifact that you would retrieve and use during the deployment job, but that’s
    a bit out of scope. Just know that it can be done.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 7: Over-The-Air distribution**


    **131**


    Clear the search field while still in the “Add Task” panel and once again, look
    for the “Script” one. In the Task description field fill “Using Shenzhen to upload
    the file to TestFlight”, select “Inline” from the script location combo box and
    in the script body text area enter the following command: ipa distribute:testflight
    \


    -f "build/Github Jobs.ipa"


    -d "build/Github\ Jobs.ipa-dSYM.zip" \


    -T 17a2c80c77933a14e002c369560b73ee_MzgyNjAzMjAxNC0wNS0xOSAyMjo0Njo1MS4yNjE2MzA
    \


    -a 4d219661d922badbc7489b2173791483_MTg2MDU0NzIwMTQtMDUtMTkgMjI6NDA6MzEuOTE3NDU4
    \


    -m "Changed stuff, like a lot"'
  trans: "\n`find . -name \"*.dSYM\" -exec zip ${bamboo.build.working.directory}/build/GithubJobs.dSYM.zip\
    \ {} \\;` 这个命令与我们用于 Jenkins 的命令几乎相同，只是环境变量不同。该命令会创建一个 dSYM 文件的 ZIP 包，为了在部署计划中使用这个\
    \ dSYM 归档文件，我们需要将其作为构建产物进行归档，就像上一章中处理 IPA 文件一样。点击\"保存\"并选择\"构建产物\"（Artifacts）标签页，你应能看到\"\
    Github Job IPA 文件\"这一构建产物定义已配置完成。\n\n新建一个构建产物定义。在\"名称\"（Name）字段中填写\"Github Job\
    \ 压缩版 dSYM 文件\"，\"位置\"（Location）字段填写\"build\"，\"复制模式\"（Copy pattern）字段填写`*.dSYM.zip`。完成后点击\"\
    创建\"（Create）。\n\n现在你应该有了两个构建产物定义，如图 7-9 所示。\n\n***图 7-9.** 我们配置了两个构建产物定义*\n\n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 7 章：无线分发**\n\n**129**\n\
    \n构建产物归档的默认行为是保持私有。如果你需要它们用于其他任务（例如部署任务），则必须进行共享。为此，请点击 IPA 和 dSYM 压缩文件夹的\"共享\"\
    （Share）链接。请注意，我们本可以在创建它们时就立即共享。现在已准备好创建部署任务。\n\n## 创建部署任务\n\n返回到 Github Jobs for\
    \ iOS 的配置页面，在\"阶段\"（Stages）部分，点击\"创建部署项目\"（Create deployment project）按钮。在\"部署项目详情\"\
    （Deployment project details）部分的描述字段中，填写\"将构建包发送至 TestFlight\"，因为这是我们想要实现的目标。保留其他默认选项：由于我们尚未讨论合适的\
    \ Git 工作流，我们将构建 master 分支或 Github Jobs 项目中的 iOS 应用程序计划。点击\"创建部署项目\"按钮。\n\n接下来我们需要创建一个环境，该环境是一个配置，用于指定应用程序的部署位置。在我们的案例中，我们需要创建一个\"\
    beta\"环境，用于将构建包发送到 TestFlight。但理论上我们可以拥有一个生产环境，例如直接将构建包发送到 App Store。点击\"添加环境\"\
    （Add environment）按钮，在\"环境名称\"（Environment name）字段中填写\"Beta\"，然后点击\"继续任务设置\"（Continue\
    \ to task setup）按钮。\n\n配置部署任务与配置标准任务非常相似：你需要配置一个将按顺序执行的任务列表。部署任务默认包含两个任务：一个用于清理工作目录，另一个用于将构建产物下载到工作目录中。工作目录是部署过程发生的位置。\n\
    \n与我们将部署过程添加到任务末尾的 Jenkins 不同，Bamboo 的工作方式略有不同，因为部署和构建任务是两个不同的概念。完全公平地说，我们也可以通过在任务结束后触发另一个任务的方式在\
    \ Jenkins 中实现相同的行为。我们完全可以建立一个构建任务，让它触发一个部署任务。\n\n点击保存并返回到部署项目——即使我们尚未添加任何任务——然后点击部署（Deploy）。一次部署构建基于一个分支（在我们的案例中，我们想部署针对\
    \ master 分支运行的构建结果）和一个构建编号（通常为最新的那个）。最后，部署需要一个名称。此字段的默认值是构建计划的名称加上你想要部署的构建编号，例如\"\
    iOS application-26\"。点击\"开始部署\"（Start Deployment）按钮，等待几秒钟。\n\n目前唯一耗时的任务是下载构建产物。耗时取决于构建产物来源的位置，但在大多数情况下，它们只是从一个代理的位置复制到另一个位置。这意味着，当你读完这句话时，部署任务应该已经结束了。\n\
    \n如果你查看日志，应该会看到类似以下的内容：\n\n```\n24-May-2014 15:10:44 在 'Beta' 环境上开始构建 'release-2'\
    \ 的部署任务，代理为 Default Agent\n24-May-2014 15:10:44 构建工作目录为 /Users/Palleas/.bamboo/xml-data/build-dir/2981890-3145731\n\
    ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**130**\n\n**第 7 章：无线分发**\n\
    \n打开你的终端并使用`tree`命令（例如，可通过 Homebrew 获取）查看此构建目录的内容，应会得到以下输出：\n\n```\n$ cd /Users/Palleas/.bamboo/xml-data/build-dir/2981890-3145731\n\
    $ tree\n.\n└── build\n    ├── GithubJobs.dSYM.zip\n    └── GithubJobs.ipa\n1 directory,\
    \ 2 files\n```\n\n这意味着这两个文件可以供我们随意使用，而我们要做的就是将它们上传到 TestFlight！\n\n如果你返回到部署任务的任务列表管理界面，点击\"\
    添加任务\"（Add task）并查找名称包含\"TestFlight\"的任务，你实际上应该能找到一个。它的完整名称是\"Upload iOS application\
    \ to [TestFlightApp.com](http://testflightapp.com/) configuration\"，并且这个任务是可用的，因为你在上一章安装了\
    \ Atlassian 的 Xcode 插件。它的工作方式与 Jenkins 的插件非常相似，但在我们撰写本书时，该插件的最新版本与 Bamboo 的最新版本配合得并不太好，会导致任务因\
    \ Java 依赖注入错误而失败。\n\n再次强调，这就是使用半官方插件的缺点。但别担心，我们自有解决方案！还记得我们在第 3 章提到的那个名为 Shenzhen\
    \ 的小工具吗？它附带了一条非常有用的命令，用于将 ipa 文件上传到 TestFlight，因此我们将改用这个工具。\n\n使用 Shenzhen 将文件上传到\
    \ TestFlight 非常简单。语法如下所示：\n\n```\n$ ipa distribute:testflight –help\n用法: ipa distribute:testflight\
    \ [选项]\n选项:\n    -f, --file FILE 构建包的 .ipa 文件\n    -d, --dsym FILE 构建包的压缩版 .dsym\
    \ 包\n    -a, --api_token TOKEN API 令牌。可在 https://testflightapp.com/account/#api-token\
    \ 获取\n    -T, --team_token TOKEN 团队令牌。可在 https://testflightapp.com/dashboard/team/edit/\
    \ 获取\n    -m, --notes NOTES 构建包的发布说明\n    -l, --lists LISTS 逗号分隔的发布列表名称，这些列表将获得访问构建包的权限\n\
    \    --notify 通知已授权的团队成员安装构建包\n    --replace 如果发现同名的现有构建包，则替换其二进制文件\n```\n\n与\
    \ Jenkins 插件不同的是，这里无法自动获取 Git 历史记录并将其用作发布说明。你或许可以在构建过程的执行期间编写一些脚本，并将结果存储为文本文件构建产物，然后在部署任务中检索并使用该产物，但这有点超出了讨论范围。只需知道这是可行的即可。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 7 章：无线分发**\n\n**131**\n\
    \n仍然在\"添加任务\"（Add Task）面板中，清除搜索字段，然后再次查找\"脚本\"（Script）任务。在任务描述（Task description）字段中填写\"\
    使用 Shenzhen 将文件上传到 TestFlight\"，从脚本位置（Script Location）组合框中选择\"内联\"（Inline），然后在脚本主体（Script\
    \ Body）文本区域中输入以下命令：\n\n```\nipa distribute:testflight \\\n    -f \"build/Github\
    \ Jobs.ipa\" \\\n    -d \"build/Github\\ Jobs.ipa-dSYM.zip\" \\\n    -T 17a2c80c77933a14e002c369560b73ee_MzgyNjAzMjAxNC0wNS0xOSAyMjo0Njo1MS4yNjE2MzA\
    \ \\\n    -a 4d219661d922badbc7489b2173791483_MTg2MDU0NzIwMTQtMDUtMTkgMjI6NDA6MzEuOTE3NDU4\
    \ \\\n    -m \"改变了很多内容\"\n```\n"
- fmt: '最后，点击“Save”按钮，然后点击“Back to deployment project”按钮。当你准备好后，点击部署按钮。除非你在阅读本书时一直在后台运行构建，否则这次不会要求你输入分支、构建结果以及用于本次部署的名称。这是`Bamboo`的默认行为。你希望每次发布都有意义，而创建一个新发布来部署完全相同的构建结果又有什么意义呢？点击“Start
    deployment”按钮。


    你应该会在作业日志末尾看到以下输出：


    ```

    24-May-2014 17:06:58 Build successfully uploaded to TestFlight

    24-May-2014 17:06:58 Finished task ''Using Shenzhen to upload the file to testflight''

    24-May-2014 17:06:58 Finalising the build...

    24-May-2014 17:06:58 Stopping timer.

    24-May-2014 17:06:58 Build 2981890-3145731-3637262 completed.

    24-May-2014 17:06:58 Finished processing deployment result Deployment of ''release-5''
    on ''Beta''

    ```


    构建已成功上传到`TestFlight`，这算是一个胜利，但有一件事我们需要修复。部署作业现在依赖于一个第三方工具`Shenzhen`来通过无线方式发送构建。当然，正如我们之前所示，我们本可以使用`curl`，但这不会给我们最后一次机会来讨论远程代理。


    当我们设置默认作业来构建应用程序时，我们使用了代理矩阵兼容性，让`Bamboo`决定应在哪个代理上运行构建。我们的需求很简单：需要一台安装了`xcodebuild`命令的计算机。部署环境也可以运行在特定的代理上。这里的小区别在于它不使用代理兼容性矩阵。这次，你需要明确设置要在哪个代理上运行作业。返回部署作业配置面板，选择我们之前创建的“Beta”部署环境，然后点击“Agents”按钮。在列表中，选择允许部署应用的代理。请注意，它不必是具有运行构建任务能力的代理。毕竟，`Shenzhen`是用`Ruby`编写的，它在每个平台上的运行方式几乎相同。你可能希望从一个因IP地址或私钥而被明确允许上传文件到服务器的代理上运行部署作业。


    最后，我们的计划中还缺少一个最终步骤：我们仍然在手动运行部署作业！


    在同一环境配置面板中，点击“Triggers”按钮。点击“Add trigger”按钮，如图[7-10](#index_split_002.html#p134)所示，在“Trigger
    type”组合框中选择“After successful build plan”，并确保勾选了“Use the main plan branch”：你可能不希望为每个成功构建的特性分支都触发部署。点击“Save
    Trigger”按钮。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 85](index-134_1.jpg)


    **132**


    **CHAPTER 7: Over-The-Air distribution**


    ***Figure 7-10.** A successful build of the master branch will automatically start
    a deployment job*


    为了确保一切正常，返回“Github Jobs iOS application”计划并点击构建按钮。


    **练习：混淆令牌**


    既然你已经开始真正掌握`Bamboo`，你可能会对我们在调用`Shenzhen`的`ipa`命令的`shell`脚本中硬编码了API和团队令牌感到不安。为了确保你理解一切是如何运作的，请确保这些令牌出现在任何地方时都经过混淆。


    提示：`Bamboo`部署作业可以像普通作业一样使用构建环境变量。


    `TestFlight`和`HockeyApp`是很棒的产品，但将所有内容放在云端的不利之处（除了当`Amazon`宕机时你基本上可以回家休息这一明显事实外）是隐私问题。有些人不喜欢无法查看数据存储位置，或者只是想自己构建分发平台。这正是我们在下一节要做的事情！


    **编写你自己的分发平台**


    要引导你完成开发和部署像`TestFlight`这样功能齐全的工具所需的所有步骤，需要远不止几页的篇幅。而且，其中只有几页会涉及`iOS`和`iPhone`应用程序。由于Web开发不是本章的目标，我们将专注于分发过程，并让你使用你选择的Web技术来处理应用的其余部分。


    一个分发平台需要能够存储已构建的应用程序以及我们在下一节中将要介绍的其他一些文件。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 7: Over-The-Air distribution**


    **133**


    **理解配置文件**


    配置文件再次是一种使用苹果非常喜欢的属性列表（`property-list`）格式的文件。


    在上一节中，我们帮助你生成了一个分发配置文件，你从苹果开发者门户下载它，并使用`iPhone Configuration Utility`进行安装。`Xcode`发展得越多，这个过程就越容易，现在你可以让`Xcode`自动下载所有你有权使用的配置文件。尽管如此，我们还是只想简单介绍一下这个主题，以便现在能告诉你更多关于这些配置文件的信息。


    如果你是一名`iOS`开发者，已经开发过应用程序并在`App Store`上发布过应用，你可能已经纠结过应用程序的代码签名过程。“未找到有效的签名身份”、“可执行文件使用了无效的授权签名”……这些错误在`iOS`开发者社区中非常常见，通常建议的解决方案是删除所有配置文件并重新开始。当然，这通常有效，但让我们先来看看配置文件。希望你能在不删除所有内容、不重新安装`Xcode`、不把电脑扔出窗外的前提下诊断并修复这些问题。


    你的配置文件存储在`~/Library`文件夹中。你可以像我们在图[7-2](#index_split_002.html#p122)中展示的那样，使用`iPhone
    Configuration Utility`来查找所有配置文件，或者直接使用终端。打开一个终端窗口，导航到相应目录并列出可用文件。


    ```

    $ cd ~/Library/MobileDevice/Provisioning\ Profiles

    $ ls -hal

    total 1337

    drwxr-xr-x   56 staff   1.9K 19 May 20:05 .

    drwxr-xr-x    5 staff   170B 31 Mar 19:36 ..

    -rw-r--r--    1 staff    15K  4 Apr 11:22 220C65F1-0BAF-4A6F-AE5A-B96F5600DBA8.mobileprovision

    -rw-r--r--    1 staff    14K 26 Dec 17:06 05A46FE9-236E-4B40-8625-57A857155A7F.mobileprovision

    -rw-r--r--    1 staff    15K  4 Apr 11:22 10F8378B-6638-4A94-AB4B-E505BF562DA9.mobileprovision

    -rw-r--r--    1 staff    15K  4 Apr 11:22 18E20B0C-9446-4A68-A4F2-3483D02624E2.mobileprovision

    -rw-r--r--    1 staff    15K  4 Apr 11:22 1F908F91-7B22-4B31-8629-7D286FE20ECD.mobileprovision

    ...

    ```


    我们真正感兴趣的是第一个文件，它神奇地出现在列表顶部，因为我们需要它。我们在本章开头创建了它，并用它通过`TestFlight`分发应用程序。我们之前提到过，配置文件使用的是属性列表文件格式。使用你最喜欢的文本编辑器，打开你的配置文件并查看其内容。


    该文件基本是人类可读的，但开头包含一些奇怪的字符：


    ```

    0<82>^\õ^F *<86>H<86>÷^M^A^G^B <82>^\æ0<82>^\â^B^A^A1^K0 ^F^E+^N^C^B^Z^E^@0<82>^L»^F

    *<86>H<86>÷^M^A^G^A <82>^L¬^D<82>^L¨<?xml version="1.0" encoding="UTF-8"?>

    ```'
  raw: 'Finally, press the “Save” button and then the “Back to deployment project”
    one. When you’re ready, hit the deploy button. Unless you’ve been running builds
    in the background while you were reading this book, this time you shouldn’t be
    asked for the branch, the build result and the name to use for this deployment.
    That’s the default behavior of Bamboo. You want to keep each release meaningful
    and what is the point of creating a new release to deploy the exact same build
    result? Press the


    “Start deployment” button.


    You should see the following output at the end of the job’s logs:


    24-May-2014 17:06:58 Build successfully uploaded to TestFlight


    24-May-2014 17:06:58 Finished task ''Using Shenzhen to upload the file to testflight''


