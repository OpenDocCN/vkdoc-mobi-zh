- fmt: 'This is exactly what we needed: more clicks! After a boring process only resulting
    in an IPA file generated on our desktop, we’ve added more steps involving another
    software and many clicks.


    There is one more downside to this approach that comes with the complex code signing
    and provisioning profile process Xcode requires in order to build and ship applications.
    You can send the IPA to anyone but it has to be explicitly authorized in the application’s
    provisioning profile as we will show in Chapter 7 where we’ll talk about how provisioning
    profiles work. If you try to install an application for which you’re not authorized,
    iTunes will fail silently and you will end up with a disabled application on your
    home screen.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Chapter 3: Using Xcode to Release an Application Outside the App Store


    ### Installing the Application on the Tester''s Device


    It is actually possible to understand what is going on using the `iPhone Configuration
    Utility` application available at [http://support.apple.com/downloads/#iphone](http://support.apple.com/downloads/#iphone).
    This nifty little tool is exactly the kind of tool that Apple could have made,
    dedicated to managing iOS devices. If you are not familiar with this tool already,
    you really should become familiar. Go grab it and let’s try again.


    Open the `iPhone Configuration Utility` and a new Finder window. Navigate back
    to where you stored the original IPA file – remember when we asked you not to
    delete it? This is why – select it and drop it to the Utility window. Just as
    it was in iTunes, the “Github Jobs” application is now available for you to be
    installed via the desktop.


    With your iPhone still plugged in, select it in the left menu and navigate to
    the applications tab.


    You should see the “Githubs Jobs” API with an “Install” button. Press it and the
    application will be installed automatically to your phone.


    This is a little better than using iTunes to install intermediate builds of your
    application. Indeed, where iTunes fails miserably when you try to install an unauthorized
    application, the `iPhone Configuration Utility` was created for a different audience:
    the power users and developer. If you click on your phone in the left sidebar
    and open the console app you will be able to get a much more detailed feedback
    of what’s happening in your phone. Digging into these provided logs information
    should get you to lines such as:


    ```

    Mar 31 19:26:43 DEV-iPhone5S-iOS-7 lsd[75] <Warning>: LaunchServices: installation
    failed for app com.perfectly-cooked.Github-Jobs

    ```


    This is the kind of information you will need when testers won’t be able to install
    the build you will be sending them. This tool will also help you manage your provisioning
    profiles, configuration profiles, and applications. It will show you detailed
    information about a plugged device and, last but not least, it will also help
    you with sending your applications by e-mail, as shown in Figure 3-7!


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 38](index-41_1.jpg)


    **Figure 3-7.** The `iPhone Configuration Utility` will help you distribute builds
    by mail.


    Even if this tool is slightly better than iTunes, distributing builds through
    e-mail is not very convenient and would only work with power users. But that’s
    good news! Now that we have described the worst solution to distribute builds,
    from now on we can only get better. The next chapters will focus on how to build
    the application in a “smarter” way, for lack of a better term (but it’s really
    in Chapter 7 that the magic will happen). In Chapter 7, we will show you how to
    automate the process we’ve been covering in the past 10 pages.


    ### Installing Multiple Versions of the Application


    In case the installation worked, there is still a very important thing to take
    care of. When you create an iOS application using Xcode, the project creation
    wizard asks you for a bundle identifier. Unlike the Java world where you need
    a complex reverse-DNS based namespace to be one of the cool guys, the bundle identifier
    of an iOS app is important: it is a unique identifier that helps differentiate
    your application from other ones and you can’t have multiple applications sharing
    the same bundle ID.


    In practice this is not a big deal, all the application does is use a reverse-DNS
    based bundle identifier, like in this case `perfectly-cooked.com` turning into
    `com.perfectly-cooked.GithubJobs`.


    On the other hand, when you start distributing and asking people to install beta
    versions of your application, it prevents people from having the stable application
    and the beta one at the same time.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 39](index-42_1.jpg)


    Fortunately for you, we showed you in Chapter 2 how to manage multiple environments
    for your application using configurations. The bundle identifier is just one more
    setting that you can customize, depending on the configuration.


    Go back to Xcode and select the main property list file, `Github JobsInfo.plist`
    and look for the `Bundle identifier` key. If your own Xcode is configured to display
    the raw names of these keys, look for the `CFBundleIdentifier` key.


    The current bundle identifier contains `com.perfectly-cooked.${PRODUCT_NAME:rfc1034identifier}`
    which, once the application is compiled, is evaluated and transformed to `com.perfectly-cooked.githubs-jobs`.
    This RFC parameter describes DNS and its use for host address support. In our
    case, the `:rfc1034identifier` right after the wrapping brackets we’ve seen in
    Chapter 2 is a filter that turns the Product Name of the application into a RFC1034-compliant
    identifier (no more spaces...) and because of that, we can easily change it only
    for the AdHoc configuration. We want the version we’ll send to our beta users
    to be codenamed “Github Jobs (beta)”. This way, people will be able to see that
    they are using the beta version. They will also be able to keep the stable version
    of the application because thanks to the `:rfc1034identifier`, the bundle identifier
    will be different.


    Open the build settings application and look for the `Product Name` setting. Its
    default value should be `$(TARGET_NAME)` where `TARGET_NAME` is one of the many
    environment variables available.


    To change the bundle identifier, all we need to do is to change the product name
    of the Ad Hoc configuration, as shown in Figure 3-8.


    **Figure 3-8.** The product name will change for the Ad Hoc configuration.


    It is very important that we keep a human readable format for the product name
    setting, as this is the name of the application that will be displayed on your
    home screen. Note that this can cause issues with the code signing process when
    provisioning profiles and entitlements are locked to a very specific bundle identifier:
    use this technique with caution!


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Updating the `PRODUCT_NAME` build setting will change the bundle identifier depending
    on the configuration. Your testers will then be able to have multiple versions
    of your application installed on their devices.


    ### Summary


    In this chapter, we have shown you the tools available to distribute beta versions
    of your application. Whether they use iTunes or the `iPhone Configuration Utility`,
    this is actually a terribly constraining workflow, far from giving you any flexibility
    whatsoever. It requires a lot of clicks, multiple softs, and doesn’t handle potential
    errors very well.'
  raw: 'This is exactly what we needed: more clicks! After a boring process only resulting
    in an IPA file generated on our desktop, we’ve added more steps involving another
    software and many clicks.


    There is one more downside to this approach that comes with the complex code signing
    and provisioning profile process Xcode requires in order to build and ship applications.
    You can send the IPA to anyone but it has to be explicitly authorized in the application’s
    provisioning profile as we will show in Chapter 7 where we’ll talk about how provisioning
    profiles work. If you try to install an application for which you’re not authorized,
    iTunes will fail silently and you will end up with a disabled application on your
    home screen.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 3: Using Xcode to Release an Application Outside the App Store** **37**


    Installing the Application on the Tester''s Device


    It is actually possible to understand what is going on using the iPhone Configuration
    Utility application available at [http://support.apple.com/downloads/#iphone.
    This nifty little tool is exactly](http://support.apple.com/downloads/#iphone)


    the kind of tool that Apple could have made, dedicated to managing iOS devices.
    If you are not familiar with this tool already, you really should become familiar.
    Go grab it and let’s try again.


    Open the iPhone Configuration Utility and a new Finder window. Navigate back to
    where you stored the original IPA file – remember when we asked you not to delete
    it? This is why – select it and drop it to the Utility window. Just as it was
    in iTunes, the “Github Jobs” application is now available for you to be installed
    via the desktop.


    With your iPhone still plugged in, select it in the left menu and navigate to
    the applications tab.


    You should see the “Githubs Jobs” API with an “Install” button. Press it and the
    application will be installed automatically to your phone.


    This is a little better than using iTunes to install intermediate builds of your
    application. Indeed, where iTunes fails miserably when you try to install an unauthorized
    application, the iPhone configuration utility was created for a different audience:
    the power users and developer. If you click on your phone in the left sidebar
    and open the console app you will be able to get a much more detailed feedback
    of what’s happening in your phone. Digging into these provided logs information
    should get you to lines such as:


    Mar 31 19:26:43 DEV-iPhone5S-iOS-7 lsd[75] <Warning>: LaunchServices: installation
    failed for app com.perfectly-cooked.Github-Jobs


    This is the kind of information you will need when testers won’t be able to install
    the build you will be sending them. This tool will also help you manage your provisioning
    profiles, configuration profiles, and applications. It will show you detailed
    information about a plugged device and, last but not least, it will also help
    you with sending your applications by e-mail, as shown in Figure [3-7](#index_split_000.html#p41)!


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 38](index-41_1.jpg)


    **38**


    **CHAPTER 3: Using Xcode to Release an Application Outside the App Store**


    ***Figure 3-7.** The iPhone Configuration Utility will help you distribute builds
    by mail* Even if this tool is slightly better than iTunes, distributing builds
    through e-mail is not very convenient and would only work with power users. But
    that’s good news! Now that we have described the worst solution to distribute
    builds, from now on we can only get better. The next chapters will focus on how
    to build the application in a “smarter” way, for lack of a better term (but it’s
    really in Chapter 7


    that the magic will happen). In Chapter 7, we will show you how to automate the
    process we’ve been covering in the past 10 pages.


    Installing Multiple Versions of the Application


    In case the instal ation worked, there is stil a very important thing to take
    care of. When you create an iOS application using Xcode, the project creation
    wizard asks you for a bundle identifier. Unlike the Java world where you need
    a complex reverse-DNS based namespace to be one of the cool guys, the bundle identifier
    of an iOS app is important: it is a unique identifier that helps differentiate
    your application from other ones and you can’t have multiple applications sharing
    the same bundle ID.


    In practice this is not a big deal, al the application does is use a reverse-DNS
    based bundle identifier, like in this case perfectly-cooked.com turning into “com.perfectly-cooked.GithubJobs”.


    On the other hand, when you start distributing and asking people to instal beta
    versions of your application, it prevents people from having the stable application
    and the beta one at the same time.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 39](index-42_1.jpg)


    **CHAPTER 3: Using Xcode to Release an Application Outside the App Store**


    **39**


    Fortunately for you, we showed you in chapter 2 how to manage multiple environments
    for your application using configurations. The bundle identifier is just one more
    setting that you can customize, depending on the configuration.


    Go back to Xcode and select the main property list file, “Github JobsInfo.plist”
    and look for the


    “Bundle identifier” key. If your own Xcode is configured to display the raw names
    of these keys, look for the “CFBundleIdentifier” key.


    The current bundle identifier contains “com.perfectly-cooked.${PRODUCT_NAME:rfc1034identifier}”


    which, once the application is compiled, is evaluated and transformed to com.perfectly-cooked.


    githubs-jobs. This RFC parameter describes DNS and its use for host address support.
    In our case, the “:rfc1034identifier” right after the wrapping brackets we’ve
    seen in Chapter 2 is a filter that turns the Product Name of the application into
    a RFC1034-compliant identifier (no more spaces...) and because of that, we can
    easily change it only for the AdHoc configuration. We want the version we’ll send
    to our beta users to be codenamed “Github Jobs (beta)”. This way, people will
    be able to see that they are using the beta version. They will also be able to
    keep the stable version of the application because thanks to the “:rfc1034identifier”,
    the bundle identifier will be different.


    Open the build settings application and look for the “Product Name” setting. Its
    default value should be “$(TARGET_NAME)” where TARGET_NAME is one of the many
    environment variables available.


    To change the bundle identifier, all we need to do is to change the product name
    of the Ad Hoc configuration, as shown in Figure [3-8](#index_split_000.html#p42).


    ***Figure 3-8.** The product name will change for the Ad Hoc configuration*


    It is very important that we keep a human readable format for the product name
    setting, as this is the name of the application that will be displayed on your
    home screen. Note that this can cause issues with the code signing process when
    provisioning profiles and entitlements are locked to a very specific bundle identifier:
    use this technique with caution!


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **40**


    **CHAPTER 3: Using Xcode to Release an Application Outside the App Store**


    Updating the PRODUCT_NAME build setting will change the bundle identifier depending
    on the configuration. Your testers will then be able to have multiple versions
    of your application installed on their devices.


    Summary


    In this chapter, we have shown you the tools available to distribute beta versions
    of your application.


    Whether they use iTunes or the iPhone Configuration Utility, this is actually
    a terribly constraining workflow, far from giving you any flexibility whatsoever.
    It requires a lot of clicks, multiple softs, and doesn’t handle potential errors
    very well.'
  trans: '

    这正是我们所需要的：更多的点击！在经历了一个乏味的过程，最终只在我们的桌面上生成一个 IPA 文件后，我们又增加了更多步骤，涉及另一个软件和大量的点击。


    这种方法还有一个缺点，那就是为了构建和分发应用，Xcode 需要复杂的代码签名和配置文件流程。你可以将 IPA 发送给任何人，但必须在应用的配置文件中明确授权，正如我们将在第
    7 章讨论配置文件工作原理时展示的那样。如果你尝试安装一个未获授权的应用，iTunes 会静默失败，最终你的主屏幕上只会留下一个无法使用的应用。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第 3 章：使用 Xcode 在 App Store 之外发布应用


    ### 在测试者的设备上安装应用


    实际上，我们可以通过 `iPhone Configuration Utility` 应用（可从 [`support.apple.com/downloads/#iphone`](http://support.apple.com/downloads/#iphone)
    获取）来了解发生了什么。这款精巧的小工具正是苹果公司可能推出的那种专门用于管理 iOS 设备的工具。如果你还不熟悉这个工具，你真的应该熟悉一下。去下载它，然后我们再试一次。


    打开 `iPhone Configuration Utility` 和一个新的访达窗口。导航到你之前存放原始 IPA 文件的位置——还记得我们让你不要删除它吗？这就是原因——选中它，然后将其拖放到工具窗口中。就像在
    iTunes 中一样，“Github Jobs”应用现在就可以通过桌面进行安装了。


    在 iPhone 仍处于连接状态的情况下，在左侧菜单中选中它，然后导航到“应用”选项卡。


    你应该会看到“Githubs Jobs”API 并附带一个“安装”按钮。按下它，应用将自动安装到你的手机上。


    这比使用 iTunes 来安装应用的中间版本要好一些。的确，当你尝试安装一个未授权应用时，iTunes 会惨遭失败，而 `iPhone Configuration
    Utility` 则是为不同的受众创建的：高级用户和开发者。如果你点击左侧边栏中的手机，并打开控制台应用，你将能够获得关于你手机上发生情况的更详细反馈。深入查看这些提供的日志信息，你应该能发现类似这样的行：


    ```

    Mar 31 19:26:43 DEV-iPhone5S-iOS-7 lsd[75] <Warning>: LaunchServices: installation
    failed for app com.perfectly-cooked.Github-Jobs

    ```


    当测试者无法安装你将要发送给他们的构建版本时，这正是你需要的信息。这个工具还会帮助你管理配置文件、配置描述文件和应用程序。它会向你显示已连接设备的详细信息，最后同样重要的是，它还能帮助你通过电子邮件发送应用，如图
    3-7 所示！


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 38](img/index-41_1.jpg)


    **图 3-7.** `iPhone Configuration Utility` 将帮助你通过邮件分发构建版本。


    即使这个工具比 iTunes 稍好一些，通过电子邮件分发构建版本仍然不是很方便，而且只适用于高级用户。但这是个好消息！既然我们已经描述了最糟糕的分发构建版本的方法，从现在起我们只会做得更好。接下来的章节将重点介绍如何以更“智能”的方式构建应用（虽然找不到更合适的词，但真正的魔法其实发生在第
    7 章）。在第 7 章中，我们将向你展示如何自动化我们在过去 10 页中介绍的流程。


    ### 安装应用的多个版本


    如果安装成功了，仍然有一件非常重要的事情需要处理。当你使用 Xcode 创建 iOS 应用时，项目创建向导会要求你提供一个捆绑标识符。与 Java 世界不同，你不需要一个复杂的反向
    DNS 命名空间来显得很酷，iOS 应用的捆绑标识符很重要：它是一个唯一的标识符，有助于将你的应用与其他应用区分开来，并且你不能让多个应用共享同一个捆绑 ID。


    实际上这没什么大不了的，所有应用都使用基于反向 DNS 的捆绑标识符，比如在本例中，`perfectly-cooked.com` 变成了 `com.perfectly-cooked.GithubJobs`。


    另一方面，当你开始分发并请求他人安装应用的测试版本时，这会阻止人们同时安装稳定版应用和测试版应用。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 39](img/index-42_1.jpg)


    幸运的是，我们在第 2 章中向你展示了如何使用配置来管理应用的多个环境。捆绑标识符只是另一个你可以根据配置自定义的设置。


    回到 Xcode，选择主属性列表文件 `Github JobsInfo.plist`，并查找 `Bundle identifier` 键。如果你的 Xcode
    配置为显示这些键的原始名称，请查找 `CFBundleIdentifier` 键。


    当前的捆绑标识符包含 `com.perfectly-cooked.${PRODUCT_NAME:rfc1034identifier}`，一旦应用被编译，它会被计算并转换为
    `com.perfectly-cooked.githubs-jobs`。这个 RFC 参数描述了 DNS 及其用于主机地址支持的用途。在我们的例子中，我们在第
    2 章看到的包裹括号后面的 `:rfc1034identifier` 是一个过滤器，它可以将应用的产品名称转换为符合 RFC1034 标准的标识符（不再有空格...），正因如此，我们可以轻松地仅为
    AdHoc 配置更改它。我们希望发送给测试版用户的版本代号为“Github Jobs (beta)”。这样，人们就能看到他们正在使用测试版。他们也将能够保留应用的稳定版，因为借助
    `:rfc1034identifier`，捆绑标识符会有所不同。


    打开构建设置应用，查找 `Product Name` 设置。它的默认值应该是 `$(TARGET_NAME)`，其中 `TARGET_NAME` 是可用的众多环境变量之一。


    要更改捆绑标识符，我们只需要更改 Ad Hoc 配置的产品名称，如图 3-8 所示。


    **图 3-8.** 产品名称将为 Ad Hoc 配置更改。


    保持产品名称设置为人类可读的格式非常重要，因为这是将显示在你主屏幕上的应用名称。请注意，当配置文件和授权被锁定到非常具体的捆绑标识符时，这可能会导致代码签名过程出现问题：请谨慎使用此技巧！


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    更新 `PRODUCT_NAME` 构建设置将根据配置更改捆绑标识符。这样，你的测试者将能够在其设备上安装多个版本的应用。


    ### 总结


    在本章中，我们向你展示了可用于分发应用测试版本的工具。无论是使用 iTunes 还是 `iPhone Configuration Utility`，这实际上都是一个非常受限的工作流程，远不能为你提供任何灵活性。它需要大量的点击、多个软件，而且不能很好地处理潜在的错误。

    '
- fmt: "# Chapter 4: Invoking the Power of the Command Line\n\nIn our first chapter,\
    \ we’ve actually mentioned a guy that would install beta versions of the application\
    \ when testers would ask for it with a little tap on the shoulder. This guy would\
    \ plug the tester device in, build a version of the application, and give the\
    \ device back. The good news is you now have all the tools and knowledge you need\
    \ to be that guy. But don’t be – instead, keep reading and the next chapters will\
    \ show you how to automate this process and how to provide a better user experience\
    \ to your testers.\n\nMultiple user interfaces, even well-designed and obvious\
    \ ones such as the ones provided by Xcode are not enough. Indeed, the previous\
    \ chapter showed you what a tedious process it was to release an application outside\
    \ of the app store using Xcode and iTunes or the iPhone Configuration Utility.\n\
    \nA good interface doesn’t make everything right. In this chapter, we will go\
    \ deeper and cover the tools on which most of these interfaces are based by calling\
    \ them directly using the command line.\n\n## Command Line Interface?\n\nThe command\
    \ line interface (often referred to as CLI) is a way for the user to interact\
    \ with the computer at a lower level using text-based commands in syntax understandable\
    \ by the computer. This syntax is a good compromise for both parts in terms of\
    \ readability. A lot of developers are scared of it and some of them will spend\
    \ their entire career without using a shell (the provided interface to execute\
    \ commands) once. Why would they? Using Photoshop to design the application, Xcode\
    \ to code it, while using a graphical client for the version control (if any)\
    \ and the application loader to send a build to the app store, it’s completely\
    \ doable to develop an application without opening the shell once.\n\nThe thing\
    \ is using the command line gives you access to power user features and will actually\
    \ come in very handy when we set up our continuous integration environment.\n\n\
    In this chapter, we will try to show you that the command line, in the context\
    \ of iOS development, is not as scary as you may think, especially on OSX. Since\
    \ you bought this book, we don’t need to convince you what a great operating system\
    \ OS X is for developers. You should thank its UNIX origins for that. OS X comes\
    \ with a pretty decent shell for you to play in called `Terminal.app` and is available\
    \ with a bunch of other tools in `/Applications/Utilities`. If you take a close\
    \ look at Figure 4-1, this is actually where the iPhone Configuration Utility\
    \ we talked about in the previous chapter was installed.\n\n![Image 40](index-45_1.jpg)\n\
    \n**Figure 4-1.** A list of utilities, mostly provided by OSX\n\nOne of the reasons\
    \ developers are scared or simply not inclined to dig into their shell, is probably\
    \ because of the way it looks the first time you open it on OSX. You get a black\
    \ on white interface with no indication whatsoever of what you should do. We are\
    \ not going to lie – the command line interface is puzzling and is mostly designed\
    \ for the power user. The good news is it’s actually pretty easy to become comfortable\
    \ with the command line. The hard part is to know which command to run, with which\
    \ parameters and when, but that will only come with experience and time.\n\nLet’s\
    \ see how we can achieve what we did in the past chapter with creating a release\
    \ build and using the command line.\n\n## Introducing Shenzhen\n\nThe iOS and\
    \ OSX developers’ community is full of remarkable people who keep writing blog\
    \ posts, and releasing libraries and tools that we’ll use in our project. Matt\
    \ Thompson is one of these people.\n\nIn addition to the NSHipster (available\
    \ at [http://nshipster.com](http://nshipster.com/)) website where he writes about\
    \ hidden gems and tips about the “overlooked bits in Objective-C and Cocoa”, he\
    \ created Shenzhen, a command line tool for building IPA files. Shenzhen also\
    \ handles distributing apps to third-party services such as Testflight and HockeyApp,\
    \ but we won’t be talking about over the air (OTA) distribution until Chapter\
    \ 7.\n\nShenzhen is written in Ruby, so the easiest way to install it is to use\
    \ Rubygems. Before we start, make sure you have a recent version of Ruby installed.\
    \ At the time of writing this book, the current stable release of Ruby is 2.1.1.\n\
    \n```\n$ ruby –v\nruby 2.1.1p76 (2014-02-24 revision 45161) [x86_64-darwin13.0]\n\
    ```\n\nOnce again, if you’re still using the installation of Ruby shipped with\
    \ OS X, you should consider upgrading to a more recent one using `rbenv` ([http://rbenv.org/](http://rbenv.org/))\
    \ or `RVM` ([https://rvm.io/](https://rvm.io/)).\n\nTo install Shenzhen, simply\
    \ run the following command:\n\n```\n$ gem install shenzhen\n```\n\nOnce it’s\
    \ installed, a new executable named `ipa` will be available in your terminal.\
    \ Running it without any arguments should give you the following output:\n\n```\n\
    $ ipa\nipa\n\nBuild and distribute iOS apps (.ipa files)\n\nCommands:\n  build\
    \                              Create a new .ipa file for your app\n  distribute:ftp\
    \                     Distribute an .ipa file over FTP\n  distribute:hockeyapp\
    \               Distribute an .ipa file over HockeyApp\n  distribute:s3      \
    \                Distribute an .ipa file over Amazon S3\n  distribute:testflight\
    \              Distribute an .ipa file over testflight\n  help               \
    \                Display global or [command] help documentation.\n  info     \
    \                          Show mobile provisioning information about an .ipa\
    \ file\n\nAliases:\n  distribute                         distribute:testflight\n\
    \  distribute:sftp                    distribute:ftp --protocol sftp\n\nGlobal\
    \ Options:\n  --verbose\n  -h, --help                         Display help documentation\n\
    \  -v, --version                      Display version information\n  -t, --trace\
    \                        Display backtrace when an error occurs\n\nAuthor:\n \
    \ Mattt Thompson <m@mattt.me>\n\nWebsite:\n  [http://mattt.me](http://mattt.me/)\n\
    ```\n\nAs you can see, this tool does a lot of things, but we only care about\
    \ the `build` command. Using the terminal, simply navigate to the root directory\
    \ of the Github Jobs Xcode project and run the `build` command:\n\n```\n$ cd ~/Projects/Apress/Github\\\
    \ Jobs\n$ ipa build -c AdHoc -d ~/Desktop\nxcodebuild Github Jobs.xcworkspace\n\
    xcrun PackageApplication\nzip /Users/Palleas/Projects/Apress/Github Jobs/Github\
    \ Jobs.app.dSYM\n~/Desktop/Github Jobs.ipa successfully built\n```\n\nSo what\
    \ just happened here? Only a couple of things: Shenzhen built the application\
    \ for the AdHoc configuration (the `-c` argument), archived it and created the\
    \ IPA file on your Desktop (the `-d` argument).\n\nWe also used `cd`, a built-in\
    \ command to change the current directory we’re in, just like if we were using\
    \ a Finder window. Congratulations! You’ve done in ten seconds and with one very\
    \ understandable command what we’ve covered in a whole chapter!\n\nTo be fair,\
    \ with Xcode and its release process, we cheated a bit. After all, Shenzhen is\
    \ a full-featured tool written in almost a few hundred lines of Ruby. This is\
    \ the power of command line though. Let’s have a look to the tools provided by\
    \ Xcode.\n\n## Juggling with Multiple Installations of Xcode\n\nLet’s start with\
    \ an easy one, called `xcode-select`. If you remember correctly what we’ve covered\
    \ in Chapter 2, we used this command when we wanted to know which was the version\
    \ of git embedded with Xcode. `xcode-select` is a command line tool used to manage\
    \ the active developer directory for Xcode and the tools that come with it, such\
    \ as `git`, but also `svn`, `clang`, and `make`. Running the following commands\
    \ in your shell will print you the current directory, which is useful if you need\
    \ some of the tools provided by Xcode and don’t want to hardcode the path. Once\
    \ again, go back to Chapter 2 to see how to use the result of this command in\
    \ a script."
