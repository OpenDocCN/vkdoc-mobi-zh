- fmt: "# If There’s One Tip This Book Can Give You\n\nIf there is one tip this book\
    \ can give you, it’s to close `Xcode` during merge operations involving an `Xcode`\
    \ project or an `Xcode workspace` file. Usually, this happens when someone on\
    \ your team is changing a setting in the “provisioning profiles” and/or “code\
    \ signing” sections. As this format is hardly human-readable at all, the results\
    \ from a merge can get ugly and `Xcode` can get a little bit “crashy.”\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Continuous Integration Features in iOS and Xcode\n\nThere are still a couple\
    \ of downsides to this integration directly in the IDE. For starters, it is pretty\
    \ limited. You’ll only be able to do the basic `Git` operations and will probably\
    \ end up using your shell or a dedicated `Git` client. Also, `Xcode` ships its\
    \ own version of `Git`. At the time of writing this book, the current stable version\
    \ of `Git` is the 2.0.1, as shown in a shell after running `git --version`:\n\n\
    ```\n$ git --version\ngit version 1.9.1\n```\n\nThis version can be easily installed\
    \ using a package manager such as `Homebrew` or even compiled and installed manually,\
    \ if you have some spare time on your hands. However, if you open a terminal and\
    \ run a simple command, you should see that the version of `Git` used by `Xcode`\
    \ is Apple’s own version, based on 1.8.5.2:\n\n```\nbash-3.2$ $(xcode-select -print-path)/usr/bin/git\
    \ --version\ngit version 1.8.5.2 (Apple Git-48)\n```\n\nIn most cases, it won’t\
    \ cause any trouble, but incompatibilities between `Xcode`’s `Git` version and\
    \ the one you’re using may arise. This was the case when `Xcode 4` was the current\
    \ version and the latest `Git` was a couple of versions ahead of the one that\
    \ was shipped with it.\n\n**Note About `xcode-select`:** `xcode-select` is one\
    \ of those very useful tools shipped with a bunch of others provided by Apple’s\
    \ official command line tools and is very helpful if you are playing with multiple\
    \ installations of `Xcode`, during betas for example. We’ll talk about this more\
    \ in Chapter 4.\n\n## CocoaPods\n\nSomeone once said, “with great projects come\
    \ huge dependencies” and managing dependencies with external libraries in an iOS\
    \ project has pretty much always been a pain. This is a pain you don’t need in\
    \ your iOS project, but Apple doesn’t seem to be willing to provide an official\
    \ tool besides workspaces, subprojects, and *manually* managing the search paths\
    \ of your dependencies. This was before `CocoaPods`.\n\n`CocoaPods` is a dependency\
    \ manager written in Ruby, unsurprisingly inspired from `RubyGems` ([https://rubygems.org/](https://rubygems.org/)).\
    \ If you don’t know about it but have been writing Ruby in the past, its syntax\
    \ used in the `PodFile`, in which you’ll declare all your dependencies, is really\
    \ easy to understand and should not give you too much of a hard time.\n\nThe use\
    \ of `CocoaPods` really is up for debate in the iOS and Mac community. Whether\
    \ you hate it or love it, in this book we definitely stand with the people who\
    \ love it. In the process of continuously integrating pieces of code, letting\
    \ a well-designed tool handling the management of your dependencies makes something\
    \ less to worry about and gives you more time to focus on other things.\n\nAs\
    \ a bonus, you can actually use `CocoaPods` for a specific application’s dependencies,\
    \ meaning you can use it to split your big application in multiple modules and\
    \ let `CocoaPods` handle the merge.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nOnce again, there is no silver bullet. As it is written on the website, “CocoaPods\
    \ is not ready for prime-time yet.” At the time of writing this book, 0.33.1 is\
    \ the latest version. It’s far from being perfect but it’s a lot better than no\
    \ tools at all. We will be using `CocoaPods` in the sample application.\n\nSpeaking\
    \ of which, let’s code.\n\n## Coding the Sample Application\n\nOpen the “Github\
    \ Jobs” project we created earlier in `Xcode`, select the only view controller\
    \ header class present in the file explorer, and make it an `UITableViewController`\
    \ instead of a simple `UIViewController`. Go to the associated implementation\
    \ file, declare a `jobs` property of type `NSArray`, and implement the required\
    \ methods from `UITableViewDataSource`: `tableView:numberOfRowsInSection:` and\
    \ `tableView:cellForRowAtIndexPath:`. At the end of this process, your implementation\
    \ file should look like this:\n\n```objc\n#import \"PCSViewController.h\"\n\n\
    @interface PCSViewController ()\n\n@property (nonatomic, strong) NSArray *jobs;\n\
    \n@end\n\n@implementation PCSViewController\n\n#pragma mark - Table View\n\n-\
    \ (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n{\n    return\
    \ 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    return self.jobs.count;\n}\n\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView\n         cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n  \
    \  UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"Cell\"\
    \n                                                            forIndexPath:indexPath];\n\
    \    return cell;\n}\n\n@end\n```\n\nThen, open the storyboard file and remove\
    \ the view controller already created by `Xcode`. Instead, drop a new navigation\
    \ controller. It should automatically come with a table view controller. Select\
    \ it and use `PCSViewController` as its class. Select the navigation item and\
    \ change the title to “iOS jobs.” In the `TableViewController`, select the first\
    \ prototype cell and give it the `Cell` reuse identifier to avoid getting an exception\
    \ on run later on. That’s pretty much all there will be in this application. We\
    \ are trying to keep it very simple.\n\nThe `Github Jobs API` is very simple,\
    \ all you need is calling a specific URL to retrieve a JSON-encoded list of iOS\
    \ job offers in New-York. Using the iOS 7.0 new `NSURLSession` API, go back to\
    \ the implementation file of your view controller and fetch content from that\
    \ famous URL in the `viewWillAppear:` method as follows:\n\n```objc\n- (void)viewWillAppear:(BOOL)animated\
    \ {\n    NSURL *url = [NSURL URLWithString:\n                  @\"https://jobs.github.com/positions.json?description=ios&location=NY\"\
    ];\n    NSURLSessionDataTask *jobTask = [[NSURLSession sharedSession] dataTaskWithURL:\n\
    \                                     url completionHandler:^(NSData *data, NSURLResponse\
    \ *response, NSError *error) {\n        dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n            if (error) {\n                UIAlertView *alert = [[UIAlertView\
    \ alloc] initWithTitle: @\"An error occured\"\n                              \
    \                                  message: error.localizedDescription\n     \
    \                                                          delegate: nil\n   \
    \                                                   cancelButtonTitle: @\"Dismiss\"\
    \n                                                      otherButtonTitles: nil];\n\
    \                [alert show];\n                return;\n            }\n     \
    \       NSError *jsonError = nil;\n            self.jobs = [NSJSONSerialization\
    \ JSONObjectWithData: data options: 0 error: &jsonError];\n            [self.tableView\
    \ reloadData];\n        });\n    }];\n    [jobTask resume];\n}\n```\n\nNote that\
    \ we wrapped the whole content of the completion block using a function from Grand\
    \ Central Dispatch (GCD) so all the UI job is performed on the main thread. Don’t\
    \ forget to update the `tableView:cellForRowAtIndexPath:` method to display the\
    \ `title` property of a job.\n\n```objc\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView\n         cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n   \
    \ UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"Cell\"\
    \n                                                            forIndexPath:indexPath];\n\
    \    cell.textLabel.text = self.jobs[indexPath.row][@\"title\"];\n    return cell;\n\
    }\n```\n\nThe application could have been a master-detail application, and selecting\
    \ a row could have opened a detailed page showing the application logo, detailed\
    \ information about the offer, and a direct button helping the user postulate.\
    \ Instead, because a complete application is not the goal of this\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 22](index-21_1.jpg)"
