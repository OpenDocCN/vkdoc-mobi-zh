    ## Building the Github Jobs application


    Go back to the configuration section of your job and remove all the tasks but
    the Source Code Checkout and add a new Script task instead. Fill in the description
    field with “invoking the bash cibuild script” and this time, select “File” as
    the script location. In the “Script file” field, enter `${bamboo.build.working.directory}/bin/cibuild`.
    Note that you could have simply used `bin/cibuild` but using an absolute path
    a) allow us to indicate that multiple global variables are available and b) allow
    us to make sure we are invoking the right script.


    ## Using environment variables


    In order for our script to work, there are two mandatory parameters we need to
    provide our script: the required password, used to unlock the keychain, and the
    build number, used to invoke `agvtool` to bump the build version. We’ve already
    used one of the numerous global variables available during the execution of a
    job in Bamboo: `${bamboo.build.working.directory}`. There is also one available
    containing the build number named `${bamboo.buildNumber}`. These are not environment
    variables per se but runtime variables, which mean that when you’ll use them,
    they will be replaced by their actual values during the execution of the job.
    This is actually a good thing, this way you can choose the list of variable to
    provide your script with, and avoid risks of potential collateral damages.


    In the “Environment variables” field, declare your environment variable using
    the following syntax: `BUILD_NUMBER=${bamboo.buildNumber}`


    Now press “Save”, even if the configuration of the task is not over. You could
    simply add the `PASSWORD` environment variable using the same syntax but once
    again, you do not want to show the password in a build’s log. That’s not very
    secure. Fortunately, you easily can add new runtime variables at the Plan level,
    meaning they will be available for all the jobs contained in that plan.


    Click on the “Plan configuration” link in the left menu and select the “variables”
    tab. Create a new variable named `bamboo.keychain.password` and fill in the value
    field with your password. Note that Bamboo has a pretty clever way of handling
    those variables: if the name of the variable contains the word “password”, the
    value field will automatically become a password field, and every use of the created
    variable will be obfuscated so the password doesn’t appear in the logs. Press
    “Add”, you should see something similar to what’s in Figure [6-6](#index_split_001.html#p105).


    ***Figure 6-6.** A new runtime variable is now available for our default job*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 69](index-106_1.jpg)


    **104** | **CHAPTER 6: Automated builds with Bamboo**


    Our new variable, let’s make it available as an environment variable to our build
    script using the same syntax that we used before:


    `PASSWORD=${bamboo.keychain.password}`


    Note that if you want to make multiple environment variables available to your
    build script, all you need to do is to separate them with spaces.


    The configuration of our job is complete, as you can see in Figure [6-7](#index_split_001.html#p106),
    we kept the settings minimal and managed to put all the critical build processes
    in a simple script that’s easy to maintain.


    ***Figure 6-7.** The configuration of the script task is pretty simple*


    Now that the configuration is complete, click “Save” but before you click the
    “Run” button to re-build the application, we need to take care of something else.
    We mentioned in chapter 5 that it was important to clean after yourself. To do
    that, select the “Source Code Checkout” task and check the “Force Clean Build”
    option. It doesn’t clean the repository per se but actually removes the content
    and reclones everything. Note that this option will increase the build time. Click
    “Save” and then “Run”. Considering our build script has already been battle-tested
    with Jenkins and that all we are doing is invoking the same build script, you
    should see the same big green bar saying the build was a success. As we mentioned
    earlier, Bamboo automatically parse ANSI formatted strings and convert them as
    proper HTML. If you go to the “Logs” tab, you should see a nice output thanks
    to `xcpretty`. There is one downside though, if you want to see or download the
    whole log, you will get plain text content with the ANSI tags left unconverted.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


