- fmt: "很多人认为测试属于某种拥有特殊技能的精英开发者，他们能理解什么是断言。对于一些比较冷门的技术来说，这也许是真的，但对于 iOS 和 OS X 应用程序来说绝非如此，尤其是现在\
    \ Apple 已将自动化测试作为开发过程中的一等公民。你的应用程序会自动带有一个测试目标，运行测试套件只需按一下键。曾几何时，对 iOS 项目进行单元测试很困难，但\
    \ Apple 确保那个时代已经过去了。\n\n一旦你的产品达到一个稳定版本，比如第一个成功上架的版本，你或许有幸能抽出一些时间来清理和重构代码。我们都知道这是怎么回事，每个人都曾为了赶工期而不得不走捷径，采取更务实的方法。正是在这些情况下，你应该强迫自己为你正在编写的“权宜之计”编写一个测试用例。当你日后不得不回头处理这些代码时，了解它们应有的行为将帮助你重写代码，而你的测试套件将帮助你检测是否破坏了某些东西。这就是自动化测试的美妙之处：只要最终结果符合预期，实现方式并不（太）重要。\n\
    \n糟糕的项目经理通常认为，让项目进度加快的一个方法就是不断投入开发者，直到项目完成。我们都知道这完全不符合事实。当现有开发者需要花时间向新加入团队的开发者讲解项目是如何运作的时，问题尤其严重。我们并不是说你应该对新开发者不客气，但一旦你的项目在测试套件方面达到了一定水平，它就会成为你所能写出的最好的项目文档。测试用例描述了应用程序的各个部分。新开发者只需浏览不同的场景，就能更好地理解项目。\n\
    \n请注意，这个“新开发者”也可以看作是“未来的你”（六个月后当你需要回头处理这个项目时）。不要忽视你应用程序中的测试场景：没有人喜欢编写文档。\n\n最后但同样重要的是，观看一个没有失败的测试套件执行过程会带来强烈的满足感。如果对“绿条”的追求很容易让人上瘾，那么能在辛苦工作一天后回到家，知道自己拥有应用程序健康运行的数字化证明，这种价值是无价的。我们中有多少人曾因为一个上线时明知不稳定的功能而失眠？\n\
    \n## 不测试的理由\n\n稍有一点经验，就很难找到不测试的理由，尤其是考虑到我们在上一节中列出的所有优点。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**第 9 章：将单元测试融入开发**\n\n**163**\n\n我们之前提到过，在截止日期很紧的项目中，自动化测试通常是第一个被舍弃的。别担心，你会在下一个迭代中补回来的。但事实上你不会。如果你当时没有抽出时间，那么现在很可能也不会。而且，你等待的时间越长，需要编写或更新的测试就越多，以便让它们通过。自动化测试可以有效减轻压力，让你知道即使项目延期，已经实现的功能也能按预期工作。\n\
    \n说实话，唯一可以接受不编写测试的情况是针对非常简单的项目。在本书开头，我们提到过你必须务实对待你的持续集成平台。单元测试也是如此。不要为了测试而编写测试用例，而是因为它能帮助你创建更好的产品。\n\
    \n## 单元测试\n\n在软件编程中，单元测试是一种用于测试软件源代码中小片段的方法。在面向对象编程范式中，一个单元通常指一个类，每个测试用例意味着一个针对该类中方法运行的场景。\n\
    \n单元测试的概念与语言无关，每种语言通常都有其事实上的单元测试框架：Java 生态系统使用 `JUnit`，PHP 使用 `PHPUnit`，当然，Objective-C\
    \ 使用 `XCTest`。这个框架随 Xcode 5 发布给公众，它取代了 `SenTestingKit`（一个自 Xcode 2 起就捆绑在 Xcode\
    \ 中的旧测试框架）。\n\n我们之前提到过，单元测试现在是 Xcode 项目中的一等公民。本项目的 `iOS` 应用程序是一个非常小的应用程序，但由于单元测试不是本书的核心主题，用它来向你介绍并让你自己动手练习已经足够了。当然，如果你已经是一位经验丰富的开发者，在编写单元测试方面有很强的经验，可以随意跳到我们通过命令行运行测试套件并将其集成到\
    \ `Bamboo`、`Jenkins` 和 `Xcode Server` 的部分。\n\n## Xcode 单元测试集成\n\n打开你的 Xcode 项目，确保导航面板已打开，然后选择顶部菜单中的第\
    \ 5 个标签，那就是“测试导航器”。正如你在图 9-1 中所看到的，你将在这里看到项目中所有可用单元测试的列表。因为我们使用了 Apple 的默认模板，所以生成了一个测试目标，其中包含一个失败的测试用例。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 101](index-164_1.jpg)\n\
    \n**164**\n\n**第 9 章：将单元测试融入开发**\n\n***图 9-1.** 默认项目模板带有一个测试目标和一个失败的测试用例*\n\n\
    要使一个测试用例类显示在此导航器中，它必须继承自 `XCTestCase`（`XCTest` 框架的一个类），尽管隐含的约定是给你的类一个以“Tests”结尾的名称，以便你以后更容易找到你的测试类。测试用例方法也是如此，你的方法名必须以“test”开头，并且不能返回任何值。这些是与\
    \ Xcode 集成工作的条件。\n\n正如你所见，我们的项目不是很大，所以没有太多东西需要测试，但我们会找一些简单的东西。我们希望 web 服务返回的每个职位信息都包装到一个专用类中，以防我们变得贪心并想添加其他职位信息服务提供商。\n\
    \n## 为 `PCSJobOffer` 类添加测试\n\n以防你不记得，以下是 Github Jobs API 返回的职位信息格式：\n\n```json\n\
    {\n  \"url\": \"abced-fghij-klmnop-1234567\",\n  \"company_logo\": \"http://github-jobs.s3.amazonaws.com/abced-fghij-klmnop.png\"\
    ,\n  \"company_url\": \"http://our-company.com\",\n  \"id\": \"abced-fghij-klmnop-1234567\"\
    ,\n  \"created_at\": \"Wed Jun 04 20:06:50 UTC 2014\",\n  \"title\": \"iOS developer\"\
    ,\n  \"location\": \"Bay Area, CA\",\n  \"type\": \"Full Time\",\n  \"description\"\
    : \"Our company is awesome.\",\n  \"how_to_apply\": \"Email your resume to jobs@company.com\"\
    ,\n  \"company\": \"Company, Inc.\"\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 102](index-165_1.jpg)\n\n**第 9 章：将单元测试融入开发**\n\n**165**\n\n当然，我们不需要所有这些字段，因为我们的应用只显示标题和公司。为了举例，我们的\
    \ `PCSJobOffer` 类将包含以下字段：`title`、`location`、`date` 和 `URL`。\n\n## 创建测试用例类\n\n\
    回到 Xcode 并创建这个类。点击“File”，然后选择“New ➤ File”。选择 Objective-C 类，将其命名为 `PCSJobOffer`\
    \ 并保存到你的项目中。在 `PCSJobOffer.h` 文件中，添加我们之前提到的属性，如图 9-2 所示。\n\n***图 9-2.** 包含主要属性的\
    \ PCSJobOffer 类*"
  raw: 'A lot of people think that testing is reserved for some kind of elite developer
    with special skills that help them understand what an assertion is. It may be
    true for some of the more obscure technologies out there but it’s definitely not
    the case for iOS and OSX applications, especially now that Apple made automated
    testing a first-class citizen in the development process. Your application automatically
    comes with a testing target and running your test suite is only a keystroke away.
    There was a time when unit testing an iOS project was hard, but Apple made sure
    that time is over.


    Once you’ve reached a stable version of your product, let’s say the first version
    that made it to the store, you may be lucky enough to have some time dedicated
    to cleaning and refactoring. We all know how that works and everybody has once
    had to cut some corners and use the more pragmatic approach to meeting a deadline.
    It’s in those situations that you should force yourself into writing a test case
    for the hack you’re currently writing. When you have to get back to these pieces
    of code, knowing how they should behave will help you rewrite it and your test
    suite will help you detect that you’ve broken something. That’s the beauty of
    automated testing: the implementation does not matter (much) as long as the end
    result meets the expectations.


    Bad project managers commonly think that one solution to making a project go faster
    is to simply throw developers at it until it’s done. We al know that it couldn’t
    be less true. That’s especial y problematic when the current developers need to
    spend time teaching how the project works to a new developer joining the team.
    We’re not saying that you should be rude to new developers but once your project
    has reached a certain point in terms of the test suite, this wil start acting
    as the best documentation for your project you could ever write. Test cases describe
    various parts of the application. A new developer will simply have to navigate
    through the different scenarios to have a better understanding of the project.


    Note that the new developer could be a metaphor for the future you, when you wil
    have to go back to this project six months from now. Do you not overlook the test
    scenarios in your application: nobody likes writing documentation.


    Last but not least, there is an intense feeling of satisfaction from watching
    the execution of a test suite where no failure happens. If this quest for the
    “green bar” can quickly become addictive, being able to come back home after a
    hard day of work knowing that you have digital proofs of the wel -being of your
    application is priceless. How many of us already had trouble sleeping because
    of a feature in an application that went live when we knew it wasn’t truly stable?


    Reasons not to test


    With a little experience, it becomes difficult to find reasons not to test, especially
    because of all the advantages we listed in the previous section.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 9: Adding Unit testing to the mix**


    **163**


    We mentioned earlier that during projects with hard-to-meet deadlines, automated
    tests are usually the first thing to go. Don’t worry; you will go back to them
    during the next iteration. Only you won’t. If you didn’t take the time back then,
    chances are you won’t take the time now either. Plus, the longer you wait, the
    more tests you’ll have to write or update so they pass. Automated testing can
    take a lot of stress off knowing that even if you’re late, the features that are
    implemented work as expected.


    To be honest, the only acceptable situation in which not writing tests make sense
    is for very simple projects. At the beginning of this book we mentioned that you
    have to be pragmatic with your continuous integration platform. It goes the same
    way for unit testing. Don’t write test cases for the sake of testing, do it because
    it helps you create a better product.


    Unit testing


    In software programming, unit testing is a method used to test small pieces of
    the software’s source code. When you think within the Oriented-Object-Programing
    paradigm, a unit usually means a class and each test case means a scenario that
    runs against methods in the class.


    The concept of unit testing is language-agnostic and each language usually comes
    with is de-facto unit testing framework: JUnit for the java ecosystem, PHPUnit
    for the PHP one, and of course, XCTest for Objective-C. This framework was released
    to the public with Xcode 5 and was a replacement for SenTestingKit, an old testing
    framework bundled with Xcode since Xcode 2.


    We mentioned earlier that unit tests were now first-class citizens in an Xcode
    project. The Github Jobs for iOS application is a really small application, but
    since unit testing is not the core topic of this book, that’s more than enough
    to introduce you to it and let you work on your own. Of course, if you’re already
    an accomplished developer with strong experience in writing unit tests, feel free
    to jump to the part where we run our test suite from the command line and integrate
    it into Bamboo, Jenkins, and the Xcode Server.


    Xcode unit testing integration


    Open your Xcode project, make sure the Navigator panel is open and select the
    5th tab in the top menu, that’s the “test navigator”. As you can see in Figure
    [9-1, this is wher](#index_split_002.html#p164)e you will see the list of all
    the available unit tests in your project. Because we used Apple’s default template,
    a testing target was generated, with a first failed test case.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 101](index-164_1.jpg)


    **164**


    **CHAPTER 9: Adding Unit testing to the mix**


    ***Figure 9-1.** The default project template comes with a testing target and
    a failing test case* To have a test case class show up in this navigator, it has
    to inherit from XCTestCase, a class of the XCTest framework, although the implicit
    convention would be to give your class a name ending with


    “Tests” so it will be easier for you to find your tests classes later. The same
    goes for the test case methods, your method name must start with “test” and must
    not return anything. These are the conditions to have the integration with Xcode
    working.


    As you’ve seen, our project is not very big so there isn’t much to be tested but
    we will find something simple. We want each job offer returned by the web service
    to be wrapped into a dedicated class, just in case we get greedy and want to add
    other job offers service providers.


    Adding tests for the PCSJobOffer class


    In case you don’t remember, here is the format of a job offer returned by the
    Github Jobs api:


    {


    "url": "abced-fghij-klmnop-1234567",


    ["company_logo": "http://github-jobs.s3.amazonaws.com/abced-fghij-klmnop.png",](http://github-jobs.s3.amazonaws.com/abced-fghij-klmnop.png)


    "company_url": " [http://our-company.com](http://our-company.com/)",


    "id": "abced-fghij-klmnop-1234567",


    "created_at": "Wed Jun 04 20:06:50 UTC 2014",


    "title": "iOS developer",


    "location": "Bay Area, CA",


    "type": "Full Time",


    "description": "Our company is awesome.",


    "how_to_apply": "Email your resume to jobs@company.com",


    "company": "Company, Inc."


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 102](index-165_1.jpg)


    **CHAPTER 9: Adding Unit testing to the mix**


    **165**


    Of course we don’t need all these fields because our application only displays
    a title and a company.


    For the sake of the example, our PCSJobOffer class will contain the following
    fields: title, location, date, and URL.


    Creating the test case class


    Go back to Xcode and create this class. Click on “File”, and then select “New
    ➤ File”. Select Objective-C class, call it PCSJobOffer and save it to your project.
    In the PCSJobOffer.h file, add the properties we mentioned earlier, as shown in
    Figure 9-2.


    ***Figure 9-2.** The PCSJobOffer class with the main properties*'
  trans: "\n很多人认为测试属于某种拥有特殊技能的精英开发者，他们能理解什么是断言。对于一些比较冷门的技术来说，这也许是真的，但对于 iOS 和 OS X\
    \ 应用程序来说绝非如此，尤其是现在 Apple 已将自动化测试作为开发过程中的一等公民。你的应用程序会自动带有一个测试目标，运行测试套件只需按一下键。曾几何时，对\
    \ iOS 项目进行单元测试很困难，但 Apple 确保那个时代已经过去了。\n\n一旦你的产品达到一个稳定版本，比如第一个成功上架的版本，你或许有幸能抽出一些时间来清理和重构代码。我们都知道这是怎么回事，每个人都曾为了赶工期而不得不走捷径，采取更务实的方法。正是在这些情况下，你应该强迫自己为你正在编写的“权宜之计”编写一个测试用例。当你日后不得不回头处理这些代码时，了解它们应有的行为将帮助你重写代码，而你的测试套件将帮助你检测是否破坏了某些东西。这就是自动化测试的美妙之处：只要最终结果符合预期，实现方式并不（太）重要。\n\
    \n糟糕的项目经理通常认为，让项目进度加快的一个方法就是不断投入开发者，直到项目完成。我们都知道这完全不符合事实。当现有开发者需要花时间向新加入团队的开发者讲解项目是如何运作的时，问题尤其严重。我们并不是说你应该对新开发者不客气，但一旦你的项目在测试套件方面达到了一定水平，它就会成为你所能写出的最好的项目文档。测试用例描述了应用程序的各个部分。新开发者只需浏览不同的场景，就能更好地理解项目。\n\
    \n请注意，这个“新开发者”也可以看作是“未来的你”（六个月后当你需要回头处理这个项目时）。不要忽视你应用程序中的测试场景：没有人喜欢编写文档。\n\n最后但同样重要的是，观看一个没有失败的测试套件执行过程会带来强烈的满足感。如果对“绿条”的追求很容易让人上瘾，那么能在辛苦工作一天后回到家，知道自己拥有应用程序健康运行的数字化证明，这种价值是无价的。我们中有多少人曾因为一个上线时明知不稳定的功能而失眠？\n\
    \n## 不测试的理由\n\n稍有一点经验，就很难找到不测试的理由，尤其是考虑到我们在上一节中列出的所有优点。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**第 9 章：将单元测试融入开发**\n\n**163**\n\n我们之前提到过，在截止日期很紧的项目中，自动化测试通常是第一个被舍弃的。别担心，你会在下一个迭代中补回来的。但事实上你不会。如果你当时没有抽出时间，那么现在很可能也不会。而且，你等待的时间越长，需要编写或更新的测试就越多，以便让它们通过。自动化测试可以有效减轻压力，让你知道即使项目延期，已经实现的功能也能按预期工作。\n\
    \n说实话，唯一可以接受不编写测试的情况是针对非常简单的项目。在本书开头，我们提到过你必须务实对待你的持续集成平台。单元测试也是如此。不要为了测试而编写测试用例，而是因为它能帮助你创建更好的产品。\n\
    \n## 单元测试\n\n在软件编程中，单元测试是一种用于测试软件源代码中小片段的方法。在面向对象编程范式中，一个单元通常指一个类，每个测试用例意味着一个针对该类中方法运行的场景。\n\
    \n单元测试的概念与语言无关，每种语言通常都有其事实上的单元测试框架：Java 生态系统使用 `JUnit`，PHP 使用 `PHPUnit`，当然，Objective-C\
    \ 使用 `XCTest`。这个框架随 Xcode 5 发布给公众，它取代了 `SenTestingKit`（一个自 Xcode 2 起就捆绑在 Xcode\
    \ 中的旧测试框架）。\n\n我们之前提到过，单元测试现在是 Xcode 项目中的一等公民。本项目的 `iOS` 应用程序是一个非常小的应用程序，但由于单元测试不是本书的核心主题，用它来向你介绍并让你自己动手练习已经足够了。当然，如果你已经是一位经验丰富的开发者，在编写单元测试方面有很强的经验，可以随意跳到我们通过命令行运行测试套件并将其集成到\
    \ `Bamboo`、`Jenkins` 和 `Xcode Server` 的部分。\n\n## Xcode 单元测试集成\n\n打开你的 Xcode 项目，确保导航面板已打开，然后选择顶部菜单中的第\
    \ 5 个标签，那就是“测试导航器”。正如你在图 9-1 中所看到的，你将在这里看到项目中所有可用单元测试的列表。因为我们使用了 Apple 的默认模板，所以生成了一个测试目标，其中包含一个失败的测试用例。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 101](img/index-164_1.jpg)\n\
    \n**164**\n\n**第 9 章：将单元测试融入开发**\n\n***图 9-1.** 默认项目模板带有一个测试目标和一个失败的测试用例*\n\n\
    要使一个测试用例类显示在此导航器中，它必须继承自 `XCTestCase`（`XCTest` 框架的一个类），尽管隐含的约定是给你的类一个以“Tests”结尾的名称，以便你以后更容易找到你的测试类。测试用例方法也是如此，你的方法名必须以“test”开头，并且不能返回任何值。这些是与\
    \ Xcode 集成工作的条件。\n\n正如你所见，我们的项目不是很大，所以没有太多东西需要测试，但我们会找一些简单的东西。我们希望 web 服务返回的每个职位信息都包装到一个专用类中，以防我们变得贪心并想添加其他职位信息服务提供商。\n\
    \n## 为 `PCSJobOffer` 类添加测试\n\n以防你不记得，以下是 Github Jobs API 返回的职位信息格式：\n\n```json\n\
    {\n  \"url\": \"abced-fghij-klmnop-1234567\",\n  \"company_logo\": \"http://github-jobs.s3.amazonaws.com/abced-fghij-klmnop.png\"\
    ,\n  \"company_url\": \"http://our-company.com\",\n  \"id\": \"abced-fghij-klmnop-1234567\"\
    ,\n  \"created_at\": \"Wed Jun 04 20:06:50 UTC 2014\",\n  \"title\": \"iOS developer\"\
    ,\n  \"location\": \"Bay Area, CA\",\n  \"type\": \"Full Time\",\n  \"description\"\
    : \"Our company is awesome.\",\n  \"how_to_apply\": \"Email your resume to jobs@company.com\"\
    ,\n  \"company\": \"Company, Inc.\"\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 102](img/index-165_1.jpg)\n\n**第 9 章：将单元测试融入开发**\n\n**165**\n\n当然，我们不需要所有这些字段，因为我们的应用只显示标题和公司。为了举例，我们的\
    \ `PCSJobOffer` 类将包含以下字段：`title`、`location`、`date` 和 `URL`。\n\n## 创建测试用例类\n\n\
    回到 Xcode 并创建这个类。点击“File”，然后选择“New ➤ File”。选择 Objective-C 类，将其命名为 `PCSJobOffer`\
    \ 并保存到你的项目中。在 `PCSJobOffer.h` 文件中，添加我们之前提到的属性，如图 9-2 所示。\n\n***图 9-2.** 包含主要属性的\
    \ PCSJobOffer 类*\n"
- fmt: "We don’t have to do anything else for now, the class exists with its first\
    \ properties declared, which would be almost too much if we wanted to follow the\
    \ Test-Driven-Development method (TDD).\n\nWe only created the implementation\
    \ file before the test case class to avoid an unnecessary “file not found” and\
    \ “Use of undeclared identifier `PCSJobOffer`” errors in Xcode.\n\n**Note:** The\
    \ Test-Driven Development method (TDD) is a well-known way of developing an application.\n\
    \nBasically, it consists of writing the test cases before anything else, and then\
    \ implementing the required code to make those tests pass while working on the\
    \ actual implementation. If you want to know more about Test-Driven Development\
    \ in iOS, Graham Lee (a.k.a. `@secboffin`) wrote an awesome book on the subject,\
    \ available at the following URL:\n\n[http://www.amazon.com/Test-Driven-iOS-Development-Developers-Library/dp/0321774183](http://www.amazon.com/Test-Driven-iOS-Development-Developers-Library/dp/0321774183)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## Adding Unit testing to\
    \ the mix\n\nWe are now ready to create the associated test case class that will\
    \ make sure that the `PCSJobOffer` class, when fed with the proper JSON dictionary,\
    \ will extract the title, location, date, and URL properties and store them properly.\
    \ Let’s create the `PCSJobOfferTests`. Click on the File menu and select “New\
    \ ➤ File”. From the template panel, select “Objective-C test case class”. Call\
    \ it `PCSJobOfferTests`, make sure it’s a subclass of the `XCTestCase` class,\
    \ select the “GithubJobs Tests” folder when asked for the path to store the file\
    \ and press the “Save” button. While you’re at it, remove the `Github_JobsTests.m`\
    \ file, as it’s a failing test case anyway. Note that there’s no header file for\
    \ your test cases for these classes, as they will never be called directly.\n\n\
    In this class, we will only have one test case to make sure the content of the\
    \ JSON dictionary given to the `PCSJobOffer` class initializer will end up in\
    \ a properly mapped object. We mentioned earlier that in the OOP paradigm, a test\
    \ case was actually a **method** in a test case **class**. In the `PCSJobOfferTests.m`\
    \ file, remove the `testExample` method that came with the file and create a test\
    \ method called `testThatDictionaryIsProperlyMappedToProperties` instead.\n\n\
    There’s no such thing as a too verbose test class, especially in Objective-C where\
    \ it’s not rare to meet 100 characters long method signatures. When you write\
    \ a test case, you have to imagine that you or somebody else will probably read\
    \ those tests later. They have to be so explicit that you can understand exactly\
    \ what is being tested.\n\nA working test case will feed a known input to a unit\
    \ of code and compare the result of a method’s execution to an expected result.\
    \ In our case, the known input would be the JSON we’ve shown earlier containing\
    \ the information about the job and the unit of code would be the `PCSJobOffer`\
    \ initializer.\n\nFirst we need to retrieve the JSON payload. The input we feed\
    \ to the class must be something we know. Because of the obvious latency and the\
    \ impossibility of predicting the exact list of resulting job offers, we have\
    \ to store this JSON in a file that will be loaded before each is actually run.\
    \ Select `File ➤ New ➤ File`, choose “Empty” from the “Other” section. Name the\
    \ file `job.json` and save it in the Github JobsTests folder, so we can load it\
    \ in the next section. In the `job.json` file, paste the JSON payload we mentioned\
    \ earlier. Note that if you’re reading the paper version of this book, this may\
    \ be a little hard. Simply remember that the project is available on Github and\
    \ that you can fetch the content from here: [https://github.com/Palleas/Github-Jobs/blob/master/Github%20JobsTests/job.json](https://github.com/Palleas/Github-Jobs/blob/master/Github%20JobsTests/job.json)\n\
    \nNotice that each test case class comes with a `setUp` and a `tearDown` method.\
    \ These methods will respectively be called before and after every test case.\
    \ This means that our test file will be loaded every time. This may seem like\
    \ a waste of resources to you but that’s really not your concern in this particular\
    \ situation. Add an `NSDictionary` `jobPayload` property to the `PCSJobOfferTests`\
    \ class and in the `setUp` method, write the following code:\n\n```\n- (void)setUp\n\
    {\n    [super setUp];\n    NSString *path = [[NSBundle bundleForClass: [self class]]\
    \ pathForResource: @\"job\" ofType: @\"json\"];\n    NSData *content = [NSData\
    \ dataWithContentsOfFile: path];\n    NSError *jsonError = nil;\n    self.jobPayload\
    \ = [NSJSONSerialization JSONObjectWithData: content options: 0 error: &jsonError];\n\
    \    XCTAssertNil(jsonError, @\"The Job payload should be loaded without error,\
    \ got %@\", jsonError);\n    XCTAssertNotNil(self.jobPayload, @\"The job payload\
    \ should be properly loaded\");\n    XCTAssertTrue([self.jobPayload isKindOfClass:\
    \ [NSDictionary class]], @\"Job payload should be a dictionary\");\n}\n```\n\n\
    What are we doing here? First, we retrieve the path to the JSON file using the\
    \ `NSBundle` method. Note that we are not using the `[NSBundle mainBundle]` singleton\
    \ because, in this particular context, we are not trying content from the main\
    \ bundle, which is your application. In our case, everything that is about our\
    \ test case is contained in a different bundle, that’s why we use the `bundleForClass:`\
    \ method. Then, we load the content of this file into a variable of type `NSData`\
    \ named `content` and we use the `NSJSONSerialization` class to turn these bytes\
    \ into a valid `NSDictionary`.\n\nIn this situation we’re actually loading the\
    \ JSON payload by hand but in case you wanted to test objects wrapping the call\
    \ to the network, there are really good libraries such as `OHHTTPStubs` (available\
    \ at [https://github.com/AliSoftware/OHHTTPStubs](https://github.com/AliSoftware/OHHTTPStubs))\
    \ that will intercept the actual networking call.\n\nWhat’s next is more interesting\
    \ though. These functions starting with `XCT` are called assertions and if a certain\
    \ condition is not respected (object actually nil when it shouldn’t be, condition\
    \ evaluating to true when it shouldn’t...), an exception will be thrown, marking\
    \ the assertion and the test case as failed. If we are using these assertions\
    \ right now, it’s because we want the test to fail early. There is nothing worse\
    \ than a test failing because of an initial condition declared incorrectly.\n\n\
    In the `tearDown` method, add the following code:\n\n```\n- (void)tearDown\n{\n\
    \    self.jobPayload = nil;\n    [super tearDown];\n}\n```\n\nNothing fancy here,\
    \ we are simply resetting the content of the `jobPayload` property to nil before\
    \ the next test case is run, even if we know that it will be overridden in the\
    \ next execution of the `setUp` method. We are now ready to write the actual test.\n\
    \nIn the `testThatDictionaryIsProperlyMappedToProperties` method, add the following\
    \ code:\n\n```\n- (void)testThatDictionaryIsProperlyMappedToProperties {\n   \
    \ PCSJobOffer *offer = [[PCSJobOffer alloc] initWithPayload: self.jobPayload];\n\
    \    XCTAssertEqualObjects([NSURL URLWithString: @\"http://jobs.github.com/positions/abced-fghij-klmnop-1234567\"\
    ], offer.url, @\"URL should be http://jobs.github.com/positions/abced-fghij-klmnop-1234567\"\
    );\n    XCTAssertEqualObjects(@\"iOS developer\", offer.title, @\"Title of the\
    \ job offer should be \\\"iOS developer\\\"\");\n    XCTAssertEqualObjects(@\"\
    Bay Area, CA\", offer.location, @\"Location of the job offer should be \\\"Bay\
    \ Area, CA\\\"\");\n}\n```\n\nNote that the `initWithPayload` initializer doesn’t\
    \ exist for the `PCSJobOffer` class, so create an empty one for now:"
