- fmt: 'Once this command has executed, you should see a lot more instructions on
    your screen and a final “Build succeeded” message. Congratulations, you have built
    your iOS application using the command line. At this point, the application is
    not actually usable. As we’ve said earlier, we’ve simply recreated what happens
    when you hit ⌘ + B in Xcode, not ⌘ + R (Run) and certainly not ⌘ + B (Archive).
    There are a few steps missing before being able to send a build of our application,
    the final step of our process.


    Still, we are now able to build the application and that’s a first indicator of
    the current state of the application. Once we set up our continuous integration
    platform, we will be able to detect if, after you or one of your coworkers did
    some work on the application, the application is still able to build.


    That’s not much feedback helping you to decide if you should integrate this piece
    of code in the application, but it is the most important one.


    The question you may be asking yourself right now is why have we done all that
    and written so much when we could have given you the right command directly? The
    answer is that you need to be able to understand how the `xcodebuild` command
    works if you expect to use it as part of your continuous integration process.
    Being able to dig into the huge output of `xcodebuild` will allow you to understand
    why an application won’t build.


    Still, `xcodebuild`’s output still looks like gibberish to the most experienced
    iOS and OSX developers out there. Having to dig into a huge blob of text to understand
    why an application won’t build is annoying and, most importantly, time consuming.
    This is why we started to see alternative building tools like `xctool`.


    ## Building the Application Using Xctool


    Don’t worry; we will go straight to the point this time. `xctool` is a replacement
    for Apple’s `xcodebuild` that makes it easier to build and test iOS and OSX applications
    from the command line. Created and maintained by Facebook, its goal is to provide
    a more human readable output when building an application and comes with nice
    features that make it especially helpful for continuous integration.


    For a while, `xctool` was also the only solution available to run the unit tests
    of an iOS application from the command line. 5.1 fixed that and it is now possible
    to use the `xcodebuild` “test” build action with iOS projects.


    To install `xctool`, simply clone it somewhere in your computer. For the example,
    we have created a `Tools` folder in our `$HOME` directory and cloned it there.


    ```

    $ mkdir ~/Tools

    $ cd ~/Tools

    $ git clone git@github.com:facebook/xctool.git

    $ cd xctool

    ```


    The `xctool` repository contains a lot of files but it’s the `xctool.sh` file
    that interests us the most: all the commands will be run using this shell script.
    Cloning the repository is not enough to be able to use `xctool` in our project:
    you still have to build it. Don’t be afraid though, you won’t be using some complex
    build process you sometimes see in the documentation of open source projects.
    In the case of `xctool`, it goes straight to the point: `xctool` will build itself
    the first time you call it. The irony here is that `xctool` is built using...
    `xcodebuild`.


    Let’s start by asking the current version of `xctool`.


    ```

    $ ./xctool.sh -version

    === BUILDING XCTOOL ===

    /Users/Palleas/Tools/xctool/scripts/build.sh

    ✓ Built xctool (98000 ms)

    0.1.15

    ```


    Now that we have a valid installation of `xctool`, let’s go back to the directory
    were the Github Jobs project is stored and build the application from there. Note
    that there are other ways of installing `xctool`, the easier way is probably to
    use `Homebrew`, a package manager for OSX written in Ruby that will make your
    life a lot easier. If you haven’t already, you should go grab it at [http://brew.sh/](http://brew.sh/).'
