    此命令执行后，屏幕上应显示大量指令信息，并在最后看到“构架成功”的提示。恭喜你，你已经通过命令行成功构建了 iOS 应用程序。不过，此时应用程序实际上还不可用。正如我们之前所说，这仅仅是模拟了在
    Xcode 中按下 ⌘ + B 时的操作，而不是 ⌘ + R（运行），更不是 ⌘ + B（归档）。在能够发送应用程序的构建版本之前，还缺少几个步骤，这也是整个流程的最后阶段。


    尽管如此，现在我们已经能够构建应用程序了，这是判断应用程序当前状态的首要指标。一旦搭建好持续集成平台，我们就能够检测到：在你或同事对应用程序进行修改后，应用程序是否依然能够成功构建。


    虽然这些反馈信息对于判断是否应该将这段代码集成到应用程序中帮助有限，但它却是最重要的一个环节。


    你现在可能会问：既然可以直接给出正确的命令，为什么我们还要绕这么大弯子写这么多内容？答案在于：如果你想将 `xcodebuild` 命令作为持续集成流程的一部分来使用，就必须理解其工作原理。只有能够深入分析
    `xcodebuild` 产生的大量输出信息，你才能明白应用程序为何构建失败。


    然而，即使是经验丰富的 iOS 和 OSX 开发者，也会觉得 `xcodebuild` 的输出如同天书。要从海量文本中找出构建失败的原因不仅令人恼火，更关键的是非常耗时。正因如此，像
    `xctool` 这样的替代构建工具应运而生。


    ## 使用 Xctool 构建应用


    别担心，这次我们直接切入正题。`xctool` 是苹果 `xcodebuild` 的替代工具，能让你更轻松地通过命令行构建和测试 iOS 及 OSX 应用程序。它由
    Facebook 创建并维护，旨在提供更易读的构建输出信息，并具备一些对持续集成特别有用的功能。


    在相当长一段时间里，`xctool` 也是从命令行运行 iOS 应用程序单元测试的唯一解决方案。苹果在 Xcode 5.1 中修复了这个问题，现在 iOS
    项目也可以使用 `xcodebuild` 的“test”构建操作了。


    要安装 `xctool`，只需将其克隆到计算机的某个目录下。例如，我们在 `$HOME` 目录下创建了一个 `Tools` 文件夹，然后将其克隆到该目录中。


    ```

    $ mkdir ~/Tools

    $ cd ~/Tools

    $ git clone git@github.com:facebook/xctool.git

    $ cd xctool

    ```


    `xctool` 仓库包含大量文件，但对我们最重要的是 `xctool.sh` 文件：所有命令都将通过这个 shell 脚本来运行。仅克隆仓库还不足以在项目中使用
    `xctool`：你还需要构建它。不过别担心，你无需使用开源项目文档中常见的复杂构建流程。对于 `xctool` 来说，过程非常直接：它会在首次调用时自行构建。讽刺的是，`xctool`
    本身正是通过 `xcodebuild` 来构建的。


    我们先来查询 `xctool` 的当前版本。


    ```

    $ ./xctool.sh -version

    === 构建 XCTOOL ===

    /Users/Palleas/Tools/xctool/scripts/build.sh

    ✓ 成功构建 xctool（耗时 98000 毫秒）

    0.1.15

    ```


    现在我们已经成功安装了 `xctool`，回到 Github Jobs 项目所在的目录，并在此处构建应用程序。需要注意的是，还有其他安装 `xctool`
    的方法，最简便的方式可能是使用 `Homebrew`——这是一个用 Ruby 编写的 OSX 包管理器，能大幅简化你的工作。如果你尚未安装，建议立即访问 [`brew.sh/`](http://brew.sh/)
    进行安装。

