    # 比这更重要


    更重要的是，这表明你可以实现具有多种用途的自定义构建阶段。要添加新的构建阶段，请选择 `Editor ➤ Add Build Phase ➤ Add Run
    Script Build Phase`。底部会出现一个新阶段，其中包含一个文本字段，供你选择首选的 shell（大多数情况下为 `sh` 或 `bash`），以及一个用于输入脚本的文本区域。这个脚本可以做任何事情——从递增构建编号，到在应用主图标上打印当前
    Git 分支的名称。在第十章讨论质量保证时，这将带来若干优势。


    ## 总结


    我们已经向你展示了 Xcode 配备了所有必要的工具，用于搭建一个相当不错的持续集成环境，从版本控制系统集成到测试工具。现在，我们准备回答构建过程之后的一个问题：我该如何处理我的构建产物？


    下一章将向你展示如何简单地将应用分发给你的团队。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ---


    # 第三章：使用 Xcode 在 App Store 之外发布应用


    现在我们需要问自己的问题是：“我现在该如何处理我的应用？”在上一章中，我们创建了一个简单的应用，它展示了纽约附近的一些 iOS 职位信息。这个应用足够简单，可以在一个章节内完整讲解和开发，同时利用我们所有可用的工具（无论是否直接集成在
    Xcode 中）。


    这个示例应用远未达到可以公开发布的程度。老实说，苹果审核团队快速扫一眼这个应用，可能就会让他们在点击大大的红色“拒绝”按钮之前笑出声来。假设确实存在这样一个按钮，而且它是红色的。正因如此，在流程的现阶段，你开始需要来自团队的反馈。让我们看看如何利用
    Xcode 获取这些反馈。


    ## 我们需要什么


    为了让我们的团队测试应用并向我们发送反馈，我们需要在测试设备上安装应用的构建版本。如果你正在阅读本书，你可能已经在 App Store 上发布过应用，现在正试图将你的流程提升到新的水平。这意味着你可能已经创建过不止一个用于提交到
    App Store 的构建版本。接下来的页面对你来说可能会感觉似曾相识。如果你没有兴趣进行“回归基础”的环节，请直接跳转到下一章，我们将在那里玩转命令行工具。


    ---


    **29**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 32](img/index-33_1.jpg)


    **30**


    **第三章：使用 Xcode 在 App Store 之外发布应用**


    在第二章中，我们解释了为什么你应该始终为应用创建多个环境。在我们的案例中，我们有一个简单的应用，包含 `Debug`、`Adhoc` 和 `Release`
    配置。由于我们正在发布应用的第一个版本，且不使用 App Store，我们将使用 `AdHoc` 配置。


    ## 准备发布应用


    我们使用的模板带有关于应用的默认值，例如版本号设置为 `1.0`。`1.0` 的定义以及从开发者角度来看它意味着什么，可能会引发一场有趣的辩论。例如，在 SCRUM
    方法论中，“完成”的定义必须在实际开始项目工作之前就明确界定。在这种情况下，这通常意味着需要为功能列出一份清晰简洁的清单，你的团队所有成员必须遵守这些清单才能称之为“完成”。按照惯例，`1.0`
    版本通常意味着“足够好”的版本，是可以向公众发布的版本。坦白说，我们离 `1.0` 版本还差得远。实际上，我们更接近 `0.1` 版本，一个我们还没准备好向任何人展示的版本。


    即使我们只瞄准 `1.0` 版本，iOS 应用也有两个版本号：短版本号称为“市场”版本，长版本号称为“构建”版本。在 `Info.plist` 文件中，这两个版本分别被称为
    `Bundle versions` 和 `Bundle version string, short`。让我们将短版本号和长版本号都设置为 `0.1`。当我们创建新的内部构建时，我们只会增加构建版本号。要更改应用的版本，请打开
    `Github JobsInfo.plist` 文件并更改值，如图 3-1 所示。


    ***图 3-1.** Github Jobs 配置文件，版本号设置为 0.1*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **第三章：使用 Xcode 在 App Store 之外发布应用** **31**


    ### 关于版本号


    Xcode，更具体地说是 iOS 应用归档文件，设计得足够完善，允许你保持版本号有意义。如果你不确定应该使用什么版本号，阅读 `semver.org` 上提供的语义化版本规范可能是一个好的开始。它并没有听起来那么无聊！


    现在我们有了应用的 `0.1` 版本。它并不美观，除了加载一个简单的 JSON 文件并在表格视图中显示结果之外，也做不了太多事情。我们之前提到，阅读本书就像踏上一段旅程。好吧，我们现在拥有应用的最早版本，这是开始设置项目持续集成的好时机。能够每天多次构建应用并将构建版本发送给选定的用户群体，其核心目的就是为了收集反馈。让我们从一个重要的反馈开始，它有助于我们理解应用为何崩溃，也就是崩溃日志。


    ## 从崩溃日志收集反馈


    一旦你的构建版本交付给 QA 团队、beta 测试人员或客户，你希望获得多种类型的反馈。一种是关于用户体验瑕疵和界面设计决策的明显反馈，另一种则是关于应用如何崩溃的反馈。一旦收集并转换成人类可读的格式，崩溃日志或崩溃报告看起来像这样（实际上比这要长得多，但我们只展示有趣的部分）：


    ```

    Incident Identifier: 9A230C6E-370E-413E-801C-D1182081BFDA

    Hardware Model: iPhone3,1

    Process: Github Jobs [2001]

    Path: /var/mobile/Applications/D4B64242-327D-486C-A2A6-ABBDB76F7B92/Github Jobs.app/Github
    Jobs

    Identifier: com.perfectly-cooked.Github-Jobs

    Version: 1.0 (1.0.1)

    Code Type: ARM (Native)

    Parent Process: launchd [1]

    Date/Time: 2013-12-15 13:12:32.342 -0500

    OS Version: iOS 7.0.4 (11B554a)

    Report Version: 104

    Exception Type: EXC_BAD_ACCESS (SIGSEGV)

    Exception Subtype: KERN_INVALID_ADDRESS at 0x0000000f

    Triggered by Thread: 2


    Thread 0:

    0 CoreData

    0x30906a1c -[NSSQLCore _externalDataLinksDirectory] + 0

    1 CoreData

    0x308f3d8a -[NSPersistentStoreCoordinator dealloc] + 702

    2 libobjc.A.dylib

    0x3ae93b06 objc_object::sidetable_release(bool) + 170

    3 Traffic

    0x000d1446 0x73000 + 386118

    4 libobjc.A.dylib

    0x3ae93b06

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 33](img/index-35_1.jpg)


    **32**


    **第三章：使用 Xcode 在 App Store 之外发布应用**

