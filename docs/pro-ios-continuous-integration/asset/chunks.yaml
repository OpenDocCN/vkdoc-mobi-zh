    **52**


    **CHAPTER 4: Invoking the Power of the Command Line**


    The first thing to note is that the output of xctool is much more clear. No longer
    a huge, hard to understand pile of text, you now have a grouped output of all
    the major steps of the build process.


    If you’ve run the command on your computer too, you should have noticed that the
    output also comes with colors.


    The advantages of xctool are numerous. It is one thing to be all shiny and pretty,
    it is a whole other thing to provide actually helpful features. xctool provides
    different reporters in addition to the pretty (default) one, making it easier
    to integrate with continuous integration tools such as Jenkins, which we will
    cover in the next chapter. It also supports a JSON-based configuration file format
    so calling xctool stops being a pain. To use it, simply create a “.xctool-args”
    file with the following content:


    [


    "-workspace", "Github Jobs.xcworkspace",


    "-scheme", "Github Jobs",


    "-configuration", "AdHoc"


    ]


    Thanks to this file, it is now possible to invoke xctool without option or argument
    and have it build the application using the proper workspace and scheme.


    Even if xctool is a real y great tool, you have to remember once again that this
    is no silver bul et.


    As mentioned earlier, xctool is an alternative building solution for iOS and OSX
    projects to the Apple’s xcodebuild, maintained by Facebook. For example, this
    means the tool could break with new releases of the Apple developer tools. In
    fact, for a long time, Xctool was not able to build Xcode 5.1 projects.


    That is why you should also consider other solutions such as xcpretty. Its creator,
    Marin Usalj chose a different approach. Instead of creating a new build tool to
    fix the output readability problem, he chose to format it and make it pretty.


    Formatting **xcodebuild** output using xcpretty


    The easiest way to install xcpretty is, just like any other Ruby tool, to use
    Rubygem.


    $ gem install xcpretty


    Using xcpretty is then really straightforward. All you have to do is leverage
    a shell functionality called pipes.


    $ xcodebuild -workspace Github\ Jobs.xcworkspace -scheme Github\ Jobs –configuration
    AdHoc build |


    xcpretty –c


    ▸ Building Pods/Pods-Github Jobs-SVProgressHUD [AdHoc]


    ▸ Precompiling Jobs-SVProgressHUD-prefix.pch


    ▸ Precompiling Jobs-SVProgressHUD-prefix.pch


    ▸ Precompiling Jobs-SVProgressHUD-prefix.pch


    ▸ Precompiling Jobs-SVProgressHUD-prefix.pch


    ▸ Precompiling Jobs-SVProgressHUD-prefix.pch


    ▸ Precompiling Jobs-SVProgressHUD-prefix.pch


    ▸ Compiling Pods-Github\ Jobs-SVProgressHUD-dummy.o Pods-Github\ Jobs-SVProgressHUD-dummy.m


    ▸ Compiling Pods-Github\ Jobs-SVProgressHUD-dummy.o Pods-Github\ Jobs-SVProgressHUD-dummy.m


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 4: Invoking the Power of the Command Line**


    **53**


    ▸ Compiling SVProgressHUD.m


    ▸ Compiling SVProgressHUD.m


    ▸ Compiling Pods-Github\ Jobs-SVProgressHUD-dummy.o Pods-Github\ Jobs-SVProgressHUD-dummy.m


    ▸ Compiling SVProgressHUD.m


    ...


    The output, once formatted, is pretty similar to the one generated by xctool:
    grouped into the main steps of the build and the –c option adds some color to
    the output. Just like xctool, it also provides multiple formatters, such as junit
    to easily integrate – like xctool – with Jenkins but also html, tap, or rspec.


    The goal of this chapter is not to tell you that xcpretty does a better job than
    xctool, it’s only about giving you the alternatives. Both of these solutions are
    about providing a better output, especially the junit one that will come in handy
    when we set up our unit tests in Jenkins and Bamboo in the following chapters.


    Anatomy of an Xcode Project File and Scheme Sharing


    Now that you’ve discovered how to build an iOS application from the command line
    using two different tools, you may have noticed a common behavior from both: they
    all need a valid Xcode project file or workspace (which is basically a glorified
    folder of Xcode projects) and more importantly, they both need a valid scheme.


    You’ve already worked with Xcode targets, knowingly or not. A target specifies
    the product to build and how to build it using build phases such as compiling
    sources, copying headers and resources, and linking frameworks and build settings.
    In our “Github Jobs” Xcode project, we already have two targets - one for the
    main application and one that runs the unit tests. You can have as many targets
    as you see fit, and some targets can depend on others. A scheme is basically a
    collection of targets, among other things and can be stored at different levels:
    project level and workspace level. You can see a list of all the available schemes
    from the command line by using the -list argument of the xcodebuild command.


    $ xcodebuild -list


    Information about project "Github Jobs":


    Targets:


    Github Jobs


    Github JobsTests


    Build Configurations:


    Debug


    AdHoc


    Release


    If no build configuration is specified and -scheme is not passed then "Release"
    is used.


    Schemes:


    Github Jobs


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **54**


    **CHAPTER 4: Invoking the Power of the Command Line**


    If you run the same command within the workspace file, you should only see the
    schemes that were automatically generated by Cocoapods when it created the workspace
    the first time you ran the pod install command.


    xcodebuild -list -workspace Github\ Jobs.xcworkspace


    Information about workspace "Github Jobs":


    Schemes:


    Pods-Github Jobs


    Pods-Github Jobs-SVProgressHUD


    In our case, we only care about the “Github Jobs” scheme. That is the one we’ve
    been using so far.


    By the way, don’t let the message about the “Release” configuration fool you;
    you actually need to pass a valid scheme argument to the xcodebuild command when
    your project uses a workspace.


    In fact, if you don’t, you will get the following error:


    $ xcodebuild -workspace Github\ Jobs.xcworkspace build xcodebuild: error: If you
    specify a workspace then you must also specify a scheme. Use -list to see the
    schemes in this workspace.'
  trans: "\nHomebrew 需要 Xcode 命令行工具才能正常运行，因此如果你不记得如何轻松安装它们，请返回前几页查看！\n\n我们已经将 `xctool`\
    \ 安装在 `~/Tools/xctool` 目录中。这就是为什么我们应该使用相对路径来调用 `xctool.sh` 脚本，如下所示：\n\n```\n$\
    \ ~/Tools/xctool/xctool.sh -v\n0.1.15\n```\n\n不过，这显然不是理想的做法。这就是为什么我们将使用另一个名为 `$PATH`\
    \ 的环境变量。此变量包含一个由冒号分隔的列表，列出了用户可访问的所有包含可执行工具的目录。让我们将 `xctool` 的安装文件夹添加到这个列表中。\n\n\
    ```\n$ export PATH=$HOME/Tools/xctool:$PATH\n```\n\n请注意，无法简单地向此路径变量中推送一个值，这就是我们只是将\
    \ `~/Tools/xctool` 目录拼接在现有变量开头的原因，也是你在修改此环境变量时必须格外小心的原因。\n\n`xctool` 在许多方面与 `xcodebuild`\
    \ 类似：大多数选项和参数都是相同的。不过，该工具本身稍微严格一些，如果不至少指定一个 `-scheme` 参数，你将无法调用它。在我们的例子中，我们还希望构建一个工作区，而不是一个简单的\
    \ Xcode 项目（默认行为），并且我们希望使用 `AdHoc` 配置。这就是我们使用 `--workspace` 和 `-configuration`\
    \ 参数的原因：\n\n```\n$ xctool.sh -workspace Github\\ Jobs.xcworkspace -scheme Github\\\
    \ Jobs\n[Info] 正在加载方案 'Github Jobs' 的设置... (1142 ms)\n=== 构建 ===\nxcodebuild build\
    \ Github Jobs\nPods / Pods-Github Jobs-SVProgressHUD (AdHoc)\n√ 检查依赖项 (111 ms)\n\
    √ 写入辅助文件 (7 ms)\n...\n```\n\n首先要注意的是 `xctool` 的输出更加清晰。不再是一大堆难以理解的文本，现在你可以获得按构建过程所有主要步骤分组的输出。\n\
    \n如果你也在自己的电脑上运行了该命令，你应该会注意到输出还带有颜色。\n\n`xctool` 的优点众多。界面美观漂亮是一回事，提供真正有用的功能则是另一回事。除了美观的（默认）报告器外，`xctool`\
    \ 还提供了不同的报告器，使其更容易与持续集成工具（例如 Jenkins，我们将在下一章中介绍）集成。它还支持基于 JSON 的配置文件格式，因此调用 `xctool`\
    \ 不再是一件痛苦的事。要使用它，只需创建一个包含以下内容的 `.xctool-args` 文件：\n\n```\n[\n  \"-workspace\"\
    , \"Github Jobs.xcworkspace\",\n  \"-scheme\", \"Github Jobs\",\n  \"-configuration\"\
    , \"AdHoc\"\n]\n```\n\n有了这个文件，现在可以在不带任何选项或参数的情况下调用 `xctool`，并使用正确的工作区和方案构建应用程序。\n\
    \n即使 `xctool` 是一个非常棒的工具，你也必须再次记住，这并非万能灵药。\n\n如前所述，`xctool` 是 iOS 和 OSX 项目替代 Apple\
    \ 的 `xcodebuild` 的构建解决方案，由 Facebook 维护。例如，这意味着该工具可能会随着 Apple 开发者工具的新版本发布而失效。事实上，在很长一段时间里，`xctool`\
    \ 都无法构建 Xcode 5.1 项目。\n\n这就是为什么你也应该考虑其他解决方案，例如 `xcpretty`。它的创建者 Marin Usalj 选择了一种不同的方法。他没有创建一个新的构建工具来解决输出可读性问题，而是选择格式化输出并使其美观。\n\
    \n## 使用 `xcpretty` 格式化 `xcodebuild` 输出\n\n安装 `xcpretty` 最简单的方法，就像任何其他 Ruby 工具一样，是使用\
    \ Rubygem。\n\n```\n$ gem install xcpretty\n```\n\n然后，使用 `xcpretty` 就非常简单了。你所要做的就是利用一个名为管道（pipes）的\
    \ shell 功能。\n\n```\n$ xcodebuild -workspace Github\\ Jobs.xcworkspace -scheme\
    \ Github\\ Jobs -configuration AdHoc build | xcpretty -c\n▸ 正在构建 Pods/Pods-Github\
    \ Jobs-SVProgressHUD [AdHoc]\n▸ 预编译 Jobs-SVProgressHUD-prefix.pch\n▸ 预编译 Jobs-SVProgressHUD-prefix.pch\n\
    ▸ 预编译 Jobs-SVProgressHUD-prefix.pch\n▸ 预编译 Jobs-SVProgressHUD-prefix.pch\n▸ 预编译\
    \ Jobs-SVProgressHUD-prefix.pch\n▸ 预编译 Jobs-SVProgressHUD-prefix.pch\n▸ 编译 Pods-Github\\\
    \ Jobs-SVProgressHUD-dummy.o Pods-Github\\ Jobs-SVProgressHUD-dummy.m\n▸ 编译 Pods-Github\\\
    \ Jobs-SVProgressHUD-dummy.o Pods-Github\\ Jobs-SVProgressHUD-dummy.m\n▸ 编译 SVProgressHUD.m\n\
    ▸ 编译 SVProgressHUD.m\n▸ 编译 Pods-Github\\ Jobs-SVProgressHUD-dummy.o Pods-Github\\\
    \ Jobs-SVProgressHUD-dummy.m\n▸ 编译 SVProgressHUD.m\n...\n```\n\n格式化后的输出与 `xctool`\
    \ 生成的输出非常相似：按构建的主要步骤分组，并且 `-c` 选项为输出添加了一些颜色。与 `xctool` 一样，它也提供了多种格式化器，例如 `junit`\
    \ 以便于集成（与 `xctool` 一样）到 Jenkins，以及 `html`、`tap` 或 `rspec`。\n\n本章的目的并不是告诉你 `xcpretty`\
    \ 比 `xctool` 做得更好，而只是为你提供备选方案。这两种解决方案都是为了提供更好的输出，特别是 `junit` 输出，它将在我们后续章节设置 Jenkins\
    \ 和 Bamboo 中的单元测试时派上用场。\n\n## Xcode 项目文件剖析与方案共享\n\n现在你已经了解了如何使用两种不同的工具从命令行构建 iOS\
    \ 应用程序，你可能已经注意到两者有一个共同的行为：它们都需要一个有效的 Xcode 项目文件或工作区（本质上是一个包含 Xcode 项目的增强型文件夹），更重要的是，它们都需要一个有效的方案。\n\
    \n无论你是否意识到，你已经使用过 Xcode 目标（targets）。目标指定了要构建的产品以及如何通过构建阶段（例如编译源代码、复制头文件和资源、链接框架和构建设置）来构建它。在我们的“Github\
    \ Jobs”Xcode 项目中，我们已经有了两个目标——一个用于主应用程序，另一个用于运行单元测试。你可以根据需要拥有任意数量的目标，并且某些目标可以依赖于其他目标。方案本质上是一组目标的集合，以及其他一些东西，并且可以存储在不同的层级：项目层级和工作区层级。你可以通过使用\
    \ `xcodebuild` 命令的 `-list` 参数从命令行查看所有可用方案的列表。\n\n```\n$ xcodebuild -list\n项目 \"\
    Github Jobs\" 的信息：\n目标：\n    Github Jobs\n    Github JobsTests\n构建配置：\n    Debug\n\
    \    AdHoc\n    Release\n如果未指定构建配置且未传递 -scheme，则使用 \"Release\"。\n方案：\n    Github\
    \ Jobs\n```\n\n如果在工作区文件内运行相同的命令，你应该只会看到 Cocoapods 在首次运行 `pod install` 命令创建工作区时自动生成的方案。\n\
    \n```\n$ xcodebuild -list -workspace Github\\ Jobs.xcworkspace\n工作区 \"Github Jobs\"\
    \ 的信息：\n方案：\n    Pods-Github Jobs\n    Pods-Github Jobs-SVProgressHUD\n```\n\n\
    在我们的例子中，我们只关心“Github Jobs”方案。这也是我们到目前为止一直在使用的方案。\n\n顺便说一下，不要让关于“Release”配置的信息误导你；当你的项目使用工作区时，你实际上需要向\
    \ `xcodebuild` 命令传递一个有效的方案参数。\n\n事实上，如果你不这样做，将会收到以下错误：\n\n```\n$ xcodebuild -workspace\
    \ Github\\ Jobs.xcworkspace build\nxcodebuild: 错误: 如果你指定了工作区，则还必须指定一个方案。使用 -list\
    \ 查看此工作区中的方案。\n```\n"
