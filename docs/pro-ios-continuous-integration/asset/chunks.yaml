  raw: 'Our plan is almost ready, we now have a two tasks that will fetch the latest
    version of the project from the remove repository and then install the dependencies,
    build the application and package it into an iPhone archive (ipa) file. The only
    thing we miss is to automatically retrieve the generated IPA files and store them
    somewhere safe.


    In Jenkins, we used what is called a post-build phase. This approach is fine in
    many cases but has one major downside: it is actually part of the build. This
    means that if it fails, the whole build may fail. The approach chose by Bamboo
    is a bit similar. Based on a pattern, all the files matching a specific pattern
    wil be copied somewhere safe after the build has run. Al we need to do is to configure
    the pattern.


    Go back to the default job configuration and select the “Artifacts” tab. In this
    tab you will manage


    “artifact definitions,” in other words, a list of definitions containing a name,
    a relative location, and a pattern following the Ant file copy pattern.


    **Note** Ant? If you’ve never heard of Ant, Apache Ant is a tool used to automate
    software build processes, similar to Make. Written in Java, Ant uses an XML-based
    syntax to describe a build process where make use a pure text file format. If
    you remember correctly, we mentioned some of the tools that could be used to wrap
    a build script in Chapter 3\. The Ant file copy uses a simple regular expression
    engine using “*” and “?”


    symbols to create simple patterns and try to match them against the names of files
    contained in a directory.


    Click on the “Create definition” button and fill the form with the information
    we gave you before. Fill


    “Github Job IPA file” in the Name field, “build” in the Location one and “*.ipa”
    in the “Copy Pattern.”


    The artifact archiving process doesn’t work retroactively; you need to re-run
    your build to retrieve the IPA file generated at the end of the build. Click on
    “Create” and then, once again, click on the “Run”


    button. In the job detail page, click on the “Artifacts” tab. At the end of the
    build you should see that the IPA file has been archived, similar to what’s in
    Figure [6-8](#index_split_001.html#p107).


    ***Figure 6-8.** At the end of the build, the package application has been archived
    by Bamboo*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **106**


    **CHAPTER 6: Automated builds with Bamboo**


    You or any member of your team with access to this plan can download the archived
    artifact by clicking on the “Github Job IPA file” link. Once again that is not
    the most convenient way to share artifacts but we will cover more of that in the
    chapter about OTA development.


    Bamboo Power user features


    We covered a very basic use of Bamboo and went a little bit straighter to the
    point since we’ve already covered some part of the automatic building process
    in the previous chapter, when we talked about Jenkins. Bamboo is capable of so
    much more. Let’s have a look at some of the advanced things you can achieve with
    it.


    Rest API


    Bamboo wouldn’t be a full-featured developer tools without a way for developers
    to hack their way into most of its core feature. That is why is comes with a REST
    API to interact with your Bamboo installation, like Jenkins does. Using basic
    authentication if you haven’t activated the anonymous access, it is pretty easy
    to fetch the current status of your jobs calling the following URL with a simple
    CURL command:


    $ curl -s -u romain.pouclet:pwd -H Accept:application/json http://localhost:8085/rest/api/latest/


    result | python -mjson.tool


