    Let’s say it is time for a second developer to join the team and start working
    with you on the application. He will start by fetching the latest version of the
    source from your company’s git repository, run the `pod install` command (remember
    we suggested you ignore the `Pods` folder) and want to make sure everything went
    well. With a terminal window already open, he will try to build the application
    from the command line:


    ```

    $ xcodebuild -workspace Github\ Jobs.xcworkspace –scheme Github\ Jobs build

    xcodebuild: error: The workspace ''Github Jobs'' does not contain a scheme named
    ''Github Jobs''.

    ```


    Remember when we mentioned that schemes could be stored at different levels? Now
    picture yourself in the next chapter, where this new developer is actually an
    automated build platform such as Jenkins or Bamboo and you got yourself a failed
    build for a dumb reason.


    It’s pretty easy to visualize all the information about a scheme from the command
    line or simply from the finder.


    1. Open a finder window and navigate to the folder where the `Github Jobs` project
    is stored.

    2. Right-click on the `Github Jobs.xcodeproj` and select `Show package content`.

    3. Select the `xcuserdata` folder, then the `YourUser.xcuserdatad` and finally
    the `xcschemes` one. You should find your `Github Job` scheme there, as shown
    in Figure 4-4.


    **Figure 4-4.** The `Github Jobs` scheme is a file stored somewhere in the `Xcodeproj`
    package


    To be fair with Xcode and this new developer, the first time he would have opened
    the project in Xcode, the `Github Jobs` scheme would have been automatically created
    and could have been found in a new `xcuserdatad` package stored at the same level
    than the `Palleas.xcuserdatad` one.


    An automated build platform wouldn’t open the project with Xcode though. Even
    if that is technically doable considering the build platform would run on an OSX
    computer capable of starting Xcode, that is definitely not the purpose of such
    a tool.


    The solution lies within a UI element available in Xcode’s scheme managing panel.
    Go back to Xcode and select the `Github Jobs` dropdown at the top left of the
    window, near the `Build & Run` button.


    Select the `Manage Schemes...` menu item. You should see a list of all the schemes
    available in your project. Check the first checkbox in the `Shared` column and
    press `OK`.


    Two things happened. First, if you go back exploring the content of the `Xcodeproj`
    package, you should no longer see the `Github Jobs.xcscheme` file that was stored
    in `YourUser.xcuserdatad`.


    Then, an `xcshareddata` folder has been created, containing the missing `Github
    Jobs.xcscheme` file in a similar `xcschemes` folder.


    This seems a bit complicated but there are numerous reasons why we talked about
    this architecture.


    The obvious one is, as we mentioned earlier, that this could prevent you from
    getting a failing build from an automated build platform. More accurately, it
    will help you understand why your first build is failing when you will setup your
    continuous integration platform. No matter the number of years of experience in
    iOS development, every once in a while a developer will forget to check that checkbox.


    What is important is that sharing your schemes with your coworkers and your automated
    build platform allows you to work within the exact same environment. After all,
    a scheme is nothing but a bunch of configuration settings and it is very important
    to share them across your team and avoid the false positive and the “but it build
    successfully on my computer” messages from your coworkers.


    ## Creating the IPA File From the Command Line


    We have spent enough time building the application without being able to actually
    run it, let alone sending a testing version to your client or the members of your
    QA team. If you recall from Chapter 2 or simply from experience, creating the
    IPA file was an action available from the organizer window.


    It was a two- or three-step process that would end up with a distributable file
    on your desktop. Let’s see how to achieve the same goal with the command line.


    It is time you learn about another tool from the Xcode ecosystem: `xcrun`; but
    first, let’s talk about the `IPA` file format. An `IPA` file contains an iOS application.
    They can only be run on iOS devices such as iPhone and iPad and can only be opened
    using iTunes or the iPhone Configuration Utility as we’ve shown in Chapter 3.
    An `IPA` file is basically a glorified encrypted ZIP archive containing a `.app`
    file like the one we’ve been creating for the past ten pages or so. In fact, you
    could create `IPA` files without using any dedicated tool. That would be a waste
    of time considering `xcrun` will do that for you (and more) but technically doable.


    Let’s have a look at the `IPA` file we’ve created in the previous chapter. Start
    with renaming it to `Github Jobs.zip` and simply double click on the file from
    the finder. A command line equivalent of this process using the `unzip` command
    would go way faster and look like this:


    ```

    $ unzip Github\ Jobs.ipa

    Archive: Github Jobs.ipa

    creating: Payload/

    creating: Payload/Github Jobs.app/

    creating: Payload/Github Jobs.app/_CodeSignature/

    inflating: Payload/Github Jobs.app/_CodeSignature/CodeResources

    inflating: Payload/Github Jobs.app/Assets.car

    creating: Payload/Github Jobs.app/Base.lproj/

    creating: Payload/Github Jobs.app/Base.lproj/Main.storyboardc/

    inflating: Payload/Github Jobs.app/Base.lproj/Main.storyboardc/72K-nL-0Mz-view-WoX-oB-R4e.nib

    inflating: Payload/Github Jobs.app/Base.lproj/Main.storyboardc/Info.plist

    inflating: Payload/Github Jobs.app/Base.lproj/Main.storyboardc/UIViewController-1Id-ia-L1b.nib

    inflating: Payload/Github Jobs.app/embedded.mobileprovision

    creating: Payload/Github Jobs.app/en.lproj/

    inflating: Payload/Github Jobs.app/en.lproj/InfoPlist.strings

    inflating: Payload/Github Jobs.app/Github Jobs

    inflating: Payload/Github Jobs.app/Info.plist

    inflating: Payload/Github Jobs.app/LaunchImage-700-568h@2x.png

    extracting: Payload/Github Jobs.app/PkgInfo

    inflating: Payload/Github Jobs.app/ResourceRules.plist

    creating: Payload/Github Jobs.app/SVProgressHUD.bundle/

    inflating: Payload/Github Jobs.app/SVProgressHUD.bundle/angle-mask@2x.png

    extracting: Payload/Github Jobs.app/SVProgressHUD.bundle/error@2x.png

    extracting: Payload/Github Jobs.app/SVProgressHUD.bundle/success@2x.png

    ```


    As you can see, all there is, is a `Payload` folder containing the application.


    The `xcrun` executable is a command line tool that comes with Xcode just like
    `xcodebuild` and just like it, it is impacted by the location of the developer
    directory and the `$DEVELOPER_DIR` environment variable. It has two main purposes:
    finding development tools and executing them.


    We mentioned earlier the linking executable named `ld` is part of the Xcode developing
    toolchain and can be located using `xcrun`, just like `clang`, `git`, or any other
    tool that comes with Xcode:


    ```

    $ xcrun --find ld

    /Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/ld


    $ xcrun --find git

    /Applications/Xcode.app/Contents/Developer/usr/bin/git


    $ xcrun --find clang

    ```'
