    既然你已经开始真正掌握`Bamboo`，你可能会对我们在调用`Shenzhen`的`ipa`命令的`shell`脚本中硬编码了 API 和团队令牌感到不安。为了确保你理解一切是如何运作的，请确保这些令牌出现在任何地方时都经过混淆。


