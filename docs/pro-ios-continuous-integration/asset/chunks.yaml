- fmt: '这是一个来自其他应用程序的实际崩溃日志，我们只是将其中的应用名称替换为我们的应用名，以便在不引起混淆的情况下进行描述。该报告显示了关于应用程序本身的大量信息（构建版本、市场版本、标识符……）以及运行该应用程序的设备信息。这使得我们可以轻松判断应用程序是否仅在特定设备上崩溃，例如已不算新且支持
    `arm64` 处理器的 `iPhone 5S`。报告还显示了（这是更有趣的部分）崩溃发生的代码位置。这里我们讨论的是在使用 Core Data 执行任务的代码段中发生的
    `EXC_BAD_ACCESS` 错误。这可能有多种含义，但通常是由于调用了指向无效指针的方法所致。


    Apple 已经提供了从通过 App Store 分发的应用程序中收集崩溃日志的功能，但对于尚未准备好提交到商店的应用程序，有一些工具可以帮助你实现相同的目标，例如
    `PLCrashReporter`，可从以下网址获取：


    [http://plcrashreporter.org](http://plcrashreporter.org/)


    为确保你能够使用这些报告并修复崩溃，在构建应用程序之前，你需要检查一项设置。回到 `Github Jobs` Xcode 项目，打开主目标的构建设置，找到
    `Debug Information Format` 设置。Apple 使用一种标准的调试数据格式，称为 `DWARF`，这是一个中世纪奇幻风格的术语，代表
    `Debugging With Attributed Record Formats`。在此设置中，确保选中 `DWARF with dSYM File`，它将在你的应用程序所在的同一文件夹中生成一个
    `dSYM` 文件夹，如图 3-2 所示。此文件是理解潜在崩溃日志所必需的。


    **图 3-2.** 构建文件夹包含应用程序和 `dSYM` 文件及其他内容 要查看示例，请导航至 `~/Library/Developer/Xcode/DerivedData/`
    文件夹，每次构建应用程序时，临时 `.app` 文件都存储在此处。使用你的 shell，或右键单击 Xcode 项目 `Products` 组中的 `Github
    Jobs.app` 文件，选择 `Reveal In Finder` 选项。你应该会看到一个 `dSYM` 文件。


    生成 `dSYM` 文件需要时间，并且在开发应用时通常并不需要。你很可能能够在调试会话期间检测并重现崩溃。因此，在 Debug 配置中，`Debug Information
    Format` 设置通常设置为 `DWARF` 以加快构建速度。在构建应用程序之前，请确保针对 Adhoc 配置，该设置已改为 `DWARF with dSYM
    File`，如图 3-3 所示。在我们真正开始使用第 7 章中介绍的“Over The Air distribution”方法发布应用程序之前，我们不会再回到这个话题。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 34](index-36_1.jpg)


    **第三章：使用 Xcode 在 App Store 之外发布应用程序**


    **33**


    **图 3-3.** 仅对 Debug 配置禁用了 `dSYM` 文件生成以加快构建速度


    ### 创建 IPA 文件


    我们现在正式准备好构建应用程序的第一个版本，并将其发送给我们的 Beta 测试人员。为此，我们需要做的就是创建一个 IPA 文件。


    1.  拔掉你的设备，并确保在用于选择运行应用程序位置的下拉菜单中选择了 `iOS device`。

    2.  在 `Product` 菜单中，不要直接按 `Archive`，而是按住 `ALT` 键。`Archive` 菜单将变为 `Archive...`，这将打开一个窗口，允许你选择用于构建的配置，如图
    3-4 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 35](index-37_1.jpg)


    **34**


    **第三章：使用 Xcode 在 App Store 之外发布应用程序**


    **图 3-4.** 准备好为 Adhoc 配置归档应用程序的归档面板


    3.  将构建配置从 Release 更改为 `AdHoc`，然后按 `Archive`。如果你勾选了 `Reveal Archive in Organizer`
    选项，Organizer 应该会弹出并选中你的归档。

    4.  接下来的步骤同样简单，你可能在向 App Store 发布应用程序时已经经历过。按下 `Distribute...` 按钮，选择 `Save for
    Enterprise or Ad Hoc Deployment`，然后选择保存 IPA 文件的位置。恭喜你，你现在已经准备好分发你的第一个应用程序构建了！


    让我们暂停一下，回顾一下我们做了什么。在第 2 章中，我们创建了一个非常简单的应用程序，现在我们正准备发布它。在本章中，你经历了一个繁琐的过程，进行了多次点击，最终可能只是在桌面上得到了一个
    IPA 文件。


    好吧，请再坚持看几页，因为我们即将使用有史以来最不便捷的流程来分发 iOS 应用程序：iTunes！


    大多数人对 iTunes 都抱有爱恨交加的感情。从播放音乐和视频，到连接 App Store 购买应用程序和专辑，以及订阅播客，iTunes 是这款自世纪之初就已存在的臃肿
    OSX 应用程序，这本身就说明了一些问题。当 iPhone 问世时，虽然 Apple 可以专门开发一个 iPhone 同步应用程序，但它却选择将这个功能集成到其历史悠久的应用程序中。


    iTunes 实际上允许你直接从桌面将应用程序安装到设备上。让我们看看如何操作。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 36](index-38_1.jpg)


    **第三章：使用 Xcode 在 App Store 之外发布应用程序**


    **35**


    ### 在测试者设备上安装应用程序


    打开 iTunes，点击 `update later` 按钮（总有一个 iTunes 更新在等着你）。然后，打开一个 Finder 窗口，导航到你导出 IPA
    文件的目录：在我们的例子中，是桌面目录。双击 `Github jobs.ipa` 文件，等待奇迹发生。iTunes 应该会被激活，并在 `Apps` 部分显示你的应用程序，如图
    3-5 所示。


    **图 3-5.** iTunes 已将 Github Jobs 应用程序添加到你的资料库中


    通过这个非常简单的操作，iTunes 获取了 IPA 文件并将其复制到了其媒体文件夹中。如果你没有更改过此文件夹，你应该能够在 `~/Music/iTunes/iTunes
    Media/Mobile Applications` 中找到你的应用程序，就在你的音乐文件夹旁边。不要删除原始的 IPA 文件：我们稍后会用到它。


    现在 iTunes 已经有了我们应用程序的副本，请插入你的 iPhone，点击窗口左上角会出现的 `iPhone` 按钮。这个界面应该很熟悉，你可能已经进去过那里，安装过
    iOS 的 Beta 版本，或者只是管理设备的同步设置。选择 `apps` 标签，你所有的应用程序（包括 `Github Jobs`）应该都会列在左侧。点击
    `Github Jobs` 旁边的 `Install` 按钮，然后点击 `Apply` 按钮。在同步过程中，`Github Jobs` 将会被安装到你的设备上，如图
    3-6 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 37](index-39_1.jpg)


    **36**


    **第三章：使用 Xcode 在 App Store 之外发布应用程序**


    **图 3-6.** `Github Jobs` 应用程序正在被复制到设备上


    就是这么简单。一旦你创建了 iOS 应用程序的构建，你可以简单地通过邮件将其发送给测试人员，然后一切就绪。


    但是…… 这是一个糟糕的流程！


    你现在可能觉得这是一个糟糕的流程，而且很难反驳你。公平地说，我们之前确实警告过你。'
  raw: 'This is an actual crash log coming from a different app, we’ve only replaced
    the name of the application with ours so we can describe it a bit without confusing
    anyone. The report shows a lot of information about the application itself (build
    and marketing versions, identifier...) with information about the device that
    runs the application. This makes it easy to determine if the application only
    crashes on a specific device, for example the not-so-new-anymore iPhone 5S that
    came with support for arm64 processors. It also shows, and that’s the more interesting
    part, which part of the code crashed. Here we are talking about a “EXC_BAD_ACCESS”
    in a piece of code that perform tasks with Core Data. This can mean many things
    but it is usually caused by calling a method on a pointer that is no longer valid.


    Apple already provides the ability to collect crash logs from applications that
    are distributed throught the App Store but for applications that are not ready
    to be sent to the store, there are tools out there that will help you to achieve
    the same goal, such as “PLCrashReporter”, available at


    [http://plcrashreporter.org](http://plcrashreporter.org/).


    To make sure you will be able to use these reports and fix the crashes, there
    is one setting you need to check before building the application. Go back to the
    “Github Jobs” Xcode project, open the build settings of the main target and look
    for the “Debug Information Format” setting. Apple uses a standard debugging data
    format called **DWARF**, a medieval fantasy reference standing for


    “Debugging With Attributed Record Formats.” In this setting, make sure the “DWARF
    with dSYM


    File” is selected, it will generate a dSYM foder in the same folder that your
    application, as shown in Figure [3-2](#index_split_000.html#p35). This file is
    mandatory to understand potential crash logs.


    ***Figure 3-2.** The build folder contains the application and the dSYM file,
    among other things* To see an example, navigate to your ~/Library/Developer/Xcode/DerivedData/
    folder where your temporary .app files are stored every time you build your application.
    Using your shel or right-clicking on the “Github Jobs.app” file in the Products
    groups of your Xcode project, select the “Reveal In Finder” option. You should
    see a dSYM file.


    Generating the dSYM file takes time and is not real y needed while you’l be working
    on the app.


    Chances are you wil be able to detect and reproduce a crash during a debug session.
    Because of that, in debug configuration, the “Debug Information Format” setting
    is usually set on “DWARF” to speed up the build. Before building the application,
    make sure the setting is on “Dwarf with dSYM” for the adhoc configuration, as
    shown in Figure [3-3](#index_split_000.html#p36). We wil not go back to this session
    until we actual y start releasing the application using a method called “Over
    The Air distribution” in Chapter 7.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 34](index-36_1.jpg)


    **CHAPTER 3: Using Xcode to Release an Application Outside the App Store**


    **33**


    ***Figure 3-3.** The dSYM file generation is only disabled for the Debug configuration
    to speed up the build* Creating the IPA file


    We are now officially ready to build the very first version of our application
    and send it to our beta testers. To do that, all we need is to create an IPA file.


    1\. Unplug your devices and make sure you’ve selected “iOS device” in the menu


    that lets you select where to run the application.


    2\. In the Product menu, instead of pressing “Archive” directly, hold the ALT
    key.


    The “Archive” menu will turn into “Archive...” and this will open a window


    allowing you to select the configuration to use for the build, like the one


    shown in the Figure [3-4](#index_split_000.html#p37).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 35](index-37_1.jpg)


    **34**


    **CHAPTER 3: Using Xcode to Release an Application Outside the App Store**


    ***Figure 3-4.** The archive panel ready to archive the application for the Adhoc
    configuration* 3\. Change the build configuration to “AdHoc” instead of release
    and press


    “Archive”. If you’ve checked the “Reveal Archive in Organizer” option, the


    organizer should appear with your archive selected.


    4\. The next steps are just as easy, and you probably already went through them


    when you released an application to the App Store. Press the “Distribute...”


    button, select “Save for Enterprise or Ad Hoc Deployment” and select the


    location where to save the IPA file. Congratulations, you are now ready to


    distribute the very first build of your application!


    Let’s step back for a second and see what we have done. In Chapter 2 we created
    a very simple application that we are now getting ready to release. In this chapter,
    you’ve been through a boring process composed of many, many clicks only to end
    up with an IPA file on your desktop, probably.


    Well, stay with us for a couple more pages, because we are about to use the least
    convenient process ever invented to distribute an iOS application: iTunes!


    Most people have some kind of a love/hate relationship with iTunes. From playing
    music and videos, to connecting to the app store and buying apps and albums as
    wel as subscribing to podcasts, iTunes is this bloated OSX application that’s
    been around since the beginning of this mil ennium, which is starting to mean
    something. When the iPhone came out, while Apple could have come up with a dedicated
    iPhone synchronization application, it instead chose to integrate this process
    into its historic application.


    iTunes actually allows you to install applications on a device right from your
    desktop. Let’s see how.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 36](index-38_1.jpg)


    **CHAPTER 3: Using Xcode to Release an Application Outside the App Store**


    **35**


    Installing the Application on the Tester’s Device


    Open iTunes and click on the “update later” button (there’s always an update of
    iTunes waiting for you). Then, open a finder window and navigate to the directory
    where you exported the IPA file: in our case, the desktop directory. Double click
    on the “Github jobs.ipa” file and wait for the magic to happen. iTunes should
    activate and display your application in the “Apps” section, as shown in Figure
    [3-5](#index_split_000.html#p38).


    ***Figure 3-5.** iTunes has added the Github Jobs app to your library*


    With this very simple operation, iTunes took the IPA file and copied it in its
    media folder. If you haven’t changed this folder, you should be able to retrieve
    your application in “~/Music/iTunes/iTunes Media/Mobile Applications”, one folder
    away from your music. Don’t delete the original IPA file: we will need it later.


    Now that iTunes has its own copy of our application, plug your iPhone in and click
    on the “iPhone”


    button that will appear at the top left of the window. This screen should feel
    like home, you’ve probably already been there to install a beta version of iOS
    or simply manage the synchronization settings of your device. Select the “apps”
    tab where all your applications should be listed on the left, including “Github
    Jobs”. Press the “Install“ button right next to “Github Jobs” and then hit the


    “Apply” button. During the synchronization process, Github Jobs will be installed
    on your device, as shown in Figure [3-6.](#index_split_000.html#p39)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 37](index-39_1.jpg)


    **36**


    **CHAPTER 3: Using Xcode to Release an Application Outside the App Store**


    ***Figure 3-6.** The “Github Jobs” application is being copied to the device*
    That’s as easy as it gets. Once you’ve created a build of an iOS application,
    you can simply send it by mail to your testers and be done with it.


    But... This is a Terrible Process!


    You may be thinking this is a terrible process right now and it would be hard
    to argue with you. To be fair, we did warn you earlier.'
