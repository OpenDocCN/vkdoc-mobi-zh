    **CHAPTER 7: Over-The-Air distribution**


    **135**


    ***Figure 7-11.** Looking for “UUID” will show you the provisioning profile section
    of you’re application’s build setting* The provisioning profile also contains
    information about the entitlement of your application, like if you’re going to
    use iCloud or Apple Push Service (aps). When you run into an inexplicable issue
    where Xcode is not able to build your application because of one of the errors
    mentioned above, you might want to take a look at the content of the provisioning
    profile you are trying to use.


    iTunes Music Store XML manifest to the rescue


    Now that you know more about the provisioning profile, let’s set up our own distribution
    platform.


    We will need a simple HTML page, a packaged application, and a XML file that we
    will call the manifest. In the Android ecosystem, distributing an Application
    without using the Play store is easy: all you need to do is to show a direct download
    link to your application that a user will click via the mobile device’s browser.
    If you were to try to do the same on an iPhone, the user would get an error message
    from iOS saying that it doesn’t know what to do with this IPA file. This is a
    bit annoying and we all know that it is not true.


    Sharing an IPA file is a more complex process that requires a proper URL scheme
    and, as we mentioned earlier, a XML manifest. This information is required so
    iTunes understand what to do with the file.


    Creating a simple HTML page


    For the sake of the example, our own distribution platform will contain a single
    HTML page with a title, a capture of the application, and a download button. From
    the folder of your choice, create an index.html file with the following content:


    <!doctype html>


    <html>


    <head>


    <title>Download Github Jobs for iOS</title>


    </head>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 87](index-138_1.jpg)


    **136**


    **CHAPTER 7: Over-The-Air distribution**


    <body>


    <h1>Github Jobs for iOS</h1>


    <a href="<URL>">Click here to download the application</a>


    </body>


    </html>


    Ruby comes with a bundled HTTP server that we can use to share this page on our
    local network.


    Open a terminal, navigate to the directory where you stored the index.html file
    and run the following command:


    $ ruby -run -e httpd -- --bind-address 0.0.0.0 --port 5000 .


    [2014-05-25 16:43:51] INFO WEBrick 1.3.1


    [2014-05-25 16:43:51] INFO ruby 2.1.1 (2014-02-24) [x86_64-darwin13.0]


    [2014-05-25 16:43:51] INFO WEBrick::HTTPServer#start: pid=46428 port=5000


    If you open your browser and navigate to the URL localhost:5000, you should see
    a page similar to the Figure [7-12.](#index_split_002.html#p138)


    ***Figure 7-12.** Our very distribution platform looks really great*


    The manifest


    Now that we have our pretty good looking HTML page, let’s talk about the XML manifest
    we need to create so you can download your application. If you remember correctly,
    the first time we packaged the Github Jobs for iOS application into an IPA file,
    we used Xcode’s organizer. When the organizer asks you where you want to post
    the generated file, there is a small check box with the label “Save for Enterprise
    Distribution”. When selected, a form appears and asks you some information. Under
    the hood this information will be stored in a Plist file similar to the one we
    are about to write.


    Go back to your text editor and create a github-jobs.plist file near the index.html,
    one with the following content:


    <?xml version="1.0" encoding="UTF-8"?>


    <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" " [http://www.apple.com/DTDs/PropertyList-](http://www.apple.com/DTDs/PropertyList-1.0.dtd)


    [1.0.dtd](http://www.apple.com/DTDs/PropertyList-1.0.dtd)">


    <plist version="1.0">


    <dict>


    <key>items</key>


    <array>


    <dict>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 7: Over-The-Air distribution**


    **137**


    <key>assets</key>


    <array>


    <dict>


    <key>kind</key>


    <string>software-package</string>


    <key>url</key>


    <string>http://**<YOUR-LOCAL-IP>** :5000/GithubJobs.ipa</string>


    </dict>


    </array>


    <key>metadata</key>


    <dict>


    <key>bundle-identifier</key>


    <string> **com.perfectly-cooked.Github-Jobs**</string>


    <key>bundle-version</key>


    <string>0.1</string>


    <key>kind</key>


    <string>software</string>


    <key>title</key>


    <string>Github Jobs for iOS</string>


    </dict>


    </dict>


    </array>


    </dict>


    </plist>


    Make sure to replace <YOUR-LOCAL-IP> with your actual local IP address and ensure
    that the bundle-identifier and the bundle-version are the one of your application.
    Then, copy the latest version of your application – or even better, download it
    from the artifacts section of your latest Jenkins or Bamboo build – and store
    it at the same level as your index.html and your github-jobs.plist.'
