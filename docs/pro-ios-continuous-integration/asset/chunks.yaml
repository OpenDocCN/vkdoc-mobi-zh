    select “Xcodebuild”, the requirement we created earlier, and press Add. If everything
    worked as expected, you should see that the requirement has been successfully
    added, along with the confirmation that there is a list one agent capable of running
    your job, as shown in Figure [6-13.](#index_split_002.html#p118)


    ***Figure 6-13.** There is one agent capable of running our job since we need
    xcodebuild* In case you are wondering, yes we could have been more specific on
    the requirements, since our build script requires tools like bash to run, xcpretty
    to make the output pretty, and xcrun to package the application, but we decided
