    这是一个来自其他应用程序的实际崩溃日志，我们只是将其中的应用名称替换为我们的应用名，以便在不引起混淆的情况下进行描述。该报告显示了关于应用程序本身的大量信息（构建版本、市场版本、标识符……）以及运行该应用程序的设备信息。这使得我们可以轻松判断应用程序是否仅在特定设备上崩溃，例如已不算新且支持
    `arm64` 处理器的 `iPhone 5S`。报告还显示了（这是更有趣的部分）崩溃发生的代码位置。这里我们讨论的是在使用 Core Data 执行任务的代码段中发生的
    `EXC_BAD_ACCESS` 错误。这可能有多种含义，但通常是由于调用了指向无效指针的方法所致。


    Apple 已经提供了从通过 App Store 分发的应用程序中收集崩溃日志的功能，但对于尚未准备好提交到商店的应用程序，有一些工具可以帮助你实现相同的目标，例如
    `PLCrashReporter`，可从以下网址获取：


    [`plcrashreporter.org`](http://plcrashreporter.org/)


