- fmt: '# More Important Than That


    More important than that, this shows you that it is possible to implement custom
    build phases with multiple purposes. To add a new build phase, select `Editor
    ➤ Add Build Phase ➤ Add Run Script Build Phase`. A new phase will appear at the
    bottom with a first text field so you can select your favorite shell – most of
    the time, `sh` or `bash` – and a text area to enter your script. This could do
    anything – from incrementing the build number, to the application main icon being
    printed with the name of the Git branch you are on. This will bring several advantages
    when we talk about quality assurance in Chapter 10.


    ## Summary


    We’ve shown you that Xcode comes with all the tools you need to set up a more
    than decent continuous integration environment, from versioning system integration
    to testing tools. We are now ready to answer the question that comes after the
    build process: What should I do with my build?


    The next chapter will show you how to simply distribute the application to your
    team.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ---


    # Chapter 3: Using Xcode to Release an Application Outside the App Store


    The question we need to ask ourselves now is, "What should I do with my application
    now?" In the previous chapter, we created a simple application that displayed
    a few iOS job offers around New York. This application is simple enough to be
    entirely explained and developed in one chapter, along with all the tools we have
    at our disposal, directly integrated into Xcode or not.


    This sample application is far from being ready to be sent to the public. To be
    honest, one quick look at the application from the Apple review team would probably
    make them laugh before clicking the big red "reject" button. Assuming there is
    such a button and that it is red. That is why, at this point in the process, you
    will start needing feedback from your team. Let’s see how we can use Xcode to
    get that feedback.


    ## What We Need


    For our team to test the application and send us feedback, what we need is a build
    of the application installed on a testing device. If you are reading this book,
    you may have already released an application on the App Store and you are now
    trying to take your process to the next level. This means that you have probably
    already created more than a build to send to the App Store. The next pages will
    probably feel like déjà-vu for you. If you are not in the mood for a "back-to-basics"
    session, feel free to jump directly to the next chapter, where we will be toying
    with the command line tools.


    ---


    **29**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 32](index-33_1.jpg)


    **30**


    **CHAPTER 3: Using Xcode to Release an Application Outside the App Store**


    In chapter 2, we explained why you should always create multiple environments
    for your application. In our case, we have a simple application with `Debug`,
    `Adhoc`, and `Release` configurations. As we are releasing a first version of
    the application without using the App Store, we will be using the `AdHoc` configuration.


    ## Getting Ready to Release the Application


    The template we used came with default values about the application, like the
    version number, set to `1.0`. The definition of `1.0` and what it means from a
    developer point of view could raise an interesting debate. For example, in the
    SCRUM methodology the definition of "complete" must be defined early on before
    actually starting to work on the project. In this context, it usually means defining
    a clear and concise list of requirements that a feature must adhere to for all
    the members of your team to call it "complete." As a convention, the `1.0` version
    usually means the "good enough" version, the one that can be shared with the public.
    Let’s be honest here: we are far from the `1.0` version. We are actually closer
    to the `0.1` version, the one we are not ready to show to anyone.


    Even if we are only aiming at the `1.0` version, an iOS application comes with
    two version numbers: the short version called the "marketing" one and the long
    version called the "build" one. In the `Info.plist` file, the two versions are
