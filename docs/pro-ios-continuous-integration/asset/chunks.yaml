    ## 引言


    持续集成的定义数量，至少和编程语言的数量一样多，甚至可能更多。所有这些带有主观色彩的定义都在互联网上被广泛讨论：它是什么，它能如何帮助，要使用哪些工具……其中只有少数是完整、详尽的指南，能够指导你从何处开始，去往何处，更不用说在
    iOS 生态系统中的情况了。平心而论，iOS 平台仍然相对较新。


    由于你必须先学会走路才能跑步，本书将从开发者的角度带你游览 iOS 生态系统。如果你有兴趣阅读本书，你可能已经在 `Xcode` 前花了不少时间，但你是否知道，通过自动化测试和版本管理，它能让你的生活轻松得多？你是否知道你可以轻松地使用多个版本的
    `Xcode`？更重要的是，你是否了解它在底层是如何工作的？这就是本书将要教授你的内容。


    持续集成关乎于决定最佳的工作流程并选择正确的工具。我们不想让你觉得应该把我们的意见奉为圭臬，因此我们选择在介绍 `Jenkins` 和 `Bamboo` 这两个不同的持续集成平台之前，首先为你提供所需的所有知识。我们将向你展示如何尽快上手，以及如何获取一个示例应用程序，构建它，测试它，并最终发布给测试人员。在介绍了这些第三方工具之后，我们将介绍
    OS X Server 和 `Xcode`，这些是 Apple 提供的官方工具。它们远非完美，但提供了足够多的显著优势，足以让所有非官方的替代品感到威胁。


    针对所有这些解决方案，我们将向你展示如何集成工具来运行自动化测试和分析代码，确保你将所有时间都花在自动化一个编码良好、按预期工作的应用程序的工作流程上。


    最后，选择哪种工具最适合你和你的公司，完全取决于你自己。


    # 第 1 章：持续集成简介


    在软件工程的世界里，随着时间推移，软件通常变得越来越庞大。这可能是因为你的应用程序是一个庞大、功能齐全的工具，做很多事情，也可能仅仅是因为你的代码变得越来越复杂。到这个时候，你必须开始做出决策，选择你将使用的工具以及将遵循的原则，以使你的工作更轻松。持续集成的唯一目的正是如此——让你的生活更轻松。


    你阅读这本书，可能是因为你是一名独立软件工程师，或者领导着一个 iOS 开发者团队。我们将帮助你找到你需要的工具，并教你如何将它们融入你的日常工作流程中。


    ## 什么是持续集成？

