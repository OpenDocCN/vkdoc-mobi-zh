- fmt: '# Your First Jenkins Job Using the Xcode Plugin


    It is time we create our first build. We will start simply with cloning the application,
    building the app, and generating an IPA file, exactly what we have been doing
    in the previous chapters. To start creating a build, simply click on the “New
    Item” in the left menu, enter “Github Jobs for iOS” in the Item Name field, and
    select “Build a Free-style Software Project”. And then press OK.


    Even if the job creation process is split in two steps, the job was created when
    you pressed “Ok” for the first time, but for now it’s empty and doesn’t do anything.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 49](index-76_1.png)


    **74**


    **CHAPTER 5: Automatic Builds with Jenkins**


    A Jenkins job is mostly a bunch of options and instructions: name, description,
    can multiple builds of the same jobs be run concurrently, does this job depend
    on other jobs, and so on. You can use the default options for this part. Most
    of the time though, a Jenkins job is created to build a project stored in a source
    code management platform, such as Git or SVN. We want Jenkins to fetch the source
    code of the application from a Git repository stored on Github. To do that, select
    “Git” in the “Source Code Management” section and fill `git@github.com:Palleas/Github-Jobs.git`
    in the repository URL field that appeared.


    Depending on your configuration, you may get the error shown in Figure [5-4](#index_split_001.html#p76),
    that’s because Jenkins is trying to access a repository it doesn’t have access
    to and that would be a good thing.


    In fact, we mentioned earlier that Jenkins comes with a credentials management
    plugin. In our case, we need it to store public and private SSH keys to authenticate
    with Github.


    ***Figure 5-4.** Jenkins cannot access a protected repository*


    ## Creating an SSH key dedicated to Github


    The easiest (and probably more secure) way of authenticating with a repository
    over SSH is to use a private key. To do that, we need to generate a new key, add
    the public one to our Github account, and give the private one to Jenkins. Open
    a terminal and generate a new SSH key using `ssh-keygen`:


    ```

    $ ssh-keygen -t rsa -N "" -f ~/Tools/jenkins.key

    Generating public/private rsa key pair.

    /Users/Palleas/Tools/jenkins.key already exists.

    Overwrite (y/n)? y

    Your identification has been saved in /Users/Palleas/Tools/jenkins.key.

    Your public key has been saved in /Users/Palleas/Tools/jenkins.key.pub.

    The key fingerprint is:

    22:69:9f:c0:f8:9c:14:18:ac:47:77:a1:59:d8:a4:33 Palleas@local

    The key''s randomart image is:

    +--[ RSA 2048]----+

    |       .. ++.    |

    |      ooo=o      |

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 50](index-77_1.jpg)


    **CHAPTER 5: Automatic Builds with Jenkins**


    **75**


    ```

    |      o..E.      |

    |      .  .o =     |

    |       .. B . S  |

    |        = = o    |

    |         + o     |

    |                 |

    |                 |

    +-----------------+

    ```


    We now have an SSH key stored in our Tools folder that we also stored on the Jenkins
    archive, thanks to the `ssh-keygen` command.


    - The `-t` argument tells the command to use RSA, a cryptographic communication
    system used to secure data transmission, invented by Ron Rivest, Adi Shamir, and
    Leonard Adleman, hence the RSA.

    - The `-N` argument is used to associate an empty passphrase to the key. Most
    people use empty passphrases out of laziness to avoid typing it in when initiating
    SSH connections, but in our case it’s simply not supported by Jenkins at the time
    we are writing this book. There is a `JENKINS-20879` issue going on though.


    ## Telling Jenkins to use this brand new key


    Telling Jenkins to use this brand new key is easy thanks to the Jenkins credentials
    plugin. Go back to the Jenkins homepage and select Credentials from the left menu.
    Then, select “Global Credentials” and “Add Credentials” from the left menu. Finally,
    fill the form as shown in Figure [5-5](#index_split_001.html#p77).


    ***Figure 5-5.** Adding a new SSH key so Jenkins can communicate with Github*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 51](index-78_1.jpg)


    **76**


    **CHAPTER 5: Automatic Builds with Jenkins**'
