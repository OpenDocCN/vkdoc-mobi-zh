- fmt: '# CHAPTER 6: Automated builds with Bamboo


    ## 111


    Build early, build often


    We already talked about how most of the code hosting services (`Github`, `Bitbucket`,
    `Stash`…) were able to trigger builds based on the endpoint available in `Jenkins`,
    also capable of watching your repository for changes and automatically starting
    builds. Yes, `Bamboo` is capable of the same things.


    Being able to build multiple branches in a clean, organized way out of the box
    probably makes it slightly more powerful, but that’s not the topic here. The question
    you may ask yourself is why should I use these endpoints to start my builds, when
    should I start looking if I broke something and which frequency should I build
    my application at. The short answers are: “yes,” “as early as possible,” and “often.”


    Relying on your continuous integration platform to watch for changes in your codebase
    is the default behavior of both `Jenkins` and `Bamboo` (with, of course, being
    able to run the builds manually). It’s a good approach but it comes with a few
    downsides. For starters, if you go to the “Triggers” tab of the `Github Jobs iOS`
    application plan, the default repository polling frequency is 3 minutes (180 seconds).
    This means that if you push a branch you are working on, it may take up to three
    minutes before the build actually starts. In our case we want to make sure we
    haven’t broken anything and that the application builds on a “neutral” computer.
    If your build process comes with unit tests and static code analysis, it wouldn’t
    be surprising not to get any feedback before 10 or 15 minutes after you pushed
    your changes to the remote repository. A lot of things can happen in 10 minutes
    when you’re fixing a bug or implementing a new feature, that’s way too long and
    that is why you need an alternative way of starting the build: a hook.


    ## Setting up a hook with Bamboo


    Setting up a hook with `Bamboo` should feel pretty easy now that you’ve configured
    your build and that you’ve got time to play around in the interface. If you aren’t
    already, open the “Triggers” tab of the `Github Jobs iOS` application plan and
    click on the “Add trigger” button. In the description field, fill something like
    “pushing from `<platform>`” where platform may be `Github`, `Bithucket`, or your
    homemade code hosting platform. Select “Repository triggers the build when changes
    are committed” from the type combo box and press “Save trigger”.


    As we mentioned earlier, most of the platforms come with out-of-the-box support
    to trigger builds on `Bamboo` (as well as `Jenkins`, for that matter). In case
    your code is hosted on a platform that doesn’t, `Bamboo` comes with a couple of
    shell and python scripts, you can use to trigger a build.


    If you go to the folder where you installed `Bamboo`, you should see a “scripts”
    folder. There are no scripts dedicated to `Git`, and for good reason: it would
    be exactly the same as the one in the `svn-triggers` folder:


    ```python

    #!/usr/bin/python

    #

    # ./postCommitBuildTrigger.py [http://bamboo.atlassian.com/bamboo/ myBuildName](http://bamboo.atlassian.com/bamboo/)

    import sys

    import urllib;


    baseUrl = sys.argv[1]

    buildKey = sys.argv[2]

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 112


    **CHAPTER 6: Automated builds with Bamboo**


    ```python

    remoteCall = baseUrl + "/api/rest/updateAndBuild.action?buildKey=" + buildKey
    fileHandle = urllib.urlopen(remoteCall)

    fileHandle.close()

    ```


    **Note** We are using the Python script, which is a language available on any
    standard installation of OS X. On the other hand, the shell script uses `wget`,
    a command used to fetch files from the web. It’s a pretty powerful command that
    supports many protocols from HTTP to FTP but that is not available on OSX.


    Using this script only requires the base URL of your `Bamboo` installation, and
    the build key, which is the concatenation of the build project key and the plan
    key. In our case, that would be `GJ-IA`:


    ```bash

    $ ./scripts/svn-triggers/postCommitBuildTrigger.py http://localhost:8085/ GJ-IA

    ```


    All you’d need to do now is edit your git’s remote repository “post-receive” hook
    and call this script from it. Note that the script doesn’t need a username and
    a password to trigger a build. The first reason is that this URL doesn’t actually
    trigger a build, it only asks `Bamboo` to poll for changes via the `updateAndBuild`
    URL endpoint, and start a build if, and only if, changes were made. It is also
    more secure that way, since you won’t be giving away valid credentials to some
    third-party service or hardcoded in a Git hook. Finally, if the anonymous access
    scares you, you can restrict the access to this URL to a list of IP addresses.


    ## Setting up nightly builds


    We mentioned earlier that builds often take time and there is nothing more frustrating
    than waiting for your build to end. Because of that, and other reasons we’ll talk
    about shortly, you may want to consider setting up a nightly build.


    A full-featured build process does not only aim at making sure your application
    is not broken. Running unit and acceptance tests as well as building the application
    is one aspect of continuous integration but making sure the collaboration between
    the member of your team goes smoothly, you will also want to consider generating
    documentation. That’s the kind of thing you don’t want to be done for every branch
    of the project since it will slow down your build, but once a day and only for
    the relevant branches that will be used by your coworker, usually the master.
    Not that this rule is also available if you are working alone and your coworker
    is actually the future you.


    ### EXERCISE: SETTING UP A NIGHTLY BUILD


    Setting up a nightly build is easier than it may sound: you will need to add a
    new Job in the current `Github Jobs iOS` application plan with a triggered configured
    to start a build every day at midnight or so. Since it is very similar to what
    we’ve been talking about in the current chapter, we are making a simple exercise
    of it.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 113


    **CHAPTER 6: Automated builds with Bamboo**


    Setting up a nightly build also comes as a health check for your project and your
    whole continuous integration platform. Don’t make the mistake of believing you
    won’t need one if you’re already triggering new builds as soon as you push changes
    to your repository. Nightly builds and push-triggered builds are not mutually
    exclusive. Running builds every day at midnight will give you the certainty that
    your application is not broken and if it is, you will have something to start
    working on right away.


    It is also a way to check that your build machine is behaving as it should be
    and still capable of building your applications. If it’s not, it is better to
    be aware of it when you start working on your application than when you push changes
    for the first time of the day, and realize your build machine is down or not working
    properly.


    ## Integrating Xcode builds into an existing Bamboo installation


    Just like with `Jenkins`, sometimes working on iOS application is only part of
    your company’s activities, and you may have to configure your build in an existing
    `Bamboo` installation that cannot build iOS applications. Once again, `Bamboo`
    chose to go with a different approach than `Jenkins`.'
