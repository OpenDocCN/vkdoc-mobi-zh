    Understanding the provisioning profile


    A provisioning profile is, once again, a file using the property-list format that
    Apple loves so much.


    In the previous section, we helped you to generate a distribution provisioning
    profile that you downloaded from Apple developer portal and installed using the
    iPhone Configuration Utility. The more Xcode evolves, the more this process gets
    easier and you can now ask Xcode to automatically download all the provisioning
    profiles you’re entitled too. Still, we only wanted to cover this subject a little
    so we can tell you more about those provisioning profiles now.


    If you’re an iOS developer that has already been working on an application and
    released an application on the App Store, you probably already have struggled
    with the code-signing process of your application. “Valid signing identity not
    found”, “The executable was signed with invalid entitlements”... These errors
    are far too common to the community of iOS developers and the solution often suggested
    is to remove all your provisioning profiles and start fresh. Of course that usually
    works, but let’s have a look at the provisioning profile. Hopefully, you will
    be able to diagnose these issues and fix them without deleting everything, uninstalling
    Xcode, and throwing your computer through the window.


    Your provisioning profiles are stored in your ~/Library folder, you can either
    look for all of them using the iPhone Configuration Utility, as we’ve shown in
    Figure [7-2](#index_split_002.html#p122), or simply using your terminal. Open
    a terminal window, navigate to the proper directory and list the files available.


    $ cd ~/Library/MobileDevice/Provisioning\ Profiles


    $ ls -hal


