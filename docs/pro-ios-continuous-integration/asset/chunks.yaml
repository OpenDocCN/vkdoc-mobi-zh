    **146**


    **CHAPTER 8: Day-to-day use of Xcode bots**


    Xcode 6


    Xcode 5 was a very important release for many developers. It came with a lot of
    upgrades and fixes for interface builder, especially for Auto Layout. What’s even
    more important is that it came with integration with OS X server, thanks to the
    Xcode service we configured earlier. At the WWDC 2014, Apple announced a new version
    of Xcode, which is even better.


    Just like iOS 7.0, the beginning of the communication between Xcode and the OS
    X server were a little rough. This section will cover how to setup a continuous
    integration architecture for your project using only Apple technologies.


    Continuous integration


    Being able to run unit tests from a single keystroke or compiling, archiving,
    and packaging an application using a couple of steps is nothing new. The first
    one has the downside of taking time that you don’t necessarily have and most of
    the time the developer wil forget to do so, which would make your test suite pointless.
    The second one is a boring process. To fix that, we discovered a few tools that
    we could use directly or wrap into build scripts, like Facebook’s xctool or Marin
    Usalj’s xcpretty.


    With Xcode 5, we finally were capable or running the iOS unit tests from the command
    line (more information on that later) which would make it possible to automatize
    their execution from our continuous integration platform. More importantly, we
    are now capable of configuring our continuous integration platform directly from
    Xcode.


    Communicating with Xcode service from Xcode


    Open Xcode’s preferences (or hit “ + ,” with Xcode open) and select the accounts
    section. Hit the plus sign at the bottom-left corner of the window and select
    “Add server…” from the menu that appears. If everything is working as expected
    and you don’t have a proxy that would prevent it, you should see that your server
    has been automatically discovered on your local Network, thanks to bonjour, as
    shown in Figure [8-4](#index_split_002.html#p148).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 91](index-148_1.jpg)


    **CHAPTER 8: Day-to-day use of Xcode bots**


    **147**


    ***Figure 8-4.** The instance of OS X server we’ve set up is automatically discovered
    on the local network* **Note** Bonjour: Bonjour is Apple’s implementation of the
    zero-configuration networking group. Originally called “RendezVous”, Bonjour can
    be use to locate other computers using multicast Domain Name System (mDNS) service
    record.


    Note that a similar behavior could be achieved with Jenkins, as it will respond
    with an XML based message containing information about the installation if you
    send an UDP broadcast on your network, as shown in the following command:


    $ echo "Hey Jenkins" | nc -u 0.0.0.0 33848


    <hudson>


    <version>1.560</version>


    <url>http://localhost:8080/</url>


    <server-id>990ad56b5659020020aee81d644db8ca</server-id>


    <slave-port>57621</slave-port>


    </hudson>


    This is useful if you want to make sure that your instance or instances Jenkins
    master and slaves are reachable from one to another.


    Select your OS X Server from the list and press the Next button. In the window
    that appears, enter the credentials you’ve chose for the intern and press OK.
    Note that a Guest access is available but since we’ve configured it this way,
    it won’t be able to access the existing bots, let alone create one.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **148**


    **CHAPTER 8: Day-to-day use of Xcode bots**


    Now that we have added our OS X server to Xcode, open the Github Jobs for iOS
    application and from the Product menu select the “Create Bot…” item.


    If you remember correctly how our jobs worked both with Bamboo and Jenkins, they
    all started with a simple step: getting the latest version of the sources from
    a remote repository and then, the build could start. An Xcode Bot is no different.
    In fact, what’s a bot?


    An Xcode Bot is similar to an Xcode scheme in that they both are a set of packaged
    information and instructions. A Bot will contain a reference to a remote repository
    that he has access to and other information about the project to build: when,
    how, and what then.


    When you set up a bot, and we’ll cover this part in a second, you have to decide,
    like pretty much any continuous integration platform, when you want to build a
    project. Once this is decided, you have to decide how the project is going to
    be built: which shared scheme is it going to use? Should it run static code analysis?
    Should it run the test suite and if it does, should it run the tests in the simulator
    or on the plugged devices? Should it archive the build?


    Finally, you have to decide what to do at the end of the build. For example, if
    it failed, should you send an e-mail to the team?


    All of this information is contained in a bot that we will able to build the application
    from the OS X


    Server instance.


    Setting up Github Jobs


    A great feature of the new OS X server is the ability to host git repositories,
    which makes it technically a viable replacement for third-party services such
    as Github or Bitbucket. Of course, that is not entirely true since these services
    do not only provide hosting but also pull requests, release management, and things
    like that. In this section, we’ll see how to create our very first bot, give access
    to our remote repository to Xcode server and see what can be done to manage the
    dependencies.


    Nightly build of Github Jobs for iOS using Xcode bots


    A bot is capable of different things: running tests, using code static analysis
    and archiving the application. Because we are saving the best for the end of this
    book, we will only create a bot that will archive the build every night.


    We mentioned earlier that the information provided by an Xcode Bot was the scheme
    that should be used to build the application. If we use the command line to get
    a quick look at the available schemes, here is what we get:


    $ xcodebuild -list


    Information about project "Github Jobs":


    Targets:


    Github Jobs


    Github JobsTests


    Build Configurations:


    Debug


    Adhoc


    Release


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 92](index-150_1.jpg)


    **CHAPTER 8: Day-to-day use of Xcode bots**


    **149**


    If no build configuration is specified and -scheme is not passed then "Release"
    is used.


    Schemes:


    Github Jobs


    The only scheme available if the Github Jobs scheme we used in our script to build
    the application via Bamboo or Jenkins. Open the “Manage Scheme” panel from Xcode,
    open the details of this Scheme and uncheck, if needed, the Shared checkbox. Close
    the “manage schemes” window and go back to the Bot creation window. If you try
    to use that scheme to build the Github Jobs for iOS


    application, a “Share scheme” checkbox will be automatically checked, as shown
    in Figure [8-5](#index_split_002.html#p150) and if you try to uncheck that scheme,
    the OK button will be disabled.


    We already covered the scheme-sharing problem in Chapter 3 and we mentioned how
    easy it was to forget about this option. That’s yet another advantage of using
    a tool dedicated to Xcode project: you simply can’t create an Xcode Bot based
    on a non-shared scheme.


    Fill in the Name field with a dedicated name to your nightly build bot. Feel free
    to get creative, after all what is the point of using tools referencing robots
    if you can’t give them awesome name? We’ll call ours “Klaus”.


    Make sure the server selected is the one you set up in the past section and, as
    shown in Figure [8-5](#index_split_002.html#p150), make sure the “Commit changes
    and integrates immediately” option is checked.


    ***Figure 8-5.** You can’t create an Xcode bot based on a non-shared scheme*'
