  trans: '

    它们共享同一个代码库，时至今日，双方的领导者仍认为对方是自己的分支。尽管本书将使用 `Jenkins`，但我们执行的大部分操作、调整的配置以及安装的插件，在
    `Hudson` 上也同样适用。


    ## Jenkins 入门


    在一台计算机上运行 `Jenkins` 的要求相当简单，只需要安装 `Java 6` 即可。


    由于苹果公司已停止在 OS X 系统中预装 Java，我们需要确保你的计算机上已安装 Java。时至今日，许多工具仍需 Java 才能运行，因此你可能已经在不经意间安装好了。打开终端并运行以下命令：


    ```

    $ java -version

    java version "1.7.0_25"

    Java(TM) SE Runtime Environment (build 1.7.0_25-b15)

    Java HotSpot(TM) 64-Bit Server VM (build 23.25-b01, mixed mode)

    ```


    如果输出与上述不完全相同，也没有关系，只要显示的是高于 1.6 版本的 Java 即可。如果根本未安装 Java，则会出现类似“No Java runtime
    present, requesting install.”（未找到 Java 运行时环境，请求安装。）的消息。此时，你应该访问 Apple 支持页面下载 Java
    运行时环境，[该页面地址为：http://support.apple.com/kb/DL1572](http://support.apple.com/kb/DL1572)。


    ## 使用命令行安装 Jenkins


    你可以使用我们在前几章讨论过的 `Homebrew` 包管理器来安装 `Jenkins`，也可以直接使用 `Jenkins` 网站提供的原生安装包。根据经验，`Homebrew`
    可能是最简单的方法，因为它使得在有新版本发布（并且 Homebrew 可用）时更新 `Jenkins` 变得极其容易。为此，打开终端并直接运行以下命令：


    ```

    $ brew install jenkins

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **第 5 章：使用 Jenkins 实现自动化构建 - 69**


    只要仔细阅读命令的全部输出内容，它将下载 `homebrew` 上可用的最新版 `Jenkins`，并设置好你启动它所需的一切。


    不过，本书将不会使用这种方法。我们希望你能够真正理解它在底层是如何工作的——从下载 `Jenkins` 到最终让它构建我们的应用程序。如果你并不关心如何运行一个基于
    Java 的 Web 应用程序，可以直接跳到“初步了解”部分。


    打开终端，创建一个“Jenkins”文件夹，并将你的工作目录切换到这个新创建的文件夹中。完成后，使用 `curl` 命令行工具下载最新版本的 `Jenkins`。


    请注意 `–L` 参数，它的意思是“跟随重定向”，当你使用“latest” `Jenkins` URL 时，你实际上会被重定向到最新的版本。在编写本书时，当前版本是
    1.560。


    ```

    $ mkdir ~/Jenkins

    $ cd ~/Jenkins

    $ curl -L http://mirrors.jenkins-ci.org/war/latest/jenkins.war -O

    ```


    如果说 `Jenkins` 的安装很简单，那一点都不为过。我们刚刚下载了最新版本的 `Jenkins` WAR 包，WAR 代表“Web Application
    ARchive”（Web 应用程序归档）。这意味着你使用 `Jenkins` 所需的一切都包含在这个单一文件中；你现在可以使用 Java 命令行工具运行 `Jenkins`。


    ```

    $ java –jar jenkins.war

    Running from: /Users/Palleas/Jenkins/jenkins.war

    webroot: $user.home/.jenkins

    ...

    INFO: Started SelectChannelConnector@0.0.0.0:8080

    ```


    如果你看到了类似的 Java 命令输出，那么 `Jenkins` 应该已经正常启动了。


    正如最后一行所示，你新安装的 `Jenkins` 可以在地址 `0.0.0.0`（基本上代表你自己的 IP 地址）的 `8080` 端口上访问。你可以使用
    `--httpListenAddress` 和 `--httpPort` 参数自定义 HTTP 地址和端口，如下所示：


    ```

    $ java -jar jenkins.war --httpPort=8908 --httpListenAddress=192.168.1.14

    ```


    恭喜你，现在你已经成功启动了你的第一个 `Jenkins` 实例！打开你的默认网络浏览器，加载以下地址：`http://localhost:8080`。如果一切正常，你应该会看到一个空白的界面，背景是一个老管家（与
    Hudson 的那个无关），并有一条欢迎消息，提示你创建一个任务来开始使用。别担心，我们稍后会介绍如何操作。


    `Jenkins` 最令人惊叹的地方可能是它的设计，大多数开发者会认为它“足够好”。你可能会觉得它确实如此（以为一旦配置好任务，就不会在 `Jenkins`
    上花很多时间），但这是个谎言。事实上，你**会**在 `Jenkins` 上花费大量时间。可能每天只有几分钟，但到了周末，你会发现在不知不觉中，竟然已经在
    `Jenkins` 上耗掉了两个小时。这两小时并非浪费，请别误会，但这足以让你认为 `Jenkins` 可以做得更美观，就像许多开源项目通过使用 Twitter
    Bootstrap 提供的默认 CSS 文件来解决这个问题一样。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 46](img/index-72_1.jpg)


    **第 5 章：使用 Jenkins 实现自动化构建 - 70**


    ## 在系统启动时加载 Jenkins


    从命令行运行 `Jenkins` 在某种程度上是可以的。正如我们之前提到的，你不会希望依赖开发者去启动那些会让他们感到厌烦的工具。事实上，你不应该在开发者的计算机上运行
    `Jenkins`，而应该在一个无人编码的中立环境中运行。大多数人和公司通常选择 Mac Mini，这在苹果硬件世界里算是比较便宜的。管理应在启动时运行的命令是通过
    OS X 核心组件“Launch Daemon”完成的。它只需要按照正确的格式编写属性列表文件即可。这有点超出本书的范围，所以我们就不详细介绍了。请注意，如果你决定使用
    `Homebrew` 在实际执行构建的计算机上安装 `Jenkins`，系统会提供一个启动守护进程文件。


    ## 初步了解


    如图 5-1 所示，正如我们之前提到的，用户界面非常简单。你会在左侧看到一个菜单，包含从创建新任务到管理 `Jenkins` 的主要操作，以及一个中央区域，你可以在那里看到你的任务及其当前状态。我们现在真正关心的是用于配置
    `Jenkins` 的部分。点击“Manage Jenkins”链接，然后点击“Manage Plugins”链接。


    ***图 5-1.** 首次打开的 Jenkins 实例主页*


    `Jenkins` 附带了一些预装的插件。首先，有几个用于管理用户凭据的插件。默认的“credential plugin”会为 `Jenkins` 添加一些基本的安全功能，并将用户的凭据存储在本地，而不是依赖像
    LDAP（也已预装）这样的外部系统或第三方服务的 OAuth。它还附带了“Matrix Authorization Strategy Plugin”，一旦配置好，你就可以设置更复杂的授权策略。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **第 5 章：使用 Jenkins 实现自动化构建 - 71**


    `Jenkins` 最初是作为 Java 生态系统的持续集成平台而诞生的。既然一个 Java 项目离不开庞大的 XML 配置文件，那么 `Jenkins`
    的标准安装自然包括了 Maven、Ant 和 Javadoc 支持。它还可以通过 SSH 与远程计算机通信，并通过 DCOM（分布式组件对象模型）与运行 Windows
    的计算机通信，并提供了通过电子邮件发送构建结果的插件。最后，`Jenkins` 本质上是一个社区驱动的项目。正因如此，`Jenkins` 内置了“Translation
    Assistance Plugin”（翻译辅助插件），以便你可以为你自己的语言翻译 `Jenkins` 做出贡献。

