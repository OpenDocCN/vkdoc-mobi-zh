    -   使用 `Jenkins` 和 `Bamboo` 来设计自动化构建并自动化整个构建过程

    -   学习如何使用 `Xcode` 服务器和机器人

    -   了解可以使用哪些质量保证工具来衡量代码质量，以及如何将构建版本发送给测试人员


