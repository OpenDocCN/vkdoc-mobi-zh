- fmt: '# In the Previous Chapter


    In the previous chapter, we had to manage the credentials so Jenkins could connect
    to a slave node over SSH, and communicate with the slave via a Java archive. This
    solution is great because it is simple and easy to set up, since you most certainly
    already are capable of communicating with the slave node over SSH. One downside
    though is your slave has to be accessible by Jenkins. This is fine in most cases,
    if your instance of Jenkins is running locally or if you’ve set up your instances
    in a way that Jenkins can communicate with the slave node, via a private network
    of some kind.


    On the other hand, Bamboo chose the opposite approach: the remote agent will communicate
    with the main instance of Bamboo via a TCP connection.


    # Installing the Remote Agent


    A standard Bamboo installation comes with remote agent support disabled, for security
    reasons.


    To enable remote agent support, go to the configuration section of your instance
    and click on the “Enable remote agent support”. If you’re worried about the security
    implication, there is a dedicated page on the Atlassian documentation, also linked
    in the Agents section of your Bamboo installation:


    [http://docs.atlassian.com/bamboo/docs-055/Security](http://docs.atlassian.com/bamboo/docs-055/Security).


    Once you’ve enabled support for remote agent, click on the “Install Remote Agent”
    button that did appear. On the page that you have been redirected to, you should
    see a link to download the remote agent installer. Just like Jenkins, it’s in
    a Java archive.


    From this moment, we assume you have a remote installation of Bamboo available
    somewhere. If you haven’t, we will be as exhaustive as possible to show you how
    agents in Bamboo work.


    First, download the remote agent installer and start the installation process.


    ```

    $ curl http://bamboo:8085/agentServer/agentInstaller/atlassian-bamboo-agent-installer-5.5.0.jar
    -O

    ```


    ```

    $ java –jar atlassian-bamboo-agent-installer-5.5.0.jar http://bamboo:8085/agentServer

    ```


    Running the agent-installer will download a lot of java libraries and setup a
    remote agent in a directory, called the remote agent home. The default path for
    this directory is `Bamboo-agent-home` in the home directory of the user that started
    the installation process. You can override this value using the `-Dbamboo.home=/path/to/the/home`
    argument.


    The bamboo agent directory will contain information about the remote agent, of
    course, but also the main Bamboo installation. In the `conf` directory you will
    find a file called `wrapper.conf`, among a lot of Java-related settings, such
    that the maximum amount of memory you’re willing to feed this process, you will
    also find information about the default agent, like its URL:


    ```

    wrapper.app.parameter.2=http://192.168.2.10:8085/agentServer/

    ```


    First, this means that this is where you will have to perform your changes in
    case you want to tweak the configuration of the remote agent. As we said, this
    is where you will set the maximum memory allowed and other options. Second, and
    most importantly, this means that an agent cannot be used for multiple instances
    of Bamboo. If you thought about sharing a remote agent with multiple instances
    of Bamboo, think again: it wasn’t meant for this.


    In this folder, you will also find a shell script that you can use to start manually
    the remote agent. To use it, simply run the following command:


    ```

    $ bin/bamboo-agent.sh –h

    Usage: ./bamboo-agent.sh { console | start | stop | restart | status | dump }

    ```


    The console mode will start the remote agent, make it connect to the main Bamboo
    installation and more importantly, keep the process in the foreground, so that’s
    good enough for testing purposes.


    You will eventually have to set up a launched process, like we did for Jenkins
    and for Bamboo at the beginning, to start the remote agent with the computer.
    That’s one downside with the approach that chose Bamboo: with Jenkins, because
    the master will connect to the slave, it can easily awaken a slave when needed.


    Start the process using the following command:


    ```

    $ bin/bamboo-agent.sh console

    Running Bamboo Agent...

    Removed stale pid file: /Users/Palleas/bamboo-agent-home/bin/./bamboo-agent.pid

    STATUS | wrapper | 2014/05/13 20:21:46 | --> Wrapper Started as Console

    ...

    ```


    Now that we have a remote agent that connects to the main installation, as shown
    in Figure [6-11](index_split_002.html#p117), it is time to configure the agent
    and use it to build the application.


    ![Image 73](index-117_1.jpg)


    ![Image 74](index-117_2.jpg)


    **Figure 6-11.** An agent called “Mac Mini” is connect to our main Bamboo installation


    # Configuring the Agent


    The main point of using remote agent to build your application is not so much
    to scale the huge amount of builds your continuous integration platform has to
    handle but actually to be able to run jobs on agents with very specific capabilities.
    In our case, that would be an agent with the `xcodebuild` command available.


    Click on the settings button at the end of the top menu and select the “Agents…”
    item. In the Remote agents section, you should see the remote agent you’ve set
    up, as shown in Figure [6-11](index_split_002.html#p117).


    This picture was taken a little too early, but when you click on the “Edit” link,
    you can actually give a name to this agent. In our case, we named it Mac Mini
    because we really lacked imagination on this.


    Click on the name of your remote. This is where you will see the information about
    your agent, as shown in Figure [6-12](index_split_002.html#p117). What’s important
    here is the “Capabilities” section. The “Agent-specific capabilities” is where
    you will add capabilities about your agent. For example, we want to specify that
    our build can run `xcodebuild` commands.


    **Figure 6-12.** The Remote agent we’ve connected to the main Bamboo installation
    has many capabilities


    ![Image 75](index-118_1.jpg)


    To do that, click on the “Add executable” link, select “Command” in the type field,
    fill `xcodebuild` in the label field and `/usr/bin/xcodebuild` in the path field
    and press Add. You should see the requirement in the list, as shown in Figure
    [6-12](index_split_002.html#p117).


    You can add as much requirement as you need, and these requirements don’t have
    to be a list of executable commands. It can be version of the Java Development
    Kit (JDK) or even simple key/value properties.


    # Updating the Job to Run on the Remote Agent


    Open the “Default job” configuration of the iOS application plan for the Github
    Jobs application, and click on the “Requirements” tab. In the requirement list,
    select “Xcodebuild”, the requirement we created earlier, and press Add. If everything
    worked as expected, you should see that the requirement has been successfully
    added, along with the confirmation that there is a list one agent capable of running
    your job, as shown in Figure [6-13](index_split_002.html#p118).


