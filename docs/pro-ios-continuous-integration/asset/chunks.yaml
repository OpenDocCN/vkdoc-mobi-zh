    The build has been successfully uploaded to TestFlight, so that’s a victory, but
    there is one thing that we need to fix. The deployment job now relies on a third-party
    tool, Shenzhen, to send the build over the air. Of course, as we showed you earlier,
    we could have used curl, but that wouldn’t have given us the opportunity to talk
    about remote agents one last time.


    When we set up our default job that would build the application, we used the agent
    matrix compatibility to let Bamboo decide which agent the build should be run
    on. Our needs were pretty simple: we needed a computer with the xcodebuild command.
    A deployment environment can also be run on a specific agent. The small difference
    here is that it doesn’t use the agent compatibility matrix. This time, you need
    to explicitly set the agent you want to run the job on. Go back to the deployment
    job configuration panel, select the “Beta” one we created earlier, and press the
    “Agents”


    button. In the list, select the agent or the agents that are allowed to deploy
    your app. Note that it doesn’t have to be an agent with the capability of running
    the building tasks. After all, Shenzhen is written in Ruby, which works pretty
    much the same on every platform. You may want to run a deploy job from an agent
    which is explicitly allowed to upload things to a server because of its IP address
    or a private authorization key.


    Finally, there is one final step missing in our plan: we are still running the
    deployment jobs manually!


    From the same environment configuration panel, press the “Triggers” button. Press,
    the “Add trigger” button and, as shown in Figure [7-10, select “After successful
    build plan” fr](#index_split_002.html#p134)om the “Trigger type” combo box and
    make sure the “Use the main plan branch” is checked: you probably don’t want to
    build every feature branch that builds successfully. Press the “Save Trigger”
    button.


