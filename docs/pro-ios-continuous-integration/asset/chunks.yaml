    \n**第 7 章：空中分发**\n\n**121**\n\n既然一切都配置妥当，让我们开始构建并打包应用程序。在本书的这一点上，你应该能够选择运行项目文件夹中\
    \ `bin/cibuild` 的持续集成构建脚本，或者暂时直接使用 Xcode。别担心；我们将在下一节中自动化所有操作。\n\n打开浏览器，用你之前创建的账户登录\
    \ TestFlight。系统会提示你创建一个新团队。点击 `create a new team` 按钮，并在团队名称字段中填写例如 `Github Jobs\
    \ beta testers`。确保选择一个明确的名称，这样将来管理多个团队时会更容易。\n\n在 TestFlight 中，团队是用户列表，可用于轻松设置权限。例如，你可能希望拥有一个专门负责安全的用户团队，在向你的“常规”测试者发布新版本之前，先向他们发送修复重大安全漏洞的构建版本。按下保存按钮。你将被重定向到专门用于上传新构建的页面。如果没有，请从仪表板点击\
    \ `Upload a build` 按钮。\n\n打开一个访达窗口，将刚刚构建的 IPA 文件拖放到为此目的创建的区域中，并在文本区域中填写此版本的新内容。如果你按正确顺序阅读了本书，那么此时此版本带来的主要更改将是“将导航栏中的标题变为绿色”。这是一个非常简单的应用，因此在发布说明中确实没有太多可说的，但在实际项目中，当你编写这些说明时应该格外小心。没有人喜欢简单的“Bug\
    \ 修复和新功能”这类发布说明，当人们足够好奇并有动力使用你应用的测试版时，他们更希望看到细节。\n\n准备就绪后，按下上传按钮，检查列表中被授权的用户，然后按下\
    \ `Update and notify`，这意味着被允许安装注册到 TestFlight 的应用的用户将收到一封包含下载应用新版本链接的电子邮件。你也可以直接手动向他们发送链接。\n\
    \n这就是你向测试者发送应用测试版所需做的全部工作。\n\n当然，从他们那里收集唯一的设备标识符以便生成新的配置文件有点繁琐，但总体而言，你会承认 TestFlight\
    \ 在简化空中分发流程方面做得非常出色。如果一切正常，你应该会在 TestFlight 仪表板的 App 部分看到该构建，如图 7-4 所示。\n\n***图\
