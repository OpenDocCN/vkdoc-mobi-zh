    `Jenkins` comes with pre-installed plugins. For starters, there are a few plugins
    used to manage your user’s credentials. The default “credential plugin” will add
    some basic security features to `Jenkins` and will store your users’ credentials
    locally, instead of relying on an external system like LDAP (which is also already
    installed) or a third-party service’s OAuth. It also comes with the “Matrix Authorization
    Strategy Plugin” that will allow you, once configured, to set up more complex
    authorization strategies.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 5: Automatic Builds with Jenkins - 71**


    `Jenkins` is a tool that started as a continuous integration platform for the
    Java ecosystem. Because a Java project wouldn’t be the same without huge XML configuration
    files, the standard installation of `Jenkins` comes with Maven, Ant, and Javadoc
    support. It can also communicate with remote computers over SSH and DCOM (Distributed
    Component Object Model) for the ones running Windows and provides plugins to send
    the build results by e-mail. Finally, `Jenkins` is nothing if not a community-driven
    project. That is why `Jenkins` comes bundled with the “Translation Assistance
    Plugin” so you can contribute to the translation of `Jenkins` in your own language.'
