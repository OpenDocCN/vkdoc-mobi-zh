- fmt: "# 使用 TestFlight 进行自动化 Beta 分发\n\n上一节介绍了如何使用 `TestFlight` 分发应用的 Beta 版本。这是一个手动过程，即使用户界面非常直观，这项工作也可能很快变得耗时。幸运的是，`REST\
    \ API` 使得自动化此过程成为可能，并能够在您喜欢的持续集成平台上的构建结束时提交打包好的应用程序。让我们从 `Jenkins` 开始。即使您选择使用\
    \ `Bamboo`，我们也建议您阅读本节，因为我们将涵盖比简单地在构建过程结束时将构建上传到 `TestFlight` 更广泛的主题。\n\n如果您还记得，我们在\
    \ `Jenkins` 中设置的构建过程非常简单：克隆应用程序并运行一个负责所有其他事情的 `bash` 脚本。在构建过程结束时，我们添加了一个后构建阶段，用于归档生成的工件并确保其安全。\n\
    \n现在，我们的需求发生了变化，仅能从 `Jenkins` 下载打包好的应用程序已经不够了。幸运的是，`Jenkins` 拥有一个非常棒的社区。在需要集成像\
    \ `TestFlight` 这样非常流行的服务的情况下，很可能已经有人为此开发了插件。让我们安装 `Jenkins` 的 `TestFlight` 插件。\n\
    \n## 为 Jenkins 安装 TestFlight 插件\n\n打开“管理 `Jenkins`”部分，导航到“管理插件”页面。在“可选插件”标签页中，查找\
    \ `TestFlight`。勾选左边的安装复选框，然后按下“不重启安装”按钮。如果您还记得，我们之前提到过为什么在不重启实例的情况下安装插件是安全的。\n\
    \n现在我们需要获取我们的凭证、`API Token` 和 `Team Token`，并将它们安全地存储在 `Jenkins` 中：我们不希望任何有权访问\
    \ `Jenkins` 构建的人能够检索到这些 `Token`，也不希望这些 `Token` 出现在构建日志中。\n\n在“管理 `Jenkins`”部分，导航到“配置系统”页面，滚动到页面底部，您应该会看到一个专门用于\
    \ `TestFlight` 的配置区域。按下添加按钮以添加一对新的 `API Token` 和 `Team Token`，并为其命名，例如 `Github\
    \ Jobs for iOS`，如图 [7-5](#index_split_002.html#p125) 所示。\n\n***图 7-5.** 我们已添加了通过\
    \ `REST API` 上传构建所需的凭证*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    **124**\n\n**第 7 章：空中分发**\n\n准备好后按下“保存”。请注意，此管理部分仅管理凭证，这意味着它仅允许您根据需要添加、编辑和删除任意数量的凭证。\n\
    \n这意味着，在您成功运行一次构建并尝试将生成的 `IPA` 发送到 `TestFlight` 之前，您无法知道凭证是否正确输入。\n\n## 配置 Github\
    \ Jobs for iOS Jenkins 任务\n\n导航到仪表板，点击 `Github Jobs for iOS` 任务，然后在左侧菜单中选择“配置”。滚动到声明后构建操作的页面底部，然后点击“添加后构建操作”。在列表中，选择“上传到\
    \ `TestFlight`”。\n\n勾选“`Token Pair`”。确保您已选择了 `Github Jobs for iOS`。如果您刚刚安装插件并且只添加了一对\
    \ `Token`，情况应该如此。接下来的两个选项应包含 `Jenkins` 用于检索 `IPA` 和（可能的）`dSYM` 文件的 `Ant` 模式。这些模式依赖于我们之前用于归档工件的相同语法：`Ant`\
    \ 模式。`IPA` 的默认值是`**/*.ipa`，这适用于我们，因为构建存储在工作区相对路径下的构建文件夹中。另一方面，`dSYM` 文件必须在上传到\
    \ `TestFlight` 之前进行压缩。事实上，插件不会查找 `dSYM` 文件，而是查找相关的`-dSYM.zip`或`.dSYM.zip`文件。\n\
    \n我们在第 2 章中已经提到过 `dSYM` 文件是什么以及它的用途：它包含应用程序的调试符号。没有这个文件，由 `TestFlight` 收集的崩溃日志是无用的，因为它们无法被转换为用于调试的、适当的、有用的堆栈跟踪。在苹果收购\
    \ `TestFlight` 背后的公司 `Burstly` 之前，`TestFlight` 附带了一个官方的 `SDK`，该 `SDK` 会收集崩溃日志，但要做到这一点，它实际上需要\
    \ `dSYM` 文件来符号化 `SDK` 收集和发送的日志。那么，如果 `SDK` 不再可用，我们为什么还要提这个呢？\n\n仅仅是因为苹果宣布将在明年（2015年）晚些时候提供收集崩溃日志的功能。到那时，使用命令行指令检索和发送\
    \ `dSYM` 文件对您来说应该很容易。让我们看看如何做到这一点。\n\n我们知道 `dSYM` 文件是在构建应用程序时生成的，这意味着在执行 `xcodebuild`\
    \ 命令期间生成。我们可以更新我们的 `cibuild` 脚本，并在 `xcodebuild` 命令之后立即将其压缩，但这并不推荐：我们希望尽可能保持构建脚本的中立性。另一方面，我们可以做的是使用一个专用的构建阶段来找到\
    \ `dSYM` 文件并压缩它。\n\n向上滚动一点，按下“添加构建步骤”按钮，然后在列表中选择“执行 `Shell`”。在出现的文本区域中，输入以下命令：\n\
    \n```\ncd \"$WORKSPACE/build\"\nfind . -name \"*.dSYM\" -exec zip -r \"$WORKSPACE/build/Github\
    \ Jobs.dSYM.zip\" {} \\;\n```\n\n它将找到所有`*.dSYM`文件，并将所有这些文件添加到创建的 `ZIP` 文件中。由于我们知道\
    \ `IPA` 文件的命名方式，我们也知道压缩后的 `dSYM` 文件应该叫什么名字才能被 `TestFlight` 插件找到。我们也可以在为此提供的字段中显式设置压缩后的\
    \ `dSYM` 文件的名称。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 7 章：空中分发**\n\
    \n**125**\n\n我们之前提到过发布说明的重要性，尤其是在 Beta 测试应用程序的背景下。事实上，如果您尝试上传没有发布说明的新构建，`TestFlight\
    \ REST API` 会抛出错误：\n\n```\n$ curl http://testflightapp.com/api/builds.json \\\n\
    -F file=@Github\\ Jobs.ipa \\\n-F api_token=<API_TOKEN> \\\n-F team_token=<TEAM_TOKEN>\n\
    ```\n\n**必须提供 `api_token`、`team_token`、文件和说明（缺少说明）**\n\n我们使用的插件有两种设置发布说明的方式：手动方式和自动方式。手动方式使用“构建说明”文本区域的内容。老实说，除非您愿意在每次构建前更新它，否则这种方式意义不大。第二种方式使用来自版本控制系统（在我们的案例中是\
    \ `Git`）的变更日志。\n\n如果发布说明对您的用户很重要，那么变更日志对开发人员来说也同样重要。通过编写明确的提交信息，意味着没有“修复这个”或“修复那个”，`TestFlight`\
    \ 插件将自动为用户生成适当的发布说明。勾选“将变更日志附加到构建说明”选项，然后按下“保存”。\n\n## 构建应用程序并将生成的 IPA 发送到 TestFlight\n\
    \n在 `Github Jobs for iOS` 任务页面上，按下侧边栏中的“立即构建”链接。一旦开始，点击构建并导航到“控制台输出”部分。输出中有几个部分让我们感兴趣，特别是在执行\
    \ `cibuild` 脚本之后。\n\n```\n$ /bin/sh -xe /var/folders/1v/d8vqkw8x23ndw49f5vs3fzw00000gn/T/hudson65668607800036881.sh\n\
    + find '/Users/Palleas/.jenkins/jobs/Github Jobs for iOS/workspace/build' -name\
    \ '*.dSYM' -exec zip\n-r '/Users/Palleas/.jenkins/jobs/Github Jobs for iOS/workspace/build/Github\
    \ Jobs.dSYM.zip' '{}' ';'\n  adding: Users/Palleas/.jenkins/jobs/Github Jobs for\
    \ iOS/workspace/build/Github Jobs.app.dSYM/\n(stored 0%)\n  adding: Users/Palleas/.jenkins/jobs/Github\
    \ Jobs for iOS/workspace/build/Github Jobs.app.dSYM/\nContents/ (stored 0%)\n\
    ```"
  raw: 'The previous section gave you a tour of how you can use TestFlight to distribute
    a beta version of your application. It was a manual process and even if the user
    interface is really intuitive that’s a task that can end up to be time consuming
    really quickly. Fortunately, the REST API makes it possible to automate this process
    and submit the packaged application at the end of a build from your favorite continuous
    integration platform. Let’s start with Jenkins. Even if you chose to go with Bamboo,
    we suggest you read this section, as we’ll cover a wider topic than simply uploading
    a build to TestFlight at the end of the build process.


    If you remember correctly, the build process we set up in Jenkins was pretty simple:
    clone the application and run a bash script that takes care of everything else.
    At the end of the build process, we added a post-build phase that would archive
    the generated artifacts and keep them safe.


    Well, our needs have changed and being able to download the packaged application
    from Jenkins is not enough anymore. Fortunately for us, Jenkins has a really great
    community. In situations like this where you need to integrate a very popular
    service such as TestFlight, chances are somebody has already developed a plugin
    for it. Let’s install the TestFlight plugin for Jenkins.


    Installing the TestFlight plugin for Jenkins


    Open the “manage Jenkins” section and navigate to the “Manage plugin” page. In
    the “available”


    tab, look for TestFlight. Check the install checkbox on the left and press the
    Install without restart button. If you remember correctly, we mentioned earlier
    why it was safe to install a plugin without restarting your instance.


    Now we need to fetch our credentials, the API and the team tokens, and store them
    securely in Jenkins: we don’t want anybody with access to the Jenkins build to
    be able to retrieve those tokens and we don’t want these tokens to appear in the
    build log.


    While in the “manage Jenkins” section, navigate to the configure System page and
    scroll to the bottom of the page where you should see a configuration section
    dedicated to “TestFlight”. Press the add button to add a new pair of API and team
    token and give it a name, such as “Github Jobs for iOS”, as shown in Figure [7-5.](#index_split_002.html#p125)


    ***Figure 7-5.** We’ve added the required credentials to upload a build via the
    REST API*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **124**


    **CHAPTER 7: Over-The-Air distribution**


    Press “Save” when you are ready. Note that this manage section only manages the
    credentials, which means that it will only permit you to add, edit, and delete
    as many credentials as you need.


    This means that you won’t be able to know if your credentials were properly entered
    until you’ve run a successful build and tried to send the generated IPA to TestFlight.


    Configuring the Github Jobs for iOS jenkins job


    Navigate to the dashboard, click on the “Github Jobs for iOS” job and select “Configure”
    in the left menu. Scroll to the bottom of the page where the post-build actions
    are declared, and click the Add post-build action. In the list, select “ Upload
    to TestFlight”.


    Check the “Token Pair”. Make sure you’ve selected “Github Jobs for iOS”. It should
    be the case if you’ve just installed the plugin and only added one pair of tokens.
    The two next options shall contain the ant patterns Jenkins should use to retrieve
    the IPA and (potential) dSYM file. These patterns rely on the same syntax we’ve
    used before to archive the artifacts: ant patterns. The default value for the
    IPA is “**/*.ipa”, which will work for us because the build is stored in a build
    folder relative to the workspace. On the other hand, the dSYM file must be zipped
    before it is uploaded to TestFlight. In fact, the plugin won’t look for dSYM file
    but related ''-dSYM.zip'' or ''.dSYM.zip'' files.


    We already mentioned in Chapter 2 what the dSYM file was and what it is used for:
    it contains the debug symbols of your application. Without this file, the crashlogs
    collected by testflight are useless because they cannot be transformed into proper,
    useful stack traces for debugging. Before Apple’s acquisition of the company behind
    TestFlight, Burstly, TestFlight came with an official SDK


    that would collect crashlogs but to do that, it actually needed the dSYM file
    to symbolicate the logs the SDK would collect and send. So why are we mentioning
    this if the SDK is no longer available?


    Simply because Apple announced that collecting crash logs would be available later
    next year, in 2015\. By then, retrieving and sending dSYM files using a command
    line instruction should be easy for you. Let’s see how it can be done.


    We know that the dSYM file is generated when the application is built, which means
    during the execution of the xcodebuild command. We could update our cibuild script
    and zip it right after the xcodebuild command, but that’s not recommended: we
    want to keep our build script as neutral as possible. On the other hand what we
    can do is use a dedicated build phase that will find the dSYM


    file and zip it.


    Scroll up a bit, press for the “Add build step” button and select “Execute shell”
    in the list. In the textarea that appears, enter the following command:


    cd "$WORKSPACE/build"


    find . -name "*.dSYM" -exec zip -r "$WORKSPACE/build/Github Jobs.dSYM.zip" {}
    \; It will find all the “*.dSYM” files and for all of these file add them in the
    created ZIP file. Since we know how the IPA file will be called, we know the name
    the zipped dSYM file should have to be found by the TestFlight plugin. We could
    also explicitly set the name of the zipped dSYM file in the field provided for
    that purpose.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 7: Over-The-Air distribution**


    **125**


    We mentioned earlier how important the release notes are, especially in the context
    of beta testing applications. In fact, the TestFlight REST API will throw an error
    if you try to upload a new build without release notes:


    [$ curl http://testflightapp.com/api/builds.json](http://testflightapp.com/api/builds.json)
    \


    -F file=@Github\ Jobs.ipa \


    -F api_token=<API_TOKEN> \


    -F team_token=<TEAM_TOKEN>


    **You must supply api_token, team_token, the file, and notes (missing notes)**


    The plugin we are using has two ways of setting the release notes: a manual one
    and the automatic one. The manual one uses the content of the “Build Notes” text
    area. Let’s be honest, this one doesn’t make much sense unless you are willing
    to update it before each build. The second uses the changelog from the version
    control system, in our case Git.


    If the release notes are important for your users, the changelog are just as important
    to the developers. By writing explicit commit messages, meaning no “fix this”
    or “fix that”, the TestFlight plugin will automatically generate proper release
    notes for the users. Check the “Append changelog to build notes” option and press
    “Save”.


    Building the application and sending the resulting IPA to TestFlight


    On the Github Jobs for iOS job page, press the “Build Now” link in the sidebar.
    Once it’s started, click on the build and navigate to the “Console Output” section.
    There are a few sections in the output that interest us, especially after the
    execution of the cibuild script.


    $ /bin/sh -xe /var/folders/1v/d8vqkw8x23ndw49f5vs3fzw00000gn/T/hudson65668607800036881.sh


    + find ''/Users/Palleas/.jenkins/jobs/Github Jobs for iOS/workspace/build'' -name
    ''*.dSYM'' -exec zip


    -r ''/Users/Palleas/.jenkins/jobs/Github Jobs for iOS/workspace/build/Github Jobs.dSYM.zip''
    ''{}'' '';''


    adding: Users/Palleas/.jenkins/jobs/Github Jobs for iOS/workspace/build/Github
    Jobs.app.dSYM/


    (stored 0%)


    adding: Users/Palleas/.jenkins/jobs/Github Jobs for iOS/workspace/build/Github
    Jobs.app.dSYM/


    Contents/ (stored 0%)'
  trans: "\n# 使用 TestFlight 进行自动化 Beta 分发\n\n上一节介绍了如何使用 `TestFlight` 分发应用的 Beta 版本。这是一个手动过程，即使用户界面非常直观，这项工作也可能很快变得耗时。幸运的是，`REST\
    \ API` 使得自动化此过程成为可能，并能够在您喜欢的持续集成平台上的构建结束时提交打包好的应用程序。让我们从 `Jenkins` 开始。即使您选择使用\
    \ `Bamboo`，我们也建议您阅读本节，因为我们将涵盖比简单地在构建过程结束时将构建上传到 `TestFlight` 更广泛的主题。\n\n如果您还记得，我们在\
    \ `Jenkins` 中设置的构建过程非常简单：克隆应用程序并运行一个负责所有其他事情的 `bash` 脚本。在构建过程结束时，我们添加了一个后构建阶段，用于归档生成的工件并确保其安全。\n\
    \n现在，我们的需求发生了变化，仅能从 `Jenkins` 下载打包好的应用程序已经不够了。幸运的是，`Jenkins` 拥有一个非常棒的社区。在需要集成像\
    \ `TestFlight` 这样非常流行的服务的情况下，很可能已经有人为此开发了插件。让我们安装 `Jenkins` 的 `TestFlight` 插件。\n\
    \n## 为 Jenkins 安装 TestFlight 插件\n\n打开“管理 `Jenkins`”部分，导航到“管理插件”页面。在“可选插件”标签页中，查找\
    \ `TestFlight`。勾选左边的安装复选框，然后按下“不重启安装”按钮。如果您还记得，我们之前提到过为什么在不重启实例的情况下安装插件是安全的。\n\
    \n现在我们需要获取我们的凭证、`API Token` 和 `Team Token`，并将它们安全地存储在 `Jenkins` 中：我们不希望任何有权访问\
    \ `Jenkins` 构建的人能够检索到这些 `Token`，也不希望这些 `Token` 出现在构建日志中。\n\n在“管理 `Jenkins`”部分，导航到“配置系统”页面，滚动到页面底部，您应该会看到一个专门用于\
    \ `TestFlight` 的配置区域。按下添加按钮以添加一对新的 `API Token` 和 `Team Token`，并为其命名，例如 `Github\
    \ Jobs for iOS`，如图 7-5 所示。\n\n***图 7-5.** 我们已添加了通过 `REST API` 上传构建所需的凭证*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**124**\n\n**第 7 章：空中分发**\n\n准备好后按下“保存”。请注意，此管理部分仅管理凭证，这意味着它仅允许您根据需要添加、编辑和删除任意数量的凭证。\n\
    \n这意味着，在您成功运行一次构建并尝试将生成的 `IPA` 发送到 `TestFlight` 之前，您无法知道凭证是否正确输入。\n\n## 配置 Github\
    \ Jobs for iOS Jenkins 任务\n\n导航到仪表板，点击 `Github Jobs for iOS` 任务，然后在左侧菜单中选择“配置”。滚动到声明后构建操作的页面底部，然后点击“添加后构建操作”。在列表中，选择“上传到\
    \ `TestFlight`”。\n\n勾选“`Token Pair`”。确保您已选择了 `Github Jobs for iOS`。如果您刚刚安装插件并且只添加了一对\
    \ `Token`，情况应该如此。接下来的两个选项应包含 `Jenkins` 用于检索 `IPA` 和（可能的）`dSYM` 文件的 `Ant` 模式。这些模式依赖于我们之前用于归档工件的相同语法：`Ant`\
    \ 模式。`IPA` 的默认值是`**/*.ipa`，这适用于我们，因为构建存储在工作区相对路径下的构建文件夹中。另一方面，`dSYM` 文件必须在上传到\
    \ `TestFlight` 之前进行压缩。事实上，插件不会查找 `dSYM` 文件，而是查找相关的`-dSYM.zip`或`.dSYM.zip`文件。\n\
    \n我们在第 2 章中已经提到过 `dSYM` 文件是什么以及它的用途：它包含应用程序的调试符号。没有这个文件，由 `TestFlight` 收集的崩溃日志是无用的，因为它们无法被转换为用于调试的、适当的、有用的堆栈跟踪。在苹果收购\
    \ `TestFlight` 背后的公司 `Burstly` 之前，`TestFlight` 附带了一个官方的 `SDK`，该 `SDK` 会收集崩溃日志，但要做到这一点，它实际上需要\
    \ `dSYM` 文件来符号化 `SDK` 收集和发送的日志。那么，如果 `SDK` 不再可用，我们为什么还要提这个呢？\n\n仅仅是因为苹果宣布将在明年（2015\
    \ 年）晚些时候提供收集崩溃日志的功能。到那时，使用命令行指令检索和发送 `dSYM` 文件对您来说应该很容易。让我们看看如何做到这一点。\n\n我们知道\
    \ `dSYM` 文件是在构建应用程序时生成的，这意味着在执行 `xcodebuild` 命令期间生成。我们可以更新我们的 `cibuild` 脚本，并在\
    \ `xcodebuild` 命令之后立即将其压缩，但这并不推荐：我们希望尽可能保持构建脚本的中立性。另一方面，我们可以做的是使用一个专用的构建阶段来找到\
    \ `dSYM` 文件并压缩它。\n\n向上滚动一点，按下“添加构建步骤”按钮，然后在列表中选择“执行 `Shell`”。在出现的文本区域中，输入以下命令：\n\
    \n```\ncd \"$WORKSPACE/build\"\nfind . -name \"*.dSYM\" -exec zip -r \"$WORKSPACE/build/Github\
    \ Jobs.dSYM.zip\" {} \\;\n```\n\n它将找到所有`*.dSYM`文件，并将所有这些文件添加到创建的 `ZIP` 文件中。由于我们知道\
    \ `IPA` 文件的命名方式，我们也知道压缩后的 `dSYM` 文件应该叫什么名字才能被 `TestFlight` 插件找到。我们也可以在为此提供的字段中显式设置压缩后的\
    \ `dSYM` 文件的名称。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 7 章：空中分发**\n\
    \n**125**\n\n我们之前提到过发布说明的重要性，尤其是在 Beta 测试应用程序的背景下。事实上，如果您尝试上传没有发布说明的新构建，`TestFlight\
    \ REST API` 会抛出错误：\n\n```\n$ curl http://testflightapp.com/api/builds.json \\\n\
    -F file=@Github\\ Jobs.ipa \\\n-F api_token=<API_TOKEN> \\\n-F team_token=<TEAM_TOKEN>\n\
    ```\n\n**必须提供 `api_token`、`team_token`、文件和说明（缺少说明）**\n\n我们使用的插件有两种设置发布说明的方式：手动方式和自动方式。手动方式使用“构建说明”文本区域的内容。老实说，除非您愿意在每次构建前更新它，否则这种方式意义不大。第二种方式使用来自版本控制系统（在我们的案例中是\
    \ `Git`）的变更日志。\n\n如果发布说明对您的用户很重要，那么变更日志对开发人员来说也同样重要。通过编写明确的提交信息，意味着没有“修复这个”或“修复那个”，`TestFlight`\
    \ 插件将自动为用户生成适当的发布说明。勾选“将变更日志附加到构建说明”选项，然后按下“保存”。\n\n## 构建应用程序并将生成的 IPA 发送到 TestFlight\n\
    \n在 `Github Jobs for iOS` 任务页面上，按下侧边栏中的“立即构建”链接。一旦开始，点击构建并导航到“控制台输出”部分。输出中有几个部分让我们感兴趣，特别是在执行\
    \ `cibuild` 脚本之后。\n\n```\n$ /bin/sh -xe /var/folders/1v/d8vqkw8x23ndw49f5vs3fzw00000gn/T/hudson65668607800036881.sh\n\
    + find '/Users/Palleas/.jenkins/jobs/Github Jobs for iOS/workspace/build' -name\
    \ '*.dSYM' -exec zip\n-r '/Users/Palleas/.jenkins/jobs/Github Jobs for iOS/workspace/build/Github\
    \ Jobs.dSYM.zip' '{}' ';'\n  adding: Users/Palleas/.jenkins/jobs/Github Jobs for\
    \ iOS/workspace/build/Github Jobs.app.dSYM/\n(stored 0%)\n  adding: Users/Palleas/.jenkins/jobs/Github\
    \ Jobs for iOS/workspace/build/Github Jobs.app.dSYM/\nContents/ (stored 0%)\n\
    ```\n"
- fmt: "`adding: Users/Palleas/.jenkins/jobs/Github Jobs for iOS/workspace/build/Github\
    \ Jobs.app.dSYM/`  \n`Contents/Info.plist (deflated 52%)`  \n\n`adding: Users/Palleas/.jenkins/jobs/Github\
    \ Jobs for iOS/workspace/build/Github Jobs.app.dSYM/`  \n`Contents/Resources/\
    \ (stored 0%)`  \n\n`adding: Users/Palleas/.jenkins/jobs/Github Jobs for iOS/workspace/build/Github\
    \ Jobs.app.dSYM/`  \n`Contents/Resources/DWARF/ (stored 0%)`  \n\n`adding: Users/Palleas/.jenkins/jobs/Github\
    \ Jobs for iOS/workspace/build/Github Jobs.app.dSYM/`  \n`Contents/Resources/DWARF/Github\
    \ Jobs (deflated 66%)`  \n\nAt the end of the build process, but before the post-build\
    \ actions, the script we added before is run.\n\nAs you can see in the output,\
    \ it found a dSYM file, created a zip archive with its contents (hence the `-r`\
    \ option) and named it `\"Github Jobs.dSYM.zip\"`.\n\n### Uploading to TestFlight\n\
    \n`File: /Users/Palleas/.jenkins/jobs/Github Jobs for iOS/workspace/build/GithubJobs.ipa`\
    \  \n`DSYM: /Users/Palleas/.jenkins/jobs/Github Jobs for iOS/workspace/build/GithubJobs.dSYM.zip`\
    \  \n\n### TestFlight Upload\n\n`TestFlight Upload speed: 741.05Kbps`  \n\n`TestFlight\
    \ Install Link:` [https://testflightapp.com/install/jdiejdi787b13dec113902b4ii343a1-MTExNTY5NzA/](https://testflightapp.com/install/jdiejdi787b13dec113902b4ii343a1-MTExNTY5NzA/)\
    \  \n\n`TestFlight Configuration Link:` [https://testflightapp.com/dashboard/builds/permissions/11129470/](https://testflightapp.com/dashboard/builds/permissions/11129470/)\
    \  \n\nOnce the build is complete, the post-build actions are run in sequential\
    \ order. The TestFlight one we added in the previous section shows that it found\
    \ the IPA file and deduced the path to the zipped dSYM file. With this information,\
    \ we sent an upload request to TestFlight using the REST API and got a valid payload\
    \ in response, containing the URL to the configuration page, where you can go\
    \ and select the users that should receive this build and the installation URL\
    \ we’ve used before that you can send to users so they can install the application.\n\
    \nIf you go back to TestFlight and open the Github Jobs for iOS app from the \"\
    Apps\" section of the top menu, you should see your build, as shown in Figure\
    \ 7-6.\n\n**Figure 7-6.** The build #84 was successfully uploaded to TestFlight\n\
    \nClick on this build and navigate to the \"Build Information\" section from the\
    \ left menu. In this section, you will see all the information about your build\
    \ including, as shown in Figure 7-7, the release notes that have been retrieved\
    \ from the commit history.\n\n**Figure 7-7.** The build’s release notes were created\
    \ via the repository history and includes the name of the author\n\nAs a bonus,\
    \ the page presenting the Github Jobs for iOS job has been updated, as shown in\
    \ Figure 7-8 and contains the information we’ve just mentioned, so you don’t have\
    \ to look for your build once back in TestFlight.\n\n**Figure 7-8.** The job page\
    \ was updated with information about the latest build\n\nLet’s sum up what we’ve\
    \ done. We created and set up a TestFlight account so we could have access to\
    \ an API token and a Team token, which are required to perform an authenticated\
    \ call to the TestFlight Upload API. With this information, we went back to Jenkins\
    \ and installed the TestFlight plugin, so we could update the Github Jobs for\
    \ iOS job and upload the packaged application at the end of the build. But because\
    \ we wanted to add the dSYM file and that folder needs to be sent as a ZIP archive\
    \ to TestFlight, we first updated the job and added a \"Run script\" build phase\
    \ that would take care of the compression process. Finally, we added a \"Upload\
    \ to TestFlight\" post-build action that would upload the artifacts generated\
    \ during the build instead of simply archiving them like before.\n\nYou may be\
    \ wondering why we didn't update our build script and simply add the compression\
    \ action and the upload to TestFlight and simply run one script once and for all.\
    \ That’s because sending the build to TestFlight is not part of the build process,\
    \ per se. We want our continuous integration architecture to provide us valid\
    \ and meaningful feedback. That’s why a job failing because of a build that doesn’t\
    \ work won’t be treated the same way as a job that fails because there was an\
    \ issue during the upload to TestFlight. Separation of concern is, in fact, a\
    \ design principle that applies here. By splitting the build phases into small\
    \ sections, it’s much easier to detect the points of failure and fix them before\
    \ they endanger the stability of the whole build.\n\nNow that we know how to upload\
    \ the build at the end of a Jenkins build, let’s see how to do the same with Bamboo.\n\
    \n## Uploading the App to TestFlight at the End of a Bamboo Job\n\nIf you skipped\
    \ directly to this section thinking that you don’t need to read about Jenkins\
    \ because you chose to go with Bamboo, you may find it hard to follow. As with\
    \ the previous chapter, there actually are going to be some small comparisons\
    \ with the way Jenkins works.\n\nOpen Bamboo and navigate to the configuration\
    \ section of the Github Jobs for iOS plan. There are a couple of steps we need\
    \ to take care of before being able to upload the build generated during the execution\
    \ of the Bamboo plan we set up in the previous chapter.\n\nOnce again, the approach\
    \ chosen by Bamboo is a bit different from Jenkins’. We no longer have a single\
    \ job but a plan, with multiple stages, with multiple jobs and multiple tasks.\
    \ In the \"Stages\" section, you should see a \"Related deployment projects\"\
    \ subsection with a \"Create deployment project\" button. This is indeed what\
    \ we are going to use: a deployment project.\n\nDeployment projects are linked\
