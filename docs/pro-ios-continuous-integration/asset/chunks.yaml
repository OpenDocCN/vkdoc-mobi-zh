    ## Introduction


    There are as many definitions of Continuous integration as there is programming
    language out there, probably more. All of these opinionated definitions have been
    discussed all over the Internet: what it is, how it can help, which tools to use…
    Only a few of them are complete, exhaustive guides about where to start and where
    to go, let alone in the iOS ecosystem. In all fairness, the iOS platform is still
    relatively new.


    Because you have to learn how to walk before you can run, this book will give
    you a tour of the iOS ecosystem from a developer point of view. If you’re interested
    in reading this book, you probably already have spent a few hours in front of
    `Xcode`, but do you know that it will make your life a lot easier with automated
    testing and versioning? Did you know that you could easily use multiple versions
    of `Xcode`? Even more importantly, do you know how it works under the hood? That’s
    the kind of thing this book will teach you.


    Continuous integration is a matter of deciding of the best workflow and choosing
    the right tools. We didn’t want to sound as if you should take our opinion as
    a work of gospel, so we chose to give you all the knowledge you need before covering
    two different continuous integration platforms, `Jenkins` and `Bamboo`. We’ll
    show you how to get started as quickly as possible and how to take a sample application,
    build it, test it, and finally release it to your testers. Once we’ll have covered
    how these third party tools, we’ll cover the OS X Server and the `Xcode`, which
    are official tools provided by Apple. Far from being perfect, they provide enough
    neat advantages to give all those non-official alternatives a scare.


    For all those solutions, we’ll show you how to integrate tools to run your automated
    tests and analyze your code, making sure you’re spending all this time to automate
    the workflow of an application that is well coded and works has expected.


    In the end, it will be up to you to decide which tool suits you and your company
    best.


    # Chapter 1: Introduction to Continuous Integration


    In the world of software engineering, the more time that passes the bigger your
    software usually becomes. It may be because your application is a huge, full-featured
    tool that does a lot of things or it may be simply because your code has become
    more and more complex. At this point, you have to start making decisions and choosing
    the tools you will use and the principles you will follow to make your life easier.
    The sole purpose of continuous integration is exactly that - making your life
    easier.


    You may be reading this book because you’re an independent software engineer or
    leading a team of iOS developers. We will help you find the tools you need and
    teach you how to make them fit in your day-to-day workflow.


    ## What is Continuous Integration?'
