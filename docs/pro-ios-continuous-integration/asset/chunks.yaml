    \ `@implementation` 符号附近和测试用例方法附近有一些小方块，如图 9-3 所示。\n\n*图 9-3. Xcode 自动识别测试用例类和测试用例方法，让你能够轻松运行特定测试*\n\
    这些形状实际上是按钮，你可以点击它们来运行特定的测试用例或某个类中的所有测试用例。由于我们只有一个测试用例类，其中仅包含一个测试用例，因此我们可以运行所有测试。当你只有一个失败的测试用例，需要反复运行直到它通过时，这些按钮会非常有用。\n\
    \n打开 `Product` 菜单，选择“Test”，或者按下 **⌘U**。不出所料，测试应该会失败，并且失败的断言会在主编辑器中高亮显示，同时在测试导航器中列出，如图\
    \ 9-4 所示。\n\n*图 9-4. 失败的断言在主编辑器中高亮显示，失败的测试方法在测试导航器中显示*\n我们的情况很容易解释。由于我们的类初始化器是空的，在对象初始化时，实际上并没有对提供的\
    \ `NSDictionary` 实例做任何处理。这意味着这些属性仍然包含它们的默认值，即 `nil`。我们使用 `XCTAssertEqualObjects`\
    \ 断言来比较这些对象；请注意，我们也可以从 `XCTAssertNotNil` 开始，然后逐步推进。\n\n我们在第 2 章中提到，Xcode 5 引入了一种新的导航方式，允许你从项目中的另一个类打开关联的测试用例类。打开\
    \ `PCSJobOffer.m` 文件。将光标放在 `initWithPayload:` 方法上，点击编辑器左上角的“相关文件”按钮，然后按住 `alt`\
    \ 键，选择“Test Callers ➤ `[PCSJobOfferTests testThatDictionaryIsProperlyMappedToProperties]`”，这样测试文件和实现文件就可以在同一屏幕上显示。\n\
    \n最后，用以下代码实现 `initWithPayload:` 方法的内容，并重新运行失败的测试用例：\n\n```objc\n- (instancetype)initWithPayload:(NSDictionary\
    \ *)payload {\n    self = [super init];\n    if (self) {\n        self.title =\
    \ payload[@\"title\"];\n        self.url = [NSURL URLWithString:payload[@\"url\"\
    ]];\n        self.location = payload[@\"location\"];\n    }\n    return self;\n\
    }\n```\n\n现在我们已经实现了 `initWithPayload:` 初始化器的内容，测试应该会通过，并且在测试用例和测试用例类的 `@implementation`\
    \ 符号附近会显示一个可视标记，如图 9-5 所示。\n\n*图 9-5. Xcode 用绿色符号显示通过的测试用例*\n\n本节为你简单介绍了单元测试。我们创建了一个类来封装每个职位信息的\
    \ JSON 描述，这样我们就可以使用漂亮的对象，而不是不可预测的 `NSDictionary` 实例。我们先编写了测试用例，因此我们知道自己希望初始化器如何工作，然后才编写了实际的实现代码。\n\
    \n**注意：** 映射库：这个例子是开发者经常需要做的重复性工作的典型代表。这就是为什么如果你的应用程序大量使用远程对象，并且需要将许多描述映射到普通的\
    \ Objective-C 对象，你应该考虑使用诸如 Mantle (https://github.com/Mantle/Mantle) 或 KZPropertyMapper\
    \ (https://github.com/krzysztofzablocki/KZPropertyMapper) 之类的库。\n\n恭喜你，你已经编写了一个值得信赖的测试套件的开头部分，以后每次你想为应用程序添加功能时，都可以对它进行改进。请记住，既然你已经建立了测试套件的基础，那么你不再有任何借口不先编写测试，再编写实现代码。\n\
    \n请注意，我们还没有更新主视图控制器中的代码，使其使用 `PCSJobOffer` 类而不是字典。不过，这很容易做到。打开 `PCSViewController.m`\
    \ 文件，更新 `NSURLSessionDataTask` 完成处理程序的内容。不要使用以下代码：\n\n```objc\nself.jobs = [NSJSONSerialization\
    \ JSONObjectWithData:data options:0 error:&jsonError];\n```\n\n而是使用：\n\n```objc\n\
    NSArray *results = [NSJSONSerialization JSONObjectWithData:data options:0 error:&jsonError];\n\
    NSMutableArray *jobs = [NSMutableArray array];\n[results enumerateObjectsUsingBlock:^(NSDictionary\
    \ *jobPayload, NSUInteger idx, BOOL *stop) {\n    [jobs addObject:[[PCSJobOffer\
    \ alloc] initWithPayload:jobPayload]];\n}];\n```\n\n不要忘记更新 `tableView:cellForRowAtIndexPath:`\
    \ 方法的内容，否则你会得到一个错误：\n\n```objc\n- (UITableViewCell *)tableView:(UITableView *)tableView\
    \ cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n    PCSJobOffer *offer = self.jobs[indexPath.row];\n\
    \    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"\
    Cell\" forIndexPath:indexPath];\n    cell.textLabel.text = offer.title;\n    return\
    \ cell;\n}\n```\n\n请注意，我们可以将所有这些过程包装到一个专门的类中，该类将抽象获取职位信息的整个过程，并对该类进行单元测试。这样做需要引入模拟和桩对象的概念，以调整获取数据的方式，这样我们就不会真正调用\
    \ Github 的职位接口。请记住，我们需要能够信任我们获取的数据。这已经远远超出了本书的范围。同样，你应该考虑购买 Graham Lee 的书籍，该书涵盖了所有这些概念以及更多内容。\n\
    \n一个好的测试套件必须具备以下品质：\n\n-   **易于阅读**，这样你一眼就能看出当前正在测试哪个单元。没有什么比无法理解的测试套件更糟糕的了，尤其是当它们不能正确通过时。\n\
    -   **运行速度快**。如果你知道测试全部运行完需要花费一个小时，你就不会花时间去运行所有测试。当然，正如我们之前提到的，可以使用 Xcode 来运行特定的测试用例。另一方面，如果测试套件需要一个小时才能执行完毕，那么当你获得与你正在开发的功能相关的结果时，这个功能可能已经过时了。\n\
    \n这些品质很重要，但即使你严格遵守它们，你仍然需要运行你的测试套件。这正是你的持续集成平台的作用所在。它会自动为你运行测试套件，但要做到这一点，我们需要能够从命令行运行它们。\n\
    \n## 从命令行运行测试\n\n在 Xcode 5 之前，`xcodebuild` 工具只能运行 OSX 项目的测试。这对 iOS 开发者来说是一个巨大的问题，但幸运的是，Facebook\
    \ iOS 团队在首次发布 `xctool` 时修复了这个问题：\n\n```bash\n$ xctool test -sdk iphonesimulator\n\
    [Info] Collecting info for testables... (2471 ms)\nrun-test Github JobsTests.xctest\
    \ (iphonesimulator7.1, application-test)\n[Info] Installed 'com.perfectly-cooked.Github-Jobs'.\
    \ (11709 ms)\n```\n"
