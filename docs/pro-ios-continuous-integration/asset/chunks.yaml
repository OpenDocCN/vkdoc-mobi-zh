- fmt: "# 排版后的文本\n\nContinuous integration is a software engineering principle with\
    \ a very self-explanatory name. During the life cycle of a project, you will be\
    \ continuously integrating small pieces of software into your project. Then, as\
    \ the project grows, you’ll need to make sure these pieces actually fit the way\
    \ they are supposed to. It may sound like a very metaphoric way of saying you\
    \ will merge branches using your favorite version control system, but that’s actually\
    \ what happens - no matter which tool you will be using or how often you will\
    \ be integrating code.\n\nThe principle of continuous integration is never far\
    \ from the concept of “automated testing” and “Software Quality Assurance” (SQA).\
    \ Indeed, integrating pieces of software is one thing, but making sure they fit\
    \ - meaning they don’t break your software, respect your coding conventions, or\
    \ hurt the final product in any way - is a whole other thing.\n\n**1**  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\
    \  \n**2**\n\n## Chapter 1: Introduction to Continuous Integration\n\n### Apple\
    \ History 101\n\nAt the time of writing this book, Apple has just released the\
    \ final version of Xcode 5.1. This 5.0 version was a pretty big release for Apple.\
    \ It arrived at the same time that iOS 7 did, which was a whole new operating\
    \ system with a completely new paradigm. What is even more interesting for us\
    \ is that Apple finally stepped up in the world of continuous integration by starting\
    \ to promote new tools. We will try to cover as many of these tools as we can\
    \ in the following chapters.\n\nOf course, the community of iOS developers didn’t\
    \ wait for Apple to finally make a move, and the principle of continuous integration\
    \ had been advocated for way before the first public release of the iOS SDK. In\
    \ the case of Cruise Control, Jenkins, Apache Continuum, etc., it was mostly a\
    \ matter of adapting existing tools to new technologies.\n\nThe first version\
    \ of Xcode was released in 2003. More than ten years later, Apple has finally\
    \ started giving us officially supported tools such as the Xcode Bots. Needless\
    \ to say, we have come a long way!\n\n### Pros & Cons\n\nThe advantages of continuous\
    \ integration are numerous. The most important is the immediate feedback you get\
    \ when working on a part of your application. It may be because you broke your\
    \ test suite or you did not follow your team’s coding conventions. It may even\
    \ be simply because one of the generated reports told you that you were writing\
    \ code that was too complex. In the end, that feedback results in considerable\
    \ time saved and not spent - or even wasted - debugging.\n\nEqually important\
    \ is the peace of mind you and your team will get from being able to diagnose\
    \ broken code, bugs, or poor quality code early.\n\nFinally, integrating a new,\
    \ significant, portion of code usually means deploying a new version of your application\
    \ that a member of your QA team will need to test. When working as part of a team,\
    \ there is always someone coming to your desk, asking you to install the latest\
    \ version of the application you are working on on his device; don’t be that guy!\
    \ Be the smart one who automated everything.\n\nBuilding, automated testing, code\
    \ coverage… all these concepts are simply a shell command execution away; why\
    \ not let them work for you? As Douglas McIlroy, a well-known UNIX contributor\
    \ said, “What you do today can be automated tomorrow.” That could not be more\
    \ true in the world of iOS development.\n\nMaking a build of your application\
    \ available for the member of your team, your clients, or your boss to download,\
    \ is complicated. For mobile, it’s actually a multi-step process requiring building,\
    \ code-signing, and finally deploying.\n\nWhile we will show in the next chapters\
    \ that it is totally achievable to do this by yourself, some services were born\
    \ with the purpose of easing that process. Testflight, Hockey, or even Cloudbees,\
    \ to name a few are some of the numerous services out there filling the gap. Some\
    \ are free, some come with a price, some are in the cloud, and some are self-hosted,\
    \ but all of them share the same common goal.\n\nThis book does not aim at comparing\
    \ these services and telling you which one is the best. It will not give you an\
    \ exhaustive list, and it will certainly not turn you into an expert in the utilization\
    \ of the one we chose to talk about.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\
    \  \n**Chapter 1: Introduction to Continuous Integration**  \n**3**\n\n> *“There\
    \ is no single development, in either technology or management technique, which\
    \ by itself promises even one order of magnitude [tenfold] improvement within\
    \ a decade in productivity, in reliability, in simplicity.”*  \n> “No Silver Bullet\
    \ — Essence and Accidents of Software Engineering” - Fred Brooks (1986)\n\nOf\
    \ course, all of this is not magic. Being able to receive immediate feedback,\
    \ while a neat advantage, comes at a cost. Setting up a continuous integration\
    \ system takes time. This time is not lost - don’t get us wrong - but that’s something\
    \ you have to take into account. You may not need a full-featured, continuous\
    \ integration platform that builds your app every five minutes when you are working\
    \ alone on a two-screen application. Sometimes, you have to be pragmatic.\n\n\
    Plus, your tools are only as good as the way you use them. You may not be able\
    \ to take the feedback from your CI platform for granted if you set it up incorrectly.\n\
    \n### The Road Ahead\n\nEach chapter will try to cover a very specific part of\
    \ the principle of continuous integration for iOS.\n\nReading this book is kind\
    \ of like taking a journey. You will start by learning how to build an iOS application\
    \ and release it to your team using the simplest approach, and end with a fully\
    \ set up continuous integration installation. Here is an overview of the chapters\
    \ we will cover together.\n\n**Chapter 2 - Continuous Integration Tools and Features\
    \ in iOS and Xcode** - We will create a simple iOS application that we will use\
    \ as an example for our continuous integration process, and use it as an example\
    \ for the rest of the book. In this chapter, we’ll see what tools Xcode provides\
    \ to help you in your day-to-day workflow.\n\n**Chapter 3 - Using Xcode to Release\
    \ an Application Outside the App Store** - With the application created in Chapter\
    \ 2, we will see how we can create a build that you will be able to send to your\
    \ testers. This will be the simplest approach of all, but you have to start somewhere,\
    \ right?\n\n**Chapter 4 - Invoking the Power of the Command Line** - Pressing\
    \ a bunch of buttons is one thing, but knowing what they mean is another. In this\
    \ chapter, you will learn how to leverage the power of the command line and what\
    \ Xcode actually means by “build,” among other things.\n\n**Chapter 5 - Automating\
    \ Builds with Jenkins** - Jenkins is probably the de-facto solution for continuous\
    \ integration. You will learn how to get it started and how it can build your\
    \ iOS applications.\n\n**Chapter 6 - Automating Builds with Bamboo** - Atlassian\
    \ is an Australian enterprise software company that develops products for software\
    \ developers and project managers. One of their products is a commercial alternative\
    \ to Jenkins. You will learn how to get it started and how you can use it to build\
    \ your iOS applications.\n\n**Chapter 7 - Over The Air (OTA) Distribution** -\
    \ Continuous shipping is a bit different than continuous integration and usually\
    \ the final step of a successful build process. You will learn how you can make\
    \ your life and the life of your testers easier by sending them new builds of\
    \ your application as soon as they are available."
