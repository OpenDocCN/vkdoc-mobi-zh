    此脚本会失败，因为 `Manifest.lock` 文件不存在，包含你依赖项的 `Pods` 文件夹也不存在。这可能意味着需要将 `Pods` 文件夹添加到你的主仓库中，但我们确实不想这么做。我们想要做的是在构建实际开始之前安装我们的依赖项。


    ## 在 Xcode Bot 执行的集成过程中安装依赖项


    首先想到的解决方案是再添加一个运行脚本构建阶段，但这会引发一些问题。构建阶段存储在目标级别，在我们的案例中，我们将修改 "Github Jobs" 这个目标。这也意味着每次我们从
    Xcode 构建应用程序时，该脚本都会运行。我们可以简单地在脚本中添加一个`if`条件，如果脚本不是由 "_teammserver" 用户执行的，则退出，但这并不是一个非常稳定和可靠的解决方案。


    我们也可以复制该目标，但这意味着要管理两个目标：一个用于日常工作，另一个用于持续集成。修改目标绝对不是一个好办法。


    在 Xcode 5 中，至少可以说，安装依赖项是一个繁琐的过程。你必须使用一个预构建的 scheme 操作来执行一个运行著名的 `pod install`
    命令的脚本。


    这种方法有几个缺点：由于该脚本存储在 scheme 级别，你无法从脚本执行中获得任何输出，并且必须手动将此输出重定向到某个文件。


    好消息是我们不再需要这种变通方法了，因为 Apple 在 Xcode 6 中引入了**集成前**和**集成后**触发器。我们已经看到了如何使用集成后触发器在构建失败时向提交者发送电子邮件，现在让我们看看如何使用集成前触发器来调用
    Cocoapods 可执行程序。


    在集成界面中，点击屏幕右上角的设置齿轮图标，这将允许你编辑你的 Bot 的设置。点击下一步，直到到达“配置 Bot 触发器”部分。在“集成前”标题下，点击“添加触发器”按钮，然后选择“运行脚本”。在出现的字段中，输入以下脚本：


    ```

    export LC_ALL="en_US.UTF-8"


    PODFILE=`find . –type f – name Podfile`


    cd `dirname $PODFILE`


    pod install

    ```


    这个脚本相当直接。它做的第一件事是定义当前语言环境。这是 Cocoapods 的要求，否则你会得到以下错误：


    `CocoaPods requires your terminal to be using UTF-8 encoding. See`


    [`github.com/CocoaPods/guides.cocoapods.org/issues/26`](https://github.com/CocoaPods/guides.cocoapods.org/issues/26)
    寻求可能的解决方案。


    然后，它使用 `find` 命令来定位 `Podfile`。当执行此脚本时，当前目录并不是你的项目根目录。一旦定位到这个文件，就会使用 `dirname`
    命令来获取包含该文件的目录路径并导航到该目录。请注意，我们本可以对文件夹路径进行硬编码，但这种方式可能更清晰，例如，万一你更改了项目名称。


    一旦我们导航到这个文件夹，我们就运行 `pod install` 命令来安装依赖项。`Pods` 文件夹会被创建，里面包含 `Manifest.lock`
    文件以及 `xcconfig` 文件，后者包含 Cocoapods 正常运行所需的额外信息。例如，以下是为我们项目生成的文件：


    ```

    GCC_PREPROCESSOR_DEFINITIONS = $(inherited) COCOAPODS=1

    HEADER_SEARCH_PATHS = "${PODS_ROOT}/Headers" "${PODS_ROOT}/Headers/SVProgressHUD"

    OTHER_CFLAGS = $(inherited) -isystem "${PODS_ROOT}/Headers" -isystem

    "${PODS_ROOT}/Headers/SVProgressHUD"

    OTHER_LDFLAGS = -ObjC -framework QuartzCore

    PODS_ROOT = ${SRCROOT}/Pods

    ```


    这里重要的部分是声明的 `PODS_ROOT`，它包含了 `Pods` 目录的路径。


    当无法加载此文件时，构建设置 `PODS_ROOT` 在构建期间就不可用。这也意味着无法计算出 `Manifest.lock` 文件的路径，因此我们一直遇到的集成失败就发生了。


    Apple 发布了一个需要如此多工作才能正常运行的工具，这可能看起来令人惊讶，但请记住，我们使用的是与 Apple 毫无关联的第三方工具。


    平心而论，对于 Xcode 和 OS X Server Xcode 服务器，如果我们不依赖 Cocoapods 来管理依赖项，我们本可以在几分钟内完成所有设置。包括创建项目、使用
    Bot 构建项目以及将其托管在 OS X Server 上。


    如果你现在尝试启动一次集成，与 Cocoapods 相关的错误将不再发生，并会列在已解决问题列表下，如图 8-10 所示。


    **图 8-10.** *集成成功，我们在上次集成中遇到的错误被标记为已解决*


    当我们使用 Jenkins 或 Bamboo 来构建应用程序时，这两个平台都有一个共同的特点，即能够将构建限制在应用程序的特定分支上。我们还没有在 Xcode
    Bot 中看到这个功能，但这并不意味着它不存在。


    当你在 Xcode 中创建一个 Bot 时，它会检索你项目当前使用的分支名称，并将 Bot 限制在这个特定分支上。如果你想更改分支名称，你将不得不从日志面板编辑
    Bot，并且在不更改任何内容的情况下，只需点击完成过程中的几个步骤。我们承认这不是一个非常好的流程，但这只是因为 Xcode 对 Bot 参数的控制有限。Xcode
    集成本意是一个非常简单明了的过程：你正在开发一个功能，并且想知道你是否破坏了什么。一旦你的功能完成，删除（或更新）Bot 并继续前进。


    老实说，你可能找不到比 `Klaus` 更糟糕的 Bot 名称了；我们使用它只是为了之后有个理由去更改它。你应该始终使用不言自明的名称，这样你可以快速了解它们的用途。例如，我们的
    Bot 可能应该命名为 “Github Jobs (Nightly)”，这样会更有意义，并且在 Bot 列表中更容易找到。要做到这一点，同时更改集成运行的分支，只需使用我们之前添加集成前触发器时用过的屏幕右上角的齿轮按钮，返回到设置面板。


    要更好地控制你的 OS X Server 持续集成平台的唯一方法是使用另一种直接与服务器通信的界面：**Web 界面**。既然我们已经涵盖了 Xcode 端关于
    Bot 几乎所有需要了解的内容，那么让我们继续探讨 Web 界面。请注意，在 Xcode 5 中，有一种方法可以从 Web 界面直接编辑 Bot 的设置，但根据
    Xcode Server 的最新测试版，这个功能似乎已经消失了。


    ## 从 Web 界面管理 Xcode 服务


    用于 Xcode 服务的 OS X Server Web 界面可通过一个由你计算机在网络上的名称组成的 URL 访问，在我们的例子中是 `romain.local`，后面跟着路径组件
    `xcode`，因此得到：`http://romain.local/xcode`。你可以自己猜测 URL，或者从 OS X Server Xcode 服务面板中，点击屏幕底部的“查看
    Bots”按钮。你也可以点击 Xcode 屏幕右上角的设置滚轮并选择“在浏览器中查看 Bot”。当然，最后一种方法将打开某个 Bot 的详细信息，而不是你的
    Xcode 服务的“主页”。

