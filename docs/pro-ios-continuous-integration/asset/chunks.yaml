  raw: 'They are now capable of detecting potential bugs, which can reduce the amount
    of redundant unit tests you may have to write, and let you focus on the ones that
    actually test your code, not your platform.


    There are few downsides to static analysis that need to be taken into account.
    First, these tools usually run slower than simple compilation and for good reason:
    they are not simply transforming the code, they are actually trying to locate
    potential bugs in it. That requires running complex algorithms against the parsed
    code and that will cost you time.


    Also these tools are not magic, they will only be able to detect bugs it has been
    programed to find.


    They are also not perfect and can sometimes detect bugs that are actually perfectly
    normal lines of code. Those are called “false-positives” and must be reported
    to make the tool better and even more trustworthy.


    For all these reasons, static analysis tools must not fail your build but that
    does not mean they are not helpful: once again there is no silver bullet, but
    none of the tools we’ve shown so far actually are.


    Let’s perform a simple static analysis on the code we wrote for the Github Jobs
    for iOS application.


    For now, you will only need the command line.


    Performing a simple static analysis using clang


    Clang comes as one of the developer tools provided by Xcode command line utilities
    that you’ve already installed, either because you needed things like the make
    command to be able to install homebrew or simply because we nicely asked you to
    in the chapter about command line. However, it does not come with the static-analysis
    tool, you’ll have to download it manually.


    There is a dedicated section about the Clang-based static analyzing tool available
    at


    [http://clang-analyzer.llvm.org/. Navigate to this website to download the latest
    binary available. A](http://clang-analyzer.llvm.org/)t the time we are writing
    this book, the latest release is the #276, which was released on February 19,
    2014.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 10: Quality assurance**


    **185**


    Download and decompress this archive to the folder of your choice (we are putting
    it into the “Tools”


    folder). This is where you will find the “scan-build” binary that runs the actual
    analysis.


    $ cd ~/Tools


    $ curl -O [http://clang-analyzer.llvm.org/downloads/checker-276.tar.bz2](http://clang-analyzer.llvm.org/downloads/checker-276.tar.bz2)


    $ tar -zxvf checker-276.tar.bz2


    $ cd checker-276


    $ ./scan-buid –h


    USAGE: scan-build [options] <build command> [build options]


    ANALYZER BUILD: checker-276 (2014-02-18 22:53:01)


    ...


    You must think of the scan-build command as some kind of proxy because of the
    way it works. The simplest use of this command would be “scan-build xcodebuild”.
    It would build the application and use the output of the xcodebuild command to
    know which files to analyze. You probably know the command to build the application
    from the command line by heart by now. Simply call scan-build at the beginning
    of that command. Before you do, you should add the “~/Tools/checker-276” folder
    in your PATH environment variable to make things easier for you. We are keeping
    the full path in the command for now for the sake of the exercise. This command
    will run as expected, you will only see scan-build-related instructions before
    and after the xcodebuild one.


    $ ~/Tools/checker-276/scan-build xcodebuild -workspace Github\ Jobs.xcworkspace
    -scheme Github\ Jobs clean build


    scan-build: Using ''/Users/Palleas/Tools/checker-276/bin/clang'' for static analysis


    Build settings from command line:


    CLANG_ANALYZER_EXEC = /Users/Palleas/Tools/checker-276/bin/clang


    CLANG_ANALYZER_OTHER_FLAGS =


    CLANG_ANALYZER_OUTPUT = plist-html


    CLANG_ANALYZER_OUTPUT_DIR = /var/folders/1v/d8vqkw8x23ndw49f5vs3fzw00000gn/T/scan-


    build-2014-06-13-225334-95796-1


    RUN_CLANG_STATIC_ANALYZER = YES


    Xcodebuild classic output...


    ** BUILD SUCCEEDED **


    The following commands produced analyzer issues:


    AnalyzeShallow Github\ Jobs/PCSViewController.m


    (1 command with analyzer issues)'
  trans: "\n它们现在能够检测潜在的代码缺陷，从而减少你可能需要编写的冗余单元测试数量，让你专注于那些真正测试**你代码**（而非平台）的测试用例。\n\n\
    静态分析需要考虑的缺点很少。首先，这些工具通常比简单的编译运行得更慢，这是有充分理由的：它们不仅仅是转换代码，而是试图在其中定位潜在的缺陷。这需要对解析后的代码运行复杂算法，而这会花费你的时间。\n\
    \n此外，这些工具并非魔法，它们只能检测出已被编程设定要查找的缺陷。\n\n它们也并非完美无缺，有时会将完全正常的代码行误判为缺陷。这些被称为**“误报”**，必须予以报告，以便让工具变得更好、更值得信赖。\n\
    \n基于所有这些原因，静态分析工具不应导致你的构建失败，但这并不意味着它们没有帮助：再说一次，没有银弹，但我们目前展示过的工具也并非银弹。\n\n让我们对我们为`Github\
    \ Jobs`的`iOS`应用编写的代码执行一次简单的静态分析。\n\n目前，你只需要使用命令行。\n\n### 使用 clang 执行简单的静态分析\n\n\
    `Clang`作为`Xcode`命令行工具提供的开发者工具之一而自带，你已经安装了这些工具，要么是因为你需要像`make`这样的命令来安装`homebrew`，要么仅仅是因为我们在命令行的章节中友好地要求你这样做。然而，它并没有附带静态分析工具，你需要手动下载。\n\
    \n有一个专门的章节介绍基于`Clang`的静态分析工具，可在以下网址找到：\n\n[`clang-analyzer.llvm.org/`](http://clang-analyzer.llvm.org/)。请导航至该网站下载最新的可用二进制文件。在我们编写本书时，最新的版本是\
    \ #276，发布于 2014 年 2 月 19 日。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**第 10 章：质量保证**\n\n**185**\n\n将归档文件下载并解压到你选择的文件夹中（我们将它放到`Tools`文件夹中）。在这里你将找到运行实际分析的`scan-build`二进制文件。\n\
    \n```\n$ cd ~/Tools\n$ curl -O http://clang-analyzer.llvm.org/downloads/checker-276.tar.bz2\n\
    $ tar -zxvf checker-276.tar.bz2\n$ cd checker-276\n$ ./scan-buid –h\n用法：scan-build\
    \ [选项] <构建命令> [构建选项]\n分析器构建版本：checker-276 (2014-02-18 22:53:01)\n...\n```\n\n\
    你必须将`scan-build`命令视为某种代理，因为它的工作方式如此。这个命令最简单的用法是`scan-build xcodebuild`。它会构建应用程序，并使用`xcodebuild`命令的输出来了解要分析哪些文件。你现在可能已经熟悉了从命令行构建应用程序的命令。只需在该命令的开头调用`scan-build`。在执行之前，你应该将`~/Tools/checker-276`文件夹添加到`PATH`环境变量中，以便让事情更简单。为了练习起见，我们现在保留命令中的完整路径。该命令将按预期运行，你只会看到`scan-build`相关的指令出现在`xcodebuild`指令的前后。\n\
    \n```\n$ ~/Tools/checker-276/scan-build xcodebuild -workspace Github\\ Jobs.xcworkspace\
    \ -scheme Github\\ Jobs clean build\nscan-build：正在使用 '/Users/Palleas/Tools/checker-276/bin/clang'\
    \ 进行静态分析\n来自命令行的构建设置：\n    CLANG_ANALYZER_EXEC = /Users/Palleas/Tools/checker-276/bin/clang\n\
    \    CLANG_ANALYZER_OTHER_FLAGS =\n    CLANG_ANALYZER_OUTPUT = plist-html\n  \
    \  CLANG_ANALYZER_OUTPUT_DIR = /var/folders/1v/d8vqkw8x23ndw49f5vs3fzw00000gn/T/scan-\n\
    build-2014-06-13-225334-95796-1\n    RUN_CLANG_STATIC_ANALYZER = YES\nXcodebuild\
    \ 经典输出...\n** 构建成功 **\n以下命令产生了分析器问题：\n    分析浅层 Github\\ Jobs/PCSViewController.m\n\
    \    （1 个命令存在分析器问题）\n```\n"
- fmt: "`scan-build: 1 bugs found.`\n\n`scan-build: Run 'scan-view /var/folders/1v/d8vqkw8x23ndw49f5vs3fzw00000gn/T/scan-build-2014-06-13-225403-95826-1'\
    \ to examine bug reports.`\n\nThe first block is important. It contains a few\
    \ build settings that can be used or overridden, like we’ve done before with the\
    \ `xcodebuild` command and the `CONFIGURATION_BUILD_DIR` one. The first one shows\
    \ the path to the Clang executable being used. Clang’s static organizer tool comes\
    \ with its own version of Clang, as you can see in the `bin` subdirectory in the\
    \ folder you decompressed.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 112](index-186_1.png)\n\n**186**\n**CHAPTER 10: Quality assurance**\n\
    \nYou can easily override this setting using the `--use-analyzer` option, for\
    \ example, to use the exact same compiler you’re using on a day-to-day basis when\
    \ you work with Xcode:\n\n```\n$ ~/Tools/checker-276/scan-build --use-analyzer=Xcode\
    \ xcodebuild -workspace Github\\ Jobs.xcworkspace -scheme Github\\ Jobs clean\
    \ build\n```\n\n`scan-build: Using '/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/clang'\
    \ for static analysis`\n\nBuild settings from command line:\n\n`CLANG_ANALYZER_EXEC\
    \ = /Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/clang`\n\
    \nBy using `Xcode` instead of an actual path to the Clang executable, `scan-build`\
    \ will use `xcrun` to locate the full path to the version of the Clang executable\
    \ used by Xcode.\n\nThe other important parameters are the two ones about the\
    \ output of the command: `CLANG_ANALYZER_OUTPUT` and `CLANG_ANALYZER_OUTPUT_DIR`.\
    \ They respectively contain the kind of report that needs to be generated and\
    \ the path where it will be stored. In fact, the output displayed after the execution\
    \ of the command shows where to find this report. As it turns out the code we\
    \ wrote for the Github Jobs application contains a bug. Let’s have a look at the\
    \ report that was generated. As displayed, all you need to do is call the `scan-view`\
    \ command. The default behavior of this command is to start a web server on your\
    \ computer and to open the report properly formatted, as shown in Figure [10-1](#index_split_003.html#p186).\n\
    \n***Figure 10-1.** The formatted report generated by clang static analyzer shows\
    \ one bug*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**CHAPTER 10:\
    \ Quality assurance**\n**187**\n\nTo be honest, this mistake was not expected\
    \ at the time we were writing this book but that was a good opportunity to see\
    \ the benefits of using a static analyzer. We indeed forgot to call the `[super\
    \ viewWillAppear]`. It’s not very important because we’re not subclassing a container\
    \ view-controller like `UINavigationController`. In fact, the comment near the\
    \ `viewWillAppear` declaration says:\n\n```\n// Called when the view is about\
    \ to made visible. Default does nothing\n```\n\nWhat is even more interesting\
    \ is that this bug isn’t detected when you use the Clang executable provided by\
    \ the latest stable version of Xcode: 5.1.1 (5B1008). That’s the issue we talked\
    \ about in Chapter 2 when we mentioned the Git integration in Xcode. Because of\
    \ Apple’s slow release process, you can easily end up a little behind with the\
    \ developer tools. In fact, if you look at Clang’s changes log about the latest\
    \ release we are using right now (available at [http://clang-analyzer.llvm.org/release_notes.html](http://clang-analyzer.llvm.org/release_notes.html)),\
    \ you can see the following:\n\n> *Includes a new “missing call to super” warning,\
    \ which looks for common pattern in iOS/OS X APIs that require chaining a call\
    \ to a super class's implementation of a method.*\n\nIn all fairness to Apple\
    \ Xcode 6, which was only released as a beta at the time we are writing this book,\
    \ comes with the latest version of Clang and supports these new features. We’ve\
    \ already talked about the `xcrun` tool and the `DEVELOPER_DIR` environment variable,\
    \ so you should be able to check the versions of both Clang executables.\n\nThis\
    \ report was generated in a human-readable way. Of course a computer could parse\
    \ it easily so you can integrate it in your continuous integration platform, after\
    \ all this is very simple HTML code.\n\nThere is another way though. The results\
    \ of the analysis can be exported as... that’s right: plist files. You can use\
    \ the `-plist` option so the generation of the html report file is skipped, as\
    \ the default export format will generate both properly-list files and html. The\
    \ `-o` option can also be used to decide where to store the reports, instead of\
    \ using the temporary folder:\n\n```\n$ scan-build -plist -o build xcodebuild\
    \ -workspace Github\\ Jobs.xcworkspace -scheme Github\\ Jobs clean build\n```\n\
    \nOnce the command has run, you can easily find the reports related to the `PCSViewController`\
    \ class by navigating to the report directory and then all the way to a `PCSViewController.plist`\
    \ file that will contain a list of anomalies described in the following format:\n\
    \n```\n<dict>\n  <key>kind</key>\n  <string>event</string>\n  <key>location</key>\n\
    \  <dict>\n    <key>line</key><integer>60</integer>\n    <key>col</key><integer>1</integer>\n\
    \    <key>file</key><integer>0</integer>\n  </dict>\n  <key>depth</key>\n  <integer>0</integer>\n\
    \  <key>extended_message</key>\n  <string>The &apos;viewWillAppear:&apos; instance\
    \ method in UIViewController subclass &apos;PCSViewController&apos; is missing\
    \ a [super viewWillAppear:] call</string>\n  <key>message</key>\n  <string>The\
    \ &apos;viewWillAppear:&apos; instance method in UIViewController subclass &apos;PCSViewController&apos;\
    \ is missing a [super viewWillAppear:] call</string>\n</dict>\n```\n\nAs you might\
    \ expect, this is far easier to be parsed and analyzed from other software, for\
    \ example Xcode. The thing is, there is no point in running a static code analysis\
    \ on a continuous integration platform if the one you run on your own computer\
    \ returns different results. Fortunately, there is a command made just for that\
    \ purpose that comes with the checker archive called `set-xcode-analyzer`.\n\n\
    Just like the `xcode-select` command that changes the path to the developer directory\
    \ at a global level, this command must be run as a super user. Close Xcode and\
    \ run the following command:\n\n```\n$ sudo set-xcode-analyzer --use-checker-build=/Users/Palleas/Tools/checker-276\n\
    (+) Using Clang bundled with checker build: /Users/Palleas/Tools/checker-276\n\
    (+) Searching for xcspec file in: /Applications/Xcode.app/Contents\n(+) processing:\
    \ /Applications/Xcode.app/Contents/PlugIns/Xcode3Core.ideplugin/Contents/SharedSupport/Developer/Library/Xcode/Plug-ins/Clang\
    \ LLVM 1.0.xcplugin/Contents/Resources/Clang LLVM 1.0.xcspec\n```\n\nThis command\
    \ will locate the path to a Xcode specification file (`xcspec`) and change the\
    \ path to the directory that contains the static analyzer you want to use. This\
    \ has several purposes. The first one is, of course, to be able to use the latest\
    \ versions of the analyzer in your own version of XCode so you get the same results.\
    \ The second, more important one, is that due to the fact that the Xcode service\
    \ for OS X Server requires a path to a valid Xcode developer directory, you will\
    \ be able to run static analysis via an Xcode bot always using an up-to-date version\
    \ of the static analyzer! Now that we know how it works, let’s update the bot\
    \ we created in the previous chapter, the one that runs the unit tests, to also\
    \ run static code analysis.\n\n### Performing a Static analysis from an Xcode\
    \ bot\n\nOpen the settings of the Github Jobs (nightly) Bot that we created earlier\
    \ and change its name to simply `Github Jobs`. Navigate to the `Schedule` step,\
    \ check the `Perform analyze action` and press `Save`. Press `integrate` to manually\
    \ start the Xcode bot and wait until it’s over. As you can see in Figure [10-2](#index_split_003.html#p189),\
    \ a bug has been found, but the analysis did not fail the build because of it.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 113](index-189_1.jpg)\n\
    \n**CHAPTER 10: Quality assurance**\n**189**"
