    Let’s sum up what we’ve done. We created and set up a TestFlight account so we
    could have access to an API token and a Team token, which are required to perform
    an authenticated cal to TestFlight Upload API. With this information, we went
    back to Jenkins and instal ed the TestFlight plugin, so we could update the Github
    Jobs for iOS job and upload the packaged application at the end of the build.
    But because we wanted to add the dSYM file and that folder needs to be sent as
    a ZIP archive to testflight, we first updated the job and added a “Run script”
    build phase that would take care of the compression process. Final y, we added
    a “Upload to TestFlight” post build action that would upload the artifacts generated
    during the build instead of simply archiving them like we were doing before.


    You may be wondering why we didn’t update our build script and simply add the
    compressing action and the upload to TestFlight and simply run one script once
    and for all. That’s because sending the build to TestFlight is not part of the
    build process, per se. We want our continuous integration architecture to provide
    us a valid and meaningful feedback. That’s why a job failing because of a build
    that doesn’t work won’t be treated the same way that a job that fails because
    there was an issue during the upload to TestFlight. Separation of concern is,
    in fact, a design principle that applies here. By splitting the build phases into
    small sections, it’s much easier to detect the points of failure and fix them
    before they endanger the stability of the whole build.


