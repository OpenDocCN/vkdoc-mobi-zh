    请执行以下操作：


    1. 重新划分标题层级（保留合理的`#` `##` `###`结构）

    2. 优化段落格式，删除多余空行

    3. 保留正文核心内容

    4. 所有单独出现的变量名（`varName`），函数名（`funcName()`），类名（`ClassName`），路径名（`/path.to.xxx`），命令名（`cmdname`）以及它们的语句或表达式（`ClassName.funcName(var1
    + var2, "cmd arg0 arg1"`）都需要添加反引号。如果上述东西被粗体（`**`）或者斜体（`*`）包围，去掉星号再加反引号。

    5. 代码块前后加上三个反引号（` ``` `）


    ## 重要规则


    - 不要修改正文内容的语义

    - 不要删减有价值的信息

    - 确保输出是标准Markdown格式

    - 只返回处理后的内容，不要重复输出原文，也不要添加额外说明


    ## 示例


    原文：



    进入 /path/to/xxx 目录，找到 xxx.json。


    在表达式 cvar = avar + bvar 中，加法运算符（+）将 avar 与 bvar 相加，得到它们的和 cvar


    在 List.of(arg0, arg1, arg2) 中，List 接口的工厂方法 of() 接受一系列的元素，返回包含它们的只读列表。


    之后我们这样调用 cmd 命令：cmd arg0 arg1 arg2。


