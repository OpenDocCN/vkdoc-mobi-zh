    **CHAPTER 7: Over-The-Air distribution**


    **139**


    Summary


    At the WWDC 2014, Apple announced what they are planning to do now that they had
    acquired the company behind TestFlight. Internal testing teams, beta distribution
    up to a thousand of users, crash reports, and user feedbacks are among the planned
    tasks. Most of these features are still in a beta at the time we are writing this
    book and will be limited to iOS 8\. Some others, like the crash reporting, should
    be released later in 2015\. You can’t expect those solutions to be perfect just
    yet, but that’s really something most developers are happy about. What’s important
    here is that you know pretty much how everything works, from using an existing
    distribution platform to developing your own.


    This chapter was about over the air deployment. We introduced you (or not) to
    a very famous solution called TestFlight that was recently acquired by Apple.
    This solution is really powerful since it will help you manage your application
    and multiple teams of users so you can send beta versions of your application
    without the hassle. We showed you how to send those builds to TestFlight using
    the command line and even doing so automatically at the end of a build process,
    using your favorite continuous integration platform.


    Now that we’ve given you a break from the continuous integration platform, you
    should be ready to discover a new tool that was released by Apple last year: Xcode
    Bots.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter


    Day-to-day use of Xcode bots


    We mentioned in the first chapter that this book was going to be like a journey.
    We started with giving you a tour of the tools at your disposal and we set up
    a simple but powerful continuous integration architecture using multiple platforms.
    By now we hope you’ve made a choice between Jenkins and Bamboo but if you haven’t,
    here is a chapter to make it even harder for you to make a decision.


    The previous chapters covered the tools from a time when Apple didn’t care very
    much about continuous integration. Fortunately for everyone, clever people found
    ways to adapt the existing tools to the new technologies and thanks to Jenkins
    and Bamboo, you should end up with pretty decent continuous integration architectures.


    Xcode 5’s release was not only about giving you a hint of what OSX 10.10 may look
    like and allowing you to merge storyboard files without headaches. It comes with
    major improvements that you will be able to use: OS X server’s Xcode service and
    Xcode bots. Of course it wasn’t perfect; we have yet to find an Apple developer
    tool that was perfect on day one. Some would say Apple doesn’t care but we stand
    with the ones that think they actually do. Xcode bots were more than welcomed
    the day they were announced. However, at WWDC 2014 Apple announced changes and
    improvements that make Xcode Bots must-use tools for the iOS and OSX developers.


    We’ll start with a quick description of why we need to have a look at yet another
    continuous integration tool and then move to OS X Server, with a little bit of
    Apple history. Next, we’ll move to Xcode 5 and how to integrate it with OS X Server
    to manage our git repository and be able to create a fancy new bot. Finally, we’ll
    use this bot to build the Github Jobs for iOS application every night and see
    how it works with a non-officially supported 3 tool: Cocoapods.


    Why do we need yet another continuous integration tool?


    After we covered how to setup the continuous integration platforms Jenkins and
    Bamboo, we kind of broke the flow by covering a different subject: over the AIR
    application deployment. Right now you may be wondering why we would need another
    continuous integration platform, since everything you know at this point is more
    than enough to automatically build and deploy an application.


    **141**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **142**


    **CHAPTER 8: Day-to-day use of Xcode bots**'
