    <string>THIS-IS-A-DEVICE-UDID</string>


    <string>THIS-IS-ANOTER-DEVICE-UDID</string>


    <string>THIS-IS-A-THIRD-DEVICE-UDID</string>


    <string>THIS-IS-A-FOURTH-DEVICE-UDID</string>


    <string>THIS-IS-A-FIFTH-DEVICE-UDID </string>


    </array>


    The UUID is important. You’ve probably already seen it if you changed the code
    signing settings of your application and wanted to commit these changes through
    git or another VCS. If you go back to Xcode filter the build settings on “UUID”,
    you should only see the provisioning profiles section, as shown in Figure [7-11.
    That’](#index_split_002.html#p137)s because the provisioning profile you want
    Xcode to use is actually identified by its unique identifier, while you only see
    its name.


