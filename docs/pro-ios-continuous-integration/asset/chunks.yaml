    **CHAPTER 9: Adding Unit testing to the mix**


    ***Figure 9-7.** The test report shows in detail which test failed and why*


    That’s pretty much all there is to know about running your unit tests from a continuous
    integration platform like Jenkins, mostly because we already have a job that was
    configured earlier and that we are using great tools such as xcpretty to handle
    the hard job for us. In the following sections, we will see how to run our tests
    from Bamboo and using an Xcode bot.


    Running tests from Bamboo


    Once again, the people who made Bamboo went for a slightly more complex approach
    when it comes to running testing operations. In fact, this is what it says in
    the configure plan “Stages” section: *Each stage within a plan represents a step
    within your build process. A stage may* *contain one or more jobs which Bamboo
    can execute in parallel. For example, you*


    *might have a stage for compilation jobs, followed by one or more stages for various*
    *testing jobs, followed by a stage for deployment jobs.*


    Since we’ve already configured a build job and a deploying job, let’s add a testing
    job! This is exactly what we mentioned previously about splitting the whole continuous
    integration process into multiple jobs.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 108](index-179_1.jpg)


    **CHAPTER 9: Adding Unit testing to the mix**


    **179**


    Click on the “Add Job” button and select “Clone an existing job” so you don’t
    have to re-enter all the information about the repository to clone. Fill in “Job
    Name” with “Automated testing” and press


    “Create job”. Click on the “Automated Testing” job in the list and remove the
    two script build phases that, well, build the application and zip the dSYM folder
    as we won’t need it.


    Add a first script task that will install the dependencies for us. In the “Task
    description” field, enter


    “Installing the dependencies” and in the “Script body” one, fill “pod install”.
    Press Save. Add a second script task that will actually execute the test. In the
    “Task description” field enter “Running the test suite” and in the “Script body”
    one, fill the command we used earlier, just like we did on Jenkins, and press
    “Save”.


    xcodebuild -workspace "Github Jobs.xcworkspace" -scheme "Github Jobs" -sdk iphonesimulator7.1


    clean test | xcpretty -t -r junit && exit ${PIPESTATUS[0]}


    Final y, add one last “JUnit Parser” task that wil look for the junit xml report.
    In the “Task description”


    field enter “Parsing the JUnit test reports” and in the “custom results directories”
    fill “**/build/reports/


    junit.xml”. Then, press “Save”. We mentioned in the chapter about Bamboo that,
    as with Jenkins, the tasks run sequential y. Right now the JUnit task is happening
    right after the script one that ran the test suite. This means that when the test
    fails (as it is right now), the task arching the Junit reports will not be executed.
    To fix that, drag the “Junit Parser” task into the “Final Tasks” section, as shown
    in Figure [9-8.](#index_split_003.html#p179)


    ***Figure 9-8.** The JUnit Parser task has to be moved to the Final Tasks section
    or it won’t be run when the tests fail* When you are ready, run the whole “Github
    Jobs for iOS” plan: it will run the job that builds and packages the application
    and the one that runs the test suite and publishes the reports. Click on the


    “Automated Testing” job once it has finished running and select the “Tests” tab.
    As you can see in Figure [9-9](#index_split_003.html#p180), it shows the details
    of the failing tests. What’s even better – and that’s one of the perks of using
    a product from the Atlassian company – is that you can create a Jira issue directly
    from that failing test case in particular.


