    \ great*\n\nThe health report is based on the result of the previous builds, which\
    \ is pretty abstract since it only considers the final result: passing or failing.\
    \ Of course, a passing build does not mean that a job is going great. We will\
    \ talk more about this in the section about unit testing but consider the following\
    \ context: a project with a lot of tests failing. Out of laziness, lack of priorities,\
    \ or a tight deadline, the failing tests have been deactivated and your project\
    \ sure isn’t going great. It is up to you to keep this health report meaningful\
    \ by adding a bit of context, such as the “Project Health Report Plugin” that\
    \ can create more detailed reports, as shown in Figure [5-11](#index_split_001.html#p86).\
    \ By now, you should be able to install it by yourself.\n\n***Figure 5-11.** The\
    \ “project health report” plugin shows a more detailed overview of the project’s\
    \ health*\n\n**Receiving Notifications and Fixing the Build Right Away**\n\nIf\
    \ you want a project to be healthy, there is nothing more important than fixing\
    \ the build. It’s pretty easy to just think, “I’ll fix the build later”, and forget\
    \ about it. Even if the application works on your computer and your testing devices,\
    \ your coworkers may not know that.\n\nTo be able to fix the build right away,\
