  trans: "\n实际上，这并不完全正确。苹果还提供了一个企业计划，你可以用它来向更多用户发布 App Store 之外的应用程序。该计划不是为了取代 App\
    \ Store，而是帮助部署内部应用。事实上，无法使用此类账户在 App Store 上发布应用。不过，当你面临这些情况时，它非常有用，因为你不需要选择一组唯一的设备标识符。该计划主要针对公司，并且需要付出一定代价：每年约\
