    Environment” section, re-run the job and go to the Console Output section of the
    job. You should see a colorized output, just like the one in Figure [5-14](#index_split_001.html#p89).


    ***Figure 5-14.** The output of the job building the Github Jobs application,
    with colors*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **88**


    **CHAPTER 5: Automatic Builds with Jenkins**


    Going back to the script we entered, the $WORKSPACE is yet another environment
    variable provided by Jenkins for you to use in your build scripts. There are about
    15 environment variables available to shell scripts that are listed at “http://localhost:8080/env-vars.html/”.'
  trans: "\n***图 5-10.** 如果过去的构建全部通过，说明项目运行状况良好*\n\n健康报告基于之前构建的结果，但这相当抽象，因为它只考虑了最终结果：通过或失败。当然，一次通过的构建并不意味着任务运行良好。我们将在关于单元测试的章节中详细讨论这一点，但先考虑以下情况：一个项目中有大量测试失败。由于懒惰、缺乏优先级或紧迫的截止日期，这些失败的测试被停用了，那么你的项目肯定运行不佳。你需要通过添加一些背景信息来让这份健康报告变得有意义，例如使用“Project\
    \ Health Report Plugin”插件来创建更详细的报告，如图 5-11 所示。现在，你应该能够自行安装该插件了。\n\n***图 5-11.**\
    \ “Project Health Report”插件显示了项目健康状况的更详细概览*\n\n**及时接收通知并修复构建**\n\n如果你希望项目保持健康，没有什么比修复构建更重要的了。人们很容易产生“我稍后再修复构建”的想法，然后忘记这件事。即使应用程序在你的电脑和测试设备上运行正常，你的同事可能并不知道这一点。\n\
    \n为了能够立即修复构建，你需要在构建失败时立即收到通知，例如通过一封简单的电子邮件。Jenkins 的默认安装会使用 `localhost` 和一系列默认设置作为\
    \ SMTP 服务器来发送这些邮件，但如果你没有运行这样的服务器，这很可能无法工作。要解决这种情况，你可以使用你的 Gmail 账户凭据，在 Jenkins\
    \ 系统配置部分的 **E-mail Notifications** 表单中进行配置，该表单还提供了测试配置的功能。完成后，你只需在“Github Jobs\
    \ for iOS”任务配置的末尾添加一个新的构建后操作，如图 5-12 所示。\n\n***图 5-12.** 对于每次不稳定的构建，`romain.pouclet@gmail.com`\
    \ 背后的用户都会收到一封邮件*\n\n每次构建失败时，都会有人收到一封包含构建直接链接的邮件通知。控制台输出会准确显示发生了什么，这样你就可以自责一下，因为你又一次忘记在构建应用程序之前共享\
    \ scheme 或安装依赖了。\n\n参见 `http://localhost:8080/job/Github%20Jobs%20for%20iOS/34/`\n\
    \n```\nStarted by user Romain Pouclet\nBuilding in workspace http://localhost:8080/job/Github%20Jobs%20for%20iOS/ws/\n\
    Fetching changes from the remote Git repository\nFetching upstream changes from\
    \ git@github.com:Palleas/Github-Jobs.git\nusing GIT_SSH to set credentials Palleas\
    \ Jenkins private key to communicate with github\nChecking out Revision 948ff10d7228ec8d1d6bda405d403aef9150a336\
    \ (origin/master)\nWorking directory is http://localhost:8080/job/Github%20Jobs%20for%20iOS/ws/\n\
    ...\n```\n\n在这个时不时就有新创公司推出新服务、号称通过“消灭电子邮件”来革新公司内部沟通方式的时代，使用电子邮件来接收构建失败的通知似乎有点奇怪。但问题是，电子邮件通知是\
    \ Jenkins 标准安装自带的免费功能。如果你需要更适合公司环境的通知方式，比如在特定聊天室里发送消息，很可能有相应的插件可以做到。事实上，你应该仔细考虑你将使用的通知类型。如果你讨厌收到电子邮件，你甚至不会费心去阅读\
    \ Jenkins 发来的邮件，你就不会去修复构建，那么一切又会回到原点。\n\n**监控多个项目的状态**\n\n到目前为止，我们介绍的方法对开发者——那些实际有能力处理失败构建的人来说——非常有用。你大概不想让你的老板收到那些邮件（他可能也不想）。而且，这些通知是针对特定项目的，有时你可能希望更广泛地了解整体状况。\n\
    \n这就是为什么会有一些插件可以显示多个任务的状态，例如“Wall Display Plugin”。如图 5-13 所示，你可以使用这类插件来展示项目（包括你应用的安卓版本、后端等）的运行状况。\n\
    \n***图 5-13.** 包含所有平台的“Github Jobs”项目状态*\n\n最后，如果你不喜欢它的外观，或者想要更符合需求、集成到其他解决方案中的东西，你仍然可以使用\
    \ `/cc.xml` 提供的 feed。当 Jenkins/Hudson 的第一个版本发布时，CruiseControl 主导着自动化构建平台市场，并确立了一个标准：\n\
    \n```xml\n<?xml version=\"1.0\" ?>\n<Projects>\n  <Project activity=\"Sleeping\"\
    \ lastBuildLabel=\"1\" lastBuildStatus=\"Success\" lastBuildTime=\"2014-04-27T22:06:35Z\"\
    \ name=\"Github Jobs Backend\" webUrl=\"http://localhost:8080/job/Github%20Jobs%20Backend/\"\
    />\n  <Project activity=\"Sleeping\" lastBuildLabel=\"1\" lastBuildStatus=\"Failure\"\
    \ lastBuildTime=\"2014-04-27T21:05:02Z\" name=\"Github Jobs for Android\" webUrl=\"\
    http://localhost:8080/job/Github%20Jobs%20for%20Android/\"/>\n  <Project activity=\"\
    Sleeping\" lastBuildLabel=\"35\" lastBuildStatus=\"Success\" lastBuildTime=\"\
    2014-04-27T21:03:55Z\" name=\"Github Jobs for iOS\" webUrl=\"http://localhost:8080/job/Github%20Jobs%20for%20iOS/\"\
    />\n</Projects>\n```\n\n既然我们已经了解了 Jenkins 能为我们做什么，让我们回到我们的 Github Jobs for iOS\
    \ 应用程序，并更新任务以满足我们的需求。\n\n**集成我们的构建脚本**\n\n我们已经介绍了如何使用 **Xcode Build** 插件来构建 Github\
    \ Jobs 应用程序，这个插件为我们做了一切，甚至更多。这类插件的问题在于，它们有点像“黑盒”，当然这并不是贬义，因为大部分插件都是开源的。问题是，它们抽象了很多底层发生的事情，并且在我们成功编写了一个大约十行代码（包括\
    \ shebang 和注释）的构建脚本之后，它们反而增加了许多复杂性。此外，如果你遇到了特定环境的构建问题，手动重新运行构建脚本也只需一个 SSH 命令。\n\
    \n考虑到这一点，回到我们创建的任务，移除“Xcode”构建阶段。由于我们编写的脚本也通过 Cocoapods 处理了依赖的安装，请清空“Execute Shell”构建阶段的文本区域，并填入以下命令（别忘了引号）：\n\
    \n```\n\"$WORKSPACE/bin/cibuild\"\n```\n\n如果你还记得上一章，我们的脚本使用了 `xcpretty` 来让 xcode\
    \ 输出更易读、更美观。问题是，Jenkins 的构建控制台输出是纯文本，除非你安装了 **AnsiColor Plugin**。安装该插件后，在 **Build\
    \ Environment** 部分勾选“Color ANSI Console Output”选项，然后重新运行任务，并前往任务的 **Console Output**\
    \ 部分。你应该会看到带有颜色的输出，就像图 5-14 所示的那样。\n\n***图 5-14.** 构建 Github Jobs 应用程序的任务输出（带颜色）*\n\
    \n回到我们输入的脚本，`$WORKSPACE` 是 Jenkins 提供的另一个环境变量，供你在构建脚本中使用。大约有 15 个环境变量可供 shell\
    \ 脚本使用，它们列在 `http://localhost:8080/env-vars.html/` 上。\n"
- fmt: "`$JENKINS_HOME`和`$WORKSPACE`是绝对路径，分别对应于 Jenkins 的安装目录（在我们的例子中是`~/.jenkins`）和仓库内容存储的目录（在我们的例子中是`/Users/Paleas/.jenkins/jobs/Github\
    \ Jobs for iOS/workspace`）。我们已经使用第二个路径来定位构建脚本，并且可以轻松找到`BUILD_NUMBER`的用途。\n\n##\
    \ 更新构建编号\n\n返回“Github Jobs”项目，在你喜欢的文本编辑器中打开`cibuild`脚本。我们在前一章讨论了`agvtool`，它可以自动更新应用程序的构建编号。在`pod\
    \ install`命令之前添加以下行：\n\n```\nagvtool new-version -all ${BUILD_NUMBER:?\"BUILD_NUMBER\
    \ should be set, are you sure this script is run within a ci job?\"}\n```\n\n\
    除了最后一部分，语法应该不难理解。我们使用了一个巧妙的 bash 技巧，称为“参数展开”。基本含义是，如果`BUILD_NUMBER`变量不可用（或为空），脚本将以非零返回码退出。\n\
    \n在更新构建脚本并测试其正常工作时，你的 Jenkins 实例可能无法从外部访问，因此你的仓库托管服务无法在你每次推送时自动发送请求来触发构建。从现在开始，你应考虑运行以下命令：\n\
    \n```\n$ git push && java –jar ~/Jenkins/jenkins-cli.jar build \"Github Jobs for\
    \ iOS\"\n```\n\n## 解锁钥匙串\n\n在我们的脚本中，我们还需要一个`PASSWORD`环境变量来在代码签名前解锁钥匙串。将密码硬编码在构建脚本中并不安全，因此我们做了一个简单的补救措施：在运行脚本之前声明环境变量。这虽然不太安全，但至少密码不会在仓库中可见。\n\
    \n我们无法使用同样的补救措施将密码写在作业的配置表单中。为确保安全，我们需要使用另一个名为“Mask Password”的插件。返回 Jenkins 配置部分并安装它。\n\
    \n完成后，进入“Github Jobs”Jenkins 作业的配置，在“构建环境”部分找到“mask passwords (and enable global\
    \ passwords)”选项。点击“添加”按钮并在此添加密码，如图[5-15](#index_split_001.html#p91)所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 60](index-91_1.jpg)\n\n**CHAPTER 5: Automatic Builds with Jenkins**\
    \  \n**89**\n\n***Figure 5-15.** 将密码添加为环境变量，以便在构建脚本中使用*\n\n就这样！我们的脚本应该会自动解锁钥匙串。不要担心这样存储密码的安全性。密码已被正确编码并存储在我们之前提到的`config.xml`文件中。如果你使用\
    \ Jenkins 管理中定义的全局密码，它将更加安全。此外，即使你添加一个新的 shell 构建步骤来运行以下脚本：`echo $PASSWORD`，该命令的输出（即密码）也会被插件自动混淆。\n\
    \n## 事后清理\n\n最后一步我们尚未提及，但你需要在此上下文中认真考虑。请记住，作业的第一个阶段是从远程仓库获取内容，然后实际执行一些任务，而我们的任务之一就是更新构建编号。这意味着需要在多个地方更改信息，运行脚本后，工作副本的状态如下：\n\
    \n```\n$ git status --short\nM \"Github Jobs.xcodeproj/project.pbxproj\"\nM \"\
    Github Jobs/Github Jobs-Info.plist\"\nM \"Github JobsTests/Github JobsTests-Info.plist\"\
    \n```\n\n这并不好。下次从远程仓库拉取新内容时，如果这三个文件中有任何一个被修改，就会发生冲突，导致构建失败。这就是为什么你需要事后清理。要做到这一点，你有多种选择。最简单的方法是在构建的“源代码管理”部分中打开“附加行为”下拉菜单，并选择“Clean\
    \ before checkout”：这将把工作空间恢复到干净状态，然后安全地拉取新内容。\n\n## 将 Xcode 构建集成到现有 Jenkins 安装中\n\
    \n有时在公司里，iOS 开发可能不是唯一的开发类型。其他移动开发（如 Android 或 Blackberry）、使用 PHP、Java 或 Ruby 的后端开发，这些技术几乎可以在任何环境中运行。如果\
    \ iOS 开发是在之后才开始的，你可能会发现一台 Jenkins 已安装在非 OS X 平台上，该平台无法运行 Xcode 和构建 iOS 应用程序。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)  \n**90**  \n**CHAPTER 5: Automatic\
    \ Builds with Jenkins**\n\n简单的解决方案是安装一个专用于构建 iOS 应用程序的新 Jenkins，但这将导致你需要维护两个 Jenkins\
    \ 安装。此外，你将无法从一个地方看到所有项目的状态。既然你可能不想成为持续集成中的“异类”，并且希望与他人良好协作，那么你可以考虑使用更合适的解决方案——称为“从节点”。\n\
    \n## 从节点基础\n\nJenkins 从节点本质上是在专用节点上运行的轻量级 Jenkins 实例，可用于扩展目的——当你的实例构建了大量作业，且希望在多台构建机器之间平衡负载时。另一种情况是，你需要在具有特定要求的平台上构建作业，例如能够运行\
    \ Xcode 和命令行工具。\n\n此时，你需要做的事情和你之前做过的没什么不同：进入管理 Jenkins 部分，添加专用凭据，填写文本字段，并勾选复选框。\n\
    \n## Jenkins 从节点的结构\n\n打开 Jenkins 的管理部分，点击“管理节点”链接。你应该会看到主节点，即自本章开始以来一直在运行的 Jenkins\
    \ 安装。点击左侧菜单中的“新建节点”链接。在出现的表单中，选择“Dumb Slave”选项（这应该是唯一可用的选项），并在文本字段中为节点填写一个名称。你可以自由发挥创意，但务实的方法建议将其命名为“Xcode\
    \ builder”之类的。找到名称后，点击“确定”。\n\n创建节点非常简单。一旦你确定了名称（以及可选的描述），有几个必填字段需要填写：构建将在哪里执行、与此节点关联的标签，以及如何与该节点通信。\n\
    \n“Remote FS root”是从节点上用于存储作业的绝对路径。可以将其视为桌面上`~/.jenkins/jobs`文件夹的远程等效项。由于你将与一台运行\
    \ OS X 的远程计算机通信，你应该使用主目录并填写类似`/Users/RemoteUserName/JenkinsBuilds`的内容。\n\n标签也非常重要。使用从节点时，你不需要明确指定希望作业在何处运行。相反，你设置一系列限制条件，以便\
    \ Jenkins 找到满足这些要求的节点。在“标签”字段中填写`xcode`。"
  raw: '$JENKINS_HOME and $WORKSPACE are absolute paths, respective to the directory
    where


    Jenkins is instal ed (in our case that would be ~/.jenkins) and to the directory
    where our repository’s content has been stored (in our case /Users/Pal eas/.jenkins/jobs/Github
    Jobs for iOS/workspace). We already used the second one to locate our build script
    and we could easily find a use for the BUILD_NUMBER one.


    Updating the Build Number


    Go back to the “Github Jobs” project and open the cibuild script in your favorite
    text editor. We talked in the previous chapter about the agvtool that can update
    an application’s build number for you. Add the following line before the pod install
    command:


    agvtool new-version -all ${BUILD_NUMBER:?"BUILD_NUMBER should be set, are you
    sure this script is run within a ci job?"}


    The syntax should not feel strange until the last part. We are using a little
    bash trick called


    “parameter expansion”. Basically what it means is that if the BUILD_NUMBER variable
    is not available (or empty), the script will exit with a non-zero return code.


    While we are updating the build script and testing that it works well, your Jenkins
    instance is probably not accessible from the outside so your repository hosting
    service cannot automatically send a request to automatically trigger a build every
    time you push. From now on, you should consider running the following command:


    $ git push && java –jar ~/Jenkins/jenkins-cli.jar build "Github Jobs for iOS"


    Unlocking the Keychain


    In our script, we also rely on a PASSWORD environment variable to unlock the keychain
    before code-signing the application. It wasn’t really secured to hard-code the
    password in our build script so we found a simple hack where we declared the environment
    variable right before running the script. That wasn’t a whole lot secured, but
    at least the password wasn’t visible in the repository.


    We won’t be able to use the same hack and write the password in the job’s configuration
    form.


    To keep things secure, we will need to use another plugin called “Mask Password”.
    Go back to the Jenkins’ configuration section and install it.


    Once that is done, go the “Github Jobs” jenkins job’s configuration and look for
    the “mask passwords (and enable global passwords)” option in the “Build Environment”
    section. Click the add button and add your password there, as shown in Figure
    [5-15](#index_split_001.html#p91).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 60](index-91_1.jpg)


    **CHAPTER 5: Automatic Builds with Jenkins**


    **89**


    ***Figure 5-15.** Adding a password as an environment variable to be used in the
    build script* That’s it! Our script should be unlocking the keychain automatically.
    Don’t be afraid about storing your password like this. The password is properly
    encoded and stored in the config.xml file we mentioned earlier. It will be even
    safer if you use a global password defined from the Jenkins’


    administration. Plus, even if you add a new execute shell build step running the
    following script: echo $PASSWORD, the output of this command (meaning, the password)
    will be automatically obfuscated by the plugin.


    Cleaning up after yourself


    There is one final step we haven’t mentioned that you really need to think about
    in this context.


    Remember that the very first phase of a job is to fetch content from a remote
    repository and then actually perform some tasks, and one of our tasks consists
    of updating the build number. This means changing information in multiple places
    and after running our script, this is the state of our working copy:


    $ git status --short


    M "Github Jobs.xcodeproj/project.pbxproj"


    M "Github Jobs/Github Jobs-Info.plist"


    M "Github JobsTests/Github JobsTests-Info.plist"


    That’s not good. The next time the new content is pulled from the remote repository,
    if one of these three files has been modified, a conflict will happen and the
    build will fail. That is why you need to clean up after yourself. To do that,
    you have multiple options. The easiest one is to open the


    “Additional Behaviours” dropdown in the “Source Code Management” section of your
    build and select “Clean before checkout”: it will restore the workspace to a clean
    state and new content will be pulled safely.


    Integrating Xcode Builds into an Existing Jenkins


    Installation


    Sometimes in a company, iOS development may not be the only kind of development
    that is done. Other mobile developments, such as Android or Blackberry, backend
    developments using PHP, Java, or Ruby, all of these technologies can be run in
    pretty much every environment. If iOS


    development happened later, you may find yourself with a Jenkins already installed
    on a non-OSX


    platform that won’t be able to run Xcode and build iOS applications.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **90**


    **CHAPTER 5: Automatic Builds with Jenkins**


    The easy solution would be to install a new Jenkins dedicated to building iOS
    applications but that would give you two Jenkins installations to maintain. Plus,
    you wouldn’t be able to see the state of a project from only one place. Since
    you probably don’t want to be a continuous integration pariah and actually want
    to play well with others, you may want to consider using a more suited solution
    called “slave nodes”.


    Slave Node Basics


    A Jenkins slave node is basically a lightweight Jenkins instance running on a
    dedicated node and can be used for scalability purposes, when your instance is
    building a lot of things and you want to balance the load among multiple builders.
    The other situation is where you need to build a job on a platform with specific
    requirements, like being able to run Xcode and the command line tools.


    At this point, there is nothing you’re about to do that you haven’t done before:
    diving into the manage Jenkins section, adding dedicated credentials, filling
    text fields, and checking checkboxes.


    Anatomy of a Jenkins Slave Node


    Open Jenkins’ manage section and click on the “manage nodes” link. You should
    see the master node, meaning the installation of Jenkins you’ve been running since
    the beginning of this chapter.


    Click on the “New Node” link in the left menu. In the form that appears, select
    the “Dumb Slave”


    option – which should be the only option available – and fill in the text field
    a name for the node. Feel free to get creative, but a pragmatic approach would
    suggest calling it “Xcode builder” for example.


    Once you’ve found a name, press OK.


    Creating a node is pretty simple. Once you’ve found the name (and eventually the
    description), there are a few mandatory fields you need to fill: where the builds
    will be performed, the labels associated with this node, and how to communicate
    with this node.


    The “Remote FS root” is an absolute path on the slave node of where the jobs will
    be stored. Think of it as a remote equivalent of the ~/.jenkins/jobs folder on
    your desktop. Since you will be talking to a remote computer running OS X, you
    should use the home directory and fill in something like


    /Users/RemoteUserName/JenkinsBuilds.


    The labels are pretty important as well. When you use slave nodes, you don’t explicitly
    tell where you want your build your jobs to be ran. Instead, you set a list of
    restrictions so Jenkins can find a node that meets those requirements. Fill in
    the “labels” with “xcode”.'
  trans: "\n`$JENKINS_HOME` 和 `$WORKSPACE` 是绝对路径，分别对应于 Jenkins 的安装目录（在我们的例子中是 `~/.jenkins`）和仓库内容存储的目录（在我们的例子中是\
    \ `/Users/Paleas/.jenkins/jobs/Github Jobs for iOS/workspace`）。我们已经使用第二个路径来定位构建脚本，并且可以轻松找到\
    \ `BUILD_NUMBER` 的用途。\n\n## 更新构建编号\n\n返回“Github Jobs”项目，在你喜欢的文本编辑器中打开 `cibuild`\
    \ 脚本。我们在前一章讨论了 `agvtool`，它可以自动更新应用程序的构建编号。在 `pod install` 命令之前添加以下行：\n\n```\n\
    agvtool new-version -all ${BUILD_NUMBER:?\"BUILD_NUMBER should be set, are you\
    \ sure this script is run within a ci job?\"}\n```\n\n除了最后一部分，语法应该不难理解。我们使用了一个巧妙的\
    \ bash 技巧，称为“参数展开”。基本含义是，如果 `BUILD_NUMBER` 变量不可用（或为空），脚本将以非零返回码退出。\n\n在更新构建脚本并测试其正常工作时，你的\
    \ Jenkins 实例可能无法从外部访问，因此你的仓库托管服务无法在你每次推送时自动发送请求来触发构建。从现在开始，你应考虑运行以下命令：\n\n```\n\
    $ git push && java –jar ~/Jenkins/jenkins-cli.jar build \"Github Jobs for iOS\"\
    \n```\n\n## 解锁钥匙串\n\n在我们的脚本中，我们还需要一个 `PASSWORD` 环境变量来在代码签名前解锁钥匙串。将密码硬编码在构建脚本中并不安全，因此我们做了一个简单的补救措施：在运行脚本之前声明环境变量。这虽然不太安全，但至少密码不会在仓库中可见。\n\
    \n我们无法使用同样的补救措施将密码写在作业的配置表单中。为确保安全，我们需要使用另一个名为“Mask Password”的插件。返回 Jenkins 配置部分并安装它。\n\
    \n完成后，进入“Github Jobs”Jenkins 作业的配置，在“构建环境”部分找到“mask passwords (and enable global\
    \ passwords)”选项。点击“添加”按钮并在此添加密码，如图 5-15 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 60](img/index-91_1.jpg)\n\n**第 5 章：使用 Jenkins 进行自动构建**  \n**89**\n\n\
    ***图 5-15.** 将密码添加为环境变量，以便在构建脚本中使用*\n\n就这样！我们的脚本应该会自动解锁钥匙串。不要担心这样存储密码的安全性。密码已被正确编码并存储在我们之前提到的\
    \ `config.xml` 文件中。如果你使用 Jenkins 管理中定义的全局密码，它将更加安全。此外，即使你添加一个新的 shell 构建步骤来运行以下脚本：`echo\
    \ $PASSWORD`，该命令的输出（即密码）也会被插件自动混淆。\n\n## 事后清理\n\n最后一步我们尚未提及，但你需要在此上下文中认真考虑。请记住，作业的第一个阶段是从远程仓库获取内容，然后实际执行一些任务，而我们的任务之一就是更新构建编号。这意味着需要在多个地方更改信息，运行脚本后，工作副本的状态如下：\n\
    \n```\n$ git status --short\nM \"Github Jobs.xcodeproj/project.pbxproj\"\nM \"\
    Github Jobs/Github Jobs-Info.plist\"\nM \"Github JobsTests/Github JobsTests-Info.plist\"\
    \n```\n\n这并不好。下次从远程仓库拉取新内容时，如果这三个文件中有任何一个被修改，就会发生冲突，导致构建失败。这就是为什么你需要事后清理。要做到这一点，你有多种选择。最简单的方法是在构建的“源代码管理”部分中打开“附加行为”下拉菜单，并选择“Clean\
    \ before checkout”：这将把工作空间恢复到干净状态，然后安全地拉取新内容。\n\n## 将 Xcode 构建集成到现有 Jenkins 安装中\n\
    \n有时在公司里，iOS 开发可能不是唯一的开发类型。其他移动开发（如 Android 或 Blackberry）、使用 PHP、Java 或 Ruby 的后端开发，这些技术几乎可以在任何环境中运行。如果\
    \ iOS 开发是在之后才开始的，你可能会发现一台 Jenkins 已安装在非 OS X 平台上，该平台无法运行 Xcode 和构建 iOS 应用程序。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)  \n**90**  \n**第 5 章：使用 Jenkins\
    \ 进行自动构建**\n\n简单的解决方案是安装一个专用于构建 iOS 应用程序的新 Jenkins，但这将导致你需要维护两个 Jenkins 安装。此外，你将无法从一个地方看到所有项目的状态。既然你可能不想成为持续集成中的“异类”，并且希望与他人良好协作，那么你可以考虑使用更合适的解决方案——称为“从节点”。\n\
    \n## 从节点基础\n\nJenkins 从节点本质上是在专用节点上运行的轻量级 Jenkins 实例，可用于扩展目的——当你的实例构建了大量作业，且希望在多台构建机器之间平衡负载时。另一种情况是，你需要在具有特定要求的平台上构建作业，例如能够运行\
    \ Xcode 和命令行工具。\n\n此时，你需要做的事情和你之前做过的没什么不同：进入管理 Jenkins 部分，添加专用凭据，填写文本字段，并勾选复选框。\n\
    \n## Jenkins 从节点的结构\n\n打开 Jenkins 的管理部分，点击“管理节点”链接。你应该会看到主节点，即自本章开始以来一直在运行的 Jenkins\
    \ 安装。点击左侧菜单中的“新建节点”链接。在出现的表单中，选择“Dumb Slave”选项（这应该是唯一可用的选项），并在文本字段中为节点填写一个名称。你可以自由发挥创意，但务实的方法建议将其命名为“Xcode\
    \ builder”之类的。找到名称后，点击“确定”。\n\n创建节点非常简单。一旦你确定了名称（以及可选的描述），有几个必填字段需要填写：构建将在哪里执行、与此节点关联的标签，以及如何与该节点通信。\n\
    \n“Remote FS root”是从节点上用于存储作业的绝对路径。可以将其视为桌面上 `~/.jenkins/jobs` 文件夹的远程等效项。由于你将与一台运行\
    \ OS X 的远程计算机通信，你应该使用主目录并填写类似 `/Users/RemoteUserName/JenkinsBuilds` 的内容。\n\n标签也非常重要。使用从节点时，你不需要明确指定希望作业在何处运行。相反，你设置一系列限制条件，以便\
    \ Jenkins 找到满足这些要求的节点。在“标签”字段中填写 `xcode`。\n"
- fmt: '最后，有多种启动方式可以与从节点通信，但我们将使用SSH方式。从下拉框中选择“Launch Slave Agents on Unix Machines
    via SSH”选项。在主机（`Host`）字段中，输入节点的IP地址。就像配置与GitHub的连接一样，我们将使用Jenkins的凭据存储来与远程主机进行身份验证。点击下拉框附近的“Add”链接，并填写用于连接该计算机的凭据。这可以是用户名和密码，或者私钥。前者可能更安全，但从节点无法从外部访问，因此使用用户名和密码就足够了。请注意，如果要通过SSH连接到节点，则必须启用远程访问。


