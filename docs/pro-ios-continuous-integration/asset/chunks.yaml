    \ 文件的合并操作时，请关闭 `Xcode`。通常，这种情况发生在你团队中有人修改了“预置描述文件”和/或“代码签名”部分中的设置时。由于这种格式几乎不具备人类可读性，合并的结果可能会变得非常混乱，而\
    \ `Xcode` 也可能变得有点“容易崩溃”。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## iOS 和 Xcode 中的持续集成功能\n\n这种直接在 IDE 中的集成方式仍有几个缺点。首先，它相当有限。你只能执行基本的 `Git` 操作，很可能最终还是会使用你的\
    \ shell 或专门的 `Git` 客户端。此外，`Xcode` 自带了自己的 `Git` 版本。在撰写本书时，`Git` 的当前稳定版本是 2.0.1，在\
    \ shell 中运行 `git --version` 后即可看到：\n\n```\n$ git --version\ngit version 1.9.1\n\
    ```\n\n这个版本可以很容易地使用诸如 `Homebrew` 之类的包管理器进行安装，如果你手头有一些空闲时间，甚至可以手动编译和安装。然而，如果你打开终端并运行一个简单的命令，你应该会看到\
    \ `Xcode` 使用的 `Git` 版本是苹果自家的版本，基于 1.8.5.2：\n\n```\nbash-3.2$ $(xcode-select -print-path)/usr/bin/git\
    \ --version\ngit version 1.8.5.2 (Apple Git-48)\n```\n\n在大多数情况下，这不会造成任何问题，但 `Xcode`\
    \ 的 `Git` 版本与你使用的版本之间可能会出现不兼容。例如，当 `Xcode 4` 是当前版本，而最新的 `Git` 已经比其自带的版本领先了好几个版本时，就曾出现过这种情况。\n\
    \n**关于 `xcode-select` 的说明：** `xcode-select` 是苹果官方命令行工具附带的一批非常有用的工具之一，如果你同时操作多个\
    \ `Xcode` 安装（例如在测试版期间），它会非常有帮助。我们将在第 4 章中对此进行更多讨论。\n\n## CocoaPods\n\n有人曾说过，“伟大的项目伴随着庞大的依赖”，在\
    \ iOS 项目中管理外部库的依赖一直以来都十分令人头疼。这是你的 iOS 项目中不需要的麻烦，但除了工作区、子项目和*手动*管理依赖的搜索路径之外，苹果似乎并不愿意提供一个官方工具。这是在\
    \ `CocoaPods` 出现之前的情况。\n\n`CocoaPods` 是一个用 Ruby 编写的依赖管理器，其灵感毫无意外地来源于 `RubyGems`\
    \ ([`rubygems.org/`](https://rubygems.org/))。如果你不了解它，但过去曾写过 Ruby 代码，那么它在 `PodFile`（你将在其中声明所有依赖）中使用的语法非常易于理解，应该不会给你带来太多困难。\n\
    \n是否使用 `CocoaPods` 在 iOS 和 Mac 社区中确实存在争议。无论你是讨厌它还是喜欢它，在本书中，我们明确站在喜欢它的人这边。在不断集成代码块的过程中，让一个设计良好的工具来处理你的依赖管理，可以减少一些需要担心的事情，并让你有更多时间专注于其他事情。\n\
    \n作为额外的好处，你实际上可以为特定应用的依赖使用 `CocoaPods`，这意味着你可以用它来将你的大型应用拆分成多个模块，并让 `CocoaPods`\
    \ 来处理合并。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n再次强调，没有银弹。正如其网站上所写的，“CocoaPods\
    \ 尚未准备好用于生产环境。”在撰写本书时，0.33.1 是最新版本。它远非完美，但总比完全没有工具要好得多。我们将在示例应用中使用 `CocoaPods`。\n\
    \n说到这个，让我们开始编码吧。\n\n## 编写示例应用\n\n在 `Xcode` 中打开我们之前创建的“Github Jobs”项目，在文件浏览器中选择唯一的视图控制器头文件，并将其改为\
    \ `UITableViewController`，而不是简单的 `UIViewController`。转到相关的实现文件，声明一个类型为 `NSArray`\
    \ 的 `jobs` 属性，并实现 `UITableViewDataSource` 所必需的方法：`tableView:numberOfRowsInSection:`\
    \ 和 `tableView:cellForRowAtIndexPath:`。在此过程结束时，你的实现文件应该如下所示：\n\n```objc\n#import\
    \ \"PCSViewController.h\"\n\n@interface PCSViewController ()\n\n@property (nonatomic,\
    \ strong) NSArray *jobs;\n\n@end\n\n@implementation PCSViewController\n\n#pragma\
    \ mark - Table View\n\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\n\
    {\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\n\
    {\n    return self.jobs.count;\n}\n\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView\n         cellForRowAtIndexPath:(NSIndexPath *)indexPath\n{\n  \
    \  UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"Cell\"\
    \n                                                            forIndexPath:indexPath];\n\
    \    return cell;\n}\n\n@end\n```\n\n然后，打开故事板文件，删除 `Xcode` 已创建的视图控制器。取而代之的是，拖入一个新的导航控制器。它应该会自动带有一个表格视图控制器。选中它，并使用\
    \ `PCSViewController` 作为其类。选中导航项，并将标题更改为“iOS 职位”。在表格视图控制器中，选中第一个原型单元格，并为其指定 `Cell`\
    \ 重用标识符，以避免之后运行时出现异常。这就是这个应用中大致需要做的所有事情。我们试图让它保持非常简单。\n\n`Github Jobs API` 非常简单，你只需要调用一个特定的\
    \ URL 来获取一份 JSON 格式的纽约地区 iOS 职位列表。使用 iOS 7.0 新的 `NSURLSession` API，回到你的视图控制器实现文件，在\
    \ `viewWillAppear:` 方法中从那个著名的 URL 获取内容，如下所示：\n\n```objc\n- (void)viewWillAppear:(BOOL)animated\
    \ {\n    NSURL *url = [NSURL URLWithString:\n                  @\"https://jobs.github.com/positions.json?description=ios&location=NY\"\
    ];\n    NSURLSessionDataTask *jobTask = [[NSURLSession sharedSession] dataTaskWithURL:\n\
    \                                     url completionHandler:^(NSData *data, NSURLResponse\
    \ *response, NSError *error) {\n        dispatch_async(dispatch_get_main_queue(),\
    \ ^{\n            if (error) {\n                UIAlertView *alert = [[UIAlertView\
    \ alloc] initWithTitle: @\"发生错误\"\n                                          \
    \                      message: error.localizedDescription\n                 \
    \                                              delegate: nil\n               \
    \                                       cancelButtonTitle: @\"关闭\"\n         \
    \                                             otherButtonTitles: nil];\n     \
    \           [alert show];\n                return;\n            }\n          \
    \  NSError *jsonError = nil;\n            self.jobs = [NSJSONSerialization JSONObjectWithData:\
    \ data options: 0 error: &jsonError];\n            [self.tableView reloadData];\n\
    \        });\n    }];\n    [jobTask resume];\n}\n```\n\n请注意，我们使用 Grand Central\
    \ Dispatch (GCD) 的函数包装了完成块的全部内容，以便所有 UI 任务都在主线程上执行。不要忘记更新 `tableView:cellForRowAtIndexPath:`\
    \ 方法，以显示职位的 `title` 属性。\n\n```objc\n- (UITableViewCell *)tableView:(UITableView\
    \ *)tableView\n         cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n   \
    \ UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:@\"Cell\"\
    \n                                                            forIndexPath:indexPath];\n\
    \    cell.textLabel.text = self.jobs[indexPath.row][@\"title\"];\n    return cell;\n\
    }\n```\n\n这个应用本可以做成一个主-从应用，选择一行可以打开一个详细页面，显示应用图标、关于职位的详细信息以及一个帮助用户申请的直接按钮。然而，由于构建一个完整的应用并非本书\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图片 22](img/index-21_1.jpg)\n"
- fmt: "# Book: Selecting a Cell with `. . .` Will Open Safari Mobile\n\nTo do that,\
    \ implement the delegate method that will be called when the user taps on a cell\
    \ in the `PCSViewController.m`, as follows:\n\n```\n- (void)tableView:(UITableView\
    \ *)tableView didSelectRowAtIndexPath:(NSIndexPath *)indexPath {\n    NSURL *jobUrl\
    \ = [NSURL URLWithString: self.jobs[indexPath.row][@\"url\"]];\n    [[UIApplication\
    \ sharedApplication] openURL: jobUrl];\n}\n```\n\nThe only missing part of this\
    \ application is a way to show the user that work is being done and content is\
    \ not available yet. We will use a very simple library called `SVProgressHUD`\
    \ for this very purpose and we will install it using – that’s right, `CocoaPods`.\n\
    \nClose your Xcode project and open a terminal. Navigate to the location of your\
    \ iOS project and install `CocoaPods` if you haven’t already, using `RubyGems`\
    \ (see instructions below). Run the `pod init` command to create an empty-ish\
    \ `Podfile` and open it. Add `SVProgressHUD` as a dependency, as shown in Figure\
    \ [2-6:](#index_split_000.html#p21)\n\n***Figure 2-6.** Using vim, we are adding\
    \ the SVProgressHUD library as a dependency*\n\nFinally, run `pod install` and\
    \ open the generated `Github Jobs.xcworkspace` instead of the previous `Github\
    \ Jobs.xcodeproj`. This is why we asked to close Xcode.\n\nHere is the whole process:\n\
    \n```\n$ (sudo) gem install cocoapods\n$ cd path/to/Github\\ Jobs\n$ pod init\n\
    $ vim Podfile\n// edit Podfile...\n$ pod install\n$ open Github\\ Jobs.xcworkspace\n\
    ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**CHAPTER 2: Continuous\
    \ integration features in iOS and Xcode**\n\n## Installing CocoaPods\n\nThe installation\
    \ of CocoaPods may, of course, vary in case you are using a Ruby version management\
    \ system such as `rbenv` ([http://rbenv.org](http://rbenv.org/)) or `RVM` ([https://rvm.io](https://rvm.io/)).\n\
    \n`SVProgressHUD` provides really easy methods to use to display messages. Let’s\
    \ go back to the view controller and use these methods, before and after fetching\
    \ the content from the Github Jobs API.\n\nBefore calling the `resume` method\
    \ of the `NSURLSessionDataTask` object that we created, import the `SVProgressHUD.h`\
    \ file and call the following class method:\n\n```\n#import <SVProgressHUD/SVProgressHUD.h>\n\
    \n// ...\n- (void)viewWillAppear:(BOOL)animated {\n    NSURL *url = [NSURL URLWithString:\n\
    \                  @\"https://jobs.github.com/positions.json?description=ios&location=NY\"\
    ];\n    NSURLSessionDataTask *jobTask = ...\n    [SVProgressHUD showWithStatus:\
    \ @\"Fetching jobs...\"];\n    [jobTask resume];\n}\n```\n\nThe `SVProgressHUD`\
    \ library comes with two different methods, `showWithStatus:` and `showWithStatus:maskType`.\
    \ We are using the second one so we can have a dark background. Otherwise we wouldn’t\
    \ be able to properly see the `HUD` being animated.\n\nOnce the jobs have been\
    \ fetched and the JSON has been properly decoded and turned into a list of jobs\
    \ to display, we want to give the user a small indication that the process is\
    \ over. To do that, add the following snippet at the end of the `NSURLSession`’s\
    \ `dataTaskWithURL:completionHandler:` completion block, as follows. Calling `showWithStatus:`\
    \ will show a temporary confirmation message, there is no need to dismiss it manually.\n\
    \n```\nNSURLSessionDataTask *jobTask = [[NSURLSession sharedSession] dataTaskWithURL:\
    \ url\n                                                           completionHandler:^(NSData\
    \ *data, NSURLResponse *response, NSError *error) {\n    // ...\n    [SVProgressHUD\
    \ showSuccessWithStatus: [NSString stringWithFormat: @\"%lu jobs fetched\",\n\
    \                                          (unsigned long)[self.jobs count]]];\n\
    }];\n```\n\nWhen you run your application, you should see the `HUD` in both situations,\
    \ similar to Figure [2-7.](#index_split_000.html#p23)\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 23](index-23_1.jpg)\n\n**CHAPTER 2: Continuous integration features\
    \ in iOS and Xcode**\n\n***Figure 2-7.** Fetching the jobs shows a spinning animation\
    \ and getting the results shows a confirmation message*\n\nInstalling dependencies\
    \ using `CocoaPods` creates two things in addition to the generated `PodFile`:\
    \ a `Podfile.lock` managing the state of the dependencies in the project and a\
    \ `Pods` folder containing the actual dependencies. It’s really a hot debate in\
    \ the community, but automation has been created for a reason and we strongly\
    \ suggest you ignore this folder by adding `\"Pods\"` to your `.gitignore` file:\
    \ create a `.gitignore` file at the root of the directory where you created your\
    \ project, and add `\"Pods\"`.\n\nThis folder will be ignored and Git will not\
    \ try to commit it when your dependencies change, for example because you’ve switched\
    \ to a more recent version.\n\n## About `.gitignore` Files\n\nA `.gitignore` file\
    \ specifies a pattern of files that Git should ignore. If you don’t have one already,\
    \ which is totally possible considering Xcode doesn’t generate one automatically,\
    \ grab the one available on GitHub: [https://github.com/github/gitignore/blob/master/Global/Xcode.gitignore](https://github.com/github/gitignore/blob/master/Global/Xcode.gitignore).\n\
    \n## Why Have We Done All This?\n\nWe now have an application up and running.\
    \ It’s not pretty and probably not very useful, but we will be able to use it\
    \ in the remaining chapters of this book as an example. If you are interested\
    \ in the complete application, it is available at the following URL: [https://github.com/palleas/github-jobs](https://github.com/palleas/github-jobs).\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**CHAPTER 2: Continuous\
    \ integration features in iOS and Xcode**\n\n## Getting Ready to Release the Application\n\
    \nDuring the lifecycle of a project, there will be multiple versions of the application.\
    \ First, there will be the one you are developing on your computer that will run\
    \ in your iOS simulator or on one of your testing devices. Then, there will be\
    \ one that will be used by your QA team that will review the latest features you’ve\
    \ implemented and the bug you’ve fixed. Once this is done, there will be a version\
    \ of your application that you will send to your client. This is the final step\
    \ before pushing the application on the official App Store. Finally, there will\
    \ be the production-ready application, once the client is satisfied with the version\
    \ that you have sent. All of these versions will have specificities.\n\nFor example,\
    \ you may not be showing the same level of information when an error occurs in\
    \ the application. Also, you won’t probably have your application crash because\
    \ of a failing assertion in your code. This multiple-configuration is easily achievable\
    \ thanks to Xcode.\n\nOf course, this is not the way it has to work; you may be\
    \ an independent iOS developer and/or may not have a QA team at your disposal.\
    \ We will make it easier for everybody and only have three levels of configuration:\n\
    \n- **Debug**: the level of configuration you will use when you are working on\
    \ the application. It may crash from time to time when you are misusing some code\
    \ and display a lot of information when errors occur. Debugging tools such as\
    \ the awesome [Reveal](http://revealapp.com/) or libraries relying on private\
    \ APIs may be linked with your application in this configuration.\n- **Adhoc**:\
    \ this is the configuration used by the version you will send to your QA team\
    \ and/or your client. The debug and development tools are gone and the error messages\
    \ are much more user-friendly. It may be linked with a crash log reporter to ease\
    \ the back and forth with your client, for example.\n- **Release**: this will\
    \ be the configuration used by your application when it goes live on the store.\n\
    \nGo back to your Xcode project, select the top-level element in the file explorer,\
    \ and make sure the `\"Github Jobs\"` item in the Project section is selected.\
    \ If you take a look at what’s on the screen, you will see that Xcode already\
    \ provides you two different configuration levels, as shown in Figure [2-8](#index_split_000.html#p25)."
