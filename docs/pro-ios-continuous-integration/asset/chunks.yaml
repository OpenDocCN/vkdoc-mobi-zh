    `Debug Information Format` 设置。Apple 使用一种标准的调试数据格式，称为 `DWARF`，这是一个中世纪奇幻风格的术语，代表
    `Debugging With Attributed Record Formats`。在此设置中，确保选中 `DWARF with dSYM File`，它将在你的应用程序所在的同一文件夹中生成一个
    `dSYM` 文件夹，如图 3-2 所示。此文件是理解潜在崩溃日志所必需的。


    **图 3-2.** 构建文件夹包含应用程序和 `dSYM` 文件及其他内容 要查看示例，请导航至 `~/Library/Developer/Xcode/DerivedData/`
    文件夹，每次构建应用程序时，临时 `.app` 文件都存储在此处。使用你的 shell，或右键单击 Xcode 项目 `Products` 组中的 `Github
    Jobs.app` 文件，选择 `Reveal In Finder` 选项。你应该会看到一个 `dSYM` 文件。


    生成 `dSYM` 文件需要时间，并且在开发应用时通常并不需要。你很可能能够在调试会话期间检测并重现崩溃。因此，在 Debug 配置中，`Debug Information
    Format` 设置通常设置为 `DWARF` 以加快构建速度。在构建应用程序之前，请确保针对 Adhoc 配置，该设置已改为 `DWARF with dSYM
    File`，如图 3-3 所示。在我们真正开始使用第 7 章中介绍的“Over The Air distribution”方法发布应用程序之前，我们不会再回到这个话题。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 34](img/index-36_1.jpg)


    **第三章：使用 Xcode 在 App Store 之外发布应用程序**


    **33**


    **图 3-3.** 仅对 Debug 配置禁用了 `dSYM` 文件生成以加快构建速度


    ### 创建 IPA 文件


    我们现在正式准备好构建应用程序的第一个版本，并将其发送给我们的 Beta 测试人员。为此，我们需要做的就是创建一个 IPA 文件。


    1.  拔掉你的设备，并确保在用于选择运行应用程序位置的下拉菜单中选择了 `iOS device`。

    2.  在 `Product` 菜单中，不要直接按 `Archive`，而是按住 `ALT` 键。`Archive` 菜单将变为 `Archive...`，这将打开一个窗口，允许你选择用于构建的配置，如图
    3-4 所示。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 35](img/index-37_1.jpg)


    **34**


    **第三章：使用 Xcode 在 App Store 之外发布应用程序**


    **图 3-4.** 准备好为 Adhoc 配置归档应用程序的归档面板


    3.  将构建配置从 Release 更改为 `AdHoc`，然后按 `Archive`。如果你勾选了 `Reveal Archive in Organizer`
    选项，Organizer 应该会弹出并选中你的归档。

    4.  接下来的步骤同样简单，你可能在向 App Store 发布应用程序时已经经历过。按下 `Distribute...` 按钮，选择 `Save for
