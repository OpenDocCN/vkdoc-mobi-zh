    testing is one of the tools for this purpose. Whether you are an independent iOS
    developer working alone or a developer wondering if you should integrate the feature
    your coworker has been working on, making sure all the tests are green first sure
    will help you in making a decision.'
  raw: 'First, open the file from your favorite text editor either by going manually
    to the directory where you created the application and navigating to the “Github
    Jobs” directory that corresponds to your application’s main target (the other
    one is the testing target, more on that later) or by right-clicking on the file
    in Xcode file explorer and selecting “Open with external editor.” The first lines
    should look like something similar to the following:


    <?xml version="1.0" encoding="UTF-8"?>


    <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"


    " [http://www.apple.com/DTDs/PropertyList-1.0.dtd](http://www.apple.com/DTDs/PropertyList-1.0.dtd)">


    <plist version="1.0">


    <dict>


    <key>CFBundleDevelopmentRegion</key>


    <string>en</string>


    <key>CFBundleDisplayName</key>


    <string>${PRODUCT_NAME}</string>


    <key>CFBundleExecutable</key>


    <string>${EXECUTABLE_NAME}</string>


    <key>CFBundleIdentifier</key>


    <string>com.perfectly-cooked.${PRODUCT_NAME:rfc1034identifier}</string>


    ...


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **8**


    **CHAPTER 2: Continuous integration features in iOS and Xcode**


    This is not really human friendly, to say the least. Don’t worry though: Xcode
    doesn’t expect you to edit this file manually. In fact, Xcode comes with a property
    list editor that will make it easier to view this file. It also turns the keys
    into comprehensible sentences. This way, “LSRequiresIPhoneOS”


    turns into “Application requires the iPhone environment.”


    Note that you can still view the name of the keys underneath. This can be helpful
    for debugging or simply because tutorials on the Internet often refers to these
    raw keys. From the editor, right-click on and select “Show Raw Keys/Values.”


    What interests us most are the two versions properties, by default, their values
    should be 1.0\. The first one, the “Bundle versions string, short” a.k.a. CFBundleShortVersionString
    is the main version of the application. If you have already shipped an application
    on the app store, you’ve probably already changed its value. The second one, “Bundle
    version” a.k.a. CFBundleVersion, is the full version number and doesn’t have to
    be human-readable. Most people tend to keep both in sync, but that would be a
    waste of configuration in our case, as the long version will be proven useful
    in the future.


    Later in the book we wil start talking about automated builds. These builds always
    come with an incrementing number and this is when the CFBundleVersion key comes
    in handy. According to Apple documentation, the CFBundleVersion specifies a version
    of the application, released or not, which fits perfectly. Every time our application
    is built, we wil use the build’s number to change the CFBundleVersion. To keep
    things clear, it is important to have coherence between those two versions.


    This Info property list file contains information about the application that is
    made available from the NSBundle class. Its content is not limited to the keys
    available now, there are in fact a lot of other keys that will be added if, for
    example, you want your application to be opened when a certain URL


    scheme is called from a webpage. Xcode manages most of these keys for you, so
    you don’t need to know them all.


    Tests


    An Xcode project comes with a testing target, a test class, and your very first
    test case. This last one is a failing one, as it basically just calls XCTFail,
    a C macro used to force-fail a case. Still, that’s something.


    Everything has been configured so you can get to work right away and start writing
    tests at the beginning of your project. That’s something you’ll be very happy
    about when your project becomes big and complex.


    When we started writing the book, we talked a bit about how Apple took its time
    before actually giving you tools for continuous integration. That’s not entirely
    true. Since Xcode 2.1, Xcode came with a version of the testing tools SenTestingKit
    and OCUnit, which wasn’t an official Apple-labelled tool back then, but a framework
    created by a company called “Sen:te” ([http://sente.ch](http://sente.ch/)).


    Open the sample application and select “Github Jobs,” the first element in the
    file explorer. Select your testing target, named “Github JobsTests” and select
    the “Build Settings” tab. You should see all the settings of this target. Filter
    these settings using the search field at the top right and look for


    “xctest.” As the Figure [2-2 shows, you should see that a framework called XCT](#index_split_000.html#p13)est
    is automatically linked with your application. XCTest is a brand new testing framework
    heavily based on the old one but way better and way more deeply integrated in
    the IDE and much more powerful.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 18](index-13_1.jpg)


    **CHAPTER 2: Continuous integration features in iOS and Xcode**


    **9**


    ***Figure 2-2.** The filtered list of build settings shows the XCTest framework
    linked to the Github Jobs testing target* In the 5.1.1 release, OCUnit and the
    SenTestingKit framework were marked as deprecated and will be removed from a future
    release of Xcode. In fact, source code using OCUnit now generates warnings at
    compilation time.


    For starters, Xcode 5 comes with a test navigator available in your sidebar or
    by pressing “ + 5.”


    This navigator allows you to see the recently run test cases and to re-run them
    by pressing a single button, making every refactoring a breeze. That’s not all
    there is. Xcode 5 comes with new assistant editors that will help you unit-test
    your code. The assistants, called “Test Callers” and


    “Test Classes,” provide access to unit tests related to the current source code
    in the primary editor.


    In our example shown in Figure [2-3](#index_split_000.html#p14), we have created
    a fake PCSGithubJob class (on the left) with a method whose purpose is to analyze
    a job offer and tell you if it will make you happy. The “Test Callers” editor
    (on the right) automatically jumped to the related testing method.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 19](index-14_1.jpg)


    **10**


    **CHAPTER 2: Continuous integration features in iOS and Xcode**


    ***Figure 2-3.** Xcode with the primary and the assistant editors opened showing
    the unit-testing code related to our class* Last but not least, the xcodebuild
    command line tool now supports the test action for iOS projects.


    Before this release it was not possible directly to run your unit-tests from the
    command line. We will cover more about the command line equivalent of these tools
    in Chapter 3.


    Back in Xcode 4, when you created an iOS or OSX application, you had to check
    an option to add a testing target to your project and now this is the default
    behavior. This is a nice touch from Apple since the community of the iOS developers
    has always had this image of one that mostly focuses on the design and the user
    experience. It shows a clear will of helping the iOS developers to become more
    professional and start using the proper tools.


    Finally, the new testing framework was actually announced at the same time as
    the “Xcode Bots.”


    They are meant to help you embrace the concept of continuous integration and they
    fit perfectly with XCTest. Make sure to read Chapter 8 to learn more about them!


    A good test suite is key in a continuous integration environment. We talked earlier
    about how a good environment will provide you with maximum feedback. Automated
    testing is one of the tools for this purpose. Whether you are an independent iOS
    developer working alone or a developer wondering if you should integrate the feature
    your coworker has been working on, making sure all the tests are green first sure
    will help you in making a decision.'
  trans: '首先，从你喜欢的文本编辑器中打开文件，你可以手动导航到创建应用程序的目录，然后进入与应用程序主目标对应的“Github Jobs”目录（另一个是测试目标，稍后会详细介绍），也可以在
    Xcode 文件资源管理器中右键点击该文件，选择“使用外部编辑器打开”。文件开头几行应该类似于以下内容：


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>

    <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"

    "http://www.apple.com/DTDs/PropertyList-1.0.dtd">

    <plist version="1.0">

    <dict>

    <key>CFBundleDevelopmentRegion</key>

    <string>en</string>

    <key>CFBundleDisplayName</key>

    <string>${PRODUCT_NAME}</string>

    <key>CFBundleExecutable</key>

    <string>${EXECUTABLE_NAME}</string>

    <key>CFBundleIdentifier</key>

    <string>com.perfectly-cooked.${PRODUCT_NAME:rfc1034identifier}</string>

    ...

    ```


    至少可以说，这对人类并不友好。不过别担心：Xcode 并不要求你手动编辑这个文件。实际上，Xcode 自带了一个属性列表编辑器，能让你更轻松地查看这个文件。它还能将键转化为易于理解的句子。这样，`LSRequiresIPhoneOS`
    就变成了“应用需要 iPhone 环境”。


    请注意，你仍然可以查看底层的键名。这对于调试很有帮助，或者仅仅因为互联网上的教程经常引用这些原始键名。在编辑器中，右键点击并选择“显示原始键/值”。


    我们最关心的是两个版本属性，默认情况下，它们的值应为 1.0。第一个属性是“Bundle versions string, short”，也就是 `CFBundleShortVersionString`，它是应用程序的主版本号。如果你已经在
    App Store 上发布过应用，你可能已经修改过它的值。第二个属性是“Bundle version”，即 `CFBundleVersion`，它是完整的版本号，不一定需要人类可读。大多数人倾向于让两者保持同步，但在我们的情况下，这将是配置上的浪费，因为长版本号在未来会证明其有用性。


    在本书的后续部分，我们将开始讨论自动化构建。这些构建总是伴随着一个递增的编号，这正是 `CFBundleVersion` 键发挥作用的地方。根据苹果文档，`CFBundleVersion`
    指定了应用程序的一个版本（无论是否发布），这非常合适。每次构建我们的应用程序时，我们都会用构建编号来更改 `CFBundleVersion`。为了保持清晰，这两个版本之间保持一致性非常重要。


    这个 `Info.plist` 文件包含了有关应用程序的信息，这些信息可以通过 `NSBundle` 类获取。其内容并不局限于当前可用的键，事实上，还有很多其他键会在特定情况下被添加，例如，当你希望应用程序在网页调用某个
    URL 方案时被打开。Xcode 会为你管理大部分这些键，所以你不需要全部了解。


    ## 测试


    一个 Xcode 项目自带一个测试目标、一个测试类以及你的第一个测试用例。这最后一个测试用例是一个失败的用例，因为它基本上只是调用了 `XCTFail`，这是一个用于强制测试用例失败的
    C 宏。不过，这总归是个开始。


    一切都已经配置好，以便你可以立即开始工作，并在项目初期就开始编写测试。当你的项目变得庞大和复杂时，你会对此感到非常满意。


    当我们开始写这本书时，我们提到过苹果花了不少时间才真正为你提供持续集成的工具。这并不完全正确。从 Xcode 2.1 开始，Xcode 就附带了测试工具 `SenTestingKit`
    和 `OCUnit` 的某个版本，当时这些并非苹果官方标注的工具，而是由一家名为“Sen:te”的公司创建的框架（[`sente.ch`](http://sente.ch/)）。


    打开示例应用，在文件资源管理器中选择第一个元素“Github Jobs”。选择你的测试目标“Github JobsTests”，然后选择“Build Settings”选项卡。你应该能看到这个目标的所有设置。使用右上角的搜索框过滤这些设置，查找`“xctest”`。如图
    2-2 所示，你应该能看到一个名为 `XCTest` 的框架会自动与你的应用程序链接。`XCTest` 是一个全新的测试框架，它很大程度上基于旧框架，但更好、更深入地集成到了
    IDE 中，也更加强大。


    ![Image 18](img/index-13_1.jpg)


    **图 2-2.** 过滤后的构建设置列表显示了与 Github Jobs 测试目标链接的 `XCTest` 框架


    在 5.1.1 版本中，`OCUnit` 和 `SenTestingKit` 框架已被标记为弃用，并将在未来版本的 Xcode 中被移除。事实上，使用 `OCUnit`
    的源代码现在会在编译时生成警告。


    首先，Xcode 5 附带了一个测试导航器，你可以在侧边栏中找到它，或者按“⌘ + 5”打开。这个导航器允许你查看最近运行的测试用例，并只需按一个按钮就能重新运行它们，使每次重构都变得轻松自如。这还不是全部。Xcode
    5 附带新的辅助编辑器，可以帮助你对代码进行单元测试。这些辅助编辑器称为“测试调用者（Test Callers）”和“测试类（Test Classes）”，它们提供对与主编辑器中当前源代码相关的单元测试的访问。


    在我们图 2-3 所示的示例中，我们创建了一个假的 `PCSGithubJob` 类（左侧），其中包含一个方法，其目的是分析一份工作邀约并告诉你它是否会让你开心。“测试调用者”编辑器（右侧）自动跳转到了相关的测试方法。


    ![Image 19](img/index-14_1.jpg)


    **图 2-3.** Xcode 打开了主编辑器和辅助编辑器，显示与我们类相关的单元测试代码


    最后但同样重要的是，`xcodebuild` 命令行工具现在支持 iOS 项目的测试操作。在此版本之前，无法直接从命令行运行你的单元测试。我们将在第 3 章中详细介绍这些工具的等效命令行用法。


    回到 Xcode 4 时代，当你创建一个 iOS 或 OSX 应用程序时，你需要勾选一个选项才能为你的项目添加测试目标，而现在这是默认行为。这是苹果的一个很好的举措，因为
    iOS 开发者社区一直给人主要关注设计和用户体验的印象。这显示了苹果帮助 iOS 开发者变得更加专业并开始使用合适工具的明确意愿。


    最后，这个新的测试框架实际上是与“Xcode Bots”同时发布的。它们旨在帮助你拥抱持续集成的概念，并且与 `XCTest` 完美契合。一定要阅读第 8
    章，了解更多关于它们的信息！


    一个良好的测试套件在持续集成环境中至关重要。我们之前谈到过，一个好的环境会为你提供最大化的反馈。自动化测试就是实现这一目的的工具之一。无论你是一个独自工作的独立
    iOS 开发者，还是一个正在考虑是否要集成同事开发的功能的开发者，首先确保所有测试都通过，这绝对会帮助你做出决策。'
- fmt: '# Git Integration


    Integrating pieces of codes in your project as we said in the introduction usually
    means merging branches using your favorite version control system. A successfully
    continuous integration usually means a well-established workflow. When you are
    working on an application, there are a couple of things that will happen. Once
    the first version has been released, you will start working on new features, some
    of them will take time, and that’s why you will be working on separate branches
    of your repository. During this process, your users will probably send you bug
    reports and feedback about various glitches in the application. These will have
    to be fixed as soon as possible and be shipped as new minor versions of your application.
    Once again, because you don’t want to mess with the application, you will work
    on separate branches just as you work on new features.


    The main thing to keep in mind is that at any and every time you work you will
    want feedback about the tasks you are working on. You will want to know if you
    are currently breaking something while implementing your new feature, or if the
    bug that has been reported to you is being fixed. Plus, your QA team, your boss,
    or even your client may want that feedback as well, and probably a fresh build
    of your application. Because, “I’m sorry, I broke the app for now, please call
    me back in an hour or two” is not an acceptable answer, you will have to keep
    everything separated.


    The good news is that branches are cheap in Git. You can create as much as you
    want without any trouble for you or your coworkers. The great news is Xcode comes
    with Git support right out of the box, as you may have noticed when you created
    the Github Jobs project or by looking at the big “Source Control” menu in Xcode.


    Back in the old days, Xcode only supported Subversion and CVS. While the first
    one still exists, even if it’s grown a bit out of date due to the arrival of Decentralized
    Version Control System (DVCS), such as Git and Mercurial, the second one was clearly
    a legacy from the sad old days of versioning control.


    Git is a really popular Version Control Systems that works in a decentralized
    way. Meaning the opposite way of how SVN works, every single working copy of a
    project can be used as a remote and even better, can work independently.


    To show you how useful it is to have Git deeply integrated in your Xcode project,
    let’s break it. That’s right, let’s create a very simple conflict and see what
    happens. In the world of Version Control Systems, conflicts are what happen when
    merging two versions of a file is not possible. If you changed the same part of
    the same file differently in the two branches you’re merging together, it won’t
    be able to merge them and a manual intervention will be required.


    In Xcode, from the Source Control menu, select “Github Jobs – master” and then,
    select “New Branch . . . ”. In the field that appears, fill the branch name field
    with `"saying-hi"` and press “Create.”


    At the end of this process, you will be working on a dedicated branch for your
    “Saying Hi” feature.


    This means that your application will evolve while a stable version, the master
    branch, is still available somewhere.


    Now, open the `AppDelegate.m` file and add a simple `NSLog` instruction that greets
    the user when the application finishes launching:


    ```

    #import "PCSAppDelegate.h"


    @implementation PCSAppDelegate


    - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary
    *) launchOptions


    {


    NSLog(@"Hi, I''m a sample application for a book.");


    return YES;


    }


    @end

    ```


    With this greeting implemented, open the Source control menu and select “Commit
    . . .”. In the form that appears, enter a simple commit message such as “Saying
    hi when the application starts” and press the “Commit 1 File” button. You’ve now
    made your very first commit in this feature branch.


    To create a conflict, a file must have been modified at a similar place in the
    file in a different branch, so we need to go back to the master branch and create
    a commit similar to the one we’ve just made.


    From the Source Control menu, select “Github Jobs – saying-hi” and then “Switch
    to Branch . . .”.


    In the list that appears, select the master branch and press “Switch.” We are
    now back to the master branch, and the `NSLog` instruction we’ve added is no longer
    here.


    Let’s repeat the process with a slightly different greeting message while still
    on the master branch.


    We chose to go with “Hi, I’m a book created for a sample application,” which indeed
    doesn’t make much sense. Commit your modification like we did before. We now have
    2 branches, both with a slightly different greeting instruction at the same position
    in the same file.


    Finally, from the Source Control menu, select “Github Jobs – master” and then
    “Merge from Branch . . .”. In the list that appears, select `"saying-hi"` and
    press “Merge”: a window similar to the one shown in Figure 2-4 will appear. Select
    the third button in the menu at the bottom of the screen to integrate the modifications
    on the right and press the “Merge.”


    **Figure 2-4.** Xcode has detected a conflict and will help you to fix it


    That’s basically how conflicts work and that’s how Xcode will assist you to fix
    them and keep your project clean. However, sometimes conflict will happen outside
    of Xcode, because you decided to merge a branch using the command line or because
    you started using a dedicated Git client.


    That’s the kind of thing Xcode will understand. When that happens and some of
    your files become disfigured with weird characters all over the place, building
    your application could simply throw you some random syntax error and let you find
    out why your build is failing. Xcode is much more clever than that. Indeed, you
    won’t even be able to build your application unless the conflict is marked as
    resolved manually using your shell or your favorite Git client, or directly in
    Xcode, as shown in Figure 2-5.


    **Figure 2-5.** Xcode has detected a conflicted file and marked it as such in
    the sidebar and the primary editor


    To fix this conflict and mark it as resolved, edit the `AppDelegate.m` file until
    it looks good to you.


    In our case, that would be keeping only one `application:didFinishLaunchingWithOptions:`
    method and choosing the second message. You must remove all the conflict markers,
    which are the lines with the multiple chevrons and equal signs, for your application
    to build again. After all, in this context, they are nothing more than syntax
    errors. Once this is done, simply right-click on the conflicted file and select
    “Mark Selected File as Resolved” in the “Source Control” menu item.


    Versioning control in Xcode is not all sparkles and rainbows. There are edge cases
    that come with Apple using file formats such as the one for the `xcodeproj` file
    or even `xib` and `storyboards`. In Xcode 5, Apple came with a much simpler file
    format for those Interface Builder files, making merge operations and conflict
    resolutions a lot easier. From NIB to bloated XIB, to almost-readable, ten-times
    shorter XIB, Apple is indeed working at easing this process. Once again, we’ve
    come a long way, even if we are still waiting for a simpler file format for those
    `xcodeproj`, which still uses an old-style brace based format to delimit the configuration
    hierarchy.'
