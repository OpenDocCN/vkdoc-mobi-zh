    # OS X Server 与 Xcode Bots


    如果您尚未通过身份验证，`OS X Server` 不会显示错误信息，但正如本章开头所配置的那样，您需要先进行身份验证才能查看现有机器人的信息，如图 8-11
    所示。请输入您先前创建的用户凭据，然后点击“登录”。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图 98](img/index-158_1.jpg)


    ![图 99](img/index-158_2.jpg)


    **第 8 章：Xcode Bots 的日常使用**


    **157**


    ***图 8-11.** 网页界面附带了登录表单*


    主界面会显示最近一次集成以及下一次集成的相关信息，同时还列出了最新可供下载的版本。在这些信息块下方，是所有现有机器人的列表，包括它们的状态和最近一次集成的时间。从该列表中点击您的
    Bot 名称，即可查看更多详细信息。


    这个网页界面与我们之前在 `Xcode` 中看到的非常相似，如图 8-12 所示。左侧是过去集成的历史列表，右侧则是机器人的当前状态，重点展示了最新一次集成的结果。


    ***图 8-12.** 此网页显示了名为 Klaus 的机器人的详细信息*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **158**


    **第 8 章：Xcode Bots 的日常使用**


    ## 下载最新版应用程序


    我们安装过程中缺失的最后一步，是能够下载应用程序并将其安装到测试设备上。请导航至“归档”选项卡，那里应会列出每次成功集成后所创建的应用程序包。每一次，项目的归档版本以及生成的
    `IPA` 文件都会被检索并存储在此处，就像我们之前使用 `Jenkins` 和 `Bamboo` 时那样。只不过现在这个过程是自动完成的，因为它确切知道要查找哪种文件模式。


    如果您在桌面电脑上点击某个“产品”链接，便可以下载该文件，例如将其上传到像 `Testflight` 这样的第三方分发平台。毕竟，您不希望让所有测试人员都能直接访问您的
    `OS X Server`。另一方面，如果您在 iOS 设备上点击此链接，则可以直接下载该应用程序并在设备上运行它！这正是专用于某一技术的持续集成平台所带来的优势之一。在我们的场景中，就是指
    `Xcode` 项目。


    ## 使用大屏幕功能获取实时反馈


    我们之前提到过，持续集成平台的关键在于能够获得即时反馈，以便了解应用程序是否出错或对产品造成了任何损害。正因如此，`Jenkins` 和 `Bamboo`
    都提供了显示安装状态的功能。而 `OS X Server` 及其 `Xcode` 服务则有所不同。如果您点击屏幕顶部菜单中的第一个图标，它会打开“大屏幕”，这是一个专为电视等大屏幕设计的网页。如图
    8-13 所示，该界面会自动更新，显示最新集成操作的详细信息。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图 100](img/index-160_1.jpg)


    **第 8 章：Xcode Bots 的日常使用**


    **159**


    ***图 8-13.** “大屏幕”模式提供了一种更合适的构建结果展示方式*


    ## 总结


    虽然花了些时间，但苹果终于开始拥抱持续集成这一领域。尽管我们现在还远未能用一个工具来完全取代 `Jenkins` 或 `Bamboo` 的安装，但它确实展现出了使用专用平台工具的优势。忘掉方案共享和获取夜间构建的复杂流程吧，有了
    `OS X Server` 和 `Xcode` 服务，只需点击几下，就能创建一个项目，托管在你的服务器上，每次向远程仓库推送提交时都会自动构建。


    我们已经向您展示了如何安装并开始使用 `OS X Server`，以及即使您不按照苹果建议的方式（例如使用自己的配置文件并依赖第三方工具管理依赖关系）工作，也能使用该工具的方法。


    我们并未涵盖该工具提供的所有功能，事实上，它还能运行你的测试套件，而这正是下一章将要介绍的内容。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 9 章：引入单元测试


    本书已接近尾声，这意味着您现在应该对持续集成有了一定的了解。我们涵盖了设置持续集成环境的主要解决方案：免费且开源的 `Jenkins`；具有既定工作流的企业级方案
    `Bamboo`；以及苹果官方的 `Xcode Bots`。`Xcode Bots` 成为 `Xcode` 项目持续集成的事实标准还需要一些时间，但前一章表明我们正在逐步接近这个目标。


    尽管我们介绍了几种不同的解决方案，但最终我们所做的仅仅是构建应用程序。


    当然，我们还需要获取最新版本的源代码并安装依赖，同时确保钥匙串可访问以便对应用程序进行代码签名。这个过程可能很复杂，但它只是持续集成平台能够提供的反馈中的一小部分。一个能成功构建的应用程序，并不意味着它能按预期工作。


    本章将介绍另一种有助于检测应用程序是否按预期工作的反馈：自动化单元测试。


    第一部分将介绍自动化测试是什么以及它的重要性。尽管自动化测试并非本书的核心主题，但大多数人只看到了编写测试耗时的一面，当项目截止日期变得难以满足时，测试往往是最先被砍掉的部分。接着，我们将深入探讨该主题，为
    Github Jobs for iOS 应用程序编写首批单元测试，讨论它们的工作原理、最佳实践以及如何运行它们。更重要的是，我们将介绍如何从命令行运行它们，以便将其与我们构建应用程序的过程一起，纳入持续集成流程中。


    ## 自动化测试


    在软件世界中，自动化测试是指使用专用工具来重复执行预定数量的测试场景。对于每个场景，将最终结果与预期结果进行比较。如果两者相等，则测试标记为通过；如果不等，则标记为失败。


    大多数可用测试工具的主要优势在于，能够重新运行失败的测试用例，直到“所有测试通过”为止。


    **161**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **162**


    **第 9 章：引入单元测试**


    ### 测试的原因


    进行测试的原因有很多，最显而易见的当然是要确保一切按预期工作。无论您编写的是哪种类型的测试，它们都有一个共同模式：从一组初始参数开始，对这些参数应用一些特定的修改，然后确保最终结果与预期结果相符。就单元测试而言，这意味着将通过特定参数调用方法所返回的结果，与一个固定的最终值进行比较。

