    file and transform it into an actual oclint command.


    $ oclint-json-compilation-database


    1 error generated.


    1 error generated.


    1 error generated.


    ...


    [OCLint ([http://oclint.org) v0.8rc1]](http://oclint.org/)


    oclint: error: violations exceed threshold


    P1=0[0] P2=30[10] P3=221[20]


    The error message we get is due to the amount of errors OCLint has detected. Each
    error has a priority and there are a maximum number of errors OCLint will accept
    before exiting. By default, less than 20 priority 3 violations are allowed, 10
    violations for priority 2, and no priority 1 violation can be tolerated. When
    one of these limits is reached, OCLint will exit with a non-zero status code that
    will fail the build.'
  trans: "\n***图 10-2.** 集成已完成。构建成功，但静态分析器发现了一个错误* 这样一来，只要你将更改推送到远程仓库，每 5 分钟测试套件就会像之前一样运行，而且得益于\
    \ Clang 静态分析，你还能收到关于代码的反馈。\n\n现在你已经能够充分利用你的 Xcode bot：运行测试、进行静态分析以及归档构建。既然在 Xcode\
    \ 中创建 Xcode bot 如此简单（当然，除了 CocoaPods 那部分），实在没有理由不使用它们。\n\n在像 Jenkins 和 Bamboo\
    \ 这样的其他持续集成平台上集成使用 Clang 的静态分析也同样简单。有一个 Jenkins 插件可以实现这一点，尽管它自 2013 年 3 月以来就未更新过，所以你只能祈祷最新版本的\
    \ Clang 静态分析器中报告格式没有太大变化。目前似乎还没有用于 Bamboo 的插件，但仔细想想，集成它也并不困难。它只需要调用特定的命令行指令并归档结果，这些结果就是简单的\
    \ HTML“构建产物”。然后你可以创建一个部署流程，将这些结果发布到专用的 Web 服务器上。\n\n由于展示如何从 Bamboo 构建中执行命令行指令并无新意，我们将向你介绍另一款静态分析器：`oclint`。\n\
    \n## 使用 OCLint 获取额外反馈\n\n我们之前提到过，静态分析工具分为不同类型，因为“静态”一词仅表示分析是在不实际运行代码的情况下进行的。Clang\
    \ 静态分析器会为你执行大量检查，而 OCLint 是一种能够执行与代码异味、未使用变量以及其他常见不良实践相关的其他测试的工具。与 Clang 一样，OCLint\
    \ 也是一个标准可执行程序，可以从网站下载或手动编译。\n\n请注意，选择后者（手动编译）将花费你几个小时的时间，因此你可能会考虑直接下载的方案。\n\n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**190**\n\n**第 10 章：质量保证**\n\
    \n导航至 [`oclint.org/downloads.html`](http://oclint.org/downloads.html) 上的 OCLint\
    \ 下载页面，选择最新稳定版本的归档文件。下载它，解压归档文件，并将 `bin` 文件夹添加到你的 `PATH` 中。\n\n```\n$ curl –O\
    \ http://archives.oclint.org/nightly/oclint-0.9.dev.43e26f7-x86_64-darwin-12.4.0.tar.gz\n\
    $ tar -zxvf oclint-0.9.dev.43e26f7-x86_64-darwin-12.4.0.tar.gz\n$ PATH=$PATH:/Users/Palleas/Tools/oclint-0.9.dev.43e26f7/bin\n\
    $ oclint -version\nLLVM (http://llvm.org/):\nLLVM version 3.3svn\nOptimized build.\n\
    Built Jun 16 2013 (17:54:11).\nDefault target: x86_64-apple-darwin13.2.0\nHost\
    \ CPU: corei7-avx\n```\n\n主站解释了如何对单个文件运行 OCLint，但如果你尝试对你的项目中的一个文件执行相同操作，很可能会收到一个错误，提示找不到\
    \ `UIKit.h` 文件。\n\niOS 项目使用 `xcodebuild` 构建是有原因的。是的，它在底层调用了 Clang，但带有关于构建设置、要检测的警告、要链接的框架以及要添加的标志等非常具体的参数。还记得\
    \ `DEBUG=1` 吗？\n\nOCLint 可以对单个文件运行，但前提是它确切知道如何构建该文件。如果你查看 `xcodebuild` 的输出，就能看到每个文件使用了什么命令。它看起来像这样：\n\
    \n```\n/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/clang\
    \ -x objective-c-header -arch armv7s -fmessage-length=145 -fdiagnostics-show-note-include-stack\
    \ -fmacro-backtrace-limit=0 -fcolor-diagnostics -std=gnu99 -fmodules -fmodules-cache-path=/Users/Palleas/\n\
    Library/Developer/Xcode/DerivedData/ModuleCache -Wno-trigraphs -fpascal-strings\
    \ -O0 -Wno-missing-field-initializers -Wno-missing-prototypes -Wno-implicit-atomic-properties\
    \ -Wno-receiver-is-weak\n-Wno-arc-repeated-use-of-weak -Wno-missing-braces -Wparentheses\
    \ -Wswitch -Wunused-function -Wno-unused-label -Wno-unused-parameter -Wunused-variable\
    \ -Wunused-value -Wempty-body -Wuninitialized\n-Wno-unknown-pragmas -Wno-shadow\
    \ -Wno-four-char-constants -Wno-conversion -Wconstant-conversion\n-Wint-conversion\
    \ -Wbool-conversion -Wenum-conversion -Wshorten-64-to-32 -Wpointer-sign -Wno-newline-eof\
    \ -Wno-selector -Wno-strict-selector-match -Wundeclared-selector -Wno-deprecated-implementations\n\
    -DDEBUG=1 -DCOCOAPODS=1 -isysroot /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.\n\
    platform/Developer/SDKs/iPhoneOS7.1.sdk...\n```\n\n（实际上它的长度是这个的三倍）别担心，你无需复制此命令并对每个要使用\
    \ OCLint 分析的文件都运行它。它采用了一种类似于 Clang 静态分析器的方法，该方法作为编译应用程序的构建命令的代理。有一种称为“JSON 编译数据库”的文件格式，其规范可在以下网址找到：[`clang.llvm.org/docs/JSONCompilationDatabase.html`](http://clang.llvm.org/docs/JSONCompilationDatabase.html)。基本上，该文件包含一个项目列表，每个项目包含一个文件、该文件所在目录的路径以及构建该文件的命令：\n\
    \n```\n{\n  \"directory\": \"Github Jobs\",\n  \"file\": \"PCSAppDelegate.m\"\
    ,\n  \"command\": \"/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/\n\
    bin/clang -x objective-c -arch armv7...\"\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**第 10 章：质量保证**\n\n**191**\n\n借助 OCLint 提供的一个 Python 工具，可以轻松生成此文件，该工具会查找 `xcodebuild`\
    \ 命令的输出，并将其转换为 `compile_commands.json`。该工具位于你下载的 OCLint 包中的 `bin` 文件夹中。如果像我们之前告诉你的那样，将此目录添加到你的\
    \ `PATH` 中，那么它应该也可以使用。首先使用适当的参数运行 `xcodebuild` 命令，并将输出存储到专用文件中，然后运行 `oclint-xcodebuild`\
    \ 工具：\n\n```\n$ xcodebuild -workspace Github\\ Jobs.xcworkspace -scheme Github\\\
    \ Jobs -configuration Debug clean build | tee xcodebuild.log\n$ oclint-xcodebuild\n\
    ```\n\n**注意**，我们使用了 `tee`，这是一个非常方便的工具，它可以将标准输入复制到标准输出，同时将其复制到一个或多个文件中。这样，你可以将输出复制到日志文件中，同时仍然可以在终端中查看输出。\n\
    \n现在，我们已经将 `xcodebuild` 命令的结果转换为正确的 JSON 编译数据库文件，我们可以使用 OCLint 来实际分析我们的文件了，我们将使用一个工具来获取\
    \ JSON 编译数据库文件的内容，并将其转换为实际的 `oclint` 命令。\n\n```\n$ oclint-json-compilation-database\n\
    1 error generated.\n1 error generated.\n1 error generated.\n...\n[OCLint (http://oclint.org)\
    \ v0.8rc1]\noclint: error: violations exceed threshold\nP1=0[0] P2=30[10] P3=221[20]\n\
    ```\n\n我们收到的这条错误信息是由于 OCLint 检测到的错误数量过多所致。每个错误都有一个优先级，并且在退出之前，OCLint 会接受一定数量的错误。默认情况下，允许的优先级\
    \ 3 违规少于 20 个，优先级 2 违规少于 10 个，并且不能容忍任何优先级 1 违规。当达到这些限制之一时，OCLint 将使用非零状态码退出，这将导致构建失败。\n"
- fmt: 'We are getting so many errors because it’s not only our code that was analyzed,
    but also the one from `SVProgressHUD`, for example, and you’re not necessarily
    responsible for the quality of code coming from third party libraries. Of course,
    feel free to contribute to open-source code when you notice obvious mistakes,
    but that’s not really the point here. What is important is that results about
    the code from third party libraries are less relevant to you. That’s why there
    is an `OCLint` option to ignore folders you don’t really care about. In our case
    that’s the `Pods` folder:


    ```

    $ oclint-json-compilation-database **-e Pods**

    ```


    There are multiple outputs available: HTML, plain text, JSON and XML are a few
    of them. You can specify the kind of report you want to use and where to save
    it using the `"-report-type"` and the `"-o"`. Those parameters are available for
    `OCLint`, not for `oclint-json-compilation-database`. That’s why we have to separate
    the first one from the second one using `"--"`. Any character positioned after
    these `"--"` will be passed as an argument to the generated `oclint` command.


    To generate an HTML-based report similar to the one shown in Figure [10-3](#index_split_003.html#p192),
    use the following command:


    ```

    $ oclint-json-compilation-database -v -e Pods/SVProgressHUD -- -report-type html
    -o oclint_result.html

    ```


    **Figure 10-3.** The HTML reports shows the list of errors that were detected
    by OCLint


    The report shows a list of violations with, as mentioned earlier, a priority.
    It also shows the position in the file and more importantly, the rule that wasn’t
    followed (here we are getting a lot of errors because of the long line rule) with
    an error message.


    This long line rule is subjective, especially when it comes to Cocoa APIs. There
    is in fact, a 148 characters long method name for the `NSBitmapImageRep`. What’s
    great with `OCLint` is that you can tweak the constants of some of the rules,
    like the long line one. To do so, simply use the `"-rc"` option that takes a property
    name and its value. Because it seems a bit ridiculous to be working on a huge
    iMac screen and get a warning because a line is 110 characters long when only
    100 is allowed, let’s bump the limit to 120. That way, a lot of warnings should
    go away. 120 is a pretty big number though, if you still have long line warnings
    after that (Figure [10-3 shows that we do) maybe a small refactoring could be
    the solution.


    ```

    $ oclint-json-compilation-database -v -e Pods/SVProgressHUD -e Xcode/DerivedData
    -e /Applications/Xcode.app/ -- -report-type html -o oclint_result.html -rc=LONG_LINE=120

    ```


    This long line rule is typically the kind of rule that should be customized to
    suit the needs of your team because once it’s settled, there is no arguing needed,
    the 140 characters long line in `PCSVIewController` is indeed too long and we
    should consider fixing that.


    You may have noticed that there is a `"Clang Static Analyzer"` column. This may
    answer the question you might be asking to yourself: “Do I really need `OCLint`
    when I have Clang?” `OCLint` doesn’t aim at replacing Clang; it only provides
    additional feedback about the quality of your code. To make things easier though,
    `OCLint` can automatically invoke the Clang static analyzer. This way, only one,
    unified report will be generated. Using the `"-enable-clang-static-analyzer"`
    argument to enable this feature or not is really up to you.


    Now that we know how it works, let’s integrate the report in our Jenkins’ job.


    ## Integrating OCLint into Jenkins


    Once again, relying on the developer to run this kind of tool is not the smartest
    idea. Voluntarily or not, he or she will forget to run it. For that reason, we
    will integrate `OCLint` into Jenkins so the static analysis is performed regularly.'
