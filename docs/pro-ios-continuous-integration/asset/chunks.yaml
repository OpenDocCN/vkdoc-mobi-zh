    JobsTests-Info.plist"` to `1.2.3`


    There is one golden rule in the world of continuous integration and that is to
    avoid messing too much with the application right before it is built. Right now
    we are in an interactive mode in which we run build commands manually but when
    we will run them from automated build platforms you will learn that they are a
    lot less forgiving.


    ## Wrapping it Up and Calling it a Day


    We have been writing commands for the past fifteen pages or so, and it is time
    we start grouping all these commands so we can rerun everything all at once: the
    building and the application packaging. To achieve that, we will write a simple
    bash script. Let’s start by creating a `bin` directory at the `"Github Jobs"`
    project’s root directory. By convention, this is where you find the executable
    tools of a project.


    ```

    $ mkdir bin

    $ touch bin/cibuild

    $ chmod +x bin/cibuild

    ```


    Note the `chmod` command we are using to add the executable file mode to our newly
    created script.


    The content of this build script is pretty straightforward:


    ```bash

    #!/bin/bash


    WORKSPACE="Github Jobs.xcworkspace"

    SCHEME="Github Jobs"

    BUILD_DIR="$(pwd)/build"

    CONFIGURATION="AdHoc"

    ARCHIVE_FILENAME="Github Jobs.app"

    IPA_FILENAME="Github Jobs.ipa"


    security unlock-keychain -p $PASSWORD $HOME/Library/Keychains/login.keychain


    pod install


    xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration CONFIGURATION_BUILD_DIR="$BUILD_DIR"
    clean build | xcpretty -c


    xcrun -sdk iphoneos PackageApplication "$BUILD_DIR/$ARCHIVE_FILENAME" -o "$BUILD_DIR/$IPA_FILENAME"

    ```


    The first line is called a “shebang” and tells the shell that this script should
    be evaluated using bash.


    Now the script is pretty simple and doesn’t use any shell-specific tools so this
    part is not really needed, but is a good habit to have.


    The next block basically defines a bunch of variables, nothing fancy there and
    the rest of the script is nothing we haven’t covered in the past sections of this
    chapter beside the `security` command.


    The `security` command is a command line interface to your keychain and all that
    is security-related.


    One of the things it can do is unlock the keychain for a small amount of time.
    When you build your application for the first time, a panel will pop up asking
    you if you will grant access to your keychain to a specific process. In our case
    that is `CodeSign`, the command that happens at the end of the `xcodebuild`, that
    needs access to the private key and the certificates that are stored in your keychain,
    to sign the build.


    Note that hardcoding your password is really not that secure, that is why the
    `$PASSWORD` variable is not defined in the script and the script is invoked like
    this:


    ```

    $ PASSWORD=mypassword bin/cibuild

    ```


    That’s not a lot better but at least you can share your script and add it to version
    control without giving your password away. In the next chapters we will start
    talking about the integration of this script into automated build platforms that
    come with secured ways of storing your credentials.


    ## Summary


    In this chapter we gave you a little tour of the command line tools available
    to the iOS developer who wants to be more productive and learn how things work
    under the hood. Shenzhen, `xctool`, and `xcpretty`, are all made by other developers
    who wanted to leverage the power of the command line and felt like giving back
    to the community by sharing their work.


    We hope we’ve convinced you that the command line is nothing to be afraid of and
    can be of great assistance. Using `xcodebuild` to build the application, `xcrun`
    to locate the tools you need, `PackageApplication` to generate the final `ipa`
    file... Apple provides the developer with a lot of tools that will help us set
    up our continuous integration environment.


    The next chapter will be about just that, starting with a continuous integration
    platform called Jenkins.


    ---


    # Automatic Builds with Jenkins


    It took us almost half of the book to introduce the concept, but it is finally
    time we start talking about continuous integration. In past chapters, our goal
    was to give you a tour of the tools at your disposal. Now that we know that Apple
    provides us with everything we need, let’s set up our continuous integration automated
    build platform using Jenkins.


    Before we get our hands dirty, we need to answer the following question: What
    is an automated build platform, and why do we need one?


    ## Why Do We Need an Automated Build Platform?


    An automated build platform runs specialized build processes that we usually call
    “jobs.” A job can perform many actions, from building the application to checking
    the code style against your team’s conventions. A job will be started automatically
    every once in a while when the project is changed or even manually, sometimes
    many times a day. Automated build platforms usually come with a user interface
    to ease the creation of jobs and the exploitation of job execution’s results.
    Put that way, it’s basically a glorified web interface over `crontab`. So what
    is the added value?


    During the lifecycle of a project, you will be integrating pieces of code from
    your coworker and you need to make sure these pieces of code won’t hurt the final
    product in any way. We’ve already covered how to quickly build the application
    from the command line and in the next chapters we will talk about unit testing
    and quality assurance. The truth is, these tools are useless if you forget to
    run them, and you will. It may be because you became overconfident in your code-review
    skills or simply because the deadline is getting too close but relying on a developer
    to run tools that will annoy him is craziness. The main point of an automated
    building platform is to maintain a certain level of confidence in the application
    codebase by building the application as frequently as possible.


    Continuous integration aims to reduce the pain of integration by increasing its
    frequency, and that’s why an automated build platform will help.


    An automated build platform must be running on a neutral environment and definitely
    not on a developer’s computer. Once again, you need to be able to trust your automated
    build platform. “But I don’t understand, the application builds on my computer!”
    is the kind of discussion you want to avoid.


    We will start with a very well-known automated build platform: Jenkins.


    ## Jenkins and Hudson: A Bit of History


    Jenkins is a continuous integration platform written in Java that was released
    ten years ago. It started under the name of “Hudson” in 2004 at Sun Microsystems
    and was the first viable alternative to CruiseControl, also written in Java.


    When Sun Microsystems was acquired by Oracle in 2010, an issue arose in the community
    and the result was a change of name when Oracle applied for a trademark and Jenkins
    was born. Oracle, however, announced that Hudson would still be maintained and
    that the project would continue to evolve. Today, both projects are still alive,
    even if the Jenkins one seems to have won the popularity contest, according to
    the latest number of members and public repositories on their respective GitHub
    organizations.'
