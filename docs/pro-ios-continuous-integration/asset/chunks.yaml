    ![Image 24](index-25_1.jpg)


    ***Figure 2-8.** By default, an Xcode project comes with two levels of configuration:
    Debug and Release*


    Because we want a third one called “AdHoc,” click on the plus sign right beneath
    the configuration list and select “Duplicate Debug configuration” as it’s much
    easier to remove the things we don’t want from the Debug configuration than putting
    back in one we need to the Release configuration. In the first cell of the row
    that just appeared, fill in “AdHoc.” We now have three levels of configuration.


    You may wonder why we chose “AdHoc” as a configuration name. “Ad Hoc” comes from
    Latin and means “for this.” It is a popular convention given by Apple. In fact,
    when you go in the iOS developer center to create a distribution certificate,
    you can choose to create an “Ad Hoc” provisioning profile so you can deploy your
    application without using the App Store. We will talk a lot more about Ad Hoc
    provisioning profiles and over the air distribution in Chapter 7.


    We now have our three configuration levels. Let’s see how it will help us in our
    continuous integration process. Go to the build settings tab in your project configuration.
    You will see a lot of settings you don’t want to play with, mostly because some
    of them look like gibberish and honestly, Apple did a good job setting up these
    proper default values. Let’s take a look at a couple of them. You can easily jump
    to a specific setting by using the search field at the top of the interface and
    compare the different settings depending on the configuration, for example the
    “Build Active Architecture Only” one.


    When you work on your application, you want the build to be as fast as possible.
    That’s why you don’t want to build for all the valid architectures. With the current
    active devices out there, from iPad 3 to iPhone 5S, you end up having to build
    for three different architectures: `armv7`, `armv7s`, and `arm64`, which makes
    the build slower.


    If you take a look at the “Build active architecture only” you will see that this
    option is set to `YES` for the Debug configuration and set to `NO` for the Adhoc
    and Release builds. It is very important to keep the build as fast as possible,
    that’s why there are other settings, such as “Validate Product” that are disabled
    for debug build. On the other hand, when your application is built by an automated
    build


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 25](index-26_1.jpg)


    ![Image 26](index-26_2.jpg)


    tool every once in a while, you don’t care if the build is slower and actually
    want the extra feedback provided by these settings.


    For the AdHoc configuration, select `NO` for this build setting, as shown in Figure
    [2-9](#index_split_000.html#p26). We want the extra feedback provided by the Debug
    configuration but we actually need the three architectures since we don’t know
    which devices the application will be installed on. We will talk a little bit
    more about these architectures in chapter 4.


    ***Figure 2-9.** A project comes with multiple levels of configuration for settings
    that can be inherited or overridden*


    Look for the “static analyzer” section on the build settings. As shown in the
    Figure [2-10](#index_split_000.html#p26), the static analyzer is disabled during
    the build process.


    ***Figure 2-10.** Static code analysis is disabled for build process*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 27](index-27_1.jpg)


    It is this way for a very simple reason: static analysis of code is slow. It is
    even slower when you want to have a more in depth analysis instead of a shallower
    one. Let’s activate it for the AdHoc configuration as shown in Figure [2-11](#index_split_000.html#p27).'
