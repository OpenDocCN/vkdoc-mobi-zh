    tests* Of course, you probably want more details about why the test failed. After
    all, there can be many assertions that fail in this test case. To do that, simply
    click on the “Test Result”


    link and expand the test section by clicking on the plus sign near “PCSJobOfferTests.


    testThatDictionaryIsProperlyMappedToProperties” and the one near the “Stack trace”.
    As shown in Figure [9-7](#index_split_003.html#p178), you see directly why the
