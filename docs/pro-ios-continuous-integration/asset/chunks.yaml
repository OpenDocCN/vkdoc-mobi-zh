    application. For an application as small as the Github Jobs one is, that would
    not make a huge difference but with big projects with huge resources and dependencies,
    this could significantly increase the duration of the build. You should leave
    this option unchecked for most of your builds.


    In the previous chapter, we lost some time with a failing build because the dependencies
    where not installed properly. This time we will go straight to the point and start
    the build process with the installation of dependencies using Cocoapods.


    1\. To achieve that, click on the “Add Task” button and look for the “Script”
    kind


    of build task. Click it once you’ve found it.


    2\. In the “Task description” field fill “Installing the dependencies using


