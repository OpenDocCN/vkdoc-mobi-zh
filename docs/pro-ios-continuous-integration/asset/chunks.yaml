    \n### 使用 Agvtool 提升构建版本\n\n使用`PlistBuddy`更新构建版本号容易出错且过于复杂。你必须确保在两个不同的地方正确更新它：简短的营销版本号和构建版本号。如果你的应用程序使用多个目标，例如一个\
    \ iOS 版本和一个 iPad 版本，你将需要更新两个`Info.plist`清单文件中的版本号。那就是要运行四条`PlistBuddy`命令！不过别担心，还有一个工具我们需要向你介绍：苹果通用版本控制工具（`agvtool`）。\n\
    \n`agvtool` 是苹果提供的一个实用程序，随 Xcode 一起提供，可以在其 Developers 目录中找到，就像我们迄今为止使用的许多其他工具一样。再次，快速使用`xcrun`将帮助你找到它：\n\
