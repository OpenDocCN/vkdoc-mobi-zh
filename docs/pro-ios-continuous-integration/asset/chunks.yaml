- fmt: 'First, open the file from your favorite text editor either by going manually
    to the directory where you created the application and navigating to the “Github
    Jobs” directory that corresponds to your application’s main target (the other
    one is the testing target, more on that later) or by right-clicking on the file
    in Xcode file explorer and selecting “Open with external editor.” The first lines
    should look like something similar to the following:


    ```xml

    <?xml version="1.0" encoding="UTF-8"?>

    <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"

    "http://www.apple.com/DTDs/PropertyList-1.0.dtd">

    <plist version="1.0">

    <dict>

    <key>CFBundleDevelopmentRegion</key>

    <string>en</string>

    <key>CFBundleDisplayName</key>

    <string>${PRODUCT_NAME}</string>

    <key>CFBundleExecutable</key>

    <string>${EXECUTABLE_NAME}</string>

    <key>CFBundleIdentifier</key>

    <string>com.perfectly-cooked.${PRODUCT_NAME:rfc1034identifier}</string>

    ...

    ```


    This is not really human friendly, to say the least. Don’t worry though: Xcode
    doesn’t expect you to edit this file manually. In fact, Xcode comes with a property
    list editor that will make it easier to view this file. It also turns the keys
    into comprehensible sentences. This way, `LSRequiresIPhoneOS` turns into “Application
    requires the iPhone environment.”


    Note that you can still view the name of the keys underneath. This can be helpful
    for debugging or simply because tutorials on the Internet often refers to these
    raw keys. From the editor, right-click on and select “Show Raw Keys/Values.”


    What interests us most are the two versions properties, by default, their values
    should be 1.0. The first one, the “Bundle versions string, short” a.k.a. `CFBundleShortVersionString`
    is the main version of the application. If you have already shipped an application
    on the app store, you’ve probably already changed its value. The second one, “Bundle
    version” a.k.a. `CFBundleVersion`, is the full version number and doesn’t have
    to be human-readable. Most people tend to keep both in sync, but that would be
    a waste of configuration in our case, as the long version will be proven useful
    in the future.


    Later in the book we wil start talking about automated builds. These builds always
    come with an incrementing number and this is when the `CFBundleVersion` key comes
    in handy. According to Apple documentation, the `CFBundleVersion` specifies a
    version of the application, released or not, which fits perfectly. Every time
    our application is built, we wil use the build’s number to change the `CFBundleVersion`.
    To keep things clear, it is important to have coherence between those two versions.


    This `Info.plist` file contains information about the application that is made
    available from the `NSBundle` class. Its content is not limited to the keys available
    now, there are in fact a lot of other keys that will be added if, for example,
    you want your application to be opened when a certain URL scheme is called from
    a webpage. Xcode manages most of these keys for you, so you don’t need to know
    them all.


    ## Tests


    An Xcode project comes with a testing target, a test class, and your very first
    test case. This last one is a failing one, as it basically just calls `XCTFail`,
    a C macro used to force-fail a case. Still, that’s something.


    Everything has been configured so you can get to work right away and start writing
    tests at the beginning of your project. That’s something you’ll be very happy
    about when your project becomes big and complex.


    When we started writing the book, we talked a bit about how Apple took its time
    before actually giving you tools for continuous integration. That’s not entirely
    true. Since Xcode 2.1, Xcode came with a version of the testing tools `SenTestingKit`
    and `OCUnit`, which wasn’t an official Apple-labelled tool back then, but a framework
    created by a company called “Sen:te” ([http://sente.ch](http://sente.ch/)).


    Open the sample application and select “Github Jobs,” the first element in the
    file explorer. Select your testing target, named “Github JobsTests” and select
    the “Build Settings” tab. You should see all the settings of this target. Filter
    these settings using the search field at the top right and look for `“xctest.”`
    As Figure 2-2 shows, you should see that a framework called `XCTest` is automatically
    linked with your application. `XCTest` is a brand new testing framework heavily
    based on the old one but way better and way more deeply integrated in the IDE
    and much more powerful.


    ![Image 18](index-13_1.jpg)


    **Figure 2-2.** The filtered list of build settings shows the `XCTest` framework
    linked to the Github Jobs testing target


    In the 5.1.1 release, `OCUnit` and the `SenTestingKit` framework were marked as
    deprecated and will be removed from a future release of Xcode. In fact, source
    code using `OCUnit` now generates warnings at compilation time.


    For starters, Xcode 5 comes with a test navigator available in your sidebar or
    by pressing “ + 5.” This navigator allows you to see the recently run test cases
    and to re-run them by pressing a single button, making every refactoring a breeze.
    That’s not all there is. Xcode 5 comes with new assistant editors that will help
    you unit-test your code. The assistants, called “Test Callers” and “Test Classes,”
    provide access to unit tests related to the current source code in the primary
    editor.


    In our example shown in Figure 2-3, we have created a fake `PCSGithubJob` class
    (on the left) with a method whose purpose is to analyze a job offer and tell you
    if it will make you happy. The “Test Callers” editor (on the right) automatically
    jumped to the related testing method.


    ![Image 19](index-14_1.jpg)


    **Figure 2-3.** Xcode with the primary and the assistant editors opened showing
    the unit-testing code related to our class


    Last but not least, the `xcodebuild` command line tool now supports the test action
    for iOS projects. Before this release it was not possible directly to run your
    unit-tests from the command line. We will cover more about the command line equivalent
    of these tools in Chapter 3.


    Back in Xcode 4, when you created an iOS or OSX application, you had to check
    an option to add a testing target to your project and now this is the default
    behavior. This is a nice touch from Apple since the community of the iOS developers
    has always had this image of one that mostly focuses on the design and the user
    experience. It shows a clear will of helping the iOS developers to become more
    professional and start using the proper tools.


    Finally, the new testing framework was actually announced at the same time as
    the “Xcode Bots.” They are meant to help you embrace the concept of continuous
    integration and they fit perfectly with `XCTest`. Make sure to read Chapter 8
    to learn more about them!


    A good test suite is key in a continuous integration environment. We talked earlier
