    \ CFBundleVersion 0.2\n```\n\nAnd finally store the time the application was built\
    \ at (note the very specific date format):\n\n```bash\nCommand: add PCSLastUpdate\
    \ date \"Sat Apr 19 01:14:45 GMT 2014\"\n```\n\nWhile this approach is fine from\
    \ a technical point of view, it is far from being convenient. You can use `PlistBuddy`\
    \ in the interactive mode for debugging and manual manipulation purposes - even\
    \ though opening it in your editor of choice would probably be best - but the\
    \ `PlistBuddy` also allows you to run commands directly using the `-c` argument.\
    \ In our case that would give us the following commands:\n\n```bash\n$ PlistBuddy\
    \ -c \"Print CFBundleVersion\" Github\\ Jobs/Github\\ Jobs-Info.plist\n0.1\n\n\
    $ PlistBuddy -c \"Set CFBundleVersion 0.2\" Github\\ Jobs/Github\\ Jobs-Info.plist\n\
    $ PlistBuddy -c \"Add PCSLastUpdate date Sat Apr 19 01:14:45 GMT 2014\" Github\\\
    \ Jobs/Github\\ Jobs-Info.plist\n```\n\nWe mentioned in a previous chapter that\
    \ the downside of releasing multiple versions of your application is to have the\
    \ previously installed versions erased and the only available solution was to\
    \ change the bundle identifier. Now that we know how `PlistBuddy` works, the possibilities\
    \ are pretty much endless. Here is what you could do to release a build of a very\
    \ specific branch.\n\nThe first thing to do is to retrieve the name of the git\
    \ branch you are currently on:\n\n```bash\n$ git rev-parse --abbrev-ref HEAD\n\
    bug-fixing-branch\n```\n\nThen, all it takes is the execution of a command using\
    \ `PlistBuddy` in non-interactive mode:\n\n```bash\n$ PlistBuddy -c \"Set CFBundleIdentifier\
    \ com.perfectly-cooked.\\${PRODUCT_NAME:rfc1034identifier}-$(git rev-parse --abbrev-ref\
    \ HEAD)\" Github\\ Jobs/Github\\ Jobs-Info.plist\n```\n\nNote that we need to\
    \ escape the first dollar sign because we don't want it to be evaluated by bash\
    \ and we still want to use the placeholder with the RFC1034 filter. In our case\
    \ we could have just hardcoded the \"github-jobs\" part but we are messing enough\
    \ already with the application manifest.\n\nYou may be wondering why we used the\
    \ command line to do this (even if the fact that you bought this book tells us\
    \ you probably aren't). Just imagine an automated build platform that would create\
    \ a build you could test for each branch your coworker wants you to merge!\n\n\
    ### Bumping the Build Version Using Agvtool\n\nUpdating the build number using\
    \ `PlistBuddy` is error-prone and overcomplicated. You have to make sure you update\
    \ it properly at two different places: the short, marketing version number and\
    \ the build version number. If your application uses multiple targets, for example\
    \ an iOS version and an iPad one, you will have to update the version numbers\
    \ in two `Info.plist` manifest files. That is four `PlistBuddy` commands to run!\
    \ Don't worry though, there is one more tool we need to introduce you to: the\
    \ Apple Generic Versioning Tool (`agvtool`).\n\n`agvtool` is a utility provided\
    \ by Apple that comes with Xcode and that can be found in its Developers directory\
    \ just like many of the other tools we've been using so far. Once again, a quick\
    \ use of `xcrun` will help you find it:\n\n```bash\n$ xcrun -f agvtool\n/Applications/Xcode.app/Contents/Developer/usr/bin/agvtool\n\
