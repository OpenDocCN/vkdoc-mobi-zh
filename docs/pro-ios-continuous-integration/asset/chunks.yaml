    # 第 7 章：无线分发


    本章的目标是带你了解 `Jenkins` 之外的选择，因为没有什么比固守你钟爱的工具而不去探索其他方案更危险的了。我们再次申明，并非要告诉你哪个更好；实际上，两种方案都各有利弊。至此，你应该有能力选择最适合自己的方案了。


    `Bamboo` 是一款功能齐全的产品，由一家盈利公司维护，拥有设计精良的界面、强大的插件以及组织有序的构建计划。


    本书还将介绍苹果公司发布的一款用于为你的项目设置持续集成的新工具，但因为你可能需要在构建平台方面稍作休息，下一章将涵盖构建流程中同样重要的部分：无线部署！


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 无线分发


    在前面的章节中，我们介绍了如何手动构建应用程序，或使用持续集成平台 `Jenkins` 和 `Bamboo` 进行构建。我们之前提到过，成功构建后通常面临的问题是：是否将其发送给你的质量保证团队。


    无论你在构建流程中增加了多少工具（自动化测试、静态代码分析等），你仍然需要从实际用户那里获得反馈，才能知道你的应用程序是否准备好发布。在本章中，我们将简要讨论无线（OTA）分发，以及人们如何决定基于一种能简化应用程序分发流程的产品来创建业务。然后，我们将与其中一项服务`TestFlight`进行集成。最后，我们将了解其实际工作原理，并开发我们自己的、自制的持续集成平台。


    ### 什么是无线分发？


    软件分发是开发者多年前就必须解决的一个老问题，而且并不仅限于移动应用程序。曾几何时，发布新软件或软件更新时所面临的问题是，如何运送包含该软件的数千张光盘供用户安装。随着互联网的出现，分发移动应用程序的问题变成了如何通过
    Wi-Fi 或蜂窝网络分发这些应用程序。归根结底，OTA 只是一个花哨的术语，指代应用程序的分发方式。


    ### 这与持续集成有何关系？


    一个常见的误解是，认为持续集成仅仅是指每天或每隔一段时间构建一次应用程序，并在准备就绪时发布测试版。这并非持续集成，而是持续交付。正如我们在前几章中所展示的那样，这是一个更复杂的过程。


    尽管如此，持续集成的概念与分发的概念密不可分，因为能够发布应用程序的一个构建版本并从用户那里获取反馈，这是另一种帮助你决定是否应该集成某个功能或修复某个错误的反馈机制。


    **117**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **118**


    **第 7 章：无线分发**


    ### iOS 应用分发：一个可行的商业模式


    如前几章所述，发布 iOS 应用程序是一个复杂的过程。对应用程序进行代码签名并使用正确的配置文件是大多数 iOS 开发者都会遇到困难的任务。苹果公司花了很长时间才真正开始提供一种无需使用
    App Store 即可发布应用程序测试版的方法。在撰写本书时，通过苹果公司分发测试版仍处于测试阶段。当然，你总是可以手动将应用程序安装到测试者的设备上，但你肯定不想成为那样的人。


    随着 iOS 4 的发布，苹果引入了临时（Ad-Hoc）配置文件，允许你在没有 `Xcode` 的情况下将应用程序安装到 iOS 设备上。临时配置文件与你用于在
    App Store 上提交应用程序的标准分发配置文件非常相似。


    主要区别在于，它包含了所有允许运行该应用程序的设备的唯一设备标识符（UDID）。目前，你可以注册多达 100 个设备标识符，包括你自己的设备。


    这通常足以将你的应用程序发送给少量的测试人员，但这些名额必须谨慎使用：每年在你续费苹果开发者账户时，只能移除一个设备 ID。


    一旦你生成了临时分发配置文件（我们稍后会回到这部分），实际上就可以通过网页将 iOS 应用程序安装到设备上，而无需将其连接到电脑。毕竟，你设备上的 App
    Store 应用就是这么做的。为此，你所需要的只是一个服务器和几个可以从 iPhone 浏览器访问的文件。此外，你很可能不希望你的网站“对所有人免费开放”，让任何人都能下载你的应用程序，因此你需要一个安全层。所有这些都需要你投入时间和知识，而这些你未必具备或愿意学习。第三方服务便由此诞生。


    [TestFlight (testflightapp.com)](http://testflightapp.com/) 和 [HockeyApp (hockeyapp.net)](http://hockeyapp.net/)
    等服务的诞生，正是源于为开发者和测试版测试人员简化此流程的需求。创建一个账户，使用正确的配置文件构建你的应用程序，就大功告成了。授权的用户就可以准备下载你的应用程序的测试版。这两项服务过去都支持
    Android 和 iOS 平台，但在 2014 年 2 月，`TestFlight` 背后的公司 Burtsly 被苹果收购，随后苹果移除了对 Android
    平台的支持。


    由于苹果通过收购 `TestFlight` 使其成为分发应用程序测试版的推荐方式，我们将使用它来发布 Github Jobs for iOS 应用程序的测试版。


    ### 使用 TestFlight 分发应用


    下一部分将介绍如何使用 `TestFlight` 手动分发构建版本。如果你已经熟悉这项服务，可能不会学到什么新东西。请随意跳到下一节，在那里我们将通过 `Jenkins`
    和 `Bamboo` 自动提交构建版本，然后编写我们自己的简单分发平台！


    访问 `TestFlight` 的注册页面（[`testflightapp.com/register/`](https://testflightapp.com/register/)）并创建一个账户，稍后当我们有了一个可以发送给用户的功能性构建版本时，将会用到它。首先，让我们创建一个临时配置文件，并使用它来打包我们的
    Github Jobs for iOS 应用程序。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图片 76](img/index-121_1.jpg)


    **第 7 章：无线分发**


    **119**


    为此，从你的团队或测试设备中收集几个唯一的设备标识符，并将它们添加到苹果开发者门户，然后：


    1.  在左侧菜单中，选择“配置文件”部分下的“分发”链接，然后点击屏幕右上角的加号。你可能之前已经访问过此部分来生成开发配置文件或用于在 App Store
    上提交应用程序的分发配置文件。但这次，请选择“临时”分发，然后点击“继续”按钮。


    2.  选择你的应用程序标识符，在我们的例子中，它类似于 `UBSUPPBORX.com.perfectly-cooked.github-jobs`。点击继续按钮。


    3.  从出现的列表中，勾选你想要分发应用程序的 iOS 设备列表，如图 7-1 所示。


    ***图 7-1.** iOS 应用程序的测试版将发送给四位测试版测试人员*


    这是你应该非常小心处理的过程。请记住：a) 你的名额有限；b) 每次你想添加一个新的测试版测试人员时，都必须更新你的配置文件并生成一个新的构建版本。

