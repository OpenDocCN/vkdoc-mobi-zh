    如果你使用 OSX 已经有一段时间了，那么你很可能听说过 Xcode 的命令行工具。安装命令行工具是使用 Homebrew 包管理器等工具的前提条件。虽然可以通过
    Xcode 的首选项面板来安装这些命令行工具，但 `xcode-select` 是用于打开如图 4-2 所示安装窗口的命令行等效工具。


    ```bash

    $ xcode-select –install

    xcode-select: note: install requested for command line developer tools

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 41](index-48_1.jpg)


    **CHAPTER 4: Invoking the Power of the Command Line**


    **45**


    ***Figure 4-2.** The xcode-select tool can start the installation of the Xcode
    command line tools*


    如果你是 Apple 注册开发者，你可以访问 Xcode 的私有 beta 版本，而 `xcode-select` 在此处大显身手。`xcode-select`
    允许你在不同版本的 Xcode 之间切换。由于它是在全局级别管理开发者目录的路径，因此需要使用 `sudo` 以“超级用户”身份运行此命令。


    ```bash

    $ sudo xcode-select --switch /Applications/XCode6-beta.app

    ```


    通过这种方式，你将能够使用 Xcode6-beta 提供的命令行工具。这在以下场景中很有帮助：确保你的应用程序仍能使用新版本的 Xcode 构建，或者你发现了之前
    Xcode 版本的一个 bug，并想检查它是否已被修复。关键在于，借助这个小工具，在 Xcode 版本之间切换变得非常容易。作为额外优势，`xcode-select`
    会确保你尝试使用的开发者目录是有效的：


    ```bash

    sudo xcode-select -s /Applications/Dashboard.app

    xcode-select: error: invalid developer directory ''/Applications/Dashboard.app''

    ```


    我们通常使用的开发者目录是 `/Applications/Xcode.app`，但由于历史原因，实际的开发者目录是应用程序包内的一个子目录。这就是为什么我们首次使用
    `xcode-select –p` 命令时，打印的不是 “`/Applications/Xcode.app`”，而是 “`/Applications/Xcode.app/Contents/Developer`”。当你使用
    `xcode-select` 切换到不同版本的 Xcode 时，你可以使用这两个值。如果你输入较短的路径，它会自动扩展为完整的开发者目录路径。


    当然，全局切换到 Xcode 的 beta 版本可能有点极端，而且最重要的是，这存在风险。想象一台专门用于自动构建应用程序的 Apple 电脑——例如一台
    Mac Mini。你不会想冒险切换到 Xcode 的 beta 版本，从而危及整个环境。正因如此，还有一种较为温和的切换 Xcode 版本的方法：使用 `DEVELOPER_DIR`
    环境变量。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **46**


    **CHAPTER 4: Invoking the Power of the Command Line**


    **注意** 环境变量，顾名思义，是命令运行的环境所使用的变量。其中一些变量由操作系统自动设置，例如包含当前用户主目录路径的 `$HOME` 变量（如 `/Users/Palleas`），或包含当前工作目录路径的
    `$PWD` 变量（如 `/Users/Palleas/Projects/Apress/Github Jobs`）。也可以使用非常简单的语法为当前会话定义一些变量：`MY_ENV_VARIABLE="My
    Value"`，然后稍后使用 `$MY_ENV_VARIABLE`。基于此，使用 `DEVELOPER_DIR` 同样简单。


    无论你选择哪种解决方案，在不同 Xcode 环境之间切换都非常容易。例如，如果你怀念旧版本的 Xcode，或者因为你一个旧项目无法用最新版本构建，你可以直接访问“Apple
    开发者下载”页面（网址为 [https://developer.apple.com/downloads/index.action](https://developer.apple.com/downloads/index.action)），下载一个较旧版本的
    Xcode 并使用它。


    请注意，与 `xcode-select` 方法不同，使用环境变量并不会在你尝试使用该目录之前检查它是否有效，直到它实际尝试使用时才会验证，如下例所示，我们尝试使用一个众所周知的
    OSX 应用程序 `Dashboard.app` 作为开发者目录。


    ```bash

    DEVELOPER_DIR=/Applications/Dashboard.app xcodebuild -v

    xcrun: error: invalid DEVELOPER_DIR path (/Applications/Dashboard.app), missing
    xcrun at:

    /Applications/Dashboard.app/usr/bin/xcrun

    ```


    你可能注意到了 `xcodebuild` 命令的使用。是时候让我们亲自动手，看看如何实际使用命令行构建应用程序了。毕竟，这正是我们来到这里的目的。


    ## Building the Application


    现在我们对 Xcode 安装提供的命令行工具的位置有了大致了解，让我们看看如何直接从终端构建应用程序。你在上一节已经初步了解了 `xcodebuild` 命令，而这正是我们实际要使用的命令。


    ### Building the Application Using xcodebuild


    如果你在终端中使用帮助选项运行 `xcodebuild` 命令，你可能会感到不知所措。


    ```bash

    $ xcodebuild -h

    Usage: xcodebuild [-project <projectname>] [[-target <targetname>]...|-alltargets]

    [-configuration <configurationname>] [-arch <architecture>]... [-sdk [<sdkname>|<sdkpath>]]

    [-showBuildSettings] [<buildsetting>=<value>]... [<buildaction>]...

    xcodebuild [-project <projectname>] -scheme <schemeName> [-destination <destinationspecifier>]...

    [-configuration <configurationname>] [-arch <architecture>]... [-sdk [<sdkname>|<sdkpath>]]

    [-showBuildSettings] [<buildsetting>=<value>]... [<buildaction>]...

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 4: Invoking the Power of the Command Line**


