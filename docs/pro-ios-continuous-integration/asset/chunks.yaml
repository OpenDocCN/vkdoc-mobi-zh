- fmt: "They are now capable of detecting potential bugs, which can reduce the amount\
    \ of redundant unit tests you may have to write, and let you focus on the ones\
    \ that actually test your code, not your platform.\n\nThere are few downsides\
    \ to static analysis that need to be taken into account. First, these tools usually\
    \ run slower than simple compilation and for good reason: they are not simply\
    \ transforming the code, they are actually trying to locate potential bugs in\
    \ it. That requires running complex algorithms against the parsed code and that\
    \ will cost you time.\n\nAlso these tools are not magic, they will only be able\
    \ to detect bugs it has been programed to find.\n\nThey are also not perfect and\
    \ can sometimes detect bugs that are actually perfectly normal lines of code.\
    \ Those are called “false-positives” and must be reported to make the tool better\
    \ and even more trustworthy.\n\nFor all these reasons, static analysis tools must\
    \ not fail your build but that does not mean they are not helpful: once again\
    \ there is no silver bullet, but none of the tools we’ve shown so far actually\
    \ are.\n\nLet’s perform a simple static analysis on the code we wrote for the\
    \ `Github Jobs` for `iOS` application.\n\nFor now, you will only need the command\
    \ line.\n\n### Performing a simple static analysis using clang\n\n`Clang` comes\
    \ as one of the developer tools provided by `Xcode` command line utilities that\
    \ you’ve already installed, either because you needed things like the `make` command\
    \ to be able to install `homebrew` or simply because we nicely asked you to in\
    \ the chapter about command line. However, it does not come with the static-analysis\
    \ tool, you’ll have to download it manually.\n\nThere is a dedicated section about\
    \ the `Clang`-based static analyzing tool available at\n\n[http://clang-analyzer.llvm.org/](http://clang-analyzer.llvm.org/).\
    \ Navigate to this website to download the latest binary available. At the time\
    \ we are writing this book, the latest release is the #276, which was released\
    \ on February 19, 2014.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    **CHAPTER 10: Quality assurance**\n\n**185**\n\nDownload and decompress this archive\
    \ to the folder of your choice (we are putting it into the `Tools` folder). This\
    \ is where you will find the `scan-build` binary that runs the actual analysis.\n\
    \n```\n$ cd ~/Tools\n$ curl -O http://clang-analyzer.llvm.org/downloads/checker-276.tar.bz2\n\
    $ tar -zxvf checker-276.tar.bz2\n$ cd checker-276\n$ ./scan-buid –h\nUSAGE: scan-build\
    \ [options] <build command> [build options]\nANALYZER BUILD: checker-276 (2014-02-18\
    \ 22:53:01)\n...\n```\n\nYou must think of the `scan-build` command as some kind\
    \ of proxy because of the way it works. The simplest use of this command would\
    \ be `scan-build xcodebuild`. It would build the application and use the output\
    \ of the `xcodebuild` command to know which files to analyze. You probably know\
    \ the command to build the application from the command line by heart by now.\
    \ Simply call `scan-build` at the beginning of that command. Before you do, you\
    \ should add the `~/Tools/checker-276` folder in your `PATH` environment variable\
    \ to make things easier for you. We are keeping the full path in the command for\
    \ now for the sake of the exercise. This command will run as expected, you will\
    \ only see `scan-build`-related instructions before and after the `xcodebuild`\
    \ one.\n\n```\n$ ~/Tools/checker-276/scan-build xcodebuild -workspace Github\\\
    \ Jobs.xcworkspace -scheme Github\\ Jobs clean build\nscan-build: Using '/Users/Palleas/Tools/checker-276/bin/clang'\
    \ for static analysis\nBuild settings from command line:\n    CLANG_ANALYZER_EXEC\
    \ = /Users/Palleas/Tools/checker-276/bin/clang\n    CLANG_ANALYZER_OTHER_FLAGS\
    \ =\n    CLANG_ANALYZER_OUTPUT = plist-html\n    CLANG_ANALYZER_OUTPUT_DIR = /var/folders/1v/d8vqkw8x23ndw49f5vs3fzw00000gn/T/scan-\n\
