    to the “Github Jobs for iOS” configure section. If you remember what we’ve implemented
    so far, our job calls the build script we wrote earlier that takes care of everything.
    It also retrieves the generated IPA at the end of the build, and uploads them
    to Testflight. That’s already a pretty decent installation but we want more feedback.
    Now, we also want our tests to be run.


    Our build script already takes care of installing the dependencies and because
    Jenkins doesn’t have multiple jobs for one plan like Bamboo, we will simply run
    our test suite after the step that builds and package the application. To do that,
    add an “Execute shell” build action and in the command field, enter the command
    we’ve been perfecting earlier:


    $ xcodebuild -workspace Github\ Jobs.xcworkspace -scheme "Github Jobs" -sdk iphonesimulator7.1


    clean test | xcpretty -t –r junit && exit ${PIPESTATUS[0]}


    Then, scroll down to the post-build actions, click on “Add post-build action”
    and select “Publish JUnit test result report”. We already know that the default
    path to the exported JUnit result report is “build/reports/junit.xml” so fill
    in the “Test report XML” field with “**/build/reports/junit.xml” and press “Save”.


    Before you start the build, update the PCSJobOffer class to make sure the test
    won’t pass. You can use the small change we made earlier to fail the test when
    we hardcoded the content of the title property to “No job title for you!” Commit
    that change, push this commit to your remote repository and start the build on
    Jenkins. If everything worked as expected, the build should have failed.


    This means that when your test won’t pass, the whole build will be marked as failed.
    In our case we are bundling everything into one simple build, because the project
    we are working on is super simple. If you want to split the part that runs the
    tests from the part that builds the application and sends it to the testers, feel
    free to do so. All you need to do is create a new Jenkins job!


