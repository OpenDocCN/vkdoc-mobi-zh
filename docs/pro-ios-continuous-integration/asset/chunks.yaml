    **CHAPTER 6: Automated builds with Bamboo**


    **95**


    If everything worked as expected, you should see the final “server startup in…”
    message. If you didn’t get this message but an error, check that Java is properly
    installed running the following command:


    $ java -version


    java version "1.7.0_25"


    Java(TM) SE Runtime Environment (build 1.7.0_25-b15)


    Java HotSpot(TM) 64-Bit Server VM (build 23.25-b01, mixed mode)


    If Java is properly installed but Bamboo still isn’t starting on your computer,
    you can always contact Atlassian and get someone to help you with the setup. In
    fact, that is one of the advantages of working with a paying product: technical
    support.


    Before we jump to the browser and open the bamboo website we’ve just bootstrapped
    (available at http://localhost:8085), we need to specify Bamboo’s “home” directory
    (Jenkins simply chose to use ~/.jenkins). Open the bamboo-init.properties file
    in the /WEB-INF/classes/ folder and look for the commented like containing “Bamboo.home”.
    Uncomment it and enter the path to the directory where you want all your data
    to be stored. Let’s use “.bamboo”, so the “.jenkins” home folder doesn’t feel
    lonely.


    bamboo.home=/Users/Palleas/.bamboo


    If you’re not sure of the directory yet, you will be pleased to know that you
    can use yet another environment variable:


    $ BAMBOO_HOME=/Users/Palleas/.bamboo bin/start-bamboo.sh –fg


    What’s important here is the -fg argument that stands for “foreground” meaning
    that bamboo will be run in the foreground so you can play with it and stop it
    whenever you like. Note that if you don’t use it, there is a stop-bamboo.sh script
    for you to use to kill a Bamboo instance running in the background.


    Open your browser and visit the http://localhost:8085 URL, you should see a form
    with a big textarea, that is where the fun begins. Even for demonstration purposes,
    you need to enter a license key that will expire in 30 days. You can ask for a
    license by clicking on the “contact Atlassian” link that is under the textarea
    and following a few steps, like creating an Atlassian account. Once that’s done,
    paste the license key in the textarea, as shown in Figure [6-1](#index_split_001.html#p98),
    and get ready to press “Express installation”.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 63](index-98_1.jpg)


    **96**


    **CHAPTER 6: Automated builds with Bamboo**


    ***Figure 6-1.** Setting up a Bamboo installation using an evaluation license
    key* Bamboo comes with two different installations, but we will be using the express
    one that doesn’t need you to install a MySQL database and things like that. Instead,
    the express installation will setup a simpler database stored in files in your
    BAMBOO_HOME directory.


    Press the “Express installation” button. You will be taken to a page where you
    will fill the administrator’s credentials and then to your Bamboo installation’s
    homepage. Congratulations, your Bamboo installation is ready!


    Getting ready for production use


    Right now we are only playing with Bamboo to give you a tour and show you what
    it can do, but don’t worry. The embedded database can easily be migrated to a
    more permanent engine such as MySQL, as shown on the following page: [https://confluence.atlassian.com/display/BAMBOO/](https://confluence.atlassian.com/display/BAMBOO/MySQL+5.1)


    [MySQL+5.1. Plus, your data won’](https://confluence.atlassian.com/display/BAMBOO/MySQL+5.1)t
    be lost if the trial expires, you will simply not be able to build your application,
    nothing that won’t be solved by purchasing a permanent license.


    Now that you know that nothing will prevent you from pushing it to production,
    let’s take a look around and see how Bamboo works.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 64](index-99_1.jpg)


    **CHAPTER 6: Automated builds with Bamboo**


    **97**


    Having a look around: a different approach than Jenkins


    Bamboo chose a slightly different approach when it comes to builds. There is in
    fact some kind of hierarchy where “Plans” are the root level. Click on the big
    blue “Create” button and select “create a new plan”. In the form that appears,
    fill in “Project name” with “Github Jobs” and “Plan name” with


    “iOS application”, as shown in Figure [6-2\. If you look closely at the form,
    you will notice that ther](#index_split_001.html#p99)e is actually an upper hierarchy
    level: projects. In fact, if you try to create a new plan, let’s say one to build
    the Android version, you will be able to choose the Github Jobs project from a
    list. This a neat feature because with the proper credentials, you can give access
    to all the plans of a project to the members of your team.


    ***Figure 6-2.** Creating a new plan and implicitly creating a new project as
    well* Once this is done, scroll down to the next section where Bamboo wants to
    know where the code will come from, in our case that would be Github but Bamboo
    also supports Stash and Bitbucket – both Atlassian products – and raw repositories
    for the Git, CVS, Subversion, Perforce, and Mercurial systems.'
  trans: '

    让我们开始吧，从 Atlassian 试用页面（地址：`https://www.atlassian.com/software/bamboo/try/`）下载
    Bamboo 的试用版。点击“下载”部分的“Start My Free Trial”按钮。与大多数 Atlassian 产品一样，Bamboo 也提供“OnDemand”解决方案，使您可以访问其云版本。如果您选择继续使用
    Jenkins，也可以获得类似的解决方案。例如，`Cloudbees`（`http://www.cloudbees.com`）是一个专注于 Java 的云平台，提供诸如在云端安装
    Jenkins 等多种服务。虽然这些解决方案具有将开发人员和系统管理员的工作交给真正喜欢它的人的优势，但它们通常比自托管解决方案贵得多。


    点击“Start my free trial”按钮后，复制 `tar.gz` 链接，我们将在下一节中使用它。


    ## 使用命令行安装 Bamboo


    与 Jenkins 一样，Bamboo 的出色之处在于它开箱即用。您只需下载存档文件，然后运行正确的命令即可。在我们的示例中，需要使用 `tar` 解压存档，并使用带有正确参数的一个简单
    `bash` 脚本让 Bamboo 在前台运行。


    ```bash

    $ mkdir ~/Bamboo

    $ curl –L http://www.atlassian.com/software/bamboo/downloads/binary/atlassian-bamboo-5.5.0.tar.gz
    -O

    $ tar -zxvf atlassian-bamboo-5.5.0.tar.gz

    $ cd atlassian-bamboo-5.5.0

    $ bin/start-bamboo.sh –fg

    ```


    服务器启动日志位于 `/Users/Palleas/Bamboo/atlassian-bamboo-5.5.0/logs/catalina.out`。Bamboo
    独立版版本：5.5.0。检测 JVM PermGen 支持… PermGen 开关已支持。设置为 256m。


    如果您在启动或停止 Bamboo 独立版时遇到问题，请参阅位于 `https://confluence.atlassian.com/display/BAMBOO/Bamboo+installation+guide`
    的故障排除指南。


    ```

    Using CATALINA_BASE:   /Users/Palleas/Projects/Apress/Bamboo/atlassian-bamboo-5.5.0

    Using CATALINA_HOME:   /Users/Palleas/Projects/Apress/Bamboo/atlassian-bamboo-5.5.0

    Using CATALINA_TMPDIR: /Users/Palleas/Projects/Apress/Bamboo/atlassian-bamboo-5.5.0/temp

    Using JRE_HOME:        /Library/Java/JavaVirtualMachines/jdk1.7.0_25.jdk/Contents/Home

    Using CLASSPATH:       /Users/Palleas/Projects/Apress/Bamboo/atlassian-bamboo-5.5.0/bin/bootstrap.jar:/Users/Palleas/Projects/Apress/Bamboo/atlassian-bamboo-5.5.0/bin/tomcat-juli.jar

    May 05, 2014 7:26:38 PM org.apache.catalina.core.AprLifecycleListener init

    ...

    INFO: Server startup in 13062 ms

    ```


    如果一切按预期进行，您应该会看到最后的“Server startup in…”消息。如果没有看到此消息而是看到了错误，请运行以下命令检查 Java 是否正确安装：


    ```bash

    $ java -version

    java version "1.7.0_25"

    Java(TM) SE Runtime Environment (build 1.7.0_25-b15)

    Java HotSpot(TM) 64-Bit Server VM (build 23.25-b01, mixed mode)

    ```


    如果 Java 已正确安装，但 Bamboo 仍未在您的计算机上启动，您可以随时联系 Atlassian 以获得设置帮助。事实上，这是使用付费产品的好处之一：技术支持。


    在跳转到浏览器并打开我们刚刚启动的 Bamboo 网站（可在 `http://localhost:8085` 访问）之前，我们需要指定 Bamboo 的“home”目录（Jenkins
    仅仅选择使用 `~/.jenkins`）。打开 `/WEB-INF/classes/` 文件夹中的 `bamboo-init.properties` 文件，找到包含
    `Bamboo.home` 的注释行。取消注释并输入您希望存储所有数据的目标目录路径。我们使用 `.bamboo`，这样 `.jenkins` 主目录就不会感到孤单。


    ```

    bamboo.home=/Users/Palleas/.bamboo

    ```


    如果您还不确定该目录，您会很高兴地知道，您还可以使用另一个环境变量：


    ```bash

    $ BAMBOO_HOME=/Users/Palleas/.bamboo bin/start-bamboo.sh –fg

    ```


    这里重要的是 `-fg` 参数，它代表“前台”（foreground），意味着 Bamboo 将在前台运行，以便您可以操作它并随时停止它。请注意，如果您不使用此参数，可以使用
    `stop-bamboo.sh` 脚本来终止在后台运行的 Bamboo 实例。


    打开浏览器并访问 `http://localhost:8085` URL，您应该会看到一个带有大文本区域的表单，这就是乐趣的开始。即使出于演示目的，您也需要输入一个将在
    30 天后过期的许可证密钥。您可以通过单击文本区域下方的“contact Atlassian”链接并按照几个步骤（例如创建 Atlassian 账户）来申请许可证。完成后，将许可证密钥粘贴到文本区域中，如图
    6-1 所示，然后准备按下“Express installation”。


    **图 6-1.** 使用评估许可证密钥设置 Bamboo 安装


    Bamboo 提供两种不同的安装方式，但我们将使用快速安装，它不需要您安装 MySQL 数据库等。相反，快速安装将设置一个更简单的数据库，存储在您的 `BAMBOO_HOME`
    目录下的文件中。


    按下“Express installation”按钮。您将被带到一个页面，在其中填写管理员凭据，然后进入您的 Bamboo 安装主页。恭喜，您的 Bamboo
    安装已就绪！


    ## 为生产环境做准备


    现在我们只是在玩转 Bamboo，以便向您展示它的功能，但不用担心。嵌入式数据库可以轻松迁移到更持久的引擎（如 MySQL），如下页面所示：`https://confluence.atlassian.com/display/BAMBOO/MySQL+5.1`。此外，如果试用期过期，您的数据也不会丢失，您只是无法构建应用程序；购买永久许可证即可解决这个问题。


    既然您知道没有任何障碍阻止您将其推向生产环境，那么让我们四处看看，了解 Bamboo 是如何工作的。


    ## 环顾四周：与 Jenkins 不同的方法


    Bamboo 在构建方面选择了一种略有不同的方法。实际上，存在某种层次结构，其中“计划”是根级别。点击大大的蓝色“Create”按钮，选择“create a
    new plan”。在出现的表单中，将“Project name”填写为“Github Jobs”，将“Plan name”填写为“iOS application”，如图
    6-2 所示。如果您仔细观察该表单，您会注意到实际上有一个更高的层级：项目。事实上，如果您尝试创建一个新计划（例如，用于构建 Android 版本的计划），您将能够从列表中选择“Github
    Jobs”项目。这是一个简洁的功能，因为有了适当的凭据，您可以授予团队成员访问项目所有计划的权限。


    **图 6-2.** 创建一个新计划并同时隐式创建一个新项目


    完成此操作后，向下滚动到下一部分，Bamboo 希望知道代码的来源。在我们的示例中，这将是 Github，但 Bamboo 也支持 Stash 和 Bitbucket——两者都是
    Atlassian 产品——以及 Git、CVS、Subversion、Perforce 和 Mercurial 系统的原始仓库。

