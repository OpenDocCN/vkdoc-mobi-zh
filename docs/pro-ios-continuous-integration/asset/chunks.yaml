    **150** **CHAPTER 8: Day-to-day use of Xcode bots**


    ### Granting access to the remote repository on GitHub


    The next step of the configuration of this bot will search your working copy for
    a remote the server has access to. Unfortunately, it has access to none and you
    will get a warning, as shown in Figure [8-6.](#index_split_002.html#p151)


    ***Figure 8-6.** The server cannot reach the remote repository*


    This one is easy to fix, we simply need to find a way to give the server access
    to our repository and to do that, we have exactly two different options, depending
    on where the repository is hosted: give it a username and password or use an SSH
    key. We’ll go for the SSH key as our repository is stored on GitHub, a company
    that has succeeded at making SSH key management a breeze.


    Click on the `change` button on the right side of this warning and in the menu
    that appears, select “New SSH Key”. Leave “git” as the username and click on the
    little gear near the first few characters of the generated public key. In the
    menu that appears, select “copy” to store the public key in your pasteboard and
    add this public key to your account. Once it’s done, press `next`. It will check
    the credentials and if the key was added properly, a big green checkmark should
    confirm that the credentials have been verified.


    ### Configuring the Bot and getting feedback


    In the next window, select “Periodically” in the schedule combo box and make it
    a Daily build that will happen at 1 AM every day. Then, uncheck “Perform analyze
    action” and “Perform test section”: for now we only want to build the application
    like our continuous integration script has been doing in the past chapters. Finally,
    press “Next”.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 8: Day-to-day use of Xcode bots** **151**


    This last screen is pretty important. We mentioned earlier that an Xcode bot was
    a simple container of information about how and when to perform very specific
    actions. Well, this panel will also allow you to configure the things that should
    happen before and after these actions. The default configuration of this screen
    is to send mails to the committers in case of failure of the build or the analysis.
    These committers are identified by their name and e-mail every time a commit is
    made:


    ```

    $ git show 1e93f4d83499660e63fc9ec21cbd16803f7f4268

    commit 1e93f4d83499660e63fc9ec21cbd16803f7f4268

    Author: Romain Pouclet <palleas@gmail.com>

    Date: Sat May 31 18:38:52 2014 -0400

    Fix script and scheme and stuff

    ```


    This also means that if you decide to build an open-source library you found on
    GitHub via an Xcode Bot, the authors might get e-mails about failing builds. Think
    before you integrate!


    We’ll go back to this screen in a few moments so simply click the “Create” button
    and wait for the magic to happen. It is in fact an awesome feedback to start working
    in the morning and know right away if anything is wrong with the project.


    In the last screen, select both “committers” checkboxes so everyone who contributed
    to the project that is being built will be aware of the result of the nightly
    build.


    **warning/caution** For some reason, Xcode may not be able to automatically open
    the commit panel. If that’s the case, select `Source Control > Commit` and commit
    your changes manually. It is important if the scheme is not properly scheme, the
    Xcode service will not be able to build your application.


    When you’re ready, navigate to the log navigator, which is the last tab in Xcode’s
    file explorer.


    This is the panel where you’ll find a list of all the actions that we performed.
    If it hasn’t started already, right-click on your Bot and select the “Integrate
    Now” item so you can immediately see the results of your integration, which probably
    failed with an error related to your `Podfile`. Hang in there, we’ll fix it in
    the next section. First, let’s take a look at the feedback available directly
    in Xcode. The first section, as shown in Figure [8-7](#index_split_002.html#p153),
    sums up what happened during the build: the actual errors, the warnings, the results
    of the static analysis, and the results of the unit tests.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 94](index-153_1.jpg)


    ![Image 95](index-153_2.jpg)


    **152** **CHAPTER 8: Day-to-day use of Xcode bots**


    ***Figure 8-7.** The integration failed with three errors and one warning*


    Note that the issues visible on this figure are listed under an “Unresolved Issues”
    section. Because this is actually the first integration ever performed by this
    Bot, these issues are marked as new.


    The second section, as shown in Figure [8-8](#index_split_002.html#p153) shows
    the list of commits involved in an integration that happened later. When a new
    integration is performed, the bot will fetch the new commits on the remote repository.
    In case of build failed, you can easily see when the error might have been introduced.


    ***Figure 8-8.** The second section of the integration detail shows the list of
    committers involved*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 96](index-154_1.png)


    **CHAPTER 8: Day-to-day use of Xcode bots** **153**


    **Note** Git alone is capable of locating where a regression was introduced thanks
    to the `git bisect` command by performing a “binary” search. More information
    on this page:


    [http://git-scm.com/book/en/Git-Tools-Debugging-with-Git#Binary-Search](http://git-scm.com/book/en/Git-Tools-Debugging-with-Git#Binary-Search)


    Let’s have a look at why the integration is failing now. If you look at Figure
    [8-9,](#index_split_002.html#p154) you can see errors obviously related to Cocoapods:
    the `PodFile.lock` and the `Manifest.lock` files cannot be found, nor can the
    `xconfig` file and we are seeing an error about the sandbox not in sync.


    ***Figure 8-9.** The integration still fails for some reason related to CocoaPods*


    To understand this error, you must first remember what we mentioned in Chapter
    2, about all the tools at our disposal to setup our continuous integration platform.
    One of these tools was the “Run script build phases” that you can add to your
    build process and that will run arbitrary shell scripts.


    Navigate to the “build phases” tab from the details of the Github Jobs target,
    you should see a phase called “Check Pods Manifest.lock” running the following
    script:


    ```

    diff "${PODS_ROOT}/../Podfile.lock" "${PODS_ROOT}/Manifest.lock" > /dev/null

    if [[ $? != 0 ]] ; then

    cat << EOM

    error: The sandbox is not in sync with the Podfile.lock. Run ''pod install'' or
    update your CocoaPods installation.

    EOM

    exit 1

    fi

    ```


    This script uses the `PODS_ROOT`, a user-defined build setting that was added
    by CocoaPods the first time you ran the `pod install` command, to locate both
    `Podfile.lock` and `Manifest.lock` files. This file contains information about
    your dependencies, so that the next time you or one of the people working with
    you need to install the latest version of your project, the dependencies will
    be installed at the same versions. With the two paths to those files, it then
    uses the `diff` command to compare those files. If they don’t match, it means
    that the dependencies currently bundled with your project are not at the proper
    version. You fix this problem by running the `pod install` from your project’s
    directory.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


