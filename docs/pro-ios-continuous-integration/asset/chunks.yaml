    The main interface shows information about the latest integration and the next
    one to happen, as well as a list of the latest available download. Beneath these
    blocks is the list of all the currently existing bots with their status and the
    time of the latest integration. Click on the name of your Bot from this list to
    show more details.


    The web interface is very similar to what we’ve seen in `Xcode`, as shown in Figure
