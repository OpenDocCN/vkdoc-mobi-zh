    \ of the job building the Github Jobs application, with colors*\n\nGoing back\
    \ to the script we entered, the `$WORKSPACE` is yet another environment variable\
    \ provided by Jenkins for you to use in your build scripts. There are about 15\
    \ environment variables available to shell scripts that are listed at `http://localhost:8080/env-vars.html/`."
