- fmt: '`config.xml`导出文件非常易于理解，看起来很像遵循`NSCoding`协议的对象在`plist`中的表示形式。此功能也很方便，因为它允许您通过向同一URL发布更新后的`config.xml`来更新任务。


    使用Jenkins REST API启用或禁用任务也同样简单，您只需向`/disable`和`/enable`端点发送POST请求即可。更有趣的是，您可以使用`/build`端点触发构建，但需要考虑到一些安全问题。


    在创建“Github for iOS”任务时，您可能已经注意到表单的“构建触发器”部分中有一个“远程触发构建”选项。如图[5-9](#index_split_001.html#p83)所示，该选项允许您添加一个身份验证令牌，用于保护对`/build`端点的调用。


    ```

    $ curl -v http://localhost:8080/job/Github%20Jobs%20for%20iOS/build?token=BewareMyToken

    ```


    ***图5-9.** 添加令牌以保护对HTTP端点的调用将触发构建* 不过，您不应该依赖此令牌，因为即使它在创建任务表单中仍然可用，它已被认为是弃用的，并可能在未来的Jenkins版本中被移除。相反，您应该像之前一直做的那样使用基本身份验证。


    ```

    $ curl -X POST -u romain.pouclet:pwd http://localhost:8080/job/Github%20Jobs%20for%20iOS/build

    ```

    如果构建被创建，响应结果应为“201 Created”状态码，并且`Location`头应包含刚刚在队列中创建的项的URL。队列是一个应该执行的任务列表。它拥有自己独立的API。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **第5章：使用Jenkins进行自动构建**


    拥有此API的最大好处在于，它使得通过脚本与Jenkins交互变得极其容易。我们将在“获取反馈”部分进一步讨论这一点。您应该记住的是，您现在知道了触发构建的两种方式：手动触发或通过调用HTTP
    URL触发。


    让我们继续！


    ## 命令行中的Jenkins


    如果HTTP REST API还没有让Jenkins足够“可入侵”，您还可以使用一个Jenkins命令行工具。它用Java编写，将以最简单的方式允许您执行不同的操作。要下载Jenkins命令行工具，只需访问您安装的`/cli`部分（例如`http://localhost:8080/cli`），然后获取JAR文件的URL。复制该URL并在终端中输入以下命令。首次使用命令行工具时，您会收到一条警告，提示无法进行身份验证。


    ```

    $ cd ~/Tools

    $ curl http://localhost:8080/jnlpJars/jenkins-cli.jar -O

    $ java -jar jenkins-cli.jar –s http://localhost:8080 who-am-i

    [WARN] Failed to authenticate with your SSH keys. Proceeding as anonymous

    ```


    这次，您将无法简单地输入登录名和密码来验证您的Jenkins安装，即使您可以向任何命令传递`--username`参数来提示输入密码。不推荐使用这种方法。您需要做的是将一个SSH公钥关联到您的个人资料，可在`/me/configure`URL处完成，或者点击屏幕右上角的您的名字，然后点击左侧菜单中的“Configure”链接。


    您可能已经在`~/.ssh`文件夹中有一个SSH公钥，但我们将使用之前生成用于与Github通信的那个密钥。检索存储在`~/Jenkins/Jenkins.key.pub`中的公钥内容，并将其粘贴到“SSH公钥”文本区域。按“保存”，返回终端，并使用`-i`选项重新运行之前的命令，该选项指定用于身份验证的私钥。


    ```

    $ java -jar jenkins-cli.jar -s http://localhost:8080 -i ~/Tools/jenkins.key who-am-i

    Authenticated as: romain.pouclet

    Authorities:

    authenticated

    ```


    当然，每次使用带有`-s`和`-i`选项的这个命令有点烦人，特别是如果您想多次使用它。如果使用存储在`~/.ssh/id_rsa[.pub]`（即`ssh-keygen`存储SSH密钥的默认路径）的密钥，则可以避免指定Identity文件。此外，服务器选项也不是问题，因为再次强调，您可以通过一个环境变量来省去此步骤，在这种情况下是`JENKINS_URL`环境变量，您只需声明一次即可。


    ```

    $ export JENKINS_URL=http://localhost:8080

    $ java -jar jenkins-cli.jar who-am-i

    Authenticated as: romain.pouclet

    Authorities:

    authenticated

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **第5章：使用Jenkins进行自动构建**


    与REST API一样，您可以导出任务的XML表示：


    ```

    $ java -jar jenkins-cli.jar get-job "Github Jobs for iOS"

    ```


    您可以启用/禁用一个任务：


    ```

    $ java –jar jenkins-cli.jar disable-job "Github Jobs for iOS"

    ```


    最后，您可以触发构建：


    ```

    $ java -jar jenkins-cli.jar build -w -s "Github Jobs for iOS"

    Started Github Jobs for iOS #29

    Completed Github Jobs for iOS #29 : SUCCESS

    ```


    如您所见，可以通过多种不同的方式与Jenkins进行通信，其中一些我们尚未涵盖。如果您不喜欢以`java –jar...`命令开头，也可以通过SSH直接与Jenkins通信。事实上，如果您查看对您的Jenkins主页安装进行HTTP调用返回的头部信息，您可以在响应中看到一些与SSH相关的头部，这些头部提供了SSH监听的主机和端口：


    ```

    $ curl -D - http://localhost:8080 -o /dev/null

    ...

    X-Jenkins-CLI-Port: 52722

    X-SSH-Endpoint: localhost:52716

    ...

    $ ssh -p 52716 romain.pouclet@localhost who-am-i

    Authenticated as: romain.pouclet

    Authorities:

    authenticated

    ```


    我们不会详细讨论Jenkins SSH端点，因为它与Jenkins CLI的工作方式非常相似。所有这些访问点都有一些明显的优势：HTTP使得从脚本自动执行操作变得非常容易，而命令行工具是与Jenkins手动交互的强大方式。CLI的明显优势是，无需在您希望与之交互的页面底部寻找“REST
    API”链接，即可获得所有可用命令的列表。


    重要的是要认识到，如果您还没有找到一种适合您需求的与Jenkins通信的方式，那么您很可能没有进行足够的探索。


    ## 获取反馈


    如果您忘记运行构建，那么拥有一个构建应用程序的持续集成平台是毫无用处的，这就是为什么您的平台需要为您处理这部分工作的原因。大多数仓库托管服务都带有钩子，一旦您将新的提交推送到远程仓库，这些钩子就可以调用一个URL。您也可以决定每天在10点自动构建您的`master`分支，并创建所谓的“夜间构建”。重要的是保持您的任务健康报告有意义。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 55](index-86_1.png)

    ![Image 56](index-86_2.jpg)


    **第5章：使用Jenkins进行自动构建**


    对于您创建的每个任务，Jenkins都会根据最近几次构建的结果计算一份健康报告，并用一个小天气图标来表示。如图[5-10](#index_split_001.html#p86)所示，我们的项目运行良好，因为它是一个简单的项目，没有任何理由构建失败。'
  raw: 'The config.xml export file is pretty simple to understand and looks a lot
    like the plist representation of an Objective-C object conforming to the NSCoding
    protocol. This feature is also convenient because it will allow you to update
    a job by posting an updated config.xml to the same URL.


    Enabling or disabling a job is just as easy with the Jenkins REST API, all you
    need to do is send a POST request to the /disable and /enable endpoint. What is
    even more interesting is that you can trigger a build using the /build endpoint,
    but there are some security issues that you may want to take into account.


    When you created the Github for iOS job, you may have noticed a “Trigger Builds
    Remotely” option in the “Build Triggers” section of the form. This option, as
    shown in Figure [5-9](#index_split_001.html#p83), allows you to add an authentication
    token that will be used to secure a call to /build endpoint.


    $ curl -v http://localhost:8080/job/Github%20Jobs%20for%20iOS/build?token=BewareMyToken


    ***Figure 5-9.** Adding a token to secure a call to the HTTP endpoint will trigger
    a build* You shouldn’t rely on this token though, because even if it is still
    available in the job creation form, it is considered deprecated and may be removed
    in future releases of Jenkins. Instead, you should use the basic authentication
    just like you’ve been doing so far.


    $ curl -X POST -u romain.pouclet:pwd http://localhost:8080/job/Github%20Jobs%20for%20iOS/build
    If the build was created, the result should be a response with a “201 Created”
    status code and the


    “Location" header should contain the URL of the item that was just created in
    the queue. The queue is a list of jobs that should be performed. It comes with
    its own separate API.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **82**


    **CHAPTER 5: Automatic Builds with Jenkins**


    The great part about having this API around is that it makes it super easy to
    interact with Jenkins using a script. We will talk a little more about in the
    “Getting feedback” section. What you should remember is that you’re now aware
    of a way to trigger the build: manually or calling an HTTP URL.


    Let’s keep going!


    Jenkins from the Command Line


    If the HTTP REST API didn’t make Jenkins “hackable” enough for you, you can also
    use a command line tool for Jenkins. Written in Java, it will allow you to perform
    different operations in the simplest approach. To download the Jenkins command
    line tool, simply visit the “/cli” section of your installation (which would give
    you something like http://localhost:8080/cli) and retrieve the URL


    to the JAR file. Copy the URL and enter the following commands in your terminal.
    The first time you will use the command line tool, you will get a warning saying
    you cannot be authenticated.


    $ cd ~/Tools


    $ curl http://localhost:8080/jnlpJars/jenkins-cli.jar -O


    $ java -jar jenkins-cli.jar –s http://localhost:8080 who-am-i


    [WARN] Failed to authenticate with your SSH keys. Proceeding as anonymous


    This time, you won’t be able to simply enter a login and password to authenticate
    against your Jenkins installation, even if you can pass a --username argument
    to any command to have your password prompted. This method is not recommended.
    What you need instead is to associate a SSH public key to your profile, available
    at the “/me/configure” URL, or by clicking on your name at the top right of screen
    and then click the Configure link in the left menu.


    You probably already have a SSH public key stored in your ~/.ssh folder, but we
    will use the one we generated earlier to communicate with Github. Retrieve the
    content of the public key stored at ~/


    Jenkins/Jenkins.key.pub and paste it to the “SSH Public Keys” text area. Press
    Save, go back to your terminal, and re-run the previous command with the –i option
    that specifies the private key to use for authentication.


    $ java -jar jenkins-cli.jar -s http://localhost:8080 -i ~/Tools/jenkins.key who-am-i
    Authenticated as: romain.pouclet


    Authorities:


    authenticated


    Of course, using this command with the -s and -i options is a bit annoying, especially
    if you want to use it multiple times. You can avoid having to specify the Identity
    file if you use the one stored at ~/.ssh/id_rsa[.pub], which is the default path
    where ssh-keygen will store the SSH key. Plus, the server option is also a non-issue
    since, once again, you will be saved by an environment variable, in this situation,
    the JENKINS_URL environment variable, which you only have to declare once.


    $ export JENKINS_URL=http://localhost:8080


    $ java -jar jenkins-cli.jar who-am-i


    Authenticated as: romain.pouclet


    Authorities:


    authenticated


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 5: Automatic Builds with Jenkins**


    **83**


    Just like the REST API, you can export the XML representation of a job:


    $ java -jar jenkins-cli.jar get-job "Github Jobs for iOS"


    You can enable/disable a job:


    $ java –jar jenkins-cli.jar disable-job “Github Jobs for iOS”


    And, finally, you can trigger a build:


    $ java -jar jenkins-cli.jar build -w -s "Github Jobs for iOS"


    Started Github Jobs for iOS #29


    Completed Github Jobs for iOS #29 : SUCCESS


    As you can see, communicating with Jenkins can be done through multiple different
    ways, some of which we haven’t covered yet. If you don’t like starting your command
    with the java –jar...


    command, it is also possible to communicate with Jenkins directly via SSH. In
    fact, if you look at the headers returned by an HTTP call to your installation
    of Jenkins’s homepage, you can see some SSH-related headers in the response that
    gives you the host and the port on which SSH is listening: $ curl -D - http://localhost:8080
    -o /dev/null


    ...


    X-Jenkins-CLI-Port: 52722


    X-SSH-Endpoint: localhost:52716


    ...


    $ ssh -p 52716 romain.pouclet@localhost who-am-i


    Authenticated as: romain.pouclet


    Authorities:


    authenticated


    We won’t be covering the Jenkins SSH endpoint in detail since it is very similar
    to the way the Jenkins CLI works. There are some obvious advantages for all these
    access points: HTTP makes it very easy to automate things from scripts and command
    line tools are powerful ways of communicating with Jenkins manually. The obvious
    advantage of the CLI is having a list of all the available commands without having
    to looking for the “REST API” links at the bottom of the pages you’d like to interact
    with.


    What’s important to realize is that if you haven’t found a way to communicate
    with Jenkins that suits your needs, you probably haven’t looked hard enough.


    Getting Feedback


    Having a continuous integration platform that builds your application is useless
    if you forget to run the build, that’s why your platform needs to take care of
    that part for you. Most repository hosting services come with hooks that can call
    a URL as soon as you’ve pushed new commits to your remote repository. You can
    also decide to automatically build your master branch every day at 10


    o’clock and create what’s called a nightly build. What’s important is to keep
    your job’s health report meaningful.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 55](index-86_1.png)


    ![Image 56](index-86_2.jpg)


    **84**


    **CHAPTER 5: Automatic Builds with Jenkins**


    For every job that you create, Jenkins calculates a health report based on the
    result of the few latest builds and represents it with a little weather icon.
    As you can see in Figure [5-10, our pr](#index_split_001.html#p86)oject is doing
    great since it’s a simple project that has no reason whatsoever not to build successfully.'
