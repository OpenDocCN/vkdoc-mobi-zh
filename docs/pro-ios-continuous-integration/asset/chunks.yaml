    **139**


    **总结**


    在2014年WWDC上，苹果公司宣布了他们在收购TestFlight背后的公司后的计划。内部测试团队、面向多达一千名用户的Beta分发、崩溃报告以及用户反馈都在计划任务之中。在撰写本书时，这些功能大多仍处于测试阶段，并且将仅限于iOS
    8。其他一些功能，如崩溃报告，预计将在2015年晚些时候发布。你还不能指望这些解决方案现在就完美无缺，但大多数开发者对此感到非常高兴。关键在于，你已经基本了解了整个运作机制，从使用现有的分发平台到开发自己的平台。


    本章主要讨论的是无线部署。我们向你介绍（或再次介绍）了一个非常著名的解决方案——TestFlight，它最近被苹果收购。这个解决方案非常强大，因为它能帮助你管理应用和多个用户团队，从而让你可以轻松地发送应用的Beta版本。我们向你展示了如何使用命令行将这些构建版本发送到TestFlight，甚至可以在构建过程结束时，使用你偏好的持续集成平台自动完成此操作。


    在了解了持续集成平台之后，你已经准备好探索苹果去年发布的一个新工具：Xcode Bots。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **第8章**


    **Xcode Bots的日常使用**


    我们在第一章中提到，本书将像一次旅程。我们从介绍你手头的工具开始，然后使用多个平台构建了一个简单但功能强大的持续集成架构。到现在，我们希望你已经能在Jenkins和Bamboo之间做出选择。但如果你还没下定决心，这一章可能会让决策过程更加困难。


    之前的章节涵盖了苹果公司不太关注持续集成时期的工具。幸运的是，聪明的人们找到了将现有工具适配到新技术的方法。借助Jenkins和Bamboo，你应该能构建出相当不错的持续集成架构。


    Xcode 5的发布不仅让你得以一窥OS X 10.10可能的样子，并让你可以无痛地合并故事板文件。它还带来了你可以使用的重要改进：OS X Server的Xcode服务和Xcode
    Bots。当然，它并不完美——我们还没发现哪个苹果开发者工具从第一天起就是完美的。有些人会说苹果不在乎，但我们认同那些认为他们确实在乎的人。Xcode Bots在宣布的那一天就大受欢迎。然而，在2014年WWDC上，苹果宣布了一系列变更和改进，使得Xcode
    Bots成为了iOS和OS X开发者必备的工具。


    我们将先简要说明为什么需要关注又一个持续集成工具，然后介绍OS X Server，并附带一点苹果公司的历史。接着，我们将介绍Xcode 5，以及如何将其与OS
    X Server集成以管理我们的`git`仓库，并创建漂亮的新Bot。最后，我们将使用这个Bot每晚构建`Github Jobs for iOS`应用，并观察它如何与一个非官方支持的第三方工具——Cocoapods协同工作。


    **为什么还需要另一个持续集成工具？**


    在我们介绍了如何搭建Jenkins和Bamboo这两个持续集成平台之后，我们通过涵盖一个不同的主题（无线应用部署）而有点打断了流程。现在，你可能会疑惑为什么我们还需要另一个持续集成平台，因为仅凭目前所知的一切，已经足以自动构建和部署一个应用了。


    **141**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


