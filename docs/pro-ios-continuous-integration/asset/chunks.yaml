    **CHAPTER 2: Continuous integration features in iOS and Xcode**


    **19**


    ***Figure 2-7.** Fetching the jobs shows a spinning animation and getting the
    results shows a confirmation message* Installing dependencies using CocoaPods
    creates two things in addition to the generated PodFile: a **Podfile.lock** managing
    the state of the dependencies in the project and a Pods folder containing the
    actual dependencies. It’s really a hot debate in the community, but automation
    has been created for a reason and we strongly suggest you ignore this folder by
    adding “Pods” to your “.gitignore” file: create a .gitignore file at the root
    of the directory where you created your project, and add “Pods.”


    This folder will be ignored and Git will not try to commit it when your dependencies
    change, for example because you’ve switched to a more recent version.


    **About “.gitignore” files** A gitignore file specifies a pattern of files that
    Git should ignore. If you don’t have one already, which is total y possible considering
    Xcode doesn’t generate one automatical y, grab the one available on GitHub: [https://github.com/github/gitignore/blob/master/Global/Xcode.gitignore.](https://github.com/github/gitignore/blob/master/Global/Xcode.gitignore)


    Why Have We Done All This?


    We now have an application up and running. It’s not pretty and probably not very
    useful, but we will be able to use it in the remaining chapters of this book as
    an example. If you are interested in the complete application, it is available
    at the following URL: [https://github.com/palleas/github-jobs.](https://github.com/palleas/github-jobs)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **20**


    **CHAPTER 2: Continuous integration features in iOS and Xcode**


    Getting Ready to Release the Application


    During the lifecycle of a project, there will be multiple versions of the application.
    First, there will be the one you are developing on your computer that will run
    in your iOS simulator or on one of your testing devices. Then, there will be one
    that will be used by your QA team that will review the latest features you’ve
    implemented and the bug you’ve fixed. Once this is done, there will be a version
    of your application that you will send to your client. This is the final step
    before pushing the application on the official App Store. Finally, there will
    be the production-ready application, once the client is satisfied with the version
    that you have sent. All of these versions will have specificities.


    For example, you may not be showing the same level of information when an error
    occurs in the application. Also, you won’t probably have your application crash
    because of a failing assertion in your code. This multiple-configuration is easily
    achievable thanks to Xcode.


    Of course, this is not the way it has to work; you may be an independent iOS developer
    and/or may not have a QA team at your disposal. We will make it easier for everybody
    and only have three levels of configuration:


     Debug: the level of configuration you will use when you are working on the


    application. It may crash from time to time when you are misusing some code


    and display a lot of information when errors occur. Debugging tools such as the


    [awesome Reveal (http://revealapp.com](http://revealapp.com/)) or libraries relaying
    on private APIs may be linked with your application in this configuration.


     Adhoc: this is the configuration used by the version you will send to your QA


    team and/or your client. The debug and development tools are gone and the


    error messages are much more user-friendly. It may be linked with a crash log


    reporter to ease the back and forth with your client, for example.


     Release: this will be the configuration used by your application when it goes
    live on the store.


    Go back to your Xcode project, select the top-level element in the file explorer,
    and make sure the


    “Github Jobs” item in the Project section is selected. If you take a look at what’s
    on the screen, you will see that Xcode already provides you two different configuration
    levels, as shown in Figure [2-8](#index_split_000.html#p25).'
