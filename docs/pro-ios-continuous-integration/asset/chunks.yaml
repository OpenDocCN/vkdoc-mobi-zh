    Now that we know that `xcodebuild` returns a non-zero status code at the end of
    a failed build, let’s throw some `xcpretty` in to the mix and see what happens:


    ```

    $ xcodebuild -workspace Github\ Jobs.xcworkspace -scheme "Github Jobs" -sdk iphonesimulator7.1

    clean test | xcpretty -t


    ...


    ** TEST FAILED **


    $ echo "Exit code was $?"

    Exit code was 0

    ```


    What happened here is really simple: when you use pipes in a command line execution,
    the final exit code is actually the one from the piped command, as it’s the last
    command that was executed. Not being able to retrieve the exit code from `xcodebuild`
    would have prevented us from using `xcpretty` at all, but fortunately bash comes
    with yet another super useful internal variable named `PIPESTATUS`.


    According to the documentation, this variable is an “Array variable holding exit
    status(es) of last executed foreground pipe.” This means that in our case, the
    exit status of the `xcodebuild` command is the first element of this array and
    can be retrieved like this.


    ```

    $ xcodebuild -workspace Github\ Jobs.xcworkspace -scheme "Github Jobs" -sdk iphonesimulator7.1

    clean test | xcpretty -t


    ...


    ** TEST FAILED **


    $ echo "xcodebuild exit code was ${PIPESTATUS[0]}"

    xcodebuild exit code was 65

    ```


    Finally, all we need to do is make sure that the exit value is always the one
    returned by the execution of `xcodebuild` and this can be done using `exit`, a
    command that, well, exits the current shell with the status code provided as the
    first argument, like this:


    ```

    $ xcodebuild -workspace Github\ Jobs.xcworkspace -scheme "Github Jobs" -sdk iphonesimulator7.1

    clean test | xcpretty -t && exit ${PIPESTATUS[0]}

    ```


    We finally have the perfect command to execute during the test from our continuous
    integration test installation but that is not enough. Indeed, when a test run
    fails, we want to know which test case failed specifically, or this feedback will
    be meaningless. Of course, you could simply look at the log from the build once
    in Jenkins or Bamboo, but your time would be better used looking for the piece
    of code causing the test to fail. What you actually need is to be able to look
    at the build and have a direct look at the test result. To do that, you need to
    export the result of your test suite into a format understandable by your continuous
    integration platform. Fortunately for us, the Java community solved this problem
    a while ago, when JUnit – a unit testing framework for the java programming language
    – was first integrated into a continuous integration platform. Even better, `xcpretty`
    is capable of generating this report for us.


    ```

    $ xcodebuild -workspace Github\ Jobs.xcworkspace -scheme "Github Jobs" -sdk iphonesimulator7.1

    clean test | xcpretty -t -r junit && exit ${PIPESTATUS[0]}

    ```


