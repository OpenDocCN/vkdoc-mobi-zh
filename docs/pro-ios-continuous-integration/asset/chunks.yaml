    ,\n  \"rel\": \"self\"\n},\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 6: Automated builds with Bamboo\n\n**107**\n\n```json\n{\n  \"name\"\
    : \"Github Jobs - iOS application\",\n  \"planKey\": {\n    \"key\": \"GJ-IA\"\
    \n  },\n  \"shortKey\": \"IA\",\n  \"shortName\": \"iOS application\",\n  \"type\"\
    : \"chain\"\n},\n\"planResultKey\": {\n  \"entityKey\": {\n    \"key\": \"GJ-IA\"\
    \n  },\n  \"key\": \"GJ-IA-33\",\n  \"resultNumber\": 33\n},\n\"state\": \"Successful\"\
    \n```\n\n```json\n],\n\"size\": 1,\n\"start-index\": 0\n```\n\nThis is one of\
    \ many resources available via the API, among with the Project, Build, Report,\
    \ Queue, Label, and Server information services. Bamboo is much younger than Jenkins:\
    \ the first stable version that was made public, is barely 4 years old. At that\
    \ time, CruiseControl’s market share was a lot less important than it was when\
    \ Jenkins was first released. That is probably why Bamboo doesn’t come with the\
    \ semi-standard `cc.xml` file that you can use to display the status of your projects\
    \ in third-party clients like CCMenu ([http://ccmenu.org](http://ccmenu.org/)).\n\
    \nHowever, Bamboo does come with a wallboard module that will display the status\
    \ of your projects in a very similar style to the wallboard Jenkins plugin we\
    \ installed in the previous chapter.\n\n### Wallboards\n\nIf we were to add new\
