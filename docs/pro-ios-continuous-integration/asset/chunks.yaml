    **CHAPTER 6: Automated builds with Bamboo**


    Now that the plan has been created, let’s take a moment to understand what a plan
    actually is.


    When you are trying to build an application with sources that are contained in
    a repository, a plan will be associated to that repository. It can contain multiple
    jobs, which correspond to a list of instructions to build a project, including
    the default job that was created when you created the plan.


    It also contains the instructions about how and when the build should be triggered,
    who should be notified of the builds’ results, and who is allowed to access a
    plan and its jobs.


    Extending Bamboo


    Just like Jenkins, it is possible to extend Bamboo with plugins, here called “Add-ons”.


    The easiest way to look for available add-ons is to go to the Atlassian marketplace
    on


    [https://marketplace.atlassian.com, wher](https://marketplace.atlassian.com/)e
    people can sell their plugins or give them for free.


    What’s important here is that you have a centralized list of al the plugins, which
    is also available from the “Manage Add-ons” section of your bamboo instal ation.
    Let’s instal a plugin to support Xcode project building.


    Fill in the search field with “Xcode” and press enter. You should have only one
    result for a free Add-on called “iOS, Cocoa and Xcode Support for Bamboo”. This
    plugin was created by the


    “Atlassian Labs” and will work for Bamboo 5.0\. At the time we are writing this,
    the stable version is 5.5.0\. This plugin is semi-official: it was created by
    Atlassian but isn’t formally supported. In fact, the latest version was released
    almost a year ago. Don’t worry, we are only installing the tool for the sake of
    example, we will actually be using the bash script we created in the previous
    chapter.


    Click on the plugin title and then click on “Get It Now” to download the plugin
    - which is simply a java archive (JAR) file – and go back to your bamboo installation.
    In the top-right menu shaped into a wheel, select Add-ons. Click on the “Upload
    add-on” link, browse to the folder where the Xcode add-on was downloaded and press
    Upload. If everything worked as expected, you should see something similar to
    the Figure [6-3](#index_split_001.html#p100).


    ***Figure 6-3.** The Xcode Add-on for Bamboo was successfully installed*


    That’s how easy it is to install Add-ons with Bamboo but just in case, let see
    if it actually worked and try to build the Github Jobs application. Remember that
    we’ve only created a build plan, which comes with a default build job that does…
    nothing.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 6: Automated builds with Bamboo**


    **99**


    Before we start tweaking our plan, you may be wondering why we made you install
    an add-on to build an Xcode project when you know we will end up using our script
    anyway. In the previous chapter, we installed a couple of plugins to render ANSI
    formatted output properly and mask the password from a build’s logs. Unfortunately,
    we won’t be able to do the same this time because adding custom variables, obfuscating
    the password, and formatting ANSI string are all features that come natively with
    a standard installation of Bamboo.


    From the “Build” top menu, select “All build plans” and then click on the iOS
    application plan in the list that should only contain one project. Then, in the
    top right “Actions” menu and select “Configure plan”. The “Stages” tab should
    be selected among an important list of tabs. We will cover a few of them later.
    The one that really interests us for now is indeed the “Stages” one.


    What’s a stage? They are simply groups of Jobs, adding a little bit more hierarchy
    into Bamboo.


    Every stage can contain multiple jobs that will be run in parallel, that would
    be useful for example to run unit and functional tests in parallel to save some
    time. Every stage represents a step within the build process. For now we will
    only need one: building the application.


    Configuration of the default job


    Click on the “Default job” in the “Default Stage”, you’ve reached the bottom:
    that is the lowest level in the hierarchy. This default stage will be the building
    step of our continuous integration process.


    If you remember correctly, what we want is: fetching the latest version of the
    project from the git repository, install the dependencies using Cocoapods and
    finally build and package the application.


    Contrary to the jobs contained in a Stage, steps in a job - actually called tasks
