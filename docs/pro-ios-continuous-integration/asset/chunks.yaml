  raw: 'Note that you can get the content of the private key to paste it into the
    form by using the following command:


    $ cat ~/Tools/jenkins.key | pbcopy


    Then, go to your Github profile and add your public key (the content of the Jenkins.key.pub
    file) to your profile. If you are wondering how to do that, look at the official
    Github documentation:


    [https://help.github.com/articles/generating-ssh-keys](https://help.github.com/articles/generating-ssh-keys).


    You should now be able to add the Git repository URL to the job configuration,
    as shown in Figure [5-6.](#index_split_001.html#p78)


    ***Figure 5-6.** Explicitly selecting the credentials allows Jenkins to communicate
    with the Git repository*


    “Build Triggers” is not really important right now, and we will only be launching
    jobs manually and will cover this section in detail later. The third part to a
    Jenkins job is actually the one that will interest us. It is not enough to simply
    give a repository of source code to Jenkins, but you have to explicitly tell it
    what the build will consist of.


    Building the Github Job Applications


    Fortunately for us, the Xcode plugin we’ve downloaded earlier makes it pretty
    easy to describe what building an Xcode project actually means.


    1\. In the “Build” section, click on the “Add Build Step” and select “Xcode”.


    2\. Expand the “Settings...” panel and enter “AdHoc” in the configuration field.


    If you are running Jenkins on your own computer because you are trying


    Jenkins, then you probably already meet the requirements of the code


    signing process – meaning that you already have the private key in your


    keychain and the provisioning profile.


    3\. Check the “Pack Application and Build IPA” checkbox. Expand the “Code


    signing & OS X keychain Options” section and check the “Unlock Keychain”


    checkbox. Even if the help section near where the “Keychain Path” says it


    will use a default value, fill “${HOME}/Library/Keychains/login.keychain” in


    the text field or it will not work.


    4\. Fill the “Keychain Password” field with your password and continue.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 52](index-79_1.jpg)


    **CHAPTER 5: Automatic Builds with Jenkins**


    **77**


    **Note** If you are running Jenkins on a brand new computer, like a fancy new
    Mac Mini you’ve just bought for your company, don’t worry, we will come back to
    the packaging process in a couple of sections.


    5\. If you remember correctly from the previous chapter, we are trying to build
    a


    workspace and using a scheme. Expand the “Advanced” section. Fil “Github


    Jobs” in the “Xcode Schema File” field and “Github Jobs” in the “Xcode


    Workspace File” field. Do not add the “.xcworkspace” extension or it wil look


    for a “Github Jobs.xcworkspace.xcworkspace” file and the build will fail.


    6\. Finally, set the “Build output directory” to “${WORKSPACE}/build”, where


    WORKSPACE is an environment variable available during the build that


    contains the path to the root directory of the project.


    You may have already guessed by now but the build won’t work as is because we
    did not add the project dependencies to the project’s repository. Click the “Add
    Build Step” one more time and select “Execute Shell” and drag the block that just
    appeared above the Xcode one. Fill “pod install”


    in the text area.


    That’s basically what our job will consist of for now: installing the dependencies
    and building and packaging the application. You can have as many build steps as
    you want, as long as you remember that they are run sequentially and that a failing
    step will fail the whole build, which makes sense when you think about it.


    Archiving the generated IPA


    The last part of a build is an optional list of post-build actions, which will
    be executed no matter what the results of the build. It can be pretty much anything,
    from generating and publishing documentation to archiving the results of a build.
    What we want in this situation is to keep track of the IPA files that were created
    during the build process.


    To do that, click on the “Add Post-Build Action” and select “Archive Artifacts”,
    and fill in the pattern of the file you’re expecting to be created during the
    build, in our case the files with the *.ipa file extension, as show in Figure
    [5-7.](#index_split_001.html#p79)


    ***Figure 5-7.** Asking Jenkins to find and archive the ipa files at the end of
    the build*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 53](index-80_1.jpg)


    **78**


    **CHAPTER 5: Automatic Builds with Jenkins**


    There are some advanced options available with this post-build action, like asking
    Jenkins to keep only the latest artifact available to save space. That would probably
    be useful if we were building a very big application but would also prevent building
    multiple branches of the application and keeping the resulting ipa files. Plus,
    the last time we packaged the application, the size of the generated package was
    around 150KB so space should not be an issue for a while.


    The job is now properly configured and it is time we trigger a build. Press the
    “Build Now” button in the left menu to start a build when you are ready and click
    on the link that appeared in the left menu.


    The application is pretty small so the first build shouldn’t take more than a
    minute, including the time it takes to fetch the content from the Github repository.
    Refresh the page when the build is complete or click the “Enable Auto Refresh”
    link at the top right of the page. At the end, you should see something similar
    to what’s in Figure [5-8.](#index_split_001.html#p80)


    ***Figure 5-8.** A successful Jenkins build*


    A successful build page contains useful information about what just happened:
    the duration, the changes that occurred since the last build, other information
    about the versioning, including the hash the commit at which the workspace is
    at the time of the build. Of course, the screenshot above may look a tiny bit
    different if you actually installed the Green Balls plugin that makes everything
    so much prettier.


    What’s interesting in this screenshot is the “build artifacts” section that shows
    the IPA file we wanted Jenkins to archive. With this approach, you can simply
    build any branch of the application so your tester can visit Jenkins, download
    the resulting IPA, and install it via iTunes. Of course, we’ve already been through
    this, and don’t worry, there are much more powerful post-build actions you can
    install.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 5: Automatic Builds with Jenkins**


    **79**


    The default Jenkins home directory is located at the following path: “~/.jenkins”.
    If you are looking for the path to the archived builds, that is where you will
    find them:


    $ find .jenkins/jobs/Github\ Jobs\ for\ iOS -name "*.ipa"


    jobs/Github Jobs for iOS/builds/2014-04-26_15-34-48/archive/build/Github_Jobs-0.1-1.2.3.ipa
    Congratulations, you’ve made your first steps into the world of continuous integration.
    There are a few things that can be improved with thought. First, the Xcode Build
    plugin is good but not great.


    It gives you control over a lot of things in the build process, sometimes in a
    pretty confusing way, like the path to the workspace file that doesn’t need an
    extension.


    If you take a look back at the script we wrote in the previous chapter, you will
    see that we don’t need so many options. That is why we will be using our script
    from now on. Plus, it will be much easier to update it. Before we do though, let’s
    have a look at the other features provided by Jenkins.


    Jenkins Power User Features


    Jenkins is a pretty powerful tool you can learn to use in a couple of hours, even
    if you’ve never used a continuous integration platform before. Don’t take it for
    granted though, for it also provides features that will help the power user.


