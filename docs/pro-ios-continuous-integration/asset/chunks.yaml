    as the href attribute of the download link:


    itms-services://?action=download-manifest&url=http://172.16.43.115:5000/github-jobs.plist
    Finally, open Safari mobile from your iOS device (one that is authorized to execute
    this application, of course) and navigate to your website using your local IP.
    If you don''t know your IP address, open the Network section of the System Preferences
    where it should be displayed. Remember we used 0.0.0.0 as the binding address
    so your “website” is accessible on your local network and not only your own computer.
    Click on the download link. You should be asked if you really want to download
    the application.


    Congratulations, you’ve set up a very simple distribution platform!


    EXERCISE: SEND THE NEW IPA FILE AT THE END OF A JOB


    In case you’re also interested in web development, here is a simple exercise for
    you. At the end of a Jenkins or a Bamboo job, send the new IPA file to your webserver
    so you can always download the latest version of your build.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **138**


    **CHAPTER 7: Over-The-Air distribution**


    Bonus: setting up ACL using the provisioning profile


    There are a few things that don’t work with our own platform: the design, the
    manual editing of the index.html and github-jobs.plist files, and of course the
    security! Right now, anybody with access to your local network could easily install
    the application and use it. If you were to upload this small platform to the cloud,
    basically anybody could download and install your application.


    It is, in fact, really easy to check if a user is authorized to download your
    application, once again using the application. Even if you wanted to add a simple
    login/password authentication process to your application, you would still have
    to check if the user is allowed to install the application.


    Fortunately, you already specified that when you created the provisioning profile.
    Let’s use it one more time!


    Decoding a provisioning profile


    We mentioned earlier that an IPA file was nothing but a code-signed ZIP archive
    containing the application. Well this application itself contains the provisioning
    profile. In fact, if you unzip the archive and look into the Payload folder, you
    should see a file named “embedded.mobileprovision”.


    Using your terminal, navigate to the folder (using the “cd” command) that contains
    the generated IPA file and run the following command:


    $ unzip Github\ Jobs.ipa


    $ cd Payload/Github\ Jobs.app/


