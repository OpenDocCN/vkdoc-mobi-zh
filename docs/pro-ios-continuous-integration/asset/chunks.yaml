    origins for that. OS X comes with a pretty decent shell for you to play in called
    “Terminal.app” and is available with a bunch of other tools in “/Applications/Utilities”.
    If you take a close look at Figure [4-1,](#index_split_000.html#p45)


    this is actually where the iPhone Configuration Utility we talked about in the
    previous chapter was installed.


    **41**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 40](index-45_1.jpg)


    **42**


    **CHAPTER 4: Invoking the Power of the Command Line**


    ***Figure 4-1.** A list of utilities, mostly provided by OSX*


    One of the reasons developers are scared or simply not inclined to dig into their
    shell, is probably because of the way it looks the first time you open it on OSX.
    You get a black on white interface with no indication whatsoever of what you should
    do. We are not going to lie - the command line interface is puzzling and is mostly
    designed for the power user. The good news is it’s actually pretty easy to become
    comfortable with the command line. The hard part is to know which command to run,
    with which parameters and when, but that will only come with experience and time.


    Let’s see how we can achieve what we did in the past chapter with creating a release
    build and using the command line.


    Introducing Shenzhen


    The iOS and OSX developers’ community is full of remarkable people who keep writing
    blog posts, and releasing libraries and tools that we’ll use in our project. Matt
    Thompson is one of these people.


    [In addition to the NSHipster (available at http://nshipster.com](http://nshipster.com/))
    website where he writes about hidden gems and tips about the “overlooked bits
    in Objective-C and Cocoa”, he created Shenzhen, a command line tool for building
    IPA files. Shenzhen also handles distributing apps to third-party services such
    as Testflight and HockeyApp, but we won’t be talking about over the air (OTA)
    distribution until Chapter 7.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 4: Invoking the Power of the Command Line**


    **43**


    Shenzhen is written in Ruby, so the easiest way to install it is to use Rubygems.
    Before we start, make sure you have a recent version of Ruby installed. At the
    time of writing this book, the current stable release of Ruby is 2.1.1.


    $ ruby –v


    ruby 2.1.1p76 (2014-02-24 revision 45161) [x86_64-darwin13.0]


    Once again, if you’re still using the installation of Ruby shipped with OS X,
    you should consider upgrading to a more recent one using rbenv ([http://rbenv.org/](http://rbenv.org/))
    or R[VM (https://rvm.io/).](https://rvm.io/)


    To install Shenzhen, simply run the following command:


    $ gem install shenzhen


    Once it’s installed, a new executable named ipa will be available in your terminal.
    Running it without any arguments should give you the following output:


    $ ipa


    ipa


    Build and distribute iOS apps (.ipa files)


    Commands:


    build Create a new .ipa file for your app


    distribute:ftp Distribute an .ipa file over FTP


    distribute:hockeyapp Distribute an .ipa file over HockeyApp


    distribute:s3 Distribute an .ipa file over Amazon S3


    distribute:testflight Distribute an .ipa file over testflight


    help Display global or [command] help documentation.


    info Show mobile provisioning information about an .ipa file


    Aliases:


    distribute distribute:testflight


    distribute:sftp distribute:ftp --protocol sftp


    Global Options:


    --verbose


    -h, --help Display help documentation


    -v, --version Display version information


    -t, --trace Display backtrace when an error occurs


    Author:


    Mattt Thompson <m@mattt.me>


    Website:


    [http://mattt.me](http://mattt.me/)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **44**


    **CHAPTER 4: Invoking the Power of the Command Line**


    As you can see, this tool does a lot of things, but we only care about the build
    command. Using the terminal, simply navigate to the root directory of the Github
    Jobs Xcode project and run the build command:


    $ cd ~/Projects/Apress/Github\ Jobs


    $ ipa build -c AdHoc -d ~/Desktop


    xcodebuild Github Jobs.xcworkspace


    xcrun PackageApplication


    zip /Users/Palleas/Projects/Apress/Github Jobs/Github Jobs.app.dSYM


    ~/Desktop/Github Jobs.ipa successfully built


    So what just happened here? Only a couple of things: Shenzhen built the application
    for the AdHoc configuration (the -c argument), archived it and created the IPA
    file on your Desktop (the -d argument).


    We also used “cd”, a built-in command to change the current directory we’re in,
    just like if we were using a Finder window. Congratulations! You’ve done in ten
    seconds and with one very understandable command what we’ve covered in a whole
    chapter!


    To be fair, with Xcode and its release process, we cheated a bit. After all, Shenzhen
    is a full-featured tool written in almost a few hundred lines of Ruby. This is
    the power of command line though. Let’s have a look to the tools provided by Xcode.


    Juggling with Multiple Installations of Xcode


    Let’s start with an easy one, called xcode-select. If you remember correctly what
    we’ve covered in Chapter 2, we used this command when we wanted to know which
    was the version of git embedded with Xcode. xcode-select is a command line tool
    used to manage the active developer directory for Xcode and the tools that come
    with it, such as git, but also svn, clang, and make. Running the following commands
    in your shell will print you the current directory, which is useful if you need
    some of the tools provided by Xcode and don’t want to hardcode the path. Once
    again, go back to Chapter 2 to see how to use the result of this command in a
    script.'
