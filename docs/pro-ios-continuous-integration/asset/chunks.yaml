    \ form that’s in the Jenkins system configuration section, which provides a way\
    \ to test the configuration. Once this is done, all you need to do is add a new\
    \ post-build action at the end of the “Github Jobs for iOS” job configuration,\
    \ as shown in Figure [5-12](#index_split_001.html#p87).\n\n***Figure 5-12.** For\
    \ each unstable build, the user behind `romain.pouclet@gmail.com` will receive\
    \ an e-mail*\n\nEvery time a build is failing, someone will be notified with an\
    \ e-mail containing a direct link to the build. The console output shows exactly\
