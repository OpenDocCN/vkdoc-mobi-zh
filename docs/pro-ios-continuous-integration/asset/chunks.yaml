    \ 和 `showWithStatus:maskType`。我们使用第二种方法，以便能够设置深色背景。否则，我们将无法正常看到 `HUD` 的动画效果。\n\
    \n一旦职位信息被获取，并且 JSON 被正确解码并转换为要显示的职位列表后，我们希望给用户一个处理完成的小提示。为此，请在 `NSURLSession`\
    \ 的 `dataTaskWithURL:completionHandler:` 完成块的末尾添加以下代码片段。调用 `showWithStatus:` 会显示一个临时的确认消息，无需手动关闭。\n\
    \n```\nNSURLSessionDataTask *jobTask = [[NSURLSession sharedSession] dataTaskWithURL:\
    \ url\n                                                           completionHandler:^(NSData\
    \ *data, NSURLResponse *response, NSError *error) {\n    // ...\n    [SVProgressHUD\
    \ showSuccessWithStatus: [NSString stringWithFormat: @\"已获取 %lu 个职位\",\n     \
    \                                     (unsigned long)[self.jobs count]]];\n}];\n\
    ```\n\n当你运行应用程序时，你应该会在两种情况下都看到 `HUD`，类似于图 2-7。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![图 23](img/index-23_1.jpg)\n\n**第二章：iOS 和 Xcode 中的持续集成特性**\n\n***图 2-7.** 获取职位时显示旋转动画，获取结果后显示确认消息*\n\
    \n使用 `CocoaPods` 安装依赖项除了生成 `PodFile` 之外，还会创建两个东西：一个 `Podfile.lock` 用于管理项目中的依赖状态，以及一个包含实际依赖项的\
    \ `Pods` 文件夹。这在社区中确实是一个热议话题，但自动化工具的存在是有其道理的，我们强烈建议你通过在 `.gitignore` 文件中添加 `\"\
    Pods\"` 来忽略此文件夹：在你创建项目的目录根目录下创建一个 `.gitignore` 文件，并添加 `\"Pods\"`。\n\n此文件夹将被忽略，当你的依赖项发生变化时（例如，因为你切换到了更新的版本），Git\
    \ 不会尝试提交它。\n\n## 关于 `.gitignore` 文件\n\n`.gitignore` 文件指定了 Git 应忽略的文件模式。如果你的项目中还没有\
    \ `.gitignore` 文件（这完全有可能，因为 Xcode 不会自动生成一个），请从 GitHub 上获取一个：[`github.com/github/gitignore/blob/master/Global/Xcode.gitignore`](https://github.com/github/gitignore/blob/master/Global/Xcode.gitignore)。\n\
    \n## 我们为什么做这些？\n\n我们现在有了一个可以运行的应用程序。它并不美观，也可能没什么用，但我们将在本书的后续章节中把它作为一个示例来使用。如果你对完整的应用程序感兴趣，可以通过以下网址获取：[`github.com/palleas/github-jobs`](https://github.com/palleas/github-jobs)。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第二章：iOS 和 Xcode 中的持续集成特性**\n\
    \n## 准备发布应用程序\n\n在一个项目的生命周期中，会存在应用程序的多个版本。首先，是你在自己电脑上开发、将在 iOS 模拟器或测试设备上运行的版本。然后，是你的\
    \ QA 团队用来审查你实现的最新功能和修复的 bug 的版本。完成这些之后，将有一个你会发送给客户的应用程序版本。这是将应用程序推送到官方 App Store\
    \ 之前的最后一步。最后，当客户对你发送的版本满意后，将会有一个生产就绪的应用程序。所有这些版本都将具有其特殊性。\n\n例如，当应用程序发生错误时，你可能不想显示相同级别的信息。此外，你大概率不会希望因为代码中的断言失败而导致应用程序崩溃。得益于\
    \ Xcode，这种多配置是很容易实现的。\n\n当然，这并不是唯一的工作方式；你可能是独立的 iOS 开发者，也可能没有可支配的 QA 团队。我们将简化所有人的流程，只设置三个配置级别：\n\
    \n- **Debug（调试）**：你在开发应用程序时使用的配置级别。当你误用某些代码时，它可能会时不时地崩溃，并在发生错误时显示大量信息。在此配置中，诸如出色的\
    \ [Reveal](http://revealapp.com/) 等调试工具或依赖私有 API 的库可能会与你的应用程序链接。\n- **Adhoc（临时）**：你将发送给\
    \ QA 团队和/或客户的版本所使用的配置。调试和开发工具已移除，错误消息对用户友好得多。例如，它可以与崩溃日志报告器链接，以简化与客户之间的沟通。\n-\
    \ **Release（发布）**：你的应用程序在商店上线时使用的配置。\n\n回到你的 Xcode 项目，在文件浏览器中选择顶级元素，并确保 \"Project\"\
    \ 部分中的 `\"Github Jobs\"` 项目被选中。如果你查看屏幕上的内容，你会看到 Xcode 已经为你提供了两个不同的配置级别，如图 2-8\
    \ 所示。\n"
