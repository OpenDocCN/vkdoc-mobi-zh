- fmt: "### Click on the platform of your choice and fill in your credentials\n\n\
    Please note that at the time we are writing this book, the two-factor auth feature\
    \ that GitHub deployed to add an extra layer of security to your account is not\
    \ supported by Bamboo. There is, in fact, an issue opened on the official Bitbucket\
    \ page: [https://bitbucket.org/site/master/issue/5811/support-two-factor-authentication-bb-7016](https://bitbucket.org/site/master/issue/5811/support-two-factor-authentication-bb-7016).\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 65](index-100_1.jpg)\n\
    \n---\n\n## CHAPTER 6: Automated builds with Bamboo\n\n**98**\n\n### What is a\
    \ plan?\n\nNow that the plan has been created, let’s take a moment to understand\
    \ what a plan actually is.\n\nWhen you are trying to build an application with\
    \ sources that are contained in a repository, a plan will be associated to that\
    \ repository. It can contain multiple jobs, which correspond to a list of instructions\
    \ to build a project, including the default job that was created when you created\
    \ the plan.\n\nIt also contains the instructions about how and when the build\
    \ should be triggered, who should be notified of the builds’ results, and who\
    \ is allowed to access a plan and its jobs.\n\n### Extending Bamboo\n\nJust like\
    \ Jenkins, it is possible to extend Bamboo with plugins, here called “Add-ons”.\n\
    \nThe easiest way to look for available add-ons is to go to the Atlassian marketplace\
    \ on [https://marketplace.atlassian.com](https://marketplace.atlassian.com/),\
    \ where people can sell their plugins or give them for free.\n\nWhat’s important\
    \ here is that you have a centralized list of all the plugins, which is also available\
    \ from the “Manage Add-ons” section of your Bamboo installation. Let’s install\
    \ a plugin to support Xcode project building.\n\nFill in the search field with\
    \ “Xcode” and press enter. You should have only one result for a free Add-on called\
    \ “iOS, Cocoa and Xcode Support for Bamboo”. This plugin was created by the “Atlassian\
    \ Labs” and will work for Bamboo 5.0. At the time we are writing this, the stable\
    \ version is 5.5.0. This plugin is semi-official: it was created by Atlassian\
    \ but isn’t formally supported. In fact, the latest version was released almost\
    \ a year ago. Don’t worry, we are only installing the tool for the sake of example;\
    \ we will actually be using the bash script we created in the previous chapter.\n\
    \nClick on the plugin title and then click on “Get It Now” to download the plugin\
    \ – which is simply a Java archive (`.jar`) file – and go back to your Bamboo\
    \ installation. In the top-right menu shaped into a wheel, select **Add-ons**.\
    \ Click on the “Upload add-on” link, browse to the folder where the Xcode add-on\
    \ was downloaded, and press **Upload**. If everything worked as expected, you\
    \ should see something similar to Figure [6-3](#index_split_001.html#p100).\n\n\
    ***Figure 6-3.** The Xcode Add-on for Bamboo was successfully installed*\n\nThat’s\
    \ how easy it is to install Add-ons with Bamboo. But just in case, let’s see if\
    \ it actually worked and try to build the GitHub Jobs application. Remember that\
    \ we’ve only created a build plan, which comes with a default build job that does…\
    \ nothing.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n---\n\n**CHAPTER\
    \ 6: Automated builds with Bamboo**\n\n**99**\n\nBefore we start tweaking our\
    \ plan, you may be wondering why we made you install an add-on to build an Xcode\
    \ project when you know we will end up using our script anyway. In the previous\
    \ chapter, we installed a couple of plugins to render ANSI formatted output properly\
    \ and mask the password from a build’s logs. Unfortunately, we won’t be able to\
    \ do the same this time because adding custom variables, obfuscating the password,\
    \ and formatting ANSI strings are all features that come natively with a standard\
    \ installation of Bamboo.\n\nFrom the “Build” top menu, select “All build plans”\
    \ and then click on the iOS application plan in the list (which should only contain\
    \ one project). Then, in the top-right “Actions” menu, select “Configure plan”.\
    \ The “Stages” tab should be selected among an important list of tabs. We will\
    \ cover a few of them later. The one that really interests us for now is indeed\
    \ the “Stages” one.\n\n### What’s a stage?\n\nThey are simply groups of jobs,\
    \ adding a little bit more hierarchy into Bamboo.\n\nEvery stage can contain multiple\
    \ jobs that will be run in parallel. That would be useful, for example, to run\
    \ unit and functional tests in parallel to save some time. Every stage represents\
    \ a step within the build process. For now, we will only need one: building the\
    \ application.\n\n### Configuration of the default job\n\nClick on the “Default\
    \ job” in the “Default Stage”. You’ve reached the bottom: that is the lowest level\
    \ in the hierarchy. This default stage will be the building step of our continuous\
    \ integration process.\n\nIf you remember correctly, what we want is: fetching\
    \ the latest version of the project from the Git repository, installing the dependencies\
    \ using Cocoapods, and finally building and packaging the application.\n\nContrary\
    \ to the jobs contained in a stage, steps in a job – actually called tasks – are\
    \ run sequentially, just like build phases in Jenkins. With Bamboo, fetching the\
    \ content from the repository is a task itself, a task you can configure if you\
    \ want. There aren’t many options for you to play with, but you can tell Bamboo\
    \ to remove the content and re-clone the whole project every time you build your\
    \ application. For an application as small as the GitHub Jobs one is, that would\
    \ not make a huge difference, but with big projects with huge resources and dependencies,\
    \ this could significantly increase the duration of the build. You should leave\
    \ this option unchecked for most of your builds.\n\nIn the previous chapter, we\
    \ lost some time with a failing build because the dependencies were not installed\
    \ properly. This time, we will go straight to the point and start the build process\
    \ with the installation of dependencies using Cocoapods.\n\n1. To achieve that,\
    \ click on the “Add Task” button and look for the “Script” kind of build task.\
    \ Click it once you’ve found it.\n2. In the “Task description” field, fill “Installing\
    \ the dependencies using Cocoapods”.\n3. Then, make sure the “Inline” choice is\
    \ selected in the “Script location” list.\n4. It is also possible to call existing\
    \ scripts, which will come in handy when we use our build script, but for now,\
    \ simply enter `pod install` in the “Script body” text field. Finally, press “Save”.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n---\n\n**CHAPTER 6: Automated\
    \ builds with Bamboo**\n\n**100**\n\n5. Now, to the final part of our build! Click\
    \ the “Add task” button and add an Xcode task, which will need a bit of configuration,\
    \ but first, enter “Building the application using xcodebuild” in the “Task description”\
    \ field. What we need to do now is to add a SDK you want to build your application\
    \ with.\n6. To know which SDKs are available, run the following command in your\
    \ terminal:\n\n```\n$ xcodebuild -showsdks\n```\n\n   OS X SDKs:\n   - OS X 10.8\
    \ `-sdk macosx10.8`\n   - OS X 10.9 `-sdk macosx10.9`\n\n   iOS SDKs:\n   - iOS\
    \ 7.1 `-sdk iphoneos7.1`\n\n   iOS Simulator SDKs:\n   - Simulator – iOS 7.1 `-sdk\
    \ iphonesimulator7.1`\n\n7. Click on “Add new executable”.\n8. In the “label”\
    \ field, enter “iOS 7.1”, and in the “Path” field, enter the SDK of your choice.\
    \ In our case, that would be `iphoneos7.1`. Note that the help text under the\
    \ field suggests you fill in `Path to the Xcode executable including the -sdk\
    \ argument eg '/Developer/usr/bin/xcodebuild -sdk iphoneos42'`, which is wrong\
    \ on many levels: the developer tools moved from the `/Developer` directory a\
    \ while back, and the field only wants a value to pass to the `-sdk` argument\
    \ of the `xcodebuild` command. If you were to listen to what the documentation\
    \ says, you would end up trying to build the application with the following command,\
    \ since the plugin doesn’t check that you’ve entered a valid SDK."
