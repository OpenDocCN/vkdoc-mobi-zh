- fmt: "This script fails because the `Manifest.lock` file does not exist, nor does\
    \ the `Pods` folder containing your dependencies. That would probably necessitate\
    \ adding the `Pods` folder to your main repository but we really don’t want to\
    \ do that. What we want to do is installing our dependencies before the build\
    \ actually starts.\n\n## Installing the Dependencies During an Integration Performed\
    \ by an Xcode Bot\n\nThe first solution that should come to mind would be to add\
    \ yet another run script build phase, but that causes a few issues. A build phase\
    \ is stored at the target’s level and in our case we would be tweaking the “Github\
    \ Jobs” target. This also means that every time we build the application from\
    \ Xcode, the script will run. We could simply add an `if` condition in the script\
    \ that would exit if it wasn’t performed by the “_teammserver” user, but that\
    \ would not be a very stable and trustable solution.\n\nWe could also duplicate\
    \ the target but that would mean managing two targets, one for the day-to-day\
    \ work and one for the continuous integration. Tweaking the target is definitely\
    \ not the solution.\n\nIn Xcode 5, installing your dependencies was a tedious\
    \ process, to say the least. You had to use a pre-build scheme action that would\
    \ execute a script that would run the famous `pod install` command.\n\nThis approach\
    \ had several downsides: because this script was stored at the scheme level, you\
    \ wouldn’t get any output from the execution of the script and had to manually\
    \ redirect this output to some file.\n\nThe great news is we no longer need this\
    \ hack, because Apple introduced in Xcode 6 pre- and post-integration triggers.\
    \ We’ve already seen how a post-integration trigger can send the committers e-mail\
    \ when a build fails, let’s see how we can use a pre-integration trigger to invoke\
    \ the cocoapods executable.\n\nFrom the integration screen, click on the setting\
    \ gear at the top right of the screen, it will allow you to edit the settings\
    \ of your Bot. Click next until your reach the “Configure bot triggers” section.\
    \ Click the “Add Trigger” button under the “Before Integration” header and select\
    \ “Run Script”. In the field that appears, enter the following script:\n\n```\n\
    export LC_ALL=\"en_US.UTF-8\"\n\nPODFILE=`find . –type f – name Podfile`\n\ncd\
    \ `dirname $PODFILE`\n\npod install\n```\n\nThis script is pretty straightforward.\
    \ The first thing it does is to define the current locale. This is requirement\
    \ from Cocoapods, otherwise you’ll get the following error:\n\n`CocoaPods requires\
    \ your terminal to be using UTF-8 encoding. See`  \n  \n[https://github.com/CocoaPods/guides.cocoapods.org/issues/26](https://github.com/CocoaPods/guides.cocoapods.org/issues/26)\
    \ for possible solutions.\n\nThen, it uses the `find` command to locate the `Podfile`.\
    \ When this script is executed, the current directory is not your project root\
    \ directory. Once this file is located, the `dirname` command is used to retrieve\
    \ the path to the directory containing this file and navigate to this directory.\
    \ Note that we could have hardcoded the path to this folder, but this way is probably\
    \ cleaner in case you change the name of your project, for example.\n\nOnce we’ve\
    \ navigated to this folder, we run the `pod install` command to install the dependencies.\
    \ The `Pods` folder is created with the `Manifest.lock` file in it and the `xcconfig`\
    \ file that contains extra information needed for Cocoapods to behave normally.\
    \ For example, this is the one that was generated for our project:\n\n```\nGCC_PREPROCESSOR_DEFINITIONS\
    \ = $(inherited) COCOAPODS=1\nHEADER_SEARCH_PATHS = \"${PODS_ROOT}/Headers\" \"\
    ${PODS_ROOT}/Headers/SVProgressHUD\"\nOTHER_CFLAGS = $(inherited) -isystem \"\
    ${PODS_ROOT}/Headers\" -isystem\n\"${PODS_ROOT}/Headers/SVProgressHUD\"\nOTHER_LDFLAGS\
    \ = -ObjC -framework QuartzCore\nPODS_ROOT = ${SRCROOT}/Pods\n```\n\nWhat’s important\
    \ here is the `PODS_ROOT` that is declared to contain the path to the `Pods` directory.\n\
    \nWhen this file can’t be loaded, the `PODS_ROOT` build setting is not available\
    \ during build time. This also means that the path to the `Manifest.lock` file\
    \ cannot be computed, hence the integration fails we’ve been having.\n\nIt may\
    \ seem surprising that Apple released a tool that requires so much work to make\
    \ it behave properly but remember that we are using a third-party tool that isn’t\
    \ affiliated with Apple whatsoever.\n\nIn all fairness with Xcode and the OS X\
    \ Server Xcode server, if we weren’t relying on Cocoapods to manage our dependencies,\
    \ we could have set everything up in a few minutes. From creating the project,\
    \ to building it using a bot as well as hosting it on the OS X Server.\n\nIf you\
    \ try to start an integration now the errors related to Cocoapods should no longer\
    \ happen and be listed under the list of resolved issues, as shown in Figure 8-10.\n\
    \n**Figure 8-10.** *The integration succeeded and the errors we had in the previous\
    \ integration are marked as resolved*\n\nWhen we used Jenkins or Bamboo to build\
    \ the application, both platforms had in common the ability to restrict the build\
    \ to a specific branch of the application. We haven’t seen this feature with the\
    \ Xcode Bot, but that does not mean it’s not there.\n\nWhen you create a bot from\
    \ Xcode, it will retrieve the name of the branch your project currently uses and\
    \ restrict the Bot to this specific branch. If you want to change the name of\
    \ the branch, you’ll have to edit the Bot from the log panel and without changing\
    \ anything, simply click your way through the few steps of the process. We’ll\
    \ admit that this is not a very good process but that’s only because Xcode has\
    \ limited control over the parameters of a Bot. The Xcode integration is meant\
    \ to be a very simple process: you are working on a feature and want to know if\
    \ you’ve broken anything. Once your feature is done, delete (or update) the Bot\
    \ and move on.\n\nTo be honest, you could probably not find a worse name than\
    \ `Klaus` for your bot; we’ve only used it so we have a reason to change it later.\
    \ You should always use self-explanatory names so you can quickly know their purpose.\
    \ For example, our bot should probably be named “Github Jobs (Nightly)”, that\
    \ would make more sense and be easier to find in the list of bots. To do that,\
    \ as well as to change the branch the integration will be run on, simply go back\
    \ to the setting panel using the gear button at the top right of the screen we\
    \ used earlier to add a pre-integration trigger.\n\nThe only way to have better\
    \ control over your OS X server continuous integration platform is to use a different\
    \ interface that communicates directly with your server: the web interface. Since\
    \ we’ve covered pretty much everything there is to know about the bots, Xcode\
    \ side, let’s move on to the web interface. Note that in Xcode 5 there was a way\
    \ to edit directly a Bot’s settings from the web interface but as of the latest\
    \ beta of the Xcode server, this feature seems to be gone.\n\n## Managing the\
    \ Xcode Service from the Web Interface\n\nOS X server’s web interface to the Xcode\
    \ service is available through a URL composed of the name of your computer on\
    \ the network, in our case that would be `romain.local` followed by the path component\
    \ `xcode`, which gives us: `http://romain.local/xcode`. You can guess the URL\
    \ by yourself or, from the OS X server Xcode service panel, click on the “View\
    \ bots” button at the bottom of the screen. You can also click on the settings\
    \ wheel at the top right of the Xcode screen and select “View Bot in browser”.\
    \ Of course, this last solution will open the details about a bot, not the “homepage”\
    \ of your Xcode service."
