    already know, create a bot that runs every time new commits are pushed to the
    remote repository (which is polled every 5 minutes) and select only the `Perform
    test action` task. Last time we created a bot that would only build and archive
    the application, now we only want testing. Because of this, as you can see on
    Figure [9-10, the Xcode Service will be able to run the tests on multiple devices
    and simulators,](#index_split_003.html#p181) which is super convenient to make
    sure that bugs related to 32- versus 64-bit architecture are not here any more.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 110](index-181_1.jpg)


    **CHAPTER 9: Adding Unit testing to the mix**


    **181**


    ***Figure 9-10.** The Xcode service allows you to run test on multiple devices*
    Note that this capture not only shows simulators but also works on devices. As
    a matter of fact, there are multiple options in the Devices combo box that will
    allow you to run your test suite against all iOS devices or all iOS simulators.
    Of course, you don’t necessarily have multiple spare devices you can leave plugged
    into the computer in charge of running all the tests. You may, for example, use
    a couple of testing devices during the day. That’s when the nightly build would
    come in handy: create a bot that will run the tests against all the simulators
    during the day and another one that would run the tests on devices during the
    night. Creating a bot is super easy and only takes a few minutes, so why not take
    advantage of it?


    Once the bot has finished running the test suite, open the details of the integration
    either from Xcode or your browser and look at the results. As expected, the test
    failed on all the simulators, as shown in Figure [9-11. Remember that Xcode 6
    is still in beta at the time we ar](#index_split_003.html#p182)e writing this
    book so please ignore the two errors displayed in this figure.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 111](index-182_1.jpg)


    **182**


    **CHAPTER 9: Adding Unit testing to the mix**


    ***Figure 9-11.** The Xcode service web interface shows details about the failing
    test* In all fairness to the other continuous integration platforms, we could
    have configured them directly to run multiple times using different simulators.
    That would have taken more time though and the result would have been a lot less
    clear. Yet again, that’s one of the advantages of using a continuous integration
    tool dedicated to one platform.


    ## Summary


    In this chapter, we introduced the not-so-new concept of unit testing. If you’ve
    been able to write and run unit tests from Xcode since version 2, it’s only three
    major releases later that Apple made them first-class citizens of your development
    process. It’s no longer possible to create a project without unit tests, you can
    easily run very specific test cases and running your test automatically from your
    continuous integration platform is only a few clicks away.


    First, we talked about what unit testing is and how it wil help you go home with
    a little more peace of mind than if you were only relying on your skil s to ensure
    that your product was stable. Then, we updated our continuous integration process
    on Bamboo, Jenkins, and created a dedicated Xcode Bot.


    The next chapter will cover the final piece to the feedback provided by our continuous
    integration installation: quality assurance.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # Chapter


    ## Quality assurance


    Let’s have a look at what we’ve done in the previous chapters. We built a very
    simple application that retrieves a short list of iOS jobs in New York and displays
    the details of the openings in Safari mobile. Then, we learned how to release
    the application manual y to your team using only Xcode and iTunes, even if we
    admitted it was a bad idea. Final y, we covered how to build the application from
    the command line, so we could build the application on a regular schedule using
    a few of the main continuous integration platforms: Jenkins and Bamboo, the open-source
    solution versus the enterprise-friendly one. We also introduced you to the tools
    released by Apple with Xcode 5: XCode service for OS X Server and XCode Bots.
    Final y, we took our continuous integration to the next level by automatical y
    running the test suite that came with our project. This chapter wil introduce
    you to one final notion: quality assurance, another feedback your continuous integration
    platform can provide.


    First, I’ll explain what quality assurance means and how it may be helpful to
    you and your project.


    Then, we’ll talk about the action of running analyzing tools against your code
    without running it, a.k.a. static analysis. There are, in fact, multiple tools
    out there that will help you track complex pieces of code and other unused variables.


    ### What is quality assurance?


    Your continuous integration installation allows you to know if your application
    successfully builds and if your test runs, but it does not indicate whether the
    code you wrote for a feature or a bug fix didn’t harm your product. It does not
    mean you haven’t made mistakes like leaping over a vital security check because
    of a misplaced `goto` instruction. It does not means that you declared a variable
    and forgot to use it, nor does it mean that you haven’t forgotten to put some
    code in an `if` statement.


    “Harm” may seem like a harsh term but think about the developer that will have
    to go back to this particular piece of code six months from now, pulling his hair
    because of your method with 17 levels of `if` statements. There is no such thing
    as perfect code and even an experienced developer with 20 years of doing Objective-C
    can make mistakes. That’s where quality assurance tools come in handy. Because
    they are automated, there is no arguing about being right or wrong. They are simply
    following a set of rules, running specific analysis, and giving you a report.
    For this reason, you won’t **183**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **184**


    **CHAPTER 10: Quality assurance**


    fail an automated build because it is too complicated, you won’t fail a build
    because you have a few 200+ long lines of code, and you sure won’t fail your build
    because you are not unit testing 100% of your code. They will simply provide you
    with another kind of feedback that will help you write better code.


    ### Static analysis


    If you’ve been doing iOS development long enough, you’ve probably heard of things
    like LLVM (formerly called “Low Level Virtual Machine”) and Clang. To put things
    in order, Clang is a tool that relies on LLVM. It comes with a lot of handy features
    like compiling, refactoring, and, of course, static analyzing your code. Let’s
    see how it works.


    First, you need to understand that there isn’t only one way to do static analysis
    because this term simply means that the code will be analyzed without actually
    running it. It’s the opposite of what is logically called “dynamic analysis”.
    Warnings generated by a static analysis are similar to the ones you get in Xcode
    when you are trying to store a `NSArray` in a property that was declared as a
    `NSString`. Those are compiler warnings and they share the same spirit. Of course,
    they can detect simple issues like that, but as they evolved, static analysis
    tools took things a step further by starting to reason about the semantics of
    the code.'
