    ```


    这将在 `build` 目录中以 Jenkins 可理解的格式生成一份报告。最后一步就是收集这份报告，以便 Jenkins 使用插件以更友好的方式呈现它。


    尽管 PMD 格式是一种广为人知的格式，但 Jenkins 并不原生支持它。导航到 Jenkins 配置部分，选择"管理插件"部分。进入"可选插件"部分，搜索"PMD
    插件"。有几个插件能够解析和呈现 PMD 文件，但这个插件就足够了。无需重启 Jenkins 即可安装此插件，然后返回 **Github Jobs for
    iOS** 的配置面板。


    如你所料，收集报告将在构建后操作中完成。点击"添加构建后操作"按钮，选择"发布 PMD 分析结果"。后续步骤与之前所见并无不同。构建后操作只需为要收集的文件添加一个模式，与我们用于收集构件的模式类似。在"PMD
    结果"字段中填入 `**/build/oclint_result.xml`，然后按下"高级"按钮，以显示此插件附带的一些高级用户功能。


    选择"始终运行"选项。我们知道，如果代码中检测到太多错误，OCLint 可能会导致构建失败。当这种情况发生时，报告无论如何都会生成，不收集这些报告毫无意义。按下"保存"按钮，并开始一次新的构建。'
- fmt: '# CHAPTER 10: Quality assurance


    Once the build has run, a new item is available in the project’s sidebar: “PMD
    Warnings”. As shown in Figure 10-4, the report is pretty similar to the HTML one
    generated by OCLint. The obvious advantage is having this report formatted and
    integrated into Jenkins.


    ![Image 115](index-195_1.jpg)


    **Figure 10-4.** Each XML report is retrieved, formatted, and displayed in Jenkins


    **Note** The build has failed because too many lines of code are over the 120
    characters limit and it’s really up to you to decide how to fix this issue. There
    are three options you can play with: `-max-priority-1`, `-max-priority-2` and
    `-max-priority-3`. These options will increase the number of errors OCLint will
    accept before failing the build. The other solution would be to increase, once
    more, the number of characters allowed on a line of code.


    Integrating quality checks in Bamboo would be pretty similar to what we’ve done
    in Jenkins. The main difference, once again, is that it would be done in a separate
    job. This way the build, the test, and the static analysis could be performed
    in parallel. The only trouble is that at this point, there is no decent plugin
    for Bamboo that can handle PMD files, so we won’t be able to cover it.


    ## Summary


    This chapter was dedicated to quality assurance using tools like Clang and OCLint.
    We talked a bit about what quality assurance is and how it can be helpful to you
    and your team. Then, we covered in detail the Clang static analyzer that can be
    easily installed and integrated with the OS X server to be run every time you
    push a commit. Finally, we moved on to OCLint, another static code analysis tool
    that provides a different kind of feedback, like lines of code being too long.


    We have now reached the end of this journey. We started with a very simple application
    that does a very simple job: calling a web-service, displaying the results in
    a table view, and using Safari to show the details of a job offer.


    In the chapters that followed, we started talking about command line and more
    importantly how to build your application without using Xcode’s User Interface,
    while using its command line tools. We started with a small tool that handled
    the whole process for us and finally moved on to our very own build script written
    in bash.


    Because we knew everything worked under the hood, it was time to automate the
    whole process, so we saw how to build our application on a daily basis using continuous
    integration platforms like Jenkins and Bamboo.


    Then, we needed a small break, so we covered the required steps to distribute
    your application to your beta testers at the end of a build because that’s one
    of the advantages of a continuous integration installation: removing the hassle
    that is build, packaging, and distributing the application.


    We also talked about the XCode service for the OS X Server that can host git repositories
    and run Xcode jobs, as well as presenting the status of your builds in a pretty
    elegant way.


    At this point, we had a really decent continuous integration installation that
    was capable of building the application when new commits were pushed. All we had
    left to do was to configure our tools so they could provide us with more feedback:
    unit testing and static analysis.


    Our installation is not perfect, but we’ve pretty much showed you how everything
    works. What is important here is that you saw (I hope!) that continuous integration
    is nothing to be afraid of, but something that can provide very helpful feedback
    and help you write better code and better applications.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ---


