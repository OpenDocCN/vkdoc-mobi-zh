    In fact, you shouldn’t be running `Jenkins` on a developer’s computer but on a
    neutral environment that no one is coding on. Most people and companies usually
    go for a Mac Mini, which is kind of cheap, in the Apple world. Managing commands
    that should run at startup is done through the “Launch Daemon” OS X core component.
    Al it takes is to be properly fil ed up and written in the property list format.
    This is a little bit out of the scope of this book so we won’t cover it. Note
    that if you decide to go with `Homebrew` to install `Jenkins` on the actual computer
    that will perform your builds, a launch daemon file will be provided.


    ## Having a Look Around


    As shown in Figure 5-1 and as we mentioned earlier, the user interface is pretty
    simple. You will find on the left, a menu with the main actions available from
    creating a new job to managing `Jenkins` and a central area were you will see
    your jobs and their current status. The section we really care about for now is
    the one used to configure `Jenkins`. Click the “Manage Jenkins” link and then,
    click the “Manage Plugins” link.


