    }


    Note that we wrapped the whole content of the completion block using a function
    from Grand Central Dispatch (GCD) so all the UI job is performed on the main thread.
    Don’t forget to update the tableView:cellForRowAtIndexPath: method to display
    the “title” property of a job.


