  trans: "\n`scan-build: 发现 1 个错误。`\n\n`scan-build: 运行 'scan-view /var/folders/1v/d8vqkw8x23ndw49f5vs3fzw00000gn/T/scan-build-2014-06-13-225403-95826-1'\
    \ 查看错误报告。`\n\n第一个代码块很重要。其中包含了一些可以被使用或覆盖的构建设置，就像我们之前用 `xcodebuild` 命令和 `CONFIGURATION_BUILD_DIR`\
    \ 设置所做的那样。第一个设置显示了正在使用的 Clang 可执行文件的路径。Clang 的静态分析工具自带了一个版本的 Clang，正如你在解压后的文件夹中的\
    \ `bin` 子目录里看到的那样。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image\
    \ 112](img/index-186_1.png)\n\n**186**\n**第 10 章：质量保证**\n\n你可以使用 `--use-analyzer`\
    \ 选项轻松覆盖此设置，例如，用于在 Xcode 中日常工作时使用完全相同的编译器：\n\n```\n$ ~/Tools/checker-276/scan-build\
    \ --use-analyzer=Xcode xcodebuild -workspace Github\\ Jobs.xcworkspace -scheme\
    \ Github\\ Jobs clean build\n```\n\n`scan-build: 正在使用 '/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/clang'\
    \ 进行静态分析`\n\n来自命令行的构建设置：\n\n`CLANG_ANALYZER_EXEC = /Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/clang`\n\
    \n通过使用 `Xcode` 而不是 Clang 可执行文件的实际路径，`scan-build` 将使用 `xcrun` 来定位 Xcode 所使用的 Clang\
    \ 可执行文件的完整路径。\n\n另两个重要参数是关于命令输出的：`CLANG_ANALYZER_OUTPUT` 和 `CLANG_ANALYZER_OUTPUT_DIR`。它们分别包含需要生成的报告类型以及报告的存储路径。事实上，命令执行后显示的输出指出了在哪里可以找到这份报告。事实证明，我们为\
    \ Github Jobs 应用程序编写的代码包含一个错误。让我们看一下生成的报告。如显示所示，你只需要调用 `scan-view` 命令。该命令的默认行为是在你的计算机上启动一个\
    \ Web 服务器，并以适当格式打开报告，如图 10-1 所示。\n\n***图 10-1.** Clang 静态分析器生成的格式化报告显示了一个错误*\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 10 章：质量保证**\n**187**\n\
    \n老实说，我们在编写本书时并没有预料到这个错误，但这却是一个很好的机会，让我们看到了使用静态分析器的好处。我们确实忘了调用 `[super viewWillAppear]`。这并不太重要，因为我们没有继承像\
    \ `UINavigationController` 这样的容器视图控制器。实际上，`viewWillAppear` 声明附近的注释是这样写的：\n\n```\n\
    // Called when the view is about to made visible. Default does nothing\n```\n\n\
    更有趣的是，当你使用最新稳定版 Xcode 5.1.1 (5B1008) 提供的 Clang 可执行文件时，这个错误不会被检测到。这就是我们在第 2 章提到\
    \ Xcode 中 Git 集成时讨论的问题。由于苹果的发布流程缓慢，你很容易在开发者工具方面落后一步。事实上，如果你查看我们现在使用的 Clang 最新版本的更新日志（可在\
    \ [`clang-analyzer.llvm.org/release_notes.html`](http://clang-analyzer.llvm.org/release_notes.html)\
    \ 获取），你会看到以下内容：\n\n> *新增了一个“缺少对 super 的调用”警告，用于查找 iOS/OS X API 中需要链式调用父类方法实现的常见模式。*\n\
    \n平心而论，在编写本书时仅作为测试版发布的 Apple Xcode 6 附带了最新版本的 Clang，并支持这些新功能。我们已经讨论过 `xcrun` 工具和\
    \ `DEVELOPER_DIR` 环境变量，因此你应该能够检查两个 Clang 可执行文件的版本。\n\n这份报告是以人类可读的方式生成的。当然，计算机也可以轻松解析它，以便将其集成到你的持续集成平台中，毕竟这是非常简单的\
    \ HTML 代码。\n\n不过还有另一种方法。分析结果可以导出为……没错：plist 文件。你可以使用 `-plist` 选项来跳过 HTML 报告文件的生成，因为默认导出格式会同时生成\
    \ plist 文件和 HTML 文件。你也可以使用 `-o` 选项来决定报告的存储位置，而不是使用临时文件夹：\n\n```\n$ scan-build\
    \ -plist -o build xcodebuild -workspace Github\\ Jobs.xcworkspace -scheme Github\\\
    \ Jobs clean build\n```\n\n命令运行完毕后，你可以导航到报告目录，然后一直找到 `PCSViewController.plist`\
    \ 文件，即可轻松找到与 `PCSViewController` 类相关的报告。该文件将包含以下格式描述的异常列表：\n\n```\n<dict>\n  <key>kind</key>\n\
    \  <string>event</string>\n  <key>location</key>\n  <dict>\n    <key>line</key><integer>60</integer>\n\
    \    <key>col</key><integer>1</integer>\n    <key>file</key><integer>0</integer>\n\
    \  </dict>\n  <key>depth</key>\n  <integer>0</integer>\n  <key>extended_message</key>\n\
    \  <string>UIViewController 子类 'PCSViewController' 中的实例方法 'viewWillAppear:' 缺少对\
    \ [super viewWillAppear:] 的调用</string>\n  <key>message</key>\n  <string>UIViewController\
    \ 子类 'PCSViewController' 中的实例方法 'viewWillAppear:' 缺少对 [super viewWillAppear:]\
    \ 的调用</string>\n</dict>\n```\n\n正如你所料，这种格式更容易被其他软件（例如 Xcode）解析和分析。问题是，如果你在自己电脑上运行的静态代码分析结果与持续集成平台上运行的结果不同，那么在持续集成平台上运行静态代码分析就没有意义了。幸运的是，检查器归档文件中包含一个专门为此目的设计的命令，叫做\
    \ `set-xcode-analyzer`。\n\n就像在全局级别更改开发者目录路径的 `xcode-select` 命令一样，此命令必须以超级用户身份运行。关闭\
    \ Xcode 并运行以下命令：\n\n```\n$ sudo set-xcode-analyzer --use-checker-build=/Users/Palleas/Tools/checker-276\n\
    (+) 使用检查器构建附带的 Clang：/Users/Palleas/Tools/checker-276\n(+) 在以下位置搜索 xcspec 文件：/Applications/Xcode.app/Contents\n\
    (+) 正在处理：/Applications/Xcode.app/Contents/PlugIns/Xcode3Core.ideplugin/Contents/SharedSupport/Developer/Library/Xcode/Plug-ins/Clang\
    \ LLVM 1.0.xcplugin/Contents/Resources/Clang LLVM 1.0.xcspec\n```\n\n此命令将定位 Xcode\
    \ 规范文件（`xcspec`）的路径，并更改到你想要使用的静态分析器所在目录的路径。这有几个目的。第一个目的当然是能够在自己的 Xcode 版本中使用最新版本的分析器，从而获得相同的结果。第二个更重要的目的是，由于\
    \ OS X Server 的 Xcode 服务需要指向有效 Xcode 开发者目录的路径，你将能够通过 Xcode Bot 始终使用最新版本的静态分析器来运行静态分析！既然我们已经了解了它的工作原理，现在让我们更新上一章创建的、运行单元测试的\
    \ Bot，让它也运行静态代码分析。\n\n### 从 Xcode Bot 执行静态分析\n\n打开我们之前创建的 Github Jobs（夜间构建）Bot\
    \ 的设置，将其名称更改为简单的 `Github Jobs`。导航到 `Schedule` 步骤，勾选 `Perform analyze action`，然后按下\
    \ `Save`。按下 `integrate` 手动启动 Xcode Bot，等待其完成。如图 10-2 所示，发现了一个错误，但分析并未因此导致构建失败。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 113](img/index-189_1.jpg)\n\
    \n**第 10 章：质量保证**\n**189**\n"
- fmt: "***Figure 10-2.** The integration is over. The build succeeded but a bug was\
    \ found by the static analyzer* This way, every 5 minutes if you’ve pushed changes\
    \ to your remote repository, your test suite will be run just like before, but\
    \ you’ll also get feedback about your code thanks to the Clang static analysis.\n\
    \nYou are now capable of using your Xcode bot at full potential: running tests,\
    \ static analysis, and archiving the builds. Knowing how easy it was to create\
    \ an Xcode bot from Xcode (apart from the CocoaPods part, indeed) there really\
    \ is no reason not to use them.\n\nIntegrating the static analysis using Clang\
    \ in other continuous integration platforms like Jenkins and Bamboo would be just\
    \ as easy. There is a Jenkins plugin for that, even if it has not been updated\
    \ since March 2013, so you’d have to pray the report format hasn’t changed much\
    \ in the latest releases of the Clang static analyzer. At this time there does\
    \ not seem to be a Bamboo plugin for that, but if you think about it, it would\
    \ not be very hard to integrate it anyway. It needs to call a specific command\
    \ line instruction and archive the result, that would be simple HTML “artifacts”.\
    \ You could then create a deployment process that would publish those results\
    \ to a dedicated web server.\n\nBecause there is nothing new in showing how to\
    \ execute a command line instruction from a Bamboo build, we will instead introduce\
    \ you to an alternative static analyzer: `oclint`.\n\n## Using OCLint to Get Additional\
    \ Feedback\n\nWe mentioned earlier that there are different kinds of static analysis\
    \ tools, as the term static only means that the analysis is performed without\
    \ actually running the code. There are already a lot of checks that Clang static\
    \ analyzer will run for you but OCLint is a tool that can perform other tests\
    \ related to code smells, unused variables, and other general bad practices. Just\
    \ like Clang’s, OCLint comes as a standard executable and can be downloaded from\
    \ the website or compiled manually.\n\nNote that choosing the latter solution\
    \ will cost you a few hours of your time, so you might consider the downloading\
    \ solution.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**190**\n\n\
    **CHAPTER 10: Quality assurance**\n\nNavigate to OCLint download page available\
    \ at [http://oclint.org/downloads.html](http://oclint.org/downloads.html) and\
    \ select the archive of the latest stable build. Download it, decompress the archive,\
    \ and add the `bin` folder to your `PATH`.\n\n```\n$ curl –O http://archives.oclint.org/nightly/oclint-0.9.dev.43e26f7-x86_64-darwin-12.4.0.tar.gz\n\
    $ tar -zxvf oclint-0.9.dev.43e26f7-x86_64-darwin-12.4.0.tar.gz\n$ PATH=$PATH:/Users/Palleas/Tools/oclint-0.9.dev.43e26f7/bin\n\
    $ oclint -version\nLLVM (http://llvm.org/):\nLLVM version 3.3svn\nOptimized build.\n\
    Built Jun 16 2013 (17:54:11).\nDefault target: x86_64-apple-darwin13.2.0\nHost\
    \ CPU: corei7-avx\n```\n\nThe main site explains how to run OCLint on a single\
    \ file, but if you try to do the same on one of the files of your project, you\
    \ will probably get an error saying that the `UIKIt.h` file cannot be found.\n\
    \nThere is a reason why iOS projects are built using `xcodebuild`. Yes, it calls\
    \ Clang under the hood but with very specific parameters about the build settings,\
    \ the warnings to detect, the framework to link, and the flags to add. Remember\
    \ `DEBUG=1`?\n\nOCLint can be run on one single file, but only if it knows exactly\
    \ how to build that file. If you take a look at `xcodebuild` output, you will\
    \ be able to see what command is used for each file. It looks something like this:\n\
    \n```\n/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/clang\
    \ -x objective-c-header -arch armv7s -fmessage-length=145 -fdiagnostics-show-note-include-stack\
    \ -fmacro-backtrace-limit=0 -fcolor-diagnostics -std=gnu99 -fmodules -fmodules-cache-path=/Users/Palleas/\n\
    Library/Developer/Xcode/DerivedData/ModuleCache -Wno-trigraphs -fpascal-strings\
    \ -O0 -Wno-missing-field-initializers -Wno-missing-prototypes -Wno-implicit-atomic-properties\
    \ -Wno-receiver-is-weak\n-Wno-arc-repeated-use-of-weak -Wno-missing-braces -Wparentheses\
    \ -Wswitch -Wunused-function -Wno-unused-label -Wno-unused-parameter -Wunused-variable\
    \ -Wunused-value -Wempty-body -Wuninitialized\n-Wno-unknown-pragmas -Wno-shadow\
    \ -Wno-four-char-constants -Wno-conversion -Wconstant-conversion\n-Wint-conversion\
    \ -Wbool-conversion -Wenum-conversion -Wshorten-64-to-32 -Wpointer-sign -Wno-newline-eof\
    \ -Wno-selector -Wno-strict-selector-match -Wundeclared-selector -Wno-deprecated-implementations\n\
    -DDEBUG=1 -DCOCOAPODS=1 -isysroot /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.\n\
    platform/Developer/SDKs/iPhoneOS7.1.sdk...\n```\n\n(it’s actually three times\
    \ longer than that) Don’t worry, you won’t have to copy this command and run it\
    \ for each file you want to analyze using OCLint. It has an approach similar to\
    \ the one used by Clang static analyzer that acts as a proxy to the build command\
    \ that compiles the application. There is a file format called the “JSON compilation\
    \ database” which specification is available at the following URL: [http://clang.llvm.org/docs/JSONCompilationDatabase.html](http://clang.llvm.org/docs/JSONCompilationDatabase.html).\
    \ Basically this file contains a list of items with a file, a path to the directory\
    \ containing this file, and a command to build this file:\n\n```\n{\n  \"directory\"\
    : \"Github Jobs\",\n  \"file\": \"PCSAppDelegate.m\",\n  \"command\": \"/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/\n\
    bin/clang -x objective-c -arch armv7...\"\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**CHAPTER 10: Quality assurance**\n\n**191**\n\nThis file can be easily generated\
    \ thanks to a Python tool provided by OCLint that will look for the output of\
    \ the `xcodebuild` command and turn it into a `compile_commands.json`. This tool\
    \ is located in the `bin` folder of the OCLint package you’ve downloaded. If,\
    \ as we told you earlier, you put this directory into your `PATH`, then it should\
    \ be available as well. First run the `xcodebuild` command with the proper arguments\
    \ and store the output into a dedicated file, then run the `oclint-xcodebuild`\
    \ tool:\n\n```\n$ xcodebuild -workspace Github\\ Jobs.xcworkspace -scheme Github\\\
    \ Jobs -configuration Debug clean build | tee xcodebuild.log\n$ oclint-xcodebuild\n\
    ```\n\n**Note** that we are using `tee`, a very convenient tool that copies the\
    \ standard input to standard output, while copying it in one or many files. This\
    \ way you can copy the output into a log file but still have a look at the output\
    \ in your terminal.\n\nNow that we have the result of the `xcodebuild` command\
    \ transformed into a proper JSON compilation database file, we are ready to use\
    \ OCLint and actually analyze our files, using a tool that will take the content\
    \ of the JSON compilation database file and transform it into an actual `oclint`\
    \ command.\n\n```\n$ oclint-json-compilation-database\n1 error generated.\n1 error\
    \ generated.\n1 error generated.\n...\n[OCLint (http://oclint.org) v0.8rc1]\n\
    oclint: error: violations exceed threshold\nP1=0[0] P2=30[10] P3=221[20]\n```\n\
    \nThe error message we get is due to the amount of errors OCLint has detected.\
    \ Each error has a priority and there are a maximum number of errors OCLint will\
    \ accept before exiting. By default, less than 20 priority 3 violations are allowed,\
    \ 10 violations for priority 2, and no priority 1 violation can be tolerated.\
    \ When one of these limits is reached, OCLint will exit with a non-zero status\
    \ code that will fail the build."
