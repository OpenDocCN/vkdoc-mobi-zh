    ```


    `xcodebuild` 是那种一旦你学会如何使用，就能为你完成大量工作的工具之一。如果你开始使用命令行，你会经常用到这个命令：`xcodebuild` 用于构建
    Xcode 项目和 workspace，实际上当你按下 `⌘ + B` 时，Xcode 使用的就是这个命令。


    Xcode 依赖 `xcodebuild` 来执行“Product”菜单中的大部分操作，事实上，以下这些功能都可以通过 `xcodebuild` 的“构建动作”来完成：`build`、`analyze`、`archive`、`test`、`install`
    & `installsrc` 和 `clean`。


    让我们回到终端，导航到 Github Jobs Xcode 项目所在的目录，直接切入正题，使用 `xcodebuild` 命令且不带任何选项或参数来构建应用程序。在这种情况下，构建应用程序是默认行为。


