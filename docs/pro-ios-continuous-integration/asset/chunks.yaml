    **49**


    This blob of text is the command run during the xcodebuild process that actually
    invokes clang under the hood. clang is the compiler used by Xcode to compile C,
    C++, and Objective-C, it also provides tools such as a static code analyzer and
    a code-style checking tool. While discussing this in depth is not the goal of
    this chapter, we will cover them more in Chapter 10 when we talk about quality
    assurance. What is important in this paragraph is that clang is invoked with a
    lot of arguments. Xcode manages these arguments when you configure the build settings
    of your application but you can explicitly set some in the “Other linker flags”
    section, as shown in Figure [4-3](#index_split_000.html#p52).


    ***Figure 4-3.** The Other linker flags setting can be used to add framework (QuartzCore)
    and tell the linker to treat source input files* *as Objective-C inputs*


    The issue we are having here comes with the -lPods-Github\ Jobs argument passed
    in the invocation of clang, which doesn’t know about this library that we are
    asking to link the compiled application with - that is because of Cocoapods.


    When you use Cocoapods to declare dependencies in the PodFile, Cocoapods actually
    tweak your project and ask you to use a generated Workspace file. In this workspace,
    you will find your original Xcode project, Github Jobs, and a new one called “Pods.”
    It contains your dependencies that have been downloaded during the execution of
    the pod install which we’ve talked about in Chapter 2.


    When you build the Github Jobs application, the Pods project is actually compiled
    first into a static library that will be linked then with the main application.
    While it is 100% possible to not use a workspace and to use subprojects instead
    to avoid the issue we have been having, this is the default behavior and the way
    Apple recommends you manage your dependencies.


    xcodebuild doesn’t detect automatically when you are using a workspace instead
    of a simple project file, you have to explicitly pass it to xcodebuild using the
    –workspace option. When you use the


    –workspace option, you also have to use the -scheme one or else xcodebuild is
    going to yell at you: $ xcodebuild -workspace Github\ Jobs.xcworkspace -scheme
    Github\ Jobs


