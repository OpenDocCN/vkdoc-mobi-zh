    \ 可执行文件的路径，包括 -sdk 参数，例如 '/Developer/usr/bin/xcodebuild -sdk iphoneos42'`，这在很多方面都是错误的：开发者工具早已从\
    \ `/Developer` 目录移走，并且该字段只要求你传递一个值给 `xcodebuild` 命令的 `-sdk` 参数。如果你按照文档说明操作，由于插件不会检查你输入的是否为有效\
    \ SDK，你最终会尝试用以下命令构建应用程序。\n"
