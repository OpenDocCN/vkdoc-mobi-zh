    These committers are identified by their name and e-mail every time a commit is
    made: $ git show 1e93f4d83499660e63fc9ec21cbd16803f7f4268


    commit 1e93f4d83499660e63fc9ec21cbd16803f7f4268


    Author: Romain Pouclet <palleas@gmail.com>


    Date: Sat May 31 18:38:52 2014 -0400


    Fix script and scheme and stuff


    This also means that if you decide to build an open-source library you found on
    GitHub via an Xcode Bot, the authors might get e-mails about failing builds. Think
    before you integrate!


    We’ll go back to this screen in a few moments so simply click the “Create “ button
    and wait for the magic to happen. It is in fact an awesome feedback to start working
    in the morning and know right away if anything is wrong with the project.


    In the last screen, select both “committers” checkboxes so everyone who contributed
    to the project that is being built will be aware of the result of the nightly
    build.


    **warning/caution** For some reason, Xcode may not be able to automatically open
    the commit panel. If that’s the case, select Source Control > Commit and commit
    your changes manually. It is important if the scheme is not properly scheme, the
    Xcode service will not be able to build your application.


    When you’re ready, navigate to the log navigator, which is the last tab in Xcode’s
    file explorer.


    This is the panel where you’ll find a list of all the actions that we performed.
    If it hasn’t started already, right-click on your Bot and select the “Integrate
    Now” item so you can immediately see the results of your integration, which probably
    failed with an error related to your Podfile. Hang in there, we’ll fix it in the
    next section. First, let’s take a look at the feedback available directly in Xcode.
    The first section, as shown in Figure [8-7](#index_split_002.html#p153), sums
    up was happened during the build: the actual errors, the warnings, the results
    of the static analysis, and the results of the unit tests.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 94](index-153_1.jpg)


    ![Image 95](index-153_2.jpg)


    **152**


    **CHAPTER 8: Day-to-day use of Xcode bots**


    ***Figure 8-7.** The integration failed with three errors and one warning*


    Note that the issues visible on this figure are listed under an “Unresolved Issues”
    section. Because this is actually the first integration ever performed by this
    Bot, these issues are marked as new.


    The second section, as shown in Figure [8-8 shows the list of commits involved
    in an integration that](#index_split_002.html#p153)


    happened later. When a new integration is performed, the bot wil fetch the new
    commits on the remote repository. In case of build failed, you can easily see
    when the error might have been introduced.


    ***Figure 8-8.** The second section of the integration detail shows the list of
    committers involved*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 96](index-154_1.png)


    **CHAPTER 8: Day-to-day use of Xcode bots**


    **153**


    **Note** Git alone is capable of locating where a regression was introduced thanks
    to thègit bisect` command by performing a “binary” search. More information on
    this page:


    [http://git-scm.com/book/en/Git-Tools-Debugging-with-Git#Binary-Search](http://git-scm.com/book/en/Git-Tools-Debugging-with-Git#Binary-Search)


    Let’s have a look at why the integration is failing now. If you look at Figure
    [8-9, you can see err](#index_split_002.html#p154)ors obviously related to Cocoapods:
    the PodFile.lock and the Manifest.lock files cannot be found, nor can the xconfig
    file and we are seeing an error about the sandbox not in sync.


    ***Figure 8-9.** The integration still fails for some reason related to CocoaPods*
    To understand this error, you must first remember what we mentioned in Chapter
    2, about all the tools at our disposal to setup our continuous integration platform.
    One of these tools was the “Run script build phases” that you can add to your
    build process and that will run arbitrary shell scripts.


    Navigate to the “build phases” tab from the details of the Github Jobs target,
    you should see a phase called “Check Pods Manifest.lock” running the following
    script:


    diff "${PODS_ROOT}/../Podfile.lock" "${PODS_ROOT}/Manifest.lock" > /dev/null if
    [[ $? != 0 ]] ; then


    cat << EOM


    error: The sandbox is not in sync with the Podfile.lock. Run ''pod install'' or
    update your CocoaPods installation.


    EOM


    exit 1


    fi


    This script uses the PODS_ROOT, a user-defined build setting that was added by
    CocoaPods the first time you ran the pod install command, to locate both Podfile.lock
    and Manifest.lock files. This file contains information about your dependencies,
    so that the next time you or one of the people working with you need to instal
    the latest version of your project, the dependencies wil be instal ed at the same
    versions. With the two paths to those files, it then uses the diff command to
    compare those files. If they don’t match, it means that the dependencies currently
    bundled with your project are not at the proper version. You fix this problem
    by running the pod install from your project’s directory.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **154**


    **CHAPTER 8: Day-to-day use of Xcode bots**'
