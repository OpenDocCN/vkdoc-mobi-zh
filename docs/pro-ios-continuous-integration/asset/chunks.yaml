    \    </array>\n</dict>\n</plist>\n```\n\n## Chapter 4: Invoking the Power of the\
    \ Command Line\n\nThe `PlistBuddy` executable is your day-to-day tool to interact\
    \ with property list files easily. It is not in your `PATH` by default and cannot\
    \ be found using `xcrun` because it is not a developer tool per se. We will save\
