- fmt: "实际上，这并不完全正确。苹果还提供了一个企业计划，你可以用它来向更多用户发布 App Store 之外的应用程序。该计划不是为了取代 App Store，而是帮助部署内部应用。事实上，无法使用此类账户在\
    \ App Store 上发布应用。不过，当你面临这些情况时，它非常有用，因为你不需要选择一组唯一的设备标识符。该计划主要针对公司，并且需要付出一定代价：每年约\
    \ 300 美元。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 77](index-122_1.jpg)\n\
    \n![Image 78](index-122_2.jpg)\n\n**120**\n\n**CHAPTER 7: Over-The-Air distribution**\n\
    \n一旦你选择了设备，请执行以下步骤：\n\n1. 为你的配置文件命名。建议取一个含义明确的名称，例如 `Github Jobs Ad Hoc Distribution`。当你需要管理大量配置文件时，这样做将来会感谢你自己。\n\
    2. 准备就绪后，按下继续按钮。现在你将面临一个选择：下载生成的配置文件并手动添加，或者从 Xcode 的首选项面板中，导航到 `Accounts` 选项卡，点击\
    \ `View details` 按钮，然后点击 `刷新` 按钮。两种情况下，你应该都能在列表中看到它，如图 7-2 所示。\n\n***Figure 7-2.**\
    \ 配置文件在 Xcode 中可用，并可用于 Github Jobs 应用程序*\n\n3. 在 Xcode 中，打开 `Github Jobs` 项目，导航到\
    \ `Github Jobs` 目标的构建设置，找到配置文件部分。你应该能够从列表中选择 `Github Jobs Ad Hoc Distribution`\
    \ 配置文件用于 Adhoc 配置，如图 7-3 所示。\n\n***Figure 7-3.** 使用 Adhoc 配置构建的应用程序将使用我们的新配置文件*\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 79](index-123_1.jpg)\n\
    \n**CHAPTER 7: Over-The-Air distribution**\n\n**121**\n\n既然一切都配置妥当，让我们开始构建并打包应用程序。在本书的这一点上，你应该能够选择运行项目文件夹中\
    \ `bin/cibuild` 的持续集成构建脚本，或者暂时直接使用 Xcode。别担心；我们将在下一节中自动化所有操作。\n\n打开浏览器，用你之前创建的账户登录\
    \ TestFlight。系统会提示你创建一个新团队。点击 `create a new team` 按钮，并在团队名称字段中填写例如 `Github Jobs\
    \ beta testers`。确保选择一个明确的名称，这样将来管理多个团队时会更容易。\n\n在 TestFlight 中，团队是用户列表，可用于轻松设置权限。例如，你可能希望拥有一个专门负责安全的用户团队，在向你的“常规”测试者发布新版本之前，先向他们发送修复重大安全漏洞的构建版本。按下保存按钮。你将被重定向到专门用于上传新构建的页面。如果没有，请从仪表板点击\
    \ `Upload a build` 按钮。\n\n打开一个访达窗口，将刚刚构建的 IPA 文件拖放到为此目的创建的区域中，并在文本区域中填写此版本的新内容。如果你按正确顺序阅读了本书，那么此时此版本带来的主要更改将是“将导航栏中的标题变为绿色”。这是一个非常简单的应用，因此在发布说明中确实没有太多可说的，但在实际项目中，当你编写这些说明时应该格外小心。没有人喜欢简单的“Bug\
    \ 修复和新功能”这类发布说明，当人们足够好奇并有动力使用你应用的测试版时，他们更希望看到细节。\n\n准备就绪后，按下上传按钮，检查列表中被授权的用户，然后按下\
    \ `Update and notify`，这意味着被允许安装注册到 TestFlight 的应用的用户将收到一封包含下载应用新版本链接的电子邮件。你也可以直接手动向他们发送链接。\n\
    \n这就是你向测试者发送应用测试版所需做的全部工作。\n\n当然，从他们那里收集唯一的设备标识符以便生成新的配置文件有点繁琐，但总体而言，你会承认 TestFlight\
    \ 在简化空中分发流程方面做得非常出色。如果一切正常，你应该会在 TestFlight 仪表板的 App 部分看到该构建，如图 7-4 所示。\n\n***Figure\
    \ 7-4.** 应用程序在 TestFlight 仪表板中可见，显示最新上传的构建*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**122**\n\n**CHAPTER 7: Over-The-Air distribution**\n\nTestFlight 高级用户指南\n\n\
    我们刚刚解释的流程有一个很大的缺点：它是 100% 手动的，而这正是我们在设置 Jenkins 或 Bamboo 时试图避免的（取决于你选择的解决方案）。\n\
    \n幸运的是，对于我们来说，TestFlight 是一个面向应用程序开发者的工具，并且附带了一个 REST API！\n\n1. 点击屏幕右上角的个人资料，选择\
    \ `Account Settings`。\n2. 在左侧菜单中，选择 `Upload API`：这里你将找到进行经过身份验证的 API 调用所需的令牌。\n\
    3. 点击顶部菜单中的 `Github Jobs beta testers`，然后点击 `edit info` 按钮：这里你将找到团队令牌，当你更新新构建时，它用于实际验证你的身份。\n\
    \n剩下的过程只需一个简单的 `curl` 命令。在导航到存储生成的 IPA 文件的构建文件夹后，运行以下命令：\n\n```\n$ cd ~/Projects/GithubsJobs/build\n\
    \n$ curl http://testflightapp.com/api/builds.json \\\n  -F file=@Github\\ Jobs.ipa\
    \ \\\n  -F api_token=Nx4b86M2NM1c2SfjM2S0D6xM90g3fN70c1c8xNAeeo7oEaefD64NccDE0fywM72zj202Ai4_DeMf\
    \ \\\n  -F team_token=zNwS5M3_A4I4S7jb630N7AbN30I28xa4Cxz6MNa5o6Mx4Oazec8NS7gd1EdMDa5826joy20Ny1D3\
    \ \\\n  -F notes='Turning the titles green in the navigation bar'\n\n{\n  \"bundle_version\"\
    : \"0.1 (14)\",\n  \"install_url\": \"https://testflightapp.com/install/5fU8c083f9fTebaMd3d342edD2Mz4dc-47z65cMEdxUa/\"\
    ,\n  \"config_url\": \"https://testflightapp.com/dashboard/builds/permissions/10335151/\"\
    ,\n  \"created_at\": \"2014-05-19 22:39:21\",\n  \"device_family\": \"iPhone\"\
    ,\n  \"notify\": false,\n  \"team\": \"Github Jobs\",\n  \"minimum_os_version\"\
    : \"7.1\",\n  \"release_notes\": \"Turning the titles green in the navigation\
    \ bar\",\n  \"binary_size\": 108686\n}\n```\n\n无需打开浏览器就能向 TestFlight 发送新构建就是这么简单，正因为如此简单，我们才能实现在\
    \ Jenkins 或 Bamboo 构建结束时自动发送构建。请注意，要使此命令生效，你需要使用 `cd` 命令导航到 IPA 文件所在的文件夹。同时检查你的文件是否确实命名为\
    \ `Github Jobs.ipa`。如果这两个条件中的任何一个不满足，你会得到一个错误：`curl: (xx) couldn't open file \"\
    Github Jobs.ipa\"`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image\
    \ 80](index-125_1.png)\n\n**CHAPTER 7: Over-The-Air distribution**\n\n**123**\n\
    \n在 Jenkins 构建结束时将应用上传到 TestFlight"
  raw: 'Actually, that’s not completely true. Apple also proposes an enterprise program
    that you can use to release applications outside the App store to a more important
    number of users. It is not meant to replace the app store but to help deploy in-house
    applications. In fact it is not possible to use such an account to release applications
    on the App Store. However, it comes in handy when in those situations because
    you don’t have to select a list of unique device identifiers. This plan really
    targets companies and comes at a price: around $300 a year.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 77](index-122_1.jpg)


    ![Image 78](index-122_2.jpg)


    **120**


    **CHAPTER 7: Over-The-Air distribution**


    Once you’ve selected your devices, perform the following steps:


    1\. Give a name to your provisioning profile. Don’t hesitate to make it an obvious


    one, such as “Github Jobs Ad Hoc Distribution”. The future wil thank you


    when you get to a gigantic amount of provisioning profile to manage.


    2\. Once it’s ready, press the continue button. You will now have a choice:


    download the generated provisioning profile and add it manually or from


    Xcode’s preferences panel, navigate to the Accounts tab, click on the View


    details button and hit the refresh button. In both cases, you should see it in


    the list, as shown in Figure [7-2.](#index_split_002.html#p122)


    ***Figure 7-2.** The provisioning profile is available in Xcode and can be used
    for the Github Jobs application* 3\. From Xcode, open the Github Jobs project,
    navigate to the build settings


    of the Github Jobs’ target and look for the provisioning profile section. You


    should be able to select the “Github Jobs Ad Hoc Distribution” one from the


    list for the Adhoc configuration, as shown in Figure [7-3.](#index_split_002.html#p122)


    ***Figure 7-3.** The application built with the Adhoc configuration will use our
    new provisioning profile*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 79](index-123_1.jpg)


    **CHAPTER 7: Over-The-Air distribution**


    **121**


    Now that everything is properly configured, let’s build and package the application.
    At this point in the book, you should be able to choose from running the continuous
    integration building script at “bin/cibuild” in your project’s folder or simply
    using Xcode, for now. Don’t worry; we’ll automate everything in the next section.


    Open your browser and log into TestFlight with the account you created earlier.
    You should be prompted to create a new team. Click on the “create a new team”
    button and fill in the team name field with “Github Jobs beta testers” for example.
    Make sure to choose an explicit name, it will be easier for you later when you’ll
    manage multiple teams.


    In TestFlight, teams are lists of users that can be used to setup permissions
    easily. For example, you may want a team of users dedicated to security whom you
    will send builds that fix major security breaches to first, before releasing a
    new version to your “regular” beta testers. Press the save button. You should
    be redirected to the page dedicated to uploading a new build. If you’re not, from
    the dashboard, click on the “Upload a build” button.


    Open a finder window, drag and drop the IPA file you’ve just built in the zone
    created for this purpose and fill in the text area what’s new with this version.
    If you’ve read this book in the right order, at this point the major change coming
    with this version would be “Turning the titles green in the navigation bar”. This
    is a very simple app so, there is indeed not much to say in the release notes,
    but in a real-world context, you should take extra care when you write those notes.
    Nobody likes a simple “Bug fixes and new features” release notes, your user want
    details and that could not be more true when people are curious and motivated
    enough to use the beta versions of your application.


    When you’re ready press the upload button, check the authorized users in the list
    and press “Update and notify”, which means that the user allowed to install the
    applications that registered into TestFlight will get an e-mail containing a link
    to download the new version of the application. You can also simply send them
    the link manually.


    That’s pretty much all you need to do to send a beta version of your application
    to your beta testers.


    Of course gathering unique device identifiers from them so you can generate a
    new provisioning profile is a bit tedious but overall you’ll admit that TestFlight
    did a great job of easing the process of over the air distribution. If everything
    worked, you should see the build in the App section of your TestFlight Dashboard,
    as shown in Figure [7-4.](#index_split_002.html#p123)


    ***Figure 7-4.** The application is visible in the TestFlight dashboard, showing
    the latest uploaded build*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **122**


    **CHAPTER 7: Over-The-Air distribution**


    TestFlight for the power user


    The process we’ve just explained has one big downside: it’s 100% manual, and that’s
    what we’ve been trying to avoid when you set up Jenkins or Bamboo, depending on
    which solution you choose.


    Fortunately for us, TestFlight is a tool for applications developers and comes
    with a REST API!


    1\. Click on your profile at the top right of the screen and select “Account


    Settings”.


    2\. In the left menu, select “Upload API”: this is where you will find the token


    required to make authenticated calls to the API.


    3\. Click on the “Github Jobs beta testers” in the top menu and click on the “edit


    info” button: this is where you will find the team token, needed to actually


    authenticate you when you’ll update a new build.


    The rest of the process is a simple curl command away. After navigating to the
    build folder where the generated IPA file was stored, run the following command:


    $ cd ~/Projects/GithubsJobs/build


    [$ curl http://testflightapp.com/api/builds.json](http://testflightapp.com/api/builds.json)
    \


    -F file=@Github\ Jobs.ipa \


    -F api_token=Nx4b86M2NM1c2SfjM2S0D6xM90g3fN70c1c8xNAeeo7oEaefD64NccDE0fywM72zj202Ai4_DeMf
    \


    -F team_token=zNwS5M3_A4I4S7jb630N7AbN30I28xa4Cxz6MNa5o6Mx4Oazec8NS7gd1EdMDa5826joy20Ny1D3
    \


    -F notes=''Turning the titles green in the navigation bar''


    {


    "bundle_version": "0.1 (14)",


    "install_url": " [https://testflightapp.com/install/5fU8c083f9fTebaMd3d342edD2Mz4dc-](https://testflightapp.com/install/5fU8c083f9fTebaMd3d342edD2Mz4dc-47z65cMEdxUa/)


    [47z65cMEdxUa/",](https://testflightapp.com/install/5fU8c083f9fTebaMd3d342edD2Mz4dc-47z65cMEdxUa/)


    ["config_url": "https://testflightapp.com/dashboard/builds/permissions/10335151/](https://testflightapp.com/dashboard/builds/permissions/10335151/)",


    "created_at": "2014-05-19 22:39:21",


    "device_family": "iPhone",


    "notify": false,


    "team": "Github Jobs",


    "minimum_os_version": "7.1",


    "release_notes": "Turning the titles green in the navigation bar",


    "binary_size": 108686


    }%


    That’s how easy it is to send a new build to TestFlight without having to open
    the browser, and it’s because of this simplicity that we’ll be able to send the
    build automatically at the end of a Jenkins or a Bamboo build. Note that for this
    command to work, you need to navigate (using the “cd”


    command) to the folder where the IPA file is stored. Also check that your file
    is actually named


    “Github Jobs.ipa”. If one of these two criteria is not met, you’ll get a “curl:
    (xx) couldn’t open file


    “Github Jobs.ipa”.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 80](index-125_1.png)


