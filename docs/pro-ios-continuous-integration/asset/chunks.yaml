    **练习：在任务结束时发送新的IPA文件**


    如果你对Web开发也感兴趣，这里有一个简单的练习。在Jenkins或Bamboo任务结束时，将新的IPA文件发送到你的Web服务器，这样你就可以随时下载最新版本的构建产物。


