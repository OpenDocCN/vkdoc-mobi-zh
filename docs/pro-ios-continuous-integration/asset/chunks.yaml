    ### About Version Numbers


    Xcode, and more specifically the iOS application archives, are well designed enough
    to allow you to keep version numbers meaningful. If you are not sure what version
    number you should use, reading the semantic versioning specification available
    on `semver.org` might be a good start. It’s not as boring as it sounds!


    We now have the `0.1` version of our application. It’s not pretty and it doesn’t
    do many things besides loading a simple JSON file and displaying the results in
    a table view. We mentioned earlier that reading this book would be like taking
    a journey. Well, we have the earliest version possible of our application and
    it’s a good time to start setting up the continuous integration of our project.
    Being able to build the application many times a day and sending a build to a
    selected bunch of users is all about collecting feedback. Let’s start with an
    important one that will help us understand why our application crashed, a.k.a.
    crash logs.


    ## Collecting Feedback from Crash Logs


    There are multiple kinds of feedback you hope you will get once your build is
    out to your QA team, to your beta testers, or to your client. There is the obvious
