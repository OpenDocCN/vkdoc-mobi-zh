    \n注意，每个测试用例类都带有 `setUp` 和 `tearDown` 方法。这两个方法将分别在每个测试用例之前和之后被调用。这意味着我们的测试文件每次都会被加载。这看起来可能有点浪费资源，但在这种特定情况下，这不是你需要担心的问题。为\
    \ `PCSJobOfferTests` 类添加一个 `NSDictionary` 类型的 `jobPayload` 属性，并在 `setUp` 方法中编写以下代码：\n\
    \n```\n- (void)setUp\n{\n    [super setUp];\n    NSString *path = [[NSBundle bundleForClass:\
