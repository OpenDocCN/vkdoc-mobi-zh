    \n![图 89](img/index-145_1.jpg)\n\n**144**  \n**第 8 章：Xcode bots 的日常使用**\n\n点击\
    \ `Users` 部分左下角的加号，并根据图 8-2 填写表单，信息自定。请注意，我们还为该用户添加了“internship”标签，并添加了一段简短的信息说明。重要的是，我们并没有选择创建一个实际用户，而只创建了一组凭据。这就是为什么在\
    \ `Home folder` 中，你会选择“None – Service only”：我们只希望 Camille 能够管理机器人。我们也可以使用类似的面板将我们的新用户分配到一个实习生组等等，但是\
    \ a) 这有点超出了本书的范围，b) 对于像我们这样简单的项目来说，这太过复杂了。按下 `Create` 按钮，然后返回 `Xcode` 的服务管理。\n\
    \n***图 8-2.** 实习生 Camille 将能够使用她的凭据访问某些服务*\n\n让我们调整一下权限，使得只有管理员和我们的实习生能够创建机器人，并且只有登录用户才能查看所有机器人。为此，点击权限部分旁边的\
    \ `edit` 按钮。在第一个组合框中选择“only some users”，点击加号，并在出现的字段中搜索 Camille。同时，勾选面板底部的复选框，并在其旁边的组合框中选择“only\
    \ logged in users”。最后，按 `OK`。\n\n此部分下方是有关构建将如何执行的更多信息。你首先看到的是将用于构建应用程序的 `Xcode`\
    \ 版本。如果你还记得我们在第 3 章中讨论的内容，可以使用 `xcode-select` 或 `DEVELOPER_DIR` 环境变量在开发者目录之间切换。这基本上就是本节的目的，只是在这里你拥有一个用户界面，并且当你尝试选择无效的\
    \ `Xcode` 应用程序时，会收到一条稍微令人困惑的错误消息：“此应用程序无法与 OS X Server 一起使用。”\n\n`Xcode` 服务还可以使用凭据连接到你的现有\
    \ Apple 开发者账户，以便自动下载代码签名身份和配置文件。点击 `Developer teams` 部分附近的 `Add` 按钮，并填写你的凭据。如果此\
    \ Apple 标识链接到多个团队，请选择你希望用于此 `OS X Server` 安装的团队。如果你只属于一个团队，只需确认你确实希望将此服务器添加到你的团队即可。\n\
    \n最后但同样重要的是，适用于 `OS X Server` 的 `Xcode` 服务将能够同时在多个设备上运行测试。即使我们将在下一章中介绍单元测试，也请将你的一个设备插入运行\
    \ `OS X Server` 的计算机，并等待它检测到该设备。\n\n我们已使 `Xcode` 服务在我们的本地网络上可用，设置了基本权限，配置了开发者目录（它将在此目录中找到构建应用程序所需的所有工具），最后配置了我们的\
    \ Apple 开发者账户并插入了一个设备。最终，你的服务配置应如图 8-3 所示。\n\n***图 8-3.** 一切均已正确配置，Xcode 服务现已准备好为我们工作*\n\
    \n此新版本的一个出色功能是，`OS X Server` 现在能够托管 Git（以及 SVN，但……）仓库，并连接到现有仓库，如“Repositories”部分所示。\n"
- fmt: "# Day-to-Day Use of Xcode Bots\n\n## Xcode 6\n\n`Xcode 5` was a very important\
    \ release for many developers. It came with a lot of upgrades and fixes for interface\
    \ builder, especially for Auto Layout. What’s even more important is that it came\
    \ with integration with OS X server, thanks to the `Xcode` service we configured\
    \ earlier. At the `WWDC 2014`, Apple announced a new version of `Xcode`, which\
    \ is even better.\n\nJust like `iOS 7.0`, the beginning of the communication between\
    \ `Xcode` and the OS X server were a little rough. This section will cover how\
    \ to setup a continuous integration architecture for your project using only Apple\
    \ technologies.\n\n## Continuous Integration\n\nBeing able to run unit tests from\
    \ a single keystroke or compiling, archiving, and packaging an application using\
    \ a couple of steps is nothing new. The first one has the downside of taking time\
    \ that you don’t necessarily have and most of the time the developer will forget\
    \ to do so, which would make your test suite pointless. The second one is a boring\
    \ process. To fix that, we discovered a few tools that we could use directly or\
    \ wrap into build scripts, like Facebook’s `xctool` or Marin Usalj’s `xcpretty`.\n\
    \nWith `Xcode 5`, we finally were capable of running the iOS unit tests from the\
    \ command line (more information on that later) which would make it possible to\
    \ automate their execution from our continuous integration platform. More importantly,\
    \ we are now capable of configuring our continuous integration platform directly\
    \ from `Xcode`.\n\n## Communicating with Xcode Service from Xcode\n\nOpen `Xcode`’s\
    \ preferences (or hit `⌘ + ,` with Xcode open) and select the accounts section.\
    \ Hit the plus sign at the bottom-left corner of the window and select “Add server…”\
    \ from the menu that appears. If everything is working as expected and you don’t\
    \ have a proxy that would prevent it, you should see that your server has been\
    \ automatically discovered on your local network, thanks to Bonjour, as shown\
    \ in Figure 8-4.\n\n![Image 91](index-148_1.jpg)\n\n**Figure 8-4.** The instance\
    \ of OS X server we’ve set up is automatically discovered on the local network\n\
    \n**Note** Bonjour: Bonjour is Apple’s implementation of the zero-configuration\
    \ networking group. Originally called “RendezVous”, Bonjour can be used to locate\
    \ other computers using multicast Domain Name System (mDNS) service record.\n\n\
    Note that a similar behavior could be achieved with Jenkins, as it will respond\
    \ with an XML-based message containing information about the installation if you\
    \ send an UDP broadcast on your network, as shown in the following command:\n\n\
    ```\n$ echo \"Hey Jenkins\" | nc -u 0.0.0.0 33848\n\n<hudson>\n  <version>1.560</version>\n\
    \  <url>http://localhost:8080/</url>\n  <server-id>990ad56b5659020020aee81d644db8ca</server-id>\n\
    \  <slave-port>57621</slave-port>\n</hudson>\n```\n\nThis is useful if you want\
    \ to make sure that your instance or instances of Jenkins master and slaves are\
    \ reachable from one to another.\n\nSelect your OS X Server from the list and\
    \ press the **Next** button. In the window that appears, enter the credentials\
    \ you’ve chosen for the intern and press **OK**. Note that a **Guest** access\
    \ is available but since we’ve configured it this way, it won’t be able to access\
    \ the existing bots, let alone create one.\n\nNow that we have added our OS X\
    \ server to `Xcode`, open the Github Jobs for iOS application and from the **Product**\
    \ menu select the “Create Bot…” item.\n\n## What Is a Bot?\n\nIf you remember\
    \ correctly how our jobs worked both with Bamboo and Jenkins, they all started\
    \ with a simple step: getting the latest version of the sources from a remote\
    \ repository and then, the build could start. An Xcode Bot is no different. In\
    \ fact, what’s a bot?\n\nAn Xcode Bot is similar to an Xcode scheme in that they\
    \ both are a set of packaged information and instructions. A bot will contain\
    \ a reference to a remote repository that it has access to and other information\
    \ about the project to build: when, how, and what then.\n\nWhen you set up a bot,\
    \ and we’ll cover this part in a second, you have to decide, like pretty much\
    \ any continuous integration platform, when you want to build a project. Once\
    \ this is decided, you have to decide how the project is going to be built: which\
    \ shared scheme is it going to use? Should it run static code analysis? Should\
    \ it run the test suite and if it does, should it run the tests in the simulator\
    \ or on the plugged devices? Should it archive the build?\n\nFinally, you have\
    \ to decide what to do at the end of the build. For example, if it failed, should\
    \ you send an e-mail to the team?\n\nAll of this information is contained in a\
    \ bot that we will use to build the application from the OS X Server instance.\n\
    \n## Setting Up Github Jobs\n\nA great feature of the new OS X server is the ability\
    \ to host git repositories, which makes it technically a viable replacement for\
    \ third-party services such as Github or Bitbucket. Of course, that is not entirely\
    \ true since these services do not only provide hosting but also pull requests,\
    \ release management, and things like that. In this section, we’ll see how to\
    \ create our very first bot, give access to our remote repository to Xcode server\
    \ and see what can be done to manage the dependencies.\n\n## Nightly Build of\
    \ Github Jobs for iOS Using Xcode Bots\n\nA bot is capable of different things:\
    \ running tests, using code static analysis, and archiving the application. Because\
    \ we are saving the best for the end of this book, we will only create a bot that\
    \ will archive the build every night.\n\nWe mentioned earlier that the information\
    \ provided by an Xcode Bot was the scheme that should be used to build the application.\
    \ If we use the command line to get a quick look at the available schemes, here\
    \ is what we get:\n\n```\n$ xcodebuild -list\n\nInformation about project \"Github\
    \ Jobs\":\n\nTargets:\n  Github Jobs\n  Github JobsTests\n\nBuild Configurations:\n\
    \  Debug\n  Adhoc\n  Release\n```\n\n![Image 92](index-150_1.jpg)\n\nIf no build\
    \ configuration is specified and `-scheme` is not passed then `Release` is used.\n\
    \nSchemes:\n- Github Jobs\n\nThe only scheme available is the Github Jobs scheme\
    \ we used in our script to build the application via Bamboo or Jenkins. Open the\
    \ “Manage Scheme” panel from `Xcode`, open the details of this scheme and uncheck,\
    \ if needed, the **Shared** checkbox. Close the “manage schemes” window and go\
    \ back to the bot creation window. If you try to use that scheme to build the\
    \ Github Jobs for iOS application, a “Share scheme” checkbox will be automatically\
    \ checked, as shown in Figure 8-5, and if you try to uncheck that scheme, the\
    \ **OK** button will be disabled.\n\nWe already covered the scheme-sharing problem\
    \ in Chapter 3 and we mentioned how easy it was to forget about this option. That’s\
    \ yet another advantage of using a tool dedicated to `Xcode` projects: you simply\
    \ can’t create an Xcode Bot based on a non-shared scheme.\n\nFill in the **Name**\
    \ field with a dedicated name for your nightly build bot. Feel free to get creative\
    \ – after all, what is the point of using tools referencing robots if you can’t\
    \ give them awesome names? We’ll call ours “Klaus”.\n\nMake sure the server selected\
    \ is the one you set up in the previous section and, as shown in Figure 8-5, make\
    \ sure the “Commit changes and integrates immediately” option is checked.\n\n\
