    ***Figure 9-9.** 测试报告可从构建详细信息页面的选项卡中获取*


    我们已经介绍了两个持续集成平台，接下来让我们再使用苹果的持续集成解决方案——`XCode`机器人——运行一次测试。


    ## 使用`Xcode`机器人运行测试


    我们已经创建了一个机器人，其唯一目的是构建应用程序，然后将其存档以便用户可以下载。这个机器人名为“`Github Jobs (nightly build)`”，并且每天凌晨1:00运行一次。我们可以简单地将测试执行添加到其任务列表中，但我们将创建一个新的机器人，以便每次我们向远程仓库推送新提交时运行单元测试。'
