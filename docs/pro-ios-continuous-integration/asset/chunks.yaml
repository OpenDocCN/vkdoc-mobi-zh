- fmt: "Homebrew requires the Xcode command line tools to work properly, so go back\
    \ a few pages if you don’t remember how to easily install them!\n\nWe have installed\
    \ `xctool` in the `~/Tools/xctool` directory. That is why we should be calling\
    \ the `xctool.sh` script using a relative path, like this:\n\n```\n$ ~/Tools/xctool/xctool.sh\
    \ -v\n0.1.15\n```\n\nThat’s definitely not ideal though. That is why we will be\
    \ using another environment variable called `$PATH`. This variable contains a\
    \ list of all the directories accessible to the user containing an executable\
    \ tool, separated by a colon. Let’s add our `xctool` installation folder to this\
    \ list.\n\n```\n$ export PATH=$HOME/Tools/xctool:$PATH\n```\n\nPlease note that\
    \ there is no way to simply push a value to this path variable, that’s why we\
    \ are simply concatenating the `~/Tools/xctool` directory to the beginning of\
    \ the existing variable and that is why you have to be extra careful when you\
    \ modify this environment variable.\n\n`xctool` is similar to `xcodebuild` in\
    \ many ways: most of the options and arguments are the same. The tool itself is\
    \ a bit stricter though, you won’t be able to call it without at least specifying\
    \ a `-scheme` argument. In our case we also want to build a workspace and not\
    \ a simple Xcode project (the default behavior) and we want to use the `AdHoc`\
    \ configuration. That’s why we use the `--workspace` and the `-configuration`\
    \ arguments:\n\n```\n$ xctool.sh -workspace Github\\ Jobs.xcworkspace -scheme\
    \ Github\\ Jobs\n[Info] Loading settings for scheme 'Github Jobs' ... (1142 ms)\n\
    === BUILD ===\nxcodebuild build Github Jobs\nPods / Pods-Github Jobs-SVProgressHUD\
    \ (AdHoc)\n√ Check dependencies (111 ms)\n√ Write auxiliary files (7 ms)\n...\n\
    ```\n\nThe first thing to note is that the output of `xctool` is much more clear.\
    \ No longer a huge, hard to understand pile of text, you now have a grouped output\
    \ of all the major steps of the build process.\n\nIf you’ve run the command on\
    \ your computer too, you should have noticed that the output also comes with colors.\n\
    \nThe advantages of `xctool` are numerous. It is one thing to be all shiny and\
    \ pretty, it is a whole other thing to provide actually helpful features. `xctool`\
    \ provides different reporters in addition to the pretty (default) one, making\
    \ it easier to integrate with continuous integration tools such as Jenkins, which\
    \ we will cover in the next chapter. It also supports a JSON-based configuration\
    \ file format so calling `xctool` stops being a pain. To use it, simply create\
    \ a `.xctool-args` file with the following content:\n\n```\n[\n  \"-workspace\"\
    , \"Github Jobs.xcworkspace\",\n  \"-scheme\", \"Github Jobs\",\n  \"-configuration\"\
    , \"AdHoc\"\n]\n```\n\nThanks to this file, it is now possible to invoke `xctool`\
    \ without option or argument and have it build the application using the proper\
    \ workspace and scheme.\n\nEven if `xctool` is a really great tool, you have to\
    \ remember once again that this is no silver bullet.\n\nAs mentioned earlier,\
    \ `xctool` is an alternative building solution for iOS and OSX projects to the\
    \ Apple’s `xcodebuild`, maintained by Facebook. For example, this means the tool\
    \ could break with new releases of the Apple developer tools. In fact, for a long\
    \ time, `xctool` was not able to build Xcode 5.1 projects.\n\nThat is why you\
    \ should also consider other solutions such as `xcpretty`. Its creator, Marin\
    \ Usalj chose a different approach. Instead of creating a new build tool to fix\
    \ the output readability problem, he chose to format it and make it pretty.\n\n\
    ## Formatting `xcodebuild` output using `xcpretty`\n\nThe easiest way to install\
    \ `xcpretty` is, just like any other Ruby tool, to use Rubygem.\n\n```\n$ gem\
    \ install xcpretty\n```\n\nUsing `xcpretty` is then really straightforward. All\
    \ you have to do is leverage a shell functionality called pipes.\n\n```\n$ xcodebuild\
    \ -workspace Github\\ Jobs.xcworkspace -scheme Github\\ Jobs -configuration AdHoc\
    \ build | xcpretty -c\n▸ Building Pods/Pods-Github Jobs-SVProgressHUD [AdHoc]\n\
    ▸ Precompiling Jobs-SVProgressHUD-prefix.pch\n▸ Precompiling Jobs-SVProgressHUD-prefix.pch\n\
    ▸ Precompiling Jobs-SVProgressHUD-prefix.pch\n▸ Precompiling Jobs-SVProgressHUD-prefix.pch\n\
    ▸ Precompiling Jobs-SVProgressHUD-prefix.pch\n▸ Precompiling Jobs-SVProgressHUD-prefix.pch\n\
    ▸ Compiling Pods-Github\\ Jobs-SVProgressHUD-dummy.o Pods-Github\\ Jobs-SVProgressHUD-dummy.m\n\
    ▸ Compiling Pods-Github\\ Jobs-SVProgressHUD-dummy.o Pods-Github\\ Jobs-SVProgressHUD-dummy.m\n\
    ▸ Compiling SVProgressHUD.m\n▸ Compiling SVProgressHUD.m\n▸ Compiling Pods-Github\\\
    \ Jobs-SVProgressHUD-dummy.o Pods-Github\\ Jobs-SVProgressHUD-dummy.m\n▸ Compiling\
    \ SVProgressHUD.m\n...\n```\n\nThe output, once formatted, is pretty similar to\
    \ the one generated by `xctool`: grouped into the main steps of the build and\
    \ the `-c` option adds some color to the output. Just like `xctool`, it also provides\
    \ multiple formatters, such as `junit` to easily integrate – like `xctool` – with\
    \ Jenkins but also `html`, `tap`, or `rspec`.\n\nThe goal of this chapter is not\
    \ to tell you that `xcpretty` does a better job than `xctool`, it’s only about\
    \ giving you the alternatives. Both of these solutions are about providing a better\
    \ output, especially the `junit` one that will come in handy when we set up our\
    \ unit tests in Jenkins and Bamboo in the following chapters.\n\n## Anatomy of\
    \ an Xcode Project File and Scheme Sharing\n\nNow that you’ve discovered how to\
    \ build an iOS application from the command line using two different tools, you\
    \ may have noticed a common behavior from both: they all need a valid Xcode project\
    \ file or workspace (which is basically a glorified folder of Xcode projects)\
    \ and more importantly, they both need a valid scheme.\n\nYou’ve already worked\
    \ with Xcode targets, knowingly or not. A target specifies the product to build\
    \ and how to build it using build phases such as compiling sources, copying headers\
    \ and resources, and linking frameworks and build settings. In our “Github Jobs”\
    \ Xcode project, we already have two targets - one for the main application and\
    \ one that runs the unit tests. You can have as many targets as you see fit, and\
    \ some targets can depend on others. A scheme is basically a collection of targets,\
    \ among other things and can be stored at different levels: project level and\
    \ workspace level. You can see a list of all the available schemes from the command\
    \ line by using the `-list` argument of the `xcodebuild` command.\n\n```\n$ xcodebuild\
    \ -list\nInformation about project \"Github Jobs\":\nTargets:\n    Github Jobs\n\
    \    Github JobsTests\nBuild Configurations:\n    Debug\n    AdHoc\n    Release\n\
    If no build configuration is specified and -scheme is not passed then \"Release\"\
    \ is used.\nSchemes:\n    Github Jobs\n```\n\nIf you run the same command within\
    \ the workspace file, you should only see the schemes that were automatically\
    \ generated by Cocoapods when it created the workspace the first time you ran\
    \ the `pod install` command.\n\n```\n$ xcodebuild -list -workspace Github\\ Jobs.xcworkspace\n\
    Information about workspace \"Github Jobs\":\nSchemes:\n    Pods-Github Jobs\n\
    \    Pods-Github Jobs-SVProgressHUD\n```\n\nIn our case, we only care about the\
    \ “Github Jobs” scheme. That is the one we’ve been using so far.\n\nBy the way,\
    \ don’t let the message about the “Release” configuration fool you; you actually\
    \ need to pass a valid scheme argument to the `xcodebuild` command when your project\
    \ uses a workspace.\n\nIn fact, if you don’t, you will get the following error:\n\
    \n```\n$ xcodebuild -workspace Github\\ Jobs.xcworkspace build\nxcodebuild: error:\
    \ If you specify a workspace then you must also specify a scheme. Use -list to\
    \ see the schemes in this workspace.\n```"
