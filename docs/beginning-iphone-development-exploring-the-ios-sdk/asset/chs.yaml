  \ **iOS Simulator → Reset Content and Settings…**。\n\n### 启动屏幕\n\n在继续之前，我们还需要讨论一件事。当您启动应用程序时，您可能注意到了在应用程序加载过程中出现的以白色为主的启动屏幕。iOS\
  \ 应用程序一直都有启动屏幕。由于将应用程序加载到内存需要时间（应用程序越大，所需时间越长），该屏幕的目的是让用户尽可能快地看到正在发生的事情。在 iOS 8\
  \ 之前，您可以提供一张图片（实际上可以是多张不同尺寸的图片）作为应用程序的启动屏幕。iOS 会加载正确的图片并立即显示，然后再加载应用程序的其余部分。在 iOS\
  \ 8 中，您仍然有此选项，但 Apple 现在建议使用 **launch file**（启动文件）而非启动图片，或者如果您的应用程序仍需要支持早期版本，则同时使用启动文件。\n\
  \n什么是启动文件？它是一个包含启动屏幕用户界面的 nib 文件或 storyboard。在运行 iOS 8 的设备上，如果找到了启动文件，则优先使用它而不是启动图片。在\
