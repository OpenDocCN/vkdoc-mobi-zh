  \ 标签\n\n选中 SQLite Persistence 目标后，单击最右侧窗格中的 **Build Phases** 标签。您将看到一个项目列表，这些项目最初都是折叠的，代表了\
  \ Xcode 构建应用程序所需的各种步骤。展开标有 **Link Binary With Libraries** 的项目。此部分包含 Xcode 与您的应用程序链接的库和框架。默认情况下它是空的，因为编译器会自动链接您的应用程序使用的任何\
  \ iOS 框架，但编译器对 SQLite3 库一无所知，所以我们需要在此处添加它。\n\n单击链接框架列表底部的 **+** 按钮，此时会弹出一个工作表，列出所有可用的框架和库。在列表中找到\
  \ *libsqlite3.dylib*（或使用方便的搜索字段），然后单击 **Add** 按钮。请注意，该目录中可能还有其他几个以 *libsqlite3*\
  \ 开头的条目。请确保您选择的是 *libsqlite3.dylib*。它是一个别名，始终指向最新版本的 SQLite3 库。\n\n### 修改持久化视图控制器\n\
  \n现在我们可以编写更多代码。选择 *ViewController.m* 并进行以下更改：\n\n```\n#import \"ViewController.h\"\
  \n#import <sqlite3.h>\n\n@interface ViewController ()\n\n@property (strong, nonatomic)\
