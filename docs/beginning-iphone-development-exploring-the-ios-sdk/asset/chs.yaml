  \n\n\n**提示** 我们几乎涵盖了所有可用的配置选项（至少在撰写本文时如此）。你可以在 iOS 开发中心的一份名为《设置应用程序架构参考》的文档中找到关于设置属性列表格式的完整文档。你可以从以下页面获取该文档，以及其他大量有用的参考文档：`http://developer.apple.com/library/ios/navigation/`。\n\
