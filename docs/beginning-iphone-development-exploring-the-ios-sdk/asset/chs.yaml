  \n通过让你以图形方式设计界面，Interface Builder 使你能够将时间花在编写特定于应用程序的代码上，而不是编写构建用户界面的繁琐代码。\n\n大多数现代应用程序开发环境都提供一些允许你以图形方式构建用户界面的工具。Interface\
  \ Builder 与许多其他工具的一个区别在于，Interface Builder 不会生成任何需要维护的代码。相反，Interface Builder 会创建\
  \ Objective-C 对象，就像你在自己的代码中一样，然后将这些对象序列化到故事板或 nib 文件中，以便在运行时直接加载到内存中。这避免了与代码生成相关的许多问题，并且总体而言是一种更强大的方法。\n\
