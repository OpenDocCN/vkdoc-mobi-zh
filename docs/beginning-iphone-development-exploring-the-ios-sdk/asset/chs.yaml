  \n你可能已经注意到，你刚刚添加的两个图标与之前添加到设置包中的图标完全相同，你可能会好奇为什么。请记住，iOS 应用程序无法读取其他应用程序沙盒中的文件。设置包不会成为我们应用程序沙盒的一部分——它会成为设置应用程序沙盒的一部分。由于我们还想在应用程序中使用这些图标，我们需要将它们单独添加到\
  \ `Bridge Control` 文件夹中，这样它们也会被复制到我们应用程序的沙盒中。\n\n### 在应用程序中读取设置\n\n现在，我们已经解决了一半的问题。用户可以使用设置应用程序来声明他们的偏好，但我们如何从应用程序内部获取这些偏好呢？实际上，这反而是简单的一步。\n\
  \n#### 获取用户设置\n\n我们将使用一个名为 `NSUserDefaults` 的类来访问用户的设置。`NSUserDefaults` 以单例模式实现，这意味着在我们的应用程序中只有一个\
  \ `NSUserDefaults` 实例在运行。要获取该实例的访问权限，我们调用类方法 `standardUserDefaults`，如下所示：\n\n```\n\
  NSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];\n```\n\n一旦我们有了指向标准用户默认设置实例的指针，就可以像使用\
  \ `NSDictionary` 一样使用它。要从它获取值，我们可以调用 `objectForKey:`，该方法会返回一个 Objective-C 对象，例如\
  \ `NSString`、`NSDate` 或 `NSNumber`。如果我们想将值作为标量类型（如 `int`、`float` 或 `BOOL`）检索，则可以使用其他方法，例如\
  \ `intForKey:`、`floatForKey:` 或 `boolForKey:`。\n\n当您为此应用程序创建属性列表时，您在一个 `.plist`\
  \ 文件中添加了一个 `PreferenceSpecifiers` 数组。在设置应用程序中，其中一些 specifiers 被用于创建组，而另一些则被用于创建供用户交互的界面对象。这些才是我们真正感兴趣的\
  \ specifiers，因为它们包含真实设置数据的键。每个与用户设置绑定的 specifier 都有一个名为 `Key` 的键。请花点时间返回去检查一下。例如，我们滑块的\
  \ `Key` 值为 `warpFactor`。我们授权码字段的 `Key` 为 `authorizationCode`。我们将使用这些键来检索用户设置。\n\n\
  与其在方法中直接为每个键使用字符串，不如为这些值使用一些预编译的 `#define` 语句。这样，我们就可以在代码中使用这些临时常量，而不是内联字符串，从而避免了输入错误的风险。我们将把这些常量设置在一个头文件中，因为稍后我们会在不止一个类中使用其中的一些。因此，在\
  \ Xcode 中，按 `Cmd+N`，在文件创建窗口的 iOS 部分，选择 **Source**，然后选择 **Header File**。点击 **Next**，将头文件命名为\
  \ `Constants.h`，然后点击 **Create**。打开新创建的头文件，并添加以下粗体行：\n\n```\n#ifndef Bridge_Control_Constants_h\n\
  #define Bridge_Control_Constants_h\n\n#define kOfficerKey                     @\"\
  officer\"\n#define kAuthorizationCodeKey           @\"authorizationCode\"\n#define\
  \ kRankKey                        @\"rank\"\n#define kWarpDriveKey             \
  \      @\"warp\"\n#define kWarpFactorKey                  @\"warpFactor\"\n#define\
  \ kFavoriteTeaKey                 @\"favoriteTea\"\n#define kFavoriteCaptainKey\
  \             @\"favoriteCaptain\"\n#define kFavoriteGadgetKey              @\"\
  favoriteGadget\"\n#define kFavoriteAlienKey               @\"favoriteAlien\"\n\n\
  #endif\n```\n\n这些常量是我们用于不同偏好字段的 `.plist` 文件中的键。现在我们有了一个显示设置的地方，让我们快速用一组标签来设置主视图。在进入\
  \ Interface Builder 之前，让我们为我们需要的所有标签创建输出口。单击 `FirstViewController.m`，并进行以下更改：\n\n\
  ```\n#import \"FirstViewController.h\"\n#import \"Constants.h\"\n\n@interface FirstViewController\
  \ ()\n\n@property (weak, nonatomic) IBOutlet UILabel *officerLabel;\n@property (weak,\
  \ nonatomic) IBOutlet UILabel *authorizationCodeLabel;\n@property (weak, nonatomic)\
  \ IBOutlet UILabel *rankLabel;\n@property (weak, nonatomic) IBOutlet UILabel *warpDriveLabel;\n\
  @property (weak, nonatomic) IBOutlet UILabel *warpFactorLabel;\n@property (weak,\
  \ nonatomic) IBOutlet UILabel *favoriteTeaLabel;\n@property (weak, nonatomic) IBOutlet\
  \ UILabel *favoriteCaptainLabel;\n@property (weak, nonatomic) IBOutlet UILabel *favoriteGadgetLabel;\n\
  @property (weak, nonatomic) IBOutlet UILabel *favoriteAlienLabel;\n\n@end\n```\n\
  \n这里没有任何新内容。我们导入 `Constants.h` 以便能够使用设置键，并声明了九个属性，所有这些属性都是标签，并带有 `IBOutlet` 关键字，以便它们可以在\
  \ Interface Builder 中进行连接。\n\n保存您的更改。既然我们已经声明了输出口，那我们就前往故事板文件来创建图形用户界面。\n\n####\
