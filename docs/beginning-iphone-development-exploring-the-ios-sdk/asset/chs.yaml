  \ Class`部分，将类更改为`DatePickerViewController`，然后按`Return`或`Tab`键确认设置。你会看到文档大纲中所选控制器的名称变为`Date`，这与之前所做的更改一致。\n\
  \n\n```markdown\n\n现在，按照标签栏控制器底部出现的顺序，为接下来的四个视图控制器重复相同的操作。在各自的身份检查器中，分别使用类名`SingleComponentPickerViewController`、`DoubleComponentPickerViewController`、`DependentComponentPickerViewController`和`CustomPickerViewController`。\n\
  \n在继续编辑 GUI 之前，请保存你的故事板文件。\n\n### 初始测试运行\n\n此时，标签栏和内容视图应该都已连接并正常工作。编译并运行，应用程序应启动并显示一个功能正常的标签栏（参见图\
  \ 7-10）。依次点击每个标签。每个标签都应可被选中。\n\n![9781484202005_Fig07-10.jpg](img/9781484202005_Fig07-10.jpg)\n\
  \n图 7-10 包含五个空白但可选中标签的应用程序\n\n目前内容视图中没有任何内容，因此变化不会很明显。实际上，除了标签栏项目的突出显示之外，你不会看到任何差异。但如果一切顺利，多视图应用程序的基本框架现已搭建完成并可正常工作，接下来我们可以开始设计各个内容视图。\n\
  \n**提示**：如果模拟器在点击某个标签时发生崩溃，请不要惊慌！最有可能的情况是你漏掉了某个步骤或打错了字。请返回并确保连接正确，且类名均已正确设置。\n\n\
  如果想进一步确认一切正常，可以在每个内容视图中添加不同的标签或其他对象，然后重新启动应用程序。此时，当你选择不同的标签时，应该能看到不同视图的内容发生相应变化。\n\
  \n### 实现日期选择器\n\n为了实现日期选择器，我们需要一个输出口和一个操作。输出口将用于获取日期选择器的值。操作将由按钮触发，并弹出一个警报来显示从选择器获取的日期值。我们将在界面生成器中编辑`Main.storyboard`文件时添加这两项，因此如果项目导航器中该文件不在最前面，请选中它。\n\
  \n我们首先需要在对象库中找到日期选择器，并将其拖拽到编辑区域的日期场景中。点击文档大纲中的**日期**图标，将相应的视图控制器置于前端，然后将日期选择器从对象库拖拽到视图中，并放置在视图顶部，紧贴显示区域的顶端。即使它覆盖了状态栏也没关系，因为这个控件顶部有足够多的内边距，没有人会注意到。\n\
  \n现在需要应用 Auto Layout 约束，以便日期选择器在任何设备上运行时都能正确放置。我们希望选择器水平居中并固定在视图顶部，因此需要两个约束。点击故事板下方的**对齐**按钮，勾选**水平居中于容器**复选框，然后点击**添加\
  \ 1 个约束**。点击**固定**按钮（位于**对齐**按钮旁边）。使用弹出窗口顶部的四个距离框，将选择器与视图顶部边缘之间的距离设置为零（在顶部框中输入 0），然后点击下方的红色虚线，使其变为实线。在弹出窗口底部，将**更新帧**设置为*新约束的项目*，然后点击**添加\
  \ 1 个约束**。日期选择器将调整大小并移动到正确位置，如图 7-11 所示。\n\n![9781484202005_Fig07-11.jpg](img/9781484202005_Fig07-11.jpg)\n\
  \n图 7-11 日期选择器位于其视图控制器视图的顶部\n\n如果日期选择器尚未被选中，请单击选中它，然后返回属性检查器。如图 7-12 所示，可以配置日期选择器的许多属性。我们将保留大部分值的默认设置（但在完成后可以随意尝试这些选项，以查看其效果）。我们要做的唯一一件事是将选择器的范围限制在合理的日期内。寻找**约束**标题，勾选**最小日期**复选框。将值保留为默认的*1970/1/1*。同时勾选**最大日期**复选框，并将值设置为*2200/12/31*。\n\
  \n![9781484202005_Fig07-12.jpg](img/9781484202005_Fig07-12.jpg)\n\n图 7-12 日期选择器的属性检查器。设置最大日期，其余设置保留默认值\n\
  \n现在，将此选择器连接到其控制器。按下 ![image](img/sym2.jpg)![image](img/flower.jpg)**回车键**打开助手编辑器，并确保助手编辑器顶部的跳转栏设置为**自动**。这样`DatePickerViewController.m`文件就会出现在那里。接下来，按住\
  \ Control 键从选择器拖拽到`DatePickerViewController.m`的类扩展部分，位于`@interface`和`@end`行之间，当**插入\
  \ Outlet、Action 或 Outlet Collection**工具提示出现时释放鼠标按钮。在释放鼠标后弹出的窗口中，确保**连接**设置为*Outlet*，在**名称**中输入`datePicker`，然后按下**回车键**创建输出口并将其连接到选择器。\n\
  \n接下来，从库中获取一个按钮，并将其放置在日期选择器下方一小段距离处。双击按钮，将其标题设置为*Select*。我们希望此按钮水平居中，并与日期选择器保持固定距离。选中按钮后，点击故事板底部的**对齐**按钮，勾选**水平居中于容器**复选框，然后点击**添加\
  \ 1 个约束**。要固定它们之间的距离，请按住 Control 键从按钮拖拽到日期选择器，然后释放鼠标。在出现的弹出窗口中，选择**垂直间距**。最后，点击故事板底部的**解决\
  \ Auto Layout 问题**按钮，然后在弹出窗口的顶部部分点击**更新帧**。按钮应该会移动到正确位置，并且不再有任何 Auto Layout 警告。\n\
  \n现在，按住 Control 键从按钮拖拽到助手视图中的源代码，这次拖拽到接近底部的位置，紧挨着最终的`@end`行上方，直到看到**插入 Action**工具提示出现。将新操作命名为`buttonPressed`，然后按下**回车键**进行连接。这将创建一个名为`buttonPressed:`的空方法，现在你应该用以下粗体代码来补全它：\n\
  \n```objectivec\n- (IBAction)buttonPressed:(id)sender {\n    NSDate *date = self.datePicker.date;\n\
  \    NSString *message = [[NSString alloc] initWithFormat:\n                   \
  \      @\"The date and time you selected is %@\", date];\n    UIAlertController\
  \ *alert =\n            [UIAlertController alertControllerWithTitle:\n         \
  \           @\"Date and Time Selected\"\n                    message:message\n \
  \                   preferredStyle:UIAlertControllerStyleAlert];\n    UIAlertAction\
  \ *action =\n            [UIAlertAction actionWithTitle:@\"That's so true!\"\n \
  \                   style:UIAlertActionStyleDefault handler:nil];\n    [alert addAction:action];\n\
  \    [self presentViewController:alert animated:YES completion:nil];\n}\n```\n\n\
  在这里，我们使用`datePicker`输出口从日期选择器获取当前日期值，然后基于该日期构造一个字符串，并用于显示一个警报。\n\n接下来，向`viewDidLoad:`方法添加一些设置代码，以完成此控制器类：\n\
  \n```\n\n\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // Do any additional\
  \ setup after loading the view.\n    NSDate *now = [NSDate date];\n    [self.datePicker\
  \ setDate:now animated:NO];\n}\n\n在`viewDidLoad`中，我们创建了一个新的`NSDate`对象。通过这种方式创建的`NSDate`对象会保存当前日期和时间。然后，我们设置`datePicker`的日期为该日期，这确保了每次从故事板加载此视图时，选择器都会重置为当前日期和时间。\n\
  \n继续构建并运行，以确认日期选择器正常工作。如果一切顺利，运行时的应用程序应如 Figure 7-2 所示。如果你点击**Select**按钮，将弹出一个警告，告诉你当前在日期选择器中选择的日期和时间。\n\
  \n**注意**：日期选择器不允许你指定秒数或时区。弹出的警告显示带有秒数且以格林威治标准时间（GMT）表示的时间。我们本可以添加一些代码来简化警告中显示的字符串，但这一章还不够长吗？如果你有兴趣自定义日期的格式，可以查看`NSDateFormatter`类。\n\
  \n## 实现单组件选择器\n\n接下来这个选择器允许用户从值列表中进行选择。在这个示例中，我们将使用`NSArray`来保存我们想要在选择器中显示的值。\n\n\
  选择器本身并不持有数据。相反，它们会调用其数据源和代理的方法来获取需要显示的数据。选择器并不关心底层数据存储在哪里。它会在需要时请求数据，而数据源和代理（通常在实践中是同一个对象）协同工作来提供这些数据。因此，数据可以像我们本节要做的那样来自一个静态列表，也可以从文件或\
  \ URL 加载，甚至可以即时生成或计算。\n\n为了让选择器类向其控制器请求数据，我们必须确保控制器实现了正确的方法。其中一部分工作是在控制器的接口中声明它将实现一些协议。在项目导航器中，单击`SingleComponentPickerViewController.h`。该控制器类将同时扮演选择器的数据源和代理，因此我们需要确保它遵守这两个角色的协议。添加以下代码：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface SingleComponentPickerViewController\
  \ : UIViewController\n  <UIPickerViewDelegate, UIPickerViewDataSource>\n\n@end\n\
  ```\n\n### 构建视图\n\n现在再次选择`Main.storyboard`，因为需要编辑标签栏中第二个标签的内容视图。在文档大纲中，点击**Single**图标，将视图控制器带到编辑器区域的前景。接下来，从库中拖拽一个\
  \ Picker View（参见 Figure 7-13）添加到视图中，将其紧贴视图顶部放置，就像你之前对日期选择器视图做的那样。\n\n![9781484202005_Fig07-13.jpg](img/9781484202005_Fig07-13.jpg)\n\
  \nFigure 7-13. 从库中添加一个选择器视图到你的第二个视图\n\n选择器需要水平居中并固定在场景的顶部。你可以通过向选择器添加与上一个示例中添加到日期选择器相同的\
  \ Auto Layout 约束来实现。如果你不记得如何操作，请参考“实现日期选择器”章节中的说明。在本章中我们将反复使用这些约束，因此记住如何创建它们，或将其记录下来是值得的。\n\
  \n现在，将这个选择器连接到它的控制器。这里的步骤与之前的日期选择器视图类似：打开助理编辑器，将跳转栏设置为显示`.m`文件，按住 Control 键从选择器拖拽到`SingleComponentPickerViewController.m`顶部的`@interface`部分，并创建一个名为`singlePicker`的出口。\n\
  \n接下来，选中选择器，按下**![image](img/sym2.jpg)![image](img/flower.jpg)6**打开连接检查器。查看选择器视图的可用连接，你会看到前两个是**dataSource**和**delegate**。如果你没有看到这些出口，请确保你选中的是选择器本身，而不是包含它的`UIView`！从**dataSource**旁边的圆圈拖拽到故事板或文档大纲中场景顶部的**View\
  \ Controller**图标，然后从**delegate**旁边的圆圈拖拽到**View Controller**图标。现在，这个选择器知道故事板中的`SingleComponentPickerViewController`类的实例是其数据源和代理，并且选择器会请求它提供要显示的数据。换句话说，当选择器需要获取它将要显示的数据信息时，它会向控制此视图的`SingleComponentPickerViewController`实例请求该信息。\n\
  \n将一个 Button 拖拽到视图，将其放置在选择器下方。双击按钮并将其标题设置为*Select*。按**Return**键确认修改。在连接检查器中，从 Touch\
  \ Up Inside 旁边的圆圈拖拽到助理视图的代码中，在底部的`@end`上方释放，以创建一个新的动作方法。将此动作命名为`buttonPressed`，你会看到\
  \ Xcode 自动填入了一个空方法。\n\n像往常一样，当我们向故事板添加视图时，需要设置其 Auto Layout 约束。对于按钮而言，这些约束需要使其水平居中，并保持其与选择器之间的距离固定不变。在向\
  \ Data Picker 场景添加类似按钮时你已经看到了如何做到这一点，所以直接应用相同的约束即可。现在，你已经完成了第二个标签的 GUI 构建。保存故事板，让我们继续编写代码。\n\
  \n### 将控制器实现为数据源和代理\n\n为了使我们的控制器能够正确地作为选择器的数据源和代理工作，我们将从一些你熟悉的代码开始，然后添加几个你从未见过的方法。\n\
  \n在项目导航器中单击`SingleComponentPickerViewController.m`，并在顶部的`@interface`部分添加以下属性。这将允许我们保存一个指向包含几个知名电影角色名称的数组的指针：\n\
  \n```\n@interface SingleComponentPickerViewController ()\n\n@property (weak, nonatomic)\
  \ IBOutlet UIPickerView *singlePicker;\n@property (strong, nonatomic) NSArray *characterNames;\n\
  \n@end\n```\n\n接下来，在`viewDidLoad`方法中添加以下初始化代码，以设置角色名称数组的内容：\n\n```\n- (void)viewDidLoad\
  \ {\n    [super viewDidLoad];\n    // Do any additional setup after loading the\
  \ view.\n    self.characterNames = @[@\"Luke\", @\"Leia\", @\"Han\", @\"Chewbacca\"\
  ,\n                            @\"Artoo\", @\"Threepio\", @\"Lando\"];\n}\n```\n\
  \n然后，在`buttonPressed:`方法中添加以下代码：\n\n```\n- (IBAction)buttonPressed:(id)sender {\n\
  \    NSInteger row = [self.singlePicker selectedRowInComponent:0];\n    NSString\
  \ *selected = self.characterNames[row];\n    NSString *title = [[NSString alloc]\
  \ initWithFormat:\n                       @\"You selected %@!\", selected];\n\n\
  UIAlertController *alert =\n        [UIAlertController alertControllerWithTitle:title\n\
  \             message:@\"Thank you for choosing.\"\n             preferredStyle:UIAlertControllerStyleAlert];\n\
  \    UIAlertAction *action =\n        [UIAlertAction actionWithTitle:@\"You're welcome\"\
  \n             style:UIAlertActionStyleDefault handler:nil];\n    [alert addAction:action];\n\
  \    [self presentViewController:alert animated:YES completion:nil];\n}\n```\n\n\
  \n\n这两个方法现在你应该已经熟悉了。`buttonPressed:`方法与我们在日期选择器中使用的方法几乎相同，但与日期选择器不同的是，常规选择器无法告诉我们它保存了什么数据，因为它不维护数据本身。它将这项工作委托给了代理和数据源。相反，`buttonPressed:`方法需要询问选择器当前选中了哪一行，然后从你的`pickerData`数组中获取相应的数据。下面是我们如何询问当前选中的行：\n\
  \n```\nNSInteger row = [self.singlePicker selectedRowInComponent:0];\n```\n\n注意，我们需要指定想要了解的是哪个组件。这个选择器中只有一个组件，所以我们简单地传入`0`，这是第一个组件的索引。\n\
  \n**注意** 你是否注意到，在获取选中行的请求中，`NSInteger`和`row`之间没有星号？在 iOS SDK 的大部分地方，前缀`NS`通常表示来自\
  \ Foundation 框架的 Objective-C 类，但这里是这条通用规则的一个例外。`NSInteger`始终被定义为一个整数数据类型，要么是`int`，要么是`long`。我们使用`NSInteger`而不是`int`或`long`，因为使用`NSInteger`时，编译器会自动选择最适合当前编译平台的大小。在为\
  \ 32 位处理器编译时，它会创建一个 32 位的`int`；在为 64 位架构编译时，则会创建一个更长的 64 位`long`。现在苹果已经开始发布 64 位\
  \ iOS 设备，使用这些类型非常有意义。你可能还会为 iOS 应用程序编写类，之后希望将它们重用在 OS X 的 Cocoa 应用程序中，而 OS X 已经在\
  \ 32 位和 64 位机器上运行了多年。\n\n在`viewDidLoad`中，我们为`characterNames`属性分配了一个包含多个对象的数组，以便为选择器提供数据。通常，你的数据会来自其他来源，比如项目*Resources*文件夹中的属性列表，或者\
  \ Web 服务查询。像我们这里这样，在代码中嵌入一个列表项，如果需要更新这个列表，或者希望将应用程序翻译成其他语言，就会给自己增加很多困难。但这种方法是为了演示目的而将数据放入数组的最快、最简单的方式。尽管你不会总是这样创建数组，但你几乎总是会在`viewDidLoad`方法中配置某种形式的应用模型对象访问，这样就不会每次选择器请求数据时都去读取磁盘或访问网络。\n\
  \n**提示** 如果你不应该像我们在`viewDidLoad`中那样从代码中的对象列表创建数组，那应该怎么做呢？将列表嵌入到属性列表文件中，并将这些文件添加到项目的*Resources*文件夹中。属性列表文件可以在不重新编译源代码的情况下进行更改，这意味着这样做时引入新错误的风险很小。你还可以为不同语言提供不同版本的列表，正如你将在第\
  \ 22 章中看到的那样。属性列表可以直接在 Xcode 中创建，Xcode 在新文件助手的 Resource 部分提供了一个创建属性列表的模板，并支持在编辑器窗格中编辑属性列表。`NSArray`和`NSDictionary`都提供了一个名为`initWithContentsOfFile:`的方法，允许你从属性列表文件初始化实例，我们将在本章后面实现\
  \ Dependent 标签页时这样做。属性列表在第 13 章中有更详细的讨论。\n\n最后，在文件末尾插入以下新代码：\n\n```\n#pragma mark\
  \ -\n#pragma mark Picker Data Source Methods\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
  \ *)pickerView {\n    return 1;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView\n\
  numberOfRowsInComponent:(NSInteger)component {\n    return [self.characterNames\
  \ count];\n}\n```\n\n\n\n#### `#pragma mark 选择器委托方法`\n\n```\n- (NSString *)pickerView:(UIPickerView\
  \ *)pickerView\n             titleForRow:(NSInteger)row\n            forComponent:(NSInteger)component\
  \ {\n    return self.characterNames[row];\n}\n\n@end\n```\n\n实现选择器需要这三个方法。前两个方法来自\
  \ `UIPickerViewDataSource` 协议，所有选择器（日期选择器除外）都必须实现它们。第一个方法如下：\n\n```\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
  \ *)pickerView {\n    return 1;\n}\n```\n\n选择器可以包含多个转轮（即组件），该方法用于询问选择器应显示多少个组件。这次我们只需要显示一个列表，因此返回值为\
  \ `1`。注意，`UIPickerView` 作为参数传入，它指向正在询问我们的选择器视图，这使得同一个数据源可以控制多个选择器。在本例中，我们知道只有一个选择器，因此可以安全地忽略这个参数，因为我们已经知道是哪个选择器在调用我们。\n\
  \n第二个数据源方法用于选择器询问某个组件有多少行数据：\n\n```\n- (NSInteger)pickerView:(UIPickerView *)pickerView\n\
  \        numberOfRowsInComponent:(NSInteger)component{\n    return [self.characterNames\
  \ count];\n}\n```\n\n同样，我们会被告知是哪个选择器视图在询问，以及它询问的是哪个组件。由于我们知道只有一个选择器和一个组件，所以忽略这两个参数，直接返回单一数据数组中对象的数量。\n\
  \n#### `#PRAGMA 是什么？`\n\n你注意到 `SingleComponentPickerViewController.m` 中的以下几行代码了吗？\n\
  \n```\n#pragma mark -\n#pragma mark Picker Data Source Methods\n```\n\n以 `#pragma`\
  \ 开头的任何代码行在技术上都是编译器指令。更具体地说，`#pragma` 标记的是**实用**的或编译器特定的指令，这些指令不一定能与其他编译器或其他环境兼容。如果编译器无法识别该指令，则会忽略它（但可能会生成警告）。在这种情况下，`#pragma`\
  \ 指令实际上是针对 IDE 而非编译器的，它们告诉 Xcode 编辑器在编辑器面板顶部的函数方法弹出菜单中插入分隔符。第一个 `#pragma` 在菜单中插入分隔符；第二个则创建一个文本条目，包含该行剩余的内容，可用于为源代码中的方法组添加描述性标题。\n\
  \n你的一些类（尤其是某些控制器类）可能会变得相当冗长，而方法弹出菜单能让你更轻松地浏览代码。合理地插入 `#pragma` 指令并组织代码逻辑，将使这个弹出菜单更高效。\n\
  \n在两个数据源方法之后，我们实现了一个委托方法。与数据源方法不同，所有委托方法都是可选的。**可选**这个术语有点误导性，因为你至少需要实现一个委托方法。通常我们会实现这里要展示的方法。但是，如果你想在选择器中显示文本以外的内容，则必须实现另一个不同的方法，正如在本章后面自定义选择器部分看到的那样：\n\
  \n```\n#pragma mark Picker Delegate Methods\n- (NSString *)pickerView:(UIPickerView\
  \ *)pickerView\n             titleForRow:(NSInteger)row\n            forComponent:(NSInteger)component\
  \ {\n    return self.characterNames[row];\n}\n```\n\n在这个方法中，选择器要求我们提供特定组件中特定行的数据。我们得到的是指向询问选择器的指针，以及它询问的组件和行号。由于我们的视图只有一个选择器和一个组件，因此除了\
  \ `row` 参数外，我们忽略所有其他参数，并使用它从数据数组中返回相应的条目。\n\n继续编译并再次运行。当模拟器启动时，切换到第二个标签页（标记为 **Single**\
  \ 的标签页），查看你新的自定义选择器，它应该类似于图 7-3。\n\n在你回味完所有《星球大战》的记忆后，回到 Xcode，我们将向你展示如何实现包含两个组件的选择器。如果你觉得有挑战性，那么下一个内容视图实际上很适合你自行尝试。你已经看到了这个选择器所需的所有方法，所以放手试试吧。我们在这里等你。你可能最好先仔细看看图\
  \ 7-4，以便回忆一下。完成后，继续往下读，看看我们是如何解决这个问题的。\n\n## 实现多组件选择器\n\n下一个标签页将包含一个带有两个组件（即转轮）的选择器，它们彼此独立。左侧转轮显示三明治馅料列表，右侧转轮显示面包类型选择。我们将编写与单组件选择器相同的数据源和委托方法，只是需要在某些方法中添加额外代码，以确保为每个组件返回正确的值和行数。\n\
  \n### 声明 Outlets 和 Actions\n\n单击 `DoubleComponentPickerViewController.h`，并添加以下代码：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface DoubleComponentPickerViewController\
  \ : UIViewController\n<UIPickerViewDelegate, UIPickerViewDataSource>\n\n@end\n```\n\
  \n这里，我们只是让控制器类同时遵守委托和数据源协议。保存文件，并单击 `Main.storyboard` 来处理图形用户界面。\n\n### 构建视图\n\n\
  在文档大纲中选择 **Double Scene**，并单击其 **View Controller** 图标，将视图控制器置于编辑器区域的前端。现在向视图中添加一个选择器视图和一个按钮，将按钮标签改为\
  \ **Select**，然后进行必要的连接。这次我们不再逐步引导你，但如果你需要分步指南，可以参考上一节，因为两个视图控制器在故事板中的连接相同。以下是需要完成的任务摘要：\n\
  \n1.  在 `DoubleComponentPickerViewController` 类的类扩展中创建一个名为 `doublePicker` 的 Outlet，用于将视图控制器连接到选择器。\n\
  2.  将选择器视图上的 `dataSource` 和 `delegate` 连接连接到视图控制器（使用连接检查器）。\n3.  将按钮的 Touch Up Inside\
  \ 事件连接到视图控制器上名为 `buttonPressed` 的新 Action（使用连接检查器）。\n4.  为选择器和按钮添加 Auto Layout 约束，以固定其位置。\n\
  \n在返回代码之前，请确保保存了故事板。哦，请在这一页折个角（或者如果你喜欢，可以使用书签）。稍后你会用到它。\n\n### 实现控制器\n\n选择 `DoubleComponentPickerViewController.m`，并在文件顶部添加以下代码：\n\
  \n```\n#import \"DoubleComponentPickerViewController.h\"\n\n#define kFillingComponent\
  \ 0\n#define kBreadComponent   1\n\n@interface DoubleComponentPickerViewController\
  \ ()\n\n@property (weak, nonatomic) IBOutlet UIPickerView *doublePicker;\n@property\
  \ (strong, nonatomic) NSArray *fillingTypes;\n@property (strong, nonatomic) NSArray\
  \ *breadTypes;\n\n@end\n```\n\n如你所见，我们首先定义了两个常量来表示两个组件，这只是为了使代码更易读。选择器组件通过编号引用，最左侧的组件编号为\
  \ 0，向右每移动一个组件增加 1。接下来，我们声明两个数组的属性，用于保存两个选择器组件的数据。\n\n现在实现 `buttonPressed:` 方法，如下所示：\n\
  \n\n```objc\n- (IBAction)buttonPressed:(id)sender {\n    NSInteger fillingRow =\
  \ [self.doublePicker selectedRowInComponent:\n                            kFillingComponent];\n\
  \    NSInteger breadRow = [self.doublePicker selectedRowInComponent:\n         \
  \                 kBreadComponent];\n\n    NSString *filling = self.fillingTypes[fillingRow];\n\
  \    NSString *bread = self.breadTypes[breadRow];\n\n    NSString *message = [[NSString\
  \ alloc] initWithFormat:\n           @\"您点的 %@ 搭配 %@ 面包马上就好。\", filling, bread];\n\
  \n    UIAlertController *alert =\n        [UIAlertController\n               alertControllerWithTitle:@\"\
  感谢您的下单\"\n               message:message\n               preferredStyle:UIAlertControllerStyleAlert];\n\
  \    UIAlertAction *action = [UIAlertAction actionWithTitle:@\"太棒了！\"\n        \
  \       style:UIAlertActionStyleDefault handler:nil];\n    [alert addAction:action];\n\
  \    [self presentViewController:alert animated:YES completion:nil];\n}\n```\n\n\
  接下来，在 `viewDidLoad` 方法中添加以下几行代码：\n\n```objc\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
  \    // 视图加载完成后执行额外设置\n    self.fillingTypes = @[@\"火腿\", @\"火鸡\", @\"花生酱\",\n \
  \                         @\"金枪鱼沙拉\", @\"鸡肉沙拉\",\n                          @\"\
  烤牛肉\", @\"维吉麦酱\"];\n    self.breadTypes = @[@\"白面包\", @\"全麦面包\", @\"黑麦面包\",\n  \
  \                      @\"酸面团面包\", @\"七谷面包\"];\n}\n```\n\n另外，在最终的 `@end` 行之前，添加代理和数据源方法：\n\
  \n```objc\n#pragma mark -\n#pragma mark Picker 数据源方法\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
  \ *)pickerView {\n    return 2;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView\n\
  \      numberOfRowsInComponent:(NSInteger)component {\n    if (component == kBreadComponent)\
  \ {\n        return [self.breadTypes count];\n    } else {\n        return [self.fillingTypes\
  \ count];\n    }\n}\n\n#pragma mark Picker 代理方法\n- (NSString *)pickerView:(UIPickerView\
  \ *)pickerView\n             titleForRow:(NSInteger)row\n            forComponent:(NSInteger)component\
  \ {\n    if (component == kBreadComponent) {\n        return self.breadTypes[row];\n\
  \    } else {\n        return self.fillingTypes[row];\n    }\n}\n\n@end\n```\n\n\
  这次的 `buttonPressed:` 方法稍微复杂一些，但其中对你来说几乎没有新内容。我们只需在使用之前定义的常量 `kBreadComponent` 和\
  \ `kFillingComponent` 请求所选行时，明确指定我们讨论的是哪个组件：\n\n```objc\nNSInteger fillingRow =\
  \ [self.doublePicker selectedRowInComponent:\n                        kFillingComponent];\n\
  NSInteger breadRow   = [self.doublePicker selectedRowInComponent:\n            \
  \            kBreadComponent];\n```\n\n你可以看到，使用这两个常量而不是 `0` 和 `1` 使我们的代码更具可读性。从这个角度来看，`buttonPressed:`\
  \ 方法与我们上次编写的基本相同。\n\n`viewDidLoad` 也与之前为选择器编写的版本非常相似。唯一的区别是我们加载了两个数组的数据，而不是一个数组。同样，我们只是从一个硬编码的字符串列表中创建数组——这在你的实际应用中通常不会这么做。\n\
  \n当我们进入数据源方法时，情况开始有所变化。在第一个方法中，我们指定选择器应该有两个组件，而不是一个：\n\n```objc\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
  \ *)pickerView {\n    return 2;\n}\n```\n\n这次，当被询问行数时，我们需要检查选择器询问的是哪个组件，并返回相应数组的正确行数：\n\
  \n```objc\n- (NSInteger)pickerView:(UIPickerView *)pickerView\n          numberOfRowsInComponent:(NSInteger)component\
  \ {\n    if (component == kBreadComponent) {\n        return [self.breadTypes count];\n\
  \    } else {\n        return [self.fillingTypes count];\n    }\n}\n```\n\n接下来，在我们的代理方法中，我们做同样的操作。我们检查组件，并使用请求的组件对应的数组来获取并返回正确的值：\n\
  \n```objc\n- (NSString *)pickerView:(UIPickerView *)pickerView\n             titleForRow:(NSInteger)row\n\
  \            forComponent:(NSInteger)component {\n    if (component == kBreadComponent)\
  \ {\n        return self.breadTypes[row];\n    } else {\n        return self.fillingTypes[row];\n\
  \    }\n}\n```\n\n这并不难，对吧？编译并运行你的应用程序，确保**双组件**内容面板看起来像图 7-4。\n\n注意，滚轮之间完全独立。转动一个对另一个没有影响。在这种情况下这是合适的，但有时一个组件会依赖于另一个组件。一个很好的例子是日期选择器。当你改变月份时，显示当月天数的转盘可能需要改变，因为并非所有月份都有相同的天数。一旦你知道如何实现，这并不难，但它并不是最容易自己总结出来的，所以接下来我们就来做这个。\n\
  \n## 实现依赖组件\n\n我们现在进展迅速。对于下一节，在已覆盖的内容上我们不会手把手指导了。相反，我们将专注于新内容。我们的新选择器将在左侧组件显示美国州列表，在右侧组件显示对应的邮政编码列表。\n\
  \n我们需要为左侧组件中的每个项目准备一个单独的邮政编码值列表。我们将声明两个数组，每个组件一个，就像上次一样。我们还需要一个 `NSDictionary`。在字典中，我们将为每个州存储一个\
  \ `NSArray`（参见图 7-14）。稍后，我们将实现一个代理方法，当选择器的选择发生变化时通知我们。如果左侧的值发生变化，我们将从字典中取出正确的数组，并将其赋值给用于右侧组件的数组。如果你没有完全理解，不用着急；我们将在代码中进一步讨论。\n\
  \n![9781484202005_Fig07-14.jpg](img/9781484202005_Fig07-14.jpg)\n\n图 7-14。我们应用程序的数据。每个州在字典中都有一个条目，州名作为键。该键下存储的是一个包含该州所有邮政编码的\
  \ `NSArray` 实例\n\n将以下代码添加到你的 `DependentComponentPickerViewController.h` 文件中：\n\n\
  ```objc\n#import <UIKit/UIKit.h>\n\n@interface DependentComponentPickerViewController\
  \ : UIViewController\n<UIPickerViewDelegate, UIPickerViewDataSource>\n\n@end\n```\n\
  \n接着，将以下内容添加到 `DependentComponentPickerViewController.m` 中：\n\n```objc\n#import\
  \ \"DependentComponentPickerViewController.h\"\n\n#define kStateComponent 0\n#define\
  \ kZipComponent   1\n\n@interface DependentComponentPickerViewController ()\n\n\
  @property (strong, nonatomic) NSDictionary *stateZips;\n@property (strong, nonatomic)\
  \ NSArray *states;\n@property (strong, nonatomic) NSArray *zips;\n\n@end\n```\n\n\
  现在是时候构建内容视图了。这个过程与我们之前构建的两个组件视图几乎相同。如果你遇到困难，请翻回单组件选择器的“构建视图”部分，并按照分步说明操作。提示：首先打开\
  \ `Main.storyboard`，找到 `DependentComponentPickerViewController` 类的视图控制器，然后重复本章中所有其他内容视图的基本步骤。最后，你应该得到一个名为\
  \ `dependentPicker` 的出口属性，连接到选择器；一个空的 `buttonPressed:` 方法连接到按钮；以及选择器的 `delegate`\
