  \n## 使用自定义选择器创建简单游戏\n\n接下来，我们将创建一个真正能工作的老虎机。好吧，它不会吐出银币，但看起来确实很酷。在继续之前，请回顾一下 图 7-6，这样你就知道我们在构建什么了。\n\
  \n### 编写控制器头文件\n\n首先将以下代码添加到 `CustomPickerViewController.h`：\n\n```\n#import <UIKit/UIKit.h>\n\
  \n@interface CustomPickerViewController : UIViewController\n<UIPickerViewDataSource,\
  \ UIPickerViewDelegate>\n\n@end\n```\n\n接下来，切换到 `CustomPickerViewController.m` 并在文件顶部附近的类扩展中添加以下属性：\n\
  \n```\n#import \"CustomPickerViewController.h\"\n\n@interface CustomPickerViewController\
  \ ()\n```\n\n\n```objc\n@property (strong, nonatomic) NSArray *images;\n\n@end\n\
  ```\n\n至此，我们仅为该类添加了一个用于持有 `NSArray` 对象的属性，该数组将存放老虎机转轮符号对应的图片。其余部分稍后补充。\n\n### 构建视图\n\
  \n尽管图 7-6 中的选择器看起来比我们之前构建的其他选择器花哨得多，但在 nib 文件的设计方式上其实差别很小。所有额外的工作都是在控制器的代理方法中完成的。\n\
  \n请确保已保存新编写的源代码，然后在项目导航器中选择 *Main.storyboard*，并选中 **Custom Scene** 以编辑图形用户界面。添加一个选择器视图（picker\
  \ view）、其下方的一个标签（label）以及标签下方的一个按钮。将按钮的标题设置为 *Spin*。\n\n选中标签后，调出属性检查器（Attributes\
  \ Inspector）。将 **Alignment**（对齐方式）设为居中。然后点击 **Text Color**（文本颜色），将颜色设置为亮色。接着，让文本稍微变大一些。在检查器中找到\
  \ **Font**（字体）设置，点击其内部的图标（看起来像一个内含字母 T 的小方框）以弹出字体选择器。该控件允许你按需从设备的标准系统字体切换为其他字体，或仅更改字号。现在，将字号改为\
  \ *48*，并删除单词 *Label*，因为我们希望在用户首次获胜后才显示文本。\n\n现在，添加自动布局（Auto Layout）约束，使标签和按钮在水平方向上居中，并固定它们之间以及标签与选择器之间的垂直间距。你可能会发现，在添加自动布局约束时，从文档大纲（Document\
  \ Outline）中拖拽标签最为简便，因为故事板上的标签是空的，非常难以定位！\n\n之后，建立所有到输出口（outlet）和操作（action）的连接。创建一个名为\
  \ `picker` 的新输出口，将视图控制器连接到选择器视图；再创建一个名为 `winLabel` 的输出口，将视图控制器连接到标签。再次提醒，使用文档大纲中的标签会比故事板上的标签更方便。接着，将按钮的“Touch\
  \ Up Inside”事件连接到一个名为 `spin:` 的新操作方法。然后，确保连接选择器的 **delegate**（代理）和 **data source**（数据源）。\n\
  \n哦，还有一件额外的事情需要完成。选中选择器并调出属性检查器。你需要在 **View**（视图）设置中，取消勾选标记为 **User Interaction\
  \ Enabled**（允许用户交互）的复选框，以防止用户手动更改转盘作弊。完成所有这些操作后，保存对故事板所做的更改。\n\n### iOS 设备支持的字体\n\
  \n在 Interface Builder 中使用字体面板设计 iOS 界面时需谨慎。属性检查器的字体选择器允许你从多种字体中分配，但并非所有 iOS 设备都拥有相同的可用字体集。例如，在撰写本文时，有些字体在\
  \ iPad 上可用，但在 iPhone 或 iPod touch 上却没有。你应该将字体选择限制在目标 iOS 设备所支持的字体族之一。Jeff LaMarche\
  \ 出色的 iOS 博客上的这篇文章展示了如何通过编程方式获取此列表：`http://iphonedevelopment.blogspot.com/2010/08/fonts-and-font-families.html`。\n\
  \n简而言之，创建一个基于视图的应用程序（view-based application），并在应用程序代理的 `application:didFinishLaunchingWithOptions:`\
  \ 方法中添加以下代码：\n\n```objc\nfor (NSString *family in [UIFont familyNames]) {\n   NSLog(@\"\
  %@\", family);\n   for (NSString *font in [UIFont fontNamesForFamilyName:family])\
  \ {\n       NSLog(@\"\\t%@\", font);\n   }\n}\n```\n\n在相应的模拟器中运行该项目，字体将显示在项目的控制台日志中。\n\
  \n### 实现控制器\n\n在此控制器的实现中，我们将涉及许多新内容。选择 *CustomPickerViewController.m* 文件，并开始填充 `spin:`\
  \ 方法的内容：\n\n\n```objc\n- (IBAction)spin:(id)sender {\n    BOOL win = NO;\n    int\
  \ numInRow = 1;\n    int lastVal = -1;\n    for (int i = 0; i < 5; i++) {\n    \
  \    int newValue = arc4random_uniform((uint)[self.images count]);\n\n        if\
  \ (newValue == lastVal) {\n            numInRow++;\n        } else {\n         \
  \   numInRow = 1;\n        }\n        lastVal = newValue;\n\n        [self.picker\
  \ selectRow:newValue inComponent:i animated:YES];\n        [self.picker reloadComponent:i];\n\
  \        if (numInRow >= 3) {\n            win = YES;\n        }\n    }\n    if\
  \ (win) {\n        self.winLabel.text = @\"WINNER!\";\n    } else {\n        self.winLabel.text\
  \ = @\" \"; // 注意引号之间的空格\n    }\n}\n```\n\n接下来，将以下代码插入到 `viewDidLoad` 方法中：\n\n```objc\n\
  - (void)viewDidLoad {\n    [super viewDidLoad];\n    // 视图加载后的其他设置\n    self.images\
  \ = @[[UIImage imageNamed:@\"seven\"],\n                    [UIImage imageNamed:@\"\
  bar\"],\n                    [UIImage imageNamed:@\"crown\"],\n                \
  \    [UIImage imageNamed:@\"cherry\"],\n                    [UIImage imageNamed:@\"\
  lemon\"],\n                    [UIImage imageNamed:@\"apple\"]];\n    self.winLabel.text\
  \ = @\" \"; // 注意引号之间的空格\n}\n```\n\n最后，在文件末尾的最终 `@end` 行之前添加以下代码：\n\n```objc\n#pragma\
  \ mark -\n#pragma mark Picker 数据源方法\n- (NSInteger)numberOfComponentsInPickerView:(UIPickerView\
  \ *)pickerView {\n    return 5;\n}\n\n- (NSInteger)pickerView:(UIPickerView *)pickerView\n\
  \       numberOfRowsInComponent:(NSInteger)component {\n    return [self.images\
  \ count];\n}\n\n#pragma mark Picker 代理方法\n- (UIView *)pickerView:(UIPickerView *)pickerView\n\
  \        viewForRow:(NSInteger)row\n      forComponent:(NSInteger)component reusingView:(UIView\
  \ *)view {\n    UIImage *image = self.images[row];\n    UIImageView *imageView =\
  \ [[UIImageView alloc] initWithImage:image];\n    return imageView;\n}\n\n- (CGFloat)pickerView:(UIPickerView\
  \ *)pickerView\n    rowHeightForComponent:(NSInteger)component {\n    return 64;\n\
  }\n\n@end\n```\n\n这里的内容真不少，对吧？让我们逐一分析新增的部分。\n\n### spin 方法\n\n当用户点击**Spin**按钮时，`spin`方法会被触发。首先，我们声明了一些变量来跟踪用户是否获胜。使用\
  \ `win` 来记录是否连续出现三个相同图案，设为 `YES` 表示获胜。使用 `numInRow` 来记录当前连续相同值的数量，并使用 `lastVal`\
  \ 来跟踪上一个组件的值，以便将当前值与之前的值进行比较。我们将 `lastVal` 初始化为 `-1`，因为已知这个值不会与任何实际值匹配：\n\n```objc\n\
  BOOL win = NO;\nint numInRow = 1;\nint lastVal = -1;\n```\n\n接着，我们循环遍历全部五个组件，并为每个组件设置一个随机生成的新行索引。通过\
  \ `images` 数组获取元素数量来完成此操作，这是一种快捷方式，因为我们知道五列都使用相同数量的图像：\n\n```objc\nfor (int i =\
  \ 0; i < 5; i++) {\n    int newValue = arc4random_uniform((uint)[self.images count])\n\
  ```\n\n我们将新值与之前的值进行比较，如果匹配则递增 `numInRow`。如果值不匹配，则将 `numInRow` 重置为 `1`。然后将新值赋给 `lastVal`，以便在下一次循环中进行比较：\n\
  \n```objc\nif (newValue == lastVal) {\n    numInRow++;\n} else {\n    numInRow =\
  \ 1;\n}\nlastVal = newValue;\n```\n\n之后，将对应的组件设置为新值，并启用动画效果，同时通知选择器重新加载该组件：\n\n\
  ```objc\n[self.picker selectRow:newValue inComponent:i animated:YES];\n[self.picker\
  \ reloadComponent:i];\n```\n\n每次循环最后，检查是否连续出现三个相同值，如果是则将 `win` 设为 `YES`：\n\n```objc\n\
  if (numInRow >= 3) {\n    win = YES;\n}\n```\n\n循环结束后，设置标签以显示旋转结果是否获胜：\n\n```objc\n\
  if (win) {\n    self.winLabel.text = @\"WINNER!\";\n} else {\n    self.winLabel.text\
  \ = @\" \"; // 注意引号之间的空格\n}\n```\n\n### viewDidLoad 方法\n\n回顾我们在此添加的内容，首先加载了六张不同的图片，它们是在本章开头添加到\
  \ *Images.xcassets* 中的。我们使用了 `UIImage` 类的 `imageNamed:` 便捷方法来完成加载：\n\n```objc\n\
  self.images = @[[UIImage imageNamed:@\"seven\"],\n[UIImage imageNamed:@\"bar\"],\
  \ [UIImage imageNamed:@\"crown\"],\n[UIImage imageNamed:@\"cherry\"], [UIImage imageNamed:@\"\
  lemon\"],\n[UIImage imageNamed:@\"apple\"]];\n```\n\n在该方法中最后要做的是确保标签中恰好包含一个空格。我们希望标签显示为空白，但如果真正设为空字符串，它会折叠成零高度。通过包含一个空格，可以确保标签以正确的高度显示：\n\
  \n```objc\nself.winLabel.text = @\" \"; // 注意引号之间的空格\n```\n\n这很简单，对吧？但是，嗯，那六张图片要怎么用呢？如果你向下滚动刚才输入的代码，会看到两个数据源方法看起来和之前几乎一样；然而，进一步查看代理方法，会发现我们使用了一个完全不同的代理方法来向选择器提供数据。之前使用的方法返回的是\
  \ `NSString *`，而这次的方法返回的是 `UIView *`。\n\n通过使用此方法，我们可以向选择器提供任何能绘制到 `UIView` 中的内容。当然，考虑到选择器的大小限制，在此类操作中存在一定限制，既要功能正常又要外观美观。但这种方法在我们显示的内容上提供了更多自由度，尽管需要多做一些工作：\n\
  \n```objc\n- (UIView *)pickerView:(UIPickerView *)pickerView\n        viewForRow:(NSInteger)row\n\
  \      forComponent:(NSInteger)component reusingView:(UIView *)view {\n    UIImage\
  \ *image = self.images[row];\n    UIImageView *imageView = [[UIImageView alloc]\
  \ initWithImage:image];\n    return imageView;\n}\n```\n\n此方法返回一个 `UIImageView`\
  \ 对象，该对象使用符号对应的图片之一进行初始化。为此，我们首先获取行对应的符号图片。然后，创建并返回一个使用该符号的图片视图。对于比单张图片更复杂的视图，最好先创建所有需要的视图（例如，在`viewDidLoad`中），然后在请求时将这些预创建的视图返回给选择器视图。但对我们这个简单的例子来说，即时创建所需的视图效果很好。\n\
  \n哇，深吸一口气。你已经完整地完成了所有内容，现在可以实际运行看看效果了。所以，构建并运行应用程序，享受其中的乐趣吧！\n\n### 最终细节\n\n我们的游戏相当有趣，尤其是考虑到构建它花费的精力很少。现在让我们通过一些微调来改进它。目前这个游戏有两个问题让我们很在意：\n\
  \n- 它实在太安静了。老虎机可不会这么安静！\n- 在转盘完成旋转之前它就告诉我们获胜了，虽然是个小问题，但确实消除了期待的悬念。要看到这个效果，请再次运行你的应用程序。虽然很细微，但标签确实在转轮停止旋转前就出现了。\n\
  \n本书附带项目归档中的 *07 - Picker Sounds* 文件夹包含两个声音文件：*crunch.wav* 和 *win.wav*。将这两个文件拖到项目的\
  \ *Pickers* 文件夹中。当用户点击 **Spin** 按钮以及获胜时，我们将播放这些音效。\n\n为了处理声音，我们需要访问 iOS 音频工具箱类。在\
  \ *CustomPickerViewController.m* 顶部现有的 `#import` 行上方插入以下加粗显示的行：\n\n```objc\n#import\
  \ <AudioToolbox/AudioToolbox.h>\n#import \"CustomPickerViewController.h\"\n```\n\
  \n\n\n接下来，我们需要添加一个指向按钮的插座（`outlet`）。在转轮旋转期间，我们将隐藏该按钮。我们不希望用户在当前的旋转完成之前再次点击按钮。将以下加粗的代码行添加到`CustomPickerViewController.m`中：\n\
  \n```\n@interface CustomPickerViewController ()\n\n@property (strong, nonatomic)\
  \ NSArray *images;\n@property (weak, nonatomic) IBOutlet UIPickerView *picker;\n\
  @property (weak, nonatomic) IBOutlet UILabel *winLabel;\n@property (weak, nonatomic)\
  \ IBOutlet UIButton *button;\n\n@end\n```\n\n输入并保存文件后，点击`Main.storyboard`来编辑图形用户界面。打开后，在文档大纲中，从**Custom\
  \ Scene**下方的**Custom**图标按住 Control 键拖拽到**Spin**按钮，并将其连接到我们刚刚创建的`button`插座。保存故事板。\n\
  \n现在，我们需要在控制器类的实现中完成几件事。首先，需要一些实例变量来保存已加载音效的引用。打开`CustomPickerViewController.m`并添加以下新属性：\n\
  \n```\n@interface CustomPickerViewController ()\n\n@property (strong, nonatomic)\
  \ NSArray *images;\n@property (weak, nonatomic) IBOutlet UIPickerView *picker;\n\
  @property (weak, nonatomic) IBOutlet UILabel *winLabel;\n@property (weak, nonatomic)\
  \ IBOutlet UIButton *button;\n@property (assign, nonatomic) SystemSoundID winSoundID;\n\
  @property (assign, nonatomic) SystemSoundID crunchSoundID;\n\n@end\n```\n\n我们还需要向控制器类中添加几个方法。将以下两个方法添加到`CustomPickerViewController.m`中：\n\
  \n```\n- (void)showButton {\n    self.button.hidden = NO;\n}\n\n- (void)playWinSound\
  \ {\n    if (_winSoundID == 0) {\n        NSURL *soundURL = [[NSBundle mainBundle]\
  \ URLForResource:@\"win\"\n                                                  withExtension:@\"\
  wav\"];\n        AudioServicesCreateSystemSoundID((__bridge CFURLRef)soundURL,\n\
  \                                         &_winSoundID);\n    }\n    AudioServicesPlaySystemSound(_winSoundID);\n\
  \    self.winLabel.text = @\"WINNER!\";\n    [self performSelector:@selector(showButton)\n\
  \               withObject:nil\n               afterDelay:1.5];\n}\n```\n\n第一个方法用于显示按钮。如前所述，当用户点击按钮时，我们会将其隐藏，因为如果转轮已经在旋转，就没有必要让用户再次旋转，直到旋转停止。\n\
  \n第二个方法将在用户获胜时被调用。首先，我们检查是否已经加载了获胜音效。属性初始化为零，而已加载音效的有效标识符不为零，因此我们可以通过比较标识符与零来检查音效是否已加载。要加载音效，我们首先向主包请求名为`win.wav`的音效路径，就像加载依赖选择器视图的属性列表时一样。获取到该资源的路径后，接下来的三行代码加载并播放音效文件。接着，我们将标签设置为`WINNER!`，并调用`showButton`方法；然而，我们是通过一个名为`performSelector:withObject:afterDelay:`的方法以特殊方式调用`showButton`。这是一个所有对象都能使用的非常便捷的方法。它允许你在未来的某个时刻调用方法——本例中是\
  \ 1.5 秒之后，这将在告知用户结果之前，给转盘足够的时间旋转到最终位置。\n\n**注意**：你可能注意到了我们调用`AudioServicesCreateSystemSoundID`函数的方式有些特别。该函数将\
  \ URL 作为其第一个参数，但它期望的并不是`NSURL`的实例，而是一个`CFURLRef`结构体。Apple 通过 Core Foundation 框架为许多常见组件（如\
  \ URL、数组、字符串等）提供了 C 语言接口。这使得即便是完全用 C 语言编写的应用程序，也能访问到我们通常从 Objective-C 中使用的功能。有趣的是，这些\
  \ C 组件与它们的 Objective-C 对应组件是“桥接”的，例如`CFURLRef`在功能上等同于`NSURL`指针。这意味着某些在 Objective-C\
  \ 中创建的对象可以跨过桥接使用 C API，反之亦然。这通过在变量名前加上括号，并在括号中指定你希望变量被解释的类型来实现。从 iOS 5 开始，在使用 ARC\
  \ 时，类型名本身必须加上关键字`__bridge`，这为 ARC 提供了关于该 Objective-C 对象传入 C API 调用时应如何处理的关键提示。\n\
  \n我们还需要对`spin:`方法进行一些修改。我们将编写代码来播放音效，并在玩家获胜时调用`playWinSound`方法。现在对`spin:`方法进行以下修改：\n\
  \n```\n- (IBAction)spin:(id)sender {\n    BOOL win = NO;\n    int numInRow = 1;\n\
  \    int lastVal = -1;\n    for (int i = 0; i < 5; i++) {\n        int newValue\
  \ = random() % [self.images count];\n\nif (newValue == lastVal) {\n            numInRow++;\n\
  \        } else {\n            numInRow = 1;\n        }\n        lastVal = newValue;\n\
  \n[self.picker selectRow:newValue inComponent:i animated:YES];\n        [self.picker\
  \ reloadComponent:i];\n        if (numInRow >=3) {\n            win = YES;\n   \
  \     }\n    }\n    if (_crunchSoundID == 0) {\n        NSString *path = [[NSBundle\
  \ mainBundle] pathForResource:@\"crunch\"\n                                    \
  \                     ofType:@\"wav\"];\n        NSURL *soundURL = [NSURL fileURLWithPath:path];\n\
  \        AudioServicesCreateSystemSoundID((__bridge CFURLRef)soundURL,\n       \
  \                                  &_crunchSoundID);\n    }\n    AudioServicesPlaySystemSound(_crunchSoundID);\n\
  \nif (win) {\n        [self performSelector:@selector(playWinSound)\n          \
  \         withObject:nil\n                   afterDelay:.5];\n    } else {\n   \
  \     [self performSelector:@selector(showButton)\n                   withObject:nil\n\
  \                   afterDelay:.5];\n    }\n    self.button.hidden = YES;\n    self.winLabel.text\
  \ = @\" \";  // 注意引号之间的空格\n\nif (win) {\n        self.winLabel.text = @\"WINNER!\"\
  ;\n    } else {\n        self.winLabel.text = @\"\";\n    }\n}\n```\n\n首先，如果必要的话，我们加载嘎吱音效，就像之前处理获胜音效一样。然后播放嘎吱音效，让玩家知道转轮已经开始旋转。接下来，我们不再在知道用户获胜时立刻将标签设置为`WINNER!`，而是采用了一个巧妙的做法。我们调用刚刚创建的两个方法之一，但通过`performSelector:afterDelay:`延时执行。如果用户获胜，我们在半秒后调用`playWinSound`方法，这会给转盘旋转到位留出时间；否则，我们只需等待半秒，然后重新启用**Spin**按钮。在等待结果期间，我们隐藏按钮并清除标签的文本。\n\
  \n现在完成了！点击 Xcode 的**Run**按钮，然后点击最后一个标签页来查看和收听这个老虎机的运行效果。点击**Spin**按钮应会播放轻微的嘎吱声，而获胜则应播放获胜音效。太棒了！\n\
  \n最终旋转\n\n\n\n到目前为止，你应该已经熟悉了选项卡栏应用和选择器的使用。在本章中，我们从零开始构建了一个包含五种不同内容视图的完整选项卡栏应用。你学习了如何以多种不同配置使用选择器，如何创建包含多个组件的选择器，甚至如何让一个组件中的值依赖于另一个组件中选择的值。你还看到了如何让选择器显示图片而不仅仅是文字。\n\
  \n在此过程中，你了解了选择器的委托和数据源，并学习了如何加载图片、播放声音以及从属性列表创建字典。这一章内容很多，恭喜你坚持了下来！当你准备好开始学习表视图时，请翻到下一页，我们将继续前进。\n\
  \n## 第 8 章：表视图入门\n\n在接下来的几章中，我们将构建一些基于层级导航的应用，类似于 iOS 设备上自带的“邮件”应用。这类应用通常称为主从应用，允许用户深入查看嵌套的数据列表，并对这些数据进行编辑。但在构建这类应用之前，你需要掌握表视图的概念。而这正是本章的目标。\n\
  \n表视图是向用户展示数据列表最常用的机制。它们是高度可配置的对象，几乎可以按照你想要的任何方式呈现。“邮件”应用使用表视图来显示账户、文件夹和消息的列表；然而，表视图并不仅限于展示文本数据。设置、音乐和时钟应用也使用了表视图，尽管这些应用的外观截然不同（参见图\
  \ 8-1）。\n\n![9781484202005_Fig08-01.jpg](img/9781484202005_Fig08-01.jpg)\n\n图 8-1。尽管外观不同，但设置、音乐和时钟应用都使用表视图来显示数据\n\
  \n## 表视图基础\n\n表用于显示数据列表。表列表中的每一项都是一行。iOS 表可以有无限数量的行，仅受可用内存量的限制。iOS 表只能有一列宽。\n\n\
  ### 表视图和表视图单元格\n\n表视图是显示表数据的视图对象，是 `UITableView` 类的一个实例。表中的每一行可见行由 `UITableViewCell`\
  \ 类的实例实现（参见图 8-2）。\n\n![9781484202005_Fig08-02.jpg](img/9781484202005_Fig08-02.jpg)\n\
  \n图 8-2。每个表视图是 `UITableView` 的实例，每个可见行是 `UITableViewCell` 的实例\n\n表视图不负责存储表的数据。它们只存储足够绘制当前可见行的数据。表视图从符合\
  \ `UITableViewDelegate` 协议的对象获取其配置数据，并从符合 `UITableViewDataSource` 协议的对象获取其行数据。稍后在本章的示例程序中，你将看到这一切是如何工作的。\n\
  \n如前所述，所有表都实现为单列。图 8-1 右侧显示的时钟应用看似有两列，但实际上并非如此——表中的每一行都由一个 `UITableViewCell` 表示。默认情况下，`UITableViewCell`\
  \ 对象可以配置为包含一张图片、一些文本和一个可选的附件图标（即右侧的小图标，我们将在下一章详细介绍附件图标）。\n\n如果需要，你还可以通过向 `UITableViewCell`\
  \ 添加子视图来在单元格中放入更多数据。这可以通过两种基本技术之一来实现：在创建单元格时通过编程方式添加子视图，或者从 storyboard 或 nib 文件加载它们。你可以以任何你喜欢的方式布局表视图单元格，并包含任何你想要的子视图。因此，单列的限制远没有听起来那么大。如果这让你感到困惑，别担心——我们会在本章中展示如何使用这两种技术。\n\
  \n### 分组表与平铺表\n\n表视图有两种基本样式：\n\n*   **分组**：分组表视图包含一个或多个行节。在每个节内，所有行紧密地排列在一起，形成一个漂亮的小组；但节与节之间有明显可见的间隙，如图\
  \ 8-3 最左侧的图片所示。请注意，分组表可以只包含一个组。\n*   **平铺**：平铺是默认样式。在这种样式中，节之间的间距稍小，并且每个节的标题可以选择自定义样式。当使用索引时，这种样式也称为索引表（参见图\
  \ 8-3，右侧）。\n\n![9781484202005_Fig08-03.jpg](img/9781484202005_Fig08-03.jpg)\n\n\
  图 8-3。同一个表视图显示为分组表（左）；不带索引的平铺表（中）；带索引的平铺表，也称为索引表（右）\n\n如果你的数据源提供了必要的信息，表视图将允许用户通过显示在右侧的索引来导航列表。\n\
  \n表中每个分区在数据源中被称为一个节。在分组表中，每个节在视觉上表现为一个组。在索引表中，每个按索引分组的数据就是一个节。例如，在图 8-3 所示的索引表中，所有以\
  \ *A* 开头的名称将构成一个节，以 *B* 开头的构成另一个节，以此类推。\n\n**注意** 尽管在技术上可以为分组表创建索引，但你不应这样做。《iPhone\
  \ 人机界面指南》明确说明，分组表不应提供索引。\n\n## 实现一个简单的表\n\n让我们来看一个最简单的表视图示例，以了解其工作原理。在这个示例中，我们将只展示一个文本值列表。\n\
  \n在 Xcode 中创建一个新项目。对于本章，我们将回到“Single View Application”模板，因此选择该模板。将你的项目命名为 *Simple\
  \ Table*，将**语言**设置为 Objective-C，将**设备**字段设置为 *Universal*，并确保**使用 Core Data** 未被勾选。\n\
  \n### 设计视图\n\n在项目导航器中，展开顶层的 *Simple Table* 项目和 *Simple Table* 文件夹。这个应用非常简单，我们不需要任何插座或动作。接着，选择\
  \ *Main.storyboard* 进行编辑。如果“View”窗口在布局区域中不可见，请在文档大纲中单击其图标以打开它。接下来，在对象库中找到表视图（参见图\
  \ 8-4），并将其拖到“View”窗口上。\n\n![9781484202005_Fig08-04.jpg](img/9781484202005_Fig08-04.jpg)\n\
  \n图 8-4。将表视图从库中拖拽到我们的主视图上。请注意，表视图会自动调整大小以填满整个视图\n\n\n\n表格视图应自动根据视图的高度和宽度调整自身大小。这正是我们想要的效果。表格视图被设计为填充屏幕的整个宽度以及大部分高度——即除去应用导航栏、工具栏和标签栏后剩余的空间。将表格视图拖放到视图窗口（View\
  \ window）中，并将其与父视图居中对齐。现在，我们来添加自动布局约束（Auto Layout constraints），以确保无论屏幕尺寸如何，表格视图都能正确定位和调整大小。在文档大纲（Document\
  \ Outline）中选择该表格，然后点击故事板编辑器右下角的**固定**图标（见图 8-5）。\n\n![9781484202005_Fig08-05.jpg](img/9781484202005_Fig08-05.jpg)\n\
  \n图 8-5。固定表格视图以使其适配屏幕\n\n在弹出的窗口顶部，清除**约束到边距**复选框，点击所有四条虚线，并将四个输入框中的距离设置为零。这将使表格视图的四条边都固定到其父视图的对应边上。要应用这些约束，请将**更新框架**更改为*新约束的项目*，然后点击**添加\
  \ 4 个约束**按钮。\n\n再次在文档检查器（Document Inspector）中选择该表格视图，并按**![image](img/sym2.jpg)![image](img/flower.jpg)6**打开连接检查器（Connections\
  \ Inspector）。你会注意到，表格视图的前两个可用连接与我们上一章使用的选择器视图（picker views）的前两个连接相同：`dataSource`\
  \ 和 `delegate`。从每个连接旁边的圆圈拖拽到文档大纲中的**视图控制器**图标或故事板编辑器中视图控制器上方。这使得我们的控制器类同时成为该表格的数据源和委托。\n\
  \n设置好连接后，保存你的故事板，准备深入编写一些 `UITableView` 代码。\n\n### 编写控制器\n\n下一步是控制器类的头文件。单击 `ViewController.m`，并在文件顶部添加以下代码：\n\
  \n```\n#import \"ViewController.h\"\n\n@interface ViewController () <UITableViewDataSource,\
  \ UITableViewDelegate>\n\n@property (copy, nonatomic) NSArray *dwarves;\n\n@end\n\
  \n@implementation ViewController\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
      // 加载视图后执行任何额外设置，通常来自 nib 文件。\n    self.dwarves = @[@\"Sleepy\", @\"Sneezy\"\
  , @\"Bashful\", @\"Happy\",\n                     @\"Doc\", @\"Grumpy\", @\"Dopey\"\
  ,\n                     @\"Thorin\", @\"Dorin\", @\"Nori\", @\"Ori\",\n                    \
  \ @\"Balin\", @\"Dwalin\", @\"Fili\", @\"Kili\",\n                     @\"Oin\"\
  , @\"Gloin\", @\"Bifur\", @\"Bofur\",\n                     @\"Bombur\"];\n}\n```\n\
  \n接下来，在文件末尾添加以下代码：\n\n```\n- (NSInteger)tableView:(UITableView *)tableView\n          \
  \ numberOfRowsInSection:(NSInteger)section {\n    return [self.dwarves count];\n\
  }\n\n- (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    static NSString *SimpleTableIdentifier = @\"SimpleTableIdentifier\"\
  ;\n\nUITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:\n                                      \
  \ SimpleTableIdentifier];\n    if (cell == nil) {\n        cell = [[UITableViewCell\
  \ alloc]\n                initWithStyle:UITableViewCellStyleDefault\n                reuseIdentifier:SimpleTableIdentifier];\n\
      }\n\ncell.textLabel.text = self.dwarves[indexPath.row];\n    return cell;\n\
  }\n\n@end\n```\n\n首先，我们让类遵循了它作为表格视图委托和数据源所需的两个协议。然后，我们声明了一个数组，用于存放要显示的数据。最后，我们向控制器添加了三个方法。第一个方法\
  \ `viewDidLoad` 你应该很熟悉，因为我们之前做过类似的操作。我们只是简单地创建一个数据数组以在表格中显示。在实际应用中，这个数组可能来自其他来源，例如文本文件、属性列表或网络服务。\n\
  \n接着，我们添加了两个数据源方法。第一个方法 `tableView:numberOfRowsInSection: ` 被表格用来询问特定部分有多少行。正如你所料，默认的部分数量是\
  \ 1，该方法会被调用来获取构成列表的这一部分的行数。我们只返回数组中的条目数量。\n\n下一个方法可能需要一点解释，让我们更仔细地看一下：\n\n```\n\
  - (UITableViewCell *)tableView:(UITableView *)tableView\n       cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n```\n\n当表格视图需要绘制某一行时，会调用此方法。注意，该方法的第二个参数是一个 `NSIndexPath` 实例。`NSIndexPath`\
  \ 是表格视图用来将部分（section）和行（row）索引封装到单个对象中的结构。要从 `NSIndexPath` 中获取行索引或部分索引，你只需访问其 `row`\
  \ 属性或 `section` 属性，两者都返回一个整数值。\n\n第一个参数 `tableView` 是对正在构建的表格的引用。这使我们能够创建可作为多个表格数据源的类。\n\
  \n接下来，我们声明了一个静态字符串实例：\n\n```\nstatic NSString *SimpleTableIdentifier = @\"SimpleTableIdentifier\"\
  ;\n```\n\n这个字符串将作为键来表示我们表格单元格的类型。在这个例子中，表格只使用一种单元格类型，但在更复杂的表格中，你可能需要根据内容或位置格式化不同类型的单元格，在这种情况下，你会为每种不同的单元格类型使用一个单独的表格单元格标识符。\n\
  \n一个表格视图一次只能显示几行，但表格本身可能包含多得多的行。记住，表格中的每一行都由 `UITableViewCell` 的一个实例表示，`UITableViewCell`\
  \ 是 `UIView` 的子类，这意味着每一行都可以包含子视图。对于一个大型表格，如果表格试图为每一行都保留一个表格视图单元格实例（无论该行当前是否正在显示），这可能会造成巨大的开销。幸运的是，表格并非如此工作。\n\
  \n相反，当表格视图单元格滚动出屏幕时，它们会被放入一个可重用的单元格队列中。如果系统内存不足，表格视图会丢弃队列中的单元格。但只要系统还有足够的内存来容纳这些单元格，它就会保留它们，以防你再次使用。\n\
  \n每当一个表格视图单元格滚动出屏幕时，很可能另一个单元格正好从另一边滚动到屏幕上。如果这个新行可以重用已经滚出屏幕的单元格，系统就能避免不断创建和释放这些视图所带来的开销。为了利用这个机制，我们将使用之前声明的\
  \ `NSString` 标识符，要求表格视图提供一个之前使用过的、指定类型的单元格。实际上，我们是在请求一个类型为 `SimpleTableIdentifier`\
  \ 的可重用单元格：\n\n```\nUITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:\n\
                                     SimpleTableIdentifier];\n```\n\n\n\n现在，表格视图完全有可能没有任何备用单元格（例如，在初始填充时），因此我们在调用后检查\
  \ `cell` 是否为 `nil`。如果是，我们手动使用该标识符字符串创建一个新的表格视图单元格。在某个时刻，我们不可避免地会重用这里创建的某个单元格，因此我们需要确保使用\
  \ `SimpleTableIdentifier` 来创建它：\n\n```\nif (cell == nil) {\n    cell = [[UITableViewCell\
  \ alloc]\n            initWithStyle:UITableViewCellStyleDefault\n            reuseIdentifier:SimpleTableIdentifier];\n\
  }\n```\n\n对 `UITableViewCellStyleDefault` 感到好奇？先别急。我们将在讨论表格视图单元格样式时介绍它。\n\n现在我们有了一个表格视图单元格，可以返回给表格视图使用。所以，我们只需要将想要显示的信息放入这个单元格中。在表格行中显示文本是一项非常常见的任务，因此表格视图单元格提供了一个名为\
  \ `textLabel` 的 `UILabel` 属性，我们可以设置它来显示字符串。这只需要从我们的 `dwarves` 数组中获取正确的字符串，并用它来设置单元格的\
  \ `textLabel`。\n\n然而，要获取正确的值，我们需要知道表格视图正在询问哪一行。我们可以从 `indexPath` 的 `row` 属性中获取该信息。我们使用表格的行号从数组中获取对应的字符串，将其赋值给单元格的\
  \ `textLabel.text` 属性，然后返回该单元格：\n\n```\ncell.textLabel.text = self.dwarves[indexPath.row];\n\
  return cell;\n```\n\n这并不难，对吧？\n\n编译并运行你的应用程序，你应该会看到数组的值显示在表格视图中，如图 8-6 左侧所示。\n\n\
  ![9781484202005_Fig08-06.jpg](img/9781484202005_Fig08-06.jpg)\n\n图 8-6。Simple Table\
  \ 应用程序，尽显矮人风采\n\n看起来不错，但有一个小问题——向上滚动表格一点，你会看到它的内容出现在状态栏后面，如图 8-6 右侧所示。这个问题是因为我们让表格视图填满了整个屏幕。有时这正是你想要的，但在这里，表格单元格中的文本与状态栏中的文本重叠，看起来很不美观，所以让我们修复它。我们只需更改将表格视图固定到屏幕顶部的约束，使其改为固定到状态栏底部。为此，在项目导航器中选择\
  \ `Main.storyboard`，并确保在文档大纲中选中了表格视图。抓住表格视图的顶部并向下拖动，直到看到状态栏下方出现一条蓝色参考线，如图 8-7 所示，然后松开。\n\
  \n![9781484202005_Fig08-07.jpg](img/9781484202005_Fig08-07.jpg)\n\n图 8-7。更改表格视图顶部的约束，使其不再延伸到状态栏后面\n\
  \n在仍选中表格视图的情况下，点击故事板编辑器右下角的**解决自动布局问题**按钮，然后点击**更新约束**，将顶部约束更改为与表格视图顶部的新位置匹配。现在再次运行应用程序，你会看到表格视图的内容不再滚动到状态栏下方。\n\
  \n### 添加图片\n\n如果我们能为每一行添加一张图片，那就太好了。猜猜我们需要创建 `UITableViewCell` 的子类或添加子视图来实现？实际上，不，如果你能接受图片位于每行左侧，那么默认的表格视图单元格完全可以处理这种情况。让我们来看看。\n\
  \n将示例源代码存档中 `08 – Star Image` 文件夹中的 `star.png` 和 `star2.png` 文件拖到你的项目的 `Images.xcassets`\
  \ 中。我们将安排这些图标出现在表格视图的每一行上。我们只需要为每个图标创建一个 `UIImage`，并在表格视图向其数据源请求每行的单元格时将其赋值给 `UITableViewCell`。为此，在文件\
  \ `ViewController.m` 中，将以下粗体代码添加到 `tableView:cellForRowAtIndexPath:` 方法中：\n\n```\n\
  - (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    static NSString *SimpleTableIdentifier = @\"SimpleTableIdentifier\"\
  ;\n\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:\n\
  \                                       SimpleTableIdentifier];\n    if (cell ==\
  \ nil) {\n        cell = [[UITableViewCell alloc]\n                initWithStyle:UITableViewCellStyleDefault\n\
  \                reuseIdentifier:SimpleTableIdentifier];\n    }\n\n    UIImage *image\
  \ = [UIImage imageNamed:@\"star\"];\n    cell.imageView.image = image;\n    UIImage\
  \ *highlightedImage = [UIImage imageNamed:@\"star2\"];\n    cell.imageView.highlightedImage\
  \ = highlightedImage;\n\n    cell.textLabel.text = self.dwarves[indexPath.row];\n\
  \    return cell;\n}\n```\n\n是的，就是这样。每个单元格都有一个 `imageView` 属性，类型为 `UIImage`，而它又具有名为\
  \ `image` 和 `highlightedImage` 的属性。`image` 属性提供的图片显示在单元格文本的左侧，如果提供了 `highlightedImage`，则在选中单元格时会被替换。你只需将单元格的\
  \ `imageView.image` 和 `imageView.highlightedImage` 属性设置为你想要显示的图片即可。\n\n如果你现在编译并运行你的应用程序，你应该会得到一个列表，每行左侧都有一堆漂亮的蓝色小星星图标（参见图\
  \ 8-8）。如果你选择任意一行，你会看到它的图标从蓝色变为绿色，这是 `star2.png` 文件中图片的颜色。当然，我们可以为表格中的每一行包含不同的图片，或者，只需很少的功夫，我们也可以为迪士尼先生的全部小矮人使用一个图标，而为托尔金先生的小矮人使用另一个不同的图标。\n\
  \n![9781484202005_Fig08-08.jpg](img/9781484202005_Fig08-08.jpg)\n\n图 8-8。我们使用了单元格的\
  \ `imageView` 属性为表格视图的每个单元格添加了图片\n\n**注意**：`UIImage` 使用基于文件名的缓存机制，因此每次调用 `imageNamed:`\
  \ 时，它不会加载新的 `image` 属性。相反，它会使用已缓存的版本。\n\n### 使用表格视图单元格样式\n\n到目前为止，你在表格视图中所做的工作使用了默认的单元格样式，如图\
  \ 8-8 所示，由常量 `UITableViewCellStyleDefault` 表示。但 `UITableViewCell` 类还包含其他几种预定义的单元格样式，让你可以轻松地为表格视图增加更多变化。这些单元格样式使用三种不同的单元格元素：\n\
  \n* **图片**：如果指定样式包含图片，则图片显示在单元格文本的左侧。\n* **文本标签**：这是单元格的主要文本。在我们一直使用的 `UITableViewCellStyleDefault`\
  \ 样式的情况下，文本标签是单元格中唯一显示的文本。\n* **详细文本标签**：这是单元格的次要文本，通常用作说明性注释或标签。\n\n为了看看这些新样式添加的效果，将以下代码添加到\
  \ `ViewController.m` 的 `tableView:cellForRowAtIndexPath:` 中：\n\n```\n- (UITableViewCell\
  \ *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n{\n    static NSString *SimpleTableIdentifier = @\"SimpleTableIdentifier\"\
  ;\n```\n\n\n\n```objc\nUITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:SimpleTableIdentifier];\n\
  if (cell == nil) {\n    cell = [[UITableViewCell alloc]\n            initWithStyle:UITableViewCellStyleDefault\n\
  \            reuseIdentifier:SimpleTableIdentifier];\n}\n\nUIImage *image = [UIImage\
  \ imageNamed:@\"star\"];\ncell.imageView.image = image;\nUIImage *highlightedImage\
  \ = [UIImage imageNamed:@\"star2\"];\ncell.imageView.highlightedImage = highlightedImage;\n\
  \ncell.textLabel.text = self.dwarves[indexPath.row];\n\nif (indexPath.row < 7) {\n\
  \    cell.detailTextLabel.text = @\"Mr. Disney\";\n} else {\n    cell.detailTextLabel.text\
  \ = @\"Mr. Tolkien\";\n}\nreturn cell;\n```\n\n我们在这里所做的只是设置了单元格的详细文本。对于前七行，我们使用字符串\
  \ `@\"Mr. Disney\"`，其余行则使用字符串 `@\"Mr. Tolkien\"`。当你运行这段代码时，每个单元格的外观将与此前完全相同（参见图\
  \ 8-9）。这是因为我们使用的是 `UITableViewCellStyleDefault` 样式，该样式不使用详细文本。\n\n![9781484202005_Fig08-09.jpg](img/9781484202005_Fig08-09.jpg)\n\
  \n图 8-9. 默认单元格样式将图像和文本标签显示在一条直线上\n\n现在，将 `UITableViewCellStyleDefault` 改为 `UITableViewCellStyleSubtitle`，如下所示：\n\
  \n```objc\nif (cell == nil) {\n    cell = [[UITableViewCell alloc]\n           \
  \ initWithStyle:UITableViewCellStyleSubtitle\n            reuseIdentifier:SimpleTableIdentifier];\n\
  }\n```\n\n现在重新运行应用程序。使用副标题样式后，两个文本元素会上下堆叠显示（参见图 8-10）。\n\n![9781484202005_Fig08-10.jpg](img/9781484202005_Fig08-10.jpg)\n\
  \n图 8-10. 副标题样式将详细文本以更小的灰色字体显示在文本标签下方\n\n接下来，将 `UITableViewCellStyleSubtitle` 改为\
  \ `UITableViewCellStyleValue1`，然后构建并再次运行。此样式将文本标签和详细文本标签放在同一行，但位于单元格的两侧（参见图 8-11）。\n\
  \n![9781484202005_Fig08-11.jpg](img/9781484202005_Fig08-11.jpg)\n\n图 8-11. 样式 value\
  \ 1 将文本标签以黑色字体放在左侧，详细文本以蓝色字体右对齐放在右侧\n\n最后，将 `UITableViewCellStyleValue1` 改为 `UITableViewCellStyleValue2`。这种格式通常用于在显示信息的同时附带描述性标签。它不会显示单元格的图标，而是将详细文本标签放在文本标签的左侧（参见图\
  \ 8-12）。在这种布局中，详细文本标签充当描述文本标签所持有数据类型的标签。\n\n![9781484202005_Fig08-12.jpg](img/9781484202005_Fig08-12.jpg)\n\
  \n图 8-12. 样式 value 2 不显示图像，并将详细文本标签以蓝色字体放在文本标签左侧\n\n现在你已经了解了可用的单元格样式，在继续之前，请将样式改回\
  \ `UITableViewCellStyleDefault`。在本章后面，你将学习如何创建自定义表格视图单元格。但在那之前，请务必考虑现有的单元格样式，看看其中是否有符合你需求的样式。\n\
  \n你可能已经注意到，我们将控制器同时设为了此表格视图的数据源和委托；但截至目前，我们实际上还没有实现 `UITableViewDelegate` 协议中的任何方法。与选择器视图不同，较简单的表格视图不需要使用委托来执行其功能。数据源提供了绘制表格所需的全部数据。委托的用途是配置表格视图的外观并处理特定的用户交互。现在，让我们来看几个配置选项。我们将在下一章中讨论更多内容。\n\
  \n#### 设置缩进级别\n\n委托可用于指定某些行应缩进。在文件 `ViewController.m` 中，在 `@end` 声明之前添加以下方法：\n\n\
  ```objc\n- (NSInteger)tableView:(UITableView *)tableView\nindentationLevelForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    return indexPath.row % 4;\n}\n```\n\n此方法根据行号设置每行的**缩进级别**；因此，第\
  \ 0 行的缩进级别为 0，第 1 行的缩进级别为 1，以此类推。由于使用了 `%` 运算符，第 4 行将回到缩进级别 0，然后循环往复。缩进级别只是一个整数，它告诉表格视图将该行向右移动一点。数字越大，行向右缩进得越多。例如，你可以使用这种技术来指示某一行从属于另一行，就像邮件应用在表示子文件夹时那样。\n\
  \n再次运行应用程序时，你会看到行以四个为一组进行缩进，如图 8-13 所示。\n\n![9781484202005_Fig08-13.jpg](img/9781484202005_Fig08-13.jpg)\n\
  \n图 8-13. 缩进的表格行\n\n#### 处理行选择\n\n表格的委托有两个方法用于处理行选择。一个方法在行被选中之前调用，可用于阻止行被选中，甚至更改将要被选中的行。让我们实现该方法，并指定第一行不可选。在\
  \ `ViewController.m` 的末尾，`@end` 声明之前添加以下方法：\n\n```objc\n- (NSIndexPath *)tableView:(UITableView\
  \ *)tableView\n           willSelectRowAtIndexPath:(NSIndexPath *)indexPath {\n\
  \    if (indexPath.row == 0) {\n        return nil;\n    } else {\n        return\
  \ indexPath;\n    }\n}\n```\n\n此方法接收一个表示即将被选中项的 `indexPath`。我们的代码检查即将选中的是哪一行，如果是第一行（始终为索引\
  \ 0），则返回 `nil`，表示实际上不应选择任何行。否则，它返回未经修改的 `indexPath`，以此表示允许继续选择。\n\n在编译和运行之前，让我们也实现行被选中后调用的委托方法，这通常是实际处理选择的地方。在下一章中，我们将使用此方法处理主从应用程序中的下钻操作，但在本章中，我们只会弹出一个警告来显示行已被选中。再次在\
  \ `ViewController.m` 的底部，`@end` 声明之前添加以下方法：\n\n```objc\n- (void)tableView:(UITableView\
  \ *)tableView\n        didSelectRowAtIndexPath:(NSIndexPath *)indexPath {\n    NSString\
  \ *rowValue = self.dwarves[indexPath.row];\n    NSString *message = [[NSString alloc]\
  \ initWithFormat:\n                         @\"You selected %@\", rowValue];\n```\n\
  \n\n\n```objectivec\nUIAlertController *controller =\n        [UIAlertController\
  \ alertControllerWithTitle:@\"行已选中！\"\n                        message:message\n\
  \                        preferredStyle: UIAlertControllerStyleAlert];\n    UIAlertAction\
  \ *cancelAction =\n             [UIAlertAction actionWithTitle:@\"是的，我确认\"\n   \
  \                         style: UIAlertActionStyleDefault\n                   \
  \         handler: nil];\n    [controller addAction:cancelAction];\n    [self presentViewController:controller\
  \ animated:YES completion:nil];\n\n[tableView deselectRowAtIndexPath:indexPath animated:YES];\n\
  }\n```\n\n添加完此方法后，编译并运行应用程序，然后测试一下效果。例如，检查你是否能选中第一行（你应该无法选中），然后选中其他行。被选中的行会高亮显示，同时弹出提示框告诉你选中的是哪一行，而被选中的行会在背景中逐渐淡出（参见图\
  \ 8-14）。\n\n![9781484202005_Fig08-14.jpg](img/9781484202005_Fig08-14.jpg)\n\n图 8-14.\
  \ 在本例中，第一行不可选，当选中其他任意行时会显示一个提示框\n\n请注意，你还可以在返回索引路径之前对其进行修改，这会导致选中不同的行和/或分区。你很少会这样做，因为更改用户的选择需要有非常充分的理由。在绝大多数使用`tableView:willSelectRowAtIndexPath:`方法的情况下，你要么直接返回未修改的`indexPath`以允许选中，要么返回`nil`来禁止选中。如果你确实想更改选中的行和/或分区，请使用`NSIndexPath\
  \ indexPathForRow:inSection:`方法创建一个新的`NSIndexPath`对象并返回它。例如，以下代码将确保当你尝试选中一个偶数行时，实际上会选中该行的下一行：\n\
  \n```objectivec\n- (NSIndexPath *)tableView:(UITableView *)tableView\n        willSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    if (indexPath.row == 0) {\n        return nil;\n    } else\
  \ if (indexPath.row % 2 == 0) {\n        return [NSIndexPath indexPathForRow:indexPath.row\
  \ + 1\n             inSection:indexPath.section];\n    } else {\n        return\
  \ indexPath;\n    }\n}\n```\n\n#### 更改字体大小和行高\n\n假设我们想要更改表格视图中使用的字体大小。在大多数情况下，你不应覆盖默认字体，因为这是用户期望看到的样式。但有时确实有更改字体的合理理由。在`tableView:cellForRowAtIndexPath:`方法中添加以下代码行：\n\
  \n```objectivec\n- (UITableViewCell *)tableView:(UITableView *)tableView\n     \
  \    cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n    static NSString *SimpleTableIdentifier\
  \ = @\"SimpleTableIdentifier\";\n\nUITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:\n\
  \                                       SimpleTableIdentifier];\n    if (cell ==\
  \ nil) {\n        cell = [[UITableViewCell alloc]\n                initWithStyle:UITableViewCellStyleDefault\n\
  \                reuseIdentifier:SimpleTableIdentifier];\n    }\n\nUIImage *image\
  \ = [UIImage imageNamed:@\"star\"];\n    cell.imageView.image = image;\n    UIImage\
  \ *highlightedImage = [UIImage imageNamed:@\"star2\"];\n    cell.imageView.highlightedImage\
  \ = highlightedImage;\n\ncell.textLabel.text = self.dwarves[indexPath.row];\n  \
  \  cell.textLabel.font = [UIFont boldSystemFontOfSize:50];\n\nif (indexPath.row\
  \ < 7) {\n        cell.detailTextLabel.text = @\"迪士尼先生\";\n    } else {\n      \
  \  cell.detailTextLabel.text = @\"托尔金先生\";\n    }\n    return cell;\n}\n```\n\n\
  现在运行应用程序时，列表中的值会以非常大的字体显示，但它们并不能完全适合行高（参见图 8-15）。在 iOS 8 中，除非你另行指定，否则表格视图会根据内容自动调整每行的高度，但如你所见，在这种情况下，新的行高实际上比应有的高度要大。\n\
  \n![9781484202005_Fig08-15.jpg](img/9781484202005_Fig08-15.jpg)\n\n图 8-15. 更改用于绘制表格视图单元格的字体\n\
  \n有几种方法可以解决这个问题。首先，我们可以告诉表格其所有行都应具有给定的固定高度。为此，我们可以设置其`rowHeight`属性，如下所示：\n\n```objectivec\n\
  tableView.rowHeight = 70;\n```\n\n如果你需要不同的行有不同的高度，可以实现`UITableViewDelegate`的`tableView:heightForRowAtIndexPath:`方法。继续将此方法添加到你的控制器类中，放在`@end`之前：\n\
  \n```objectivec\n- (CGFloat)tableView:(UITableView *)tableView\n            heightForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    return indexPath.row == 0 ? 120 : 70;\n}\n```\n\n我们刚刚告诉表格视图，将所有行的行高设置为\
  \ 70 点，除了第一行，它会稍微大一些。编译并运行，现在表格的行应该更适合其内容了（参见图 8-16）。\n\n![9781484202005_Fig08-16.jpg](img/9781484202005_Fig08-16.jpg)\n\
  \n图 8-16. 使用委托更改行大小。注意第一行比其他行高得多\n\n委托还可以处理更多任务，但大多数剩余任务在你开始处理分层数据时才会发挥作用，我们将在下一章中介绍。要了解更多信息，请使用文档浏览器查看`UITableViewDelegate`协议，并了解还有哪些其他可用方法。\n\
  \n## 自定义表格视图单元格\n\n你可以在开箱即用的表格视图中实现很多功能；但通常，你希望以`UITableViewCell`直接不支持的方式来格式化每一行的数据。在这些情况下，有三种基本方法：一种是在创建单元格时以编程方式将子视图添加到`UITableViewCell`中；第二种是从\
  \ nib 文件加载单元格；第三种方法类似，但是从故事板加载单元格。我们将在本章中介绍前两种技术，并在第 9 章中看到一个从故事板创建单元格的示例。\n\n###\
  \ 向表格视图单元格添加子视图\n\n为了演示如何使用自定义单元格，我们将创建一个带有另一个表格视图的新应用程序。在每一行中，我们将显示两行信息以及两个标签（参见图\
  \ 8-17）。我们的应用程序将显示一系列可能熟悉的计算机型号的名称和颜色，我们通过向表格视图单元格添加子视图的方式，将这两部分信息显示在同一个表格单元格中。\n\
  \n![9781484202005_Fig08-17.jpg](img/9781484202005_Fig08-17.jpg)\n\n图 8-17. 向表格视图单元格添加子视图可以实现多行显示\n\
  \n使用单视图应用程序模板创建一个新的 Xcode 项目。将项目命名为*Table Cells*，并使用与上一个项目相同的设置。点击*Main.storyboard*在\
  \ Interface Builder 中编辑 GUI。\n\n\n\n将 Table View 添加到主视图中，调整其大小使其填充整个视图，但 Table View\
  \ 的顶部应与状态栏底部对齐，而非视图顶部。使用连接检查器将其 `data source` 设置为视图控制器，就像我们为 Simple Table 应用程序所做的那样。然后，使用窗口底部的\
  \ **Pin** 按钮创建 Table View 边缘与其父视图边缘以及状态栏之间的约束。实际上，你可以使用与 图 8-5 中相同的设置，因为你在弹出窗口顶部输入框中指定的值，默认情况下是\
  \ Table View 与其最近邻接对象在四个方向上的距离。上次，Table View 上方的最近邻接对象是主视图本身，但现在是状态栏，因此 Xcode 将创建约束，确保\
  \ Table View 的顶部正好在状态栏底部下方。最后，保存 storyboard。\n\n### 创建 `UITableViewCell` 子类\n\n\
  在此之前，我们一直使用的标准 Table View 单元已经为我们处理了所有单元布局的细节。我们的控制器代码无需处理标签和图像放置的繁琐细节，只需将显示值传递给单元即可。这将表示逻辑从控制器中分离出来，这是一个非常好的设计原则。对于本项目，我们将创建一个新的\
  \ `UITableViewCell` 子类，由它负责处理新布局的细节，从而使我们的控制器尽可能简单。\n\n### 添加新单元\n\n在项目导航器中选择 *Table\
  \ Cells* 文件夹，然后按 **![image](img/flower.jpg)N** 创建新文件。在弹出的辅助视图中，从 **iOS** 部分选择 **Cocoa\
  \ Touch Class**，然后点击 **Next**。在下一个屏幕上，输入 **NameAndColorCell** 作为新类的名称，在 **Subclass\
  \ of** 弹出列表中选择 `UITableViewCell`，再次点击 **Next**，然后在下一个屏幕上点击 **Create**。\n\n现在，在项目导航器中选择\
  \ `NameAndColorCell.h`，并添加以下代码：\n\n```objectivec\n#import <UIKit/UIKit.h>\n\n@interface\
  \ NameAndColorCell : UITableViewCell\n\n@property (copy, nonatomic) NSString *name;\n\
  @property (copy, nonatomic) NSString *color;\n\n@end\n```\n\n在这里，我们为单元的接口添加了两个属性，控制器将使用它们将值传递给每个单元。请注意，我们没有使用\
  \ `strong` 语义声明 `NSString` 属性，而是使用了 `copy`。对 `NSString` 值这样做总是一个好主意，因为传递给属性设置器的字符串值可能是一个\
  \ `NSMutableString`，发送者以后可以修改它，从而导致问题。将传递给属性的每个字符串都复制一份，我们就能获得一个稳定、不可更改的字符串快照，反映了调用设置器时字符串的内容。\n\
  \n现在切换到 `NameAndColorCell.m` 并添加以下代码：\n\n```objectivec\n#import \"NameAndColorCell.h\"\
  \n\n@interface NameAndColorCell ()\n\n@property (strong, nonatomic) UILabel *nameLabel;\n\
  @property (strong, nonatomic) UILabel *colorLabel;\n\n@end\n```\n\n在这里，我们添加了一个类扩展，定义了两个属性，我们将使用它们来访问即将添加到单元中的一些子视图。我们的单元将包含四个子视图，其中两个是内容固定的标签，另外两个的内容会随每一行变化，因此需要建立输出口。\n\
  \n这些就是我们需要添加的所有属性，接下来让我们进入 `@implementation` 部分。我们将在 `initWithStyle:reuseIdentifier:`\
  \ 方法中添加一些代码，以创建我们需要显示的视图：\n\n```objectivec\n- (id)initWithStyle:(UITableViewCellStyle)style\n\
  \              reuseIdentifier:(NSString *)reuseIdentifier {\n    self = [super\
  \ initWithStyle:style reuseIdentifier:reuseIdentifier];\n    if (self) {\n     \
  \   // Initialization code\n        CGRect nameLabelRect = CGRectMake(0, 5, 70,\
  \ 15);\n        UILabel *nameMarker = [[UILabel alloc] initWithFrame:nameLabelRect];\n\
  \        nameMarker.textAlignment = NSTextAlignmentRight;\n        nameMarker.text\
  \ = @\"Name:\";\n        nameMarker.font = [UIFont boldSystemFontOfSize:12];\n \
  \       [self.contentView addSubview:nameMarker];\n\n        CGRect colorLabelRect\
  \ = CGRectMake(0, 26, 70, 15);\n        UILabel *colorMarker = [[UILabel alloc]\
  \ initWithFrame:colorLabelRect];\n        colorMarker.textAlignment = NSTextAlignmentRight;\n\
  \        colorMarker.text = @\"Color:\";\n        colorMarker.font = [UIFont boldSystemFontOfSize:12];\n\
  \        [self.contentView addSubview:colorMarker];\n\n        CGRect nameValueRect\
  \ = CGRectMake(80, 5, 200, 15);\n        self.nameLabel = [[UILabel alloc] initWithFrame:nameValueRect];\n\
  \        [self.contentView addSubview:_nameLabel];\n\n        CGRect colorValueRect\
  \ = CGRectMake(80, 25, 200, 15);\n        self.colorLabel = [[UILabel alloc] initWithFrame:colorValueRect];\n\
  \        [self.contentView addSubview:_colorLabel];\n    }\n    return self;\n}\n\
  ```\n\n这应该非常直观。我们创建了四个 `UILabel` 并将它们添加到 Table View 单元中。Table View 单元已经有一个名为 `contentView`\
  \ 的 `UIView` 子视图，用于将它的所有子视图分组。因此，我们不是直接将标签作为子视图添加到 Table View 单元，而是添加到它的 `contentView`\
  \ 中。\n\n其中两个标签包含静态文本。标签 `nameMarker` 包含文本 *Name:*，标签 `colorMarker` 包含文本 *Color:*。这些是我们不会更改的标签。这两个标签都使用\
  \ `NSTextAlignmentRight` 将文本右对齐。\n\n我们将使用另外两个标签来显示特定行的数据。请记住，我们以后需要某种方式来检索这些字段，因此我们在之前声明的属性中保留了对这两个标签的引用。\n\
  \n现在，让我们通过添加以下两个设置方法（在 `@end` 之前）来完成 `NameAndColorCell` 类的收尾工作：\n\n```objectivec\n\
  - (void)setName:(NSString *)n {\n    if (![n isEqualToString:_name]) {\n       \
  \ _name = [n copy];\n        self.nameLabel.text = _name;\n    }\n}\n\n- (void)setColor:(NSString\
  \ *)c {\n    if (![c isEqualToString:_color]) {\n        _color = [c copy];\n  \
  \      self.colorLabel.text = _color;\n    }\n}\n```\n\n你已经知道，像我们在头文件中那样使用 `@property`\
  \ 会隐式地为每个属性创建 getter 和 setter 方法。然而，这里我们却在为 `name` 和 `color` 定义自己的 setter！事实证明，这完全没有问题。只要一个类定义了它自己的\
  \ getter 或 setter，就会使用这些自定义方法，而不是默认方法。在这个类中，我们使用默认的合成 getter，但定义了自己的 setter。每当为\
  \ `name` 或 `color` 属性传递新值时，我们都会更新之前创建的标签。\n\n### 实现控制器的代码\n\n现在，让我们设置简单的控制器，以便在我们漂亮的新单元中显示值。首先选择\
  \ `ViewController.h`，并在其中添加以下代码：\n\n```objectivec\n#import <UIKit/UIKit.h>\n\n@interface\
  \ ViewController : UIViewController\n    <UITableViewDataSource>\n\n@end\n```\n\n\
  在我们的控制器中，需要设置一些要使用的数据，然后实现 Table 数据源方法将这些数据提供给 Table。切换到 `ViewController.m`，并在文件开头添加以下代码：\n\
  \n```objectivec\n#import \"ViewController.h\"\n#import \"NameAndColorCell.h\"\n\n\
  static NSString *CellTableIdentifier = @\"CellTableIdentifier\";\n\n@interface ViewController\
  \ ()\n\n@property (copy, nonatomic) NSArray *computers;\n@property (weak, nonatomic)\
  \ IBOutlet UITableView *tableView;\n\n@end\n\n@implementation ViewController\n```\n\
  \n\n\n`- (void)viewDidLoad`\n```\n{\n    [super viewDidLoad];\n    // Do any additional\
  \ setup after loading the view, typically from a nib.\n\n    self.computers = @[@{@\"\
  Name\" : @\"MacBook Air\", @\"Color\" : @\"Silver\"},\n                       @{@\"\
  Name\" : @\"MacBook Pro\", @\"Color\" : @\"Silver\"},\n                       @{@\"\
  Name\" : @\"iMac\", @\"Color\" : @\"Silver\"},\n                       @{@\"Name\"\
  \ : @\"Mac Mini\", @\"Color\" : @\"Silver\"},\n                       @{@\"Name\"\
  \ : @\"Mac Pro\", @\"Color\" : @\"Black\"}];\n\n    [self.tableView registerClass:[NameAndColorCell\
  \ class]\n           forCellReuseIdentifier:CellTableIdentifier];\n}\n```\n\n这个版本的\
  \ `viewDidLoad` 将一个字典数组赋值给 `computers` 属性。每个字典包含表格中一行的名称和颜色信息。该行的名称以键 `Name` 存储在字典中，颜色则以键\
  \ `Color` 存储。\n\n**注意** 还记得 Mac 曾经有多种颜色可选，比如米色、铂金色、黑色和白色吗？更不用说最初的 iMac 和 iBook 系列那美丽的彩虹色系了。而现在，除了最新款\
  \ Mac Pro，只剩下一种颜色：银色。哼。好吧，至少我们现在可以用多彩的 iPhone 来安慰自己。\n\n我们还为表格视图添加了一个输出口，因此需要在故事板中连接它。选择\
  \ `Main.storyboard` 文件。在文档大纲中，按住 Control 键从**视图控制器**图标拖到**表格视图**图标。松开鼠标，在弹出的菜单中选中\
  \ `tableView`，将表格视图连接到输出口。\n\n现在，在 `ViewController.m` 的末尾，`@end` 声明之前添加以下代码：\n\n\
  ```\n- (NSInteger)tableView:(UITableView *)tableView\n numberOfRowsInSection:(NSInteger)section\
  \ {\n    return [self.computers count];\n}\n\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView\n         cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n    NameAndColorCell\
  \ *cell =\n        [tableView dequeueReusableCellWithIdentifier:\n             \
  \                      CellTableIdentifier\n                   forIndexPath:indexPath];\n\
  \n    NSDictionary *rowData = self.computers[indexPath.row];\n    cell.name = rowData[@\"\
  Name\"];\n    cell.color = rowData[@\"Color\"];\n\n    return cell;\n}\n\n@end\n\
  ```\n\n你在之前的示例中已经见过这些方法——它们属于 `UITableViewDataSource` 协议。让我们聚焦于 `tableView:cellForRowWithIndexPath:`，因为这里才是我们真正接触新东西的地方。这里我们使用了一个有趣的特性：表格视图可以利用某种注册机制，在需要时创建新单元格。这意味着，只要我们为表格视图注册了所有将要使用的重用标识符，就总能获取到可用的单元格。在之前的示例中，我们使用了\
  \ `dequeueReusableCellWithIdentifier:` 方法。该方法也使用注册机制，但如果我们提供的标识符未注册，它会返回 `nil`。这个\
  \ `nil` 返回值被用作一个信号，表明我们需要创建并填充一个新的 `UITableViewCell` 对象。而我们这里使用的 `dequeueReusableCellWithIdentifier:forIndexPath:`\
  \ 方法从不返回 `nil`，那么它是如何获取表格单元格对象的呢？它将我们传入的标识符作为键在注册表中查找，我们在 `viewDidLoad` 方法中向注册表添加了一个映射到表格单元格标识符的条目：\n\
  \n```\n[tableView registerClass:[NameAndColorCell class]\n  forCellReuseIdentifier:CellTableIdentifier];\n\
  ```\n\n如果我们传入一个未注册的标识符会发生什么？在这种情况下，`dequeueReusableCellWithIdentifier:forIndexPath:`\
  \ 方法会崩溃。崩溃听起来很糟糕，但在这里，它会是开发过程中能立刻发现的 bug 所导致的结果。因此，我们不需要编写检查 `nil` 返回值的代码，因为这种情况永远不会发生。\n\
  \n一旦获得新单元格，我们就使用传入的 `indexPath` 参数来确定表格请求的是哪一行的单元格，然后利用该行值来获取请求行对应的字典。记住，字典包含两个键值对——一个对应\
  \ `name`，另一个对应 `color`：\n\n```\nNSDictionary *rowData = self.computers[indexPath.row];\n\
  ```\n\n现在，剩下要做的就是使用我们在子类中定义的属性，将选定行的数据填充到单元格中：\n\n```\ncell.name = rowData[@\"Name\"\
  ];\ncell.color = rowData[@\"Color\"];\n```\n\n正如你之前所见，设置这些属性会将值复制到表格视图单元格的名称和颜色标签中。\n\
  \n编译并运行你的应用程序。你应该会看到一个包含多行的表格，每行显示两行数据，如图 Figure 8-17 所示。\n\n能够向表格视图单元格添加视图，比单独使用标准表格视图单元格提供了更多的灵活性，但通过编程方式创建、定位和添加所有子视图可能会有些繁琐。天哪，要是能用\
  \ Xcode 的 GUI 编辑工具以图形化方式设计表格视图单元格就好了。嗯，我们很幸运。正如之前提到的，你可以使用 Interface Builder 来设计表格视图单元格，然后在创建新单元格时，直接从故事板或\
  \ nib 文件中加载这些视图。\n\n## 从 Nib 加载 UITableViewCell\n\n我们将利用 Xcode 在 Interface Builder\
  \ 中提供的可视化布局能力，重新创建刚刚用代码实现的那个双行界面。为此，我们将创建一个新的 nib 文件，其中包含表格视图单元格，并使用 Interface Builder\
  \ 来布局其视图。然后，当我们需要一个表格视图单元格来表示一行时，我们只需加载 nib 文件，并使用已定义的单元格类属性来设置名称和颜色。除了使用 Interface\
  \ Builder 的可视化布局之外，我们还将简化其他几处的代码。在继续之前，你可能想复制一份 Table Cells 项目，以便在其中进行后续修改。或者，你也可以在示例源代码归档的\
  \ `Table Cells 2` 文件夹中找到当前状态的 Table Cells 项目副本，并以此作为起点。\n\n首先，我们对 `NameAndColorCell.m`\
  \ 中的 `NameAndColorCell` 类进行一些修改。第一步是将属性标记为输出口，以便在 Interface Builder 中使用它们。在靠近顶部的类扩展中进行如下修改：\n\
  \n```\n@interface NameAndColorCell ()\n\n@property (strong, nonatomic) IBOutlet\
  \ UILabel *nameLabel;\n@property (strong, nonatomic) IBOutlet UILabel *colorLabel;\n\
  \n@end\n```\n\n现在，还记得我们在 `initWithStyle:reuseIdentifier:` 中创建标签所做的设置吗？所有这些都可以删掉了。事实上，你应该直接删除整个方法，因为所有这些设置现在都将在\
  \ Interface Builder 中完成！\n\n完成这些之后，你得到的单元格类比之前更简洁、更清爽。它现在唯一真正的功能就是将数据传输到标签中。接下来，我们需要在\
  \ Interface Builder 中重新创建单元格及其标签。\n\n在 Xcode 中右键点击 `Table Cells` 文件夹，从上下文菜单中选择 **New\
  \ File...**。在新的文件助手左侧窗格中，点击 **User Interface**（确保在 **iOS** 部分选择，而不是 **OS X** 部分）。在右上窗格中选择\
  \ **Empty**，然后点击 **Next**。在接下来的界面中，使用文件名 `NameAndColorCell.xib`。确保文件浏览器中选中了主项目目录，并且\
  \ **Group** 弹出菜单中选中了 `Table Cells` 组。点击 **Create** 创建新的 nib 文件。\n\n### 在 Interface\
  \ Builder 中设计表格视图单元格\n\n\n\n接下来，在项目导航器中选中 `NameAndColorCell.xib` 以打开文件进行编辑。到目前为止，我们一直在故事板中进行全部\
  \ GUI 编辑，但现在改用 nib 文件。大多数操作是相似的，会让你感到非常熟悉，但也有一些不同之处。主要区别之一在于：故事板文件围绕视图控制器与视图的配对场景展开，而\
  \ nib 文件不存在这种强制配对关系。事实上，nib 文件通常根本不包含真实的控制器对象，只有一个名为 `File's Owner` 的代理。如果你打开文档大纲，就会看到它位于“第一响应者”上方。\n\
  \n在库中寻找一个表格视图单元格（参见图 8-18），并将其中一个拖拽到 GUI 布局区域。\n\n![9781484202005_Fig08-18.jpg](img/9781484202005_Fig08-18.jpg)\n\
  \n图 8-18。我们将一个表格视图单元格从库中拖拽到 nib 编辑器中\n\n接下来，按下 `![image](img/sym2.jpg)![image](img/flower.jpg)4`\
  \ 进入属性检查器（参见图 8-19）。你首先会看到的字段之一是 `Identifier`。这正是我们在代码中一直使用的复用标识符。如果不记得了，请翻阅本章前面内容，找到\
  \ `CellTableIdentifier`。将 `Identifier` 值设置为 `CellTableIdentifier`。\n\n![9781484202005_Fig08-19.jpg](img/9781484202005_Fig08-19.jpg)\n\
  \n图 8-19。表格视图单元格的属性检查器\n\n这里的思路是：当我们获取一个单元格以复用时（例如，由于滚动将新单元格移入视野），我们希望确保获取到正确的单元格类型。当这个特定单元格从\
  \ nib 文件实例化时，其复用标识符实例变量将预先填充你在属性检查器的 `Identifier` 字段中输入的名称——即 `CellTableIdentifier`。\n\
  \n设想一个场景：你创建了一个带表头以及一系列“中间”单元格的表格。如果将某个中间单元格滚动到视野中，重要的是你要取出一个中间单元格进行复用，而不是表头单元格。`Identifier`\
  \ 字段让你能够恰当地标记单元格。\n\n下一步是编辑表格单元格的内容视图。首先，在编辑区域选中表格单元格，向下拖拽其下边缘，使单元格变得稍高一些。持续拖拽，直到高度达到\
  \ `65`。进入库，拖出四个标签控件，并将它们放置在内容视图中，参考图 8-20 作为指引。这些标签可能会离顶部和底部太近，导致辅助线作用不大，但左侧辅助线和对齐辅助线应能发挥其作用。注意，你可以先拖出一个标签，然后按住\
  \ Option 键拖拽来创建副本，如果这种方法对你而言更方便的话。\n\n![9781484202005_Fig08-20.jpg](img/9781484202005_Fig08-20.jpg)\n\
  \n图 8-20。表格视图单元格的内容视图，其中拖入了四个标签\n\n接下来，双击左上角的标签，将其改为 `Name:`，然后将左下角的标签改为 `Color:`。\n\
  \n现在，同时选中 `Name:` 和 `Color:` 标签，点击属性检查器中 `Font` 字段里的小 `T` 按钮。这将打开一个小面板，其中包含一个 `Font`\
  \ 弹出按钮。点击该按钮，选择 `System Bold` 作为字体。如有需要，选中右侧两个未修改的标签字段，将它们稍微向右拖拽，为设计留出一些呼吸空间，然后调整另外两个标签的大小，以便能够看到你刚刚设置的文本。接着，调整右侧两个标签的大小，使它们一直延伸到右侧辅助线。图\
  \ 8-21 应能让你了解最终的单元格内容视图效果。\n\n![9781484202005_Fig08-21.jpg](img/9781484202005_Fig08-21.jpg)\n\
  \n图 8-21。表格视图单元格的内容视图，左侧标签名称已更改并设为粗体，右侧标签进行了轻微移动和大小调整\n\n与以往创建新布局时一样，我们需要添加自动布局约束。总体思路是将左侧标签固定到单元格的左侧，右侧标签固定到右侧。我们还将确保标签与单元格顶部和底部之间以及标签之间的垂直间距得以保留。我们将把每个左侧标签与其右侧的标签关联起来。具体步骤如下：\n\
  \n1. 点击 `Name:` 标签，按住 `Shift` 键，然后点击 `Color:` 标签。从菜单中选择 `Editor` `![image](img/arrow.jpg)`\
  \ `Pin` `![image](img/arrow.jpg)` `Widths Equally`。执行此操作时，你会看到一些自动布局警告出现——不必担心，我们将在添加更多约束时修复它们。\n\
  2. 仍选中这两个标签，打开大小检查器，找到标有 `Content Hugging Priority` 的部分。如果看不到，请尝试取消选中并重新选中这两个标签。这些字段中的值决定了标签抵制扩展以占据多余空间的强度。我们不希望这些标签在水平方向上有任何扩展，因此将\
  \ `Horizontal` 字段的值从 `251` 改为 `500`。任何大于 251 的值都可以——我们只需要它大于右侧两个标签的 `Content Hugging\
  \ Priority` 值，这样任何多余的水平空间都将分配给他们。\n3. 按住 Control 键从 `Color:` 标签拖拽到 `Name:` 标签，从弹出菜单中选择\
  \ `Vertical Spacing`，然后按下 `Return`。\n4. 按住 Control 键从 `Name:` 标签向左上角方向斜向拖拽到单元格的左上角，直到单元格背景完全变为蓝色。在弹出菜单中，按住\
  \ `Shift` 键，选择 `Leading Space to Container Margin` 和 `Top Space to Container Margin`，然后按下\
  \ `Return`。\n5. 按住 Control 键从 `Color:` 标签向左下角方向斜向拖拽到单元格的左下角，直到其背景变为蓝色。在弹出菜单中，按住\
  \ `Shift` 键，选择 `Leading Space to Container Margin` 和 `Bottom Space to Container\
  \ Margin`，然后按下 `Return`。\n6. 按住 Control 键从 `Name:` 标签拖拽到它右侧的标签。在弹出菜单中，按住 `Shift`\
  \ 键，选择 `Horizontal Spacing` 和 `Baseline`，然后按下 `Return`。按住 Control 键从右侧的顶部标签向单元格右边缘拖拽，直到单元格背景变为蓝色。在弹出菜单中，选择\
  \ `Trailing Space to Container Margin`。\n7. 类似地，按住 Control 键从 `Color:` 标签拖拽到它右侧的标签。在弹出菜单中，按住\
  \ `Shift` 键，选择 `Horizontal Spacing` 和 `Baseline`，然后按下 `Return`。按住 Control 键从右侧的底部标签向单元格右边缘拖拽，直到单元格背景变为蓝色。在弹出菜单中，选择\
  \ `Trailing Space to Container Margin`。\n8. 最后，在文档大纲中选择 `Content View` 图标，然后从菜单中选择\
  \ `Editor` `![image](img/arrow.jpg)` `Resolve Auto Layout Issues` `![image](img/arrow.jpg)`\
  \ `Update Frames`（如果可用）。四个标签应移动到最终位置，如图 8-21 所示。如果看到不同的情况，请删除文档大纲中的所有约束并重试。\n\n\
  现在，我们需要让 Interface Builder 知道这个表格视图单元格不仅仅是一个普通单元格，而是我们特殊子类的一个实例。否则，我们将无法将输出口连接到相关标签。在文档大纲中点击\
  \ `CellTableIdentifier` 来选中表格视图单元格，按下 `![image](img/sym2.jpg)![image](img/flower.jpg)3`\
  \ 调出身份检查器，并从 `Class` 控件中选择 `NameAndColorCell`。\n\n\n\n接下来，切换到**连接检查器**（`![image](img/sym2.jpg)![image](img/flower.jpg)6`），你将看到\
  \ `colorLabel` 和 `nameLabel` 输出口。将 `nameLabel` 输出口拖到表格单元格右侧顶部的标签上，并将 `colorLabel`\
  \ 输出口拖到右侧底部的标签上。\n\n### 使用新的表格视图单元格\n\n要使用我们设计的单元格，只需对 `ViewController.m` 中的 `viewDidLoad:`\
  \ 方法做一些相当简单的修改：\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    //\
  \ Do any additional setup after loading the view, typically from a nib.\n\n    self.computers\
  \ = @[@{@\"Name\" : @\"MacBook Air\", @\"Color\" : @\"Silver\"},\n             \
  \          @{@\"Name\" : @\"MacBook Pro\", @\"Color\" : @\"Silver\"},\n        \
  \               @{@\"Name\" : @\"iMac\", @\"Color\" : @\"Silver\"},\n          \
  \             @{@\"Name\" : @\"Mac Mini\", @\"Color\" : @\"Silver\"},\n        \
  \               @{@\"Name\" : @\"Mac Pro\", @\"Color\" : @\"Black\"}];\n\n    [self.tableView\
  \ registerClass:[NameAndColorCell class]\n            forCellReuseIdentifier:CellTableIdentifier];\n\
  \    UINib *nib = [UINib nibWithNibName:@\"NameAndColorCell\" bundle:nil];\n   \
  \ [self.tableView registerNib:nib\n            forCellReuseIdentifier:CellTableIdentifier];\n\
  }\n```\n\n正如表格视图可以将类与重用标识符关联（如之前的示例所示），它也能记录哪些 nib 文件应与特定的重用标识符关联。这允许你为每种行类型注册一次使用类或\
  \ nib 文件的单元格，而 `dequeueReusableCellWithIdentifier:forIndexPath:` 将始终提供一个可立即使用的单元格。\n\
  \n就是这样。构建并运行。现在，你的两行表格单元格基于你的 Interface Builder 设计技巧。\n\n你可能已经注意到，我们并没有显式设置表格的行高，也没有实现\
  \ `UITableViewDelegate` 的 `tableView:heightForRowAtIndexPath:` 方法。尽管如此，所有行的高度都正确。以下是表格计算行高的方式：\n\
  \n- 如果实现了 `tableView:heightForRowAtIndexPath:` 方法，表格视图会通过调用它获取每一行的高度。\n- 如果没有实现，表格视图则会使用其\
  \ `rowHeight` 属性。如果此属性的值为特殊的 `UITableViewAutomaticDimension`，*并且*表格单元格来自 nib 或故事板，*并且*其内容使用自动布局约束进行布局，则表格会根据单元格自身的自动布局约束获取该单元格的行高。如果\
  \ `rowHeight` 属性为其他任何值，该值将用作表格中每一行的高度。\n\n在这个示例中，我们使用自动布局放置了单元格的所有内容，因此表格能够计算单元格所需的高度，省去了我们自己计算的麻烦。即使不同行的内容可能导致不同的行高，这种方法也同样有效。由于\
  \ `rowHeight` 属性的默认值是 `UITableViewAutomaticDimension`，只要你构建自定义单元格时使用自动布局约束，就能免费获得此行为。\n\
  \n那么，既然你已经了解了构建自定义单元格的几种方法，你觉得怎么样？许多深入研究 iOS 开发的人起初会对注重 Interface Builder 感到有些困惑，但正如你所见，它有很多优点。除了让你能以可视化方式设计图形用户界面这一显而易见的吸引力之外，这种方法还促进了\
  \ nib 文件的正确使用，有助于你遵循 MVC 架构模式。此外，它还能让你的应用程序代码更简单、更模块化，并且编写起来更轻松。正如我们的好朋友 Mark Dalrymple\
  \ 所说：“没有代码就是最好的代码！”在第 9 章中，你将看到可以直接在故事板中设计表格单元格，这意味着你无需创建额外的 nib 文件。但这种方法仅在你不想在不同表格之间共享单元格设计时才有效。\n\
  \n## 分组和索引分区\n\n我们的下一个项目将探讨表格的另一个基本方面。我们将继续使用单个表格视图——还没有层级结构——但会将数据分成多个分区。再次使用单视图应用程序模板创建一个新的\
  \ Xcode 项目，这次将其命名为 `Sections`。像往常一样，将**语言**设置为 `Objective-C`，**设备**设置为 `Universal`。\n\
  \n### 构建视图\n\n打开 `Sections` 文件夹，点击 `Main.storyboard` 编辑文件。像之前一样，将一个表格视图拖到视图窗口中。将表格视图的顶部排列在状态栏下方，并添加与表格单元格示例中相同的自动布局约束。然后按下\
  \ `![image](img/sym2.jpg)![image](img/flower.jpg)6`，并将 **dataSource** 连接连接到**视图控制器**图标上。\n\
  \n接下来，确保表格视图被选中，按下 `![image](img/sym2.jpg)![image](img/flower.jpg)4` 调出属性检查器。将表格视图的**样式**从\
  \ `Plain` 更改为 `Grouped`（参见图 8-22）。保存故事板并继续。（我们在本章开头已经讨论过索引样式和分组样式的区别。）\n\n![9781484202005_Fig08-22.jpg](img/9781484202005_Fig08-22.jpg)\n\
  \n图 8-22。表格视图的属性检查器，显示已选中 Grouped 的样式弹出菜单\n\n### 导入数据\n\n这个项目需要相当数量的数据才能正常工作。为了节省你几小时的输入时间，我们提供了另一个属性列表供你愉快地使用表格。从本书示例源代码存档中的\
  \ `08 Sections Data` 子文件夹中获取名为 `sortednames.plist` 的文件，并将其拖入 Xcode 中项目的 `Sections`\
  \ 文件夹。\n\n将 `sortednames.plist` 添加到项目后，单击它以了解其大致内容（参见图 8-23）。这是一个包含字典的属性列表，字典中为字母表中的每个字母都有一条记录。每个字母下面是一个以该字母开头的名字列表。\n\
  \n![9781484202005_Fig08-23.jpg](img/9781484202005_Fig08-23.jpg)\n\n图 8-23。`sortednames.plist`\
  \ 属性列表文件。字母 J 已展开，以便你了解其中一个字典的结构\n\n我们将使用此属性列表中的数据来填充表格视图，为每个字母创建一个分区。\n\n### 实现控制器\n\
  \n单击 `ViewController.h` 文件，通过添加以下粗体显示的代码，使该类遵循 `UITableViewDataSource` 协议：\n\n```\n\
  #import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\n    <UITableViewDataSource>\n\
  \n@end\n```\n\n现在，切换到 `ViewController.m`，并在文件开头添加以下代码：\n\n```\n#import \"ViewController.h\"\
  \n\nstatic NSString *SectionsTableIdentifier = @\"SectionsTableIdentifier\";\n\n\
  @interface ViewController ()\n\n@property (copy, nonatomic) NSDictionary *names;\n\
  @property (copy, nonatomic) NSArray *keys;\n\n@end\n```\n\n接下来，打开助理编辑器，并使用跳转栏选择\
  \ `ViewController.m`。在文档大纲中，选择 `Main.storyboard`，按住 Control 键从表格视图拖到助理编辑器中的类扩展，以在\
  \ `keys` 属性定义下方为表格创建一个输出口：\n\n```\n@interface ViewController ()\n\n@property (copy,\
  \ nonatomic) NSDictionary *names;\n@property (copy, nonatomic) NSArray *keys;\n\
  @property (weak, nonatomic) IBOutlet UITableView *tableView;\n\n@end\n```\n\n回到\
  \ `ViewController.m`，在 `viewDidLoad` 方法中添加以下粗体代码：\n\n```\n@implementation ViewController\n\
  \n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional setup\
  \ after loading the view, typically from a nib.\n\n    [self.tableView registerClass:[UITableViewCell\
  \ class]\n            forCellReuseIdentifier:SectionsTableIdentifier];\n```\n\n\n\
  \n```objectivec\nNSString *path = [[NSBundle mainBundle] pathForResource:@\"sortednames\"\
  \n                                                 ofType:@\"plist\"];\n    self.names\
  \ = [NSDictionary dictionaryWithContentsOfFile:path];\n    self.keys = [[self.names\
  \ allKeys] sortedArrayUsingSelector:\n                 @selector(compare:)];\n}\n\
  ```\n\n这部分内容与你之前看到的相差不大。在顶部的类扩展中，我们为 `NSDictionary` 和 `NSArray` 添加了属性声明。字典将存储所有数据，而数组则按字母顺序保存排序后的分区。在\
  \ `viewDidLoad` 方法中，我们使用声明的标识符注册了每行应显示的默认表格视图单元格类。之后，我们从项目中添加的属性列表创建了一个 `NSDictionary`\
  \ 实例，并将其赋值给 `names` 属性。接着，我们获取该字典的所有键，并对它们进行排序，得到一个有序的 `NSArray`，其中包含字典中所有键值，且按字母顺序排列。请记住，`NSDictionary`\
  \ 使用字母作为键，因此该数组将包含 26 个字母，从 A 排到 Z，我们将利用这个数组来跟踪各个分区。\n\n接下来，在文件末尾，`@end` 声明之前，添加以下代码：\n\
  \n```objectivec\n#pragma mark -\n#pragma mark Table View Data Source Methods\n-\
  \ (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView {\n    return\
  \ [self.keys count];\n}\n\n- (NSInteger)tableView:(UITableView *)tableView\n numberOfRowsInSection:(NSInteger)section\
  \ {\n    NSString *key = self.keys[section];\n    NSArray *nameSection = self.names[key];\n\
  \    return [nameSection count];\n}\n\n- (NSString *)tableView:(UITableView *)tableView\n\
  titleForHeaderInSection:(NSInteger)section {\n    return self.keys[section];\n}\n\
  \n- (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    UITableViewCell *cell =\n    [tableView dequeueReusableCellWithIdentifier:SectionsTableIdentifier\n\
  \                                    forIndexPath:indexPath];\n\n    NSString *key\
  \ = self.keys[indexPath.section];\n    NSArray *nameSection = self.names[key];\n\
  \n    cell.textLabel.text = nameSection[indexPath.row];\n    return cell;\n}\n\n\
  @end\n```\n\n这些都是表格数据源方法。我们添加到类中的第一个方法指定了分区数量。在之前的示例中，我们没有实现这个方法，因为默认设置为 `1` 就满足需求了。这次，我们告诉表格视图，字典中的每个键对应一个分区：\n\
  \n```objectivec\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView\
  \ {\n    return [self.keys count];\n}\n```\n\n下一个方法计算特定分区中的行数。在之前的示例中，我们只有一个分区，所以直接返回数组中的行数。这次，我们需要按分区进行细分。可以通过检索与当前分区对应的数组，并返回该数组的计数来实现：\n\
  \n```objectivec\n- (NSInteger)tableView:(UITableView *)tableView\n     numberOfRowsInSection:(NSInteger)section\
  \ {\n    NSString *key = self.keys[section];\n    NSArray *nameSection = self.names[key];\n\
  \    return [nameSection count];\n}\n```\n\n`tableView:titleForHeaderInSection:`\
  \ 方法允许你为每个分区指定一个可选的标题值，我们只需返回该分组的字母，即该组的键：\n\n```objectivec\n- (NSString *)tableView:(UITableView\
  \ *)tableView\n    titleForHeaderInSection:(NSInteger)section {\n    return self.keys[section];\n\
  }\n```\n\n在 `tableView:cellForRowAtIndexPath:` 方法中，我们需要使用索引路径中的 section 和 row 属性来提取分区键和名称数组，然后用它们来确定要使用的值。section\
  \ 决定我们从 `names` 字典中取出哪个数组，而 row 则用于确定使用该数组中的哪个值。该方法中的其他部分基本与本章前面构建的 Table Cells\
  \ 应用中的版本相同。\n\n编译并运行项目，欣赏它的炫酷效果。请记住，我们将表格的样式改为了 Grouped（分组），因此最终得到了一个有 26 个分区的分组表格，结果应类似于图\
  \ 8-24。\n\n![9781484202005_Fig08-24.jpg](img/9781484202005_Fig08-24.jpg)\n\n图 8-24.\
  \ 包含多个分区的分组表格\n\n作为对比，让我们把表格视图改回 Plain（普通）样式，看看多分区的普通表格视图是什么样子。再次选择 `Main.storyboard`\
  \ 在 Interface Builder 中编辑文件。选中表格视图，使用属性检查器将其切换为 Plain 样式。保存项目，然后构建并运行——数据相同，但视觉效果不同（见图\
  \ 8-25）。\n\n![9781484202005_Fig08-25.jpg](img/9781484202005_Fig08-25.jpg)\n\n图 8-25.\
  \ 包含分区但无索引的普通表格\n\n## 添加索引\n\n当前表格的一个问题是行数过多。这个列表中有 2000 个名字。要找到 Zachariah 或 Zayne，更不用说\
  \ Zoie，你的手指会非常疲劳。\n\n解决这个问题的方法之一是在表格视图右侧添加一个索引。既然我们已经将表格视图样式改回 Plain，这一步相对容易。在 `ViewController.m`\
  \ 底部，`@end` 之前添加以下方法：\n\n```objectivec\n- (NSArray *)sectionIndexTitlesForTableView:(UITableView\
  \ *)tableView {\n    return self.keys;\n}\n```\n\n是的，就这么简单。在这个方法中，表格请求一个包含索引显示值的数组。要让索引生效，表格视图中必须有一个以上的分区，并且此数组中的条目必须与这些分区对应。返回的数组必须与分区数量相同，且值必须与相应的分区对应。换句话说，此数组中的第一个项目会将用户带到第一个分区，即\
  \ section 0。再次编译并运行应用，你就会看到一个漂亮的索引（见图 8-26）。\n\n![9781484202005_Fig08-26.jpg](img/9781484202005_Fig08-26.jpg)\n\
  \n图 8-26. 带索引的表格视图\n\n## 实现搜索栏\n\n索引很有用，但即便如此，这里仍然有大量名字。例如，如果我们想查看名字 Arabella 是否在列表中，即使使用了索引，也需要滚动一段时间。如果能让用户通过指定搜索词来缩小列表范围，那该多好，不是吗？这将会非常用户友好。虽然需要额外做一些工作，但并非难事。我们将使用搜索控制器实现一个标准的\
  \ iOS 搜索栏，如图 8-27 左侧所示。\n\n![9781484202005_Fig08-27.jpg](img/9781484202005_Fig08-27.jpg)\n\
  \n图 8-27. 表格中添加了搜索栏的应用\n\n\n\n\n当用户在搜索栏中输入时，名字列表会缩减至仅包含那些将输入文本作为子串的名字。作为额外功能，搜索栏还允许您定义范围按钮，从而以某种方式限定搜索范围。我们将在搜索栏中添加三个范围按钮——**Short**\
  \ 按钮会将搜索限制在长度少于六个字符的名字，**Long** 按钮只会考虑至少六个字符的名字，而 **All** 按钮则包含所有名字。范围按钮仅在用户向搜索栏中键入时出现；您可以在图\
  \ 8-27 右侧看到它们的作用。\n\n在 iOS 8 中，添加搜索功能相当简单。您只需要三样东西：\n\n*   一些可供搜索的数据。在我们的例子中，就是名字列表。\n\
  *   一个用于显示搜索结果的视图控制器。这个视图控制器会临时替换提供数据的那个。它可以选择以任何方式显示结果，但通常源数据是通过表格呈现的，而结果视图控制器会使用另一个看起来非常相似的表格，从而营造出搜索仅仅是过滤原始表格的印象。不过，正如您将看到的，实际情况并非如此。\n\
  *   一个 `UISearchController`，它提供搜索栏并管理搜索结果在结果视图控制器中的显示。\n\n让我们从创建结果视图控制器的骨架开始。我们将在一个表格中显示搜索结果，因此我们的结果视图控制器需要包含一个表格。我们可以像本章前面的示例那样，将一个视图控制器拖到故事板上并为其添加一个表格视图，但这次我们采用不同的方式。我们将使用一个\
  \ `UITableViewController`，它是一个嵌入了 `UITableView` 的视图控制器，并且已预先配置好作为其表格视图的数据源和委托。在项目导航器中，右键点击\
  \ **Sections** 组，然后从弹出菜单中选择 **New File . . .**。在文件模板选择器中，从 **iOS Source** 组中选择 **Cocoa\
  \ Touch Class**，然后点击 **Next**。将您的新类命名为 `SearchResultsController`，并使其成为 `UITableViewController`\
  \ 的子类。点击 **Next**，为新文件选择位置，然后让 Xcode 创建它们。\n\n在项目导航器中选择 `SearchResultsController.h`，并对其进行以下修改：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface SearchResultsController : UITableViewController\n\
  \                 <UISearchResultsUpdating>\n\n- (instancetype)initWithNames:(NSDictionary\
  \ *)names keys:(NSArray *)keys;\n\n@end\n```\n\n我们将在这个视图控制器中实现搜索逻辑，因此我们使其遵循 `UISearchResultsUpdating`\
  \ 协议，这允许我们将其分配为 `UISearchController` 类的委托。正如您稍后将看到的，当用户在搜索栏中键入时，会调用此协议定义的单个方法来更新搜索结果。\n\
  \n由于 `SearchResultsController` 将为我们执行搜索操作，它需要访问主视图控制器正在显示的名字列表，因此我们还添加了一个初始化方法，以便我们可以将名字字典和用于在主视图控制器中显示的键列表传递给它。让我们将此初始化方法添加到\
  \ `SearchResultsController.m` 中。如果您在编辑器中打开此文件，您会看到它已经包含了一些不完整的代码，这些代码提供了 `UITableViewDataSource`\
  \ 协议的部分实现，以及一些 `UITableViewController` 子类经常需要实现的其他方法的注释掉的代码块。在本示例中，我们不会使用它们中的大部分，因此请随意删除所有注释掉的代码，然后在文件顶部进行以下更改：\n\
  \n```\n#import \"SearchResultsController.h\"\n\nstatic NSString *SectionsTableIdentifier\
  \ = @\"SectionsTableIdentifier\";\n```\n\n\n\n```objc\n@interface SearchResultsController\
  \ ()\n\n@property (strong, nonatomic) NSDictionary *names;\n@property (strong, nonatomic)\
  \ NSArray *keys;\n@property (strong, nonatomic) NSMutableArray *filteredNames;\n\
  \n@end\n```\n\n我们在本视图控制器中添加了 `SectionsTableIdentifier` 变量，用于保存表格单元格的标识符。这里使用的标识符与主视图控制器中的相同，当然也可以使用任意名称。同时我们还添加了三个属性：两个分别用于保存名称字典和在搜索时使用的键列表，另一个用于保存指向搜索结果数组的引用。接下来，添加初始化方法的实现：\n\
  \n```objc\n@implementation SearchResultsController\n\n- (instancetype)initWithNames:(NSDictionary\
  \ *)names keys:(NSArray *)keys {\n    if (self = [super initWithStyle:UITableViewStylePlain])\
  \ {\n        self.names = names;\n        self.keys = keys;\n        self.filteredNames\
  \ = [[NSMutableArray alloc] init];\n    }\n    return self;\n}\n```\n\n这段代码非常直观。首先调用\
  \ `UITableViewController` 类的某个初始化方法，将其内嵌表格视图的样式设置为普通样式。然后设置 `names` 和 `keys` 属性的值，并为搜索结果分配数组。需要注意的是，`names`\
  \ 和 `keys` 属性均声明为 `(strong, nonatomic)`，这意味着它们只会持有来自主视图控制器数据的引用。这种方法比复制源数据更高效。\n\
  \n最后，在 `viewDidLoad` 方法中添加一行代码，向结果控制器的内嵌表格视图注册表格单元格标识符：\n\n```objc\n- (void)viewDidLoad\
  \ {\n    [super viewDidLoad];\n\n    [self.tableView registerClass:[UITableViewCell\
  \ class]\n           forCellReuseIdentifier:SectionsTableIdentifier];\n}\n```\n\n\
  目前我们在结果视图控制器中需要做的就这些，接下来暂时回到主视图控制器，为其添加搜索栏。在项目导航器中选择 `ViewController.m`，按粗体所示修改文件顶部的代码：\n\
  \n```objc\n#import \"ViewController.h\"\n#import \"SearchResultsController.h\"\n\
  \nstatic NSString *SectionsTableIdentifier = @\"SectionsTableIdentifier\";\n\n@interface\
  \ ViewController ()\n\n@property (copy, nonatomic) NSDictionary *names;\n@property\
  \ (copy, nonatomic) NSArray *keys;\n@property (weak, nonatomic) IBOutlet UITableView\
  \ *tableView;\n@property (strong, nonatomic) UISearchController *searchController;\n\
  \n@end\n```\n\n我们首先导入了搜索结果控制器的头文件（稍后会用到），然后添加了一个属性来持有 `UISearchController` 实例的引用，在本示例中它将承担大部分繁重工作。\n\
  \n接下来，在 `viewDidLoad` 方法中添加创建搜索控制器的代码：\n\n```objc\n- (void)viewDidLoad {\n    [super\
  \ viewDidLoad];\n    // 通常从 nib 加载后执行额外的设置\n\n    [self.tableView registerClass:[UITableViewCell\
  \ class]\n            forCellReuseIdentifier:SectionsTableIdentifier];\n\n    NSString\
  \ *path = [[NSBundle mainBundle] pathForResource:@\"sortednames\"\n            \
  \                                         ofType:@\"plist\"];\n    self.names =\
  \ [NSDictionary dictionaryWithContentsOfFile:path];\n    self.keys = [[self.names\
  \ allKeys] sortedArrayUsingSelector:\n                 @selector(compare:)];\n\n\
  \    SearchResultsController *resultsController =\n          [[SearchResultsController\
  \ alloc] initWithNames:self.names\n                keys:self.keys];\n    self.searchController\
  \ = [[UISearchController alloc]\n          initWithSearchResultsController:resultsController];\n\
  \n    UISearchBar *searchBar = self.searchController.searchBar;\n    searchBar.scopeButtonTitles\
  \ = @[@\"所有\", @\"短名称\", @\"长名称\"];\n    searchBar.placeholder = @\"输入搜索关键词\";\n\
  \    [searchBar sizeToFit];\n    self.tableView.tableHeaderView = searchBar;\n \
  \   self.searchController.searchResultsUpdater = resultsController;\n}\n```\n\n\
  首先使用刚刚在 `SearchResultsController.m` 文件中实现的初始化方法创建结果控制器。然后创建 `UISearchController`，并将结果控制器的引用传递给它——当有搜索结果要显示时，`UISearchController`\
  \ 会呈现此视图控制器：\n\n```objc\nself.searchController = [[UISearchController alloc]\n \
  \     initWithSearchResultsController:resultsController];\n```\n\n接下来的三行代码获取并配置\
  \ `UISearchBar`（该搜索栏由 `UISearchController` 创建，可通过其 `searchBar` 属性获取）：\n\n```objc\n\
  UISearchBar *searchBar = self.searchController.searchBar;\nsearchBar.scopeButtonTitles\
  \ = @[@\"所有\", @\"短名称\", @\"长名称\"];\nsearchBar.placeholder = @\"输入搜索关键词\";\n```\n\
  \n搜索栏的 `scopeButtonTitles` 属性包含要分配给其范围按钮的名称。默认情况下没有范围按钮，但这里我们安装了本节前面讨论过的三个按钮的名称。我们还设置了一些占位文本，让用户了解搜索栏的用途。你可以在图\
  \ 8-27 左侧看到占位文本。\n\n到目前为止，我们已经创建了 `UISearchController`，但尚未将其连接到用户界面。为此，我们获取搜索栏并将其安装为主视图控制器中表格的页眉视图：\n\
  \n```objc\n[searchBar sizeToFit];\nself.tableView.tableHeaderView = searchBar;\n\
  ```\n\n表格的页眉视图由表格视图自动管理，它始终显示在第一个表格分区第一行之前。请注意，我们使用 `sizeToFit` 方法为搜索栏设置与其内容相匹配的尺寸。这样做是为了确保搜索栏获得正确的高度——该方法设置的宽度并不重要，因为表格视图会确保搜索栏拉伸到表格的完整宽度，并在表格尺寸变化时（通常是由于设备旋转）自动调整其大小。\n\
  \n对 `viewDidLoad` 的最后一项修改是为 `UISearchController` 的 `searchResultsUpdater` 属性赋值，该属性的类型为\
  \ `id<UISearchResultsUpdating>`：\n\n```objc\nself.searchController.searchResultsUpdater\
  \ = resultsController;\n```\n\n每当用户在搜索栏中输入内容时，`UISearchController` 都会使用其 `searchResultsUpdater`\
  \ 属性中存储的对象来更新搜索结果。如前所述，我们将在 `SearchResultsController` 类中处理搜索，因此需要使其遵循 `UISearchResultsUpdating`\
  \ 协议。\n\n信不信由你，在主视图控制器中添加搜索栏并显示搜索结果所需的工作就这些。接下来，我们需要回到 `SearchResultsController.m`，完成两项任务——添加实现搜索功能的代码，以及为内嵌表格视图添加\
  \ `UITableDataSource` 方法。\n\n我们先从搜索代码开始。当用户在搜索栏中输入时，`UISearchController` 会调用其搜索结果更新器（即我们的\
  \ `SearchResultsController`）的 `updateSearchResultsForSearchController:` 方法。在这个方法中，我们需要从搜索栏获取搜索文本，并利用它在\
  \ `filteredNames` 数组中构建过滤后的名称列表。我们还将使用范围按钮来限制搜索中包含的名称。将以下代码添加到 `SearchResultsController.m`：\n\
  \n```objc\n#pragma mark - UISearchResultsUpdating 协议实现\n\nstatic const NSUInteger\
  \ longNameSize = 6;\nstatic const NSInteger shortNamesButtonIndex = 1;\nstatic const\
  \ NSInteger longNamesButtonIndex = 2;\n```\n\n\n\n```\n- (void)updateSearchResultsForSearchController:\n\
  \                  (UISearchController *)controller {\n    NSString *searchString\
  \ = controller.searchBar.text;\n    NSInteger buttonIndex =\n                  \
  \ controller.searchBar.selectedScopeButtonIndex;\n    [self.filteredNames removeAllObjects];\n\
  \    if (searchString.length > 0) {\n        NSPredicate *predicate =\n        \
  \  [NSPredicate\n             predicateWithBlock:^BOOL(NSString *name, NSDictionary\
  \ *b) {\n               // 根据选中的范围按钮，过滤掉太长或太短的名称\n               NSUInteger nameLength\
  \ = name.length;\n               if ((buttonIndex == shortNamesButtonIndex &\n \
  \                          & nameLength >= longNameSize)\n                   ||\
  \ (buttonIndex == longNamesButtonIndex\n                           && nameLength\
  \ < longNameSize)) {\n                   return NO;\n               }\n        \
  \       NSRange range = [name rangeOfString:searchString\n                     \
  \                    options:NSCaseInsensitiveSearch];\n               return range.location\
  \ != NSNotFound;\n          }];\n        for (NSString *key in self.keys) {\n  \
  \          NSArray *matches = [self.names[key]\n                               \
  \ filteredArrayUsingPredicate: predicate];\n            [self.filteredNames addObjectsFromArray:matches];\n\
  \        }\n    }\n    [self.tableView reloadData];\n}\n```\n\n让我们逐段分析这段代码。首先，我们从搜索栏获取搜索字符串和已选中的范围按钮索引，然后清空过滤后的名称列表：\n\
  \n```\nNSString *searchString = controller.searchBar.text;\nNSInteger buttonIndex\
  \ =\n               controller.searchBar.selectedScopeButtonIndex;\n[self.filteredNames\
  \ removeAllObjects];\n```\n\n接着，我们检查搜索字符串是否为空——对于空搜索字符串，我们不显示任何匹配结果：\n\n```\nif\
  \ (searchString.length > 0) {\n```\n\n现在，我们定义一个谓词，用于将名称与搜索字符串进行匹配。谓词是一个对象，用于测试输入值，若匹配则返回\
  \ `YES`，不匹配则返回 `NO`。该谓词将对 `names` 字典中的每个名称进行调用。我们首先检查名称长度是否与选中的范围按钮一致，如果不一致则返回 `NO`：\n\
  \n```\n    NSPredicate *predicate =\n      [NSPredicate\n         predicateWithBlock:^BOOL(NSString\
  \ *name, NSDictionary *b) {\n           // 根据选中的范围按钮，过滤掉太长或太短的名称\n           NSUInteger\
  \ nameLength = name.length;\n           if ((buttonIndex == shortNamesButtonIndex\
  \ &\n                       & nameLength >= longNameSize)\n               || (buttonIndex\
  \ == longNamesButtonIndex\n                       && nameLength < longNameSize))\
  \ {\n               return NO;\n           }\n```\n\n如果名称通过此项测试，我们就在名称中查找搜索字符串。如果找到，则视为匹配：\n\
  \n```\n           NSRange range = [name rangeOfString:searchString\n           \
  \                          options:NSCaseInsensitiveSearch];\n           return\
  \ range.location != NSNotFound;\n      }];\n```\n\n接下来，我们遍历 `names` 字典中的所有键，每个键对应一个名称数组（例如键\
  \ `A` 映射到以字母 `A` 开头的名称，以此类推）。对于每个键，我们获取其名称数组，并使用 `NSArray` 的 `filteredArrayUsingPredicate:`\
  \ 方法对其应用谓词。这样我们就得到一个（可能为空的）匹配名称过滤数组，并将其添加到 `filteredNames` 数组中：\n\n```\n    for\
  \ (NSString *key in self.keys) {\n        NSArray *matches = [self.names[key]\n\
  \                            filteredArrayUsingPredicate: predicate];\n        [self.filteredNames\
  \ addObjectsFromArray:matches];\n    }\n```\n\n处理完所有名称数组后，`filteredNames` 数组就包含了完整的匹配名称集。接下来，我们只需安排它们显示在\
  \ `SearchResultsController` 的表格中。首先，我们通知表格需要重新显示其内容：\n\n```\n}\n[self.tableView\
  \ reloadData];\n```\n\n我们需要表格视图在每一行显示 `filteredNames` 数组中的一个名称。为此，我们在 `SearchResultsController`\
  \ 类中实现 `UITableViewDataSource` 协议的方法。回想一下，`SearchResultsController` 是 `UITableViewController`\
  \ 的子类，因此它会自动充当其表格的数据源。将以下代码添加到 `SearchResultsController.m` 中：\n\n```\n- (NSInteger)tableView:(UITableView\
  \ *)tableView\n            numberOfRowsInSection:(NSInteger)section {\n    return\
  \ [self.filteredNames count];\n}\n\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView\n         cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n    UITableViewCell\
  \ *cell =\n    [tableView dequeueReusableCellWithIdentifier:SectionsTableIdentifier\n\
  \                                    forIndexPath:indexPath];\n    cell.textLabel.text\
  \ = self.filteredNames[indexPath.row];\n    return cell;\n}\n```\n\n现在，你可以运行应用并尝试过滤名称列表，效果如图\
  \ 图 8-28 所示。\n\n![9781484202005_Fig08-28.jpg](img/9781484202005_Fig08-28.jpg)\n\n\
  图 8-28. 添加了搜索栏的表格应用。请注意，在点击搜索栏之前，搜索栏在屏幕右侧显示为截断状态。\n\n我们差不多完成了——但还有一件事需要修复。回顾 图 8-27\
  \ 左侧，你会发现一个视觉“缺陷”：搜索栏似乎在靠近右边缘处被神秘地截断了。实际上，你看到的是右侧垂直分区索引栏的上端。我们的搜索栏是表格视图的一部分（因为我们将其设置为标题视图）。当表格视图显示分区索引时，它会自动将其所有其他视图从右侧挤压。由于默认的分区索引背景颜色是白色，它几乎与表格视图的行融为一体，导致其在搜索栏旁边格外显眼！\n\
  \n为了解决这个问题，我们为原始表格中的分区索引设置一些颜色。我们将使用对比色，使其在整个表格上下都显得醒目，这样用户就能更清晰地看到发生了什么。只需在 `ViewController.m`\
  \ 的 `viewDidLoad` 方法末尾添加以下几行代码：\n\n```\nself.tableView.sectionIndexBackgroundColor\
  \ =\n               [UIColor blackColor];\nself.tableView.sectionIndexTrackingBackgroundColor\
  \ =\n               [UIColor darkGrayColor];\nself.tableView.sectionIndexColor =\
  \ [UIColor whiteColor];\n```\n\n首先，我们设置分区索引的主要背景颜色，即用户未触摸时看到的颜色。然后，设置跟踪背景颜色，以便用户在触摸并沿边缘上下拖动时，整个列能稍微亮起。最后，设置索引项本身的文字颜色。图\
  \ 8-29 展示了最终效果。\n\n![9781484202005_Fig08-29.jpg](img/9781484202005_Fig08-29.jpg)\n\
  \n图 8-29. 通过更清晰的分区索引视觉效果，用户能更清楚地认识到这实际上是一个控件界面。\n\n## 有多少个表格？：视图调试\n\n\n\n`UISearchController`类在我们上一个例子中的两个表格之间切换得非常好——好到你几乎很难相信这里存在切换！除了你已经看到的所有代码之外，还有一些视觉线索：搜索表格是一个纯文本表格，因此你不会看到像主表格那样分组显示的名称，而且它也没有节索引。如果你想要更多证据，可以使用\
  \ Xcode 6 中一个名为 View Debugging 的便捷新功能来获取，该功能允许你截取正在运行的应用程序的视图层次结构快照，并在 Xcode 的编辑器区域中检查它们。此功能在模拟器和真实设备上都能工作，当你试图找出某个视图为何缺失或不在预期位置时，它可能在某个时候变得极其宝贵。\n\
  \n我们先来看看当应用程序显示完整名称列表时，View Debugging 会如何呈现。再次运行应用程序，在 Xcode 的菜单栏中，选择**Debug** ![image](img/arrow.jpg)\
  \ **View Debugging** ![image](img/arrow.jpg) **Capture View Hierarchy**。Xcode 会从模拟器或设备中抓取视图层次结构，并像图\
  \ 8-30 所示那样显示。\n\n![9781484202005_Fig08-30.jpg](img/9781484202005_Fig08-30.jpg)\n\
  \n图 8-30. Sections 应用程序的视图层次结构\n\n这看起来可能没什么用——我们实际上看不到比在模拟器中更多的东西。要揭示视图层次结构，你需要旋转应用程序的图像，以便能从“侧面”观察它。为此，请在编辑器区域中，在被捕获图像稍左的位置点击鼠标，然后向右拖动。随着你拖动，应用程序中的视图分层会显现出来。如果旋转约\
  \ 45 度，你将看到类似图 8-31 的内容。\n\n![9781484202005_Fig08-31.jpg](img/9781484202005_Fig08-31.jpg)\n\
  \n图 8-31. 检查应用程序的视图层次结构\n\n如果你点击堆栈中的各个视图，你会看到顶部的跳转栏会发生变化，显示你点击的视图及其所有祖先视图的类名。从后向前点击每个视图，熟悉表格的构建方式。你应该能够找到视图控制器的主视图、表格视图本身、一些表格视图单元格、搜索栏、搜索栏索引，以及其他属于表格实现的各种视图。\n\
  \n现在让我们看看在搜索时视图层次结构是什么样子。Xcode 会暂停你的应用程序，以便你检查视图快照，因此首先通过点击**Debug** ![image](img/arrow.jpg)\
  \ **Continue**来恢复执行。然后开始在应用程序的搜索栏中输入内容，并使用**Debug** ![image](img/arrow.jpg) **View\
  \ Debugging** ![image](img/arrow.jpg) **Capture View Hierarchy**再次捕获视图层次结构。当视图层次结构出现时，稍微旋转一下，你会看到类似图\
  \ 8-32 的内容。\n\n![9781484202005_Fig08-32.jpg](img/9781484202005_Fig08-32.jpg)\n\n\
  图 8-32. 使用搜索栏时的视图层次结构\n\n现在很明显看出确实有两个表格在使用中。你可以在视图堆栈大约一半的位置看到原始表格，而在它上方（即右侧），你可以看到属于搜索结果视图控制器的表格视图。紧挨在它后面，有一层覆盖原始表格的半透明灰色视图——当你开始在搜索栏中输入时，这个视图会调暗原始表格。\n\
  \n可以尝试一下编辑器底部的按钮——你可以使用它们来打开或关闭 Auto Layout 约束的显示、将视图重置为图 8-30 所示的俯视图、以及放大和缩小。你也可以使用左侧的滑块来改变视图之间的间距，使用右侧的滑块来移除层次结构顶部或底部的图层，以便看到它们后面的内容。View\
  \ Debugging 是一个非常强大的工具！\n\n## 综合运用\n\n嗯，你做得怎么样？这一章内容相当丰富，你学了很多东西！你现在应该对平面表格的工作原理有了非常扎实的理解。你应该知道如何自定义表格和表格视图单元格，以及如何配置表格视图。你还了解了如何实现搜索栏，这在任何呈现大量数据的\
  \ iOS 应用程序中都是一个至关重要的工具。最后，你认识了 View Debugging，这是 iOS 8 中一个崭新且极其有用的功能。请确保你理解了本章中我们做的一切，因为我们将在其基础上继续构建。\n\
  \n在下一章中，我们将继续使用表格视图。例如，你将学习如何使用它们来呈现分层数据。你还将看到如何创建允许用户编辑在表格视图中选择的数据的内容视图，以及如何在表格中呈现复选框、在表格行中嵌入控件和删除行。\n\
  \n"
- "# 第 9 章 导航控制器与表格视图\n\n在上一章中，你掌握了使用表格视图的基础知识。在本章中，你将获得更多的练习，因为我们将探索**导航控制器**。\n\n\
  表格视图和导航控制器紧密配合。严格来说，导航控制器并不需要表格视图来实现其功能。然而，在实际应用中，当你实现一个导航控制器时，几乎总是至少实现一个表格（通常是多个），因为导航控制器的优势在于它能够轻松处理复杂的分层数据。在\
  \ iPhone 的小屏幕上，分层数据最好通过连续的表格视图来呈现。\n\n在本章中，我们将像在第 7 章中构建 Pickers 应用程序一样，逐步构建一个应用程序。我们将使导航控制器和根视图控制器工作起来，然后开始向层次结构中添加更多的控制器和层。我们创建的每个视图控制器都将强化表格使用或配置的某个方面：\n\
  \n*   如何从表格视图向下钻取到子表格视图\n*   如何从表格视图向下钻取到内容视图，在那里可以查看甚至编辑详细数据\n*   如何在表格视图中使用多个节\n\
  *   如何使用编辑模式允许从表格视图中删除行\n*   如何使用编辑模式让用户重新排列表格视图中的行\n\n内容很多，不是吗？好吧，让我们开始介绍导航控制器。\n\
  \n## 导航控制器基础\n\n你将用于构建分层应用程序的主要工具是`UINavigationController`。`UINavigationController`与`UITabBarController`类似，因为它管理并交换多个内容视图。两者之间的主要区别在于，`UINavigationController`是作为堆栈实现的，这使其非常适合处理层次结构。\n\
  \n你已经了解了关于堆栈的一切吗？如果是这样，请快速浏览下一小节（或完全跳过），我们将在下一小节“一堆控制器”的开头等你。如果你不熟悉堆栈，请继续阅读。幸运的是，堆栈是一个相当容易理解的概念。\n\
  \n### 堆栈之美\n\n\n\n`stack`（栈）是一种常用的数据结构，其工作原理遵循“后进先出”原则。信不信由你，Pez 糖果盒就是栈的一个绝佳示例。你试过装填它吗？根据每个\
  \ Pez 糖果盒附带的说明小纸条，操作很简单。首先，拆开 Pez 糖果的包装。第二步，将糖果盒的头向后仰，打开盒子。第三步，拿起糖果叠（注意我们巧妙地在这里插入了“堆叠”这个词！），用食指和拇指紧紧捏住，然后将整列糖果插入打开的盒子中。第四步，捡起所有散落一地的糖果碎块——因为这些说明从来就不管用。\n\
  \n好吧，到目前为止，这个例子并不是特别有用。但接下来发生的事情就有关了。当你一个一个地捡起糖果块，把它们塞进盒子里时，你就正在使用栈。记住我们说过栈是后进先出吗？这也意味着先进后出。你塞进盒子里的第一块\
  \ Pez 糖果，将是最后弹出来的那块。你最后塞进去的那块 Pez 糖果，将是第一个弹出来的。计算机的栈遵循同样的规则：\n\n-   当你向栈中添加对象时，这称为压入。你将一个对象压入栈。\n\
  -   你压入栈的第一个对象称为栈底。\n-   你最后压入栈的对象称为栈顶（至少在被下一个压入的对象取代之前是如此）。\n-   当你从栈中移除对象时，这称为弹出。当你从栈中弹出一个对象时，它总是你最后压入栈的那个对象。反之，你第一个压入栈的对象将永远是你最后弹出栈的那个。\n\
  \n## 控制器堆栈\n\n导航控制器维护着一个视图控制器的堆栈。当你设计导航控制器时，需要指定用户看到的第一个视图。正如我们在前几章讨论过的，该视图的控制器被称为`根视图控制器`，或简称`根控制器`，它是导航控制器视图控制器堆栈的基底。当用户选择要显示的下一个视图时，一个新的视图控制器会被压入堆栈，并且它所控制的视图就会显示出来。我们将这些新的视图控制器称为`子控制器`。正如你将看到的，本章的应用程序\
  \ Fonts，由一个导航控制器和几个子控制器组成。\n\n看一下图 9-1。注意导航栏中居中的`标题`和导航栏左侧的`返回按钮`。导航栏的标题由导航控制器堆栈中顶部视图控制器的`title`属性填充，返回按钮的标题则由上一个视图控制器的标题填充。返回按钮的作用类似于网页浏览器的返回按钮。当用户点击该按钮时，当前视图控制器从堆栈中弹出，上一个视图成为当前视图。\n\
  \n![9781484202005_Fig09-01.jpg](img/9781484202005_Fig09-01.jpg)\n\n图 9-1。设置应用使用了导航控制器。左上角的返回按钮会将当前视图控制器从堆栈中弹出，将你带回层次结构中的上一层。同时还会显示当前内容视图控制器的标题\n\
  \n我们喜欢这种设计模式。它允许我们迭代式地构建复杂的层次化应用。我们不需要了解整个层次结构就能让一切运转起来。每个控制器只需要知道它的子控制器，这样当用户做出选择时，它就能将合适的新控制器对象压入堆栈。你可以通过这种方式，用许多小模块构建一个大型应用，这正是我们本章要做的事情。\n\
  \n导航控制器实际上是许多 iPhone 应用的核心与灵魂；然而，对于 iPad 应用来说，导航控制器扮演的角色则相对次要一些。一个典型的例子是 Mail 应用，它采用层次化的导航控制器，让用户可以在所有邮件服务器、文件夹和邮件之间导航。在\
  \ iPad 版的 Mail 中，导航控制器从不填满屏幕，而是显示为边栏或覆盖主视图一部分的临时视图。我们将在后面的第 11 章深入探讨这种用法。\n\n##\
  \ Fonts：一个简单的字体浏览器\n\n我们将要构建的应用程序会向你展示如何完成与显示层次化数据相关的大多数常见任务。当应用程序启动时，你会看到一个所有包含在\
  \ iOS 中的`字体家族`列表，如图 9-2 所示。一个字体家族是一组紧密相关的字体，或者说是彼此风格变体的字体。例如，Helvetica、Helvetica-Bold、Helvetic-Oblique\
  \ 以及其他变体都属于 Helvetica 字体家族。\n\n![9781484202005_Fig09-02.jpg](img/9781484202005_Fig09-02.jpg)\n\
  \n图 9-2。本章应用的根视图控制器。注意视图右侧的辅助图标。这种特定类型的辅助图标称为展开指示器。它告诉用户触摸该行会下钻到另一个表格视图\n\n在此顶层视图中选择任何一行，都会将一个视图控制器压入导航控制器的堆栈。每一行右侧的图标被称为`辅助图标`。这个特定的辅助图标（灰色箭头）被称为`展开指示器`，它的存在让用户知道触摸该行会下钻到另一个表格视图。\n\
  \n## 认识子控制器\n\n在我们开始构建 Fonts 应用程序之前，让我们快速浏览一下子控制器显示的每个视图。\n\n### 字体列表控制器\n\n触摸图\
  \ 9-2 所示表格的任何一行，都会弹出图 9-3 所示的子视图。\n\n![9781484202005_Fig09-03.jpg](img/9781484202005_Fig09-03.jpg)\n\
  \n图 9-3。Fonts 应用的第一个子控制器实现了一个表格，其中每一行都包含一个详细展开按钮\n\n图 9-3 中每一行右侧的辅助图标略有不同。这个辅助图标被称为`详细展开按钮`。与展开指示器不同，详细展开按钮不仅仅是一个图标——它是一个用户可以点击的控件。这意味着你可以为某一行提供两个不同的选项：当用户选择该行时触发一个操作，当用户点击该按钮时触发另一个操作。点击此辅助图标内的小信息按钮，应允许用户查看，或许还能编辑当前行更详细的信息。同时，右侧的箭头应指示用户，通过点击行中的其他位置可以找到更深层次的导航。\n\
  \n### 字体大小视图控制器\n\n触摸图 9-3 所示表格的任何一行，都会弹出图 9-4 所示的子视图。\n\n![9781484202005_Fig09-04.jpg](img/9781484202005_Fig09-04.jpg)\n\
  \n图 9-4。位于字体列表视图控制器下一层，字体大小视图控制器显示所选字体的多种大小，每行一种\n\n以下是何时使用展开指示器和详细展开按钮的总结：\n\n\n\
  \n*   如果你只想为行点击提供单个选项，且行点击*仅*会导航到该行的更详细视图，请不要使用辅助图标。\n*   如果行点击将导航到一个列出更多项（*不是*详情视图）的新视图，请使用披露指示器（右箭头）标记该行。\n\
  *   如果你需要为某行提供两个选项，请使用详细披露指示器或详细按钮标记该行。这样用户可以通过点击行进入新视图，或点击披露按钮查看更多详情。\n\n## 字体信息视图控制器\n\
  \n我们最后的应用子控制器（也是唯一一个非表视图的控制器）如图 9-5 所示。该视图出现在你点击字体列表视图控制器（如图 9-2 所示）中任意行的信息图标时。\n\
  \n![9781484202005_Fig09-05.jpg](img/9781484202005_Fig09-05.jpg)\n\n图 9-5. 字体应用中的最终视图控制器允许你以任意大小查看所选字体。\n\
  \n此视图允许用户拖拽滑块来调整显示字体的大小。它还包含一个开关，用户可通过它指定该字体是否应列入收藏列表。如果设置了任何收藏字体，它们会在根视图控制器中显示在一个单独的分组内。\n\
  \n## 字体应用框架\n\nXcode 提供了一个非常适合创建基于导航应用的模板，并且当你需要创建层级应用时，大多数情况下都会使用它。然而，今天我们不会使用那个模板。相反，我们将从头开始构建基于导航的应用，以便了解各部分是如何协同工作的。我们也会逐步分解讲解，这样应该很容易跟上进度。\n\
  \n在 Xcode 中，按 ![image](img/flower.jpg)![image](img/sym3.jpg)**N** 创建一个新项目。从 iOS\
  \ 模板列表中选择 **Single View Application**，然后点击 **Next** 继续。将 **Product Name** 设置为 `Fonts`，**Language**\
  \ 选择 `Objective-C`，**Devices** 选择 `Universal`。确保 **Use Core Data** 未被勾选，点击 **Next**，然后选择保存项目的路径。\n\
  \n### 设置导航控制器\n\n现在我们需要为应用创建基本的导航结构。核心部分将是一个`UINavigationController`，它管理用户可以导航的视图控制器栈，以及一个显示顶层行列表的`UITableViewController`。事实证明，Interface\
  \ Builder 使这变得非常容易。\n\n选择`Main.storyboard`。模板已经为我们创建了一个基本的视图控制器，但我们需要使用`UINavigationController`，因此在编辑区域或文档大纲中选择该视图控制器并将其删除，使故事板为空。现在，使用对象库搜索`UINavigationController`，并将一个实例拖入编辑区域。你会看到实际上得到了两个场景而不是一个，这与你在第\
  \ 7 章中创建标签视图控制器时看到的情况类似。左侧是`UINavigationController`本身。选择此控制器，打开属性检查器，并在 **View Controller**\
  \ 部分勾选 **Is Initial View Controller**，使其成为应用启动时显示的控制器。\n\n`UINavigationController`有一个连接到第二个场景的连线，该场景包含一个`UITableViewController`。你会看到表格的标题是\
  \ *Root View Controller*。点击该标题，打开属性检查器，然后将标题设置为 `Fonts`。\n\n值得花点时间思考一下。通过将应用配置为从该故事板加载初始场景，我们具体得到了什么？首先，我们获得了由导航控制器创建的视图，这是一个组合视图，包含两个部分：屏幕顶部的导航栏（通常包含某种标题，并且左侧常有一个返回按钮）以及导航控制器当前视图控制器想要显示的内容。在我们的例子中，显示区域的下半部分将填充与导航控制器一起创建的表格视图。\n\
  \n随着我们的深入，你将学到更多关于如何控制导航控制器在导航栏中显示的内容。你还将理解导航控制器如何将焦点从一个下级视图控制器转移到另一个。现在，你已经打下了足够的基础，可以开始定义你的自定义视图控制器将执行什么操作了。\n\
  \n此时，应用框架基本完成。你会看到一个关于为原型表格单元设置复用标识符的警告，但我们可以暂时忽略它。保存所有文件，然后构建并运行应用。如果一切正常，应用应启动，并显示一个标题为\
  \ `Fonts` 的导航栏。目前尚未向表格视图提供任何显示内容的信息，因此此时不会显示任何行（参见图 9-6）。\n\n![9781484202005_Fig09-06.jpg](img/9781484202005_Fig09-06.jpg)\n\
  \n图 9-6. 运行中的应用框架\n\n### 跟踪收藏\n\n在应用的多个地方，我们会让用户通过添加选择的字体、查看已收藏的完整列表以及从列表中移除字体来维护收藏字体列表。为了以一致的方式管理此列表，我们将创建一个新类，该类将持有一个收藏数组，并将其存储在用户的偏好设置中。你将在第\
  \ 12 章中了解到更多关于用户偏好的内容，但这里我们只涉及一些基础。\n\n首先，创建一个新类。在项目导航器中选择`Fonts`文件夹，然后按 ![image](img/flower.jpg)**N**\
  \ 打开新建文件助手。从 **iOS Source** 部分选择 **Cocoa Touch Class**，然后点击 **Next**。在接下来的屏幕上，将新类命名为`FavoritesList`，并在\
  \ **Subclass of** 字段中选择`NSObject`。创建完该类的文件后，选择`FavoritesList.h`并添加以下加粗显示的代码：\n\n\
  ```objective-c\n#import <Foundation/Foundation.h>\n\n@interface FavoritesList :\
  \ NSObject\n\n+ (instancetype)sharedFavoritesList;\n\n- (NSArray *)favorites;\n\n\
  - (void)addFavorite:(id)item;\n- (void)removeFavorite:(id)item;\n\n@end\n```\n\n\
  在前面的代码片段中，我们声明了新类的 API。首先，我们声明了一个名为`sharedFavoritesList`的工厂方法，它返回该类的一个实例。无论此方法被调用多少次，都将始终返回同一个实例。其思想是`FavoritesList`应作为单例工作；我们将不在整个应用中使用多个实例，而是只使用一个实例。\n\
  \n\n\n**注**：`sharedFavoritesList`的声明使用了一个你可能不认识的返回类型：`instancetype`。这是 Objective-C\
  \ 中较新的特性。现在建议所有原本使用`id`作为返回类型的工厂方法和`init`方法改用`instancetype`。使用`id`的问题在于缺乏类型安全性。过去，你很容易写出像`\"\
  NSString *s = [NSArray array];\"`这样的错误代码，而编译器不会报错（尽管程序会在后续尝试将`NSString`的方法发送给创建的`NSArray`时崩溃）。使用`instancetype`可以在保持一定通用性的同时，告诉编译器返回值应限于消息接收者的类型（或其子类）。在\
  \ iOS 8 中，几乎所有 Apple 的公开 API 都使用`instancetype`替代了`id`。\n\n接下来，我们定义了访问数组以及添加和删除元素的方法。\n\
  \n现在切换到`FavoritesList.m`开始实现。首先，在文件顶部创建一个类扩展并添加一个属性：\n\n```objc\n#import \"FavoritesList.h\"\
  \n\n@interface FavoritesList ()\n\n@property (strong, nonatomic) NSMutableArray\
  \ *favorites;\n\n@end\n```\n\n注意，我们声明了一个类型为`NSMutableArray`的属性`favorites`。在头文件中，我们声明了一个返回`NSArray`的方法`favorites`。由于声明属性通常也会声明\
  \ getter 和 setter，这会导致冲突吗？幸运的是，不会。因为属性的类型是头文件中所用类型的子类，所以完全可以正常工作。这意味着在类内部，我们可以使用可变数组；但通过\
  \ API 暴露给外部的则是一个不可变的`NSArray`。该类的 API（定义于`FavoritesList.h`）应被所有代码使用者视为契约。如果其他代码深入探究，发现这个类实际返回的是`NSMutableArray`并直接使用，那么这种代码就破坏了契约，这不是我们的问题。\n\
  \n接下来，在`FavoritesList.m`中实现`sharedFavoritesList`工厂方法：\n\n```objc\n@implementation\
  \ FavoritesList\n\n+ (instancetype)sharedFavoritesList {\n    static FavoritesList\
  \ *shared = nil;\n    static dispatch_once_t onceToken;\n    dispatch_once(&onceToken,\
  \ ^{\n        shared = [[self alloc] init];\n    });\n    return shared;\n}\n\n\
  @end\n```\n\n这段代码看起来复杂，但实际上只做了一件事：创建并返回类的新实例。创建部分被封装在传递给`dispatch_once()`函数的代码块中，这确保该代码块只执行一次。之后每次调用此方法时，实例已经创建，直接返回即可。\n\
  \n现在来实现`init`方法。在`@end`行之前添加以下代码：\n\n```objc\n- (instancetype)init {\n    self =\
  \ [super init];\n    if (self) {\n        NSUserDefaults *defaults = [NSUserDefaults\
  \ standardUserDefaults];\n        NSArray *storedFavorites = [defaults objectForKey:@\"\
  favorites\"];\n        if (storedFavorites) {\n            self.favorites = [storedFavorites\
  \ mutableCopy];\n        } else {\n            self.favorites = [NSMutableArray\
  \ array];\n        }\n    }\n    return self;\n}\n```\n\n此方法使用`NSUserDefaults`类（详见第\
  \ 12 章）检查偏好设置中是否存储了收藏项。如果有，则将其可变副本赋值给`favorites`属性；否则，创建一个新的空可变数组赋值。\n\n最后，实现添加和移除收藏的方法，以及它们都会调用的即时保存更改方法。在`@end`行之前添加这两个方法：\n\
  \n```objc\n- (void)addFavorite:(id)item {\n    [_favorites insertObject:item atIndex:0];\n\
  \    [self saveFavorites];\n}\n\n- (void)removeFavorite:(id)item {\n    [_favorites\
  \ removeObject:item];\n    [self saveFavorites];\n}\n\n- (void)saveFavorites {\n\
  \    NSUserDefaults *defaults = [NSUserDefaults standardUserDefaults];\n    [defaults\
  \ setObject:self.favorites forKey:@\"favorites\"];\n    [defaults synchronize];\n\
  }\n```\n\n`addFavorite:`和`removeFavorite:`都非常直接。唯一值得注意的是，我们没有通过`self.favorites`（本书推荐的方式）访问数组，而是直接访问底层实例变量`_favorites`。原因很微妙：尽管我们在类扩展中将属性定义为`NSMutableArray`，但编译器在解析`self.favorites`时会使用头文件中`@interface`的声明，即不可变的`NSArray`！这种变通方式与常规风格不同，但可以正常工作。\n\
  \n这两个方法都调用了`saveFavorites`方法，该方法使用`NSUserDefaults`类将数组保存到用户偏好设置中。你将在第 12 章中了解更多工作原理；现在只需知道，我们使用的`NSUserDefaults`对象类似于一个持久化字典，存储其中的内容在下次请求时仍然可用，即使应用被停止并重启。\n\
  \n## 创建根视图控制器\n\n现在准备开始开发第一个视图控制器。在上一章中，我们使用简单的字符串数组填充表格行。这里将做类似的事情，但这次使用`UIFont`类获取字体家族列表，并用这些字体家族的名称填充每一行。我们还将使用字体本身来显示字体名称，这样每一行都包含字体家族的预览。\n\
  \n是时候为这个应用创建第一个控制器类了。模板为我们创建了一个视图控制器，但名称`ViewController`用处不大，因为这个应用中有多个视图控制器。因此，首先在项目导航器中选择`ViewController.h`和`ViewController.m`，按**Delete**删除并移至废纸篓。接着，在项目导航器中选择`Fonts`文件夹，按![image](img/flower.jpg)**N**打开新建文件助手。从**iOS\
  \ Source**部分选择**Cocoa Touch Class**，然后点击**Next**。在下一屏幕中，将新类命名为`RootViewController`，并将**Subclass\
  \ of**设置为**UITableViewController**。点击**Next**，然后点击**Create**创建新类。在项目导航器中，选择`RootViewController.m`，在代码片段中添加粗体行，以导入收藏列表的头文件并添加几个属性：\n\
  \n```objc\n#import \"RootViewController.h\"\n#import \"FavoritesList.h\"\n\n@interface\
  \ RootViewController ()\n\n@property (copy, nonatomic) NSArray *familyNames;\n@property\
  \ (assign, nonatomic) CGFloat cellPointSize;\n@property (strong, nonatomic) FavoritesList\
  \ *favoritesList;\n\n@end\n```\n\n我们将在开始时为每个属性赋值，然后在类使用过程中的不同时刻使用它们。`familyNames`数组将包含所有要显示的字体家族列表；`cellPointSize`属性包含要在所有表格视图单元格中使用的字体大小；`favoritesList`包含指向`FavoritesList`单例的指针。\n\
  \n**注意**：你可能注意到`familyNames`属性使用了`copy`关键字而不是`strong`。这是为什么？为什么我们要随意复制数组？原因在于可变数组的可能性。\n\
  \n\n\n设想一下，如果我们使用 `strong` 声明了该属性，并且外部代码传入了一个 `NSMutableArray` 实例来设置 `familyNames`\
  \ 属性的值。如果原始调用方稍后决定更改该数组的内容，那么 `RootViewController` 实例将陷入不一致的状态，导致 `familyNames`\
  \ 的内容与屏幕显示的内容不再同步！使用 `copy` 可以消除此风险，因为对任何 `NSArray`（包括其可变子类）调用 `copy` 总是能返回一个不可变的副本。同时，我们也无需过分担心性能影响。实际上，对任何不可变对象发送\
  \ `copy` 消息并不会真正复制该对象。相反，它会在增加引用计数后返回同一个对象。实际上，对不可变对象调用 `copy` 与调用 `retain` 的效果相同——这正是\
  \ ARC 在你设置 `strong` 属性时可能在后台执行的操作。因此，这对每个人都非常合适，因为这个对象永远不会改变。\n\n这种情况适用于所有基类不可变但存在可变子类的“值类”。这些值类包括\
  \ `NSArray`、`NSDictionary`、`NSSet`、`NSString`、`NSData` 等。任何时候，如果你希望将此类实例作为属性持有，都应该使用\
  \ `copy` 而非 `strong` 来声明属性的存储方式，以避免出现问题。\n\n通过向 `viewDidLoad` 方法中添加以下粗体代码，来设置该类的所有属性：\n\
  \n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\nself.familyNames = [[UIFont\
  \ familyNames]\n                        sortedArrayUsingSelector:@selector(compare:)];\n\
      UIFont *preferredTableViewFont = [UIFont preferredFontForTextStyle:\n                                      UIFontTextStyleHeadline];\n\
      self.cellPointSize = preferredTableViewFont.pointSize;\n    self.favoritesList\
  \ = [FavoritesList sharedFavoritesList];\n}\n```\n\n在上面的代码片段中，我们通过向 `UIFont` 类请求所有已知的字体系列名称，并对结果数组进行排序，从而填充了\
  \ `familyNames`。接着，我们再次使用 `UIFont` 来获取标题首选的字体。这是通过 iOS 7 新增的一项功能实现的，该功能基于“设置”应用中可指定的字体大小设置。这种动态字体大小功能允许用户设置全局系统范围的字体缩放比例。这里，我们利用该字体的\
  \ `pointSize` 属性建立了一个基准字体大小，以便在此视图控制器的其他部分使用。最后，我们获取了单例的收藏列表对象。\n\n在继续之前，让我们删除 `didReceiveMemoryWarning`\
  \ 方法，以及任何被注释掉的表视图代理或数据源方法——在这个类中我们不会用到它们。\n\n这个视图控制器的设计思路是展示两个分区。第一个分区列出所有可用的字体系列，每个系列都可以导航到该系列中的所有字体列表。第二个分区是“收藏”，其中只包含一个条目，用户点击后可以进入他们的收藏字体列表。但是，如果用户没有收藏（例如，应用首次启动时），我们最好完全不显示第二个分区，因为它只会将用户导向一个空列表。因此，我们将在本类的后续部分采取一些措施来应对这种情况。首先，我们需要实现以下方法，该方法会在根视图控制器的视图显示在屏幕之前被调用：\n\
  \n```\n- (void)viewWillAppear:(BOOL)animated {\n    [super viewWillAppear:animated];\n\
      [self.tableView reloadData];\n}\n```\n\n这样做的原因是，我们即将显示的内容集合可能会在不同显示时机之间发生变化。例如，用户起初可能没有收藏，但随后深入浏览，查看某个字体并将其设为收藏，然后返回根视图。此时，我们需要重新加载表视图，以便让第二个分区显示出来。\n\
  \n接下来，我们将实现一个在该类内部使用的工具方法。在通过数据源方法配置表视图的若干环节中，我们需要能够确定要在某个单元格中显示哪个字体。我们将此功能封装到一个独立的方法中：\n\
  \n```\n- (UIFont *)fontForDisplayAtIndexPath:(NSIndexPath *)indexPath {\n    if\
  \ (indexPath.section == 0) {\n        NSString *familyName = self.familyNames[indexPath.row];\n\
          NSString *fontName = [[UIFont fontNamesForFamilyName:familyName]\n                                            \
  \ firstObject];\n        return [UIFont fontWithName:fontName size:self.cellPointSize];\n\
      } else {\n        return nil;\n    }\n}\n```\n\n上述方法使用了 `UIFont` 类，首先查找给定字体系列名称下的所有字体名称，然后获取该系列中的第一个字体名称。我们无法确切知道该系列中第一个命名的字体是否是代表整个系列的最佳选择，但这至少是一个合理的猜测。\n\
  \n现在，让我们进入这个视图控制器的核心部分：表视图数据源方法。首先，看一下分区数量：\n\n```\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
  \ *)tableView {\n#warning Potentially incomplete method implementation.\n    //\
  \ Return the number of sections.\n    if ([self.favoritesList.favorites count] >\
  \ 0) {\n        return 2;\n    } else {\n        return 1;\n    }\n    return 0;\n\
  }\n```\n\n我们通过收藏列表来决定是否显示第二个分区。接下来，处理每个分区的行数：\n\n```\n- (NSInteger)tableView:(UITableView\
  \ *)tableView\n            numberOfRowsInSection:(NSInteger)section {\n#warning\
  \ Incomplete method implementation.\n    // Return the number of rows in the section.\n\
      if (section == 0) {\n        return [self.familyNames count];\n    } else {\n\
          return 1;\n    }\n    return 0;\n}\n```\n\n这个也很简单。我们仅通过分区编号来判断该分区是显示所有字体系列名称，还是显示一个链接到收藏列表的单元格。现在，我们来定义另一个方法，这是\
  \ `UITableViewDataSource` 协议中的一个可选方法，允许我们为每个分区指定标题：\n\n```\n- (NSString *)tableView:(UITableView\
  \ *)tableView\n               titleForHeaderInSection:(NSInteger)section {\n    if\
  \ (section == 0) {\n        return @\"All Font Families\";\n    } else {\n        return\
  \ @\"My Favorite Fonts\";\n    }\n}\n```\n\n这又是一个直截了当的方法。它通过分区编号来决定使用哪个分区标题。每个表视图数据源都必须实现的最后一个核心方法是配置每个单元格的方法，我们的实现如下：\n\
  \n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\n         cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    static NSString *FamilyNameCell = @\"FamilyName\";\n    static\
  \ NSString *FavoritesCell = @\"Favorites\";\n    UITableViewCell *cell = nil;\n\n\
  // Configure the cell...\n    if (indexPath.section == 0) {\n        cell = [tableView\
  \ dequeueReusableCellWithIdentifier:FamilyNameCell\n                                              \
  \ forIndexPath:indexPath];\n        cell.textLabel.font = [self fontForDisplayAtIndexPath:indexPath];\n\
          cell.textLabel.text = self.familyNames[indexPath.row];\n        cell.detailTextLabel.text\
  \ = self.familyNames[indexPath.row];\n    } else {\n        cell = [tableView dequeueReusableCellWithIdentifier:FavoritesCell\n\
                                                 forIndexPath:indexPath];\n    }\n\
  \nreturn cell;\n}\n```\n\n\n\n我们定义了两个不同的单元格标识符，用于从故事板加载两个不同的单元格原型（就像我们在第 8 章中从 nib\
  \ 文件加载表格单元格一样）。我们还没有配置这些单元格原型，但很快就会配置！接下来，我们使用分区编号来确定要为当前`indexPath`显示哪个单元格。如果该单元格用于显示字体家族名称，则将家族名称放入其`label`和`detailLabel`中。我们还在文本标签中使用该家族中的一种字体（通过`fontForDisplayAtIndexPath:`方法获取），这样我们既能看到以该字体本身显示的字体家族名称，也能看到以标准系统字体显示的较小版本。\n\
  \n## 初始故事板设置\n\n现在我们有了一个期望能显示内容的视图控制器，接下来配置故事板以实现功能。在项目导航器中选择`Main.storyboard`。你会看到我们之前添加的导航控制器和表格视图控制器。首先需要配置的是表格视图控制器。默认情况下，该控制器的类被设置为`UITableViewController`。我们需要将其改为我们的根视图控制器类。在文档大纲中，选择标有**Root\
  \ View Controller**的黄色图标，然后使用标识检查器将视图控制器的**Class**改为`RootViewController`。\n\n我们现在需要做的另一项配置是设置一对原型单元格，以匹配我们在代码中使用的单元格标识符。一开始，表格视图有一个原型单元格。选中它并按![image](img/flower.jpg)**D**键进行复制，你会看到现在有了两个单元格。选中第一个，然后使用属性检查器将其**Style**设置为`Subtitle`，**Identifier**设置为`FamilyName`，**Accessory**设置为`Disclosure\
  \ Indicator`。接下来，选中第二个原型单元格，将其**Style**设置为`Basic`，**Identifier**设置为`Favorites`，**Accessory**设置为`Disclosure\
  \ Indicator`。另外，双击单元格中显示的标题，将文本从`Title`改为`Favorites`。\n\n**提示**  ：本示例中使用的原型单元格都是标准的表格视图单元格样式。如果你将**Style**设置为`Custom`，则可以直接在单元格原型中设计单元格布局，就像你在第\
  \ 8 章中在 nib 文件中创建单元格一样。\n\n现在，在设备或模拟器上构建并运行此应用，你应该会看到一个漂亮的字体列表。稍微滚动一下，你会发现并非所有字体的文本高度都相同。例如，滚动到最后，你会看到\
  \ Zapfino 字体的示例文本远大于其他所有字体，如图 9-7 所示。尽管如此，所有单元格都足够高以容纳其内容，尽管我们并没有做任何特殊处理来实现这一点。\n\
  \n![9781484202005_Fig09-07.jpg](img/9781484202005_Fig09-07.jpg)\n\n图 9-7。根视图控制器显示已安装的字体家族\n\
  \n正如你在第 8 章中所看到的，这是因为 iOS 8 中有一个新功能，可以为遵循特定规则的单元格计算正确的单元格高度。在这里，我们使用的是标准的表格视图单元格样式，它们开箱即用即遵循这些规则。在更早的\
  \ iOS 版本中，你需要实现`UITableViewDelegate`协议方法`tableView:heightForRowAtIndexPath:`才能达到同样的效果。\n\
  \n## 第一个子控制器：字体列表视图\n\n我们的应用目前只显示字体家族列表，没有更多功能。我们希望添加用户触摸字体家族即可查看其包含的所有字体的功能。因此，让我们创建一个新的视图控制器来管理字体列表。使用\
  \ Xcode 的新建文件助手创建一个名为`FontListViewController`的新 Objective-C 类，作为`UITableViewController`的子类。创建该类后，选择其头文件并添加以下属性：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface FontListViewController : UITableViewController\n\
  \n@property (copy, nonatomic) NSArray *fontNames;\n@property (assign, nonatomic)\
  \ BOOL showsFavorites;\n\n@end\n```\n\n`fontNames`属性用于告诉此视图控制器要显示什么。我们还创建了一个`showsFavorites`属性，用于让此视图控制器知道它是在显示收藏夹列表，还是仅显示一个家族中的字体列表，因为稍后这会很有用。\n\
  \n现在切换到`FontListController.m`，导入一个头文件并在文件顶部声明一个属性：\n\n```\n#import \"FontListViewController.h\"\
  \n#import \"FavoritesList.h\"\n\n@interface FontListViewController ()\n\n@property\
  \ (assign, nonatomic) CGFloat cellPointSize;\n\n@end\n```\n\n我们将使用`cellPointSize`属性来保存显示每种字体的首选显示大小，再次使用`UIFont`来找到首选大小。我们通过如下方式实现`viewDidLoad`：\n\
  \n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\n// Uncomment the following\
  \ line to preserve selection between presentations.\n    // self.clearsSelectionOnViewWillAppear\
  \ = NO;\n\n// Uncomment the following line to display an Edit button in the navigation\n\
      // bar for this view controller.\n    // self.navigationItem.rightBarButtonItem\
  \ = self.editButtonItem;\n\nUIFont *preferredTableViewFont = [UIFont preferredFontForTextStyle:\n\
                                                                UIFontTextStyleHeadline];\n\
      self.cellPointSize = preferredTableViewFont.pointSize;\n}\n```\n\n接下来我们要创建一个小的实用方法，用于选择每行要显示的字体，类似于我们在`RootViewController`中的做法。不过这里略有不同。在此视图控制器中，我们持有的是字体名称列表，而不是字体家族列表。我们将使用`UIFont`类来获取每个命名的字体，如下所示：\n\
  \n```\n- (UIFont *)fontForDisplayAtIndexPath:(NSIndexPath *)indexPath {\n    NSString\
  \ *fontName = self.fontNames[indexPath.row];\n    return [UIFont fontWithName:fontName\
  \ size:self.cellPointSize];\n}\n```\n\n现在是时候以`viewWillAppear:`实现的形式添加一个小补充了。还记得在`RootViewController`中，我们实现了这个方法以防止收藏夹列表可能发生变化而需要刷新吗？同样的情况也适用于此。这个视图控制器可能正在显示收藏夹列表，用户可能切换到另一个视图控制器，更改了一个收藏项（我们稍后会讲到），然后返回此处。这时我们需要重新加载表格视图，而此方法正好处理了这一点：\n\
  \n```\n- (void)viewWillAppear:(BOOL)animated {\n    [super viewWillAppear:animated];\n\
      if (self.showsFavorites) {\n        self.fontNames = [FavoritesList sharedFavoritesList].favorites;\n\
          [self.tableView reloadData];\n    }\n}\n```\n\n基本思路是，正常情况下，此视图控制器在显示之前会接收到一个字体名称列表，并且在视图控制器存在的整个期间，该列表保持不变。在一种特定情况下（稍后你会看到），此视图控制器需要重新加载其字体列表。\n\
  \n继续，我们完全删除`numberOfSectionsInTableView:`方法。这里我们只需要一个分区，跳过该方法相当于实现了它并返回`1`。接下来，我们实现另外两个主要的数据源方法，如下所示：\n\
  \n\n```objectivec\n- (NSInteger)tableView:(UITableView *)tableView\n          numberOfRowsInSection:(NSInteger)section\
  \ {\n#warning Incomplete method implementation.\n    // 返回该分段中的行数\n    return [self.fontNames\
  \ count];\n    return 0;\n}\n\n- (UITableViewCell *)tableView:(UITableView *)tableView\n\
  \              cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n    static NSString\
  \ *CellIdentifier = @\"FontName\";\n    UITableViewCell *cell = [tableView\n   \
  \                          dequeueReusableCellWithIdentifier:CellIdentifier\n  \
  \                           forIndexPath:indexPath];\n\n    // 配置单元格...\n    cell.textLabel.font\
  \ = [self fontForDisplayAtIndexPath:indexPath];\n    cell.textLabel.text = self.fontNames[indexPath.row];\n\
  \    cell.detailTextLabel.text = self.fontNames[indexPath.row];\n\n    return cell;\n\
  }\n```\n\n这两个方法其实无需过多解释，因为它们与我们之前在 `RootViewController` 中使用的方法类似，甚至更为简单。\n\n稍后我们将向该类添加更多内容，但首先让我们看看它的实际效果。为此，我们需要进一步配置故事板，然后对\
  \ `RootViewController` 进行一些修改。切换到 `Main.storyboard` 开始操作。\n\n### 为字体列表设计故事板\n\n\
  当前故事板中包含一个表视图控制器，用于显示字体家族列表，该控制器嵌入在导航控制器中。我们需要增加一层新的深度，以纳入用于显示特定字体家族字体的视图控制器。在对象库中找到表视图控制器，将其拖拽到编辑区域中现有表视图控制器的右侧。选中新的表视图控制器，使用标识检查器将其类设置为\
  \ `FontListViewController`。选中表格中的原型单元格，打开属性检查器进行一些调整。将其**样式**更改为 `Subtitle`，**标识符**更改为\
  \ `FontName`，**辅助视图**更改为 `Detail Disclosure`。使用详细披露辅助视图将让此类型的行响应两种点击操作，从而使用户可以根据点击辅助视图还是行中的其他部分，触发两种不同的操作。\n\
  \n让一个视图控制器中的用户操作触发另一个视图控制器的实例化与显示，一种方法是创建连接两者的**segue**（转场）。对许多人来说，这可能是一个陌生的词汇，所以我们先解释清楚：segue\
  \ 本质上意味着“过渡”，有时作家和电影制作人用它来描述从一个段落或场景平滑地过渡到下一个。苹果本可以更直接地将其称为“transition”（过渡）；但由于这个词在\
  \ UIKit API 的其他地方已经出现，或许苹果决定使用一个独特的术语来避免混淆。我们还应在此说明，“segue”这个词的发音与赛格威（Segway）个人交通工具产品完全相同（现在你知道赛格威为什么叫这个名字了）。\n\
  \n通常，转场完全是在 Interface Builder 中创建的。其理念是，一个场景中的操作可以触发一个转场，以加载并显示另一个场景。如果你在使用导航控制器，转场可以自动将下一个控制器推入导航栈。我们将从现在开始在应用中使用这一功能！\n\
  \n为了让根视图控制器中的单元格能够显示字体列表视图控制器，你需要创建几个连接两个场景的转场。只需按住 Control 键，从字体场景中两个原型单元格中的第一个拖拽到新场景即可；当你拖拽时，整个场景会高亮显示，表示已准备好连接，如图\
  \ Figure 9-8 所示。\n\n![9781484202005_Fig09-08.jpg](img/9781484202005_Fig09-08.jpg)\n\
  \n图 9-8. 从字体列表控制器到字体名称控制器创建显示转场\n\n\n\n释放鼠标按钮，然后从弹出的菜单中选择**显示**（位于**选择转场**部分）。现在对另一个原型单元格执行相同操作。创建这些转场意味着一旦用户点击这些单元格中的任何一个，连接另一端的视图控制器将被分配并准备就绪。\n\
  \n#### 让根视图控制器为转场做准备\n\n保存更改并切换回`RootViewController.m`。请注意，我们这里讨论的不是最新的类`FontListViewController`，而是它的“父”控制器。你需要在此处通过准备新的`FontListViewController`（由你刚刚创建的某个转场指定）进行显示，并传递其所需的值，来响应用户在根列表视图中的触摸操作。首先导入新类的头文件：\n\
  \n```objectivec\n#import \"RootViewController.h\"\n#import \"FavoritesList.h\"\n\
  #import \"FontListViewController.h\"\n```\n\n新视图控制器的实际准备工作是使用`prepareForSegue:sender:`方法完成的。按如下所示添加此方法的实现：\n\
  \n```objectivec\n#pragma mark - Navigation\n\n- (void)prepareForSegue:(UIStoryboardSegue\
  \ *)segue sender:(id)sender {\n    // 使用 [segue destinationViewController] 获取新的视图控制器。\n\
  \    // 将选中的对象传递给新的视图控制器。\n    NSIndexPath *indexPath = [self.tableView indexPathForCell:sender];\n\
  \    FontListViewController *listVC = segue.destinationViewController;\n    if (indexPath.section\
  \ == 0) {\n        NSString *familyName = self.familyNames[indexPath.row];\n   \
  \     listVC.fontNames = [[UIFont fontNamesForFamilyName:familyName]\n         \
  \                       sortedArrayUsingSelector:@selector(compare:)];\n       \
  \ listVC.navigationItem.title = familyName;\n        listVC.showsFavorites = NO;\n\
  \    } else {\n        listVC.fontNames = self.favoritesList.favorites;\n      \
  \  listVC.navigationItem.title = @\"Favorites\";\n        listVC.showsFavorites\
  \ = YES;\n    }\n}\n```\n\n此方法使用`sender`（被点击的`UITableViewCell`）来确定点击了哪一行，并向`segue`询问其`destinationViewController`，即即将显示的`FontListViewController`实例。然后，根据用户点击的是字体族（分区\
  \ 0）还是收藏单元格（分区 1），我们将一些值传递给新的视图控制器。除了设置目标视图控制器的自定义属性外，我们还访问控制器的`navigationItem`属性来设置`title`。`navigationItem`属性是`UINavigationItem`的一个实例，这是一个\
  \ UIKit 类，包含关于任何给定视图控制器在导航栏中应显示内容的信息。\n\n现在运行应用。你会看到，点击任意字体族的名称，都会显示其包含的所有单个字体列表，如图\
  \ 9-3 所示。此外，你可以点击字体列表导航控制器标题中的**字体**标签，返回其父控制器以选择其他字体。\n\n#### 创建字体大小视图控制器\n\n然而，你会注意到，应用目前不允许你继续深入。图\
  \ 9-4 和 9-5 显示了允许你以多种方式查看所选字体的额外屏幕，我们尚未达到那一步。但很快我们就能做到了！让我们创建图 9-4 所示的视图，该视图同时显示多种字体大小。使用与创建`FontListViewController`相同的步骤，添加一个新的视图控制器，继承自`UITableViewController`，并将其命名为`FontSizesViewController`。这个类从其父控制器所需的唯一参数是一个字体，你应将其添加到`FontSizesViewController.h`中，如下所示：\n\
  \n```objectivec\n#import <UIKit/UIKit.h>\n\n@interface FontSizesViewController :\
  \ UITableViewController\n\n@property (strong, nonatomic) UIFont *font;\n\n@end\n\
  ```\n\n现在切换到`FontSizesViewController.m`。这将是一个非常简单的表格视图控制器，仅实现一些标准的表格视图数据源方法，外加一些私有的内部方法。首先，继续删除`viewDidLoad`、`didReceiveMemoryWarning`和`numberOfSectionsInTableView:`方法，以及底部所有被注释掉的方法。同样，你不会需要这些。\n\
  \n你需要的是一些内部私有方法。一个方法将返回所选字体将显示的磅值列表。另一个方法将返回一个对应于索引路径的字体，类似于我们其他每个视图控制器中使用的方法：\n\
  \n```objectivec\n- (NSArray *)pointSizes {\n    static NSArray *pointSizes = nil;\n\
  \    static dispatch_once_t onceToken;\n    dispatch_once(&onceToken, ^{\n     \
  \   pointSizes = @[@9,\n                       @10,\n                       @11,\n\
  \                       @12,\n                       @13,\n                    \
  \   @14,\n                       @18,\n                       @24,\n           \
  \            @36,\n                       @48,\n                       @64,\n  \
  \                     @72,\n                       @96,\n                      \
  \ @144];\n    });\n    return pointSizes;\n}\n\n- (UIFont *)fontForDisplayAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    NSNumber *pointSize = self.pointSizes[indexPath.row];\n   \
  \ return [self.font fontWithSize:pointSize.floatValue];\n}\n```\n\n请注意，`pointSizes`方法使用了我们之前用过的`dispatch_once()`函数，以确保一段代码只运行一次。在这里，它初始化一个数字列表，用于为表格中的每一行指定字体。\n\
  \n对于此视图控制器，我们将跳过指定要显示的分区数的方法，因为我们只使用默认数量（1）。然而，我们必须实现指定行数和每个单元格内容的方法。以下是这两个方法：\n\
  \n```objectivec\n- (NSInteger)tableView:(UITableView *)tableView\n             \
  \   numberOfRowsInSection:(NSInteger)section {\n#warning 方法实现不完整。\n    // 返回分区中的行数。\n\
  \    return [self.pointSizes count];\n    return 0;\n}\n\n- (UITableViewCell *)tableView:(UITableView\
  \ *)tableView\n         cellForRowAtIndexPath:(NSIndexPath *)indexPath {\n    static\
  \ NSString *CellIdentifier = @\"FontNameAndSize\";\n    UITableViewCell *cell =\
  \ [tableView\n                             dequeueReusableCellWithIdentifier:CellIdentifier\n\
  \                             forIndexPath:indexPath];\n\n// 配置单元格...\n    cell.textLabel.font\
  \ = [self fontForDisplayAtIndexPath:indexPath];\n    cell.textLabel.text = self.font.fontName;\n\
  \    cell.detailTextLabel.text = [NSString stringWithFormat:@\"%@ point\",\n   \
  \                              self.pointSizes[indexPath.row]];\n\nreturn cell;\n\
  }\n```\n\n这些方法中没有任何我们未见过的内容，所以让我们继续为此设置 GUI。\n\n#### 为字体大小视图控制器绘制 Storyboard\n\n\
  返回`Main.storyboard`，将另一个表格视图控制器拖入编辑区域。使用身份检查器将其类设置为`FontSizesViewController`。你需要从它的父控制器`FontListViewController`建立转场连接。所以找到该控制器，按住\
  \ Control 键从其原型单元格拖到最新的视图控制器，然后从弹出的菜单中选择**显示**（位于**选择转场**部分）。接下来，选择你刚刚添加的新场景中的原型单元格，然后使用属性检查器将其**样式**设置为*副标题*，**标识符**设置为*FontNameAndSize*。\n\
  \n#### 让字体列表视图控制器为转场做准备\n\n\n\n现在，就像之前扩展 storyboard 的导航层级时一样，我们需要跳转到父控制器，以便它能够配置其子控制器。这意味着需要进入`FontListViewController.m`，并导入新子控制器的头文件：\n\
  \n```objc\n#import \"FontListViewController.h\"\n#import \"FavoritesList.h\"\n#import\
  \ \"FontSizesViewController.h\"\n```\n\n接下来，在`@implementation`部分的底部，像这样实现`prepareForSegue:sender:`方法：\n\
  \n```objc\n#pragma mark - Navigation\n\n- (void)prepareForSegue:(UIStoryboardSegue\
  \ *)segue sender:(id)sender {\n    // Get the new view controller using [segue destinationViewController].\n\
  \    // Pass the selected object to the new view controller.\n    NSIndexPath *indexPath\
  \ = [self.tableView indexPathForCell:sender];\n    UIFont *font = [self fontForDisplayAtIndexPath:indexPath];\n\
  \    [segue.destinationViewController navigationItem].title = font.fontName;\n\n\
  \    FontSizesViewController *sizesVC = segue.destinationViewController;\n    sizesVC.font\
  \ = font;\n}\n```\n\n这些代码现在看起来应该相当熟悉了，因此我们不再赘述。\n\n运行应用，选择一个字体家族，然后选择一个字体（通过轻点行中除了右侧附件之外的任意位置），现在你将看到图\
  \ 9-4 中所示的多尺寸列表。\n\n## 创建字体信息视图控制器\n\n我们要创建的最后一个视图控制器如图 9-5 所示。这个控制器并非基于表格视图，而是包含了一个大的文本标签、一个用于设置文本大小的滑块，以及一个用于切换是否将该字体加入收藏列表的开关。在你的项目中创建一个新的\
  \ Cocoa Touch 类，使用`UIViewController`作为父类，并将其命名为`FontInfoViewController`。与应用中的大多数其他控制器一样，这个控制器也需要由其父控制器传入几个参数。通过在`FontInfoViewController.h`中定义以下属性来实现这一点：\n\
  \n```objc\n#import <UIKit/UIKit.h>\n\n@interface FontInfoViewController : UIViewController\n\
  \n@property (strong, nonatomic) UIFont *font;\n@property (assign, nonatomic) BOOL\
  \ favorite;\n\n@end\n```\n\n现在切换到`FontInfoViewController.m`，在顶部添加一个导入语句和几个`IBOutlet`属性：\n\
  \n```objc\n#import \"FontInfoViewController.h\"\n#import \"FavoritesList.h\"\n\n\
  @interface FontInfoViewController ()\n\n@property (weak, nonatomic) IBOutlet UILabel\
  \ *fontSampleLabel;\n@property (weak, nonatomic) IBOutlet UISlider *fontSizeSlider;\n\
  @property (weak, nonatomic) IBOutlet UILabel *fontSizeLabel;\n@property (weak, nonatomic)\
  \ IBOutlet UISwitch *favoriteSwitch;\n\n@end\n```\n\n接下来，实现`viewDidLoad`以及两个动作方法，它们将分别由滑块和开关触发：\n\
  \n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
  \ setup after loading the view.\n\n    self.fontSampleLabel.font = self.font;\n\
  \    self.fontSampleLabel.text = @\"AaBbCcDdEeFfGgHhIiJjKkLlMmNnOoPpQqRrSsTtUuVv\"\
  \n                                \"WwXxYyZz 0123456789\";\n    self.fontSizeSlider.value\
  \ = self.font.pointSize;\n    self.fontSizeLabel.text = [NSString stringWithFormat:@\"\
  %.0f\",\n                               self.font.pointSize];\n    self.favoriteSwitch.on\
  \ = self.favorite;\n}\n\n- (IBAction)slideFontSize:(UISlider *)slider {\n    float\
  \ newSize = roundf(slider.value);\n    self.fontSampleLabel.font = [self.font fontWithSize:newSize];\n\
  \    self.fontSizeLabel.text = [NSString stringWithFormat:@\"%.0f\", newSize];\n\
  }\n\n- (IBAction)toggleFavorite:(UISwitch *)sender {\n    FavoritesList *favoritesList\
  \ = [FavoritesList sharedFavoritesList];\n    if (sender.on) {\n        [favoritesList\
  \ addFavorite:self.font.fontName];\n    } else {\n        [favoritesList removeFavorite:self.font.fontName];\n\
  \    }\n}\n```\n\n这些方法都非常直接明了。`viewDidLoad`方法根据所选字体设置显示内容；`slideFontSize:`根据滑块的值更改`fontSampleLabel`标签中字体的大小；`toggleFavorite:`则根据开关的值将当前字体添加到收藏列表或从中移除。\n\
  \n### 为字体信息视图控制器构建 Storyboard\n\n现在返回`Main.storyboard`，为应用的最后一个视图控制器构建图形用户界面。使用对象库找到一个普通的视图控制器（View\
  \ Controller），将其拖入编辑区域，并使用身份检查器（Identity Inspector）将其类设置为`FontInfoViewController`。接下来，再次使用对象库找到更多对象并拖入你的新场景中。你需要三个标签、一个开关和一个滑块。按照图\
  \ 9-9 所示大致布局它们。\n\n![9781484202005_Fig09-09.jpg](img/9781484202005_Fig09-09.jpg)\n\
  \n图 9-9. 此处的每个标签都设置了浅灰色背景，仅用于图示目的。你的标签应使用白色背景。\n\n注意，我们在上方标签之上留出了一些空间，因为最终顶部会有一个导航栏。此外，我们希望上方标签能跨多行显示长文本，但默认情况下标签只显示一行。要更改此设置，请选中该标签，打开属性检查器（Attributes\
  \ Inspector），将**Lines**字段中的数值设置为`0`。\n\n图 9-8 也显示了下方两个标签中已更改的文本。请自行进行相同的更改。这里看不到的是，我们使用属性检查器将这两个标签设置为右对齐。你应该也这样做，因为它们的布局本质上都是与右边缘对齐。另外，选中底部的滑块，然后使用属性检查器将其**Minimum**设置为`1`，**Maximum**设置为`200`。\n\
  \n现在该连接此 GUI 的所有关联了。首先选中视图控制器并打开连接检查器（Connections Inspector）。当需要建立如此多的连接时，该检查器提供的概览视图非常方便。通过从`favoriteSwitch`、`fontSampleLabel`、`fontSizeLabel`和`fontSizeSlider`旁边的小圆圈拖拽到场景中相应的对象，为每个输出口建立连接。如果还不清楚，`fontSampleLabel`应连接到顶部的标签，`fontSizeLabel`应连接到底部右侧的标签，而`favoriteSwitch`和`fontSizeSlider`输出口则只能连接到唯一对应的控件。要连接控件与动作，你可以继续使用连接检查器。在视图控制器的连接检查器中，找到**Received\
  \ Actions**部分，从**slideFontSize:**旁边的小圆圈拖拽到滑块上，松开鼠标按钮，然后从出现的上下文菜单中选择**Value Changed**。接下来，从**toggleFavorite:**旁边的小圆圈拖拽到开关上，同样选择**Value\
  \ Changed**。\n\n这里还需要做一件事：创建一个 segue，以便此视图能够被显示。请记住，当字体列表视图控制器（Font List View Controller）显示时，用户轻点详情附件（Detail\
  \ Accessory，即蓝色小圆“i”）就会显示此视图。因此，找到该控制器，按住 Control 键从其原型单元格（prototype cell）拖拽到您正在处理的新的字体信息视图控制器上，并从出现的上下文菜单的**Accessory\
  \ Action**区域中选择**show**。注意，我们说的是**Accessory Action**，而不是**Selection Segue**。附件动作是用户轻点详情附件时触发的\
  \ segue，而选择 segue 则是轻点行中其他位置时触发的 segue。我们之前已经将此单元格的选择 segue 设置为打开一个`FontSizesViewController`。\n\
  \n\n\n现在我们有两条不同的转场，可以通过点击行中不同部分来触发。由于它们将呈现不同的视图控制器，且带有不同的属性，我们需要一种方法来区分它们。幸运的是，代表转场的`UIStoryboardSegue`类提供了一种实现方式：我们可以使用标识符，就像对表格视图单元格所做的那样！\n\
  \n你需要做的就是在编辑区中选择一条转场，并使用属性检查器设置其标识符。你可能需要稍微调整场景布局，以便能够看到从字体列表视图控制器右侧蜿蜒而出的两条转场。选择指向字体大小视图控制器的转场，并将其标识符设置为`ShowFontSizes`，如图\
  \ Figure 9-10 所示。接下来，选择指向字体信息视图控制器的转场，并将其标识符设置为`ShowFontInfo`。\n\n![9781484202005_Fig09-10.jpg](img/9781484202005_Fig09-10.jpg)\n\
  \nFigure 9-10. 配置来自字体列表视图控制器的转场\n\n#### 设置约束\n\n设置该转场可以让 Interface Builder 知道我们的新场景将像其他场景一样在导航控制器的上下文中使用，因此该场景会自动在顶部获得一个空白导航栏。现在视图的真实布局已经确定，是时候设置约束了。这是一个相当复杂的视图，包含多个子视图，尤其是在底部附近，因此我们不能完全依赖系统的自动约束来为我们做出正确的处理。我们将使用编辑区底部的**固定**按钮及其触发的弹出窗口来构建所需的大部分约束。\n\
  \n从最上面的标签开始。点击**固定**，然后在弹出窗口中，选择小方块上方、左侧和右侧的红色条——但不要选择下方的。现在点击底部的**添加 3 个约束**按钮。\n\
  \n接下来，选择底部的滑块并点击**固定**按钮。这次，选择小方块下方、左侧和右侧的红色条——但不要选择上方的。再次点击**添加 3 个约束**来放置它们。\n\
  \n对于剩下的两个标签和开关，请遵循以下步骤：选择对象，点击**固定**，选择小方块下方和右侧的红色条，打开**宽度**和**高度**复选框，最后点击**添加\
  \ 4 个约束**。为这三个对象设置这些约束会将它们绑定到右下角。\n\n还有最后一个约束需要设置。我们希望顶部标签可以扩展以容纳其文本，但绝不能扩展到与底部视图重叠。我们可以通过一个约束来实现这一点！按住\
  \ Control 键从上方标签拖拽到“添加到收藏夹”标签，释放鼠标按钮，然后从出现的上下文菜单中选择**垂直间距**。接下来，点击新约束以选中它（这是一条连接两个标签的蓝色垂直条），然后打开属性检查器，你会看到该约束的一些可配置属性。将**关系**下拉菜单更改为`Greater\
  \ Than or Equal`，然后将**常量**值设置为`10`。这样可以确保扩展的上方标签不会超出底部其他视图。\n\n### 为多个转场适配字体列表视图控制器\n\
  \n现在回到熟悉的`FontListViewController.m`文件。由于这个类现在能够触发到两个不同子视图控制器的转场，它需要导入最新视图控制器的头文件：\n\
  \n```objective-c\n#import \"FontListViewController.h\"\n#import \"FavoritesList.h\"\
  \n#import \"FontSizesViewController.h\"\n#import \"FontInfoViewController.h\"\n\
  ```\n\n你还需要调整`prepareForSegue:sender:`方法，如下所示：\n\n```objective-c\n- (void)prepareForSegue:(UIStoryboardSegue\
  \ *)segue sender:(id)sender {\n    // 获取新的视图控制器 using [segue destinationViewController]。\n\
  \    // 将选中的对象传递给新的视图控制器。\n    NSIndexPath *indexPath = [self.tableView indexPathForCell:sender];\n\
  \    UIFont *font = [self fontForDisplayAtIndexPath:indexPath];\n    [segue.destinationViewController\
  \ navigationItem].title = font.fontName;\n\n    if ([segue.identifier isEqualToString:@\"\
  ShowFontSizes\"]) {\n        FontSizesViewController *sizesVC = segue.destinationViewController;\n\
  \        sizesVC.font = font;\n    } else if ([segue.identifier isEqualToString:@\"\
  ShowFontInfo\"]) {\n        FontInfoViewController *infoVC = segue.destinationViewController;\n\
  \        infoVC.font = font;\n        infoVC.favorite = [[FavoritesList sharedFavoritesList].favorites\n\
  \                           containsObject:font.fontName];\n    }\n}\n```\n\n现在运行应用，看看我们的成果！选择一个包含多种字体的字体族（例如\
  \ Gill Sans），然后点击任何一行的中间位置。你会被带到之前看到的相同列表，其中以多种大小显示了该字体。按下左上角的导航按钮（标签为**Gill Sans**）返回，然后点击另一行；不过这次点击右侧显示详细附件的部分。这会调出最终的视图控制器，它显示该字体的样本，底部有一个滑块，可以让你选择任意大小。\n\
  \n此外，现在你可以使用**添加到收藏夹**开关将此字体标记为喜爱。执行此操作后，点击左上角的导航按钮几次，返回根控制器视图。\n\n## 我最喜爱的字体\n\n\
  向下滚动到根视图控制器的底部，你会看到一些新内容：第二分段现在已经显示出来，如图 Figure 9-11 所示。\n\n![9781484202005_Fig09-11.jpg](img/9781484202005_Fig09-11.jpg)\n\
  \nFigure 9-11. 现在我们至少选择了一个喜爱字体，可以通过点击根视图控制器底部出现的新行来查看它们\n\n点击**收藏夹**行，你会看到所有已选择为喜爱的字体列表。在这里，你可以执行与其他字体列表相同的操作：点击一行查看多个字体大小的列表，或者点击详细附件查看可调整滑块的字体视图和收藏开关。你甚至可以尝试关闭该开关，然后点击返回按钮，你会看到刚刚查看的字体不再出现在列表中。\n\
  \n## 表格视图的便利功能\n\n现在应用的基本功能已经完成。但在我们真正结束之前，还有几个功能应该实现。如果你使用 iOS 一段时间，可能会知道通常可以通过从右向左滑动来删除表格视图中的一行。例如，在邮件应用中，你可以使用这种技术删除邮件列表中的一条消息。执行这个手势会在表格视图行内部显示一个小型\
  \ GUI。这个 GUI 要求你确认删除，然后该行消失，剩余行向上滑动以填补空白。整个交互过程——包括处理滑动、显示确认 GUI 以及动画影响到的行——都由表格视图本身处理。你只需要在控制器中实现两个方法即可。\n\
  \n此外，表格视图还提供了简单功能，允许用户通过上下拖拽来重新排列表格视图中的行。与滑动删除一样，表格视图替我们处理了整个用户交互。我们只需要一行设置代码（创建一个激活重新排序\
  \ GUI 的按钮），然后实现一个在用户完成拖拽时调用的方法。表格视图免费提供了这么多功能，不加以利用简直是犯罪！\n\n### 实现滑动删除\n\n\n\n\
  在应用中，`FontListViewController` 类是该功能应被使用的典型示例。每当应用显示收藏列表时，我们应允许用户通过滑动删除收藏项，省去他们点击详情附件然后关闭开关的步骤。在\
  \ Xcode 中选择 `FontListViewController.m` 文件开始操作。我们需要实现的两个方法默认已包含在每个视图控制器的源文件中，但被注释掉了。我们将取消注释并为其提供实际实现。\n\
  \n首先，添加 `tableView:canEditRowAtIndexPath:` 方法的实现：\n\n```\n- (BOOL)tableView:(UITableView\
  \ *)tableView\n        canEditRowAtIndexPath:(NSIndexPath *)indexPath {\n    //\
  \ 如果不想让指定项可编辑，则返回 NO\n    return self.showsFavorites;\n}\n```\n\n当显示收藏列表时，该方法返回\
  \ `YES`，否则返回 `NO`。这意味着允许删除行的编辑功能仅在显示收藏时启用。如果仅做此修改就尝试运行应用并删除行，您不会看到任何变化。表格视图不会处理滑动手势，因为它发现我们尚未实现完成删除所需的另一个方法。因此，我们也将该方法补充完整。按如下方式添加\
  \ `tableView:commitEditingStyle:forRowAtIndexPath:` 方法的实现：\n\n```\n- (void)tableView:(UITableView\
  \ *)tableView\n       commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\n\
  \       forRowAtIndexPath:(NSIndexPath *)indexPath {\n       if (!self.showsFavorites)\
  \ return;\n\nif (editingStyle == UITableViewCellEditingStyleDelete) {\n        //\
  \ 从数据源中删除行\n        NSString *favorite = self.fontNames[indexPath.row];\n      \
  \  [[FavoritesList sharedFavoritesList] removeFavorite:favorite];\n        self.fontNames\
  \ = [FavoritesList sharedFavoritesList].favorites;\n\n[tableView deleteRowsAtIndexPaths:@[indexPath]\n\
  \                         withRowAnimation:UITableViewRowAnimationFade];\n    }\n\
  }\n```\n\n这个方法相当直接，但其中存在一些细微之处。我们首先检查是否正在显示收藏列表；如果不是，则直接退出。正常情况下，这种情况绝不会发生，因为我们在上一个方法中已指定只有收藏列表是可编辑的。不过，这里我们是在进行防御性编程。之后，我们检查编辑样式，确保即将完成的特定编辑操作确实是删除操作。表格视图中也可以执行插入编辑，但需要额外的设置（我们并未进行），因此我们无需担心其他情况。接下来，我们确定要删除哪个字体，将其从\
  \ `FavoritesList` 单例中移除，并更新本地的收藏列表副本。\n\n最后，我们通知表格视图删除该行，并通过视觉淡出动画使其消失。理解通知表格视图删除行时会发生什么至关重要。直观上，您可能会认为调用该方法会删除某些数据，但事实并非如此。实际上，我们已经删除了数据！最终的方法调用其实是我们在告诉表格视图：“嘿，我已经做了更改，希望你用动画移除这一行。如果你还需要什么，就问我。”\
  \ 此时，表格视图会开始将已删除行下方的行向上移动并播放动画，这意味着之前位于屏幕外的一些行现在可能会出现在屏幕上，届时它将通过常规方法向控制器请求单元格数据。因此，重要的是，我们在\
  \ `tableView:commitEditingStyle:forRowAtIndexPath:` 方法的实现中，必须在通知表格视图删除行之前对数据模型（本例中为\
  \ `FavoritesList` 单例）进行必要的更改。\n\n现在再次运行应用，确保您已设置一些收藏字体，然后进入收藏列表，从右向左滑动以删除一行。该行会部分滑出屏幕，右侧会出现一个**删除**按钮（见图\
  \ 9-12）。点击**删除**按钮，该行就会消失。\n\n![9781484202005_Fig09-12.jpg](img/9781484202005_Fig09-12.jpg)\n\
  \n图 9-12。显示删除按钮的收藏字体行\n\n### 实现拖拽重排\n\n我们要为字体列表添加的最后一个功能，是让用户只需上下拖拽即可重新排列他们的收藏项。为此，我们将在\
  \ `FavoritesList` 类中添加一个方法，以便按需重排其项目。打开 `FavoritesList.h`，并在 `@interface` 部分添加以下声明：\n\
  \n```\n- (void)moveItemAtIndex:(NSInteger)from toIndex:(NSInteger)to;\n```\n\n接下来，切换到\
  \ `FavoritesList.m`，并将此方法添加到 `@implementation` 部分：\n\n```\n- (void)moveItemAtIndex:(NSInteger)from\
  \ toIndex:(NSInteger)to {\n    id item = _favorites[from];\n    [_favorites removeObjectAtIndex:from];\n\
  \    [_favorites insertObject:item atIndex:to];\n    [self saveFavorites];\n}\n\
  ```\n\n这个新方法为我们即将进行的操作提供了基础。现在选择 `FontListViewController.m`，并在 `viewDidLoad` 方法的末尾添加以下代码行：\n\
  \n```\nif (self.showsFavorites) {\n    self.navigationItem.rightBarButtonItem =\
  \ self.editButtonItem;\n}\n```\n\n我们之前提到过导航项（navigation item）。它是一个对象，持有关于视图控制器导航栏应显示内容的信息。它有一个名为\
  \ `rightBarButtonItem` 的属性，可以持有 `UIBarButtonItem` 的实例，这是一种专用于导航栏和工具栏的特殊按钮。这里，我们将其指向\
  \ `editButtonItem`，这是 `UIViewController` 的一个属性，为我们提供了一个已预先配置好的特殊按钮项，用于激活表格视图的编辑/重排\
  \ GUI。\n\n完成此设置后，尝试再次运行应用并进入收藏列表。您会看到右上角现在出现了一个**编辑**按钮。按下该按钮会切换表格视图的编辑 GUI，目前这意味着每一行左侧会显示一个删除按钮，同时其内容会向右稍微移动以腾出空间。这为用户提供了另一种删除行的方式，使用的是我们已经实现的方法。\n\
  \n但我们主要关注的是添加重排功能。为此，我们只需在 `FontListViewController.m` 中添加以下方法：\n\n```\n- (void)tableView:(UITableView\
  \ *)tableView\n               moveRowAtIndexPath:(NSIndexPath *)fromIndexPath\n\
  \               toIndexPath:(NSIndexPath *)toIndexPath {\n    [[FavoritesList sharedFavoritesList]\
  \ moveItemAtIndex:fromIndexPath.row\n                                          \
  \          toIndex:toIndexPath.row];\n    self.fontNames = [FavoritesList sharedFavoritesList].favorites;\n\
  }\n```\n\n当用户完成拖拽行时，会立即调用此方法。我们在此所做的只是通知 `FavoritesList` 单例执行重排，然后刷新我们的字体名称列表，就像删除项目后所做的那样。要查看实际效果，请运行应用，进入收藏列表，然后点击**编辑**按钮。您会看到编辑模式现在在每行右侧包含了小的“拖拽”图标（见图\
  \ 9-13），您可以使用拖拽器重新排列项目。\n\n![9781484202005_Fig09-13.jpg](img/9781484202005_Fig09-13.jpg)\n\
  \n图 9-13。启用了重排控件的收藏字体列表\n\n至此，我们的应用就完成了！至少，就本书而言已经完成了。如果您想到对这些字体还有其他更有用的操作，尽管动手尝试吧！\n\
  \n## 终章\n\n\n\n"
- "# 第十章  \n## 集合视图  \n\n本章内容量堪比一场马拉松。如果你还能坚持读到这里，请务必为自己感到自豪。深入理解这些神秘的表格视图和导航控制器对象至关重要，因为它们是众多\
  \ iOS 应用的基石；若未能透彻掌握其复杂性，必将陷入困境。  \n\n在你开始构建自己的表格时，请反复参考本章及前一章的内容，也不要畏惧 Apple 的官方文档。表格视图异常复杂，不可能涵盖所有可能的排列组合；但你现在应该已经掌握了一套非常实用的表格视图构建模块，可以用于设计和构建自己的应用。一如既往，欢迎你在自己的应用中复用这些代码。这是作者赠予你的礼物，请尽情享用！\
  \  \n\n在本章中，我们将探讨 `UIKit` 中一个相对较新的成员：`UICollectionView` 类。你将了解它与熟悉的 `UITableView`\
  \ 有何关联、有何不同，以及如何扩展它以实现 `UITableView` 根本无法想象的功能。  \n\n多年来，iOS 开发者一直使用 `UITableView`\
  \ 组件创建各种界面。凭借其允许定义多种单元格类型、按需动态创建以及便捷垂直滚动的能力，`UITableView` 已成为成千上万应用的关键组件。Apple 多年以来也一直对表格视图类倾注大量\
  \ API 优化，在每次重大 iOS 版本更新中都新增了更好的内容供给方式。  \n\n然而，它仍然不是处理所有大型数据集的终极方案。例如，若要呈现多列数据，你需要将每行数据的所有列合并到单个单元格中。此外，`UITableView`\
  \ 也无法实现内容水平滚动。总的来说，`UITableView` 的强大功能伴随着特定的权衡：开发者无法控制表格视图的整体布局。你可以随心所欲定义每个单元格的外观，但最终这些单元格只会堆叠在一个庞大的滚动列表中！\
  \  \n\n显然，Apple 也意识到了这一点。在 iOS 6 中，它引入了一个名为 `UICollectionView` 的新类来解决这些缺陷。与表格视图一样，这个类允许你显示一组数据“单元格”，并处理诸如将未使用的单元格排队以供后续使用等事宜。但与表格视图不同的是，`UICollectionView`\
  \ 不会将这些单元格垂直堆叠。事实上，`UICollectionView` 根本不负责布局！相反，它使用一个辅助类来执行布局，你很快就会了解到这一点。  \n\n\
  ## 创建 DialogViewer 项目  \n\n为了展示 `UICollectionView` 的部分功能，我们将用它来布局一些文本段落。每个单词将放置在其自己的单元格中，每个段落的所有单元格将聚集在一个分区中。每个分区还将拥有自己的标题。考虑到\
  \ UIKit 已经包含其他完善的文本布局方式，这看起来可能并不令人兴奋。然而，这个过程仍然具有指导意义，因为你会真切感受到这个组件的灵活性。尝试用表格视图实现类似图\
  \ 10-1 的效果，你绝对会寸步难行！  \n\n![9781484202005_Fig10-01.jpg](img/9781484202005_Fig10-01.jpg)\
  \  \n\n图 10-1。每个单词都是一个独立的单元格，标题除外（它们本身就是标题）。所有内容仅通过一个 `UICollectionView` 进行布局，无需我们进行任何显式的几何计算。\
  \  \n\n为了实现这一效果，我们将定义几个自定义单元格类，使用 `UICollectionViewFlowLayout`（目前 UIKit 中唯一包含的布局辅助类），并且像往常一样，使用视图控制器类将所有内容整合在一起。让我们开始吧！\
  \  \n\n像之前多次操作那样，使用 Xcode 创建一个新的 Single View Application。将项目命名为 *DialogViewer*，并使用本书通用的标准设置（将\
  \ **Language** 设置为 *Objective-C*，**Devices** 选择 *Universal*）。  \n\n### 修正视图控制器类\
  \  \n\n在此应用中，我们无需对应用委托进行特殊处理，因此直接打开 `ViewController.h`，做一个简单的修改：将父类切换为 `UICollectionView`：\
  \  \n\n```\n@interface ViewController : UIViewController\n@interface ViewController\
  \ : UICollectionViewController\n```\n\n接下来，打开 `Main.storyboard`。我们需要配置视图控制器，使其与我们在头文件中指定的内容相匹配。在文档大纲中选择唯一的\
  \ **View Controller** 并删除，留下一个空白的故事板。然后使用对象库找到 *Collection View Controller* 并将其拖入编辑区域。选择你刚刚拖入的\
  \ **View Controller** 图标，使用身份检查器将其类改为 `ViewController`。在属性检查器中，确保勾选了 **Is Initial\
  \ View Controller** 复选框。接着，在文档大纲中选择 **Collection View**，使用属性检查器将其背景改为白色。最后，你会看到文档大纲中的\
  \ **Collection View** 对象有一个名为 **Collection View Cell** 的子项。这是一个原型单元格，你可以在 Interface\
  \ Builder 中用它来设计实际单元格的布局。本章中我们不会使用它，因此选择该单元格并删除。  \n\n### 定义自定义单元格  \n\n现在让我们定义一些单元格类。正如你在图\
  \ 10-1 中看到的，我们显示两种基本类型的单元格：一种包含单词的“普通”单元格，另一种用作标题的单元格。任何你为 `UICollectionView` 创建的单元格都必须是系统提供的\
  \ `UICollectionViewCell` 的子类，它提供了与 `UITableViewCell` 类似的基本功能。这些功能包括 `backgroundView`、`contentView`\
  \ 等。由于我们的两种单元格将共享一些功能，实际上我们会让一个成为另一个的子类，并使用子类覆盖部分功能。  \n\n首先，在 Xcode 中创建一个新的 Cocoa\
  \ Touch 类。将新类命名为 *ContentCell*，并使其成为 `UICollectionViewCell` 的子类。选择新类的头文件，添加三个属性和一个类方法的声明：\
  \  \n\n```\n#import <UIKit/UIKit.h>\n\n@interface ContentCell : UICollectionViewCell\n\
  \n@property (strong, nonatomic) UILabel *label;\n@property (copy, nonatomic) NSString\
  \ *text;\n@property (assign, nonatomic) CGFloat maxWidth;\n\n+ (CGSize)sizeForContentString:(NSString\
  \ *)s forMaxWidth:(CGFloat)maxWidth;\n\n@end\n```\n\n`label` 属性将指向一个用于显示的 `UILabel`。我们将使用\
  \ `text` 属性告诉该单元格要显示什么内容，使用 `maxWidth` 属性控制单元格的最大宽度，并使用 `sizeForContentString:forMaxWidth:`\
  \ 方法来询问显示给定字符串所需的单元格大小。这在创建和配置单元格类实例时非常有用。  \n\n现在切换到 `ContentCell.m`，这里还有一些工作等着我们。首先添加一个\
  \ `initWithFrame:` 方法，如下所示：  \n\n```\n- (id)initWithFrame:(CGRect)frame {\n    self\
  \ = [super initWithFrame:frame];\n    if (self) {\n        // Initialization code\n\
  \        self.label = [[UILabel alloc] initWithFrame:self.contentView.bounds];\n\
  \        self.label.opaque = NO;\n        self.label.backgroundColor = [UIColor\
  \ colorWithRed:0.8\n                                                     green:0.9\n\
  \                                                      blue:1.0\n              \
  \                                       alpha:1.0];\n        self.label.textColor\
  \ = [UIColor blackColor];\n```\n\n\n`self.label.textAlignment = NSTextAlignmentCenter;`\
  \  \n`self.label.font = [[self class] defaultFont];`  \n`[self.contentView addSubview:self.label];`\
  \  \n    }  \n    return self;  \n}\n\n这段代码相当简单。它只是创建了一个标签，设置了其显示属性，并将标签添加到单元格的\
  \ `contentView` 中。这里唯一神秘的地方是，它使用了 `defaultFont` 方法来获取字体，并以此设置标签的字体。其设计思路是，该类应定义用于显示内容的字体，同时允许任何子类通过重写\
  \ `defaultFont` 方法来声明自己的显示字体。不过我们还没有创建这个方法，现在就来创建它：\n\n```objc\n+ (UIFont *)defaultFont\
  \ {\n    return [UIFont preferredFontForTextStyle:UIFontTextStyleBody];\n}\n```\n\
  \n非常直观。这里使用了 `UIFont` 类的 `preferredFontForTextStyle:` 方法来获取用户偏好的正文字体。用户可以通过“设置”应用更改此字体的大小。通过使用此方法而非硬编码字体大小，我们让应用对用户更加友好。\n\
  \n为了完成这个类，让我们添加在头文件中提到的方法，即计算单元格合适尺寸的方法：\n\n```objc\n+ (CGSize)sizeForContentString:(NSString\
  \ *)string forMaxWidth:(CGFloat)maxWidth {\n    CGSize maxSize = CGSizeMake(maxWidth,\
  \ 1000);\n    NSStringDrawingOptions opts = NSStringDrawingUsesLineFragmentOrigin\
  \ |\n        NSStringDrawingUsesFontLeading;\n    NSMutableParagraphStyle *style\
  \ = [[NSMutableParagraphStyle alloc] init];\n    [style setLineBreakMode:NSLineBreakByCharWrapping];\n\
  \    NSDictionary *attributes = @{ NSFontAttributeName : [self defaultFont],\n \
  \                                 NSParagraphStyleAttributeName : style };\n   \
  \ CGRect rect = [string boundingRectWithSize:maxSize\n                         \
  \              options:opts\n                                    attributes:attributes\n\
  \                                       context:nil];\n    return rect.size;\n}\n\
  ```\n\n这个方法做了很多事情，因此值得逐步讲解。首先，我们声明一个最大尺寸，以确保任何单词的宽度都不会超过 `maxWidth` 参数的值，该值将根据 `UICollectionView`\
  \ 的宽度来设置。接着，我们定义一些选项，用于帮助系统计算目标字符串的正确尺寸。我们还创建了一个允许字符换行的段落样式，这样如果字符串太大而无法适应给定的最大宽度时，它就会自动换到下一行。此外，我们创建了一个属性字典，其中包含我们为此类定义的默认字体以及刚刚创建的段落样式。最后，我们使用了\
  \ UIKit 提供的 `NSString` 功能来计算字符串尺寸。我们传入一个绝对最大尺寸以及设置好的其他选项和属性，然后获得一个尺寸。\n\n这个类最后剩下的工作是对\
  \ `text` 属性进行一些特殊处理。我们不使用通常的隐式实例变量，而是定义一些方法，基于我们之前创建的 `UILabel` 来获取和设置值，本质上就是将 `UILabel`\
  \ 作为显示值的存储空间。通过这样做，我们还可以在文本发生变化时，利用设置器重新计算单元格的几何布局。具体实现如下：\n\n```objc\n- (NSString\
  \ *)text {\n    return self.label.text;\n}\n\n- (void)setText:(NSString *)text {\n\
  \    self.label.text = text;\n    CGRect newLabelFrame = self.label.frame;\n   \
  \ CGRect newContentFrame = self.contentView.frame;\n    CGSize textSize = [[self\
  \ class] sizeForContentString:text forMaxWidth:_maxWidth];\n    newLabelFrame.size\
  \ = textSize;\n    newContentFrame.size = textSize;\n    self.label.frame = newLabelFrame;\n\
  \    self.contentView.frame = newContentFrame;\n}\n```\n\n获取器没什么特别；但设置器做了一些额外的工作。基本上，它根据显示当前字符串所需的尺寸，同时修改标签和内容视图的\
  \ frame。\n\n这就是我们基础单元格类的全部内容。现在让我们创建一个用于标题的单元格类。使用 Xcode 再创建一个新的 Cocoa Touch 类，将其命名为\
  \ `HeaderCell`，并让它成为 `ContentCell` 的子类。我们不需要修改头文件，所以直接跳转到 `HeaderCell.m` 进行一些改动。在这个类中，我们只需重写\
  \ `ContentCell` 类中的几个方法，以更改单元格的外观，使其与普通内容单元格看起来不同：\n\n```objc\n- (id)initWithFrame:(CGRect)frame\
  \ {\n    self = [super initWithFrame:frame];\n    if (self) {\n        // 初始化代码\n\
  \        self.label.backgroundColor = [UIColor colorWithRed:0.9\n              \
  \                                       green:0.9\n                            \
  \                          blue:0.8\n                                          \
  \           alpha:1.0];\n        self.label.textColor = [UIColor blackColor];\n\
  \    }\n    return self;\n}\n\n+ (UIFont *)defaultFont {\n    return [UIFont preferredFontForTextStyle:UIFontTextStyleHeadline];\n\
  }\n```\n\n这些就是让标题单元格拥有独特外观所需的全部操作，包括其专属的颜色和字体。\n\n## 配置视图控制器\n\n现在让我们将注意力集中到视图控制器上。选择\
  \ `ViewController.m`，首先导入自定义单元格的头文件，并声明一个数组来存放要显示的内容：\n\n```objc\n#import \"ViewController.h\"\
  \n#import \"ContentCell.h\"\n#import \"HeaderCell.h\"\n\n@interface ViewController\
  \ ()\n@property (copy, nonatomic) NSArray *sections;\n@end\n```\n\n接下来，我们将在 `viewDidLoad`\
  \ 中创建这些数据。`sections` 数组将包含一个字典列表，每个字典都有两个键：`header` 和 `content`。我们将使用这些键对应的值来定义显示内容。实际使用的内容改编自一部著名的戏剧：\n\
  \n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // 加载视图后执行任何额外的设置，通常来自\
  \ nib 文件\n    self.sections =\n    @[\n      @{ @\"header\" : @\"第一个女巫\",\n    \
  \     @\"content\" : @\"嘿，我们三个稍后什么时候见面？\" },\n      @{ @\"header\" : @\"第二个女巫\"\
  ,\n         @\"content\" : @\"等一切都理顺了的时候。\" },\n      @{ @\"header\" : @\"第三个女巫\"\
  ,\n         @\"content\" : @\"那就在日落之前。\" },\n      @{ @\"header\" : @\"第一个女巫\",\n\
  \         @\"content\" : @\"在哪儿？\" },\n      @{ @\"header\" : @\"第二个女巫\",\n    \
  \     @\"content\" : @\"那块泥地。\" },\n      @{ @\"header\" : @\"第三个女巫\",\n       \
  \  @\"content\" : @\"我想我们会在那里见到麦克。\" },\n      ];\n}\n```\n\n与 `UITableView` 非常相似，`UICollectionView`\
  \ 允许我们基于一个标识符注册可复用单元格的类。这样做可以让我们在稍后提供单元格时调用出队方法。如果没有可用的单元格，集合视图会自动为我们创建一个——就像 `UITableView`\
  \ 一样！将这一行代码添加到 `viewDidLoad` 的末尾来实现这一点：\n\n```objc\n[self.collectionView registerClass:[ContentCell\
  \ class]\n        forCellWithReuseIdentifier:@\"CONTENT\"];\n```\n\n我们只会对 `viewDidLoad`\
  \ 再做一处修改。由于这个应用没有导航栏，主视图会与状态栏发生重叠。为了防止这种情况，请在 `viewDidLoad` 末尾添加以下代码行：\n\n```objc\n\
  UIEdgeInsets contentInset = self.collectionView.contentInset;\ncontentInset.top\
  \ = 20;\n[self.collectionView setContentInset:contentInset];\n```\n\n至少目前来说，`viewDidLoad`\
  \ 中的配置就足够了。在编写填充集合视图的代码之前，我们需要编写一个小的辅助方法。我们的所有内容都包含在较长的字符串中，但我们需要逐词处理它们，以便将每个单词放入一个单元格中。因此，让我们创建一个内部方法来分割这些字符串。该方法接收一个节号，从节数据中提取相关内容字符串，并将其分割成单词。\n\
  \n\n```objc\n- (NSArray *)wordsInSection:(NSInteger)section {\n    NSString *content\
  \ = self.sections[section][@\"content\"];\n    NSCharacterSet *space = [NSCharacterSet\
  \ whitespaceAndNewlineCharacterSet];\n    NSArray *words = [content componentsSeparatedByCharactersInSet:space];\n\
  \    return words;\n}\n```\n\n### 提供内容单元格\n\n现在开始介绍一组实际填充集合视图的方法。接下来的这三个方法与 `UITableView`\
  \ 中的对应方法非常相似。首先，我们需要一个方法来告知集合视图要显示多少个分区：\n\n```objc\n- (NSInteger)numberOfSectionsInCollectionView:(UICollectionView\
  \ *)collectionView {\n    return [self.sections count];\n}\n```\n\n接下来，我们要用一个方法告诉集合视图每个分区应包含多少个项目。该方法使用了我们之前定义的\
  \ `wordsInSection:` 方法：\n\n```objc\n- (NSInteger)collectionView:(UICollectionView\
  \ *)collectionView\n    numberOfItemsInSection:(NSInteger)section {\n    NSArray\
  \ *words = [self wordsInSection:section];\n    return [words count];\n}\n```\n\n\
  下面这个方法是实际返回单个已配置好单词的单元格的方法。它同样用到了 `wordsInSection:` 方法。如你所见，该方法使用了 `UICollectionView`\
  \ 的出列方法，这与 `UITableView` 类似。由于我们已经为当前使用的标识符注册了单元格类，因此出列方法始终会返回一个实例：\n\n```objc\n\
  - (UICollectionViewCell *)collectionView:(UICollectionView *)collectionView\n  \
  \                cellForItemAtIndexPath:(NSIndexPath *)indexPath {\n    NSArray\
  \ *words = [self wordsInSection:indexPath.section];\n\n    ContentCell *cell = [self.collectionView\n\
  \                            dequeueReusableCellWithReuseIdentifier:@\"CONTENT\"\
  \n                            forIndexPath:indexPath];\n    cell.maxWidth = collectionView.bounds.size.width;\n\
  \    cell.text = words[indexPath.row];\n    return cell;\n}\n```\n\n根据 `UITableView`\
  \ 的工作方式，你可能会认为此时我们已经能让应用至少以最基本的方式运行了。但构建并运行应用后，你会发现实际情况远未达到可用状态（参见图 10-2）。\n\n![9781484202005_Fig10-02.jpg](img/9781484202005_Fig10-02.jpg)\n\
  \n图 10-2。目前还不太实用\n\n虽然能看到部分单词，但并没有形成“流式”布局。所有单元格大小相同，并且挤在一起。原因是还需要处理更多的委托职责才能让布局正常工作。\n\
  \n### 让布局流动起来\n\n到目前为止，我们一直在处理 `UICollectionView`，但如前所述，这个类有一个负责实际布局的帮手。`UICollectionViewFlowLayout`\
  \ 是 `UICollectionView` 的默认布局助手，它本身有一些委托方法，用于从我们这里获取更多信息。现在我们就来实现其中一个。布局对象会为每个单元格调用此方法，以确定其尺寸。这里我们再次使用\
  \ `wordsInSection:` 方法来获取对应的单词，然后利用 `ContentCell` 类中定义的方法来计算所需大小。将此方法添加到 `ViewController.m`\
  \ 中。之所以能这样实现，是因为 `UICollectionViewController` 类默认将自己设为 `UICollectionViewFlowLayout`\
  \ 的委托：\n\n```objc\n- (CGSize)collectionView:(UICollectionView *)collectionView\n\
  \                  layout:(UICollectionViewLayout*)collectionViewLayout\n  sizeForItemAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    NSArray *words = [self wordsInSection:indexPath.section];\n\
  \    CGSize size = [ContentCell sizeForContentString:words[indexPath.row]\n    \
  \                                    forMaxWidth:collectionView.bounds.size.width];\n\
  \    return size;\n}\n```\n\n现在重新构建并运行应用，你会发现我们已经向前迈出了一大步（参见图 10-3）\n\n![9781484202005_Fig10-03.jpg](img/9781484202005_Fig10-03.jpg)\n\
  \n图 10-3。段落流式布局初具雏形\n\n你可以看到单元格现在能够流动换行，文字变得可读，并且每个分区的开头略有下沉。但每个分区与前后分区之间仍然紧密贴合，并且紧贴两侧边缘，视觉效果不佳。让我们通过添加更多配置来解决这个问题。在\
  \ `viewDidLoad` 方法的末尾添加以下代码：\n\n```objc\nUICollectionViewLayout *layout = self.collectionView.collectionViewLayout;\n\
  UICollectionViewFlowLayout *flow = (UICollectionViewFlowLayout *)layout;\nflow.sectionInset\
  \ = UIEdgeInsetsMake(10, 20, 30, 20);\n```\n\n这里我们从集合视图中获取布局对象。首先将其赋值给一个临时的 `UICollectionViewLayout`\
  \ 指针，主要是为了强调一点：`UICollectionView` 只知道这个通用布局类，但实际上它使用的是 `UICollectionViewFlowLayout`\
  \ 的实例——后者是 `UICollectionViewLayout` 的子类。知道了布局对象的真实类型后，我们可以通过类型转换将其赋值给另一个变量，从而访问该子类特有的方法——在本例中，我们需要设置\
  \ `sectionInset` 属性的 setter 方法。\n\n再次构建并运行，你会看到文本单元格终于获得了所需的空间（参见图 10-4）。\n\n![9781484202005_Fig10-04.jpg](img/9781484202005_Fig10-04.jpg)\n\
  \n图 10-4。现在宽松多了\n\n### 提供头部视图\n\n目前唯一缺失的就是头部对象的显示，现在是时候解决这个问题了。回想一下，`UITableView`\
  \ 有一套页眉和页脚视图系统，并且会为每个分区分别请求这些视图。`UICollectionView` 则对此概念进行了更通用的扩展，为布局提供了更大的灵活性。其工作方式是：在通过委托访问普通单元格的系统之外，还有一个并行的系统用于访问可作为页眉、页脚或其他用途的附加视图。在\
  \ `viewDidLoad` 末尾添加以下代码，让集合视图了解我们的头部单元格类：\n\n```objc\n[self.collectionView registerClass:[HeaderCell\
  \ class]\n        forSupplementaryViewOfKind:UICollectionElementKindSectionHeader\n\
  \               withReuseIdentifier:@\"HEADER\"];\n```\n\n如你所见，这里我们不仅指定了单元格类和标识符，还指定了一个“种类”。其理念是：不同的布局可以定义不同种类的补充视图，并可能要求委托为它们提供视图。`UICollectionViewFlowLayout`\
  \ 会为集合视图中的每个分区请求一个分区头部，我们将按如下方式应用它们：\n\n```objc\n- (UICollectionReusableView *)collectionView:(UICollectionView\
  \ *)collectionView\n           viewForSupplementaryElementOfKind:(NSString *)kind\n\
  \                                 atIndexPath:(NSIndexPath *)indexPath {\n    if\
  \ ([kind isEqual:UICollectionElementKindSectionHeader]) {\n        HeaderCell *cell\
  \ = [self.collectionView\n                               dequeueReusableSupplementaryViewOfKind:kind\n\
  \                               withReuseIdentifier:@\"HEADER\"\n              \
  \                 forIndexPath:indexPath];\n\n        cell.maxWidth = collectionView.bounds.size.width;\n\
  \        cell.text = self.sections[indexPath.section][@\"header\"];\n        return\
  \ cell;\n    }\n    return nil;\n}\n```\n\n构建并运行，你会看到……等等！头部视图去哪儿了？事实证明，`UICollectionViewFlowLayout`\
  \ 不会为头部视图分配任何布局空间，除非我们明确指定它们的大小。所以回到 `viewDidLoad`，在末尾添加以下代码：\n\n```objc\nflow.headerReferenceSize\
  \ = CGSizeMake(100, 25);\n```\n\n\n再次构建并运行，现在你会看到页眉已经就位，如前文图 10-1 所示，而图 10-5 再次展示了这一点。\n\
  \n![9781484202005_Fig10-05.jpg](img/9781484202005_Fig10-05.jpg)\n\n图 10-5 完成的 DialogViewer\
  \ 应用\n\n在本章中，我们实际上只是初步涉足了 `UICollectionView`，以及通过默认的 `UICollectionFlowLayout` 类可以实现的功能。你还可以通过定义自己的布局类来实现更炫酷的效果，但这已是另一本书的主题了。\n\
  \n现在你已经熟悉了所有主要的宏观组件，是时候看看如何创建像 iOS 邮件应用那样的主从应用了；所以，翻到下一页，让我们在第 11 章中开始学习。\n\n##\
  \ 第 11 章：使用分割视图和弹出框\n\n在第 9 章中，你花费了大量时间处理基于表格视图选择的应用程序导航。每次选择都会导致占据整个屏幕的顶层视图向左滑动，并引入层级中的下一个视图（或者可能是另一个表格视图）。许多\
  \ iPhone 和 iPod touch 的应用都采用这种方式工作，其中包括一些苹果自家的应用。一个典型的例子是邮件应用，它让你逐层深入邮件账户和文件夹，直到最终找到某条消息。从技术上讲，这种方法在\
  \ iPad 上也可以工作，但这会导致用户交互问题。\n\n在 iPhone 或 iPod touch 大小的屏幕上，让一个屏幕大小的视图滑开以显示另一个屏幕大小的视图效果很好。然而，在\
  \ iPad 大小的屏幕上，同样的交互会感觉有点不对劲、有点夸张，甚至有点让人不知所措。此外，在大多数情况下，用单个表格视图占用如此大的显示屏效率很低。因此，你会看到\
  \ iPad 内置应用实际上并不这样运行。相反，任何像邮件应用那样使用的逐层深入导航功能，都被限制在一个狭窄的列中。当用户深入或返回时，该列的内容会向左或向右滑动。当\
  \ iPad 处于横向模式时，导航列固定在左侧，而选中项的内容显示在右侧。这就是所谓的**分割视图**（见图 11-1），按此方式构建的应用称为**主从应用**。\n\
  \n![9781484202005_Fig11-01.jpg](img/9781484202005_Fig11-01.jpg)\n\n图 11-1 这台处于横向模式的\
  \ iPad 正在显示一个分割视图。导航列在左侧。点击导航列中的一项——此处是一个特定的邮件账户——该项的内容就会显示在右侧的区域中\n\n分割视图非常适合开发像邮件应用这样的主从应用。在\
  \ iOS 8 之前，分割视图类（`UISplitViewController`）仅在 iPad 上可用，这意味着如果你想构建一个通用的主从应用，必须在 iPad\
  \ 上用一种方式实现，在 iPhone 上用另一种方式。现在，`UISplitViewController` 也随处可见了，这意味着你不再需要编写特殊代码来处理\
  \ iPhone。\n\n在 iPad 上使用时，分割视图左侧的默认宽度为 320 点，这与竖直放置的 iPhone 宽度相同。分割视图本身，其导航和内容并排显示，通常只在横向模式下出现。如果你将设备旋转为竖屏方向，分割视图仍然有效，但显示方式已不再相同。导航视图失去了其固定位置，只能通过从视图左侧滑动或按下工具栏按钮来激活，这会使其从左侧滑入，形成一个悬浮在屏幕上所有其他内容之上的视图（见图\
  \ 11-2）。\n\n![9781484202005_Fig11-02.jpg](img/9781484202005_Fig11-02.jpg)\n\n图 11-2\
  \ 这台处于竖屏模式的 iPad 并未显示与横向模式相同的分割视图。相反，当用户从分割视图左侧滑动或点击工具栏按钮时，才会显示组成横向模式分割视图左侧的信息\n\
  \n不过，有些应用并没有严格遵循这条规则。例如，iPad 的设置应用使用了一个始终可见的分割视图，其左侧既不会消失，也不会覆盖右侧的内容视图。但在本章中，我们将遵循标准的使用模式。\n\
  \n在本章的示例项目中，你将看到如何创建一个使用分割视图控制器的主从应用。最初，我们将在 iPad 模拟器上测试该应用，但当它完成后，你会看到相同的代码在 iPhone\
  \ 上也能运行，尽管外观上略有不同。你还将学习如何自定义分割视图的外观和行为，以及如何创建和显示一个弹出框，类似于我们在第 4 章讨论警报视图和操作表时看到的那个。与图\
  \ 4-28 中包裹操作表的弹出框不同，这个弹出框将包含本例应用特有的内容——具体来说，是一个语言列表（见图 11-3）。\n\n![9781484202005_Fig11-03.jpg](img/9781484202005_Fig11-03.jpg)\n\
  \n图 11-3 一个弹出框，视觉上仿佛是从触发其出现的按钮中生长出来的\n\n## 使用 UISplitViewController 构建主从应用\n\n我们将从一个简单的任务开始：利用\
  \ Xcode 预定义的模板之一来创建一个分割视图项目。我们将构建一个列出所有美国总统的应用，并显示你选择的任何一位总统的维基百科条目。\n\n前往 Xcode，选择\
  \ **文件 ![image](img/arrow.jpg) 新建 ![image](img/arrow.jpg) 项目...**。从 **iOS 应用** 部分选择\
  \ **主从应用**，然后点击 **下一步**。在下一个屏幕上，将新项目命名为 *Presidents*，将 **语言** 设置为 *Objective-C*，**设备**\
  \ 设置为 *通用*。确保 **使用 Core Data** 复选框未被勾选。点击 **下一步**，选择项目位置，然后点击 **创建**。Xcode 会执行其常规操作，为你创建若干类和一个故事板文件，然后显示项目。如果尚未打开，展开\
  \ *Presidents* 文件夹，查看其包含的内容。\n\n从开始，项目就包含一个应用委托（像往常一样）、一个名为 `MasterViewController`\
  \ 的类和一个名为 `DetailViewController` 的类。这两个视图控制器分别代表在横向模式下将出现在分割视图左侧和右侧的视图。`MasterViewController`\
  \ 定义了导航结构的顶层，而 `DetailViewController` 定义了当选中导航元素时在较大区域中显示的内容。当应用启动时，这两者都包含在一个分割视图中，你可能还记得，当设备旋转时，这个分割视图会进行一些形态变化。\n\
  \n\n\n为了查看这个特定应用程序模板在功能方面提供了什么，构建该应用并在 iPad 模拟器中运行（该应用也可以在 iPhone 上运行，但其行为略有不同，因此我们将在本章后面讨论拆分视图控制器的这一方面）。如果应用以竖屏模式启动，您将只看到细节视图控制器，如图\
  \ 11-4 左侧所示。点击工具栏上的`Master`按钮，或者从视图的左边缘向右滑动，即可滑入主视图控制器，覆盖在细节视图之上，如图 11-4 右侧所示。\n\
  \n![9781484202005_Fig11-04.jpg](img/9781484202005_Fig11-04.jpg)\n\n图 11-4。竖屏模式下的默认主-从应用。右侧的布局类似于图\
  \ 11-2。\n\n将模拟器（或设备）向左或向右旋转，进入横屏模式。在这种模式下，拆分视图会左侧显示导航视图，右侧显示细节视图（参见图 11-5）。\n\n\
  ![9781484202005_Fig11-05.jpg](img/9781484202005_Fig11-05.jpg)\n\n图 11-5。横屏模式下的默认主-从应用。请注意该图与图\
  \ 11-1 中相似的布局。\n\n我们将以此为基础构建总统演示应用，但首先让我们深入了解已有的内容。\n\n### 故事板定义了结构\n\n一开始，您就已经拥有了一组相当复杂的视图控制器：\n\
  \n*   一个包含所有元素的拆分视图控制器。\n*   一个导航控制器，用于处理拆分视图左侧的内容。\n*   导航控制器内部的一个主视图控制器（显示项目的主列表）。\n\
  *   右侧的一个细节视图控制器。\n*   另一个作为右侧细节视图控制器容器的导航控制器。\n\n在我们使用的默认主-从应用程序模板中，这些视图控制器主要是在主故事板文件中设置和互连的，而不是在代码中。除了进行\
  \ GUI 布局之外，Interface Builder 在让您无需编写大量代码即可连接不同组件方面，确实表现出色。让我们深入项目的故事板，看看事情是如何设置的。\n\
  \n选择`Main.storyboard`以在 Interface Builder 中打开它。这个故事板有很多内容。为了获得最佳效果，您肯定希望打开文档大纲（参见图\
  \ 11-6）。缩小视图（通过右键单击故事板编辑器并从弹出菜单中选择放大级别）也可以帮助您了解整体结构。\n\n![9781484202005_Fig11-06.jpg](img/9781484202005_Fig11-06.jpg)\n\
  \n图 11-6。在 Interface Builder 中打开的`Main.storyboard`。这种复杂的对象层次结构最好在文档大纲中查看。\n\n为了更好地理解这些控制器之间的关系，请打开连接检查器，然后花一些时间依次单击每个视图控制器。以下是您将发现的内容的快速摘要：\n\
  \n*   `UISplitViewController`通过名为`master view controller`和`detail view controller`的关系连线连接到两个`UINavigationController`。这些连线用于告诉`UISplitViewController`，它应该使用什么作为左侧显示的窄条（主视图控制器），以及使用什么作为较大的显示区域（细节视图控制器）。\n\
  *   通过`master view controller`连线连接的`UINavigationController`具有一个`root view controller\
  \ relationship`，指向其自身的根视图控制器，即模板生成的`MasterViewController`类。主视图控制器是`UITableViewController`的子类，您应该对第\
  \ 9 章中的此类很熟悉。\n*   类似地，另一个`UINavigationController`具有一个`root view controller relationship`，指向细节视图控制器，即模板的`DetailVIewController`类。模板生成的细节视图控制器是一个普通的`UIViewController`子类，但您可以自由使用满足应用程序需求的任何视图控制器。\n\
  *   从主视图控制器中的单元格到细节视图控制器有一个类型为`showDetail`的故事板连线。该连线使得被点击单元格中的项会显示在细节视图中。稍后当我们更详细地查看主视图控制器时，将对此进行更多讨论。\n\
  \n此时，`Main.storyboard`的内容实际上是应用各个控制器如何相互连接的定义。正如大多数使用故事板的情况一样，这消除了大量代码，这通常是一件好事。如果您是那种喜欢在代码中完成所有此类配置的人，您可以自由地这样做；但在此示例中，我们将坚持使用\
  \ Xcode 提供的内容。\n\n### 代码定义了功能\n\n将视图控制器互连关系保留在故事板中的主要原因之一是，它们不会用无需存在的配置信息来弄乱您的源代码。剩下的只是定义实际功能的代码。\n\
  \n让我们看看我们有什么作为起点。Xcode 在创建项目时为我们定义了几个类，在我们开始进行任何更改之前，我们将逐一查看它们。\n\n#### 应用委托\n\n\
  首先是`AppDelegate.h`，它看起来像这样：\n\n```objc\n#import <UIKit/UIKit.h>\n\n@interface AppDelegate\
  \ : UIResponder <UIApplicationDelegate>\n\n@property (strong, nonatomic) UIWindow\
  \ *window;\n\n@end\n```\n\n这与您到目前为止在本书中看到的其他几个应用程序委托非常相似。现在切换到`AppDelegate.m`中的实现。该文件开头的代码如下所示（为简洁起见，此处已删除大多数注释和空方法）：\n\
  \n```objc\n#import \"AppDelegate.h\"\n#import \"DetailViewController.h\"\n\n@interface\
  \ AppDelegate () <UISplitViewControllerDelegate>\n\n@end\n\n@implementation AppDelegate\n\
  \n- (BOOL)application:(UIApplication *)application\n                     didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions {\n    UISplitViewController *splitViewController =\n        \
  \                (UISplitViewController *)self.window.rootViewController;\n    UINavigationController\
  \ *navigationController =\n                        [splitViewController.viewControllers\
  \ lastObject];\n    navigationController.topViewController.navigationItem.leftBarButtonItem\
  \ =\n                        splitViewController.displayModeButtonItem;\n    splitViewController.delegate\
  \ = self;\n    return YES;\n}\n```\n\n我们先来看这段代码的最后一部分：\n\n```objc\nsplitViewController.delegate\
  \ = self;\n```\n\n\n\n这一行设置了`UISplitViewController`的`delegate`属性，将其指向应用程序委托本身。在本章后面，当我们研究分割视图在\
  \ iPhone 上的行为时，就会明白为什么需要这个委托连接。但为什么要在代码中进行这个连接，而不是在故事板中直接连接呢？毕竟，就在几段之前，我们刚提到消除枯燥的代码（“把这里连接到那里”）是使用\
  \ nib 和故事板的主要好处之一。而且我们已经在 Interface Builder 中多次连接过委托，为什么这里就不行呢？\n\n要理解为什么使用故事板进行连接在这里实际上行不通，你需要考虑故事板与\
  \ nib 文件的区别。nib 文件实际上是一个冻结的对象图。当你将 nib 加载到运行中的应用程序时，它包含的所有对象都会“解冻”并立即存在，包括文件中指定的所有相互连接。系统会逐个创建文件中每个对象的新实例，并连接对象间的所有出口和连接。\n\
  \n然而，故事板则不止于此。你可以说故事板中的每个场景大致对应一个 nib 文件。当你添加描述场景如何通过转场连接的元数据时，你就得到了一个故事板。但是，与单个\
  \ nib 不同，复杂的故事板通常不会一次性全部加载。相反，任何导致新场景被激活的活动，最终都会从故事板中加载该特定场景的冻结对象图。这意味着你在查看故事板时看到的对象不一定同时存在。\n\
  \n由于 Interface Builder 无法知道哪些场景会共存，它实际上禁止你从一个场景中的对象到另一个场景中的对象建立任何出口或目标/动作连接。实际上，它允许你在场景之间建立的唯一连接就是转场。\n\
  \n但不要只相信我们的话，自己试试看！首先，在故事板中选择**Split View Controller**（你可以在 Split View Controller\
  \ Scene 的 dock 中找到它）。现在调出 Connections Inspector，尝试从`delegate`出口拖出一条连接到另一个视图控制器或对象。你可以在布局视图和列表视图中到处拖拽，但找不到任何会高亮显示（表示它已准备好接受拖放）的位置。进行这个连接的唯一方法就是在代码中。总而言之，考虑到使用故事板消除了大量其他代码，这点额外的代码只是很小的代价。\n\
  \n现在，让我们回过头来看看`application:didFinishLaunchingWithOptions:`方法的开头发生了什么：\n\n```\nUISplitViewController\
  \ *splitViewController =\n    (UISplitViewController *)self.window.rootViewController;\n\
  ```\n\n这行代码获取窗口的`rootViewController`，也就是故事板中自由浮动箭头所指的视图控制器。如果你回头看 Figure 11-6，会看到箭头指向我们的`UISplitViewController`实例。接下来是这段代码：\n\
  \n```\nUINavigationController *navigationController =\n    [splitViewController.viewControllers\
  \ lastObject];\n```\n\n在这一行，我们深入到`UISplitViewController`的`viewControllers`数组中。当分割视图从故事板加载时，这个数组包含了对包裹着主视图控制器和详细视图控制器的导航控制器的引用。我们获取数组中的最后一个项目，它指向详细视图的`UINavigationController`。最后，我们看到了这个：\n\
  \n```\nnavigationController.topViewController.navigationItem.leftBarButtonItem =\n\
             splitViewController.displayModeButtonItem;\n```\n\n这行代码将分割视图控制器的`displayModeButtonItem`赋值给详细视图控制器的导航栏。`displayModeButtonItem`是一个由分割视图本身创建和管理的栏按钮项。这段代码实际上是在添加你在\
  \ Figure 11-4 左侧导航栏上看到的**Master**按钮。在 iPad 上，当设备处于竖屏模式且主视图控制器不可见时，分割视图会显示这个按钮。当设备旋转到横屏方向，或者用户按下按钮使主视图控制器可见时，该按钮就会被隐藏。稍后你会看到，这个按钮在\
  \ iPhone 上也被用来允许用户手动显示和隐藏主视图控制器。\n\n#### 主视图控制器\n\n现在，让我们看看`MasterViewController`，它控制着包含应用程序导航的表格视图的设置。`MasterViewController.h`文件如下所示：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@class DetailViewController;\n\n@interface MasterViewController\
  \ : UITableViewController\n\n@property (strong, nonatomic) DetailViewController\
  \ *detailViewController;\n\n@end\n```\n\n其对应的`MasterViewController.m`文件开头如下（我们先只看前几个方法，其余部分稍后处理）：\n\
  \n```\n#import \"MasterViewController.h\"\n#import \"DetailViewController.h\"\n\n\
  @interface MasterViewController ()\n\n@property NSMutableArray *objects;\n@end\n\
  \n@implementation MasterViewController\n\n- (void)awakeFromNib {\n    [super awakeFromNib];\n\
      if ([[UIDevice currentDevice] userInterfaceIdiom] == UIUserInterfaceIdiomPad)\
  \ {\n        self.clearsSelectionOnViewWillAppear = NO;\n        self.preferredContentSize\
  \ = CGSizeMake(320.0, 600.0);\n    }\n}\n\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
      // Do any additional setup after loading the view, typically from a nib.\n    self.navigationItem.leftBarButtonItem\
  \ = self.editButtonItem;\n\nUIBarButtonItem *addButton = [[UIBarButtonItem alloc]\n\
                initWithBarButtonSystemItem:UIBarButtonSystemItemAdd target:self\n\
                action:@selector(insertNewObject:)];\n    self.navigationItem.rightBarButtonItem\
  \ = addButton;\n    self.detailViewController = (DetailViewController *)\n                \
  \ [[self.splitViewController.viewControllers lastObject] topViewController];\n}\n\
  .\n@end\n```\n\n这里进行了相当多的配置。幸运的是，Xcode 作为分割视图模板的一部分提供了所有这些代码。首先，`awakeFromNib`方法是这样开始的：\n\
  \n```\n- (void)awakeFromNib {\n    [super awakeFromNib];\n    if ([[UIDevice currentDevice]\
  \ userInterfaceIdiom] == UIUserInterfaceIdiomPad) {\n        self.clearsSelectionOnViewWillAppear\
  \ = NO;\n```\n\n`if`语句从代表应用程序运行设备的`UIDevice`对象获取用户界面风格，并测试是否为 iPad。如果是，则将视图控制器的`clearsSelectionOnViewWillAppear`属性设置为`NO`。此属性由`UITableViewController`类（它是`MasterViewController`的父类）定义，允许我们稍微调整控制器的行为。默认情况下，`UITableViewController`被设置为每次显示时取消选择所有行。这在\
  \ iPhone 应用程序中可能没问题，因为每个表格视图通常独立显示；然而，在具有分割视图的 iPad 应用程序中，你可能不希望该选择消失。再回顾一下我们之前的例子，想想\
  \ Mail 应用。用户在左侧选择一条消息，并期望该选择保持不变，即使消息列表消失（由于旋转 iPad 或关闭包含列表的弹出框）。这一行代码解决了这个问题。\n\
  \n\n\n接下来，`awakeFromNib`方法设置了视图的`preferredContentSize`属性。如果此视图控制器被用于为其他允许可变大小的视图控制器提供显示内容，该属性会设置视图的大小。在此场景中，它被设计用于主视图控制器以竖屏模式显示时。尽管这里设置了该属性，但在\
  \ iOS 8 中它似乎没有任何效果——你将在本章后续的“自定义分割视图”中看到在竖屏模式下控制主视图控制器宽度的正确方法。\n\n这里最后一个值得关注的点是`viewDidLoad`方法。在之前的章节中，当你实现一个响应用户行选择的表格视图控制器时，你通常会通过创建一个新的视图控制器并将其推入导航控制器的栈中来响应用户的选中操作。然而，在此应用中，我们希望显示的视图控制器已经就位，并且每次用户在左侧做出选择时都会被重用。它就是故事板文件中包含的`DetailViewController`实例。在这里，我们获取了`DetailViewController`实例并将其保存在一个属性中，预期稍后会用到它。不过，该属性在模板代码的其余部分并未被使用。\n\
  \n`viewDidLoad`方法还向工具栏添加了一个按钮。这个**+**按钮位于主视图控制器导航栏的右侧，如图 11-4 和图 11-5 所示。模板应用程序使用此按钮在主视图控制器的表格视图中创建并添加新条目。由于我们的总统应用不需要此按钮，我们稍后将删除这段代码。\n\
  \n该类模板中还包含了几个其他方法，但暂时无需担心它们。我们将在绕行至详情视图控制器后，删除其中一些方法并重写其他方法。\n\n#### 详情视图控制器\n\n\
  Xcode 为我们创建的最后一个类是`DetailViewController`，它负责实际显示用户在左侧主视图控制器表格中选择的项。以下是`DetailViewController.h`的内容：\n\
  \n```objc\n#import <UIKit/UIKit.h>\n\n@interface DetailViewController : UIViewController\n\
  \n@property (strong, nonatomic) id detailItem;\n@property (weak, nonatomic) IBOutlet\
  \ UILabel *detailDescriptionLabel;\n\n@end\n```\n\n这非常直观——`detailItem`属性是视图控制器存储用户在左侧主视图控制器中选择对象的引用，而`detailDescriptionLabel`是一个连接到故事板中标签的插座变量。在模板应用中，该标签仅显示`detailItem`属性中对象的描述。\n\
  \n切换到`DetailViewController.m`，你将看到以下内容：\n\n```objc\n#import \"DetailViewController.h\"\
  \n\n@interface DetailViewController ()\n\n@end\n\n@implementation DetailViewController\n\
  \n#pragma mark - Managing the detail item\n\n- (void)setDetailItem:(id)newDetailItem\
  \ {\n    if (_detailItem != newDetailItem) {\n        _detailItem = newDetailItem;\n\
  \n        // Update the view.\n        [self configureView];\n    }\n}\n\n- (void)configureView\
  \ {\n    // Update the user interface for the detail item.\n    if (self.detailItem)\
  \ {\n        self.detailDescriptionLabel.text = [self.detailItem description];\n\
  \    }\n}\n\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // Do any additional\
  \ setup after loading the view, typically from a nib.\n    [self configureView];\n\
  }\n\n- (void)didReceiveMemoryWarning {\n    [super didReceiveMemoryWarning];\n \
  \   // Dispose of any resources that can be recreated.\n}\n\n@end\n```\n\n该类中最重要的方法是这个：\n\
  \n```objc\n- (void)setDetailItem:(id)newDetailItem {\n    if (_detailItem != newDetailItem)\
  \ {\n        _detailItem = newDetailItem;\n\n        // Update the view.\n     \
  \   [self configureView];\n    }\n}\n```\n\n`setDetailItem:`方法可能让你感到惊讶。毕竟，我们将`detailItem`定义为一个属性，编译器会自动为我们创建\
  \ getter 和 setter，为什么还要自己创建 setter 呢？因为在此情况下，我们需要能够在 setter 被调用时做出反应（我们将在本章后续的“主-从模板应用程序如何工作”部分看到具体如何发生），以便更新显示内容。自己实现\
  \ setter 是实现此目的的最简单方法。\n\n方法的第一部分只是将新的属性值存储到编译器为我们创建的实例变量中。然后，调用`configureView`方法。这是另一个为我们生成的方法。它所做的仅仅是调用详情对象的`description`方法，然后使用结果来设置故事板中标签的`text`属性：\n\
  \n```objc\n- (void)configureView {\n    // Update the user interface for the detail\
  \ item.\n    if (self.detailItem) {\n        self.detailDescriptionLabel.text =\
  \ [self.detailItem description];\n    }\n}\n```\n\n`description`方法由`NSObject`的所有子类实现。如果你的类没有重写它，它会返回一个默认值，该值可能没什么用。然而，在此示例中，详情对象都是`NSDate`类的实例，而`NSDate`对`description`方法的实现会以通用格式返回日期和时间。\n\
  \n#### 主-从模板应用程序如何工作\n\n现在你已经看到了模板应用程序的所有组成部分，但你可能仍然不太清楚它是如何工作的，所以我们运行它，看看它实际上做了什么。\n\
  \n在 iPad 模拟器上运行该应用，并将设备旋转至横屏模式，以便显示主视图控制器。你会看到详情视图控制器中的标签当前显示的是故事板中为其分配的默认文本。我们将在本节看到的是，在主视图控制器中选择一个项的操作如何导致该文本发生变化。主视图控制器中目前没有任何项。要解决这个问题，请多次点击其导航栏右上角的**+**按钮。每次点击，都会向控制器的表格视图添加一个新项，如图图\
  \ 11-7 所示。\n\n![9781484202005_Fig11-07.jpg](img/9781484202005_Fig11-07.jpg)\n\n\
  图 11-7. 模板应用，在主视图控制器中选中一项，并在详情视图控制器中显示\n\n主视图控制器表格中的所有项都是日期。选择其中一项，详情视图中的标签就会更新显示相同的日期。你已经看到了执行此操作的代码——它是`DetailViewController.m`中的`configureView`方法，当详情视图控制器的`detailItem`属性被存入新值时调用。是什么导致了新属性值的设置？\n\
  \n回顾一下图 11-6 中的故事板。有一条 segue 将主视图控制器表格中的原型表格单元格链接到详情视图控制器。如果您点击此 segue 并打开属性检查器，您会看到这是一个**Show\
  \ Detail** segue，其标识符为`showDetail`（参见图 11-8）。\n\n![9781484202005_Fig11-08.jpg](img/9781484202005_Fig11-08.jpg)\n\
  \n图 11-8. 连接主视图控制器和详情视图控制器的 Show Detail segue\n\n正如你在第 9 章中看到的，链接到表格视图单元格的 segue\
  \ 会在该单元格被选中时触发，因此当你在主视图控制器的表格视图中选择一行时，iOS 会执行 Show Detail segue，并将包装详情视图控制器的导航控制器作为\
  \ segue 的目标。这会导致两件事发生：\n\n\n\n"
- "# 排版后内容\n\n创建详细信息视图控制器的新实例，并将其视图添加到视图层次结构中。\n主视图控制器中的 `prepareForSegue:sender:`\
  \ 方法会被调用。\n\n第一步负责确保详细信息视图控制器可见。在第二步中，你的主视图控制器需要以某种方式显示在主视图控制器中选中的对象。以下是 `MasterViewController.m`\
  \ 中的模板代码如何处理此操作：\n\n```\n- (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender\
  \ {\n    if ([[segue identifier] isEqualToString:@\"showDetail\"]) {\n        NSIndexPath\
  \ *indexPath = [self.tableView indexPathForSelectedRow];\n        NSDate *object\
  \ = self.objects[indexPath.row];\n        DetailViewController *controller =\n \
  \                  (DetailViewController *)[[segue destinationViewController] topViewController];\n\
  \        [controller setDetailItem:object];\n        controller.navigationItem.leftBarButtonItem\
  \ = self.splitViewController.displayModeButtonItem;\n        controller.navigationItem.leftItemsSupplementBackButton\
  \ = YES;\n    }\n}\n```\n\n首先，检查 segue 标识符，确认它是预期的那个，并且获取视图控制器表格中选中对象对应的 `NSDate`\
  \ 对象。接下来，主视图控制器从导致此方法被调用的 segue 的目标视图控制器的 `topViewController` 属性中，找到 `DetailViewController`\
  \ 实例。现在，我们同时拥有了选中的对象和详细信息视图控制器，接下来要做的就是设置详细信息视图控制器的 `detailItem` 属性，以便更新详细信息视图。`prepareForSegue:sender:`\
  \ 方法的最后两行将显示模式按钮添加到详细信息视图控制器的导航栏。当设备处于横屏模式时，这不会产生任何效果，因为显示模式按钮不可见；但如果你旋转到竖屏方向，就会看到该按钮（即“主视图”按钮）出现。\n\
  \n现在，你已经了解主视图控制器中选中的项目是如何在详细信息视图控制器中显示的了。虽然看起来这里并没有发生太多事情，但实际上，为了在 iPad 和 iPhone\
  \ 上，无论是横屏还是竖屏方向都能正确工作，底层有大量操作正在进行。分割视图控制器的美妙之处在于，它处理了所有细节，让你可以专注于实现自定义的主视图控制器和详细信息视图控制器。\n\
  \n以上概括了 Xcode 的“主-从视图”应用程序模板所提供的内容。乍一看可能信息量很大，但理想情况下，通过逐步拆解介绍，已经帮助你理解所有部分是如何组合在一起的。\n\
  \n## 这里介绍的是总统\n\n既然你已经了解了我们项目的基本布局，现在是时候填补空白，将模板应用变成你自己的应用了。首先查看本书的源代码归档文件，其中 `11\
  \ – Presidents Data` 文件夹包含一个名为 `PresidentList.plist` 的文件。将该文件拖入 Xcode 项目中的 `Presidents`\
  \ 文件夹，以将其添加到项目中，确保选中告知 Xcode 复制文件本身的复选框。此 `.plist` 文件包含了迄今为止所有美国总统的信息，仅包括每位总统的姓名和维基百科条目\
  \ URL。\n\n现在，让我们看看主视图控制器，并了解如何修改它以正确处理总统数据。这将是一件简单的事情：加载总统列表，在表格视图中呈现它们，并将 URL 传递给详细信息视图以供显示。在\
  \ `MasterViewController.m` 中，首先在类扩展中添加如下所示的粗体行，并删除划掉的行：\n\n```\n@interface MasterViewController\
  \ ()\n\n@property NSMutableArray *objects;\n@property (copy, nonatomic) NSArray\
  \ *presidents;\n\n@end\n```\n\n我们不再使用 Xcode 创建的可变数组来保存总统列表，而是创建自己的、名称更有意义的不可变数组。\n\
  \n现在，将注意力转向 `viewDidLoad` 方法，其中的更改稍微复杂一些（但也不算太难）。你将添加几行代码来加载总统列表，然后删除其他几行用于在工具栏中设置编辑和插入按钮的代码：\n\
  \n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // 在从 nib 加载视图后执行任何额外的设置。\n\
  \    self.navigationItem.leftBarButtonItem = self.editButtonItem;\n\n    NSString\
  \ *path = [[NSBundle mainBundle] pathForResource:@\"PresidentList\"\n          \
  \                                           ofType:@\"plist\"];\n    NSDictionary\
  \ *presidentInfo = [NSDictionary\n                                   dictionaryWithContentsOfFile:path];\n\
  \    self.presidents = [presidentInfo objectForKey:@\"presidents\"];\n\n    UIBarButtonItem\
  \ *addButton = [[UIBarButtonItem alloc]\n                 initWithBarButtonSystemItem:UIBarButtonSystemItemAdd\
  \ target:self\n                action:@selector(insertNewObject:)];\n    self.navigationItem.rightBarButtonItem\
  \ = addButton;\n    self.detailViewController = (DetailViewController *)\n     \
  \          [[self.splitViewController.viewControllers lastObject] topViewController];\n\
  }\n```\n\n这个模板生成的类还包含一个名为 `insertNewObject:` 的方法，用于向 `objects` 数组添加项目。我们不再有这个数组，因此删除整个方法：\n\
  \n```\n- (void)insertNewObject:(id)sender {\n    if (!_objects) {\n        _objects\
  \ = [[NSMutableArray alloc] init];\n    }\n    [_objects insertObject:[NSDate date]\
  \ atIndex:0];\n    NSIndexPath *indexPath = [NSIndexPath indexPathForRow:0 inSection:0];\n\
  \    [self.tableView insertRowsAtIndexPaths:@[indexPath]\n                     \
  \    withRowAnimation:UITableViewRowAnimationAutomatic];\n}\n```\n\n此外，我们还有一些处理允许用户编辑表格视图中行的数据源方法。在\
  \ this 应用中，我们不允许编辑任何行，所以在添加我们自己的代码之前，先删除这段代码：\n\n```\n- (BOOL)tableView:(UITableView\
  \ *)tableView\n                       canEditRowAtIndexPath:(NSIndexPath *)indexPath\
  \ {\n    // 如果不想让指定的项可编辑，则返回 NO。\n    return YES;\n}\n\n- (void)tableView:(UITableView\
  \ *)tableView\n                    commitEditingStyle:(UITableViewCellEditingStyle)editingStyle\n\
  \                    forRowAtIndexPath:(NSIndexPath *)indexPath {\n    if (editingStyle\
  \ == UITableViewCellEditingStyleDelete) {\n        [self.objects removeObjectAtIndex:indexPath.row];\n\
  \        [tableView deleteRowsAtIndexPaths:@[indexPath]\n                      \
  \   withRowAnimation:UITableViewRowAnimationFade];\n    } else if (editingStyle\
  \ == UITableViewCellEditingStyleInsert) {\n        // 创建适当类的新实例，将其插入数组，\n      \
  \             // 并向表格视图添加新行。\n    }\n}\n```\n\n现在是时候处理主要的表格视图数据源方法了，并根据我们的目的调整它们。让我们先编辑告诉表格视图显示多少行的方法：\n\
  \n```\n- (NSInteger)tableView:(UITableView *)tableView\n                       \
  \ numberOfRowsInSection:(NSInteger)section {\n    return self.objects.count;\n \
  \   return [self.presidents count];\n}\n```\n\n之后，编辑 `tableView:cellForRowAtIndexPath:`\
  \ 方法，使每个单元格显示总统的名字：\n\n```\n- (UITableViewCell *)tableView:(UITableView *)tableView\n\
  \                                cellForRowAtIndexPath:(NSIndexPath *)indexPath\
  \ {\n    UITableViewCell *cell =\n             [tableView dequeueReusableCellWithIdentifier:@\"\
  Cell\" forIndexPath:indexPath];\n\n    NSDate *object = self.objects[indexPath.row];\n\
  \    cell.textLabel.text = [object description];\n\n    NSDictionary *president\
  \ = self.presidents[indexPath.row];\n    cell.textLabel.text = president[@\"name\"\
  ];\n\n    return cell;\n}\n```\n\n\n\n最后，编辑 `prepareForSegue:sender:` 方法，将所选总统的数据（一个\
  \ `NSDictionary`）传递给详情视图控制器，如下所示：\n\n```\n- (void)prepareForSegue:(UIStoryboardSegue\
  \ *)segue sender:(id)sender {\n    if ([[segue identifier] isEqualToString:@\"showDetail\"\
  ]) {\n        NSIndexPath *indexPath = [self.tableView indexPathForSelectedRow];\n\
          NSDate *object = self.objects[indexPath.row];\n        DetailViewController\
  \ *controller =\n                 (DetailViewController *)[[segue destinationViewController]\
  \ topViewController];\n        [controller setDetailItem:object];\n        NSDictionary\
  \ *president = self.presidents[indexPath.row];\n        controller .detailItem = president;\n\
  \ncontroller.navigationItem.leftBarButtonItem =\n                         self.splitViewController.displayModeButtonItem;\n\
          controller.navigationItem.leftItemsSupplementBackButton = YES;\n    }\n\
  }\n```\n\n这就是在主视图控制器中需要做的全部工作。\n\n接下来，选择 `Main.storyboard`，在文档大纲的 **Master Scene**\
  \ 中点击 **Master** 图标以选中主视图控制器，然后双击其标题栏，将 *Master* 替换为 *Presidents*，并保存故事板。\n\n此时，你可以构建并运行应用。切换到横屏模式，或点击左上角的\
  \ **Master** 按钮调出主视图控制器，即可显示总统列表（参见图 11-9）。点击某个总统的名字，详情视图中会显示一个没什么用处的字符串。\n\n![9781484202005_Fig11-09.jpg](img/9781484202005_Fig11-09.jpg)\n\
  \n图 11-9. Presidents 应用的首次运行，主视图控制器中显示了总统列表，但详情视图中没有任何有用信息\n\n让我们通过让详情视图对接收到的数据进行更有意义的处理来结束这个示例。首先从\
  \ `DetailViewContoller.h` 开始，我们将为 Web 视图添加一个插口，用于显示所选总统的维基百科页面。添加如下所示的粗体行：\n\n```\n\
  @interface DetailViewController : UIViewController\n\n@property (strong, nonatomic)\
  \ id detailItem;\n@property (weak, nonatomic) IBOutlet UILabel *detailDescriptionLabel;\n\
  @property (weak, nonatomic) IBOutlet UIWebView *webView;\n\n@end\n```\n\n接下来，切换到\
  \ `DetailViewController.m`，这里需要做的工作稍多一些（但实际并不多）。滚动到 `configureView` 方法，并将其替换为以下代码：\n\
  \n```\n- (void)configureView {\n    // 更新详情项的用户界面。\n    if (self.detailItem) {\n\
          NSDictionary *dict = (NSDictionary *)self.detailItem;\n\nNSString *urlString\
  \ = dict[@\"url\"];\n        self.detailDescriptionLabel.text = urlString;\n\nNSURL\
  \ *url = [NSURL URLWithString:urlString];\n        NSURLRequest *request = [NSURLRequest\
  \ requestWithURL:url];\n        [self.webView loadRequest:request];\n\nNSString\
  \ *name = dict[@\"name\"];\n        self.title = name;\n    }\n}\n```\n\n由主视图控制器设置的\
  \ `detailItem` 是一个包含两个键值对的 `NSDictionary`：一个键为 `name`，存储总统姓名；另一个键为 `url`，提供总统维基百科页面的\
  \ URL。我们使用该 URL 来设置详情描述标签的文本，并构建一个 `NSURLRequest`，供 `UIWebView` 加载页面。同时使用名称来设置详情视图控制器的标题。当视图控制器是\
  \ `UINavigationController` 中的容器时，其 `title` 属性的值会显示在导航控制器的导航栏中。这就是让 Web 视图加载所需页面的全部工作。\n\
  \n最后需要修改的地方在 `Main.storyboard` 中。打开它进行编辑，在右下角找到详情视图。首先处理 GUI 中的标签（其文本为 “Detail view\
  \ content goes here”）。\n\n从选中标签开始。你可能觉得在文档大纲中，在标记为 *Detail Scene* 的部分选中标签最为方便。选中标签后，将其拖到窗口顶部。标签应从左到右的蓝色参考线开始，并紧贴导航栏下方（调整其大小以确保这一点）。这个标签被重新用于显示当前\
  \ URL。但在应用启动时，用户选择总统之前，我们希望这个字段能给用户一个操作提示。\n\n双击标签，将其更改为 *Select a President*。你还应使用\
  \ Size Inspector 确保标签的位置约束在其父视图的左右两侧以及顶部边缘（参见图 11-10）。如果需要调整这些约束，可以使用前面描述的方法进行设置。你可能只需选中标签，然后从菜单中选择\
  \ **Editor ![image](img/arrow.jpg) Resolve Auto Layout Issues ![image](img/arrow.jpg)\
  \ Reset to Suggested Constraints**，就能几乎精确地达到想要的效果。\n\n![9781484202005_Fig11-10.jpg](img/9781484202005_Fig11-10.jpg)\n\
  \n图 11-10. Size Inspector 显示了底部 “Select a President” 标签的约束设置\n\n接下来，使用库找到 `UIWebView`，并将其拖入刚才移动的标签下方的空间。将\
  \ Web 视图放置好后，使用调整手柄使其填充标签下方视图的其余部分。让它从左边缘延伸到右边缘，并从标签底部下方的蓝色参考线一直延伸到窗口最底部。现在使用 Size\
  \ Inspector 将 Web 视图约束到父视图的左边缘、底部边缘和右边缘，以及顶部边缘的标签（参见图 11-11）。同样，你可能只需从菜单中选择 **Editor\
  \ ![image](img/arrow.jpg) Resolve Auto Layout Issues ![image](img/arrow.jpg) Reset\
  \ to Suggested Constraints** 就能得到所需的结果。\n\n![9781484202005_Fig11-11.jpg](img/9781484202005_Fig11-11.jpg)\n\
  \n图 11-11. Size Inspector 显示了 Web 视图的约束设置\n\n现在，在文档大纲中选择 **Master** 视图控制器，并打开 Attributes\
  \ Editor。在 **View Controller** 部分，将 **Title** 从 *Master* 改为 *Presidents*。这将使详情视图控制器顶部的导航按钮标题变得更加有用。\n\
  \n我们还有最后一步要完成。为了连接你创建的 Web 视图插口，按住 Control 键从 **Detail** 图标（在文档大纲的 Detail Scene\
  \ 部分）拖拽到新的 Web 视图（在文档大纲中标签下方的同一部分，或在故事板中），并连接 `webView` 插口。保存你的修改，就完成了！\n\n现在你可以构建并运行应用，它将允许你查看每位总统的维基百科条目（参见图\
  \ 11-12）。在两个方向之间旋转显示，你会看到分割视图控制器如何在详情视图控制器的协助下为你处理一切。\n\n![9781484202005_Fig11-12.jpg](img/9781484202005_Fig11-12.jpg)\n\
  \n图 11-12. Presidents 应用展示了乔治·华盛顿的维基百科页面\n\n## 创建你自己的弹出视图\n\n\n\n\n在第 4 章中，你已经看到可以在看起来像卡通对话气泡的界面中显示操作列表（见图\
  \ 4-28）。这个对话气泡是**弹出控制器**（简称*popover*）的可视化表示。当操作列表由`UIPopoverPresentationController`呈现时，系统会自动为你创建操作列表附带的弹出视图，但你对此几乎没有控制权。不过，你可以使用`UIPopoverController`类创建自己的弹出视图，当你想要呈现自己的视图控制器时，这会非常有用。\n\
  \n为了了解其工作原理，我们将添加一个由永久工具栏项（不同于`UISplitView`中那种会显示和消失的项）触发的弹出视图。这个弹出视图将显示一个包含语言列表的表格视图。如果用户从列表中选择一种语言，网页视图将加载（以新语言显示）当前已显示的任何维基百科条目。这实现起来非常简单，因为在维基百科中切换语言只需更改\
  \ URL 中包含国家代码的一小部分即可。图 11-3 展示了我们期望的效果。但需要注意的是，`UIPopoverController`仅适用于 iPad，因此当此应用在\
  \ iPhone 上运行时，语言选择器将不可用。\n\n**注意** 本例中使用弹出视图是为了展示`UITableView`，但不要被此误导——`UIPopoverController`可以用来处理任何你喜欢的视图控制器内容的显示！本例坚持使用表格视图，因为这是一个常见用例，用相对较少的代码就能轻松展示，而且你应该对此已经非常熟悉。\n\
  \n首先，在 Xcode 中右键点击*Presidents*文件夹，从弹出菜单中选择**New File...**。在出现的向导中选择**iOS Source**部分下的**Cocoa\
  \ Touch Class**，然后点击**Next**。在下一页，将新类命名为*LanguageListController*，并从**Subclass of**字段中选择`UITableViewController`。点击**Next**，仔细检查文件保存位置，然后点击**Create**。\n\
  \n`LanguageListController`将是一个相当标准的表格视图控制器类。它将显示一个项目列表，并通过指向详细视图控制器的指针，在用户做出选择时通知详细视图控制器。编辑*LanguageListController.h*，添加以下以粗体显示的行：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@class DetailViewController;\n\n@interface LanguageListController\
  \ : UITableViewController\n\n@property (weak, nonatomic) DetailViewController *detailViewController;\n\
  @property (copy, nonatomic) NSArray *languageNames;\n@property (copy, nonatomic)\
  \ NSArray *languageCodes;\n\n@end\n```\n\n这些添加项定义了一个指向详细视图控制器的指针（我们将在即将显示语言列表时，在详细视图控制器本身的代码中进行设置），以及两个数组，分别用于存储将要显示的值（English、French\
  \ 等）和用于根据所选语言构建 URL 的底层值（`en`、`fr`等）。请注意，我们声明这些数组时使用了`copy`存储语义而不是`strong`。这意味着，当有代码调用这些设置器之一时，参数会收到一条`copy`消息，而不仅仅是作为`strong`指针持有。这样做是为了防止其他类可能传入`NSMutableArray`而不是`NSArray`，然后在我们不知情的情况下修改数组。向`NSMutableArray`实例发送`copy`消息总是返回一个不可变的`NSArray`，因此我们知道所使用的数组不能被其他人更改。同时，向本身已是不可变的`NSArray`发送`copy`消息实际上并不会创建新副本，它只是返回一个指向`self`的`strong`指针，因此发送`copy`消息并不会造成任何浪费。\n\
  \n如果你是从本书的源代码存档（或电子书）中复制粘贴此代码到你的项目，或者自己输入时有些马虎，你可能没有注意到前面声明`detailViewController`属性时的一个重要区别。与大多数引用对象指针的属性不同，我们使用`weak`而不是`strong`来声明这个属性。这是我们必须做的，以避免出现**保留**循环。\n\
  \n什么是保留循环？这是一种情况，即一组两个或多个对象以循环方式相互引用。每个对象都阻止另一个对象的内存被释放。通过仔细考虑对象的创建方式，通常尝试判断哪个对象“拥有”哪个对象，可以避免大多数潜在的保留循环。从这个意义上说，`DetailViewController`的实例拥有`LanguageListController`的实例，因为正是`DetailViewController`创建了`LanguageListController`来完成某项工作。当你有一对需要相互引用的对象时，你通常希望拥有者对象保留另一个对象，而另一个对象则明确不保留其拥有者。由于我们使用了苹果在\
  \ Xcode 4.2 中引入的 ARC 功能，编译器为我们完成了大部分工作。我们无需关注释放和保留对象的细节，只需使用`weak`关键字（而不是`strong`）来声明指向我们不拥有的对象的属性即可。剩下的工作由\
  \ ARC 完成！\n\n现在，切换到*LanguageListController.m*来实现以下更改。在文件顶部，首先导入`DetailViewController`的头文件：\n\
  \n```\n#import \"LanguageListController.h\"\n#import \"DetailViewController.h\"\n\
  .\n.\n.\n```\n\n接下来，向下滚动到`viewDidLoad`方法，并添加一些设置代码：\n\n```\n- (void)viewDidLoad\
  \ {\n    [super viewDidLoad];\n\n    self.languageNames = @[@\"English\", @\"French\"\
  , @\"German\", @\"Spanish\"];\n    self.languageCodes = @[@\"en\", @\"fr\", @\"\
  de\", @\"es\"];\n    self.clearsSelectionOnViewWillAppear = NO;\n    self.preferredContentSize\
  \ = CGSizeMake(320.0,\n                                           [self.languageCodes\
  \ count] * 44.0);\n\n    [self.tableView registerClass:[UITableViewCell class]\n\
  \           forCellReuseIdentifier:@\"Cell\"];\n}\n```\n\n这段代码设置了语言数组，并定义了视图控制器的视图在弹出视图中显示时将使用的尺寸（我们知道，它确实会在弹出视图中显示）。如果不定义尺寸，弹出视图将会垂直拉伸以几乎填满整个屏幕，即使使用小得多的视图也能完整显示。最后，我们注册了一个默认的表格视图单元格类供使用，如第\
  \ 8 章所述。\n\n\n\n\n再往下，Xcode 模板生成的一些方法并不包含特别有用的代码——只是一条警告和占位文本。让我们用实际内容替换它们：\n\n\
  ```\n- (NSInteger)numberOfSectionsInTableView:(UITableView *)tableView {\n#warning\
  \ Potentially incomplete method implementation.\n    return 0;\n    return 1;\n\
  }\n\n- (NSInteger)tableView:(UITableView *)tableView\n    numberOfRowsInSection:(NSInteger)section\
  \ {\n#warning Incomplete method implementation.\n    // Return the number of rows\
  \ in the section.\n    return 0;\n    return [self.languageCodes count];\n}\n```\n\
  \n现在添加 `tableView:cellForRowAtIndexPath:` 方法来获取单元格对象并将语言名称放入单元格中：\n\n```\n- (UITableViewCell\
  \ *)tableView:(UITableView *)tableView\n                                 cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    UITableViewCell *cell =\n            [tableView dequeueReusableCellWithIdentifier:@\"\
  Cell\" forIndexPath:indexPath];\n\n// Configure the cell...\n    cell.textLabel.text\
  \ = self.languageNames[indexPath.row];\n\nreturn cell;\n}\n```\n\n接下来，实现 `tableView:didSelectRowAtIndexPath:`\
  \ 以便能够响应用户的触摸操作，将所选语言传回给详情视图控制器：\n\n```\n- (void)tableView:(UITableView *)tableView\n\
                    didSelectRowAtIndexPath:(NSIndexPath *)indexPath {\n    self.detailViewController.languageString\
  \ =\n                  self.languageCodes[indexPath.row];\n}\n```\n\n**注意**：`DetailViewController`\
  \ 实际上还没有 `languageString` 属性，因此你会看到一个编译错误。我们很快就会处理这个问题。\n\n现在该对 `DetailViewController`\
  \ 进行必要修改，以处理弹出窗口，并在用户更改显示语言或选择不同总统时生成正确的 URL。首先在 `DetailViewController.h` 中进行以下更改：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface DetailViewController : UIViewController\n\
  \n@property (strong, nonatomic) id detailItem;\n@property (weak, nonatomic) IBOutlet\
  \ UILabel *detailDescriptionLabel;\n@property (weak, nonatomic) IBOutlet UIWebView\
  \ *webView;\n@property (strong, nonatomic) UIBarButtonItem *languageButton;\n@property\
  \ (strong, nonatomic) UIPopoverController *languagePopoverController;\n@property\
  \ (copy, nonatomic) NSString *languageString;\n\n@end\n```\n\n这里，我们添加了一些属性来跟踪弹出窗口所需的\
  \ GUI 组件以及用户选择的语言。接下来需要做的就是修复 `DetailViewController.m`，使其能够处理语言弹出窗口和 URL 构建。首先在顶部某处添加此导入，并使该类遵循\
  \ `UIPopoverControllerDelegate` 协议，以便它能够响应来自 `UIPopoverController` 的消息：\n\n```\n\
  #import \"DetailViewController.h\"\n#import \"LanguageListController.h\"\n\n@interface\
  \ DetailViewController () <UIPopoverControllerDelegate>\n\n@end\n```\n\n接下来要添加的是一个函数，该函数接受一个指向维基百科页面的\
  \ URL 和一个两位字母的语言代码作为参数，然后返回一个合并两者的 URL。稍后我们会在控制器代码的适当位置使用它。你可以将这个函数放在任何位置，包括类的实现内部。编译器足够智能，总是将函数视为函数。将其放在\
  \ `setDetailItem:` 方法之后：\n\n```\nstatic NSString * modifyUrlForLanguage(NSString\
  \ *url, NSString *lang) {\n    if (!lang) {\n        return url;\n    }\n\n// We're\
  \ relying on a particular Wikipedia URL format here. This\n    // is a bit fragile!\n\
      // URL is like http://en.wikipedia...\n    NSRange codeRange = NSMakeRange(7,\
  \ 2);\n    if ([[url substringWithRange:codeRange] isEqualToString:lang]) {\n        return\
  \ url;\n    } else {\n        NSString *newUrl = [url stringByReplacingCharactersInRange:codeRange\n\
                                                          withString:lang];\n        return\
  \ newUrl;\n    }\n}\n```\n\n为什么将其做成函数而不是方法？有几个原因。首先，类中的实例方法通常用于涉及一个或多个实例变量的操作，或者通过\
  \ getter 和 setter 或直接实例变量访问来访问对象的内部状态。而此函数不使用任何实例变量，它只是对两个字符串执行操作并返回另一个字符串。我们本可以将其做成类方法，但这样做也有些不对劲，因为该方法的功能与控制器类并没有特别具体的关联。有时，函数正是你所需要的。\n\
  \n下一步是更新 `configureView:` 方法。此方法将使用我们刚刚定义的函数来合并传入的 URL 和选定的 `languageString`，以生成正确的\
  \ URL：\n\n```\n- (void)configureView {\n    // Update the user interface for the\
  \ detail item.\n    if (self.detailItem) {\n        NSDictionary *dict = (NSDictionary\
  \ *)self.detailItem;\n\nNSString *urlString = modifyUrlForLanguage(dict[@\"url\"\
  ], self.languageString);\n        self.detailDescriptionLabel.text = urlString;\n\
  \nNSURL *url = [NSURL URLWithString:urlString];\n        NSURLRequest *request = [NSURLRequest\
  \ requestWithURL:url];\n        [self.webView loadRequest:request];\n\nNSString\
  \ *name = dict[@\"name\"];\n        self.title = name;\n    }\n}\n```\n\n现在让我们更新\
  \ `viewDidLoad` 方法。这里，我们将创建一个 `UIBarButtonItem` 并将其放入屏幕顶部的 `UINavigationItem` 中，但仅当我们在\
  \ iPad 上运行时才这样做：\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\nif (UI_USER_INTERFACE_IDIOM()\
  \ == UIUserInterfaceIdiomPad) {\n        self.languageButton =\n         [[UIBarButtonItem\
  \ alloc] initWithTitle:@\"Choose Language\"\n                                      style:UIBarButtonItemStylePlain\n\
                                       target:self\n                                    \
  \ action:@selector(toggleLanguagePopover)];\n        self.navigationItem.rightBarButtonItem\
  \ = self.languageButton;\n    }\n    [self configureView];\n}\n```\n\n此处你会看到一个编译器警告，因为你刚刚添加的代码引用了一个名为\
  \ `toggleLanguagePopover` 的方法，但该方法不存在。我们稍后会修复这个问题。这里我们使用 `UI_USER_INTERFACE_IDIOM()`\
  \ 来判断是在 iPad 还是 iPhone 上运行。我们只想在 iPad 上添加此按钮，因为 iPhone 不支持 `UIPopoverController`。\n\
  \n接下来，我们实现 `setLanguageString:`，当 `languageString` 属性的值发生变化时会调用此方法。此属性设置器方法会调用 `configureView`，以便立即重新生成\
  \ URL（并加载新页面），并且如果语言选择弹出窗口可见，则将其关闭。将此方法添加到文件底部，紧挨 `@end` 之前：\n\n```\n- (void)setLanguageString:(NSString\
  \ *)newString {\n    if (![newString isEqualToString:self.languageString]) {\n        _languageString\
  \ = [newString copy];\n        [self configureView];\n    }\n    if (self.languagePopoverController\
  \ != nil) {\n        [self.languagePopoverController dismissPopoverAnimated:YES];\n\
          self.languagePopoverController = nil;\n    }\n}\n```\n\n现在，让我们定义用户点击**选择语言**按钮时会发生什么。简单来说，我们创建一个\
  \ `LanguageListController`，将其包装在 `UIPopoverController` 中，然后显示它。将此方法放在 `viewDidLoad`\
  \ 方法之后：\n\n\n```objc\n- (void)toggleLanguagePopover {\n    if (self.languagePopoverController\
  \ == nil) {\n        LanguageListController *languageListController =\n        \
  \    [[LanguageListController alloc] init];\n        languageListController.detailViewController\
  \ = self;\n        UIPopoverController *poc =\n            [[UIPopoverController\
  \ alloc]\n                 initWithContentViewController:languageListController];\n\
  \        [poc presentPopoverFromBarButtonItem:self.languageButton\n            \
  \        permittedArrowDirections:UIPopoverArrowDirectionAny\n                 \
  \                   animated:YES];\n        self.languagePopoverController = poc;\n\
  \    } else {\n        [self.languagePopoverController dismissPopoverAnimated:YES];\n\
  \        self.languagePopoverController = nil;\n    }\n}\n```\n\n最后，我们需要再实现一个方法，来处理用户点击打开我们的\
  \ Languages 弹出框，然后点击弹出框外部使其消失的情况。在这种情况下，我们的 `toggleLanguagePopover` 方法不会被调用。不过，我们可以实现\
  \ `UIPopoverControllerDelegate` 协议中声明的一个方法，以便在发生这种情况时得到通知，然后移除 Languages 弹出框：\n\n\
  ```objc\n- (void)popoverControllerDidDismissPopovers:\n    (UIPopoverController\
  \ *)popoverController  {\n    if (popoverController == self.languagePopoverController)\
  \ {\n        self.languagePopoverController = nil;\n    }\n}\n```\n\n就是这样！现在，你应该能够运行这个应用，全面展示其功能，并且在总统和语言之间随意切换。切换语言时，所选总统应始终保持不变。同样地，切换总统时，语言也应保持不变——但实际上，语言却变了。试试看：选择一位总统，将语言改为（比如）西班牙语，然后再选择另一位总统。不幸的是，语言不再是西班牙语了。\n\
  \n为什么会出现这种情况？如果你回到“主-从模板应用程序的工作原理”一节，就会发现问题的根源——Show Detail 转场每次执行时都会创建一个新的从视图控制器实例。这意味着，作为从视图控制器属性存储的语言设置，将在每次选择新总统时丢失。要修复这个问题，我们需要在主视图控制器中添加几行代码。打开\
  \ `MasterViewController.m`，对 `prepareForSegue:sender:` 方法进行以下修改：\n\n```objc\n- (void)prepareForSegue:(UIStoryboardSegue\
  \ *)segue sender:(id)sender {\n    if ([[segue identifier] isEqualToString:@\"showDetail\"\
  ]) {\n        NSIndexPath *indexPath = [self.tableView indexPathForSelectedRow];\n\
  \n        DetailViewController *controller =\n                   (DetailViewController\
  \ *)[[segue destinationViewController] topViewController];\n        controller.languageString\
  \ = self.detailViewController.languageString;\n        self.detailViewController\
  \ = controller;\n\n        NSDictionary *president = self.presidents[indexPath.row];\n\
  \        controller.detailItem = president;\n\n        controller.navigationItem.leftBarButtonItem\
  \ = self.splitViewController.\n                displayModeButtonItem;\n        controller.navigationItem.leftItemsSupplementBackButton\
  \ = YES;\n    }\n}\n```\n\n回想一下，我们在主视图控制器的 `viewDidLoad` 方法中将从视图控制器的引用保存到了 `detailViewController`\
  \ 属性中。这里，在即将执行转场时，我们利用该引用从旧的从视图控制器实例中获取 `languageString` 属性的值，并将其复制到新实例中，而新实例已经替换了分割视图控制器视图层次结构中的旧实例。然后，我们更新\
  \ `detailViewController` 属性为新实例。这就是我们需要做的全部工作。现在，再次运行应用程序。你会发现，你可以在总统之间切换，而不会丢失所选择的语言。\n\
  \n## iPhone 上的分割视图\n\n从 iOS 8 开始，分割视图控制器不仅适用于 iPad，也适用于 iPhone。然而，iPhone 较小的屏幕尺寸意味着分割视图控制器的工作方式与\
  \ iPad 略有不同。选择 iPhone 5s 模拟器，在竖屏模式下运行 Presidents 应用。你会立刻看到差异（参见图 11-13）：主视图控制器中的总统列表可见，但缺少从视图控制器。将设备旋转至横屏模式，你会发现仍然只能看到主视图控制器。\n\
  \n![9781484202005_Fig11-13.jpg](img/9781484202005_Fig11-13.jpg)\n\n图 11-13。在 iPhone\
  \ 5s 上运行的 Presidents 应用\n\n要激活从视图控制器，只需选择一位总统。从视图控制器的视图从右侧滑入，**Presidents** 按钮出现在导航栏顶部，如图\
  \ 11-14 所示。同时注意，**Choose Language** 按钮不见了，因为我们在 iPhone 上运行时没有创建它。如果你按下 **Back**\
  \ 按钮，从视图控制器的视图会滑出到右侧，总统列表重新出现。\n\n![9781484202005_Fig11-14.jpg](img/9781484202005_Fig11-14.jpg)\n\
  \n图 11-14。iPhone 上的 Presidents 应用从视图控制器\n\n需要注意的是，我们无需更改任何代码即可让应用程序在 iPhone 上运行。分割视图控制器在\
  \ iPhone 受限的屏幕空间中会以不同的方式设置自身，初始时仅显示主视图控制器。在这种模式下，我们称分割视图控制器处于**折叠**状态。在折叠模式下，我们用来连接主视图控制器和从视图控制器的\
  \ Set Detail 转场行为会发生变化——分割视图不会在屏幕的专用空间中显示从视图控制器，而是将其推送到主视图控制器的 `UINavigationController`\
  \ 的视图控制器堆栈上。当你按下 **Presidents** 按钮重新显示总统列表时，从视图控制器会从堆栈中弹出，露出其下方的表格视图控制器。\n\n## iPhone\
  \ 6 Plus 上的分割视图\n\n你刚才看到的行为适用于所有 iPhone，但 iPhone 6 Plus 除外。在横屏模式下，iPhone 6 Plus\
  \ 拥有足够大的屏幕，允许分割视图并排显示两个视图控制器，就像在 iPad 上一样，但仅限于横屏模式。在 iPhone 6 Plus 模拟器上运行该应用程序。初始时你只会看到主视图控制器，与通常情况一样。现在旋转到横屏模式，你会看到两个视图控制器（图\
  \ 11-15）。\n\n![9781484202005_Fig11-15.jpg](img/9781484202005_Fig11-15.jpg)\n\n图\
  \ 11-15。iPhone 6 Plus 横屏模式下的 Presidents 应用\n\n这与 iPad 上的情况相似，但并不完全相同。如果你将图 11-15\
  \ 与图 11-3 进行比较，你会发现 iPhone 版本在从视图控制器导航栏的左上角多了一个双向箭头按钮。这实际上是 **Presidents** 按钮（即从应用委托中的\
  \ `UISplitViewController` 的 `displayModeButtonItem` 属性获取的按钮），其绘制方式不同以反映其修改后的功能。如果你按下此按钮，主视图控制器会被移除，从视图控制器占据整个屏幕，此时按钮恢复为正常外观。再次按下该按钮，主视图控制器会重新显示。\n\
  \n\niPhone 6 Plus 的行为差异是`UISplitViewController`免费提供的另一项功能。有多种方法可以自定义拆分视图的行为，通常是通过实现`UISplitViewDelegate`协议的各种方法。我们不打算在这里进一步讨论，除了指出一个细节，如果你重新启动应用程序并将模拟器旋转为纵向模式，你会注意到这个细节。此时，与往常一样，你将看到主视图控制器。如果你在纵向和横向模式之间切换，你将看到相同的控制器。现在，旋转到横向模式并选择一位总统，然后旋转回纵向模式。这次，详细视图控制器保持可见——拆分视图控制器并没有切换回主视图控制器。此行为是在`AppDelegate.m`中实现的`UISplitViewDelegate`方法的结果，也是应用程序启动时应用程序委托被注册为拆分视图委托的原因。该方法的实现如下：\n\
  \n```objc\n- (BOOL)splitViewController:(UISplitViewController *)splitViewController\n\
  \             collapseSecondaryViewController:(UIViewController *)secondaryViewController\n\
  \             ontoPrimaryViewController:(UIViewController *)primaryViewController\
  \ {\n    if ([secondaryViewController isKindOfClass:[UINavigationController class]]\n\
  \               && [[(UINavigationController *)secondaryViewController topViewController]\n\
  \                                     isKindOfClass:[DetailViewController class]]\n\
  \              && ([(DetailViewController *)\n                            [(UINavigationController\
  \ *)secondaryViewController topViewController]\n                               \
  \       detailItem] == nil)) {\n        // Return YES to indicate that we have handled\
  \ the collapse by doing nothing; the secondary controller will be discarded.\n \
  \       return YES;\n    } else {\n        return NO; \n    }\n}\n```\n\n当拆分视图控制器在展开模式（两个视图控制器都激活）和折叠模式（只有一个视图控制器）之间切换时，会调用此方法。如果返回`YES`，详细视图控制器将被移除；但如果返回`NO`，详细视图控制器将保持在视图中。Xcode\
  \ 模板生成的代码确保如果`detailItem`属性不为`nil`（即当前正在显示某些内容），则不会移除详细视图控制器。有趣的是，如果你将此方法存根化，使其始终返回`NO`，你会发现拆分视图控制器打开时显示的是详细视图控制器而不是主视图控制器。\n\
  \n## 在所有 iPhone 上获得 iPhone 6 Plus 的行为\n\n可以让所有 iPhone 上的拆分视图表现得像 iPhone 6 Plus 一样。要了解这是如何实现的，你必须理解为什么拆分视图在\
  \ iPhone 6 Plus 的横向模式下会同时显示两个视图控制器，而在其他 iPhone 型号上则不会。关键在于第 5 章介绍的一个概念——尺寸类别。如果你查看\
  \ Figure 5-20，你会发现所有 iPhone 在所有方向上的水平尺寸类别都是`Compact`，除了 iPhone 6 Plus 在横向模式下具有`Regular`尺寸类别。拆分视图控制器在水平紧凑环境中以折叠模式运行，否则以展开模式运行。这就是为什么你可以在\
  \ iPhone 6 Plus 处于横向方向时同时看到两个视图控制器。事实证明，你可以利用这一点在所有 iPhone 上获得相同的行为。你需要做的就是让拆分视图控制器相信其水平尺寸类别是`Regular`。\n\
  \n尺寸类别信息是从父视图控制器（如果有）或窗口（如果是顶级视图控制器）传播给视图控制器的。当视图控制器的视图被显示以及设备旋转时（如果旋转会导致其水平或垂直尺寸类别发生变化），尺寸类别信息会作为**特征集合**的一部分传递，由`UITraitCollection`类表示。所有视图控制器都遵循`UITraitEnvironment`协议，这意味着它们拥有一个保存当前特征集的`traitCollection`属性，并且它们实现了以下方法，该方法在`traitCollection`属性值更改后被调用：\n\
  \n```objc\n- (void)traitCollectionDidChange:(UITraitCollection *)previousTraitCollection\n\
  ```\n\n为了让拆分视图控制器相信它具有`Regular`水平尺寸类别，我们需要更改由其父视图控制器传递的`trait collection`。这就带来了一个问题：在\
  \ Master-Detail 应用程序模板创建的 storyboard 中（见 Figure 11-6），拆分视图控制器是其窗口的根视图控制器，因此它没有父视图控制器。要更改其特征集合，我们首先必须给它一个父视图控制器，那么我们就来这样做。\n\
  \n选择`Main.storyboard`，打开对象库，并将一个`UINavigationController`拖到 storyboard 上。我们将使该控制器成为拆分视图控制器的父控制器。它已经有一个`UITableViewController`子级，我们不需要它，所以选择它（在文档大纲中标记为**Root\
  \ View Controller**的那个）并将其删除。接下来，按住 Control 键从导航控制器拖拽到拆分视图控制器，然后释放鼠标。在弹出的菜单中，从**Relationship\
  \ Segue**部分选择**Root View Controller**，以使导航控制器成为`UISplitViewController`的父控制器。最后还有两个步骤需要完成。选择导航控制器并打开属性检查器。在**Navigation\
  \ Controller**部分，取消选中**Shows Navigation Bar**（因为我们不需要导航功能），并在**View Controller**部分，选中**Is\
  \ Initial View Controller**，使导航控制器成为应用程序窗口的根视图控制器。\n\n**注意** 如果你想知道为什么我们使用`UINavigationController`而不是普通的`UIViewController`作为根视图控制器，原因是\
  \ Interface Builder 不允许你从普通的`UIViewController`拖拽来创建控制器连接，因为它没有`rootViewController`属性。你可以在代码中创建连接（正如我们在第\
  \ 6 章中所做的那样），但使用`UINavigationController`并关闭导航栏会更简单。\n\n此时，你的 storyboard 应该类似于 Figure\
  \ 11-16。\n\n![9781484202005_Fig11-16.jpg](img/9781484202005_Fig11-16.jpg)\n\nFigure\
  \ 11-16. 具有新根视图控制器的 Presidents 应用的 storyboard\n\n现在我们已经为拆分视图提供了一个父视图控制器，我们需要重写其`traitCollectionDidChange:`方法。为此，我们需要用我们自己的`UINavigationController`子类替换\
  \ storyboard 中的那个。右键单击项目导航器中的`Presidents`文件夹，选择**New File. . .**，然后从新文件选择器的**iOS\
  \ Source**部分选择**Cocoa Touch Class**并点击**Next**。将新类命名为`RootViewController`，使其成为`UINavigationController`的子类，然后创建它。在`Main.storyboard`中选择导航控制器，打开标识检查器，并将其**Class**设置为`RootViewController`。\n\
  \n\n\n现在我们的导航控制器子类是窗口的根视图控制器，我们几乎准备好要重写它的`traitCollectionDidChange:`方法了，但在那之前还有一件事需要修复。在`AppDelegate.m`中，模板生成的`application:didFinishLaunchingWithOptions:`代码假定分割视图控制器是根视图控制器。既然情况不再如此，我们需要做一个小改动。打开`AppDelegate.m`并进行以下加粗显示的更改：\n\
  \n```\n- (BOOL)application:(UIApplication *)application\n                      \
  \         didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n    //\
  \ Override point for customization after application launch.\n    UISplitViewController\
  \ *splitViewController =\n                             (UISplitViewController *)self.window.rootViewController;\n\
  \    UINavigationController *rootViewController =\n                            \
  \ (UINavigationController *)self.window.rootViewController;\n    UISplitViewController\
  \ *splitViewController =\n                             (UISplitViewController *)rootViewController.viewControllers[0];\n\
  \    UINavigationController *navigationController = [splitViewController.viewControllers\
  \ lastObject];\n    navigationController.topViewController.navigationItem.leftBarButtonItem\
  \ =\n                             splitViewController.displayModeButtonItem;\n \
  \   splitViewController.delegate = self;\n    return YES;\n}\n```\n\n现在让我们来做我们计划要做的事。在编辑器中打开`RootViewController.m`并添加以下代码：\n\
  \n```\n- (void)traitCollectionDidChange:(UITraitCollection *)previousTraitCollection\
  \ {\n    UIViewController *spltVC = self.viewControllers[0];\n    UITraitCollection\
  \ *newTraits = self.traitCollection;\n    if (newTraits.horizontalSizeClass == UIUserInterfaceSizeClassCompact\n\
  \            && newTraits.verticalSizeClass == UIUserInterfaceSizeClassCompact)\
  \ {\n        UITraitCollection *childTraits = [UITraitCollection\n             \
  \       traitCollectionWithHorizontalSizeClass:UIUserInterfaceSizeClassRegular];\n\
  \        [self setOverrideTraitCollection:childTraits forChildViewController:spltVC];\n\
  \    } else {\n        [self setOverrideTraitCollection:nil forChildViewController:spltVC];\n\
  \    }\n    [super traitCollectionDidChange:previousTraitCollection];\n}\n```\n\n\
  我们首先从根视图控制器的`traitCollection`属性获取新安装的特征集合。如果水平和垂直尺寸类都是 Compact，那么肯定是在一个已旋转到横屏的 iPhone\
  \ 上运行。这种情况下，我们需要将分割视图将要看到的水平尺寸类从 Compact 改为 Regular。我们通过使用`UITraitCollection`的类方法创建一个用于常规尺寸类的特征来实现这一点：\n\
  \n```\nUITraitCollection *childTraits = [UITraitCollection\n            traitCollectionWithHorizontalSizeClass:UIUserInterfaceSizeClassRegular];\n\
  ```\n\n接下来，我们告诉根视图控制器用这个新特征覆盖其子视图控制器（即分割视图控制器）的特征：\n\n```\n[self setOverrideTraitCollection:childTraits\
  \ forChildViewController:spltVC];\n```\n\n另一方面，如果遇到任何其他尺寸类组合，我们不需要更改它们，因此安装一个`nil`覆盖：\n\
  \n```\n[self setOverrideTraitCollection:nil forChildViewController:spltVC];\n```\n\
  \n现在构建并运行应用程序，然后在任意 iPhone 模拟器上运行。旋转到横屏，你就会看到两个视图控制器，就像在 iPhone 6 Plus 上一样。\n\n\
  顺便提一下，你甚至可以通过修改`traitCollectionDidChange:`方法，让它始终安装一个覆盖特征，来强制分割视图控制器在竖屏模式下显示两个视图控制器。尝试一下以确认它可行是值得的，但在大多数情况下，屏幕太窄，这种做法不太实用。\n\
  \n## 自定义分割视图\n\n有几个分割视图控制器的自定义选项值得尝试，这些选项可在任何设备上使用。首先，你可以控制当两个视图控制器都可见时，主视图控制器所占区域的宽度。为此，你需要设置分割视图控制器的`preferredPrimaryColumnWidthFraction`和`maximumPrimaryColumnWidth`属性。前者将主视图控制器的宽度设置为总可用空间的一个分数，需要一个介于\
  \ 0 和 1 之间的值。后者作为其宽度的上限，因此，如果需要主视图控制器比分割视图控制器计算的默认宽度更宽，你需要设置此属性。\n\n要了解这是如何工作的，请在`AppDelegate.m`中对`application:didFinishLaunchingWithOptions:`进行以下更改：\n\
  \n```\n- (BOOL)application:(UIApplication *)application\n                didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions {\n    // Override point for customization after application launch.\n\
  \    UINavigationController *rootViewController =\n                    (UINavigationController\
  \ *)self.window.rootViewController;\n    UISplitViewController *splitViewController\
  \ =\n                    (UISplitViewController *)rootViewController.viewControllers[0];\n\
  \    UINavigationController *navigationController =\n                    [splitViewController.viewControllers\
  \ lastObject];\n    navigationController.topViewController.navigationItem.leftBarButtonItem\
  \ =\n                    splitViewController.displayModeButtonItem;\n    splitViewController.delegate\
  \ = self;\n\n    splitViewController.preferredPrimaryColumnWidthFraction = 0.5;\n\
  \    splitViewController.maximumPrimaryColumnWidth = 600;\n\n    return YES;\n}\n\
  ```\n\n在任意模拟器上再次运行应用程序并旋转到横屏模式。你会看到主视图控制器现在占据了半个屏幕（参见图 11-17），因为我们把`preferredPrimaryColumnWidthFraction`设置为\
  \ 0.5，并将`maximumPrimaryColumnWidth`增加到一个足够大的值，以至于在任何当前设备上都不会限制主视图控制器的宽度。\n\n![9781484202005_Fig11-17.jpg](img/9781484202005_Fig11-17.jpg)\n\
  \n图 11-17. 在分割视图中增加主视图控制器的宽度\n\n第二个自定义选项控制主视图控制器的管理方式。默认情况下，分割视图控制器决定该控制器何时可见以及它如何出现和消失。例如，在\
  \ iPad 竖屏模式下，主视图控制器最初不可见，从屏幕左侧滑入；而在横屏模式下，它最初可见且无法隐藏。此行为由分割视图控制器的`preferredDisplayMode`属性控制。默认情况下，它被设置为`UISplitViewControllerDisplayModeAutomatic`，但还有另外三种选择：\n\
  \n- `UISplitViewControllerDisplayModePrimaryOverlay`：将主视图控制器放置在左侧，覆盖在详细视图控制器之上。主视图控制器被关闭时，它会向左滑出。\n\
  - `UISplitViewControllerDisplayModePrimaryHidden`：与`UISplitViewControllerDisplayModePrimaryOverlay`相同，只是主视图控制器最初是隐藏的。\n\
  - `UISplitViewControllerDisplayModeAllVisible`：使两个视图控制器在屏幕上最初都可见。\n\n实际行为取决于设备的类型。例如，在水平\
  \ Compact 模式下，此属性无效，因为两个视图控制器不会同时出现在屏幕上。\n\n你可以通过在`application:didFinishLaunchingWithOptions:`方法中设置`preferredDisplayMode`属性来尝试每种模式。例如：\n\
  \n\n\n```\n- (BOOL)application:(UIApplication *)application\n                didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions {\n    // Override point for customization after application launch.\n\
  \    UINavigationController *rootViewController =\n                    (UINavigationController\
  \ *)self.window.rootViewController;\n    UISplitViewController *splitViewController\
  \ =\n                    (UISplitViewController *)rootViewController.viewControllers[0];\n\
  \    UINavigationController *navigationController =\n                    [splitViewController.viewControllers\
  \ lastObject];\n    navigationController.topViewController.navigationItem.leftBarButtonItem\
  \ =\n                    splitViewController.displayModeButtonItem;\n    splitViewController.delegate\
  \ = self;\n\nsplitViewController.preferredPrimaryColumnWidthFraction = 0.5;\n  \
  \  splitViewController.maximumPrimaryColumnWidth = 600;\n\nsplitViewController.preferredDisplayMode\
  \ = UISplitViewControllerDisplayModePrimaryOverlay;\n\nreturn YES;\n}\n```\n\n##\
  \ 准备收尾与拆分\n\n在本章中，你学习了拆分视图控制器及其在创建主从应用程序中的作用。你还了解到，一个包含多个相互连接的视图控制器的复杂应用程序，可以完全在\
  \ Interface Builder 中进行配置。尽管拆分视图现在可在所有设备上使用，但在 iPhone 6 Plus 和 iPad 较大的屏幕空间中，它们可能仍然最为实用。如果你想进一步深入了解\
  \ iPad 开发的细节，不妨阅读 David Mark、Jack Nutting 和 Dave Wooldridge 合著的 *《Beginning iPad\
  \ Development for iPhone Developers》*（Apress，2010 年）。\n\n接下来，我们将探讨应用程序设置和用户默认值。\n\
  \n## 第 12 章\n\n"
- "# 应用程序设置与用户默认值\n\n如今，除了最简单的计算机程序外，几乎所有程序都设有一个偏好设置窗口，用户可在其中设置特定于应用程序的选项。在 Mac OS\
  \ X 上，`Preferences...` 菜单项通常位于应用程序菜单中。点击后，会弹出一个窗口，用户可在其中输入和更改各种选项。iPhone 和其他 iOS\
  \ 设备则有一个名为“设置”的专用应用程序，相信你已多次使用过。在本章中，我们将向你展示如何为你的应用程序在“设置”应用中添加设置项，以及如何从应用程序中访问这些设置。\n\
  \n## 了解你的设置捆绑包\n\n“设置”应用允许用户为任何包含设置捆绑包的应用程序输入和更改偏好设置。**设置捆绑包** 是一组内置于应用程序中的文件，它告知“设置”应用该应用程序希望从用户那里收集哪些偏好设置。\n\
  \n拿起你的 iOS 设备，找到“设置”图标。点击该图标启动“设置”应用。我们的“设置”应用如图 12-1 所示。\n\n![9781484202005_Fig12-01.jpg](img/9781484202005_Fig12-01.jpg)\n\
  \n图 12-1。“设置”应用程序。\n\n“设置”应用程序充当 iOS 用户默认值机制的通用用户界面。用户默认值是系统中用于存储和检索偏好设置的部分。\n\n\
  在 iOS 应用程序中，用户默认值由 `NSUserDefaults` 类实现。如果你在 Mac 上做过 Cocoa 编程，可能对 `NSUserDefaults`\
  \ 已经很熟悉了，因为在 Mac 上存储和读取偏好设置使用的也是同一个类。你将让你的应用程序使用 `NSUserDefaults` 通过键值对来读取和存储偏好设置数据，就像从\
  \ `NSDictionary` 中访问键控数据一样。不同之处在于，`NSUserDefaults` 的数据会持久化到文件系统中，而不是存储在内存中的对象实例中。\n\
  \n在本章中，我们将创建一个应用程序，添加并配置一个设置捆绑包，然后从“设置”应用程序以及我们自己的应用程序中访问和编辑这些偏好设置。\n\n“设置”应用程序的一个好处是它提供了一个现成的解决方案，因此你无需为偏好设置设计自己的用户界面。你只需创建一个描述应用程序可用设置的属性列表，“设置”应用程序就会为你生成相应的界面。\n\
  \n沉浸式应用程序（例如游戏）通常应提供自己的偏好设置视图，以便用户无需退出程序就能进行更改。即使是实用程序或生产力应用程序，有时也可能需要用户在不离开应用的情况下更改偏好设置。我们还将向你展示如何直接在应用程序中收集用户的偏好设置，并将其存储在\
  \ iOS 的用户默认值中。\n\n另一个额外复杂情况是，用户实际上可以切换到“设置”应用程序，更改偏好设置，然后再切换回仍在运行中的你的应用程序。我们将在本章末尾向你展示如何处理这种情况。\n\
  \n## 舰桥控制应用程序\n\n在本章中，我们将构建一个简单的应用程序，用于记录管理星际飞船舰桥的某些方面，我相信你会同意这是一项有用的任务。我们的第一步是创建一个设置捆绑包，这样当用户启动“设置”应用程序时，会看到我们应用程序“舰桥控制”的条目（参见\
  \ 图 12-2）。\n\n![9781484202005_Fig12-02.jpg](img/9781484202005_Fig12-02.jpg)\n\n\
  图 12-2。“设置”应用程序，在模拟器中显示了我们的“舰桥控制”应用程序条目\n\n如果用户选择我们的应用程序，“设置”将下钻进入一个视图，显示与我们应用程序相关的偏好设置。正如你在\
  \ 图 12-3 中所见，“设置”应用程序使用文本字段、安全文本字段、开关和滑块来引导我们勇敢的用户输入值。\n\n![9781484202005_Fig12-03.jpg](img/9781484202005_Fig12-03.jpg)\n\
  \n图 12-3。我们应用程序的主要设置视图\n\n另外请注意视图中带有展开指示符的两个项目。第一个是 `Rank`（军衔），它会把用户带到另一个表格视图，显示该项目的可用选项。在该表格视图中，用户可以选择单个值（参见\
  \ 图 12-4）。\n\n![9781484202005_Fig12-04.jpg](img/9781484202005_Fig12-04.jpg)\n\n\
  图 12-4。从列表中选择单个偏好设置项\n\n“更多设置”的展开指示符允许用户下钻到另一组偏好设置中（参见 图 12-5）。这个子视图可以拥有与主设置视图相同类型的控件，甚至可以拥有自己的子视图。你可能已经注意到，“设置”应用程序使用了导航控制器，这是因为它支持构建分层结构的偏好设置视图。\n\
  \n![9781484202005_Fig12-05.jpg](img/9781484202005_Fig12-05.jpg)\n\n图 12-5。我们应用程序的子设置视图\n\
  \n当用户启动我们的应用程序时，他们将看到一个从“设置”应用程序中收集的偏好设置列表（参见 图 12-6）。\n\n![9781484202005_Fig12-06.jpg](img/9781484202005_Fig12-06.jpg)\n\
  \n图 12-6。我们应用程序的主视图\n\n为了演示如何从应用程序内部更新偏好设置，我们还提供了第二个视图，用户可以在其中直接在应用程序中更改额外的偏好设置（参见\
  \ 图 12-7）。\n\n![9781484202005_Fig12-07.jpg](img/9781484202005_Fig12-07.jpg)\n\n\
  图 12-7。在应用程序内直接设置一些偏好设置\n\n那么，让我们开始构建“舰桥控制”吧？\n\n### 创建项目\n\n\n\n在 Xcode 中，按下 ![image](img/sym3.jpg)![image](img/flower.jpg)`N`\
  \ 或选择 **File** ![image](img/arrow.jpg) **New** ![image](img/arrow.jpg) **Project…**。当新项目助手弹出时，在左侧窗格中的\
  \ iOS 标题下选择 **Application**，单击 **Tabbed Application** 图标，然后单击 **Next**。在下一个屏幕上，将项目命名为\
  \ `Bridge Control`。将 Devices 设置为 `Universal`，然后单击 **Next** 按钮。最后，为项目选择一个位置，然后单击\
  \ **Create**。\n\n`Bridge Control` 应用程序基于我们在第 7 章中使用的 `UITabBarController` 类。模板创建了两个标签，这正是我们所需的。每个标签都需要一个图标。你可以在示例源代码存档的\
  \ `12 – Images` 文件夹中找到这些图标。在 Xcode 中，选择 `Images.xcassets`，然后将 `singleicon.imageset`\
  \ 和 `doubleicon.imageset` 文件夹从 `12 – Images` 拖动到编辑区域。\n\n接下来，我们将为标签栏项目分配图标。选择 `Main.storyboard`，你将看到标签栏控制器及其两个子控制器（一个标记为\
  \ `First View`，另一个标记为 `Second View`）。选择第一个子控制器，然后单击其标签栏项目（当前显示一个圆形和标题 `First`）。在属性检查器的\
  \ Bar Item 部分，将标题更改为 `Main`，图像更改为 `singleicon`，如图 12-8 所示。现在选择第二个子控制器的标签栏项目，将标题从\
  \ `Second` 更改为 `Settings`，图像从 `second` 更改为 `doubleicon`。最后，再次选择 `Images.xcassets`，并删除模板创建的\
  \ `first` 和 `second` 图像集——我们不再需要它们了。关于应用程序本身的工作暂且足够了——在进一步操作之前，让我们先创建它的设置捆绑包。\n\n\
  ![9781484202005_Fig12-08.jpg](img/9781484202005_Fig12-08.jpg)\n\n图 12-8. 设置第一个标签栏项目的图标\n\
  \n### 使用设置捆绑包\n\n设置应用程序使用每个应用程序的设置捆绑包的内容来为该应用程序构建一个设置视图。如果某个应用程序没有设置捆绑包，那么设置应用程序不会为其显示任何内容。每个设置捆绑包必须包含一个名为\
  \ `Root.plist` 的属性列表，用于定义根级偏好设置视图。该属性列表必须遵循非常精确的格式，我们将在为应用程序的设置捆绑包设置属性列表时讨论这一点。\n\
  \n当设置应用程序启动时，它会检查每个应用程序是否有设置捆绑包，并为每个包含设置捆绑包的应用程序添加一个设置组。如果我们希望偏好设置包含任何子视图，我们需要向捆绑包中添加属性列表，并为每个子视图在\
  \ `Root.plist` 中添加一个条目。在本章中，你将看到如何执行此操作。\n\n### 向项目添加设置捆绑包\n\n在项目导航器中，单击 `Bridge\
  \ Control` 文件夹，然后选择 **File** ![image](img/arrow.jpg) **New** ![image](img/arrow.jpg)\
  \ **File…**，或按下 ![image](img/flower.jpg)`N`。在左窗格中，选择 iOS 标题下的 **Resource**，然后选择\
  \ **Settings Bundle** 图标（参见图 12-9）。单击 **Next** 按钮，保留默认名称 `Settings.bundle`，然后单击\
  \ **Create**。\n\n![9781484202005_Fig12-09.jpg](img/9781484202005_Fig12-09.jpg)\n\
  \n图 12-9. 在 Xcode 中创建设置捆绑包\n\n现在，你应该在项目窗口中看到一个新项目 `Settings.bundle`。展开 `Settings.bundle`\
  \ 项目，你应该会看到两个子项：一个名为 `en.lproj` 的文件夹（包含一个名为 `Root.strings` 的文件），以及另一个名为 `Root.plist`\
  \ 的文件。我们将在第 22 章讨论将应用程序本地化为其他语言时，详细介绍 `en.lproj`。在这里，我们将集中讨论 `Root.plist`。\n\n\n\
  \n#### 设置属性列表\n\n选择 `Root.plist` 并查看编辑器窗格。你现在看到的是 Xcode 的属性列表编辑器（参见图 12-10）。\n\n\
  ![9781484202005_Fig12-10.jpg](img/9781484202005_Fig12-10.jpg)\n\n图 12-10. 属性列表编辑器窗格中的\
  \ `Root.plist`。如果你的编辑窗格看起来略有不同，请不要慌张。只需在编辑窗格中按住 Control 键并单击，然后从出现的上下文菜单中选择“显示原始键/值”即可。\n\
  \n请注意属性列表中项目的组织方式。属性列表本质上是字典，它存储项目类型和值，并使用键来检索它们，其工作方式与 `NSDictionary` 完全相同。\n\n\
  属性列表中可放入几种不同类型的节点。`Boolean`、`Data`、`Date`、`Number` 和 `String` 节点类型用于保存单个数据片段，但也有一些方法可以处理整个节点集合。除了允许存储其他字典的\
  \ `Dictionary` 节点类型外，还有 `Array` 节点，它存储一个有序的其他节点列表，类似于 `NSArray`。`Dictionary` 和 `Array`\
  \ 类型是唯一可以包含其他节点的属性列表节点类型。\n\n**注意**  尽管你可以使用大多数类型的对象作为 `NSDictionary` 中的键，但属性列表字典节点中的键必须是字符串。但是，对于值，你可以自由使用任何节点类型。\n\
  \n在创建设置属性列表时，需要遵循一种非常具体的格式。幸运的是，刚刚添加到项目中的设置 bundle 自带的属性列表 `Root.plist` 完全遵循这种格式。让我们来看一下。\n\
  \n在 `Root.plist` 编辑器窗格中，键的名称既可以以其真实的“原始”形式显示，也可以以更易于人类阅读的形式显示。我们非常倾向于尽可能看到事物的真实面貌，所以请在编辑器中的任意位置右键单击，并确保上下文菜单中的\
  \ `显示原始键/值` 选项处于选中状态（参见图 12-11）。我们接下来的讨论将使用所有键的真实名称，因此这一步非常重要。\n\n![9781484202005_Fig12-11.jpg](img/9781484202005_Fig12-11.jpg)\n\
  \n图 12-11. 在属性列表编辑窗格中的任意位置按住 Control 键并单击，确保选中 `显示原始键/值` 项。这将确保在属性列表编辑器中使用真实名称，从而使你的编辑体验更精确。\n\
  \n**警告**  在撰写本文时，离开属性列表（无论是通过编辑其他文件还是退出 Xcode）都会将 `显示原始键/值` 项重置为未选中状态。如果你的文本看起来有些不同，请再次检查该菜单项，并确保它已被选中。\n\
  \n字典中的一项是 `StringsTable`。字符串表用于将你的应用程序翻译成另一种语言。我们将在第 22 章讨论本地化时讨论字符串的翻译。本章不会用到它，但你可以放心地将其保留在项目中，因为它不会造成任何损害。\n\
  \n除了 `StringsTable`，属性列表还包含一个名为 `PreferenceSpecifiers` 的节点，这是一个数组。该数组节点旨在保存一组字典节点，其中每个节点要么代表一个用户可以修改的单个偏好项，要么代表一个用户可以深入查看的子视图。\n\
  \n点击 `PreferenceSpecifiers` 左侧的展开三角形以展开该节点。你会注意到 Xcode 的模板善意地为我们提供了四个子节点（参见图 12-12）。这些节点不太可能反映我们的实际偏好，因此删除\
  \ `Item 1`、`Item 2` 和 `Item 3`（依次选中每个节点并按 `Delete` 键），只保留 `Item 0` 在原位。\n\n![9781484202005_Fig12-12.jpg](img/9781484202005_Fig12-12.jpg)\n\
  \n图 12-12. 编辑器窗格中的 `Root.plist`，这次已展开 `PreferenceSpecifiers`。\n\n**注意**  要选中属性列表中的一项，最好单击“键”列的某一边，以避免调出“键”列的下拉菜单。\n\
  \n单击 `Item 0`（不要展开它）。Xcode 的属性列表编辑器允许你只需按下 `Return` 键即可添加行。当前的选中状态（包括选中了哪一行以及它是否已展开）决定了新行将被插入的位置。当选中一个未展开的数组或字典时，按下\
  \ `Return` 会在选中行之后添加一个同级节点。换句话说，它会在与当前选择相同的级别添加另一个节点。如果你按下 `Return`（但现在不要这样做），你将在\
  \ `Item 0` 之后立即获得一个名为 `Item 1` 的新行。图 12-13 展示了按下 `Return` 创建新行的示例。请注意出现的下拉菜单，它允许你指定此项代表的偏好设置说明符的类型——稍后会详细介绍。\n\
  \n![9781484202005_Fig12-13.jpg](img/9781484202005_Fig12-13.jpg)\n\n图 12-13. 我们选中了\
  \ `Item 0` 并按下了 `Return` 来创建一个新的同级行。注意出现的下拉菜单，允许我们指定此项代表的偏好设置说明符的类型。\n\n现在展开 `Item\
  \ 0` 并查看其内容（参见图 12-14）。编辑器现在已准备好向选中项添加子节点。如果你此时按下 `Return`（再次强调，现在不要实际按下），你将在 `Item\
  \ 0` 内部获得一个新的第一个子行。\n\n![9781484202005_Fig12-14.jpg](img/9781484202005_Fig12-14.jpg)\n\
  \n图 12-14. 当你展开 `Item 0` 时，你会找到一个键为 `Type` 的行和一个键为 `Title` 的行。这表示一个标题为“组”的组。\n\n\
  `Item 0` 中的一项的键为 `Type`。`PreferenceSpecifiers` 数组中的每个属性列表节点都必须有一个带有此键的条目。`Type`\
  \ 键通常是第二个条目，但字典中的顺序无关紧要，因此 `Type` 键不必是第二个。`Type` 键告诉“设置”应用程序与此项关联的数据类型。\n\n在 `Item\
  \ 0` 中，`Type` 项的值为 `PSGroupSpecifier`。这表示此项代表一个新组的开始。后面的每个项都将是此组的一部分——直到遇到下一个 `Type`\
  \ 为 `PSGroupSpecifier` 的项。\n\n如果你回头看图 12-3，你会看到“设置”应用程序在分组表中呈现应用程序设置。设置 bundle 属性列表中\
  \ `PreferenceSpecifiers` 数组的 `Item 0` 应始终是 `PSGroupSpecifier`，这样设置就从一个新组开始。这一点很重要，因为每个“设置”表格中至少需要一个组。\n\
  \n`Item 0` 中唯一的另一个条目的键为 `Title`，它用于在正在开始的组上方设置一个可选的标题。\n\n现在更仔细地看一下 `Item 0` 行本身，你会发现它实际上显示为\
  \ `Item 0 (Group – Group)`。括号中的值分别代表 `Type` 项的值（第一个 `Group`）和 `Title` 项的值（第二个 `Group`）。这是\
  \ Xcode 提供的一个很好的快捷方式，让你可以直观地浏览设置 bundle 的内容。\n\n\n\n如图 12-3 所示，我们将第一个组命名为“General\
  \ Info”。双击`Title`旁边的值，并将其从“Group”改为“General Info”（参见图 12-15）。输入新标题时，你可能会注意到`Item\
  \ 0`略有变化，现在显示为“Item 0 (Group – General Info)”，以反映新标题。在“设置”应用中，标题会以大写字母显示，因此用户实际看到的是“GENERAL\
  \ INFO”。你可以在图 12-3 中看到这一点。\n\n![9781484202005_Fig12-15.jpg](img/9781484202005_Fig12-15.jpg)\n\
  \n图 12-15. 我们将`Item 0`组的标题从`Group`改为`General Info`\n\n#### 添加文本字段设置\n\n我们现在需要在这个数组中添加第二个条目，它将代表第一个实际的偏好字段。我们将从一个简单的文本字段开始。\n\
  \n如果在编辑窗格中单击`PreferenceSpecifiers`行（请勿操作，继续阅读），然后按`Return`键添加一个子项，新行将插入到列表的开头，这不是我们想要的。我们希望在数组的末尾添加一行。\n\
  \n要添加行，请单击`Item 0`左侧的展开三角形将其折叠，然后选中`Item 0`并按`Return`键。这将在当前行之后创建一个新的同级行（参见图 12-16）。与往常一样，添加项目时，会显示一个下拉菜单，默认值为“Text\
  \ Field”。\n\n![9781484202005_Fig12-16.jpg](img/9781484202005_Fig12-16.jpg)\n\n图\
  \ 12-16. 为`Item 0`添加一个新的同级行\n\n点击下拉菜单之外的任意位置使其消失，然后点击`Item 1`旁边的展开三角形将其展开。你将看到它包含一个类型行，设置为`PSTextFieldSpecifier`。该`Type`值用于告诉“设置”应用，我们希望用户通过文本字段编辑此项设置。它还包含两个空行，用于`Title`和`Key`（参见图\
  \ 12-17）。\n\n![9781484202005_Fig12-17.jpg](img/9781484202005_Fig12-17.jpg)\n\n图\
  \ 12-17. 我们的文本字段项，展开后显示类型、标题和键\n\n选中`Title`行，然后在“Value”列的空白处双击。输入“Commanding Officer”来设置`Title`值。这将是在“设置”应用中显示的文本。\n\
  \n现在对`Key`行执行相同的操作（没错，这不是笔误，你确实看到的是一个名为`Key`的键）。对于值，输入“officer”（注意首字母小写）。请记住，用户默认设置的工作方式类似于`NSDictionary`。这个条目告诉“设置”应用，在存储此文本字段中输入的值时使用哪个键。\n\
  \n回想一下我们之前关于`NSUserDefaults`的介绍。它允许你使用键值对来存储值，类似于`NSDictionary`。实际上，“设置”应用会为你保存的每个偏好设置执行相同的操作。如果你给它的键值是`foo`，那么稍后在应用中，你可以请求`foo`对应的值，它将返回用户为该偏好设置输入的值。稍后，我们将使用相同的键值，从应用的用户默认设置中检索此设置。\n\
  \n**注意**  `Title`的值是“Commanding Officer”，而`Key`的值是“officer”。这种大写/小写的差异经常出现，在这里，我们甚至通过为显示的标题使用两个单词，而为键使用一个单词来加剧了这种差异。`Title`是屏幕上显示的内容；因此使用大写字母\
  \ C 和 O，并在单词之间加空格是合理的。`Key`是用于从用户默认设置中检索偏好设置的文本字符串，因此全部小写也是合理的。我们是否可以对`Title`使用全小写？当然可以。我们是否可以对`Key`使用全大写？当然也可以！只要在保存和检索时以相同的方式使用大写，偏好设置键采用什么约定都无关紧要。\n\
  \n现在选中`Item 1`的三个行中的最后一行（即`Key`值为`Key`的那一行），并按`Return`键向`Item 1`字典中添加另一个条目，将其键设置为`AutocapitalizationType`。请注意，一旦你开始输入“AutocapitalizationType”，Xcode\
  \ 就会显示一个匹配选项列表，你可以直接从列表中选择，而无需输入完整名称。输入`AutocapitalizationType`后，按`Tab`键或点击“Value”列右侧的上下箭头图标，打开一个列表，从中选择可用选项。选择“Words”。这将指定文本字段自动将用户在此字段中输入的每个单词的首字母大写。\n\
  \n创建最后一个新行，将其键设置为`AutocorrectionType`，值设置为`No`。这将告诉“设置”应用，不要自动更正输入到此文本字段中的值。在任何你希望文本字段使用自动更正的情况下，可以将此行中的值设置为`Yes`。同样，当你开始输入“AutocorrectionType”时，Xcode\
  \ 会显示一个匹配选项列表，并会在一个弹出窗口中显示有效选项。\n\n完成后，你的属性列表应类似于图 12-18 中所示。\n\n![9781484202005_Fig12-18.jpg](img/9781484202005_Fig12-18.jpg)\n\
  \n图 12-18. 在`Root.plist`中指定的已完成文本字段\n\n#### 添加应用图标\n\n在尝试我们的新设置之前，让我们向项目添加一个应用图标。你之前已经做过此操作。\n\
  \n保存你刚刚编辑的属性文件`Root.plist`。接下来，使用项目导航器选择`Images.xcassets`项目，然后选择其中包含的`AppIcon`项目。在那里，你将找到一个放置图标的拖放区域集。\n\
  \n在 Finder 中，首先导航到源代码存档，然后进入“12 – Images”文件夹。将文件`SettingsIcon.png`拖入 Xcode 中`Images.xcassets`编辑器的“iPad\
  \ Settings 1x”槽位，并将`SettingsIcon@2x.png`拖入“iPhone Settings 2x”和“iPad Settings 2x”槽位。在此处，我们还为应用程序本身添加图标。将`AppIcon-iPhone@2x.png`拖入“iPhone\
  \ App”槽位，`AppIcon-iPad.png`拖入“iPad App 1x”槽位，`AppIcon-iPad@2x.png`拖入“iPad App 2x”槽位。完成后，编辑器应类似于图\
  \ 12-19 所示。\n\n![9781484202005_Fig12-19.jpg](img/9781484202005_Fig12-19.jpg)\n\n\
  图 12-19. 为我们的应用程序添加设置和应用程序图标\n\n就这样。现在，通过选择**Product** ![image](img/arrow.jpg) **Run**来编译并运行应用程序。你还没有为应用构建任何\
  \ GUI，因此你将只看到标签栏控制器的第一个标签。按下**Home**按钮，然后点击“设置”应用图标。你将找到我们应用程序的条目，该条目使用之前添加的图标（参见图\
  \ 12-2）。点击“Bridge Control”行，你将看到一个包含单个文本字段的简单设置视图，如图 12-20 所示。\n\n\n\n![9781484202005_Fig12-20.jpg](img/9781484202005_Fig12-20.jpg)\n\
  \n图 12-20. 在添加一个分组和一个文本字段后，“设置”应用中的根视图\n\n退出模拟器，返回 Xcode。虽然我们还没完成，但你现在应该已经感受到为应用添加偏好设置是多么简单了。让我们为根设置视图添加其余字段。第一个要添加的是用于输入用户授权码的安全文本字段。\n\
  \n#### 添加安全文本字段设置\n\n点击 `Root.plist` 返回设置说明符（别忘了打开**显示原始键/值**，假设 Xcode 的编辑区已重置此项）。折叠\
  \ `Item 0` 和 `Item 1`，然后选中 `Item 1`。按下 `C` 键复制到剪贴板，再按 `V` 键粘贴。这样会创建一个与 `Item 1`\
  \ 完全相同的新 `Item 2`。展开新项，将 `Title` 改为 `授权码`，`Key` 改为 `authorizationCode`。请记住，`Title`\
  \ 是在屏幕标签上显示的内容，而 `Key` 用于保存值。\n\n接下来，为新项再添加一个子项。请注意，子项的顺序无关紧要，因此你可以将其直接放在刚编辑的 `Key`\
  \ 项下方。操作方法是，选中 `Key/authorizationCode` 行，然后按下 **Return** 键。\n\n为新项设置 `Key` 为 `IsSecure`（注意首字母\
  \ I 大写），然后按 **Tab** 键，你会看到 Xcode 自动将 `Type` 改为 `Boolean`。现在将其 `Value` 从 `NO` 改为\
  \ `YES`，这会告诉“设置”应用，此字段需要像密码字段一样隐藏用户输入，而不是像普通文本字段那样。最后，将 `AutocapitalizationType`\
  \ 改为 `None`。我们完成的 `Item 2` 如图 12-21 所示。\n\n![9781484202005_Fig12-21.jpg](img/9781484202005_Fig12-21.jpg)\n\
  \n图 12-21. 我们完成的 `Item 2`，这是一个设计用于接收 `authorizationCode` 的文本字段\n\n#### 添加多值字段\n\n\
  接下来要添加的项目是一个**多值字段**。此类字段会自动生成带有展开指示符的行。点击它，用户可深入查看另一个表格，从中选择多个行中的一项。\n\n折叠 `Item\
  \ 2`，选中该行，然后按 **Return** 键添加 `Item 3`。使用 Key 字段附带的弹出菜单选择 **Multi Value**，然后点击展开三角形展开\
  \ `Item 3`。\n\n展开后的 `Item 3` 已包含几行。其中 `Type` 行已设置为 `PSMultiValueSpecifier`。找到 `Title`\
  \ 行，将其值设为 `等级`。然后找到 `Key` 行，将其值设为 `rank`。下一步稍有难度，我们先做一下说明再操作。\n\n我们要为 `Item 3` 再添加两个子项，但它们将是\
  \ `Array` 类型的节点，而非 `String` 类型，具体如下：\n\n-   一个名为 `Titles` 的数组，用于存放用户可供选择的值列表。\n\
  -   另一个名为 `Values` 的数组，用于存放存储在用户默认设置中的值列表。\n\n也就是说，如果用户选择了列表中的第一项（对应于 `Titles` 数组中的第一项），“设置”应用实际上会存储\
  \ `Values` 数组中的第一个值。这种 `Titles` 和 `Values` 的配对方式，让你可以向用户展示友好的文本，但实际存储的是其他内容，比如数字、日期或另一个字符串。\n\
  \n这两个数组都是必需的。如果你想使它们内容相同，可以创建一个数组，复制后粘贴回来，然后修改键名，这样你就有了两个内容相同但存储在不同键名下的数组。我们正是要这么做。\n\
  \n选中 `Item 3`（保持展开状态），按 **Return** 键添加一个子项。你会再次看到，Xcode 知道我们正在编辑的文件类型，甚至似乎能预判我们的下一步操作：新添加的子行已将其\
  \ `Key` 设为 `Titles`，并配置为 `Array` 类型，这正是我们想要的！按 **Return** 键结束 `Key` 字段的编辑，然后展开 `Titles`\
  \ 行，按 **Return** 键添加一个子节点。重复此操作五次，使总共有六个子节点。所有六个节点都应为 `String` 类型，并分别赋予以下值：`少尉`、`中尉`、`少校`、`中校`、`上校`和`准将`。\n\
  \n创建完所有六个节点并输入值后，折叠 `Titles` 并选中它。接着，按 `C` 键复制，再按 `V` 键粘贴。这会创建一个键名为 `Titles - 2`\
