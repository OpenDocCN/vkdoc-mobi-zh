  \n### 工具栏\n\nXcode 项目窗口的顶部称为**工具栏**（参见图 2-6）。在工具栏的左侧，有用于开始和停止运行项目的控件，以及一个用于选择要运行的样式的弹出菜单。一个**样式（scheme）**将目标（target）和构建设置结合在在一起，而工具栏弹出菜单让你可以快速轻松地选择特定的设置。\n\
  \n![9781484202005_Fig02-06.jpg](img/9781484202005_Fig02-06.jpg)\n\n图 2-6：Xcode 工具栏\n\
  \n工具栏中间的大方框是**活动视图（Activity View）**。顾名思义，活动视图显示当前正在发生的任何操作或进程。例如，当你运行项目时，活动视图会实时显示构建应用程序所采取的各个步骤。如果遇到任何错误或警告，该信息也会在此显示。如果你点击警告或错误，你将直接进入**问题导航器（Issue\
  \ Navigator）**，它提供了关于警告或错误的更多信息，如下一节所述。\n\n在工具栏的右侧有两组按钮。左边的那组让你可以在三种不同的编辑器配置之间切换：\n\
  \n*   **编辑区域（Editor Area）**为你提供一个专用于编辑文件或项目特定配置值的单面板。\n*   极其强大的**辅助编辑器（Assistant\
  \ Editor）**将编辑区域分割为左右两个面板。右侧面板通常用于显示与左侧文件相关的文件，或者在编辑左侧文件时你可能需要参考的文件。你可以手动指定每个面板中显示的内容，或者让\
  \ Xcode 决定当前任务最合适的内容。例如，如果你正在编辑一个 Objective-C 类的实现文件（`.m`文件），Xcode 会自动在右侧面板中显示该类的头文件（`.h`文件）。如果你在左侧设计用户界面，Xcode\
  \ 会在右侧显示用户界面可以与之交互的代码。你将在本书中看到辅助编辑器的实际应用。\n*   **版本编辑器（Version Editor）**按钮将编辑器面板转换为一个类似时间机器的比较视图，可与\
  \ Subversion 和 Git 等版本控制系统配合使用。你可以比较当前版本的源文件与之前提交的版本，或者比较任意两个早期版本。\n\n在编辑器按钮的右侧是一组开关按钮，用于显示和隐藏编辑器视图左侧和右侧的大面板，以及窗口底部的调试区域。分别点击这些按钮几次，看看这些面板的实际效果。你很快会学到更多关于它们如何使用的知识。\n\
  \n### 导航器\n\n在项目窗口的左侧，工具栏的正下方是**导航器（Navigator）**。导航器提供了八个视图，显示项目的不同方面。点击导航器顶部的每个图标，可以按从左到右的顺序在以下导航器之间切换：\n\
  \n\n\n*   **项目导航器**：此视图包含项目中文件的列表（参见图 2-7）。你可以存储对各种资源的引用，从源代码文件到插图、数据模型、属性列表（或`*.plist*`文件）（本章稍后的“仔细查看我们的项目”部分将讨论），甚至其他项目文件。通过将多个项目存储在单个工作区中，这些项目可以轻松共享资源。如果你在导航器视图中点击任何文件，该文件将显示在编辑器区域中。除了查看文件，你还可以编辑它（如果它是`Xcode`知道如何编辑的文件）。\n\
  \n![9781484202005_Fig02-07.jpg](img/9781484202005_Fig02-07.jpg)\n\n图 2-7. Xcode\
  \ 项目导航器。点击视图顶部的八个图标之一可切换导航器\n\n*   **符号导航器**：顾名思义，此导航器专注于工作区中定义的**符号**（参见图 2-8）。符号基本上是编译器识别的项目，例如类、枚举、`struct`和全局变量。\n\
  \n![9781484202005_Fig02-08.jpg](img/9781484202005_Fig02-08.jpg)\n\n图 2-8. Xcode\
  \ 符号导航器。打开展开三角形以探索每个组内定义的类、方法和其他符号\n\n*   **查找导航器**：你将使用此导航器对工作区中的所有文件执行搜索（参见图 2-9）。此窗格顶部是一个多级弹出控件，可让你选择**替换**而不是**查找**，以及用于将搜索条件应用于输入文本的其他选项。在文本字段下方，其他控件允许你选择在整个项目或仅部分项目中搜索，并指定搜索是否应区分大小写。\n\
  \n![9781484202005_Fig02-09.jpg](img/9781484202005_Fig02-09.jpg)\n\n图 2-9. Xcode\
  \ 查找导航器。请务必查看隐藏在单词“查找”下方以及搜索字段下方按钮下方的弹出菜单\n\n*   **问题导航器**：当你构建项目时，任何错误或警告都会出现在此导航器中，并且详细说明错误数量的消息将出现在窗口顶部的活动视图中（参见图\
  \ 2-10）。当你在问题导航器中点击一个错误时，你将跳转到编辑器中相应的代码行。\n\n![9781484202005_Fig02-10.jpg](img/9781484202005_Fig02-10.jpg)\n\
  \n图 2-10. Xcode 问题导航器。这是你找到编译器错误和警告的地方\n\n*   **测试导航器**：如果你使用`Xcode`集成的单元测试功能（很遗憾，本书无法涵盖这个主题），你将在这里看到单元测试的结果（参见图\
  \ 2-11）。\n\n![9781484202005_Fig02-11.jpg](img/9781484202005_Fig02-11.jpg)\n\n图 2-11.\
  \ Xcode 测试导航器。你的单元测试输出将出现在这里\n\n*   **调试导航器**：此导航器是你进入调试过程的主要视图（参见图 2-12）。如果你是调试新手，可以查看*Xcode\
  \ 概述*的这部分内容（`http://developer.apple.com/library/ios/documentation/ToolsLanguages/Conceptual/Xcode_Overview/DebugYourApp/DebugYourApp.html`）。调试导航器列出每个活动线程的堆栈帧。**堆栈帧**是先前调用过的函数或方法的列表，按调用顺序排列。点击一个方法，关联的代码就会出现在编辑器窗格中。在编辑器中，将出现第二个窗格，允许你控制调试过程、显示和修改数据值以及访问底层调试器。调试导航器底部的一个按钮允许你控制哪些堆栈帧可见，另一个按钮允许你选择是显示所有线程还是仅显示已崩溃或停在断点上的线程。\n\
  \n![9781484202005_Fig02-12.jpg](img/9781484202005_Fig02-12.jpg)\n\n图 2-12. Xcode\
  \ 调试导航器。导航器底部的控件允许你控制想要看到的详细程度\n\n*   **断点导航器**：断点导航器允许你查看所有已设置的断点（参见图 2-13）。顾名思义，断点是代码中应用程序将停止运行（或称**中断**）的点，以便你可以查看变量中的值并执行调试应用程序所需的其他任务。此导航器中的断点列表按文件组织。点击列表中的断点，该行将出现在编辑器窗格中。请务必查看在断点导航器中项目窗口左下角的加号（`+`）按钮。此按钮会打开一个弹出菜单，允许你添加四种不同类型的断点，包括符号断点，这是你最常使用的一种。\n\
  \n![9781484202005_Fig02-13.jpg](img/9781484202005_Fig02-13.jpg)\n\n图 2-13. Xcode\
  \ 断点导航器。断点列表按文件组织\n\n*   **报告导航器**：此导航器保留了你最近的构建结果和运行日志的历史记录（参见图 2-14）。点击特定日志，构建命令和任何构建问题都会显示在编辑窗格中。\n\
  \n![9781484202005_Fig02-14.jpg](img/9781484202005_Fig02-14.jpg)\n\n图 2-14. Xcode\
  \ 报告导航器。报告导航器显示构建列表，与选定视图关联的详细信息显示在编辑器窗格中\n\n跳转栏\n\n在编辑器顶部，你会找到一个名为**跳转栏**的特殊控件。只需单击一次，跳转栏就可以让你跳转到当前导航层次结构中的特定元素。例如，图\
  \ 2-15 显示了一个正在编辑窗格中编辑的源文件。跳转栏就在源代码上方。它的结构分解如下：\n\n\n\n## Xcode 界面与功能详解\n\n跳转栏左端那个看起来很有趣的图标实际上是一个弹出菜单，它会显示子菜单，列出最近的文件、对应文件、超类、子类、同级文件、分类、包含文件等等！这里显示的子菜单可以带你跳转到与当前编辑器中所打开代码相关的几乎所有其他代码。\n\
  \n在 *über* 菜单的右侧，有左右箭头，分别用于返回上一个文件和前进到下一个文件。\n\n跳转栏包含一个分段弹出菜单，显示在项目中到达所选文件的层级路径。你可以点击任何显示组名或文件名的分段，查看位于层级结构中同一位置的所有其他文件和组。最后一个分段显示所选文件内项目的列表。在图\
  \ 2-15 中，你会看到跳转栏的末端是一个弹出菜单，显示当前所选文件中包含的方法和其他符号。跳转栏显示文件 `AppDelegate.m`，并带有一个子菜单，列出该文件中定义的符号。\n\
  \n![9781484202005_Fig02-15.jpg](img/9781484202005_Fig02-15.jpg)\n\n图 2-15. Xcode\
  \ 编辑器窗格，显示了跳转栏，并选中了一个源代码文件。子菜单显示了所选文件中的方法列表。\n\n跳转栏非常强大。在你熟悉构成 Xcode 的各种界面元素时，可以留意它的存在。\n\
  \n**提示** 与大多数 Apple 的 OS X 应用程序一样，Xcode 完全支持全屏模式。只需点击项目窗口右上角的全屏按钮，即可体验无干扰的全屏编码！\n\
  \n### Xcode 键盘快捷键\n\n如果你更喜欢使用键盘快捷键而不是鼠标点击屏幕控件，那么你会喜欢 Xcode 提供的功能。你在 Xcode 中经常执行的大多数操作都分配了键盘快捷键，例如\
  \ ![image](img/flower.jpg) `B` 用于构建应用程序，或 ![image](img/flower.jpg) `N` 用于创建新文件。\n\
  \n你可以在 Xcode 的偏好设置中，在 **Key Bindings** 选项卡下更改所有 Xcode 的键盘快捷键，并为尚未分配快捷键的命令添加快捷键。\n\
  \n一个非常方便的键盘快捷键是 ![image](img/sym3.jpg)![image](img/flower.jpg) `O`，这是 Xcode 的 **Open\
  \ Quickly** 功能。按下此快捷键后，开始输入文件、设置或符号的名称，Xcode 会显示一个选项列表。当你将列表缩小到所需文件时，按下 **Return**\
  \ 键即可在编辑窗格中打开它，让你只需几次按键就能切换文件。\n\n### 实用工具区\n\n如前所述，Xcode 工具栏右侧倒数第二个按钮用于打开和关闭实用工具区。实用工具区的上半部分是一个上下文相关的检查器面板，其内容会根据编辑器窗格中显示的内容而变化。实用工具区的下半部分包含几种不同类型的资源，你可以将它们拖拽到项目中。你会在本书中看到相关示例。\n\
  \n### 界面生成器\n\n早期版本的 Xcode 包含一个独立的界面设计应用程序，称为 **Interface Builder**，用于构建和自定义项目的用户界面。后续版本引入的重大变化之一是将\
  \ Interface Builder 集成到工作区本身。Interface Builder 不再是一个独立的应用程序，这意味着你不必在代码和界面演变时在 Xcode\
  \ 和 Interface Builder 之间来回切换。这一转变已经过去几年了，但我们这些还记得独立版 Interface Builder 日子的人，现在对于\
  \ Interface Builder 直接集成到 Xcode 中的效果感到非常满意。\n\n我们将在本书中大量使用 Xcode 的界面构建功能，深入探索其各个角落。事实上，我们将在本章稍后进行第一次界面构建。\n\
  \n### 新编译器和调试器\n\nXcode 4 带来的最重要的变化之一隐藏在底层：一个全新的编译器和一个低级调试器。两者都比其前身更快、更智能，并且之后的每个版本都进行了改进。\n\
  \n多年来，Apple 一直使用 GCC（GNU 编译器集合）作为其编译器技术的基础。但在过去几年中，它已完全转向 LLVM（低级虚拟机）编译器。LLVM 生成的代码远比传统\
  \ GCC 生成的代码快得多。除了生成更快的代码之外，LLVM 还更了解你的代码，因此它可以生成更智能、更精确的错误消息和警告。\n\nXcode 还与 LLVM\
  \ 紧密集成，这赋予了它一些新的超级能力。Xcode 可以提供更精确的代码补全，并且在产生警告时，它可以对一段代码的实际意图进行有根据的猜测，并提供一个可能的修复弹出菜单。这使得拼写错误的符号名称、不匹配的括号和缺失的分号等错误变得容易发现和修复。\n\
  \nLLVM 还引入了复杂的 **静态分析器**，可以扫描你的代码以发现各种潜在问题，包括 Objective-C 内存管理问题。实际上，LLVM 对此非常智能，只要你编写代码时遵守一些简单的规则，它就能为你处理大部分内存管理任务。我们将在下一章开始研究名为\
  \ **自动引用计数**（ARC）的精彩新特性。\n\n### 深入了解我们的项目\n\n现在我们已经探索了 Xcode 项目窗口，让我们来看看构成新 Hello\
  \ World 项目的文件。通过点击工作区左侧八个导航器图标中最左边的一个（如本章前面“导航器”部分所述）或按下 ![image](img/flower.jpg)\
  \ `1`，切换到项目导航器。\n\n**提示** 八个导航器配置可以使用键盘快捷键 ![image](img/flower.jpg) `1` 到 ![image](img/flower.jpg)\
  \ `8` 访问。这些数字对应从左到右的图标，因此 ![image](img/flower.jpg) `1` 是项目导航器，![image](img/flower.jpg)\
  \ `2` 是符号导航器，依此类推，直到 ![image](img/flower.jpg) `8`，它会带你进入报告导航器。\n\n项目导航器列表中的第一项与你的项目同名——在本例中为\
  \ *Hello World*。此项代表你的整个项目，并且也是进行项目特定配置的地方。如果你单击它，就可以在 Xcode 的编辑器中编辑许多项目配置设置。不过，你现在无需担心这些项目特定的设置。目前，默认值就能正常工作。\n\
  \n请翻回图 2-7。注意 *Hello World* 左侧的展开三角形是打开的，显示了多个子文件夹（在 Xcode 中称为**组**）：\n\n\n\n##\
  \ 项目结构与界面构建器\n\n### 项目导航器文件夹\n\n**Hello World**：第一个文件夹始终以你的项目命名，你将在此投入大部分时间。你编写的大部分代码以及构成应用程序用户界面的文件都会放在这里。你可以自由地在\
  \ `Hello World` 文件夹下创建子文件夹来组织代码，如果你更喜欢不同的组织方式，甚至可以使用其他分组。虽然我们直到下一章才会涉及此文件夹中的大部分文件，但有一个文件我们将在下一节使用界面构建器时进行探索：\n\
  \n- `Main.storyboard` 包含特定于项目主视图控制器的用户界面元素。\n\n- **Supporting Files**：此文件夹位于 `Hello\
  \ World` 文件夹内，包含非 Objective-C 类但项目所需的源代码文件和资源。通常，你不需要花费大量时间在 `Supporting Files`\
  \ 文件夹上。当你创建一个新的 iOS 应用程序项目时，此文件夹包含两个文件：\n    - `Info.plist` 是一个属性列表，包含应用程序的相关信息，例如其名称、在运行的设备上是否需要任何特定功能等。\n\
  \    - `main.m` 包含应用程序的 `main()` 方法。通常你无需编辑或更改此文件。事实上，如果你不清楚自己在做什么，最好不要碰它。\n\n-\
  \ **Hello WorldTests**：此文件夹包含如果你想为应用程序代码编写一些单元测试所需的初始文件。我们不会在本书中讨论单元测试，但 Xcode 能在你创建的每个新项目中为你设置这些内容，这一点很不错。与\
  \ `Hello World` 文件夹一样，此文件夹也包含自己的 `Supporting Files` 文件夹和 `Info.plist` 文件。\n\n- **Products**：此文件夹包含项目构建后生成的应用程序。展开\
  \ `Products`，你会看到一个名为 `Hello World.app` 的项，即这个特定项目创建的应用程序。它还包含一个名为 `Hello WorldTests.xctest`\
  \ 的项，代表测试代码。这两项都称为“构建目标”。由于我们从未构建过它们，两者都呈红色，这是 Xcode 用来告诉你文件引用指向不存在内容的方式。\n\n**注意**：导航器区域中的“文件夹”不一定对应你\
  \ Mac 文件系统中的文件夹。这些是 Xcode 内部的逻辑分组，旨在帮助你保持一切井井有条，并在开发应用程序时更快、更轻松地找到所需内容。通常，这些项目文件夹中包含的项目直接存储在项目目录中，但你可以将它们存储在任何地方——甚至根据你的需要存储在项目文件夹之外。Xcode\
  \ 内部的层次结构与文件系统层次结构完全独立，因此，例如在 Xcode 中将文件移出 `Supporting Files` 文件夹并不会改变该文件在硬盘上的位置。\n\
  \n可以使用实用工具面板将分组配置为使用特定的文件系统目录。然而，默认情况下，添加到项目中的新分组与文件系统完全独立，其内容可以存放在任何位置。\n\n###\
  \ 介绍 Xcode 的界面构建器\n\n在项目窗口的项目导航器中，展开 `Hello World` 分组（如果尚未展开），然后选择 `Main.storyboard`\
  \ 文件。完成后，文件将在编辑器窗格中打开，如图 2-16 所示。你应该会看到一个类似全白 iOS 设备居中于纯白色背景上的画面，这为编辑界面提供了一个很好的背景。这就是\
  \ Xcode 的界面构建器（有时称为 IB），你将在此设计应用程序的用户界面。\n\n![9781484202005_Fig02-16.jpg](img/9781484202005_Fig02-16.jpg)\n\
  \n图 2-16。我们在项目导航器中选中 `Main.storyboard`。这将在界面构建器中打开该文件。它看起来是这样的\n\n界面构建器历史悠久。它自 1988\
  \ 年就已存在，并已用于为 NeXTSTEP、OpenStep、OS X 以及现在的 iOS 设备（如 iPhone 和 iPad）开发应用程序。正如我们之前提到的，界面构建器过去是与\
  \ Xcode 一起安装并与其协同工作的独立应用程序。现在，界面构建器已经完全集成到 Xcode 中。\n\n### 文件格式\n\n界面构建器支持几种不同的文件类型。最古老的是使用\
  \ `.nib` 扩展名的二进制格式，其较新版本是使用 `.xib` 扩展名的基于 XML 的格式。这两种格式包含的文档类型完全相同，但 `.xib` 版本作为基于文本的格式具有许多优势，尤其是当你使用任何类型的\
  \ SCM 时。在界面构建器诞生后的前 20 年里，其所有文件都使用 `.nib` 扩展名。因此，大多数开发者习惯将界面构建器文件称为“nib 文件”。无论文件实际使用的扩展名是\
  \ `.xib` 还是 `.nib`，界面构建器文件通常都被称为 nib 文件。事实上，Apple 在其文档中仍使用术语 `nib` 和 `nib file`。\n\
  \n每个 nib 文件可以包含任意数量的对象，但在开发 iOS 项目时，每个 nib 文件通常只包含一个视图（通常是全屏视图）以及与之关联的控制器或其他对象。这使我们能够将应用程序模块化，只在需要显示视图时才加载其\
  \ nib 文件。最终结果是：当我们的应用程序在内存受限的 iOS 设备上运行时，可以节省内存。一个新创建的 iOS 项目包含一个名为 `LaunchScreen.xib`\
  \ 的 nib 文件，其中包含应用程序启动时默认显示的屏幕布局。我们将在本章末尾详细讨论此文件。\n\n界面构建器在过去几年中支持的另一文件格式是“storyboard”。你可以将\
  \ storyboard 视为一种“元 nib 文件”，因为它可以包含多个视图控制器，以及关于它们在应用程序运行时如何相互连接的信息。与 nib 文件一次性加载所有内容不同，storyboard\
  \ 不能包含独立视图，也从不一次性加载所有内容。相反，你在需要时请求加载特定的控制器。Xcode 6 中的 iOS 项目模板都使用 storyboard，因此本书中的所有示例都将从\
  \ storyboard 开始。现在让我们回到界面构建器和 Hello World 应用程序的 `Main.storyboard` 文件（图 2-16）。\n\n\
  ### Storyboard\n\n你现在看到的是用于为 iOS 应用程序构建用户界面的主要工具。现在，假设你想创建一个按钮实例。你可以通过编写代码来创建按钮，但通过从库中拖出按钮并指定其属性来创建界面对象要简单得多，并且在运行时会产生完全相同的结果。\n\
  \n我们当前正在查看的 `Main.storyboard` 文件会在应用程序启动时自动加载（目前无需担心如何加载），因此它是添加构成应用程序用户界面对象的正确位置。当你在界面构建器中创建对象时，它们会在加载该\
  \ storyboard 或 nib 文件时在你的程序中被实例化。在本书中，你将看到许多此过程的示例。\n\n每个 storyboard 都被模块化为一对或多对视图和控制器。视图是你可以直观地看到并在界面构建器中编辑的部分，而控制器是你将编写的应用程序代码，用于在用户与你的应用程序交互时执行操作。控制器是应用程序真正运作的地方。\n\
  \n\n在 IB 中，你经常看到一个由正方形表示的视图，当前的例子也不例外。这个正方形代表 iOS 设备的屏幕（实际上，它代表一个视图控制器——你将在下一章了解这个概念，但这个特定的视图控制器覆盖了设备的整个屏幕，所以它们几乎是一回事）。为什么屏幕是正方形？毕竟，这是一个\
  \ iPhone 项目，而 iPhone 看起来根本不像那样！在 iOS 早期，只有 iPhone 和 iPod touch。支持 iOS 开发的早期版本 Interface\
  \ Builder 展示了一个 iPhone 形状的设计区域，而现在你看到的是一个正方形。当 iPad 出现时，Interface Builder 得到了增强，允许你设计\
  \ iPhone 形状和 iPad 形状的用户界面。为了构建能在两种设备上运行的应用程序（通用应用程序），你需要为 iPhone 和 iPad 分别构建一个故事板（或\
  \ nib 文件）。当处理 iPad 故事板时，Interface Builder 会为你提供一个 iPad 形状的轮廓来进行设计。在 Xcode 6 和 iOS\
  \ 8 中，情况发生了变化。现在，Apple 希望鼓励你构建能够在任意尺寸屏幕上尽可能良好运行的应用程序。不再需要两个故事板，而应该只有一个。当你的应用程序在设备上启动时，它应该根据所遇到的屏幕形状进行自适应（实际上，Apple\
  \ 将这样设计的应用称为**自适应**应用）。所以现在，Interface Builder 为你呈现一个正方形设计区域，以鼓励你不要考虑特定设备的屏幕尺寸。在本书前半部分，你将学习如何设计自适应应用程序，但我们需要先学会走再跑，我们最初的几个示例将针对\
  \ iPhone 和 iPod touch 尺寸的屏幕进行构建。\n\n回到我们的故事板，点击正方形轮廓内的任意位置，你将在其顶部看到一行三个图标，如图 Figure\
  \ 2-16 所示。将鼠标悬停在每个图标上，你会看到弹出提示显示它们的名称：`View Controller`、`First Responder` 和 `Exit`。暂时忽略\
  \ `Exit`，专注于另外两个真正重要的图标。\n\n*   **`View Controller`** 代表一个控制器对象，它与关联的视图一起从文件存储中加载。视图控制器的任务是管理用户在屏幕上看到的内容。一个典型的应用程序有多个视图控制器，每个屏幕一个。编写只有一个屏幕（因此只有一个视图控制器）的应用程序是完全可能的，本书中的许多示例也只有一个视图控制器。\n\
  *   **`First Responder`** 简单来说，是用户当前正在交互的对象。例如，如果用户当前正在文本字段中输入数据，那么该字段就是当前的 `First\
  \ Responder`。`First Responder` 会随着用户与用户界面的交互而改变，而 **`First Responder`** 图标为你提供了一种便捷方式来与当前\
  \ `First Responder` 的任何控件或其他对象通信，而无需编写代码来确定是哪个控件或视图。\n\n从下一章开始，我们将更详细地讨论这些对象，所以如果你现在对何时使用\
  \ `First Responder` 或 `View Controller` 如何加载感到有点模糊，不用担心。\n\n除了这些图标外，你在编辑区域看到的其余部分是可以放置图形对象的空间。但在此之前，关于\
  \ IB 的编辑器区域还有一件事你应该了解：它的层级视图——或者更准确地说，**`Document Outline`**。`Document Outline`\
  \ 如图 Figure 2-17 所示。\n\n![9781484202005_Fig02-17.jpg](img/9781484202005_Fig02-17.jpg)\n\
  \nFigure 2-17. `Document Outline` 包含了故事板中所有内容的有用层级表示\n\n点击编辑区域左下角的小按钮，你会看到 `Document\
  \ Outline` 从左侧滑入。这显示了故事板的所有内容，分为包含相关内容的**场景**。在我们的例子中，只有一个场景，名为 **`View Controller\
  \ Scene`**。你会看到它包含一个名为 `View Controller` 的项，而该项又包含一个名为 **`View`** 的项（以及你稍后将了解的其他一些内容）。这是概览内容的非常便捷的方式。你在主编辑区域看到的所有内容都在这里镜像显示。\n\
  \n**`View`** 图标代表 `UIView` 类的一个实例。`UIView` 对象是用户可以看到和与之交互的区域。在这个应用程序中，我们当前只有一个视图，所以这个图标代表用户在我们的应用程序中可以看到的所有内容。稍后，我们将构建具有多个视图的更复杂的应用程序。现在，只需将这个视图视为用户使用你的应用程序时可以看到的一个对象。\n\
  \n如果你点击 **`View`** 图标，Xcode 会自动高亮我们之前讨论过的正方形屏幕轮廓。这就是你可以以图形方式设计用户界面的地方。\n\n### The\
  \ Library\n\n实用工具视图占据了工作区的右侧，分为两个部分（参见 Figure 2-18）。如果你当前没有看到实用工具视图，请点击工具栏中最右侧的三个\
  \ **`View`** 按钮之一，选择 **`View` ![image](img/arrow.jpg) `Utilities` ![image](img/arrow.jpg)\
  \ `Show Utilities`**，或按下 ![image](img/sym3.jpg)![image](img/flower.jpg) **`0`**（`Option-Command-Zero`）。\n\
  \n![9781484202005_Fig02-18.jpg](img/9781484202005_Fig02-18.jpg)\n\nFigure 2-18.\
  \ 库是你找到 UIKit 中可用于 Interface Builder 的现成对象的地方。库上方但位于工具栏下方的所有内容统称为检查器\n\n实用工具视图的下半部分被称为\
  \ **`Library Pane`**，或简称为 **`Library`**。`Library` 是可以在你自己的程序中使用的可重用项目的集合。库窗格顶部栏中的四个图标将其分为四个部分：\n\
  \n*   **`File Template Library`**：此部分包含一组文件模板，当需要向项目添加新文件时可以使用。例如，如果要向项目添加新文件，一种方法是从\
  \ `File Template Library` 中拖入所需类型的文件。\n*   **`Code Snippet Library`**：此部分包含一组代码片段，你可以将其拖入源代码文件中。记不住\
  \ Objective-C 快速枚举的语法？没关系——只需将该特定片段从库中拖出，你就不需要去查了。你是否编写了一些你认为以后可能会再次使用的内容？在文本编辑器中选中它，然后将其拖到\
  \ `Code Snippet Library` 中。\n*   **`Object Library`**：此部分充满了可重用对象，例如文本字段、标签、滑块、按钮以及设计\
  \ iOS 界面所需的几乎所有对象。在本书中，我们将大量使用 `Object Library` 来构建示例程序的界面。\n*   **`Media Library`**：顾名思义，此部分用于所有媒体文件，包括图片、声音和电影。\n\
  \n**注意** `Object Library` 中的项目主要来自 iOS UIKit，这是一个用于创建应用用户界面的对象框架。`UIKit` 在 Cocoa\
  \ Touch 中的作用与 `AppKit` 在 Cocoa 中的作用相同。这两个框架在概念上相似；然而，由于平台的差异，它们之间显然存在许多不同之处。另一方面，Foundation\
  \ 框架类，如 `NSString` 和 `NSArray`，在 Cocoa 和 Cocoa Touch 中是共享的。\n\n\n\n## 排版后的内容\n\n\
  请注意库底部的搜索字段。想找一个按钮吗？在搜索字段中输入`button`，当前库将仅显示名称中包含“button”的条目。完成搜索后，别忘了清除搜索字段。\n\n\
  ### 向视图中添加标签\n\n让我们尝试一下 Interface Builder。点击库顶部的**对象库**图标（看起来像一个中心有正方形的圆形——你可以在图\
  \ 2-18 中看到它），打开对象库。纯粹为了好玩，滚动库找到**表格视图**。没错——继续滚动，你就会找到它。或者等等！有更好的方法：只需在搜索字段中输入`Table\
  \ View`。是不是简单多了？\n\n**提示** 这里有一个便捷的快捷键：按下`^`![image](img/sym2.jpg)![image](img/flower.jpg)`3`即可跳转到搜索字段并高亮其内容。接下来，你只需输入要搜索的内容即可。\n\
  \n现在在库中找到一个**标签**。接着，将标签拖到我们之前看到的视图上。（如果你在编辑器窗格中没有看到该视图，请点击 Interface Builder 文档大纲中的**视图**图标。）当你的光标移动到视图上时，它会变成你在\
  \ Finder 中熟悉的、标准的“我正在复制东西”绿色加号。将标签拖到视图中央。当标签居中时，会显示一对蓝色参考线——一条垂直，一条水平。标签是否居中并不重要，但知道有这些参考线是件好事。图\
  \ 2-19 显示了我们在松开拖拽前的工作区样子。\n\n![9781484202005_Fig02-19.jpg](img/9781484202005_Fig02-19.jpg)\n\
  \n图 2-19。我们从库中找到一个标签并将其拖到了视图上。请注意，我们在库搜索字段中输入了`Label`，以将对象列表限制为包含`Label`一词的那些元素。\n\
  \n用户界面项按层次结构存储。大多数视图可以包含**子视图**；然而，有些视图（如按钮和大多数其他控件）不能包含子视图。Interface Builder 是智能的。如果一个对象不接受子视图，你将无法将其他对象拖到它上面。\n\
  \n通过直接将标签拖到我们正在编辑的视图上，我们将其添加为该主视图（名为**视图**的视图）的子视图，这将在该视图显示给用户时自动显示。将库中的标签拖到名为**视图**的视图上，会添加一个`UILabel`实例作为我们应用程序主视图的子视图。\n\
  \n让我们编辑标签，使其显示一些有意义的内容。双击你刚刚创建的标签，然后输入文本**Hello, World!**。接下来，点击标签外部，然后重新选中它并拖动标签，使其重新居中或将其放置到你希望它在屏幕上出现的任意位置。\n\
  \n猜猜看？一旦保存，我们就完成了。选择**文件**![image](img/arrow.jpg)`保存`，或按下![image](img/flower.jpg)`S`。现在查看\
  \ Xcode 项目窗口左上角的弹出菜单。这实际上是一个多段弹出控件。左侧让你选择不同的编译目标并执行一些其他操作，但我们感兴趣的是右侧，它让你选择要在哪个设备上运行。点击右侧，你会看到一个可用设备列表。在顶部，如果你插入了任何\
  \ iOS 设备并准备就绪，你会看到它列出。否则，你只会看到一个通用的**iOS 设备**条目。在该条目下方，你会看到一个由**iOS 模拟器**引领的完整部分，列出了所有可以与\
  \ iOS 模拟器一起使用的设备类型。从该下部区域中，选择**iPhone 5s**，这样我们的应用程序将在模拟器中运行，配置成如同 iPhone 5s 一样。如果你已是苹果付费的\
  \ iOS 开发者计划成员，你可以尝试在自己的设备上运行应用程序。在本书中，我们将尽可能使用模拟器，因为在模拟器中运行不需要任何付费会员资格。\n\n准备好运行了吗？选择**产品**![image](img/arrow.jpg)`运行`或按下![image](img/flower.jpg)`R`。Xcode\
  \ 将编译你的应用程序并在 iOS 模拟器中启动它（参见图 2-20）。\n\n![9781484202005_Fig02-20.jpg](img/9781484202005_Fig02-20.jpg)\n\
  \n图 2-20。这就是在全屏 iPhone 中显示的 Hello World 程序！但似乎有些不对劲……\n\n**注意** 如果在构建和运行时你的 iOS\
  \ 设备已连接到 Mac，情况可能不会完全按计划进行。简而言之，为了能够在你的 iPhone、iPad 或 iPod touch 上构建和运行应用程序，你必须注册并付费加入苹果的\
  \ iOS 开发者计划之一，然后经历正确配置 Xcode 的过程。加入计划后，苹果会向你发送完成此操作所需的信息。同时，本书中的大部分程序都可以使用 iPhone\
  \ 或 iPad 模拟器正常运行。\n\n嗯，这不太对。标签在 Interface Builder 中是居中的，但在模拟器上，它却远远偏右。哪里出错了？当你放置一个视图时，除非你另有说明，Interface\
  \ Builder 会假定你将其定位在相对于你放置它的视图的左上角。问题在于我们放置标签的视图比运行应用程序的模拟 iPhone 屏幕更宽。当我们在 Interface\
  \ Builder 中居中标签时，我们并没有在我们用于测试应用程序的屏幕上居中它。这是一个你会一直面临的问题——你的应用程序最终运行的设备屏幕可能与你在 Interface\
  \ Builder 中使用的设计界面尺寸不同。正如我们之前所说，这是有意为之——苹果希望你尽可能在抽象的方形视图上进行设计，并让你的屏幕布局适应它们在运行时遇到的屏幕。\n\
  \n那么如何解决这个问题呢？早在 iOS 6 中，苹果就添加了一项名为**自动布局**的技术，它允许你为设计中的视图添加**约束**，这些约束表达了视图应如何改变位置和/或大小，以适应屏幕上实际可用的空间。你将从下一章开始看到如何使用\
  \ Interface Builder 配置自动布局约束，但眼下，让我们采取一个更简单的方法——我们将更改作为设计基础的方形视图，使其看起来更像我们实际运行应用程序的\
  \ iPhone 模拟器。为此，在项目导航器中选中`Main.storyboard`，然后点击工具区顶部的检查器选择窗格中的**文件检查器**图标，如图 2-21\
  \ 所示。\n\n![9781484202005_Fig02-21.jpg](img/9781484202005_Fig02-21.jpg)\n\n\n\n图\
  \ 2-21 为 iPhone 重新配置故事板\n\n在“文件检查器”面板的底部附近，你会看到两个复选框，分别标有 `使用自动布局` 和 `使用尺寸类别`，这两个复选框都处于选中状态。点击\
  \ `使用尺寸类别` 复选框取消选择。执行此操作时，Xcode 会提示你确认，并询问是否要保留 iPhone 或 iPad 的尺寸类别数据。选择保留 iPhone\
  \ 的尺寸类别数据，然后点击 `禁用尺寸类别`。随即，编辑器区域中的屏幕轮廓会调整大小，看起来像一部 iPhone（参见图 2-22），并且你可以清楚地看到为什么你的标签没有出现在正确的位置。\n\
  \n![9781484202005_Fig02-22.jpg](img/9781484202005_Fig02-22.jpg)\n\n图 2-22 禁用尺寸类别并为\
  \ iPhone 配置的故事板编辑器\n\n现在将标签拖回中心位置，再次运行应用程序——这一次，标签应该出现在你期望的位置（图 2-23）。\n\n![9781484202005_Fig02-23.jpg](img/9781484202005_Fig02-23.jpg)\n\
  \n图 2-23 按计划运行的 Hello World 应用程序\n\n欣赏完你的作品后，可以返回 Xcode。Xcode 和模拟器是独立的应用程序。等等，就这样吗？但我们没有编写任何代码。没错。\n\
  \n挺不错的，对吧？\n\n那么，如果我们想更改标签的一些属性，比如文本大小或颜色呢？我们需要编写代码来实现，对吧？不用。让我们来看看修改起来有多简单。\n\n\
  ### 更改属性\n\n返回 Xcode，单击 `Hello World` 标签以将其选中。现在将注意力转向库面板上方的区域。实用工具面板的这一部分称为 `检查器`。正如你在图\
  \ 2-21 中看到的，检查器面板顶部有一系列图标，每个图标都会将检查器更改为查看特定类型的数据。要更改标签的属性，我们需要左起第四个图标，它会调出属性检查器（参见图\
  \ 2-24）。\n\n![9781484202005_Fig02-24.jpg](img/9781484202005_Fig02-24.jpg)\n\n图 2-24\
  \ 显示标签属性的对象属性检查器\n\n**提示**  `检查器` 与项目导航器一样，其每个图标都有对应的键盘快捷键。检查器的键盘快捷键从左起第一个图标开始是\
  \ `![image](img/sym2.jpg)![image](img/flower.jpg)1`，下一个图标是 `![image](img/sym2.jpg)![image](img/flower.jpg)2`，以此类推。与项目导航器不同，检查器中图标的数量是上下文相关的，会随着导航器和/或编辑器中选中的对象而变化。\n\
  \n现在，随心所欲地更改标签的外观吧。可以自由尝试调整文本的字体、大小和颜色。请注意，如果增大字号，可能需要调整标签本身的大小，以便为更大的文本腾出空间。调整完毕后，保存文件并再次点击\
