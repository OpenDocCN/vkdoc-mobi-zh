  \ Xcode 6 的知识，开始使用 Interface Builder，并学会了如何设置应用程序图标。\n\n然而，Hello World 程序是一个严格意义上的单向应用程序。我们向用户展示了一些信息，但从未从他们那里获得任何输入。当您准备好了解如何从\
  \ iOS 设备用户获取输入并根据该输入采取行动时，请深吸一口气，然后翻到下一页。\n\n第 3 章\n\n处理基本交互\n\n\n\n## 我们的 Hello\
  \ World 应用\n\n我们的 Hello World 应用是使用 Cocoa Touch 进行 iOS 开发的一个良好入门，但它缺少一个关键能力——与用户交互的能力。没有这一能力，我们的应用在功能上会受到严重限制。\n\
  \n在本章中，我们将编写一个稍微复杂一些的应用——它将包含两个按钮和一个标签（见图 3-1）。当用户点击任一按钮时，标签的文本会发生变化。这看起来可能是一个相当简单的例子，但它展示了创建交互式\
  \ iOS 应用所涉及的关键概念。为了增加趣味性，我们还将向你介绍 `NSAttributedString` 类，它允许你在许多 Cocoa Touch GUI\
  \ 元素中使用样式文本。\n\n![9781484202005_Fig03-01.jpg](img/9781484202005_Fig03-01.jpg)\n\n\
  图 3-1. 我们将在本章中构建的简单双按钮应用\n\n### 模型-视图-控制器范式\n\n在深入之前，我们先来了解一些理论。Cocoa Touch 的设计者遵循了一个名为**模型-视图-控制器**（MVC）的概念，这是一种将构成\
  \ GUI 应用的代码进行逻辑划分的方法。如今，几乎所有面向对象的框架都在一定程度上借鉴了 MVC，但很少有框架能像 Cocoa Touch 那样忠实于 MVC\
  \ 模型。\n\nMVC 模式将所有功能分为三个不同的类别：\n\n*   **模型**：持有应用数据的类。\n*   **视图**：由窗口、控件和其他用户可以看到并与之交互的元素组成。\n\
  *   **控制器**：将模型和视图结合起来的代码。它包含决定如何处理用户输入的应用逻辑。\n\nMVC 的目标是尽可能让实现这三类代码的对象彼此区分开。你创建的任何对象都应能轻易识别为属于三个类别之一，并且很少或没有可归类为其他两个类别的功能。例如，实现按钮的对象不应包含处理该按钮点击时数据的代码，而银行账户的实现也不应包含绘制表格以显示其交易记录的代码。\n\
  \nMVC 有助于确保最大的可重用性。实现通用按钮的类可以在任何应用中使用。而实现一个点击时执行特定计算的按钮的类，则只能在其最初编写的应用中使用。\n\n当你编写\
  \ Cocoa Touch 应用时，你将主要使用 Interface Builder 创建视图组件，尽管你也会通过代码修改，甚至有时创建用户界面。\n\n你的模型将通过编写\
  \ Objective-C 类来持有应用数据，或使用名为 Core Data 的工具构建数据模型来创建，你将在第 13 章中了解这一点。在本章的应用中，我们不会创建任何模型对象，因为我们不需要存储或保留数据。不过，在后续章节中，随着应用变得越来越复杂，我们将引入模型对象。\n\
  \n你的控制器组件通常由你创建且特定于应用的自定义类组成。控制器可以是完全自定义的类（`NSObject` 的子类），但更多时候，它们会是 UIKit 框架中几个现有通用控制器类的子类，例如\
  \ `UIViewController`（你很快就会看到）。通过继承这些现有类之一，你可以免费获得大量功能，而不必浪费时间重新发明轮子。\n\n随着我们深入 Cocoa\
  \ Touch，你会很快看到 UIKit 框架的类是如何遵循 MVC 原则的。如果在开发过程中牢记这一概念，你将最终创建出更干净、更易于维护的代码。\n\n###\
  \ 创建我们的项目\n\n现在是时候创建我们的下一个 Xcode 项目了。我们将使用与上一章相同的模板：单视图应用。通过再次从这个简单模板开始，你将更容易理解视图和控制器对象如何在\
  \ iOS 应用中协同工作。我们将在后续章节中使用其他一些模板。\n\n启动 Xcode 并选择 **File** ![image](img/arrow.jpg)\
  \ **New** ![image](img/arrow.jpg) **Project...** 或按下 ![image](img/flower.jpg)**N**。选择\
  \ **Single View Application** 模板，然后点击 **Next**。\n\n你将看到与上一章相同的选项表。在 **Product Name**\
  \ 字段中，输入我们新应用的名称 **Button Fun**。**Organization Name**、**Company Identifier** 和 **Language**\
  \ 字段应仍保留上一章使用的值（*Apress*、*com.apress* 和 *Objective-C*），因此你可以保持它们不变。在本章中，我们将使用 Auto\
  \ Layout 创建一个可在所有 iOS 设备上运行的应用，因此在 **Devices** 字段中选择 **Universal**。图 3-2 显示了完成后的选项表。\n\
  \n![9781484202005_Fig03-02.jpg](img/9781484202005_Fig03-02.jpg)\n\n图 3-2. 命名项目并选择选项\n\
  \n点击 **Next**，系统会提示你选择项目的位置。你可以根据需要选中或取消选中 **Create Git repository** 复选框。按 **Create**\
  \ 并将项目与其他本书项目保存在一起。\n\n### 查看视图控制器\n\n在本章稍后的部分，我们将像上一章一样使用 Interface Builder 为我们的应用设计一个视图（或用户界面）。在此之前，我们将查看并对为我们创建的源代码文件进行一些修改。没错，在本章中我们真的会编写一些代码。\n\
  \n在进行任何修改之前，让我们看看为我们创建的文件。在项目导航器中，**Button Fun** 组应该已经展开；但如果没有，请点击其旁边的展开三角形（见图 3-3）。\n\
  \n![9781484202005_Fig03-03.jpg](img/9781484202005_Fig03-03.jpg)\n\n图 3-3. 项目导航器显示项目模板为我们创建的类文件\n\
  \n**Button Fun** 文件夹应包含四个源代码文件（以 `.h` 或 `.m` 结尾的文件），以及一个故事板文件、一个启动屏幕文件和一个用于存放应用所需任何图片的资源目录。这四个源代码文件实现了我们的应用所需的两个类：应用委托和视图控制器（用于应用唯一的视图）。\n\
  \n我们将在本章稍后部分查看应用委托。首先，我们将处理为我们创建的视图控制器类。\n\n名为 `ViewController` 的控制器类负责管理我们应用的视图。这个名称表明该类是一个视图控制器。在项目导航器中点击\
  \ `ViewController.h`，查看该类头文件的内容：\n\n```\n#import <UIKit/UIKit.h>\n\n@interface ViewController\
  \ : UIViewController\n\n@end\n```\n\n内容不多，对吧？`ViewController` 是 `UIViewController`\
  \ 的子类，后者是我们之前提到的通用控制器类之一。它是 UIKit 框架的一部分，通过继承这个类，我们可以免费获得大量功能。Xcode 不知道我们的应用特定功能是什么，但它知道我们会有一些，因此它创建了这个类供我们编写这些应用特定功能。\n\
  \n### 理解输出口和动作\n\n\n\n在 Chapter 2 中，您使用 Xcode 的 Interface Builder 设计了一个简单的用户界面。刚才，您看到了一个视图控制器类的框架。这个视图控制器类中的代码必须以某种方式与故事板中的对象进行交互，对吗？\n\
  \n当然可以！控制器类可以通过一种称为**出口**的特殊属性来引用故事板或 nib 文件中的对象。可以将出口视为指向用户界面中某个对象的指针。例如，假设您在 Interface\
  \ Builder 中创建了一个文本标签（正如我们在 Chapter 2 中所做的那样），并希望从代码中更改该标签的文本。通过声明一个出口并将该出口连接到标签对象，您就可以在代码中使用该出口来更改标签显示的文本。您将在本章中了解如何实现这一点。\n\
  \n相反方向，故事板或 nib 文件中的界面对象可以设置为触发控制器类中的特殊方法。这些特殊方法称为**动作方法**（或简称**动作**）。例如，您可以告诉 Interface\
  \ Builder，当用户点击按钮时，应调用代码中的特定动作方法。您甚至可以告诉 Interface Builder，当用户首次触摸按钮时，调用一个动作方法；然后，当手指从按钮上抬起时，调用另一个不同的动作方法。\n\
  \nXcode 支持多种创建出口和动作的方式。一种方式是在源代码中指定它们，然后再使用 Interface Builder 将它们与代码连接。Xcode 的助理视图提供了一种更快、更直观的方法，让您可以在一步中创建并连接出口和动作，我们稍后将探讨这一过程。但在开始建立连接之前，让我们更详细地讨论一下出口和动作。出口和动作是您创建\
  \ iOS 应用时最基础的两个构建块，因此理解它们是什么以及如何工作非常重要。\n\n#### 出口\n\n出口是使用关键字`IBOutlet`声明的特殊 Objective-C\
  \ 类属性。声明出口可以在控制器的类头文件中进行，也可以在控制器实现文件的一个特殊部分（称为**类扩展**）中进行。它可能看起来像这样：\n\n```\n@property\
  \ (weak, nonatomic) IBOutlet UIButton *myButton;\n```\n\n这个例子是一个名为`myButton`的出口，它可以被设置为指向用户界面中的任何按钮。\n\
  \n`IBOutlet`关键字并非 Objective-C 语言的内置部分。它是系统头文件中的一个简单 C 预处理器定义，看起来像这样：\n\n```\n#ifndef\
  \ IBOutlet\n#define IBOutlet\n#endif\n```\n\n感到困惑吗？`IBOutlet`对编译器而言绝对不做任何事。它的唯一目的是作为一个提示，告诉\
  \ Xcode 这是一个我们想要连接到故事板或 nib 文件中对象的属性。您创建并希望连接到故事板或 nib 文件中对象的任何属性，都必须以`IBOutlet`关键字开头。幸运的是，Xcode\
  \ 现在会自动为我们创建出口。\n\n##### 出口的变更\n\n随着时间的推移，Apple 改变了出口的声明和使用方式。由于您可能在某时遇到旧代码，让我们看看出口是如何变化的。\n\
  \n在本书的第一版中，我们为出口同时声明了属性及其底层实例变量。那时，属性是 Objective-C 语言中的一个新结构，它们要求您声明一个对应的实例变量：\n\
  \n```\n@interface MyViewController : UIViewController\n{\n    UIButton *myButton;\n\
  }\n@property (weak, nonatomic) UIButton *myButton;\n@end\n```\n\n当时，我们将`IBOutlet`关键字放在实例变量声明之前：\n\
  \n```\nIBOutlet UIButton *myButton;\n```\n\n这是当时 Apple 示例代码的写法。这也是`IBOutlet`关键字在\
  \ Cocoa 和 NeXTSTEP 中的传统用法。\n\n到了我们编写本书第二版时，Apple 已经不再将`IBOutlet`关键字放在实例变量之前，而是标准做法是将其放在属性声明中：\n\
  \n```\n@property (weak, nonatomic) IBOutlet UIButton *myButton;\n```\n\n尽管这两种方法仍然有效（并且现在仍然有效），但我们遵循了\
  \ Apple 的指导，修改了书中的代码，使`IBOutlet`关键字位于属性声明而非实例变量声明中。\n\n当 Apple 最近将默认编译器从 GNU C 编译器（GCC）切换到低级虚拟机（LLVM）时，为属性声明实例变量变得不再必要。如果\
  \ LLVM 发现一个没有匹配实例变量的属性，它会自动创建一个。因此，在本书的这个版本中，我们完全停止为出口声明实例变量。\n\n所有这些方法都做完全相同的事情，即告诉\
  \ Interface Builder 出口的存在。将`IBOutlet`关键字放在属性声明上是 Apple 当前的推荐做法，因此我们将使用这种方式。但我们希望让您了解这段历史，以防您遇到旧代码在实例变量上放置`IBOutlet`关键字的情况。\n\
  \n您可以在 Scott Knaster、Waqar Malik 和 Mark Dalrymple 所著的*Learn Objective-C on the Mac*（Apress，2012）以及\
  \ Apple 开发者网站上的文档*Introduction to the Objective-C Programming Language*（位于`http://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/ProgrammingWithObjectiveC`）中了解更多关于\
  \ Objective-C 属性的信息。\n\n#### 动作\n\n简而言之，动作是使用特殊返回类型`IBAction`声明的方法，它告诉 Interface\
  \ Builder 此方法可以由故事板或 nib 文件中的控件触发。动作方法的声明通常如下所示：\n\n```\n- (IBAction)doSomething:(id)sender;\n\
  ```\n\n它也可能看起来像这样：\n\n```\n- (IBAction)doSomething;\n```\n\n方法的具体名称可以是任何内容，但返回类型必须为`IBAction`，这与声明返回类型为`void`是一样的。`void`返回类型用于指定方法不返回值。此外，该方法要么不接收参数，要么接收一个参数，通常称为`sender`。当动作方法被调用时，`sender`将包含调用它的对象的指针。例如，如果该动作方法是在用户点击按钮时触发的，那么`sender`将指向被点击的按钮。`sender`参数的存在使您能够使用单个动作方法响应多个控件。它为您提供了一种识别哪个控件调用了该动作方法的方式。\n\
  \n**提示** 实际上还有第三种不太常用的`IBAction`声明类型，如下所示：\n\n```\n- (IBAction)doSomething:(id)sender\n\
  \                   forEvent:(UIEvent *)event;\n```\n\n我们将在下一章开始讨论控件事件。\n\n如果您用`sender`参数声明一个动作方法然后忽略它，这并不会造成任何问题。您很可能会看到大量代码正是这样做的。Cocoa\
  \ 和 NeXTSTEP 中的动作方法无论是否使用`sender`，都需要接受它，因此很多 iOS 代码，尤其是早期的 iOS 代码，都是这样编写的。\n\n\
  现在您已经理解了动作和出口是什么，您将在设计用户界面时看到它们如何工作。然而，在开始设计之前，我们还有一项快速的内务处理要做，以保持一切整洁有序。\n\n###\
  \ 清理视图控制器\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n译文如下：\n\n\n\
  在 Project Navigator 中单击 `ViewController.m` 即可打开实现文件。如你所见，里面包含少量样板代码，即项目模板提供的 `viewDidLoad`\
  \ 和 `didReceiveMemoryWarning` 方法。这些方法在 `UIViewController` 子类中很常用，因此 Xcode 为我们生成了它们的存根实现。如果需要使用这些方法，我们只需在其中添加自己的代码即可。但在这个项目中，我们不需要这两个存根实现，它们只会占用空间并增加代码阅读难度。我们将为自己未来的开发工作着想，清除不需要的方法，所以请继续删除这些方法。\n\
  \n在文件顶部，你还会看到一个可供使用的空类扩展。类扩展是一种特殊的 Objective-C 类别声明，允许你在同一文件中声明仅可在类的主实现块内使用的方法和属性。我们将使用类扩展来存放视图控制器的\
  \ Outlet。这是 iOS 应用中常见的模式。我们将 Outlet 放在类扩展中，是因为它们不需要对视图控制器之外的代码可见。相比之下，需要被其他类使用的属性和方法应声明在\
  \ `ViewController.h` 中。完成后，你的实现文件应如下所示：\n\n```\n#import \"ViewController.h\"\n\n\
  @interface ViewController ()\n\n@end\n\n@implementation ViewController\n\n@end\n\
  ```\n\n这样简洁多了，对吧？不必担心刚才删除的那些方法，你将在本书后续部分了解它们的作用及用法。\n\n### 设计用户界面\n\n确保保存了刚才的更改，然后单击\
  \ `Main.storyboard` 以在 Xcode 的 Interface Builder 中打开应用的视图（见图 3-4）。如上一章所述，编辑器中显示的白**色窗口**代表应用的唯一视图。回顾图\
  \ 3-1，可以看到我们需要向此视图添加两个按钮和一个标签。\n\n![9781484202005_Fig03-04.jpg](img/9781484202005_Fig03-04.jpg)\n\
  \n图 3-4. 在 Xcode 的 Interface Builder 中打开 `Main.storyboard` 进行编辑\n\n让我们花点时间思考一下应用的设计。我们将向用户界面添加两个按钮和一个标签，这个过程与上一章非常相似。不过，我们还需要\
  \ Outlet 和 Action 来使应用具有交互性。\n\n每个按钮都需要触发控制器上的一个 Action 方法。我们可以让每个按钮调用不同的 Action\
  \ 方法；但由于它们执行的任务本质相同（更新标签的文本），因此我们将调用同一个 Action 方法。我们将使用之前讨论过的 `sender` 参数来区分这两个按钮。除了\
  \ Action 方法之外，我们还需要一个连接到标签的 Outlet，以便更改标签显示的文本。\n\n我们先添加按钮，再放置标签。在设计界面时，我们将创建相应的\
  \ Action 和 Outlet。当然，我们也可以手动声明 Action 和 Outlet，然后将用户界面元素连接到它们，但当 Xcode 能替我们完成时，何必多此一举呢？\n\
  \n#### 添加按钮和 Action 方法\n\n我们的首要任务是向用户界面添加两个按钮。然后我们将让 Xcode 为我们创建一个空的 Action 方法，并将两个按钮都连接到该方法。当用户点击按钮时，该方法中的任何代码都将被执行。\n\
  \n选择 **View** → **Utilities** → **Show Object Library**，或按 **⌃⌘3** 以打开对象库。在对象库的搜索框中输入\
  \ **UIButton**（实际上只需输入前四个字符 **uibu** 即可缩小列表范围——并且你可以全部使用小写字母，省去按 Shift 键的麻烦）。输入完成后，对象库中应只显示一个项目：Button（按钮）（见图\
  \ 3-5）。\n\n![9781484202005_Fig03-05.jpg](img/9781484202005_Fig03-05.jpg)\n\n图 3-5.\
  \ 对象库中显示的 Button\n\n将 Button 从库中拖出并放到编辑区内的白色窗口上，这将向应用的视图中添加一个按钮。使用出现的蓝色参考线将按钮放置在视图左侧，与左边缘保持适当距离。对于垂直位置，使用蓝色参考线将按钮放置在视图中间位置。如有需要，可以参考图\
  \ 3-1 作为放置指南。\n\n**注意**：在 Interface Builder 中移动对象时出现的小蓝线，是为了帮助你遵循《iOS 人机界面指南》（通常称为\
  \ **HIG**）。Apple 为 iPhone 和 iPad 应用的设计者提供了 HIG。HIG 告诉你应该如何（以及不应该如何）设计用户界面。你真的应该阅读它，因为它包含每个\
  \ iOS 开发者都需要了解的宝贵信息。你可以在 `http://developer.apple.com/library/ios/documentation/UserExperience/Conceptual/MobileHIG/`\
  \ 找到它。\n\n双击刚刚添加的按钮，以便编辑按钮的标题。将此按钮的标题设置为“Left”。\n\n现在，是时候施展 Xcode 的魔法了。选择 **View**\
  \ → **Assistant Editor** → **Show Assistant Editor**，或按 **⌥⌘** 以打开 Assistant Editor。你也可以通过点击项目窗口右上角七个按钮组中间的编辑器按钮（见图\
  \ 3-6）来显示或隐藏 Assistant Editor。\n\n![9781484202005_Fig03-06.jpg](img/9781484202005_Fig03-06.jpg)\n\
  \n图 3-6. 显示 Assistant Editor 的切换按钮\n\nAssistant Editor 将出现在编辑窗格的右侧。左侧将继续显示 Interface\
  \ Builder，而右侧将显示 `ViewController.h` 或 `ViewController.m`，即“拥有”你当前查看视图的视图控制器的头文件和实现文件。\n\
  \n**提示**：打开 Assistant Editor 后，你可能需要调整窗口大小以获得足够的操作空间。如果你使用的是较小屏幕（例如 MacBook Air\
  \ 的屏幕），可能需要关闭工具区（Utility View）和/或项目导航器（Project Navigator），以便为有效使用 Assistant Editor\
  \ 腾出空间。你可以通过项目窗口右上角的三个视图按钮（见图 3-6）轻松完成此操作。\n\n\n\nXcode 知道我们的视图控制器类负责在 storyboard\
  \ 中显示视图，因此助理编辑器会自动显示该视图控制器类的实现文件——这是我们最可能需要连接操作和插座变量的地方。不过，如果它没有显示你想要查看的文件，你可以使用助理编辑器顶部的跳转栏进行调整。首先，找到跳转栏中标有**自动**的段落并点击它。在弹出的菜单中选择**手动**\
  \ ![image](img/arrow.jpg) **按钮乐趣** ![image](img/arrow.jpg) **按钮乐趣** ![image](img/arrow.jpg)\
  \ **ViewController.m**。现在你应该看到正确的文件了。\n\n正如之前所见，`ViewController` 类中其实没有太多内容。它只是一个空的\
  \ `UIViewController` 子类。但它很快就会不再是空的子类了！\n\n现在，我们将让 Xcode 自动为我们创建一个新的操作方法，并将该操作与我们刚刚创建的按钮关联起来。我们要将这些定义添加到视图控制器的类扩展中。为此，首先点击你在\
  \ storyboard 中添加的按钮，使其处于选中状态。然后，按住键盘上的 **Control** 键，从按钮上点击并拖拽到助理编辑器中的源代码处。你应该会看到一条从按钮延伸到光标的蓝线（参见图\
  \ 3-7）。这条蓝线就是我们如何将 IB 中的对象连接到代码或其他对象的方法。\n\n![9781484202005_Fig03-07.jpg](img/9781484202005_Fig03-07.jpg)\n\
  \n图 3-7. 按住 Control 键拖拽到源代码，将提供创建操作的选项\n\n如果你将光标移动到类实现中（即 `@implementation` 和 `@end`\
  \ 关键字之间——参见图 3-7），会出现一个灰色弹出窗口，提示你释放鼠标按钮将为你插入一个操作。\n\n**注意** 我们在本章中使用操作和插座变量，并在本书后续章节中使用插座集合。插座集合允许你将多个同类型对象连接到一个\
  \ `NSArray` 属性上，而无需为每个对象创建单独的属性。\n\n要完成这个连接，请松开鼠标按钮，这时会出现一个浮动弹出窗口，如图 图 3-8 所示。这个窗口允许你自定义新的操作。\n\
  \n![9781484202005_Fig03-08.jpg](img/9781484202005_Fig03-08.jpg)\n\n图 3-8. 按住 Control\
  \ 键拖拽到源代码后出现的浮动弹出窗口\n\n在 **名称** 字段中，输入 **buttonPressed**。完成后，*不要*按 **Return** 键。按\
  \ **Return** 会确认我们的插座变量，但我们还没准备好那样做。相反，请按 **Tab** 键移动到 **类型** 字段，并输入 **UIButton**，替换默认的\
  \ `id` 值。\n\n**注意** 你可能还记得，*id* 是一个通用指针，可以指向任何 Objective-C 对象。我们可以保留 `id`，它也能正常工作；但如果我们将它改为我们预期调用该方法的类，那么当我们尝试从错误类型的对象调用时，编译器会发出警告。有时你可能需要灵活性，以便从不同类型的控件调用同一个操作方法，在这些情况下，你应将其保留为\
  \ `id`。在我们的例子中，我们只打算从按钮调用这个方法，所以我们让 Xcode 和编译器知道这一点。这样，如果我们无意中尝试连接其他东西，它们会警告我们。\n\
  \n**类型** 下方还有两个字段，我们将保留它们的默认值。**事件** 字段让你指定方法被调用的时机。默认值 **Touch Up Inside** 在用户从屏幕上抬起手指时触发——当且仅当手指仍然在按钮上时。这是按钮的标准事件。这给了用户重新考虑的机会。如果用户在抬起手指前将手指移出按钮，该方法将不会被触发。\n\
  \n**参数** 字段让你在可用于操作方法的三种不同方法签名之间进行选择。我们需要 `sender` 参数，以便分辨是哪个按钮调用了该方法。这是默认设置，所以我们保持原样。此时，弹出窗口应该与图\
  \ 3-9 中的一样。\n\n![9781484202005_Fig03-09.jpg](img/9781484202005_Fig03-09.jpg)\n\n\
  图 3-9. 完成的操作弹出窗口\n\n按 **Return** 键或点击 **连接** 按钮，Xcode 将为你插入操作方法。`ViewController.m`\
  \ 文件现在应该看起来像这样：\n\n```\n@interface ViewController ()\n\n@end\n\n@implementation\
  \ ViewController\n\n- (IBAction)buttonPressed:(UIButton *)sender {\n}\n\n@end\n\
  ```\n\n稍后，我们将回到这里编写用户点击任一按钮时需要运行的代码。\n\n除了创建方法存根，Xcode 还将该按钮连接到了该方法，并将该信息存储在了 storyboard\
  \ 中。这意味着我们无需再做任何其他操作，就能让该按钮在应用程序运行时调用此方法。\n\n回到 `Main.storyboard`，拖出另一个按钮，这次将按钮放置在屏幕的右侧。蓝色参考线会出现，帮助你将其与右边界对齐，就像你之前看到的那样，同时它们还会帮助你与另一个按钮垂直对齐。放置按钮后，双击它并将其名称改为\
  \ *Right*。\n\n**提示** 除了从库中拖出新对象，你也可以按住 `![image](img/sym2.jpg)` 键（**Option** 键）并拖出原始对象（本例中是\
  \ **Left** 按钮）的副本。按住 `![image](img/sym2.jpg)` 键会告诉 Interface Builder 复制你拖动的对象。\n\
  \n这次，我们不想创建新的操作方法。相反，我们希望将这个按钮连接到 Xcode 刚才为我们创建的现有操作方法上。怎么做呢？操作方法基本上和第一个按钮一样。\n\n\
  更改按钮名称后，按住 Control 键点击它，并向助理编辑器中的代码拖拽。拖向 `buttonPressed:` 方法的声明处。这次，当你的光标靠近 `buttonPressed:`\
  \ 时，该方法应该会高亮显示，并且你会看到一个灰色的弹出窗口，上面写着 **Connect Action**（参见图 3-10）。看到这个弹出窗口时，松开鼠标按钮，Xcode\
  \ 就会将该按钮连接到操作方法上。这将导致该按钮在被点击时触发与另一个按钮相同的操作方法。\n\n![9781484202005_Fig03-10.jpg](img/9781484202005_Fig03-10.jpg)\n\
  \n图 3-10. 拖拽到现有操作会将按钮连接到现有操作\n\n#### 添加标签和插座变量\n\n在对象库中，在搜索字段中输入 *Label* 以找到 *Label*\
  \ 用户界面项（*参见* 图 3-11）。将 *Label* 拖拽到你的用户界面中，位于之前放置的两个按钮上方某处。放置后，使用调整大小手柄将标签从左边界拉伸到右边界。这样应该能为我们将要向用户显示的文本留出足够的空间。\n\
  \n![9781484202005_Fig03-11.jpg](img/9781484202005_Fig03-11.jpg)\n\n图 3-11. 标签在对象库中的显示效果\n\
  \n\n```markdown\n\n标签中的文本默认是左对齐的，但我们希望此标签中的文本居中。选择 **视图** ![image](img/arrow.jpg)\
  \ **实用工具** ![image](img/arrow.jpg) **显示属性检查器**（或按 **![image](img/sym2.jpg)**![image](img/flower.jpg)**4**）以打开属性检查器（参见图\
  \ 3-12）。确保标签处于选中状态，然后在属性检查器中找到**对齐**按钮。选择中间的**对齐**按钮以使标签文本居中。\n\n![9781484202005_Fig03-12.jpg](img/9781484202005_Fig03-12.jpg)\n\
  \n图 3-12 标签的属性检查器\n\n在用户点击按钮之前，我们不希望标签显示任何内容，因此双击标签（使文本处于选中状态），然后按键盘上的 **Delete**\
  \ 按钮。这将删除当前分配给标签的文本。按 **Return** 确认更改。即使未选中时看不到标签，也无需担心——它仍然存在。\n\n**提示** 如果您有不可见的用户界面元素（如空标签）并且希望能够看到它们的位置，请从\
  \ **编辑器** 菜单中选择 **画布**。然后，从弹出的子菜单中，打开 **显示边界矩形**。\n\n剩下的工作就是为标签创建一个出口。我们完全按照之前创建和连接操作的方法来进行。确保助理编辑器已打开并显示\
  \ `ViewController.m`。如果需要切换文件，请使用助理编辑器上方跳转栏中的弹出菜单。\n\n接下来，在 Interface Builder 中选择标签，然后按住\
  \ Control 键从标签拖拽到头文件。一直拖到光标位于现有操作方法的正上方。当看到类似图 3-13 的内容时，松开鼠标按钮，您将看到一个弹出窗口，提供创建\
  \ Outlet 或 Outlet Collection 的选项。\n\n![9781484202005_Fig03-13.jpg](img/9781484202005_Fig03-13.jpg)\n\
  \n图 3-13 按住 Control 键拖拽以创建出口\n\n我们要创建一个出口，因此将**连接**保留为默认类型**Outlet**。我们希望为此出口选择一个描述性名称，以便在编写代码时记住其用途。在**名称**字段中输入`statusLabel`。将**类型**字段保留为`UILabel`。最后一个字段**存储**可以保留默认值。\n\
  \n按 **Return** 确认更改，Xcode 会将出口属性插入到您的代码中。您的类扩展现在应如下所示：\n\n```\n@interface ViewController\
  \ ()\n\n@property (weak, nonatomic) IBOutlet UILabel *statusLabel;\n\n@end\n```\n\
  \n现在我们有了一个出口，并且 Xcode 已自动将该标签连接到我们的出口。这意味着，如果我们在代码中对 `statusLabel` 进行任何更改，这些更改将影响用户界面上的标签。例如，如果我们设置\
  \ `statusLabel` 的 `text` 属性，它将更改显示给用户的文本。\n\n**自动引用计数 (ARC)**\n\n如果您已经熟悉 Objective-C，或者阅读过本书的早期版本，您可能会注意到我们没有\
  \ `dealloc` 方法。我们并没有释放我们的实例变量！\n\n警告！警告！危险，威尔·罗宾逊！\n\n实际上，威尔，您可以放心。我们完全没问题。完全没有危险——真的。\n\
  \n不再需要手动释放对象。嗯，这并不完全正确。释放对象仍然是必要的，但 Apple 随 Xcode 提供的 LLVM 编译器非常智能，它会使用一个名为**自动引用计数**（简称\
  \ ARC）的新功能为我们释放对象。这意味着 `dealloc` 方法的使用频率降低，并且不再需要担心调用 `release` 或 `autorelease`。ARC\
  \ 是一个巨大的改进，我们在本书的所有示例中都使用了它。ARC 在过去几年中一直是 Xcode 的一个选项，但现在对于您创建的每个新项目，它都是默认启用的。\n\
  \nARC 仅适用于 Objective-C 对象，不适用于 Core Foundation 对象或使用 `malloc()` 等分配的内存，并且有一些注意事项和陷阱可能会让您出错。但大多数情况下，担心内存管理已经成为过去式。\n\
  \n要了解更多关于 ARC 的信息，请查看此 URL 上的 ARC 发行说明：\n\n```\nhttp://developer.apple.com/library/ios/#releasenotes/ObjectiveC/RN-TransitioningToARC/\n\
  ```\n\nARC 非常酷，但它不是魔法。您仍然需要理解 Objective-C 中内存管理的基本规则，以避免在使用 ARC 时遇到麻烦。要复习 Objective-C\
  \ 内存管理契约，请阅读此 URL 上的 Apple *Memory Management Programming Guide*：\n\n```\nhttp://developer.apple.com/library/ios/#documentation/Cocoa/Conceptual/MemoryMgmt/\n\
  ```\n\n#### 编写操作方法\n\n到目前为止，我们已经设计了用户界面并连接了出口和操作。剩下的工作就是使用这些操作和出口在按下按钮时设置标签的文本。在项目导航器中单击\
  \ `ViewController.m` 以在编辑器中打开它，并找到 Xcode 之前为我们创建的空 `buttonPressed:` 方法。\n\n为了区分两个按钮，我们将使用\
  \ `sender` 参数。我们将使用 `sender` 检索被按下按钮的标题，然后基于该标题创建一个新字符串，并将其指定为标签的文本。将以下粗体代码添加到您的空方法中：\n\
  \n```\n- (IBAction)buttonPressed:(UIButton *)sender {\n    NSString *title = [sender\
  \ titleForState:UIControlStateNormal];\n    NSString *plainText = [NSString stringWithFormat:@\"\
  %@ button pressed.\", title];\n    _statusLabel.text = plainText;\n}\n```\n\n这非常简单。第一行使用\
  \ `sender` 检索被点击按钮的标题。由于按钮可以根据其当前状态（尽管在此示例中并非如此）具有不同的标题，因此我们使用 `UIControlStateNormal`\
  \ 参数来指定我们希望获取按钮处于正常、未点击状态时的标题。这是您通常希望在向控件（按钮是一种控件）请求其标题时指定的状态。我们将在第 4 章中更详细地讨论控件状态。\n\
  \n下一行通过将文本附加到我们在上一行检索到的标题“button pressed.”来创建一个新字符串。因此，如果标题为 *Left* 的左侧按钮被点击，此行将创建一个字符串，内容为“Left\
  \ button pressed.”。最后一行将新字符串赋值给标签的 `text` 属性，这就是我们更改标签显示文本的方式。\n\n**消息嵌套**\n\nObjective-C\
  \ 消息通常是嵌套的。您可能会在旅途中遇到如下代码：\n\n```\nNSString *plainText = [NSString stringWithFormat:@\"\
  %@ button\n    pressed.\",\n    [sender titleForState:UIControlStateNormal]];\n\
  ```\n\n这一行（逻辑上的）代码的功能与 `buttonPressed:` 方法的前两行完全相同。这是因为 Objective-C 方法可以嵌套，这本质上是用嵌套方法调用的返回值进行替换。\n\
  \n为了清晰起见，本书中的代码示例通常不会嵌套 Objective-C 消息，但 `alloc` 和 `init` 的调用除外，根据长期以来的惯例，这两个调用几乎总是嵌套的。\n\
  \n#### 试一试\n\n```\n\n\n猜猜看？我们快完成了。准备好试用我们的应用了吗？现在就开始吧！\n\n选择**产品** ![image](img/arrow.jpg)\
  \ **运行**。如果遇到任何编译或链接错误，请返回并对比你的代码更改与本教程中显示的修改。一旦代码成功构建，Xcode 将启动 iOS 模拟器并运行你的应用程序。如果使用\
  \ iPhone 模拟器运行并点击**左**按钮，你将看到类似图 3-14 的效果。\n\n![9781484202005_Fig03-14.jpg](img/9781484202005_Fig03-14.jpg)\n\
  \n图 3-14. 运行应用程序——布局需要修复\n\n左按钮位置正确，但标签和另一个按钮位置不对。在第 2 章中，我们通过关闭故事板中的**尺寸类别**修复了\
  \ Hello World 标签的类似问题，这使设计区域呈现 iPhone 的形状，然后我们重新定位了标签并再次尝试。如果只想在屏幕尺寸与故事板中相同的 iPhone\
  \ 上运行应用，这个解决方案是可行的。但如果要同时支持 iPhone 和 iPad，它就行不通了——甚至无法在所有 iPhone 上正常工作。幸运的是，有更好的方法来解决这个问题。我们无需更改布局来适应\
  \ Interface Builder 中显示的屏幕尺寸，而是通过使用 Auto Layout 让布局适应应用运行的屏幕。Auto Layout 的核心思想是使用约束来指定控件的放置方式。在本例中，我们需要实现以下效果：\n\
  \n*   **左**按钮应垂直居中并靠近屏幕左侧边缘。\n*   **右**按钮应垂直居中并靠近屏幕右侧边缘。\n*   标签应水平居中，并距屏幕顶部一定间距。\n\
  \n上述每项描述都包含两个约束——一个是水平约束，另一个是垂直约束。如果将这些约束应用于我们的三个视图，Auto Layout 将负责确保它们在任意屏幕上都能正确定位。那么如何实现呢？\n\
  \n你可以在代码中通过创建 `NSLayoutConstraint` 类的实例来向视图添加 Auto Layout 约束。在某些情况下，这是创建正确布局的唯一方法，但在这个案例中（以及大多数情况下），你可以通过\
  \ Interface Builder 获得所需的布局。Interface Builder 允许你通过拖拽和点击来直观地添加约束。让我们看看如何操作。\n\n\
  首先，我们来定位标签。在项目导航器中选择 `Main.storyboard`，打开文档大纲以显示视图层次结构。找到标记为**视图**的图标。这代表视图控制器的主视图，我们需要相对于它来定位其他视图。如果**视图**图标尚未展开，点击其展开三角形以显示两个按钮（标记为“左”和“右”）以及标签。按住\
  \ **Control** 键，将鼠标从标签拖拽到其父视图，如图 3-15 左侧所示。\n\n![9781484202005_Fig03-15.jpg](img/9781484202005_Fig03-15.jpg)\n\
  \n图 3-15. 使用 Auto Layout 约束定位标签\n\n通过从一个视图拖拽到另一个视图，你是在告诉 Interface Builder 你想要在它们之间应用一个\
  \ Auto Layout 约束。松开鼠标后，会出现一个包含多种选项的灰色弹出框，如图 3-15 右侧所示。弹出框中的每个选项都是一个单独的约束。点击其中任何一个都会应用该约束，但我们需要为标签应用两个约束，而这两个约束都在弹出框中可用。要同时应用多个约束，你需要在选择它们时按住\
  \ **Shift** 键。因此，按住 **Shift** 键，点击**水平居中于容器**和**距顶部布局指南顶部间距**。要实际应用这些约束，请在弹出框外的任意位置点击鼠标。完成此操作后，你创建的约束会出现在文档大纲的**约束**标题下，并会直观地显示在故事板中，如图\
  \ 3-16 所示。\n\n![9781484202005_Fig03-16.jpg](img/9781484202005_Fig03-16.jpg)\n\n\
  图 3-16. 两个 Auto Layout 约束已应用于标签\n\n**提示** 如果在添加约束时出错，可以通过点击文档大纲或故事板中的约束表示，然后按 **Delete**\
  \ 键来移除它。\n\n两条垂直的蓝线代表你添加的约束——较长的那条是保持标签水平居中的约束，较短的那条则表示它将放置在距视图顶部固定距离的位置。\n\n**提示**\
  \ 要查看任何约束的详细信息，请在故事板或文档大纲中选择它，然后打开属性检查器。\n\n你可能还会看到标签有一个橙色轮廓。Interface Builder 使用橙色来指示\
  \ Auto Layout 的问题。Interface Builder 以这种方式突出显示三种典型问题：\n\n*   没有足够的约束来完全确定视图的位置或大小。\n\
  *   视图具有模糊的约束——也就是说，它们无法唯一确定其大小或位置。\n*   约束正确，但运行时视图的位置和/或大小将与 Interface Builder\
  \ 中的不同。\n\n你可以通过点击活动视图中的黄色警告三角，在问题导航器中查看解释，从而了解问题的更多信息。如果这样做，你会看到提示“'Label' 的框架在运行时将有所不同”——这属于上述列出的第三种问题。你可以通过让\
  \ Interface Builder 将标签移动到其正确的运行时位置并赋予其配置的大小来消除此警告。为此，请查看故事板编辑器的右下角。你会看到四个按钮，如图\
  \ 3-17 所示。\n\n![9781484202005_Fig03-17.jpg](img/9781484202005_Fig03-17.jpg)\n\n\
  图 3-17. 故事板编辑器右下角的 Auto Layout 按钮\n\n将鼠标悬停在按钮上可查看每个按钮的功能。从左到右，它们的功能如下：\n\n\n\n*\
  \   `Align`按钮可让您将所选视图相对于另一视图对齐。如果现在单击此按钮，将看到一个包含多种对齐选项的弹出窗口。其中之一是`Horizontal Center\
  \ in Container`，这是您已从文档大纲应用于标签的约束。在 Interface Builder 中，通常有多种方式完成大多数 Auto Layout\
  \ 相关操作。随着本书的深入学习，您将看到执行最常见 Auto Layout 任务的其他方法。\n*   `Pin`按钮的弹出窗口包含多个控件，可让您设置视图相对于其他视图的位置并应用尺寸约束。例如，您可以设置一个约束，将一个视图的高度约束为与另一个视图相同。\n\
  *   `Resolve Auto Layout Issues`按钮可让您纠正布局问题。您可以使用其弹出菜单中的菜单项，让 Interface Builder\
  \ 移除某个视图（或整个故事板）的所有约束，猜测可能缺失的约束并添加它们，以及调整一个或多个视图的框架至运行时的状态。\n*   最后，`Resizing Behavior`按钮可让您控制视图大小调整对现有约束的影响。\n\
  \n您可以通过在文档大纲或故事板中选择标签并单击`Resolve Auto Layout Issues`按钮来修复标签的框架。此按钮的弹出窗口包含两组完全相同的操作——参见图\
  \ 3-18。\n\n![9781484202005_Fig03-18.jpg](img/9781484202005_Fig03-18.jpg)\n\n图 3-18.\
  \ `Resolve Auto Layout Issues`按钮的弹出窗口\n\n如果您从顶部组选择一项操作，它仅应用于当前选中的视图，而底部组的操作则应用于视图控制器中的所有视图。在本例中，我们只需修复一个标签的框架，因此单击弹出窗口顶部的`Update\
  \ Frames`。执行此操作后，橙色轮廓和活动视图中的警告三角形都会消失，因为标签现在拥有了运行时将具有的位置和大小。实际上，标签已缩小到零宽度，并在故事板中显示为一个小空方块，如图\
  \ 3-19 所示。\n\n![9781484202005_Fig03-19.jpg](img/9781484202005_Fig03-19.jpg)\n\n\
  图 3-19. 修复框架后，标签已缩小到零尺寸\n\n这正确吗？嗯，事实证明这是*正确*的。UIKit 提供的许多视图，包括`UILabel`，都能够让 Auto\
  \ Layout 根据其实际内容设置其大小。它们通过计算其**自然**或**固有内容大小**来实现这一点。在其固有大小下，标签的宽度和高度刚好能完全包围其包含的文本。目前，此标签没有内容，因此其固有内容大小在两个轴向上确实应为零。当我们运行应用程序并单击其中一个按钮时，标签的文本将被设置，其固有内容大小将会改变。发生这种情况时，Auto\
  \ Layout 会自动调整标签大小，以便您能看到所有文本。很酷，对吧？\n\n**提示** 您可以通过在 Xcode 菜单中选择**Editor** ![image](img/arrow.jpg)\
  \ **Size to Fit Content**，确保 Auto Layout 为视图提供其固有内容大小。\n\n我们已经处理了标签，现在来修复两个按钮的位置。您可以使用相同的技术，通过按住\
  \ Control 键从按钮拖拽到其父视图，并在释放鼠标时从弹出的菜单中应用约束，但我想借此机会向您展示另一种方法。在故事板上选择**Left**按钮，然后单击故事板编辑器右下角的`Align`按钮（图\
  \ 3-17 中最左侧的按钮）。我们希望按钮垂直居中，因此在弹出窗口中选择`Vertical Center in Container`，然后单击`Add 1 Constraint`（参见图\
  \ 3-20）。\n\n![9781484202005_Fig03-20.jpg](img/9781484202005_Fig03-20.jpg)\n\n图 3-20.\
  \ 使用`Align`弹出窗口垂直居中视图\n\n我们需要对**Right**按钮应用相同的约束，因此选择它并重复该过程。在您执行此操作时，Interface\
  \ Builder 发现了几个新问题，由故事板中的橙色轮廓和活动视图中的警告三角形表示。单击三角形以在问题导航器中查看警告原因，如图 3-21 所示。\n\n\
  ![9781484202005_Fig03-21.jpg](img/9781484202005_Fig03-21.jpg)\n\n图 3-21. 针对缺失约束的\
  \ Interface Builder 警告\n\nInterface Builder 警告您两个按钮的水平位置存在歧义。实际上，您尚未设置任何约束来控制按钮的水平位置，因此这并不奇怪。\n\
  \n**注意** 在设置 Auto Layout 约束时，出现此类警告是正常的，您应利用它们来帮助您设置完整的约束集。完成布局过程后，您不应有任何警告。本书中的大多数示例都包含设置布局约束的说明。在添加这些约束时，您通常会遇到警告，但不必担心，除非您完成所有步骤后仍有警告。如果出现这种情况，要么是您遗漏了某个步骤，要么是您执行步骤有误，或者书中存在错误！如果是后一种情况，请通过书籍页面`http://apress.com`提交勘误告知我们。\n\
  \n让我们修复这些警告。我们希望**Left**按钮与其父视图左侧保持固定距离，而**Right**按钮与其父视图右侧保持相同距离。我们可以从`Pin`按钮（图\
  \ 3-17 中`Align`按钮旁边的那个）的弹出窗口设置这些约束。选择**Left**按钮并单击`Pin`按钮以打开其弹出窗口。在弹出窗口的顶部，您会找到四个输入字段，通过橙色虚线连接到一个小方块，如图\
  \ 3-22 左侧所示。\n\n![9781484202005_Fig03-22.jpg](img/9781484202005_Fig03-22.jpg)\n\n\
  图 3-22. 使用`Pin`弹出窗口设置视图的水平位置\n\n小方块代表我们正在约束的按钮。四个输入字段允许您设置按钮与其上方、下方、左侧和右侧最近邻居之间的距离。虚线表示尚不存在约束。对于**Left**按钮，我们想要设置它与父视图左侧之间的固定距离，因此单击方块左侧的橙色虚线。执行此操作后，它变为橙色实线，表示现在有一个要应用的约束。接下来，在左侧输入字段中输入**32**，以设置**Left**按钮到其父视图的距离。此时弹出窗口应如图\
  \ 3-22 右侧所示。按`Add 1 Constraint`将约束应用于该按钮。\n\n\n\n为了固定**Right**按钮的位置，选中它，点击**Pin**按钮，点击方块右侧的橙色虚线（因为我们将此按钮固定在其父视图的右侧），在输入字段中输入`32`，然后点击**Add\
  \ 1 Constraint**。\n\n现在我们已经应用了所有需要的约束，但 Activity View 中可能仍然存在警告。如果你检查一下，会发现这些警告是因为按钮不在其正确的运行时位置。为了解决这个问题，我们将再次使用**Resolve\
  \ Auto Layout Issues**按钮。点击该按钮以打开其弹出菜单，然后点击底部选项组中的**Update Frames**。我们使用底部选项组中的选项，因为需要调整视图控制器中所有视图的框架。\n\
  \n**提示**：你可能会发现弹出菜单中没有任何选项可用。如果出现这种情况，请在文档大纲中选择**View Controller**图标，然后重试。\n\n警告现在应该消失了，我们的布局终于完成了。在\
  \ iPhone 模拟器上运行该应用程序，你会看到结果与本章节开头的图 3-1 几乎一致。当你点击右侧按钮时，应显示文本：“Right button pressed.”。如果你随后点击左侧按钮，标签将更改为显示：“Left\
  \ button pressed.”。到目前为止，一切顺利。但如果你回过头看图 3-1，会发现还缺少一样东西。我们展示的最终结果截图中，所选按钮的名称以粗体显示；然而，我们目前实现的只是显示普通字符串。我们稍后将使用`NSAttributedString`类来实现粗体效果。首先，让我们借此机会看看\
  \ Xcode 的另一个有用功能——布局预览。\n\n#### 预览布局\n\n返回 Xcode，选择`Main.storyboard`，然后打开助理编辑器（如果尚未显示，请参阅图\
  \ 3-6 以了解如何操作）。在助理编辑器顶部跳转栏的左侧，你会看到当前选择是**Automatic**（除非你已将其更改为**Manual**以选择助理编辑器要显示的文件）。点击打开跳转栏此段的弹出菜单，你会看到几个选项，最后一个是**Preview**。当鼠标悬停在**Preview**上时，会出现一个包含应用程序故事板名称的菜单。点击它以在*预览编辑器*中打开故事板。\n\
  \n当预览编辑器打开时，你将看到应用程序在 iPhone 竖屏模式下的外观。这只是一个预览，因此它不会响应按钮点击，结果是你不会看到标签。将鼠标移动到预览下方写着**iPhone\
  \ 4-inch**的区域，会出现一个控件，让你可以将手机旋转到横屏模式。你可以在图 3-23 左侧看到该控件，右侧是点击它旋转手机后的结果。\n\n![9781484202005_Fig03-23.jpg](img/9781484202005_Fig03-23.jpg)\n\
  \n*图 3-23*：在 iPhone 竖屏模式（左）和横屏模式（右）下预览布局\n\n得益于自动布局，当手机旋转时，按钮会移动，使它们保持垂直居中，并且与设备两侧的距离与竖屏模式时相同。如果标签可见，你会发现它也处于正确的位置。\n\
  \n我们还可以使用预览助理来查看在不同设备上运行应用程序时的效果。在预览助理的左下角（以及图 3-23 中），你会看到一个**+**图标。点击此图标打开设备列表，然后选择**iPad**，将\
  \ iPad 预览添加到预览助理中。iPad 预览占用了大量空间，因此你可能需要关闭文档大纲和实用工具视图，为同时查看 iPhone 和 iPad 腾出足够的空间。如果你仍然无法看到整个\
  \ iPad 屏幕，可以通过几种不同的方式缩放预览助理。最简单的方法是双击预览助理窗格——这会在全尺寸视图和更小的视图之间切换。如果你希望更精确地控制缩放级别，可以在触控板上使用捏合手势（不幸的是，Magic\
  \ Mouse 不支持此功能，至少在本手册编写时如此）。图 3-24 显示了 iPhone 和 iPad 的预览，已缩小以适应当前屏幕上的可用空间。自动布局再次确保了按钮位于正确位置。旋转\
  \ iPad 预览，查看布局在 iPad 横屏模式下是否也能正常工作。\n\n![9781484202005_Fig03-24.jpg](img/9781484202005_Fig03-24.jpg)\n\
  \n*图 3-24*：同时在 iPhone 和 iPad 上预览布局\n\n在构建和调试布局时，使用预览助理可以节省大量时间。你可以查看布局在多个设备以及两种方向上的工作效果。实际上，你可以再添加一对\
  \ iPhone 和 iPad 预览，并将它们旋转到横屏模式，如果你想同时在两种设备上查看两种方向下的布局。最重要的是，预览是实时的——如果你对布局进行更改，预览也会随之更新！\n\
  \n要查看这一点，请返回故事板编辑器，选择其中一个按钮，将其拖向另一个按钮，然后松开。现在确保文档大纲中已选中你拖动的按钮，打开**Resolve Auto Layout\
  \ Issues**弹出菜单，然后点击**Update Constraints**。这会告诉 Interface Builder 更改自动布局约束，使你刚才对按钮所做的调整成为永久性的。当你这样做时，你会看到按钮立即跳转到预览助理中两种设备上的新位置。很棒，对吧？\n\
  \n我们继续为标签文本添加粗体效果。不过在此之前，我们需要把那个按钮放回原位。你可以将其拖回原位并再次调整其约束，但有一个更快捷的方法——只需按![image](img/flower.jpg)**Z**两次来撤销你刚才的更改，一切就会恢复正常。\n\
  \n#### 添加一些样式\n\n`NSAttributedString`类允许你将格式信息（如字体和段落对齐）附加到字符串上。此元数据可以应用于整个字符串，也可以将不同的属性应用于字符串的不同部分。如果你考虑一下文字处理器中格式如何应用于文本片段，那基本上就是`NSAttributedString`的工作模型。\n\
  \n然而，直到最近，Apple 提供的 UIKit 类中没有一个能够处理属性字符串。如果你想要呈现一个同时包含粗体文本和正常文本的标签，你只能使用两个标签，或者自己将文本直接绘制到视图中。这些方法并非不可逾越的障碍，但它们足够棘手，大多数开发者都不愿频繁使用。对于想要显示样式文本的人来说，iOS\
  \ 6 带来了许多改进，因为大多数主要的 UIKit 控件现在都允许你使用属性字符串。对于像我们这里的`UILabel`来说，这就像创建一个属性字符串，然后通过其`attributedText`属性将其传递给标签一样简单。\n\
  \n\n\n所以，选择 `ViewController.m`，通过删除划掉的代码行并添加代码片段中加粗的行，来更新 `buttonPressed:` 方法：\n\
  \n```\n- (IBAction)buttonPressed:(UIButton *)sender {\n    NSString *title =  [sender\
  \ titleForState:UIControlStateNormal];\n    NSString *plainText =  [NSString stringWithFormat:@\"\
  %@ button pressed.\", title];\n    _statusLabel.text =  plainText;\n\nNSMutableAttributedString\
  \ *styledText =  [[NSMutableAttributedString alloc]\n                          \
  \                   initWithString:plainText];\n    NSDictionary *attributes =\n\
  \    @{\n      NSFontAttributeName :  [UIFont boldSystemFontOfSize:_statusLabel.font.pointSize]\n\
  \     };\n\nNSRange nameRange =  [plainText rangeOfString:title];\n\n[styledText\
  \ setAttributes:attributes range:nameRange];\n    _statusLabel.attributedText =\
  \  styledText;\n}\n```\n\n这段新代码所做的第一件事，是基于我们将要显示的字符串创建一个属性字符串——具体来说，是一个 `NSMutableAttributedString`\
  \ 实例。这里我们需要一个可变属性字符串，因为我们想修改其属性。\n\n接下来，我们创建一个字典来存放要应用于字符串的属性。实际上，目前我们只有一个属性，所以这个字典只包含一个键值对。键\
  \ `NSFontAttributeName` 允许你为属性字符串的一部分指定一种字体。我们传入的值是所谓的粗体系统字体，其大小被指定为与标签当前使用的字体大小相同。从长远来看，以这种方式指定字体比通过名称指定字体更灵活，因为我们知道系统总是能合理地知道应该使用什么作为粗体字体。\n\
  \n**提示** 如果你使用 Objective-C 已有一段时间，可能对这种新的字典语法不太熟悉——但它其实相当简单。Xcode 附带的 LLVM 版本提供了一种简写形式，无需显式调用\
  \ `NSDictionary` 的类方法，使用起来更方便。它的基本形式如下：\n\n`@{`     `key1 : value1,`     `key2 :\
  \ value2`    `}`\n\n除了省去每次创建字典时都要输入冗长的类名和方法名之外，它还把键和值按照“正确的顺序”排列——至少对于任何使用过内置字典的语言（如\
  \ Ruby、Python、Perl 或 JavaScript）的人来说是这样。\n\n这种新的字典语法与数组和数字的类似语法一并于 2012 年引入。本书将通篇使用这些新语法。\n\
  \n接着，我们让 `plainText` 字符串给出包含标题的子字符串的范围（由起始索引和长度组成）。我们使用该范围将属性应用于属性字符串中对应标题的部分，然后将其传递给标签。\n\
  \n现在，点击 **Run** 按钮，你会看到应用程序以粗体文本显示被点击按钮的名称，如图 3-1 所示。\n\n#### 查看应用程序委托\n\n嗯，真酷！你的应用跑起来了！在我们进入下一个主题之前，花点时间看看我们尚未检查的两个源代码文件：`AppDelegate.h`\
  \ 和 `AppDelegate.m`。这些文件实现了我们的应用程序委托。\n\nCocoa Touch 广泛使用委托，即负责代表另一个对象执行特定任务的对象。应用程序委托让我们能在某些预定义的时间代表\
  \ `UIApplication` 类执行操作。每个 iOS 应用程序都只有一个 `UIApplication` 实例，它负责应用程序的运行循环并处理应用程序级别的功能，例如将输入路由到适当的控制器类。`UIApplication`\
  \ 是 UIKit 的标准组成部分，其工作大部分在后台进行，因此你通常无需担心它。\n\n在应用程序执行的某些明确定义的时间点，如果委托存在并且实现了该方法，`UIApplication`\
  \ 会调用其委托上的特定方法。例如，如果你需要在程序即将退出前执行代码，你可以在应用程序委托中实现 `applicationWillTerminate:` 方法，并将终止代码放在那里。这种委托方式允许你的应用程序实现常见的全局行为，而无需继承\
  \ `UIApplication`，实际上也无需了解 `UIApplication` 的内部工作原理。所有 Xcode 模板都会为你创建一个应用程序委托，并安排在应用程序启动时将其链接到\
  \ `UIApplication` 对象。\n\n点击项目导航器中的 `AppDelegate.h` 查看应用程序委托的头文件。它应该看起来像这样：\n\n```\n\
  #import <UIKit/UIKit.h>\n\n@interface AppDelegate :  UIResponder <UIApplicationDelegate>\n\
  \n@property (strong, nonatomic) UIWindow *window;\n\n@end\n```\n\n有一点值得指出的是这行代码：\n\
  \n```\n@interface AppDelegate :  UIResponder <UIApplicationDelegate>\n```\n\n你看到尖括号之间的内容了吗？这表明这个类遵循一个名为\
  \ `UIApplicationDelegate` 的协议。按住 **![image](img/sym2.jpg)** 键。你的光标应变为十字准线。移动光标，使其悬停在\
  \ `UIApplicationDelegate` 字样上。光标将变成一个问号，并且 `UIApplicationDelegate` 字样会高亮显示，就像浏览器中的链接一样（参见图\
  \ 3-25）。\n\n![9781484202005_Fig03-25.jpg](img/9781484202005_Fig03-25.jpg)\n\n图 3-25。在\
  \ Xcode 中按住 ![image](img/sym2.jpg) 键（Option 键）并指向代码中的一个符号时，该符号会高亮显示，光标会变为带问号的手指状指针\n\
  \n按住 **![image](img/sym2.jpg)** 键的同时点击此链接。这将打开一个小的弹出窗口，显示 `UIApplicationDelegate`\
  \ 协议的简要概述（参见图 3-26）。\n\n![9781484202005_Fig03-26.jpg](img/9781484202005_Fig03-26.jpg)\n\
  \n图 3-26。当我们在源代码中按住 Option 键并点击 `<UIApplicationDelegate>` 时，Xcode 会弹出这个名为“快速帮助”面板的窗口，其中描述了该协议\n\
  \n注意这个新的弹出文档窗口底部的两个链接（参见图 3-26）。点击 **Reference** 链接查看此符号的完整文档，或点击 **Declared In**\
  \ 链接在头文件中查看符号的定义。同样的技巧也适用于类、协议和类别名称，以及编辑面板中显示的方法名称。只需按住 Option 键并点击一个单词，Xcode 就会在文档浏览器中搜索该单词。\n\
  \n知道如何快速查阅文档无疑很有价值，但查看此协议的定义可能更为重要。在这里，你可以找到应用程序委托可以实现的委托方法以及这些方法何时会被调用。花点时间通读这些方法的描述应该是值得的。\n\
  \n**备注** 如果你之前用过 Objective-C 但没用过 Objective-C 2.0，你应该知道协议现在可以指定可选方法。`UIApplicationDelegate`\
  \ 包含许多可选方法。但是，除非你有理由这样做，否则无需在应用程序委托中实现任何可选方法。\n\n回到项目导航器，点击 `AppDelegate.m` 查看应用程序委托的实现。它应该类似于这样：\n\
  \n```\n#import \"AppDelegate.h\"\n\n@interface AppDelegate ()\n\n@end\n\n@implementation\
  \ AppDelegate\n```\n\n\n\n```objectivec\n- (BOOL)application:(UIApplication *)application\
  \ didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {\n    // 应用启动后的自定义初始化入口点。\n\
  \    return YES;\n}\n\n- (void)applicationWillResignActive:(UIApplication *)application\
  \ {\n    // 当应用即将从活跃状态转为非活跃状态时发送。\n    // 这种情况可能发生在某些类型的临时中断中\n    // （如来电或短信），或当用户退出应用，\n\
  \    // 应用开始过渡到后台状态时。\n    // 使用此方法暂停正在进行的任务、禁用定时器、降低\n    // OpenGL ES 帧率。游戏应使用此方法来暂停游戏。\n\
  }\n\n- (void)applicationDidEnterBackground:(UIApplication *)application {\n    //\
  \ 使用此方法释放共享资源、保存用户数据、\n    // 使定时器失效，并存储足够的应用状态信息，以便\n    // 在应用稍后终止时恢复到当前状态。\n\
  \    // 如果你的应用支持后台执行，当用户退出时，\n    // 将调用此方法而不是 applicationWillTerminate:。\n}\n\n\
  - (void)applicationWillEnterForeground:(UIApplication *)application {\n    // 作为从后台到非活跃状态过渡的一部分调用；\n\
  \    // 在此处可以撤销进入后台时所做的许多更改。\n}\n\n- (void)applicationDidBecomeActive:(UIApplication\
  \ *)application {\n    // 重新启动任何在应用非活跃时暂停（或尚未启动）的任务。\n    // 如果应用之前在后台运行，\n    //\
  \ 可选择刷新用户界面。\n}\n\n- (void)applicationWillTerminate:(UIApplication *)application\
  \ {\n    // 当应用即将终止时调用。请适当保存数据。\n    // 另请参阅 applicationDidEnterBackground:。\n}\n\
  \n@end\n```\n\n在文件顶部，可以看到我们的应用委托实现了文档中介绍的协议方法之一，名为 `application:didFinishLaunchingWithOptions:`。你可能已经猜到，此方法会在应用完成所有设置工作并准备开始与用户交互时立即触发。它通常用于创建那些需要在应用整个运行生命周期内存在的任何对象。\n\
  \n在本书的后续内容中，你将看到更多相关内容，特别是在第 15 章中，我们将更深入地探讨委托在应用生命周期中的作用。在结束本章之前，我们只是想为你提供一些关于应用委托的背景信息，并展示这一切是如何联系在一起的。\n\
  \n#### 轻松入门\n\n本章的简单应用向你介绍了 MVC、创建和连接输出口与动作、实现视图控制器以及使用应用委托。你学习了如何在点击按钮时触发动作方法，并看到了如何在运行时更改标签的文本。尽管我们构建了一个简单的应用，但我们使用的基本概念与\
  \ iOS 下所有控件（不仅仅是按钮）所依据的概念相同。事实上，我们在本章中使用按钮和标签的方式，基本上就是我们将在 iOS 下实现和与大多数标准控件交互的方式。\n\
  \n理解我们在本章中所做的一切及其原因至关重要。如果你不理解，请回去复习你不完全明白的部分。这非常重要！如果你现在不能确保理解所有内容，那么在本书后续章节中创建更复杂的界面时，你只会更加困惑。\n\
  \n在下一章中，我们将介绍一些其他标准的 iOS 控件。你还将学习如何使用警报来通知用户重要事件，以及如何使用操作表来指示用户需要在继续之前做出选择。当你准备好继续前进时，请为自己是一位如此出色的学生而拍拍肩膀，然后前往下一章。\n\
  \n## 第 4 章\n\n\n\n"
- "# 更多用户界面乐趣\n\n在第 3 章中，我们讨论了 MVC 并基于它构建了一个应用程序。你学习了输出口和动作，并使用它们将一个按钮控件与文本标签关联起来。在本章中，我们将构建一个应用程序，它将把你对控件的了解提升到一个全新的水平。\n\
  \n我们将实现一个图像视图、一个滑块、两个不同的文本字段、一个分段控件、几个开关，以及一个外观与 iOS 7 之前的按钮相似的 iOS 按钮。你将了解如何设置和获取各种控件的值。你将学习如何使用操作表强制用户做出选择，以及如何使用警告框向用户提供重要的反馈。你还将学习控件状态以及如何使用可拉伸图像使按钮呈现出应有的外观。\n\
  \n由于本章的应用程序使用了如此多的不同用户界面元素，我们的工作方式将与前两章略有不同。我们将把应用程序分解成多个部分，一次实现一个部分。在 Xcode 和 iOS\
  \ 模拟器之间来回切换，在进入下一部分之前测试每一部分。将构建复杂界面的过程分解成更小的块，不仅会使其不那么令人生畏，也更接近于你在构建自己的应用程序时实际经历的过程。这种“编码-编译-调试”循环占据了软件开发人员日常工作的大部分时间。\n\
  \n## 布满控件的屏幕\n\n如前所述，我们将在本章中构建的应用程序比我们在第 3 章中创建的应用程序稍微复杂一些。我们仍将只使用单个视图和控制器；但正如你在图\
  \ 4-1 中所见，这个视图中包含了更多内容。\n\n![9781484202005_Fig04-01.jpg](img/9781484202005_Fig04-01.jpg)\n\
  \n图 4-1. Control Fun 应用程序展示了文本字段、标签、滑块以及其他几个标准的 iPhone 控件\n\n屏幕顶部的标志是一个**图像视图**。在这个应用程序中，它仅用于显示静态图像。标志下方是两个**文本字段**：一个允许输入字母数字文本，另一个只允许输入数字。文本字段下方是一个**滑块**。当用户移动滑块时，旁边标签的值会随之改变，始终反映滑块的当前值。\n\
  \n滑块下方是一个**分段控件**和两个**开关**。分段控件将在其下方的空间中切换显示两种不同类型的控件。当应用程序首次启动时，分段控件下方会显示两个开关。改变其中任何一个开关的值都会导致另一个开关的值随之变化。当然，在实际应用程序中你可能不会这样做，但它确实演示了如何以编程方式更改控件的值，以及\
  \ Cocoa Touch 如何让你无需进行任何操作即可实现某些动画效果。\n\n图 4-2 显示了当用户点击分段控件时发生的情况。开关消失，并被一个按钮取代。当按下\
  \ **Do Something** 按钮时，会弹出一个操作表，询问用户是否真的想点击该按钮（参见图 4-3）。这是对可能具有危险性或可能产生重大影响的输入做出响应的标准方式，它让用户有机会阻止潜在的坏情况发生。如果选择\
  \ **Yes, I’m Sure!** ，应用程序将弹出一个警告框，告知用户一切正常（参见图 4-4）。\n\n![9781484202005_Fig04-02.jpg](img/9781484202005_Fig04-02.jpg)\n\
  \n图 4-2. 点击左侧的分段控制器将显示一对开关。点击右侧则会显示一个按钮\n\n![9781484202005_Fig04-03.jpg](img/9781484202005_Fig04-03.jpg)\n\
  \n图 4-3. 我们的应用程序使用操作表来征求用户的响应\n\n![9781484202005_Fig04-04.jpg](img/9781484202005_Fig04-04.jpg)\n\
  \n图 4-4. 当重要事件发生时，使用警告框通知用户。我们在这里使用警告框来确认一切正常\n\n## 主动、静态和被动控件\n\n界面控件以三种基本模式使用：主动、静态（或非活动）以及被动。我们在前一章中使用的按钮是主动控件的典型例子。你按下它们，就会发生某些事情——通常是你编写的一段代码被触发。\n\
  \n尽管你将使用的许多控件会直接触发操作方法，但并非所有控件都会这样。我们将在本章中实现的图像视图就是一个控件被静态使用的好例子。`UIImageView` 可以被配置为触发操作方法，但在我们的应用程序中，图像视图是被动的——用户无法对其执行任何操作。标签和图像控件经常以这种方式使用。\n\
  \n有些控件可以以被动模式工作，仅保存用户输入的值，直到你准备好使用时再取用。这些控件不会触发操作方法，但用户可以与它们交互并更改其值。被动控件的一个典型例子是网页上的文本字段。尽管有可能创建在用户跳出字段时触发的验证代码，但绝大多数网页文本字段仅仅是数据的容器，当用户点击提交按钮时，这些数据会被提交给服务器。文本字段本身通常不会触发任何代码，但当提交按钮被点击时，文本字段的数据会随之提交。\n\
  \n在 iOS 设备上，大多数可用的控件都可以在所有三种模式下使用，并且几乎所有控件都可以根据你的需要以多种模式工作。所有 iOS 控件都是 `UIControl`\
  \ 的子类，这使得它们能够触发操作方法。许多控件可以被被动使用，并且所有控件都可以被设置为非活动或不可见状态。例如，使用一个控件可能会触发另一个非活动控件变为活动状态。然而，某些控件（如按钮）除非以主动方式用于触发代码，否则确实没有多大用处。\n\
  \niOS 上的控件和 Mac 上的控件在行为上存在一些差异。以下是一些例子：\n\n- 由于多点触控界面，所有 iOS 控件都可以根据触摸方式触发多个动作。用户用手指在控件上滑动与仅轻点一下，可能会触发不同的动作。\n\
  - 你可以让一个动作在用户按下按钮时触发，而另一个单独的动作在手指从按钮上抬起时触发。\n- 你可以让单个控件在单个事件上调用多个操作方法。例如，当用户触摸按钮后抬起手指时，可以让两个不同的操作方法在\
  \ `Touch Up Inside` 事件上触发。\n\n**注意**  尽管在 iOS 上控件可以触发多个方法，但在绝大多数情况下，实现一个能满足你对控件特定使用需求的操作方法可能是更好的选择。你通常不需要这种能力，但在\
  \ Interface Builder 中工作时，最好还是记住这一点。在 Interface Builder 中将事件连接到动作时，*不会*断开同一控件上先前连接的动作！这可能导致你的应用程序出现意外的错误行为，例如一个控件会触发多个操作方法。在\
  \ Interface Builder 中重新定位事件时，请保持警惕，确保在连接到新动作之前移除旧动作。\n\n\n\n## 排版后的内容\n\niOS 与 Mac\
  \ 之间的另一个主要区别源于这样一个事实：通常情况下，iOS 设备没有物理键盘。标准的 iOS 软件键盘实际上只是一个由一系列按钮控件组成的视图，这些控件由系统为你管理。你的代码很可能永远不会直接与\
  \ iOS 键盘交互。\n\n## 创建应用程序\n\n让我们开始吧。启动 `Xcode`（如果尚未打开），创建一个名为 `Control Fun` 的新项目。我们将再次使用“单视图应用程序”模板，因此请按照前两章的方法创建你的项目。\n\
  \n创建好项目后，让我们获取将在图像视图中使用的图像。该图像必须先导入 `Xcode`，才能在 `Interface Builder` 中使用，因此我们现在就导入它。在示例源代码存档文件夹中的\
  \ `04 - Logos` 文件夹中，你会找到三个文件，分别名为 `apress_logo.png`、`apress_logo@2x.png` 和 `apress_logo@3x.png`，它们是同一图像的标准版本和两个\
  \ Retina 版本。我们将把这三个文件全部添加到新项目的图像资源目录中，并让应用程序在运行时决定使用哪一个。如果你更愿意使用自己选择的一对图像，请确保它们是\
  \ `*.png` 格式，并且尺寸适合可用空间。小版本的高度应小于 100 像素，最大宽度为 300 像素，这样它才能在最窄的 iPhone 屏幕顶部舒适地放置而无需调整大小。较大的版本应分别是小版本尺寸的两倍和三倍。\n\
  \n在 `Xcode` 中，选择项目导航器中的 `Images.xcassets`，然后单击编辑器区域左下角的加号（`+`）按钮。这会弹出一个小的选项菜单，你应从中选择\
  \ **New Image Set**。这会创建一个用于添加实际图像文件的新位置。目前它只是被称为 `Image`，但我们想给它一个唯一的名称，以便可以在项目的其他地方引用它。选择\
  \ **Image** 项目，打开属性检查器（**`Cmd-4`**），并使用它将图像名称更改为 `apress_logo`。\n\n现在，将图像本身添加到 `apress_logo`\
  \ 图像项中，方法是将每个图像从访达拖到图像详细信息框中。将 `apress_logo.png` 拖到标有 `1x` 的位置，将 `apress_logo@2x.png`\
  \ 拖到 `2x` 插槽，再将 `apress_logo@2x.png` 拖到 `3x` 插槽。\n\n### 实现图像视图和文本字段\n\n将图像添加到项目后，下一步是实现应用程序屏幕顶部的五个界面元素：图像视图、两个文本字段和两个标签（参见图\
  \ 4-5）。\n\n![9781484202005_Fig04-05.jpg](img/9781484202005_Fig04-05.jpg)\n\n图 4-5.\
  \ 我们将首先实现的图像视图、标签和文本字段\n\n#### 添加图像视图\n\n在项目导航器中，单击 `Main.storyboard` 以在 `Interface\
  \ Builder` 中打开文件。你会看到熟悉的白色背景和一个方形视图，你可以在其中布置应用程序的界面。\n\n如果对象库未打开，请选择 **View → Utilities\
  \ → Show Object Library** 将其打开。滚动列表大约四分之一处，直到找到 **Image View**（参见图 4-6），或者直接在搜索字段中输入\
  \ `image`。请记住，对象库是库面板顶部的第三个图标。你不会在其他任何图标下找到 **Image View**。\n\n![9781484202005_Fig04-06.jpg](img/9781484202005_Fig04-06.jpg)\n\
  \n图 4-6. `Interface Builder` 库中的图像视图元素\n\n将一个图像视图拖到故事板编辑器中的视图上。请注意，当你将图像视图拖出库时，它的大小会改变两次。当拖动移出库面板时，它会呈现为水平矩形的形状。然后，当拖动进入视图框架时，图像视图会调整大小以适应视图的大小，包括顶部的状态栏。这种表现是正常的。实际上，在很多情况下，这正好是你想要的，因为你在视图中放置的第一个图像通常是背景图像。在视图内部释放拖动，注意让新的\
  \ `UIImageView` 与周围视图的侧面和底部对齐。在这种特殊情况下，我们实际上不希望图像视图占据整个空间，因此我们使用拖动手柄将图像视图调整到与之前导入\
  \ `Xcode` 的图像大致相同的大小。暂时不必担心完全精确；我们将在下一节中处理好。图图 4-7 显示了我们调整大小后的 `UIImageView`。\n\n\
  ![9781484202005_Fig04-07.jpg](img/9781484202005_Fig04-07.jpg)\n\n图 4-7. 我们调整大小后的\
  \ `UIImageView`，其大小已调整为接近于我们将放置在此处的图像尺寸\n\n请记住，如果你在编辑区域选择某个项目时遇到困难，可以单击左下角的小矩形图标打开文档大纲。现在，单击文档大纲中你想要选择的项目，果然，该项目将在编辑器中被选中。\n\
  \n要访问嵌套在另一个对象内部的对象，请单击包围对象左侧的展开三角形以显示嵌套对象。在这种情况下，要选择图像视图，请首先单击视图左侧的展开三角形。然后，当图像视图出现在文档大纲中时，单击它，它将在编辑区域中被选中。\n\
  \n选中图像视图后，按 **`Cmd-4`** 打开对象属性检查器，你应该会看到 `UIImageView` 类的可编辑选项（参见图 4-8）。\n\n![9781484202005_Fig04-08.jpg](img/9781484202005_Fig04-08.jpg)\n\
  \n图 4-8. 图像视图属性检查器。我们从检查器顶部的 **Image** 弹出菜单中选择了我们的图像，这使图像视图填充了我们的图像\n\n对于我们的图像视图来说，最重要的设置是检查器中标记为\
  \ **Image** 的最顶部项目。单击字段右侧的小箭头，查看列出可用图像的弹出菜单。此列表包含你添加到项目图像资源目录中的任何图像。选择你之前添加的 `apress_logo`\
  \ 图像，它应该会出现在你的图像视图中。\n\n#### 调整图像视图大小\n\n事实证明，我们使用的图像比放置它的图像视图要小得多。如果你再看一下图 4-8，你会注意到我们使用的图像被缩放以完全填充图像视图。一个明显的线索是属性检查器中的\
  \ **Mode** 设置，它被设置为 **Scale To Fill**。\n\n尽管我们可以保持应用程序这种状态，但通常最好在运行时之前进行任何图像缩放，因为图像缩放会耗费时间和处理器周期。让我们将图像视图调整到与图像完全相同的尺寸。\n\
  \n确保图像视图被选中，并且你可以看到调整大小手柄。现在再次选择图像视图。你应该会看到图像视图的轮廓被一个粗灰色边框取代。最后，按 **`Cmd-=`** 或选择\
  \ **Editor → Size to Fit Content**。这将调整图像视图的大小以匹配其内容的大小。如果按 **`Cmd-=`** 不起作用，或者\
  \ **Size to Fit Content** 是灰色的，请重新选择图像视图，将其向旁边拖动一点，然后重试。\n\n\n\n现在图像视图已调整大小，让我们将它移回最终位置：选中它，然后选择\
  \ **Editor** → **Align** → **Horizontal Center in Container**。这会创建一个约束，使图像视图始终保持在容器视图的水平中心，即使该视图的大小发生变化。在第\
  \ 3 章中，你通过编辑区底部的**Align**弹出菜单中的**Horizontal Center in Container**复选框完成了相同操作。你可能已经注意到，Interface\
  \ Builder 会显示一些实线，从某个视图的边缘延伸到其父视图的边缘（不要与拖动时显示的蓝色虚线混淆）。这些实线代表直接在 Interface Builder\
  \ 中构建的布局规则所对应的约束。当你单击刚添加的约束时，会看到它变成一条贯穿主视图整个高度的橙色实线（参见图 4-9）。这表示图像视图的中心将保持在其父视图的水平中心位置，即使父视图的几何形状发生变化（例如设备旋转时）。我们将在本书中进一步讨论约束。\n\
  \n![9781484202005_Fig04-09.jpg](img/9781484202005_Fig04-09.jpg)\n\n图 4-9 将图像视图调整到适合图像大小后，使用视图的蓝色参考线将其拖动到位，并创建一个约束使其保持居中。\n\
  \n**注意** 你可能已经注意到活动视图中出现了一个橙色警告指示器。如果单击它，会看到它提示“Image View 的垂直位置不明确”。Xcode 告诉我们，需要为该视图设置一个垂直约束。你可以现在使用第\
  \ 3 章中的技术进行设置，也可以等到本章后面统一修复布局中的所有约束。\n\n**提示** 在 Interface Builder 中拖动和调整视图大小可能比较棘手。别忘了使用文档大纲，你可以通过单击编辑区左下角的小矩形图标将其打开。在调整大小时，按住\
  \ ![image](img/sym2.jpg) 键，Interface Builder 会在屏幕上绘制一些有用的红线，帮助您更直观地了解图像视图的尺寸。这个技巧不适用于拖动，因为按住\
  \ ![image](img/sym2.jpg) 键会提示 Interface Builder 复制拖动的对象。但是，如果你选择 **Editor** → **Canvas**\
  \ → **Show Bounds Rectangles**，Interface Builder 会在所有界面元素周围绘制边框，使其更易识别。再次选择 **Show\
  \ Bounds Rectangles** 可以关闭这些边框线。\n\n#### 设置视图属性\n\n选中图像视图，然后将注意力切换回属性检查器。在检查器的 Image\
  \ View 部分下方是 View 部分。你可能已经推断出，这里的模式是：选中对象的特定属性显示在顶部，随后是应用于所选对象父类的更通用属性。在本例中，`UIImageView`\
  \ 的父类是 `UIView`，因此下一部分直接标记为 **View**，其中包含任何视图类都会拥有的属性。\n\n##### Mode 属性\n\n视图检查器中的第一个选项是标记为\
  \ **Mode** 的弹出菜单。**Mode** 菜单定义了视图如何显示其内容。它决定了图像在视图内部的对齐方式以及是否缩放以适配。你可以尝试各种选项，但默认值\
  \ *Scale To Fill* 目前可以正常工作，因为我们已经将图像视图调整为与其图像完全匹配的大小。\n\n请记住，任何导致图像缩放的选项都可能增加运行时的处理开销，因此最好避免使用这些选项，并在导入图像之前正确调整其大小。如果你想以多种尺寸显示同一张图像，通常更好的做法是在项目中包含同一张图像的不同尺寸的多个副本，而不是强制\
  \ iOS 设备在运行时进行缩放。当然，有时在运行时进行缩放是合适的，甚至是不可避免的；这是一个指导原则，而非强制规则。\n\n##### Tag\n\n下一个项目\
  \ **Tag** 值得一提，尽管我们在本章中不会用到它。`UIView` 的所有子类，包括所有视图和控件，都有一个名为 `tag` 的属性，它只是一个数值，你可以在这里或在代码中设置它。这个标签是为您的使用而设计的——系统永远不会设置或更改其值。如果你为某个控件或视图分配了标签值，那么除非你更改它，否则可以确保该标签始终具有该值。\n\
  \n标签提供了一种简单且与语言无关的方式来标识界面中的对象。假设你有五个不同的按钮，每个都有不同的标签，并且你想使用一个操作方法处理所有五个按钮。在这种情况下，当你的操作方法被调用时，你可能需要某种方式来区分这些按钮。当然，你可以查看按钮的标题，但执行此类操作的代码在应用程序被翻译成斯瓦希里语或梵语时可能无法正常工作。与标签不同，标签永远不会改变，因此如果你在\
  \ Interface Builder 中设置了标签值，就可以将其作为快速可靠的方法，检查在 `sender` 参数中传递到操作方法的是哪个控件。\n\n#####\
  \ Interaction 复选框\n\nInteraction 部分中的两个复选框与用户交互有关。第一个复选框 **User Interaction Enabled**\
  \ 指定用户是否可以对对象执行任何操作。对于大多数控件，此框会被选中，因为如果不选中，控件将永远无法触发操作方法。然而，图像视图默认未选中，因为它们通常仅用于显示静态信息。由于我们只是将图片显示在屏幕上，因此无需启用此项。\n\
  \n第二个复选框是 **Multiple Touch**，它决定此控件是否能够接收多点触控事件。多点触控事件允许复杂的手势，例如许多 iOS 应用程序中用于缩放的捏合手势。我们将在第\
  \ 18 章中进一步讨论手势和多点触控事件。由于此图像视图根本不接受用户交互，因此没有理由打开多点触控事件，所以保持此复选框未选中状态。\n\n##### Alpha\
  \ 值\n\n检查器中的下一项是 **Alpha**。请谨慎使用此选项。**Alpha** 定义图像的透明度——其下方内容透过来的程度。它被定义为一个介于 0.0\
  \ 和 1.0 之间的浮点数，其中 0.0 表示完全透明，1.0 表示完全不透明。如果你使用任何小于 1.0 的值，iOS 设备将以某种透明度绘制此视图，这样其后面的任何对象都会透出来。即使图像后面没有有趣的内容，使用小于\
  \ 1.0 的值也会导致应用程序花费处理器周期将部分透明的视图合成到其背后的空白区域上。因此，除非你有非常充分的理由，否则不要将 **Alpha** 设置为 1.0\
  \ 以外的任何值。\n\n##### Background\n\n下一项 **Background** 决定了视图背景的颜色。对于图像视图，这仅在图像未填满其视图并出现信箱效应，或图像部分透明时才有影响。由于我们已经将视图调整为与图像完美匹配，因此此设置不会产生可见效果，我们可以保持其不变。\n\
  \n##### Tint\n\n\n\n### 下一个控件可让您为所选视图指定色调颜色\n\n某些视图在绘制自身时会使用这种颜色。我们稍后将在本章中使用的分段控件会利用其色调颜色进行着色，但\
  \ `UIImageView` 不会。\n\n### 绘制复选框\n\n**色调**下方是一系列**绘制**复选框。第一个标记为**不透明**。默认情况下应勾选此项；如果未勾选，请点击选中它。这告诉\
  \ iOS，视图背后不需要绘制任何内容，并允许 iOS 的绘图方法进行一些优化以加快绘图速度。\n\n您可能会想，既然我们已经将**透明度**的值设为 1.0\
  \ 来表示不透明，为什么还需要勾选**不透明**复选框。透明度值适用于要绘制的图像部分；但如果图像未完全填满图像视图，或者由于 Alpha 通道导致图像中存在空洞，无论**透明度**中设置的值如何，其下方的对象仍然会透出来。通过勾选**不透明**，我们告诉\
  \ iOS，无论如何，该视图背后永远不需要绘制任何内容，因此无需浪费时间处理其背后对象的相关操作。我们可以安全地勾选**不透明**复选框，因为我们之前选择了**适合大小**，这使得图像视图与其包含的图像尺寸相匹配。\n\
  \n**隐藏**复选框的作用正如您所想。如果勾选，用户将看不到此对象。有时隐藏对象很有用，正如您稍后在本章中隐藏开关和按钮时所见；然而，绝大多数情况下——包括现在——您希望保持此选项为未选中状态。\n\
  \n下一个复选框**清除图形上下文**，很少需要勾选。当它被勾选时，iOS 在实际绘制对象之前，会用透明黑色绘制对象覆盖的整个区域。同样，出于性能考虑以及很少需要用到它，应将其关闭。请确保此复选框处于未选中状态（默认情况下可能已勾选）。\n\
  \n**裁剪子视图**是一个有趣的选项。如果您的视图包含子视图，并且这些子视图并未完全包含在其父视图的边界内，此复选框决定了子视图的绘制方式。如果勾选**裁剪子视图**，则仅绘制子视图位于父视图边界内的部分。如果未勾选**裁剪子视图**，则子视图将被完整绘制，即使它们位于父视图边界之外。\n\
  \n**裁剪子视图**默认未勾选。看起来默认行为似乎应该与实际相反，这样子视图就不会到处绘制。然而，从数学角度讲，计算裁剪区域并仅显示子视图的部分是一项成本较高的操作；大多数情况下，子视图不会超出其父视图的边界。如果您确实出于某种原因需要，可以打开**裁剪子视图**，但出于性能考虑，它默认是关闭的。\n\
  \n本节中的最后一个复选框**自动调整子视图大小**，告诉 iOS 如果此视图调整大小，则同时调整任何子视图的大小。请保持此选项为勾选状态（由于我们不调整视图大小，因此勾选与否实际上无关紧要）。\n\
  \n### 拉伸\n\n接下来是一个简称为**拉伸**的区域。不过，您可以把瑜伽垫收进柜子里了，因为这里唯一的拉伸是以矩形视图在屏幕上调整大小时重新绘制的形式进行的。其理念是，不是让视图的整个内容统一拉伸，而是可以让视图的外边缘（例如按钮的斜边）在中心部分拉伸时保持外观不变。\n\
  \n此处设置的四个浮点值允许您通过指定视图左上角的点以及可拉伸区域的大小，来声明矩形中哪一部分是可拉伸的，所有数值均在 0.0 到 1.0 之间，表示占整体视图大小的比例。例如，如果您希望每条边缘的\
  \ 10% 不可拉伸，则需将 `X` 和 `Y` 均设为 0.1，`宽度` 和 `高度` 均设为 0.8。在此例中，我们将保留默认值：`X` 和 `Y` 为 0.0，`宽度`\
  \ 和 `高度` 为 1.0。大多数情况下，您不需要更改这些值。\n\n### 添加文本字段\n\n完成图像视图后，就该添加文本字段了。从对象库中选取一个文本字段，将其拖到视图中，放在图像视图下方。使用蓝色参考线将其与右边缘对齐，并使其紧贴图像视图下方（参见图\
  \ 4-10）。\n\n![9781484202005_Fig04-10.jpg](img/9781484202005_Fig04-10.jpg)\n\n图 4-10。我们从库中拖出一个文本字段，将其放到视图上，紧贴图像视图下方，并触及右侧的蓝色参考线\n\
  \n当您将文本字段非常靠近图像视图底部时，其上方会出现一条水平蓝色参考线。该参考线表示您正在拖动的对象与相邻对象的距离已达到最小合理距离。您可以暂时将文本字段放在那里，但为了外观更平衡，可以考虑在将其移动到右边缘的参考线之前，稍微向下移动一点。请记住，您随时可以使用\
  \ Interface Builder 再次编辑 GUI，以更改界面元素的位置和大小——无需更改代码或重新建立连接。\n\n放下文本字段后，从库中选取一个标签，然后将其拖到视图中，使其与视图的左边缘对齐，并在垂直方向上与您之前放置的文本字段对齐。请注意，当您移动标签时，会弹出多条蓝色参考线，方便您使用标签的顶部、底部或中部将标签与文本字段对齐。我们将使用基线来对齐标签和文本字段，当您在中间拖动这些参考线时，基线就会出现（参见图\
  \ 4-11）。\n\n![9781484202005_Fig04-11.jpg](img/9781484202005_Fig04-11.jpg)\n\n图 4-11。使用基线参考线对齐标签和文本字段\n\
  \n双击您刚放下的标签，将其文本从 *Label* 改为 *Name*：（请注意标签末尾的冒号字符），然后按 **Enter** 键确认更改。\n\n接下来，从库中将另一个文本字段拖到视图中，并使用参考线将其放置在第一个文本字段下方（参见图\
  \ 4-12）。\n\n![9781484202005_Fig04-12.jpg](img/9781484202005_Fig04-12.jpg)\n\n图 4-12。添加第二个文本字段\n\
  \n添加第二个文本字段后，从库中再选取一个标签，将其放置在左侧，位于现有标签下方。再次使用中间的蓝色参考线将新标签与第二个文本字段对齐。双击新标签，将其文本改为\
  \ *Number*：（同样，不要忘记冒号）。\n\n现在，让我们将底部文本字段的尺寸向左扩展，使其紧贴标签的右侧。为什么从底部文本字段开始？我们希望这两个文本字段的大小相同，并且底部的标签更长。\n\
  \n单击底部文本字段，向左拖动左侧的调整大小圆点，直到出现蓝色参考线，提示您已到达与标签应有的最近距离（参见图 4-13）。这条特定的参考线有点微妙——它只有文本字段本身那么高，所以请睁大眼睛。\n\
  \n图 4-13。（图片描述缺失，原文中图片链接未提供实际图片内容，此处按格式保留引用）\n\n\n\n![9781484202005_Fig04-13.jpg](img/9781484202005_Fig04-13.jpg)\n\
  \n图 4-13. 扩展底部文本字段的大小\n\n现在，以相同方式扩展顶部文本字段，使其大小与底部文本字段一致。同样，一条蓝色辅助线提供了帮助，且这条线一直延伸至另一个文本字段，使其更易于对齐。\n\
  \n这些文本字段基本已完成，仅剩一个小细节。请回顾图 4-5。你是否注意到**名称：**和**编号：**是右对齐的？目前，我们的这两个标签都紧贴左边缘。为了使两个标签的右侧对齐，请单击**名称：**标签，按住\
  \ `Shift` 键，再单击**编号：**标签，从而同时选中两个标签。接下来，按 `⌘4` 调出属性检查器，并确保**标签**部分已展开，以便查看标签专属属性。如果未展开，请点击标题右侧的**显示**按钮将其展开。现在，使用检查器中的**对齐**控件使这些标签的内容右对齐，然后通过选择\
  \ `编辑器 → 对齐 → 等宽` 来添加约束，确保这两个字段始终保持相同的宽度。\n\n完成后，界面应该与图 4-5 所示非常相似。唯一的区别在于每个文本字段中的浅灰色文字。我们现在就来添加这些文字。\n\
  \n选择顶部文本字段（即紧邻**名称：**标签的那个），然后按 `⌘4` 调出属性检查器（参见图 4-14）。文本字段是 iOS 控件中最复杂的控件之一，也是最常用的控件之一。让我们逐一浏览这些设置，从检查器的顶部开始。\n\
  \n![9781484202005_Fig04-14.jpg](img/9781484202005_Fig04-14.jpg)\n\n图 4-14. 显示默认值的文本字段检查器\n\
  \n### 文本字段检查器设置\n\n在第一个部分中，**文本**标签指向两个控件，它们让你可以对文本字段中将要显示的文本进行一定程度的控制。上方是一个弹出按钮，用于在纯文本和富文本之间进行选择，富文本可以包含多种字体和其他属性。我们在第\
  \ 3 章的示例中使用了富文本为部分文字添加了粗体效果。现在先将该弹出按钮设置为*纯文本*。紧接其下方，你可以为文本字段设置默认值。在此输入的任何内容都将在应用启动时显示在文本字段中，而不是显示为空白。\n\
  \n接下来是一系列控件，用于设置字体和字体颜色。我们将**颜色**保留为默认的黑色。请注意，**颜色**弹出按钮分为两部分。右侧允许你从一组预设颜色中选择，左侧则允许你访问调色板以更精确地指定颜色。\n\
  \n**字体**设置分为三部分。右侧是一个控件，允许你逐点增加或减小文本大小。左侧允许你手动编辑字体名称和大小。最后，点击“T 在方框中”图标可弹出一个窗口，让你设置各种字体属性。我们将**字体**保留为默认设置*System\
  \ 14.0*。\n\n在这些字段下方，有五个用于控制字段内文本对齐方式的按钮。我们将此设置保留为默认的左对齐（最左侧按钮）。\n\n第一部分最后，**占位符**允许你指定一段文字，该文字仅在字段没有值时以灰色显示在文本字段中。如果空间有限，你可以使用占位符代替标签，或者用它来阐明用户应在此文本字段中输入什么内容。在占位符中输入文字**输入姓名**作为当前选中的文本字段的占位符，然后按\
  \ `Enter` 键提交更改。\n\n接下来的两个字段**背景**和**禁用**，仅在你需要自定义文本字段外观时使用，这在绝大多数情况下完全没有必要，甚至是不明智的。用户期望文本字段呈现特定的外观。我们将跳过这些字段，保留其默认设置。\n\
  \n接下来是四个标记为**边框样式**的按钮。这些按钮允许你更改文本字段边缘的绘制方式。默认值（最右侧按钮）创建了 iOS 应用用户最熟悉的标准文本字段样式。你可以随意尝试所有四种样式。试验完成后，请将此设置恢复为最右侧的按钮。\n\
  \n边框设置下方是一个**清除按钮**弹出按钮，用于选择*清除按钮*何时显示。清除按钮是可能出现在文本字段右端的小 X。清除按钮通常用于搜索字段以及其他可能需要频繁更改值的字段。它们通常不包含在用于持久化数据的文本字段中，因此请保留默认设置*从不出现*。\n\
  \n**编辑时清除**复选框指定了用户触摸此字段时发生的情况。如果勾选此框，该字段之前存在的任何值都将被删除，用户将从空字段开始。如果未勾选，则之前的值将保留在字段中，用户可以对其进行编辑。请保持此复选框为未勾选状态。\n\
  \n下一个部分以一个控件开始，该控件允许你设置文本字段用于显示文本的最小字体大小。暂时保留其默认值。\n\n**自动调整**复选框指定了当文本字段尺寸缩小时，文字大小是否应相应缩小。自动调整将使所有文字在视图中保持可见，即使正常情况下文字过大而无法容纳在指定空间中。此复选框与最小字体大小设置协同工作。无论字段大小如何，文字都不会被调整到小于该最小尺寸。指定最小尺寸可以确保文字不会变得太小而难以阅读。\n\
  \n下一个部分定义了使用此文本字段时键盘的外观和行为。由于我们期望输入姓名，让我们将**大写**弹出按钮更改为*单词首字母大写*。这将使每个单词的第一个字母自动大写，这正是姓名输入中的常见需求。\n\
  \n接下来的四个弹出按钮——**更正**、**拼写检查**、**键盘**和**外观**——可以保留其默认值。花点时间查看每个选项，以了解这些设置的功能。\n\n\
  接下来是**返回键**弹出按钮。**返回**键是虚拟键盘右下角的按键，其标签会根据你正在执行的操作而变化。例如，如果你在 Safari 的搜索字段中输入文本，它会显示*搜索*。在像我们这样的应用中，文本字段与其他控件共享屏幕，*完成*是合适的选择。在此处进行更改。\n\
  \n如果勾选了**自动启用返回键**复选框，则**返回**键在文本字段中输入至少一个字符之前处于禁用状态。请保持此复选框为未勾选状态，因为我们希望允许在用户不想输入任何内容时，文本字段保持为空。\n\
  \n\n\n**Secure**复选框指定正在键入的字符是否显示在文本字段中。如果文本字段被用作密码字段，则应选中此复选框。对于我们的应用，请保持其未选中状态。\n\
  \n下一部分（您可能需要向下滚动才能看到）允许您设置继承自`UIControl`的控件属性；但是，这些属性通常不适用于文本字段，并且除了**Enabled**复选框外，不会影响字段的外观。我们希望保持这些文本字段处于启用状态，以便用户能够与它们交互。请保留此部分的默认设置。\n\
  \n检查器中的最后一部分**View**应该看起来很熟悉。它与我们之前查看的图像视图检查器中同名的部分完全相同。这些是继承自`UIView`类的属性；由于所有控件都是`UIView`的子类，它们都共享这一部分属性。与之前对图像视图所做的一样，请选中**Opaque**复选框，并取消选中**Clears\
  \ Graphics Context**和**Clip Subviews**——原因我们之前已经讨论过。\n\n#### 为第二个文本字段设置属性\n\n接下来，在视图窗口中单击下方的文本字段（即**Number:**标签旁边的那个），然后返回检查器。在**Placeholder**字段中，键入`Type\
  \ in a number`，并确保**Clear When Editing Begins**未被选中。再往下一点，单击**Keyboard**弹出菜单。由于我们希望用户只输入数字，而不是字母，请选择**Number\
  \ Pad**。在 iPhone 上，这将确保用户看到一个仅包含数字的键盘，这意味着他们将无法输入字母字符、符号或任何非数字内容。我们不需要为数字键盘设置**Return**键值，因为那种键盘样式没有**Return**键；因此，所有其他检查器设置都可以保留默认值。与之前一样，请选中**Opaque**复选框，并取消选中**Clears\
  \ Graphics Context**和**Clip Subviews**。在 iPad 上，选择**Number Pad**的效果是，当用户激活文本字段时，会弹出一个全尺寸的虚拟键盘并处于数字模式，但用户可以切换回字母输入。这意味着在实际的应用中，当处理数字字段的内容时，您必须验证用户确实输入了有效的数字。\n\
  \n**提示**  如果您真的想阻止用户在文本字段中输入除数字以外的任何内容，可以通过创建一个类来实现`UITextViewDelegate`协议的`textView:shouldChangeTextInRange:replacementText:`方法，并将其设置为文本视图的代理来实现。具体细节不算太复杂，但超出了本书的讨论范围。\n\
  \n#### 添加约束\n\n在我们继续之前，需要调整此布局的一些约束。当您在 Interface Builder 中将一个视图拖入另一个视图时（就像我们刚才所做的那样），Xcode\
  \ 不会自动为其创建任何约束。布局系统需要一组完整的约束，因此在编译应用时，Xcode 会生成一组描述布局的默认约束。创建的约束取决于每个对象在其父视图中的位置。根据对象是更靠近左侧边缘还是右侧边缘，它将被固定到左侧或右侧。类似地，根据对象是更靠近顶部边缘还是底部边缘，它将被固定到顶部或底部。如果对象在任何方向上居中，它通常会获得一个将其固定到中心的约束。\n\
  \n更复杂的是，Xcode 还可能应用自动约束，将每个新对象固定到同一父视图中的一或多个“同级”对象。这种自动行为可能符合您的期望，也可能不符合，因此通常最好在编译应用之前，在\
  \ Interface Builder 中手动创建一组完整的约束。在最后两章中，您已经看到了一些相关示例。\n\n让我们开始检查目前已有的约束。要查看特定视图的所有生效约束，请尝试选中它并打开尺寸检查器。如果您选中任何标签、文本字段或滑块，您会看到尺寸检查器显示一条消息，声称所选视图没有约束。实际上，我们一直构建的这个\
  \ GUI 只有一个我们之前应用过的约束，即绑定图像视图和容器视图水平中心的约束。单击容器视图或图像视图，即可在检查器中看到此约束。\n\n我们真正想要的是拥有一组完整的约束，以精确地告诉布局系统如何处理我们所有的视图和控件，就像在编译时自动生成的那样。幸运的是，实现这一目标非常简单。通过从容器视图的左上角内部向右下角拖拽出一个选框，选中所有视图和控件。如果您开始拖拽后发现视图本身在移动，只需松开鼠标，将鼠标向视图内部再移动一点，然后重试。当所有项目都被选中后，使用菜单执行**Editor\
  \ ![image](img/arrow.jpg) Resolve Auto Layout Issues ![image](img/arrow.jpg) Add\
  \ Missing Constraints**命令。执行此操作后，您会看到我们所有的视图和控件现在都有一些蓝色的小棒将它们彼此连接起来，并连接到容器视图。这些蓝色小棒中的每一个都代表一个约束。现在创建这些约束，而不是让\
  \ Xcode 在编译时创建它们，最大的优势在于，如果需要，我们现在有机会修改每个约束。在本书中，我们将进一步探索如何使用约束实现更多功能。\n\n**提示**  另一种为视图控制器拥有的所有视图应用约束的方法是，在文档大纲中选中视图控制器，然后使用**Editor\
  \ ![image](img/arrow.jpg) Resolve Auto Layout Issues ![image](img/arrow.jpg) Add\
  \ Missing Constraints**。\n\n通常情况下，我们在此处创建的布局不需要对这些约束进行任何特定的修改，以确保其在所有设备上都能正常工作，但这并非总是如此。例如，如果您在我们已有的两个文本字段下方添加更多文本字段，直到触及视图底部，然后让\
  \ Xcode 添加约束，您会发现它会将整列文本字段绑定到视图的底部，而不是顶部。因此，当您在比 Interface Builder 中更高的屏幕上（例如，在\
  \ iPhone 6 Plus 上）运行应用时，所有文本字段都会相对于图像视图向下移动，而不会位于您期望的位置。\n\n不过，对于我们当前的 GUI 来说，这不是问题。我们可以再次使用预览助理来验证。选择标有**Editor**的中间工具栏按钮，或通过单击**View\
  \ ![image](img/arrow.jpg) Assistant Editor ![image](img/arrow.jpg) Show Assistant\
  \ Editor**，打开助理编辑器，然后在跳转栏中选择**Preview**和`Main.storyboard`。当 4 英寸 iPhone 的预览出现后，再为\
  \ 5.5 英寸 iPhone 添加一个预览，您会发现布局与在较小手机上完全相同，尽管文本字段由于屏幕宽度更大而变得稍宽一些。在本书的后续部分，我们将处理一些需要在此方面稍作调整的\
  \ GUI；并且在后续的大多数示例中，我们将创建显式约束，而不是让 Xcode 为我们完成工作，这样您将有充足的机会熟悉手动添加约束。\n\n\n\n**Caution**\
  \ 对于这个相对简单的示例，Xcode 完全可以创建出能够保留我们所需布局的约束，但情况并非总是如此。任何时候你使用 **Editor → Resolve Auto\
  \ Layout Issues → Add Missing Constraints** 命令，都应仔细检查 Xcode 添加的约束。如果它们没有按预期工作，那么请删除它们，并使用你在第\
  \ 2 章和第 3 章中学到的技术手动添加约束。\n\n#### 创建并连接输出口\n\n我们几乎准备好要对我们应用进行首次测试了。对于界面的第一部分，剩下的工作就是创建并连接我们的输出口。界面上的图像视图和标签不需要输出口，因为我们不需要在运行时更改它们。然而，这两个文本字段将持有我们代码中需要使用的数据，因此我们需要指向它们每一个的输出口。\n\
  \n你可能还记得上一章的内容，Xcode 允许我们使用助手编辑器同时创建并连接输出口，该编辑器应该已经打开了（但如果未打开，请按之前所述将其打开）。\n\n确保项目导航器中选中了你的故事板文件。如果你的屏幕空间不够大，你可能还想在这一步中选择\
  \ **View → Utilities → Hide Utilities** 来隐藏工具面板。在助手编辑器的跳转栏中，选择 **Automatic**，你应该会看到\
  \ `ViewController.h` 或 `ViewController.m`（参见图 4-15）。\n\n![9781484202005_Fig04-15.jpg](img/9781484202005_Fig04-15.jpg)\n\
  \n图 4-15. 打开了助手编辑器的故事板编辑区域。你可以在右侧看到助手编辑器，显示来自 `ViewController.m` 的代码\n\n现在进入有趣的部分。确保助手编辑器中显示的是\
  \ `ViewController.m`（如有必要，使用跳转栏返回）。接下来，从视图中的顶部文本字段按住 Control 拖拽到 `ViewController.m`\
  \ 文件中，正好在 `@interface` 行的下方。你将会看到一个灰色的弹出窗口，显示 **Insert Outlet, Action, or Outlet\
  \ Collection**（参见图 4-16）。松开鼠标按钮，你将看到与上一章相同的弹出窗口。我们想要创建一个名为 `nameField` 的输出口，因此在\
  \ **Name** 字段中输入 **nameField**（快速说五遍！），然后按 **Return** 键或点击 **Connect** 按钮。\n\n![9781484202005_Fig04-16.jpg](img/9781484202005_Fig04-16.jpg)\n\
  \n图 4-16. 在打开助手的情况下，我们按住 Control 拖拽到源代码上，以便同时创建 `nameField` 输出口并将其连接到相应的文本字段\n\n\
  你现在在 `ViewController` 中有了一个名为 `nameField` 的属性，并且它已连接到顶部文本字段。对第二个文本字段执行相同操作，创建并将其连接到一个名为\
  \ `numberField` 的属性。\n\n#### 关闭键盘\n\n让我们看看我们的应用运行得如何，好吗？选择 **Product → Run**。你的应用应该在\
  \ iOS 模拟器中启动。点击 **Name** 文本字段，传统的键盘就会出现。输入一个名字，然后点击 **Number** 字段。数字键盘应该会出现（参见图\
  \ 4-17）。Cocoa Touch 仅通过向界面添加文本字段就免费提供了所有这些功能。\n\n![9781484202005_Fig04-17.jpg](img/9781484202005_Fig04-17.jpg)\n\
  \n图 4-17. 当你触摸文本字段或数字字段时，键盘会自动弹出\n\n呜呼！但有个小问题。你怎么才能让键盘消失呢？请尽管试试。我们在这里等着你。\n\n**提示**\
  \ 如果键盘在模拟器上没有显示，请尝试选择 **Hardware → Keyboard → Toggle Software Keyboard**。\n\n#####\
  \ 点击 Done 时关闭键盘\n\n由于键盘是基于软件的而不是物理键盘，我们需要采取一些额外的步骤来确保用户使用完毕后键盘消失。当用户点击文本键盘上的 **Done**\
  \ 按钮时，将生成一个 `Did End On Exit` 事件；此时，我们需要告诉文本字段放弃控制权，以便键盘消失。为此，我们需要向我们的控制器类添加一个操作方法。\n\
  \n在项目导航器中选择 `ViewController.m`，并在文件底部、`@end` 之前添加以下操作方法：\n\n```\n- (IBAction)textFieldDoneEditing:(id)sender\
  \ {\n    [sender resignFirstResponder];\n}\n```\n\n正如你在第 2 章中学到的，第一响应者是用户当前正在交互的控件。在我们的新方法中，我们告诉我们的控件辞去第一响应者，将角色让给用户之前使用的控件。当文本字段让出第一响应者状态时，与其关联的键盘将消失。\n\
  \n保存你刚刚编辑的文件。让我们跳回故事板，并从我们的两个文本字段触发这个操作。\n\n在项目导航器中选择 `Main.storyboard`，单击 **Name**\
  \ 文本字段，然后按 **`⌃6`** 调出连接检查器。这次，我们不需要上一章中使用的 `Touch Up Inside` 事件。相反，我们需要 `Did End\
  \ On Exit`，因为当用户点击文本键盘上的 **Done** 按钮时，该事件会触发。\n\n从 **Did End On Exit** 旁边的圆圈拖拽到故事板中的黄色\
  \ **View Controller** 图标上（位于你一直在配置的视图正上方的栏中），然后松开鼠标。会出现一个小的弹出菜单，其中包含一个我们刚刚添加的操作的名称。点击\
  \ `textFieldDoneEditing:` 操作以选中它。你也可以通过拖拽到辅助视图中的 `textFieldDoneEditing:` 方法来做到这一点。对另一个文本字段重复此过程，保存你的更改，然后按\
  \ **`⌘R`** 再次运行应用。\n\n当模拟器出现时，点击 **Name** 字段，输入一些内容，然后点击 **Done** 按钮。果然，键盘消失了，正如你所料。太棒了！但是\
  \ **Number** 字段呢？呃，那个键盘上的 **Done** 按钮在哪里（参见图 4-17）？\n\n嗯，糟糕！并非所有键盘布局都有 **Done**\
  \ 按钮。我们可以强制用户点击 **Name** 字段，然后点击 **Done**，但这不太用户友好，不是吗？我们当然希望我们的应用是用户友好的。让我们看看如何处理这种情况。\n\
  \n##### 触摸背景来关闭键盘\n\n你还记得 Apple 的 iPhone 应用在这种情况下是如何处理的吗？嗯，在大多数带有文本字段的地方，点击视图中没有活动控件的任何位置都会使键盘消失。我们如何实现这一点？\n\
  \n答案可能会让你惊讶，因为它非常简单。我们的视图控制器有一个名为 `view` 的属性，它继承自 `UIViewController`。这个 `view` 属性对应于故事板中的\
  \ View。`view` 属性指向一个 `UIView` 的实例，该实例充当用户界面中所有项的容器。它有时被称为**容器视图**，因为它的主要目的是简单地容纳其他视图和控件。出于所有实际目的，容器视图就是我们用户界面的背景。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵守您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n使用`Interface Builder`，我们可以改变`view`指向的对象的类，使其底层类从`UIView`变为`UIControl`。由于`UIControl`是`UIView`的子类，将我们的`view`属性连接到`UIControl`实例是完全合适的。请记住，当一个类继承另一个类时，它只是那个类的一个更专业化的版本，所以`UIControl`*就是*一个`UIView`。如果我们简单地将由`UIView`创建的实例更改为`UIControl`，我们就获得了触发操作方法的能力。不过在此之前，我们需要创建一个在点击背景时会被调用的操作方法。\n\
  \n我们需要在控制器类中再添加一个操作方法。将以下方法添加到你的`ViewController.m`文件中，放在`@end`之前：\n\n```\n- (IBAction)backgroundTap:(id)sender\
  \ {\n    [self.nameField resignFirstResponder];\n    [self.numberField resignFirstResponder];\n\
  }\n```\n\n这个方法只是告诉两个文本字段，如果它们拥有第一响应者状态，就放弃该状态。在一个不是第一响应者的控件上调用`resignFirstResponder`是完全安全的，因此我们可以在这两个文本字段上都调用它，而无需检查它们中任何一个是否为第一响应者。\n\
  \n保存此文件。现在，再次选择故事板。确保你的文档大纲已展开（点击编辑区域左下角的三角形图标可切换），然后单击**View**使其被选中。*不要*选择视图的子项；我们需要的是容器视图本身。\n\
  \n接下来，按**![image](img/sym2.jpg)![image](img/flower.jpg)3**调出**身份检查器**（参见图 4-18）。在这里，你可以更改故事板中任何对象实例的底层类。\n\
  \n![9781484202005_Fig04-18.jpg](img/9781484202005_Fig04-18.jpg)\n\n图 4-18。我们将`Interface\
  \ Builder`切换为列表视图并选中了视图。然后切换到身份检查器，它允许我们更改故事板中任何对象实例的底层类\n\n标记为**Class**的字段当前应显示为`UIView`。如果没有显示，你可能没有选中容器视图。现在，将该设置更改为`UIControl`并按**Return**键确认更改。所有能够触发操作方法的控件都是`UIControl`的子类；通过更改底层类，我们刚刚赋予了此视图触发操作方法的能力。你可以按**![image](img/sym2.jpg)![image](img/flower.jpg)6**调出连线检查器来验证这一点。现在你应该看到所有之前章节中将按钮连接到操作时看到的那些事件。\n\
  \n将“按下”事件拖拽到**View Controller**图标（参见图 4-19），并选择`backgroundTap:`操作。现在，触摸视图中没有活动控件的任何地方都将触发我们新的操作方法，这将导致键盘收起。像这样连接到`View\
  \ Controller`与在代码中连接到方法完全相同。在故事板内部，`View Controller`仅仅是视图控制器类的一个实例，因此这只是实现完全相同结果的一种略有不同的方式。\n\
  \n![9781484202005_Fig04-19.jpg](img/9781484202005_Fig04-19.jpg)\n\n图 4-19。通过将视图的类从`UIView`更改为`UIControl`，我们获得了在任何标准事件上触发操作方法的能力。我们将视图的“按下”事件连接到`backgroundTap:`操作\n\
  \n**注意** 你可能想知道为什么我们选择了**Touch Down**而不是上一章中使用的**Touch Up Inside**。答案是背景不是一个按钮。在用户看来它不是一个控件，因此大多数用户不会想到要拖拽手指到某处来取消操作。\n\
  \n保存故事板，然后再次编译并运行你的应用程序。这一次，键盘不仅会在点击**Done**按钮时消失，而且在你点击任何非活动控件的地方时也会消失，这正是用户期望的行为。\n\
  \n很好！既然我们已经完美地处理了这一部分，你准备好进入下一组控件了吗？\n\n### 添加滑块和标签\n\n现在该添加滑块及其配套的标签了。请记住，标签中的值会随着滑块的使用而改变。在项目导航器中选择`Main.storyboard`，这样我们就可以向应用程序的用户界面添加更多项目。\n\
  \n在放置滑块之前，让我们为设计增加一点呼吸空间。我们用来确定顶部文本字段与其上方图像之间间距的蓝色引导线，实际上是关于最小间距的建议。换句话说，蓝色引导线告诉你“不要再靠近了”。将两个文本字段及其标签向下拖动一点，以图\
  \ 4-1 为参考。现在让我们添加滑块。\n\n从对象库中拖入一个滑块，并将其排列在**Number**文本字段下方，以右侧的蓝色引导线作为停止点，并在底部文本字段下方留出一点空间。我们的滑块最终位于视图的大约一半位置。单击新添加的滑块以选中它，然后按**![image](img/sym2.jpg)![image](img/flower.jpg)4**返回属性检查器（如果它尚未可见，参见图\
  \ 4-20）。\n\n![9781484202005_Fig04-20.jpg](img/9781484202005_Fig04-20.jpg)\n\n图 4-20。显示滑块默认属性的检查器\n\
  \n滑块允许你在给定范围内选择一个数字。使用检查器将**Minimum**值设置为`1`，**Maximum**值设置为`100`，**Current**值设置为`50`。保持**Events\
  \ Continuous Update**复选框处于选中状态。这确保了当滑块值变化时，会持续产生事件流。这就是我们现在需要担心的全部内容。\n\n拖入一个标签并将其放置在滑块旁边，使用蓝色引导线使其在垂直方向上与滑块对齐，并将其左边缘与视图的左边界对齐（参见图\
  \ 4-21）。\n\n![9781484202005_Fig04-21.jpg](img/9781484202005_Fig04-21.jpg)\n\n图 4-21。放置滑块的标签\n\
  \n双击新放置的标签，将其文本从`Label`更改为`100`。这是滑块可以容纳的最大值，我们可以用它来确定正确的滑块宽度。由于“100”比“Label”短，`Interface\
  \ Builder`会自动为你缩小标签，就像你拖动了右中部的调整点一样。尽管有这种自动行为，你当然仍然可以自由地按需调整标签大小。如果你后来决定希望工具再次为你选择最佳尺寸，只需按**![image](img/flower.jpg)=**或选择**Editor\
  \ ![image](img/arrow.jpg) Size to Fit Content**。\n\n接下来，调整滑块大小：单击滑块以选中它，然后将左侧调整点向左拖动，直到蓝色引导线指示你已靠近标签的右侧边缘。\n\
  \n### 添加更多约束\n\n\n\n"
- "# 现在我们已经添加了两个新控件，接下来需要补充对应的 Auto Layout 约束。\n\n这次我们依然用简单的方法来处理：只需在文档大纲中选择 `View\
  \ Controller` 图标，然后点击 `Editor → Resolve Auto Layout Issues → Add Missing Constraints`\
  \ 即可。不过还没完，由于我们为了调整间距将文本字段和标签向下移动了一些，因此需要更新它们的约束以匹配新位置。如果不这样做，你将在活动视图中看到警告，提示它们在运行时会出现位置偏差。要修复此问题，请再次在文档大纲中选择\
  \ `View Controller` 图标，然后选择 `Editor → Resolve Auto Layout Issues → Update Constraints`。Xcode\
  \ 会调整约束，使其与屏幕上所有控件的位置匹配，活动视图中的警告也会消失。\n\n### 创建并连接动作和输出口\n\n对于这两个控件，剩下的工作就是连接输出口和动作。我们需要一个指向标签的输出口，以便在滑动滑块时更新标签的值。另外还需要为滑块创建一个动作方法，使其在变化时被调用。\n\
  \n请确保你正在使用助理编辑器并编辑 `ViewController.m`，然后按住 Control 键从滑块拖拽到助理编辑器中 `@end` 声明之上。在弹出的窗口中，`Connection`\
  \ 字段会预设为 `Action`。在 `Name` 字段中输入 `sliderChanged`，并将 Type 设置为 `UISlider`，然后按 `Return`\
  \ 键创建并连接动作。\n\n接下来，按住 Control 键从新添加的标签（显示“100”的那个）拖拽到助理编辑器。这次拖拽到文件顶部 `@interface`\
  \ 和 `@end` 之间最后一个属性声明下方。在弹出的窗口中，在 `Name` 文本字段中输入 `sliderLabel`，然后按 `Return` 键创建并连接输出口。\n\
  \n### 实现动作方法\n\n虽然 Xcode 已经创建并连接了动作方法，但我们仍需自行编写动作方法的实际代码，使其完成应有的功能。将以下代码添加到 `sliderChanged:`\
  \ 方法中：\n\n```\n- (IBAction)sliderChanged:(UISlider *)sender {\n    int progress\
  \ = (int)lroundf(sender.value);\n    self.sliderLabel.text = [NSString stringWithFormat:@\"\
  %d\", progress];\n}\n```\n\n方法中的第一行获取滑块的当前值，将其四舍五入为最接近的整数，并赋值给一个整型变量。第二行代码创建包含该数字的字符串，并将其赋值给标签。\n\
  \n这样，控制器对滑块移动的响应就处理好了；但为了保持一致性，我们需要确保在用户触摸滑块之前，标签就已显示正确的滑块值。将以下代码添加到 `viewDidLoad`\
  \ 方法中：\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // 在从 nib 加载视图后进行任何额外的设置\n\
  \    self.sliderLabel.text = @\"50\";\n}\n```\n\n上述方法会在运行中的应用从故事板文件加载视图后、显示到屏幕前立即执行。我们添加的这行代码确保用户能立即看到正确的起始值。\n\
  \n保存文件。然后按 `⌘R` 键构建并在 iOS 模拟器中启动应用，尝试滑动滑块。当你移动滑块时，应该能看到标签文本实时变化。又一个环节落实到位。\n\n但如果你将滑块向左拖拽（使值低于\
  \ 10）或向右拖到底（将值设为 100），你会发现一个奇怪的现象。左边的标签在显示单个数字时会水平收缩，显示三个数字时则会水平扩展。虽然因为你看不到标签本身（除了其包含的文本），所以无法看到它大小的变化，但你会看到滑块实际随着标签一起改变大小——变小或变大。它保持着与标签的大小关系，确保两者之间的间距始终不变。\n\
  \n这并非我们主动要求的，对吧？确实不是。这仅仅是 Interface Builder 工作方式的一个副作用，它有助于帮助你创建响应式且流畅的图形用户界面。我们之前创建了一些默认约束，现在你正看到一个约束在起作用。Interface\
  \ Builder 创建的其中一个约束保持了这些元素之间的水平间距恒定。\n\n幸运的是，你可以通过创建自己的约束来覆盖这种行为。回到 Xcode，在故事板中选择标签，然后从菜单中选择\
  \ `Editor → Pin → Width`。这会创建一个新的高优先级约束，告诉布局系统：“不要改变这个标签的宽度。” 如果你现在按 `⌘R` 键再次构建并运行，你会看到标签不再随滑块左右拖拽而伸缩变化。\n\
  \n我们将在本书中看到更多约束及其用途的示例。但现在，让我们先来实现开关。\n\n## 实现开关、按钮和分段控件\n\n再次回到 Xcode。是不是有点晕了？这种来回切换可能看起来有些奇怪，但在开发过程中，在源代码、故事板和\
  \ nib 文件之间切换，并在 iOS 模拟器中测试应用，是相当常见的操作。\n\n我们的应用将包含两个开关，它们是只有两种状态（开和关）的小型控件。我们还将添加一个分段控件来隐藏和显示这两个开关。配合这个控件，我们还会添加一个按钮，当点击分段控件的右侧时会显示该按钮。接下来实现这些功能。\n\
  \n回到故事板，从对象库中拖拽一个分段控件（参见图 4-22），将其放置到视图窗口中，位于滑块下方稍靠水平居中的位置。\n\n![9781484202005_Fig04-22.jpg](img/9781484202005_Fig04-22.jpg)\n\
  \n图 4-22. 将分段控件从库拖拽到父视图左侧时的显示效果\n\n**提示** 为了让你对我们希望的间距有概念，可以看一下带有 Apress 标志的图像视图。我们试图在图像视图上方和下方留出大致相同的空间。对于滑块我们也做了同样处理：尽量在滑块上方和下方留出大致相同的空间。\n\
  \n双击分段控件上的 `First` 字样，将标题从 `First` 改为 `Switches`。完成此操作后，对 `Second` 段重复此步骤，将其重命名为\
  \ `Button`（参见图 4-23），然后将控件拖回居中位置。\n\n![9781484202005_Fig04-23.jpg](img/9781484202005_Fig04-23.jpg)\n\
  \n图 4-23. 重命名分段控件中的分段\n\n### 添加两个带标签的开关\n\n接下来，从库中选取一个开关，将其放置到视图上，位于分段控件下方并紧贴左边距。现在拖拽第二个开关，将其放置到紧贴右边距的位置，并与第一个开关垂直对齐（参见图\
  \ 4-24）。\n\n![9781484202005_Fig04-24.jpg](img/9781484202005_Fig04-24.jpg)\n\n图 4-24.\
  \ 向视图中添加开关\n\n\n**提示** 在 Interface Builder 中按住 `![image](img/sym2.jpg)` 键并拖动对象，将会创建该对象的一个副本。当需要创建多个相同对象的实例时，从库中仅拖出一个对象，然后按住\
  \ Option 键拖出所需数量的副本，效率会更高。\n\n我们添加的三个新控件需要布局约束。这次我们将手动添加约束。首先，选中分段控件，然后从菜单中选择 **Editor\
  \ `![image](img/arrow.jpg)` Align `![image](img/arrow.jpg)` Horizontal Center in\
  \ Container**，将其固定在视图中央。接下来，用鼠标选中分段控件，然后向上方小幅 Control-拖动，直到主视图背景变为蓝色。松开鼠标，在弹出的菜单中选择\
  \ **Top Space to Top Layout Guide**，以固定分段控件到视图顶部的距离。\n\n现在来处理开关。从左侧开关向左上方斜向 Control-拖动，朝向相对于开关的\
  \ 10 点钟方向，然后松开鼠标。按住 **Shift** 键，从弹出菜单中选择 **Leading Space to Container Margin** 和\
  \ **Top Space to Top Layout Guide**，然后按下 **Return** 键或点击弹出菜单之外的任意位置以应用约束。对另一个开关执行类似操作，但这次向右上方（2\
  \ 点钟方向）Control-拖动，并选择 **Trailing Space to Container Margin** 和 **Top Space to Top\
  \ Layout Guide**。当通过拖动应用约束时，Xcode 会根据你拖动的方向提供不同的选项。如果横向拖动，你会得到将控件固定到其父视图左边距或右边距的选项；而纵向拖动时，Xcode\
  \ 会假定你要设置控件相对于父视图顶部或底部的位置。这里，每个开关需要一个横向和一个纵向约束，所以我们斜向拖动以向 Xcode 表明意图，从而获得了横向和纵向两个选项。\n\
  \n### 连接与创建输出口和操作\n\n在添加按钮之前，我们将为两个开关创建输出口并连接它们。接下来要添加的按钮实际上会位于开关之上，这使得从开关进行 Control-拖动或向开关进行\
  \ Control-拖动更加困难，因此我们希望在添加按钮之前处理好开关的连接。由于按钮和开关永远不会同时可见，将它们放在同一物理位置不会有问题。\n\n使用辅助编辑器，从左侧开关\
  \ Control-拖动到 `ViewController.m` 中最后一个输出口的下方。当弹出窗口出现时，将输出口命名为 `leftSwitch`，然后按 **Return**\
  \ 键。对另一个开关重复此过程，将其输出口命名为 `rightSwitch`。\n\n现在，再次单击左侧开关将其选中。再次向辅助编辑器 Control-拖动。这次，拖动到\
  \ `@end` 声明正上方，然后松开。当弹出窗口出现时，将新的操作方法命名为 `switchChanged:`，并将其 `sender` 参数的类型设置为 `UISwitch`。接下来，按\
  \ **Return** 键创建新操作。现在对右侧开关重复此过程，但有一处更改：不要创建新操作，而是拖动到刚刚创建的 `switchChanged:` 操作并连接到它。就像我们在前一章中所做的那样，我们将使用单一方法来处理两个开关。\n\
  \n最后，从分段控件向辅助编辑器 Control-拖动，拖动到 `@end` 声明正上方。插入一个名为 `toggleControls:` 的新操作方法，就像之前所做的那样。这次，将其\
  \ `sender` 参数的类型设置为 `UISegmentedControl`。\n\n### 实现开关操作\n\n保存故事板，让我们向已经在辅助视图中打开的\
  \ `ViewController.m` 中添加更多代码。找到自动为你添加的 `switchChanged:` 方法，并向其中添加以下代码：\n\n```\n\
  - (IBAction)switchChanged:(UISwitch *)sender {\n    BOOL setting = sender.isOn;\n\
  \    [self.leftSwitch setOn:setting animated:YES];\n    [self.rightSwitch setOn:setting\
  \ animated:YES];\n}\n```\n\n`switchChanged:` 方法在两个开关中的任意一个被点击时调用。在该方法中，我们只需获取 `sender`（代表被按下的开关）的\
  \ `isOn` 值，并使用该值来设置两个开关。这里的思路是，设置一个开关的值会同时改变另一个开关，从而使它们始终同步。\n\n现在，`sender` 始终是\
  \ `leftSwitch` 或 `rightSwitch`，所以你可能会想，为什么我们要同时设置它们。原因在于实用性。每次同时设置两个开关的值，比判断哪个开关调用了该方法并仅设置另一个开关要省事。无论哪个开关调用了该方法，它本身的值已经设置为正确的数值，再次将其设置为相同数值不会产生任何影响。\n\
  \n### 添加按钮\n\n接下来，返回 Interface Builder，从库中拖出一个 Button 到你的视图。将此按钮直接添加到最左侧开关的顶部，使其与左边距对齐，并使其顶部边缘与两个开关的顶部边缘垂直对齐（参见图\
  \ 4-25）。\n\n![9781484202005_Fig04-25.jpg](img/9781484202005_Fig04-25.jpg)\n\n图 4-25。在现有开关顶部添加一个按钮\n\
  \n现在，抓住右侧中间的大小调整手柄，一直向右拖动，直到到达指示右边距的蓝色辅助线。按钮应完全覆盖两个开关所占的空间，但由于默认按钮是透明的，你仍然会看到开关（参见图\
  \ 4-26）。\n\n![9781484202005_Fig04-26.jpg](img/9781484202005_Fig04-26.jpg)\n\n图 4-26。圆角矩形按钮在放置并调整大小后，将填充两个开关所占的空间\n\
  \n双击新添加的按钮，将其标题设置为 *Do Something*。\n\n该按钮需要 Auto Layout 约束。我们将把它固定到主视图的顶部以及两侧。从按钮向上\
  \ Control-拖动，直到视图背景变为蓝色，然后松开鼠标并选择 **Top Space to Top Layout Guide**。接着，水平 Control-拖动，直到主视图背景再次变为蓝色，并选择\
  \ **Leading Space to Container Margin**。只有当你向左拖动足够远时，才会看到此选项；因此如果没有看到，请重试并向左拖动，直到鼠标超出按钮边界。最后，向右\
  \ Control-拖动，直到主视图背景变为蓝色，然后选择 **Trailing Space to Container Margin**。现在运行应用程序，看看我们刚刚做了什么。\n\
  \n### 美化按钮\n\n如果你将正在运行的应用程序与图 4-2 进行比较，可能会发现一个有趣的差异。你的 **Do Something** 按钮看起来与图中的按钮不同。这是因为，从\
  \ iOS 7 开始，默认按钮具有非常简洁的外观：它只是一段纯文本，没有轮廓、边框、背景颜色或其他装饰特征。这很好地符合了苹果针对 iOS 7 及更高版本的设计指南，但仍有需要使用自定义按钮的情况，因此我们将向你展示如何操作。\n\
  \n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项，将给定的英文文本翻译成中文。\n\n\n许多你在 iOS 设备上看到的按钮都使用图像绘制。我们在本书源代码归档的`04\
  \ – Button Images`文件夹中提供了你可以在本示例中使用的图像。在 Xcode 的项目导航器中，选择`Images.xcassets`（与我们之前为\
  \ Apress 标志添加图像时使用的同一资源目录），然后直接将`04 – Button Images`文件夹中的两个图像从 Finder 拖拽到 Xcode\
  \ 窗口的编辑区域。这些图像会被添加到你的项目，并立即可用于你的应用。\n\n#### 可拉伸图像\n\n现在，查看我们刚刚添加的两个按钮图像，你可能会被它们的大小所震惊。它们非常小，似乎太窄了，无法填满你添加到故事板中的按钮。这是因为这些图形本应是可拉伸的。实际上，`UIKit`可以将图形拉伸，以完美地填充你想要的任何尺寸。可拉伸图像是一个有趣的概念。可拉伸图像是一种可调整大小的图像，知道如何智能地调整自身大小，从而保持正确的外观。对于这些按钮模板，我们不希望边缘与图像的其余部分均匀拉伸。**边缘插图**是图像中不应调整大小的部分（以像素为单位）。我们希望边缘周围的斜面保持不变，无论我们把按钮做成多大，因此我们需要指定每条边由多少不可拉伸空间构成。\n\
  \n在过去，这只能通过代码实现。你必须使用图形程序来测量图像的像素边界，然后在代码中使用这些数值来设置边缘插图。Xcode 6 通过让你以可视方式“切片”资源目录中的任何图像，消除了这一需求！这就是我们接下来要做的。\n\
  \n在 Xcode 中选择`Images.xcassets`资源目录，然后在其中选择`whiteButton`。在编辑区域的底部，你会看到一个标记为**Show\
  \ Slicing**的按钮。点击它以启动切片过程，该过程首先会在你的图像正上方放置一个**Start Slicing**按钮。奇迹由此开始，所以点击它！你会看到三个新按钮，让你选择是否要垂直、水平或双向切片图像。选择中间的按钮进行双向切片。Xcode\
  \ 会快速分析你的图像，然后找到边缘看似具有独特像素的部分，以及中间应可重复的垂直和水平切片。你将看到这些边界由虚线表示，如图 4-27 所示。如果你的图像比较复杂，可能需要调整这些边界（这很容易做到，只需用鼠标拖拽它们即可）；但对于这个图像，自动边缘插图效果很好。\n\
  \n![9781484202005_Fig04-27.jpg](img/9781484202005_Fig04-27.jpg)\n\n图 4-27. 这是白色按钮的默认切片外观\n\
  \n接下来，选择`blueButton`并对其执行相同的自动切片操作。全部完成！现在该使用这些图形了。\n\n回到你一直在处理的故事板，单击**Do Something**按钮。选中按钮后，按下**![image](img/sym2.jpg)![image](img/flower.jpg)4**打开属性检查器。在检查器中，使用第一个弹出菜单将类型从*System*更改为*Custom*。你会在检查器中看到，可以为按钮指定一个图像（`Image`）和一个背景（`Background`）。我们将使用背景来显示可调整大小的图形，因此点击**Background**弹出菜单并选择`whiteButton`。你会看到按钮现在显示白色图形，完美拉伸覆盖整个按钮框架。太棒了！\n\
  \n现在，我们想使用蓝色按钮来定义此按钮高亮状态的外观，即按钮被按下时看到的状态。我们将在本章下一节中更详细地讨论控件状态；但现在，先看一下顶部第二个标记为**State\
  \ Config**的弹出菜单。一个`UIButton`可以有多个状态，每个状态都有自己的文本和图像。目前我们一直在配置默认状态，因此将此弹出菜单切换到*Highlighted*，以便我们可以配置该状态。你会看到**Background**弹出菜单已被清空；点击它选择`blueButton`，就完成了！\n\
  \n这个新按钮外观只有一个问题：默认的`UIButton`尺寸不够高，无法正确显示我们导入的渐变按钮。实际上，活动视图（Activity View）中有一条警告，指示按钮在运行时将具有不同的框架。你可以通过选择按钮，然后点击菜单中的**Editor\
  \ ![image](img/arrow.jpg) Resolve Auto Layout Issues ![image](img/arrow.jpg) Update\
  \ Frames** 来解决此问题。\n\n配置此按钮引入了两个新概念：**可拉伸图像**和**控件状态**。我们已经讨论过前者，现在让我们来解决后者。\n\n\
  #### 控件状态\n\n每个 iOS 控件都有四种可能的控件状态，并且在任何给定时刻，始终处于其中一种且仅一种状态：\n\n*   **Normal（正常）**：最常见的状态是正常控件状态，即默认状态。这是控件不处于任何其他状态时的状态。\n\
  *   **Highlighted（高亮）**：高亮状态是控件正在被使用时的状态。对于按钮，这指的是用户手指按在按钮上的状态。\n*   **Disabled（禁用）**：当控件被关闭时，它处于禁用状态。可以通过取消选中\
  \ Interface Builder 中的**Enabled**复选框，或设置控件的`enabled`属性为`NO`来实现。\n*   **Selected（选中）**：只有部分控件支持选中状态。它通常用于指示控件已打开或已被选中。Selected\
  \ 与 Highlighted 类似，但即使用户不再直接使用该控件，它也可以继续保持选中状态。\n\n某些 iOS 控件的属性可以根据其状态取不同的值。例如，通过为`UIControlStateNormal`指定一个图像，为`UIControlStateHighlighted`指定另一个图像，我们是在告诉\
  \ iOS，当用户手指按在按钮上时使用一个图像，而其他时间使用另一个图像。这基本上就是我们在故事板中为按钮配置两个不同背景状态时所做的事情。\n\n#### 连接并创建按钮\
  \ Outlet 和 Action\n\n从新按钮按住 Control 键拖拽到助理编辑器，放置在文件顶部部分中最后一个 Outlet 的正下方。当弹出窗口出现时，创建一个名为`doSomethingButton`的新\
  \ Outlet。完成此操作后，再次从按钮按住 Control 键拖拽到文件底部`@end`声明的正上方。在那里，创建一个名为`buttonPressed:`的\
  \ Action，并将类型设置为`UIButton`。\n\n如果你保存工作并测试运行该应用程序，你会看到分段控件将处于活动状态，但它暂时还不会做任何特别有用的事情。我们需要添加一些逻辑，以使按钮和开关显示和隐藏。\n\
  \n\n\n我们还需要从一开始就将按钮标记为隐藏。之前我们没有这样做，是因为那会让连接插口和动作变得更加困难。不过，既然已经完成了连接，现在就来隐藏这个按钮。当用户点击分段控件的右侧时，我们会显示该按钮；但在应用启动时，我们希望按钮是隐藏的。在故事板中，选中该按钮，然后按下\
  \ **![image](img/sym2.jpg)![image](img/flower.jpg)4** 调出属性检查器。向下滚动到 **View** 部分，勾选\
  \ **Hidden** 复选框。按钮在 Interface Builder 中仍然可见，但会显示为褪色和透明状态，以表示其隐藏状态。\n\n### 实现分段控件动作\n\
  \n保存故事板，再次将注意力集中到 `ViewController.m` 上。找到 Xcode 为我们创建的 `toggleControls:` 方法，并将加粗的代码添加到其中：\n\
  \n```\n- (IBAction)toggleControls:(UISegmentedControl *)sender {\n    // 0 == switches\
  \ 索引\n    if (sender.selectedSegmentIndex == 0) {\n        self.leftSwitch.hidden\
  \ = NO;\n        self.rightSwitch.hidden = NO;\n        self.doSomethingButton.hidden\
  \ = YES;\n    } else {\n        self.leftSwitch.hidden = YES;\n        self.rightSwitch.hidden\
  \ = YES;\n        self.doSomethingButton.hidden = NO;\n    }\n}\n```\n\n这段代码检查了\
  \ `sender` 的 `selectedSegmentIndex` 属性，该属性告诉我们当前选中的是哪个分段。第一个分段名为 `switches`，其索引为\
  \ 0。我们在注释中注明了这一点，这样以后再次查看代码时，就能明白发生了什么。根据选中的分段，我们相应地隐藏或显示对应的控件。\n\n在运行应用之前，让我们做一个小的调整，让它看起来更好一些。随着\
  \ iOS 7 的推出，Apple 引入了一些新的 GUI 范式。其中之一是屏幕顶部的状态栏在 iOS 7 应用中是透明的，以便你的内容能够直接透过它显示出来。目前，那个黄色的\
  \ Apress 图标在我们应用的白色背景上显得格外突出，所以让我们将黄色扩展到覆盖整个视图。在 `Main.storyboard` 中，选择主内容视图，按下\
  \ **![image](img/sym2.jpg)![image](img/flower.jpg)4** 调出属性检查器。点击标记为 **Background**\
  \ 的颜色样品，打开标准的 OS X 颜色选择器。这个颜色选择器的一个功能是，它允许你选择屏幕上看到的任何颜色。打开颜色选择器后，点击故事板中的 Apress\
  \ 图像视图以选中它。现在点击颜色选择器左上角的放大镜图标，然后再次点击 Apress 图像视图。你应该会在颜色选择器的顶部，放大镜旁边看到 Apress 图像的背景颜色。要将其设置为主内容视图的背景颜色，请在文档大纲中选择主视图（它被称为\
  \ **Control**，因为我们之前将其类更改为 `UIControl`），然后在颜色选择器中点击该颜色。完成后，关闭颜色选择器。\n\n在你的屏幕上，你可能会发现背景和\
  \ Apress 图像的颜色略有不同，但在模拟器或设备上运行时，它们会是相同的。这些颜色在 Interface Builder 中看起来不同，是因为 OS X\
  \ 会根据你使用的显示器自动适配颜色。在 iOS 设备和模拟器上，不会发生这种情况。\n\n现在运行你的应用，你会看到黄色填充了整个屏幕，状态栏和应用内容之间没有可见的界限。如果你的应用没有全屏滚动内容，或者其他需要在屏幕顶部使用导航栏或其他控件的内容，这可以成为一种很好的方式，来显示不受状态栏过多干扰的全屏内容。\n\
  \n如果你正确地输入了所有代码，应该能够通过分段控件在按钮和两个开关之间进行切换。而且，如果你点击任何一个开关，另一个开关也会随之改变其值。然而，按钮仍然没有任何功能。在实现它之前，我们需要讨论一下操作表和警告框。\n\
  \n## 实现操作表和警告框\n\n**操作表**和**警告框**都用于向用户提供反馈：\n\n- 操作表用于强制用户在两个或多个选项之间做出选择。在 iPhone\
  \ 上，操作表从屏幕底部弹出，并显示一系列按钮（参见图 4-3）。在 iPad 上，你需要指定操作表相对于另一个视图（通常是按钮）的位置。在用户点击其中一个按钮之前，他们无法继续使用应用。操作表通常用于确认潜在危险或不可逆的操作，例如删除对象。\n\
  - 警告框以屏幕中央的圆角矩形形式出现（参见图 4-4）。与操作表一样，警告框强制用户在继续使用应用之前做出响应。警告框通常用于通知用户发生了重要或异常事件。与操作表一样，警告框可以只显示一个按钮，但如果有多种合适的响应，你也可以选择显示多个按钮。\n\
  \n**注意** 强制用户在继续使用应用之前做出选择的视图，被称为模态视图。\n\n### 显示操作表\n\n让我们切换到 `ViewController.m`\
  \ 并实现按钮的动作方法。首先找到 Xcode 为你创建的空 `buttonPressed:` 方法，然后将加粗的代码添加到该方法中，以创建并显示操作表：\n\n\
  ```\n- (IBAction)buttonPressed:(UIButton *)sender {\n    UIAlertController *controller\
  \ =\n       [UIAlertController alertControllerWithTitle:@\"你确定吗？\"\n          message:nil\
  \ preferredStyle:UIAlertControllerStyleActionSheet];\n    UIAlertAction *yesAction\
  \ =\n          [UIAlertAction actionWithTitle:@\"是的，我确定！\"\n                style:UIAlertActionStyleDestructive\n\
                  handler:^(UIAlertAction *action){\n        NSString *msg;\n        if\
  \ ([self.nameField.text length] > 0) {\n            msg = [NSString stringWithFormat:\n\
                     @\"你可以放心，%@，一切顺利。\",\n                   self.nameField.text];\n\
          } else {\n            msg = @\"你可以放心，一切顺利。\";\n        }\n        UIAlertController\
  \ *controller2 =\n                [UIAlertController\n                   alertControllerWithTitle:@\"\
  操作已完成\"\n                   message:msg\n                   preferredStyle:UIAlertControllerStyleAlert];\n\
          UIAlertAction *cancelAction =\n                [UIAlertAction actionWithTitle:@\"\
  呼！\"\n                   style: UIAlertActionStyleCancel handler:nil];\n        [controller2\
  \ addAction:cancelAction];\n        [self presentViewController:controller2 animated:YES\
  \ completion:nil];\n    }];\n    UIAlertAction *noAction = [UIAlertAction actionWithTitle:@\"\
  绝不！\"\n                     style:UIAlertActionStyleCancel handler:nil];\n    [controller\
  \ addAction:yesAction];\n    [controller addAction:noAction];\n\nUIPopoverPresentationController\
  \ *ppc =\n              controller.popoverPresentationController;\n    if (ppc !=\
  \ nil) {\n        ppc.sourceView = sender;\n        ppc.sourceRect = sender.bounds;\n\
      }\n    [self presentViewController:controller animated:YES completion:nil];\n\
  }\n```\n\n我们到底做了什么？首先，在 `doSomething:` 动作方法中，我们分配并初始化了一个 `UIAlertController`，这是一个视图控制器子类，它可以显示操作表或警告框。\n\
  \n\n\n```objc\nUIAlertController *controller =\n   [UIAlertController alertControllerWithTitle:@\"\
  Are You Sure?\"\n      message:nil preferredStyle:UIAlertControllerStyleActionSheet];\n\
  ```\n\n初始化方法接受多个参数。让我们逐一分析这些参数。\n\n第一个参数是要显示的标题。请参考图 4-3 了解我们提供的标题将如何显示在操作表顶部。第二个参数是紧接在标题下方、以较小字体显示的消息。在本例中，我们不使用消息，因此为此参数提供值\
  \ `nil`。最后一个参数指定控制器是显示警告（值 `UIAlertControllerStyleAlert`）还是操作表（`UIAlertControllerStyleActionSheet`）。由于我们需要操作表，因此在此处提供值\
  \ `UIAlertControllerStyleActionSheet`。\n\n默认情况下，警告控制器不提供任何按钮——您必须为每个需要的按钮创建一个 `UIAlertAction`\
  \ 对象，并将其添加到控制器中。以下是为操作表创建两个按钮的部分代码：\n\n```objc\nUIAlertAction *yesAction =\n   \
  \   [UIAlertAction actionWithTitle:@\"Yes, I'm sure!\"\n            style:UIAlertActionStyleDestructive\n\
  \            handler:^(UIAlertAction *action){\n    // 代码已省略——请参见下文。\n}];\nUIAlertAction\
  \ *noAction = [UIAlertAction actionWithTitle:@\"No way!\"\n                 style:UIAlertActionStyleCancel\
  \ handler:nil];\n```\n\n对于每个按钮，您需要指定标题、样式以及按钮按下时要调用的处理程序。有三种可选的样式：\n\n- `UIAlertActionStyleDestructive`\
  \ 应在按钮触发破坏性、危险或不可逆操作时使用，例如删除或覆盖文件。此样式按钮的标题将以粗体红色字体显示。\n- 对于普通按钮（如确定按钮），当要触发的操作不是破坏性时，使用\
  \ `UIAlertActionStyleDefault`。标题以常规蓝色字体显示。\n- `UIAlertStyleCancel` 用于取消按钮。标题以粗体蓝色字体显示。\n\
  \n最后，将按钮添加到控制器中：\n\n```objc\n[controller addAction:yesAction];\n[controller addAction:noAction];\n\
  ```\n\n要使警告或操作表可见，您需要请求当前视图控制器*呈现*警告控制器。以下是呈现操作表的方法：\n\n```objc\nUIPopoverPresentationController\
  \ *ppc =\n          controller.popoverPresentationController;\nif (ppc != nil) {\n\
  \    ppc.sourceView = sender;\n    ppc.sourceRect = sender.bounds;\n}\n[self presentViewController:controller\
  \ animated:YES completion:nil];\n```\n\n前五行通过获取警告控制器的弹出式呈现控制器，并设置其 `sourceView`\
  \ 和 `sourceRect` 属性，来配置操作表出现的位置。稍后我们将详细说明这些属性。最后，我们通过调用视图控制器的 `presentViewController:animated:completion:`\
  \ 方法，并将警告控制器作为要呈现的控制器传递给它，从而使操作表可见。当视图控制器被呈现时，其视图会临时替换呈现它的视图控制器的视图。对于警告视图控制器，操作表或警告会部分覆盖呈现视图控制器的视图；视图的其余部分被深色半透明背景覆盖，让您可以看到底层视图，但明确表明在您取消呈现的视图控制器之前，无法与其交互。\n\
  \n现在让我们重新审视弹出式呈现控制器的配置。在 iPhone 上，操作表总是从屏幕底部弹出，如图 4-3 所示，但在 iPad 上，它显示在一个**弹出框**中——一个带有箭头的小圆角矩形，指向另一个视图，通常是导致其出现的视图。图\
  \ 4-28 展示了我们的操作表在 iPad 模拟器上的样子。\n\n![9781484202005_Fig04-28.jpg](img/9781484202005_Fig04-28.jpg)\n\
  \n图 4-28. iPad 上的操作表\n\n如您所见，弹出框的箭头指向**Do Something**按钮。这是因为我们将警告控制器的弹出式呈现控制器的 `sourceView`\
  \ 属性设置为指向该按钮，并将其 `sourceRect` 属性设置为该按钮的边界范围：\n\n```objc\nif (ppc != nil) {\n   \
  \     ppc.sourceView = sender;\n        ppc.sourceRect = sender.bounds;\n    }\n\
  ```\n\n注意 `ppc != nil` 检查——我们进行此检查是因为在 iPhone 上，警告控制器不会在弹出框中呈现操作表，因此其 `popoverPresentationController`\
  \ 属性为 `nil`。严格来说，此检查并非必需，因为在 Objective-C 中向 `nil` 对象引用发送消息是完全合法的且不执行任何操作。然而，在代码中加入此检查可以清楚地表明，在某些情况下\
  \ `ppc` 可能为 `nil`，且不需要配置弹出式视图控制器。\n\n在图 4-28 中，弹出框出现在源按钮下方，但如果您需要，可以通过设置弹出式呈现控制器的\
  \ `permittedArrowDirections` 属性来更改此行为，该属性是弹出框箭头允许方向的掩码。以下代码通过将此属性设置为 `UIPopoverArrowDirectionDown`\
  \ 将弹出框移动到源按钮上方：\n\n```objc\nif (ppc != nil) {\n    ppc.sourceView = sender;\n  \
  \  ppc.sourceRect = sender.bounds;\n    ppc.permittedArrowDirections = UIPopoverArrowDirectionDown;\n\
  }\n```\n\n如果比较图 4-28 和图 4-3，您会发现在 iPad 上**No Way!**按钮不见了。警告控制器在 iPad 上不使用样式为 `UIAlertStyleCancel`\
  \ 的按钮，因为用户习惯于通过点击弹出框外部的任何位置来取消弹出框而不执行任何操作。\n\n### 显示警告\n\n当用户按下**Yes, I'm Sure!**按钮时，我们希望弹出一个带有消息的警告。当按下添加到警告控制器的按钮时，操作表（或警告）会被解除，并且按钮的处理程序块会被调用，同时传入对创建该按钮的`UIAlertAction`的引用。按下**Yes,\
  \ I'm Sure!**按钮时执行的代码以粗体显示：\n\n```objc\nUIAlertAction *yesAction =\n      [UIAlertAction\
  \ actionWithTitle:@\"Yes, I'm sure!\"\n            style:UIAlertActionStyleDestructive\n\
  \            handler:^(UIAlertAction *action){\n    NSString *msg;\n    if ([self.nameField.text\
  \ length] > 0) {\n        msg = [NSString stringWithFormat:\n               @\"\
  You can breathe easy, %@, everything went OK.\",\n               self.nameField.text];\n\
  \    } else {\n        msg = @\"You can breathe easy, everything went OK.\";\n \
  \   }\n    UIAlertController *controller2 =\n            [UIAlertController\n  \
  \             alertControllerWithTitle:@\"Something Was Done\"\n               message:msg\n\
  \               preferredStyle:UIAlertControllerStyleAlert];\n    UIAlertAction\
  \ *cancelAction =\n            [UIAlertAction actionWithTitle:@\"Phew!\"\n     \
  \          style: UIAlertActionStyleCancel handler:nil];\n    [controller2 addAction:cancelAction];\n\
  \    [self presentViewController:controller2 animated:YES completion:nil];\n}];\n\
  ```\n\n\n\n我们在 handler 代码块中要做的第一件事，就是创建一个将显示给用户的新字符串。在真实的应用程序中，你会在此时执行用户请求的任何处理。我们只是假装做了一些事情，并通过使用\
  \ alert 来通知用户。如果用户在顶部文本字段中输入了名字，我们会获取它，并将其用在 alert 中显示的消息里。否则，我们就只是构建一条通用消息来显示：\n\
  \n```\nNSString *msg = nil;\n\nif ([self.nameField.text length] > 0) {\n    msg\
  \ = [NSString stringWithFormat:\n           @\"You can breathe easy, %@, everything\
  \ went OK.\",\n           self.nameField.text];\n}\nelse {\n    msg = @\"You can\
  \ breathe easy, everything went OK.\";\n}\n```\n\n接下来的几行代码看起来会有点熟悉。Alert 视图和操作表（action\
  \ sheet）的创建和使用方式非常相似。我们总是从创建一个 `UIAlertController` 开始：\n\n```\nUIAlertController\
  \ *controller2 =\n        [UIAlertController\n           alertControllerWithTitle:@\"\
  Something Was Done\"\n           message:msg\n           preferredStyle:UIAlertControllerStyleAlert];\n\
  ```\n\n同样，我们传入一个要显示的标题。这次，我们还传入了一条更详细的消息，也就是我们刚刚创建的那个字符串。最后一个参数是样式，我们将其设置为 `UIAlertControllerStyleAlert`，因为我们想要的是一个\
  \ alert，而不是操作表。接下来，我们为 alert 的取消按钮创建一个 `UIAlertAction`，并将其添加到控制器中：\n\n```\nUIAlertAction\
  \ *cancelAction =\n        [UIAlertAction actionWithTitle:@\"Phew!\"\n         \
  \  style: UIAlertActionStyleCancel handler:nil];\n[controller2 addAction:cancelAction];\n\
  ```\n\n最后，我们通过展示 alert 视图控制器来让 alert 出现：\n\n```\n[self presentViewController:controller2\
  \ animated:YES completion:nil];\n```\n\n你可以在图 4-4 中看到这段代码创建的 alert。你会注意到，我们的代码没有尝试获取和配置\
  \ alert 控制器的弹出展示控制器。这是因为 alert 在 iPhone 和 iPad 上都会显示在屏幕中央的一个小圆角视图中，所以没有需要配置的弹出展示控制器。\n\
  \n保存 `ViewController.m`，然后构建、运行，并尝试一下这个完整的应用程序。\n\n## 跨越终点线\n\n这一章内容很多。从概念上讲，我们没有向你灌输太多新东西，但是带你使用了大量控件，并向你展示了许多不同的实现细节。你在\
  \ Outlet 和 Action 方面得到了更多练习，看到了如何利用视图的层级结构，还进行了更多添加 Auto Layout 约束的练习。你了解了控件状态和可拉伸图片，也学会了如何使用操作表和\
  \ alert。\n\n这个小应用程序里包含了很多内容。请随时返回去玩玩它。修改数值，通过添加和修改代码进行实验，看看 Interface Builder 中不同设置的效果。我们不可能带你了解\
  \ iOS 中每个控件的所有排列组合，但你刚刚完成的这个应用程序是一个很好的起点，涵盖了许多基础知识。\n\n在下一章中，我们将探讨当用户将 iOS 设备从竖屏旋转到横屏，或者反过来旋转时会发生什么。你可能很清楚，许多应用程序会根据用户握持设备的方式改变显示内容，我们将向你展示如何在自己的应用程序中实现这一点。\n\
  \n"
- '# 第 5 章：旋转与自适应布局


  iPhone 和 iPad 是了不起的工程杰作。苹果工程师想出了各种办法，在非常小巧的机身中塞入最大化的功能。其中一个例子是，这些设备既可以在竖屏（高而窄）模式下使用，也可以在横屏（短而宽）模式下使用，并且这种方向可以在运行时通过简单地旋转设备来改变。你可以在
  iOS 的网页浏览器 Mobile Safari 中看到这种行为（称为 `autorotation`）的示例（参见图 5-1）。在本章中，我们将详细介绍旋转。我们首先概述自动旋转的各种细节，然后讨论在应用中实现该功能的不同方法。


  ![9781484202005_Fig05-01.jpg](img/9781484202005_Fig05-01.jpg)


  图 5-1。与许多 iOS 应用程序一样，Mobile Safari 会根据握持方式改变显示内容，以充分利用可用屏幕空间。


  在 iOS 8 之前，如果你想设计一个能在 iPhone 和 iPad 上运行的应用程序，你必须创建一个包含 iPhone 布局的 storyboard，以及另一个包含
  iPad 布局的 storyboard。在 iOS 8 中，这一切都改变了。苹果在 UIKit 和 Xcode 中添加了 API 和工具，使得仅用一个 storyboard
  就能构建出能在任何设备上运行（或用他们的术语说，*适配*任何设备）的应用程序——甚至包括新款大屏 iPhone 6 Plus。你仍然需要针对每种设备的不同的外形尺寸进行精心设计，但现在你可以在一个地方完成所有工作。更好的是，使用我们在第
  3 章中介绍的预览（Preview）功能，你无需启动模拟器就能立即看到你的应用程序在任何设备上的显示效果。我们将在本章的第二部分探讨如何构建自适应应用布局。


  ## 旋转的机制


  在竖屏和横屏方向下运行的能力可能并非适用于每一个应用程序。苹果的几款 iPhone 应用程序（例如天气应用）只支持单一方向。然而，iPad 应用程序则不同。苹果建议大多数应用程序（除了那些本质上是围绕特定布局设计的沉浸式应用，如游戏）在
  iPad 上运行时应该支持所有方向。


  事实上，苹果自己的多数 iPad 应用在两种方向下都运行良好。许多应用会利用不同方向来展示数据的不同视图。例如，邮件和备忘录应用在横屏模式下会在左侧显示项目列表（文件夹、邮件或备忘录），右侧显示选中的项目。而在竖屏模式下，这些应用则让你专注于所选项目的详细信息。


  对于 iPhone 应用，基本规则是：如果自动旋转能增强用户体验，你就应该将其添加到应用中。对于 iPad 应用，规则是：除非你有令人信服的理由不这样做，否则你应该添加自动旋转。幸运的是，苹果在
  iOS 和 UIKit 中很好地隐藏了处理方向变化的复杂性，因此在你的 iOS 应用中实现这种行为实际上相当容易。


  是否允许旋转用户界面是在视图控制器中指定的。如果用户旋转了设备，活动的视图控制器将被询问是否可以旋转到新的方向（你将在本章中看到如何操作）。如果视图控制器给予肯定回答，应用程序的窗口和视图将被旋转，并且窗口和视图的大小将被调整以适应新的方向。




  '
- "# 关于 iPhone 和 iPod touch\n\n在 iPhone 和 iPod touch 上，以竖屏模式启动的视图，其高度会大于宽度——你可以通过参阅第\
  \ 1 章中的表 1-1 的“软件尺寸”列，来了解任何特定设备的实际可用空间。但请注意，如果你的应用显示了`status bar`（状态栏），即屏幕顶部那条显示信号强度、时间、电池电量等信息的\
  \ 20 点高的横条（参见图 5-1），那么应用可用的垂直屏幕空间将减少 20 点。\n\n当设备旋转到横屏模式时，垂直和水平尺寸会互换。例如，在 iPhone\
  \ 6 上运行的应用，竖屏时屏幕宽 375 点、高 667 点；横屏时则变为宽 667 点、高 375 点。同样地，在 iPad 上，如果你显示了状态栏（大多数应用都会显示），应用实际可用的垂直空间也会减少\
  \ 20 点。而在 iPhone 上，自 iOS 8 起，状态栏在横屏方向下会被隐藏。\n\n### 点、像素和 Retina 显示屏\n\n你可能想知道我们为什么谈论“点”而不是像素。本书的早期版本确实是以像素而非点来表示屏幕尺寸的。做出这一改变的原因在于苹果推出了`Retina\
  \ display`。\n\n`Retina display`是苹果的市场术语，指的是从 iPhone 4 及之后版本的 iPod touch，以及更新的 iPad\
  \ 型号所采用的高分辨率屏幕。再次回顾表 1-1 可以看到，它将大多数型号的硬件屏幕分辨率提高了一倍，对于 iPhone 6 Plus 则几乎提高了两倍。\n\n\
  幸运的是，在大多数情况下，你无需为此做任何额外处理。当我们处理屏幕上的元素时，我们用*点*（而非像素）来指定尺寸和距离。对于旧款 iPhone、iPad、iPad\
  \ 2 和 iPad Mini 1，点和像素是等同的：1 点等于 1 像素。然而，在较新款的 iPhone、iPad 和 iPod touch 上，1 点对应一个\
  \ 4 像素的正方形（宽 2 像素 × 高 2 像素）。例如，iPhone 5s 的屏幕看起来仍然是 320 点宽，尽管其实际宽度是 640 像素。在 iPhone\
  \ 6 Plus 上，缩放因子是 3，因此每个点对应一个 9 像素的正方形。你可以将其视为一种“虚拟分辨率”，iOS 会自动将点映射到屏幕的物理像素上。我们将在第\
  \ 16 章中进一步讨论这一点。\n\n在典型的应用中，将像素实际移动到屏幕上的大部分工作都由 iOS 管理。你的应用在此过程中的主要任务是确保所有内容在调整大小后的窗口中都能完美适配并看起来合适。\n\
  \n### 处理旋转\n\n要处理设备旋转，你需要为构成界面的所有对象指定正确的`constraints`（约束）。`约束`告诉 iOS 设备，当它们所在的视图调整大小时，你的控件应如何表现。这与设备旋转有何关系？当设备旋转时，屏幕的尺寸（或多或少）会互换——因此你的视图布局区域的大小会改变。如果你曾在\
  \ OS X 上使用过 Cocoa，你可能已经熟悉了这个基本过程，因为它与用于指定 Cocoa 控件在用户调整其所在窗口大小时如何表现的方法相同。\n\n使用约束最简单的方法是在\
  \ Interface Builder (IB) 中配置它们。Interface Builder 允许你定义约束，这些约束描述了当父视图发生变化或其他视图移动时，你的\
  \ GUI 组件将如何重新定位和调整大小。你在第 4 章中已经做了一些这方面的工作，本章将进一步深入探讨这个主题。你可以将约束视为关于视图几何结构的方程式，而\
  \ iOS 视图系统本身则像一个“求解器”，会根据需要重新排列视图以使这些方程式成立。你也可以在代码中添加约束，但本书不会涉及这部分内容。\n\n约束是在 iOS\
  \ 6 中加入的，但在 Mac 上出现的时间稍长一些。在 iOS 和 OS X 上，约束可用于取代之前的旧版“弹簧和支柱”系统。约束能够完成旧技术所能做的一切，甚至更多。\n\
  \n我们开始吧，好吗？在深入探讨配置 GUI 以重新排列视图的不同方法之前，我们将首先展示如何指定你的应用允许哪些方向。\n\n#### 选择你的视图方向\n\n\
  我们将创建一个简单的应用，向你展示如何选择你希望应用支持的方向。在 Xcode 中新建一个 Single View Application 项目，将其命名为 *Orientations*。从`设备`弹出菜单中选择\
  \ *Universal*，然后将其与其他项目一起保存。\n\n在我们在故事板中布局 GUI 之前，需要告诉 iOS 我们的视图支持界面旋转。实际上有两种方法可以实现。你可以创建一个应用范围内的设置，作为所有视图控制器的默认设置，也可以为每个单独的视图控制器进一步调整细节。我们将从应用级别的设置开始，进行这两项操作。\n\
  \n##### 应用级别支持的方向\n\n首先，我们需要指定我们的应用支持哪些方向。当你的新 Xcode 项目窗口出现时，它应该已经打开到了项目设置。如果没有，请单击项目导航器中的第一行（以你的项目名称命名的行），然后确保你位于`通用`标签页。在摘要的可用选项中，你应该会看到一个名为\
  \ *Deployment Info* 的部分，其中包含一个名为 *Device Orientation* 的部分（*参见* 图 5-2），里面有一列复选框。\n\
  \n![9781484202005_Fig05-02.jpg](img/9781484202005_Fig05-02.jpg)\n\n图 5-2. 我们项目的通用标签页展示了（除其他选项外）所支持的设备方向\n\
  \n这就是你标识应用支持哪些方向的方法。这并不一定意味着应用中的每个视图都会使用所有选中的方向；但如果你打算在应用的任何视图中支持某个方向，那么该方向必须在此处被选中。\n\
  \n你注意到 `Upside Down`（倒置）方向默认是关闭的吗？这是因为，如果电话在倒置状态下响起，接电话时电话很可能仍然是倒置的。\n\n打开复选框上方的`设备`下拉菜单，你会看到你实际上可以为\
  \ iPhone 和 iPad 分别配置一组允许的方向。如果你选择`iPad`，你会看到所有四个复选框都被选中了，因为 iPad 旨在任何方向上使用。\n\n\n\
  \n**注意** 图 5-2 中显示的四个复选框实际上只是为应用程序的 `Info.plist` 文件添加和删除条目的一种快捷方式。如果你在项目导航器的 `Supporting\
  \ Files` 文件夹中单击 `Info.plist`，你会看到两个条目，分别是 `Supported interface orientations` 和 `Supported\
  \ interface orientations (iPad)`，其下还有当前所选方向的子条目。在项目摘要中选择或取消选择这些复选框，实际上就是在这两个数组中添加或删除条目。使用复选框更简单且不易出错，因此强烈推荐使用。但你应当了解它们的作用。\n\
  \n现在，选择 `Main.storyboard`。在对象库中找到标签并将其拖入视图，使其水平居中并靠近顶部位置，如图图 5-3 所示。选中该标签的文本并将其更改为\
  \ `This way up`。更改文本可能会移动标签的位置，因此请将其再次拖拽至水平居中。\n\n![9781484202005_Fig05-03.jpg](img/9781484202005_Fig05-03.jpg)\n\
  \n图 5-3。在你失去对重力感知时的实用提醒\n\n在运行应用之前，我们需要添加 Auto Layout 约束来固定标签的位置。因此，按住 Control 键从标签向上拖拽，直到包含视图的背景变为蓝色，再松开鼠标。按住\
  \ **Shift** 键，在弹出的菜单中选择 **Top Space to Top Layout Guide** 和 **Center Horizontally\
  \ in Container**，然后按 **Return** 键。现在，按下 ![image](img/flower.jpg)**R** 键，在 iPhone\
  \ 模拟器上构建并运行这个简单应用。当模拟器启动后，尝试通过按 ![image](img/flower.jpg)**-Left-Arrow** 或 ![image](img/flower.jpg)**-Right-Arrow**\
  \ 键几次来旋转设备。你会发现整个视图（包括你添加的标签）会旋转到除倒置外的每个方向，正如我们配置的那样。在 iPad 模拟器上运行以确认它会旋转到所有四个可能的方向。\n\
  \n我们已经确定了应用将支持的方向，但这还不是全部。我们还可以为每个视图控制器指定一组可接受的方向，从而更精细地控制应用不同部分支持哪些方向。\n\n####\
  \ 逐控制器旋转支持\n\n现在，让我们配置视图控制器，使其允许一组不同且更小的可接受方向。应用的全局配置指定了一种允许方向的绝对上限。例如，如果全局配置不包含倒置方向，那么单个视图控制器就无法强制系统将显示旋转到倒置方向。在视图控制器中，我们所能做的只是进一步限制可接受的方向。\n\
  \n在项目导航器中，单击 `ViewController.m`。这里我们将实现一个在 `UIViewController` 超类中定义的方法，该方法允许我们指定哪些方向是可接受的：\n\
  \n```\n- (NSUInteger)supportedInterfaceOrientations {\n    return (UIInterfaceOrientationMaskPortrait\
  \ |\n            UIInterfaceOrientationMaskLandscapeLeft);\n}\n```\n\n这个方法让我们返回一个\
  \ C 风格方向掩码。这是 iOS 询问视图控制器是否可以旋转到特定方向的方式。在本例中，我们返回的值表示接受两种方向：默认的竖屏方向以及将手机顺时针旋转 90°\
  \ 后（手机左侧边缘朝上）的方向。我们使用布尔 OR 运算符（竖线符号）来组合这两个方向掩码，并返回组合后的值。\n\n`UIApplication.h` 定义了以下方向掩码，你可以像前面讨论的那样，使用\
  \ OR 运算符以任意方式组合它们：\n\n- `UIInterfaceOrientationMaskPortrait`\n- `UIInterfaceOrientationMaskLandscapeLeft`\n\
  - `UIInterfaceOrientationMaskLandscapeRight`\n- `UIInterfaceOrientationMaskPortraitUpsideDown`\n\
  \n此外，还有一些针对常见用例的预定义组合。它们在功能上等同于你自己将它们进行 OR 运算，但可以节省输入时间，并使代码更具可读性：\n\n- `UIInterfaceOrientationMaskLandscape`\n\
  - `UIInterfaceOrientationMaskAll`\n- `UIInterfaceOrientationMaskAllButUpsideDown`\n\
  \n当 iOS 设备改变方向时，当前活动的视图控制器上的 `supportedInterfaceOrientations` 方法会被调用。根据返回值是否包含新方向，应用决定是否应该旋转视图。因为每个视图控制器子类都可以以不同方式实现此功能，所以同一个应用可以支持某些视图旋转而其他视图不旋转，或者某个视图控制器在特定条件下支持某些方向。\n\
  \n### 代码补全实战\n\n你是否注意到 iPhone 上定义的系统常量总是设计成以相同字母开头？像 `UIInterfaceOrientationMaskPortrait`、`UIInterfaceOrientationMaskPortraitUpsideDown`、`UIInterfaceOrientationMaskLandscapeLeft`\
  \ 和 `UIInterfaceOrientationMaskLandscapeRight` 都以 `UIInterfaceOrientationMask` 开头的原因之一，就是为了让你利用\
  \ Xcode 的**代码补全**功能。\n\n你可能已经注意到，在输入时，Xcode 经常会尝试补全你正在输入的单词。这就是代码补全在起作用。\n\n开发者不可能记住系统中所有不同的定义常量，但你可以记住常用组别的共同前缀。当你需要指定方向时，只需输入\
  \ `UIInterfaceOrientationMask`（甚至只需输入 `UIInterf`），就会看到一个包含所有匹配项的列表弹出。（在 Xcode 的首选项中，你可以配置为仅当按下\
  \ **Esc** 键时列表才弹出。）你可以使用方向键浏览弹出的列表，并按 **Tab** 或 **Return** 键完成选择。这比在文档或头文件中查找值要快得多。\n\
  \n请随意尝试此方法，返回不同的方向掩码组合。你可以强制系统将视图显示限制为对应用有意义的方向，但不要忘记我们之前讨论的全局配置！请记住，例如，如果你没有在全局配置中启用倒置方向，那么无论视图怎么说，你的所有视图都不会以倒置状态显示。\n\
  \n**注意** iOS 实际上有两种不同类型的方向。我们这里讨论的是**界面方向**。还有一个独立但相关的概念是**设备方向**。设备方向指定设备当前的持握方式。界面方向则是指屏幕上的视图如何旋转。如果你将一个标准\
  \ iPhone 倒置，设备方向将是倒置的，但界面方向几乎总是其他三种方向之一，因为 iPhone 应用通常不支持竖屏倒置。\n\n### 使用约束设计界面\n\
  \n在 Xcode 中，基于单视图应用模板再创建一个新项目，并将其命名为 `Layout`。选择 `Main.storyboard` 在 Interface Builder\
  \ 中编辑界面文件。使用约束的好处之一是，它们可以用很少的代码实现很多功能。我们确实需要在代码中指定支持哪些方向（除非我们打算支持默认集合），但布局的细节是在\
  \ Interface Builder 中指定的。\n\n\n\n为了了解其工作原理，从库中拖拽四个`Label`到你的视图中，并按图 5-4 所示放置它们。使用蓝色虚线辅助线帮助你将其分别对齐到靠近四个角的位置。在这个例子中，我们使用`UILabel`类的实例来展示如何通过约束控制\
  \ GUI 布局，但相同的规则适用于所有类型的 GUI 对象。\n\n双击每个标签并为其分配一个标题，以便稍后区分它们。我们将左上角的标签命名为`UL`，右上角的标签命名为`UR`，左下角的标签命名为`LL`，右下角的标签命名为`LR`。设置好每个标签的文本后，将它们全部拖到合适的位置，使其相对于容器视图的角均匀对齐（参见图\
  \ 5-4）。\n\n![9781484202005_Fig05-04.jpg](img/9781484202005_Fig05-04.jpg)\n\n图 5-4.\
  \ 向界面添加四个标签\n\n现在让我们看看，如果我们没有设置任何 Auto Layout 约束，会发生什么。在 iPhone 5s 模拟器上构建并运行应用程序。一旦模拟器启动，你会发现你只能看到左上角的标签和左下角标签的一小部分——另外两个标签在屏幕右侧之外。此外，原本在左下角的标签也几乎不可见。选择**Hardware**\
  \ ![image](img/arrow.jpg) **Rotate Left**，这将模拟将 iPhone 旋转到横屏模式，你会发现现在可以看到左上角的标签和右上角标签的一部分，如图\
  \ 5-5 所示。\n\n![9781484202005_Fig05-05.jpg](img/9781484202005_Fig05-05.jpg)\n\n图\
  \ 5-5. 到目前为止，情况并不理想。发生了什么？\n\n如你所见，情况看起来不太妙。旋转后，左上角的标签位置正确，但其他所有标签都位置错误，有些甚至完全不可见！发生这种情况的原因是，每个对象都保持了相对于\
  \ storyboard 中视图左上角的距离。\n\n我们真正想要的是，旋转后每个标签都能紧贴其最近的角。右侧的标签应水平移动以匹配视图的新宽度，底部的标签应垂直移动以匹配新高度，而不是消失在底部边缘之外。幸运的是，我们可以很容易地在\
  \ Interface Builder 中设置约束来实现这些变化。\n\n事实上，正如你在前几章中所看到的，Interface Builder 足够智能，可以检查这组对象并创建一组默认约束，这些约束恰好能实现我们想要的效果。它运用一些经验法则来判断，如果对象靠近边缘，我们很可能希望将它们保留在那里。要应用这些规则，首先选中所有四个标签。你可以通过单击一个标签，然后按住**Shift**键或![image](img/flower.jpg)键的同时依次单击其他三个标签来完成此操作。选中所有标签后，从菜单中选择**Editor**\
  \ ![image](img/arrow.jpg) **Resolve Auto Layout Issues** ![image](img/arrow.jpg)\
  \ **Add Missing Constraints**（你会发现有两个同名的菜单项——在这种情况下，你可以使用其中任意一个）。接下来，只需按下**Run**按钮在模拟器中启动应用程序，然后验证其是否正常工作。\n\
  \n知道这样做有效是一回事，但要最有效地使用此类约束，了解其工作原理也非常重要。那么，让我们深入探讨一下。回到 Xcode，单击左上角的标签将其选中。你会注意到该标签上附有一些蓝色的实线。这些蓝色的实线与你在屏幕上拖动对象时看到的蓝色虚线辅助线不同（参见图\
  \ 5-6）。\n\n![9781484202005_Fig05-06.jpg](img/9781484202005_Fig05-06.jpg)\n\n图 5-6.\
  \ 右侧，蓝色虚线帮助你在拖动时对齐对象。左侧，蓝色实线显示为所选对象配置的约束\n\n每条蓝色的实线代表一个约束。如果你现在按下**![image](img/sym2.jpg)![image](img/flower.jpg)5**打开\
  \ Size Inspector，你会发现其中包含一个约束列表。图 5-7 显示了一组典型的约束，但 Xcode 创建的约束取决于你放置标签的具体位置，因此你可能会看到不同的内容。\n\
  \n![9781484202005_Fig05-07.jpg](img/9781484202005_Fig05-07.jpg)\n\n图 5-7. Xcode\
  \ 生成的用于将标签固定在父视图中的四个约束\n\n在这个例子中，其中两个约束处理该标签相对于其父视图（即容器视图）的位置：它指定了**leading space**（通常指左侧间距）和**bottom\
  \ space**（即标签下方的间距）。当父视图大小发生变化时（例如设备旋转时），这些约束使得标签与其父视图底部和左侧边缘保持相同的距离。另外两个约束连接到另外两个标签，并负责使它们与该标签保持对齐。检查其他每个标签，看看它们有哪些约束，并确保你理解这些约束如何工作以确保四个标签保持在父视图的角落。\n\
  \n请注意，在文字从右向左书写和阅读的语言中，“leading space”在右侧，因此如果用户为其设备选择了如阿拉伯语等语言，leading 约束可能会导致\
  \ GUI 布局方向相反。现在，我们暂且假设“leading space”意味着“左侧间距”。\n\n覆盖默认约束\n\n从库中抓取另一个标签并将其拖到布局区域。这一次，不要移动到角落，而是将其拖到视图的左边缘，将该标签的左边缘与左侧其他标签的左边缘对齐，并在视图中垂直居中。将会出现虚线来帮助你。图\
  \ 5-8 展示了这看起来的样子。\n\n![9781484202005_Fig05-08.jpg](img/9781484202005_Fig05-08.jpg)\n\
  \n图 5-8. 放置左侧标签\n\n放置好左侧标签后，给它一个标题，例如“Left”。按下![image](img/flower.jpg)**R**在模拟器中运行你的应用程序。将其旋转到横屏模式，你会看到左侧标签保持了与顶部的距离，使其位于中心下方很远的位置（参见图\
  \ 5-9）。哎呀！\n\n![9781484202005_Fig05-09.jpg](img/9781484202005_Fig05-09.jpg)\n\n\
  图 5-9. 左侧标签不在它应该在的位置！\n\n\n\n我们需要创建一个新的约束来使其正常工作，所以回到 Xcode 并选择 storyboard 中的左侧标签。添加一个约束来强制此标签保持垂直居中非常简单——只需选择**Editor**\
  \ ![image](img/arrow.jpg) **Align** ![image](img/arrow.jpg) **Vertical Center in\
  \ Container**。执行此操作后，Xcode 会创建一个新约束，并立即在编辑器视图中选中该约束本身。这有点令人困惑，但别担心！只需再次点击该标签即可选中它。按![image](img/sym2.jpg)![image](img/flower.jpg)**5**确保显示\
  \ Size 检查器，你会看到此标签现在有一个约束，将其中心 Y 值与父视图对齐。该标签还需要一个水平约束。确保选中该标签，然后选择**Editor** ![image](img/arrow.jpg)\
  \ **Resolve Auto Layout Issues** ![image](img/arrow.jpg) **Add Missing Constraints**\
  \ 即可添加此约束。按![image](img/flower.jpg)**R**再次运行应用。旋转一下，你会看到所有标签现在都能完美地移动到预期位置。不错！\n\
  \n现在，让我们通过拖出一个新标签到视图右侧，使其右边缘与其他右侧标签对齐，并与**Left**标签垂直对齐，来完成标签环的布局。将此标签的标题改为*Right*，然后稍微拖动它，确保其右边缘与其他两个标签的右边缘垂直对齐，以蓝色虚线作为参考。我们希望使用\
  \ Xcode 提供的自动约束，因此选择**Editor** ![image](img/arrow.jpg) **Resolve Auto Layout Issues**\
  \ ![image](img/arrow.jpg) **Add Missing Constraints** 来生成它们。\n\n构建并再次运行。再次旋转一下，你会看到所有标签都保持在屏幕上，并且彼此之间的位置正确（参见图\
  \ 5-10）。如果旋转回来，它们应返回原始位置。这种技术对大多数应用都有效。\n\n![9781484202005_Fig05-10.jpg](img/9781484202005_Fig05-10.jpg)\n\
  \n图 5-10. 旋转后标签在新位置\n\n这些都没问题，但我们只需点击几下就能做更多事情！假设我们突然有了一个伟大的愿景，决定让最上面的两个标签（`UL`和`UR`）形成一个类似页眉的区域，填满整个屏幕宽度。通过一些尺寸调整和约束，我们很快就能搞定。\n\
  \n### 全宽标签\n\n我们将创建一些约束，确保标签彼此保持相同的宽度，并且间距紧凑，这样即使在设备旋转时它们也能在视图顶部拉伸展开。图 5-11 显示了我们的目标。\n\
  \n![9781484202005_Fig05-11.jpg](img/9781484202005_Fig05-11.jpg)\n\n图 5-11. 顶部标签，在竖屏和横屏方向上都横跨显示器的整个宽度\n\
  \n最难的部分是能够直观地验证我们是否得到了想要的结果，即每个标签都精确地居中于其所占屏幕半区内。为了更容易判断是否正确，让我们暂时为标签设置一个背景色。在 storyboard\
  \ 中，同时选择**UL**和**UR**标签，打开 Attributes 检查器，滚动到 View 部分。使用**Background**控件选择一个鲜艳明亮的颜色。你会看到每个标签的整个框架都填充了你选择的颜色。\n\
  \n现在，将注意力转向`UL`标签，拖动其右边缘的尺寸调整控件，将其拉至视图的水平中点附近。这里不必非常精确，原因很快就会明了。完成此操作后，通过将`UR`标签的左边缘调整控件向左拖动，直到出现蓝色虚线参考线（提示这是标签到其左侧的推荐宽度），来调整`UR`标签的大小。现在，我们将添加一个约束，使这些标签填满其父视图的整个宽度。同时选择**UL**和**UR**标签，然后从菜单中选择**Editor**\
  \ ![image](img/arrow.jpg) **Pin** ![image](img/arrow.jpg) **Horizontal Spacing**。该约束告诉布局系统保持这两个标签彼此相邻，并保持当前的水平间距。构建并运行，看看会发生什么。你可能会看到类似图\
  \ 5-12 的结果。\n\n![9781484202005_Fig05-12.jpg](img/9781484202005_Fig05-12.jpg)\n\n\
  图 5-12. 标签虽然横跨了显示器，但分布不均匀\n\n这已经很接近了，但并非我们真正想要的。那么还缺什么呢？我们已经定义了控制每个标签相对于其父视图位置的约束，以及两个标签之间允许的距离，但我们没有对标签的尺寸做任何规定。这使得布局系统可以随意地调整它们的大小（正如我们刚刚看到的，这可能会非常错误）。要解决这个问题，我们需要再添加一个约束。\n\
  \n确保选中**UL**标签，然后按住**Shift**键（![image](img/sym3.jpg)）并点击**UR**标签。选中这两个标签后，你可以创建一个同时影响它们的约束。从菜单中选择**Editor**\
  \ ![image](img/arrow.jpg) **Pin** ![image](img/arrow.jpg) **Widths Equally** 来创建新约束。你现在会看到一个新约束出现，并且像之前一样，它会被自动选中，如图\
  \ 5-13 所示。你可能还会注意到，如果这两个标签在创建此约束之前宽度不完全相同，那么现在它们肯定相同了，因为新约束的存在迫使它们对齐。你还会注意到约束显示为橙色；这意味着\
  \ storyboard 中标签的当前位置与运行时看到的不匹配。要修复此问题，选择**Editor** ![image](img/arrow.jpg) **Resolve\
  \ Auto Layout Issues** ![image](img/arrow.jpg) **Update Frames**。约束应会变为蓝色。\n\n![9781484202005_Fig05-13.jpg](img/9781484202005_Fig05-13.jpg)\n\
  \n图 5-13. 顶部标签现在通过一个约束实现了等宽\n\n如果此时再次运行，你应该会看到标签横跨整个屏幕，在竖屏和横屏方向上都是如此（参见图 5-11）。\n\
  \n在此示例中，我们所有的标签都可见，并且在多种方向上布局正确；然而，屏幕上还有很多未使用的空间。如果我们同时设置另外两行标签来填充视图宽度，或者允许标签的高度发生变化以减少界面上的空白区域，是否会更好？请随意尝试这六个标签的约束，甚至可以添加一些其他约束。除了我们目前介绍的内容之外，你还可以在**Editor**\
  \ ![image](img/arrow.jpg) **Pin**菜单中找到更多用于创建约束的操作。如果你最终创建了一个不符合预期的约束，可以通过选中它并按**Delete**键来删除，或者尝试在\
  \ Attributes 检查器中配置它。多练习，直到你对约束的基本工作原理感到得心应手。我们将在本书中持续使用它们；但如果你想了解完整的细节，只需在 Xcode\
  \ 的文档窗口中搜索“Auto Layout”即可。\n\n\n\n## 创建自适应布局\n\n我们刚刚创建的简单示例在竖屏和横屏方向上都表现良好，并且在 iPhone\
  \ 和 iPad 上也能正常运行，尽管这些设备的屏幕尺寸存在差异。事实上，如前所述，处理设备旋转和创建适用于不同屏幕尺寸设备的用户界面其实本质相同——从应用程序的角度来看，当设备旋转时，屏幕的有效尺寸确实发生了变化。在最简单的情况下，您可以通过分配\
  \ Auto Layout 约束来处理这两种情况，确保所有视图都被放置在您希望的位置并具有适当的大小。然而，这并非总是可行。某些布局在竖屏模式下效果良好，但旋转为横屏时却表现不佳；同样，有些设计适合\
  \ iPhone 但不适合 iPad。当遇到这种情况时，您别无选择，只能为每种情况创建单独的设计。在 iOS 8 之前，这意味着要么在代码中实现整个布局，要么使用多个故事板，或者两者结合。幸运的是，借助\
  \ iOS 8 和 Xcode 6，苹果让设计*自适应*应用程序成为可能，这些应用程序既能在两种方向下正常工作，也能在不同的设备上运行，同时仍然只使用单个故事板。让我们来看看这是如何实现的。\n\
  \n### 重构应用程序\n\n为了设定场景，我们将设计一个在 iPhone 竖屏模式下表现良好的用户界面，但在手机旋转或在 iPad 上运行时则表现不佳。然后，我们将了解如何使用\
  \ Xcode 6 中的新工具来调整设计，使其在任何环境下都能良好运行。\n\n首先，像之前一样创建一个新的“单视图”项目，并将其命名为 *Restructure*。我们将构建一个\
  \ GUI，该界面包含一个大型内容区域和一组用于执行各种（虚构）操作的小按钮。我们将按钮放置在屏幕底部，让内容区域占据剩余空间，如图 5-14 所示。\n\n\
  ![9781484202005_Fig05-14.jpg](img/9781484202005_Fig05-14.jpg)\n\n图 5-14. Restructure\
  \ 应用的初始 GUI（在 iPhone 竖屏方向下）\n\n选择 `Main.storyboard` 开始编辑 GUI。由于我们并没有真正想要显示的有趣内容视图，我们只需使用一个大的彩色矩形。从对象库中拖拽一个单独的\
  \ `UIView` 到您的容器视图中。您会注意到，在拖拽过程中它会完全展开以填满容器视图，这并非我们想要的。在它仍处于选中状态时，调整其大小，使其填充可用空间的上方约四分之三，并在其上方和两侧留出小边距，如图\
  \ 5-15 所示。接下来，切换到属性检查器，使用**背景**弹出菜单选择其他背景色。您可以任意选择您喜欢的颜色，只要不是白色，以确保视图从背景中凸显出来。在示例源代码存档的故事板中，此视图为绿色，因此从现在起我们将称其为绿色视图。\n\
  \n![9781484202005_Fig05-15.jpg](img/9781484202005_Fig05-15.jpg)\n\n图 5-15. Restructure\
  \ 视图的基本竖屏布局\n\n从对象库拖拽一个按钮，将其放置在绿色视图下方空白区域的左下角。双击按钮标签选中文本，并将其更改为 *Action One*。现在按住\
  \ Option 键拖拽此按钮的两个副本，并将它们排成两列，如图 5-15 所示。您不需要将它们完美对齐，因为我们将使用约束来最终确定它们的位置，但您应尝试使这两个按钮组距离各自对应侧边的距离大致相等。将它们的标题分别更改为\
  \ *Action Two*、*Action Three* 和 *Action Four*。最后，将绿色视图的下边缘向下拖拽，直到它稍微高于按钮行的顶部。使用蓝色辅助线将所有元素对齐，如图\
  \ 5-15 所示。\n\n现在让我们设置 Auto Layout 约束。首先选中绿色视图。我们首先要将其固定到主视图的顶部、左侧和右侧。这仍然不足以完全约束它，因为其高度尚未指定；我们将在固定好按钮本身后，通过将其锚定到按钮顶部来解决这个问题。点击故事板编辑器右下角的\
  \ **Pin** 按钮。在弹出的顶部，您会看到熟悉的一组四个输入字段，围绕着一个小的正方形。保持选中**约束到边距**复选框。点击小正方形上方、左侧和右侧的红色虚线，将视图附加到其父视图的顶部、左侧和右侧。点击**添加\
  \ 3 个约束**。\n\n接下来，按住 **Shift** 键并点击，同时选中 **Action One** 和 **Action Two** 按钮。点击 **Align**\
  \ 按钮，在弹出的菜单中选中**水平中心**，然后点击**添加 1 个约束**。这将固定这两个按钮在一列中。对 **Action Three** 和 **Action\
  \ Four** 按钮重复此过程。\n\n再次选中 **Action Two** 按钮，打开 **Pin** 弹出菜单。在**约束到边距**已选中的情况下，选择弹出菜单顶部正方形左侧、上方和下方的红色虚线，然后点击**添加\
  \ 3 个约束**。这些约束将该按钮固定到主视图的左下角，并设置其与 **Action One** 按钮之间的垂直距离。现在，这两个按钮的位置已完全指定。现在对另一列按钮执行类似操作。保持**约束到边距**已选中，选择\
  \ **Action Four**，并打开 **Pin** 弹出菜单。选择正方形下方、上方和右侧的虚线，然后点击**添加 3 个约束**。\n\n剩下的就是修正绿色视图底部相对于按钮的位置。为此，按住\
  \ Control 键从绿色视图拖拽到 **Action One** 按钮，然后松开鼠标。在弹出的菜单中，选择**垂直间距**。这就是我们需要的所有约束。如果活动视图中出现任何警告，在文档大纲中选择视图控制器，然后在菜单栏中选择**编辑器**\
  \ ![image](img/arrow.jpg) **解决 Auto Layout 问题** ![image](img/arrow.jpg) **更新帧**。如果这不起作用，或者布局不符合预期，请返回前面的步骤，找出哪个约束是错误的或缺失的。\n\
  \n在 iPhone 模拟器中构建并运行应用程序。如果您所有的约束都设置正确，您应该会看到类似 图 5-14 的画面。现在向右旋转模拟器以查看布局的变化（参见\
  \ 图 5-16）。\n\n![9781484202005_Fig05-16.jpg](img/9781484202005_Fig05-16.jpg)\n\n\
  图 5-16. 将 Restructure 应用程序旋转到横屏方向。还不错，但可以更好\n\n\n\n看起来还不算太糟——绿色视图已正确缩放，所有视图都显示出来了。这种布局或许可行，但我们还能做得更好。底部按钮周围存在大量空白区域。而且，如果绿色视图是一个`UIImageView`的话，这种细长形状可能不太理想——根据`UIImageView`的`mode`属性，图片要么被拉伸，要么会在视图中间显得不协调。iPad\
  \ 上的效果如何？你可以亲自尝试一下（参见图 5-17）。\n\n![9781484202005_Fig05-17.jpg](img/9781484202005_Fig05-17.jpg)\n\
  \n图 5-17. 在 iPad 上运行 Restructure 应用程序\n\n同样，布局适配得非常好，但我们仍然面临按钮之间额外空白空间的问题。这是一个完美的例子，说明布局需要针对不同屏幕尺寸（从而也是不同方向）进行修改。实际上，我们将创建这个布局的另外两个变体——一个用于横屏方向的\
  \ iPhone，另一个用于 iPad。你可以在图 5-18 中看到我们的目标。\n\n![9781484202005_Fig05-18.jpg](img/9781484202005_Fig05-18.jpg)\n\
  \n图 5-18. 为横屏方向的 iPhone 和 iPad 修改 Restructure 应用程序\n\n要创建这两种不同的布局，我们需要另外两组约束。在只使用一个故事板的情况下也能做到这一点，这要归功于\
  \ iOS 8 中一项名为*Size Classes*的新特性。\n\n### 尺寸类\n\n看一下故事板编辑器的底部。在工具栏中，你会看到一个我们之前没有提到的控件。它被称为尺寸类控件，看起来像一个带有“w**Any**\
  \ h**Any**”文本的标签。点击这个控件，会弹出一个包含九个格子的网格，如图 5-19 所示。我们将使用这个控件来帮助我们创建另外两组约束，但首先需要解释一下尺寸类到底是什么。\n\
  \n![9781484202005_Fig05-19.jpg](img/9781484202005_Fig05-19.jpg)\n\n图 5-19. 尺寸类控件\n\
  \n网格中的格子对应水平（宽度）和垂直（高度）尺寸类的不同组合。尺寸类是对设备宽度或高度的一种粗略分类。有两个具体的尺寸类——紧凑和常规——用于描述真实设备，还有一个——任意——可以在设计器（和代码中）作为通配符使用，匹配紧凑或常规。表\
  \ 5-1 显示了具体的水平和垂直尺寸类的四种可能组合如何映射到设备及其方向。\n\n表 5-1. 尺寸类到设备和方向的映射\n\n| 宽度 | 高度 | 设备和方向\
  \ |\n| --- | --- | --- |\n| 紧凑 | 紧凑 | 所有 iPhone（除 iPhone 6 Plus 外）的横屏方向。 |\n| 紧凑\
  \ | 常规 | 所有 iPhone 的竖屏方向。 |\n| 常规 | 紧凑 | iPhone 6 Plus 的横屏方向。 |\n| 常规 | 常规 | 所有\
  \ iPad 的横竖屏方向。 |\n\n一般来说，紧凑意味着比常规小一些，但有几个有趣的要点需要注意：\n\n- 在竖屏方向下，iPhone 的宽度为紧凑、高度为常规，这很合理，因为在此方向上宽度小于高度。然而，当旋转到横屏方向时，两个维度的尺寸类都变成了紧凑，而你可能会期望宽度为常规、高度为紧凑。例外的是更大的\
  \ iPhone 6 Plus，它确实具有常规宽度和紧凑高度。这说明在制定布局决策时，需要考虑两种尺寸类。\n- iPad 在横竖屏方向下都具有常规的宽度和高度尺寸类。这意味着不能仅依靠尺寸类来确定\
  \ iPad 的方向。但在很多情况下，这并不重要；因为 iPad 的屏幕相对较大，且比 iPhone 更接近正方形，所以通常可以在竖屏和横屏方向使用相同的布局。\n\
  \n图 5-20 以图形方式展示了表 5-1 中的信息，在我们修改 Restructure 应用程序时，你可能会发现参考它很有用。\n\n![9781484202005_Fig05-20.jpg](img/9781484202005_Fig05-20.jpg)\n\
  \n图 5-20. 尺寸类组合的图形表示\n\n### 尺寸类与故事板\n\n现在你已经了解了什么是尺寸类，让我们回到 Restructure 应用程序。再次查看故事板编辑器中的尺寸类控件。默认情况下，它设置为\
  \ w**Any** h**Any**。这意味着故事板编辑器中的设计适用于具有任何宽度和高度尺寸类的设备。我们将其称为基础设计。你应该始终从创建基础设计开始。完成之后，你可以通过修改基础设计来推导出任何其他所需的设计。你可以通过选择尺寸类控件中的特定组合来修改设计以适应特定的尺寸类组合，而不会影响基础设计。我们已经知道\
  \ Restructure 应用程序需要两个额外的设计——一个用于横屏方向的 iPhone，另一个用于 iPad。让我们先创建横屏 iPhone 的设计，如图\
  \ 5-18 顶部所示。\n\n首先要问的问题是：哪种尺寸类组合与我们即将设计的布局相对应？对于所有 iPhone（除 iPhone 6 Plus 外），这将是紧凑宽度、紧凑高度，即尺寸类控件设置为\
