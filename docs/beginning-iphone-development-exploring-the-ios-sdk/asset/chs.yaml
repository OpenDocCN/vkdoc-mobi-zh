  \  char *update = \"INSERT OR REPLACE INTO FIELDS (ROW, FIELD_DATA) \"\n       \
  \                \"VALUES (?, ?);\";\n        char *errorMsg = NULL;\n        sqlite3_stmt\
  \ *stmt;\n        if (sqlite3_prepare_v2(database, update, -1, &stmt, nil)\n   \
  \         == SQLITE_OK) {\n            sqlite3_bind_int(stmt, 1, i);\n         \
  \   sqlite3_bind_text(stmt, 2, [field.text UTF8String], -1, NULL);\n        }\n\
  \        if (sqlite3_step(stmt) != SQLITE_DONE) {\n            NSAssert(0, @\"更新数据表时出错:\
  \ %s\", errorMsg);\n        }\n        sqlite3_finalize(stmt);\n    }\n    sqlite3_close(database);\n\
  }\n\n- (void)didReceiveMemoryWarning\n{\n    [super didReceiveMemoryWarning];\n\
  \    // 处理任何可以重新创建的资源\n}\n\n@end\n```\n\n首先需要关注的代码段位于 `viewDidLoad` 方法中。我们首先打开数据库。如果打开数据库时遇到问题，就关闭它并触发一个断言：\n\
  \n```sqlite3\nsqlite3 *database;\nif (sqlite3_open([[self dataFilePath] UTF8String],\
  \ &database)\n    != SQLITE_OK) {\n    sqlite3_close(database);\n    NSAssert(0,\
  \ @\"打开数据库失败\");\n}\n```\n\n接下来，我们需要确保有一个表来存放数据。我们可以使用 `SQL CREATE TABLE` 来完成。通过指定\
  \ `IF NOT EXISTS`，我们防止数据库覆盖已有数据。如果已经存在同名表，该命令会安静地完成而不会执行任何操作，因此每次启动应用时调用它都是安全的，无需显式检查表是否存在：\n\
  \n```sqlite3\nNSString *createSQL = @\"CREATE TABLE IF NOT EXISTS FIELDS \"\n  \
  \                     \"(ROW INTEGER PRIMARY KEY, FIELD_DATA TEXT);\";\nchar *errorMsg;\n\
  if (sqlite3_exec (database, [createSQL UTF8String],\n                  NULL, NULL,\
  \ &errorMsg) != SQLITE_OK) {\n    sqlite3_close(database);\n    NSAssert(0, @\"\
  创建数据表时出错: %s\", errorMsg);\n}\n```\n\n数据库表的每一行包含一个整数和一个字符串。整数是数据来源在图形界面中的行号（从零开始），字符串是该行文本字段的内容。最后，我们需要加载数据。这一步通过\
  \ SQL `SELECT` 语句实现。在这个简单示例中，我们创建了一个 SQL `SELECT` 来请求数据库中的所有行，并请求 SQLite3 准备该 `SELECT`\
  \ 语句。我们还告诉 SQLite3 按行号对行进行排序，这样总能按相同顺序获取数据。如果不这样做，SQLite3 会按照内部存储顺序返回行。\n\n```sqlite3\n\
  NSString *query = @\"SELECT ROW, FIELD_DATA FROM FIELDS ORDER BY ROW\";\nsqlite3_stmt\
  \ *statement;\nif (sqlite3_prepare_v2(database, [query UTF8String],\n          \
  \             -1, &statement, nil) == SQLITE_OK) {\n```\n\n接着，我们遍历每一个返回的行：\n\n```sqlite3\n\
  while (sqlite3_step(statement) == SQLITE_ROW) {\n```\n\n现在，我们获取行号并存储到一个 `int` 中，然后将字段数据作为\
  \ C 字符串获取：\n\n```sqlite3\nint row = sqlite3_column_int(statement, 0);\nchar *rowData\
  \ = (char *)sqlite3_column_text(statement, 1);\n```\n\n接下来，我们将从数据库取出的值设置到对应的字段中：\n\
  \n```sqlite3\nNSString *fieldValue = [[NSString alloc]\n                       \
  \ initWithUTF8String:rowData];\nUITextField *field = self.lineFields[row];\nfield.text\
  \ = fieldValue;\n```\n\n最后，关闭数据库连接，完成操作：\n\n```sqlite3\n    }\n    sqlite3_finalize(statement);\n\
  }\nsqlite3_close(database);\n```\n\n请注意，在创建数据表并加载其中包含的所有数据后，我们立即关闭了数据库连接，而不是在整个应用运行期间保持其开启状态。这是管理连接的最简单方式；在这个小应用中，我们只需要在需要时打开几次连接。在数据库密集型应用中，你可能希望始终保持连接开启。\n\
  \n我们做的其他修改在 `applicationWillResignActive:` 方法中，需要在其中保存应用数据。当数据库表存储数据时，我们的应用数据看起来类似于表\
  \ 13-1。\n\n表 13-1. *存储在数据库 FIELDS 表中的数据*\n\n| ROW | FIELD_DATA |\n| --- | --- |\n\
  | 0 | 致敬那些疯狂的人。 |\n| 1 | 格格不入者。叛逆者。 |\n| 2 | 麻烦制造者。 |\n| 3 | 方孔里的圆钉。 |\n\n`applicationWillResignActive:`\
  \ 方法首先再次打开数据库。为了保存数据，我们遍历所有四个字段，并发出独立命令来更新数据库的每一行：\n\n```sqlite3\nfor (int i = 0;\
  \ i < 4; i++) {\n    UITextField *field = self.lineFields[i];\n```\n\n我们构建了一个包含两个绑定变量的\
  \ `INSERT OR REPLACE` SQL 语句。第一个变量代表要存储的行号，第二个变量是要存储的实际字符串值。通过使用 `INSERT OR REPLACE`\
  \ 而非更标准的 `INSERT`，我们无需担心该行是否已存在：\n\n```sqlite3\nchar *update = \"INSERT OR REPLACE\
  \ INTO FIELDS (ROW, FIELD_DATA) \"\n               \"VALUES (?, ?);\";\n```\n\n\
  接下来，我们声明一个指向语句的指针，用绑定变量准备语句，并为两个绑定变量绑定值：\n\n```sqlite3\nsqlite3_stmt *stmt;\nif\
  \ (sqlite3_prepare_v2(database, update, -1, &stmt, nil)\n    == SQLITE_OK) {\n \
  \   sqlite3_bind_int(stmt, 1, i);\n    sqlite3_bind_text(stmt, 2, [field.text UTF8String],\
  \ -1, NULL);\n}\n```\n\n现在调用 `sqlite3_step` 来执行更新，检查是否成功，然后结束语句，从而结束循环：\n\n```sqlite3\n\
  if (sqlite3_step(stmt) != SQLITE_DONE) {\n   NSAssert(0, @\"更新数据表时出错: %s\", errorMsg);\n\
  }\nsqlite3_finalize(stmt);\n```\n\n注意，这里我们使用了断言来检查错误条件。我们选择断言而非异常或手动错误检查，是因为这种情况通常只会在开发者犯错时发生。使用这个断言宏有助于调试代码，并且可以在最终应用中将其剥离。如果某个错误条件是用户可能合理遇到的，那么你应该考虑使用其他形式的错误检查。\n\
  \n**注意** 有一种可能导致上述 SQLite 代码出错的条件并非程序员错误。如果设备的存储空间已满，以至于 SQLite 无法将更改保存到数据库中，那么此处也会发生错误。不过，这种情况非常罕见，并且可能会给用户带来更深的系统级问题，这超出了我们应用数据的范畴。如果系统处于那种状态，我们的应用甚至可能无法成功启动。因此，我们完全避开这个问题。\n\
  \n循环结束后，我们关闭数据库：\n\n```sqlite3\nsqlite3_close(database);\n```\n\n你为什么不编译并运行这个应用呢？输入一些数据，然后按下\
  \ iPhone 模拟器的 **Home** 按钮。退出模拟器（以强制应用真正退出），然后重新启动 SQLite Persistence 应用。那些数据应该会完全保留在你上次离开的位置。对用户来说，这个应用的不同版本之间完全没有差别；然而，每个版本都使用了截然不同的持久化机制。\n\
  \n## 使用 Core Data\n\n\n\n"
- "# 核心数据持久化\n\n本章要演示的最后一项技术是如何使用苹果的 Core Data 框架实现持久化。Core Data 是一个健壮且功能完备的持久化工具。在这里，我们将向你展示如何使用\
  \ Core Data 重新创建你在我们的 Persistence 应用中所看到的相同持久化功能。\n\n**注意** 如需更全面地了解 Core Data，请参考\
  \ Michael Privet 和 Robert Warner 所著的 *Pro iOS Persistence: Using Core Data*（Apress，2014\
  \ 年）。\n\n在 Xcode 中，创建一个新项目。从 **iOS** 部分选择 **Single View Application** 模板，然后点击 **Next**。将产品命名为\
  \ *Core Data Persistence*，并从 **Devices** 控件中选择 **Universal**；但先不要点击 **Next** 按钮。如果你仔细查看\
  \ **Devices** 控件下方，会看到一个标有 **Use Core Data** 的复选框。将 Core Data 添加到现有项目中涉及一定的复杂性，因此苹果贴心地为某些应用项目模板提供了一个选项，以帮你完成大部分工作。\n\
  \n勾选 **Use Core Data** 复选框（见图 13-7），然后点击 **Next** 按钮。当系统提示时，选择一个目录来存储你的项目，然后点击 **Create**。\n\
  \n![9781484202005_Fig13-07.jpg](img/9781484202005_Fig13-07.jpg)\n\n图 13-7. 部分项目模板（包括\
  \ Single View Application）提供了使用 Core Data 进行持久化的选项\n\n在继续编写代码之前，我们先来看一下项目窗口，其中包含一些新内容。如果\
  \ *Core Data Persistence* 文件夹是关闭的，请将其展开（见图 13-8）。\n\n![9781484202005_Fig13-08.jpg](img/9781484202005_Fig13-08.jpg)\n\
  \n图 13-8. 我们的项目模板，包含了 Core Data 所需的文件。Core Data 模型已被选中，编辑窗格中显示的是数据模型编辑器\n\n### 实体与托管对象\n\
  \n你在项目导航器中看到的大部分内容应该都很熟悉：应用代理和图片资源目录。此外，你还会找到一个名为 *Core_Data_Persistence.xcdatamodeld*\
  \ 的文件，它包含了我们的数据模型。在 Xcode 中，Core Data 让我们无需编写代码就能可视地设计数据模型，并将该数据模型存储在 `*.xcdatamodeld*`\
  \ 文件中。\n\n现在单击 `*.xcdatamodeld*` 文件，你将看到 **数据模型编辑器**（参见图 13-8 的右侧）。根据项目窗口右下角 **Editor\
  \ Style** 控件的设置，数据模型编辑器会提供两种不同的视图来查看你的数据模型。在表模式下（即图 13-8 所示的模式），构成数据模型的元素将显示在一系列可编辑的表格中。在图形模式下，你将看到相同元素的图形化展示。目前，两种视图都反映的是同一个空数据模型。\n\
  \n在 Core Data 出现之前，创建数据模型的传统方式是创建 `NSObject` 的子类，并使其遵循 `NSCoding` 和 `NSCopying`\
  \ 协议，以便能够进行归档，就像我们在本章前面所做的那样。Core Data 采用了一种根本不同的方法。它不是使用类，而是首先在数据模型编辑器中创建 **实体**；然后，在你的代码中，你会基于这些实体创建\
  \ **托管对象**。\n\n**注意** 术语 *实体* 和 *托管对象* 可能有些令人困惑，因为它们都指代数据模型对象。*实体* 指的是对象的描述。*托管对象*\
  \ 指的是在运行时创建的实际具体实例。因此，在数据模型编辑器中，你创建的是实体；而在代码中，你创建和检索的是托管对象。实体和托管对象之间的区别类似于类与其实例之间的区别。\n\
  \n一个实体由属性（properties）组成。共有三种类型的属性：\n\n*   **属性（Attributes）**：在 Core Data 实体中，属性的功能与\
  \ Objective-C 类中的实例变量相同。它们都用于保存数据。\n*   **关系（Relationships）**：顾名思义，关系定义了实体之间的联系。例如，要创建一个\
  \ `Person` 实体，你可以先定义一些属性，比如 `hairColor`、`eyeColor`、`height` 和 `weight`。你也可以定义地址属性，比如\
  \ `state` 和 `zipCode`，或者将它们嵌入到一个单独的 `HomeAddress` 实体中。如果采用后一种方法，你还需要在 `Person` 和\
  \ `HomeAddress` 之间创建一个关系。关系可以是 **一对一** 或 **一对多**。`Person` 到 `HomeAddress` 的关系可能是一对一，因为大多数人只有一个家庭地址。而\
  \ `HomeAddress` 到 `Person` 的关系可能是一对多，因为同一个 `HomeAddress` 可能住着多个 `Person`。\n*   **获取属性（Fetched\
  \ properties）**：获取属性是关系的一种替代方案。获取属性允许你创建一个在获取时评估的查询，以确定哪些对象属于该关系。为了扩展我们之前的例子，一个\
  \ `Person` 对象可以有一个名为 `Neighbors` 的获取属性，该属性用于查找数据存储中所有与该 `Person` 自身的 `HomeAddress`\
  \ 具有相同邮政编码的 `HomeAddress` 对象。由于获取属性的构建和使用方式，它们始终是单向关系。获取属性也是唯一一种允许你跨越多个数据存储进行遍历的关系类型。\n\
  \n通常，属性、关系和获取属性是使用 Xcode 的数据模型编辑器来定义的。在我们的 Core Data Persistence 应用中，我们将构建一个简单的实体，这样你就能了解这一切是如何协同工作的。\n\
  \n### 键值编码\n\n在你的代码中，你将使用 **键值编码** 来设置属性或检索其现有值，而不是使用访问器和修改器。键值编码听起来可能有点吓人，但你在本书中已经大量使用过它了。例如，每次我们使用\
  \ `NSDictionary` 时，其实就是在使用一种键值编码形式，因为字典中的每个对象都存储在一个唯一的键值下。Core Data 使用的键值编码比 `NSDictionary`\
  \ 使用的要复杂一些，但基本概念是相同的。\n\n在处理托管对象时，用于设置或检索属性值的键就是你要设置的属性名称。因此，以下是从托管对象中检索名为 `name`\
  \ 的属性值的方法：\n\n```\nNSString *name = [myManagedObject valueForKey:@\"name\"];\n```\n\
  \n类似地，要设置托管对象属性的新值，可以这样做：\n\n```\n[myManagedObject setValue:@\"Gregor Overlander\"\
  \ forKey:@\"name\"];\n```\n\n### 将所有内容置于上下文中\n\n那么这些托管对象存在于何处呢？它们存在于所谓的 **持久化存储**\
  \ 中，也称为 **后备存储**。持久化存储可以有多种不同的形式。默认情况下，Core Data 应用会将后备存储实现为应用 *Documents* 目录中的一个\
  \ SQLite 数据库。即使你的数据是通过 SQLite 存储的，Core Data 框架中的类也会负责加载和保存数据的所有相关工作。如果你使用 Core Data，就无需编写任何你在\
  \ SQLite Persistence 应用中看到的 SQL 语句。你只需处理对象，Core Data 会在幕后处理它需要做的事情。\n\nSQLite 并不是\
  \ Core Data 存储的唯一选项。后备存储也可以实现为二进制平面文件，甚至以 XML 格式存储。另一种选择是创建内存存储，如果你正在编写缓存机制，可能会用到它；但它不会在本次会话结束后保存数据。在绝大多数情况下，你只需保留默认设置，使用\
  \ SQLite 作为你的持久化存储即可。\n\n\n\n尽管大多数应用程序只有一个持久存储，但在同一个应用程序中也可以有多个持久存储。如果你对备份存储是如何创建和配置的感到好奇，可以查看\
  \ Xcode 项目中的`AppDelegate.m`文件。我们选择的 Xcode 项目模板提供了设置应用程序单个持久存储所需的所有代码。\n\n除了创建持久存储（这已在应用程序委托中为你处理），你通常不会直接与持久存储交互。相反，你将使用一个称为**托管对象上下文**（通常简称为**上下文**）的东西。上下文管理对持久存储的访问，并维护自上次保存对象以来哪些属性已更改的信息。上下文还会向**撤销管理器**注册所有更改，这意味着你始终可以撤销单个更改，或一直回滚到最后一次保存数据的状态。\n\
  \n**注意**：你可以有多个上下文指向同一个持久存储，尽管大多数 iOS 应用程序只会使用一个。\n\n许多 Core Data 方法调用需要`NSManagedObjectContext`作为参数，或者必须针对一个上下文执行。除了更复杂的、多线程的\
  \ iOS 应用程序外，你只需使用应用程序委托提供的`managedObjectContext`属性即可，这是一个为你自动创建的默认上下文，同样归功于 Xcode\
  \ 项目模板。\n\n你可能注意到，除了托管对象上下文和持久存储协调器之外，提供的应用程序委托还包含一个`NSManagedObjectModel`实例。该类负责在运行时加载和表示你将使用\
  \ Xcode 中的数据模型编辑器创建的数据模型。你通常不需要直接与这个类交互。它由其他 Core Data 类在幕后使用，以便它们能识别你在数据模型中定义了哪些实体和属性。只要你使用提供的文件创建数据模型，就完全不必担心这个类。\n\
  \n### 创建新的托管对象\n\n创建托管对象的新实例相当容易，尽管不像使用`alloc`和`init`创建普通对象实例那样直接。相反，你使用`NSEntityDescription`类中的工厂方法`insertNewObjectForEntityForName:inManagedObjectContext:`。`NSEntityDescription`的工作是跟踪应用程序数据模型中定义的所有实体，并允许你创建这些实体的实例。此方法创建并返回一个内存中代表单个实体的实例。它返回一个`NSManagedObject`实例，该实例为该特定实体设置了正确的属性；或者，如果你已将实体配置为用`NSManagedObject`的特定子类实现，则返回该类的实例。请记住，实体就像类。实体是对对象的描述，并定义了特定实体具有哪些属性。\n\
  \n要创建新对象，请执行以下操作：\n\n```\nNSManagedObject *thing = [NSEntityDescription\n      \
  \                    insertNewObjectForEntityForName:@\"Thing\"\n              \
  \                     inManagedObjectContext:context];\n```\n\n该方法被称为`insertNewObjectForEntityForName:inManagedObjectContext:`，因为除了创建对象之外，它还将新创建的对象插入到上下文中，然后返回该对象。在这次调用之后，对象存在于上下文中，但尚未成为持久存储的一部分。该对象将在下次调用托管对象上下文的`save:`方法时被添加到持久存储中。\n\
  \n### 检索托管对象\n\n要从持久存储中检索托管对象，你将使用**获取请求**，这是 Core Data 处理预定义查询的方式。例如，你可能会说：“给我所有`eyeColor`为`blue`的`Person`。”\n\
  \n首先创建一个获取请求，然后为其提供一个`NSEntityDescription`，该描述指定了你希望检索的一个或多个对象的实体。以下是一个创建获取请求的示例：\n\
  \n```\nNSFetchRequest *request = [[NSFetchRequest alloc] init];\nNSEntityDescription\
  \ *entityDescr = [NSEntityDescription\n    entityForName:@\"Thing\" inManagedObjectContext:context];\n\
  [request setEntity:entityDescr];\n```\n\n可选地，你还可以使用`NSPredicate`类为获取请求指定条件。**谓词**类似于\
  \ SQL 的`WHERE`子句，允许你定义用于确定获取请求结果的条件。以下是一个谓词的简单示例：\n\n```\nNSPredicate *pred =\n\
  \    [NSPredicate predicateWithFormat:@\"(name = %@)\", nameString];\n[request setPredicate:\
  \ pred];\n```\n\n第一行代码创建的谓词告诉获取请求，不要检索指定实体的所有托管对象，只需获取那些`name`属性设置为`nameString`变量中当前值的对象。因此，如果`nameString`是一个值为`@\"\
  Bob\"`的`NSString`，我们就是在告诉获取请求只返回那些`name`属性设置为`\"Bob\"`的托管对象。这是一个简单的示例，但谓词可以非常复杂，并可以使用布尔逻辑来指定大多数情况下你可能需要的精确条件。\n\
  \n**注意**：*Learn Objective-C on the Mac,* 2nd Edition, by Scott Knaster, Waqar Maliq,\
  \ and Mark Dalrymple (Apress, 2012) 有一整章专门介绍`NSPredicate`的使用。\n\n创建好获取请求，为其提供实体描述，并可选地为其提供谓词后，你可以使用`NSManagedObjectContext`上的实例方法**执行**该获取请求：\n\
  \n```\nNSError *error;\nNSArray *objects = [context executeFetchRequest:request\
  \ error:&error];\nif (objects == nil) {\n    // handle error\n}\n```\n\n`executeFetchRequest:error:`\
  \ 将从持久存储中加载指定的对象，并将它们返回到一个数组中。如果遇到错误，你将得到一个`nil`数组，并且你提供的错误指针将指向一个描述具体问题的`NSError`对象。如果没有发生错误，你将得到一个有效的数组，尽管它可能不包含任何对象，因为可能没有对象满足指定的条件。从此时起，你对返回数组中的托管对象所做的任何更改，都将由你执行请求的托管对象上下文跟踪，并在你向该上下文发送`save:`消息时保存。\n\
  \n### Core Data 应用程序\n\n现在我们来实际操作一下 Core Data。首先，我们将注意力转回 Xcode 并创建我们的数据模型。\n\n\
  #### 设计数据模型\n\n选择`Core_Data_Persistence.xcdatamodel`以打开 Xcode 的数据模型编辑器。数据模型编辑窗格显示了数据模型中包含的所有实体、获取请求和配置。\n\
  \n**注意**：Core Data 的**配置**概念允许你定义数据模型中包含的实体的一个或多个命名子集，这在某些情况下非常有用。例如，如果你想创建一套共享同一数据模型的应用程序，但某些应用程序不应访问所有内容（可能有一个面向普通用户的应用程序和另一个面向管理员的应用程序），这种方法可以实现这一点。你还可以在单个应用程序中使用多个配置，因为它在不同的操作模式之间切换。在本书中，我们不打算处理配置；但由于配置列表（包括包含模型中所有内容的单个默认配置）就摆在那里，在实体和获取请求下方，我们认为这里值得一提。\n\
  \n\n\n如图 13-8 所示，这些列表目前为空，因为我们尚未创建任何内容。点击编辑器窗格左下角标有**添加实体**的加号图标即可解决此问题。这将创建一个名为*Entity*的全新实体（见图\
  \ 13-9）。\n\n![9781484202005_Fig13-09.jpg](img/9781484202005_Fig13-09.jpg)\n\n图 13-9。数据模型编辑器，显示我们新添加的实体\n\
  \n在构建数据模型时，你可能会发现自己经常使用编辑区域右下角的**编辑器样式**控制在表视图和图形视图之间切换。现在请切换到图形视图。图形视图会显示一个代表我们实体的小方框，其中包含展示实体属性和关系的区域，目前也是空的（见图\
  \ 13-10）。当模型包含多个实体时，图形视图非常有用，因为它能以图形方式展示实体间的所有关系。\n\n![9781484202005_Fig13-10.jpg](img/9781484202005_Fig13-10.jpg)\n\
  \n图 13-10。通过使用右下角的控制按钮，我们将数据模型编辑器切换到了图形模式。请注意，图形模式显示与表模式相同的实体，只是采用了图形形式。当存在多个相互关联的实体时，这种模式尤为有用。\n\
  \n**注意** 如果你偏好图形化操作，完全可以在图形视图中构建整个模型。不过本章我们将沿用表视图，因为这样更易于讲解。在创建自己的数据模型时，如果图形视图更适合你，请随意使用。\n\
  \n无论你使用表视图还是图形视图设计数据模型，几乎都需要调出 Core Data 数据模型检查器。该检查器允许你查看和编辑数据模型编辑器中选中项的相关细节——无论是实体、属性、关系还是其他内容。没有数据模型检查器也能浏览现有模型，但要真正处理模型，你必然需要用到这个检查器，就像编辑\
  \ nib 文件时频繁使用属性检查器一样。\n\n按下 `Command+Option+3` 打开数据模型检查器。此时，检查器显示的是刚添加实体的信息。我们模型中的这个实体对应\
  \ GUI 上的一行数据，因此将其命名为 *Line*。将**名称**字段从 *Entity* 改为 *Line*（见图 13-11）。\n\n![9781484202005_Fig13-11.jpg](img/9781484202005_Fig13-11.jpg)\n\
  \n图 13-11。使用数据模型检查器将实体名称更改为 Line\n\n如果你当前处于图形视图，请使用**编辑器样式**控制切换到表视图。表视图能显示实体各部分更详细的信息，因此在创建新实体时通常比图形视图更实用。在表视图中，数据模型编辑器的大部分区域被展示实体属性、关系和已获取属性的表格占据。这正是我们设置实体的地方。\n\
  \n请注意，编辑区域右下角，在编辑器样式控制旁边，有一个标有**添加属性**的加号图标。选中实体后，按住鼠标按钮悬停在此控件上，会弹出一个菜单，允许你向实体添加属性、关系或已获取属性（见图\
  \ 13-12）。\n\n![9781484202005_Fig13-12.jpg](img/9781484202005_Fig13-12.jpg)\n\n图\
  \ 13-12。选定实体后，按住右侧的加号图标可向实体添加属性、关系或已获取属性\n\n**注意**  请注意，添加属性时无需长按。直接点击加号图标即可获得相同效果。快捷键！\n\
  \n继续使用此方法向 Line 实体添加一个属性。表中属性的部分会新增一个名为*attribute*的属性，并自动选中。在表格中，你不仅能看到行被选中，属性的名称也被选中。这意味着点击加号后，无需再点击即可直接输入新属性的名称。\n\
  \n将新属性的名称从 *attribute* 改为 `lineNumber`，然后点击名称旁边的弹出菜单，将其类型从 *Undefined* 改为 *Integer\
  \ 16*。这样做可以将此属性改为存储整数值。我们将使用此属性来标识托管对象的四个字段中哪个包含数据。由于只有四个选项，我们选择了可用的最小整数类型。\n\n\
  现在将注意力转向编辑区域右侧窗格中的数据模型检查器。在这里可以配置更多细节。右侧**名称**字段下方的**可选**复选框默认是选中的。点击取消勾选。我们不希望此属性是可选的——因为不对应界面标签的行是没有意义的。\n\
  \n勾选**瞬态**复选框可创建瞬态属性。此属性用于指定应用运行时托管对象持有的值，但永远不会保存到数据存储中。我们希望行号能够保存到数据存储中，因此保持**瞬态**复选框未选中。\n\
  \n勾选**已索引**复选框会在底层 SQL 数据库中为存储此属性数据的列创建索引。保持**已索引**复选框未选中。由于数据量很小，我们也不会为用户提供搜索功能，因此无需索引。\n\
  \n在其下方还有更多设置，允许我们通过指定整数的最小值和最大值、默认值等来进行简单的数据验证。在本示例中，我们不会使用任何这些设置。\n\n现在确保 Line\
  \ 实体被选中，点击**添加属性**控件来添加第二个属性。将新属性的名称改为 `lineText`，类型改为 *String*。此属性将存储文本字段中的实际数据。为此属性保持**可选**复选框的选中状态；用户完全可能不输入某个字段的值。\n\
  \n**注意**  将类型改为 *String* 后，你会注意到检查器显示了一组略有不同的选项，用于设置默认值或限制字符串长度。虽然在本应用中不会使用这些选项，但知晓它们的存在还是不错的。\n\
  \n猜猜看？你的数据模型已经完成了。就是这么简单。Core Data 让你通过点击就能创建应用数据模型。让我们完成应用的构建，这样你就能看到如何在代码中使用我们的数据模型。\n\
  \n#### 创建持久化视图\n\n选择 `ViewController.m` 并进行以下修改：\n\n```objectivec\n#import \"ViewController.h\"\
  \n\n@interface ViewController ()\n\n@property (strong, nonatomic) IBOutletCollection(UITextField)\
  \ NSArray *lineFields;\n\n@end\n```\n\n保存此文件。接下来，选择 `Main.storyboard` 在 Interface\
  \ Builder 中编辑 GUI。按照本章前面“设计持久化应用视图”部分中的说明设计视图并连接输出口集合。也可以参考图 13-5。设计完成后，保存 storyboard\
  \ 文件。\n\n现在回到 `ViewController.m`，进行以下修改：\n\n```objectivec\n#import \"ViewController.h\"\
  \n#import \"AppDelegate.h\"\n```\n\n\n\n```objc\nstatic NSString * const kLineEntityName\
  \ = @\"Line\";\nstatic NSString * const kLineNumberKey = @\"lineNumber\";\nstatic\
  \ NSString * const kLineTextKey = @\"lineText\";\n\n@interface ViewController ()\n\
  \n@property (strong, nonatomic) IBOutletCollection(UITextField) NSArray *lineFields;\n\
  \n@end\n\n@implementation ViewController\n\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\
  \    // 加载视图后执行任何额外设置，通常从 nib 文件加载。\n\n    AppDelegate *appDelegate = [UIApplication\
  \ sharedApplication].delegate;\n    NSManagedObjectContext *context = [appDelegate\
  \ managedObjectContext];\n    NSFetchRequest *request = [[NSFetchRequest alloc]\
  \ initWithEntityName:kLineEntityName];\n\n    NSError *error;\n    NSArray *objects\
  \ = [context executeFetchRequest:request error:&error];\n    if (objects == nil)\
  \ {\n        NSLog(@\"出现错误！\");\n        // 执行适当的错误处理\n    }\n\n    for (NSManagedObject\
  \ *oneObject in objects) {\n        int lineNum = [[oneObject valueForKey:kLineNumberKey]\
  \ intValue];\n        NSString *lineText = [oneObject valueForKey:kLineTextKey];\n\
  \n        UITextField *theField = self.lineFields[lineNum];\n        theField.text\
  \ = lineText;\n    }\n\n    UIApplication *app = [UIApplication sharedApplication];\n\
  \    [[NSNotificationCenter defaultCenter] addObserver:self\n                  \
  \                           selector:@selector(applicationWillResignActive:)\n \
  \                                                name:UIApplicationWillResignActiveNotification\n\
  \                                               object:app];\n}\n\n- (void)applicationWillResignActive:(NSNotification\
  \ *)notification {\n    AppDelegate *appDelegate = [UIApplication sharedApplication].delegate;\n\
  \    NSManagedObjectContext *context = [appDelegate managedObjectContext];\n   \
  \ NSError *error;\n    for (int i = 0; i < 4; i++) {\n        UITextField *theField\
  \ = self.lineFields[i];\n\n        NSFetchRequest *request = [[NSFetchRequest alloc]\
  \ initWithEntityName:kLineEntityName];\n        NSPredicate *pred = [NSPredicate\
  \ predicateWithFormat:@\"(%K = %d)\", kLineNumberKey, i];\n        [request setPredicate:pred];\n\
  \n        NSArray *objects = [context executeFetchRequest:request error:&error];\n\
  \        if (objects == nil) {\n            NSLog(@\"出现错误！\");\n            // 执行适当的错误处理\n\
  \        }\n\n        NSManagedObject *theLine = nil;\n        if ([objects count]\
  \ > 0) {\n            theLine = [objects objectAtIndex:0];\n        } else {\n \
  \           theLine = [NSEntityDescription insertNewObjectForEntityForName:kLineEntityName\n\
  \                                                    inManagedObjectContext:context];\n\
  \        }\n\n        [theLine setValue:[NSNumber numberWithInt:i] forKey:kLineNumberKey];\n\
  \        [theLine setValue:theField.text forKey:kLineTextKey];\n    }\n    [appDelegate\
  \ saveContext];\n}\n\n- (void)didReceiveMemoryWarning {\n    [super didReceiveMemoryWarning];\n\
  \    // 处理可重新创建的资源。\n}\n\n@end\n```\n\n现在来看`viewDidLoad`方法，它需要检查持久化存储中是否已有现有数据。如果有，则应加载数据并用其填充文本字段。在该方法中，我们首先获取应用委托的引用，然后用它来获取为我们创建的托管对象上下文：\n\
  \n```objc\nAppDelegate *appDelegate = [UIApplication sharedApplication].delegate;\n\
  NSManagedObjectContext *context = [appDelegate managedObjectContext];\n```\n\n接下来的任务是创建一个获取请求，并传入实体名称，以便它知道要检索哪种类型的对象：\n\
  \n```objc\nNSFetchRequest *request = [[NSFetchRequest alloc] initWithEntityName:kLineEntityName];\n\
  ```\n\n由于我们要检索持久化存储中的所有`Line`对象，因此不创建谓词。通过执行不带谓词的请求，我们告诉上下文返回存储中的每一个`Line`对象。我们确保返回的是有效数组，如果未返回则记录日志：\n\
  \n```objc\nNSError *error;\nNSArray *objects = [context executeFetchRequest:request\
  \ error:&error];\nif (objects == nil) {\n    NSLog(@\"出现错误！\");\n    // 执行适当的错误处理\n\
  }\n```\n\n接下来，我们使用快速枚举遍历检索到的托管对象数组，从每个托管对象中提取`lineNum`和`lineText`值，并利用这些信息更新用户界面中的一个文本字段：\n\
  \n```objc\nfor (NSManagedObject *oneObject in objects) {\n    int lineNum = [[oneObject\
  \ valueForKey:kLineNumberKey] intValue];\n    NSString *lineText = [oneObject valueForKey:kLineTextKey];\n\
  \n    UITextField *theField = self.lineFields[lineNum];\n    theField.text = lineText;\n\
  }\n```\n\n然后，与本章所有其他应用一样，我们注册通知，以便在应用即将退出活动状态时（无论是被移至后台还是完全退出）接收通知，从而保存用户对数据所做的任何更改：\n\
  \n```objc\nUIApplication *app = [UIApplication sharedApplication];\n[[NSNotificationCenter\
  \ defaultCenter] addObserver:self\n                                         selector:@selector(applicationWillResignActive:)\n\
  \                                             name:UIApplicationWillResignActiveNotification\n\
  \                                           object:app];\n```\n\n接下来看`applicationWillResignActive:`。我们以与上一个方法相同的方式开始：获取应用委托的引用，并用它获取指向应用默认上下文的指针：\n\
  \n```objc\nAppDelegate *appDelegate = [UIApplication sharedApplication].delegate;\n\
  NSManagedObjectContext *context = [appDelegate managedObjectContext];\n```\n\n之后，我们进入一个循环，该循环执行四次，每个文本字段一次，然后获取对正确字段的引用：\n\
  \n```objc\nfor (int i = 0; i < 4; i++) {\n    UITextField *theField = self.lineFields[i];\n\
  ```\n\n接下来，我们为`Line`条目创建获取请求。我们需要判断持久化存储中是否已存在对应于该字段的托管对象，因此我们创建一个谓词，通过使用文本字段的索引作为记录键来标识该字段的正确对象：\n\
  \n```objc\nNSFetchRequest *request = [[NSFetchRequest alloc] initWithEntityName:kLineEntityName];\n\
  NSPredicate *pred = [NSPredicate predicateWithFormat:@\"(%K = %d)\", kLineNumberKey,\
  \ i];\n[request setPredicate:pred];\n```\n\n现在，我们针对上下文执行获取请求，并检查`objects`是否不为`nil`。如果为`nil`，则表示出现错误，我们应该执行应用所需的任何错误检查。对于这个简单的应用，我们仅记录错误并继续：\n\
  \n```objc\nNSArray *objects = [context executeFetchRequest:request error:&error];\n\
  if (objects == nil) {\n    NSLog(@\"出现错误！\");\n    // 执行适当的错误处理\n}\n```\n\n之后，我们声明一个指向`NSManagedObject`的指针并将其设置为`nil`。我们这样做是因为我们尚不清楚是要从持久化存储中获取一个托管对象，还是要创建一个新的托管对象。为此，我们检查是否有匹配条件的对象被返回。如果有，则加载它；如果没有，则创建一个新的托管对象来保存该字段的文本：\n\
  \n```objc\nNSManagedObject *theLine = nil;\nif ([objects count] > 0) {\n    theLine\
  \ = [objects objectAtIndex:0];\n} else {\n    theLine = [NSEntityDescription insertNewObjectForEntityForName:kLineEntityName\n\
  \                                            inManagedObjectContext:context];\n\
  }\n```\n\n接下来，我们使用键值编码为这个托管对象设置行号和文本：\n\n```objc\n[theLine setValue:[NSNumber numberWithInt:i]\
  \ forKey:kLineNumberKey];\n[theLine setValue:theField.text forKey:kLineTextKey];\n\
  ```\n\n最后，循环结束后，我们告诉上下文保存其更改：\n\n```objc\n[appDelegate saveContext];\n```\n\n就是这样！构建并运行应用，确保其正常工作。你应用的\
  \ Core Data 版本的行为应与之前版本完全相同。\n\n\n\n"
- '# 看似 Core Data 需要大量工作；而且，对于像这样的简单应用，它并没有带来太多优势。但在更复杂的应用中，Core Data 可以大幅减少你设计和编写数据模型所花费的时间。


  ### 持久化的奖赏


  你现在应该已经扎实掌握了在应用会话之间保存数据的四种不同方法——如果算上你在上一章学到的用户默认设置，那就是五种方法。我们构建了一个使用属性列表持久化数据的应用，然后将其修改为使用对象归档保存数据。接着，我们进行了更改，使用
  iOS 内置的 SQLite3 机制来保存应用数据。最后，我们使用 Core Data 重建了同一个应用。这些机制几乎是所有 iOS 应用中保存和加载数据的基本构建模块。


  '
- "# 第 14 章：文档与 iCloud\n\n过去几年中，iOS 新增的最大特色之一是苹果的 iCloud 服务，它为 iOS 设备以及运行 OS X 的电脑提供云存储服务。大多数\
  \ iOS 用户可能会在设置新设备或将旧设备升级到更新的 iOS 版本时，立即遇到 iCloud 设备备份选项。他们会很快发现无需使用电脑的自动备份的优势。\n\
  \n免电脑备份是一个很棒的功能，但这只是 iCloud 能力的冰山一角。iCloud 更重要的功能可能是，它为应用开发者提供了一种机制，可以用很少的工作量将数据透明地保存到苹果的云服务器。你可以让应用将数据保存到\
  \ iCloud，并让这些数据自动传输到登录同一 iCloud 用户的其他设备。用户可以在 iPad 上创建文档，随后在 iPhone 或 Mac 上查看同一文档，无需任何中间步骤；文档就这样出现了。\n\
  \n系统进程会负责确保用户拥有有效的 iCloud 登录并管理文件传输，因此你无需担心网络或身份验证问题。除了少量应用配置外，只需对保存文件和定位可用文件的方法稍作修改，就能让你的应用顺利支持\
  \ iCloud。\n\niCloud 文件系统的一个关键组件是 `UIDocument` 类。`UIDocument` 通过处理读写文件的一些常见方面，减轻了创建基于文档应用的部分工作。这样，你可以将更多时间专注于应用的独特功能，而不是为每个应用重复构建相同的基础框架。\n\
  \n无论你是否使用 iCloud，`UIDocument` 都为在 iOS 中管理文档文件提供了一些强大的工具。为了演示这些功能，本章的第一部分将专门创建 TinyPix，一个将文件保存到本地存储的简单文档应用。这种方法适用于各种基于\
  \ iOS 的应用。\n\n在本章的后半部分，我们将向你展示如何让 TinyPix 支持 iCloud。为此，你需要准备一台或多台连接了 iCloud 的 iOS\
  \ 设备。你还需要一个付费的 iOS 开发者账户，以便在设备上安装应用。这是因为在模拟器中运行的应用无法访问 iCloud 服务。\n\n## 使用 UIDocument\
  \ 管理文档存储\n\n任何不仅在网页上冲浪、还使用过台式电脑的人，可能都接触过基于文档的应用。从 TextEdit 到 Microsoft Word，从 GarageBand\
  \ 到 Xcode，任何允许你处理多个数据集合、并将每个集合保存到单独文件的软件，都可以被视为基于文档的应用。通常，屏幕上的窗口与其包含的文档之间存在一一对应的关系；然而，有时（例如\
  \ Xcode），单个窗口可以显示多个以某种方式相互关联的文档。\n\n在 iOS 设备上，我们无法拥有多个窗口，但仍有大量应用可以从基于文档的方法中受益。现在，iOS\
  \ 开发者有了一点助力——这要归功于 `UIDocument` 类，它处理了文档文件存储中最常见的方面。你无需直接处理文件（只需使用 URL），所有必要的读写操作都在后台线程中进行，因此即使在文件访问期间，你的应用也能保持响应。它还会定期以及在应用挂起时（例如设备关机、按下\
  \ `Home` 按钮等）自动保存已编辑的文档，因此无需任何保存按钮。所有这些都有助于让你的应用表现得像用户所期望的 iOS 应用那样。\n\n## 构建 TinyPix\n\
  \n我们将构建一个名为 TinyPix 的应用，让你可以编辑简单的 8 × 8 图像，使用华丽的 1 位颜色（见图 14-1）！为了方便用户，每张图片都会被放大到全屏尺寸进行编辑。当然，我们将使用\
  \ `UIDocument` 来表示每张图像的数据。\n\n![9781484202005_Fig14-01.jpg](img/9781484202005_Fig14-01.jpg)\n\
  \n图 14-1. 在 TinyPix 中编辑一个极低分辨率的图标\n\n首先在 Xcode 中创建一个新项目。从 `iOS` `Application` 部分，选择\
  \ `Master-Detail Application` 模板，然后点击 `Next`。将这个新应用命名为 *TinyPix*，并将 `Devices` 弹出菜单设置为\
  \ `Universal`。确保 `Use Core Data` 复选框未选中。现在再次点击 `Next`，并选择保存项目的位置。\n\n在 Xcode 的项目导航器中，你会看到项目包含\
  \ `AppDelegate`、`MasterViewController` 和 `DetailViewController` 的文件，以及 *Main.storyboard*\
  \ 文件。我们将对这些文件进行修改，同时还会创建几个新类。\n\n### 创建 TinyPixDocument\n\n我们要创建的第一个新类是文档类，它将包含从文件存储中加载的每个\
  \ TinyPix 图像的数据。在 Xcode 中选择 *TinyPix* 文件夹，然后按 `N` 创建一个新文件。从 `iOS` 部分选择 `Cocoa Touch\
  \ Class`，然后点击 `Next`。在 `Class` 字段中输入 `TinyPixDocument`，在 `Subclass of` 字段中输入 `UIDocument`，然后点击\
  \ `Next`。最后，点击 `Create` 创建文件。\n\n在深入了解其实现细节之前，让我们先思考一下这个类的公共 API。这个类将表示一个 8 × 8\
  \ 的像素网格，其中每个像素由单个开或关值组成。因此，让我们提供一个方法，该方法接受行和列索引对，并返回一个 `BOOL` 值。我们还要提供一个方法，用于在指定的行和列设置特定状态，并且为了方便，再提供一个方法，用于简单地切换特定位置的状态。\n\
  \n选择 *TinyPixDocument.h* 来编辑新类的头文件。添加以下粗体行：\n\n```objc\n#import <UIKit/UIKit.h>\n\
  \n@interface TinyPixDocument : UIDocument\n\n// 行和列的范围为 0 到 7\n- (BOOL)stateAtRow:(NSUInteger)row\
  \ column:(NSUInteger)column;\n- (void)setState:(BOOL)state atRow:(NSUInteger)row\
  \ column:(NSUInteger)column;\n- (void)toggleStateAtRow:(NSUInteger)row column:(NSUInteger)column;\n\
  \n@end\n```\n\n\n\n现在切换到`TinyPixDocument.m`，我们将在其中实现 8×8 网格的存储、公共 API 中定义的方法，以及加载和保存文档所需的`UIDocument`方法。\n\
  \n首先定义 8×8 位图数据的存储。我们将数据保存在`NSMutableData`实例中，这允许我们直接操作包含在对象内部的字节数据数组，这样在完成数据操作后，通常的\
  \ Cocoa 内存管理会负责释放内存。添加这个类扩展来实现：\n\n```objective-c\n#import \"TinyPixDocument.h\"\
  \n\n@interface TinyPixDocument ()\n\n@property (strong, nonatomic) NSMutableData\
  \ *bitmap;\n\n@end\n\n@implementation TinyPixDocument\n```\n\n`UIDocument`类有一个所有子类都应使用的指定初始化方法。我们将在这里创建初始位图。采用真正的位图风格，我们通过每个字节包含一行来最小化内存使用。字节中的每个位代表该行中某列的开关值。总共，我们的文档只包含\
  \ 8 个字节。\n\n**注意**：本节包含少量位运算，以及一些 C 指针和数组操作。对于 C 开发者来说这些很平常；但如果你 C 语言经验不足，可能会觉得困惑甚至难以理解。如果这样，请直接复制并使用提供的代码（它们工作得很好）。如果你真想理解原理，可能需要更深入学习\
  \ C 语言，比如在你的书架上添加 Dave Mark（Apress, 2009）的《在 Mac 上学习 C》这本书。\n\n将这个方法添加到文档的实现中，放在文件底部`@end`的上方：\n\
  \n```objective-c\n- (id)initWithFileURL:(NSURL *)url {\n    self = [super initWithFileURL:url];\n\
  \    if (self) {\n        unsigned char startPattern[] = {\n            0x01,\n\
  \            0x02,\n            0x04,\n            0x08,\n            0x10,\n  \
  \          0x20,\n            0x40,\n            0x80\n        };\n        self.bitmap\
  \ = [NSMutableData dataWithBytes:startPattern length:8];\n    }\n    return self;\n\
  }\n```\n\n这将每个位图初始化为一个从一角延伸到另一角的简单对角线图案。\n\n现在，实现我们在头文件中定义的公共 API 方法。首先处理读取单个位状态的方法。它从字节数组中获取相关字节，然后执行位移和`AND`操作来确定指定的位是否被设置，并相应地返回`YES`或`NO`。在`@end`上方添加这个方法：\n\
  \n```objective-c\n- (BOOL)stateAtRow:(NSUInteger)row column:(NSUInteger)column {\n\
  \    const char *bitmapBytes = [self.bitmap bytes];\n    char rowByte = bitmapBytes[row];\n\
  \    char result = (1 << column) & rowByte;\n    if (result != 0) {\n        return\
  \ YES;\n    } else {\n        return NO;\n    }\n}\n```\n\n接下来是逆操作：一个设置指定行和列值的方法。这里，我们再次获取指定行的相关字节并进行位移。但这次，我们不使用位移后的位来检查行的内容，而是用它来设置或清除行中的位。在`@end`上方添加这个方法：\n\
  \n```objective-c\n- (void)setState:(BOOL)state atRow:(NSUInteger)row column:(NSUInteger)column\
  \ {\n    char *bitmapBytes = [self.bitmap mutableBytes];\n    char *rowByte = &bitmapBytes[row];\n\
  \    if (state) {\n        *rowByte = *rowByte | (1 << column);\n    } else {\n\
  \        *rowByte = *rowByte & ~(1 << column);\n    }\n}\n```\n\n现在，添加一个便捷方法，让外部代码可以简单地切换单个单元格：\n\
  \n```objective-c\n- (void)toggleStateAtRow:(NSUInteger)row column:(NSUInteger)column\
  \ {\n    BOOL state = [self stateAtRow:row column:column];\n    [self setState:!state\
  \ atRow:row column:column];\n}\n```\n\n我们的文档类需要最后两个部分才能融入基于文档的应用程序：读取和写入的方法。正如我们之前提到的，你不需要直接处理文件。你甚至不需要关心之前传递给`initWithFileURL:`方法的\
  \ URL。你需要做的只是实现一个将文档数据结构转换为`NSData`对象（准备保存）的方法，以及另一个从新加载的`NSData`对象中提取数据结构的方法。因为文档的内部结构已经包含在`NSMutableData`对象中（它是`NSData`的子类），这些实现非常简单。在`@end`上方添加这两个方法：\n\
  \n```objective-c\n- (id)contentsForType:(NSString *)typeName error:(NSError **)outError\
  \ {\n    NSLog(@\"saving document to URL %@\", self.fileURL);\n    return [self.bitmap\
  \ copy];\n}\n\n- (BOOL)loadFromContents:(id)contents ofType:(NSString *)typeName\n\
  \        error:(NSError **)outError {\n    NSLog(@\"loading document from URL %@\"\
  , self.fileURL);\n    self.bitmap = [contents mutableCopy];\n    return true;\n\
  }\n```\n\n第一个方法`contentsForType:error:`在文档即将保存到存储时被调用。它只返回位图数据的不可变副本，系统稍后会负责存储。\n\
  \n第二个方法`loadFromContents:ofType:error:`在系统刚加载存储数据并希望将这些数据提供给文档类实例时被调用。这里，我们只是获取传入数据的可变副本。我们包含了一些日志语句，以便稍后可以在\
  \ Xcode 日志中看到发生了什么。\n\n每个方法都允许你做一些我们在本应用中忽略的事情。它们都提供了一个`typeName`参数，你可以用它来区分文档可以加载或保存的不同数据类型。它们还有一个`outError`参数，你可以用它来指定在数据复制到或从文档的内存数据结构时发生的错误。但在我们的案例中，由于操作非常简单，这些都不是重要问题。\n\
  \n这就是文档类所需的全部内容。遵循 MVC 原则，我们的文档完全位于模型阵营，不关心如何显示。多亏了`UIDocument`父类，文档甚至屏蔽了大部分关于如何存储的细节。\n\
  \n**代码大师**\n\n现在我们的文档类已经准备好，接下来要处理用户运行应用时看到的第一个视图：现有 TinyPix 文档的列表，这由`MasterViewController`类负责。我们需要让这个类知道如何获取可用文档列表，让用户选择现有文档进行查看或编辑，以及创建和命名新文档。当文档被创建或选择后，它会被传递给详情控制器进行显示。\n\
  \n首先选择`MasterViewController.m`。这个文件作为主-从应用程序模板的一部分生成，包含用于显示数组项的起始代码。我们不会使用这些代码，而是自己完成所有工作。因此，删除`@implementation`块中的所有方法以及顶部类扩展中的所有声明。完成后，你应该得到一个干净的起始点，看起来像这样：\n\
  \n```objective-c\n#import \"MasterViewController.h\"\n#import \"DetailViewController.h\"\
  \n\n@interface MasterViewController ()\n@end\n\n@implementation MasterViewController\n\
  @end\n```\n\n\n\n我们还将为 GUI 添加一个分段控件，允许用户选择一种色调颜色，该颜色将用作 TinyPix GUI 部分的突出显示颜色。虽然这本身不是一个特别有用的功能，但它将有助于演示\
  \ iCloud 机制，因为突出显示颜色设置会从您设置的设备传输到另一台运行相同应用的已连接设备。该应用的第一个版本会将颜色用作每个设备上的本地设置。在本章后面，我们将添加代码，使颜色设置通过\
  \ iCloud 传播到用户的其他设备。\n\n为了实现颜色选择控件，我们还将向代码中添加一个插座（`outlet`）和一个动作（`action`）。我们还将添加属性来保存文档文件名列表和用户所选文档的指针。对\
  \ `MasterViewController.m` 进行以下更改：\n\n```objective-c\n#import \"MasterViewController.h\"\
  \n#import \"DetailViewController.h\"\n#import \"TinyPixDocument.h\"\n\n@interface\
  \ MasterViewController ()\n\n@property (weak, nonatomic) IBOutlet UISegmentedControl\
  \ *colorControl;\n@property (strong, nonatomic) NSArray *documentFilenames;\n@property\
  \ (strong, nonatomic) TinyPixDocument *chosenDocument;\n\n@end\n```\n\n在实现我们需要处理的表视图方法和其他标准方法之前，我们将编写几个私有实用方法。第一个方法接收一个文件名，将其与应用\
  \ `Documents` 目录的文件路径组合，并返回指向该特定文件的 URL。正如你在第 13 章中所看到的，`Documents` 目录是 iOS 为每个安装在\
  \ iOS 设备上的应用预留的特殊位置。你可以用它来存储你的应用创建的文档，并且可以放心，当用户备份他们的 iOS 设备（无论是备份到 iTunes 还是 iCloud\
  \ 时），这些文档都会被自动包含。\n\n将此方法添加到实现中，直接放在文件底部 `@end` 的上方：\n\n```objective-c\n- (NSURL\
  \ *)urlForFilename:(NSString *)filename {\n    NSFileManager *fm = [NSFileManager\
  \ defaultManager];\n    NSArray *urls = [fm URLsForDirectory:NSDocumentDirectory\n\
                                 inDomains:NSUserDomainMask];\n    NSURL *directoryURL\
  \ = urls[0];\n    NSURL *fileURL = [directoryURL URLByAppendingPathComponent:filename];\n\
      return fileURL;\n}\n```\n\n这里我们使用了 `NSFileManager` 类的一个方法来获取映射到应用 `Documents`\
  \ 目录的 `URL`。此方法的工作原理与我们在第 13 章中使用的 `NSSearchPathForDirectoriesInDomains()` 函数类似，只是它返回一个\
  \ `NSURL` 对象数组而不是字符串，这对于本方法的目的来说更方便。\n\n第二个私有方法稍长一些。它也使用 `Documents` 目录来搜索代表现有文档的文件。该方法会找到文件并按创建日期排序，以便用户看到按“博客风格”（最新的在前）排序的文档列表。文档文件名存储在\
  \ `documentFilenames` 属性中，然后重新加载表视图（虽然我们承认还没有处理它）。将此方法添加到 `@end` 上方：\n\n```objective-c\n\
  - (void)reloadFiles {\n    NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory,\n\
          NSUserDomainMask, YES);\n    NSString *path = paths[0];\n    NSFileManager\
  \ *fm = [NSFileManager defaultManager];\n\nNSError *dirError;\n    NSArray *files\
  \ = [fm contentsOfDirectoryAtPath:path error:&dirError];\n    if (!files) {\n        NSLog(@\"\
  Error listing files in directory %@: %@\",\n              path, dirError);\n    }\n\
      NSLog(@\"found files: %@\", files);\n\nfiles = [files sortedArrayUsingComparator:\n\
               ^NSComparisonResult(id filename1, id filename2) {\n        NSDictionary\
  \ *attr1 = [fm attributesOfItemAtPath:\n                               [path stringByAppendingPathComponent:filename1]\n\
                                                     error:nil];\n        NSDictionary\
  \ *attr2 = [fm attributesOfItemAtPath:\n                               [path stringByAppendingPathComponent:filename2]\n\
                                                     error:nil];\n        return [attr2[NSFileCreationDate]\
  \ compare: attr1[NSFileCreationDate]];\n    }];\n    self.documentFilenames = files;\n\
      [self.tableView reloadData];\n}\n```\n\n现在，让我们处理我们的老朋友——表视图数据源方法。现在你应该对它们非常熟悉了。将以下三个方法添加到\
  \ `@end` 上方：\n\n```objective-c\n- (NSInteger)numberOfSectionsInTableView:(UITableView\
  \ *)tableView {\n    return 1;\n}\n\n- (NSInteger)tableView:(UITableView *)tableView\n\
          numberOfRowsInSection:(NSInteger)section {\n    return [self.documentFilenames\
  \ count];\n}\n\n- (UITableViewCell *)tableView:(UITableView *)tableView\n        cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath {\n    UITableViewCell *cell = [tableView dequeueReusableCellWithIdentifier:\n\
                               @\"FileCell\"];\n\nNSString *path = self.documentFilenames[indexPath.row];\n\
      cell.textLabel.text = path.lastPathComponent.stringByDeletingPathExtension;\n\
      return cell;\n}\n```\n\n这些方法基于存储在 `documentFilenames` 属性中的数组内容。`tableView:cellForForAtIndexPath:`\
  \ 方法依赖于表视图中存在一个标识符设置为 `\"FileCell\"` 的单元格，因此我们必须确保稍后在故事板中进行设置。\n\n如果不是因为我们还没有触及故事板，我们现在的代码几乎可以运行并看到效果；然而，由于没有预先存在的\
  \ TinyPix 文档，我们的表视图将没有任何内容可显示。而且到目前为止，我们也没有任何创建新文档的方法。此外，我们还没有处理将要添加的颜色选择控件。所以，让我们在尝试运行应用之前再做一点工作。\n\
  \n用户选择的突出显示颜色将立即用于设置分段控件的色调颜色。`UIView` 类有一个 `tintColor` 属性。当为任何视图设置该属性时，该值将应用于该视图，并会向下传播到其所有子视图。当我们设置分段控件的色调颜色时，我们也会将其存储在\
  \ `NSUserDefaults` 中以供以后检索。将这两个方法添加到 `@end` 上方：\n\n```objective-c\n- (IBAction)chooseColor:(id)sender\
  \ {\n    NSInteger selectedColorIndex = [(UISegmentedControl *)sender\n                                    selectedSegmentIndex];\n\
      [self setTintColorForIndex:selectedColorIndex];\n\nNSUserDefaults *prefs = [NSUserDefaults\
  \ standardUserDefaults];\n    [prefs setInteger:selectedColorIndex forKey:@\"selectedColorIndex\"\
  ];\n    [prefs synchronize];\n}\n\n- (void)setTintColorForIndex:(NSInteger)selectedColorIndex\
  \ {\n    self.colorControl.tintColor = [TinyPixUtils getTintColorForIndex:selectedColorIndex];\n\
  }\n```\n\n当用户在分段控件中更改选择时，会触发第一个方法。它将选中的索引保存到用户默认设置中，并将其传递给第二个方法，第二个方法将索引转换为颜色并将其应用到分段控件。在详情视图控制器中也需要将索引转换为颜色的代码，因此它是在一个单独的类中实现的。要创建该类，请按\
  \ ![image](img/flower.jpg)**N** 打开新建文件对话框。从 **iOS** 部分，选择 **Cocoa Touch Class**\
  \ 并点击 **Next**。在 **Class** 字段中输入 **TinyPixUtils**，在 **Subclass of** 字段中输入 **NSObject**，然后点击\
  \ **Next**。最后，点击 **Create** 来创建文件。\n\n\n\n`TinyPixUtils`类将只有一个方法。编辑`TinyPixUtils.h`以添加该方法的声明：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface TinyPixUtils : NSObject\n\n+ (UIColor\
  \ *)getTintColorForIndex:(NSUInteger)index;\n\n@end\n```\n\n现在切换到`TinyPixUtils.m`添加方法实现：\n\
  \n```\n#import \"TinyPixUtils.h\"\n\n@implementation TinyPixUtils\n\n+ (UIColor\
  \ *)getTintColorForIndex:(NSUInteger)index {\n    UIColor *color = [UIColor redColor];\n\
  \    switch (index) {\n        case 0:\n            color = [UIColor redColor];\n\
  \            break;\n        case 1:\n            color =\n            [UIColor\
  \ colorWithRed:0 green:0.6 blue:0 alpha:1];\n            break;\n        case 2:\n\
  \            color = [UIColor blueColor];\n            break;\n        default:\n\
  \            break;\n    }\n    return color;\n}\n\n@end\n```\n\n我们意识到还没有在故事板中设置任何内容，但我们会做到的！首先，我们还需要在`MasterViewController.m`中做一些工作。首先添加对`TinyPixUtils.h`的导入：\n\
  \n```\n#import \"MasterViewController.h\"\n#import \"DetailViewController.h\"\n\
  #import \"TinyPixDocument.h\"\n#import \"TinyPixUtils.h\"\n\n@interface MasterViewController\
  \ ()\n```\n\n现在我们来处理`viewDidLoad`方法。在调用父类的实现后，我们首先在导航栏右侧添加一个按钮。用户将按下此按钮来创建新的 TinyPix\
  \ 文档。我们还将从用户默认设置中加载保存的色调颜色，并用它来设置分段控件的色调颜色。最后调用之前实现的`reloadFiles`方法。\n\n添加以下代码以实现`viewDidLoad`：\n\
  \n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n\n    UIBarButtonItem *addButton\
  \ = [[UIBarButtonItem alloc]\n        initWithBarButtonSystemItem:UIBarButtonSystemItemAdd\n\
  \        target:self\n        action:@selector(insertNewObject)];\n    self.navigationItem.rightBarButtonItem\
  \ = addButton;\n\n    NSUserDefaults *prefs = [NSUserDefaults standardUserDefaults];\n\
  \    NSInteger selectedColorIndex = [prefs integerForKey:@\"selectedColorIndex\"\
  ];\n    [self setTintColorForIndex:selectedColorIndex];\n    [self.colorControl\
  \ setSelectedSegmentIndex:selectedColorIndex];\n\n    [self reloadFiles];\n}\n```\n\
  \n当你首次运行应用时会看到，分段控件的色调颜色默认为红色。这是因为用户默认设置中还没有存储任何内容，所以`integerForKey:`方法返回 0，而`setTintColorForIndex:`方法将其解释为红色。\n\
  \n你可能已经注意到，创建`UIBarButtonItem`时，我们告诉它在按下时调用`insertNewObject`方法。我们还没有编写那个方法，现在就来完成它。在`@end`上方添加此方法：\n\
  \n```\n- (void)insertNewObject {\n    UIAlertController *alert =\n         [UIAlertController\
  \ alertControllerWithTitle:@\"Choose File Name\"\n                 message:@\"Enter\
  \ a name for your new TinyPix document.\"\n                 preferredStyle:UIAlertControllerStyleAlert];\n\
  \n    [alert addTextFieldWithConfigurationHandler:nil];\n    UIAlertAction *cancelAction\
  \ = [UIAlertAction actionWithTitle:@\"Cancel\"\n           style:UIAlertActionStyleCancel\
  \ handler:nil];\n    UIAlertAction *createAction = [UIAlertAction actionWithTitle:@\"\
  Create\"\n           style:UIAlertActionStyleDefault handler:^(UIAlertAction *action)\
  \ {\n               UITextField *textField = (UITextField *)alert.textFields[0];\n\
  \               [self createFileNamed:textField.text];\n           }];\n    [alert\
  \ addAction:cancelAction];\n    [alert addAction:createAction];\n\n    [self presentViewController:alert\
  \ animated:YES completion:nil];\n}\n```\n\n此方法使用`UIAlertController`类显示一个包含文本输入字段、**Create**按钮和**Cancel**按钮的警告框。如果按下**Create**按钮，创建新项目的任务将转交给按钮处理程序块中调用的方法，我们接下来也将实现它。在`@end`上方添加此方法：\n\
  \n```\n- (void)createFileNamed:(NSString *)fileName {\n    NSString *trimmedFileName\
  \ = [fileName\n        stringByTrimmingCharactersInSet:[NSCharacterSet whitespaceCharacterSet]];\n\
  \    if (trimmedFileName.length > 0) {\n        NSString *targetName = [NSString\
  \ stringWithFormat:@\"%@.tinypix\",\n                                 trimmedFileName];\n\
  \        NSURL *saveUrl = [self urlForFilename:targetName];\n        self.chosenDocument\
  \ =\n             [[TinyPixDocument alloc] initWithFileURL:saveUrl];\n        [self.chosenDocument\
  \ saveToURL:saveUrl\n                      forSaveOperation:UIDocumentSaveForCreating\n\
  \                     completionHandler:^(BOOL success) {\n                    \
  \     if (success) {\n                             NSLog(@\"save OK\");\n      \
  \                       [self reloadFiles];\n                             [self\
  \ performSegueWithIdentifier:@\"masterToDetail\"\n                             \
  \                          sender:self];\n                         } else {\n  \
  \                           NSLog(@\"failed to save!\");\n                     \
  \    }\n                     }];\n    }\n}\n```\n\n这个方法一开始很简单。它从传入的名称中去除前导和尾随的空白字符。如果结果不为空，则根据用户输入创建文件名，基于该文件名创建\
  \ URL（使用之前编写的`urlForFilename:`方法），并使用该 URL 创建新的`TinyPixDocument`实例。\n\n接下来要处理的内容稍微微妙一些。这里重要的是要理解，仅仅使用给定的\
  \ URL 创建一个文档并不会创建文件。实际上，在调用`initWithFileURL:`时，文档还不知道给定的 URL 是指向现有文件还是需要创建的新文件。我们需要告诉它该做什么。在本例中，我们使用以下代码告诉它在给定\
  \ URL 处保存一个新文件：\n\n```\n        [self.chosenDocument saveToURL:saveUrl\n       \
  \               forSaveOperation:UIDocumentSaveForCreating\n                   \
  \  completionHandler:^(BOOL success) {\n.\n.\n.\n        }];\n```\n\n值得注意的是传入块参数的目的和用法。我们调用的方法`saveToURL:forSaveOperation:completionHandler:`没有返回值告诉我们操作结果如何。实际上，该方法在调用后立即返回，远在文件实际保存之前。相反，它启动文件保存工作，并在完成后调用我们传入的块，通过`success`参数告知是否成功。为了使一切尽可能顺畅，文件保存工作实际上在后台线程执行。然而，我们传入的块最初是在调用`saveToURL:forSaveOperation:completionHandler:`的线程上执行的。在这个特定情况下，这意味着该块在主线程上执行，因此我们可以安全地使用任何需要主线程的功能，如\
  \ UIKit。考虑到这一点，请再次查看块内部发生了什么：\n\n```\nif (success) {\n    NSLog(@\"save OK\");\n\
  \    [self reloadFiles];\n    [self performSegueWithIdentifier:@\"masterToDetail\"\
  \n          sender:self];\n} else {\n    NSLog(@\"failed to save!\");\n}\n```\n\n\
  这是我们传入文件保存方法的块的内容，它会在文件操作完成后被调用。我们检查是否成功；如果成功，则立即重新加载文件，然后启动到另一个视图控制器的 segue。这是我们在第\
  \ 9 章中没有介绍的 segue 方面，但它相当直接。\n\n\n\n### 初始故事板设计\n\n其思路是，故事板文件中的转场可以像表格视图单元格一样拥有标识符，你可以使用该标识符以编程方式触发转场。在本例中，我们只需记得在后续处理时，在故事板中配置好这个转场即可。但在那之前，我们先添加这个类所需的最后一个方法，用于处理该转场。在\
  \ `@end` 之前插入以下方法：\n\n```\n- (void)prepareForSegue:(UIStoryboardSegue *)segue sender:(id)sender\
  \ {\n    UINavigationController *destination =\n                    (UINavigationController\
  \ *)segue.destinationViewController;\n    DetailViewController *detailVC =\n   \
  \                 (DetailViewController *)destination.topViewController;\n    if\
  \ (sender == self) {\n        // 如果 sender == self，表示刚创建了一个新文档，\n        // 并且 chosenDocument\
  \ 已经设置好。\n        detailVC.detailItem = self.chosenDocument;\n    } else {\n   \
  \     // 从表格视图中找到选中的文档\n        NSIndexPath *indexPath = [self.tableView indexPathForSelectedRow];\n\
  \        NSString *filename = self.documentFilenames[indexPath.row];\n        NSURL\
  \ *docUrl = [self urlForFilename:filename];\n        self.chosenDocument = [[TinyPixDocument\
  \ alloc]\n                               initWithFileURL:docUrl];\n        [self.chosenDocument\
  \ openWithCompletionHandler:^(BOOL success) {\n            if (success) {\n    \
  \            NSLog(@\"加载成功\");\n                detailVC.detailItem = self.chosenDocument;\n\
  \            } else {\n                NSLog(@\"加载失败！\");\n            }\n     \
  \   }];\n    }\n}\n```\n\n该方法根据顶部的条件判断，有两条清晰的执行路径。回想一下我们在第 9 章关于故事板的讨论：每当某个视图控制器即将执行转场时，就会调用该视图控制器的这个方法。`sender`\
  \ 参数指向发起转场的对象，我们利用它来确定此处该做什么。如果转场是由我们在警告视图委托方法中通过编程方式调用发起的，那么 `sender` 将等于 `self`，因为在\
  \ `createFileNamed:` 方法中调用 `performSegueWithIdentifier:sender:` 时，`sender` 参数的值正是\
  \ `self`。在这种情况下，我们知道 `chosenDocument` 属性已经设置好，只需将其值传递给目标视图控制器即可。\n\n否则，我们知道这是响应用户触摸表格视图中的某一行，这时情况会稍微复杂一些。此时需要构造一个\
  \ URL（就像我们创建文档时那样），创建文档类的新实例，并尝试打开文件。你会看到，我们用来打开文件的方法 `openWithCompletionHandler:`\
  \ 与我们之前使用的保存方法类似。我们向它传递一个代码块，该代码块会被保存下来供稍后执行。与文件保存方法一样，加载过程在后台进行，当加载完成时，这个代码块会在主线程上执行。此时，如果加载成功，我们会将文档传递给详细视图控制器。\n\
  \n请注意，这两种方法都使用了我们之前多次用到的键值编码技术，它允许我们设置转场目标控制器的 `detailItem` 属性，即使我们没有包含它的头文件。这对我来说完全可行，因为\
  \ `DetailViewController`——作为 Xcode 项目一部分创建的详细视图控制器类——恰好自带了一个名为 `detailItem` 的属性。\n\
  \n既然我们已经有了这么多代码，现在该配置故事板了，这样我们就可以运行应用并看到效果。保存代码，继续。\n\n### 初始故事板设计\n\n在 Xcode 项目导航器中选择\
  \ `Main.storyboard`，查看其中已有的内容。你会发现分栏视图控制器、两个导航控制器、主视图控制器和详细视图控制器的场景（参见图 14-2）。我们的所有工作都将在主视图控制器和详细视图控制器上进行。\n\
  \n![9781484202005_Fig14-02.jpg](img/9781484202005_Fig14-02.jpg)\n\n图 14-2. TinyPix\
  \ 故事板，显示了分栏视图控制器、导航控制器、主视图控制器和详细视图控制器\n\n我们先处理主视图控制器场景。这里配置了显示所有 TinyPix 文档列表的表格视图。默认情况下，此场景的表格视图使用动态单元格而非静态单元格。我们希望表格视图从我们实现的数据源方法中获取内容，所以这个默认设置正是我们想要的。不过，我们确实需要配置单元格原型，因此选中它，并打开属性检查器。将单元格的**标识符**从\
  \ `Cell` 改为 `FileCell`。这将使我们之前编写的数据源代码能够访问这个表格视图单元格。\n\n我们还需要创建代码中触发的转场。按住 Control\
  \ 键，从主视图控制器的图标（场景顶部的黄色圆圈，或文档大纲中“主场景”下的**主**图标）拖拽到详细视图的导航控制器，然后从故事板转场菜单中选择**显示详细**。\n\
  \n现在你会看到两个似乎连接着两个场景的转场。通过选中它们，可以知道它们来自哪里。选中一个转场会高亮整个主场景；选中第二个转场则只会高亮表格视图单元格。选中高亮整个场景的那个转场（即你刚刚创建的转场），使用属性检查器设置其**标识符**（当前为空）为\
  \ `masterToDetail`。\n\n主视图控制器场景的最后一个调整是允许用户选择在详细视图中用来表示“开启”点的颜色。我们不会实现某种复杂的颜色选择器，而是添加一个分段控件，让用户从一组预定义的颜色中进行选择。\n\
  \n在对象库中找到**分段控件**，将其拖拽出来，放置在主视图顶部的导航栏中（参见图 14-3）。\n\n![9781484202005_Fig14-03.jpg](img/9781484202005_Fig14-03.jpg)\n\
  \n图 14-3. TinyPix 故事板，显示主视图控制器，一个分段控件正在被放置到控制器的导航栏上\n\n确保选中分段控件，然后打开属性检查器。在检查器顶部的**分段控件**部分，使用步进器将分段数从\
  \ `2` 改为 `3`。接下来，依次双击每个分段的标题，分别改为 `红色`、`绿色` 和 `蓝色`。设置好这些标题后，点击分段控件的一个调整大小手柄，使其填充到合适的宽度。\n\
  \n接着，按住 Control 键，从分段控件拖拽到代表主控制器的图标（故事板中控制器上方标有 `主` 的黄色圆圈，或文档大纲中“主场景”下标有 `主` 的图标），并选择\
  \ `chooseColor:` 方法。然后按住 Control 键，从主控制器拖拽回分段控件，并选择 `colorControl` 出口。\n\n我们终于到了可以运行应用并看到所有辛勤工作得以实现的时刻了！运行你的应用。你会看到它启动并显示一个空表格视图，顶部有一个分段控件，右上角有一个加号（+）按钮（参见图\
  \ 14-4）。\n\n![9781484202005_Fig14-04.jpg](img/9781484202005_Fig14-04.jpg)\n\n\n\n"
- "# 图 14-4：TinyPix 应用\n\nTinyPix 应用首次启动时的界面。点击加号图标可添加新文档。系统会提示您为新的 TinyPix 文档命名。目前，详情视图所做的只是在标签中显示文档名称。\n\
  \n点击 **+** 按钮，应用会要求您为新文档命名。为其命名后，点击 **创建**，您会看到应用切换到详情显示界面，但目前该界面尚在构建中。详情视图控制器的默认实现只是在标签中显示其\
  \ `detailItem` 的描述。当然，在 Xcode 的控制台视图中还有更多信息。虽然不多，但总算有了进展！\n\n点击 **返回** 按钮回到主列表，您会看到刚刚添加的项目。继续创建一两个项目，观察它们是否正确添加到列表中。最后，回到\
  \ Xcode，因为我们还有更多工作要做！\n\n### 创建 `TinyPixView`\n\n接下来的任务是创建一个视图类来显示我们的网格，并允许用户编辑它。在项目导航器中选择\
  \ *TinyPix* 文件夹，然后按 **N** 创建新文件。在 **iOS 源文件** 部分，选择 **Cocoa Touch Class** 并点击 **Next**。将新类命名为\
  \ `TinyPixView`，并在 **Subclass of** 弹出菜单中选择 **UIView**。点击 **Next**，确认保存位置无误，然后点击\
  \ **Create**。\n\n**注意：** 我们的视图类实现包含一些我们尚未讲解的绘图和触摸处理。为了避免本章在这些主题上过度纠缠，我们将快速向您展示代码。有关使用\
  \ Core Graphics 绘图的详细信息，请参见第 16 章；有关响应触摸和拖拽的详细信息，请参见第 18 章。\n\n选择 `TinyPixView.h`\
  \ 并进行以下修改：\n\n```\n#import <UIKit/UIKit.h>\n\n@class TinyPixDocument;\n\n@interface\
  \ TinyPixView : UIView\n\n@property (strong, nonatomic) TinyPixDocument *document;\n\
  \n@end\n```\n\n我们在这里所做的只是添加一个属性，以便控制器能够传递文档。\n\n现在切换到 `TinyPixView.m`，这里我们将有更实质性的工作。首先，在文件顶部添加这个类扩展：\n\
  \n```\n#import \"TinyPixView.h\"\n#import \"TinyPixDocument.h\"\n\ntypedef struct\
  \ {\n    NSUInteger row;\n    NSUInteger column;\n} GridIndex;\n\n@interface TinyPixView\
  \ ()\n\n@property (assign, nonatomic) CGSize lastSize;\n@property (assign, nonatomic)\
  \ CGRect gridRect;\n@property (assign, nonatomic) CGSize blockSize;\n@property (assign,\
  \ nonatomic) CGFloat gap;\n@property (assign, nonatomic) GridIndex selectedBlockIndex;\n\
  \n@end\n\n@implementation TinyPixView\n.\n.\n.\n```\n\n在这里，我们定义了一个名为 `GridIndex`\
  \ 的 C 语言结构体，用于便捷地处理行/列对。我们还定义了一个带有一些属性的类扩展，这些属性稍后将会用到。\n\n`UIView` 子类通常通过调用其默认初始化方法\
  \ `initWithFrame:` 进行初始化。然而，由于此类将从故事板中加载，因此它将使用 `initWithCoder:` 方法进行初始化。我们将同时实现这两个方法，并使每个方法都调用第三个方法来初始化我们的属性。将以下代码添加到\
  \ `TinyPixView.m` 中：\n\n```\n- (id)initWithFrame:(CGRect)frame {\n    self = [super\
  \ initWithFrame:frame];\n    if (self) {\n        // 初始化代码\n        [self commonInit];\n\
  \    }\n    return self;\n}\n\n- (id)initWithCoder:(NSCoder *)aDecoder {\n    self\
  \ = [super initWithCoder:aDecoder];\n    if (self) {\n        [self commonInit];\n\
  \    }\n    return self;\n}\n\n- (void)commonInit{\n    [self calculateGridForSize:self.bounds.size];\n\
  \    _selectedBlockIndex.row = NSNotFound;\n    _selectedBlockIndex.column = NSNotFound;\n\
  }\n```\n\n`calculateGridForSize:` 方法根据 `TinyPixView` 的大小计算颜色网格中单元格应有多大。计算网格大小使我们能够在不同尺寸的屏幕上使用同一个应用程序，并且也能处理设备旋转时视图大小变化的情况。将\
  \ `calculateGridForSize:` 方法的实现添加到 `TinyPixView.m` 中：\n\n```\n- (void)calculateGridForSize:(CGSize)size\
  \ {\n    CGFloat space = MIN(size.width, size.height);\n    _gap = space/57;\n \
  \   CGFloat cellSide = 6 * _gap;\n    _blockSize = CGSizeMake(cellSide, cellSide);\n\
  \    _gridRect = CGRectMake((size.width - space)/2,\n                          \
  \ (size.height - space)/2, space, space);\n}\n```\n\n这个方法的核心思想是让网格填满视图的宽度或高度中较小的那个维度，并在较长的维度上居中。为此，我们将视图较小维度除以\
  \ 57 来计算每个单元格的大小以及单元格之间的间距。为什么是 57？嗯，我们需要为八个单元格留出空间，并且希望每个单元格的大小是单元格间距的六倍。考虑到每对单元格之间需要间距，再加上每行或每列的首尾也需要间距，这实际上意味着我们需要\
  \ (6 × 8) + 9 = 57 个间距的空间。一旦我们确定了间距大小，就可以得到每个单元格的大小（乘以 6）。我们利用这些信息来设置 `blockSize`\
  \ 属性（表示每个单元格的大小）和 `gridRect` 属性（对应视图内实际绘制网格单元格的区域）。\n\n现在让我们来看看绘图例程。我们重写标准的 `UIView\
  \ drawRect:` 方法，用它来简单地遍历网格中的所有方块，然后调用另一个方法来绘制每个单元格方块。添加以下粗体代码，并记得移除 `drawRect:`\
  \ 方法周围的注释标记：\n\n```\n/*\n// 仅在你需要执行自定义绘图时重写 drawRect:。\n// 空的实现会对动画性能产生不利影响。\n-\
  \ (void)drawRect:(CGRect)rect\n{\n    // 绘图代码\n    if (!_document) return;\n\n \
  \   CGSize size = self.bounds.size;\n    if (!CGSizeEqualToSize(size, self.lastSize))\
  \ {\n        self.lastSize = size;\n        [self calculateGridForSize:size];\n\
  \    }\n\n    for (NSUInteger row = 0; row < 8; row++) {\n        for (NSUInteger\
  \ column = 0; column < 8; column++) {\n            [self drawBlockAtRow:row column:column];\n\
  \        }\n    }\n}\n*/\n```\n\n在绘制单元格之前，我们将视图的当前大小与 `lastSize` 属性中的值进行比较，如果不同，则调用\
  \ `calculateGridForSize:`。这在视图首次绘制时以及大小发生任何变化时（最可能是在设备旋转时）都会发生。\n\n现在添加绘制网格中每个单元格方块的代码：\n\
  \n```\n- (void)drawBlockAtRow:(NSUInteger)row column:(NSUInteger)column {\n    CGFloat\
  \ startX = _gridRect.origin.x + _gap\n                  + (_blockSize.width + _gap)\
  \ * (7 - column) + 1;\n    CGFloat startY = _gridRect.origin.y + _gap\n        \
  \          + (_blockSize.height + _gap) * row + 1;\n    CGRect blockFrame = CGRectMake(startX,\
  \ startY,\n                           _blockSize.width, _blockSize.height);\n  \
  \  UIColor *color = [_document stateAtRow:row column:column] ?\n             [UIColor\
  \ blackColor] : [UIColor whiteColor];\n    [color setFill];\n    [self.tintColor\
  \ setStroke];\n    UIBezierPath *path = [UIBezierPath bezierPathWithRect:blockFrame];\n\
  \    [path fill];\n    [path stroke];\n}\n```\n\n这段代码使用由 `calculateGridForSize:`\
  \ 方法设置的网格原点、单元格大小和间距值来计算每个单元格的位置，然后使用当前的着色颜色绘制轮廓，并根据单元格是否应被填充来决定使用黑色或白色作为内部填充色。用于绘制的这些方法将在第\
  \ 16 章中解释。\n\n\n\n最后，我们添加一组响应用户触摸事件的方法。`touchesBegan:withEvent:` 和 `touchesMoved:withEvent:`\
  \ 都是每个 `UIView` 子类可以实现的**标准方法**，用于捕获视图范围内发生的触摸事件。我们将在第 19 章中详细讨论这些方法。我们对这两个方法的实现使用了在此处添加的另外两个方法，它们分别用于根据触摸位置计算网格索引，以及切换文档中的特定值。同样，这些方法使用由\
  \ `calculateGridForSize:` 方法设置的值来判断触摸点是否落在某个网格单元格内。将这四个方法添加到文件底部，紧邻 `@end` 之前：\n\
  \n```\n- (GridIndex)touchedGridIndexFromTouches:(NSSet *)touches {\n    GridIndex\
  \ result;\n    result.row = -1;\n    result.column = -1;\n    UITouch *touch = [touches\
  \ anyObject];\n    CGPoint location = [touch locationInView:self];\n    if (CGRectContainsPoint(_gridRect,\
  \ location)) {\n        location.x -= _gridRect.origin.x;\n        location.y -=\
  \ _gridRect.origin.y;\n        result.column = 8 - (location.x * 8.0 / _gridRect.size.width);\n\
          result.row = location.y * 8.0 / _gridRect.size.height;\n    }\n    return\
  \ result;\n}\n\n- (void)toggleSelectedBlock {\n    if (_selectedBlockIndex.row !=\
  \ -1 && _selectedBlockIndex.column != -1) {\n        [_document toggleStateAtRow:_selectedBlockIndex.row\n\
                               column:_selectedBlockIndex.column];\n        [[_document.undoManager\
  \ prepareWithInvocationTarget:_document]\n         toggleStateAtRow:_selectedBlockIndex.row\
  \ column:_selectedBlockIndex.column];\n        [self setNeedsDisplay];\n    }\n\
  }\n\n- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event {\n    self.selectedBlockIndex\
  \ = [self touchedGridIndexFromTouches:touches];\n    [self toggleSelectedBlock];\n\
  }\n\n- (void)touchesMoved:(NSSet *)touches withEvent:(UIEvent *)event {\n    GridIndex\
  \ touched = [self touchedGridIndexFromTouches:touches];\n    if (touched.row !=\
  \ _selectedBlockIndex.row\n           || touched.column != _selectedBlockIndex.column)\
  \ {\n        _selectedBlockIndex = touched;\n        [self toggleSelectedBlock];\n\
      }\n}\n```\n\n眼尖的读者可能已经注意到 `toggleSelectedBlock` 方法做了一些特别的事情。在调用文档的 `toggleStateAtRow:column:`\
  \ 方法更改某个网格点的值之后，它还做了更多操作。让我们再看一次：\n\n```\n- (void)toggleSelectedBlock {\n    if\
  \ (_selectedBlockIndex.row != -1 && _selectedBlockIndex.column != -1) {\n        [_document\
  \ toggleStateAtRow:_selectedBlockIndex.row\n                             column:_selectedBlockIndex.column];\n\
          [[_document.undoManager prepareWithInvocationTarget:_document]\n              \
  \ toggleStateAtRow:_selectedBlockIndex.row\n               column:_selectedBlockIndex.column];\n\
          [self setNeedsDisplay];\n    }\n}\n```\n\n对 `_document.undoManager` 的调用返回了一个\
  \ `NSUndoManager` 实例。在本书的其他地方，我们没有直接处理过这个类，但 `NSUndoManager` 是 iOS 和 OS X 中撤销/重做功能的基础支撑结构。其思路是，每当用户在\
  \ GUI 中执行一个操作时，你就使用 `NSUndoManager` 通过“记录”一个方法调用来留下某种“面包屑”，以便撤销用户刚刚执行的操作。`NSUndoManager`\
  \ 会将那个方法调用存储在一个特殊的撤销栈上，当用户激活系统的撤销功能时，就可以利用这个栈回溯文档的状态。\n\n它的工作方式是：`prepareWithInvocationTarget:`\
  \ 方法返回一个代理对象，你可以向该对象发送任何消息，这条消息会与目标对象一起被打包并推入撤销栈。所以，虽然看起来你连续调用了两次 `toggleStateAtRow:column:`，但实际上第二次并不是在调用它，而只是将其排入队列以备将来可能使用。这种惊人的动态行为是\
  \ Objective-C 与 C++ 等静态语言相比真正脱颖而出的领域。在静态语言中，诸如让一个对象充当另一个对象的代理，或者将方法调用打包以备后用之类的技术，缺乏语言支持，几乎不可能实现（因此，许多任务，例如构建撤销支持，可能会非常繁琐）。\n\
  \n那么，我们为什么要这样做呢？到目前为止，我们一直没有考虑撤销/重做的问题，为什么现在要开始考虑？原因是，向文档的 `NSUndoManager` 注册一个可撤销的操作会将文档标记为“脏”，并确保它会在接下来的几秒钟内自动保存。用户的操作同时支持撤销，这不过是锦上添花，至少在这个应用中是这样。在文档结构更复杂的应用中，提供文档级别的撤销支持可以带来巨大的好处。\n\
  \n保存你的更改。现在我们的视图类已经准备就绪，让我们回到故事板，为详情视图配置 GUI。\n\n### 故事板详情\n\n选择 `Main.storyboard`，找到详情场景，并查看当前的内容。\n\
  \nGUI 中只包含一个标签（“Detail view content goes here”），就是之前运行应用时包含文档描述的那个标签。这个标签没什么特别用处，因此在详情视图控制器中选择该标签，然后按下\
  \ **Delete** 键将其删除。\n\n使用对象库找到一个 `UIView` 并将其拖入详情视图中。调整其位置和大小，使其填满标题栏下方的整个区域（参见图\
  \ 14-5）。\n\n![9781484202005_Fig14-05.jpg](img/9781484202005_Fig14-05.jpg)\n\n图 14-5.\
  \ 我们将详情视图中的标签替换为另一个视图，居中显示在其容器视图中。拖动时该视图会变得有些透明，但这里可以看到，它部分覆盖了将视图拖到中央时出现的虚线\n\n\
  切换到标识检查器，以便将此 `UIView` 实例更改为我们自定义类的实例。在检查器顶部的 **Custom Class** 部分，选择 **Class** 弹出列表并选择\
  \ `TinyPixView`。然后打开属性检查器，将 **Mode** 设置更改为 *Redraw*。这会使 `TinyPixView` 在其大小改变时重新绘制自身。这是必要的，因为视图内网格的位置取决于视图本身的大小，而设备旋转时视图的大小会发生变化。此时，详情场景的视图层次结构应如图\
  \ 14-6 所示。\n\n![9781484202005_Fig14-06.jpg](img/9781484202005_Fig14-06.jpg)\n\n\
  图 14-6. 详情视图场景的视图层次结构\n\n在继续之前，我们需要调整新视图的自动布局约束。我们希望它能够填满详情视图中的可用区域。因此，在文档大纲中，按住\
  \ Control 键从 `TinyPixView` 拖拽到其父视图，然后松开鼠标。按住 **Shift** 键，在弹出的菜单中，选择 **Leading Space\
  \ to Container Margin**、**Trailing Space to Container Margin**、**Top Space to Top\
  \ Layout Guide** 和 **Bottom Space to Bottom Layout Guide**，然后点击弹出菜单外部以应用这些约束。\n\n\
  现在，我们需要将自定义视图连接到我们的详情视图控制器。我们还没有为自定义视图准备一个 outlet，但这没关系，因为 Xcode 的拖拽到代码功能会帮我们完成这项工作。\n\
  \n\n\n激活 Assistant Editor。一个文本编辑器应滑入 GUI 编辑器旁边，显示 `DetailViewController.m` 的内容。如果它显示的是其他内容，请使用文本编辑器顶部的跳转栏，使\
  \ `DetailViewController.m` 显示出来。\n\n要建立连接，请从文档大纲中的 `TinyPixView` 图标按住 Control 键拖动到代码，在文件顶部的类扩展中释放拖拽。在出现的弹出窗口中，确保连接设置为\
  \ `Outlet`，将新输出口命名为 `pixView`，然后点击 **Connect** 按钮。\n\n您应该会看到建立该连接后，在 `DetailViewController.m`\
  \ 中添加了以下这一行：\n\n```\n@property (weak, nonatomic) IBOutlet TinyPixView *pixView;\n\
  ```\n\n然而，它没有将任何关于我们自定义视图类的知识添加到源代码中。让我们通过在 `DetailViewController.m` 顶部添加以下这一行来解决这个问题：\n\
  \n```\n#import \"DetailViewController.h\"\n#import \"TinyPixView.h\"\n\n@interface\
  \ DetailViewController ()\n```\n\n现在让我们修改 `configureView` 方法。这不是一个标准的 `UIViewController`\
  \ 方法。它只是一个私有方法，项目模板将其包含在该类中，作为一个方便的位置来放置需要在任何更改后更新视图的代码。由于我们没有使用描述标签，因此删除设置该标签的行。接下来，我们添加一些代码，将选定的文档传递给我们的自定义视图，并通过调用\
  \ `setNeedsDisplay` 告诉它重新绘制自身：\n\n```\n- (void)configureView\n{\n    // Update the\
  \ user interface for the detail item.\n\nif (self.detailItem) {\n        self.detailDescriptionLabel.text\
  \ = [self.detailItem description];\n            self.pixView.document = self.detailItem;\n\
              [self.pixView setNeedsDisplay];\n    }\n}\n```\n\n接下来，我们需要安排将色调颜色应用到\
  \ `TinyPixView` 上。我们既需要在视图首次加载时执行此操作，也需要在色调颜色更改时执行此操作。我们知道可以从用户默认设置中获取初始色调颜色，因此让我们添加一个方法，该方法获取保存在那里的值，将其转换为\
  \ `UIColor`，并将其应用到 `TinyPixView`。该转换需要用到我们之前创建的 `TinyPixUtils` 类，因此首先在文件顶部为该类添加一个导入：\n\
  \n```\n#import \"DetailViewController.h\"\n#import \"TinyPixView.h\"\n#import \"\
  TinyPixUtils.h\"\n```\n\n接下来，在类主体中的某处添加此方法：\n\n```\n- (void)updateTintColor {\n\
      NSUserDefaults *prefs = [NSUserDefaults standardUserDefaults];\n    NSInteger\
  \ selectedColorIndex = [prefs integerForKey:@\"selectedColorIndex\"];\n    UIColor\
  \ *tintColor = [TinyPixUtils getTintColorForIndex:selectedColorIndex];\n    self.pixView\
  \ .tintColor = tintColor;\n    [self.pixView setNeedsDisplay];\n}\n```\n\n我们需要在视图首次加载时调用此方法来设置初始色调颜色。我们还需要在色调更改时调用它。我们怎么知道它发生了变化？当色调颜色更改时，新值会保存在用户默认设置中。您可以通过在默认通知中心注册一个观察者来监听\
  \ `NSUserDefaultsDidChangeNotification` 通知，从而得知用户默认设置中的某些内容发生了变化。将以下代码添加到 `viewDidLoad`\
  \ 方法中：\n\n```\n- (void)viewDidLoad {\n    [super viewDidLoad];\n    // Do any additional\
  \ setup after loading the view, typically from a nib.\n    [self configureView];\n\
      [self updateTintColor];\n    [[NSNotificationCenter defaultCenter] addObserver:self\n\
          selector:@selector(onSettingsChanged:)\n        name:NSUserDefaultsDidChangeNotification\
  \ object:nil];\n}\n```\n\n现在，当用户默认设置中的任何内容发生变化时，会调用 `onSettingsChanged:` 方法。发生这种情况时，我们需要设置新的色调颜色，以防它已更改。在类中的\
  \ `@end` 之前添加此方法的实现：\n\n```\n- (void)onSettingsChanged:(NSNotification *)notification\
  \ {\n    [self updateTintColor];\n}\n```\n\n添加了通知观察者后，我们需要在类被释放之前移除它。我们可以通过重写视图的\
  \ `dealloc` 方法来做到这一点：\n\n```\n- (void)dealloc {\n    [[NSNotificationCenter defaultCenter]\
  \ removeObserver:self\n              name:NSUserDefaultsDidChangeNotification object:nil];\n\
  }\n```\n\n我们即将完成这个类的工作，但还需要做一处修改。还记得我们提到过，当文档收到发生了某些编辑的通知时（通过注册一个可撤销的操作触发），会自动保存吗？保存通常会在编辑发生后的大约\
  \ 10 秒内发生。与我们在本章前面描述的其他保存和加载过程一样，它发生在后台线程中，因此用户通常不会注意到。然而，这仅在文档仍然存在时有效。\n\n在我们当前的设置下，存在一个风险：当用户点击\
  \ **Back** 按钮返回主列表时，文档实例可能会在没有执行任何保存操作的情况下被释放，导致用户最新的更改丢失。为了确保这种情况不会发生，我们需要在 `viewWillDisappear:`\
  \ 方法中添加一些代码，以便在用户离开详情视图时立即关闭文档。关闭文档会导致其自动保存，而且再次强调，保存发生在后台线程中。在这种特定情况下，我们不需要在保存完成时做任何事情，因此我们传入\
  \ `nil` 而不是一个 block：\n\n添加这个 `viewWillDisappear:` 方法：\n\n```\n- (void)viewWillDisappear:(BOOL)animated\
  \ {\n    [super viewWillDisappear:animated];\n    UIDocument *doc = self.detailItem;\n\
      [doc closeWithCompletionHandler:nil];\n}\n```\n\n至此，这个我们第一个真正的基于文档的应用程序的此版本可以尝试运行了！启动它并尽情享受吧。您可以创建新文档、编辑它们、返回到列表，然后选择另一个文档（或同一个文档），一切都能正常工作。尝试更改色调颜色，并验证当您停止并重新启动应用程序时，它是否被正确保存和恢复。如果您在执行此操作时打开\
  \ Xcode 控制台，您会在每次加载或保存文档时看到一些输出。使用自动保存系统，您无法直接控制保存发生的时间（关闭文档时除外），但观察日志以了解它们何时发生可能会很有趣。\n\
  \n## 添加 iCloud 支持\n\n您现在拥有一个完全可用的基于文档的应用程序，但我们不会止步于此。我们承诺在本章中会介绍 iCloud 支持，现在是实现它的时候了！\n\
  \n修改 `TinyPix` 以使其与 iCloud 协同工作是相当直接的。考虑到幕后发生的所有事情，这只需要数量惊人的少量更改。我们需要对加载可用文件列表的方法以及指定加载新文件\
  \ URL 的方法进行一些修改，但仅此而已。\n\n除了代码更改之外，我们还需要处理一些额外的管理细节。仅当应用程序包含配置为允许使用 iCloud 的嵌入式配置文件时，Apple\
  \ 才允许其保存到 iCloud。这意味着要为我们的应用程序添加 iCloud 支持，您必须拥有付费的 iOS 开发者会员资格并已安装开发者证书。它还仅适用于真实设备，而非模拟器，因此您需要至少有一个已注册\
  \ iCloud 的 iOS 设备来运行新的支持 iCloud 的 `TinyPix`。如果您有两台设备，乐趣会更多，因为您可以看到在一台设备上所做的更改如何传播到另一台设备。\n\
  \n### 创建配置文件\n\n\n```markdown\n\n首先，你需要为`TinyPix`创建一个启用了 iCloud 的描述文件。过去，这需要在 Apple\
  \ 开发者网站上执行许多繁琐的步骤，但现在 `Xcode` 让这一切变得简单。在项目导航器中，选择顶部的`TinyPix`项，然后在编辑区域点击**Capabilities**标签。你应该会看到如\
  \ Figure 14-7 所示的内容。\n\n![9781484202005_Fig14-07.jpg](img/9781484202005_Fig14-07.jpg)\n\
  \nFigure 14-7. Xcode 展示的易于配置的应用技术与服务\n\nFigure 14-7 中显示的功能列表都可以直接在 Xcode 中配置，无需访问网站、创建和下载描述文件等。在此之前，你需要为你的应用分配一个唯一的`App\
  \ ID`。如果你使用了源代码下载中的项目版本，`App ID` 是`com.apress.BID`。这个`App ID`已被注册，因此你无法使用它。选择**General**标签，在**Bundle\
  \ Identifier**字段中使用一个不同的前缀。例如，要将`App ID`更改为`com.myCo`，你可以像 Figure 14-8 所示那样设置`Bundle\
  \ Identifier`。\n\n![9781484202005_Fig14-08.jpg](img/9781484202005_Fig14-08.jpg)\n\
  \nFigure 14-8. 更改应用的包标识符\n\n当然，你应该使用一个对你来说是唯一的值，而不是`com.myCo`。现在切换回**Capabilities**标签。对于`TinyPix`，我们希望启用\
  \ iCloud，即列表中的第一个功能，因此点击云图标旁边的展开三角形。在这里，你会看到一些关于此功能用途的信息。点击右侧的开关将其打开。`Xcode` 随后将与\
  \ Apple 的服务器通信，为此应用配置描述文件。这将要求你使用你的 Apple ID 登录，并且显然要求你连接到互联网。启用后，点击打开**Key-value\
  \ storage**和**iCloud Documents**复选框，如 Figure 14-9 所示。\n\n![9781484202005_Fig14-09.jpg](img/9781484202005_Fig14-09.jpg)\n\
  \nFigure 14-9. 应用现已配置为使用 iCloud。这个简单的配置让我们可以从本章中删除几页，这大概能拯救一两棵树。谢谢，Apple！\n\n你完成了！你的应用现在拥有从代码中访问\
  \ iCloud 的必要权限。剩下的就是简单的编程工作。\n\n### 如何进行查询\n\n选择`MasterViewController.m`，以便我们可以开始为\
  \ iCloud 进行更改。最大的变化将是我们查找可用文档的方式。在第一个版本的`TinyPix`中，我们使用`NSFileManager`来查看本地文件系统上有什么可用内容。这次，我们将采用稍微不同的方法。在这里，我们将启动一种特殊的查询来查找文档。\n\
  \n首先，在类扩展中添加一对属性：一个用于持有进行中查询的指针，另一个用于持有查询找到的所有文档列表。\n\n```\n@interface MasterViewController\
  \ ()\n\n@property (weak, nonatomic) IBOutlet UISegmentedControl *colorControl;\n\
  @property (strong, nonatomic) NSArray *documentFilenames;\n@property (strong, nonatomic)\
  \ TinyPixDocument *chosenDocument;\n@property (strong, nonatomic) NSMetadataQuery\
  \ *query;\n@property (strong, nonatomic) NSMutableArray *documentURLs;\n\n@end\n\
  ```\n\n现在，让我们看看新的文件列表方法。删除整个`reloadFiles`方法，并将其替换为以下内容：\n\n```\n- (void)reloadFiles\
  \ {\n    NSFileManager *fileManager = [NSFileManager defaultManager];\n    // passing\
  \ nil is OK here, matches first entitlement\n    NSURL *cloudURL = [fileManager\
  \ URLForUbiquityContainerIdentifier:nil];\n    NSLog(@\"got cloudURL %@\", cloudURL);  //\
  \ returns nil in simulator\n    if (cloudURL != nil) {\n        self.query = [[NSMetadataQuery\
  \ alloc] init];\n        _query.predicate = [NSPredicate predicateWithFormat:@\"\
  %K like '*.tinypix'\",\n                            NSMetadataItemFSNameKey];\n\
          _query.searchScopes = [NSArray arrayWithObject:\n                              \
  \ NSMetadataQueryUbiquitousDocumentsScope];\n        [[NSNotificationCenter defaultCenter]\n\
                  addObserver:self\n                selector:@selector(updateUbiquitousDocuments:)\n\
                  name:NSMetadataQueryDidFinishGatheringNotification\n                object:nil];\n\
          [[NSNotificationCenter defaultCenter]\n                addObserver:self\n\
                  selector:@selector(updateUbiquitousDocuments:)\n                name:NSMetadataQueryDidUpdateNotification\n\
                  object:nil];\n        [_query startQuery];\n    }\n}\n```\n\n这里有一些新东西绝对值得一提。首先出现在这一行：\n\
  \n```\nNSURL *cloudURL = [fileManager URLForUbiquityContainerIdentifier:nil];\n\
  ```\n\n这的确是个拗口的词。Ubiquity？我们在这里讨论什么？谈到 iCloud，Apple 在标识 iCloud 存储资源时使用的很多术语都包含像“ubiquity”和“ubiquitous”这样的词，来表示某物是无所不在的——可以从使用相同\
  \ iCloud 登录凭据的任何设备访问。\n\n在这种情况下，我们请求文件管理器提供一个基础 URL，该 URL 允许我们访问与特定容器标识符关联的 iCloud\
  \ 目录。容器标识符通常是一个字符串，包含你公司的唯一捆绑种子 ID 和应用标识符。容器标识符用于选择你的应用中包含的 iCloud 授权之一。这里传递`nil`是一个快捷方式，意思就是“给我列表中的第一个。”由于我们的应用在该列表中只包含一个已勾选的项目（你可以在\
  \ Figure 14-9 底部的“Containers”下看到），这个快捷方式完美地满足了我们的需求。\n\n之后，我们创建并配置了一个`NSMetadataQuery`实例：\n\
  \n```\nself.query = [[NSMetadataQuery alloc] init];\n_query.predicate = [NSPredicate\
  \ predicateWithFormat:@\"%K like '*.tinypix'\",\n                    NSMetadataItemFSNameKey];\n\
  _query.searchScopes = [NSArray arrayWithObject:\n                       NSMetadataQueryUbiquitousDocumentsScope];\n\
  ```\n\n`NSMetaDataQuery`类最初是为在 OS X 上使用 Spotlight 搜索功能而编写的，但现在它承担了额外职责，作为让 iOS 应用搜索\
  \ iCloud 目录的一种方式。我们给查询一个谓词，将其搜索结果限制为仅包含具有正确文件名的文件，并给它一个搜索范围，将其限制为仅搜索应用 iCloud 存储中的*Documents*文件夹。接下来，我们设置一些通知，以便在查询完成时得到通知，然后启动查询：\n\
  \n```\n[[NSNotificationCenter defaultCenter]\n        addObserver:self\n        selector:@selector(updateUbiquitousDocuments:)\n\
          name:NSMetadataQueryDidFinishGatheringNotification\n        object:nil];\n\
  [[NSNotificationCenter defaultCenter]\n        addObserver:self\n        selector:@selector(updateUbiquitousDocuments:)\n\
          name:NSMetadataQueryDidUpdateNotification\n        object:nil];\n[_query\
  \ startQuery];\n```\n\n现在，我们需要实现查询完成时这些通知调用的方法。在`reloadFiles`方法下方添加此方法：\n\n```\n\
  - (void)updateUbiquitousDocuments:(NSNotification *)notification {\n    self.documentURLs\
  \ = [NSMutableArray array];\n    self.documentFilenames = [NSMutableArray array];\n\
  \n```\n\n\n`NSLog(@\"updateUbiquitousDocuments, results = %@\", self.query.results);`\n\
  `NSArray *results = [self.query.results sortedArrayUsingComparator:^NSComparisonResult(id\
  \ obj1, id obj2) {`\n`NSMetadataItem *item1 = obj1;`\n`NSMetadataItem *item2 = obj2;`\n\
  `return [[item2 valueForAttribute:NSMetadataItemFSCreationDateKey]`\n`compare:`\n\
  `[item1 valueForAttribute:NSMetadataItemFSCreationDateKey]];`\n`}];`\n\n```\nfor\
  \ (NSMetadataItem *item in results) {\n    NSURL *url = [item valueForAttribute:NSMetadataItemURLKey];\n\
  \    [self.documentURLs addObject:url];\n    [(NSMutableArray *)_documentFilenames\
  \ addObject:[url lastPathComponent]];\n}\n\n[self.tableView reloadData];\n```\n\n\
  查询结果中包含一个`NSMetadataItem`对象列表，我们可以从中获取文件 URL 和创建日期等信息。我们利用这些信息按日期对项目进行排序，然后获取所有\
  \ URL 供后续使用。\n\n### 保存在哪里？\n\n下一个改动是在`urlForFilename:`方法中，该方法再次变得完全不同。这里我们使用一个通用\
  \ URL 来为给定的文件名创建完整的路径 URL。我们还在生成的路径中插入了`\"Documents\"`，以确保使用应用程序的*Documents*目录。删除旧方法，并用这个新方法替换：\n\
  \n```\n- (NSURL *)urlForFilename:(NSString *)filename {\n    // 确保在路径中插入 \"Documents\"\
  \n    NSURL *baseURL = [[NSFileManager defaultManager]\n                      URLForUbiquityContainerIdentifier:nil];\n\
  \    NSURL *pathURL = [baseURL URLByAppendingPathComponent:@\"Documents\"];\n  \
  \  NSURL *destinationURL = [pathURL URLByAppendingPathComponent:filename];\n   \
  \ return destinationURL;\n}\n```\n\n现在，在实际的 iOS 设备（而非模拟器）上构建并运行你的应用。如果你之前在该设备上运行过旧版本的应用，你会发现之前创建的\
  \ TinyPix 杰作现在都找不到了。这个新版本忽略了应用的本地*Documents*目录，完全依赖于 iCloud。不过，你应该能够创建新文档，并在退出并重新启动应用后发现它们仍然存在。此外，你甚至可以完全从设备上删除\
  \ TinyPix 应用，然后从 Xcode 再次运行它，就会发现所有 iCloud 保存的文档都立即可用了。如果你还有另一台配置了相同 iCloud 用户的\
  \ iOS 设备，使用 Xcode 在那台设备上运行该应用，你会看到同样的文档也出现在那里！这相当不错。你还可以在 iOS 设备“设置”应用的 iCloud 部分找到这些文档（查看**存储**![image](img/arrow.jpg)**管理存储**![image](img/arrow.jpg)**TinyPix**），如果你运行的是\
  \ OS X 10.8 或更高版本，也可以在 Mac 系统偏好设置的 iCloud 部分找到它们。\n\n### 在 iCloud 上存储偏好设置\n\n我们只需付出一点努力，就可以将另一项功能“云化”。iOS\
  \ 的 iCloud 支持包含一个名为`NSUbiquitousKeyValueStore`的类，它的工作方式很像`NSUserDefaults`；然而，它的键和值存储在云端。这对于应用偏好设置、登录令牌以及其他不属于文档但在用户所有设备之间共享时可能有用的数据来说非常棒。\n\
  \n在 TinyPix 中，我们将使用此功能来存储用户偏好的高亮颜色。这样一来，用户只需设置一次颜色，它就会在所有设备上出现，而无需在每个设备上进行配置。以下是行动计划：\n\
  \n*   每当用户更改色调颜色时，我们将把新值保存在`NSUserDefaults`中，同时也会保存在`NSUbiquitousKeyValueStore`中，这将使其可用于其他设备上的应用实例。\n\
  *   我们将注册以接收`NSUbiquitousKeyValueStore`中的更改通知。当我们收到更改通知时，将获取新的色调颜色值。此时，我们需要更新分段控件、主视图控制器使用的色调颜色以及详细视图控制器中的绘制颜色。我们不会直接执行此操作，而是将新的色调颜色保存在`NSUserDefaults`中。更改`NSUserDefaults`会生成一个通知。详细视图控制器已经在监听此通知，因此它会自动更新。我们还将对主视图控制器进行一些小的修改，使其执行相同的操作。\n\
  \n重要的是要意识到，对`NSUbiquitousKeyValueStore`的更新不会立即传播到其他设备，事实上，如果设备因任何原因未连接到 iCloud，它将不会看到更新，直到下次连接。因此，不要期望更改会立即被看到。\n\
  \n让我们从注册以接收来自 iCloud 键值存储的更改通知开始。打开`AppDelegate.m`并将以下代码添加到`application:didFinishLaunchingWithOptions:`方法中：\n\
  \n```\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions {\n    // 应用启动后的自定义覆盖点。\n    UISplitViewController *splitViewController\
  \ =\n           (UISplitViewController *)self.window.rootViewController;\n    UINavigationController\
  \ *navigationController =\n           [splitViewController.viewControllers lastObject];\n\
  \    navigationController.topViewController.navigationItem.leftBarButtonItem =\n\
  \           splitViewController.displayModeButtonItem;\n    splitViewController.delegate\
  \ = self;\n\n    // 注册 iCloud 键值更改通知\n    [[NSNotificationCenter defaultCenter]\
  \ addObserver:self\n           selector:@selector(iCloudKeysChanged:)\n        \
  \   name:NSUbiquitousKeyValueStoreDidChangeExternallyNotification\n           object:nil];\n\
  \n    // 启动 iCloud 键值更新\n    [[NSUbiquitousKeyValueStore defaultStore] synchronize];\n\
  \    [self updateUserDefaultsFromICloud];\n\n    return YES;\n}\n```\n\n第一行新代码的作用是安排当发生`NSUbiquitousKeyValueStoreDidChangeExternallyNotification`时（即当\
  \ iCloud 通知应用任何键值对发生更改时），调用应用委托的`iCloudKeysChanged:`方法。`synchronize`方法会导致对`NSUbiquitousKeyValueStore`的本地更改在后台写入\
  \ iCloud，并开始接收远程更新的通知。`updateUserDefaultsFromICloud`方法（你很快就会看到）会从 iCloud 键值存储中获取选定色调颜色的当前状态（如果已设置），并将其存储在本地用户默认设置中，以便立即使用。\n\
  \n接下来，添加`iCloudKeysChanged:`和`updateUserDefaultsFromCloud`方法的实现：\n\n```\n- (void)iCloudKeysChanged:(NSNotification\
  \ *)notification {\n    [self updateUserDefaultsFromICloud];\n}\n\n- (void)updateUserDefaultsFromICloud\
  \ {\n    NSDictionary *values = [[NSUbiquitousKeyValueStore defaultStore] dictionaryRepresentation];\n\
  \    if ([values valueForKey:@\"selectedColorIndex\"] != nil) {\n        NSUInteger\
  \ selectedColorIndex = (NSUInteger)[[NSUbiquitousKeyValueStore defaultStore] longLongForKey:@\"\
  selectedColorIndex\"];\n        NSUserDefaults *prefs = [NSUserDefaults standardUserDefaults];\n\
  \        [prefs setInteger:selectedColorIndex forKey:@\"selectedColorIndex\"];\n\
  \        [prefs synchronize];\n    }\n}\n```\n\n\n\n遇到通知时，我们使用`longLongForKey:`方法从键值存储中获取新的选中色调颜色索引。该\
  \ API 与`NSUserDefaults`的 API 非常相似，但没有存储整数值的方法，因此我们将色调颜色索引视为`long long`类型。获取值后，我们将其复制到`NSUserDefaults`并同步更改，从而生成通知。我们已经知道，详情视图控制器在收到此通知时会自行更新。接下来，我们需要修改主视图控制器以执行相同操作。回到`MasterViewController.m`，首先在`viewDidLoad`方法中注册控制器以接收`NSUserDefaults`更改的通知：\n\
  \n```\n[self reloadFiles];\n\n[[NSNotificationCenter defaultCenter] addObserver:self\n\
  \       selector:@selector(onSettingsChanged:)\n       name:NSUserDefaultsDidChangeNotification\
  \ object:nil];\n```\n\n接着，添加`onSettingsChanged:`方法：\n\n```\n- (void)onSettingsChanged:(NSNotification\
  \ *)notification {\n    NSUserDefaults *prefs = [NSUserDefaults standardUserDefaults];\n\
  \    NSInteger selectedColorIndex = [prefs integerForKey:@\"selectedColorIndex\"\
  ];\n    [self setTintColorForIndex:selectedColorIndex];\n    self.colorControl.selectedSegmentIndex\
  \ = selectedColorIndex;\n}\n```\n\n该方法使用与用户点击分段控件时相同的方法更新分段控件的色调颜色，但颜色索引来自`NSUserDefaults`而非控件本身。\n\
  \n最后，当用户更改色调颜色时，我们需要将新索引保存到 iCloud 键值存储中。请对`chooseColor:`方法进行以下修改以实现此功能：\n\n```\n\
  - (IBAction)chooseColor:(id)sender {\n    NSInteger selectedColorIndex = [(UISegmentedControl\
  \ *)sender\n                                    selectedSegmentIndex];\n    [self\
  \ setTintColorForIndex:selectedColorIndex];\n\nNSUserDefaults *prefs = [NSUserDefaults\
  \ standardUserDefaults];\n    [prefs setInteger:selectedColorIndex forKey:@\"selectedColorIndex\"\
  ];\n    [prefs synchronize];\n    [[NSUbiquitousKeyValueStore defaultStore]\n  \
  \            setLongLong:selectedColorIndex\n              forKey:@\"selectedColorIndex\"\
  ];\n    [[NSUbiquitousKeyValueStore defaultStore] synchronize];\n}\n```\n\n就是这样！现在你可以在多个配置了同一\
  \ iCloud 用户的设备上运行该应用，并且会看到在一台设备上设置颜色后，另一台设备上很快也会显示新颜色。小菜一碟！\n\n## 我们未涉及的内容\n\n我们现在已经掌握了一个支持\
  \ iCloud 的基于文档应用的基础知识并使其运行起来，但还有几个你可能需要考虑的问题。我们不会在本书中涵盖这些主题；但如果你认真想要打造一个优秀的基于 iCloud\
  \ 的应用，你需要思考以下几个方面：\n\n*   存储在 iCloud 中的文档容易发生冲突。如果你同时在多台设备上编辑同一个`TinyPix`文件，会发生什么？幸运的是，苹果已经考虑到了这一点，并提供了一些在应用中处理这些冲突的方法。你需要决定是忽略冲突、尝试自动修复冲突，还是让用户帮助解决冲突。有关完整详情，请搜索\
  \ Xcode 文档查看器中标题为“Resolving Document Version Conflicts”的文档。\n*   苹果建议你设计应用使其在完全离线模式下也能正常工作，以防用户因某些原因未使用\
  \ iCloud。它还建议你提供一种让用户在 iCloud 存储和本地存储之间移动文件的方法。遗憾的是，苹果并未提供或建议任何标准的 GUI 来帮助用户管理这一点，而当前提供此功能的应用（如苹果的`iWork`应用）在处理方式上似乎并非特别用户友好。有关更多信息，请参阅\
  \ Xcode 文档中的“Managing the Life Cycle of a Document”部分。\n*   苹果支持将 iCloud 用于 Core\
  \ Data 存储，甚至提供了一个名为`UIManagedDocument`的类，如果你希望实现这一点，可以对其进行子类化。更多信息请参见`UIManagedDocument`类参考。该架构比普通的\
  \ iCloud 文档存储要复杂和麻烦得多。苹果在最近的 iOS 版本中已采取措施进行改进，但仍未完全顺畅，所以请三思而后行。\n\n接下来是什么？在第 15\
  \ 章中，我们将带你了解如何确保应用在多线程、多任务环境中正常工作。\n\n# 第 15 章 Grand Central Dispatch、后台处理与你的应用\n\
  \n如果你曾在任何环境中尝试过多线程编程，你很可能会带着一种恐惧、惊骇或更糟的感觉离开。幸运的是，技术不断进步，苹果提出了一种使多线程编程变得更加容易的新方法。这种方法被称为**Grand\
  \ Central Dispatch**，我们将在本章中带你开始使用它。我们还将深入探讨 iOS 的多任务能力，向你展示如何调整你的应用，使其在这个新世界中表现良好，甚至比以往更好。\n\
  \n## Grand Central Dispatch\n\n如今开发者面临的最大挑战之一是编写能够执行复杂操作以响应用户输入，同时保持响应性的软件，使用户不会因为处理器在处理某些后台任务而一直等待。仔细想想，这个挑战一直伴随着我们；尽管计算技术的进步带来了更快的\
  \ CPU，但问题依然存在。如果你想找证据，只需看看你最近的电脑屏幕。很可能在你上次坐下来工作时，某个时候你的工作流程会被某种旋转的鼠标光标打断。\n\n那么，鉴于系统架构的所有进步，为什么这个问题仍然困扰着我们？部分问题在于软件的典型编写方式：作为一系列按顺序执行的事件。此类软件可以随着\
  \ CPU 速度的提高而扩展，但只能达到一定程度。一旦程序因等待外部资源（如文件或网络连接）而被卡住，整个事件序列就会有效暂停。所有现代操作系统现在都允许在程序中使用多个执行线程，这样即使单个线程因等待特定事件而被卡住，其他线程也可以继续运行。即便如此，许多开发者仍将多线程编程视为某种黑魔法而避之不及。\n\
  \n\n\n# Grand Central Dispatch（GCD）\n\n幸运的是，对于希望将代码分解为同时执行的多个块、却又不愿过多接触系统线程层的开发者，Apple\
  \ 带来了一些好消息。这个好消息就是 Grand Central Dispatch（GCD）。它提供了一套全新的 API，可以将应用程序所需完成的工作拆分成更小的块，这些块能够分布在多个线程上，并且在合适的硬件支持下，还能分布在多个\
  \ CPU 上。\n\n这套新 API 的大部分功能都是通过`blocks`（块）实现的，这是 Apple 的另一项创新，为 C 语言和 Objective-C\
  \ 增加了匿名内联函数的能力。`Blocks`与 Ruby 和 Lisp 等语言中的类似特性有许多共同点，它们提供了一种有趣的新方式来构建不同对象之间的交互，同时让相关代码在你的方法中保持更紧密的聚集。\n\
  \n### 引入 SlowWorker\n\n为了演示 GCD 的工作原理，我们将创建一个名为“SlowWorker”的应用程序。它的界面很简单，由一个按钮和一个文本视图驱动。点击按钮后，一个同步任务会立即启动，导致应用程序锁定大约十秒钟。任务完成后，文本视图中会显示一些内容（参见图\
  \ 15-1）。\n\n![9781484202005_Fig15-01.jpg](img/9781484202005_Fig15-01.jpg)\n\n图 15-1.\
  \ `SlowWorker`应用程序将其界面隐藏在一个按钮后面。点击按钮后，界面会挂起大约十秒钟，同时应用程序执行其工作\n\n首先，像之前多次做过的那样，使用单视图应用程序模板在\
  \ Xcode 中创建一个新应用程序。将其命名为`SlowWorker`，将**设备**设置为**通用**，点击**下一步**以**保存**你的项目，依此类推。接下来，对`ViewController.m`进行如下添加：\n\
  \n```\n#import \"ViewController.h\"\n\n@interface ViewController ()\n\n@property\
  \ (weak, nonatomic) IBOutlet UIButton *startButton; \n@property (weak, nonatomic)\
  \ IBOutlet UITextView *resultsTextView;\n\n@end\n```\n\n这简单定义了两个输出口，分别连接到 GUI 中可见的两个对象。\n\
  \n现在继续，在`@implementation`部分中以粗体添加以下代码：\n\n```\n@implementation ViewController\n\n\
  - (NSString *)fetchSomethingFromServer\n{\n    [NSThread sleepForTimeInterval:1];\n\
      return @\"Hi there\";\n}\n\n- (NSString *)processData:(NSString *)data\n{\n\
      [NSThread sleepForTimeInterval:2];\n    return [data uppercaseString];\n}\n\n\
  - (NSString *)calculateFirstResult:(NSString *)data\n{\n    [NSThread sleepForTimeInterval:3];\n\
      return [NSString stringWithFormat:@\"Number of chars: %lu\",\n            (unsigned\
  \ long)[data length]];\n}\n\n- (NSString *)calculateSecondResult:(NSString *)data\n\
  {\n    [NSThread sleepForTimeInterval:4];\n    return [data stringByReplacingOccurrencesOfString:@\"\
  E\"\n                                           withString:@\"e\"];\n}\n\n- (IBAction)doWork:(id)sender\n\
  {\n    self.resultsTextView.text = @\"\";\n    NSDate *startTime = [NSDate date];\n\
      NSString *fetchedData = [self fetchSomethingFromServer];\n    NSString *processedData\
  \ = [self processData:fetchedData];\n    NSString *firstResult = [self calculateFirstResult:processedData];\n\
      NSString *secondResult = [self calculateSecondResult:processedData];\n    NSString\
  \ *resultsSummary = [NSString stringWithFormat:\n                                @\"\
  First: [%@]\\nSecond: [%@]\", firstResult,\n                                secondResult];\n\
      self.resultsTextView.text = resultsSummary;\n    NSDate *endTime = [NSDate date];\
  \ \n    NSLog(@\"Completed in %f seconds\",\n          [endTime timeIntervalSinceDate:startTime]);\n\
  }\n.\n.\n.\n```\n\n如你所见，这个类的工作（暂且这么说）被拆分成了多个小段。这段代码只是为了模拟一些缓慢的操作，这些方法本身并没有真正耗时的操作。为了有点趣味，每个方法中都包含了对`NSThread`类方法`sleepForTimeInterval:`的调用，它会让程序（确切地说是调用该方法的线程）暂停指定秒数，什么也不做。`doWork:`方法还在开头和结尾加入了代码，用于计算完成所有工作所花费的时间。\n\
  \n现在打开`Main.storyboard`，将一个**按钮**和一个**文本视图**拖拽到空的视图窗口中，按照图 15-2 所示布局。要设置自动布局约束，首先选择\
  \ **开始工作** 按钮，然后在菜单栏中选择 **Editor** ![image](img/arrow.jpg) **Align** ![image](img/arrow.jpg)\
  \ **Horizontal Center in Container**。接着，按住 Control 键从按钮拖拽到视图窗口顶部，释放鼠标并选择 **Top Space\
  \ to Top Layout Guide**。为了完成该按钮的约束设置，按住 Control 键从按钮向下拖拽到文本视图，释放鼠标并选择 **Vertical\
  \ Spacing**。要固定文本视图的位置和大小，按住 Control 键从它拖拽到视图窗口。释放鼠标，弹出菜单出现时，按住 **Shift** 键并选择 **Leading\
  \ Space to Container Margin**、**Trailing Space to Container Margin** 和 **Bottom\
  \ Space to Bottom Layout Guide**，然后点击 **弹出菜单外部以应用约束**。这样就完成了此应用程序的自动布局约束。\n\n![9781484202005_Fig15-02.jpg](img/9781484202005_Fig15-02.jpg)\n\
  \n图 15-2. `SlowWorker`的界面由一个按钮和一个文本视图组成。确保取消选中文本视图的 **可编辑** 复选框，并删除其中的所有文本\n\n按住\
  \ Control 键从 **文件所有者** 拖拽，将视图控制器的两个输出口（即 `startButton` 和 `resultsTextView` 实例变量）连接到按钮和文本视图。\n\
  \n接着，按住 Control 键从按钮拖拽到视图控制器的`doWork:`方法，以便按下按钮时调用它。最后，选中文本视图，使用属性检查器取消选中 **可编辑**\
  \ 复选框（位于右上角），并删除文本视图中的默认文本。\n\n保存你的工作，然后选择 **运行**。你的应用程序应该会启动，按下按钮后它会工作大约十秒钟（所有睡眠时间的总和），然后显示结果。在等待期间，你会看到\
  \ **开始工作** 按钮明显变暗，直到“工作”完成才会恢复正常的颜色。此外，在工作完成之前，应用程序的视图是无响应的。点击屏幕的任何地方都没有效果。事实上，在此期间你能与应用程序交互的唯一方式就是点击\
  \ home 键切换到其他应用。这正是我们要避免的状况！\n\n在这个特定示例中，等待时间还不算太糟，因为应用程序看起来只挂起了几秒钟；但如果你经常让应用长时间挂起，使用体验会非常令人沮丧。在最坏的情况下，如果应用长时间无响应，操作系统甚至可能会强制关闭它。无论如何，你最终都会得到一些不满的用户——甚至可能失去一些用户！\n\
  \n### 线程基础\n\n在开始实现解决方案之前，我们先回顾一些并发基础知识。这远远不是 iOS 中线程或一般线程的完整描述。我们只是想解释足够的内容，以便你理解本章将要进行的操作。\n\
  \n\n\n# 线程与线程安全\n\n大多数现代操作系统（当然包括 iOS）都支持线程执行的概念。每个进程可以包含多个线程，这些线程同时并发运行。如果只有一个处理器核心，操作系统会在所有执行线程之间进行切换，就像它在所有执行进程之间切换一样。如果有多核可用，线程将像进程一样分布在多个核心上。\n\
  \n同一进程中的所有线程共享相同的可执行程序代码和相同的全局数据。每个线程也可以拥有一些专属数据。线程可以利用一种称为 `mutex`（*互斥锁* 的简称）或锁的特殊结构，它能确保某段特定代码不会被多个线程同时运行。当多个线程同时访问同一数据时，通过在一个线程更新值时锁定其他线程（位于代码的**临界区**内），这对于确保正确结果非常有用。\n\
  \n处理线程时的一个常见问题是代码是否为**线程安全**。有些软件库在设计时考虑到了线程并发，并使用 `mutex` 正确保护了所有临界区。而有些代码库则不是线程安全的。\n\
  \n例如，在 Cocoa Touch 中，Foundation 框架（包含适用于各类 Objective-C 编程的基本类，如 `NSString`、`NSArray`\
  \ 等）通常被认为是线程安全的。然而，UIKit 框架（包含构建 GUI 应用所需的特定类，如 `UIApplication`、`UIView` 及其所有子类等）在很大程度上不是线程安全的。这意味着在运行中的\
  \ iOS 应用中，所有与 UIKit 对象相关的方法调用都应从同一个线程（即**主线程**）中执行。如果你从另一个线程访问 UIKit 对象，后果难以预料！你很可能会遇到看似无法解释的错误（或者更糟的是，你在开发时未遇到任何问题，但某些用户在你的应用发布后会受到影响）。\n\
  \n默认情况下，iOS 应用的所有操作都发生在主线程上（例如，处理由用户事件触发的操作）。因此，对于简单的应用，你无需担心这个问题。由用户触发的操作方法已经运行在主线程中。到本书为止，我们的代码一直仅在主线程上运行，但这种情况即将改变。\n\
  \n**提示** 关于线程安全已有大量著述，值得你花时间去深入了解并尽可能消化这些知识。一个很好的起点是 Apple 的官方文档。花几分钟时间阅读以下页面（这一定会对你有帮助）：`http://developer.apple.com/library/ios/documentation/Cocoa/Conceptual/Multithreading/ThreadSafetySummary/ThreadSafetySummary.html`\n\
  \n### 工作单元\n\n前面描述的线程模型的问题在于，对于普通程序员来说，编写无错误的多线程代码几乎是不可能的。这并非是对我们行业或普通程序员能力的批评，而仅仅是一种观察。在跨多个线程同步数据和操作时，你必须在代码中处理复杂的交互，这对大多数人来说确实过于困难。想象一下，只有\
  \ 5% 的人有能力编写软件，而这 5% 中只有一小部分真正能够胜任编写重度多线程应用的任务。即使是那些成功做到这一点的人，也常常会建议他人不要效仿他们的做法！\n\
  \n幸运的是，并非毫无希望。我们可以在不进行过多底层线程操作的情况下实现某种并发。正如我们能够在不直接向视频 RAM 写入位的情况下在屏幕上显示数据、在不直接与磁盘控制器交互的情况下从磁盘读取数据一样，我们也可以利用软件抽象，让我们在多个线程上运行代码，而无需直接与线程打交道太多。\n\
  \nApple 鼓励我们使用的解决方案围绕以下思路展开：将长时间运行的任务拆分为工作单元，并将这些单元放入队列中执行。系统为我们管理这些队列，在多个线程上执行工作单元。我们无需直接启动和管理后台线程，从而免去了实现多线程应用时通常需要的大量记录工作；系统为我们处理了这一切。\n\
  \n### GCD：底层队列\n\n这种将工作单元放入队列中、在后台执行，并由系统为你管理线程的想法非常强大，并极大地简化了许多需要并发的开发场景。GCD 在几年前首次出现在\
  \ OS X 上，提供了实现这一功能的基础设施。几年后，这项技术也进入了 iOS 平台。\n\nGCD 将一些优秀的概念——工作单元、轻松的后台处理以及自动线程管理——整合到了一个\
  \ C 接口中，该接口不仅可用于 Objective-C，还可用于 C、C++ 以及当然还有 Swift。更棒的是，Apple 已将其 GCD 实现开源，因此它也可以移植到其他类\
  \ Unix 操作系统上。\n\nGCD 的一个关键概念是`队列`。系统提供了许多预定义的队列，包括一个保证始终在主线程上执行工作的队列。这对于非线程安全的 UIKit\
  \ 来说非常完美！你也可以创建自己的队列——想创建多少就创建多少。GCD 队列严格遵循先进先出（FIFO）原则。添加到 GCD 队列的工作单元将始终按照它们被放入队列的顺序启动。也就是说，它们可能不会以相同的顺序完成，因为一个\
  \ GCD 队列可能会在可能的情况下自动将其工作分配给多个线程。\n\nGCD 可以访问一个线程池，这些线程在应用的整个生命周期内被重用，并且它会尝试维护一个适合机器架构的线程数。当有工作需要处理时，它会自动利用更强大的机器，从而使用更多的处理器核心。直到最近，iOS\
  \ 设备都是单核的，所以这还不是什么大问题。但现在，过去几年发布的所有 iOS 设备都配备了多核处理器，GCD 正变得越来越有用。\n\n#### 成为 Block\
  \ 高手\n\n与 GCD 一起，Apple 还为 C 语言本身（并由此扩展到 Objective-C 和 C++）添加了一些新语法，以实现一种称为**块**（在其他一些语言中也称为**闭包**或**lambda**）的语言特性，这对于充分发挥\
  \ GCD 的优势非常重要。块背后的想法是让特定的代码段可以像其他 C 语言类型一样被处理。一个块可以赋值给一个变量、作为参数传递给函数或方法，并且（与大多数其他类型不同）可以被执行。通过这种方式，块可以作为\
  \ Objective-C 中委托模式或 C 中回调函数的替代方案。\n\n与方法或函数非常相似，块可以接受一个或多个参数并指定一个返回值。要声明一个块变量，你可以使用脱字符号（`^`）以及一些额外的括号来声明参数和返回类型。要定义块本身，操作方法大致相同，但在其后用花括号括起定义块的实际代码：\n\
  \n```\n// 声明一个名为 \"loggerBlock\" 的块变量，无参数\n// 且无返回值。\nvoid (^loggerBlock)(void);\n\
  ```\n\n\n```objective-c\n// 将代码块赋值给之前声明的变量。像这样没有参数且没有返回值的代码块，\n// 不需要像前面的变量声明中使用\
  \ `void` 那样的“修饰”。\nloggerBlock = ^{ NSLog(@\"我真的很高兴他们没把它叫做 lambda\"); };\n\n// 执行代码块，就像调用函数一样。\n\
  loggerBlock();  // 这会在控制台输出一些内容\n```\n\n如果你做过很多 C 语言编程，可能会发现这与 C 语言中的函数指针概念类似。然而，两者之间存在一些关键差异。其中最大的差异——当你第一次看到时最引人注目的是——代码块可以直接在代码中内联定义。你可以在需要将代码块传递给另一个方法或函数的位置直接定义它。\n\
  \n另一个重大区别是，代码块可以访问其创建作用域内的所有变量。默认情况下，代码块会“捕获”你通过这种方式访问的任何变量。它会将值复制到一个同名的新变量中，保持原始变量不变。Objective-C\
  \ 对象会自动收到一条 `retain` 消息（随后，当代码块执行完毕，会收到一条 `release`，从而在代码块内部为变量赋予强语义），而像 `int` 和\
  \ `float` 这样的标量值则会被简单复制。不过，你可以通过在外部变量的声明前添加存储限定符 `__block`，使其变为“可读/写”。注意，`block`\
  \ 前面是两条下划线，而不是一条。或者，如果你想传入一个具有 `weak` 语义的对象指针，可以在其前面添加 `__weak`：\n\n```objective-c\n\
  // 定义一个可由代码块修改的变量\n__block int a = 0;\n\n// 定义一个尝试修改其作用域内变量的代码块\nvoid (^sillyBlock)(void)\
  \ = ^{ a = 47; };\n\n// 在调用代码块前检查变量的值\nNSLog(@\"a == %d\", a); // 输出 \"a == 0\"\n\
  \n// 执行代码块\nsillyBlock();\n\n// 在调用代码块后再次检查变量的值\nNSLog(@\"a == %d\", a); // 输出 \"\
  a == 47\"\n```\n\n如前所述，代码块在与 GCD 一起使用时才能真正大放异彩，GCD 允许你一步操作就获取一个代码块并将其添加到队列中。当你直接在当时定义的代码块（而非存储在变量中的代码块）上执行此操作时，你还能获得额外的优势：可以直接在使用相关代码的上下文中看到它。\n\
  \n### 改进 SlowWorker\n\n为了了解代码块的工作原理，让我们重新审视 SlowWorker 的 `doWork:` 方法。目前它看起来是这样的：\n\
  \n```objective-c\n- (IBAction)doWork:(id)sender\n{\n    self.resultsTextView.text\
  \ = @\"\";\n    NSDate *startTime = [NSDate date];\n    NSString *fetchedData =\
  \ [self fetchSomethingFromServer];\n    NSString *processedData = [self processData:fetchedData];\n\
  \    NSString *firstResult = [self calculateFirstResult:processedData];\n    NSString\
  \ *secondResult = [self calculateSecondResult:processedData];\n    NSString *resultsSummary\
  \ = [NSString stringWithFormat:\n                                @\"First: [%@]\\\
  nSecond: [%@]\", firstResult,\n                                secondResult];\n\
  \    self.resultsTextView.text = resultsSummary;\n    NSDate *endTime = [NSDate\
  \ date];\n    NSLog(@\"Completed in %f seconds\",\n          [endTime timeIntervalSinceDate:startTime]);\n\
  }\n```\n\n我们可以通过将所有代码包装在一个代码块中，并将其传递给一个名为 `dispatch_async` 的 GCD 函数，从而使此方法完全在后台运行。该函数接受两个参数：一个\
  \ GCD 队列和一个要分配给该队列的代码块。在你的 `doWork:` 副本中做这两处修改。请确保在方法末尾添加右大括号和右括号：\n\n```objective-c\n\
  - (IBAction)doWork:(id)sender\n{\n    NSDate *startTime = [NSDate date];\n    dispatch_queue_t\
  \ queue =\n        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);\n\
  \    dispatch_async(queue, ^{\n        NSString *fetchedData = [self fetchSomethingFromServer];\n\
  \        NSString *processedData = [self processData:fetchedData];\n        NSString\
  \ *firstResult = [self calculateFirstResult:processedData];\n        NSString *secondResult\
  \ = [self calculateSecondResult:processedData];\n        NSString *resultsSummary\
  \ = [NSString stringWithFormat:\n                                    @\"First: [%@]\\\
  nSecond: [%@]\", firstResult,\n                                    secondResult];\n\
  \        self.resultsTextView.text = resultsSummary;\n        NSDate *endTime =\
  \ [NSDate date];\n        NSLog(@\"Completed in %f seconds\",\n              [endTime\
  \ timeIntervalSinceDate:startTime]);\n    });\n}\n```\n\n第一行使用 `dispatch_get_global_queue()`\
  \ 函数获取一个始终可用的预先存在的全局队列。该函数接受两个参数：第一个参数允许你指定优先级，第二个参数目前未使用，应始终为 `0`。如果你在第一个参数中指定了不同的优先级，例如\
  \ `DISPATCH_QUEUE_PRIORITY_HIGH` 或 `DISPATCH_QUEUE_PRIORITY_LOW`，你实际上会得到一个不同的全局队列，系统会以不同的方式对其进行优先级排序。现在，我们将坚持使用默认的全局队列。\n\
  \n然后，该队列与紧随其后的代码块一起被传递给 `dispatch_async()` 函数。GCD 会获取整个代码块并将其放到队列上，然后它会被安排在后台线程上运行，并逐步执行，就像在主线程中运行时一样。\n\
  \n请注意，我们在创建代码块之前定义了一个名为 `startTime` 的变量，然后在代码块末尾使用了它的值。直觉上，这似乎说不通，因为当代码块执行时，`doWork:`\
  \ 方法已经退出，所以 `startTime` 变量指向的 `NSDate` 实例应该已经被释放了！这是代码块使用的一个关键点：如果代码块在执行过程中访问了任何“外部”变量，那么在代码块创建时就会进行一些特殊设置，使得代码块能够访问这些变量。这些变量所包含的值要么被复制（如果它们是如\
  \ `int` 或 `float` 这样的普通 C 类型），要么被保留（如果它们是指向对象的指针），以便这些值可以在代码块内部使用。当在 `doWork:` 的第二行调用\
  \ `dispatch_async` 时，并且代码中显示的代码块被创建，`startTime` 实际上收到了一条 `retain` 消息，其返回值被赋值给代码块内部一个本质上具有相同名称（`startTime`）的新的不可变变量。\n\
  \n`startTime` 变量在代码块内部需要是不可变的，这样代码块内部的代码就不会意外地篡改在代码块外部定义的变量。如果一直允许这样做，只会让每个人都感到困惑。然而，有时你确实想让一个代码块写入一个外部定义的值，这时\
  \ `__block` 存储限定符（我们在前几页提到过）就派上用场了。如果使用 `__block` 定义一个变量，那么它可以直接被同一作用域内定义的所有代码块访问。一个有趣的副作用是，使用\
  \ `__block` 限定的变量在代码块内部使用时，不会被复制或保留。\n\n### 别忘了主线程\n\n\n回到手头的项目，这里有一个问题：UIKit 的线程安全性。请记住，从后台线程向任何\
  \ GUI 对象发送消息，包括我们的`resultsTextView`，都是不被允许的。事实上，如果你现在运行这个示例，大约十秒后，当 block 尝试更新文本视图时，你会收到一个异常。幸运的是，GCD\
  \ 也提供了一种处理这个问题的方法。在 block 内部，我们可以调用另一个调度函数，将工作传回主线程！我们通过再次调用`dispatch_async()`来实现这一点，这次传入的是由`dispatch_get_main_queue()`函数返回的队列。这总是会给我们提供存在于主线程上的特殊队列，随时准备执行需要使用主线程的\
  \ block。对你的`doWork:`版本再做一次修改：\n\n```objc\n- (IBAction)doWork:(id)sender\n{\n   \
  \ self.resultsTextView.text = @\"\";\n    NSDate *startTime = [NSDate date];\n \
  \   dispatch_queue_t queue =\n        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0);\n    dispatch_async(queue, ^{\n        NSString *fetchedData = [self fetchSomethingFromServer];\n\
  \        NSString *processedData = [self processData:fetchedData];\n        NSString\
  \ *firstResult = [self calculateFirstResult:processedData];\n        NSString *secondResult\
  \ = [self calculateSecondResult:processedData];\n        NSString *resultsSummary\
  \ = [NSString stringWithFormat:\n                                    @\"First: [%@]\\\
  nSecond: [%@]\", firstResult,\n                                    secondResult];\n\
  \        dispatch_async(dispatch_get_main_queue(), ^{\n            self.resultsTextView.text\
  \ = resultsSummary;\n        });\n        NSDate *endTime = [NSDate date];\n   \
  \     NSLog(@\"Completed in %f seconds\",\n              [endTime timeIntervalSinceDate:startTime]);\n\
  \    });\n}\n```\n\n### 给予一些反馈\n\n如果在此刻构建并运行你的应用，你会看到它现在似乎运行得更流畅一些了，至少在某种意义上如此。按钮在你触摸后不再卡在高亮位置，这或许会引导你再次点击，然后再次点击，依此类推。如果你查看\
  \ Xcode 的控制台日志，你会看到每次点击的结果，但只有最后一次点击的结果会显示在文本视图中。\n\n我们真正想要做的是增强 GUI，以便用户在按下按钮后，显示能够立即更新，以表明正在执行某个操作。我们还希望在工作进行期间禁用该按钮。我们将通过在显示中添加一个`UIActivityIndicatorView`来实现这一点。这个类提供了在许多应用程序和网站中看到的那种旋转指示器。首先，在`ViewController.m`顶部的类扩展中声明它：\n\
  \n```objc\n@interface ViewController ()\n\n@property (weak, nonatomic) IBOutlet\
  \ UIButton *startButton;\n@property (weak, nonatomic) IBOutlet UITextView *resultsTextView;\n\
  @property (weak, nonatomic) IBOutlet UIActivityIndicatorView *spinner;\n\n@end\n\
  ```\n\n接下来，打开*Main.Storyboard*，在库中找到**Activity Indicator**视图，并将其拖入我们的视图中，放置在按钮旁边（参见图\
  \ 15-3）。你需要添加布局约束来固定活动指示器相对于按钮的位置。一种方法是按住 Control 键从按钮拖到活动指示器，然后从弹出菜单中选择**Horizontal\
  \ Spacing**来固定它们之间的水平间距，然后再次按住 Control 键拖拽并选择**Center Y**，以确保它们的中心在垂直方向上对齐。\n\n\
  ![9781484202005_Fig15-03.jpg](img/9781484202005_Fig15-03.jpg)\n\n图 15-3. 在 Interface\
  \ Builder 中将活动指示器视图拖入我们的主视图\n\n选中活动指示器旋转控件后，使用 Attributes Inspector 勾选**Hides When\
  \ Stopped**复选框，这样我们的旋转指示器只会在我们告诉它开始旋转时出现（没人希望 GUI 里出现一个不转的旋转指示器）。\n\n接下来，按住 Control\
  \ 键从**View Controller**图标拖到旋转指示器，并连接`spinner`输出口。保存你的更改。\n\n现在打开`ViewController.m`。在这里，我们首先对`doWork:`方法做一些处理，添加几行代码来管理用户点击按钮时以及工作完成时按钮和旋转指示器的外观。我们首先将按钮的`enabled`属性设置为`NO`，这会阻止它注册任何点击，并通过使其文本变灰且略显透明来显示按钮已被禁用。接下来，我们通过调用`setAnimated:`方法来启动旋转指示器。在\
  \ block 的末尾，我们重新启用按钮并停止旋转指示器，这会导致它再次消失：\n\n```objc\n- (IBAction)doWork:(id)sender\n\
  {\n    self.resultsTextView.text = @\"\";\n    NSDate *startTime = [NSDate date];\n\
  \    self.startButton.enabled = NO;\n\n    [self.spinner startAnimating];\n    dispatch_queue_t\
  \ queue =\n        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT, 0);\n\
  \    dispatch_async(queue, ^{\n        NSString *fetchedData = [self fetchSomethingFromServer];\n\
  \        NSString *processedData = [self processData:fetchedData];\n        NSString\
  \ *firstResult = [self calculateFirstResult:processedData];\n        NSString *secondResult\
  \ = [self calculateSecondResult:processedData];\n        NSString *resultsSummary\
  \ = [NSString stringWithFormat:\n                                    @\"First: [%@]\\\
  nSecond: [%@]\", firstResult,\n                                    secondResult];\n\
  \        dispatch_async(dispatch_get_main_queue(), ^{\n            self.resultsTextView.text\
  \ = resultsSummary;\n            self.startButton.enabled = YES;\n            [self.spinner\
  \ stopAnimating];\n        });\n        NSDate *endTime = [NSDate date];\n     \
  \   NSLog(@\"Completed in %f seconds\",\n              [endTime timeIntervalSinceDate:startTime]);\n\
  \    });\n}\n```\n\n构建并运行应用，然后按下按钮。这才像样，对吧？即使正在完成的工作需要几秒钟，用户也不至于被晾在一边。按钮被禁用并且外观上看起来也是禁用的。此外，动画旋转指示器让用户知道应用并没有真正挂起，并且可以预期会在某个时间点恢复正常。\n\
  \n### 并发 Block\n\n到目前为止一切顺利，但我们还没有完成！你们当中目光敏锐的人会注意到，在完成这些步骤之后，我们实际上并没有真正改变算法（如果你能把这个简单的步骤列表称为算法的话）的基本顺序执行流程。我们所做的只是将这个方法的一个大块移动到后台线程，然后在主线程中完成收尾工作。Xcode\
  \ 控制台输出证明了这一点：这项工作需要十秒才能运行完，就像开始时一样。房间里的大象是`calculateFirstResult:`和`calculateSecondResult:`不需要按顺序执行，并发执行它们可以为我们带来显著的加速。\n\
  \n幸运的是，GCD 有一种方法可以通过使用所谓的**调度组**来实现这一点。所有在组上下文内通过`dispatch_group_async()`函数异步调度的\
  \ block，都会尽可能快地执行，包括在可能的情况下被分配到多个线程并发执行。我们还可以使用`dispatch_group_notify()`来指定一个额外的\
  \ block，该 block 将在组中所有 block 运行完成后执行。\n\n对你的`doWork:`副本进行以下更改。再次确保你正确添加了末尾的花括号和括号：\n\
  \n\n\n```objc\n- (IBAction)doWork:(id)sender\n{\n    self.resultsTextView.text =\
  \ @\"\";\n    NSDate *startTime = [NSDate date];\n    self.startButton.enabled =\
  \ NO;\n    self.startButton.alpha = 0.5f;\n    [self.spinner startAnimating];\n\
  \    dispatch_queue_t queue =\n        dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0);\n    dispatch_async(queue, ^{\n        NSString *fetchedData = [self fetchSomethingFromServer];\n\
  \        NSString *processedData = [self processData:fetchedData];\n        NSString\
  \ *firstResult = [self calculateFirstResult:processedData];\n        NSString *secondResult\
  \ = [self calculateSecondResult:processedData];\n        __block NSString *firstResult;\n\
  \        __block NSString *secondResult;\n        dispatch_group_t group = dispatch_group_create();\n\
  \        dispatch_group_async(group, queue, ^{\n            firstResult = [self\
  \ calculateFirstResult:processedData];\n        });\n        dispatch_group_async(group,\
  \ queue, ^{\n            secondResult = [self calculateSecondResult:processedData];\n\
  \        });\n        dispatch_group_notify(group, queue, ^{\n            NSString\
  \ *resultsSummary = [NSString stringWithFormat:\n                              \
  \          @\"First: [%@]\\nSecond: [%@]\",\n                                  \
  \      firstResult,\n                                        secondResult];\n  \
  \          dispatch_async(dispatch_get_main_queue(), ^{\n                self.resultsTextView.text\
  \ = resultsSummary;\n                self.startButton.enabled = YES;\n         \
  \       self.startButton.alpha = 1;\n                [self.spinner stopAnimating];\n\
  \            });\n            NSDate *endTime = [NSDate date];\n            NSLog(@\"\
  Completed in %f seconds\",\n                  [endTime timeIntervalSinceDate:startTime]);\n\
  \        });\n    });\n}\n```\n\n这里的一个复杂之处在于，每个 `calculate` 方法都会返回一个我们希望捕获的值，因此我们必须先使用\
  \ `__block` 存储修饰符创建变量。这可以确保在 Block 内部设置的值对后续运行的代码可用。\n\n完成这些之后，构建并再次运行应用程序。你会发现付出的努力得到了回报。由于我们同时运行了两次计算，原本需要十秒的操作现在仅需七秒。\n\
  \n显然，我们刻意设计的示例获得了最大效果，因为这两个“计算”实际上什么都没做，只是让它们所在的线程休眠。在实际应用中，加速效果取决于所执行的工作类型和可用的资源。只有存在多个\
  \ CPU 核心时，这种技术才有助于提升 CPU 密集型计算的性能，并且随着未来 iOS 设备增加更多核心，性能几乎会免费地进一步提升。其他用途，例如同时从多个网络连接获取数据，即使只有一个\
  \ CPU 也能看到速度提升。\n\n如你所见，GCD 并非万能药。使用 GCD 并不会自动加速所有应用程序。但是，通过在应用程序中速度至关重要的位置，或者你发现应用程序对用户操作响应迟缓的地方，仔细应用这些技术，即使无法提升实际性能，也能轻松提供更好的用户体验。\n\
  \n### 后台处理\n\n另一个处理并发的重要技术是后台处理。这允许你的应用程序在后台运行——在某些情况下，甚至在用户按下 Home 键之后。\n\n不应将这一功能与现代桌面操作系统所具备的真正多任务处理相混淆，在现代桌面操作系统中，你启动的所有程序都会驻留在系统\
  \ RAM 中，直到你明确退出它们。iOS 设备的内存仍然太小，无法很好地实现这一点。相反，这种后台处理旨在允许需要特定系统功能的应用程序在后台时以受限的方式继续运行。例如，如果你有一个播放网络电台音频流的应用程序，即使用户切换到另一个应用，iOS\
  \ 也会让该应用继续运行。除此之外，当你的应用播放音频时，它甚至会在 iOS 控制中心（从屏幕底部向上滑动时出现的半透明控制面板）提供标准的暂停和音量控制。\n\
  \n假设你正在创建一个执行以下某项操作的应用程序：即使用户正在运行其他应用也能播放音频、请求持续的位置更新、响应特定类型的推送请求以从服务器加载新数据，或者实现网络电话（VoIP）功能，让用户通过互联网发送和接听电话。在每种情况下，你都可以在应用的\
  \ `Info.plist` 文件中声明这种情况，系统就会以特殊方式对待你的应用。这种用法虽然有趣，但可能并非本书大多数读者会涉及的内容，因此我们不会在此深入探讨。\n\
  \n除了在后台运行应用之外，iOS 还支持在用户按下 Home 键后将应用置于挂起状态。这种挂起执行状态在概念上类似于将 Mac 置于睡眠模式。应用程序的整个工作内存都保存在\
  \ RAM 中，只是在挂起时不执行任何操作。因此，切换回此类应用的速度极快。这并不仅限于特殊的应用程序。事实上，这是你用 Xcode 构建的任何应用的默认行为（尽管可以通过\
  \ `Info.plist` 文件中的另一个设置禁用此功能）。要查看实际效果，请打开设备上的“邮件”应用，深入查看某封邮件。然后按下 Home 键，打开“备忘录”应用并选择一条笔记。接着双击\
  \ Home 键切换回“邮件”。你会发现没有明显的延迟；它会流畅地滑入位置，仿佛一直在运行。\n\n对于大多数应用程序来说，这种自动挂起和恢复可能就是你所需要的全部功能。然而，在某些情况下，你的应用可能需要知道它即将被挂起以及刚刚被唤醒。系统通过\
  \ `UIApplication` 类提供了通知应用其执行状态变化的方法，该类为此提供了许多委托方法和通知。我们将在本章稍后部分向你展示如何使用它们。\n\n\
  当你的应用即将被挂起时，无论它是否属于特殊类型的后台应用，它都可以做一件事：请求在后台运行额外的少量时间。其目的是确保你的应用有足够的时间关闭所有打开的文件、网络资源等。我们稍后会给出一个示例。\n\
  \n## 应用生命周期\n\n在深入探讨如何处理应用执行状态变化的具体细节之前，我们先来聊聊其生命周期中的各种状态：\n\n\n\n# iOS 应用状态管理\n\
  \n### 应用状态\n\n- **Not Running**: 这是设备刚重启后所有应用所处的状态。设备开机后曾经启动过的应用只有在特定条件下才会回到此状态：\n\
  \    - 如果其`Info.plist`包含`UIApplicationExitsOnSuspend`键（且值设置为`YES`）\n    - 如果之前处于\
  \ Suspended 状态，且系统需要清理内存\n    - 如果在运行时崩溃\n- **Active**: 这是应用显示在屏幕上时的正常运行状态。它可以接收用户输入并更新显示。\n\
  - **Background**: 在此状态下，应用有一定时间执行代码，但不能直接访问屏幕或获取用户输入。用户按下 Home 键时，所有应用都会短暂进入此状态；大多数应用会很快转入\
  \ Suspended 状态。需要进行后台处理的应用会保持此状态，直到再次变为 Active 状态。\n- **Suspended**: 处于 Suspended\
  \ 状态的应用被冻结。这是普通应用在短暂处于 Background 状态后的状态。应用在 Active 时使用的所有内存都被原样保留。如果用户将应用带回 Active\
  \ 状态，它将从离开的地方继续运行。另一方面，如果系统需要为当前 Active 的应用腾出更多内存，任何 Suspended 应用都可能被终止（并回到 Not\
  \ Running 状态），释放其内存供其他用途。\n- **Inactive**: 应用仅在两个其他状态之间短暂停留时进入 Inactive 状态。应用能长时间保持\
  \ Inactive 的唯一情况是用户正在处理系统提示（如来电或短信提示），或用户锁定了屏幕。此状态基本上是一种中间状态。\n\n### 状态变更通知\n\n\
  为了管理这些状态之间的切换，`UIApplication`定义了一系列可由其委托实现的方法。除了委托方法外，`UIApplication`还定义了一组匹配的通知名称（见表\
  \ 15-1）。这使得应用委托之外的其他对象也能在应用状态变化时注册通知。\n\n**表 15-1** 跟踪应用执行状态的委托方法及其对应的通知名称\n\n|\
  \ 委托方法 | 通知名称 |\n| --- | --- |\n| `application:didFinishLaunchingWithOptions:` |\
  \ `UIApplicationDidFinishLaunchingNotification` |\n| `applicationWillResignActive:`\
  \ | `UIApplicationWillResignActiveNotification` |\n| `applicationDidBecomeActive:`\
  \ | `UIApplicationDidBecomeActiveNotification` |\n| `applicationDidEnterBackground:`\
  \ | `UIApplicationDidEnterBackgroundNotification` |\n| `applicationWillEnterForeground:`\
  \ | `UIApplicationWillEnterForegroundNotification` |\n| `applicationWillTerminate:`\
  \ | `UIApplicationWillTerminateNotification` |\n\n请注意，这些方法中的每一个都直接与运行状态之一相关：Active、Inactive\
  \ 和 Background。每个委托方法仅在这些状态之一中被调用（每个通知也仅在这些状态下发布）。最重要的状态转换是 Active 与其他状态之间的转换。有些转换，如从\
  \ Background 到 Suspended，是不经任何通知发生的。我们来逐一讲解这些方法及其使用方式。\n\n第一个方法是`application:didFinishLaunchingWithOptions:`，你在本书中已经多次见过。这是应用启动后直接进行应用级编码的主要方式。还有一个类似的方法叫`application:willFinishLaunchingWithOptions:`，它会先被调用，适用于使用基于视图控制器的状态保存功能的应用。该方法未在此列出，因为它与状态变更无关。\n\
  \n接下来的两个方法`applicationWillResignActive:`和`applicationDidBecomeActive:`在多种情况下使用。如果用户按下\
  \ Home 键，会调用`applicationWillResignActive:`。如果用户稍后将应用带回前台，会调用`applicationDidBecomeActive:`。用户接听电话时也会发生相同的事件序列。此外，`applicationDidBecomeActive:`在应用首次启动时也会被调用！总的来说，这一对方法标记了应用从\
  \ Active 状态到 Inactive 状态的移动。它们是启用和禁用动画、应用内音频或其他与用户呈现相关项的好地方。由于`applicationDidBecomeActive:`在多种情况下被使用，你可能希望将部分应用初始化代码放在此处，而非`application:didFinishLaunchingWithOptions:`中。请注意，不要在`applicationWillResignActive:`中假设应用将进入后台；它可能只是暂时的变化，最终会回到\
  \ Active 状态。\n\n在这些方法之后是`applicationDidEnterBackground:`和`applicationWillEnterForeground:`，它们的使用领域略有不同：处理确实被发送到后台的应用。`applicationDidEnterBackground:`是应用应释放所有可稍后重建的资源、保存所有用户数据、关闭网络连接等的地方。如果你需要，这也是请求更多后台运行时间的地方，我们稍后会演示。如果你在`applicationDidEnterBackground:`中花费了太多时间（超过大约五秒），系统会判定你的应用行为异常并终止它。你应该实现`applicationWillEnterForeground:`来重新创建在`applicationDidEnterBackground:`中销毁的内容，例如重新加载用户数据、重新建立网络连接等。请注意，当`applicationDidEnterBackground:`被调用时，你可以安全地假设`applicationWillResignActive:`最近也被调用过。同样，当`applicationWillEnterForeground:`被调用时，你可以假设`applicationDidBecomeActive:`也很快会被调用。\n\
  \n列表中的最后一个是`applicationWillTerminate:`，你可能很少（如果有的话）会用到它。只有当你的应用已经在后台，且系统因某种原因决定跳过挂起而直接终止应用时，才会调用它。\n\
  \n### 创建状态实验室\n\n现在你已经对应用状态转换有了基本的理论理解，让我们通过一个简单的应用来测试这些知识。该应用所做的只是在每次调用这些方法时向 Xcode\
  \ 的控制台日志写一条消息。然后，我们将像用户一样以多种方式操作运行中的应用，观察发生了哪些转换。要充分利用这个示例，你需要一台 iOS 设备。如果没有，你可以使用模拟器并跳过需要设备的部分。\n\
  \n在 Xcode 中，基于 Single View Application 模板创建一个新项目，并将其命名为`State Lab`。至少最初，这个应用除了默认的灰色屏幕外什么都不显示。稍后，我们会让它做更有趣的事情，但目前，它生成的所有输出都将进入\
  \ Xcode 控制台。`AppDelegate.m`文件已经包含了我们感兴趣的所有方法。我们只需要添加一些日志记录，如下所示（以粗体显示）。注意，为了简洁起见，我们还删除了这些方法中的注释：\n\
  \n```objc\n#import \"AppDelegate.h\"\n#import \"ViewController.h\"\n\n@implementation\
  \ AppDelegate\n\n- (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n{\n    NSLog(@\"%@\", NSStringFromSelector(_cmd));\n    return\
  \ YES;\n}\n```\n\n\n\n```\n- (void)applicationWillResignActive:(UIApplication *)application\n\
  {\n    NSLog(@\"%@\", NSStringFromSelector(_cmd));\n}\n\n- (void)applicationDidEnterBackground:(UIApplication\
  \ *)application\n{\n    NSLog(@\"%@\", NSStringFromSelector(_cmd));\n}\n\n- (void)applicationWillEnterForeground:(UIApplication\
  \ *)application\n{\n    NSLog(@\"%@\", NSStringFromSelector(_cmd));\n}\n\n- (void)applicationDidBecomeActive:(UIApplication\
  \ *)application\n{\n    NSLog(@\"%@\", NSStringFromSelector(_cmd));\n}\n\n- (void)applicationWillTerminate:(UIApplication\
  \ *)application\n{\n    NSLog(@\"%@\", NSStringFromSelector(_cmd)); \n}\n\n@end\n\
  ```\n\n你可能会好奇我们在所有这些方法中使用的那个`NSLog`调用。Objective-C 提供了一个便捷的内置变量 `_cmd`，它始终包含当前方法的\
  \ selector。**selector**，如果需要回顾一下，就是 Objective-C 中引用方法的方式。`NSStringFromSelector`\
  \ 函数返回给定 selector 的 `NSString` 表示形式。我们在这里的使用方式，只是提供了一种快捷方式来输出当前方法名，而无需重新输入或复制粘贴它。\n\
  \n### 探索执行状态\n\n现在构建并运行应用。模拟器会启动并运行我们的应用程序。切换回 Xcode 并查看控制台（**视图** → **调试区域** →\
  \ **激活控制台**），你应该会看到类似这样的内容：\n\n```\n2014-06-26 19:12:36.953 State Lab[12751:70b]\
  \ application:didFinishLaunchingWith\nOptions:\n2014-06-26 19:12:36.957 State Lab[12751:70b]\
  \ applicationDidBecomeActive:\n```\n\n在这里，你可以看到应用程序已成功启动并转移到了活跃状态。现在回到模拟器并按下 Home\
  \ 按钮（你需要从模拟器的菜单中选择 **硬件** → **Home** 或按下键盘上的 ⌘**H** 来操作），你应该会在控制台中看到以下内容：\n\n```\n\
  2014-06-26 19:13:10.378 State Lab[12751:70b] applicationWillResignActive:\n2014-06-26\
  \ 19:13:10.386 State Lab[12751:70b] applicationDidEnterBackground:\n```\n\n这两行显示了应用实际上在两个状态之间转换：它首先变为非活跃状态，然后进入后台状态。你在这里看不到的是，应用还会切换到第三个状态：挂起状态。请记住，你**不会**收到任何关于此事件的通知；这完全在你的控制之外。请注意，应用在某种程度上仍然是活动的，并且\
  \ Xcode 仍然与其连接，即使它实际上并未获得任何 CPU 时间。通过点击应用的图标重新启动它来验证这一点，这应该会产生如下输出：\n\n```\n2014-06-26\
  \ 19:13:55.739 State Lab[12751:70b] applicationWillEnterForeground:\n2014-06-26\
  \ 19:13:55.739 State Lab[12751:70b] applicationDidBecomeActive:\n```\n\n你看，应用又恢复运行了。该应用之前处于挂起状态，被唤醒到非活跃状态，然后最终又变为活跃状态。那么，当应用真的被终止时会发生什么？再次点击\
  \ Home 按钮，你会看到：\n\n```\n2014-06-26 19:14:35.035 State Lab[12751:70b] applicationWillResignActive:\n\
  2014-06-26 19:14:35.036 State Lab[12751:70b] applicationDidEnterBackground:\n```\n\
  \n现在双击 Home 按钮（即按下 ⌘**HH**——你需要按两次 **H** 键）。应该会出现应用横向滚动的屏幕。在 State Lab 的截图上按住并向上滑动，直到它飞出屏幕，从而杀死应用程序。会发生什么？你可能会惊讶地发现，我们所有的\
  \ `NSLog` 调用都没有向控制台打印任何内容。相反，程序在 `main.m` 中对 `UIMainApplication` 函数的调用处挂起，并显示错误消息“Thread\
  \ 1: signal SIGKILL”。点击 Xcode 左上角的 **停止** 按钮，State Lab 就这样被真正且完全地终止了。\n\n事实证明，当系统将应用从挂起状态转移到非运行状态时，`applicationWillTerminate:`\
  \ 方法通常不会调用。当一个应用处于挂起状态时，无论系统是决定将其转储以回收内存，还是你手动强制退出它，应用都会直接消失，没有任何机会执行任何操作。`applicationWillTerminate:`\
  \ 方法仅在**被终止的应用处于后台状态**时才会被调用。例如，如果你的应用在后台状态下积极运行，以预定义的方式之一（音频播放、GPS 使用等）使用系统资源，然后被用户或系统强制退出，就可能会发生这种情况。在我们刚刚用\
  \ State Lab 探索的场景中，该应用处于挂起状态，而非后台状态，因此被立即终止，没有任何通知。\n\n**提示** 不要依赖调用 `applicationWillTerminate:`\
  \ 方法来保存应用状态——而应在 `applicationDidEnterBackground:` 方法中执行此操作。\n\n这里还有一个值得探讨的有趣交互。即当系统显示一个警示对话框时会发生什么，它会临时接管应用的输入流，并将其置于非活跃状态。这种状态只有在真机上运行时才能轻易触发（模拟器不行），方法是使用内置的“信息”应用。“信息”应用和许多其他应用一样，可以从外部接收消息，并通过多种方式显示它们。\n\
  \n要了解这些是如何设置的，请在设备上运行“设置”应用，从列表中选择“通知”，然后从应用列表中选择“信息”应用。早在 iOS 5 中就首次亮相的、火爆的“新”消息显示方式称为**横幅**。它的工作方式是在屏幕顶部显示一个覆盖的小横幅，这不需要中断当前正在运行的任何应用。我们想要展示的是古老且糟糕的“提醒”方法，它会在当前应用前面显示一个模态面板，需要用户进行操作。在**解锁时的提醒样式**标题下，选择**提醒**，这样信息应用就变回了一个\
  \ iOS 4 及更早版本的用户总是不得不面对的那种烦人的家伙。\n\n现在回到你的电脑上。在 Xcode 中，使用左上角的下拉菜单从模拟器切换到你的设备，然后点击\
  \ **运行** 按钮在设备上构建并运行应用。现在你需要做的就是从外部给你的设备发送一条消息。如果你的设备是 iPhone，你可以从另一部手机发送一条短信。如果是\
  \ iPod touch 或 iPad，你只能使用 Apple 自家的 iMessage 通信，它在所有 iOS 设备以及 OS X 的信息应用中都能使用。找出适合你设置的方式，并通过短信或\
  \ iMessage 给你的设备发送一条消息。当你的设备显示包含传入消息的系统提醒时，Xcode 控制台中会出现：\n\n```\n2014-06-26 00:04:28.295\
  \ State Lab[16571:60b] applicationWillResignActive:\n```\n\n请注意，我们的应用并没有被发送到后台。它处于非活跃状态，并且仍然可以在系统提醒后面看到。如果这个应用是一个游戏，或者正在运行任何视频、音频或动画，我们可能需要在这个时机暂停它们。\n\
  \n点击提醒上的 **关闭** 按钮，你会得到：\n\n```\n2014-06-26 00:05:23.830 State Lab[16571:60b] applicationDidBecomeActive:\n\
  ```\n\n现在，让我们看看如果你决定回复这条消息会发生什么。再向你的设备发送一条消息，生成：\n\n```\n2013-11-18 00:05:55.487\
  \ State Lab[16571:60b] applicationWillResignActive:\n```\n\n这次，点击 **回复**，这会将你切换到信息应用，你应该会看到以下一系列活动：\n\
  \n```\n2014-06-26 00:06:10.513 State Lab[16571:60b] applicationDidBecomeActive:\n\
  2014-06-26 00:06:11.137 State Lab[16571:60b] applicationWillResignActive:\n2014-06-26\
  \ 00:06:11.140 State Lab[16571:60b] applicationDidEnterBackground:\n```\n\n\n\n\
  有趣！我们的应用快速进入`Active`状态，又变为`Inactive`状态，最后进入`Background`状态（然后悄无声息地进入`Suspended`状态）。\n\
  \n#### 利用执行状态变化\n\n那么，我们该如何应对这一切呢？根据刚才演示的内容，在处理这些状态变化时，似乎遵循着一个明确的策略。\n\n**Active**\
  \ ![image](img/arrow.jpg) **Inactive**\n\n使用 `applicationWillResignActive:` / `UIApplicationWillResignActiveNotification`\
  \ 来“暂停”应用的显示。如果你的应用是游戏，你可能已经有某种方式暂停游戏进程。对于其他类型的应用，确保没有正在进行的对用户输入有严格时间要求的操作，因为你的应用将在一段时间内无法接收任何用户输入。\n\
  \n**Inactive** ![image](img/arrow.jpg) **Background**\n\n使用 `applicationDidEnterBackground:`\
  \ / `UIApplicationDidEnterBackgroundNotification` 来释放那些在应用进入后台后无需保留的资源（例如缓存的图片或其他易于重新加载的数据），或是那些在后台状态下无法维持的资源（例如活跃的网络连接）。在此处清除多余的内存占用，可以使你的应用最终的`Suspended`快照更小，从而降低应用被完全从\
  \ RAM 中清除的风险。你还应借此机会保存任何应用数据，以帮助用户在下次重新启动应用时从上次离开的地方继续。如果应用重新回到`Active`状态，这通常无关紧要；然而，如果应用被清除并需要重新启动，用户会很感激能从上一次的位置继续。\n\
  \n**Background** ![image](img/arrow.jpg) **Inactive**\n\n使用 `applicationWillEnterForeground:`\
  \ / `UIApplicationWillEnterForeground` 来撤销你在从`Inactive`切换到`Background`时所做的任何操作。例如，在此处你可以重新建立持久的网络连接。\n\
  \n**Inactive** ![image](img/arrow.jpg) **Active**\n\n使用 `applicationDidBecomeActive:`\
  \ / `UIApplicationDidBecomeActive` 来撤销你在从`Active`切换到`Inactive`时所做的任何操作。请注意，如果你的应用是游戏，这通常并不意味着直接从暂停状态跳回游戏；你应该让用户自行决定何时继续。还要记住，当应用刚启动时也会调用此方法和通知，因此你在此处所做的任何操作也必须在该上下文中正常工作。\n\
  \n对于 **Inactive** ![image](img/arrow.jpg) **Background** 的转换有一个特殊考量。它不仅在上面的列表中有最长的描述，而且很可能也是应用中代码和时间最密集的转换，因为你可能希望应用进行大量的记录工作。当此转换正在进行时，系统不会给予你无限的时间来保存更改。它只给你大约五秒钟的时间。如果你的应用从委托方法返回（以及处理你注册的任何通知）所需时间超过此限制，那么你的应用将被立即从内存中清除并进入“未运行”状态！如果这看起来不公平，别担心，因为有补救措施。在处理该委托方法或通知时，你可以请求系统在后台队列中为你执行一些额外的工作，这可以为你争取一些额外时间。我们将在下一节演示该技术。\n\
  \n#### 处理 Inactive 状态\n\n你的应用最可能遇到的状态变化是从`Active`到`Inactive`，然后再回到`Active`。你可能还记得，当你的\
  \ iPhone 在应用运行期间收到一条短信并显示给用户时，就会发生这种情况。在本节中，我们将让 State Lab 做一些视觉上有趣的事情，这样你就能看到如果你忽略该状态变化会发生什么。接下来，我们将向你展示如何修复它。\n\
  \n我们还将向显示界面添加一个`UILabel`，并使用 Core Animation 使其移动，这是一种在 iOS 中实现对象动画的非常好的方式。\n\n首先，在`ViewController.m`中添加一个`UILabel`作为实例变量和属性：\n\
  \n```objc\n#import \"ViewController.h\"\n\n@interface ViewController ()\n\n@property\
  \ (strong, nonatomic) UILabel *label;\n\n@end\n```\n\n现在，让我们在视图加载时设置标签。将此处显示的粗体行添加到`viewDidLoad`方法中：\n\
  \n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
  \ setup after loading the view, typically from a nib.\n    CGRect bounds = self.view.bounds;\n\
  \    CGRect labelFrame = CGRectMake(bounds.origin.x, CGRectGetMidY(bounds) - 50,\n\
  \                                   bounds.size.width, 100);\n    self.label = [[UILabel\
  \ alloc] initWithFrame:labelFrame];\n    self.label.font = [UIFont fontWithName:@\"\
  Helvetica\" size:70];\n    self.label.text = @\"Bazinga!\";\n    self.label.textAlignment\
  \ = NSTextAlignmentCenter;\n    self.label.backgroundColor = [UIColor clearColor];\n\
  \    [self.view addSubview:self.label];\n}\n```\n\n是时候设置一些动画了。我们将定义两个方法：一个用于将标签旋转到倒置位置，另一个用于将其旋转回正常位置：\n\
  \n```objc\n- (void)rotateLabelDown\n{\n    [UIView animateWithDuration:0.5\n   \
  \         animations:^{\n                self.label.transform = CGAffineTransformMakeRotation(M_PI);\n\
  \            }\n            completion:^(BOOL finished){\n                [self\
  \ rotateLabelUp];\n            }];\n}\n\n- (void)rotateLabelUp\n{\n    [UIView animateWithDuration:0.5\n\
  \            animations:^{\n                self.label.transform = CGAffineTransformMakeRotation(0);\n\
  \            }\n            completion:^(BOOL finished){ \n                [self\
  \ rotateLabelDown];\n            }];\n}\n```\n\n这里需要稍作解释。`UIView`定义了一个名为`animateWithDuration:animations:completion:`的类方法，用于设置动画。我们在动画块中设置的任何可动画属性都不会立即对接收者产生效果。相反，Core\
  \ Animation 会平滑地将该属性从其当前值过渡到我们指定的新值。这就是所谓的**隐式动画**，它是 Core Animation 的主要特性之一。最后的完成块让我们可以指定动画完成后会发生什么。请仔细注意这个块的语法：\n\
  \n```objc\ncompletion:^(BOOL finished){\n         [self rotateLabelDown];\n}];\n\
  ```\n\n粗体代码是块的签名——它表明该块被调用时带有一个布尔参数，并且不返回任何内容。如果动画正常完成，参数值为`true`；如果动画被取消，则为`false`。在这个例子中，我们没有使用这个参数。\n\
  \n因此，每个方法都将标签的`transform`属性设置为特定的旋转角度（以弧度为单位），并使用完成块来调用另一个方法，这样文本就会永远来回动画。\n\n最后，我们需要设置一种启动动画的方式。目前，我们通过在`viewDidLoad`末尾添加以下行来实现：\n\
  \n```objc\n    [self rotateLabelDown];\n```\n\n现在，构建并运行应用。你应该会看到*Bazinga!*标签来回旋转（见图\
  \ 15-4）。\n\n![9781484202005_Fig15-04.jpg](img/9781484202005_Fig15-04.jpg)\n\n图 15-4.\
  \ State Lab 应用展示其标签旋转魔法\n\n要测试 **Active** ![image](img/arrow.jpg) **Inactive** 的转换，你确实需要再次在实际的\
  \ iPhone 上运行此应用，并从其他地方向其发送一条短信。不幸的是，在苹果迄今为止发布的任何版本的 iOS 模拟器中都无法模拟这种行为。如果你还无法在设备上构建和安装，或者没有\
  \ iPhone，你将无法亲自尝试。在这种情况下，请尽可能跟上我们的讲解！\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵守您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n在 iPhone 上构建并运行该应用，你会看到动画正在运行。现在向设备发送一条短信。当系统弹出提示显示消息时，你会看到动画仍在继续运行！这也许有点滑稽，但对用户来说可能很烦人。我们将使用应用状态转换通知来在这种情况下停止动画。\n\
  \n我们的控制器类需要一些内部状态来跟踪在任何给定时间是否应该执行动画。为此，我们在 `ViewController.m` 中添加一个 ivar。因为这个简单的\
  \ `BOOL` 不需要被任何外部类访问，所以我们跳过头文件，将其添加到 `@implementation` 部分：\n\n```\n@implementation\
  \ ViewController {\n    BOOL animate;\n}\n```\n\n如你所见，应用状态的变化会通知给应用委托，但由于我们的类不是应用委托，我们不能仅仅实现委托方法并期望它们起作用。相反，我们注册以接收应用在其执行状态发生变化时的通知。通过在\
  \ `ViewController.m` 的 `viewDidLoad` 方法末尾添加以下代码来实现：\n\n```\n  NSNotificationCenter\
  \ *center = [NSNotificationCenter defaultCenter];\n  [center addObserver:self\n\
  \          selector:@selector(applicationWillResignActive)\n              name:UIApplicationWillResignActiveNotification\n\
  \            object:nil];\n  [center addObserver:self\n          selector:@selector(applicationDidBecomeActive)\n\
  \              name:UIApplicationDidBecomeActiveNotification\n            object:nil];\n\
  ```\n\n这设置好了这两个通知，因此每个通知都将在适当的时候调用我们类中的一个方法。在 `@implementation` 块内任意位置定义这些方法：\n\n\
  ```\n- (void)applicationWillResignActive\n{\n    NSLog(@\"VC: %@\", NSStringFromSelector(_cmd));\n\
  \    animate = NO;\n}\n\n- (void)applicationDidBecomeActive\n{\n    NSLog(@\"VC:\
  \ %@\", NSStringFromSelector(_cmd));\n    animate = YES;\n    [self rotateLabelDown];\n\
  }\n```\n\n这段代码包含了和之前一样的方法日志记录，这样你就可以在 Xcode 控制台中看到这些方法发生的位置。我们添加了前缀 `\"VC: \"` 以区分此调用与委托中的\
  \ `NSLog()` 调用（`VC` 代表视图控制器）。第一个方法只是关闭 `animate` 标志。第二个方法重新打开该标志，然后实际再次启动动画。为了让第一个方法生效，我们需要添加一些代码来检查\
  \ `animate` 标志，并且仅当其启用时才继续执行动画：\n\n```\n- (void)rotateLabelUp\n{\n    [UIView animateWithDuration:0.5\n\
  \            animations:^{\n                self.label.transform = CGAffineTransformMakeRotation(0);\n\
  \            }\n            completion:^(BOOL finished){\n                if (animate)\
  \ {\n                    [self rotateLabelDown];\n                }\n          \
  \  }];\n}\n```\n\n我们将其添加到 `rotateLabelUp` 的完成块（且仅在此处），这样只有当文本朝上时，动画才会停止。\n\n最后，既然我们现在在应用变为活跃状态时（这发生在启动后立即）启动动画，我们不再需要在\
  \ `viewDidLoad` 中调用 `rotateLabelDown`，所以删除它：\n\n```\n- (void)viewDidLoad {\n   \
  \ [self rotateLabelDown];\n\nNSNotificationCenter *center = [NSNotificationCenter\
  \ defaultCenter];\n}\n```\n\n现在再次构建并运行该应用，你会看到它像以前一样执行动画。再次向你的 iPhone 发送一条短信。这次，当系统提示出现时，你会看到背景中的动画在文本朝上时立即停止。点击**关闭**按钮，动画重新开始。\n\
  \n现在你已经了解了在从活跃状态切换到非活跃状态再切换回来的简单情况下该怎么做。更大的任务，或许也是更重要的任务，是处理切换到后台然后再切换回前台的情况。\n\n\
  ### 处理后台状态\n\n如前所述，切换到后台状态对于确保最佳用户体验非常重要。这是你需要释放任何可以轻松重新获取（或者当你的应用静默时无论如何都会丢失的）资源，并保存有关应用当前状态信息的地方，同时所有这些操作都不能占用主线程超过五秒钟。\n\
  \n为了演示这些行为中的一部分，我们将以几种方式扩展 State Lab。首先，我们将在显示中添加一张图片，以便稍后展示如何移除内存中的图片。然后，我们将展示如何保存应用状态的一些信息，以便之后可以轻松恢复。最后，我们将展示如何通过将所有工作放入后台队列来确保这些活动不会占用太多主线程时间。\n\
  \n#### 进入后台时移除资源\n\n首先，将书籍源码归档中的 `15 – Image` 文件夹中的 `smiley.png` 添加到你的项目的 `State\
  \ Lab` 文件夹中。确保选中告知 Xcode 将文件复制到项目目录的复选框。不要将其添加到 `Images.xcassets` 资源目录中，因为那将提供自动缓存，这会干扰我们将要实现的具体资源管理。\n\
  \n现在，让我们在 `ViewController.m` 中为图片和图片视图添加属性：\n\n```\n@interface ViewController ()\n\
  \n@property (strong, nonatomic) UILabel *label;\n@property (strong, nonatomic) UIImage\
  \ *smiley;\n@property (strong, nonatomic) UIImageView *smileyView;\n\n@end\n```\n\
  \n接下来，设置图片视图并将其放置在屏幕上，修改 `viewDidLoad` 方法，如下所示：\n\n```\n- (void)viewDidLoad\n{\n\
  \    [super viewDidLoad];\n    // 从 nib 加载视图后进行任何额外的设置。\n    CGRect bounds = self.view.bounds;\n\
  \    CGRect labelFrame = CGRectMake(bounds.origin.x, CGRectGetMidY(bounds) - 50,\n\
  \                                   bounds.size.width, 100);\n    self.label = [[UILabel\
  \ alloc] initWithFrame:labelFrame];\n    self.label.font = [UIFont fontWithName:@\"\
  Helvetica\" size:70];\n    self.label.text = @\"Bazinga!\";\n    self.label.textAlignment\
  \ = NSTextAlignmentCenter;\n    self.label.backgroundColor = [UIColor clearColor];\n\
  \n// smiley.png 尺寸为 84 x 84\n    CGRect smileyFrame = CGRectMake(CGRectGetMidX(bounds)\
  \ - 42,\n                                    CGRectGetMidY(bounds)/2 - 42,\n   \
  \                                 84, 84);\n    self.smileyView = [[UIImageView\
  \ alloc] initWithFrame:smileyFrame];\n    self.smileyView.contentMode = UIViewContentModeCenter;\n\
  \    NSString *smileyPath = [[NSBundle mainBundle] pathForResource:@\"smiley\"\n\
  \                                                           ofType:@\"png\"];\n\
  \    self.smiley = [UIImage imageWithContentsOfFile:smileyPath];\n    self.smileyView.image\
  \ = self.smiley;\n\n[self.view addSubview:self.smileyView];\n\n[self.view addSubview:self.label];\n\
  \nNSNotificationCenter *center = [NSNotificationCenter defaultCenter];\n    [center\
  \ addObserver:self\n               selector:@selector(applicationWillResignActive)\n\
  \                   name:UIApplicationWillResignActiveNotification\n           \
  \      object:nil];\n    [center addObserver:self\n               selector:@selector(applicationDidBecomeActive)\n\
  \                   name:UIApplicationDidBecomeActiveNotification\n            \
  \     object:nil];\n}\n```\n\n构建并运行该应用，你将在屏幕顶部看到一个看起来非常开心的笑脸（请参见图 15-5）。\n\n![9781484202005_Fig15-05.jpg](img/9781484202005_Fig15-05.jpg)\n\
  \n图 15-5. State Lab 应用在标签旋转动画的基础上添加了笑脸图标\n\n\n\n接下来，按下主屏幕按钮将应用切换到后台，然后点击它的图标重新启动。你会看到当应用恢复时，标签会像预期一样重新开始旋转。一切看似正常，但实际上，我们还没有尽可能优化系统资源的使用。\n\
  \n请记住，在应用处于挂起状态时，我们使用的资源越少，iOS 完全终止应用的风险就越低。通过适时清除内存中易于重新创建的资源，我们增加了应用留存的可能性，从而使其能极快地重新启动。\n\
  \n我们来考虑一下那个笑脸表情的处理。我们希望在进入后台状态时释放该图像，并在从后台状态返回时重新创建它。为此，我们需要在 `viewDidLoad:` 中添加另外两个通知注册：\n\
  \n```\n[center addObserver:self\n           selector:@selector(applicationDidEnterBackground)\n\
                 name:UIApplicationDidEnterBackgroundNotification\n             object:nil];\n\
  [center addObserver:self\n           selector:@selector(applicationWillEnterForeground)\n\
                 name:UIApplicationWillEnterForegroundNotification\n             object:nil];\n\
  ```\n\n并且我们需要实现这两个新方法：\n\n```\n- (void)applicationDidEnterBackground\n{\n    NSLog(@\"\
  VC: %@\", NSStringFromSelector(_cmd));\n    self.smiley = nil;\n    self.smileyView.image\
  \ = nil;\n}\n\n- (void)applicationWillEnterForeground\n{\n    NSLog(@\"VC: %@\"\
  , NSStringFromSelector(_cmd));\n    NSString *smileyPath = [[NSBundle mainBundle]\
  \ pathForResource:@\"smiley\"\n                                                          \
  \ ofType:@\"png\"];\n    self.smiley = [UIImage imageWithContentsOfFile:smileyPath];\n\
      self.smileyView.image = self.smiley;\n}\n```\n\n构建并运行应用，重复将应用置于后台再切换回来的步骤。你应该会看到，从用户的角度来看，行为几乎没有变化。如果你想亲自验证这确实在发生，可以将\
  \ `applicationWillEnterForeground` 方法的内容注释掉，然后再次构建并运行应用。你会看到图像确实消失了。\n\n#### 进入后台时保存状态\n\
  \n现在你已经看到了一个在进入后台状态时释放某些资源的例子，是时候考虑保存状态了。请记住，思路是保存与用户当前操作相关的信息，这样如果你的应用后来被从内存中清除，用户下次返回时仍然可以从他们离开的地方继续。\n\
  \n我们这里讨论的状态实际上是应用级别的，而不是视图级别的。不要将其与保存和恢复视图位置或用户最后一次活跃时正在查看的哪个应用屏幕混淆——对于后者，iOS 提供了状态保存和恢复机制，你可以在苹果网站上的\
  \ *iOS App Programming Guide*（*[`developer.apple.com/library/ios/documentation/iphone/conceptual/iphoneosprogrammingguide/StatePreservation/StatePreservation.html`](https://developer.apple.com/library/ios/documentation/iphone/conceptual/iphoneosprogrammingguide/StatePreservation/StatePreservation.html)*）中阅读相关内容。在这里，我们考虑的是那些你不想为其实现单独设置包的应用中的用户偏好。使用我们在第\
  \ 12 章中介绍的相同 `NSUserDefaults` API，你可以快速轻松地从应用内部保存偏好设置，并在稍后读取它们。当然，如果你的应用在视觉上不复杂，或者你不想使用状态保存和恢复机制，你也可以将允许你在用户偏好中恢复其视觉状态的信息保存下来。\n\
  \nState Lab 示例过于简单，没有真实的用户偏好，所以让我们走个捷径，在其唯一的视图控制器中添加一些应用特定状态。在 *ViewController.m*\
  \ 中添加一个名为 `index` 的属性，以及一个分段控件：\n\n```\n#import \"ViewController.h\"\n\n@interface\
  \ ViewController ()\n\n@property (strong, nonatomic) UILabel *label;\n@property\
  \ (strong, nonatomic) UIImage *smiley;\n@property (strong, nonatomic) UIImageView\
  \ *smileyView;\n@property (assign, nonatomic) NSInteger index;\n@property (strong,\
  \ nonatomic) UISegmentedControl *segmentedControl;\n\n@end\n```\n\n我们将允许用户通过分段控件设置此属性的值，并将其保存到用户默认设置中。然后我们将终止并重新启动应用，以演示我们可以恢复该属性的值。\n\
  \n接下来，转到 `viewDidLoad` 方法的中间部分，在这里创建分段控件，并将其添加到视图中：\n\n```\n.\n.\n.\n    self.smileyView.image\
  \ = self.smiley;\n\nself.segmentedControl = [[UISegmentedControl alloc] initWithItems:\n\
                               [NSArray arrayWithObjects: @\"One\", @\"Two\", @\"\
  Three\", @\"Four\", nil]] ;\n    self.segmentedControl.frame = CGRectMake(bounds.origin.x\
  \ + 20,\n                                              50, bounds.size.width - 40,\
  \ 30);\n        [self.segmentedControl addTarget:self action:@selector(selectionChanged:)\
  \ forControlEvents:UIControlEventValueChanged];\n\n[self.view addSubview:self.segmentedControl];\n\
      [self.view addSubview:self.smileyView];\n    [self.view addSubview:self.label];\n\
  .\n```\n\n我们还使用了 `addTarget:action:forControlEvents:` 方法将分段控件连接到 `selectionChanged:`\
  \ 方法，当所选分段发生变化时需要调用该方法。在 *ViewController.m* 文件的任意位置添加此方法的实现：\n\n```\n- (void)selectionChanged:(UISegmentedControl\
  \ *)sender {\n    self.index = sender.selectedSegmentIndex;\n}\n```\n\n现在，每当用户更改所选分段时，`index`\
  \ 属性的值都会更新。\n\n构建并运行应用。你应该能看到分段控件，并且可以点击其分段逐个选中它们。当你这样做时，`index` 属性的值会发生变化，尽管你实际上看不到这一过程。再次点击主屏幕按钮将应用置于后台，调出任务栏（双击主屏幕按钮）并终止应用，然后重新启动它。当应用重新启动时，`index`\
  \ 属性的值将再次为 0，并且将没有选中的分段。这就是我们接下来需要修复的问题。\n\n保存 `index` 属性的值非常简单；我们只需要在 *ViewController.m*\
  \ 的 `applicationDidEnterBackground` 方法末尾添加一行代码即可：\n\n```\n- (void)applicationDidEnterBackground\n\
  {\n    NSLog(@\"VC: %@\", NSStringFromSelector(_cmd));\n    self.smiley = nil;\n\
      self.smileyView.image = nil;\n    [[NSUserDefaults standardUserDefaults] setInteger:self.index\
  \ forKey:@\"index\"];\n}\n```\n\n但是我们应该在哪里恢复属性值并用它来配置分段控件呢？这个方法的逆方法 `applicationWillEnterForeground`\
  \ 并不是我们想要的。当该方法被调用时，应用已经运行，设置仍然完好。相反，我们需要在新启动后进行设置时访问此值，这让我们回到了 `viewDidLoad` 方法。将此处显示的粗体行添加到该方法中：\n\
  \n```\n.\n    [self.view addSubview:self.label];\n\nself.index = [[NSUserDefaults\
  \ standardUserDefaults] integerForKey:@\"index\"];\n    self.segmentedControl.selectedSegmentIndex\
  \ = self.index;\n.\n```\n\n\n\n当应用程序首次启动时，用户默认设置中不会保存任何值。在这种情况下，`integerForKey:`\
  \ 方法返回值零，而这恰好是 `index` 属性的正确初始值。如果您想使用不同的初始值，可以通过将其注册为 `index` 键的默认值来实现，如第 12 章中的“注册默认值”所述。\n\
  \n现在构建并运行应用程序。您会立即注意到一个差异——分段控件中的第一个分段被预选中，因为其选中分段索引已在 `viewDidLoad` 方法中设置。然后触摸一个分段，接着执行完整的后台杀死-重启操作。您会发现——索引值已恢复，因此分段控件中的正确分段现在被选中！\n\
  \n显然，我们在此展示的内容非常基础，但这一概念可以扩展到各种应用程序状态。由您决定将这个概念应用到何种程度，以便为用户维持一种假象——您的应用始终存在，只等他们回来！\n\
  \n#### 请求更多后台时间\n\n之前，我们提到如果进入后台状态花费过多时间，应用可能会从内存中被转储。例如，您的应用可能正在进行文件传输，中途中断确实可惜；然而，试图劫持\
  \ `applicationDidEnterBackground` 方法，让它在应用真正进入后台之前完成工作，并非明智之举。相反，您应该将 `applicationDidEnterBackground`\
  \ 用作一个平台，告诉系统您有一些额外工作要做，然后启动一个代码块来实际执行。假设系统有足够的可用 RAM 在用户执行其他操作时保持应用在内存中，系统会满足您的要求，让您的应用继续运行一段时间。\n\
  \n我们将通过一个简单的 `sleep` 调用来演示这一点，而非实际文件传输。再次，我们将使用新认识的 GCD 和块，使 `applicationDidEnterBackground`\
  \ 方法的内容在独立队列中运行。\n\n在 `ViewController.m` 中，修改 `applicationDidEnterBackground` 方法如下：\n\
  \n```objc\n- (void)applicationDidEnterBackground\n{\n    NSLog(@\"VC: %@\", NSStringFromSelector(_cmd));\n\
  \    self.smiley = nil;\n    self.smileyView.image = nil;\n    [[NSUserDefaults\
  \ standardUserDefaults] setInteger:self.index forKey:@\"index\"];\n    UIApplication\
  \ *app = [UIApplication sharedApplication];\n\n    __block UIBackgroundTaskIdentifier\
  \ taskId = [app beginBackgroundTaskWithExpirationHandler:^{\n        NSLog(@\"Background\
  \ task ran out of time and was terminated.\");\n        [app endBackgroundTask:taskId];\n\
  \    }];\n\n    if (taskId == UIBackgroundTaskInvalid) {\n        NSLog(@\"Failed\
  \ to start background task!\");\n        return;\n    }\n\n    dispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0),\n    ^{\n        NSLog(@\"Starting background task with %f seconds remaining\"\
  ,\n              app.backgroundTimeRemaining);\n        self.smiley = nil;\n   \
  \     self.smileyView.image = nil;\n\n        // simulate a lengthy (25 seconds)\
  \ procedure\n        [NSThread sleepForTimeInterval:25];\n\n        NSLog(@\"Finishing\
  \ background task with %f seconds remaining\",\n              app.backgroundTimeRemaining);\n\
  \        [app endBackgroundTask:taskId];\n    });\n}\n```\n\n让我们逐段分析这段代码。首先，我们获取共享的\
  \ `UIApplication` 实例，因为我们将在此方法中多次使用它。接下来是这段代码：\n\n```objc\nUIBackgroundTaskIdentifier\
  \ taskId\n       = [app beginBackgroundTaskWithExpirationHandler:^{\n    NSLog(@\"\
  Background task ran out of time and was terminated.\");\n    [app endBackgroundTask:taskId];\n\
  }];\n```\n\n通过调用 `beginBackgroundTaskWithExpirationHandler:`，我们基本上是在告诉系统我们需要更多时间来完成某些事情，并承诺在完成时通知它。如果系统认为我们运行时间过长并决定停止后台任务，我们作为参数提供的块可能会被调用。`beginBackgroundTaskWithExpirationHandler:`\
  \ 的调用返回一个标识符，我们将其保存在局部变量 `taskId` 中以供后续使用。该变量使用了 `__block` 限定符，以便其当前值可以从在此代码中创建的两个块中读取。如果没有此限定符，变量的值将在创建块时被过期处理程序（第一个代码块）捕获。这发生在调用\
  \ `beginBackgroundTaskWithExpirationHandler:` 方法时，而此时其返回值尚未被赋值给 `taskId`！这意味着如果过期处理程序被调用，它将向\
  \ `endBackgroundTask:` 方法传递一个未定义的值。\n\n注意我们提供的块以调用 `endBackgroundTask:` 结束，并传递了\
  \ `taskId`。这告诉系统我们已完成之前请求额外时间的工作。平衡每次对 `beginBackgroundTaskWithExpirationHandler:`\
  \ 的调用与对 `endBackgroundTask:` 的匹配调用非常重要，以便系统知道我们何时完成了工作。\n\n**注意** 根据您的计算背景，这里使用“任务”一词可能会让人联想到通常所说的“进程”，即一个正在运行的程序可能包含多个线程等。在这种情况下，请尝试抛开这种联想。此处“任务”实际上仅表示“需要完成的事情”。您在此创建的任何任务都在仍在执行的应用中运行。\n\
  \n接下来，我们这样做：\n\n```objc\nif (taskId == UIBackgroundTaskInvalid) {\n    NSLog(@\"\
  Failed to start background task!\");\n    return;\n}\n```\n\n如果之前对 `beginBackgroundTaskWithExpirationHandler:`\
  \ 的调用返回了特殊值 `UIBackgroundTaskInvalid`，这意味着系统拒绝授予我们额外时间。在这种情况下，您可以尝试执行需要完成的工作中最快的部分，并希望它能足够快地完成，以便您的应用在完成前不会被终止。这在运行不支持多任务处理的旧设备（如\
  \ iPhone 3G）上更可能成为问题。但在本例中，我们只是跳过处理。\n\n接下来是有趣的部分——实际完成工作：\n\n```objc\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0),\n^{\n    NSLog(@\"Starting background task with %f seconds remaining\",\n\
  \          app.backgroundTimeRemaining);\n    self.smiley = nil;\n    self.smileyView.image\
  \ = nil;\n\n    // simulate a lengthy (25 seconds) procedure\n    [NSThread sleepForTimeInterval:25];\n\
  \n    NSLog(@\"Finishing background task with %f seconds remaining\",\n        \
  \  app.backgroundTimeRemaining);\n    [app endBackgroundTask:taskId];\n});\n```\n\
  \n所有这些操作只是将方法原先执行的工作放入后台队列。但请注意，使用 `NSUserDefaults` 保存状态的代码没有被移入块中。这是因为无论 iOS 是否授予应用进入后台时的额外运行时间，保存状态都很重要。在块结束时，我们调用\
  \ `endBackgroundTask:` 来让系统知道我们已经完成。\n\n\n\n完成上述设置后，构建并运行应用程序，然后按主页按钮将其置于后台。观察 Xcode\
  \ 控制台以及 Xcode 窗口底部的状态栏。你会发现，这次应用保持运行状态（状态栏中不会显示 “Debugging terminated” 信息），并且 25\
  \ 秒后，你会在输出中看到最终日志。至此，应用的完整运行过程应输出类似以下内容的控制台信息：\n\n```\n2014-06-27 01:30:08.194 State\
  \ Lab[12158:70b] application:didFinishLaunchingWith\nOptions:\n2014-06-27 01:30:08.209\
  \ State Lab[12158:70b] applicationDidBecomeActive:\n2014-06-27 01:30:08.210 State\
  \ Lab[12158:70b] VC: applicationDidBecomeActive\n2014-06-27 01:30:17.010 State Lab[12158:70b]\
  \ applicationWillResignActive:\n2014-06-27 01:30:17.011 State Lab[12158:70b] VC:\
  \ applicationWillResignActive\n2014-06-27 01:30:17.018 State Lab[12158:70b] applicationDidEnterBackground:\n\
  2014-06-27 01:30:17.019 State Lab[12158:70b] VC: applicationDidEnterBackground\n\
  2014-06-27 01:30:17.021 State Lab[12158:3a03] Starting background task with\n179.988868\
  \ seconds remaining\n2014-06-27 01:30:42.027 State Lab[12158:3a03] Finishing background\
  \ task with\n154.986797 seconds remaining\n```\n\n如你所见，系统在后台执行任务时，给予的时间比在主线程中要宽裕得多。如果你有任何待处理的任务需要完成，遵循这一流程确实能帮上大忙。\n\
  \n请注意，我们只使用了一个后台任务标识符；但在实际应用中，你可以根据需要任意使用多个。例如，如果在后台时有多个网络传输任务需要完成，你可以为每个任务创建一个后台任务，并让它们在后台队列中继续运行。这样一来，你就可以在可用时间内轻松让多个操作并行执行。另外需要注意的是，每个后台任务的任务标识符是一个普通的\
  \ C 语言值（而非对象）。除了存储在局部 `__block` 变量中，如果更符合你的类设计，也可以将其存储为实例变量。\n\n## Grand Central\
  \ Dispatch，到此结束\n\n这一章节内容相当厚重，向你抛出了许多新概念。你不仅学到了苹果为 C 语言添加的一套全新特性集合，还发现了一种处理并发问题而无需担心线程的新概念范式。我们还演示了一些确保你的应用在\
  \ iOS 多任务环境下良好运行的技巧。既然我们已经解决了这些繁重的内容，让我们继续进入下一章，专注于绘图。拿出铅笔，开始画画吧！\n\n# 第 16 章：使用\
  \ Core Graphics 绘图\n\n到目前为止，我们构建的每个应用都是由 UIKit 框架中的视图和控件构成的。你可以用 UIKit 做很多事情，而且大量应用仅使用其预定义对象就能构建完成。然而，有些视觉元素如果不超越\
  \ UIKit 标准组件的功能，是无法完全实现的。\n\n例如，有时应用需要能够进行自定义绘图。幸运的是，iOS 包含了 Core Graphics 框架，它允许我们完成大量的绘图任务。在本章中，我们将探索这个强大的图形环境。我们还将构建示例应用，展示\
  \ Core Graphics 的关键特性，并解释其主要概念。\n\n## 绘制世界\n\nCore Graphics 的主要组件之一是一组名为 **Quartz\
  \ 2D** 的 API。这是一组函数、数据类型和对象的集合，旨在让你直接在视图或内存中的图像上进行绘制。Quartz 2D 将正在绘制的视图或图像视为一个虚拟画布。它遵循所谓的**画家模型**，这只是一个花哨的说法，用来描述绘图命令的应用方式与油漆涂在画布上的方式非常相似。\n\
  \n如果画家将整块画布涂成红色，然后将画布的下半部分涂成蓝色，那么画布将变成一半红色、一半蓝色或紫色（如果油漆不透明则为蓝色；如果油漆半透明则为紫色）。Quartz\
  \ 2D 的虚拟画布也是同样的工作原理。如果你将整个视图涂成红色，然后将视图的下半部分涂成蓝色，你将得到一个一半红色、一半蓝色或紫色的视图，具体颜色取决于第二次绘图操作是完全不透明还是部分透明。每次绘图操作都会应用在画布上所有先前绘图操作之上。\n\
  \nQuartz 2D 提供了多种线条、形状和图像绘制函数。虽然易于使用，但 Quartz 2D 仅限于二维绘图。\n\n现在你已经对 Quartz 2D 有了大致的了解，让我们来试一试。我们将从\
  \ Quartz 2D 的基本工作原理开始，然后用它构建一个简单的绘图应用。\n\n### Quartz 2D 的绘图方法\n\n使用 Quartz 2D（简称\
  \ Quartz）时，你通常会将绘图代码添加到执行绘图的视图中。例如，你可以创建一个 `UIView` 的子类，并在该类的 `drawRect:` 方法中添加\
  \ Quartz 函数调用。`drawRect:` 方法是 `UIView` 类定义的一部分，每当视图需要重绘自身时就会被调用。如果你将 Quartz 代码插入到\
  \ `drawRect:` 中，这些代码就会被执行，然后视图会重绘自身。\n\n### Quartz 2D 的图形上下文\n\n在 Quartz 中，与 Core\
  \ Graphics 的其他部分一样，绘图发生在**图形上下文**中，通常简称为**上下文**。每个视图都有一个关联的上下文。你获取当前上下文，使用该上下文进行各种\
  \ Quartz 绘图调用，然后让上下文负责将你的图形渲染到视图上。你可以将这个上下文想象成一种画布。系统为你提供了一个默认上下文，其中的内容将显示在屏幕上。但是，你也可以创建自己的上下文，用于执行不希望立即显示、而是留待以后使用或用于其他目的的绘图。我们主要关注默认上下文，你可以通过这行代码获取它：\n\
  \n```\nCGContextRef context = UIGraphicsGetCurrentContext();\n```\n\n**注意：** Core\
  \ Graphics 是一个 C 语言 API，因此你将在本章的代码示例中看到大量 C 语法。\n\n一旦定义了图形上下文，你就可以通过将该上下文传递给各种 Core\
  \ Graphics 绘图函数来在其中绘图。例如，以下序列将创建一个描述简单线条的**路径**，然后绘制该路径：\n\n```\nCGContextSetLineWidth(context,\
  \ 4.0);\nCGContextSetStrokeColorWithColor(context, [UIColor redColor].CGColor);\n\
  CGContextMoveToPoint(context, 10.0, 10.0);\nCGContextAddLineToPoint(context, 20.0,\
  \ 20.0);\nCGContextStrokePath(context);\n```\n\n第一个调用指定任何后续创建当前路径的绘图命令都应使用宽度为 4\
  \ 点的画笔。可以将其视为选择即将使用的画笔大小。在再次调用此函数并传入不同数值之前，所有线条绘制时的宽度都将为 4 点。然后，你指定描边颜色应为红色。在 Core\
  \ Graphics 中，有两种颜色与绘图操作相关联：\n\n- **描边颜色**用于绘制线条和形状的轮廓。\n- **填充颜色**用于填充形状内部。\n\n\n\
  \n上下文有一个与之关联的隐形笔，用于绘制线条。当绘制命令被执行时，这支笔的移动会形成一个路径。当你调用`CGContextMoveToPoint()`时，你会抬起这支虚拟笔，并将其移动到指定的位置，而实际上不会绘制任何内容。无论接下来的操作是什么，它都将相对于你移动笔的那个点进行绘制。例如，在前面的例子中，我们首先将笔移动到了`(10,\
  \ 10)`。紧接着的函数调用从当前笔的位置`(10, 10)`画了一条线到指定位置`(20, 20)`，而`(20, 20)`成为了新的笔位置。\n\n在 Core\
  \ Graphics 中绘图时，你不会立即画出任何实际可见的东西——至少不是立刻。你是在创建一个路径，它可以是一个形状、一条线或其他对象；然而，它不包含任何颜色或其他使其可见的特征。这就像在用隐形墨水写字。除非你做了某些操作使其可见，否则你的路径是不可见的。因此，下一步是调用`CGContextStrokePath()`函数，它告诉\
  \ Quartz 绘制你已构建好的路径。该函数会使用我们之前设置的线宽和描边颜色来实际着色（或“绘制”）路径，使其可见。\n\n### 坐标系\n\n在前面的代码片段中，我们向`CGContextMoveToPoint()`和`CGContextLineToPoint()`传递了一对浮点数作为参数。这些数字代表了\
  \ Core Graphics 坐标系中的位置。该坐标系中的位置由其`x`和`y`坐标表示，我们通常表示为`(x, y)`。上下文的左上角是`(0, 0)`。向下移动时，`y`增大。向右移动时，`x`增大。\n\
  \n在前面的代码片段中，我们从`(10, 10)`到`(20, 20)`画了一条对角线，看起来会像图 16-1 所示。\n\n![9781484202005_Fig16-01.jpg](img/9781484202005_Fig16-01.jpg)\n\
  \n图 16-1. 使用 Quartz 2D 的坐标系统绘制一条线\n\n坐标系是在 iOS 上使用 Quartz 绘图的难点之一，因为其垂直分量与许多图形库以及传统的笛卡尔坐标系（由勒内·笛卡尔在\
  \ 17 世纪提出）是相反的。在其它系统中，例如 OpenGL，甚至 OS X 版本的 Quartz，`(0, 0)`位于左下角；随着`y`坐标增加，你朝着上下文或视图的顶部移动，如图图\
  \ 16-2 所示。\n\n![9781484202005_Fig16-02.jpg](img/9781484202005_Fig16-02.jpg)\n\n\
  图 16-2. 在许多图形库（包括 OpenGL）中，从`(10, 10)`绘制到`(20, 20)`产生的线看起来应该是这样的，而不是图 16-1 中的那条线\n\
  \n为了指定坐标系中的一个点，一些 Quartz 函数需要两个浮点数作为参数。另一些 Quartz 函数则要求将点嵌入到一个`CGPoint`中，`CGPoint`是一个包含两个浮点值`x`和`y`的结构体。为了描述一个视图或其他对象的大小，Quartz\
  \ 使用`CGSize`，这是一个也包含两个浮点值`width`和`height`的结构体。Quartz 还声明了一个名为`CGRect`的数据类型，用于在坐标系中定义一个矩形。一个`CGRect`包含两个元素：一个名为`origin`的`CGPoint`，其`x`和`y`值标识矩形的左上角；以及一个名为`size`的`CGSize`，标识矩形的`width`和`height`。\n\
  \n### 指定颜色\n\n绘图的一个重要部分是颜色，因此理解颜色在 iOS 上的工作方式至关重要。UIKit 提供了一个代表颜色的 Objective-C 类：`UIColor`。你不能在\
  \ Core Graphic 调用中直接使用`UIColor`对象。然而，`UIColor`只是`CGColor`（Core Graphic 函数所需的类型）的一个封装类，你可以通过使用其`CGColor`属性从`UIColor`实例中检索到`CGColor`引用，正如我们之前在代码片段中演示的：\n\
  \n```\nCGContextSetStrokeColorWithColor(context, [UIColor redColor].CGColor);\n\
  ```\n\n我们使用了一个名为`redColor`的便捷方法创建了一个`UIColor`实例，然后检索了其`CGColor`属性并将其传递给了该函数。\n\n\
  #### 针对你 iOS 设备屏幕的一点色彩理论\n\n在现代计算机图形学中，屏幕上显示的任何颜色的数据都以某种方式基于所谓的**色彩模型**进行存储。色彩模型（有时称为**色彩空间**）仅仅是一种将现实世界中的颜色表示为计算机可以使用的数字值的方法。一种常见的表示颜色的方式是使用四个分量：红色、绿色、蓝色和透明度。在\
  \ Quartz 中，这些值中的每一个都被表示为`CGFloat`（在 32 位系统上是一个 4 字节的浮点值，在 64 位系统上是一个 8 字节的值）。这些值应始终包含\
  \ 0.0 到 1.0 之间的值。\n\n**注意** 期望值在 0.0 到 1.0 范围内的浮点值通常被称为**钳位浮点变量**，或者有时简称为**钳位**。\n\
  \n红色、绿色和蓝色分量相当容易理解，因为它们代表了**加色三原色**，或**RGB 色彩模型**（参见图 16-3）。如果你将这两种颜色的光等比例相加，其结果在人眼看来将是白色或灰色，具体取决于所混合光的强度。以不同比例组合这三种加色原色，可以得到一系列不同的颜色，称为**色域**。\n\
  \n![9781484202005_Fig16-03.jpg](img/9781484202005_Fig16-03.jpg)\n\n图 16-3. 组成 RGB\
  \ 色彩模型的加色三原色的简单表示\n\n在上小学时，你可能学过三原色是红、黄、蓝。这些被称为**历史减色原色**或**RYB 色彩模型**的原色，在现代色彩理论中应用很少，几乎从未在计算机图形学中使用过。RYB\
  \ 色彩模型的色域比 RGB 色彩模型受限得多，并且也不容易进行数学定义。尽管我们很不情愿告诉你三年级那位出色的美术老师 Smedlee 夫人是错的——嗯，在计算机图形学的语境下，她确实是错的。就我们的目的而言，三原色是红、绿、蓝，而不是红、黄、蓝。\n\
  \n除了红、绿、蓝之外，Quartz 还使用了另一种颜色分量，称为**透明度**，它表示一种颜色的透明程度。当在另一种颜色之上绘制一种颜色时，透明度被用来确定最终绘制的颜色。当透明度为`1.0`时，绘制的颜色是\
  \ 100% 不透明的，会遮挡其下方的任何颜色。当值小于`1.0`时，下方的颜色会透出来并与上方的颜色混合。如果透明度为`0.0`，那么这种颜色将完全不可见，其背后的任何东西都会完全透出来。当使用透明度分量时，颜色模型有时被称为**RGBA\
  \ 色彩模型**，但严格来说，透明度并不是颜色的一部分；它只是定义了颜色在绘制时如何与其他颜色交互。\n\n## 其他色彩模型\n\n尽管 RGB 模型在计算机图形学中最常用，但它并不是唯一的色彩模型。还有其他几种色彩模型在使用，包括以下几种：\n\
  \n\n```markdown\n\n"
- "# 色彩模型\n\n-   色相、饱和度、明度（HSV）\n-   色相、饱和度、亮度（HSL）\n-   青、品红、黄、黑（CMYK），用于四色胶印\n-\
  \   灰度\n\n更令人困惑的是，其中一些模型存在不同版本，包括`RGB`色彩空间的几种变体。\n\n幸运的是，对于大多数操作来说，我们无需担心正在使用的色彩模型。只需对`UIColor`对象调用`CGColor`即可，大多数情况下，Core\
  \ Graphics 会处理所有必要的转换。\n\n### 颜色便捷方法\n\n`UIColor`提供了大量便捷方法，这些方法返回初始化为特定颜色的`UIColor`对象。在之前的代码示例中，我们使用了`redColor`方法将颜色初始化为红色。\n\
  \n幸运的是，大多数便捷方法创建的`UIColor`实例都使用`RGBA`色彩模型。唯一的例外是表示灰度值的预定义`UIColor`——例如`blackColor`、`whiteColor`和`darkGrayColor`——它们仅根据白色级别和`alpha`定义。在本文示例中，我们未使用这些颜色，因此目前可以假设为`RGBA`。\n\
  \n如果需要对颜色进行更多控制，可以不使用基于颜色名称的便捷方法，而是通过指定所有四个分量来创建颜色。示例如下：\n\n```\nUIColor *red =\
  \ [UIColor colorWithRed:1.0 green:0.0 blue:0.0 alpha:1.0];\n```\n\n### 在上下文中绘制图像\n\
  \n`Quartz`允许您将图像直接绘制到上下文中。这是另一个`Objective-C`类（`UIImage`）的示例，您可以将其用作`Core Graphics`数据结构（`CGImage`）的替代方案。`UIImage`类包含将自身图像绘制到当前上下文中的方法。需要使用以下任一技术来标识图像在上下文中的位置：\n\
  \n-   指定`CGPoint`以标识图像左上角\n-   指定`CGRect`以框架化图像，必要时调整图像大小以适合框架\n\n可以像这样将`UIImage`绘制到当前上下文中：\n\
  \n```\nUIImage *image; // 假设此变量存在并指向一个 UIImage 实例\nCGPoint drawPoint = CGPointMake(100.0,\
  \ 100.0);\n[image drawAtPoint:drawPoint];\n```\n\n### 绘制形状：多边形、线条和曲线\n\n`Quartz`提供了许多函数来简化复杂形状的创建。要绘制矩形或多边形，无需计算角度、绘制线条或进行任何数学运算。只需调用`Quartz`函数即可完成工作。例如，要绘制椭圆，只需定义椭圆需要适配的矩形，让`Core\
  \ Graphics`完成绘制：\n\n```\nCGRect theRect = CGRectMake(0, 0, 100, 100);\nCGContextAddEllipseInRect(context,\
  \ theRect);\nCGContextDrawPath(context, kCGPathFillStroke);\n```\n\n类似的方法也可用于矩形。`Quartz`还提供了创建更复杂形状（如弧线和贝塞尔路径）的方法。\n\
  \n**注意**：在本章的示例中，我们不会处理复杂形状。要了解`Quartz`中弧线和贝塞尔路径的更多信息，请查看 iOS 开发中心的*Quartz 2D Programming\
  \ Guide*，访问地址`http://developer.apple.com/documentation/GraphicsImaging/Conceptual/drawingwithquartz2d/`或\
  \ Xcode 的在线文档。\n\n## Quartz 2D 工具示例：图案、渐变和虚线图案\n\n`Quartz`提供了相当令人印象深刻的一系列工具。例如，`Quartz`不仅支持用纯色填充多边形，还支持用渐变填充。除了绘制实线外，它还可以使用各种虚线图案。请查看\
  \ Figure 16-4 中的截图，这些截图来自 Apple 的`QuartzDemo`示例代码，了解`Quartz`为您提供的功能示例。\n\n![9781484202005_Fig16-04.jpg](img/9781484202005_Fig16-04.jpg)\n\
  \nFigure 16-4。来自 Apple 提供的`QuartzDemo`示例项目的`Quartz 2D`功能示例\n\n现在您已经对`Quartz`的工作原理及其功能有了基本了解，让我们来尝试一下。\n\
  \n## QuartzFun 应用程序\n\n我们的下一个应用程序是一个简单的绘图程序（参见 Figure 16-5）。我们将使用`Quartz`构建此应用程序，让您真正感受我们描述的概念如何整合在一起。\n\
  \n![9781484202005_Fig16-05.jpg](img/9781484202005_Fig16-05.jpg)\n\nFigure 16-5。本章正在运行中的简单绘图应用程序\n\
  \n应用程序顶部和底部各有一个带有分段控件的栏。顶部的控件用于更改绘图颜色，底部的控件用于更改要绘制的形状。触摸并拖动时，将使用选定的颜色绘制选定的形状。为了最大程度地降低应用程序的复杂性，一次只绘制一个形状。\n\
  \n### 设置 QuartzFun 应用程序\n\n在 Xcode 中，使用单视图应用程序模板创建一个新项目，并将其命名为`QuartzFun`。模板已为我们提供了应用程序委托和视图控制器。我们将在自定义视图中执行自定义绘图，因此还需要创建一个`UIView`的子类，通过重写`drawRect:`方法在其中进行绘制。\n\
  \n选择`QuartzFun`文件夹（当前包含应用程序委托和视图控制器文件的文件夹），按![image](img/flower.jpg)**N**调出新文件助手，然后从\
  \ iOS 部分选择 Cocoa Touch Class。将新类命名为`QuartzFunView`，并使其成为`UIView`的子类。\n\n我们将像之前项目中一样定义一些常量；但这一次，多个类都需要这些常量。我们将创建一个仅包含常量的头文件。\n\
  \n再次选择`QuartzFun`组，按![image](img/flower.jpg)**N**调出新文件助手。从 iOS 部分选择 Header File\
  \ 模板，并将文件命名为`Constants.h`。\n\n还有两个文件需要创建。查看 Figure 16-5，可以看到我们提供了一个选择随机颜色的选项。`UIColor`没有返回随机颜色的方法，因此我们需要编写代码来实现。我们可以将该代码放入控制器类中，但作为精明的\
  \ Objective-C 程序员，我们将其放入`UIColor`的分类中。\n\n再次选择`QuartzFun`文件夹，按![image](img/flower.jpg)**N**调出新文件助手。从\
  \ iOS 标题下选择 Objective-C File，点击 Next。提示时，将文件命名为`Random`，将文件类型设置为 Category，类设置为`UIColor`，然后点击\
  \ Next 并将文件保存到项目文件夹中。\n\n### 创建随机颜色\n\n首先处理分类。将以下几行添加到`UIColor+Random.h`中，替换文件中当前所有内容：\n\
  \n```\n#import <UIKit/UIKit.h>\n\n@interface UIColor (Random)\n+ (UIColor *)randomColor;\n\
  @end\n```\n\n现在，切换到`UIColor+Random.m`并添加以下代码：\n\n```\n#import <Foundation/Foundation.h>\n\
  #import \"UIColor+Random.h\"\n\n@implementation UIColor (Random)\n\n+ (UIColor *)randomColor\
  \ {\n    CGFloat red = (CGFloat)(arc4random() % 256)/255;\n    CGFloat blue = (CGFloat)(arc4random()\
  \ % 256)/255;\n    CGFloat green = (CGFloat)(arc4random() % 256)/255;\n    return\
  \ [UIColor colorWithRed:red green:green blue:blue alpha:1.0f];\n}\n\n@end\n```\n\
  \n```\n\n\n这非常简单。对于每个颜色分量，我们使用 `arc4random()` 函数生成一个随机浮点数。颜色的每个分量必须在 0.0 到 1.0 之间，因此我们将随机值除以\
  \ 256 后取余数，得到 0 到 255 之间的数字，然后再除以 255。为什么是 255？iOS 上的 Quartz 2D 为每个颜色分量支持 256 种不同的强度，因此使用\
  \ 255 这个数字可以确保我们有机会随机选择其中任何一种。最后，我们使用这三个随机分量创建一种新颜色。我们将 alpha 值设为 1.0，以确保所有生成的颜色都是不透明的。\n\
  \n### 定义应用程序常量\n\n接下来，我们将为用户可以使用分段控件选择的每个选项定义常量。单击 `Constants.h`，并将文件中的所有内容替换为以下代码：\n\
  \n```\ntypedef NS_ENUM(NSInteger, ShapeType) {\n  kLineShape = 0,\n  kRectShape,\n\
    kEllipseShape,\n  kImageShape\n};\n\ntypedef NS_ENUM(NSInteger, ColorTabIndex)\
  \ {\n  kRedColorTab = 0,\n  kBlueColorTab,\n  kYellowColorTab,\n  kGreenColorTab,\n\
    kRandomColorTab\n};\n```\n\n为了使代码更具可读性，我们使用 `typedef` 和 `NS_ENUM` 宏声明了两种枚举类型。一种将表示我们的应用程序中可用的形状选项；另一种将表示可用的各种颜色选项。这些常量所保存的值对应于我们将在应用程序中创建的两个分段控件的分段。\n\
  \n### 实现 QuartzFunView 骨架\n\n由于我们将在 `UIView` 的子类中进行绘制，让我们先设置好这个类所需的一切，除了实际的绘图代码（我们稍后会添加）。单击\
  \ `QuartzFunView.h`，并在顶部添加以下代码：\n\n```\n#import <UIKit/UIKit.h>\n#import \"Constants.h\"\
  \n\n@interface QuartzFunView : UIView\n\n@property (assign, nonatomic) ShapeType\
  \ shapeType;\n@property (assign, nonatomic) BOOL useRandomColor;\n@property (strong,\
  \ nonatomic) UIColor *currentColor;\n\n@end\n```\n\n首先，我们导入刚刚创建的 `Constants.h` 头文件，以便使用我们的枚举值。然后我们声明三个属性——一个\
  \ `ShapeType` 属性用于跟踪用户想要绘制的形状，一个布尔值用于跟踪用户是否请求随机颜色，以及一个 `UIColor` 属性用于跟踪当前选择的颜色。\n\
  \n切换到 `QuartzFunView.m`；我们需要对这个文件进行几项修改。首先，导入 `UIColor+Random.h` 头文件，以便我们能够生成随机颜色，在顶部附近添加这行代码，位于其他\
  \ `import` 语句下方：\n\n```\n#import \"UIColor+Random.h\"\n```\n\n接下来，我们需要创建类扩展并为其添加另外三个属性：\n\
  \n```\n#import \"UIColor+Random.h\"\n\n@interface QuartzFunView ()\n\n@property\
  \ (assign, nonatomic) CGPoint firstTouchLocation;\n@property (assign, nonatomic)\
  \ CGPoint lastTouchLocation;\n@property (strong, nonatomic) UIImage *image;\n\n\
  @end\n```\n\n前两个属性将用于跟踪用户手指在屏幕上拖动时的位置。我们将用户首次触摸屏幕的位置存储在 `firstTouchLocation` 中，并将用户手指拖动期间以及拖动结束时的位置存储在\
  \ `lastTouchLocation` 中。我们的绘图代码将使用这两个变量来确定在何处绘制请求的形状。`image` 属性保存当用户选择底部工具栏上最右侧的工具栏项时要在屏幕上绘制的图像（参见\
  \ 图 16-6）。这些属性位于类扩展中，而不是 `QuartzFunView.h` 文件中，因为它们仅供内部使用，不属于视图公共 API 的一部分。\n\n\
  ![9781484202005_Fig16-06.jpg](img/9781484202005_Fig16-06.jpg)\n\n图 16-6. 使用 QuartzFun\
  \ 绘制 UIImage\n\n现在进入实现本身。模板提供了一个名为 `initWithFrame:` 的方法，但我们不会使用它。请记住，nib 和 storyboard\
  \ 中的对象实例是作为归档对象存储的，这与我们在第 13 章中归档对象所使用的机制相同。因此，当从 nib 或 storyboard 加载对象实例时，既不会调用\
  \ `init`，也不会调用 `initWithFrame:`。相反，会使用 `initWithCoder:`，因此这是我们添加任何初始化代码的地方。在我们的例子中，我们将初始颜色值设置为红色，将\
  \ `useRandomColor` 初始化为 `NO`，并加载本章稍后将要绘制的图像文件。删除 `initWithFrame:` 现有的存根实现，并将其替换为以下方法：\n\
  \n```\n- (id)initWithCoder:(NSCoder*)coder {\n    if (self = [super initWithCoder:coder])\
  \ {\n        _currentColor = [UIColor redColor];\n        _useRandomColor = NO;\n\
          _image = [UIImage imageNamed:@\"iphone\"] ;\n    }\n    return self;\n}\n\
  ```\n\n在 `initWithCoder:` 之后，我们需要添加一些额外的方法来响应用户的触摸。在 `initWithCoder:` 之后，插入以下三个方法：\n\
  \n```\n#pragma mark - Touch Handling\n\n- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent\
  \ *)event {\n    if (self.useRandomColor) {\n        self.currentColor = [UIColor\
  \ randomColor];\n    }\n    UITouch *touch = [touches anyObject];\n    self.firstTouchLocation\
  \ = [touch locationInView:self];\n    self.lastTouchLocation = [touch locationInView:self];\n\
      [self setNeedsDisplay];\n}\n\n- (void)touchesEnded:(NSSet *)touches withEvent:(UIEvent\
  \ *)event {\n    UITouch *touch = [touches anyObject];\n    self.lastTouchLocation\
  \ = [touch locationInView:self];\n\n[self setNeedsDisplay];\n}\n\n- (void)touchesMoved:(NSSet\
  \ *)touches withEvent:(UIEvent *)event {\n    UITouch *touch = [touches anyObject];\n\
      self.lastTouchLocation = [touch locationInView:self];\n\n[self setNeedsDisplay];\n\
  }\n```\n\n这三个方法继承自 `UIView`，而 `UIView` 又继承自其父类 `UIResponder`。它们可以被重写，以找出用户触摸屏幕的位置。它们的工作原理如下：\n\
  \n*   当用户的手指首次触摸屏幕时，会调用 `touchesBegan:withEvent:`。在该方法中，如果用户使用我们之前为 `UIColor` 添加的新\
  \ `randomColor` 方法选择了随机颜色，我们就更改颜色。之后，我们存储当前位置，以便知道用户首次触摸屏幕的位置，并通过在 `self` 上调用 `setNeedsDisplay`\
  \ 来指示我们的视图需要重绘。\n*   当用户在屏幕上拖动手指时，会持续调用 `touchesMoved:withEvent:`。这里我们只做一件事：将新位置存储在\
  \ `lastTouchLocation` 中，并指示屏幕需要重绘。\n*   当用户将手指从屏幕上抬起时，会调用 `touchesEnded:withEvent:`。与\
  \ `touchesMoved:withEvent:` 方法一样，我们只做一件事：将最终位置存储在 `lastTouchLocation` 变量中，并指示视图需要重绘。\n\
  \n如果你不能完全理解这里的其余代码，请不要担心。我们将在第 18 章中详细讨论触摸处理以及 `touchesBegan:withEvent:`、`touchesMoved:withEvent:`\
  \ 和 `touchesEnded:withEvent:` 方法的具体细节。\n\n一旦我们的应用程序骨架启动并运行，我们将回到这个类。目前被注释掉的 `drawRect:`\
  \ 方法是我们将在此应用程序中完成实际工作的地方，而我们还没有编写它。让我们在添加绘图代码之前，先完成应用程序的设置。\n\n### 创建并连接 Outlets\
  \ 和 Actions\n\n在开始绘制之前，我们需要将分段控件添加到 GUI 中，然后连接操作和输出口。单击 `Main.storyboard` 来进行设置。\n\
