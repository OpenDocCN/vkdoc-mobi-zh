  \n故事板现在应该像 Figure 16-9 所示。我们的下一个任务是实现动作方法。\n\n![9781484202005_Fig16-09.jpg](img/9781484202005_Fig16-09.jpg)\n\
  \nFigure 16-9. 两个分段控件都已就位\n\n### 实现动作方法\n\n保存故事板，并随意关闭助理编辑器。现在选择`*ViewController.m*`。我们需要做的第一件事是导入常量文件，以便访问枚举值。我们还将与自定义视图交互，因此也需要导入其头文件。在文件顶部，紧靠现有`import`语句下方，添加以下代码行：\n\
  \n```\n#import \"Constants.h\"\n#import \"QuartzFunView.h\"\n```\n\n接下来，找到 Xcode\
  \ 为您创建的`changeColor:`的桩实现，并向其中添加以下代码：\n\n```\n- (IBAction)changeColor:(UISegmentedControl\
  \ *)sender {\n    QuartzFunView *funView = (QuartzFunView *)self.view;\n    ColorTabIndex\
  \ index = [sender selectedSegmentIndex];\n    switch (index) {\n        case kRedColorTab:\n\
              funView.currentColor = [UIColor redColor];\n            funView.useRandomColor\
  \ = NO;\n            break;\n        case kBlueColorTab:\n            funView.currentColor\
  \ = [UIColor blueColor];\n            funView.useRandomColor = NO;\n            break;\n\
          case kYellowColorTab:\n            funView.currentColor = [UIColor yellowColor];\n\
              funView.useRandomColor = NO;\n            break;\n        case kGreenColorTab:\n\
              funView.currentColor = [UIColor greenColor];\n            funView.useRandomColor\
  \ = NO;\n            break;\n        case kRandomColorTab:\n            funView.useRandomColor\
  \ = YES;\n            break;\n        default:\n            break;\n    }\n}\n```\n\
  \n这相当直接。我们只需查看选择了哪个分段，并根据该选择创建一个新颜色作为当前绘图颜色。之后，我们设置`currentColor`属性，以便类知道绘制时使用哪种颜色，除非已选择随机颜色。在这种情况下，我们将`useRandomColor`属性设置为`YES`，并且每次用户开始新的绘制操作时都会选择新颜色（您将在`touchesBegan:withEvent:`方法中找到此代码，我们几页前添加的。由于所有绘图代码都将在视图本身中，因此我们无需在此方法中执行其他操作。\n\
  \n接下来，找到`changeShape:`的现有实现，并向其中添加以下代码：\n\n```\n- (IBAction)changeShape:(UISegmentedControl\
  \ *)sender {\n  [(QuartzFunView *)self.view setShapeType:[sender\n                            selectedSegmentIndex]];\n\
    self.colorControl.hidden = [sender selectedSegmentIndex] == kImageShape;\n}\n\
  ```\n\n\n\n# 方法实现与绘图代码解析\n\n在此方法中，我们仅根据控件中选中的分段来设置形状类型。你还记得`ShapeType`枚举吗？该枚举的四个元素对应应用程序视图底部的四个工具栏分段。我们将形状设置为与当前选中分段相同，并根据是否选中图像分段来隐藏或显示颜色选择控件。\n\
  \n通过编译并运行应用来确保一切正常。虽然你还无法在屏幕上绘制形状，但分段控件应该能正常工作；当你在底部控件中点击图像分段时，颜色控件应该会消失。\n\n现在一切就绪，让我们开始绘制图形。\n\
  \n### 添加 Quartz 2D 绘图代码\n\n我们准备添加执行绘图的代码。我们将绘制一条线、一些形状和一张图像。我们将采用渐进式工作方式：每次添加少量代码，然后运行应用查看效果。\n\
  \n#### 绘制线条\n\n首先实现最简单的绘图选项：绘制一条线。选择`QuartzFunView.m`，将注释掉的`drawRect:`方法替换为以下代码：\n\
  \n```objc\n- (void)drawRect:(CGRect)rect {\n    CGContextRef context = UIGraphicsGetCurrentContext();\n\
  \    CGContextSetLineWidth(context, 2.0);\n    CGContextSetStrokeColorWithColor(context,\
  \ self.currentColor.CGColor);\n\n    switch (self.shapeType) {\n        case kLineShape:\n\
  \            CGContextMoveToPoint(context,\n                                 self.firstTouchLocation.x,\n\
  \                                 self.firstTouchLocation.y);\n            CGContextAddLineToPoint(context,\n\
  \                                    self.lastTouchLocation.x,\n               \
  \                     self.lastTouchLocation.y);\n            CGContextStrokePath(context);\n\
  \            break;\n        case kRectShape:\n            break;\n        case\
  \ kEllipseShape:\n            break;\n        case kImageShape:\n            break;\n\
  \        default:\n            break;\n    }\n}\n```\n\n我们首先获取当前上下文的引用，以便知道绘制的位置：\n\
  \n```objc\nCGContextRef context = UIGraphicsGetCurrentContext();\n```\n\n接下来，将线宽设置为\
  \ 2.0，这意味着我们绘制的任何线条宽度均为 2 点：\n\n```objc\nCGContextSetLineWidth(context, 2.0);\n\
  ```\n\n然后，设置用于描边的颜色。由于`UIColor`具有`CGColor`属性（正是此函数所需的类型），我们使用`currentColor`属性的该属性将正确的颜色传递给此函数。\n\
  \n```objc\nCGContextSetStrokeColorWithColor(context, self.currentColor.CGColor);\n\
  ```\n\n我们使用`switch`语句跳转到每个形状类型对应的代码。如前所述，首先处理`kLineShape`的代码，确保其正常工作，然后在后续示例中依次为每个形状添加代码：\n\
  \n```objc\nswitch (self.shapeType) {\n    case kLineShape:\n```\n\n要绘制线条，我们告诉图形上下文从用户首次触摸的位置开始创建路径。请记住，我们在`touchesBegan:withEvents:`方法中存储了该值，因此它始终反映最近触摸或拖动的起始点：\n\
  \n```objc\nCGContextMoveToPoint(context,\n                     self.firstTouchLocation.x,\n\
  \                     self.firstTouchLocation.y);\n```\n\n接着，从该点绘制一条线到用户最后触摸的位置。如果用户的手指仍与屏幕接触，`lastTouchLocation`包含手指的当前位置；如果用户已离开屏幕，`lastTouchLocation`包含手指抬起时的位置：\n\
  \n```objc\nCGContextAddLineToPoint(context,\n                        self.lastTouchLocation.x,\n\
  \                        self.lastTouchLocation.y);\n```\n\n此函数实际上并不绘制线条——它只是将线条添加到上下文的当前路径中。要使线条显示在屏幕上，我们需要描边路径。此函数将使用之前设置的颜色和宽度来描边我们刚刚绘制的线条：\n\
  \n```objc\nCGContextStrokePath(context);\n```\n\n之后，我们完成`switch`语句：\n\n```objc\n\
  \    break;\ncase kRectShape:\n    break;\ncase kEllipseShape:\n    break;\ncase\
  \ kImageShape:\n    break;\ndefault:\n    break;\n}\n```\n\n目前就这些。此时，你可以再次编译并运行应用。矩形、椭圆和形状选项尚不可用，但你应该能够使用任意颜色选项正常绘制线条（参见图\
  \ 16-10）。\n\n![9781484202005_Fig16-10.jpg](img/9781484202005_Fig16-10.jpg)\n\n图\
  \ 16-10. 应用程序的线条绘制部分现已完成。这里我们使用红色进行绘制\n\n#### 绘制矩形和椭圆\n\n由于 Quartz 以基本相同的方式实现这两种对象，我们同时编写绘制矩形和椭圆的代码。将以下粗体代码添加到现有的`drawRect:`方法中：\n\
  \n```objc\n- (void)drawRect:(CGRect)rect {\n    CGContextRef context = UIGraphicsGetCurrentContext();\n\
  \n    CGContextSetLineWidth(context, 2.0);\n    CGContextSetStrokeColorWithColor(context,\
  \ self.currentColor.CGColor);\n\n    CGContextSetFillColorWithColor(context, self.currentColor.CGColor);\n\
  \    CGRect currentRect = CGRectMake(self.firstTouchLocation.x,\n              \
  \                      self.firstTouchLocation.y,\n                            \
  \        self.lastTouchLocation.x -\n                                    self.firstTouchLocation.x,\n\
  \                                    self.lastTouchLocation.y -\n              \
  \                      self.firstTouchLocation.y);\n\n    switch (self.shapeType)\
  \ {\n        case kLineShape:\n            CGContextMoveToPoint(context,\n     \
  \                            self.firstTouchLocation.x,\n                      \
  \           self.firstTouchLocation.y);\n            CGContextAddLineToPoint(context,\n\
  \                                    self.lastTouchLocation.x,\n               \
  \                     self.lastTouchLocation.y);\n            CGContextStrokePath(context);\n\
  \            break;\n        case kRectShape:\n            CGContextAddRect(context,\
  \ currentRect);\n            CGContextDrawPath(context, kCGPathFillStroke);\n  \
  \          break;\n        case kEllipseShape:\n            CGContextAddEllipseInRect(context,\
  \ currentRect);\n            CGContextDrawPath(context, kCGPathFillStroke);\n  \
  \          break;\n        case kImageShape:\n            break;\n        default:\n\
  \            break;\n    }\n}\n```\n\n因为我们希望同时绘制椭圆和矩形的轮廓并填充其内部，所以添加一个调用，使用`currentColor`设置填充颜色：\n\
  \n```objc\nCGContextSetFillColorWithColor(context, self.currentColor.CGColor);\n\
  ```\n\n接下来，声明一个`CGRect`变量。之所以在此处声明，是因为矩形和椭圆都基于一个矩形进行绘制。我们将使用`currentRect`来保存用户拖动所描述的矩形。请记住，`CGRect`有两个成员：`size`和`origin`。名为`CGRectMake()`的函数允许我们通过指定`x`、`y`、`width`和`height`值来创建一个`CGRect`，因此我们用它来创建矩形。\n\
  \n创建矩形的代码相当直观。我们使用存储在`firstTouchLocation`中的点来创建原点。接着，通过计算两个`x`值和两个`y`值之间的差值来得出尺寸。请注意，根据拖动方向的不同，其中一个或两个尺寸值可能为负数，但这没关系。具有负尺寸的`CGRect`只会朝其原点相反的方向渲染（负宽度向左；负高度向上）。\n\
  \n\n```objectivec\nCGRect currentRect = CGRectMake(self.firstTouchLocation.x,\n\
  \                                self.firstTouchLocation.y,\n                  \
  \              self.lastTouchLocation.x -\n                                self.firstTouchLocation.x,\n\
  \                                self.lastTouchLocation.y -\n                  \
  \              self.firstTouchLocation.y);\n```\n\n一旦我们定义好这个矩形，绘制矩形或椭圆就像调用两个函数一样简单：一个用于在我们定义的\
  \ `CGRect` 中绘制矩形或椭圆，另一个用于描边和填充：\n\n```objectivec\ncase kRectShape:\n    CGContextAddRect(context,\
  \ currentRect);\n    CGContextDrawPath(context, kCGPathFillStroke);\n    break;\n\
  case kEllipseShape:\n    CGContextAddEllipseInRect(context, currentRect);\n    CGContextDrawPath(context,\
  \ kCGPathFillStroke);\n    break;\n```\n\n编译并运行你的应用程序。尝试使用矩形和椭圆工具，看看它们的表现如何。别忘了切换颜色，包括使用随机颜色。\n\
  \n### 绘制图像\n\n作为最后一项技巧，我们来绘制一张图像。*16 – Image* 文件夹中包含两张名为 *iphone.png* 和 *iphone@2x.png*\
  \ 的图像，你可以将它们添加到项目的 *Images.xcassets* 项中——创建一个名为 `iphone` 的图像集，并将这两张图像拖入其中。现在，将以下代码添加到你的\
  \ `drawRect:` 方法中：\n\n```objectivec\n- (void)drawRect:(CGRect)rect {\n    CGContextRef\
  \ context = UIGraphicsGetCurrentContext();\n\n    CGContextSetLineWidth(context,\
  \ 2.0);\n    CGContextSetStrokeColorWithColor(context, self.currentColor.CGColor);\n\
  \n    CGContextSetFillColorWithColor(context, _currentColor.CGColor);\n    CGRect\
  \ currentRect = CGRectMake(self.firstTouchLocation.x,\n                        \
  \            self.firstTouchLocation.y,\n                                    self.lastTouchLocation.x\
  \ -\n                                    self.firstTouchLocation.x,\n          \
  \                          self.lastTouchLocation.y -\n                        \
  \            self.firstTouchLocation.y);\n\n    switch (self.shapeType) {\n    \
  \    case kLineShape:\n            CGContextMoveToPoint(context,\n             \
  \                    self.firstTouchLocation.x,\n                              \
  \   self.firstTouchLocation.y);\n            CGContextAddLineToPoint(context,\n\
  \                                    self.lastTouchLocation.x,\n               \
  \                     self.lastTouchLocation.y);\n            CGContextStrokePath(context);\n\
  \            break;\n        case kRectShape:\n            CGContextAddRect(context,\
  \ currentRect);\n            CGContextDrawPath(context, kCGPathFillStroke);\n  \
  \          break;\n        case kEllipseShape:\n            CGContextAddEllipseInRect(context,\
  \ currentRect);\n            CGContextDrawPath(context, kCGPathFillStroke);\n  \
  \          break;\n        case kImageShape: {\n            CGFloat horizontalOffset\
  \ = self.image.size.width / 2;\n            CGFloat verticalOffset = self.image.size.height\
  \ / 2;\n            CGPoint drawPoint = CGPointMake(self.lastTouchLocation.x -\n\
  \                                horizontalOffset,\n                           \
  \     self.lastTouchLocation.y -\n                                verticalOffset);\n\
  \            [self.image drawAtPoint:drawPoint];\n            break;\n        }\n\
  \        default:\n            break;\n    }\n}\n```\n\n**注意** 请注意，在 `switch` 语句中，我们在\
  \ `case kImageShape:` 后面的代码周围添加了大括号。这是因为编译器对于 `case` 语句后第一行声明的变量会有问题。这些大括号是我们告诉编译器停止报错的方式。我们也可以在\
  \ `switch` 语句之前声明 `horizontalOffset`，但我们选择的方法将相关代码保持了内聚性。\n\n首先，我们计算图像的中心点，因为我们希望图像以用户最后触摸的点为中心绘制。如果不进行此调整，图像会以左上角位于用户手指位置的方式绘制，这同样是一个有效的选项。然后，我们通过从\
  \ `lastTouchLocation` 的 `x` 和 `y` 值中减去这些偏移量来创建一个新的 `CGPoint`：\n\n```objectivec\n\
  CGFloat horizontalOffset = self.image.size.width / 2;\nCGFloat verticalOffset =\
  \ self.image.size.height / 2;\nCGPoint drawPoint = CGPointMake(self.lastTouchLocation.x\
  \ -\n                                horizontalOffset,\n                       \
  \         self.lastTouchLocation.y -\n                                verticalOffset);\n\
  ```\n\n现在，我们让图像自行绘制。下面这行代码就能实现这个目的：\n\n```objectivec\n[self.image drawAtPoint:drawPoint];\n\
  ```\n\n构建并运行应用程序，从分段控件中选择“Image”，并确认你能在绘图画布上放置一张图像。\n\n### 优化 QuartzFun 应用程序\n\n\
  我们的应用已经实现了所需功能，但我们应该考虑一些优化。在我们的这个小应用中，你不会注意到速度变慢；然而，在一个运行在较慢处理器上的更复杂应用中，你可能会看到一些延迟。\n\
  \n问题出现在 *QuartzFunView.m* 中的 `touchesMoved:withEvent:` 和 `touchesEnded:withEvent:`\
  \ 方法中。这两个方法都包含这行代码：\n\n```objectivec\n[self setNeedsDisplay];\n```\n\n显然，这是我们告诉视图某些内容已更改并且需要重绘自身的方式。这段代码可以工作，但它会导致整个视图被擦除并重绘，即使只发生了一点点变化。当我们准备拖拽出一个新形状时，我们确实想要擦除屏幕，但在拖拽形状的过程中，我们并不想每秒多次清除屏幕。\n\
  \n与其在拖拽过程中强制整个视图多次重绘，我们可以改用 `setNeedsDisplayInRect:` 方法。`setNeedsDisplayInRect:`\
  \ 是一个 `UIView` 方法，它将视图区域的某个矩形部分标记为需要重新显示。通过使用此方法，我们可以只标记受到当前绘制操作影响的视图部分需要重绘，从而提高效率。\n\
  \n我们需要重绘的不仅仅是 `firstTouchLocation` 和 `lastTouchLocation` 之间的矩形，还包括当前拖拽所涉及到的屏幕的任何部分。如果用户触摸屏幕然后到处乱画，但我们只重绘\
  \ `firstTouchLocation` 和 `lastTouchLocation` 之间的部分，那么屏幕上就会留下之前重绘时画出的许多我们不想保留的内容。\n\
  \n解决方案是跟踪特定拖拽所影响的整个区域，并将其存储在一个 `CGRect` 实例变量中。在 `touchesBegan:withEvent:` 中，我们将该实例变量重置为用户触摸的点。然后，在\
  \ `touchesMoved:withEvent:` 和 `touchesEnded:withEvent:` 中，我们使用 Core Graphics 函数获取当前矩形和已存储矩形的并集，并存储生成的矩形。我们还用它来指定视图的哪部分需要重绘。这种方法为我们提供了当前拖拽所影响区域的累计总和。\n\
  \n目前，我们在 `drawRect:` 方法中计算当前矩形，用于绘制椭圆和矩形形状。我们将把这个计算移到新方法中，以便可以在所有三个地方使用它，而无需重复代码。准备好了吗？让我们开始吧。\n\
  \n在 *QuartzFunView.m* 的顶部进行以下更改：\n\n```objectivec\n@interface QuartzFunView ()\n\
  \n@property (assign, nonatomic) CGPoint firstTouchLocation;\n@property (assign,\
  \ nonatomic) CGPoint lastTouchLocation;\n@property (strong, nonatomic) UIImage *image;\n\
  @property (readonly, nonatomic) CGRect currentRect;\n@property (assign, nonatomic)\
  \ CGRect redrawRect;\n\n@end\n```\n\n\n我们声明了一个名为 `redrawRect` 的 `CGRect` 变量，用于跟踪需要重绘的区域。此外，我们还声明了一个名为\
  \ `currentRect` 的只读属性，该属性将返回我们在 `drawRect:` 中之前计算的矩形。在文件末尾，为 `currentRect` 属性添加访问器方法：\n\
  \n```\n- (CGRect)currentRect {\n    return CGRectMake (self.firstTouchLocation.x,\n\
  \                       self.firstTouchLocation.y,\n                       self.lastTouchLocation.x\
  \ - self.firstTouchLocation.x,\n                       self.lastTouchLocation.y\
  \ - self.firstTouchLocation.y);\n}\n```\n\n现在，在 `drawRect:` 方法中，将所有对 `currentRect`\
  \ 的引用改为 `self.currentRect`，以便代码使用我们刚创建的新访问器。接下来，删除我们计算 `currentRect` 的代码行：\n\n```\n\
  - (void)drawRect:(CGRect)rect {\n    CGContextRef context = UIGraphicsGetCurrentContext();\n\
  \n    CGContextSetLineWidth(context, 2.0);\n    CGContextSetStrokeColorWithColor(context,\
  \ self.currentColor.CGColor);\n\n    CGContextSetFillColorWithColor(context, self.currentColor.CGColor);\n\
  \n    CGRect currentRect = CGRectMake(self.firstTouchLocation.x,\n             \
  \                           self.firstTouchLocation.y,\n                       \
  \                 self.lastTouchLocation.x -\n                                 \
  \       self.firstTouchLocation.x,\n                                        self.lastTouchLocation.y\
  \ -\n                                        self.firstTouchLocation.y);\n\n   \
  \ switch (self.shapeType) {\n        case kLineShape:\n            CGContextMoveToPoint(context,\n\
  \                                 self.firstTouchLocation.x,\n                 \
  \                self.firstTouchLocation.y);\n            CGContextAddLineToPoint(context,\n\
  \                                    self.lastTouchLocation.x,\n               \
  \                     self.lastTouchLocation.y);\n            CGContextStrokePath(context);\n\
  \            break;\n        case kRectShape:\n            CGContextAddRect(context,\
  \ self.currentRect);\n            CGContextDrawPath(context, kCGPathFillStroke);\n\
  \            break;\n        case kEllipseShape:\n            CGContextAddEllipseInRect(context,\
  \ self.currentRect);\n            CGContextDrawPath(context, kCGPathFillStroke);\n\
  \            break;\n        case kImageShape: {\n            CGFloat horizontalOffset\
  \ = self.image.size.width / 2;\n            CGFloat verticalOffset = self.image.size.height\
  \ / 2;\n            CGPoint drawPoint = CGPointMake(self.lastTouchLocation.x -\n\
  \                                                horizontalOffset,\n           \
  \                                 self.lastTouchLocation.y -\n                 \
  \                               verticalOffset);\n            [self.image drawAtPoint:drawPoint];\n\
  \            break;\n        }\n        default:\n            break;\n    }\n}\n\
  ```\n\n我们还需要对 `touchesEnded:withEvent:` 和 `touchesMoved:withEvent:` 做一些修改。我们将重新计算当前操作影响的空间，并用它来指示只需要重绘视图的一部分。用以下新版本替换现有的\
  \ `touchesEnded:withEvent:` 和 `touchesMoved:withEvent:` 方法：\n\n```\n- (void)touchesEnded:(NSSet\
  \ *)touches withEvent:(UIEvent *)event {\n    UITouch *touch = [touches anyObject];\n\
  \    self.lastTouchLocation = [touch locationInView:self];\n\n    if (self.shapeType\
  \ == kImageShape) {\n        CGFloat horizontalOffset = self.image.size.width /\
  \ 2;\n        CGFloat verticalOffset = self.image.size.height / 2;\n        self.redrawRect\
  \ = CGRectUnion(self.redrawRect,\n                                      CGRectMake(self.lastTouchLocation.x\
  \ -\n                                                 horizontalOffset,\n      \
  \                                           self.lastTouchLocation.y -\n       \
  \                                          verticalOffset,\n                   \
  \                              self.image.size.width,\n                        \
  \                         self.image.size.height));\n    } else {\n        self.redrawRect\
  \ = CGRectUnion(self.redrawRect, self.currentRect);\n    }\n    self.redrawRect\
  \ = CGRectInset(self.redrawRect, -2.0, -2.0);\n    [self setNeedsDisplayInRect:self.redrawRect];\n\
  }\n\n- (void)touchesMoved:(NSSet *)touches withEvent:(UIEvent *)event {\n    UITouch\
  \ *touch = [touches anyObject];\n    self.lastTouchLocation = [touch locationInView:self];\n\
  \n    if (self.shapeType == kImageShape) {\n        CGFloat horizontalOffset = self.image.size.width\
  \ / 2;\n        CGFloat verticalOffset = self.image.size.height / 2;\n        self.redrawRect\
  \ = CGRectUnion(self.redrawRect,\n                                      CGRectMake(self.lastTouchLocation.x\
  \ -\n                                                 horizontalOffset,\n      \
  \                                           self.lastTouchLocation.y -\n       \
  \                                          verticalOffset,\n                   \
  \                              self.image.size.width,\n                        \
  \                         self.image.size.height));\n    } else {\n        self.redrawRect\
  \ = CGRectUnion(_redrawRect, self.currentRect);\n    }\n    [self setNeedsDisplayInRect:self.redrawRect];\n\
  }\n```\n\n另外，在 `touchesBegan:withEvent:` 方法中添加以下代码行：\n\n```\n- (void)touchesBegan:(NSSet\
  \ *)touches withEvent:(UIEvent *)event {\n    if (self.useRandomColor) {\n     \
  \   self.currentColor = [UIColor randomColor];\n    }\n    UITouch *touch = [touches\
  \ anyObject];\n    self.firstTouchLocation = [touch locationInView:self];\n    self.lastTouchLocation\
  \ = [touch locationInView:self];\n    self.redrawRect = CGRectZero;\n    [self setNeedsDisplay];\n\
  }\n```\n\n再次构建并运行应用程序以查看最终结果。你可能看不出任何区别，但通过添加少量代码行，我们减少了重绘视图所需的工作量，因为不再需要擦除和重绘当前拖动未影响的任何视图部分。像这样善待\
  \ iOS 设备宝贵的处理器周期，会对应用程序的性能产生显著影响，尤其是在应用变得复杂时。\n\n**注意** 如果你对 Quartz 2D 主题有更深入的探索兴趣，不妨阅读\
  \ Jack Nutting、Dave Wooldridge 和 David Mark 合著的 *Beginning iPad Development for\
  \ iPhone Developers: Mastering the iPad SDK*（Apress，2010 年）。这本书涵盖了许多 Quartz 2D 绘图内容。该书中的所有绘图代码和解释同样适用于\
  \ iPhone 和 iPad。\n\n## 绘图小结\n\n在本章中，我们实际上只是浅尝了 iOS 内置绘图功能的表面。现在你应该对 Quartz 2D 相当熟悉了；偶尔参考\
  \ Apple 的文档后，你大概能处理大多数遇到的绘图需求。\n\n现在是时候进一步提升你的图形技能了！第 17 章将向你介绍 iOS 7 中引入的 Sprite\
  \ Kit 框架，它能让你实现极速位图渲染，从而创建游戏或其他快速移动、交互性强的动态内容。\n\n## 第 17 章 — Sprite Kit 入门\n\n\n\
  \n# Sprite Kit 入门\n\n在 iOS 7 中，Apple 引入了`Sprite Kit`，这是一个用于高性能 2D 图形渲染的框架。这听起来有点像`Core\
  \ Graphics`和`Core Animation`，那么这里有什么新东西呢？与`Core Graphics`（专注于使用画家模型绘制图形）或`Core Animation`（专注于动画化\
  \ GUI 元素的属性）不同，`Sprite Kit`完全专注于一个不同的领域：视频游戏！`Sprite Kit`构建在`OpenGL`之上，`OpenGL`是一种存在于许多计算平台上的技术，它允许现代图形硬件以惊人的速度将图形位图写入视频缓冲区。使用`Sprite\
  \ Kit`，您可以获得`OpenGL`的出色性能特性，而无需深入`OpenGL`编码的细节。\n\n这是 Apple 在 iOS 时代首次涉足游戏编程的图形方面。它与\
  \ iOS 7 和 OS X 10.9（Mavericks）同时发布，并在两个平台上提供相同的 API，因此为一个平台编写的应用程序可以轻松移植到另一个平台。尽管\
  \ Apple 以前从未提供过像`Sprite Kit`这样的框架，但它与各种开源库（如`Cocos2D`）有明显相似之处。如果您过去使用过`Cocos2D`或类似的东西，您会感到非常熟悉。\n\
  \n`Sprite Kit`没有实现像`Core Graphics`那样的灵活、通用的绘图系统。没有用于绘制路径、渐变或用颜色填充空间的方法。相反，您得到的是一个**场景图**（类似于\
  \ UIKit 的视图层次结构）；能够变换每个图节点的位置、缩放和旋转；以及每个节点绘制自身的能力。大多数绘图发生在`SKSprite`类（或其子类之一）的实例中，该类表示一个准备放在屏幕上的单个图形图像。\n\
  \n在本章中，我们将使用`Sprite Kit`构建一个名为*TextShooter*的简单射击游戏。我们将使用文本块来构建游戏对象，而不是使用预制图形，使用专门为此目的而设计的`SKSprite`的子类。使用这种方法，您无需从项目库中提取图形或类似的东西。我们制作的应用程序外观简单，但易于修改和玩耍。\n\
  \n## 简单的开始\n\n让我们开始吧。在 Xcode 中，按![image](img/flower.jpg)**N**或选择**File ![image](img/arrow.jpg)\
  \ New ![image](img/arrow.jpg) File…**，然后从 iOS 部分选择**Game**模板。按**Next**，将项目命名为*TextShooter*，将\
  \ Devices 设置为*Universal*，将 Game Technology 设置为*SpriteKit*，然后创建项目。在这里，值得简要看看其他可用的技术选择。`OpenGL\
  \ ES`和`Metal`（后者在 iOS 8 中是新的）是低级的图形 API，它们让您几乎完全控制图形硬件，但比`Sprite Kit`更难使用。`Sprite\
  \ Kit`是一个 2D API，而`SceneKit`（也是在 iOS 8 中新增的）是一个工具包，您可以使用它来构建 3D 图形应用程序。在阅读完本章后，如果您对\
  \ 3D 游戏编程感兴趣，值得查看一下`SceneKit`文档，地址为`https://developer.apple.com/library/prerelease/ios/documentation/SceneKit/Reference/SceneKit_Framework/index.html`。\n\
  \n如果您现在运行 TextShooter 项目，您将看到默认的`Sprite Kit`应用程序，如图 17-1 所示。最初，您只会看到“Hello, World”文本。为了让事情变得稍微（只是稍微）有趣一些，触摸屏幕以添加一些旋转的宇宙飞船。在本章的过程中，我们将替换此模板中的所有内容，并逐步构建我们自己的简单应用程序。\n\
  \n![9781484202005_Fig17-01.jpg](img/9781484202005_Fig17-01.jpg)\n\n图 17-1。默认的 Sprite\
  \ Kit 应用程序在运行中。一些文本显示在屏幕中央，每次点击屏幕都会在该位置放置一个旋转的喷气式战斗机图形。\n\n现在让我们看一下 Xcode 创建的项目。您会看到它有一个相当标准的`AppDelegate`类和一个名为`GameViewController`的小视图控制器类，它对`SKView`对象进行一些初始配置。这个对象是从应用程序的故事板加载的，它将显示我们所有的`Sprite\
  \ Kit`内容。以下是`GameViewController viewDidLoad`方法中初始化`SKView`的代码：\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n\n// Configure the view.\n    SKView *skView = (SKView\
  \ *)self.view;\n    skView.showsFPS = YES;\n    skView.showsNodeCount = YES;\n \
  \   skView.ignoresSiblingOrder = YES;\n\n// Create and configure the scene.\n  \
  \  GameScene *scene = [GameScene nodeWithFileNamed:@\"GameScene\"];\n    scene.scaleMode\
  \ = SKSceneScaleModeAspectFill;\n\n// Present the scene.\n    [skView presentScene:scene];\n\
  }\n```\n\n前几行从故事板获取`SKView`实例，并配置它在游戏运行时显示一些性能特征。`Sprite Kit`应用程序被构建为一组**场景**，由`SKScene`类表示。在使用`Sprite\
  \ Kit`开发时，您可能会为应用程序的每个视觉上不同的部分创建一个新的`SKScene`子类。一个场景可以表示一个快节奏的游戏显示，屏幕上有数十个对象在动画，也可以像开始菜单一样简单。我们将在本章中看到`SKScene`的多种用法。模板生成了一个最初为空的场景，其形式是一个名为`GameScene`的类。\n\
  \n`SKView`和`SKScene`之间的关系与我们在本书中一直使用的`UIViewController`类有一些相似之处。`SKView`类的行为有点像`UINavigationController`，从某种意义上说，它就像一个空白石板，只是管理其他控制器对显示的访问。然而，在这一点上，事情开始出现分歧。与`UINavigationController`不同，由`SKView`管理的顶级对象不是`UIViewController`的子类。相反，它们是`SKScene`的子类，`SKScene`知道如何管理一个可以显示、被物理引擎作用等等的对象图。\n\
  \n`viewDidLoad`方法的下一部分创建了初始场景：\n\n```\n// Create and configure the scene.\nGameScene\
  \ *scene = [GameScene nodeWithFileNamed:@\"GameScene\"];\n```\n\n有两种方法创建场景——您可以手动分配和初始化一个实例，也可以从**Sprite\
  \ Kit 场景文件**加载一个。Xcode 模板采用了后一种方法——它生成一个名为*GameScene.sks*的`Sprite Kit`场景文件，其中包含一个`SKScene`对象的归档副本。`SKScene`，像大多数其他`Sprite\
  \ Kit`类一样，遵循我们在第 13 章中讨论的`NSCoder`协议。*GameScene.sks*文件只是一个标准归档文件，您可以使用`NSKeyedUnarchiver`和`NSKeyedArchiver`类读写它。不过，通常您会使用`SKScene\
  \ nodeWithFileNamed:`方法，它会从归档文件中加载`SKScene`，并将其初始化为调用该方法的具体子类的实例——在这种情况下，归档的`SKScene`数据用于初始化`GameScene`对象。\n\
  \n\n\n您可能想知道，模板代码为何要费心从场景文件加载一个空场景对象，而不是直接创建一个。原因在于 Xcode **Sprite Kit 关卡设计器**，它允许你设计场景，就像在\
  \ Interface Builder 中构建用户界面一样。设计好场景后，将其保存到场景文件并再次运行应用程序。这次场景当然不会是空的，你应能看到在关卡设计器中创建的设计。加载初始场景后，你可以自由地通过编程向其中添加其他元素。本章中我们将大量进行此操作。或者，如果你觉得关卡设计器不实用，也可以完全通过代码构建所有场景。\n\
  \n如果在 Project Navigator 中选择`GameScene.sks`文件，Xcode 会在关卡设计器中打开它，如图 Figure 17-2 所示。\n\
  \n![9781484202005_Fig17-02.jpg](img/9781484202005_Fig17-02.jpg)\n\nFigure 17-2.\
  \ Xcode Sprite Kit 关卡设计器，显示最初空的`GameScene`\n\n场景显示在编辑区域——目前，它只是一个灰色背景上的空黄色矩形。其右侧是\
  \ **SKNode Inspector**，可用于设置编辑器中选中的节点的属性。Sprite Kit 场景元素都是节点——`SKNode`类的实例。`SKScene`本身是`SKNode`的子类。此处选中了`SKScene`节点，因此\
  \ SKNode Inspector 显示其属性。检查器下方，右下角是通常的 Xcode Object Library，它自动过滤，仅显示可添加到 Sprite\
  \ Kit 场景的对象类型。通过将对象从此处拖放到编辑器上来设计场景。\n\n**提示** 你可能想知道，用于从场景文件加载场景的方法名为`nodeWithFileNamed:`而非`sceneWithFileNamed:`。尽管模板代码仅用此方法加载初始场景，但它实际上可以加载任何\
  \ Sprite Kit 节点，这意味着你可以将节点存档到文件，之后重新加载。事实上，你可以使用关卡设计器创建仅包含单个节点的场景，并将其保存，稍后加载到场景图中。这让你无需编写任何代码即可设计复杂节点。\n\
  \n现在让我们回到`viewDidLoad`方法的讨论上。\n\n```\nscene.scaleMode = SKSceneScaleModeAspectFill;\n\
  \n// Present the scene.\n[skView presentScene:scene];\n```\n\n这两行代码设置了场景的缩放模式并使场景可见。让我们按相反顺序讨论这两件事。要使场景及其内容可见并处于活动状态，它必须由`SKView`呈现。要呈现场景，需调用`SKView`的`presentScene:`方法。一个`SKView`一次只能显示一个场景，因此当已有已呈现场景时调用此方法会导致新场景立即替换旧场景。如果要从一个场景切换到另一个场景，最好使用`presentScene:transition:`方法，该方法会为场景切换添加动画效果。本章后面你将看到示例。在本例中，由于我们正在使初始场景可见，没有之前的内容可过渡，因此使用`presentScene:`方法是可以接受的。\n\
  \n现在我们来讨论场景的`scaleMode`属性。回顾图 Figure 17-2，你会看到关卡设计器中的默认场景宽 1024 点，高 768 点——与 iPad\
  \ 屏幕尺寸相同。如果你仅打算在 iPad 上以横向模式运行游戏，这没问题，但纵向模式或其他屏幕尺寸（如 iPhone）该怎么办？应如何使场景适应运行应用程序的屏幕尺寸？这个问题没有简单答案。当场景在`SKView`中呈现时，有四种不同方式调整其大小，对应`SKSceneScaleMode`枚举的四个值。要了解每种缩放模式的作用，让我们创建另一个\
  \ Sprite Kit 项目并进行实验。使用与之前相同的步骤，创建一个 Sprite Kit 项目，将其命名为`ResizeModes`，并在 Project\
  \ Navigator 中选择`GameScene.sks`文件。此时，你的 Xcode 窗口应如图 Figure 17-2 所示。\n\n在 Object Library\
  \ 中，找到*Label*节点并将其拖到场景中央。在 SKNode Inspector 中，使用 **Text** 字段将标签文本改为*Center*。将另一个标签拖到场景左下角，小心放置，使其恰好位于场景角落。将其`text`属性改为*Bottom\
  \ Left*。将第三个标签拖到场景右上角，将其文本改为*Top Right*。再拖几个标签到场景顶部和底部，分别命名为*Top*和*Bottom*。如有必要，可以更改与标签关联的颜色和字体，使文本更易见。完成后，场景应如图\
  \ Figure 17-3 所示。\n\n![9781484202005_Fig17-03.jpg](img/9781484202005_Fig17-03.jpg)\n\
  \nFigure 17-3. 使用 Sprite Kit 关卡设计器向场景添加节点\n\n**提示** 如果在编辑区域看不到整个场景，可以使用编辑器右下角的 -/=/+\
  \ 按钮缩小视图，直到能看到足够多的场景以便操作。\n\n在 Project Navigator 中选择`GameScene.m`并删除`didMoveToView:`方法。此方法包含向场景添加“Hello,\
  \ World”标签的代码，我们不再需要。接下来，选择`GameViewController.m`并在`viewDidLoad`方法中找到设置`SKScene`对象的`scaleMode`的代码行。如你所见，它初始设置为`SKSceneScaleModeAspectFill`。使用此缩放模式在\
  \ iPhone 模拟器（或设备）上运行应用程序，然后编辑代码，分别使用`SKSceneScaleModeAspectFit`、`SKSceneScaleModeFill`和`SKSceneScaleModeResizeFill`值再运行三次。结果如图\
  \ Figure 17-4 所示。\n\n![9781484202005_Fig17-04.jpg](img/9781484202005_Fig17-04.jpg)\n\
  \nFigure 17-4. 比较四种场景重新缩放模式\n\n这些模式的作用如下：\n\n\n\n- `SKSceneScaleModeAspectFill`\
  \ 会缩放场景，使其在保持宽高比的同时填满屏幕。如图 17-4 所示，此模式确保`SKView`的每个像素都被覆盖，但会丢失部分场景内容——在本例中，场景的左侧和右侧被裁剪。场景内容也会被缩放，因此文本比原始场景更小，但其相对于场景的位置保持不变。\n\
  - `SKSceneScaleModeAspectFit` 同样保持场景的宽高比，但确保整个场景可见。结果是出现信箱式视图，`SKView`的部分区域在场景内容的上方和下方可见。\n\
  - `SKSceneScaleModeFill` 会沿两个轴缩放场景，使其精确适配视图。这确保了场景中的所有内容都可见，但由于原始场景的宽高比未被保留，内容可能会出现不可接受的失真。此处可以看到文本被水平压缩。\n\
  - 最后，`SKSceneScaleModeResizeFill` 将场景的左下角放置在视图的左下角，并保持其原始大小。\n\n哪种缩放模式最适合您，取决于应用程序的需求。如果这些模式都不适用，还有另外两种选择。首先，您可以支持一组固定的屏幕尺寸，为每种尺寸创建独立的设计，将其存储在各自的`*.sks`文件中，并在需要时从相应文件加载场景。其次，您可以直接在代码中创建场景，使其大小与呈现它的`SKView`相同，并通过编程方式向其中添加节点。这种方法仅在您的游戏不依赖于元素精确相对位置时才有效。为了说明这种方法如何运作，我们将在\
  \ TextShooter 应用程序中使用它。\n\n## 初始场景定制\n\n打开 TextShooter 项目，选择`GameScene`类。我们不需要 Xcode\
  \ 模板生成的大部分代码，因此将其删除。首先，删除整个`didMoveToView:`方法。每当场景在`SKView`中呈现时，都会调用此方法，通常用于在场景可见之前对其进行最后的修改。接下来，移除`touchesBegan:withEvent:`方法的大部分内容，只保留其中的`for`循环及其包含的第一行代码。此时，您的`GameScene`类应如下所示（编译器会警告`location`是一个未使用的变量——无需担心，我们稍后会修复）：\n\
  \n```\n@implementation GameScene\n\n-(void)touchesBegan:(NSSet *)touches withEvent:(UIEvent\
  \ *)event {\n    /* Called when a touch begins */\n\nfor (UITouch *touch in touches)\
  \ {\n        CGPoint location = [touch locationInNode:self];\n    }\n}\n\n-(void)update:(CFTimeInterval)currentTime\
  \ {\n    /* Called before each frame is rendered */\n}\n\n@end\n```\n\n由于我们不打算从`GameScene.sks`加载场景，我们需要一个方法来创建包含初始内容的场景。我们还需要为当前游戏关卡编号、玩家拥有的生命数以及一个指示关卡是否完成的标志添加属性。将以下粗体行添加到`GameScene.h`中：\n\
  \n```\n@interface GameScene : SKScene\n\n@property (assign, nonatomic) NSUInteger\
  \ levelNumber;\n@property (assign, nonatomic) NSUInteger playerLives;\n@property\
  \ (assign, nonatomic) BOOL finished;\n\n+ (instancetype)sceneWithSize:(CGSize)size\
  \ levelNumber:(NSUInteger)levelNumber;\n- (instancetype)initWithSize:(CGSize)size\
  \ levelNumber:(NSUInteger)levelNumber;\n\n@end\n```\n\n现在切换到`GameScene.m`，我们将在其中实现刚刚声明的两个新方法。在文件的实现部分添加以下代码：\n\
  \n```\n+ (instancetype)sceneWithSize:(CGSize)size levelNumber:(NSUInteger)levelNumber\
  \ {\n    return [[self alloc] initWithSize:size levelNumber:levelNumber];\n}\n\n\
  - (instancetype)initWithSize:(CGSize)size {\n    return [self initWithSize:size\
  \ levelNumber:1];\n}\n\n- (instancetype)initWithSize:(CGSize)size levelNumber:(NSUInteger)levelNumber\
  \ {\n    if (self = [super initWithSize:size]) {\n        _levelNumber = levelNumber;\n\
  \        _playerLives = 5;\n\nself.backgroundColor = [SKColor whiteColor];\n\nSKLabelNode\
  \ *lives = [SKLabelNode labelNodeWithFontNamed:@\"Courier\"];\n        lives.fontSize\
  \ = 16;\n        lives.fontColor = [SKColor blackColor];\n        lives.name = @\"\
  LivesLabel\";\n        lives.text = [NSString stringWithFormat:@\"Lives: %lu\",\n\
  \                      (unsigned long)_playerLives];\n        lives.verticalAlignmentMode\
  \ = SKLabelVerticalAlignmentModeTop;\n        lives.horizontalAlignmentMode = SKLabelHorizontalAlignmentModeRight;\n\
  \        lives.position = CGPointMake(self.frame.size.width,\n                 \
  \                    self.frame.size.height);\n        [self addChild:lives];\n\n\
  SKLabelNode *level = [SKLabelNode labelNodeWithFontNamed:@\"Courier\"];\n      \
  \  level.fontSize = 16;\n        level.fontColor = [SKColor blackColor];\n     \
  \   level.name = @\"LevelLabel\";\n        level.text = [NSString stringWithFormat:@\"\
  Level: %lu\",\n                      (unsigned long)_levelNumber];\n        level.verticalAlignmentMode\
  \ = SKLabelVerticalAlignmentModeTop;\n        level.horizontalAlignmentMode = SKLabelHorizontalAlignmentModeLeft;\n\
  \        level.position = CGPointMake(0, self.frame.size.height);\n        [self\
  \ addChild:level];\n    }\n    return self;\n}\n```\n\n第一个方法`sceneWithSize:levelNumber:`为我们提供了一个工厂方法，它可作为同时创建关卡并设置其关卡编号的快捷方式。第二个方法`initWithSize:`覆盖了类的默认初始化器，将控制权传递给第三个方法（并传递关卡编号的默认值）。第三个方法随后调用其父类实现中的指定初始化器。这可能看起来有些迂回，但当您想为类添加新的初始化器，同时仍使用类的指定初始化器时，这是一种常见模式。\n\
  \n我们添加的第三个方法`initWithSize:levelNumber:`用于设置关卡场景的基本配置。首先，我们根据传入的参数设置几个实例变量的值。其次，我们设置场景的背景颜色。注意，这里我们使用的是名为`SKColor`的类，而不是`UIColor`。实际上，`SKColor`并非真正的类，而是一种别名，在\
  \ iOS 应用程序中可代替`UIColor`，在 OS X 应用程序中可代替`NSColor`。这使我们能够更轻松地在 iOS 和 OS X 之间移植游戏。\n\
  \n之后，我们创建了两个名为`SKLabelNode`的类的实例。这是一个方便的类，其工作方式类似于`UILabel`，允许我们向场景添加文本，并让我们选择字体、设置文本值以及指定某些对齐方式。我们创建了一个标签用于在屏幕右上角显示生命数，另一个标签用于在屏幕左上角显示关卡编号。请仔细查看我们用于定位这些标签的代码。以下是设置生命数标签位置的代码：\n\
  \n```\nlives.position = CGPointMake(self.frame.size.width,\n                   \
  \          self.frame.size.height);\n```\n\n\n\n### 玩家移动\n\n现在来添加一点交互性。我们将创建一个代表玩家的新类。该类将知道如何利用内部组件绘制自身，以及如何以精美的动画方式移动到新位置。接下来，我们将把该类的一个实例插入场景中，并编写一些代码，让玩家通过触摸屏幕来移动对象。\n\
  \n场景中的每个对象都必须是 `SKNode` 的子类。因此，你将使用 Xcode 的**文件**菜单创建一个名为 `PlayerNode` 的新 Cocoa\
  \ Touch 类，该类是 `SKNode` 的子类。在创建后几乎为空的 *PlayerNode.m* 文件中，添加以下方法：\n\n```\n- (instancetype)init\
  \ {\n    if (self = [super init]) {\n        self.name = [NSString stringWithFormat:@\"\
  Player %p\", self];\n        [self initNodeGraph];\n    }\n    return self;\n}\n\
  \n- (void)initNodeGraph {\n    SKLabelNode *label = [SKLabelNode labelNodeWithFontNamed:@\"\
  Courier\"];\n    label.fontColor = [SKColor darkGrayColor];\n    label.fontSize\
  \ = 40;\n    label.text = @\"v\";\n    label.zRotation = M_PI;\n    label.name =\
  \ @\"label\";\n\n    [self addChild:label];\n}\n```\n\n我们的 `PlayerNode` 本身并不显示任何内容，因为普通的\
  \ `SKNode` 无法自行绘制。相反，`init` 方法设置了一个子节点来执行实际的绘制工作。这个子节点是 `SKLabelNode` 的另一个实例，就像我们之前创建用于显示关卡号码和剩余生命数的标签一样。`SKLabelNode`\
  \ 是 `SKNode` 的一个子类，它*确实*知道如何绘制自身。另一个这样的子类是 `SKSpriteNode`。我们没有为标签设置位置，这意味着它的位置是坐标\
  \ (0, 0)。与视图类似，每个 `SKNode` 存在于从其父对象继承的坐标系中。将此节点的位置设为零，意味着它将在屏幕上显示在 `PlayerNode`\
  \ 实例所在的位置。任何非零值都将有效地成为相对于该点的偏移量。\n\n我们还为标签设置了一个旋转值，以便它包含的小写字母“v”能够倒置显示。旋转属性的名称 `zRotation`\
  \ 可能看起来有点令人意外；然而，它只是指 Sprite Kit 所使用的坐标空间中的 z 轴。你在屏幕上只能看到 x 轴和 y 轴，但 z 轴可用于排列显示顺序以及围绕其旋转物件。赋给\
  \ `zRotation` 的值需要是弧度而不是角度，因此我们赋值为 `M_PI`，它相当于数学值 *π*。由于 *π* 弧度等于 180°，这正是我们需要的。\n\
  \n### 将玩家添加到场景中\n\n现在切换回 *GameScene.m*。在这里，我们将向场景中添加一个 `PlayerNode` 实例。首先导入新类的头文件，并在一个新的类扩展中添加一个属性：\n\
  \n```\n#import \"GameScene.h\"\n#import \"PlayerNode.h\"\n\n@interface GameScene\
  \ ()\n\n@property (strong, nonatomic) PlayerNode *playerNode;\n\n@end\n```\n\n继续，在\
  \ `initWithSize:levelNumber:` 方法的末尾附近添加以下粗体代码。确保将其放在 `return self` 之前以及其上方的右花括号之前：\n\
  \n```\n[self addChild:level];\n_playerNode = [PlayerNode node];\n_playerNode.position\
  \ = CGPointMake(CGRectGetMidX(self.frame),\n                                   CGRectGetHeight(self.frame)\
  \ * 0.1);\n\n[self addChild:_playerNode];\n    }\n    return self;\n}\n```\n\n如果你现在构建并运行应用程序，你应该会看到玩家出现在屏幕底部中间附近，如图\
  \ 17-6 所示。\n\n![9781484202005_Fig17-06.jpg](img/9781484202005_Fig17-06.jpg)\n\n\
  图 17-6。一个倒置的“v”来救场！\n\n### 处理触摸：玩家移动\n\n---\n\n如果你思考一下我们传递给这个标签的位置坐标，你可能会惊讶地发现我们传入了场景的高度。在\
  \ UIKit 中，将任何内容定位在 `UIView` 的高度处，会将其放置在该视图的底部；但在 Scene Kit 中，y 轴是翻转的——坐标原点位于场景的左下角，y\
  \ 轴指向上方。因此，场景高度的最大值对应的是屏幕顶部的位置。那么标签的 x 坐标呢？我们将其设置为视图的宽度。如果你对 `UIView` 这样做，该视图将会被放置在屏幕的右侧之外。但这里并非如此，因为我们还做了以下操作：\n\
  \n```\nlives.horizontalAlignmentMode = SKLabelHorizontalAlignmentModeRight;\n```\n\
  \n将 `SKLabelNode` 的 `horizontalAlignmentMode` 属性设置为 `SKLabelHorizontalAlignmentModeRight`，会将标签节点用于定位的点（实际上是一个名为\
  \ `position` 的属性）移动到文本的右侧。由于我们希望文本在屏幕上右对齐，因此需要将 `position` 属性的 x 坐标设置为场景的宽度。相比之下，`level`\
  \ 标签中的文本是左对齐的，我们通过将其 x 坐标设为零来将其定位在场景的左边缘：\n\n```\nlevel.horizontalAlignmentMode\
  \ = SKLabelHorizontalAlignmentModeLeft;\nlevel.position = CGPointMake(0, self.frame.size.height);\n\
  ```\n\n你还会看到我们为每个标签指定了一个 `name`。这类似于 UIKit 其他部分中的标签或标识符，它将使我们以后能够通过名称来检索这些标签。\n\n\
  现在选择 *GameViewController.m*，并对 `viewDidLoad` 方法进行以下更改：\n\n```\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n\n    // 配置视图。\n    SKView *skView = (SKView *)self.view;\n\
  \    skView.showsFPS = YES;\n    skView.showsNodeCount = YES;\n    skView.ignoresSiblingOrder\
  \ = YES;\n\n    // 创建并配置场景。\n    GameScene *scene = [GameScene nodeWithFileNamed:@\"\
  GameScene\"];\n    scene.scaleMode = SKSceneScaleModeAspectFill;\n    GameScene\
  \ *scene = [GameScene sceneWithSize:self.view.frame.size\n                     \
  \             levelNumber:1];\n\n    // 呈现场景。\n    [skView presentScene:scene];\n\
  }\n```\n\n我们没有从场景文件中加载场景，而是使用刚添加到 `GameScene` 中的 `sceneWithSize:levelNumber:` 方法来创建并初始化场景，并使其与\
  \ `SKView` 大小相同。由于视图和场景大小相同，不再需要设置场景的 `scaleMode` 属性，因此我们可以删除执行该操作的代码行。\n\n在 *GameViewController.m*\
  \ 的底部，你会看到模板为我们包含的以下方法：\n\n```\n- (BOOL)prefersStatusBarHidden {\n    return YES;\n\
  }\n```\n\n从这个方法返回 `YES` 会让 iOS 状态栏在我们的游戏运行时消失，这通常是此类动作游戏所需要的。现在运行游戏，你会看到我们已经有了一些非常基础的结构，如图\
  \ 17-5 所示。\n\n![9781484202005_Fig17-05.jpg](img/9781484202005_Fig17-05.jpg)\n\n\
  图 17-5。我们的游戏目前还没有太多乐趣，但至少它的帧率很高！\n\n**提示** 场景右下角的节点数和帧率对于调试很有用，但在发布游戏时你不希望它们出现在那里！你可以通过在\
  \ `GameViewController` 的 `viewDidLoad` 方法中将 `SKView` 的 `showsFPS` 和 `showsNodeCount`\
  \ 属性设置为 `NO` 来关闭它们。还有一些其他的 `SKView` 属性可以让你获取更多调试信息——详情请参考 API 文档。\n\n\n\n接下来，我们要在之前几乎留空的\
  \ `touchesBegan:withEvent:` 方法中添加一些逻辑。请在 `GameScene.m` 中插入下面加粗的行（添加此代码时会出现编译错误——我们稍后会修复）：\n\
  \n```objectivec\n- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event\
  \ {\n    /* Called when a touch begins */\n\n    for (UITouch *touch in touches)\
  \ {\n        CGPoint location = [touch locationInNode:self];\n        if (location.y\
  \ < CGRectGetHeight(self.frame) * 0.2 ) {\n            CGPoint target = CGPointMake(location.x,\n\
  \                                         self.playerNode.position.y);\n       \
  \     [self.playerNode moveToward:target];\n        }\n    }\n}\n```\n\n上述代码片段使用屏幕下半部分中任意触摸位置作为新位置的基准，玩家节点将向此位置移动。它还指示玩家节点向该位置移动。之所以出现编译错误，是因为我们尚未定义玩家节点的\
  \ `moveToward:` 方法。因此，首先在 `PlayerNode.h` 中声明该方法，如下所示：\n\n```objectivec\n#import\
  \ <SpriteKit/SpriteKit.h>\n\n@interface PlayerNode : SKNode\n\n// 返回未来移动的持续时间\n\
  - (void)moveToward:(CGPoint)location;\n\n@end\n```\n\n接下来，切换到 `PlayerNode.m` 并添加以下实现：\n\
  \n```objectivec\n- (void)moveToward:(CGPoint)location {\n    [self removeActionForKey:@\"\
  movement\"];\n\n    CGFloat distance = PointDistance(self.position, location);\n\
  \    CGFloat screenWidth = [UIScreen mainScreen].bounds.size.width;\n    CGFloat\
  \ duration = 2.0 * distance / screenWidth;\n\n    [self runAction:[SKAction moveTo:location\
  \ duration:duration]\n            withKey:@\"movement\"];\n}\n```\n\n我们暂时跳过第一行，稍后再回来解释。这个方法将新位置与当前位置进行比较，计算出距离和移动所需的像素数。接着，它利用一个数值常量来确定整体移动的速度，从而计算出移动所需的时间。最后，创建一个\
  \ `SKAction` 来执行移动。`SKAction` 是 Sprite Kit 的一部分，它能够随时间对节点进行修改，让你轻松地对节点的位置、大小、旋转、透明度等进行动画处理。在这里，我们告诉玩家节点在特定持续时间内运行一个简单的移动动作，然后将该动作分配给键\
  \ `@\"movement\"`。如你所见，这个键与该方法第一行中用于移除动作的键相同。我们以移除任何具有相同键的现有动作开始该方法，这样用户就可以快速连续点击多个位置，而不会产生大量试图以不同方式移动的竞争动作！\n\
  \n## 几何计算\n\n现在你会注意到我们又引入了一个问题，因为 Xcode 找不到名为 `PointDistance()` 的函数。这是我们的应用将用来执行点、向量和浮点数计算的几个简单几何函数之一。我们现在就来实现它。使用\
  \ Xcode 创建一个新文件，这次是在 iOS 部分下选择 Header File。将其命名为 `Geometry.h`，并添加以下内容：\n\n```c\n\
  #ifndef TextShooter_Geometry_h\n#define TextShooter_Geometry_h\n\n// 接受一个 CGVector\
  \ 和一个 CGFloat。\n// 返回一个新的 CGFloat，其中 v 的每个分量都乘以了 m。\nstatic inline CGVector VectorMultiply(CGVector\
  \ v, CGFloat m) {\n    return CGVectorMake(v.dx * m, v.dy * m);\n}\n\n// 接受两个 CGPoint。\n\
  // 返回表示从 p1 到 p2 方向的 CGVector。\nstatic inline CGVector VectorBetweenPoints(CGPoint\
  \ p1, CGPoint p2) {\n    return CGVectorMake(p2.x - p1.x, p2.y - p1.y);\n}\n\n//\
  \ 接受一个 CGVector。\n// 返回一个 CGFloat，包含向量的长度，使用勾股定理计算。\nstatic inline CGFloat VectorLength(CGVector\
  \ v) {\n    return sqrtf(powf(v.dx, 2) + powf(v.dy, 2));\n}\n\n// 接受两个 CGPoint。返回一个\
  \ CGFloat，包含它们之间的距离，\n// 使用勾股定理计算。\nstatic inline CGFloat PointDistance(CGPoint\
  \ p1, CGPoint p2) {\n    return sqrtf(powf(p2.x - p1.x, 2) + powf(p2.y - p1.y, 2));\n\
  }\n\n#endif\n```\n\n这些是一些常见操作的简单实现，在许多游戏中都很有用：向量乘法、创建从一个点到另一个点的向量，以及计算距离。为了让代码使用这些函数，只需在\
  \ `PlayerNode.m` 顶部附近添加以下导入：\n\n```objectivec\n#import \"Geometry.h\"\n```\n\n现在构建并运行应用程序。在玩家飞船出现后，点击屏幕底部的任意位置，即可看到飞船向左或向右滑动到你点击的点。你可以在飞船到达目的地之前再次点击，它会立即开始新的动画以移向新位置。这很好，但如果玩家飞船的动作更生动一些，岂不是更好？\n\
  \n## 摇摆部件\n\n让我们通过添加另一个动画，让飞船在移动时产生一些摇摆。将加粗的行添加到 `PlayerNode` 的 `moveToward:` 方法中。\n\
  \n```objectivec\n- (void)moveToward:(CGPoint)location {\n    [self removeActionForKey:@\"\
  movement\"];\n    [self removeActionForKey:@\"wobbling\"];\n\n    CGFloat distance\
  \ = PointDistance(self.position, location);\n    CGFloat pixels = [UIScreen mainScreen].bounds.size.width;\n\
  \    CGFloat duration = 2.0 * distance / pixels;\n\n    [self runAction:[SKAction\
  \ moveTo:location duration:duration]\n            withKey:@\"movement\"];\n\n  \
  \  CGFloat wobbleTime = 0.3;\n    CGFloat halfWobbleTime = wobbleTime * 0.5;\n \
  \   SKAction *wobbling = [SKAction\n                sequence:@[[SKAction scaleXTo:0.2\
  \ duration:halfWobbleTime],\n                           [SKAction scaleXTo:1.0\n\
  \                                duration:halfWobbleTime]\n                    \
  \         ]];\n    NSUInteger wobbleCount = duration / wobbleTime;\n\n    [self\
  \ runAction:[SKAction repeatAction:wobbling count:wobbleCount]\n            withKey:@\"\
  wobbling\"];\n}\n```\n\n我们刚才所做的与之前创建的移动动作类似，但在一些重要方面有所不同。对于基本移动，我们只计算了移动持续时间，然后一步创建并运行移动动作。这次则稍微复杂一些。首先，我们定义单次“摇摆”的时间（飞船在移动过程中可能摇摆多次，但会以一致的速度进行）。摇摆本身包括首先将飞船沿\
  \ x 轴（即其宽度）缩放至正常大小的 2/10，然后再将其缩放回完整大小。每一步都是单个动作，它们被打包成另一种称为**序列**的动作，序列会依次执行其中包含的所有动作。接下来，我们计算出在飞船移动期间可以进行多少次摇摆，并将\
  \ `wobbling` 序列包装在重复动作中，告诉它应该执行多少个完整的摇摆周期。同时，和之前一样，我们通过取消任何之前的摇摆动作来开始该方法，因为我们不希望有竞争性的摇摆动作。\n\
  \n现在运行应用程序，你会看到飞船在来回移动时愉快地摇摆。看起来有点像在走路！\n\n## 创建敌人\n\n到目前为止还不错，但这款游戏需要一些敌人供玩家射击。使用\
  \ Xcode 创建一个新的 Cocoa Touch 类，命名为 `EnemyNode`，父类设置为 `SKNode`。我们暂时不会为敌人赋予任何实际行为，但会赋予它一个外观。我们将使用与玩家相同的方法，即使用文本来构建敌人的身体。毫无疑问，没有比字母\
  \ X 更具威慑力的字符了，所以我们的敌人将是一个字母 X…… 由小写 x 组成！当你将以下方法添加到 `EnemyNode.m` 中时，请尽量别被这个想法吓到：\n\
  \n\n```objectivec\n- (instancetype)init {\n    if (self = [super init]) {\n    \
  \    self.name = [NSString stringWithFormat:@\"Enemy %p\", self];\n        [self\
  \ initNodeGraph];\n    }\n    return self;\n}\n\n- (void)initNodeGraph {\n    SKLabelNode\
  \ *topRow = [SKLabelNode\n                           labelNodeWithFontNamed:@\"\
  Courier-Bold\"];\n    topRow.fontColor = [SKColor brownColor];\n    topRow.fontSize\
  \ = 20;\n    topRow.text = @\"x x\";\n    topRow.position = CGPointMake(0, 15);\n\
  \    [self addChild:topRow];\n\n    SKLabelNode *middleRow = [SKLabelNode\n    \
  \                          labelNodeWithFontNamed:@\"Courier-Bold\"];\n    middleRow.fontColor\
  \ = [SKColor brownColor];\n    middleRow.fontSize = 20;\n    middleRow.text = @\"\
  x\";\n    [self addChild:middleRow];\n\n    SKLabelNode *bottomRow = [SKLabelNode\n\
  \                              labelNodeWithFontNamed:@\"Courier-Bold\"];\n    bottomRow.fontColor\
  \ = [SKColor brownColor];\n    bottomRow.fontSize = 20;\n    bottomRow.text = @\"\
  x x\";\n    bottomRow.position = CGPointMake(0, -15);\n    [self addChild:bottomRow];\n\
  }\n```\n\n这里没什么新内容；我们只是通过调整每个文本行的 `y` 值，添加了多行文本。\n\n## 将敌人放入场景\n\n现在，让我们修改 `GameScene.m`\
  \ 文件，让场景中出现一些敌人。首先，在文件顶部附近添加以下粗体显示的代码行：\n\n```objectivec\n#import \"GameScene.h\"\
  \n#import \"PlayerNode.h\"\n#import \"EnemyNode.h\"\n\n@interface GameScene ()\n\
  \n@property (strong, nonatomic) PlayerNode *playerNode;\n@property (strong, nonatomic)\
  \ SKNode *enemies;\n\n@end\n```\n\n我们导入了新敌人类的头文件，并添加了一个新属性，用于存放将添加到关卡中的所有敌人。你可能会认为应该使用\
  \ `NSMutableArray`，但实际上，使用一个普通的 `SKNode` 就非常适合这项工作。`SKNode` 可以容纳任意数量的子节点。而且，既然我们需要将所有敌人添加到场景中，不如将它们全部保存在一个\
  \ `SKNode` 中，以便于访问。\n\n下一步是创建 `spawnEnemies` 方法，如下所示：\n\n```objectivec\n- (void)spawnEnemies\
  \ {\n    NSUInteger count = log(self.levelNumber) + self.levelNumber;\n    for (NSUInteger\
  \ i = 0; i < count; i++) {\n        EnemyNode *enemy = [EnemyNode node];\n     \
  \   CGSize size = self.frame.size;\n        CGFloat x = arc4random_uniform(size.width\
  \ * 0.8)\n                    + (size.width * 0.1);\n        CGFloat y = arc4random_uniform(size.height\
  \ * 0.5)\n                    + (size.height * 0.5);\n        enemy.position = CGPointMake(x,\
  \ y);\n        [self.enemies addChild:enemy];\n    }\n}\n```\n\n最后，在 `initWithSize:levelNumber:`\
  \ 方法末尾附近添加以下代码行，以创建一个空的 `enemies` 节点，然后调用 `spawnEnemies` 方法：\n\n```objectivec\n\
  [self addChild:_playerNode];\n_enemies = [SKNode node];\n[self addChild:_enemies];\n\
  [self spawnEnemies];\n```\n\n由于我们将 `enemies` 节点添加到了场景中，因此我们添加到 `enemies` 节点中的任何敌人子节点也会出现在场景中。\n\
  \n现在运行应用程序，你会看到一个可怕的敌人随机出现在屏幕的上半部分（参见图 17-7）。你难道不想开枪打它吗？\n\n![9781484202005_Fig17-07.jpg](img/9781484202005_Fig17-07.jpg)\n\
  \n图 17-7。我相信你会同意，这个由 X 组成的 X 形敌人就该被射击\n\n## 开始射击\n\n是时候实现这个游戏开发的下一步逻辑了：让玩家攻击敌人。我们希望玩家能够点击屏幕上方\
  \ 80% 的任意位置，向敌人发射子弹。我们将使用 Sprite Kit 内置的**物理引擎**来移动玩家的子弹，并检测子弹何时与敌人发生碰撞。\n\n但首先，这个所谓的物理引擎是什么？简单来说，物理引擎是一个软件组件，它跟踪世界中多个物理对象（通常称为**刚体**）及其受到的作用力。它还能确保一切以现实的方式运动。它可以考虑重力、处理物体之间的碰撞（这样物体就不会同时占据同一空间），甚至模拟物理特性，如摩擦力和弹性。\n\
  \n重要的是要理解，物理引擎通常与图形引擎是分开的。苹果提供了方便的 API 让我们可以同时使用两者，但它们本质上是独立的。在你的显示中，有些对象，比如显示当前关卡编号和剩余生命数的标签，可能与物理引擎完全无关。而且，也有可能创建具有物理刚体但不显示任何内容的物体。\n\
  \n## 定义物理类别\n\nSprite Kit 物理引擎允许我们做的事情之一就是将对象分配为几个不同的**物理类别**。物理类别与 Objective-C\
  \ 的类别无关。相反，物理类别是一种对相关对象进行分组的方式，以便物理引擎能够以不同的方式处理它们之间的碰撞。例如，在这个游戏中，我们将创建三个类别：一个用于敌人，一个用于玩家，一个用于玩家导弹。我们绝对希望物理引擎关注敌人和玩家导弹之间的碰撞，但可能希望它忽略玩家导弹与玩家本身的碰撞。使用物理类别可以轻松实现这一点。\n\
  \n那么，让我们创建所需的类别。按 **N** 键打开新建文件助手，从 iOS 部分选择 **Header File**，然后按 **Next**。将新的头文件命名为\
  \ `PhysicsCategories.h` 并保存，然后添加以下代码：\n\n```objectivec\n#ifndef TextShooter_PhysicsCategories_h\n\
  #define TextShooter_PhysicsCategories_h\n\ntypedef NS_OPTIONS(uint32_t, PhysicsCategory)\
  \ {\n    PlayerCategory        =  1 << 1,\n    EnemyCategory         =  1 << 2,\n\
  \    PlayerMissileCategory =  1 << 3\n};\n\n#endif\n```\n\n这里我们声明了三个类别常量。请注意，这些类别以位掩码的方式工作，因此每个都必须为\
  \ 2 的幂。我们可以通过位运算轻松做到这一点。它们被设置为位掩码形式，是为了简化物理引擎的 API。使用位掩码，我们可以通过逻辑*或*运算将多个值组合在一起。这样，我们就能通过一次\
  \ API 调用来告诉物理引擎如何处理多个不同层之间的碰撞。我们很快就会看到它的实际应用。\n\n## 创建 BulletNode 类\n\n既然我们已经做好了准备工作，现在来创建一些子弹，这样我们就可以开始射击了。\n\
  \n创建一个名为 `BulletNode` 的新 Cocoa Touch 类，同样使用 `SKNode` 作为其父类。从头文件开始，将要声明该类具有的两个公共方法：\n\
  \n```objectivec\n#import <SpriteKit/SpriteKit.h>\n\n@interface BulletNode : SKNode\n\
  \n+ (instancetype)bulletFrom:(CGPoint)start toward:(CGPoint)destination;\n- (void)applyRecurringForce;\n\
  \n@end\n```\n\n第一个方法是用于创建该类新实例的工厂方法。第二个方法需要你每帧从场景中调用，以控制子弹移动。现在切换到 `BulletNode.m`\
  \ 文件开始实现这个类。\n\n我们要做的第一步是导入专用几何函数和物理类别的头文件。第二步是添加一个类扩展，其中包含一个属性，用于存放这颗子弹的推力向量：\n\
  \n```objectivec\n#import \"BulletNode.h\"\n#import \"PhysicsCategories.h\"\n#import\
  \ \"Geometry.h\"\n\n@interface BulletNode ()\n\n@property (assign, nonatomic) CGVector\
  \ thrust;\n\n@end\n```\n\n\n# 排版后的文本\n\n接下来，我们实现一个`init`方法。与本应用中其他的`init`方法一样，这里是我们为子弹创建对象图的地方。这将由一个单独的点组成。同时，我们通过创建并配置一个`SKPhysicsBody`实例并将其附加到`self`上，来为此类配置物理属性。在此过程中，我们告诉这个新的物理体它属于哪个类别，以及应该检查哪些类别以确定与该对象的碰撞。\n\
  \n```objc\n@implementation BulletNode\n\n- (instancetype)init {\n    if (self =\
  \ [super init]) {\n        SKLabelNode *dot = [SKLabelNode labelNodeWithFontNamed:@\"\
  Courier\"];\n        dot.fontColor = [SKColor blackColor];\n        dot.fontSize\
  \ = 40;\n        dot.text = @\".\";\n        [self addChild:dot];\n\n        SKPhysicsBody\
  \ *body = [SKPhysicsBody bodyWithCircleOfRadius:1];\n        body.dynamic = YES;\n\
  \        body.categoryBitMask = PlayerMissileCategory;\n        body.contactTestBitMask\
  \ = EnemyCategory;\n        body.collisionBitMask = EnemyCategory;\n        body.mass\
  \ = 0.01;\n\n        self.physicsBody = body;\n        self.name = [NSString stringWithFormat:@\"\
  Bullet %p\", self];\n    }\n    return self;\n}\n\n@end\n```\n\n## 应用物理\n\n接下来，我们将创建工厂方法，该方法创建一个新的子弹，并为其提供一个推力向量，物理引擎将使用该向量将子弹推向目标：\n\
  \n```objc\n+ (instancetype)bulletFrom:(CGPoint)start toward:(CGPoint)destination\
  \ {\n    BulletNode *bullet = [[self alloc] init];\n\n    bullet.position = start;\n\
  \n    CGVector movement = VectorBetweenPoints(start, destination);\n    CGFloat\
  \ magnitude = VectorLength(movement);\n    if (magnitude == 0.0f) return nil;\n\n\
  \    CGVector scaledMovement = VectorMultiply(movement, 1 / magnitude);\n\n    CGFloat\
  \ thrustMagnitude = 100.0;\n    bullet.thrust = VectorMultiply(scaledMovement, thrustMagnitude);\n\
  \n    return bullet;\n}\n```\n\n基本的计算非常简单。我们首先确定一个`movement`向量，它从起始位置指向目标位置，然后确定其`magnitude`（长度）。将`movement`向量除以其`magnitude`会得到一个归一化的单位向量，这是一个指向与原向量相同方向、但长度恰好为一个单位的向量（在这种情况下，一个单位与屏幕上的一个“点”相同——例如，在\
  \ Retina 设备上是两个像素，在旧设备上是一个像素）。创建单位向量非常有用，因为我们可以将其乘以一个固定大小（在本例中为 100），以确定一个统一强度的推力向量，无论用户点击屏幕的位置有多远。\n\
  \n我们需要为此类添加的最后一段代码是以下方法，它将推力应用到物理体上。我们将在每一帧中，从场景内部调用它：\n\n```objc\n- (void)applyRecurringForce\
  \ {\n    [self.physicsBody applyForce:self.thrust];\n}\n```\n\n### 将子弹添加到场景中\n\n\
  现在切换到`GameScene.m`，将子弹添加到场景本身中。首先，在文件顶部附近导入新类的头文件。接下来，添加另一个属性，将所有子弹包含在单个`SKNode`中，就像之前为敌人所做的那样：\n\
  \n```objc\n#import \"GameScene.h\"\n#import \"PlayerNode.h\"\n#import \"EnemyNode.h\"\
  \n#import \"BulletNode.h\"\n\n@interface GameScene ()\n\n@property (strong, nonatomic)\
  \ PlayerNode *playerNode;\n@property (strong, nonatomic) SKNode *enemies;\n@property\
  \ (strong, nonatomic) SKNode *playerBullets;\n\n@end\n```\n\n找到`initWithSize:levelNumber:`方法中之前添加敌人的部分。那也是设置`playerBullets`节点的位置。\n\
  \n```objc\n[self spawnEnemies];\n_playerBullets = [SKNode node];\n[self addChild:_playerBullets];\n\
  ```\n\n现在我们已经准备好编写实际的导弹发射代码。在`touchesBegan:withEvent:`方法中添加这个`else`子句，这样所有在屏幕上半部分的点击都会发射子弹，而不是移动飞船：\n\
  \n```objc\n- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event {\n\
  \    for (UITouch *touch in touches) {\n        CGPoint location = [touch locationInNode:self];\n\
  \        if (location.y < CGRectGetHeight(self.frame) * 0.2 ) {\n            CGPoint\
  \ target = CGPointMake(location.x,\n                                         self.playerNode.position.y);\n\
  \            [self.playerNode moveToward:target];\n\n        } else {\n        \
  \    BulletNode *bullet = [BulletNode\n                                     bulletFrom:self.playerNode.position\n\
  \                                     toward:location];\n            [self.playerBullets\
  \ addChild:bullet];\n        }\n    }\n}\n```\n\n这样添加了子弹，但我们添加的子弹都不会实际移动，除非我们通过每帧施加推力来告诉它们移动。我们的场景已经包含了一个名为`update:`的空方法。这个方法每帧被调用一次，这是进行任何需要在每帧中发生的游戏逻辑的完美位置。然而，我们并不是直接在该方法中更新所有子弹，而是将代码放在一个单独的方法中，然后从`update:`方法中调用它：\n\
  \n```objc\n- (void)update:(CFTimeInterval)currentTime {\n    [self updateBullets];\n\
  }\n\n- (void)updateBullets {\n    NSMutableArray *bulletsToRemove = [NSMutableArray\
  \ array];\n    for (BulletNode *bullet in self.playerBullets.children) {\n     \
  \   // 移除任何移出屏幕的子弹\n        if (!CGRectContainsPoint(self.frame, bullet.position))\
  \ {\n            // 标记要移除的子弹\n            [bulletsToRemove addObject:bullet];\n\
  \            continue;\n        }\n        // 对剩余子弹施加推力\n        [bullet applyRecurringForce];\n\
  \    }\n    [self.playerBullets removeChildrenInArray:bulletsToRemove];\n}\n```\n\
  \n在告诉每个子弹施加其循环力之前，我们还会检查每个子弹是否仍在屏幕上。任何移出屏幕的子弹都被放入一个临时数组中；然后在最后，这些子弹会从`playerBullets`节点中被移除。请注意，这个两步过程是必要的，因为此方法中的`for`循环正在遍历`playerBullets`节点中的所有子节点。在遍历集合时对其进行修改绝不是一个好主意，并且很容易导致崩溃。\n\
  \n现在构建并运行应用程序，你会看到，除了可以移动玩家的飞船之外，你还可以通过点击屏幕让它向上发射导弹（参见图 17-8）。很酷！\n\n![9781484202005_Fig17-08.jpg](img/9781484202005_Fig17-08.jpg)\n\
  \n图 17-8. 射击风暴！\n\n### 用物理攻击敌人\n\n我们的游戏仍然缺少几个重要的游戏玩法元素。敌人从不攻击我们，而且我们还不能通过射击来消灭敌人。让我们现在来关注后者。我们将进行设置，使得射击敌人会产生将其从当前固定在屏幕上的位置移除的效果。此功能将使用物理引擎来完成所有繁重的工作，并且需要修改`PlayerNode`、`EnemyNode`和`GameScene`。\n\
  \n首先，让我们为那些还没有物理体的节点添加物理体。从`EnemyNode.m`开始，在文件顶部附近添加这个`#import`语句：\n\n```objc\n\
  #import \"PhysicsCategories.h\"\n```\n\n接下来，在`init`方法中添加以下行：\n\n```objc\n- (instancetype)init\
  \ {\n    if (self = [super init]) {\n        self.name = [NSString stringWithFormat:@\"\
  Enemy %p\", self];\n        [self initNodeGraph];\n        [self initPhysicsBody];\n\
  \    }\n    return self;\n}\n```\n\n现在添加实际设置物理体的代码。这与之前为`PlayerBullet`类所做的非常相似：\n\
  \n\n```objc\n- (void)initPhysicsBody {\n    SKPhysicsBody *body = [SKPhysicsBody\
  \ bodyWithRectangleOfSize:\n                           CGSizeMake(40, 40)];\n  \
  \  body.affectedByGravity = NO;\n    body.categoryBitMask = EnemyCategory;\n   \
  \ body.contactTestBitMask = PlayerCategory|EnemyCategory;\n    body.mass = 0.2;\n\
  \    body.angularDamping = 0.0f;\n    body.linearDamping = 0.0f;\n    self.physicsBody\
  \ = body;\n}\n```\n\n然后选择 `PlayerNode.m`，你将在其中执行一系列类似的操作。首先，在靠近文件顶部的位置添加以下 `#import`：\n\
  \n```objc\n#import \"PhysicsCategories.h\"\n```\n\n接着，将此处显示的加粗行添加到 `init` 方法中：\n\
  \n```objc\n- (instancetype)init {\n    if (self = [super init]) {\n        self.name\
  \ = [NSString stringWithFormat:@\"Player %p\", self];\n        [self initNodeGraph];\n\
  \        [self initPhysicsBody];\n    }\n    return self;\n}\n```\n\n最后，添加新的 `initPhysicsBody`\
  \ 方法：\n\n```objc\n- (void)initPhysicsBody {\n    SKPhysicsBody *body = [SKPhysicsBody\
  \ bodyWithRectangleOfSize:\n                           CGSizeMake(20, 20)];\n  \
  \  body.affectedByGravity = NO;\n    body.categoryBitMask = PlayerCategory;\n  \
  \  body.contactTestBitMask = EnemyCategory;\n    body.collisionBitMask = 0;\n  \
  \  self.physicsBody = body;\n}\n```\n\n至此，你可以运行应用，并看到你的子弹现在能够将敌人击飞到太空中。然而，你还会发现一个问题。当你开始游戏并将唯一的敌人击飞入太空后，你就会被卡住！现在或许是时候为游戏添加关卡管理功能了。\n\
  \n### 完成关卡\n\n我们需要增强 `GameScene`，使其能够判断何时进入下一关。通过检查剩余敌人的数量，它就能简单判断。如果发现屏幕上没有敌人，则当前关卡结束，游戏应过渡到下一关。\n\
  \n### 追踪敌人\n\n首先添加 `updateEnemies` 方法。它的工作方式与之前添加的 `updateBullets` 方法非常相似：\n\n```objc\n\
  - (void)updateEnemies {\n    NSMutableArray *enemiesToRemove = [NSMutableArray array];\n\
  \    for (SKNode *node in self.enemies.children) {\n        // 移除任何移出屏幕的敌人\n   \
  \     if (!CGRectContainsPoint(self.frame, node.position)) {\n            // 标记敌人待移除\n\
  \            [enemiesToRemove addObject:node];\n            continue;\n        }\n\
  \    }\n    if ([enemiesToRemove count] > 0) {\n        [self.enemies removeChildrenInArray:enemiesToRemove];\n\
  \    }\n}\n```\n\n这样每当敌人移出屏幕时，它就会从关卡的 `enemies` 数组中移除。现在让我们修改 `update:` 方法，让它调用\
  \ `updateEnemies`，以及另一个我们尚未实现的新方法：\n\n```objc\n- (void)update:(CFTimeInterval)currentTime\
  \ {\n    /* 在每一帧渲染之前调用 */\n    if (self.finished) return;\n    [self updateBullets];\n\
  \    [self updateEnemies];\n    [self checkForNextLevel];\n}\n```\n\n我们首先检查 `finished`\
  \ 属性。由于即将添加用于正式结束关卡的代码，我们希望在关卡完成后不再进行额外的处理。然后，就像我们每帧检查是否有子弹或敌人移出屏幕一样，我们也会每帧调用 `checkForNextLevel`\
  \ 来检查当前关卡是否完成。让我们添加这个方法：\n\n```objc\n- (void)checkForNextLevel {\n    if ([self.enemies.children\
  \ count] == 0) {\n        [self goToNextLevel];\n    }\n}\n```\n\n### 过渡到下一关\n\n\
  `checkForNextLevel` 方法接着调用另一个尚未实现的方法。`goToNextLevel` 方法将当前关卡标记为已完成，在屏幕上显示一些文字告知玩家，然后启动下一关：\n\
  \n```objc\n- (void)goToNextLevel {\n    self.finished = YES;\n    SKLabelNode *label\
  \ = [SKLabelNode labelNodeWithFontNamed:@\"Courier\"];\n    label.text = @\"Level\
  \ Complete!\";\n    label.fontColor = [SKColor blueColor];\n    label.fontSize =\
  \ 32;\n    label.position = CGPointMake(self.frame.size.width * 0.5,\n         \
  \                        self.frame.size.height * 0.5);\n    [self addChild:label];\n\
  \    GameScene *nextLevel = [[GameScene alloc]\n                            initWithSize:self.frame.size\n\
  \                            levelNumber:self.levelNumber + 1];\n    nextLevel.playerLives\
  \ = self.playerLives;\n    [self.view presentScene:nextLevel\n                transition:[SKTransition\
  \ flipHorizontalWithDuration:1.0]];\n}\n```\n\n`goToNextLevel` 方法的后半部分创建了一个新的 `GameScene`\
  \ 实例，并为其赋予所有所需的初始值。然后它告诉视图呈现新场景，并使用过渡效果来平滑切换。`SKTransition` 类让我们可以从多种过渡样式中进行选择。运行应用并完成一个关卡，看看效果（参见图\
  \ 17-9）。\n\n![9781484202005_Fig17-09.jpg](img/9781484202005_Fig17-09.jpg)\n\n图 17-9.\
  \ 此处为关卡结束时的屏幕翻转过渡截图\n\n这里使用的过渡效果看起来像是在水平翻转一张卡片，但还有更多选择！查阅 `SKTransition` 的文档或头文件可以了解更多的可能性。本章后面我们还会使用其他几种变体。\n\
  \n### 自定义碰撞\n\n现在我们拥有一个真正可玩的游戏了。你可以通过将敌人向上击飞出屏幕来一关接一关地通关。这还不错，但确实没什么挑战性！我们之前提到，敌人攻击玩家是缺失的游戏玩法之一，现在正是实现它的时候。我们将通过让敌人在被碰撞时下落来增加难度——无论是被子弹击中还是被另一个敌人碰到。同时，我们还希望被下落的敌人击中会让玩家失去一条命。你可能也注意到，子弹击中敌人后，会扭曲地绕过敌人并继续向上飞行的轨迹，这很奇怪。我们将通过在\
  \ `GameScene.m` 中实现一个碰撞处理程序来解决所有这些问题。\n\n处理检测到的碰撞的方法是 `SKPhysicsWorld` 类的委托方法。我们的场景默认有一个物理世界，但在它告诉我们任何信息之前，需要先进行一些设置。首先，最好让编译器知道我们将要实现一个委托协议，因此在\
  \ `GameScene.m` 文件顶部附近的类扩展声明中添加这个声明：\n\n```objc\n@interface GameScene () <SKPhysicsContactDelegate>\n\
  ```\n\n我们还需要对物理世界进行一些配置（赋予它稍微不那么严酷的重力值），并告知它谁是其委托。为此，我们在 `initWithSize:levelNumber:`\
  \ 方法末尾附近添加这些加粗的行：\n\n```objc\nself.physicsWorld.gravity = CGVectorMake(0, -1);\n\
  self.physicsWorld.contactDelegate = self;\n```\n\n现在我们已经将物理世界的 `contactDelegate`\
  \ 设置为 `GameScene`，就可以实现相关的委托方法了。该方法的核心理念如下：\n\n```objc\n- (void)didBeginContact:(SKPhysicsContact\
  \ *)contact {\n    if (contact.bodyA.categoryBitMask == contact.bodyB.categoryBitMask)\
  \ {\n        // 两个物体属于同一类别\n        SKNode *nodeA = contact.bodyA.node;\n      \
  \  SKNode *nodeB = contact.bodyB.node;\n        // 我们如何处理这些节点？\n    } else {\n \
  \       SKNode *attacker = nil;\n        SKNode *attackee = nil;\n```\n\n\n```objc\n\
  if (contact.bodyA.categoryBitMask > contact.bodyB.categoryBitMask) {\n    // Body\
  \ A 正在攻击 Body B\n    attacker = contact.bodyA.node;\n    attackee = contact.bodyB.node;\n\
  } else {\n    // Body B 正在攻击 Body A\n    attacker = contact.bodyB.node;\n    attackee\
  \ = contact.bodyA.node;\n}\nif ([attackee isKindOfClass:[PlayerNode class]]) {\n\
  \    self.playerLives--;\n}\n// 如何处理攻击者和被攻击者？\n```\n\n继续添加这个方法，但如果你现在看看它，会发现它其实还没什么实际作用。事实上，这个方法唯一具体的成果就是每当一个落下的敌人击中玩家飞船时，减少玩家生命值。但敌人还没开始下落呢！\n\
  \n这个实现背后的思路是：查看两个碰撞物体，判断它们是否属于同一类别（如果是，则它们彼此是“友方”），还是属于不同类别。如果属于不同类别，我们必须确定谁在攻击谁。查看\
  \ `PhysicsCategories.h` 中声明的类别顺序，你会发现它们是按照“攻击性”递增的顺序指定的：`Player` 节点可以被 `Enemy` 节点攻击，而\
  \ `Enemy` 节点又可以被 `PlayerMissile` 节点攻击。这意味着我们可以使用一个简单的“大于”比较来判断在这个场景中谁是“攻击者”。\n\n\
  为了简单和模块化，我们并不想让场景来决定每个对象应如何对被敌人攻击或被其他物体碰撞做出反应。更好的方式是将这些细节构建到受影响的节点类本身中。但是，正如你在我们已有的方法中看到的，我们能确定的只有双方都有一个\
  \ `SKNode` 实例。与其编写一大串 `if`-`else` 语句来询问每个节点属于哪个 `SKNode` 子类，不如使用常规的多态性，让每个节点类以自己的方式处理事情。为了实现这一点，我们必须向\
  \ `SKNode` 添加方法，并提供默认的空实现，然后让我们的子类在适当的地方重写它们。这需要用到类别！这次不是 Sprite Kit 的物理类别，而是真正的\
  \ Objective-C `@category` 定义。\n\n### 为 SKNode 添加类别\n\n要为 `SKNode` 添加类别，请在 Xcode\
  \ 的项目导航器中右键点击 `TextShooter` 文件夹，从弹出菜单中选择 **New File…**。在助手窗口的 iOS/Source 部分，选择 **Objective-C\
  \ File**，然后点击 **Next**。将文件名设置为 `Extra`，将文件类型选择为 **Category**，并将类别所添加的类选择为 `SKNode`。再次点击\
  \ **Next** 创建文件。选中类别头文件 `SKNode+Extra.h`，并添加如下以粗体显示的方法声明：\n\n```objc\n#import <SpriteKit/SpriteKit.h>\n\
  \n@interface SKNode (Extra)\n\n- (void)receiveAttacker:(SKNode *)attacker contact:(SKPhysicsContact\
  \ *)contact;\n- (void)friendlyBumpFrom:(SKNode *)node;\n\n@end\n```\n\n切换到对应的 `.m`\
  \ 文件，输入以下空定义：\n\n```objc\n#import \"SKNode+Extra.h\"\n\n@implementation SKNode (Extra)\n\
  \n- (void)receiveAttacker:(SKNode *)attacker contact:(SKPhysicsContact *)contact\
  \ {\n    // 默认实现不做任何事情\n}\n\n- (void)friendlyBumpFrom:(SKNode *)node {\n    // 默认实现不做任何事情\n\
  }\n\n@end\n```\n\n现在回到 `GameScene.m`，完成它在碰撞处理中的部分。首先在文件顶部添加一个新的头文件导入：\n\n```objc\n\
  #import \"GameScene.h\"\n#import \"PlayerNode.h\"\n#import \"EnemyNode.h\"\n#import\
  \ \"BulletNode.h\"\n#import \"SKNode+Extra.h\"\n```\n\n接下来，回到 `didBeginContact:`\
  \ 方法，添加实际执行工作的代码：\n\n```objc\n- (void)didBeginContact:(SKPhysicsContact *)contact\
  \ {\n    if (contact.bodyA.categoryBitMask == contact.bodyB.categoryBitMask) {\n\
  \        // 两个物体属于同一类别\n        SKNode *nodeA = contact.bodyA.node;\n        SKNode\
  \ *nodeB = contact.bodyB.node;\n\n        // 如何处理这两个节点？\n        [nodeA friendlyBumpFrom:nodeB];\n\
  \        [nodeB friendlyBumpFrom:nodeA];\n    } else {\n        SKNode *attacker\
  \ = nil;\n        SKNode *attackee = nil;\n\n        if (contact.bodyA.categoryBitMask\
  \ > contact.bodyB.categoryBitMask) {\n            // Body A 正在攻击 Body B\n      \
  \      attacker = contact.bodyA.node;\n            attackee = contact.bodyB.node;\n\
  \        } else {\n            // Body B 正在攻击 Body A\n            attacker = contact.bodyB.node;\n\
  \            attackee = contact.bodyA.node;\n        }\n        if ([attackee isKindOfClass:[PlayerNode\
  \ class]]) {\n            self.playerLives--;\n        }\n        // 如何处理攻击者和被攻击者？\n\
  \        [attackee receiveAttacker:attacker contact:contact];\n        [self.playerBullets\
  \ removeChildrenInArray:@[attacker]];\n        [self.enemies removeChildrenInArray:@[attacker]];\n\
  \    }\n}\n```\n\n我们在这里只添加了几处对新方法的调用。如果碰撞是“友军误伤”，比如两个敌人相互碰撞，我们会告诉它们中的每一个，它收到了来自另一个的友好碰撞。否则，在确定谁攻击了谁之后，我们告诉被攻击者它受到了另一个物体的攻击。最后，我们从\
  \ `playerBullets` 或 `enemies` 节点中移除攻击者（无论它可能在哪个节点中）。我们告诉每个节点移除攻击者，尽管它只可能存在于其中之一，但这没问题。告诉一个节点移除它没有的子节点并不是错误——只是没有任何效果。\n\
  \n### 为敌人添加自定义碰撞行为\n\n现在所有准备工作就绪，我们可以通过重写添加到 `SKNode` 的类别方法，为我们的节点实现一些特定的行为。\n\n\
  选择 `EnemyNode.m`。在文件顶部添加 `Geometry.h` 的导入：\n\n```objc\n#import \"PhysicsCategories.h\"\
  \n#import \"Geometry.h\"\n\n@implementation EnemyNode\n```\n\n接下来添加以下两个方法：\n\n```objc\n\
  - (void)friendlyBumpFrom:(SKNode *)node {\n    self.physicsBody.affectedByGravity\
  \ = YES;\n}\n\n- (void)receiveAttacker:(SKNode *)attacker contact:(SKPhysicsContact\
  \ *)contact {\n    self.physicsBody.affectedByGravity = YES;\n    CGVector force\
  \ = VectorMultiply(attacker.physicsBody.velocity,\n                            \
  \           contact.collisionImpulse);\n    CGPoint myContact = [self.scene convertPoint:contact.contactPoint\n\
  \                                          toNode:self];\n    [self.physicsBody\
  \ applyForce:force\n                         atPoint:myContact];\n}\n```\n\n第一个方法\
  \ `friendlyBumpFrom:` 简单地开启受影响敌人的重力。所以，如果一个敌人在运动中撞到了另一个敌人，第二个敌人会突然受到重力影响并开始向下坠落。\n\
  \n`receiveAttacker:contact:` 方法在敌人被子弹击中时调用，它首先开启敌人的重力。然而，它还利用传入的碰撞数据来确定碰撞发生的位置，并对该点施加一个力，在子弹发射的方向上给敌人一个额外的推力。\n\
  \n### 显示准确的玩家生命值\n\n运行游戏，你会发现你可以射击敌人，将它们击落。你还会看到任何被落下的敌人撞到的其他敌人也会随之坠落。\n\n\n\n**注意**\
  \ 在每个关卡开始时，世界物理模拟会执行一步操作，以确保物理实体之间不会发生重叠。这会在更高关卡产生一个有趣的副作用：随机放置的多个敌人占据重叠空间的可能性会越来越大。每当这种情况发生时，敌人会立即被移开以停止重叠，同时我们的碰撞处理代码会被触发，进而开启重力让它们坠落！这个行为并非我们最初设计游戏时计划好的，但它却成了一个意外的“惊喜”，让更高关卡逐渐变得更困难，因此我们决定让物理模拟自然进行下去！\n\
  \n如果你让敌人坠落时击中自己，玩家生命值会减少，但……等等，它一直显示为`5`！生命值显示是在关卡创建时设置的，但之后从未更新过。幸运的是，这很容易修复：在`GameScene.m`中实现`setPlayerLives:`设置方法，而不是使用自动合成的设置方法，如下所示：\n\
  \n```\n- (void)setPlayerLives:(NSUInteger)playerLives  {\n    _playerLives = playerLives;\n\
  \    SKLabelNode *lives = (id)[self childNodeWithName:@\"LivesLabel\"];\n    lives.text\
  \ = [NSString stringWithFormat:@\"Lives: %lu\",\n                  (unsigned long)_playerLives];\n\
  }\n```\n\n上述代码段使用我们之前与标签关联的名称（在`initWithSize:level:`方法中）重新找到标签并设置新文本值。再次运行游戏，你会发现，当敌人如雨点般击中你的玩家时，生命值会减少到零。但游戏并不会结束。在下次受到攻击后，你最终会得到非常多的生命值，正如你在图\
  \ 17-10 中看到的那样。\n\n![9781484202005_Fig17-10.jpg](img/9781484202005_Fig17-10.jpg)\n\
  \n图 17-10. 这么多生命值\n\n那么这是怎么回事呢？实际上，我们使用了一个无符号整数来存储生命值。当使用无符号整数且数值降到零以下时，它会绕过零边界，最终变成允许的最大无符号整数值！\n\
  \n这个问题的根源在于我们还没有编写任何检测游戏结束的代码；也就是说，当玩家生命值降到零的时刻。我们很快就会处理这个问题，但首先让我们让屏幕上的碰撞效果更刺激一些。\n\
  \n## 用粒子系统增添趣味\n\nSprite Kit 的一个优秀特性是内置了粒子系统。粒子系统在游戏中用于创建模拟烟雾、火焰、爆炸等视觉效果。目前，当我们的子弹击中敌人或敌人击中玩家时，攻击对象只是简单地闪烁消失。让我们创建几个粒子系统来改善这种情况！\n\
  \n首先按 ![image](img/flower.jpg)**N** 调出“新建文件”助手。在左侧选择 **iOS/资源** 部分，然后在右侧选择 **SpriteKit\
  \ 粒子文件**。点击 **下一步**，在接下来的屏幕上选择 **火花** 粒子模板。再次点击 **下一步**，并将此文件命名为 `MissileExplosion.sks`。\n\
  \n### 你的第一个粒子\n\n你会看到 Xcode 创建了粒子文件，并向项目中添加了一个名为 `spark.png` 的新资源。同时，整个 Xcode 编辑区域会切换到新的粒子文件，显示出一个巨大的、动画爆炸效果。\n\
  \n我们不希望子弹击中敌人时出现如此夸张和巨大的效果，因此让我们重新配置一下。定义此粒子动画的所有属性都可以在 SKNode 检测器中找到，按 **Opt-Cmd-7**\
  \ 即可调出。图 17-11 同时显示了巨大的爆炸效果和检测器。\n\n![9781484202005_Fig17-11.jpg](img/9781484202005_Fig17-11.jpg)\n\
  \n图 17-11. 爆炸城市！右侧显示的参数定义了默认粒子的外观\n\n现在，对于子弹击中效果，让我们将其做成一个小得多的爆炸。它将有一组完全不同的参数，你可以在检测器中直接配置。首先，通过点击底部颜色渐变中的小色块并将其设置为黑色，来修复颜色以匹配我们的游戏外观。接下来，将背景色更改为白色，并将混合模式更改为\
  \ `Alpha`。现在你会看到火焰喷泉变成了墨黑色。\n\n其余参数都是数字型的。请逐个修改它们，全部设置为图 17-12 中所示的值。每一步你都会看到粒子效果发生变化，直到最终达到目标外观。\n\
  \n![9781484202005_Fig17-12.jpg](img/9781484202005_Fig17-12.jpg)\n\n图 17-12. 这是我们想要的最终导弹爆炸粒子效果\n\
  \n现在创建另一个粒子系统，同样使用火花模板。将其命名为 `EnemyExplosion.sks`，并按照图 17-13 所示设置其参数。\n\n![9781484202005_Fig17-13.jpg](img/9781484202005_Fig17-13.jpg)\n\
  \n图 17-13. 这是我们想要创建的敌人爆炸效果。如果你看到的这本书是黑白的，我们在底部颜色渐变中选择的颜色是深红色\n\n**注意** 添加第二个粒子文件后，你可能会在项目导航器中找到两个\
  \ `spark.png` 文件副本，并在活动视图中看到警告。通过右键单击其中一个文件并选择“删除”来修复此问题。\n\n### 将粒子放入场景\n\n现在让我们开始使用这些粒子。切换到\
  \ `EnemyNode.m`，并将以下粗体代码添加到 `receiveAttacker:contact:` 方法的末尾：\n\n```\n- (void)receiveAttacker:(SKNode\
  \ *)attacker contact:(SKPhysicsContact *)contact {\n    self.physicsBody.affectedByGravity\
  \ = YES;\n    CGVector force = VectorMultiply(attacker.physicsBody.velocity,\n \
  \                                      contact.collisionImpulse);\n    CGPoint myContact\
  \ = [self.scene convertPoint:contact.contactPoint\n                            \
  \              toNode:self];\n    [self.physicsBody applyForce:force\n         \
  \                atPoint:myContact];\n\nNSString *path = [[NSBundle mainBundle]\
  \ pathForResource:@\"MissileExplosion\"\n                                      \
  \               ofType:@\"sks\"];\n    SKEmitterNode *explosion = [NSKeyedUnarchiver\
  \ unarchiveObjectWithFile:path];\n    explosion.numParticlesToEmit = 20;\n    explosion.position\
  \ = contact.contactPoint;\n    [self.scene addChild:explosion];\n}\n```\n\n运行游戏，射击一些敌人，你会看到每个子弹击中敌人时都会产生一个漂亮的爆炸效果，如图\
  \ 17-14 所示。\n\n![9781484202005_Fig17-14.jpg](img/9781484202005_Fig17-14.jpg)\n\n\
  图 17-14. 子弹撞击后的完美爆炸效果\n\n很好！现在让我们对敌人撞击玩家飞船的情况进行类似处理。选择 `PlayerNode.m` 并添加以下方法：\n\
  \n```\n- (void)receiveAttacker:(SKNode *)attacker contact:(SKPhysicsContact *)contact\
  \ {\n    NSString *path = [[NSBundle mainBundle] pathForResource:@\"EnemyExplosion\"\
  \n                                                     ofType:@\"sks\"];\n    SKEmitterNode\
  \ *explosion =\n           [NSKeyedUnarchiver unarchiveObjectWithFile:path];\n \
  \   explosion.numParticlesToEmit = 50;\n    explosion.position = contact.contactPoint;\n\
  \    [self.scene addChild:explosion];\n}\n```\n\n再次运行游戏，你会看到每次敌人撞击玩家时都会出现漂亮的红色爆炸效果，如图\
  \ 17-15 所示。\n\n![9781484202005_Fig17-15.jpg](img/9781484202005_Fig17-15.jpg)\n\n\
  图 17-15. 好痛！\n\n\n\n这些改动虽然非常简单，却能显著提升游戏的整体体验。现在当物体发生碰撞时，你能够看到视觉反馈，从而清楚地知道有事情发生了。\n\
  \n## 结束游戏\n\n如前所述，目前游戏中存在一个小问题。当生命值归零时，我们需要结束游戏。我们的做法是创建一个新的场景类，用于在游戏结束时进行过渡。之前从某一关卡切换到下一关卡时，你已经见过我们如何进行场景过渡。这次的操作类似，但会使用一个新的类。\n\
  \n因此，请创建一个新的 iOS/Cocoa Touch 类。将父类设置为 `SKScene`，并将新类命名为 `GameOverScene`。\n\n我们先实现一个非常简单的版本——它只显示“Game\
  \ Over”文字，不做其他任何事情。为此，我们需要在 *GameOverScene.m* 的 `@implementation` 中添加以下代码：\n\n```\n\
  - (instancetype)initWithSize:(CGSize)size {\n    if (self = [super initWithSize:size])\
  \ {\n        self.backgroundColor = [SKColor purpleColor];\n        SKLabelNode\
  \ *text = [SKLabelNode labelNodeWithFontNamed:@\"Courier\"];\n        text.text\
  \ = @\"Game Over\";\n        text.fontColor = [SKColor whiteColor];\n        text.fontSize\
  \ = 50;\n        text.position = CGPointMake(self.frame.size.width * 0.5,\n    \
  \                                self.frame.size.height * 0.5);\n        [self addChild:text];\n\
  \    }\n    return self;\n}\n```\n\n现在让我们切换回 *GameScene.m*。我们需要在文件顶部导入新场景的头文件：\n\
  \n```\n#import \"GameScene.h\"\n#import \"PlayerNode.h\"\n#import \"EnemyNode.h\"\
  \n#import \"BulletNode.h\"\n#import \"SKNode+Extra.h\"\n#import \"GameOverScene.h\"\
  \n```\n\n游戏结束时需要执行的基本操作，由一个名为 `triggerGameOver` 的新方法定义。在这里，我们既展示一个额外的爆炸效果，又触发一个过渡到刚刚创建的新场景的动画：\n\
  \n```\n- (void)triggerGameOver {\n    self.finished = YES;\n\n    NSString *path\
  \ = [[NSBundle mainBundle] pathForResource:@\"EnemyExplosion\"\n               \
  \                                      ofType:@\"sks\"];\n    SKEmitterNode *explosion\
  \ =\n               [NSKeyedUnarchiver unarchiveObjectWithFile:path];\n    explosion.numParticlesToEmit\
  \ = 200;\n    explosion.position = _playerNode.position;\n    [self addChild:explosion];\n\
  \    [_playerNode removeFromParent];\n\n    SKTransition *transition =\n       \
  \        [SKTransition doorsOpenVerticalWithDuration:1.0];\n    SKScene *gameOver\
  \ = [[GameOverScene alloc] initWithSize:self.frame.size];\n    [self.view presentScene:gameOver\
  \ transition:transition];\n}\n```\n\n接下来，创建这个用于检查游戏是否结束的新方法：如果游戏结束则调用 `triggerGameOver`，并返回\
  \ `YES` 表示游戏已结束；否则返回 `NO` 表示游戏仍在进行：\n\n```\n- (BOOL)checkForGameOver {\n    if (self.playerLives\
  \ == 0) {\n        [self triggerGameOver];\n        return YES;\n    }\n    return\
  \ NO;\n}\n```\n\n最后，在现有的 `update:` 方法中添加一项检查。它首先检查游戏结束状态，并且只有在游戏仍在进行时才检查是否可能进入下一关。否则，如果关卡中最后一个敌人刚好夺走玩家最后一条命，就有可能同时触发两次场景过渡！\n\
  \n```\n- (void)update:(CFTimeInterval)currentTime {\n    if (self.finished) return;\n\
  \n    [self updateBullets];\n    [self updateEnemies];\n    if (![self checkForGameOver])\
  \ {\n        [self checkForNextLevel];\n    }\n}\n```\n\n现在再次运行游戏，让坠落的敌人对你的飞船造成五次伤害，你就会看到游戏结束画面，如图\
  \ Figure 17-16 所示。\n\n![9781484202005_Fig17-16.jpg](img/9781484202005_Fig17-16.jpg)\n\
  \nFigure 17-16。结束了，老兄。游戏结束，老兄——游戏结束了\n\n## 最后，新开始：创建 StartScene\n\n这就引出了另一个问题：游戏结束后我们该怎么办？我们可以让玩家通过点击来重新开始游戏；但在考虑这个问题的同时，我脑海中闪过一个念头。难道这个游戏不应该有一个开始画面吗？这样玩家在启动游戏时就不会立刻被投入到游戏中去。而且，游戏结束画面难道不应该带你回到开始画面吗？当然，这两个问题的答案都是肯定的！继续创建另一个新的\
  \ iOS/Cocoa Touch 类，依然使用 `SKScene` 作为父类，这次取名为 `StartScene`。\n\n我们要制作一个极其简单的开始场景。它只需要显示一些文本，并在用户点击任意位置时开始游戏。将\
  \ *StartScene.m* 中所有加粗的代码添加进去，即可完成这个类：\n\n```\n#import \"StartScene.h\"\n#import\
  \ \"GameScene.h\"\n\n@implementation StartScene\n\n- (instancetype)initWithSize:(CGSize)size\
  \ {\n    if (self = [super initWithSize:size]) {\n        self.backgroundColor =\
  \ [SKColor greenColor];\n\n        SKLabelNode *topLabel = [SKLabelNode labelNodeWithFontNamed:@\"\
  Courier\"];\n        topLabel.text = @\"TextShooter\";\n        topLabel.fontColor\
  \ = [SKColor blackColor];\n        topLabel.fontSize = 48;\n        topLabel.position\
  \ = CGPointMake(self.frame.size.width * 0.5,\n                                 \
  \   self.frame.size.height * 0.7);\n        [self addChild:topLabel];\n\n      \
  \  SKLabelNode *bottomLabel = [SKLabelNode labelNodeWithFontNamed:\n           \
  \                                 @\"Courier\"];\n        bottomLabel.text = @\"\
  Touch anywhere to start\";\n        bottomLabel.fontColor = [SKColor blackColor];\n\
  \        bottomLabel.fontSize = 20;\n        bottomLabel.position = CGPointMake(self.frame.size.width\
  \ * 0.5,\n                                        self.frame.size.height * 0.3);\n\
  \        [self addChild:bottomLabel];\n\n    }\n    return self;\n}\n\n- (void)touchesBegan:(NSSet\
  \ *)touches withEvent:(UIEvent *)event {\n    SKTransition *transition = [SKTransition\
  \ doorwayWithDuration:1.0];\n    SKScene *game = [[GameScene alloc] initWithSize:self.frame.size];\n\
  \    [self.view presentScene:game transition:transition];\n}\n\n@end\n```\n\n现在回到\
  \ *GameOverScene.m*，让游戏结束场景过渡到开始场景。添加这个头文件导入：\n\n```\n#import \"GameOverScene.h\"\
  \n#import \"StartScene.h\"\n```\n\n然后添加以下代码：\n\n```\n- (void)didMoveToView:(SKView\
  \ *)view {\n    dispatch_after(\n            dispatch_time(DISPATCH_TIME_NOW, (int64_t)(3.0\
  \ * NSEC_PER_SEC)),\n            dispatch_get_main_queue(), ^{\n        SKTransition\
  \ *transition = [SKTransition flipVerticalWithDuration:1.0];\n        SKScene *start\
  \ = [[StartScene alloc] initWithSize:self.frame.size];\n        [self.view presentScene:start\
  \ transition:transition];\n    });\n}\n```\n\n如你之前所见，`didMoveToView:` 方法在场景被放置到视图上后会被调用。这里，我们简单地触发一个三秒的暂停，然后过渡回开始场景。\n\
  \n现在还差最后一块拼图，就能让我们的所有场景按预期相互过渡了。我们需要修改应用的启动流程，使其在启动时直接跳转到开始画面，而不是直接进入游戏。这需要回到 *GameViewController.m*，我们首先要导入开始场景的头文件：\n\
  \n```\n#import \"GameViewController.h\"\n#import \"GameScene.h\"\n#import \"StartScene.h\"\
  \n```\n\n然后，在 `viewDidLoad` 方法中，我们只需将创建某个场景类的代码替换为另一个：\n\n```\n// Create and configure\
  \ the scene.\nGameScene *scene =\n     [GameScene sceneWithSize:self.view.frame.size\
  \ levelNumber:1];\nSKScene * scene = [StartScene sceneWithSize:skView.bounds.size];\n\
  ```\n\n现在试一试吧！启动应用，你会看到开始场景。点击屏幕，开始游戏，经历多次“死亡”，你就会进入游戏结束场景。等待几秒钟，你会回到开始画面，如图 Figure\
  \ 17-17 所示。\n\n![9781484202005_Fig17-17.jpg](img/9781484202005_Fig17-17.jpg)\n\n\
  \n\n# 图 17-17：终于，我们到达了开始画面！\n\n## 一音胜过千张图\n\n我们一直在开发一款视频游戏，而电子游戏向来以嘈杂著称，但我们的游戏却完全静音！幸运的是，Sprite\
  \ Kit 提供了极为易用的音频播放代码。在本章源代码的 *17 – Sound Effects* 文件夹中，你可以找到准备好的音频文件：*enemyHit.wav*、*gameOver.wav*、*gameStart.wav*、*playerHit.wav*\
  \ 和 *shoot.wav*。将它们全部拖入 Xcode 的项目导航器中。\n\n**注意** 这些音效是使用优秀的开源 CFXR 应用程序（可从 `https://github.com/nevyn/cfxr`\
  \ 获取）创建的。如果你需要古怪的小音效，CFXR 是难以超越的选择！\n\n现在，我们将为这些音效逐一添加简易的播放功能。首先打开 *BulletNode.m*，在\
  \ `bulletFrom:toward:` 方法的末尾、`return` 语句之前添加加粗显示的代码：\n\n```\n[bullet runAction:[SKAction\
  \ playSoundFileNamed:@\"shoot.wav\"\n                             waitForCompletion:NO]];\n\
  ```\n\n接下来，切换到 *EnemyNode.m*，在 `receiveAttacker:contact:` 方法的末尾添加以下代码：\n\n```\n\
  [self runAction:[SKAction playSoundFileNamed:@\"enemyHit.wav\"\n               \
  \            waitForCompletion:NO]];\n```\n\n现在在 *PlayerNode.m* 中执行极其相似的操作，在 `receiveAttacker:contact:`\
  \ 方法的末尾添加这些代码：\n\n```\n[self runAction:[SKAction playSoundFileNamed:@\"playerHit.wav\"\
  \n                           waitForCompletion:NO]];\n```\n\n这些游戏内的音效暂时已经足够。现在运行游戏来试听一下效果。我想你会赞同，仅仅添加粒子效果和音效，游戏体验就大大提升了。\n\
  \n现在，让我们再为游戏开始和结束添加一些效果。在 *StartScene.m* 中，在 `touchesBegan:withEvent:` 方法的末尾添加这些代码：\n\
  \n```\n[self runAction:[SKAction playSoundFileNamed:@\"gameStart.wav\"\n       \
  \                    waitForCompletion:NO]];\n```\n\n最后，在 *GameScene.m* 的 `triggerGameOver`\
  \ 方法末尾添加这些代码：\n\n```\n[self runAction:[SKAction playSoundFileNamed:@\"gameOver.wav\"\
  \n                           waitForCompletion:NO]];\n```\n\n现在当你玩游戏时，各种悦耳的哔哔声和啵啵声将充斥耳畔，就像你小时候那样！或者也许是你父母小时候。甚至是你祖父母小时候！相信我，过去的游戏听起来差不多都是这样。\n\
  \n## 增加游戏难度：力场\n\niOS 8 中 Sprite Kit 新增的一个有趣功能是能够在场景中放置力场。力场具有类型、位置、生效区域以及多个指定其行为方式的属性。其原理是，当物体在力场区域内移动时，该场会扰动其运动。你可以直接使用多种标准力场，只需创建并配置一个实例，然后添加到场景中即可。如果你志向远大，甚至可以创建自定义力场。关于标准力场及其行为（包括重力场、电场、磁场和湍流）的列表，请查阅\
  \ `SKFieldNode` 类的 API 文档。\n\n为了让游戏更具挑战性，我们将在场景中添加一些径向重力场。径向重力场的作用类似于集中在一点的大质量。当物体穿过径向重力场区域时，会被偏转向该点（或者如果按你的配置要求，也可以是偏离该点），这很像一颗距离地球足够近的流星飞过时被引力牵引。我们将安排这些重力场作用于导弹，这样你将无法总是直接瞄准敌人并确保击中。让我们开始吧。\n\
  \n首先，我们需要在 *PhysicsCategories.h* 中添加一个新类别。在该文件中进行以下修改，不要忘记在 `PlayerMissileCategory`\
  \ 定义末尾添加逗号：\n\n```\ntypedef NS_OPTIONS(uint32_t, PhysicsCategory) {\n    PlayerCategory\
  \        =  1 << 1,\n    EnemyCategory         =  1 << 2,\n    PlayerMissileCategory\
  \ =  1 << 3,\n    GravityFieldCategory  =  1 << 4\n};\n```\n\n如果节点物理体中的 `fieldBitMask`\
  \ 与力场的 `categoryBitMask` 有任意共同类别，该力场就会对该节点起作用。默认情况下，物理体的 `fieldBitMask` 设置了所有类别。因为我们不希望敌人受重力场影响，所以需要在\
  \ *EnemyNode.m* 中通过添加以下代码来清除其 `fieldBitMask`：\n\n```\n- (void)initPhysicsBody {\n\
  \    SKPhysicsBody *body = [SKPhysicsBody bodyWithRectangleOfSize:\n           \
  \                CGSizeMake(40, 40)];\n    body.affectedByGravity = NO;\n    body.categoryBitMask\
  \ = EnemyCategory;\n    body.contactTestBitMask = PlayerCategory|EnemyCategory;\n\
  \    body.mass = 0.2;\n    body.angularDamping = 0.0f;\n    body.linearDamping =\
  \ 0.0f;\n    body.fieldBitMask = 0;\n    self.physicsBody = body;\n}\n```\n\n在 *PlayerNode.m*\
  \ 中进行类似的修改：\n\n```\n- (void)initPhysicsBody {\n    SKPhysicsBody *body = [SKPhysicsBody\
  \ bodyWithRectangleOfSize:\n                           CGSizeMake(20, 20)];\n  \
  \  body.affectedByGravity = NO;\n    body.categoryBitMask = PlayerCategory;\n  \
  \  body.contactTestBitMask = EnemyCategory;\n    body.collisionBitMask = 0;\n  \
  \  body.fieldBitMask = 0;\n    self.physicsBody = body;\n}\n```\n\n导弹节点即使我们不施加操作也会响应重力场，因为其物理体默认设置了所有场类别，但为了更清晰，我们明确地进行设置，在\
  \ *BulletNode.m* 中做如下修改：\n\n```\n- (instancetype)init {\n    if (self = [super init])\
  \ {\n        SKLabelNode *dot = [SKLabelNode labelNodeWithFontNamed:@\"Courier\"\
  ];\n        dot.fontColor = [SKColor blackColor];\n        dot.fontSize = 40;\n\
  \        dot.text = @\".\";\n        [self addChild:dot];\n\n        SKPhysicsBody\
  \ *body = [SKPhysicsBody bodyWithCircleOfRadius:1];\n        body.dynamic = YES;\n\
  \        body.categoryBitMask = PlayerMissileCategory;\n        body.contactTestBitMask\
  \ = EnemyCategory;\n        body.collisionBitMask = EnemyCategory;\n        body.fieldBitMask\
  \ = GravityFieldCategory;\n        body.mass = 0.01;\n\n        self.physicsBody\
  \ = body;\n        self.name = [NSString stringWithFormat:@\"Bullet %p\", self];\n\
  \    }\n    return self;\n}\n```\n\n其余修改将在文件 *GameScene.m* 中进行。我们将添加三个重力场，其中心位于场景中心略下方的随机点。就像处理导弹和敌人一样，我们将力场节点添加到一个父节点，然后将该父节点添加到场景中。在\
  \ `GameScene` 的类扩展中添加父节点的定义：\n\n```\n@interface GameScene () <SKPhysicsContactDelegate>\n\
  \n@property (strong, nonatomic) PlayerNode *playerNode;\n@property (strong, nonatomic)\
  \ SKNode *enemies;\n@property (strong, nonatomic) SKNode *playerBullets;\n@property\
  \ (strong, nonatomic) SKNode *forceFields;\n\n@end\n```\n\n在 `initWithSize:level:`\
  \ 方法的末尾，添加代码来分配 `forceFields` 节点、将其添加到场景并创建实际的力场节点：\n\n```\n_playerBullets = [SKNode\
  \ node];\n[self addChild:_playerBullets];\n\n_forceFields = [SKNode node];\n[self\
  \ addChild:_forceFields];\n[self createForceFields];\n\nself.physicsWorld.gravity\
  \ = CGVectorMake(0, -1);\nself.physicsWorld.contactDelegate = self;\n```\n\n最后，添加\
  \ `createForceFields` 方法的实现：\n\n```\n- (void)createForceFields {\n    static int\
  \ fieldCount = 3;\n    CGSize size = self.frame.size;\n    float sectionWidth =\
  \ size.width/fieldCount;\n    for (NSUInteger i = 0; i < fieldCount; i++) {\n  \
  \      CGFloat x = i * sectionWidth + arc4random_uniform(sectionWidth);\n      \
  \  CGFloat y = arc4random_uniform(size.height * 0.25)\n                       +\
  \ (size.height * 0.25);\n```\n\n\n```objc\nSKFieldNode *gravityField = [SKFieldNode\
  \ radialGravityField];\ngravityField.position = CGPointMake(x, y);\ngravityField.categoryBitMask\
  \ = GravityFieldCategory;\ngravityField.strength = 4;\ngravityField.falloff = 2;\n\
  gravityField.region = [[SKRegion alloc]\n       initWithSize:CGSizeMake(size.width\
  \ * 0.3, size.height * 0.1)];\n[self.forceFields addChild:gravityField];\n\nSKLabelNode\
  \ *fieldLocationNode =\n          [SKLabelNode labelNodeWithFontNamed:@\"Courier\"\
  ];\nfieldLocationNode.fontSize = 16;\nfieldLocationNode.fontColor = [SKColor redColor];\n\
  fieldLocationNode.name = @\"GravityField\";\nfieldLocationNode.text = @\"*\";\n\
  fieldLocationNode.position = CGPointMake(x, y);\n[self.forceFields addChild:fieldLocationNode];\n\
  ```\n\n所有力场都由 `SKFieldNode` 类的实例表示。对于每种类型的场，`SKFieldNode` 类都提供了一个工厂方法，用于创建该类型场的节点。这里，我们使用\
  \ `radialGravityFieldNode` 方法创建了三个径向重力场实例，并将它们放置在场景中心下方的一个带状区域中。`strength` 和 `falloff`\
  \ 属性控制着重力场的强度，以及它随距离场节点远近而衰减的速度。`falloff` 值为 2 时，力的大小与场节点和受影响对象之间距离的平方成反比，这与现实世界中的规律一致。正值的力会使场节点吸引其他对象。你可以尝试不同的\
  \ `strength` 值，包括负值，来观察效果如何变化。我们还在与重力场相同的位置创建了三个 `SKLabelNode`，以便玩家可以看到它们的位置。这就是我们需要做的全部工作。构建并运行应用程序，观察当你的子弹飞近场景中某个红色星号时会发生什么！\n\
  \n## 游戏开始\n\n尽管 TextShooter 在外观上可能很简单，但你在本章中学到的技术构成了使用 Sprite Kit 进行各种游戏开发的基础。你学会了如何在多个节点类之间组织代码，如何利用节点图将对象分组，以及更多技巧。你也初步体验了逐步添加功能来构建此类游戏的过程，并在这一过程中不断发现新知。当然，我们并没有展示我们在开发过程中犯下的所有错误——即便如此，这本书已经超过\
  \ 700 页了——但即使算上这些错误，这款应用也完全是按照本章展示的大致顺序，在短短几个小时内从零开始构建的。\n\n一旦上手，Sprite Kit 能让你在短时间内构建出大量的结构。正如你所见，如果没有现成的图片，你可以使用基于文本的精灵。如果之后想将它们替换为真正的图形，那也完全没问题。一位早期读者甚至指出了一条中间路线：“与其在源代码的字符串中使用普通的\
  \ ASCII 文本，你还可以通过 Apple 的字符查看器输入源插入表情符号字符。”实现这一点就留给读者作为练习了！\n\n## 第 18 章：点击、触摸与手势\n\
  \niPhone、iPod touch 和 iPad 的屏幕——清晰、明亮、触控灵敏——堪称艺术品和工程学的杰作。所有 iOS 设备共有的多点触控屏幕是该平台拥有极强易用性的关键因素之一。由于屏幕能够同时检测多个触摸点并独立追踪它们，应用程序可以检测到各种各样的手势，为用户提供超越传统界面的操作能力。\n\
  \n假设你在“邮件”应用中，正盯着一个需要删除的长长的垃圾邮件列表。你可以逐个点击每封邮件，点击垃圾箱图标将其删除，然后等待下一封邮件下载，依次删除每一封。如果你希望在删除前阅读每封邮件，这种方法是最好的。\n\
  \n或者，在邮件列表中，你可以点击右上角的 `编辑` 按钮，点击每一行邮件进行标记，然后点击 `垃圾箱` 按钮删除所有已标记的邮件。如果你不需要在删除前阅读每封邮件，这种方法是最好的。另一种方法是，在列表中从右向左滑动一封邮件。这个手势会为该邮件显示一个\
  \ `更多` 按钮和一个 `垃圾箱` 按钮。点击 `垃圾箱` 按钮，邮件即被删除。\n\n这个例子只是多点触控显示屏所带来的无数手势中的一种。观看图片时，你可以双指捏合来缩小，或双指张开来放大。在主屏幕上，你可以长按一个图标来开启“晃动模式”，从而可以从\
  \ iOS 设备上删除应用程序。\n\n在本章中，我们将探讨用于检测手势的底层架构。你将学习如何检测最常见的手势，以及如何创建和检测一个全新的手势。\n\n###\
  \ 多点触控术语\n\n在深入探讨架构之前，我们先了解一些基本词汇。首先，**手势** 是指从你用一个或多个手指触摸屏幕开始，直到你将手指从屏幕上抬起为止所发生的任何事件序列。无论需要多长时间，只要有一个或多个手指保持在屏幕上，你就仍处在一个手势之中（除非被系统事件，如来电，打断）。请注意，Cocoa\
  \ Touch 并没有暴露任何代表手势的类或结构体。从某种意义上说，手势是一个动词，正在运行的应用程序可以观察用户输入流，以判断是否有手势发生。\n\n手势通过一系列\
  \ **事件** 在系统中传递。当你与设备的多点触控屏幕交互时，便会生成事件。这些事件包含了关于所发生的触摸行为的信息。\n\n术语 **触摸** 指的是手指在屏幕上放下、在屏幕上拖动或从屏幕上抬起。一个手势中涉及的触摸数量等于同时放在屏幕上的手指数量。你实际上可以五个手指都放在屏幕上，只要它们彼此之间不太靠近，iOS\
  \ 就能识别并追踪所有手指。现在，并没有太多有用的五指手势，但知道 iOS 在必要时可以处理这么多手指也挺好的。事实上，实验表明 iPad 最多可以处理 11\
  \ 个同时触摸！这看起来可能有些过剩，但如果你正在开发一款多人游戏，多个玩家同时与屏幕交互，这就很有用了。\n\n**点击** 发生在你用一根手指触摸屏幕，然后立即将手指抬起而不移动时。iOS\
  \ 设备会记录点击次数，并能告诉你用户是双击、三击，甚至是 20 击。例如，它会处理所有必要的时序和其他工作，以区分两次单击和一次双击。\n\n**手势识别器**\
  \ 是一个对象，它知道如何观察用户生成的事件流，并在用户以匹配预定义手势的方式进行触摸和拖动时进行识别。`UIGestureRecognizer` 类及其各种子类可以帮助你在想要观察常见手势时省去大量工作。这个类很好地封装了查找手势的工作，并且可以轻松地应用于应用程序中的任何视图。\n\
  \n在本章的第一部分，你将看到当用户用一个或多个手指触摸屏幕时报告的事件，以及如何追踪手指在屏幕上的移动。你可以在自定义视图或应用程序委托中使用这些事件来处理手势。接下来，我们将介绍\
  \ iOS SDK 附带的一些手势识别器，最后，你将看到如何构建自己的手势识别器。\n\n### 响应者链\n```\n\n\n由于手势通过系统事件传递，而事件通过响应者链传递，因此你需要了解响应者链的工作原理才能正确处理手势。如果你使用过\
  \ macOS 的 Cocoa 框架，可能对响应者链的概念已经熟悉，因为 Cocoa 和 Cocoa Touch 使用了相同的基本机制。如果这是一个全新的概念，不用担心，我们将解释它的工作原理。\n\
  \n## 响应事件\n\n本书中多次提到**第一响应者**，它通常是用户当前正在交互的对象。第一响应者是响应者链的起点，但并非孤立的。链中始终存在其他响应者。在一个运行的应用程序中，响应者链是一组能够响应事件的动态对象集合。任何以\
  \ `UIResponder` 作为父类的类都是响应者。`UIView` 是 `UIResponder` 的子类，而 `UIControl` 是 `UIView`\
  \ 的子类，因此所有视图和控件都是响应者。`UIViewController` 也是 `UIResponder` 的子类，这意味着它以及它的所有子类（如 `UINavigationController`\
  \ 和 `UITabBarController`）都是响应者。响应者之所以得名，是因为它们能够响应系统生成的事件，例如屏幕触摸。\n\n如果某个响应者不处理特定事件（如手势），它通常会将该事件沿响应者链向上传递。如果链中的下一个对象响应了该特定事件，它通常会消耗该事件，从而终止事件在响应者链中的传递。在某些情况下，如果响应者仅部分处理了事件，该响应者会执行某些操作并将事件转发给链中的下一个响应者。不过，这并非通常情况。通常情况下，当一个对象响应事件后，该事件的传递就到此为止。如果事件遍历整个响应者链后仍没有对象处理它，则该事件会被丢弃。\n\
  \n现在让我们更具体地了解响应者链。事件首先被传递给 `UIApplication` 对象，然后由它传递给应用程序的 `UIWindow`。`UIWindow`\
  \ 通过选择初始响应者来处理事件。初始响应者的选择规则如下：\n\n-   对于触摸事件，`UIWindow` 对象会确定用户触摸的视图，然后将事件提供给该视图或视图层级中更高视图上注册的任何手势识别器。如果某个手势识别器处理了该事件，则事件不会继续传递。否则，初始响应者就是被触摸的视图，事件将被传递给它。\n\
  -   对于用户摇晃设备（我们将在第 20 章中进一步讨论）或遥控设备生成的事件，事件会被传递给第一响应者。\n\n如果初始响应者没有处理事件，它会将事件传递给其父视图（如果有），或者传递给视图控制器（如果该视图是视图控制器的视图）。如果视图控制器没有处理事件，事件会继续沿响应者链向上传递，通过其父视图控制器的视图层级（如果有的话）。\n\
  \n如果事件在视图层级中一直向上传递，但未被任何视图或控制器处理，则事件会被传递给应用程序的窗口。如果窗口没有处理事件，`UIApplication` 对象会将其传递给应用程序委托（前提是该委托是\
  \ `UIResponder` 的子类，如果你使用 Apple 的应用程序模板创建项目，通常如此）。最后，如果应用委托不是 `UIResponder` 的子类或没有处理事件，那么该事件就会悄然消失。\n\
  \n这一过程因多种原因而重要。首先，它控制了手势的处理方式。假设用户正在查看一个表格，并在表格的某一行上滑动手指。哪个对象会处理这个手势？\n\n如果滑动发生在表格视图单元格的子视图或控件内，那么该视图或控件将有机会响应。如果它没有响应，表格视图单元格将获得机会。在类似\
  \ Mail 的应用程序中，滑动可用于删除消息，因此表格视图单元格可能需要检查该事件，以判断是否包含滑动手势。然而，大多数表格视图单元格并不响应手势。如果它们不响应，事件会向上传递到表格视图，然后继续沿响应者链向上传递，直到有对象响应它或到达终点。\n\
  \n## 转发事件：保持响应者链活跃\n\n让我们回到 Mail 应用程序中的表格视图单元格。我们不知道 Apple Mail 应用程序的内部细节；但假设该表格视图单元格只处理删除滑动操作。那么该表格视图单元格必须实现与接收触摸事件相关的方法（稍后讨论），以便检查该事件是否能被解释为滑动手势的一部分。如果事件匹配表格视图正在寻找的滑动操作，表格视图单元格就会执行操作，事件到此为止，不再继续传递。\n\
  \n如果事件与表格视图单元格的滑动手势不匹配，表格视图单元格有责任手动将该事件转发给响应者链中的下一个对象。如果它没有完成转发工作，表格及其链上的其他对象将永远没有机会响应，并且应用程序可能无法按用户期望的方式运行。该表格视图单元格可能会阻止其他视图识别手势。\n\
  \n每当响应触摸事件时，你都需要记住，你的代码并非在真空中工作。如果某个对象拦截了它不处理的事件，它需要手动传递该事件。实现方法之一是在下一个响应者上调用相同的方法。以下是一段虚构代码：\n\
  \n```\n- (void)respondToFictionalEvent:(UIEvent *)event {\n    if ([self shouldHandleEvent:event])\
  \ {\n        [self handleEvent:event];\n    } else {\n        [[self nextResponder]\
  \ respondToFictionalEvent:event];\n    }\n}\n```\n\n注意，我们在下一个响应者上调用了相同的方法。这就是成为良好响应者链成员的做法。幸运的是，大多数情况下，响应事件的方法也会消耗该事件。然而，重要的是要知道，如果情况并非如此，你需要确保将事件传递给响应者链中的下一个环节。\n\
  \n## 多点触控架构\n\n现在你对响应者链有了一定了解，让我们来看看处理手势的过程。正如我们指出的，手势被嵌入事件中，沿响应者链传递。这意味着处理多点触控屏幕任何交互的代码都需要包含在响应者链中的某个对象内。通常，这意味着我们可以选择将代码嵌入\
  \ `UIView` 的子类中，或者嵌入 `UIViewController` 中。\n\n那么，这段代码应该放在视图中还是视图控制器中呢？\n\n如果视图需要根据用户的触摸对自己执行某些操作，代码通常应放在定义该视图的类中。例如，许多控件类（如\
  \ `UISwitch` 和 `UISlider`）都会响应与触摸相关的事件。`UISwitch` 可能需要根据触摸来打开或关闭自身。创建 `UISwitch`\
  \ 类的开发人员将手势处理代码嵌入到该类中，以便 `UISwitch` 能够响应触摸。\n\n\n\n通常，当一个手势所处理的影响范围超出被触摸的对象本身时，手势代码应属于相关的视图控制器类。例如，如果用户在一个行上做出手势，指示应删除所有行，则该手势应由视图控制器中的代码处理。无论代码属于哪个类，你在两种情况下对触摸和手势的响应方式都是完全相同的。\n\
  \n### 四个触摸通知方法\n\n有四个方法用于通知响应者关于触摸的信息。当用户首次触摸屏幕时，系统会查找一个实现了 `touchesBegan:withEvent:`\
  \ 方法的响应者。要了解用户何时开始一个手势或轻点屏幕，请在你的视图或视图控制器中实现此方法。以下是该方法可能的样子示例：\n\n```\n- (void)touchesBegan:(NSSet\
  \ *)touches withEvent:(UIEvent *)event  {\n    NSUInteger numTaps = [[touches anyObject]\
  \ tapCount];\n    NSUInteger numTouches = [event.allTouches count];\n\n// Do something\
  \ here.\n}\n```\n\n此方法（以及每个与触摸相关的方法）接收一个名为 `touches` 的 `NSSet` 实例，以及一个 `UIEvent`\
  \ 实例，该实例有一个名为 `allTouches` 的属性，它是另一个触摸集合。以下是这两个触摸集合所包含内容的简单描述：\n\n-   `allTouches`\
  \ 属性包含每个当前按在屏幕上的手指的 `UITouch` 对象，无论该手指当前是否在移动。\n-   作为 `touches` 参数传递的 `NSSet` 包含每个刚刚被添加或从屏幕移除，或刚刚移动或停止移动的手指的\
  \ `UITouch` 对象。换句话说，它告诉你从上次调用你的触摸通知方法到现在之间发生了什么变化。\n\n每次手指首次触摸屏幕时，会分配一个新的 `UITouch`\
  \ 对象来表示该手指，并将其添加到传递给每个 `UIEvent` 的 `allTouches` 属性的集合中。所有未来报告该手指活动的 `UIEvent` 都将在\
  \ `allTouches` 集合和 `touches` 参数中包含相同的 `UITouch` 实例（尽管在 `touches` 参数中，如果该手指没有任何活动需要报告，它将不会出现），直到该手指从屏幕上移除。因此，要跟踪任意特定手指的活动，你需要监控其\
  \ `UITouch` 对象。\n\n你可以通过获取 `allTouches` 中对象的计数来确定当前按在屏幕上的手指数量。如果 `UIEvent` 报告了一次触摸，该触摸是某个手指一系列轻点的一部分，你可以从该手指的\
  \ `UITouch` 对象的 `tapCount` 属性获取轻点次数。如果只有一根手指触摸屏幕，或者你不关心询问哪根手指，你可以使用 `NSSet` 的 `anyObject`\
  \ 方法快速获取一个 `UITouch` 对象进行查询。在前面的示例中，`numTaps` 值为 `2` 告诉你屏幕被至少一根手指快速连续轻点了两次。类似地，`numTouches`\
  \ 值为 `2` 告诉你用户有两根手指在触摸屏幕。\n\n并非 `touches` 或 `allTouches` 中的所有对象都与实现此方法的视图或视图控制器相关。例如，一个表格视图单元格可能不关心位于其他行或导航栏中的触摸。你可以从\
  \ `UIEvent` 中获取落在特定视图内的触摸：\n\n```\nNSSet *myTouches = [event touchesForView:self.view];\n\
  ```\n\n每个 `UITouch` 代表一根不同的手指，每根手指在屏幕上的位置都不同。你可以使用 `UITouch` 对象找出特定手指的位置。如果你要求它，它甚至可以将该点转换为视图的本地坐标系：\n\
  \n```\nCGPoint point = [touch locationInView:self.view];\n```\n\n你可以通过实现 `touchesMoved:withEvent:`\
  \ 在用户移动手指时收到通知。此方法在长拖动过程中会被多次调用，每次调用时，你都会收到另一组触摸和另一个 `UIEvent`。除了能够从 `UITouch` 对象中找到每根手指的当前位置外，你还可以发现该触摸的先前位置，即上次调用\
  \ `touchesMoved:withEvent:` 或 `touchesBegan:withEvent:` 时手指的位置。\n\n当用户的任何手指从屏幕上移除时，会调用另一个方法\
  \ `touchesEnded:withEvent:`。当此方法被调用时，你就知道用户完成了一个手势。\n\n还有一个与触摸相关的最终方法，响应者可以实现它。它被称为\
  \ `touchesCancelled:withEvent:`，当用户在做一个手势的过程中被某些事件中断时（如电话响铃），就会调用此方法。这是你可以进行必要清理的地方，以便可以重新开始一个新的手势。当此方法被调用时，当前手势的\
  \ `touchesEnded:withEvent:` 将不会被调用。\n\n好了，理论够多了——让我们看看实际应用。\n\n### TouchExplorer\
  \ 应用程序\n\n我们将构建一个小应用程序，它能让您更好地了解四个触摸相关的响应者方法何时被调用。在 Xcode 中，使用 `Single View Application`\
  \ 模板创建一个新项目。将产品名称输入为 **TouchExplorer**，并从 `Devices` 弹出菜单中选择 **Universal**。\n\n`TouchExplorer`\
  \ 将在每次调用与触摸相关的方法时，向屏幕打印消息，指示触摸和轻点次数（参见 图 18-1）。\n\n![9781484202005_Fig18-01.jpg](img/9781484202005_Fig18-01.jpg)\n\
  \n图 18-1. TouchExplorer 应用程序\n\n**注意** 尽管本章中的应用程序可以在模拟器上运行，但除非你在真实的 iOS 设备上运行它们，否则你将无法看到所有可用的多点触控功能。如果你已付费加入\
  \ Apple 的 iOS 开发者计划，就可以在你选择的设备上运行你编写的程序。Apple 网站很好地引导你完成连接 Xcode 到设备所需的一切准备过程。\n\
  \n我们需要三个标签：一个用于指示最后调用了哪个方法，另一个用于报告当前的轻点次数，第三个用于报告触摸次数。单击 `ViewController.m`，并在文件顶部的类扩展中添加三个输出口：\n\
  \n```\n#import \"ViewController.h\"\n\n@interface ViewController ()\n\n@property\
  \ (weak, nonatomic) IBOutlet UILabel *messageLabel;\n@property (weak, nonatomic)\
  \ IBOutlet UILabel *tapsLabel;\n@property (weak, nonatomic) IBOutlet UILabel *touchesLabel;\n\
  \n@end\n```\n\n现在选择 `Main.storyboard` 来编辑 GUI。你会看到所有此类新项目中常见的空视图。将一个标签拖到视图上，使用蓝色辅助线将标签放置在视图的左上角。按住\
  \ **Option** 键，从原始标签再拖出两个标签，将它们一个接一个地垂直排列。这样就得到了三个标签（参见 图 18-1）。如果你感觉有点像毕加索，可以随意调整字体和颜色。\n\
  \n现在我们需要为标签设置自动布局约束。在文档大纲中，按住 Control 键从第一个标签拖拽到主视图并释放鼠标。按住 **Shift** 键，选择 **Top\
  \ Space to Top Layout Guide** 和 **Leading Space to Container Margin**，然后在弹出窗口外点击鼠标。对其余三个标签执行相同操作。\n\
  \n\n\n下一步是将标签连接到它们的插座。从`View Controller`图标按住 Control 键拖拽到三个标签上，将最上面的标签连接到`messageLabel`插座，中间的标签连接到`tapsLabel`插座，最后一个标签连接到`touchesLabel`插座。\n\
  \n最后，双击每个标签并按`Delete`键删除其文本。\n\n接下来，单击你正在处理的视图背景或文档大纲中的`View`图标，然后调出属性检查器（参见图 18-2）。在检查器中，转到视图部分，确保`User\
  \ Interaction Enabled`和`Multiple Touch`都已勾选。如果`Multiple Touch`未勾选，那么无论实际有多少根手指触摸手机屏幕，你的控制器类的触摸方法将始终只接收一次触摸。\n\
  \n![9781484202005_Fig18-02.jpg](img/9781484202005_Fig18-02.jpg)\n\n图 18-2。在视图属性中，确保同时勾选了用户交互已启用和多点触摸\n\
  \n完成后，切换回`ViewController.m`，并在类的`@implementation`部分添加以下代码：\n\n```\n@implementation\
  \ ViewController\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // 加载视图后执行任何额外的设置，通常来自\
  \ nib 文件。\n}\n\n- (void)didReceiveMemoryWarning\n{\n    [super didReceiveMemoryWarning];\n\
      // 处置任何可以重新创建的资源。\n}\n\n- (void)updateLabelsFromTouches:(NSSet *)touches {\n\
      NSUInteger numTaps = [[touches anyObject] tapCount];\n    NSString *tapsMessage\
  \ = [[NSString alloc]\n                             initWithFormat:@\"检测到 %ld 次点击\"\
  , (unsigned long)numTaps];\n    self.tapsLabel.text = tapsMessage;\n\nNSUInteger\
  \ numTouches = [touches count];\n    NSString *touchMsg = [[NSString alloc] initWithFormat:\n\
                            @\"检测到 %ld 次触摸\", (unsigned long)numTouches];\n    self.touchesLabel.text\
  \ = touchMsg;\n}\n\n#pragma mark - 触摸事件方法\n- (void)touchesBegan:(NSSet *)touches\
  \ withEvent:(UIEvent *)event {\n    self.messageLabel.text = @\"触摸开始\";\n    [self\
  \ updateLabelsFromTouches:event.allTouches];\n}\n\n- (void)touchesCancelled:(NSSet\
  \ *)touches withEvent:(UIEvent *)event {\n    self.messageLabel.text = @\"触摸已取消\"\
  ;\n    [self updateLabelsFromTouches: event.allTouches];\n}\n\n- (void)touchesEnded:(NSSet\
  \ *)touches withEvent:(UIEvent *)event {\n    self.messageLabel.text = @\"触摸结束。\"\
  ;\n    [self updateLabelsFromTouches: event.allTouches];\n}\n\n- (void)touchesMoved:(NSSet\
  \ *)touches withEvent:(UIEvent *)event {\n    self.messageLabel.text = @\"检测到拖动\"\
  ;\n    [self updateLabelsFromTouches: event.allTouches];\n}\n\n@end\n```\n\n在这个控制器类中，我们实现了之前讨论过的所有四个与触摸相关的方法。每个方法都设置`messageLabel`，以便用户可以看到每个方法被调用时的状态。接着，这四个方法都调用`updateLabelsFromTouches:`来更新另外两个标签。`updateLabelsFromTouches:`方法从其中一个触摸中获取点击次数，通过检查接收到的触摸集合的计数属性来确定触摸屏幕的手指数量，并用这些信息更新标签。\n\
  \n编译并运行应用程序。如果你在模拟器中运行，尝试反复点击屏幕来增加点击次数。你还应该尝试在视图中按住鼠标按钮并拖动，以模拟触摸并拖动操作。\n\n在 iOS\
  \ 模拟器中，你可以通过按住`Option`键同时用鼠标点击并拖拽来模拟双指捏合操作。你还可以模拟双指滑动：先按住`Option`键模拟捏合，移动鼠标使代表虚拟手指的两个点彼此相邻，然后按住`Shift`键（同时仍按住`Option`键）。按下`Shift`键会锁定两根手指的相对位置，使你能够进行滑动和其他双指手势。你无法进行需要三根或更多手指的手势，但通过`Option`和`Shift`键的组合，你可以在模拟器上完成大多数双指手势。\n\
  \n如果你能在设备上运行此程序，看看同一时间能注册多少次触摸。尝试用一根手指拖动，然后是两根手指，接着是三根。尝试双击和三击屏幕，看看能否通过用两根手指点击来增加点击次数。\n\
  \n动手实验 TouchExplorer 应用程序，直到你熟悉当前发生的事情以及四个触摸方法的工作方式为止。准备好后，继续学习如何检测最常见的手势之一：轻扫。\n\
  \n## 轻扫应用程序\n\n我们即将构建的应用程序仅用于检测水平方向和垂直方向的轻扫。如果你用手指从左到右、从右到左、从上到下或从下到上划过屏幕，应用程序将在屏幕顶部显示一条信息，持续几秒钟，告知你检测到了轻扫（参见图\
  \ 18-3）。\n\n![9781484202005_Fig18-03.jpg](img/9781484202005_Fig18-03.jpg)\n\n图 18-3。轻扫应用程序将检测垂直和水平方向的轻扫\n\
  \n### 使用触摸事件检测轻扫\n\n检测轻扫相对简单。我们将定义一个最小手势长度（以像素为单位），即用户需要滑动多远才能算作一次轻扫。我们还会定义一个容差范围，即用户在偏离直线多远的情况下仍然可以被视为水平或垂直轻扫。对角线通常不算作轻扫，但稍微偏离水平或垂直方向的轻扫则算。\n\
  \n当用户触摸屏幕时，我们会将第一次触摸的位置保存在一个变量中。然后，当用户的手指在屏幕上移动时，我们会检查它是否达到了一个足够远且足够直的点，从而算作一次轻扫。实际上，有一个内置的手势识别器正是做这件事的，但我们将利用学到的触摸事件知识来自行创建一个。让我们开始构建。\n\
  \n在 Xcode 中使用单视图应用程序模板创建一个新项目，将设备设置为*通用*，并将项目命名为*Swipes*。\n\n单击`ViewController.m`，并在靠近顶部的类扩展中添加以下代码：\n\
  \n```\n#import \"ViewController.h\"\n\n@interface ViewController ()\n\n@property\
  \ (weak, nonatomic) IBOutlet UILabel *label;\n@property (nonatomic) CGPoint gestureStartPoint;\n\
  \n@end\n```\n\n这段代码声明了一个用于我们唯一标签的插座，以及一个用于保存用户首次触摸位置的变量。\n\n\n\n选择`Main.storyboard`以打开它进行编辑。确保视图控制器的视图已设置为“User\
  \ Interaction Enabled”和“Multiple Touch”在属性检查器中都被勾选，然后从库中拖出一个标签并放置到视图窗口的上半部分。将文本对齐设置为居中，并随意调整其他文本属性使标签更易读。在文档大纲中，按住\
  \ Control 键从标签拖拽到视图，释放鼠标，按住 Shift 键并选择“Top Space to Top Layout Guide”和“Center Horizontally\
  \ in Container”，然后用鼠标点击弹出窗口外部。按住 Control 键从“View Controller”图标拖拽到标签，并将其连接到`label`插座变量。最后，双击标签并删除其文本。\n\
  \n然后切换到`ViewController.m`并添加这里以粗体显示的代码：\n\n```\nstatic CGFloat const kMinimumGestureLength\
  \ = 25;\nstatic CGFloat const kMaximumVariance      =  5;\n\n@implementation ViewController\n\
  \n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional setup\
  \ after loading the view, typically from a nib.\n}\n\n- (void)didReceiveMemoryWarning\n\
  {\n    [super didReceiveMemoryWarning];\n    // Dispose of any resources that can\
  \ be recreated.\n}\n\n#pragma mark - Touch Handling\n\n- (void)touchesBegan:(NSSet\
  \ *)touches withEvent:(UIEvent *)event {\n    UITouch *touch = [touches anyObject];\n\
  \    self.gestureStartPoint = [touch locationInView:self.view];\n}\n\n- (void)touchesMoved:(NSSet\
  \ *)touches withEvent:(UIEvent *)event {\n    UITouch *touch = [touches anyObject];\n\
  \    CGPoint currentPosition = [touch locationInView:self.view];\n\nCGFloat deltaX\
  \ = fabsf(self.gestureStartPoint.x - currentPosition.x);\n    CGFloat deltaY = fabsf(self.gestureStartPoint.y\
  \ - currentPosition.y);\n\nif (deltaX >= kMinimumGestureLength && deltaY <= kMaximumVariance)\
  \ {\n        self.label.text = @\"Horizontal swipe detected\";\n        dispatch_after(dispatch_time(DISPATCH_TIME_NOW,\
  \ 2 * NSEC_PER_SEC),\n                       dispatch_get_main_queue(),\n      \
  \                 ^{ self.label.text = @\"\"; });\n    } else if (deltaY >= kMinimumGestureLength\
  \ &&\n               deltaX <= kMaximumVariance){\n        self.label.text = @\"\
  Vertical swipe detected\";\n        dispatch_after(dispatch_time(DISPATCH_TIME_NOW,\
  \ 2 * NSEC_PER_SEC),\n                       dispatch_get_main_queue(),\n      \
  \                 ^{ self.label.text = @\"\"; });\n    }\n}\n@end\n```\n\n让我们从`touchesBegan:withEvent:`方法开始。我们在这里所做的只是从`touches`集合中获取任意触摸并存储其触摸点。我们现在主要关注单指滑动，因此不必担心触摸数量；只需获取其中一个：\n\
  \n```\nUITouch *touch = [touches anyObject];\nself.gestureStartPoint = [touch locationInView:self.view];\n\
  ```\n\n我们使用`touches`参数中的`UITouch`对象而不是`UIEvent`中的对象，因为我们感兴趣的是跟踪变化发生的过程，而不是所有活动触摸的整体状态。\n\
  \n在下一个方法`touchesMoved:withEvent:`中，我们进行实际工作。首先，获取用户手指的当前位置：\n\n```\nUITouch *touch\
  \ = [touches anyObject];\nCGPoint currentPosition = [touch locationInView:self.view];\n\
  ```\n\n之后，我们计算用户手指从起始位置在水平和垂直方向上移动了多远。`fabsf()`是标准 C 数学库中的一个函数，用于返回`float`的绝对值。这使我们能够将一个值减去另一个值，而无需担心哪个值更大：\n\
  \n```\nCGFloat deltaX = fabsf(self.gestureStartPoint.x - currentPosition.x);\nCGFloat\
  \ deltaY = fabsf(self.gestureStartPoint.y - currentPosition.y);\n```\n\n一旦我们得到两个差值，我们检查用户是否在一个方向上移动得足够远，同时在另一个方向上没有移动得太远，从而构成一个滑动。如果条件为真，我们设置标签的文本以指示检测到水平滑动还是垂直滑动。我们还使用\
  \ GCD 的`dispatch_async()`函数在文本显示 2 秒后将其擦除。这样，用户可以练习多次滑动，而无需担心标签指的是之前的尝试还是最近的一次：\n\
  \n```\nif (deltaX >= kMinimumGestureLength && deltaY <= kMaximumVariance) {\n  \
  \  self.label.text = @\"Horizontal swipe detected\";\n    dispatch_after(dispatch_time(DISPATCH_TIME_NOW,\
  \ 2 * NSEC_PER_SEC),\n                   dispatch_get_main_queue(),\n          \
  \         ^{ self.label.text = @\"\"; });\n} else if (deltaY >= kMinimumGestureLength\
  \ &&\n           deltaX <= kMaximumVariance){\n    self.label.text = @\"Vertical\
  \ swipe detected\";\n    dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 2 * NSEC_PER_SEC),\n\
  \                   dispatch_get_main_queue(),\n                   ^{ self.label.text\
  \ = @\"\"; });\n}\n```\n\n继续编译并运行应用程序。如果你发现点击并拖动后没有明显结果，请耐心等待。垂直或水平地点击并拖动，直到你掌握滑动的技巧。\n\
  \n## 自动手势识别\n\n我们刚刚用于检测滑动的方法还不错。所有复杂性都在`touchesMoved:withEvent:`方法中，而且即使那样也不是很复杂。但有一种更简单的方法来实现这一点。iOS\
  \ 包含一个名为`UIGestureRecognizer`的类，它消除了观察所有事件以了解手指如何移动的需要。你不直接使用`UIGestureRecognizer`，而是创建其一个子类的实例，每个子类被设计用于查找特定类型的手势，例如滑动、捏合、双击、三击等等。\n\
  \n让我们看看如何修改 Swipes 应用以使用手势识别器，而不是我们手动实现的方法。和往常一样，你可能希望复制你的 Swipes 项目文件夹并从那里开始。\n\
  \n首先选择`ViewController.m`并删除`touchesBegan:withEvent:`和`touchesMoved:withEvent:`两个方法。没错，你将不再需要它们。接下来，添加几个新方法代替它们的位置：\n\
  \n```\n- (void)reportHorizontalSwipe:(UIGestureRecognizer *)recognizer {\n    self.label.text\
  \ = @\"Horizontal swipe detected\";\n    dispatch_after(dispatch_time(DISPATCH_TIME_NOW,\
  \ 2 * NSEC_PER_SEC),\n                            dispatch_get_main_queue(),\n \
  \                          ^{ self.label.text = @\"\"; });\n}\n\n- (void)reportVerticalSwipe:(UIGestureRecognizer\
  \ *)recognizer {\n    self.label.text = @\"Vertical swipe detected\";\n    dispatch_after(dispatch_time(DISPATCH_TIME_NOW,\
  \ 2 * NSEC_PER_SEC),\n                            dispatch_get_main_queue(),\n \
  \                           ^{ self.label.text = @\"\"; });\n}\n```\n\n这些方法实现了滑动手势所提供的实际“功能”（如果可以这样称呼的话），就像之前的`touchesMoved:withEvent:`所做的那样。现在将下面显示的新代码添加到`viewDidLoad`方法中：\n\
  \n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
  \ setup after loading the view, typically from a nib.\n    UISwipeGestureRecognizer\
  \ *vertical = [[UISwipeGestureRecognizer alloc]\n                         initWithTarget:self\
  \ action:@selector(reportVerticalSwipe:)];\n    vertical.direction = UISwipeGestureRecognizerDirectionUp\
  \ |\n                         UISwipeGestureRecognizerDirectionDown;\n    [self.view\
  \ addGestureRecognizer:vertical];\n\nUISwipeGestureRecognizer *horizontal = [[UISwipeGestureRecognizer\
  \ alloc]\n                           initWithTarget:self action:@selector(reportHorizontalSwipe:)];\n\
  \    horizontal.direction = UISwipeGestureRecognizerDirectionLeft |\n          \
  \                 UISwipeGestureRecognizerDirectionRight;\n    [self.view addGestureRecognizer:horizontal];\n\
  }\n```\n\n\n\n我们在这里所做的只是创建两个手势识别器——一个用于检测垂直移动，另一个用于检测水平移动。当其中一个识别出配置的手势时，它会调用`reportVerticalSwipe:`或`reportHorizontalSwipe:`方法，然后我们将相应地设置标签文本。大功告成！为了进一步清理代码，你还可以从`ViewController.m`中删除`gestureStartPoint`属性的声明以及两个常量值。现在，构建并运行应用程序，试试新的手势识别器吧！\n\
  \n从总代码行数来看，对于这样一个简单的例子，这两种方法之间没有太大区别。但使用手势识别器的代码显然更易于理解和编写。你完全不需要花费心思去计算手指随时间的移动，因为`UISwipeGestureRecognizer`已经为你做好了。更棒的是，Apple\
  \ 的手势识别系统是可扩展的，这意味着如果你的应用程序需要 Apple 识别器未涵盖的非常复杂的手势，你可以创建自己的识别器，并将复杂代码（类似于我们之前看到的那些代码）隐藏在手势识别器类中，而不是污染你的视图控制器代码。我们将在本章后面构建一个这样的示例。同时，运行该应用程序，你会发现它的行为与之前的版本完全相同。\n\
  \n## 实现多种滑动手势\n\n在“滑动手势”应用程序中，我们只关心单指滑动，因此我们只是从`touches`集合中取出任意对象来确定用户手指在滑动过程中的位置。如果你只对单指滑动（最常用的滑动类型）感兴趣，这种方法是可以的。\n\
  \n但是，如果你想处理双指或三指滑动呢？在本书的最早版本中，我们用了大约 50 行代码和大量的解释，通过跨多个触摸事件跟踪多个`UITouch`实例来实现这一点。现在，有了手势识别器，这个问题已经解决了。`UISwipeGestureRecognizer`可以配置为识别任意数量的同时触摸。默认情况下，每个实例期望单指触摸，但你可以将其配置为检测同时触摸屏幕的任意数量手指。每个实例只响应你指定的确切触摸次数，因此我们要做的是在循环中创建一大堆手势识别器。\n\
  \n复制一份`Swipes`项目文件夹。\n\n编辑`ViewController.m`并修改`viewDidLoad`方法，将其替换为这里显示的方法：\n\n\
  ```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional\
  \ setup after loading the\n    // view, typically from a nib.\n    for (NSUInteger\
  \ touchCount = 1; touchCount <= 5; touchCount++) {\n        UISwipeGestureRecognizer\
  \ *vertical;\n        vertical = [[UISwipeGestureRecognizer alloc]\n           \
  \         initWithTarget:self action:@selector(reportVerticalSwipe:)];\n       \
  \ vertical.direction = UISwipeGestureRecognizerDirectionUp |\n                 \
  \            UISwipeGestureRecognizerDirectionDown;\n        vertical.numberOfTouchesRequired\
  \ = touchCount;\n        [self.view addGestureRecognizer:vertical];\n\nUISwipeGestureRecognizer\
  \ *horizontal;\n        horizontal = [[UISwipeGestureRecognizer alloc]\n       \
  \              initWithTarget:self action:@selector(reportHorizontalSwipe:)];\n\
  \        horizontal.direction = UISwipeGestureRecognizerDirectionLeft |\n      \
  \                         UISwipeGestureRecognizerDirectionRight;\n        horizontal.numberOfTouchesRequired\
  \ = touchCount;\n        [self.view addGestureRecognizer:horizontal];\n    }\n}\n\
  ```\n\n请注意，在实际应用程序中，你可能希望不同数量的手指在屏幕上滑动触发不同的行为。使用手势识别器可以轻松实现这一点，只需让每个识别器调用不同的操作方法即可。\n\
  \n现在我们需要做的只是通过添加一个方法来更改日志记录，该方法为我们提供触摸次数的便捷描述，然后在报告方法中使用它，如下所示。将此方法添加到`ViewController`类的底部，位于两个滑动报告方法之上：\n\
  \n```\n- (NSString *)descriptionForTouchCount:(NSUInteger)touchCount {\n    switch\
  \ (touchCount) {\n        case 1:\n            return @\"Single\";\n        case\
  \ 2:\n            return @\"Double\";\n        case 3:\n            return @\"Triple\"\
  ;\n        case 4:\n            return @\"Quadruple\";\n        case 5:\n      \
  \      return @\"Quintuple\";\n        default:\n            return @\"\";\n   \
  \ }\n}\n```\n\n接下来，修改两个滑动报告方法，如下所示：\n\n```\n- (void)reportHorizontalSwipe:(UIGestureRecognizer\
  \ *)recognizer {\n    self.label.text = @\"Horizontal swipe detected\";\n    self.label.text\
  \ = [NSString stringWithFormat:@\"%@ Horizontal swipe detected\",\n            \
  \          [self descriptionForTouchCount:[recognizer numberOfTouches]]];\n    dispatch_after(dispatch_time(DISPATCH_TIME_NOW,\
  \ 2 * NSEC_PER_SEC),\n                   dispatch_get_main_queue(),\n          \
  \         ^{ self.label.text = @\"\"; });\n}\n\n- (void)reportVerticalSwipe:(UIGestureRecognizer\
  \ *)recognizer {\n    self.label.text = @\"Vertical swipe detected\";\n    self.label.text\
  \ = [NSString stringWithFormat:@\"%@ Vertical swipe detected\",\n              \
  \        [self descriptionForTouchCount:[recognizer numberOfTouches]]];\n    dispatch_after(dispatch_time(DISPATCH_TIME_NOW,\
  \ 2 * NSEC_PER_SEC),\n                   dispatch_get_main_queue(),\n          \
  \         ^{ self.label.text = @\"\"; });\n}\n```\n\n编译并运行 App。你应该能够触发两个方向的双指和三指滑动，同时仍然能够触发单指滑动。如果你手指较小，甚至可能触发四指或五指滑动。\n\
  \n**提示** 在模拟器中，如果按住**Option**键，会出现一对点，代表两根手指。让它们靠得很近，然后按住**Shift**键。这将保持两个点彼此相对位置不变，让你可以移动这对手指在屏幕上移动。现在点击并向下拖动屏幕来模拟双指滑动。很酷吧！\n\
  \n对于多指滑动，需要注意的一点是，手指不要靠得太近。如果两根手指非常靠近，它们可能只被注册为一次触摸。因此，对于任何重要的手势，你不应依赖四指或五指滑动，因为许多人的手指太大，无法有效地完成这些滑动。此外，在\
  \ iPad 上，系统级默认开启了某些四指和五指手势，用于切换应用和回到主屏幕。这些手势可以在“设置”应用中关闭，但更好的做法可能是在你自己的应用中不要使用此类手势。\n\
  \n## 检测多次轻点\n\n在`TouchExplorer`应用程序中，我们将轻点次数打印到屏幕上，因此你已经看到了检测多次轻点是多么容易。然而，这并非看起来那么简单直接，因为通常你会希望根据轻点次数执行不同的操作。如果用户三次轻点，你会被通知三次。你会依次收到一次轻点、两次轻点，最后是三次轻点的通知。如果你想对两次轻点执行某种操作，而对三次轻点执行完全不同的操作，那么三次单独的通知可能会引起问题，因为你会首先收到两次轻点的通知，然后才是三次轻点的通知。除非你编写巧妙的代码来处理这种情况，否则你最终会执行两个操作。\n\
  \n\n\n幸运的是，苹果公司的工程师们预见到了这种情况，并提供了一种机制，让多个手势识别器能够良好地协同工作，即使面对看似可以触发其中任何一个的模糊输入。其基本思想是，你对一个手势识别器施加一个限制，告知它只有在某个其他手势识别器未能触发其自身方法时，才能触发其关联的方法。\n\
  \n这听起来有点抽象，所以我们来把它具体化。轻拍手势由`UITapGestureRecognizer`类识别。一个轻拍识别器可以被配置为在发生特定次数的轻拍时执行其操作。想象一下，我们有一个视图，希望为它定义当用户单击或双击时触发的不同操作。你可能从类似下面的代码开始：\n\
  \n```\nUITapGestureRecognizer *singleTap = [[UITapGestureRecognizer alloc]\n   \
  \                                   initWithTarget:self\n                      \
  \                action:@selector(doSingleTap)];\nsingleTap.numberOfTapsRequired\
  \ = 1;\n[self.view addGestureRecognizer:singleTap];\n\nUITapGestureRecognizer *doubleTap\
  \ = [[UITapGestureRecognizer alloc]\n                                      initWithTarget:self\n\
  \                                      action:@selector(doDoubleTap)];\ndoubleTap.numberOfTapsRequired\
  \ = 2;\n[self.view addGestureRecognizer:doubleTap];\n```\n\n这段代码的问题在于，两个识别器相互不知道对方的存在，并且它们无法知道用户的操作可能更适合另一个识别器。如果用户在上面代码的视图中双击，`doDoubleTap`方法会被调用，但`doSingleMethod`也会被调用——两次！——每次轻拍调用一次。\n\
  \n解决这个问题的方法是创建一个失败依赖关系。我们告诉`singleTap`，只有当`doubleTap`没有识别并响应用户输入时，它才应该触发其动作，只需添加这一行：\n\
  \n```\n[singleTap requireGestureRecognizerToFail:doubleTap];\n```\n\n这意味着，当用户轻拍一次时，`singleTap`不会立即执行其工作。相反，`singleTap`会一直等待，直到它知道`doubleTap`已经决定不再关注当前手势（也就是说，用户没有轻拍两次）。我们将在下一个项目中对此进行进一步的构建。\n\
  \n在 Xcode 中，使用“单视图应用”模板创建一个新项目。将这个新项目命名为 *TapTaps* ，并使用“设备”弹出菜单选择 **Universal**。\n\
  \n这个应用将有四个标签：每个标签分别告诉我们它何时检测到了单击、双击、三击和四击（见图 18-4）。\n\n![9781484202005_Fig18-04.jpg](img/9781484202005_Fig18-04.jpg)\n\
  \n图 18-4. TapTaps 应用检测多达四次连续轻拍\n\n我们需要这四个标签的输出口，并且还需要为每种轻拍场景设置单独的方法，以模拟我们在真实应用中会有的功能。我们还将包含一个清除文本字段的方法。打开\
  \ *ViewController.m* ，并在顶部附近的类接口中进行以下更改：\n\n```\n#import \"ViewController.h\"\n\n\
  @interface ViewController ()\n\n@property (weak, nonatomic) IBOutlet UILabel *singleLabel;\n\
  @property (weak, nonatomic) IBOutlet UILabel *doubleLabel;\n@property (weak, nonatomic)\
  \ IBOutlet UILabel *tripleLabel;\n@property (weak, nonatomic) IBOutlet UILabel *quadrupleLabel;\n\
  \n@end\n```\n\n保存文件，然后选择 *Main.storyboard* 来编辑图形用户界面。进入后，从库中向视图添加四个标签，并将它们一个接一个地排列。在属性检查器中，将每个标签的文本对齐方式设置为\
  \ *Center* 。在文档大纲中，从顶部标签按住 Control 键拖拽到其父视图并释放鼠标。按住 **Shift** 键并选择 **Top Space to\
  \ Top Layout Guide** 和 **Center Horizontally in Container** ，然后在弹出窗口外单击鼠标。对另外三个标签执行相同的操作，以设置它们的自动布局约束。完成后，从\
  \ **View Controller** 图标按住 Control 键拖拽到每个标签，并分别将它们连接到 *singleLabel* 、*doubleLabel*\
  \ 、*tripleLabel* 和 *quadrupleLabel* 。最后，确保双击每个标签并按下 **Delete** 键以删除任何文本。\n\n现在选择\
  \ *ViewController.m* 并进行以下代码更改：\n\n```\n@implementation ViewController\n\n- (void)viewDidLoad\n\
  {\n    [super viewDidLoad];\n    // Do any additional setup after loading the view,\
  \ typically from a nib.\n    UITapGestureRecognizer *singleTap =\n             \
  \ [[UITapGestureRecognizer alloc] initWithTarget:self\n                        \
  \                    action:@selector(singleTap)];\n    singleTap.numberOfTapsRequired\
  \ = 1;\n    singleTap.numberOfTouchesRequired = 1;\n    [self.view addGestureRecognizer:singleTap];\n\
  \nUITapGestureRecognizer *doubleTap =\n              [[UITapGestureRecognizer alloc]\
  \ initWithTarget:self\n                                            action:@selector(doubleTap)];\n\
  \    doubleTap.numberOfTapsRequired = 2;\n    doubleTap.numberOfTouchesRequired\
  \ = 1;\n    [self.view addGestureRecognizer:doubleTap];\n    [singleTap requireGestureRecognizerToFail:doubleTap];\n\
  \nUITapGestureRecognizer *tripleTap =\n             [[UITapGestureRecognizer alloc]\
  \ initWithTarget:self\n                                            action:@selector(tripleTap)];\n\
  \    tripleTap.numberOfTapsRequired = 3;\n    tripleTap.numberOfTouchesRequired\
  \ = 1;\n    [self.view addGestureRecognizer:tripleTap];\n    [doubleTap requireGestureRecognizerToFail:tripleTap];\n\
  \nUITapGestureRecognizer *quadrupleTap =\n            [[UITapGestureRecognizer alloc]\
  \ initWithTarget:self\n                                            action:@selector(quadrupleTap)];\n\
  \    quadrupleTap.numberOfTapsRequired = 4;\n    quadrupleTap.numberOfTouchesRequired\
  \ = 1;\n    [self.view addGestureRecognizer:quadrupleTap];\n    [tripleTap requireGestureRecognizerToFail:quadrupleTap];\n\
  }\n\n- (void)didReceiveMemoryWarning\n{\n    [super didReceiveMemoryWarning];\n\
  \    // Dispose of any resources that can be recreated.\n}\n\n- (void)singleTap\
  \ {\n    self.singleLabel.text = @\"Single Tap Detected\";\n    dispatch_after(dispatch_time(DISPATCH_TIME_NOW,\
  \ 2 * NSEC_PER_SEC),\n                   dispatch_get_main_queue(),\n          \
  \         ^{ self.singleLabel.text = @\"\"; });\n}\n\n- (void)doubleTap {\n    self.doubleLabel.text\
  \ = @\"Double Tap Detected\";\n    dispatch_after(dispatch_time(DISPATCH_TIME_NOW,\
  \ 2 * NSEC_PER_SEC),\n                   dispatch_get_main_queue(),\n          \
  \         ^{ self.doubleLabel.text = @\"\"; });\n}\n\n- (void)tripleTap {\n    self.tripleLabel.text\
  \ = @\"Triple Tap Detected\";\n    dispatch_after(dispatch_time(DISPATCH_TIME_NOW,\
  \ 2 * NSEC_PER_SEC),\n                   dispatch_get_main_queue(),\n          \
  \         ^{ self.tripleLabel.text = @\"\"; });\n}\n\n- (void)quadrupleTap {\n \
  \   self.quadrupleLabel.text = @\"Quadruple Tap Detected\";\n    dispatch_after(dispatch_time(DISPATCH_TIME_NOW,\
  \ 2 * NSEC_PER_SEC),\n                   dispatch_get_main_queue(),\n          \
  \         ^{ self.quadrupleLabel.text = @\"\"; });\n}\n\n@end\n```\n\n在这个应用中，四个轻拍方法所做的无非是设置四个标签中的一个，然后使用`dispatch_async()`在\
  \ 2 秒后清除同一个标签。\n\n有趣的部分发生在`viewDidLoad`方法中。我们从一个非常简单的步骤开始：设置一个轻拍手势识别器并将其附加到我们的视图上：\n\
  \n\n```objc\nUITapGestureRecognizer *singleTap =\n        [[UITapGestureRecognizer\
  \ alloc] initWithTarget:self\n                                        action:@selector(singleTap)];\n\
  singleTap.numberOfTapsRequired = 1;\nsingleTap.numberOfTouchesRequired = 1;\n[self.view\
  \ addGestureRecognizer:singleTap];\n```\n\n注意，我们将触发动作所需的点击次数（在同一位置连续点击）和触摸点数（同时触摸屏幕的手指数量）都设置为`1`。之后，我们设置了另一个点击手势识别器来处理双击：\n\
  \n```objc\nUITapGestureRecognizer *doubleTap =\n         [[UITapGestureRecognizer\
  \ alloc] initWithTarget:self\n                                        action:@selector(doubleTap)];\n\
  doubleTap.numberOfTapsRequired = 2;\ndoubleTap.numberOfTouchesRequired = 1;\n[self.view\
  \ addGestureRecognizer:doubleTap];\n[singleTap requireGestureRecognizerToFail:doubleTap];\n\
  ```\n\n这段代码与前一个非常相似，直到最后一行，我们为`singleTap`提供了一些额外的上下文。我们实际上是在告诉`singleTap`，只有在其他手势识别器——这里是`doubleTap`——判断当前用户输入不是它要找的内容时，它才应该触发其动作。\n\
  \n让我们思考一下这意味着什么。有了这两个点击手势识别器后，视图中的单次点击会立即让`singleTap`认为：“嘿，这看起来像是我要处理的。”同时，`doubleTap`会认为：“嘿，这*可能*是我要处理的，但我需要再等一次点击。”由于`singleTap`被设置为等待`doubleTap`的“失败”，它不会立即发送其动作方法；而是等待`doubleTap`的结果。\n\
  \n第一次点击后，如果立即发生另一次点击，`doubleTap`会说：“嘿，这次确实是我的了”，并触发其动作。此时，`singleTap`会意识到发生了什么并放弃该手势。另一方面，如果经过一段特定的时间（系统认为双击中两次点击之间的最大时间长度），`doubleTap`会放弃，`singleTap`会看到失败并最终触发其事件。\n\
  \n方法的剩余部分继续为三次和四次点击定义手势识别器，并且在每一点都配置一个手势依赖于下一个手势的失败：\n\n```objc\nUITapGestureRecognizer\
  \ *tripleTap =\n        [[UITapGestureRecognizer alloc] initWithTarget:self\n  \
  \                                      action:@selector(tripleTap)];\ntripleTap.numberOfTapsRequired\
  \ = 3;\ntripleTap.numberOfTouchesRequired = 1;\n[self.view addGestureRecognizer:tripleTap];\n\
  [doubleTap requireGestureRecognizerToFail:tripleTap];\n\nUITapGestureRecognizer\
  \ *quadrupleTap =\n        [[UITapGestureRecognizer alloc] initWithTarget:self\n\
  \                                        action:@selector(quadrupleTap)];\nquadrupleTap.numberOfTapsRequired\
  \ = 4;\nquadrupleTap.numberOfTouchesRequired = 1;\n[self.view addGestureRecognizer:quadrupleTap];\n\
  [tripleTap requireGestureRecognizerToFail:quadrupleTap];\n```\n\n注意，我们不需要显式地配置每个手势依赖于所有更高点击次数的手势的失败。这种多重依赖关系是通过代码中建立的失败链自然产生的。由于`singleTap`要求`doubleTap`失败，`doubleTap`要求`tripleTap`失败，`tripleTap`要求`quadrupleTap`失败。由此延伸，`singleTap`要求所有其他手势都失败。\n\
  \n编译并运行应用程序。无论你是单击、双击、三击还是四击，你应该只会在序列结束时看到显示一个标签。大约一秒半后，标签会自行清除，你可以再次尝试。\n\n## 检测捏合和旋转\n\
  \n另一个常见的手势是双指捏合。它在许多应用程序（例如移动版 Safari、邮件和照片）中用于放大（两指分开）或缩小（两指合拢）。\n\n得益于`UIPinchGestureRecognizer`，检测捏合非常容易。这被称为**连续手势识别器**，因为它在捏合过程中会反复调用其动作方法。手势进行时，识别器会经历多个状态。当手势被识别时，识别器处于`UIGestureRecognizerStateBegan`状态，其`scale`属性被设置为初始值`1.0`；在手势的其余部分，状态为`UIGestureRecognizerStateChanged`，并且`scale`值相对于用户手指从起始点移动的距离上下变化。我们将使用`scale`值来调整图像大小。最后，状态变为`UIGestureRecognizerStateEnded`。\n\
  \n另一个常见的手势是双指旋转。这也是一个连续手势识别器，名为`UIRotationGestureRecognizer`。它有一个`rotation`属性，手势开始时默认为`0.0`，然后随着用户旋转手指，从`0.0`变化到`2.0\
  \ * PI`。在下一个示例中，我们将同时使用捏合和旋转手势。\n\n在 Xcode 中创建一个新项目，再次使用 Single View Application\
  \ 模板，并将其命名为`PinchMe`。首先，将示例源代码存档中`18 - Image`文件夹里的漂亮图片`yosemite-meadows.png`（或你喜欢的其他照片）拖放到项目的`Images.xcassets`中。展开`PinchMe`文件夹，单击`ViewController.h`，并进行如下更改：\n\
  \n```objc\n#import <UIKit/UIKit.h>\n\n@interface ViewController : UIViewController\
  \ <UIGestureRecognizerDelegate>\n\n@end\n```\n\n这里的主要变化是让`ViewController`遵循`UIGestureRecognizerDelegate`协议，以允许多个手势识别器同时识别手势。\n\
  \n现在跳转到`ViewController.m`并进行如下更改：\n\n```objc\n#import \"ViewController.h\"\n\n@interface\
  \ ViewController ()\n\n@property (strong, nonatomic) UIImageView *imageView;\n\n\
  @end\n\n@implementation ViewController\nCGFloat scale, previousScale;\nCGFloat rotation,\
  \ previousRotation;\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    //\
  \ Do any additional setup after loading the view, typically from a nib.\n    previousScale\
  \ = 1;\n\n    UIImage *image = [UIImage imageNamed:@\"yosemite-meadows\"];\n   \
  \ self.imageView = [[UIImageView alloc] initWithImage:image];\n    self.imageView.userInteractionEnabled\
  \ = YES;\n    self.imageView.center = self.view.center;\n    [self.view addSubview:self.imageView];\n\
  \n    UIPinchGestureRecognizer *pinchGesture =\n           [[UIPinchGestureRecognizer\
  \ alloc]\n                                    initWithTarget:self action:@selector(doPinch:)];\n\
  \    pinchGesture.delegate = self;\n    [self.imageView addGestureRecognizer:pinchGesture];\n\
  \n    UIRotationGestureRecognizer *rotationGesture =\n           [[UIRotationGestureRecognizer\
  \ alloc]\n                                    initWithTarget:self action:@selector(doRotate:)];\n\
  \    rotationGesture.delegate = self;\n    [self.imageView addGestureRecognizer:rotationGesture];\n\
  }\n\n- (BOOL)gestureRecognizer:(UIGestureRecognizer *)gestureRecognizer\n      \
  \           shouldRecognizeSimultaneouslyWithGestureRecognizer:\n              \
  \                 (UIGestureRecognizer *)otherGestureRecognizer {\n    return YES;\n\
  }\n\n- (void)transformImageView {\n    CGAffineTransform t = CGAffineTransformMakeScale(scale\
  \ * previousScale,\n                                                     scale *\
  \ previousScale);\n    t = CGAffineTransformRotate(t, rotation + previousRotation);\n\
  \    self.imageView.transform = t;\n}\n\n- (void)doPinch:(UIPinchGestureRecognizer\
  \ *)gesture {\n    scale = gesture.scale;\n    [self transformImageView];\n    if\
  \ (gesture.state == UIGestureRecognizerStateEnded) {\n        previousScale = scale\
  \ * previousScale;\n        scale = 1;\n    }\n}\n```\n\n\n`- (void)doRotate:(UIRotationGestureRecognizer\
  \ *)gesture {`\n```\n    rotation = gesture.rotation;\n    [self transformImageView];\n\
  \    if (gesture.state == UIGestureRecognizerStateEnded) {\n        previousRotation\
  \ = rotation + previousRotation;\n        rotation = 0;\n    }\n}\n\n- (void)didReceiveMemoryWarning\n\
  {\n    [super didReceiveMemoryWarning];\n    // 处置任何可重新创建的资源\n}\n\n@end\n```\n\n\
  首先，我们为当前及先前的缩放和旋转定义了四个实例变量。先前的数值来自之前触发并结束的手势识别器；我们需要同时跟踪这些数值，因为用于缩放的 `UIPinchGestureRecognizer`\
  \ 和用于旋转的 `UIRotationGestureRecognizer` 始终会从默认的 `1.0` 缩放和 `0.0` 旋转位置开始：\n\n```\n\
  @implementation ViewController {\nCGFloat scale, previousScale;\nCGFloat rotation,\
  \ previousRotation;\n}\n```\n\n接下来，在 `viewDidLoad` 中，我们首先创建一个用于捏合和旋转的 `UIImageView`，将我们的优胜美地图片加载到其中，并将其在主视图中居中。我们必须记得在图像视图上启用用户交互，因为\
  \ `UIImageView` 是少数默认禁用用户交互的 `UIKit` 类之一。\n\n```\nUIImage *image = [UIImage imageNamed:@\"\
  yosemite-meadows\"];\nself.imageView = [[UIImageView alloc] initWithImage:image];\n\
  self.imageView.userInteractionEnabled = YES;\nself.imageView.center = self.view.center;\n\
  [self.view addSubview:self.imageView];\n```\n\n接着，我们设置一个捏合手势识别器和一个旋转手势识别器，并分别告诉它们在手势被识别时通过\
  \ `doPinch:` 和 `doRotation:` 方法通知我们。我们指定两者都使用 `self` 作为它们的委托：\n\n```\nUIPinchGestureRecognizer\
  \ *pinchGesture =\n         [[UIPinchGestureRecognizer alloc]\n                \
  \               initWithTarget:self action:@selector(doPinch:)];\npinchGesture.delegate\
  \ = self;\n[self.imageView addGestureRecognizer:pinchGesture];\n\nUIRotationGestureRecognizer\
  \ *rotationGesture =\n         [[UIRotationGestureRecognizer alloc]\n          \
  \                    initWithTarget:self action:@selector(doRotate:)];\nrotationGesture.delegate\
  \ = self;\n[self.imageView addGestureRecognizer:rotationGesture];\n```\n\n在 `gestureRecognizer:shouldRecognizeSimultaneoslyWithGestureRecognizer:`\
  \ 方法中（这是我们需要实现的 `UIGestureRecognizerDelegate` 协议中唯一的方法），我们始终返回 `YES`，以允许我们的捏合和旋转手势协同工作；否则，先启动的手势识别器会始终阻止另一个：\n\
  \n```\n- (BOOL)gestureRecognizer:(UIGestureRecognizer *)gestureRecognizer\n    \
  \      shouldRecognizeSimultaneouslyWithGestureRecognizer:\n                  (UIGestureRecognizer\
  \ *)otherGestureRecognizer {\n    return YES;\n}\n```\n\n接着，我们实现一个辅助方法，根据手势识别器提供的当前缩放和旋转值来变换图像视图。注意我们将当前缩放值与先前的缩放值相乘，也将旋转值与先前的旋转值相加。这样当新手势从默认\
  \ `1.0` 缩放和 `0.0` 旋转开始时，我们可以补偿之前已经完成的捏合和旋转操作。\n\n```\n- (void)transformImageView\
  \ {\n    CGAffineTransform t = CGAffineTransformMakeScale(scale * previousScale,\n\
  \                                                     scale * previousScale);\n\
  \    t = CGAffineTransformRotate(t, rotation + previousRotation);\n    self.imageView.transform\
  \ = t;\n}\n```\n\n最后，我们实现动作方法，这些方法接收手势识别器的输入并更新图像视图的变换。在 `doPinch:` 和 `doRotate:`\
  \ 中，我们首先提取新的 `scale` 或 `rotation` 值。接着，更新图像视图的变换。最后，如果手势识别器报告其手势已结束（`state` 等于 `UIGestureRecognizerStateEnded`），我们存储当前的正确缩放或旋转值，然后将当前的缩放或旋转值重置为默认的\
  \ `1.0` 缩放或 `0.0` 旋转：\n\n```\n- (void)doPinch:(UIPinchGestureRecognizer *)gesture\
  \ {\n    scale = gesture.scale;\n    [self transformImageView];\n    if (gesture.state\
  \ == UIGestureRecognizerStateEnded) {\n        previousScale = scale * previousScale;\n\
  \        scale = 1;\n    }\n}\n\n- (void)doRotate:(UIRotationGestureRecognizer *)gesture\
  \ {\n    rotation = gesture.rotation;\n    [self transformImageView];\n    if (gesture.state\
  \ == UIGestureRecognizerStateEnded) {\n        previousRotation = rotation + previousRotation;\n\
  \        rotation = 0;\n    }\n}\n```\n\n捏合与旋转的检测就这些内容。编译并运行应用程序试一下。当你进行捏合和旋转操作时，你会看到图片相应地变化（参见图\
  \ 18-5）。如果你使用的是模拟器，请记住你可以按住 **Option** 键并在模拟器窗口中用鼠标点击并拖拽来模拟捏合操作。\n\n![9781484202005_Fig18-05.jpg](img/9781484202005_Fig18-05.jpg)\n\
  \n图 18-5. PinchMe 应用程序检测捏合和旋转手势\n\n## 定义自定义手势\n\n现在你已经了解了如何检测最常用的手势。当你开始定义自己的自定义手势时，真正的乐趣才刚开始！你已经学会如何使用几个\
  \ `UIGestureRecognizer` 的子类，现在是时候学习如何创建自己的手势了，这些手势可以轻松附加到任何你想要的视图上。\n\n定义自定义手势比使用标准手势要复杂一些。你已经掌握了基本机制，这并不太难。棘手的部分在于定义手势的构成时要有足够的灵活性。\n\
  \n大多数人在使用手势时并不精确。还记得我们在实现滑动时使用的容差范围吗？这样即使滑动不是完全水平或垂直的仍然算数？这就是你需要在自己的手势定义中添加微妙细节的绝佳例子。如果你对手势定义过于严格，它将毫无用处。如果你定义得过于宽泛，会得到太多误判，这会让用户感到沮丧。从某种意义上说，定义自定义手势可能很困难，因为你必须精确地描述一种不精确的手势。如果你试图捕捉一种复杂的手势，比如画一个“8”字形，背后检测手势的数学运算也会变得相当复杂。\n\
  \n## CheckPlease 应用程序\n\n在我们的示例中，我们将定义一个形状像对勾的手势（参见图 18-6）。\n\n![9781484202005_Fig18-06.jpg](img/9781484202005_Fig18-06.jpg)\n\
  \n图 18-6. 对勾手势示意图\n\n这个对勾手势的关键属性是什么？最主要的特征是两条线之间角度的剧烈变化。我们还需要确保用户的手指在形成那个锐角之前，已经沿直线移动了一段距离。在图\
  \ 18-6 中，对勾的两条腿相交于一个锐角，略小于 90 度。一个要求恰好 85 度角的手势会极难准确完成，因此我们将定义一个可接受的角度范围。\n\n\n\
  ## 排版后的内容\n\n使用单视图应用模板在 Xcode 中创建一个新项目，并将其命名为 `CheckPlease`。在这个项目中，我们需要进行一些相当标准的解析几何计算，例如计算两点之间的距离和两条线之间的角度。如果你对几何知识记得不多也不用担心；我们已经为你提供了可以执行这些计算的函数。\n\
  \n请查看 `18 – CheckPlease Utils` 文件夹中的两个文件：`CGPointUtils.h` 和 `CGPointUtils.c`。将这两个文件拖到项目的\
  \ CheckPlease 分组中。你可以随意在自己的应用程序中使用这些文件中的实用函数。接下来，进入 `18 – Image` 文件夹，将图像文件 `CheckImage.png`\
  \ 拖到项目中的 `Image.xcassets` 文件夹中。\n\n在 Xcode 中，按下 ![image](img/flower.jpg)`N` 调出新文件助手，在\
  \ iOS 部分选择 `Cocoa Touch Class`。将新类命名为 `CheckMarkRecognizer`，并使其成为 `UIGestureRecognizer`\
  \ 的子类。现在，在项目导航器中选择 `CheckMarkRecognizer.m`，并进行以下修改：\n\n```\n#import \"CheckMarkRecognizer.h\"\
  \n#import \"CGPointUtils.h\"\n#import <UIKit/UIGestureRecognizerSubclass.h>\n\n\
  static CGFloat const kMinimumCheckMarkAngle  =  50;\nstatic CGFloat const kMaximumCheckMarkAngle\
  \  = 135;\nstatic CGFloat const kMinimumCheckMarkLength =  10;\n\n@implementation\
  \ CheckMarkRecognizer {\n    CGPoint lastPreviousPoint;\n    CGPoint lastCurrentPoint;\n\
  \    CGFloat lineLengthSoFar;\n}\n\n@end\n```\n\n在导入我们之前提到的 `CGPointUtils.h` 之后，我们导入了一个名为\
  \ `UIGestureRecognizerSubclass.h` 的特殊头文件，其中包含了仅供 `UIGestureRecognizer` 子类使用的声明。这样做的重要作用是将手势识别器的\
  \ `state` 属性变为可写。这是我们子类用来确认所监控的手势已成功完成的机制。\n\n接下来，我们定义了一些参数，用于判断用户的手指划动是否符合我们对勾号的定义。可以看到，我们定义了一个最小角度\
  \ 50 度和最大角度 135 度。这是一个相当宽的范围；根据你的需求，你可能会决定限制角度范围。我们对此进行了一些试验，发现我们练习的勾号手势落在一个相当宽的范围内，这就是为什么我们在这里选择了较大的容差。我们对手势的划动有些随意，因此我们预计至少部分用户也会如此。正如一位智者所说：“产出时要严谨，接受时要宽容。”\n\
  \n现在，我们声明了三个实例变量：`lastPreviousPoint`、`lastCurrentPoint` 和 `lineLengthSoFar`。每次收到触摸通知时，我们都会得到上一个触摸点和当前触摸点。这两个点定义了一条线段。下一次触摸会添加另一条线段。我们将上一次触摸的上一个点和当前点存储在\
  \ `lastPreviousPoint` 和 `lastCurrentPoint` 中，从而得到前一条线段。然后，我们可以将该线段与当前触摸的线段进行比较。比较这两条线段可以告诉我们，我们是在绘制一条单一线段，还是两条线段之间存在足够锐利的角度，以至于我们实际上是在绘制一个勾号。\n\
  \n请记住，每个 `UITouch` 对象都知道其在视图中的当前位置以及上一个位置。然而，为了比较角度，我们需要知道前两个点构成的线段，因此我们需要存储用户上次触摸屏幕时的当前点和上一个点。每次调用此方法时，我们都会使用这两个变量来存储这两个值，这样我们就能比较当前线段和上一条线段，并检查角度。\n\
  \n我们还声明了一个实例变量，用于持续记录用户手指拖动的距离。如果手指移动的距离至少达到 10 像素（由 `kMinimumCheckMarkLength` 定义的值），那么角度是否落在正确范围内才重要。如果没有这个距离要求，我们会收到很多误报。\n\
  \n## CheckPlease 触摸方法\n\n接下来，添加这两个方法来处理发送给手势识别器的触摸事件：\n\n```\n- (void)touchesBegan:(NSSet\
  \ *)touches withEvent:(UIEvent *)event {\n    [super touchesBegan:touches withEvent:event];\n\
  \    UITouch *touch = [touches anyObject];\n    CGPoint point = [touch locationInView:self.view];\n\
  \    lastPreviousPoint = point;\n    lastCurrentPoint = point;\n    lineLengthSoFar\
  \ = 0.0;\n}\n\n- (void)touchesMoved:(NSSet *)touches withEvent:(UIEvent *)event\
  \ {\n    [super touchesMoved:touches withEvent:event];\n    UITouch *touch = [touches\
  \ anyObject];\n    CGPoint previousPoint = [touch previousLocationInView:self.view];\n\
  \    CGPoint currentPoint = [touch locationInView:self.view];\n    CGFloat angle\
  \ = angleBetweenLines(lastPreviousPoint,\n                                     \
  \ lastCurrentPoint,\n                                      previousPoint,\n    \
  \                                  currentPoint);\n    if (angle >= kMinimumCheckMarkAngle\
  \ && angle <= kMaximumCheckMarkAngle\n        && lineLengthSoFar > kMinimumCheckMarkLength)\
  \ {\n        self.state = UIGestureRecognizerStateRecognized;\n    }\n    lineLengthSoFar\
  \ += distanceBetweenPoints(previousPoint, currentPoint);\n    lastPreviousPoint\
  \ = previousPoint;\n    lastCurrentPoint = currentPoint;\n}\n```\n\n你会注意到，每个方法都首先调用了父类的实现——这在之前的触摸方法中我们都没有做过。在\
  \ `UIGestureRecognizer` 子类中必须这样做，以便我们的父类能够像我们一样了解事件的信息。现在让我们继续看代码本身。\n\n在 `touchesBegan:withEvent:`\
  \ 中，我们确定用户当前触摸的点，并将该值存储在 `lastPreviousPoint` 和 `lastCurrentPoint` 中。由于此方法在手势开始时调用，我们知道没有上一个点需要担心，因此将当前点同时存储在这两个变量中。我们还将跟踪的线段长度重置为\
  \ 0。\n\n在 `touchesMoved:withEvent:` 中，我们计算当前触摸的上一个位置到当前位置所构成的线段，与存储在 `lastPreviousPoint`\
  \ 和 `lastCurrentPoint` 实例变量中的两个点所构成的线段之间的角度。得到这个角度后，我们检查它是否落在我们可接受的角度范围内，并确保用户的手指在做出那个锐利转折之前已经移动了足够的距离。如果这两个条件都成立，我们将手势识别器的状态设置为\
  \ `UIGestureRecognizerStateRecognized`，以表明我们已经识别出一个勾号手势。接下来，我们计算触摸位置与其上一个位置之间的距离，将其加到\
  \ `lineLengthSoFar` 中，并将 `lastPreviousPoint` 和 `lastCurrentPoint` 中的值替换为当前触摸的两个点，以便下次执行此方法时使用。\n\
  \n现在我们有了一个可以尝试的手势识别器，是时候将其连接到一个视图上了，就像我们之前使用其他手势识别器一样。切换到 `ViewController.m`，并在文件顶部添加以下加粗的代码：\n\
  \n```\n#import \"ViewController.h\"\n#import \"CheckMarkRecognizer.h\"\n\n@interface\
  \ ViewController ()\n\n@property (weak, nonatomic) IBOutlet UIImageView *imageView;\n\
  \n@end\n```\n\n在这里，我们只是导入了我们定义的手势识别器的头文件，然后为一个图像视图添加了一个出口，当我们检测到勾号手势时，将使用该图像视图通知用户。\n\
  \n\n\n选择 `Main.storyboard` 来编辑图形界面。从库中拖一个`Image View`到视图上，将其放置在靠近中心的位置，并调整大小使其覆盖整个视图。在文档大纲中，按住\
  \ Control 键从`Image View`拖拽到主视图，松开鼠标，按住`Shift`键并依次选择`Leading Space to Container Margin`（前导容器边距）、`Trailing\
  \ Space to Container Margin`（尾随容器边距）、`Top Space to Top Layout Guide`（顶部到顶部布局参考线间距）和`Bottom\
  \ Space to Bottom Layout Guide`（底部到底部布局参考线间距），然后用鼠标点击弹出菜单外部。在文档大纲中选择该 image view，并在属性检查器中将\
  \ Mode 属性设为`Center`，Image 属性设为`CheckImage`。最后，按住 Control 键从`View Controller`图标拖拽到\
  \ image view，将其连接到`imageView`输出口。\n\n现在切换回`ViewController.m`，在`@implementation`部分添加以下代码：\n\
  \n```\n@implementation ViewController\n\n- (void)doCheck:(CheckMarkRecognizer *)check\
  \ {\n    self.imageView.hidden = NO;\n    dispatch_after(dispatch_time(DISPATCH_TIME_NOW,\
  \ 2 * NSEC_PER_SEC),\n                   dispatch_get_main_queue(),\n          \
  \         ^{ self.imageView.hidden = YES; });\n}\n```\n\n这将为我们提供一个动作方法来连接手势识别器。当手势被识别时，image\
  \ view 会变为可见，从而显示对勾标记。稍后，该图像会再次隐藏。\n\n接下来，编辑`viewDidLoad`方法，添加以下几行代码。这些代码将新识别器的实例连接到视图，并确保\
  \ image view（以及其中的对勾标记）初始状态为隐藏：\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \      // 加载视图后的其他初始化设置，通常来自 nib 文件\n    CheckMarkRecognizer *check = [[CheckMarkRecognizer\
  \ alloc]\n                                 initWithTarget:self\n               \
  \                      action:@selector(doCheck:)];\n    [self.view addGestureRecognizer:check];\n\
  \    self.imageView.hidden = YES;\n}\n```\n\n编译并运行应用，然后尝试这个手势。\n\n在为自己的应用定义新手势时，务必进行彻底测试。如果可能，也请其他人帮你测试。你需要确保手势对用户来说易于操作，但又不至于轻易被意外触发。同时，你需要确保不会与应用中使用的其他手势发生冲突。例如，单次手势不应同时被识别为自定义手势和捏合手势。\n\
  \n服务员？结账，谢谢！\n\n现在你应该了解了 iOS 用来告知应用触摸、轻点和手势的机制。你还学会了如何检测最常用的 iOS 手势，甚至初步掌握了如何定义自己的自定义手势。iOS\
  \ 用户界面大量依赖手势来实现易用性，因此在大多数 iOS 开发中，你需要熟练掌握这些技巧。\n\n准备好继续学习后，请翻到下一页，我们将介绍如何使用 Core\
  \ Location 确定你的地理位置。\n\n第 19 章\n\n我在哪里？使用 Core Location 和 Map Kit 定位\n\n每台 iOS 设备都能通过名为`Core\
  \ Location`的框架来确定自己的地理位置。iOS 还包含一个名为`Map Kit`的框架，让你能够轻松创建实时交互式地图，显示任何你希望展示的位置——当然也包括用户的位置。本章将带你初步了解这两个框架的使用方法。\n\
  \n`Core Location`实际上可以利用三种技术来实现定位：GPS、蜂窝基站识别和 Wi-Fi 定位服务（WPS）。GPS 是这三种技术中精度最高的，但第一代\
  \ iPhone、iPod touch 或仅支持 Wi-Fi 的 iPad 不具备此功能。简而言之，任何具备 3G 数据连接的设备都包含 GPS 模块。GPS\
  \ 通过读取多颗卫星的微波信号来确定当前位置。\n\n**注意** 苹果使用的是名为`Assisted GPS`（辅助 GPS，简称 A-GPS）的 GPS 版本。A-GPS\
  \ 利用网络资源来提升独立 GPS 的性能。基本思路是：电信运营商在其网络上部署服务，移动设备会自动发现并从中收集数据。这使得移动设备能够比仅依赖 GPS 卫星更快速地确定起始位置。\n\
  \n蜂窝基站识别定位会根据设备当前连接的蜂窝基站物理位置，粗略估算当前位置。由于每个基站覆盖范围可能相当大，因此这种定位方式存在较大误差。蜂窝基站识别定位需要蜂窝无线电连接，因此仅适用于\
  \ iPhone（包括初代在内的所有型号）以及任何具备 3G 数据连接的 iPad。\n\nWPS 方式通过参考包含已知服务提供商及其服务区域的大型数据库，利用附近\
  \ Wi-Fi 接入点的媒体访问控制（MAC）地址来推测你的位置。WPS 的精度较低，误差可能达到数英里。\n\n这三种方法都会明显消耗电池电量，因此在使用`Core\
  \ Location`时务必注意这一点。除非绝对必要，否则应用不应过于频繁地轮询位置信息。使用`Core Location`时，你可以指定所需的精度。通过谨慎设定所需的最低精度，可以避免不必要的电量消耗。\n\
  \n`Core Location`所依赖的技术对应用是透明的。我们无需告诉`Core Location`使用 GPS、三角测量还是 WPS。我们只需指定所需的精度，`Core\
  \ Location`会根据可用的技术自行判断哪种方式最适合满足我们的请求。\n\n### 位置管理器\n\n`Core Location` API 实际上相当易于使用。我们将用到的主要类是`CLLocationManager`，通常称为**位置管理器**。要与`Core\
  \ Location`交互，你需要创建一个位置管理器的实例，如下所示：\n\n```\nCLLocationManager *locationManager =\
  \ [[CLLocationManager alloc] init];\n```\n\n这会创建一个位置管理器的实例，但并不会立即开始轮询你的位置。你必须创建一个遵循`CLLocationManagerDelegate`协议的对象，并将其指定为位置管理器的委托。当位置信息可用或发生变化时，位置管理器会调用委托方法。确定位置的过程可能需要一些时间，甚至几秒钟。\n\
  \n#### 设置所需精度\n\n设置委托后，还需要设置所需的精度。如前所述，指定的精度不要超过实际需求。如果你编写的应用只需知道手机位于哪个州或国家，就不要指定过高的精度级别。请记住，你对`Core\
  \ Location`的精度要求越高，消耗的电量就越多。同时，请注意无法保证一定能够达到你请求的精度级别。\n\n以下是设置委托并请求特定精度级别的示例：\n\n\
  ```\nlocationManager.delegate = self;\nlocationManager.desiredAccuracy = kCLLocationAccuracyBest;\n\
  ```\n\n\n\n精度通过`CLLocationAccuracy`值设置，该类型被定义为`double`。该值以米为单位，因此如果您将`desiredAccuracy`指定为`10`，您就是在告诉\
  \ Core Location，您希望它尽可能在 10 米范围内确定当前位置。指定`kCLLocationAccuracyBest`（如我们之前所做）或指定`kCLLocationAccuracyBestForNavigation`（同时使用其他传感器数据）会告诉\
  \ Core Location 使用当前可用的最精确方法。此外，您还可以使用`kCLLocationAccuracyNearestTenMeters`、`kCLLocationAccuracyHundredMeters`、`kCLLocationAccuracyKilometer`和`kCLLocationAccuracyThreeKilometers`。\n\
  \n#### 设置距离过滤器\n\n默认情况下，位置管理器会将检测到的设备位置的任何变化通知给委托。通过指定距离过滤器，您就是在告诉位置管理器不要通知您每一次变化，而是仅在位置变化超过一定量时才通知您。设置距离过滤器可以减少应用程序的轮询量。\n\
  \n距离过滤器也以米为单位设置。将距离过滤器指定为`1000`会告诉位置管理器，在 iPhone 从其先前报告的位置移动至少 1000 米之前，不要通知其委托。示例如下：\n\
  \n```\nlocationManager.distanceFilter = 1000.;\n```\n\n如果您想将位置管理器恢复为默认设置（即不应用任何过滤器），可以使用常量`kCLDistanceFilterNone`，如下所示：\n\
  \n```\nlocationManager.distanceFilter = kCLDistanceFilterNone;\n```\n\n与指定所需精度时一样，您应注意避免比实际需要更频繁地获取更新；否则会浪费电池电量。一个基于用户位置计算速度的测速应用，可能希望尽可能快地获得更新，但一个显示最近快餐店的应用则可以接受更少的更新。\n\
  \n#### 获取使用定位服务的权限\n\n在您的应用程序可以使用定位服务之前，您需要获得用户的许可。Core Location 提供了几种不同的服务，其中一些甚至可以在您的应用程序处于后台时使用——事实上，您甚至可以请求在应用未运行时发生某些事件时启动您的应用程序。根据您的应用程序的功能，可能只需要请求在使用应用时访问定位服务的权限，或者可能需要始终能够使用该服务。在编写应用程序时，您需要决定需要哪种权限，并且需要在启动所需服务之前提出请求。您将在创建本章示例应用的过程中看到如何执行此操作。\n\
  \n#### 启动位置管理器\n\n当您准备好开始轮询位置，并且在向用户请求访问定位服务的权限之后，您告诉位置管理器启动。它会自行运作，并在确定当前位置后调用委托方法。在您告诉它停止之前，每当它检测到超出当前距离过滤器的变化时，它会持续调用您的委托方法。\n\
  \n以下是启动位置管理器的方法：\n\n```\n[locationManager startUpdatingLocation];\n```\n\n#### 明智地使用位置管理器\n\
  \n如果您只需要确定当前位置并且不需要持续更新，那么您的位置委托应在获得应用所需信息后立即停止位置管理器。如果您需要轮询，请确保尽快停止轮询。请记住，只要您从位置管理器获取更新，就会消耗用户的电池电量。\n\
  \n要告诉位置管理器停止向其委托发送更新，请调用`stopUpdatingLocation`，如下所示：\n\n```\n[locationManager stopUpdatingLocation];\n\
  ```\n\n#### 位置管理器委托\n\n位置管理器委托必须遵循`CLLocationManagerDelegate`协议，该协议定义了多个方法，所有方法都是可选的。其中一个方法在用户授权使用定位服务的可用性发生变化时由位置管理器调用，另一个方法在它确定当前位置或检测到位置变化时调用，还有一个方法在位置管理器遇到错误时调用。我们将在应用中实现所有这些委托方法。\n\
  \n#### 获取位置更新\n\n当位置管理器想要将当前位置通知其委托时，它会调用`locationManager:didUpdateLocations:`方法。此方法接受两个参数：\n\
  \n*   第一个参数是调用该方法的`locationManager`。\n*   第二个参数是一个`CLLocation`对象数组，用于描述设备的当前位置以及可能的一些先前位置。如果在短时间内发生多次位置更新，它们可能会通过单次调用此方法一次报告。在任何情况下，最近的位置始终是该数组中的最后一项。\n\
  \n#### 使用`CLLocation`获取纬度和经度\n\n位置信息通过`CLLocation`类的实例从位置管理器传递。该类有六个可能对您的应用程序感兴趣的属性：\n\
  \n*   `coordinate`\n*   `horizontalAccuracy`\n*   `altitude`\n*   `verticalAccuracy`\n\
  *   `floor`\n*   `timestamp`\n\n纬度和经度存储在名为`coordinate`的属性中。要以度数获取纬度和经度，请执行以下操作：\n\
  \n```\nCLLocationDegrees latitude = theLocation.coordinate.latitude;\nCLLocationDegrees\
  \ longitude = theLocation.coordinate.longitude;\n```\n\n`CLLocation`对象还可以告诉您位置管理器对其纬度和经度计算有多大的信心。`horizontalAccuracy`属性描述了以`coordinate`为中心、半径（以米为单位，与所有\
  \ Core Location 测量值相同）的圆的范围。`horizontalAccuracy`的值越大，Core Location 对位置的确定性越低。非常小的半径表示对确定的位置有很高的置信度。\n\
  \n您可以在“地图”应用中看到`horizontalAccuracy`的图形表示（见图 19-1）。当“地图”应用检测到您的位置时，显示的圆圈使用`horizontalAccuracy`作为其半径。位置管理器认为您位于该圆圈的中心。如果不在，您也几乎肯定位于圆圈内的某个位置。`horizontalAccuracy`中的负值表示由于某种原因您不能依赖`coordinate`中的值。\n\
  \n![9781484202005_Fig19-01.jpg](img/9781484202005_Fig19-01.jpg)\n\n图 19-1。“地图”应用使用\
  \ Core Location 来确定您的当前位置。外圈是水平精度的直观表示。\n\n`CLLocation`对象还有一个名为`altitude`的属性，可以告诉您海拔（或低于）海平面多少米：\n\
  \n```\nCLLocationDistance altitude = theLocation.altitude;\n```\n\n每个`CLLocation`对象维护一个名为`verticalAccuracy`的属性，它表示\
  \ Core Location 对其确定的海拔高度有多大的信心。`altitude`的值可能偏差与`verticalAccuracy`的值相同的米数。如果`verticalAccuracy`值为负，Core\
  \ Location 表示无法确定有效的海拔高度。\n\n`floor`属性给出了用户所在建筑物内的楼层。此值仅在能够提供该信息的建筑物中有效，因此您不应依赖其可用性。\n\
  \n`CLLocation`对象还有一个`timestamp`，用于指示位置管理器进行位置确定的时间。\n\n\n\n"
- "# Core Location 基础\n\n除了这些属性外，`CLLocation` 还有一个有用的实例方法，可以让你确定两个 `CLLocation` 对象之间的距离。该方法名为\
  \ `distanceFromLocation:`，它返回一个 `CLLocationDistance` 类型的值，而 `CLLocationDistance`\
  \ 实际上只是一个 `double`，因此你可以在算术计算中使用它，正如你即将创建的应用程序中所示。以下是使用该方法的方式：\n\n```\nCLLocationDistance\
  \ distance = [fromLocation distanceFromLocation:toLocation];\n```\n\n上述代码行将返回两个\
  \ `CLLocation` 对象（`fromLocation` 和 `toLocation`）之间的距离。返回的 `distance` 值是大圆距离（great-circle\
  \ distance）计算的结果，该计算忽略 `altitude` 属性，假设两个点都在海平面上进行距离计算。对于大多数用途来说，大圆计算已经足够；然而，如果你确实希望在计算距离时考虑海拔因素，则需要自己编写代码来实现。\n\
  \n**注意**：如果你不清楚大圆距离（great-circle distance）的含义，可能需要回想一下地理课上的大圆航线（great-circle route）概念。其核心思想是：地球表面任意两点之间的最短距离，将沿着一条路径找到，如果这条路径延伸下去，将环绕整个地球一周，即“大圆”。最显然的大圆也许就是你在地图上见过的：赤道和经线。然而，对于地球表面任意两点，都可以找到这样一个大圆。`CLLocation`\
  \ 执行的计算，就是沿着这样一条路径确定两点之间的距离，同时考虑了地球的曲率。如果不考虑曲率，你将得到连接两点的直线长度，这没什么用，因为那条直线不可避免地会直接穿过地球内部的一部分！\n\
  \n### 错误通知\n\n如果 Core Location 需要向你的应用程序报告错误，它会调用一个名为 `locationManager:didFailWithError:`\
  \ 的委托方法。错误的可能原因之一是用户拒绝了位置服务访问权限，此时该方法会以错误码 `kCLErrorDenied` 被调用。位置管理器支持的另一个常见错误码是\
  \ `kCLErrorLocationUnknown`，它表示 Core Location 无法确定位置，但会继续尝试。虽然 `kCLErrorLocationUnknown`\
  \ 错误表示的问题可能是暂时性的，但 `kCLErrorDenied` 及其他错误可能表明，在当前会话的剩余时间内，你的应用程序将无法访问 Core Location。\n\
  \n**注意**：模拟器无法确定你的当前位置，但你可以从模拟器的 Debug ![image](img/arrow.jpg) Location 菜单中选取一个位置（例如默认的\
  \ Apple 总部）或设置自定义位置。\n\n### 尝试 Core Location\n\n让我们构建一个小型应用程序，用于检测你设备的当前位置以及程序运行期间移动的总距离。你可以在\
  \ Figure 19-2 中看到应用程序第一版的样子。\n\n![9781484202005_Fig19-02.jpg](img/9781484202005_Fig19-02.jpg)\n\
  \nFigure 19-2. WhereAmI 应用程序运行中\n\n在 Xcode 中，使用 Single View Application 模板创建一个新项目，并将其命名为\
  \ *WhereAmI*。当项目窗口打开时，选择 *ViewController.m* 并进行以下更改：\n\n```\n#import \"ViewController.h\"\
  \n#import <CoreLocation/CoreLocation.h>\n\n@interface ViewController () <CLLocationManagerDelegate>\n\
  \n@property (strong, nonatomic) CLLocationManager *locationManager;\n@property (strong,\
  \ nonatomic) CLLocation *previousPoint;\n@property (assign, nonatomic) CLLocationDistance\
  \ totalMovementDistance;\n@property (weak, nonatomic) IBOutlet UILabel *latitudeLabel;\n\
  @property (weak, nonatomic) IBOutlet UILabel *longitudeLabel;\n@property (weak,\
  \ nonatomic) IBOutlet UILabel *horizontalAccuracyLabel;\n@property (weak, nonatomic)\
  \ IBOutlet UILabel *altitudeLabel;\n@property (weak, nonatomic) IBOutlet UILabel\
  \ *verticalAccuracyLabel;\n@property (weak, nonatomic) IBOutlet UILabel *distanceTraveledLabel;\n\
  \n@end\n```\n\n首先，注意我们已经包含了 Core Location 头文件。Core Location 既不是 UIKit 也不是 Foundation\
  \ 的一部分，因此需要手动包含头文件。接下来，我们将此类遵循 `CLLocationManagerDelegate` 协议，以便能够从位置管理器接收位置信息。\n\
  \n然后，我们声明一个 `CLLocationManager` 指针，用于保存我们将要创建的 Core Location Manager 实例的指针。我们还声明了一个指向\
  \ `CLLocation` 的指针，该指针将设置为从位置管理器接收到的最后一次更新的位置。这样，每当用户移动足够远以触发更新时，我们就能将最新的移动距离累加到运行总距离中，该总距离保存在\
  \ `totalMovementDistance` 属性中。\n\n其余属性是用于更新用户界面标签的插座变量。\n\n现在选择 *Main.storyboard*，开始创建图形用户界面。首先，在文档大纲中展开视图控制器层级，选择视图项并将其名称改为\
  \ *Main View*，然后在属性检查器中将其背景颜色改为浅灰色。接着，从对象库中拖拽一个 `UIView`，放到现有视图上，然后调整其位置和大小，使其覆盖主视图的下半部分。确保该视图的底部、左侧和右侧与灰色视图完全对齐。目标是创建类似于\
  \ Figure 19-2 所示的布局，其中你刚刚拖放的视图是图中底部白色背景的那个。\n\n在文档大纲中，选择你刚刚添加的视图并将其名称改为 *Lower View*。从\
  \ Lower View 按住 Control 键拖拽到 Main View 并释放鼠标。在弹出菜单中，按住 Shift 键并点击 Leading Space\
  \ to Container Margin、Trailing Space to Container Margin 和 Bottom Space to Bottom\
  \ Layout Guide。这将固定 Lower View 的位置，但尚未设置其高度。为了固定高度，在文档大纲中仍然选中 Lower View 的情况下，点击\
  \ Pin 按钮。在弹出窗口中，选中 Height 复选框并将高度设置为 **166**，将 Update Frames 设置为 Items of New Constraint，然后点击\
  \ Add 1 Constraint 来设置高度。这样就完成了。\n\n接下来，我们将创建 Figure 19-2 所示的最右侧一列标签。从对象库中拖拽一个标签，放到\
  \ Lower View 顶部稍下方的位置。将其宽度调整为大约 80 点，并移动到靠近视图右侧边缘的位置。按住 Option 键向下拖拽该标签的副本五次，创建一叠标签，如图\
  \ Figure 19-2 所示。现在让我们修复标签相对于 Lower View 的大小和位置。\n\n\n\n从文档大纲的最顶部标签开始，按住 Control\
  \ 键并拖动该标签到 `Lower View`，然后松开鼠标。按住 `Shift` 键，选择 `Top Space to Container Margin` 和\
  \ `Trailing Space to Container Margin`，接着在界面任意位置点击鼠标以关闭弹出菜单。要设置标签的大小，点击 `Pin` 按钮打开**添加新约束**弹出菜单，勾选\
  \ `Width` 和 `Height` 复选框，将宽度设为 `80`，高度设为 `21`（如果尚未设置），然后点击 `Add 2 Constraints`。现在，你已经固定了顶部标签的大小和位置。如果在故事板编辑器中选中该标签，你应该能看到图\
  \ 19-3 左侧所示的约束。对另外五个标签重复同样的操作。\n\n![9781484202005_Fig19-03.jpg](img/9781484202005_Fig19-03.jpg)\n\
  \n图 19-3. 准备将显示位置信息的标签\n\n接下来，我们将添加第二列标签。从对象库中拖出一个标签，将其放在最顶部标签的左侧，两者之间留出一点水平间距。将标签的左侧边缘拖动到与\
  \ `Lower View` 的左边缘几乎对齐的位置，然后在属性检查器中，将 `Alignment` 设置为文本右对齐。按住 Option 键向下拖动，复制此标签五次，并将每个复制的标签与右侧对应的标签对齐，从而创建图\
  \ 19-3 右侧所示的左列。\n\n选中左列的顶部标签，按住 Control 键从它的左侧边缘拖动到 `Lower View` 的左侧边缘。松开鼠标，在上下文菜单中选择\
  \ `Leading Space to Container Margin`。接下来，按住 Control 键从同一个标签拖动到右列中与之匹配的标签。松开鼠标打开上下文菜单，按住\
  \ `Shift` 键，选择 `Horizontal Spacing` 和 `Baseline`，然后在上下文菜单外点击鼠标。对左列中的另外五个标签重复这一操作。最后，选中文档大纲中的\
  \ `View Controller` 图标，点击 `Resolve Auto Layout Issues` 按钮，如果 `Update Frames` 可用，则选择它。所有橙色的警告指示应该会消失，屏幕的下半部分应如图\
  \ 19-3 右侧所示。\n\n我们快大功告成了！现在需要将右列中的标签连接到视图控制器中的输出口。在助理编辑器中打开 `ViewController.m`，按住\
  \ Control 键从右列的顶部标签拖动到视图控制器中名为 `latitudeLabel` 的输出口，松开鼠标完成连接。然后依次将第二个标签拖动到 `longitudeLabel`，第三个标签到\
  \ `horizontalAccuracyLabel`，第四个到 `altitudeLabel`，第五个到 `verticalAccuracyLabel`，最后一个标签到\
  \ `distanceTraveledLabel`。至此，六个输出口已全部连接。\n\n最后，清空右列所有标签的文本，并将左列标签的文本改为图 19-2 所示的内容：顶部标签的文本应为\
  \ `Latitude:`，其下方依次为 `Longitude:`，以此类推。\n\n现在，让我们编写代码，在这些标签中显示一些有用的信息。选中 `ViewController.m`，在\
  \ `viewDidLoad` 中插入以下代码行，以配置位置管理器：\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \nself.locationManager = [[CLLocationManager alloc] init];\n    self.locationManager.delegate\
  \ = self;\n    self.locationManager.desiredAccuracy = kCLLocationAccuracyBest;\n\
      [self.locationManager requestWhenInUseAuthorization];\n}\n```\n\n我们分配并初始化一个\
  \ `CLLocationManager` 实例，将控制器类指定为委托，将期望精度设置为最高可用精度，然后请求在用户使用应用程序时获取使用位置服务的权限。就本例的目的而言，这一授权已足够。若要使用超出本书范围的\
  \ Core Location 更高级功能，你可能需要调用 `requestAlwaysAuthorization` 方法来请求随时使用 Core Location\
  \ 的权限。\n\n**注意** 在这个简单的示例中，授权请求在应用程序启动时发出，但苹果建议，在实际应用中，应将请求延迟到真正需要使用位置服务时再发出。原因是：当用户基于所请求的操作明显能理解你为何需要访问设备位置时，相比一个（很可能是刚安装的）应用在启动时立即请求权限，用户更有可能同意。\n\
  \n此应用程序首次运行时，iOS 会显示一个警告，询问用户是否允许该应用使用其位置。你需要提供一段简短的文本，iOS 会将其包含在警告弹窗中，解释你的应用为何需要知道用户的位置。打开\
  \ `info.plist` 文件，在键 `NSLocationWhenInUseUsageDescription` 下添加你想要显示的文本（如果你需要请求在应用未活跃使用时也能使用位置服务的权限，则应将文本添加到键\
  \ `NSLocationAlwaysUsageDescription` 下）。就本例而言，可以使用类似“该应用需要知道您的位置，以便在地图上更新您的定位”这样的文字。\n\
  \n**注意** 在较早的 iOS 版本中，为权限请求提供说明文本是可选的。从 iOS 8 开始，这是强制性的。如果不提供任何文本，权限请求将不会发出。\n\n\
  现在运行应用程序，你会看到 iOS 在权限请求中使用了你提供的文本，如图 19-4 所示。\n\n![9781484202005_Fig19-04.jpg](img/9781484202005_Fig19-04.jpg)\n\
  \n图 19-4. 提示用户授权使用位置服务\n\n此提示在应用程序的整个生命周期中只会出现一次。无论用户是否允许你的应用程序使用位置服务，此请求都不会再被提出——无论应用程序运行多少次。当然，这并不意味着用户不能改变主意。我们将在接下来的“更改位置服务权限”部分详细讨论。就测试而言，从\
  \ Xcode 重新运行应用程序不会影响用户已保存的响应——要获得干净的测试状态，你必须从模拟器或设备中删除应用程序。如果这样做，当你重新安装并启动应用程序时，iOS\
  \ 会再次提示授权。现在，对提示回复“允许”，然后继续编写我们的应用程序。\n\n你可能已经注意到，`viewDidLoad` 方法在调用 `requestWhenInUseAuthorization`\
  \ 后并没有立即调用位置管理器的 `startUpdatingLocation` 方法。事实上，这样做毫无意义，因为授权过程不会立即完成。在 `viewDidLoad`\
  \ 返回后的某个时刻，位置管理器委托的 `locationManager:didChangeAuthorizationStatus:` 方法会被调用，并传入应用程序的授权状态。这可能是用户对权限请求弹窗的回复结果，也可能是应用程序上次执行时保存的授权状态。无论哪种情况，假设你已获得授权，此方法都是开始监听位置更新的理想位置。将以下此方法的实现添加到\
  \ `ViewController.m` 文件中：\n\n\n```objc\n- (void)locationManager:(CLLocationManager\
  \ *)manager\n        didChangeAuthorizationStatus:(CLAuthorizationStatus)status\
  \ {\n    NSLog(@\"授权状态变更为 %d\", status);\n    switch (status) {\n    case kCLAuthorizationStatusAuthorizedAlways:\n\
  \    case kCLAuthorizationStatusAuthorizedWhenInUse:\n        [self.locationManager\
  \ startUpdatingLocation];\n        break;\n\ncase kCLAuthorizationStatusNotDetermined:\n\
  \    case kCLAuthorizationStatusRestricted:\n    case kCLAuthorizationStatusDenied:\n\
  \        [self.locationManager stopUpdatingLocation];\n        break;\n    }\n}\n\
  ```\n\n这段代码在授权被授予时开始监听位置更新，并在未授权时停止监听。既然只有在获得授权后才开始监听，那么未获得权限时调用 `stopUpdatingLocation`\
  \ 又有什么意义呢？这是个好问题。之所以需要这段代码，是因为用户可能先授予你的应用使用 Core Location 的权限，后来又撤销了它。在这种情况下，我们需要停止监听更新。更多信息请参阅本章后面的\"\
  更改位置服务权限\"一节。\n\n如果你的应用在未获得权限时尝试使用定位服务，或随时发生错误，位置管理器会调用其委托的 `locationManager:didFailWithError:`\
  \ 方法。让我们在视图控制器中添加该方法的实现：\n\n```objc\n- (void)locationManager:(CLLocationManager\
  \ *)manager\n       didFailWithError:(NSError *)error {\n    NSString *errorType\
  \ = error.code == kCLErrorDenied ? @\"访问被拒绝\"\n           : [NSString stringWithFormat:@\"\
  错误 %ld\", (long)error.code, nil];\n    UIAlertController *alertController =\n  \
  \    [UIAlertController alertControllerWithTitle:@\"定位管理器错误\"\n                \
  \         message:errorType\n                         preferredStyle:UIAlertControllerStyleAlert];\n\
  \    UIAlertAction *okAction = [UIAlertAction actionWithTitle:@\"确定\"\n        \
  \                        style:UIAlertActionStyleCancel handler:nil];\n    [alertController\
  \ addAction:okAction];\n    [self presentViewController:alertController animated:YES\
  \ completion:nil];\n}\n```\n\n在本示例中，当错误发生时，我们只是向用户弹出提示。在实际应用中，你应该使用更有意义的错误信息，并根据需要清理应用状态。\n\
  \n### 使用定位管理器更新\n\n现在我们已经处理了获取用户位置权限的问题，接下来要用这些信息做点什么。在 `@implementation` 块的末尾插入委托的\
  \ `locationManager:didUpdateLocation:` 方法的实现：\n\n```objc\n- (void)locationManager:(CLLocationManager\
  \ *)manager\n               didUpdateLocations:(NSArray *)locations {\n    CLLocation\
  \ *newLocation = [locations lastObject];\n    NSString *latitudeString = [NSString\
  \ stringWithFormat:@\"%g\\u00B0\",\n                                newLocation.coordinate.latitude];\n\
  \    self.latitudeLabel.text = latitudeString;\n\nNSString *longitudeString = [NSString\
  \ stringWithFormat:@\"%g\\u00B0\",\n                                 newLocation.coordinate.longitude];\n\
  \    self.longitudeLabel.text = longitudeString;\n\nNSString *horizontalAccuracyString\
  \ = [NSString stringWithFormat:@\"%gm\",\n                                     \
  \     newLocation.horizontalAccuracy];\n    self.horizontalAccuracyLabel.text =\
  \ horizontalAccuracyString;\n\nNSString *altitudeString = [NSString stringWithFormat:@\"\
  %gm\",\n                                newLocation.altitude];\n    self.altitudeLabel.text\
  \ = altitudeString;\n\nNSString *verticalAccuracyString = [NSString stringWithFormat:@\"\
  %gm\",\n                                        newLocation.verticalAccuracy];\n\
  \    self.verticalAccuracyLabel.text = verticalAccuracyString;\n\nif (newLocation.verticalAccuracy\
  \ < 0 ||\n        newLocation.horizontalAccuracy < 0) {\n        // 精度无效\n     \
  \   return;\n    }\n\nif (newLocation.horizontalAccuracy > 100 ||\n        newLocation.verticalAccuracy\
  \ > 50) {\n        // 精度半径太大，我们不希望使用它\n        return;\n    }\n\nif (self.previousPoint\
  \ == nil) {\n        self.totalMovementDistance = 0;\n    } else {\n        NSLog(@\"\
  移动距离: %f\",\n               [newLocation distanceFromLocation:self.previousPoint]);\n\
  \        self.totalMovementDistance +=\n               [newLocation distanceFromLocation:self.previousPoint];\n\
  \    }\n    self.previousPoint = newLocation;\n\nNSString *distanceString = [NSString\
  \ stringWithFormat:@\"%gm\",\n                                self.totalMovementDistance];\n\
  \    self.distanceTraveledLabel.text = distanceString;\n\n}\n```\n\n我们在委托方法中做的第一件事，就是用传递给\
  \ `locations` 参数的 `CLLocation` 对象中的值，更新图 19-2 第二列的前五个标签。`locations` 数组可能包含多个位置更新，但我们使用最后一条记录，它始终代表最新的信息。\n\
  \n**注意**  经度和纬度都使用包含看起来神秘的 `\\u00B0` 格式化字符串显示。这是度符号(°)的 Unicode 表示的十六进制值。在源代码文件中直接放置\
  \ ASCII 字符以外的任何内容都不是好主意，但在字符串中包含十六进制值则完全没问题，这也是我们在这里所做的。\n\n接下来，我们检查位置管理器给出的值的准确性。高精度值表示位置管理器对位置不太确定，而负精度值表示位置实际上是无效的。然而，有些设备没有确定垂直位置所需的硬件。在这些设备和模拟器上，`verticalAccuracy`\
  \ 属性将始终为 -1，因此我们不会排除具有此值的位置报告。\n\n这些精度值以米为单位，表示从给定位置到某个圆的半径，这意味着真实位置可能在该圆内的任何地方。我们的代码检查这些值是否可接受；如果不可接受，则直接从此方法返回，而不是用垃圾数据做任何进一步的操作：\n\
  \n```objc\nif (newLocation.horizontalAccuracy < 0) {\n    // 精度无效\n    return;\n\
  }\n\nif (newLocation.horizontalAccuracy > 100 ||\n    newLocation.verticalAccuracy\
  \ > 50) {\n    // 精度半径太大，我们不希望使用它\n    return;\n}\n```\n\n接下来，我们检查 `previousPoint`\
  \ 是否为 `nil`。如果是，则说明这次更新是从位置管理器获得的第一个有效更新，因此我们将 `distanceFromStart` 属性归零。否则，我们将最新位置与上一个点之间的距离累加到总距离中。无论哪种情况，我们都将更新\
  \ `previousPoint` 为当前位置：\n\n```objc\nif (self.previousPoint == nil) {\n    self.totalMovementDistance\
  \ = 0;\n} else {\n    self.totalMovementDistance += [newLocation\n             \
  \                 distanceFromLocation:self.previousPoint];\n}\nself.previousPoint\
  \ = newLocation;\n```\n\n之后，我们用从起点移动的总距离来填充最后一个标签。当此应用运行时，如果用户移动的距离足够让位置管理器检测到变化，\"\
  移动距离\"字段将持续更新为用户从应用启动以来移动的距离：\n\n```objc\nNSString *distanceString = [NSString stringWithFormat:@\"\
  %gm\",\n                            self.totalMovementDistance];\nself.distanceTraveledLabel.text\
  \ = distanceString;\n```\n\n就是这样。Core Location 相当简单直接且易于使用。\n\n编译并运行应用，然后尝试使用。如果你能在\
  \ iPhone 或 iPad 上运行此应用，尝试带着运行中的应用开车出门，观察你驾车时数值的变化。呃，实际上，最好让其他人来开车！\n\n\n### 在地图上可视化你的运动轨迹\n\
  \n到目前为止，我们所做的功能已经很不错了，但如果能在地图上直观地看到我们的旅行轨迹，岂不是更好？幸运的是，iOS 提供了 Map Kit 框架来帮助我们实现这一点。Map\
  \ Kit 使用的是与苹果地图应用相同的后端服务，这意味着它相当稳定且一直在改进。它包含一个用于呈现地图的视图类，并且能像你期望的任何现代地图应用一样响应用户手势。这个视图还允许我们为任何想要在地图上显示的位置添加标注，默认情况下标注会显示为可点击的“图钉”，点击后会显示更多信息。我们将在\
  \ WhereAmI 应用中扩展功能，让它在**地图上显示用户的起始位置和当前位置**。\n\n选择 `*ViewController.m*` 并在文件顶部附近添加以下代码，以导入\
  \ Map Kit 框架的头文件：\n\n```objc\n#import <MapKit/MapKit.h>\n```\n\n现在在类扩展中为将显示用户位置的地图视图添加一个新的属性声明，放在其他属性之后：\n\
  \n```objc\n@property (weak, nonatomic) IBOutlet MKMapView *mapView;\n```\n\n现在选择\
  \ `*Main.storyboard*` 来编辑视图。从对象库中拖拽一个地图视图到用户界面上。调整地图视图的大小，使其覆盖整个屏幕，包括下方的视图及其所有标签。然后选择\
  \ Editor ![image](img/arrow.jpg) Arrange ![image](img/arrow.jpg) Send to Back，将地图视图移到下方视图之后。在文档大纲中，按住\
  \ Control 键从地图视图拖拽到主视图，然后在上下文菜单中按住 Shift 键，选择 Leading Space to Container Margin、Trailing\
  \ Space to Container Margin、Top Space to Top Layout Guide 和 Bottom Space to Bottom\
  \ Layout Guide，最后用鼠标点击上下文菜单外部。\n\n地图视图现在已经固定到位，但它的底部部分被遮挡了。我们可以通过让下方视图部分透明来解决这个问题。为此，在文档大纲中选择下方视图，打开属性检查器，点击背景颜色编辑器，在弹出的菜单中选择\
  \ Other... 打开颜色选择器。选择白色背景，并将不透明度滑块移到大约 70%。最后，按住 Control 键从地图视图拖拽到 `*ViewController.m*`\
  \ 中的 `mapView` 属性，以连接输出口。\n\n现在这些准备工作已经就绪，是时候编写一点代码让地图为我们工作了。在处理视图控制器所需的代码之前，我们需要建立一个模型类来表示起点。`*MKMapView*`\
  \ 是作为 MVC（模型-视图-控制器）架构中的视图部分构建的，如果我们有独立的类来表示地图上的标记点，它会工作得最好。我们可以将模型对象传递给地图视图，它会通过\
  \ Map Kit 框架中定义的协议来查询这些对象的坐标、标题等信息。\n\n按下 **![image](img/flower.jpg)N** 打开新建文件助手，在\
  \ iOS 部分选择 Cocoa Touch Class。将类命名为 `*Place*`，并使其成为 `NSObject` 的子类。选择 `*Place.h*`\
  \ 并按下图所示进行修改。你需要导入 Map Kit 头文件，指定新类要遵循的协议，并添加一些属性：\n\n```objc\n#import <Foundation/Foundation.h>\n\
  #import <MapKit/MapKit.h>\n\n@interface Place : NSObject <MKAnnotation>\n\n@property\
  \ (copy, nonatomic) NSString *title;\n@property (copy, nonatomic) NSString *subtitle;\n\
  @property (assign, nonatomic) CLLocationCoordinate2D coordinate;\n\n@end\n```\n\n\
  这是一个相当“笨拙”的类，仅仅作为这些属性的容器。我们甚至不需要修改 `*.m*` 文件！在实际应用中，你可能会有需要作为标注显示在地图上的真实模型类，而 `MKAnnotation`\
  \ 协议允许你为任何自定义类添加这种能力，同时不会破坏现有的类层次结构。\n\n选择 `*ViewController.m*`，首先导入新类的头文件：\n\n\
  ```objc\n#import \"Place.h\"\n```\n\n现在在 `locationManager:didChangeAuthorizationStatus:`\
  \ 方法中添加以下两行代码：\n\n```objc\n- (void)locationManager:(CLLocationManager *)manager\n\
  \        didChangeAuthorizationStatus:(CLAuthorizationStatus)status {\n    NSLog(@\"\
  Authorization status changed to %d\", status);\n    switch (status) {\n    case\
  \ kCLAuthorizationStatusAuthorizedAlways:\n    case kCLAuthorizationStatusAuthorizedWhenInUse:\n\
  \        [self.locationManager startUpdatingLocation];\n         self.mapView.showsUserLocation\
  \ = YES;\n        break;\n\ncase kCLAuthorizationStatusNotDetermined:\n    case\
  \ kCLAuthorizationStatusRestricted:\n    case kCLAuthorizationStatusDenied:\n  \
  \      [self.locationManager stopUpdatingLocation];\n         self.mapView.showsUserLocation\
  \ = NO;\n        break;\n    }\n}\n```\n\n地图视图的 `showsUserLocation` 属性正如你想象的那样：它省去了我们手动随着用户移动而移动标记的麻烦，而是自动为我们绘制一个标记。它使用\
  \ Core Location 获取用户位置，并且仅在你的应用获得授权时才有效，因此我们在被告知有权使用 Core Location 时启用该属性，并在失去权限时禁用它。\n\
  \n现在让我们重新审视 `locationManager:didUpdateLocations:` 方法。我们已经有一些代码在其中，用于接收第一个有效的定位数据并建立起点。我们还将分配\
  \ `Place` 类的一个新实例。设置其属性，为其指定一个位置。同时添加我们希望在显示该位置的标记时出现的标题和副标题。最后，将这个对象传递给地图视图。\n\n\
  我们还创建了一个 `MKCoordinateRegion` 实例，这是 Map Kit 中包含的一个结构体，用于告诉地图视图我们想要显示地图的哪个部分。`MKCoordinateRegion`\
  \ 使用新位置的坐标以及一对以米为单位的距离（100, 100）来指定显示的地图部分的宽度和高度。我们也将这个结构体传递给地图视图，并告诉它动画显示这个变化。所有这些操作都通过添加以下加粗显示的代码来完成：\n\
  \n```objc\nif (self.previousPoint == nil) {\n    self.totalMovementDistance = 0;\n\
  \nPlace *start = [[Place alloc] init];\n    start.coordinate = newLocation.coordinate;\n\
  \    start.title = @\"起点\";\n    start.subtitle = @\"这是我们出发的地方！\";\n\n[self.mapView\
  \ addAnnotation:start];\n    MKCoordinateRegion region;\n    region = MKCoordinateRegionMakeWithDistance(newLocation.coordinate,\n\
  \                                                100, 100);\n    [self.mapView setRegion:region\
  \ animated:YES];\n} else {\n    self.totalMovementDistance += [newLocation\n   \
  \                           distanceFromLocation:self.previousPoint];\n}\nself.previousPoint\
  \ = newLocation;\n```\n\n现在我们已经告诉地图视图，我们有一个标注（即可见的位置标记），希望用户看到它。但它应该如何显示呢？地图视图通过询问其委托来决定为每个标注显示什么类型的视图。在更复杂的应用中，这会为我们工作。但在本例中，我们没有将自己设置为委托，仅仅是因为对于我们的简单用例来说没有必要。与\
  \ `UITableView` 要求其数据源提供显示单元格不同，`MKMapView` 采用不同的策略：如果委托没有提供标注视图，它就会显示一个默认视图——地图上的红色“图钉”，点击后显示更多信息。真巧妙！\n\
  \n\n\n### 启用地图套件与使用定位服务\n\n最后一步你需要做的是——让你的应用能够使用地图套件。为此，请在项目导航器中选择项目，然后选择 WhereAmI\
  \ 目标。在编辑器区域顶部，选择\"Capabilities\"（功能），找到\"Map\"（地图）部分，将右侧的选择开关从\"OFF\"（关闭）拨到\"ON\"\
  （开启）。现在构建并运行你的应用，你会看到地图视图加载出来。一旦它获取到有效的位置数据，就会滚动到正确位置，在你的起始点放置一个大头针，并用一个发光的蓝点标记你当前的位置（见图\
  \ 19-5）。对于几十行代码来说，这效果已经很不错了！\n\n![9781484202005_Fig19-05.jpg](img/9781484202005_Fig19-05.jpg)\n\
  \n图 19-5。红色大头针标记了我们的起始位置，蓝色圆点显示了我们走过的距离——在这个例子中，没有任何移动距离！\n\n### 更改定位服务权限\n\n当你的应用首次运行时，你希望用户能授予其使用定位服务的权限。无论你是否获得权限，你都不能假设一切都不会改变。用户可以通过\"\
  设置\"应用授予或撤销定位权限。你可以在模拟器上对此进行测试。启动应用并授予自己使用 Core Location（核心定位）的权限（如果你之前拒绝了权限，需要先卸载并重新安装应用）。你应该在地图上看到你的位置。现在转到\"\
  设置\"应用，选择\"隐私\"![image](img/arrow.jpg)\"定位\"。屏幕顶部有一个开关，用于打开或关闭定位服务。将开关拨到\"关闭\"，然后返回你的应用。你会发现地图不再显示你的位置。这是因为位置管理器调用了\
  \ `locationManager:didChangeAuthorizationStatus:` 方法，并传入了授权代码 `kCLAuthorizationStatusDenied`，作为响应，应用停止接收位置更新，并告知地图套件停止追踪用户位置。现在回到\"\
  设置\"应用，重新启用 Core Location（核心定位），再返回你的应用；你会发现它又开始追踪你的位置了。\n\n关闭定位服务并非用户改变应用使用 Core\
  \ Location（核心定位）权限的唯一方式。回到\"设置\"应用。在启用定位服务的开关下方，你会看到所有使用定位服务的应用列表，包括 WhereAmI，如图\
  \ 19-6 左侧所示。点击应用名称会进入另一个页面，你可以在其中允许或拒绝该应用的访问权限，如图 19-6 右侧所示。目前，该应用在用户使用期间可以使用定位服务。如果你点击\"\
  永不\"（Never），该权限即被撤销，你可以通过再次返回应用来验证这一点。这表明，对应用进行编码使其能够检测并正确响应授权状态的变化非常重要。\n\n![9781484202005_Fig19-06.jpg](img/9781484202005_Fig19-06.jpg)\n\
  \n图 19-6。更改 WhereAmI 应用的 Core Location（核心定位）访问权限\n\n### 无论你去哪里，你就在这里\n\n到此，我们对 Core\
  \ Location（核心定位）和 Map Kit（地图套件）的介绍就结束了。关于这两个框架，还有相当多的内容有待探索。以下只是其中的一些亮点：\n\n*  \
  \ 对于需要较低定位精度和/或较低更新频率的应用（例如天气应用），可以使用“重要位置更新”（Significant Location Updates）服务，而不是使用\
  \ `startUpdatingLocation` 方法密切追踪用户位置。只要可能，你应该使用此服务，因为它能显著降低功耗。\n*   在带有磁力计的设备上，Core\
  \ Location（核心定位）可以报告用户的朝向。如果设备还有 GPS，它还能报告用户的移动方向。\n*   Core Location（核心定位）可以在用户进入或离开应用定义的地理区域（定义为具有给定半径和圆心的圆形区域）时，或者在应用位于\
  \ iBeacon 附近时进行报告。\n*   你可以使用地理编码服务，在 Core Location（核心定位）报告的坐标与用户友好的地标对象之间进行转换，反之亦然。除此之外，Map\
  \ Kit（地图套件）还包含一个 API，允许你按名称或地址搜索位置。\n*   iOS 8 中的新功能，Core Location（核心定位）会监测用户的移动，并能判断用户何时在某个位置停留一段时间。发生这种情况时，系统会认为用户正在“访问”（visiting）该位置。当用户到达和离开某个访问位置时，你的应用可以接收到通知。\n\
  \n关于所有这些功能的最佳信息来源是 Apple 的《位置与地图编程指南》（*Location and Maps Programming Guide*）。\n\n\
  尽管底层技术相当复杂，但 Apple 提供了简单的接口，隐藏了大部分复杂性，使得在你的应用中添加位置相关和地图功能变得相当容易，这样你就可以知道用户在哪里，注意到他们何时移动，并在地图上标记他们的位置（以及任何其他位置）。\n\
  \n说到移动，当你准备好之后，请直接进入下一章，这样我们就可以玩转 iPhone 内置的加速计了。\n\n"
- "# 第 20 章：哇塞！陀螺仪与加速计！\n\niPhone、iPad 和 iPod touch 最酷的功能之一就是内置的加速计——这个微小的设备能让 iOS\
  \ 知道设备是如何被握持的，以及它是否在移动。iOS 使用加速计来处理自动旋转，许多游戏也将其用作控制机制。加速计还可以用来检测摇晃和其他突发移动。iPhone\
  \ 4 的推出进一步扩展了这一能力，它是第一款包含内置陀螺仪的 iPhone，让开发者能够确定设备围绕每个轴的角度。现在，陀螺仪和加速计已成为所有新款 iPad\
  \ 和 iPod touch 的标准配置。在本章中，我们将向你介绍如何使用 Core Motion（核心运动）框架在应用中访问陀螺仪和加速计的值。\n\n##\
  \ 加速计物理原理\n\n加速计通过感应给定方向上的惯性力来测量加速度和重力。你的 iOS 设备中的加速计是一个三轴加速计。这意味着它能够检测三维空间中的运动或重力拉力。换句话说，你不仅可以使用加速计来发现设备当前是如何被握持的（就像自动旋转那样），还能了解它是否平放在桌子上，甚至判断它是屏幕朝下还是屏幕朝上。\n\
  \n加速计以 g 力（*g* 代表重力）为单位进行测量，因此加速计返回的 1.0 值意味着在特定方向上感应到了 1 g 的力，示例如下：\n\n*   如果设备静止不动，地球引力会对其施加大约\
  \ 1 g 的力。\n*   如果设备以竖屏方向被完美地垂直握持，它会检测到并报告大约 1 g 的力施加在其 y 轴上。\n*   如果设备以一定角度被握持，这\
  \ 1 g 的力会根据握持方式分布到不同的轴上。当以 45 度角握持时，这 1 g 的力将大致平均分配到两个轴上。\n\n\n\n通过检测远大于 1 g 的加速度计值，可以判断设备的突然运动。在正常使用中，加速度计在任何轴向上都不会检测到显著超过\
  \ 1 g 的值。如果你摇晃、掉落或抛掷设备，加速度计将会在一个或多个轴向上检测到更大的力。（请不要真的掉落或抛掷你自己的 iOS 设备来测试这一理论，除非你正想找个借口升级到最新款！）\n\
  \n图 20-1 展示了加速度计所使用的三个轴。请注意，加速度计使用了更标准的 y 坐标约定，即 y 值增加表示向上的力，这与 Quartz 2D 的坐标系（参见第\
  \ 16 章）相反。当你在 Quartz 2D 中将加速度计用作控制机制时，需要转换 y 坐标。而当与 Sprite Kit 配合使用时（这在利用加速度计控制动画时更为常见），则无需进行转换。\n\
  \n![9781484202005_Fig20-01.jpg](img/9781484202005_Fig20-01.jpg)\n\n图 20-1. iPhone\
  \ 加速度计的三维轴。左侧的 iPhone 正面视图显示了 x 轴和 y 轴。右侧的侧视图显示了 z 轴。\n\n**别忘记旋转**\n\n我们之前提到，所有当前设备都包含一个陀螺仪传感器，允许你读取描述设备绕其轴旋转的值。\n\
  \n如果陀螺仪和加速度计之间的区别让你感到模糊，不妨想象一部 iPhone 平放在桌子上。当你开始旋转平放的手机时，加速度计的值不会发生变化。这是因为促使手机移动的力——在这种情况下，仅仅是沿\
  \ z 轴垂直向下的重力——没有改变。（实际上，情况比这更复杂一些，你手部撞击手机的动作肯定会触发小幅度的加速度计响应。）然而，在同样的旋转过程中，设备的旋转值会发生变化——特别是\
  \ z 轴旋转值。顺时针旋转设备会生成负值，逆时针旋转则生成正值。停止旋转后，z 轴旋转值将回到零。\n\n陀螺仪并非记录绝对的旋转值，而是告诉你设备旋转的实时变化。你将在本章的第一个示例中了解其工作原理，稍后将会呈现。\n\
  \n**核心运动与运动管理器**\n\n加速度计和陀螺仪的值通过 Core Motion 框架访问。该框架提供了`CMMotionManager`类，它充当了描述用户如何移动设备的所有值的网关。你的应用创建一个`CMMotionManager`实例，然后以两种模式之一使用它：\n\
  \n*  它可以在运动发生时为你执行一些代码。\n*  它可以持有一个持续更新的结构，让你能够随时访问最新的值。\n\n后一种方法非常适合游戏和其他高度交互的应用，这些应用需要在每个游戏循环周期中轮询设备的当前状态。我们将展示如何实现这两种方法。\n\
  \n请注意，`CMMotionManager`类实际上并非单例，但你的应用应将其视为单例。每个应用只应使用标准的`alloc`和`init`方法创建一个此类实例。因此，如果你需要从应用中的多个位置访问运动管理器，最好在应用委托中创建它，并从那里提供访问。\n\
  \n除了`CMMotionManager`类，Core Motion 还提供了其他一些类，例如`CMAccelerometerData`和`CMGyroData`，它们是简单的容器，你的应用可以通过它们访问原始的加速度计和陀螺仪信息；以及`CMDeviceMotion`类，它将加速度计和陀螺仪测量值与姿态信息相结合——即设备是平放、向上倾斜、向左倾斜等等。在本章的示例中，我们将使用`CMDeviceMotion`类。\n\
  \n**基于事件的运动**\n\n我们提到过，运动管理器可以在一种模式下运行，即每次运动数据变化时为你执行一些代码。大多数其他 Cocoa Touch 类通过让你连接到委托，在时机到来时接收消息来提供这种功能，但\
  \ Core Motion 的做法略有不同。\n\n`CMMotionManager`没有使用一组委托方法来通知我们发生的事件，而是允许你传入一个在运动发生时执行的\
  \ block。我们在本书中已经多次使用过 block，现在你将看到此技术的另一种应用。\n\n使用 Xcode 创建一个名为`MotionMonitor`的新\
  \ Single View Application 项目。这将是一个简单的应用，它会读取加速度计数据、陀螺仪数据（如果可用）以及姿态信息，并在屏幕上显示这些信息。\n\
  \n**注意** 本章中的应用无法在模拟器上运行，因为模拟器没有加速度计。哎呀，真可惜。\n\n现在选择`ViewController.m`文件，并进行以下更改：\n\
  \n```objectivec\n#import \"ViewController.h\"\n\n@interface ViewController ()\n\n\
  @property (weak, nonatomic) IBOutlet UILabel *gyroscopeLabel;\n@property (weak,\
  \ nonatomic) IBOutlet UILabel *accelerometerLabel;\n@property (weak, nonatomic)\
  \ IBOutlet UILabel *attitudeLabel;\n\n@end\n```\n\n这为我们提供了三个标签的出口，我们将在其中显示信息。这里无需过多解释，只需保存你的更改即可。\n\
  \n接下来，在 Interface Builder 中打开`Main.storyboard`。在文档概览中，展开视图控制器并将其视图重命名为`Main View`。现在从库中拖出一个`Label`到视图中。调整标签大小，使其从屏幕左侧延伸到右侧，高度约为整个视图的三分之一，然后将标签顶部对齐到顶部蓝色参考线。现在打开属性检查器，将\
  \ Lines 字段从`1`改为`0`。Lines 属性用于指定标签中可能出现的文本行数，并提供了一个硬性上限。如果将其设置为 0，则不应用限制，标签可以包含任意多行文本。\n\
  \n接下来，从库中拖出第二个标签，直接放在第一个标签下方。将其顶部与第一个标签的底部对齐，左右两侧与屏幕的左右边缘对齐。将其大小调整为与第一个标签大致相同的高度。我们不需要对此过于精确，因为我们将使用自动布局来控制标签的最终高度。拖出第三个标签，将其顶部边缘与第二个标签的底部边缘对齐，然后调整其大小，使其底部边缘与屏幕底部边缘对齐，并将其左右两侧与屏幕的左右边缘对齐。将两个标签的\
  \ Lines 属性都设置为 0。\n\n\n\n现在让我们修复这三个标签的位置和大小。在文档概览中，从顶部标签按住 Control 键拖拽到主视图然后释放鼠标。在上下文菜单中，按住`Shift`键并选择`Leading\
  \ Space to Container Margin`、`Top Space to Top Layout Guide`和`Trailing Space to\
  \ Container Margin`，然后用鼠标点击上下文菜单外部。从第二个标签按住 Control 键拖拽到主视图，在上下文菜单中按住`Shift`键并选择`Leading\
  \ Space to Container Margin`和`Trailing Space to Container Margin`，然后用鼠标点击上下文菜单外部。从第三个标签按住\
  \ Control 键拖拽到主视图，这次按住`Shift`键选择`Leading Space to Container Margin`、`Bottom Space\
  \ to Bottom Layout Guide`和`Trailing Space to Container Margin`。\n\n现在所有三个标签都固定到了主视图的边缘，让我们将它们相互连接起来。从第二个标签按住\
  \ Control 键拖拽到第一个标签，并从弹出菜单中选择`Vertical Spacing`。从第二个标签按住 Control 键拖拽到第三个标签，执行相同操作。最后，我们需要确保这些标签具有相同的高度。为此，按住`Shift`键并点击所有三个标签使它们全部被选中。点击`Pin`按钮，在弹出的窗口中勾选`Equal\
  \ Heights`复选框并按下`Add 2 Constraints`。点击`Resolve Auto Layout Issues`按钮，然后点击`Update\
  \ All Frames in View Controller`。如果该选项不可用，请选择文档概览中的`View Controller`图标并重试。\n\n布局完成；现在让我们将标签连接到它们的出口。在辅助编辑器中打开`ViewController.m`，然后从顶部标签按住\
  \ Control 键拖拽到`gyroscopeLabel`并连接出口。对第二个标签执行相同操作，将其连接到`accelerometerLabel`，第三个标签应连接到`attituteLabel`。最后，双击每个标签并删除现有文本。\n\
  \n这个简单的 GUI 就完成了，所以保存你的工作并准备开始编码。\n\n接下来，选择`ViewController.m`。现在进入有趣的部分。添加以下内容：\n\
  \n```objectivec\n#import \"ViewController.h\"\n#import <CoreMotion/CoreMotion.h>\n\
  \n@interface ViewController ()\n\n@property (weak, nonatomic) IBOutlet UILabel *gyroscopeLabel;\n\
  @property (weak, nonatomic) IBOutlet UILabel *accelerometerLabel;\n@property (weak,\
  \ nonatomic) IBOutlet UILabel *attitudeLabel;\n\n@property (retain, nonatomic) CMMotionManager\
  \ *motionManager;\n@property (retain, nonatomic) NSOperationQueue *queue;\n\n@end\n\
  \n@implementation ViewController\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \    // Do any additional setup after loading the view, typically from a nib.\n\n\
  \    self.motionManager = [[CMMotionManager alloc] init];\n    self.queue = [[NSOperationQueue\
  \ alloc] init];\n    if (self.motionManager.deviceMotionAvailable) {\n        self.motionManager.deviceMotionUpdateInterval\
  \ = 0.1;\n        [self.motionManager startDeviceMotionUpdatesToQueue:self.queue\n\
  \                                          withHandler:^(CMDeviceMotion *motion,\
  \ NSError *error) {\n            CMRotationRate rotationRate = motion.rotationRate;\n\
  \            CMAcceleration gravity = motion.gravity;\n            CMAcceleration\
  \ userAcc = motion.userAcceleration;\n            CMAttitude *attitude = motion.attitude;\n\
  \n            NSString *gyroscopeText = [NSString stringWithFormat:\n          \
  \                            @\"Rotation Rate:\\n-----------------\\n\"\n      \
  \                                \"x: %+.2f\\ny: %+.2f\\nz: %+.2f\\n\",\n      \
  \                                rotationRate.x, rotationRate.y, rotationRate.z];\n\
  \            NSString *acceleratorText = [NSString stringWithFormat:\n         \
  \                               @\"Acceleration:\\n---------------\\n\"\n      \
  \                                  \"Gravity x: %+.2f\\t\\tUser x: %+.2f\\n\"\n\
  \                                        \"Gravity y: %+.2f\\t\\tUser y: %+.2f\\\
  n\"\n                                        \"Gravity z: %+.2f\\t\\tUser z: %+.2f\\\
  n\",\n                                        gravity.x, userAcc.x, gravity.y,\n\
  \                                        userAcc.y, gravity.z, userAcc.z];\n   \
  \         NSString *attitudeText = [NSString stringWithFormat:\n               \
  \                      @\"Attitude:\\n----------\\n\"\n                        \
  \             \"Roll: %+.2f\\nPitch: %+.2f\\nYaw: %+.2f\\n\",\n                \
  \                     attitude.roll, attitude.pitch, attitude.yaw];\n\n        \
  \    dispatch_async(dispatch_get_main_queue(), ^{\n                self.gyroscopeLabel.text\
  \ = gyroscopeText;\n                self.accelerometerLabel.text = acceleratorText;\n\
  \                self.attitudeLabel.text = attitudeText;\n            });\n    \
  \    }];\n    }\n}\n\n- (void)didReceiveMemoryWarning\n{\n    [super didReceiveMemoryWarning];\n\
  \    // Dispose of any resources that can be recreated.\n}\n\n@end\n```\n\n首先，我们导入用于处理\
  \ Core Motion 框架的头文件，并向类扩展添加两个额外的属性：\n\n```objectivec\n@interface ViewController\
  \ ()\n\n@property (weak, nonatomic) IBOutlet UILabel *gyroscopeLabel;\n@property\
  \ (weak, nonatomic) IBOutlet UILabel *accelerometerLabel;\n@property (weak, nonatomic)\
  \ IBOutlet UILabel *attitudeLabel;\n\n@property (strong, nonatomic) CMMotionManager\
  \ *motionManager;\n@property (strong, nonatomic) NSOperationQueue *queue;\n\n@end\n\
  ```\n\n接下来，在`viewDidLoad`方法中，我们添加代码来请求设备运动更新，并在收到陀螺仪、加速度计和姿态读数时更新标签。\n\n得益于 block\
  \ 的强大功能，这一切都非常简单且连贯。你可以将行为定义在 block 中，从而在配置该行为的同一个方法中看到行为，而不是将部分功能放在代理方法中。让我们稍微解析一下。我们以这段代码开始：\n\
  \n```objectivec\nself.motionManager = [[CMMotionManager alloc] init];\nself.queue\
  \ = [[NSOperationQueue alloc] init];\n```\n\n这段代码首先创建了一个`CMMotionManager`实例，我们将用它来监控运动事件。然后代码创建了一个操作队列，它只是一个需要完成的工作的容器。\n\
  \n**注意** 运动管理器需要一个队列，每次事件发生时，它会将要完成的工作（由你提供的 block 指定）放入该队列。使用系统的默认队列来实现此目的可能很诱人，但`CMMotionManager`的文档明确警告不要这样做！问题是默认队列最终可能被这些事件塞满，从而难以处理其他关键的系统事件。\n\
  \n下一步是开始请求设备运动更新。我们首先检查设备是否确实具备提供运动信息所需的硬件。迄今为止发布的所有手持 iOS 设备都具备此功能，但检查一下以防未来某些设备不具备是值得的。接下来，我们设置更新之间的时间间隔，以秒为单位。这里，我们要求十分之一秒。请注意，设置此值并不能保证我们以精确的速度接收更新。实际上，该设置是一个上限，指定了运动管理器允许提供的最佳速率。实际上，它的更新频率可能低于此值：\n\
  \n```objectivec\nif (self.motionManager.deviceMotionAvailable) {\n    self.motionManager.deviceMotionUpdateInterval\
  \ = 0.1;\n```\n\n\n\n接下来，我们让运动管理器开始报告设备运动更新。我们传入一个块，定义每次更新发生时需要执行的工作，以及该块将入队执行的队列。请记住，块总是以脱字符号（`^`）开头，随后是由括号包裹的参数列表，这些参数是块在执行时预期接收的（本例中是一个包含最新运动数据的\
  \ `CMDeviceMotion` 对象和可能用于提醒我们出错的错误信息），最后以包含待执行代码的花括号部分结尾：\n\n```\nself.motionManager\
  \ startDeviceMotionUpdatesToQueue:self.queue\n    withHandler:^(CMDeviceMotion *motion,\
  \ NSError *error) {\n```\n\n接下来是块的内容。它根据当前运动值创建字符串，并将其推送到标签中。我们不能直接在这里操作，因为像 `UILabel`\
  \ 这样的 UIKit 类通常只在主线程访问时才能正常工作。由于这段代码的执行方式——位于一个 `NSOperationQueue` 中——我们根本不知道具体在哪个线程上执行。因此，我们使用\
  \ `dispatch_async()` 函数将控制权传递给主线程，然后再设置标签的 `text` 属性。\n\n陀螺仪值通过传入块的 `CMDeviceMotion`\
  \ 对象的 `rotationRate` 属性进行访问。`rotationRate` 属性的类型是 `CMRotationRate`，它是一个包含三个 `float`\
  \ 值的简单 `struct`，分别表示围绕 x、y 和 z 轴的旋转速率。加速度计数据稍微复杂一些，因为 Core Motion 报告两个不同的值——重力加速度和用户施加力引起的额外加速度。你可以从\
  \ `gravity` 和 `userAcceleration` 属性获取这些值，这两个属性的类型都是 `CMAcceleration`。`CMAcceleration`\
  \ 是另一个简单的 `struct`，包含沿 x、y 和 z 轴的加速度。最后，设备姿态在 `attitude` 属性中报告，其类型为 `CMAttitude`。我们将在运行应用程序时进一步讨论这个问题。\n\
  \n在尝试运行应用程序之前，还有一件事需要做。我们将以各种方式移动和旋转设备，观察 `CMDeviceMotion` 结构中的值如何与设备实际发生的变化相关联。在此过程中，我们不希望自动旋转被触发。为防止这种情况，请在项目导航器中选择项目，选择\
  \ *MotionMonitor* 目标，然后选择 *General* 选项卡。在 Deployment Info 部分的 Device Orientation\
  \ 区域中，选择 *Portrait*，并确保其他三个方向未被选中。这样就将应用程序锁定为仅竖屏方向。\n\n现在，在你拥有的任何 iOS 设备上构建并运行你的应用程序，然后尝试一下（参见[图\
  \ 20-2）。\n\n![9781484202005_Fig20-02.jpg](img/9781484202005_Fig20-02.jpg)\n\n图 20-2。在\
  \ iPhone 上运行的 MotionMonitor。遗憾的是，如果你在模拟器中运行此应用，将不会获得任何有用信息\n\n当你以不同方式倾斜设备时，你会看到旋转速率、加速度计和姿态值如何适应每个新位置，并且只要保持设备静止，这些值就会保持稳定。当设备静止不动时，无论处于哪种方向，旋转值都会接近零。当你旋转设备时，你会看到旋转值根据你绕不同轴旋转的方式而变化。当你停止移动设备时，这些值总会回到零。我们稍后将更仔细地审视所有结果。\n\
  \n## 主动运动访问\n\n你已经了解了如何通过向 `CMMotionManager` 传递块，使其在运动发生时被调用来访问运动数据。这种事件驱动的运动处理方式对于普通的\
  \ Cocoa 应用来说已经足够，但有时它并不完全符合应用的特定需求。例如，交互式游戏通常有一个永不停歇的运行循环，用于处理用户输入、更新游戏状态和重绘屏幕。在这种情况下，事件驱动的方法并不太合适，因为你需要实现一个对象来等待运动事件，记住每个传感器报告的最新位置，并在需要时准备将数据返回给主游戏循环。\n\
  \n幸运的是，`CMMotionManager` 内置了一个解决方案。我们可以不传递块，而是直接告诉它使用 `startDeviceMotionUpdates`\
  \ 方法激活传感器。一旦这样做，我们就可以随时直接从运动管理器读取这些值！\n\n让我们修改 MotionMonitor 应用以使用这种方法，这样你就能看到它的工作原理。首先，复制你的\
  \ *MotionMonitor* 项目文件夹。\n\n**注意** 在示例源代码的 *20 – MonitorMotion2* 文件夹中，你可以找到该项目的完整版本。\n\
  \n关闭打开的 Xcode 项目，转而打开新副本中的项目，直接进入 *ViewController.m*。第一步是删除队列属性，并添加一个新属性，一个指向 `NSTimer`\
  \ 的指针，该定时器将触发所有显示更新：\n\n```\n#import \"ViewController.h\"\n#import <CoreMotion/CoreMotion.h>\n\
  \n@interface ViewController ()\n\n@property (weak, nonatomic) IBOutlet UILabel *gyroscopeLabel;\n\
  @property (weak, nonatomic) IBOutlet UILabel *accelerometerLabel;\n@property (weak,\
  \ nonatomic) IBOutlet UILabel *attitudeLabel;\n\n@property (strong, nonatomic) CMMotionManager\
  \ *motionManager;\n@property (strong, nonatomic) NSOperationQueue *queue;\n@property\
  \ (strong, nonatomic) NSTimer *updateTimer;\n\n@end\n```\n\n接下来，删除之前的大部分 `viewDidLoad`\
  \ 方法，并用这个更简单的版本替换：\n\n```\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n    //\
  \ Do any additional setup after loading the view, typically from a nib.\n    self.motionManager\
  \ = [[CMMotionManager alloc] init];\n}\n```\n\n我们将使用一个定时器，每十分之一秒直接从运动管理器收集运动数据，而不是将其传递给代码块。我们希望定时器——以及运动管理器本身——仅在视图实际显示的一个小时间窗口内保持活动。这样，我们就可以将主游戏循环的使用率降至最低。我们可以通过实现\
  \ `viewWillAppear:` 和 `viewDidDisappear:` 方法来实现这一点，如下所示：\n\n```\n- (void)viewWillAppear:(BOOL)animated\
  \ {\n    [super viewWillAppear:animated];\n    if (self.motionManager.deviceMotionAvailable)\
  \ {\n        self.motionManager.deviceMotionUpdateInterval = 0.1;\n        [self.motionManager\
  \ startDeviceMotionUpdates];\n        self.updateTimer = [NSTimer\n                        scheduledTimerWithTimeInterval:0.1\n\
                          target:self\n                        selector:@selector(updateDisplay)\n\
                          userInfo:nil\n                        repeats:YES];\n    }\n\
  }\n\n- (void)viewDidDisappear:(BOOL)animated {\n    [super viewDidDisappear:animated];\n\
      if (self.motionManager.deviceMotionAvailable) {\n        [self.motionManager\
  \ stopDeviceMotionUpdates];\n        [self.updateTimer invalidate];\n        self.updateTimer\
  \ = nil;\n    }\n}\n```\n\n`viewWillAppear:` 中的代码调用运动管理器的 `startDeviceMotionUpdates`\
  \ 方法来启动设备运动信息的获取，然后创建一个新的定时器，并安排它每十分之一秒触发一次，调用我们尚未创建的 `updateDisplay` 方法。将此方法添加到\
  \ `viewDidDisappear` 下方：\n\n\n\n```objc\n- (void)updateDisplay {\n    CMDeviceMotion\
  \ *motion = self.motionManager.deviceMotion;\n    if (motion != nil) {\n       \
  \ CMRotationRate rotationRate = motion.rotationRate;\n        CMAcceleration gravity\
  \ = motion.gravity;\n        CMAcceleration userAcc = motion.userAcceleration;\n\
  \        CMAttitude *attitude = motion.attitude;\n\n        NSString *gyroscopeText\
  \ = [NSString stringWithFormat:\n                                   @\"Rotation\
  \ Rate:\\n-----------------\\n\"\n                                   \"x: %+.2f\\\
  ny: %+.2f\\nz: %+.2f\\n\",\n                                   rotationRate.x, rotationRate.y,\
  \ rotationRate.z];\n        NSString *acceleratorText = [NSString stringWithFormat:\n\
  \                                     @\"Acceleration:\\n---------------\\n\"\n\
  \                                     \"Gravity x: %+.2f\\t\\tUser x: %+.2f\\n\"\
  \n                                     \"Gravity y: %+.2f\\t\\tUser y: %+.2f\\n\"\
  \n                                     \"Gravity z: %+.2f\\t\\tUser z: %+.2f\\n\"\
  ,\n                                     gravity.x, userAcc.x, gravity.y,\n     \
  \                                userAcc.y, gravity.z, userAcc.z];\n        NSString\
  \ *attitudeText = [NSString stringWithFormat:\n                                \
  \  @\"Attitude:\\n----------\\n\"\n                                  \"Roll: %+.2f\\\
  nPitch: %+.2f\\nYaw: %+.2f\\n\",\n                                  attitude.roll,\
  \ attitude.pitch, attitude.yaw];\n\n        dispatch_async(dispatch_get_main_queue(),\
  \ ^{\n            self.gyroscopeLabel.text = gyroscopeText;\n            self.accelerometerLabel.text\
  \ = acceleratorText;\n            self.attitudeLabel.text = attitudeText;\n    \
  \    });\n    }\n}\n```\n\n这段代码是此示例前一版本中闭包的复制，区别在于 `CMDeviceMotion` 对象直接通过运动管理器获取。请注意对\
  \ `nil` 的检查；这是必需的，因为定时器可能在运动管理器获取到第一个数据样本之前触发。\n\n在您的设备上构建并运行该应用，您会发现其行为与第一个版本完全一致。现在您已经了解了访问运动数据的两种方法。请根据您的应用需求选择最合适的一种。\n\
  \n## 陀螺仪与姿态结果\n\n陀螺仪测量设备绕 x、y、z 轴旋转的速率。请参考图 20-1 了解这些轴与设备机身的对应关系。首先，将设备平放在桌面上。当它静止不动时，所有三个旋转速率都将接近零，您会看到横滚角（roll）、俯仰角（pitch）和偏航角（yaw）的值也接近零。现在，轻轻顺时针旋转设备。在旋转过程中，您会发现绕\
  \ z 轴的旋转速率变为负值。旋转速度越快，旋转速率的绝对值就越大。当您停止旋转时，旋转速率会归零，但偏航角不会。偏航角表示设备从初始静止位置绕 z 轴旋转过的角度。如果您顺时针旋转设备，偏航角将沿负值方向增加，直到设备相对于静止位置旋转了\
  \ 180°，此时其值约为 -3。如果继续顺时针旋转设备，偏航角会跳变为略大于 +3 的值，然后在您将其转回初始位置时减小到零。如果从逆时针旋转开始，情况类似，只是偏航角初始为正值。偏航角实际上以弧度为单位，而非角度。旋转\
  \ 180° 相当于旋转 `π` 弧度，这就是为什么偏航角的最大值约为 3（因为 `π` 略大于 3.14）。\n\n再次将设备平放在桌面上，握住顶部边缘并向上旋转，使底部留在桌面上。这是绕\
  \ x 轴的旋转，因此您会看到 x 轴旋转速率沿正值方向增加，直到您稳住设备，然后其值归零。现在观察俯仰角的值。它已经增加了，增加量取决于您抬起设备顶部边缘的角度。如果将设备完全抬至垂直位置，俯仰角的值将约为\
  \ 1.5。与偏航角一样，俯仰角也以弧度为单位。因此，当设备垂直时，它旋转了 90°，即 `π/2` 弧度，略大于 1.5。如果再次将设备放平并重复上述操作——但这次抬起底部边缘，让顶部留在桌面上，您就是在进行绕\
  \ x 轴的逆时针旋转，会看到负的旋转速率和负的俯仰角。\n\n最后，再次将设备平放于桌面，抬起其左侧边缘，让右侧边缘留在桌面上。这是绕 y 轴的旋转，您会看到这反映在\
  \ y 轴旋转速率上。您可以从横滚角的值中获知任意时刻的总旋转角度。当设备在其右侧边缘上直立时，该值约为 1.5（实际上是 `π/2`）弧度；如果您将设备翻转为屏幕朝下，该值会一直增加到\
  \ `π` 弧度；当然，您需要一个玻璃桌面才能观察到这一点。\n\n总之，使用旋转速率来了解设备绕各轴旋转的快慢，使用偏航角、俯仰角和横滚角的值来获取设备从初始方向开始，绕这些轴当前的旋转总量。\n\
  \n## 加速度计结果\n\n我们之前提到，iPhone 的加速度计检测沿三个轴的加速度，并通过两个 `CMAcceleration struct` 提供此信息。每个\
  \ `CMAcceleration` 都包含 `x`、`y` 和 `z` 三个字段，每个字段都保存一个浮点值。值为 `0` 表示加速度计检测到该特定轴没有运动。正值或负值表示作用于某个方向的力。例如，`y`\
  \ 的负值表示检测到向下的拉力，这可能表明手机正以竖屏方向直立放置。`y` 的正值表示存在施加于相反方向的力，这可能意味着手机正在倒置，或者手机正在向下移动。`CMDeviceMotion`\
  \ 对象分别报告了由于重力以及用户施加的任何额外力导致的沿各轴的加速度。例如，如果您将设备平放，会看到重力值沿 z 轴接近 -1，而用户加速度分量都接近零。现在，如果您快速提升设备并保持其水平，您会发现重力值基本保持不变，但沿\
  \ z 轴出现了正向的用户加速度。对于某些应用，区分重力值和用户加速度值很有用；而对于其他应用，您可能需要总加速度，可以通过将 `CMDeviceMotion`\
  \ 对象的 `gravity` 和 `userAcceleration` 属性的分量相加得到。\n\n铭记图 20-1 中的图示，让我们来看一些加速度计的结果（参见图\
  \ 20-3）。该图显示了当设备处于给定姿态且静止不动时，报告的重力加速度。请注意，在现实生活中，您几乎永远无法获得如此精确的值，因为加速度计非常灵敏，足以感知到即使是非常微小的运动，并且您通常会在三个轴上至少检测到一些微小的力。这是现实世界的物理学，而不是高中物理。\n\
  \n![9781484202005_Fig20-03.jpg](img/9781484202005_Fig20-03.jpg)\n\n图 20-3. 不同设备方向下的理想化重力加速度值\n\
  \n\n\n### 检测摇晃\n\n加速度计在第三方应用中最常见的用途可能是作为游戏控制器。本章稍后我们将创建一个使用加速度计进行输入的程序，但首先来看看加速度计的另一个常见用途：检测摇晃。\n\
  \n如同手势一样，摇晃也可以作为向应用输入的一种形式。例如，绘画程序 `GLPaint`（苹果 iOS 示例代码项目之一）允许用户通过摇晃 iOS 设备来擦除图画，有点像画板。\n\
  \n检测摇晃相对简单。只需检查用户加速度在某个轴上的绝对值是否大于设定的阈值。在正常使用过程中，三个轴之一达到约 1.3 g 的值并不罕见，但要让数值远高于该值通常需要有意识地施加力。加速度计似乎无法记录高于约\
  \ 2.3 g 的值（至少根据我们的经验），因此阈值不要设置得比这个更高。\n\n要检测摇晃，你可以通过向 `MotionMonitor` 示例的运动管理器回调块中添加如下代码，来检查绝对值是否大于\
  \ 1.5（轻微摇晃）或 2.0（剧烈摇晃）：\n\n```\nCMAcceleration userAcc = motion.userAcceleration;\n\
  if (fabsf(userAcc.x) > 2.0\n       || fabsf(userAcc.y) > 2.0\n       || fabsf(userAcc.z)\
  \ > 2.0) {\n    // 在此处执行某些操作...\n}\n```\n\n这段代码会检测任何轴上超过 2 个 g 力的运动。\n\n### 内置摇晃检测\n\
  \n实际上还有另一种更简单的检测摇晃的方法——该方法直接内置于响应者链中。还记得第 18 章中我们实现 `touchesBegan:withEvent:` 等方法来检测触摸吗？iOS\
  \ 同样提供了三种类似的响应者方法来检测运动：\n\n- 当运动开始时，`motionBegan:withEvent:` 方法会被发送到第一响应者，然后沿响应者链传递，如第\
  \ 18 章所述。\n- 当运动结束时，`motionEnded:withEvent:` 方法会被发送到第一响应者。\n- 如果在摇晃过程中有电话响起或其他中断事件发生，`motionCancelled:withEvent:`\
  \ 消息会被发送到第一响应者。\n\n这些方法中的第一个参数是事件子类型，其中之一是 `UIEventSubtypeMotionShake`。这意味着你实际上无需直接使用\
  \ `CMMotionManager` 就能检测摇晃。你只需在视图或视图控制器中重写相应的运动检测方法，当用户摇晃手机时，这些方法会被自动调用。除非你特别需要更精细地控制摇晃手势，否则应使用内置的运动检测，而非前面描述的手动方法。不过，我们觉得还是应该向你展示手动方法的基本原理，以便在你确实需要更多控制时使用。\n\
  \n既然你已经了解了检测摇晃的基本概念，接下来我们要让你的手机“破碎”。\n\n### 摇晃即破碎\n\n好吧，我们并不是真的要弄坏你的手机，而是要编写一个用于检测摇晃的应用，然后让手机看起来、听起来像是因摇晃而破碎。\n\
  \n启动应用后，程序会显示一张类似 iPhone 主屏幕的图片（见图 20-4）。不过，只要足够用力地摇晃手机，你的可怜手机就会发出你永远不想从消费电子产品中听到的声音。更糟的是，你的屏幕会变得像图\
  \ 20-5 所示那样。我们为什么要做这些坏事？别担心。只需触摸屏幕，就能将 iPhone 恢复到之前完好无损的状态。\n\n![9781484202005_Fig20-04.jpg](img/9781484202005_Fig20-04.jpg)\n\
  \n图 20-4. `ShakeAndBreak` 应用看起来人畜无害……\n\n![9781484202005_Fig20-05.jpg](img/9781484202005_Fig20-05.jpg)\n\
  \n图 20-5. ……但操作过于粗暴的话——哦不！\n\n使用 Single View Application 模板在 Xcode 中创建一个新项目。确保设备类型设置为\
  \ *iPhone*——与本书中的大多数其他示例不同，此示例仅适用于 iPhone，因为图片尺寸适合 iPhone 5 屏幕。当然，如果你创建额外的图片，也很容易将此项目扩展到\
  \ iPad。将新项目命名为 *ShakeAndBreak*。在示例源代码的 *20 – Images and Sounds* 文件夹中，我们提供了本应用所需的两个图片文件和一个声音文件。在\
  \ `Images.xcassets` 中，创建一个名为 *home* 的图片集，并将 `home.png` 拖入其中；然后创建另一个名为 *homebroken*\
  \ 的图片集，并将 `homebroken.png` 拖入其中。将 `glass.wav` 拖入项目。\n\n现在开始创建视图控制器。我们需要创建一个指向图片视图的出口，以便能够更改显示的图片。单击\
  \ `ViewController.m`，在类扩展中添加以下属性声明：\n\n```\n#import \"ViewController.h\"\n\n@interface\
  \ ViewController ()\n\n@property (weak, nonatomic) IBOutlet UIImageView *imageView;\n\
  \n@end\n```\n\n保存文件。现在选择 `Main.storyboard` 在 Interface Builder 中编辑文件，然后从库中拖入一个 *Image\
  \ View* 到布局区域的视图上。图片视图应自动调整大小以占满整个窗口，因此只需将其完美放置在窗口内即可。在文档大纲中，按住 Control 键从 Image\
  \ View 拖到其父视图，按住 *Shift* 键，在上下文菜单中选择 *Leading Space to Container Margin*、*Trailing\
  \ Space to Container Margin*、*Top Space to Top Layout Guide* 和 *Bottom Space to\
  \ Bottom Layout Guide*，然后点击上下文菜单外部以锁定图片视图的尺寸和位置。最后，按住 Control 键从 *View Controller*\
  \ 图标拖到 *image view* 并选择 `imageView` 出口，然后保存 storyboard。\n\n接下来，返回 `ViewController.m`\
  \ 文件。我们将为要显示的两个图片添加一些额外的属性，以跟踪是否正在显示破碎图片。另外还要添加一个音频播放器对象，用于播放破碎玻璃的声音。以下粗体行位于文件顶部附近：\n\
  \n```\n#import \"ViewController.h\"\n#import <AVFoundation/AVFoundation.h>\n\n@interface\
  \ ViewController ()\n\n@property (weak, nonatomic) IBOutlet UIImageView *imageView;\n\
  @property (strong, nonatomic) UIImage *fixed;\n@property (strong, nonatomic) UIImage\
  \ *broken;\n@property (assign, nonatomic) BOOL brokenScreenShowing;\n@property (strong,\
  \ nonatomic) AVAudioPlayer *crashPlayer;\n\n@end\n```\n\n将以下代码添加到 `viewDidLoad`\
  \ 方法中：\n\n```\n@implementation ViewController\n\n- (void)viewDidLoad\n{\n    [super\
  \ viewDidLoad];\n    // 加载视图后的额外设置（通常来自 nib 文件）\n\n    NSURL *url = [[NSBundle mainBundle]\
  \ URLForResource:@\"glass\"\n                                         withExtension:@\"\
  wav\"];\n\n    NSError *error = nil;\n    self.crashPlayer = [[AVAudioPlayer alloc]\
  \ initWithContentsOfURL:url\n                                                  \
  \            error:&error];\n    if (!self.crashPlayer) {\n        NSLog(@\"音频错误！%@\"\
  , error.localizedDescription);\n    }\n\n    self.fixed = [UIImage imageNamed:@\"\
  home\"];\n    self.broken = [UIImage imageNamed:@\"homebroken\"];\n\n    self.imageView.image\
  \ = self.fixed;\n}\n```\n\n至此，我们创建了一个指向声音文件的 `NSURL` 对象，并初始化了 `AVAudioPlayer` 实例——该类将简单播放声音。经过快速检查确保音频播放器设置正确后，我们加载了两个需要使用的图片，并将第一个图片放置到位。接下来，添加以下新方法：\n\
  \n\n```objc\n- (void)motionEnded:(UIEventSubtype)motion withEvent:(UIEvent *)event\
  \ {\n    if (!self.brokenScreenShowing && motion == UIEventSubtypeMotionShake) {\n\
  \        self.imageView.image = self.broken;\n        [self.crashPlayer play];\n\
  \        self.brokenScreenShowing = YES;\n    }\n}\n```\n\n每当发生摇动时，就会调用此方法。在确认碎屏效果尚未显示且当前事件确实是摇动事件后，该方法会显示碎裂图像并播放碎裂音效。\n\
  \n最后一个方法你应该已经熟悉了。当屏幕被触摸时会调用该方法。我们只需在该方法中将图像重置为未碎裂的屏幕，并将 `brokenScreenShowing` 设置为\
  \ `NO`：\n\n```objc\n- (void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event\
  \ {\n    self.imageView.image = self.fixed;\n    self.brokenScreenShowing = NO;\n\
  }\n```\n\n编译并运行应用程序，然后进行摇动测试。对于无法在 iOS 设备上运行此应用的用户，你仍然可以尝试。模拟器虽然不能模拟加速度计硬件，但包含一个模拟摇动事件的菜单项，因此该功能在模拟器上同样有效。\n\
  \n尽情体验吧。完成后请返回，你将学习如何将加速度计用作游戏及其他程序的控制器。\n\n## 加速度计作为方向控制器\n\n在游戏中，开发者通常不使用按钮控制角色或物体的移动，而是利用加速度计完成此任务。例如，在赛车游戏中，像转动方向盘一样扭转\
  \ iOS 设备可以控制转向，前倾设备可加速，后仰则可刹车。\n\n将加速度计用作控制器的具体方式会因游戏机制的不同而有很大差异。在最简单的情况下，你可能只需获取某个轴的值，乘以一个系数，然后加到被控对象的某个坐标上。在物理模拟更逼真的复杂游戏中，则需要根据加速度计返回的值调整被控对象的速度。\n\
  \n将加速度计用作控制器的一个棘手之处在于：委托方法无法保证按照你指定的时间间隔回调。如果告诉运动管理器每秒读取加速度计 60 次，你能确定的只是它不会超过每秒\
  \ 60 次更新，但不能保证每秒能获得 60 次均匀间隔的更新。因此，如果基于加速度计输入进行动画处理，必须记录两次更新之间的时间间隔，并将其纳入方程中，以确定物体的移动距离。\n\
  \n### 滚动弹珠\n\n接下来这个例子中，我们将通过倾斜手机让精灵在 iPhone 屏幕上移动。这是一个使用加速度计接收输入的简单示例，我们将使用 Quartz\
  \ 2D 处理动画。\n\n**注意**：通常，在处理需要流畅动画的游戏或其他程序时，你可能会想使用 Sprite Kit 或 OpenGL ES。本例中使用\
  \ Quartz 2D 是为了简化代码，减少与加速度计使用无关的代码量。\n\n在本应用中，当你倾斜 iPhone 时，弹珠会像在桌面上一样滚动（见图 20-6）。向左倾斜，弹珠会向左滚动；倾斜幅度越大，滚动速度越快；向后倾斜，弹珠会减速并开始向反方向移动。\n\
  \n![9781484202005_Fig20-06.jpg](img/9781484202005_Fig20-06.jpg)\n\n图 20-6。Ball 应用让你在屏幕上滚动弹珠\n\
  \n在 Xcode 中，使用\"单视图应用\"模板创建一个新项目。将设备类型设为 *Universal*，项目命名为 *Ball*。在示例源码的 *20 – Images\
  \ and Sounds* 文件夹中，你会找到一个名为 *ball.png* 的图片。在 *Images.xcassets* 中创建一个名为 *ball* 的图片集，并将\
  \ *ball.png* 拖入其中。\n\n接下来，在项目导航器中选中 Ball 项目，然后选择 Ball 目标的 *General* 标签页。在部署信息部分的\"\
  设备方向\"选项中，仅选中 *Portrait*，取消勾选其他所有复选框（与本章前面处理 MotionMonitor 应用时相同）。这会禁用默认的界面方向变化；我们希望让弹珠滚动，而不是在移动设备时改变界面方向。\n\
  \n现在，单击 *Ball* 文件夹，选择 *File* ![image](img/arrow.jpg) *New* ![image](img/arrow.jpg)\
  \ *File*... 在 iOS 部分选择 *Cocoa Touch Class*，点击 *Next*。将新类设为 `UIView` 的子类，命名为 *BallView*，然后点击\
  \ *Create*。稍后我们会回来编辑这个类。\n\n选择 *Main.storyboard* 在 Interface Builder 中编辑文件。单击 *View*\
  \ 图标，使用标识检查器将视图的类从 *UIView* 改为 *BallView*。接着，切换到属性检查器，将视图的 *Background* 改为 *Light\
  \ Gray Color*。最后，保存故事板。\n\n现在开始编辑 *ViewController.m*。在文件顶部添加以下行：\n\n```objc\n#import\
  \ \"ViewController.h\"\n#import \"BallView.h\"\n#import <CoreMotion/CoreMotion.h>\n\
  \n#define kUpdateInterval    (1.0f / 60.0f)\n\n@interface ViewController ()\n@property\
  \ (strong, nonatomic) CMMotionManager *motionManager;\n@property (strong, nonatomic)\
  \ NSOperationQueue *queue;\n@end\n\n@implementation ViewController\n```\n\n接下来，用以下代码填充\
  \ `viewDidLoad`：\n\n```objc\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
  \    // 加载视图后的其他设置（通常来自 nib 文件）\n    self.motionManager = [[CMMotionManager alloc]\
  \ init];\n    self.queue = [[NSOperationQueue alloc] init];\n    self.motionManager.deviceMotionUpdateInterval\
  \ = kUpdateInterval;\n    __weak ViewController *weakSelf = self;\n    [self.motionManager\
  \ startDeviceMotionUpdatesToQueue:self.queue\n                      withHandler:\
  \ ^(CMDeviceMotion *motionData, NSError *error) {\n            BallView *ballView\
  \ = (BallView *)weakSelf.view;\n            [ballView setAcceleration:motionData.gravity];\n\
  \            dispatch_async(dispatch_get_main_queue(), ^{\n                [ballView\
  \ update];\n            });\n     }];\n\n}\n```\n\n**注意**：输入此代码后，由于 `BallView` 尚未完成，你会看到一个错误。我们的大部分工作将在\
  \ `BallView` 类中完成，接下来就轮到它了。\n\n这里的 `viewDidLoad` 方法与本章前面的一些实现类似。主要区别在于我们使用了更高的更新间隔（每秒\
  \ 60 次）。在告诉运动管理器在有加速度计更新时执行的 block 中，我们将加速度对象传递给视图，然后调用名为 `update` 的方法。该方法根据加速度和自上次更新以来经过的时间更新视图中弹珠的位置。由于该\
  \ block 可在任何线程上执行，而 UIKit 对象（包括 `UIView`）的方法只能安全地在主线程中使用，因此我们再次强制 `update` 方法在主线程中调用。\n\
  \n### 编写弹珠视图\n\n选择 *BallView.h*。你需要在此导入 Core Motion 头文件，并添加一个属性（供控制器传递加速度值）和一个方法（用于更新弹珠位置）：\n\
  \n```objc\n#import <UIKit/UIKit.h>\n#import <CoreMotion/CoreMotion.h>\n\n@interface\
  \ BallView : UIView\n\n@property (assign, nonatomic) CMAcceleration acceleration;\n\
  \n- (void)update;\n\n@end\n```\n\n好的，这是根据您的要求翻译的中文版本：\n\n\n切换到`BallView.m`，并在靠近顶部的位置添加一个带有如下代码的类扩展：\n\
  \n```objc\n#import \"BallView.h\"\n\n@interface BallView ()\n\n@property (strong,\
  \ nonatomic) UIImage *image;\n@property (assign, nonatomic) CGPoint currentPoint;\n\
  @property (assign, nonatomic) CGPoint previousPoint;\n@property (assign, nonatomic)\
  \ CGFloat ballXVelocity;\n@property (assign, nonatomic) CGFloat ballYVelocity;\n\
  \n@end\n```\n\n让我们来看看这些属性，并讨论一下每个属性的作用。第一个属性是一个`UIImage`对象，它将指向我们将在屏幕上移动的精灵图：\n\n\
  ```objc\nUIImage *image;\n```\n\n之后，我们跟踪两个`CGPoint`变量。`currentPoint`属性将保存球的当前位置。我们还会记录上一次绘制精灵图的位置。这样，我们就可以构建一个包含球新旧位置的更新矩形，从而在新位置绘制球并在旧位置擦除它：\n\
  \n```objc\nCGPoint currentPoint;\nCGPoint previousPoint;\n```\n\n我们还有两个变量来跟踪球在二维空间中的当前速度。虽然这不会是一个非常复杂的模拟，但我们希望球的运动方式能够像一个真实的球。我们将在下一节中计算球的运动。我们将从加速度计获取加速度，并通过这两个变量来跟踪两个轴上的速度。\n\
  \n```objc\nCGFloat ballXVelocity;\nCGFloat ballYVelocity;\n```\n\n现在，让我们编写代码来绘制球并使其在屏幕上移动。首先，在`BallView.m`的`@implementation`节的开头添加以下方法：\n\
  \n```objc\n@implementation BallView\n\n- (void)commonInit {\n    self.image = [UIImage\
  \ imageNamed:@\"ball\"];\n    self.currentPoint = CGPointMake((self.bounds.size.width\
  \ / 2.0f) +\n                                    (self.image.size.width / 2.0f),\n\
  \                                    (self.bounds.size.height / 2.0f) +\n      \
  \                              (self.image.size.height / 2.0f));\n}\n\n- (id)initWithCoder:(NSCoder\
  \ *)coder  {\n    self = [super initWithCoder:coder];\n    if (self) {\n       \
  \ [self commonInit];\n    }\n    return self;\n}\n\n- (id)initWithFrame:(CGRect)frame\
  \ {\n    self = [super initWithFrame:frame];\n    if (self) {\n        [self commonInit];\n\
  \    }\n    return self;\n}\n```\n\n`initWithCoder:`和`initWithFrame:`方法都会调用我们的`commonInit`方法。在\
  \ storyboard 文件中创建的视图将通过`initWithCoder:`方法进行初始化。我们从两个初始化方法中都调用了`commonInit`方法，这样我们的视图类就可以安全地从代码和\
  \ nib 文件中创建。对于任何可能被重用的视图类（比如这个漂亮的球滚动视图）来说，这都是一件好事。\n\n现在，取消注释被注释掉的`drawRect:`方法，并给出这个简单的实现：\n\
  \n```objc\n- (void)drawRect:(CGRect)rect\n{\n    // Drawing code\n    [self.image\
  \ drawAtPoint:self.currentPoint];\n}\n```\n\n接下来，将这些方法添加到类的末尾：\n\n```objc\n#pragma\
  \ mark -\n\n- (void)setCurrentPoint:(CGPoint)newPoint {\n    self.previousPoint\
  \ = self.currentPoint;\n    _currentPoint = newPoint;\n\n    if (self.currentPoint.x\
  \ < 0) {\n        _currentPoint.x = 0;\n        self.ballXVelocity = 0;\n    }\n\
  \    if (self.currentPoint.y < 0){\n        _currentPoint.y = 0;\n        self.ballYVelocity\
  \ = 0;\n    }\n    if (self.currentPoint.x > self.bounds.size.width - self.image.size.width)\
  \ {\n        _currentPoint.x = self.bounds.size.width - self.image.size.width;\n\
  \        self.ballXVelocity = 0;\n    }\n    if (self.currentPoint.y >\n       \
  \ self.bounds.size.height - self.image.size.height) {\n        _currentPoint.y =\
  \ self.bounds.size.height - self.image.size.height;\n        self.ballYVelocity\
  \ = 0;\n    }\n\n    CGRect currentRect =\n        CGRectMake(self.currentPoint.x,\
  \ self.currentPoint.y,\n                   self.currentPoint.x + self.image.size.width,\n\
  \                   self.currentPoint.y + self.image.size.height);\n    CGRect previousRect\
  \ =\n        CGRectMake(self.previousPoint.x, self.previousPoint.y,\n          \
  \         self.previousPoint.x + self.image.size.width,\n                   self.currentPoint.y\
  \ + self.image.size.width);\n    [self setNeedsDisplayInRect:CGRectUnion(currentRect,\
  \ previousRect)];\n}\n\n- (void)update {\n    static NSDate *lastUpdateTime = nil;\n\
  \n    if (lastUpdateTime != nil) {\n        NSTimeInterval secondsSinceLastDraw\
  \ =\n            [[NSDate date] timeIntervalSinceDate:lastUpdateTime];\n\n     \
  \   self.ballYVelocity = self.ballYVelocity -\n                             (self.acceleration.y\
  \ * secondsSinceLastDraw);\n        self.ballXVelocity = self.ballXVelocity +\n\
  \                             (self.acceleration.x * secondsSinceLastDraw);\n\n\
  \        CGFloat xAccel = secondsSinceLastDraw * self.ballXVelocity * 500;\n   \
  \     CGFloat yAccel = secondsSinceLastDraw * self.ballYVelocity * 500;\n\n    \
  \    self.currentPoint = CGPointMake(self.currentPoint.x + xAccel,\n           \
  \                             self.currentPoint.y + yAccel);\n    }\n    // Update\
  \ last time with current time\n    lastUpdateTime = [[NSDate alloc] init];\n}\n\n\
  @end\n```\n\n### 计算球的运动\n\n我们的`drawRect:`方法不能再简单了。我们只需在`currentPoint`存储的位置处绘制在`commonInit:`中加载的图像。`currentPoint`访问器是一个标准的访问器方法。然而，`setCurrentPoint:`赋值器又是一个不同的故事。\n\
  \n在`setCurrentPoint:`中，我们首先做的是将旧的`currentPoint`值存储在`previousPoint`中，并将新值赋给`currentPoint`：\n\
  \n```objc\nself.previousPoint = self.currentPoint;\nself.currentPoint = newPoint;\n\
  ```\n\n接下来，我们进行边界检查。如果球的`x`或`y`位置小于`0`，或者大于屏幕的宽度或高度（考虑到图像的宽度和高度），那么该方向的加速度就会停止：\n\
  \n```objc\nif (self.currentPoint.x < 0) {\n    _currentPoint.x = 0;\n    self.ballXVelocity\
  \ = 0;\n}\nif (self.currentPoint.y < 0){\n    _currentPoint.y = 0;\n    self.ballYVelocity\
  \ = 0;\n}\nif (self.currentPoint.x > self.bounds.size.width - self.image.size.width)\
  \ {\n    _currentPoint.x = self.bounds.size.width - self.image.size.width;\n   \
  \ self.ballXVelocity = 0;\n}\nif (self.currentPoint.y >\n    self.bounds.size.height\
  \ - self.image.size.height) {\n    _currentPoint.y = self.bounds.size.height - self.image.size.height;\n\
  \    self.ballYVelocity = 0;\n}\n```\n\n**提示**：你想让球更自然地从墙壁上反弹，而不是仅仅停下来吗？这很容易做到。只需将`setCurrentPoint:`中当前读取为`self.ballXVelocity\
  \ = 0;`的两行改为`self.ballXVelocity = - (self.ballXVelocity / 2.0);`。并将当前读取为`self.ballYVelocity\
  \ = 0;`的两行改为`self.ballYVelocity = - (self.ballYVelocity / 2.0);`。通过这些更改，我们不再消除球的速度，而是将其减半并设为反向。现在，球以一半的速度向相反方向移动。\n\
  \n之后，我们根据图像的大小计算两个`CGRect`。一个矩形包含新图像将被绘制的区域，另一个矩形包含它上次被绘制的区域。我们将使用这两个矩形来确保在绘制新球的同时擦除旧球：\n\
  \n```objc\nCGRect currentRect =\nCGRectMake(self.currentPoint.x, self.currentPoint.y,\n\
  \           self.currentPoint.x + self.image.size.width,\n           self.currentPoint.y\
  \ + self.image.size.height);\nCGRect previousRect =\nCGRectMake(self.previousPoint.x,\
  \ self.previousPoint.y,\n           self.previousPoint.x + self.image.size.width,\n\
  \           self.currentPoint.y + self.image.size.width);\n```\n\n\n\n最后，我们创建一个新的矩形，它是我们刚刚计算的两个矩形的并集，并将其传递给`setNeedsDisplayInRect:`方法，以指示视图中需要重绘的部分：\n\
  \n```objc\n[self setNeedsDisplayInRect:CGRectUnion(currentRect, previousRect)];\n\
  ```\n\n我们类中最后一个实质性方法是`update`，它用于计算球体正确的新位置。该方法在其控制器类的加速度计方法将新的加速度对象传递给视图后被调用。该方法首先声明一个静态的`NSDate`变量，用于跟踪自上次调用`update`方法以来经过的时间。第一次执行此方法时，`lastUpdateTime`为`nil`，我们不进行任何操作，因为没有参考点。由于更新大约每秒发生\
  \ 60 次，没有人会注意到单次帧的丢失：\n\n```objc\nstatic NSDate *lastUpdateTime = nil;\n\nif (lastUpdateTime\
  \ != nil) {\n```\n\n在后续每次执行此方法时，我们计算自上次调用以来经过的时间。`[NSDate date]`返回的`NSDate`实例代表当前时间。通过询问它与`lastUpdateDate`之间的时间间隔，我们得到一个表示当前时间与`lastUpdateTime`之间秒数的数值：\n\
  \n```objc\nNSTimeInterval secondsSinceLastDraw =\n    [[NSDate date] timeIntervalSinceDate:lastUpdateTime];\n\
  ```\n\n接下来，我们通过将当前加速度加到当前速度上来计算两个方向上的新速度。我们将加速度乘以`secondsSinceLastDraw`，以确保加速度在不同时间保持一致。以相同角度倾斜手机，总会产生相同的加速度量：\n\
  \n```objc\nself.ballYVelocity = self.ballYVelocity -\n                     (self.acceleration.y\
  \ * secondsSinceLastDraw);\nself.ballXVelocity = self.ballXVelocity +\n        \
  \             (self.acceleration.x * secondsSinceLastDraw);\n```\n\n之后，我们根据速度计算出上次调用方法以来实际的像素变化量。速度与经过时间的乘积再乘以\
  \ 500，以产生自然的运动效果。如果不乘以某个值，加速度会异常缓慢，仿佛球陷在糖浆里：\n\n```objc\nCGFloat xDelta = secondsSinceLastDraw\
  \ * self.ballXVelocity * 500;\nCGFloat yDelta = secondsSinceLastDraw * self.ballYVelocity\
  \ * 500;\n```\n\n一旦我们知道像素变化量，就将当前位置与计算出的加速度相加，创建一个新点，并赋值给`currentPoint`。通过使用`self.currentPoint`，我们调用之前编写的访问器方法，而不是直接将值赋给实例变量：\n\
  \n```objc\nself.currentPoint = CGPointMake(self.currentPoint.x + xDelta,\n     \
  \                           self.currentPoint.y + yDelta);\n```\n\n计算到此结束，剩下的就是用当前时间更新`lastUpdateTime`：\n\
  \n```objc\nlastUpdateTime = [[NSDate alloc] init];\n```\n\n在构建应用之前，使用前面提到的技术添加 Core\
  \ Motion 框架。添加完成后，继续构建并运行应用。\n\n如果一切顺利，应用将启动，你应该能够通过倾斜手机来控制球的移动。当球到达屏幕边缘时，它会停止。将手机向另一方向倾斜，球就会开始向另一方向滚动。哇！\n\
  \n继续滚动\n\n好了，在这一章中，我们通过物理原理以及令人惊叹的 iOS 加速度计和陀螺仪获得了很多乐趣。我们创建了一个很棒的愚人节恶作剧，并且你了解了将加速度计作为控制设备的基础知识。使用加速度计和陀螺仪的应用的可能性几乎和宇宙一样无穷无尽。既然你已经掌握了基础知识，那就去创造一些酷炫的东西，给我们一个惊喜吧！\n\
  \n当你准备好之后，我们将开始使用另一项 iOS 硬件：内置摄像头。\n\n"
- "# 第 21 章 摄像头与照片库\n\n到目前为止，你应该已经知道 iPhone、iPad 和 iPod touch 都配备了内置摄像头，以及一个名为“照片”的精美应用，用于管理你拍摄的所有精彩照片和视频。你可能不知道的是，你的程序也可以使用内置摄像头来拍照。你的应用还可以让用户从设备上已存储的媒体中选择和查看。在本章中，我们将探讨这两项功能。\n\
  \n## 使用图像选择器和 UIImagePickerController\n\n由于 iOS 应用的沙箱机制，应用通常无法访问其自身沙箱之外的照片或其他数据。幸运的是，摄像头和媒体库都可以通过**图像选择器**供你的应用使用。\n\
  \n### 使用图像选择器控制器\n\n顾名思义，图像选择器是一种允许你从指定源中选择图像的机制。当这个类首次在 iOS 中出现时，它只用于图像。如今，你也可以用它来捕捉视频。\n\
  \n通常，图像选择器会以图像和/或视频列表作为其源（参见图 21-1 的左侧）。然而，你可以指定选择器使用摄像头作为其源（参见图 21-1 的右侧）。\n\n\
  ![9781484202005_Fig21-01.jpg](img/9781484202005_Fig21-01.jpg)\n\n图 21-1. 一个运行中的图像选择器。用户会看到一个图像列表（左）。选择图像后，可以对其进行移动和缩放（右）。是的，有时候我的相机胶卷里全是\
  \ Clumsy Ninja 的照片。这要归咎于我的孩子们。\n\n图像选择器接口通过一个名为`UIImagePickerController`的控制器类实现。你需要创建该类的实例，指定一个委托（好像你没想到似的），指定其图像源以及你希望用户选择图像还是视频，然后呈现它。图像选择器将控制设备，让用户从现有媒体库中选择图片或视频。或者，用户可以使用摄像头拍摄新的照片或视频。用户做出选择后，你可以让用户有机会进行一些基本的编辑，例如缩放或裁剪图像，或者修剪一段视频剪辑。所有这些行为都由`UIImagePickerController`实现，因此你在这里真的不需要做太多繁重的工作。\n\
  \n假设用户没有按“取消”，用户拍摄或从库中选择的图像或视频将传递给你的委托。无论用户是选择了媒体文件还是取消，你的委托都有责任关闭`UIImagePickerController`，以便用户返回你的应用。\n\
  \n创建`UIImagePickerController`非常简单。你只需像大多数类一样创建其实例。但有一个注意事项：并非所有 iOS 设备都有摄像头。早期的\
  \ iPod touch 是首批例子，第一代 iPad 是最新的例子。然而，未来可能会有更多此类设备从苹果的组装线上生产出来。在创建`UIImagePickerController`实例之前，你需要检查当前运行应用所在的设备是否支持你想要使用的图像源。例如，在让用户使用摄像头拍照之前，你应该确保程序运行在带有摄像头的设备上。你可以通过`UIImagePickerController`的类方法来检查，如下所示：\n\
  \n```objc\nif ([UIImagePickerController isSourceTypeAvailable:\n     UIImagePickerControllerSourceTypeCamera])\
  \ {\n```\n\n\n\n在这个例子中，我们传递`UIImagePickerControllerSourceTypeCamera`来指示想要让用户使用内置摄像头拍照或录像。方法`isSourceTypeAvailable:`在指定源当前可用时返回`YES`。除了`UIImagePickerControllerSourceTypeCamera`之外，还可以指定另外两个值：\n\
  \n- `UIImagePickerControllerSourceTypePhotoLibrary`指定用户应从现有媒体库中选择图像或视频。该图像将返回到你的委托。\n\
  - `UIImagePickerControllerSourceTypeSavedPhotosAlbum`指定用户将从现有照片库中选择图像，但选择范围将限制在相机胶卷内。此选项可在没有摄像头的设备上运行，尽管用处不大，但仍允许你选择已拍摄的任何屏幕截图。\n\
  \n在确认程序运行的设备支持你想要使用的图像源之后，启动图像选择器相对容易：\n\n```objc\nUIImagePickerController *picker\
  \ = [[UIImagePickerController alloc] init];\npicker.delegate = self;\npicker.sourceType\
  \ = UIImagePickerControllerSourceTypeCamera;\npicker.cameraDevice = UIImagePickerControllerCameraDeviceFront;\n\
  [self presentViewController:picker animated:YES completion:nil];\n```\n\n**提示**\
  \ 在拥有多个摄像头的设备上，你可以通过将`cameraDevice`属性设置为`UIImagePickerControllerCameraDeviceFront`或`UIImagePickerControllerCameraDeviceRear`来选择使用哪个摄像头。要确定前置或后置摄像头是否可用，请使用相同的常量配合`isCameraDeviceAvailable:`方法。\n\
  \n创建并配置好`UIImagePickerController`之后，我们使用类从`UIView`继承的方法`presentViewController:animated:completion:`来向用户呈现图像选择器。\n\
  \n### 实现图像选择器控制器委托\n\n要了解用户何时完成使用图像选择器，你需要实现`UIImagePickerControllerDelegate`协议。该协议定义了两个方法：`imagePickerController:didFinishPickingMediaWithInfo:`和`imagePickerControllerDidCancel:`。\n\
  \n当用户成功拍摄照片或视频，或从媒体库中选择项目时，会调用`imagePickerController:didFinishPickingMediaWithInfo:`方法。第一个参数是指向你之前创建的`UIImagePickerController`的指针。第二个参数是`NSDictionary`实例，它将包含所选照片或所选视频的\
  \ URL，以及如果你在图像选择器控制器中启用了编辑（并且用户确实进行了编辑）时的可选编辑信息。该字典将包含存储在键`UIImagePickerControllerOriginalImage`下的原始未编辑图像。以下是检索原始图像的委托方法示例：\n\
  \n```objc\n- (void)imagePickerController:(UIImagePickerController *)picker\ndidFinishPickingMediaWithInfo:(NSDictionary\
  \ *)info {\n    UIImage *selectedImage = info[UIImagePickerControllerEditedImage];\n\
  \    UIImage *originalImage = info[UIImagePickerControllerOriginalImage];\n\n  \
  \  // 对 selectedImage 和 originalImage 进行处理\n\n    [picker dismissViewControllerAnimated:YES\
  \ completion:nil];\n}\n```\n\n`editingInfo`字典还会通过存储在键`UIImagePickerControllerCropRect`下的`NSValue`对象，告知你在编辑过程中选择了整个图像的哪个部分。你可以像这样将`NSValue`实例转换为`CGRect`：\n\
  \n```objc\nNSValue *cropValue = info[UIImagePickerControllerCropRect];\nCGRect cropRect\
  \ = [cropValue CGRectValue];\n```\n\n经过此转换后，`cropRect`将指定在编辑过程中选择的原始图像部分。如果你不需要此信息，可以忽略它。\n\
  \n**注意** 如果返回到委托的图像来自摄像头，该图像不会自动存储到照片库中。如有必要，保存图像是你应用程序的责任。\n\n另一个委托方法`imagePickerControllerDidCancel:`在用户决定取消过程而不拍摄或选择任何媒体时被调用。当图像选择器调用此委托方法时，它只是通知你用户已完成选择器且未选择任何内容。\n\
  \n`UIImagePickerControllerDelegate`协议中的这两个方法都被标记为可选，但实际上它们并非如此，原因如下：必须告知模态视图（如图像选择器）自行关闭。因此，即使你在用户取消图像选择器时不需要执行任何特定于应用程序的操作，仍然需要关闭该选择器。至少，你的`imagePickerControllerDidCancel:`方法需要像这样，程序才能正常运行：\n\
  \n```objc\n- (void)imagePickerControllerDidCancel:(UIImagePickerController *)picker\
  \ {\n    [picker dismissViewControllerAnimated:YES completion:NULL];\n}\n```\n\n\
  ## 实地测试摄像头和图库\n\n在本章中，我们将构建一个应用程序，允许用户使用摄像头拍照或录制视频。或者，用户可以从照片库中选择内容，然后在屏幕上显示所选内容（见图\
  \ 21-2）。如果用户使用的设备没有摄像头，我们将隐藏“新照片或视频”按钮，并仅允许从照片库中选择。\n\n![9781484202005_Fig21-02.jpg](img/9781484202005_Fig21-02.jpg)\n\
  \n**图 21-2.** 相机应用程序运行中\n\n### 设计界面\n\n在 Xcode 中使用“单视图应用程序”模板创建一个新项目，并将应用程序命名为`Camera`。首先要做的是向此应用程序的视图控制器添加几个输出口。我们需要一个指向图像视图的输出口，以便用图像选择器返回的图像更新它。我们还需要一个指向“新照片或视频”按钮的输出口，以便在设备没有摄像头时隐藏该按钮。\n\
  \n我们还需要两个操作方法：一个用于“新照片或视频”按钮，一个用于让用户从照片库中选择现有图片。\n\n展开`Camera`文件夹，以便访问所有相关文件。选择`ViewController.m`，并将以下协议遵循声明和属性添加到类扩展中：\n\
  \n```objc\n#import \"ViewController.h\"\n\n@interface ViewController ()\n<UIImagePickerControllerDelegate,\
  \ UINavigationControllerDelegate>\n\n@property (weak, nonatomic) IBOutlet UIImageView\
  \ *imageView;\n@property (weak, nonatomic) IBOutlet UIButton *takePictureButton;\n\
  \n@end\n```\n\n你可能首先注意到，我们实际上使类遵循了两个不同的协议：`UIImagePickerControllerDelegate`和`UINavigationControllerDelegate`。因为`UIImagePickerController`是`UINavigationController`的子类，所以我们必须使类遵循这两个协议。`UINavigationControllerDelegate`中的方法是可选的，我们不需要它们中的任何一个来使用图像选择器；然而，我们确实需要遵循该协议，否则编译器稍后会给出警告。\n\
  \n\n```markdown\n你可能还会注意到，虽然我们将使用`UIImageView`实例来显示选中的图片，但显示选中的视频时却没有类似的东西。UIKit\
  \ 不包含任何像`UIImageView`那样公开可用的、适用于显示视频内容的类，因此我们必须使用其他技术来展示视频。到那时，我们将使用`MPMoviePlayerController`的实例，获取其`view`属性并将其插入到视图层级中。这是一种非常不寻常的使用视图控制器的方式，但这实际上是苹果官方认可的在视图层级中显示视频的技术。\n\
  \n我们还将添加两个动作方法，用于连接按钮。目前，我们只需创建空的实现，以便 Interface Builder 能看到它们。稍后我们会填充实际代码：\n\n\
  ```\n- (IBAction)shootPictureOrVideo:(UIButton *)sender {\n}\n\n- (IBAction)selectExistingPictureOrVideo:(\
  \ UIButton *)sender {\n}\n```\n\n保存更改，然后选择`Main.storyboard`在 Interface Builder 中编辑图形用户界面。\n\
  \n我们将为该应用构建的布局非常简单——只有一个图像视图和两个按钮。完成的布局如图 21-3 所示。请以此作为工作时的参考。\n\n![9781484202005_Fig21-03.jpg](img/9781484202005_Fig21-03.jpg)\n\
  \n图 21-3 相机应用的故事板布局\n\n从库中拖两个`Button`到标记为`View`的窗口。将它们上下放置，使底部的按钮与底部蓝色参考线对齐。双击顶部按钮，将其标题设为`New\
  \ Photo or Video`。然后双击底部按钮，将其标题设为`Pick from Library`。接着，从库中拖一个`Image View`并放在按钮上方。将图像视图展开，使其占据按钮上方视图的整个空间，如前面的图\
  \ 21-2 所示。在属性检查器中，将图像视图的背景改为黑色，并将其`Mode`设置为`Aspect Fit`，这样它就会调整图片大小以适应其边界，同时保持原始宽高比。\n\
  \n现在，从`View Controller`图标 Control-拖动到图像视图，选择`imageView`出口。再次从`View Controller`拖动到`New\
  \ Photo or Video`按钮，选择`takePictureButton`出口。\n\n接下来，选中`New Photo or Video`按钮，打开连接检查器。从`Touch\
  \ Up Inside`事件拖动到`View Controller`，选择`shootPictureOrVideo:`动作。然后点击`Pick from Library`按钮，从连接检查器的`Touch\
  \ Up Inside`事件拖动到 View Controller，选择`selectExistingPictureOrVideo:`动作。\n\n和往常一样，最后一步是添加自动布局约束。首先，在文档大纲中展开视图控制器，将其视图重命名为`Main\
  \ View`，然后按如下方式添加约束：\n\n1.  在文档大纲中，从`Pick from Library`按钮 Control-拖动到`Main View`，然后松开鼠标。当弹出菜单出现时，按住`Shift`键，选择`Leading\
  \ Space to Container Margin`、`Trailing Space to Container Margin`和`Bottom Space\
  \ to Bottom Layout Guide`。\n2.  从`New Photo or Video`按钮 Control-拖动到`Pick from Library`按钮，松开鼠标，选择`Vertical\
  \ Spacing`。\n3.  从`New Photo or Video`按钮 Control-拖动到`Main View`，松开鼠标，按住`Shift`键，选择`Leading\
  \ Space to Container Margin`和`Trailing Space to Container Margin`。\n4.  从`New Photo\
  \ or Video`Control-拖动到图像视图，选择`Vertical Spacing`。\n5.  从图像视图 Control-拖动到`Main View`，按住`Shift`键选择`Leading\
  \ Space to Container Margin`、`Trailing Space to Container Margin`和`Top Space to\
  \ Top Layout Guide`。\n6.  按住`Shift`键，点击`New Photo or Video button`和`Pick from Library`按钮以选中它们，然后点击故事板编辑器下方的`Pin`按钮。在弹出的菜单中，勾选`Width`复选框，点击`Add\
  \ 2 Constraints`，如图 21-4 所示。\n\n![9781484202005_Fig21-04.jpg](img/9781484202005_Fig21-04.jpg)\n\
  \n图 21-4 完成相机应用的自动布局约束\n\n所有布局约束都已就位，现在保存更改。\n\n### 实现相机视图控制器\n\n选择`ViewController.m`，我们需要做一些进一步的修改。由于我们允许用户选择性地录制视频，因此需要一个`MPMoviePlayerController`实例的属性。另外两个属性用于跟踪最后选中的图片和视频，以及一个字符串用于确定最后选中的是视频还是图片。我们还需要导入一些额外的头文件来实现这一切。添加以下粗体行：\n\
  \n```\n#import \"ViewController.h\"\n#import <MediaPlayer/MediaPlayer.h>\n#import\
  \ <MobileCoreServices/UTCoreTypes.h>\n\n@interface ViewController ()\n<UIImagePickerControllerDelegate,\
  \ UINavigationControllerDelegate>\n\n@property (weak, nonatomic) IBOutlet UIImageView\
  \ *imageView;\n@property (weak, nonatomic) IBOutlet UIButton *takePictureButton;\n\
  @property (strong, nonatomic) MPMoviePlayerController *moviePlayerController;\n\
  @property (strong, nonatomic) UIImage *image;\n@property (strong, nonatomic) NSURL\
  \ *movieURL;\n@property (copy, nonatomic) NSString *lastChosenMediaType;\n\n@end\n\
  ```\n\n现在，我们来增强`viewDidLoad`方法：如果当前运行的设备没有摄像头，则隐藏`New Photo or Video`按钮。同时实现`viewDidAppear:`方法，使其调用`updateDisplay`方法（我们稍后将实现）。首先进行以下更改：\n\
  \n```\n@implementation ViewController\n\n- (void)viewDidLoad\n{\n    [super viewDidLoad];\n\
      // Do any additional setup after loading the view, typically from a nib.\n    if\
  \ (![UIImagePickerController isSourceTypeAvailable:\n          UIImagePickerControllerSourceTypeCamera])\
  \ {\n        self.takePictureButton.hidden = YES;\n    }\n}\n\n- (void)viewDidAppear:(BOOL)animated\
  \ {\n    [super viewDidAppear:animated];\n    [self updateDisplay];\n}\n\n- (void)didReceiveMemoryWarning\n\
  {\n    [super didReceiveMemoryWarning];\n    // Dispose of any resources that can\
  \ be recreated.\n}\n```\n\n理解`viewDidLoad`和`viewDidAppear:`方法之间的区别非常重要。前者仅在视图刚加载到内存时调用。后者则在每次显示视图时调用，这既发生在启动时，也发生在从其他全屏视图（如图像选择器）返回到我们的控制器时。\n\
  ```\n\n\n接下来是三个实用方法，其中第一个是`updateDisplay`方法。它由`viewDidAppear:`方法调用，该方法在视图首次创建时以及用户在选取图像或视频并关闭图像选择器后都会被调用。由于这种双重用途，它需要进行一些检查以确定当前状态并相应地设置\
  \ GUI。将以下代码添加到文件底部：\n\n```\n- (void)updateDisplay {\n    if ([self.lastChosenMediaType\
  \ isEqual:(NSString *)kUTTypeImage]) {\n        self.imageView.image = self.image;\n\
  \        self.imageView.hidden = NO;\n        self.moviePlayerController.view.hidden\
  \ = YES;\n    } else if ([self.lastChosenMediaType isEqual:(NSString *)kUTTypeMovie])\
  \ {\n        if (self.moviePlayerController == nil) {\n            self.moviePlayerController\
  \ = [[MPMoviePlayerController alloc]\n                                         \
  \ initWithContentURL:self.movieURL];\n            UIView *movieView = self.moviePlayerController.view;\n\
  \            movieView.frame = self.imageView.frame;\n            movieView.clipsToBounds\
  \ = YES;\n            [self.view addSubview:movieView];\n            [self setMoviePlayerLayoutConstraints];\n\
  \        } else {\n            self.moviePlayerController.contentURL = self.movieURL;\n\
  \        }\n        self.imageView.hidden = YES;\n        self.moviePlayerController.view.hidden\
  \ = NO;\n        [self.moviePlayerController play];\n    }\n}\n```\n\n该方法根据用户选择的媒体类型显示正确的视图——照片显示图像视图，电影显示电影播放器。图像视图始终存在，但电影播放器仅在用户首次选择电影时创建并添加到用户界面。在添加电影播放器时，需要确保它占据与图像视图相同的空间，并且需要添加布局约束，以确保即使设备旋转也能保持这种状态。以下是添加布局约束的代码：\n\
  \n```\n- (void)setMoviePlayerLayoutConstraints {\n    UIView *moviePlayerView =\
  \ self.moviePlayerController.view;\n    UIView *takePictureButton = self.takePictureButton;\n\
  \    moviePlayerView.translatesAutoresizingMaskIntoConstraints = NO;\n    NSDictionary\
  \ *views =\n         NSDictionaryOfVariableBindings(moviePlayerView, takePictureButton);\n\
  \    [self.view addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:\n\
  \            @\"H:|[moviePlayerView]|\" options:0 metrics:nil views:views]];\n \
  \   [self.view addConstraints:[NSLayoutConstraint constraintsWithVisualFormat:\n\
  \            @\"V:|[moviePlayerView]-0-[takePictureButton]\" options:0 metrics:nil\n\
  \            views:views]];\n}\n```\n\n水平约束将电影播放器绑定到主视图的左右两侧，垂直约束将其链接到主视图的顶部和`New\
  \ Photo or Video`按钮的顶部。\n\n最后一个实用方法`pickMediaFromSource:`是我们的两个操作方法都会调用的方法。该方法非常简单，它只是创建并配置一个图像选择器，使用传入的`sourceType`来决定是调出相机还是媒体库。为此，将以下代码添加到文件底部：\n\
  \n```\n- (void)pickMediaFromSource:(UIImagePickerControllerSourceType)sourceType\
  \ {\n    NSArray *mediaTypes = [UIImagePickerController\n                      \
  \     availableMediaTypesForSourceType:sourceType];\n    if ([UIImagePickerController\n\
  \         isSourceTypeAvailable:sourceType] && [mediaTypes count] > 0) {\n     \
  \   UIImagePickerController *picker =\n                    [[UIImagePickerController\
  \ alloc] init];\n        picker.mediaTypes = mediaTypes;\n        picker.delegate\
  \ = self;\n        picker.allowsEditing = YES;\n        picker.sourceType = sourceType;\n\
  \        [self presentViewController:picker animated:YES completion:NULL];\n   \
  \ } else {\n        UIAlertController *alertController = [UIAlertController\n  \
  \                   alertControllerWithTitle:@\"Error accessing media\"\n      \
  \                         message:@\"Unsupported media source.\"\n             \
  \                  preferredStyle:UIAlertControllerStyleAlert];\n        UIAlertAction\
  \ *okAction = [UIAlertAction actionWithTitle:@\"OK\"\n                         \
  \          style:UIAlertActionStyleCancel handler:nil];\n        [alertController\
  \ addAction:okAction];\n        [self presentViewController:alertController animated:YES\n\
  \              completion:nil];\n    }\n}\n```\n\n接下来，实现在头文件中声明的以下操作方法：\n\n```\n\
  - (IBAction)shootPictureOrVideo:(id)sender {\n    [self pickMediaFromSource:UIImagePickerControllerSourceTypeCamera];\n\
  }\n\n- (IBAction)selectExistingPictureOrVideo:(id)sender {\n    [self pickMediaFromSource:UIImagePickerControllerSourceTypePhotoLibrary];\n\
  }\n```\n\n每个方法都只是调用`pickMediaFromSource:`方法，并传入由`UIImagePickerController`定义的常量，以指定图片或视频的来源。\n\
  \n现在，是时候实现选择器的委托方法了：\n\n```\n#pragma mark - Image Picker Controller delegate methods\n\
  \n- (void)imagePickerController:(UIImagePickerController *)picker\n       didFinishPickingMediaWithInfo:(NSDictionary\
  \ *)info {\n    self.lastChosenMediaType = info[UIImagePickerControllerMediaType];\n\
  \    if ([self.lastChosenMediaType isEqual:(NSString *)kUTTypeImage]) {\n      \
  \  self.image = info[UIImagePickerControllerEditedImage];\n    } else if ([self.lastChosenMediaType\
  \ isEqual:(NSString *)kUTTypeMovie]) {\n        self.movieURL = info[UIImagePickerControllerMediaURL];\n\
  \    }\n    [picker dismissViewControllerAnimated:YES completion:NULL];\n}\n\n-\
  \ (void)imagePickerControllerDidCancel:(UIImagePickerController *)picker {\n   \
  \ [picker dismissViewControllerAnimated:YES completion:NULL];\n}\n```\n\n第一个委托方法检查用户选择了图片还是视频，记录选择内容，然后关闭模态图像选择器。如果图像大于屏幕可用空间，显示时图像视图会对其进行缩放，因为我们在创建图像视图时将其内容模式设置为`Aspect\
  \ Fit`。第二个委托方法在用户取消图像选取过程时被调用，仅关闭图像选择器。\n\n这就是你需要做的全部工作。编译并运行应用程序。如果在模拟器上运行，你将无法选择拍摄新照片，只能从照片库中选择——就好像模拟器的照片库中有照片一样！如果有机会在真实设备上运行应用程序，请尝试一下。你应该能够拍摄新照片或视频，并使用捏合手势放大和缩小照片。在\
  \ iOS 上，当应用首次需要访问用户照片时，系统会要求用户允许此访问；这是 iOS 6 中添加的一项隐私功能，以确保应用不会在未经用户同意的情况下偷偷获取照片。\n\
  \n选择或拍摄照片后，如果在点击`Use Photo`按钮之前进行缩放和平移，裁剪后的图像将通过委托方法返回给应用程序。\n\n**大功告成！**\n\n\n\n"
