  \ 12-29 中的内容匹配。\n\n\n\n构建右列稍微容易一些。将另一个标签拖到视图上，并将其放置在`Officer`标签的右侧，在它们之间留出一个小间隙。在属性检查器中，将字体设置为`System\
  \ 15`。按住`Option`键向下拖动此标签，创建八个副本，每个副本与左列中对应的标签对齐。\n\n现在我们需要设置自动布局约束。首先将顶部两个标签连接起来。按住`Control`键从`Officer`标签拖到它右侧的标签上。松开鼠标并按住`Shift`键。在弹出的菜单中，选择`Horizontal\
  \ Spacing`和`Baseline`，然后点击弹出菜单外部。对其余八行执行相同操作，将每对标签连接在一起。\n\n接下来，我们将相对于视图的左侧和顶部固定左列标签的位置。在文档大纲中，按住`Control`键从`Officer`标签拖到`Main\
  \ View`。松开鼠标，按住`Shift`键，选择`Leading Space to Container Margin`和`Top Space to Top\
  \ Layout Guide`，然后点击弹出菜单外部以应用约束。对左列中的其他八个标签执行相同操作。\n\n最后，我们需要固定左列标签的宽度。选择`Officer`标签，点击故事板编辑器下方的`Pin`按钮。在弹出的窗口中，勾选`Width`复选框，然后点击`Add\
  \ 1 Constraint`。对左列中的所有标签重复此过程。\n\n现在所有标签都应该被正确约束了，因此在文档大纲中选择视图控制器`First`，然后点击故事板编辑器下方的`Resolve\
  \ Auto Layout Issues`按钮，并选择`Update Frames`（如果此选项未启用，则表示所有标签在故事板中已处于正确位置）。如果一切顺利，标签将会移动到最终位置。\n\
  \n接下来我们需要做的是将右列中的标签连接到它们的`Outlet`。在助理编辑器中打开`FirstViewController.m`，按住`Control`键从右列顶部的标签拖到`officerLabel`\
  \ `Outlet`以连接它们。按住`Control`键从右列的第二个标签拖到`authorizationLabel`，重复此操作，直到右列中的所有九个标签都连接到它们的`Outlet`。保存`Main.storyboard`文件。\n\
  \n**更新第一个视图控制器**\n\n在 Xcode 中，选择`FirstViewController.m`，并将以下代码添加到类的`@implementation`部分：\n\
  \n```\n@implementation FirstViewController\n\n- (void)refreshFields {\n    NSUserDefaults\
  \ *defaults = [NSUserDefaults standardUserDefaults];\n    self.officerLabel.text\
  \ = [defaults objectForKey:kOfficerKey];\n    self.authorizationCodeLabel.text = [defaults\n\
                                          objectForKey:kAuthorizationCodeKey];\n    self.rankLabel.text\
  \ = [defaults objectForKey:kRankKey];\n    self.warpDriveLabel.text = [defaults\
  \ boolForKey:kWarpDriveKey]\n                                ? @\"Engaged\" : @\"\
  Disabled\";\n    self.warpFactorLabel.text = [[defaults objectForKey:kWarpFactorKey]\n\
                                   stringValue];\n    self.favoriteTeaLabel.text = [defaults\
  \ objectForKey:kFavoriteTeaKey];\n    self.favoriteCaptainLabel.text = [defaults\n\
                                        objectForKey:kFavoriteCaptainKey];\n    self.favoriteGadgetLabel.text\
  \ = [defaults objectForKey:kFavoriteGadgetKey];\n    self.favoriteAlienLabel.text\
  \ = [defaults objectForKey:kFavoriteAlienKey];\n}\n\n- (void)viewWillAppear:(BOOL)animated\
  \ {\n    [super viewWillAppear:animated];\n    [self refreshFields];\n}.\n```\n\n\
  这里实际上没有什么会让你感到困惑的。`refreshFields`方法做了两件事。首先，它获取标准的用户默认值。其次，它使用我们放在`.plist`文件中的相同键值，将所有标签的`text`属性设置为用户默认值中的相应对象。请注意，对于`warpFactorLabel`，我们对其返回的对象调用了`stringValue`。我们的其他偏好设置大多是字符串，它们会以`NSString`对象的形式从用户默认值返回。然而，由滑块存储的偏好设置会以`NSNumber`的形式返回，但我们需要一个用于显示的字符串，因此我们对其调用`stringValue`来获取其持有值的字符串表示。\n\
  \n之后，我们重写了父类的`viewWillAppear:`方法，并在其中调用了我们的`refreshFields`方法。这会导致每当视图出现时——包括应用程序启动时以及用户从第二个标签页切换到第一个标签页时——用户看到的值都会被更新。\n\
  \n如果你此时运行应用程序，你应该会看到为第一个标签页构建的用户界面，但有些或所有字段将是空的。别担心，这不是一个错误。信不信由你，这是正确的行为。你将在接下来的“注册默认值”部分看到原因以及如何修复它。\n\
  \n**从我们的应用程序更改默认值**\n\n现在我们已经让主视图运行起来了，让我们构建第二个标签页。正如你在图 12-30 中所看到的，第二个标签页具有我们的曲速引擎开关，以及曲速因子滑块。我们将使用设置应用程序为这两个项目所使用的相同控件：一个开关和一个滑块。除了声明我们的`Outlet`，我们还将声明一个名为`refreshFields`的方法，就像我们在`FirstViewController`中所做的那样，以及两个将由用户触摸控件触发的操作方法。\n\
