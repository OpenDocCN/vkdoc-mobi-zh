  \ 切换到属性检查器，然后使用组合的颜色选择器/弹出按钮将**文本颜色**值改为其他颜色。根据你的背景颜色深浅，你可能想选择白色或黑色。\n\n现在，是时候对\
  \ `YellowViewController` 执行大致相同的操作了。从对象库中再抓取一个视图控制器，拖到编辑区。不用担心场景会变得拥挤；你可以把这些场景堆叠在一起，没人会介意！在文档大纲中点击新场景的**视图控制器**图标，使用身份检查器将其类改为\
  \ `YellowViewController`，**故事板 ID** 改为 `Yellow`。\n\n接下来，选择 `YellowViewController`\
  \ 的视图，切换到属性检查器。在那里，点击**背景**颜色控件，选择一种亮黄色，然后关闭颜色选择器。\n\n接着，从库中拖出一个按钮，使用对齐参考线将其在视图中居中。像上一个按钮一样，使用菜单操作创建约束，使其水平和垂直居中。现在将其标题改为\
  \ `Press Me, Too`。在按钮仍处于选中状态时，使用连接检查器从“触摸内部”事件拖到**视图控制器**图标，并连接到 `yellowButtonPressed`\
  \ 操作方法。\n\n完成后，保存故事板，准备让应用程序运行起来。在 Xcode 中点击**运行**按钮，你的应用应该会启动，并呈现一个全屏的蓝色界面。\n\n\
  当我们的应用程序启动时，它会显示我们构建的蓝色视图。当你点击**切换视图**按钮时，它会切换到我们构建的黄色视图。再次点击，它又会回到蓝色视图。如果你点击蓝色或黄色视图上居中的按钮，会弹出一个提示视图，显示哪个按钮被按下了。这个提示表明，对于当前显示的视图，正确的控制器类正在被调用。\n\
  \n不过，这两个视图之间的过渡有点突兀。天哪，要是有办法让过渡看起来更美观就好了。\n\n当然，有办法让过渡更美观！我们可以为过渡添加动画效果，给用户提供视觉上的变化反馈。\n\
  \n### 动画过渡\n\n`UIView` 有几个类方法可供调用，用于指示视图之间的过渡应带有动画效果，指示应使用的过渡类型，以及指定过渡所需的时间。\n\n\
  返回 `SwitchingViewController.m`，通过在 `switchViews:` 方法中添加以下以粗体显示的行来增强它：\n\n```\n-\
  \ (IBAction)switchViews:(id)sender {\n    // 如有必要，创建新的视图控制器。\n    if (!self.yellowViewController.view.superview)\
  \ {\n        if (!self.yellowViewController) {\n            self.yellowViewController\
  \ = [self.storyboard\n                instantiateViewControllerWithIdentifier:@\"\
  Yellow\"];\n        }\n    } else {\n        if (!self.blueViewController) {\n            self.blueViewController\
  \ = [self.storyboard\n                instantiateViewControllerWithIdentifier:@\"\
  Blue\"];\n        }\n    }\n\n// 切换视图控制器。\n    [UIView beginAnimations:@\"View Flip\"\
  \ context:NULL];\n    [UIView setAnimationDuration:0.4];\n    [UIView setAnimationCurve:UIViewAnimationCurveEaseInOut];\n\
      if (!self.yellowViewController.view.superview) {\n        [UIView setAnimationTransition:\n\
                       UIViewAnimationTransitionFlipFromRight\n                forView:self.view\
  \ cache:YES];\n        self.yellowViewController.view.frame = self.view.frame;\n\
          [self switchViewFromViewController:self.blueViewController\n                  toViewController:self.yellowViewController];\n\
      } else {\n        [UIView setAnimationTransition:\n                    UIViewAnimationTransitionFlipFromLeft\n\
                  forView:self.view cache:YES];\n        self.blueViewController.view.frame\
  \ = self.view.frame;\n        [self switchViewFromViewController:self.yellowViewController\n\
                    toViewController:self.blueViewController];\n    }\n    [UIView\
  \ commitAnimations];\n}\n```\n\n\n\n编译这个新版本并运行你的应用程序。当你点击 **切换视图** 按钮时，新视图不会直接闪现，而是旧视图会翻转，显示出新视图，如\
  \ 图 6-19 所示。\n\n![9781484202005_Fig06-19.jpg](img/9781484202005_Fig06-19.jpg)\n\n\
  图 6-19 使用翻转动画风格进行视图切换\n\n要告诉 `iOS` 我们想要动画化的变化，需要声明一个**动画块**，并指定动画应该持续多长时间。动画块通过使用\
  \ `UIView` 类的 `beginAnimations:context:` 方法来声明，如下所示：\n\n```\n[UIView beginAnimations:@\"\
  View Flip\" context:NULL];\n[UIView setAnimationDuration:0.4];\n```\n\n`beginAnimations:context:`\
  \ 接受两个参数。第一个是动画块标题。此标题仅在你更直接地利用此动画背后的框架 `Core Animation` 时才会发挥作用。对于我们而言，我们本可以使用\
  \ `nil`。第二个参数是一个 `(void *)`，允许你指定一个对象（或任何其他 `C` 数据类型），你希望其指针与此动画块关联。我们在这里使用了 `NULL`，因为我们不需要这样做。我们还设置了动画的持续时间，它告诉\
  \ `UIView` 动画应该持续多长时间（以秒为单位）。\n\n之后，我们设置**动画曲线**，它决定了动画的时间安排。默认是线性曲线，使动画以恒定速度发生。我们在这里设置的选项\
  \ `UIViewAnimationCurveEaseInOut` 指定动画应该开始慢，中间加速，然后在结束时再次减速。这使动画看起来更自然，更少机械感：\n\n\
  ```\n[UIView setAnimationCurve:UIViewAnimationCurveEaseInOut];\n```\n\n接下来，我们需要指定要使用的过渡效果。在撰写本文时，有五种\
  \ `iOS` 视图过渡可供使用：\n\n*   `UIViewAnimationTransitionFlipFromLeft`\n*   `UIViewAnimationTransitionFlipFromRight`\n\
  *   `UIViewAnimationTransitionCurlUp`\n*   `UIViewAnimationTransitionCurlDown`\n\
  *   `UIViewAnimationTransitionNone`\n\n我们选择使用两种不同的效果，具体取决于正在被交换的视图。对一个过渡使用向左翻转，对另一个过渡使用向右翻转，会使视图似乎来回翻转。值\
  \ `UIViewAnimationTransitionNone` 会导致从一个视图控制器到另一个的突然过渡。当然，如果你想要那种效果，根本就不会费心去创建动画块。\n\
  \n`cache` 选项通过在动画开始时获取视图的快照来加速绘制，并使用该图像，而不是在动画的每一步重新绘制视图。除非视图的外观在动画期间可能需要更改，否则你应该始终缓存动画：\n\
  \n```\n[UIView setAnimationTransition:UIViewAnimationTransitionFlipFromRight\n \
  \                  forView:self.view cache:YES];\n```\n\n当我们完成指定要动画化的更改后，我们在 `UIView`\
  \ 上调用 `commitAnimations`。从动画块开始到调用 `commitAnimations` 之间的所有内容将一起进行动画化。\n\n感谢 `Cocoa\
  \ Touch` 在底层使用 `Core Animation`，我们能够仅用少量代码实现相当复杂的动画。\n\n**切换结束**\n\n哇！创建我们自己的多视图控制器工作量很大，不是吗？现在，你应该对多视图应用程序是如何组合在一起的有了很好的理解，因为你已经从零开始构建了一个。\n\
  \n尽管 `Xcode` 包含了最常见类型的多视图应用程序的项目模板，但你需要理解这些类型应用程序的整体结构，以便能够从头开始构建它们。标准的容器控制器（`UITabBarController`、`UINavigationController`\
  \ 和 `UIPageViewController`）是难以置信的省时工具，你应该在可能时使用它们，但有时，它们根本无法满足你的需求。\n\n在接下来的几章中，我们将继续构建多视图应用程序，以巩固本章的概念，并让你感受更复杂的应用程序是如何组合在一起的。在第\
  \ 7 章中，我们将构建一个标签栏应用程序。让我们开始吧！\n\n"
- "# 第 7 章 标签栏与选择器\n\n在上一章中，你构建了你的第一个多视图应用程序。在本章中，你将构建一个完整的包含五个不同标签和五个不同内容视图的标签栏应用程序。构建这个应用程序将巩固你在第\
  \ 6 章中学到的很多东西。现在，你太聪明了，不会花整整一章来做你已经知道怎么做的事情，所以我们将使用这五个内容视图来演示一种我们尚未涵盖的 `iOS` 控件类型。这个控件称为**选择器视图**，或简称为**选择器**。\n\
  \n你可能对这个名字不熟悉，但如果你拥有 `iPhone` 或 `iPod touch` 超过 10 分钟，你几乎肯定使用过选择器。选择器是带有旋转拨盘的控件。你在日历应用程序中使用它们输入日期，或者在时钟应用程序中设置计时器（参见\
  \ 图 7-1）。在 `iPad` 上，选择器视图并不那么常见，因为更大的显示屏允许你呈现其他从多个项目中选择的方式；但即使在那里，它也在日历应用程序中使用。\n\
  \n![9781484202005_Fig07-01.jpg](img/9781484202005_Fig07-01.jpg)\n\n图 7-1 时钟应用程序中的选择器\n\
  \n选择器比你迄今看到的 `iOS` 控件稍微复杂一些；因此，它们值得多花一点注意。选择器可以配置为显示一个拨盘或多个。默认情况下，选择器显示文本列表，但它们也可以被设置为显示图像。\n\
  \n**选择器应用程序**\n\n本章的应用程序 `Pickers`，将包含一个标签栏。在构建 `Pickers` 时，你将更改默认标签栏，使其有五个标签，为每个标签栏项添加图标，然后创建一系列内容视图，并将每个视图连接到一个标签。\n\
  \n应用程序的内容视图将包含五种不同的选择器：\n\n*   **日期选择器：**我们将构建的第一个内容视图将包含一个日期选择器，这是最容易实现的选择器类型（参见\
  \ 图 7-2）。该视图还将有一个按钮，点击时，将显示一个警报，显示所选的日期。\n\n![9781484202005_Fig07-02.jpg](img/9781484202005_Fig07-02.jpg)\n\
  \n图 7-2 第一个标签将显示一个日期选择器\n\n*   **单组件选择器：**第二个标签将包含一个带有单个值列表的选择器（参见 图 7-3）。这个选择器实现起来比日期选择器要多一些工作。你将学习如何通过使用委托和数据源来指定选择器中显示的值。\n\
  \n![9781484202005_Fig07-03.jpg](img/9781484202005_Fig07-03.jpg)\n\n图 7-3 显示单个值列表的选择器\n\
  \n*   **多组件选择器：**在第三个标签中，我们将创建一个带有两个独立轮盘的选择器。这些轮盘的技术术语是**选择器组件**，因此这里我们正在创建一个具有两个组件的选择器。你将看到如何使用数据源和委托向选择器提供两个独立的数据列表（参见\
  \ 图 7-4）。这个选择器的每个组件可以独立更改，而不会影响另一个。\n\n![9781484202005_Fig07-04.jpg](img/9781484202005_Fig07-04.jpg)\n\
  \n图 7-4 一个双组件选择器，显示反映我们选择的警报\n\n\n\n*   **带有依赖组件的`Picker`（选择器）：** 在第四个内容视图中，我们将构建另一个带有两个组件的选择器。但这一次，右侧组件中显示的值将根据左侧组件中选择的值而变化。在我们的示例中，我们将在左侧组件中显示一个州列表，并在右侧组件中显示该州的邮政编码列表（参见图\
  \ 7-5）。\n\n![9781484202005_Fig07-05.jpg](img/9781484202005_Fig07-05.jpg)\n\n图 7-5.\
  \ 在这个选择器中，一个组件依赖于另一个组件。当你在左侧组件中选择一个州时，右侧组件会变为该州的邮政编码列表。\n\n*   **带有图像的自定义选择器：**\
  \ 最后，但绝非最不重要的一点是，我们将在第五个内容视图中找点乐子。我们将演示如何向选择器添加图像数据，为此，我们将编写一个小游戏，该游戏使用一个包含五个组件的选择器。在苹果文档的多个地方，选择器的外观被描述为有点像老虎机。那么，还有什么比编写一个老虎机小游戏更合适的呢（参见图\
  \ 7-6）？对于这个选择器，用户将无法手动更改组件的值，但可以选择**Spin**（旋转）按钮，让五个轮盘旋转到新的随机选定值。如果同一图像出现三个排成一排，用户就赢了。\n\
  \n![9781484202005_Fig07-06.jpg](img/9781484202005_Fig07-06.jpg)\n\n图 7-6. 我们的第五个组件选择器。请注意，我们不赞成将你的\
  \ iPhone 当作微型赌场使用。\n\n## 委托与数据源\n\n在我们深入并开始构建应用程序之前，让我们看看是什么让选择器比你迄今为止使用的其他控件更复杂。除了日期选择器之外，你无法仅仅通过从对象库中抓取一个选择器、将其拖放到内容视图上并配置它来使用它。你还需要为每个选择器提供一个选择器**委托**和一个选择器**数据源**。\n\
  \n至此，你应该已经熟悉委托的使用了。我们已经使用过应用程序委托，其基本思想在这里是相同的。选择器将几项工作委托给它的委托。其中最重要的是确定在每个组件的每一行中实际绘制什么内容的任务。选择器要求委托提供一个字符串或一个视图，该视图将在给定组件的给定位置绘制。选择器从委托那里获取其数据。\n\
  \n除了委托之外，选择器还需要有一个数据源。数据源告诉选择器它将有多少个组件，以及每个组件由多少行组成。数据源的工作方式与委托类似，其方法会在某些预定的时间被调用。没有数据源和委托，选择器就无法工作；实际上，它们甚至不会被绘制出来。\n\
  \n数据源和委托通常是同一个对象，并且该对象通常是选择器所在视图的视图控制器，这是我们在本应用程序中将采用的方法。我们应用程序的每个内容面板的视图控制器将充当其选择器的数据源和委托。\n\
  \n**注意** 这里有一个突击测验：选择器数据源是应用程序模型、视图还是控制器部分的一部分？这是一个陷阱问题。数据源听起来像是必须是模型的一部分，但它实际上是控制器的一部分。数据源通常不是一个设计用来保存数据的对象。在简单的应用程序中，数据源可能保存数据，但其真正的工作是从模型检索数据并将其传递给选择器。\n\
  \n让我们启动 Xcode 并开始吧。\n\n## 创建选择器应用程序\n\n虽然 Xcode 为标签栏应用程序提供了一个模板，但我们还是从头开始构建。这并不会增加太多工作量，而且是一个很好的练习。\n\
  \n创建一个新项目，再次选择**Single View Application**（单视图应用程序）模板，然后选择**Next**（下一步）进入下一个屏幕。在**Product\
  \ Name**（产品名称）字段中，输入**Pickers**。确保名为**Use Core Data**（使用 Core Data）的复选框未被选中，并将**Language**（语言）设置为\
  \ *Objective-C*，将**Devices**（设备）弹出菜单设置为 *Universal*（通用）。然后再次选择**Next**（下一步）。Xcode\
  \ 会让你选择保存项目的文件夹。\n\n我们将引导你完成构建整个应用程序的过程；但在任何时候，如果你觉得自己可以先进一步、挑战自我，请随意。如果你遇到困难，随时可以回来。如果你不想跳过，那也没关系。我们很高兴有你陪伴。\n\
  \n### 创建视图控制器\n\n在上一章中，我们创建了一个根视图控制器（简称“根控制器”）来管理交换应用程序其他视图的过程。这次我们也会这样做，但不需要创建我们自己的根视图控制器类。苹果提供了一个非常好的用于管理标签栏视图的类，因此我们将直接使用\
  \ `UITabBarController` 的一个实例作为我们的根控制器。\n\n首先，我们需要在 Xcode 中创建五个新类：根控制器将交换进和交换出的五个视图控制器。\n\
  \n在项目导航器中展开 *Pickers* 文件夹。在那里，你将看到 Xcode 为启动项目而创建的源代码文件。单击 *Pickers* 文件夹，然后按下 **N**\
  \ 键，或选择 **File** ![image](img/arrow.jpg) **New** ![image](img/arrow.jpg) **File.\
  \ . .**。\n\n在新建文件助手的左窗格中选择 **iOS**，然后选择 **Source**（源代码），接着选择 **Cocoa Touch Class**\
  \ 图标，然后点击 **Next**（下一步）继续。下一个屏幕让你为新类命名。在 **Class**（类）字段中输入 **DatePickerViewController**。确保\
  \ **Subclass of**（子类化）字段包含 *UIViewController*。确保 **Also create XIB file**（同时创建 XIB\
  \ 文件）复选框未被选中，将 **Language**（语言）设置为 *Objective-C*，然后点击 **Next**（下一步）。\n\n你将看到一个文件夹选择窗口，让你选择类的保存位置。选择\
  \ *Pickers* 目录，该目录已经包含 `AppDelegate` 类和其他几个文件。同时确保 **Group**（组）弹出菜单已选中 *Pickers*\
  \ 文件夹，并且 **Pickers** 的目标复选框已选中。\n\n点击 **Create**（创建）按钮后，*Pickers* 文件夹中会出现两个新文件：*DatePickerViewController.h*\
  \ 和 *DatePickerViewController.m*。\n\n再重复这些步骤四次，分别使用名称 *SingleComponentPickerViewController*、*DoubleComponentPickerViewController*、*DependentComponentPickerViewController*\
  \ 和 *CustomPickerViewController*。所有这些步骤完成后，*Pickers* 文件夹应包含所有新文件，整齐地组合在一起（参见图 7-7）。\n\
  \n![9781484202005_Fig07-07.jpg](img/9781484202005_Fig07-07.jpg)\n\n图 7-7. 创建五个视图控制器类后，项目导航器中应包含所有这些文件。\n\
  \n### 创建标签栏控制器\n\n现在，让我们创建标签栏控制器。项目模板已经包含一个名为 `ViewController` 的视图控制器，它是 `UIViewController`\
  \ 的子类。要将其转换为标签栏控制器，我们只需要更改其基类。打开 *ViewController.h* 并进行以下粗体所示的更改：\n\n```\n#import\
  \ <UIKit/UIKit.h>\n\n@interface ViewController : UITabBarController\n```\n\n\n\n\
  接下来，我们需要在故事板中设置标签栏控制器，因此打开`Main.storyboard`。模板中已添加了一个初始视图控制器，我们需要将其替换，因此在文档大纲或编辑区域中选择它，然后按`Delete`键删除。在对象库中，找到`Tab\
  \ Bar Controller`并将其拖拽到编辑区域（参见图 7-8）。\n\n![9781484202005_Fig07-08.jpg](img/9781484202005_Fig07-08.jpg)\n\
  \n图 7-8. 将标签栏控制器从库中拖入编辑区域。你拖动的是一个相当大的东西。\n\n在拖动时，你会发现，与之前要求从对象库中拖出的其他控制器不同，这个控制器一次性拉出了三个完整的视图控制器对，它们之间用曲线连接。这实际上不仅仅是一个标签栏控制器；它还包含两个子控制器，已经连接好并可以立即使用。\n\
  \n将标签栏控制器放入编辑区域后，故事板中就会添加三个新场景。如果展开左侧的文档视图，你会看到故事板中所有场景的清晰概览（参见图 7-9）。你还会看到连接标签栏控制器与其每个子控制器的曲线仍然存在。如果移动场景，这些曲线会自动调整以保持连接，你可以随时自由移动它们。故事板中每个场景在屏幕上的位置不会影响应用运行时的外观。\n\
  \n![9781484202005_Fig07-09.jpg](img/9781484202005_Fig07-09.jpg)\n\n图 7-9. 标签栏控制器的场景及其两个子场景。注意视图底部的标签栏包含两个标签，以及连接到每个子视图控制器的曲线。\n\
  \n这个标签栏控制器将成为我们的根控制器。提醒一下，根控制器控制程序运行时用户首先看到的视图。它负责切换其他视图的显示与隐藏。由于我们将把每个视图连接到标签栏的某个标签上，因此标签栏控制器作为根控制器是合乎逻辑的选择。我们需要告诉\
  \ iOS，在应用程序启动时应从`Main.storyboard`加载这个标签栏控制器。为此，在文档大纲中选择`Tab Bar Controller`图标，打开属性检查器；然后在`View\
  \ Controller`部分，勾选`Is Initial View Controller`复选框。在视图控制器仍处于选中状态时，切换到标识检查器，并将`Class`更改为`ViewController`。\n\
  \n标签栏可以使用图标来表示每个标签，因此我们应在编辑故事板之前添加要使用的图标。你可以在本书源代码归档的`07 - ImageSets`文件夹中找到一些合适的图标。`07\
  \ - ImageSets`的每个子文件夹都包含三张图片（一张用于标准显示屏设备，两张用于视网膜显示屏设备）。在 Xcode 项目导航器中，选择`Images.xcassets`，它已包含图标和启动图像的默认图形。接下来，将`07\
  \ - ImageSets`文件夹中的每个子文件夹拖到编辑区域左侧栏的 AppIcon 下方，将它们全部复制到项目中。\n\n如果你想自己制作图标，可以参考以下创建指南。使用的图标应为\
  \ 24 × 24 像素，并保存为`.png`格式。图标文件应具有透明背景。无需费力为图标着色以匹配标签栏的外观。与应用程序图标一样，iOS 会自动处理你的图像，使其看起来恰到好处。\n\
  \n**提示**：24 × 24 像素的图像大小实际上是针对标准显示屏的；对于 iPhone 4 及更高版本的视网膜显示屏以及新款 iPad，你需要提供双倍大小的图像，否则图像会出现像素化。对于\
  \ iPhone 6 Plus，你需要提供原始大小三倍的图像。这非常简单：对于任何图像`foo.png`，你还应提供一个名为`foo@2x.png`的双倍大小图像，以及另一个名为`foo@3x.png`的三倍大小图像。调用`[UIImage\
  \ imageNamed:@\"foo\"]`会自动返回适合当前运行设备的标准大小图像或双倍大小图像。\n\n回到故事板，你可以看到每个子视图控制器顶部显示类似“Item\
  \ 1”的名称，并且其视图底部有一个栏按钮项，标签与标签栏中的内容匹配。我们最好从一开始就为这两个子控制器设置正确的名称，因此选择`Item 1`视图控制器，然后点击底部或文档大纲中的标签栏项。打开属性检查器，你会看到一个用于设置`Bar\
  \ Item`的`Title`的文本字段，当前包含文本`Item 1`。将文本替换为`Date`，然后按`Enter`键。这会立即更改此视图控制器底部栏按钮项的文本，以及标签栏控制器中对应标签栏项的文本。仍在检查器中时，点击`Image`弹出菜单并选择`clockicon`来设置图标。这再简单不过了！\n\
  \n现在对第二个子视图控制器重复相同的步骤，但将其命名为`Single`，并使用`singleicon`图像作为其栏按钮项。\n\n下一步是完善标签栏控制器，使其包含图\
  \ 7-2 中所示的五个标签。这五个标签分别对应我们的五个选取器。实现方法很简单：在故事板中再添加三个视图控制器（除了随标签栏控制器一起添加的两个之外），然后将它们每个都连接到标签栏控制器，以便标签栏控制器可以激活它们。首先，从对象库中拖出一个普通的`View\
  \ Controller`。接下来，按住`Control`键从标签栏控制器拖到新的视图控制器，松开鼠标按钮，然后在弹出的小窗口的`Relationship Segue`部分选择`view\
  \ controllers`。这告诉标签栏控制器它有一个新的子控制器需要管理，因此标签栏会立即获得一个新项，并且新视图控制器的视图底部会出现一个栏按钮项，与已有的其他子控制器一样。现在按照前面概述的步骤，为这个最新视图控制器的栏按钮项设置标题`Double`和图像`doubleicon`。\n\
  \n现在进展顺利。再拖出两个视图控制器，并按前述方法将它们连接到标签栏控制器。逐个选择每个视图控制器的栏按钮项，将其中一个命名为`Dependent`，并使用`dependenticon`作为其图像；另一个命名为`Custom`，并使用`toolicon`作为其图像。\n\
