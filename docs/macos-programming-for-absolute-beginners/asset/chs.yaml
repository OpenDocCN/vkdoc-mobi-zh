  \n弹出按钮让你可以选择不同的数字格式样式，这样当你将格式化后的数字输入文本字段时，就能看到它们的工作效果。通过选择不同的格式样式，你可以看到文本字段如何允许你输入不同格式的数字，例如\
  \ `25%`（会被转换为 `0.25`）或 `1.2E3`（会被转换为 `1200.0`）。\n\n\n\n### 使用安全文本字段、搜索字段和令牌字段\n\n\
  安全文本字段会在用户输入时用圆点符号隐藏文本。这有助于屏蔽密码、信用卡号或其他敏感信息等实际文本，使其不被看到。除了屏蔽输入的文本外，安全文本字段的工作方式与常规文本字段完全相同，你可以使用\
  \ `intValue`、`floatValue`、`doubleValue` 或 `stringValue` 属性检索输入的值。\n\n搜索文本字段看起来像浏览器中常见的典型搜索字段，显示一个放大镜图标和一个关闭图标，点击后可一键删除搜索字段中的文本。每当用户在搜索字段中输入内容并按回车键时，搜索字段会将该文本存储为列表，保存在\
  \ `recentSearches` 属性中。\n\n通过访问此 `recentSearches` 属性，你可以查看用户先前在该搜索字段中输入的所有内容的列表。\n\
  \n令牌字段允许你输入文本，然后将其包围在令牌中。尽管外观是令牌，你仍然可以通过访问 `stringValue` 属性来检索令牌字段的文本。\n\n要了解如何使用安全文本字段、搜索字段和令牌字段，请按以下步骤操作：\n\
  \n1.  在 Xcode 中选择 \"文件\" ➤ \"新建\" ➤ \"项目\"。\n2.  在 macOS 类别下点击 \"应用\"。\n3.  点击 \"\
  Cocoa 应用\"，然后点击 \"下一步\" 按钮。Xcode 会要求输入产品名称。\n4.  点击 \"产品名称\" 文本字段，输入 `TextProgram`。\n\
  5.  确保 \"语言\" 弹出菜单显示为 \"Swift\"，并且已选中 \"使用故事板\" 复选框。\n6.  点击 \"下一步\" 按钮。Xcode 会询问项目存储位置。\n\
  7.  选择一个文件夹来存储项目，然后点击 \"创建\" 按钮。\n8.  在项目导航器窗格中点击 `Main.storyboard` 文件。\n9.  点击\
  \ `TextProgram` 图标，使用户界面的窗口显示出来。\n10. 将三个按钮、一个搜索字段（顶部）、一个令牌字段（中间）、一个安全文本字段（底部）以及三个调整宽度以扩展显示的标签拖入用户界面，如图\
