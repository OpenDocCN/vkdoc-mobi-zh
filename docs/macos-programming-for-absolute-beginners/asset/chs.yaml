  \ `MainMenu.xib` 文件。\n9. 点击 **窗口** 图标以显示用户界面窗口，如图 8-8 所示。\n\n![A437923_1_En_8_Fig8_HTML.jpg](img/A437923_1_En_8_Fig8_HTML.jpg)\n\
